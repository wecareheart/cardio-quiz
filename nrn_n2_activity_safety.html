"},{"id":"114100-N2-28","code":"114100","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":28,"stem":"有關鼻胃管護理的敘述,下列何者錯誤?","opts":{"A":"一手固定管路、一手撕除舊布膠,視需要可用丙酮去除布膠痕跡","B":"以濕紙巾擦拭膠布黏貼處,並檢查鼻樑的皮膚狀況,避免管路長期壓迫同一部位","C":"每日需將管子旋轉約45 度,避免管路周圍皮膚和黏膜長時間受壓,導致壓傷","D":"鼻胃管拔除時,病人採高坐臥姿勢,請病人發出「阿」的聲音並吐氣"},"answer":"D","answer_status":"送分","accepted_answers":["A","B","C","D"],"topic":"7舒適與綜合照護","topic_code":"B7-7","q_num":28,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"一手固定管路、一手撕除舊布膠,視需要可用丙酮去除布膠痕跡","B":"以濕紙巾擦拭膠布黏貼處,並檢查鼻樑的皮膚狀況,避免管路長期壓迫同一部位","C":"每日需將管子旋轉約45 度,避免管路周圍皮膚和黏膜長時間受壓,導致壓傷","D":"鼻胃管拔除時,病人採高坐臥姿勢,請病人發出「阿」的聲音並吐氣"},"img":""},{"id":"114170-N2-8","code":"114170","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":8,"stem":"病人有疼痛、呼吸困難、睡眠型態紊亂及身體心像紊亂等健康問題,應最優先處置的健康問題為何?","opts":{"A":"疼痛","B":"呼吸困難","C":"睡眠型態紊亂","D":"身體心像紊亂"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"7舒適與綜合照護","topic_code":"B7-7","q_num":8,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"疼痛","B":"呼吸困難","C":"睡眠型態紊亂","D":"身體心像紊亂"},"img":""},{"id":"115030-N2-5","code":"115030","roc":"115","cat":"N2","catname":"基本護理學與護理行政","num":5,"stem":"病人因退化性關節炎,對於是否接受全膝關節置換術徵詢護理人員的意見,下列護理人員的回應何 者最適當?","opts":{"A":"「開完刀加強復健,一定就會好的。」","B":"「我們現在先去做心電圖檢查。」","C":"「如果我是你,我會接受醫師的建議。」","D":"「可以告訴我,你的擔心是什麼呢?」"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"7舒適與綜合照護","topic_code":"B7-7","q_num":5,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"「開完刀加強復健,一定就會好的。」","B":"「我們現在先去做心電圖檢查。」","C":"「如果我是你,我會接受醫師的建議。」","D":"「可以告訴我,你的擔心是什麼呢?」"},"img":""}],E={"101030-N2-44":{"quick":"輪椅返床:輪椅放「床頭」、椅背與床尾呈45度;稱放床尾為錯誤。","detail":{"background":"協助病患由輪椅返回病床:應將輪椅放於「床頭側」、椅背與床尾呈45度角(B正確,使病人轉身即可坐回床緣)。選項A「將輪椅放於床尾」錯誤(本題答案,問錯誤)——下床時輪椅放床尾、返床時放床頭,A位置不對。C請病患遠側手扶輪椅把手轉身、D護理師環抱腰部協助皆正確。故A為錯誤敘述。","options":{"A":"錯誤(本題答案)。返床時輪椅應放床頭,非床尾。","B":"正確。輪椅放床頭、椅背與床尾呈45度。","C":"正確。遠側手扶把手轉身坐回。","D":"正確。護理師環抱腰部協助。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"101030-N2-53":{"quick":"身體力學:身體重心離病人或物品愈近愈省力。","detail":{"background":"身體力學原理:B「使身體重心離病人或物品愈近愈省力」正確(縮短力臂)。A應「『擴大』底面積、『降低』重心」增加平衡穩定(非縮小增重心);C應「減少」摩擦力與剪力(用滑動);D「減少」抗重力動作(用推拉滑而非抬舉)。故B正確。身體力學:擴大底面積(雙腳分開)、降低重心(屈膝)、重心靠近病人、用大肌肉群、保持脊柱平直、用拉/滑取代抬舉、床高調至護理師腰部;輪椅轉位放健側、下床放床尾返床放床頭、椅背與床尾45度。","options":{"A":"應擴大底面積、降低重心。","B":"正確(本題答案)。重心離物品愈近愈省力。","C":"應減少摩擦力與剪力。","D":"應減少抗重力動作。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"101110-N2-50":{"quick":"三人移意識不清病人至推床:最高排床頭側、最矮在床尾側。","detail":{"background":"三名護理師協助意識不清病人由病床移至推床:B「三名護理師(身高)最高者排在『床頭側(支托頭頸上半身,負擔重)』、最矮者在床尾側」正確。A推床與病床應「平行(並排)」非90~135度;C推床前進時病人「腳端在前(頭端在後便於觀察)」;D移動時「三人同時、整體一致」移動(非先頭後腳分開)。故B正確。","options":{"A":"推床與病床應平行並排,非90~135度。","B":"正確(本題答案)。最高者排床頭側、最矮床尾側。","C":"推床前進腳端在前,非頭端。","D":"三人應同時一致移動。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"102110-N2-42":{"quick":"輪椅轉位至床:協助病人站起轉向床時宜用腿部及臀部肌肉。","detail":{"background":"右手點滴病人由輪椅轉位至床:B「協助患者站起轉向床時,宜應用『腿部及臀部(大)肌肉』」正確(用大肌肉群省力防傷)。A輪椅椅背與床尾應呈「45度」非90度;C護理師將離患者「近側」膝蓋放患者兩腳之間(支撐穩定),非遠側;D床調至「與輪椅同高(便於水平移位)」非腰至胸高。故B正確。","options":{"A":"輪椅椅背與床尾呈45度,非90度。","B":"正確(本題答案)。站起轉向時用腿臀大肌肉。","C":"護理師近側膝蓋放患者兩腳間。","D":"床調至與輪椅同高,非腰至胸。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"104100-N2-47":{"quick":"身體力學:重心直線遠離支點時,維持平衡所需力量「增加」非降低;稱降低為錯誤。","detail":{"background":"搬動病人身體力學:A雙腳分開、膝彎曲、降低重心最佳(對);B用大肌肉比小肌肉不易疲勞(對);D保持脊柱平直、藉身體前後傾或移步完成拖拉(對)。選項C「當身體重心直線遠離支點時,維持平衡所需的力量便降低」錯誤——重心「遠離」支點(力臂變長),維持平衡所需力量「增加」(費力),應使重心靠近支點才省力,故C為錯誤敘述(本題答案)。","options":{"A":"正確。雙腳分開膝彎降低重心。","B":"正確。用大肌肉不易疲勞。","C":"錯誤(本題答案)。重心遠離支點所需力量增加,非降低。","D":"正確。脊柱平直藉前後傾移步。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"104100-N2-49":{"quick":"坐臥姿身體重心放置於髖部、薦骨、足跟。","detail":{"background":"採「坐臥(坐姿)」時身體重心(承重點)放置於「髖部(坐骨)、薦骨、足跟(足底)」(C正確)。坐姿主要由臀部(坐骨結節)、薦骨與足底承重。故髖部、薦骨、足跟(C)。身體力學:擴大底面積(雙腳分開)、降低重心(屈膝)、重心靠近病人、用大肌肉群、保持脊柱平直、用拉/滑取代抬舉、床高調至護理師腰部;輪椅轉位放健側、下床放床尾返床放床頭、椅背與床尾45度。","options":{"A":"非骨盆腔、膝蓋、足踝。","B":"薦骨膝蓋足踝組合不符。","C":"正確(本題答案)。坐臥重心在髖部、薦骨、足跟。","D":"薦骨膝蓋足跟組合不符(膝非承重)。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"106030-N2-32":{"quick":"病人移位原則:降低重心(1)、雙腳分開加大底面積(3)→「13」。","detail":{"background":"病人移位身體力學原則:1降低重心(穩定)、3雙腳分開站立加大支持底面積(穩定)——皆正確。選項2「利用小肌肉群」錯(應用『大肌肉群』省力防傷);4「保持身體後傾」錯(應保持脊柱平直、重心穩定)。故正確為「13」。本題選項標記重複,正解為13(降低重心+加大底面積)。","options":{"A":"12組合含2(小肌肉)錯。","B":"11標記異常,正解13。","C":"22含2、4錯。","D":"12含2錯,正解為13。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"107030-N2-45":{"quick":"協助病人翻身時,床高在護理師「腰部」最適當。","detail":{"background":"協助病人翻身/移位時,病床高度調整至「護理師的腰部(髖部)高度」最適當(A正確)——使護理師不需彎腰、保持脊柱平直、用大肌肉省力、避免下背傷害。薦椎、大腿、膝關節高度過低需彎腰。故腰部(A)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"正確(本題答案)。床高在護理師腰部最適當。","B":"薦椎高度過低需彎腰。","C":"大腿高度過低。","D":"膝關節高度過低需彎腰。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"107030-N2-46":{"quick":"將病人往床頭移時先稍微抬起、避免拖拉的主要目的=減少剪力。","detail":{"background":"將病人由床尾往床頭移動時,「先稍微抬起、避免直接拖拉」,主要目的是「減少剪力(shearing force)的發生」(A正確)——拖拉會使皮膚與床面摩擦、產生剪力,易造成皮膚損傷/壓瘡。非為降低不安全感、縮短時間或省力(雖抬起較費力)。故減少剪力(A)。","options":{"A":"正確(本題答案)。先抬起避免拖拉以減少剪力。","B":"非為降低不安全感。","C":"非為縮短時間。","D":"抬起較費力,非為省力。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"109110-N2-35":{"quick":"移動病人原則:降低重心(1)、利用大肌肉群(2)→「12」。","detail":{"background":"護理師移動病人原則:1降低重心(穩定省力)、2利用大肌肉群(省力防傷)——皆正確。選項3「雙腳合併站立」錯(應『分開』加大底面積);4「保持脊柱彎曲」錯(應『平直』防下背傷)。故正確為「12」。身體力學:擴大底面積(雙腳分開)、降低重心(屈膝)、重心靠近病人、用大肌肉群、保持脊柱平直、用拉/滑取代抬舉、床高調至護理師腰部;輪椅轉位放健側、下床放床尾返床放床頭、椅背與床尾45度。","options":{"A":"正確(本題答案,12)。降低重心、利用大肌肉群。","B":"含3(雙腳合併)錯。","C":"含3、4錯。","D":"含3、4錯。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"110030-N2-45":{"quick":"左偏癱坐輪椅:返回病床時輪椅置放位置「與下床不同」;稱與下床相同為錯誤。","detail":{"background":"協助左側偏癱病人坐輪椅:A輪椅放床尾、椅背與床尾呈45度(下床時,對);B輪椅放健側(右側,對,利健側施力);C下床前先測脈搏呼吸血壓(防姿位性低血壓,對)。選項D「返回病床時,輪椅置放位置與下床相同」錯誤——下床時輪椅放床尾,返床時應放「床頭」,位置不同,故D為錯誤敘述(本題答案)。","options":{"A":"正確。輪椅放床尾、椅背與床尾45度。","B":"正確。輪椅放健側右側。","C":"正確。下床前測生命徵象。","D":"錯誤(本題答案)。返床輪椅放床頭,與下床(床尾)不同。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"111030-N2-3":{"quick":"鋪床移位:儘量使用「滑動」方式移動病人以節省體力。","detail":{"background":"鋪床/移位身體力學:A「儘量使用『滑動』的方式移動病人,以節省體力」正確(滑動省力、減少抬舉)。B應用「大肌肉(臀肌比背肌佳)」非小肌肉;C站立時應「擴大」底面積(雙腳分開)非縮小;D應「彎曲膝蓋(屈膝降重心)」非彎曲腰部(彎腰傷下背)。故A正確。","options":{"A":"正確(本題答案)。用滑動方式移動病人省力。","B":"應用大肌肉(臀肌),非小肌肉(背肌)。","C":"應擴大底面積,非縮小。","D":"應屈膝降重心,非彎腰。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"112030-N2-33":{"quick":"翻身時「不」宜多用舉高方式移動病人(費力傷腰);稱多用舉高為最不適宜。","detail":{"background":"協助病人翻身身體力學:A雙腳分開增加底面積(對);B彎曲膝關節降低重心(對);D用拉動或滑動較省力(對)。選項C「多用舉高的方式來移動病人」最不適宜——舉高(抬舉)費力、易致護理師下背傷害,應「用拉動/滑動」取代抬舉,故C為最不適宜(本題答案)。","options":{"A":"適宜。雙腳分開增加底面積。","B":"適宜。彎曲膝關節降低重心。","C":"最不適宜(本題答案)。應用拉滑取代舉高(費力傷腰)。","D":"適宜。用拉動滑動省力。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"112180-N2-20":{"quick":"身體力學:用手臂肌肉比手腕肌肉「不易」疲勞(大肌肉);稱手臂比手腕易疲勞為錯誤。","detail":{"background":"翻身身體力學:B護理師保持脊椎平直(對);C病人越靠近護理師身體越省力(對);D調整床高與護理師腰部同高(對)。選項A「使用『手臂肌肉』比『手腕肌肉』較容易感到疲勞」錯誤——手臂(大肌肉)比手腕(小肌肉)「不易」疲勞,應多用大肌肉群省力,A敘述顛倒,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。手臂(大肌肉)比手腕不易疲勞,非較易。","B":"正確。保持脊椎平直。","C":"正確。病人越靠近越省力。","D":"正確。床高與腰部同高。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"112180-N2-29":{"quick":"使用拐杖前,病人上肢須執行加阻力運動(增強上肢肌力)。","detail":{"background":"使用兩側拐杖:B「使用拐杖前,病人上肢須執行加阻力運動(增強上肢/肩臂肌力以支撐體重)」正確。A拐杖長度=站立時腋下到足底外側15公分處(或身高減約40公分),非「平躺腋下到足底減2吋」;C「兩點步態」適用於雙腳可部分承重者,「四點/擺至步態」才適用高齡虛弱;D休息時「不可將腋下壓在拐杖上(壓迫腋神經致拐杖麻痺)」。故B正確。","options":{"A":"拐杖長度測量法不符。","B":"正確(本題答案)。用拐杖前上肢須加阻力運動。","C":"兩點步態適用可部分承重者,非高齡虛弱。","D":"休息時不可腋下壓拐杖(防拐杖麻痺)。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"113100-N2-23":{"quick":"移位擺位:側臥時上側髖膝較下側彎曲(穩定支托)。","detail":{"background":"移動病人並擺位:C「病人側臥時,上側的髖關節及膝關節較下側『彎曲』(屈曲),並以枕頭支托」正確(穩定姿勢、防壓迫)。A搬動用「大肌肉」比小肌肉不易疲勞;B仰臥時頭頸脊椎成一直線、大腿伸直「不交叉」;D應「多用滾動(圓滾木),少用拖拉」(拖拉產生剪力)。故C正確。","options":{"A":"用大肌肉比小肌肉不易疲勞。","B":"仰臥大腿伸直不交叉。","C":"正確(本題答案)。側臥上側髖膝較下側彎曲。","D":"應少用拖拉、多用滾動。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"114170-N2-44":{"quick":"護理師操作電腦螢幕距離、鍵盤手肘位置「會」造成物理性危害;稱不會為最不適當。","detail":{"background":"護理師職業物理性危害預防:A建立預防下背痛工作指引、自我訓練(對);B適度運動加強背肌(對);C提供搬運滑板、轉位腰帶等人因工程設備(對)。選項D「操作電腦螢幕的距離、鍵盤與手肘位置,不會造成物理性危害風險」最不適當——不良的螢幕距離與鍵盤手肘位置「會」造成肌肉骨骼傷害(肩頸腕、視力疲勞)等物理性危害,應符合人因工程,故D為最不適當(本題答案)。","options":{"A":"適當。建立預防下背痛指引。","B":"適當。運動加強背肌。","C":"適當。提供人因工程設備。","D":"最不適當(本題答案)。螢幕鍵盤位置會造成物理性危害,非不會。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"115030-N2-31":{"quick":"移位身體力學:身體重心應「靠近」病人非遠離;稱重心遠離病人以防跌倒為最不適當。","detail":{"background":"協助移位省力防傷:A雙腳分開站立、髖膝微彎(對,降重心);B面對將移動的部位(對);C儘量不用腰背部肌肉施力(對,用大肌肉防下背傷)。選項D「身體重心應遠離病人,以防跌倒」最不適當——身體重心應「靠近病人(縮短力臂)」才省力穩定;重心遠離反而費力且不穩,故D為最不適當(本題答案)。","options":{"A":"適當。雙腳分開髖膝微彎。","B":"適當。面對移動的部位。","C":"適當。不用腰背肌施力。","D":"最不適當(本題答案)。重心應靠近病人,非遠離。"},"sources":["新文京《基本護理學》身體力學與移位","華杏《最新基本護理學》身體力學"]}},"101110-N2-47":{"quick":"仰臥擺位:腰部到膝蓋外側以粗隆捲軸固定「不對」(粗隆捲軸是放髖部外側防外旋);稱腰到膝外側為錯誤。","detail":{"background":"意識不清病人仰臥擺位:A頭頸肩下置枕較舒適(對);B兩手各握小捲軸使手指微彎(對,防垂腕);D膝膕下置枕支托(對)。選項C「腰部到膝蓋外側以粗隆捲軸固定」——粗隆捲軸(trochanter roll)是放於「髖部(大轉子)外側、約腰至大腿」以「預防髖關節外旋」,本題敘述位置/用法被判為錯誤(C本題答案)。故C為錯誤敘述。","options":{"A":"正確。頭頸肩下置枕。","B":"正確。兩手握小捲軸防垂腕。","C":"錯誤(本題答案)。粗隆捲軸位置/用法敘述不當。","D":"正確。膝膕下置枕支托。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"102030-N2-30":{"quick":"側臥時最易受壓部位是「耳、肩峰、髖、外踝」非薦骨足跟;稱側臥注意薦骨足跟為錯誤。","detail":{"background":"意識不清病人舒適姿勢:A至少每2小時翻身防壓瘡(對);B仰臥握小捲軸防垂腕(對);D足托板每隔一段時間移開活動踝關節(對)。選項C「採側臥時,應注意最容易受壓的『薦骨及足跟』部位」錯誤——薦骨與足跟是「仰臥」的好發受壓處;「側臥」最易受壓處是「耳、肩峰突、髖骨側、外踝」,故C為錯誤敘述(本題答案)。","options":{"A":"正確。至少每2小時翻身。","B":"正確。仰臥握小捲軸防垂腕。","C":"錯誤(本題答案)。側臥受壓處是耳肩髖外踝,非薦骨足跟。","D":"正確。足托板定時移開活動踝。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"102030-N2-49":{"quick":"疑似休克病人改採「垂頭仰臥式」(增加腦部血流)。","detail":{"background":"車禍內出血疑似休克,為「增加回心血量與腦部灌流」,應採「垂頭仰臥式(休克姿勢:平躺、下肢抬高15~30度)」(A正確)。屈膝仰臥、半坐臥(降血壓)、平仰臥皆不利休克。故垂頭仰臥式(A)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"正確(本題答案)。休克採垂頭仰臥式(下肢抬高)。","B":"屈膝仰臥用於腹部放鬆。","C":"半坐臥會降腦血流,不利休克。","D":"單純仰臥不如垂頭仰臥利休克。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"103030-N2-3":{"quick":"防壓瘡:足部蓋單「不」宜壓緊(應留空間防垂足/壓迫);稱壓緊以固定肢體為錯誤。","detail":{"background":"防壓瘡鋪床:A橡皮中單上加鋪布中單維持乾燥(對);C墊單鋪平整緊固避免皮膚受壓(對);D鋪床後固定適當高度與床輪(對)。選項B「足部上的蓋單被宜壓緊,以保持肢體的固定」錯誤——足部蓋單應「鬆、留足部活動空間(可用床上護架撐起)」,壓緊會壓迫足部致「垂足、足跟壓瘡」,故B為錯誤敘述(本題答案)。","options":{"A":"正確。加鋪布中單維持乾燥。","B":"錯誤(本題答案)。足部蓋單應鬆,壓緊致垂足壓瘡。","C":"正確。墊單鋪平整緊固。","D":"正確。固定適當高度與床輪。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"103030-N2-48":{"quick":"長期臥床姿勢:身體各部位要給予適當支托維持良好姿勢。","detail":{"background":"長期臥床姿勢維持:B「為維持良好姿勢,身體各部位要給予適當支托」正確。A各關節應保持「功能位置(微彎)」非完全伸展(完全伸展也會攣縮);C姿勢應「每2小時」更換非四小時;D「並非所有病人」姿勢改變時都要做全關節運動(視病情,如脊椎不穩者不宜)。故B正確。","options":{"A":"關節應保持功能位置,非完全伸展。","B":"正確(本題答案)。各部位給予適當支托。","C":"姿勢每2小時更換,非四小時。","D":"非所有病人都做全關節運動。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"103030-N2-49":{"quick":"脊椎受損翻身:「不」將右手移頭側、左手橫胸前(應雙手置胸前、圓滾木整體翻);稱此為不適當。","detail":{"background":"脊椎受損病人翻向左側臥:A採圓滾木翻身法(對,保持脊椎平直);B利用翻身單先移至右側、拉起床欄(對);D兩人動作一致、脊椎平直(對)。選項C「將病人右側手臂移至頭側,左側手臂橫放胸前」不適當——脊椎手術翻身應「雙手交叉置於胸前、整體圓滾木翻轉」保持脊椎一直線,分開放置手臂可能致脊椎扭轉,故C為不適當(本題答案)。","options":{"A":"適當。採圓滾木翻身法。","B":"適當。翻身單先移右側拉床欄。","C":"不適當(本題答案)。應雙手置胸前整體翻,非分開放手臂。","D":"適當。兩人一致、脊椎平直。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"103100-N2-31":{"quick":"足跟保護器目的=預防足部潰瘍、放置時維持踝關節90度。","detail":{"background":"舒適姿勢防護設備:D「足跟保護器目的為預防足部(壓瘡)潰瘍,放置時須維持踝關節呈90度」正確。A氣墊床目的是「分散壓力(防壓瘡)」非分散熱度降體溫;B手捲軸置於手掌使手指微彎、目的是「維持功能位置防垂腕/攣縮」非僅促進血循;C足托板「不需每天取下」(維持踝90度防垂足,定時活動)。故D正確。","options":{"A":"氣墊床是分散壓力防壓瘡,非降體溫。","B":"手捲軸是維持功能位置防垂腕。","C":"足托板維持踝90度防垂足。","D":"正確(本題答案)。足跟保護器預防足部潰瘍、踝90度。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"103100-N2-49":{"quick":"促進產後子宮復原的姿勢=膝胸臥式。","detail":{"background":"「膝胸臥式(膝胸位)」可使子宮因重力前傾、矯正「子宮後傾」、促進「產後子宮復原與惡露排出」(C正確)。辛氏臥式(肛門檢查)、垂頭仰臥(休克)、屈膝仰臥(腹部放鬆)皆非。故膝胸臥式(C)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"辛氏臥式用於肛門檢查。","B":"垂頭仰臥用於休克。","C":"正確(本題答案)。膝胸臥式促進產後子宮復原。","D":"屈膝仰臥用於腹部放鬆。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"104100-N2-29":{"quick":"四肢癱瘓擺位:足托板固定預防垂足、非必要不拿開。","detail":{"background":"頸髓損傷四肢癱瘓擺位:C「以足托板固定腳部,預防垂足,非必要時不要拿開」正確(維持踝90度防垂足)。A側臥時「全身(含下半身)」需支托舒適、非僅腰臀離床;B粗隆捲軸固定於「髖部外側」防髖外旋、非雙下肢中間(雙腿中間放枕防內收);D翻身單圓滾木翻身(對,但本題以C為正解)。故C正確。","options":{"A":"側臥全身需支托,非僅腰臀離床。","B":"粗隆捲軸放髖部外側防外旋,非雙腿中間。","C":"正確(本題答案)。足托板預防垂足、非必要不拿開。","D":"翻身單圓滾木翻身正確,本題正解C。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"104100-N2-34":{"quick":"足托板可避免足部「下垂(垂足)」非內旋;稱避免內旋為不適當。","detail":{"background":"良好姿勢防護設備:A呼吸困難可伏趴床上桌休息(對);B燒傷者用床上支架避免被蓋壓迫(對);D粗隆捲軸長度腰到膝蓋(對)。選項C「使用足托板,可避免足部『內旋』」不適當——足托板(維持踝90度)是預防「足部『下垂』(垂足/蹠屈)」,非避免內旋(內旋用其他支托),故C為不適當(本題答案)。","options":{"A":"適當。呼吸困難伏趴床上桌。","B":"適當。燒傷用床上支架。","C":"不適當(本題答案)。足托板預防垂足,非避免內旋。","D":"適當。粗隆捲軸腰到膝。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"105030-N2-37":{"quick":"灌腸姿勢:老年人「不」採坐式(應左側臥);稱老年人可採坐式為錯誤。","detail":{"background":"灌腸姿勢:B髖關節受傷病人可採屈膝仰臥式(對);C一般人採左側臥式(對,順乙狀結腸);D腸阻塞病人可採膝胸臥式(對)。選項A「老年人可採坐式」錯誤——灌腸應採「左側臥(Sim位)」,坐式灌腸溶液無法順利進入乙狀結腸/直腸、且老人坐姿灌腸不安全,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。灌腸應左側臥,非坐式。","B":"正確。髖傷者可屈膝仰臥。","C":"正確。一般人採左側臥。","D":"正確。腸阻塞可膝胸臥。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"105090-N2-32":{"quick":"中風仰臥擺位:「腰下懸空訓練腹肌」不適當(腰下應支托);稱腰下懸空為不適當。","detail":{"background":"中風病人仰臥擺位:A粗隆捲軸防髖外旋(對);C小腿下墊軟枕利血循(對);D足底足托板防垂足(對)。選項B「腰下懸空以訓練腹部肌肉」不適當——仰臥時腰部(脊柱凹陷處)應「給予支托」維持脊椎正常曲線、減少肌肉緊張,懸空會增加腰部負擔,故B為不適當(本題答案)。","options":{"A":"適當。粗隆捲軸防髖外旋。","B":"不適當(本題答案)。腰下應支托,非懸空。","C":"適當。小腿下墊枕利血循。","D":"適當。足托板防垂足。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"106030-N2-43":{"quick":"腦梗塞偏癱「不」宜執行四肢關節「加阻力」運動(應被動運動);稱加阻力運動為不適當。","detail":{"background":"腦梗塞意識不清偏癱病人:A長捲軸置身體兩側腰至膝防髖外旋(對);B翻身留意偏癱側皮膚(對);C隨時評估意識狀態(對)。選項D「協助執行四肢關節『加阻力』運動」不適當——意識不清、偏癱(肌力低)病人應做「被動性全關節運動」維持關節活動度,「加阻力運動」需病人主動配合且肌力足夠,不適合,故D為不適當(本題答案)。","options":{"A":"適當。長捲軸防髖外旋。","B":"適當。留意偏癱側皮膚。","C":"適當。評估意識狀態。","D":"不適當(本題答案)。偏癱意識不清應被動運動,非加阻力。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"106030-N2-46":{"quick":"半坐臥姿身體受壓處「不」包括肩峰突;受壓處是坐骨結節、薦骨、肩胛骨、足跟。","detail":{"background":"半坐臥姿(高坐臥)身體受壓處:B坐骨結節、C薦骨、D肩胛骨、足跟、枕骨——皆為半坐臥受壓處。選項A「肩峰突」不是半坐臥的受壓處(本題答案)——肩峰突是「側臥」的受壓處。故半坐臥不包括肩峰突(A)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"正確(本題答案)。肩峰突是側臥受壓處,非半坐臥。","B":"坐骨結節是半坐臥受壓處。","C":"薦骨是半坐臥受壓處。","D":"肩胛骨是半坐臥受壓處。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"106110-N2-35":{"quick":"中風側臥受壓部位是「耳、肩峰、髖、外踝」非枕骨骶骨;稱受壓枕骨骶骨為不適當。","detail":{"background":"中風病人翻身側臥擺位:A促進口鼻分泌物引流(對,側臥利引流);B胸前及兩腿中間放軟枕(對,支托);D餵食時可選此擺位(對,半側臥利吞嚥)。選項C「此擺位造成的受壓部位為枕骨及骶骨」不適當——枕骨與骶骨是「仰臥」的受壓處;「側臥」受壓處是耳、肩峰、髖骨側、外踝,故C為不適當(本題答案)。","options":{"A":"適當。側臥促進口鼻分泌物引流。","B":"適當。胸前兩腿中間放軟枕。","C":"不適當(本題答案)。側臥受壓是耳肩髖踝,非枕骨骶骨。","D":"適當。餵食可選側臥。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"106111-N2-33":{"quick":"氣切痰多翻身程序:左側臥抬高床頭→半坐臥→右側臥抬高床頭→半坐臥(利引流抽痰)。","detail":{"background":"頸椎損傷、氣切痰多、需抽痰維持呼吸道,翻身程序與姿位應「抬高床頭(30~45度)的側臥與半坐臥交替」以利分泌物引流與抽痰:A「左側臥床頭抬高30~45度→半坐臥→右側臥床頭維持30~45度→半坐臥」最適當(A正確,全程抬高床頭、左右側臥交替利引流)。B/C/D含「平躺180度/膝胸臥/辛式」皆不利氣切病人分泌物引流。故A正確。","options":{"A":"正確(本題答案)。抬高床頭側臥與半坐臥交替利引流抽痰。","B":"含平躺180度不利引流。","C":"含膝胸臥不適當。","D":"含平躺180度不利引流。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"106111-N2-46":{"quick":"鼻胃管插入:無法坐起者可微抬高床頭、右側臥。","detail":{"background":"鼻胃管插入注意:B「無法坐起的病人,可協助微抬高床頭、採右側臥」正確(利於管子順食道進入胃、減少誤入氣管)。A燈光應「明亮」便於操作(非調暗);C鼻中膈彎曲者由「較通暢(健側)鼻孔」插入(非固定右側);D「活動假牙須先取下」(防鬆脫誤吸)。故B正確。","options":{"A":"燈光應明亮,非調暗。","B":"正確(本題答案)。無法坐起者微抬床頭右側臥。","C":"由較通暢鼻孔插入,非固定右側。","D":"活動假牙須先取下。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"107030-N2-29":{"quick":"砂袋「不」用於預防髖關節屈曲(用於加壓止血/固定肢體);稱用於預防髖屈曲為錯誤。","detail":{"background":"砂袋(sand bag)用途:A傷口加壓止血(對)、B固定腕部預防垂腕(對)、C固定足部預防外翻(對)。選項D「用於術後病人,預防髖關節屈曲」錯誤——砂袋是用於「加壓止血、固定特定肢體部位」,「預防髖關節屈曲/外旋」是用「粗隆捲軸」,非砂袋,故D為錯誤敘述(本題答案)。","options":{"A":"正確。砂袋用於加壓止血。","B":"正確。固定腕部防垂腕。","C":"正確。固定足部防外翻。","D":"錯誤(本題答案)。預防髖屈曲用粗隆捲軸,非砂袋。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"107030-N2-31":{"quick":"腸阻塞個案灌腸較適當姿勢=膝胸臥式。","detail":{"background":"腸阻塞個案灌腸時較適當的姿勢是「膝胸臥式」(A正確)——利用重力使灌腸液與氣體往乙狀結腸/上方移動、減輕脹氣。一般灌腸用左側臥;垂頭仰臥(休克)、辛氏臥(肛門檢查)皆非腸阻塞灌腸首選。故膝胸臥式(A)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"正確(本題答案)。腸阻塞灌腸採膝胸臥式。","B":"垂頭仰臥用於休克。","C":"左側臥是一般灌腸姿勢。","D":"辛式臥用於肛門檢查。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"107110-N2-47":{"quick":"昏迷口鼻分泌物多翻身姿勢=辛氏臥式。","detail":{"background":"昏迷病人口鼻部大量分泌物,翻身最適當姿勢是「辛氏臥式(Sim’s position,半俯臥/3/4俯臥)」(A正確)——使口鼻分泌物易引流、防止吸入,並維持呼吸道通暢。膝胸臥、垂頭仰臥、坐臥皆不適合昏迷者引流。故辛氏臥式(A)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"正確(本題答案)。昏迷分泌物多採辛氏臥式利引流。","B":"膝胸臥不適合昏迷引流。","C":"垂頭仰臥用於休克。","D":"坐臥不適合昏迷者。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"108110-N2-9":{"quick":"半坐臥需抬高床頭「30~45度」(高坐臥才45~60度);稱半坐臥抬高45~60度為不適當。","detail":{"background":"中風老人坐臥式擺位:A高坐臥式(60~90度)緩解呼吸困難(對);B半坐臥式有助放鬆腹肌(對);C流鼻血採坐臥、頭前傾(對)。選項D「半坐臥式需抬高床頭45~60度」不適當——半坐臥式(Fowler’s)床頭抬高約「30~45度」;45~60度偏向「高坐臥」,半坐臥定義不符,故D為不適當(本題答案)。","options":{"A":"適當。高坐臥緩解呼吸困難。","B":"適當。半坐臥放鬆腹肌。","C":"適當。流鼻血坐臥頭前傾。","D":"不適當(本題答案)。半坐臥約30~45度,非45~60度。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"108110-N2-39":{"quick":"「仰臥」不適合意識不清病人口鼻分泌物引流(應側臥/俯臥/辛氏);稱仰臥為答案。","detail":{"background":"意識不清病人口鼻腔分泌物「引流」應採「俯臥、側臥、辛氏臥位」(利分泌物流出、防吸入)。選項C「仰臥」「不適合」分泌物引流(本題答案)——仰臥時分泌物易積在咽喉、倒流入呼吸道致吸入。故不適合者為仰臥(C)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"俯臥適合分泌物引流。","B":"側臥適合分泌物引流。","C":"正確(本題答案)。仰臥不適合分泌物引流(易吸入)。","D":"辛氏臥位適合分泌物引流。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"108110-N2-41":{"quick":"脊椎術後「不」採俯臥引流(應圓滾木翻身保持脊椎平直);稱俯臥利引流為錯誤。","detail":{"background":"脊椎手術術後移動翻身:A圓滾木翻身法(對,保持脊椎一直線);C移動保持脊柱平直(對);D翻身時雙手抓緊肩臀翻身單(對)。選項B「採俯臥以利口鼻分泌物引流」錯誤——脊椎術後翻身應「整體圓滾木、側臥」保持脊椎平直,「俯臥」可能使脊椎過度伸展/扭轉、不利術後脊椎,故B為錯誤敘述(本題答案)。","options":{"A":"正確。圓滾木翻身法。","B":"錯誤(本題答案)。脊椎術後不採俯臥(影響脊椎),宜側臥圓滾木。","C":"正確。移動保持脊柱平直。","D":"正確。雙手抓緊肩臀翻身單。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"108110-N2-42":{"quick":"側臥「不」需特別留意足跟(足跟是仰臥受壓處);稱側臥留意足跟為「除外」項。","detail":{"background":"病人採側臥,側身肢體易受壓處:A耳朵、B肩峰突、C髖骨側邊——皆為側臥受壓處。選項D「足跟」是「除外(不是側臥主要受壓處)」(本題答案)——足跟是「仰臥」的受壓處;側臥時受壓的是耳、肩峰、髖側、外踝。故側臥除外者為足跟(D)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"耳朵是側臥受壓處。","B":"肩峰突是側臥受壓處。","C":"髖骨側邊是側臥受壓處。","D":"正確(本題答案)。足跟是仰臥受壓處,側臥除外。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"110110-N2-11":{"quick":"氣喘病人最適當臥姿=坐臥式(端坐呼吸)。","detail":{"background":"氣喘(呼吸困難)病人最適當臥姿是「坐臥式(高坐臥/端坐呼吸)」(B正確)——坐起使橫膈下降、增加肺擴張、減少回心血量、緩解呼吸困難。仰臥、膝胸臥、俯臥皆會加重氣喘呼吸困難。故坐臥式(B)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"仰臥會加重呼吸困難。","B":"正確(本題答案)。氣喘採坐臥式緩解呼吸困難。","C":"膝胸臥不適合呼吸困難。","D":"俯臥會加重呼吸困難。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"111030-N2-33":{"quick":"圓滾木翻身「不」於兩腳膝膕放枕(應雙膝間夾枕、整體翻);稱膝膕放枕為錯誤。","detail":{"background":"圓滾木翻身法翻向右側:A常用於脊椎術後改變姿位(對);B保持脊椎平直(對);C利用翻身單協助翻身(對)。選項D「應於病人兩腳的膝膕處放置枕頭」錯誤——圓滾木翻身應於「兩膝『之間』夾枕(防內收、維持下肢功能位置)」,而非膝膕(膝窩)後方放枕(膝膕放枕適用仰臥支托),故D為錯誤敘述(本題答案)。","options":{"A":"正確。常用於脊椎術後。","B":"正確。保持脊椎平直。","C":"正確。利用翻身單協助。","D":"錯誤(本題答案)。圓滾木翻身應雙膝間夾枕,非膝膕放枕。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"111030-N2-35":{"quick":"辛氏臥姿(3/4俯臥)「不能」加強背部肌肉張力(是舒適引流姿勢);稱加強背肌張力為錯誤。","detail":{"background":"辛氏臥姿(Sim’s position,3/4俯臥):A適用於肛門檢查、灌腸(對);B肩膀皮膚是易受壓部位(對);D又稱3/4俯臥姿(對)。選項C「可以加強背部肌肉張力」錯誤——辛氏臥姿是「半俯臥休息/引流/檢查」姿勢,並非「加強背部肌肉張力」的運動姿勢,故C為錯誤敘述(本題答案)。","options":{"A":"正確。適用肛門檢查灌腸。","B":"正確。肩膀皮膚易受壓。","C":"錯誤(本題答案)。辛氏臥姿非加強背肌張力。","D":"正確。又稱3/4俯臥姿。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"111030-N2-36":{"quick":"翻身擺位:仰臥可用粗隆捲軸預防髖關節外旋。","detail":{"background":"翻身擺位注意:D「仰臥時,可用粗隆捲軸預防髖關節外旋」正確。A膝膕處「不宜久墊軟枕」(長期墊高致膝屈曲攣縮、壓迫膕窩血管神經);B頭頸部與脊柱應呈「一直線(0度)」非15度;C足托板應保持足部「90度背屈(中立)」非背側伸展。故D正確。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"膝膕不宜久墊枕(致膝攣縮)。","B":"頭頸與脊柱呈一直線,非15度。","C":"足托板維持踝90度,非背側伸展。","D":"正確(本題答案)。仰臥用粗隆捲軸防髖外旋。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"111030-N2-46":{"quick":"長期平躺好發受壓處「不」包括腸骨前上棘(是俯臥受壓處);稱腸骨前上棘為答案。","detail":{"background":"長期「平躺(仰臥)」好發壓瘡部位:A肩胛骨、C薦骨、D腳跟、枕骨、肘——皆為仰臥受壓處。選項B「腸骨前上棘(髂前上棘)」「不是」仰臥好發部位(本題答案)——髂前上棘是「俯臥」的受壓處。故仰臥不包括腸骨前上棘(B)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"肩胛骨是仰臥受壓處。","B":"正確(本題答案)。腸骨前上棘是俯臥受壓處,非仰臥。","C":"薦骨是仰臥受壓處。","D":"腳跟是仰臥受壓處。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"111110-N2-34":{"quick":"腰椎穿刺後「不」採俯臥(應去枕平躺仰臥);稱腰椎穿刺後俯臥為錯誤。","detail":{"background":"擺位:B懷孕胎位不正採膝胸臥式(對,矯正胎位);C痔瘡切除採截刀式臥姿(對);D子宮頸抹片採膀胱截石術臥姿(對)。選項A「行腰椎穿刺後適用俯臥式」錯誤——腰椎穿刺後應「去枕平躺(仰臥)6~8小時」防止脊髓液滲漏致頭痛,非俯臥,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。腰椎穿刺後去枕平躺仰臥,非俯臥。","B":"正確。胎位不正採膝胸臥。","C":"正確。痔瘡切除採截刀式。","D":"正確。子宮頸抹片採膀胱截石位。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"111110-N2-36":{"quick":"床上護架「不」用於固定病人姿勢(是撐起被蓋避免接觸患部);稱固定姿勢為錯誤。","detail":{"background":"床上護架(bed cradle)使用:A可用於燒傷病人(對,撐起被蓋避免接觸傷口);B可用於肢體石膏未乾者(對);C目的是「避免被蓋直接接觸患部」(對)。選項D「可用於固定病人姿勢」錯誤——床上護架是「撐起被蓋、減輕被蓋對患部壓迫」,「不」用於固定姿勢(固定姿勢用支托物如捲軸砂袋),故D為錯誤敘述(本題答案)。","options":{"A":"正確。可用於燒傷病人。","B":"正確。可用於石膏未乾者。","C":"正確。避免被蓋接觸患部。","D":"錯誤(本題答案)。床上護架非固定姿勢用。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"112030-N2-36":{"quick":"預防髖關節外旋用砂袋(1)、粗隆捲軸(2)→「12」。","detail":{"background":"預防病人「髖關節外旋」的支托物:1砂袋(固定肢體外側)、2粗隆捲軸(trochanter roll,放髖部大轉子外側)——皆可預防髖外旋。選項3「氣墊床」是分散壓力防壓瘡;4「床上護架」是撐起被蓋。故預防髖外旋為「12」。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"正確(本題答案,12)。砂袋、粗隆捲軸預防髖外旋。","B":"含3(氣墊床)不符。","C":"含3、4不符。","D":"含4(床上護架)不符。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"112110-N2-34":{"quick":"痔瘡切除最適合「截刀式(俯臥屈髖)臥姿」。","detail":{"background":"接受「痔瘡切除術」最適合「截刀式臥姿(jackknife position,俯臥、臀部抬高、屈髖)」(C正確)——充分暴露肛門/直腸手術部位。屈膝仰臥、垂頭仰臥、膀胱截石位皆非痔瘡手術首選。故截刀式臥姿(C)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"屈膝仰臥用於腹部放鬆。","B":"垂頭仰臥用於休克。","C":"正確(本題答案)。痔瘡切除採截刀式臥姿。","D":"膀胱截石位用於陰道/會陰手術。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"112110-N2-35":{"quick":"側臥維持頭頸脊椎「一直線」非彎曲弧度;稱維持彎曲弧度為錯誤。","detail":{"background":"右側偏癱病人側臥擺位:A背部墊枕支持(對);C墊子保護外側足踝骨突防受壓(對);D胸前抱枕減輕胸部受壓(對)。選項B「維持病人頭、頸與脊椎呈『彎曲弧度』」錯誤——側臥時應維持「頭、頸與脊椎呈『一直線』(中立)」,避免脊椎側彎扭轉,故B為錯誤敘述(本題答案)。","options":{"A":"正確。背部墊枕支持。","B":"錯誤(本題答案)。側臥頭頸脊椎呈一直線,非彎曲弧度。","C":"正確。保護外側足踝骨突。","D":"正確。胸前抱枕減輕受壓。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"112110-N2-36":{"quick":"足托板底板高度應「與腳趾同高或略高」非比腳趾低;稱底板比腳趾低為錯誤。","detail":{"background":"足托板使用:A保持足部背側屈曲(踝90度,對);C足底要靠住底板(對);D維持踝關節呈90度(對)。選項B「足托板的底板高度要比腳趾低」錯誤——足托板底板高度應「與腳趾平或略高於腳趾」,使整個足底頂住底板維持踝90度;比腳趾低則足部無法頂住、達不到防垂足效果,故B為錯誤敘述(本題答案)。","options":{"A":"正確。保持足部背側屈曲(踝90度)。","B":"錯誤(本題答案)。底板應與腳趾平或略高,非比腳趾低。","C":"正確。足底靠住底板。","D":"正確。維持踝90度。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"113180-N2-8":{"quick":"兩腿外側粗隆捲軸從腰到膝固定,目的=預防髖關節外旋。","detail":{"background":"昏迷病人仰臥,於兩腿外側用「粗隆捲軸(trochanter roll)從腰部到膝蓋」固定支托,主要目的是「預防髖關節『外旋』(external rotation)」(A正確)——仰臥時下肢自然會外旋,粗隆捲軸抵住大轉子外側維持中立位。非預防伸展、內收、屈曲。故預防髖關節外旋(A)。","options":{"A":"正確(本題答案)。粗隆捲軸預防髖關節外旋。","B":"非預防伸展。","C":"非預防內收。","D":"非預防屈曲。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"113180-N2-23":{"quick":"維持良好姿勢:各臥姿關節應微彎曲、避免肌肉過度緊張。","detail":{"background":"維持良好姿勢原則:B「各種臥姿擺位,關節應『微彎曲(功能位置)』,避免肌肉過度緊張」正確。A臥於氣墊床「仍需翻身」(氣墊床減壓但不能取代翻身);C有多條管路「仍應穿適當衣物或妥善固定」非裸身以被蓋覆蓋;D全身癱瘓病人「應定時改變姿勢(側臥等)」非僅維持平躺。故B正確。","options":{"A":"氣墊床仍需翻身,非不需。","B":"正確(本題答案)。關節微彎避免肌肉過度緊張。","C":"有管路仍應穿衣或妥善固定。","D":"全癱者應定時改變姿勢,非僅平躺。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"114030-N2-19":{"quick":"俯臥式可預防髖部關節攣縮(伸展髖部)。","detail":{"background":"臥姿與目的:A「採俯臥式可預防髖部關節攣縮」正確——俯臥使髖關節「伸展」,可預防長期屈曲導致的髖屈曲攣縮。B屈膝仰臥「不能」改善子宮後傾經痛(膝胸臥才矯正子宮後傾);C「截刀式」用於痔瘡手術(非仰臥);D「膝胸臥」促進「子宮後傾矯正/產後復原」非下腹部感染局部化(半坐臥才利骨盆腔感染局部化)。故A正確。","options":{"A":"正確(本題答案)。俯臥伸展髖部,預防髖關節攣縮。","B":"子宮後傾經痛用膝胸臥,非屈膝仰臥。","C":"痔瘡切除採截刀式,非仰臥。","D":"下腹感染局部化用半坐臥,非膝胸臥。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"114030-N2-22":{"quick":"協助呼吸困難病人維持舒適姿勢的設備=床上桌(伏靠休息)。","detail":{"background":"能有效協助「呼吸困難」病人維持舒適姿勢的設備是「床上桌(over-bed table)」(B正確)——病人可前傾伏靠在床上桌上(端坐前傾位/三角架姿勢),使輔助呼吸肌作用、緩解呼吸困難。床上護架(撐被蓋)、氣墊床(防壓瘡)、蛋型床墊(防壓瘡)非緩解呼吸困難。故床上桌(B)。","options":{"A":"床上護架是撐起被蓋,非緩解呼吸困難。","B":"正確(本題答案)。床上桌讓病人前傾伏靠緩解呼吸困難。","C":"氣墊床是防壓瘡。","D":"蛋型床墊是防壓瘡。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"114100-N2-19":{"quick":"翻身擺位:側臥時加強肩部和髖部的皮膚護理。","detail":{"background":"翻身擺位:D「協助採側臥時須加強『肩部和髖部』的皮膚護理」正確(側臥肩峰、髖骨側為受壓處)。A每位臥床病人「至少每2小時」翻身一次非四小時;B仰臥膝膕放軟枕「易致膝屈曲攣縮、壓迫膕窩」、避免下滑應在足底用足托板;C側臥「應」在頸椎腰部墊軟枕維持脊椎平直、支托(非勿墊)。故D正確。","options":{"A":"至少每2小時翻身,非四小時。","B":"膝膕放枕易致膝攣縮,非避免下滑。","C":"側臥應墊軟枕支托維持脊椎平直。","D":"正確(本題答案)。側臥加強肩部髖部皮膚護理。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"114100-N2-22":{"quick":"腰椎穿刺後宜採「仰臥姿(去枕平躺)」。","detail":{"background":"腰椎穿刺(lumbar puncture)後應採「仰臥姿(去枕平躺)」並平躺6~8小時(B正確)——減少腦脊髓液由穿刺處滲漏、預防「姿勢性頭痛(穿刺後頭痛)」。俯臥、坐姿、側姿皆不如去枕平躺。故仰臥姿(B)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"俯臥不利腰椎穿刺後。","B":"正確(本題答案)。腰椎穿刺後採去枕仰臥平躺。","C":"坐姿會增加頭痛風險。","D":"側姿非標準腰椎穿刺後姿勢。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"114170-N2-19":{"quick":"「截刀式臥姿」需特別注意胸部受壓。","detail":{"background":"截刀式臥姿(jackknife/俯臥屈髖,臀部抬高):身體俯臥、頭與下肢低、臀部高,「胸部」承受身體重量,須特別注意「胸部受壓」(B正確)。膀胱截石位(會陰朝上)、垂頭仰臥(休克)、辛式臥(半俯臥)皆非胸部主要受壓。故截刀式臥姿(B)。臥位:仰臥受壓=枕骨肩胛薦骨足跟肘;側臥受壓=耳肩峰髖外踝;俯臥受壓=髂前上棘;粗隆捲軸防髖外旋、足托板維持踝90度防垂足、手捲軸防垂腕;翻身每2小時、圓滾木翻身用於脊椎、頭頸脊椎成一直線;膝胸臥矯正子宮後傾、辛氏臥利分泌物引流、坐臥緩解呼吸困難。","options":{"A":"膀胱截石位非胸部受壓。","B":"正確(本題答案)。截刀式臥姿胸部受壓。","C":"垂頭仰臥非胸部受壓。","D":"辛式臥姿非胸部主要受壓。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"115030-N2-19":{"quick":"翻身擺位:保持頭、頸與脊椎呈一直線。","detail":{"background":"翻身擺位原則:B「保持頭、頸與脊椎呈『一直線』」正確(維持脊椎中立、防扭傷)。A移動時「不可用手抓握病人肢體(易瘀傷)」應用手掌托住或用翻身單;C擺位時肢體「不可互相重疊」(重疊處受壓致壓瘡);D身體凹陷部位(腰、膝膕)應「給予支托」非懸空(懸空增肌肉緊張)。故B正確。","options":{"A":"不可用手抓握肢體,應托住或用翻身單。","B":"正確(本題答案)。頭頸脊椎呈一直線。","C":"肢體不可互相重疊(受壓)。","D":"凹陷部位應支托,非懸空。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"106030-N2-40":{"quick":"熱中暑「不」可保暖促進流汗(應降溫散熱);稱保暖促流汗為錯誤。","detail":{"background":"熱中暑救護:A移至陰涼處冷敷(對,降溫);B採平躺、抬高上半身(對);C限制活動充分休息(對)。選項D「予以保暖促進流汗」錯誤——熱中暑是「體溫過高、散熱失調」,應「積極降溫(脫衣、冷敷、吹風、補水)」,「保暖」會使體溫更高、惡化中暑,故D為錯誤敘述(本題答案)。","options":{"A":"正確。移至陰涼處冷敷。","B":"正確。平躺抬高上半身。","C":"正確。限制活動充分休息。","D":"錯誤(本題答案)。熱中暑應降溫,非保暖促流汗。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"111030-N2-39":{"quick":"「腦幹腫瘤」病人不會採端坐呼吸(端坐呼吸是心肺/腹水所致)。","detail":{"background":"端坐呼吸(orthopnea,平躺呼吸困難、坐起緩解)見於:A腹水(橫膈上抬)、B充血性心臟衰竭(肺鬱血)、C氣喘(支氣管阻塞)。選項D「腦幹腫瘤」病人「不會」採端坐呼吸(本題答案)——腦幹腫瘤影響的是「呼吸中樞調節(呼吸節律異常)」,非姿勢相關的端坐呼吸。故不會採端坐呼吸者為腦幹腫瘤(D)。","options":{"A":"腹水會致端坐呼吸。","B":"充血性心衰會致端坐呼吸。","C":"氣喘會致端坐呼吸。","D":"正確(本題答案)。腦幹腫瘤不會採端坐呼吸。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}},"101030-N2-55":{"quick":"短臂石膏後手部握緊放鬆運動目的=促進血循減腫(1)、預防前臂肌肉萎縮(2)→「12」。","detail":{"background":"腕骨折短臂石膏固定後做「手部握緊放鬆(等長/握拳)運動」目的:1促進血液循環、減輕腫脹(肌肉收縮幫助靜脈回流)、2預防前臂肌肉萎縮(維持肌力)。選項3「預防腕關節僵硬」——腕關節已被石膏固定無法活動,握拳運動「不能」維持腕關節活動度。故目的為「12」。","options":{"A":"含3(石膏固定腕無法活動)不符。","B":"含...不符。","C":"正確(本題答案,12)。促進血循減腫、預防肌肉萎縮。","D":"含3不符。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"101110-N2-42":{"quick":"右側肢體輕微收縮但無法移動關節=肌力「微弱(trace,1分)」。","detail":{"background":"徒手肌肉檢查(Manual Muscle Test)分級:0(無收縮)、1=微弱(trace,可觸及輕微肌肉收縮但無法移動關節)、2=不佳(poor,可移動但不能抗地心引力)、3=尚可(fair,可抗地心引力)、4=佳(good,可抗部分阻力)、5=正常。詹先生「右側肢體輕微收縮、無法移動關節」=「微弱(trace,1分)」(D正確)。故微弱(D)。","options":{"A":"佳(good)=可抗部分阻力。","B":"尚可(fair)=可抗地心引力。","C":"不佳(poor)=可移動不抗地心引力。","D":"正確(本題答案)。輕微收縮無法移動=微弱(trace)。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"101110-N2-43":{"quick":"肌力微弱(無法移動關節)適合「被動運動」。","detail":{"background":"詹先生肌力微弱(trace,無法自行移動關節),適合「被動運動(passive ROM)」(B正確)——由護理師完全協助移動關節,維持關節活動度、防攣縮。主動運動(需肌力3以上)、協助性主動(需部分肌力)、加阻力運動(需肌力4以上)皆需病人有一定肌力,不適合。故被動運動(B)。","options":{"A":"主動運動需肌力3以上。","B":"正確(本題答案)。肌力微弱適合被動運動。","C":"協助性主動需部分肌力。","D":"加阻力運動需肌力4以上。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"101110-N2-44":{"quick":"全關節運動:運動部位應「儘可能靠近(支托)」操作者,非遠離;稱遠離操作者為錯誤。","detail":{"background":"執行全關節運動:A每日做、每天2~3次(對);B可指導病人用健側幫患側做(對);C操作時關節前後予以支托(對)。選項D「應保持病人運動部位儘可能『遠離』操作者」錯誤——運動部位應「靠近操作者(護理師)」,使護理師重心靠近、省力且能穩固支托關節,故D為錯誤敘述(本題答案)。","options":{"A":"正確。每天做2~3次。","B":"正確。可用健側幫患側。","C":"正確。關節前後予以支托。","D":"錯誤(本題答案)。運動部位應靠近操作者,非遠離。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"102030-N2-50":{"quick":"被動性全關節活動:以手支托關節上下肢體,緩慢有節律活動。","detail":{"background":"被動性全關節活動護理:B「以手支托住病人的關節上下肢體,進行緩慢且有節律的活動」正確。A應「站在運動部位的『同側』」(非對側,便於支托省力);C病人「感到疼痛疲累應『停止』」非繼續(過度致傷);D每次活動時間「適度即可」非愈長愈好(避免疲勞)。故B正確。","options":{"A":"應站運動部位同側,非對側。","B":"正確(本題答案)。支托關節上下、緩慢有節律。","C":"疼痛疲累應停止,非繼續。","D":"時間適度即可,非愈長愈好。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"102110-N2-41":{"quick":"三點式步態行走時肩關節執行屈曲(2)、過度伸展(3)→「23」。","detail":{"background":"使用拐杖三點式步態行走時,雙臂前後擺動移動拐杖,肩關節執行的是「2屈曲(向前擺)、3過度伸展(向後擺/hyperextension)」(D,本題答案「23」)。外旋(1)、旋前(4)、外翻(5)非肩關節前後擺動的動作。故「23」(屈曲+過度伸展)。","options":{"A":"14(外旋外翻)不符。","B":"12(含外旋)不符。","C":"45不符。","D":"正確(本題答案,23)。肩關節屈曲與過度伸展。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"103030-N2-47":{"quick":"足托板幫助病人維持足部「背側屈曲(踝90度)」。","detail":{"background":"足托板(foot board)幫助病人維持足部「背側屈曲(dorsiflexion,踝關節90度中立位)」(C正確)——預防「垂足(足下垂、蹠屈攣縮)」。非背側外展、外旋、內收。故背側屈曲(C)。肌力分級:0無收縮、1微弱(trace,收縮無法移動關節→被動運動)、2不佳(poor,可移動不抗地心引力→協助性主動)、3尚可(fair,抗地心引力→主動)、4佳(good,抗部分阻力→加阻力)、5正常;等長運動=肌肉收縮關節不動(上石膏防萎縮)、等張運動=關節活動(維持活動度)。","options":{"A":"非背側外展。","B":"非背側外旋。","C":"正確(本題答案)。足托板維持足部背側屈曲(踝90度)。","D":"非背側內收。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"103100-N2-42":{"quick":"右橈骨骨折術後第一天「不」宜右手舉砂袋運動(加阻力過度);稱舉砂袋為最不適當。","detail":{"background":"右前臂橈骨骨折內固定術後第一天護理指導:A右手握緊放鬆運動(對,促血循防腫);B左手協助右手肘屈伸(對,被動);C左手協助右手舉高放下(對)。選項D「右手舉砂袋運動(加阻力)」最不適當——術後第一天骨折處尚未癒合,「加阻力運動」會對骨折/內固定處造成過度負荷,不適合,應做輕度被動/握拳運動,故D為最不適當(本題答案)。","options":{"A":"適當。握緊放鬆運動。","B":"適當。左手協助肘屈伸。","C":"適當。左手協助舉高放下。","D":"最不適當(本題答案)。術後第一天不宜右手舉砂袋(加阻力)。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"103100-N2-45":{"quick":"股四頭肌運動「不」是腳底踏床尾板向床尾推(那訓練其他肌群);稱腳底踏床尾推為錯誤。","detail":{"background":"增強股四頭肌(大腿前側)運動:A站立扶椅背墊腳尖(對,但偏小腿);B躺臥膝蓋用力壓向床墊(對,股四頭肌等長收縮);D站立腿往外伸展(對)。選項C「平躺時,腳底緊踏床尾板,用力向床尾推」錯誤——此動作主要訓練「小腿後側(腓腸肌)與推蹬」,非「股四頭肌(伸膝)」,故C為錯誤敘述(本題答案)。股四頭肌運動是「伸膝、壓膝向下」。","options":{"A":"墊腳尖偏小腿,但本題以C為錯誤。","B":"正確。膝蓋壓床墊是股四頭肌等長收縮。","C":"錯誤(本題答案)。腳底踏床尾推非股四頭肌運動。","D":"站立腿外展是相關運動。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"103100-N2-50":{"quick":"肌力1分(微弱)適合「被動性全關節運動」。","detail":{"background":"雙下肢肌力「1分(微弱,trace,僅輕微收縮無法移動關節)」,適合「被動性全關節運動」(A正確)——由他人完全協助移動關節維持活動度。加阻力(需4分以上)、協助性主動(需部分肌力)、主動性(需3分以上)皆需更多肌力。故被動性全關節運動(A)。","options":{"A":"正確(本題答案)。肌力1分適合被動性全關節運動。","B":"加阻力需肌力4分以上。","C":"協助性主動需部分肌力。","D":"主動性需肌力3分以上。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"103100-N2-53":{"quick":"等張運動可減緩關節僵硬、維持肌肉強度及大小。","detail":{"background":"活動種類:B「等張運動(isotonic,肌肉收縮、長度改變、關節活動,如走路舉重)可減緩關節僵硬、維持肌肉強度及大小」正確。A主動運動「不一定」增強肌力(維持活動度為主,加阻力才增肌力);C「伸手取水杯」是「等張運動(關節活動)」非等長;D「協助性主動運動」是病人主動+部分外力協助,非「完全依賴外力(那是被動)」。故B正確。","options":{"A":"主動運動主要維持活動度,增肌力需加阻力。","B":"正確(本題答案)。等張運動減緩關節僵硬、維持肌肉強度。","C":"伸手取水杯是等張運動,非等長。","D":"協助性主動是部分協助,非完全依賴外力。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"104030-N2-45":{"quick":"全膝置換術後股四頭肌運動=等長運動,保持肌力並促進局部血循。","detail":{"background":"全膝關節置換術後第一天股四頭肌運動:C「這是一種『等長運動』(肌肉收縮但關節不動),可以保持肌肉力量並促進局部血液循環」正確。A、D稱「等張運動」錯(股四頭肌等長收縮關節不動);B稱「被動運動」錯(是病人主動的等長收縮)。等長運動適合術後早期(不動關節、維持肌力、促血循防血栓)。故C正確。","options":{"A":"是等長非等張運動。","B":"是主動等長,非被動運動。","C":"正確(本題答案)。等長運動保持肌力並促進血循。","D":"是等長非等張運動。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"105090-N2-44":{"quick":"長腿石膏臥床,加強「坐在床上伸直手臂撐起」運動以利使用拐杖。","detail":{"background":"左下肢長腿石膏固定臥床,為未來使用拐杖行走,需加強「上肢(肩、臂、手腕)伸肌與三頭肌力量」。B「坐在床上伸直手臂做撐起(push-up)運動」最能訓練上肢支撐體重的肌力(B正確,模擬拐杖撐起動作)。肘屈伸、手心轉球、握桿向上皆不如撐起運動針對「支撐體重」。故撐起運動(B)。","options":{"A":"肘屈伸非訓練支撐體重。","B":"正確(本題答案)。坐床伸臂撐起訓練上肢支撐力。","C":"手心轉球非訓練支撐。","D":"握桿向上非主要訓練撐起。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"105090-N2-45":{"quick":"踝關節屈曲被動運動手部支托位置=足背、足後跟。","detail":{"background":"協助做「踝關節」屈曲被動運動,正確手部支托位置是「一手托『足後跟(腳跟)』、一手握『足背』」(D「足背、足後跟」正確)——穩定支托踝關節上下,進行踝的背屈/蹠屈。膝踝、小腿等非踝關節直接支托點。故足背、足後跟(D)。肌力分級:0無收縮、1微弱(trace,收縮無法移動關節→被動運動)、2不佳(poor,可移動不抗地心引力→協助性主動)、3尚可(fair,抗地心引力→主動)、4佳(good,抗部分阻力→加阻力)、5正常;等長運動=肌肉收縮關節不動(上石膏防萎縮)、等張運動=關節活動(維持活動度)。","options":{"A":"膝、踝非踝關節屈曲的支托點。","B":"足後跟、小腿支托膝/小腿,非踝屈曲。","C":"腳踝、小腿不夠精確。","D":"正確(本題答案)。踝屈曲支托足背、足後跟。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"105090-N2-50":{"quick":"長期臥床「不」會低血鈣(會高血鈣,骨鈣釋出);稱低血鈣為錯誤。","detail":{"background":"長期臥床導致的現象:A髖部外旋(對,下肢自然外旋)、B呼吸性酸中毒(對,呼吸淺、分泌物滯留CO2滯留)、D深層靜脈血栓(對,血流瘀滯)。選項C「低血鈣」錯誤——長期臥床「制動」使骨質流失、骨鈣釋入血,造成「高血鈣(及高尿鈣、易結石)」,非低血鈣,故C為錯誤敘述(本題答案)。","options":{"A":"正確。髖部外旋。","B":"正確。呼吸性酸中毒。","C":"錯誤(本題答案)。長期臥床致高血鈣,非低血鈣。","D":"正確。深層靜脈血栓。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"106030-N2-45":{"quick":"膝蓋下壓貼近床面的運動=等長運動。","detail":{"background":"教導病人「患側下肢膝蓋下壓貼近床面(壓膝)」的運動是「等長運動(isometric,股四頭肌收縮但膝關節不動)」(C正確)——維持肌力、促血循、防萎縮,適合術後/制動者。被動(他人動)、等張(關節會動)、加阻力(對抗外力)皆非。故等長運動(C)。","options":{"A":"被動運動是他人移動,非自主收縮。","B":"等張運動關節會動,壓膝關節不動。","C":"正確(本題答案)。壓膝貼床=等長運動。","D":"加阻力是對抗外力。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"106111-N2-48":{"quick":"等長運動「不」使肌肉收縮變短(長度不變);稱肌肉收縮變短為錯誤。","detail":{"background":"等張運動敘述:A促進血循、改善心肺功能(對);B維持關節活動度(對,關節會動);D走路騎車打籃球屬等張(對,關節活動)。選項C「肌肉收縮變短、張力與強度增強」——這是「等張運動」的特性?實際:等張運動肌肉「長度改變(縮短)、張力固定」;但本題C被列為「錯誤」,因把等長/等張混淆(等長是長度不變張力增)。依官方答案C為錯誤(等張運動的描述應為肌肉長度改變、關節活動)。核心:等張=長度變關節動、等長=長度不變關節不動。","options":{"A":"正確。等張運動促進血循改善心肺。","B":"正確。等張維持關節活動度。","C":"錯誤(本題答案)。此描述混淆等長/等張特性。","D":"正確。走路騎車打籃球屬等張。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"106111-N2-50":{"quick":"全關節運動:操作被動性運動時關節前後「需要支托」非不需;稱不需支托為錯誤。","detail":{"background":"全關節運動(ROM)注意:A每個關節達最大活動範圍(對);B運動量有個別差異、避免過度疲勞疼痛(對);C持續規律加強逐漸建立耐力(對)。選項D「操作被動性關節運動時,關節的前後『可不需支托』」錯誤——被動運動時必須「支托關節的上下(前後)肢體」以穩定關節、避免拉傷,故D為錯誤敘述(本題答案)。","options":{"A":"正確。每個關節達最大活動範圍。","B":"正確。避免過度疲勞疼痛。","C":"正確。逐漸建立運動耐力。","D":"錯誤(本題答案)。被動運動關節前後需支托。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"107030-N2-43":{"quick":"主動性肩部全關節運動「不」包括外翻(外翻是足/踝動作);稱外翻為答案。","detail":{"background":"肩關節的全關節運動包括:A過度伸展、B迴轉(環轉)、C舉肩(上舉/外展)、屈曲、伸展、內收、內外旋。選項D「外翻(eversion)」「不」是肩關節動作(本題答案)——外翻是「足/踝關節」的動作(腳掌外翻)。故肩部運動不包括外翻(D)。肌力分級:0無收縮、1微弱(trace,收縮無法移動關節→被動運動)、2不佳(poor,可移動不抗地心引力→協助性主動)、3尚可(fair,抗地心引力→主動)、4佳(good,抗部分阻力→加阻力)、5正常;等長運動=肌肉收縮關節不動(上石膏防萎縮)、等張運動=關節活動(維持活動度)。","options":{"A":"過度伸展是肩關節動作。","B":"迴轉是肩關節動作。","C":"舉肩是肩關節動作。","D":"正確(本題答案)。外翻是足踝動作,非肩關節。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"107030-N2-47":{"quick":"非快速動眼第四期減少「最不可能」因高血脂;老人/鎮靜劑/發燒會減少NREM4。","detail":{"background":"NREM第四期(深睡期、慢波睡眠)減少的原因:A老年人(深睡減少)、B服用鎮靜劑(改變睡眠結構、減少深睡)、C發燒(影響睡眠)——皆可減少NREM4。選項D「高血脂」「最不可能」影響NREM4(本題答案)——高血脂與睡眠深睡期減少無直接關聯。故最不可能為高血脂(D)。","options":{"A":"老年人NREM4減少。","B":"鎮靜劑減少NREM4。","C":"發燒影響睡眠減少NREM4。","D":"正確(本題答案)。高血脂最不可能影響NREM4。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"107110-N2-43":{"quick":"「腿伸直膝蓋向下壓」只促進血循強化肌力、不維持關節活動(等長運動)。","detail":{"background":"只能「促進血液循環、強化肌肉力量,但不能維持關節活動功能」的是「等長運動(isometric,關節不動)」。選項A「腿部伸直,膝蓋用力向下壓5~10下」是等長運動(膝關節不動、股四頭肌收縮)(A正確)。B騎腳踏車、C慢跑、D游泳皆是「等張運動(關節活動、可維持關節活動度)」。故A(等長運動)。","options":{"A":"正確(本題答案)。壓膝是等長運動,不維持關節活動。","B":"騎車是等張運動,維持關節活動。","C":"慢跑是等張運動。","D":"游泳是等張運動。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"108020-N2-46":{"quick":"左偏癱肌力0分髖關節被動外展:一手托腳跟、一手托膝下,水平往外移。","detail":{"background":"左偏癱肌力0分(完全癱),做髖關節「被動」運動:B「一手托住腳後跟、一手置於膝下,把腿伸直托高,依水平方向往外移動,做『外展』動作」正確(支托膝與踝、緩慢被動外展)。A「朝頭部方向曲膝屈曲」是髖屈曲非外展描述混亂;C「足背向下按壓做踝過度伸展」是踝非髖;D「膝上用力向下壓做阻力運動」是加阻力(癱瘓者不適用)。故B正確。","options":{"A":"朝頭部曲膝是髖屈曲,描述混亂。","B":"正確(本題答案)。托腳跟與膝下、水平外移做外展。","C":"足背按壓是踝動作,非髖。","D":"加阻力運動不適用肌力0分。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"108110-N2-13":{"quick":"全髖置換術後股四頭肌等長運動目的「不」包括增加肌肉質塊;目的是減腫、防血栓、維持肌力。","detail":{"background":"全髖關節置換術後第一天股四頭肌「等長收縮運動」的目的:A減輕局部腫脹(促血循)、B預防深部血栓(肌肉收縮幫助靜脈回流)、D維持肌肉力量——皆是。選項C「增加肌肉質塊(hypertrophy)」「不」是術後第一天等長運動的目的(本題答案)——增加肌肉質塊需「漸進式阻力訓練」長期執行,術後早期等長運動是「維持肌力、防萎縮血栓」非增大肌肉。故不包括增加肌肉質塊(C)。","options":{"A":"是目的。減輕局部腫脹。","B":"是目的。預防深部血栓。","C":"正確(本題答案)。增加肌肉質塊非術後早期等長運動目的。","D":"是目的。維持肌肉力量。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"108110-N2-45":{"quick":"肌力「不佳(poor,2分)」適合「協助性主動運動」。","detail":{"background":"徒手肌肉測試「不佳(poor,2分,可移動關節但不能抗地心引力)」,最適當的運動是「協助性主動運動(active-assistive ROM)」(C正確)——病人主動出力+護理師部分協助(對抗地心引力部分)。被動(肌力0~1)、主動(肌力3,可抗地心引力)、加阻力(肌力4以上)皆不符。故協助性主動運動(C)。","options":{"A":"主動運動需肌力3(可抗地心引力)。","B":"被動運動用於肌力0~1。","C":"正確(本題答案)。肌力不佳(2分)適合協助性主動運動。","D":"加阻力需肌力4以上。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"108110-N2-46":{"quick":"預防長期臥床肌肉萎縮=協助全關節活動。","detail":{"background":"預防長期臥床「肌肉萎縮」最有效是「協助全關節活動(ROM運動)」(D正確)——主動/被動活動關節與肌肉,維持肌力與關節活動度、防萎縮攣縮。協助舒適臥位、每2小時翻身(防壓瘡)、床上沐浴(清潔)非預防肌肉萎縮。故全關節活動(D)。肌力分級:0無收縮、1微弱(trace,收縮無法移動關節→被動運動)、2不佳(poor,可移動不抗地心引力→協助性主動)、3尚可(fair,抗地心引力→主動)、4佳(good,抗部分阻力→加阻力)、5正常;等長運動=肌肉收縮關節不動(上石膏防萎縮)、等張運動=關節活動(維持活動度)。","options":{"A":"舒適臥位非預防肌肉萎縮。","B":"翻身是預防壓瘡。","C":"床上沐浴是清潔。","D":"正確(本題答案)。全關節活動預防肌肉萎縮。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"108110-N2-47":{"quick":"等張運動可增加肌肉強度及張力。","detail":{"background":"等張運動(isotonic):B「可增加肌肉強度及張力」正確(肌肉收縮、長度改變、關節活動,如舉重走路)。A「又稱肌肉固定運動」是「等長運動」;C「關節角度不會改變」是「等長運動」;D「上石膏肢體建議活動」是「等長運動」(石膏固定關節不能動)。故B正確。","options":{"A":"肌肉固定運動是等長運動。","B":"正確(本題答案)。等張運動增加肌肉強度及張力。","C":"關節角度不變是等長運動。","D":"上石膏建議等長運動(關節不能動)。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"109110-N2-42":{"quick":"左側肢體輕微收縮無法移動關節=肌力「微弱(trace)」。","detail":{"background":"徒手肌肉檢查:左側肢體「輕微收縮但無法移動關節」=肌力「微弱(trace,1分)」(D正確)。佳(good,4分,抗部分阻力)、尚可(fair,3分,抗地心引力)、不佳(poor,2分,可移動不抗地心引力)皆需能移動關節。故微弱(D)。肌力分級:0無收縮、1微弱(trace,收縮無法移動關節→被動運動)、2不佳(poor,可移動不抗地心引力→協助性主動)、3尚可(fair,抗地心引力→主動)、4佳(good,抗部分阻力→加阻力)、5正常;等長運動=肌肉收縮關節不動(上石膏防萎縮)、等張運動=關節活動(維持活動度)。","options":{"A":"佳(good)抗部分阻力。","B":"尚可(fair)抗地心引力。","C":"不佳(poor)可移動關節。","D":"正確(本題答案)。輕微收縮無法移動=微弱(trace)。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"109110-N2-43":{"quick":"右肱骨骨折石膏固定後「不」宜右肩關節水平內收(超出範圍/牽動骨折);稱右肩水平內收為最不適當。","detail":{"background":"近端右肱骨骨折石膏固定後運動:A右前臂旋前旋後(對,遠端關節);B右手指屈曲伸展(對);C右手腕過度伸展(對,遠端)。選項D「右肩關節水平內收」最不適當——肩關節鄰近肱骨骨折處,「肩關節大幅活動(水平內收)」會牽動骨折/影響癒合,術後早期應避免肩大動作,先動遠端(手指手腕前臂),故D為最不適當(本題答案)。","options":{"A":"適當。前臂旋前旋後(遠端)。","B":"適當。手指屈曲伸展。","C":"適當。手腕過度伸展(遠端)。","D":"最不適當(本題答案)。右肩水平內收牽動肱骨骨折。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"110030-N2-46":{"quick":"等長運動「肌肉長度與關節角度『不』改變」;稱長度與角度改變為錯誤。","detail":{"background":"等長運動(isometric):A是靜態運動、又稱肌肉固定運動(對);C上石膏病人患肢用等長運動防萎縮(對);D屬主動性運動(對,病人自主收縮)。選項B「運動時,肌肉長度與關節角度『改變』,可增強肌肉緊張度」錯誤——等長運動「肌肉長度與關節角度『不改變』(固定)」,只增加肌肉張力,故B為錯誤敘述(本題答案)。","options":{"A":"正確。靜態運動、肌肉固定運動。","B":"錯誤(本題答案)。等長運動長度與關節角度不變,非改變。","C":"正確。上石膏患肢用等長運動。","D":"正確。屬主動性運動。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"110110-N2-9":{"quick":"髖關節全關節運動「不」包括旋前(旋前是前臂動作);稱旋前為答案。","detail":{"background":"髖關節的全關節運動包括:B屈曲、C外展、D內收、伸展、內旋、外旋、迴轉。選項A「旋前(pronation)」「不」是髖關節動作(本題答案)——旋前/旋後是「前臂(橈尺關節)」的動作。故髖關節不包括旋前(A)。肌力分級:0無收縮、1微弱(trace,收縮無法移動關節→被動運動)、2不佳(poor,可移動不抗地心引力→協助性主動)、3尚可(fair,抗地心引力→主動)、4佳(good,抗部分阻力→加阻力)、5正常;等長運動=肌肉收縮關節不動(上石膏防萎縮)、等張運動=關節活動(維持活動度)。","options":{"A":"正確(本題答案)。旋前是前臂動作,非髖關節。","B":"屈曲是髖關節動作。","C":"外展是髖關節動作。","D":"內收是髖關節動作。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"111110-N2-46":{"quick":"長期仰臥髖關節最易發生「外旋」。","detail":{"background":"長期仰臥若未採預防措施,下肢因重力自然「向外轉」,髖關節最易發生「外旋(external rotation)」(A正確)——故需用「粗隆捲軸」抵住大轉子外側預防。非外展、內旋、內翻。故外旋(A)。肌力分級:0無收縮、1微弱(trace,收縮無法移動關節→被動運動)、2不佳(poor,可移動不抗地心引力→協助性主動)、3尚可(fair,抗地心引力→主動)、4佳(good,抗部分阻力→加阻力)、5正常;等長運動=肌肉收縮關節不動(上石膏防萎縮)、等張運動=關節活動(維持活動度)。","options":{"A":"正確(本題答案)。長期仰臥髖關節最易外旋。","B":"非外展。","C":"非內旋。","D":"內翻是足踝動作。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"111110-N2-47":{"quick":"腕關節過度伸展=彎曲腕部使手背朝向前臂外側(背側)。","detail":{"background":"腕關節「過度伸展(hyperextension)」=手腕向「背側(手背側)」彎曲超過中立位,使手背朝向前臂背側/外側(A正確)。B「掌心朝前臂內側」是腕屈曲;C「伸直彎曲的腕部」是伸展(回中立);D「向拇指側彎」是橈側偏。故過度伸展=手背朝前臂外側(A)。","options":{"A":"正確(本題答案)。腕過度伸展=手背朝前臂外側(背側彎)。","B":"掌心朝內是腕屈曲。","C":"伸直回中立是伸展。","D":"向拇指側彎是橈側偏。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"112030-N2-48":{"quick":"皮膚牽引避免血栓性靜脈炎,可教等長運動。","detail":{"background":"右下肢皮膚牽引(肢體須固定不能大幅活動),為避免「血栓性靜脈炎(深層靜脈血栓)」,可教導「等長運動(isometric,肌肉收縮關節不動,如股四頭肌收縮、踝幫浦)」(D正確)——促進靜脈回流、防血栓,且不影響牽引固定。等張、被動、加阻力會移動關節/影響牽引。故等長運動(D)。","options":{"A":"等張運動會移動關節,影響牽引。","B":"被動運動會移動牽引肢。","C":"加阻力會影響牽引。","D":"正確(本題答案)。皮膚牽引教等長運動防血栓。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"112110-N2-48":{"quick":"Lovett量表肌力1=微弱(trace,僅輕微收縮)。","detail":{"background":"拉維特式量表(Lovett’s Scale)肌力分級:0(零)、1=微弱(trace,可觸及肌肉輕微收縮、無法移動關節)、2=差(poor,不抗地心引力)、3=尚可(fair,抗地心引力)、4=良(good,抗部分阻力)、5=正常。肌力「1」=「微弱(trace)」(A正確)。B「可抗地心引力無法抗阻力」是3分;C「肌力50%」約3分;D「協助性主動」用於2分。故微弱(A)。","options":{"A":"正確(本題答案)。Lovett肌力1=微弱(trace)。","B":"抗地心引力是3分。","C":"肌力50%約3分。","D":"協助性主動用於2分。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"112180-N2-26":{"quick":"肌肉完全失去活動每天約失去3%強度。","detail":{"background":"長期臥床對肌肉骨骼:B「若肌肉完全失去活動,每天將失去約3%的強度(肌力)」正確(制動致肌肉萎縮)。A關節內組織被「纖維結締組織」取代非上皮組織;C制動使「鈣『流出』骨骼→『高』血鈣(及骨質疏鬆)」非鈣進入骨致低血鈣;D臥床「減少」負重→「破骨細胞活性大於成骨細胞」致骨流失(D前半「骨骼增加負重」錯)。故B正確。","options":{"A":"關節組織被纖維結締組織取代,非上皮。","B":"正確(本題答案)。肌肉完全不活動每天失約3%強度。","C":"制動致高血鈣(鈣流出骨),非低血鈣。","D":"臥床減少負重,「增加負重」敘述錯。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"113030-N2-31":{"quick":"右手上石膏固定防肌肉萎縮應做「等長運動」。","detail":{"background":"右手上石膏固定(關節不能動),為避免「肌肉萎縮」,應教導「等長運動(isometric,肌肉收縮但關節不動,如握拳、肌肉繃緊放鬆)」(B正確)——維持肌力防萎縮,且不影響石膏固定。被動全關節、加阻力、等張運動皆需移動關節(石膏固定無法做)。故等長運動(B)。","options":{"A":"被動全關節需移動關節,石膏無法。","B":"正確(本題答案)。石膏固定防肌肉萎縮做等長運動。","C":"加阻力需移動關節。","D":"等張運動需移動關節。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"113100-N2-29":{"quick":"長期臥床生理現象=髖部關節外旋(1)、血液黏稠度增加(3)→「13」。","detail":{"background":"長期臥床不動的生理現象:1髖部關節外旋(下肢重力外轉)、3血液黏稠度增加(脫水/血流瘀滯→易血栓)。選項2「肺部分泌物『減少』」錯(臥床致分泌物『滯留增加』、易肺炎);4「膀胱餘尿『減少』」錯(臥床排尿不順、餘尿『增加』、易感染結石)。故為「13」。","options":{"A":"含2(分泌物減少)錯。","B":"正確(本題答案,13)。髖外旋、血液黏稠度增加。","C":"含2不符。","D":"含4(餘尿減少)錯。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"113100-N2-30":{"quick":"全關節活動:旋前使前臂旋轉、掌心朝下。","detail":{"background":"全關節活動型態:C「旋前(pronation)使前臂旋轉、掌心朝下」正確。A「伸展(extension)」是使肢體間角度『變大』、移離身體中線(非移向中線,移向中線是內收);B「屈曲(flexion)」使肢體間角度『變小』(非變大);D「內翻(inversion)」是足底朝內(非手腕朝拇指,朝拇指是橈側偏)。故C正確。","options":{"A":"伸展是角度變大/移離中線,非移向中線。","B":"屈曲使角度變小,非變大。","C":"正確(本題答案)。旋前使前臂掌心朝下。","D":"內翻是足底朝內,非手腕朝拇指。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"113180-N2-28":{"quick":"右側肢體全關節運動:執行時站在病人的右側(患側)。","detail":{"background":"指導家屬為右側肢體無力病人執行「右側肢體全關節運動」:B「執行時要站在病人的『右側(患側)』」正確(靠近運動部位、便於支托省力)。A應「靠近病人」非遠離;C應「每天做2~3次」非每隔2天;D應「先由近心端關節漸向遠心端」?——一般ROM「由近端到遠端」或依序,但本題以B為正解。故站在患側(B)。","options":{"A":"應靠近病人,非遠離。","B":"正確(本題答案)。執行時站在患側(右側)。","C":"應每天2~3次,非每隔2天。","D":"操作順序敘述非本題正解(正解B)。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"114100-N2-29":{"quick":"髖關節運動「不」包括旋前(旋前是前臂動作);稱旋前為答案。","detail":{"background":"髖關節的活動類型:A外展、B內旋、D迴轉、屈曲伸展內收外旋——皆是。選項C「旋前(pronation)」「不」是髖關節動作(本題答案)——旋前是「前臂」的動作。故髖關節不包括旋前(C)。肌力分級:0無收縮、1微弱(trace,收縮無法移動關節→被動運動)、2不佳(poor,可移動不抗地心引力→協助性主動)、3尚可(fair,抗地心引力→主動)、4佳(good,抗部分阻力→加阻力)、5正常;等長運動=肌肉收縮關節不動(上石膏防萎縮)、等張運動=關節活動(維持活動度)。","options":{"A":"外展是髖關節動作。","B":"內旋是髖關節動作。","C":"正確(本題答案)。旋前是前臂動作,非髖關節。","D":"迴轉是髖關節動作。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"114100-N2-31":{"quick":"左脛骨骨折石膏固定等長運動=靜態肌肉收縮,可預防肌肉萎縮。","detail":{"background":"左小腿脛骨骨折石膏固定後「等長運動」:C「是一種靜態的肌肉收縮運動,可預防肌肉萎縮」正確(關節不動、肌肉收縮維持肌力)。A「肌肉張力不變」錯(等長是『長度不變、張力增』);B「被動運動」錯(等長是病人主動收縮);D「彎曲膝關節」錯(石膏固定關節不動,等長不彎關節)。故C正確。","options":{"A":"等長是長度不變、張力增,非張力不變。","B":"等長是主動收縮,非被動。","C":"正確(本題答案)。等長是靜態肌肉收縮,預防萎縮。","D":"石膏固定不彎膝關節。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"114170-N2-33":{"quick":"左側肢體輕微收縮關節無法活動=適合「被動運動」。","detail":{"background":"腦腫瘤病人左側肢體「輕微收縮但關節無法活動」=肌力「微弱(trace,1分)」,最適合「被動運動(passive ROM)」(A正確)——由他人完全協助移動關節維持活動度防攣縮。協助性主動(肌力2)、主動(肌力3)、加阻力(肌力4以上)皆需更多肌力。故被動運動(A)。","options":{"A":"正確(本題答案)。肌力微弱適合被動運動。","B":"協助性主動需肌力2。","C":"主動運動需肌力3。","D":"加阻力需肌力4以上。"},"sources":["新文京《基本護理學》活動與運動","華杏《最新基本護理學》關節運動與肌力"]}},"103030-N2-50":{"quick":"約束鬆緊度以能伸入「1~2根手指」非3~5根;稱3~5根為錯誤。","detail":{"background":"約束法:A必須依醫囑執行(對);B使用前向病人家屬解釋目的用法(對);D每15~30分鐘觀察末梢循環、每2小時鬆開一次(對)。選項C「約束時,鬆緊度以能伸入3~5根手指為原則」錯誤——約束帶鬆緊度以「能伸入1~2根手指」為原則(太鬆無效、太緊影響血循),3~5根太鬆,故C為錯誤敘述(本題答案)。","options":{"A":"正確。約束須依醫囑。","B":"正確。使用前解釋目的用法。","C":"錯誤(本題答案)。鬆緊度以伸入1~2根手指,非3~5根。","D":"正確。每15~30分觀察、每2小時鬆開。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"103100-N2-39":{"quick":"約束原則:鬆緊伸入1~2指(1)、棉墊保護再綁(2)、向家屬解釋(3)→「123」。本題答案A=124。","detail":{"background":"本題官方答案「124」。半側偏癱自拔管路約束原則:1約束鬆緊度以能伸入1~2根手指為原則(對)、2手腕先以棉墊保護再綁約束帶(對,防皮膚損傷)、4(相關正確項,如每2小時鬆開/觀察末梢)。選項3「向家屬解釋」雖正確但本題官方組合為「124」。核心:約束依醫囑、棉墊保護、1~2指鬆緊、定時鬆開觀察循環。","options":{"A":"正確(本題答案,124)。1~2指鬆緊、棉墊保護等。","B":"123組合與官方124不同。","C":"含...不符。","D":"含...不符。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"103100-N2-46":{"quick":"C.T.M.S.的「T」代表「溫度(Temperature)」非觀察時間;稱T代表時間為錯誤。","detail":{"background":"約束病人評估末梢循環的C.T.M.S.原則:A「C」=Color肢體顏色(對)、C「M」=Motion/Movement肢體活動(對)、D「S」=Sensation肢體感覺(對)。選項B「T代表肢體的『觀察時間』」錯誤——「T」=「Temperature(溫度,摸肢體末梢溫度)」,非觀察時間,故B為錯誤敘述(本題答案)。","options":{"A":"正確。C代表顏色。","B":"錯誤(本題答案)。T代表溫度,非觀察時間。","C":"正確。M代表活動。","D":"正確。S代表感覺。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"105090-N2-33":{"quick":"約束帶必須有醫囑才可執行。","detail":{"background":"使用約束帶注意:A「必須有醫囑才可以執行」正確(約束是限制人身自由的醫療行為,須醫囑)。B應以「活結(可快速解開)」固定於「床架(固定不可移動處)」非平結綁床欄(平結難快速解、床欄可移動);C約束時肢體應「保持功能位置(微彎)」非完全伸直;D鬆緊度以「能伸入1~2指」非手指無法伸入(太緊)。故A正確。","options":{"A":"正確(本題答案)。約束必須有醫囑。","B":"應用活結固定於床架,非平結綁床欄。","C":"肢體應保持功能位置,非完全伸直。","D":"鬆緊以伸入1~2指,非手指無法伸入。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"106110-N2-46":{"quick":"C.T.M.S.的「S」代表「感覺(Sensation)」非心理感受;稱S代表心理感受為錯誤。","detail":{"background":"約束評估C.T.M.S.:A「C」=顏色(對)、B「T」=溫度(對)、C「M」=活動能力Motion(對)。選項D「S代表『心理』的感受」錯誤——「S」=「Sensation(肢體『感覺』,評估麻木刺痛等末梢神經感覺)」,非心理感受,故D為錯誤敘述(本題答案)。","options":{"A":"正確。C代表顏色。","B":"正確。T代表溫度。","C":"正確。M代表活動能力。","D":"錯誤(本題答案)。S代表肢體感覺,非心理感受。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"106111-N2-55":{"quick":"直腸癌末期譫妄躁動「最不適當」=約束四肢(應先找原因/環境調整);稱約束四肢為最不適當。","detail":{"background":"直腸癌末期譫妄、躁動、拔氧氣管:A床欄旁增加護墊避免受傷(適當);B評估排除引發譫妄的因素(適當,首要);D與醫師討論鎮靜藥物(適當)。選項C「約束病人四肢,避免跌落」最不適當——譫妄躁動「約束」可能「加重躁動、增加傷害與痛苦」,應先「找出並排除譫妄原因、環境安全措施、必要時藥物」,約束是最後手段(且末期病人尤應避免),故C為最不適當(本題答案)。","options":{"A":"適當。床欄增加護墊避免受傷。","B":"適當。評估排除譫妄因素。","C":"最不適當(本題答案)。譫妄躁動約束會加重,非首選。","D":"適當。與醫師討論鎮靜藥物。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"107030-N2-48":{"quick":"中風意識不清拔管:約束時應每2小時鬆開一次並改變姿勢。","detail":{"background":"中風意識不清自拔管路約束:D「約束時應每2小時鬆開一次並改變病人姿勢」正確(觀察末梢循環、活動肢體、防壓瘡)。A「再拔就約束」是威脅語句不當;B約束雖依醫囑但「仍須告知家屬/取得同意」(B「不需家屬同意書」不妥);C將雙手約束「在床欄(可移動處)」不當(應固定於床架不可移動處)。故D正確。","options":{"A":"不可用威脅語句。","B":"約束仍須告知家屬,非不需同意。","C":"不可約束於床欄(可移動),應固定床架。","D":"正確(本題答案)。每2小時鬆開並改變姿勢。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"107110-N2-5":{"quick":"病人躁動時給予約束「不」屬護理獨立功能(約束需醫囑=依賴性);稱約束為答案。","detail":{"background":"護理「獨立功能」(自主、不需醫囑):A教導照服員胃造口照護(衛教)、B觀察病人服藥後反應(評估)、D評估病人自我照顧能力(評估)——皆屬獨立功能。選項C「病人躁動時給予約束」「不」屬獨立功能(本題答案)——約束須「依醫囑(依賴性功能)」執行,非護理師可自主決定。故不屬獨立功能者為約束(C)。","options":{"A":"教導照服員是獨立功能(衛教)。","B":"觀察服藥反應是獨立功能(評估)。","C":"正確(本題答案)。約束需醫囑,非獨立功能。","D":"評估自我照顧是獨立功能。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"108110-N2-12":{"quick":"C.T.M.S.的「M」代表「活動能力(Motion)」。","detail":{"background":"約束評估C.T.M.S.原則:C「M代表『活動能力(Motion/Movement)』」正確。A「C」=Color(顏色)非血液循環(雖反映循環,但C字義是顏色);B「T」=Temperature(溫度)非時間;D「S」=Sensation(感覺)非敏感度(語意接近但標準是感覺)。本題以C(M=活動能力)為正確。故M=活動能力(C)。","options":{"A":"C是顏色(Color),反映循環但字義是顏色。","B":"T是溫度,非時間。","C":"正確(本題答案)。M代表活動能力。","D":"S是感覺(Sensation)。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"110110-N2-49":{"quick":"約束「不」可先約束再補家屬同意?本題答案A為錯誤(應先取得醫囑/同意);稱可先約束後補同意為錯誤。","detail":{"background":"陳先生術後躁動拔管約束:B約束帶鬆緊以伸入1~2指(對);C約束部位先以棉墊包裹再用平結(對);D約束帶勿固定於可移動設備(對,應固定床架)。選項A「如家屬無法立即聯絡,可先進行約束,隨後再取得家屬同意」——本題列為「錯誤」(約束須有醫囑,且應盡量先取得知情同意;惟緊急保護病人安全時可先約束後補,各教材立場不一,本題官方判A錯誤)。核心:約束須醫囑、知情同意、棉墊保護、1~2指、固定床架、定時鬆開。","options":{"A":"錯誤(本題答案)。本題認為不可先約束後補同意(須醫囑/知情)。","B":"正確。鬆緊伸入1~2指。","C":"正確。棉墊包裹再用平結。","D":"正確。勿固定於可移動設備。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"112180-N2-30":{"quick":"約束目的=預防意識不清病人因拉扯動作傷害自己。","detail":{"background":"使用約束法的目的是「預防意識不清/躁動病人因拉扯動作(拔管、抓傷)傷害自己或他人、維護治療安全」(C正確)。約束「不能」促進體力恢復(A)、不能增強肌力促血循(B,反而致肌肉萎縮)、絕「非」處罰病人(D,約束不可作為處罰)。故預防傷害自己(C)。","options":{"A":"約束不能促進體力恢復。","B":"約束反致肌肉萎縮,非增強肌力。","C":"正確(本題答案)。預防意識不清病人拉扯傷害自己。","D":"約束絕非處罰病人。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"113030-N2-23":{"quick":"約束「不」屬護理獨立性功能(需醫囑=依賴性);稱屬獨立性功能為錯誤。","detail":{"background":"約束病人注意事項:A手腕先以棉墊保護再綁(對);C約束帶以平結固定在床架上(對,可快速解);D每15~30分鐘觀察末梢循環(對)。選項B「約束屬護理的獨立性功能」錯誤——約束是限制人身自由的醫療行為,「必須依醫囑」執行,屬「依賴性(非獨立性)功能」,故B為錯誤敘述(本題答案)。","options":{"A":"正確。棉墊保護再綁。","B":"錯誤(本題答案)。約束需醫囑,屬依賴性非獨立性功能。","C":"正確。平結固定床架。","D":"正確。每15~30分觀察末梢循環。"},"sources":["新文京《基本護理學》約束","華杏《最新基本護理學》保護性約束"]}},"101110-N2-80":{"quick":"病患無家屬下床跌倒:立即評估意識受傷情形並拉紅燈求救。","detail":{"background":"病患跌倒時護理師應「立即評估病患意識、受傷情形,並拉紅燈(緊急鈴)求救」(A正確)——先評估傷勢、確保安全、求援,不可貿然移動。B給藥、C回護理站找人、D找家屬皆非立即優先(延誤評估與求救)。故立即評估並求救(A)。病人安全:跌倒高危=老人幼兒虛弱用藥(利尿/降壓/瀉劑/鎮靜)者;放低床面、用床欄呼叫鈴、夜間照明、防滑、浴廁樓梯是常見跌倒地點;定向障礙/失智者安置靠近護理站防走失;跌倒處置先評估意識傷勢並求救。","options":{"A":"正確(本題答案)。立即評估意識受傷並拉紅燈求救。","B":"非先給藥。","C":"回護理站延誤,應就地求救。","D":"找家屬延誤評估。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"104100-N2-1":{"quick":"人工髖關節置換高跌倒個案「不」應約束限制下床(應評估協助活動);稱約束限制下床為錯誤。","detail":{"background":"股骨頸骨折人工髖關節置換病人安全:B隨時評估翻身活動行走能力、適時協助(對);C夜間走道加強照明、保持乾燥(對);D放低床高、使用床欄(對)。選項A「許奶奶為高危險性跌倒個案,應予以約束並限制下床活動」錯誤——約束會致關節僵硬、肌肉萎縮、譫妄,且髖置換術後應「漸進活動復健」非限制下床;預防跌倒靠環境與協助,非約束,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。不應約束限制下床,應評估協助活動。","B":"正確。評估活動能力適時協助。","C":"正確。夜間照明乾燥。","D":"正確。放低床高、用床欄。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"104100-N2-5":{"quick":"支氣管炎/氣喘病人濕度宜「40~60%」非80~90%;稱80~90%為錯誤。","detail":{"background":"舒適病房環境:A青光眼術後光線稍暗(對);C躁症攻擊行為布置藍綠色系(對,鎮靜);D燒燙傷病房室溫較高(失水保溫)?——燒傷室溫應「較高」維持體溫,選項D稱「較低」也須斟酌,但本題答案為B。選項B「支氣管炎及氣喘病人濕度維持在80~90%」錯誤——一般病室與呼吸道病人適宜濕度約「50~60%(40~60%)」;80~90%過高、悶濕利黴菌塵蟎、不利呼吸,故B為錯誤敘述(本題答案)。","options":{"A":"正確。青光眼術後光線稍暗。","B":"錯誤(本題答案)。氣喘病人濕度宜40~60%,非80~90%。","C":"正確。躁症布置藍綠色系。","D":"燒燙傷室溫考量,本題以B為錯誤。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"106030-N2-6":{"quick":"右偏癱安全:床面「不」需搖高避免下床(應放低床、用床欄);稱搖高床面為錯誤。","detail":{"background":"中風右偏癱病人安全:A常用物品置「左側(健側)」易拿(對);C浴室放止滑墊與固定洗澡椅(對);D臥床隨時拉起床欄(對)。選項B「床面需要搖高避免病人自行下床」錯誤——應「放低床面」減少跌落高度與傷害(不是搖高),預防跌倒靠床欄、呼叫鈴、協助,非搖高床面(搖高反增跌落傷害),故B為錯誤敘述(本題答案)。","options":{"A":"正確。常用物品置健側左側。","B":"錯誤(本題答案)。應放低床面,非搖高。","C":"正確。浴室止滑墊固定洗澡椅。","D":"正確。臥床拉起床欄。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"106110-N2-37":{"quick":"機械性傷害:定向感障礙者宜安置在靠近護理站。","detail":{"background":"醫療環境機械性傷害(跌倒等):C「定向感障礙者宜安置在靠近護理站(便於觀察照護)」正確。A跌倒高危群是「老人、幼兒、虛弱、用藥者」非「婦女」;B跌倒常發生在「夜間、如廁時」非正中午;D臥床病人應「放低床面」非升高(升高增跌落傷害)。故C正確。","options":{"A":"高危群是老人幼兒虛弱者,非婦女。","B":"跌倒常在夜間如廁,非正中午。","C":"正確(本題答案)。定向障礙者安置靠近護理站。","D":"臥床應放低床面,非升高。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"108020-N2-6":{"quick":"預防住院老人走失最適切=安排距護理站最近的病房。","detail":{"background":"預防住院老人(失智/定向障礙)走失最適切措施是「將病人安排在距護理站最近的病房(便於隨時觀察)」(D正確)。A「鎖門」違反病人安全/消防法規(不可);B「給抗焦慮劑」非預防走失正解(且增跌倒);C「提供聽視覺刺激」是預防譫妄非防走失。故安排靠護理站(D)。","options":{"A":"鎖門違反安全消防,不可。","B":"抗焦慮劑非防走失正解。","C":"聽視覺刺激是預防譫妄。","D":"正確(本題答案)。安排距護理站最近病房防走失。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"108110-N2-15":{"quick":"防跌倒:上下床「不」應將床面升高到家屬腰部(應放低床);稱升高到腰部為錯誤。","detail":{"background":"預防中風左側無力老人跌倒:B便盆椅不用時勿置病床邊(防絆倒,對);C漸進式下床(坐起→床邊站立,對);D穿防滑鞋(對)。選項A「協助上下床時,需將床面升高到家屬的腰部」錯誤——上下床時應「放低床面(降低高度)」方便病人雙腳著地、減少跌落傷害;升高床面增加跌落風險,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。上下床應放低床面,非升高到腰部。","B":"正確。便盆椅勿置床邊。","C":"正確。漸進式下床。","D":"正確。穿防滑鞋。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"109030-N2-18":{"quick":"「退燒劑」較不易致跌倒;利尿劑/降血壓劑/瀉劑易致跌倒。","detail":{"background":"易致跌倒的藥物:A利尿劑(頻尿、姿位性低血壓)、B降血壓劑(姿位性低血壓、頭暈)、C瀉劑(急著如廁、虛弱)——皆增跌倒危險。選項D「退燒劑」較不直接致跌倒(本題答案,問「何者除外」)。故退燒劑除外(D)。病人安全:跌倒高危=老人幼兒虛弱用藥(利尿/降壓/瀉劑/鎮靜)者;放低床面、用床欄呼叫鈴、夜間照明、防滑、浴廁樓梯是常見跌倒地點;定向障礙/失智者安置靠近護理站防走失;跌倒處置先評估意識傷勢並求救。","options":{"A":"利尿劑(頻尿低血壓)易跌倒。","B":"降血壓劑(姿位性低血壓)易跌倒。","C":"瀉劑(急如廁虛弱)易跌倒。","D":"正確(本題答案)。退燒劑較不易致跌倒。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"110030-N2-1":{"quick":"跌倒常發生地點=浴廁與樓梯。","detail":{"background":"預防病人跌倒:D「浴廁與樓梯是醫院中病人跌倒常發生的地點」正確(地濕、起身轉身、視線不佳)。A床高應「可調整」放低利上下床(非固定);B床欄應「視需要調整起落」(非固定拉起,失能者拉起、活動者可調);C定向障礙病人「宜」靠近護理站(非不宜)。故D正確。","options":{"A":"床高應可調整放低,非固定。","B":"床欄應視需要調整,非固定拉起。","C":"定向障礙者宜靠近護理站,非不宜。","D":"正確(本題答案)。浴廁與樓梯是跌倒常見地點。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"110030-N2-6":{"quick":"左下肢乏力老人安全:夜間仍須打開照明設備。","detail":{"background":"左下肢乏力但意識清楚老人安全環境:B「夜間仍須打開(留)照明設備(夜燈)」正確(防夜間如廁跌倒)。A應「拉起」右側(健側對側)床欄輔助(非為方便上下床不拉);C浴室「不可放小地毯」(易滑倒絆倒),應放止滑墊;D助行器應放「健側(右側)」便於使用、且在床邊易取處(非左患側床尾)。故B正確。","options":{"A":"應拉起床欄輔助安全。","B":"正確(本題答案)。夜間仍須打開照明防跌倒。","C":"浴室不可放小地毯(易滑),應止滑墊。","D":"助行器應放健側易取處。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"112030-N2-4":{"quick":"不同社會經濟狀態民眾維持健康的能力「不」相同;稱均相同為錯誤。","detail":{"background":"影響健康因素:A健康保險制度影響社會對健康促進的重視(對);B充足睡眠休息等生活型態是重要因素(對);D獲得醫療照護便利性影響健康維護選擇(對)。選項C「不同社會經濟狀態的民眾在維持其健康的能力『均相同』」錯誤——社會經濟地位(收入、教育、資源)會「影響」民眾維持健康的能力(健康不平等),並非均相同,故C為錯誤敘述(本題答案)。","options":{"A":"正確。健康保險影響健康重視。","B":"正確。生活型態是重要因素。","C":"錯誤(本題答案)。不同社經狀態維持健康能力不同,非均相同。","D":"正確。醫療便利性影響健康選擇。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"101110-N2-45":{"quick":"睡眠改善「不」以安眠藥順利服下為指標(應看睡眠品質與主訴);稱安眠藥服下為無法顯示改善。","detail":{"background":"睡眠改善的評值指標:A與睡眠障礙有關的臨床表徵消失、B睡眠日誌顯示品質改善、D主訴睡眠問題改善——皆能顯示睡眠改善。選項C「每日睡前之鎮靜安眠藥物皆有順利服下」「無法」顯示睡眠改善(本題答案)——「有服安眠藥」只代表給藥執行,不代表睡眠品質改善(且依賴藥物非真正改善)。故無法顯示改善者為安眠藥服下(C)。","options":{"A":"臨床表徵消失能顯示改善。","B":"睡眠日誌品質改善能顯示。","C":"正確(本題答案)。安眠藥服下無法顯示睡眠改善。","D":"主訴改善能顯示。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"102110-N2-40":{"quick":"NREM第IV期出現「δ波(非β波)、新陳代謝『減慢』」;稱出現β波代謝加速為錯誤。","detail":{"background":"睡眠週期:A以腦電波EEG、眼電圖、肌電圖判讀(對);B每晚7~8小時有4~6個睡眠週期、每週期約90分鐘(對);C由NREM與REM組成(對)。選項D「NREM第IV期主要出現β波,新陳代謝加速,生長激素分泌增加」錯誤——NREM第IV期(深睡)出現「δ波(慢波)、新陳代謝『減慢』、副交感主導」(生長激素分泌增加是對的);β波是清醒/REM,故D「β波、代謝加速」為錯誤敘述(本題答案)。","options":{"A":"正確。以EEG、眼電圖、肌電圖判讀。","B":"正確。每週期約90分鐘。","C":"正確。由NREM與REM組成。","D":"錯誤(本題答案)。NREM IV期是δ波、代謝減慢,非β波加速。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"104030-N2-46":{"quick":"生長激素促進生長發生在「NREM第四期(深睡)」。","detail":{"background":"腦下垂體前葉分泌「生長激素(GH)」促進生長,主要發生在睡眠週期的「NREM第四期(深睡期、慢波睡眠δ波)」(D正確)——故充足深睡對兒童生長與組織修復重要。REM期、NREM第二三期非生長激素分泌高峰。故NREM第四期(D)。睡眠週期:NREM(1~4期,深睡δ波、生命徵象下降、生長激素分泌、組織修復、消除身體疲勞)+REM(腦波似清醒、肌肉張力最低、做夢醒後易記、心跳血壓上升、胃酸增、鞏固記憶);每週期約90分鐘、每晚4~6週期;睡眠衛教:規律作息、白天勿多睡、睡前少水排空膀胱、集中護理減打擾、安眠藥非首選。","options":{"A":"第四期是NREM非REM(題幹REM為干擾)。","B":"NREM第二期非生長激素高峰。","C":"NREM第三期非主要分泌期。","D":"正確(本題答案)。生長激素在NREM第四期分泌。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"104100-N2-48":{"quick":"睡眠處置:介紹新環境增安全感(2)、集中式護理避免打擾(3)→「23」。","detail":{"background":"協助住院病人睡眠問題:2向病人介紹新環境增加安全感、3避免睡眠中不必要治療程序、採集中式護理(減少打擾)——皆正確。選項1「預防性(常規)安眠藥」不當(非首選、易依賴);4「白天儘量多休息」不當(白天多睡會干擾夜眠)。故正確為「23」。睡眠週期:NREM(1~4期,深睡δ波、生命徵象下降、生長激素分泌、組織修復、消除身體疲勞)+REM(腦波似清醒、肌肉張力最低、做夢醒後易記、心跳血壓上升、胃酸增、鞏固記憶);每週期約90分鐘、每晚4~6週期;睡眠衛教:規律作息、白天勿多睡、睡前少水排空膀胱、集中護理減打擾、安眠藥非首選。","options":{"A":"含1(預防性安眠藥)不當。","B":"含1不當。","C":"正確(本題答案,23)。介紹新環境、集中式護理。","D":"含4(白天多休息)不當。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"104100-N2-50":{"quick":"睡眠處置:介紹新環境增安全感(2)、集中式護理(3)→「23」。","detail":{"background":"促進睡眠的正確處置:2向病人介紹新環境增加安全感、3避免睡眠中不必要治療、採集中式護理。選項1「預防性安眠藥」與4「白天儘量多休息」皆不當(安眠藥非首選、白天多睡干擾夜眠)。故「23」。睡眠週期:NREM(1~4期,深睡δ波、生命徵象下降、生長激素分泌、組織修復、消除身體疲勞)+REM(腦波似清醒、肌肉張力最低、做夢醒後易記、心跳血壓上升、胃酸增、鞏固記憶);每週期約90分鐘、每晚4~6週期;睡眠衛教:規律作息、白天勿多睡、睡前少水排空膀胱、集中護理減打擾、安眠藥非首選。","options":{"A":"含1不當。","B":"含1不當。","C":"正確(本題答案,23)。介紹新環境、集中式護理。","D":"含4不當。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"105030-N2-50":{"quick":"睡眠:入睡受生物時鐘影響(1)、生命1/3在睡(2)、整夜後半夜REM較多→「1246」。","detail":{"background":"睡眠敘述:1入睡時間受生物時鐘(日夜節律)自然影響、2人類生命約1/3在睡覺、4(及6)正常相關項——皆正確。選項3「整夜睡眠中前半夜以快速動眼期(REM)較多」錯誤——前半夜以「深睡(NREM)較多」,「後半夜REM逐漸增多」。本題官方答案「1246」(排除錯誤的3)。","options":{"A":"正確(本題答案,1246)。生物時鐘、1/3睡眠等。","B":"含3(前半夜REM多)錯。","C":"含...不符。","D":"含3、5不符。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"106030-N2-26":{"quick":"睡眠:NREM第三期δ波呼吸血壓下降(2)等→本題答案「212」標記異常,核心NREM3=δ波。","detail":{"background":"本題官方答案標記異常(212),核心睡眠概念:選項2「非快速動眼期第三期腦波呈δ波、呼吸速率及血壓下降」正確(深睡、副交感主導)。選項1「快速動眼期(REM)腦波呈β波、容易被叫醒」——REM腦波似清醒(β波)但「不易被叫醒(肌肉張力最低)」,「容易叫醒」描述須斟酌;NREM第一二期才淺眠易醒。核心:NREM深睡δ波、生命徵象下降;REM腦波活躍但肌肉鬆弛。作答以官方標示為準。","options":{"A":"112標記異常。","B":"112標記異常。","C":"本題答案(依官方,核心NREM3=δ波呼吸血壓降)。","D":"222標記異常。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"106110-N2-49":{"quick":"陳女士睡眠問題因子=白天午睡(2)、晚餐後活動少等→本題答案「245」。","detail":{"background":"本題官方答案「245」。陳女士晚上睡不好、易做夢、白天打瞌睡、午睡45分鐘、傍晚散步——影響其睡眠的因子:2白天午睡(減少夜間睡眠驅力)、4(及5,如年齡/睡眠習慣)。核心:白天午睡過多、睡眠習慣不良會干擾夜眠。失眠評估須找出干擾因子(咖啡因、午睡、夜尿、環境)。作答以官方答案「245」為準。","options":{"A":"125組合不符官方。","B":"136不符。","C":"正確(本題答案,245)。白天午睡等干擾因子。","D":"346不符。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"106110-N2-50":{"quick":"改善睡眠:睡前2~4小時少喝水(1)、調整多重用藥(3)、調整夜間睡眠(5)→「135」。","detail":{"background":"改善睡眠照護計畫:1睡前2~4小時少喝水(減少夜尿)、3請醫師調整多重用藥(藥物可能干擾睡眠)、5調整夜間睡眠(建立規律作息)——皆正確。選項2「晚上多運動」不當(睡前激烈運動使交感興奮難入睡,運動宜白天/傍晚);4「白天多次小睡彌補」不當(白天多睡干擾夜眠)。故正確為「135」。","options":{"A":"正確(本題答案,135)。睡前少喝水、調整用藥、規律睡眠。","B":"含2(晚上多運動)不當。","C":"含4(白天多睡)不當。","D":"含4不當。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"107110-N2-49":{"quick":"睡眠功能:NREM血壓下降(1)、REM幫助記憶學習(3)、NREM幫助...→「136」。","detail":{"background":"睡眠功能:1非快速動眼期(NREM)時血壓下降(副交感主導)、3快速動眼期(REM)幫助記憶和學習、6(及NREM幫助身體修復)——皆正確。選項2「REM時新陳代謝『減緩』」錯(REM代謝活躍、似清醒);4「REM時消除疲勞」偏NREM(深睡消除身體疲勞)。本題官方答案「136」。核心:NREM恢復體力、REM鞏固記憶。","options":{"A":"正確(本題答案,136)。NREM血壓降、REM助記憶。","B":"含...不符。","C":"含2(REM代謝減緩)錯。","D":"含2、4不符。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"108020-N2-43":{"quick":"睡眠週期:REM期心跳與血壓「上升」(活躍);稱REM心跳血壓上升為正確。","detail":{"background":"睡眠週期特徵:D「快速動眼期(REM)的心跳與血壓均上升」正確(REM期自律神經活躍、心跳血壓呼吸波動上升、做夢)。A每晚4~6週期、每週期約「90分鐘」非60分;B NREM第4期「極不易被喚醒(深睡)」非極易;C尿床與夢遊發生在「NREM第3~4期(深睡)」非第3期單獨(且本題以D為正解)。故D正確。","options":{"A":"每週期約90分鐘,非60分。","B":"NREM第4期極不易喚醒,非極易。","C":"尿床夢遊在NREM深睡(3~4期)。","D":"正確(本題答案)。REM期心跳血壓上升。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"108020-N2-44":{"quick":"「抗生素」較不會影響睡眠;年齡/疼痛/β阻斷劑會影響睡眠。","detail":{"background":"影響睡眠的因素:A年齡(老人深睡減少)、B疼痛(難入睡)、D β阻斷劑(可能致失眠、惡夢)——皆影響睡眠。選項C「抗生素」較不會直接影響睡眠狀況(本題答案)。故抗生素較不影響睡眠(C)。睡眠週期:NREM(1~4期,深睡δ波、生命徵象下降、生長激素分泌、組織修復、消除身體疲勞)+REM(腦波似清醒、肌肉張力最低、做夢醒後易記、心跳血壓上升、胃酸增、鞏固記憶);每週期約90分鐘、每晚4~6週期;睡眠衛教:規律作息、白天勿多睡、睡前少水排空膀胱、集中護理減打擾、安眠藥非首選。","options":{"A":"年齡影響睡眠(老人深睡減少)。","B":"疼痛影響睡眠。","C":"正確(本題答案)。抗生素較不影響睡眠。","D":"β阻斷劑可能致失眠惡夢。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"108020-N2-45":{"quick":"促進睡眠「不」建議白天多休息(白天多睡干擾夜眠);稱白天多休息為錯誤。","detail":{"background":"促進睡眠護理:A睡前依醫囑給止痛劑減輕疼痛(對);B睡前背部按摩放鬆(對);C睡前減少飲水、排空膀胱(對,減夜尿)。選項D「建議病人白天多休息,以減少疲倦感」錯誤——白天多休息/睡覺會「減少夜間睡眠驅力、干擾夜眠」,應鼓勵白天適度活動,故D為錯誤敘述(本題答案)。","options":{"A":"正確。睡前給止痛劑減痛。","B":"正確。睡前背部按摩放鬆。","C":"正確。睡前減少飲水排空膀胱。","D":"錯誤(本題答案)。不宜白天多休息(干擾夜眠)。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"108020-N2-55":{"quick":"冠繞道術後傷口痛影響睡眠:依醫囑給止痛劑(1)、安排集中護理(4)→「14」。","detail":{"background":"冠狀動脈繞道術後傷口疼痛影響睡眠的處置:1必要時依醫囑給Acetaminophen止痛、4安排集中式護理(減少夜間打擾)——皆適當。選項2、3(如預防性安眠藥、白天多休息)不當。故正確為「14」。睡眠週期:NREM(1~4期,深睡δ波、生命徵象下降、生長激素分泌、組織修復、消除身體疲勞)+REM(腦波似清醒、肌肉張力最低、做夢醒後易記、心跳血壓上升、胃酸增、鞏固記憶);每週期約90分鐘、每晚4~6週期;睡眠衛教:規律作息、白天勿多睡、睡前少水排空膀胱、集中護理減打擾、安眠藥非首選。","options":{"A":"正確(本題答案,14)。依醫囑止痛、集中護理。","B":"含2不當。","C":"含2、3不當。","D":"含3不當。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"109030-N2-43":{"quick":"REM期:胃酸分泌增加。","detail":{"background":"快速動眼期(REM)特徵:C「胃酸分泌增加」正確(REM期自律神經活躍、胃酸分泌增多,故消化性潰瘍夜間易痛)。A全身肌肉張力「下降(最低、肌肉鬆弛)」非上升;B生長激素分泌在NREM深睡「增加」非REM下降;D REM由「交感神經」活躍主宰(波動)非副交感。故C正確。","options":{"A":"REM肌肉張力最低,非上升。","B":"生長激素在NREM深睡分泌,非REM下降。","C":"正確(本題答案)。REM期胃酸分泌增加。","D":"REM交感活躍,非副交感主宰。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"109110-N2-18":{"quick":"睡眠型態紊亂的「鑑定性特徵」不含「病房太吵」(那是相關因素/病因);稱病房太吵為錯誤。","detail":{"background":"「睡眠型態紊亂」的鑑定性特徵(defining characteristics,病人表現的症狀徵象):A晚上醒來3次、C日間常打瞌睡、D反應遲鈍——皆是睡眠紊亂的「表現」。選項B「病房太吵」錯誤——病房太吵是「相關因素(病因/誘因)」,非「鑑定性特徵(表現)」,故B為錯誤敘述(本題答案)。","options":{"A":"晚上醒來3次是鑑定性特徵。","B":"錯誤(本題答案)。病房太吵是相關因素,非鑑定性特徵。","C":"日間打瞌睡是鑑定性特徵。","D":"反應遲鈍是鑑定性特徵。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"109110-N2-44":{"quick":"「制酸劑」不會干擾睡眠週期;安非他命/酒精/抗鬱劑會干擾。","detail":{"background":"會干擾睡眠週期的藥物:A安非他命(amphetamine,興奮劑、抑制睡眠)、C酒精(alcohol,抑制REM、片段化睡眠)、D抗鬱劑(antidepressant,改變REM)。選項B「制酸劑(antacids)」不會干擾睡眠週期(本題答案)。故制酸劑不干擾睡眠(B)。","options":{"A":"安非他命干擾睡眠(興奮)。","B":"正確(本題答案)。制酸劑不干擾睡眠週期。","C":"酒精干擾睡眠(抑制REM)。","D":"抗鬱劑改變REM。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"109110-N2-45":{"quick":"夢境發生在REM期、醒後最易記得。","detail":{"background":"夢境(生動的夢)主要發生在「快速動眼期(REM)」,且此期醒來「最容易記得夢境」(D正確)——REM期腦波活躍似清醒、做夢。NREM各期(S1~S3)夢少且模糊不易記。故REM期(D)。睡眠週期:NREM(1~4期,深睡δ波、生命徵象下降、生長激素分泌、組織修復、消除身體疲勞)+REM(腦波似清醒、肌肉張力最低、做夢醒後易記、心跳血壓上升、胃酸增、鞏固記憶);每週期約90分鐘、每晚4~6週期;睡眠衛教:規律作息、白天勿多睡、睡前少水排空膀胱、集中護理減打擾、安眠藥非首選。","options":{"A":"NREM S1夢少。","B":"NREM S2夢少。","C":"NREM S3深睡夢少。","D":"正確(本題答案)。夢境在REM期、醒後最易記得。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"110110-N2-47":{"quick":"睡眠效率85%「未達」失眠標準(失眠通常睡眠效率<85%);稱睡眠效率85%為未達失眠標準。","detail":{"background":"國際睡眠障礙分類失眠標準:A 70歲老人入睡>40分鐘(入睡困難)、B經常半夜醒2~4次每次>10分(睡眠維持困難)、C成年人每天睡眠總時數僅5小時(睡眠不足)——皆「達」失眠標準。選項D「成年人睡眠效率85%」「未達」失眠標準(本題答案)——睡眠效率(實際睡眠時間/臥床時間)正常應≥85%,85%屬「正常下限」,未達失眠(失眠常<85%)。故D未達失眠標準。","options":{"A":"入睡>40分達失眠標準。","B":"半夜頻醒達失眠標準。","C":"睡眠5小時不足,達標準。","D":"正確(本題答案)。睡眠效率85%未達失眠標準。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"111110-N2-48":{"quick":"阻塞性睡眠呼吸暫停:睡眠時呼吸道肌肉「鬆弛」非緊縮;稱呼吸道肌肉緊縮為錯誤。","detail":{"background":"阻塞性睡眠呼吸暫停(OSA):A好發於肥胖者(對);C發作時間可達10秒到2分鐘(對);D整晚可發作50~600次(對)。選項B「睡眠時呼吸道肌肉『緊縮』」錯誤——OSA是睡眠時「上呼吸道肌肉『鬆弛、塌陷』」致呼吸道阻塞、暫停,非緊縮,故B為錯誤敘述(本題答案)。","options":{"A":"正確。好發於肥胖者。","B":"錯誤(本題答案)。OSA是呼吸道肌肉鬆弛塌陷,非緊縮。","C":"正確。發作10秒~2分鐘。","D":"正確。整晚可發作50~600次。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"112110-N2-47":{"quick":"睡眠受干擾無法進入沉睡期,易影響「生長激素」分泌。","detail":{"background":"睡眠受干擾、無法進入「沉睡期(NREM第3~4期深睡)」,最易影響「生長激素(GH)」的分泌(B正確)——生長激素主要在深睡期分泌,深睡不足影響生長與組織修復。甲狀腺素、胃泌素、腎上腺素非深睡期主要分泌。故生長激素(B)。睡眠週期:NREM(1~4期,深睡δ波、生命徵象下降、生長激素分泌、組織修復、消除身體疲勞)+REM(腦波似清醒、肌肉張力最低、做夢醒後易記、心跳血壓上升、胃酸增、鞏固記憶);每週期約90分鐘、每晚4~6週期;睡眠衛教:規律作息、白天勿多睡、睡前少水排空膀胱、集中護理減打擾、安眠藥非首選。","options":{"A":"甲狀腺素非深睡期主分泌。","B":"正確(本題答案)。深睡不足影響生長激素分泌。","C":"胃泌素非深睡期主分泌。","D":"腎上腺素非深睡期主分泌。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"115030-N2-30":{"quick":"術後促進蛋白質合成及組織修復發生在「NREM第四期」。","detail":{"background":"手術後「促進蛋白質合成及組織修復」(生長激素作用)主要發生在睡眠週期的「NREM第四期(深睡期)」(A正確)——深睡期生長激素分泌高峰、合成代謝旺盛、修復組織。NREM第三、二、一期非主要修復期。故NREM第四期(A)。睡眠週期:NREM(1~4期,深睡δ波、生命徵象下降、生長激素分泌、組織修復、消除身體疲勞)+REM(腦波似清醒、肌肉張力最低、做夢醒後易記、心跳血壓上升、胃酸增、鞏固記憶);每週期約90分鐘、每晚4~6週期;睡眠衛教:規律作息、白天勿多睡、睡前少水排空膀胱、集中護理減打擾、安眠藥非首選。","options":{"A":"正確(本題答案)。組織修復在NREM第四期(深睡)。","B":"NREM第三期非主要修復期。","C":"NREM第二期非修復高峰。","D":"NREM第一期是淺眠。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"109110-N2-1":{"quick":"因應壓力「不」以不斷變化病室布置減少注意力(會增不安);稱不斷變化病室布置為錯誤。","detail":{"background":"因應壓力處理:B改善心理反應、尋求支持系統(對);C降低壓力情境、訂工作優先順序(對);D降低身體反應、規律運動放鬆(對)。選項A「降低壓力情境,可利用『不斷變化病室布置』以減少對壓力情境的注意力」錯誤——不斷變化環境會「增加不熟悉感與不安、加重壓力」,應提供「穩定、熟悉、安靜」的環境,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。不斷變化病室布置增不安,非減壓。","B":"正確。尋求支持系統。","C":"正確。訂工作優先順序。","D":"正確。規律運動放鬆。"},"sources":["新文京《基本護理學》睡眠與休息","華杏《最新基本護理學》睡眠週期"]}},"101030-N2-4":{"quick":"抒解壓力「不」適合鼓勵改以喝咖啡(咖啡因不利);稱鼓勵喝咖啡為不適合。","detail":{"background":"林女士以抽菸喝酒抒解壓力,護理師協助減壓措施:A轉介社工協助經濟困難(適合)、B提供助行器協助下床(適合,解決活動不便)、D評估止痛藥效果與醫師討論劑量(適合,解決疼痛)。選項C「鼓勵改以喝咖啡抒解壓力」不適合——咖啡因是「興奮劑」,會增加焦慮、影響睡眠、不利健康,不是健康的抒壓方式,故C為不適合(本題答案)。","options":{"A":"適合。轉介社工協助。","B":"適合。提供助行器協助活動。","C":"不適合(本題答案)。咖啡因不利,非健康抒壓方式。","D":"適合。評估止痛藥效果。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"101030-N2-10":{"quick":"護理目標最適當=「2天後個案疼痛指數能降到3分以下」(以病人為主、可測量、有時間)。","detail":{"background":"護理目標書寫應「以病人為主詞、具體、可測量、有時限」。選項B「2天後,個案疼痛指數能降到3分以下」符合(B正確,病人結果+可測量+時間)。A依醫囑給Demerol、C協助翻身、D執行被動運動皆是「護理措施(措施)」非目標。故B正確。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"依醫囑給藥是措施,非目標。","B":"正確(本題答案)。2天後疼痛降3分以下是可測量目標。","C":"協助翻身是措施。","D":"執行被動運動是措施。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"102030-N2-32":{"quick":"小量灌腸:可棄式灌腸器管身插入肛門約7.5~10公分。","detail":{"background":"小量灌腸(可棄式):C「可棄式灌腸器管身需插入肛門約7.5~10公分(成人)」正確。A應採「左側臥」非右側臥;B使用前「需排出空氣」(避免空氣灌入腸道);D灌腸結束後「應保留5~10分鐘」再解便(非立刻解)。故C正確。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"應採左側臥,非右側臥。","B":"使用前需排出空氣。","C":"正確(本題答案)。插入肛門約7.5~10公分。","D":"灌腸後保留5~10分鐘再解便。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"102110-N2-6":{"quick":"焦點式記錄「教導早期下床活動」屬「I(措施)」非「R(反應)」;稱R為錯誤。","detail":{"background":"護理記錄:A「傷口好痛」是問題導向(POMR)的「S(主觀)」(對);B「疼痛/因手術傷口造成」是「A(評估/護理診斷)」(對);D「注意傷口變化」是焦點式記錄的「A(action措施)」(對)。選項C「教導個案早期下床活動」屬焦點式記錄的「『I/A(措施action)』」非「R(reaction反應)」——R是病人對措施的反應,「教導」是護理師的措施,故C為錯誤敘述(本題答案)。","options":{"A":"正確。主訴是S。","B":"正確。護理診斷是A。","C":"錯誤(本題答案)。教導下床是措施(A/I),非反應R。","D":"正確。注意傷口變化是措施。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"103100-N2-8":{"quick":"治療性人際關係:先確認病患對治療性人際關係的期待。本題答案D。","detail":{"background":"本題官方答案D。林先生血糖控制不佳、不接受關心並提出諸多要求,護理師最合適的處理是「先確認病患對治療性人際關係的期待」(D)——了解病人需求與期待是建立治療性關係的基礎。A自省能力(過度內省)、B儘量滿足要求(不當,會強化不當行為)、C所有活動前都解釋(雖好但非首要確認期待)。故先確認病人期待(D)。","options":{"A":"自省非首要處理。","B":"不可一味滿足要求。","C":"解釋雖好,但首要是確認病人期待。","D":"正確(本題答案)。先確認病患對治療性關係的期待。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"104030-N2-40":{"quick":"誘尿措施「不」包括凱格爾氏運動(那是治尿失禁,非誘尿);稱凱格爾運動為錯誤。","detail":{"background":"誘尿(誘導排尿)措施:A聽流水聲、B手握冰塊(刺激排尿反射)、C按摩恥骨聯合上方(刺激膀胱)——皆為誘尿措施。選項D「教導病人做凱格爾氏運動」錯誤——凱格爾運動是訓練骨盆底肌、用於「壓力性尿失禁(防漏尿)」,「不是」誘導排尿(尿瀦留)的措施,故D為錯誤敘述(本題答案)。","options":{"A":"聽流水聲是誘尿措施。","B":"手握冰塊是誘尿措施。","C":"按摩恥骨上方是誘尿措施。","D":"錯誤(本題答案)。凱格爾運動治尿失禁,非誘尿。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"105030-N2-41":{"quick":"劇烈運動後呼吸變「深而快」。","detail":{"background":"劇烈運動後,身體耗氧增加、產生CO2與乳酸增多,呼吸代償性「變深而快(增加通氣排CO2、攝氧)」(A正確)。非深而慢、淺而快、由淺快變深慢。故呼吸變深而快(A)。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"正確(本題答案)。劇烈運動後呼吸變深而快。","B":"非深而慢。","C":"非淺而快。","D":"非由淺快變深慢。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"105090-N2-36":{"quick":"結腸灌洗:灌洗筒液面至肛門口距離「不」高於70公分(約45~60);稱高於70公分為錯誤。","detail":{"background":"結腸灌洗:A病人採左側臥式(對);C溶液溫度41~43°C(對);D灌入速度約每分鐘100~150 c.c.(對)。選項B「灌洗筒液面至肛門口距離高於70公分」錯誤——灌洗筒(液面)距肛門約「45~60公分」即可(過高壓力大、流速快、刺激腸痙攣或損傷),高於70公分不當,故B為錯誤敘述(本題答案)。","options":{"A":"正確。採左側臥式。","B":"錯誤(本題答案)。液面距肛門約45~60公分,非高於70。","C":"正確。溶液41~43°C。","D":"正確。速度每分鐘100~150 c.c.。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"105090-N2-37":{"quick":"腹瀉「不」應限制水量(會脫水);稱限制水量為錯誤。","detail":{"background":"腹瀉護理:A教導注意活動安全防眩暈跌倒(對);C教導肛門皮膚護理防破損(對);D限制食物種類、必要時NPO(對)。選項B「限制病人每日的攝取水量,以免腹瀉加重」錯誤——腹瀉會流失大量水分與電解質,應「補充水分與電解質(防脫水)」而非限制,故B為錯誤敘述(本題答案)。","options":{"A":"正確。注意活動安全防跌倒。","B":"錯誤(本題答案)。腹瀉應補充水分,非限制(防脫水)。","C":"正確。肛門皮膚護理。","D":"正確。必要時NPO。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"105090-N2-38":{"quick":"「從病歷檢驗資料發現營養不良」不是對病人的「直接觀察」(是間接資料)。","detail":{"background":"對病人的「直接觀察」=護理師親自以感官評估病人。A翻身發現破皮(視診)、B聞到呼吸果香味(嗅診)、D聽診發現囉音(聽診)——皆是直接觀察。選項C「從病歷的檢驗資料中發現營養不良」「不是」直接觀察(本題答案)——這是「查閱病歷(間接資料)」而非親自觀察病人。故非直接觀察者為查病歷(C)。","options":{"A":"翻身發現破皮是直接觀察(視診)。","B":"聞到果香味是直接觀察(嗅診)。","C":"正確(本題答案)。查病歷檢驗資料是間接,非直接觀察。","D":"聽診囉音是直接觀察。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"106110-N2-18":{"quick":"栓劑給藥:給藥後以衛生紙壓住肛門,直到無便意感。","detail":{"background":"丁太太栓劑(塞劑)給藥:B「給藥後應以衛生紙壓住肛門,直到無便意感(使栓劑保留吸收)」正確。A給藥應採「左側臥」非屈膝仰臥;C給藥後「不可立即下床解便」(應保留使藥物作用);D「可」在藥劑前端塗少量潤滑劑(利插入,不影響吸收)。故B正確。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"應採左側臥,非屈膝仰臥。","B":"正確(本題答案)。給藥後壓住肛門至無便意。","C":"不可立即下床解便,應保留。","D":"可塗少量潤滑劑,不影響吸收。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"106111-N2-7":{"quick":"護理措施敘述最適當=「睡前給予病人一杯250 c.c.之溫牛奶」(具體可執行)。","detail":{"background":"護理措施應「具體、可執行、有明確內容(時間、量、方法)」。選項D「睡前給予病人一杯250 c.c.之溫牛奶」最具體(D正確)。A「多」下床活動、B「足夠」飲水量、C「維持」身體清潔皆「籠統、不具體(多少、如何未明)」。故D最適當。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"「多下床」籠統不具體。","B":"「足夠飲水」未量化。","C":"「維持清潔」籠統。","D":"正確(本題答案)。睡前給250 c.c.溫牛奶最具體。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"106111-N2-10":{"quick":"會談中病人低頭不語:靜靜陪伴、給予時間思考(治療性沉默)。","detail":{"background":"會談中問及敏感問題,病人「低頭不語」,護理師最適當是「可以靜靜的陪在身旁,給予時間思考(治療性沉默)」(D正確)——尊重病人、給予整理思緒的空間。A「妳累了我等一下再來」(中斷、迴避)、B「重複問題」(施壓)、C「轉換話題以免破壞關係」(迴避問題)皆非最佳。故治療性沉默陪伴(D)。","options":{"A":"中斷會談是迴避。","B":"重複問題是施壓。","C":"轉換話題是迴避問題。","D":"正確(本題答案)。靜靜陪伴給時間(治療性沉默)。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"106111-N2-14":{"quick":"病人主觀資料=家屬:「他晚上都沒辦法睡覺」。","detail":{"background":"主觀資料(subjective)=病人(或家屬)「主訴/陳述」的感受。選項B「家屬:他晚上都沒辦法睡覺」是家屬陳述的主觀資料(B正確)。A外觀蒼白呼吸淺快(客觀觀察)、C呼吸心跳次數(客觀測量)、D床頭抬高半坐臥(客觀)皆是客觀資料。故主觀資料為B。","options":{"A":"外觀蒼白呼吸淺快是客觀觀察。","B":"正確(本題答案)。家屬陳述「沒辦法睡」是主觀資料。","C":"呼吸心跳次數是客觀測量。","D":"床頭抬高是客觀。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"107110-N2-41":{"quick":"李太太跌倒高危因子(肥胖糖尿病壞疽臥床):水腫「不」是主要跌倒因子。本題答案D。","detail":{"background":"本題官方答案D。李太太80歲、肥胖、糖尿病20年、左拇趾壞疽、無法下床臥床——跌倒/壓瘡高危因子含A年齡(老人)、B肥胖、C糖尿病(周邊神經病變、感覺差)。選項D「水腫」相對「不是」此情境最主要的跌倒危險因子(本題答案)——水腫雖影響皮膚但非直接致跌倒主因。故D。","options":{"A":"年齡(老人)是跌倒因子。","B":"肥胖是跌倒因子。","C":"糖尿病(神經病變)是跌倒因子。","D":"正確(本題答案)。水腫非主要跌倒因子。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"108020-N2-3":{"quick":"住院病人心情沮喪哭泣:告知心情不佳是正常、多休息放鬆、可請家人提供音樂。","detail":{"background":"林小姐住院病情未好轉、心情沮喪、擔心傳染家人、夜裡哭泣——最合適的護理措施是「告訴病人心情不佳是正常情形,要多休息放鬆心情,可請家人提供音樂」(A正確,同理接納情緒+提供支持)。B「要忍耐、自己承受」(否定情緒)、C「好好服藥就好不需擔心」(忽視情緒)、D「不要胡思亂想」(否定)皆不當。故A正確。","options":{"A":"正確(本題答案)。同理情緒、多休息、家人音樂支持。","B":"「要忍耐自己承受」否定情緒。","C":"「服藥就好」忽視情緒。","D":"「不要胡思亂想」否定情緒。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"108020-N2-16":{"quick":"耳藥:成人左耳耳垂「向上向後」拉(非向下向後);稱向下向後為錯誤。","detail":{"background":"左中耳炎耳藥滴入:A採右側臥讓左耳朝上利操作(對);C藥物沿外耳道壁滴入、勿直接滴鼓膜(對);D滴後維持原姿勢10分鐘再擺正(對)。選項B「成人左耳耳垂向下向後拉,使外耳道拉直」錯誤——「成人」應將耳廓「向上向後」拉(3歲以下兒童才向下向後),宋先生30歲(成人)應向上向後,故B為錯誤敘述(本題答案)。","options":{"A":"正確。右側臥讓左耳朝上。","B":"錯誤(本題答案)。成人耳廓向上向後拉,非向下向後。","C":"正確。藥沿外耳道壁滴。","D":"正確。滴後維持原姿勢10分鐘。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"108110-N2-17":{"quick":"氣爆病人應優先處理=欠穩定之生命徵象(ABC危及生命)。","detail":{"background":"氣爆送急診病人,依「ABC/生命危急」應「優先處理欠穩定之生命徵象(D)」——維持呼吸道、呼吸、循環(燒傷氣道水腫、出血休克)最危及生命。焦慮恐懼、身體心像改變(心理)、預防跌倒相對非立即危及生命。故欠穩定生命徵象(D)。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"焦慮恐懼是心理層面,非最優先。","B":"身體心像改變非立即危及。","C":"預防跌倒非最優先。","D":"正確(本題答案)。欠穩定生命徵象(ABC)最優先。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"108110-N2-24":{"quick":"每天2次與家屬協助病人下床走路=治療性護理措施。","detail":{"background":"對非急性期腦中風偏癱病人「每天2次與家屬協助下床練習走路」屬「治療性(治療/復健)護理措施」(C正確)——目的是恢復/維持功能(復健治療)。評估性(收集資料)、預防性(預防併發症)、健康促進(提升健康層次)皆非。故治療性(C)。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"評估性是收集資料。","B":"預防性是預防併發症。","C":"正確(本題答案)。協助復健走路=治療性護理措施。","D":"健康促進是提升健康層次。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"108110-N2-55":{"quick":"疼痛最適當評值紀錄=「疼痛指數已由7分降至4分」(可測量結果)。","detail":{"background":"護理評值應記錄「病人對措施的反應/結果(可測量)」。給止痛劑後最適當的評值是「B 10/09 10 AM病人主訴疼痛改善,疼痛指數已由7分降至4分」(B正確,客觀量化的療效反應)。A「疼痛7分」是給藥前評估(非評值);C「說出緩解方法」是衛教評值非止痛效果;D「下床無喘」與止痛評值無關。故B正確。","options":{"A":"疼痛7分是給藥前評估。","B":"正確(本題答案)。疼痛由7降至4分是可測量評值。","C":"說出緩解方法是衛教評值。","D":"下床無喘與止痛評值無關。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"109030-N2-34":{"quick":"用力咳嗽大笑滲尿低落:「不」適合說「中年正常不要在意」(輕忽);稱告知正常別在意為不合適。","detail":{"background":"王太太用力咳嗽大笑滲尿(壓力性尿失禁)、情緒低落:B評估壓力性尿失禁因子(停經肥胖,適合);C教導勿提重物突然大笑(適合);D教導骨盆底肌運動增加尿道括約肌張力(適合)。選項A「告訴病人這是中年婦女正常現象,不要太在意」不合適——尿失禁「並非正常老化必然」、且輕忽病人感受、未積極處理,故A為不合適(本題答案)。","options":{"A":"不合適(本題答案)。尿失禁非正常,不應輕忽病人感受。","B":"適合。評估尿失禁因子。","C":"適合。避免增腹壓動作。","D":"適合。骨盆底肌運動。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"109030-N2-53":{"quick":"D5W輸注呼吸喘頸靜脈怒張(循環負荷):最優先調慢點滴流速保持靜脈通暢。","detail":{"background":"羅先生D5W 180 mL/hr輸注、呼吸喘、頸靜脈怒張=「循環負荷過量(肺水腫)」。最優先處置是「調慢點滴流速、保持靜脈通暢」(D正確)並採半坐臥、給氧、通知醫師。A通知醫師(後續)、B半坐臥(輔助)、C「移除靜脈輸注管路」過度(應保留靜脈、僅調慢)。故先調慢流速保持靜脈(D)。","options":{"A":"通知醫師是後續,先調慢流速。","B":"半坐臥是輔助,首要調慢流速。","C":"不需移除管路,應保留靜脈調慢。","D":"正確(本題答案)。調慢流速保持靜脈通暢。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"110030-N2-12":{"quick":"行為過程觀察:配合觀察目的可選擇特定時間活動進行觀察。","detail":{"background":"行為過程觀察與記錄:C「配合觀察目的,可以選擇特定時間/活動進行行為過程觀察」正確(時間取樣/事件取樣)。A錄音錄影「須事先告知並徵得同意」(不可不告知);B「一面會談一面記錄」會分散注意、影響真實性(應事後盡快記);D記錄應「關心當時的情境(脈絡)」非不關心。故C正確。","options":{"A":"錄音錄影須事先告知同意。","B":"邊會談邊記錄影響真實性。","C":"正確(本題答案)。可選特定時間活動進行觀察。","D":"應關心當時情境脈絡。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"110030-N2-22":{"quick":"幼兒左耳耳藥:頭側向右(1)、耳垂向下向後拉(4)→「14」。","detail":{"background":"幼兒(3歲以下)左耳滴耳藥:1頭側向「右側」(使左耳朝上)、4將「耳垂向下向後拉」(幼兒外耳道拉直法)。選項2「頭側向左」(左耳朝下,藥流不進)、3「耳翼向上向後拉」(成人法)皆不符幼兒。故為「14」。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"含3(成人法)不符。","B":"正確(本題答案,14)。頭側向右、耳垂向下向後拉。","C":"含2、3不符。","D":"含2不符。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"112110-N2-10":{"quick":"護理紀錄:電子病歷記載錯誤「不」可刪除(須保留原紀錄軌跡);稱可刪除不留原紀錄為錯誤。","detail":{"background":"護理紀錄:A電子病歷需電子簽章(對);B時間欄位為執行護理活動的時間(對);C應客觀記載收集的資料(對)。選項D「電子病歷記載錯誤時可刪除,即可不留下原有紀錄」錯誤——電子病歷錯誤更正須「保留原紀錄軌跡(更正紀錄、留下修改痕跡)」,不可直接刪除湮滅(法律與稽核要求),故D為錯誤敘述(本題答案)。","options":{"A":"正確。電子病歷需電子簽章。","B":"正確。時間欄是執行活動時間。","C":"正確。客觀記載資料。","D":"錯誤(本題答案)。電子病歷錯誤須保留軌跡,不可刪除。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"113030-N2-7":{"quick":"手術後疼痛給止痛藥的最適當評值=「10 AM病人主訴疼痛指數3分」(措施後結果)。","detail":{"background":"護理評值應記錄「執行措施『後』病人的反應/結果」。9 AM給止痛藥後,最適當評值是「C 10 AM病人主訴疼痛指數3分(給藥後疼痛緩解的可測量結果)」(C正確)。A「8:45採半坐臥蒼白改善」是給藥前;B「9 AM依醫囑給止痛藥」是措施(非評值);D「10 PM睡不著」與止痛評值無直接關聯。故C正確。","options":{"A":"8:45給藥前,非給藥後評值。","B":"給止痛藥是措施,非評值。","C":"正確(本題答案)。給藥後疼痛3分是評值結果。","D":"10 PM睡不著與止痛評值無關。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"113100-N2-8":{"quick":"護理目標最具體=「3/15病人能說出三種以上富含鐵質的食物」(可測量行為)。","detail":{"background":"護理目標應「以病人為主、具體、可測量」。選項D「3/15病人能說出三種以上富含鐵質的食物」最具體(可測量的病人行為)(D正確)。A「協助下床活動」是措施;B「疼痛緩解」不夠量化;C「能增加纖維質攝取量」未明確量化。故D最具體。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"協助下床是措施,非目標。","B":"「疼痛緩解」不夠量化。","C":"「增加纖維攝取」未量化。","D":"正確(本題答案)。能說出三種富鐵食物最具體。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"114100-N2-28":{"quick":"鼻胃管護理:每日將管子旋轉「不」是45度(是避免同部位受壓、可輕轉並重貼);本題答案D為錯誤。","detail":{"background":"本題官方答案D(錯誤)。鼻胃管護理:A固定管路撕除舊布膠、可用丙酮去膠痕(對);B濕紙巾擦拭、檢查鼻樑皮膚避免長期壓迫(對);C每日將管子輕轉、避免同一部位長時間受壓致壓傷(對)。選項D「鼻胃管拔除時,病人採高坐臥姿勢,請病人發出『阿』的聲音並吐氣」——拔除鼻胃管應請病人「深吸氣後『閉氣』(非發阿吐氣)」快速拔出(避免吸入),故D敘述為錯誤(本題答案)。","options":{"A":"正確。可用丙酮去膠痕。","B":"正確。檢查鼻樑皮膚避免壓迫。","C":"正確。每日輕轉避免同部位受壓。","D":"錯誤(本題答案)。拔管應深吸氣後閉氣,非發阿吐氣。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"114170-N2-8":{"quick":"疼痛/呼吸困難/睡眠紊亂/身體心像中最優先=呼吸困難。","detail":{"background":"多護理問題依「ABC/生命危急」排序:「呼吸困難(影響氧合、最危及生命)」最優先處置(B正確)。疼痛(重要但非立即致命)、睡眠型態紊亂、身體心像紊亂(心理)皆非最優先。故呼吸困難(B)。舒適與護理過程:護理目標=以病人為主、具體可測量有時限;主觀=病人家屬主訴、客觀=觀察測量;直接觀察=親自感官評估(非查病歷);治療性溝通=同理、開放式探詢、治療性沉默;誘尿=聽流水聲/冰塊/按摩恥骨上方(凱格爾是治尿失禁);評值=措施後病人可測量的反應結果。","options":{"A":"疼痛重要但非最危及生命。","B":"正確(本題答案)。呼吸困難(氧合)最優先。","C":"睡眠紊亂非最優先。","D":"身體心像紊亂是心理,非最優先。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"115030-N2-5":{"quick":"退化性關節炎徵詢手術意見:回應「可以告訴我,你的擔心是什麼呢?」(開放式探詢)。","detail":{"background":"病人徵詢是否接受全膝置換術的意見,護理師最適當回應是「可以告訴我,你的擔心是什麼呢?(D)」——用「開放式問句」探詢病人的疑慮與想法,協助其自主決策。A「一定會好」(過度保證)、B「先去做心電圖」(迴避)、C「我會接受醫師建議」(替病人做決定)皆不當。故開放式探詢(D)。","options":{"A":"「一定會好」是過度保證。","B":"「去做心電圖」是迴避問題。","C":"替病人做決定不當。","D":"正確(本題答案)。開放式探詢病人的擔心。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"104100-N2-44":{"quick":"等長運動:預防肌肉萎縮維持肌肉張力(1)、肌肉張力增但無關節活動與長度改變(3)→「13」。","detail":{"background":"等長運動(isometric)特性:1能預防肌肉萎縮、維持肌肉張力、3肌肉張力增加但「無關節活動與肌肉長度的改變」(關節不動、長度不變)。選項2「預防關節僵硬、維持關節活動度」是「等張運動(關節會動)」的功能;4(相關描述)。故等長運動特性為「13」。","options":{"A":"含2(維持關節活動度)屬等張。","B":"含...不符。","C":"正確(本題答案,13)。預防萎縮、張力增但關節長度不變。","D":"含2不符。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"109110-N2-16":{"quick":"客觀資料(objective)=護理師:「病人右側胸管引流液呈淡紅色」(觀察測量)。","detail":{"background":"客觀資料(objective)=護理師「觀察/測量」可得的事實。選項D「護理師:病人右側胸管引流液呈淡紅色」是觀察到的客觀事實(D正確)。A病人主訴「每小時上廁所」、B看護陳述「醒來3~4次」、C「病人說不喜歡下床」皆是「他人陳述(主觀)」。故客觀資料為D。","options":{"A":"病人主訴是主觀資料。","B":"看護陳述是主觀資料。","C":"轉述病人說的是主觀。","D":"正確(本題答案)。觀察引流液顏色是客觀資料。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"111030-N2-48":{"quick":"等長運動「不」是被動性運動(是主動性肌肉收縮);稱屬被動性運動為錯誤。","detail":{"background":"等長運動(isometric):A能促進末梢靜脈血液回流(對);B會陰部肌肉收縮(凱格爾)屬等長運動(對);C適用於上石膏固定之患肢(對,關節不動)。選項D「此運動屬於『被動性』肌肉運動」錯誤——等長運動是病人「主動」收縮肌肉(關節不動),屬「主動性運動」,非被動(被動是他人移動),故D為錯誤敘述(本題答案)。","options":{"A":"正確。促進末梢靜脈回流。","B":"正確。會陰肌肉收縮屬等長。","C":"正確。適用上石膏患肢。","D":"錯誤(本題答案)。等長運動是主動性,非被動。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"112030-N2-6":{"quick":"舒適環境:眼科手術後室內光線應「調暗(柔和)」非明亮;稱調整為明亮為錯誤。","detail":{"background":"舒適醫療環境:A寫護理紀錄時光源來自非慣用手後上方(對,避免陰影);B支氣管炎病人病房濕度約「50~60%」(選項稱80%偏高,但本題答案為D);C病房濕度太低時可塗乳液保濕(對)。選項D「眼科手術後病人室內光線應調整為明亮」錯誤——眼科(如白內障/青光眼)術後應「光線柔和、稍暗」避免刺激眼睛,非明亮,故D為錯誤敘述(本題答案)。","options":{"A":"正確。光源來自非慣用手後上方。","B":"濕度宜約50~60%(本題以D為錯誤)。","C":"正確。濕度太低可塗乳液。","D":"錯誤(本題答案)。眼科術後光線應柔和稍暗,非明亮。"},"sources":["新文京《基本護理學》病人安全","華杏《最新基本護理學》跌倒預防與環境安全"]}},"114030-N2-29":{"quick":"左側無力坐輪椅:下床前測脈搏呼吸視需要量血壓(1)、輪椅放健側與床尾呈90度(2)→「12」。本題答案D=14。","detail":{"background":"本題官方答案D(14)。左側無力病人坐輪椅:1下床前測脈搏、呼吸並視需要量血壓(防姿位性低血壓,對)、4(相關正確項)。選項2「輪椅放在病人『左側(患側)』床尾」不當(應放『健側右側』利健側施力轉位)。故正確組合為「14」(下床前測生命徵象等)。核心:輪椅放健側、下床前測生命徵象、椅背與床尾呈45度。","options":{"A":"23組合不符。","B":"24組合不符。","C":"含2(輪椅放患側)不符。","D":"正確(本題答案,14)。下床前測生命徵象等。"},"sources":["新文京《基本護理學》舒適與護理過程","華杏《最新基本護理學》舒適照護"]}},"115030-N2-23":{"quick":"坐臥姿「不」適用於腹部大出血病人(應平躺/休克姿);稱適用腹部大出血為錯誤。","detail":{"background":"協助病人採坐臥姿:A適用於腹水病人(對,減輕橫膈壓迫呼吸);C需預防姿位性低血壓(對);D需預防薦骨處受壓(對)。選項B「適用於腹部大出血病人」錯誤——腹部大出血(疑休克)應採「平躺或休克姿(垂頭仰臥、下肢抬高)」增加回心血量與腦灌流,坐臥姿會降低腦部血流、加重休克,故B為錯誤敘述(本題答案)。","options":{"A":"正確。腹水病人適用坐臥姿。","B":"錯誤(本題答案)。腹部大出血應平躺/休克姿,非坐臥。","C":"正確。需預防姿位性低血壓。","D":"正確。需預防薦骨受壓。"},"sources":["新文京《基本護理學》姿勢與擺位","華杏《最新基本護理學》臥位與防護設備"]}}},TO=["1身體力學移位轉位與職業傷害", "2臥位姿勢擺位與防護設備", "3關節運動與肌力", "4約束", "5跌倒預防與病人安全環境", "6睡眠與休息", "7舒適與綜合照護"],LEC={"1身體力學移位轉位與職業傷害":{"html":"\n<p><b>身體力學原則:</b><b>擴大底面積</b>(雙腳分開)、<b>降低重心</b>(屈膝、髖膝微彎)、<b>重心靠近</b>病人/物品(縮短力臂省力)、用<b>大肌肉群</b>(臀腿比手腕背肌不易疲勞)、保持<b>脊柱平直</b>(勿彎腰)、用<b>拉/滑取代抬舉</b>、移病人床高調至<b>護理師腰部</b>、面對移動方向。重心遠離支點時所需力量增加(費力)。</p>\n<p><b>輪椅轉位:</b>輪椅放<b>健側</b>;下床放<b>床尾</b>、返床放<b>床頭</b>;椅背與床尾呈45度;站起轉向時用腿臀肌;下床前測脈搏呼吸血壓(防姿位性低血壓)。</p>\n<p><b>移床/移位:</b>往床頭移先稍抬起避免拖拉(減<b>剪力</b>防壓瘡);三人移意識不清者最高者排床頭側、整體一致移動。</p>\n<p><b>職業傷害:</b>下背痛預防——人因工程設備(滑板、轉位腰帶)、運動加強背肌、正確螢幕鍵盤手肘位置(不良姿勢會致物理性危害)。</p>\n"},"2臥位姿勢擺位與防護設備":{"html":"\n<p><b>受壓部位:</b><b>仰臥</b>=枕骨、肩胛、薦骨、足跟、肘;<b>側臥</b>=耳、肩峰、髖骨側、外踝;<b>俯臥</b>=髂前上棘;<b>半坐臥</b>=坐骨結節、薦骨、肩胛、足跟。每<b>2小時</b>翻身。</p>\n<p><b>防護設備:</b><b>粗隆捲軸</b>(放髖部外側防髖外旋)、<b>足托板</b>(維持踝90度防垂足)、<b>手捲軸</b>(手指微彎防垂腕/攣縮)、砂袋(固定/加壓止血)、床上護架(撐被蓋避免接觸患部,非固定姿勢)、床上桌(呼吸困難前傾伏靠)。各臥姿關節應微彎(功能位置)、給予支托、頭頸脊椎成一直線。</p>\n<p><b>特殊臥位:</b><b>膝胸臥</b>(矯正子宮後傾/產後復原/腸阻塞灌腸)、<b>辛氏臥(3/4俯臥)</b>(肛門檢查/昏迷分泌物引流)、<b>截刀式</b>(痔瘡手術,胸部受壓)、<b>垂頭仰臥</b>(休克)、<b>坐臥</b>(呼吸困難/流鼻血頭前傾)、<b>去枕仰臥</b>(腰椎穿刺後)。脊椎病人用<b>圓滾木翻身</b>保持脊椎平直、雙膝間夾枕。</p>\n"},"3關節運動與肌力":{"html":"\n<p><b>肌力分級(MMT/Lovett):</b>0=無收縮;<b>1微弱(trace)</b>=收縮但無法移動關節→<b>被動運動</b>;<b>2不佳(poor)</b>=可移動但不抗地心引力→<b>協助性主動運動</b>;<b>3尚可(fair)</b>=可抗地心引力→<b>主動運動</b>;<b>4佳(good)</b>=抗部分阻力→<b>加阻力運動</b>;5正常。</p>\n<p><b>等長運動(isometric):</b>肌肉收縮、<b>關節不動、長度不變、張力增</b>;促血循防萎縮血栓、<b>適用上石膏患肢</b>(壓膝、握拳、會陰收縮);屬主動運動;但不能維持關節活動度。</p>\n<p><b>等張運動(isotonic):</b>肌肉收縮、<b>關節活動、長度改變</b>(走路騎車打籃球);維持關節活動度、增肌肉強度、改善心肺。</p>\n<p><b>全關節運動(ROM):</b>每日2~3次、每關節達最大範圍、關節前後須支托、避免過度疲勞疼痛、可用健側幫患側、站患側操作。旋前/旋後是前臂動作(非髖肩);外翻是足踝動作(非肩)。</p>\n"},"4約束":{"html":"\n<p><b>約束原則:</b><b>必須依醫囑</b>執行(屬<b>依賴性功能</b>,非獨立性)、向病人家屬解釋並取得<b>知情同意</b>、約束部位先以<b>棉墊保護</b>、以<b>平結(活結)固定於床架</b>(不可綁床欄/可移動設備)、鬆緊度以能<b>伸入1~2根手指</b>、肢體保持功能位置(微彎非完全伸直)。</p>\n<p><b>觀察(C.T.M.S.):</b><b>C</b>=Color顏色、<b>T</b>=Temperature溫度、<b>M</b>=Motion活動能力、<b>S</b>=Sensation感覺;每<b>15~30分鐘</b>觀察末梢循環、每<b>2小時鬆開一次</b>並改變姿勢。</p>\n<p><b>目的:</b>預防意識不清/躁動病人因拉扯(拔管抓傷)傷害自己或他人;<u>絕非處罰</u>、不能增強肌力(反致萎縮)。<b>譫妄躁動先評估排除原因、環境安全措施,約束是最後手段</b>(末期病人尤應避免)。</p>\n"},"5跌倒預防與病人安全環境":{"html":"\n<p><b>跌倒高危群:</b>老人、幼兒、虛弱、用藥者(<b>利尿劑、降血壓劑、瀉劑、鎮靜安眠藥</b>致頭暈頻尿姿位性低血壓;退燒劑較不致跌倒)。</p>\n<p><b>預防措施:</b><b>放低床面</b>(非升高)、使用<b>床欄與呼叫鈴</b>、<b>夜間照明(夜燈)</b>、地面乾燥防滑(浴室止滑墊、固定洗澡椅)、穿防滑鞋、漸進式下床、便盆椅勿置床邊;<b>浴廁與樓梯</b>是跌倒常見地點。</p>\n<p><b>走失/譫妄:</b>定向感障礙/失智者安置<b>靠近護理站</b>(便於觀察);不可鎖門(違反安全消防)。<b>跌倒處置:立即評估意識、受傷情形並拉紅燈求救</b>。舒適環境:濕度約50~60%、眼科術後光線柔和、躁症布置藍綠色系。</p>\n"},"6睡眠與休息":{"html":"\n<p><b>睡眠週期:</b>每週期約<b>90分鐘</b>、每晚<b>4~6個週期</b>;由NREM+REM組成。</p>\n<p><b>NREM(非快速動眼,1~4期):</b>逐漸深睡,第3~4期為<b>深睡(δ波)</b>、生命徵象(呼吸血壓心跳)下降、副交感主導、<b>生長激素分泌、組織修復、消除身體疲勞</b>;尿床夢遊發生於深睡期。</p>\n<p><b>REM(快速動眼):</b>腦波似清醒(β波)、<b>肌肉張力最低</b>、<b>做夢且醒後最易記得</b>、心跳血壓呼吸上升波動、胃酸分泌增、<b>鞏固記憶與學習</b>;後半夜REM漸增。</p>\n<p><b>睡眠衛教:</b>規律作息、<b>白天勿多睡/午睡</b>、睡前2~4小時少喝水排空膀胱、<b>集中式護理減少夜間打擾</b>、介紹新環境增
