之敘述,何者錯誤?","options":{"A":"正常人的心包膜液約為20 mL,創傷性急性心包膜填塞積液一旦達40 mL,壓力便會急速上升","B":"窄縮性心包膜炎(constrictive pericarditis)與限制性心肌病變(restrictivecardiomyopathy)的鑑別診斷往往需要藉由右側心導管的壓力追蹤圖來區分","C":"在次發性惡性心包膜積液(secondary malignant pericardial effusion)的病人中,男性及女性皆以肺癌最為常見","D":"因為窄縮性心包膜炎(constrictive pericarditis)而接受心包膜切除手術(pericardiectomy)的病人中,以radiation-induced的窄縮性心包膜炎(constrictivepericarditis)預後最佳"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"104090-20","topic":"體外循環‧心肌保護‧腫瘤","topic_code":"T7","id":"104090-20","q_num":20,"src":"民國104年第二次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":21,"stem":"單純性主動脈窄縮症(isolated coarctation of aorta)之手術治療,可以包括下列那些術式?1開放性動脈導管置放支架(stent)  2鎖骨下動脈皮瓣主動脈成形術(subclavian flapaortoplasty)  3布塊擴大術(patch augmentation) 4廣泛切除窄縮部分再兩端吻合(extended resection with primary anastomosis)","options":{"A":"12","B":"13","C":"14","D":"234"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"104090-21","topic":"先天性心臟病外科","topic_code":"T4","id":"104090-21","q_num":21,"src":"民國104年第二次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":23,"stem":"下列病人需要接受二尖瓣膜置換手術,何者建議使用生物組織瓣膜(bioprosthetic tissuevalve)?","options":{"A":"18歲的年輕人","B":"40歲病人合併長期規則洗腎以及高血鈣症","C":"40歲病人合併慢性心房震顫且長期規則服用抗凝血劑","D":"70歲病人合併慢性肺氣腫"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"104090-23","topic":"瓣膜性心臟病外科","topic_code":"T2","id":"104090-23","q_num":23,"src":"民國104年第二次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":9,"stem":"心包填塞(cardiac tamponade)是下列那一個情形?中心靜脈壓(central venous pressure),動脈壓(arterial blood pressure),心輸出量(cardiac output),混合靜脈血氧飽和度(mixed venous oxygenation saturation)中心靜脈壓動脈壓心輸出量混合靜脈血氧飽和度A↓↓↓↓B↑↓↓↓C↑↓↓↑D↑↑↑↓","options":{"A":"A","B":"B","C":"C","D":"D"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"105 mal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106020-23","topic":"機械循環支持與心臟移植","topic_code":"T5","id":"106020-23","q_num":23,"src":"民國106年第一次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":24,"stem":"下列關於急性主動脈剝離症的敘述,何者正確?1主動脈剝離的範圍若僅包含胸部降主動脈,則大多需手術 2主動脈剝離的範圍若包含胸部升主動脈,則大多需緊急手術 3主動脈剝離的範圍若僅包含胸部降主動脈,大多不可用主動脈內徑血管支架(endovascular stent grafts)治療 4主動脈剝離的範圍若包含胸部升主動脈,大多不可用主動脈內徑血管支架(endovascular stent grafts)治療","options":{"A":"123","B":"僅13","C":"24","D":"僅4"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106020-24","topic":"主動脈疾病","topic_code":"T3","id":"106020-24","q_num":24,"src":"民國106年第一次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":25,"stem":"一位 69歲男性病人因急性心肌梗塞住院。五天後,病人呼吸較喘,身體檢查顯示有新的心尖部心縮期雜音、血壓80/50mmHg、中心靜脈壓 30 mmHg、胸部 X 光顯示肺水腫現象。下列敘述何者錯誤?1診斷為心室中隔破裂 2須裝置主動脈內氣球幫浦 3不須緊急手術 4手術死亡率約10%至20%","options":{"A":"123","B":"僅13","C":"24","D":"僅4"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"106020-25","topic":"心肌梗塞機械性併發症","topic_code":"T8","id":"106020-25","q_num":25,"src":"民國106年第一次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":26,"stem":"有關主動脈瓣膜置換的手術適應症,下列何者錯誤?","options":{"A":"一旦有症狀且合併嚴重主動脈瓣膜逆流,需要手術","B":"無症狀但合併嚴重主動脈瓣膜逆流及左心室射出比率< 50%,需要手術","C":"嚴重主動脈瓣膜逆流且合併三條冠狀動脈疾病,需要手術","D":"無症狀但合併主動脈瓣膜逆流、左心室射出比率> 50%及end-diastolic dimention < 70 mm,需要手術"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106020-26","topic":"瓣膜性心臟病外科","topic_code":"T2","id":"106020-26","q_num":26,"src":"民國106年第一次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":14,"stem":"下列關於心臟瓣膜置換手術中,置換瓣膜(prosthetic valve)的選擇,何者正確?1計畫生育之年輕女性患者可選擇機械型瓣膜(mechanical prosthesis) 2年齡大於70歲患者可選擇生物組織型瓣膜(bioprosthesis)3血友病患者可選擇機械型瓣膜 4尿毒症患者且須長期血液透析,可選擇組織型瓣膜","options":{"A":"123","B":"僅13","C":"24","D":"僅4"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106080-14","topic":"瓣膜性心臟病外科","topic_code":"T2","id":"106080-14","q_num":14,"src":"民國106年第二次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":16,"stem":"下列有關冠狀動脈疾病病人之處置,何者錯誤?","options":{"A":"三條冠狀動脈疾病之糖尿病病人接受冠狀動脈繞道手術,比接受支架置放術具有較好的長期存活","B":"多條血管冠狀動脈疾病病人的治療方面,經皮冠狀動脈處置(percutaneous coronary intervention)與冠狀動脈繞道手術皆比藥物治療有顯著的生存利益","C":"高嚴重性冠狀動脈疾病病人若以經皮冠狀動脈處置治療,其再處置率較接受冠狀動脈繞道手術者為高","D":"具有高風險的特徵(例如:糖尿病、左心室功能異常、腎功能異常、年老、慢性肺病、周邊動脈疾病)的多條血管冠狀動脈疾病病人接受冠狀動脈繞道手術比接受經皮冠狀動脈處置具有較差的長期存活率"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106080-16","topic":"冠狀動脈繞道(CABG)","topic_code":"T1","id":"106080-16","q_num":16,"src":"民國106年第二次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":45,"stem":"病患經過處理之後狀況逐漸改善,不幸的是,在術後五天之後又再度高燒不退,下列處置何者錯誤?","options":{"A":"血球檢查、胸部X光、尿液分析和血液培養","B":"若懷疑是導管相關感染,拔掉導管同時並給予vancomycin 或是linezolid","C":"假如懷疑是心內膜炎(endocarditis),至少要給予抗生素四到六週","D":"若是嚴重的敗血症或是免疫抑制(immunosuppression)的病人,抗生素藥效須涵蓋gram-positive cocci和fungus"},"answer":"D","answer_status":"多重答案","accepted_answers":["B","D"],"correction_note":"第45題答Ｂ、Ｄ給分","images":[],"_id":"106080-45","topic":"瓣膜性心臟病外科","topic_code":"T2","id":"106080-45","q_num":45,"src":"民國106年第二次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":19,"stem":"下圖45歲男性,急性冠狀動脈阻塞導至心因性休克,緊急做完冠狀動脈繞道手術後,心臟收縮能力不好,因此放上了主動脈氣球幫浦及葉克膜氧合器,送往加護病房觀察,左腳六個小時後發現有鼓脹的情形,下列敘述何者錯誤?1肢端的脈搏先確認 2有可能血液中肌酸激酶(CK)會提高 3可以量測腔室的壓力,若大於20 mmHg可能要作筋膜切開手術 4小腿有五個腔室:anterior、deep posterior、superficial posterior、lateral和medial","options":{"A":"僅12","B":"23","C":"34","D":"124"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"107020-19","topic":"機械循環支持與心臟移植","topic_code":"T5","id":"107020-19","q_num":19,"src":"民國107年第一次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":21,"stem":"何種類型的心房中膈缺損(atrial septal defect)最常合併部份肺靜脈回流異常(partial abnormal pulmonaryvenous return)?","options":{"A":"primum type","B":"secondum type","C":"sinus venosus type","D":"coronary septal defect type"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"107020-21","topic":"先天性心臟病外科","topic_code":"T4","id":"107020-21","q_num":21,"src":"民國107年第一次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":22,"stem":"下列有關原發性心臟內腫瘤之敘述,何者錯誤?","options":{"A":"原發性心臟內腫瘤約25%為良性,約75%為惡性","B":"成人最常見原發性良性心臟內腫瘤為myxoma","C":"15歲以下孩童最常見原發性良性心臟內腫瘤為rhabdomyoma","D":"即便是原發性良性心臟內腫瘤,一旦有心衰竭、栓塞症狀及感染心內膜炎,便要考慮手術治療"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"107020-22","topic":"體外循環‧心肌保護‧腫瘤","topic_code":"T7","id":"107020-22","q_num":22,"src":"民國107年第一次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":23,"stem":"下列有關主動脈剝離(aortic dissection)之敘述,何者錯誤?","options":{"A":"主動脈剝離病人往往合併有高血壓或主動脈瓣膜疾病","B":"診斷的方式包含主動脈攝影、食道超音波、電腦斷層或核磁共振,診斷的sensitivity及specificity皆有80%以上","C":"凡是急性升主動脈剝離(acute type A aortic dissection),需要馬上接受手術治療","D":"在 type A或type B主動脈剝離產生的器官灌注不良(mal-perfusion syndrome)中,以腦部及腸道最常見"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107020-23","topic":"主動脈疾病","topic_code":"T3","id":"107020-23","q_num":23,"src":"民國107年第一次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":24,"stem":"一位56歲男性病人因胸悶住院。他有糖尿病、高血壓、與抽菸史。冠狀動脈血管攝影檢查顯示左冠狀動脈主幹 85% 狹窄、左前降支 80%狹窄、左回旋支 77%狹窄、右冠狀動脈 90%狹窄。下列敘述何者正確?1依冠狀動脈血管攝影檢查前家屬之決定,立即裝置塗藥支架(drug-eluting stent) 2冠狀動脈血管攝影檢查時,經與家屬商量後,立即裝置裸金支架(bared-metal stent) 3裝置支架前,不須請心臟外科醫師向病人及其家屬解釋冠狀動脈繞道手術之優缺點 4裝置支架時,手術室須準備好,以便可立即進行緊急手術","options":{"A":"123","B":"僅13","C":"24","D":"僅4"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107020-24","topic":"冠狀動脈繞道(CABG)","topic_code":"T1","id":"107020-24","q_num":24,"src":"民國107年第一次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":25,"stem":"下列關於不停跳冠狀動脈繞道手術(off-pump coronary artery bypass grafting)的敘述,何者正確?1須使用heparin 2人工心肺機不需待命 3不須降低體溫 4不會引發腦中風","options":{"A":"123","B":"僅13","C":"24","D":"僅4"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"107020-25","topic":"冠狀動脈繞道(CABG)","topic_code":"T1","id":"107020-25","q_num":25,"src":"民國107年第一次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":73,"stem":"胸降主動脈損傷,胸部X-ray影像學徵象,下列何者較少見?","options":{"A":"主動脈邊界模糊(blurring of the aortic contour)","B":"氣管偏向左邊(tracheal shift to the left)","C":"血胸(hemothorax)","D":"縱隔腔寬度增加(widening of the mediastinum)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"107020-73","topic":"主動脈疾病","topic_code":"T3","id":"107020-73","q_num":73,"src":"民國107年第一次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":18,"stem":"有關嚴重二尖瓣膜逆流(severe mitral regurgitation)之敘述,下列何者錯誤?","options":{"A":"在急性嚴重二尖瓣膜逆流併心臟衰竭時,應考慮提早接受手術治療","B":"在有症狀之慢性原發性嚴重二尖瓣膜逆流(primary mitral regurgitation)之病患,藥物治療只能改善症狀,無法改變長期預後","C":"慢性原發性嚴重二尖瓣膜逆流(primary mitral regurgitation)之外科治療,以長期預後而言,瓣膜置換優於瓣膜修補","D":"對於功能性嚴重二尖瓣膜逆流(functional mitral regurgitation),因屬於左心室功能問題,即使接受外科瓣膜手術後,其預後仍然比原發性二尖瓣膜逆流手術後結果差"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"107080-18","topic":"瓣膜性心臟病外科","topic_code":"T2","id":"107080-18","q_num":18,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":19,"stem":"有關二尖瓣嚴重狹窄(severe mitral stenosis)之治療,下列何者錯誤?","options":{"A":"有無徵狀的嚴重二尖瓣狹窄(mitral stenosis)都應該接受介入性的手術治療","B":"嚴重的二尖瓣狹窄大都以風濕性心臟病(rheumatic heart disease)為主","C":"利用體外循環之下行二尖瓣膜連合處切開術(open mitral commissurotomy, OMC)是手術選項之一","D":"當無法實行二尖瓣膜連合處切開術時,二尖瓣膜置換手術(mitral valve replacement)也是外科治療選項之一"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"1070 cepted_answers":["B"],"correction_note":"","images":[],"_id":"108030-21","topic":"主動脈疾病","topic_code":"T3","id":"108030-21","q_num":21,"src":"民國108年第一次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":18,"stem":"下列何者為主動脈氣球幫浦(intra-aortic balloon pump)的最佳使用時機?","options":{"A":"急性升主動脈剝離合併急性重度主動脈瓣逆流","B":"升主動脈瘤合併慢性重度主動脈瓣逆流","C":"二尖瓣腱索斷裂合併急性重度二尖瓣逆流","D":"感染性腹主動脈瘤合併敗血性休克"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"108080-18","topic":"機械循環支持與心臟移植","topic_code":"T5","id":"108080-18","q_num":18,"src":"民國108年第二次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":19,"stem":"一位65歲男性病人因左前胸痛至急診室求診,下列敘述何者正確?1急性主動脈剝離為鑑別診斷之一2若診斷急性B型主動脈剝離,可考慮以主動脈內血管支架(endovascular aortic graft)治療3若診斷急性心肌梗塞,須考慮經皮冠狀動脈處置(percutaneous coronary intervention)4若診斷急性心肌梗塞,須立即執行冠狀動脈繞道術","options":{"A":"123","B":"134","C":"僅24","D":"僅4"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"108080-19","topic":"主動脈疾病","topic_code":"T3","id":"108080-19","q_num":19,"src":"民國108年第二次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":51,"stem":"一位2星期大的男嬰,出生時體重3000 gm,Apgar score 8至9分,身體檢查並沒有發現異常現象。幾天前,開始有呼吸急促及發紺的現象,急送某醫學中心。經心臟超音波檢查發現病人有肺動脈瓣閉鎖的現象,經投予前列腺素靜脈注射,病人的發紺改善了。改善的原因為何?","options":{"A":"肺動脈瓣打開,改善肺動脈血流","B":"開放性動脈導管再度打開,改善肺動脈血流","C":"經由心房中隔缺損,肺動脈血流增加","D":"經由體動脈至肺動脈之側枝循環,增加肺動脈血流"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"108080-51","topic":"先天性心臟病外科","topic_code":"T4","id":"108080-51","q_num":51,"src":"民國108年第二次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":52,"stem":"在考慮進一步手術治療方式前,再仔細作超音波檢查,發現他的右心室發育不良,沒有心室中隔缺損,右心室竇(sinusoid)與左冠狀動脈有相通,作心導管檢查,右心室攝影時,顯影劑在心縮期,可進入左冠狀動脈,且看到左主冠狀動脈出口有狹窄。綜合這些檢查結果,那一種手術治療的方式最佳?","options":{"A":"肺動脈瓣切開術","B":"Blalock-Taussig分流術","C":"利用體外循環幫忙,作跨肺動脈環部布塊(transannular patch)來擴大右心室出口徑","D":"肺動脈瓣切開術加Blalock-Taussig分流術"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"108080-52","topic":"先天性心臟病外科","topic_code":"T4","id":"108080-52","q_num":52,"src":"民國108年第二次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":53,"stem":"依此病人心臟狀態,他最後的手術矯正方式,可以朝著那個方向進行?","options":{"A":"維持兩個心室之修補方式(two-ventricular repair)","B":"只要肺動脈瓣置換就可","C":"單心室之修補方式(single ventricular repair),即全腔靜脈肺動脈吻合術(total  cavopulmonary connection,TCPC)","D":"只要三尖瓣置換就可"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"108080-53","topic":"先天性心臟病外科","topic_code":"T4","id":"108080-53","q_num":53,"src":"民國108年第二次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":18,"stem":"在先天性心臟病的完全矯正,有時需使用帶有瓣膜的同種異體移植物(homograft of pulmonary artery or aorta,valved)來銜接右心室至肺動脈,下列那些先天性心臟病之完全矯正可能需要用到此移植物?1動脈幹症(truncus arteriosus)2肺靜脈回流完全異常3肺動脈瓣閉鎖合併心室中隔缺損4主動脈窄縮症","options":{"A":"12","B":"13","C":"23","D":"14"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109020-18","topic":"先天性心臟病外科","topic_code":"T4","id":"109020-18","q_num":18,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":19,"stem":"一位60歲男性病人因急性心肌梗塞住院。一星期後,病人突然呼吸較喘,流冷汗;身體檢查顯示胸骨左側有新的心縮期雜音、血壓 65/50毫米汞柱(mmHg)、肺動脈壓60/40毫米汞柱、中心靜脈壓(CVP)30毫米汞柱,但意識清楚。下列敘述何者錯誤?1診斷為心室中隔破裂2不須裝置主動脈內氣球幫浦3須緊急手術,但若病人書面拒絕手術,則不可強行手術4若病人意識不清楚,也聯絡不到家屬,經初步治療略有改善,則不可立即手術","options":{"A":"123","B":"僅13","C":"24","D":"僅2"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"109020-19","topic":"心肌梗塞機械性併發症","topic_code":"T8","id":"109020-19","q_num":19,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":47,"stem":"下列病人何者不適合做心臟移植?","options":{"A":"嚴重且反覆的心臟衰竭症狀,且左心室射出率(ejection fraction, LVEF)<20%","B":"嚴重心肌缺血無法以傳統冠狀動脈繞道手術治療者","C":"心臟衰竭已使用葉克膜(ECMO)等心臟輔助器,且無法斷離者","D":"複雜的先天性心臟病,可以用傳統手術矯正者"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"109020-47","topic":"機械循環支持與心臟移植","topic_code":"T5","id":"109020-47","q_num":47,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":51,"stem":"一個4個月大的女嬰,母親是高齡產婦,女嬰出生時並無發紺現象,出生體重2500 gm,一個月後嬰兒呈現呼吸急促,食慾不佳,有盜汗現象,經醫師檢查,呼吸及心跳速率皆增加,胸骨左側可聽到心縮期雜音,肝臟也有腫大現象。心臟超音波檢查發現有左至右的分流,肺動脈壓增高,經投予藥物治療數星期之後,臨床症狀改善有限,且體重只有3500 gm,醫師建議手術治療。下列那些手術方式對此病患有幫助?1Blalock-Taussig分流手術2完全矯正(total correction)3肺動脈環縮術(PA banding)4肺動脈瓣切開術","options":{"A":"12","B":"23","C":"14","D":"13"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109020-51","topic":"先天性心臟病外科","topic_code":"T4","id":"109020-51","q_num":51,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":52,"stem":"若病人沒有接受手術。數年之後,病人呈發紺現象,經超音波檢查發現有右至左的分流現象,會造成此現象主要的原因為何?","options":{"A":"肺動脈血管壁硬化,使肺動脈血管阻力增加","B":"心室中隔缺損變小,肺動脈血流減少","C":"肺靜脈血管開口變狹窄,使肺動脈血管阻力增加","D":"三尖瓣逆流,使肺動脈血流減少"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"109020-52","topic":"先天性心臟病外科","topic_code":"T4","id":"109020-52","q_num":52,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":53,"stem":"病人父母問目前若無接受手術治療,未來可能須進行何種手術治療?","options":{"A":"心室中隔缺損擴大術","B":"心肺移植術","C":"三尖瓣置換術","D":"肺靜脈血管氣球擴張術"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109020-53","topic":"先天性心臟病外科","topic_code":"T4","id":"109020-53","q_num":53,"src":"民國109年第一次","img":""},{"exam_code":"109080","roc_year":109,"exam_round":"第二次","num":21,"stem":"下列開心手術中所使用的體外循環技術(extracorporeal perfusion),何者錯誤?","options":{"A":"在啟動體外循環之前必須施打肝素(heparin)約300~400 units/kg,以使activated clotting time(ACT)能大於450秒","B":"在正常的體溫下,一般體循環機必須提供每分鐘每平方公尺2.4升心輸出量(2.4 L/min/m2),體溫下降10°C,則體內氧氣消耗量可減少50%左右","C":"因體外循環技術可以提供心臟外科醫師一個幾近無血乾淨的手術環境,以便能從事各種瓣膜手術、冠狀動脈手術及大血管手術;因此使用體外循環技術時間是沒有限制的","D":"體外循環技 ":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":16,"stem":"下列那些先天性心臟病若不及時手術,可能會發生所謂的Eisenmenger syndrome,最後需要心肺移植?1肺動脈瓣狹窄  2心室中隔缺損  3動脈幹症(truncus arteriosus)  4開放性動脈導管","options":{"A":"僅12","B":"僅13","C":"123","D":"234"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110020-16","topic":"先天性心臟病外科","topic_code":"T4","id":"110020-16","q_num":16,"src":"民國110年第一次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":17,"stem":"在急性主動脈剝離(aortic dissection)的治療上,下列敘述何者錯誤?","options":{"A":"在高度懷疑為主動脈剝離之情形下,可先實行降低心跳及控制血壓之藥物治療(anti-pulse therapy and bloodpressure control)","B":"對急性史丹佛A型(Stanford type A)之主動脈剝離病患,應考慮進行緊急主動脈置換手術","C":"對急性史丹佛B型(Stanford type B)之主動脈剝離合併有器官供血不足(malperfusion)之病患,應立即考慮介入性血管內主動脈支架術(endovascular treatment)之可能性","D":"對於急性史丹佛A型(Stanford type A)之主動脈剝離合併有器官供血不足的病患,與無器官供血不足者,兩者之預後相同"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110020-17","topic":"主動脈疾病","topic_code":"T3","id":"110020-17","q_num":17,"src":"民國110年第一次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":18,"stem":"有關心臟手術時使用人工心肺機之敘述,下列何者錯誤?","options":{"A":"可以升降體溫","B":"合併心臟麻痺液(cardioplegia)使用,可以讓心臟完全停止跳動","C":"氧合器(oxygenator)可以暫時取代肺臟功能","D":"不會引發全身發炎反應症候群(systemic inflammatory response syndrome, SIRS)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110020-18","topic":"體外循環‧心肌保護‧腫瘤","topic_code":"T7","id":"110020-18","q_num":18,"src":"民國110年第一次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":19,"stem":"68歲農婦因右手輕微無力伴隨下肢輕微水腫來診,經診斷為二尖瓣狹窄(mitral stenosis),超音波顯示為心房顫動(atrial fibrillation)且瓣膜開口為1.35 cm2,過去有右側膿胸且經開胸治療之病史,下列敘述或處置何者正確?1中風之故,不應給與抗凝血劑,如warfarin 2應建議進行心導管檢查 3進行瓣膜手術,且可同時進行迷宮手術(Cox-Maze procedure) 4可選擇胸腔鏡或小傷口內視鏡進行手術","options":{"A":"僅14","B":"234","C":"123","D":"僅23"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_n n of great arteries with ventricular septal defect)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111020-30","topic":"先天性心臟病外科","topic_code":"T4","id":"111020-30","q_num":30,"src":"民國111年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":32,"stem":"一位25歲年輕人和人爭吵,對方拿出水果刀刺向他的心窩,送至急診室,呈現休克狀況,醫師理學檢查發現劍突上方有1公分之傷口,兩側外頸靜脈鼓張,兩側呼吸聲一致,以下處置,那一項不適合?","options":{"A":"立即做心臟超音波,以診斷是否有心包膜填塞症(cardiac tamponade)","B":"考慮做心包膜腔穿刺術(pericardiocentesis)","C":"若病人血壓已經量不出來,考慮立即開胸術(thoracotomy)","D":"安排移動式胸部X光照射(portable chest X-ray)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111020-32","topic":"心臟外傷與心包填塞","topic_code":"T6","id":"111020-32","q_num":32,"src":"民國111年第一次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":2,"stem":"張力性氣胸(tension pneumothorax)與心包膜積血都可能合併頸靜脈鼓脹,下列何者最能幫助鑑別診斷?","options":{"A":"胸部是否有呼吸聲","B":"肋骨是否有骨折","C":"心音是否清晰","D":"心跳是否加速"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"111080-2","topic":"心臟外傷與心包填塞","topic_code":"T6","id":"111080-2","q_num":2,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":20,"stem":"有關主動脈瓣置換手術的適應症,下列何者最不適當?","options":{"A":"有症狀的嚴重主動脈瓣狹窄之病人,可進行主動脈瓣置換手術","B":"中度主動脈瓣狹窄(moderate aortic stenosis)合併冠狀動脈阻塞需進行繞道手術之病人,可進行主動脈瓣置換手術","C":"無症狀的嚴重主動脈瓣狹窄合併左心室收縮功能<50%之病人,可進行主動脈瓣置換手術","D":"為預防猝死,在無症狀的嚴重主動脈瓣狹窄之病人,可進行主動脈瓣置換手術"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-20","topic":"瓣膜性心臟病外科","topic_code":"T2","id":"111080-20","q_num":20,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":21,"stem":"關於主動脈瘤(aortic aneurysm),下列敘述何者正確?","options":{"A":"依組織完整性可分為真動脈瘤(true aneurysm)及假性動脈瘤(pseudoaneurysm),定義為aortic wall tissue 是否完整,兩者的手術適應症是相同的","B":"感染是形成動脈瘤的原因之一,常被稱為mycotic aneurysm,最常見的感染源為fungus","C":"不管是open 或endovascular repair of thoracoabdominal aneurysm,cerebrospinal fluid drainage 皆有脊髓保護效果","D":"對於直徑3 公分的主動脈瘤應持續於門診追蹤,若病人無出現新的症狀,應每三個月密集行追蹤影像檢查"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111080-21","topic":"主動脈疾病","topic_code":"T3","id":"111080-21","q_num":21,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":23,"stem":"有關主動脈瓣或二尖瓣狹窄之敘述,下列何者錯誤?","options":{"A":"主動脈瓣開口小於1 cm2,且走路會喘,可建議置換","B":"二尖瓣開口小於1.5 cm2,使用二尖瓣氣球擴張成效不佳,應該建議置換","C":"現在對主動脈瓣及二尖瓣狹窄皆有成熟且經核准之經導管置換瓣膜技術,以減少手術風險","D":"主動脈瓣狹窄比二尖瓣狹窄惡化進展快,猝死死亡率也高"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111080-23","topic":"瓣膜性心臟病外科","topic_code":"T2","id":"111080-23","q_num":23,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":24,"stem":"50 歲男性,因喘及腳腫兩個月入院,心臟超音波檢查有左心房右心房擴大,左心功能 55%,中心靜脈壓為22mmHg,肺壓為40/20 mmHg,導管壓力曲線有“square-root sign”,且電腦斷層顯示其心包膜厚度有5 mm,下列何者為最可能之診斷?","options":{"A":"右心衰竭,併左心衰竭","B":"縮窄性心包膜炎(constrictive pericarditis)","C":"限縮性心肌病變(restrictive cardiomyopathy)","D":"肥厚性心肌病變(hypertrophic cardiomyopathy)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111080-24","topic":"體外循環‧心肌保護‧腫瘤","topic_code":"T7","id":"111080-24","q_num":24,"src":"民國111年第二次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":19,"stem":"關於心臟手術中使用的體外循環(cardiopulmonary bypass),下列敘述何者錯誤?","options":{"A":"常見的動脈管路置放位置包含升主動脈、無名動脈、腋動脈或股動脈","B":"當體溫下降至20°C時,體外循環機需提供至少2.4 L/min/m2的流量","C":"可能產生的負面影響包含全身性發炎反應、栓塞、凝血路徑影響、周邊器官功能不足(end-organdysfunction)等","D":"當心臟停跳,血液循環完全依靠體外循環時,呼吸器即可完全暫停"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112020-19","topic":"體外循環‧心肌保護‧腫瘤","topic_code":"T7","id":"112020-19","q_num":19,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":22,"stem":"馬凡氏症(Marfan syndrome)是因體內何蛋白質異常造成?","options":{"A":"elastin","B":"metalloproteinase","C":"collagen","D":"fibrillin"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-22","topic":"主動脈疾病","topic_code":"T3","id":"112020-22","q_num":22,"src":"民國112年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":20,"stem":"主動脈剝離是一項廣為人知的急症,關於其敘述下列何者錯誤?","options":{"A":"當剝離範圍包含主動脈根部(aortic root)時,可能造成急性主動脈瓣閉鎖不全","B":"主動脈剝離依照Stanford的分類,是以intima tear的位置分為type A及type B,type A是指破口位於升主動脈(ascending aorta),type B則是破口位於降主動脈","C":"acute type A aortic dissection須接受緊急開胸手術修補,最主要是為了防止急性升主動脈破裂","D":"acute type B aortic dissection若無合併灌流不足症候群,可先使用藥物控制血壓"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-20","topic":"主動脈疾病","topic_code":"T3","id":"112080-20","q_num":20,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":21,"stem":"有關血管腔内治療腹主動脈瘤(endovascular treatment of abdominal aortic aneurysm)發生滲漏(endoleak)的敘述,下列何者錯誤?","options":{"A":"第一型發生在支架血管近端的接觸區","B":"第二型發生在暢通的腰動脈或是下腸繫膜動脈回流造成","C":"第三型發生在支架血管遠端的接觸區","D":"第四型因為支架血管的織物孔洞而造成"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-21","topic":"主動脈疾病","topic_code":"T3","id":"112080-21","q_num":21,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":23,"stem":"有關心房中隔(atrial septal defect, ASD)之敘述,下列何者錯誤?","options":{"A":"在年齡大於40歲病人的心房中隔缺損,心導管檢查是高度建議的","B":"有心房中隔缺損且固定之肺動脈阻力過高(大於12 Wood units)之病患,不可以將其缺損關閉","C":"在有ASD with inferior sinus venosus type的病患,常併有二尖瓣逆流(mitral regurgitation)","D":"在青春期前的女性,不適合使用右前側開胸術(anterolateral thoracotomy)來修補"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-23","topic":"先天性心臟病外科","topic_code":"T4","id":"112080-23","q_num":23,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":24,"stem":"一個8個月大的男嬰,因主動脈瓣狹窄(aortic stenosis)診斷入院,因呼吸喘而插管,左心室到主動脈壓力差為60 mmHg,下列建議之治療方式何者最不適合?","options":{"A":"氣球擴張術(balloon valvuloplasty)","B":"直視下主動脈瓣膜切開術(surgical valvotomy)","C":"機械瓣膜置換術(mechanical valve replacement)","D":"肺動脈瓣轉至主動脈之手術(Ross procedure)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-24","topic":"先天性心臟病外科","topic_code":"T4","id":"112080-24","q_num":24,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":29,"stem":"有關胸腔穿刺傷之外科適應症,下列何者較不適當?","options":{"A":"心包膜填塞(pericardial tamponade)","B":"食道破裂(esophageal perforation)","C":"胸管放置術後馬上引流出500 mL合併生命跡象回穩","D":"氣胸合併持續漏氣及肺部塌陷或通氣不足"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-29","topic":"心臟外傷與心包填塞","topic_code":"T6","id":"112080-29","q_num":29,"src":"民國112年第二次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":19,"stem":"關於冠狀動脈阻塞疾病,下列敘述何者錯誤?","options":{"A":"根據AHA/ACC guideline,戒菸對於預防冠狀動脈阻塞是class I recommendation","B":"接受冠狀動脈繞道手術後,若無絕對禁忌症,建議儘早加上β-blocker","C":"造成acute coronary syndrome,常見的機轉包含plaque rupture、thrombus formation","D":"針對心臟收縮功能低下的病人,加上digoxin 有足夠證據顯示助於降低死亡率"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"113020-19","topic":"冠狀動脈繞道(CABG)","topic_code":"T1","id":"113020-19","q_num":19,"src":"民國113年第一次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":20,"stem":"關於心臟腫瘤,下列敘述何者最適當?","options":{"A":"原發性心臟腫瘤中,惡性多於良性","B":"若為良性腫瘤且病人曾發生栓塞症狀,使用抗凝血劑治療","C":"超過半數的心臟黏液瘤(myxoma)源自左心房的心房中隔","D":"心臟電腦斷層(heart CT)是目前的診斷標準工具"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113020-20","topic":"體外循環‧心肌保護‧腫瘤","topic_code":"T7","id":"113020-20","q_num":20,"src":"民國113年第一次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":21,"stem":"根據Crawford 的胸 epted_answers":["A"],"correction_note":"","images":[],"_id":"114020-20","topic":"心肌梗塞機械性併發症","topic_code":"T8","id":"114020-20","q_num":20,"src":"民國114年第一次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":22,"stem":"對於主動脈剝離(aortic dissection)病人之血壓控制,下列何項處置最不適合?","options":{"A":"靜脈注射短效乙型阻斷劑","B":"靜脈注射甲型及乙型阻斷劑","C":"靜脈注射乙型阻斷劑及血管擴張劑","D":"僅使用血管擴張劑"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114020-22","topic":"主動脈疾病","topic_code":"T3","id":"114020-22","q_num":22,"src":"民國114年第一次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":23,"stem":"67歲男性,吸菸20年,糖尿病5年僅用口服血糖藥治療,因心肌梗塞入院,給了兩種抗血小板藥物,在主動脈幫浦(intra-aortic balloon pumping)支持下血壓80/60 mmHg,左心射出率約35%,且左主冠狀動脈有80%狹窄,左迴旋枝中段多處75%到85%狹窄,右冠狀動脈有兩處80%狹窄,下列建議何者最不適當?","options":{"A":"高度建議先行冠狀動脈繞道術(coronary artery bypass grafting)","B":"可考慮放置更高階機械循環輔助(mechanical circulatory support),如葉克膜、心室輔助器","C":"應該等抗血小板藥效過後,才行手術,減少出血之可能","D":"不停跳之冠狀動脈繞道術式(off-pump CABG)與行心肺機之冠狀動脈繞道術式(on-pump CABG)相比,並無較佳之長期成果"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114020-23","topic":"機械循環支持與心臟移植","topic_code":"T5","id":"114020-23","q_num":23,"src":"民國114年第一次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":24,"stem":"有關機械循環輔助(mechanical circulatory support)之敘述,下列何者錯誤?","options":{"A":"根據IABP-SHOCK II trial報告,主動脈幫浦(IABP)可以對心因性休克之病患,提供比只使用最佳藥物治療更好的存活率","B":"在REMATCH trial報告中,植入型之左心室輔助器,可以對第四級心衰竭病人提供比最佳藥物治療更好的存活率","C":"如果要選擇同時對心肺衰竭都可以支持的循環輔助,只有葉克膜(extracorporeal membraneoxygenation, ECMO)","D":"長效型之心室輔助器(durable ventricular assist device)不但可以用來過渡到心臟移植(bridge to transplant),也被允許做為終極治療(destination therapy)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"114020-24","topic":"機械循環支持與心臟移植","topic_code":"T5","id":"114020-24","q_num":24,"src":"民國114年第一次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":20,"stem":"以剝離侵犯範圍而言,主動脈剝離(aortic dissection)DeBakey type IIIa 與type IIIb 間最大區別在於那一部分的主動脈?","options":{"A":"升主動脈(ascending aorta)","B":"主動脈弓(aortic arch)","C":"降主動脈(descending aorta)","D":"腹主動脈(abdominal aorta)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114070-20","topic":"主動脈疾病","topic_code":"T3","id":"114070-20","q_num":20,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":21,"stem":"40 歲男性病患無任何舊疾及創傷,因左下肢突然出現冰冷、無脈、疼痛且感覺異常至急診室就診。3 個月前心臟超音波報告發現二尖瓣嚴重狹窄且左心房擴大,心律為心房顫動(atrial fibrillation),則下列敘述何者錯誤?","options":{"A":"下肢動脈血管急性血栓阻塞(embolism)最為可能","B":"緊急下肢動脈血管打通後,體內鉀離子濃度將可能上升","C":"若有骨骼肌溶解現象(rhabdomyolysis),將因下肢動脈血管打通後,肌蛋白尿(myoglobinuria)狀況會立即緩解","D":"若缺血時間越久,則下肢動脈血管打通後下肢腫脹得越厲害"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-21","topic":"瓣膜性心臟病外科","topic_code":"T2","id":"114070-21","q_num":21,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":22,"stem":"40 天大男嬰出生後診斷為法洛氏四重症(tetralogy of Fallot),因經皮血氧濃度(oxygen saturation)降至65%,經緊急插管後,下列後續處置何者較不合適?","options":{"A":"給與乙型阻斷劑(beta blocker)","B":"給與輸液(hydration)","C":"給與血管擴張劑(vasodilator)","D":"麻醉鎮定(sedation)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-22","topic":"先天性心臟病外科","topic_code":"T4","id":"114070-22","q_num":22,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":23,"stem":"有關胸主動脈瘤之敘述,下列何者錯誤?","options":{"A":"以現有之觀念,先天性雙主動脈瓣(congenital bicuspid aortic valve)可以視為高危險群,有演變為升主動脈瘤之可能","B":"若女性患者的主動脈瘤最大直徑為7 公分,即可建議手術","C":"升主動脈瘤最大直徑為6 公分,且無主動脈逆流,不一定非進行主動脈根部置換術(aortic rootreplacement)不可,可以考慮行瓣膜保留術式(valve-sparing procedure)","D":"血管內支架術式(endovascular stenting)已成為治療升主動脈瘤之主流,一般以DeBakey 分類來評估是否適合放置支架及有無影響腦部血流的風險"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114070-23","topic":"主動脈疾病","topic_code":"T3","id":"114070-23","q_num":23,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":24,"stem":"有關腹主動脈瘤(abdominal aortic aneurysm)之敘述,下列何者正確?","options":{"A":"若無破裂現象,腹主動脈瘤之最大直徑大於4 公分 ,即可建議手術","B":"血管支架治療比起傳統開腹主動脈置換手術,再次介入(re-intervention)比率低","C":"以住院的手術存活率而言,傳統開腹主動脈置換手術比血管支架治療為低","D":"手術時,下腸繫膜動脈(inferior mesenteric artery)一定要重新再吻合,以減少腸缺血(ischemicbowel)之合併症"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-24","topic":"主動脈疾病","topic_code":"T3","id":"114070-24","q_num":24,"src":"民國114年第二次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":4,"stem":"30 歲女性,因急性心衰竭以及肺水腫至急診就診,心臟超音波檢查發現僧帽瓣前葉腱索斷裂(rupture ofchordae)並且有嚴重僧帽瓣逆流。此僧帽瓣逆流在Carpentier 分類(Carpentier classification)中屬於何種dysfunction?","options":{"A":"Type I","B":"Type II","C":"Type IIIa","D":"Type IIIB"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-4","topic":"瓣膜性心臟病外科","topic_code":"T2","id":"115020-4","q_num":4,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":36,"stem":"所謂急性主動脈綜合症(acute aortic syndrome)不包含下列何者?","options":{"A":"主動脈粥狀動脈硬化(Aortic atherosclerosis)","B":"急性主動脈剝離(Acute aortic dissection)","C":"主動脈壁內血腫(Intramural hematoma)","D":"穿透性主動脈潰瘍(Penetrating aortic ulcer)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"115020-36","topic":"主動脈疾病","topic_code":"T3","id":"115020-36","q_num":36,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":37,"stem":"關於主動脈剝離(aortic dissection, AD)、主動脈壁內血腫(intramural hematoma, IMH)及穿透性主動脈潰瘍(penetrating aortic ulcer, PAU)的敘述,下列何者最不適當?","options":{"A":"急性Type A AD 手術死亡率高,藥物治療無效再考慮手術治療","B":"複雜Type B AD 如器官灌注不良(malperfusion),需考慮手術治療","C":"急性Type A IMH 開刀適應症,應比照急性Type A AD","D":"PAU 應藥物治療優先,但針對PAU 內徑>20 mm 及PAU neck>10 mm,建議儘早手術介入治療"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"115020-37","topic":"主動脈疾病","topic_code":"T3","id":"115020-37","q_num":37,"src":"民國115年第一次","img":""}],E={"103030-23":{"quick":"錯在 C:血液動力學「不穩定」者反而需要人工心肺機支持、不適合不停跳(off-pump),OPCAB 適合的是高風險「穩定」病人(腎功能差、肺氣腫、主動脈鈣化、老年)以避開體外循環與主動脈操作。","detail":{"background":"不停跳冠狀動脈繞道(off-pump CABG, OPCAB)是在跳動心臟上以穩定器(stabilizer)固定局部心肌縫合,不使用人工心肺機(CPB)與主動脈鉗夾,可避免體外循環引發的全身發炎反應、避免主動脈鉗夾造成的栓塞性中風、減少輸血。其「最佳適應症」是高風險、不耐 CPB 或主動脈嚴重鈣化(porcelain aorta)、嚴重 COPD、腎功能不良的病人。但需要良好的血液動力學穩定度與外科技術;心因性休克、血壓不穩、要做心臟移位顯露側壁/後壁時容易惡化,反而需要 on-pump 支持。大型試驗(ROOBY、CORONARY、GOPCABE)顯示 OPCAB 長期通暢率與存活並未優於 on-pump。","options":{"A":"正確:OPCAB 避開 CPB 全身發炎,術後心房顫動(AF)發生率較低。","B":"正確:不用 CPB、不需全身肝素中和大量血液稀釋,術中術後輸血需求減少。","C":"★錯誤(本題答案):血液動力學不穩定者操作中移位心臟易惡化、需 CPB 後援,應優先 on-pump 而非 OPCAB。","D":"正確:腎功能不良(避免 CPB 腎損傷)、肺氣腫等高風險病人正是 OPCAB 想保護的對象。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"103100-26":{"quick":"效果最差為 C:經心肌雷射血管再通術(TMLR)只是症狀緩解的姑息療法,無法真正重建血流,客觀缺血改善與存活益處最差;A/B/D 都是真正接血管的繞道術式。","detail":{"background":"冠狀動脈「血運重建」要重建心肌灌流。真正的繞道(bypass)把通暢的導管接到狹窄遠端,包括:傳統 on-pump cardioplegic arrest CABG、不停跳 OPCAB、微創直接繞道 MIDCAB(小切口接 LIMA 到 LAD)。經心肌雷射血管再通術(transmyocardial laser revascularization, TMLR)是用雷射在心肌打出許多通道,理論上促進血管新生,僅用於「無法繞道、無法 PCI」的頑固性心絞痛之姑息治療,可部分緩解症狀但無客觀灌流改善、無存活益處,效果最差。","options":{"A":"有效:心臟麻痺液靜止心臟下精準縫合,是標準術式。","B":"有效:不停跳繞道,真正接血管重建血流。","C":"★效果最差(本題答案):TMLR 為姑息性雷射打洞,非真正血運重建。","D":"有效:MIDCAB 小切口直接接 LIMA-LAD,真正繞道。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"104030-26":{"quick":"非 Class I 者本題接受 A、B 皆給分:A=單獨近端 LAD 80% 對存活屬 Class IIa;B=右冠中段阻塞合併急性 MI 並非常規 CABG Class I 適應症。C(梗塞後 VSR)、D(三血管+心收縮不良)才是明確 Class I。","detail":{"background":"冠狀動脈繞道手術(CABG)是把自體血管(動脈或靜脈)接在主動脈與冠狀動脈狹窄遠端之間,繞過阻塞重建心肌血流。外科血運重建相對於藥物/PCI 的「存活益處」適應症(歷年 ACC/AHA、2021 整合版)核心為:①左主幹(left main)顯著狹窄(≥50%);②三條血管疾病(尤其合併左心室功能不良 EF<35%);③兩條或三條血管疾病合併「左前降支近端(proximal LAD)」顯著狹窄。此三類有「延長壽命(prolong life)」的 Class I 等級。相對地「單獨一條近端 LAD 狹窄」對存活益處屬 Class IIa,並非 Class I。糖尿病合併多條血管疾病者 CABG 優於 PCI(FREEDOM trial 2012;SYNTAX 顯示高 SYNTAX score 者 CABG 較佳),是強烈 Class I 偏好 CABG 的情境。急性心肌梗塞當下緊急 CABG 僅在「機械性併發症(如梗塞後心室中隔破裂、乳突肌斷裂)」或 PCI 失敗/解剖不適合 PCI 時施行,單純急性 MI 並非 CABG 的 Class I 常規。","options":{"A":"非 Class I(給分):單獨一條近端 LAD 狹窄,對「延長壽命」屬 Class IIa 而非 Class I。","B":"非 Class I(給分):單純右冠中段阻塞合併急性 MI,並非緊急 CABG 的 Class I 適應症(急性 MI 首選再灌流/PCI)。","C":"是 Class I:急性 MI 合併機械性併發症(梗塞後心室中隔破裂 VSR)須外科修補,屬手術適應症。","D":"是 Class I:三條血管阻塞合併左心室收縮功能不良,CABG 有明確存活益處。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"105100-24":{"quick":"長期通暢率最差為 B 大隱靜脈:靜脈導管易發生內膜增生與粥狀硬化,10 年通暢率僅約 50%;動脈導管(內胸/橈/胃網膜動脈)抗粥化、通暢率較高。","detail":{"background":"CABG 導管的長期通暢率由材質與血管生理決定。動脈導管(尤其內胸動脈/內乳動脈 ITA/IMA)內皮分泌 NO、抗粥狀硬化,10 年通暢率 >90%,是金標準(尤其 LIMA→LAD)。橈動脈為肌肉型動脈,通暢率中等(需避免痙攣,常併用鈣離子阻斷劑)。胃網膜動脈次之。大隱靜脈(SVG)植入動脈壓力環境後,早期(內膜增生)與晚期(靜脈移植物粥狀硬化)退化,1 年約 10–15% 阻塞,10 年通暢率僅約 50–60%,為各導管中最差。","options":{"A":"右內胸動脈:動脈導管,通暢率佳。","B":"★最差(本題答案):大隱靜脈 10 年通暢率僅約 50%。","C":"右胃網膜動脈:動脈導管,通暢率優於靜脈。","D":"左橈動脈:動脈導管,通暢率中等優於靜脈。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"106080-16":{"quick":"錯在 D:高風險特徵(糖尿病、左心室功能不良、腎功能不良、老年、慢性肺病、PAD)的多血管疾病病人,CABG 相較 PCI 是「較好」而非「較差」的長期存活;FREEDOM/SYNTAX 支持 CABG。","detail":{"background":"多血管冠狀動脈疾病的治療選擇:藥物治療為基礎;血運重建(PCI 或 CABG)可改善預後。糖尿病合併多血管疾病:FREEDOM trial(2012)證實 CABG 在死亡/MI 上優於 PCI。複雜、高 SYNTAX score、左主幹合併複雜病灶、左心室功能不良者,CABG 長期存活與再介入率較佳(SYNTAX)。高風險特徵越多,越偏好 CABG 完全血運重建。","options":{"A":"正確:三血管疾病的糖尿病人 CABG 長期存活優於支架(FREEDOM)。","B":"正確:多血管疾病,PCI 與 CABG 相較單純藥物都有顯著存活益處。","C":"正確:高嚴重度病灶以 PCI 治療,再介入(repeat revascularization)率高於 CABG。","D":"★錯誤(本題答案):應為「較好」存活率;高風險多血管病人 CABG 優於 PCI。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"107020-24":{"quick":"正確為「僅4」(D):左主幹等效之三血管嚴重狹窄應由心臟團隊充分告知 CABG 與 PCI 優劣後決定;不可未經外科醫師解釋即逕自放支架;若放支架須備妥手術室以便緊急轉開刀。","detail":{"background":"此病人左主幹 85%、LAD 80%、LCX 77%、RCA 90% = 嚴重多血管疾病(近似左主幹等效),屬 Heart Team(心臟內外科團隊)共同決策、且 CABG 有強烈存活益處的情境。臨床與倫理原則:重大血運重建應由心臟外科醫師向病人/家屬解釋 CABG 的優缺點(知情同意);不宜在診斷性血管攝影當下、未經完整討論即「順手」植入支架;若進行高風險 PCI,導管室/手術室須待命以便併發症時緊急開刀。","options":{"A":"錯:不應依家屬片面決定即刻放塗藥支架,需 Heart Team 討論。","B":"錯:不應商量後即刻放裸金支架,程序與適應症不當。","C":"錯:必須請心臟外科醫師解釋 CABG 優劣(知情同意)。","D":"★正確(本題答案):放支架時手術室須待命,以便併發症立即緊急手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"107020-25":{"quick":"正確為「僅13」(B):OPCAB 仍須全身肝素抗凝(1對)、人工心肺機必須待命備援(2錯)、不需降低體溫(3對)、並不能保證不會中風(4錯)。","detail":{"background":"OPCAB 雖不使用 CPB,但仍須:全身肝素化(避免吻合處與器械血栓),只是劑量常較 on-pump 低;人工心肺機必須在旁待命(emergency conversion 隨時可能);因不降溫(不需全身低溫保護),維持常溫;中風並非完全避免(主動脈側壁鉗夾 side-biting clamp 仍可能栓塞,且血液動力學波動)。","options":{"A":"123:含「人工心肺機不需待命」(錯)。","B":"★正確(本題答案):僅1、3 正確(須肝素、不需降溫)。","C":"24:含「不需待命」「不會中風」皆錯。","D":"僅4:不會中風為錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"108030-20":{"quick":"對「延長壽命」非 Class I 者為 A:單獨一條近端 LAD 嚴重狹窄屬 Class IIa;左主幹、三血管+近端 LAD、雙血管含近端 LAD 才是存活益處 Class I。","detail":{"background":"冠狀動脈繞道手術(CABG)是把自體血管(動脈或靜脈)接在主動脈與冠狀動脈狹窄遠端之間,繞過阻塞重建心肌血流。外科血運重建相對於藥物/PCI 的「存活益處」適應症(歷年 ACC/AHA、2021 整合版)核心為:①左主幹(left main)顯著狹窄(≥50%);②三條血管疾病(尤其合併左心室功能不良 EF<35%);③兩條或三條血管疾病合併「左前降支近端(proximal LAD)」顯著狹窄。此三類有「延長壽命(prolong life)」的 Class I 等級。相對地「單獨一條近端 LAD 狹窄」對存活益處屬 Class IIa,並非 Class I。糖尿病合併多條血管疾病者 CABG 優於 PCI(FREEDOM trial 2012;SYNTAX 顯示高 SYNTAX score 者 CABG 較佳),是強烈 Class I 偏好 CABG 的情境。急性心肌梗塞當下緊急 CABG 僅在「機械性併發症(如梗塞後心室中隔破裂、乳突肌斷裂)」或 PCI 失敗/解剖不適合 PCI 時施行,單純急性 MI 並非 CABG 的 Class I 常規。","options":{"A":"★非 Class I(本題答案):單獨一條近端 LAD >75% 對延長壽命屬 Class IIa。","B":"是 Class I:左主幹 >60% 嚴重狹窄,CABG 存活益處明確。","C":"是 Class I:三血管阻塞合併近端 LAD 狹窄。","D":"是 Class I:雙血管阻塞含近端 LAD 狹窄。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"109080-24":{"quick":"10 年通暢率 1>3>2(A):內乳動脈(>90%)> 橈動脈(中等)> 大隱靜脈(約 50%)。","detail":{"background":"CABG 自體導管 10 年通暢率排序由材質決定:內乳/內胸動脈(IMA/ITA)最佳(LIMA→LAD 10 年 >90%,為金標準),橈動脈(肌肉型動脈,需抗痙攣)居中,大隱靜脈(SVG)最差(10 年約 50–60%,因內膜增生與移植物粥化)。故 1(IMA) > 3(radial) > 2(saphenous)。","options":{"A":"★正確(本題答案):IMA > 橈動脈 > 大隱靜脈。","B":"錯:靜脈不可能優於 IMA。","C":"錯:排序顛倒。","D":"錯:橈動脈非最佳。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"110020-20":{"quick":"錯在 A:off-pump 並非「各項研究皆顯示更好的長期通暢率」;大型 RCT(ROOBY/CORONARY)顯示 OPCAB 長期通暢率不優於、甚至略差於 on-pump。","detail":{"background":"OPCAB 理論上減少發炎指數與栓塞,但臨床證據:長期通暢率與存活並未優於 on-pump,部分研究(ROOBY)顯示完全血運重建程度與通暢率較差。CABG 一般原則:糖尿病+三血管嚴重狹窄首選 CABG;IMA 遠優於 SVG;術後二級預防用 aspirin、β-blocker、statin(及視情況抗心律不整藥);併發症包含心包填塞、出血、腦病變、腎衰竭、縱膈腔炎(sternal wound infection/mediastinitis)。","options":{"A":"★錯誤(本題答案):並非所有研究都顯示 off-pump 有更好長期通暢率。","B":"正確:70 歲女性三血管 80–90% 狹窄+糖尿病,CABG 為首選。","C":"正確:IMA 遠佳於 SVG,術後二級預防用藥如述。","D":"正確:列舉之術後併發症均可能發生。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"110080-17":{"quick":"不適合做導管者為 A 股動脈:股動脈是下肢主要供血動脈、且常有粥狀硬化,取走會危及肢體灌流,不作 CABG 導管;IMA、大隱靜脈、橈動脈才是常用導管。","detail":{"background":"CABG 常用導管:動脈—內乳/內胸動脈(IMA,首選,LIMA→LAD)、橈動脈、胃網膜動脈;靜脈—大隱靜脈(GSV)。股動脈(femoral artery)是下肢主要灌流動脈,移除會造成肢體缺血,且其粥化程度高,不適合作導管(且臨床上股動脈是體外循環/IABP 的「插管入口」而非「移植導管」)。","options":{"A":"★不適合(本題答案):股動脈為下肢主供血動脈,取走危及肢體。","B":"適合:IMA 是首選動脈導管。","C":"適合:大隱靜脈是常用靜脈導管。","D":"適合:橈動脈是常用動脈導管。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"111020-27":{"quick":"錯在 C:全世界「大部分」CABG 仍採 on-pump,OPCAB 只是選項之一,並未成為主流;且其併發症未必較少、長期益處未顯優越。","detail":{"background":"OPCAB(off-pump CABG)是 CABG 的術式選項之一,理論上避開 CPB 可降低出血、神經認知障礙、血栓栓塞、體液堆積與器官暫時功能不全。但大型研究(CORONARY、GOPCABE)顯示 1 年存活與再介入率與 on-pump 無顯著差異,長期通暢可能較差,因此「全世界大部分 CABG」仍以 on-pump、停跳術式為主,OPCAB 占少數(術者經驗依賴度高)。","options":{"A":"正確:OPCAB 是 CABG 手術選項之一。","B":"正確:理論上可降低多項 CPB 相關併發症。","C":"★錯誤(本題答案):全球大多數 CABG 並非 off-pump,仍以 on-pump 為主流。","D":"正確:大規模研究中 OPCAB 1 年存活與再介入率未優於 on-pump。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"113020-19":{"quick":"錯在 D:digoxin 可改善 HFrEF 症狀與住院,但 DIG trial 顯示對「死亡率無益」,不能說有足夠證據降低死亡率;A(戒菸 Class I)、B(術後早用 β-blocker)、C(plaque rupture+thrombus)皆正確。","detail":{"background":"冠狀動脈疾病二級預防與 ACS 機轉:戒菸是 Class I 的一級/二級預防;CABG 後無禁忌應儘早 β-blocker(降心肌耗氧、減 AF/心律不整);ACS 常見機轉為動脈粥狀斑塊破裂(plaque rupture)+血栓形成(thrombus)。Digoxin 在收縮功能不良心衰竭(HFrEF)可改善症狀、降低住院(DIG trial),但對「總死亡率」為中性,無降低死亡率之足夠證據。","options":{"A":"正確:戒菸對預防冠心病為 Class I。","B":"正確:CABG 後無禁忌建議儘早加 β-blocker。","C":"正確:ACS 機轉常為斑塊破裂+血栓形成。","D":"★錯誤(本題答案):digoxin 無足夠證據降低死亡率(DIG trial 中性)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"113070-20":{"quick":"最適合雙側內乳動脈者為 A:60 歲、僅 COPD;雙側 IMA(BIMA)會剝離胸骨兩側血供,糖尿病/肥胖(B)增加胸骨傷口感染/縱膈炎風險、鎖骨下動脈狹窄(C,雙臂血壓差 50)與高齡(D 90 歲)皆為相對禁忌。","detail":{"background":"使用雙側內乳動脈(bilateral IMA, BIMA)可增加動脈導管數、提升長期存活,但 BIMA 會同時剝離胸骨左右兩側的血液供應,增加「胸骨傷口感染/縱膈腔炎」風險,在糖尿病、肥胖(BMI 高)、高齡、免疫低下者風險特別高(ART trial 顯示 BIMA 胸骨併發症較多)。鎖骨下動脈狹窄(雙臂收縮壓差 50 mmHg)會使 IMA 血流不足、為禁忌。故 60 歲、控制中 COPD、無糖尿病/腎病/高齡的 A 最適合。","options":{"A":"★最適合(本題答案):60 歲、無糖尿病/腎病/高齡,胸骨癒合風險低。","B":"不適合:BMI 35 肥胖+(雖 HbA1c 6.0)體型大,胸骨傷口風險高。","C":"不適合:末期腎病+雙臂血壓差 50(鎖骨下動脈狹窄),IMA 血流不足且感染風險高。","D":"不適合:90 歲高齡+糖尿病(HbA1c 8.0),胸骨併發症風險高。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2021 ACC/AHA/SCAI Coronary Artery Revascularization Guideline","2018 ESC/EACTS Myocardial Revascularization Guideline"]}},"101030-27":{"quick":"嚴重 AR 且 LVESD 58 mm(>50)、LVEDD 80 mm 已達手術適應症,最佳處置是瓣膜置換;75 歲應選生物(豬)瓣以免終身抗凝 → B。","detail":{"background":"慢性主動脈瓣逆流(AR)手術適應症:出現症狀,或無症狀但 LVEF<50%,或左心室末收縮內徑 LVESD>50 mm(或 >25 mm/m²)、末舒張內徑顯著擴大。本例 LVESD 58、LVEDD 80 mm 並有勞動性症狀 → 明確需手術置換主動脈瓣。瓣膜選擇看年齡與抗凝耐受:75 歲高齡,生物瓣可避免終身 warfarin、且其退化速度在高齡較慢(餘命內多不需再換),為最佳選擇。","options":{"A":"機械瓣需終身抗凝,75 歲不宜為首選。","B":"★正確(本題答案):75 歲用生物(豬)瓣置換,避免終身抗凝。","C":"抗心律不整藥無法解決瓣膜結構問題。","D":"抗心衰竭藥僅延緩,已達手術適應症應手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"101030-28":{"quick":"正確為 1、3(B):warfarin 以 PT/INR 監測。thyroxine 增強 warfarin 作用(減量)、口服避孕藥之雌激素為促凝(需增量);凡寫「以 aPTT 監測」者(2、4)皆錯,且菠菜富含維生素 K 應減弱 warfarin。","detail":{"background":"機械瓣置換後需終身 warfarin,監測指標為 prothrombin time(PT)/INR(非 aPTT)。交互作用:甲狀腺素(thyroxine)加速凝血因子分解、增強 warfarin 抗凝→需減量並監測 PT;口服避孕藥/雌激素為「促凝」、減弱 warfarin→需增量;富含維生素 K 的食物(菠菜、當歸、銀杏中之部分作用)會「拮抗」warfarin。各敘述對錯的關鍵在於「監測項目須為 PT」與「劑量調整方向」。","options":{"A":"12:含敘述 2(以 aPTT 監測,錯)。","B":"★正確(本題答案):1(thyroxine→減量、PT 監測)與 3(避孕藥→增量、PT 監測)正確。","C":"24:皆寫 aPTT,錯。","D":"4:菠菜應減弱抗凝且應 PT 監測,錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"102110-24":{"quick":"此為重度主動脈瓣狹窄(暈厥、勞動性心絞痛、射出性收縮雜音、LVH),須 AVR;不適宜的是 A——71 歲應優先生物瓣而非機械瓣。","detail":{"background":"症狀性重度主動脈瓣狹窄(AS)三大典型症狀:心絞痛、暈厥、心衰竭,出現任一即為手術適應症(出現症狀後不手術 2–3 年死亡率極高)。標準治療為主動脈瓣置換(AVR;高手術風險者考慮 TAVR)。術前須安排心臟超音波、心導管與冠狀動脈攝影(評估是否合併冠心病需同時 CABG)。71 歲病人瓣膜選擇應「優先生物瓣」以免終身抗凝。","options":{"A":"★不適宜(本題答案):71 歲應優先生物瓣,而非機械瓣。","B":"合理:鈣化性 AS 多需置換,術中先處理主動脈瓣。","C":"合理:症狀性重度 AS 應建議手術。","D":"合理:術前應安排超音波、心導管與冠狀動脈攝影。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"102110-27":{"quick":"錯在 D:贅生物栓塞「已」造成腦缺血或出血後,並非立即手術的適應症;尤其出血性中風後應延後手術(避免 CPB 肝素化致出血惡化)。真正手術適應症是心衰竭、感染失控、預防大贅生物再栓塞。","detail":{"background":"感染性心內膜炎(IE)手術適應症三大類:①心衰竭(瓣膜破壞致嚴重逆流、血流動力惡化)→最常見且最急;②感染無法控制(抗生素失敗、膿瘍、抗藥/黴菌菌種、持續菌血症);③預防栓塞(大贅生物 >10 mm 且已有栓塞,或 >15 mm)。但「已發生」腦栓塞缺血或出血後,反而要評估時機:出血性轉化/出血性中風後通常延後手術 2–4 週(CPB 全身肝素化會使顱內出血惡化)。","options":{"A":"正確:IE 致嚴重 MR(心衰竭)應儘快手術。","B":"正確:抗生素失敗合併無法控制敗血症應儘快手術。","C":"正確:前葉大贅生物(>1.0 cm)有栓塞風險,可考慮儘快手術。","D":"★錯誤(本題答案):已造成腦缺血尤其出血者,並非立即手術;出血後應延後手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"104090-23":{"quick":"建議生物瓣者為 D:70 歲高齡(+COPD)。18 歲(A)、需長期抗凝者(C 已用抗凝劑)偏機械瓣;洗腎+高血鈣(B)傳統認為加速生物瓣鈣化,故 D 最適生物瓣。","detail":{"background":"人工瓣膜分兩類:機械瓣(mechanical)耐用、幾乎不退化,但需「終身」warfarin 抗凝(以 PT/INR 監測,NOAC 禁用於機械瓣—RE-ALIGN 試驗 dabigatran 增加血栓與出血而中止);生物瓣(bioprosthetic,牛心包或豬瓣)經 glutaraldehyde 固定、無抗原性,「不需」抗排斥藥,術後僅需短期(約 3 個月)抗凝,但 10–15 年會鈣化退化。選擇原則:年輕、已因 AF 等需長期抗凝、預期壽命長者偏機械瓣;高齡(主動脈瓣 >65 歲、二尖瓣 >70 歲)、計畫懷孕(warfarin 致畸)、出血傾向(血友病)、無法配合抗凝者偏生物瓣;洗腎病人現行指引兩者皆可(不再硬性偏機械)。","options":{"A":"18 歲年輕人:預期壽命長,偏機械瓣以免反覆換瓣。","B":"40 歲洗腎+高血鈣:鈣磷異常會加速生物瓣鈣化退化,不利生物瓣。","C":"40 歲慢性 AF 已長期抗凝:既已用抗凝劑,選機械瓣不額外增加抗凝負擔。","D":"★正確(本題答案):70 歲高齡(+COPD),生物瓣避免終身抗凝、餘命內多不需再換。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"105100-23":{"quick":"正確為 1、2、3(A):暈厥是重度 AS 手術適應症;二尖瓣修補可用於擴張型心肌病的功能性 MR;末期瓣膜病可心臟移植;但 4 錯——瓣膜「修補」死亡率低於「置換」。","detail":{"background":"瓣膜外科原則:①重度 AS 之心絞痛/暈厥/心衰竭皆為手術適應症;②擴張型心肌病的「功能性」二尖瓣逆流可用瓣膜修補(成形術、瓣環整形)改善;③末期瓣膜性心臟病導致頑固心衰竭可考慮心臟移植;④二尖瓣「修補」保留瓣下結構、保留左心室幾何,手術死亡率與長期預後均「優於」置換。","options":{"A":"★正確(本題答案):1、2、3 正確。","B":"僅13:漏掉 2(功能性 MR 可修補),不完整。","C":"24:含 4(修補死亡率較高,錯)。","D":"僅4:修補死亡率較低,4 為錯敘述。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"106020-26":{"quick":"錯在 D:無症狀、LVEF>50%、末舒張內徑<70 mm 的 AR 屬「觀察」範圍,並未達手術適應症。A/B/C(有症狀、EF<50%、合併三血管病)才需手術。","detail":{"background":"慢性主動脈瓣逆流(AR)手術適應症:①出現症狀;②無症狀但 LVEF<50%;③合併需手術之冠心病/升主動脈病變;④無症狀但左心室嚴重擴大(LVESD>50 mm 或 LVEDD>65–70 mm)。反之,無症狀、EF 正常(>50%)、左心室未顯著擴大(EDD<70 mm)者應「定期追蹤」而非手術。","options":{"A":"正確適應症:有症狀+嚴重 AR。","B":"正確適應症:無症狀但 EF<50%。","C":"正確適應症:嚴重 AR 合併三血管冠心病(同時 CABG)。","D":"★錯誤(本題答案):無症狀、EF>50%、EDD<70 mm 尚未達手術適應症,應追蹤。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"106080-14":{"quick":"正確為 2、4(C):>70 歲選生物瓣、洗腎尿毒病人現行指引可選生物瓣;計畫懷孕的年輕女性應選生物瓣(避 warfarin 致畸)而非機械瓣(1 錯),血友病出血傾向應選生物瓣免抗凝(3 錯)。","detail":{"background":"人工瓣膜分兩類:機械瓣(mechanical)耐用、幾乎不退化,但需「終身」warfarin 抗凝(以 PT/INR 監測,NOAC 禁用於機械瓣—RE-ALIGN 試驗 dabigatran 增加血栓與出血而中止);生物瓣(bioprosthetic,牛心包或豬瓣)經 glutaraldehyde 固定、無抗原性,「不需」抗排斥藥,術後僅需短期(約 3 個月)抗凝,但 10–15 年會鈣化退化。選擇原則:年輕、已因 AF 等需長期抗凝、預期壽命長者偏機械瓣;高齡(主動脈瓣 >65 歲、二尖瓣 >70 歲)、計畫懷孕(warfarin 致畸)、出血傾向(血友病)、無法配合抗凝者偏生物瓣;洗腎病人現行指引兩者皆可(不再硬性偏機械)。","options":{"A":"123:含 1(懷孕選機械瓣,錯)、3(血友病選機械瓣,錯)。","B":"僅13:皆為錯敘述。","C":"★正確(本題答案):2(>70 歲選生物瓣)、4(尿毒洗腎可選生物瓣)。","D":"僅4:漏掉 2,不完整。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"106080-45":{"quick":"此為術後第 5 天再發燒之敗血/感染處置題,接受 B、D 皆給分:D 只涵蓋 G(+)球菌與黴菌、未涵蓋 G(−)菌不周延;B 以 linezolid 治導管相關「菌血/心內膜」感染不理想(linezolid 為抑菌、不建議用於血管內感染)。","detail":{"background":"術後新發燒的標準作法:完整感染檢查(血球、CXR、尿析、血液培養找來源),依來源處置。導管相關血流感染應「移除導管」並以涵蓋 MRSA 的殺菌性抗生素(vancomycin、daptomycin)治療;心內膜炎需 4–6 週療程。經驗性抗生素在嚴重敗血或免疫抑制者應「廣覆蓋」—含 G(+)、G(−)、必要時加抗黴菌,而非只 G(+)+黴菌。","options":{"A":"正確:術後發燒應做血球、CXR、尿析、血培找來源。","B":"給分(視為不周延):導管相關感染應移除導管,但 linezolid 屬抑菌、不建議用於血管內/心內膜感染,優先 vancomycin/daptomycin。","C":"正確:懷疑心內膜炎至少抗生素 4–6 週。","D":"★錯誤/給分(本題答案):僅涵蓋 G(+)球菌與黴菌、未含 G(−)菌,廣度不足。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"107080-18":{"quick":"錯在 C:原發性(退化性)重度 MR 的外科治療,長期預後「修補優於置換」(保留瓣下結構與左心室功能),而非置換優於修補。","detail":{"background":"二尖瓣逆流(MR)外科原則:①急性重度 MR(腱索/乳突肌斷裂)併心衰竭應提早手術;②慢性「原發性(primary,瓣膜本身退化)」重度 MR,藥物只緩解症狀、不改變預後,確定治療是手術;③原發性 MR「修補(repair)」優於「置換」—保留瓣下腱索與左心室幾何,死亡率低、長期預後佳;④「功能性(secondary)」MR 因屬左心室病變,即使手術預後仍較原發性差。","options":{"A":"正確:急性重度 MR 併心衰竭應提早手術。","B":"正確:有症狀慢性原發性重度 MR 藥物僅改善症狀。","C":"★錯誤(本題答案):原發性 MR 應「修補優於置換」。","D":"正確:功能性 MR 屬左心室問題,術後預後較原發性差。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"107080-19":{"quick":"錯在 A:無症狀的嚴重二尖瓣狹窄不一定都要立即介入手術,多數先追蹤;有症狀、或解剖適合時才做氣球擴張/手術。","detail":{"background":"二尖瓣狹窄(MS)多為風濕性心臟病後遺。治療:無症狀者通常追蹤(除非合併肺高壓、新發 AF 等);有症狀且瓣膜解剖適合(無嚴重鈣化、無左心房血栓、無顯著 MR)首選經皮二尖瓣氣球擴張(PBMV);不適合 PBMV 者,行體外循環下「開放性二尖瓣連合處切開術(OMC)」或二尖瓣置換。","options":{"A":"★錯誤(本題答案):無症狀嚴重 MS 不一定都要手術,多數先追蹤。","B":"正確:嚴重 MS 多為風濕性心臟病。","C":"正確:OMC 是手術選項之一。","D":"正確:無法做連合處切開時,二尖瓣置換為選項。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"109080-22":{"quick":"錯在 C:柯克三角(Koch triangle)內含「房室結(AV node)」,在此縫合「正會」造成房室傳導阻斷,必須小心避開,而非「不必擔心」。","detail":{"background":"心臟瓣膜外科解剖:主動脈瓣、肺動脈瓣皆為 3 片半月瓣;二尖瓣由前葉、後葉組成;二尖瓣後葉下緣鄰近左迴旋冠狀動脈(縫合過深會傷及)。柯克三角(Koch’s triangle)以 Todaro 腱、冠狀竇口、三尖瓣中隔葉附著為界,其尖端為「房室結」所在;三尖瓣手術或修補時在此區縫合會傷及房室結、造成完全性房室傳導阻斷,故必須謹慎避開。","options":{"A":"正確:主動脈瓣與肺動脈瓣皆 3 片半月瓣。","B":"正確:二尖瓣由前、後葉組成。","C":"★錯誤(本題答案):Koch 三角含房室結,縫合會致傳導阻斷,須避開。","D":"正確:二尖瓣後葉下緣有左迴旋冠狀動脈經過。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"110020-19":{"quick":"正確為 2、3(D):MS 合併 AF 屬高栓塞風險,必須抗凝(1 錯);術前可安排心導管;瓣膜手術可同時做 Cox-Maze 治療 AF;但她有右側膿胸開胸病史(沾黏),不宜微創/胸腔鏡(4 錯)。","detail":{"background":"本例風濕性二尖瓣狹窄(瓣口 1.35 cm²,屬嚴重)合併 AF,右手無力提示曾有腦栓塞。處置:①MS+AF 是高度血栓栓塞風險,「必須」抗凝(warfarin),而非因中風就停藥;②術前可心導管評估;③外科瓣膜手術可「同時」施行 Cox-Maze 迷宮手術處理 AF;④有右側膿胸開胸病史→胸腔嚴重沾黏,不適合胸腔鏡/小傷口微創。","options":{"A":"僅14:1(不抗凝,錯)、4(微創,因沾黏不宜)。","B":"234:含 4(微創不宜)。","C":"123:含 1(不抗凝,錯)。","D":"★正確(本題答案):僅 2、3 正確。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"110080-18":{"quick":"不是手術適應症者為 C:無症狀慢性重度 AR 但 LVESD 僅 30 mm(左心室未擴大、功能正常)應追蹤;A(急性 AR 併休克)、B(有症狀)、D(EF<50%)都是適應症。","detail":{"background":"重度主動脈瓣逆流(AR)手術適應症:①急性重度 AR 併血流動力惡化/休克(常見 IE、主動脈剝離,屬外科急症);②有症狀的慢性重度 AR(不論心功能);③無症狀但 LVEF<50%;④無症狀但左心室嚴重擴大(LVESD>50 mm)。LVESD 僅 30 mm 屬正常範圍,尚未達手術門檻。","options":{"A":"是適應症:急性重度 AR 併休克,外科急症。","B":"是適應症:有症狀的慢性重度 AR。","C":"★不是適應症(本題答案):無症狀、LVESD 30 mm(正常),應追蹤。","D":"是適應症:無症狀但 EF<50%。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"111020-26":{"quick":"錯在 D:生物瓣經固定處理、無抗原性,「不需」終身抗排斥藥物;僅術後約 3 個月短期抗凝。A、B、C 皆正確。","detail":{"background":"人工瓣膜分兩類:機械瓣(mechanical)耐用、幾乎不退化,但需「終身」warfarin 抗凝(以 PT/INR 監測,NOAC 禁用於機械瓣—RE-ALIGN 試驗 dabigatran 增加血栓與出血而中止);生物瓣(bioprosthetic,牛心包或豬瓣)經 glutaraldehyde 固定、無抗原性,「不需」抗排斥藥,術後僅需短期(約 3 個月)抗凝,但 10–15 年會鈣化退化。選擇原則:年輕、已因 AF 等需長期抗凝、預期壽命長者偏機械瓣;高齡(主動脈瓣 >65 歲、二尖瓣 >70 歲)、計畫懷孕(warfarin 致畸)、出血傾向(血友病)、無法配合抗凝者偏生物瓣;洗腎病人現行指引兩者皆可(不再硬性偏機械)。","options":{"A":"正確:機械瓣需終身 warfarin。","B":"正確:機械瓣比生物瓣耐用、使用年限長。","C":"正確:生物瓣術後約 3 個月內需抗凝。","D":"★錯誤(本題答案):生物瓣不需終身抗排斥藥(經固定無抗原性)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"111080-20":{"quick":"最不適當為 D:單以「預防猝死」為由,對「無症狀」重度 AS 做 AVR 並非標準適應症;無症狀重度 AS 多追蹤,除非 EF<50%、極重度或運動測試異常。","detail":{"background":"主動脈瓣狹窄(AS)AVR 適應症:①有症狀的重度 AS;②無症狀重度 AS 但 LVEF<50%;③重度 AS 接受其他心臟手術(如 CABG)時一併處理;④(較新)極重度或運動異常者可考慮早期手術。但「無症狀」重度 AS 單純為了預防猝死即手術,並非傳統標準適應症(無症狀者年猝死率低,通常密切追蹤至出現症狀或 EF 下降)。","options":{"A":"適當:有症狀重度 AS 應 AVR。","B":"適當:中度 AS 合併需 CABG 時可一併 AVR。","C":"適當:無症狀重度 AS 但 EF<50% 應手術。","D":"★最不適當(本題答案):無症狀重度 AS 僅為防猝死即手術,非標準適應症。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"111080-23":{"quick":"錯在 C:目前 TAVR(經導管主動脈瓣置換)已成熟且核准用於 AS,但「經導管二尖瓣置換(TMVR)」尚未成熟普及核准;二尖瓣狹窄多以氣球擴張(PBMV)處理。","detail":{"background":"AS 與 MS:主動脈瓣口 <1 cm² 且有症狀(走路喘)可建議置換;二尖瓣口 <1.5 cm² 且氣球擴張成效不佳應置換;重度 AS 病程進展快、猝死率高於 MS。經導管技術:TAVR 對 AS 已是成熟、各風險族群皆獲核准的選項;但「經導管二尖瓣置換(TMVR)」技術尚未成熟普及，MS 主要仍以 PBMV 或外科處理(經導管二尖瓣「緣對緣修補」如 MitraClip 用於逆流而非狹窄)。","options":{"A":"正確:症狀性重度 AS(瓣口<1 cm²)可置換。","B":"正確:MS 瓣口<1.5 cm² 且 PBMV 不佳應置換。","C":"★錯誤(本題答案):經導管二尖瓣「置換」尚未成熟核准,非如 TAVR 成熟。","D":"正確:AS 進展與猝死率高於 MS。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"113020-23":{"quick":"錯在 C:Ross 手術(以自體肺動脈瓣移至主動脈位)雖不需抗凝,但因技術複雜、自體移植瓣可隨成長,「特別適合年輕/兒童」,並非適合年老病人。","detail":{"background":"瓣膜選擇:高齡(主動脈瓣 >65 歲、二尖瓣 >70 歲)偏生物瓣;機械瓣需以 PT/INR 監測 warfarin;NOAC(dabigatran、rivaroxaban)禁用於機械瓣(RE-ALIGN 證實有害)。Ross 手術:取自體肺動脈瓣(autograft)置於主動脈瓣位置,再以同種移植物重建肺動脈瓣;優點是自體瓣可生長、不需抗凝、感染抗性佳,「特別適合年輕成人與兒童」,屬複雜雙瓣手術,不用於年老病人。","options":{"A":"正確:>65 歲主動脈瓣、>70 歲二尖瓣偏生物瓣。","B":"正確:機械瓣以 PT/INR 監控。","C":"★錯誤(本題答案):Ross 手術適合年輕/兒童,非年老病人。","D":"正確:機械瓣不可用 NOAC,仍須 warfarin。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"113070-19":{"quick":"錯在 B:二尖瓣逆流的心雜音是「全收縮期(pan/holo-systolic)」雜音,不是舒張期(pan-diastolic);舒張期雜音見於二尖瓣狹窄或主動脈瓣逆流。","detail":{"background":"二尖瓣逆流(MR):病因含黏液樣退化(myxomatous/二尖瓣脫垂)、風濕性心臟病、感染性心內膜炎、缺血(乳突肌)等。聽診為心尖部「全收縮期雜音」,常傳導至腋下。慢性 MR 左心室代償性擴大重塑、病人可長期無症狀;失代償時 CXR 見左心房擴大與肺水腫。","options":{"A":"正確:病因含黏液退化、風濕、感染性心內膜炎。","B":"★錯誤(本題答案):MR 為全「收縮期」雜音,非舒張期。","C":"正確:慢性 MR 左心室代償重塑,可無症狀。","D":"正確:CXR 可見左心房擴大與肺水腫。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"114070-21":{"quick":"此為二尖瓣狹窄+AF→左心房血栓脫落造成下肢動脈急性栓塞;錯在 C——再灌流「不會」立即緩解肌蛋白尿,反而再灌流傷害會加重橫紋肌溶解、釋出肌球蛋白與鉀。","detail":{"background":"二尖瓣嚴重狹窄+左心房擴大+AF → 左心房/左心耳易形成血栓,脫落造成體循環栓塞(本例下肢急性動脈栓塞:冰冷、無脈、疼痛、感覺異常=acute limb ischemia 的 6P)。治療為緊急取栓/血運重建。再灌流會發生「再灌流傷害」:缺血肌肉壞死釋出鉀離子(高血鉀,可致心律不整)、肌球蛋白(肌蛋白尿→急性腎損傷)、並造成肢體腫脹甚至腔室症候群(缺血越久越嚴重)。故再灌流「不會」立即緩解肌蛋白尿。","options":{"A":"正確:MS+AF 最可能為心源性動脈栓塞。","B":"正確:再灌流後鉀離子(由壞死肌肉釋出)會上升。","C":"★錯誤(本題答案):再灌流會加重而非緩解橫紋肌溶解/肌蛋白尿。","D":"正確:缺血越久,再灌流後腫脹越厲害(腔室症候群風險)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"115020-4":{"quick":"腱索斷裂造成瓣葉「過度活動/脫垂」,屬 Carpentier Type II(B):瓣葉活動「增加(excessive motion)」。","detail":{"background":"Carpentier 二尖瓣功能分類(以瓣葉活動度):Type I=瓣葉活動正常(逆流來自瓣環擴大或瓣葉穿孔);Type II=瓣葉活動「過度(excessive)」即脫垂/腱索或乳突肌斷裂;Type IIIa=舒張+收縮期瓣葉活動「受限」(風濕性、瓣葉增厚);Type IIIb=收縮期瓣葉活動受限(功能性/缺血性,瓣葉被牽拉)。本例前葉腱索斷裂→瓣葉脫垂、活動過度→Type II,常以瓣膜修補(切除/人工腱索)治療。","options":{"A":"Type I:瓣葉活動正常,非本例。","B":"★正確(本題答案):Type II,腱索斷裂致瓣葉過度活動(脫垂)。","C":"Type IIIa:舒張+收縮期活動受限(風濕),非本例。","D":"Type IIIb:收縮期活動受限(功能性),非本例。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2020 ACC/AHA Valvular Heart Disease Guideline","2021 ESC/EACTS Valvular Heart Disease Guideline"]}},"101030-75":{"quick":"對比劑 CT 見主動脈內膜瓣與雙腔(true/false lumen)→ 主動脈剝離(A)。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。","options":{"A":"★正確(本題答案):CT 見內膜瓣/雙腔為主動脈剝離典型表現。","B":"食道癌不會有對比劑顯影的主動脈雙腔。","C":"主動脈瓣狹窄為瓣膜病變,非 CT 上主動脈管腔分隔。","D":"左心房黏液瘤位於左心房內,非主動脈剝離影像。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"102110-22":{"quick":"Bentall 手術=置換主動脈瓣+升主動脈(含主動脈根部/伐氏竇)+冠狀動脈再植入;不包括 D(只置換到 sinotubular junction、保留伐氏竇)——那是保留竇部的 supracoronary/valve-sparing 概念,非 Bentall。","detail":{"background":"主動脈根部瘤合併 aortoannular ectasia(伐氏竇擴大)、主動脈瓣閉鎖不全時,經典 Bentall 手術以「複合人工瓣膜-人工血管(composite valve-graft)」一併置換主動脈瓣與升主動脈根部(含伐氏竇),並把左右冠狀動脈開口以鈕扣(button)方式再植入人工血管。若想保留自身瓣膜則用 valve-sparing(David/Yacoub)術式。","options":{"A":"包括:Bentall 須處理(置換)主動脈瓣。","B":"包括:人工血管置換升主動脈至主動脈環部(annulus)。","C":"包括:冠狀動脈鈕扣再植入。","D":"★不包括(本題答案):只置換到 sinotubular junction、保留伐氏竇=保留竇部術式,非 Bentall。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"103100-23":{"quick":"正確為 1、2、3(本題接受 A):縱隔腔 8 cm 寬→安排胸部 CT(1)、降主動脈瘤為可能診斷(2);告知對象是「病人本人」,病人書面要求下不告知分居配偶屬尊重自主、合理(3);TEVAR 可治胸降主動脈瘤(4 錯)。","detail":{"background":"健檢發現縱隔腔變寬(>8 cm)應安排胸部電腦斷層釐清,胸部降主動脈瘤是鑑別診斷之一。知情同意的對象是「具決定能力的病人本人」,病人可書面要求不向分居配偶揭露病情(自主權)。胸降主動脈瘤可用主動脈腔內血管支架(TEVAR)治療,並非「不可使用」。","options":{"A":"★正確(本題答案):1、2、3 正確。","B":"僅13:漏掉 2(降主動脈瘤為可能診斷)。","C":"24:含 4(TEVAR 不可用,錯)。","D":"僅4:TEVAR 可用於胸降主動脈瘤,4 為錯敘述。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"104030-24":{"quick":"此為急性 Type A 主動脈剝離(升主動脈受侵:舒張期雜音=AR)後破入心包→心包填塞(低血壓、頸靜脈怒張、心搏過速)。正解為僅①③(B):立即心臟超音波+緊急手術;病人已低血壓,不宜再給降壓的 anti-impulse(②),也不能僅觀察(④)。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。 當 Type A 剝離破入心包造成填塞、病人已低血壓時,不應再用 propranolol+nitroprusside 積極降壓(會加重休克),而應立即心臟超音波確認、緊急開刀。","options":{"A":"①②③:含②(已低血壓不宜再降壓)。","B":"★正確(本題答案):僅①③—立即超音波+緊急手術。","C":"②④:②不宜、④僅觀察錯。","D":"僅④:Type A 填塞僅觀察會致死,錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"105020-24":{"quick":"錯在 D:破裂的腹主動脈瘤是外科急症,雖死亡率高仍須「立即手術」,而非不建議手術。","detail":{"background":"腹主動脈瘤(AAA)手術適應症:①最大直徑 >5.5 cm(男性;女性常 >5.0 cm 即考慮);②快速擴大(>0.5 cm/6 個月 或 >1 cm/年);③有症狀(腹/背痛=瀕臨破裂)或合併栓塞、阻塞等併發症;④「破裂」=外科急症必須立即手術(不開刀幾乎必死)。","options":{"A":"正確:直徑 >5.5 cm 應手術。","B":"正確:4–5 cm 但每年增 1 cm(快速擴大)應手術。","C":"正確:有腹/背痛或栓塞併發症應立即手術。","D":"★錯誤(本題答案):破裂 AAA 是急症,必須立即手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"106020-24":{"quick":"正確為 2、4(C):升主動脈受侵(Type A)大多需緊急手術(2);因目前無核准之升主動脈支架,Type A 大多不能用 endovascular stent(4)。僅降主動脈(Type B)大多藥物治療、且可用 TEVAR(故 1、3 錯)。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。","options":{"A":"123:含 1(降主動脈剝離大多需手術,錯—Type B 多藥物)、3(Type B 不可用支架,錯—可 TEVAR)。","B":"僅13:皆錯敘述。","C":"★正確(本題答案):2(Type A 需緊急手術)、4(Type A 多不能用支架)。","D":"僅4:漏掉 2,不完整。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"107020-23":{"quick":"錯在 D:剝離造成的器官灌注不良(malperfusion),以「腎臟、下肢、內臟(腸繫膜)」較常見,並非以「腦部及腸道」最常見。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。","options":{"A":"正確:剝離病人常合併高血壓或主動脈瓣病變(如雙瓣)。","B":"正確:主動脈攝影、TEE、CT、MRI 之敏感度/特異度皆 >80%。","C":"正確:急性 Type A 剝離須馬上手術。","D":"★錯誤(本題答案):malperfusion 以腎、下肢、內臟較常見,非「腦及腸道最常見」。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"107020-73":{"quick":"較少見者為 B:胸降主動脈損傷時氣管/食道(NG 管)通常被血腫推向「右側」,而非偏左;典型徵象為縱隔腔變寬、主動脈邊界模糊、左側血胸。","detail":{"background":"外傷性胸主動脈損傷(多在主動脈峽部 isthmus)之胸部 X 光徵象:縱隔腔變寬(>8 cm)、主動脈結/邊界模糊、左側血胸、左主支氣管下壓、氣管與食道(NG 管)向「右」偏移、主動脈頂帽狀陰影(apical cap)。氣管偏向「左」並非典型,故較少見。","options":{"A":"常見:主動脈邊界模糊。","B":"★較少見(本題答案):氣管應偏右而非偏左。","C":"常見:左側血胸。","D":"常見:縱隔腔變寬。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"107080-20":{"quick":"錯在 D:Stanford Type B(降主動脈)主動脈剝離現今以 TEVAR(腔內修補)為複雜型的首選,並非「仍以傳統開胸置換為主」。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。 Type B(降主動脈)複雜型(malperfusion、破裂、頑固疼痛)以 TEVAR 為首選,開胸置換僅在特定情況。發病時間分期:急性 ≤14 天、亞急性 15–90 天、慢性 >90 天。","options":{"A":"正確:剝離由降主動脈起、入口在降主動脈近端=Stanford Type B。","B":"正確:複雜型 Type B 需考慮手術(TEVAR)。","C":"(舊式二分法可接受):>14 天歸於慢性(新分法為亞急性)。","D":"★錯誤(本題答案):Type B 現以 TEVAR 為主,非傳統開胸置換。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"108030-21":{"quick":"正確為 B:剝離機制是內膜破口、血流在中層與外層之間形成假腔。A(最佳診斷為 CT 非 echo/MRI)、C(剝離痛為撕裂狀,可與 MI 區別)、D(會造成器官 malperfusion)皆錯。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。","options":{"A":"錯:急性剝離最佳診斷工具為 CT 血管攝影(快速),非 echo/MRI 為首選。","B":"★正確(本題答案):內膜破口,假腔形成於中層與外層之間。","C":"錯:剝離為撕裂/移行性劇痛,與 MI 壓迫痛可資區別。","D":"錯:剝離常造成各器官 malperfusion。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"108080-19":{"quick":"正確為 1、2、3(A):左前胸痛應把急性主動脈剝離納入鑑別(1);Type B 剝離可考慮腔內支架(2);急性 MI 須考慮 PCI(3);急性 MI 首選 PCI 而非立即 CABG(4 錯)。","detail":{"background":"左前胸痛鑑別:急性冠心症(ACS)與急性主動脈剝離都要考慮(處置截然不同:ACS 需抗血小板/抗凝,剝離禁忌)。診斷 Type B 剝離→可考慮 TEVAR;診斷急性 MI→首選 PCI 再灌流,CABG 僅在 PCI 不適合或合併機械性併發症時。","options":{"A":"★正確(本題答案):1、2、3 正確。","B":"134:含 4(立即 CABG,錯)。","C":"僅24:漏掉 1、3。","D":"僅4:4 為錯敘述。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"109080-23":{"quick":"DeBakey type II 僅侵犯「升主動脈」,即圖中第 I 段(A)。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。 DeBakey II=僅升主動脈,屬 Stanford A,須緊急手術。","options":{"A":"★正確(本題答案):DeBakey II 侵犯升主動脈段。","B":"此為主動脈弓段,非 type II 主要範圍。","C":"降主動脈段對應 DeBakey III。","D":"腹主動脈段對應 DeBakey IIIb 延伸。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"110020-17":{"quick":"錯在 D:Type A 剝離「合併器官灌注不良」者預後比無 malperfusion 者「差」,兩者預後不相同。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。","options":{"A":"正確:高度懷疑時先行 anti-impulse 降心率與控制血壓。","B":"正確:急性 Stanford A 應緊急主動脈置換。","C":"正確:Stanford B 合併 malperfusion 應考慮 TEVAR。","D":"★錯誤(本題答案):Type A 合併 malperfusion 預後較差,並非相同。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"110020-45":{"quick":"腹主動脈瘤修補後左下腹痛+血便,最可能為缺血性腸炎(D):術中結紮/犧牲下腸繫膜動脈(IMA)致左半結腸(脾曲/乙狀結腸)缺血。","detail":{"background":"AAA 修補(尤其開腹、結紮下腸繫膜動脈 IMA)後,若側枝循環不足,左半結腸(脾曲、乙狀結腸—IMA 供血區、屬腸繫膜上下動脈分水嶺)易缺血,術後數天出現左下腹痛、血便=缺血性腸炎(ischemic colitis),是 AAA 術後重要併發症,須警覺、必要時內視鏡評估。","options":{"A":"偽膜性腸炎與抗生素相關,非術後 IMA 結紮所致。","B":"潰瘍性腸炎為慢性發炎病,非急性術後表現。","C":"憩室炎不以術後 IMA 缺血為機制。","D":"★正確(本題答案):IMA 犧牲致左結腸缺血性腸炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"110020-73":{"quick":"CT 見主動脈壁新月形高密度增厚、無內膜瓣,且範圍含升主動脈→ Stanford A 型主動脈壁內血腫(IMH)(A);Type A IMH 比照 Type A 剝離,須手術。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。 壁內血腫(IMH)=主動脈中層出血、無明顯內膜破口/真假腔,CT 見新月形(crescentic)壁增厚高密度。Type A IMH 與 Type A AD 一樣需手術。","options":{"A":"★正確(本題答案):升主動脈受侵的 IMH=Stanford A IMH。","B":"Type B 限降主動脈,與本例含升主動脈不符。","C":"有內膜瓣/真假腔才是「剝離」,本例為 IMH。","D":"DeBakey III 限降主動脈,不符。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"111080-21":{"quick":"正確為 C:無論開放或腔內修補胸腹主動脈瘤,腦脊髓液引流(CSF drainage)皆有脊髓保護(降低截癱)效果。A(真/假動脈瘤手術適應症不同)、B(黴菌性動脈瘤最常見為細菌如沙門氏菌/葡萄球菌而非真菌)、D(3 cm 小瘤不需每 3 個月密集追蹤)皆錯。","detail":{"background":"主動脈瘤:真動脈瘤(true,三層管壁完整的擴大)vs 假性動脈瘤(pseudoaneurysm,管壁破裂被周圍組織包覆),假性瘤破裂風險高、手術適應症「不同」(較早處理)。感染性(mycotic)動脈瘤最常見病原為「細菌」(沙門氏菌、葡萄球菌),非真菌。胸腹主動脈瘤修補(open 或 endovascular)以腦脊髓液引流保護脊髓、降低截癱。小於 4–4.5 cm 的瘤門診定期追蹤(每 6–12 個月)即可,不需每 3 個月。","options":{"A":"錯:真/假動脈瘤手術適應症不同。","B":"錯:mycotic aneurysm 最常見病原為細菌而非真菌。","C":"★正確(本題答案):CSF drainage 對開放與腔內修補皆有脊髓保護。","D":"錯:3 cm 小瘤不需每 3 個月密集追蹤。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"112020-22":{"quick":"馬凡氏症為 fibrillin(纖維蛋白原-1,FBN1 基因)異常(D),導致結締組織彈性纖維缺陷、主動脈根部擴大易剝離。","detail":{"background":"馬凡氏症(Marfan syndrome)為體染色體顯性遺傳,FBN1 基因突變致「fibrillin-1」異常,使彈性纖維與微纖維(microfibril)缺陷、TGF-β 訊號失調。臨床:身材高瘦、蜘蛛指、晶狀體脫位、主動脈根部擴大/剝離(主要死因)。主動脈根部 >5 cm(或快速擴大、家族剝離史)即建議預防性置換。","options":{"A":"elastin 異常見於 supravalvular AS/Williams,非 Marfan。","B":"metalloproteinase 與動脈瘤重塑相關但非 Marfan 致病蛋白。","C":"collagen 異常見於 Ehlers-Danlos(尤其血管型 III 型膠原)。","D":"★正確(本題答案):Marfan=fibrillin-1(FBN1)異常。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"112080-20":{"quick":"錯在 B:Stanford 分類是依「是否侵犯升主動脈」而非「破口位置」;Type A=侵犯升主動脈(無論破口在哪),Type B=不侵犯升主動脈。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。","options":{"A":"正確:剝離至主動脈根部可致急性主動脈瓣閉鎖不全。","B":"★錯誤(本題答案):Stanford 以「是否侵犯升主動脈」分,非破口位置。","C":"正確:急性 Type A 須緊急開胸,以防升主動脈破裂。","D":"正確:無 malperfusion 的急性 Type B 可先藥物控制血壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"112080-21":{"quick":"錯在 C:第三型(type III)endoleak 是「支架組件接合處分離或織物破損」造成,並非「遠端接觸區」(遠端接觸區滲漏是 type Ib)。","detail":{"background":"EVAR 後內漏(endoleak)分型:Type I=支架與主動脈「接觸區」密合不良(Ia 近端、Ib 遠端);Type II=分支血管(腰動脈、下腸繫膜動脈)逆流入瘤囊(最常見);Type III=支架「組件接合處分離或織物結構破損」;Type IV=支架織物「孔隙(porosity)」滲漏;(Type V=endotension)。","options":{"A":"正確:Type I 在支架近/遠端接觸區。","B":"正確:Type II 為腰動脈/IMA 逆流。","C":"★錯誤(本題答案):Type III 為組件接合/織物破損,非遠端接觸區(那是 Ib)。","D":"正確:Type IV 為織物孔隙滲漏。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"113020-21":{"quick":"從左鎖骨下動脈起至「腎動脈以下」之腹主動脈=Crawford Type II(B),範圍最廣、脊髓缺血/截癱風險最高。","detail":{"background":"Crawford 胸腹主動脈瘤(TAAA)分類:Type I=左鎖骨下動脈遠端至腎動脈「上方」;Type II=左鎖骨下動脈遠端至腎動脈「以下」(範圍最廣,截癱風險最高);Type III=第 6 肋間(中段胸降)至腎動脈以下;Type IV=橫膈以下(第 12 肋間)至髂動脈(僅腹段)。","options":{"A":"Type I:止於腎動脈上方,不符。","B":"★正確(本題答案):左鎖骨下動脈至腎動脈以下=Type II。","C":"Type III:自中段胸降起,不符。","D":"Type IV:僅腹段,不符。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"113070-22":{"quick":"最不適當為 A:腎下腹主動脈瘤一年由 4→4.5 cm(增 0.5 cm/年,非快速)、無症狀、直徑僅 4.5 cm,未達 5.5 cm 門檻,應追蹤而非開刀。","detail":{"background":"腎下 AAA 手術適應症:①直徑 >5.5 cm(男性;女性常 >5.0 cm);②有症狀(腹/背痛=瀕破裂);③快速擴大(>0.5 cm/6 月 或 >1 cm/年)。4.5 cm 無症狀、年增僅 0.5 cm 者屬「定期追蹤」範圍。","options":{"A":"★最不適當(本題答案):4.5 cm 無症狀、年增 0.5 cm,應追蹤非手術。","B":"適當:有症狀的 AAA(即使 5 cm)應手術。","C":"適當:無症狀但 5.5 cm 達手術門檻。","D":"適當:女性 4.5 cm 但手術風險低—屬可考慮(女性門檻較低)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"114020-22":{"quick":"最不適合為 D:主動脈剝離血壓控制須「先 β-blocker 降心率與 dP/dt」再加血管擴張劑;「僅用血管擴張劑」會反射性心搏過速、增加主動脈剪力而助長剝離。","detail":{"background":"主動脈剝離的「anti-impulse therapy」核心:先靜脈 β-blocker(esmolol、labetalol)把心率降到約 60、降低 dP/dt(主動脈壁剪應力),血壓目標收縮壓約 100–120 mmHg;若血壓仍高再加血管擴張劑(nitroprusside)。「單用血管擴張劑」會引發反射性心搏過速、增加剪力,屬禁忌。Labetalol(α+β)單藥即可兼顧。","options":{"A":"適合:靜脈短效 β-blocker(esmolol)。","B":"適合:α+β 阻斷劑(labetalol)。","C":"適合:β-blocker 先行再加血管擴張劑。","D":"★最不適合(本題答案):僅血管擴張劑→反射心搏過速、增剪力。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"114070-20":{"quick":"DeBakey IIIa 與 IIIb 最大區別在「腹主動脈」(D):IIIa 限胸降主動脈,IIIb 向下延伸至腹主動脈。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。","options":{"A":"升主動脈為 DeBakey I/II 範圍,非 III 之區別。","B":"主動脈弓非 IIIa/IIIb 區別處。","C":"兩者皆含胸降主動脈,非區別點。","D":"★正確(本題答案):IIIb 延伸至腹主動脈,IIIa 不延伸。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"114070-23":{"quick":"錯在 D:血管內支架(endovascular stenting)是治療「降」主動脈瘤(TEVAR)的主流,但「升主動脈瘤」目前仍以「開胸置換」為主、無核准之升主動脈支架,並非以支架為主流。","detail":{"background":"胸主動脈瘤:先天性雙瓣(bicuspid aortic valve)為升主動脈瘤高危群(瓣膜病變伴主動脈壁病變)。手術門檻:升主動脈瘤一般 >5.5 cm(Marfan/雙瓣 >5.0、家族剝離史更低);女性/結締組織病門檻更低(7 cm 當然手術)。6 cm 升主動脈瘤若無嚴重 AR 可考慮保留瓣膜術式(valve-sparing)而非一律 Bentall。腔內支架(TEVAR)用於「降」主動脈;升主動脈瘤仍以開胸置換為主流。","options":{"A":"正確:雙瓣主動脈為升主動脈瘤高危群。","B":"正確:女性 7 cm 主動脈瘤可建議手術。","C":"正確:6 cm 升主動脈瘤無 AR 可考慮 valve-sparing。","D":"★錯誤(本題答案):升主動脈瘤仍以開胸置換為主,非支架為主流。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"114070-24":{"quick":"正確為 C:就「住院手術存活率」而言,傳統開腹置換比腔內支架(EVAR)為低(EVAR 圍術期存活較高)。A(>4 cm 即手術,錯,需 5.5)、B(EVAR 再介入率較低,錯,較高)、D(IMA 一定要再吻合,錯)皆誤。","detail":{"background":"EVAR 與開腹 AAA 修補比較:EVAR 圍術期(住院)死亡率較低、恢復快,但「再介入(re-intervention)率較高」(內漏、支架移位需追蹤);長期存活兩者趨同。手術中下腸繫膜動脈(IMA)是否再吻合視側枝循環而定,並非「一定」要再吻合。","options":{"A":"錯:>4 cm 不是手術門檻,需 >5.5 cm。","B":"錯:EVAR 再介入率較「高」而非低。","C":"★正確(本題答案):開腹置換住院存活率較 EVAR 低(EVAR 圍術期較安全)。","D":"錯:IMA 並非一定要再吻合。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"115020-36":{"quick":"急性主動脈症候群「不包含」主動脈粥狀硬化(A);AAS=急性剝離+壁內血腫(IMH)+穿透性潰瘍(PAU)。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。","options":{"A":"★不包含(本題答案):粥狀硬化是慢性病變,非急性主動脈症候群。","B":"包含:急性主動脈剝離。","C":"包含:主動脈壁內血腫(IMH)。","D":"包含:穿透性主動脈潰瘍(PAU)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"115020-37":{"quick":"最不適當為 A:急性 Type A 主動脈剝離是「立即手術」的外科急症,不是「藥物無效再考慮手術」。","detail":{"background":"主動脈剝離(aortic dissection)機制為內膜破口(intimal tear)使血流進入中層(media),在中層與外層(adventitia)之間形成假腔(false lumen)。Stanford 分類(以「是否侵犯升主動脈」決定,與破口位置無關):Type A=侵犯升主動脈→外科急症,須緊急升主動脈置換以防破裂入心包致填塞;Type B=不侵犯升主動脈(起於左鎖骨下動脈遠端)→先藥物(anti-impulse:先靜脈 β-blocker 降心率與 dP/dt,再加血管擴張劑),若「複雜型」(器官灌注不良 malperfusion、破裂、頑固疼痛/高血壓)→ TEVAR 或手術。DeBakey 分類:I=升+弓+降;II=僅升;III=僅降(IIIa 限胸降、IIIb 延伸至腹主動脈)。急性主動脈症候群(acute aortic syndrome)=主動脈剝離+壁內血腫(IMH)+穿透性潰瘍(PAU),不含單純粥狀硬化。診斷首選 CT 血管攝影(快速、敏感度/特異度高),TEE、MRI 亦可。 Type A IMH 比照 Type A AD(手術);複雜 Type B(malperfusion)需手術/TEVAR;PAU 多先藥物,但內徑 >20 mm、neck >10 mm 者建議儘早介入。","options":{"A":"★最不適當(本題答案):急性 Type A AD 須「立即」手術,非藥物無效再開刀。","B":"適當:複雜 Type B(malperfusion)需手術。","C":"適當:急性 Type A IMH 比照 Type A AD 手術。","D":"適當:PAU 多藥物優先,但大者(>20 mm、neck>10 mm)建議儘早介入。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","2022 ACC/AHA Aortic Disease Guideline","2014 ESC Aortic Diseases Guideline"]}},"102030-24":{"quick":"改良型 BT 分流(體動脈→肺動脈)的目的是「增加肺血流」→ 1 提高體動脈血氧、2 促進肺動脈發育(僅12,A);三尖瓣閉鎖的右心室發育不良走單心室路徑,不靠增加 PVR(3 錯)也不為促進右心室發育(4 錯)。","detail":{"background":"三尖瓣閉鎖合併肺動脈閉鎖屬「肺血流減少」的發紺性、單心室生理。新生兒期作改良型 Blalock-Taussig 分流(以人工血管接鎖骨下動脈/無名動脈到肺動脈)提供穩定肺血流,目的:①增加肺血流→提高體循環血氧;②促進肺動脈「發育」以利日後 Glenn/Fontan 分階段手術。右心室在此病為發育不良,不走雙心室修補,故無「促進右心室發育」之目的。","options":{"A":"★正確(本題答案):僅 1、2(提高血氧+促進肺動脈發育)。","B":"僅13:含 3(增加 PVR,錯)。","C":"僅23:含 3,錯。","D":"僅34:含 3、4 皆錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"102030-28":{"quick":"TOF 矯正後嚴重肺動脈瓣逆流致右心室擴大/衰竭→最佳處置為肺動脈瓣置換(B),消除容積負荷、保護右心室。","detail":{"background":"法洛氏四重症(TOF)完全矯正常需跨肺動脈瓣環補塊擴大右室出口,代價是長期肺動脈瓣逆流(PR);慢性嚴重 PR 造成右心室容積負荷、進行性擴大與功能衰退,並增加心律不整/猝死風險。處置為「肺動脈瓣置換(PVR)」(外科或經導管),依右心室容積指標(如 RVEDVi)決定時機。","options":{"A":"心房中隔造口無助於 PR 容積負荷。","B":"★正確(本題答案):肺動脈瓣置換消除逆流、保護右心室。","C":"三尖瓣置換非主因處置(問題在肺動脈瓣)。","D":"降肺高壓藥無法矯正瓣膜逆流。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"102110-23":{"quick":"subarterial 型 VSD 緊鄰肺動脈瓣下,經「肺動脈、肺動脈瓣」進入修補最易、最不傷心肌(B)。","detail":{"background":"subarterial(doubly committed/嵴上型)心室中隔缺損位於肺動脈瓣與主動脈瓣下方,常合併主動脈瓣(右冠瓣)脫垂致 AR。修補時經肺動脈、肺動脈瓣進入最容易顯露缺損上緣,且避免切開心室肌(經右心房三尖瓣常顯露不佳、經心室切口傷心肌)。","options":{"A":"經主動脈瓣顯露困難且風險高。","B":"★正確(本題答案):經肺動脈/肺動脈瓣最易、最不傷心肌。","C":"經右心房三尖瓣對此高位缺損顯露不佳。","D":"經左心室尖切口傷心肌,不採用。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"102110-25":{"quick":"錯在 B:Ebstein 異常最常合併的是「心房中隔缺損/卵圓孔開放(心房交通)」而非心室中隔缺損。","detail":{"background":"Ebstein 異常:三尖瓣(尤其隔葉、後葉)向下移位至右心室、形成「心房化右心室」,三尖瓣逆流、右心室發育與功能異常,常合併心房交通(ASD/PFO)→ 可右向左分流致發紺;傳導系統異常常見(WPW、附屬傳導路徑)。最常見的合併心臟異常是心房中隔缺損,不是 VSD。","options":{"A":"正確:三尖瓣向下移位是主要病徵。","B":"★錯誤(本題答案):最常合併者為 ASD/心房交通,非 VSD。","C":"正確:右心室、三尖瓣與傳導系統皆異常。","D":"正確:常有心房交通,可右向左分流。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"103100-24":{"quick":"Norwood 術式重建主動脈弓(體循環出口無阻塞)+改良 BT 分流控制肺血流,適用於「左心發育不全」一端,選項中為二尖瓣閉鎖(C,屬 HLHS 譜系)。","detail":{"background":"Norwood 第一階段術式用於左心發育不全症候群(HLHS)及其譜系(二尖瓣閉鎖、主動脈閉鎖等左心-體循環出口梗阻的單心室):把肺動脈幹接到發育不良的主動脈、重建主動脈弓使體循環無阻塞,再以改良 BT 分流(或 Sano RV-PA 分
