流)供應受控的肺血流;日後 Glenn、Fontan 完成單心室循環。","options":{"A":"主動脈弓中斷+VSD 屬雙心室病灶,非 Norwood 標的。","B":"主動脈窄縮+VSD 為雙心室,可分別修補。","C":"★正確(本題答案):二尖瓣閉鎖屬左心發育不全譜系,適用 Norwood。","D":"三尖瓣閉鎖為「右」側單心室,走 BT/Glenn/Fontan,非 Norwood。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"104030-23":{"quick":"subarterial VSD 緊鄰主動脈瓣環,常致「右冠狀動脈瓣(right coronary cusp)脫垂」進而主動脈瓣逆流(A)。","detail":{"background":"subarterial(嵴上型)VSD 因缺損上緣缺乏支撐,鄰近的主動脈瓣「右冠瓣(偶非冠瓣)」會經缺損被血流吸引脫垂(Venturi 效應),造成進行性主動脈瓣逆流;故即使缺損不大,合併 AR 或 AR 進展即為手術指徵,以保護主動脈瓣。","options":{"A":"★正確(本題答案):右冠狀動脈瓣脫垂致 AR。","B":"左冠瓣脫垂非此型典型。","C":"非冠瓣脫垂與膜周/流入型較不相關。","D":"伐氏竇瘤為另一獨立病變,非此機制。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"104090-21":{"quick":"主動脈窄縮的外科術式為 2 鎖骨下動脈皮瓣成形、3 布塊擴大、4 廣泛切除兩端吻合(234,D);1 動脈導管置放支架並非「主動脈窄縮」的外科修補。","detail":{"background":"單純主動脈窄縮(coarctation)外科修補選項:①廣泛切除窄縮段+延伸式端對端吻合(extended end-to-end,新生兒首選);②鎖骨下動脈皮瓣主動脈成形(subclavian flap);③布塊擴大成形(patch aortoplasty,有後期動脈瘤風險);(導管氣球擴張/支架用於年長兒或再窄縮)。「開放性動脈導管置放支架」並非主動脈窄縮的修補術式。","options":{"A":"12:含 1(非窄縮修補術式)。","B":"13:含 1,錯。","C":"14:含 1,錯。","D":"★正確(本題答案):2、3、4 為主動脈窄縮外科術式。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"107020-21":{"quick":"最常合併部分肺靜脈回流異常(PAPVR)的 ASD 是 sinus venosus type(C),尤其上腔靜脈型常合併右上肺靜脈異位引流。","detail":{"background":"心房中隔缺損(ASD)分型:secundum(最常見,卵圓窩處)、primum(屬房室中膈缺損譜系,常合併二尖瓣裂隙/MR)、sinus venosus(上腔或下腔靜脈型,「最常合併部分肺靜脈回流異常 PAPVR」,尤其右上肺靜脈引流入 SVC)、冠狀竇型。","options":{"A":"primum:合併二尖瓣裂隙/MR,非 PAPVR。","B":"secundum:最常見但非典型合併 PAPVR。","C":"★正確(本題答案):sinus venosus 型最常合併 PAPVR。","D":"冠狀竇型少見,非典型。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"107080-23":{"quick":"仍完全無法以心導管處理、必須手術者為「完全型心內膜墊異常(complete AVSD)」(D);肌肉型 VSD、ASD、PDA 皆可用封堵器/線圈處理。","detail":{"background":"經導管器械治療成熟的先天病灶:續發孔型 ASD(occluder)、PDA(coil/occluder)、部分肌肉型/膜周 VSD。但「完全型心內膜墊缺損(complete AVSD)」涉及共同房室瓣、心房+心室中隔缺損與瓣膜重建,必須外科手術(補片+房室瓣修補),無法以導管完成。","options":{"A":"肌肉型 VSD 可用器械封堵。","B":"續發孔 ASD 可用 occluder。","C":"PDA 可用 coil/occluder。","D":"★正確(本題答案):完全型 AVSD 必須手術,導管無法治療。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"108080-51":{"quick":"肺動脈瓣閉鎖屬「導管依賴性肺循環」,前列腺素 E1 使「開放性動脈導管(PDA)再度打開」,維持肺血流而改善發紺(B)。","detail":{"background":"新生兒「導管依賴性」發紺心臟病(如肺動脈閉鎖、嚴重肺動脈狹窄、TGA)靠動脈導管(ductus arteriosus)維持肺或體循環。前列腺素 E1(PGE1)靜脈輸注可維持/重開動脈導管。本例肺動脈瓣閉鎖→肺血流仰賴 PDA,PGE1 使 PDA 重開、增加肺血流而改善發紺。","options":{"A":"肺動脈瓣已閉鎖,PGE1 無法打開瓣膜。","B":"★正確(本題答案):PGE1 重開動脈導管,改善肺血流。","C":"ASD 為心房層面分流,非 PGE1 作用機轉。","D":"側枝循環非 PGE1 即時作用對象。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"108080-52":{"quick":"此為「肺動脈瓣閉鎖併完整心室中隔+右心室依賴型冠狀循環(RV-dependent coronary circulation)」:右心室竇與左冠相通且左主冠出口狹窄→不可減壓右心室(會偷走冠脈血流致心肌缺血),最佳處置為 BT 分流(B)維持肺血流、走單心室路徑。","detail":{"background":"肺動脈瓣閉鎖併完整心室中隔(PA-IVS)中,若右心室發育不良且存在「心室-冠狀竇交通(sinusoids)」並合併冠狀動脈狹窄,即「右心室依賴型冠狀循環」:冠狀動脈灌流靠高壓右心室經竇腔逆灌。此時「絕不可」做減壓右心室的手術(瓣膜切開/跨環補塊)—會使右心室壓下降、偷走冠脈血流致心肌梗塞。應行 BT 分流維持肺血流,日後走單心室(Fontan)路徑。","options":{"A":"肺動脈瓣切開會減壓右心室→冠脈缺血,禁忌。","B":"★正確(本題答案):BT 分流維持肺血流、不減壓右心室。","C":"跨環補塊擴大右室出口=減壓右心室,禁忌。","D":"含瓣膜切開(減壓),不適合。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"108080-53":{"quick":"右心室發育不良+右心室依賴冠狀循環→無法雙心室修補,最終走「單心室修補」即全腔靜脈肺動脈吻合(Fontan/TCPC)(C)。","detail":{"background":"右心室發育不良且為右心室依賴型冠狀循環者,不能做雙心室修補(會犧牲冠脈灌流),最終以單心室路徑收場:Glenn(上腔-肺動脈)→Fontan/全腔靜脈肺動脈吻合(TCPC),讓體靜脈血被動入肺、單一(左)心室供應體循環。","options":{"A":"雙心室修補需功能良好右心室,本例不適合。","B":"單純肺動脈瓣置換無法解決右心室發育不良。","C":"★正確(本題答案):單心室修補 Fontan/TCPC。","D":"單純三尖瓣置換無法處理單心室生理。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"109020-18":{"quick":"需「帶瓣膜的右心室-肺動脈同種移植物(valved RV-PA conduit)」者為 1 動脈幹症、3 肺動脈閉鎖合併 VSD(13,B);此二者需重建右心室到肺動脈的通道。","detail":{"background":"帶瓣膜的同種異體移植物(homograft,valved)用於重建「右心室到肺動脈」連結,適用於右室流出道/肺動脈缺如或需離斷重建者:①動脈幹症(truncus arteriosus,Rastelli 修補需 RV-PA conduit);③肺動脈閉鎖合併 VSD(需建立右室到肺動脈通道)。肺靜脈回流完全異常(2)與主動脈窄縮(4)不需 RV-PA conduit。","options":{"A":"12:含 2(TAPVR,不需 RV-PA conduit)。","B":"★正確(本題答案):1、3 需 RV-PA valved conduit。","C":"23:含 2,錯。","D":"14:含 4(coarctation),錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"109020-51":{"quick":"此為大型 VSD 致左→右分流、肺高壓、心衰竭、生長遲滯。有幫助的手術為 2 完全矯正(關閉 VSD)、3 肺動脈環縮術(姑息減少肺血流)(23,B);BT 分流(1)與肺動脈瓣切開(4)用於肺血流不足之發紺病,不適用。","detail":{"background":"非發紺、左→右分流的大型 VSD 嬰兒,肺血流過多致肺高壓、充血性心衰竭、餵食困難、生長遲滯;藥物效果有限時手術。選擇:①根本治療為「完全矯正」(關閉 VSD);②若太小/合併症多無法一次矯正,可先「肺動脈環縮術(PA banding)」姑息性限制肺血流、保護肺血管床。BT 分流與肺動脈瓣切開是「增加」肺血流的術式,用於發紺(肺血流不足)病,與本例相反。","options":{"A":"12:含 1(BT 分流,增加肺血流,錯)。","B":"★正確(本題答案):2 完全矯正、3 PA banding。","C":"14:皆為增加肺血流術式,錯。","D":"13:含 1,錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"109020-52":{"quick":"未手術的大型左→右分流長期致「肺血管壁硬化、肺血管阻力增加」,當 PVR 超過體循環阻力即逆轉為右→左分流(Eisenmenger),故原因為 A。","detail":{"background":"長期大量左→右分流使肺血流/壓力增高,肺小動脈內膜增生、中層肥厚、最終不可逆硬化(肺血管阻力 PVR 持續上升)。當 PVR 接近或超過體循環阻力,分流逆轉為右→左→出現發紺,即 Eisenmenger 症候群。","options":{"A":"★正確(本題答案):肺血管硬化、PVR 增加致分流逆轉。","B":"VSD 自行變小會減少分流而非致發紺。","C":"肺靜脈狹窄非此情境機轉。","D":"三尖瓣逆流非 Eisenmenger 主因。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"109020-53":{"quick":"已進展為 Eisenmenger(不可逆肺高壓)者,最終手術選擇為「心肺移植」(B)。","detail":{"background":"一旦進入 Eisenmenger 症候群(不可逆肺血管病變、右→左分流),關閉原本的分流缺損已禁忌(會致急性右心衰竭死亡)。終極治療為「心肺移植」(或肺移植合併心臟缺損修補)。故應在不可逆肺高壓「之前」即時手術矯正分流以避免走到此地步。","options":{"A":"此時擴大 VSD 無意義且危險。","B":"★正確(本題答案):Eisenmenger 最終需心肺移植。","C":"三尖瓣置換無法解決肺血管病變。","D":"非肺靜脈狹窄,氣球擴張無用。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"110020-16":{"quick":"會發生 Eisenmenger 者為「左→右分流」病灶:2 VSD、3 動脈幹症、4 PDA(234,D);肺動脈瓣狹窄(1)是阻塞性病變、不會 Eisenmenger。","detail":{"background":"Eisenmenger 症候群源自長期「左→右分流」造成不可逆肺高壓並逆轉。會走到此者為分流性病灶:VSD、PDA、動脈幹症(truncus)、大型 ASD、AVSD 等。肺動脈瓣「狹窄」屬右室流出道阻塞性病變,肺血流「減少」,不會造成 Eisenmenger。","options":{"A":"僅12:含 1(PS,錯)。","B":"僅13:含 1,錯。","C":"123:含 1,錯。","D":"★正確(本題答案):2 VSD、3 truncus、4 PDA。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"110080-20":{"quick":"錯在 C:做雙向 Glenn 時通常應「結紮/離斷」原有的體動脈-肺動脈分流(額外肺血流來源),保留它會增加單心室容積負荷,並不會提高長期存活。","detail":{"background":"單心室分階段手術:第一階段提供平衡肺血流(Norwood/BT/PA banding);第二階段「雙向 Glenn(上腔靜脈-肺動脈吻合)」通常在 3–6 個月施行,此時多「拆除」原有的體-肺分流以減少容積負荷;第三階段 Fontan(下腔靜脈導入肺動脈)。HLHS 與三尖瓣閉鎖都走 Fontan 路徑;Norwood 可用 RV-PA(Sano)分流取代主-肺分流。","options":{"A":"正確:HLHS 與三尖瓣閉鎖皆走 Fontan 路徑。","B":"正確:雙向 Glenn 多在第一階段後 3–6 個月施行。","C":"★錯誤(本題答案):Glenn 時應拆除而非保留體-肺分流;保留會增容積負荷、不提高存活。","D":"正確:Norwood 可用心室-肺動脈(Sano)分流取代主-肺分流。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"110080-21":{"quick":"不是發紺性心臟病者為「肺動脈吊索(pulmonary artery sling)」(C)—它是血管環壓迫氣管的病變,非心內分流致發紺;TOF、TGA、三尖瓣閉鎖皆為發紺性。","detail":{"background":"發紺性先天性心臟病(右→左分流或血液混合):法洛氏四重症(TOF)、大動脈轉位(TGA)、三尖瓣閉鎖、肺動脈閉鎖、永存動脈幹、完全性肺靜脈回流異常等。「肺動脈吊索」是左肺動脈異常起自右肺動脈、繞過氣管/食道造成壓迫(呼吸道症狀)的血管環異常,屬非發紺性結構問題。","options":{"A":"TOF 為典型發紺性。","B":"TGA 為發紺性。","C":"★正確(本題答案):肺動脈吊索是血管環壓迫,非發紺性。","D":"三尖瓣閉鎖為發紺性。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"111020-30":{"quick":"無法以 PGE1 緩解、必須立即手術者為「阻塞型心下型完全肺靜脈回流異常(obstructed infracardiac TAPVR)」(C)—它是肺靜脈回流阻塞,非導管依賴,PGE1 無效。","detail":{"background":"前列腺素 E1 維持動脈導管,救「導管依賴」病灶(HLHS、TOF 缺氧發作可部分、TGA、嚴重肺動脈狹窄/閉鎖)。但「阻塞型心下型 TAPVR」的問題在「肺靜脈回流被橫膈下狹窄阻塞→嚴重肺水腫、血氧驟降」,與動脈導管無關,PGE1 甚至可能加重肺充血,屬「新生兒外科急症」,須立即手術解除肺靜脈阻塞。","options":{"A":"HLHS 為導管依賴,PGE1 可暫穩。","B":"TOF 缺氧發作可用 PGE1/其他暫緩。","C":"★正確(本題答案):阻塞型 TAPVR 非導管依賴,PGE1 無效,須立即手術。","D":"TGA+VSD 為導管依賴,PGE1 可暫穩(再行 BAS/手術)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"112080-23":{"quick":"錯在 C:常合併二尖瓣逆流(瓣膜裂隙)的是「原發孔(primum)型/房室中膈型」ASD,而非下腔型 sinus venosus ASD。","detail":{"background":"ASD 重點:>40 歲病人術前建議心導管(評估冠狀動脈/肺壓);固定性肺血管阻力過高(>~8–12 Wood units、不可逆)者「不可」關閉缺損(會致右心衰竭=Eisenmenger 生理);原發孔(primum,屬部分性 AVSD)常合併二尖瓣裂隙→MR;青春期前女童不宜用會影響乳房發育的前外側開胸。下腔型 sinus venosus 多合併下腔靜脈騎跨/PAPVR,並非典型合併 MR。","options":{"A":"正確:>40 歲 ASD 建議心導管檢查。","B":"正確:固定肺阻力過高(>12 Wood units)不可關閉缺損。","C":"★錯誤(本題答案):合併 MR 者為 primum 型,非 inferior sinus venosus 型。","D":"正確:青春期前女童不宜前外側開胸(影響乳房發育)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"112080-24":{"quick":"8 個月大嬰兒主動脈瓣狹窄,最不適合「機械瓣膜置換」(C):嬰兒瓣環小、機械瓣不能隨成長、且需終身抗凝;應先氣球擴張或直視瓣膜切開,日後可考慮 Ross。","detail":{"background":"嬰幼兒先天性主動脈瓣狹窄(壓差 60 mmHg、心衰竭)的處置階梯以「保留自身瓣膜、可隨成長」為原則:首選經皮氣球瓣膜成形或外科直視瓣膜切開(valvotomy)緩解梗阻;日後需置換時,Ross 手術(自體肺動脈瓣移至主動脈、可生長、免抗凝)是兒童良好選項。8 個月大放「機械瓣」最不適合—瓣環太小、無法生長、需終身抗凝。","options":{"A":"適合:氣球瓣膜成形,初步緩解。","B":"適合:外科直視瓣膜切開。","C":"★最不適合(本題答案):嬰兒機械瓣不能成長、需終身抗凝。","D":"適合(日後):Ross 手術自體瓣可生長、免抗凝。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"113070-23":{"quick":"錯在 B:完全型房室中膈缺損(AVSD)的傳導系統/房室結位置「移位異常」(房室結向後下移位、Koch 三角變形),與單純大動脈轉位「不同」,術中易傷傳導束致房室阻斷。","detail":{"background":"完全型心內膜墊缺損(complete AVSD,房室中膈缺損):共同房室瓣+心房及心室中隔缺損,大量左→右分流→嬰兒早期心衰竭,需儘早手術(無法早期全矯正時可先 PA banding 姑息)。其傳導系統異常—房室結向後下移位(因 AV 中膈缺如)、傳導束沿缺損下緣走,縫合須避開以免完全性房室阻斷,與單純 TGA「不同」。房室瓣依 Rastelli A/B/C 分型;全矯正後仍可能殘留房室瓣(二尖/三尖)逆流。","options":{"A":"正確:complete AVSD 易早期心衰竭,可先 PA banding。","B":"★錯誤(本題答案):AVSD 傳導/房室結位置異常,與單純 TGA 不同。","C":"正確:術後仍可能有房室瓣(二尖/三尖)問題。","D":"正確:瓣膜異常依 Rastelli A、B、C 分型。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"114070-22":{"quick":"TOF 缺氧發作(tet spell,SpO2 65%)較不合適者為「血管擴張劑」(C):它降低體循環阻力(SVR)會加重右→左分流、惡化發紺。處置應增加 SVR/前負荷與鬆弛右室流出道。","detail":{"background":"法洛氏四重症缺氧發作(tet spell)機制為右室流出道漏斗部痙攣+SVR 下降→右→左分流增加、發紺加劇。處置:膝胸臥位、氧氣、鎮靜(morphine)、輸液(增加前負荷與肺血流)、β-blocker(propranolol 鬆弛漏斗部痙攣、減慢心率)、必要時 phenylephrine(升高 SVR);發作頻繁則手術。給「血管擴張劑」會降 SVR、加重右→左分流,屬禁忌。","options":{"A":"合適:β-blocker 鬆弛漏斗部痙攣。","B":"合適:輸液增加前負荷與肺血流。","C":"★較不合適(本題答案):血管擴張劑降 SVR、加重右→左分流與發紺。","D":"合適:鎮靜減少哭鬧、降低耗氧與痙攣。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Nichols Critical Heart Disease in Infants and Children","2018 AHA/ACC Adult Congenital Heart Disease Guideline"]}},"101030-29":{"quick":"正確為 4(D):出血是 ECMO 常見併發症(全身肝素化)。1(可支持數月至數年,錯—ECMO 為天至數週的短期支持)、2(胎便吸入 ECMO 存活<50%,錯—其實>90%)、3(用於深度昏迷,錯—不可逆神經損傷是禁忌)。","detail":{"background":"體外膜氧合(ECMO)是「短期(數天至數週)」的心肺支持,把血液引出、經氧合器與幫浦再回輸:VA-ECMO 支持心肺、VV-ECMO 支持肺。需全身肝素化,「出血」(插管處、顱內、消化道)與血栓、肢體缺血、感染為常見併發症。適應症為「可逆」的心或肺衰竭或橋接;不可逆嚴重神經損傷/末期不可逆疾病為禁忌。新生兒胎便吸入症候群(MAS)是 ECMO 存活率最高(>90%)的適應症之一。","options":{"A":"123:含 1、2、3 皆錯。","B":"13:含 1、3 錯。","C":"24:含 2 錯。","D":"★正確(本題答案):僅 4(出血為常見併發症)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"105020-22":{"quick":"末期心衰竭在移植前可改善心功能的手術除外者為 C 經心肌雷射血管再生術(TMLR):它只緩解頑固心絞痛、無法改善心室功能;CABG、二尖瓣重建、部分左心室切除(Batista)才可改善心功能。","detail":{"background":"末期心衰竭在等待/替代心臟移植前的「心室改善」外科選項:①缺血性心肌病→CABG(STICH 顯示特定族群 CABG 有益);②功能性二尖瓣逆流→二尖瓣重建/瓣環整形以減容積負荷;③部分左心室切除(Batista partial ventriculectomy)減小擴大的左心室。經心肌雷射血管再生術(TMLR)僅用於無法繞道/PCI 的頑固心絞痛之症狀緩解,不改善整體心室功能。","options":{"A":"可改善:缺血性心肌病 CABG。","B":"可改善:功能性 MR 之二尖瓣重建。","C":"★除外(本題答案):TMLR 僅緩解心絞痛,不改善心室功能。","D":"可改善:部分左心室切除(Batista)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"106020-23":{"quick":"不適宜移植受贈者為 C:固定性肺高壓(PVR>5 Wood units 且不可逆)是心臟移植的重要禁忌——捐贈心的右心室無法承受高肺阻力會急性衰竭。","detail":{"background":"心臟移植受贈者評估:適合者為末期心衰竭、藥物/手術皆無法改善、預期壽命短者。重要「禁忌」之一是「固定性、不可逆的肺血管阻力過高(PVR > ~5–6 Wood units 或跨肺壓差高且對血管擴張劑無反應)」—正常捐贈心的右心室無法瞬間承受高肺阻力→術後急性右心衰竭。其他禁忌:活動性感染/癌症、嚴重不可逆他器官衰竭、無法配合等。","options":{"A":"適合:嚴重冠心病、所有療法無效之末期缺血心肌病。","B":"適合:肥厚性心肌病術後仍末期心衰竭。","C":"★不適宜(本題答案):固定性肺高壓 PVR>5 Wood units,移植禁忌。","D":"適合:良性心臟腫瘤致頑固室速、無法切除者。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"107020-19":{"quick":"此為 IABP/ECMO 股動脈插管致左下肢缺血/腔室症候群。錯在 3、4(C):小腿是「四個」腔室(非五個)(4 錯);腔室壓門檻一般約 30 mmHg(delta P<30)才考慮筋膜切開,「>20 即切開」過低(3 表述有誤)。應先確認肢端脈搏(1)、再灌流後 CK 上升(2)皆正確。","detail":{"background":"股動脈大管徑插管(IABP、VA-ECMO)會阻擋下肢血流→肢體缺血,常放「遠端灌流導管」預防。缺血/再灌流後易腔室症候群:先確認肢端脈搏與灌流,缺血肌肉壞死使 CK、肌球蛋白上升;小腿有「四個」腔室(前 anterior、外側 lateral、淺後 superficial posterior、深後 deep posterior),腔室壓升高、delta 壓(舒張壓−腔室壓)<30 mmHg 或臨床惡化即須筋膜切開。","options":{"A":"僅12:1、2 正確但不完整(漏掉判斷 3、4 何者錯)。","B":"23:含 2(正確)與 3(門檻錯),非全錯選項。","C":"★正確(本題答案):3(>20 即切開過低)、4(小腿為四腔室非五)為錯誤敘述。","D":"124:含 1、2(正確)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"108080-18":{"quick":"IABP 最佳適應症為 C 二尖瓣腱索斷裂併急性重度二尖瓣逆流:IABP 降低後負荷可減少逆流分量、增加前向輸出。主動脈瓣逆流(A、B)是 IABP「禁忌」(舒張期充氣會加重 AR)。","detail":{"background":"主動脈內氣球幫浦(IABP)於舒張期充氣(增加冠狀動脈灌流)、收縮期前洩氣(降低後負荷),適用於:心因性休克、急性重度二尖瓣逆流、梗塞後心室中隔破裂、頑固缺血、高風險 PCI 的暫時支持。「禁忌」:中重度主動脈瓣逆流(舒張期充氣會加重 AR)、主動脈剝離、嚴重周邊動脈疾病。","options":{"A":"禁忌:急性重度 AR + 升主動脈剝離,IABP 加重 AR 且不可用於剝離。","B":"禁忌:慢性重度 AR,IABP 加重逆流。","C":"★最佳適應症(本題答案):急性重度 MR,IABP 降後負荷減少逆流。","D":"感染性腹主動脈瘤敗血休克非 IABP 適應症。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"109020-47":{"quick":"不適合移植者為 D:複雜先天性心臟病若「可用傳統手術矯正」就應先矯正,而非移植;移植保留給無法以其他方式治療的末期病人。","detail":{"background":"心臟移植適應症:末期心衰竭(LVEF 極低、反覆住院)、無法以藥物/CABG/瓣膜手術改善、依賴 ECMO/VAD 無法脫離者。若疾病「尚可用傳統手術矯正」(如可修補的先天性心臟病),應先矯正而非移植(移植資源有限、需終身免疫抑制)。","options":{"A":"適合:反覆嚴重心衰竭、LVEF<20%。","B":"適合:嚴重心肌缺血無法 CABG。","C":"適合:依賴 ECMO 無法脫離(橋接移植)。","D":"★不適合(本題答案):複雜先天病可傳統手術矯正者應先矯正。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"109080-26":{"quick":"錯在 B:STITCH(STICH)試驗顯示「CABG 加上左心室成型術(SVR)」相較單純 CABG,並「未」改善症狀與存活;A(HeartMate II 可橋接亦可終極治療)、C(HeartWare 為 LVAD)、D(全人工心臟可橋接)皆正確。","detail":{"background":"末期心衰竭的機械與外科治療:植入式連續流左心室輔助器(HeartMate II/3、HeartWare)可作「移植前橋接(bridge to transplant)」或「終極治療(destination therapy)」;全人工心臟(TAH)可橋接雙心室衰竭。STICH 試驗的外科心室重建(SVR)子研究(Hypothesis 2)顯示:CABG+SVR 相較單純 CABG「並未」改善死亡或心衰竭住院,故 B 敘述錯誤。","options":{"A":"正確:HeartMate II 可橋接亦可 destination therapy。","B":"★錯誤(本題答案):STICH—CABG+SVR 未優於單純 CABG。","C":"正確:HeartWare 為 LVAD,可橋接移植。","D":"正確:全人工心臟可作移植前橋接。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"111020-28":{"quick":"IABP 球囊最佳位置在降主動脈、左鎖骨下動脈遠端約 2 cm、腎動脈上方,即圖中第 III 段(C):太高會擋住左鎖骨下/腦血流,太低會擋腎/腸繫膜動脈。","detail":{"background":"主動脈內氣球幫浦(IABP)球囊尖端的理想位置在「降主動脈、左鎖骨下動脈開口遠端約 1–2 cm」、且在腎動脈開口「上方」。位置太高會阻擋左鎖骨下動脈(左臂/腦血流),太低會阻擋腎與腸繫膜動脈灌流。對應將主動脈分段圖的近端胸降主動脈段(本題 III)。","options":{"A":"I(升主動脈)太高,球囊不放於此。","B":"II(主動脈弓)會擋腦血管。","C":"★正確(本題答案):III—左鎖骨下動脈遠端、腎動脈上方之胸降主動脈。","D":"IV(腹主動脈)太低,擋腎/腸繫膜血流。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"114020-23":{"quick":"此為左主幹病變+多血管嚴重狹窄之心因性休克(已上 IABP),最不適當為 C:不能為了等抗血小板藥效消退而延遲手術——休克下左主幹病變須緊急 CABG,出血以輸血/血小板處理。","detail":{"background":"左主幹嚴重狹窄合併多血管病變、心因性休克(已用 IABP)是「緊急血運重建」情境。雖然雙重抗血小板會增加術中出血,但「不能」為了等藥效消退而延遲緊急 CABG(等待期間可能致命);可用血小板輸注、抗纖溶藥處理出血。必要時升級機械循環輔助(ECMO/VAD)穩定。","options":{"A":"適當:左主幹病變+休克,高度建議緊急 CABG。","B":"適當:可升級 ECMO/VAD 等機械循環輔助。","C":"★最不適當(本題答案):休克左主幹病變不可為等抗血小板藥效而延遲手術。","D":"適當(正確觀念):off-pump 與 on-pump CABG 長期成果無顯著差異。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"114020-24":{"quick":"錯在 A:IABP-SHOCK II 試驗顯示 IABP 對心肌梗塞後心因性休克病人「並未」改善存活(相較最佳藥物治療)。B(REMATCH:LVAD 優於藥物)、C(ECMO 可同時支持心肺)、D(長效 VAD 可橋接亦可終極治療)皆正確。","detail":{"background":"機械循環輔助實證:①IABP-SHOCK II(2012)—IABP 對 MI 後心因性休克「未」改善 30 天/長期存活,故指引下修 IABP 在休克的角色;②REMATCH(2001)—植入式 LVAD 對第四級(NYHA IV)末期心衰竭優於最佳藥物治療;③ECMO(尤其 VA)可同時支持心與肺,是唯一同時支持心肺衰竭的選項;④長效(durable)VAD 可作橋接移植與終極治療(destination)。","options":{"A":"★錯誤(本題答案):IABP-SHOCK II 顯示 IABP 未改善休克存活。","B":"正確:REMATCH—LVAD 優於藥物治療於 NYHA IV。","C":"正確:ECMO 是唯一可同時支持心肺者。","D":"正確:長效 VAD 可橋接亦可終極治療。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"101030-72":{"quick":"最能分辨填塞與張力性氣胸者為「呼吸音」(D):張力性氣胸患側呼吸音消失,心包填塞兩側呼吸音正常。頻脈、頸靜脈壓上升、脈壓變窄兩者皆有,無法鑑別。","detail":{"background":"創傷性低血壓合併頸靜脈怒張的兩大鑑別是「心包填塞」與「張力性氣胸」,兩者都有 Beck/休克表現(低血壓、頸靜脈壓升高、心搏過速),關鍵區別在「呼吸音」:張力性氣胸患側呼吸音消失、氣管偏移、患側叩診過度反響;心包填塞兩側呼吸音正常、心音遙遠。心包填塞血流動力:中心靜脈壓(CVP)↑、動脈壓↓、心輸出量↓、混合靜脈血氧飽和度↓(低心輸出致組織攝氧增加)。處置:張力性氣胸→立即針刺/胸管減壓;心包填塞→FAST/超音波、心包穿刺或開胸;穿刺傷致填塞且無血壓者→急診開胸術(ED thoracotomy)。","options":{"A":"頻脈:兩者皆有,無法鑑別。","B":"脈壓:兩者都變窄,無法鑑別。","C":"頸靜脈壓:兩者皆升高,無法鑑別。","D":"★正確(本題答案):呼吸音—張力性氣胸患側消失,填塞兩側正常。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"103100-72":{"quick":"最快分辨方式為「胸部理學檢查」(C):聽診呼吸音、叩診、視診頸靜脈與氣管位置,床邊立即可得,不需等影像或侵入處置。","detail":{"background":"創傷性低血壓合併頸靜脈怒張的兩大鑑別是「心包填塞」與「張力性氣胸」,兩者都有 Beck/休克表現(低血壓、頸靜脈壓升高、心搏過速),關鍵區別在「呼吸音」:張力性氣胸患側呼吸音消失、氣管偏移、患側叩診過度反響;心包填塞兩側呼吸音正常、心音遙遠。心包填塞血流動力:中心靜脈壓(CVP)↑、動脈壓↓、心輸出量↓、混合靜脈血氧飽和度↓(低心輸出致組織攝氧增加)。處置:張力性氣胸→立即針刺/胸管減壓;心包填塞→FAST/超音波、心包穿刺或開胸;穿刺傷致填塞且無血壓者→急診開胸術(ED thoracotomy)。","options":{"A":"插胸管是處置而非最快鑑別法。","B":"心包穿刺為侵入性處置,非首選鑑別。","C":"★正確(本題答案):床邊理學檢查最快(呼吸音/叩診/氣管偏移)。","D":"照 X 光需時間,不如理學檢查快。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"105020-9":{"quick":"心包填塞之血流動力為 B:中心靜脈壓↑、動脈壓↓、心輸出量↓、混合靜脈血氧飽和度↓。","detail":{"background":"創傷性低血壓合併頸靜脈怒張的兩大鑑別是「心包填塞」與「張力性氣胸」,兩者都有 Beck/休克表現(低血壓、頸靜脈壓升高、心搏過速),關鍵區別在「呼吸音」:張力性氣胸患側呼吸音消失、氣管偏移、患側叩診過度反響;心包填塞兩側呼吸音正常、心音遙遠。心包填塞血流動力:中心靜脈壓(CVP)↑、動脈壓↓、心輸出量↓、混合靜脈血氧飽和度↓(低心輸出致組織攝氧增加)。處置:張力性氣胸→立即針刺/胸管減壓;心包填塞→FAST/超音波、心包穿刺或開胸;穿刺傷致填塞且無血壓者→急診開胸術(ED thoracotomy)。","options":{"A":"全部↓:CVP 應上升,不符。","B":"★正確(本題答案):CVP↑、ABP↓、CO↓、SvO2↓。","C":"SvO2↑不符(低心輸出時攝氧增加,SvO2 應↓)。","D":"ABP↑、CO↑不符。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"109080-30":{"quick":"理學檢查差別在「兩側呼吸聲不一致」(A):張力性氣胸患側呼吸音消失致兩側不一致,心包填塞兩側呼吸音對稱。頸靜脈怒張、心音變小、血壓下降兩者皆可見,無法鑑別。","detail":{"background":"創傷性低血壓合併頸靜脈怒張的兩大鑑別是「心包填塞」與「張力性氣胸」,兩者都有 Beck/休克表現(低血壓、頸靜脈壓升高、心搏過速),關鍵區別在「呼吸音」:張力性氣胸患側呼吸音消失、氣管偏移、患側叩診過度反響;心包填塞兩側呼吸音正常、心音遙遠。心包填塞血流動力:中心靜脈壓(CVP)↑、動脈壓↓、心輸出量↓、混合靜脈血氧飽和度↓(低心輸出致組織攝氧增加)。處置:張力性氣胸→立即針刺/胸管減壓;心包填塞→FAST/超音波、心包穿刺或開胸;穿刺傷致填塞且無血壓者→急診開胸術(ED thoracotomy)。","options":{"A":"★正確(本題答案):兩側呼吸音不一致=張力性氣胸(患側消失)。","B":"頸靜脈鼓張兩者皆有,且多為兩側,不易鑑別。","C":"心音變小兩者皆可(填塞遙遠、氣胸亦遠),不專一。","D":"血壓下降兩者皆有。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"111020-8":{"quick":"須手術探查者為 1、2、3(C):①置入胸管立即引流 1,500 mL 鮮血(大量血胸)、②心包填塞、③開放性氣胸皆須手術;④兩側疑似受傷與⑤少量氣體溢出本身非開刀適應症。","detail":{"background":"胸部穿刺傷的「開胸手術探查」適應症:①初始胸管引流 >1,000–1,500 mL,或持續 >200 mL/小時數小時(大量血胸);②心包填塞/心臟損傷;③開放性(吸吮性)氣胸或大量持續漏氣;④大血管/食道/氣管支氣管損傷;⑤胸腔內異物或穿越縱隔之傷道。單純「兩側疑似受傷」或「少量氣體溢出」非手術適應症。","options":{"A":"124:含 4(兩側疑似),非手術適應症。","B":"345:含 4、5,非必然手術適應症。","C":"★正確(本題答案):1、2、3 須手術探查。","D":"125:含 5(少量氣體),非手術適應症。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"111020-32":{"quick":"此為穿刺傷致心包填塞(劍突上傷口、頸靜脈怒張、休克、兩側呼吸音一致)。不適合者為 D:血流動力不穩定者不應為了照 portable X 光延誤救命處置;應 FAST/超音波、心包穿刺,血壓量不到即急診開胸。","detail":{"background":"前胸/劍突區穿刺傷+休克+頸靜脈怒張+兩側呼吸音一致→高度懷疑心包填塞(心臟損傷)。處置:立即 FAST/心臟超音波確認;暫時性心包穿刺減壓;若已無血壓(瀕死)→「急診開胸術(ED thoracotomy)」解除填塞、控制出血。不穩定病人「不應」為了照移動式胸部 X 光而延誤救命操作(X 光對填塞診斷價值低)。","options":{"A":"適合:立即心臟超音波診斷填塞。","B":"適合:心包穿刺暫時減壓。","C":"適合:已無血壓考慮立即開胸術。","D":"★不適合(本題答案):不穩定病人不應為照 portable X 光延誤救命處置。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"111080-2":{"quick":"最能鑑別張力性氣胸與心包積血(填塞)者為「胸部是否有呼吸聲」(A):張力性氣胸患側呼吸音消失,心包填塞呼吸音正常。","detail":{"background":"創傷性低血壓合併頸靜脈怒張的兩大鑑別是「心包填塞」與「張力性氣胸」,兩者都有 Beck/休克表現(低血壓、頸靜脈壓升高、心搏過速),關鍵區別在「呼吸音」:張力性氣胸患側呼吸音消失、氣管偏移、患側叩診過度反響;心包填塞兩側呼吸音正常、心音遙遠。心包填塞血流動力:中心靜脈壓(CVP)↑、動脈壓↓、心輸出量↓、混合靜脈血氧飽和度↓(低心輸出致組織攝氧增加)。處置:張力性氣胸→立即針刺/胸管減壓;心包填塞→FAST/超音波、心包穿刺或開胸;穿刺傷致填塞且無血壓者→急診開胸術(ED thoracotomy)。","options":{"A":"★正確(本題答案):呼吸音—張力性氣胸患側消失,填塞正常。","B":"肋骨骨折與否非兩者鑑別關鍵。","C":"心音兩者皆可變小(填塞遙遠),不專一。","D":"心跳加速兩者皆有。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"112080-29":{"quick":"較不適當(非手術適應症)者為 C:胸管放置後立即引流 500 mL 且生命跡象回穩→屬可保守觀察,非須開刀;心包填塞、食道破裂、持續漏氣併肺塌陷皆為手術適應症。","detail":{"background":"胸部穿刺傷之外科適應症:心包填塞/心臟損傷、食道破裂(縱膈感染風險高)、氣管支氣管損傷(持續大漏氣、肺塌陷/通氣不足)、大量血胸(>1,500 mL 或持續高流量)。若胸管放置後僅引流 500 mL 且「生命跡象回穩」,屬可保守觀察追蹤,非立即手術適應症。","options":{"A":"適應症:心包填塞需手術。","B":"適應症:食道破裂須手術修補。","C":"★較不適當(本題答案):引流 500 mL 後穩定→保守觀察,非手術適應症。","D":"適應症:持續漏氣+肺塌陷/通氣不足須手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","ELSO Guidelines (ECMO)","ATLS 10th edition","2013 ISHLT Mechanical Circulatory Support Guideline"]}},"101030-77":{"quick":"突發性下肢動脈栓塞+心臟 CT 見左心房腫塊→左心房黏液瘤(B):黏液瘤碎屑脫落造成體循環栓塞(右膕動脈)。","detail":{"background":"心臟黏液瘤(myxoma)是成人最常見的原發性良性心臟腫瘤,75% 位於「左心房」(多附著於卵圓窩處心房中隔),表面膠凍狀易碎,碎屑或表面血栓脫落→體循環栓塞(腦中風、肢體動脈栓塞如本例右膕動脈),也可造成阻塞性症狀(類二尖瓣狹窄)與全身症狀(發燒、體重減輕)。治療為手術切除。","options":{"A":"左心耳血栓多見於 MS/AF,本例無此病史且影像為腫瘤。","B":"★正確(本題答案):左心房黏液瘤碎屑栓塞致下肢動脈栓塞。","C":"MS 合併左心房血栓無相關病史。","D":"右心房黏液瘤栓塞應致肺栓塞,而非體循環下肢栓塞。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"103100-22":{"quick":"正確為 2、4(C):CABG 後 CVP 低(4)、心搏快、胸管 600cc/2h 且漸增、傷口滲血、下肢冰冷→活動性出血/低血容(2),須通知心臟外科醫師(4);此時應補容積/止血/可能再開刀,給強心劑(3)不對,且未提體溫過低(1)。","detail":{"background":"CABG 術後早期低血壓+心搏過速+「中心靜脈壓低」+胸管引流量大且漸增+傷口滲血+四肢冰冷=活動性出血造成低血容性休克。處置:輸液/輸血補容、矯正凝血、若引流>200 mL/h 持續或大量→通知外科再次開胸止血(re-exploration)。此時「給強心劑」並非首要(問題是容積不足而非收縮力),亦不應只當作心臟失能處理。","options":{"A":"123:含 1(未提體溫過低)、3(強心劑不對)。","B":"僅13:皆不適當。","C":"★正確(本題答案):2 活動性出血、4 通知心臟外科。","D":"僅4:漏掉 2(活動性出血)。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"104090-1":{"quick":"機械瓣置換後胸管引流「減少」但 CVP 上升、尿少、心搏快、血壓降→典型心包填塞(血塊堵塞引流管);鑑別填塞與心臟失能的最佳工具是「心臟超音波」(A)。","detail":{"background":"心臟術後若胸管引流突然「減少」(血塊阻塞)合併 CVP 上升、心輸出下降(尿少、低血壓、心搏快)=心包/縱膈填塞(tamponade)。要與單純術後心肌失能鑑別,首選「心臟超音波」—可直接看到心包/縱膈積血、心室受壓塌陷、舒張期填充受限;確診後再開胸清除血塊解壓。","options":{"A":"★正確(本題答案):心臟超音波可直接看積血與心室受壓,最佳鑑別。","B":"胸部 X 光僅見縱膈變寬,無法即時確診填塞。","C":"Swan-Ganz 可見壓力均等化但非首選、較侵入。","D":"動脈血氣分析無法鑑別填塞與心肌失能。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"104090-20":{"quick":"錯在 D:放射線引起(radiation-induced)的窄縮性心包膜炎,心包膜切除術後預後「最差」(常合併心肌與縱膈廣泛纖維化),並非最佳。","detail":{"background":"心包膜疾病:正常心包液約 15–50 mL;「急性」創傷性填塞因心包順應性差,積液即使只增加數十 mL 壓力即急升(壓力-容積曲線陡峭)。窄縮性心包膜炎與限制性心肌病變需以右心導管壓力波形(如壓力均等化、dip-and-plateau)鑑別。續發性惡性心包積液最常見原發為肺癌(男女皆是)。窄縮性心包膜炎病因中,放射線誘發者因心肌/縱膈廣泛纖維化,心包膜切除術預後最差。","options":{"A":"正確:創傷急性填塞因心包順應性差,少量積液壓力即急升。","B":"正確:窄縮 vs 限制性常需右心導管壓力波形鑑別。","C":"正確:惡性心包積液最常見原發為肺癌(男女皆是)。","D":"★錯誤(本題答案):放射線誘發之窄縮性心包炎手術預後「最差」而非最佳。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"105100-25":{"quick":"錯在 A:心肌保護「不是」靠在腔室內留滯大量血液經心內膜灌注;而是靠心臟麻痺液(cardioplegia,高鉀停跳降代謝)+低溫(全身降溫與心臟冰浴)+順行/逆行灌注,停跳期心室是被排空(vent)減壓。","detail":{"background":"開心手術心肌保護目標是讓心臟在缺血停跳期間維持心肌活性:①「心臟麻痺液(cardioplegia)」為高鉀溶液使心臟於舒張期停跳、降低代謝耗氧;②低溫(體外循環全身降溫+心臟局部冰浴/冰泥)降低代謝;③灌注路徑可順行(經主動脈根部/冠狀動脈口)或逆行(經冠狀竇),兩者皆可。停跳期心室應被引流排空減壓,而非「留大量血液在腔室」。","options":{"A":"★錯誤(本題答案):非靠腔室內留血灌注,而是 cardioplegia+低溫+順/逆行灌注。","B":"正確:cardioplegia 為高鉀液,降低心肌代謝。","C":"正確:全身降溫+心臟冰浴達心肌保護。","D":"正確:順行或逆行灌注皆可保護心肌。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"106020-22":{"quick":"心臟術後低血壓+肺動脈壓升高+肺楔壓 20、CVP 15(充填壓高)+心搏 130→泵衰竭(低心輸出),正解為僅4(D)強心劑增加收縮力;血管擴張劑(1)會更降血壓、抗心律不整(2)針對代償性竇速無益、ECMO(3)言之過早。","detail":{"background":"心臟術後出現低血壓、肺動脈壓與肺楔壓上升(PAWP 20)、CVP 15(充填壓皆高)、心搏過速=左心室泵衰竭/低心輸出。第一線處置是「強心劑(inotrope)」增加收縮力,並視情況調整前負荷;血管擴張劑在已低血壓時會更降壓(需先穩住血壓再考慮降後負荷),竇性心搏過速是代償不應一味壓制,ECMO 等機械循環是藥物無效時的後線。","options":{"A":"123:含 1(血管擴張劑會更降壓)。","B":"僅13:不適當。","C":"24:含 2(抗心律不整對代償竇速無益)。","D":"★正確(本題答案):僅 4—強心劑增加收縮力。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"107020-22":{"quick":"錯在 A:原發性心臟腫瘤約「75% 為良性、25% 為惡性」,而非 25% 良性/75% 惡性。","detail":{"background":"原發性心臟腫瘤罕見,約 75% 為良性、25% 為惡性。成人最常見良性者為黏液瘤(myxoma,多在左心房);兒童(<15 歲)最常見良性者為橫紋肌瘤(rhabdomyoma,常合併結節性硬化症);惡性以血管肉瘤(angiosarcoma)為主。即使良性腫瘤,一旦造成心衰竭、栓塞或感染性心內膜炎,即應手術切除。","options":{"A":"★錯誤(本題答案):應為 75% 良性、25% 惡性(敘述顛倒)。","B":"正確:成人最常見良性者為 myxoma。","C":"正確:<15 歲孩童最常見良性者為 rhabdomyoma。","D":"正確:良性腫瘤有併發症(心衰竭/栓塞/感染)即手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"107080-21":{"quick":"人工心肺機(體外循環機)包含 1 熱交換器、3 幫浦、4 氧合器(134,D);主動脈鉗夾(2)是外科器械,非機器的一部分。","detail":{"background":"人工心肺機(CPB circuit)核心組件:靜脈儲血槽、「幫浦(roller/centrifugal pump)」推動血流、「氧合器(oxygenator)」進行氣體交換取代肺、「熱交換器(heat exchanger)」調控血溫(降/復溫)、過濾器與管路。主動脈鉗夾(aortic cross-clamp)是手術器械(夾住升主動脈以阻斷冠狀循環、灌注 cardioplegia),不屬於「機器」組件。","options":{"A":"123:含 2(主動脈鉗夾非機器組件)。","B":"234:含 2,錯。","C":"124:含 2,錯。","D":"★正確(本題答案):1 熱交換器、3 幫浦、4 氧合器。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"109080-21":{"quick":"錯在 C:體外循環(CPB)使用時間「有限制」,時間越長,凝血異常、發炎反應與器官損傷風險越高,並非沒有限制。","detail":{"background":"體外循環(CPB)技術重點:①啟動前須全身肝素化(約 300–400 U/kg)使 ACT >480 秒,避免迴路血栓;②常溫下需提供約 2.4 L/min/m² 的灌流量,體溫每降 10°C 代謝耗氧約減半(故低溫可降低流量需求);③CPB 提供無血手術視野但「時間有限制」(過長增加併發症);④副作用含凝血異常、全身性發炎反應(SIRS)、巨/微血栓造成終端器官功能不良。","options":{"A":"正確:啟動前肝素化使 ACT>450–480 秒。","B":"正確:常溫 2.4 L/min/m²,降溫可減少耗氧。","C":"★錯誤(本題答案):CPB 時間有限制,越久併發症越多。","D":"正確:CPB 可致凝血異常、SIRS、血栓性器官損傷。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"110020-18":{"quick":"錯在 D:人工心肺機(體外循環)「會」引發全身性發炎反應症候群(SIRS)—血液接觸非生理表面、缺血再灌流等;A、B、C 皆為其正常功能。","detail":{"background":"人工心肺機可:①升降體溫(熱交換器);②合併心臟麻痺液(cardioplegia)使心臟停跳以利手術;③氧合器暫代肺臟氣體交換。但血液接觸人工表面、缺血再灌流、補體與白血球活化會引發「全身性發炎反應症候群(SIRS)」,並可能造成凝血異常與器官損傷,故 D「不會引發 SIRS」為錯。","options":{"A":"正確:可升降體溫。","B":"正確:合併 cardioplegia 使心臟停跳。","C":"正確:氧合器暫代肺功能。","D":"★錯誤(本題答案):CPB 會引發 SIRS。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"111080-24":{"quick":"square-root sign(dip-and-plateau)+心包膜增厚 5 mm+雙心房擴大、左心功能保留→縮窄性心包膜炎(B);心包膜增厚是與限制性心肌病變鑑別的關鍵。","detail":{"background":"縮窄性心包膜炎:心包膜增厚、鈣化、僵硬,限制心室舒張充填→右心衰竭表現(腳腫、肝腫、頸靜脈怒張、CVP 高)。導管壓力曲線見「dip-and-plateau / square-root sign」、左右心室舒張壓均等化、Kussmaul 徵象。與「限制性心肌病變」鑑別:縮窄者「心包膜增厚(CT/MRI)」、呼吸時左右心室壓力呈分離(ventricular interdependence);本例 CT 見心包膜 5 mm 增厚,支持縮窄性心包膜炎(可心包膜切除治療)。","options":{"A":"右併左心衰竭無法解釋心包增厚與 square-root sign。","B":"★正確(本題答案):心包膜增厚 5 mm+square-root sign=縮窄性心包膜炎。","C":"限制性心肌病變心包膜不增厚(為鑑別點)。","D":"肥厚性心肌病變表現為左心室肥厚/流出道阻塞,不符。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"112020-19":{"quick":"錯在 B:體溫降至 20°C(深度低溫)時代謝大幅下降,體外循環機「不需」維持 2.4 L/min/m²(那是常溫流量),可大幅降低流量(深度低溫甚至可短暫循環暫停)。","detail":{"background":"體外循環(CPB):①動脈管路常置於升主動脈(首選),周邊插管可用無名動脈、腋動脈或股動脈(如剝離/再次手術);②流量需求隨溫度:常溫約 2.4 L/min/m²,降溫使代謝下降、流量需求隨之減少(深度低溫 18–20°C 可短暫低流量或循環暫停);③副作用含 SIRS、栓塞、凝血異常、終端器官功能不足;④心臟停跳、循環全由 CPB 接管時,氧合靠氧合器,呼吸器可暫停。","options":{"A":"正確:動脈插管位置含升主動脈、無名/腋/股動脈。","B":"★錯誤(本題答案):20°C 深度低溫流量需求下降,不需維持 2.4 L/min/m²。","C":"正確:CPB 可致 SIRS、栓塞、凝血異常、器官損傷。","D":"正確:全靠 CPB 氧合時呼吸器可暫停。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"113020-20":{"quick":"最適當為 C:超過半數的心臟黏液瘤源自「左心房的心房中隔(卵圓窩)」。A(原發腫瘤良性多於惡性,非惡性多)、B(有栓塞的腫瘤應手術切除而非抗凝)、D(診斷標準工具是心臟超音波而非 CT)皆錯。","detail":{"background":"心臟黏液瘤:原發性心臟腫瘤約 75% 良性(黏液瘤最常見),多數(>50–75%)位於左心房、附著於心房中隔卵圓窩。有栓塞風險或症狀者治療是「手術切除」(非單純抗凝)。診斷的標準工具是「心臟超音波」(經胸/經食道),CT/MRI 為輔助。","options":{"A":"錯:原發性心臟腫瘤良性多於惡性(約 75% 良性)。","B":"錯:良性腫瘤有栓塞症狀應手術切除,非抗凝。","C":"★正確(本題答案):過半黏液瘤源自左心房中隔卵圓窩。","D":"錯:診斷標準工具是心臟超音波,非心臟 CT。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"113070-24":{"quick":"二尖瓣/三尖瓣手術建立體外循環時,較少放置引流管路者為「肺動脈」(D):靜脈引流用上、下腔靜脈(雙腔插管),動脈回輸用主動脈;肺動脈非常規引流插管處(必要時僅放排氣 vent)。","detail":{"background":"右心系統/房室瓣(二尖瓣、三尖瓣)手術需「雙腔靜脈插管(bicaval)」—上腔靜脈+下腔靜脈各放引流管,使右心房空虛、利於顯露;動脈回輸插於升主動脈。肺動脈通常不是體外循環的引流插管處(必要時放左心或肺動脈排氣管 vent 排氣,而非主要引流)。","options":{"A":"主動脈:動脈回輸插管處,有插管。","B":"上腔靜脈:雙腔靜脈引流之一。","C":"下腔靜脈:雙腔靜脈引流之一。","D":"★正確(本題答案):肺動脈較少放置引流管路。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"102030-25":{"quick":"必須儘速手術以免惡化致死者為「壞死性心室中隔缺損(梗塞後 VSR)」(B):左→右分流致急性心衰竭/休克,須緊急修補。","detail":{"background":"急性心肌梗塞的「機械性併發症」多在發病 3–7 天(梗塞區壞死軟化時)出現,皆為外科急症:①乳突肌斷裂→急性重度二尖瓣逆流(心尖部新雜音);②心室中隔破裂(VSR)→左→右分流(胸骨左緣新雜音、右心容積負荷);③左心室游離壁破裂→心包填塞/猝死。三者皆表現新雜音(游離壁破裂除外)+急性肺水腫/休克,須 IABP 穩定+緊急手術修補。急性主動脈瓣閉鎖不全並非心肌梗塞的機械性併發症。","options":{"A":"ARDS 為內科重症處置(呼吸器/肺保護),非外科急救。","B":"★正確(本題答案):梗塞後心室中隔破裂(VSR)須緊急手術。","C":"低心輸出+寡尿先以藥物/IABP 支持,非立即手術之機械病灶。","D":"細菌性心內膜炎先抗生素,非梗塞當下的緊急手術病灶。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"105020-23":{"quick":"錯在 A:梗塞後急性二尖瓣逆流是「乳突肌斷裂(papillary muscle rupture)」造成,而非「僧帽瓣(瓣膜)破裂」;此用詞不正確。B(VSR)、C(游離壁破裂)、D(IABP 用於梗塞併休克)皆正確。","detail":{"background":"急性心肌梗塞的「機械性併發症」多在發病 3–7 天(梗塞區壞死軟化時)出現,皆為外科急症:①乳突肌斷裂→急性重度二尖瓣逆流(心尖部新雜音);②心室中隔破裂(VSR)→左→右分流(胸骨左緣新雜音、右心容積負荷);③左心室游離壁破裂→心包填塞/猝死。三者皆表現新雜音(游離壁破裂除外)+急性肺水腫/休克,須 IABP 穩定+緊急手術修補。急性主動脈瓣閉鎖不全並非心肌梗塞的機械性併發症。","options":{"A":"★錯誤(本題答案):急性 MR 機制為乳突肌斷裂,非「僧帽瓣破裂」。","B":"正確:心室中隔破裂須緊急手術。","C":"正確:左心室游離壁破裂須緊急手術。","D":"正確:IABP 常用於梗塞併心因性休克。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"106020-25":{"quick":"錯在 1、3(僅13,B):心尖部新雜音提示「乳突肌斷裂/急性 MR」而非心室中隔破裂(1 錯);此為外科急症「須」緊急手術,而非不須(3 錯)。裝 IABP(2)與手術死亡率約 10–20%(4)正確。","detail":{"background":"急性心肌梗塞的「機械性併發症」多在發病 3–7 天(梗塞區壞死軟化時)出現,皆為外科急症:①乳突肌斷裂→急性重度二尖瓣逆流(心尖部新雜音);②心室中隔破裂(VSR)→左→右分流(胸骨左緣新雜音、右心容積負荷);③左心室游離壁破裂→心包填塞/猝死。三者皆表現新雜音(游離壁破裂除外)+急性肺水腫/休克,須 IABP 穩定+緊急手術修補。急性主動脈瓣閉鎖不全並非心肌梗塞的機械性併發症。 心尖部新雜音偏向乳突肌斷裂(MR);胸骨左緣新雜音偏向 VSR。兩者皆須 IABP 穩定後緊急手術。","options":{"A":"123:含 1、3(皆錯)。","B":"★正確(本題答案):1(應為乳突肌斷裂/MR 非 VSR)、3(須緊急手術)為錯誤敘述。","C":"24:此二者(IABP、死亡率)為正確敘述,非「錯誤」。","D":"僅4:4 為正確敘述。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"109020-19":{"quick":"胸骨左緣新雜音+休克+CVP 30→梗塞後心室中隔破裂(VSR)。錯在 2(僅2,D):VSR 應裝 IABP 穩定,故「不須裝 IABP」是錯的。診斷 VSR(1)、尊重病人書面拒絕手術(3)、無意識無家屬時不可貿然立即手術(4)皆正確。","detail":{"background":"急性心肌梗塞的「機械性併發症」多在發病 3–7 天(梗塞區壞死軟化時)出現,皆為外科急症:①乳突肌斷裂→急性重度二尖瓣逆流(心尖部新雜音);②心室中隔破裂(VSR)→左→右分流(胸骨左緣新雜音、右心容積負荷);③左心室游離壁破裂→心包填塞/猝死。三者皆表現新雜音(游離壁破裂除外)+急性肺水腫/休克,須 IABP 穩定+緊急手術修補。急性主動脈瓣閉鎖不全並非心肌梗塞的機械性併發症。 胸骨左緣新收縮期雜音+右心容積/壓力上升(CVP 30、肺動脈壓上升)是梗塞後 VSR 的典型表現。","options":{"A":"123:此三者為正確敘述,非錯誤。","B":"僅13:1、3 皆正確。","C":"24:含 4(正確敘述)。","D":"★正確(本題答案):僅 2 為錯—VSR 應裝 IABP,而非不須。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"109080-25":{"quick":"錯在 C:急性心肌梗塞併休克、機械性併發症、多血管病變者須緊急 CABG,但「必須用 off-pump 以減少合併症」並無根據;此情況常需 on-pump 並同時修補機械性病灶。A(超音波)、B(IABP)、D(Class I CABG)皆正確。","detail":{"background":"急性心肌梗塞併心因性休克、Grade 4/6 收縮期雜音(提示機械性併發症如乳突肌斷裂/VSR)+多血管嚴重狹窄(LAD 90%、LCX 85%):應心臟超音波確認機械性併發症、IABP/機械循環支持穩定、緊急血運重建(CABG,屬 ACC/AHA Class I)。「必須用 off-pump CABG 減少合併症」並無實證—休克、需同時修補機械病灶時多採 on-pump,off-pump 非強制且未顯示更安全。","options":{"A":"正確:應再做心臟超音波(找機械性併發症)。","B":"正確:可放 IABP 穩定血流動力。","C":"★錯誤(本題答案):並非「必須」off-pump;此情況常需 on-pump 並修補機械病灶。","D":"正確:此為 ACC/AHA Class I 之 CABG 適應症。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}},"114020-20":{"quick":"不是急性冠心症機械性併發症者為「急性主動脈瓣閉鎖不全」(A);機械性併發症為乳突肌斷裂(MR)、心室中隔缺損(VSR)、游離壁破裂。","detail":{"background":"急性心肌梗塞的「機械性併發症」多在發病 3–7 天(梗塞區壞死軟化時)出現,皆為外科急症:①乳突肌斷裂→急性重度二尖瓣逆流(心尖部新雜音);②心室中隔破裂(VSR)→左→右分流(胸骨左緣新雜音、右心容積負荷);③左心室游離壁破裂→心包填塞/猝死。三者皆表現新雜音(游離壁破裂除外)+急性肺水腫/休克,須 IABP 穩定+緊急手術修補。急性主動脈瓣閉鎖不全並非心肌梗塞的機械性併發症。","options":{"A":"★正確(本題答案):急性 AR 不是 ACS 的機械性併發症。","B":"是:乳突肌斷裂合併急性 MR。","C":"是:梗塞後心室中隔缺損(VSR)。","D":"是:左心室游離壁破裂。"},"sources":["Sabiston Textbook of Surgery, 21e","Kirklin/Barratt-Boyes Cardiac Surgery, 4e","Braunwald’s Heart Disease, 12e","2021 ACC/AHA/SCAI Revascularization Guideline"]}}},TO=["冠狀動脈繞道(CABG)", "瓣膜性心臟病外科", "主動脈疾病", "先天性心臟病外科", "機械循環支持與心臟移植", "心臟外傷與心包填塞", "體外循環‧心肌保護‧腫瘤", "心肌梗塞機械性併發症"],LEC={"冠狀動脈繞道(CABG)":{"title":"冠狀動脈繞道手術(CABG)","html":"\n<p><b>一、適應症（存活益處 Class I 核心）：</b>①左主幹（left main）≥50% 顯著狹窄；②三條血管疾病（尤其合併左心室功能不良 EF<35%）；③兩/三血管疾病合併「左前降支近端（proximal LAD）」狹窄。<b>單獨一條近端 LAD 狹窄</b>對延長壽命屬 Class IIa（非 I）。<b>糖尿病＋多血管病變首選 CABG</b>（FREEDOM 試驗、高 SYNTAX score）。急性 MI 當下緊急 CABG 僅在機械性併發症或 PCI 失敗/不適合時。</p>\n<p><b>二、導管（conduit）與 10 年通暢率：</b><b>內乳/內胸動脈（IMA）>90% 最佳</b>（LIMA→LAD 為金標準）＞橈動脈（中等，需抗痙攣）＞<b>大隱靜脈 SVG ~50% 最差</b>（內膜增生＋移植物粥化）。雙側 IMA（BIMA）增加存活，但會剝離胸骨兩側血供→糖尿病/肥胖/高齡/鎖骨下動脈狹窄者胸骨傷口感染風險高（ART 試驗）。股動脈不可作導管。</p>\n<p><b>三、Off-pump（OPCAB）：</b>跳動心臟上手術、不用人工心肺機，避開體外循環發炎與主動脈鉗夾栓塞、減少輸血、降低術後 AF；<b>適合高風險穩定病人</b>（腎功能差、肺氣腫、主動脈鈣化）。但<b>血液動力學不穩定者不適合</b>（需 on-pump 後援）；仍須肝素、心肺機須待命、不保證不中風。大型試驗（ROOBY/CORONARY/GOPCABE）顯示長期通暢與存活<b>未優於</b> on-pump，全球多數 CABG 仍 on-pump。</p>\n<p><b>四、術後與併發症：</b>無禁忌儘早 β-blocker；二級預防 aspirin＋statin。併發症：心包填塞、出血、腦病變、腎衰竭、<b>縱膈腔炎（mediastinitis）</b>。Digoxin 無降低死亡率證據（DIG 試驗中性）。</p>\n"},"瓣膜性心臟病外科":{"title":"瓣膜性心臟病外科（置換/修補/心內膜炎）","html":"\n<p><b>一、人工瓣膜選擇：</b><b>機械瓣</b>耐用、需終身 warfarin（PT/INR 監測；NOAC 禁用—RE-ALIGN 有害）；<b>生物瓣</b>免長期抗凝（術後僅 ~3 個月）、無需抗排斥藥，但 10–15 年鈣化退化。<b>年輕/已需抗凝（AF）→機械瓣</b>；<b>高齡（主動脈瓣>65、二尖瓣>70）/計畫懷孕（warfarin 致畸）/出血傾向（血友病）→生物瓣</b>。<b>Ross 手術</b>（自體肺動脈瓣移至主動脈）適合年輕/兒童（可生長、免抗凝）。</p>\n<p><b>二、主動脈瓣狹窄（AS）：</b>三大症狀心絞痛/暈厥/心衰竭→出現任一即 AVR（症狀後不治 2–3 年死亡率高）。AVR 適應症：有症狀重度 AS、無症狀但 EF<50%、合併其他心臟手術。高風險者用 TAVR（已成熟核准）。<b>無症狀重度 AS 單為防猝死即手術非標準適應症</b>。</p>\n<p><b>三、主動脈瓣逆流（AR）：</b>手術適應症＝有症狀、或無症狀但 EF<50%、或左心室嚴重擴大（LVESD>50 mm）。急性重度 AR 併休克為外科急症。</p>\n<p><b>四、二尖瓣：</b>原發性（退化性）重度 MR <b>修補優於置換</b>（保留瓣下結構與左心室幾何，死亡率低）；功能性 MR 預後較差。MS 多為風濕性，無症狀者追蹤，有症狀且解剖適合→經皮氣球擴張（PBMV），不適合→開放連合處切開或置換；<b>MS+AF 必須抗凝</b>，手術可同時 Cox-Maze。經導管二尖瓣「置換」尚未成熟（不同於 TAVR）。Carpentier 分類：I 活動正常、II 過度（脫垂/腱索斷裂）、IIIa 風濕受限、IIIb 功能性受限。</p>\n<p><b>五、感染性心內膜炎手術適應症：</b>①心衰竭（瓣膜破壞）；②感染無法控制（抗生素失敗、膿瘍、黴菌/抗藥菌）；③預防大贅生物再栓塞。<b>已發生腦栓塞尤其出血後應延後手術</b>（CPB 肝素化致出血惡化）。</p>\n"},"主動脈疾病":{"title":"主動脈疾病（剝離/動脈瘤/急性主動脈症候群）","html":"\n<p><b>一、主動脈剝離分類：</b>內膜破口→血流入中層形成假腔。<b>Stanford</b>（依是否侵犯升主動脈，與破口位置無關）：<b>Type A=侵犯升主動脈→緊急手術</b>（防破入心包填塞）；<b>Type B=不侵犯升主動脈→藥物為主</b>，複雜型（malperfusion/破裂/頑固痛）→TEVAR。<b>DeBakey</b>：I=升+弓+降；II=僅升；III=僅降（IIIa 限胸降、IIIb 延伸至腹主動脈）。</p>\n<p><b>二、血壓控制（anti-impulse）：</b><b>先靜脈 β-blocker</b>（esmolol/labetalol）降心率至~60、降 dP/dt，再加血管擴張劑（nitroprusside）；收縮壓目標 100–120。<b>禁忌單用血管擴張劑</b>（反射心搏過速增剪力）。</p>\n<p><b>三、急性主動脈症候群（AAS）：</b>＝主動脈剝離＋<b>壁內血腫（IMH）</b>＋<b>穿透性潰瘍（PAU）</b>，<b>不含</b>單純粥狀硬化。Type A IMH 比照 Type A AD 手術；PAU 多藥物，但>20 mm、neck>10 mm 建議介入。診斷首選 CT 血管攝影。</p>\n<p><b>四、動脈瘤手術門檻：</b>腹主動脈瘤（AAA）>5.5 cm（女性>5.0）、快速擴大（>0.5 cm/6 月或>1 cm/年）、有症狀、破裂（急症必開）。胸主動脈瘤：升>5.5（Marfan/雙瓣>5.0）、降>6 cm。<b>升主動脈瘤仍以開胸置換為主流</b>（無核准升主動脈支架）；降主動脈/AAA 可用 TEVAR/EVAR。EVAR 圍術期存活高但<b>再介入率較高</b>。內漏分型：I 接觸區、II 分支逆流（最常見）、III 組件接合/織物破損、IV 織物孔隙。</p>\n<p><b>五、特殊：</b>Marfan＝<b>fibrillin-1（FBN1）</b>異常。Bentall＝置換主動脈瓣＋升主動脈根部（含伐氏竇）＋冠狀動脈再植入。Crawford TAAA：II 型範圍最廣（左鎖骨下→腎動脈以下）、截癱風險最高；CSF 引流保護脊髓。外傷性主動脈損傷 X 光：縱隔變寬、主動脈邊界模糊、左血胸、氣管/食道偏「右」。</p>\n"},"先天性心臟病外科":{"title":"先天性心臟病外科","html":"\n<p><b>一、發紺 vs 非發紺：</b>發紺（右→左/混合）＝TOF、TGA、三尖瓣閉鎖、肺動脈閉鎖、永存動脈幹、TAPVR。非發紺（左→右）＝VSD、ASD、PDA、AVSD（過量肺血流→可進展 Eisenmenger→終需心肺移植）。肺動脈吊索是血管環壓迫（非發紺）。</p>\n<p><b>二、導管依賴與 PGE1：</b>前列腺素 E1 維持/重開動脈導管，救導管依賴病灶（HLHS、TGA、嚴重肺動脈狹窄/閉鎖）。<b>阻塞型 TAPVR 非導管依賴、PGE1 無效，為新生兒外科急症</b>。</p>\n<p><b>三、姑息與分期手術：</b><b>BT 分流</b>（體動脈→肺動脈）增加肺血流、促進肺動脈發育（用於肺血流不足之發紺病）；<b>PA banding</b>（肺動脈環縮）減少肺血流（用於左→右分流過多）。單心室路徑：Norwood（HLHS/二尖瓣閉鎖第一階段，重建主動脈弓＋控制肺血流）→雙向 Glenn（3–6 月，拆除體-肺分流）→Fontan/TCPC。</p>\n<p><b>四、各病灶要點：</b>TOF 矯正後嚴重肺動脈瓣逆流→肺動脈瓣置換；缺氧發作（tet spell）處置膝胸位/O2/鎮靜/輸液/β-blocker/升 SVR，<b>禁血管擴張劑</b>。subarterial VSD→右冠瓣脫垂致 AR，經肺動脈修補。Ebstein＝三尖瓣下移＋常合併 ASD。ASD：sinus venosus 最常合併 PAPVR、primum 合併二尖瓣裂隙/MR。完全型 AVSD：早期心衰竭、傳導/房室結移位、Rastelli A/B/C 分型。嬰兒 AS 用氣球/直視瓣膜切開（非機械瓣）。永存動脈幹、肺動脈閉鎖+VSD 需帶瓣 RV-PA conduit。</p>\n"},"機械循環支持與心臟移植":{"title":"機械循環支持與心臟移植","html":"\n<p><b>一、IABP（主動脈內氣球幫浦）：</b>舒張期充氣（增冠脈灌流）、收縮期前洩氣（降後負荷）。適應症：心因性休克、急性重度 MR、梗塞後 VSR、頑固缺血、高風險 PCI 支持。位置在降主動脈、左鎖骨下動脈遠端~2 cm、腎動脈上方。<b>禁忌：中重度主動脈瓣逆流、主動脈剝離</b>。<b>IABP-SHOCK II 顯示對 MI 後休克未改善存活</b>。</p>\n<p><b>二、ECMO：</b>短期（天至數週）心肺支持；VA 支持心肺、VV 支持肺。需肝素化，出血/血栓/肢體缺血/感染為常見併發症；<b>不可逆神經損傷為禁忌</b>。是唯一可同時支持心肺者。</p>\n<p><b>三、心室輔助器（VAD）：</b>連續流 LVAD（HeartMate II/3、HeartWare）可作<b>橋接移植</b>或<b>終極治療（destination）</b>（REMATCH：優於藥物於 NYHA IV）。全人工心臟可橋接雙心室衰竭。</p>\n<p><b>四、心臟移植：</b>適應症＝末期心衰竭、藥物/CABG/瓣膜手術無法改善、依賴 ECMO/VAD 無法脫離。<b>禁忌：固定性肺高壓（PVR>5–6 Wood units 不可逆）</b>（捐贈心右心室無法承受）、活動性感染/癌症、其他器官嚴重衰竭。<b>若疾病可傳統手術矯正則先矯正</b>。移植前可改善心功能的手術：CABG、二尖瓣重建、部分左心室切除（TMLR 僅緩解心絞痛、不改善心功能）。STICH：CABG+心室成型術未優於單純 CABG。</p>\n"},"心臟外傷與心包填塞":{"title":"心臟外傷與心包填塞","html":"\n<p><b>一、創傷低血壓＋頸靜脈怒張兩大鑑別：心包填塞 vs 張力性氣胸。</b>兩者皆有低血壓、頸靜脈壓升高、心搏過速、脈壓變窄→<b>無法以這些鑑別</b>。關鍵區別是<b>「呼吸音」</b>：張力性氣胸患側呼吸音消失、氣管偏移、患側過度反響；心包填塞兩側呼吸音正常、心音遙遠。最快鑑別＝床邊理學檢查。</p>\n<p><b>二、心包填塞血流動力：</b>中心靜脈壓 CVP↑、動脈壓↓、心輸出量↓、混合靜脈血氧飽和度 SvO2↓（低心輸出致組織攝氧增加）。Beck 三徵：低血壓、頸靜脈怒張、心音遙遠。</p>\n<p><b>三、處置：</b>張力性氣胸→立即針刺/胸管減壓；心包填塞→FAST/超音波、心包穿刺暫時減壓；<b>穿刺傷致填塞且已無血壓→急診開胸術（ED thoracotomy）</b>。不穩定病人不應為照 portable X 光延誤救命處置。</p>\n<p><b>四、胸部穿刺傷開胸探查適應症：</b>初始胸管引流>1,000–1,500 mL 或持續>200 mL/h（大量血胸）、心包填塞/心臟損傷、開放性/持續大漏氣氣胸、大血管/食道/氣管支氣管損傷、穿越縱隔之傷道。引流 500 mL 後生命跡象回穩屬保守觀察（非手術適應症）。</p>\n"},"體外循環‧心肌保護‧腫瘤":{"title":"體外循環‧心肌保護‧心臟腫瘤與術後照護","html":"\n<p><b>一、人工心肺機（CPB）：</b>組件含幫浦、<b>氧合器</b>（代肺）、<b>熱交換器</b>（控溫）、儲血槽、過濾器（主動脈鉗夾是器械、非機器組件）。啟動前肝素化（300–400 U/kg，ACT>450–480 秒）。常溫流量 ~2.4 L/min/m²，<b>體溫每降 10°C 耗氧減半→低溫可降流量</b>（深度低溫 18–20°C 可短暫低流量/循環暫停，故非固定 2.4）。CPB <b>會引發 SIRS</b>、凝血異常、栓塞、器官損傷，<b>使用時間有限制</b>。動脈插管：升主動脈（首選）或無名/腋/股動脈；房室瓣手術用雙腔靜脈引流（SVC+IVC），肺動脈非常規引流插管處。</p>\n<p><b>二、心肌保護：</b><b>心臟麻痺液（cardioplegia，高鉀使舒張期停跳降代謝）＋低溫（全身降溫＋心臟冰浴）＋順行/逆行灌注</b>；停跳期心室排空減壓（非留血灌注）。</p>\n<p><b>三、心臟腫瘤：</b>原發性<b>75% 良性、25% 惡性</b>。成人最常見良性＝<b>黏液瘤（myxoma）</b>，>50% 在左心房中隔卵圓窩，碎屑脫落致體循環栓塞；兒童最常見＝橫紋肌瘤（rhabdomyoma，合併結節性硬化）。有心衰竭/栓塞/感染即手術切除。診斷標準工具＝心臟超音波。</p>\n<p><b>四、術後照護：</b>引流「減少」但 CVP 上升、尿少、血壓降、心搏快→<b>填塞（血塊堵管），首選心臟超音波鑑別</b>、再開胸清血塊。引流大量且漸增+CVP 低+傷口滲血→活動性出血/低血容，補容/止血/再開胸。低心輸出（充填壓高、低血壓）→強心劑。</p>\n<p><b>五、心包疾病：</b>縮窄性心包膜炎（心包增厚/鈣化、square-root sign、CVP 高、右心衰竭）與限制性心肌病變鑑別靠<b>心包膜增厚</b>；放射線誘發者心包膜切除預後最差。</p>\n"},"心肌梗塞機械性併發症":{"title":"急性心肌梗塞機械性併發症","html":"\n<p><b>一、三大機械性併發症（多在發病 3–7 天梗塞區軟化時，皆為外科急症）：</b></p>\n<p>①<b>乳突肌斷裂→急性重度二尖瓣逆流（MR）</b>：<b>心尖部</b>新收縮期雜音、急性肺水腫、休克。</p>\n<p>②<b>心室中隔破裂（VSR）</b>：<b>胸骨左緣</b>新收縮期雜音、左→右分流（右心容積/壓力上升、CVP 高）、休克。</p>\n<p>③<b>左心室游離壁破裂</b>：心包填塞/電機械分離/猝死。</p>\n<p><b>二、處置：</b>心臟超音波確認、<b>IABP 穩定血流動力</b>、<b>緊急手術修補</b>（手術死亡率約 10–20% 但不開刀死亡率更高）。合併多血管病變者需 CABG（屬 ACC/AHA Class I）。<b>急性主動脈瓣閉鎖不全不是 ACS 的機械性併發症</b>。</p>\n<p><b>三、易混淆：</b>急性 MR 是「乳突肌斷裂」而非「瓣膜破裂」；心尖部雜音偏 MR、胸骨左緣雜音偏 VSR。低心輸量+寡尿、ARDS、細菌性心內膜炎屬內科處置，非當下緊急外科機械病灶。</p>\n"}};

TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_cvs_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'\U0001F44B 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
