33","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"106020-33","q_num":33,"src":"民國106年第一次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":38,"stem":"對於無法手術的轉移性胰臟內分泌瘤病患,可使用的治療中,何者正確?","options":{"A":"hypergastrinemia可以diazoxide治療","B":"對於gastrinoma引起的腸胃道急性出血,使用proton pump inhibitors是無效的","C":"儘可能以手術切除metastatic islet cell carcinoma(cytoreduction surgery)後,肝臟轉移的部分可以肝動脈栓塞來治療","D":"轉移到骨骼的metastatic islet cell carcinoma還是可以考慮以手術切除之"},"answer":"C","answer_status":"送分","accepted_answers":["A","B","C","D"],"correction_note":"第38題一律給分","images":[],"_id":"106020-38","topic":"胰臟腫瘤","topic_code":"T4","id":"106020-38","q_num":38,"src":"民國106年第一次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":40,"stem":"下列有關膽管癌之敘述,何者錯誤?","options":{"A":"根據發生位置可分為肝內、肝門處與遠端膽管癌,而最好發的位置是肝內膽管癌","B":"超過90%遠端或肝門處膽管癌病患之臨床表現為阻塞性黃疸","C":"肝門處膽管癌在電腦斷層掃描檢查中不易看到腫瘤,反而是看到肝內膽管擴大與變小的膽囊","D":"對於Bismuth分類type I & II肝門處膽管癌若無肝門處血管侵犯,可考慮局部腫瘤切除,並利用空腸作膽道重建(hepaticojejunostomy)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"106020-40","topic":"膽道腫瘤閉鎖囊腫","topic_code":"T2","id":"106020-40","q_num":40,"src":"民國106年第一次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":43,"stem":"根據美國國家衛生院的研究,胰島素瘤(insulinoma)的手術前定位以下列何者最為精確?","options":{"A":"手術前核磁共振檢查","B":"手術前血管造影術","C":"手術前以鈣劑動脈注射刺激試驗","D":"手術中超音波掃描"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106020-43","topic":"胰臟腫瘤","topic_code":"T4","id":"106020-43","q_num":43,"src":"民國106年第一次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":22,"stem":"一位63歲男性到門診主訴發現皮膚泛黃已三週,尿液呈深褐色,最近有灰白色大便,無腹部疼痛及不適,食慾稍差。下列何種檢查能快速做鑑別診斷?","options":{"A":"抽血驗B型、C型肝炎","B":"測血中總膽紅素/直接型膽紅素指數","C":"腹部超音波檢查","D":"腹部電腦斷層檢查"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106080-22","topic":"膽道腫瘤閉鎖囊腫","topic_code":"T2","id":"106080-22","q_num":22,"s cemia with seizure)","D":"血管栓塞合併小腸缺血症(vascular thrombosis with ischemic bowel disease)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"109020-29","topic":"胰臟炎","topic_code":"T3","id":"109020-29","q_num":29,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":30,"stem":"有關膽囊結石之敘述,何者錯誤?","options":{"A":"長期禁食或使用全靜脈營養治療之病患與膽囊結石之形成有相關性","B":"膽囊結石可分為色素結石與膽固醇結石兩大類","C":"膽囊結石的併發症包括急性膽囊炎、膽石性胰臟炎、腸阻塞","D":"膽石性急性膽囊炎採取以腹腔鏡膽囊切除手術治療為絕對禁忌症"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"109020-30","topic":"膽結石膽囊炎膽管炎","topic_code":"T1","id":"109020-30","q_num":30,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":48,"stem":"下列那一個構造不是triangle of Calot的邊界?","options":{"A":"右肝下緣","B":"總肝管(common hepatic duct)","C":"膽囊管(cystic duct)","D":"右門靜脈(right portal vein)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"109020-48","topic":"膽結石膽囊炎膽管炎","topic_code":"T1","id":"109020-48","q_num":48,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":76,"stem":"腹部受傷機轉不同,可能有不同器官傷害,且受傷頻率不一,路人甲發生車禍造成腹部鈍傷(blunt injury)和路人乙腹部遭受槍擊傷(gunshot injury)時,他們最常受傷的器官分別是:","options":{"A":"鈍傷時為脾臟;槍擊傷時是肝臟","B":"鈍傷時為肝臟;槍擊傷時是脾臟","C":"鈍傷時為脾臟;槍擊傷時是小腸","D":"鈍傷時為小腸;槍擊傷時是胰臟"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"109020-76","topic":"肝脾鈍傷","topic_code":"T8","id":"109020-76","q_num":76,"src":"民國109年第一次","img":""},{"exam_code":"109080","roc_year":109,"exam_round":"第二次","num":35,"stem":"一位49歲男性B型肝炎帶原者,到門診時意識清楚,其抽血檢查顯示WBC: 4.16 K/μL; ALT: 59 U/L; BIL(T/D):2.52/0.65 mg/dL; Alb: 4.3 g/dL; ALP: 100 U/L ; Cre: 0.8 mg/dL; α-fetoprotein: 42.2 ng/ml; ICG(15): 46.9%; PT(INR): 12.1 sec (1.12)。電腦斷層顯示一2公分腫瘤在第四小葉(Couinaud segment IV)下緣,沒有發現腹水。此人的肝功能的Child-Pugh score為幾分?","options":{"A":"5","B":"6"," 第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":31,"stem":"肝臟移植被認為是治療肝硬化合併肝細胞癌(hepatocellular carcinoma)病患的有效治療方法,下列肝細胞癌患者的腫瘤狀態何者較不建議接受肝臟移植治療?〔Child-Turcotte-Pugh score簡稱CTP score〕","options":{"A":"50歲男性,B型肝炎患者,CTP score=8,兩顆腫瘤2.0 cm與2.5 cm分別位於segment III和segment VII,無肝外轉移及大血管侵犯","B":"60歲女性,C型肝炎患者,CTP score=10,單顆腫瘤4.5 cm位於segment VIII,無肝外轉移及大血管侵犯","C":"58歲男性,C型肝炎患者,CTP score=7,三顆腫瘤1.0 cm、2.0 cm與1.0cm分別位於segment II、segment V和segment VII,無肝外轉移及大血管侵犯","D":"40歲男性,B型肝炎患者,CTP score=5,單顆腫瘤2.0 cm位於segment II,無肝外轉移及大血管侵犯"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-31","topic":"器官移植與脾臟","topic_code":"T7","id":"112020-31","q_num":31,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":32,"stem":"關於轉移性肝臟惡性腫瘤(metastatic liver tumor),下列敘述何者錯誤?","options":{"A":"最常見的轉移性肝臟腫瘤來自大腸直腸癌(colorectal cancer)","B":"近50%~60%的大腸直腸癌(colorectal cancer)患者包括新診斷或術後追蹤,在其一生中會出現肝臟轉移","C":"基於化學藥物治療的發展及肝臟手術的精進,肝臟切除腫瘤已經成為治療大腸直腸癌肝臟轉移的標準治療","D":"多發性的大腸直腸癌肝臟轉移,既使接受手術治療預後也不好,只能以化學藥物治療"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-32","topic":"肝臟腫瘤","topic_code":"T5","id":"112020-32","q_num":32,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":33,"stem":"胰臟移植(pancreas transplantation)可以重建胰島素(insulin)的血糖代謝且可以改善糖尿病患者的生活品質,下列何種類別的胰臟移植相較其他類別,移植比例最高而且移植後病患整體預後也最好?","options":{"A":"糖尿病患者合併腎衰竭尿毒症同時接受胰臟及腎臟移植(simultaneous pancreas and kidney transplant, SPK)","B":"糖尿病患者合併腎衰竭尿毒症接受過腎臟移植之後再接受胰臟移植(pancreas after kidney transplant, PAK)治療糖尿病","C":"糖尿病患者未合併尿毒症,但血糖不易控制接受胰臟移植(pancreas transplant alone, PTA)改善生活品質","D":"糖尿病患者合併腎衰竭尿毒症先接受胰臟移植(pancreas before kidney transplant, PBK)之後再等待腎臟移植"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112020-33","topic":"器官移植與脾臟","topic_code":"T7","id":"112020-33","q_num":33,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":34,"stem":"下列對於胰臟內分泌瘤的敘述何者錯誤?","options":{"A":"insulinoma是最常見的胰臟內分泌瘤,其主要症狀為Whipple triad,包含symptomatic fasting hypoglycemia,serum glucose level < 50 mg/dL, relief of symptoms with the administration of glucose","B":"70-90% insulinoma發生於Passaro's triangle,此區的範圍是由junction of the cystic duct and common bile duct, the2nd and 3rd portion of the duodenum和the neck and body of the pancreas組成的三角區域","C":"Zollinger-Ellison syndrome是由gastrinoma所引起,主要症狀為abdominal pain, peptic ulcer disease和severeesophagitis","D":"90%的insulinoma是sporadic,而10% 的insulinoma與multiple endocrine neoplasia type I(MEN I)syndrome相關"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112020-34","topic":"胰臟腫瘤","topic_code":"T4","id":"112020-34","q_num":34,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":36,"stem":"有關膽道惡性腫瘤的敘述,下列何者最恰當?","options":{"A":"膽囊癌主要發生在男性且絕大部分都有膽結石","B":"膽囊癌若沒有穿透肌肉層(T1),除了單純膽囊切除外,最好也要清除淋巴結","C":"遠端膽管癌預後平均比肝門膽管癌(Klatskin tumor)差","D":"膽管癌儘管手術進步也變得積極,但預後仍不佳"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-36","topic":"膽道腫瘤閉鎖囊腫","topic_code":"T2","id":"112020-36","q_num":36,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":54,"stem":"微創手術(minimally invasive surgery)已可用於脾臟切除手術,下列敘述何者錯誤?","options":{"A":"腹腔鏡脾切除手術是切除脾臟的首選方法,其手術安全性和傳統開腹脾切除手術並無差別","B":"大約90%的患者可以完成腹腔鏡脾切除手術,腹腔鏡脾切除手術失敗轉換成開腹脾切除手術主要原因是由於術中出血、缺乏手術經驗、沾黏、巨大的脾腫大和肥胖","C":"腹腔鏡脾切除手術不需要考慮門靜脈高壓的問題","D":"腹腔鏡脾切除手術可以在患者處於仰臥或側臥的情況下進行"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112020-54","topic":"器官移植與脾臟","topic_code":"T7","id":"112020-54","q_num":54,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":72,"stem":"關於急性胰臟炎之晚期併發症(late complication),下列何者最少見?","options":{"A":"胰管阻塞(pancreatic duct obstruction)","B":"後腹腔膿瘍(retroperitoneal abscess)","C":"肝動脈假性動脈瘤(hepatic artery pseudoaneurysm)","D":"假性囊腫形成(pseudocyst formation)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112020-72","topic":"胰臟炎","topic_code":"T3","id":"112020-72","q_num":72,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":76,"stem":"40歲行人被汽車撞擊後送到急診,檢查發現脾臟破裂、腹內出血,心跳130/min,呼吸20/min,血壓80/46mmHg,Base deficit -8mEq/L,下列敘述何者錯誤?","options":{"A":"病人至少是第三級出血","B":"若需啟動大量輸血,建議的比例為紅血球:血漿:血小板=1:1:1","C":"若需緊急輸packed RBC,可選用O型紅血球","D":"若需緊急輸FFP,可選用O型血漿"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-76","topic":"肝脾鈍傷","topic_code":"T8","id":"112020-76","q_num":76,"src":"民國112年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":6,"stem":"臨床上用以評估肝臟疾病的嚴重程度時會使用所謂的「末期肝臟疾病模型」分數(Model for End-Stage LiverDisease score, MELD score)來評分肝臟移植優先順位。下列何者不是計算MELD score的重要參數?","options":{"A":"血清總膽紅素(total bilirubin)","B":"白血球計數 (white blood cell count)","C":"血清肌酐酸(creatinine)","D":"凝血酶原時間國際標準化比值(international normalized ratio, INR)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-6","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"112080-6","q_num":6,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":30,"stem":"有關Zollinger-Ellison syndrome的敘述,下列何者錯誤?","options":{"A":"導因於神經內分泌瘤gastrinoma異常分泌gastrin所造成","B":"約20%的病患會合併multiple endocrine neoplasia type II(MEN II),可以藉由手術切除治癒","C":"約80%的gastrinoma位於gastrinoma triangle,但因腫瘤通常較小而不易於手術前定位","D":"有將近60%的gastrinoma為惡性的,且常合併淋巴結、肝臟或其他遠端轉移"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-30","topic":"胰臟腫瘤","topic_code":"T4","id":"112080-30","q_num":30,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":31,"stem":"關於膽囊癌(gallbladder cancer),下列敘述何者正確?","options":{"A":"大部分的病患都是經由腹腔鏡膽囊切除偶然發現診斷的","B":"整體膽囊癌的預後相當好,5年存活率可高達80%","C":"膽結石是膽囊癌最重要的危險因子,近85%的膽囊癌患者伴隨有膽結石","D":"膽囊癌侵犯深度為T2的腫瘤,因尚未穿透漿膜,術後只需追蹤即可,不必進行擴大根除手術"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-31","topic":"膽道腫瘤閉鎖囊腫","topic_code":"T2","id":"112080-31","q_num":31,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":33,"stem":"關於胰臟癌(pancreatic ductal adenocarcinoma)的敘述,下列何者錯誤?","options":{"A":"遺傳性胰臟癌與PRSS1、STK11、CDKN2A及BRCA2等基因突變有關","B":"腫瘤發生於胰臟頭部,表現症狀最多的是黃疸,若發生於胰臟體部和尾部,則以疼痛和體重減輕居多","C":"發生於胰臟頭部的胰臟癌,約三分之一的病人出現膽囊腫大(palpable distended gallbladder),稱為Courvoisier sign","D":"手術前施行endoscopic retrograde cholangio-pancreatography(ERCP)做膽道減壓,可減少手術後傷口感染"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112080-33","topic":"胰臟腫瘤","topic_code":"T4","id":"112080-33","q_num":33,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":34,"stem":"有關胰臟胰島素瘤(insulinoma)的敘述,下列何者正確?","options":{"A":"最常見的胰臟內分泌腫瘤,通常臨床表現包括有症狀的空腹低血糖、有記載的血清葡萄糖值<50 mg/mL以及葡萄糖的給與可以緩解症狀,此又稱Charcot's triad","B":"實驗室檢查除了血糖低、胰島素高外,C-peptide上升可以幫助診斷胰島素瘤而非外來胰島素或降血糖藥引起的低血糖症","C":"與其他胰臟內分泌腫瘤不同在於其是多發性為主且大多數為良性","D":"大多數為偶發性(sporadic)而與遺傳無關,但合併第一型多發性內分泌腺瘤(multiple endocrine neoplasiatype 1, MEN-1)的病患較多單發性但復發率較高"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-34","topic":"胰臟腫瘤","topic_code":"T4","id":"112080-34","q_num":34,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":35,"stem":"有關肝臟的腺瘤(adenoma)和局部的小節增生(focal nodular hyperplasia, FNH),下列敘述何者最恰當?","options":{"A":"相較之下FNH跟口服避孕藥較有關","B":"腺瘤較有機會自發性出血,且有機會轉變為惡性","C":"在核磁共振及電腦斷層下,兩者不易區分","D":"兩者皆建議手術治療"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-35","topic":"肝臟腫瘤","topic_code":"T5","id":"112080-35","q_num":35,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":36,"stem":"有關肝臟手術時常用的Pringle maneuver,下列敘述何者最恰當?","options":{"A":"主要係夾住肝動脈、肝靜脈、門脈靜脈","B":"一般夾15分鐘,放鬆5分鐘","C":"對肝功能較差者,使用此方式會比選擇性半肝夾緊方式更適合","D":"此方式與連續血管夾緊方式對術後肝功能及缺血再灌注傷害並無差異"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-36","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"112080-36","q_num":36,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":74,"stem":"45歲女性因飯後右上腹部不適到醫院求診,腹部X光片顯示病變如圖。此病人最可能之初診斷為下列何者?","options":{"A":"膽結石(gallbladder stones)","B":"總膽管內嵌塞結石(common bile duct impacted stones)","C":"腎結核病(renal tuberculosis)","D":"腎結石(renal stones)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":["data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAMTAz0DASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDjIj834VZTqKowt8x5PSrsHzMo60AXbVSxUj+9WtApXdWfZrtXkc7q0Yuc0ASshKjpQgxgVKACoHtUbAh6ALEferSHJqlCeuTVtTg0AWY+1TL0qvEc45qdelAE696lU9KgU9akDe9AEoPFITUTP15NICT3NAE5NApq8mngUAOUcVZjYBvwquo4qUA0AXIpAGHWrUcy5AweTWYhORyamRmBByevrQBqZzTTxVeKXrljUnmA96AHdTQRSBhkc1ICDQA0 瘤通常會導致阻塞性黃疸,可比較早期被診斷,手術切除治癒的可能性也相對較高","D":"腺鱗癌(adenosquamous carcinoma)是一種變異型的胰腺癌,同時具有腺細胞和鱗狀細胞,因為分化良好,所以預後相較胰管腺癌(ductal adenocarcinoma)好"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-9","topic":"胰臟腫瘤","topic_code":"T4","id":"115020-9","q_num":9,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":17,"stem":"關於腹腔鏡及機械手臂在遠端胰臟切除術(distal pancreatectomy)之應用成果,下列敘述何者錯誤?","options":{"A":"兩者皆保有微創手術相對於開腹手術的優點","B":"兩者重大併發症,如:胰臟瘻管等發生率相近","C":"機械手臂手術轉為開腹率及脾臟保留率均較腹腔鏡手術較低","D":"腹腔鏡手術花費較低"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"115020-17","topic":"胰臟腫瘤","topic_code":"T4","id":"115020-17","q_num":17,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":18,"stem":"關於腹腔鏡及機械手臂等微創手術在肝臟切除術之角色,下列敘述何者錯誤?","options":{"A":"一般而言,機械手臂切肝手術較腹腔鏡切肝手術耗費時間短、失血較少,但醫療費用較高","B":"腹腔鏡與機械手臂切肝手術在適應症上大致相同","C":"腹腔鏡與機械手臂切肝手術在併發症及轉為開腹率方面並沒有顯著差異","D":"微創手術已成為肝臟邊緣病灶切除的標準治療方式"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"115020-18","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"115020-18","q_num":18,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":19,"stem":"55 歲男性,因罹患B 肝長期在胃腸肝膽內科進行追蹤,近期因超音波檢查發現疑似有右肝腫瘤,抽血檢查發現GOT:25 IU/L,GPT:21 IU/L,Total bilirubin:0.8 mg/dL,PT:1.5s,albumin:4.38 g/dL。電腦斷層檢查顯示肝臟第五葉有顆2.5 公分大的腫瘤,並有些微肝硬化之表現但無明顯腹水,經皮細針抽取檢體證實為肝細胞癌,故轉介一般外科進行手術評估,抽血檢查發現胎兒蛋白值(AFP)為350 ng/mL,且無肝腦病變之發現。該男性之肝功能分級Child–Pugh Score 為多少以及後續建議之治療方法何者較適當?","options":{"A":"Child–Pugh A,將安排腹腔鏡肝臟部分切除手術","B":"Child–Pugh B,將安排靛氰綠(Indocyanine green)肝功能檢查,以評估是否適合腹腔鏡手術","C":"Child–Pugh C,建議射頻灼燒術(Radiofrequency ablation)","D":"Child–Pugh B,將安排經動脈導管肝臟腫瘤化學栓塞術(Trans-Arterial Chemo-Embolization)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"115020-19","topic":"肝臟腫瘤","topic_code":"T5","id":"115020-19","q_num":19,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":23,"stem":"臨床上可運用Model for end-stage liver disease(MELD)score,來預測等待肝臟移植的末期肝病患者於三個月內的死亡風險。下列何者不是計算MELD score 的參數?","options":{"A":"血清肌酸酐(serum creatinine)","B":"血清總膽紅素(serum total bilirubin)","C":"國際標準化比值(international normalized ratio, INR)","D":"血清白蛋白(serum albumin)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-23","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"115020-23","q_num":23,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":44,"stem":"關於急性胰臟炎的手術適應症,下列敘述何者最適當?","options":{"A":"對於嚴重型的急性胰臟炎,一旦確認就要及早進行手術清創","B":"手術只有在感染性壞死或感染的積聚才建議執行","C":"急性胰臟炎所造成的偽囊腫(pseudocyst)形成,一般是外引流比內引流較佳","D":"偽囊腫(pseudocyst)形成時,選擇手術引流會優先於內視鏡引流"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-44","topic":"胰臟炎","topic_code":"T3","id":"115020-44","q_num":44,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":55,"stem":"為促進肝膽微創手術的完成,下列敘述何者正確?","options":{"A":"所有的切肝手術都需要Pringle 手法","B":"為有效控制減少手術出血,Pringle 手法通常在整個手術中持續使用,手術完成再鬆開","C":"氣腹手術中的低血壓,一旦懷疑gas emboli,應該給予病人頭高腳低左側躺,並考慮用中央靜脈導管抽出心室中的空氣","D":"如果懷孕病人需要手術,應儘量安排在妊娠中期(second trimester)進行"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-55","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"115020-55","q_num":55,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":72,"stem":"在施行肝癌(HCC)病人之血管栓塞術時,除了主要的動脈血管供應為左肝或右肝動脈外,偶會發現肝癌存在其他的肝外腫瘤血管供應(extrahepatic blood supply),其中以下列何種血管最常見?","options":{"A":"內乳動脈(internal mammary artery)","B":"下腸繫膜動脈(inferior mesenteric artery)","C":"右側橫膈膜下動脈(right inferior phrenic artery)","D":"網膜動脈(omental artery)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"115020-72","topic":"肝臟腫瘤","topic_code":"T5","id":"115020-72","q_num":72,"src":"民國115年第一次","img":""}],E={"101030-21":{"quick":"有症狀膽結石最佳治療為 C:腹腔鏡膽囊切除術。","detail":{"background":"有症狀膽結石(膽絞痛/膽囊炎)之最佳治療為『腹腔鏡膽囊切除術』(C);無症狀者多追蹤。","options":{"A":"保守治療無法根除結石。","B":"超音波碎石對膽結石無效(易復發)。","C":"★正確(本題答案):腹腔鏡膽囊切除。","D":"經皮膽囊引流用於高風險急性膽囊炎暫時減壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102030-39":{"quick":"錯在 B:膽囊切除後「>2 年」才發現者才視為原發性總膽管結石,「半年」太短(屬殘留/續發)。","detail":{"background":"總膽管結石:原發(膽道內生成,如肝內結石/感染)vs續發(自膽囊掉落);『膽囊切除後>2年才出現者才視為原發性,半年內屬殘留/續發』(故B『半年』錯)。","options":{"A":"正確:阻塞性黃疸為最典型。","B":"★錯誤(本題答案):原發性定義為>2 年,非半年。","C":"正確:超音波常見總膽管擴張。","D":"正確:ERCP 可診斷亦可治療取石。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103030-34":{"quick":"腹腔鏡膽囊切除後上腹不適+輕微黃疸+膽汁聚積→C:術後膽汁滲漏(膽囊管殘端/Luschka 管),可先 CT 導引放置引流。","detail":{"background":"腹腔鏡膽囊切除後膽汁滲漏多源自「膽囊管殘端結紮鬆脫」或「Luschka 副肝管」,表現上腹不適、輕微黃疸、腹腔膽汁聚積。處置先「影像導引經皮引流」控制+ERCP 放支架/括約肌切開降低膽道壓力使瘻管癒合;非一律緊急開腹。需與「總膽管橫斷(major injury)」鑑別(後者需膽腸吻合)。","options":{"A":"腸穿孔表現腹膜炎,非此情境。","B":"總膽管橫斷需膽腸吻合,非僅 PTCD。","C":"★正確(本題答案):術後膽汁滲漏,先引流。","D":"單純重新夾閉非首選,先引流減壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103100-37":{"quick":"腹腔鏡膽囊切除「絕對」禁忌為 C:瀰漫性腹膜炎(及無法耐受氣腹/無法矯正的凝血異常)。","detail":{"background":"腹腔鏡膽囊切除絕對禁忌:瀰漫性腹膜炎/血流動力學不穩、無法耐受全身麻醉與氣腹、無法矯正的凝血病。相對禁忌:嚴重沾黏、晚期懷孕、疑膽囊癌(宜開腹)。肥胖、急性膽囊炎、剖腹產史非絕對禁忌。","options":{"A":"病態肥胖非絕對禁忌。","B":"急性膽囊炎可腹腔鏡(早期)。","C":"★正確(本題答案):瀰漫性腹膜炎為絕對禁忌。","D":"剖腹產史非禁忌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104030-38":{"quick":"錯在 D:膽結石阻塞致膽囊腫脹「仍可」腹腔鏡切除,非建議開腹理由;嚴重心衰、疑膽囊癌、懷孕 7–9 月才建議開腹。","detail":{"background":"建議開腹(而非腹腔鏡)膽囊切除的情況:無法耐受氣腹(嚴重心衰竭/呼吸衰竭)、疑似/已知膽囊惡性(避免氣腹播散、需根除)、晚期懷孕(7–9 月,氣腹與器械空間受限)、嚴重沾黏無法辨識構造。單純膽結石致膽囊腫脹仍可腹腔鏡。","options":{"A":"是:嚴重心衰竭不耐氣腹。","B":"是:疑膽囊癌宜開腹根除。","C":"是:懷孕 7–9 月。","D":"★錯誤(本題答案):膽囊腫脹仍可腹腔鏡。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-31":{"quick":"非 Charcot 三徵者為 D:意識譫妄(屬 Reynolds 五徵)。Charcot=發燒、黃疸、右上腹痛。","detail":{"background":"急性膽管炎Charcot三徵=『發燒、黃疸、右上腹痛』;『意識譫妄+低血壓屬Reynolds五徵』非Charcot(故D不是Charcot三徵)。","options":{"A":"是:發燒。","B":"是:黃疸。","C":"是:腹痛。","D":"★非(本題答案):意識譫妄屬 Reynolds 五徵。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-40":{"quick":"錯在 B:無症狀膽結石(即使單顆>2 cm)一般「不」是膽囊切除適應症,應追蹤。","detail":{"background":"膽囊切除適應症:有症狀膽結石、急慢性膽囊炎、瓷化膽囊、膽囊瘜肉>1cm、膽石性胰臟炎;『無症狀膽結石(即使單顆>2cm)一般不切除,應追蹤』(故B錯)。","options":{"A":"是適應症:膽囊息肉>10 mm(癌風險)。","B":"★錯誤(本題答案):無症狀膽結石非手術適應症。","C":"是適應症:無結石性膽囊炎。","D":"是適應症:有症狀膽結石。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107080-34":{"quick":"膽鹽在 C:迴腸(尤其末端迴腸)被主動再吸收進入腸肝循環(本題一律給分)。","detail":{"background":"膽鹽腸肝循環:肝合成膽鹽→經膽道入腸→在「末端迴腸」由鈉依賴性膽鹽轉運體主動再吸收→經門脈回肝再利用,每日循環數次。末端迴腸切除/Crohn 病會中斷此循環→膽鹽流失、脂肪瀉、膽固醇結石。","options":{"A":"十二指腸非主要再吸收處。","B":"空腸非主要。","C":"★正確(本題答案):迴腸(末端迴腸)。","D":"結腸非膽鹽主動再吸收處。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-36":{"quick":"正確為 C(235):Murphy 徵為急性膽囊炎特徵(2)、深按右上腹使「吸氣」突然中止(3)、多數可保守緩解再延遲手術(5);急性膽囊炎多「無」黃疸(1 錯)、是「吸氣」非呼氣中止(4 錯)。","detail":{"background":"急性膽囊炎與Murphy徵:Murphy徵為其特徵(深按右上腹使『吸氣』突然中止)、多可保守緩解後延遲手術;急性膽囊炎多『無黃疸』→正確235(C)。","options":{"A":"123:含 1(常合併黃疸,錯)。","B":"124:含 1、4 錯。","C":"★正確(本題答案):2、3、5。","D":"245:含 4(呼氣中止,錯)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-53":{"quick":"不含於 Calot 三角邊界者為 C:膽囊動脈(它是三角的「內容物」非邊界)。","detail":{"background":"Calot三角(肝膽三角)邊界為『膽囊管、總肝管、肝臟下緣』;『膽囊動脈為三角內容物非邊界』(故C不含)。","options":{"A":"是邊界:總肝管。","B":"是邊界:膽囊管。","C":"★非邊界(本題答案):膽囊動脈為內容物。","D":"是邊界:肝臟下緣。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109020-30":{"quick":"錯在 D:膽石性急性膽囊炎以腹腔鏡膽囊切除「治療」,並非絕對禁忌。","detail":{"background":"膽囊結石:多為膽固醇結石;『膽石性急性膽囊炎以腹腔鏡膽囊切除「治療」,並非禁忌』(故D『禁忌』錯)。","options":{"A":"正確:長期禁食/TPN 與結石相關。","B":"正確:分色素與膽固醇結石。","C":"正確:併發症含膽囊炎、膽石性胰臟炎、膽石性腸阻塞。","D":"★錯誤(本題答案):腹腔鏡切除是治療,非禁忌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109020-48":{"quick":"非 Calot 三角邊界者為 D:右門靜脈。邊界為膽囊管、總肝管、肝下緣。","detail":{"background":"triangle of Calot邊界:膽囊管、總肝管、肝下緣;『右門靜脈非其邊界』(D);膽囊動脈為內容物。","options":{"A":"是邊界:右肝下緣。","B":"是邊界:總肝管。","C":"是邊界:膽囊管。","D":"★非邊界(本題答案):右門靜脈。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-51":{"quick":"正確為 A:ERCP 為總膽管結石的治療方式之一(可取石)。","detail":{"background":"總膽管結石(CBD stone):可致阻塞性黃疸/膽管炎/胰臟炎;『ERCP為其治療方式之一(可括約肌切開取石)』(A正確)。","options":{"A":"★正確(本題答案):ERCP 可取出總膽管結石。","B":"錯:ERCP 取石成功率>90%,非<50%。","C":"錯:復發與年齡無此關係。","D":"錯:多先 ERCP 取石,非一律腹腔鏡總膽管探查。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-32":{"quick":"總膽管被切除 3 cm(節段缺損、膽汁滲漏)→C:清創後以「腸道(Roux-en-Y 肝空腸吻合)」接合肝側膽管、縫合遠端斷端。","detail":{"background":"醫源性總膽管橫斷且有「節段缺損」時,兩端無法無張力對接,標準處置為「Roux-en-Y 肝空腸吻合(hepaticojejunostomy)」—將肝側膽管接到空腸,遠端膽管斷端縫合。單純端對端吻合+T 管僅適用於無組織缺損的小範圍橫斷。","options":{"A":"缺損 3 cm 端對端吻合張力過大。","B":"同上,張力過大。","C":"★正確(本題答案):Roux-en-Y 肝空腸吻合。","D":"被燒灼切除的膽管無法橋接回原處。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-33":{"quick":"正確為 B:膽結石致急性膽囊炎主因膽囊管阻塞,超音波確診敏感>80%、特異>90%。","detail":{"background":"膽結石:女性/肥胖/多產/40歲(4F)危險;『致急性膽囊炎主因膽囊管阻塞,超音波確診敏感>80%、特異>90%』(B正確)。","options":{"A":"錯:無症狀膽結石多數不需手術。","B":"★正確(本題答案):膽囊管阻塞致膽囊炎,超音波高敏感/特異。","C":"錯:結石入總膽管不一定自然排出,可致膽管炎/胰臟炎。","D":"錯:最常見併發症非術中膽囊破裂掉石。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-74":{"quick":"64F 急性右上腹劇痛+CT/血管攝影→C:肝細胞癌破裂(常見肝硬化背景、自發性出血)。","detail":{"background":"肝細胞癌(HCC)自發性破裂:腫瘤血管豐富、表淺者易自發破裂出血→急性右上腹劇痛、腹腔積血、血流動力學不穩;CT/血管攝影見腫瘤+活動性出血。處置:血管攝影栓塞(TAE)止血,穩定後評估切除。需與肝膿瘍、肝血管瘤破裂鑑別。","options":{"A":"肝膿瘍為發燒+膿瘍影像。","B":"脂肪肝不致急性出血。","C":"★正確(本題答案):肝細胞癌破裂。","D":"肝血管瘤破裂較少見。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-37":{"quick":"非 Ranson 評估項目者為 C:總膽紅素(Ranson 入院項目用年齡、白血球、血糖、AST、LDH)。","detail":{"background":"Ranson 預後指標(急性胰臟炎,非膽石性版):入院時—年齡>55、白血球>16000、血糖>200、AST>250、LDH>350;48 小時內—血鈣<8、Hct 下降>10%、BUN 上升、PaO₂<60、鹼缺失>4、體液欠缺>6 L。「總膽紅素」不在其中。","options":{"A":"是:年齡。","B":"是:血糖。","C":"★非(本題答案):總膽紅素非 Ranson 項目。","D":"是:白血球。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-74":{"quick":"45F 飯後右上腹不適+X 光顯影病變→A:膽結石(部分膽結石含鈣可在 X 光顯影,右上腹位置)。","detail":{"background":"45歲女性飯後右上腹不適+腹部X光顯影病變→『膽結石(部分含鈣可在X光顯影)』(A);超音波為首選確診工具。","options":{"A":"★正確(本題答案):膽結石。","B":"總膽管嵌塞結石位置/表現不同。","C":"腎結核病影像不符。","D":"腎結石位置在腎/輸尿管,非右上腹膽囊區。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113020-36":{"quick":"非 Charcot 三徵者為 C:右上腹腫塊。Charcot=發燒、黃疸、右上腹痛。","detail":{"background":"急性膽管炎Charcot三徵=『發燒、黃疸、右上腹痛』;『右上腹腫塊非Charcot三徵之一』(C)。","options":{"A":"是:發燒。","B":"是:黃疸。","C":"★非(本題答案):右上腹腫塊非 Charcot 三徵。","D":"是:右上腹痛。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-33":{"quick":"錯在 C:發燒+上腹痛+黃疸是「Charcot 三徵」,非「Reynold(s) 三徵」;Reynolds 是五徵(Charcot+休克+意識改變)。","detail":{"background":"急性膽管炎:Charcot三徵(發燒+上腹痛+黃疸);『非Reynolds三徵——Reynolds為五徵(Charcot+休克+意識改變)』(故C錯)。","options":{"A":"正確:無膽道阻塞通常不致膽管炎。","B":"正確:膽石性膽管炎好發年長女性。","C":"★錯誤(本題答案):此三徵為 Charcot,非 Reynolds。","D":"正確:留置導管者較易無黃疸性膽管炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-3":{"quick":"Calot 三角組成為 C:總肝管、肝臟下緣、膽囊管。","detail":{"background":"Calot三角組成為『總肝管、肝臟下緣、膽囊管』(C);辨識其內膽囊動脈與膽囊管可降低膽管損傷。","options":{"A":"含右肝動脈(內容物),非邊界。","B":"右肝管非標準邊界(為總肝管)。","C":"★正確(本題答案):總肝管+肝下緣+膽囊管。","D":"含腔動脈,錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114070-38":{"quick":"正確為 C(1245):Charcot 三徵(1)、Charcot 階段緊急手術非必須(可先 ERCP 引流)(2)、Reynolds 五徵不緊急引流會致命(4)、(5);敘述 3 錯—Reynolds 五徵=Charcot+「休克+意識改變」,非代謝性酸中毒。","detail":{"background":"急性膽管炎:Charcot三徵(黃疸/右上腹痛/發燒)(1)、Charcot階段緊急手術非必須可先ERCP引流(2)、Reynolds五徵需緊急引流否則致命(4)…正確1245(C)。","options":{"A":"1234:含 3(錯)。","B":"2345:含 3(錯)。","C":"★正確(本題答案):1、2、4、5。","D":"僅345:含 3 且漏 1、2。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114070-54":{"quick":"錯在 A:腹腔鏡膽囊切除的「膽管損傷」風險其實較開腹「略高」,不能說嚴重併發症「遠低於」開腹。","detail":{"background":"腹腔鏡vs開腹膽囊切除:腹腔鏡傷口小、恢復快;但『膽管損傷風險較開腹略高』(故A『嚴重併發症遠低於開腹』錯)。","options":{"A":"★錯誤(本題答案):膽管損傷風險腹腔鏡略高,非遠低於開腹。","B":"正確:術後疼痛較低。","C":"正確:恢復較快。","D":"正確:用於急性膽囊炎手術時間較長、膽管損傷機率較高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-8":{"quick":"最不適當為 B:急性膽囊炎「超音波」為首選且較敏感,CT 敏感度「不」優於超音波。","detail":{"background":"膽結石性急性膽囊炎:『超音波為首選且較敏感(膽囊壁增厚、周圍積液、超音波Murphy徵);CT敏感度不優於超音波』(故B最不適當)。","options":{"A":"適當:發燒+右上腹痛表現。","B":"★最不適當(本題答案):CT 敏感度不優於超音波。","C":"適當:構造不清時可部分膽囊切除避免傷總膽管。","D":"適當:抗生素保守後延遲手術約 20% 失敗。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"101030-12":{"quick":"小兒總膽管囊腫最少見症狀為 C:膽道結石。典型三徵為腹痛、黃疸、腹部腫塊。","detail":{"background":"兒童總膽管囊腫(choledochal cyst):膽總管先天囊狀擴張,典型三徵『腹痛、黃疸、腹部腫塊』;併膽管炎、胰臟炎、惡變;『膽道結石最少見』(C)。治療為囊腫切除+肝管空腸吻合。","options":{"A":"常見:腹痛。","B":"常見:黃疸。","C":"★最少見(本題答案):膽道結石。","D":"常見:腹部腫塊。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102030-38":{"quick":"非膽管癌危險因子者為 B:單純總膽管結石。","detail":{"background":"膽管癌危險因子:原發性硬化性膽管炎、總膽管囊腫、肝吸蟲(華支睪)、肝內結石、慢性膽道感染;『單純總膽管結石(無慢性炎)非危險因子』(B)。","options":{"A":"是:原發性硬化性膽管炎。","B":"★非(本題答案):單純總膽管結石非典型危險因子。","C":"是:先天性膽管囊腫。","D":"是:反覆化膿性膽管炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103030-38":{"quick":"最不適當為 B:膽道出血(hemobilia)首選「血管栓塞」止血,手術非最佳/首選。","detail":{"background":"膽道出血(hemobilia):多為醫源性(肝穿刺、PTCD、膽道介入)取代過去外傷;以「動脈出血」為主(門脈出血少且易自止);典型三徵=上腹痛、上消化道出血(經膽道入十二指腸)、黃疸。診斷用內視鏡/CT/血管攝影;治療首選「血管攝影栓塞(TAE)」,手術為後線。","options":{"A":"正確:以動脈出血為主、門脈少。","B":"★最不適當(本題答案):首選血管栓塞,非手術。","C":"正確:三徵=上腹痛+上消化道出血+黃疸。","D":"正確:內視鏡/CT/血管攝影。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103030-46":{"quick":"Kasai 術後用藥「不」包括 B:cyclosporine(抗排斥藥,用於移植);術後用類固醇、ursodeoxycholic acid、脂溶性維生素 ADEK。","detail":{"background":"膽道閉鎖Kasai術後用藥:類固醇、ursodeoxycholic acid、預防性抗生素、脂溶性維生素ADEK;『不含cyclosporine(抗排斥藥,用於移植)』(B)。","options":{"A":"包括:類固醇。","B":"★不包括(本題答案):cyclosporine 為移植抗排斥藥。","C":"包括:ursodeoxycholic acid。","D":"包括:維生素 A/D/E/K。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104030-50":{"quick":"預後因素「除外」者為 D:病人血型。預後因子=手術年齡、術後膽管炎頻率、肝纖維化程度。","detail":{"background":"膽道閉鎖預後因子:手術年齡(<60–90天較佳)、術後膽管炎頻率、肝纖維化程度、膽流恢復;『與病人血型無關』(D除外)。","options":{"A":"是:手術矯治年齡。","B":"是:術後膽道炎頻率。","C":"是:肝纖維化程度。","D":"★除外(本題答案):血型。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-52":{"quick":"錯在 C:總膽管囊腫「常有」黃疸,非「很少」。","detail":{"background":"總膽管囊腫:膽總管囊狀擴張,『常有黃疸』(故C『很少黃疸』錯);Todani分型、有惡變(膽管癌)風險,治療為囊腫全切除+Roux-en-Y肝管空腸吻合。","options":{"A":"正確:女性比例較高。","B":"正確:囊腫全切除+Roux-en-Y 膽管空腸吻合。","C":"★錯誤(本題答案):常有黃疸。","D":"正確:不全切除日後可癌變。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106020-40":{"quick":"錯在 A:膽管癌最好發位置為「肝門處(perihilar/Klatskin)」,非肝內膽管癌。","detail":{"background":"膽管癌(cholangiocarcinoma)最好發於『肝門處(perihilar/Klatskin,約50–60%)』(故A『肝內為主』錯);其次遠端、肝內;預後差。","options":{"A":"★錯誤(本題答案):最好發為肝門處,非肝內。","B":"正確:>90% 遠端/肝門癌以阻塞性黃疸表現。","C":"正確:肝門癌 CT 見肝內膽管擴大+萎縮膽囊。","D":"正確:Bismuth I/II 無血管侵犯可切除+膽腸吻合。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106080-22":{"quick":"無痛性黃疸(灰白便、深色尿)快速鑑別→C:腹部超音波(快速分辨阻塞性 vs 非阻塞性黃疸)。","detail":{"background":"無痛性阻塞性黃疸(灰白便、茶色尿)需快速鑑別「阻塞性(肝外膽道阻塞,如腫瘤/結石)vs 肝細胞性」。最快床邊工具為「腹部超音波」—看膽管是否擴張(擴張→肝外阻塞);抽血膽紅素/肝炎指數需時間且無法定位,CT 後續評估。","options":{"A":"肝炎血清非快速鑑別阻塞與否。","B":"膽紅素分型無法定位阻塞。","C":"★正確(本題答案):腹部超音波快速看膽管擴張。","D":"CT 為後續分期,非最快。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106080-73":{"quick":"疲倦+黃疸+CA19-9 升高+CT→D:胰臟頭癌。","detail":{"background":"胰臟頭癌:無痛性阻塞性黃疸(壓迫總膽管)、體重減輕、CA19-9 升高、CT 見胰頭腫塊+「雙管徵(總膽管與胰管同時擴張,double duct sign)」。為癌王、預後差。","options":{"A":"肝內膽管癌較少 CA19-9+胰頭腫塊。","B":"HCC 以 AFP、肝硬化背景為主。","C":"胃癌不致雙管擴張。","D":"★正確(本題答案):胰臟頭癌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-32":{"quick":"胰頭 4 cm 腫瘤+雙管擴張,最不適當為 A:血管攝影栓塞(對胰頭癌無治療角色)。","detail":{"background":"胰頭腫瘤合併總膽管與胰管擴張(雙管徵)疑胰頭癌:應測 CEA/CA19-9、以 ERCP/EUS(可切片+放支架引流黃疸)、MRCP 評估膽胰管與可切除性。「血管攝影栓塞」對胰頭癌無治療角色(非血管病灶)。","options":{"A":"★最不適當(本題答案):血管栓塞無角色。","B":"適當:測 CEA/CA19-9。","C":"適當:ERCP/EUS 切片+引流。","D":"適當:MRCP 評估膽胰管。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-48":{"quick":"錯在 C:膽道閉鎖多數 Kasai 術後預後「不」良好,常最終仍需肝臟移植。","detail":{"background":"膽道閉鎖:新生兒進行性膽道纖維閉塞,需早期Kasai;『多數Kasai術後預後不佳,常最終仍需肝臟移植』(故C『預後良好』錯)。","options":{"A":"正確:持續性黃疸。","B":"正確:灰白便。","C":"★錯誤(本題答案):多數仍需肝移植,非預後良好不需。","D":"正確:須先排除新生兒肝炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107080-42":{"quick":"錯在 C(亦接受 D):總膽管囊腫「即使無症狀也應手術切除」(癌變風險),非僅有症狀才手術。","detail":{"background":"膽道(總膽管)囊腫:『即使無症狀也應手術切除』(癌變風險)(故C『僅有症狀才手術』錯,亦接受D);治療為囊腫切除+肝管空腸吻合。","options":{"A":"正確:Todani 分五型。","B":"正確:典型三徵腹痛/黃疸/腫塊。","C":"★錯誤(本題答案):無症狀也應切除(癌變風險)。","D":"(給分)正確治療為囊腫切除+Roux-en-Y 肝管空腸吻合。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-1":{"quick":"肝門膽管癌侷限於總肝管(未達匯合處)→A:Bismuth-Corlette Type I。","detail":{"background":"肝門膽管癌之Bismuth-Corlette分型:Type I侷限於『總肝管(未達左右肝管匯合處)』(A);II達匯合處;III單側肝管;IV雙側肝管。","options":{"A":"★正確(本題答案):Type I(匯合處以下)。","B":"Type II 達匯合處。","C":"Type III 延伸至單側肝管。","D":"Type IV 雙側肝管。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-42":{"quick":"膽道閉鎖確診黃金標準為 D:肝臟切片(+術中膽道攝影)。","detail":{"background":"膽道閉鎖確診『黃金標準為術中膽道攝影+肝臟切片』(D);灰白便+結合型高膽紅素疑膽道閉鎖,須於60天內Kasai。","options":{"A":"病毒血清為排除鑑別,非確診。","B":"超音波為輔助(三角索徵)。","C":"HIDA 顯示不排泄但非確診。","D":"★正確(本題答案):肝臟切片(+術中膽道攝影)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-28":{"quick":"錯在 D:膽道癌對化療「效果有限」(非很好),放療角色亦不明確。","detail":{"background":"膽管細胞癌:常表現阻塞性黃疸,好發肝門;『對化療效果有限、放療角色不明確』(故D『化療效果很好』錯);手術為唯一根治。","options":{"A":"正確:Klatskin(肝門)最常見。","B":"正確:肝內膽管癌與病毒/NAFLD/肝硬化/糖尿病相關。","C":"正確:完整切除為準則,可開刀比例約 60%。","D":"★錯誤(本題答案):化療效果有限,非很好。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-39":{"quick":"錯在 A:兒童膽結石大多為「色素結石(pigment stone)」(溶血相關),非膽固醇結石。","detail":{"background":"兒童膽結石:不同於成人,以「色素結石」為主,常與溶血性疾病(地中海貧血、遺傳性球形紅血球症等)相關→可做「紅血球脆性測驗」;與肥胖較無關。有症狀者應切除膽囊。","options":{"A":"★錯誤(本題答案):兒童多為色素結石。","B":"正確:與肥胖較無關。","C":"正確:可做紅血球脆性測驗(查溶血)。","D":"正確:有症狀應切除膽囊。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112020-36":{"quick":"最恰當為 D:膽道癌儘管手術積極,預後仍不佳。","detail":{"background":"膽道惡性腫瘤:含肝內、肝門、遠端膽管及膽囊癌;『儘管手術積極,整體預後仍不佳』(D最恰當),多已晚期。","options":{"A":"錯:膽囊癌好發女性(非男性)。","B":"錯:T1a 單純膽囊切除即可,非一律清淋巴(T1b 以上才根除)。","C":"錯:遠端膽管癌預後優於肝門 Klatskin。","D":"★正確(本題答案):膽道癌預後仍不佳。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-31":{"quick":"正確為 C:膽結石是膽囊癌最重要危險因子,約 85% 伴隨膽結石。","detail":{"background":"膽囊癌(gallbladder cancer):『膽結石為最重要危險因子(約85%伴膽結石)、瓷化膽囊』(C);多腺癌、預後差。","options":{"A":"錯:非大部分經腹腔鏡偶然發現(多晚期診斷)。","B":"錯:整體預後差,非 80% 五年存活。","C":"★正確(本題答案):膽結石為最重要危險因子(~85%)。","D":"錯:T2 需根除性切除,非只追蹤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-4":{"quick":"Klatskin tumor 位於 A:左右肝管匯合處(肝門)。","detail":{"background":"Klatskin tumor指『左右肝管匯合處(肝門部)之膽管癌』(A);依Bismuth分型,手術常需合併肝葉與尾葉切除。","options":{"A":"★正確(本題答案):左右肝管匯合處。","B":"總膽管為遠端膽管癌。","C":"膽囊管非 Klatskin。","D":"壺腹處為壺腹癌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-46":{"quick":"正確為 C:膽道閉鎖鑑別診斷需排除新生兒肝炎。","detail":{"background":"膽道閉鎖:新生兒結合型膽紅素升高+灰白便;『鑑別診斷須排除新生兒肝炎等其他膽汁滯留原因』(C);Kasai手術愈早愈好。","options":{"A":"錯:超音波「無」肝內膽管擴張(可見三角索/膽囊缺如)。","B":"錯:ERCP 非最常用確診(用肝切片+術中膽道攝影)。","C":"★正確(本題答案):需排除新生兒肝炎。","D":"錯:Kasai 術後非九成治癒,多仍需移植。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-35":{"quick":"Bismuth-Corlette Type I 近端膽管癌最不必要的手術為 C:部分肝切除(Type I 在匯合處以下,不需肝切除;III/IV 才需)。","detail":{"background":"肝門膽管癌Bismuth-Corlette分型決定術式:Type I(匯合處以下)不需肝葉切除,故『部分肝切除為最不必要』(C);III/IV才需合併肝切除。","options":{"A":"需:膽囊切除。","B":"需:總膽管切除。","C":"★最不必要(本題答案):Type I 不需部分肝切除。","D":"需:肝動脈及門靜脈周圍淋巴廓清。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"101030-22":{"quick":"胰臟假性囊腫最常見原因為 C:胰臟炎。","detail":{"background":"胰臟假性囊腫(無上皮的纖維性包覆積液):最常見續發於「急性/慢性胰臟炎」(胰管破裂滲漏);也見於胰臟外傷、術後。需與「胰臟囊狀腫瘤」鑑別。","options":{"A":"寄生蟲非主因。","B":"胰臟腫瘤為囊狀腫瘤,非假性囊腫主因。","C":"★正確(本題答案):胰臟炎。","D":"手術後較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"101030-52":{"quick":"反覆胰臟炎+胰頭病灶切除→本題接受 C/D:幽門保留胰十二指腸切除(C)或十二指腸保留胰頭切除(D)。","detail":{"background":"年輕反覆胰臟炎、主胰管狹窄、疑胰頭腫瘤者,胰頭切除術式包括:Whipple、「幽門保留胰十二指腸切除(PPPD)」、「十二指腸保留胰頭切除(Beger)」。本題依檢體接受 C、D 皆給分。Puestow(側側胰管空腸吻合)用於胰管擴張之引流而非切除胰頭。","options":{"A":"Puestow 為引流術,非切除胰頭。","B":"Whipple 為標準胰十二指腸切除。","C":"★(本題答案)幽門保留胰十二指腸切除。","D":"★(給分)十二指腸保留胰頭切除(Beger)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102030-43":{"quick":"不是胰臟炎併發症者為 D:胰管分裂(pancreas divisum)—它是先天變異(胰臟炎的「原因」之一),非併發症。","detail":{"background":"胰臟炎併發症:假性囊腫、膿瘍、壞死、出血、ARDS、低血鈣;『胰管分裂(pancreas divisum)為先天變異(胰臟炎原因之一),非併發症』(D)。","options":{"A":"是併發症:假性囊腫。","B":"是併發症:胰周壞死。","C":"是併發症:胰臟膿瘍。","D":"★不是(本題答案):pancreas divisum 為先天變異/病因。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102110-34":{"quick":"Hemosuccus pancreaticus 意為 C:胰臟炎引起的「假性動脈瘤破裂出血流入胰管」(經乳頭至十二指腸的上消化道出血)。","detail":{"background":"Hemosuccus pancreaticus:慢性胰臟炎/假性囊腫侵蝕血管(常脾動脈)形成假性動脈瘤,破裂「出血流入胰管」→經 Vater 乳頭進入十二指腸→間歇性上消化道出血+腹痛。診斷/治療以血管攝影栓塞為主。","options":{"A":"籠統「胰臟出血」不精確。","B":"流至腹腔為腹腔內出血,非此定義。","C":"★正確(本題答案):假性動脈瘤出血流入胰管。","D":"非胃潰瘍出血。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104030-36":{"quick":"最常見急性胰臟炎原因為 A:膽道結石。","detail":{"background":"急性胰臟炎最常見原因為『膽道結石(膽石性)』(A),其次酒精;其他高血脂、ERCP後、藥物、外傷。","options":{"A":"★正確(本題答案):膽道結石最常見。","B":"酒精次之。","C":"高血鈣較少。","D":"ERCP 後較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104090-34":{"quick":"錯在 C:若有「下游胰管阻塞」,假性囊腫應優先「內引流(囊腸吻合)」,而非外引流(外引流易形成胰瘻)。","detail":{"background":"胰臟假性囊腫處置:無症狀且不增大可觀察;須與囊狀腫瘤鑑別。需引流時,若「下游胰管阻塞/與主胰管相通」應「內引流(囊胃/囊腸吻合或內視鏡引流)」使胰液引入腸道;「外引流」用於感染或不成熟囊腫,但易形成胰皮膚瘻管。","options":{"A":"正確:目的緩解症狀預防併發症。","B":"正確:須與囊狀腫瘤鑑別。","C":"★錯誤(本題答案):下游阻塞應內引流,非外引流。","D":"正確:無症狀不增大可觀察。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104090-52":{"quick":"酗酒+反覆腹背痛+CT→A:慢性胰臟炎併胰臟鈣化及胰管結石。","detail":{"background":"酗酒10年+反覆腹背痛+CT見鈣化/胰管結石→『慢性胰臟炎併胰臟鈣化及胰管結石』(A);酒精為慢性胰臟炎最常見原因。","options":{"A":"★正確(本題答案):慢性胰臟炎(鈣化+胰管結石)。","B":"急性胰臟炎為單次急性發炎。","C":"胰臟癌影像/病程不同。","D":"膽結石非此慢性鈣化表現。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104090-53":{"quick":"主胰管>1 cm 之慢性胰臟炎手術→B:Puestow(側側胰管空腸吻合)並清除胰管結石。","detail":{"background":"慢性胰臟炎主胰管擴張>1cm伴結石,手術可行『Puestow術式(側側胰管空腸吻合)』減壓引流並清石(B)。","options":{"A":"Whipple 用於胰頭腫瘤,非引流。","B":"★正確(本題答案):Puestow 引流+清石。","C":"膽囊切除不解決胰管問題。","D":"單純引流管不足。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-34":{"quick":"最不常見局部併發症為 D:腎動脈血栓。","detail":{"background":"急性胰臟炎局部併發症:急性積液、假性囊腫、壞死、膿瘍、脾靜脈栓塞;『腎動脈血栓最不常見』(D)。","options":{"A":"常見:胰臟蜂窩組織(phlegmon)。","B":"可見:胰臟膿瘍。","C":"常見:假性囊腫。","D":"★最不常見(本題答案):腎動脈血栓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-38":{"quick":"最不像急性胰臟炎者為 C:血鈣「上升」(急性胰臟炎反致低血鈣)。","detail":{"background":"急性胰臟炎:腹痛、amylase/lipase升、發炎反應;併『低血鈣(脂肪皂化)』,故『血鈣上升最不像』(C)。","options":{"A":"符合:上腹痛輻射至背。","B":"符合:持續嘔吐。","C":"★最不像(本題答案):應為低血鈣,非高血鈣。","D":"符合:發燒。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-52":{"quick":"肥胖+膽結石+發燒+白血球高+黃疸→D:先安排腹部超音波(評估膽道/胰臟)。","detail":{"background":"上腹壓痛+發燒+白血球升高+黃疸,合併已知膽結石→疑膽源性胰臟炎/膽管炎;下一步先「腹部超音波」評估膽囊結石、總膽管擴張與胰臟。非一開始就剖腹/血管攝影。","options":{"A":"輸血非當下首要。","B":"未診斷前不貿然剖腹。","C":"血管攝影非首選。","D":"★正確(本題答案):腹部超音波。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-53":{"quick":"超音波見膽囊結石+後腹腔胰臟囊腫→B:膽源性胰臟炎。","detail":{"background":"膽囊結石+後腹腔胰臟囊腫→『膽源性(膽石性)胰臟炎』(B,膽結石為最常見原因)。","options":{"A":"闌尾炎位置/影像不符。","B":"★正確(本題答案):膽源性胰臟炎。","C":"急性肝炎不致胰臟囊腫。","D":"腸阻塞表現不同。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109020-29":{"quick":"錯在 C:急性胰臟炎導致「低血鈣」(脂肪皂化),非「高鈣血症合併抽搐」。","detail":{"background":"急性胰臟炎併發症:壞死、假性囊腫、ARDS、急性腎損傷、『低血鈣(脂肪皂化)』;故『高鈣血症合併抽搐』敘述錯(C)。","options":{"A":"正確:低血容+急性腎衰竭。","B":"正確:低血氧+ARDS。","C":"★錯誤(本題答案):應為低血鈣,非高鈣。","D":"正確:血管栓塞+腸缺血。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-29":{"quick":"錯在 C:無感染證據的「無菌性壞死」不需預防性抗生素(指引不建議),僅感染性壞死才用。","detail":{"background":"急性胰臟炎:大多保守支持治療;『無菌性壞死不需預防性抗生素(指引不建議),僅感染性壞死才用』(故C錯)。","options":{"A":"正確:危險因子含膽結石/酒精/藥物/自體免疫/ERCP 後。","B":"正確:Ranson/APACHE II/CT 嚴重度指數評估。","C":"★錯誤(本題答案):無菌性壞死不需預防性抗生素。","D":"正確:5–15% 形成假性囊腫。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-34":{"quick":"正確為 A(12):急性胰臟炎 70–80% 為膽結石+酒精(1)、慢性胰臟炎 70–80% 為酗酒(2)。3(急性多需手術,錯—多內科)、4(amylase 不能預測嚴重度,錯)、5(慢性+糖尿病即手術,錯)。","detail":{"background":"急性胰臟炎70–80%為膽結石+酒精(1)、慢性胰臟炎70–80%為酗酒(2)→正確12(A);急性多內科治療、amylase不能預測嚴重度(3、4錯)。","options":{"A":"★正確(本題答案):1、2。","B":"35:含 3、5 錯。","C":"45:含 4、5 錯。","D":"13:含 3 錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-42":{"quick":"小兒肝內+肝外膽管擴張之膽道囊腫→本題答案 A:屬 Type IVa(肝內外皆擴張)、待胰臟炎緩解後安排手術切除。","detail":{"background":"總膽管囊腫 Todani 分型:I 型(肝外膽總管擴張,最常見)、IVa 型(肝內+肝外皆擴張)、V 型(Caroli,僅肝內)。小兒合併胰臟炎(常因胰膽管合流異常)時,先讓胰臟炎緩解再行「囊腫切除+Roux-en-Y 肝管空腸吻合」(癌變風險須切除)。","options":{"A":"★正確(本題答案):Type IVa+胰臟炎緩解後手術。","B":"23:type V(Caroli)不符(本例有肝外擴張)。","C":"245:不符。","D":"145:含不符敘述。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-73":{"quick":"最不恰當為 C:慢性胰臟炎鈣化在 X 光「並非都清晰可見」,CT 較易辨識。","detail":{"background":"慢性胰臟炎之鈣化:為診斷特徵之一;『X光並非都清晰可見,CT較易辨識鈣化』(故C『X光都清晰』最不恰當)。","options":{"A":"正確:斑駁鈣化。","B":"正確:L1–L2 高度水平分布。","C":"★最不恰當(本題答案):X 光非都清晰可見。","D":"正確:CT 較 X 光易辨識鈣化。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112020-72":{"quick":"最少見晚期併發症為 C:肝動脈假性動脈瘤(假性動脈瘤以「脾動脈」最常見,肝動脈少)。","detail":{"background":"急性胰臟炎晚期併發症:假性囊腫、壞死感染、假性動脈瘤(以『脾動脈』最常見);『肝動脈假性動脈瘤最少見』(C)。","options":{"A":"可見:胰管阻塞。","B":"可見:後腹腔膿瘍。","C":"★最少見(本題答案):肝動脈假性動脈瘤(脾動脈才常見)。","D":"常見:假性囊腫。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-44":{"quick":"最適當為 B:急性胰臟炎手術「只在感染性壞死或感染性積聚」才建議。","detail":{"background":"急性胰臟炎手術適應症:大多保守;『只在感染性壞死或感染性積聚才手術/介入清創』(B最適當)。","options":{"A":"錯:嚴重型不應一確診即早期清創(延遲、step-up)。","B":"★正確(本題答案):僅感染性壞死/積聚才手術。","C":"錯:假性囊腫一般「內引流」優於外引流。","D":"錯:內視鏡引流常優先於手術引流。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102110-39":{"quick":"胰臟癌「除外」的遺傳疾病為 B:家族性甲狀腺癌。","detail":{"background":"胰臟癌相關遺傳症候群:遺傳性胰臟炎、Peutz-Jeghers、FAMMM(p16)、Lynch、BRCA2;『家族性甲狀腺癌(髓質癌/MEN2)與胰臟癌無關』(B除外)。","options":{"A":"相關:HNPCC/Lynch。","B":"★除外(本題答案):家族性甲狀腺癌與胰臟癌無關。","C":"相關:Peutz-Jeghers。","D":"相關:ataxia-telangiectasia。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103030-35":{"quick":"錯在 D:壞死性遊走性紅斑(necrolytic migratory erythema)是「升糖素瘤(glucagonoma)」特徵,非胰島素瘤。","detail":{"background":"胰島素瘤(insulinoma):富血管、多良性、Whipple三徵(空腹低血糖、血糖<50、補糖緩解);『壞死性遊走性紅斑為升糖素瘤(glucagonoma)特徵』(故D錯)。","options":{"A":"正確:神經低血糖症狀(混亂/視糊)常見。","B":"正確:交感症狀(心悸/手抖)常見。","C":"正確:選擇性動脈鈣刺激+肝靜脈取樣定位。","D":"★錯誤(本題答案):壞死性遊走性紅斑為升糖素瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104030-35":{"quick":"本題接受 A/B 給分:A—「類癌是肝轉移較常見種類」之絕對化敘述被視為可議;此類分化良好 NET 肝轉移生長慢,手術/RFA/TACE/somatostatin 皆為選項。","detail":{"background":"神經內分泌瘤肝轉移:多分化良好、生長緩慢,部分不治療仍可長期存活;治療含手術切除、射頻消融(RFA)、經動脈化學栓塞(TACE)、長效 somatostatin analogue(控制荷爾蒙症狀)。本題答案鍵接受 A、B 給分。","options":{"A":"★(本題答案/給分):絕對化敘述被視為可議。","B":"(給分):多生長緩慢、可長期存活。","C":"正確:手術/RFA/TACE 皆可考慮。","D":"正確:荷爾蒙症狀用長效 somatostatin analogue。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105020-35":{"quick":"錯在 C:MEN1 為第 11 對染色體突變顯性遺傳,常見「副甲狀腺+腦下垂體+胰臟」三 P,非「攝護腺(prostate)」。","detail":{"background":"胰臟內分泌瘤多與MEN1相關;『MEN1為第11對染色體突變、顯性遺傳,三P=副甲狀腺、腦下垂體、胰臟』(故C『攝護腺』錯)。","options":{"A":"正確:頑固潰瘍/嚴重食道炎/腹瀉應想到 ZES。","B":"正確:gastrinoma 約 75% 偶發、25% 合併 MEN1。","C":"★錯誤(本題答案):MEN1 為副甲狀腺/腦下垂體/胰臟,非攝護腺。","D":"正確:MEN1 合併副甲亢+pNET 應優先處理副甲狀腺亢進。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105020-36":{"quick":"錯在 C:T3N0M0 與 T2N1M0 之 AJCC 分期並非相同(N 分期不同會影響整體 stage)。","detail":{"background":"胰臟癌AJCC分期由T、N、M決定;『T3N0M0與T2N1M0之N分期不同,整體stage不同』(故C『相同』錯)。","options":{"A":"正確:最常見為胰管腺癌。","B":"正確:危險因子含年齡/家族史/抽菸/慢性胰臟炎。","C":"★錯誤(本題答案):兩者 AJCC 分期不同。","D":"正確:胰頭癌可 Whipple 切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106020-38":{"quick":"本題一律給分:轉移性胰臟內分泌瘤可用 diazoxide(降胰島素/高胃泌素)、減積手術(cytoreduction)後存活改善、PPI 控制 gastrinoma 胃酸、甚至骨轉移亦可考慮切除。","detail":{"background":"無法手術的轉移性 pNET 處置:長效 somatostatin analogue、減積(cytoreduction)手術改善症狀與存活、PPI 控制 ZES 胃酸、肝轉移 RFA/TACE、標靶(everolimus/sunitinib)、PRRT。本題各選項皆有其合理性,一律給分。","options":{"A":"(給分):相關藥物治療。","B":"(給分)。","C":"(給分):減積手術後存活改善。","D":"(給分):骨轉移亦可考慮切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106020-43":{"quick":"術前定位最精確為 C:選擇性動脈鈣劑刺激試驗(+肝靜脈取樣)。","detail":{"background":"胰島素瘤術前定位『最精確為選擇性動脈鈣劑刺激試驗(ASVS)+肝靜脈取樣』(C);因腫瘤小,CT/EUS輔助。","options":{"A":"MRI 敏感度有限。","B":"血管造影單獨不夠精確。","C":"★正確(本題答案):動脈鈣刺激試驗最精確。","D":"術中超音波重要但屬「術中」非術前。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-33":{"quick":"一般「不」以 Whipple 處理者為 C:膽囊癌(以膽囊切除+肝床切除+淋巴清掃處理)。","detail":{"background":"Whipple(胰十二指腸切除)用於胰頭癌、壺腹癌、遠端膽管癌、十二指腸癌;『膽囊癌一般以膽囊切除+肝床切除+淋巴清掃,非Whipple』(C)。","options":{"A":"壺腹癌:以 Whipple 處理。","B":"胰鈎部癌:Whipple。","C":"★正確(本題答案):膽囊癌非 Whipple。","D":"遠端總膽管癌:Whipple。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-38":{"quick":"Whipple 三徵為 C(亦接受 B):低血糖症狀+血糖<50+「給葡萄糖後症狀緩解」。","detail":{"background":"胰島素瘤之Whipple三徵=『低血糖症狀+血糖<50 mg/dL+給葡萄糖後症狀緩解』(C,亦接受B);診斷後手術切除。","options":{"A":"含糖尿病藥史不屬三徵。","B":"(給分)口服葡萄糖後改善。","C":"★正確(本題答案):靜脈葡萄糖後症狀緩解。","D":"胰島素注射史為外因性低血糖,非三徵。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107080-31":{"quick":"不適合敘述為 A:胰臟癌好發「胰頭」(非體部);預後與診斷時分期最相關。","detail":{"background":"胰臟癌:『好發胰頭(非體部)』(故A不適合);多腺癌、預後差、與分期最相關;CA19-9為標記。","options":{"A":"★不適合(本題答案):好發胰頭,非體部。","B":"適合:多切面 CT 為最符效益診斷工具。","C":"適合:同期別預後較其他壺腹周圍癌差。","D":"適合:診斷性腹腔鏡排除腹膜轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107080-35":{"quick":"Whipple 切除包含 D(134):胰頭(1)、遠端總膽管(3)、十二指腸(4);不含脾臟(2)與腹腔幹(5)。","detail":{"background":"Whipple切除包含『胰頭(1)、遠端總膽管(3)、十二指腸(4)、部分胃/膽囊』;不含脾臟(2)與腹腔幹(5)→134(D)。","options":{"A":"123:含 2(脾,錯)。","B":"135:含 5(腹腔幹,錯)。","C":"245:含 2、5 錯。","D":"★正確(本題答案):1、3、4。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-32":{"quick":"錯在 B:胃泌素瘤好發「胃泌素瘤三角」—膽囊/總膽管交界、十二指腸二三部交界、胰頸與胰體交界,而非「總膽管、胃、胰頸胰體之間」(含「胃」表述不正確)。","detail":{"background":"Zollinger-Ellison症候群(胃泌素瘤):大量胃酸致頑固潰瘍/腹瀉;好發『Passaro三角』;故B含「胃」之表述不正確(B錯)。","options":{"A":"正確:gastrinoma 大量 gastrin→胃酸過多。","B":"★錯誤(本題答案):三角為膽道/十二指腸/胰頸體交界,非含胃。","C":"正確:約 1/4 合併 MEN1,須排除。","D":"正確:有轉移風險,視為惡性。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-35":{"quick":"最不適合肝切除者為 D:肝功能 Child-Pugh class B(肝儲備不足)。","detail":{"background":"神經內分泌瘤肝轉移選擇肝切除的條件:可切除≥90% 腫瘤體積(減積)、有明顯荷爾蒙症狀、藥物(somatostatin)控制不佳、肝功能良好(Child-Pugh A)。肝功能差(Child-Pugh B/C)者切除風險高、最不適合。","options":{"A":"適合:可切除>95% 腫瘤。","B":"適合:藥物治療無效。","C":"適合:有明顯神經內分泌症狀。","D":"★最不適合(本題答案):Child-Pugh B 肝儲備不足。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-37":{"quick":"好發女性者為 B(134):漿液性囊狀腺瘤(1)、實體偽乳突腫瘤(3,年輕女性)、黏液性囊狀腫瘤(4);IPMN(2)較多見於男性/年長。","detail":{"background":"胰臟囊狀病灶:漿液性囊狀腺瘤(serous cystadenoma,年長女性「祖母瘤」、良性、蜂巢狀)、黏液性囊狀腫瘤(MCN,中年女性、胰體尾、有癌變風險)、實體偽乳突腫瘤(SPN,年輕女性)皆好發女性;胰管內乳突黏液性腫瘤(IPMN)較多見於男性年長者。","options":{"A":"124:含 2(IPMN,非女性好發)。","B":"★正確(本題答案):1、3、4。","C":"145:含不符。","D":"235:含 2。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108080-32":{"quick":"錯在 C:胰島素瘤是「富血管(hypervascular)」腫瘤,動脈相 CT 呈「強化」,非低顯影。","detail":{"background":"胰臟神經內分泌腫瘤:『胰島素瘤為富血管(hypervascular),動脈相CT呈強化』(故C『低顯影』錯);多良性、富血管。","options":{"A":"正確:功能性 pNET 以胰島素瘤最多。","B":"正確:Whipple 三徵。","C":"★錯誤(本題答案):insulinoma 為富血管、強化,非低顯影。","D":"正確:男女發生率相近。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109020-28":{"quick":"錯在 B:胰島素瘤「大多良性(~90%)」,非大多惡性。","detail":{"background":"胰島素瘤:『大多良性(約90%)』(故B『大多惡性』錯);Whipple三徵、富血管、手術切除多可治癒。","options":{"A":"正確:最常見胰臟內分泌瘤。","B":"★錯誤(本題答案):約 90% 良性。","C":"正確:Whipple 三徵。","D":"正確:CT/MRI 可定位。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-54":{"quick":"胰十二指腸切除術後第 7 天引流變「乳白混濁」且量大增、無發燒→C:乳糜液滲漏(chyle leak)。","detail":{"background":"胰十二指腸切除術後乳糜漏(chyle leak):淋巴管/乳糜池損傷,進食(尤其脂肪)後引流液變「乳白混濁」、量增;處置以低脂/中鏈脂肪酸飲食或禁食+TPN、生長抑素;與胰漏(amylase 高)、膽漏(膽汁)、膿瘍(發燒、培養陽性)鑑別。","options":{"A":"胰液滲漏引流 amylase 高、非乳白。","B":"膿瘍有發燒、培養陽性。","C":"★正確(本題答案):乳糜液滲漏。","D":"膽汁滲漏為膽汁色。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-55":{"quick":"符合乳糜漏者為 A(45):三酸甘油酯「高」(>110 mg/dL)、乳白外觀;細菌培養通常陰性、amylase 不高。","detail":{"background":"乳糜漏診斷:引流液三酸甘油酯升高(常>110 mg/dL)、乳糜微粒、外觀乳白;細菌培養多陰性、amylase 不高(與胰漏區別)。","options":{"A":"★正確(本題答案):三酸甘油酯高(乳糜)。","B":"12:培養陽性+amylase 高為感染/胰漏。","C":"13:含培養陽性。","D":"23:含 amylase 高(屬胰漏)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-30":{"quick":"術後鮮紅大量出血(200 mL/h×4、Hb 13→8、血壓下降)→A:立即剖腹止血。","detail":{"background":"胰十二指腸切除後早期「鮮紅、持續大量」引流+血紅素驟降+血壓下降=活動性手術出血(動脈性),輸液/輸血只是暫時穩定,根本處置是「立即剖腹(或血管攝影栓塞)止血」。延誤會致失血性休克。","options":{"A":"★正確(本題答案):立即剖腹止血。","B":"單純輸液無法止血。","C":"矯正凝血為輔助,非根本。","D":"輸全血無法止住動脈出血。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111020-37":{"quick":"錯在 D:Murphy 徵是「急性膽囊炎」表徵,非懷疑胰臟癌的依據。","detail":{"background":"懷疑胰臟癌之線索:無痛性阻塞性黃疸、體重減輕、新發糖尿病、上腹背痛、CA19-9升;『Murphy徵為急性膽囊炎表徵,非胰臟癌依據』(故D錯)。","options":{"A":"是線索:不明體重減輕/長期腹悶痛。","B":"是線索:>50 歲新發/難控制糖尿病。","C":"是線索:不明原因老人胰臟炎。","D":"★錯誤(本題答案):Murphy 徵為膽囊炎,非胰臟癌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111020-47":{"quick":"錯在 A:insulin 免疫染色陽性「不等於」insulinoma;需有臨床高胰島素性低血糖(功能性)才稱 insulinoma。","detail":{"background":"胰臟神經內分泌腫瘤:『insulin免疫染色陽性不等於insulinoma(功能性需臨床高胰島素性低血糖)』(故A錯);依分化/Ki-67分級。","options":{"A":"★錯誤(本題答案):免疫染色陽性不等於 insulinoma(需功能性低血糖)。","B":"正確:升糖素瘤有壞死性遊走性紅斑。","C":"正確:Ki-67>20% 為 high grade。","D":"正確:CgA 可輔助診斷與追蹤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-4":{"quick":"不是胰臟癌危險因子者為 D:縮胃(減重)手術。","detail":{"background":"胰臟癌危險因子:抽菸、慢性胰臟炎、糖尿病、肥胖、家族史/遺傳症候群;『縮胃(減重)手術非胰臟癌危險因子』(D)。","options":{"A":"是:抽菸。","B":"是:Peutz-Jeghers。","C":"是:遺傳性胰臟炎。","D":"★不是(本題答案):縮胃手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112020-3":{"quick":"胰十二指腸切除後最易滲漏的吻合處為 C:胰(體)空腸吻合(胰漏 POPF 最常見、最致命)。","detail":{"background":"胰十二指腸切除後重建三吻合:胰空腸(或胰胃)、膽管空腸、胃空腸。其中「胰腸吻合」最易滲漏(術後胰漏 POPF),因胰液具腐蝕性、軟胰/小胰管風險高,可致出血與膿瘍,是術後最重要併發症。","options":{"A":"胃空腸吻合滲漏較少。","B":"膽管空腸吻合滲漏較少。","C":"★正確(本題答案):胰空腸吻合最易滲漏。","D":"各處機率不同(胰腸最高)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112020-34":{"quick":"錯在 B:Passaro 三角是「胃泌素瘤(gastrinoma)」好發處,非胰島素瘤;胰島素瘤多在胰臟各處、富血管。","detail":{"background":"胰臟內分泌瘤:『Passaro三角為胃泌素瘤(gastrinoma)好發處,非胰島素瘤』(故B錯);胰島素瘤遍布胰臟、富血管。","options":{"A":"正確:insulinoma 最常見、Whipple 三徵。","B":"★錯誤(本題答案):Passaro 三角為 gastrinoma,非 insulinoma。","C":"正確:ZES 由 gastrinoma 引起。","D":"正確:90% 偶發、10% 合併 MEN1。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-30":{"quick":"錯在 B:Zollinger-Ellison 約 25% 合併「MEN type I」(非 MEN II)。","detail":{"background":"Zollinger-Ellison(胃泌素瘤):gastrin 過多→胃酸過多、頑固潰瘍/腹瀉;約 80% 位於「胃泌素瘤三角」(膽囊管總膽管交界、十二指腸二三部交界、胰頸胰體交界),腫瘤常小不易術前定位;約 25% 合併 MEN1(非 MEN2);約 60% 惡性、常轉移。","options":{"A":"正確:gastrinoma 異常分泌 gastrin。","B":"★錯誤(本題答案):合併 MEN「I」非 MEN II,比例約 25%。","C":"正確:約 80% 在胃泌素瘤三角、常小不易定位。","D":"正確:約 60% 惡性、常轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-33":{"quick":"錯在 D:胰臟癌術前常規 ERCP 膽道減壓「不」建議(增加感染/併發症,DROP-PD 試驗),僅膽管炎或延後手術時用。","detail":{"background":"胰臟癌:『術前常規ERCP膽道減壓不建議(增加感染/併發症,DROP-PD試驗),僅膽管炎或延後手術時用』(故D錯)。","options":{"A":"正確:遺傳相關基因 PRSS1/STK11/CDKN2A/BRCA2。","B":"正確:胰頭以黃疸、體尾以疼痛/體重減輕為主。","C":"正確:胰頭癌約 1/3 摸到腫大膽囊(Courvoisier)。","D":"★錯誤(本題答案):術前常規膽道引流不建議。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-34":{"quick":"正確為 B:C-peptide 上升可區別「內因性(insulinoma)」與外因性胰島素/降血糖藥引起的低血糖。","detail":{"background":"胰島素瘤:空腹低血糖+不當高胰島素;『C-peptide上升可區別內因性(insulinoma)與外因性胰島素/磺醯尿素引起之低血糖』(B正確)。","options":{"A":"單位筆誤(<50 mg/mL 應為 mg/dL),非最佳答案。","B":"★正確(本題答案):C-peptide 上升示內因性胰島素。","C":"錯:insulinoma 多為「單發」良性,非多發。","D":"部分正確但敘述不完整。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113020-37":{"quick":"BD-IPMN「非」高風險特徵者為 B:發燒。高風險/令人擔憂特徵=黃疸、主胰管>10 mm、囊內強化壁結節≥5 mm、囊>3 cm。","detail":{"background":"分支型胰管內乳突黏液性腫瘤(BD-IPMN)惡性風險評估(Fukuoka/國際共識):高風險特徵=阻塞性黃疸、主胰管擴張≥10 mm、囊內「強化壁結節≥5 mm」;令人擔憂特徵=囊≥3 cm、囊壁增厚、主胰管 5–9 mm、淋巴結腫大、CA19-9 升高。「發燒」不是。","options":{"A":"高風險:黃疸。","B":"★非高風險(本題答案):發燒。","C":"高風險:主胰管>1 cm。","D":"高風險:強化壁結節>5 mm。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-34":{"quick":"錯在 C:CgA 會「偽性升高」(PPI、腎衰竭等),術後影像無轉移而 CgA 升高未必代表殘留/轉移,不能僅憑此判定。","detail":{"background":"胰臟神經內分泌瘤(pNET):多數潛在惡性(組織學不易預測生物行為,以分化/Ki-67 分級:Ki-67>20% 為 high grade);MEN1 病人 pNET 常多發。嗜鉻粒蛋白 A(CgA)輔助轉移性 pNET 診斷與追蹤(但 PPI、腎衰竭會偽高)。轉移可手術/RFA/TACE/somatostatin/標靶。","options":{"A":"正確:多潛在惡性、組織學不易預測生物行為。","B":"正確:MEN1 之 pNET 常多發。","C":"★錯誤(本題答案):CgA 可偽高,不能僅憑此判定殘留。","D":"正確:局部消融以 RFA 為主。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-37":{"quick":"漿液性囊狀腫瘤建議手術者為 A:有症狀(此瘤良性,無症狀通常追蹤)。","detail":{"background":"胰臟漿液性囊狀腫瘤(serous cystadenoma):良性(極少惡變)、好發年長女性、蜂巢狀微囊+中央疤痕;多數「無症狀者追蹤即可」,僅在「有症狀(壓迫)、診斷不確定、快速增大」時才手術。","options":{"A":"★正確(本題答案):有症狀才建議手術。","B":"單純>2 cm 非手術門檻(良性)。","C":"主胰管>0.5 cm 非指標。","D":"位置非手術依據。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-41":{"quick":"83F 空腹低血糖、補糖緩解、胰島素/C-peptide 高→insulinoma;錯在 D:胰尾病灶做「遠端胰切除」即可,不需切 85% 胰臟。","detail":{"background":"83歲空腹低血糖、補糖緩解、胰島素/C-peptide高→insulinoma;『胰尾病灶做遠端胰切除即可,不需切85%胰臟』(故D錯)。","options":{"A":"正確:急救輸 50% glucose。","B":"正確:甦醒後 CT 定位。","C":"正確:影像未見可做動脈鈣刺激試驗。","D":"★錯誤(本題答案):胰尾瘤做遠端胰切除,非切 85%。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-36":{"quick":"仍適合根除性切除者為 B:腫瘤侵犯大腸(可整塊 en bloc 切除)。","detail":{"background":"胰臟癌可根除性切除之判準為無大血管(SMA/腹腔幹)包覆、無遠端轉移;『腫瘤侵犯大腸可整塊(en bloc)切除仍適合根除』(B)。","options":{"A":"肝多發轉移不可切除。","B":"★正確(本題答案):侵犯大腸可整塊切除。","C":"侵犯上腸繫膜動脈不可切除。","D":"侵犯腹腔動脈幹不可切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-9":{"quick":"錯在 D:腺鱗癌是「惡性度高、預後更差」的變異型,非「分化良好、預後相對好」。","detail":{"background":"胰腺癌(腺癌)預後極差;『腺鱗癌(adenosquamous)為惡性度高、預後更差之變異型』(故D『分化良好、預後相對好』錯)。","options":{"A":"正確:約 2/3 在胰頭/鈎部。","B":"正確:胰尾腫瘤診斷時較大、可切除率低。","C":"正確:胰頭癌致阻塞性黃疸、較早診斷、可切除率較高。","D":"★錯誤(本題答案):腺鱗癌惡性度高、預後更差。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-17":{"quick":"錯在 C:遠端胰切除中,機械手臂(robotic)的「轉開腹率較低、脾臟保留率較高」,非兩者皆較腹腔鏡低。","detail":{"background":"遠端胰切除微創:腹腔鏡與機械手臂皆保有微創優點(出血少、恢復快);重大併發症(如胰瘻)發生率相近;機械手臂在精細操作下「轉開腹率較低、脾臟保留率較高」;腹腔鏡花費較低。","options":{"A":"正確:兩者皆有微創優點。","B":"正確:胰瘻等重大併發症相近。","C":"★錯誤(本題答案):機械手臂脾臟保留率較「高」,轉開腹率較低。","D":"正確:腹腔鏡花費較低。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102030-73":{"quick":"HBsAg+、AFP 可正常、動態 CT+血管攝影→C:肝細胞癌(AFP 正常不排除)。","detail":{"background":"慢性B肝(HBsAg+)+右上腹脹痛、動態CT典型病灶→『肝細胞癌(HCC)』(C);『AFP正常不能排除HCC』,影像(動脈相強化+洗出)即可診斷。","options":{"A":"轉移瘤多無 HBsAg 背景、影像不同。","B":"膽管癌影像/標記不同。","C":"★正確(本題答案):肝細胞癌。","D":"血管瘤為良性、無此病程。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"102110-48":{"quick":"正確為 B:肝母細胞瘤與肝細胞瘤腫瘤標記皆為 AFP。","detail":{"background":"小兒肝惡性腫瘤:肝母細胞瘤(hepatoblastoma,好發<3 歲、與 Beckwith-Wiedemann/FAP 相關、預後相對佳)與兒童肝細胞癌(較大兒童、常 B 肝/代謝病背景、預後較差);兩者腫瘤標記皆為 AFP。","options":{"A":"錯:肝母細胞瘤好發<3 歲。","B":"★正確(本題答案):兩者標記皆 AFP。","C":"錯:HCC 預後較肝母細胞瘤差。","D":"錯:Beckwith-Wiedemann 與肝母細胞瘤相關。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"104030-32":{"quick":"與術後長期預後不佳較相關者為 D:多發性腫瘤(multifocal)。","detail":{"background":"肝癌切除後預後不佳之相關因子:『多發性(multifocal)腫瘤』(D)、大血管侵犯、切緣陽性、肝硬化嚴重;單顆小腫瘤預後較佳。","options":{"A":"大腫瘤影響但非最關鍵。","B":"肝硬化影響肝儲備。","C":"年齡非主因。","D":"★正確(本題答案):多發性腫瘤預後不佳。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"104030-33":{"quick":"米蘭準則「不」包括 C:主門脈被侵犯(大血管侵犯為「排除條件」,非納入標準)。","detail":{"background":"肝移植之米蘭準則:單顆≤5cm或≤3顆各≤3cm、無大血管侵犯與肝外轉移;『主門脈被侵犯為排除條件,非納入標準』(故C不包括)。","options":{"A":"是:單顆≤5 cm。","B":"是:2–3 顆各≤3 cm。","C":"★不包括(本題答案):門脈侵犯為排除,非準則。","D":"是:無肝外轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"104090-31":{"quick":"FHCC 正確為 D:侵犯性較小(預後較佳)。","detail":{"background":"纖維板層型肝細胞癌(FHCC):好發「年輕人(無性別差異)、無肝硬化背景、AFP 多正常」,生長較慢、侵犯性較小、預後優於傳統 HCC(若可切除)。","options":{"A":"錯:無明顯男性偏多。","B":"錯:好發年輕,非年紀較大。","C":"錯:不易合併肝硬化。","D":"★正確(本題答案):侵犯性較小、預後較佳。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"104090-73":{"quick":"錯在 B:HCC 肉眼以「單獨結節/巨塊型」較常見,非多發性結節最常見。","detail":{"background":"肝細胞癌(HCC):肉眼以『單一結節/巨塊型較常見』(故B『多發性結節最常見』錯);與B/C肝、肝硬化、黃麴毒素相關。","options":{"A":"正確:分多發結節、單獨結節巨塊、浸潤型。","B":"★錯誤(本題答案):非多發結節最常見。","C":"正確:不可手術者可 TAE。","D":"正確:TAE 病人肝功能不宜太差、門脈需暢通。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"105020-30":{"quick":"不適合手術切除者為 C:腹水無法以利尿劑控制(肝功能差/門脈高壓,肝儲備不足)。","detail":{"background":"肝癌不適合手術切除之情況:肝功能差(Child C)、門脈高壓、肝儲備不足;『腹水無法以利尿劑控制』反映肝失代償,不適切除(C)。","options":{"A":"肝硬化仍可選擇性切除(視肝功能)。","B":"腫瘤>10 cm 若局限仍可評估切除。","C":"★正確(本題答案):頑固性腹水不適合切除。","D":"末梢門脈血栓視情況。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"106020-31":{"quick":"建議切除(有惡性變化可能)者為 B:肝細胞腺瘤(adenoma)。","detail":{"background":"肝臟良性腫瘤中『肝細胞腺瘤(hepatocellular adenoma)有惡性變化與自發出血風險,建議切除』(B);血管瘤、FNH多可觀察。","options":{"A":"單純囊腫良性。","B":"★正確(本題答案):腺瘤易出血、有惡變風險。","C":"FNH 不惡變。","D":"血管瘤多追蹤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"107020-74":{"quick":"三相 CT 病灶位置(Couinaud 分葉)→A:S5(右肝前下段)。","detail":{"background":"Couinaud 肝臟分八段(以肝靜脈與門脈分支定界):尾葉 S1;左外葉 S2/S3、左內葉 S4;右前葉 S5(下)/S8(上)、右後葉 S6(下)/S7(上)。本題病灶位於 S5。","options":{"A":"★正確(本題答案):S5。","B":"S6 為右後下段。","C":"S7 為右後上段。","D":"S8 為右前上段。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"107080-29":{"quick":"76F、血小板低、PT 異常,最不恰當為 A:「逕行開刀」;應先矯正凝血病/血小板、備血再手術。","detail":{"background":"高齡 B 肝肝癌術前評估:肝硬化背景常有「血小板低下、凝血時間延長」,肝臟手術易大出血。術前應矯正凝血病(維生素 K/新鮮冷凍血漿)、矯正血小板、預備濃縮紅血球;「不評估即逕行開刀」最不恰當。","options":{"A":"★最不恰當(本題答案):未矯正凝血即逕行開刀。","B":"恰當:矯正過低血小板。","C":"恰當:預備濃縮紅血球。","D":"恰當:矯正 PT 異常之凝血病。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"108080-30":{"quick":"45M 慢性 B 肝、S2/S5 多顆肝腫瘤+低迴音→B:肝細胞癌合併門靜脈栓塞。","detail":{"background":"慢性B肝、S2/S5多顆肝腫瘤+低迴音→『肝細胞癌合併門靜脈栓塞』(B);門脈腫瘤栓塞為HCC典型表現、影響分期與治療。","options":{"A":"肝膿瘍有發燒/膿瘍影像。","B":"★正確(本題答案):HCC 合併門靜脈栓塞。","C":"血管瘤影像不同。","D":"急性慢性肝炎非腫瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"109020-22":{"quick":"錯在 C:HCC 之伴腫瘤症候群(高血鈣、低血糖、紅血球增生)發生率「不高」(非約 10%),此敘述比例不正確。","detail":{"background":"肝細胞癌:與肝硬化/病毒性肝炎相關、AFP可升;『伴腫瘤症候群(高血鈣、低血糖、紅血球增多)發生率不高(非約10%)』(故C比例不正確)。","options":{"A":"正確:最常見原發肝惡性瘤、好發東南亞/非洲。","B":"正確:男性好發(2:1~8:1)。","C":"★錯誤(本題答案):伴腫瘤症候群不常見,比例敘述不正確。","D":"正確:治療含手術/RFA/酒精/TACE/標靶。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"109080-74":{"quick":"三相 CT 動脈相強化+洗出(肝功能/AFP 正常)→B:肝細胞癌(影像即可診斷,不需 AFP 升高)。","detail":{"background":"三相CT見『動脈相強化+靜脈相洗出(washout)』為肝細胞癌之影像特徵,『肝功能/AFP正常亦可由影像診斷HCC』(B,不需AFP升高)。","options":{"A":"血管瘤為周邊結節向心填充,不洗出。","B":"★正確(本題答案):HCC(動脈強化+洗出)。","C":"肝囊腫無強化。","D":"膽管癌延遲強化,型態不同。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"111020-44":{"quick":"最易自發性出血且有惡變可能者為 A:肝細胞腺瘤。","detail":{"background":"肝臟良性病灶中『肝細胞腺瘤(adenoma)最易自發性出血並有惡變可能』(A);與口服避孕藥/同化類固醇相關,建議切除。","options":{"A":"★正確(本題答案):腺瘤易出血、有惡變風險。","B":"血管瘤少自發破裂、不惡變。","C":"FNH 不出血不惡變。","D":"單純囊腫良性。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"112020-4":{"quick":"錯在 C:化學栓塞(TACE)是「姑息性」治療(用於 BCLC-B 中期),非根治性。","detail":{"background":"肝細胞癌BCLC分期與治療:0/A手術或消融、B中期『TACE(化學栓塞為姑息治療,非根治)』、C標靶/免疫、D支持;故C『TACE為根治性』錯。","options":{"A":"正確:BCLC 分 0/A/B/C/D。","B":"正確:依腫瘤大小、Child score、體能狀態。","C":"★錯誤(本題答案):TACE 非根治性治療。","D":"正確:BCLC-C 用 sorafenib 等標靶。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"112020-32":{"quick":"錯在 D:多發性大腸癌肝轉移若「可切除」,手術仍能改善預後,非「只能化療」。","detail":{"background":"轉移性肝腫瘤:最常見來自大腸直腸癌;約 50–60% 大腸癌病人一生會出現肝轉移。化療進步+肝切除技術成熟使「肝切除成為可切除大腸癌肝轉移的標準治療」;即使多發,只要「可達 R0 切除、保留足夠肝臟」仍可手術(±術前化療轉化),預後可改善,非只能化療。","options":{"A":"正確:最常見來自大腸直腸癌。","B":"正確:約 50–60% 會肝轉移。","C":"正確:肝切除為標準治療。","D":"★錯誤(本題答案):可切除者手術仍改善預後。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"112080-35":{"quick":"最恰當為 B:腺瘤較易自發性出血且有惡變機會。","detail":{"background":"肝腺瘤vs局部結節增生(FNH):『腺瘤較易自發出血且有惡變機會(與OCP相關)』(B);FNH(中央疤痕)多良性可觀察。","options":{"A":"錯:腺瘤(非 FNH)與口服避孕藥相關。","B":"★正確(本題答案):腺瘤易出血、可惡變。","C":"錯:MRI/CT 多可區分(FNH 有中央疤痕)。","D":"錯:FNH 多追蹤不需手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"113020-35":{"quick":"35F、肝 6 cm 腫瘤+腹腔積液(出血)+(口服避孕藥史)→A:肝細胞腺瘤(年輕女性、OCP、自發出血、惡變風險)。","detail":{"background":"35歲女性、口服避孕藥、肝6cm腫瘤伴出血/壓痛→『肝細胞腺瘤(adenoma)』(A);年輕女性、OCP、自發出血、惡變風險。","options":{"A":"★正確(本題答案):肝細胞腺瘤(OCP、自發出血)。","B":"FNH 不出血。","C":"缺陷瘤少見。","D":"血管瘤雖周邊向心填充但極少自發破裂出血;本例臨床(年輕女/OCP/出血)指向腺瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"113070-72":{"quick":"浸潤性肝癌最常合併之影像為 A:門靜脈腫瘤栓塞。","detail":{"background":"浸潤性(infiltrative)肝細胞癌最常合併『門靜脈腫瘤栓塞(portal vein tumor thrombosis)』之影像(A);邊界不清、預後差。","options":{"A":"★正確(本題答案):門靜脈腫瘤栓塞。","B":"腫瘤破裂出血非浸潤型最常見影像。","C":"肝動脈假性動脈瘤少見。","D":"主動脈旁淋巴轉移非最常見。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"114070-35":{"quick":"肝血管瘤開刀原因「不」包含 D:單純腫瘤>5 cm(大小本身非手術指徵)。","detail":{"background":"肝血管瘤手術指徵:症狀(疼痛)、快速增大、破裂出血、Kasabach-Merritt、診斷不確定;『單純腫瘤>5cm(大小本身)非手術指徵』(D)。","options":{"A":"是:Kasabach-Merritt 症候群(消耗性凝血病)。","B":"是:腫瘤破裂。","C":"是:明顯增大。","D":"★不包含(本題答案):單純>5 cm 非手術指徵。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"114070-36":{"quick":"非影響大腸癌肝轉移切除後存活之主因者為 C:原發腫瘤在直腸(位置非主要預後因子)。","detail":{"background":"大腸癌肝轉移肝切除後預後因子(如 Fong 臨床風險評分):CEA>200、肝轉移>5 cm、肝轉移數目>1、原發淋巴結陽性、同步(synchronous)轉移、無病間隔<12 個月。「原發腫瘤位於直腸或結腸」並非主要存活預後因子。","options":{"A":"是因子:CEA>200。","B":"是因子:肝轉移>5 cm。","C":"★不是(本題答案):原發位置(直腸)非主要預後因子。","D":"是因子:同步肝轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"115020-19":{"quick":"B 肝、GOT/GPT 正常、Tbil 0.8、PT 微延、alb 4.38→A:Child-Pugh A,安排腹腔鏡肝部分切除。","detail":{"background":"肝功能 Child-Pugh 分級(膽紅素、白蛋白、PT/INR、腹水、腦病變):本例膽紅素<2、白蛋白>3.5、PT 微延、無腹水/腦病=Child-Pugh A(肝儲備佳),適合手術切除(腹腔鏡肝部分切除)。MELD/ICG 進一步評估肝儲備。","options":{"A":"★正確(本題答案):Child-Pugh A,腹腔鏡肝部分切除。","B":"非 Child-Pugh B(肝功能良好)。","C":"非 Child-Pugh C。","D":"非 Child-Pugh B。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"115020-72":{"quick":"HCC 肝外腫瘤血管供應最常見為 C:右側橫膈膜下動脈(right inferior phrenic artery)。","detail":{"background":"肝癌(尤其位於肝包膜下/裸區或經多次 TACE 後)常發展「肝外側枝腫瘤血管供應」,最常見為「右下橫膈動脈(right inferior phrenic artery)」,其次網膜、腎上腺、肋間動脈等;栓塞時需一併處理以免殘留供血。","options":{"A":"內乳動脈較少。","B":"下腸繫膜動脈不供應肝。","C":"★正確(本題答案):右下橫膈動脈最常見。","D":"網膜動脈較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"101030-25":{"quick":"肝硬化大量肋膜積液一次引流 2200 mL 後突發呼吸困難→B:再膨脹肺水腫。","detail":{"background":"一次大量引流胸/腹水(>1–1.5 L)後肺快速再膨脹→微血管通透性增加、間質水腫=「再膨脹肺水腫(re-expansion pulmonary edema)」,表現引流後數分鐘至數小時呼吸困難、低血氧。故大量積液應「分次緩慢」引流。","options":{"A":"肺栓塞與引流時序不符。","B":"★正確(本題答案):再膨脹肺水腫。","C":"傷口痛不致呼吸困難低血氧。","D":"胸管插入肺實質會咳血/漏氣,非此表現。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102110-35":{"quick":"膽囊相鄰之 Couinaud 肝段為 B:segment IV 與 V(膽囊窩位於 S4b/S5 交界)。","detail":{"background":"膽囊位於肝臟臟面的膽囊窩,介於左內葉「segment IV(IVb)」與右前下葉「segment V」之間;此解剖關係是膽囊癌侵犯肝床時切除 IVb/V 的依據。","options":{"A":"segment IV+VI 不符。","B":"★正確(本題答案):segment IV 與 V。","C":"V+VII 不符。","D":"VI+VII 不符。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104090-32":{"quick":"較不可能為肝膿瘍細菌途徑者為 B:肝靜脈(出流靜脈,非感染入肝途徑)。","detail":{"background":"細菌進入肝臟之途徑:膽道(上行)、門靜脈(腸道感染)、肝動脈(菌血症)、鄰近蔓延、外傷;『肝靜脈為出流靜脈,非感染入肝途徑』(B)。","options":{"A":"是途徑:膽道。","B":"★較不可能(本題答案):肝靜脈為出流,非感染途徑。","C":"是途徑:門靜脈(腹腔內感染)。","D":"是途徑:外傷/直接蔓延。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106020-33":{"quick":"正確為 A:大部分肝膿瘍發生在右肝。","detail":{"background":"肝膿瘍:『大部分發生於右肝』(A,右肝體積大、門脈血流多);化膿性多源自膽道感染;治療抗生素+引流。","options":{"A":"★正確(本題答案):多在右肝。","B":"錯:常為多菌。","C":"錯:最常見為 E. coli/Klebsiella,非金黃葡萄球菌。","D":"錯:血培養陽性約 50%,非 80–90%。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106080-23":{"quick":"CT 病灶位置(Couinaud)→B:第 IV 分葉(左內葉)。","detail":{"background":"Couinaud 分八段:S1 尾葉、S2/S3 左外葉、S4 左內葉、S5/S8 右前葉、S6/S7 右後葉。本題腫瘤位於左內葉 segment IV。","options":{"A":"S2 左外上。","B":"★正確(本題答案):segment IV。","C":"S6 右後下。","D":"S8 右前上。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-34":{"quick":"Pringle maneuver「未」包含 A:總肝動脈(common hepatic artery)。","detail":{"background":"Pringle 手法:夾住「肝十二指腸韌帶」以暫時阻斷入肝血流,內含「門靜脈、固有肝動脈(hepatic artery proper)、總膽管」。「總肝動脈」位於更近端(在分出胃十二指腸動脈之前),不在肝十二指腸韌帶內,故不被夾住。","options":{"A":"★未包含(本題答案):總肝動脈在更近端。","B":"包含:門靜脈。","C":"包含:總膽管。","D":"包含:固有肝動脈。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108080-26":{"quick":"錯在 B:肝性腦病變應「限制/適量蛋白」,「多吃高蛋白」會增加氨、加重腦病變。","detail":{"background":"肝性腦病變:肝衰竭致氨等毒素累積。臨床:意識/行為改變、撲翼樣震顫(flapping tremor/asterixis);誘因含胃腸道出血(蛋白負荷)、感染、便秘、電解質異常、利尿過度。處置:lactulose、rifaximin、矯正誘因;急性期「避免過量蛋白」(非多吃高蛋白)。","options":{"A":"正確:行為改變/撲翼震顫。","B":"★錯誤(本題答案):應限制蛋白,非多吃高蛋白。","C":"正確:胃腸道出血常誘發。","D":"正確:血氨常升高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108080-33":{"quick":"錯在 B:預防食道靜脈曲張(出血)首選「非選擇性 β-blocker」,非 α-blocker。","detail":{"background":"肝硬化:門脈高壓致食道靜脈曲張、腹水、脾腫;『預防靜脈曲張出血首選非選擇性β-blocker』(故B『α-blocker』錯)。","options":{"A":"正確:TIPS 為門體分流(降門脈壓)。","B":"★錯誤(本題答案):首選非選擇性 β-blocker,非 α-blocker。","C":"正確:末期肝衰竭需考慮肝移植。","D":"正確:內視鏡失敗/胃靜脈瘤/TIPS 失敗需外科介入。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-35":{"quick":"依 Child-Pugh 計分(膽紅素 2.52→2 分、白蛋白 4.3→1 分、PT、無腹水/腦病各 1 分)→總分約 B:6 分(Child-Pugh A)。","detail":{"background":"Child-Pugh 分級五項各 1–3 分:總膽紅素(<2/2–3/>3)、白蛋白(>3.5/2.8–3.5/<2.8)、PT 延長(或 INR)、腹水(無/輕/中重)、肝性腦病(無/I-II/III-IV)。本例膽紅素 2.52(2 分)、白蛋白 4.3(1 分)、無腹水/腦病(各 1 分)、PT 輕度(1 分)≈ 6 分,屬 Child-Pugh A。","options":{"A":"5 分偏低。","B":"★正確(本題答案):約 6 分(Child-Pugh A)。","C":"7 分偏高。","D":"8 分偏高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-36":{"quick":"現今肝內細菌性膿瘍最常見原因為 C:膽道感染。","detail":{"background":"現今肝內細菌性膿瘍最常見原因為『膽道感染(膽管炎/膽道阻塞)』(C);過去以闌尾炎門脈炎為主。","options":{"A":"闌尾炎(門脈途徑)現今較少。","B":"腸缺血非最常見。","C":"★正確(本題答案):膽道感染。","D":"外傷較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-31":{"quick":"與門脈高壓最無關者為 B:精索靜脈曲張(睪丸靜脈,非門體側枝)。","detail":{"background":"門脈高壓之側枝循環:食道胃靜脈曲張、痔靜脈、臍周(海蛇頭)、後腹腔;『精索靜脈曲張(睪丸靜脈)與門脈高壓無關』(B)。","options":{"A":"相關:食道胃靜脈曲張。","B":"★最無關(本題答案):精索靜脈曲張。","C":"相關:上腹/臍周靜脈曲張。","D":"相關:痔瘡靜脈叢。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-28":{"quick":"不是化膿性肝膿瘍致病原因者為 D:腫瘤內細胞壞死。","detail":{"background":"化膿性肝膿瘍致病原因:膽道感染(最常見)、門脈炎、菌血症、外傷、鄰近蔓延;『腫瘤內細胞壞死非常見致病原因』(D)。","options":{"A":"是:膽道疾病。","B":"是:經門靜脈血流感染。","C":"是:經肝動脈(菌血症)。","D":"★不是(本題答案):腫瘤壞死非感染途徑。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-29":{"quick":"不是肝切除術後照料事項者為 A:腹水流失嚴重時仍「應限制」水分及鹽分(以控制腹水),非不限制。","detail":{"background":"肝切除術後照料:控制腹水須「限制水分與鹽分」+視情況補白蛋白/新鮮冷凍血漿;術後數小時體溫偏低用加溫床;肝切除後肝醣儲存減少、術後易低血糖須監測維持。故「腹水流失嚴重不宜限制水鹽」之敘述錯誤。","options":{"A":"★不是(本題答案):仍應限制水鹽以控制腹水。","B":"是:補白蛋白/FFP。","C":"是:加溫維持體溫。","D":"是:注意維持血糖。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111020-40":{"quick":"正確為 B:西方主要膽道惡性阻塞合併感染、亞洲以肝內結石之膽道感染為最主要原因。","detail":{"background":"細菌性肝膿瘍:『西方主要為膽道惡性阻塞合併感染;亞洲以肝內結石之膽道感染為最主要原因』(B);治療抗生素+經皮引流。","options":{"A":"錯:最常見為膽道/門脈,非肝動脈。","B":"★正確(本題答案):西方膽道惡性、亞洲肝內結石。","C":"錯:外傷膿瘍非 3 天內突發高燒之描述。","D":"錯:膿瘍超音波呈「低迴音」,非高迴音。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111020-43":{"quick":"最不適當為 C:脾臟切除無法降低門脈壓/治療靜脈曲張出血。","detail":{"background":"食道胃靜脈瘤出血藥物+內視鏡無效後之介入/手術:TIPS、分流術、斷流術;『脾臟切除無法降低門脈壓/治療靜脈曲張出血』(C最不適當)。","options":{"A":"適當:TIPS 門體分流降壓。","B":"適當:遠端脾腎分流(Warren)。","C":"★最不適當(本題答案):單純脾切除無降門脈壓作用。","D":"適當:末期肝病肝移植。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-33":{"quick":"正確為 D:肝星狀(Ito)細胞位於 Disse 腔,主要功能之一為儲存維生素 A(活化後致纖維化)。","detail":{"background":"肝臟小葉:約 6 個門脈三合體(門靜脈、肝動脈、膽管)圍繞一中央靜脈;分三帶,zone 3(中央靜脈周圍)最缺氧、最易缺血/毒素壞死;肝竇內皮與肝細胞間為 Disse 腔(物質擴散交換);肝星狀(Ito)細胞位於 Disse 腔,儲存維生素 A,活化後分泌膠原致纖維化。","options":{"A":"錯:約 6 個門脈三合體圍繞中央靜脈,非 8–12。","B":"錯:zone 3(中央靜脈周圍)最缺氧易壞死,非 zone 1。","C":"錯:Disse 腔允許物質擴散交換。","D":"★正確(本題答案):Ito 細胞儲存維生素 A。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-34":{"quick":"最恰當為 D:Cantlie 線=膽囊窩至下腔靜脈連線(肝臟功能性左右分界,即中肝靜脈走向)。","detail":{"background":"肝臟功能性分葉:『Cantlie線=膽囊窩至下腔靜脈連線(中肝靜脈走向),為左右肝功能分界』(D);與外觀左右葉(鐮狀韌帶)不同。","options":{"A":"錯:鐮狀韌帶分的是解剖左外葉與內葉,非功能左右肝。","B":"錯:尾葉自成一區,非屬右肝。","C":"錯:肝部(sector)以「肝靜脈」為界,非肝動脈。","D":"★正確(本題答案):Cantlie 線=膽囊窩至下腔靜脈。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-76":{"quick":"錯在 C:alanine 被肝臟用於「糖質新生」;腸道與免疫細胞的主要能量來源是「glutamine」,非 alanine。","detail":{"background":"手術後壓力反應:能量消耗、cortisol/epinephrine/glucagon 上升、分解代謝。胺基酸代謝:肌肉釋出 alanine→肝臟糖質新生;「glutamine」才是腸黏膜與免疫細胞的主要燃料。術後因脂肪利用增加,呼吸商(RQ)下降;部分術後病人能量消耗可低於基礎代謝率約 20%。","options":{"A":"正確:術後能量消耗可比基礎低約 20%。","B":"正確:cortisol/epinephrine/glucagon 上升。","C":"★錯誤(本題答案):腸道/免疫主要燃料為 glutamine,非 alanine。","D":"正確:呼吸商下降。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-6":{"quick":"不是 MELD 參數者為 B:白血球計數。","detail":{"background":"MELD score參數=『血清肌酸酐、總膽紅素、INR(±血鈉)』;『白血球計數非MELD參數』(B)。","options":{"A":"是:總膽紅素。","B":"★不是(本題答案):白血球計數。","C":"是:肌酸酐。","D":"是:INR。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-36":{"quick":"最恰當為 B:Pringle 手法一般「夾 15 分、放鬆 5 分」(間歇)。","detail":{"background":"Pringle 手法:夾肝十二指腸韌帶(門靜脈+固有肝動脈+總膽管)減少入肝出血;常「間歇」(夾約 15 分、放鬆 5 分)以減少缺血再灌注傷害(優於持續夾);肝功能差者宜選擇性半肝阻斷。","options":{"A":"錯:夾的是門靜脈+固有肝動脈+總膽管(非肝靜脈)。","B":"★正確(本題答案):間歇夾 15 分、放鬆 5 分。","C":"錯:肝功能差者宜選擇性半肝阻斷。","D":"錯:間歇較持續夾減少缺血再灌注傷害。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113020-32":{"quick":"錯在 D:肝硬化為「低」平均動脈壓(全身血管擴
