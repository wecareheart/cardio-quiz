2:1~8:1)。","C":"★錯誤(本題答案):伴腫瘤症候群不常見,比例敘述不正確。","D":"正確:治療含手術/RFA/酒精/TACE/標靶。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"109080-74":{"quick":"三相 CT 動脈相強化+洗出(肝功能/AFP 正常)→B:肝細胞癌(影像即可診斷,不需 AFP 升高)。","detail":{"background":"肝細胞癌(HCC):最常見原發肝惡性瘤,好發東南亞/非洲、男性(2:1~8:1),危險因子 B/C 肝、肝硬化、黃麴毒素、酒精、NAFLD。多有肝硬化背景;AFP 可升高(但「正常不排除」)。三相(動態)CT:動脈相強化+靜脈/延遲相洗出(washout)為診斷特徵;浸潤型常合併「門靜脈腫瘤栓塞」。肉眼分型:結節型、巨塊型、瀰漫/浸潤型。預後不佳因子:多發、血管侵犯、肝功能差。治療依 BCLC(0/A/B/C/D,依腫瘤大小數目、Child-Pugh、體能狀態):早期切除/移植/消融(RFA/酒精)為「根治」;中期 TACE(非根治、姑息);晚期 sorafenib/lenvatinib 等標靶。移植 Milan 準則=單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移。","options":{"A":"血管瘤為周邊結節向心填充,不洗出。","B":"★正確(本題答案):HCC(動脈強化+洗出)。","C":"肝囊腫無強化。","D":"膽管癌延遲強化,型態不同。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"111020-44":{"quick":"最易自發性出血且有惡變可能者為 A:肝細胞腺瘤。","detail":{"background":"肝良性腫瘤:①肝細胞腺瘤(adenoma)—與口服避孕藥/雄性素相關,「易自發性出血、有惡性變化風險」,>5 cm 或有症狀/男性者建議切除;②局部結節增生(FNH)—中央疤痕、不出血、不惡變,多追蹤;③海綿狀血管瘤—最常見良性瘤,CT「周邊結節狀強化、向心填充」,通常追蹤,手術僅限 Kasabach-Merritt、破裂、明顯增大或症狀(非單純>5 cm);④單純囊腫—良性。","options":{"A":"★正確(本題答案):腺瘤易出血、有惡變風險。","B":"血管瘤少自發破裂、不惡變。","C":"FNH 不出血不惡變。","D":"單純囊腫良性。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"112020-4":{"quick":"錯在 C:化學栓塞(TACE)是「姑息性」治療(用於 BCLC-B 中期),非根治性。","detail":{"background":"肝細胞癌(HCC):最常見原發肝惡性瘤,好發東南亞/非洲、男性(2:1~8:1),危險因子 B/C 肝、肝硬化、黃麴毒素、酒精、NAFLD。多有肝硬化背景;AFP 可升高(但「正常不排除」)。三相(動態)CT:動脈相強化+靜脈/延遲相洗出(washout)為診斷特徵;浸潤型常合併「門靜脈腫瘤栓塞」。肉眼分型:結節型、巨塊型、瀰漫/浸潤型。預後不佳因子:多發、血管侵犯、肝功能差。治療依 BCLC(0/A/B/C/D,依腫瘤大小數目、Child-Pugh、體能狀態):早期切除/移植/消融(RFA/酒精)為「根治」;中期 TACE(非根治、姑息);晚期 sorafenib/lenvatinib 等標靶。移植 Milan 準則=單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移。","options":{"A":"正確:BCLC 分 0/A/B/C/D。","B":"正確:依腫瘤大小、Child score、體能狀態。","C":"★錯誤(本題答案):TACE 非根治性治療。","D":"正確:BCLC-C 用 sorafenib 等標靶。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"112020-32":{"quick":"錯在 D:多發性大腸癌肝轉移若「可切除」,手術仍能改善預後,非「只能化療」。","detail":{"background":"轉移性肝腫瘤:最常見來自大腸直腸癌;約 50–60% 大腸癌病人一生會出現肝轉移。化療進步+肝切除技術成熟使「肝切除成為可切除大腸癌肝轉移的標準治療」;即使多發,只要「可達 R0 切除、保留足夠肝臟」仍可手術(±術前化療轉化),預後可改善,非只能化療。","options":{"A":"正確:最常見來自大腸直腸癌。","B":"正確:約 50–60% 會肝轉移。","C":"正確:肝切除為標準治療。","D":"★錯誤(本題答案):可切除者手術仍改善預後。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"112080-35":{"quick":"最恰當為 B:腺瘤較易自發性出血且有惡變機會。","detail":{"background":"肝良性腫瘤:①肝細胞腺瘤(adenoma)—與口服避孕藥/雄性素相關,「易自發性出血、有惡性變化風險」,>5 cm 或有症狀/男性者建議切除;②局部結節增生(FNH)—中央疤痕、不出血、不惡變,多追蹤;③海綿狀血管瘤—最常見良性瘤,CT「周邊結節狀強化、向心填充」,通常追蹤,手術僅限 Kasabach-Merritt、破裂、明顯增大或症狀(非單純>5 cm);④單純囊腫—良性。","options":{"A":"錯:腺瘤(非 FNH)與口服避孕藥相關。","B":"★正確(本題答案):腺瘤易出血、可惡變。","C":"錯:MRI/CT 多可區分(FNH 有中央疤痕)。","D":"錯:FNH 多追蹤不需手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"113020-35":{"quick":"35F、肝 6 cm 腫瘤+腹腔積液(出血)+(口服避孕藥史)→A:肝細胞腺瘤(年輕女性、OCP、自發出血、惡變風險)。","detail":{"background":"肝良性腫瘤:①肝細胞腺瘤(adenoma)—與口服避孕藥/雄性素相關,「易自發性出血、有惡性變化風險」,>5 cm 或有症狀/男性者建議切除;②局部結節增生(FNH)—中央疤痕、不出血、不惡變,多追蹤;③海綿狀血管瘤—最常見良性瘤,CT「周邊結節狀強化、向心填充」,通常追蹤,手術僅限 Kasabach-Merritt、破裂、明顯增大或症狀(非單純>5 cm);④單純囊腫—良性。","options":{"A":"★正確(本題答案):肝細胞腺瘤(OCP、自發出血)。","B":"FNH 不出血。","C":"缺陷瘤少見。","D":"血管瘤雖周邊向心填充但極少自發破裂出血;本例臨床(年輕女/OCP/出血)指向腺瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"113070-72":{"quick":"浸潤性肝癌最常合併之影像為 A:門靜脈腫瘤栓塞。","detail":{"background":"肝細胞癌(HCC):最常見原發肝惡性瘤,好發東南亞/非洲、男性(2:1~8:1),危險因子 B/C 肝、肝硬化、黃麴毒素、酒精、NAFLD。多有肝硬化背景;AFP 可升高(但「正常不排除」)。三相(動態)CT:動脈相強化+靜脈/延遲相洗出(washout)為診斷特徵;浸潤型常合併「門靜脈腫瘤栓塞」。肉眼分型:結節型、巨塊型、瀰漫/浸潤型。預後不佳因子:多發、血管侵犯、肝功能差。治療依 BCLC(0/A/B/C/D,依腫瘤大小數目、Child-Pugh、體能狀態):早期切除/移植/消融(RFA/酒精)為「根治」;中期 TACE(非根治、姑息);晚期 sorafenib/lenvatinib 等標靶。移植 Milan 準則=單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移。","options":{"A":"★正確(本題答案):門靜脈腫瘤栓塞。","B":"腫瘤破裂出血非浸潤型最常見影像。","C":"肝動脈假性動脈瘤少見。","D":"主動脈旁淋巴轉移非最常見。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"114070-35":{"quick":"肝血管瘤開刀原因「不」包含 D:單純腫瘤>5 cm(大小本身非手術指徵)。","detail":{"background":"肝良性腫瘤:①肝細胞腺瘤(adenoma)—與口服避孕藥/雄性素相關,「易自發性出血、有惡性變化風險」,>5 cm 或有症狀/男性者建議切除;②局部結節增生(FNH)—中央疤痕、不出血、不惡變,多追蹤;③海綿狀血管瘤—最常見良性瘤,CT「周邊結節狀強化、向心填充」,通常追蹤,手術僅限 Kasabach-Merritt、破裂、明顯增大或症狀(非單純>5 cm);④單純囊腫—良性。","options":{"A":"是:Kasabach-Merritt 症候群(消耗性凝血病)。","B":"是:腫瘤破裂。","C":"是:明顯增大。","D":"★不包含(本題答案):單純>5 cm 非手術指徵。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"114070-36":{"quick":"非影響大腸癌肝轉移切除後存活之主因者為 C:原發腫瘤在直腸(位置非主要預後因子)。","detail":{"background":"大腸癌肝轉移肝切除後預後因子(如 Fong 臨床風險評分):CEA>200、肝轉移>5 cm、肝轉移數目>1、原發淋巴結陽性、同步(synchronous)轉移、無病間隔<12 個月。「原發腫瘤位於直腸或結腸」並非主要存活預後因子。","options":{"A":"是因子:CEA>200。","B":"是因子:肝轉移>5 cm。","C":"★不是(本題答案):原發位置(直腸)非主要預後因子。","D":"是因子:同步肝轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"115020-19":{"quick":"B 肝、GOT/GPT 正常、Tbil 0.8、PT 微延、alb 4.38→A:Child-Pugh A,安排腹腔鏡肝部分切除。","detail":{"background":"肝功能 Child-Pugh 分級(膽紅素、白蛋白、PT/INR、腹水、腦病變):本例膽紅素<2、白蛋白>3.5、PT 微延、無腹水/腦病=Child-Pugh A(肝儲備佳),適合手術切除(腹腔鏡肝部分切除)。MELD/ICG 進一步評估肝儲備。","options":{"A":"★正確(本題答案):Child-Pugh A,腹腔鏡肝部分切除。","B":"非 Child-Pugh B(肝功能良好)。","C":"非 Child-Pugh C。","D":"非 Child-Pugh B。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"115020-72":{"quick":"HCC 肝外腫瘤血管供應最常見為 C:右側橫膈膜下動脈(right inferior phrenic artery)。","detail":{"background":"肝癌(尤其位於肝包膜下/裸區或經多次 TACE 後)常發展「肝外側枝腫瘤血管供應」,最常見為「右下橫膈動脈(right inferior phrenic artery)」,其次網膜、腎上腺、肋間動脈等;栓塞時需一併處理以免殘留供血。","options":{"A":"內乳動脈較少。","B":"下腸繫膜動脈不供應肝。","C":"★正確(本題答案):右下橫膈動脈最常見。","D":"網膜動脈較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"101030-25":{"quick":"肝硬化大量肋膜積液一次引流 2200 mL 後突發呼吸困難→B:再膨脹肺水腫。","detail":{"background":"一次大量引流胸/腹水(>1–1.5 L)後肺快速再膨脹→微血管通透性增加、間質水腫=「再膨脹肺水腫(re-expansion pulmonary edema)」,表現引流後數分鐘至數小時呼吸困難、低血氧。故大量積液應「分次緩慢」引流。","options":{"A":"肺栓塞與引流時序不符。","B":"★正確(本題答案):再膨脹肺水腫。","C":"傷口痛不致呼吸困難低血氧。","D":"胸管插入肺實質會咳血/漏氣,非此表現。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102110-35":{"quick":"膽囊相鄰之 Couinaud 肝段為 B:segment IV 與 V(膽囊窩位於 S4b/S5 交界)。","detail":{"background":"膽囊位於肝臟臟面的膽囊窩,介於左內葉「segment IV(IVb)」與右前下葉「segment V」之間;此解剖關係是膽囊癌侵犯肝床時切除 IVb/V 的依據。","options":{"A":"segment IV+VI 不符。","B":"★正確(本題答案):segment IV 與 V。","C":"V+VII 不符。","D":"VI+VII 不符。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104090-32":{"quick":"較不可能為肝膿瘍細菌途徑者為 B:肝靜脈(出流靜脈,非感染入肝途徑)。","detail":{"background":"化膿性肝膿瘍:細菌進入肝臟途徑—膽道(現今「最常見」,如膽管炎/肝內結石,亞洲)、門靜脈(腹腔內感染如闌尾炎/憩室炎)、肝動脈(全身菌血症)、直接蔓延/外傷;「肝靜脈」是出流非感染途徑。多在「右肝」、常多菌(E. coli、Klebsiella;台灣高毒力 Klebsiella 肝膿瘍著名),血液培養陽性約 50%;超音波/CT 見「低迴音/低密度」病灶。治療:抗生素+經皮引流(±手術)。","options":{"A":"是途徑:膽道。","B":"★較不可能(本題答案):肝靜脈為出流,非感染途徑。","C":"是途徑:門靜脈(腹腔內感染)。","D":"是途徑:外傷/直接蔓延。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106020-33":{"quick":"正確為 A:大部分肝膿瘍發生在右肝。","detail":{"background":"化膿性肝膿瘍:細菌進入肝臟途徑—膽道(現今「最常見」,如膽管炎/肝內結石,亞洲)、門靜脈(腹腔內感染如闌尾炎/憩室炎)、肝動脈(全身菌血症)、直接蔓延/外傷;「肝靜脈」是出流非感染途徑。多在「右肝」、常多菌(E. coli、Klebsiella;台灣高毒力 Klebsiella 肝膿瘍著名),血液培養陽性約 50%;超音波/CT 見「低迴音/低密度」病灶。治療:抗生素+經皮引流(±手術)。","options":{"A":"★正確(本題答案):多在右肝。","B":"錯:常為多菌。","C":"錯:最常見為 E. coli/Klebsiella,非金黃葡萄球菌。","D":"錯:血培養陽性約 50%,非 80–90%。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106080-23":{"quick":"CT 病灶位置(Couinaud)→B:第 IV 分葉(左內葉)。","detail":{"background":"Couinaud 分八段:S1 尾葉、S2/S3 左外葉、S4 左內葉、S5/S8 右前葉、S6/S7 右後葉。本題腫瘤位於左內葉 segment IV。","options":{"A":"S2 左外上。","B":"★正確(本題答案):segment IV。","C":"S6 右後下。","D":"S8 右前上。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-34":{"quick":"Pringle maneuver「未」包含 A:總肝動脈(common hepatic artery)。","detail":{"background":"Pringle 手法:夾住「肝十二指腸韌帶」以暫時阻斷入肝血流,內含「門靜脈、固有肝動脈(hepatic artery proper)、總膽管」。「總肝動脈」位於更近端(在分出胃十二指腸動脈之前),不在肝十二指腸韌帶內,故不被夾住。","options":{"A":"★未包含(本題答案):總肝動脈在更近端。","B":"包含:門靜脈。","C":"包含:總膽管。","D":"包含:固有肝動脈。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108080-26":{"quick":"錯在 B:肝性腦病變應「限制/適量蛋白」,「多吃高蛋白」會增加氨、加重腦病變。","detail":{"background":"肝性腦病變:肝衰竭致氨等毒素累積。臨床:意識/行為改變、撲翼樣震顫(flapping tremor/asterixis);誘因含胃腸道出血(蛋白負荷)、感染、便秘、電解質異常、利尿過度。處置:lactulose、rifaximin、矯正誘因;急性期「避免過量蛋白」(非多吃高蛋白)。","options":{"A":"正確:行為改變/撲翼震顫。","B":"★錯誤(本題答案):應限制蛋白,非多吃高蛋白。","C":"正確:胃腸道出血常誘發。","D":"正確:血氨常升高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108080-33":{"quick":"錯在 B:預防食道靜脈曲張(出血)首選「非選擇性 β-blocker」,非 α-blocker。","detail":{"background":"門脈高壓:肝硬化致門靜脈壓升高→「門體側枝」靜脈曲張:食道胃靜脈曲張、臍周/上腹靜脈(caput medusae)、痔瘡靜脈叢;脾腫大、腹水。「精索靜脈曲張(varicocele)」屬睪丸靜脈,與門脈高壓無關。食道靜脈曲張:一級預防/再出血預防首選「非選擇性 β-blocker(propranolol/nadolol)」±內視鏡結紮;急性出血→藥物(somatostatin/terlipressin)+內視鏡;失敗→TIPS、遠端脾腎分流(Warren)、肝移植。","options":{"A":"正確:TIPS 為門體分流(降門脈壓)。","B":"★錯誤(本題答案):首選非選擇性 β-blocker,非 α-blocker。","C":"正確:末期肝衰竭需考慮肝移植。","D":"正確:內視鏡失敗/胃靜脈瘤/TIPS 失敗需外科介入。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-35":{"quick":"依 Child-Pugh 計分(膽紅素 2.52→2 分、白蛋白 4.3→1 分、PT、無腹水/腦病各 1 分)→總分約 B:6 分(Child-Pugh A)。","detail":{"background":"Child-Pugh 分級五項各 1–3 分:總膽紅素(<2/2–3/>3)、白蛋白(>3.5/2.8–3.5/<2.8)、PT 延長(或 INR)、腹水(無/輕/中重)、肝性腦病(無/I-II/III-IV)。本例膽紅素 2.52(2 分)、白蛋白 4.3(1 分)、無腹水/腦病(各 1 分)、PT 輕度(1 分)≈ 6 分,屬 Child-Pugh A。","options":{"A":"5 分偏低。","B":"★正確(本題答案):約 6 分(Child-Pugh A)。","C":"7 分偏高。","D":"8 分偏高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-36":{"quick":"現今肝內細菌性膿瘍最常見原因為 C:膽道感染。","detail":{"background":"化膿性肝膿瘍:細菌進入肝臟途徑—膽道(現今「最常見」,如膽管炎/肝內結石,亞洲)、門靜脈(腹腔內感染如闌尾炎/憩室炎)、肝動脈(全身菌血症)、直接蔓延/外傷;「肝靜脈」是出流非感染途徑。多在「右肝」、常多菌(E. coli、Klebsiella;台灣高毒力 Klebsiella 肝膿瘍著名),血液培養陽性約 50%;超音波/CT 見「低迴音/低密度」病灶。治療:抗生素+經皮引流(±手術)。","options":{"A":"闌尾炎(門脈途徑)現今較少。","B":"腸缺血非最常見。","C":"★正確(本題答案):膽道感染。","D":"外傷較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-31":{"quick":"與門脈高壓最無關者為 B:精索靜脈曲張(睪丸靜脈,非門體側枝)。","detail":{"background":"門脈高壓:肝硬化致門靜脈壓升高→「門體側枝」靜脈曲張:食道胃靜脈曲張、臍周/上腹靜脈(caput medusae)、痔瘡靜脈叢;脾腫大、腹水。「精索靜脈曲張(varicocele)」屬睪丸靜脈,與門脈高壓無關。食道靜脈曲張:一級預防/再出血預防首選「非選擇性 β-blocker(propranolol/nadolol)」±內視鏡結紮;急性出血→藥物(somatostatin/terlipressin)+內視鏡;失敗→TIPS、遠端脾腎分流(Warren)、肝移植。","options":{"A":"相關:食道胃靜脈曲張。","B":"★最無關(本題答案):精索靜脈曲張。","C":"相關:上腹/臍周靜脈曲張。","D":"相關:痔瘡靜脈叢。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-28":{"quick":"不是化膿性肝膿瘍致病原因者為 D:腫瘤內細胞壞死。","detail":{"background":"化膿性肝膿瘍:細菌進入肝臟途徑—膽道(現今「最常見」,如膽管炎/肝內結石,亞洲)、門靜脈(腹腔內感染如闌尾炎/憩室炎)、肝動脈(全身菌血症)、直接蔓延/外傷;「肝靜脈」是出流非感染途徑。多在「右肝」、常多菌(E. coli、Klebsiella;台灣高毒力 Klebsiella 肝膿瘍著名),血液培養陽性約 50%;超音波/CT 見「低迴音/低密度」病灶。治療:抗生素+經皮引流(±手術)。","options":{"A":"是:膽道疾病。","B":"是:經門靜脈血流感染。","C":"是:經肝動脈(菌血症)。","D":"★不是(本題答案):腫瘤壞死非感染途徑。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-29":{"quick":"不是肝切除術後照料事項者為 A:腹水流失嚴重時仍「應限制」水分及鹽分(以控制腹水),非不限制。","detail":{"background":"肝切除術後照料:控制腹水須「限制水分與鹽分」+視情況補白蛋白/新鮮冷凍血漿;術後數小時體溫偏低用加溫床;肝切除後肝醣儲存減少、術後易低血糖須監測維持。故「腹水流失嚴重不宜限制水鹽」之敘述錯誤。","options":{"A":"★不是(本題答案):仍應限制水鹽以控制腹水。","B":"是:補白蛋白/FFP。","C":"是:加溫維持體溫。","D":"是:注意維持血糖。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111020-40":{"quick":"正確為 B:西方主要膽道惡性阻塞合併感染、亞洲以肝內結石之膽道感染為最主要原因。","detail":{"background":"化膿性肝膿瘍:細菌進入肝臟途徑—膽道(現今「最常見」,如膽管炎/肝內結石,亞洲)、門靜脈(腹腔內感染如闌尾炎/憩室炎)、肝動脈(全身菌血症)、直接蔓延/外傷;「肝靜脈」是出流非感染途徑。多在「右肝」、常多菌(E. coli、Klebsiella;台灣高毒力 Klebsiella 肝膿瘍著名),血液培養陽性約 50%;超音波/CT 見「低迴音/低密度」病灶。治療:抗生素+經皮引流(±手術)。","options":{"A":"錯:最常見為膽道/門脈,非肝動脈。","B":"★正確(本題答案):西方膽道惡性、亞洲肝內結石。","C":"錯:外傷膿瘍非 3 天內突發高燒之描述。","D":"錯:膿瘍超音波呈「低迴音」,非高迴音。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111020-43":{"quick":"最不適當為 C:脾臟切除無法降低門脈壓/治療靜脈曲張出血。","detail":{"background":"門脈高壓:肝硬化致門靜脈壓升高→「門體側枝」靜脈曲張:食道胃靜脈曲張、臍周/上腹靜脈(caput medusae)、痔瘡靜脈叢;脾腫大、腹水。「精索靜脈曲張(varicocele)」屬睪丸靜脈,與門脈高壓無關。食道靜脈曲張:一級預防/再出血預防首選「非選擇性 β-blocker(propranolol/nadolol)」±內視鏡結紮;急性出血→藥物(somatostatin/terlipressin)+內視鏡;失敗→TIPS、遠端脾腎分流(Warren)、肝移植。","options":{"A":"適當:TIPS 門體分流降壓。","B":"適當:遠端脾腎分流(Warren)。","C":"★最不適當(本題答案):單純脾切除無降門脈壓作用。","D":"適當:末期肝病肝移植。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-33":{"quick":"正確為 D:肝星狀(Ito)細胞位於 Disse 腔,主要功能之一為儲存維生素 A(活化後致纖維化)。","detail":{"background":"肝臟小葉:約 6 個門脈三合體(門靜脈、肝動脈、膽管)圍繞一中央靜脈;分三帶,zone 3(中央靜脈周圍)最缺氧、最易缺血/毒素壞死;肝竇內皮與肝細胞間為 Disse 腔(物質擴散交換);肝星狀(Ito)細胞位於 Disse 腔,儲存維生素 A,活化後分泌膠原致纖維化。","options":{"A":"錯:約 6 個門脈三合體圍繞中央靜脈,非 8–12。","B":"錯:zone 3(中央靜脈周圍)最缺氧易壞死,非 zone 1。","C":"錯:Disse 腔允許物質擴散交換。","D":"★正確(本題答案):Ito 細胞儲存維生素 A。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-34":{"quick":"最恰當為 D:Cantlie 線=膽囊窩至下腔靜脈連線(肝臟功能性左右分界,即中肝靜脈走向)。","detail":{"background":"肝臟功能性左右分界=「中肝靜脈/Cantlie 線」(膽囊窩至下腔靜脈連線),非鐮狀韌帶(鐮狀韌帶分的是「解剖」左外葉與內葉)。肝段以「肝靜脈」分區、門脈分支供應。尾葉(S1)自成一區、引流直接入下腔靜脈。","options":{"A":"錯:鐮狀韌帶分的是解剖左外葉與內葉,非功能左右肝。","B":"錯:尾葉自成一區,非屬右肝。","C":"錯:肝部(sector)以「肝靜脈」為界,非肝動脈。","D":"★正確(本題答案):Cantlie 線=膽囊窩至下腔靜脈。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-76":{"quick":"錯在 C:alanine 被肝臟用於「糖質新生」;腸道與免疫細胞的主要能量來源是「glutamine」,非 alanine。","detail":{"background":"手術後壓力反應:能量消耗、cortisol/epinephrine/glucagon 上升、分解代謝。胺基酸代謝:肌肉釋出 alanine→肝臟糖質新生;「glutamine」才是腸黏膜與免疫細胞的主要燃料。術後因脂肪利用增加,呼吸商(RQ)下降;部分術後病人能量消耗可低於基礎代謝率約 20%。","options":{"A":"正確:術後能量消耗可比基礎低約 20%。","B":"正確:cortisol/epinephrine/glucagon 上升。","C":"★錯誤(本題答案):腸道/免疫主要燃料為 glutamine,非 alanine。","D":"正確:呼吸商下降。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-6":{"quick":"不是 MELD 參數者為 B:白血球計數。","detail":{"background":"MELD 分數(末期肝病、肝移植排序、預測 3 個月死亡)參數=「總膽紅素、肌酸酐、INR」(±血鈉=MELD-Na);「不」含白蛋白與白血球。Child-Pugh 則用膽紅素、白蛋白、PT/INR、腹水、肝性腦病(不用 PTT)。","options":{"A":"是:總膽紅素。","B":"★不是(本題答案):白血球計數。","C":"是:肌酸酐。","D":"是:INR。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-36":{"quick":"最恰當為 B:Pringle 手法一般「夾 15 分、放鬆 5 分」(間歇)。","detail":{"background":"Pringle 手法:夾肝十二指腸韌帶(門靜脈+固有肝動脈+總膽管)減少入肝出血;常「間歇」(夾約 15 分、放鬆 5 分)以減少缺血再灌注傷害(優於持續夾);肝功能差者宜選擇性半肝阻斷。","options":{"A":"錯:夾的是門靜脈+固有肝動脈+總膽管(非肝靜脈)。","B":"★正確(本題答案):間歇夾 15 分、放鬆 5 分。","C":"錯:肝功能差者宜選擇性半肝阻斷。","D":"錯:間歇較持續夾減少缺血再灌注傷害。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113020-32":{"quick":"錯在 D:肝硬化為「低」平均動脈壓(全身血管擴張),肌肉痙攣與腹水、「低」平均動脈壓、高血漿腎素活性相關。","detail":{"background":"肝硬化臨床表徵:蜘蛛血管瘤/手掌紅斑(雌激素代謝障礙)、Cruveilhier-Baumgarten 雜音(臍靜脈再通側枝)、高動力循環(心輸出↑、心跳↑、周邊阻力↓→「低平均動脈壓」)、腹水、肝性腦病。肌肉痙攣與腹水、低 MAP、高血漿腎素活性相關。","options":{"A":"正確:蜘蛛血管瘤/手掌紅斑與性荷爾蒙代謝有關。","B":"正確:Cruveilhier-Baumgarten 雜音。","C":"正確:高動力循環(心輸出增/阻力降)。","D":"★錯誤(本題答案):應為「低」平均動脈壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113020-73":{"quick":"Budd-Chiari 症候群為 D:肝靜脈(肝靜脈流出道)阻塞。","detail":{"background":"Budd-Chiari 症候群:肝靜脈/肝後段下腔靜脈「流出道阻塞」(常因血栓性體質、骨髓增生疾病、腫瘤壓迫),致肝充血腫大、腹水、腹痛;CT 見尾葉肥大、不均勻強化。治療:抗凝、血管成形/支架、TIPS、嚴重者肝移植。","options":{"A":"非膽管阻塞。","B":"門靜脈阻塞為門脈高壓另一型。","C":"非肝動脈。","D":"★正確(本題答案):肝靜脈流出道阻塞。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-35":{"quick":"錯在 D:化膿性肝膿瘍多需「經皮導管引流」(對多數病患有幫助),非僅藥物即可改善。","detail":{"background":"化膿性肝膿瘍:好發右肝、單/多發、最常見革蘭氏陰性菌(E. coli/Klebsiella);CT/MRI 敏感;經驗抗生素須涵蓋革蘭氏陰性+厭氧菌,經皮抽吸培養定菌。治療為抗生素「+經皮導管引流」(對多數病患有幫助),大膿瘍單靠藥物常不足。","options":{"A":"正確:右肝多、最常見 G(−)菌。","B":"正確:CT/MRI 敏感。","C":"正確:抗生素涵蓋 G(−)+厭氧、經皮抽吸培養。","D":"★錯誤(本題答案):多數需經皮引流,非僅藥物。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-31":{"quick":"錯在 D:酒精性肝硬化門脈血流阻力發生在「竇狀(sinusoidal)」層次,非 presinusoidal(presinusoidal 見於血吸蟲病/PBC)。","detail":{"background":"門脈高壓:定義為「肝靜脈壓力梯度(HVPG)>5 mmHg」(>10 有臨床意義、>12 易出血)。側枝:冠狀靜脈/胃短靜脈→奇靜脈(食道胃靜脈曲張);臍靜脈再通(left portal→腹壁靜脈)→caput medusae;痔靜脈叢。阻力部位:酒精性/病毒性肝硬化在「竇狀/竇後」;血吸蟲、PBC 在 presinusoidal。","options":{"A":"正確:HVPG>5 mmHg。","B":"正確:冠狀/胃短靜脈匯入奇靜脈。","C":"正確:caput medusae 為臍靜脈再通。","D":"★錯誤(本題答案):酒精性肝硬化阻力在竇狀,非 presinusoidal。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-34":{"quick":"不是 Child-Pugh 評估項目者為 C:部分凝血活酶時間(PTT)。Child-Pugh 用 PT/INR、膽紅素、白蛋白、腹水、肝性腦病。","detail":{"background":"MELD 分數(末期肝病、肝移植排序、預測 3 個月死亡)參數=「總膽紅素、肌酸酐、INR」(±血鈉=MELD-Na);「不」含白蛋白與白血球。Child-Pugh 則用膽紅素、白蛋白、PT/INR、腹水、肝性腦病(不用 PTT)。","options":{"A":"是:膽紅素。","B":"是:白蛋白。","C":"★不是(本題答案):PTT(用 PT/INR)。","D":"是:腹水。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114070-32":{"quick":"錯在 D:食道靜脈曲張出血「不」以血管攝影栓塞止血(屬靜脈/門脈系統);失敗者用 TIPS、外科分流、氣球填塞、肝移植。","detail":{"background":"食道靜脈曲張出血處置:先穩定生命徵象/輸液輸血、藥物(octreotide/somatostatin/terlipressin/vasopressin)+內視鏡結紮/硬化;暫時用氣球填塞(Sengstaken-Blakemore);持續/大量出血→TIPS 或外科分流;末期→肝移植。「動脈血管攝影栓塞」用於動脈性出血,不適用門脈系統的靜脈曲張。","options":{"A":"正確:首要維持生命徵象。","B":"正確:octreotide/vasopressin 控制出血。","C":"正確:大量出血可外科分流或 TIPS。","D":"★錯誤(本題答案):靜脈曲張不以動脈栓塞止血。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114070-37":{"quick":"正確為 D(1245):功能左右肝分界=中肝靜脈(1)、左右「葉」分界=Cantlie 線(2)…依本題答案為 1、2、4、5。","detail":{"background":"肝臟功能性左右分界=「中肝靜脈/Cantlie 線」(膽囊窩至下腔靜脈連線),非鐮狀韌帶(鐮狀韌帶分的是「解剖」左外葉與內葉)。肝段以「肝靜脈」分區、門脈分支供應。尾葉(S1)自成一區、引流直接入下腔靜脈。","options":{"A":"2345:漏 1。","B":"1345:漏 2。","C":"1234:漏 5。","D":"★正確(本題答案):1、2、4、5。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-18":{"quick":"錯在 A:肝臟切除中,機械手臂相較腹腔鏡「並非」更省時/失血更少(機械手臂常較耗時、費用較高)。","detail":{"background":"微創肝切除:腹腔鏡與機械手臂適應症大致相同、併發症與轉開腹率無顯著差異,皆已成為「肝臟邊緣病灶切除」的標準。機械手臂提供更佳靈活度但「手術時間常較長、費用較高」,並非更省時、失血更少。","options":{"A":"★錯誤(本題答案):機械手臂非更省時/失血更少。","B":"正確:適應症大致相同。","C":"正確:併發症/轉開腹率無顯著差異。","D":"正確:微創為肝邊緣病灶切除標準。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-23":{"quick":"不是 MELD 參數者為 D:血清白蛋白(MELD=肌酸酐+總膽紅素+INR;白蛋白屬 Child-Pugh)。","detail":{"background":"MELD 分數(末期肝病、肝移植排序、預測 3 個月死亡)參數=「總膽紅素、肌酸酐、INR」(±血鈉=MELD-Na);「不」含白蛋白與白血球。Child-Pugh 則用膽紅素、白蛋白、PT/INR、腹水、肝性腦病(不用 PTT)。","options":{"A":"是:肌酸酐。","B":"是:總膽紅素。","C":"是:INR。","D":"★不是(本題答案):白蛋白(屬 Child-Pugh)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-55":{"quick":"正確為 D:懷孕病人需手術應儘量安排在「妊娠中期(second trimester)」(致畸/早產風險較低)。","detail":{"background":"肝膽微創手術注意:非所有切肝都需 Pringle;Pringle 應「間歇」非全程持續;氣腹中疑「氣體栓塞(gas embolism)」應採「頭低腳高、左側臥(Durant 姿)」並由中央靜脈導管抽出右心室氣體(非頭高右躺);懷孕病人手術宜安排「妊娠中期」最安全。","options":{"A":"錯:非所有切肝都需 Pringle。","B":"錯:Pringle 應間歇,非全程持續。","C":"錯:氣體栓塞應頭低左側臥(非頭高)。","D":"★正確(本題答案):懷孕手術宜安排妊娠中期。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"101030-49":{"quick":"胰腎移植後、近期高劑量類固醇、發燒乾咳+兩側下肺浸潤→D:巨細胞病毒(CMV)肺炎。","detail":{"background":"器官移植後免疫抑制下感染依時序:早期(<1 月)手術相關/細菌;中期(1–6 月)機會性感染—「CMV」(發燒、乾咳、間質性肺炎、白血球低)、PCP、麴菌;晚期社區性。本例 SPK 後加重免疫抑制(高劑量類固醇治排斥)→ CMV 肺炎最可能。","options":{"A":"細菌性肺炎多葉狀實質化。","B":"黴菌性多有特定危險因子。","C":"心衰竭肺水腫非發燒乾咳。","D":"★正確(本題答案):CMV 肺炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"102030-9":{"quick":"非肝移植適應症者為 D:大腸癌合併肝轉移(肝外惡性/轉移為禁忌)。","detail":{"background":"肝臟移植適應症:末期肝硬化(B/C 肝、酒精、PBC/PSC、自體免疫)、急性肝衰竭(acetaminophen 中毒、猛爆性肝炎)、代謝性肝病、膽道閉鎖/Alagille、肝腎症候群、符合準則的 HCC(Milan:單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移;UCSF 較寬:單顆≤6.5 cm)。禁忌:肝外惡性/轉移、大血管(門脈)腫瘤侵犯、活動性肝外感染、無法戒除之物質濫用、嚴重心肺疾病;「心衰竭引起的心因性肝硬化」應治心臟非肝移植。CTP-A(肝功能好)的小 HCC 優先「切除」而非移植。","options":{"A":"是:原發性硬化性膽管炎。","B":"是:前次肝移植失敗。","C":"是:Alagille 症候群。","D":"★非(本題答案):大腸癌肝轉移(轉移性惡性,禁忌)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"102110-38":{"quick":"錯在 D:接受遠端脾腎分流(Warren)後「仍可」再接受肝移植(選擇性分流保留門脈血流,不妨礙日後移植)。","detail":{"background":"遠端脾腎分流(Warren shunt):將遠端脾靜脈接左腎靜脈,選擇性減壓胃食道靜脈曲張、「保留門脈向肝血流」;可能加重腹水(不宜用於合併頑固腹水者);與門腔分流再出血率相近;因保留門脈血流,日後仍可肝移植。","options":{"A":"正確:遠端脾靜脈接左腎靜脈,保留門脈血流。","B":"正確:可能加重腹水,不宜合併腹水者。","C":"正確:再出血率與門腔分流相近。","D":"★錯誤(本題答案):術後仍可接受肝移植。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"108030-33":{"quick":"錯在 A:最常需脾切除的原因是「外傷/手術中醫源性脾損傷」,非自發性血小板低下紫斑症(ITP)。","detail":{"background":"脾臟:最大淋巴器官;脾切除「最常見原因為外傷/手術中醫源性損傷」(非 ITP)。脾切除後對「莢膜菌(肺炎鏈球菌、流感嗜血桿菌、腦膜炎雙球菌)」感染風險高→術前 2 週應打疫苗,兒童併發猛爆型脾切除後感染(OPSI)風險較高。腹腔鏡脾切除為首選,但仍需考慮門脈高壓(出血風險)。肝硬化伴脾亢血小板低下「不需」常規切脾。","options":{"A":"★錯誤(本題答案):最常見原因為外傷/醫源性損傷,非 ITP。","B":"正確:ITP 脾切除預後佳。","C":"正確:術前疫苗、<5% 術後嚴重感染(OPSI)。","D":"正確:術後常見肺塌陷、出血、胰臟炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"110020-33":{"quick":"胰臟移植後最常見死亡原因為 A:心血管疾病。","detail":{"background":"胰臟移植:用於「第一型糖尿病」(重建胰島素分泌),最常與腎臟同時移植(SPK,合併尿毒症者)—移植量最大、整體預後最好。胰液引流分膀胱與腸道,現以「腸道引流」較普遍。最常見手術併發症為「移植物血管栓塞」;最常見長期死亡原因為「心血管疾病」。","options":{"A":"★正確(本題答案):心血管疾病。","B":"感染為早期風險但非最常見長期死因。","C":"惡性腫瘤較少。","D":"器官排斥非最常見死因。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"110080-35":{"quick":"胰臟移植適應症為 C:第一型糖尿病合併腎衰竭(SPK)。","detail":{"background":"胰臟移植:用於「第一型糖尿病」(重建胰島素分泌),最常與腎臟同時移植(SPK,合併尿毒症者)—移植量最大、整體預後最好。胰液引流分膀胱與腸道,現以「腸道引流」較普遍。最常見手術併發症為「移植物血管栓塞」;最常見長期死亡原因為「心血管疾病」。","options":{"A":"血糖穩定的 T1DM 不需移植。","B":"第二型糖尿病非典型適應症。","C":"★正確(本題答案):T1DM+腎衰竭(SPK)。","D":"尚無合併症者不需。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"111020-5":{"quick":"非肝移植適應症者為 D:心衰竭引起的肝硬化(心因性,應治心臟)。","detail":{"background":"肝臟移植適應症:末期肝硬化(B/C 肝、酒精、PBC/PSC、自體免疫)、急性肝衰竭(acetaminophen 中毒、猛爆性肝炎)、代謝性肝病、膽道閉鎖/Alagille、肝腎症候群、符合準則的 HCC(Milan:單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移;UCSF 較寬:單顆≤6.5 cm)。禁忌:肝外惡性/轉移、大血管(門脈)腫瘤侵犯、活動性肝外感染、無法戒除之物質濫用、嚴重心肺疾病;「心衰竭引起的心因性肝硬化」應治心臟非肝移植。CTP-A(肝功能好)的小 HCC 優先「切除」而非移植。","options":{"A":"是:原發性膽道性肝硬化。","B":"是:符合準則的肝細胞癌。","C":"是:膽道閉鎖。","D":"★非(本題答案):心衰竭引起的肝硬化。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"111080-31":{"quick":"錯在 A:嚴重肝硬化伴血小板低下(脾亢)「不需」常規切脾來提升血小板;應治療肝病本身。","detail":{"background":"脾臟:最大淋巴器官;脾切除「最常見原因為外傷/手術中醫源性損傷」(非 ITP)。脾切除後對「莢膜菌(肺炎鏈球菌、流感嗜血桿菌、腦膜炎雙球菌)」感染風險高→術前 2 週應打疫苗,兒童併發猛爆型脾切除後感染(OPSI)風險較高。腹腔鏡脾切除為首選,但仍需考慮門脈高壓(出血風險)。肝硬化伴脾亢血小板低下「不需」常規切脾。","options":{"A":"★錯誤(本題答案):肝硬化脾亢不需常規切脾。","B":"正確:外傷/醫源性損傷為最常見原因。","C":"正確:術後莢膜菌感染風險高。","D":"正確:兒童 OPSI 風險較高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"112020-31":{"quick":"較不建議「移植」者為 D:CTP-5(肝功能良好 Child-A)、單顆 2 cm 小 HCC—此類應優先「手術切除」而非移植。","detail":{"background":"肝臟移植適應症:末期肝硬化(B/C 肝、酒精、PBC/PSC、自體免疫)、急性肝衰竭(acetaminophen 中毒、猛爆性肝炎)、代謝性肝病、膽道閉鎖/Alagille、肝腎症候群、符合準則的 HCC(Milan:單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移;UCSF 較寬:單顆≤6.5 cm)。禁忌:肝外惡性/轉移、大血管(門脈)腫瘤侵犯、活動性肝外感染、無法戒除之物質濫用、嚴重心肺疾病;「心衰竭引起的心因性肝硬化」應治心臟非肝移植。CTP-A(肝功能好)的小 HCC 優先「切除」而非移植。","options":{"A":"CTP-8、符合 Milan,適合移植。","B":"CTP-10、單顆 4.5 cm(≤5),適合移植。","C":"CTP-7、三顆各≤3 cm,適合移植。","D":"★較不建議移植(本題答案):肝功能好的小 HCC 優先切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"112020-33":{"quick":"移植比例最高、整體預後最好者為 A:同時胰腎移植(SPK)。","detail":{"background":"胰臟移植:用於「第一型糖尿病」(重建胰島素分泌),最常與腎臟同時移植(SPK,合併尿毒症者)—移植量最大、整體預後最好。胰液引流分膀胱與腸道,現以「腸道引流」較普遍。最常見手術併發症為「移植物血管栓塞」;最常見長期死亡原因為「心血管疾病」。","options":{"A":"★正確(本題答案):SPK 移植量最大、預後最好。","B":"腎後胰移植(PAK)次之。","C":"單獨胰移植(PTA)較少。","D":"胰先腎後罕見。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"112020-54":{"quick":"錯在 C:腹腔鏡脾切除「仍需」考慮門靜脈高壓(脾靜脈/側枝出血風險),非不需考慮。","detail":{"background":"脾臟:最大淋巴器官;脾切除「最常見原因為外傷/手術中醫源性損傷」(非 ITP)。脾切除後對「莢膜菌(肺炎鏈球菌、流感嗜血桿菌、腦膜炎雙球菌)」感染風險高→術前 2 週應打疫苗,兒童併發猛爆型脾切除後感染(OPSI)風險較高。腹腔鏡脾切除為首選,但仍需考慮門脈高壓(出血風險)。肝硬化伴脾亢血小板低下「不需」常規切脾。","options":{"A":"正確:腹腔鏡脾切除為首選、安全性相近。","B":"正確:約 90% 可完成,轉開腹主因術中出血。","C":"★錯誤(本題答案):仍需考慮門靜脈高壓。","D":"正確:可仰臥或側臥施行。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"113020-5":{"quick":"不是米蘭準則者為 A:單顆腫瘤直徑「≤6.5 cm」(此為 UCSF 準則;米蘭為單顆≤5 cm)。","detail":{"background":"肝臟移植適應症:末期肝硬化(B/C 肝、酒精、PBC/PSC、自體免疫)、急性肝衰竭(acetaminophen 中毒、猛爆性肝炎)、代謝性肝病、膽道閉鎖/Alagille、肝腎症候群、符合準則的 HCC(Milan:單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移;UCSF 較寬:單顆≤6.5 cm)。禁忌:肝外惡性/轉移、大血管(門脈)腫瘤侵犯、活動性肝外感染、無法戒除之物質濫用、嚴重心肺疾病;「心衰竭引起的心因性肝硬化」應治心臟非肝移植。CTP-A(肝功能好)的小 HCC 優先「切除」而非移植。","options":{"A":"★非(本題答案):≤6.5 cm 是 UCSF,非米蘭(米蘭≤5 cm)。","B":"是:2–3 顆各≤3 cm。","C":"是:無肝內血管侵犯。","D":"是:無肝外轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"113020-6":{"quick":"正確為 C:胰臟移植最常見手術併發症為「移植物血管栓塞」。","detail":{"background":"胰臟移植:用於「第一型糖尿病」(重建胰島素分泌),最常與腎臟同時移植(SPK,合併尿毒症者)—移植量最大、整體預後最好。胰液引流分膀胱與腸道,現以「腸道引流」較普遍。最常見手術併發症為「移植物血管栓塞」;最常見長期死亡原因為「心血管疾病」。","options":{"A":"錯:胰臟移植適用 T1DM。","B":"錯:現以「腸道引流」較普遍(非膀胱)。","C":"★正確(本題答案):移植物血管栓塞最常見。","D":"錯:最常見長期死因為心血管疾病。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"114020-5":{"quick":"錯在 D:移植後發生癌症應「減量」免疫抑制劑(±改 mTOR 抑制劑),非「立即完全停止」(會致排斥/移植物喪失)。","detail":{"background":"移植後癌症:免疫抑制下風險升高,最常見「皮膚癌」;移植後肝癌與 B/C 肝相關;卡波西氏肉瘤與 HHV-8 相關;移植後淋巴增生疾病(PTLD)與 EBV 相關。處置:「減量」免疫抑制(必要時換 mTOR 抑制劑 everolimus/sirolimus 兼具抗腫瘤),而非一律立即完全停藥。","options":{"A":"正確:最常見為皮膚癌。","B":"正確:肝癌與 B/C 肝相關。","C":"正確:Kaposi 肉瘤與 HHV-8 相關。","D":"★錯誤(本題答案):應減量而非立即完全停免疫抑制劑。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"114070-3":{"quick":"非肝移植適應症者為 D:小型 HCC「合併門脈分枝腫瘤血栓」(大血管侵犯=禁忌,超出 Milan)。","detail":{"background":"肝臟移植適應症:末期肝硬化(B/C 肝、酒精、PBC/PSC、自體免疫)、急性肝衰竭(acetaminophen 中毒、猛爆性肝炎)、代謝性肝病、膽道閉鎖/Alagille、肝腎症候群、符合準則的 HCC(Milan:單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移;UCSF 較寬:單顆≤6.5 cm)。禁忌:肝外惡性/轉移、大血管(門脈)腫瘤侵犯、活動性肝外感染、無法戒除之物質濫用、嚴重心肺疾病;「心衰竭引起的心因性肝硬化」應治心臟非肝移植。CTP-A(肝功能好)的小 HCC 優先「切除」而非移植。","options":{"A":"是:acetaminophen 致急性肝衰竭。","B":"是:慢性 B 肝急性發作肝衰竭。","C":"是:C 肝肝硬化+腹水+肝腎症候群。","D":"★非(本題答案):合併門脈腫瘤血栓為禁忌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"101030-3":{"quick":"鈍性腹部外傷最常受傷器官為 B:脾臟。","detail":{"background":"腹部鈍傷最常受傷器官為「脾臟」(其次肝);穿刺/槍傷最常傷「小腸」。實質臟器(肝/脾)鈍傷血流動力穩定者多採「非手術治療(nonoperative)」。所有創傷死亡中「腦部損傷」占>50%。出血分級(ATLS):Class III=失血 30–40%、心搏>120、血壓下降、Base deficit 增大。大量輸血比例 紅血球:血漿:血小板=1:1:1;緊急可用「O 型紅血球(O-Rh 陰性為萬用紅血球)」、緊急血漿用「AB 型(萬用血漿)」(O 型血漿含抗 A/抗 B 抗體,非萬用)。","options":{"A":"肝臟次之。","B":"★正確(本題答案):脾臟。","C":"胰臟較少。","D":"腎臟較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"102110-8":{"quick":"創傷死亡中占>50% 者為 C:創傷性腦部損傷。","detail":{"background":"腹部鈍傷最常受傷器官為「脾臟」(其次肝);穿刺/槍傷最常傷「小腸」。實質臟器(肝/脾)鈍傷血流動力穩定者多採「非手術治療(nonoperative)」。所有創傷死亡中「腦部損傷」占>50%。出血分級(ATLS):Class III=失血 30–40%、心搏>120、血壓下降、Base deficit 增大。大量輸血比例 紅血球:血漿:血小板=1:1:1;緊急可用「O 型紅血球(O-Rh 陰性為萬用紅血球)」、緊急血漿用「AB 型(萬用血漿)」(O 型血漿含抗 A/抗 B 抗體,非萬用)。","options":{"A":"肺挫傷非過半死因。","B":"肝撕裂非過半。","C":"★正確(本題答案):腦部損傷占>50%。","D":"心臟挫傷較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"105020-1":{"quick":"腹部鈍傷最常受傷腹腔器官為 C:脾臟。","detail":{"background":"腹部鈍傷最常受傷器官為「脾臟」(其次肝);穿刺/槍傷最常傷「小腸」。實質臟器(肝/脾)鈍傷血流動力穩定者多採「非手術治療(nonoperative)」。所有創傷死亡中「腦部損傷」占>50%。出血分級(ATLS):Class III=失血 30–40%、心搏>120、血壓下降、Base deficit 增大。大量輸血比例 紅血球:血漿:血小板=1:1:1;緊急可用「O 型紅血球(O-Rh 陰性為萬用紅血球)」、緊急血漿用「AB 型(萬用血漿)」(O 型血漿含抗 A/抗 B 抗體,非萬用)。","options":{"A":"肝臟次之。","B":"腎臟較少。","C":"★正確(本題答案):脾臟。","D":"胰臟較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"105020-7":{"quick":"單獨肝裂傷非手術治療「不」會出現者為 D:血尿(那是泌尿系統損傷)。","detail":{"background":"肝裂傷非手術治療(穩定者)併發症:延遲性出血(假性動脈瘤破裂)、膽汁瘤/膽漏、肝膿瘍、膽道出血(hemobilia)、黃疸(膽道受壓)。「血尿」屬泌尿系統(腎/膀胱)損傷,與單獨肝裂傷無關。","options":{"A":"會:延遲性出血。","B":"會:肝膿瘍。","C":"會:黃疸(膽道受壓)。","D":"★不會(本題答案):血尿(泌尿系統損傷)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"109020-76":{"quick":"最常受傷器官為 C:鈍傷→脾臟;槍擊傷→小腸。","detail":{"background":"腹部鈍傷最常受傷器官為「脾臟」(其次肝);穿刺/槍傷最常傷「小腸」。實質臟器(肝/脾)鈍傷血流動力穩定者多採「非手術治療(nonoperative)」。所有創傷死亡中「腦部損傷」占>50%。出血分級(ATLS):Class III=失血 30–40%、心搏>120、血壓下降、Base deficit 增大。大量輸血比例 紅血球:血漿:血小板=1:1:1;緊急可用「O 型紅血球(O-Rh 陰性為萬用紅血球)」、緊急血漿用「AB 型(萬用血漿)」(O 型血漿含抗 A/抗 B 抗體,非萬用)。","options":{"A":"槍傷非以肝最多。","B":"鈍傷非以肝最多。","C":"★正確(本題答案):鈍傷脾臟、槍傷小腸。","D":"鈍傷非以小腸最多。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"110080-7":{"quick":"本題一律給分;AAST 肝臟創傷分「五級」:I 表淺裂傷/小血腫、III 裂傷>3 cm、V 為廣泛實質破壞/近肝靜脈大血管傷、VI 肝撕脫。","detail":{"background":"AAST 肝臟損傷分級(I–VI,常稱五級+VI 撕脫):I 被膜下血腫<10%/裂傷<1 cm;II 血腫 10–50%/裂傷 1–3 cm;III 血腫>50% 或破裂/裂傷>3 cm;IV 25–75% 肝葉實質破壞;V >75% 或近肝靜脈/下腔靜脈(juxtahepatic vein)損傷;VI 肝撕脫。本題答案鍵一律給分。","options":{"A":"(給分):裂傷<1 cm/血腫<10% 為第一級。","B":"(給分):裂傷>3 cm 為第三級。","C":"(給分):整葉被膜下血腫近第五級描述。","D":"(給分):AAST 常述為五級(+VI 撕脫)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"112020-76":{"quick":"脾破裂+休克(HR130、BP80/46、BD−8)。錯在 D:緊急血漿應用「AB 型(萬用血漿)」,O 型血漿含抗 A/抗 B 抗體,非萬用。","detail":{"background":"腹部鈍傷最常受傷器官為「脾臟」(其次肝);穿刺/槍傷最常傷「小腸」。實質臟器(肝/脾)鈍傷血流動力穩定者多採「非手術治療(nonoperative)」。所有創傷死亡中「腦部損傷」占>50%。出血分級(ATLS):Class III=失血 30–40%、心搏>120、血壓下降、Base deficit 增大。大量輸血比例 紅血球:血漿:血小板=1:1:1;緊急可用「O 型紅血球(O-Rh 陰性為萬用紅血球)」、緊急血漿用「AB 型(萬用血漿)」(O 型血漿含抗 A/抗 B 抗體,非萬用)。","options":{"A":"正確:至少 Class III 出血(>30%)。","B":"正確:大量輸血 RBC:FFP:plt=1:1:1。","C":"正確:緊急可用 O 型紅血球。","D":"★錯誤(本題答案):緊急血漿用 AB 型,非 O 型。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"113020-72":{"quick":"肝臟鈍傷最少見者為 D:肝門靜脈栓塞(鈍傷致裂傷/血腫/實質出血常見,門脈栓塞罕見)。","detail":{"background":"肝臟鈍性創傷常見:肝裂傷、被膜下血腫、實質內出血、膽漏;「門靜脈栓塞」非典型鈍傷直接後果(門脈血栓多與肝硬化/高凝/感染相關),最少見。","options":{"A":"常見:肝裂傷。","B":"常見:被膜下血腫。","C":"常見:實質性出血。","D":"★最少見(本題答案):肝門靜脈栓塞。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}}},TO=["膽結石膽囊炎膽管炎", "膽道腫瘤閉鎖囊腫", "胰臟炎", "胰臟腫瘤", "肝臟腫瘤", "肝膿瘍肝硬化門脈高壓", "器官移植與脾臟", "肝脾鈍傷"],LEC={"膽結石膽囊炎膽管炎":{"title":"膽結石‧膽囊炎‧膽管炎（良性膽道）","html":"\n<p><b>膽結石：</b>膽固醇結石(4F：female/forty/fat/fertile、快速減重、TPN)與色素結石(溶血/肝硬化/感染)。多數無症狀(不手術)；<b>有症狀膽結石首選腹腔鏡膽囊切除</b>。膽囊切除適應症：有症狀膽結石、息肉>10 mm、瓷膽囊、無結石性膽囊炎、結石>3 cm。</p>\n<p><b>急性結石性膽囊炎：</b>膽囊管阻塞→發炎；<b>Murphy 徵</b>(深按右上腹「吸氣」突然中止)；<b>超音波首選</b>(敏感>80%/特異>90%，CT 不優於超音波)；早期(72h內)腹腔鏡切除或抗生素後延遲切除；多無黃疸。</p>\n<p><b>Calot 三角</b>(邊界：膽囊管、總肝管、肝下緣；內含膽囊動脈)是腹腔鏡膽囊切除的關鍵(critical view of safety)。</p>\n<p><b>總膽管結石：</b>續發(<2年) vs 原發(膽囊切除>2年)；阻塞性黃疸+總膽管擴張；<b>ERCP 可診斷+取石(>90%)</b>。<b>急性膽管炎</b>：<b>Charcot 三徵</b>=發燒+黃疸+右上腹痛；<b>Reynolds 五徵</b>=Charcot+休克+意識改變→須緊急膽道引流(ERCP/PTCD)+抗生素。膽道出血(hemobilia)首選血管栓塞。</p>\n"},"膽道腫瘤閉鎖囊腫":{"title":"膽道腫瘤‧膽道閉鎖‧總膽管囊腫","html":"\n<p><b>膽管癌：</b>位置分肝內、<b>肝門(Klatskin，最常見，左右肝管匯合處)</b>、遠端。危險因子：PSC、膽管囊腫、反覆化膿性膽管炎、肝吸蟲、肝內結石。>90% 肝門/遠端以阻塞性黃疸表現；Bismuth-Corlette 分型(I 匯合處以下不需肝切除；III/IV 需合併肝切除)。化療反應有限、預後差。</p>\n<p><b>膽囊癌：</b>膽結石為最重要危險因子(~85%)、女性多、預後差；T1a 單純膽囊切除，T1b 以上需根除性切除(肝床+淋巴清掃)。</p>\n<p><b>總膽管囊腫：</b>女性多、Todani 五型(I 最常見)；三徵腹痛/黃疸/腫塊；<b>有惡變風險→即使無症狀也應全切除+Roux-en-Y 肝管空腸吻合</b>。</p>\n<p><b>膽道閉鎖：</b>新生兒持續黃疸+灰白便+直接膽紅素升高；超音波<b>無</b>肝內膽管擴張(三角索徵)；<b>肝切片+術中膽道攝影確診</b>；60 天內行 Kasai 手術；<b>多數仍需肝移植</b>。術後用類固醇/ursodeoxycholic acid/ADEK(非 cyclosporine)。兒童膽結石多為色素結石。</p>\n"},"胰臟炎":{"title":"胰臟炎（急/慢性‧假性囊腫）","html":"\n<p><b>急性胰臟炎：</b>最常見原因<b>膽結石</b>與酒精(70–80%)；診斷 3 取 2(腹痛輻射至背、amylase/lipase>3 倍、影像)；<b>amylase 高低不能預測嚴重度</b>(用 Ranson/APACHE II/CTSI)。常致<b>低血鈣</b>、低血容/腎衰、ARDS。局部併發症：積液、假性囊腫、壞死、膿瘍；<b>無菌性壞死不需預防性抗生素</b>。手術<b>僅在感染性壞死/感染積聚</b>(延遲、step-up)。</p>\n<p><b>假性囊腫：</b>最常續發於胰臟炎；須與囊狀腫瘤鑑別；無症狀可觀察；需引流時若下游胰管阻塞→<b>內引流(囊腸吻合)</b>(非外引流)。Hemosuccus pancreaticus＝假性動脈瘤出血流入胰管。</p>\n<p><b>慢性胰臟炎：</b>最常見<b>酗酒</b>；胰管擴張/結石、實質鈣化(CT 較 X 光易辨識)、脂肪瀉+糖尿病。頑固疼痛+主胰管擴張(>7mm)→<b>Puestow(側側胰管空腸吻合)</b>+清石。</p>\n"},"胰臟腫瘤":{"title":"胰臟腫瘤（癌‧內分泌瘤‧囊性）","html":"\n<p><b>胰臟癌(胰管腺癌)：</b>~2/3 在<b>胰頭/鈎部</b>(阻塞性黃疸+雙管徵、Courvoisier 徵)；危險因子抽菸/慢性胰臟炎/家族史/遺傳(BRCA2/STK11/CDKN2A)；CA19-9 標記、預後極差(癌王)。胰頭癌→<b>Whipple/PPPD</b>(切胰頭+遠端總膽管+十二指腸±遠端胃，不含脾/腹腔幹)；<b>胰腸吻合最易漏</b>。可切除性：侵犯大腸/十二指腸可整塊切除；侵犯 SMA/腹腔幹或遠端轉移→不可切除。術前 ERCP 膽道引流非常規。</p>\n<p><b>胰島素瘤：</b>最常見功能性 pNET、<b>~90% 良性</b>、富血管；<b>Whipple 三徵</b>(空腹低血糖+血糖<50+補糖緩解)；C-peptide 升高區別內因性；術前定位以動脈鈣刺激最精確。</p>\n<p><b>胃泌素瘤(ZES)：</b>頑固潰瘍/腹瀉；<b>胃泌素瘤三角</b>；25% 合併 <b>MEN1</b>(非 MEN2)；約 60% 惡性。necrolytic migratory erythema=升糖素瘤。pNET 以 Ki-67 分級、CgA 追蹤(PPI/腎衰偽高)。</p>\n<p><b>囊性腫瘤：</b>漿液性囊腺瘤(良性、有症狀才手術)、黏液性/實體偽乳突(女性、有惡變)、IPMN(男性、高風險特徵：黃疸/主胰管>10mm/強化壁結節≥5mm)。</p>\n"},"肝臟腫瘤":{"title":"肝臟腫瘤（HCC‧轉移‧良性）","html":"\n<p><b>肝細胞癌(HCC)：</b>好發 B/C 肝、肝硬化、黃麴毒素背景；男性多；<b>AFP 可正常不排除</b>；三相 CT<b>動脈相強化+洗出</b>為診斷特徵；浸潤型常合併<b>門靜脈腫瘤栓塞</b>；不佳因子=多發/血管侵犯/肝功能差。治療依 <b>BCLC</b>：早期切除/移植/消融(根治)，中期 <b>TACE(姑息非根治)</b>，晚期 sorafenib。<b>移植 Milan 準則</b>=單顆≤5cm 或 2–3 顆各≤3cm、無大血管侵犯、無肝外轉移(UCSF≤6.5cm)；<b>肝功能好的小 HCC 優先切除</b>。HCC 肝外供血最常見右下橫膈動脈。</p>\n<p><b>良性肝瘤：</b><b>腺瘤(adenoma)</b>—OCP/雄性素相關、<b>易自發出血+可惡變→切除</b>；FNH—中央疤痕、不出血不惡變、追蹤；海綿狀血管瘤—最常見、周邊結節向心填充、僅 Kasabach-Merritt/破裂/明顯增大才手術。</p>\n<p><b>轉移性肝瘤：</b>最常來自大腸直腸癌(50–60% 一生會肝轉移)；<b>可 R0 切除者肝切除為標準治療</b>(即使多發)；預後因子 CEA>200、>5cm、同步、數目。小兒肝母細胞瘤/HCC 標記皆 AFP。</p>\n"},"肝膿瘍肝硬化門脈高壓":{"title":"肝膿瘍‧肝硬化‧門脈高壓‧肝臟解剖生理","html":"\n<p><b>肝臟解剖：</b>Couinaud 八段(肝靜脈分區)；功能左右分界=<b>中肝靜脈/Cantlie 線(膽囊窩至下腔靜脈)</b>；膽囊鄰 S4b/S5。<b>Pringle 手法</b>夾肝十二指腸韌帶(門靜脈+固有肝動脈+總膽管，不含總肝動脈)，間歇(夾15放5)。肝小葉約 6 個門脈三合體；zone 3 最缺氧；Ito 細胞儲維生素 A、致纖維化。</p>\n<p><b>肝膿瘍：</b>多右肝、常多菌(E. coli/Klebsiella)、現今<b>膽道感染最常見</b>；血培養陽性~50%；CT<b>低密度</b>；治療抗生素+<b>經皮引流</b>。肝靜脈非感染途徑。</p>\n<p><b>肝硬化/門脈高壓：</b>HVPG>5 mmHg；側枝=食道胃靜脈曲張、caput medusae、痔靜脈叢(精索靜脈曲張無關)。蜘蛛血管瘤/手掌紅斑、高動力循環(<b>低 MAP</b>)、腹水、肝性腦病(限蛋白、lactulose)。<b>食道靜脈曲張首選非選擇性 β-blocker</b>+結紮；出血→藥物+內視鏡→TIPS/分流/移植(不用動脈栓塞)。<b>MELD</b>=膽紅素+肌酸酐+INR(不含白蛋白/WBC)；<b>Child-Pugh</b>=膽紅素+白蛋白+PT/INR+腹水+腦病(不用 PTT)。Budd-Chiari=肝靜脈流出道阻塞。</p>\n"},"器官移植與脾臟":{"title":"器官移植與脾臟","html":"\n<p><b>肝臟移植：</b>適應症=末期肝硬化、急性肝衰竭(acetaminophen/猛爆肝炎)、膽道閉鎖、肝腎症候群、符合準則 HCC。<b>禁忌</b>：肝外惡性/轉移、<b>大血管(門脈)腫瘤侵犯</b>、活動性感染、心因性(心衰竭)肝硬化；肝功能好的小 HCC 優先切除。移植後最常見癌症皮膚癌；發生癌症應<b>減量</b>免疫抑制(非全停)。中期機會性感染以 CMV 為代表。</p>\n<p><b>胰臟移植：</b>用於<b>第一型糖尿病</b>(尤其合併腎衰竭→SPK，移植量最大、預後最好)；現以腸道引流為主；最常見手術併發症<b>移植物血管栓塞</b>；最常見長期死因心血管疾病。</p>\n<p><b>脾臟：</b>切脾<b>最常見原因為外傷/醫源性損傷</b>(非 ITP)；術後<b>莢膜菌</b>感染風險高(術前 2 週打疫苗、兒童 OPSI 風險高)；腹腔鏡為首選但須考慮門脈高壓；肝硬化脾亢不需常規切脾。遠端脾腎分流(Warren)保留門脈血流、日後仍可移植。</p>\n"},"肝脾鈍傷":{"title":"肝脾鈍傷","html":"\n<p><b>腹部創傷器官：</b>鈍傷最常傷<b>脾臟</b>(其次肝)；穿刺/槍傷最常傷<b>小腸</b>。所有創傷死亡中<b>腦部損傷占>50%</b>。</p>\n<p><b>實質臟器(肝/脾)鈍傷：</b>血流動力穩定者多採<b>非手術治療</b>。肝裂傷非手術併發症：延遲性出血、膽漏/膽汁瘤、肝膿瘍、膽道出血、黃疸(無血尿)；門靜脈栓塞最少見。<b>AAST 肝損傷分 I–VI 級</b>(裂傷深度/血腫範圍/近肝靜脈大血管)。</p>\n<p><b>出血與輸血：</b>休克分級(Class III=失血30–40%、心搏>120、血壓降、base deficit 增大)；大量輸血 <b>RBC:FFP:血小板=1:1:1</b>；緊急萬用紅血球=<b>O 型</b>、萬用血漿=<b>AB 型</b>(O 型血漿非萬用)。</p>\n"}};
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);

const PKEY='med_hpb_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'\U0001F44B 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
