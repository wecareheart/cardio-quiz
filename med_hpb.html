"民國110年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":33,"stem":"膽結石是膽囊及膽道最常見的問題,下列有關膽結石的敘述何者正確?","options":{"A":"大部分膽結石是沒有症狀的,但是考慮到手術的進步及其可能引發的併發症,只要診斷有膽結石,應該就要建議病人接受手術治療","B":"膽結石引發的急性膽囊炎,主要是因為膽囊管被阻塞而引發的後續發炎,可以藉由超音波確診,其診斷敏感性可達八成以上,特異性可達九成以上","C":"若膽結石掉落到總膽管後,就不需要擔心,因石頭一定會自然排除,症狀會得到緩解","D":"目前進行手術大部分是利用腹腔鏡進行膽囊切除,而此手術最常見的併發症為術中膽囊破裂導致結石掉落腹腔造成反覆感染"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"110080-33","topic":"膽結石膽囊炎膽管炎","topic_code":"T1","id":"110080-33","q_num":33,"src":"民國110年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":35,"stem":"下列何者是目前胰臟移植手術的適應症?","options":{"A":"第一型糖尿病,血糖控制穩定","B":"第二型糖尿病,服用口服降血糖藥控制且合併腎衰竭","C":"第一型糖尿病合併腎衰竭","D":"第一型糖尿病,尚未產生糖尿病合併症"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"110080-35","topic":"器官移植與脾臟","topic_code":"T7","id":"110080-35","q_num":35,"src":"民國110年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":42,"stem":"一名2歲大的小朋友因為腹痛來到急診室,生化檢查發現他有升高的澱粉酶(amylase),腹部超音波檢查發現他的肝內膽管與總膽管擴大。診斷可能是膽道囊腫(choledochal cyst)。下列相關敘述何者正確?1typeIV的膽道囊腫 2type V的膽道囊腫 3應該待胰臟炎緩解後即安排手術切除囊腫 4應該等到6歲再做手術切除囊腫 5囊腫發生的假說是因為胰液反流導致膽管發炎擴大","options":{"A":"135","B":"23","C":"245","D":"145"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"110080-42","topic":"膽道腫瘤閉鎖囊腫","topic_code":"T2","id":"110080-42","q_num":42,"src":"民國110年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":74,"stem":"64歲女性,因急性右上腹部劇痛,掛急診求醫,腹部CT和血管攝影影像如附圖,則最可能的診斷為下列何者?","options":{"A":"肝膿瘍","B":"分布不均脂肪肝","C":"肝細胞癌破裂","D":"肝血管瘤破裂"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"110080-74","topic":"膽結石膽囊炎膽管炎","topic_code":"T1","id":"110080-74","q_num":74,"src":"民國110年第二次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":5,"stem":"下列何項不是肝臟移植之適應症?","options":{"A":"primary biliary cirrhosis","B":"hepatocellular carcinoma","C":"biliary atresia","D":"liver cirrhosis due to heart failure"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111020-5","topic":"器官移植與脾臟","topic_code":"T7","id":"111020-5","q_num":5,"src":"民國111年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":37,"stem":"對於何時應懷疑有胰臟癌(pancreatic cancer)的存在,下列敘述何者錯誤?","options":{"A":"不明原因之體重減輕或長期腹部悶痛","B":"沒有糖尿病家族史,而在50歲後發生糖尿病或莫名發生不易控制的高血糖","C":"不明原因之老人胰臟炎","D":"身體檢查有Murphy's sign時"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111020-37","topic":"胰臟腫瘤","topic_code":"T4","id":"111020-37","q_num":37,"src":"民國111年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":40,"stem":"有關細菌性肝臟膿瘍的敘述,下列何者正確?","options":{"A":"最常見的原因為肝動脈血液感染","B":"在西方國家,主要是因為膽道惡性腫瘤造成阻塞合併感染;而在亞洲,則是以肝內結石造成的膽道感染為最主要的原因","C":"外傷也會造成肝內膿瘍,主要是因為血塊或是壞死的組織沒有吸收造成的緣故,通常在受傷的3天內,病患發生突然的高燒不止,就需要進行鑑別診斷","D":"超音波是主要的診斷工具。在超音波下,膿瘍為圓形或是卵圓形的高回音(hyperechoic)病徵,其診斷敏感性可以達到80-95%。唯獨對於某些不易判讀的解剖位置如肝頂(dome)不易確診"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111020-40","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"111020-40","q_num":40,"src":"民國111年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":43,"stem":"急性胃、食道靜脈瘤出血,經藥物及內視鏡治療後仍持續出血,此時選擇以下外科治療,何者最不適當?","options":{"A":"經頸靜脈肝內門體靜脈支架分流術(transjugular intrahepatic portosystemic shunt, TIPS)","B":"遠端脾靜脈腎靜脈分流術(Warren shunt)","C":"脾臟切除(splenectomy)","D":"肝臟移植(liver transplantation)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111020-43","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"111020-43","q_num":43,"src":"民國111年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":44,"stem":"下列何種肝臟良性病灶最容易發生自發性出血,並有轉變成惡性腫瘤的可能性?","options":{"A":"肝細胞腺瘤(liver cell adenoma)","B":"肝血管瘤(hemangioma)","C":"肝臟局部增生性結節(focal nodular hyperplasia)","D":"肝臟單純囊腫(simple cyst)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"111020-44","topic":"肝臟腫瘤","topic_code":"T5","id":"111020-44","q_num":44,"src":"民國111年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":47,"stem":"一位60歲男性因腹痛數月就醫檢查,發現胰臟中段有一3公分腫瘤,手術切除後病理診斷為胰臟神經內分泌腫瘤(pancreatic neuroendocrine tumor),下列敘述何者錯誤?","options":{"A":"若腫瘤的insulin免疫染色呈陽性,又可稱為insulinoma","B":"分泌glucagon的腫瘤可能會有特殊的皮膚病變(necrolytic migrating erythema)","C":"若Ki-67指數大於20%,病理分級為high grade","D":"不論神經內分泌腫瘤是否為功能性,皆可利用測量血液中chromogranin A濃度協助診斷與追蹤"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"111020-47","topic":"胰臟腫瘤","topic_code":"T4","id":"111020-47","q_num":47,"src":"民國111年第一次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":4,"stem":"下列何者不是胰臟癌的危險因子?","options":{"A":"抽菸","B":"Peutz-Jeghers syndrome","C":"遺傳性胰臟炎","D":"縮胃手術"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-4","topic":"胰臟腫瘤","topic_code":"T4","id":"111080-4","q_num":4,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":31,"stem":"脾臟(spleen)可視為人類最大的淋巴器官,具有調節免疫系統的功能,下列對於脾臟切除(splenectomy)的敘述何者錯誤?","options":{"A":"嚴重肝硬化的病患經常合併血小板減少(thrombocytopenia),必須切除脾臟以提升血小板數目改善病患預後","B":"外傷及手術當中醫源性的脾臟損傷是脾臟切除最常見的原因","C":"脾臟切除後有較高風險遭受莢膜形細菌感染,如肺炎鏈球菌(Streptococcus pneumoniae)","D":"兒童脾臟切除之後併發猛爆型感染症(overwhelming postsplenectomy infection)的風險比成人高"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"111080-31","topic":"器官移植與脾臟","topic_code":"T7","id":"111080-31","q_num":31,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":33,"stem":"關於肝臟小葉(lobule)的敘述,下列何者正確?","options":{"A":"每一個功能單位由8~12 個終端肝門三合體(portal triad)圍繞一中央小靜脈構成","B":"肝臟小葉中可分成3 帶,其中zone 1 因為較缺乏養分與氧氣,容易因為毒素或缺血而產生壞死","C":"肝竇狀隙(sinusoid)的內皮細胞與肝細胞間的間隙稱為space of Disse,肝細胞藉由擴散作用交換物質,並不產生微絨毛(microvilli)構造","D":"肝臟星狀細胞(stellate cells)又稱Ito cells,存在於space of Disse,主要功能之一為儲存維生素A"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-33","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"111080-33","q_num":33,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":34,"stem":"關於肝臟分葉,下列敘述何者最恰當?","options":{"A":"從鐮狀韌帶(falciform ligament)分界","B":"尾葉(caudate lobe)屬右肝","C":"肝部(sector)以肝動脈走向為界","D":"所謂Cantlie's line,係指膽囊窩至下腔靜脈的連線"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-34","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"111080-34","q_num":34,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":37,"stem":"65 歲女性因急性上腹痛及背痛至急診室就醫,經初步檢查可能診斷為膽結石引起急性胰臟炎,實習醫學生想用Ranson prognostic criteria 評估嚴重度,下列何者不是評估的項目?","options":{"A":"age","B":"blood glucose level","C":"total bilirubin level","D":"white blood cell count"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111080-37","topic":"膽結石膽囊炎膽管炎","topic_code":"T1","id":"111080-37","q_num":37,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":73,"stem":"慢性胰臟炎的鈣化表現(calcifications of the chronic pancreatitis),下列敘述何者最不恰當?","options":{"A":"會出現斑駁鈣化(spotted or mottled calcification)","B":"在腰椎第一節和第二節的高度,鈣化以水平方向分布","C":"慢性胰臟炎的鈣化在X光影像上幾乎都清晰可見","D":"相較於X光影像,電腦斷層影像較容易辨識鈣化"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111080-73","topic":"胰臟炎","topic_code":"T3","id":"111080-73","q_num":73,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":76,"stem":"一位51 歲病人,接受右肝切除手術後的壓力反應(stress response),包括代謝率改變、發炎介質產生及內分泌變化等等,下列敘述何者錯誤?","options":{"A":"術後病人的能量消耗可以比基礎代謝率低20%","B":"cortisol, epinephrine 及glucagon 增加","C":"alanine 被肝臟代謝,作為腸道及免疫系統之主要能量來源","D":"呼吸商數(respiratory quotient)會下降"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111080-76","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"111080-76","q_num":76,"src":"民國111年第二次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":3,"stem":"病人接受胰頭十二指腸切除手術之後,需進行消化道之重建,最容易造成術後滲漏的吻合處為下列何者?","options":{"A":"胃部空腸吻合","B":"膽管空腸吻合","C":"胰體空腸吻合","D":"各吻合處滲漏之機率沒有太大的差異"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112020-3","topic":"胰臟腫瘤","topic_code":"T4","id":"112020-3","q_num":3,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":4,"stem":"下列有關肝細胞癌的Barcelona Clinic Liver Cancer(BCLC)臨床分期和治療之相關敘述,何者錯誤?","options":{"A":"臨床分期分成stage 0、A、B、C、D","B":"分期依據包括腫瘤大小、Child score及performance status等","C":"chemoembolization為一種curative treatment","D":"對於BCLC stage C的晚期患者來說,可以考慮使用標靶藥物如sorafenib"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112020-4","topic":"肝臟腫瘤","topic_code":"T5","id":"112020-4","q_num":4,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":31,"stem":"肝臟移植被認為是治療肝硬化合併肝細胞癌(hepatocellular carcinoma)病患的有效治療方法,下列肝細胞癌患者的腫瘤狀態何者較不建議接受肝臟移植治療?〔Child-Turcotte-Pugh score簡稱CTP score〕","options":{"A":"50歲男性,B型肝炎患者,CTP score=8,兩顆腫瘤2.0 cm與2.5 cm分別位於segment III和segment VII,無肝外轉移及大血管侵犯","B":"60歲女性,C型肝炎患者,CTP score=10,單顆腫瘤4.5 cm位於segment VIII,無肝外轉移及大血管侵犯","C":"58歲男性,C型肝炎患者,CTP score=7,三顆腫瘤1.0 cm、2.0 cm與1.0cm分別位於segment II、segment V和segment VII,無肝外轉移及大血管侵犯","D":"40歲男性,B型肝炎患者,CTP score=5,單顆腫瘤2.0 cm位於segment II,無肝外轉移及大血管侵犯"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-31","topic":"器官移植與脾臟","topic_code":"T7","id":"112020-31","q_num":31,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":32,"stem":"關於轉移性肝臟惡性腫瘤(metastatic liver tumor),下列敘述何者錯誤?","options":{"A":"最常見的轉移性肝臟腫瘤來自大腸直腸癌(colorectal cancer)","B":"近50%~60%的大腸直腸癌(colorectal cancer)患者包括新診斷或術後追蹤,在其一生中會出現肝臟轉移","C":"基於化學藥物治療的發展及肝臟手術的精進,肝臟切除腫瘤已經成為治療大腸直腸癌肝臟轉移的標準治療","D":"多發性的大腸直腸癌肝臟轉移,既使接受手術治療預後也不好,只能以化學藥物治療"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-32","topic":"肝臟腫瘤","topic_code":"T5","id":"112020-32","q_num":32,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":33,"stem":"胰臟移植(pancreas transplantation)可以重建胰島素(insulin)的血糖代謝且可以改善糖尿病患者的生活品質,下列何種類別的胰臟移植相較其他類別,移植比例最高而且移植後病患整體預後也最好?","options":{"A":"糖尿病患者合併腎衰竭尿毒症同時接受胰臟及腎臟移植(simultaneous pancreas and kidney transplant, SPK)","B":"糖尿病患者合併腎衰竭尿毒症接受過腎臟移植之後再接受胰臟移植(pancreas after kidney transplant, PAK)治療糖尿病","C":"糖尿病患者未合併尿毒症,但血糖不易控制接受胰臟移植(pancreas transplant alone, PTA)改善生活品質","D":"糖尿病患者合併腎衰竭尿毒症先接受胰臟移植(pancreas before kidney transplant, PBK)之後再等待腎臟移植"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112020-33","topic":"器官移植與脾臟","topic_code":"T7","id":"112020-33","q_num":33,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":34,"stem":"下列對於胰臟內分泌瘤的敘述何者錯誤?","options":{"A":"insulinoma是最常見的胰臟內分泌瘤,其主要症狀為Whipple triad,包含symptomatic fasting hypoglycemia,serum glucose level < 50 mg/dL, relief of symptoms with the administration of glucose","B":"70-90% insulinoma發生於Passaro's triangle,此區的範圍是由junction of the cystic duct and common bile duct, the2nd and 3rd portion of the duodenum和the neck and body of the pancreas組成的三角區域","C":"Zollinger-Ellison syndrome是由gastrinoma所引起,主要症狀為abdominal pain, peptic ulcer disease和severeesophagitis","D":"90%的insulinoma是sporadic,而10% 的insulinoma與multiple endocrine neoplasia type I(MEN I)syndrome相關"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112020-34","topic":"胰臟腫瘤","topic_code":"T4","id":"112020-34","q_num":34,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":36,"stem":"有關膽道惡性腫瘤的敘述,下列何者最恰當?","options":{"A":"膽囊癌主要發生在男性且絕大部分都有膽結石","B":"膽囊癌若沒有穿透肌肉層(T1),除了單純膽囊切除外,最好也要清除淋巴結","C":"遠端膽管癌預後平均比肝門膽管癌(Klatskin tumor)差","D":"膽管癌儘管手術進步也變得積極,但預後仍不佳"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-36","topic":"膽道腫瘤閉鎖囊腫","topic_code":"T2","id":"112020-36","q_num":36,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":54,"stem":"微創手術(minimally invasive surgery)已可用於脾臟切除手術,下列敘述何者錯誤?","options":{"A":"腹腔鏡脾切除手術是切除脾臟的首選方法,其手術安全性和傳統開腹脾切除手術並無差別","B":"大約90%的患者可以完成腹腔鏡脾切除手術,腹腔鏡脾切除手術失敗轉換成開腹脾切除手術主要原因是由於術中出血、缺乏手術經驗、沾黏、巨大的脾腫大和肥胖","C":"腹腔鏡脾切除手術不需要考慮門靜脈高壓的問題","D":"腹腔鏡脾切除手術可以在患者處於仰臥或側臥的情況下進行"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112020-54","topic":"器官移植與脾臟","topic_code":"T7","id":"112020-54","q_num":54,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":72,"stem":"關於急性胰臟炎之晚期併發症(late complication),下列何者最少見?","options":{"A":"胰管阻塞(pancreatic duct obstruction)","B":"後腹腔膿瘍(retroperitoneal abscess)","C":"肝動脈假性動脈瘤(hepatic artery pseudoaneurysm)","D":"假性囊腫形成(pseudocyst formation)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112020-72","topic":"胰臟炎","topic_code":"T3","id":"112020-72","q_num":72,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":76,"stem":"40歲行人被汽車撞擊後送到急診,檢查發現脾臟破裂、腹內出血,心跳130/min,呼吸20/min,血壓80/46mmHg,Base deficit -8mEq/L,下列敘述何者錯誤?","options":{"A":"病人至少是第三級出血","B":"若需啟動大量輸血,建議的比例為紅血球:血漿:血小板=1:1:1","C":"若需緊急輸packed RBC,可選用O型紅血球","D":"若需緊急輸FFP,可選用O型血漿"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-76","topic":"肝脾鈍傷","topic_code":"T8","id":"112020-76","q_num":76,"src":"民國112年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":6,"stem":"臨床上用以評估肝臟疾病的嚴重程度時會使用所謂的「末期肝臟疾病模型」分數(Model for End-Stage LiverDisease score, MELD score)來評分肝臟移植優先順位。下列何者不是計算MELD score的重要參數?","options":{"A":"血清總膽紅素(total bilirubin)","B":"白血球計數 (white blood cell count)","C":"血清肌酐酸(creatinine)","D":"凝血酶原時間國際標準化比值(international normalized ratio, INR)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-6","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"112080-6","q_num":6,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":30,"stem":"有關Zollinger-Ellison syndrome的敘述,下列何者錯誤?","options":{"A":"導因於神經內分泌瘤gastrinoma異常分泌gastrin所造成","B":"約20%的病患會合併multiple endocrine neoplasia type II(MEN II),可以藉由手術切除治癒","C":"約80%的gastrinoma位於gastrinoma triangle,但因腫瘤通常較小而不易於手術前定位","D":"有將近60%的gastrinoma為惡性的,且常合併淋巴結、肝臟或其他遠端轉移"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-30","topic":"胰臟腫瘤","topic_code":"T4","id":"112080-30","q_num":30,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":31,"stem":"關於膽囊癌(gallbladder cancer),下列敘述何者正確?","options":{"A":"大部分的病患都是經由腹腔鏡膽囊切除偶然發現診斷的","B":"整體膽囊癌的預後相當好,5年存活率可高達80%","C":"膽結石是膽囊癌最重要的危險因子,近85%的膽囊癌患者伴隨有膽結石","D":"膽囊癌侵犯深度為T2的腫瘤,因尚未穿透漿膜,術後只需追蹤即可,不必進行擴大根除手術"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-31","topic":"膽道腫瘤閉鎖囊腫","topic_code":"T2","id":"112080-31","q_num":31,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":33,"stem":"關於胰臟癌(pancreatic ductal adenocarcinoma)的敘述,下列何者錯誤?","options":{"A":"遺傳性胰臟癌與PRSS1、STK11、CDKN2A及BRCA2等基因突變有關","B":"腫瘤發生於胰臟頭部,表現症狀最多的是黃疸,若發生於胰臟體部和尾部,則以疼痛和體重減輕居多","C":"發生於胰臟頭部的胰臟癌,約三分之一的病人出現膽囊腫大(palpable distended gallbladder),稱為Courvoisier sign","D":"手術前施行endoscopic retrograde cholangio-pancreatography(ERCP)做膽道減壓,可減少手術後傷口感染"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112080-33","topic":"胰臟腫瘤","topic_code":"T4","id":"112080-33","q_num":33,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":34,"stem":"有關胰臟胰島素瘤(insulinoma)的敘述,下列何者正確?","options":{"A":"最常見的胰臟內分泌腫瘤,通常臨床表現包括有症狀的空腹低血糖、有記載的血清葡萄糖值<50 mg/mL以及葡萄糖的給與可以緩解症狀,此又稱Charcot's triad","B":"實驗室檢查除了血糖低、胰島素高外,C-peptide上升可以幫助診斷胰島素瘤而非外來胰島素或降血糖藥引起的低血糖症","C":"與其他胰臟內分泌腫瘤不同在於其是多發性為主且大多數為良性","D":"大多數為偶發性(sporadic)而與遺傳無關,但合併第一型多發性內分泌腺瘤(multiple endocrine neoplasiatype 1, MEN-1)的病患較多單發性但復發率較高"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-34","topic":"胰臟腫瘤","topic_code":"T4","id":"112080-34","q_num":34,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":35,"stem":"有關肝臟的腺瘤(adenoma)和局部的小節增生(focal nodular hyperplasia, FNH),下列敘述何者最恰當?","options":{"A":"相較之下FNH跟口服避孕藥較有關","B":"腺瘤較有機會自發性出血,且有機會轉變為惡性","C":"在核磁共振及電腦斷層下,兩者不易區分","D":"兩者皆建議手術治療"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-35","topic":"肝臟腫瘤","topic_code":"T5","id":"112080-35","q_num":35,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":36,"stem":"有關肝臟手術時常用的Pringle maneuver,下列敘述何者最恰當?","options":{"A":"主要係夾住肝動脈、肝靜脈、門脈靜脈","B":"一般夾15分鐘,放鬆5分鐘","C":"對肝功能較差者,使用此方式會比選擇性半肝夾緊方式更適合","D":"此方式與連續血管夾緊方式對術後肝功能及缺血再灌注傷害並無差異"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-36","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"112080-36","q_num":36,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":74,"stem":"45歲女性因飯後右上腹部不適到醫院求診,腹部X光片顯示病變如圖。此病人最可能之初診斷為下列何者?","options":{"A":"膽結石(gallbladder stones)","B":"總膽管內嵌塞結石(common bile duct impacted stones)","C":"腎結核病(renal tuberculosis)","D":"腎 ","id":"115020-17","q_num":17,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":18,"stem":"關於腹腔鏡及機械手臂等微創手術在肝臟切除術之角色,下列敘述何者錯誤?","options":{"A":"一般而言,機械手臂切肝手術較腹腔鏡切肝手術耗費時間短、失血較少,但醫療費用較高","B":"腹腔鏡與機械手臂切肝手術在適應症上大致相同","C":"腹腔鏡與機械手臂切肝手術在併發症及轉為開腹率方面並沒有顯著差異","D":"微創手術已成為肝臟邊緣病灶切除的標準治療方式"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"115020-18","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"115020-18","q_num":18,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":19,"stem":"55 歲男性,因罹患B 肝長期在胃腸肝膽內科進行追蹤,近期因超音波檢查發現疑似有右肝腫瘤,抽血檢查發現GOT:25 IU/L,GPT:21 IU/L,Total bilirubin:0.8 mg/dL,PT:1.5s,albumin:4.38 g/dL。電腦斷層檢查顯示肝臟第五葉有顆2.5 公分大的腫瘤,並有些微肝硬化之表現但無明顯腹水,經皮細針抽取檢體證實為肝細胞癌,故轉介一般外科進行手術評估,抽血檢查發現胎兒蛋白值(AFP)為350 ng/mL,且無肝腦病變之發現。該男性之肝功能分級Child–Pugh Score 為多少以及後續建議之治療方法何者較適當?","options":{"A":"Child–Pugh A,將安排腹腔鏡肝臟部分切除手術","B":"Child–Pugh B,將安排靛氰綠(Indocyanine green)肝功能檢查,以評估是否適合腹腔鏡手術","C":"Child–Pugh C,建議射頻灼燒術(Radiofrequency ablation)","D":"Child–Pugh B,將安排經動脈導管肝臟腫瘤化學栓塞術(Trans-Arterial Chemo-Embolization)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"115020-19","topic":"肝臟腫瘤","topic_code":"T5","id":"115020-19","q_num":19,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":23,"stem":"臨床上可運用Model for end-stage liver disease(MELD)score,來預測等待肝臟移植的末期肝病患者於三個月內的死亡風險。下列何者不是計算MELD score 的參數?","options":{"A":"血清肌酸酐(serum creatinine)","B":"血清總膽紅素(serum total bilirubin)","C":"國際標準化比值(international normalized ratio, INR)","D":"血清白蛋白(serum albumin)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-23","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"115020-23","q_num":23,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":44,"stem":"關於急性胰臟炎的手術適應症,下列敘述何者最適當?","options":{"A":"對於嚴重型的急性胰臟炎,一旦確認就要及早進行手術清創","B":"手術只有在感染性壞死或感染的積聚才建議執行","C":"急性胰臟炎所造成的偽囊腫(pseudocyst)形成,一般是外引流比內引流較佳","D":"偽囊腫(pseudocyst)形成時,選擇手術引流會優先於內視鏡引流"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-44","topic":"胰臟炎","topic_code":"T3","id":"115020-44","q_num":44,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":55,"stem":"為促進肝膽微創手術的完成,下列敘述何者正確?","options":{"A":"所有的切肝手術都需要Pringle 手法","B":"為有效控制減少手術出血,Pringle 手法通常在整個手術中持續使用,手術完成再鬆開","C":"氣腹手術中的低血壓,一旦懷疑gas emboli,應該給予病人頭高腳低左側躺,並考慮用中央靜脈導管抽出心室中的空氣","D":"如果懷孕病人需要手術,應儘量安排在妊娠中期(second trimester)進行"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-55","topic":"肝膿瘍肝硬化門脈高壓","topic_code":"T6","id":"115020-55","q_num":55,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":72,"stem":"在施行肝癌(HCC)病人之血管栓塞術時,除了主要的動脈血管供應為左肝或右肝動脈外,偶會發現肝癌存在其他的肝外腫瘤血管供應(extrahepatic blood supply),其中以下列何種血管最常見?","options":{"A":"內乳動脈(internal mammary artery)","B":"下腸繫膜動脈(inferior mesenteric artery)","C":"右側橫膈膜下動脈(right inferior phrenic artery)","D":"網膜動脈(omental artery)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"115020-72","topic":"肝臟腫瘤","topic_code":"T5","id":"115020-72","q_num":72,"src":"民國115年第一次","img":""}],E={"101030-21":{"quick":"有症狀膽結石最佳治療為 C:腹腔鏡膽囊切除術。","detail":{"background":"膽結石:膽固醇結石(肥胖、女性、多產、>40 歲、快速減重、長期禁食/TPN)與色素結石(溶血、肝硬化、感染)。多數無症狀(不需手術);「有症狀膽結石」治療首選「腹腔鏡膽囊切除術」。急性結石性膽囊炎:膽囊管被結石阻塞→發炎;Murphy 徵(右上腹深按時「吸氣」突然中止)為特徵;超音波為首選(敏感>80%、特異>90%,見結石+膽囊壁增厚+周圍積液),CT 敏感度不優於超音波;早期腹腔鏡膽囊切除(72 小時內)或先抗生素再延遲切除。膽囊切除適應症:有症狀膽結石、膽囊息肉>10 mm、瓷膽囊、無結石性膽囊炎、膽囊結石>3 cm(癌風險)。","options":{"A":"保守治療無法根除結石。","B":"超音波碎石對膽結石無效(易復發)。","C":"★正確(本題答案):腹腔鏡膽囊切除。","D":"經皮膽囊引流用於高風險急性膽囊炎暫時減壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102030-39":{"quick":"錯在 B:膽囊切除後「>2 年」才發現者才視為原發性總膽管結石,「半年」太短(屬殘留/續發)。","detail":{"background":"總膽管結石(CBD stone):續發性(由膽囊掉落,<2 年)vs 原發性(膽道內生成,膽囊切除>2 年後發現)。阻塞性黃疸為典型;超音波見總膽管擴張;ERCP 可診斷與「治療(取石)」,>90% 可取出。急性膽管炎(細菌性膽道感染+阻塞):Charcot 三徵=發燒、黃疸、右上腹痛;Reynolds 五徵=Charcot+休克+意識改變(敗血性),需「緊急膽道引流(ERCP/PTCD)」+抗生素,否則致命。膽道留置導管者較易無黃疸性膽管炎。","options":{"A":"正確:阻塞性黃疸為最典型。","B":"★錯誤(本題答案):原發性定義為>2 年,非半年。","C":"正確:超音波常見總膽管擴張。","D":"正確:ERCP 可診斷亦可治療取石。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103030-34":{"quick":"腹腔鏡膽囊切除後上腹不適+輕微黃疸+膽汁聚積→C:術後膽汁滲漏(膽囊管殘端/Luschka 管),可先 CT 導引放置引流。","detail":{"background":"腹腔鏡膽囊切除後膽汁滲漏多源自「膽囊管殘端結紮鬆脫」或「Luschka 副肝管」,表現上腹不適、輕微黃疸、腹腔膽汁聚積。處置先「影像導引經皮引流」控制+ERCP 放支架/括約肌切開降低膽道壓力使瘻管癒合;非一律緊急開腹。需與「總膽管橫斷(major injury)」鑑別(後者需膽腸吻合)。","options":{"A":"腸穿孔表現腹膜炎,非此情境。","B":"總膽管橫斷需膽腸吻合,非僅 PTCD。","C":"★正確(本題答案):術後膽汁滲漏,先引流。","D":"單純重新夾閉非首選,先引流減壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103100-37":{"quick":"腹腔鏡膽囊切除「絕對」禁忌為 C:瀰漫性腹膜炎(及無法耐受氣腹/無法矯正的凝血異常)。","detail":{"background":"腹腔鏡膽囊切除絕對禁忌:瀰漫性腹膜炎/血流動力學不穩、無法耐受全身麻醉與氣腹、無法矯正的凝血病。相對禁忌:嚴重沾黏、晚期懷孕、疑膽囊癌(宜開腹)。肥胖、急性膽囊炎、剖腹產史非絕對禁忌。","options":{"A":"病態肥胖非絕對禁忌。","B":"急性膽囊炎可腹腔鏡(早期)。","C":"★正確(本題答案):瀰漫性腹膜炎為絕對禁忌。","D":"剖腹產史非禁忌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104030-38":{"quick":"錯在 D:膽結石阻塞致膽囊腫脹「仍可」腹腔鏡切除,非建議開腹理由;嚴重心衰、疑膽囊癌、懷孕 7–9 月才建議開腹。","detail":{"background":"建議開腹(而非腹腔鏡)膽囊切除的情況:無法耐受氣腹(嚴重心衰竭/呼吸衰竭)、疑似/已知膽囊惡性(避免氣腹播散、需根除)、晚期懷孕(7–9 月,氣腹與器械空間受限)、嚴重沾黏無法辨識構造。單純膽結石致膽囊腫脹仍可腹腔鏡。","options":{"A":"是:嚴重心衰竭不耐氣腹。","B":"是:疑膽囊癌宜開腹根除。","C":"是:懷孕 7–9 月。","D":"★錯誤(本題答案):膽囊腫脹仍可腹腔鏡。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-31":{"quick":"非 Charcot 三徵者為 D:意識譫妄(屬 Reynolds 五徵)。Charcot=發燒、黃疸、右上腹痛。","detail":{"background":"總膽管結石(CBD stone):續發性(由膽囊掉落,<2 年)vs 原發性(膽道內生成,膽囊切除>2 年後發現)。阻塞性黃疸為典型;超音波見總膽管擴張;ERCP 可診斷與「治療(取石)」,>90% 可取出。急性膽管炎(細菌性膽道感染+阻塞):Charcot 三徵=發燒、黃疸、右上腹痛;Reynolds 五徵=Charcot+休克+意識改變(敗血性),需「緊急膽道引流(ERCP/PTCD)」+抗生素,否則致命。膽道留置導管者較易無黃疸性膽管炎。","options":{"A":"是:發燒。","B":"是:黃疸。","C":"是:腹痛。","D":"★非(本題答案):意識譫妄屬 Reynolds 五徵。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-40":{"quick":"錯在 B:無症狀膽結石(即使單顆>2 cm)一般「不」是膽囊切除適應症,應追蹤。","detail":{"background":"膽結石:膽固醇結石(肥胖、女性、多產、>40 歲、快速減重、長期禁食/TPN)與色素結石(溶血、肝硬化、感染)。多數無症狀(不需手術);「有症狀膽結石」治療首選「腹腔鏡膽囊切除術」。急性結石性膽囊炎:膽囊管被結石阻塞→發炎;Murphy 徵(右上腹深按時「吸氣」突然中止)為特徵;超音波為首選(敏感>80%、特異>90%,見結石+膽囊壁增厚+周圍積液),CT 敏感度不優於超音波;早期腹腔鏡膽囊切除(72 小時內)或先抗生素再延遲切除。膽囊切除適應症:有症狀膽結石、膽囊息肉>10 mm、瓷膽囊、無結石性膽囊炎、膽囊結石>3 cm(癌風險)。","options":{"A":"是適應症:膽囊息肉>10 mm(癌風險)。","B":"★錯誤(本題答案):無症狀膽結石非手術適應症。","C":"是適應症:無結石性膽囊炎。","D":"是適應症:有症狀膽結石。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107080-34":{"quick":"膽鹽在 C:迴腸(尤其末端迴腸)被主動再吸收進入腸肝循環(本題一律給分)。","detail":{"background":"膽鹽腸肝循環:肝合成膽鹽→經膽道入腸→在「末端迴腸」由鈉依賴性膽鹽轉運體主動再吸收→經門脈回肝再利用,每日循環數次。末端迴腸切除/Crohn 病會中斷此循環→膽鹽流失、脂肪瀉、膽固醇結石。","options":{"A":"十二指腸非主要再吸收處。","B":"空腸非主要。","C":"★正確(本題答案):迴腸(末端迴腸)。","D":"結腸非膽鹽主動再吸收處。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-36":{"quick":"正確為 C(235):Murphy 徵為急性膽囊炎特徵(2)、深按右上腹使「吸氣」突然中止(3)、多數可保守緩解再延遲手術(5);急性膽囊炎多「無」黃疸(1 錯)、是「吸氣」非呼氣中止(4 錯)。","detail":{"background":"膽結石:膽固醇結石(肥胖、女性、多產、>40 歲、快速減重、長期禁食/TPN)與色素結石(溶血、肝硬化、感染)。多數無症狀(不需手術);「有症狀膽結石」治療首選「腹腔鏡膽囊切除術」。急性結石性膽囊炎:膽囊管被結石阻塞→發炎;Murphy 徵(右上腹深按時「吸氣」突然中止)為特徵;超音波為首選(敏感>80%、特異>90%,見結石+膽囊壁增厚+周圍積液),CT 敏感度不優於超音波;早期腹腔鏡膽囊切除(72 小時內)或先抗生素再延遲切除。膽囊切除適應症:有症狀膽結石、膽囊息肉>10 mm、瓷膽囊、無結石性膽囊炎、膽囊結石>3 cm(癌風險)。","options":{"A":"123:含 1(常合併黃疸,錯)。","B":"124:含 1、4 錯。","C":"★正確(本題答案):2、3、5。","D":"245:含 4(呼氣中止,錯)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-53":{"quick":"不含於 Calot 三角邊界者為 C:膽囊動脈(它是三角的「內容物」非邊界)。","detail":{"background":"Calot 三角(肝膽三角)邊界:①膽囊管(cystic duct)、②總肝管(common hepatic duct)、③肝臟下緣(inferior liver edge)。其「內含」膽囊動脈(cystic artery)與淋巴結—故膽囊動脈是「內容物」非邊界。腹腔鏡膽囊切除須清楚辨識此三角(critical view of safety)以免誤傷總膽管/肝動脈。","options":{"A":"是邊界:總肝管。","B":"是邊界:膽囊管。","C":"★非邊界(本題答案):膽囊動脈為內容物。","D":"是邊界:肝臟下緣。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109020-30":{"quick":"錯在 D:膽石性急性膽囊炎以腹腔鏡膽囊切除「治療」,並非絕對禁忌。","detail":{"background":"膽結石:膽固醇結石(肥胖、女性、多產、>40 歲、快速減重、長期禁食/TPN)與色素結石(溶血、肝硬化、感染)。多數無症狀(不需手術);「有症狀膽結石」治療首選「腹腔鏡膽囊切除術」。急性結石性膽囊炎:膽囊管被結石阻塞→發炎;Murphy 徵(右上腹深按時「吸氣」突然中止)為特徵;超音波為首選(敏感>80%、特異>90%,見結石+膽囊壁增厚+周圍積液),CT 敏感度不優於超音波;早期腹腔鏡膽囊切除(72 小時內)或先抗生素再延遲切除。膽囊切除適應症:有症狀膽結石、膽囊息肉>10 mm、瓷膽囊、無結石性膽囊炎、膽囊結石>3 cm(癌風險)。","options":{"A":"正確:長期禁食/TPN 與結石相關。","B":"正確:分色素與膽固醇結石。","C":"正確:併發症含膽囊炎、膽石性胰臟炎、膽石性腸阻塞。","D":"★錯誤(本題答案):腹腔鏡切除是治療,非禁忌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109020-48":{"quick":"非 Calot 三角邊界者為 D:右門靜脈。邊界為膽囊管、總肝管、肝下緣。","detail":{"background":"Calot 三角(肝膽三角)邊界:①膽囊管(cystic duct)、②總肝管(common hepatic duct)、③肝臟下緣(inferior liver edge)。其「內含」膽囊動脈(cystic artery)與淋巴結—故膽囊動脈是「內容物」非邊界。腹腔鏡膽囊切除須清楚辨識此三角(critical view of safety)以免誤傷總膽管/肝動脈。","options":{"A":"是邊界:右肝下緣。","B":"是邊界:總肝管。","C":"是邊界:膽囊管。","D":"★非邊界(本題答案):右門靜脈。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-51":{"quick":"正確為 A:ERCP 為總膽管結石的治療方式之一(可取石)。","detail":{"background":"總膽管結石(CBD stone):續發性(由膽囊掉落,<2 年)vs 原發性(膽道內生成,膽囊切除>2 年後發現)。阻塞性黃疸為典型;超音波見總膽管擴張;ERCP 可診斷與「治療(取石)」,>90% 可取出。急性膽管炎(細菌性膽道感染+阻塞):Charcot 三徵=發燒、黃疸、右上腹痛;Reynolds 五徵=Charcot+休克+意識改變(敗血性),需「緊急膽道引流(ERCP/PTCD)」+抗生素,否則致命。膽道留置導管者較易無黃疸性膽管炎。","options":{"A":"★正確(本題答案):ERCP 可取出總膽管結石。","B":"錯:ERCP 取石成功率>90%,非<50%。","C":"錯:復發與年齡無此關係。","D":"錯:多先 ERCP 取石,非一律腹腔鏡總膽管探查。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-32":{"quick":"總膽管被切除 3 cm(節段缺損、膽汁滲漏)→C:清創後以「腸道(Roux-en-Y 肝空腸吻合)」接合肝側膽管、縫合遠端斷端。","detail":{"background":"醫源性總膽管橫斷且有「節段缺損」時,兩端無法無張力對接,標準處置為「Roux-en-Y 肝空腸吻合(hepaticojejunostomy)」—將肝側膽管接到空腸,遠端膽管斷端縫合。單純端對端吻合+T 管僅適用於無組織缺損的小範圍橫斷。","options":{"A":"缺損 3 cm 端對端吻合張力過大。","B":"同上,張力過大。","C":"★正確(本題答案):Roux-en-Y 肝空腸吻合。","D":"被燒灼切除的膽管無法橋接回原處。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-33":{"quick":"正確為 B:膽結石致急性膽囊炎主因膽囊管阻塞,超音波確診敏感>80%、特異>90%。","detail":{"background":"膽結石:膽固醇結石(肥胖、女性、多產、>40 歲、快速減重、長期禁食/TPN)與色素結石(溶血、肝硬化、感染)。多數無症狀(不需手術);「有症狀膽結石」治療首選「腹腔鏡膽囊切除術」。急性結石性膽囊炎:膽囊管被結石阻塞→發炎;Murphy 徵(右上腹深按時「吸氣」突然中止)為特徵;超音波為首選(敏感>80%、特異>90%,見結石+膽囊壁增厚+周圍積液),CT 敏感度不優於超音波;早期腹腔鏡膽囊切除(72 小時內)或先抗生素再延遲切除。膽囊切除適應症:有症狀膽結石、膽囊息肉>10 mm、瓷膽囊、無結石性膽囊炎、膽囊結石>3 cm(癌風險)。","options":{"A":"錯:無症狀膽結石多數不需手術。","B":"★正確(本題答案):膽囊管阻塞致膽囊炎,超音波高敏感/特異。","C":"錯:結石入總膽管不一定自然排出,可致膽管炎/胰臟炎。","D":"錯:最常見併發症非術中膽囊破裂掉石。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-74":{"quick":"64F 急性右上腹劇痛+CT/血管攝影→C:肝細胞癌破裂(常見肝硬化背景、自發性出血)。","detail":{"background":"肝細胞癌(HCC)自發性破裂:腫瘤血管豐富、表淺者易自發破裂出血→急性右上腹劇痛、腹腔積血、血流動力學不穩;CT/血管攝影見腫瘤+活動性出血。處置:血管攝影栓塞(TAE)止血,穩定後評估切除。需與肝膿瘍、肝血管瘤破裂鑑別。","options":{"A":"肝膿瘍為發燒+膿瘍影像。","B":"脂肪肝不致急性出血。","C":"★正確(本題答案):肝細胞癌破裂。","D":"肝血管瘤破裂較少見。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-37":{"quick":"非 Ranson 評估項目者為 C:總膽紅素(Ranson 入院項目用年齡、白血球、血糖、AST、LDH)。","detail":{"background":"Ranson 預後指標(急性胰臟炎,非膽石性版):入院時—年齡>55、白血球>16000、血糖>200、AST>250、LDH>350;48 小時內—血鈣<8、Hct 下降>10%、BUN 上升、PaO₂<60、鹼缺失>4、體液欠缺>6 L。「總膽紅素」不在其中。","options":{"A":"是:年齡。","B":"是:血糖。","C":"★非(本題答案):總膽紅素非 Ranson 項目。","D":"是:白血球。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-74":{"quick":"45F 飯後右上腹不適+X 光顯影病變→A:膽結石(部分膽結石含鈣可在 X 光顯影,右上腹位置)。","detail":{"background":"膽結石:膽固醇結石(肥胖、女性、多產、>40 歲、快速減重、長期禁食/TPN)與色素結石(溶血、肝硬化、感染)。多數無症狀(不需手術);「有症狀膽結石」治療首選「腹腔鏡膽囊切除術」。急性結石性膽囊炎:膽囊管被結石阻塞→發炎;Murphy 徵(右上腹深按時「吸氣」突然中止)為特徵;超音波為首選(敏感>80%、特異>90%,見結石+膽囊壁增厚+周圍積液),CT 敏感度不優於超音波;早期腹腔鏡膽囊切除(72 小時內)或先抗生素再延遲切除。膽囊切除適應症:有症狀膽結石、膽囊息肉>10 mm、瓷膽囊、無結石性膽囊炎、膽囊結石>3 cm(癌風險)。","options":{"A":"★正確(本題答案):膽結石。","B":"總膽管嵌塞結石位置/表現不同。","C":"腎結核病影像不符。","D":"腎結石位置在腎/輸尿管,非右上腹膽囊區。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113020-36":{"quick":"非 Charcot 三徵者為 C:右上腹腫塊。Charcot=發燒、黃疸、右上腹痛。","detail":{"background":"總膽管結石(CBD stone):續發性(由膽囊掉落,<2 年)vs 原發性(膽道內生成,膽囊切除>2 年後發現)。阻塞性黃疸為典型;超音波見總膽管擴張;ERCP 可診斷與「治療(取石)」,>90% 可取出。急性膽管炎(細菌性膽道感染+阻塞):Charcot 三徵=發燒、黃疸、右上腹痛;Reynolds 五徵=Charcot+休克+意識改變(敗血性),需「緊急膽道引流(ERCP/PTCD)」+抗生素,否則致命。膽道留置導管者較易無黃疸性膽管炎。","options":{"A":"是:發燒。","B":"是:黃疸。","C":"★非(本題答案):右上腹腫塊非 Charcot 三徵。","D":"是:右上腹痛。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-33":{"quick":"錯在 C:發燒+上腹痛+黃疸是「Charcot 三徵」,非「Reynold(s) 三徵」;Reynolds 是五徵(Charcot+休克+意識改變)。","detail":{"background":"總膽管結石(CBD stone):續發性(由膽囊掉落,<2 年)vs 原發性(膽道內生成,膽囊切除>2 年後發現)。阻塞性黃疸為典型;超音波見總膽管擴張;ERCP 可診斷與「治療(取石)」,>90% 可取出。急性膽管炎(細菌性膽道感染+阻塞):Charcot 三徵=發燒、黃疸、右上腹痛;Reynolds 五徵=Charcot+休克+意識改變(敗血性),需「緊急膽道引流(ERCP/PTCD)」+抗生素,否則致命。膽道留置導管者較易無黃疸性膽管炎。","options":{"A":"正確:無膽道阻塞通常不致膽管炎。","B":"正確:膽石性膽管炎好發年長女性。","C":"★錯誤(本題答案):此三徵為 Charcot,非 Reynolds。","D":"正確:留置導管者較易無黃疸性膽管炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-3":{"quick":"Calot 三角組成為 C:總肝管、肝臟下緣、膽囊管。","detail":{"background":"Calot 三角(肝膽三角)邊界:①膽囊管(cystic duct)、②總肝管(common hepatic duct)、③肝臟下緣(inferior liver edge)。其「內含」膽囊動脈(cystic artery)與淋巴結—故膽囊動脈是「內容物」非邊界。腹腔鏡膽囊切除須清楚辨識此三角(critical view of safety)以免誤傷總膽管/肝動脈。","options":{"A":"含右肝動脈(內容物),非邊界。","B":"右肝管非標準邊界(為總肝管)。","C":"★正確(本題答案):總肝管+肝下緣+膽囊管。","D":"含腔動脈,錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114070-38":{"quick":"正確為 C(1245):Charcot 三徵(1)、Charcot 階段緊急手術非必須(可先 ERCP 引流)(2)、Reynolds 五徵不緊急引流會致命(4)、(5);敘述 3 錯—Reynolds 五徵=Charcot+「休克+意識改變」,非代謝性酸中毒。","detail":{"background":"總膽管結石(CBD stone):續發性(由膽囊掉落,<2 年)vs 原發性(膽道內生成,膽囊切除>2 年後發現)。阻塞性黃疸為典型;超音波見總膽管擴張;ERCP 可診斷與「治療(取石)」,>90% 可取出。急性膽管炎(細菌性膽道感染+阻塞):Charcot 三徵=發燒、黃疸、右上腹痛;Reynolds 五徵=Charcot+休克+意識改變(敗血性),需「緊急膽道引流(ERCP/PTCD)」+抗生素,否則致命。膽道留置導管者較易無黃疸性膽管炎。","options":{"A":"1234:含 3(錯)。","B":"2345:含 3(錯)。","C":"★正確(本題答案):1、2、4、5。","D":"僅345:含 3 且漏 1、2。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114070-54":{"quick":"錯在 A:腹腔鏡膽囊切除的「膽管損傷」風險其實較開腹「略高」,不能說嚴重併發症「遠低於」開腹。","detail":{"background":"膽結石:膽固醇結石(肥胖、女性、多產、>40 歲、快速減重、長期禁食/TPN)與色素結石(溶血、肝硬化、感染)。多數無症狀(不需手術);「有症狀膽結石」治療首選「腹腔鏡膽囊切除術」。急性結石性膽囊炎:膽囊管被結石阻塞→發炎;Murphy 徵(右上腹深按時「吸氣」突然中止)為特徵;超音波為首選(敏感>80%、特異>90%,見結石+膽囊壁增厚+周圍積液),CT 敏感度不優於超音波;早期腹腔鏡膽囊切除(72 小時內)或先抗生素再延遲切除。膽囊切除適應症:有症狀膽結石、膽囊息肉>10 mm、瓷膽囊、無結石性膽囊炎、膽囊結石>3 cm(癌風險)。","options":{"A":"★錯誤(本題答案):膽管損傷風險腹腔鏡略高,非遠低於開腹。","B":"正確:術後疼痛較低。","C":"正確:恢復較快。","D":"正確:用於急性膽囊炎手術時間較長、膽管損傷機率較高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-8":{"quick":"最不適當為 B:急性膽囊炎「超音波」為首選且較敏感,CT 敏感度「不」優於超音波。","detail":{"background":"膽結石:膽固醇結石(肥胖、女性、多產、>40 歲、快速減重、長期禁食/TPN)與色素結石(溶血、肝硬化、感染)。多數無症狀(不需手術);「有症狀膽結石」治療首選「腹腔鏡膽囊切除術」。急性結石性膽囊炎:膽囊管被結石阻塞→發炎;Murphy 徵(右上腹深按時「吸氣」突然中止)為特徵;超音波為首選(敏感>80%、特異>90%,見結石+膽囊壁增厚+周圍積液),CT 敏感度不優於超音波;早期腹腔鏡膽囊切除(72 小時內)或先抗生素再延遲切除。膽囊切除適應症:有症狀膽結石、膽囊息肉>10 mm、瓷膽囊、無結石性膽囊炎、膽囊結石>3 cm(癌風險)。","options":{"A":"適當:發燒+右上腹痛表現。","B":"★最不適當(本題答案):CT 敏感度不優於超音波。","C":"適當:構造不清時可部分膽囊切除避免傷總膽管。","D":"適當:抗生素保守後延遲手術約 20% 失敗。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"101030-12":{"quick":"小兒總膽管囊腫最少見症狀為 C:膽道結石。典型三徵為腹痛、黃疸、腹部腫塊。","detail":{"background":"總膽管囊腫(choledochal cyst):女性多;Todani 分五型(I 型最常見)。典型三徵=腹痛、黃疸、右上腹腫塊(小兒結石較少見)。有惡性變化(膽管癌)風險→「即使無症狀也應全切除」+Roux-en-Y 肝管空腸吻合(不全切除日後仍會癌變)。","options":{"A":"常見:腹痛。","B":"常見:黃疸。","C":"★最少見(本題答案):膽道結石。","D":"常見:腹部腫塊。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102030-38":{"quick":"非膽管癌危險因子者為 B:單純總膽管結石。","detail":{"background":"膽管癌(cholangiocarcinoma):依位置分肝內、肝門(perihilar,最常見,即 Klatskin 腫瘤,位左右肝管匯合處)、遠端。危險因子:原發性硬化性膽管炎(PSC)、總膽管/膽管囊腫、反覆化膿性膽管炎、肝吸蟲、肝內結石、B/C 肝、NAFLD。>90% 肝門/遠端膽管癌以「阻塞性黃疸」表現;肝門癌 CT 不易見腫塊,反見「肝內膽管擴張+萎縮膽囊」。Bismuth-Corlette 肝門癌分型:I 在匯合處「以下」、II 達匯合處、IIIa/b 延伸至右/左肝管、IV 雙側。手術依分型:I/II 可膽囊+總膽管切除+膽腸吻合;III/IV 需「合併肝切除」。對化療反應有限(gemcitabine+cisplatin)、預後不佳。","options":{"A":"是:原發性硬化性膽管炎。","B":"★非(本題答案):單純總膽管結石非典型危險因子。","C":"是:先天性膽管囊腫。","D":"是:反覆化膿性膽管炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103030-38":{"quick":"最不適當為 B:膽道出血(hemobilia)首選「血管栓塞」止血,手術非最佳/首選。","detail":{"background":"膽道出血(hemobilia):多為醫源性(肝穿刺、PTCD、膽道介入)取代過去外傷;以「動脈出血」為主(門脈出血少且易自止);典型三徵=上腹痛、上消化道出血(經膽道入十二指腸)、黃疸。診斷用內視鏡/CT/血管攝影;治療首選「血管攝影栓塞(TAE)」,手術為後線。","options":{"A":"正確:以動脈出血為主、門脈少。","B":"★最不適當(本題答案):首選血管栓塞,非手術。","C":"正確:三徵=上腹痛+上消化道出血+黃疸。","D":"正確:內視鏡/CT/血管攝影。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103030-46":{"quick":"Kasai 術後用藥「不」包括 B:cyclosporine(抗排斥藥,用於移植);術後用類固醇、ursodeoxycholic acid、脂溶性維生素 ADEK。","detail":{"background":"膽道閉鎖(biliary atresia):新生兒進行性膽道纖維化閉塞→持續性黃疸、灰白便(clay-colored)、直接型膽紅素升高。須先排除新生兒肝炎等。超音波見三角索徵/膽囊缺如(「無」肝內膽管擴張);HIDA 掃描不排泄;「肝切片+術中膽道攝影」為確診。治療:60 天內行「葛西氏手術(Kasai 肝門腸吻合)」;預後因子=手術年齡、肝纖維化程度、術後膽管炎頻率;多數最終仍需肝臟移植(非 Kasai 即治癒)。術後用類固醇、ursodeoxycholic acid、脂溶性維生素 ADEK、抗生素(非用 cyclosporine 抗排斥)。","options":{"A":"包括:類固醇。","B":"★不包括(本題答案):cyclosporine 為移植抗排斥藥。","C":"包括:ursodeoxycholic acid。","D":"包括:維生素 A/D/E/K。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104030-50":{"quick":"預後因素「除外」者為 D:病人血型。預後因子=手術年齡、術後膽管炎頻率、肝纖維化程度。","detail":{"background":"膽道閉鎖(biliary atresia):新生兒進行性膽道纖維化閉塞→持續性黃疸、灰白便(clay-colored)、直接型膽紅素升高。須先排除新生兒肝炎等。超音波見三角索徵/膽囊缺如(「無」肝內膽管擴張);HIDA 掃描不排泄;「肝切片+術中膽道攝影」為確診。治療:60 天內行「葛西氏手術(Kasai 肝門腸吻合)」;預後因子=手術年齡、肝纖維化程度、術後膽管炎頻率;多數最終仍需肝臟移植(非 Kasai 即治癒)。術後用類固醇、ursodeoxycholic acid、脂溶性維生素 ADEK、抗生素(非用 cyclosporine 抗排斥)。","options":{"A":"是:手術矯治年齡。","B":"是:術後膽道炎頻率。","C":"是:肝纖維化程度。","D":"★除外(本題答案):血型。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-52":{"quick":"錯在 C:總膽管囊腫「常有」黃疸,非「很少」。","detail":{"background":"總膽管囊腫(choledochal cyst):女性多;Todani 分五型(I 型最常見)。典型三徵=腹痛、黃疸、右上腹腫塊(小兒結石較少見)。有惡性變化(膽管癌)風險→「即使無症狀也應全切除」+Roux-en-Y 肝管空腸吻合(不全切除日後仍會癌變)。","options":{"A":"正確:女性比例較高。","B":"正確:囊腫全切除+Roux-en-Y 膽管空腸吻合。","C":"★錯誤(本題答案):常有黃疸。","D":"正確:不全切除日後可癌變。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106020-40":{"quick":"錯在 A:膽管癌最好發位置為「肝門處(perihilar/Klatskin)」,非肝內膽管癌。","detail":{"background":"膽管癌(cholangiocarcinoma):依位置分肝內、肝門(perihilar,最常見,即 Klatskin 腫瘤,位左右肝管匯合處)、遠端。危險因子:原發性硬化性膽管炎(PSC)、總膽管/膽管囊腫、反覆化膿性膽管炎、肝吸蟲、肝內結石、B/C 肝、NAFLD。>90% 肝門/遠端膽管癌以「阻塞性黃疸」表現;肝門癌 CT 不易見腫塊,反見「肝內膽管擴張+萎縮膽囊」。Bismuth-Corlette 肝門癌分型:I 在匯合處「以下」、II 達匯合處、IIIa/b 延伸至右/左肝管、IV 雙側。手術依分型:I/II 可膽囊+總膽管切除+膽腸吻合;III/IV 需「合併肝切除」。對化療反應有限(gemcitabine+cisplatin)、預後不佳。","options":{"A":"★錯誤(本題答案):最好發為肝門處,非肝內。","B":"正確:>90% 遠端/肝門癌以阻塞性黃疸表現。","C":"正確:肝門癌 CT 見肝內膽管擴大+萎縮膽囊。","D":"正確:Bismuth I/II 無血管侵犯可切除+膽腸吻合。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106080-22":{"quick":"無痛性黃疸(灰白便、深色尿)快速鑑別→C:腹部超音波(快速分辨阻塞性 vs 非阻塞性黃疸)。","detail":{"background":"無痛性阻塞性黃疸(灰白便、茶色尿)需快速鑑別「阻塞性(肝外膽道阻塞,如腫瘤/結石)vs 肝細胞性」。最快床邊工具為「腹部超音波」—看膽管是否擴張(擴張→肝外阻塞);抽血膽紅素/肝炎指數需時間且無法定位,CT 後續評估。","options":{"A":"肝炎血清非快速鑑別阻塞與否。","B":"膽紅素分型無法定位阻塞。","C":"★正確(本題答案):腹部超音波快速看膽管擴張。","D":"CT 為後續分期,非最快。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106080-73":{"quick":"疲倦+黃疸+CA19-9 升高+CT→D:胰臟頭癌。","detail":{"background":"胰臟頭癌:無痛性阻塞性黃疸(壓迫總膽管)、體重減輕、CA19-9 升高、CT 見胰頭腫塊+「雙管徵(總膽管與胰管同時擴張,double duct sign)」。為癌王、預後差。","options":{"A":"肝內膽管癌較少 CA19-9+胰頭腫塊。","B":"HCC 以 AFP、肝硬化背景為主。","C":"胃癌不致雙管擴張。","D":"★正確(本題答案):胰臟頭癌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-32":{"quick":"胰頭 4 cm 腫瘤+雙管擴張,最不適當為 A:血管攝影栓塞(對胰頭癌無治療角色)。","detail":{"background":"胰頭腫瘤合併總膽管與胰管擴張(雙管徵)疑胰頭癌:應測 CEA/CA19-9、以 ERCP/EUS(可切片+放支架引流黃疸)、MRCP 評估膽胰管與可切除性。「血管攝影栓塞」對胰頭癌無治療角色(非血管病灶)。","options":{"A":"★最不適當(本題答案):血管栓塞無角色。","B":"適當:測 CEA/CA19-9。","C":"適當:ERCP/EUS 切片+引流。","D":"適當:MRCP 評估膽胰管。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-48":{"quick":"錯在 C:膽道閉鎖多數 Kasai 術後預後「不」良好,常最終仍需肝臟移植。","detail":{"background":"膽道閉鎖(biliary atresia):新生兒進行性膽道纖維化閉塞→持續性黃疸、灰白便(clay-colored)、直接型膽紅素升高。須先排除新生兒肝炎等。超音波見三角索徵/膽囊缺如(「無」肝內膽管擴張);HIDA 掃描不排泄;「肝切片+術中膽道攝影」為確診。治療:60 天內行「葛西氏手術(Kasai 肝門腸吻合)」;預後因子=手術年齡、肝纖維化程度、術後膽管炎頻率;多數最終仍需肝臟移植(非 Kasai 即治癒)。術後用類固醇、ursodeoxycholic acid、脂溶性維生素 ADEK、抗生素(非用 cyclosporine 抗排斥)。","options":{"A":"正確:持續性黃疸。","B":"正確:灰白便。","C":"★錯誤(本題答案):多數仍需肝移植,非預後良好不需。","D":"正確:須先排除新生兒肝炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107080-42":{"quick":"錯在 C(亦接受 D):總膽管囊腫「即使無症狀也應手術切除」(癌變風險),非僅有症狀才手術。","detail":{"background":"總膽管囊腫(choledochal cyst):女性多;Todani 分五型(I 型最常見)。典型三徵=腹痛、黃疸、右上腹腫塊(小兒結石較少見)。有惡性變化(膽管癌)風險→「即使無症狀也應全切除」+Roux-en-Y 肝管空腸吻合(不全切除日後仍會癌變)。","options":{"A":"正確:Todani 分五型。","B":"正確:典型三徵腹痛/黃疸/腫塊。","C":"★錯誤(本題答案):無症狀也應切除(癌變風險)。","D":"(給分)正確治療為囊腫切除+Roux-en-Y 肝管空腸吻合。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-1":{"quick":"肝門膽管癌侷限於總肝管(未達匯合處)→A:Bismuth-Corlette Type I。","detail":{"background":"膽管癌(cholangiocarcinoma):依位置分肝內、肝門(perihilar,最常見,即 Klatskin 腫瘤,位左右肝管匯合處)、遠端。危險因子:原發性硬化性膽管炎(PSC)、總膽管/膽管囊腫、反覆化膿性膽管炎、肝吸蟲、肝內結石、B/C 肝、NAFLD。>90% 肝門/遠端膽管癌以「阻塞性黃疸」表現;肝門癌 CT 不易見腫塊,反見「肝內膽管擴張+萎縮膽囊」。Bismuth-Corlette 肝門癌分型:I 在匯合處「以下」、II 達匯合處、IIIa/b 延伸至右/左肝管、IV 雙側。手術依分型:I/II 可膽囊+總膽管切除+膽腸吻合;III/IV 需「合併肝切除」。對化療反應有限(gemcitabine+cisplatin)、預後不佳。","options":{"A":"★正確(本題答案):Type I(匯合處以下)。","B":"Type II 達匯合處。","C":"Type III 延伸至單側肝管。","D":"Type IV 雙側肝管。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-42":{"quick":"膽道閉鎖確診黃金標準為 D:肝臟切片(+術中膽道攝影)。","detail":{"background":"膽道閉鎖(biliary atresia):新生兒進行性膽道纖維化閉塞→持續性黃疸、灰白便(clay-colored)、直接型膽紅素升高。須先排除新生兒肝炎等。超音波見三角索徵/膽囊缺如(「無」肝內膽管擴張);HIDA 掃描不排泄;「肝切片+術中膽道攝影」為確診。治療:60 天內行「葛西氏手術(Kasai 肝門腸吻合)」;預後因子=手術年齡、肝纖維化程度、術後膽管炎頻率;多數最終仍需肝臟移植(非 Kasai 即治癒)。術後用類固醇、ursodeoxycholic acid、脂溶性維生素 ADEK、抗生素(非用 cyclosporine 抗排斥)。","options":{"A":"病毒血清為排除鑑別,非確診。","B":"超音波為輔助(三角索徵)。","C":"HIDA 顯示不排泄但非確診。","D":"★正確(本題答案):肝臟切片(+術中膽道攝影)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-28":{"quick":"錯在 D:膽道癌對化療「效果有限」(非很好),放療角色亦不明確。","detail":{"background":"膽管癌(cholangiocarcinoma):依位置分肝內、肝門(perihilar,最常見,即 Klatskin 腫瘤,位左右肝管匯合處)、遠端。危險因子:原發性硬化性膽管炎(PSC)、總膽管/膽管囊腫、反覆化膿性膽管炎、肝吸蟲、肝內結石、B/C 肝、NAFLD。>90% 肝門/遠端膽管癌以「阻塞性黃疸」表現;肝門癌 CT 不易見腫塊,反見「肝內膽管擴張+萎縮膽囊」。Bismuth-Corlette 肝門癌分型:I 在匯合處「以下」、II 達匯合處、IIIa/b 延伸至右/左肝管、IV 雙側。手術依分型:I/II 可膽囊+總膽管切除+膽腸吻合;III/IV 需「合併肝切除」。對化療反應有限(gemcitabine+cisplatin)、預後不佳。","options":{"A":"正確:Klatskin(肝門)最常見。","B":"正確:肝內膽管癌與病毒/NAFLD/肝硬化/糖尿病相關。","C":"正確:完整切除為準則,可開刀比例約 60%。","D":"★錯誤(本題答案):化療效果有限,非很好。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110020-39":{"quick":"錯在 A:兒童膽結石大多為「色素結石(pigment stone)」(溶血相關),非膽固醇結石。","detail":{"background":"兒童膽結石:不同於成人,以「色素結石」為主,常與溶血性疾病(地中海貧血、遺傳性球形紅血球症等)相關→可做「紅血球脆性測驗」;與肥胖較無關。有症狀者應切除膽囊。","options":{"A":"★錯誤(本題答案):兒童多為色素結石。","B":"正確:與肥胖較無關。","C":"正確:可做紅血球脆性測驗(查溶血)。","D":"正確:有症狀應切除膽囊。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112020-36":{"quick":"最恰當為 D:膽道癌儘管手術積極,預後仍不佳。","detail":{"background":"膽囊癌:膽結石是「最重要危險因子」(約 85% 病患合併結石)、瓷膽囊、女性多、預後差;常於膽囊切除標本「偶然」發現或晚期黃疸。分期:T1a(侵黏膜固有層)單純膽囊切除即可;T1b 以上(侵肌層/漿膜下)需「根除性切除(含部分肝床+淋巴清掃)」。","options":{"A":"錯:膽囊癌好發女性(非男性)。","B":"錯:T1a 單純膽囊切除即可,非一律清淋巴(T1b 以上才根除)。","C":"錯:遠端膽管癌預後優於肝門 Klatskin。","D":"★正確(本題答案):膽道癌預後仍不佳。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-31":{"quick":"正確為 C:膽結石是膽囊癌最重要危險因子,約 85% 伴隨膽結石。","detail":{"background":"膽囊癌:膽結石是「最重要危險因子」(約 85% 病患合併結石)、瓷膽囊、女性多、預後差;常於膽囊切除標本「偶然」發現或晚期黃疸。分期:T1a(侵黏膜固有層)單純膽囊切除即可;T1b 以上(侵肌層/漿膜下)需「根除性切除(含部分肝床+淋巴清掃)」。","options":{"A":"錯:非大部分經腹腔鏡偶然發現(多晚期診斷)。","B":"錯:整體預後差,非 80% 五年存活。","C":"★正確(本題答案):膽結石為最重要危險因子(~85%)。","D":"錯:T2 需根除性切除,非只追蹤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-4":{"quick":"Klatskin tumor 位於 A:左右肝管匯合處(肝門)。","detail":{"background":"膽管癌(cholangiocarcinoma):依位置分肝內、肝門(perihilar,最常見,即 Klatskin 腫瘤,位左右肝管匯合處)、遠端。危險因子:原發性硬化性膽管炎(PSC)、總膽管/膽管囊腫、反覆化膿性膽管炎、肝吸蟲、肝內結石、B/C 肝、NAFLD。>90% 肝門/遠端膽管癌以「阻塞性黃疸」表現;肝門癌 CT 不易見腫塊,反見「肝內膽管擴張+萎縮膽囊」。Bismuth-Corlette 肝門癌分型:I 在匯合處「以下」、II 達匯合處、IIIa/b 延伸至右/左肝管、IV 雙側。手術依分型:I/II 可膽囊+總膽管切除+膽腸吻合;III/IV 需「合併肝切除」。對化療反應有限(gemcitabine+cisplatin)、預後不佳。","options":{"A":"★正確(本題答案):左右肝管匯合處。","B":"總膽管為遠端膽管癌。","C":"膽囊管非 Klatskin。","D":"壺腹處為壺腹癌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-46":{"quick":"正確為 C:膽道閉鎖鑑別診斷需排除新生兒肝炎。","detail":{"background":"膽道閉鎖(biliary atresia):新生兒進行性膽道纖維化閉塞→持續性黃疸、灰白便(clay-colored)、直接型膽紅素升高。須先排除新生兒肝炎等。超音波見三角索徵/膽囊缺如(「無」肝內膽管擴張);HIDA 掃描不排泄;「肝切片+術中膽道攝影」為確診。治療:60 天內行「葛西氏手術(Kasai 肝門腸吻合)」;預後因子=手術年齡、肝纖維化程度、術後膽管炎頻率;多數最終仍需肝臟移植(非 Kasai 即治癒)。術後用類固醇、ursodeoxycholic acid、脂溶性維生素 ADEK、抗生素(非用 cyclosporine 抗排斥)。","options":{"A":"錯:超音波「無」肝內膽管擴張(可見三角索/膽囊缺如)。","B":"錯:ERCP 非最常用確診(用肝切片+術中膽道攝影)。","C":"★正確(本題答案):需排除新生兒肝炎。","D":"錯:Kasai 術後非九成治癒,多仍需移植。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-35":{"quick":"Bismuth-Corlette Type I 近端膽管癌最不必要的手術為 C:部分肝切除(Type I 在匯合處以下,不需肝切除;III/IV 才需)。","detail":{"background":"膽管癌(cholangiocarcinoma):依位置分肝內、肝門(perihilar,最常見,即 Klatskin 腫瘤,位左右肝管匯合處)、遠端。危險因子:原發性硬化性膽管炎(PSC)、總膽管/膽管囊腫、反覆化膿性膽管炎、肝吸蟲、肝內結石、B/C 肝、NAFLD。>90% 肝門/遠端膽管癌以「阻塞性黃疸」表現;肝門癌 CT 不易見腫塊,反見「肝內膽管擴張+萎縮膽囊」。Bismuth-Corlette 肝門癌分型:I 在匯合處「以下」、II 達匯合處、IIIa/b 延伸至右/左肝管、IV 雙側。手術依分型:I/II 可膽囊+總膽管切除+膽腸吻合;III/IV 需「合併肝切除」。對化療反應有限(gemcitabine+cisplatin)、預後不佳。","options":{"A":"需:膽囊切除。","B":"需:總膽管切除。","C":"★最不必要(本題答案):Type I 不需部分肝切除。","D":"需:肝動脈及門靜脈周圍淋巴廓清。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"101030-22":{"quick":"胰臟假性囊腫最常見原因為 C:胰臟炎。","detail":{"background":"胰臟假性囊腫(無上皮的纖維性包覆積液):最常見續發於「急性/慢性胰臟炎」(胰管破裂滲漏);也見於胰臟外傷、術後。需與「胰臟囊狀腫瘤」鑑別。","options":{"A":"寄生蟲非主因。","B":"胰臟腫瘤為囊狀腫瘤,非假性囊腫主因。","C":"★正確(本題答案):胰臟炎。","D":"手術後較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"101030-52":{"quick":"反覆胰臟炎+胰頭病灶切除→本題接受 C/D:幽門保留胰十二指腸切除(C)或十二指腸保留胰頭切除(D)。","detail":{"background":"年輕反覆胰臟炎、主胰管狹窄、疑胰頭腫瘤者,胰頭切除術式包括:Whipple、「幽門保留胰十二指腸切除(PPPD)」、「十二指腸保留胰頭切除(Beger)」。本題依檢體接受 C、D 皆給分。Puestow(側側胰管空腸吻合)用於胰管擴張之引流而非切除胰頭。","options":{"A":"Puestow 為引流術,非切除胰頭。","B":"Whipple 為標準胰十二指腸切除。","C":"★(本題答案)幽門保留胰十二指腸切除。","D":"★(給分)十二指腸保留胰頭切除(Beger)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102030-43":{"quick":"不是胰臟炎併發症者為 D:胰管分裂(pancreas divisum)—它是先天變異(胰臟炎的「原因」之一),非併發症。","detail":{"background":"急性胰臟炎:最常見原因「膽道結石」與「酒精」(約 70–80%),其他 ERCP 後、高三酸甘油酯、高血鈣、藥物、自體免疫。診斷需 3 取 2(典型腹痛輻射至背、amylase/lipase >3 倍、影像)。「amylase 高低不能預測嚴重度」;嚴重度用 Ranson、APACHE II、CT 嚴重度指數。常致「低血鈣」(脂肪皂化)、低血容/急性腎衰竭、低血氧/ARDS。局部併發症:積液、假性囊腫、壞死(walled-off necrosis)、膿瘍;「無菌性壞死不需預防性抗生素」(僅感染性壞死才需);後期可血管侵蝕成假性動脈瘤(脾動脈最常見)。手術適應症:「僅在感染性壞死或感染性積聚」才介入(且儘量延遲、step-up:經皮/內視鏡引流→微創壞死清創),非確診嚴重即早期清創。","options":{"A":"是併發症:假性囊腫。","B":"是併發症:胰周壞死。","C":"是併發症:胰臟膿瘍。","D":"★不是(本題答案):pancreas divisum 為先天變異/病因。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102110-34":{"quick":"Hemosuccus pancreaticus 意為 C:胰臟炎引起的「假性動脈瘤破裂出血流入胰管」(經乳頭至十二指腸的上消化道出血)。","detail":{"background":"Hemosuccus pancreaticus:慢性胰臟炎/假性囊腫侵蝕血管(常脾動脈)形成假性動脈瘤,破裂「出血流入胰管」→經 Vater 乳頭進入十二指腸→間歇性上消化道出血+腹痛。診斷/治療以血管攝影栓塞為主。","options":{"A":"籠統「胰臟出血」不精確。","B":"流至腹腔為腹腔內出血,非此定義。","C":"★正確(本題答案):假性動脈瘤出血流入胰管。","D":"非胃潰瘍出血。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104030-36":{"quick":"最常見急性胰臟炎原因為 A:膽道結石。","detail":{"background":"急性胰臟炎:最常見原因「膽道結石」與「酒精」(約 70–80%),其他 ERCP 後、高三酸甘油酯、高血鈣、藥物、自體免疫。診斷需 3 取 2(典型腹痛輻射至背、amylase/lipase >3 倍、影像)。「amylase 高低不能預測嚴重度」;嚴重度用 Ranson、APACHE II、CT 嚴重度指數。常致「低血鈣」(脂肪皂化)、低血容/急性腎衰竭、低血氧/ARDS。局部併發症:積液、假性囊腫、壞死(walled-off necrosis)、膿瘍;「無菌性壞死不需預防性抗生素」(僅感染性壞死才需);後期可血管侵蝕成假性動脈瘤(脾動脈最常見)。手術適應症:「僅在感染性壞死或感染性積聚」才介入(且儘量延遲、step-up:經皮/內視鏡引流→微創壞死清創),非確診嚴重即早期清創。","options":{"A":"★正確(本題答案):膽道結石最常見。","B":"酒精次之。","C":"高血鈣較少。","D":"ERCP 後較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104090-34":{"quick":"錯在 C:若有「下游胰管阻塞」,假性囊腫應優先「內引流(囊腸吻合)」,而非外引流(外引流易形成胰瘻)。","detail":{"background":"胰臟假性囊腫處置:無症狀且不增大可觀察;須與囊狀腫瘤鑑別。需引流時,若「下游胰管阻塞/與主胰管相通」應「內引流(囊胃/囊腸吻合或內視鏡引流)」使胰液引入腸道;「外引流」用於感染或不成熟囊腫,但易形成胰皮膚瘻管。","options":{"A":"正確:目的緩解症狀預防併發症。","B":"正確:須與囊狀腫瘤鑑別。","C":"★錯誤(本題答案):下游阻塞應內引流,非外引流。","D":"正確:無症狀不增大可觀察。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104090-52":{"quick":"酗酒+反覆腹背痛+CT→A:慢性胰臟炎併胰臟鈣化及胰管結石。","detail":{"background":"慢性胰臟炎:最常見原因為「酗酒」(約 70–80%);反覆腹痛輻射至背、胰管擴張/結石、實質鈣化、胰外分泌(脂肪瀉)與內分泌(糖尿病)功能不足。鈣化在 CT 較 X 光易辨識(非 X 光都清晰可見)。手術(頑固疼痛):主胰管擴張(>7 mm,如題>1 cm)→「側側胰管空腸吻合(Puestow,lateral pancreaticojejunostomy)」並清除胰管結石;若胰頭為主病灶可 Frey/Beger/Whipple。","options":{"A":"★正確(本題答案):慢性胰臟炎(鈣化+胰管結石)。","B":"急性胰臟炎為單次急性發炎。","C":"胰臟癌影像/病程不同。","D":"膽結石非此慢性鈣化表現。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104090-53":{"quick":"主胰管>1 cm 之慢性胰臟炎手術→B:Puestow(側側胰管空腸吻合)並清除胰管結石。","detail":{"background":"慢性胰臟炎:最常見原因為「酗酒」(約 70–80%);反覆腹痛輻射至背、胰管擴張/結石、實質鈣化、胰外分泌(脂肪瀉)與內分泌(糖尿病)功能不足。鈣化在 CT 較 X 光易辨識(非 X 光都清晰可見)。手術(頑固疼痛):主胰管擴張(>7 mm,如題>1 cm)→「側側胰管空腸吻合(Puestow,lateral pancreaticojejunostomy)」並清除胰管結石;若胰頭為主病灶可 Frey/Beger/Whipple。","options":{"A":"Whipple 用於胰頭腫瘤,非引流。","B":"★正確(本題答案):Puestow 引流+清石。","C":"膽囊切除不解決胰管問題。","D":"單純引流管不足。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-34":{"quick":"最不常見局部併發症為 D:腎動脈血栓。","detail":{"background":"急性胰臟炎:最常見原因「膽道結石」與「酒精」(約 70–80%),其他 ERCP 後、高三酸甘油酯、高血鈣、藥物、自體免疫。診斷需 3 取 2(典型腹痛輻射至背、amylase/lipase >3 倍、影像)。「amylase 高低不能預測嚴重度」;嚴重度用 Ranson、APACHE II、CT 嚴重度指數。常致「低血鈣」(脂肪皂化)、低血容/急性腎衰竭、低血氧/ARDS。局部併發症:積液、假性囊腫、壞死(walled-off necrosis)、膿瘍;「無菌性壞死不需預防性抗生素」(僅感染性壞死才需);後期可血管侵蝕成假性動脈瘤(脾動脈最常見)。手術適應症:「僅在感染性壞死或感染性積聚」才介入(且儘量延遲、step-up:經皮/內視鏡引流→微創壞死清創),非確診嚴重即早期清創。","options":{"A":"常見:胰臟蜂窩組織(phlegmon)。","B":"可見:胰臟膿瘍。","C":"常見:假性囊腫。","D":"★最不常見(本題答案):腎動脈血栓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105100-38":{"quick":"最不像急性胰臟炎者為 C:血鈣「上升」(急性胰臟炎反致低血鈣)。","detail":{"background":"急性胰臟炎:最常見原因「膽道結石」與「酒精」(約 70–80%),其他 ERCP 後、高三酸甘油酯、高血鈣、藥物、自體免疫。診斷需 3 取 2(典型腹痛輻射至背、amylase/lipase >3 倍、影像)。「amylase 高低不能預測嚴重度」;嚴重度用 Ranson、APACHE II、CT 嚴重度指數。常致「低血鈣」(脂肪皂化)、低血容/急性腎衰竭、低血氧/ARDS。局部併發症:積液、假性囊腫、壞死(walled-off necrosis)、膿瘍;「無菌性壞死不需預防性抗生素」(僅感染性壞死才需);後期可血管侵蝕成假性動脈瘤(脾動脈最常見)。手術適應症:「僅在感染性壞死或感染性積聚」才介入(且儘量延遲、step-up:經皮/內視鏡引流→微創壞死清創),非確診嚴重即早期清創。","options":{"A":"符合:上腹痛輻 、糖尿病;遺傳症候群—HNPCC/Lynch、Peutz-Jeghers、ataxia-telangiectasia、FAMMM、BRCA、遺傳性胰臟炎(非家族性甲狀腺癌)。「好發胰頭」(~70%,致無痛性阻塞性黃疸+雙管徵);診斷以多切面 CT(評估轉移與可切除性),CA19-9 為標記;預後在壺腹周圍癌中最差。胰頭癌→胰十二指腸切除(Whipple/PPPD,切除胰頭+遠端總膽管+十二指腸±遠端胃,不含脾與腹腔幹);診斷性腹腔鏡可排除腹膜轉移。","options":{"A":"相關:HNPCC/Lynch。","B":"★除外(本題答案):家族性甲狀腺癌與胰臟癌無關。","C":"相關:Peutz-Jeghers。","D":"相關:ataxia-telangiectasia。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"103030-35":{"quick":"錯在 D:壞死性遊走性紅斑(necrolytic migratory erythema)是「升糖素瘤(glucagonoma)」特徵,非胰島素瘤。","detail":{"background":"胰島素瘤(insulinoma):最常見功能性胰臟內分泌腫瘤、約 90% 良性、單發;Whipple 三徵=低血糖症狀+當時血糖<50+「給葡萄糖後症狀緩解」。為「富血管(hypervascular)」腫瘤,動脈相 CT 強化。術前定位以「選擇性動脈鈣刺激試驗+肝靜脈取樣」最精確,術中超音波亦重要。胰臟神經內分泌瘤(pNET):功能性以胰島素瘤最多,其次胃泌素瘤(ZES);非功能性也常見。轉移以肝最常見,生長慢、可手術切除/RFA/TACE 減積,荷爾蒙症狀用長效 somatostatin analogue。","options":{"A":"正確:神經低血糖症狀(混亂/視糊)常見。","B":"正確:交感症狀(心悸/手抖)常見。","C":"正確:選擇性動脈鈣刺激+肝靜脈取樣定位。","D":"★錯誤(本題答案):壞死性遊走性紅斑為升糖素瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"104030-35":{"quick":"本題接受 A/B 給分:A—「類癌是肝轉移較常見種類」之絕對化敘述被視為可議;此類分化良好 NET 肝轉移生長慢,手術/RFA/TACE/somatostatin 皆為選項。","detail":{"background":"神經內分泌瘤肝轉移:多分化良好、生長緩慢,部分不治療仍可長期存活;治療含手術切除、射頻消融(RFA)、經動脈化學栓塞(TACE)、長效 somatostatin analogue(控制荷爾蒙症狀)。本題答案鍵接受 A、B 給分。","options":{"A":"★(本題答案/給分):絕對化敘述被視為可議。","B":"(給分):多生長緩慢、可長期存活。","C":"正確:手術/RFA/TACE 皆可考慮。","D":"正確:荷爾蒙症狀用長效 somatostatin analogue。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105020-35":{"quick":"錯在 C:MEN1 為第 11 對染色體突變顯性遺傳,常見「副甲狀腺+腦下垂體+胰臟」三 P,非「攝護腺(prostate)」。","detail":{"background":"Zollinger-Ellison 症候群(胃泌素瘤):大量 gastrin→胃酸過多→頑固/多發消化性潰瘍、嚴重食道炎、腹瀉。多位於「胃泌素瘤三角(Passaro tri角)」—膽囊管與總膽管交界、十二指腸第二三部交界、胰頸與胰體交界。約 25% 合併 MEN1(須排除);視為惡性(有淋巴/肝轉移風險);酸抑制用高劑量 PPI。","options":{"A":"正確:頑固潰瘍/嚴重食道炎/腹瀉應想到 ZES。","B":"正確:gastrinoma 約 75% 偶發、25% 合併 MEN1。","C":"★錯誤(本題答案):MEN1 為副甲狀腺/腦下垂體/胰臟,非攝護腺。","D":"正確:MEN1 合併副甲亢+pNET 應優先處理副甲狀腺亢進。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"105020-36":{"quick":"錯在 C:T3N0M0 與 T2N1M0 之 AJCC 分期並非相同(N 分期不同會影響整體 stage)。","detail":{"background":"胰臟癌(胰管腺癌 ductal adenocarcinoma 最多):危險因子年齡、抽菸、家族史、慢性胰臟炎、肥胖、糖尿病;遺傳症候群—HNPCC/Lynch、Peutz-Jeghers、ataxia-telangiectasia、FAMMM、BRCA、遺傳性胰臟炎(非家族性甲狀腺癌)。「好發胰頭」(~70%,致無痛性阻塞性黃疸+雙管徵);診斷以多切面 CT(評估轉移與可切除性),CA19-9 為標記;預後在壺腹周圍癌中最差。胰頭癌→胰十二指腸切除(Whipple/PPPD,切除胰頭+遠端總膽管+十二指腸±遠端胃,不含脾與腹腔幹);診斷性腹腔鏡可排除腹膜轉移。","options":{"A":"正確:最常見為胰管腺癌。","B":"正確:危險因子含年齡/家族史/抽菸/慢性胰臟炎。","C":"★錯誤(本題答案):兩者 AJCC 分期不同。","D":"正確:胰頭癌可 Whipple 切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106020-38":{"quick":"本題一律給分:轉移性胰臟內分泌瘤可用 diazoxide(降胰島素/高胃泌素)、減積手術(cytoreduction)後存活改善、PPI 控制 gastrinoma 胃酸、甚至骨轉移亦可考慮切除。","detail":{"background":"無法手術的轉移性 pNET 處置:長效 somatostatin analogue、減積(cytoreduction)手術改善症狀與存活、PPI 控制 ZES 胃酸、肝轉移 RFA/TACE、標靶(everolimus/sunitinib)、PRRT。本題各選項皆有其合理性,一律給分。","options":{"A":"(給分):相關藥物治療。","B":"(給分)。","C":"(給分):減積手術後存活改善。","D":"(給分):骨轉移亦可考慮切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"106020-43":{"quick":"術前定位最精確為 C:選擇性動脈鈣劑刺激試驗(+肝靜脈取樣)。","detail":{"background":"胰島素瘤(insulinoma):最常見功能性胰臟內分泌腫瘤、約 90% 良性、單發;Whipple 三徵=低血糖症狀+當時血糖<50+「給葡萄糖後症狀緩解」。為「富血管(hypervascular)」腫瘤,動脈相 CT 強化。術前定位以「選擇性動脈鈣刺激試驗+肝靜脈取樣」最精確,術中超音波亦重要。胰臟神經內分泌瘤(pNET):功能性以胰島素瘤最多,其次胃泌素瘤(ZES);非功能性也常見。轉移以肝最常見,生長慢、可手術切除/RFA/TACE 減積,荷爾蒙症狀用長效 somatostatin analogue。","options":{"A":"MRI 敏感度有限。","B":"血管造影單獨不夠精確。","C":"★正確(本題答案):動脈鈣刺激試驗最精確。","D":"術中超音波重要但屬「術中」非術前。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-33":{"quick":"一般「不」以 Whipple 處理者為 C:膽囊癌(以膽囊切除+肝床切除+淋巴清掃處理)。","detail":{"background":"胰臟癌(胰管腺癌 ductal adenocarcinoma 最多):危險因子年齡、抽菸、家族史、慢性胰臟炎、肥胖、糖尿病;遺傳症候群—HNPCC/Lynch、Peutz-Jeghers、ataxia-telangiectasia、FAMMM、BRCA、遺傳性胰臟炎(非家族性甲狀腺癌)。「好發胰頭」(~70%,致無痛性阻塞性黃疸+雙管徵);診斷以多切面 CT(評估轉移與可切除性),CA19-9 為標記;預後在壺腹周圍癌中最差。胰頭癌→胰十二指腸切除(Whipple/PPPD,切除胰頭+遠端總膽管+十二指腸±遠端胃,不含脾與腹腔幹);診斷性腹腔鏡可排除腹膜轉移。","options":{"A":"壺腹癌:以 Whipple 處理。","B":"胰鈎部癌:Whipple。","C":"★正確(本題答案):膽囊癌非 Whipple。","D":"遠端總膽管癌:Whipple。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107020-38":{"quick":"Whipple 三徵為 C(亦接受 B):低血糖症狀+血糖<50+「給葡萄糖後症狀緩解」。","detail":{"background":"胰島素瘤(insulinoma):最常見功能性胰臟內分泌腫瘤、約 90% 良性、單發;Whipple 三徵=低血糖症狀+當時血糖<50+「給葡萄糖後症狀緩解」。為「富血管(hypervascular)」腫瘤,動脈相 CT 強化。術前定位以「選擇性動脈鈣刺激試驗+肝靜脈取樣」最精確,術中超音波亦重要。胰臟神經內分泌瘤(pNET):功能性以胰島素瘤最多,其次胃泌素瘤(ZES);非功能性也常見。轉移以肝最常見,生長慢、可手術切除/RFA/TACE 減積,荷爾蒙症狀用長效 somatostatin analogue。","options":{"A":"含糖尿病藥史不屬三徵。","B":"(給分)口服葡萄糖後改善。","C":"★正確(本題答案):靜脈葡萄糖後症狀緩解。","D":"胰島素注射史為外因性低血糖,非三徵。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107080-31":{"quick":"不適合敘述為 A:胰臟癌好發「胰頭」(非體部);預後與診斷時分期最相關。","detail":{"background":"胰臟癌(胰管腺癌 ductal adenocarcinoma 最多):危險因子年齡、抽菸、家族史、慢性胰臟炎、肥胖、糖尿病;遺傳症候群—HNPCC/Lynch、Peutz-Jeghers、ataxia-telangiectasia、FAMMM、BRCA、遺傳性胰臟炎(非家族性甲狀腺癌)。「好發胰頭」(~70%,致無痛性阻塞性黃疸+雙管徵);診斷以多切面 CT(評估轉移與可切除性),CA19-9 為標記;預後在壺腹周圍癌中最差。胰頭癌→胰十二指腸切除(Whipple/PPPD,切除胰頭+遠端總膽管+十二指腸±遠端胃,不含脾與腹腔幹);診斷性腹腔鏡可排除腹膜轉移。","options":{"A":"★不適合(本題答案):好發胰頭,非體部。","B":"適合:多切面 CT 為最符效益診斷工具。","C":"適合:同期別預後較其他壺腹周圍癌差。","D":"適合:診斷性腹腔鏡排除腹膜轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"107080-35":{"quick":"Whipple 切除包含 D(134):胰頭(1)、遠端總膽管(3)、十二指腸(4);不含脾臟(2)與腹腔幹(5)。","detail":{"background":"胰臟癌(胰管腺癌 ductal adenocarcinoma 最多):危險因子年齡、抽菸、家族史、慢性胰臟炎、肥胖、糖尿病;遺傳症候群—HNPCC/Lynch、Peutz-Jeghers、ataxia-telangiectasia、FAMMM、BRCA、遺傳性胰臟炎(非家族性甲狀腺癌)。「好發胰頭」(~70%,致無痛性阻塞性黃疸+雙管徵);診斷以多切面 CT(評估轉移與可切除性),CA19-9 為標記;預後在壺腹周圍癌中最差。胰頭癌→胰十二指腸切除(Whipple/PPPD,切除胰頭+遠端總膽管+十二指腸±遠端胃,不含脾與腹腔幹);診斷性腹腔鏡可排除腹膜轉移。","options":{"A":"123:含 2(脾,錯)。","B":"135:含 5(腹腔幹,錯)。","C":"245:含 2、5 錯。","D":"★正確(本題答案):1、3、4。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-32":{"quick":"錯在 B:胃泌素瘤好發「胃泌素瘤三角」—膽囊/總膽管交界、十二指腸二三部交界、胰頸與胰體交界,而非「總膽管、胃、胰頸胰體之間」(含「胃」表述不正確)。","detail":{"background":"Zollinger-Ellison 症候群(胃泌素瘤):大量 gastrin→胃酸過多→頑固/多發消化性潰瘍、嚴重食道炎、腹瀉。多位於「胃泌素瘤三角(Passaro tri角)」—膽囊管與總膽管交界、十二指腸第二三部交界、胰頸與胰體交界。約 25% 合併 MEN1(須排除);視為惡性(有淋巴/肝轉移風險);酸抑制用高劑量 PPI。","options":{"A":"正確:gastrinoma 大量 gastrin→胃酸過多。","B":"★錯誤(本題答案):三角為膽道/十二指腸/胰頸體交界,非含胃。","C":"正確:約 1/4 合併 MEN1,須排除。","D":"正確:有轉移風險,視為惡性。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-35":{"quick":"最不適合肝切除者為 D:肝功能 Child-Pugh class B(肝儲備不足)。","detail":{"background":"神經內分泌瘤肝轉移選擇肝切除的條件:可切除≥90% 腫瘤體積(減積)、有明顯荷爾蒙症狀、藥物(somatostatin)控制不佳、肝功能良好(Child-Pugh A)。肝功能差(Child-Pugh B/C)者切除風險高、最不適合。","options":{"A":"適合:可切除>95% 腫瘤。","B":"適合:藥物治療無效。","C":"適合:有明顯神經內分泌症狀。","D":"★最不適合(本題答案):Child-Pugh B 肝儲備不足。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108030-37":{"quick":"好發女性者為 B(134):漿液性囊狀腺瘤(1)、實體偽乳突腫瘤(3,年輕女性)、黏液性囊狀腫瘤(4);IPMN(2)較多見於男性/年長。","detail":{"background":"胰臟囊狀病灶:漿液性囊狀腺瘤(serous cystadenoma,年長女性「祖母瘤」、良性、蜂巢狀)、黏液性囊狀腫瘤(MCN,中年女性、胰體尾、有癌變風險)、實體偽乳突腫瘤(SPN,年輕女性)皆好發女性;胰管內乳突黏液性腫瘤(IPMN)較多見於男性年長者。","options":{"A":"124:含 2(IPMN,非女性好發)。","B":"★正確(本題答案):1、3、4。","C":"145:含不符。","D":"235:含 2。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"108080-32":{"quick":"錯在 C:胰島素瘤是「富血管(hypervascular)」腫瘤,動脈相 CT 呈「強化」,非低顯影。","detail":{"background":"胰島素瘤(insulinoma):最常見功能性胰臟內分泌腫瘤、約 90% 良性、單發;Whipple 三徵=低血糖症狀+當時血糖<50+「給葡萄糖後症狀緩解」。為「富血管(hypervascular)」腫瘤,動脈相 CT 強化。術前定位以「選擇性動脈鈣刺激試驗+肝靜脈取樣」最精確,術中超音波亦重要。胰臟神經內分泌瘤(pNET):功能性以胰島素瘤最多,其次胃泌素瘤(ZES);非功能性也常見。轉移以肝最常見,生長慢、可手術切除/RFA/TACE 減積,荷爾蒙症狀用長效 somatostatin analogue。","options":{"A":"正確:功能性 pNET 以胰島素瘤最多。","B":"正確:Whipple 三徵。","C":"★錯誤(本題答案):insulinoma 為富血管、強化,非低顯影。","D":"正確:男女發生率相近。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109020-28":{"quick":"錯在 B:胰島素瘤「大多良性(~90%)」,非大多惡性。","detail":{"background":"胰島素瘤(insulinoma):最常見功能性胰臟內分泌腫瘤、約 90% 良性、單發;Whipple 三徵=低血糖症狀+當時血糖<50+「給葡萄糖後症狀緩解」。為「富血管(hypervascular)」腫瘤,動脈相 CT 強化。術前定位以「選擇性動脈鈣刺激試驗+肝靜脈取樣」最精確,術中超音波亦重要。胰臟神經內分泌瘤(pNET):功能性以胰島素瘤最多,其次胃泌素瘤(ZES);非功能性也常見。轉移以肝最常見,生長慢、可手術切除/RFA/TACE 減積,荷爾蒙症狀用長效 somatostatin analogue。","options":{"A":"正確:最常見胰臟內分泌瘤。","B":"★錯誤(本題答案):約 90% 良性。","C":"正確:Whipple 三徵。","D":"正確:CT/MRI 可定位。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-54":{"quick":"胰十二指腸切除術後第 7 天引流變「乳白混濁」且量大增、無發燒→C:乳糜液滲漏(chyle leak)。","detail":{"background":"胰十二指腸切除術後乳糜漏(chyle leak):淋巴管/乳糜池損傷,進食(尤其脂肪)後引流液變「乳白混濁」、量增;處置以低脂/中鏈脂肪酸飲食或禁食+TPN、生長抑素;與胰漏(amylase 高)、膽漏(膽汁)、膿瘍(發燒、培養陽性)鑑別。","options":{"A":"胰液滲漏引流 amylase 高、非乳白。","B":"膿瘍有發燒、培養陽性。","C":"★正確(本題答案):乳糜液滲漏。","D":"膽汁滲漏為膽汁色。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"109080-55":{"quick":"符合乳糜漏者為 A(45):三酸甘油酯「高」(>110 mg/dL)、乳白外觀;細菌培養通常陰性、amylase 不高。","detail":{"background":"乳糜漏診斷:引流液三酸甘油酯升高(常>110 mg/dL)、乳糜微粒、外觀乳白;細菌培養多陰性、amylase 不高(與胰漏區別)。","options":{"A":"★正確(本題答案):三酸甘油酯高(乳糜)。","B":"12:培養陽性+amylase 高為感染/胰漏。","C":"13:含培養陽性。","D":"23:含 amylase 高(屬胰漏)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"110080-30":{"quick":"術後鮮紅大量出血(200 mL/h×4、Hb 13→8、血壓下降)→A:立即剖腹止血。","detail":{"background":"胰十二指腸切除後早期「鮮紅、持續大量」引流+血紅素驟降+血壓下降=活動性手術出血(動脈性),輸液/輸血只是暫時穩定,根本處置是「立即剖腹(或血管攝影栓塞)止血」。延誤會致失血性休克。","options":{"A":"★正確(本題答案):立即剖腹止血。","B":"單純輸液無法止血。","C":"矯正凝血為輔助,非根本。","D":"輸全血無法止住動脈出血。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111020-37":{"quick":"錯在 D:Murphy 徵是「急性膽囊炎」表徵,非懷疑胰臟癌的依據。","detail":{"background":"胰臟癌:~2/3 在胰頭/鈎部(致阻塞性黃疸、較早診斷、可切除率較高);體尾部診斷時常較大、可切除率低。遺傳基因 PRSS1、STK11、CDKN2A、BRCA2。胰頭癌約 1/3 可摸到腫大膽囊(Courvoisier 徵)。腺鱗癌為惡性度高的變異型、預後更差。可切除性:侵犯大腸/十二指腸等鄰近器官可整塊(en bloc)切除→「仍可根除」;但侵犯「上腸繫膜動脈、腹腔動脈幹」或遠端轉移→不可切除。術前膽道引流(ERCP)非常規(DROP-PD 證實增加併發症,僅膽管炎或延後手術時用)。","options":{"A":"是線索:不明體重減輕/長期腹悶痛。","B":"是線索:>50 歲新發/難控制糖尿病。","C":"是線索:不明原因老人胰臟炎。","D":"★錯誤(本題答案):Murphy 徵為膽囊炎,非胰臟癌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111020-47":{"quick":"錯在 A:insulin 免疫染色陽性「不等於」insulinoma;需有臨床高胰島素性低血糖(功能性)才稱 insulinoma。","detail":{"background":"胰島素瘤:最常見功能性 pNET、約 90% 良性單發;Whipple 三徵(空腹低血糖+血糖<50+補糖緩解);實驗室低血糖時胰島素高、「C-peptide 上升」可區別內因性(insulinoma)vs 外因性胰島素/磺脲藥。富血管。胰尾病灶→遠端胰切除;一般以摘除(enucleation)或遠端切除,不需切 85% 胰臟。","options":{"A":"★錯誤(本題答案):免疫染色陽性不等於 insulinoma(需功能性低血糖)。","B":"正確:升糖素瘤有壞死性遊走性紅斑。","C":"正確:Ki-67>20% 為 high grade。","D":"正確:CgA 可輔助診斷與追蹤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"111080-4":{"quick":"不是胰臟癌危險因子者為 D:縮胃(減重)手術。","detail":{"background":"胰臟癌:~2/3 在胰頭/鈎部(致阻塞性黃疸、較早診斷、可切除率較高);體尾部診斷時常較大、可切除率低。遺傳基因 PRSS1、STK11、CDKN2A、BRCA2。胰頭癌約 1/3 可摸到腫大膽囊(Courvoisier 徵)。腺鱗癌為惡性度高的變異型、預後更差。可切除性:侵犯大腸/十二指腸等鄰近器官可整塊(en bloc)切除→「仍可根除」;但侵犯「上腸繫膜動脈、腹腔動脈幹」或遠端轉移→不可切除。術前膽道引流(ERCP)非常規(DROP-PD 證實增加併發症,僅膽管炎或延後手術時用)。","options":{"A":"是:抽菸。","B":"是:Peutz-Jeghers。","C":"是:遺傳性胰臟炎。","D":"★不是(本題答案):縮胃手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112020-3":{"quick":"胰十二指腸切除後最易滲漏的吻合處為 C:胰(體)空腸吻合(胰漏 POPF 最常見、最致命)。","detail":{"background":"胰十二指腸切除後重建三吻合:胰空腸(或胰胃)、膽管空腸、胃空腸。其中「胰腸吻合」最易滲漏(術後胰漏 POPF),因胰液具腐蝕性、軟胰/小胰管風險高,可致出血與膿瘍,是術後最重要併發症。","options":{"A":"胃空腸吻合滲漏較少。","B":"膽管空腸吻合滲漏較少。","C":"★正確(本題答案):胰空腸吻合最易滲漏。","D":"各處機率不同(胰腸最高)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112020-34":{"quick":"錯在 B:Passaro 三角是「胃泌素瘤(gastrinoma)」好發處,非胰島素瘤;胰島素瘤多在胰臟各處、富血管。","detail":{"background":"胰島素瘤:最常見功能性 pNET、約 90% 良性單發;Whipple 三徵(空腹低血糖+血糖<50+補糖緩解);實驗室低血糖時胰島素高、「C-peptide 上升」可區別內因性(insulinoma)vs 外因性胰島素/磺脲藥。富血管。胰尾病灶→遠端胰切除;一般以摘除(enucleation)或遠端切除,不需切 85% 胰臟。","options":{"A":"正確:insulinoma 最常見、Whipple 三徵。","B":"★錯誤(本題答案):Passaro 三角為 gastrinoma,非 insulinoma。","C":"正確:ZES 由 gastrinoma 引起。","D":"正確:90% 偶發、10% 合併 MEN1。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-30":{"quick":"錯在 B:Zollinger-Ellison 約 25% 合併「MEN type I」(非 MEN II)。","detail":{"background":"Zollinger-Ellison(胃泌素瘤):gastrin 過多→胃酸過多、頑固潰瘍/腹瀉;約 80% 位於「胃泌素瘤三角」(膽囊管總膽管交界、十二指腸二三部交界、胰頸胰體交界),腫瘤常小不易術前定位;約 25% 合併 MEN1(非 MEN2);約 60% 惡性、常轉移。","options":{"A":"正確:gastrinoma 異常分泌 gastrin。","B":"★錯誤(本題答案):合併 MEN「I」非 MEN II,比例約 25%。","C":"正確:約 80% 在胃泌素瘤三角、常小不易定位。","D":"正確:約 60% 惡性、常轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-33":{"quick":"錯在 D:胰臟癌術前常規 ERCP 膽道減壓「不」建議(增加感染/併發症,DROP-PD 試驗),僅膽管炎或延後手術時用。","detail":{"background":"胰臟癌:~2/3 在胰頭/鈎部(致阻塞性黃疸、較早診斷、可切除率較高);體尾部診斷時常較大、可切除率低。遺傳基因 PRSS1、STK11、CDKN2A、BRCA2。胰頭癌約 1/3 可摸到腫大膽囊(Courvoisier 徵)。腺鱗癌為惡性度高的變異型、預後更差。可切除性:侵犯大腸/十二指腸等鄰近器官可整塊(en bloc)切除→「仍可根除」;但侵犯「上腸繫膜動脈、腹腔動脈幹」或遠端轉移→不可切除。術前膽道引流(ERCP)非常規(DROP-PD 證實增加併發症,僅膽管炎或延後手術時用)。","options":{"A":"正確:遺傳相關基因 PRSS1/STK11/CDKN2A/BRCA2。","B":"正確:胰頭以黃疸、體尾以疼痛/體重減輕為主。","C":"正確:胰頭癌約 1/3 摸到腫大膽囊(Courvoisier)。","D":"★錯誤(本題答案):術前常規膽道引流不建議。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"112080-34":{"quick":"正確為 B:C-peptide 上升可區別「內因性(insulinoma)」與外因性胰島素/降血糖藥引起的低血糖。","detail":{"background":"胰島素瘤:最常見功能性 pNET、約 90% 良性單發;Whipple 三徵(空腹低血糖+血糖<50+補糖緩解);實驗室低血糖時胰島素高、「C-peptide 上升」可區別內因性(insulinoma)vs 外因性胰島素/磺脲藥。富血管。胰尾病灶→遠端胰切除;一般以摘除(enucleation)或遠端切除,不需切 85% 胰臟。","options":{"A":"單位筆誤(<50 mg/mL 應為 mg/dL),非最佳答案。","B":"★正確(本題答案):C-peptide 上升示內因性胰島素。","C":"錯:insulinoma 多為「單發」良性,非多發。","D":"部分正確但敘述不完整。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113020-37":{"quick":"BD-IPMN「非」高風險特徵者為 B:發燒。高風險/令人擔憂特徵=黃疸、主胰管>10 mm、囊內強化壁結節≥5 mm、囊>3 cm。","detail":{"background":"分支型胰管內乳突黏液性腫瘤(BD-IPMN)惡性風險評估(Fukuoka/國際共識):高風險特徵=阻塞性黃疸、主胰管擴張≥10 mm、囊內「強化壁結節≥5 mm」;令人擔憂特徵=囊≥3 cm、囊壁增厚、主胰管 5–9 mm、淋巴結腫大、CA19-9 升高。「發燒」不是。","options":{"A":"高風險:黃疸。","B":"★非高風險(本題答案):發燒。","C":"高風險:主胰管>1 cm。","D":"高風險:強化壁結節>5 mm。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-34":{"quick":"錯在 C:CgA 會「偽性升高」(PPI、腎衰竭等),術後影像無轉移而 CgA 升高未必代表殘留/轉移,不能僅憑此判定。","detail":{"background":"胰臟神經內分泌瘤(pNET):多數潛在惡性(組織學不易預測生物行為,以分化/Ki-67 分級:Ki-67>20% 為 high grade);MEN1 病人 pNET 常多發。嗜鉻粒蛋白 A(CgA)輔助轉移性 pNET 診斷與追蹤(但 PPI、腎衰竭會偽高)。轉移可手術/RFA/TACE/somatostatin/標靶。","options":{"A":"正確:多潛在惡性、組織學不易預測生物行為。","B":"正確:MEN1 之 pNET 常多發。","C":"★錯誤(本題答案):CgA 可偽高,不能僅憑此判定殘留。","D":"正確:局部消融以 RFA 為主。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-37":{"quick":"漿液性囊狀腫瘤建議手術者為 A:有症狀(此瘤良性,無症狀通常追蹤)。","detail":{"background":"胰臟漿液性囊狀腫瘤(serous cystadenoma):良性(極少惡變)、好發年長女性、蜂巢狀微囊+中央疤痕;多數「無症狀者追蹤即可」,僅在「有症狀(壓迫)、診斷不確定、快速增大」時才手術。","options":{"A":"★正確(本題答案):有症狀才建議手術。","B":"單純>2 cm 非手術門檻(良性)。","C":"主胰管>0.5 cm 非指標。","D":"位置非手術依據。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-41":{"quick":"83F 空腹低血糖、補糖緩解、胰島素/C-peptide 高→insulinoma;錯在 D:胰尾病灶做「遠端胰切除」即可,不需切 85% 胰臟。","detail":{"background":"胰島素瘤:最常見功能性 pNET、約 90% 良性單發;Whipple 三徵(空腹低血糖+血糖<50+補糖緩解);實驗室低血糖時胰島素高、「C-peptide 上升」可區別內因性(insulinoma)vs 外因性胰島素/磺脲藥。富血管。胰尾病灶→遠端胰切除;一般以摘除(enucleation)或遠端切除,不需切 85% 胰臟。","options":{"A":"正確:急救輸 50% glucose。","B":"正確:甦醒後 CT 定位。","C":"正確:影像未見可做動脈鈣刺激試驗。","D":"★錯誤(本題答案):胰尾瘤做遠端胰切除,非切 85%。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-36":{"quick":"仍適合根除性切除者為 B:腫瘤侵犯大腸(可整塊 en bloc 切除)。","detail":{"background":"胰臟癌:~2/3 在胰頭/鈎部(致阻塞性黃疸、較早診斷、可切除率較高);體尾部診斷時常較大、可切除率低。遺傳基因 PRSS1、STK11、CDKN2A、BRCA2。胰頭癌約 1/3 可摸到腫大膽囊(Courvoisier 徵)。腺鱗癌為惡性度高的變異型、預後更差。可切除性:侵犯大腸/十二指腸等鄰近器官可整塊(en bloc)切除→「仍可根除」;但侵犯「上腸繫膜動脈、腹腔動脈幹」或遠端轉移→不可切除。術前膽道引流(ERCP)非常規(DROP-PD 證實增加併發症,僅膽管炎或延後手術時用)。","options":{"A":"肝多發轉移不可切除。","B":"★正確(本題答案):侵犯大腸可整塊切除。","C":"侵犯上腸繫膜動脈不可切除。","D":"侵犯腹腔動脈幹不可切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-9":{"quick":"錯在 D:腺鱗癌是「惡性度高、預後更差」的變異型,非「分化良好、預後相對好」。","detail":{"background":"胰臟癌:~2/3 在胰頭/鈎部(致阻塞性黃疸、較早診斷、可切除率較高);體尾部診斷時常較大、可切除率低。遺傳基因 PRSS1、STK11、CDKN2A、BRCA2。胰頭癌約 1/3 可摸到腫大膽囊(Courvoisier 徵)。腺鱗癌為惡性度高的變異型、預後更差。可切除性:侵犯大腸/十二指腸等鄰近器官可整塊(en bloc)切除→「仍可根除」;但侵犯「上腸繫膜動脈、腹腔動脈幹」或遠端轉移→不可切除。術前膽道引流(ERCP)非常規(DROP-PD 證實增加併發症,僅膽管炎或延後手術時用)。","options":{"A":"正確:約 2/3 在胰頭/鈎部。","B":"正確:胰尾腫瘤診斷時較大、可切除率低。","C":"正確:胰頭癌致阻塞性黃疸、較早診斷、可切除率較高。","D":"★錯誤(本題答案):腺鱗癌惡性度高、預後更差。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-17":{"quick":"錯在 C:遠端胰切除中,機械手臂(robotic)的「轉開腹率較低、脾臟保留率較高」,非兩者皆較腹腔鏡低。","detail":{"background":"遠端胰切除微創:腹腔鏡與機械手臂皆保有微創優點(出血少、恢復快);重大併發症(如胰瘻)發生率相近;機械手臂在精細操作下「轉開腹率較低、脾臟保留率較高」;腹腔鏡花費較低。","options":{"A":"正確:兩者皆有微創優點。","B":"正確:胰瘻等重大併發症相近。","C":"★錯誤(本題答案):機械手臂脾臟保留率較「高」,轉開腹率較低。","D":"正確:腹腔鏡花費較低。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"102030-73":{"quick":"HBsAg+、AFP 可正常、動態 CT+血管攝影→C:肝細胞癌(AFP 正常不排除)。","detail":{"background":"肝細胞癌(HCC):最常見原發肝惡性瘤,好發東南亞/非洲、男性(2:1~8:1),危險因子 B/C 肝、肝硬化、黃麴毒素、酒精、NAFLD。多有肝硬化背景;AFP 可升高(但「正常不排除」)。三相(動態)CT:動脈相強化+靜脈/延遲相洗出(washout)為診斷特徵;浸潤型常合併「門靜脈腫瘤栓塞」。肉眼分型:結節型、巨塊型、瀰漫/浸潤型。預後不佳因子:多發、血管侵犯、肝功能差。治療依 BCLC(0/A/B/C/D,依腫瘤大小數目、Child-Pugh、體能狀態):早期切除/移植/消融(RFA/酒精)為「根治」;中期 TACE(非根治、姑息);晚期 sorafenib/lenvatinib 等標靶。移植 Milan 準則=單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移。","options":{"A":"轉移瘤多無 HBsAg 背景、影像不同。","B":"膽管癌影像/標記不同。","C":"★正確(本題答案):肝細胞癌。","D":"血管瘤為良性、無此病程。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"102110-48":{"quick":"正確為 B:肝母細胞瘤與肝細胞瘤腫瘤標記皆為 AFP。","detail":{"background":"小兒肝惡性腫瘤:肝母細胞瘤(hepatoblastoma,好發<3 歲、與 Beckwith-Wiedemann/FAP 相關、預後相對佳)與兒童肝細胞癌(較大兒童、常 B 肝/代謝病背景、預後較差);兩者腫瘤標記皆為 AFP。","options":{"A":"錯:肝母細胞瘤好發<3 歲。","B":"★正確(本題答案):兩者標記皆 AFP。","C":"錯:HCC 預後較肝母細胞瘤差。","D":"錯:Beckwith-Wiedemann 與肝母細胞瘤相關。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"104030-32":{"quick":"與術後長期預後不佳較相關者為 D:多發性腫瘤(multifocal)。","detail":{"background":"肝細胞癌(HCC):最常見原發肝惡性瘤,好發東南亞/非洲、男性(2:1~8:1),危險因子 B/C 肝、肝硬化、黃麴毒素、酒精、NAFLD。多有肝硬化背景;AFP 可升高(但「正常不排除」)。三相(動態)CT:動脈相強化+靜脈/延遲相洗出(washout)為診斷特徵;浸潤型常合併「門靜脈腫瘤栓塞」。肉眼分型:結節型、巨塊型、瀰漫/浸潤型。預後不佳因子:多發、血管侵犯、肝功能差。治療依 BCLC(0/A/B/C/D,依腫瘤大小數目、Child-Pugh、體能狀態):早期切除/移植/消融(RFA/酒精)為「根治」;中期 TACE(非根治、姑息);晚期 sorafenib/lenvatinib 等標靶。移植 Milan 準則=單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移。","options":{"A":"大腫瘤影響但非最關鍵。","B":"肝硬化影響肝儲備。","C":"年齡非主因。","D":"★正確(本題答案):多發性腫瘤預後不佳。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"104030-33":{"quick":"米蘭準則「不」包括 C:主門脈被侵犯(大血管侵犯為「排除條件」,非納入標準)。","detail":{"background":"肝細胞癌(HCC):最常見原發肝惡性瘤,好發東南亞/非洲、男性(2:1~8:1),危險因子 B/C 肝、肝硬化、黃麴毒素、酒精、NAFLD。多有肝硬化背景;AFP 可升高(但「正常不排除」)。三相(動態)CT:動脈相強化+靜脈/延遲相洗出(washout)為診斷特徵;浸潤型常合併「門靜脈腫瘤栓塞」。肉眼分型:結節型、巨塊型、瀰漫/浸潤型。預後不佳因子:多發、血管侵犯、肝功能差。治療依 BCLC(0/A/B/C/D,依腫瘤大小數目、Child-Pugh、體能狀態):早期切除/移植/消融(RFA/酒精)為「根治」;中期 TACE(非根治、姑息);晚期 sorafenib/lenvatinib 等標靶。移植 Milan 準則=單顆≤5 cm 或 2–3 顆各≤3 cm、無大血管侵犯、無肝外轉移。","options":{"A":"是:單顆≤5 cm。","B":"是:2–3 顆各≤3 cm。","C":"★不包括(本題答案):門脈侵犯為排除,非準則。","D":"是:無肝外轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"104090-31":{"quick":"FHCC 正確為 D:侵犯性較小(預後較佳)。","detail":{"background":"纖維板層型肝細胞癌(FHCC):好發「年輕人(無性別差異)、無肝硬化背景、AFP 多正常」,生長較慢、侵犯性較小、預後優於傳統 HCC(若可切除)。","options":{"A":"錯:無明顯男性偏多。","B":"錯:好發年輕,非年紀較大。","C":"錯:不易合併肝硬化。","D":"★正確(本題答案):侵犯性較小、預後較佳。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas","EASL/BCLC HCC Guideline"]}},"104090-73":{"quick":"錯在 B:HCC 肉眼以「單獨結節/巨塊型」較常見,非多發性結節最常見。","detail":{"background":"肝細胞癌(HCC):最常見原發肝惡性瘤,好發東南亞/非洲、男性(
