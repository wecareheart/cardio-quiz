張),肌肉痙攣與腹水、「低」平均動脈壓、高血漿腎素活性相關。","detail":{"background":"肝硬化臨床表徵:蜘蛛血管瘤/手掌紅斑(雌激素代謝障礙)、Cruveilhier-Baumgarten 雜音(臍靜脈再通側枝)、高動力循環(心輸出↑、心跳↑、周邊阻力↓→「低平均動脈壓」)、腹水、肝性腦病。肌肉痙攣與腹水、低 MAP、高血漿腎素活性相關。","options":{"A":"正確:蜘蛛血管瘤/手掌紅斑與性荷爾蒙代謝有關。","B":"正確:Cruveilhier-Baumgarten 雜音。","C":"正確:高動力循環(心輸出增/阻力降)。","D":"★錯誤(本題答案):應為「低」平均動脈壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113020-73":{"quick":"Budd-Chiari 症候群為 D:肝靜脈(肝靜脈流出道)阻塞。","detail":{"background":"Budd-Chiari 症候群:肝靜脈/肝後段下腔靜脈「流出道阻塞」(常因血栓性體質、骨髓增生疾病、腫瘤壓迫),致肝充血腫大、腹水、腹痛;CT 見尾葉肥大、不均勻強化。治療:抗凝、血管成形/支架、TIPS、嚴重者肝移植。","options":{"A":"非膽管阻塞。","B":"門靜脈阻塞為門脈高壓另一型。","C":"非肝動脈。","D":"★正確(本題答案):肝靜脈流出道阻塞。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"113070-35":{"quick":"CT/MRI是『診斷』敏感的影像工具,並非『治療』儀器;選項B把它說成『診斷及治療儀器』錯誤,故B。","detail":{"background":"化膿性肝膿瘍:好發右肝、單/多發、最常見革蘭氏陰性菌(E. coli/Klebsiella);CT/MRI 敏感;經驗抗生素須涵蓋革蘭氏陰性+厭氧菌,經皮抽吸培養定菌。治療為抗生素「+經皮導管引流」(對多數病患有幫助),大膿瘍單靠藥物常不足。","options":{"A":"正確。右肝多、可單發或多發、最常見革蘭氏陰性菌。","B":"★錯誤(本題答案)。CT/MRI為高敏感『診斷』工具,但非『治療』儀器。","C":"正確。經驗性抗生素需涵蓋G(−)與厭氧菌,經皮抽吸培養指引用藥,靜脈抗生素常需數週。","D":"多數化膿性肝膿瘍仍建議經皮引流,此敘述有爭議;惟考選部標準答案為B。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-31":{"quick":"錯在 D:酒精性肝硬化門脈血流阻力發生在「竇狀(sinusoidal)」層次,非 presinusoidal(presinusoidal 見於血吸蟲病/PBC)。","detail":{"background":"門脈高壓:定義為「肝靜脈壓力梯度(HVPG)>5 mmHg」(>10 有臨床意義、>12 易出血)。側枝:冠狀靜脈/胃短靜脈→奇靜脈(食道胃靜脈曲張);臍靜脈再通(left portal→腹壁靜脈)→caput medusae;痔靜脈叢。阻力部位:酒精性/病毒性肝硬化在「竇狀/竇後」;血吸蟲、PBC 在 presinusoidal。","options":{"A":"正確:HVPG>5 mmHg。","B":"正確:冠狀/胃短靜脈匯入奇靜脈。","C":"正確:caput medusae 為臍靜脈再通。","D":"★錯誤(本題答案):酒精性肝硬化阻力在竇狀,非 presinusoidal。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114020-34":{"quick":"不是 Child-Pugh 評估項目者為 C:部分凝血活酶時間(PTT)。Child-Pugh 用 PT/INR、膽紅素、白蛋白、腹水、肝性腦病。","detail":{"background":"Child-Pugh分級項目=『膽紅素、白蛋白、PT/INR、腹水、肝性腦病』;『部分凝血活酶時間(PTT)非評估項目』(C)。","options":{"A":"是:膽紅素。","B":"是:白蛋白。","C":"★不是(本題答案):PTT(用 PT/INR)。","D":"是:腹水。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114070-32":{"quick":"錯在 D:食道靜脈曲張出血「不」以血管攝影栓塞止血(屬靜脈/門脈系統);失敗者用 TIPS、外科分流、氣球填塞、肝移植。","detail":{"background":"食道靜脈曲張出血處置:先穩定生命徵象/輸液輸血、藥物(octreotide/somatostatin/terlipressin/vasopressin)+內視鏡結紮/硬化;暫時用氣球填塞(Sengstaken-Blakemore);持續/大量出血→TIPS 或外科分流;末期→肝移植。「動脈血管攝影栓塞」用於動脈性出血,不適用門脈系統的靜脈曲張。","options":{"A":"正確:首要維持生命徵象。","B":"正確:octreotide/vasopressin 控制出血。","C":"正確:大量出血可外科分流或 TIPS。","D":"★錯誤(本題答案):靜脈曲張不以動脈栓塞止血。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"114070-37":{"quick":"正確為 D(1245):功能左右肝分界=中肝靜脈(1)、左右「葉」分界=Cantlie 線(2)…依本題答案為 1、2、4、5。","detail":{"background":"肝膽外科解剖:功能左右肝分界=中肝靜脈(1)、左右葉/分界=Cantlie線等;依本題答案為1245(D)。","options":{"A":"2345:漏 1。","B":"1345:漏 2。","C":"1234:漏 5。","D":"★正確(本題答案):1、2、4、5。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-18":{"quick":"錯在 A:肝臟切除中,機械手臂相較腹腔鏡「並非」更省時/失血更少(機械手臂常較耗時、費用較高)。","detail":{"background":"微創肝切除:腹腔鏡與機械手臂適應症大致相同、併發症與轉開腹率無顯著差異,皆已成為「肝臟邊緣病灶切除」的標準。機械手臂提供更佳靈活度但「手術時間常較長、費用較高」,並非更省時、失血更少。","options":{"A":"★錯誤(本題答案):機械手臂非更省時/失血更少。","B":"正確:適應症大致相同。","C":"正確:併發症/轉開腹率無顯著差異。","D":"正確:微創為肝邊緣病灶切除標準。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-23":{"quick":"不是 MELD 參數者為 D:血清白蛋白(MELD=肌酸酐+總膽紅素+INR;白蛋白屬 Child-Pugh)。","detail":{"background":"MELD score參數=『肌酸酐、總膽紅素、INR』(±鈉);『血清白蛋白非MELD參數(屬Child-Pugh)』(D)。","options":{"A":"是:肌酸酐。","B":"是:總膽紅素。","C":"是:INR。","D":"★不是(本題答案):白蛋白(屬 Child-Pugh)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"115020-55":{"quick":"正確為 D:懷孕病人需手術應儘量安排在「妊娠中期(second trimester)」(致畸/早產風險較低)。","detail":{"background":"肝膽微創手術注意:非所有切肝都需 Pringle;Pringle 應「間歇」非全程持續;氣腹中疑「氣體栓塞(gas embolism)」應採「頭低腳高、左側臥(Durant 姿)」並由中央靜脈導管抽出右心室氣體(非頭高右躺);懷孕病人手術宜安排「妊娠中期」最安全。","options":{"A":"錯:非所有切肝都需 Pringle。","B":"錯:Pringle 應間歇,非全程持續。","C":"錯:氣體栓塞應頭低左側臥(非頭高)。","D":"★正確(本題答案):懷孕手術宜安排妊娠中期。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Blumgart’s Surgery of the Liver, Biliary Tract and Pancreas"]}},"101030-49":{"quick":"胰腎移植後、近期高劑量類固醇、發燒乾咳+兩側下肺浸潤→D:巨細胞病毒(CMV)肺炎。","detail":{"background":"器官移植後免疫抑制下感染依時序:早期(<1 月)手術相關/細菌;中期(1–6 月)機會性感染—「CMV」(發燒、乾咳、間質性肺炎、白血球低)、PCP、麴菌;晚期社區性。本例 SPK 後加重免疫抑制(高劑量類固醇治排斥)→ CMV 肺炎最可能。","options":{"A":"細菌性肺炎多葉狀實質化。","B":"黴菌性多有特定危險因子。","C":"心衰竭肺水腫非發燒乾咳。","D":"★正確(本題答案):CMV 肺炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"102030-9":{"quick":"非肝移植適應症者為 D:大腸癌合併肝轉移(肝外惡性/轉移為禁忌)。","detail":{"background":"肝臟移植適應症:末期肝硬化、米蘭內小型HCC、猛爆性肝衰竭、代謝性肝病;『大腸癌合併肝轉移(肝外惡性)為禁忌』(D)。","options":{"A":"是:原發性硬化性膽管炎。","B":"是:前次肝移植失敗。","C":"是:Alagille 症候群。","D":"★非(本題答案):大腸癌肝轉移(轉移性惡性,禁忌)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"102110-38":{"quick":"錯在 D:接受遠端脾腎分流(Warren)後「仍可」再接受肝移植(選擇性分流保留門脈血流,不妨礙日後移植)。","detail":{"background":"遠端脾腎分流(Warren shunt):將遠端脾靜脈接左腎靜脈,選擇性減壓胃食道靜脈曲張、「保留門脈向肝血流」;可能加重腹水(不宜用於合併頑固腹水者);與門腔分流再出血率相近;因保留門脈血流,日後仍可肝移植。","options":{"A":"正確:遠端脾靜脈接左腎靜脈,保留門脈血流。","B":"正確:可能加重腹水,不宜合併腹水者。","C":"正確:再出血率與門腔分流相近。","D":"★錯誤(本題答案):術後仍可接受肝移植。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"108030-33":{"quick":"錯在 A:最常需脾切除的原因是「外傷/手術中醫源性脾損傷」,非自發性血小板低下紫斑症(ITP)。","detail":{"background":"脾臟手術:『最常需脾切除的原因為外傷/手術中醫源性脾損傷』(故A『ITP最常』錯);脾切除後須打疫苗防莢膜菌敗血症。","options":{"A":"★錯誤(本題答案):最常見原因為外傷/醫源性損傷,非 ITP。","B":"正確:ITP 脾切除預後佳。","C":"正確:術前疫苗、<5% 術後嚴重感染(OPSI)。","D":"正確:術後常見肺塌陷、出血、胰臟炎。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"110020-33":{"quick":"胰臟移植後最常見死亡原因為 A:心血管疾病。","detail":{"background":"胰臟移植後『最常見死亡原因為心血管疾病』(A);糖尿病病人心血管共病高。","options":{"A":"★正確(本題答案):心血管疾病。","B":"感染為早期風險但非最常見長期死因。","C":"惡性腫瘤較少。","D":"器官排斥非最常見死因。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"110080-35":{"quick":"胰臟移植適應症為 C:第一型糖尿病合併腎衰竭(SPK)。","detail":{"background":"胰臟移植適應症為『第一型糖尿病合併腎衰竭(同時胰腎移植SPK)』(C);改善血糖與生活品質。","options":{"A":"血糖穩定的 T1DM 不需移植。","B":"第二型糖尿病非典型適應症。","C":"★正確(本題答案):T1DM+腎衰竭(SPK)。","D":"尚無合併症者不需。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"111020-5":{"quick":"非肝移植適應症者為 D:心衰竭引起的肝硬化(心因性,應治心臟)。","detail":{"background":"肝臟移植適應症:末期肝病、小型HCC、代謝病、急性肝衰竭;『心衰竭引起之肝硬化(心因性)應治心臟,非肝移植適應症』(D)。","options":{"A":"是:原發性膽道性肝硬化。","B":"是:符合準則的肝細胞癌。","C":"是:膽道閉鎖。","D":"★非(本題答案):心衰竭引起的肝硬化。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"111080-31":{"quick":"錯在 A:嚴重肝硬化伴血小板低下(脾亢)「不需」常規切脾來提升血小板;應治療肝病本身。","detail":{"background":"脾切除適應症:外傷、ITP、遺傳性球形紅血球症、脾腫瘤;『嚴重肝硬化伴脾亢血小板低下不需常規切脾(應治肝病)』(故A錯)。","options":{"A":"★錯誤(本題答案):肝硬化脾亢不需常規切脾。","B":"正確:外傷/醫源性損傷為最常見原因。","C":"正確:術後莢膜菌感染風險高。","D":"正確:兒童 OPSI 風險較高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"112020-31":{"quick":"較不建議「移植」者為 D:CTP-5(肝功能良好 Child-A)、單顆 2 cm 小 HCC—此類應優先「手術切除」而非移植。","detail":{"background":"肝硬化合併HCC之肝移植:適用符合米蘭、肝功能差者;『CTP-5(Child-A)、單顆2cm小HCC應優先「手術切除」而非移植』(D較不建議移植)。","options":{"A":"CTP-8、符合 Milan,適合移植。","B":"CTP-10、單顆 4.5 cm(≤5),適合移植。","C":"CTP-7、三顆各≤3 cm,適合移植。","D":"★較不建議移植(本題答案):肝功能好的小 HCC 優先切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"112020-33":{"quick":"移植比例最高、整體預後最好者為 A:同時胰腎移植(SPK)。","detail":{"background":"胰臟移植中『同時胰腎移植(SPK)比例最高、整體預後最好』(A);同時解決糖尿病與腎衰竭、共用免疫抑制。","options":{"A":"★正確(本題答案):SPK 移植量最大、預後最好。","B":"腎後胰移植(PAK)次之。","C":"單獨胰移植(PTA)較少。","D":"胰先腎後罕見。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"112020-54":{"quick":"錯在 C:腹腔鏡脾切除「仍需」考慮門靜脈高壓(脾靜脈/側枝出血風險),非不需考慮。","detail":{"background":"腹腔鏡脾切除:微創可行;『仍需考慮門靜脈高壓(脾靜脈/側枝出血風險)』(故C『不需考慮』錯)。","options":{"A":"正確:腹腔鏡脾切除為首選、安全性相近。","B":"正確:約 90% 可完成,轉開腹主因術中出血。","C":"★錯誤(本題答案):仍需考慮門靜脈高壓。","D":"正確:可仰臥或側臥施行。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"113020-5":{"quick":"不是米蘭準則者為 A:單顆腫瘤直徑「≤6.5 cm」(此為 UCSF 準則;米蘭為單顆≤5 cm)。","detail":{"background":"肝移植米蘭準則:單顆≤5cm或≤3顆各≤3cm、無大血管侵犯/肝外轉移;『單顆≤6.5cm為UCSF準則非米蘭』(故A不是米蘭條件)。","options":{"A":"★非(本題答案):≤6.5 cm 是 UCSF,非米蘭(米蘭≤5 cm)。","B":"是:2–3 顆各≤3 cm。","C":"是:無肝內血管侵犯。","D":"是:無肝外轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"113020-6":{"quick":"正確為 C:胰臟移植最常見手術併發症為「移植物血管栓塞」。","detail":{"background":"胰臟移植:可重建血糖控制;『最常見手術併發症為移植物血管栓塞(graft thrombosis)』(C)。","options":{"A":"錯:胰臟移植適用 T1DM。","B":"錯:現以「腸道引流」較普遍(非膀胱)。","C":"★正確(本題答案):移植物血管栓塞最常見。","D":"錯:最常見長期死因為心血管疾病。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"114020-5":{"quick":"錯在 D:移植後發生癌症應「減量」免疫抑制劑(±改 mTOR 抑制劑),非「立即完全停止」(會致排斥/移植物喪失)。","detail":{"background":"移植後癌症:免疫抑制下風險升高,最常見「皮膚癌」;移植後肝癌與 B/C 肝相關;卡波西氏肉瘤與 HHV-8 相關;移植後淋巴增生疾病(PTLD)與 EBV 相關。處置:「減量」免疫抑制(必要時換 mTOR 抑制劑 everolimus/sirolimus 兼具抗腫瘤),而非一律立即完全停藥。","options":{"A":"正確:最常見為皮膚癌。","B":"正確:肝癌與 B/C 肝相關。","C":"正確:Kaposi 肉瘤與 HHV-8 相關。","D":"★錯誤(本題答案):應減量而非立即完全停免疫抑制劑。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"114070-3":{"quick":"非肝移植適應症者為 D:小型 HCC「合併門脈分枝腫瘤血栓」(大血管侵犯=禁忌,超出 Milan)。","detail":{"background":"肝移植適應症:末期肝病、米蘭內HCC;『小型HCC合併門脈分枝腫瘤血栓屬大血管侵犯=禁忌、超出米蘭』(D非適應症)。","options":{"A":"是:acetaminophen 致急性肝衰竭。","B":"是:慢性 B 肝急性發作肝衰竭。","C":"是:C 肝肝硬化+腹水+肝腎症候群。","D":"★非(本題答案):合併門脈腫瘤血栓為禁忌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"101030-3":{"quick":"鈍性腹部外傷最常受傷器官為 B:脾臟。","detail":{"background":"鈍性腹部外傷最常受傷之實質器官為『脾臟』(B);其次肝臟;處置依血流動力學穩定與否決定保守或手術。","options":{"A":"肝臟次之。","B":"★正確(本題答案):脾臟。","C":"胰臟較少。","D":"腎臟較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"102110-8":{"quick":"創傷死亡中占>50% 者為 C:創傷性腦部損傷。","detail":{"background":"創傷死亡中『創傷性腦損傷(TBI)占>50%』(C);為創傷首要死因。","options":{"A":"肺挫傷非過半死因。","B":"肝撕裂非過半。","C":"★正確(本題答案):腦部損傷占>50%。","D":"心臟挫傷較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"105020-1":{"quick":"腹部鈍傷最常受傷腹腔器官為 C:脾臟。","detail":{"background":"腹部鈍傷最常受傷之腹腔器官為『脾臟』(C);穩定者可非手術處理(NOM)。","options":{"A":"肝臟次之。","B":"腎臟較少。","C":"★正確(本題答案):脾臟。","D":"胰臟較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"105020-7":{"quick":"單獨肝裂傷非手術治療「不」會出現者為 D:血尿(那是泌尿系統損傷)。","detail":{"background":"肝裂傷非手術治療(穩定者)併發症:延遲性出血(假性動脈瘤破裂)、膽汁瘤/膽漏、肝膿瘍、膽道出血(hemobilia)、黃疸(膽道受壓)。「血尿」屬泌尿系統(腎/膀胱)損傷,與單獨肝裂傷無關。","options":{"A":"會:延遲性出血。","B":"會:肝膿瘍。","C":"會:黃疸(膽道受壓)。","D":"★不會(本題答案):血尿(泌尿系統損傷)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"109020-76":{"quick":"最常受傷器官為 C:鈍傷→脾臟;槍擊傷→小腸。","detail":{"background":"不同機轉之最常受傷器官:『鈍傷→脾臟;穿刺/槍擊傷→小腸』(C)。","options":{"A":"槍傷非以肝最多。","B":"鈍傷非以肝最多。","C":"★正確(本題答案):鈍傷脾臟、槍傷小腸。","D":"鈍傷非以小腸最多。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"110080-7":{"quick":"本題一律給分;AAST 肝臟創傷分「五級」:I 表淺裂傷/小血腫、III 裂傷>3 cm、V 為廣泛實質破壞/近肝靜脈大血管傷、VI 肝撕脫。","detail":{"background":"AAST 肝臟損傷分級(I–VI,常稱五級+VI 撕脫):I 被膜下血腫<10%/裂傷<1 cm;II 血腫 10–50%/裂傷 1–3 cm;III 血腫>50% 或破裂/裂傷>3 cm;IV 25–75% 肝葉實質破壞;V >75% 或近肝靜脈/下腔靜脈(juxtahepatic vein)損傷;VI 肝撕脫。本題答案鍵一律給分。","options":{"A":"(給分):裂傷<1 cm/血腫<10% 為第一級。","B":"(給分):裂傷>3 cm 為第三級。","C":"(給分):整葉被膜下血腫近第五級描述。","D":"(給分):AAST 常述為五級(+VI 撕脫)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"112020-76":{"quick":"脾破裂+休克(HR130、BP80/46、BD−8)。錯在 D:緊急血漿應用「AB 型(萬用血漿)」,O 型血漿含抗 A/抗 B 抗體,非萬用。","detail":{"background":"脾破裂+休克(HR130、BP80/46、BD−8)為失血性休克,須緊急輸血;『緊急血漿應用AB型(萬用血漿);O型血漿含抗A/抗B抗體非萬用』(故D錯)。","options":{"A":"正確:至少 Class III 出血(>30%)。","B":"正確:大量輸血 RBC:FFP:plt=1:1:1。","C":"正確:緊急可用 O 型紅血球。","D":"★錯誤(本題答案):緊急血漿用 AB 型,非 O 型。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}},"113020-72":{"quick":"肝臟鈍傷最少見者為 D:肝門靜脈栓塞(鈍傷致裂傷/血腫/實質出血常見,門脈栓塞罕見)。","detail":{"background":"肝臟鈍性創傷常見:肝裂傷、被膜下血腫、實質內出血、膽漏;「門靜脈栓塞」非典型鈍傷直接後果(門脈血栓多與肝硬化/高凝/感染相關),最少見。","options":{"A":"常見:肝裂傷。","B":"常見:被膜下血腫。","C":"常見:實質性出血。","D":"★最少見(本題答案):肝門靜脈栓塞。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATLS 10th edition","ISHLT/UNOS Transplant Guidelines"]}}},TO=["膽結石膽囊炎膽管炎", "膽道腫瘤閉鎖囊腫", "胰臟炎", "胰臟腫瘤", "肝臟腫瘤", "肝膿瘍肝硬化門脈高壓", "器官移植與脾臟", "肝脾鈍傷"],LEC={"膽結石膽囊炎膽管炎":{"title":"膽結石‧膽囊炎‧膽管炎（良性膽道）","html":"\n<p><b>膽結石：</b>膽固醇結石(4F：female/forty/fat/fertile、快速減重、TPN)與色素結石(溶血/肝硬化/感染)。多數無症狀(不手術)；<b>有症狀膽結石首選腹腔鏡膽囊切除</b>。膽囊切除適應症：有症狀膽結石、息肉>10 mm、瓷膽囊、無結石性膽囊炎、結石>3 cm。</p>\n<p><b>急性結石性膽囊炎：</b>膽囊管阻塞→發炎；<b>Murphy 徵</b>(深按右上腹「吸氣」突然中止)；<b>超音波首選</b>(敏感>80%/特異>90%，CT 不優於超音波)；早期(72h內)腹腔鏡切除或抗生素後延遲切除；多無黃疸。</p>\n<p><b>Calot 三角</b>(邊界：膽囊管、總肝管、肝下緣；內含膽囊動脈)是腹腔鏡膽囊切除的關鍵(critical view of safety)。</p>\n<p><b>總膽管結石：</b>續發(<2年) vs 原發(膽囊切除>2年)；阻塞性黃疸+總膽管擴張；<b>ERCP 可診斷+取石(>90%)</b>。<b>急性膽管炎</b>：<b>Charcot 三徵</b>=發燒+黃疸+右上腹痛；<b>Reynolds 五徵</b>=Charcot+休克+意識改變→須緊急膽道引流(ERCP/PTCD)+抗生素。膽道出血(hemobilia)首選血管栓塞。</p>\n"},"膽道腫瘤閉鎖囊腫":{"title":"膽道腫瘤‧膽道閉鎖‧總膽管囊腫","html":"\n<p><b>膽管癌：</b>位置分肝內、<b>肝門(Klatskin，最常見，左右肝管匯合處)</b>、遠端。危險因子：PSC、膽管囊腫、反覆化膿性膽管炎、肝吸蟲、肝內結石。>90% 肝門/遠端以阻塞性黃疸表現；Bismuth-Corlette 分型(I 匯合處以下不需肝切除；III/IV 需合併肝切除)。化療反應有限、預後差。</p>\n<p><b>膽囊癌：</b>膽結石為最重要危險因子(~85%)、女性多、預後差；T1a 單純膽囊切除，T1b 以上需根除性切除(肝床+淋巴清掃)。</p>\n<p><b>總膽管囊腫：</b>女性多、Todani 五型(I 最常見)；三徵腹痛/黃疸/腫塊；<b>有惡變風險→即使無症狀也應全切除+Roux-en-Y 肝管空腸吻合</b>。</p>\n<p><b>膽道閉鎖：</b>新生兒持續黃疸+灰白便+直接膽紅素升高；超音波<b>無</b>肝內膽管擴張(三角索徵)；<b>肝切片+術中膽道攝影確診</b>；60 天內行 Kasai 手術；<b>多數仍需肝移植</b>。術後用類固醇/ursodeoxycholic acid/ADEK(非 cyclosporine)。兒童膽結石多為色素結石。</p>\n"},"胰臟炎":{"title":"胰臟炎（急/慢性‧假性囊腫）","html":"\n<p><b>急性胰臟炎：</b>最常見原因<b>膽結石</b>與酒精(70–80%)；診斷 3 取 2(腹痛輻射至背、amylase/lipase>3 倍、影像)；<b>amylase 高低不能預測嚴重度</b>(用 Ranson/APACHE II/CTSI)。常致<b>低血鈣</b>、低血容/腎衰、ARDS。局部併發症：積液、假性囊腫、壞死、膿瘍；<b>無菌性壞死不需預防性抗生素</b>。手術<b>僅在感染性壞死/感染積聚</b>(延遲、step-up)。</p>\n<p><b>假性囊腫：</b>最常續發於胰臟炎；須與囊狀腫瘤鑑別；無症狀可觀察；需引流時若下游胰管阻塞→<b>內引流(囊腸吻合)</b>(非外引流)。Hemosuccus pancreaticus＝假性動脈瘤出血流入胰管。</p>\n<p><b>慢性胰臟炎：</b>最常見<b>酗酒</b>；胰管擴張/結石、實質鈣化(CT 較 X 光易辨識)、脂肪瀉+糖尿病。頑固疼痛+主胰管擴張(>7mm)→<b>Puestow(側側胰管空腸吻合)</b>+清石。</p>\n"},"胰臟腫瘤":{"title":"胰臟腫瘤（癌‧內分泌瘤‧囊性）","html":"\n<p><b>胰臟癌(胰管腺癌)：</b>~2/3 在<b>胰頭/鈎部</b>(阻塞性黃疸+雙管徵、Courvoisier 徵)；危險因子抽菸/慢性胰臟炎/家族史/遺傳(BRCA2/STK11/CDKN2A)；CA19-9 標記、預後極差(癌王)。胰頭癌→<b>Whipple/PPPD</b>(切胰頭+遠端總膽管+十二指腸±遠端胃，不含脾/腹腔幹)；<b>胰腸吻合最易漏</b>。可切除性：侵犯大腸/十二指腸可整塊切除；侵犯 SMA/腹腔幹或遠端轉移→不可切除。術前 ERCP 膽道引流非常規。</p>\n<p><b>胰島素瘤：</b>最常見功能性 pNET、<b>~90% 良性</b>、富血管；<b>Whipple 三徵</b>(空腹低血糖+血糖<50+補糖緩解)；C-peptide 升高區別內因性；術前定位以動脈鈣刺激最精確。</p>\n<p><b>胃泌素瘤(ZES)：</b>頑固潰瘍/腹瀉；<b>胃泌素瘤三角</b>；25% 合併 <b>MEN1</b>(非 MEN2)；約 60% 惡性。necrolytic migratory erythema=升糖素瘤。pNET 以 Ki-67 分級、CgA 追蹤(PPI/腎衰偽高)。</p>\n<p><b>囊性腫瘤：</b>漿液性囊腺瘤(良性、有症狀才手術)、黏液性/實體偽乳突(女性、有惡變)、IPMN(男性、高風險特徵：黃疸/主胰管>10mm/強化壁結節≥5mm)。</p>\n"},"肝臟腫瘤":{"title":"肝臟腫瘤（HCC‧轉移‧良性）","html":"\n<p><b>肝細胞癌(HCC)：</b>好發 B/C 肝、肝硬化、黃麴毒素背景；男性多；<b>AFP 可正常不排除</b>；三相 CT<b>動脈相強化+洗出</b>為診斷特徵；浸潤型常合併<b>門靜脈腫瘤栓塞</b>；不佳因子=多發/血管侵犯/肝功能差。治療依 <b>BCLC</b>：早期切除/移植/消融(根治)，中期 <b>TACE(姑息非根治)</b>，晚期 sorafenib。<b>移植 Milan 準則</b>=單顆≤5cm 或 2–3 顆各≤3cm、無大血管侵犯、無肝外轉移(UCSF≤6.5cm)；<b>肝功能好的小 HCC 優先切除</b>。HCC 肝外供血最常見右下橫膈動脈。</p>\n<p><b>良性肝瘤：</b><b>腺瘤(adenoma)</b>—OCP/雄性素相關、<b>易自發出血+可惡變→切除</b>；FNH—中央疤痕、不出血不惡變、追蹤；海綿狀血管瘤—最常見、周邊結節向心填充、僅 Kasabach-Merritt/破裂/明顯增大才手術。</p>\n<p><b>轉移性肝瘤：</b>最常來自大腸直腸癌(50–60% 一生會肝轉移)；<b>可 R0 切除者肝切除為標準治療</b>(即使多發)；預後因子 CEA>200、>5cm、同步、數目。小兒肝母細胞瘤/HCC 標記皆 AFP。</p>\n"},"肝膿瘍肝硬化門脈高壓":{"title":"肝膿瘍‧肝硬化‧門脈高壓‧肝臟解剖生理","html":"\n<p><b>肝臟解剖：</b>Couinaud 八段(肝靜脈分區)；功能左右分界=<b>中肝靜脈/Cantlie 線(膽囊窩至下腔靜脈)</b>；膽囊鄰 S4b/S5。<b>Pringle 手法</b>夾肝十二指腸韌帶(門靜脈+固有肝動脈+總膽管，不含總肝動脈)，間歇(夾15放5)。肝小葉約 6 個門脈三合體；zone 3 最缺氧；Ito 細胞儲維生素 A、致纖維化。</p>\n<p><b>肝膿瘍：</b>多右肝、常多菌(E. coli/Klebsiella)、現今<b>膽道感染最常見</b>；血培養陽性~50%；CT<b>低密度</b>；治療抗生素+<b>經皮引流</b>。肝靜脈非感染途徑。</p>\n<p><b>肝硬化/門脈高壓：</b>HVPG>5 mmHg；側枝=食道胃靜脈曲張、caput medusae、痔靜脈叢(精索靜脈曲張無關)。蜘蛛血管瘤/手掌紅斑、高動力循環(<b>低 MAP</b>)、腹水、肝性腦病(限蛋白、lactulose)。<b>食道靜脈曲張首選非選擇性 β-blocker</b>+結紮；出血→藥物+內視鏡→TIPS/分流/移植(不用動脈栓塞)。<b>MELD</b>=膽紅素+肌酸酐+INR(不含白蛋白/WBC)；<b>Child-Pugh</b>=膽紅素+白蛋白+PT/INR+腹水+腦病(不用 PTT)。Budd-Chiari=肝靜脈流出道阻塞。</p>\n"},"器官移植與脾臟":{"title":"器官移植與脾臟","html":"\n<p><b>肝臟移植：</b>適應症=末期肝硬化、急性肝衰竭(acetaminophen/猛爆肝炎)、膽道閉鎖、肝腎症候群、符合準則 HCC。<b>禁忌</b>：肝外惡性/轉移、<b>大血管(門脈)腫瘤侵犯</b>、活動性感染、心因性(心衰竭)肝硬化；肝功能好的小 HCC 優先切除。移植後最常見癌症皮膚癌；發生癌症應<b>減量</b>免疫抑制(非全停)。中期機會性感染以 CMV 為代表。</p>\n<p><b>胰臟移植：</b>用於<b>第一型糖尿病</b>(尤其合併腎衰竭→SPK，移植量最大、預後最好)；現以腸道引流為主；最常見手術併發症<b>移植物血管栓塞</b>；最常見長期死因心血管疾病。</p>\n<p><b>脾臟：</b>切脾<b>最常見原因為外傷/醫源性損傷</b>(非 ITP)；術後<b>莢膜菌</b>感染風險高(術前 2 週打疫苗、兒童 OPSI 風險高)；腹腔鏡為首選但須考慮門脈高壓；肝硬化脾亢不需常規切脾。遠端脾腎分流(Warren)保留門脈血流、日後仍可移植。</p>\n"},"肝脾鈍傷":{"title":"肝脾鈍傷","html":"\n<p><b>腹部創傷器官：</b>鈍傷最常傷<b>脾臟</b>(其次肝)；穿刺/槍傷最常傷<b>小腸</b>。所有創傷死亡中<b>腦部損傷占>50%</b>。</p>\n<p><b>實質臟器(肝/脾)鈍傷：</b>血流動力穩定者多採<b>非手術治療</b>。肝裂傷非手術併發症：延遲性出血、膽漏/膽汁瘤、肝膿瘍、膽道出血、黃疸(無血尿)；門靜脈栓塞最少見。<b>AAST 肝損傷分 I–VI 級</b>(裂傷深度/血腫範圍/近肝靜脈大血管)。</p>\n<p><b>出血與輸血：</b>休克分級(Class III=失血30–40%、心搏>120、血壓降、base deficit 增大)；大量輸血 <b>RBC:FFP:血小板=1:1:1</b>；緊急萬用紅血球=<b>O 型</b>、萬用血漿=<b>AB 型</b>(O 型血漿非萬用)。</p>\n"}};
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_hpb_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
