"A","answer_status":"normal","accepted_answers":["A"],"topic":"精神科護理概論治療性人際關係與溝通","topic_num":"精神科護理概論治療性人際關係與溝通","q_num":12,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"宜安排精細活動磨練耐心與專注力","B":"洗澡洗頭時在旁協助避免被其他事吸引","C":"注意其月經週期","D":"可給予容易攜帶之食物或少量多餐"},"img":""},{"id":"115030-N5-7","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":7,"stem":"根據團體治療型態的定義及目標,鼓勵成員在團體中用言語表達,並探討個人現在與過去情境中, 情緒或心理上的問題,以增進成員的人格重建或行為型態之修正與調適。屬於下列何種團體治療?","opts":{"A":"健康指導團體","B":"會心團體","C":"娛樂治療團體","D":"生物回饋團體"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"精神科護理概論治療性人際關係與溝通","topic_num":"精神科護理概論治療性人際關係與溝通","q_num":7,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"健康指導團體","B":"會心團體","C":"娛樂治療團體","D":"生物回饋團體"},"img":""},{"id":"115030-N5-24","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":24,"stem":"提供精神病人出院回歸社區的照護,下列敘述何者最適切?","opts":{"A":"辦理心理衛生講座,協助病人認識精神疾病","B":"廣設急性精神病房,因應病人急性發病所需","C":"增設社區復健治療,提升病人之社區適應能力","D":"推廣自殺防治,以減少全國自殺死亡率"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"精神科護理概論治療性人際關係與溝通","topic_num":"精神科護理概論治療性人際關係與溝通","q_num":24,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"辦理心理衛生講座,協助病人認識精神疾病","B":"廣設急性精神病房,因應病人急性發病所需","C":"增設社區復健治療,提升病人之社區適應能力","D":"推廣自殺防治,以減少全國自殺死亡率"},"img":""}],E={"101030-N5-12":{"quick":"把病人話語中的『情緒(孤單)』反射回去讓其覺察，是回映(reflection)。","detail":{"background":"治療性溝通技巧須能精準辨識。回映/反映(reflection)是把病人話語中隱含的『感受、想法或內容』再反射回去，引導其覺察自己的情緒，常以「…讓你感到…嗎?」呈現；重述(restating)只是把病人說過的『字句』重複以確認聽到、未加入情緒詮釋；澄清(clarification)用於語意含糊時請病人說清楚；面質(confrontation)指出病人言行不一致；廣泛開啟(broad opening)以開放式問句鼓勵病人自選話題起頭(如「想談些什麼?」)。本題護理師把『一個人住、沒人說話』詮釋為『孤單』的感受並反射，屬回映。","options":{"A":"面質是點出病人語言與行為的矛盾，本題並無指出矛盾。","B":"重述只重複原句字面，未加入「孤單」這個情緒詮釋。","C":"正確。將病人陳述背後的孤單情緒反射回去，引導其覺察感受，為回映(reflection)。","D":"廣泛開啟是開放式起頭邀請病人選擇話題，本題護理師已聚焦於情緒。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry"]}},"101030-N5-17":{"quick":"入院環境/自我介紹、建立信任、確認問題＝介紹期(orientation)。","detail":{"background":"Peplau 將治療性護病關係分四期：互動前/介紹前期(preorientation)護理師先做自我覺察與資料準備、尚未與病人接觸；介紹期/認識期(orientation)雙方初次相遇，進行環境介紹與自我介紹、建立初步信任、共同確認病人問題並訂立護理契約；工作期(working phase)是關係核心，深入探討問題、協助病人面對與改變、處理抗拒；結束期(termination)評值目標達成、處理分離情緒並轉介。對『初入院』病人做有計畫的環境與自我介紹、建立信任、確認問題，正是介紹期的工作。","options":{"A":"介紹前期護理師尚未與病人接觸，重點在自我覺察與準備，非與病人互動。","B":"正確。環境/自我介紹、建立信任、確認問題是介紹期(orientation)的任務。","C":"工作期是在信任建立後深入探討與改變問題，非初入院的第一步。","D":"結束期處理關係終止與分離，不在入院初期。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry"]}},"101030-N5-23":{"quick":"護理師因病人而生氣＝反轉移，護理長應引導其覺察並討論對病人的感受與期待。","detail":{"background":"護理師對病人產生強烈負向情緒(如因病人拒服藥而生氣訓斥)常是『反轉移(countertransference)』的表現——把自己未解決的情緒或對過去重要他人的感受投射到病人身上，會干擾治療性關係。處理反轉移的核心是『自我覺察』：由督導/護理長協助護理師覺察並討論自己對該病人的感受與期待，而非立即抽離或懲處。直接更換照護者或轉介心理諮商屬過度反應，反而剝奪護理師成長與覺察的機會。","options":{"A":"立即更換照護者只是迴避問題，未協助護理師覺察反轉移，且影響照護連續性。","B":"檢討「態度」偏指責，較難促成自我覺察。","C":"正確。引導護理師討論其對病人的感受與期待，協助覺察反轉移、調整專業界限，最符合督導原則。","D":"單一事件即轉介心理諮商過度，且非立即且最適當的處理。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-6":{"quick":"非理性信念→負面情緒，是認知理論(Ellis/Beck)。","detail":{"background":"各心理治療理論對情緒困擾的成因觀點不同：認知理論(Ellis 理情療法 REBT、Beck 認知治療)主張困擾源於『非理性信念/負向自動化思考』，個體對事件的『想法』決定其情緒與行為(A-B-C 模式)；行為學習理論強調行為由制約與增強塑造；精神分析理論認為症狀源於潛意識早期衝突與防衛機轉；社會互動/人際理論(Sullivan、Peplau)強調人際關係對人格與焦慮的影響。題幹『非理性信念與負面情緒之相關』正是認知理論的核心。","options":{"A":"正確。非理性信念造成負面情緒是 Ellis 理情療法/Beck 認知治療的核心主張。","B":"行為學習理論重點在外顯行為與增強，非信念。","C":"精神分析強調潛意識衝突，非認知信念。","D":"社會互動理論強調人際關係影響，非非理性信念。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","Ellis 理情行為治療(REBT)","Beck 認知治療"]}},"101110-N5-7":{"quick":"病房生活討論會＝討論近期病房發生的衝突/共同事務(環境治療)。","detail":{"background":"環境治療(milieu therapy)把整個病房環境當作治療工具，藉由結構化的團體活動促進病人學習人際互動與問題解決。『生活討論會/社區會議(community meeting)』是其重要形式，由全體病人與工作人員共同參與，目的在討論最近病房中發生的事件、衝突與共同生活議題，讓病人練習表達、協商與遵守團體規範，培養現實感與責任感。病房『重要常規』由治療團隊制定、不由病人任意修訂；交換私人聯絡方式違反治療性界限；澄清個別疾病/治療問題屬個別衛教非生活討論會目的。","options":{"A":"交換私人電話地址逾越治療性界限，非生活討論會目的。","B":"病房核心住院常規由治療團隊制定，病人不得任意修訂。","C":"個別疾病與治療問題的澄清屬個別護理指導。","D":"正確。生活討論會旨在共同討論病房近期衝突與生活事件，練習人際互動。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","精神科環境治療(milieu therapy)"]}},"101110-N5-8":{"quick":"團體領導者應促進成員『互相分享經驗(普同感)』，而非自己直接給答案或洩漏隱私。","detail":{"background":"團體治療中護理師擔任領導者，核心任務是促進團體互動與凝聚力，善用療效因子如『普同感(universality)』——讓成員發現他人有類似經驗而不孤單，並引導彼此分享、相互學習。領導者應避免:替成員下結論、把握個別問題立即做單向衛教(變成一對一)、或主動洩漏其他成員隱私(違反保密)。本題丙病友提出睡不好，護理師詢問是否有成員有類似經驗並分享，正是運用普同感、促進團體互動。","options":{"A":"向團體宣布某病友不宜出院，洩漏個別病情且未促進互動。","B":"立刻單向藥物衛教使團體變成一對一指導，非團體領導。","C":"正確。引導成員分享類似失眠經驗，運用普同感促進團體互動，是領導者正確角色。","D":"主動透露另一病友也是家暴受害者，嚴重違反保密。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","Yalom 團體治療療效因子"]}},"101110-N5-24":{"quick":"兒少精神護理：考量家庭、發展階段、善用非語言；單靠直接會談無法收集最完整資料。","detail":{"background":"兒童及青少年精神衛生護理的原則:(1)兒少的心理問題與家庭整體健康、親子互動密切相關，須以家庭為中心評估;(2)兒少語言表達能力有限，遊戲、繪畫等非語言溝通常更能促進治療性關係與表達;(3)護理必須符合個案的發展階段(認知、語言、心理社會發展),用其能理解的方式。但『單靠直接與個案會談即可收集到最完整評估資料』為錯——兒少自陳能力有限，須結合家長、老師、觀察與遊戲等多重來源。故正確為 (1)(2)(3)。","options":{"A":"含敘述4(直接會談收集最完整資料)，錯誤。","B":"含敘述4，錯誤。","C":"含敘述4，錯誤。","D":"正確。敘述1家庭相關、2非語言溝通、3考量發展階段皆正確；敘述4錯誤(須多重來源)。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","兒童青少年精神衛生護理"]}},"101110-N5-35":{"quick":"哄騙住院的青少年，接案護理師應先『評估家屬的期待與擔心』。","detail":{"background":"青少年因行為問題被父母『哄騙』住院，會破壞醫病/親子信任。接案護理師的首要工作是全面評估——而面對剛辦完住院的家屬，最適當的起點是『評估家屬的期待與擔心』，了解家庭脈絡與求助動機，建立合作關係，作為後續介入(衛教、調整親子互動、家族治療)的基礎。直接澄清/矯正家屬的『錯誤認知或哄騙行為』屬指責，會破壞關係；詳述病室公約、安排職能/針劑都非此刻最優先。先評估再介入是護理過程的基本順序。","options":{"A":"一開始即指出家屬哄騙是錯的，帶指責、破壞合作關係。","B":"說明病室公約非家屬此刻最需要，且未先了解其需求。","C":"矯正親子互動屬後續介入，須先評估。","D":"正確。先評估家屬的期待與擔心，了解脈絡並建立合作，符合護理過程先評估的原則。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-36":{"quick":"青少年因被哄騙住院而對父母咆哮：先把雙方隔開、分別同理感受。","detail":{"background":"當住院青少年因不滿被哄騙、對前來會客的父母咆哮怒斥時，現場情緒高張、衝突升溫。最適當的立即護理是先『將雙方暫時隔開、降低刺激，再分別同理個案與父母的情緒』，待情緒平穩後再處理問題。立即限制探訪/簽同意書、強制職能治療或直接給針劑都過度且未先處理情緒；針劑鎮靜應保留給有立即攻擊危險、口語安撫無效時。先以同理穩定情緒是危機溝通的原則。","options":{"A":"正確。先將衝突雙方隔開、降低刺激，分別同理其感受，是處理現場情緒衝突的首要措施。","B":"立即限制探訪、簽同意書過度且未先安撫情緒。","C":"情緒高張時強制參與職能治療不切實際。","D":"針劑鎮靜應保留給口語安撫無效且有立即危險時，非首選。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-37":{"quick":"處理青少年對住院的反彈，最重要的是『建立治療性人際關係』。","detail":{"background":"面對對住院強烈反彈、不信任的青少年，後續一切護理介入(評估、衛教、行為處理、家族治療)都必須奠基於信任。因此『建立治療性人際關係』是最重要、最優先的基礎工作。請醫師解釋目的、安排家族治療、提供保護室都是個別且後續的措施，無法取代信任關係的建立；保護室更僅用於有安全危險時。治療性關係是 Peplau 模式中所有護理工作的核心媒介。","options":{"A":"醫師解釋住院目的無法取代護病信任關係的建立。","B":"正確。對反彈的青少年，建立治療性人際關係是後續所有介入的基礎，最為重要。","C":"家族治療屬後續介入，須先有治療性關係。","D":"保護室僅用於有立即安全危險時，非處理反彈情緒的首選。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-39":{"quick":"台灣社區精神衛生現況：仍偏向以『醫院為基礎』的照護模式。","detail":{"background":"我國精神衛生照護雖推動去機構化與社區化，但現況仍偏重『以醫院為基礎(hospital-based)』的照護，社區精神復健資源、社區追蹤網絡相對不足、且尚未在各縣市衛生局普遍附設完整社區復健機構。社區精神病人之追蹤輔導是由衛生所社區護理師、精神醫療機構、社區關懷訪視員等『多單位協力』而非全由衛生所護理師獨任。理想方向是逐步發展以社區為基礎的連續性照護，但『現況』描述應選仍集中於醫院模式。","options":{"A":"正確。我國社區精神衛生現況仍多集中於以醫院為基礎的照護模式。","B":"以社區為基礎是努力方向而非現況。","C":"社區追蹤輔導為多單位協力，非全由衛生所護理師負責。","D":"尚未在各縣市衛生局普遍附設社區復健機構。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","精神衛生法","社區精神衛生"]}},"102030-N5-4":{"quick":"邊緣型人格『分化(splitting)』→工作人員須維持態度與行為一致。","detail":{"background":"邊緣型人格障礙症(BPD)常使用『分化/分裂(splitting)』防衛——將人極端二分為全好或全壞，並在工作人員間挑撥(playing staff against each other)，造成團隊分裂。處理核心是『全體工作人員維持一致的態度、規範與限制設定(limit setting)』，避免被操縱與分化；並以清楚一致的界限提供病人安全感。回顧護病觀點、強化社交、分析失敗經驗皆非針對『分化』此一行為的首要對策。團隊一致性是照顧 BPD 操縱/分化行為的關鍵原則。","options":{"A":"回顧護病關係觀點非針對分化行為的直接對策。","B":"正確。面對邊緣型人格的分化/挑撥，工作人員維持一致的態度與行為(限制設定)最重要。","C":"強化社交反應屬一般目標，非處理分化的首要措施。","D":"分析失敗經驗非針對分化行為。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","DSM-5-TR 邊緣型人格障礙症","限制設定(limit setting)"]}},"102030-N5-9":{"quick":"成員抱怨領導者偏袒→團體進入『工作期』衝突浮現。","detail":{"background":"團體治療發展階段:準備/形成期成員彼此陌生、客氣試探;初期(orientation)建立規範與信任;工作期(working)成員投入、開始呈現真實情緒，常出現對領導者的挑戰、權力競爭與彼此衝突(如抱怨領導者偏袒、爭奪發言時間)，這正是團體動力深化、成員敢表達不滿的表現;結束期處理分離與統整。成員公開抱怨治療者偏袒某成員，屬工作期才會浮現的衝突與面質。","options":{"A":"準備期成員尚陌生、客氣，不會公開抱怨領導者。","B":"初期重在建立信任與規範，衝突尚未浮現。","C":"正確。對領導者偏袒的抱怨、成員間衝突是工作期成員投入後才會出現的動力。","D":"結束期重點在分離與統整，非權力衝突。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","團體治療發展階段"]}},"102030-N5-11":{"quick":"下班後與病人私下吃飯看電影、過度涉入＝情感反轉移。","detail":{"background":"轉移(transference)是病人把對過去重要他人的情感投射到護理師身上;反轉移(countertransference)則相反，是『護理師』把自己的情感、需求投射到病人身上，表現為過度涉入(下班帶病人吃飯看電影)、特別偏愛、過度為其爭取、難以保持專業界限或腦中常浮現該病人。本題護理師的行為(私下社交、特別關心、逾越界限)正是反轉移的典型表現。治療性關係應維持專業界限，故 D 非正解。","options":{"A":"情感轉移是病人投射到護理師，方向相反。","B":"正確。護理師對病人過度涉入、逾越專業界限的偏愛，是情感反轉移。","C":"試探行為是病人測試護理師，非本題護理師的行為。","D":"逾越界限的私下社交恰違反治療性關係的專業界限。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","轉移與反轉移(transference/countertransference)"]}},"102030-N5-18":{"quick":"病人在治療性會談中沉默：陪伴並觀察其反應(治療性沉默)。","detail":{"background":"治療性會談中病人沉默，不必然代表抗拒，可能在思考、整理情緒或感到安全。護理師最合宜的處理是運用『治療性沉默』——安靜陪伴、以非語言傳達接納、觀察病人的非語言反應，給予其組織思緒與表達的空間，而非急於結束會談、轉移話題或給建議(會打斷其歷程、傳達不耐)。沉默的接納本身即具治療性。","options":{"A":"立即結束會談傳達不耐、剝奪病人表達空間。","B":"正確。以治療性沉默陪伴並觀察病人反應，給予整理思緒的空間。","C":"急著引發其他話題會打斷病人正在進行的內在歷程。","D":"過早提供具體建議非治療性，且未先理解病人。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","治療性沉默"]}},"102030-N5-21":{"quick":"妄想性精神病人心理治療『首要目標』＝建立治療性關係。","detail":{"background":"對妄想性精神病人(如孫先生懷疑配偶不忠的嫉妒型妄想)的心理治療，首要目標是『建立治療性關係/信任感』。妄想者本就多疑、防衛，唯有先以一致、不爭辯、可信賴的態度建立關係，後續才可能進行其他工作。直接『面質妄想內容』或急於『建立病識感』在關係未穩前會增加敵意與防衛、適得其反;『積極接觸』方向對但仍以建立關係為核心目標。原則:不與妄想爭辯，先信任後處理。","options":{"A":"未建立關係前直接面質妄想會升高敵意與防衛。","B":"病識感的建立須在信任關係之後，非首要目標。","C":"正確。對多疑的妄想病人，首要目標是建立治療性關係/信任感。","D":"積極接觸是手段，核心目標仍是建立關係。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","妄想症護理"]}},"102030-N5-22":{"quick":"對多疑、拒食的思覺失調病人，溝通首重『建立信任感』。","detail":{"background":"古小姐自語、傻笑、覺得母親不懷好意而拒食，呈現被害意念與思考障礙。與此類多疑病人溝通的首要技巧是『建立信任感』——以誠懇、一致、可預期的態度接觸，不爭辯其想法，方能逐步開展照護。直接『澄清母親的關心』等於與其被害意念爭辯;『鼓勵服藥/指導症狀處理』屬後續介入，須先有信任基礎。對思考障礙、被害多疑者，信任關係是一切溝通與治療的前提。","options":{"A":"澄清母親的關心等同與被害意念爭辯，升高防衛。","B":"鼓勵服藥屬後續，須先建立信任。","C":"正確。對多疑、被害意念明顯的病人，溝通首重建立信任感。","D":"症狀處理指導屬後續介入，非首要溝通技巧。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","思覺失調症護理"]}},"102030-N5-35":{"quick":"社區心理衛生護理成效評值重點＝個案是否維持/恢復生活功能。","detail":{"background":"社區精神/心理衛生護理的最終目的是協助精神病人在社區中維持與恢復其『生活功能』(自我照顧、人際、職業、社會角色)、預防復發與再住院。因此成效評值的重點應放在『個案是否維持或恢復其生活功能』這項以個案為中心的成果指標，而非護理師是否受歡迎、是否善用資源(屬過程面)，或個案是否找到工作(僅職業功能單一面向，且非人人適用)。以個案功能成果為核心是社區照護評值的原則。","options":{"A":"護理師是否受歡迎屬過程/關係面，非成效核心。","B":"正確。個案是否維持或恢復生活功能是社區心理衛生護理成效評值的重點。","C":"善用社區資源是過程指標，非最終成效。","D":"找到工作僅職業功能一面向，非適用所有個案的核心評值。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","社區精神衛生護理"]}},"102110-N5-2":{"quick":"指出觀察到的『具體正向行為』而不評價＝給予認知(giving recognition)。","detail":{"background":"『給予認知(giving recognition)』是指護理師客觀指出觀察到的具體事實或行為(尤其正向行為)，讓病人感到被注意與被肯定，但『不加入價值評斷(如「你好棒」)』。本題護理師具體描述「你今天自己鋪床而且很整齊」，正是給予認知。陳述真實(presenting reality)用於病人有幻覺妄想時溫和呈現客觀現實;透露感受(sharing perceptions)是護理師說出自己對病人感受的觀察以求證;提供訊息(informing)是給予事實資訊。","options":{"A":"陳述真實用於回應幻覺妄想，呈現客觀現實，非本題情境。","B":"正確。具體指出觀察到的行為而不評價，是給予認知(giving recognition)。","C":"透露感受是護理師說出對病人感受的觀察以求證。","D":"提供訊息是給予事實/衛教資訊，非肯定行為。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","治療性溝通技巧"]}},"102110-N5-6":{"quick":"在團體中不斷搶話、要大家只聽他說＝獨占者(monopolizer)。","detail":{"background":"團體治療中成員會扮演各種角色。『獨占者(monopolizer)』不斷主動發言、打斷他人、占據團體時間，使其他成員無法參與;守門員(gatekeeper)促進並維持團體溝通、邀請沉默者表達;領導者引導團體歷程;代罪羔羊(scapegoat)是團體投射攻擊的對象。吳先生不斷打斷別人、希望全部人只聽他說，屬獨占者。領導者須技巧性限制獨占者、邀請其他成員發言以平衡團體。","options":{"A":"守門員促進溝通、邀請他人參與，與獨占相反。","B":"領導者引導團體歷程，非搶話。","C":"正確。不斷搶話、占據時間、要他人只聽自己＝獨占者(monopolizer)。","D":"解決者非標準團體角色名稱，且不符搶話行為。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","團體治療成員角色"]}},"102110-N5-9":{"quick":"把病人雜亂陳述按時間先後重新整理＝將事件依先後次序排列。","detail":{"background":"病人陳述顛三倒四(商專畢業→鞋廠→讀大學二年級→幼稚園老師)時，護理師將其經歷『依時間先後重新排列並複述』，協助病人與護理師釐清事件的時序與因果，這項技巧稱『將事件依先後次序排列(placing events in time/sequence)』。澄清(clarification)用於語意不清請其說明;提出懷疑(voicing doubt)用於對妄想表達不確定;依字面意義反應指照字面回應(常為非治療性)。本題重點在『重整時序』。","options":{"A":"澄清是請病人把不清楚處說明，非重整時間順序。","B":"提出懷疑用於對病人(妄想)內容表達溫和不確定。","C":"依字面意義反應是照字面回答，非整理時序。","D":"正確。把雜亂陳述按時間先後重新排列複述，是將事件依先後次序排列。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","治療性溝通技巧"]}},"102110-N5-11":{"quick":"反轉移表現：難以同理、腦中常浮現病人、與病人私下社交(非多元客觀)。","detail":{"background":"情感反轉移(countertransference)是護理師對病人的非治療性情感反應，常見表現:(1)難以同理病人某些行為、出現強烈好惡;(2)腦海中經常浮現與該病人有關的想像、過度掛念;(3)與病人發展私人或社交性質的關係、逾越界限。而『從多元角度客觀看待病人的問題』恰是『沒有反轉移、保持專業』的表現，不屬反轉移。故正確為 (1)(2)(3)。辨識反轉移有助護理師自我覺察、維持治療性界限。","options":{"A":"正確。難以同理、腦中常浮現病人、與病人私下社交皆為反轉移表現。","B":"含敘述4(多元客觀看待)，那是專業而非反轉移。","C":"含敘述4，錯誤。","D":"含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","轉移與反轉移"]}},"102110-N5-23":{"quick":"對有被害意念的病人，回應應聚焦其『感受』而非爭辯內容。","detail":{"background":"吳先生覺得想法被同事知道(思想被廣播)、被在背後講壞話(被害意念)。對此回應原則是『不爭辯妄想/被害內容的真假，而把焦點放在病人的情緒與感受』，以同理建立信任。選項D「當您覺得同事知道您的想法時，您有何感受?」正是聚焦感受、不評斷內容。A「為什麼有這種想法」帶質問;B「您太多心了」直接否定其經驗;C「他們為什麼這樣對您」反而強化其被害想法的真實性。","options":{"A":"「為什麼會有這種想法」帶質問，易升高防衛。","B":"「您太多心了」直接否定病人經驗，破壞信任。","C":"順著問「他們為什麼這樣對您」會強化被害妄想的真實感。","D":"正確。把焦點放在病人的感受、不爭辯內容，最具治療性。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","妄想/被害意念溝通"]}},"102110-N5-24":{"quick":"把會談焦點放在『問題核心/情緒癥結』，宜在工作期進行。","detail":{"background":"Peplau 模式中，介紹期(orientation)建立信任、確認問題;工作期(working phase)才在信任基礎上『深入探討病人問題的核心、情緒癥結』，協助其面對與改變。將會談焦點集中在情緒癥結或問題所在，屬深入工作，宜在工作期進行;互動前期護理師尚未接觸病人;介紹期關係初建、過早深掘核心會引發抗拒;結束期重在統整與分離。","options":{"A":"互動前期護理師尚未與病人接觸。","B":"介紹期關係初建，過早深掘問題核心會引發抗拒。","C":"正確。深入探討問題核心/情緒癥結屬工作期(working phase)的任務。","D":"結束期重在評值與處理分離，非深掘問題。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry","Peplau 治療性人際關係四期"]}},"102110-N5-26":{"quick":"護理評估須含家庭互動、早期發展、身心發展，並可邀老師了解在校情形。","detail":{"background":"完整的精神科護理評估應採『生物-心理-社會』多面向且多來源:(1)評估須包含家庭互動型態(家庭對個案影響大);(3)需同時評估身體與生理(心理)發展;(4)可邀請學校老師會談以了解個案在校表現(多來源)。而敘述(2)『成長早期發展過程與現在問題無關』錯誤——早期發展經驗對現在問題影響甚鉅，必須評估。故正確為 (1)(3)(4)。","options":{"A":"含敘述2(早期發展無關)，錯誤。","B":"正確。家庭互動(1)、身心發展(3)、邀老師了解在校(4)皆應評估；敘述2錯誤。","C":"含敘述2，錯誤。","D":"含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Peplau 人際關係模式","Kaplan & Sadock Synopsis of Psychiatry"]}},"102110-N5-33":{"quick":"病友團體核心功能＝同舟共濟、相互支持。","detail":{"background":"精神病友團體(self-help/支持團體)的主要功能是讓有相似經驗的病人『同舟共濟、相互支持』，藉由分享經驗獲得普同感、希望灌注與情緒支持，並學習因應方法。它並非為向媒體宣言或避免被排擠;且病友團體在情緒支持、經驗傳承上有專業人員難以取代的價值——故 D「不易提供實質幫助」錯誤。專業治療與病友支持團體相輔相成。","options":{"A":"正確。病友團體的主要功能是同舟共濟、相互支持與經驗分享。","B":"向媒體宣言非病友支持團體的主要功能。","C":"避免被排擠並非團體設立目的。","D":"病友團體在情緒支持與經驗傳承上有獨特價值，並非不易提供幫助。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"102110-N5-58":{"quick":"失智猜忌誤食：勿勸病人『體諒媳婦』(疾病使然無法理解)，應衛教照顧者。","detail":{"background":"失智症病人因認知退化會出現短期記憶障礙、猜忌妄想(覺得東西被偷、被虐)、誤食等，這些是『疾病造成、非病人故意』，病人也無法理解或被說服去『體諒』他人。正確護理:向照顧者(媳婦)解說疾病特性以減少誤解與衝突、把危險及不可食物品收好以防誤食、轉介照顧者支持團體以減輕負荷。而『勸張老太太體諒媳婦辛苦』是錯誤的——失智者無法理解，反凸顯照顧者對疾病的誤解。","options":{"A":"正確(本題選錯誤者)。失智病人因疾病無法理解或體諒他人，勸其體諒媳婦無效且不當。","B":"向案媳解說疾病特性，正確。","C":"收好危險及不可食物品防誤食，正確。","D":"轉介照顧者支持團體減輕負荷，正確。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","失智症照護"]}},"102110-N5-59":{"quick":"維持泌乳：上班擠乳冷藏、下班餵母乳；不宜『上班餵牛奶、下班才餵母乳』。","detail":{"background":"欲維持母乳哺餵的職業婦女，正確衛教:坐月子是建立成功泌乳的最佳時機、可參加哺乳支持團體、上班時定時擠乳並冷藏保存帶回哺餵以維持泌乳。而『上班時請家人餵牛奶(配方奶)、下班才餵母乳』並不合適——上班不擠乳會使泌乳量下降、易脹奶與乳腺炎，且混合餵食配方奶會減少母乳需求刺激而抑制泌乳。維持泌乳的關鍵是規律移出乳汁(親餵或擠乳)。","options":{"A":"坐月子是建立成功泌乳的最佳時機，正確。","B":"參加哺乳支持團體有助持續哺乳，正確。","C":"上班定時擠乳冷藏保存可維持泌乳，正確。","D":"正確(本題選不合適者)。上班不擠乳改餵牛奶會抑制泌乳、易脹奶乳腺炎，不利持續母乳哺餵。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","母乳哺餵衛教"]}},"103030-N5-4":{"quick":"治療性護病關係特性：以非批判態度接受病人的價值觀。","detail":{"background":"治療性護病關係的特性:(1)以『非批判(nonjudgmental)』態度接納病人的價值觀與感受;(2)需要專業理念、知識與溝通技巧;(3)關係的結束是『有計畫的』，須與病人討論並處理分離;(4)目的是以『病人』的成長與需求為中心，而非滿足護理師自身需求。故 A 正確;B(不需專業技巧)、C(結束無計畫)、D(滿足雙方需求)皆為錯誤敘述。","options":{"A":"正確。治療性關係以非批判態度接受病人的價值觀。","B":"治療性關係必須運用專業理念與技巧，非不需要。","C":"關係結束須有計畫並與病人討論分離。","D":"目的以病人需求為中心，非滿足護理師自身需求。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"103030-N5-6":{"quick":"看到他人從自殺意念走向正向，自己也覺得有正向力量＝灌注希望。","detail":{"background":"Yalom 團體治療療效因子中，『灌注希望(instillation of hope)』指成員看到其他人(尤其曾陷低谷者)有所改善或朝正向發展，因而對自己的處境也燃起希望與正向力量。本題成員看到他人從強烈自殺意念走向能用圖畫表達、復原，使自己也感到有朝向正向的力量，正是灌注希望。普同感是發現他人有類似困擾而不孤單;人際學習是透過團體回饋學習人際模式;存在性因子是面對孤獨、死亡、責任等存在議題。","options":{"A":"普同感是發現他人有類似經驗而不孤單，非看到他人改善而生希望。","B":"人際學習是透過團體回饋修正人際模式。","C":"正確。看到他人復原而對自己也產生正向力量與希望，是灌注希望(instillation of hope)。","D":"存在性因子是面對孤獨死亡責任等存在議題。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"103030-N5-9":{"quick":"同質性團體可依病人功能或症狀類別分組。","detail":{"background":"團體治療的正確概念:(1)同質性團體(homogeneous)可依病人的功能程度或症狀類別來組成(如失智團體、物質戒治團體)，使成員需求相近、互動聚焦;(2)理想成員數約 8–10 人(過多難互動，30 人過多);(3)工作期成員已建立信任、投入深入工作，而『過於有禮或敵意甚重』是團體初期/形成期的表現;(4)團體治療者或協同治療者不限醫師與心理師，受過訓練的精神科護理師亦可帶領。故 C 正確。","options":{"A":"過於有禮或敵意是初期的表現，工作期成員已投入深入工作。","B":"理想成員數約8–10人，非至少30人。","C":"正確。同質性團體可依病人功能或症狀類別來組成。","D":"治療者不限醫師與心理師，受訓護理師亦可帶領。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"103030-N5-12":{"quick":"給面紙、靜靜陪伴傷心病人＝治療性沉默。","detail":{"background":"病人傷心欲泣時，護理師遞面紙、安靜陪伴於旁、以非語言傳達接納與支持，給病人宣洩與整理情緒的空間，這是『治療性沉默(therapeutic silence)』。呈現事實用於回應幻覺妄想;反映是把病人情緒/想法以語言反射回去;面質是指出病人言行不一致。本題重點是『不以言語介入、以陪伴傳達支持』，屬治療性沉默。","options":{"A":"呈現事實用於溫和回應幻覺妄想的客觀現實。","B":"反映需以語言把病人情緒反射回去，本題護理師未說話。","C":"正確。給面紙、靜靜陪伴、以非語言傳達接納，是治療性沉默。","D":"面質是指出病人言行矛盾，非本題情境。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"103030-N5-27":{"quick":"面對激動有攻擊危險的病人：站立呈直角位置、保持安全距離。","detail":{"background":"處理激動、出言威脅、可能有暴力的病人，安全是首要。護理師應:與病人站立呈『直角(side-by-side/呈90度)』而非正面對峙(正面對峙具挑釁意味)、保持一個手臂以上的安全距離(勿近距離)、不握住病人的手(限制其手會被視為威脅、且自身受困)、保持出口暢通，並以平穩語調說明。故 D 最適切。A 雙手抱胸具防衛/對抗姿態;B 近距離接觸危險;C 握手限制反而激怒。","options":{"A":"走出護理站、雙手抱胸具對抗防衛姿態，且離開保護易受攻擊。","B":"維持近距離接觸對激動病人危險，易遭攻擊。","C":"握住病人的手會被視為限制與威脅，反而激怒。","D":"正確。與病人呈直角站立、保持安全距離並說明，最能兼顧安全與溝通。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","暴力病人處置"]}},"103030-N5-31":{"quick":"客觀指出觀察到的行為而不評價＝給予認知。","detail":{"background":"對久未自理而主動整理床舖的病人，最適切回應是『客觀陳述觀察到的具體行為而不加評斷』——「我注意到你今天自己整理了床舖」，即給予認知(giving recognition)，讓病人感到被注意與肯定且不帶價值判斷。B「你終於清醒了」帶批判;C「你應該每天都自己整理」是命令/要求;D「你這樣做才對」是價值評斷與贊許。不評價的客觀肯定最能增強正向行為而不引發防衛。","options":{"A":"正確。客觀指出觀察到的具體行為而不評價，是給予認知。","B":"「你終於清醒了」帶批判意味。","C":"「你應該每天整理」是命令與要求。","D":"「你這樣做才對」是價值評斷，非客觀肯定。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"103100-N5-1":{"quick":"去機構化＝把長期住院個案轉到以社區為基礎的安置/治療。","detail":{"background":"去機構化(deinstitutionalization)是 1960 年代起的精神衛生改革趨勢，指『將原本需要長期住在大型精神療養機構的病人，轉移到以社區為基礎(community-based)的安置與治療』(如康復之家、社區復健中心、日間留院、居家治療)，以減少機構化的依賴與功能退化、促進回歸社區生活。它不是把病房佈置得像家、也不是強制住院天數限制，更不是增加慢性療養機構(那與去機構化相反)。","options":{"A":"病房佈置像家是環境治療概念，非去機構化定義。","B":"強制住院天數限制是精神衛生法規定，非去機構化。","C":"正確。將需長期住院者轉到以社區為基礎的安置或治療，即去機構化。","D":"增加慢性療養機構與去機構化(減少機構依賴)方向相反。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","去機構化","社區精神衛生"]}},"103100-N5-3":{"quick":"觸及童年被責罵的痛苦而沉默退縮＝阻抗(resistance)。","detail":{"background":"阻抗(resistance)是病人在治療過程中，因觸及威脅性、痛苦的內在素材而出現有意或無意的迴避，表現為沉默、不參與、轉移話題等。小明平日積極，此次因團體主題勾起小時候被父親責罵的痛苦回憶而沉默不參與，屬阻抗。試探是測試治療者是否可信;退化是退回早期較幼稚的行為;操縱是為達目的而控制他人。本題核心是『因痛苦素材而迴避』，故為阻抗。","options":{"A":"試探是測試治療者的可信度，非因痛苦迴避。","B":"正確。因主題勾起痛苦回憶而沉默迴避，是阻抗(resistance)。","C":"退化是退回較幼稚的行為模式。","D":"操縱是為達目的而控制他人。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"103100-N5-4":{"quick":"「這問題很困擾你?」把焦點反射回病人的情緒＝反映(reflecting)。","detail":{"background":"被家暴婦女問「我是否該離開先生?」時，護理師不直接給建議(那會剝奪其自主)，而回應「這個問題很困擾你?」，把焦點從『要不要離開』反射回病人的『情緒與感受(困擾)』，引導其覺察與探索自己的感受，這是反映(reflecting)。探索是請病人多談;集中焦點是把談話聚焦到特定點;給予認可是肯定具體行為。本題重點是把問題反射為情緒，故為反映。","options":{"A":"正確。把病人的提問反射為其情緒(困擾)，是反映(reflecting)。","B":"探索是鼓勵病人進一步多談某主題。","C":"集中焦點是把分散的談話聚焦到單一重點。","D":"給予認可是客觀肯定病人的具體行為。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"103100-N5-5":{"quick":"「你的心裡很矛盾」反映病人的矛盾情緒，最適當。","detail":{"background":"病人陳述「先生會打我但會道歉，所以很難離開」呈現矛盾(ambivalence)情緒。最適當回應是『反映其矛盾』——「你的心裡很矛盾」，協助病人覺察自己的兩難感受，不替其下決定。B「你真是太傻了」是批判;C「你應該離開他」替病人做決定、給建議;D「離開他的條件是什麼」過早導向解決且帶引導。治療性溝通應先協助病人覺察與接納自身情緒，再由其自主決定。","options":{"A":"正確。「你的心裡很矛盾」反映病人的矛盾情緒，協助覺察，最適當。","B":"「太傻了」是批判，破壞關係。","C":"「你應該離開他」替病人做決定、給建議，非治療性。","D":"過早探問離開條件，未先處理其矛盾情緒。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"103100-N5-8":{"quick":"團體衝突、成員憤而離開、氣氛不安：鼓勵成員表達此刻感受。","detail":{"background":"團體治療中發生衝突、成員憤而離開、團體瀰漫不安時，最適宜的處置是『鼓勵留下的成員表達此時此刻(here-and-now)的感受』，把衝突當作團體學習素材，協助成員處理情緒、修復凝聚力。延續原主題會忽略當下情緒;再強調規範流於說教;暫停團體則錯失處理衝突的治療契機。處理此時此刻的情緒是團體治療面對衝突的核心原則。","options":{"A":"延續之前主題忽略了當下的不安情緒。","B":"再強調規範流於說教，未處理情緒。","C":"暫停團體錯失處理衝突的治療契機。","D":"正確。鼓勵成員表達此時此刻的感受，把衝突化為團體學習，最適宜。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"103100-N5-14":{"quick":"病房規則應提供病人明確的規範。","detail":{"background":"病房規則(治療性環境的一部分)的正確概念:應『清楚明確地讓病人知道』，提供結構與安全感、規範行為。它不是『為工作人員管理方便』而訂(應以治療與病人安全為目的);也非『完全不容更改』(可經適當程序檢討修訂)、但也不是『隨病人狀況隨時任意修正』(否則失去一致性與結構)。故 C「可提供病人明確的病房規則」最正確。","options":{"A":"病房規則應以治療與病人安全為目的，非為工作人員方便。","B":"規則可經適當程序檢討修訂，非完全不容更改。","C":"正確。病房規則應清楚明確地提供給病人，提供結構與安全感。","D":"隨時任意修正會失去一致性與結構。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"104030-N5-1":{"quick":"指導病人演練自我介紹(行為演練/技巧訓練)＝行為模式範例。","detail":{"background":"各護理照顧模式的範例:行為模式(behavioral model)透過學習原理改變行為，如『指導個案演練自我介紹』即行為演練/社交技巧訓練;懷舊團體治療屬人際/存在取向;對幻聽病人給予現實刺激(會談、聽音樂)是現實導向/環境治療;協助找到存在意義與價值屬存在主義治療。故 C 為行為模式範例。","options":{"A":"懷舊團體治療屬人際/存在取向。","B":"給予現實刺激是現實導向/環境治療。","C":"正確。指導個案演練自我介紹是行為演練/社交技巧訓練，屬行為模式。","D":"協助找到存在意義屬存在主義治療。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","精神科護理理論模式"]}},"104030-N5-3":{"quick":"Sullivan/Peplau 人際模式：透過關懷支持，體驗真誠互信的護病關係。","detail":{"background":"各理論模式對護理介入的描述不同:沙利文與佩普洛的『人際關係模式』強調人際關係(尤其護病關係)本身具治療性，護理師透過關懷、支持，幫助病人在真誠互信的關係中減輕焦慮、學習新的人際經驗;以可被接受的行為取代偏差行為屬行為模式;發展轉移關係、解析抗拒屬精神分析模式;指出語言/非語言不一致、教導溝通原則屬溝通模式。故 A 最符人際模式。","options":{"A":"正確。透過關懷支持、體驗真誠互信的護病關係，是 Sullivan/Peplau 人際模式的核心。","B":"以可接受行為取代偏差行為屬行為模式。","C":"發展轉移、解析抗拒屬精神分析模式。","D":"指出溝通不一致、教導溝通原則屬溝通模式。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","Sullivan/Peplau 人際關係模式"]}},"104030-N5-12":{"quick":"團體結束期：鼓勵成員表達分離的感受。","detail":{"background":"團體治療結束期(termination)的核心任務是處理『分離』——回顧團體歷程與收穫、鼓勵成員表達對團體結束的分離情緒(失落、不捨)，並做適當的統整與道別。將未完成議題轉到下一團體、鼓勵深入討論未解決議題都不適合在結束期(時間不足、會掀起新情緒);允許團體外私下聚會則逾越界限。故 B 正確。","options":{"A":"結束期不宜將議題轉介他團體，重點在處理分離。","B":"正確。鼓勵成員表達分離的感受是結束期的核心任務。","C":"結束期時間不足，不宜再掀起未解決議題的深入討論。","D":"允許團體外私下聚會逾越專業界限。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"104030-N5-15":{"quick":"問團體中是否有人有類似經驗＝促進普同感(universality)。","detail":{"background":"護理師詢問「團體中有那些人也有類似經驗?」，引導成員發現自己的困擾並非獨有、他人也有相似遭遇，這會促進『普同感/普遍性(universality)』——減少孤立感、覺得不孤單。希望灌注是看到他人改善而生希望;模仿行為是學習他人行為;利他是藉由幫助他人而獲益。本題重點是『發現他人有類似經驗』，故為普同感。","options":{"A":"希望灌注是看到他人改善而對自己生希望。","B":"模仿行為是觀察學習他人的行為。","C":"正確。引導發現他人有類似經驗、不孤單，是普同感(universality)。","D":"利他是藉助人而獲益。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"104030-N5-23":{"quick":"憂鬱、自我貶低、臥床的病人：先傾聽她的感受。","detail":{"background":"葛小姐處於憂鬱期，自我貶低、罪惡感、臥床退縮。最適合的護理是『傾聽她的感受』，以接納、陪伴建立關係，讓其情緒被聽見。空泛地『口頭保證她絕對有價值』會被憂鬱者否定、流於說教;『半強迫加入團體活動』忽視其當前能量與意願、徒增挫敗;憂鬱急性期『面質引導正向思考』時機不對、易增罪惡感。對憂鬱病人，先傾聽接納是建立關係與後續介入的基礎。","options":{"A":"正確。先傾聽憂鬱病人的感受、接納陪伴，是最適合的護理。","B":"空泛保證會被憂鬱者否定，流於說教。","C":"半強迫加入活動忽視其能量與意願，徒增挫敗。","D":"憂鬱急性期面質引導正向思考時機不當，易增罪惡感。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","憂鬱症護理"]}},"104030-N5-24":{"quick":"反映可把個案隱含未現的想法/情緒反射出來。","detail":{"background":"反映(reflection)技巧的特點是把病人話語中『隱含、未明說的想法或情緒』反射回去，引導其覺察。故 A「可以反映出個案隱含未現的想法」最適切。B「是同理心的技巧」雖部分相關(反映是表達同理的方式之一)但非其定義特徵;C「可以解決個案內在的感覺」過度(反映是促覺察，非直接解決);D「適當運用就不會引起防衛」為絕對化敘述，不正確(運用不當或時機不對仍可能引發防衛)。","options":{"A":"正確。反映可把個案隱含未現的想法或情緒反射出來，引導覺察。","B":"反映雖能表達同理，但「是同理心的技巧」非其定義特徵。","C":"反映促進覺察，並非直接「解決」內在感覺，敘述過度。","D":"「適當運用就不會引起防衛」為絕對化，運用不當仍可能引發防衛。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"104030-N5-33":{"quick":"自殺防治專線＝次級預防(早期發現、早期介入高危險者)。","detail":{"background":"社區心理衛生採三段(級)預防:初級預防(primary)針對一般大眾，預防問題發生(心理衛生教育、壓力調適);次級預防(secondary)早期發現、早期介入高危險群與已出現徵兆者，以降低嚴重度(如自殺防治專線、危機介入、篩檢);三級預防(tertiary)針對已患病者，復健以減少失能與復發(精神復健、社區復健中心)。自殺防治專線提供高危險者即時介入，屬次級預防。","options":{"A":"初級預防針對一般大眾預防問題發生，非自殺專線。","B":"正確。自殺防治專線是對高危險者早期介入，屬次級預防。","C":"三級預防是對已患病者的復健，非危機介入專線。","D":"無「高級預防」此分類。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","三段五級預防"]}},"104100-N5-4":{"quick":"Maxwell Jones 治療性社區概念帶動了去機構化運動。","detail":{"background":"1950 年代英國 Maxwell Jones 提出『治療性社區(therapeutic community)』概念，主張把整個治療環境(病房社群)當作治療工具、病人共同參與決策與治理，強調以社會/環境而非單純醫療控制來治療，這股人本與社會精神醫學的潮流帶動了日後的『去機構化運動』，促使病人從封閉機構走向社區。它與增加日間留院床位、增加慢性療養機構或生物分子遺傳學的興起無直接因果。","options":{"A":"正確。治療性社區概念帶動了去機構化運動。","B":"增加日間留院床位非治療性社區的直接影響。","C":"增加慢性療養機構與去機構化方向相反。","D":"生物醫學與分子遺傳學興起與治療性社區概念無直接關聯。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","治療性社區","去機構化"]}},"104100-N5-5":{"quick":"治療性人際關係：以病人為中心一起討論事件對其的影響(不洩私、不評斷)。","detail":{"background":"治療性人際關係的回應應『以病人為中心、聚焦其經驗與成長、維持專業界限』。D「我們可以一起討論失戀這個過程如何影響你看待自己的方式」聚焦病人、促進探索，最具治療性。A、B 提供個人臉書、約定出院後社交，逾越專業界限並洩漏護理師私人生活;C「因失戀傷害自己…這是不對的」是價值評斷與說教。治療性溝通不評斷、不洩私、以病人為中心。","options":{"A":"分享個人臉書心路歷程逾越專業界限。","B":"出院後透過臉書交友逾越界限。","C":"「這是不對的」是價值評斷與說教。","D":"正確。以病人為中心、一起探討事件對其自我看法的影響，最具治療性。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"104100-N5-7":{"quick":"住院後期由模範變退化、抱怨沒能力＝結束期(分離焦慮致退化)。","detail":{"background":"思覺失調病人住院第6週已能自理、成為模範，臨近出院卻退步、不整理床舖並抱怨自己沒能力——這是『結束期(termination)』常見的退化現象:面臨關係結束與出院的分離焦慮，病人以退化行為表達不安、藉此延緩分離。互動前期護理師尚未接觸;介紹期關係初建;工作期正向投入改變。臨近結束而退化，屬結束期，護理應協助處理分離情緒、肯定其既有進步。","options":{"A":"互動前期護理師尚未與病人接觸。","B":"介紹期關係初建，非住院後期。","C":"工作期病人正向投入改變(如成為模範)。","D":"正確。臨近出院由模範轉退化、自我懷疑，是結束期分離焦慮引發的退化。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","Peplau 結束期"]}},"104100-N5-12":{"quick":"工作期重點：找阻礙改變因素、面對焦慮情境、探討內心世界(回顧成長屬結束期)。","detail":{"background":"團體治療工作期(working phase)成員已建立信任並深入投入，主要任務:(1)尋找阻礙個人改變的因素;(2)鼓勵成員面對引發焦慮的情境;(3)探討病人的內心世界與問題核心。而(4)『幫助病患回顧團體的成長』是結束期(termination)統整與道別的任務，非工作期。故正確為(1)(2)(3)。","options":{"A":"正確。工作期重點為找阻礙改變因素(1)、面對焦慮情境(2)、探討內心世界(3)。","B":"含敘述4(回顧團體成長)，屬結束期。","C":"含敘述4，錯誤。","D":"含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"104100-N5-14":{"quick":"「不確定您的意思，可以再說一次嗎?」＝澄清(clarification)。","detail":{"background":"治療性溝通技巧:澄清(clarification)用於護理師對病人語意不清或不確定時，請病人再說明、把模糊處說清楚(「我不太確定您的意思，可以再說一次嗎?」);重述(restating)是把病人原話重複以確認;回映(reflection)是把情緒/想法反射回去;具體性(concreteness)指引導病人具體描述。本題護理師表達『不確定、請再說』，是請病人澄清語意，故為澄清。","options":{"A":"重述是把病人原話重複，本題是表達不懂請其再說。","B":"回映是把情緒/想法反射回去。","C":"正確。表達不確定、請病人再說清楚，是澄清(clarification)。","D":"具體性是引導病人具體描述，非請其重說。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"104100-N5-24":{"quick":"Peplau 人際模式核心：護病發展信任、安全的治療性人際關係。","detail":{"background":"佩普洛(Peplau)人際關係模式視『護病關係』本身為治療工具，核心是護理師與病人發展出信任、安全的治療性人際關係，藉此協助病人成長、減輕焦慮。教導自我調適技巧、教參與團體活動是其他取向或介入手段;與病人建立『一般社交關係』更違反治療性界限(治療性關係有目標、有界限、以病人為中心，非社交)。故 D 最符 Peplau 模式。","options":{"A":"教導自我調適技巧是介入手段，非 Peplau 模式核心。","B":"教導參與團體活動非 Peplau 模式的治療目標核心。","C":"治療性關係非一般社交關係，應有目標與界限。","D":"正確。護病發展信任、安全的治療性人際關係，是 Peplau 人際模式的核心。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","Peplau 人際關係模式"]}},"105030-N5-23":{"quick":"病人在生活討論會抱怨規則：接納並邀請團體成員表達經驗。","detail":{"background":"生活討論會/社區會議中，雙相情緒障礙(躁期)病人不斷表達對住院與病室規則的不滿。身為團體治療者，最適宜是『接納其情緒並邀請其他成員一起表達經驗與看法』，把抱怨化為團體共同討論、練習表達與協商的素材。重申詳細規定會變成說教與對立;放任『暢所欲言』缺乏結構、躁期病人易失控;直接指出其干擾、要求自控則帶批判。團體治療面對不滿應以接納並轉化為團體歷程。","options":{"A":"重申詳細規定變成說教與對立，無助於團體歷程。","B":"放任暢所欲言缺乏結構，躁期病人易失控。","C":"正確。接納情緒並邀請成員表達經驗，把抱怨化為團體共同討論。","D":"直接指出干擾、要求自控帶批判，破壞團體氣氛。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","雙相情緒障礙·環境治療"]}},"105030-N5-33":{"quick":"造成精神心理衛生服務困境的因素：社區復健機構分布不均。","detail":{"background":"精神心理衛生服務的困境常源於『資源不足或分布不均』。社區復健機構(康復之家、社區復健中心)分布不均，使部分地區病人缺乏可近的社區照護資源，是服務困境的因素。反之，家屬積極配合、社區民眾態度友善、長期養護機構設置適當，都是『有利』於照護的條件，不會造成困境。故選社區復健機構分布不均。","options":{"A":"家屬積極配合有利於回歸社區，非困境。","B":"社區態度友善有利照護，非困境。","C":"正確。社區復健機構分布不均使資源不可近，造成服務困境。","D":"長期養護機構設置適當是有利條件，非困境。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","社區精神衛生"]}},"105090-N5-13":{"quick":"80 歲鬱症長者重整過去生活事件→懷舊團體(reminiscence)。","detail":{"background":"針對老年人(尤其有時不我與感嘆、需統整人生)的團體治療，『懷舊團體/生命回顧(reminiscence/life review)』最適合——藉由回憶與分享過去重要事件，協助長者重整人生、肯定生命意義、提升自尊與情緒。娛樂團體著重活動與娛樂;會心團體著重此時此刻的情感體驗與人際成長;心理演劇(psychodrama)以角色扮演重演衝突情境。本題目的是『重整過去生活事件』，故選懷舊團體。","options":{"A":"娛樂團體著重活動娛樂，非重整人生。","B":"會心團體著重當下情感體驗與人際成長。","C":"正確。懷舊/生命回顧團體協助長者重整過去生活事件，最適合。","D":"心理演劇以角色扮演重演衝突，非回顧人生。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","老年精神·懷舊治療"]}},"105090-N5-14":{"quick":"藉幫助他人而覺得自己更重要、提升自尊＝利他性(altruism)。","detail":{"background":"Yalom 療效因子『利他性(altruism)』指成員在團體中藉由付出、幫助他人而感到自己有價值、被需要，進而提升自尊。溫先生因『幫助他人使自己變得更重要、更看重自己』，正是利他性。共通性(普同感)是發現他人有類似經驗;人際學習是透過回饋修正人際模式;發展社交技巧是練習社交能力。本題核心是『助人而自我價值提升』，故為利他性。","options":{"A":"正確。藉助人而感到自己有價值、提升自尊，是利他性(altruism)。","B":"共通性是發現他人有類似困擾而不孤單。","C":"人際學習是透過團體回饋修正人際模式。","D":"發展社交技巧是練習社交能力，非助人提升自尊。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"105090-N5-30":{"quick":"急性治療後回歸社區、就業、適應生活＝第三級預防(復健)。","detail":{"background":"三段預防中，第三級預防(tertiary)是對『已患病者』進行復健，以減少失能、防止復發、協助回歸社會功能。去機構化使精神病人在急性期積極治療後早日回歸社區、加入就業、適應生活，屬於復健性質的第三級預防。第一級針對一般大眾預防發生;第二級早期發現早期治療;無第四級。故選第三級。","options":{"A":"第一級針對一般大眾預防問題發生。","B":"第二級是早期發現早期治療。","C":"正確。回歸社區、就業、復健以減少失能，屬第三級預防。","D":"三段五級無第四級預防。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","三段五級預防"]}},"105090-N5-32":{"quick":"社區心理衛生護理的主要目標＝協助病人適應社區生活。","detail":{"background":"社區心理衛生護理的核心目標是協助精神病人在社區中『適應社區生活』、維持與恢復生活功能、預防復發與再住院。精神疾病多為慢性、難以完全『治癒』，故目標非治癒疾病;行使公民權利、重建家園非其主要照護目標。以協助病人適應社區、維持功能為核心。補充:社區心理衛生護理協助病人『適應社區生活』的具體面向包括:自我照顧與日常生活管理、規則服藥與症狀自我監測、人際與社交功能、職業/角色功能、運用社區資源、預防復發與再住院。精神疾病多屬慢性，目標是功能維持與復元，而非治癒疾病。","options":{"A":"行使公民權利非社區心理衛生護理的主要照護目標。","B":"正確。協助精神病人適應社區生活是社區心理衛生護理的主要目標。","C":"重建家園非其主要目標。","D":"精神疾病多慢性難以完全治癒，目標非治癒。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","社區精神衛生"]}},"106030-N5-2":{"quick":"體驗人與人可相互信賴＝運用人際關係模式。","detail":{"background":"病友在團體中感謝他人接納與信任、體驗到『人與人之間可以相互信賴』，這種透過人際互動與關係本身達到治療效果的取向，屬『人際關係模式(interpersonal model，Sullivan/Peplau)』。行為模式著重學習與增強改變行為;心理分析模式著重潛意識衝突;存在主義模式著重生命意義與責任。本題核心是『人際信任的體驗』，故為人際關係模式。","options":{"A":"行為模式著重以學習原理改變行為。","B":"正確。體驗人與人相互信賴，屬人際關係模式。","C":"心理分析模式著重潛意識衝突。","D":"存在主義模式著重生命意義與責任。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106030-N5-7":{"quick":"「你有什麼想告訴我?從哪兒談起?」＝闢寬話題/廣泛開啟。","detail":{"background":"「你有什麼事想告訴我?我們從那兒談起?」是以開放式問句鼓勵病人自由選擇談話主題與起頭，屬『闢寬話題/廣泛開啟(giving broad openings)』，常用於會談開始，把主導權交給病人。給予認可是肯定具體行為;提出疑問是對病人(妄想)內容表達溫和不確定;提供資料訊息是給予事實/衛教。本題是開放式起頭邀請，故為闢寬話題。","options":{"A":"給予認可是客觀肯定病人的具體行為。","B":"正確。以開放式問句鼓勵病人自選話題起頭，是闢寬話題(broad openings)。","C":"提出疑問是對病人內容表達溫和不確定。","D":"提供資料訊息是給予事實/衛教。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106030-N5-8":{"quick":"偏差行為是整個家庭系統的產物＝系統性家庭治療。","detail":{"background":"家庭治療學派:系統性家庭治療(family systems therapy，如 Bowen)主張家庭是一個互相影響的系統，一名成員的改變會牽動其他成員，個人的偏差行為或心理問題是『整個家庭系統的產物』而非個人單一問題。策略性家庭治療(Haley)著重以策略性指令打破問題互動循環;結構性家庭治療(Minuchin)著重重整家庭次系統與界限;分析性(精神動力)家庭治療著重潛意識與代間傳遞。本題強調『系統互相影響、問題是系統產物』，故為系統性家庭治療。","options":{"A":"正確。視問題為整個家庭系統的產物、成員互相影響，是系統性家庭治療。","B":"策略性家庭治療著重以策略指令打破問題循環。","C":"結構性家庭治療著重重整家庭次系統與界限。","D":"分析性家庭治療著重潛意識與代間傳遞。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","家庭治療學派"]}},"106030-N5-14":{"quick":"評值目標、與病人分享關係結束的感覺＝結束期任務。","detail":{"background":"護理師『評值治療過程與目標的達成，並與病人分享彼此對關係結束的感覺』，是 Peplau 治療性人際關係『結束期(termination)』的任務——回顧成效、處理分離情緒、做適當道別與轉介。工作期是深入探討與改變;互動(前)期是準備與初識;並無『退化期』此正式期別(退化是病人可能出現的行為)。故為結束期。","options":{"A":"正確。評值目標、分享關係結束的感覺，是結束期的任務。","B":"治療性人際關係四期中無「退化期」此正式分期。","C":"工作期是深入探討與協助改變。","D":"互動期/介紹期是準備與初識，非評值結束。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106030-N5-30":{"quick":"提供書籍介紹、邀請閱讀後於團體分享對故事人物的看法與感受＝閱讀治療(bibliotherapy)。","detail":{"background":"對經歷創傷(如喪親/災難)的個案，適當護理:(1)在安全與信任下『漸進引導回顧創傷過程』以整合經驗;(3)『適時陪伴及傾聽』提供情緒支持;(4)運用『團體治療互相支持』。而(2)『鼓勵面對現實、不要沉浸悲傷』是錯誤的——否定、壓抑哀傷情緒反而妨礙正常哀悼歷程。故正確為(1)(3)(4)。哀傷需要被接納與表達，而非被勸阻。","options":{"A":"角色扮演(enacting plays)是讓成員「演出」情境，非閱讀書籍。","B":"自創故事(autogenic storytelling)是讓個案「自己創作」故事，非閱讀現成書籍。","C":"正確。藉由「提供書籍/故事閱讀後分享討論」協助處理創傷情緒，是閱讀治療(bibliotherapy)。","D":"說故事(storytelling)是由治療者「講述」故事，本題是讓成員閱讀後分享，屬閱讀治療。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","創傷與哀傷護理"]}},"106110-N5-2":{"quick":"精神醫學第四次革新＝生物精神醫學蓬勃發展。","detail":{"background":"精神醫學的革新運動概分:第一次以 Pinel 解除病人枷鎖、人道對待為代表;第二次以 Freud 精神分析為代表;第三次為社區精神醫學運動(治療性社區、去機構化，代表人物如 Maxwell Jones);第四次則是『生物精神醫學/神經科學』蓬勃發展，精神藥理學、腦影像、神經傳導物質研究興起。故第四次革新的正確敘述是生物精神醫學蓬勃發展;Jones、治療性社區、去機構化皆屬第三次。","options":{"A":"瓊斯(Jones)是第三次(社區精神醫學)代表人物。","B":"治療性社區屬第三次革新。","C":"去機構化屬第三次革新。","D":"正確。第四次革新是生物精神醫學/神經科學的蓬勃發展。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","精神醫學史"]}},"106110-N5-5":{"quick":"問「大家是否有類似感受或經驗?」＝引導出問題的共通性(普同感)。","detail":{"background":"治療者詢問團體其他成員「大家是否有類似的感受或經驗?」，用意在引導成員發現自己的困擾並非獨有、他人也有相似經驗，即引導出『問題的共通性/普同感(universality)』，減少孤立感。重現原生家庭經驗是另一療效因子(矯正性家庭經驗重演);示範社交技巧是發展社交技巧;促進對生命本質的了解屬存在性因子。本題核心是『共通性』。","options":{"A":"正確。引導成員發現彼此有類似經驗，是引導出問題的共通性(普同感)。","B":"重現原生家庭經驗是另一療效因子。","C":"示範社交技巧是發展社交技巧。","D":"生命本質的了解屬存在性因子。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106110-N5-10":{"quick":"病友分享「我以前也這樣，後來改善了」＝灌注希望。","detail":{"background":"病友分享自己也曾睡不好、後來規則服藥按時睡而改善，使當前受困的病人對自己的處境燃起希望，這屬 Yalom 療效因子『灌注希望(instillation of hope)』——看到他人改善而相信自己也可能好轉。發展社交技巧是練習社交;原生家庭經驗再現是矯正性重演;存在性因子是面對生存議題。本題核心是『他人改善帶來希望』。","options":{"A":"正確。病友以自身改善的經驗使病人燃起希望，是灌注希望(instillation of hope)。","B":"發展社交技巧是練習社交能力。","C":"原生家庭經驗再現是矯正性家庭重演。","D":"存在性因子是面對生存/責任等議題。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106110-N5-12":{"quick":"工作期主要任務＝協助病人學習行為改變。","detail":{"background":"Peplau 治療性人際關係工作期(working phase)的主要任務，是在已建立的信任基礎上『深入探討問題並協助病人學習新行為、產生行為改變』。處理不信任行為、共同訂立契約與目標屬介紹期(orientation);共同探討彼此感受/處理分離屬結束期。故工作期核心是協助病人學習行為改變。","options":{"A":"處理不信任屬介紹期建立信任階段。","B":"共同訂立契約與目標屬介紹期。","C":"探討彼此感受、處理關係偏向結束期。","D":"正確。協助病人學習與產生行為改變，是工作期的主要任務。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106110-N5-14":{"quick":"覺得病人像自己婆婆而生敵意、難建立關係＝情感反轉移。","detail":{"background":"護理師照顧吳太太時因覺得『對方很像自己的婆婆』而產生強烈敵意、不耐煩，把自己對過去重要他人(婆婆)的情感投射到病人身上，干擾護病關係，這是『情感反轉移(countertransference)』。情感轉移方向相反(病人投射到護理師);試探性行為是病人測試護理師;阻抗是病人迴避痛苦素材。處理之道是護理師自我覺察。","options":{"A":"情感轉移是病人把情感投射到護理師，方向相反。","B":"正確。護理師把對婆婆的情感投射到病人而生敵意，是情感反轉移。","C":"試探性行為是病人測試護理師。","D":"阻抗是病人迴避痛苦素材，非護理師的情感反應。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","轉移與反轉移"]}},"106110-N5-28":{"quick":"物質使用障礙照護：預防再濫用期加強行為改變、確認危險因子、預防復發。","detail":{"background":"物質使用障礙照護分期:接觸期重在建立治療性關係(且常需協助調整作息,非「不宜改變」);說服/動機期宜用『動機式晤談』引發改變動機，而非面質迫使;積極治療期著重戒治與復原,非加強法治觀念;預防再濫用期(維持期)則加強行為改變、確認復發危險因子、建立預防復發措施。故 D 最正確。","options":{"A":"接觸期常需協助調整不良作息，非「不宜改變日常作息」。","B":"說服期宜用動機式晤談引發動機，非面質迫使。","C":"積極治療期著重戒治復原，非加強法治觀念。","D":"正確。預防再濫用期加強行為改變、確認危險因子、預防復發，最正確。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","物質使用障礙·動機式晤談"]}},"106110-N5-31":{"quick":"社區心理衛生第二級預防＝提供門診、住院、急診等早期發現治療服務。","detail":{"background":"社區心理衛生三段預防:初級(衛生教育、心理健康促進)、次級(早期發現、早期治療)、三級(復健、減少失能)。第二級預防著重對已出現症狀者提供及時的『門診、住院、急診』診療服務以早期介入。衛教/健康促進屬初級;慢性病人職業訓練就業轉銜、協助身障權益福利屬三級復健。故選提供門診住院急診服務。","options":{"A":"正確。提供門診、住院、急診服務以早期發現早期治療，屬第二級預防。","B":"衛教與心理健康促進屬初級預防。","C":"職業訓練與就業轉銜屬三級復健。","D":"協助身障權益福利屬三級復健。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","三段五級預防"]}},"106110-N5-34":{"quick":"精神衛生初級預防護理功能＝提供衛生教育。","detail":{"background":"初級預防(primary prevention)針對一般大眾，在問題發生前促進心理健康、減少危險因子，護理功能包括『提供心理衛生教育、健康促進活動』。轉介社區機構、提高藥物遵從性屬次級(早期治療)範疇;提供職業訓練屬三級(復健)。故初級預防的護理功能為提供衛生教育。","options":{"A":"轉介社區機構偏向次級/三級的介入。","B":"正確。提供衛生教育屬初級預防的護理功能。","C":"提供職業訓練屬三級復健。","D":"提高藥物遵從性屬次級(治療)範疇。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","三段五級預防"]}},"105090-N5-9":{"quick":"社交技巧訓練：需重複修正練習①、角色扮演②、目的清楚④；不可「快速積極」教導③(應循序漸進)。","detail":{"background":"社交技巧訓練(social skills training)是針對思覺失調等社交退縮病人的結構化行為介入，原則:(1)技巧須『重複示範、修正與反覆練習』直到熟練;(2)善用『角色扮演(role play)』模擬真實情境演練;(4)每次訓練的目標宜『清楚具體』，由易而難循序漸進。而(3)『快速且積極地教導』錯誤——退縮病人學習需慢步調、低壓力、循序漸進，過快過急反增焦慮與挫敗。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(快速積極教導)，錯誤。","B":"正確。①重複練習、②角色扮演、④目的清楚為社交技巧訓練原則。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，且缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","社交技巧訓練(social skills training)"]}},"106030-N5-25":{"quick":"中度焦慮病人：以溝通協助解決問題①、傾聽同理②、評值學習因應③；不需約束④。","detail":{"background":"焦慮分級決定護理:輕到中度焦慮時，個體仍能學習與解決問題，護理應(1)運用溝通技巧協助病人界定與解決問題;(2)傾聽、同理以協助減輕焦慮;(3)評值並引導學習適當的因應技巧。而(4)『約束病人以維護安全』錯誤——約束僅用於『重度/恐慌級焦慮且有立即安全危險、口語安撫無效』時，中度焦慮不需約束。故正確為①②③(選 D)。重點:依焦慮程度選擇介入，中度焦慮以溝通與因應訓練為主。","options":{"A":"①③④：含敘述4(約束)，中度焦慮不需約束。","B":"②③④：含敘述4，錯誤。","C":"①②④：含敘述4，錯誤。","D":"正確。①溝通協助解決、②傾聽同理、③評值學習因應，皆為中度焦慮的適當護理。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","社交技巧訓練(social skills training)","焦慮分級與護理"]}},"106110-N5-30":{"quick":"創傷後護理：漸進回顧①、陪伴傾聽③、團體支持④；勿勸其「不要沉浸悲傷」②。","detail":{"background":"對經歷創傷喪親的個案，適當護理:(1)在安全信任下『漸進引導回顧創傷過程』以整合經驗;(3)『適時陪伴及傾聽』提供情緒支持;(4)運用『團體治療互相支持』。而(2)『鼓勵面對現實、不要沉浸悲傷』錯誤——否定壓抑哀傷反而妨礙正常哀悼。故正確為①③④(選 B)。哀傷需被接納與表達，而非被勸阻。","options":{"A":"①②③：含敘述2(勸其不要悲傷)，錯誤。","B":"正確。漸進回顧①、陪伴傾聽③、團體支持④；敘述2否定哀傷錯誤。","C":"①②④：含敘述2，錯誤。","D":"②③④：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","哀傷護理"]}},"106110-N5-35":{"quick":"推動社區心理衛生原因：人權重視①、治療模式改變②、精神藥物發明④(機構化③是被取代者)。","detail":{"background":"全球推動『社區心理衛生』的背景:(1)對精神病人人權問題的重視(去汙名、去機構化);(2)精神疾病治療模式由住院封閉轉向社區、復元導向;(4)精神藥物的發明與應用使症狀可控、病人得以在社區生活。而(3)『機構化運動的觀念』錯誤——正是要『去』機構化，機構化是被取代的舊模式，非推動社區心理衛生的原因。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(機構化運動)，錯誤。","B":"正確。人權重視①、治療模式改變②、精神藥物發明④是推動社區心理衛生的原因。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","社區精神衛生"]}},"106111-N5-2":{"quick":"去機構化使社區復健病人增加→最需三級預防的復健機構。","detail":{"background":"去機構化使許多病情穩定但仍需復健的精神病人回到社區，這群人最需要的是『三級預防』——對已患病者的復健，以減少失能、防止復發、協助社會功能恢復，故需要『社區復健機構(三級的復健機構)』。一級是對一般大眾的健康講座(預防發生);二級是早期發現早期治療(急診、短期住院)。針對已穩定、需持續復健的族群，屬三級預防。","options":{"A":"一級社區心理健康講座是對一般大眾的初級預防。","B":"二級急診服務是早期介入，非復健需求。","C":"二級短期住院是早期治療，非復健機構。","D":"正確。對已穩定、需復健的病人提供三級預防的復健機構，最符需求。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","三段五級預防"]}},"106111-N5-9":{"quick":"團體規範：公開陳述①、促進目標達成②、處理人際衝突④(非「形成獨立自主」③)。","detail":{"background":"團體規範(group norms)的功能:(1)常以『公開陳述』的形式建立讓成員知曉;(2)促進團體目標的實現;(4)規範成員行為、協助處理人際間的衝突，維持團體運作。而(3)『形成團體的獨立自主』敘述錯誤——規範是對成員行為的共同約束與引導，目的在凝聚與達成目標，而非使團體「獨立自主」。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(形成獨立自主)，錯誤。","B":"正確。公開陳述①、促進目標②、處理衝突④是團體規範的功能。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106111-N5-11":{"quick":"人際距離由近到遠：親密<個人<社會<公眾。","detail":{"background":"人類學家 Edward T. Hall 提出人際距離(proxemics)反映關係親疏，由近而遠依序為:親密距離(intimate，約0–45 cm)<個人距離(personal，約45 cm–1.2 m)<社會距離(social，約1.2–3.6 m)<公眾距離(public，>3.6 m)。護病治療性會談通常維持在『個人距離』，兼顧親近與安全。故正確排列為親密<個人<社會<公眾(選 C)。","options":{"A":"公眾與社會順序顛倒，錯誤。","B":"親密與個人順序顛倒，錯誤。","C":"正確。親密<個人<社會<公眾的距離排列。","D":"親密與個人順序顛倒，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","Hall 人際距離(proxemics)"]}},"106111-N5-17":{"quick":"多疑病人抱怨規定刁難：傾聽後重申規定適用全病房、期望其遵守。","detail":{"background":"吳小姐多疑、認為工作人員監視刁難她(被害意念)。最適當護理是『傾聽其抱怨(接納情緒)，並澄清病房規定是『適用於全病房所有病友』、非針對她，並期望其一同遵守』——以一致、公平、不爭辯的態度提供現實感與安全感。B 空泛保證「都是為你好」無助於其被害感;C 為滿足她而修改規則破壞一致性、強化操縱;D 直接告知「這是你的症狀」否定其經驗、易升高防衛。","options":{"A":"正確。傾聽後重申規定對全病房一致、期望遵守，提供公平與現實感。","B":"空泛保證「為你好」無法回應其被害感。","C":"為她修改規則破壞一致性、強化操縱。","D":"直接說「這是你的症狀」否定其經驗、升高防衛。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","被害意念護理"]}},"106111-N5-21":{"quick":"治療性環境安全：強化玻璃①、損壞椅子立即修繕②、必要時依醫囑保護隔離④(勿增加刺激③)。","detail":{"background":"柯先生焦躁打破玻璃，治療性環境的安全維護:(1)護理站宜採『強化玻璃』防破壞;(2)損壞的椅子應『立即修繕』，避免成為攻擊工具或暗示混亂;(4)『必要時依醫囑保護隔離』以保護病人與他人。而(3)『增加環境的刺激』錯誤——對焦躁失控的病人應『減少刺激』、簡化環境以助其穩定。故正確為①②④(選 A)。","options":{"A":"正確。強化玻璃①、立即修繕②、必要時保護隔離④為安全維護措施。","B":"①③④：含敘述3(增加刺激)，錯誤。","C":"①②③：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","治療性環境·暴力處置"]}},"106111-N5-23":{"quick":"妄想症驚恐抗拒、喝斥護理師：先在一旁觀察、適時提供必要照護。","detail":{"background":"李小姐妄想症、驚恐環伺、認為周遭都是來監視她的人、一見護理師就喝斥趕走。此時強行接近只會升高其被害恐懼。最適當的關係建立方式是『先在一旁觀察、保持安全距離、適時提供必要照護』，讓病人逐漸感到安全與可預期，再慢慢拉近。A 一再澄清「我不是來監視你的」等於與妄想爭辯;B 每天主動逼近其需求對驚恐者壓力過大;C 邀其參與團體活動過早、超出其當前耐受。對多疑驚恐者宜緩、宜距離、不爭辯。","options":{"A":"一再澄清是與妄想爭辯，無效且升高防衛。","B":"每天主動逼近對驚恐多疑者壓力過大。","C":"過早邀其參與團體活動超出其耐受。","D":"正確。先在一旁觀察、保持安全距離、適時提供必要照護，逐步建立安全感。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","妄想症護理"]}},"106111-N5-24":{"quick":"會談中同仁打岔：請同仁先回護理站，待會談結束後再找他。","detail":{"background":"與多疑(被害)病人會談時，護理師應維持會談的專注、保密與界限。當同仁突然打岔詢問他事，最適當是『請同仁先回護理站，待會談結束後再去找他』，以保護會談的連續性與病人的信任(多疑病人易把當面耳語誤解為在談論她)。A 當面在病人面前耳語會加深其被害懷疑;B 立即中止會談離開不尊重病人;D 起身到病房外談話則中斷會談、留病人獨自不安。","options":{"A":"當面耳語會加深多疑病人的被害懷疑。","B":"立即中止會談離開不尊重病人、破壞信任。","C":"正確。請同仁先回護理站、會談後再找，維護會談連續性與病人信任。","D":"起身到外面談話中斷會談、留病人獨自不安。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106111-N5-27":{"quick":"「當時小孩過世時您的感覺如何?」＝鼓勵描述感受。","detail":{"background":"護理師問喪子的林太太「當時小孩過世時，您的感覺如何?」，是以開放式問句『鼓勵病人描述其感受(encouraging description of perception/feelings)』，引導其表達哀傷情緒。接受(accepting)是以點頭/「嗯」表達在聽;提供資訊是給予事實;摘要(summarizing)是把談話重點濃縮複述。本題重點是『邀請病人說出感受』，故為鼓勵描述感受。","options":{"A":"接受是以非語言表達在聽，非邀請描述感受。","B":"提供資訊是給予事實/衛教。","C":"正確。問「您的感覺如何」是鼓勵病人描述感受。","D":"摘要是把談話重點濃縮複述。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106111-N5-28":{"quick":"喪子個案護理：同理降焦慮①、溝通協助解決②、評估過去因應③；不需約束隔離④。","detail":{"background":"對哀傷焦慮的林太太，適當護理:(1)同理其焦慮有助降低焦慮;(2)運用溝通技巧協助其界定與解決問題;(3)評估其過去常用的因應技巧以善加運用。而(4)『約束及隔離以保護安全』錯誤——約束隔離僅用於有立即自傷傷人危險、口語安撫無效時，哀傷焦慮個案不需要。故正確為①②③(選 A)。","options":{"A":"正確。同理降焦慮①、溝通協助解決②、評估過去因應③為適當護理。","B":"①②④：含敘述4(約束隔離)，錯誤。","C":"①③④：含敘述4，錯誤。","D":"②③④：含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"106111-N5-29":{"quick":"失眠痛苦：同理並反映感受＋共同想辦法＝「睡不著一定很難過，我們一起想想辦法」。","detail":{"background":"病人抱怨「不能睡比死還難過，好痛苦」。要運用同理心『反映其行為與感覺』，最適當回應是『嗯!睡不著一定很難過，我們一起來想想辦法』——先接納並反映其痛苦感受，再傳達願共同面對。A「放輕鬆就睡著了」是輕忽與給建議;B「像我失眠也很難受」把焦點轉到護理師自己;C「我不覺得是個嚴重問題」否定病人的痛苦。同理心須先反映並接納病人的感受。","options":{"A":"「放輕鬆就睡著了」輕忽問題、給建議，非同理。","B":"「像我也很難受」把焦點轉到護理師自身。","C":"「我不覺得嚴重」否定病人的痛苦感受。","D":"正確。先反映「睡不著一定很難過」並表達共同面對，是同理心的回應。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"107030-N5-1":{"quick":"精神科護理師不得在臉書/部落格公布任何可辨識病人的資訊。","detail":{"background":"護理師負有保密義務(專業倫理與個資法)。在個人臉書或部落格上即使為了衛教，也『不得公布任何可以辨識出病人的資訊』(姓名、照片、病情等)。張貼病人照片與病情、未經同意使用、即使加密或宣稱為澄清社會誤解，都侵犯病人隱私與保密，違反倫理與法律。故 B 正確。保護病人隱私是不可逾越的界限。","options":{"A":"張貼病人照片與病情嚴重違反保密。","B":"正確。不得公布任何可辨識病人的資訊，是保密義務的底線。","C":"加密、未經同意使用病人照片病情仍違反隱私。","D":"放病人活動照片上網即使為澄清誤解也侵犯隱私。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","護理倫理·保密"]}},"107030-N5-5":{"quick":"適合個別心理治療者：智力中上①、症狀不嚴重③、有內省能力④(個性執著②不適合)。","detail":{"background":"評估病人是否適合『個別心理治療(洞察取向)』的條件:(1)智力中上(需理解與語言表達);(3)症狀不嚴重(急性精神病症狀干擾時不宜深度心理治療);(4)有內省/自我覺察能力(能反思內在)。而(2)『個性執著』不適合——僵化、缺乏彈性者難以在治療中產生洞察與改變。故正確為①③④(選 C)。","options":{"A":"①②③：含敘述2(個性執著)，不適合。","B":"①②④：含敘述2，錯誤。","C":"正確。智力中上①、症狀不嚴重③、有內省能力④適合個別心理治療。","D":"②③④：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","個別心理治療適應症"]}},"107030-N5-9":{"quick":"工作期領導者：避免互相攻擊①、鼓勵誠實表達②、維持凝聚力③(協助分離④是結束期)。","detail":{"background":"團體『工作期』領導者的角色:(1)避免成員互相攻擊、維護安全;(2)鼓勵成員誠實表達、深入探討;(3)維持團體的凝聚力與投入。而(4)『協助成員準備與團體分離』是『結束期』的任務，非工作期。故正確為①②③(選 A)。各期領導者任務不同，分離議題屬結束期。","options":{"A":"正確。避免攻擊①、鼓勵誠實表達②、維持凝聚力③為工作期領導者角色。","B":"①②④：含敘述4(協助分離)，屬結束期。","C":"①③④：含敘述4，錯誤。","D":"②③④：含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"107030-N5-14":{"quick":"工作期主要任務＝解決個案問題。","detail":{"background":"治療性人際關係工作期(working phase)的主要任務，是在已建立信任(發展安全感屬介紹期)的基礎上，深入探討並『解決個案的問題』、協助其產生改變。發展安全感、訂定契約、收集基本資料都屬介紹期(orientation)的工作。故工作期核心任務是解決個案問題。","options":{"A":"正確。解決個案問題是工作期的主要任務。","B":"發展安全感屬介紹期。","C":"訂定契約屬介紹期。","D":"收集基本資料屬介紹期。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"107030-N5-27":{"quick":"物質使用者的心理復健宜採家庭治療：診斷家庭問題、澄清成員角色期待責任與感受。","detail":{"background":"古先生的物質使用問題與家庭互動密切相關，其心理復健最適切是『家庭治療』——對家庭問題進行診斷，並澄清各成員在家中的角色、期待、責任與感受，改善家庭互動系統。選項中將增強動機治療、動力心理治療、認知治療描述為「強化家屬責任/面質生理狀態」等皆方向錯誤(增強動機治療對象是病人本人的改變動機;動力治療非面質生理;認知治療非強化家庭修正行為)。故 D 最適切。","options":{"A":"增強動機治療著重病人本人的改變動機，非動員家屬。","B":"動力心理治療非面質生理狀態與強化家人戒治責任。","C":"認知治療非以系統理論強化家庭對其行為修正。","D":"正確。家庭治療診斷家庭問題、澄清成員角色期待責任與感受，最適切。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","家庭治療·物質使用障礙"]}},"107030-N5-34":{"quick":"去機構化：長期住院易致機構化，故宜避免長期住院。","detail":{"background":"去機構化(deinstitutionalization)的核心理念是『長期住在封閉機構會使病人產生機構化現象(被動、依賴、社會功能退化)，故應避免不必要的長期住院』，並發展社區照護讓病人回歸社區。其他敘述錯誤:A「儘早回歸社區以穩定症狀」因果不當(回歸社區非為穩定症狀，且需症狀穩定才返社區);C「須具備社區獨立生活能力才能出院」過嚴(出院後仍可在社區支持下生活);D「所有病人皆不應住機構」過度絕對(仍有需住院者)。故 B 正確。","options":{"A":"回歸社區並非用來「穩定症狀」，因果不當。","B":"正確。長期住院易致機構化，故宜避免長期住院。","C":"要求具備完全獨立生活能力才出院過於嚴苛。","D":"「所有病人皆不應住機構」過度絕對，仍有需住院者。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","去機構化"]}},"107110-N5-6":{"quick":"「不能融入別人話題讓你感到不舒服嗎?」＝反映(reflection)。","detail":{"background":"護理師把小華的話「常覺得融入不了別人話題」反射為其情緒「讓你感到不舒服嗎?」，引導其覺察感受，這是『反映(reflection)』。給予建議是直接告訴病人怎麼做;讚許是給予贊同評價;面質是指出言行不一致。本題護理師反射病人的感受、未給建議或評價，故為反映。","options":{"A":"給予建議是直接告訴病人怎麼做，本題未給建議。","B":"讚許是給予贊同評價，本題未評價。","C":"正確。把病人的話反射為其情緒感受，是反映(reflection)。","D":"面質是指出言行不一致，非本題。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"107110-N5-9":{"quick":"團體爭執成員離開：強調遵守規範②、允許害怕成員暫離③、鼓勵表達此刻感受④。","detail":{"background":"團體中張先生與史先生爭執、張先生憤而離開、團體不安。治療者的適當處置:(2)適時『強調成員應遵守團體規範』維持安全界限;(3)『允許害怕的成員暫時離開』以顧及其情緒安全;(4)『鼓勵成員表達此時的感受』把衝突化為團體學習。而(1)『中斷團體進行去安撫史先生』錯誤——不宜為單一成員中斷整個團體歷程。故正確為②③④(選 D)。","options":{"A":"①②③：含敘述1(中斷團體安撫單一成員)，不宜。","B":"①②④：含敘述1，錯誤。","C":"①③④：含敘述1，錯誤。","D":"正確。強調規範②、允許害怕者暫離③、鼓勵表達此刻感受④為適當處置。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"107110-N5-24":{"quick":"病人示愛要當男朋友：說明二人為護病(治療性)關係。","detail":{"background":"躁症/缺乏界限的武先生向護理師示愛要當男朋友時，最適當處置是『清楚而尊重地說明二人是護病(治療性)關係、有專業界限』，溫和地設定界限同時維護關係。A「謝謝你的讚美」會被誤解為接受;B「我有男朋友了」把焦點放在護理師私人狀態、未澄清界限;D 不予理會則冷漠且未設限。明確說明專業界限是維持治療性關係的關鍵。","options":{"A":"「謝謝你的讚美」易被誤解為接受其示愛。","B":"「我有男朋友了」聚焦護理師私生活，未澄清專業界限。","C":"正確。清楚說明二人為護病(治療性)關係，溫和設定界限。","D":"不予理會冷漠且未設限。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","專業界限"]}},"107110-N5-25":{"quick":"85 歲健忘迷糊(失智)病人，首要護理目標＝維護安全、預防危害。","detail":{"background":"李太太 85 歲、健忘迷糊日趨嚴重、重複問同一問題，呈現失智症的認知退化。對認知退化、定向力與判斷力受損的病人，『首要護理目標是維護病患安全、預防發生危害事件』(跌倒、走失、誤食等)，因安全是最優先的基本需求。增進學習能力、社交能力、正向思考溝通雖有意義，但對退化中的失智病人並非『首要』，且超出其當前能力。故 B 為首要目標。","options":{"A":"增進學習能力超出失智退化病人的能力，非首要。","B":"正確。對失智健忘病人，維護安全、預防危害是首要護理目標。","C":"增強社交避免認錯人非首要，且難達成。","D":"促進正向思考溝通非失智病人的首要目標。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","失智症照護"]}},"107110-N5-35":{"quick":"社區心理衛生第二段預防＝對出現急性精神症狀者提供住院治療。","detail":{"background":"社區心理衛生三段預防:第一段(初級)針對一般大眾促進心理健康(如壓力調適、情緒管理課程);第二段(次級)早期發現、早期治療，對『已出現急性精神症狀者提供及時住院治療』、早期介入;第三段(三級)復健(如庇護商店、個案工作訓練)。題目選『出現急性精神症狀提供住院治療』屬第二段。利用評估工具早期發現失智併發症雖近次級，但本題最典型的第二段服務是急性症狀的住院治療。","options":{"A":"正確。對出現急性精神症狀者提供住院治療，屬第二段(次級)預防。","B":"早期發現失智併發症偏次級篩檢，但非本題最典型答案。","C":"壓力調適與情緒管理課程屬第一段初級預防。","D":"庇護商店個案工作訓練屬第三段復健。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","三段五級預防"]}},"108110-N5-1":{"quick":"治療性關係建立：護理師須分析自己的特性與感受如何影響關係(自我覺察)。","detail":{"background":"治療性人際關係的建立奠基於護理師的『自我覺察(self-awareness)』:護理師應分析自己的人格特性、價值觀與感受如何影響與病人的互動，覺察並善用『治療性自我運用(therapeutic use of self)』，同時避免反轉移干擾。A 錯在「避免探究護理師自己的感覺」——自我覺察正是必要;B 錯在「壓抑情緒」——壓抑無法避免反轉移，覺察才能;D 錯在「利用反轉移改變病人」——反轉移應被覺察與處理，不該被利用。故 C 正確。","options":{"A":"避免探究自己的感覺與自我覺察原則相反。","B":"壓抑情緒無法避免反轉移，覺察與處理才能。","C":"正確。分析自己的特性與感受如何影響關係，即自我覺察。","D":"反轉移應被覺察處理，不該被利用來改變病人。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"108110-N5-2":{"quick":"初段預防：高危群衛教①、強化個人因應②、倡導正當休閒④(返社區③屬三級)。","detail":{"background":"心理衛生初段(初級)預防針對一般大眾與高危險群，在問題發生前促進心理健康:(1)對高危險群提供衛生教育;(2)強化個人的因應與抗壓能力;(4)倡導正當休閒娛樂活動以紓壓。而(3)『協助精神病人早日返回社區』是對已患病者的復健，屬三級預防。故正確為①②④(選 C)。","options":{"A":"①②③：含敘述3(協助病人返社區)，屬三級。","B":"②③④：含敘述3，錯誤。","C":"正確。高危群衛教①、強化因應②、倡導正當休閒④屬初段預防。","D":"①③④：含敘述3，錯誤。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"108110-N5-5":{"quick":"深入討論壓力源與自我責備反應→工作期。","detail":{"background":"護理師與王小姐『討論導致憂鬱的主要生活壓力源，並探討其壓力下責備自己的反應模式』，這是在信任基礎上深入探討問題核心與因應型態，屬治療性人際關係的『工作期(working phase)』。互動前期是準備;介紹期建立信任與確認問題;結束期處理分離。深掘壓力源與反應模式屬工作期。","options":{"A":"互動前期是護理師的準備階段。","B":"介紹期建立信任、確認問題，未深掘。","C":"正確。深入探討壓力源與自我責備的反應模式，屬工作期。","D":"結束期處理評值與分離。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"108110-N5-11":{"quick":"透過團體回饋學會適當表達感受→情感宣洩(catharsis)。","detail":{"background":"Yalom 療效因子『情感宣洩(catharsis)』不僅是情緒的釋放，更包含『學習在團體中適當地表達自己的感受、並了解如何表達才不會造成不良後果』。病人分享「團體回饋幫助我了解如何表達自我感受才不會造成不好的後果」，正體現此因子。利他性是助人而自我提升;希望灌注是看他人改善而生希望;人際學習雖也透過回饋，但本題核心在『學會表達與宣洩情感』，故選情感宣洩。","options":{"A":"利他性是藉助人而提升自我價值。","B":"希望灌注是看到他人改善而對自己生希望。","C":"人際學習偏重了解自己的人際模式，本題核心在表達情感。","D":"正確。學會在團體中適當表達感受，屬情感宣洩(catharsis)。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"108110-N5-34":{"quick":"對自殺者給予危機處置＝次級預防。","detail":{"background":"社區心理衛生三段預防:初級(減少偏見、心理衛生講座)針對一般大眾預防發生;次級(早期發現早期治療)對高危險/已出現徵兆者即時介入，如『對自殺者給予危機處置』;三級(復健)協助病人重返社區。對自殺者的危機處置屬早期介入，為次級預防。補充:次級預防的核心是『早期發現、早期治療』，對已出現徵兆或高危險者及時介入以降低嚴重度，如自殺者危機處置、高危群篩檢、急性症狀門診/短期住院。與初級(預防發生:減偏見、講座)與三級(復健:重返社區)區隔。對自殺者危機處置屬次級。","options":{"A":"減少對精神疾病的偏見屬初級預防。","B":"辦理心理衛生講座屬初級預防。","C":"正確。對自殺者給予危機處置屬次級預防(早期介入)。","D":"協助病人重返社區屬三級復健。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"108110-N5-35":{"quick":"精神護理之家設立＝第三級預防(復健性照護)。","detail":{"background":"精神護理之家提供慢性、症狀穩定但仍需長期照護與復健的精神病人連續性、復健性的機構式照護，目的在維持功能、減少失能與復發，屬『第三級預防(復健)』。第一級預防是對一般大眾促進心理健康;第二級是早期發現早期治療。精神護理之家照護已患病、需復健者，屬三級。","options":{"A":"第一級是對一般大眾的健康促進。","B":"第二級是早期發現早期治療。","C":"正確。精神護理之家提供復健性照護，屬第三級預防。","D":"其定位明確屬三級復健，非各級皆涵蓋。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"108110-N5-36":{"quick":"人性化治療環境：工作人員需先自我覺察、能自尊也尊重別人。","detail":{"background":"多元、安全、人性化的治療性環境，前提是『工作人員先自我覺察，能自尊也尊重病人』，以身作則營造尊重接納的氛圍。其他敘述錯誤:B 入院仍須做必要的安全檢查(危險物品);C 在安全前提下可適度放置病人個人物品以增親切感，非「絕對不可」;D 應『鼓勵病人參與環境中的決策』(如生活討論會)，而非不讓其參與。故 A 正確。","options":{"A":"正確。工作人員先自我覺察、能自尊也尊重別人，是人性化治療環境的基礎。","B":"入院仍須做必要安全檢查(危險物品)。","C":"安全前提下可適度放置個人物品，非絕對不可。","D":"應鼓勵病人參與環境決策，而非不讓參與。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"108110-N5-40":{"quick":"家暴受害者首次接案：耐心傾聽防禦①、支持與資源連結③、覺察矛盾與壓力④(勿立即面質②)。","detail":{"background":"對長期家暴、否認問題(防禦)、矛盾(不斷要求回家)的辜太太，首次接案的輔導技巧:(1)耐心面對其防禦心、傾聽其訴說以建立信任;(3)把焦點放在支持與增加資源連結(安全網、社會資源);(4)覺察其矛盾(想離開又想回家)與壓力。而(2)『明顯立即面質其防禦心』錯誤——關係未建立前的立即面質會升高防禦、破壞信任。故正確為①③④(選 B)。","options":{"A":"①②③：含敘述2(立即面質)，破壞信任。","B":"正確。耐心傾聽①、支持與資源連結③、覺察矛盾與壓力④為適切技巧。","C":"①②④：含敘述2，錯誤。","D":"②③④：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","家庭暴力護理"]}},"109030-N5-4":{"quick":"病友分享感受、感謝包容接納信任＝人際關係模式。","detail":{"background":"病人在團體中與他人分享感受、體驗到被包容、接納與信任，這種透過人際互動與關係本身達到治療的取向屬『人際關係模式(interpersonal model)』。行為模式以學習原理改變行為;心理分析模式探討潛意識衝突;存在主義模式探討生命意義。本題核心是『人際接納與信任的體驗』，故為人際關係模式。","options":{"A":"行為模式以學習原理改變行為。","B":"正確。體驗被包容接納信任，屬人際關係模式。","C":"心理分析模式探討潛意識衝突。","D":"存在主義模式探討生命意義。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"109030-N5-10":{"quick":"新病人會談適切表現＝引導病人表達、減少說理。","detail":{"background":"與新住院病人會談的治療性溝通原則是『引導病人表達、減少說理(說教)』，以開放式問句鼓勵病人陳述、建立關係。A 保持200公分以上距離過遠、疏離;B 在人來人往的走廊會談無隱私、不利信任;D 選擇封閉式問話且不訂目標違反治療性會談原則(宜多用開放式並有目標)。故 C 正確。會談應以病人為中心、引導表達。","options":{"A":"200公分以上距離過遠、顯疏離。","B":"走廊會談缺乏隱私，不利信任。","C":"正確。引導病人表達、減少說理，是適切的會談表現。","D":"封閉式問話且不訂目標違反治療性會談原則。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"109030-N5-11":{"quick":"環境治療：提供自治自主機會，住院中即連結家庭與社區資源。","detail":{"background":"環境治療(milieu therapy)的適切原則:(D)提供病人『自治、自主』的機會(如生活討論會參與決策)，並在『住院期間就開始連結家庭與社區資源』以利返家銜接。其他敘述錯誤:A「使參與」非緊急處置功能(環境治療五功能中緊急處置對應的是其他);B 急性病房雖重安全但不宜一律剝奪電話卡或鏡子，應依個別評估;C 應尊重個別差異而非一律統一活動、降低個別差異。故 D 最適切。","options":{"A":"「使參與」非緊急處置的功能，敘述不當。","B":"不宜一律剝奪電話卡或鏡子，應個別評估。","C":"應尊重個別差異，而非一律統一活動。","D":"正確。提供自治自主機會、住院中即連結家庭社區資源。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","環境治療(milieu)"]}},"109030-N5-15":{"quick":"照顧精神病人：勿以道德標準衡量其行為表現。","detail":{"background":"照顧精神病人的正確態度:應以『接納、不批判』的態度，不以道德標準評斷其行為(其行為常是疾病或內在需求的表現)。其他錯誤:B 過度使用封閉式問句會限制病人表達，宜多用開放式;C 嚴格管理策略不符治療性與尊重;D 使用批判言辭破壞關係、傷害自尊。故 A 正確。不評判是治療性關係的核心態度。","options":{"A":"正確。勿以道德標準衡量精神病人的行為，以接納不批判為原則。","B":"過度使用封閉式問句限制病人表達。","C":"嚴格管理策略不符治療性與尊重。","D":"批判言辭破壞關係、傷害自尊。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"109110-N5-10":{"quick":"覺得問題不再特殊、相互支持＝普及性(universality)。","detail":{"background":"成員在團體中發現『自己的問題並非那麼特殊、他人也有類似困擾，因而相互支持』，這是 Yalom 療效因子『普及性/普同感(universality)』，能減少孤立感。利他性是藉助人而提升自我;希望灌注是看他人改善而生希望;情感宣洩是表達釋放情緒。本題核心是『發現不孤單』，故為普及性。","options":{"A":"利他性是藉助人提升自我價值。","B":"希望灌注是看他人改善而生希望。","C":"正確。覺得問題不再特殊、相互支持，是普及性(universality)。","D":"情感宣洩是表達與釋放情緒。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"109110-N5-19":{"quick":"害怕鋰鹽副作用的病人：先同理與傾聽其感受。","detail":{"background":"丁小姐因擔心鋰鹽的副作用(青春痘、發胖)而害怕服藥。最適切處置是『先同理與傾聽其感受』，理解其擔憂、建立信任，再進一步提供正確衛教與因應。A 空泛保證「絕無副作用」不誠實且破壞信任;B 逕自請醫師改處方未先處理其情緒、也越權;C 把藥磨粉偷加入飲料是欺騙、違反知情同意與倫理。故 D 正確。先同理再衛教是處理服藥疑慮的原則。","options":{"A":"保證「絕無副作用」不誠實、破壞信任。","B":"逕請醫師改處方未先處理情緒，且越權。","C":"把藥偷加入飲料是欺騙，違反知情同意與倫理。","D":"正確。先同理與傾聽其感受，再提供衛教。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"109110-N5-29":{"quick":"自閉症對聲音過度反應尖叫拍頭：暫停活動、給予短暫隔離(減少刺激)。","detail":{"background":"自閉症類群障礙症病人對感覺刺激(如救護車聲)常過度敏感，出現尖叫、自傷(拍打頭部)。此時最合宜是『暫停其課堂活動、帶離現場給予短暫隔離，減少感覺刺激』以協助其平穩、並防自傷。鼓勵用言語表達對自閉症當下不切實際;立即給鎮定藥非首選(先非藥物降低刺激);引導團體成員給支持反而增加刺激。對感覺過載的自閉症病人，減少刺激是首要。","options":{"A":"當下尖叫自傷時，鼓勵言語表達不切實際。","B":"鎮定藥物非首選，先以非藥物降低刺激。","C":"引導團體成員給予支持反而增加感覺刺激。","D":"正確。暫停活動、短暫隔離以減少刺激、防自傷，最合宜。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","自閉症類群障礙症"]}},"110030-N5-33":{"quick":"復元(recovery)：協助病人保持希望、自信、樂觀看待未來。","detail":{"background":"復元(recovery)概念強調精神病人即使有症狀，仍能『保持希望、發展自信、樂觀地看待未來』，追求有意義、有目標的生活，重視自主、賦權與優勢。其他錯誤:A 復元不是容許退縮退化，而是促進成長;B 探索生命意義是復元的一部分，非禁忌;C 復元強調病人有自我控制與自主調控的能力。故 D 正確。復元是希望導向、優勢取向的照護理念。","options":{"A":"復元促進成長，非容許退縮退化。","B":"探索生命意義是復元的一部分，非禁忌。","C":"復元強調病人有自主調控的能力。","D":"正確。協助病人保持希望、自信、樂觀看待未來，是復元的核心。"},"sources":["精神科護理學·社區精神衛生與三段預防","復元(recovery)模式"]}},"110030-N5-34":{"quick":"社區精神心理衛生護理：注重持續性、一致性的照顧。","detail":{"background":"社區精神心理衛生護理強調『持續性、一致性』的照顧(連續性追蹤、避免照護中斷與復發)，並以病人為中心。其他敘述錯誤:B 仍須運用護理過程(評估、診斷、目標、處置、評值);C 以病人為中心『必須』考量家屬、環境、文化等脈絡;D 社區護理過程『應』考量經濟、社會因素。故 A 正確。持續一致與全人脈絡考量是社區照護的特性。","options":{"A":"正確。社區精神心理衛生護理注重持續性、一致性的照顧。","B":"仍須運用護理過程(評估診斷目標處置評值)。","C":"以病人為中心須考量家屬、環境、文化。","D":"社區護理應考量經濟、社會等因素。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"110110-N5-10":{"quick":"認知治療：不合理想法/邏輯推理錯誤常造成焦慮或適應不良。","detail":{"background":"認知治療(Beck)的核心:個人的『邏輯推理錯誤或不合理想法(認知扭曲)常造成焦慮或適應不良』，治療重點在辨識並修正這些扭曲的自動化思考。其他錯誤:A 認知治療著重『此時此刻』的想法而非過去事件;C「以單一事件對大多數事件做推論」是『過度類化(overgeneralization)』，非過度個人化;D 生理回饋儀非認知治療的必備工具。故 B 正確。","options":{"A":"認知治療著重此時此刻的想法，非強調過去事件。","B":"正確。不合理想法/邏輯推理錯誤常造成焦慮或適應不良。","C":"以單一事件推論多數事件是過度類化，非過度個人化。","D":"生理回饋儀非認知治療的必備工具。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","Beck 認知治療"]}},"110110-N5-16":{"quick":"憂鬱、低自尊自責：傾聽並同理其低自尊感受、適時澄清價值觀。","detail":{"background":"林小姐憂鬱、把父母離婚、男友分手都歸咎自己(低自尊、過度自責、認知扭曲)。最適當回應是『傾聽並同理其低自尊的感受，適時澄清其價值觀(扭曲的自我歸因)』。A「何必單戀一枝花、再找就有」輕忽且給建議;C「事情都過去了多參加活動」否定情緒、給建議;D「不要再提」壓抑迴避。對憂鬱低自尊者，先同理再溫和澄清認知扭曲。","options":{"A":"「再找就有」輕忽其情緒、給建議。","B":"正確。傾聽並同理低自尊感受、適時澄清其扭曲的價值觀。","C":"「事情都過去了」否定情緒、給建議。","D":"勸其「不要再提」是壓抑迴避，非治療性。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","憂鬱症護理"]}},"110110-N5-37":{"quick":"面對暴力：營造治療性環境的支持，可協助護理人員處理被攻擊後的情緒。","detail":{"background":"臨床面對病人暴力的正確認識:被攻擊的護理人員需要支持，『營造治療性環境與團隊支持，可協助其處理被暴力攻擊後的情緒』(如恐懼、憤怒、自責)，並做事件檢討與減壓。其他錯誤:A 護理人員(非醫師)因接觸時間最長，被攻擊危險性最高;B 被攻擊未必出現大聲哭訴，反應因人而異;C 不應把被攻擊視為「正常」而僅提醒小心——應有系統性的預防、支持與檢討。故 D 正確。","options":{"A":"接觸最多的護理人員被攻擊危險性最高，非醫師。","B":"被攻擊的反應因人而異，非通常大聲哭訴。","C":"不應把被攻擊視為正常而僅提醒小心，需系統性預防與支持。","D":"正確。營造治療性環境支持，可協助護理人員處理被攻擊後的情緒。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","暴力事件後支持"]}},"110110-N5-38":{"quick":"社區心理衛生中心：辦理心理健康促進活動及高危險群危機處理。","detail":{"background":"社區心理衛生中心的主要服務內容聚焦『心理/精神』層面:辦理心理健康促進活動(初級)、提供高危險群與精神病人的危機處理與諮詢(次級)、社區精神復健連結(三級)。其他錯誤:A、D 把重點放在「身體」健康促進/諮詢/身體治療，非心理衛生中心核心;C 災難「身體創傷救護」屬急救醫療，非心理衛生中心。故 B 正確。","options":{"A":"身體健康促進/專業訓練非心理衛生中心的核心。","B":"正確。心理健康促進活動及高危險群危機處理是其主要服務。","C":"災難身體創傷救護屬急救醫療，非心理衛生中心。","D":"身體健康諮詢與身體治療非心理衛生中心服務。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"111030-N5-1":{"quick":"「你是擔心身體和財產嗎?」把模糊抱怨聚焦確認＝澄清。","detail":{"background":"王奶奶說「全身都壞了、兒子不孝只想要財產」(身體抱怨＋被害意念)。護理師回應「妳是擔心自己的身體和財產嗎?」，把病人含糊、多重的訊息聚焦並確認其真正關切，這是『澄清(clarification)』。提出懷疑是對妄想內容表達溫和不確定;鼓勵比較是請病人比較不同情境;面質是指出言行不一致。本題是把模糊訊息聚焦確認，故為澄清。","options":{"A":"正確。把模糊抱怨聚焦並確認其關切，是澄清(clarification)。","B":"提出懷疑是對妄想內容表達溫和不確定。","C":"鼓勵比較是請病人比較不同情境或經驗。","D":"面質是指出言行不一致。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"111030-N5-2":{"quick":"新手媽媽講座(預防發生)＝初級預防。","detail":{"background":"社區精神心理衛生三段預防中，對『一般大眾或高危族群』在問題發生前提供衛生教育、促進心理健康，屬初級預防。為新手媽媽舉辦『懷孕身心變化』講座，是在產後情緒問題發生前提供知識與準備、預防發生，屬初級預防。次級是早期發現治療;三級是復健。故選初級預防。","options":{"A":"正確。新手媽媽講座是預防問題發生的衛生教育，屬初級預防。","B":"次級預防是早期發現、早期治療。","C":"三級預防是對已患病者的復健。","D":"此講座定位明確屬初級，非各級皆涵蓋。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"111030-N5-4":{"quick":"出院後強化社交技巧＝復健性照護。","detail":{"background":"精神衛生護理依目的分保健性(促進心理健康、預防)、治療性(疾病急性期的治療)、復健性(協助病人恢復功能、重返社會)、管理性。居家護理師於『病人出院後協助強化社交技巧』，是協助其恢復社會功能、適應社區生活，屬『復健性』照護(對應三級預防)。故選復健性。","options":{"A":"保健性著重健康促進與預防。","B":"治療性著重疾病急性期治療。","C":"正確。出院後強化社交技巧協助恢復功能，屬復健性照護。","D":"管理性著重行政與資源管理。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"111030-N5-32":{"quick":"妄想被偷地契：不爭辯、以轉移注意(一起去散步)轉換情境。","detail":{"background":"張先生懷疑地契被媳婦偷(被害妄想)。最適當護理是『不與妄想爭辯，以溫和的方式轉移其注意力』，如「你最喜歡的戶外散步時間到了，我們一起去散步」，把焦點從妄想轉到正向活動。A 直接澄清「沒有人會拿、不用擔心」是與妄想爭辯;B 請媳婦解釋反而把媳婦捲入、可能強化對立;D 找其最信任的子女安撫雖較佳但仍可能被捲入妄想，且非「最適當」的當下護理措施。對妄想宜不爭辯、轉移注意。","options":{"A":"直接澄清「沒有人會拿」是與妄想爭辯，無效。","B":"請媳婦解釋把當事人捲入，可能強化對立。","C":"正確。不爭辯妄想、以轉移注意(一起散步)轉換情境，最適當。","D":"找子女安撫仍可能被捲入妄想，非當下最適當措施。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","妄想症護理"]}},"111110-N5-3":{"quick":"對精神病人的正確認識：行為有意義①、多因致病②、常低自信低挫折忍受③(④診斷重度就放棄關注錯)。","detail":{"background":"專業精神衛生護理人員應有的認識:(1)病人怪異的想法與行為『有其目的與意義』，常為滿足某需要或溝通某訊息;(2)精神疾病的導因『非單一』，是基因、生活、心理、社會相互影響的結果(生物-心理-社會模式);(3)許多病人缺乏自信、安全感，挫折忍受度或抗壓性較低。而(4)『一旦診斷重度精神疾患就難治癒、不需關注其思想情緒行為、只維持生理照護』錯誤——這是放棄與汙名的態度，違反復元理念。故正確為①②③(選 A)。","options":{"A":"正確。行為有意義①、多因致病②、常低自信低挫折忍受③，皆為正確認識。","B":"①②④：含敘述4(放棄關注)，錯誤。","C":"①③④：含敘述4，錯誤。","D":"②③④：含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"111110-N5-11":{"quick":"透過他人回饋更了解自己與別人互動的問題＝人際學習。","detail":{"background":"Yalom 療效因子『人際學習(interpersonal learning)』指成員透過團體中他人的回饋，了解自己的人際互動模式並加以修正。張小姐因尤先生指出她講話態度引起他人不舒服，而『更了解自己和別人互動的問題』，正是人際學習。利他因素是助人而自我提升;模仿行為是觀察學習他人行為;普遍性是發現他人有類似困擾。本題核心是『透過回饋認識自己的人際模式』，故為人際學習。","options":{"A":"利他因素是藉助人提升自我價值。","B":"正確。透過他人回饋了解自己的人際互動問題，是人際學習。","C":"模仿行為是觀察學習他人的行為。","D":"普遍性是發現他人有類似經驗而不孤單。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"111110-N5-13":{"quick":"對操控、挑撥、過分要求的病人，門寧格態度治療採『就事論事』。","detail":{"background":"門寧格(Menninger)的『態度治療(attitude therapy)』針對不同病人採不同治療態度:對退縮、憂鬱的病人採『主動友善(active friendliness)』;對多疑妄想的病人採『被動友善(passive friendliness)』;對有操控、挑撥、過分要求(如反社會/邊緣型)的病人採『就事論事(matter-of-fact)』，以一致、客觀、不被操縱的態度;對躁症等採『寬容而堅定(kind firmness)』。故對操控挑撥者選就事論事。","options":{"A":"主動友善用於退縮、憂鬱的病人。","B":"被動友善用於多疑妄想的病人。","C":"正確。對操控、挑撥、過分要求的病人採就事論事(matter-of-fact)。","D":"寬容(堅定)較適用於躁症等病人。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","Menninger 態度治療"]}},"111110-N5-34":{"quick":"社區心理衛生：醫院與社區的銜接是不可或缺的一環。","detail":{"background":"社區心理衛生工作的正確概念:強調『醫院與社區的銜接(連續性照護)』是不可或缺的一環，使病人出院後能無縫接軌社區資源、減少復發。其他敘述錯誤:A 社區心理衛生需多單位協力，非『完全仰賴』社區健康服務中心;C 目標是促進心理健康與功能，而非『社區沒有精神疾病』(不切實際);D 以生物-心理-社會多元模式為主，而非單一生物醫學模式。故 B 正確。","options":{"A":"社區心理衛生需多單位協力，非完全仰賴單一中心。","B":"正確。醫院與社區的銜接是社區心理衛生不可或缺的一環。","C":"目標是促進心理健康，而非「社區沒有精神疾病」。","D":"以生物-心理-社會模式為主，非單一生物醫學模式。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"111110-N5-36":{"quick":"社區心理衛生初級預防＝提供社區民眾心理衛生教育。","detail":{"background":"初級預防針對一般大眾、在問題發生前促進心理健康，『提供社區民眾心理衛生教育』屬之。轉介精神病人至社區復健機構、提供康復期職能訓練都屬三級復健;提高慢性病人服藥順從度屬次級/三級(對已患病者)。故選提供社區民眾心理衛生教育。補充:三段預防判別——初級(對一般大眾預防發生:心理衛生教育、健康促進)、次級(早期發現治療:篩檢、危機處置、門診)、三級(復健:社區復健機構、職能/職業訓練、提高慢性病人服藥順從)。轉介復健、職能訓練、服藥順從皆針對已患病者，屬三級。","options":{"A":"轉介至社區復健機構屬三級復健。","B":"正確。提供社區民眾心理衛生教育屬初級預防。","C":"提供職能訓練屬三級復健。","D":"提高服藥順從度針對已患病者，屬次級/三級。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"111110-N5-39":{"quick":"會談技巧：全神貫注傾聽①、少用「為什麼」②、用澄清了解想法④(勿用面質盡速建立關係③)。","detail":{"background":"與精神病人會談的治療性技巧:(1)全神貫注地傾聽，傳達尊重與接納;(2)儘量少用「為什麼」的問句(易帶質問、引發防衛);(4)運用澄清技巧了解病人真正的想法。而(3)『運用面質技巧盡速建立護病關係』錯誤——面質須在已建立的信任關係中、適當時機使用，不能用來「盡速」建立關係，否則升高防禦。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(面質盡速建立關係)，錯誤。","B":"正確。全神貫注傾聽①、少用「為什麼」②、用澄清了解想法④。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"112030-N5-1":{"quick":"本題送分(各答案均給分)：精神衛生護理學會推展的專業認證。","detail":{"background":"本題詢問中華民國精神衛生護理學會致力推展的專業認證/甄審項目(如精神衛生護理師、社區精神衛生護理能力鑑定、精神衛生臨床護理專家、精神科專科護理師等)。因選項認定有爭議，official 公告『本題一律給分(送分)』，故四個答案皆視為正確。考生作答任一選項均得分。學會推動精神衛生護理的專業分級認證，旨在提升專科照護品質。","options":{"A":"本題送分，選 A 亦給分。","B":"本題送分，選 B 亦給分。","C":"本題送分，選 C 亦給分。","D":"本題送分，選 D 亦給分。"},"sources":["精神科護理學·專業組織與認證"]}},"112030-N5-12":{"quick":"團體治療：成員間的凝聚力是重要的療效因子。","detail":{"background":"團體治療的正確概念:『團體凝聚力(group cohesiveness)』是 Yalom 重要療效因子，凝聚力高的團體成員更願投入、自我揭露與相互支持，是治療有效的關鍵。其他錯誤:A 理想人數約8–10人(3–5人過少);C 同質性或異質性團體各有適用情境，非絕對誰好;D 封閉性或開放性團體亦各有優缺(封閉利凝聚、開放利新成員加入)，非絕對。故 B 正確。","options":{"A":"理想成員數約8–10人，3–5人過少。","B":"正確。成員間的凝聚力是重要的療效因子。","C":"同質與異質團體各有適用情境，非絕對。","D":"封閉與開放團體各有優缺，非絕對誰好。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"112030-N5-34":{"quick":"預防心理健康問題的發生＝初級預防。","detail":{"background":"三段預防中，在問題『發生前』針對一般大眾促進心理健康、減少危險因子，屬初級預防。「預防心理健康問題的發生」即典型的初級預防。次級是早期發現早期治療;三級是復健;無第四級。故選初級預防。補充:三段五級對照——初級預防含健康促進(衛生教育、壓力調適、心理健康講座)與特殊保護(高危群介入);次級預防為早期診斷早期治療(篩檢、危機處置、門診);三級預防為限制殘障與復健(社區復健、職能訓練、重返社會)。判別關鍵在『問題是否已發生』:未發生→初級;已發生早期介入→次級;已患病復健→三級。","options":{"A":"正確。預防心理健康問題的發生屬初級預防。","B":"次級預防是早期發現早期治療。","C":"三級預防是對已患病者的復健。","D":"三段五級無第四級預防。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"112110-N5-1":{"quick":"精神衛生護理角色：社區照護常採用個案管理者(Case Manager)。","detail":{"background":"精神衛生護理人員的角色功能:社區照護常採『個案管理者(case manager)』模式，整合資源、協調連續性照護。其他錯誤:B 個案管理者不限護理師擔任(社工等亦可);C 精神科病房多採『全責/主護(primary)』或團隊護理，『功能性護理』(按技術分工)非普遍且不利連續關係;D 護理計畫須由主責護理師(primary nurse)擬定。故 A 正確。","options":{"A":"正確。社區照護常採用個案管理者(case manager)模式。","B":"個案管理者不限護理師，社工等亦可擔任。","C":"功能性護理非精神科病房普遍方式，不利連續關係。","D":"護理計畫須由主責護理師擬定。"},"sources":["精神科護理學·護理角色與照護模式"]}},"112110-N5-8":{"quick":"同理心(empathy)＝積極傾聽、理解病人感受但不被淹沒。","detail":{"background":"同理心(empathy)是『設身處地理解病人的感受與處境並適當回應』，核心包含『積極傾聽』。它與同情(sympathy)不同:同理是理解而不被病人情緒『完全淹沒』(A 錯，完全融入會失去客觀);護理師可適度、真誠地表露自己的感受以促進關係(B 錯，非完全不表露);同理須探索病人的潛在需求(D 錯)。故 C 正確。","options":{"A":"完全融入病人情緒會失去客觀，是過度涉入而非同理。","B":"護理師可適度真誠表露感受，非完全不表露。","C":"正確。同理心的核心是積極傾聽、理解病人感受。","D":"同理須探索病人的潛在需求。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"112110-N5-15":{"quick":"急性病房治療性硬體：設置公共電話供病人對外聯繫。","detail":{"background":"精神科急性病房的治療性硬體環境應兼顧安全與人性化:『設置公共電話供病人對外聯繫』維護其與外界連結的權利。其他錯誤:A 適度擺設私人物品可增親切感，非一律禁止;B 病房裝設窗簾(防墜選防勒式)兼顧隱私與安全，非「不得裝窗簾」;C 保護室『應設置觀察窗(玻璃窗)』以隨時觀察病人安全。故 D 正確。","options":{"A":"適度擺設私人物品可增親切感，非一律禁止。","B":"病房可裝設(安全式)窗簾兼顧隱私與安全。","C":"保護室應設置觀察窗以隨時觀察病人安全。","D":"正確。設置公共電話供病人對外聯繫，符合治療性環境。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"112110-N5-16":{"quick":"家庭治療護理措施＝促進家庭成員間有效的溝通。","detail":{"background":"家庭治療的核心是改善家庭『系統互動與溝通』，故護理措施應『促進有效的溝通』。其他錯誤:A 家庭治療常安排『家庭作業』讓成員在家中練習新互動;B 家庭治療『需要訂定目標』;C 著重『此時此刻』的家庭互動，而非僅討論過去。故 D 正確。促進有效溝通是家庭治療的關鍵介入。","options":{"A":"家庭治療常安排家庭作業練習新互動。","B":"家庭治療需要訂定目標。","C":"著重此時此刻的家庭互動，非僅討論過去。","D":"正確。促進家庭成員間有效的溝通，是家庭治療的核心措施。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","家庭治療"]}},"112110-N5-18":{"quick":"憂鬱症護病關係：同理感受①、給簡單直接訊息②、協助表達想法感覺④(勿督促③)。","detail":{"background":"與憂鬱症病人建立護病關係的原則:(1)同理其感受與想法;(2)因憂鬱者注意力與動機差，宜『給予簡單、直接、清楚』的訊息;(4)協助其表達想法與感覺。而(3)『採取督促方式陪伴』錯誤——憂鬱病人能量低、易自責，督促會增加壓力與挫敗，應以接納、不催促的陪伴為宜。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(督促)，憂鬱者不宜督促。","B":"正確。同理①、給簡單直接訊息②、協助表達④為適當原則。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","憂鬱症護理"]}},"112180-N5-2":{"quick":"面對分化(挑撥)行為：傾聽動機①、中立態度討論②、就事論事④(勿隱瞞③應團隊溝通)。","detail":{"background":"病人說「你對我真好，不像小夜班護理師那麼兇，他還說你壞話」屬『分化(splitting/挑撥)』行為。護理原則:(1)傾聽其想法及動機;(2)保持中立的態度與其討論(不附和也不否認);(4)以就事論事的態度與其互動、設定一致界限。而(3)『隱藏此事、不告訴其他護理人員』錯誤——分化最需『團隊溝通、態度一致』，隱瞞反而讓病人有機可乘。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(隱瞞)，與團隊一致原則相反。","B":"正確。傾聽動機①、中立討論②、就事論事④；分化需團隊一致。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","邊緣型人格·分化處理"]}},"112180-N5-3":{"quick":"「我沒病為何關我」同理回應＝反映其覺得委屈、不受尊重的感受。","detail":{"background":"缺乏病識感的施先生說「我真的沒病，為什麼把我關起來?」。同理心的回應應『反映其感受而不爭辯病識感』:「我了解，你覺得自己沒病，住院讓你感到委屈、不受尊重」。A 拿其他病友比較未同理其個人感受;B 反問「你問過醫師?」帶質問;C「出院早晚問題別擔心」空泛保證、未同理。故 D 最適宜。對缺乏病識感者，先同理感受、不爭辯。","options":{"A":"拿其他病友比較，未同理其個人感受。","B":"反問「你問過醫師?」帶質問意味。","C":"「出院早晚問題」是空泛保證，未同理。","D":"正確。反映其覺得委屈、不受尊重的感受，是同理的回應。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"112180-N5-4":{"quick":"社區精神醫學第一級預防＝心理健康講座。","detail":{"background":"社區精神醫學三級預防:第一級(初級)針對一般大眾預防發生，如『心理健康講座』;第二級(次級)早期發現早期治療，如門診治療、危機處置;第三級(三級)復健，如庇護工場訓練。心理健康講座屬第一級預防。補充:社區精神醫學三級預防的具體對照——第一級:心理健康講座、壓力管理、去汙名衛教;第二級:門診治療、危機處置、自殺防治專線、高危群篩檢;第三級:康復之家、日間留院、庇護工場、職業重建。判別關鍵=問題是否已發生、病人是否已患病需復健。","options":{"A":"正確。心理健康講座是對一般大眾的第一級預防。","B":"門診治療屬第二級(早期治療)。","C":"危機處置屬第二級(早期介入)。","D":"庇護工場訓練屬第三級復健。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"112180-N5-5":{"quick":"把離題的躁症病人拉回吃午餐主題＝集中話題(focusing)。","detail":{"background":"躁症病人意念飛躍、離題(談房地產、要送房子)。護理師回應「謝謝，你先告訴我，你要坐在哪裡吃午餐?」，把發散的談話拉回到『吃午餐』這個重點，這是『集中話題(focusing)』技巧，用於協助思考發散的病人聚焦。提出觀察是描述觀察到的行為;同理是理解其感受;面質是指出言行不一致。本題重點是把離題拉回，故為集中話題。","options":{"A":"提出觀察是描述觀察到的行為或現象。","B":"同理是理解並回應病人的感受。","C":"面質是指出言行不一致。","D":"正確。把離題的談話拉回吃午餐主題，是集中話題(focusing)。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"112180-N5-6":{"quick":"社區化照護模式中，「急性期住院藥物治療」非社區化照護(屬醫院急性治療)。","detail":{"background":"WHO 推動以社區為主的精神健康三級預防，常見的『社區化照護模式』包括:自殺防治高關懷服務、康復之家、職業重建訓練、日間留院、社區復健中心等，提供復健所需的社會資源。而『急性期住院之藥物治療』屬醫院內的急性治療，不是社區化照護模式。故 B 為錯誤者(本題選錯誤)。","options":{"A":"自殺防治高關懷服務是社區化照護模式。","B":"正確(本題選錯誤者)。急性期住院藥物治療屬醫院急性治療，非社區化照護。","C":"康復之家是社區化復健照護模式。","D":"職業重建訓練是社區化復健模式。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"112180-N5-7":{"quick":"潑油漆者合理化暴力，同理回應＝反映其情緒「聽起來你很生氣」。","detail":{"background":"張先生潑油漆警告鄰居、合理化自己的暴力。同理心回應應『反映其情緒而不評斷行為對錯』:「聽起來，你很生氣」。A「總之潑油漆是不對的」是評斷與說教;C「先冷靜，等警察調查」未同理且帶安撫指令;D 拿太太的澄清反駁其說法是爭辯。對憤怒、合理化的病人，先反映情緒、建立關係，再處理行為。故 B 最適宜。","options":{"A":"「潑油漆是不對的」是評斷說教，非同理。","B":"正確。「聽起來你很生氣」反映其情緒，是同理的回應。","C":"「先冷靜等警察」未同理且帶指令。","D":"拿太太的澄清反駁是爭辯，非同理。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"112180-N5-23":{"quick":"主動篩檢社區高危險群、早期發現＝個案發現者(case finder)。","detail":{"background":"社區護理師『主動關心需要服務的民眾，運用工具與會談篩檢高危險群以達早期發現』，扮演的是『個案發現者(case finder)』角色(次級預防的核心)。照顧提供者是直接提供照護;諮詢者是提供專業諮詢;評值者是評量成效。本題核心是『主動篩檢、發現個案』，故為個案發現者。","options":{"A":"照顧提供者是直接提供護理照護。","B":"正確。主動篩檢高危險群、早期發現，是個案發現者(case finder)。","C":"諮詢者是提供專業諮詢。","D":"評值者是評量計畫或照護成效。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"112180-N5-24":{"quick":"社區精神心理衛生目的『最不適宜』＝由專業人員積極主導治療計畫。","detail":{"background":"社區精神心理衛生以『病人為中心、賦權、優勢取向』為原則:提升病人生活適應、促進個人復元、以病人優勢發展其因應能力。而『由專業人員積極主導治療計畫』最不適宜——它違反賦權與以病人為中心的精神，剝奪病人的自主與參與。應由病人與專業人員『合作』、病人參與決策。故 C 為最不適宜者。","options":{"A":"提升病人生活適應符合社區精神衛生目的。","B":"促進個人復元符合復元導向。","C":"正確(本題選最不適宜者)。由專業人員積極主導違反賦權與以病人為中心。","D":"以病人優勢取向發展因應能力符合優勢取向。"},"sources":["精神科護理學·社區精神衛生與三段預防","復元·賦權"]}},"113030-N5-1":{"quick":"情感轉移(transference)＝病人把過去人物的情感轉移到護理師身上。","detail":{"background":"情感轉移(transference)是『病人』把對過去生命中重要人物(如父母)的情感、態度與期待，投射到護理師身上;反轉移(countertransference)方向相反(護理師投射到病人)。轉移不一定有害——適當覺察與處理可成為治療的素材(C 錯，非「絕對」有害)。護理師對病人有性幻想是反轉移的一種表現(D 描述的是反轉移)。故 A 正確。","options":{"A":"正確。情感轉移是病人把過去人物的情感轉移到護理師身上。","B":"此為反轉移(護理師投射到病人)，方向相反。","C":"轉移經適當處理可成治療素材，非「絕對」有害。","D":"護理師對病人的性幻想屬反轉移。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","轉移與反轉移"]}},"113030-N5-3":{"quick":"策略性(strategic)家庭治療以解決家庭溝通問題為導向。","detail":{"background":"家庭治療各學派:鮑恩(Bowen)系統理論的『三角關係(triangulation)』可存在於『任何三人之間』(不限夫妻或手足)，其治療目標是『提高(而非降低)家庭成員的自我分化(differentiation)』;策略性(strategic，Haley)家庭治療以『解決家庭溝通與互動問題』為導向，運用策略性指令打破問題循環;家庭治療『會處理家庭危機』，不僅是諮商與行為修正。故 C 正確。","options":{"A":"三角關係不限夫妻或手足，可存在任何三人間。","B":"Bowen 的目標是「提高」分化，非降低。","C":"正確。策略性家庭治療以解決家庭溝通問題為導向。","D":"家庭治療會處理家庭危機，非僅諮商與行為修正。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","家庭治療學派"]}},"113030-N5-10":{"quick":"思覺失調生活懶散缺動機，最不適切＝向病人保證「藥物治療只是短暫的」。","detail":{"background":"對思覺失調症生活懶散、缺乏動機(負性症狀)的病人，適切護理:鼓勵建立每日作息表、對其參與團體給予讚賞(正增強)、與其互動保持真誠與公開。而『向病人保證藥物治療只是短暫的』最不適切——思覺失調症多需『長期、持續』藥物治療以防復發，做此不實承諾會誤導病人、日後破壞信任與服藥順從。故 D 為最不適切者。","options":{"A":"鼓勵建立每日作息表有助改善負性症狀，適切。","B":"對參與團體給予讚賞是正增強，適切。","C":"與病人互動保持真誠公開，適切。","D":"正確(本題選最不適切者)。保證藥物只是短暫的是不實承諾，誤導病人。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","思覺失調症護理"]}},"113030-N5-22":{"quick":"協助精神病人重返社區生活＝第三級預防。","detail":{"background":"社區心理衛生三段預防:第一級(里民中心心理衛生講座)針對一般大眾預防發生;第二級(加強門診治療、對高自傷危險者危機處置)早期發現早期治療;第三級(復健)協助已患病者恢復功能、『重返社區生活』。協助精神病人重返社區屬第三級預防。補充:三級預防(復健)的內容包括協助病人恢復生活與社會功能、重返社區、職業重建、預防復發與再住院，對象為已患病、症狀穩定者;與初級(衛生講座)、次級(門診、危機處置)區隔。協助精神病人重返社區生活是典型的三級復健工作。","options":{"A":"加強門診治療屬第二級(早期治療)。","B":"里民中心心理衛生講座屬第一級。","C":"對高自傷危險者危機處置屬第二級。","D":"正確。協助精神病人重返社區生活屬第三級預防(復健)。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"113100-N5-4":{"quick":"三級預防工作內容＝協助病人回歸社區並提供就業輔導(復健)。","detail":{"background":"三段預防中，第三級(復健)針對已患病者，協助其恢復功能、減少失能、重返社會，如『協助病人回歸社區並提供就業輔導資訊』。A 積極治療防止惡化、B 早期診斷轉介治療屬第二級(早期介入);C 社區壓力管理講座屬第一級(預防發生)。故 D 為三級預防工作。","options":{"A":"積極治療防止惡化屬第二級(早期治療)。","B":"早期診斷轉介治療屬第二級。","C":"壓力管理衛生講座屬第一級預防。","D":"正確。協助回歸社區並提供就業輔導屬第三級預防(復健)。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"113100-N5-7":{"quick":"家庭治療：家庭是動態系統，家庭問題可世代間傳遞。","detail":{"background":"家庭治療以系統觀看家庭:『家庭是一個動態的系統，問題可在世代間傳遞(代間傳遞，如 Bowen 的多世代傳遞)』。其他錯誤:A 家庭的次系統(夫妻、親子、手足)屬家庭的『內在結構』，非外在;B 家庭治療『不一定需集合全體家人』才能進行(可從部分成員著手);C 家庭治療處理整體互動與結構，非『僅』強調病態溝通。故 D 最適切。","options":{"A":"家庭次系統屬內在結構，非外在結構。","B":"家庭治療不一定需全體家人到齊才能進行。","C":"家庭治療處理整體互動結構，非僅強調病態溝通。","D":"正確。家庭是動態系統，問題可世代間傳遞。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","家庭治療"]}},"113100-N5-16":{"quick":"離婚後突發語言障礙、步態異常但神經檢查無異常(轉化症)：先改善身體不適、建立信任為首要。","detail":{"background":"蕭小姐遭逢離婚壓力後突然出現語言障礙、發聲困難、奇異步態，但神經學檢查無異常——符合『轉化症(conversion disorder)』，即心理衝突轉化為身體症狀。護理首要是『協助改善其身體不適、促進舒適，並與其建立信任感』，再逐步處理心理議題。A 簡略環境介紹反顯冷漠;C 立即依檢查報告面質「你沒病」會破壞關係、增防衛;D 暗示檢查不準、建議更多檢查會強化其對身體症狀的關注(次級獲益)。故 B 最適切。","options":{"A":"簡略環境介紹顯冷漠，不利建立關係。","B":"正確。先改善身體不適、促進舒適、建立信任感為首要。","C":"立即以檢查報告面質會破壞關係、增防衛。","D":"暗示檢查不準、建議更多檢查會強化對身體症狀的關注。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","轉化症/身體症狀障礙"]}},"113100-N5-22":{"quick":"社區護理實務能力：日常生活自我管理＝協助病人確立並解決生活問題、增強自我管理策略。","detail":{"background":"精神衛生社區護理的實務能力面向:其中『日常生活之自我管理』指『協助病人確立、解決生活問題，增強其自我管理策略』，培養其在社區獨立生活的能力。其他錯誤:A『協助病人建構自我與賦能』指協助病人賦權成長，非僅指護理人員自我覺察;B 疾病管理照護非『讓病人住院控制症狀』，而是協助其在社區自我監測與管理;D 工作就業輔導非『全力聚焦找工作』，而是整體職業復健。故 C 正確。","options":{"A":"建構自我與賦能指協助病人賦權，非僅護理人員自我覺察。","B":"疾病管理是協助社區自我監測管理，非住院控制症狀。","C":"正確。協助病人確立解決生活問題、增強自我管理策略。","D":"就業輔導是整體職業復健，非全力聚焦找工作。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"113180-N5-1":{"quick":"治療性關係特性：學習建立新行為是工作期常見主題。","detail":{"background":"治療性關係的特性:(D)在工作期(working phase)病人在信任基礎上『學習建立新行為』是常見主題。其他錯誤:A 不鼓勵護理師『深度自我開放』(自我表露應有限度且為病人利益);B 治療性關係各期是『連續且重疊』的，非不連續不重疊;C 治療性關係『需設定明確目標』，非無需目標。故 D 正確。","options":{"A":"治療性關係不鼓勵護理師深度自我開放。","B":"各期是連續且重疊，非不連續不重疊。","C":"治療性關係需設定明確目標。","D":"正確。學習建立新行為是工作期常見主題。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"113180-N5-7":{"quick":"面對人生孤獨與自我負責的團體互動＝存在因素(existential factors)。","detail":{"background":"成員 A 抱怨女兒忙、撫養孩子不值得，成員 B 建議『父母要學習自己照顧自己』——這觸及『人終究要面對孤獨、為自己的生命負責』的議題，屬 Yalom 療效因子『存在因素(existential factors)』。原生家庭經驗再現是重演並修正早期家庭互動;發展社交技巧是練習社交;利他性是助人而自我提升。本題核心是『面對人生孤獨與自我負責』，故為存在因素。","options":{"A":"正確。面對孤獨、為自己負責的議題，屬存在因素(existential factors)。","B":"原生家庭經驗再現是重演修正早期家庭互動。","C":"發展社交技巧是練習社交能力。","D":"利他性是藉助人而提升自我。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"113180-N5-11":{"quick":"妄想症護理首要＝建立治療性關係(不辯論、不面質妄想、非以鎮靜安眠藥為主)。","detail":{"background":"妄想症狀的護理最適切是『以建立治療性關係(信任)為首要目標』——妄想者多疑防衛，唯有先建立信任才能開展照護。其他錯誤:B 與病人『辯論妄想內容的正確性』會升高敵意，應不爭辯;C 妄想症的藥物治療以『抗精神病藥』為主，非鎮靜安眠藥;D『儘早面質與修正妄想內容』在關係未穩前會適得其反。故 A 正確。","options":{"A":"正確。以建立治療性關係(信任)為妄想症護理的首要目標。","B":"與病人辯論妄想內容會升高敵意，應不爭辯。","C":"妄想症藥物以抗精神病藥為主，非鎮靜安眠藥。","D":"儘早面質修正妄想會升高防衛，適得其反。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","妄想症護理"]}},"113180-N5-19":{"quick":"社區精神心理衛生護理過程：重視社區成員的整體心理健康。","detail":{"background":"社區精神心理衛生護理的特性:以『社區成員的整體心理健康』為對象與焦點(群體取向)。其他錯誤:B 服務方式『不限一對一』，含團體、家庭、社區層次;C 焦點是『病人、家屬與社區整體』，非僅協助家屬需要;D 病人家庭的『經濟、社會問題仍需評估』(影響照護)。故 A 正確。","options":{"A":"正確。社區精神心理衛生護理重視社區成員的整體心理健康。","B":"服務方式不限一對一，含團體、家庭、社區層次。","C":"焦點是病人、家屬與社區整體，非僅家屬需要。","D":"家庭經濟問題會影響照護，仍需評估。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"113180-N5-22":{"quick":"社區精神心理衛生服務系統：注重持續性、一致性的照顧。","detail":{"background":"社區精神心理衛生服務系統強調『持續性、一致性』的照顧(連續追蹤、避免中斷)。其他錯誤:B 多元服務機構不『只』強調治療需要，還含復健、社會支持、就業等;C 社區服務體系『能提供即時住院安排』(與醫院銜接)，非僅留在家中;D 即使社區精神衛生是公衛護理師眾多業務之一，仍『需持續進行精神衛生教育』。故 A 正確。","options":{"A":"正確。社區精神心理衛生服務注重持續性、一致性的照顧。","B":"多元機構不只強調治療，還含復健與社會支持。","C":"社區服務能與醫院銜接提供即時住院，非僅留家中。","D":"仍需持續進行精神衛生教育。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"113180-N5-24":{"quick":"治療性環境促進社交技巧，錯誤＝安排競爭性活動。","detail":{"background":"運用治療性環境促進思覺失調病人的社交技巧，適當措施:協助熟悉環境(工作人員、病友、作息、設施)、安排促進人際互動的活動、鼓勵團體活動以建立自信與成就感。而『安排競爭性活動』錯誤——競爭性活動會增加壓力、挫敗與衝突，對社交退縮、自信不足的病人不利，應安排『合作性、非競爭性』活動。故 D 為錯誤者。","options":{"A":"協助熟悉環境有助安全感與社交，適當。","B":"安排促進人際互動的活動，適當。","C":"鼓勵團體活動建立自信成就感，適當。","D":"正確(本題選錯誤者)。競爭性活動增加壓力挫敗，應安排合作性活動。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"113180-N5-25":{"quick":"初級預防：社區心理衛生評估篩檢①、提供調適資源②、健康講座③(職能復健④屬三級)。","detail":{"background":"以三段預防看，初級預防針對一般大眾與高危群、在問題發生前促進心理健康:(1)於社區進行心理衛生問題評估篩檢(作為規劃依據與健康促進);(2)提供個案(張老師)資源以增加調適能力;(3)舉辦健康講座促進心理健康。而(4)『輔導職能復健、增進功能』是對已患病者的三級預防(復健)。故初級為①②③(選 A)。","options":{"A":"正確。心理衛生評估篩檢①、提供調適資源②、健康講座③屬初級預防。","B":"①③④：含敘述4(職能復健)，屬三級。","C":"②③④：含敘述4，錯誤。","D":"①②④：含敘述4，錯誤。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"114030-N5-12":{"quick":"缺乏病識感、吵著出院：引導他表達住院的過程(不以條件交換)。","detail":{"background":"陳同學思覺失調、缺乏病識感、吵著出院。最適切護理是『引導他表達自己會住院的過程與感受』，藉此建立關係、了解其想法，不與妄想/病識感爭辯。A「保證不干擾就回家」、B「住滿三個月才出院」、D「配合吃藥就出院」都是以『條件交換』承諾出院，既不實際也非治療性，且 B 帶威脅意味。故 C 正確。先傾聽引導表達，再逐步處理病識感。","options":{"A":"以「保證不干擾就回家」做條件交換，不實際。","B":"「住滿三個月」帶威脅，非治療性。","C":"正確。引導他表達自己會住院的過程，建立關係。","D":"以「配合吃藥就出院」做條件交換，不適切。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","思覺失調症·病識感"]}},"114030-N5-13":{"quick":"「父母是假的、抓我來住院」(妄想)：反映其情緒「這個想法很困擾你」。","detail":{"background":"陳同學說「我的父母一定是假的，否則不會把我抓來住院」是妄想內容。對妄想，護理師應『不爭辯內容、把焦點放在病人的情緒』:「這個想法很困擾你」即反映其感受。A「父母是不得已的」、B「父母是為你好」都在替父母辯解、等於與妄想爭辯;C「父母的想法很難了解」未聚焦病人感受、語意模糊。故 D 最適當。對妄想宜反映情緒、不爭辯。","options":{"A":"「父母是不得已的」替父母辯解，等於與妄想爭辯。","B":"「父母是為你好」也在爭辯妄想內容。","C":"「父母想法很難了解」未聚焦病人感受、語意模糊。","D":"正確。「這個想法很困擾你」反映其情緒，不爭辯妄想。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"114030-N5-21":{"quick":"社區精神衛生護理評估：需評估個案、家屬及社區三方面。","detail":{"background":"社區精神衛生護理評估應全面，『需評估個案、家屬及社區三方面』以提供多元、整合的社區照護。其他敘述錯誤:A 需了解個案的生活習慣與社交狀態(屬必要評估，非侵犯私領域);B 需評估照顧者對疾病的了解(影響照護品質);C 需評估社區資源(與照護連結密切)。故 D 正確。完整評估個案-家屬-社區是社區照護的基礎。","options":{"A":"需了解個案生活習慣與社交狀態，屬必要評估。","B":"需評估照顧者對疾病的了解，影響照護。","C":"需評估社區資源，與照護連結密切。","D":"正確。需評估個案、家屬及社區三方面以提供多元照護。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"114030-N5-24":{"quick":"社區精神衛生護理角色：發現心理困擾個案＝疾病預防者(個案發現)的角色。","detail":{"background":"社區精神衛生護理的角色多元，『發現心理困擾個案』是扮演『疾病預防者/個案發現者』的角色(次級預防的早期發現)。其他錯誤:A 社區護理『會提供直接照護服務』(如居家護理);B 角色多元，個案管理者『非唯一』角色;D 社區護理『須進行研究工作』以實證改善照護。故 C 正確。","options":{"A":"社區精神衛生護理會提供直接照護服務。","B":"角色多元，個案管理者非唯一角色。","C":"正確。發現心理困擾個案是疾病預防者(個案發現)的角色。","D":"社區護理須進行研究工作。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"114100-N5-2":{"quick":"治療性人際關係的敘述，錯誤＝「屬社交性關係」。","detail":{"background":"治療性人際關係的特性:有目的之互動(A 對)、目標設定以個案為主(C 對)、有助於建立信任關係(D 對)。而『屬社交性關係』錯誤——治療性關係與社交性關係不同:治療性關係有專業目標、有界限、以病人需求為中心、有時間與結束的規劃;社交關係則是互惠、滿足雙方、無特定治療目標。故 B 為錯誤者。","options":{"A":"有目的之互動，正確。","B":"正確(本題選錯誤者)。治療性關係非社交性關係，二者目標與界限不同。","C":"目標設定以個案為主，正確。","D":"有助於建立信任關係，正確。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"114100-N5-8":{"quick":"凝聚力(cohesiveness)＝感受彼此共同點而產生歸屬感。","detail":{"background":"Yalom 療效因子『團體凝聚力(cohesiveness)』指成員『感受到彼此的共同點、被團體接納，而產生歸屬感與「我們」的感覺』，是其他療效因子發揮的基礎。B「領悟並非只有自己有困擾」是普同感;C「模仿其他成員行為」是模仿行為;D「從回饋領悟自己行為問題」是人際學習。本題描述歸屬感，故為凝聚力。","options":{"A":"正確。感受彼此共同點而產生歸屬感，是團體凝聚力。","B":"領悟並非只有自己有困擾是普同感。","C":"模仿其他成員的行為是模仿行為。","D":"從回饋領悟自己的行為問題是人際學習。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"114100-N5-21":{"quick":"復元概念，錯誤＝「理解精神疾病不可控制、無法處理與克服」。","detail":{"background":"復元(recovery)是希望導向、優勢取向的理念:找到自信並保持希望(A)、建立並保持正向自我感(B)、建立對疾病的覺察並找出生活的意義(C)。而 D『理解精神疾病的不可控制及無法處理與克服的障礙』錯誤——這是消極、無望的態度，與復元強調的『希望、自我掌控、有意義生活』相反。故 D 為錯誤者。","options":{"A":"找到自信並保持希望，符合復元。","B":"建立保持正向自我感，符合復元。","C":"建立疾病意識並找出生活意義，符合復元。","D":"正確(本題選錯誤者)。視疾病不可控制無法克服是無望態度，與復元相反。"},"sources":["精神科護理學·社區精神衛生與三段預防","復元(recovery)模式"]}},"114100-N5-22":{"quick":"社區心理衛生中心＝辦理心理健康促進活動及高危險群危機處理。","detail":{"background":"社區心理衛生中心的服務聚焦『心理/精神』層面:辦理心理健康促進活動(初級)、提供高危險群與精神病人的危機處理(次級)。其他錯誤:B 由『長照管理專員協助自我照顧』是長照體系，非心理衛生中心;C『返家前暫時安置地點』是康復之家/中途之家的功能;D『直接提供職業訓練就業輔導』是職業重建機構的功能。故 A 正確。","options":{"A":"正確。辦理心理健康促進活動及高危險群危機處理。","B":"長照管理專員協助自我照顧屬長照體系。","C":"返家前暫時安置是康復之家/中途之家功能。","D":"直接提供職業訓練就業輔導是職業重建機構功能。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}},"114170-N5-2":{"quick":"病人對護理師「你像我女朋友、由你照顧我很高興」＝正向情感轉移。","detail":{"background":"陳先生對護理師說「你很像我女朋友、有酒窩、由你照顧很高興」——是病人把對過去重要他人(女朋友)的『正向情感』投射到護理師身上，屬『正向情感轉移(positive transference)』。負向轉移是投射敵意、不信任;反轉移則是護理師投射到病人(方向相反)。本題是病人對護理師的正向投射，故為正向情感轉移。","options":{"A":"正確。病人把對女朋友的正向情感投射到護理師，是正向情感轉移。","B":"負向情感轉移是投射敵意、不信任。","C":"反轉移是護理師投射到病人，方向相反。","D":"負向反轉移同樣是護理師投射，且為負向。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","轉移與反轉移"]}},"114170-N5-7":{"quick":"同理心＝能察覺和體認他人的情緒狀態。","detail":{"background":"同理心(empathy)是『能察覺、體認他人的情緒狀態並設身處地理解』，再以適當方式回應。A 同理不限口頭語言，也含非語言(眼神、姿態);C 同理是理解對方觀點而非『強調自己觀點並給建議』;D 同理不等於『滿足對方所有需求』。故 B 最適當。同理的核心是『察覺與理解他人情緒』。","options":{"A":"同理不限口頭語言，亦含非語言表達。","B":"正確。能察覺和體認他人的情緒狀態，是同理心。","C":"同理是理解對方觀點，非強調自己觀點給建議。","D":"同理不等於滿足對方所有需求。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式"]}},"114170-N5-12":{"quick":"躁症病人護理最不適當＝安排精細活動磨練耐心與專注力。","detail":{"background":"承上題為躁症發作病人(注意力分散、活動量大、易分心)。護理最不適當的是『安排精細活動磨練耐心與專注力』——躁症病人注意力無法持久、易受挫，精細需專注的活動不適合，應安排『不需精細、可消耗體力的非競爭性大肌肉活動』。其他適當:洗澡時在旁協助避免分心、注意月經週期(評估與安全)、給容易攜帶的食物或少量多餐(因活動量大進食少、補充營養)。故 A 為最不適當。","options":{"A":"正確(本題選最不適當者)。躁症注意力差，精細活動不適合，應安排非競爭大肌肉活動。","B":"洗澡時在旁協助避免分心，適當。","C":"注意月經週期屬評估與安全，適當。","D":"給易攜帶食物或少量多餐補充營養，適當。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","躁症護理"]}},"115030-N5-7":{"quick":"言語表達、探討現在與過去情緒、增進人格重建/行為修正＝會心團體。","detail":{"background":"依團體治療型態的目標:『鼓勵成員以言語表達、探討個人現在與過去的情緒或心理問題，以增進人格重建或行為修正調適』，屬深度的『會心團體(encounter group)/心理治療性團體』，著重情感體驗、自我覺察與人格成長。健康指導團體著重知識傳遞;娛樂治療團體著重活動娛樂;生物回饋團體運用儀器訓練生理自我調節。本題目標是人格重建與情緒探討，故為會心團體。","options":{"A":"健康指導團體著重知識與衛教傳遞。","B":"正確。探討情緒、增進人格重建與行為修正，屬會心團體。","C":"娛樂治療團體著重活動與娛樂。","D":"生物回饋團體運用儀器訓練生理自我調節。"},"sources":["精神科護理學(新文京/華杏)·治療性人際關係與溝通","Yalom 團體心理治療","Peplau 人際關係模式","團體治療型態"]}},"115030-N5-24":{"quick":"出院回歸社區照護＝增設社區復健治療，提升社區適應能力。","detail":{"background":"協助精神病人出院回歸社區，最適切是『增設社區復健治療(社區復健中心、康復之家、日間留院等)，提升病人的社區適應能力』(三級復健)。A 心理衛生講座屬初級預防;B 廣設急性精神病房是擴充住院量能，與『回歸社區』方向相反;D 推廣自殺防治是另一面向，非協助個案回歸社區的核心。故 C 正確。","options":{"A":"心理衛生講座屬初級預防，非協助回歸社區。","B":"廣設急性病房與回歸社區方向相反。","C":"正確。增設社區復健治療提升社區適應能力，最適切。","D":"推廣自殺防治是另一面向，非回歸社區核心。"},"sources":["精神科護理學·社區精神衛生與三段預防"]}}},TO=["精神科護理概論治療性人際關係與溝通"],LEC={"精神科護理概論治療性人際關係與溝通":{"title":"精神科護理概論　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「精神科護理概論治療性人際關係與溝通」的歷屆考題共 172 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
