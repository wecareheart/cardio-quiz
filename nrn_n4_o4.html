作用於肌皮細胞產生排乳反射","D":"泌乳素夜間分泌較少,母親夜間應有充足睡眠以利奶水分泌"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"10產後早期生理與哺乳","topic_num":"正常分娩與產程護理","topic_code":"O4-10","q_num":22,"roc_year":"111","exam_code":"111110","src":"民國111年","options":{"A":"乳汁的移出與吸吮次數會影響泌乳量","B":"吸吮刺激腦下垂體前葉分泌催產素","C":"泌乳素可作用於肌皮細胞產生排乳反射","D":"泌乳素夜間分泌較少,母親夜間應有充足睡眠以利奶水分泌"},"img":""},{"id":"112030-N4-12","code":"112030","roc":"112","cat":"N4","catname":"產兒科護理學","num":12,"stem":"陰道分娩過程中,胎盤以暗紅色的粗糙面被牽引出陰道。有關此胎盤娩出的敘述,下列何者正確? 1希氏法(Schultze mechanism)娩出 2鄧氏法(Duncan mechanism)娩出 3較容易發生剝離不完全 4較少發生剝離不完全","opts":{"A":"13","B":"23","C":"14","D":"24"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"10產後早期生理與哺乳","topic_num":"正常分娩與產程護理","topic_code":"O4-10","q_num":12,"roc_year":"112","exam_code":"112030","src":"民國112年","options":{"A":"13","B":"23","C":"14","D":"24"},"img":""},{"id":"112030-N4-33","code":"112030","roc":"112","cat":"N4","catname":"產兒科護理學","num":33,"stem":"當產科急症造成瀰漫性血管內凝血(Disseminated Intravascular Coagulation, DIC)時,下列檢驗數值何者正確?1凝血酶原時間(PT)、部分凝血酶原時間(PTT)延長 2D-dimer 數值下降 3血小板數值下降 4纖維蛋白原(fibrinogen)數值上升","opts":{"A":"12","B":"13","C":"23","D":"34"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"10產後早期生理與哺乳","topic_num":"正常分娩與產程護理","topic_code":"O4-10","q_num":33,"roc_year":"112","exam_code":"112030","src":"民國112年","options":{"A":"12","B":"13","C":"23","D":"34"},"img":""},{"id":"112110-N4-35","code":"112110","roc":"112","cat":"N4","catname":"產兒科護理學","num":35,"stem":"承上題,該產婦在產後觀察期間,觸診其子宮收縮呈堅硬狀,子宮底位置與臍平並置中,膀胱無漲尿, 產婦陰道不斷流出鮮紅血性物,半小時內產後棉片就濕透一半,血壓值為100/65 mmHg。下列敘述何者正確?","opts":{"A":"為早期產後出血,因產道撕裂傷所致","B":"為早期產後出血,因子宮收縮乏力所致","C":"為晚期產後出血,係胎盤碎片殘留子宮","D":"為晚期產後出血,係異常高張力宮縮"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"10產後早期生理與哺乳","topic_num":"正常分娩與產程護理","topic_code":"O4-10","q_num":35,"roc_year":"112","exam_code":"112110","src":"民國112年","options":{"A":"為早期產後出血,因產道撕裂傷所致","B":"為早期產後出血,因子宮收縮乏力所致","C":"為晚期產後出血,係胎盤碎片殘留子宮","D":"為晚期產後出血,係異常高張力宮縮"},"img":""},{"id":"114100-N4-11","code":"114100","roc":"114","cat":"N4","catname":"產兒科護理學","num":11,"stem":"郭女士,懷孕39 週。主訴:「自今天凌晨1 點開始陸續出現陣痛,有時半小時,有時20 分鐘痛一次,不太規則。大概從半夜3 點開始,宮縮變得規則且明顯,大約5 分鐘一次」。早上6 點因子宮頸口開3 公分且3~4 分鐘宮縮一次而入院待產。下午3 點子宮頸口完全擴張(10 公分)。下午4 點10 分陰道娩出一健康女嬰。下午4 點20 分胎盤娩出。請問郭女士此次生產第一產程時間應記錄為何?","opts":{"A":"12 小時00 分鐘","B":"13 小時10 分鐘","C":"14 小時00 分鐘","D":"15 小時20 分鐘"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"10產後早期生理與哺乳","topic_num":"正常分娩與產程護理","topic_code":"O4-10","q_num":11,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"12 小時00 分鐘","B":"13 小時10 分鐘","C":"14 小時00 分鐘","D":"15 小時20 分鐘"},"img":""},{"id":"115030-N4-8","code":"115030","roc":"115","cat":"N4","catname":"產兒科護理學","num":8,"stem":"吳女士,懷孕40 週,規則陣痛入院待產,主述:「清晨1 點開始,陸續出現不規則陣痛,清晨3 點開始規律宮縮,大約5~6 分鐘就痛一次。」下午3 點子宮頸口完全擴張(10 公分)。下午4 點10 分自然娩出一健康男嬰。下午4 點20 分胎盤娩出。吳女士此次生產第二產程歷經多久時間?","opts":{"A":"0 小時10 分鐘","B":"1 小時10 分鐘","C":"1 小時20 分鐘","D":"12 小時00 分鐘"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"10產後早期生理與哺乳","topic_num":"正常分娩與產程護理","topic_code":"O4-10","q_num":8,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"0 小時10 分鐘","B":"1 小時10 分鐘","C":"1 小時20 分鐘","D":"12 小時00 分鐘"},"img":""}],E={"103030-N4-13":{"quick":"待產中突然劇烈疼痛、接著宮縮停止且測不到胎心音,最可能為子宮破裂。","detail":{"background":"子宮破裂(uterine rupture)是產科急症:好發於前次剖腹產(尤古典式直切)、子宮手術疤痕、催產素過度刺激、產程阻塞;典型「突發撕裂性劇痛→隨後宮縮停止(收縮消失)、胎心音消失或胎兒窘迫、腹部輪廓改變、母體休克(內出血)」。需緊急剖腹與輸血。低張性宮縮不致劇痛+胎心消失;早期破水為羊水流出;羊水栓塞以突發呼吸窘迫、低血壓、DIC為主。本題符合子宮破裂(C)。","options":{"A":"低張性子宮收縮不致劇痛與胎心消失。","B":"早期破水為羊水流出,非劇痛。","C":"正確。劇痛後宮縮停止+測不到胎心=子宮破裂。","D":"羊水栓塞以呼吸窘迫、休克、DIC為主。"},"sources":["新文京《產科護理學》子宮破裂","產科急症"]}},"104030-N4-11":{"quick":"頻尿不是生產的徵兆;生產徵兆為腹輕感、現血、破水(及規則陣痛)。","detail":{"background":"生產徵兆(產兆):(1)腹輕感(lightening)——胎頭入盆,子宮底下降,呼吸較順但頻尿、下肢水腫;(2)現血(落紅,bloody show)——子宮頸變薄擴張使黏液栓帶血排出;(3)破水(胎膜破裂,羊水流出);(4)規則且漸強的真陣痛(子宮頸進行性變薄擴張)。「頻尿」是腹輕感後膀胱受壓的「伴隨不適」,非生產徵兆本身。本題「不是生產徵兆」者為頻尿(A)。","options":{"A":"正確。頻尿非生產徵兆(為腹輕感伴隨不適)。","B":"腹輕感為生產徵兆。","C":"現血(落紅)為生產徵兆。","D":"破水為生產徵兆。"},"sources":["新文京《產科護理學》產兆","分娩前驅徵象"]}},"104030-N4-12":{"quick":"38週出現偶發宮縮、腰酸、紅色黏性分泌(現血),表示子宮頸開始變軟,是生產的前兆。","detail":{"background":"足月(38週)出現「偶發宮縮+腰酸+陰道排出紅色黏性分泌(現血/落紅)」,反映子宮頸開始軟化、變薄,黏液栓帶血排出,是「生產前驅徵象(前兆)」,但尚未進入規則產程。子宮頸是「變軟、變短(消失)」而非變長;此屬正常前兆,非胎盤剝離的高危症狀。本題正確為「子宮頸開始變軟,是生產的前兆」(A)。","options":{"A":"正確。子宮頸開始變軟,屬生產前兆。","B":"錯。子宮頸是變短(消失),非變長。","C":"尚未進入規則產程,非子宮下段收縮變強。","D":"現血為正常前兆,非胎盤剝離高危症狀。"},"sources":["新文京《產科護理學》產兆","現血"]}},"104100-N4-5":{"quick":"32週、一天3~4次、無痛、無出血的子宮收縮多為假陣痛;若頻率沒再增加則無大礙。","detail":{"background":"假陣痛(Braxton Hicks/前驅宮縮):不規則、無痛(或僅緊繃)、頻率不漸增、休息可緩解、不造成子宮頸進行性變化,屬正常。本例32週、一天3–4次、無腹痛、無出血——最可能為假陣痛,衛教觀察:若「收縮頻率沒有再增加」則無關係;但若轉為「規則(1小時≥4次或10分鐘≥1次)、漸強、合併下腹腰痠或出血破水」則需就醫(警覺早產)。本題最適當回答為「應是假陣痛,若頻率未增加則沒關係」(C)。","options":{"A":"過度。無痛無出血、未達規則,尚不需立即就醫。","B":"敘述不當;不以「無腹痛即安全」為依據。","C":"正確。多為假陣痛,若頻率未增加則無關係。","D":"過度。尚無分娩徵象,不需立即入院分娩。"},"sources":["新文京《產科護理學》假陣痛","早產徵兆鑑別"]}},"105030-N4-16":{"quick":"真陣痛的特徵是「規則性宮縮且頻率愈來愈密集」(並使子宮頸進行性變薄擴張)。","detail":{"background":"真陣痛 vs 假陣痛:真陣痛——規則、頻率漸密、強度漸強、持續時間漸長、走動「不會」緩解、疼痛由背部至腹部、且「使子宮頸進行性變薄與擴張」;假陣痛——不規則、強度不變、走動或休息可緩解、疼痛侷限腹部、不造成子宮頸變化。本題真陣痛特徵為「規則性宮縮且頻率愈來愈密集」(D)。其餘(無子宮頸變薄、走路時消失、胎動時就宮縮)屬假陣痛或非真陣痛特徵。","options":{"A":"真陣痛使子宮頸變薄,「沒有變薄」非真陣痛。","B":"走路緩解為假陣痛。","C":"胎動時宮縮非真陣痛特徵。","D":"正確。規則且頻率漸密為真陣痛。"},"sources":["新文京《產科護理學》真假陣痛","產程評估"]}},"105090-N4-12":{"quick":"潛伏期(頸口3cm、未破水)待產婦不需限制臥床——沒有限制,可採舒適臥位或下床活動。","detail":{"background":"低危險、胎膜完整、胎頭已入盆(高度-1)的潛伏期待產婦,「不需限制臥床」:鼓勵採自己覺得舒適的姿勢、可下床走動、變換姿勢,有助促進有效宮縮、胎頭下降與舒適,亦不增加風險。僅「破水且胎頭未固定(浮動)」時才需臥床防臍帶脫垂。並非一律左側臥或僅如廁才下床。本題最合適回答為「沒有限制,可採舒適臥位或下床活動」(D)。","options":{"A":"胎膜完整、胎頭已入盆,不需為防臍帶脫出而臥床。","B":"不需一直左側臥(舒適即可)。","C":"不需僅如廁才下床。","D":"正確。沒有限制,可採舒適臥位或下床活動。"},"sources":["WHO 正常產照護","新文京《產科護理學》待產活動"]}},"106030-N4-12":{"quick":"第一產程下腹及下背痛,源於子宮體下段伸展、子宮頸擴張與宮縮時肌肉細胞缺氧。","detail":{"background":"生產疼痛來源依產程不同:第一產程疼痛主要來自「子宮收縮使肌肉細胞暫時缺氧、子宮體下段被牽張、子宮頸變薄與擴張」,經T10–L1交感神經傳入脊髓,常表現為下腹與下背(腰薦)疼痛;第二產程則加上陰道與會陰肌肉伸展(經薦神經S2–4)。本例宮縮時下腹及下背痛,屬第一產程疼痛來源——「子宮體下段伸展、子宮頸擴張與宮縮肌肉缺氧」(C)。","options":{"A":"子宮韌帶/陰道會陰伸展為第二產程疼痛來源。","B":"非單純臥位壓迫神經所致。","C":"正確。子宮體下段伸展、子宮頸擴張與宮縮肌肉缺氧。","D":"第一產程疼痛經T10–L1傳入,非尾椎神經。"},"sources":["新文京《產科護理學》生產疼痛來源","第一產程"]}},"106030-N4-17":{"quick":"胎頭高度−3表示先露部位在坐骨棘連線「上方3公分」。","detail":{"background":"胎頭下降高度(station)以坐骨棘(ischial spine)連線為0:負值在坐骨棘「上」、正值在坐骨棘「下」,以公分計。−3表示先露部位在坐骨棘連線「上方3公分」(尚高、未入盆固定)。本題−3意義為「坐骨棘連線上3公分」(B)。胎頭尚未固定(固定約為0)、也尚未接近生產(陰道口約+4–+5)。","options":{"A":"−3已可評估高度,非「尚未固定」的籠統描述。","B":"正確。−3=坐骨棘連線上方3公分。","C":"錯。+3才是坐骨棘連線下3公分。","D":"−3尚高,非逐漸接近生產。"},"sources":["新文京《產科護理學》胎頭下降高度","station"]}},"106110-N4-14":{"quick":"潛伏期(頸口2~3cm、輕中度宮縮、神情愉快)待產婦,適宜指導為經常排空膀胱。","detail":{"background":"潛伏期待產護理:此例宮縮每5–7分一次、30–40秒、輕中度、頸口2–3cm、神情愉快,屬潛伏期。護理指導:鼓勵「定時排空膀胱」(脹尿會阻礙胎頭下降與宮縮、增不適);可下床走動與變換姿勢促進產程;可進食易消化清淡飲食補充能量(WHO友善生產不主張禁食);不需絕對臥床或人工破水。本題適宜為「教導經常排空膀胱」(A)。","options":{"A":"正確。定時排空膀胱以利胎頭下降與宮縮。","B":"潛伏期不需禁食,可進清淡飲食。","C":"不需絕對臥床,可下床走動。","D":"潛伏期不需常規人工破水。"},"sources":["新文京《產科護理學》潛伏期護理","待產照護"]}},"107030-N4-12":{"quick":"破水、規則陣痛、頸口5cm、胎頭已固定者,「臥床時將床尾抬高」為不適當照護。","detail":{"background":"破水後、胎頭已固定(入盆)的待產婦照護:胎頭已固定,臍帶脫垂風險低,「可下床活動、無活動禁忌」;「將床尾抬高(頭低腳高)」並無必要(頭低腳高用於臍帶脫垂或低血壓減壓,此例不需且可能不適);可攝取易消化食物補充能量;解尿後會陰沖洗保持清潔。本題「不適當」者為「臥床時將床尾抬高」(B)。","options":{"A":"適當。可攝取易消化食物。","B":"不適當(本題答案)。胎頭已固定不需將床尾抬高。","C":"適當。解尿後會陰沖洗保持清潔。","D":"適當。胎頭已固定可下床活動。"},"sources":["新文京《產科護理學》破水後照護","待產護理"]}},"108110-N4-10":{"quick":"第一產程破水時,最優先的措施是「評估胎心音1分鐘」(警覺臍帶脫垂/胎兒窘迫)。","detail":{"background":"破水(胎膜破裂)後的優先處置:破水瞬間臍帶可能隨羊水滑出(臍帶脫垂),造成臍帶受壓、胎兒急性缺氧,故「最優先立即聽診/評估胎心音(完整1分鐘)」評估有無臍帶受壓與胎兒窘迫,並觀察羊水顏色量氣味、記錄破水時間。陰道內診、腹部觸診、石蕊試紙皆非「最優先」。本題最優先為「評估胎心音1分鐘」(B)。","options":{"A":"內診非最優先(先評估胎心)。","B":"正確。破水後最優先評估胎心音(防臍帶脫垂)。","C":"腹部觸診非最優先。","D":"石蕊試紙(確認破水)非最優先,先評估胎兒。"},"sources":["新文京《產科護理學》破水處置","臍帶脫垂"]}},"108110-N4-34":{"quick":"「黏液塞排出(現血)」不是用來判斷孕婦是否破水的方法。","detail":{"background":"判斷破水(胎膜破裂)的方法:(1)陰道窺鏡檢查——看羊水自子宮頸口流出、後穹窿積液;(2)硝基/石蕊試紙——羊水偏鹼使試紙變藍;(3)羊齒(Fern)試驗——羊水乾燥後顯微鏡見羊齒狀結晶;(4)超音波評估羊水量。「黏液塞排出(現血/落紅)」是子宮頸變化的「產兆」,與「破水」無關。本題「不是判斷破水方法」者為「黏液塞排出」(A)。","options":{"A":"正確。黏液塞排出屬產兆,非判斷破水方法。","B":"陰道窺鏡可看羊水確認破水。","C":"石蕊試紙(變藍)可判斷破水。","D":"羊齒試驗(結晶)可判斷破水。"},"sources":["新文京《產科護理學》破水確認","產程評估"]}},"109110-N4-12":{"quick":"待產護理中「活動期晚期教導待產婦開始用力」為錯誤——子宮頸全開(第二產程)才用力。","detail":{"background":"待產護理原則:潛伏/活動期鼓勵下床走動(未破水時)促進有效宮縮、變換姿勢促舒適、定時排空膀胱利胎頭下降;但「用力」應待「子宮頸完全擴張(第二產程)、出現不自主用力感」時才教導,過早(子宮頸未全開)用力會造成子宮頸水腫、撕裂、產婦疲憊。本題問「錯誤」者為「活動期晚期教導開始用力」(C)。","options":{"A":"正確。未破水鼓勵下床走動促進宮縮。","B":"正確。常變換姿勢促舒適放鬆。","C":"錯誤(本題答案)。應子宮頸全開(第二產程)才用力,非活動期。","D":"正確。定時排空膀胱促胎頭下降。"},"sources":["新文京《產科護理學》待產護理","第二產程用力時機"]}},"109110-N4-13":{"quick":"潛伏期(頸口3cm、station 0、未破水、舒適)待產婦可下床活動——只要覺得舒服儘可下床。","detail":{"background":"低危險、胎膜完整的潛伏/活動期待產婦,鼓勵在覺得舒適時下床走動、變換姿勢,可促進有效宮縮、胎頭下降與舒適,不增加風險;護理師應賦能、給予明確建議,而非推託「去問醫師」、或無據要求臥床。本例頸口變薄80%、3cm、station 0、未破水,可下床。本題最適切回應為「只要妳覺得舒服,儘可下床活動」(B)。","options":{"A":"推託「去問醫師」不當,護理師應提供指導。","B":"正確。覺得舒服可下床活動。","C":"無據要求臥床限制活動,不當。","D":"以方便監測為由要求臥床,不符實證。"},"sources":["WHO 正常產照護","新文京《產科護理學》待產活動"]}},"110030-N4-15":{"quick":"已進入第二產程的評估指標為:子宮頸完全擴張(4)+會陰可見胎頭膨出、有不自主用力感(5)。","detail":{"background":"第二產程的開始定義為「子宮頸完全擴張(10cm)到胎兒完全娩出」。判斷已進入第二產程:子宮頸「完全擴張(4)」、產婦出現「不自主向下用力的衝動、會陰膨出可見胎頭(5)」、肛門外突、現血增加。破水(1)、規則宮縮(2)、現血(3)可發生於第一產程,非第二產程的判定指標。本題正確組合為(4)(5)即45(D)。","options":{"A":"破水+規則宮縮可在第一產程,非第二產程判定。","B":"規則宮縮+現血為第一產程。","C":"現血+完全擴張組合不完整。","D":"正確。子宮頸完全擴張(4)+會陰膨出胎頭/不自主用力(5)。"},"sources":["新文京《產科護理學》第二產程","產程分期"]}},"111110-N4-18":{"quick":"宮縮40mmHg、不規則、子宮頸無變化、痛侷限腹部、走動可減輕,屬「假陣痛」。","detail":{"background":"假陣痛(false labor):子宮收縮「不規則、強度不變、頻率不漸增、疼痛侷限下腹、走動或休息可緩解、且子宮頸無進行性變化(不變薄不擴張)」。本例「壓力40mmHg、不規則、子宮頸沒有變化、痛侷限腹部、走動可減輕」完全符合假陣痛(B)。真陣痛則規則漸強、走動不緩解、子宮頸進行性變化。","options":{"A":"真陣痛走動不緩解、子宮頸會變化,本例不符。","B":"正確。不規則、頸無變化、走動緩解=假陣痛。","C":"特徵明確,非無法分辨。","D":"特徵明確,可分辨為假陣痛。"},"sources":["新文京《產科護理學》假陣痛","真假陣痛鑑別"]}},"112110-N4-16":{"quick":"經產婦的子宮頸軟化、變薄與擴張「同時進行」。","detail":{"background":"初產婦 vs 經產婦子宮頸變化:初產婦——子宮頸「先變薄(消失)、再擴張」;經產婦——子宮頸較鬆,「軟化、變薄與擴張同時進行」,故產程通常較快。腹輕感(lightening):初產婦多於分娩前約2週出現(胎頭入盆),經產婦常於分娩啟動時才出現。本題正確為「經產婦子宮頸軟化變薄及擴張同時進行」(B)。","options":{"A":"錯。初產婦是先變薄再擴張,非先擴張。","B":"正確。經產婦軟化變薄與擴張同時進行。","C":"錯。腹輕感分娩前約2週出現者是「初產婦」。","D":"錯。腹輕感分娩啟動才出現者是「經產婦」。"},"sources":["新文京《產科護理學》初產婦vs經產婦","產程"]}},"112110-N4-17":{"quick":"台灣常用體外電子胎兒監測中「兩個傳導器都抹凝膠」為不適當——只有胎心音(超音波)傳導器需抹凝膠。","detail":{"background":"體外(間接)電子胎兒監測(EFM):有兩個傳導器——「胎心音傳導器(超音波都卜勒)」放於胎心最清楚處、「須抹耦合凝膠」以利超音波傳導;「宮縮壓力傳導器(tocodynamometer)」放於子宮底收縮最強處、「不需抹凝膠」(以壓力感應)。兩者以彈性帶固定。先以觸診找胎心最清楚處再放傳導器。本題「不適當」者為「兩個傳導器都抹凝膠」(D,宮縮傳導器不需凝膠)。","options":{"A":"適當。先觸診找胎心最清楚處。","B":"適當。腹部放兩條固定帶。","C":"適當。宮底放宮縮壓力傳導器。","D":"不適當(本題答案)。僅胎心音傳導器需抹凝膠,宮縮傳導器不需。"},"sources":["新文京《產科護理學》電子胎兒監測","EFM"]}},"112180-N4-7":{"quick":"真陣痛的特徵是「宮縮間隔時間逐漸變短、並有規律感」。","detail":{"background":"真陣痛(true labor)特徵:宮縮「規則、間隔漸短、強度漸增、持續時間漸長」、走動不緩解、疼痛由背至腹、並造成子宮頸進行性變薄與擴張。假陣痛則不規則、強度不變、走動緩解、痛侷限腹部、子宮頸無變化;且真陣痛不一定伴隨破水。本題真陣痛特徵為「宮縮間隔逐漸變短並有規律感」(B)。","options":{"A":"走路緩解為假陣痛。","B":"正確。宮縮間隔漸短、有規律感為真陣痛。","C":"強度不變為假陣痛。","D":"真陣痛不一定伴隨破水。"},"sources":["新文京《產科護理學》真假陣痛","產程評估"]}},"113100-N4-9":{"quick":"腹部觸診宮底軟而不圓、恥骨聯合處硬圓、胎心在臍下、內診摸到圓滑硬部位,判斷為頭產式。","detail":{"background":"胎產式(presentation)判斷(Leopold四段觸診+胎心位置):宮底觸到「軟、不規則、不圓」者為「臀」、觸到「硬、圓、可浮動」者為「頭」;恥骨聯合上方觸到「硬、圓」者為先露的「頭」;胎心音在「臍下」聽得清楚提示頭產式(臍上則臀產式);內診摸到「圓滑且硬」的胎兒部位為胎頭。本例宮底軟不圓(臀在上)、恥骨聯合硬圓(頭在下)、胎心臍下、內診摸到圓硬→「頭產式(頭下臀上)」(A)。","options":{"A":"正確。宮底為臀、先露為頭、胎心臍下=頭產式。","B":"臀產式胎心在臍上、先露軟不規則。","C":"面產式為胎頭仰伸,非此特徵。","D":"肩產式為橫位,非此縱產式表現。"},"sources":["新文京《產科護理學》胎產式","Leopold觸診"]}},"114170-N4-4":{"quick":"36週初產婦待產就醫指導:出現約「5分鐘一次的規則陣痛」時前往醫院。","detail":{"background":"何時前往醫院待產的衛教(初產婦、住家距醫院約20分鐘):出現「規則陣痛(約每5分鐘一次、持續且漸強)」、「破水」、「大量出血」、「胎動明顯減少」時應就醫。單純「現血(落紅)」或「腹輕感」是前驅徵象、不需立即就醫;不以「預產期前後24小時」為依據(產程啟動因人而異)。本題最適當為「出現約5分鐘一次的規則陣痛時」(D)。","options":{"A":"單純陣痛合併現血未必達規則(5分鐘),非最佳指標。","B":"腹輕感為前驅徵象,不需立即就醫。","C":"不以預產期前後24小時為依據。","D":"正確。約5分鐘一次的規則陣痛時前往。"},"sources":["新文京《產科護理學》待產就醫時機","產前衛教"]}},"103100-N4-3":{"quick":"入院待產主動提問、表情愉快、能與人互動,屬產程的「潛伏期」。","detail":{"background":"第一產程依行為與進展分期:潛伏期(子宮頸0–3cm,宮縮較弱間隔長)——產婦「精力充沛、興奮、健談、能主動提問、表情愉快、可配合互動」;活動期(3–7cm)——專注於宮縮、話變少、較嚴肅;過渡期(8–10cm)——宮縮強而密、焦慮不安、易怒、自我控制感下降、可能噁心發抖。本例「主動提問、表情愉快」為潛伏期(A)。","options":{"A":"正確。主動提問、表情愉快為潛伏期行為。","B":"活動期較專注、話變少。","C":"過渡期焦慮不安、自我控制感下降。","D":"第二產程為用力娩出階段。"},"sources":["新文京《產科護理學》產程分期/行為","潛伏期"]}},"106111-N4-16":{"quick":"膀胱截石臥姿對產程進展幫助有限、產婦易呼吸困難,但方便醫師接生。","detail":{"background":"生產姿勢比較:直立(坐、蹲、跪、站)姿勢藉地心引力助胎頭下降、增骨盆出口、產程較順、較少壓迫下腔靜脈;「膀胱截石臥位(仰臥兩腿張開上腳架)」雖「方便醫師接生與操作」,但對產程進展幫助有限、增加下腔靜脈壓迫(易仰臥位低血壓、胎心異常)、產婦較費力且易呼吸困難。本題「幫助有限、易呼吸困難但方便接生」者為膀胱截石臥姿(D)。","options":{"A":"坐姿藉地心引力助下降。","B":"蹲姿增骨盆出口、助下降。","C":"半坐臥較直立、利下降。","D":"正確。膀胱截石臥姿方便接生但幫助有限、易呼吸困難。"},"sources":["新文京《產科護理學》生產姿勢","第二產程"]}},"107110-N4-37":{"quick":"過渡期產婦焦慮、陪產者想離開時,護理師最適當回應是邀其一起協助(支持陪產者並維持陪伴)。","detail":{"background":"過渡期(8–10cm)宮縮強密、產婦焦慮不安最需支持,陪產者(配偶)也常感無助、想退出。護理師應「同理陪產者壓力、提供具體協助方法、邀其一起參與(如握手、提醒呼吸、擦汗)」,維持陪伴又不施壓指責。回應「這時候最需要你,你怎麼可以離開」(指責施壓)、「你會干擾生產,去外面」(排除)、「你需要休息,寶寶出生再告訴你」(讓陪產者離開)皆不適當。本題最適當為「我知道你壓力大,我們一起來幫忙好嗎」(C)。","options":{"A":"指責施壓,不當。","B":"排除陪產者,不當。","C":"正確。同理壓力並邀其一起協助。","D":"讓陪產者離開,未維持陪伴支持。"},"sources":["新文京《產科護理學》陪產支持","過渡期"]}},"108110-N4-14":{"quick":"照顧過渡期待產婦,最適當的護理措施是「告知產程進展」。","detail":{"background":"過渡期(子宮頸8–10cm)是第一產程最困難階段:宮縮強而密、疼痛劇烈、焦慮不安、易怒、噁心發抖、自我控制感下降。護理:「給予產程進展訊息(告知接近完成、給予鼓勵與信心)」、簡短清楚的指導(避免冗長衛教)、協助呼吸放鬆、減少不必要刺激、陪伴支持。並非減少探視(需陪伴)、延長衛教(此時無法吸收)、或增加環境刺激。本題最適當為「告知產程進展」(C)。","options":{"A":"過渡期需陪伴,非減少探視。","B":"此時無法吸收冗長衛教。","C":"正確。告知產程進展、給予鼓勵與信心。","D":"應減少環境刺激,非增加。"},"sources":["新文京《產科護理學》過渡期護理","產程"]}},"112110-N4-12":{"quick":"陪產配偶疲憊求助時,「請他持續陪伴以避免產婦失控」為最不恰當回應。","detail":{"background":"陪產者支持:配偶陪產一天、疲憊不堪求助時,護理應「同理其辛勞與可能的驚慌、提供明確產程訊息、安排其適度休息或由其他家人輪替照顧產婦」,而非「以避免產婦失控為由要求他必須持續陪伴(施加壓力與責任、忽略其需求)」。本題「最不恰當」者為「請準爸爸持續陪伴以避免產婦失控」(C)。","options":{"A":"恰當。接受準爸爸可能驚慌失措的行為。","B":"恰當。提供明確產程進展訊息。","C":"最不恰當(本題答案)。要求其持續陪伴以避免產婦失控,施壓忽略其需求。","D":"恰當。讓其暫休、由其他家人照顧產婦。"},"sources":["新文京《產科護理學》陪產支持","家庭照護"]}},"112180-N4-10":{"quick":"潛伏期產程延長但母胎無異常者,不適當的處置為「立即採行剖腹產」。","detail":{"background":"潛伏期延長(初產婦>20小時、經產婦>14小時)若母胎狀況穩定無異常:應「評估分析可能原因(如假性產程、胎位、子宮頸狀況、產婦疲憊脫水焦慮)」、提供「足夠水分與營養補充能量」、鼓勵「經常更換姿勢、下床活動以利胎兒轉位下降」、給予休息與支持,必要時依醫囑安胎或催生;「不應立即剖腹產」(潛伏期延長非剖腹適應症)。本題「較不適當」者為「立即採行剖腹產」(A)。","options":{"A":"不適當(本題答案)。母胎無異常不應立即剖腹產。","B":"適當。提供足夠水分與食物。","C":"適當。評估分析可能原因。","D":"適當。更換姿勢利胎兒轉位下降。"},"sources":["新文京《產科護理學》潛伏期延長","產程遲滯"]}},"113100-N4-11":{"quick":"待產婦說「想解大便、怕生在馬桶」時,最適宜回應是說明便意感表示胎頭下降、並評估內診。","detail":{"background":"第二產程接近時,胎頭下降壓迫直腸產生「便意感與不自主用力衝動」,是產程進展(胎頭下降)的徵象。護理師應「以衛教方式說明便意感代表胎頭下降、產程有進展,並進行內診評估產程」,給予安心;不宜直接「立刻通知醫師處理」(未評估)、否定其擔憂(「都不是真的」)、或以「已灌腸不會有大便」搪塞。本題最適宜為「便意感顯示胎頭下降、我來幫妳內診評估」(B)。","options":{"A":"未評估即說「要生了」並通知醫師,過早。","B":"正確。說明便意感=胎頭下降,並內診評估。","C":"否定擔憂,非治療性。","D":"以灌腸搪塞,未評估產程。"},"sources":["新文京《產科護理學》第二產程徵象","產程護理"]}},"115030-N4-11":{"quick":"待產婦腿抖、現血變多、宮縮變密更痛,顯示產程進入「活動期」。","detail":{"background":"第一產程行為與生理變化:潛伏期健談興奮;「活動期(子宮頸約4–7cm)」宮縮變強變密、疼痛加劇、現血增多、可能出現「腿抖、發抖」、產婦轉趨專注嚴肅;過渡期(8–10cm)最劇烈、焦慮失控、噁心。本例「腿抖、現血變多、宮縮變密更痛」符合「活動期」(C)。(臨產期為產兆前驅、潛伏期較輕、停滯期為產程無進展。)","options":{"A":"臨產期為產兆前驅,症狀較輕。","B":"潛伏期宮縮較弱、產婦健談。","C":"正確。腿抖、現血增、宮縮變密=活動期。","D":"停滯期指產程無進展,非此描述。"},"sources":["新文京《產科護理學》產程分期","活動期"]}},"101110-N4-55":{"quick":"胎頭進行外迴轉(復位)時,胎兒「肩部」同時進行內迴轉。","detail":{"background":"分娩機轉(cardinal movements)順序:銜接→下降→屈曲→內迴轉→伸展(胎頭娩出)→「外迴轉(復位)」→胎肩娩出→排出。胎頭娩出後做「外迴轉」回到與肩部一致的方位,此時「胎肩在骨盆內進行內迴轉」(由橫徑轉至前後徑以便娩出),故外迴轉與胎肩內迴轉同時發生。本題正確為「肩部進行內迴轉」(A)。","options":{"A":"正確。胎頭外迴轉時,胎肩進行內迴轉。","B":"屈曲為胎頭娩出前的機轉。","C":"下降為早期機轉。","D":"伸展為胎頭娩出的機轉。"},"sources":["新文京《產科護理學》分娩機轉","胎肩娩出"]}},"101110-N4-56":{"quick":"ROA(右枕前位)胎兒,胎心音在母親腹部「右下象限」聽得最清楚。","detail":{"background":"胎心音聽診位置依胎背所在:胎心音經胎背傳導最清楚,故聽診於「胎背側」。頭產式胎心在母腹「下象限」、枕前位胎背在前側方;ROA(右枕前位)胎背在母體右前,故胎心在「右下象限」最清楚。LOA則在左下象限;臀產式胎心在臍上。本題ROA為右下象限(D)。","options":{"A":"左上象限為左側臀產式可能。","B":"右上象限為右側臀產式可能。","C":"左下象限為LOA。","D":"正確。ROA胎心在右下象限最清楚。"},"sources":["新文京《產科護理學》胎心音聽診","胎位"]}},"102030-N4-12":{"quick":"胎頭徑線由小到大為:枕下前囟徑 < 枕額徑 < 枕頦徑。","detail":{"background":"胎頭主要徑線(矢狀方向)由短到長:枕下前囟徑(SOB,約9.5cm,胎頭「完全屈曲」時通過,最有利分娩)<枕額徑(OF,約11.5cm,部分屈曲/前頂產式)<枕頦徑(OM,約13.5cm,額產式,最長最難產)。面產式以頦下前囟徑(SMB,約9.5cm)。胎頭屈曲愈完全、通過徑線愈短愈順產。本題排列為「枕下前囟徑<枕額徑<枕頦徑」(C)。","options":{"A":"順序顛倒。","B":"順序錯誤。","C":"正確。枕下前囟徑<枕額徑<枕頦徑。","D":"順序錯誤。"},"sources":["新文京《產科護理學》胎頭徑線","分娩機轉"]}},"102030-N4-15":{"quick":"胎兒通過產道下降時,「胎盤的壓力」不會影響其下降。","detail":{"background":"促進胎兒下降的力量:(1)子宮收縮直接施於胎兒(胎軸壓力);(2)第二產程腹部肌肉收縮(產婦用力,屏氣使腹壓增加);(3)羊水的靜水壓(經胎兒傳導);(4)胎兒身體伸直。「胎盤的壓力」並非推動胎兒下降的力量(胎盤附著於子宮壁,於第三產程才娩出)。本題「不會影響下降」者為「胎盤的壓力」(D)。","options":{"A":"子宮收縮對胎兒的壓力會促進下降。","B":"腹部肌肉收縮力(用力)促進下降。","C":"羊水壓力傳導促進下降。","D":"正確。胎盤壓力不影響胎兒下降。"},"sources":["新文京《產科護理學》胎兒下降","產力"]}},"102110-N4-10":{"quick":"LOA(左枕前位)內迴轉至枕前位時,胎頭自LOA旋轉45度。","detail":{"background":"內迴轉(internal rotation):胎頭下降至骨盆底時,枕部由斜徑轉向前方(恥骨聯合下),使矢狀縫合對齊骨盆前後徑以利娩出。LOA(枕部在左前、約位於骨盆左斜徑)內迴轉「45度」至枕前位(OA);ROA同樣旋轉45度至OA;枕後位(OP)則需旋轉135度至OA(費時長,故產程延長)。本題LOA內轉旋轉「45度」(B)。","options":{"A":"15度過小。","B":"正確。LOA內迴轉旋轉45度至枕前位。","C":"90度為橫位轉前的角度。","D":"135度為枕後位轉至枕前的角度。"},"sources":["新文京《產科護理學》內迴轉","分娩機轉"]}},"102110-N4-38":{"quick":"分娩前頭產式聽胎心,應聽取「恥骨聯合至肚臍中間的胎背處」。","detail":{"background":"胎心音聽診部位隨妊娠週數與胎位、胎背所在而變:早期(約12週)胎心在恥骨聯合上方;隨子宮上升而上移;頭產式胎背在下,接近分娩時胎頭下降,胎心音聽診點下移至「恥骨聯合與肚臍之間的胎背側」最清楚。本題分娩前頭產式聽胎心於「恥骨聯合至肚臍中間胎背處」(D)。","options":{"A":"12週胎心約在恥骨聯合上方,非肚臍附近。","B":"20週位置敘述不符。","C":"頭產式胎心在下方,非宮底。","D":"正確。分娩前頭產式聽恥骨聯合至肚臍中間胎背處。"},"sources":["新文京《產科護理學》胎心音聽診","胎位"]}},"103100-N4-8":{"quick":"四個胎位圖中,左枕前位(LOA)為選項D所示的圖形。","detail":{"background":"胎位(position)以胎兒先露部位的指示點(枕部O)相對於母體骨盆四象限命名。LOA=左枕前位:胎兒枕部朝向母體「左前方」,胎背在母體左前、胎心在左下象限,是最常見且有利的胎位。本題四個胎位圖中,呈現枕部朝母體左前方者為選項D(圖D)。(已開圖判讀:依四圖胎兒枕部與母體骨盆方位對應,LOA對應圖D。)","options":{"A":"圖A非左枕前位之方位。","B":"圖B非LOA。","C":"圖C非LOA。","D":"正確。圖D為左枕前位(LOA)。"},"sources":["新文京《產科護理學》胎位圖","LOA(已開圖判讀)"]}},"104100-N4-13":{"quick":"內診於骨盆前側摸到胎兒前囟門(提示枕後位),可採手膝(膝胸/趴跪)姿勢協助胎頭迴轉。","detail":{"background":"內診摸到「前囟門(大囟門,菱形)位於骨盆前方」提示胎兒為「枕後位(OP)」(枕部在後、前囟在前);枕後位常致產程延長、嚴重腰背痛。處置:採「手膝姿勢(hands-and-knees)、膝胸臥位、側臥或骨盆搖擺」促使胎頭由枕後迴轉成枕前,減輕腰痛、利下降;非「不需處理」(非枕前位)、爬樓梯或逕自剖腹產。本題最恰當為「手膝姿勢協助胎頭迴轉」(C)。","options":{"A":"摸到前囟在前為枕後位,非枕前位「不需處理」。","B":"爬樓梯非協助枕後位迴轉的措施。","C":"正確。手膝姿勢協助胎頭由枕後迴轉成枕前。","D":"枕後位非立即剖腹產適應症。"},"sources":["新文京《產科護理學》枕後位","胎位矯正"]}},"104100-N4-14":{"quick":"胎頭徑線中最短者為枕下前囟徑(SOB,約9.5公分)。","detail":{"background":"胎頭徑線:枕下前囟徑(SOB,約9.5cm,胎頭完全屈曲時通過,最短、最有利分娩)< 雙頂徑(BPD,約9.25–9.5cm,為橫徑)< 枕額徑(OF,約11.5cm)< 枕頦徑(OM,約13.5cm,最長)。題目問「最短」的矢狀徑線,為枕下前囟徑(SOB)(D)。(註:BPD為橫徑、約9.25cm亦短,但本題以SOB為最短的前後徑答案。)","options":{"A":"雙頂徑為橫徑,本題答案取SOB。","B":"枕頦徑最長。","C":"枕額徑次長。","D":"正確。枕下前囟徑(SOB)最短。"},"sources":["新文京《產科護理學》胎頭徑線","分娩機轉"]}},"106030-N4-14":{"quick":"面產式胎頭完全仰伸進入骨盆時,呈現的徑線為頦下前囟徑(SMB)。","detail":{"background":"胎勢(attitude)與徑線:胎頭「完全屈曲」→枕下前囟徑(SOB,順產);「部分屈曲」(軍人式)→枕額徑(OF);「部分仰伸」(額產式)→枕頦徑(OM,最長最難);「完全仰伸」(面產式,face presentation)→「頦下前囟徑(SMB,約9.5cm)」。本題面產式完全仰伸為頦下前囟徑(SMB)(B)。","options":{"A":"枕額徑為部分屈曲。","B":"正確。面產式完全仰伸為頦下前囟徑(SMB)。","C":"枕頦徑為額產式(部分仰伸)。","D":"枕下前囟徑為完全屈曲。"},"sources":["新文京《產科護理學》胎勢/徑線","面產式"]}},"106110-N4-17":{"quick":"枕後位(OP)會使第一產程時間較長(2)、子宮頸擴張較慢(4)。","detail":{"background":"枕後位(occiput posterior, OP):胎兒枕部朝母體後方,需「內迴轉135度」轉成枕前才能娩出,費時長;且胎頭俯屈較差、先露部與骨盆密合不佳→「子宮收縮較無效、子宮頸擴張較慢、先露部下降較慢、第一產程時間較長」,並造成嚴重腰背痛。本題正確為「第一產程時間較長(2)+子宮頸擴張較慢(4)」即24(D)。","options":{"A":"含「先露部下降較快」(3)錯誤(枕後位下降較慢)。","B":"含(3)錯誤。","C":"含(3)錯誤。","D":"正確。第一產程較長(2)+子宮頸擴張較慢(4)。"},"sources":["新文京《產科護理學》枕後位","產程延長"]}},"107110-N4-16":{"quick":"自然產的胎頭娩出後,將進入「外迴轉(external rotation)」。","detail":{"background":"分娩機轉順序:銜接→下降→屈曲→內迴轉→伸展(胎頭娩出)→「外迴轉(復位,external rotation)」→胎肩娩出→排出。胎頭娩出後,因胎肩在骨盆內內迴轉,使已娩出的胎頭外迴轉(復位)回到與胎肩一致的方位,以利胎肩娩出。本題胎頭娩出後進入「外迴轉」(B)。","options":{"A":"下降在胎頭娩出前。","B":"正確。胎頭娩出後進入外迴轉(復位)。","C":"屈曲在胎頭娩出前。","D":"伸展即胎頭娩出的機轉。"},"sources":["新文京《產科護理學》分娩機轉","外迴轉"]}},"108020-N4-15":{"quick":"右枕前位(ROA)進行內迴轉時,自ROA旋轉45度至枕前位(OA)。","detail":{"background":"內迴轉角度依胎位:ROA(右枕前)與LOA(左枕前)枕部位於骨盆斜徑,內迴轉「45度」轉至枕前位(OA);橫位(枕橫位)需轉90度;枕後位(OP/ROP/LOP)需轉135度至OA(費時)。本題ROA內迴轉「自ROA旋轉45度至OA」(A)。","options":{"A":"正確。ROA內迴轉旋轉45度至OA。","B":"135度為枕後位的角度。","C":"ROP起點錯誤(此為ROA)。","D":"ROP+135度為枕後位。"},"sources":["新文京《產科護理學》內迴轉","分娩機轉"]}},"108110-N4-12":{"quick":"胎頭高度station 0,表示胎兒的雙頂徑(BPD)通過骨盆入口(即胎頭已銜接固定)。","detail":{"background":"胎頭下降高度0(station 0)位於坐骨棘連線,臨床意義是「胎頭最大徑(雙頂徑BPD)已通過骨盆入口」=胎頭「已銜接/固定(engaged)」。負值在坐骨棘上(胎頭仍高/浮動)、正值在坐骨棘下(接近娩出)。本題station 0=「雙頂徑通過骨盆入口」(B)。","options":{"A":"胎頭在骨盆入口上方為負值(未固定)。","B":"正確。station 0=雙頂徑通過骨盆入口(已固定)。","C":"雙頂徑通過恥骨聯合非station 0定義。","D":"接近骨盆出口為正值(如+3以上)。"},"sources":["新文京《產科護理學》胎頭下降高度","銜接"]}},"109030-N4-9":{"quick":"LOA(左枕前位)胎心音聽診最合宜部位為「左側臍棘線(臍與髂骨前上棘連線)中點」。","detail":{"background":"胎心音經胎背傳導,頭產式聽於母腹下象限的胎背側。LOA胎背在母體「左前」,胎心音在「左下象限——左側臍與髂骨前上棘(臍棘線)連線中點」最清楚。ROA則在右側對應位置;臀產式在臍上。本題LOA為「左側臍棘線中點」(B)。","options":{"A":"右側為ROA的位置。","B":"正確。LOA胎心在左側臍棘線中點。","C":"臍與恥骨連線中點非LOA最佳位置。","D":"腸骨兩側非胎心聽診點。"},"sources":["新文京《產科護理學》胎心音聽診","LOA"]}},"109110-N4-15":{"quick":"胎兒先露部位與母親骨盆「前後左右」的關係,稱為「胎位(position)」。","detail":{"background":"產科方位名詞:胎產式(presentation)——先露部位(頭/臀/肩);胎勢(attitude)——胎兒各部位的相互關係(屈曲/仰伸);胎姿/胎軸(lie)——胎兒長軸與母體長軸關係(縱/橫/斜);「胎位(position)」——先露部位的指示點(如枕O、薦S、頦M)相對於母體骨盆「前後左右」四象限的關係(如LOA、ROP)。本題答案為胎位(D)。","options":{"A":"胎勢指胎兒各部位相互關係(屈曲/仰伸)。","B":"胎姿/胎軸指長軸關係。","C":"胎產式指先露部位。","D":"正確。先露部與母骨盆前後左右關係=胎位。"},"sources":["新文京《產科護理學》產科方位名詞","胎位"]}},"109110-N4-30":{"quick":"胎頭徑線最短、較能順利分娩的胎產式為「頭頂產式(枕先露,完全屈曲)」。","detail":{"background":"頭產式依屈曲程度:「頭頂產式(枕先露,vertex,胎頭完全屈曲)」以最短的枕下前囟徑(SOB)通過產道,最利分娩;前頂產式(軍人式,枕額徑OF)次之;額產式(枕頦徑OM,最長最難);面產式(頦下前囟徑SMB)。本題胎頭徑線最短、較順利分娩者為「頭頂產式」(D)。","options":{"A":"面產式以頦下前囟徑,非最有利。","B":"額產式徑線最長最難。","C":"前頂產式枕額徑較長。","D":"正確。頭頂產式(完全屈曲)徑線最短最順產。"},"sources":["新文京《產科護理學》胎產式","分娩機轉"]}},"110110-N4-9":{"quick":"腹部四段式(Leopold)操作法的主要目的是「檢查胎產式(胎位/先露)」。","detail":{"background":"Leopold四段式觸診的主要目的是「判斷胎兒在子宮內的胎產式、胎位、胎勢與先露部下降程度」:第一段觸宮底(頭或臀)、第二段觸兩側(胎背/四肢)、第三段觸恥骨上方先露部與是否入盆、第四段(面向產婦足側)評估先露部入盆程度。它「不能測子宮收縮強度/頻率」(需觸診宮縮或監測器)、「不直接測胎心」(以聽診器)。本題主要目的為「檢查胎產式」(C)。","options":{"A":"子宮收縮強度需觸診宮縮或監測器。","B":"胎心以聽診器/都卜勒測。","C":"正確。四段式觸診主要檢查胎產式/胎位。","D":"子宮收縮頻率需監測,非四段式目的。"},"sources":["新文京《產科護理學》Leopold四段式","胎位評估"]}},"110110-N4-15":{"quick":"LOA(左枕前位)的生產時間通常較短(屬有利胎位)。","detail":{"background":"胎位與產程:枕前位(OA、LOA、ROA)胎頭俯屈良好、以最短徑線通過,內迴轉僅45度,產程較順、時間較短,其中LOA為最常見有利胎位。枕後位(LOP/OP)需迴轉135度、產程延長;枕橫位、臀位(LSA)、頦位(LMA/LMP)等亦較不利。本題生產時間較短者為LOA(B)。","options":{"A":"LOP(枕後位)產程延長。","B":"正確。LOA為有利胎位,生產時間較短。","C":"LSA(左薦前)為臀位,較不利。","D":"LMP(左頦後)為面產式,較不利。"},"sources":["新文京《產科護理學》胎位與產程","LOA"]}},"111030-N4-16":{"quick":"枕後位(OP)第一、二產程延長的主要機轉是「內迴轉成枕前位費時長」。","detail":{"background":"枕後位(OP)產程延長的主要機轉:胎頭枕部在後,需「內迴轉135度轉成枕前位(OA)」才能順利娩出,此過程費時長;加上胎頭俯屈不佳、先露與骨盆密合差使宮縮較無效、擴張下降較慢,故第一、二產程皆延長,並有嚴重腰背痛。本題主因為「內迴轉成枕前位,費時長」(B)。","options":{"A":"非需不斷屈曲成LOP。","B":"正確。內迴轉135度成枕前位費時長。","C":"非主要在骨盆入口不易下降。","D":"外部轉向(ECV)用於臀位矯正,非枕後位機轉。"},"sources":["新文京《產科護理學》枕後位","產程延長"]}},"111110-N4-10":{"quick":"妊娠36週LOA,胎心音都卜勒應放在「左側肚臍與髂骨前上棘連線的中點」最清楚。","detail":{"background":"頭產式胎心音於母腹「下象限胎背側」最清楚。LOA(左枕前)胎背在母體左前,故聽診/都卜勒放置於「左側——肚臍與髂骨前上棘(臍棘線)連線的中點」。ROA則在右側對應位置。本題LOA為「左側肚臍與髂骨前上棘連線中點」(D)。","options":{"A":"肚臍周圍非LOA最佳聽診點。","B":"「延長線」描述不精確。","C":"右側為ROA。","D":"正確。LOA於左側臍與髂骨前上棘連線中點。"},"sources":["新文京《產科護理學》胎心音聽診","LOA"]}},"111110-N4-14":{"quick":"LOA完成內回轉後,胎頭的矢狀縫合與母體骨盆的前後徑呈平行狀態。","detail":{"background":"內迴轉(internal rotation)的目的:使胎頭由斜徑(LOA枕部在左前斜徑)轉至「枕前位(OA)」,讓胎頭的「矢狀縫合(sagittal suture)與母體骨盆的前後徑平行(一致)」,以最有利的方位通過骨盆出口娩出。本題LOA完成內回轉後「矢狀縫合與骨盆前後徑呈平行」(A)。","options":{"A":"正確。內回轉後矢狀縫合與骨盆前後徑平行。","B":"冠狀縫合非此對齊關係。","C":"額縫合與前後徑垂直敘述錯誤。","D":"枕下前囟徑與前後徑關係描述不符。"},"sources":["新文京《產科護理學》內迴轉","分娩機轉"]}},"112180-N4-9":{"quick":"內診結果「Station: floating」表示胎兒先露部位尚未進入骨盆入口(仍浮動)。","detail":{"background":"胎頭下降高度(station)術語:「floating(浮動)」指先露部位尚未銜接、仍高於骨盆入口、可被推動(尚未進入骨盆入口固定);station 0為雙頂徑通過骨盆入口(已銜接);正值表示已降至坐骨棘下;膨出於會陰約為+4–+5。本題「floating」=「先露部位尚未進入骨盆入口」(A)。","options":{"A":"正確。floating=先露部尚未進入骨盆入口(浮動)。","B":"通過骨盆最短徑橫切面約為station 0。","C":"雙頂徑接近坐骨結節為較低位置。","D":"膨出於會陰為接近娩出(+4–+5)。"},"sources":["新文京《產科護理學》胎頭下降高度","floating"]}},"113030-N4-8":{"quick":"著冠(crowning)指「宮縮間歇時,胎頭仍出現於陰道口且不會縮回陰道內」。","detail":{"background":"著冠(crowning):第二產程胎頭下降至陰道口,「即使在宮縮間歇(無收縮)時,胎頭仍持續可見於陰道口而不再縮回」,表示即將娩出,此時應控制胎頭緩慢娩出、保護會陰。對照:宮縮時胎頭出現、間歇時又「縮回」者尚未著冠。本題著冠定義為「宮縮間歇時胎頭出現陰道口且不縮回」(D)。","options":{"A":"胎頭顱頂壓痕非著冠定義。","B":"宮縮時出現、間歇縮回者尚未著冠。","C":"卵圓形膨出非著冠的定義關鍵。","D":"正確。間歇時胎頭出現且不縮回=著冠。"},"sources":["新文京《產科護理學》著冠","第二產程"]}},"113030-N4-10":{"quick":"頭產式胎頭呈「部分屈曲」時,以枕額徑(OF)通過產道。","detail":{"background":"胎勢與通過徑線:完全屈曲→枕下前囟徑(SOB,最短最順);「部分屈曲(軍人式)」→「枕額徑(OF,約11.5cm)」;部分仰伸(額產式)→枕頦徑(OM,最長);完全仰伸(面產式)→頦下前囟徑(SMB)。本題部分屈曲為枕額徑(OF)(B)。","options":{"A":"枕下前囟徑為完全屈曲。","B":"正確。部分屈曲為枕額徑(OF)。","C":"枕頦徑為額產式(部分仰伸)。","D":"頦下前囟徑為面產式(完全仰伸)。"},"sources":["新文京《產科護理學》胎勢/徑線","頭產式"]}},"114100-N4-8":{"quick":"LOA第二產程胎頭已著冠時,胎心音都卜勒置於「恥骨聯合上緣」最清楚。","detail":{"background":"胎心音聽診點隨胎頭下降而下移:胎頭著冠(接近娩出)時,胎背與胎心已下降至骨盆出口附近,故聽診/都卜勒應放於「恥骨聯合上緣(下腹最低處)」最易聽到清楚胎心。先前(胎頭較高)則在臍與髂骨前上棘連線中點。本題著冠時為「恥骨聯合上緣」(C)。","options":{"A":"臍與髂骨前上棘中點為胎頭較高時的位置。","B":"同上,為較早的聽診點。","C":"正確。著冠時胎心於恥骨聯合上緣最清楚。","D":"肚臍下緣非著冠時最佳位置。"},"sources":["新文京《產科護理學》胎心音聽診","著冠"]}},"114100-N4-22":{"quick":"子宮頸全開後,即使無宮縮也可在會陰部見到胎髮,此現象稱為「著冠(crowning)」。","detail":{"background":"著冠(crowning):第二產程胎頭下降至陰道口,「即使在無子宮收縮時,也可在會陰部持續看到胎兒頭髮/胎頭(不再縮回)」,表示胎頭即將娩出。此時需保護會陰、控制胎頭緩慢娩出以減少撕裂。胎頭固定(銜接)為station 0、+2為下降高度,皆非著冠。本題此現象為「著冠」(C)。","options":{"A":"胎頭固定(銜接)為station 0,非著冠。","B":"胎頭下降+2為高度,非著冠。","C":"正確。無宮縮也見胎髮於會陰=著冠。","D":"屈曲為分娩機轉,非此現象。"},"sources":["新文京《產科護理學》著冠","第二產程"]}},"115030-N4-10":{"quick":"生產姿勢中「高血壓待產婦採半坐臥姿勢生產」較不適當——高血壓宜採左側臥以利胎盤灌流。","detail":{"background":"生產姿勢概念:多數待產婦表示「直立前傾」姿勢最不痛(對);「蹲姿」可增寬骨盆出口橫徑、助胎頭下降(對);「前傾跪姿」適合枕後位以助胎頭迴轉、減輕腰痛(對)。對「高血壓/子癇前症」待產婦,宜採「左側臥」以解除子宮對下腔靜脈的壓迫、增加胎盤灌流與穩定血壓,半坐臥相對較不理想。本題「最不適當」者為「高血壓待產婦採半坐臥生產」(C)。","options":{"A":"適當。直立前傾姿勢多數最不痛。","B":"適當。蹲姿增寬骨盆出口橫徑。","C":"最不適當(本題答案)。高血壓宜左側臥,非半坐臥。","D":"適當。前傾跪姿適合枕後位。"},"sources":["新文京《產科護理學》生產姿勢","子癇前症體位"]}},"101030-N4-23":{"quick":"station −2 表示胎兒先露部到達坐骨棘連線「上方2公分」。","detail":{"background":"胎頭下降高度(station)以坐骨棘連線為0、以「公分」計:負值在坐骨棘「上」、正值在坐骨棘「下」。−2即先露部在坐骨棘連線「上方2公分」(尚高、未固定)。本題−2=「坐骨棘連線上方2公分」(C)。注意以「公分」非「指」計。","options":{"A":"錯。以公分計,非「2指」。","B":"方向錯誤(−為上方)。","C":"正確。−2=坐骨棘連線上方2公分。","D":"+2才是坐骨棘下方2公分。"},"sources":["新文京《產科護理學》胎頭下降高度","station"]}},"101030-N4-33":{"quick":"子宮頸全開(10cm)、胎頭+1、有便意感(第二產程),最合宜的措施是教導產婦用力。","detail":{"background":"子宮頸完全擴張(10cm)即進入第二產程;胎頭+1已下降、產婦出現「便意感與不自主用力衝動」,此時應「教導正確的用力(配合宮縮、屏氣或開聲門向下用力、宮縮間歇休息)」協助娩出。第一產程才用呼吸法避免過早用力。本例已第二產程,最合宜為「教導用力」(C)。","options":{"A":"呼吸避免用力用於第一產程(子宮頸未全開)。","B":"無胎兒窘迫不需常規給氧。","C":"正確。子宮頸全開+便意感,教導用力。","D":"按摩腹部轉移注意非此階段重點。"},"sources":["新文京《產科護理學》第二產程用力","產程護理"]}},"102030-N4-11":{"quick":"子宮頸6cm、變薄80%、胎頭+1,胎頭最可能位於「坐骨棘連線下」。","detail":{"background":"胎頭下降高度+1表示先露部在坐骨棘連線「下方1公分」。station 0為胎頭已固定(雙頂徑通過骨盆入口);+表示坐骨棘下、已下降。本例+1即「坐骨棘連線下」(B)。剛好固定為0、陰道口約+4–+5、骨盆入口為負值。","options":{"A":"剛好固定為station 0,非+1。","B":"正確。+1=坐骨棘連線下1公分。","C":"陰道口約+4–+5。","D":"骨盆入口為負值高度。"},"sources":["新文京《產科護理學》胎頭下降高度","station"]}},"102110-N4-14":{"quick":"第一胎子宮頸全開、用力中、胎頭+2,產婦累想剖腹時,最適宜回應是鼓勵「第一胎較慢、一起用力」。","detail":{"background":"第二產程(子宮頸全開、用力娩出)中,初產婦因產程較長易疲累、喪失信心。胎頭已+2(接近娩出),此時應「給予鼓勵與支持、說明初產婦第二產程通常較慢、陪伴一起用力」,維持其信心與配合,而非附和「沒希望、準備剖腹產」(此時已接近娩出,剖腹非適應)。本題最適宜為「通常第一胎比較慢,我們一起來用力」(B)。","options":{"A":"消極;此時應鼓勵用力娩出。","B":"正確。鼓勵第一胎較慢、一起用力。","C":"錯。胎頭已+2接近娩出,非沒希望。","D":"錯。已接近娩出,不需逕通知剖腹產。"},"sources":["新文京《產科護理學》第二產程支持","初產婦"]}},"103030-N4-12":{"quick":"第二胎子宮頸9cm、胎頭+1、有便意感,最適宜措施是教導用力動作。","detail":{"background":"子宮頸9cm接近全開、胎頭+1已下降、經產婦(第二胎)產程快,出現「便意感與不自主用力衝動」,接近或已進入第二產程,應「教導正確用力動作」協助娩出(經產婦尤其進展快)。本例最適宜為「教導用力動作」(A)。(註:若子宮頸尚未全開出現用力衝動,先以哈氣避免過早用力;本例9cm且有強烈便意、經產婦,以教導用力為答案。)","options":{"A":"正確。子宮頸9cm+便意感(經產婦),教導用力動作。","B":"呼吸法用於子宮頸未全開時避免過早用力。","C":"按摩非此階段重點。","D":"有便意感需評估與指導,非不處理。"},"sources":["新文京《產科護理學》第二產程用力","經產婦"]}},"103030-N4-14":{"quick":"子宮頸5cm屬第一產程活動期,活動期平均約每1小時擴張1公分。","detail":{"background":"第一產程分期與進展速率:潛伏期(0–3cm,進展慢,初產婦可達數小時至20小時);「活動期(約4–7cm)」子宮頸擴張較快,平均初產婦約「每小時1.2cm、經產婦約1.5cm」(概略每小時約1公分);過渡期(8–10cm)宮縮最強。本例5cm屬活動期,平均「每1小時進展1公分」(C)。","options":{"A":"活動期非每半小時1公分(過快)。","B":"5cm屬活動期非潛伏期。","C":"正確。活動期平均每1小時擴張約1公分。","D":"過渡期非「每小時擴張2公分」的固定值。"},"sources":["新文京《產科護理學》第一產程進展","Friedman曲線"]}},"104030-N4-1":{"quick":"丈夫要求陪產時,護理師應「協助安排合適位置讓丈夫陪伴妻子生產」。","detail":{"background":"家庭中心的生產照護與陪產:鼓勵伴侶/家人陪產可提供情緒支持、減輕焦慮、提升生產經驗,是現代產科推崇的友善生產。護理師應「協助安排合適位置、衛教陪產者如何協助」,在維護感染管制與其他產婦隱私的前提下支持陪產。以「感染、隱私、影響未來性生活」為由拒絕皆不適當。本題最合適為「協助安排合適位置讓丈夫陪伴」(C)。","options":{"A":"以感染為由拒絕陪產,不當。","B":"以隱私為由拒絕,不當(可安排適當位置)。","C":"正確。協助安排合適位置讓丈夫陪伴。","D":"以影響性生活為由拒絕,無據且不當。"},"sources":["新文京《產科護理學》家庭中心照護","陪產"]}},"104030-N4-6":{"quick":"Leopold第二段觸診的主要目的是判斷子宮兩側的胎兒部位(胎背/四肢)。","detail":{"background":"Leopold四段式觸診:第一段(觸宮底)——判斷宮底為頭或臀;「第二段(觸兩側)——判斷子宮兩側胎兒部位:平滑連續硬面為胎背、不規則小突起為四肢」;第三段(觸恥骨上方)——判斷先露部與是否入盆;第四段(面向足側)——判斷先露部下降/入盆程度。本題第二段目的為「判斷子宮兩側之胎兒部位」(B)。","options":{"A":"判斷宮底部位(頭/臀)是第一段。","B":"正確。第二段判斷兩側胎兒部位(胎背)。","C":"判斷先露下降是第三/四段。","D":"第四段評估先露入盆程度,非摸前額判斷。"},"sources":["新文京《產科護理學》Leopold四段式","胎位評估"]}},"105030-N4-17":{"quick":"胎頭高度+1表示先露部位在坐骨棘連線「下方1公分」。","detail":{"background":"胎頭下降高度+1=先露部在坐骨棘連線「下1公分」。0為坐骨棘連線(雙頂徑通過骨盆入口、已固定);負值在上、正值在下。本題+1=「坐骨棘連線下1公分」(C)。 補充:胎頭下降高度(station)以「坐骨棘(ischial spine)」為0點參考:負值(−1~−3)代表先露部在坐骨棘上方(較高、尚未或剛銜接),0=銜接(雙頂徑通過骨盆入口),正值(+1~+3)在坐骨棘下方(較低、接近娩出),+3~+5約達會陰可見。臨床以陰道內診觸診坐骨棘與先露部相對位置判定。常見陷阱:誤把0當作「骨盆入口」或「會陰部」——0是坐骨棘連線(骨盆腔中段),非入口或會陰;負值在上、正值在下勿顛倒。胎頭下降高度與子宮頸擴張併用評估產程進展。","options":{"A":"坐骨棘連線為0,非+1。","B":"−1才是坐骨棘上1公分。","C":"正確。+1=坐骨棘連線下1公分。","D":"+2才是坐骨棘下2公分。"},"sources":["新文京《產科護理學》胎頭下降高度","station"]}},"105090-N4-14":{"quick":"胎頭高度station 0,表示胎頭「已固定(銜接)」。","detail":{"background":"station 0位於坐骨棘連線,意義為「胎頭最大徑(雙頂徑)已通過骨盆入口=胎頭已銜接/固定(engaged)」。負值(如−1)表示胎頭仍浮動/未固定;正值表示已降至坐骨棘下;會陰口約+4–+5。本題station 0=「胎頭已固定」(B)。","options":{"A":"胎頭浮動為負值(未固定)。","B":"正確。station 0=胎頭已固定(銜接)。","C":"會陰口約+4–+5。","D":"station 0為明確位置,非不確定。"},"sources":["新文京《產科護理學》胎頭下降高度","銜接"]}},"107030-N4-9":{"quick":"本題為送分題。妊娠9週(第一孕期)超音波評估以妊娠囊與頭臀長(CRL)為主。","detail":{"background":"妊娠9週(第一孕期)超音波評估:以「妊娠囊(gestational sac)」確認子宮內懷孕、「頭臀長(CRL)」估算妊娠週數最準確,並看胎心搏動。「雙頂徑(BPD)、股骨長(FL)」是第二孕期以後才測量的生長參數,9週尚不適用。本題因選項判讀有爭議,官方判定送分、各答案均給分;臨床上9週以妊娠囊與CRL為主。","options":{"A":"股骨長(FL)為較後期參數;本題送分。","B":"妊娠囊為9週可評估項目;本題送分。","C":"雙頂徑為較後期參數;本題送分。","D":"頭臀長(CRL)為9週主要評估;本題送分。"},"sources":["新文京《產科護理學》早期超音波","考選部 公告:本題送分"]}},"107030-N4-15":{"quick":"子宮頸擴張最快的時期是「最大斜率期」(活動期中段)。","detail":{"background":"Friedman產程曲線:第一產程分潛伏期與活動期;活動期再分「加速期→最大斜率期(maximum slope/phase of maximum slope)→減速期」。其中「最大斜率期」子宮頸擴張速率最快(曲線最陡)。潛伏期擴張慢;過渡期(減速期)宮縮最強但擴張速率反而趨緩。本題子宮頸擴張最快為「最大斜率期」(D)。","options":{"A":"減速期擴張速率趨緩。","B":"潛伏期擴張最慢。","C":"過渡期宮縮強但擴張速率不為最快。","D":"正確。最大斜率期子宮頸擴張最快。"},"sources":["新文京《產科護理學》Friedman曲線","產程進展"]}},"108110-N4-31":{"quick":"胎兒監測圖呈「晚期減速(減速延遲於宮縮、最低點在宮縮高峰後)」,表示胎盤功能不良。","detail":{"background":"胎心率減速型態(看圖判讀):本圖標示「減速開始、減速結束」且註明「晚期開始」——胎心率減速的開始與最低點「延遲於子宮收縮(出現在宮縮高峰之後),回復也較慢」,呈對稱、與宮縮成固定時間落差,為「晚期減速(late deceleration)」,反映「子宮胎盤功能不良/胎兒缺氧(子宮胎盤灌流不足)」。處置:左側臥、停催產素、給氧、靜脈輸液、通知醫師。本圖原因為「胎盤功能不良」(B)。","options":{"A":"胎頭受壓造成早期減速(與宮縮同步)。","B":"正確。晚期減速(延遲於宮縮)=胎盤功能不良(已開圖判讀)。","C":"臍帶受壓造成變異性減速(突發突止)。","D":"晚期減速為異常,非正常情形。"},"sources":["新文京《產科護理學》晚期減速","胎心率監測(已開圖判讀)"]}},"109030-N4-11":{"quick":"station +1 表示先露部位在坐骨棘連線「下1公分」。","detail":{"background":"胎頭下降高度+1=先露部在坐骨棘連線「下方1公分」;0為坐骨棘連線(已固定),負值在上、正值在下,以坐骨棘為參考(非會陰部)。本題+1=「坐骨棘連線下1公分」(D)。 補充:胎頭下降高度(station)以「坐骨棘(ischial spine)」為0點參考:負值(−1~−3)代表先露部在坐骨棘上方(較高、尚未或剛銜接),0=銜接(雙頂徑通過骨盆入口),正值(+1~+3)在坐骨棘下方(較低、接近娩出),+3~+5約達會陰可見。臨床以陰道內診觸診坐骨棘與先露部相對位置判定。常見陷阱:誤把0當作「骨盆入口」或「會陰部」——0是坐骨棘連線(骨盆腔中段),非入口或會陰;負值在上、正值在下勿顛倒。胎頭下降高度與子宮頸擴張併用評估產程進展。","options":{"A":"−1才是坐骨棘上1公分。","B":"以坐骨棘為參考,非會陰部。","C":"以坐骨棘為參考,非會陰部。","D":"正確。+1=坐骨棘連線下1公分。"},"sources":["新文京《產科護理學》胎頭下降高度","station"]}},"109110-N4-18":{"quick":"陰道內診「無法」獲得的資料是「胎兒大小」。","detail":{"background":"待產陰道內診可評估:子宮頸厚薄(消失程度)、子宮頸擴張(公分)、胎膜是否完整(破水)、先露部位與「胎頭下降程度(station)」、胎位(摸囟門縫合)。「胎兒大小/體重」無法由內診得知(需超音波估計)。本題內診無法獲得者為「胎兒大小」(D)。","options":{"A":"可評估子宮頸厚薄(消失)。","B":"可評估子宮頸擴張。","C":"可評估胎頭下降程度(station)。","D":"正確。胎兒大小無法由內診得知。"},"sources":["新文京《產科護理學》陰道內診","產程評估"]}},"110030-N4-8":{"quick":"Leopold第一段操作法的目的是「找出位於子宮底的胎兒部位(頭或臀)」。","detail":{"background":"Leopold四段式觸診:操作於妊娠後期(非12週);檢查前請產婦「排空膀胱」(非脹膀胱);「第一段——觸子宮底,判斷宮底為頭(圓硬可動)或臀(軟不規則)」;第二段觸兩側(胎背);第三段觸先露;第四段評估先露入盆程度(尋找胎心音最佳聽診部位是輔助,非第三段主要目的)。本題第一段目的為「找出位於子宮底的胎兒部位」(B)。","options":{"A":"錯。Leopold於妊娠後期操作,非12週。","B":"正確。第一段找出子宮底的胎兒部位。","C":"錯。檢查前應排空膀胱,非脹膀胱。","D":"第三段判斷先露,非以找胎心聽診部位為目的。"},"sources":["新文京《產科護理學》Leopold四段式","胎位評估"]}},"111030-N4-14":{"quick":"胎兒先露部位高度−1,對應骨盆站位圖中坐骨棘連線「上1公分」的編號3位置。","detail":{"background":"胎頭下降高度(station)圖判讀:圖中以坐骨棘連線(0,常以虛線/中線標示)為基準,刻度向上為負(坐骨棘上)、向下為正(坐骨棘下)。「−1」表示在坐骨棘連線上方1公分。對照圖中編號(由上而下標示的高度位置),坐骨棘連線上1公分對應「編號3」。本題−1=編號3(C)。(已開圖判讀:依圖中坐骨棘連線位置與刻度,上1公分為編號3。)","options":{"A":"編號1位置較高(坐骨棘上方較多)。","B":"編號2非上1公分位置。","C":"正確。−1(坐骨棘上1公分)為編號3(已開圖判讀)。","D":"編號4在坐骨棘連線下方。"},"sources":["新文京《產科護理學》胎頭下降高度","station(已開圖判讀)"]}},"111110-N4-16":{"quick":"子宮頸全開(10cm)、有強烈便意感時,可採「緩慢開聲門用力」生產。","detail":{"background":"子宮頸完全擴張(10cm)進入第二產程,出現「強烈便意感與不自主用力衝動」時,可教導用力娩出;現代建議「開聲門(open-glottis)、順著用力衝動、緩慢向下用力」較傳統長時間閉氣(Valsalva)更生理、減少對胎兒血流與母體心血管的不利影響、降低會陰撕裂。不需「等醫師才用力」、膀胱截石臥非最有助姿勢、第二產程生命徵象監測非每30分鐘為重點。本題最適當為「有強烈便意感時可採緩慢開聲門用力生產」(D)。","options":{"A":"不需消極「等醫師來才用力」(順著用力衝動)。","B":"膀胱截石臥非最有助產程進展之姿勢。","C":"第二產程監測重點非「每30分鐘量血壓脈搏呼吸」。","D":"正確。有強烈便意感可採緩慢開聲門用力生產。"},"sources":["新文京《產科護理學》第二產程用力","開聲門用力"]}},"114100-N4-7":{"quick":"過渡期(8cm)精疲力竭、情緒失控的待產婦,護理師應「請她跟著手勢調整呼吸」。","detail":{"background":"過渡期(子宮頸8–10cm)宮縮強而密、產婦常呼吸急促、情緒失控、精疲力竭。護理:以「簡短、具體、引導式」協助——如「請產婦跟著護理師的手勢/口令調整呼吸節律(避免過度換氣)」,陪伴鼓勵、給予產程進展訊息;此時「子宮頸未全開不可用力」(8cm平躺用力會致子宮頸水腫撕裂)、不可用手指撐開子宮頸、責備「不要拍打」無助情緒。本題正確為「請她跟著手勢調整呼吸」(D)。","options":{"A":"錯。8cm未全開,不可開始用力。","B":"錯。不可用手指伸入撐開子宮頸。","C":"責備無助情緒。","D":"正確。引導跟著手勢調整呼吸(穩定節律)。"},"sources":["新文京《產科護理學》過渡期護理","呼吸引導"]}},"114170-N4-12":{"quick":"先露部到達坐骨棘連線「上1公分」,應記錄為 station: −1。","detail":{"background":"胎頭下降高度以「station」記錄:坐骨棘連線為0,「上方」以負值、「下方」以正值,以公分計。先露部在坐骨棘連線「上1公分」記為「station: −1」。「score」用於Apgar/Bishop等計分,非胎頭高度記錄用詞。本題正確記錄為「station: −1」(C)。","options":{"A":"+1為坐骨棘下,方向相反。","B":"用詞應為station,非score。","C":"正確。坐骨棘上1公分=station: −1。","D":"用詞應為station,且−1對應上1公分。"},"sources":["新文京《產科護理學》胎頭下降高度","station 記錄"]}},"103030-N4-18":{"quick":"子宮上三分之二為主動收縮(較厚、較強),可有效將胎兒往下推擠。","detail":{"background":"分娩時子宮收縮的生理:收縮波由「子宮底(上段)」開始,向子宮下段擴散(底部主導 fundal dominance);「子宮上2/3為主動收縮段、肌肉較厚、收縮強」,可有效將胎兒往下推;「子宮下1/3(下段)為被動段、肌肉變薄、伸展」以利胎頭下降與娩出;若上下段交界出現病理性收縮環(子宮過度拉長)提示產程阻塞。本題正確為「子宮上2/3主動收縮,可有效將胎兒往下推擠」(B)。","options":{"A":"錯。收縮由子宮底(上段)開始向下,非下段向上。","B":"正確。子宮上2/3主動收縮、推胎兒向下。","C":"錯。下1/3為被動段(變薄),非主動收縮。","D":"錯。子宮上段收縮強度大於下段。"},"sources":["新文京《產科護理學》子宮收縮生理","分娩生理"]}},"107030-N4-10":{"quick":"生產子宮肌肉活動敘述中「生理性收縮環時上段肌肉會變薄」為錯誤——上段變厚、下段變薄。","detail":{"background":"分娩子宮肌肉活動:胎兒先露部壓迫子宮頸促進變薄(消失);羊膜腔(前羊水)形成的靜水壓助子宮頸擴張;宮縮時胎軸壓力促進子宮頸擴張與胎頭下降。「生理性收縮環(physiologic retraction ring)」是上下段交界——「子宮上段(主動)肌肉變厚、下段(被動)變薄」,使胎兒被往下推。故「生理性收縮環時上段肌肉變薄」為錯誤(B,應上段變厚)。","options":{"A":"正確。先露部壓迫促進子宮頸變薄。","B":"錯誤(本題答案)。生理性收縮環時上段變厚、下段變薄。","C":"正確。羊膜腔靜水壓促子宮頸擴張。","D":"正確。胎軸壓力促子宮頸擴張。"},"sources":["新文京《產科護理學》生理性收縮環","分娩生理"]}},"107110-N4-12":{"quick":"生理性收縮環在肌肉上的變化為「子宮上段變厚、下段變薄」。","detail":{"background":"生理性收縮環(physiologic/Bandl retraction ring):是分娩時子宮「上段(主動收縮段)」與「下段(被動伸展段)」交界處的環狀界線;隨產程進展,上段肌肉「縮短變厚」、下段「拉長變薄」,以將胎兒往下推送與娩出。若下段過度拉長、收縮環異常上升並可見於腹壁,即「病理性收縮環(Bandl ring)」,提示產程阻塞、子宮破裂前兆。本題正確為「子宮上段變厚、下段變薄」(C)。","options":{"A":"方向相反。","B":"下段亦有變化(變薄)。","C":"正確。上段變厚、下段變薄。","D":"上段亦有變化(變厚)。"},"sources":["新文京《產科護理學》生理性收縮環","分娩生理"]}},"109110-N4-14":{"quick":"胎膜破裂後扶上床躺下，最優先措施＝聽胎心音(評估有無臍帶脫垂/受壓造成胎心變化)。","detail":{"background":"第二產程用力技巧:現代建議「開聲門(open-glottis)用力」——順著用力衝動、在用力時「發出聲音(不完全閉氣)、緩慢向下用力」,較傳統「長時間閉氣(Valsalva)」更生理:減少胸內壓劇升、維持靜脈回流與子宮胎盤灌流、降低胎兒缺氧與會陰撕裂、減少產後尿失禁。本例已第二產程(全開+2、強烈用力感),宮縮時最恰當為「打開聲門用力法」(C)。","options":{"A":"通知醫師非破水後「最優先」的護理措施。","B":"正確。破水後最優先聽胎心音，評估有無臍帶脫垂/受壓導致胎心異常。","C":"計算宮縮時間頻率非破水當下最優先。","D":"測量血壓脈搏非破水後最優先。"},"sources":["新文京《產科護理學》開聲門用力","第二產程"]}},"109110-N4-17":{"quick":"子宮收縮頻率(frequency)的定義為「一次宮縮開始到下次宮縮開始之間的時間」。","detail":{"background":"子宮收縮的評估參數:頻率(frequency)——「一次收縮開始到下次收縮開始之間的時間(間隔)」;持續時間(duration)——每次收縮由開始到結束;強度(intensity)——收縮高峰的壓力;間歇期(interval/休息期)——一次收縮結束到下次收縮開始的平靜期。本題「頻率」定義為「一次宮縮開始到下次宮縮開始之時間」(B)。","options":{"A":"收縮時增加的壓力為「強度」。","B":"正確。頻率=一次宮縮開始到下次宮縮開始之時間。","C":"收縮後的平靜期為「間歇期」。","D":"每次收縮開始到結束為「持續時間」。"},"sources":["新文京《產科護理學》子宮收縮評估","產程監測"]}},"110030-N4-17":{"quick":"正常子宮收縮特性敘述中「受腸胃的神經管制」為錯誤——子宮收縮不受意志支配、由子宮本身節律與荷爾蒙調控。","detail":{"background":"正常子宮收縮特性:不受產婦「意志」支配(不自主)、以「子宮底收縮強度最高(底部主導)」、為「間歇性(收縮-休息交替)」、收縮波由底部向下擴散且協調;受催產素、前列腺素與子宮肌本身的節律調控,「不受腸胃神經管制」。本題問「錯誤」者為「受腸胃的神經管制」(C)。","options":{"A":"正確。子宮收縮無法由意志支配。","B":"正確。以子宮底收縮強度最高。","C":"錯誤(本題答案)。子宮收縮非受腸胃神經管制。","D":"正確。為間歇性收縮。"},"sources":["新文京《產科護理學》子宮收縮特性","分娩生理"]}},"111110-N4-15":{"quick":"WHO對無併發症婦女的待產照護建議「採間歇性胎心音聽診監測」。","detail":{"background":"WHO對低風險、無併發症待產婦的正常產照護建議:採「間歇性胎心音聽診」(非常規持續性電子監測,後者增加剖腹產率而未改善預後)、「不常規灌腸與剃除陰毛」、「產程中可進食清淡飲食與補水(不常規禁食)」、「不常規施打點滴」、鼓勵下床活動與陪產、尊重自主。本題正確為「採間歇性胎心音聽診監測」(A)。","options":{"A":"正確。低風險者採間歇性胎心音聽診。","B":"錯。不建議例行灌腸與剃陰毛。","C":"錯。產程不建議常規禁食,可進清淡飲食。","D":"錯。不建議常規施打點滴。"},"sources":["WHO 正常產照護指引","新文京《產科護理學》"]}},"101030-N4-40":{"quick":"胎心音監控顯示胎心變化皆在正常範圍時,無須提供額外處置(本題胎心率正常)。","detail":{"background":"胎心率監測判讀:正常胎心率基準線120–160 bpm、變異性6–25 bpm、有加速、無顯著減速,屬正常,無須額外處置。本例(承吳女士用meperidine後監測)胎心變化均在正常範圍,故「無須提供額外處置措施」。(註:本題題幹文字於試題解析過程出現版面雜訊,依選項與情境判讀,正解為胎心正常、不需處置(D)。)早期減速(胎頭受壓)、晚期減速(胎盤功能不良)、變異性減速(臍帶受壓)才需對應處置。","options":{"A":"無早期減速,且非調低meperidine的情境。","B":"無晚期減速。","C":"無變異性減速。","D":"正確。胎心變化皆在正常範圍,無須額外處置。"},"sources":["新文京《產科護理學》胎心率判讀","胎兒監測"]}},"101110-N4-54":{"quick":"子宮頸全開、胎頭+3、出現晚期減速,最合宜處置是請產婦繼續用力、以真空吸引協助娩出。","detail":{"background":"第二產程末(子宮頸全開、胎頭+3已接近娩出)出現「晚期減速(胎盤功能不良/胎兒缺氧)」時,因胎頭已很低、最快的方式是「儘速娩出胎兒」——鼓勵繼續用力,必要時以「真空吸引(或產鉗)協助娩出」結束第二產程,同時左側臥、給氧。此時若胎頭已+3則不宜改行剖腹(來不及且胎頭已深),也不能僅觀察。本題最合宜為「繼續用力+真空吸引協助娩出」(B)。","options":{"A":"胎頭已+3接近娩出,不宜改剖腹產。","B":"正確。繼續用力+真空吸引儘速娩出。","C":"晚期減速為異常,非正常觀察。","D":"單純改變姿勢不足以即時改善,需儘速娩出。"},"sources":["新文京《產科護理學》晚期減速處置","器械助產"]}},"102030-N4-7":{"quick":"有助監測胎兒健康狀況的檢查為NST(無壓力試驗)。","detail":{"background":"監測「胎兒健康/安危」的檢查:NST(nonstress test,無壓力試驗)——觀察胎動時胎心率加速反應,反應型表示胎兒氧合良好;另BPP、CST/OCT、臍動脈都卜勒等。Fern test是確認「破水」;CVS(絨毛膜取樣)驗「染色體」;BST(乳房刺激試驗)是誘發宮縮的壓力試驗變體。本題監測胎兒健康者為NST(C)。","options":{"A":"Fern test確認破水,非評估胎兒健康。","B":"CVS驗染色體,非評估胎兒健康狀況。","C":"正確。NST評估胎兒健康(氧合)。","D":"BST為誘發宮縮的試驗,非首選監測胎兒健康。"},"sources":["新文京《產科護理學》NST","胎兒監測"]}},"102030-N4-18":{"quick":"胎心率降至80 bpm、持續50秒、且與宮縮「沒有一定關係」,最可能為變異性減速。","detail":{"background":"胎心率減速依與宮縮的時間關係:早期減速(與宮縮同步、對稱,胎頭受壓);晚期減速(延遲於宮縮高峰後,胎盤功能不良);「變異性減速(variable deceleration)——形狀不定(V/U/W)、突發突止、與宮縮沒有固定時間關係,因臍帶受壓」。本例胎心80、與宮縮無固定關係,為變異性減速(C)。處置:改變姿勢(左側臥)、給氧、停催產素、必要時抬高先露減壓。","options":{"A":"一般變化不會降至80且持續。","B":"早期減速與宮縮同步。","C":"正確。與宮縮無固定關係=變異性減速(臍帶受壓)。","D":"晚期減速延遲於宮縮、有固定關係。"},"sources":["新文京《產科護理學》變異性減速","胎心率監測"]}},"102110-N4-11":{"quick":"正常胎兒在陣痛(宮縮)時會出現短暫缺氧及心跳加速,屬正常現象。","detail":{"background":"胎心率與宮縮:正常胎兒在子宮收縮時,子宮胎盤血流短暫減少,胎兒會有「暫時性、可代償的缺氧」並以「心跳加速(加速)」反應,屬正常、表示胎兒儲備良好。減速型態鑑別:晚期減速=胎盤功能不良(非臍帶受壓)、早期減速=胎頭受壓(非胎盤功能不良);正常胎心率120–160 bpm,妊娠週數「越小心跳越快」(非越慢)。本題正確為「正常胎兒陣痛時暫時缺氧及心跳加快」(C)。","options":{"A":"錯。晚期減速因胎盤功能不良,非臍帶受壓。","B":"錯。早期減速因胎頭受壓,非胎盤功能不良。","C":"正確。正常胎兒陣痛時暫時缺氧、心跳加速。","D":"錯。妊娠週數越小心跳越快,非越慢。"},"sources":["新文京《產科護理學》胎心率生理","胎兒監測"]}},"102110-N4-12":{"quick":"胎心率基準線140、變異性11~25 bpm,表示胎兒神經系統(自主神經)調控正常。","detail":{"background":"胎心率「變異性(variability)」反映胎兒自主神經(交感/副交感)對心臟的調控,是評估胎兒健康最重要的指標之一:中度變異(moderate,6–25 bpm)表示「胎兒神經系統調控正常、氧合良好」;變異性「過小/消失(<5 bpm)」可能提示胎兒缺氧、睡眠、藥物或酸中毒。本例基準線140、變異性11–25(中度),為「胎兒神經系統調控正常」(C)。","options":{"A":"胎頭受壓表現為早期減速,非以變異性判斷。","B":"變異性正常反而表示氧合良好,非缺氧。","C":"正確。中度變異(11–25)=胎兒神經調控正常。","D":"非反射過強的判讀。"},"sources":["新文京《產科護理學》胎心率變異性","胎兒監測"]}},"103100-N4-15":{"quick":"胎心率監測圖呈「早期減速(與宮縮同步、對稱)」。","detail":{"background":"胎心率減速判讀(看圖):本圖胎心率減速「與子宮收縮同步出現、對稱、最低點與宮縮高峰一致、宮縮結束即回復基線」,為「早期減速(early deceleration)」,因「胎頭受壓」引起迷走神經反射,屬良性、不需特殊處置。對照:晚期減速(延遲於宮縮,胎盤功能不良)、變異性減速(突發突止、臍帶受壓)、加速(胎動或宮縮時上升,正常)。本圖為「胎心率早期減速」(B)。","options":{"A":"非單純加速。","B":"正確。與宮縮同步對稱=早期減速(胎頭受壓,已開圖判讀)。","C":"晚期減速延遲於宮縮。","D":"變異性減速突發突止、與宮縮無固定關係。"},"sources":["新文京《產科護理學》早期減速","胎心率監測(已開圖判讀)"]}},"103100-N4-19":{"quick":"胎心音「減速出現於宮縮最高點、最低80 bpm、宮縮結束後回到120」為異常(屬晚期減速)。","detail":{"background":"胎心率與宮縮關係判讀異常的是「晚期減速」:減速「開始/最低點延遲於宮縮高峰之後、回復慢」,反映胎盤功能不良/缺氧。選項B「減速出現於宮縮最高(高峰)、最低降至80、宮縮結束才回到120」即晚期減速型態(且降幅大、回復慢),為「異常」。其餘:A(減速與宮縮同步、回到正常)為早期減速(良性);C(宮縮後加速)為正常加速;D(維持120–160間)為正常。本題異常者為B。","options":{"A":"與宮縮同步、回到137,屬早期減速(良性)。","B":"正確(異常)。延遲於宮縮高峰、降至80、回復慢=晚期減速。","C":"宮縮後加速為正常反應。","D":"維持120–160間屬正常。"},"sources":["新文京《產科護理學》晚期減速","胎心率判讀"]}},"104030-N4-29":{"quick":"胎兒早期減速的主要機轉是胎頭受壓→顱內壓上升→腦血流下降(迷走神經反射)。","detail":{"background":"早期減速(early deceleration)機轉:子宮收縮時「胎頭受壓」,使顱內壓短暫上升、腦血流下降,刺激迷走神經反射性使心跳減慢,故減速「與宮縮同步、對稱」,屬良性、不需處置。對照:臍帶受壓→變異性減速;子宮胎盤血管缺血(胎盤功能不良)→晚期減速;臍帶血酸鹼下降為缺氧後果。本題早期減速機轉為「胎頭受壓、顱內壓上升、腦血流下降」(A)。","options":{"A":"正確。胎頭受壓→顱內壓上升→腦血流下降(迷走反射)。","B":"臍帶受壓造成變異性減速。","C":"子宮胎盤血管缺血造成晚期減速。","D":"臍帶血酸鹼下降為缺氧後果,非早期減速機轉。"},"sources":["新文京《產科護理學》早期減速機轉","胎心率監測"]}},"105030-N4-7":{"quick":"NST 20分鐘變異性僅3~6 bpm(偏低),最適當措施是「輕搖動孕婦腹部」喚醒胎兒。","detail":{"background":"NST若變異性偏低或無反應,常見原因是「胎兒睡眠週期」。處置:先以「輕搖/輕推孕婦腹部、聲音振動刺激(vibroacoustic)、讓孕婦進食或改變姿勢」喚醒胎兒並延長監測,多數隨之出現胎動與加速;若刺激後仍變異性低/無反應,再給氧、進一步評估(BPP/CST)。本例變異性3–6先「輕搖腹部喚醒胎兒」(B),而非立即給氧或不處置。","options":{"A":"變異性偏低不宜僅繼續監測不處置。","B":"正確。先輕搖腹部喚醒胎兒(排除睡眠)。","C":"給氧為刺激無效後的後續。","D":"深呼吸非喚醒胎兒的有效措施。"},"sources":["新文京《產科護理學》NST處置","胎兒監測"]}},"105030-N4-18":{"quick":"待產時Pitocin(催產素)使用,胎心率降至100 bpm時應停止給藥。","detail":{"background":"催產素(Pitocin/oxytocin)引產/催生的安全監測:從低劑量開始、漸進調整(非一開始即高劑量),需「持續(非間歇)電子胎兒監測」與監測宮縮;出現「胎兒窘迫徵象——胎心率持續過緩(<100–110 bpm)、晚期減速、變異性消失」或「子宮過度收縮(高張、宮縮過頻>5次/10分、宮縮間休息<30秒)」時應「立即停止催產素」、左側臥、給氧、通知醫師。本題胎心率「100 bpm」時應停藥(D)。","options":{"A":"起始劑量單位/劑量敘述不當(應低劑量漸增)。","B":"宮縮頻率不是「2–3分鐘一次才可用」的條件。","C":"催產素引產需「持續」胎兒監測,非間歇。","D":"正確。胎心率降至100 bpm應停止給藥。"},"sources":["新文京《產科護理學》催產素監測","胎兒窘迫"]}},"105090-N4-16":{"quick":"與子宮收縮「無關」的胎心率週期性變化是變異性減速。","detail":{"background":"胎心率週期性變化與宮縮的關係:早期減速(與宮縮同步)、晚期減速(延遲於宮縮)、加速(常伴宮縮或胎動)——皆與宮縮有「固定時間關係」;而「變異性減速(variable deceleration)——形狀與時間不定、與宮縮沒有固定關係,因臍帶受壓」。本題「與子宮收縮無關」者為變異性減速(C)。","options":{"A":"早期減速與宮縮同步(有關)。","B":"晚期減速延遲於宮縮(有關)。","C":"正確。變異性減速與宮縮無固定關係。","D":"變異性加速與胎動/宮縮相關。"},"sources":["新文京《產科護理學》胎心率減速分類","胎兒監測"]}},"106030-N4-15":{"quick":"待產婦出現變異性減速時,護理師應「最先協助左側臥」。","detail":{"background":"變異性減速(臍帶受壓)的處置(子宮內復甦):首要「改變產婦姿勢(協助左側臥或變換體位)」解除臍帶受壓;若無改善再給氧、停催產素、靜脈輸液、陰道內診確認有無臍帶脫垂、必要時抬高先露減壓;持續不改善則準備緊急娩出。本題「最先執行」者為「協助左側臥」(A)。","options":{"A":"正確。最先協助左側臥(解除臍帶受壓)。","B":"測量生命徵象為後續。","C":"觀察陰道出血非首要。","D":"抬高頭部非變異性減速處置。"},"sources":["新文京《產科護理學》變異性減速處置","胎兒監測"]}},"106110-N4-8":{"quick":"NST「反應型」標準:20分鐘內有2次以上胎動、每次胎動時胎心率上升≥15 bpm且持續≥15秒。","detail":{"background":"無壓力試驗(NST)判讀:「反應型(reactive)=20分鐘內至少2次胎動,每次胎動伴隨胎心率加速≥15 bpm、持續≥15秒(<32週放寬為≥10/10)」,表示胎兒氧合良好。變異性<5、20分鐘無胎動可能是睡眠(先刺激喚醒、延長監測,非馬上緊急);試驗時孕婦採「半坐臥/側臥」(非必須平躺,平躺易仰臥位低血壓)。本題反應型標準為「20分鐘≥2次胎動、心跳上升15 bpm持續15秒」(C)。","options":{"A":"變異性<5不能稱反應型。","B":"20分鐘無胎動多為睡眠,先刺激而非馬上緊急。","C":"正確。20分鐘≥2次胎動、心跳上升15 bpm持續15秒=反應型。","D":"孕婦採半坐臥/側臥,非必須平躺。"},"sources":["新文京《產科護理學》NST判讀","胎兒監測"]}},"106111-N4-17":{"quick":"子宮頸8cm、完全變薄、不自主想用力時指導「哈氣」,目的是避免子宮頸水腫。","detail":{"background":"子宮頸尚未完全擴張(如8cm)卻出現「不自主用力衝動」時,過早用力會使「未全開的子宮頸受壓、水腫、撕裂」、產婦疲憊。護理指導「哈氣(panting/吹氣)呼吸」可抑制用力衝動、避免過早用力,待子宮頸全開再用力。本題哈氣目的為「避免子宮頸水腫」(D)。","options":{"A":"非為避免產婦害怕。","B":"非為避免子宮破裂(雖過度用力不利,但主因是子宮頸水腫)。","C":"非為避免胎心率下降。","D":"正確。哈氣避免過早用力致子宮頸水腫。"},"sources":["新文京《產科護理學》哈氣呼吸","過渡期"]}},"107030-N4-14":{"quick":"子宮收縮(宮縮)時胎心率加速,臨床意義為正常現象。","detail":{"background":"胎心率「加速(acceleration)」——胎心率短暫上升≥15 bpm、持續≥15秒,常伴隨胎動或子宮收縮,反映胎兒自主神經反應良好、氧合佳,是「正常、可安心」的徵象(NST反應型即以加速判定)。減速才需鑑別:早期(胎頭受壓)、晚期(胎盤功能不良)、變異性(臍帶受壓)。本題宮縮時胎心加速為「正常現象」(A)。","options":{"A":"正確。宮縮時胎心加速為正常現象。","B":"胎頭受壓造成早期減速,非加速。","C":"胎盤功能不良造成晚期減速。","D":"臍帶受壓造成變異性減速。"},"sources":["新文京《產科護理學》胎心率加速","胎兒監測"]}},"107030-N4-29":{"quick":"胎心率下降至100 bpm、減速時間與宮縮「沒一定關係」,最可能為變異性減速。","detail":{"background":"胎心率減速與宮縮關係:減速「與宮縮沒有固定時間關係、突發突止、形狀不定」者為「變異性減速(variable deceleration)」,因臍帶受壓。本例頸口8cm、+2、已破水,破水後臍帶易受壓,胎心降至100且與宮縮無固定關係→變異性減速(D)。處置:改變姿勢、給氧、停催產素、陰道內診排除臍帶脫垂。","options":{"A":"非正常(已減速至100)。","B":"早期減速與宮縮同步。","C":"晚期減速延遲於宮縮、有固定關係。","D":"正確。與宮縮無固定關係=變異性減速(臍帶受壓)。"},"sources":["新文京《產科護理學》變異性減速","胎心率監測"]}},"107110-N4-17":{"quick":"獨自待產者出現「宮縮間歇時的壓力仍達50 mmHg(子宮高張、休息不足)」需立即通知醫師。","detail":{"background":"待產異常需立即通知醫師的徵象:子宮「高張性收縮(宮縮間歇期休息不足、靜止張力過高,如間歇時壓力仍達50 mmHg)」、胎兒窘迫(持續心搏過緩、晚期減速、變異消失)、大量出血、臍帶脫垂、產程急遽進展或停滯等。其餘:宮縮時胎心110–120屬正常範圍邊緣、破水2小時內無規則宮縮可觀察、情緒哭泣需支持但非醫療急症。本題需立即通知醫師者為「宮縮間歇壓力50 mmHg(高張)」(D)。","options":{"A":"情緒哭泣需支持,非醫療急症。","B":"宮縮時胎心110–120在正常範圍邊緣。","C":"破水2小時內無規則宮縮可觀察。","D":"正確。宮縮間歇壓力仍達50 mmHg(子宮高張),需立即通知。"},"sources":["新文京《產科護理學》子宮高張收縮","產程異常"]}},"108110-N4-11":{"quick":"胎心率變異性6~10 bpm屬中度變異,表示胎兒正常(神經調控與氧合良好)。","detail":{"background":"胎心率變異性(variability)分級:消失(absent,0)、微量(minimal,<5)、中度(moderate,6–25,正常,表示自主神經調控與氧合良好)、顯著(marked,>25)。本例變異性6–10屬「中度變異」=「胎兒正常」。變異性消失/微量才可能提示缺氧、藥物、睡眠或瀕死。本題6–10 bpm=「胎兒正常」(D)。","options":{"A":"中度變異表示正常,非感染指標。","B":"中度變異表示氧合良好,非缺氧。","C":"瀕死多為變異消失,非6–10。","D":"正確。變異性6–10(中度)=胎兒正常。"},"sources":["新文京《產科護理學》胎心率變異性","胎兒監測"]}},"108110-N4-13":{"quick":"ROA、station 0的待產婦,胎心音轉送器放於「肚臍與右側髂骨前上棘連線中點」最清楚。","detail":{"background":"胎心音聽診/監測器放置依胎背:ROA(右枕前)胎背在母體右前,胎心於「右下象限——肚臍與右側髂骨前上棘(臍棘線)連線中點」最清楚。LOA則放左側對應位置。本題ROA為「肚臍與右側髂骨前上棘連線中點」(C)。","options":{"A":"肚臍上1cm非ROA位置。","B":"與肚臍平行右3cm非標準聽診點。","C":"正確。ROA於肚臍與右髂骨前上棘連線中點。","D":"肚臍與恥骨聯合連線中點非ROA最佳位置。"},"sources":["新文京《產科護理學》胎心音聽診","ROA"]}},"108110-N4-33":{"quick":"前置胎盤住院護理中「執行陰道檢查」為錯誤——前置胎盤禁陰道內診(易誘發大出血)。","detail":{"background":"前置胎盤(placenta previa)的護理:嚴禁「陰道內診/陰道檢查」(觸碰前置的胎盤會引發大出血),也禁性交與灌腸;應臥床休息、限制活動、觀察並記錄陰道出血量與性質、監測子宮收縮與胎心率、測量生命徵象、備血,依出血量與週數採期待療法或剖腹產。本題問「錯誤」者為「執行陰道檢查」(A)。","options":{"A":"錯誤(本題答案)。前置胎盤禁陰道檢查(易大出血)。","B":"正確。監測子宮收縮及胎心率。","C":"正確。觀察陰道出血狀況。","D":"正確。測量生命徵象。"},"sources":["新文京《產科護理學》前置胎盤護理","妊娠出血"]}},"109030-N4-15":{"quick":"待產胎心音監測敘述中「持續性監測可大幅降低周產期死亡率」為錯誤。","detail":{"background":"胎心音監測實證:對「低危險」妊娠,持續性電子胎兒監測(EFM)「並未證實能大幅降低周產期死亡率或腦性麻痺」,反而「增加剖腹產與器械助產率」(偽陽性多);故低危險者建議「間歇性聽診」即可;「高危險」妊娠才採持續監測,第一產程約每15–30分鐘、第二產程每5–15分鐘評估記錄。本題問「錯誤」者為「持續性監測可大幅降低周產期死亡率」(A)。","options":{"A":"錯誤(本題答案)。持續監測未證實大幅降低周產期死亡率。","B":"正確。持續監測可能增加剖腹產率。","C":"正確。低危險妊娠建議間歇性監測。","D":"正確。高危險妊娠第一產程約每15分鐘記錄。"},"sources":["新文京《產科護理學》胎心音監測實證","EFM"]}},"109030-N4-17":{"quick":"第二產程用力時胎心率出現早發性(早期)減速,原因為胎頭受壓。","detail":{"background":"第二產程(用力娩出)時,胎頭下降受產道與骨盆壓迫,常出現「早期(早發性)減速」——與宮縮同步、對稱,因「胎頭受壓」迷走神經反射,屬良性、不需特殊處置。對照:臍帶受壓→變異性減速、胎盤功能不良→晚期減速。本題第二產程用力時的早期減速,原因為「胎頭受壓」(A)。","options":{"A":"正確。胎頭受壓造成早期減速。","B":"胎兒缺氧多表現為晚期減速/變異消失。","C":"臍帶受壓造成變異性減速。","D":"非子宮缺氧。"},"sources":["新文京《產科護理學》早期減速","第二產程"]}},"110030-N4-16":{"quick":"裝置電子胎兒監測器後,第一優先的監測項目是「評估胎心率基準線」。","detail":{"background":"電子胎兒監測(EFM)判讀步驟(優先序):先確立「胎心率基準線(baseline,正常120–160 bpm)」→再評估「變異性」→「加速」→「減速(及與宮縮關係)」→子宮收縮型態。基準線是判讀其他變化(加速/減速)的參考依據,故「第一優先」是評估胎心率基準線。本題第一優先為「評估胎心率基準線」(B)。","options":{"A":"辨識加速需先有基準線參考。","B":"正確。第一優先評估胎心率基準線。","C":"確立宮縮強度為後續。","D":"確立宮縮頻率為後續。"},"sources":["新文京《產科護理學》EFM判讀步驟","胎兒監測"]}},"110110-N4-17":{"quick":"子宮頸8cm、自然破水、羊水棕綠色、無減速時,最優先護理措施是「測量(評估)胎心率」。","detail":{"background":"破水的優先處置永遠先評估胎兒:此例破水且「羊水呈棕綠色(胎便染色,提示胎兒曾窘迫/缺氧)」,破水後也有臍帶脫垂風險,故「最優先立即評估胎心率」確認胎兒狀況;同時觀察羊水、記錄破水時間、通知醫師。內診、監測宮縮、量體溫脈搏為後續。本題最優先為「測量胎心率」(D)。","options":{"A":"內診為後續(先評估胎兒)。","B":"監測宮縮為後續。","C":"量體溫脈搏為後續。","D":"正確。破水(羊水棕綠)最優先測量胎心率。"},"sources":["新文京《產科護理學》破水/胎便染色","胎兒監測"]}},"111030-N4-13":{"quick":"裝置胎兒監測器時「偵測到與產婦心跳一致的臍帶雜音是正常的」為錯誤。","detail":{"background":"電子胎兒監測注意事項:宮縮壓力傳導器置於「子宮底(收縮最強處)」、胎心率傳導器置於「胎心音最清晰(胎背)處」、固定彈性帶鬆緊以「可容一指」為宜。若監測到的心率「與產婦心跳一致(即母心率)」,代表偵測到的是「母體脈搏(子宮動脈/臍帶雜音為母血流聲),不是胎心」,屬「需重新調整位置的錯誤訊號」,而非正常。本題問「錯誤」者為「偵測到與產婦心跳一致的臍帶雜音是正常的」(D)。","options":{"A":"正確。宮縮壓力傳導器置於子宮底。","B":"正確。胎心率傳導器置於胎心最清晰處。","C":"正確。彈性帶鬆緊以可容一指為宜。","D":"錯誤(本題答案)。偵測到與產婦心跳一致代表母脈、訊號錯誤,非正常。"},"sources":["新文京《產科護理學》電子胎兒監測","EFM操作"]}},"111110-N4-6":{"quick":"NST判讀資料中「宮縮時胎心率出現至少15秒加速」為錯誤——NST是評估「無壓力(非宮縮)」時胎動的胎心加速。","detail":{"background":"無壓力試驗(NST)是「在無子宮收縮(無壓力)」的情況下,觀察「胎動時」胎心率的加速反應:反應型=20–30分鐘內≥2次胎動、每次伴胎心加速≥15 bpm(<32週≥10)、持續≥15秒。它「不是評估宮縮時的加速」(那是壓力試驗CST/OCT)。其餘:變異性、胎動次數、加速幅度皆為NST判讀資料。本題「錯誤」者為「宮縮時胎心率出現至少15秒加速」(A,NST非看宮縮)。","options":{"A":"錯誤(本題答案)。NST看「胎動(非宮縮)」時的胎心加速。","B":"變異性為NST判讀資料之一。","C":"胎動次數(前後10分鐘)為判讀資料。","D":"胎心率加速幅度為判讀資料。"},"sources":["新文京《產科護理學》NST vs CST","胎兒監測"]}},"112030-N4-14":{"quick":"胎心率變異性減速時,應進行陰道內診確認臍帶是否受壓,必要時協助左側臥。","detail":{"background":"變異性減速(variable deceleration):形狀不定、突發突止、與宮縮無固定關係,因「臍帶受壓」。處置:協助「改變姿勢(左側臥)」解除臍帶受壓、給氧、停催產素、「陰道內診確認有無臍帶脫垂」、必要時抬高先露減壓。選項A描述的是晚期減速(宮縮高峰開始);變異性減速非「灌流過度」、亦非第二產程的正常現象需處置。本題正確為「內診確認臍帶受壓、必要時左側臥」(B)。","options":{"A":"宮縮高峰才開始變慢為晚期減速,非變異性。","B":"正確。內診確認臍帶受壓、必要時左側臥。","C":"變異性減速因臍帶受壓,非灌流過度。","D":"變異性減速為異常,非正常觀察即可。"},"sources":["新文京《產科護理學》變異性減速處置","胎兒監測"]}},"112030-N4-16":{"quick":"第一產程活動期,於宮縮「休息期」胎心率仍為90 bpm(持續過緩),應立即通知醫師。","detail":{"background":"胎心率基準線正常為120–160 bpm。若在宮縮「休息期(基準線)」胎心率仍持續為90 bpm(基準線心搏過緩,bradycardia),提示胎兒可能缺氧/窘迫,屬異常,應「立即通知醫師」並採子宮內復甦(左側臥、給氧、停催產素、靜脈輸液)。本題休息期胎心90 bpm(過緩)→立即通知醫師(A)。子宮頸未全開不可用力。","options":{"A":"正確。休息期胎心90(過緩)為異常,立即通知醫師。","B":"錯。90 bpm低於正常基準線,非正常。","C":"錯。第一產程不可用力。","D":"呼吸技巧非此異常的處置。"},"sources":["新文京《產科護理學》胎心率過緩","胎兒窘迫"]}},"112030-N4-17":{"quick":"持續性胎心音監測可同時得知胎心率基準線與週期性變化(加速/減速)。","detail":{"background":"胎心音監測敘述:杜卜勒/聽診屬「間歇性」監測,「無法做連續性監測」(連續需電子胎兒監測器EFM);「持續性電子監測(EFM)可同時得知胎心率基準線、變異性與週期性變化(加速、減速及與宮縮關係)」(正確);Leopold第三段判斷先露(第二段判斷胎背);高危險待產婦第一產程潛伏期約每30分鐘(活躍期每15分鐘)評估,非「每1小時」。本題正確為「持續監測可得基準線與週期性變化」(C)。","options":{"A":"杜卜勒為間歇性,無法連續監測。","B":"判斷胎背為Leopold第二段。","C":"正確。持續性監測可得基準線與週期性變化。","D":"高危險者潛伏期約每30分鐘評估,非每1小時。"},"sources":["新文京《產科護理學》胎心音監測","EFM"]}},"112110-N4-14":{"quick":"活動期「10分鐘內不論有無宮縮,胎心率最高140、最低136(變異性過小)」需要特別處理。","detail":{"background":"胎心率變異性是評估胎兒健康的重要指標:中度變異(6–25 bpm)為正常。選項B「10分鐘內最高140、最低136」=變異性僅約4 bpm(微量/過小),提示胎兒可能缺氧、睡眠、藥物或酸中毒,「需要特別處理(進一步評估)」。其餘:A基準線128–148屬正常變異;C宮縮後加速為正常;D雖用力期降至110但宮縮結束回138(早期/變異減速且回復),較B的變異性過小不需特別處理為輕。本題需特別處理者為B(變異性過小)。","options":{"A":"128–148屬正常變異,不需特別處理。","B":"正確。最高140最低136(變異性過小)需特別處理。","C":"宮縮後加速為正常反應。","D":"用力期短暫降至110、回復138,較B不需特別處理。"},"sources":["新文京《產科護理學》胎心率變異性","胎兒監測"]}},"112110-N4-34":{"quick":"12:00入院4cm、宮縮自然變快變強、10分鐘≥5次、14:50娩出(約3小時)屬急產,產後應評估子宮頸與產道有無撕裂傷。","detail":{"background":"急產(precipitous labor):總產程「<3小時(自規則宮縮至胎兒娩出)」即急產;本例約2小時50分快速娩出。風險:產道/子宮頸/會陰「撕裂傷(因快速擴張娩出)」、產後出血(子宮收縮乏力)、子宮破裂;胎兒則因快速娩出有缺氧、顱內出血、感染(若無菌準備不及)等。產後護理「應評估子宮頸與產道是否有撕裂傷」並監測出血。本題正確為「急產,產後應評估子宮頸及產道撕裂傷」(A)。","options":{"A":"正確。急產產後應評估子宮頸與產道撕裂傷。","B":"胎兒風險為缺氧/顱內出血,非以「感染失溫」為主。","C":"此為急產(產程過快),非產程延滯/處置不當。","D":"非以「腦缺氧致心跳加速」為產後評估重點。"},"sources":["新文京《產科護理學》急產","產道撕裂傷"]}},"113030-N4-7":{"quick":"子宮頸8cm、自然破水時,最優先的護理處置是「監測胎心率變化」。","detail":{"background":"破水後最優先永遠是評估胎兒——破水瞬間臍帶可能滑出受壓(臍帶脫垂)致急性缺氧,故「最優先立即監測胎心率變化」,並觀察羊水量色味、記錄破水時間。灌腸、給氧、平躺皆非最優先(平躺反增下腔靜脈壓迫;無窘迫不需常規給氧)。本題最優先為「監測胎心率變化」(B)。","options":{"A":"破水後不灌腸(臍帶脫垂/感染風險)。","B":"正確。破水後最優先監測胎心率。","C":"無窘迫不需常規給氧。","D":"平躺增下腔靜脈壓迫,非最優先。"},"sources":["新文京《產科護理學》破水處置","胎兒監測"]}},"113100-N4-3":{"quick":"NST判讀為「反應型」者,可預測一週內胎兒處於健康狀態。","detail":{"background":"NST(無壓力試驗):約妊娠「28週後」可較可靠施測(非26週才開始的硬性界線);評估「無壓力(非宮縮)」時胎動的胎心加速;一般監測「20分鐘(必要時延長至40分鐘)」即可判讀(非需60分鐘以上);「反應型(reactive)」表示胎兒氧合良好,「可預測約一週內胎兒處於健康狀態(陰性預測值佳)」。本題正確為「反應型可預測一週內胎兒健康」(D)。","options":{"A":"約28週後較可靠,非26週的硬性界線。","B":"NST測「胎動(非宮縮)」時的胎心型態。","C":"一般20(–40)分鐘即可判讀,非需60分鐘以上。","D":"正確。反應型可預測約一週內胎兒健康。"},"sources":["新文京《產科護理學》NST","胎兒監測"]}},"113100-N4-7":{"quick":"子宮頸6cm活動期待產婦,「擔心隨時生產而禁止下床」為不適當措施。","detail":{"background":"活動期(子宮頸6cm)、胎膜完整、無異常的待產婦照護:至少每30分鐘評估胎心率與宮縮、每2小時提醒排空膀胱(利胎頭下降)、教導呼吸法減痛;「不需因擔心而禁止下床」——胎膜完整時鼓勵下床走動、變換姿勢可促進有效宮縮與舒適。本題「不適當」者為「應禁止待產婦下床」(C)。","options":{"A":"適當。至少每30分鐘測胎心率與宮縮。","B":"適當。每2小時評估膀胱排空。","C":"不適當(本題答案)。胎膜完整不需禁止下床,可活動。","D":"適當。教呼吸法減輕疼痛。"},"sources":["新文京《產科護理學》活動期護理","待產活動"]}},"113180-N4-7":{"quick":"護理紀錄「Effacement: 50%」表示子宮頸變薄(消失)程度達50%。","detail":{"background":"子宮頸的兩個變化:「消失/變薄(effacement)」——子宮頸管縮短變薄的程度,以百分比表示(0%未變薄→100%完全變薄如紙);「擴張(dilatation)」——子宮頸口開大程度,以公分表示(0→10cm全開)。本題「Effacement: 50%」=「子宮頸變薄程度達50%」(A)。胎頭下降以station(公分)表示,非effacement。","options":{"A":"正確。Effacement 50%=子宮頸變薄程度50%。","B":"胎心音變異性非effacement。","C":"胎頭下降以station表示,非effacement。","D":"胎兒內轉非effacement。"},"sources":["新文京《產科護理學》子宮頸消失","產程評估"]}},"113180-N4-24":{"quick":"胎心率100、持續80秒、與宮縮「沒有一定關係」,為變異性減速。","detail":{"background":"胎心率減速與宮縮關係:與宮縮「沒有固定時間關係、突發突止、形狀不定」者為「變異性減速(variable deceleration)」,因臍帶受壓。本例胎心100、持續80秒、與宮縮無固定關係→變異性減速(B)。早發/晚發減速皆與宮縮有固定時間關係(同步/延遲)。處置:改變姿勢、給氧、停催產素、排除臍帶脫垂。","options":{"A":"已減速至100,非正常。","B":"正確。與宮縮無固定關係=變異性減速。","C":"早發性減速與宮縮同步。","D":"晚發性減速延遲於宮縮、有固定關係。"},"sources":["新文京《產科護理學》變異性減速","胎心率監測"]}},"114100-N4-6":{"quick":"NST 30分鐘有5次以上胎動、每次胎心加速20 bpm持續≥20秒,判讀為「反應型;正常」。","detail":{"background":"NST反應型(reactive)標準:約20–30分鐘內≥2次胎動,每次胎動伴胎心率加速≥15 bpm(<32週放寬≥10)、持續≥15秒。本例32週、30分鐘≥5次胎動、每次加速20 bpm、持續≥20秒,完全符合「反應型」,表示胎兒氧合與自主神經調控良好,判讀「反應型;正常」(A)。(「陽性/陰性」用於壓力試驗CST,非NST。)","options":{"A":"正確。≥2次胎動伴加速≥15/15秒=反應型;正常。","B":"此例符合反應型,非不反應型。","C":"「陽性」為CST用語,非NST。","D":"「陰性」為CST用語,非NST。"},"sources":["新文京《產科護理學》NST判讀","胎兒監測"]}},"114100-N4-9":{"quick":"電子胎兒監測說明中「每分鐘跑1公分時,每一小格代表1分鐘」為最不適當(時間刻度錯誤)。","detail":{"background":"電子胎兒監測紀錄紙判讀:上方曲線為胎心率、下方曲線為子宮收縮;走紙速度台灣常設「每分鐘3公分」(每大格=1分鐘、每小格=10秒)。若「設定每分鐘跑1公分」則每一大格(1公分)=1分鐘、「每一小格(0.2公分)=12秒」,並非「每一小格代表1分鐘」,故此說明錯誤。本題「最不適當」者為「每分鐘1公分時每一小格代表1分鐘」(D)。","options":{"A":"適當。上面曲線代表寶寶心跳。","B":"適當。下面曲線代表子宮收縮。","C":"適當。可監測宮縮時胎心變化評估胎兒健康。","D":"最不適當(本題答案)。每分鐘1公分時每小格非1分鐘(時間刻度錯誤)。"},"sources":["新文京《產科護理學》EFM紀錄紙","胎兒監測"]}},"114170-N4-6":{"quick":"NST正確敘述:觀察胎兒心跳型態的變化(1)、建議於第三孕期檢測(3)。","detail":{"background":"NST(無壓力試驗)要點:(1)「觀察胎兒心跳(胎心率)型態的變化(胎動時的加速反應)」——正確;(2)一般監測「20(–40)分鐘」即可,「並非至少60分鐘」;(3)「建議於第三孕期(約28週後)檢測」——胎兒自主神經較成熟、結果可靠——正確;(4)「胎心率加速表示胎兒健康(氧合良好),非缺氧」。本題正確組合為(1)(3)即13(B)。","options":{"A":"含「至少記錄60分鐘」(2)錯誤。","B":"正確。觀察胎心型態變化(1)+第三孕期檢測(3)。","C":"含(2)(4)錯誤。","D":"含「胎心加速表缺氧」(4)錯誤。"},"sources":["新文京《產科護理學》NST","胎兒監測"]}},"115030-N4-7":{"quick":"子宮頸4cm、羊膜完整、無異常的待產婦詢問下床,最適當回答是「可以,但要注意安全」。","detail":{"background":"低危險、胎膜完整(羊膜完整)、無異常的待產婦(頸口4cm、station 0、胎心正常),鼓勵下床走動、變換姿勢可促進有效宮縮與舒適,並無禁忌,僅需「注意安全(陪同、防跌、避免久站不適)」。不需限制「只能床上翻身/只能上廁所」,胎膜完整下床也不會因此「容易破裂」。本題最適當為「可以,但要注意安全」(B)。","options":{"A":"不需限制只能床上翻身。","B":"正確。可以下床,但要注意安全。","C":"不需限制只能上廁所。","D":"胎膜完整下床不會因此容易破裂。"},"sources":["WHO 正常產照護","新文京《產科護理學》待產活動"]}},"115030-N4-9":{"quick":"電子胎心音監測敘述中「健康待產婦建議持續使用」為錯誤——低風險者建議間歇性監測。","detail":{"background":"電子胎心音監測(EFM)實證:對「低風險/健康」待產婦,「不建議常規持續使用」(持續監測增加剖腹產與器械助產率、未改善預後),應採「間歇性聽診」;有助了解宮縮與胎心的持續性變化、未破水或子宮頸尚未擴張亦可用「體外(間接)」方式監測、需調節機器音量避免干擾休息。本題問「錯誤」者為「健康待產婦建議持續使用」(B)。","options":{"A":"正確。有助了解宮縮及胎心的持續性變化。","B":"錯誤(本題答案)。健康(低風險)待產婦建議間歇性監測,非持續。","C":"正確。未破水/未擴張皆可用體外方式監測。","D":"正確。注意調節音量以免干擾休息。"},"sources":["WHO 正常產照護/EFM","新文京《產科護理學》"]}},"103030-N4-15":{"quick":"待產避免長時間固定平躺,主要理由是平躺會「降低胎盤血流」(仰臥位低血壓)。","detail":{"background":"待產時長時間仰臥(平躺)的危害:增大的子宮壓迫下腔靜脈與腹主動脈,使靜脈回流與心輸出量下降→母體血壓下降(仰臥位低血壓症候群)、子宮胎盤灌流(胎盤血流)減少→胎兒可能缺氧、胎心異常。故鼓勵採「左側臥」或變換姿勢、下床活動。本題平躺最可能造成「降低胎盤血流」(A)。","options":{"A":"正確。平躺壓迫下腔靜脈,降低胎盤血流。","B":"平躺使血壓下降,非增加。","C":"非主要為阻礙恥骨聯合活動。","D":"平躺不增重力助產,反不利。"},"sources":["新文京《產科護理學》仰臥位低血壓","待產體位"]}},"103100-N4-17":{"quick":"待產生產姿勢說明中「採平躺能兼顧舒適並減少對會陰的壓力」為錯誤。","detail":{"background":"生產姿勢:平躺(仰臥)壓迫下腔靜脈降低胎盤血流、增加會陰壓力且不利胎頭下降與用力,並非「兼顧舒適、減少會陰壓力」;直立(坐、蹲、跪、生產椅)藉地心引力助胎頭下降;辛氏左側臥不壓迫下腔靜脈、不影響下肢靜脈回流;手膝(跪姿)有助枕後位迴轉。本題「錯誤」者為「採平躺兼顧舒適及減少會陰壓力」(A)。","options":{"A":"錯誤(本題答案)。平躺不利且增會陰壓力,非減少。","B":"正確。生產椅藉地心引力助胎頭下降。","C":"正確。辛氏左側臥不影響下肢靜脈回流。","D":"正確。手膝跪姿支撐上半身可助迴轉。"},"sources":["新文京《產科護理學》生產姿勢","待產體位"]}},"103100-N4-18":{"quick":"待產婦口乾、下腹酸痛、全身燥熱時,「採平躺減少背部壓迫」為不恰當措施。","detail":{"background":"待產舒適護理:口乾可給口含冰塊或冷毛巾敷後頸/額頭降溫;下腹酸痛可下腹「熱敷」或按摩;全身燥熱給涼爽環境。但「平躺(仰臥)」會壓迫下腔靜脈降低胎盤血流、不利舒適與胎頭下降,故「採平躺減少背部壓迫」不恰當(應採左側臥或舒適直立姿勢)。本題不恰當者為D。","options":{"A":"恰當。冷毛巾敷後頸降溫。","B":"恰當。口含冰塊緩解口乾。","C":"恰當。下腹熱敷緩解酸痛。","D":"不恰當(本題答案)。平躺壓迫下腔靜脈、降胎盤血流,不宜。"},"sources":["新文京《產科護理學》待產舒適","待產體位"]}},"104030-N4-9":{"quick":"待產婦手腳麻、頭昏(過度換氣所致),適當措施是「教導減慢呼吸速度」。","detail":{"background":"過度換氣(hyperventilation):待產疼痛緊張時呼吸過快過深,使二氧化碳排出過多→呼吸性鹼中毒→「頭暈、嘴唇與手指麻刺、四肢痙攣、定向感障礙」。本例呼吸24次/分、手腳麻頭昏即過度換氣。處置:「教導減慢呼吸速度」、以雙手摀口鼻或用紙袋回吸自己呼出的CO2使二氧化碳回升,症狀即緩解;「不可給氧氣(會更降CO2)」。本題適當為「教導減慢呼吸速度」(D)。","options":{"A":"錯。過度換氣不可給氧(會更降CO2)。","B":"手腳麻為鹼中毒,非循環不良,按摩熱敷無效。","C":"垂頭仰臥非處置。","D":"正確。教導減慢呼吸速度(或紙袋回吸CO2)。"},"sources":["新文京《產科護理學》過度換氣","待產呼吸"]}},"104030-N4-16":{"quick":"產程初期鼓勵下床走動的理由「不」包括「避免下腔靜脈受壓」。","detail":{"background":"產程初期鼓勵下床走動/直立活動的理由:藉地心引力「促進胎兒先露部下降與旋轉」、增加「子宮有效收縮」、促進「子宮頸擴張」、增進舒適與控制感、縮短產程。至於「避免下腔靜脈受壓」是「採左側臥(而非平躺)」的好處,不是「下床走動」的特定理由。本題「不是鼓勵下床走動理由」者為「避免下腔靜脈受壓」(C)。","options":{"A":"是理由。下床走動促進子宮有效收縮。","B":"是理由。促進子宮頸擴張。","C":"本題答案(非下床走動理由)。避免下腔靜脈受壓是左側臥的好處。","D":"是理由。促使先露部旋轉或下降。"},"sources":["新文京《產科護理學》待產活動","產程護理"]}},"104100-N4-10":{"quick":"最符合WHO「友善生產」概念的是「可以隨意進食清淡飲食」。","detail":{"background":"WHO友善生產/正常產照護:尊重產婦自主與舒適——鼓勵「低風險者於產程中進食清淡飲食與補水(不常規禁食)」、自由活動與選擇姿勢、間歇性胎心音聽診、陪產支持、「不常規剃陰毛、不常規灌腸、不常規會陰切開、不常規完全臥床」。本題最符合者為「可以隨意進食清淡飲食」(C)。","options":{"A":"陰部剃薙為不建議的常規措施。","B":"完全臥床待產不符友善生產。","C":"正確。可隨意進食清淡飲食。","D":"常規會陰切開不符友善生產。"},"sources":["WHO 友善生產","新文京《產科護理學》"]}},"105030-N4-14":{"quick":"頸口6cm、先露−1五小時無進展、恥骨聯合上方膨出,應優先評估「膀胱脹的情形」。","detail":{"background":"產程停滯且「恥骨聯合上方膨出(膀胱脹滿的徵象)」時,優先評估「膀胱脹尿」:脹大的膀胱會阻礙胎頭下降與有效宮縮、造成產程遲滯(先露−1未降、宮縮變不規則),應協助排尿或導尿排空膀胱。故首要評估膀胱脹的情形(A),而非先評估宮縮、胎位或出血。","options":{"A":"正確。恥骨上膨出提示膀胱脹,優先評估膀胱。","B":"宮縮變化可能源於膀胱脹,先評估膀胱。","C":"胎位非此情境首要(已先露−1)。","D":"無出血徵象,非首要。"},"sources":["新文京《產科護理學》膀胱脹與產程","待產護理"]}},"106110-N4-12":{"quick":"生產會陰消毒原則中「由肛門口開始至尿道口」為錯誤——應「由尿道口(乾淨處)往肛門(污染處)」消毒。","detail":{"background":"會陰消毒(無菌)原則:由「乾淨」往「污染」方向、由內往外、不重複來回。順序:由「陰阜→恥骨上方」、「尿道口→陰道口→會陰→肛門」、「大腿內側由上往下」,每一筆由乾淨處到污染處後即丟棄棉球。「由肛門口開始往尿道口」方向相反(把肛門污染帶向尿道/陰道),為錯誤。常用水溶性優碘。本題「錯誤」者為「由肛門口開始至尿道口」(C)。","options":{"A":"正確。由陰阜往上至下腹部(乾淨往外)。","B":"正確。腹股溝內側至大腿前半段。","C":"錯誤(本題答案)。應由尿道口往肛門,非由肛門往尿道口。","D":"正確。通常採水溶性優碘。"},"sources":["新文京《產科護理學》會陰消毒","無菌原則"]}},"106110-N4-18":{"quick":"G3P0待產12小時主訴「想用力」時,最佳評估是「先內診了解是否適合用力」。","detail":{"background":"出現「想用力(便意感/不自主用力衝動)」時,不能立即讓產婦用力——須「先內診評估子宮頸是否完全擴張(全開)、胎頭下降程度」:若子宮頸尚未全開即用力會致子宮頸水腫撕裂、產婦疲憊;若已全開則指導用力娩出。本例G3P0(初產婦)待產12小時想用力,最佳是「先內診評估是否適合用力」(A),而非逕自讓她用力、送產房或告知正常。","options":{"A":"正確。先內診評估是否適合用力(子宮頸是否全開)。","B":"不可僅當作正常側躺,需評估。","C":"未確認全開即送產房過早。","D":"未確認全開即教用力會致子宮頸水腫。"},"sources":["新文京《產科護理學》用力時機","陰道內診"]}},"108020-N4-17":{"quick":"待產與生產姿勢敘述中「採膀胱截石臥位較能有效用力及減少疲勞」為錯誤。","detail":{"background":"生產姿勢:待產應允許自由活動與變換姿勢;生產時「直立(坐、蹲、跪、前傾)姿勢」藉地心引力助胎頭下降、減少下腔靜脈壓迫、較少胎心異常、產婦較能有效用力。「膀胱截石臥位(仰臥兩腿上腳架)」雖方便醫師接生,但增下腔靜脈壓迫、產婦較費力疲累、用力效率較差,並非「較能有效用力及減少疲勞」。本題「錯誤」者為B。","options":{"A":"正確。待產應允許自由活動或變換姿勢。","B":"錯誤(本題答案)。膀胱截石臥位非較能有效用力及減少疲勞。","C":"正確。背部直立姿勢有利胎兒下降。","D":"正確。直立姿勢減少下腔靜脈壓迫、較少胎心異常。"},"sources":["新文京《產科護理學》生產姿勢","第二產程"]}},"112030-N4-13":{"quick":"待產陰道內診敘述中「於子宮收縮時進行檢查」為錯誤——應於「宮縮間歇期」進行。","detail":{"background":"待產陰道內診:採無菌原則、以食指與中指深入陰道、產婦採大腿彎曲且外展(屈膝外展)姿勢、動作輕柔;應於「子宮收縮間歇期(休息期)進行」——宮縮時子宮頸與先露受壓、檢查不準且疼痛加劇,故避免在宮縮當下檢查。本題「錯誤」者為「於子宮收縮時進行檢查」(C)。","options":{"A":"正確。內診須注意無菌原則。","B":"正確。以食指及中指深入檢查。","C":"錯誤(本題答案)。應於宮縮間歇期檢查,非宮縮時。","D":"正確。產婦採大腿彎曲外展姿勢。"},"sources":["新文京《產科護理學》陰道內診","產程評估"]}},"113180-N4-21":{"quick":"臍帶脫垂處置中「將脫出的臍帶再推回子宮內」為錯誤。","detail":{"background":"臍帶脫垂(cord prolapse)是產科急症(臍帶受壓致胎兒急性缺氧):處置——「不可將脫出的臍帶推回子宮內」(會增加臍帶受壓與血管痙攣);應「戴無菌手套由陰道將先露部往上頂、解除臍帶受壓」、採「膝胸臥位或頭低臀高」減壓、以無菌生理食鹽水濕紗布覆蓋外露臍帶保溫保濕、給氧、若子宮頸未全開則「緊急剖腹生產」。本題「錯誤」者為「將脫出臍帶推回子宮內」(A)。","options":{"A":"錯誤(本題答案)。不可將脫出臍帶推回子宮內。","B":"正確。以無菌生理食鹽水紗布覆蓋臍帶。","C":"正確。子宮頸未全開時緊急剖腹生產。","D":"正確。戴無菌手套由陰道將先露部往上頂減壓。"},"sources":["新文京《產科護理學》臍帶脫垂","產科急症"]}},"101030-N4-27":{"quick":"減輕生產不適的方法中「抑制情緒、避免喊叫」為錯誤——不應壓抑情緒。","detail":{"background":"非藥物減痛/舒適措施:薦骨重壓或按摩、坐生產球、冷熱敷、溫水淋浴/泡澡、呼吸放鬆技巧、音樂、變換姿勢、陪伴支持。產婦「適度發聲、表達情緒」有助放鬆與宣洩,「抑制情緒、避免喊叫」反而增加緊張(害怕-緊張-疼痛循環)、不利放鬆。本題「錯誤」者為「抑制情緒、避免喊叫」(D)。","options":{"A":"正確。薦骨重壓或按摩可減痛。","B":"正確。坐生產球可減痛。","C":"正確。冷熱敷可緩解不適。","D":"錯誤(本題答案)。不應抑制情緒、避免喊叫。"},"sources":["新文京《產科護理學》非藥物減痛","害怕緊張疼痛循環"]}},"101030-N4-36":{"quick":"產婦要求立即無痛分娩但產程尚不適合時,應「解釋目前產程尚無法採用、並提供其他減痛措施」。","detail":{"background":"硬膜外(無痛)分娩有「時機」考量:一般於進入「活動期(子宮頸約4cm以上)、規則宮縮」後施行較適當(過早可能延長產程);若產程尚未達適合時機,護理師應「同理產婦疼痛、解釋目前產程尚無法採用無痛分娩的原因、並提供其他減痛措施(呼吸放鬆、按摩、熱敷、姿勢、陪伴)」,而非質疑其「誇大產痛」或逕自準備。本題最適當為A。","options":{"A":"正確。解釋目前尚無法無痛分娩,並提供其他減痛措施。","B":"未評估產程是否適合即準備,不當。","C":"以宮縮壓力低質疑「誇大產痛」,不當(疼痛主觀)。","D":"局部會陰浸潤用於會陰縫合,非待產減痛。"},"sources":["新文京《產科護理學》硬膜外減痛時機","減痛"]}},"101030-N4-39":{"quick":"關於產痛,正確描述是「分娩及生產期間的疼痛是一種正常生理現象」。","detail":{"background":"產痛(labor pain)的認知:分娩生產的疼痛是「正常生理現象」(子宮收縮、子宮頸擴張、產道與會陰伸展所致),屬可預期的功能性疼痛。疼痛是「主觀經驗」——產婦說痛就是痛(以其主訴為準);產痛主要與「子宮頸伸展與壓力、子宮缺氧」等生理因素有關(認知/情緒會調節感受但非主因);焦慮害怕會「加重(放大)」疼痛(害怕-緊張-疼痛循環),非「轉移」疼痛。本題正確為「產痛是正常生理現象」(A)。","options":{"A":"正確。分娩生產疼痛是正常生理現象。","B":"錯。疼痛是主觀,產婦感受到痛即是痛。","C":"錯。產痛主要為生理因素(子宮頸伸展壓力),非僅認知。","D":"錯。焦慮害怕會加重疼痛,非轉移。"},"sources":["新文京《產科護理學》產痛","疼痛概念"]}},"101110-N4-52":{"quick":"子宮頸擴張約2cm(潛伏期)的待產婦,可引導其做「緩慢的胸式呼吸」。","detail":{"background":"拉梅茲呼吸法依產程深淺:潛伏期(0–3cm,宮縮較弱)——「緩慢的胸式呼吸(慢而深,約正常呼吸速率)」即可;活動期(宮縮較強)——較快較淺的呼吸;過渡期(8–10cm,宮縮最強)——「喘息-吹氣(hee-hee-blow)、淺速呼吸」;不自主用力衝動但子宮頸未全開時——「哈氣/吹蠟燭」抑制用力。本例2cm(潛伏期)宜「緩慢的胸式呼吸」(B)。","options":{"A":"喘息-吐氣式用於過渡期(宮縮最強)。","B":"正確。潛伏期(2cm)宜緩慢胸式呼吸。","C":"吹蠟燭用於抑制過早用力。","D":"淺吸式胸部呼吸用於較強宮縮的活動期。"},"sources":["新文京《產科護理學》拉梅茲呼吸法","潛伏期"]}},"101110-N4-53":{"quick":"待產婦「宮縮超過90秒、且10分鐘內宮縮壓力小於10 mmHg」屬異常徵象。","detail":{"background":"子宮收縮的正常範圍:持續時間約30–90秒、間歇期休息≥30秒(休息期子宮張力低)、頻率隨產程增頻。異常:「宮縮持續時間過長(>90秒)」或「子宮張力/收縮過弱(10分鐘內壓力<10 mmHg,低張性無效宮縮)」、或宮縮過頻無休息(高張)。子宮頸9cm有不自主用力、全開時用力胎頭下降、全開用力30分鐘未娩出皆屬正常範圍。本題異常者為「宮縮超過90秒且10分鐘內壓力<10 mmHg」(C)。","options":{"A":"9公分有不自主用力感屬正常進展。","B":"全開時用力胎頭下降屬正常。","C":"正確(異常)。宮縮>90秒且壓力過低(<10mmHg)為異常。","D":"全開用力30分鐘未娩出仍在正常範圍。"},"sources":["新文京《產科護理學》子宮收縮評估","產程異常"]}},"103100-N4-10":{"quick":"第二產程長時間閉氣(Valsalva)用力,可能出現「心臟靜脈血回流降低」。","detail":{"background":"長時間閉氣用力(Valsalva manoeuvre):屏氣使「胸內壓上升」→壓迫胸腔大靜脈→「靜脈血回流心臟降低」→心輸出量下降、血壓波動,進而使「子宮胎盤灌流減少、胎兒血流與氧合下降」;且母血二氧化碳上升。故現代建議「開聲門、順用力衝動、短時間用力」較佳。本題長時間閉氣用力的生理反應為「心臟靜脈血回流降低」(B)。","options":{"A":"錯。閉氣使胸內壓「上升」,非降低。","B":"正確。閉氣使靜脈回流降低、心輸出量下降。","C":"錯。閉氣使母血CO2上升,非降低。","D":"錯。心輸出量下降,非上升。"},"sources":["新文京《產科護理學》Valsalva用力","第二產程"]}},"103100-N4-20":{"quick":"子宮頸8cm移位至產檯時大叫想用力,最佳指導是「請產婦哈氣,待宮縮結束後再移位」。","detail":{"background":"子宮頸尚未全開(8cm)卻出現用力衝動時,過早用力會致子宮頸水腫撕裂;護理應指導「哈氣(panting)」抑制用力衝動;移位/移床等操作宜「待宮縮結束(間歇期)再進行」以策安全與減少不適。本題最佳指導為「請哈氣,待宮縮結束再移位」(B);不宜要求忍耐保持冷靜或任其用力(子宮頸未全開)。","options":{"A":"僅說「不要用力」未給方法。","B":"正確。哈氣抑制用力,宮縮結束再移位。","C":"僅要求忍耐,未給具體方法。","D":"錯。子宮頸未全開不可任其用力。"},"sources":["新文京《產科護理學》哈氣呼吸","過渡期"]}},"104030-N4-13":{"quick":"子宮頸9cm主訴「尾椎快斷」(枕後位下背痛),最適當措施是「用手掌重壓骶骨處」。","detail":{"background":"第一產程末/過渡期、尤枕後位常有劇烈「下背(腰薦)痛(背部分娩痛)」。依閘門控制理論,以「骶骨(薦骨)重壓法(counterpressure,手掌用力壓骶骨)」可有效減輕下背痛;另可冷熱敷骶骨、按摩、變換姿勢(手膝跪姿)。本例9cm尾椎痛,最適當為「手掌重壓骶骨」(B);此時子宮頸近全開,輕撫腹部+深呼吸減痛有限,且不宜為此先解尿或做骨盆搖擺。","options":{"A":"輕撫腹部深呼吸對劇烈下背痛效果有限。","B":"正確。手掌重壓骶骨減輕下背(腰薦)痛。","C":"解尿非此情境減痛重點。","D":"骨盆搖擺非9cm劇痛時首選。"},"sources":["新文京《產科護理學》骶骨重壓法","閘門控制理論"]}},"104030-N4-14":{"quick":"真陣痛的特徵是「子宮收縮會使子宮頸變薄(進行性變化)」。","detail":{"background":"真陣痛(true labor)的決定性特徵:子宮收縮「使子宮頸進行性變薄(消失)與擴張」;且宮縮規則、漸強、漸密、走動「不會緩解」、疼痛由背至腹。假陣痛則走動可緩解、宮縮不規則、強度不變、疼痛侷限腹部、子宮頸無變化。本題真陣痛特徵為「子宮收縮會使子宮頸變薄」(D)。","options":{"A":"錯。走動緩解為假陣痛。","B":"錯。宮縮不規則為假陣痛。","C":"錯。疼痛侷限腹股溝為假陣痛特徵。","D":"正確。真陣痛使子宮頸變薄(進行性變化)。"},"sources":["新文京《產科護理學》真假陣痛","產程評估"]}},"104100-N4-12":{"quick":"初產婦子宮頸8cm、有便意感、陣痛強而大叫,最恰當措施是「引導喘息式呼吸」。","detail":{"background":"子宮頸8cm(過渡期)出現「便意感與用力衝動」但「尚未全開」,過早用力會致子宮頸水腫撕裂;應引導「喘息式(hee-hee-blow)/哈氣呼吸」抑制用力衝動、協助度過過渡期,並陪伴鼓勵。不宜「叫她不要叫(壓抑情緒)」、「夾緊雙腿等醫師」、或「緊閉嘴用力(8cm未全開不可用力)」。本題最恰當為「引導喘息式呼吸」(C)。","options":{"A":"壓抑情緒不利放鬆。","B":"夾緊雙腿不當且危險。","C":"正確。引導喘息式呼吸抑制過早用力。","D":"錯。8cm未全開不可用力。"},"sources":["新文京《產科護理學》喘息式呼吸","過渡期"]}},"105030-N4-11":{"quick":"第二產程長時間閉氣(Valsalva)用力,可能出現「肺部(胸腔)靜脈回流降低」。","detail":{"background":"長時間閉氣用力使「胸內壓上升」,壓迫胸腔大靜脈→「靜脈回流(肺/體循環回心)降低」→心輸出量下降、子宮胎盤灌流減少、胎兒血流氧合下降,母血CO2上升。故現代建議開聲門、短時用力。本題長時間閉氣的反應為「肺部靜脈回流降低」(B)。","options":{"A":"錯。胸內壓上升,非降低。","B":"正確。閉氣使靜脈回流降低。","C":"錯。母血CO2上升,非降低。","D":"錯。心輸出量下降,非上升。"},"sources":["新文京《產科護理學》Valsalva用力","第二產程"]}},"106030-N4-13":{"quick":"以背部按摩減輕產痛,是根據「門閾(閘門)控制理論(gate control theory)」。","detail":{"background":"閘門控制理論(gate control theory, Melzack & Wall):脊髓背角存在「閘門」,非痛覺的觸覺/壓力刺激(粗神經纖維)可「關閉閘門」、抑制痛覺(細神經纖維)傳入大腦。故「背部/骶骨按摩、撫摸、重壓、冷熱敷、經皮電刺激」可減輕產痛。本題背部按摩減痛是依「門閾(閘門)控制理論」(D)。","options":{"A":"認知控制理論非按摩減痛的機轉。","B":"壓力因應理論非此機轉。","C":"害怕-緊張-疼痛理論說明情緒放大疼痛(Dick-Read)。","D":"正確。背部按摩減痛依閘門控制理論。"},"sources":["新文京《產科護理學》閘門控制理論","非藥物減痛"]}},"106110-N4-13":{"quick":"運用門閾(閘門)理論緩解宮縮疼痛的措施是「尾骶骨按摩」。","detail":{"background":"閘門控制理論的應用是以「觸覺/壓力刺激」競爭抑制痛覺:如「按摩(尾骶骨/背部)、撫摸、骶骨重壓、冷熱敷、經皮電刺激(TENS)」。聽音樂、溫水淋浴、注意力集中(意象法)則屬「認知/分散注意」或放鬆機轉,非直接閘門理論。本題依閘門理論者為「尾骶骨按摩」(C)。","options":{"A":"聽音樂屬分散注意/放鬆,非閘門理論的觸壓刺激。","B":"溫水淋浴屬放鬆機轉。","C":"正確。尾骶骨按摩(觸壓刺激)依閘門理論。","D":"注意力集中法屬認知分散注意。"},"sources":["新文京《產科護理學》閘門控制理論","非藥物減痛"]}},"106110-N4-25":{"quick":"產後痛說明中「子宮收縮疼痛感通常會持續3週」為錯誤——產後痛多在產後2~3天內緩解。","detail":{"background":"產後痛(afterpains):產後子宮間歇性收縮(復舊)引起的下腹絞痛,「經產婦較初產婦明顯」(子宮肌張力較鬆需更強收縮)、「新生兒較大或多胎(子宮過度膨脹)較明顯」、哺乳時(催產素釋放)加劇;多在「產後2–3天內」逐漸減輕,非持續3週。處置:深呼吸、熱敷、按摩、依醫囑止痛。本題「錯誤」者為「持續3週」(D)。","options":{"A":"正確。產後痛因子宮間歇性收縮所致。","B":"正確。經產婦較初產婦疼痛明顯。","C":"正確。新生兒較大者產後痛較明顯。","D":"錯誤(本題答案)。產後痛多2–3天內緩解,非持續3週。"},"sources":["新文京《產科護理學》產後痛","產褥期"]}},"106111-N4-19":{"quick":"待產婦頭暈、嘴唇與手指麻刺,最可能原因為「換氣過度(過度換氣)」。","detail":{"background":"過度換氣(hyperventilation):待產緊張疼痛時呼吸過快過深,CO2排出過多→呼吸性鹼中毒→血中游離鈣下降→「頭暈、嘴唇與手指/四肢麻刺、痙攣、定向感障礙」。處置:減慢呼吸、以手摀口鼻或紙袋回吸CO2。本題嘴唇手指麻刺為「換氣過度」(C),非臥床過久、睡眠不足或低血糖。","options":{"A":"臥床過久不致麻刺。","B":"睡眠不足不致此症狀。","C":"正確。換氣過度致鹼中毒、嘴唇手指麻刺。","D":"低血糖以冒汗心悸為主,非麻刺。"},"sources":["新文京《產科護理學》過度換氣","待產呼吸"]}},"107030-N4-7":{"quick":"拉梅茲生產預備的原理中「分散注意之焦點為條件反射訓練」為錯誤。","detail":{"background":"拉梅茲(Lamaze)生產預備法原理:以「呼吸技巧的反覆訓練建立條件反射」,使產婦面對宮縮時自動以呼吸放鬆因應,打破「害怕-緊張-疼痛」循環;並運用「注意力集中(focal point)、撫摸按摩(閘門理論)」等。其中「分散注意/集中焦點」屬「認知/注意力轉移」策略,而非「條件反射訓練」(條件反射訓練指的是呼吸技巧的反覆制約)。本題「錯誤」者為「分散注意之焦點為條件反射訓練」(A)。","options":{"A":"錯誤(本題答案)。分散注意為認知策略,非條件反射訓練。","B":"正確。呼吸技巧反覆訓練達條件反射。","C":"正確。具因應技巧可免於害怕緊張疼痛循環。","D":"正確。腹部按摩法利用閘門(門閾)理論。"},"sources":["新文京《產科護理學》拉梅茲","條件反射"]}},"107030-N4-16":{"quick":"第二產程護理中正確的是「宮縮間歇期間提醒產婦放鬆休息」。","detail":{"background":"第二產程(用力娩出)護理:配合宮縮用力、「宮縮間歇期提醒產婦放鬆休息以儲備體力」;採直立/半坐臥利用力(抬高頭部約30–45度而非僅10–20度)、用「腹部與橫膈」用力(非肩頸);避免長時間閉氣;不需常規抬高腿部預防血栓。本題正確為「宮縮間歇期提醒放鬆休息」(C)。","options":{"A":"抬高腿部預防血栓非第二產程用力護理重點。","B":"抬高頭部約30–45度,「10–20度」不足以利用力。","C":"正確。宮縮間歇期提醒放鬆休息。","D":"應用腹部與橫膈用力,非肩頸肌肉。"},"sources":["新文京《產科護理學》第二產程護理","用力技巧"]}},"107110-N4-4":{"quick":"潛伏期待產婦最可能的行為反應是「精力充沛、興奮、有信心接受分娩挑戰」。","detail":{"background":"第一產程行為:潛伏期(0–3cm)宮縮較弱、產婦「精力充沛、興奮、健談、有信心、能配合互動」;活動期轉趨專注嚴肅、話變少;過渡期(8–10cm)「焦慮不安、易怒、失去自我控制感、想用力衝動、噁心發抖」。本題潛伏期行為為「精力充沛、興奮、有信心」(D)。","options":{"A":"不自主想用力為過渡期/第二產程。","B":"注意力集中在產痛為活動/過渡期。","C":"疲累失去自我控制感為過渡期。","D":"正確。潛伏期精力充沛、興奮、有信心。"},"sources":["新文京《產科護理學》產程行為","潛伏期"]}},"107110-N4-14":{"quick":"子宮頸全開、第二產程的疼痛主要來自子宮韌帶伸張、陰道及會陰肌肉的伸展。","detail":{"background":"生產疼痛來源依產程:第一產程——子宮收縮、子宮體下段伸展、子宮頸變薄與擴張(經T10–L1傳入,下腹下背痛);「第二產程(子宮頸全開後)——胎兒先露部下降壓迫,子宮韌帶伸張、陰道與會陰肌肉伸展、會陰與骨盆底受壓(經薦神經S2–4傳入),為會陰部劇痛」。本題子宮頸全開時疼痛主要來自「子宮韌帶伸張、陰道及會陰肌肉伸展」(A)。","options":{"A":"正確。第二產程疼痛來自子宮韌帶伸張、陰道會陰伸展。","B":"下腹下背痛為第一產程疼痛位置。","C":"子宮體下段伸展、宮縮缺氧為第一產程來源。","D":"T10–L1傳入為第一產程的神經路徑。"},"sources":["新文京《產科護理學》第二產程疼痛","分娩疼痛"]}},"108020-N4-12":{"quick":"待產婦換氣過度、暈眩、嘴唇與手指麻刺,優先措施是「教導減慢呼吸速率」。","detail":{"background":"過度換氣致呼吸性鹼中毒(暈眩、嘴唇手指麻刺、痙攣)的處置:優先「教導減慢呼吸速率」、以手摀口鼻或紙袋回吸自己呼出的CO2使二氧化碳回升、症狀緩解;「不可給氧(會更降CO2)」、不需加快輸液。本題優先為「教導減慢呼吸速率」(D)。","options":{"A":"錯。過度換氣不可給氧(更降CO2)。","B":"加快輸液非處置。","C":"左側臥非此症狀首要處置。","D":"正確。教導減慢呼吸速率(或紙袋回吸CO2)。"},"sources":["新文京《產科護理學》過度換氣","待產呼吸"]}},"108110-N4-5":{"quick":"廓清式呼吸敘述中「呼吸速率為正常呼吸速率的2倍(約24~32次/分)」為錯誤。","detail":{"background":"廓清式呼吸(cleansing breath):是每次宮縮「開始與結束時各做一次的深呼吸(慢而深,接近正常或略慢的速率)」,作為宮縮起訖的「訊號」、幫助肺部通氣與放鬆、提供胎兒氧氣;它「不是」正常速率2倍的快速呼吸(那是過渡期的喘息/淺速呼吸)。呼吸法依產婦需要與放鬆程度調整。本題「錯誤」者為「速率為正常2倍(24–32次/分)」(C)。","options":{"A":"正確。每次宮縮開始與結束都做一次廓清式呼吸。","B":"正確。可作為肺部通氣及放鬆的訊號。","C":"錯誤(本題答案)。廓清式呼吸為深慢呼吸,非正常速率2倍。","D":"正確。呼吸法依產婦需要與放鬆程度調整。"},"sources":["新文京《產科護理學》廓清式呼吸","拉梅茲"]}},"108110-N4-16":{"quick":"希望免除會陰切開的第二產程護理中「平躺使用腳凳盡力伸展腿部」為錯誤。","detail":{"background":"保護會陰、減少會陰切開/撕裂的措施:溫和「會陰按摩與溫敷」、鼓勵產婦「溫和、緩慢、順著用力衝動向下用力(避免快速猛烈用力)」、控制胎頭緩慢娩出、採「側臥、半坐臥、蹲、手膝」等姿勢使會陰較放鬆。「平躺+腳凳盡力伸展腿部」會使會陰張力增加、且仰臥不利,反增撕裂風險,故為錯誤。本題「錯誤」者為D。","options":{"A":"正確。溫和觸壓按摩會陰。","B":"正確。鼓勵溫和向下用力推進。","C":"正確。配合用力衝動向下推擠。","D":"錯誤(本題答案)。平躺+盡力伸展腿部增會陰張力,不利保護會陰。"},"sources":["新文京《產科護理學》會陰保護","第二產程"]}},"108110-N4-21":{"quick":"產後第2天子宮收縮痛(產後痛)敘述中「約持續7天就會減輕」為錯誤——多在2~3天內減輕。","detail":{"background":"產後痛(afterpains):因產後子宮間歇性收縮復舊所致,屬正常現象;「經產婦肌張力較鬆,需較強收縮,故疼痛較明顯」;可熱敷或輕撫按摩、依醫囑止痛緩解;多在「產後2–3天內」逐漸減輕(非持續7天才減輕)。本題「錯誤」者為「約持續7天就會減輕」(D)。","options":{"A":"正確。經產婦肌張力鬆,疼痛較明顯。","B":"正確。為子宮收縮造成的正常現象。","C":"正確。可熱敷或輕撫按摩緩解。","D":"錯誤(本題答案)。產後痛多2–3天內減輕,非7天。"},"sources":["新文京《產科護理學》產後痛","產褥期"]}},"109030-N4-10":{"quick":"生產疼痛理論中正確的是「呼吸放鬆技巧是利用條件反射理論減輕分娩疼痛」。","detail":{"background":"生產減痛相關理論:(1)拉梅茲「呼吸放鬆技巧」——以反覆訓練建立「條件反射」,使產婦面對宮縮自動以呼吸放鬆因應(正確);(2)「腹部輕撫法、按摩」——利用「閘門控制理論」(非條件反射);(3)Dick-Read提出「害怕-緊張-疼痛循環」理論(非條件反射);(4)集中注意力/意象法——屬「認知/分散注意」。本題正確為「呼吸放鬆技巧利用條件反射理論」(C)。","options":{"A":"腹部輕撫法利用閘門控制理論,非條件反射。","B":"Dick-Read提出害怕-緊張-疼痛循環,非條件反射理論。","C":"正確。呼吸放鬆技巧利用條件反射理論。","D":"集中注意力/意象法為認知分散注意,非條件反射。"},"sources":["新文京《產科護理學》減痛理論","拉梅茲"]}},"109030-N4-12":{"quick":"第二產程胎頭娩出時為減少會陰撕裂,「將產婦臀部墊高」為較不適當。","detail":{"background":"第二產程胎頭娩出時保護會陰、減少撕裂的措施:請產婦「哈氣/喘息」以「停止用力、讓胎頭緩慢娩出」、採「側躺」等使會陰放鬆的姿勢、控制胎頭緩慢著冠娩出、溫敷按摩會陰。「將產婦臀部墊高」會增加會陰張力與胎頭對會陰的壓力,不利保護會陰。本題「較不適當」者為「將產婦臀部墊高」(D)。","options":{"A":"適當。哈氣以停止用力、胎頭緩慢娩出。","B":"適當。喘息呼吸抑制猛烈用力。","C":"適當。側躺使會陰放鬆。","D":"較不適當(本題答案)。臀部墊高增會陰張力,不利保護會陰。"},"sources":["新文京《產科護理學》會陰保護","第二產程"]}},"109110-N4-11":{"quick":"產婦用力描述中「閉氣用力太長容易導致肺靜脈回流上升、不利胎兒產出」為錯誤——閉氣使靜脈回流下降。","detail":{"background":"產婦用力的生理:蹲姿藉地心引力助用力;以「橫膈與腹部肌肉」向下用力、其他肌肉放鬆以省力;側躺可緩解用力衝動、較舒適。長時間「閉氣(Valsalva)用力」使胸內壓上升→「靜脈回流降低(非上升)」→心輸出量與子宮胎盤灌流下降→不利胎兒。故「閉氣用力太長導致肺靜脈回流上升」方向錯誤。本題「錯誤」者為C。","options":{"A":"正確。蹲姿利用地心引力幫助用力。","B":"正確。以橫膈腹部用力、其他肌肉放鬆省力。","C":"錯誤(本題答案)。閉氣使靜脈回流「降低」,非上升。","D":"正確。側躺有助緩解用力感、較舒適。"},"sources":["新文京《產科護理學》用力生理","Valsalva"]}},"110030-N4-12":{"quick":"生產疼痛敘述中「第二產程疼痛來源主要是子宮收縮」為(本題要選的)錯誤——第二產程疼痛主要為陰道會陰伸展。","detail":{"background":"生產疼痛來源依產程:第一產程——主要為「子宮收縮、子宮頸變薄與擴張」(下腹下背痛);「第二產程——主要為胎兒先露部下降壓迫、陰道與會陰肌肉的伸張與伸展(會陰部劇痛),子宮收縮已非此期主要來源」;第三產程——胎盤娩出時子宮收縮(此時子宮頸已開,故非「子宮頸擴張」);疼痛屬主觀且具個別性。本題以選項B(把第二產程疼痛「主要」歸為子宮收縮)為要選出的不正確敘述(B)。","options":{"A":"正確。第一產程疼痛主要為子宮收縮與子宮頸變薄擴張。","B":"本題答案。第二產程疼痛「主要」為陰道會陰伸展,非子宮收縮。","C":"第三產程胎盤排出時為子宮收縮(子宮頸已開)。","D":"正確。生產疼痛主觀且具個別性。"},"sources":["新文京《產科護理學》生產疼痛來源","分娩疼痛"]}},"110030-N4-13":{"quick":"待產宮縮疼痛焦慮的措施中「換氣過度可給予塑膠袋及O2使用」為錯誤。","detail":{"background":"過度換氣處置:減慢呼吸、以「紙袋(或雙手摀口鼻)回吸自己呼出的CO2」使二氧化碳回升;「不可給氧(會更降CO2、加重鹼中毒症狀)」——故「給塑膠袋及O2」錯誤(O2不該給;且應用紙袋,塑膠袋有窒息風險宜用紙袋)。集中注意力/意象法、音樂療法、溫水浸泡皆為適當的放鬆減痛措施。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。過度換氣不可給O2(應紙袋回吸CO2)。","B":"正確。集中注意力與意象法減輕疼痛。","C":"正確。音樂療法促放鬆減痛。","D":"正確。溫水浸泡達肌肉鬆弛減痛。"},"sources":["新文京《產科護理學》過度換氣","非藥物減痛"]}},"110110-N4-11":{"quick":"枕後位腰酸的待產婦措施中「按摩薦骨並請待產婦平躺」為不適當——平躺加重腰痛且壓迫下腔靜脈。","detail":{"background":"枕後位(OP)因胎兒枕骨壓迫母體薦骨而劇烈腰薦痛。減輕措施:採「手膝(膝跪)姿勢、站立弓箭步、骨盆搖擺」助胎頭由枕後迴轉成枕前並減輕腰痛、「薦骨重壓/冷熱敷骶骨、按摩」。「請待產婦平躺」會加重枕骨對薦骨的壓迫(腰痛更甚)且壓迫下腔靜脈降低胎盤血流,故按摩薦骨「並請她平躺」不適當。本題不適當者為C。","options":{"A":"適當。生產球膝跪姿助胎頭旋轉、減痛。","B":"適當。站立弓箭步助胎頭旋轉。","C":"不適當(本題答案)。平躺加重枕後位腰痛、壓迫下腔靜脈。","D":"適當。冷熱敷骶骨減輕疼痛。"},"sources":["新文京《產科護理學》枕後位","腰薦痛"]}},"110110-N4-12":{"quick":"待產呼吸技巧敘述中「換氣過度因體內存留太多CO2導致嘴唇手指麻刺」為錯誤——是CO2過低(排出過多)。","detail":{"background":"呼吸技巧:第一產程不拘泥呼吸形態、舒適即可;呼吸技巧宜與其他舒適措施並用;出現迫切想用力但子宮頸未全開時用「哈氣」抑制用力。「換氣過度」是呼吸過快過深使「二氧化碳排出過多、體內CO2過低(呼吸性鹼中毒)」→嘴唇手指麻刺,而非「CO2存留太多」。本題「錯誤」者為D(因果相反)。","options":{"A":"正確。第一產程呼吸形態以舒適為原則。","B":"正確。呼吸技巧與其他舒適技巧並用。","C":"正確。迫切想用力可採哈氣抑制。","D":"錯誤(本題答案)。換氣過度是CO2「過低」,非存留太多。"},"sources":["新文京《產科護理學》待產呼吸/過度換氣","酸鹼"]}},"110110-N4-14":{"quick":"第二產程敘述中「建議採超過10秒閉氣用力法」為錯誤——應避免長時間閉氣。","detail":{"background":"第二產程(子宮頸全開到胎兒娩出):胎頭下降壓迫薦椎與閉孔神經使產婦有「便意感與用力衝動」;「休息期(宮縮間歇)不建議用力」,應放鬆休息儲備體力。用力宜採「開聲門、順用力衝動、短時(約5–6秒)多次用力」,「避免超過10秒的長時間閉氣(Valsalva)用力」(會降低靜脈回流與子宮胎盤灌流、不利胎兒)。本題「錯誤」者為「建議採超過10秒閉氣用力法」(B)。","options":{"A":"正確。胎頭壓迫薦椎/閉孔神經致便意感。","B":"錯誤(本題答案)。應避免超過10秒長時間閉氣用力。","C":"正確。休息期不建議用力。","D":"正確。第二產程指子宮頸全開到胎兒娩出。"},"sources":["新文京《產科護理學》第二產程用力","開聲門"]}},"111110-N4-12":{"quick":"子宮頸4cm、可自在交談的待產婦,「每30分鐘陰道內診一次」為不適當。","detail":{"background":"待產(子宮頸4cm、宮縮50mmHg、可自在交談=活動期初)的護理:提供呼吸技巧與舒適措施、協助變換姿勢促舒適、每2小時提醒排空膀胱;陰道內診「不宜過於頻繁(每30分鐘一次過頻)」——增加上行感染風險與不適,通常依產程進展約每2–4小時或有臨床指徵時才內診。本題「不適當」者為「每30分鐘陰道內診一次」(B)。","options":{"A":"適當。提供呼吸技巧與舒適措施。","B":"不適當(本題答案)。內診過頻(每30分鐘)增感染與不適。","C":"適當。協助變換姿勢促舒適放鬆。","D":"適當。每2小時提醒排空膀胱。"},"sources":["新文京《產科護理學》陰道內診頻率","待產護理"]}},"112030-N4-5":{"quick":"最有效伸展會陰部肌肉的產前運動為「蹲踞運動」。","detail":{"background":"產前運動與功用:蹲踞運動(squatting)——伸展「會陰與大腿內側肌肉」、增加骨盆出口、利第二產程用力娩出,是最有效伸展會陰的運動;腰背伸展/骨盆傾斜——緩解下背痛;腹部強化——核心肌群;抬腿——下肢循環。本題伸展會陰最有效者為「蹲踞運動」(C)。","options":{"A":"腰背伸展運動緩解下背痛,非伸展會陰。","B":"腹部強化運動針對核心。","C":"正確。蹲踞運動伸展會陰部肌肉。","D":"抬腿運動促下肢循環。"},"sources":["新文京《產科護理學》產前運動","分娩準備"]}},"112030-N4-11":{"quick":"子宮頸8cm、胎頭迅速下降想用力時,「指導產婦用力、保護會陰」為較不恰當。","detail":{"background":"子宮頸8cm「尚未完全擴張」時出現用力衝動,過早用力會致子宮頸水腫撕裂、產婦疲憊;應指導「哈氣/喘息呼吸」抑制用力、協助側躺或跪趴姿勢減輕用力感、陪伴度過。待子宮頸「全開」才指導用力與保護會陰。本例8cm未全開,「指導用力、保護會陰」為較不恰當。本題較不恰當者為C。","options":{"A":"恰當。請採哈氣、喘息呼吸抑制用力。","B":"恰當。協助側躺減輕疼痛。","C":"較不恰當(本題答案)。8cm未全開不可指導用力。","D":"恰當。跪趴姿勢減少用力感受。"},"sources":["新文京《產科護理學》用力時機","過渡期"]}},"113180-N4-9":{"quick":"第二產程能減少會陰/產道撕裂的呼吸用力中,「屏氣10秒向下用力」為最不適當。","detail":{"background":"第二產程減少會陰/產道撕裂的用力呼吸:採「開聲門用力、緩慢哈氣呼吸、吹蠟燭呼吸」可控制胎頭緩慢娩出、減少撕裂;而「屏氣(閉氣)10秒向下用力(Valsalva)」會使胎頭快速猛烈娩出、增加會陰與產道撕裂風險,且降低靜脈回流不利胎兒,為最不適當。本題「最不適當」者為「屏氣10秒向下用力」(B)。","options":{"A":"吹蠟燭呼吸法可控制用力、減少撕裂。","B":"最不適當(本題答案)。屏氣10秒用力使胎頭猛烈娩出、增撕裂。","C":"開聲門用力較生理、減少撕裂。","D":"緩慢哈氣呼吸可控制胎頭緩慢娩出。"},"sources":["新文京《產科護理學》第二產程用力","會陰保護"]}},"114030-N4-7":{"quick":"過度產痛的不良生理變化中「待產過程出現過度換氣,增加待產婦呼吸性酸中毒」為錯誤——過度換氣是呼吸性鹼中毒。","detail":{"background":"過度產痛的不良影響:伴隨的「過度換氣」使CO2排出過多→「呼吸性鹼中毒」→定向感障礙、感覺異常(嘴唇手指麻)、四肢痙攣(故敘述「呼吸性酸中毒」錯誤);產痛增加交感神經活性、兒茶酚胺釋放→減少胎盤灌流、增胎兒呼吸性酸中毒風險;激烈產痛的壓力反應增加抗利尿激素(ADH)分泌。本題「錯誤」者為「過度換氣增加呼吸性酸中毒」(D,應為鹼中毒)。","options":{"A":"正確。過度換氣致定向感障礙、感覺異常、四肢痙攣(鹼中毒)。","B":"正確。產痛減少胎盤灌流、增胎兒呼吸性酸中毒。","C":"正確。激烈產痛增加抗利尿激素分泌。","D":"錯誤(本題答案)。過度換氣是呼吸性「鹼」中毒,非酸中毒。"},"sources":["新文京《產科護理學》過度換氣","產痛生理影響"]}},"114100-N4-10":{"quick":"第二產程的產痛來源中「下段子宮肌肉伸展」為錯誤(本題要選的不正確項)。","detail":{"background":"第二產程(子宮頸全開後)的疼痛來源:主要為「胎兒先露部下降壓迫產道與骨盆底、會陰與陰道肌肉的伸展擴張、先露部壓迫直腸/臀部、宮縮時子宮肌肉缺氧」(經薦神經S2–4傳入,會陰部劇痛)。「子宮下段伸展」是第一產程(子宮頸變薄擴張)的來源,非第二產程的主要疼痛來源。本題「錯誤(非第二產程來源)」者為「下段子宮肌肉伸展」(A)。","options":{"A":"錯誤(本題答案)。子宮下段伸展為第一產程來源,非第二產程。","B":"正確。宮縮時子宮肌肉缺氧。","C":"正確。胎兒先露壓迫產婦臀部。","D":"正確。會陰肌肉的伸展擴張。"},"sources":["新文京《產科護理學》第二產程疼痛","分娩疼痛"]}},"114170-N4-8":{"quick":"待產泡澡(水中減痛)敘述中「第二產程才可以進行泡澡」為錯誤。","detail":{"background":"待產泡澡/水中減痛(hydrotherapy):多用於「第一產程(活動期)」減痛放鬆;水溫宜接近體溫(約37°C);水面高度蓋過腹部以浮力支撐減壓;每次泡澡時間勿過長(約勿超過1.5小時、注意脫水與體溫)。「第二產程才可以泡澡」錯誤(第二產程用力娩出階段一般不在浴缸,除非為水中生產特定情境)。本題「錯誤」者為「第二產程才可以進行泡澡」(A)。","options":{"A":"錯誤(本題答案)。泡澡減痛多用於第一產程,非「第二產程才可」。","B":"正確。水溫以接近37°C為宜。","C":"正確。水面高度蓋過腹部以浮力減壓。","D":"正確。泡澡時間勿超過1.5小時。"},"sources":["新文京《產科護理學》水中減痛","待產舒適"]}},"114170-N4-10":{"quick":"自發性(順用力衝動)用力相較傳統閉氣用力,「較容易發生會陰撕裂傷」為錯誤——自發性用力較不易撕裂。","detail":{"background":"自發性(spontaneous/開聲門、順用力衝動)用力 vs 傳統閉氣(Valsalva)用力:自發性用力——「第二產程實際用力時間縮短、不會明顯增加胸腔內壓(維持靜脈回流與胎盤灌流、胎兒較不缺氧)、較不易會陰撕裂、較不會引發產後尿失禁與骨盆底損傷」。故「較容易發生會陰撕裂傷」敘述錯誤(自發性用力反而較不易撕裂)。本題「錯誤」者為C。","options":{"A":"正確。自發性用力使第二產程實際用力時間縮短。","B":"正確。不會明顯增加胸腔內壓。","C":"錯誤(本題答案)。自發性用力較不易會陰撕裂,非較容易。","D":"正確。較不會引發產後尿失禁。"},"sources":["新文京《產科護理學》自發性用力","第二產程"]}},"115030-N4-4":{"quick":"拉梅茲生產準備法的原理是「運用條件反射訓練,讓準父母對生產有較好的準備」。","detail":{"background":"拉梅茲(Lamaze)生產準備法:由Lamaze醫師推廣(非Dick-Read;Dick-Read提出「自然分娩、害怕-緊張-疼痛」理論),以「反覆訓練呼吸與放鬆技巧建立條件反射」,使產婦面對宮縮自動以呼吸放鬆因應、降低疼痛感受,並讓「準父母(含陪產者)」共同學習與準備;強調「主動運用技巧」而非完全被動配合口令,亦非依賴止痛藥物或限懷孕初期瑜珈。本題正確為「運用條件反射訓練讓準父母有較好準備」(B)。","options":{"A":"錯。拉梅茲非懷孕初期瑜珈技巧。","B":"正確。運用條件反射訓練,讓準父母有較好準備。","C":"非「完全配合伴侶口令」,產婦主動運用技巧。","D":"錯。拉梅茲非Dick-Read發展,且不強調用止痛藥。"},"sources":["新文京《產科護理學》拉梅茲","生產準備"]}},"101030-N4-34":{"quick":"催產素(oxytocin)使用時,出現胎心率變異性減速應立即停止使用。","detail":{"background":"催產素(oxytocin)引產/催生安全:出現「胎兒窘迫徵象(變異性減速、晚期減速、持續心搏過緩、變異消失)」或「子宮過度收縮(高張)」時應「立即停止催產素」、左側臥、給氧、靜脈輸液、通知醫師。催產素「胎心率過慢時應停藥(非繼續)」、需「持續電子監測」、從低劑量漸增(不連續72小時高劑量)、且具「抗利尿(類ADH)作用易致水中毒/水滯留(非尿崩)」。本題正確為「變異性減速時應立即停止使用」(B)。","options":{"A":"錯。胎心率過慢時應停藥,非繼續使用。","B":"正確。變異性減速時應立即停止催產素。","C":"錯。應低劑量漸增,非連續72小時。","D":"錯。催產素有抗利尿作用易水中毒,非尿崩。"},"sources":["新文京《產科護理學》催產素","胎兒窘迫"]}},"101030-N4-37":{"quick":"使用meperidine(Demerol)鎮痛後產婦安靜休息,應注意胎兒心跳與產婦呼吸是否受抑制,並備好naloxone解毒劑。","detail":{"background":"Meperidine(Demerol,鴉片類鎮痛劑)用於第一產程活動期止痛:會通過胎盤抑制胎兒/新生兒呼吸與中樞、減低胎心變異性,母體則嗜睡、噁心、呼吸抑制、尿滯留。護理:監測「胎心率變異性與母體呼吸」、嗜睡時防跌(床欄)、並「備好拮抗劑naloxone」(尤分娩在即時新生兒可能呼吸抑制需用)。本題最適當為「注意胎兒心跳與產婦呼吸是否受抑制,備naloxone」(B)。","options":{"A":"此例已用鎮痛劑且安靜,重點是監測呼吸抑制,非「避免干擾」。","B":"正確。注意胎兒心跳與產婦呼吸抑制,備naloxone。","C":"心搏過慢/DTR抑制是硫酸鎂的監測重點,非meperidine。","D":"meperidine降低胎心變異性,非「致胎心過速需控140–160」。"},"sources":["藥理 meperidine/naloxone","新文京《產科護理學》分娩鎮痛"]}},"101030-N4-38":{"quick":"胎心音監控顯示胎心率在正常範圍、變化皆正常,無須提供額外處置。","detail":{"background":"胎心率判讀(看圖):本圖(吳女士用meperidine後監測)胎心率基準線約140 bpm、變異性正常(中度)、無顯著減速,屬正常範圍,「無須提供額外處置措施」。早期減速(胎頭受壓)、晚期減速(胎盤功能不良)、變異性減速(臍帶受壓)才需對應處置;本圖無上述減速。本題胎心正常→無須額外處置(D)。","options":{"A":"圖中無早期減速。","B":"圖中無晚期減速。","C":"圖中無變異性減速。","D":"正確。胎心變化皆在正常範圍,無須額外處置(已開圖判讀)。"},"sources":["新文京《產科護理學》胎心率判讀","胎兒監測(已開圖判讀)"]}},"101110-N4-50":{"quick":"引產中羊水呈棕綠色(胎便染色),應優先暫停催產素靜脈注射。","detail":{"background":"引產中羊水「棕綠色(胎便染色)」提示胎兒曾窘迫/缺氧,需警覺胎兒窘迫;若正使用催產素(oxytocin)引產,應「優先暫停催產素」(減少子宮刺激與胎兒壓力)、左側臥、給氧、評估胎心、通知醫師。報告醫師為後續(先停藥減少傷害);深呼吸、限液非處置。本題優先為「暫停催產素靜脈注射」(D)。","options":{"A":"報告醫師為後續,先停催產素減少胎兒壓力。","B":"深呼吸非此情境處置。","C":"限制液體非處置。","D":"正確。優先暫停催產素(胎便染色提示窘迫)。"},"sources":["新文京《產科護理學》胎便染色/催產素","胎兒窘迫"]}},"101110-N4-51":{"quick":"Bishop計分至少達6分,引產較容易成功。","detail":{"background":"比夏計分(Bishop score):評估「子宮頸成熟度」以預測引產成功率,五項——子宮頸擴張、消失(變薄)程度、硬度(質地)、位置(前後)、先露部高度(station),每項0–2或0–3分,總分0–13。一般「Bishop≧6(或≧8)」表示子宮頸成熟、引產較易成功;<6則子宮頸不成熟,常先用前列腺素促子宮頸成熟。本題至少達「6分」引產較易成功(B)。","options":{"A":"3分子宮頸不成熟,引產較難。","B":"正確。Bishop≧6引產較易成功。","C":"9分更高但「至少」門檻為6。","D":"12分為很成熟,但題問最低門檻。"},"sources":["新文京《產科護理學》Bishop計分","引產"]}},"101110-N4-57":{"quick":"催產素引產可採靜脈點滴輸注方式給予。","detail":{"background":"催產素(oxytocin)引產:以「靜脈點滴輸注(可控滴速、低劑量漸增)」給予,並全程持續電子胎兒監測與監測宮縮。其具「抗利尿(類ADH)作用」,大量長時間使用易「水滯留/水中毒」(非利尿、非須防脫水);過量致子宮過度收縮、胎兒窘迫;副作用非「高血壓」(反可能低血壓)。本題正確為「可採靜脈點滴輸注」(A)。","options":{"A":"正確。催產素引產採靜脈點滴輸注。","B":"錯。催產素抗利尿(易水中毒),非利尿須防脫水。","C":"劑量以「mU/min」漸增,非以「不超過10 mU/min」為絕對上限的敘述。","D":"錯。催產素副作用非高血壓。"},"sources":["新文京《產科護理學》催產素","引產"]}},"102030-N4-13":{"quick":"照顧硬膜外麻醉的待產婦,「鼓勵下床活動促進產程」為錯誤護理措施。","detail":{"background":"硬膜外麻醉(epidural)待產護理:會阻斷交感神經致「血壓下降」→需「定時測血壓、預防低血壓(先給靜脈輸液擴容)」;阻斷感覺(及部分運動)→膀胱感覺下降易「尿瀦留」→監測膀胱;可能減弱宮縮→「持續監測子宮收縮與胎心」。因下肢感覺/運動受影響,「不可貿然鼓勵下床活動」(跌倒風險),應臥床、左側臥。本題「錯誤」者為「鼓勵下床活動促進產程」(D)。","options":{"A":"正確。定時測血壓預防血壓下降。","B":"正確。監測膀胱了解尿瀦留。","C":"正確。持續監測子宮收縮狀況。","D":"錯誤(本題答案)。硬膜外麻醉後不宜鼓勵下床(跌倒風險)。"},"sources":["新文京《產科護理學》硬膜外麻醉護理","分娩麻醉"]}},"102110-N4-13":{"quick":"催產素引產前,應先記錄胎兒心跳變化20~30分鐘作為基準資料。","detail":{"background":"催產素引產護理:(1)「輸注前先記錄胎心率20–30分鐘」作為基準(評估胎兒原始狀態),並全程持續監測胎心與宮縮;(2)催產素以「低劑量開始、依宮縮與胎心反應每15–30分鐘漸增調整」(非固定不變3小時);(3)催產素抗利尿易水滯留,需監測輸出入量(非「減少飲水避免尿瀦留」的邏輯);(4)不宜平躺(壓迫下腔靜脈),宜左側臥。本題正確為「輸注前先記錄胎心20–30分鐘作為基準」(B)。","options":{"A":"錯。應依宮縮/胎心反應漸增調整,非維持不變3小時。","B":"正確。輸注前先記錄胎心20–30分鐘作基準。","C":"催產素抗利尿易水滯留,非減少飲水防尿瀦留。","D":"不宜平躺(壓迫下腔靜脈),宜左側臥。"},"sources":["新文京《產科護理學》催產素護理","引產"]}},"102110-N4-17":{"quick":"子宮頸7cm時不宜用demerol(meperidine),主要原因是會「影響胎兒(新生兒)的呼吸」。","detail":{"background":"Meperidine(Demerol)通過胎盤,會抑制新生兒呼吸與中樞,作用高峰約在給藥後2–3小時;若「預計胎兒將在給藥後1–4小時內娩出(如子宮頸已7cm、接近娩出)」,新生兒出生時正逢藥物高峰,易發生「呼吸抑制」,故此時「不宜給meperidine」(以免新生兒呼吸抑制)。本題主要原因為「影響胎兒的呼吸」(C)。","options":{"A":"非單純「快生沒必要」。","B":"非主要為影響產程進展。","C":"正確。接近娩出時給藥會致新生兒呼吸抑制。","D":"非造成新生兒低體溫。"},"sources":["藥理 meperidine","新文京《產科護理學》分娩鎮痛"]}},"103030-N4-22":{"quick":"足月待產婦出現「破水」時,應在24小時內引產(以降低感染風險)。","detail":{"background":"足月「破水(胎膜早破)」後若未自然進入產程,因感染(絨毛膜羊膜炎)風險隨破水時間增加,一般建議「在破水後約24小時內引產/啟動生產」(並評估GBS給抗生素);破水後減少陰道內診、監測體溫與感染指標。現血、陣痛、疲倦非「需24小時內引產」的指標。本題答案為「破水」(B)。","options":{"A":"現血(落紅)為產兆,非需24小時內引產。","B":"正確。破水後一般24小時內引產(降感染風險)。","C":"陣痛屬產程,非需引產。","D":"疲倦非引產指標。"},"sources":["新文京《產科護理學》胎膜早破","引產時機"]}},"103100-N4-9":{"quick":"OCT(催產素挑釁試驗)出現每次宮縮皆伴隨晚期減速,「為過度刺激」的敘述為錯誤。","detail":{"background":"催產素挑釁試驗(OCT/CST):以催產素誘發宮縮,評估「胎盤在宮縮(壓力)下的氣體交換功能(胎盤儲備)」。判讀:若「每次宮縮皆伴隨晚期減速=陽性=胎盤功能不佳/胎兒儲備不足」,應停催產素、給氧、通知醫師。「晚期減速」反映胎盤功能不良,而非「子宮過度刺激(過度刺激指宮縮過頻>5次/10分或宮縮過長)」。本題「錯誤」者為「為過度刺激」(D)。","options":{"A":"正確。OCT評估胎盤氣體交換功能。","B":"正確。停催產素、必要時給氧並通知醫師。","C":"正確。每次宮縮伴晚期減速=胎盤功能不佳。","D":"錯誤(本題答案)。晚期減速反映胎盤功能不良,非過度刺激。"},"sources":["新文京《產科護理學》OCT/CST","胎盤功能"]}},"103100-N4-13":{"quick":"引產過程出現高張性宮縮時,最優先的措施是停止催產素注射。","detail":{"background":"高張性(過度)子宮收縮(宮縮過頻>5次/10分、宮縮過長、間歇休息不足、子宮張力過高)會使胎盤灌流減少、胎兒缺氧、增子宮破裂風險。若正用催產素引產,「最優先立即停止催產素注射(removes刺激)」,並左側臥、給氧、靜脈輸液、必要時給子宮鬆弛劑、通知醫師。本題最優先為「停止催產素注射」(B);左側臥、剖腹為後續。","options":{"A":"下床活動非處置。","B":"正確。高張宮縮最優先停止催產素。","C":"左側臥為後續輔助。","D":"準備剖腹為後續(若無改善)。"},"sources":["新文京《產科護理學》高張性宮縮","催產素"]}},"104030-N4-10":{"quick":"產科腰椎硬膜外麻醉可能的合併症為低血壓(2)與胎兒心搏過緩(3)。","detail":{"background":"腰椎硬膜外(epidural)麻醉合併症:阻斷交感神經→血管擴張→「母體低血壓(hypotension)」→子宮胎盤灌流下降→「胎兒心搏過緩(bradycardia)」;另有頭痛(若刺破硬膜)、尿瀦留、發燒、局部感染、運動阻斷致下肢無力。預防:麻醉前先給靜脈輸液擴容、左側臥、監測血壓與胎心。本題合併症為「低血壓(2)+胎兒心搏過緩(3)」即23(C)。","options":{"A":"含高血壓(1)、胎兒心搏過速(4)皆非典型。","B":"含高血壓(1)。","C":"正確。低血壓(2)+胎兒心搏過緩(3)。","D":"含胎兒心搏過速(4)。"},"sources":["新文京《產科護理學》硬膜外麻醉合併症","分娩麻醉"]}},"104100-N4-11":{"quick":"以fentanyl進行硬膜外減痛,「易造成尿液滯留」為(本題要選的)錯誤敘述。","detail":{"background":"硬膜外減痛常合併「局部麻醉劑(如bupivacaine)+鴉片類(fentanyl)」。Fentanyl(鴉片類)止痛快速、可能呼吸抑制、搔癢、噁心;「低血壓」與「尿液滯留(膀胱感覺與運動阻斷)」主要與「局部麻醉劑阻斷交感與薦神經」較相關,而非單就「fentanyl」本身的特異作用。本題以「fentanyl易造成尿液滯留」作為要選出的不正確(歸因)敘述(D);臨床上硬膜外整體仍可能尿滯留,但題目強調fentanyl的藥物反應。","options":{"A":"正確。fentanyl止痛效果快速。","B":"(硬膜外)易有低血壓(局麻劑為主)。","C":"正確。fentanyl(鴉片類)易有呼吸抑制。","D":"本題答案。尿滯留主要與局麻劑阻斷薦神經相關,非fentanyl特異反應。"},"sources":["藥理 硬膜外用藥/fentanyl","新文京《產科護理學》分娩麻醉"]}},"104100-N4-15":{"quick":"Methergin(麥角新鹼)通常於「胎盤娩出後」肌肉注射,以促進子宮收縮、預防產後出血。","detail":{"background":"子宮收縮劑給藥時機:Methergine(麥角新鹼/ergonovine)使子宮強力持續收縮,「於胎盤娩出後」肌注以促進子宮收縮、防產後出血(胎盤娩出前使用會使胎盤嵌頓);催產素則可於胎肩娩出後/胎盤娩出後使用。Methergine會升血壓,故高血壓/子癇前症者禁用。本題給藥時機為「胎盤娩出後」(D)。","options":{"A":"產後4小時非常規給藥時機。","B":"胎兒著冠時尚未娩出胎盤,不給。","C":"胎頭娩出後胎盤尚未娩出,不給Methergine。","D":"正確。胎盤娩出後肌注Methergine促子宮收縮。"},"sources":["藥理 Methergine","新文京《產科護理學》產後出血預防"]}},"104100-N4-21":{"quick":"想到寶寶就有乳汁排出(let-down reflex,排乳反射),主要是催產激素(oxytocin)的作用。","detail":{"background":"泌乳的兩個荷爾蒙:「泌乳素(prolactin,腦下垂體前葉)」促進乳腺製造乳汁;「催產素(oxytocin,腦下垂體後葉)」作用於乳腺腺泡周圍的「肌上皮細胞收縮」→排出/噴出乳汁(let-down/排乳反射),可由嬰兒吸吮、甚至「想到/聽到寶寶」等情緒刺激誘發。本題排乳反射為「催產激素(oxytocin)」(B)。","options":{"A":"泌乳素促乳汁製造,非排乳反射。","B":"正確。催產素引發排乳反射(let-down)。","C":"雌性素與乳腺發育相關,非排乳。","D":"黃體素與乳腺發育相關,非排乳。"},"sources":["新文京《產科護理學》泌乳機轉","排乳反射"]}},"105090-N4-11":{"quick":"友善生產概念包括:產婦可決定生產陪伴者(1)、允許待產婦自由走動促進舒適(2
