)。","detail":{"background":"WHO友善生產(尊重產婦自主與舒適):「(1)產婦可決定生產陪伴者以獲得支持、(2)允許待產婦自由走動與選擇姿勢促進舒適」皆為友善生產概念;「(3)建議常規使用止痛藥與麻醉劑、(4)建議待產禁食」則不符友善生產(友善生產不主張常規藥物與禁食,而以非藥物減痛、可進清淡飲食為原則)。本題正確組合為(1)(2)即12(A)。","options":{"A":"正確。產婦可決定陪伴者(1)+自由走動(2)。","B":"同為(1)(2)之意,以官方判定A。","C":"同為(1)(2)。","D":"含「建議禁食」(4),非友善生產。"},"sources":["WHO 友善生產","新文京《產科護理學》"]}},"105090-N4-13":{"quick":"piton-S(催產素)引產出現胎心晚期減速,正確處置為左側臥、給氧、減少或暫停催產素。","detail":{"background":"催產素引產出現「晚期減速(胎盤功能不良/胎兒缺氧)」的子宮內復甦:「協助左側臥(解除下腔靜脈壓迫、增胎盤灌流)、給氧、減少或暫停催產素(piton-S)、增加靜脈輸液、通知醫師」。晚期減速「非臍帶受壓(那是變異性減速,用膝胸臥)」、「非胎頭受壓的正常反應(那是早期減速)」;且不可減少輸液。本題正確為「左側臥、給氧、減少或暫停piton-S」(C)。","options":{"A":"錯。不應減少輸液(應增加以維持灌流)。","B":"晚期減速非臍帶受壓,膝胸臥非首選。","C":"正確。左側臥、給氧、減少或暫停催產素。","D":"晚期減速為胎盤功能不良,非胎頭受壓的正常反應。"},"sources":["新文京《產科護理學》晚期減速處置","催產素"]}},"106030-N4-11":{"quick":"產婦要求針灸止痛時,護理師可回應「針灸有利減輕生產疼痛,可協助照會中醫師」。","detail":{"background":"針灸是被認可的非藥物減痛輔助方法之一(可減輕生產疼痛、屬補充替代療法),但「針灸屬中醫師執業範疇,產房護理師不可自行施針」;故適當回應是「肯定針灸可輔助減痛,並協助照會中醫師」。不宜否定針灸效果、由護理師自行施針、或誤稱針灸只能減第二產程痛。本題最合適為「針灸有利減痛,可協助照會中醫師」(B)。","options":{"A":"否定針灸效果不當。","B":"正確。肯定針灸可減痛,協助照會中醫師。","C":"錯。護理師不可自行施針(屬中醫師業務)。","D":"敘述不正確(針灸非只能減第二產程痛)。"},"sources":["新文京《產科護理學》非藥物減痛","針灸"]}},"106030-N4-18":{"quick":"Bishop評估引產成功可能性的項目包括:子宮頸擴張(1)、子宮頸變薄(3)、子宮頸位置(5)。","detail":{"background":"比夏計分(Bishop score)五項——皆為「子宮頸成熟度」與先露相關:子宮頸「擴張(1)、消失/變薄(3)、硬度(質地)、位置(前後,5)」及「胎頭(先露部)下降高度station」。不含「懷孕週數(2)、胎位/胎產式(4)」。本題正確組合為子宮頸擴張(1)+變薄(3)+位置(5)即135(D)。","options":{"A":"含懷孕週數(2),非Bishop項目。","B":"含胎位(4),非Bishop項目。","C":"含週數/胎位,非Bishop項目。","D":"正確。子宮頸擴張(1)+變薄(3)+位置(5)。"},"sources":["新文京《產科護理學》Bishop計分","引產"]}},"106110-N4-15":{"quick":"引產敘述中正確的是「Bishop計分≧6分,引產較可能成功」。","detail":{"background":"引產相關概念:(1)「Bishop≧6(子宮頸成熟)引產較可能成功」——正確;(2)催產素「具抗利尿作用易水滯留/水中毒(非增加排尿)」,需監測輸出入量;(3)前列腺素(PGE2)主要作用是「促子宮頸軟化成熟並引發子宮收縮」(非刺激血管平滑肌);(4)「胎位不正」是引產/陰道產的禁忌,不可貿然人工破水引產。本題正確為「Bishop≧6引產較可能成功」(A)。","options":{"A":"正確。Bishop≧6引產較可能成功。","B":"錯。催產素抗利尿易水滯留,非增加排尿。","C":"錯。前列腺素促子宮頸成熟與宮縮,非刺激血管平滑肌。","D":"錯。胎位不正不宜人工破水引產。"},"sources":["新文京《產科護理學》引產","Bishop/PGE2"]}},"106110-N4-16":{"quick":"第三產程後施打Methergine,當「血壓150/100 mmHg」時需停止給藥。","detail":{"background":"Methergine(麥角新鹼)使血管收縮、子宮強力收縮,「會升高血壓」,故「高血壓(如150/100)、子癇前症、心臟病」者禁用/停用;施打前後監測血壓。本例血壓150/100(高血壓)應停止給藥,改用催產素。全身發熱、呼吸不規則、脈搏68–72(正常)非停藥指標。本題需停藥情況為「血壓150/100」(B)。","options":{"A":"主訴全身發熱非Methergine停藥的關鍵。","B":"正確。血壓150/100(高血壓)需停止Methergine。","C":"呼吸不規則非Methergine停藥的特定指標。","D":"脈搏68–72正常,非停藥指標。"},"sources":["藥理 Methergine 禁忌","新文京《產科護理學》"]}},"106111-N4-12":{"quick":"34週、已破水10小時、子宮頸3cm,首要的感染監測計畫是「注意體溫變化」。","detail":{"background":"未足月胎膜早破(PPROM)後感染(絨毛膜羊膜炎)的監測:首要監測「體溫(發燒)」,並注意母體心搏過速、胎兒心搏過速、子宮壓痛、羊水變混濁/異味、白血球與C反應蛋白上升。應「減少陰道內診」以降感染(非增加內診頻率)。給催產素、監測宮縮非「感染監測」重點。本題首要感染監測為「注意體溫變化」(C)。","options":{"A":"給催產素非感染監測計畫。","B":"錯。應減少內診以降感染,非增加內診頻率。","C":"正確。注意體溫變化為首要感染監測。","D":"監測子宮收縮非感染監測重點。"},"sources":["新文京《產科護理學》PPROM/感染監測","胎膜早破"]}},"106111-N4-15":{"quick":"使用催產素後胎心率出現晚期減速,最優先的護理措施是停止催產素滴注。","detail":{"background":"催產素引產/催生中出現「晚期減速(胎盤功能不良/胎兒缺氧)」:「最優先立即停止催產素滴注(移除刺激)」,同時左側臥、給氧、增加靜脈輸液、評估、通知醫師。測血壓、密切觀察30分鐘、膝胸臥皆非最優先(膝胸臥用於變異性減速/臍帶受壓)。本題最優先為「停止催產素滴注」(B)。","options":{"A":"測血壓為後續。","B":"正確。最優先停止催產素滴注。","C":"錯。晚期減速不可僅觀察30分鐘。","D":"膝胸臥用於臍帶受壓(變異性減速),非晚期減速首選。"},"sources":["新文京《產科護理學》晚期減速","催產素"]}},"106111-N4-33":{"quick":"心臟病孕婦有牙科疾病時,須給予預防性抗生素(預防感染性心內膜炎)。","detail":{"background":"心臟病孕婦照護:有「瓣膜性心臟病、人工瓣膜、先天性心臟病」者,進行牙科處置或侵入性操作時「須給預防性抗生素」以防「感染性心內膜炎」;可依心功能分級(NYHA I–II多可陰道生產,非「只能剖腹」);「產後禁用Methergine(麥角新鹼升血壓加重心臟負荷)」;人工瓣膜孕婦抗凝血劑——孕期Warfarin有致畸風險,第一孕期常改用肝素(heparin)。本題正確為「有牙科疾病須給預防性抗生素」(B)。","options":{"A":"錯。心臟病孕婦未必只能剖腹產(視心功能)。","B":"正確。牙科疾病須給預防性抗生素(防心內膜炎)。","C":"錯。心臟病產後禁用Methergine(升血壓)。","D":"錯。人工瓣膜孕婦Warfarin致畸,孕期常改肝素。"},"sources":["新文京《產科護理學》心臟病孕婦","感染性心內膜炎預防"]}},"107030-N4-13":{"quick":"硬腦膜外減痛分娩主要是阻斷腰部的交感神經(及感覺神經),於活動期施行。","detail":{"background":"硬膜外(epidural)減痛分娩:將局部麻醉劑±鴉片類注入「硬膜外腔(單一腔,非同時硬膜外+蜘蛛膜下)」;最佳施行時機為「進入活動期(子宮頸約4–5cm以上)、規則宮縮」後(過早可能延長產程);機轉是阻斷脊神經根,「阻斷腰部交感神經(→血管擴張致低血壓)與感覺神經(止痛)」,現代低濃度配方「儘量保留運動神經(walking epidural,非感覺與運動皆完全阻斷)」。本題正確為「主要阻斷腰部的交感神經」(C)。","options":{"A":"錯。只注入硬膜外腔,非同時蜘蛛膜下腔。","B":"錯。最佳時機為活動期(約4cm),非1cm。","C":"正確。阻斷腰部交感神經(及感覺神經)。","D":"現代配方儘量保留運動神經,非皆完全阻斷。"},"sources":["新文京《產科護理學》硬膜外減痛","分娩麻醉"]}},"107030-N4-31":{"quick":"產後婦女使用子宮收縮劑Methergine時,須特別留意「血壓」。","detail":{"background":"Methergine(麥角新鹼)使血管收縮、血壓上升,故產後使用時須「特別監測血壓」,高血壓/子癇前症/心臟病者禁用;另注意噁心嘔吐、頭痛。相對地,催產素(oxytocin)抗利尿易水中毒、大量快速靜注可致低血壓。本題Methergine須留意「血壓」(D)。","options":{"A":"體溫非Methergine的特別留意項目。","B":"脈搏非Methergine的關鍵監測。","C":"呼吸非Methergine的關鍵監測。","D":"正確。Methergine升血壓,須特別留意血壓。"},"sources":["藥理 Methergine","新文京《產科護理學》"]}},"107110-N4-13":{"quick":"硬膜外麻醉後血壓突然降低時,「評估子宮收縮情況」為最不適宜(非首要)的處置。","detail":{"background":"硬膜外麻醉致血壓驟降的處置(優先序):「增加靜脈輸液(擴容)、協助左側躺(解除下腔靜脈壓迫)、評估胎心率(因母體低血壓會致胎兒缺氧/心搏過緩)」——皆為恢復血壓與評估胎兒安危的關鍵措施;相對而言「評估子宮收縮情況」非血壓驟降的首要處置。本題「最不適宜(非首要)」者為「評估子宮收縮情況」(D)。","options":{"A":"適宜。增加靜脈輸液擴容升血壓。","B":"適宜。左側躺解除下腔靜脈壓迫。","C":"適宜。評估胎心率(低血壓致胎兒缺氧)。","D":"最不適宜(本題答案)。評估子宮收縮非血壓驟降的首要處置。"},"sources":["新文京《產科護理學》硬膜外低血壓","分娩麻醉"]}},"107110-N4-15":{"quick":"給meperidine 50mg肌注後,「每小時監測陰道出血情形」為較不適宜的護理措施。","detail":{"background":"Meperidine(Demerol)肌注後護理:告知常見副作用(尿滯留、噁心嘔吐、嗜睡、頭暈);觀察「嗜睡/頭暈並使用床欄防跌」;「密切監測胎心率(尤變異性,藥物會降低胎心變異性)」與母體呼吸(呼吸抑制)、備naloxone。Meperidine「不會造成陰道出血」,故「每小時監測陰道出血」非其相關護理重點、較不適宜。本題較不適宜者為C。","options":{"A":"適宜。告知尿滯留、噁心嘔吐等副作用。","B":"適宜。觀察嗜睡並使用床欄防跌。","C":"較不適宜(本題答案)。meperidine不致陰道出血,監測出血非重點。","D":"適宜。密切監測胎心率變異性。"},"sources":["藥理 meperidine","新文京《產科護理學》分娩鎮痛"]}},"107110-N4-18":{"quick":"子宮頸6cm、宮縮時閉眼不理人的待產婦,「提供止痛藥或麻醉劑訊息以供選擇」為較不適當。","detail":{"background":"活動期(6cm)宮縮時產婦「閉眼、不理人、向內專注」是正常的因應行為(將能量集中於度過宮縮)。護理應「配合其節律:引導放鬆呼吸、提供音樂、握手陪伴、宮縮間歇再簡短溝通」;此時「主動打斷以提供止痛/麻醉訊息供選擇」會干擾其專注因應、較不適當(止痛資訊宜在宮縮間歇、產婦想了解時提供)。本題較不適當者為D。","options":{"A":"適當。引導放鬆呼吸技巧。","B":"適當。提供音樂分散注意力。","C":"適當。握手陪伴在旁。","D":"較不適當(本題答案)。宮縮時打斷提供麻醉訊息會干擾其專注因應。"},"sources":["新文京《產科護理學》活動期因應","待產支持"]}},"107110-N4-19":{"quick":"使用PGE2陰道栓劑後,護理師需監測「子宮頸軟化成熟」(及子宮收縮、胎心)。","detail":{"background":"前列腺素(PGE2,如dinoprostone)陰道栓劑/凝膠用於「子宮頸不成熟(Bishop低)時促子宮頸軟化、成熟」並可引發子宮收縮,作為引產前的「子宮頸成熟」準備。使用後監測「子宮頸軟化成熟程度、子宮收縮(警覺過度刺激/高張)與胎心率」。PGE2作用是「軟化成熟子宮頸」(非使平滑肌收縮為主、非促肺成熟、非致水腫)。本題需監測「子宮頸軟化成熟」(C)。","options":{"A":"PGE2主要軟化成熟子宮頸,非單純使平滑肌收縮。","B":"促胎肺成熟是類固醇,非PGE2。","C":"正確。監測子宮頸軟化成熟(及宮縮、胎心)。","D":"非以子宮頸水腫為監測重點。"},"sources":["新文京《產科護理學》PGE2/子宮頸成熟","引產"]}},"107110-N4-33":{"quick":"以比夏計分法評估引產難易度時,「胎兒體重」為錯誤項目(非Bishop評估項目)。","detail":{"background":"比夏計分(Bishop score)五項皆為「子宮頸與先露」相關:子宮頸「擴張、消失(變薄)、硬度(堅硬度/質地)、位置」與「胎頭(先露部)位置/下降高度」。「胎兒體重」不是Bishop評估項目。本題問「錯誤(非Bishop項目)」者為「胎兒體重」(B)。","options":{"A":"是項目。子宮頸擴張。","B":"錯誤(本題答案)。胎兒體重非Bishop評估項目。","C":"是項目。胎頭(先露)位置。","D":"是項目。子宮頸堅硬度(質地)。"},"sources":["新文京《產科護理學》Bishop計分","引產"]}},"108020-N4-11":{"quick":"催產素催生時胎兒監視器顯示「早期減速」,最合宜措施是密切觀察、不需特殊處理。","detail":{"background":"早期減速(early deceleration):與宮縮同步、對稱,因「胎頭受壓」迷走反射,屬良性,「不需特殊處理,密切觀察即可」。不需因早期減速立即停催產素(那是晚期/變異性減速、高張宮縮的處置)、給氧或剖腹。本題催產素中出現早期減速,最合宜為「密切觀察,不需特殊處理」(B)。","options":{"A":"早期減速良性,不需立即停催產素。","B":"正確。早期減速密切觀察、不需特殊處理。","C":"早期減速不需立即給氧。","D":"早期減速非剖腹適應症。"},"sources":["新文京《產科護理學》早期減速","催產素"]}},"108110-N4-32":{"quick":"晚期減速(承上,胎盤功能不良)的處置中「調增催產素」為不適當。","detail":{"background":"晚期減速(胎盤功能不良/胎兒缺氧)的子宮內復甦:「採左側臥(增胎盤灌流)、調快點滴(靜脈輸液擴容)、面罩給氧、減少或停止催產素、通知醫師」。「調增(加快)催產素」會增加宮縮、進一步減少胎盤灌流、加重胎兒缺氧,為不適當。本題「不適當」者為「調增催產素」(C)。","options":{"A":"適當。採左側臥增胎盤灌流。","B":"適當。調快點滴(輸液擴容)。","C":"不適當(本題答案)。應減少/停催產素,非調增。","D":"適當。面罩給氧。"},"sources":["新文京《產科護理學》晚期減速處置","催產素"]}},"109030-N4-16":{"quick":"硬脊膜外阻斷麻醉前先給林格氏液(Lactated Ringer)500cc,主要目的是「預防血壓過低」。","detail":{"background":"硬膜外/脊髓麻醉前「預先靜脈輸注晶體液(如林格氏液500–1000cc擴容)」的目的是「預防麻醉後因交感神經阻斷、血管擴張造成的低血壓(及隨之的子宮胎盤灌流下降、胎兒心搏過緩)」。本題主要目的為「預防血壓過低」(B);非為減輕噁心、頭痛或加速產程。","options":{"A":"非為減輕噁心嘔吐。","B":"正確。預先擴容以預防麻醉後血壓過低。","C":"非為減輕頭痛(頭痛與刺破硬膜有關)。","D":"非為加速產程。"},"sources":["新文京《產科護理學》硬膜外麻醉","低血壓預防"]}},"109030-N4-20":{"quick":"待產麻醉藥物中正確的是「腰椎硬膜外麻醉針頭刺入部位為L3-4」。","detail":{"background":"分娩麻醉:(1)目前剖腹產「以區域麻醉(脊髓/硬膜外)為主」(母胎較安全),非全身麻醉為常規;(2)硬膜外/脊髓麻醉於「活動期(約4cm以上)」施行,非「2cm」;(3)會阻斷交感神經致「低血壓(非高血壓)」,需注意低血壓;(4)「腰椎硬膜外針頭刺入部位約L3-4(或L2-3、L4-5)」——正確(脊髓圓錐約終於L1-2,於L3-4以下穿刺較安全)。本題正確為「針頭刺入L3-4」(D)。","options":{"A":"錯。剖腹產目前以區域麻醉為主,非全身麻醉常規。","B":"錯。硬膜外於活動期(約4cm)施行,非2cm。","C":"錯。硬膜外致低血壓,非高血壓。","D":"正確。腰椎硬膜外針刺部位約L3-4。"},"sources":["新文京《產科護理學》分娩麻醉","硬膜外"]}},"109030-N4-31":{"quick":"子宮頸6cm、宮縮弱(10分鐘2次、20秒、10mmHg)、產程3小時無進展、胎心正常,正確處置是輸注催產素。","detail":{"background":"本例為「低張性(無效)子宮收縮」致「活動期產程遲滯」(宮縮弱、頻率低、產程無進展),且胎心正常、無頭盆不對稱:處置是「以催產素(oxytocin)加強子宮收縮」促進產程(必要時人工破水),並監測胎心與宮縮。給止痛藥或安胎藥(Ritodrine抑制宮縮)會更不利;胎心正常不需立即剖腹。本題正確為「輸注催產素」(D)。","options":{"A":"胎心正常、無CPD,不需立即剖腹。","B":"給止痛藥無助無效宮縮。","C":"Ritodrine抑制宮縮,會加重產程遲滯。","D":"正確。低張性無效宮縮→輸注催產素加強收縮。"},"sources":["新文京《產科護理學》低張性宮縮","催產素"]}},"110030-N4-14":{"quick":"脊髓阻斷(spinal block)麻醉前30分鐘須給予較多靜脈輸液(預防低血壓)。","detail":{"background":"脊髓(蜘蛛膜下腔)阻斷麻醉:(1)交感神經阻斷致「低血壓」明顯,故「麻醉前約30分鐘須先給較多靜脈輸液(擴容)」以預防低血壓——正確;(2)用於剖腹產或第二產程,「不適合緩解第一產程長時間產痛」(作用時間有限、會影響用力);(3)穿刺部位約L3-4(L2-3以下),非L4-5/L5-S1為標準描述;(4)傳統脊髓麻醉後因可能「脊髓性頭痛」需平躺,但時間與輸液措施才是預防重點。本題正確為「麻醉前30分鐘給較多靜脈輸液」(C)。","options":{"A":"脊髓阻斷不適合緩解第一產程長時間產痛。","B":"穿刺部位約L3-4(L2-3以下),非L4-5/L5-S1。","C":"正確。麻醉前30分鐘給較多靜脈輸液預防低血壓。","D":"平躺防頭痛,但本題以輸液擴容為正解。"},"sources":["新文京《產科護理學》脊髓麻醉","分娩麻醉"]}},"110030-N4-18":{"quick":"催產素(Pitocin)引產時,「血糖」為最不需要監測的項目。","detail":{"background":"催產素(Pitocin)引產的監測重點:「子宮收縮(防高張、過度刺激)、胎心率(防胎兒窘迫)、血壓與呼吸、輸出入量(催產素抗利尿易水滯留/水中毒)」。「血糖」與催產素引產無直接關係,為最不需要監測者(除非合併妊娠糖尿病)。本題最不需監測者為「血糖」(D)。","options":{"A":"需監測血壓與呼吸次數。","B":"需監測輸出入量(催產素抗利尿)。","C":"需監測宮縮與胎心率。","D":"正確。血糖為最不需要監測的項目。"},"sources":["新文京《產科護理學》催產素監測","引產"]}},"110110-N4-4":{"quick":"懷孕期藥物動力學中正確的是「藥物與白蛋白結合比例降低、肝臟對藥物的代謝能力增加」。","detail":{"background":"妊娠藥物動力學變化:(1)血漿「白蛋白濃度降低」→藥物與白蛋白「結合比例降低」→游離型(有作用)藥物增加;某些肝代謝酵素活性「增加」→代謝能力增加;(2)潮氣容積與每分鐘換氣量「增加」→吸入性藥物吸收「增加」(非減少);(3)腎血流與GFR「增加」→藥物排泄「加快」(非變慢);(4)胃排空與腸蠕動「減慢」、胃酸分泌「減少」→口服藥吸收延遲。本題正確為「白蛋白結合比例降低、肝代謝能力增加」(B)。","options":{"A":"錯。潮氣容積增加,吸入性藥物吸收增加。","B":"正確。白蛋白結合比例降低、肝代謝能力增加。","C":"錯。GFR增加使藥物排泄加快,非代謝變慢。","D":"錯。胃排空減慢、胃酸減少,藥物滯留時間增加。"},"sources":["新文京《產科護理學》妊娠藥物動力學","藥理"]}},"110110-N4-16":{"quick":"子宮頸9cm(尚未全開)、想用力時,優先護理措施是「教導吹熄蠟燭式呼吸」抑制用力。","detail":{"background":"子宮頸9cm「尚未完全擴張(全開為10cm)」即出現用力衝動,過早用力會致子宮頸水腫撕裂、產婦疲憊;優先「教導吹熄蠟燭式(哈氣/吹氣)呼吸」抑制用力衝動,待子宮頸全開再用力。不需立即通知麻醉醫師、不宜平躺、不可教閉氣向下用力(未全開)。本題優先為「教導吹熄蠟燭式呼吸」(C)。","options":{"A":"通知麻醉醫師非此情境優先。","B":"平躺不利且非處置用力衝動的方法。","C":"正確。吹熄蠟燭式呼吸抑制過早用力。","D":"錯。子宮頸9cm未全開,不可閉氣向下用力。"},"sources":["新文京《產科護理學》吹蠟燭呼吸","過渡期"]}},"111030-N4-12":{"quick":"分娩鎮痛麻醉藥物中「marcaine為脊髓麻醉常用藥物,術後無須平躺」為錯誤。","detail":{"background":"分娩鎮痛/麻醉藥物:(1)Marcaine(bupivacaine)為局部麻醉劑,用於硬膜外/脊髓麻醉;「脊髓(蜘蛛膜下腔)麻醉後因可能脊髓性頭痛,須平躺」(故「無須平躺」錯誤);(2)Meperidine用於第一產程活動期止痛、解毒劑為naloxone、有呼吸抑制與降胎心變異性;(3)Fentanyl(鴉片類)有呼吸抑制與低血壓、解毒劑naloxone。本題「錯誤」者為「marcaine脊髓麻醉術後無須平躺」(A)。","options":{"A":"錯誤(本題答案)。脊髓麻醉後須平躺(防脊髓性頭痛)。","B":"正確。meperidine用於第一產程止痛,naloxone解毒。","C":"正確。meperidine有呼吸抑制、降胎心變異性。","D":"正確。fentanyl有呼吸抑制及低血壓,naloxone解毒。"},"sources":["藥理 分娩麻醉藥","新文京《產科護理學》"]}},"112030-N4-15":{"quick":"子宮頸2cm、宮縮間隔長、主訴陣痛厲害時,最適當措施是「給予按摩放鬆技巧減輕疼痛」。","detail":{"background":"硬膜外/腰椎麻醉有「時機」考量(一般進入活動期、子宮頸約4cm以上、規則宮縮才施行)。本例子宮頸僅「2cm(潛伏期)」、宮縮間隔6–7分鐘,「尚未達採用腰椎硬膜外麻醉的適當時機」;此時最適當是「提供非藥物減痛(按摩、放鬆技巧、呼吸、姿勢、陪伴)」緩解疼痛,並向產婦解釋目前產程尚不適合硬膜外麻醉。不可逕自連絡麻醉、簽同意準備麻醉、或「調快oxytocin」。本題最適當為「給予按摩放鬆技巧減痛」(C)。","options":{"A":"子宮頸2cm尚非硬膜外適當時機。","B":"同上,不宜逕自準備麻醉。","C":"正確。給予按摩放鬆等非藥物減痛。","D":"錯。不應為止痛而調快oxytocin。"},"sources":["新文京《產科護理學》硬膜外時機","非藥物減痛"]}},"112030-N4-19":{"quick":"催產素引產出現變異性減速,最優先處置為「停止催產素」。","detail":{"background":"催產素引產中出現「變異性減速(臍帶受壓)」:雖機轉為臍帶受壓(可改變姿勢減壓),但因正在使用催產素增加宮縮,最優先仍是「停止催產素(移除子宮過度刺激)」,同時改變姿勢(左側臥)、給氧、評估、必要時陰道內診排除臍帶脫垂。下床活動、立即剖腹、不處理皆不適當。本題最優先為「停止催產素」(A)。","options":{"A":"正確。最優先停止催產素(移除刺激)。","B":"下床活動非處置。","C":"變異性減速為異常,需處置非觀察。","D":"準備剖腹為後續(若持續不改善)。"},"sources":["新文京《產科護理學》變異性減速","催產素"]}},"112110-N4-13":{"quick":"硬膜外麻醉注意事項中「血壓86/50時給naloxone解毒」為錯誤——低血壓應輸液升壓,非naloxone。","detail":{"background":"硬膜外麻醉前後注意:麻醉前30分鐘給靜脈留置針並「灌注0.9%N/S 500–1000mL擴容」;麻醉藥注入前後監測母親血壓與胎心音;麻醉後採「左側臥」避免低血壓。若出現「低血壓(如86/50)」,處置為「增加靜脈輸液、左側臥、必要時升壓劑(如ephedrine)、給氧」,而非「naloxone(naloxone是鴉片類拮抗劑,用於鴉片過量的呼吸抑制,非處理低血壓)」。本題「錯誤」者為「血壓86/50給naloxone」(D)。","options":{"A":"正確。麻醉前30分鐘給靜脈留置針並擴容。","B":"正確。麻醉前後監測血壓與胎心。","C":"正確。麻醉後採左側臥避免低血壓。","D":"錯誤(本題答案)。低血壓應輸液/升壓,naloxone是鴉片拮抗劑,非處理低血壓。"},"sources":["新文京《產科護理學》硬膜外麻醉","低血壓處置"]}},"112110-N4-15":{"quick":"過渡期(8cm、待產13小時)的待產婦,「非常希望獨處、大叫請大家離開」為最不可能出現的反應。","detail":{"background":"過渡期(子宮頸8–10cm)宮縮強而密、產婦常見:「現血量增多、宮縮間歇閉眼休息、焦慮失控、對能否撐過越來越沒信心、易怒、噁心發抖、想用力」。多數產婦此時「最需要陪伴與支持」、害怕被獨自留下;「非常希望獨處、大叫請所有人離開」相對較不典型(多數反而依賴支持)。本題「最不可能」者為「非常希望獨處、大叫請你們離開」(D)。","options":{"A":"可能。過渡期現血量增多。","B":"可能。宮縮間歇閉眼休息。","C":"可能。對能否撐過越來越沒信心。","D":"最不可能(本題答案)。過渡期多需支持陪伴,「大叫請離開、希望獨處」較不典型。"},"sources":["新文京《產科護理學》過渡期反應","產程行為"]}},"112110-N4-33":{"quick":"比夏計分法中正確的是「過期妊娠婦女催產前,可用此計分法評估子宮頸的成熟度」。","detail":{"background":"比夏計分(Bishop score):用於「評估子宮頸成熟度、預測引產(催生)成功率」;「過期妊娠等需引產者,催產前可用Bishop評估子宮頸是否成熟」(成熟Bishop≧6引產較易成功;不成熟先用前列腺素促成熟)——正確。其得分「愈高」表子宮頸愈成熟、引產愈易(非「愈低早產機率愈高」);評估項目是「子宮頸擴張、消失、硬度、位置、先露部高度」(非Apgar的心跳呼吸肌張力膚色反射);各項評分非「−1到3」五級(那是Apgar/某些評分)。本題正確為「過期妊娠催產前可用Bishop評估子宮頸成熟度」(D)。","options":{"A":"錯。Bishop評估引產成功率,非「得分愈低早產機率愈高」。","B":"錯。那是Apgar評分項目,非Bishop。","C":"錯。Bishop各項非「−1到3」五級。","D":"正確。過期妊娠催產前可用Bishop評估子宮頸成熟度。"},"sources":["新文京《產科護理學》Bishop計分","引產"]}},"112180-N4-2":{"quick":"拉梅茲倡議的生產措施中正確的是「鼓勵分娩時可下床活動及變換姿勢」。","detail":{"background":"拉梅茲(Lamaze)生產理念強調「自然、賦能、減少不必要醫療介入」:鼓勵「分娩時下床活動與變換姿勢」、運用呼吸放鬆技巧與陪產支持、減少不必要的催產素與持續監測;「不主張常規仰臥、不主張常規催產素加速產程、不主張對低風險者常規持續監測」。本題正確為「鼓勵分娩時可下床活動及變換姿勢」(A)。","options":{"A":"正確。鼓勵分娩時下床活動及變換姿勢。","B":"錯。不主張常規使用催產素加速產程。","C":"錯。不主張仰臥(壓迫下腔靜脈)。","D":"錯。低風險者不主張常規持續監測。"},"sources":["新文京《產科護理學》拉梅茲","友善生產"]}},"113030-N4-11":{"quick":"子宮頸4cm、硬膜外麻醉2小時胎頭未下降(無CPD),最優先處置是「評估膀胱的情形」。","detail":{"background":"硬膜外麻醉後產程進展變慢、胎頭未下降的常見可逆原因之一是「膀胱脹尿」(硬膜外阻斷膀胱感覺易尿瀦留,脹大膀胱阻礙胎頭下降);故在無頭盆不對稱(CPD)下,「最優先評估並處理膀胱脹尿(導尿)」。給Ritodrine(抑制宮縮)會更不利;評估胎頭大小、羊水量非首要。本題最優先為「評估膀胱的情形」(A)。","options":{"A":"正確。先評估膀胱脹尿(硬膜外易尿瀦留阻礙下降)。","B":"已知無CPD,評估胎頭大小非首要。","C":"錯。Ritodrine抑制宮縮,會加重產程遲滯。","D":"評估羊水量非首要。"},"sources":["新文京《產科護理學》硬膜外/膀胱脹","產程遲滯"]}},"113030-N4-23":{"quick":"oxytocin引產出現變異性減速,最適當處置是「停止oxytocin的滴注」。","detail":{"background":"催產素(oxytocin)引產中出現「變異性減速(臍帶受壓)或其他胎兒窘迫徵象」:最適當是「停止oxytocin滴注」(移除子宮過度刺激),並改變姿勢(左側臥)、給氧、評估、必要時排除臍帶脫垂。提高、維持或僅降低滴速皆不足(出現胎兒窘迫應停藥)。本題最適當為「停止oxytocin的滴注」(D)。","options":{"A":"錯。不可提高滴速(加重刺激)。","B":"降低滴速不足;出現窘迫應停藥。","C":"維持原滴速不當。","D":"正確。停止oxytocin滴注。"},"sources":["新文京《產科護理學》變異性減速","催產素"]}},"113100-N4-21":{"quick":"破水24小時無宮縮、子宮頸擴張<1cm、變薄30%、摸不到先露、子宮頸後位且堅硬,Bishop約0分,適用前列腺素陰道塞劑促子宮頸成熟。","detail":{"background":"Bishop計分判讀與處置:本例「子宮頸擴張<1cm、變薄30%、先露高(摸不到)、子宮頸位置在後且堅硬」→各項皆低分、Bishop約「0–2分(子宮頸不成熟)」。處置:「不成熟者先用前列腺素(PGE2)陰道塞劑/凝膠促子宮頸軟化成熟」,成熟後再以催產素引產。Bishop低(0分)不適合直接催產素催生(成功率低);已破水24小時不宜「繼續觀察48小時返家」(感染風險)。本題正確為「得分0分,適用前列腺素陰道塞劑促子宮頸成熟」(C)。","options":{"A":"錯。Bishop約0分(子宮頸不成熟),非6分、不適合直接催生針。","B":"錯。子宮頸未成熟,且前列腺素為陰道塞劑非靜脈滴注。","C":"正確。Bishop約0分,用前列腺素陰道塞劑促子宮頸成熟。","D":"錯。已破水24小時不宜返家觀察48小時(感染風險)。"},"sources":["新文京《產科護理學》Bishop/PGE2","胎膜早破引產"]}},"113180-N4-8":{"quick":"LOA、子宮頸全開、胎頭+2時,「胎心音在左髂骨前上棘與肚臍連線中點最清楚」為不適當。","detail":{"background":"胎頭下降後胎心音聽診點隨之下移:LOA在胎頭較高時胎心於「左側臍與髂骨前上棘連線中點」;但此例胎頭已「+2(很低、接近娩出)」,胎心音應「下移至恥骨聯合上方(下腹最低處)」最清楚,故「胎心音仍在左髂前上棘與臍連線中點最清楚」的敘述不適當。其餘:臉潮紅現血增、宮縮不自主用力為第二產程徵象;胎心率宮縮開始變慢、高峰最低、結束恢復為「早期減速(胎頭受壓)」屬此期常見。本題「不適當」者為C。","options":{"A":"適當。臉潮紅、現血量增加為第二產程徵象。","B":"適當。宮縮時不自主向下用力。","C":"不適當(本題答案)。胎頭+2已低,胎心應下移至恥骨上方,非左髂前上棘臍中點。","D":"此為早期減速(胎頭受壓),第二產程常見。"},"sources":["新文京《產科護理學》胎心音聽診/胎頭下降","第二產程"]}},"114030-N4-8":{"quick":"吸入性麻醉藥敘述中「為水溶性麻醉劑,容易過胎盤」為錯誤——吸入麻醉劑為脂溶性。","detail":{"background":"吸入性麻醉藥(inhalation anesthesia):屬全身麻醉劑,如一氧化二氮(N2O,無色無味的笑氣)、揮發性鹵化劑;為「脂溶性(非水溶性)」、分子小,「容易通過胎盤」進入胎兒、抑制新生兒神經反射與呼吸;會「鬆弛子宮平滑肌→影響子宮收縮、產程延長、產後大出血風險增」;使用須注意劑量濃度與防止吸入後嘔吐(誤吸)。本題「錯誤」者為「為水溶性麻醉劑」(C,應為脂溶性)。","options":{"A":"正確。N2O為無色無味的笑氣(全身麻醉劑)。","B":"正確。易影響子宮收縮、致產程延長與產後大出血。","C":"錯誤(本題答案)。吸入麻醉劑為脂溶性,非水溶性。","D":"正確。須注意劑量濃度並避免吸入後嘔吐。"},"sources":["藥理 吸入性麻醉","新文京《產科護理學》全身麻醉"]}},"114030-N4-20":{"quick":"催產素引產出現高張宮縮(壓力100mmHg、子宮頸停滯4cm),最優先處置是停止催產素注射。","detail":{"background":"本例催產素引產出現「子宮過度收縮/高張(宮縮壓力達100mmHg、頻率密、子宮頸停滯不前)」,雖胎心暫正常(135–150),但高張宮縮會使胎盤灌流減少、增子宮破裂與胎兒窘迫風險;最優先「停止催產素注射(移除過度刺激)」,並左側臥、給氧、評估、必要時給子宮鬆弛劑、通知醫師。下床走動、右側臥、立即剖腹非最優先。本題最優先為「停止催產素注射」(B)。","options":{"A":"下床走動非處置。","B":"正確。高張宮縮最優先停止催產素注射。","C":"右側臥非首選(左側臥較佳)。","D":"準備剖腹為後續(若無改善)。"},"sources":["新文京《產科護理學》高張性宮縮","催產素"]}},"114170-N4-11":{"quick":"腰椎硬膜外麻醉常用藥物有Fentanyl、Bupivacaine(Marcaine)等。","detail":{"background":"腰椎硬膜外(epidural)麻醉:常用「局部麻醉劑Bupivacaine(Marcaine)/Ropivacaine + 鴉片類Fentanyl」混合低濃度配方。注意:執行前先排空膀胱、採「弓背(蝦米狀)」側臥或坐姿穿刺硬膜外腔(非穿入硬脊膜下);執行前先給「晶體液(0.9%N/S或林格氏液)」擴容(非D5W糖水)預防低血壓;可能「影響第二產程用力」,且鴉片類經胎盤可能影響新生兒(降低而非增加吸吮能力)。本題正確為「常用藥有Fentanyl、Bupivacaine(Marcaine)」(B)。","options":{"A":"穿刺硬膜外腔(非穿入硬脊膜下)。","B":"正確。常用Fentanyl、Bupivacaine(Marcaine)。","C":"執行前給晶體液擴容(非D5W糖水)。","D":"錯。可能影響用力,且鴉片類降低(非增加)新生兒吸吮。"},"sources":["新文京《產科護理學》硬膜外用藥","分娩麻醉"]}},"114170-N4-18":{"quick":"過期妊娠(41週)、子宮頸未開需催生時,最常用引發子宮收縮(及促子宮頸成熟)的藥物為PGE2(前列腺素)。","detail":{"background":"引產用藥依子宮頸成熟度:子宮頸「未成熟(未開、Bishop低)」者,先用「前列腺素(PGE2,dinoprostone)」促子宮頸軟化成熟並引發子宮收縮;子宮頸成熟後再以催產素(oxytocin)催生。本例41週、子宮頸未開,最常用「PGE2」促成熟與引發宮縮(C)。Yutopar(ritodrine)是安胎(抑制宮縮)、MgSO4安胎/抗抽搐、Betamethasone促胎肺成熟,皆非催生引發宮縮藥。","options":{"A":"Yutopar(ritodrine)是安胎(抑制宮縮),非催生。","B":"MgSO4為安胎/抗抽搐,非催生。","C":"正確。子宮頸未開時最常用PGE2促成熟與引發宮縮。","D":"Betamethasone促胎肺成熟,非催生。"},"sources":["新文京《產科護理學》PGE2/引產","過期妊娠"]}},"103100-N4-23":{"quick":"陰道生產後2小時仍無尿意感,常見原因是膀胱因產時胎兒壓迫使對脹尿的敏感度降低。","detail":{"background":"產後排尿障礙:生產時胎頭/胎兒先露部壓迫膀胱與尿道、會陰傷口疼痛、硬膜外麻醉殘餘等,使「膀胱對脹滿的敏感度降低」→產後無尿意、尿瀦留(脹大膀胱會將子宮底推高偏移、阻礙子宮收縮致產後出血)。「產後利尿」多在產後12–24小時開始(非24小時之後才開始)、黃體素下降致細胞外液移回血管再利尿,但本題無尿意主因是膀胱受壓敏感度下降。本題正確為「膀胱受胎兒壓迫,對脹尿敏感度減低」(B)。","options":{"A":"產後利尿約12–24小時開始,非24小時之後。","B":"正確。膀胱受壓使對脹尿敏感度降低。","C":"黃體素下降利尿與排尿量有關,非無尿意主因。","D":"用力失水非無尿意感的主因。"},"sources":["新文京《產科護理學》產後排尿","產褥期"]}},"105030-N4-33":{"quick":"心臟病孕婦生產及產後護理中「產後以口服避孕藥避孕」為錯誤——含雌激素增血栓風險,不宜。","detail":{"background":"心臟病孕婦生產/產後護理:產後採「半坐臥或左側臥」減心臟負荷;「產後48小時內密切監測心臟功能」(回心血量驟增,心衰好發);第二產程「避免長時間閉氣用力」(減少心臟負荷,可器械助產縮短第二產程)。避孕應避免「含雌激素的口服避孕藥」(增血栓風險,心臟病者尤不宜),宜用屏障法或其他。本題「錯誤」者為「產後以口服避孕藥避孕」(C)。","options":{"A":"正確。產後採半坐臥或左側臥減負荷。","B":"正確。產後48小時密切監測心臟功能。","C":"錯誤(本題答案)。心臟病者不宜含雌激素口服避孕藥(增血栓)。","D":"正確。第二產程避免長時間閉氣用力。"},"sources":["新文京《產科護理學》心臟病孕婦","產後避孕"]}},"106030-N4-19":{"quick":"產後2小時惡露鮮紅、1小時內浸溼整片產墊,屬早期(產後)出血(1),可能與子宮收縮不良有關(3)。","detail":{"background":"產後出血(PPH):產後24小時內出血量「陰道產>500mL、剖腹>1000mL」為「早期(原發性)產後出血」(本例產後2小時、1小時浸溼整片產墊屬出血量過多→早期出血);最常見原因為「子宮收縮乏力(子宮收縮不良)」,其次產道撕裂傷、胎盤組織殘留、凝血異常。晚期(續發性)出血指產後24小時至6週,常與胎盤殘留或感染有關。本題正確為「早期出血(1)+可能子宮收縮不良(3)」即13(C)。","options":{"A":"僅(1)不完整,需含成因(3)。","B":"含「晚期出血(2)」錯誤(產後2小時為早期)。","C":"正確。早期出血(1)+子宮收縮不良(3)。","D":"含「晚期出血(2)」錯誤。"},"sources":["新文京《產科護理學》產後出血","子宮收縮乏力"]}},"106030-N4-22":{"quick":"奶水不足主因中「未限制哺餵的時間及次數」為錯誤(本題要選的)——不限制哺餵反而有利泌乳。","detail":{"background":"母乳分泌(供需原理):「乳汁移出量與吸吮頻率」決定泌乳量——嬰兒愈常吸吮、移出愈多,泌乳愈多;故「親餵不限制時間與次數(依需求哺餵)」是「促進」奶水的正確做法,不是「奶水不足的原因」。奶水不足的真正原因:含乳姿勢不正確(移出不足)、母親自信不足/疼痛/壓力使「催產素排乳反射減弱」等。本題問「錯誤(非奶水不足原因)」者為「未限制哺餵的時間及次數」(D)。","options":{"A":"是原因。含乳姿勢不正確使乳汁移出不足。","B":"是原因。母親自信不足使催產素反射減弱。","C":"是原因。疼痛抑制催產素反射。","D":"錯誤(本題答案)。不限制哺餵反而有利泌乳,非奶水不足原因。"},"sources":["新文京《產科護理學》母乳哺育","泌乳供需"]}},"106110-N4-21":{"quick":"協助產婦產後第一次下床活動前,須優先評估「生命徵象」。","detail":{"background":"產後第一次下床(early ambulation)前的安全評估:優先評估「生命徵象(血壓、脈搏)」與是否有「姿位性低血壓/頭暈」徵象(產後體液變動、失血、臥床後易頭暈跌倒),先協助坐床緣評估無不適再下床,並陪同防跌。子宮收縮、排尿、乳汁分泌為產後常規評估但非「下床前」的優先安全評估。本題優先評估「生命徵象」(A)。","options":{"A":"正確。下床前優先評估生命徵象(防姿位性低血壓跌倒)。","B":"子宮收縮為產後常規評估,非下床前首要安全評估。","C":"排尿評估非下床安全的首要。","D":"乳汁分泌非下床安全評估。"},"sources":["新文京《產科護理學》產後早期下床","安全評估"]}},"106110-N4-26":{"quick":"產後痛(子宮收縮痛)的護理措施宜「教導深呼吸」(及熱敷、按摩、依醫囑止痛)。","detail":{"background":"產後痛(afterpains)護理:深呼吸放鬆、下腹「熱敷」、輕撫按摩、採俯臥(墊枕於下腹)、依醫囑給止痛劑;哺乳時加劇可先服止痛劑或調整時間。「持續按摩子宮」用於子宮收縮不良/出血時促收縮,非單純止產後痛;「下腹冰敷」非緩解產後痛(熱敷較適);子宮收縮劑用於收縮不良,非單純為止痛。本題宜「教導深呼吸」(C)。","options":{"A":"持續按摩子宮用於收縮不良/出血,非單純止產後痛。","B":"下腹宜熱敷,非冰敷。","C":"正確。教導深呼吸放鬆緩解產後痛。","D":"子宮收縮劑用於收縮不良,非單純止痛。"},"sources":["新文京《產科護理學》產後痛","產褥期護理"]}},"106111-N4-1":{"quick":"母親擔心「寶寶吃不飽」時,護理師正確回應是「新生兒睡眠需求大,少量多次餵奶較符合嬰兒需求」。","detail":{"background":"母乳哺育衛教:新生兒胃容量小、母乳易消化,「少量多餐、依需求哺餵(約每2–3小時、一天8–12次)」是正常且符合嬰兒需求;以「尿量(一天約6片濕尿布以上)、體重增加、餵食後滿足入睡」判斷攝取是否足夠,而非以「乳房大小」(乳房大小不決定泌乳量)。不宜以「乳房太小」「不要擔心應該沒問題」「每位母親都有足夠奶水」等敷衍或無據回應。本題正確為「新生兒睡眠需求大,少量多次餵奶較符合需求」(D)。","options":{"A":"錯。乳房大小不決定泌乳量。","B":"敷衍,未提供具體資訊。","C":"過於武斷無據。","D":"正確。少量多次餵奶符合新生兒需求。"},"sources":["新文京《產科護理學》母乳哺育","新生兒餵食"]}},"106111-N4-14":{"quick":"正常陰道產第三產程護理:依醫囑在胎盤娩出後將Pitocin 10 IU加入1升靜脈滴注液促進子宮收縮。","detail":{"background":"第三產程(胎盤娩出期)護理:等待胎盤自然剝離徵象(臍帶延長、湧血、子宮變圓上升)後協助娩出,「不可在胎盤娩出前過度牽引臍帶或用力」(防子宮內翻);「胎盤娩出後依醫囑給子宮收縮劑(如Pitocin/oxytocin 10–20 IU加入靜脈點滴,或胎肩娩出後給)」促進子宮收縮、減少產後出血;監測出血與子宮收縮。本題正確為「胎盤娩出後將Pitocin 10 IU加到1升靜脈滴注」(D)。","options":{"A":"第三產程重點非每10分鐘監測體溫。","B":"錯。不可在胎盤娩出前過度用力(防子宮內翻)。","C":"平躺非預防頭痛的第三產程重點。","D":"正確。胎盤娩出後給Pitocin 10 IU靜脈滴注促收縮。"},"sources":["新文京《產科護理學》第三產程","產後出血預防"]}},"106111-N4-24":{"quick":"陰道生產後痔瘡的評估與護理中,「第二產程用力不當易使痔瘡變大」為正確。","detail":{"background":"產後痔瘡:懷孕後期與「第二產程用力(尤長時間閉氣猛烈用力)」使骨盆腔靜脈壓增加、痔靜脈叢曲張,易使痔瘡「形成或變大」。評估宜採「側臥(辛氏臥位)視診肛門」(非半坐臥);護理:溫水坐浴、冰敷消腫、痔瘡藥膏、增加纖維與水分「避免便秘」(非減少飲食)、避免久蹲久站。產後黃體素「下降」(非增加)。本題正確為「第二產程用力不當易使痔瘡變大」(B)。","options":{"A":"錯。宜採側臥視診肛門,非半坐臥。","B":"正確。第二產程用力不當易使痔瘡變大。","C":"錯。應增加纖維與水分避免便秘,非減少飲食。","D":"錯。產後黃體素下降,非增加。"},"sources":["新文京《產科護理學》產後痔瘡","產褥期"]}},"107030-N4-22":{"quick":"陰道生產後評估中「右側可摸到鬆軟且位置偏高的子宮底」為異常(提示膀胱脹尿)。","detail":{"background":"產後子宮底正常評估:位置「在臍下、置中(中線)、收縮呈堅硬球狀」。若「子宮底鬆軟、位置偏高且偏向一側(常偏右)」,提示「膀胱脹尿」將子宮推高偏移、或子宮收縮不良→影響收縮、增產後出血風險,屬「異常」,應協助排尿/導尿並按摩子宮。其餘:少量紅色帶血腥味惡露、會陰傷口輕微紅腫無分泌物、Homan徵象陰性皆屬正常。本題異常者為「右側摸到鬆軟且位置偏高的子宮底」(C)。","options":{"A":"正常。惡露量少、紅色、有血腥味。","B":"正常。會陰傷口輕微紅腫、無分泌物。","C":"異常(本題答案)。子宮底鬆軟偏高偏右提示膀胱脹/收縮不良。","D":"正常。Homan徵象陰性(無深部靜脈血栓徵象)。"},"sources":["新文京《產科護理學》產後子宮底評估","膀胱脹"]}},"107110-N4-21":{"quick":"陰道生產後尿瀦留的最主要原因是「胎兒通過產道時壓迫膀胱」。","detail":{"background":"產後尿瀦留:主因是「生產時胎兒先露部通過產道壓迫膀胱與尿道、膀胱與尿道黏膜水腫、膀胱對脹滿的敏感度下降」,加上會陰傷口疼痛、麻醉殘餘,使產婦無法順利排尿。脹大的膀胱會推高子宮、阻礙收縮致出血,故需評估並協助排尿/導尿。本題最主要原因為「胎兒通過產道時壓迫膀胱」(B)。","options":{"A":"非膀胱內括約肌收縮所致。","B":"正確。胎兒通過產道壓迫膀胱致尿瀦留。","C":"產後雌激素下降,非「增加」致尿瀦留。","D":"非第一薦椎神經受損所致。"},"sources":["新文京《產科護理學》產後尿瀦留","產褥期"]}},"110030-N4-26":{"quick":"子宮收縮劑使用後(承上),須優先注意的現象為「子宮收縮狀態」。","detail":{"background":"產後給予子宮收縮劑(如催產素、Methergine)後,目的在「促進子宮收縮、預防/控制產後出血」,故「優先注意子宮收縮狀態(子宮底是否變硬、收縮是否良好)」與出血量、惡露;若子宮收縮不良(鬆軟)應按摩子宮並評估。排汗、大便、腰酸非優先。本題優先注意「子宮收縮狀態」(B)。","options":{"A":"排汗多寡非優先。","B":"正確。優先注意子宮收縮狀態(與出血)。","C":"大便自解非此優先。","D":"腰酸背痛非優先。"},"sources":["新文京《產科護理學》子宮收縮劑","產後出血"]}},"110110-N4-13":{"quick":"待產婦描述「子宮收縮痛的強度增加且越來越密」,可判斷為真陣痛的徵象。","detail":{"background":"真陣痛(true labor)徵象:子宮收縮「規則、強度漸增、頻率漸密、持續時間漸長、走動不緩解、疼痛由背至腹」,並造成子宮頸進行性變薄與擴張。「強度增加且越來越密」即真陣痛特徵。假陣痛則「坐著休息/走動可緩解、強度不變、痛侷限下腹」。本題真陣痛徵象為「子宮收縮痛強度增加且越來越密」(B)。","options":{"A":"坐著休息緩解為假陣痛。","B":"正確。強度增加且越來越密為真陣痛。","C":"僅下腹有收縮痛非真陣痛決定性特徵。","D":"走動時減輕為假陣痛。"},"sources":["新文京《產科護理學》真假陣痛","產程評估"]}},"110110-N4-24":{"quick":"陰道生產後一週,惡露正常為粉紅色(2)、且量約「1小時內產墊上5公分血液(3)」屬可接受量。","detail":{"background":"惡露(lochia)演變:產後1–3天「紅惡露(lochia rubra,鮮紅)」→約4–10天「漿液性惡露(lochia serosa,粉紅/褐色)」→約10天後至2–4週「白惡露(lochia alba,白/淡黃)」。產後「一週」惡露應為「漿液性、粉紅/褐色(2)」、量逐漸減少(「1小時內產墊約5公分血液(3)」屬可接受的少量)。「白色(1)」一週仍稍早、「30分鐘浸溼整片產墊(4)」為出血量過多(異常)。本題正常為(2)(3)即23(D)。","options":{"A":"含白色(1)一週仍稍早、且含異常量(4)。","B":"含「30分鐘浸溼整片(4)」為異常量。","C":"含白色(1)與異常量(4)。","D":"正確。粉紅色(2)+1小時5公分(3)屬產後一週正常。"},"sources":["新文京《產科護理學》惡露","產褥期"]}},"111030-N4-32":{"quick":"心臟病孕婦最易發生心臟衰竭的時期「不」包括懷孕22~26週(該說法為錯誤)。","detail":{"background":"心臟病孕婦最易心臟衰竭(心臟負荷最大)的時期:「妊娠28–32週(血容量達高峰)、分娩陣痛時、產後即刻至48小時內(子宮收縮使大量血液回流體循環)」。「懷孕22–26週」並非心臟負荷最大/最易心衰的時期。本題問「錯誤(非好發時期)」者為「懷孕22–26週」(A)。","options":{"A":"錯誤(本題答案)。22–26週非最易心衰時期。","B":"正確。28–32週為心臟負荷高峰。","C":"正確。待產陣痛時心臟負荷大。","D":"正確。產後48小時內心臟負荷最大。"},"sources":["新文京《產科護理學》心臟病孕婦","心衰好發期"]}},"111110-N4-21":{"quick":"產後生命徵象中正確的是「產後心輸出量增加,最初6~10天常發生心跳過緩」。","detail":{"background":"產後生命徵象:子宮胎盤循環血液回流體循環使「心輸出量短暫增加」,身體代償出現「產後最初約6–10天的生理性心搏過緩(bradycardia,約50–70次/分)」,屬正常。產後因血量變動、失血,「易發生姿位性低血壓」(非不易);會陰傷口痛與子宮收縮痛不致「呼吸速率下降」;體溫可因「脫水/分娩用力」於產後24小時內略升(<38°C),但「升至39°C」屬異常(需排除感染)。本題正確為「產後6–10天常心跳過緩」(B)。","options":{"A":"錯。產後易發生姿位性低血壓,非不易。","B":"正確。產後最初6–10天常生理性心搏過緩。","C":"會陰傷口/子宮收縮痛不致呼吸速率下降。","D":"產後體溫略升<38°C,升至39°C屬異常(疑感染)。"},"sources":["新文京《產科護理學》產後生命徵象","產褥期"]}},"111110-N4-22":{"quick":"泌乳機轉中正確的是「乳汁的移出與吸吮次數會影響泌乳量」。","detail":{"background":"泌乳機轉(供需原理):「乳汁移出量與嬰兒吸吮頻率」是調節泌乳量的關鍵——愈常吸吮、移出愈多,泌乳素分泌愈多、泌乳量愈大。其他:吸吮刺激「腦下垂體前葉分泌泌乳素(prolactin)(製造乳汁)」與「後葉分泌催產素(oxytocin)(排乳)」(故「吸吮刺激前葉分泌催產素」錯);作用於肌上皮細胞產生排乳反射的是「催產素」(非泌乳素);「泌乳素夜間分泌較多」,夜間哺乳有助維持泌乳。本題正確為「乳汁移出與吸吮次數影響泌乳量」(A)。","options":{"A":"正確。乳汁移出與吸吮次數影響泌乳量。","B":"錯。吸吮刺激前葉分泌「泌乳素」、後葉分泌催產素。","C":"錯。作用於肌上皮細胞產生排乳的是「催產素」,非泌乳素。","D":"錯。泌乳素夜間分泌「較多」,夜間哺乳有助泌乳。"},"sources":["新文京《產科護理學》泌乳機轉","母乳哺育"]}},"112030-N4-12":{"quick":"胎盤以「暗紅色粗糙面(母體面)」被牽引娩出,屬鄧氏法(Duncan mechanism,2),較易發生剝離不完全(3)。","detail":{"background":"胎盤娩出機轉:(1)「希氏法(Schultze mechanism)」——胎盤由「中央先剝離」,以「光滑的胎兒面(灰白色)」先露娩出,出血較少、剝離較完整;(2)「鄧氏法(Duncan mechanism)」——胎盤由「邊緣先剝離」,以「粗糙的母體面(暗紅色)」先露娩出,「較易發生剝離不完全(殘留)、出血」。本題「暗紅色粗糙面娩出」=鄧氏法(2)+較容易剝離不完全(3)即23(B)。","options":{"A":"含希氏法(1)錯誤(暗紅粗糙面為鄧氏法)。","B":"正確。鄧氏法(2)+較易剝離不完全(3)。","C":"含希氏法(1)與「較少剝離不完全(4)」錯誤。","D":"含「較少剝離不完全(4)」錯誤。"},"sources":["新文京《產科護理學》胎盤娩出機轉","第三產程"]}},"112030-N4-33":{"quick":"產科急症併發DIC時,檢驗為PT/PTT延長(1)、血小板數值下降(3)。","detail":{"background":"瀰漫性血管內凝血(DIC)的檢驗變化:凝血因子與血小板大量消耗→「凝血酶原時間(PT)、部分凝血酶原時間(PTT/aPTT)延長(1)」、「血小板下降(3)」、「纖維蛋白原下降(非上升)」、「D-dimer與纖維蛋白降解產物(FDP)上升(因纖溶亢進,非下降)」。產科DIC常見於胎盤早剝、羊水栓塞、死胎滯留、嚴重子癇前症/HELLP。本題正確為「PT/PTT延長(1)+血小板下降(3)」即13(B)。","options":{"A":"含「D-dimer下降(2)」錯誤(D-dimer上升)。","B":"正確。PT/PTT延長(1)+血小板下降(3)。","C":"含「D-dimer下降(2)」錯誤。","D":"含「纖維蛋白原上升(4)」錯誤(應下降)。"},"sources":["新文京《產科護理學》DIC","產科急症檢驗"]}},"112110-N4-35":{"quick":"急產後子宮收縮堅硬、子宮底位置正常、膀胱無脹、卻陰道持續流出鮮紅血,屬早期產後出血,因產道撕裂傷所致。","detail":{"background":"早期(原發性)產後出血鑑別:若「子宮收縮良好(子宮底堅硬、置中、膀胱不脹)」但「仍持續鮮紅出血」,則出血非子宮收縮乏力,而是「產道(子宮頸、陰道、會陰)撕裂傷」——尤「急產(產程過快)」者產道未充分擴張即快速娩出,撕裂風險高。處置:檢視並縫合裂傷。本例急產+子宮收縮堅硬+持續鮮紅出血→「早期產後出血,因產道撕裂傷」(A)。","options":{"A":"正確。子宮收縮良好仍出血→產道撕裂傷致早期產後出血。","B":"子宮收縮已堅硬,非收縮乏力。","C":"晚期出血在產後24小時後,本例在產後觀察期。","D":"子宮收縮堅硬,非高張力宮縮所致。"},"sources":["新文京《產科護理學》產後出血/急產","產道撕裂傷"]}},"114100-N4-11":{"quick":"第一產程時間=從規則宮縮(凌晨3點)到子宮頸完全擴張(下午3點),共12小時00分鐘。","detail":{"background":"產程分期與時間計算:第一產程=「從規則陣痛(規則子宮收縮)開始」到「子宮頸完全擴張(10cm)」。本例「半夜3點開始規則宮縮」→「下午3點子宮頸完全擴張」=12小時。第二產程=子宮頸全開到胎兒娩出;第三產程=胎兒娩出到胎盤娩出。本題第一產程時間為「12小時00分鐘」(A)。(註:不規則陣痛開始的凌晨1點不計入,以規則宮縮3點起算。)","options":{"A":"正確。規則宮縮(3點)到全開(下午3點)=12小時。","B":"13小時10分鐘計算錯誤。","C":"14小時00分鐘計算錯誤。","D":"15小時20分鐘計算錯誤。"},"sources":["新文京《產科護理學》產程分期/時間","第一產程"]}},"115030-N4-8":{"quick":"第二產程時間=從子宮頸完全擴張(下午3點)到胎兒娩出(下午4點10分),共1小時10分鐘。","detail":{"background":"第二產程=「子宮頸完全擴張(10cm)」到「胎兒完全娩出」。本例「下午3點子宮頸完全擴張」→「下午4點10分娩出男嬰」=1小時10分鐘。第三產程=胎兒娩出(4點10分)到胎盤娩出(4點20分)=10分鐘。本題第二產程為「1小時10分鐘」(B)。","options":{"A":"0小時10分鐘為第三產程(胎兒到胎盤娩出)。","B":"正確。全開(3點)到娩出(4點10分)=1小時10分鐘。","C":"1小時20分鐘計算錯誤。","D":"12小時為第一產程概略,非第二產程。"},"sources":["新文京《產科護理學》產程分期/時間","第二產程"]}},"109030-N4-14":{"quick":"子宮頸全開、胎頭+2、有強烈用力感,宮縮時最恰當的指導是「打開聲門用力法」。","detail":{"background":"第二產程用力技巧:現代建議「開聲門(open-glottis)用力」——順著用力衝動、用力時發出聲音(不完全閉氣)、緩慢向下用力,較傳統「長時間閉氣(Valsalva)」生理:減少胸內壓劇升、維持靜脈回流與子宮胎盤灌流、降低胎兒缺氧與會陰撕裂。本例已第二產程(全開、胎頭+2、強烈用力感),宮縮時最恰當為「打開聲門用力法」(C)。","options":{"A":"不可叫她不要喊叫(壓抑情緒)。","B":"持續長時間閉氣用力不利胎兒血流與靜脈回流。","C":"正確。打開聲門用力法(順衝動、發聲緩慢用力)。","D":"腹式呼吸用於第一產程放鬆,非第二產程用力。"},"sources":["新文京《產科護理學》開聲門用力","第二產程"]}},"111110-N4-11":{"quick":"產後1小時子宮位於臍上2指且偏向右側,最可能原因是「膀胱脹滿」。","detail":{"background":"產後子宮底正常應在臍下、置中、收縮堅硬。若「子宮底升高(臍上)且偏向一側(常偏右)」,最常見原因是「膀胱脹滿」——脹大的膀胱將子宮往上、往右推移,並阻礙子宮有效收縮(增產後出血風險);處置:協助排尿或導尿排空膀胱,再評估子宮收縮。胎盤殘留、子宮積血、子宮收縮不佳會使子宮鬆軟,但「升高且偏右」最典型為膀胱脹滿。本題最可能原因為「膀胱脹滿」(D)。","options":{"A":"胎盤殘留致子宮鬆軟出血,非典型偏右上。","B":"子宮積血致子宮鬆軟脹大,非典型偏右。","C":"子宮收縮不佳致鬆軟,非特定偏右上移。","D":"正確。膀胱脹滿將子宮推高並偏右。"},"sources":["新文京《產科護理學》產後子宮底/膀胱脹","產褥期"]}}},TO=["1產兆與真假陣痛", "2產程分期與進展", "3胎位胎產式與分娩機轉", "4胎頭下降高度子宮頸消失擴張與腹部觸診", "5子宮收縮生理與胎心音聽診", "6胎心音監測與減速判讀", "7待產護理與舒適姿勢活動", "8生產疼痛與減痛技巧", "9麻醉引產催生用藥", "10產後早期生理與哺乳"],LEC={"1產兆與真假陣痛":{"html":"<p><b>產兆(分娩即將開始的徵象)</b>:①<b>輕鬆感(lightening)</b>——胎頭入骨盆腔,初產婦約分娩前2週、經產婦待產時才發生,壓迫感下移、呼吸較順但頻尿與下肢水腫加重;②<b>假性陣痛增多</b>(Braxton-Hicks);③<b>現血(落紅,bloody show)</b>——子宮頸變薄擴張使黏液栓塞脫落、混少量血;④<b>破水</b>——胎膜破裂流出羊水;⑤體重略減、能量爆發(築巢)。</p><p><b>真陣痛 vs 假陣痛(必考)</b>:<b>真陣痛</b>——規則、強度漸增、頻率漸密、持續漸長、<u>走動不緩解</u>、疼痛由背至腹、<u>使子宮頸進行性變薄與擴張</u>;<b>假陣痛</b>——不規則、強度不變、<u>走動/休息可緩解</u>、痛侷限下腹、子宮頸無變化。決定性差別在「<b>子宮頸是否進行性變化</b>」。</p><p><b>破水處理</b>:破水後注意羊水量、顏色(胎便染色棕綠提示窘迫)、氣味、胎心率;<u>減少陰道內診</u>防感染;足月破水未進產程者一般約<b>24小時內引產</b>(降絨毛膜羊膜炎風險),監測體溫。先露未固定時破水警覺<b>臍帶脫垂</b>。</p>"},"2產程分期與進展":{"html":"<p><b>產程分期</b>:<b>第一產程</b>(規則宮縮→子宮頸全開10cm)——分潛伏期(0–3cm)、活動期(約4–7cm)、過渡期(8–10cm);<b>第二產程</b>(全開→胎兒娩出);<b>第三產程</b>(胎兒娩出→胎盤娩出);<b>第四產程</b>(產後1–2小時觀察期,監測出血與生命徵象)。</p><p><b>時間計算題</b>:第一產程=規則宮縮起算到子宮頸全開(不規則陣痛不計);第二產程=全開到胎兒娩出;第三產程=胎兒娩出到胎盤娩出(約5–30分)。初產婦各產程較經產婦長。</p><p>過渡期(8–10cm)宮縮最強最密,產婦焦慮失控、易怒、噁心發抖、想用力;潛伏期則精力充沛、健談、有信心。</p>"},"3胎位胎產式與分娩機轉":{"html":"<p><b>名詞</b>:<b>胎產式(lie)</b>=胎兒長軸與母體長軸關係(縱產式/橫產式/斜產式);<b>胎方位(position)</b>=先露部指定點與母體骨盆的關係,如<b>LOA(左枕前)</b>為最常見且最有利的胎位;<b>先露(presentation)</b>=頭位(枕、額、面)、臀位、肩位。</p><p><b>枕後位(OP)</b>:胎兒枕骨壓迫母體薦骨→劇烈<u>下背(腰薦)痛</u>。處置:手膝(膝跪)姿勢、骨盆搖擺、薦骨重壓/冷熱敷助胎頭迴轉成枕前;<u>避免平躺</u>(加重腰痛)。</p><p><b>分娩機轉(七步驟)</b>:銜接(engagement)→下降(descent)→俯屈(flexion)→內迴轉(internal rotation)→伸仰(extension,胎頭娩出)→復位與外迴轉(restitution/external rotation)→娩出(expulsion,胎肩與胎身)。</p>"},"4胎頭下降高度子宮頸消失擴張與腹部觸診":{"html":"<p><b>子宮頸變化</b>:<b>消失(effacement,變薄)</b>以%表示(0→100%);<b>擴張(dilatation)</b>以cm表示(0→10cm全開)。初產婦多「先消失再擴張」,經產婦可同時進行。</p><p><b>胎頭下降高度(station)</b>:以坐骨棘(ischial spine)為0;<b>負值(−1~−3)在坐骨棘上方(較高、未固定)</b>;<b>0=銜接</b>;<b>正值(+1~+3)在坐骨棘下方(較低、接近娩出)</b>。如「−1」=坐骨棘上1cm。</p><p><b>李奧波德四段觸診(Leopold maneuvers)</b>:第一段(子宮底,辨胎兒哪部分在上)、第二段(兩側,辨胎背/胎肢)、第三段(恥骨上,辨先露部及是否銜接)、第四段(面向產婦腳、確認先露下降程度)。觸診前請產婦排空膀胱、平躺屈膝。</p>"},"5子宮收縮生理與胎心音聽診":{"html":"<p><b>子宮收縮三要素</b>:<b>頻率</b>(兩次宮縮起點間隔)、<b>持續時間(duration)</b>、<b>強度(intensity)</b>。正常持續約30–90秒、間歇休息≥30秒(休息期子宮可放鬆、維持胎盤灌流)。異常:宮縮>90秒、間歇<30秒、或10分鐘內>5次(過度刺激/高張)、或壓力過低(<10mmHg,低張無效宮縮)。</p><p><b>胎心音聽診</b>:正常胎心率(FHR)基準線<b>110–160 bpm</b>。聽診點隨胎位:頭位於母體臍下、胎背側最清楚;胎頭下降後聽診點隨之下移至恥骨聯合上方。胎心率變異性(variability)中度為佳。</p>"},"6胎心音監測與減速判讀":{"html":"<p><b>三種減速(deceleration)——必考</b>:</p><p>①<b>早期減速(early)</b>:與宮縮<u>同步對稱</u>,因<b>胎頭受壓</b>(迷走反射),屬<u>良性</u>,密切觀察、不需特殊處理。</p><p>②<b>晚期減速(late)</b>:減速<u>晚於宮縮高峰</u>,因<b>子宮胎盤功能不良/胎兒缺氧</b>,屬<u>不良徵象</u>。子宮內復甦:<b>左側臥、給氧、增加靜脈輸液、減少/停止催產素</b>、通知醫師,必要時剖腹。</p><p>③<b>變異性減速(variable)</b>:形狀不定、與宮縮無固定關係,因<b>臍帶受壓</b>。處置:<b>改變姿勢(左側臥/膝胸臥)</b>、給氧、若用催產素先停藥、排除臍帶脫垂。</p><p><b>OCT/CST(催產素挑釁試驗)</b>:評估胎盤在宮縮壓力下的氣體交換儲備;若每次宮縮皆伴晚期減速=陽性(胎盤功能不佳)。</p>"},"7待產護理與舒適姿勢活動":{"html":"<p><b>姿勢與活動</b>:鼓勵<u>自由活動、直立(坐/蹲/跪/前傾)</u>藉地心引力助下降;<u>避免長時間平躺(仰臥位低血壓、降胎盤血流)</u>,宜<b>左側臥</b>。產程初期下床走動促進有效宮縮與子宮頸擴張。</p><p><b>陰道內診</b>:無菌、產婦屈膝外展、於<u>宮縮間歇期</u>檢查(宮縮時不準且更痛)、不過於頻繁(防感染與不適)。</p><p><b>會陰消毒</b>:由乾淨往污染(尿道口→陰道口→會陰→肛門),不重複來回。<b>膀胱脹尿</b>會推高子宮、阻礙下降與收縮(恥骨上膨出)→協助排尿/導尿。出現用力衝動先內診評估子宮頸是否全開。</p><p><b>臍帶脫垂(急症)</b>:<u>不可推回臍帶</u>;戴無菌手套由陰道將先露上頂減壓、膝胸臥/頭低臀高、無菌濕紗布覆蓋臍帶、給氧、緊急剖腹。</p>"},"8生產疼痛與減痛技巧":{"html":"<p><b>疼痛來源</b>:第一產程——子宮收縮、子宮頸變薄擴張(T10–L1,下腹下背痛);第二產程——先露下降、<b>陰道會陰伸展與骨盆底受壓</b>(S2–4,會陰劇痛)。疼痛屬主觀,焦慮害怕會放大(<b>害怕-緊張-疼痛循環</b>,Dick-Read)。</p><p><b>非藥物減痛理論</b>:<b>閘門控制理論(gate control)</b>——以觸壓刺激(<u>薦骨/背部按摩、重壓、冷熱敷、TENS</u>)競爭抑制痛覺;<b>拉梅茲(Lamaze)</b>——以呼吸放鬆技巧反覆訓練建立<u>條件反射</u>;另有溫水浸泡、音樂、意象、陪伴支持。</p><p><b>呼吸法</b>:潛伏期慢而深的胸式呼吸→活動期較快淺→過渡期<b>喘息-吹氣(hee-hee-blow)</b>;子宮頸未全開卻想用力時用<b>哈氣/吹蠟燭</b>抑制用力。</p><p><b>過度換氣</b>:呼吸過快深→CO₂過低(呼吸性<u>鹼</u>中毒)→頭暈、嘴唇手指麻刺、痙攣。處置:<b>減慢呼吸、用紙袋/雙手回吸CO₂</b>,<u>不可給氧</u>。</p><p><b>用力</b>:現代建議<b>開聲門、順用力衝動、短時用力</b>;避免長時間閉氣(Valsalva)用力(降靜脈回流與胎盤灌流);子宮頸未全開不可用力。</p>"},"9麻醉引產催生用藥":{"html":"<p><b>催產素(oxytocin/Pitocin)</b>:靜脈點滴低劑量漸增引產/催生,全程持續監測宮縮與胎心。出現<b>晚期/變異性減速、胎兒窘迫或高張宮縮</b>時<u>立即停止催產素</u>、左側臥、給氧、輸液。具<b>抗利尿(類ADH)作用</b>→大量長時間使用易<b>水中毒/水滯留</b>(監測輸出入量)。</p><p><b>Methergine(麥角新鹼)</b>:於<u>胎盤娩出後</u>給,促子宮強力收縮防產後出血;<b>會升血壓→高血壓/子癇前症/心臟病禁用</b>,監測血壓。</p><p><b>子宮頸成熟(Bishop計分)</b>:五項=子宮頸<b>擴張、消失、硬度、位置、先露高度</b>(不含週數、胎位、胎兒體重);<b>Bishop≧6</b>引產較易成功;不成熟者先用<b>前列腺素(PGE₂)</b>促子宮頸軟化成熟。</p><p><b>分娩鎮痛/麻醉</b>:<b>硬膜外(epidural)</b>於活動期(約4cm)施行,阻斷腰部交感與感覺神經→易<b>低血壓</b>(麻醉前先給晶體液擴容、左側臥)、尿瀦留、下肢無力(不宜貿然下床);<b>脊髓麻醉後須平躺</b>防脊髓性頭痛;常用藥Bupivacaine(Marcaine)+Fentanyl。<b>Meperidine(Demerol)</b>第一產程止痛,過胎盤抑制新生兒呼吸、降胎心變異性,備<b>naloxone</b>;接近娩出時不宜給。<b>吸入性麻醉</b>為脂溶性易過胎盤、鬆弛子宮。</p>"},"10產後早期生理與哺乳":{"html":"<p><b>子宮復舊</b>:產後子宮底約在臍下、置中、收縮堅硬;若<b>鬆軟、升高且偏右</b>多為<u>膀胱脹尿</u>(推高子宮、阻礙收縮)→排尿/導尿。<b>產後痛(afterpains)</b>因子宮間歇收縮,經產婦/多胎/哺乳時明顯,多2–3天內緩解(深呼吸、熱敷、止痛)。</p><p><b>惡露(lochia)</b>:紅惡露(1–3天)→漿液性粉紅褐(約4–10天)→白惡露(10天後至數週)。量過多(如30分鐘浸溼整片產墊)為異常。</p><p><b>產後生理</b>:子宮胎盤血回流→心輸出量短暫增加,<b>產後6–10天生理性心搏過緩</b>;易姿位性低血壓(下床前評估生命徵象防跌);產後12–24小時利尿。</p><p><b>產後出血(PPH)</b>:24小時內>500mL(陰道產)為早期出血,最常見<b>子宮收縮乏力</b>;若子宮收縮良好仍鮮紅出血→<b>產道撕裂傷</b>(急產風險高)。</p><p><b>泌乳</b>:<b>泌乳素(prolactin)</b>製造乳汁、<b>催產素(oxytocin)</b>引發排乳反射(let-down);供需原理——<u>吸吮頻率與乳汁移出量決定泌乳量</u>,依需求哺餵(不限時間次數)、夜間哺乳有助泌乳。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_o4_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
