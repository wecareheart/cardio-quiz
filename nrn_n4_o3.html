1030","src":"民國111年","options":{"A":"陰道內診可評估待產婦的子宮頸擴張、變薄程度及胎膜完整性","B":"可指導待產婦深呼吸或哈氣以緩解其內診時的不適","C":"待產婦有前置胎盤為陰道內診的禁忌","D":"若待產婦已破水,應更密集陰道內診以評估其產程進展"},"img":""},{"id":"111110-N4-13","code":"111110","roc":"111","cat":"N4","catname":"產兒科護理學","num":13,"stem":"王女士,G1P0,懷孕24 週,常規的產前檢查正常。詢問護理師:「我有時會覺得肚子繃緊,但不覺得 痛。繃緊感有時候幾秒鐘就過去,通常不超過1 分鐘,沒有其他不舒服,這樣是正常嗎?」下列的回 答,何者最適當?","opts":{"A":"這可能是早產的徵兆,需要立即通知醫師,可能需要住院安胎","B":"雖然目前沒事,但妳可能是早產的高危險群,需要多臥床休息","C":"這種收縮對子宮頸變薄有幫助,妳的身體開始生產前的準備,不用擔心","D":"這是懷孕期間一種正常的無痛性子宮收縮,無需太擔心"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"9高危妊娠待產與生產處置","topic_num":"高危妊娠與妊娠合併症","topic_code":"O3-9","q_num":13,"roc_year":"111","exam_code":"111110","src":"民國111年","options":{"A":"這可能是早產的徵兆,需要立即通知醫師,可能需要住院安胎","B":"雖然目前沒事,但妳可能是早產的高危險群,需要多臥床休息","C":"這種收縮對子宮頸變薄有幫助,妳的身體開始生產前的準備,不用擔心","D":"這是懷孕期間一種正常的無痛性子宮收縮,無需太擔心"},"img":""},{"id":"111110-N4-17","code":"111110","roc":"111","cat":"N4","catname":"產兒科護理學","num":17,"stem":"使用催產素催生的待產婦女,當發生下列何種情況仍可持續使用催產素促進產程?","opts":{"A":"胎頭與骨盆不對稱","B":"胎兒窘迫","C":"前置胎盤","D":"早期破水"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"9高危妊娠待產與生產處置","topic_num":"高危妊娠與妊娠合併症","topic_code":"O3-9","q_num":17,"roc_year":"111","exam_code":"111110","src":"民國111年","options":{"A":"胎頭與骨盆不對稱","B":"胎兒窘迫","C":"前置胎盤","D":"早期破水"},"img":""},{"id":"113180-N4-10","code":"113180","roc":"113","cat":"N4","catname":"產兒科護理學","num":10,"stem":"徐女士30 歲,G2P1,懷孕35 週。因在家感覺子宮規則收縮疼痛,故入院。檢查發現每隔10 分鐘宮縮一 次,持續30 秒,強度40 mmHg,內診子宮頸口開4 公分,70%變薄,胎位為臀位,主訴有很多水從陰道 流出。護理師最優先的照護措施為下列何者?","opts":{"A":"立刻通知超音波室","B":"給予靜脈輸液","C":"監測胎兒心跳速率","D":"準備進行催生"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"9高危妊娠待產與生產處置","topic_num":"高危妊娠與妊娠合併症","topic_code":"O3-9","q_num":10,"roc_year":"113","exam_code":"113180","src":"民國113年","options":{"A":"立刻通知超音波室","B":"給予靜脈輸液","C":"監測胎兒心跳速率","D":"準備進行催生"},"img":""},{"id":"113180-N4-20","code":"113180","roc":"113","cat":"N4","catname":"產兒科護理學","num":20,"stem":"下列何種情況易導致待產婦女發生子宮內翻(Uterine Inversion)?1娩出胎盤時過度牽引臍帶 2過早注 射Methergin 3在子宮底施加壓力(fundal pressure) 4胎盤早期剝離","opts":{"A":"12","B":"13","C":"34","D":"24"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"9高危妊娠待產與生產處置","topic_num":"高危妊娠與妊娠合併症","topic_code":"O3-9","q_num":20,"roc_year":"113","exam_code":"113180","src":"民國113年","options":{"A":"12","B":"13","C":"34","D":"24"},"img":""},{"id":"114030-N4-11","code":"114030","roc":"114","cat":"N4","catname":"產兒科護理學","num":11,"stem":"有關生產疼痛理論與緩解措施之敘述,下列何者正確?","opts":{"A":"按撫法(effleurage)對強度疼痛的減痛效果明顯","B":"骶骨重壓法可減輕下背部疼痛","C":"生產球適合高危險妊娠婦女使用","D":"按撫法的原理是依據制約理論"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"9高危妊娠待產與生產處置","topic_num":"高危妊娠與妊娠合併症","topic_code":"O3-9","q_num":11,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"按撫法(effleurage)對強度疼痛的減痛效果明顯","B":"骶骨重壓法可減輕下背部疼痛","C":"生產球適合高危險妊娠婦女使用","D":"按撫法的原理是依據制約理論"},"img":""}],E={"101030-N4-17":{"quick":"妊娠31週「無痛性」陰道鮮紅出血,最可能為前置胎盤(placenta previa)。","detail":{"background":"妊娠後期出血兩大原因鑑別:(1)前置胎盤(placenta previa)——胎盤附著於子宮下段、覆蓋或近子宮頸內口,典型「無痛性、鮮紅色」陰道出血,因子宮下段拉長使胎盤剝離出血;(2)胎盤早期剝離(abruptio placenta)——正常位置胎盤過早剝離,典型「疼痛性、暗紅色」出血合併子宮張力高(硬如木板)、壓痛,可能隱性出血與DIC。本例「31週、無痛、鮮血」符合前置胎盤(A)。脅迫性流產發生於早期、妊娠毒血症(子癇)以高血壓抽搐為主。","options":{"A":"正確。無痛性鮮紅出血為前置胎盤典型。","B":"胎盤早剝為疼痛性暗紅出血、子宮硬。","C":"流產發生於妊娠早期。","D":"子癇症以高血壓、抽搐為主,非無痛出血。"},"sources":["新文京《產科護理學》前置胎盤vs胎盤早剝","妊娠出血"]}},"101030-N4-18":{"quick":"疑似前置胎盤(無痛鮮血)應「儘早就醫檢查與治療」,切勿在家拖延或自行內診/灌腸。","detail":{"background":"前置胎盤的處置原則:無痛性陰道出血疑前置胎盤者,應「立即/儘早就醫」,以超音波確認胎盤位置、評估出血量與母胎狀況;「禁止陰道內診與灌腸」(會刺激胎盤剝離大出血);依出血量與週數採期待療法(臥床、安胎、必要時類固醇促肺成熟)或終止妊娠(剖腹產)。不可叫病人在家觀察數小時或等合併腹痛/羊水才就醫(可能已大出血休克)。本題最合宜為「儘早就醫檢查及治療」(D)。","options":{"A":"錯。不可在家拖延觀察3小時,出血可能加劇。","B":"錯。不需等合併腹痛才就醫。","C":"錯。不需等羊水流出才就醫。","D":"正確。疑前置胎盤應儘早就醫檢查治療。"},"sources":["新文京《產科護理學》前置胎盤處置","妊娠出血急症"]}},"103030-N4-29":{"quick":"前置胎盤孕婦護理「不適當」者為「生產前給予清潔灌腸」(刺激易誘發大出血)。","detail":{"background":"前置胎盤的護理措施:限制活動、臥床休息(左側臥)、觀察並記錄出血量/性質、監測母胎生命徵象與胎心、備血、避免任何刺激子宮頸與陰道的操作——「禁止陰道內診、性交、灌腸」(灌腸刺激腸道與子宮可能誘發胎盤剝離大出血)。本題「不適當」者為「生產前給予清潔灌腸」(C)。","options":{"A":"適當。限制活動。","B":"適當。臥床休息。","C":"不適當(本題答案)。前置胎盤禁灌腸(易誘發大出血)。","D":"適當。觀察記錄出血情形。"},"sources":["新文京《產科護理學》前置胎盤護理","妊娠出血"]}},"103100-N4-11":{"quick":"妊娠30週「突發無痛性鮮紅色」陰道出血,最可能為前置胎盤。","detail":{"background":"前置胎盤典型:妊娠後期(常28週後)「無痛性、突發、鮮紅色」陰道出血(子宮下段拉長使前置的胎盤邊緣剝離)。早期破水為流出羊水(非血);胎盤早期剝離為「疼痛性暗紅出血+子宮硬壓痛」;植入性胎盤(placenta accreta)多於產後胎盤無法剝離而出血。本例「無痛鮮紅出血」為前置胎盤(B)。","options":{"A":"早期破水為羊水流出,非鮮紅出血。","B":"正確。無痛性鮮紅出血為前置胎盤。","C":"胎盤早剝為疼痛性暗紅出血。","D":"植入性胎盤多於產後胎盤滯留出血。"},"sources":["新文京《產科護理學》前置胎盤","妊娠出血"]}},"104100-N4-33":{"quick":"前置胎盤臨床表徵中正確者為「有可能合併胎盤早期剝離的傾向」。","detail":{"background":"前置胎盤臨床:出血多始於妊娠「第三孕期(後期)」(非第二孕期即出血);為「無痛性」出血、出血「在外」較易估計(隱性出血與休克較屬胎盤早剝);診斷以超音波定位,但因子宮下段尚未完全形成,「過早(如24週)分級不準」,需後期再確認;前置胎盤的胎盤位置異常,可能合併「胎盤早期剝離、植入性胎盤」傾向。本題正確為「有可能合併胎盤早剝傾向」(D)。","options":{"A":"錯。前置胎盤出血多始於第三孕期,非第二孕期。","B":"出血在外較易估計、休克較屬胎盤早剝(隱性出血)。","C":"錯。太早(24週)分級不準,需後期確認。","D":"正確。前置胎盤可能合併胎盤早剝傾向。"},"sources":["新文京《產科護理學》前置胎盤","妊娠出血"]}},"105090-N4-33":{"quick":"胎盤早期剝離產後護理重點:預防產後大出血並持續觀察凝血機制(防DIC)。","detail":{"background":"胎盤早期剝離(abruptio placentae)併發症與產後護理:大量出血(顯性+隱性)、子宮胎盤卒中(Couvelaire子宮)致子宮收縮不良、釋出凝血活素引發「瀰漫性血管內凝血(DIC)」。產後護理:密切「預防/監測產後大出血」(子宮收縮、惡露)、「持續觀察凝血功能(DIC)」、監測生命徵象與尿量(腎衰竭)、備血。胎盤娩出後「應給子宮收縮劑」促進收縮止血(非禁用);DIC高峰在產後早期(非1星期);剝離處接近子宮底非陰道。本題正確為「預防產後大出血及持續觀察凝血機制」(A)。","options":{"A":"正確。預防產後大出血、觀察凝血機制(DIC)。","B":"錯。產後應給子宮收縮劑止血。","C":"錯。胎盤早剝非剝離處近陰道致逆行感染。","D":"錯。DIC高峰在產後早期,非產後1星期。"},"sources":["新文京《產科護理學》胎盤早剝/DIC","妊娠出血"]}},"107030-N4-33":{"quick":"妊娠29週突發腹部劇痛、子宮硬且壓痛、胎心難測、無陰道出血,最可能為胎盤早期剝離(隱性出血型)。","detail":{"background":"胎盤早期剝離(abruptio placentae):正常位置胎盤於胎兒娩出前過早剝離。典型「持續性腹痛、子宮張力高(硬如木板)、子宮壓痛、胎心率異常或測不到(胎兒窘迫/死亡)」;出血可為顯性(暗紅)或「隱性(血積於胎盤後,無明顯陰道出血)」,隱性型仍可大量失血致休克與DIC。本例「腹劇痛、子宮硬壓痛、胎心難測、無陰道出血」符合(隱性)胎盤早期剝離(C)。前置胎盤為無痛鮮紅出血、子宮軟。","options":{"A":"急性腹膜炎非以子宮硬壓痛、胎心難測為主。","B":"前置胎盤為無痛鮮紅出血、子宮軟。","C":"正確。腹劇痛+子宮硬壓痛+胎心難測=胎盤早期剝離(隱性)。","D":"脅迫性流產發生於早期,非29週此表現。"},"sources":["新文京《產科護理學》胎盤早剝","妊娠出血急症"]}},"108020-N4-32":{"quick":"前置胎盤可能成因包括多胎妊娠、高齡產婦、前次剖腹產(子宮內膜/疤痕異常)。","detail":{"background":"前置胎盤危險因子:子宮內膜受損或疤痕(前次剖腹產、多次人工流產/刮除、子宮手術)、多產、高齡產婦、多胎妊娠(胎盤面積大)、吸菸、前次前置胎盤史。臨床:無痛性鮮紅出血;處置禁內診/灌腸。其他選項:部分性前置胎盤通常仍需剖腹產(覆蓋子宮頸口者不可陰道產);診斷在後期(子宮下段形成後)較準,非30週前一律可確認;非一律「絕對臥床」(視出血與分級)。本題正確為「成因為多胎、高齡、前次剖腹產」(A)。","options":{"A":"正確。多胎、高齡、前次剖腹產為前置胎盤危險因子。","B":"部分性前置胎盤多仍需剖腹產。","C":"診斷在後期較準,非30週前一律可確認。","D":"非一律絕對臥床(視出血與分級)。"},"sources":["新文京《產科護理學》前置胎盤危險因子","妊娠出血"]}},"110030-N4-34":{"quick":"前置胎盤敘述正確者為「有前置胎盤病史者,再次發生機率較高」。","detail":{"background":"前置胎盤(placenta previa):胎盤著床於「子宮下段」(非子宮底部);危險因子與年齡「有關」(高齡風險高)、與「多次子宮刮除術/剖腹產」「有關」(子宮內膜疤痕);有前置胎盤「病史者再發機率較高」。本題正確為「有病史者再發機率較高」(C);其餘(與年齡無關、著床子宮底、與刮除術無關)皆錯誤。","options":{"A":"錯。前置胎盤與年齡有關(高齡風險高)。","B":"錯。前置胎盤著床於子宮下段,非子宮底。","C":"正確。有前置胎盤病史者再發機率較高。","D":"錯。與多次子宮刮除術有關。"},"sources":["新文京《產科護理學》前置胎盤","妊娠出血"]}},"111110-N4-32":{"quick":"前置胎盤症狀敘述中「腹部呈現木板狀的堅硬」為錯誤——木板狀硬腹是胎盤早期剝離的特徵。","detail":{"background":"前置胎盤vs胎盤早剝症狀對比:前置胎盤——「無痛性、突發鮮紅出血」、子宮「柔軟」、常合併「胎位不正(因胎盤佔據子宮下段)」;胎盤早期剝離——「疼痛性暗紅出血、子宮張力高/木板狀堅硬、壓痛」、可能DIC。題目問前置胎盤症狀「錯誤」者為「腹部呈現木板狀堅硬」(C)——此為胎盤早剝特徵,非前置胎盤。","options":{"A":"正確。前置胎盤腹部較少疼痛。","B":"正確。前置胎盤常合併胎位不正。","C":"錯誤(本題答案)。木板狀硬腹是胎盤早剝,非前置胎盤。","D":"正確。突發性鮮紅色陰道出血為前置胎盤。"},"sources":["新文京《產科護理學》前置胎盤vs胎盤早剝","妊娠出血"]}},"113180-N4-16":{"quick":"胎盤早期剝離敘述中「為無痛性的陰道出血」為錯誤——胎盤早剝為「疼痛性」出血。","detail":{"background":"胎盤早期剝離特徵:疼痛性陰道出血(暗紅或隱性)、子宮「高張力(硬、壓痛)」、胎心音異常需密切監測、可能併發瀰漫性血管內凝血(DIC,因剝離釋放凝血活素)與產後出血、急性腎衰竭。「無痛性出血」是「前置胎盤」的特徵,非胎盤早剝。本題問「錯誤」者為「為無痛性的陰道出血」(D)。","options":{"A":"正確。需密切觀察胎心音。","B":"正確。易呈高張力宮縮(子宮硬)。","C":"正確。可能併發DIC。","D":"錯誤(本題答案)。胎盤早剝為「疼痛性」出血,非無痛性。"},"sources":["新文京《產科護理學》胎盤早剝","妊娠出血"]}},"115030-N4-20":{"quick":"妊娠32週突發下腹痛、陰道流出暗紅色血液,最可能為胎盤早期剝離。","detail":{"background":"妊娠後期出血鑑別:胎盤早期剝離——「疼痛性、暗紅色」出血(或隱性)、子宮硬壓痛、胎兒窘迫、DIC風險;前置胎盤——「無痛性、鮮紅色」出血、子宮軟。本例「下腹痛+暗紅色出血」符合胎盤早期剝離(B)。脅迫性(不可避免)流產發生於早期;子癇症以高血壓抽搐為主。","options":{"A":"前置胎盤為無痛鮮紅出血。","B":"正確。疼痛性暗紅出血=胎盤早期剝離。","C":"流產發生於妊娠早期。","D":"子癇症以高血壓抽搐為主。"},"sources":["新文京《產科護理學》胎盤早剝vs前置胎盤","妊娠出血"]}},"102110-N4-35":{"quick":"突發下腹劇痛+陰道出血+休克(BP 80/48、蒼白冰冷)+hCG升高,最可能為子宮外孕破裂。","detail":{"background":"子宮外孕(ectopic pregnancy):受精卵著床於子宮腔外(最常輸卵管壺腹部)。臨床:停經後單側下腹痛、陰道少量出血、血中hCG升高但較同週數低且上升慢;破裂時「突發劇烈腹痛、腹腔內大出血→低血容性休克(蒼白、四肢冰冷、低血壓、心搏快)」,為婦科急症。本例符合子宮外孕(破裂)(C)。子宮肌瘤、前置胎盤、產後出血皆不符此急性休克+hCG表現。","options":{"A":"子宮肌瘤不致急性休克。","B":"產後大出血發生於產後,非此情境。","C":"正確。劇痛+出血+休克+hCG升高=子宮外孕(破裂)。","D":"前置胎盤為妊娠後期無痛鮮紅出血。"},"sources":["新文京《產科護理學》子宮外孕","婦科急症"]}},"107030-N4-32":{"quick":"妊娠8週陰道點狀出血、腹微痛但「子宮頸口未擴張」,為先兆性流產(threatened abortion)。","detail":{"background":"流產分類(以子宮頸口與妊娠物排出區分):先兆性(threatened)——少量出血、輕微腹痛、「子宮頸口未開」、胎兒仍存活,有機會繼續妊娠(處置:臥床休息、避免性行為、必要時黃體素);不可避免/迫切性(inevitable/imminent)——出血腹痛加劇、子宮頸口已開;不完全(incomplete)——部分妊娠物已排出仍有殘留;完全(complete)——妊娠物完全排出;敗血性(septic)——合併感染。本例「子宮頸口未開」為先兆性流產(B)。","options":{"A":"迫切性流產子宮頸口已開、症狀加劇。","B":"正確。出血腹微痛但子宮頸未開=先兆性流產。","C":"不完全流產已部分排出妊娠物。","D":"敗血性流產合併感染。"},"sources":["新文京《產科護理學》流產分類","妊娠早期出血"]}},"107110-N4-31":{"quick":"子宮外孕敘述中「臨床處置只能採腹腔鏡手術」為錯誤——可依情況採藥物(MTX)治療。","detail":{"background":"子宮外孕處置:依血流動力穩定度、外孕大小、hCG值與是否破裂決定:(1)未破裂、早期、hCG不高、血流穩定者可「藥物治療(methotrexate, MTX)」溶解滋養層;(2)破裂或不適合藥物者行手術(腹腔鏡或剖腹,輸卵管切開或切除)。故「只能腹腔鏡手術」錯誤。子宮外孕hCG會上升(但較慢/較低)、出血時腹痛、最常好發於「輸卵管壺腹部」皆正確。本題問「錯誤」者為B。","options":{"A":"正確。血中hCG有上升(但較慢)。","B":"錯誤(本題答案)。未破裂者可用MTX藥物治療,非只能腹腔鏡。","C":"正確。出血時易有腹痛。","D":"正確。最好發於輸卵管壺腹部。"},"sources":["新文京《產科護理學》子宮外孕治療","MTX/手術"]}},"110110-N4-30":{"quick":"妊娠8週出血+嚴重噁心嘔吐+子宮大於週數+hCG偏高+超音波無胎兒影像,最可能為葡萄胎。","detail":{"background":"葡萄胎(hydatidiform mole,妊娠滋養層疾病):絨毛水泡狀增生、無正常胎兒。臨床:「子宮大小大於妊娠週數」、hCG「異常升高」(致嚴重噁心嘔吐/妊娠劇吐、早發子癇前症)、陰道斷續出血(可排出水泡狀組織)、超音波呈「暴風雪/葡萄串」狀「無胎兒、無胎心」。處置:子宮抽吸刮除清除,術後追蹤hCG(防絨毛膜癌)。本例符合葡萄胎(D)。","options":{"A":"先兆性流產子宮大小符合週數、hCG正常下降。","B":"子宮外孕子宮不會大於週數。","C":"雙胞胎可見兩個胎兒影像。","D":"正確。子宮大於週數+hCG高+無胎兒影像=葡萄胎。"},"sources":["新文京《產科護理學》葡萄胎","妊娠滋養層疾病"]}},"112030-N4-34":{"quick":"妊娠8週點狀出血、腹微痛、超音波「子宮頸口未開」,為先兆性流產(threatened abortion)。","detail":{"background":"再次辨流產:先兆性流產的關鍵是「子宮頸口未開、胎兒存活」,僅少量出血與輕微腹痛,有機會保住妊娠。迫切性(imminent/inevitable)子宮頸已開、症狀加劇;不完全流產已部分排出;完全流產妊娠物已全排出、出血腹痛緩解。本例「子宮頸口未開」為先兆性流產(B)。","options":{"A":"迫切性流產子宮頸已開。","B":"正確。子宮頸未開=先兆性流產。","C":"不完全流產已部分排出妊娠物。","D":"完全性流產妊娠物已全排出。"},"sources":["新文京《產科護理學》流產分類","妊娠早期出血"]}},"112030-N4-35":{"quick":"先兆性流產且超音波確認胎兒心跳正常,最適當照護為「臥床休息、給予黃體素」。","detail":{"background":"先兆性流產(胎兒存活、子宮頸未開)的照護:以「臥床休息、避免性行為與劇烈活動、減輕壓力」為主,黃體素不足者可「補充黃體素(progesterone)」安胎(維持子宮內膜、抑制宮縮);觀察出血與症狀變化。安胎子宮收縮抑制劑(Yutopar)用於有「規則宮縮的早產」而非早期先兆流產;子宮頸環紮術用於「子宮頸閉鎖不全」;抗生素用於感染。本題最適當為「臥床休息、給予黃體素」(A)。","options":{"A":"正確。臥床休息、給予黃體素安胎。","B":"Yutopar用於有規則宮縮的早產,非早期先兆流產。","C":"環紮術用於子宮頸閉鎖不全。","D":"抗生素用於感染性流產。"},"sources":["新文京《產科護理學》先兆性流產處置","黃體素安胎"]}},"112180-N4-20":{"quick":"前兩胎16~18週「無痛性破水自然流產」、此胎16週子宮頸已擴張2公分,具子宮頸閉鎖不全,建議環紮術。","detail":{"background":"子宮頸閉鎖不全(cervical incompetence/insufficiency):子宮頸於妊娠中期(約16–24週)「無痛地」變短、擴張,導致反覆「中期(第二孕期)無痛性流產/早產破水」。診斷依病史(≥2次中期無痛流產)+超音波子宮頸變短/擴張。處置:「子宮頸環紮術(cervical cerclage,約12–14週施行)」加固子宮頸、臥床。本例(兩次16–18週無痛流產+此胎16週頸口已開2公分)符合,建議環紮術(B)。","options":{"A":"錯。產檢非「一切正常」,已有頸口擴張、屬高危。","B":"正確。具子宮頸閉鎖不全高危因子,建議環紮術。","C":"此非胎盤早剝,口服安胎非首選處置。","D":"此非產程遲滯;子宮頸變短而非變長。"},"sources":["新文京《產科護理學》子宮頸閉鎖不全","環紮術"]}},"113030-N4-21":{"quick":"子宮頸環紮術最適合「前兩次21週無痛性流產、此胎16週子宮頸長3.3公分」者(子宮頸閉鎖不全且尚可預防)。","detail":{"background":"子宮頸環紮術(cervical cerclage)適應與時機:用於「子宮頸閉鎖不全」——有「≥2次第二孕期(中期)無痛性流產/早產」病史者,於「妊娠約12–14週、子宮頸尚未明顯擴張、無感染與宮縮」時預防性施行,加固子宮頸。本題選項B(前兩次21週無痛流產+此胎16週子宮頸長3.3公分、尚未明顯擴張)最適合預防性環紮。其餘:已破水合併規則宮縮痛+頸口開2公分(C,已進入流產/感染風險,環紮禁忌)、28週頸長1公分前胎31週早產(D,週數較晚、處置不同)、上一胎足月此胎16週頸口開4公分(A,已大幅擴張,環紮成功率低)。本題答案B。","options":{"A":"子宮頸已開4公分,環紮成功率低。","B":"正確。中期無痛流產史+頸長尚可,最適合預防性環紮。","C":"已破水+規則宮縮痛+頸口開,屬環紮禁忌。","D":"28週頸長1公分屬較晚、處置不同。"},"sources":["新文京《產科護理學》子宮頸環紮適應症","子宮頸閉鎖不全"]}},"101110-N4-71":{"quick":"MgSO4治療出現DTR 0~+1、呼吸12次/分、尿少、潮紅無力 → 鎂離子中毒,應給解毒劑(葡萄糖酸鈣)。","detail":{"background":"硫酸鎂(MgSO4)用於重度子癇前症預防抽搐,但治療窗窄,過量致「鎂中毒」。監測指標與中毒順序:深部肌腱反射(DTR)消失(<+1)→呼吸抑制(<12–14次/分)→尿量減少(<30 mL/hr,鎂經腎排出,尿少易蓄積)→心臟傳導抑制。出現DTR減弱/消失、呼吸<12、尿少、潮紅無力即「鎂中毒」徵象,應「停藥並給解毒劑——10%葡萄糖酸鈣(calcium gluconate)」靜脈注射拮抗。本題正確評估為「鎂離子中毒,應給解毒劑」(A)。","options":{"A":"正確。DTR↓、呼吸↓、尿少=鎂中毒,給葡萄糖酸鈣解毒。","B":"錯。已中毒,不可加重劑量。","C":"錯。此為中毒徵象非有效反應。","D":"非換藥問題,是中毒需解毒。"},"sources":["新文京《產科護理學》MgSO4中毒/葡萄糖酸鈣","子癇前症"]}},"102110-N4-28":{"quick":"妊娠高血壓會使「胎盤灌流減少」,易致胎兒早產、缺氧或子宮內生長遲滯(IUGR)。","detail":{"background":"妊娠高血壓疾病/子癇前症機轉與影響:胎盤螺旋動脈重塑不良→胎盤缺血→釋放因子致全身血管內皮損傷、血管痙攣→高血壓、蛋白尿、水腫;血管痙攣使「胎盤灌流減少」→胎兒缺氧、IUGR、早產、胎盤早剝。血小板因消耗而「減少」(非增加);HELLP為溶血、肝酵素上升、「血小板下降」(非增加);抽搐(子癇)前可有頭痛、視力模糊、上腹痛等前驅,但「語言/情緒不穩」非典型即將抽搐指標。本題正確為「胎盤灌流減少致早產缺氧IUGR」(C)。","options":{"A":"錯。血小板因消耗而減少,非增加。","B":"錯。HELLP是血小板「下降」。","C":"正確。胎盤灌流減少致早產、缺氧、IUGR。","D":"語言情緒不穩非即將子癇的典型指標。"},"sources":["新文京《產科護理學》子癇前症機轉","妊娠高血壓"]}},"104030-N4-31":{"quick":"妊娠32週血壓160/108、尿蛋白(−)、無水腫,診斷為妊娠誘發性(妊娠)高血壓。","detail":{"background":"妊娠高血壓疾病分類(以20週為界、是否蛋白尿/器官受損):(1)妊娠高血壓(gestational hypertension)——妊娠20週後新發高血壓(≥140/90)、「無蛋白尿、無器官受損」;(2)子癇前症(preeclampsia)——高血壓「合併蛋白尿或器官受損」;(3)子癇症(eclampsia)——子癇前症基礎上發生「抽搐」;(4)慢性高血壓——20週前已存在。本例「160/108、尿蛋白陰性、無水腫」屬「妊娠誘發性(妊娠)高血壓」(A,尚無蛋白尿故非子癇前症)。","options":{"A":"正確。20週後高血壓、無蛋白尿=妊娠(誘發性)高血壓。","B":"子癇前症需合併蛋白尿/器官受損。","C":"「妊娠惡化性高血壓」非標準診斷名。","D":"子癇症需有抽搐。"},"sources":["新文京《產科護理學》妊娠高血壓分類","ACOG"]}},"106030-N4-32":{"quick":"妊娠30週後持續高血壓150/100→160/110、34週合併尿蛋白(+)及水腫,診斷為子癇前症。","detail":{"background":"子癇前症(preeclampsia):妊娠20週後新發「高血壓(≥140/90)」合併「蛋白尿」或器官受損(血小板下降、肝腎功能異常、肺水腫、頭痛視力模糊等);重度者BP≥160/110或合併器官損傷。本例後期高血壓「合併尿蛋白(+)與水腫」,符合子癇前症(B)。腎性高血壓需腎病因;妊娠惡化性高血壓非標準名;腦中風前症候群非此情境。","options":{"A":"腎性高血壓需原發腎病因。","B":"正確。高血壓+尿蛋白+水腫=子癇前症。","C":"「妊娠惡化性高血壓」非標準診斷。","D":"非腦中風前症候群。"},"sources":["新文京《產科護理學》子癇前症","妊娠高血壓"]}},"107110-N4-8":{"quick":"妊娠高血壓最常以超音波偵測「臍動脈血流(都卜勒)」評估胎兒生長發育(胎盤功能)。","detail":{"background":"臍動脈都卜勒血流(S/D、PI、RI):反映胎盤血管阻力。妊娠高血壓/子癇前症因胎盤灌流不良、阻力升高、易致胎兒生長受限(IUGR),故「妊娠高血壓」是最常使用臍動脈血流監測以評估胎兒生長與胎盤功能的情況;舒張期血流降低/消失/逆流提示胎盤功能嚴重不良。本題答案為妊娠高血壓(B)。","options":{"A":"妊娠糖尿病以血糖控制與胎兒大小監測為主。","B":"正確。妊娠高血壓最常用臍動脈血流評估胎兒生長。","C":"過期妊娠以NST/BPP、羊水量監測為主。","D":"紅斑性狼瘡視病情,非首要以此評估。"},"sources":["新文京《產科護理學》臍動脈都卜勒","子癇前症/IUGR"]}},"108020-N4-4":{"quick":"妊娠24週血壓正常、無水腫,尿蛋白僅痕跡(trace),最可能因「腎微血管充血」所致(生理性)。","detail":{"background":"孕期尿蛋白:妊娠腎血流與GFR增加、腎絲球微血管充血,可使尿蛋白出現「微量/痕跡(trace)」,在血壓正常、無水腫、無其他異常時多為「生理性(腎微血管充血所致)」。子癇前症的蛋白尿需「高血壓合併≥+1或24小時≥300 mg」且多在20週後出現;本例血壓正常、僅痕跡,尚不符子癇前症。本題最適當解釋為「腎微血管充血所致」(B)。","options":{"A":"血壓正常無水腫,尚不符子癇前症早期徵象。","B":"正確。腎微血管充血致生理性微量蛋白尿。","C":"腎小管對蛋白吸收增加非此機轉。","D":"非攝取過多水分所致。"},"sources":["新文京《產科護理學》孕期尿蛋白","妊娠腎臟生理"]}},"108110-N4-29":{"quick":"HELLP症候群指「溶血(H)、肝功能指數上升(EL)、血小板下降(LP)」的症候群。","detail":{"background":"HELLP症候群:重度子癇前症的嚴重變異,三聯為「H=Hemolysis溶血、EL=Elevated Liver enzymes肝酵素上升、LP=Low Platelets血小板下降」;多發生於妊娠後期(第三孕期)或產後,常伴右上腹/上腹痛、噁心、不適,母胎風險高(DIC、肝包膜下血腫、胎盤早剝),需穩定後儘速終止妊娠。與ABO血型不合無關。本題正確為「溶血+肝酵素上升+血小板下降」(B)。","options":{"A":"錯。非懷孕20週前、非血小板增加。","B":"正確。溶血+肝功能上升+血小板下降。","C":"非單純出血性疾病的描述。","D":"與ABO血型不合無關。"},"sources":["新文京《產科護理學》HELLP","子癇前症"]}},"109110-N4-32":{"quick":"子癇前症的症狀為高血壓、蛋白尿、水腫;「痙攣(抽搐)」為錯誤——抽搐屬子癇症(eclampsia)。","detail":{"background":"子癇前症(preeclampsia)三大表現:高血壓、蛋白尿、水腫(現代診斷以高血壓+蛋白尿或器官受損為主,水腫非必要);重度者頭痛、視力模糊、上腹痛、肝腎功能異常、血小板下降。「痙攣(全身強直陣攣抽搐)」是在子癇前症基礎上發生抽搐,屬「子癇症(eclampsia)」,非子癇前症本身的症狀。本題問「錯誤」者為「痙攣」(B)。","options":{"A":"正確。高血壓為子癇前症表現。","B":"錯誤(本題答案)。痙攣(抽搐)屬子癇症,非子癇前症。","C":"正確。蛋白尿為子癇前症表現。","D":"正確。水腫為子癇前症常見表現。"},"sources":["新文京《產科護理學》子癇前症vs子癇症","妊娠高血壓"]}},"111030-N4-30":{"quick":"子癇前症以MgSO4治療期間,最重要的護理評估為「深部肌腱反射(DTR)」。","detail":{"background":"MgSO4(預防/治療子癇抽搐)的監測重點——監測「鎂中毒」三大早期指標,其中「深部肌腱反射(DTR)」最早消失、最敏感,故為「最重要」的評估:DTR減弱/消失→呼吸<12–14次/分→尿量<30 mL/hr;同時監測血鎂濃度、意識、胎心。一旦DTR消失即停藥並備「葡萄糖酸鈣」解毒。本題最重要評估為深部肌腱反射(C)。","options":{"A":"意識變化為輔,DTR最早最敏感。","B":"身體平衡反應非鎂中毒主要指標。","C":"正確。深部肌腱反射為MgSO4中毒最重要評估。","D":"指尖再灌流非鎂中毒監測重點。"},"sources":["新文京《產科護理學》MgSO4監測","子癇前症"]}},"112180-N4-21":{"quick":"HELLP症候群的「H」指紅血球溶血(Hemolysis)。","detail":{"background":"HELLP三聯正解:H=Hemolysis(紅血球「溶血」)、EL=Elevated Liver enzymes(肝臟酵素AST/ALT「上升」、非胰臟酵素)、LP=Low Platelets(血小板「下降」,常<100,000/mm³,非<200,000也非上升);多發生於「第三妊娠期或產後」(非第一妊娠期)。本題正確為「H:指紅血球溶血」(A)。","options":{"A":"正確。H=紅血球溶血。","B":"錯。EL為「肝臟」酵素上升,非胰臟。","C":"錯。LP為血小板下降(常<100,000)。","D":"錯。多發生於第三妊娠期或產後,非第一妊娠期。"},"sources":["新文京《產科護理學》HELLP","子癇前症"]}},"113100-N4-22":{"quick":"重度子癇前症的危險徵候包括嚴重頭痛(1)與視力模糊(2)。","detail":{"background":"重度子癇前症的警示徵候(提示即將子癇/器官受損):BP≥160/110、嚴重「頭痛」、「視力模糊/視覺障礙」、上腹/右上腹痛、噁心嘔吐、寡尿(24小時尿量<400–500 mL,而非選項所述「400 mL為危險徵候」需注意是寡尿)、血小板下降、肝腎功能異常、肺水腫、血清肌酐酸「上升」(非下降)。本題危險徵候為「嚴重頭痛(1)+視力模糊(2)」(A);「肌酐酸持續下降」(4)錯誤(應上升)。","options":{"A":"正確。嚴重頭痛(1)+視力模糊(2)為重度子癇前症危險徵候。","B":"含敘述3之尿量判讀爭議,非最佳組合。","C":"含血清肌酐酸下降(4)錯誤。","D":"含血清肌酐酸下降(4)錯誤。"},"sources":["新文京《產科護理學》重度子癇前症","妊娠高血壓"]}},"113180-N4-23":{"quick":"重度子癇前症孕婦的飲食建議為「高蛋白質、低鈉飲食」。","detail":{"background":"重度子癇前症飲食:因蛋白尿致蛋白流失,應給「足量/高蛋白」補充;限制「鈉(低鈉)」以減輕水腫與血壓負擔(但不需過度嚴格限鈉至影響血容量);均衡熱量、適量鈣。故建議「高蛋白質、低鈉」(A)。低蛋白會加重低蛋白血症與水腫;高鈉會升血壓加重水腫。本題答案為高蛋白低鈉(A)。","options":{"A":"正確。高蛋白質(補蛋白流失)、低鈉(減水腫血壓)。","B":"錯。低蛋白會加重低蛋白血症。","C":"錯。高鈉升血壓、加重水腫。","D":"錯。高鈉不利血壓控制。"},"sources":["新文京《產科護理學》子癇前症飲食","妊娠高血壓"]}},"114170-N4-22":{"quick":"HELLP症候群中「EL」指肝臟酵素上升、肝腫大(Elevated Liver enzymes)。","detail":{"background":"HELLP三聯再確認:H=Hemolysis溶血(非血尿)、EL=Elevated Liver enzymes「肝臟酵素上升」(AST/ALT升高、肝腫大、可右上腹痛)、LP=Low Platelets血小板下降(常<100,000/mm³);多發生於第三妊娠期或產後(非第一妊娠期)。本題正確為「EL:肝臟酵素上升、肝腫大」(C)。","options":{"A":"錯。HELLP多發生於第三妊娠期/產後,非第一妊娠期。","B":"錯。H為溶血,非血尿。","C":"正確。EL=肝臟酵素上升、肝腫大。","D":"LP為血小板下降,常<100,000(非僅<150,000的描述重點)。"},"sources":["新文京《產科護理學》HELLP","子癇前症"]}},"115030-N4-21":{"quick":"妊娠16週血壓正常、28週後高血壓140/96~145/100、尿蛋白陰性,診斷為妊娠高血壓(gestational hypertension)。","detail":{"background":"妊娠高血壓分類辨識:本例「20週前(16週)血壓正常」排除慢性高血壓;「20週後(28週)新發高血壓≥140/90、間隔測量持續」且「尿蛋白(−)、無器官受損」→「妊娠高血壓(gestational hypertension)」;若合併蛋白尿/器官受損才升為子癇前症。白袍高血壓為診間才高、居家正常,本例間隔四小時兩次皆高、非白袍。本題答案為妊娠高血壓(B)。","options":{"A":"慢性高血壓於20週前即存在,本例16週正常。","B":"正確。20週後新發高血壓、無蛋白尿=妊娠高血壓。","C":"子癇前症需合併蛋白尿/器官受損。","D":"兩次測量皆高,非白袍高血壓。"},"sources":["新文京《產科護理學》妊娠高血壓分類","ACOG"]}},"103030-N4-37":{"quick":"妊娠糖尿病篩檢:口服50公克葡萄糖水1小時後血糖>140 mg/dL,才進一步做診斷性OGTT。","detail":{"background":"妊娠糖尿病(GDM)兩階段篩檢(台灣常用):(1)篩檢——妊娠24–28週口服「50公克葡萄糖」、1小時後測血糖,≥140 mg/dL為陽性,需進一步;(2)診斷——做「100公克3小時OGTT(空腹及1、2、3小時)」,兩項以上超標即診斷GDM(或採75公克一步法)。OGTT不致胎兒缺氧;孕前已知糖尿病(孕前糖尿病)不需做OGTT診斷(已是糖尿病)。本題正確為「50g後1小時>140才進一步」(A)。","options":{"A":"正確。50g葡萄糖1小時>140 mg/dL需進一步檢查。","B":"診斷用100g 3小時OGTT,非「3小時>110即確診」。","C":"孕前已糖尿病者不需以OGTT確診。","D":"OGTT不會造成胎兒缺氧。"},"sources":["新文京《產科護理學》GDM篩檢","ADA/國健署"]}},"103030-N4-38":{"quick":"妊娠糖尿病接受胰島素治療不會導致胎兒畸形;血糖控制不良反而易致母胎健康問題。","detail":{"background":"GDM治療衛教:首選飲食與運動控制,血糖未達標者加「胰島素(不通過胎盤、不致畸胎,為孕期首選降糖藥)」;孕期口服降糖藥使用需依醫囑評估。重點是「血糖控制不良(高血糖)」才會造成巨嬰、新生兒低血糖低血鈣、早產、子癇前症、孕早期高血糖增畸形與流產;故應強調「接受胰島素治療不致畸胎,血糖控制不良才有害」。本題最合宜回答為B。","options":{"A":"錯。胰島素不影響胎兒成長/不致畸,說法不當。","B":"正確。胰島素不致畸胎,血糖控制不良才害母胎。","C":"錯。胰島素無致畸可能。","D":"錯。高血糖影響不只體重,且胰島素非「使胎兒增重」的原因。"},"sources":["新文京《產科護理學》GDM治療","胰島素"]}},"105090-N4-30":{"quick":"OGTT兩次血糖(1小時200、2小時180 mg%)均超過標準值,可確立為妊娠糖尿病。","detail":{"background":"妊娠糖尿病診斷:75公克OGTT(一步法)切點約為——空腹≥92、1小時≥180、2小時≥153 mg/dL,「任一項」達標即診斷GDM(或100g 3小時法兩項以上)。本例1小時200、2小時180,均超標,可確立GDM。GDM定義為「妊娠期間(無論週數)首次發現的糖耐受異常」(非因>20週就排除妊娠相關);其分型不等同第一/第二型糖尿病。本題正確為「兩次數據均超標,可確立GDM」(A)。","options":{"A":"正確。兩次血糖均超標,確立妊娠糖尿病。","B":"錯。GDM定義為妊娠期首次發現的糖耐受異常,非因>20週排除。","C":"GDM非等同第二型糖尿病分類。","D":"GDM非等同第一型糖尿病分類。"},"sources":["新文京《產科護理學》GDM診斷","ADA OGTT"]}},"105090-N4-32":{"quick":"妊娠糖尿病合併症中「羊水過少」為錯誤——GDM易合併「羊水過多」。","detail":{"background":"妊娠糖尿病(GDM)母胎合併症:巨嬰(母體高血糖刺激胎兒胰島素→過度生長)、肩難產、新生兒低血糖/低血鈣/高膽紅素、新生兒呼吸窘迫(高胰島素延遲肺成熟)、子癇前症(妊娠誘發性高血壓)、「羊水過多(polyhydramnios)」(胎兒高血糖致多尿)、孕早期高血糖增畸形與流產。故合併「羊水過少」為錯誤(應為羊水過多)。本題問「錯誤」者為羊水過少(B)。","options":{"A":"正確。巨嬰為GDM合併症。","B":"錯誤(本題答案)。GDM易合併羊水「過多」,非過少。","C":"正確。新生兒低血糖為GDM合併症。","D":"正確。妊娠誘發性高血壓為GDM合併症。"},"sources":["新文京《產科護理學》GDM合併症","妊娠糖尿病"]}},"106110-N4-33":{"quick":"妊娠糖尿病敘述中「宜控制糖化血色素在7.5%以下」為錯誤——孕期目標應更嚴格(約<6%)。","detail":{"background":"妊娠糖尿病控制目標:血糖控制應比一般糖尿病更嚴格——空腹<95、餐後1小時<140或2小時<120 mg/dL,糖化血色素(HbA1c)建議控制在「<6%(或<6.5%)」以降低巨嬰與畸形風險,「7.5%」過高、不適合孕期。治療採飲食控制±胰島素;高血糖確實易致畸形、巨嬰;第一型糖尿病孕婦較易酮酸中毒。本題問「錯誤」者為「HbA1c控制7.5%以下」(C)。","options":{"A":"正確。採飲食控制或合併胰島素。","B":"正確。易發生胎兒畸形或巨嬰。","C":"錯誤(本題答案)。HbA1c應<6%,7.5%過高。","D":"正確。孕期高血糖(尤第一型)易酮酸中毒。"},"sources":["ADA 妊娠血糖目標","新文京《產科護理學》GDM"]}},"111110-N4-7":{"quick":"一般孕婦常規妊娠糖尿病篩檢的週數為「妊娠24~28週」。","detail":{"background":"GDM篩檢時程:一般風險孕婦於妊娠「24–28週」進行篩檢(50g 1小時或75g一步法);具高危因子(肥胖、GDM史、前胎巨嬰、家族史、多囊卵巢)者於「第一次產檢即提早篩檢」,正常者24–28週再篩。本題一般孕婦常規篩檢為24–28週(B)。","options":{"A":"18–20週非常規GDM篩檢時程。","B":"正確。一般孕婦24–28週篩檢妊娠糖尿病。","C":"30–34週過晚。","D":"35–37週為GBS篩檢時程,非GDM。"},"sources":["國健署 產檢時程","ADA GDM篩檢"]}},"113030-N4-22":{"quick":"妊娠糖尿病容易導致流產及羊水過多。","detail":{"background":"妊娠糖尿病(GDM)要點:致胰島素阻抗的胎盤荷爾蒙(hPL等)主要在「妊娠中後期(第二、三孕期)增加」(非妊娠初期);GDM與「糖尿病家族史有關」(危險因子之一);治療以飲食控制±「胰島素」為主(孕期口服降糖藥需評估,胰島素為首選);併發症含「流產、羊水過多、巨嬰、子癇前症」等。本題正確為「容易導致流產及羊水過多」(B)。","options":{"A":"錯。hPL致胰島素阻抗主要在中後期增加,非妊娠初期。","B":"正確。GDM易導致流產及羊水過多。","C":"錯。GDM與糖尿病遺傳史有關。","D":"錯。胰島素為主要治療,非口服降糖藥。"},"sources":["新文京《產科護理學》GDM","妊娠糖尿病"]}},"113100-N4-23":{"quick":"50公克OGTT篩檢:建議懷孕24~28週篩檢(2);1小時後血糖>140 mg/dL則需進一步檢查(4)。","detail":{"background":"第一階段50公克葡萄糖篩檢試驗:(1)時機——「妊娠24–28週」(高危者提早);(2)「不需空腹」(隨機口服50g後1小時抽血,空腹是100g診斷試驗的要求);(3)判讀——1小時血糖「≥140 mg/dL」為陽性,需進一步做100g 3小時OGTT診斷。本題正確組合為「24–28週篩檢(2)+1小時>140需進一步(4)」即24(D)。「20–22週篩檢」與「篩檢前需禁食」皆錯誤。","options":{"A":"含20–22週(1)與需禁食(3),皆錯。","B":"含20–22週(1)錯。","C":"含篩檢前需禁食(3)錯(50g篩檢不需空腹)。","D":"正確。24–28週篩檢(2)+1小時>140需進一步(4)。"},"sources":["新文京《產科護理學》GDM 50g篩檢","ADA"]}},"102030-N4-32":{"quick":"破水安胎用ritodrine(Yutopar)後胎心音升至168、宮縮減少,屬藥物副作用,宜調降滴注速率。","detail":{"background":"子宮收縮抑制劑ritodrine(Yutopar,β2交感神經興奮劑)安胎:常見副作用為「母體與胎兒心搏過速、心悸、顫抖、高血糖、低血鉀、肺水腫」。本例用藥後胎心由144升至168(過速)、宮縮減少,是「藥物的β-擬交感作用副作用」,並非胎兒窘迫;處置應「調降ritodrine滴注速率(減量)」、監測母胎心率與症狀。胎心過速≠胎兒窘迫(窘迫多為持續性心搏過緩/晚期減速/變異性消失)。本題最合適為「調降ritodrine滴速」(C)。","options":{"A":"胎心過速為藥物副作用,非胎兒窘迫。","B":"過速雖屬副作用但達168應調降滴速,非僅持續觀察。","C":"正確。胎心過速為藥物副作用,宜調降ritodrine滴速。","D":"胎心變化為藥物副作用,非即將早產的指標。"},"sources":["藥理 ritodrine 副作用","新文京《產科護理學》安胎"]}},"102030-N4-34":{"quick":"對「安胎藥是否致胎兒畸形」的詢問,最適當回答是「根據目前文獻記載,尚無導致胎兒畸形的報告」。","detail":{"background":"安胎(子宮收縮抑制)藥物如ritodrine、硫酸鎂等,目前「無明確致畸胎的報告」;護理師應依實證、以孕婦能理解的方式提供正確資訊與保證,減輕焦慮,並說明常見副作用(母胎心搏過速等)。不宜誇大(如「會致畸/影響經驗判斷」)或推諉(「我請醫師告訴您」而不提供基本衛教)。本題最適當為「根據文獻尚無致畸報告」(A)。","options":{"A":"正確。依文獻安胎藥尚無致畸胎報告。","B":"敘述不準確且片面。","C":"推諉,未提供基本衛教。","D":"以「經驗」誇大致畸,不當。"},"sources":["藥理 安胎藥安全性","新文京《產科護理學》"]}},"104100-N4-30":{"quick":"Yutopar(ritodrine)安胎最常見的副作用為「心悸(心搏過速)」。","detail":{"background":"Ritodrine(Yutopar)為β2交感神經興奮劑,作用於子宮平滑肌β2受體抑制宮縮安胎;但也刺激心臟β1/β2,最常見副作用為「母體與胎兒心搏過速、心悸、手抖、焦慮」,另有高血糖、低血鉀、肺水腫(嚴重)。護理:監測母胎心率(母心率>120或胎心>180需注意)、血糖血鉀、肺音,出現胸痛/呼吸困難立即停藥報告。本題最常見副作用為心悸(D)。","options":{"A":"嗜睡非ritodrine主要副作用。","B":"便秘非主要副作用。","C":"口乾非主要副作用。","D":"正確。心悸(心搏過速)為最常見副作用。"},"sources":["藥理 ritodrine","新文京《產科護理學》安胎"]}},"107110-N4-32":{"quick":"硫酸鎂(MgSO4)安胎敘述中「血中濃度過高可用halothane拮抗」為錯誤——應用「葡萄糖酸鈣」拮抗。","detail":{"background":"硫酸鎂(MgSO4)安胎/預防子癇:需監測「尿量(經腎排出,尿少易蓄積)、深部肌腱反射、呼吸次數、血鎂濃度」;過量(鎂中毒)時——DTR消失、呼吸抑制、尿少、心臟傳導抑制,解毒劑為「10%葡萄糖酸鈣(calcium gluconate)」靜脈注射,而非halothane(全身麻醉劑)。本題問「錯誤」者為「血中濃度過高可用halothane拮抗」(D)。","options":{"A":"正確。需監測尿量(鎂經腎排出)。","B":"正確。過量可抑制深部肌腱反射。","C":"正確。可生化檢驗監測血鎂濃度。","D":"錯誤(本題答案)。鎂中毒解毒劑為葡萄糖酸鈣,非halothane。"},"sources":["藥理 MgSO4/葡萄糖酸鈣","新文京《產科護理學》"]}},"108020-N4-33":{"quick":"安胎藥物敘述正確者為「硫酸鎂中毒時可用10%葡萄糖酸鈣中和」。","detail":{"background":"安胎藥物重點:(1)硫酸鎂(MgSO4)——需監測呼吸「≥12(或14)次/分」(不可低於此),DTR、尿量;中毒以「10%葡萄糖酸鈣」拮抗(正確);(2)Adalat(nifedipine)屬「鈣離子通道阻斷劑」(非α阻斷劑);(3)Yutopar(ritodrine)不適用妊娠全期(有週數與母胎狀況限制、副作用多)。本題正確為「MgSO4中毒用10%葡萄糖酸鈣中和」(D)。","options":{"A":"呼吸監測標準為≥12–14次/分,「不能少於18次」敘述不正確。","B":"錯。Adalat(nifedipine)為鈣離子通道阻斷劑,非α阻斷劑。","C":"Yutopar不適用妊娠全期。","D":"正確。MgSO4中毒可用10%葡萄糖酸鈣中和。"},"sources":["藥理 安胎藥","新文京《產科護理學》"]}},"109030-N4-32":{"quick":"孕婦早期破水處置中「確認34~36週胎兒成熟即剖腹產」為錯誤——破水非剖腹產適應症,生產方式依情況。","detail":{"background":"早期(未足月)胎膜破裂(PPROM)處置:評估與監測——觀察陰道分泌物顏色氣味(感染/羊水)、體溫、白血球與C反應蛋白(感染指標)、胎心、宮縮;「減少陰道內診」以降低上行感染;依週數採期待療法(抗生素延長妊娠、類固醇促肺成熟、安胎)或引產。確認胎兒成熟「不等於要剖腹產」——破水或胎兒成熟並非剖腹產適應症,可經陰道生產或引產,剖腹依產科指徵。本題問「錯誤」者為D。","options":{"A":"正確。觀察陰道分泌物顏色及味道(感染/羊水)。","B":"正確。監測白血球與CRP評估感染。","C":"正確。減少陰道內診以降低感染。","D":"錯誤(本題答案)。胎兒成熟非「即剖腹產」,生產方式依情況。"},"sources":["新文京《產科護理學》PPROM","早期破水"]}},"110030-N4-32":{"quick":"Ritodrine(Yutopar)副作用中「低血糖」為錯誤——應為「高血糖」。","detail":{"background":"Ritodrine(β2興奮劑)副作用:母胎「心搏過速、心悸、顫抖、頭痛、噁心、焦慮」、「高血糖(β刺激肝醣分解與糖質新生)、低血鉀」、嚴重者肺水腫。故「低血糖」為錯誤(應高血糖,糖尿病孕婦使用需注意血糖)。本題問「錯誤(非其副作用)」者為「低血糖」(A)。","options":{"A":"錯誤(本題答案)。ritodrine致「高血糖」非低血糖。","B":"正確。噁心為副作用。","C":"正確。頭痛為副作用。","D":"正確。胎心率增加(過速)為副作用。"},"sources":["藥理 ritodrine 副作用","新文京《產科護理學》"]}},"112110-N4-32":{"quick":"使用ritodrine(Yutopar)安胎需注意「胸痛、呼吸困難」(警覺肺水腫等嚴重副作用)。","detail":{"background":"Ritodrine安胎照護:監測母胎心率;因β刺激可致心搏過速、心悸,嚴重時「肺水腫」(出現胸痛、呼吸困難、肺囉音),須警覺並立即停藥報告;另監測血糖(高血糖)、血鉀(低血鉀)。母心率持續>120、胎心>180、或出現胸痛呼吸困難為停藥警訊(非「一發生心搏過速就立即停藥」,輕微過速可調降滴速)。藥物致「高血糖」非低血糖、不致高血壓(反可能低血壓)。本題正確為「需注意胸痛、呼吸困難」(C)。","options":{"A":"ritodrine可能低血壓而非高血壓。","B":"藥物致高血糖,非低血糖。","C":"正確。需注意胸痛、呼吸困難(肺水腫警訊)。","D":"輕微心搏過速可調降滴速,非一律立即停藥。"},"sources":["藥理 ritodrine/肺水腫","新文京《產科護理學》安胎"]}},"113100-N4-10":{"quick":"安胎時促進胎兒肺部成熟的藥物為「betamethasone(類固醇)」。","detail":{"background":"產前類固醇促肺成熟:對有早產風險(約妊娠24–34週)者,給予「betamethasone或dexamethasone(皆為糖皮質類固醇)」可促進胎兒肺部表面張力素(surfactant)生成、加速肺成熟,顯著降低新生兒呼吸窘迫症候群(RDS)、腦室出血與壞死性腸炎。Ritodrine、Nifedipine、Indomethacin為「子宮收縮抑制劑(安胎、爭取時間)」,本身不促肺成熟。本題促肺成熟者為betamethasone(C)。","options":{"A":"Ritodrine為安胎(抑制宮縮),不促肺成熟。","B":"Indomethacin為安胎(前列腺素抑制),不促肺成熟。","C":"正確。betamethasone(類固醇)促胎肺成熟。","D":"Nifedipine為安胎(鈣阻斷),不促肺成熟。"},"sources":["ACOG 產前類固醇","新文京《產科護理學》早產"]}},"101030-N4-16":{"quick":"心臟病孕婦於懷孕期間應避免「體重過重」(增加心臟負荷)。","detail":{"background":"心臟病孕婦照護:孕期血量與心輸出量增加會加重心臟負荷,應「避免體重過重」(增加循環負荷)、避免過度勞累與感染、左側臥休息、足夠睡眠、限鈉、預防貧血、依醫囑用藥。適度活動(依心功能分級)、高蛋白飲食、子宮頸抹片皆非需避免。本題應避免者為「體重過重」(C)。心臟負荷最大期為妊娠28–32週、分娩陣痛時與產後48小時內,需密切監測。","options":{"A":"高蛋白飲食非需避免。","B":"適度活動依心功能分級,非一律避免。","C":"正確。應避免體重過重以減心臟負荷。","D":"子宮頸抹片非需避免。"},"sources":["新文京《產科護理學》心臟病孕婦","妊娠合併症"]}},"102110-N4-5":{"quick":"羊膜穿刺正確敘述:羊水L/S≧2且有磷脂醯甘油(PG)出現,表示胎兒肺功能成熟。","detail":{"background":"羊膜穿刺(amniocentesis)與羊水評估:正常羊水「清澈微黃」(深黃/混濁/綠色為異常,如膽紅素、胎便);染色體分析時機約「16–18週」(非24–28週);評估「胎兒肺成熟」以「L/S比值≧2且磷脂醯甘油(PG)出現」最可靠(正確);術後出現「持續陰道出血、羊水外滲、發燒、宮縮」為「異常」需就醫(非正常)。本題正確為「L/S≧2且有PG表示肺成熟」(C)。","options":{"A":"錯。正常羊水清澈微黃,深黃/混濁為異常。","B":"錯。染色體分析約16–18週,非24–28週。","C":"正確。L/S≧2且有PG表示肺成熟。","D":"錯。術後陰道出血/羊水外滲為異常,需就醫。"},"sources":["新文京《產科護理學》羊膜穿刺/羊水","胎兒成熟度"]}},"102110-N4-29":{"quick":"心臟病孕婦衛教:妊娠28~32週、陣痛時及產後48小時內是心臟負荷最大時期,需細心觀察照護。","detail":{"background":"心臟病孕婦的高負荷時期與功能分級:血量於妊娠中期增加,心臟負荷在「妊娠28–32週」、「分娩陣痛時(每次宮縮回心血量增加)」及「產後即刻至48小時內(子宮收縮使大量血液回流體循環)」最大,為心衰竭好發期,需密切監測。心功能分級(NYHA)I–II級多可懷孕(限制活動、密切追蹤),III–IV級風險高。本例「活動即心悸疲倦、休息無不適」屬約II–III級,需衛教高負荷期觀察。本題正確為D;A(建議引產且死亡率30%)、C(產後不宜哺乳)等不當。","options":{"A":"不當。不應逕自以死亡率高建議引產。","B":"功能分級需依症狀評估,非逕定第三級完全臥床。","C":"錯。心臟病孕婦未必不宜哺乳;且需限制活動。","D":"正確。28–32週、陣痛時、產後48小時內心臟負荷最大,需細心照護。"},"sources":["新文京《產科護理學》心臟病孕婦","NYHA分級"]}},"108020-N4-31":{"quick":"孕期心臟病敘述中「懷孕38~40週時心臟負荷最大」為錯誤——負荷最大在28~32週、陣痛時與產後。","detail":{"background":"心臟病孕婦:心臟負荷最大期為「妊娠28–32週(血量高峰)、分娩陣痛時、產後即刻48小時內」(非38–40週);孕婦因心輸出受限「易早產與流產」;孕期體重宜控制(約增10公斤左右,避免過重加重負荷);每餐飯後休息、左側臥、足夠睡眠以減負荷。本題問「錯誤」者為「38–40週心臟負荷最大」(A)。","options":{"A":"錯誤(本題答案)。心臟負荷最大在28–32週、陣痛及產後,非38–40週。","B":"正確。心臟病孕婦易早產及流產。","C":"正確。體重宜控制約增10公斤。","D":"正確。每餐飯後休息以減心臟負荷。"},"sources":["新文京《產科護理學》心臟病孕婦","妊娠合併症"]}},"108110-N4-6":{"quick":"羊水指數(AFI)判定:大於2000 mL為羊水過多(2);約36週羊水量達最高點(4)。","detail":{"background":"羊水量評估:以超音波測「羊水指數(AFI,四象限羊水囊深度總和)」或最大羊水囊深度。判定——羊水「過多(polyhydramnios)」約AFI>24–25 cm或羊水量「>2000 mL」;羊水「過少(oligohydramnios)」約AFI<5 cm(非「<10 cm」)或<300–500 mL;羊水量隨週數增加,約「34–36週達高峰」後略減,足月約800 mL(28週約非1000 mL高峰)。本題正確為「>2000 mL為羊水過多(2)+約36週最高(4)」即24(D)。","options":{"A":"含「<10 cm為羊水過少」(1)錯誤。","B":"含「28週達1000 mL」(3)時點描述不當。","C":"含(1)錯誤。","D":"正確。>2000 mL羊水過多(2)+約36週最高(4)。"},"sources":["新文京《產科護理學》羊水量/AFI","妊娠評估"]}},"108110-N4-36":{"quick":"心臟病婦女妊娠護理中「孕期應避免服用digitalis以免致畸胎」為錯誤——digitalis(毛地黃)需要時仍可使用。","detail":{"background":"心臟病孕婦用藥:有心衰竭或心律問題者「毛地黃(digitalis/digoxin)」可依需要使用控制心衰竭與心室速率(非禁用、非致畸主要藥物);照護:每天充足睡眠(≥10小時)減負荷、左側臥休息、預防與及早治療上呼吸道感染(感染會加重心臟負荷)、限鈉、預防貧血、避免過勞。本題問「錯誤」者為「孕期避免digitalis以免致畸」(C)。","options":{"A":"正確。每天≥10小時睡眠以減心臟負擔。","B":"正確。採左側臥休息。","C":"錯誤(本題答案)。digitalis需要時可用,非因致畸而避免。","D":"正確。上呼吸道感染應及早就醫控制。"},"sources":["新文京《產科護理學》心臟病孕婦用藥","digitalis"]}},"114030-N4-24":{"quick":"預防愛滋母子垂直感染:妊娠期完整抗病毒治療(1)、剖腹生產(2)、新生兒預防性投藥(3)。","detail":{"background":"已開發國家預防HIV母嬰垂直感染的「三聯」措施:(1)孕婦妊娠期接受「完整的抗反轉錄病毒治療(ART)」降低母體病毒量;(2)若病毒量未受控制,採「選擇性剖腹產」(病毒量極低<1000 copies者可考慮陰道產);(3)新生兒出生後給「預防性口服抗病毒藥」;(4)「避免哺餵母乳」(母乳可傳染HIV,已開發國家建議「全程配方奶、不哺乳」,而非「病毒量<400才可哺乳」)。本題正確組合為123(C)。","options":{"A":"僅12不完整,漏新生兒投藥。","B":"僅34不完整,漏孕期治療。","C":"正確。孕期ART(1)+剖腹產(2)+新生兒投藥(3)。","D":"含「病毒量<400可哺乳」(4)錯誤,應不哺乳。"},"sources":["疾管署 HIV母嬰垂直感染預防","妊娠合併感染"]}},"114170-N4-21":{"quick":"同卵雙胞胎孕婦容易罹患妊娠高血壓,需監測血壓狀況。","detail":{"background":"多胞胎妊娠(尤同卵雙胞胎)高危因素:子宮過度膨脹與胎盤量大,易「妊娠高血壓/子癇前症、貧血、早產、羊水過多、妊娠糖尿病、產後出血」;同卵單絨毛膜雙胞胎另有雙胞胎輸血症候群風險。護理:加強血壓監測(防子癇前症)、補充鐵與葉酸(需求高於單胞胎、非僅30 mg/day一般量)、體重增加建議多於單胞胎但非固定「20–22公斤」、預防早產(類固醇非「20週常規施打」,而是有早產風險時才用)。本題最適當為「易罹患妊娠高血壓需監測血壓」(C)。","options":{"A":"多胞胎鐵需求更高,非僅30 mg/day一般量。","B":"體重增加建議多於單胞胎,但非固定20–22公斤。","C":"正確。同卵雙胞胎易妊娠高血壓,需監測血壓。","D":"類固醇於有早產風險時才用,非20週常規施打。"},"sources":["新文京《產科護理學》多胞胎妊娠","妊娠合併症"]}},"102030-N4-51":{"quick":"早產兒免疫敘述中「無法得到IgE故感染時易發燒」為錯誤——IgE非保護性抗體,且早產兒感染常「不發燒」。","detail":{"background":"早產兒(<36–37週)免疫特徵:母體IgG主要在「第三孕期(約36週後)」大量過胎盤,故早產兒「IgG少」、被動免疫不足;IgM不過胎盤(臍血IgM高提示子宮內感染);對感染抵抗力低,「即使感染白血球也常不升高、體溫常不升反降(低體溫)」而非發燒。IgE與過敏相關、非保護性抗體,「無法得到IgE故易發燒」的因果敘述錯誤。本題問「錯誤」者為C。","options":{"A":"正確。36週前出生者IgG獲得不足。","B":"正確。早產兒感染時白血球常不升高。","C":"錯誤(本題答案)。IgE非保護性、早產兒感染常不發燒,此因果錯誤。","D":"正確。IgM不過胎盤,無法由母體獲得。"},"sources":["新文京《兒科護理學》早產兒免疫","新生兒免疫"]}},"104100-N4-65":{"quick":"28週早產兒動脈導管開放(PDA)處理中「肌肉注射Indomethacin促進導管閉合」為錯誤(給藥途徑/方式不當)。","detail":{"background":"早產兒開放性動脈導管(PDA):因前列腺素維持導管開放,可用「前列腺素合成抑制劑indomethacin或ibuprofen」促進關閉,但給藥為「靜脈(或口服)」途徑、非「肌肉注射」(早產兒肌肉量少、吸收不穩,且indomethacin為靜脈製劑);無效或禁忌者手術結紮。照護:嚴格計算輸入輸出與奶量(避免體液過量加重心衰)、密切評估腎/心血管/呼吸功能、必要時呼吸支持(CPAP)。本題「錯誤」者為「肌肉注射Indomethacin」(C)。","options":{"A":"正確。應嚴格計算水分與奶量。","B":"正確。密切評估腎、心血管、呼吸功能。","C":"錯誤(本題答案)。indomethacin為靜脈/口服給藥,非肌肉注射。","D":"正確。可給CPAP提供呼吸支持。"},"sources":["新文京《兒科護理學》PDA","indomethacin"]}},"106111-N4-51":{"quick":"28週、1090公克早產兒臨床表徵中「吸吮和吞嚥功能已協調可由口進食」為錯誤。","detail":{"background":"極早產兒(28週)表徵:神經肌肉不成熟——「吸吮與吞嚥反射弱且不協調(約34週後才趨協調)」,故常需鼻胃管或靜脈/腸道外營養,「不可貿然由口餵食」(易嗆咳吸入);反射弱(尋乳、吸吮、踏步反射不全);棕色脂肪與肝醣少→體溫不穩易低體溫(需保溫);血管脆弱、凝血不良→腦室出血風險高。本題問「錯誤」者為「吸吮吞嚥已協調可由口進食」(C)。","options":{"A":"正確。反射弱、缺尋乳/吸吮/踏步反射。","B":"正確。棕色脂肪與肝醣少,體溫易隨環境改變。","C":"錯誤(本題答案)。28週吸吮吞嚥不協調,不可由口進食。","D":"正確。血管脆弱、凝血不良,易腦室出血。"},"sources":["新文京《兒科護理學》早產兒","新生兒餵食"]}},"107030-N4-48":{"quick":"早產兒臨床表徵正確者為「手腕彎曲度(方形窗)呈90度」(關節鬆弛、屈肌張力低)。","detail":{"background":"早產兒成熟度評估(Ballard/Dubowitz)的神經肌肉徵象:早產兒「肌張力低、關節鬆」——「方形窗(手腕掌屈角度)較大(可達90度)」、踝背屈角度大、四肢呈「伸展(非屈曲內收)」姿勢、腳跟可較易觸及耳朵(scarf sign圍巾徵手肘可越過中線)。足月兒則屈肌張力高、方形窗接近0度、四肢屈曲。外表:早產兒「陰囊皺摺少、睪丸未降」、皮膚薄、胎毛多、足底紋少。本題正確為「方形窗呈90度」(C)。","options":{"A":"錯。早產兒陰囊皺摺少(非多)。","B":"錯。早產兒關節鬆,腳跟較易觸及耳朵。","C":"正確。早產兒方形窗(手腕屈)可達90度(關節鬆)。","D":"錯。早產兒手肘可越過對側中線(圍巾徵明顯)。"},"sources":["新文京《兒科護理學》早產兒成熟度","Ballard評估"]}},"110030-N4-29":{"quick":"新生兒免疫敘述中「IgE可自初乳分泌、哺乳新生兒易獲母體IgE」為錯誤——初乳提供的是IgA。","detail":{"background":"新生兒免疫:胎兒約妊娠20週後可「自行合成少量免疫球蛋白(IgM為主)」;第三孕期母體「IgG過胎盤」給胎兒被動免疫;「IgM不過胎盤」,新生兒IgM偏高提示子宮內感染。母乳(尤初乳)富含「分泌型IgA(sIgA)」提供腸道黏膜保護,而非IgE(IgE與過敏相關、非經初乳提供保護)。本題問「錯誤」者為「IgE可自初乳分泌、哺乳獲母體IgE」(D)。","options":{"A":"正確。新生兒妊娠20週後可自行合成少量Ig。","B":"正確。IgG過胎盤提供被動免疫。","C":"正確。IgM不過胎盤,偏高提示感染。","D":"錯誤(本題答案)。初乳提供IgA,非IgE。"},"sources":["新文京《兒科護理學》新生兒免疫","母乳IgA"]}},"110030-N4-53":{"quick":"28週、960公克早產兒照護正確者為「若無吸吮及吞嚥反射,以腸道外營養(TPN)提供營養」。","detail":{"background":"極早產兒照護:(1)無吸吮/吞嚥反射或無法腸道餵食者,以「全靜脈營養(TPN,腸道外營養)」或鼻胃管餵食提供營養;(2)表面張力素(surfactant,如survanta)為「氣管內(經氣管插管)滴注」治療RDS,非靜脈點滴;(3)早產兒肌張力低,四肢呈「伸展」而非屈曲內縮(足月兒才屈曲);(4)早產兒皮膚薄、胎毛「多」、足底皺摺「少」(足月兒皺摺多)。本題正確為「無吸吮吞嚥反射以腸道外營養」(B)。","options":{"A":"錯。surfactant為氣管內給藥,非靜脈點滴。","B":"正確。無吸吮吞嚥反射以腸道外營養(TPN)。","C":"錯。早產兒四肢呈伸展,非屈曲內縮。","D":"錯。早產兒胎毛多、足底皺摺少。"},"sources":["新文京《兒科護理學》早產兒照護","TPN/surfactant"]}},"110030-N4-56":{"quick":"早產兒呼吸暫停照護正確者為「維持俯臥姿勢可縮短呼吸暫停時心跳遲緩/發紺持續時間」。","detail":{"background":"早產兒呼吸暫停(apnea of prematurity):定義為呼吸停止「≥20秒,或<20秒但合併心搏過緩(<100)、發紺、血氧下降」(非「10–15秒且心跳變快」)。處置:「俯臥(prone)」姿勢可改善通氣、縮短呼吸暫停與發紺/心搏遲緩持續時間;觸覺刺激(輕彈足底)、必要時甦醒球給氧、CPAP;藥物用「咖啡因(caffeine)/theophylline(茶鹼)」刺激呼吸中樞,需觀察中毒徵象為「心搏過速、躁動、嘔吐」(非心搏過慢嗜睡)。呼吸暫停先刺激/給氧,非「立即心外按摩」。本題正確為「俯臥可縮短發紺持續時間」(B)。","options":{"A":"錯。呼吸暫停定義為≥20秒或合併心搏「過緩」,非心跳變快。","B":"正確。俯臥可縮短呼吸暫停的心搏遲緩/發紺持續時間。","C":"theophylline中毒為心搏過速/躁動,非心搏過慢嗜睡。","D":"錯。先觸覺刺激/給氧,非立即心外按摩。"},"sources":["新文京《兒科護理學》早產兒呼吸暫停","咖啡因/茶鹼"]}},"113030-N4-33":{"quick":"早產兒發展性照護正確者為「提供父母與早產兒皮膚對皮膚的袋鼠式護理」。","detail":{"background":"早產兒發展性照護(developmental care):(1)「袋鼠式護理(kangaroo care,皮膚對皮膚)」促進親子依附、穩定體溫心率呼吸、利哺乳與神經發展——正確;(2)「寧握(facilitated tucking)」是將四肢「屈曲收攏靠近身體(模擬子宮內姿勢)」給予包覆安撫,而非「伸展固定」;(3)應採「集中護理(cluster care)」減少干擾,而非分散頻繁打擾;(4)應「降低光線與噪音」(保護視聽發展),而非保持環境明亮。本題正確為「袋鼠式護理」(A)。","options":{"A":"正確。皮膚對皮膚的袋鼠式護理。","B":"錯。寧握是屈曲收攏,非伸展固定。","C":"錯。應採集中護理,非分散頻繁干擾。","D":"錯。應降低光線噪音,非保持明亮。"},"sources":["新文京《兒科護理學》早產兒發展性照護","袋鼠護理"]}},"114030-N4-34":{"quick":"早產兒(31週)母親探視的護理處置中「告知減少觸摸以避免刺激及感染」為錯誤——應鼓勵親子互動與袋鼠護理。","detail":{"background":"早產兒家庭支持與親子依附:應「促進」父母參與照護以建立依附與信心——說明早產兒特性與使用設備、教導並示範照護技巧、「鼓勵袋鼠式護理(皮膚對皮膚)與適當撫觸」。「告知母親減少觸摸吳小妹以避免刺激及感染」會「阻礙親子依附」,不恰當(在落實手部衛生與感染管制下,適當撫觸與袋鼠護理是被鼓勵的)。本題問「錯誤」者為D。","options":{"A":"正確。說明早產兒特性與設備。","B":"正確。教導示範早產兒照護技巧。","C":"正確。鼓勵執行袋鼠護理。","D":"錯誤(本題答案)。不應叫母親減少觸摸,應鼓勵親子互動與袋鼠護理。"},"sources":["新文京《兒科護理學》早產兒親子依附","發展性照護"]}},"114100-N4-33":{"quick":"早產兒「呼吸暫停」護理中「立即給Ibuprofen以刺激呼吸」為錯誤——Ibuprofen用於關閉PDA,非刺激呼吸。","detail":{"background":"早產兒呼吸暫停護理:(1)先給「觸覺刺激(輕彈足底、輕撫背)」喚起呼吸;(2)以心電圖/血氧監測偵測呼吸暫停與心搏過緩;(3)觀察呼吸暫停前後膚色、肌張力變化;(4)藥物以「咖啡因(caffeine)或茶鹼(theophylline)」刺激呼吸中樞。「Ibuprofen(或indomethacin)」是前列腺素抑制劑,用於「關閉開放性動脈導管(PDA)」,「不能刺激呼吸」。本題問「錯誤」者為「立即給Ibuprofen刺激呼吸」(B)。","options":{"A":"正確。給觸覺刺激(輕彈足底)。","B":"錯誤(本題答案)。Ibuprofen用於關閉PDA,非刺激呼吸。","C":"正確。以心電圖/血氧機監測呼吸暫停。","D":"正確。觀察呼吸暫停前後膚色與肌張力。"},"sources":["新文京《兒科護理學》早產兒呼吸暫停","咖啡因"]}},"101030-N4-32":{"quick":"面對懷孕時機不佳而猶豫的孕婦,最適當處理是「視為正常矛盾反應,以接受態度傾聽其想法」。","detail":{"background":"第一孕期「矛盾心理(ambivalence)」是正常的調適反應,即使計畫中的懷孕,面對生涯/時機衝突也常有「留或放」的掙扎。護理應以「同理、接納、不批判」的態度傾聽,協助其表達與釐清感受、提供資訊以利自主決策,而非「叫她別胡思亂想」、逕自安排人工流產、或標籤為「產前憂鬱症轉精神科」。本題最適當為「視為正常矛盾反應、傾聽接受」(B)。","options":{"A":"不當。否定情緒、要她別胡思亂想。","B":"正確。視為正常矛盾反應,接受傾聽。","C":"過早逕自安排人工流產,未處理情緒。","D":"過度病理化(非憂鬱症),不當轉診。"},"sources":["新文京《產科護理學》妊娠心理","治療性溝通"]}},"101110-N4-42":{"quick":"依優生保健法施行細則,除醫療行為外,人工流產應於妊娠「24週」內施行。","detail":{"background":"我國「優生保健法施行細則」規定:除「因醫療行為(如危及母體生命健康、胎兒嚴重畸形)」之必要外,人工流產應於「妊娠24週內」施行(且符合優生保健法所列得施行人工流產之情形);妊娠12週以內由婦產科醫師施行、12週以上需於有適當設備之醫院為之。本題答案為24週(D)。","options":{"A":"16週非法定上限。","B":"18週非法定上限。","C":"20週非法定上限。","D":"正確。除醫療行為外,人工流產應於24週內施行。"},"sources":["優生保健法施行細則","法規"]}},"101110-N4-47":{"quick":"孕婦性生活指導:懷孕期間若無特殊危險徵兆,維持適當的性生活是被允許的。","detail":{"background":"孕期性生活:正常、低風險妊娠「無特殊禁忌」,可維持適當性生活(隨孕期調整姿勢、舒適);應避免性交者為「有早產/流產史、前置胎盤、不明出血、破水、子宮頸閉鎖不全、早產徵兆」等高危情形。性高潮可能引起短暫子宮收縮,但在正常妊娠不致早產流產。「前3個月與後3個月一律禁慾」「一律建議禁慾」皆過度。本題最適當為「無特殊危險徵兆可維持適當性生活」(B)。","options":{"A":"過度。前後3個月非一律禁慾。","B":"正確。無危險徵兆可維持適當性生活。","C":"過度。正常妊娠不需一律禁慾。","D":"過度。第二期非一律避免。"},"sources":["新文京《產科護理學》孕期性生活","產前衛教"]}},"101110-N4-48":{"quick":"懷孕5次、足月生產2次、人工流產2次、自然流產1次,孕產史記為 G5P2A3。","detail":{"background":"孕產史簡記(GPA):G(gravida 總懷孕次數,含此)、P(para 生產次數,以妊娠次數計、達可存活週數之生產)、A(abortion 流產次數,含人工+自然)。本例:懷孕5次→G5;足月生產2次→P2;流產=人工流產2+自然流產1=共3次→A3。故記為「G5P2A3」(C)。(注意:G=P+A+目前進行中或其他,本例5=2+3。)","options":{"A":"G5P1A3 生產次數錯誤。","B":"G5P3A2 生產與流產次數錯誤。","C":"正確。G5P2A3(懷孕5、生產2、流產3)。","D":"G5P3A1 數字錯誤。"},"sources":["新文京《產科護理學》孕產史記法","GPA"]}},"102030-N4-40":{"quick":"兩次子宮外孕已切除「兩側輸卵管」者,適合的生殖科技為體外受精-胚胎植入(IVF-ET)。","detail":{"background":"不孕生殖技術選擇依輸卵管功能:「兩側輸卵管已切除/阻塞」者,精卵無法在輸卵管相遇,需「IVF-ET(體外受精-胚胎植入)」——取卵在體外受精成胚胎後植入子宮,「不需經過輸卵管」。AIH(夫精人工授精)、TET(輸卵管胚胎植入)皆需「輸卵管通暢/功能正常」,不適用;ICSI(卵細胞質內精蟲注射)是受精方式(用於嚴重男性因素),仍須搭配IVF流程。本題最適合為IVF-ET(C)。","options":{"A":"AIH需輸卵管通暢,不適用。","B":"TET需輸卵管功能,不適用。","C":"正確。輸卵管切除者適合IVF-ET(不需經輸卵管)。","D":"ICSI為受精方式,仍須搭配IVF。"},"sources":["生殖醫學 ART","新文京《產科護理學》不孕"]}},"103030-N4-10":{"quick":"妊娠16週(第二孕期)的護理指導重點為:胎兒發育、個人衛生保健及營養需求。","detail":{"background":"產前衛教依孕期重點:第一孕期——確認懷孕、孕吐處理、避免畸胎原、葉酸;第二孕期(如16週)——「胎兒發育、個人衛生與舒適、營養需求、適度運動、產檢與篩檢(母血唐氏、超音波)、母胎連結」;第三孕期——子癇前症徵兆、分娩準備(呼吸放鬆技巧)、嬰兒用品、產兆與就醫時機。本題16週重點為「胎兒發育、個人衛生保健及營養需求」(B)。","options":{"A":"防孕吐為第一孕期重點。","B":"正確。16週重點為胎兒發育、衛生保健與營養。","C":"子癇前症徵兆/呼吸放鬆技巧為後期重點。","D":"備物與就醫準備為第三孕期重點。"},"sources":["新文京《產科護理學》產前衛教","孕期照護"]}},"104030-N4-2":{"quick":"妊娠維生素指導正確者為「成人腸胃道可合成維生素K,妊娠期不需特別補充」。","detail":{"background":"孕期維生素:(1)維生素K——腸道菌可合成,飲食均衡者一般「不需特別補充」(新生兒出生後給予肌注以防出血);(2)維生素D——調節鈣磷,「可通過胎盤」供胎兒(故敘述「無法通過胎盤」錯);(3)妊娠劇吐與「hCG」相關,非維生素E不足;(4)牙齦出血與「維生素C(膠原)」相關,菸鹼素(B3)代謝與維生素C/牙齦出血的因果敘述不當。本題正確為「腸道合成維生素K不需特別補」(B)。","options":{"A":"錯。維生素D可通過胎盤供胎兒。","B":"正確。腸道可合成維生素K,孕期不需特別補。","C":"錯。妊娠劇吐與hCG相關,非維生素E不足。","D":"錯。牙齦出血與維生素C相關,敘述不當。"},"sources":["新文京《產科護理學》孕期維生素","營養"]}},"105030-N4-8":{"quick":"有1女兒及1對雙胞胎、曾妊娠8週自然流產1次,孕產史記為 G4P2A1。","detail":{"background":"孕產史(GPA)以「妊娠次數」計P:本例懷孕次數——生女兒1次+懷雙胞胎1次(雙胞胎為「1次妊娠」算1次P,不因兩胎而算2)+自然流產1次=共「4次妊娠→G4」;生產(達可存活)次數=女兒+雙胞胎=2次→P2;流產1次→A1。故為「G4P2A1」(A)。(關鍵:雙胞胎一次妊娠算1次P。)","options":{"A":"正確。G4P2A1(雙胞胎算1次生產)。","B":"G3P3A1 把雙胞胎算2次生產,錯。","C":"G4P3A1 生產次數錯(雙胞胎算1次)。","D":"G3P2A1 懷孕次數錯(應4次)。"},"sources":["新文京《產科護理學》孕產史記法","GPA"]}},"106111-N4-4":{"quick":"多胞胎減胎術敘述中「妊娠7週先做絨毛膜取樣再留染色體正常胎兒」為錯誤。","detail":{"background":"多胞胎減胎術(multifetal pregnancy reduction):一般在妊娠「約10–12週」於超音波導引下,「經陰道或腹部將氯化鉀(KCl)注入要減的胎兒心臟使其心跳停止」(留下位置/發育較佳者),減胎後評估孕婦是否有破水、出血、宮縮、感染。「妊娠7週做絨毛膜取樣再選染色體正常胎兒」並非減胎術流程(CVS約10–13週、且減胎主要依胎兒位置/發育而非先做CVS選染色體)。本題問「錯誤」者為B。","options":{"A":"正確。一般約妊娠10週左右進行。","B":"錯誤(本題答案)。非7週先做CVS選正常胎兒。","C":"正確。超音波導引下注入KCl使心跳停止。","D":"正確。減胎後評估破水、出血、宮縮、感染。"},"sources":["新文京《產科護理學》多胞胎減胎","生殖醫學"]}},"107030-N4-2":{"quick":"台灣產科護理現況中正確者為「母嬰親善醫院政策已列入醫院評鑑項目之一」。","detail":{"background":"台灣產科護理現況:「母嬰親善醫院(Baby-Friendly Hospital)」推動母乳哺育,已納入醫院評鑑/認證項目(正確);助產師具護理師與助產師雙證者「可雙重登錄執業」(非僅單一證照);因少子化與醫療糾紛風險,產科醫師人力「老化、招募不易」(非年輕化熱門);孕產婦死亡率長期「下降」(非增加),主要死因非妊娠糖尿病/多胞胎。本題正確為「母嬰親善醫院列入醫院評鑑」(A)。","options":{"A":"正確。母嬰親善醫院已列入醫院評鑑。","B":"錯。雙證者可雙重登錄執業。","C":"錯。產科醫師人力老化、招募不易。","D":"錯。孕產婦死亡率長期下降。"},"sources":["國健署 母嬰親善","產科護理現況"]}},"107030-N4-6":{"quick":"妊娠營養指導中「妊娠期蛋白質攝取較哺乳期為多」為錯誤——哺乳期蛋白質需求更高。","detail":{"background":"孕期/哺乳營養:蛋白質需求——「哺乳期 > 妊娠期 > 非孕期」(哺乳製造乳汁需大量蛋白與熱量),故「妊娠期蛋白質較哺乳期多」錯誤;妊娠期體重過重會增加妊娠高血壓/糖尿病風險(正確);第一孕期熱量「不需特別增加」(僅多約70 kcal,正確);維生素K腸道可合成,孕期不需特別補(正確)。本題問「錯誤」者為A。","options":{"A":"錯誤(本題答案)。哺乳期蛋白質需求高於妊娠期。","B":"正確。孕期體重過重增妊娠高血壓/糖尿病風險。","C":"正確。第一孕期熱量不需特別增加。","D":"正確。維生素K不需特別補。"},"sources":["國人膳食營養素參考攝取量","新文京《產科護理學》孕期營養"]}},"108110-N4-7":{"quick":"育有一子、自然流產1次、24週胎死腹中引產1次,孕產史記為 G4P2SA1。","detail":{"background":"孕產史(以可存活週數約20–24週為生產界):本例懷孕次數=育有一子(1)+自然流產(1)+24週胎死引產(1)+此次懷孕(1)=「4次→G4」;生產(para,達可存活週數之分娩,24週引產的胎死視為一次生產/死產)=育有一子1+24週引產1=「2次→P2」;自然流產(spontaneous abortion)1次→「SA1」。故記為G4P2SA1(C)。(24週胎死引產屬「生產(死產)」非流產;<20週才算流產。)","options":{"A":"G4P3AA1 生產次數錯且為人工流產記法。","B":"G3P3SA1 懷孕與生產次數錯。","C":"正確。G4P2SA1(24週引產算1次生產、自然流產1)。","D":"G3P2SA1 懷孕次數錯(應4次)。"},"sources":["新文京《產科護理學》孕產史記法","GPA/GTPAL"]}},"109110-N4-31":{"quick":"依優生保健法施行細則,除醫療行為外,人工流產應於妊娠「24週」內施行。","detail":{"background":"重申優生保健法施行細則:除「醫療行為(母體生命健康危險、胎兒嚴重畸形等)」必要外,人工流產應於「妊娠24週以內」施行;且須符合優生保健法所定得施行人工流產之情形(如懷孕影響身心健康、家庭生活、特定遺傳或感染等)、未成年或受監護者需法定代理人同意。本題答案為24週(C)。","options":{"A":"12週為12週以內可由婦產科醫師逕行的界線,非法定上限。","B":"20週非法定上限。","C":"正確。除醫療行為外,人工流產應於24週內施行。","D":"28週超過法定上限。"},"sources":["優生保健法施行細則","法規"]}},"112030-N4-10":{"quick":"孕前BMI 18.5~24.9(正常)的孕婦,總體重增加應為11.5~16公斤(衛福部國健署建議)。","detail":{"background":"國健署孕期體重增加建議(依孕前BMI):過輕(<18.5)增12.5–18 kg;「正常(18.5–24.9)增11.5–16 kg」;過重(25–29.9)增7–11.5 kg;肥胖(≥30)增5–9 kg;雙胞胎孕婦建議增約15.9–20.4 kg(非單胞胎2倍);正常BMI第二、三孕期每週約增0.4–0.5 kg(非0.3)。本題正確為「正常BMI增11.5–16公斤」(B)。","options":{"A":"過輕BMI<18.5者增12.5–18 kg,非7–11(那是過重)。","B":"正確。正常BMI增11.5–16公斤。","C":"錯。雙胞胎非單胞胎2倍(約15.9–20.4 kg)。","D":"錯。第二、三孕期每週約增0.4–0.5 kg,非0.3。"},"sources":["國健署 孕期體重建議","IOM"]}},"113180-N4-25":{"quick":"對接受減胎術而擔憂「嬰靈」的孕婦,最適當回應是「詢問其宗教信仰、鼓勵說出對嬰靈的看法」。","detail":{"background":"減胎術涉及倫理與心理衝突(失落、罪惡感、宗教信念如「嬰靈」)。護理應以「同理、不批判、文化與信仰敏感」的治療性溝通——「探詢其宗教信仰與想法、鼓勵表達對嬰靈/減胎的感受與擔憂」,陪伴哀傷、必要時轉介心理/宗教支持。不宜「以無科學根據駁斥」、命令「別胡思亂想/往前看」、或以大局合理化而忽略情緒。本題最適當為「詢問宗教信仰、鼓勵說出看法」(C)。","options":{"A":"駁斥「無科學根據」否定其信念,不當。","B":"以大局合理化忽略情緒。","C":"正確。詢問宗教信仰、鼓勵表達對嬰靈的看法。","D":"命令「別胡思亂想」否定情緒。"},"sources":["新文京 治療性溝通/文化照護","減胎心理"]}},"114170-N4-7":{"quick":"育有40週女兒1個與35週雙胞胎、曾9週自然流產1次,其「產次(para)」為2。","detail":{"background":"產次(para)以「達可存活週數的妊娠『次數』」計,不以胎兒數計:本例「40週生女兒(1次妊娠)」+「35週生雙胞胎(1次妊娠,雖2胎仍算1次P)」=「P2」;9週自然流產(<20週)屬流產(A),不計入產次。故產次為2(B)。(懷孕次數G=3:女兒+雙胞胎+流產;此題僅問產次。)","options":{"A":"產次1未計雙胞胎那次妊娠。","B":"正確。產次=2(女兒1次+雙胞胎1次妊娠)。","C":"產次3誤把雙胞胎算2次。","D":"產次4錯誤。"},"sources":["新文京《產科護理學》孕產史記法","GPA"]}},"103030-N4-16":{"quick":"剖腹產敘述中「剖腹產後以後生產均需採剖腹生產」為錯誤——符合條件者可嘗試剖腹產後陰道生產(VBAC)。","detail":{"background":"剖腹產(C/S):適應症含胎兒窘迫(緊急剖腹)、胎位不正、頭盆不對稱、前置胎盤、子癇前症惡化等。子宮切開法:「下段橫式切開(low transverse)」出血少、癒合佳、合併症少、且未來可嘗試VBAC;「直式(古典式classical)切開」出血多、子宮破裂風險高、未來須再剖腹。剖腹產後「並非以後生產一律剖腹」——下段橫切口者符合條件可嘗試「剖腹產後陰道生產(VBAC)」。本題問「錯誤」者為B。","options":{"A":"正確。胎兒窘迫為緊急剖腹產適應症。","B":"錯誤(本題答案)。下段橫切者可嘗試VBAC,非一律剖腹。","C":"正確。直式切開較易出血。","D":"正確。下段橫式切開合併症較少。"},"sources":["新文京《產科護理學》剖腹產/VBAC","手術產"]}},"103100-N4-16":{"quick":"胎心率監視圖呈「早期減速(與宮縮同步、對稱)」,其原因為「胎頭受壓」。","detail":{"background":"胎心率減速型態(看圖判讀):本圖上段胎心率基線約150 bpm,隨下段宮縮出現「對稱性減速、最低點與宮縮高峰同步、宮縮結束即回復基線」=「早期減速(early deceleration)」,成因為「胎頭受壓(head compression)」引起迷走神經反射,屬良性、不需特殊處置。對照:晚期減速(減速延遲至宮縮高峰後、回復慢)=胎盤功能不良/胎兒缺氧;變異性減速(形狀不定、突發突止)=臍帶受壓。本圖(承上判讀為早期減速)原因為胎頭受壓(A)。","options":{"A":"正確。早期減速(與宮縮同步)為胎頭受壓所致。","B":"胎盤功能不良造成晚期減速。","C":"臍帶受壓造成變異性減速。","D":"胎兒窘迫多為持續性心搏過緩/晚期減速/變異消失。"},"sources":["新文京《產科護理學》胎心率監測","早期減速(已開圖判讀)"]}},"105030-N4-15":{"quick":"待產婦灌腸的禁忌中「規則宮縮」為「非禁忌」(即此選項敘述為錯誤)。","detail":{"background":"待產灌腸(現多不常規執行)之禁忌:已破水且「胎頭未固定(浮動)」(灌腸刺激可能致臍帶脫垂或感染)、陰道大量出血(如前置胎盤/胎盤早剝)、胎兒窘迫、早產徵象、產程已進入活躍末期/即將生產。「規則宮縮」本身「不是」灌腸禁忌(待產婦有規則宮縮屬正常產程)。本題問「禁忌何者錯誤(即非禁忌)」者為「規則宮縮」(C)。","options":{"A":"是禁忌。已破水胎頭未固定,灌腸有臍帶脫垂風險。","B":"是禁忌。陰道大量出血不可灌腸。","C":"錯誤/非禁忌(本題答案)。規則宮縮非灌腸禁忌。","D":"是禁忌。胎兒窘迫不宜灌腸。"},"sources":["新文京《產科護理學》待產灌腸","產程護理"]}},"108020-N4-16":{"quick":"剖腹產敘述中「剖腹產後,下一次生產一定要採剖腹生產」為錯誤(可評估VBAC)。","detail":{"background":"剖腹產(C/S)概念:經腹壁與子宮切口取出胎兒;胎兒窘迫為緊急剖腹適應症;「下段橫式切開」出血少、合併症少、且為未來可嘗試「剖腹產後陰道生產(VBAC)」的條件。故「下一次生產一定要剖腹」為錯誤——下段橫切口、無其他禁忌者可在嚴密監測下嘗試VBAC。本題問「錯誤」者為B。","options":{"A":"正確。剖腹產為經腹壁及子宮切口取出胎兒。","B":"錯誤(本題答案)。下段橫切者可評估VBAC,非一定再剖腹。","C":"正確。胎兒窘迫為緊急剖腹產適應症。","D":"正確。下段橫式切開出血量較少。"},"sources":["新文京《產科護理學》剖腹產/VBAC","手術產"]}},"110030-N4-11":{"quick":"待產婦照顧正確者為「待產婦不用常規剃除陰毛」。","detail":{"background":"現代待產照護(實證):「不常規剃除陰毛」(剃毛增加皮膚微小傷口與感染風險,無實證好處)、「不常規灌腸」(無證據縮短產程或降感染)、已破水者「不灌腸、減少陰道內診」(防臍帶脫垂與上行感染);破水後並非「立即生產」(視產程進展)。本題正確為「待產婦不用常規剃除陰毛」(C)。","options":{"A":"錯。已破水不宜灌腸(臍帶脫垂/感染風險)。","B":"早產安胎便祕不宜灌腸(刺激宮縮)。","C":"正確。待產婦不用常規剃除陰毛。","D":"錯。破水後不一定立即生產,視產程。"},"sources":["WHO 正常產照護","新文京《產科護理學》待產護理"]}},"110110-N4-6":{"quick":"妊娠會陰按摩可在妊娠32~34週開始,每星期至少3~4次,以增加會陰延展性、減少撕裂傷。","detail":{"background":"妊娠會陰按摩(perineal massage):目的是「增加會陰肌肉與組織的延展性、彈性」,減少分娩時會陰撕裂傷與會陰切開需求;建議自妊娠「約32–34週(或預產期前數週)」開始、每週至少3–4次,以塗潤滑油的手指放入陰道朝下及兩側溫和伸展,過程中「微熱/伸展感屬正常」;為「乾淨(非無菌)」措施、可觸及但溫和。本題正確為「32–34週開始、每週至少3–4次」(B)。","options":{"A":"錯。目的是「增加」延展性,非減少。","B":"正確。妊娠32–34週開始、每週至少3–4次。","C":"錯。為乾淨措施,非無菌。","D":"錯。過程中微熱/伸展感屬正常,非異常。"},"sources":["新文京《產科護理學》會陰按摩","分娩準備"]}},"111030-N4-11":{"quick":"待產陰道內診敘述中「若已破水應更密集內診以評估產程」為錯誤——破水後應減少內診以降感染。","detail":{"background":"待產陰道內診:可評估子宮頸擴張、變薄(消失)程度、胎膜完整性、先露部位與下降;可教導待產婦深呼吸/哈氣放鬆減少不適;「前置胎盤為內診禁忌」(可能引發大出血)。「已破水者應『減少』陰道內診次數」以降低上行感染(絨毛膜羊膜炎),而非更密集內診。本題問「錯誤」者為D。","options":{"A":"正確。內診可評估子宮頸擴張、變薄與胎膜。","B":"正確。可教深呼吸/哈氣緩解內診不適。","C":"正確。前置胎盤為陰道內診禁忌。","D":"錯誤(本題答案)。破水後應減少內診以防感染,非更密集。"},"sources":["新文京《產科護理學》待產內診","產程護理"]}},"111110-N4-13":{"quick":"妊娠24週「無痛、數秒至不超過1分鐘的偶發肚子繃緊」為正常的無痛性子宮收縮(Braxton Hicks),無需太擔心。","detail":{"background":"布雷希式收縮(Braxton Hicks contraction,假性陣痛):妊娠中後期出現的「不規則、無痛(或僅緊繃感)、短暫(數秒~不到1分鐘)、休息可緩解」的子宮收縮,屬正常生理,不會造成子宮頸進行性擴張。需與「真性陣痛/早產徵兆」區別——後者為「規則(1小時≥4次或10分鐘≥1次)、漸強、伴下腹腰痠或出血破水」。本例偶發、無痛、短暫、無其他不適,屬正常Braxton Hicks(D),衛教觀察即可、若轉為規則疼痛或合併出血破水再就醫。","options":{"A":"過度。偶發無痛短暫繃緊非早產徵兆,不需立即住院。","B":"過度標籤為早產高危。","C":"敘述不當;此非「對子宮頸變薄有幫助的產前準備」的解讀。","D":"正確。為正常無痛性子宮收縮(Braxton Hicks),無需太擔心。"},"sources":["新文京《產科護理學》Braxton Hicks","早產徵兆鑑別"]}},"111110-N4-17":{"quick":"使用催產素催生時,在「早期破水」情況下仍可持續使用催產素促進產程。","detail":{"background":"催產素(oxytocin)催生/引產的禁忌:頭盆不對稱(CPD)、胎位不正(如橫位)、前置胎盤、胎兒窘迫、子宮過度收縮/高張、子宮有古典式剖腹疤痕(破裂風險)等——這些情況「不可/應停用」催產素。而「早期(未足月)胎膜破裂(PROM)」在足月、無感染、需引產時,「仍可使用催產素」促進產程(屬引產適應之一)。本題「仍可持續使用催產素」者為早期破水(D)。","options":{"A":"頭盆不對稱為催產素禁忌。","B":"胎兒窘迫應停用催產素。","C":"前置胎盤為禁忌(不可陰道產)。","D":"正確。早期破水(需引產)仍可使用催產素。"},"sources":["新文京《產科護理學》催產素引產","禁忌"]}},"113180-N4-10":{"quick":"妊娠35週臀位、規則宮縮且「大量水從陰道流出(破水)」,最優先照護為「監測胎兒心跳速率」(防臍帶脫垂)。","detail":{"background":"臀位破水的緊急評估:臀位(先露部不規則、無法完全填塞骨盆入口)合併「破水」時,「臍帶脫垂(cord prolapse)」風險高,臍帶受壓會造成胎兒急性缺氧;故破水後「最優先監測胎兒心跳速率(評估有無臍帶受壓/胎兒窘迫)」並做陰道檢查確認有無臍帶脫垂、採膝胸臥位/抬高臀部減壓。靜脈輸液、超音波、催生皆非「最優先」(且臀位破水通常不催生陰道產)。本題最優先為「監測胎心率」(C)。","options":{"A":"通知超音波室非最優先(先評估胎心)。","B":"靜脈輸液非最優先。","C":"正確。破水後最優先監測胎心率(防臍帶脫垂致窘迫)。","D":"臀位破水通常不催生陰道產。"},"sources":["新文京《產科護理學》臀位/臍帶脫垂","破水處置"]}},"113180-N4-20":{"quick":"易導致子宮內翻者為「娩出胎盤時過度牽引臍帶(1)」與「在子宮底施加壓力(3)」。","detail":{"background":"子宮內翻(uterine inversion):子宮底翻入子宮腔甚至脫出陰道,是產後急症(大出血、休克)。誘因:第三產程「過度牽引臍帶(尤胎盤未剝離時)」、不當「在子宮底加壓(fundal pressure)推擠」、胎盤植入、子宮鬆弛、臍帶過短等。「過早注射Methergine」與「胎盤早期剝離」非子宮內翻的典型直接原因。本題正確為「過度牽引臍帶(1)+子宮底加壓(3)」即13(B)。","options":{"A":"含過早注射Methergine(2),非子宮內翻典型原因。","B":"正確。過度牽引臍帶(1)+子宮底加壓(3)。","C":"含胎盤早剝(4),非子宮內翻原因。","D":"含(2)(4),錯誤。"},"sources":["新文京《產科護理學》子宮內翻","產後急症"]}},"114030-N4-11":{"quick":"生產疼痛緩解措施中「骶骨重壓法可減輕下背部疼痛」為正確。","detail":{"background":"生產疼痛理論與非藥物減痛:依「閘門控制理論(gate control)」,以觸覺/壓力刺激競爭抑制痛覺傳導——「骶骨(薦骨)重壓法(counterpressure)」可減輕背部分娩痛(尤枕後位下背痛);「按撫法(effleurage,輕撫腹部)」適合「輕至中度」疼痛、原理為閘門控制(非制約理論),對強烈疼痛效果有限;生產球可放鬆骨盆、促進產程,適合「一般待產婦」(高危妊娠需評估)。本題正確為「骶骨重壓法減輕下背痛」(B)。","options":{"A":"錯。按撫法對「輕中度」疼痛較有效,非強度疼痛。","B":"正確。骶骨重壓法減輕下背部疼痛。","C":"生產球適合一般待產婦,高危妊娠需評估。","D":"錯。按撫法原理為閘門控制理論,非制約理論。"},"sources":["新文京《產科護理學》生產減痛","閘門控制理論"]}}},TO=["1前置胎盤與胎盤早期剝離", "2流產子宮外孕葡萄胎與子宮頸閉鎖不全", "3妊娠高血壓子癇前症與HELLP", "4妊娠糖尿病", "5早產安胎與早期破水", "6妊娠合併內外科疾病與多胞胎", "7早產兒與高危新生兒照護", "8孕產史優生保健法規與不孕生殖", "9高危妊娠待產與生產處置"],LEC={"1前置胎盤與胎盤早期剝離":{"html":"\n<table border=\"1\" cellpadding=\"4\" style=\"border-collapse:collapse\"><tr><th></th><th>前置胎盤</th><th>胎盤早期剝離</th></tr>\n<tr><td>位置/機轉</td><td>胎盤在子宮下段覆蓋/近子宮頸內口</td><td>正常位置胎盤過早剝離</td></tr>\n<tr><td>出血</td><td><b>無痛、鮮紅</b>、外出血</td><td><b>疼痛、暗紅</b>(或隱性)</td></tr>\n<tr><td>子宮</td><td>柔軟</td><td><b>高張、硬如木板、壓痛</b></td></tr>\n<tr><td>併發</td><td>常合併胎位不正、可能植入</td><td><b>DIC</b>、子宮胎盤卒中、休克</td></tr></table>\n<p><b>護理共同點:</b>監測出血量/性質、生命徵象與胎心、備血;<b>前置胎盤禁陰道內診與灌腸</b>;疑出血應儘早就醫。胎盤早剝產後重點:預防產後大出血、持續觀察凝血(DIC)、給子宮收縮劑。前置胎盤危險因子:多胎、高齡、前次剖腹/多次刮除、有病史再發高;後期(子宮下段形成後)超音波定位較準。</p>\n"},"2流產子宮外孕葡萄胎與子宮頸閉鎖不全":{"html":"\n<p><b>流產分類(看子宮頸口與妊娠物):</b>先兆性(出血腹微痛、<b>頸口未開</b>、胎兒存活→臥床+黃體素)→迫切性/不可避免(頸口已開)→不完全(部分排出)→完全(全排出)→敗血性(感染)。</p>\n<p><b>子宮外孕:</b>著床於子宮腔外(多輸卵管壺腹),停經後單側腹痛+少量出血+hCG升高(較慢);破裂→劇痛+腹腔出血+<b>低血容休克</b>。處置:未破裂可<b>MTX藥物</b>、破裂則手術。</p>\n<p><b>葡萄胎:</b>子宮<b>大於週數</b>、hCG<b>異常高</b>(致劇吐/早發子癇前症)、超音波<b>無胎兒(暴風雪狀)</b>;清除後追蹤hCG防絨毛膜癌。</p>\n<p><b>子宮頸閉鎖不全:</b>反覆<b>第二孕期(16–24週)無痛性</b>流產/早產破水;處置<b>子宮頸環紮術(約12–14週、頸口未明顯開時)</b>。</p>\n"},"3妊娠高血壓子癇前症與HELLP":{"html":"\n<p><b>分類(20週為界):</b>慢性高血壓(20週前已有)→妊娠高血壓(20週後新發、<b>無蛋白尿/器官受損</b>)→子癇前症(高血壓<b>+蛋白尿或器官受損</b>)→子癇症(<b>+抽搐</b>)。重度:BP≥160/110、嚴重頭痛、視力模糊、上腹痛、寡尿、肝腎異常、血小板↓。</p>\n<p><b>機轉:</b>胎盤螺旋動脈重塑不良→胎盤缺血→血管內皮損傷、血管痙攣→高血壓蛋白尿、<b>胎盤灌流↓致IUGR/早產</b>。</p>\n<p><b>HELLP:</b>H溶血、EL肝酵素↑、LP血小板↓(<100,000);多在第三孕期或產後。</p>\n<p><b>MgSO4(預防抽搐):</b>監測<b>深部肌腱反射(最早最敏感)、呼吸≥12–14次/分、尿量≥30 mL/hr、血鎂</b>;中毒(DTR消失→呼吸抑制→尿少)解毒劑為<b>10%葡萄糖酸鈣</b>。飲食:<b>高蛋白低鈉</b>。</p>\n"},"4妊娠糖尿病":{"html":"\n<p><b>篩檢(24–28週,高危者提早):</b>50g 1小時≥140 mg/dL→進一步100g 3小時OGTT(兩項以上超標確診),或75g一步法(空腹≥92/1hr≥180/2hr≥153任一達標)。</p>\n<p><b>機轉:</b>胎盤<b>hPL</b>等致胰島素阻抗(中後期增加),胰島素需求隨孕程↑。</p>\n<p><b>治療:</b>飲食控制±<b>胰島素</b>(不過胎盤、不致畸、孕期首選);目標HbA1c<b><6%</b>、餐後1hr<140。</p>\n<p><b>合併症:</b>巨嬰、肩難產、<b>羊水過多</b>、子癇前症、新生兒低血糖/低血鈣/RDS、孕早期高血糖增畸形流產。產後6–12週複檢(未來第二型糖尿病風險↑)。</p>\n"},"5早產安胎與早期破水":{"html":"\n<p><b>早產徵兆:</b>20–37週規則宮縮(1小時≥4次)、下腹腰痠、出血或破水感→就醫。</p>\n<p><b>子宮收縮抑制劑(安胎):</b></p>\n<ul>\n<li><b>Ritodrine(Yutopar,β2興奮劑):</b>副作用母胎<b>心搏過速/心悸、高血糖、低血鉀、肺水腫</b>;監測心率,胸痛呼吸困難立即停藥。</li>\n<li><b>硫酸鎂(MgSO4):</b>監測DTR/呼吸/尿量/血鎂;中毒用<b>葡萄糖酸鈣</b>拮抗。</li>\n<li><b>Nifedipine(Adalat,鈣阻斷)、Indomethacin(前列腺素抑制)</b>。</li>\n</ul>\n<p><b>產前類固醇(betamethasone/dexamethasone):</b>24–34週促<b>胎肺成熟</b>、降RDS。</p>\n<p><b>早期破水(PPROM):</b>觀察羊水顏色氣味、監測白血球/CRP感染、<b>減少內診</b>;胎兒成熟≠剖腹產(生產方式依情況)。</p>\n"},"6妊娠合併內外科疾病與多胞胎":{"html":"\n<p><b>心臟病孕婦:</b>心臟負荷最大期=<b>妊娠28–32週、分娩陣痛時、產後即刻48小時內</b>(非38–40週);護理:左側臥、每天≥10小時睡眠、限鈉、避免體重過重與感染、預防貧血;digitalis(毛地黃)需要時可用(非禁用);NYHA I–II多可懷孕。</p>\n<p><b>多胞胎(尤同卵):</b>易<b>妊娠高血壓、貧血、早產、羊水過多、產後出血</b>;加強血壓監測、補鐵葉酸、體重增加多於單胞胎。</p>\n<p><b>HIV母嬰垂直感染預防:</b>孕期ART+(病毒量高者)剖腹產+新生兒投藥+<b>不哺乳</b>(配方奶)。</p>\n<p><b>羊水量:</b>過多(AFI>24–25/>2000 mL,見於GDM)、過少(AFI<5);約34–36週達高峰。羊膜穿刺:L/S≧2且PG出現=肺成熟,正常羊水清澈微黃。</p>\n"},"7早產兒與高危新生兒照護":{"html":"\n<p><b>早產兒特徵:</b>肌張力低四肢<b>伸展</b>、方形窗大(關節鬆)、胎毛多、足底紋少、陰囊皺摺少;棕色脂肪/肝醣少→<b>低體溫</b>;吸吮吞嚥<b>不協調(約34週後才協調)</b>→鼻胃管/<b>腸道外營養(TPN)</b>;血管脆弱→腦室出血;IgG不足、感染常<b>不發燒、白血球不升</b>。</p>\n<p><b>呼吸窘迫(RDS):</b>surfactant不足→<b>氣管內</b>給表面張力素(非靜脈);CPAP。</p>\n<p><b>呼吸暫停:</b>≥20秒或合併心搏過緩/發紺;處置觸覺刺激、<b>俯臥</b>、咖啡因/茶鹼(非Ibuprofen,Ibuprofen用於關PDA)。</p>\n<p><b>PDA:</b>indomethacin/ibuprofen <b>靜脈</b>(非肌注)關閉導管。</p>\n<p><b>發展性照護:</b><b>袋鼠式護理(皮膚對皮膚)</b>、寧握(屈曲收攏)、集中護理、降低光線噪音;鼓勵父母參與,勿叫母親減少觸摸。</p>\n"},"8孕產史優生保健法規與不孕生殖":{"html":"\n<p><b>孕產史(GPA):</b>G懷孕次數(含此)、P生產次數(<b>以妊娠次數計,雙胞胎一次妊娠算1次P</b>;達可存活週數約20–24週)、A流產(含人工+自然,<20週)。例:1女+雙胞胎+1次9週流產=G3P2A1。24週胎死引產算「生產(死產)」。</p>\n<p><b>優生保健法:</b>除醫療行為外,人工流產應於<b>妊娠24週內</b>施行。母嬰親善醫院已列入醫院評鑑。</p>\n<p><b>不孕生殖:</b>輸卵管切除/阻塞→<b>IVF-ET</b>(不需經輸卵管);AIH/GIFT/TET需輸卵管通暢。多胞胎減胎術約10–12週、超音波導引注KCl。</p>\n<p><b>溝通:</b>懷孕矛盾、減胎嬰靈擔憂→<b>同理、傾聽、不批判、尊重信仰</b>。</p>\n<p><b>營養:</b>蛋白質需求<b>哺乳期>妊娠期</b>;維生素K腸道可合成不需特別補。</p>\n"},"9高危妊娠待產與生產處置":{"html":"\n<p><b>剖腹產(C/S):</b>下段橫切出血少、合併症少、可<b>嘗試VBAC</b>(非一律再剖腹);直式切開出血多、子宮破裂風險高。</p>\n<p><b>胎心率減速(看圖):</b>早期減速(與宮縮同步對稱)=<b>胎頭受壓</b>(良性);晚期減速(延遲、回復慢)=<b>胎盤功能不良/缺氧</b>;變異性減速(突發突止)=<b>臍帶受壓</b>。</p>\n<p><b>待產照護(實證):</b>不常規剃陰毛、不常規灌腸;<b>破水後減少內診</b>防感染;灌腸禁忌=已破水胎頭未固定/大量出血/胎兒窘迫(規則宮縮非禁忌)。</p>\n<p><b>催產素引產禁忌:</b>頭盆不對稱、胎位不正、前置胎盤、胎兒窘迫;早期破水可用。</p>\n<p><b>臀位破水:</b>最優先<b>監測胎心率</b>(防臍帶脫垂)、膝胸臥位。<b>子宮內翻</b>:過度牽引臍帶+子宮底加壓。<b>生產減痛</b>(閘門控制):骶骨重壓減下背痛。Braxton Hicks=無痛短暫不規則收縮,正常。</p>\n"}};

function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_o3_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
