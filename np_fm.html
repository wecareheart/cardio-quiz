合?", "options": {"A": "末期病人", "B": "處於不可逆轉之昏迷狀況", "C": "中度失智", "D": "永久植物人狀態"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source": "TNPA", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "108b-TNPA-通論-12", "roc_year": 108, "exam_tag": "108b", "subject_group": "專科護理通論", "branch": "通論", "q_num": 12, "stem": "根據「病人自主權立法」,對於「預立醫療決定書」的有效性,下列敘述何者正確?", "options": {"A": "須符合五款臨床條件之一,方可生效:末期病人、不可逆之昏迷、永久植物人、極 重度失智症、其他經中央主關機關公告之重症", "B": "可以到相關窗口填寫「預立醫療決定書」便可註記到健保卡,方可生效", "C": "須經「預立醫療照護諮商」及「預立醫療決定書」簽訂,便可註記到健保卡,方可 生效", "D": "須經「預立醫療照護諮商」、「預立醫療決定書」簽訂及見證或公證並上傳到中央 主管機關資料庫和健保卡註記,方可生效"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source": "TNPA", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "108b-TNPA-通論-14", "roc_year": 108, "exam_tag": "108b", "subject_group": "專科護理通論", "branch": "通論", "q_num": 14, "stem": "「病人自主權利法」中所規定的敘述,下列何者錯誤?", "options": {"A": "立法目的在於減少無意義醫療資源的消耗、減少醫療爭議與醫療訴訟", "B": "維持生命治療:指心肺復甦術、機械式維生系統、血液製品、為特定疾病而設之專 門治療、重度感染時所給予之抗生素等任何有可能延長病人生命之必要醫療措施", "C": "病人對於病情、醫療選項及各選項之可能成效與風險預後,有知情之權利;對於醫 師提供之醫療選項有選擇與決定之權利", "D": "具完全行為能力之人,可以於意識清楚時決定其未來相關醫療措施,並隨時可以書 面撤回或變更"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source": "TNPA", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "108b-TNPA-通論-6", "roc_year": 108, "exam_tag": "108b", "subject_group": "專科護理通論", "branch": "通論", "q_num": 6, "stem": "依病人自主權利法之規定,下列何種情況,醫師可不給予「人工營養及流體餵養」?", "options": {"A": "處於可逆轉昏迷狀況之病人", "B": "中度失智病人", "C": "永久植物人狀態", "D": "輕度失智病人"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source": "TNPA", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "109-通論-其他-51", "roc_year": 109, "subject_group": "專科護理通論", "branch": "其他", "q_num": 51, "stem": "65歲癌末病人,醫師評估其壽命最多只剩一個月,病人考慮填寫「不施行心肺復甦術」 意願書,她詢問你的意見,下列敘述何者最適當?", "options": {"A": "基於不傷害原則,告訴病人,為了不讓子女難過,應努力活下去", "B": "基於行善原則,告知陳太太現在醫療科技很發達,仍有治癒可能,勸她不要放棄", "C": "基於自主原則,如病人已充分了解「不施行心肺復甦術」的意義,應尊重她的決定", "D": "基於公平正義原則,病人已無治癒希望,繼續施予治療,恐也是無效醫療,應避免 醫療資源浪費,故應尊重病人之決定"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "109_通論_其他_Q.pdf", "exam_tag": "109", "source": "MOHW", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "110-通論-其他-20", "roc_year": 110, "subject_group": "專科護理通論", "branch": "其他", "q_num": 20, "stem": "預立醫療決定者,醫療機構或醫師得依其預立醫療決定終止、撤除或不施行維持生命治 療或人工營養及流體餵養,下列臨床條件何者未符合病人自主權利法的規定?", "options": {"A": "肺癌末期病人", "B": "永久植物人狀態", "C": "不可逆轉之昏迷狀況", "D": "罕見疾病病童"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "110_通論_其他_Q.pdf", "exam_tag": "110", "source": "MOHW", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "111-通論-5分科-22", "roc_year": 111, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 22, "stem": "有關啟動與執行「預立醫療決定」之敘述,下列何者不符合條件標準?", "options": {"A": "臨床失智評估表 ( clinical dementia rate, CDR ) 得分 3 分者", "B": "三個月前車禍致嚴重腦傷,格拉斯哥昏迷指數 ( GCS ) 3 分者", "C": "腦梗塞後六個月,格拉斯哥昏迷指數 ( GCS ) 3 分者", "D": "阿茲海默症功能性評估量表 (functional assessment staging test, FAST ) 得分 8 分者"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "111_通論_5分科_Q.pdf", "exam_tag": "111", "source": "MOHW", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "111-通論-5分科-26", "roc_year": 111, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 26, "stem": "病人符合下列臨床條件之一,且有預立醫療決定者,醫療機構或醫師得依其預立醫療決定 終止、撤除或不施行維持生命治療或人工營養及流體餵養之全部或一部,下列何者錯誤?", "options": {"A": "由二位與該疾病診斷或治療相關之專科醫師確診之末期病人", "B": "不可逆轉之昏迷狀況,若因外傷所致,其意識超過三個月無恢復跡象", "C": "永久植物人狀態,若因外傷所致,其植物人狀態超過六個月無改善跡象", "D": "極重度失智,臨床失智評估量表( clinical dementia rate, CDR ) 達三分以上"}, "needs_image": false, "answer": "AB", "answer_status": "多重答案(均給分)", "accepted_answers": ["A", "B"], "source_pdf": "111_通論_5分科_Q.pdf", "exam_tag": "111", "source": "MOHW", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "112-通論-其他-19", "roc_year": 112, "subject_group": "專科護理通論", "branch": "其他", "q_num": 19, "stem": "依據「病人自主權利法」,病人符合下列臨床條件之一,且有預立醫療決定者,醫療機構 或醫師得依其預立醫療決定終止、撤除或不施行維持生命治療或人工營養及流體餵養 之全部或一部,以下何者錯誤?", "options": {"A": "處於不可逆轉之昏迷狀況", "B": "極重度失智", "C": "永久植物人狀態", "D": "無法治癒的罕見疾病"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "112_通論_其他_Q.pdf", "exam_tag": "112", "source": "MOHW", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "112-進階-內科-79", "roc_year": 112, "subject_group": "進階專科護理", "branch": "內科", "q_num": 79, "stem": "病人臨終前給予緩和性鎮靜 ( palliative sedation ) 之敘述,下列何者正確?", "options": {"A": "主要是減輕臨終病人疼痛、呼吸困難、激動性譫妄及抽筋等嚴重且難治之症狀", "B": "緩和性鎮靜可能會加速病人的死亡歷程", "C": "不宜停止輸注神經肌肉阻斷劑,以免病人呼吸不順", "D": "開始使用時機為臨終前 1 - 2 週"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "112_進階_內科_Q.pdf", "exam_tag": "112", "source": "MOHW", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "113-通論-5分科-14", "roc_year": 113, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 14, "stem": "80 歲重度失智女性病人因嚴重肺炎住院,目前持續高燒、呼吸費力且意識不清,醫師建議 做肺部電腦斷層檢查,2 位兒子對此意見不一,大兒子質疑檢查的必要性及不想再讓媽媽 接受不必要的醫療,但小兒子則認為不應該放棄任何醫療的努力。下列何者是解決此困境 之最佳處理方式?", "options": {"A": "重度失智合併嚴重肺炎且危及生命,符合安寧緩和治療要件,應聽從大兒子意見,不再 施行無效醫療", "B": "2 位兒子在民法上代理決策地位相等,為把握治療時效,先請小兒子簽同意書然後安排 檢查", "C": "雙方意見不一致,可由主治醫師召開家庭會議,解釋病情變化、檢查理由及後續可能的 治療方式,尋求共識", "D": "基於病人自主,雖然病人重度失智,仍應由病人簽署檢查同意書,才能讓病人主動配合 治療計畫"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_通論_5分科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "安寧緩和與善終", "topic_num": 2, "correction_note": ""}, {"id": "113-通論-5分科-21", "roc_year": 113, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 21, "stem": "依據民國 110 年 1 月 20 日「病人自主權利法」所規範之「預立醫療決定」簽署,下列何者 錯誤?", "options": {"A": "預立醫療決定書完成後註記於全民健康保險憑證,即具有撤除維生醫療之效力", "B": "具完全行為能力者,得為預立醫療決定,並得隨時以書面撤回或變更之", "C": "須經
