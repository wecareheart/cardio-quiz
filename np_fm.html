num": 77, "stem": "某地區醫院為確保其專科護理師在醫師監督下執行醫療業務時,能符合法規要求並維持 高品質的病人照護,下列何者最能展現其精神?", "options": {"A": "醫院可授權資深專科護理師在緊急情況下,自行決定其可之醫療業務範圍,並於事後 24 小時內口頭向監督醫師回報", "B": "醫院應成立專科護理師執行醫療業務委員會,負責核定專科護理師預立醫療流程內容 及標準作業程序", "C": "為確保病人安全,所有侵入性醫療業務必須由醫師親自在場監督,專科護理師方能執行", "D": "監督醫師對於專科護理師執行之所有醫療業務,僅需在病人出院前完成紙本或電子 醫囑記錄"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_通論_5分科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "醫病溝通與專師角色法規", "topic_num": 7, "correction_note": ""}, {"id": "114-通論-5分科-78", "roc_year": 114, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 78, "stem": "依據民國 113 年修訂之「專科護理師於醫師監督下執行醫療業務辦法」中,醫師監督下的 定義與內涵,是確保專科護理師在執行醫療業務時具備法定授權依據與臨床安全保障的 關鍵,下列敘述何者錯誤?", "options": {"A": "醫師需事先參與並核定預立醫療流程內容", "B": "醫療機構需定期審查流程內容及執行現況", "C": "急救時各種侵入性處置不受此規範", "D": "所謂醫師之監督不以醫師親自在場為必要"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_通論_5分科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "醫病溝通與專師角色法規", "topic_num": 7, "correction_note": ""}, {"id": "114-通論-5分科-80", "roc_year": 114, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 80, "stem": "專科護理師執業登記於居家護理所,其執行「專科護理師於醫師監督下執行醫療業務 辦法」之醫療業務,下列敘述何者正確?", "options": {"A": "居家護理所應成立專科護理師執行醫療業務委員會,並由醫師背景的委員擔任召集人", "B": "執行預立醫療流程後,監督醫師不需要到居家護理所,可以傳真方式簽署", "C": "所執行之醫療業務經監督醫師同意後即可執行,不需居家護理所核定", "D": "執登之居家護理所負責人必需為專科護理師,始能針對其所執行業務進行督導"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_通論_5分科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "醫病溝通與專師角色法規", "topic_num": 7, "correction_note": ""}, {"id": "106-106c-內科-44", "roc_year": 106, "exam_tag": "106-106c", "subject_group": "進階專科護理", "branch": "內科", "q_num": 44, "stem": "自殺防治通報項目敘述,以下敘述何者錯誤?", "options": {"A": "依據精神衛生法精神執行", "B": "自殺防治通報系統設置於衛生福利部公共衛生資訊入口網", "C": "自殺防治通報需要當事人同意才可通報", "D": "直轄市、縣 ( 市 ) 主管機關應由社區心理衛生中心,辦理自殺防治事項"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source": "TNPA", "topic": "健康政策與分級醫療", "topic_num": 8, "correction_note": ""}, {"id": "112-通論-其他-41", "roc_year": 112, "subject_group": "專科護理通論", "branch": "其他", "q_num": 41, "stem": "依據民國97 年發布之「緊急傷病患轉診實施辦法」,下列敘述何者正確?", "options": {"A": "後送醫院於傷病患緊急情事消失後,可不經傷病患本人或其親屬同意,協助其轉回原 診治醫院,以緩解醫院壅塞", "B": "醫院辦理轉診,應先聯繫後送醫院,後送醫院不得拒絕接受其轉診", "C": "醫院辦理轉診,應將其原因與風險告知傷病患本人或其親屬,並記載於病歷。傷病患 意識不清且親屬不在場時,得免載明", "D": "醫院辦理傷病患本人要求轉診時,應由病患自行指定救護運輸工具、救護人員,醫院 得提供適當之維生設備及藥品、醫材"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "112_通論_其他_Q.pdf", "exam_tag": "112", "source": "MOHW", "topic": "健康政策與分級醫療", "topic_num": 8, "correction_note": ""}, {"id": "114-通論-5分科-25", "roc_year": 114, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 25, "stem": "急救責任醫院 ( A 醫院 ) 目前因設備維護,無法提供嚴重外傷病人之必要處置,A 醫院的 後送醫院 ( B 醫院 ) 能提供該項服務。依據民國 102 年「緊急醫療救護法」及「緊急傷病 患轉診實施辦法」規定,下列何者最適當?", "options": {"A": "A 醫院應立即將病人轉診至 B 醫院,無需事先告知病人家屬轉診原因或取得其書面 同意,以爭取黃金救命時間", "B": "A 醫院應先對病人進行必要之穩定處置,說明原因並取得書面轉診同意,聯繫 B 醫院 進行轉診", "C": "A 醫院因設備故障及人力不足,可以直接拒絕收治該病人,並要求救護車將病人直接 送往 B 醫院", "D": "A 醫院可直接將病人轉診至 B 醫院,但 B 醫院有權視自身病人負荷量或人力狀況, 決定是否接受此轉診"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_通論_5分科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "健康政策與分級醫療", "topic_num": 8, "correction_note": ""}, {"id": "114-通論-5分科-44", "roc_year": 114, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 44, "stem": "2024 年成立的「健康台灣推動委員會」,旨在打造台灣成為健康幸福的國家,所提出的 建言不包含下列何者?", "options": {"A": "改善醫療人員工作環境", "B": "長照 3.0", "C": "多元財務管道,控制健保總額", "D": "倡議 - 健康台灣深耕計畫"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_通論_5分科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "健康政策與分級醫療", "topic_num": 8, "correction_note": ""}], E={"106-106a-通論-18": {"quick": "評估「病人心智狀態是否具法律行為能力」屬四象限的「病人意向/偏好(patient preferences)」。", "detail": {"background": "Jonsen 等人「臨床倫理思辨四象限(Four Topics/Four-Box)」：①醫療適應性(medical indications，病情診斷/治療效益與風險、行善與不傷害)②病人意願/偏好(patient preferences，病人之自主、知情同意、心智能力/法律行為能力、預立意願)③生活品質(quality of life，治療前後生活品質、誰判斷)④情境特徵(contextual features，家屬、經濟/資源分配、法律、文化宗教、機構政策等外在脈絡)。本題問「心智狀態、法律行為能力」——直接對應病人的決定能力(decision-making capacity)，是判斷其自主意願能否被採納的前提，故歸「病人意向」象限。", "options": {"A": "醫療適應性＝病情與治療效益，非心智能力。", "B": "正解：病人意向象限涵蓋病人的決定能力與自主意願(原題誤植references，實為preferences)。", "C": "生活品質＝治療對生活的影響。", "D": "情境特徵＝家屬/資源/法律等外在脈絡。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "108a-TNPA-通論-27": {"quick": "同上題，心智狀態/法律行為能力屬「病人意向(patient preferences)」。", "detail": {"background": "Jonsen 等人「臨床倫理思辨四象限(Four Topics/Four-Box)」：①醫療適應性(medical indications，病情診斷/治療效益與風險、行善與不傷害)②病人意願/偏好(patient preferences，病人之自主、知情同意、心智能力/法律行為能力、預立意願)③生活品質(quality of life，治療前後生活品質、誰判斷)④情境特徵(contextual features，家屬、經濟/資源分配、法律、文化宗教、機構政策等外在脈絡)。此為高頻考點：凡題幹出現「病人心智能力、是否能自己做決定、知情同意、預立意願」→ 病人意向象限。", "options": {"A": "醫療適應性。", "B": "情境特徵。", "C": "生活品質。", "D": "正解：病人意向/偏好象限。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "109-通論-其他-56": {"quick": "「拒絕無效醫療、使醫療資源妥善運用」對應四原則中的「正義(公平正義)」。", "detail": {"background": "生命倫理四原則(Beauchamp & Childress)：尊重自主(autonomy)、行善(beneficence)、不傷害(non-maleficence)、正義(justice)。正義原則關注醫療資源的公平分配與避免浪費；對無效醫療(futile care)的節制即屬資源正義範疇。", "options": {"A": "尊重自主＝尊重病人自我決定。", "B": "行善＝主動為病人謀福。", "C": "不傷害＝避免造成傷害。", "D": "正解：避免無效醫療、合理分配資源＝正義原則。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "110-通論-其他-16": {"quick": "醫療糾紛增加的原因「不」包括「醫病關係維持類似父子般、病人完全聽從」。", "detail": {"background": "醫療糾紛上升的社會因素：病人權利意識抬頭、醫療商業化(視為消費)、期待與現實落差、資訊不對稱、醫病溝通不足。傳統父權式(paternalistic)、病人完全服從的醫病關係反而「糾紛較少」，現代醫病關係朝向夥伴式/共享決策，期待提高才使糾紛增多。", "options": {"A": "權利意識提高→糾紛增。", "B": "期待落差→糾紛增。", "C": "商業化→糾紛增。", "D": "正解(為非)：父權服從式關係糾紛較少，非增加原因。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "110-通論-其他-2": {"quick": "病主法下，病情「亦得告知關係人」的要件是「病人未明示反對」。", "detail": {"background": "病人自主權利法第5條：醫療機構/醫師應將病情、治療、預後等告知「本人」；本人未明示反對時，「亦得」告知其關係人。核心精神是以病人為知情主體，關係人之告知須不違反病人意願。", "options": {"A": "關係人要求不足以正當化告知。", "B": "與不會造成傷害無關。", "C": "正解：病人未明示反對即得告知關係人。", "D": "非以末期為要件。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "110-通論-其他-22": {"quick": "四原則中「尊重病人做決定的權利」即「自主原則」。", "detail": {"background": "四原則對應：自主＝尊重病人自我決定權；行善＝主動增進病人福祉；不傷害＝avoid harm；正義＝公平分配/可負擔性。本題以中華文化用語混淆，須回到原則本義判斷。", "options": {"A": "長幼有序非正義原則。", "B": "正解：尊重病人決定權＝自主原則。", "C": "「禮」非行善原則。", "D": "考量可負擔性偏「正義」而非不傷害。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "111-通論-5分科-25": {"quick": "「協助關節運動避免攣縮」屬行善原則中「去除/預防傷害」範疇。", "detail": {"background": "行善原則(beneficence)層次：①不傷害(避免造成傷害)②去除既有或潛在傷害③主動增進福祉。協助關節運動以「預防攣縮(已存在的失能風險)」屬於去除/預防傷害；洗手屬不傷害(預防感染)；床欄屬安全防護；出院準備屬增進福祉。題意要選「去除傷害」者。", "options": {"A": "洗手＝不傷害(預防感染)。", "B": "床欄＝預防跌落之安全防護。", "C": "正解：關節運動避免攣縮＝去除/預防既存傷害。", "D": "出院準備＝增進整體福祉。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "111-通論-5分科-6": {"quick": "活體器官移植須經「醫院醫學倫理委員會審查通過」。", "detail": {"background": "人體器官移植條例(110修正)活體捐贈要點：捐贈者須「成年(年滿18，且須有意思能力)」、五親等以內血親或配偶(配偶須結婚滿2年或已生育子女)、須經捐受雙方完整告知與評估、並經「醫院醫學倫理委員會審查通過」。組織配對合宜性是醫學條件之一，但活體仍須符合親屬限制(非如屍體捐贈)。", "options": {"A": "本人簽署不足，須倫委會審查；年齡規定亦非僅滿20。", "B": "配偶須結婚滿2年「或」已生育子女，非一定滿2年。", "C": "活體捐贈仍須符合親屬關係限制(非僅看配對)。", "D": "正解：須經醫院醫學倫理委員會審查通過。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "113-通論-5分科-22": {"quick": "「以病人能理解的語言衛教」最對應尊重自主(使其有效知情而能自主決定)。", "detail": {"background": "以病人熟悉、可理解的語言進行衛教，使病人「真正理解」才能做出自主決定，是落實知情同意與尊重自主(autonomy)的前提；亦可視為公平(消弭資訊落差)。考選部公布答案為「公平正義」(強調弭平健康識能/資訊不平等、人人可近用資訊)。學理上自主/公平皆可論述，作答以官方為準。", "options": {"A": "正解(官方)：弭平資訊落差、人人可理解＝公平正義。", "B": "不傷害＝避免傷害。", "C": "尊重自主(學理亦通，但官方取公平)。", "D": "行善＝主動增益。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "113-通論-5分科-23": {"quick": "評估「家屬想法、照顧能力、環境」屬「情境特徵(contextual features)」。", "detail": {"background": "Jonsen 等人「臨床倫理思辨四象限(Four Topics/Four-Box)」：①醫療適應性(medical indications，病情診斷/治療效益與風險、行善與不傷害)②病人意願/偏好(patient preferences，病人之自主、知情同意、心智能力/法律行為能力、預立意願)③生活品質(quality of life，治療前後生活品質、誰判斷)④情境特徵(contextual features，家屬、經濟/資源分配、法律、文化宗教、機構政策等外在脈絡)。本題鼻胃管灌食決策中考量「家屬、照顧能力、環境因素」＝外在脈絡，歸情境特徵象限。", "options": {"A": "醫療適應性＝病情/治療效益。", "B": "病人偏好＝病人自主意願。", "C": "生活品質＝治療對生活影響。", "D": "正解：家屬/照顧/環境＝情境特徵。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "113-通論-家庭-26": {"quick": "評估「健康資源分配不足影響決定」屬「情境特徵」。", "detail": {"background": "Jonsen 等人「臨床倫理思辨四象限(Four Topics/Four-Box)」：①醫療適應性(medical indications，病情診斷/治療效益與風險、行善與不傷害)②病人意願/偏好(patient preferences，病人之自主、知情同意、心智能力/法律行為能力、預立意願)③生活品質(quality of life，治療前後生活品質、誰判斷)④情境特徵(contextual features，家屬、經濟/資源分配、法律、文化宗教、機構政策等外在脈絡)。資源分配、經濟、法律、機構政策皆屬情境特徵(contextual features)。", "options": {"A": "醫療適應性。", "B": "病人意向。", "C": "生活品質。", "D": "正解：資源分配＝情境特徵。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "108a-TNPA-通論-17": {"quick": "DNR意願書見證人須具完全行為能力且非相關利害關係人——「20歲的鄰居」可。", "detail": {"background": "安寧緩和醫療條例：不施行心肺復甦術(DNR)意願書須二人以上「在場見證」。見證人須具完全行為能力(成年、未受監護宣告)，且不得為「依法或契約對病人負義務、或因病人死亡受利益(如繼承人)」之人，以避免利益衝突。", "options": {"A": "19歲未成年(時為20歲始成年/現民法成年18，依當年標準19歲不符)。", "B": "正解：20歲鄰居具行為能力且無利害關係。", "C": "同院護理師為相關醫療人員/利害關係，不宜。", "D": "受監護宣告者無行為能力，且兒子為繼承人具利害關係。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "108a-TNPA-通論-34": {"quick": "病主法五款條件「不」含「中度失智」(須達極重度失智)。", "detail": {"background": "病人自主權利法「五款臨床條件」(符合其一且有預立醫療決定AD者，醫師得終止/撤除/不施行維生醫療或人工營養及流體餵養)：①末期病人 ②不可逆轉之昏迷 ③永久植物人狀態 ④極重度失智 ⑤其他經中央主管機關公告之痛苦難忍、無法治癒且依當時醫療水準無其他合適解決方法之病人。失智須達「極重度(CDR 3分、FAST 7分以上)」方適用，中度失智不符。", "options": {"A": "末期病人＝符合。", "B": "不可逆昏迷＝符合。", "C": "正解(不符)：須極重度失智，中度不適用。", "D": "永久植物人＝符合。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "108b-TNPA-通論-12": {"quick": "AD生效須ACP＋簽署＋見證/公證＋上傳資料庫＋健保卡註記，全部齊備。", "detail": {"background": "預立醫療決定(AD)成立要件：須經「預立醫療照護諮商(ACP)」、有完全行為能力者本人簽署、經公證人公證或二位以上具完全行為能力者「見證」、並「核章＋上傳中央主管機關資料庫＋註記於健保卡」始生效。可隨時以書面撤回或變更。故僅填表、僅註記健保卡、僅諮商+簽署皆不足；須完整流程並上傳中央資料庫。", "options": {"A": "五款條件中「極重度」失智用語/列舉不完整。", "B": "僅填表註記健保卡不足。", "C": "僅ACP+簽署+健保卡註記，缺見證/公證與上傳資料庫。", "D": "正解：須ACP、簽署、見證或公證、上傳中央資料庫並健保卡註記。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "108b-TNPA-通論-14": {"quick": "病主法敘述「錯誤」者：立法目的並非「減少醫療資源消耗、減少訴訟」。", "detail": {"background": "病人自主權利法第1條立法目的：尊重「病人醫療自主」、保障其「善終權益」、促進醫病關係和諧。節省資源/減少訴訟非其立法宗旨(此為常見誤解)。維生醫療定義、知情選擇決定權、可書面撤回等敘述皆正確。", "options": {"A": "正解(錯誤)：立法目的為自主與善終，非省資源/減訟。", "B": "維生治療定義正確。", "C": "知情/選擇/決定權正確。", "D": "完全行為能力者可預立並隨時撤回，正確。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "108b-TNPA-通論-6": {"quick": "可不給「人工營養及流體餵養」者為「永久植物人狀態」(屬五款條件)。", "detail": {"background": "病人自主權利法「五款臨床條件」(符合其一且有預立醫療決定AD者，醫師得終止/撤除/不施行維生醫療或人工營養及流體餵養)：①末期病人 ②不可逆轉之昏迷 ③永久植物人狀態 ④極重度失智 ⑤其他經中央主管機關公告之痛苦難忍、無法治癒且依當時醫療水準無其他合適解決方法之病人。可逆昏迷、輕/中度失智皆不符；永久植物人符合。", "options": {"A": "「可逆轉」昏迷不符(須不可逆)。", "B": "中度失智不符。", "C": "正解：永久植物人狀態符合。", "D": "輕度失智不符。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "109-通論-其他-51": {"quick": "癌末病人考慮DNR，應「依自主原則尊重其充分知情後的決定」。", "detail": {"background": "安寧緩和/善終照護核心是尊重病人自主。對已充分理解DNR意義的末期病人，醫療人員應提供資訊並尊重其決定，而非以「為子女活下去」「仍可能治癒」勸阻。雖D(避免無效醫療)亦合理，但最貼切的倫理依據是「自主原則」。", "options": {"A": "以情感勸阻違反自主。", "B": "誇大治癒可能、勸不放棄違反誠實與自主。", "C": "正解：充分知情後尊重病人自主決定。", "D": "資源/無效醫療雖合理，但本題核心為尊重病人自主。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "110-通論-其他-20": {"quick": "「未符合」病主法條件者為「罕見疾病病童」(未必符五款且病童非完全行為能力)。", "detail": {"background": "病人自主權利法「五款臨床條件」(符合其一且有預立醫療決定AD者，醫師得終止/撤除/不施行維生醫療或人工營養及流體餵養)：①末期病人 ②不可逆轉之昏迷 ③永久植物人狀態 ④極重度失智 ⑤其他經中央主管機關公告之痛苦難忍、無法治癒且依當時醫療水準無其他合適解決方法之病人。肺癌末期、永久植物人、不可逆昏迷皆屬五款；「罕見疾病病童」本身非五款條件，且未成年無法自簽AD。", "options": {"A": "肺癌末期＝末期病人，符合。", "B": "永久植物人，符合。", "C": "不可逆昏迷，符合。", "D": "正解(未符合)：罕病病童非五款條件且非完全行為能力人。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "111-通論-5分科-22": {"quick": "「不符合」啟動AD條件者：車禍腦傷僅3個月、GCS3者(外傷昏迷須逾6個月)。", "detail": {"background": "病主法施行細則對「不可逆昏迷」「永久植物人」若係「外傷」所致，須觀察「逾6個月無恢復/改善」方能認定；非外傷者逾3個月。CDR 3分(極重度失智)、FAST 7-8分符合。本題B為外傷腦傷僅3個月，不足6個月，故不符。", "options": {"A": "CDR 3分＝極重度失智，符合。", "B": "正解(不符):外傷昏迷須逾6個月，僅3個月不足。", "C": "腦梗塞(非外傷)昏迷逾6個月，符合。", "D": "FAST 7c/8＝極重度失智，符合。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "111-通論-5分科-26": {"quick": "本題官方為多重答案A、B皆給分(均涉外傷觀察期/確診規定爭議)。", "detail": {"background": "病人自主權利法「五款臨床條件」(符合其一且有預立醫療決定AD者，醫師得終止/撤除/不施行維生醫療或人工營養及流體餵養)：①末期病人 ②不可逆轉之昏迷 ③永久植物人狀態 ④極重度失智 ⑤其他經中央主管機關公告之痛苦難忍、無法治癒且依當時醫療水準無其他合適解決方法之病人。外傷致不可逆昏迷或永久植物人須觀察「逾6個月」、非外傷逾3個月；末期須二位相關專科醫師確診。本題選項B「外傷昏迷逾3個月」與標準(外傷須逾6個月)不符故屬錯誤；A確診規定亦有爭議，考選部最終A、B均給分。", "options": {"A": "(均給分)末期確診規定敘述有爭議。", "B": "(均給分)外傷不可逆昏迷應逾6個月，敘述為3個月屬錯誤。", "C": "外傷永久植物人逾6個月，正確。", "D": "極重度失智CDR≥3，正確。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "112-通論-其他-19": {"quick": "病主法五款條件「不」含「無法治癒的罕見疾病」(須經主管機關公告之特定重症)。", "detail": {"background": "病人自主權利法「五款臨床條件」(符合其一且有預立醫療決定AD者，醫師得終止/撤除/不施行維生醫療或人工營養及流體餵養)：①末期病人 ②不可逆轉之昏迷 ③永久植物人狀態 ④極重度失智 ⑤其他經中央主管機關公告之痛苦難忍、無法治癒且依當時醫療水準無其他合適解決方法之病人。第五款須為「中央主管機關公告」之特定痛苦難忍/無法治癒疾病，非泛指所有罕見疾病。", "options": {"A": "不可逆昏迷，符合。", "B": "極重度失智，符合。", "C": "永久植物人，符合。", "D": "正解(錯誤)：泛稱罕見疾病非五款；須經公告之特定病類。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "112-進階-內科-79": {"quick": "緩和性鎮靜旨在緩解臨終難治症狀(疼痛、呼吸困難、躁動性譫妄、抽搐)。", "detail": {"background": "緩和性鎮靜(palliative sedation)：對瀕死病人之難以控制(refractory)症狀，使用鎮靜藥物降低意識以緩解痛苦。其目的是「緩解症狀」而非加速死亡(雙重效應原則：可預見但非意圖死亡)；正確執行不會加速死亡。應「停用」神經肌肉阻斷劑(否則掩蓋痛苦並違倫理)；啟動時機為瀕死期(數小時至數日)而非固定1-2週。", "options": {"A": "正解：緩解疼痛/呼吸困難/躁動譫妄/抽搐等難治症狀。", "B": "正確執行不會加速死亡(非目的)。", "C": "應停用神經肌肉阻斷劑。", "D": "時機為瀕死期，非固定臨終前1-2週。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "113-通論-5分科-14": {"quick": "家屬意見不一時，最佳做法是「主治醫師召開家庭會議解釋病情與選項尋求共識」。", "detail": {"background": "末期/重症決策遇家屬歧見，應以「家庭會議(family meeting)」進行充分溝通、釐清病情、預後與照護目標(goals of care)，建立共識，而非單聽某一方或讓重度失智(無決定能力)病人自簽。此為善終照護與共享決策的核心做法。", "options": {"A": "逕聽大兒子片面意見不妥。", "B": "民法代理順位非由單一子女搶簽。", "C": "正解：召開家庭會議解釋、尋求共識。", "D": "重度失智無決定能力，不能由其自簽。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "113-通論-5分科-21": {"quick": "AD簽署敘述「錯誤」者：完成並註記健保卡「即有撤除維生醫療效力」是錯的。", "detail": {"background": "預立醫療決定(AD)成立要件：須經「預立醫療照護諮商(ACP)」、有完全行為能力者本人簽署、經公證人公證或二位以上具完全行為能力者「見證」、並「核章＋上傳中央主管機關資料庫＋註記於健保卡」始生效。可隨時以書面撤回或變更。AD僅是「預立」之意願文件，須待病人「實際符合五款臨床條件、並經相關專科醫師確診與緩和團隊照會」後方能據以撤除維生醫療；非一經健保卡註記即生撤除效力。", "options": {"A": "正解(錯誤)：註記健保卡僅完成登錄，須符臨床條件確診後才能執行撤除。", "B": "可隨時書面撤回變更，正確。", "C": "須ACP核章，正確。", "D": "須公證或二人見證，正確。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "113-通論-家庭-17": {"quick": "病主法「正確」者：適用末期、極重度失智、永久植物人等病人。", "detail": {"background": "病人自主權利法「五款臨床條件」(符合其一且有預立醫療決定AD者，醫師得終止/撤除/不施行維生醫療或人工營養及流體餵養)：①末期病人 ②不可逆轉之昏迷 ③永久植物人狀態 ④極重度失智 ⑤其他經中央主管機關公告之痛苦難忍、無法治癒且依當時醫療水準無其他合適解決方法之病人。醫療委任代理人多人時依「順位」代理(非多數決)；二親等死亡/失蹤可「免親屬參與ACP」但仍須經ACP本人簽署(非免ACP直接簽AD)；法律保障的是「意願人」自主。", "options": {"A": "代理人有順位，非多數決。", "B": "正解：適用末期/極重度失智/永久植物人等五款。", "C": "親屬死亡失蹤僅免「親屬到場」，仍須經ACP。", "D": "主要保障意願人本人(非代簽家人)。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "113-通論-家庭-24": {"quick": "輕度失智仍具行為能力，應「儘快ACP重新簽署AD」明確記載拒絕人工營養。", "detail": {"background": "舊版「預立安寧緩和醫療暨維生醫療抉擇意願書」(安寧條例)與病主法之「預立醫療決定(AD)」屬不同法源；要依病主法拒絕「人工營養及流體餵養」須另行完成ACP並簽署AD。病人現為「輕度」失智，仍具完全行為能力，應把握時機完成ACP/AD。", "options": {"A": "舊安寧意願書不等同病主法AD之拒絕人工營養。", "B": "正解：趁仍具行為能力儘快ACP並簽AD。", "C": "單身無親屬非不能簽，由醫療委任代理人見證可行但前提仍須ACP；本題最適為儘快完成ACP/AD。", "D": "輕度失智仍具行為能力，非不適用ACP。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "113-進階-內科-12": {"quick": "末期癌症「骨轉移痛」之輔助止痛藥首選「降鈣素(calcitonin)」。", "detail": {"background": "癌症疼痛輔助藥(adjuvant analgesics)依痛型選擇：神經病變痛→抗憂鬱(TCA)/抗癲癇(gabapentin);骨轉移痛→雙磷酸鹽、降鈣素(calcitonin)、放射治療、NSAID/類固醇。本題強調「骨頭痛(骨轉移)」，輔助止痛最對應降鈣素。", "options": {"A": "TCA用於神經病變痛。", "B": "正解：降鈣素緩解骨轉移痛。", "C": "抗癲癇用於神經病變痛。", "D": "類固醇用於神經壓迫/顱內壓/內臟脹痛，非骨痛首選輔助藥。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "113-進階-家庭-13": {"quick": "哀傷「震驚與否認期」應「以溫和堅定立場提供資訊，協助面對事實」。", "detail": {"background": "Kübler-Ross哀傷五階段(否認→憤怒→討價還價→憂鬱→接受)。否認/震驚期的照護：陪伴、傾聽、以溫和而堅定的方式適度提供真實資訊，協助逐步面對；不應壓制情緒表達、不給虛假保證、不刻意迴避探視。", "options": {"A": "正解：溫和堅定提供資訊、協助面對事實。", "B": "壓制情緒表達不當。", "C": "給予不實保證不當。", "D": "刻意迴避/減少探視不當。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "114-通論-5分科-7": {"quick": "ACP諮詢「較不適當」者：規定「需三親等內親屬至少1人參加」。", "detail": {"background": "預立醫療照護諮商(ACP)以「病人本人」為核心，得邀請二親等內親屬「或」醫療委任代理人參與(非強制三親等)；目的在釐清資訊、緩解焦慮、協助抉擇、提供緩和資源，立法精神為尊重病人自主。故「強制三親等親屬參加」之敘述不適當。", "options": {"A": "正解(不適當)：非強制三親等；以病人為核心、得邀二親等內親屬或代理人。", "B": "釐清資訊與抉擇困難，適當。", "C": "討論目標、提供緩和資源，適當。", "D": "立法目的尊重自主，正確。"}, "sources": ["Harrison 21e, Ch. Ethical Issues in Clinical Medicine & Palliative/End-of-Life Care", "病人自主權利法(2019/1/6 施行)、安寧緩和醫療條例", "Jonsen AR. Clinical Ethics 8e (四象限法)"]}}, "106-106a-通論-38": {"quick": "老年憂鬱症較常「主動抱怨自己認知/記憶有問題」(假性失智特徵)。", "detail": {"background": "老年憂鬱vs阿茲海默(假性失智pseudodementia鑑別)：憂鬱者起病較快、會「主訴」記憶差、對問題傾向回答「不知道」、對缺損有病識感、日常功能受情緒影響；失智者起病隱襲、傾向掩飾/亂answer、缺乏病識感、日常功能漸進受損。", "options": {"A": "正解：憂鬱者常主動抱怨認知問題(有病識感)。", "B": "病程緩慢偏失智。", "C": "不知道也勉強回答偏失智(掩飾)。", "D": "認知障礙影響日常偏失智。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "107-TNPA-通論-5": {"quick": "對知足但似有心事的獨居喪偶長者，最佳回應是同理＋開放式探詢。", "detail": {"background": "老年身心評估與溝通：面對情緒低落、流露消極/無望感的長者，應以同理、開放式問句鼓勵表達(探詢自殺/憂鬱風險)，而非急著給政策資訊、轉介身後事或敷衍式鼓勵。", "options": {"A": "敷衍式鼓勵未回應情緒。", "B": "急推長照政策未同理。", "C": "逕談身後事不適當。", "D": "正解：同理觀察＋開放式邀請表達。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "107-TNPA-通論-68": {"quick": "預防住院跌倒正確措施組合為「床欄＋浴缸止滑墊」(12)。", "detail": {"background": "住院跌倒預防：高風險(老人/術後)使用床欄、浴室加止滑墊/扶手、充足照明、移除地面障礙。錯誤做法：門口放地毯(易絆倒)、燈光昏暗(增加跌倒)。", "options": {"A": "含3(地毯)4(昏暗)皆錯。", "B": "含4(昏暗)錯。", "C": "正解：1床欄+2止滑墊正確。", "D": "含3(地毯)錯。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "107-TNPA-通論-69": {"quick": "強化老年肌力「最不恰當」者：避免高於平常負荷(阻力訓練需漸進超負荷)。", "detail": {"background": "老年肌力(阻力)訓練原則：採「漸進性超負荷」，強度由低漸高、次數由少漸多；下肢肌力訓練股四頭肌等大肌群；體能佳者可比照成人建議。「避免任何高於平常的負荷」與超負荷原則相違，無法有效增肌。", "options": {"A": "正解(最不恰當)：阻力訓練需漸進超負荷，非一味避免高負荷。", "B": "漸進性原則正確。", "C": "下肢訓練股四頭肌正確。", "D": "體能佳者比照成人正確。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "107-TNPA-通論-73": {"quick": "老年多重用藥「為非」：不應依各疾病指引機械式開立所有藥物。", "detail": {"background": "老年多重共病/多重用藥(polypharmacy，一般定義同時≥5種藥)：易增藥物不良反應、處方瀑布(prescribing cascade)。應「個別化、去處方(deprescribing)」依據Beers準則檢視潛在不當用藥，而非依每個單病指引疊加所有藥。評估須涵蓋中草藥與保健品。", "options": {"A": "≥5種藥定義正確。", "B": "易誤認新症狀致加藥(處方瀑布)正確。", "C": "正解(為非)：不應機械式疊加所有指引用藥，須個別化去處方。", "D": "須納入草藥/補充品評估正確。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "108b-TNPA-通論-64": {"quick": "肌少症篩檢項目＝握力下降、肌肉質量減少、行動力(體能)下降(234)。", "detail": {"background": "AWGS 2019肌少症：篩檢用小腿圍/SARC-F/SARC-CalF；診斷三要素＝①肌肉量減少②肌力下降(握力)③體能/行動力下降(步速、起立、SPPB)。「柔軟度」非肌少症評估項目。", "options": {"A": "含1柔軟度，錯。", "B": "正解：2握力+3肌肉量+4行動力。", "C": "含1柔軟度，錯。", "D": "含1柔軟度，錯。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "108b-TNPA-通論-66": {"quick": "Fried衰弱表現型診斷「錯誤」者：食慾下降(非五項之一)。", "detail": {"background": "Fried衰弱表現型(phenotype)五項：①非刻意體重減輕②疲憊感③肌力(握力)下降④行走速度減慢⑤低身體活動量。符合≥3項為衰弱(frail)、1-2項為前衰弱(pre-frail)。「食慾下降」非正式診斷項目。", "options": {"A": "肌力下降＝五項之一。", "B": "正解(錯誤)：食慾下降非Fried五項。", "C": "行走速度減慢＝五項之一。", "D": "莫名體重減輕＝五項之一。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "109-進階-其他-20": {"quick": "老化生理變化「正確」者：壓力感受器反射(baroreflex)反應性降低。", "detail": {"background": "正常老化生理：GFR下降、心肺儲備下降、baroreflex敏感度降低(易姿位性低血壓)、肺餘容積(RV)/功能性肺餘量增加、肺活量下降、血清白蛋白略降、體脂增加/肌肉量減少、藥物分布與代謝改變。", "options": {"A": "GFR隨老化下降(非上升)。", "B": "肺餘容積增加(非減少)。", "C": "正解：baroreflex反射性降低。", "D": "血清白蛋白下降(非增加)。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "111-通論-5分科-12": {"quick": "下肢肌力/步態異常之長者，「不是」主要轉介對象者為社工師。", "detail": {"background": "《老人防跌工作手冊》：下肢肌力不足或步態/平衡異常者，除轉介醫師診斷外，主要轉介「物理治療師、職能治療師、社區運動團體」進行運動介入；社工師非此功能性失衡之主要轉介對象。", "options": {"A": "物理治療師＝主要轉介。", "B": "職能治療師＝主要轉介。", "C": "社區運動團體＝主要轉介。", "D": "正解(非主要)：社工師非步態/肌力介入主要轉介。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "111-通論-5分科-38": {"quick": "社區老人健康促進「錯誤」者：本土推廣模式以「醫院」為基礎(應以社區)。", "detail": {"background": "社區老人健康促進以「社區」為基礎(community-based)，透過社區據點、長者互動促進健康行為；公衛進步促成高齡化；健康促進可早期預防慢性病。「以醫院為基礎」與社區化精神相違。", "options": {"A": "公衛進步致高齡化，正確。", "B": "促進健康可預防慢性病，正確。", "C": "正解(錯誤)：應以社區為基礎，非醫院。", "D": "長者互動強化健康行為，正確。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "111-通論-5分科-41": {"quick": "ICOPE六大功能指標「不含」失禁。", "detail": {"background": "WHO「長者整合性照護指引(ICOPE)」六大功能指標：①認知(cognition)②行動力(mobility)③營養(malnutrition)④視力(vision)⑤聽力(hearing)⑥憂鬱(depression/心理)。「疼痛、失禁、失眠」皆非ICOPE六指標。", "options": {"A": "認知＝ICOPE指標。", "B": "營養＝ICOPE指標。", "C": "聽力＝ICOPE指標。", "D": "正解(不含)：失禁非ICOPE六指標。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "112-通論-其他-34": {"quick": "AWGS 2019肌少症「錯誤」者：小腿圍男<36(應男<34、女<33)。", "detail": {"background": "AWGS 2019：小腿圍篩檢切點「男性<34 cm、女性<33 cm」；篩檢工具含小腿圍、SARC-F、SARC-CalF；SARC-F五項(力量Strength、行走Assistance walking、起身Rise、登階Climb、跌倒Falls)為主觀問卷；嚴重度分「可能肌少症、肌少症、嚴重肌少症」三級。", "options": {"A": "小腿圍/SARC-F/SARC-CalF為篩檢工具，正確。", "B": "三級分級正確。", "C": "SARC-F五項與主觀評量正確。", "D": "正解(錯誤)：男性切點應<34非<36(女<33正確)。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "112-通論-其他-37": {"quick": "最能預測老人日後跌倒者＝「過去一年曾跌倒過」(跌倒史)。", "detail": {"background": "跌倒最強預測因子為「過去一年的跌倒史」(history of falls)；其次步態/平衡異常、肌力下降、用藥(鎮靜安眠)、視力、姿位性低血壓等。跌倒史是篩檢首要詢問項。", "options": {"A": "起立需扶為平衡/肌力線索，非最強。", "B": "正解：過去一年跌倒史最能預測再跌。", "C": "走路需扶家具為平衡線索，非最強。", "D": "用藥為風險因子之一，非最強。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "112-通論-其他-39": {"quick": "預防跌倒「不適當」者：移動時用「可滑動」點滴架供病人行走支撐。", "detail": {"background": "安全環境：常用物品置於可及處、下床用移位帶、浴廁止滑/扶手/叫人鈴。錯誤：以「可自由滑動」的點滴架當助行支撐——重心不穩易滑動致跌；應用穩固助行器。", "options": {"A": "物品置於可及處，適當。", "B": "移位固定帶，適當。", "C": "浴廁止滑/扶手/叫人鈴，適當。", "D": "正解(不適當)：滑動點滴架不可作支撐易致跌。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "112-通論-其他-5": {"quick": "長照服務申請資格「錯誤」者：50歲以上原住民(原住民應55歲以上)。", "detail": {"background": "長照2.0服務對象：①65歲以上失能老人②「55歲以上」失能原住民③50歲以上失智症者④領有身心障礙證明者。原住民門檻為55歲(非50歲)。", "options": {"A": "正解(錯誤)：原住民應55歲以上，非50歲。", "B": "65歲以上老人，正確。", "C": "領身障證明者，正確。", "D": "50歲以上失智者符合(55歲以上失智更涵蓋其中)。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "112-通論-其他-6": {"quick": "PAC腦中風「錯誤」者：收案為「發作滿3個月」(應急性後期早期、病況穩定即收)。", "detail": {"background": "健保「急性後期整合照護(PAC)」腦中風：收案為急性中風後「病情穩定之急性後期(發病後早期，多於發病/出院後數週內)」轉入密集復健，非等滿3個月；復健黃金期約發病後3-6個月；可降低再住院與一年死亡、改善失能。", "options": {"A": "正解(錯誤)：非「滿3個月」才收案，應急性後期早期病況穩定即收。", "B": "黃金復健期3-6個月，正確。", "C": "PAC可降再住院/死亡，正確。", "D": "依評估安排照護模式，正確。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "113-通論-5分科-13": {"quick": "高齡溝通「較不適宜」者：堅持第一次會談就收集完整病史。", "detail": {"background": "高齡問診技巧：可由親友陪同補充、放慢語速、確認聽懂、適度聚焦主訴。但高齡者易疲勞、敘述發散，「不必」強求一次取得完整病史，可分次完成以免過度疲勞。", "options": {"A": "親友陪同補充訊息，適宜。", "B": "正解(較不適宜)：不必強求第一次即收集完整病史。", "C": "適度提醒聚焦主訴，適宜。", "D": "放慢語速並確認，適宜。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "113-通論-5分科-20": {"quick": "長照服務法「非」服務方式者：視訊諮詢照護。", "detail": {"background": "長期照顧服務法之服務「方式」：居家式、社區式、機構住宿式、家庭照顧者支持服務、綜合式服務。「視訊諮詢照護」非該法明定之服務方式。", "options": {"A": "正解(非):視訊諮詢非法定長照服務方式。", "B": "社區式日間照護，是。", "C": "居家式到宅服務，是。", "D": "機構住宿式，是。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "113-通論-5分科-31": {"quick": "ICOPE篩檢關鍵指標「不屬」者：疼痛管理。", "detail": {"background": "WHO「長者整合性照護指引(ICOPE)」六大功能指標：①認知(cognition)②行動力(mobility)③營養(malnutrition)④視力(vision)⑤聽力(hearing)⑥憂鬱(depression/心理)。「疼痛、失禁、失眠」皆非ICOPE六指標。", "options": {"A": "認知＝指標。", "B": "正解(不屬)：疼痛管理非ICOPE指標。", "C": "憂鬱＝指標。", "D": "視力＝指標。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "113-通論-5分科-45": {"quick": "跌倒發生率「最不適當」敘述：公式單位「×1000‰」重複換算錯誤。", "detail": {"background": "跌倒發生率(結果面護理品質指標)＝(當月有紀錄跌倒事件數 / 當月住院總人日數)×1000，單位為「‰(每千住院人日)」。寫成「×1000‰」是重複換算錯誤(×1000後又標‰)。重度傷害跌倒須做根本原因分析(RCA)，歸屬結果面指標。", "options": {"A": "正解(最不適當)：×1000與‰重複，單位錯誤。", "B": "重度傷害做RCA，正確。", "C": "住院期間跌倒事件紀錄，正確。", "D": "屬結果面指標，正確。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "113-通論-家庭-43": {"quick": "最能預測長輩日後跌倒者＝「過去一年曾跌倒過」。", "detail": {"background": "同跌倒史為最強預測因子(history of falls)；其餘為次要線索。", "options": {"A": "起立需扶非最強。", "B": "正解：過去一年跌倒史最能預測。", "C": "走路需扶非最強。", "D": "安眠藥為風險因子之一非最強。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "113-通論-家庭-45": {"quick": "ICOPE六大功能指標「不包括」失眠。", "detail": {"background": "WHO「長者整合性照護指引(ICOPE)」六大功能指標：①認知(cognition)②行動力(mobility)③營養(malnutrition)④視力(vision)⑤聽力(hearing)⑥憂鬱(depression/心理)。「疼痛、失禁、失眠」皆非ICOPE六指標。", "options": {"A": "認知＝指標。", "B": "視力＝指標。", "C": "憂鬱＝指標。", "D": "正解(不含)：失眠非ICOPE六指標。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "114-通論-5分科-32": {"quick": "專師於長照角色「較不適當」者：只能行政、不提供直接照護。", "detail": {"background": "專科護理師於長照體系可參與出院準備銜接社區資源、評估高齡/失能者身心功能並擬照護計畫、於社區據點提供衛教/健康促進/慢病追蹤等「直接照護」角色，非僅行政。", "options": {"A": "出院準備銜接社區，適當。", "B": "評估並擬照護計畫，適當。", "C": "社區衛教/慢病追蹤，適當。", "D": "正解(不適當)：非只能行政、不提供直接照護。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "114-通論-5分科-47": {"quick": "疑右肩關節脫位之85歲長者，「較不適當」者：NP依醫囑自行徒手復位。", "detail": {"background": "疑似關節脫位處置：先穩定生命徵象、評估遠端神經血管(感覺/脈搏/活動)、固定患肢限制活動、安排X光排除合併骨折，「復位應由醫師執行」(NP不宜自行徒手復位，恐加重骨折/神經血管損傷)。", "options": {"A": "穩定生命徵象後檢查，適當。", "B": "正解(較不適當)：脫位復位應由醫師處置，非NP徒手復位。", "C": "評估神經血管，適當。", "D": "固定患肢限制活動，適當。"}, "sources": ["Harrison 21e, Ch. Geriatric Medicine", "衛福部長期照顧服務法、長照2.0、急性後期整合照護(PAC)計畫", "WHO ICOPE指引；AWGS 2019肌少症共識；Fried frailty phenotype"]}}, "109-通論-其他-78": {"quick": "SHARE五步驟敘述「錯誤」者：把「協助病人選擇符合實證之醫療」當成step4。", "detail": {"background": "AHRQ SHARE Approach五步驟：Step1 Seek邀請病人參與；Step2 Help協助病人比較選項的好處與害處；Step3 Assess評估病人價值觀與偏好；Step4 Reach與病人共同達成決策；Step5 Evaluate評值決策。Step4是「與病人『共同達成』決策(Reach decision together)」，強調尊重病人價值的共決，而非由醫療端「協助選擇符合實證」之單向引導。", "options": {"A": "Step1邀請參與，正確。", "B": "Step2討論好處與害處，正確。", "C": "Step3評估價值與偏好，正確。", "D": "正解(錯誤)：Step4為共同達成決策，非引導選符合實證。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "110-通論-其他-5": {"quick": "5A正確順序＝提問→找最佳證據→評讀→應用→評值(31245)。", "detail": {"background": "實證5A步驟：Ask(提出可回答的臨床問題/PICO)→Acquire(尋找最佳證據)→Appraise(嚴格評讀)→Apply(應用於病人)→Assess(評值成效)。對應本題選項數字：3提問→1找最佳證據→2評讀→4應用→5評值。", "options": {"A": "12345非以提問起始。", "B": "正解：3-1-2-4-5。", "C": "順序錯置。", "D": "順序錯置。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "110-通論-其他-15": {"quick": "「不適合」SDM情境：昏厥、心率25需緊急置入心律調節器前。", "detail": {"background": "SDM適用於「有多個合理選項、偏好敏感、實證不確定、需長期用藥」之情境；不適用於「緊急救命、僅單一合理(救命)作法」之情境。本題嚴重心搏過緩需緊急置入節律器屬救命處置，無偏好權衡空間。", "options": {"A": "正解(不適合)：緊急救命、唯一作法無SDM空間。", "B": "是否簽AD屬偏好敏感，適合SDM。", "C": "肌瘤局切vs全切，適合SDM。", "D": "末期治療選項與預後討論，適合SDM。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "110-通論-其他-33": {"quick": "「不是」結果面品質指標者：臨床照護指引遵從率(屬過程面)。", "detail": {"background": "品質指標(Donabedian)：結構面(structure，人力/設備/制度)、過程面(process，是否依規範執行，如指引遵從率、洗手遵從率)、結果面(outcome，病人健康結局，如感染率、再入急診、術後噁心嘔吐)。", "options": {"A": "正解(非結果面)：指引遵從率＝過程面。", "B": "術後噁心嘔吐＝結果面。", "C": "導管感染率＝結果面。", "D": "再入急診率＝結果面。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "110-通論-其他-34": {"quick": "「最不適當」採SDM者：唯一具實證基礎的常規照護(無選擇空間)。", "detail": {"background": "SDM核心是「多個合理選項並權衡病人偏好」。當僅有單一具實證的標準照護時無權衡空間，最不適合SDM；反之實證不明、需長期多重用藥、不確定性高皆適合。", "options": {"A": "尚無明確實證→適合SDM。", "B": "正解(最不適當)：唯一實證常規無選擇空間。", "C": "長期多重用藥→適合SDM。", "D": "不確定性高→適合SDM。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "110-通論-其他-39": {"quick": "超音波「偽陰性高」屬實證評讀中的「可信度(validity)」問題。", "detail": {"background": "實證評讀三大面向：可信度/真確性(validity，研究/檢驗結果是否正確，偽陰偽陽性影響此項)、臨床重要性(importance，效應大小)、可應用性(applicability，能否用於我的病人)。偽陰性高代表檢查正確性/可信度不足。", "options": {"A": "正解：偽陰性高＝可信度(真確性)問題。", "B": "可應用性＝能否用於病人。", "C": "臨床重要性＝效應大小。", "D": "病人期望非評讀面向。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "110-通論-其他-45": {"quick": "應用實證「不適宜」者：隨時(隨意)修訂或推翻臨床照護指引。", "detail": {"background": "臨床照護指引應依新證據「定期、系統性」檢視更新，並有明確證據等級與方法學，不可「隨時隨意」推翻。實證能力應用於個別化決策、建立標準、客觀評值成效。", "options": {"A": "個別化決策，適宜。", "B": "建立政策/標準，適宜。", "C": "正解(不適宜)：指引須系統定期更新，非隨時推翻。", "D": "客觀評值成效，適宜。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "111-通論-5分科-20": {"quick": "SDM(Charles 1997)決策步驟「不」含實證搜尋階段。", "detail": {"background": "Charles等(1997)SDM模式三核心：①資訊交換(information exchange，醫病雙向)②商議/審議(deliberation)③決策(decision making)。「實證搜尋」非SDM互動模式的步驟。", "options": {"A": "資訊交換階段，是。", "B": "正解(非)：實證搜尋非SDM步驟。", "C": "商議階段，是。", "D": "決策階段，是。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "111-通論-5分科-31": {"quick": "「不是」5A步驟者：問題評估(assessment)——應為acquire取得證據。", "detail": {"background": "實證5A步驟：Ask(提出可回答的臨床問題/PICO)→Acquire(尋找最佳證據)→Appraise(嚴格評讀)→Apply(應用於病人)→Assess(評值成效)。5A為Ask/Acquire/Appraise/Apply/Assess。「問題評估(assessment)」非5A之一(易與最後Assess成效混淆)。", "options": {"A": "Ask提問，是。", "B": "正解(非)：assessment非5A，應為Acquire取得證據。", "C": "Appraise評讀，是。", "D": "Apply應用，是。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "111-通論-5分科-32": {"quick": "指引「外部審查/品質評估」工具為AGREE II。", "detail": {"background": "常用實證工具：PRISMA(系統回顧/統合分析報告規範)、ROBINS-I(非隨機研究偏差)、GRADE(證據確定性與建議強度分級)、AGREE II(臨床指引品質評估/外部審查)。考科藍臺灣手冊建議以AGREE II評估指引品質。", "options": {"A": "PRISMA為系統回顧報告規範。", "B": "ROBINS-I評非隨機研究偏差。", "C": "正解：AGREE II評估指引品質。", "D": "GRADE評證據等級與建議強度。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "111-通論-5分科-35": {"quick": "清醒俯臥實證流程「最不適當」者：因新興疾病故偏好病例對照勝於RCT。", "detail": {"background": "證據等級階層：系統回顧/RCT > 世代 > 病例對照 > 個案系列。不應因疾病「新興」就降低證據要求而優先觀察性研究；仍應優先尋找/採用RCT等高階證據。擬PICO、依文獻定適應症、持續評值皆正確。", "options": {"A": "擬PICO，正確。", "B": "依文獻定適應症/流程，正確。", "C": "正解(最不適當)：不應因新興而以病例對照優於RCT。", "D": "制定後持續評值，正確。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "111-通論-5分科-42": {"quick": "DiCenso 6S中「臨床指引」屬「研究摘要(summaries)」。", "detail": {"background": "DiCenso/Haynes 6S證據金字塔(由下而上)：Studies原始研究→Synopses of studies原始研究精要→Syntheses系統回顧→Synopses of syntheses系統回顧精要→Summaries研究摘要(整合多源、含實證臨床指引/實證教科書如UpToDate)→Systems電子決策支援系統。臨床指引屬Summaries層。", "options": {"A": "原始研究精要非指引層。", "B": "正解：臨床指引屬summaries研究摘要層。", "C": "syntheses＝系統回顧。", "D": "synopses of syntheses＝系統回顧精要。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "111-通論-5分科-7": {"quick": "RCA中「以時序法列出事件先後」屬「找出近端(近因)原因」階段。", "detail": {"background": "根本原因分析(RCA)流程：①RCA前準備(組成團隊/界定範圍)②還原事件、依時序找出近端原因(proximate/近因)③進行危害(根本)分析④確認根本原因⑤研擬改善並追蹤。時序法重建事件序列即在找近端原因階段。", "options": {"A": "準備階段為組隊/界範圍。", "B": "正解：時序重建事件＝找出近端原因。", "C": "危害分析為後續。", "D": "確認根本原因為更後階段。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "108a-TNPA-通論-15": {"quick": "照護結果指標「較不適當」敘述：每一指標都必須可測量「且可用於研究發表」。", "detail": {"background": "品質/結果指標須「可測量、可管理、可改善」(測量才能管理)，是評估是否達照護標準的篩檢工具。但指標的價值在於品質改善，「不必然」要能用於學術發表，故該敘述不適當。", "options": {"A": "沒測量無法管理改善，正確。", "B": "量化測量過程與結果，正確。", "C": "指標為達標篩檢工具，正確。", "D": "正解(不適當)：指標不必然要能研究發表。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "108a-TNPA-通論-30": {"quick": "PDA(病人決策輔助工具)「有助病人釐清並溝通個人價值觀」。", "detail": {"background": "病人決策輔助工具(PDA)：提供平衡的選項資訊與結果機率，協助病人「釐清自身價值偏好」並與醫療團隊溝通，支持SDM。其目的「非」引導特定決策、非取代知情同意(知情同意用於處置前簽署)、不只是簡化溝通而是促進價值澄清。", "options": {"A": "PDA非等同知情同意。", "B": "非為建議特定決策。", "C": "非僅簡化溝通。", "D": "正解：協助釐清並溝通個人價值觀。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "108a-TNPA-通論-80": {"quick": "跌倒方案ARR＝0.8%−0.5%＝0.3%。", "detail": {"background": "絕對風險降低(ARR)＝對照組事件率−介入組事件率。本題執行前4/500＝0.8%；執行後3/600＝0.5%；ARR＝0.8%−0.5%＝0.3%。(相對風險降低RRR＝0.3%/0.8%≈37.5%；NNT＝1/ARR≈333)。", "options": {"A": "正解：0.8%−0.5%＝0.3%。", "B": "0.03%為小數點錯位。", "C": "3%高估10倍。", "D": "30%嚴重高估。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "107-TNPA-通論-80": {"quick": "「所有病人皆依規範被評估且紀錄」屬結果(outcome)指標。", "detail": {"background": "以「入院跌倒風險評估」為例：結構面＝有訂定具實證的評估規範；過程面＝照護者有能力、護理人員依規範執行；結果面＝實際上「所有病人都被評估且正確紀錄」的達成情形(實際成果)。", "options": {"A": "訂定規範＝結構面。", "B": "照護者有能力＝結構/過程面。", "C": "正解：病人實際被評估且紀錄＝結果面。", "D": "護理人員依規範執行＝過程面。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "109-通論-其他-75": {"quick": "台灣病人安全通報系統(TPR)宗旨「不」含釐清責任。", "detail": {"background": "醫策會「台灣病人安全通報系統(TPR)」四大精神：自願通報、匿名、保密、共同學習(去究責、營造安全文化)。系統目的在學習與系統改善，「釐清/追究責任」與其非究責(no-blame)精神相違。", "options": {"A": "正解(不含)：釐清責任違反非究責精神。", "B": "自願通報，是。", "C": "匿名保密，是。", "D": "共同學習，是。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "110-通論-其他-7": {"quick": "臨床照護指引發展「不包括」者：每年都要更新一次。", "detail": {"background": "指引發展要素：利益衝突聲明、系統性文獻查證、明訂證據等級與建議強度、外部審查(AGREE II)。更新應「依新證據出現與既定週期」進行，非硬性規定每年更新一次。", "options": {"A": "利益衝突聲明，是。", "B": "系統文獻查證，是。", "C": "證據等級與強度，是。", "D": "正解(不含)：非硬性每年更新一次。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "106-106a-通論-77": {"quick": "提升手術安全策略「不」含落實預防性抗生素使用規範。", "detail": {"background": "醫策會手術安全執行策略聚焦：正確辨識(病人/部位/術式)與安全查核(Time-out)、檢討不必要手術、提升麻醉照護品質。「預防性抗生素使用」屬「降低醫療照護相關感染(SSI/感控)」目標範疇，非手術安全查核之核心策略。", "options": {"A": "手術辨識與查核，是。", "B": "正解(不含)：預防性抗生素屬感控目標非手術安全策略。", "C": "檢討不必要手術，是。", "D": "提升麻醉照護品質，是。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "114-通論-5分科-38": {"quick": "Irvine護理角色有效模式中「不」屬結果面者：護理人員離職率(屬結構面)。", "detail": {"background": "Irvine(1998)護理角色有效模式：結構面(structure，如人力/離職率/技能組合)、過程面(process，護理活動)、結果面(outcome，病人健康結局，如CLABSI感染率、非計畫拔管、跌倒率)。離職率屬「結構面」而非結果面。", "options": {"A": "CLABSI感染率＝結果面。", "B": "非計畫氣管內管滑脫＝結果面。", "C": "正解(非結果面)：護理人員離職率＝結構面。", "D": "住院跌倒率＝結果面。"}, "sources": ["Sackett DL. Evidence-Based Medicine: How to Practice and Teach EBM 5e", "AHRQ SHARE Approach；DiCenso 6S model；AGREE II；醫策會病人安全/品質指標", "Charles C. SDM model 1997；根本原因分析(RCA)方法學"]}}, "106-106a-內科-21": {"quick": "51歲、不菸不嚼檳婦女→大腸癌＋乳癌＋子宮頸癌(無口腔癌篩檢資格)。", "detail": {"background": "國家癌症篩檢(出題當年「四癌」)：①大腸癌(糞便潛血FOBT，50–74歲每2年；2025起擴大為45–74歲、40–44歲具家族史)②口腔癌(30歲以上「抽菸或嚼檳榔」者每2年口腔黏膜檢查)③乳癌(乳房攝影，45–69歲每2年、40–44歲具家族史；2025起擴大40–74歲)④子宮頸癌(抹片，30歲以上；2025起擴大25歲以上)。2025新增「肺癌」LDCT(具家族史/重度吸菸高風險者)成為「五癌」。「子宮內膜癌」非國家篩檢項目。本例51歲女性無菸檳，不符口腔癌篩檢條件；符合大腸(50–74)、乳癌(45–69)、子宮頸(30歲以上)。", "options": {"A": "含肺癌(當年非一般篩檢)且不需口腔。", "B": "多列口腔癌(無菸檳不符)。", "C": "正解：大腸＋乳＋子宮頸。", "D": "含肺癌且漏大腸。"}, "sources": ["Harrison 21e, Ch. Prevention & Early Detection of Cancer", "衛福部國民健康署成人預防保健/國家癌症篩檢方案", "健康信念模式(HBM)、跨理論模式(TTM)、Pender健康促進模式"]}}, "106-106a-內科-23": {"quick": "慢性病毒性肝炎篩檢項目為C型肝炎抗體(anti-HCV)。", "detail": {"background": "成人預防保健「B、C型肝炎篩檢」：民國55年(含)以後出生且滿45歲、未曾接受檢查者，可搭配成人預防保健「終身一次」B肝表面抗原(HBsAg)與C肝抗體(anti-HCV)篩檢。本題選項中能篩出「慢性病毒性肝炎(C肝)」者為anti-HCV(anti-HBs僅代表B肝免疫力，非篩感染)。", "options": {"A": "IgG anti-HAV為A肝既往感染/免疫，非慢性。", "B": "IgM anti-HAV為A肝急性，非慢性。", "C": "anti-HBs為B肝免疫力非感染標記。", "D": "正解：anti-HCV篩慢性C肝。"}, "sources": ["Harrison 21e, Ch. Prevention & Early Detection of Cancer", "衛福部國民健康署成人預防保健/國家癌症篩檢方案", "健康信念模式(HBM)、跨理論模式(TTM)、Pender健康促進模式"]}}, "106-106a-通論-27": {"quick": "最優先施打流感疫苗的高危群為「長照機構老人」。", "detail": {"background": "流感疫苗優先對象：機構住民(群聚＋高齡共病、重症死亡風險最高)、65歲以上長者、慢性病患、嬰幼兒、孕婦、醫護等。其中長期照護機構老人兼具高齡、共病、群聚傳播風險，最優先。", "options": {"A": "透析病人為高危但非「最」優先群。", "B": "6歲以下為優先對象但風險次於機構長者。", "C": "慢性病成人為高危但非最優先。", "D": "正解：長照機構老人最優先。"}, "sources": ["Harrison 21e, Ch. Prevention & Early Detection of Cancer", "衛福部國民健康署成人預防保健/國家癌症篩檢方案", "健康信念模式(HBM)、跨理論模式(TTM)、Pender健康促進模式"]}}, "110-通論-其他-35": {"quick": "健康信念模式中屬「個人信念」者：「我媽死於乳癌，我擔心自己也會」(自覺罹病性/嚴重性)。", "detail": {"background": "健康信念模式(HBM)構念：自覺罹病性、自覺嚴重性、自覺利益、自覺障礙、行動線索、自我效能——皆屬「個人主觀信念」。人口學特徵(年齡/種族/教育/職業)與「知識有無」是修飾因子，非信念本身。", "options": {"A": "缺乏知識屬知識面，非信念。", "B": "種族/家族史屬人口學修飾因子。", "C": "正解：擔心自己罹病＝自覺罹病性/嚴重性(個人信念)。", "D": "教育/職業屬人口學特徵。"}, "sources": ["Harrison 21e, Ch. Prevention & Early Detection of Cancer", "衛福部國民健康署成人預防保健/國家癌症篩檢方案", "健康信念模式(HBM)、跨理論模式(TTM)、Pender健康促進模式"]}}, "110-通論-其他-9": {"quick": "58歲停經、不菸不檳婦女可參與：乳癌、子宮頸癌、大腸直腸癌篩檢。", "detail": {"background": "國家癌症篩檢(出題當年「四癌」)：①大腸癌(糞便潛血FOBT，50–74歲每2年；2025起擴大為45–74歲、40–44歲具家族史)②口腔癌(30歲以上「抽菸或嚼檳榔」者每2年口腔黏膜檢查)③乳癌(乳房攝影，45–69歲每2年、40–44歲具家族史；2025起擴大40–74歲)④子宮頸癌(抹片，30歲以上；2025起擴大25歲以上)。2025新增「肺癌」LDCT(具家族史/重度吸菸高風險者)成為「五癌」。「子宮內膜癌」非國家篩檢項目。本例無菸檳不符口腔；58歲女性符合乳(45–69)、子宮頸(30歲以上)、大腸(50–74)。子宮內膜癌非國家篩檢(distractor)。", "options": {"A": "含子宮內膜癌(非國家篩檢)。", "B": "含子宮內膜癌且列口腔(無菸檳不符)。", "C": "正解：乳＋子宮頸＋大腸直腸。", "D": "列口腔(無菸檳不符)。"}, "sources": ["Harrison 21e, Ch. Prevention & Early Detection of Cancer", "衛福部國民健康署成人預防保健/國家癌症篩檢方案", "健康信念模式(HBM)、跨理論模式(TTM)、Pender健康促進模式"]}}, "111-通論-5分科-24": {"quick": "本題經考選部公告「送分(全給分)」。", "detail": {"background": "國家癌症篩檢(出題當年「四癌」)：①大腸癌(糞便潛血FOBT，50–74歲每2年；2025起擴大為45–74歲、40–44歲具家族史)②口腔癌(30歲以上「抽菸或嚼檳榔」者每2年口腔黏膜檢查)③乳癌(乳房攝影，45–69歲每2年、40–44歲具家族史；2025起擴大40–74歲)④子宮頸癌(抹片，30歲以上；2025起擴大25歲以上)。2025新增「肺癌」LDCT(具家族史/重度吸菸高風險者)成為「五癌」。「子宮內膜癌」非國家篩檢項目。本題選項對「健康民眾癌篩資格」之認定有爭議(如家族史對象/年齡界定)，考選部最終裁定一律給分。學習重點仍為各癌篩之年齡與危險因子條件。", "options": {"A": "(送分)戒檳者口腔篩檢資格認定。", "B": "(送分)55歲無家族史大腸篩檢。", "C": "(送分)父肺癌之家族史認定。", "D": "(送分)姑姑乳癌之家族史認定。"}, "sources": ["Harrison 21e, Ch. Prevention & Early Detection of Cancer", "衛福部國民健康署成人預防保健/國家癌症篩檢方案", "健康信念模式(HBM)、跨理論模式(TTM)、Pender健康促進模式"]}}, "112-通論-其他-30": {"quick": "抹片建議「正確」者：21歲以下未曾性行為者不需定期抹片。", "detail": {"background": "子宮頸抹片：建議「有性行為」之女性定期篩檢(國健署30歲以上每年/可3年一次)；從未有性行為者風險極低、不需抹片(本題正解)。曾有性行為的年長者仍建議篩檢；因癌切除子宮頸者視情況追蹤；接種HPV疫苗者「仍需」抹片(疫苗未涵蓋所有高危型)。", "options": {"A": "曾有性行為之年長者仍建議篩檢。", "B": "因惡性切除者仍須追蹤。", "C": "正解：21歲以下未曾性行為者不需抹片。", "D": "接種HPV疫苗者仍需抹片。"}, "sources": ["Harrison 21e, Ch. Prevention & Early Detection of Cancer", "衛福部國民健康署成人預防保健/國家癌症篩檢方案", "健康信念模式(HBM)、跨理論模式(TTM)、Pender健康促進模式"]}}, "113-通論-家庭-29": {"quick": "乳房篩檢屬「第二段預防」(早期發現、早期治療)。", "detail": {"background": "預防醫學三段五級：第一段(健康促進、特殊保護，如衛教/疫苗)、第二段(早期診斷與治療，如各種篩檢)、第三段(限制殘障與復健)。乳房攝影篩檢屬第二段(次級預防)。", "options": {"A": "第一段為健康促進/疫苗。", "B": "正解：篩檢＝第二段(早期發現治療)。", "C": "第三段為復健。", "D": "無第四段(三段五級)。"}, "sources": ["Harrison 21e, Ch. Prevention & Early Detection of Cancer", "衛福部國民健康署成人預防保健/國家癌症篩檢方案", "健康信念模式(HBM)、跨理論模式(TTM)、Pender健康促進模式"]}}, "106-106a-通論-60": {"quick": "高血壓生活型態「錯誤」者：DASH飲食建議「降低不飽和脂肪酸」(應降飽和脂肪)。", "detail": {"background": "高血壓非藥物治療(生活型態)：規律有氧運動(每週≥150分鐘)＋體重控制、限鈉(<6 g NaCl/日約鈉2.4 g)、DASH飲食(高蔬果/高纖/低脂奶、降「飽和脂肪」與膽固醇，「不飽和脂肪」反建議適量攝取)、限酒(男≤2杯/日)、戒菸。", "options": {"A": "規律運動＋體重控制，正確。", "B": "限鈉<6 g NaCl/日，正確。", "C": "正解(錯誤)：DASH應降「飽和」脂肪，非不飽和脂肪。", "D": "限酒≤2杯/日，正確。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "106-106a-通論-70": {"quick": "體適能「錯誤」者：有氧運動目的在「增加肌力及肌肉質量」(應為心肺耐力)。", "detail": {"background": "運動生理：有氧運動主要增進「心肺耐力」並助降血糖(肌肉攝取葡萄糖↑)；增「肌力與肌肉質量」靠阻力(等張)訓練。退化性關節炎者運動可減緩肌萎縮；高血壓者宜「等張(動態)」運動優於「等長(靜態憋氣)」(後者升壓)。", "options": {"A": "運動增肌肉攝糖、助降血糖，正確。", "B": "正解(錯誤)：增肌力/肌肉量靠阻力訓練，非有氧。", "C": "退化關節炎者運動減緩肌萎縮，正確。", "D": "高血壓宜等張優於等長，正確。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "108a-TNPA-通論-16": {"quick": "沉思期(contemplation)衛教：增強改變動機、權衡不改變的健康風險。", "detail": {"background": "跨理論模式(TTM)行為改變階段：①前思考/懵懂期(precontemplation，6個月內無改變意圖)②思考/沉思期(contemplation，覺察問題但矛盾，6個月內考慮改變)③準備期(preparation，1個月內打算行動、已有小嘗試)④行動期(action，已實際改變但未滿6個月)⑤維持期(maintenance，改變已逾6個月)。沉思期病人對改變矛盾，介入重點在「提升動機、權衡利弊(decisional balance)、引發改變的理由」；給試用券/讚美屬行動期增強、預防復發屬維持期。", "options": {"A": "讚美增強屬行動期。", "B": "免費試用券屬行動期誘因。", "C": "預防復發屬維持期。", "D": "正解：增強動機與不改變風險＝沉思期重點。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "108b-TNPA-通論-51": {"quick": "「我的餐盤」口訣「錯誤」者：水果和蔬菜一樣多(應「菜比水果多一點」)。", "detail": {"background": "國健署「我的餐盤」六口訣：每天早晚一杯奶、每餐水果拳頭大、「菜比水果多一點」、飯跟蔬菜一樣多、豆魚蛋肉一掌心、堅果種子一茶匙。蔬菜量應「多於」水果。", "options": {"A": "飯和蔬菜一樣多，正確。", "B": "豆魚蛋肉一掌心，正確。", "C": "正解(錯誤)：應「菜比水果多一點」，非一樣多。", "D": "每餐水果拳頭大，正確。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "108b-TNPA-通論-62": {"quick": "戒菸沉思期介入：請個案描述吸菸的所有優缺點(權衡利弊)。", "detail": {"background": "跨理論模式(TTM)行為改變階段：①前思考/懵懂期(precontemplation，6個月內無改變意圖)②思考/沉思期(contemplation，覺察問題但矛盾，6個月內考慮改變)③準備期(preparation，1個月內打算行動、已有小嘗試)④行動期(action，已實際改變但未滿6個月)⑤維持期(maintenance，改變已逾6個月)。沉思期戒菸介入＝協助權衡吸菸利弊(decisional balance)、提升戒菸動機；「選定戒菸日」屬準備/行動期，「自我解脫」屬後期改變策略。", "options": {"A": "單給壞處資訊較被動。", "B": "正解：描述吸菸優缺點＝沉思期權衡利弊。", "C": "選定戒菸日屬準備/行動期。", "D": "自我解脫屬後期策略。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "109-通論-其他-72": {"quick": "尼古丁戒斷症狀「不正確」者：嗜睡(戒斷為失眠而非嗜睡)。", "detail": {"background": "尼古丁戒斷症候群：情緒低落/易怒焦慮、注意力不集中、失眠、食慾增加/體重上升、坐立不安、菸癮渴求。「嗜睡」非戒斷症狀(反為失眠)。", "options": {"A": "情緒低落，是。", "B": "體重增加，是。", "C": "注意力不集中，是。", "D": "正解(不正確)：戒斷為失眠非嗜睡。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "110-通論-其他-4": {"quick": "臨床病人教育「錯誤」者：剛獲知罹癌即提供各項副作用衛教可降焦慮。", "detail": {"background": "病人教育原則：依病人背景/感官/識能選擇方式；賦能(empowerment)促自我照護；剛確診者處於情緒衝擊期，「立即大量」副作用資訊反而增加焦慮，應分階段、先情緒支持再漸進衛教。", "options": {"A": "知識不足時直接指導，適當。", "B": "教備餐屬賦能，正確。", "C": "正解(錯誤)：剛確診即大量副作用衛教反增焦慮。", "D": "依背景與感官選材，正確。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "110-通論-其他-44": {"quick": "低健康識能病人溝通：會談使用白話文、避免醫療術語。", "detail": {"background": "低健康識能(health literacy)溝通策略：用白話/淺顯語言、避免術語、善用圖像/多媒體、回覆示教(teach-back)確認理解、衛教對象以病人本人為主(可納照顧者)。", "options": {"A": "多媒體有助理解，不應避免。", "B": "回覆示教很重要，不可省。", "C": "正解：用白話文、避免術語。", "D": "應以病人本人為主，非僅家屬。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "111-通論-5分科-18": {"quick": "病人衛教「錯誤」者：依醫療人員方便選定「單一」教學法與工具。", "detail": {"background": "有效衛教：先評估病人對疾病認識程度、確立學習目標、依「病人需求與特性」個別化選擇多元教學方法/工具、每日評估執行狀況以激發參與動機。依醫療人員方便用單一方法違反個別化原則。", "options": {"A": "先評估認識程度，正確。", "B": "正解(錯誤)：應依病人需求個別化，非依人員方便用單一法。", "C": "每日評估激發動機，正確。", "D": "明確學習目標，正確。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "111-通論-5分科-36": {"quick": "STAR戒菸計畫「錯誤」者：T(Tell)為「暗自告訴自己」(應告知親友尋求支持)。", "detail": {"background": "STAR戒菸計畫：S(Set)慎重設定戒菸日；T(Tell)告訴家人朋友同事、尋求支持；A(Anticipate)預期戒菸困難並安排因應;R(Remove)移除環境中的菸與相關物品。T是「對外告知求支持」，非暗自。", "options": {"A": "S設定戒菸日，正確。", "B": "正解(錯誤)：T為告知親友求支持，非暗自告訴自己。", "C": "A預期困難並因應，正確。", "D": "R移除菸品，正確。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "111-通論-5分科-40": {"quick": "行為改變階段「錯誤」者：決定/準備期「通常還未有任何改變」。", "detail": {"background": "跨理論模式(TTM)行為改變階段：①前思考/懵懂期(precontemplation，6個月內無改變意圖)②思考/沉思期(contemplation，覺察問題但矛盾，6個月內考慮改變)③準備期(preparation，1個月內打算行動、已有小嘗試)④行動期(action，已實際改變但未滿6個月)⑤維持期(maintenance，改變已逾6個月)。準備期(preparation)意圖在未來1個月內行動，且「通常已開始有些微嘗試或小改變(如已減量、查資料)」，並非「完全沒有任何改變」。", "options": {"A": "懵懂期6個月內無意圖，正確。", "B": "沉思期覺察問題但矛盾，正確。", "C": "正解(錯誤)：準備期常已有小改變，非完全未改變。", "D": "維持期逾6個月，正確。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "112-通論-其他-32": {"quick": "二代戒菸藥物治療「不適當」對象：孕婦、哺乳者。", "detail": {"background": "二代戒菸服務藥物治療對象：年滿18歲、尼古丁成癮度測試(FTND)≥4分「或」平均每日吸菸≥10支者。孕婦/哺乳婦女為戒菸藥物(如varenicline、bupropion、NRT)之相對禁忌，應以非藥物方式介入。", "options": {"A": "須年滿18歲，正確。", "B": "FTND≥4分，正確。", "C": "正解(不適當)：孕婦/哺乳者非藥物治療對象。", "D": "每日≥10支，正確。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "113-通論-5分科-3": {"quick": "衛教評量「錯誤」者：記錄學習歷程屬「確定性評量」(應為形成性評量)。", "detail": {"background": "教育評量類型：安置性(教學前了解起點/個別差異)、診斷性(找出學習困難)、形成性(教學歷程中持續記錄與回饋)、總結/確定性(教學後判定是否達成目標)。記錄「教學活動中的學習歷程」屬「形成性評量」，非確定性。", "options": {"A": "能說出方法屬認知評量，正確。", "B": "教學前測了解差異屬安置性，正確。", "C": "了解學習困難屬診斷性，正確。", "D": "正解(錯誤)：歷程記錄屬形成性，非確定性。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "113-通論-5分科-33": {"quick": "預防年輕人藥物濫用最有效：建立支持網絡＋心理諮商＋健康教育＋社區/體育活動。", "detail": {"background": "物質濫用一級預防：以「支持性環境、社會連結、技能與替代活動、心理諮商」之綜合策略最有效；單純恐嚇(法律威脅)、被動發資料、過度高強度運動皆成效有限或反效果。", "options": {"A": "正解：支持網絡＋諮商＋衛教＋社區活動最有效。", "B": "被動閱讀資料成效有限。", "C": "威脅法律後果為恐嚇式，成效差。", "D": "高強度運動非實證有效預防策略。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "113-通論-5分科-34": {"quick": "Pender健康促進模式：提供好處與成功案例、設可達成小目標以增自我效能。", "detail": {"background": "Pender健康促進模式強調「自覺行動利益、自我效能、行動承諾、人際與情境影響」。對缺乏動力者，提供利益資訊與成功典範、設定可達成的小目標以「增強自我效能感」最能促成行為改變；強迫/恐嚇/規範式作法成效差。", "options": {"A": "強迫高強度運動並監督，違反自我效能與自主。", "B": "正解：提供利益/典範＋可達成小目標增自我效能。", "C": "恐嚇後果非Pender策略。", "D": "規範式講座記錄成效有限。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "113-通論-家庭-42": {"quick": "二代戒菸補助「最不適當」者：民眾免掛號費、政府全額補助。", "detail": {"background": "二代戒菸治療與衛教服務：由醫師/牙醫師提供戒菸藥物治療，每年補助2次療程(每次以8週為限)、同一療程須於同一醫事機構完成；民眾仍須「部分負擔」(掛號費/藥品部分負擔)，非政府全額補助。", "options": {"A": "醫師/牙醫提供藥物治療，正確。", "B": "每年2次療程、每次8週，正確。", "C": "同一機構完成療程，正確。", "D": "正解(最不適當)：民眾仍須部分負擔，非全額免費。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "114-通論-5分科-12": {"quick": "「過重飲食行為」介入第一個月最適行為指標：完成20天每日飲食紀錄。", "detail": {"background": "行為改變評量應對應「目標層次與時程」：第一個月以「行為過程指標(如飲食自我監測天數)」最適合且可達成；體脂/LDL為「生理結果指標」需更長時間；步數屬身體活動而非飲食行為。", "options": {"A": "體脂降低為結果指標、第一月難達。", "B": "LDL降低為生理結果、需更久。", "C": "正解：完成20天飲食紀錄＝可達成的行為過程指標。", "D": "步數屬運動非飲食行為指標。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "114-通論-5分科-34": {"quick": "BMI 29、已下載App每天做15分但週末常懶——屬TTM「行動期」。", "detail": {"background": "跨理論模式(TTM)行為改變階段：①前思考/懵懂期(precontemplation，6個月內無改變意圖)②思考/沉思期(contemplation，覺察問題但矛盾，6個月內考慮改變)③準備期(preparation，1個月內打算行動、已有小嘗試)④行動期(action，已實際改變但未滿6個月)⑤維持期(maintenance，改變已逾6個月)。本例「已實際開始運動(每天15分鐘)但尚未滿6個月、且不穩定(週末偷懶)」，符合行動期(action)——已改變但需鞏固以防復發、邁向維持期。", "options": {"A": "前思考期無改變意圖，不符(她已行動)。", "B": "(原題誤標contemplation為預備期)思考/準備期尚未實際行動，不符。", "C": "正解：已實際運動未滿6個月＝行動期。", "D": "維持期須逾6個月且穩定，不符。"}, "sources": ["Harrison 21e, Ch. Health Behavior Change & Tobacco Use", "國民健康署「我的餐盤」、二代戒菸服務、STAR戒菸計畫", "Prochaska TTM跨理論模式；Pender健康促進模式"]}}, "108b-TNPA-通論-17": {"quick": "專師可代開立者＝超音波檢查單＋藥物處方醫囑(23)。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。依預立醫療流程，專師可代開「檢驗/影像醫囑(如超音波)、藥物處方醫囑、入院許可、留置導尿等處置醫囑」；「不施行CPR同意書(須病人/家屬簽署)、死亡證明書/出院診斷證明書(醫師專屬)」不可由專師代開。", "options": {"A": "含1不施行CPR同意書(不可代開)。", "B": "含4出院診斷證明書(醫師專屬)。", "C": "正解：2超音波檢查單＋3藥物處方醫囑。", "D": "含4出院診斷證明書。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "109-通論-其他-2": {"quick": "麻醉衛教前確認個案知識/背景/認知/需求＝教學過程「評估(Assessment)」。", "detail": {"background": "病人教育過程(ADPIE/教學歷程)：評估(Assessment，了解起點能力、需求、背景、接收能力)→計畫(Plan，訂目標與方法)→執行(Do/Implement)→評價(Evaluation，成效)。衛教前先確認個案條件屬「評估」。", "options": {"A": "正解：衛教前確認個案條件＝評估。", "B": "計畫為訂目標方法。", "C": "執行為實施衛教。", "D": "評價為成效評值。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "109-通論-其他-3": {"quick": "專師執行業務「正確」者：預防保健之衛教不需在醫師監督下即可執行。", "detail": {"background": "護理人員法：護理師/專師之「護理本職業務」(健康問題護理評估、預防保健護理措施與衛教、護理指導及諮詢)屬自主業務，「不需」醫師監督；「醫療業務(侵入處置、開立醫囑等)」始須依辦法在醫師監督下執行。開立會診單屬醫療業務不可自主。", "options": {"A": "身體健康評估屬護理自主，不需監督(敘述把它說成需監督)。", "B": "傷口照護「指導」屬護理自主，敘述為需監督亦不妥。", "C": "正解：預防保健衛教不需醫師監督。", "D": "開立會診單屬醫療業務，不可不經監督自主開立。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "109-通論-其他-52": {"quick": "醫院是否推行預立醫療流程「取決於醫院意願」(非強制)。", "detail": {"background": "「預立醫療流程」之建立屬醫療機構「自主決定」是否導入的管理制度(導入後才能由專師代開相關醫囑)，法律未強制所有醫院推行、亦無罰則。", "options": {"A": "非教學醫院之強制責任。", "B": "無「未推行罰十萬」規定。", "C": "無五年過渡期強制規定。", "D": "正解：推行與否取決於醫院意願。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "109-通論-其他-54": {"quick": "專師依預立醫療流程執行後，監督醫師須於「24小時內」完成核簽。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。", "options": {"A": "非以下班前為準。", "B": "非以出院前為準。", "C": "正解：24小時內完成核簽。", "D": "仍須醫師核簽(非毋庸)。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "111-通論-5分科-80": {"quick": "自主性專師業務「錯誤」者：表層傷口的縫合(屬醫療業務，須醫師監督)。", "detail": {"background": "專師「自主性」業務：病歷紀錄、疾病與健康促進諮詢、健康評估、護理指導、參與照護成效評估等。「傷口縫合」屬侵入性醫療業務，須在醫師監督下依辦法執行，非自主業務。", "options": {"A": "病歷紀錄屬自主。", "B": "健康促進諮詢屬自主。", "C": "正解(錯誤)：表層傷口縫合屬醫療業務需監督。", "D": "參與照護成效評估屬自主。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "112-通論-其他-25": {"quick": "不屬專師可代開立者：死亡證明書(醫師專屬)。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。死亡證明書屬醫師專屬法定文書，不可由專師代開。入院許可單、留置導尿處置醫囑、檢驗/影像醫囑可依流程代開。", "options": {"A": "入院許可單可代開。", "B": "留置導尿處置醫囑可代開。", "C": "正解：死亡證明書醫師專屬，不可代開。", "D": "檢驗/影像醫囑可代開。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "112-通論-其他-27": {"quick": "作業小組規範「錯誤」者：僅需核備流程內容、無需訂標準作業程序。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。作業小組須「同時」核定預立特定醫療流程內容「及」訂定標準作業程序(SOP)並定期審視修改；召集人為副院長以上、醫護主管任副召集人。", "options": {"A": "正解(錯誤)：須訂SOP，非僅核備流程內容。", "B": "制定SOP並定期審修，正確。", "C": "副院長以上任召集人，正確。", "D": "醫護主管任副召集人，正確。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "112-通論-其他-4": {"quick": "最「具體」表達請求者：「我希望你每天可以下床走動2次」(可觀察可測量)。", "detail": {"background": "非暴力溝通/具體請求：請求應「具體、可觀察、可執行、可衡量」(明確行為與次數)，避免模糊抽象(多休息、放輕鬆、吃營養點、更有精神)。", "options": {"A": "正解：每天下床2次＝具體可測。", "B": "多休息/放輕鬆抽象。", "C": "吃營養點抽象。", "D": "更有精神抽象。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "113-通論-5分科-29": {"quick": "護理人員法下，專師與護理師最大差異：可「於醫師監督下執行醫療業務」。", "detail": {"background": "護理人員法明定護理師業務含健康問題護理評估、預防保健護理措施、護理指導及諮詢、醫療輔助行為；「專科護理師」之最大不同在於可「於醫師監督下執行醫療業務(辦法所定範圍)」。", "options": {"A": "護理評估護理師亦可。", "B": "護理指導諮詢護理師亦可。", "C": "預防保健護理師亦可。", "D": "正解：於醫師監督下執行醫療業務為專師特有。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "113-通論-5分科-77": {"quick": "預立醫療流程訂定內容應包括：病人症狀、病史及身體評估等情境或診斷。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。", "options": {"A": "訓練醫院監督方式非流程訂定內容。", "B": "流行病學趨勢非流程內容。", "C": "正解：症狀/病史/身體評估等情境或診斷。", "D": "監督醫師特定訓練標準非此處規定內容。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "113-通論-家庭-21": {"quick": "居家護理所專師業務「錯誤」者：醫療業務由監督醫師同意即可、不需居家護理所核定。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。居家護理所亦須成立委員會(負責人召集)、由機構「核定」預立醫療流程，非僅監督醫師同意即可；執行後監督醫師可傳真簽署、須配戴識別標誌。", "options": {"A": "成立委員會由負責人召集，正確。", "B": "監督醫師可傳真簽署，正確。", "C": "正解(錯誤)：須機構核定，非僅監督醫師同意。", "D": "須配戴識別標誌，正確。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "113-通論-家庭-25": {"quick": "膀胱癌末期拒探視者，依「行善原則」為病人安全持續定時探視並加強支持。", "detail": {"background": "此情境涉自主(尊重拒訪)與行善/不傷害(末期合併造口、情緒低落有安全/自傷風險須關注)之權衡。考選部取「行善原則」——為病人安全與支持，仍應維持必要的定時探視與情緒支持(非完全不打擾)。臨床上會同理拒訪意願同時兼顧安全評估。", "options": {"A": "正解(官方)：依行善/安全，持續定時探視並支持。", "B": "完全不打擾忽略安全風險。", "C": "以規定為由探視非倫理依據。", "D": "末期拒談時強推SDM不適切。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "113-通論-家庭-28": {"quick": "溝通「最適當」者：清楚的溝通是臨床決策的基本條件。", "detail": {"background": "專業溝通原則：清楚有效的溝通是臨床決策與安全的基礎；「傾聽」與表達同等重要(甚至更重要)；應尊重病人/家屬偏好；倫理困境時應「正面溝通」而非迴避。", "options": {"A": "正解：清楚溝通是臨床決策基本條件。", "B": "傾聽與表達同等重要，非表達優先。", "C": "應尊重病人偏好，非專業意見優先。", "D": "倫理困境應正面溝通，非迴避。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "113-通論-家庭-77": {"quick": "專師辦法「正確」者：機構要由專師開醫囑表單，須先擬訂並核定預立醫療流程內容。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。監督不以親自在場為必要(A錯)；病歷簽核為24小時內(C的48小時錯)；特定訓練內容由「主管機關/辦法」規範(D由學會規範錯)。", "options": {"A": "監督不以親自在場為必要。", "B": "正解：須先擬訂並核定預立醫療流程內容方可開立醫囑表單。", "C": "病歷簽核為24小時內，非48小時。", "D": "訓練內容由主管機關規範，非學會。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "113-通論-家庭-79": {"quick": "預立醫療流程訂定內容「不包括」者：症狀或疾病之流行病學趨勢。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。", "options": {"A": "症狀/病史/身體評估等情境，含。", "B": "監督醫師及監督方式，含。", "C": "正解(不含)：流行病學趨勢非流程內容。", "D": "回報醫師病人狀況與處置結果，含。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "113-通論-家庭-9": {"quick": "護理人員法規範專師業務「錯誤」者：醫師助理角色。", "detail": {"background": "護理人員法之專師業務：健康問題護理評估、預防保健護理措施、護理指導與諮詢、(及於醫師監督下執行醫療業務)。專師非「醫師助理」(我國亦無正式醫師助理職類)，此敘述錯誤。", "options": {"A": "護理評估屬業務。", "B": "預防保健屬業務。", "C": "正解(錯誤)：專師非醫師助理角色。", "D": "護理指導與諮詢屬業務。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "114-通論-5分科-1": {"quick": "專師職責「錯誤」者：開立安養機構病人之治療計畫與用藥醫囑。", "detail": {"background": "專師可協調擬定住院檢查/治療計畫、協助安寧家屬哀傷調適、提供社區心理衛生照護；但「開立治療計畫與用藥醫囑」屬醫療業務，須在醫師監督下依預立醫療流程為之，非專師「自行」開立。", "options": {"A": "協調擬定住院檢查治療計畫，正確。", "B": "協助安寧家屬哀傷，正確。", "C": "正解(錯誤)：不可自行開立用藥醫囑(須醫師監督)。", "D": "社區心理衛生照護，正確。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "114-通論-5分科-28": {"quick": "家屬於病房推倒專師(職場暴力)，醫療機構應「立即通報警察並啟動保護關懷機制」。", "detail": {"background": "醫療法第24/106條：醫療機構執業場所應維護安全，對醫事人員遭受暴力者，機構「應」通報警察機關並提供保護與關懷，屬機構法定義務，不因當事人不追究而免除(妨害醫療秩序之公訴罪性質)。", "options": {"A": "公布加害人姓名特徵不當且侵權。", "B": "非以倫理小組決定是否通報。", "C": "不可因當事人不提告即不通報。", "D": "正解：立即通報警察並啟動保護關懷。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "114-通論-5分科-29": {"quick": "專師執業規範「錯誤」者：113新增家庭科專師「執業場域限社區、不得於醫院」。", "detail": {"background": "113年新增「家庭科」專師係拓展社區以人口群為基礎之照護角色，但「並未限制」其執業場域僅限社區(仍可於醫院執業)。其餘:執業範圍、需重新考我國證照、核心能力(進階藥理/病理/生理之分析判斷與臨床推理)皆正確。", "options": {"A": "執業範圍敘述正確。", "B": "正解(錯誤)：家庭科專師非限社區、仍可於醫院執業。", "C": "外國證照返國須重考我國證照，正確。", "D": "核心能力敘述正確。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "114-通論-5分科-77": {"quick": "最能展現監督下執業精神者：成立委員會核定預立醫療流程內容及SOP。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。授權自行決定範圍事後口頭回報(A錯)、要求所有侵入處置醫師須親自在場(C與「不以在場為必要」相違)、僅出院前補登醫囑(D錯)。", "options": {"A": "不可自行決定範圍事後口頭回報。", "B": "正解：成立委員會核定流程內容與SOP。", "C": "監督不以醫師親自在場為必要。", "D": "須24小時內核簽，非出院前。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "114-通論-5分科-78": {"quick": "醫師監督定義「錯誤」者：急救時各種侵入性處置「不受此規範」。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。即使急救，專師執行仍應在制度框架內(有其預立流程/事後核簽機制)，並非完全不受規範。「醫師事先核定流程、機構定期審查、監督不以親自在場為必要」皆正確。", "options": {"A": "醫師事先核定流程，正確。", "B": "機構定期審查，正確。", "C": "正解(錯誤)：急救侵入處置非完全不受規範。", "D": "監督不以親自在場為必要，正確。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "114-通論-5分科-80": {"quick": "居家護理所專師業務「正確」者：執行預立醫療流程後監督醫師可傳真簽署。", "detail": {"background": "「專科護理師於醫師監督下執行醫療業務辦法」要點：醫療機構須成立「專科護理師執行醫療業務委員會(作業小組)」(副院長以上召集、醫護主管副召)，核定「預立醫療流程內容」及「標準作業程序」；預立醫療流程訂定內容含「病人症狀/病史/身體評估等情境或診斷、監督醫師及其監督方式、回報醫師病人狀況與處置結果」；醫師之監督「不以親自在場為必要」，但監督醫師須於「24小時內」完成核簽病歷。居家護理所委員會由「該所負責人」召集(非限醫師背景，A錯)；醫療業務須機構「核定」非僅監督醫師同意(C錯)；負責人不以專師為必要(D錯)。", "options": {"A": "委員會由負責人召集，非限醫師背景。", "B": "正解：監督醫師可傳真簽署，不需親到居家護理所。", "C": "須機構核定，非僅監督醫師同意。", "D": "負責人不以專師為必要。"}, "sources": ["護理人員法(2023/6修正，增訂專科護理師業務)", "專科護理師於醫師監督下執行醫療業務辦法(2024修)", "醫療法、緊急醫療救護法、緊急傷病患轉診實施辦法"]}}, "106-106c-內科-44": {"quick": "自殺防治通報「錯誤」者：需當事人同意才可通報。", "detail": {"background": "自殺防治通報依精神衛生法/自殺防治法執行，採「不需當事人同意」之通報(以即時介入關懷救命為要)，通報資料由衛福部系統管理、直轄市縣市由社區心理衛生中心承辦自殺防治。", "options": {"A": "依精神衛生法執行，正確。", "B": "通報系統設於衛福部，正確。", "C": "正解(錯誤)：自殺通報不需當事人同意。", "D": "由社區心理衛生中心辦理，正確。"}, "sources": ["Harrison 21e, Ch. Global & Public Health", "精神衛生法、自殺防治法；緊急醫療救護法、緊急傷病患轉診實施辦法", "衛福部健康政策(健康台灣推動委員會)"]}}, "112-通論-其他-41": {"quick": "緊急傷病患轉診「正確」者：醫院辦轉診應先聯繫後送醫院，後送醫院不得拒絕。", "detail": {"background": "緊急傷病患轉診實施辦法：轉出醫院須先聯繫後送(接受)醫院、後送醫院「不得拒絕」接受轉診；轉診原因與風險須告知病人/親屬並記載病歷(不得省略)；穩定後轉回原院須經本人/親屬同意；救護運輸與人員由醫院安排(非病患自行指定)。", "options": {"A": "轉回原院須經同意，不可逕行。", "B": "正解：須先聯繫後送醫院，後送不得拒絕。", "C": "轉診原因須告知並記載，不可免載。", "D": "救護工具/人員由醫院安排，非病患自行指定。"}, "sources": ["Harrison 21e, Ch. Global & Public Health", "精神衛生法、自殺防治法；緊急醫療救護法、緊急傷病患轉診實施辦法", "衛福部健康政策(健康台灣推動委員會)"]}}, "114-通論-5分科-25": {"quick": "設備故障無法處置時，應先穩定處置、說明並取得書面同意、聯繫後送醫院轉診。", "detail": {"background": "緊急醫療救護法與轉診辦法：急救責任醫院無法提供必要處置時，應「先給予必要之穩定處置」，向病人/家屬說明轉診原因並取得書面同意，聯繫有能力之後送醫院後轉診；不得無穩定處置即轉、不得拒收後逕送、後送醫院亦不得任意拒收。", "options": {"A": "不可未告知/未取得同意即轉。", "B": "正解：先穩定處置＋說明取得書面同意＋聯繫後送轉診。", "C": "不可直接拒收要救護車自行送往。", "D": "後送醫院不得任意拒收。"}, "sources": ["Harrison 21e, Ch. Global & Public Health", "精神衛生法、自殺防治法；緊急醫療救護法、緊急傷病患轉診實施辦法", "衛福部健康政策(健康台灣推動委員會)"]}}, "114-通論-5分科-44": {"quick": "健康台灣推動委員會建言「不」包含：多元財務管道控制健保總額。", "detail": {"background": "2024年「健康台灣推動委員會」建言方向：改善醫事人員工作環境、長照3.0、健康台灣深耕計畫、強化預防與健康促進、智慧醫療等。「以多元財務管道控制健保總額」非其核心建言(政策方向偏向投資健康而非控管總額)。", "options": {"A": "改善醫療人員工作環境，含。", "B": "長照3.0，含。", "C": "正解(不含)：控制健保總額非其建言。", "D": "健康台灣深耕計畫，含。"}, "sources": ["Harrison 21e, Ch. Global & Public Health", "精神衛生法、自殺防治法；緊急醫療救護法、緊急傷病患轉診實施辦法", "衛福部健康政策(健康台灣推動委員會)"]}}}, L={"醫學倫理與法律": {"title": "醫學倫理與法律", "html": "<p><b>核心概念：</b>生命倫理四原則、Jonsen臨床倫理四象限、知情同意與相關法規，是NP臨床決策與糾紛預防的基礎。</p><p><b>四原則(Beauchamp & Childress)：</b>①<b>尊重自主</b>(尊重病人知情後的自我決定)②<b>行善</b>(主動增進福祉；層次：不傷害→去除既有/潛在傷害→增益)③<b>不傷害</b>(避免造成傷害，如洗手防感染)④<b>正義</b>(資源公平分配、避免無效醫療、可負擔性)。常見對應：協助關節運動避免攣縮＝行善之「去除傷害」；節制無效醫療＝正義。</p><p><b>Jonsen四象限(Four-Box)：</b>①<b>醫療適應性</b>(病情/治療效益與風險)②<b>病人意願/偏好</b>(自主、知情同意、<u>心智能力/法律行為能力</u>)③<b>生活品質</b>(治療對生活之影響)④<b>情境特徵</b>(<u>家屬、照顧能力、經濟/資源分配、法律、文化、機構政策</u>)。口訣：問「心智能力」→病人意願；問「家屬/資源」→情境特徵。</p><p><b>知情同意與告知(病主法)：</b>應告知「本人」病情/治療/預後；本人「未明示反對」時亦得告知關係人(以病人為知情主體)。</p><p><b>相關法規：</b>人體器官移植條例(活體捐贈須成年、限五親等內血親或配偶、經醫院<b>醫學倫理委員會審查</b>)。醫療糾紛上升因素：權利意識↑、商業化、期待落差；傳統父權服從式關係糾紛反而較少。</p>"}, "安寧緩和與善終": {"title": "安寧緩和與善終", "html": "<p><b>核心概念：</b>分清「安寧緩和醫療條例(DNR)」與「病人自主權利法(預立醫療決定AD)」兩套法源，是本主題最高頻考點。</p><p><b>病主法五款臨床條件：</b>①末期病人 ②不可逆轉昏迷 ③永久植物人 ④<b>極重度失智</b>(CDR 3、FAST 7以上；中度失智不符) ⑤經中央主管機關公告之特定重症。符合其一＋有AD，醫師得終止/撤除/不施行維生醫療或人工營養。外傷致昏迷/植物人須觀察「<b>逾6個月</b>」、非外傷「逾3個月」；末期須二位相關專科醫師確診。</p><p><b>預立醫療決定(AD)成立要件：</b>須經<b>預立醫療照護諮商(ACP)</b>＋本人(完全行為能力)簽署＋<b>公證或二人見證</b>＋上傳中央資料庫＋健保卡註記。可隨時書面撤回。註記健保卡僅「完成登錄」，須待實際符臨床條件確診後方能執行撤除維生。立法目的：尊重醫療自主、保障善終(非為省資源/減訟)。</p><p><b>DNR(安寧條例)：</b>意願書(本人)/同意書(家屬)；見證人須具完全行為能力且無利害關係(非繼承人/相關醫護)。</p><p><b>臨終照護：</b>緩和性鎮靜(palliative sedation)用於瀕死「難治症狀」(疼痛/呼吸困難/躁動性譫妄/抽搐)，目的緩解症狀非加速死亡(雙重效應)，應停用神經肌肉阻斷劑。骨轉移痛輔助止痛首選<b>降鈣素</b>(神經病變痛才用TCA/抗癲癇)。家屬意見不一→召開<b>家庭會議</b>共識。哀傷否認期→溫和堅定提供資訊、協助面對。</p>"}, "老年醫學與長期照護": {"title": "老年醫學與長期照護", "html": "<p><b>核心概念：</b>老化生理、衰弱與肌少症、跌倒預防、多重用藥，以及長照2.0/長照服務法與評估工具。</p><p><b>老化生理：</b>GFR↓、心肺儲備↓、<b>baroreflex敏感度↓</b>(易姿位性低血壓)、肺餘容積↑、白蛋白略↓、肌肉量↓體脂↑。</p><p><b>衰弱與肌少症：</b><b>Fried衰弱表現型</b>五項(體重減輕、疲憊、肌力↓、步速↓、低活動量；≥3衰弱、1–2前衰弱；<u>食慾下降非其一</u>)。<b>AWGS 2019肌少症</b>：小腿圍切點男<34、女<33；SARC-F五項(力量/行走/起身/登階/跌倒)；嚴重度三級。</p><p><b>跌倒：</b>最強預測因子＝<b>過去一年跌倒史</b>。預防：床欄、止滑墊、扶手、充足照明、移除障礙(地毯/昏暗反致跌)；下肢肌力/步態異常者轉介物理/職能治療與運動團體(非社工)。跌倒發生率＝(跌倒數/住院總人日)×1000‰，屬結果面指標，重度傷害做RCA。</p><p><b>多重用藥：</b>≥5種藥；老年多重共病應個別化「去處方(deprescribing)」、依Beers準則，非機械式疊加各指引用藥；評估須含中草藥/保健品。</p><p><b>長照與工具：</b>長照2.0對象(65歲以上、<b>55歲以上原住民</b>、50歲以上失智、領身障證明)；長照服務方式(居家/社區/機構住宿/家照支持，無「視訊諮詢」)。WHO <b>ICOPE六指標</b>：認知、行動力、營養、視力、聽力、憂鬱(<u>失禁/失眠/疼痛皆非</u>)。PAC腦中風：急性後期早期收案、黃金復健3–6個月。</p>"}, "實證醫學與醫療品質": {"title": "實證醫學與醫療品質", "html": "<p><b>核心概念：</b>EBM 5A流程、證據階層與評讀、共享決策(SDM)、品質指標(結構/過程/結果)與根本原因分析。</p><p><b>EBM 5A：</b>Ask(PICO)→Acquire(找最佳證據)→Appraise(評讀)→Apply(應用)→Assess(評值)。評讀三面向：可信度/真確性(validity，偽陰偽陽影響此項)、臨床重要性(效應)、可應用性。</p><p><b>證據階層與工具：</b>系統回顧/RCT>世代>病例對照(不因疾病新興而降格偏好觀察性)。<b>DiCenso 6S</b>：Studies→Synopses of studies→Syntheses→Synopses of syntheses→<b>Summaries(含臨床指引)</b>→Systems。指引品質外部審查用<b>AGREE II</b>(PRISMA=系統回顧報告、ROBINS-I=非隨機偏差、GRADE=證據/建議分級)；指引須定期系統更新、不可隨意推翻、非硬性每年更新。</p><p><b>共享決策(SDM)：</b>Charles模式三階段(資訊交換→商議→決策)；<b>SHARE</b>五步(Seek邀請→Help比較選項→Assess價值偏好→Reach共決→Evaluate)；PDA用於釐清/溝通病人價值(非引導特定決策、非取代知情同意)。適用多選項/偏好敏感/不確定情境；不適用緊急救命或唯一實證作法。</p><p><b>品質指標(Donabedian)：</b>結構(人力/設備/離職率)、過程(指引遵從率/依規範執行)、結果(感染率/再入急診/跌倒/噁心嘔吐)。病安通報系統精神：自願、匿名、保密、共同學習、<b>非究責</b>。RCA：準備→時序找近端原因→危害分析→確認根本原因→改善。ARR＝對照組率−介入組率；NNT＝1/ARR。</p>"}, "癌症篩檢與預防保健": {"title": "癌症篩檢與預防保健", "html": "<p><b>核心概念：</b>國家癌症篩檢資格、預防醫學三段五級、健康信念模式。</p><p><b>國家癌症篩檢(出題當年四癌)：</b>①<b>大腸癌</b>糞便潛血(FOBT)50–74歲每2年(2025擴大45–74、40–44具家族史)②<b>口腔癌</b>30歲以上「抽菸或嚼檳榔」者每2年③<b>乳癌</b>乳房攝影45–69歲(40–44具家族史；2025擴大40–74)④<b>子宮頸癌</b>抹片30歲以上(2025擴大25歲以上)。<b>2025新增肺癌LDCT</b>(高風險)成「五癌」。<u>子宮內膜癌非國家篩檢</u>。判題訣竅：不菸不檳→無口腔癌資格。</p><p><b>子宮頸抹片：</b>建議「有性行為」女性定期；從未性行為者不需；接種HPV疫苗者仍需抹片。B、C肝篩檢：民國55年後出生滿45歲未檢者，搭配成人預防保健終身一次(HBsAg、anti-HCV)。</p><p><b>三段五級：</b>第一段(健康促進、特殊保護/疫苗)、第二段(早期診斷治療/<b>篩檢</b>)、第三段(限制殘障與復健)。乳房篩檢＝第二段(次級預防)。</p><p><b>健康信念模式(HBM)：</b>自覺罹病性/嚴重性/利益/障礙、行動線索、自我效能(皆為「個人主觀信念」)；人口學特徵與知識有無屬修飾因子。</p>"}, "健康行為與健康促進": {"title": "健康行為與健康促進", "html": "<p><b>核心概念：</b>跨理論模式(TTM)行為改變階段、戒菸(STAR/二代戒菸)、飲食指南(我的餐盤)、衛教原則。</p><p><b>TTM跨理論模式：</b>①前思考/懵懂期(6個月內無意圖)②思考/沉思期(覺察但矛盾→介入：權衡利弊、提升動機)③準備期(1個月內行動、已有小嘗試)④行動期(已改變未滿6個月)⑤維持期(逾6個月)。Pender健康促進模式：提供行動利益/成功典範＋設可達成小目標以增<b>自我效能</b>。</p><p><b>戒菸：</b>尼古丁戒斷＝情緒低落/易怒、注意力不集中、<b>失眠(非嗜睡)</b>、食慾/體重增加。<b>STAR</b>：Set戒菸日、<b>Tell告知親友求支持</b>、Anticipate預期困難、Remove移除菸品。二代戒菸：≥18歲、FTND≥4或每日≥10支；<b>孕婦/哺乳禁藥物</b>；每年補助2療程(各8週)、同機構完成、民眾須部分負擔。</p><p><b>飲食與衛教：</b>「我的餐盤」六口訣(早晚一杯奶、水果拳頭大、<b>菜比水果多一點</b>、飯跟蔬菜一樣多、豆魚蛋肉一掌心、堅果一茶匙)。高血壓生活型態：DASH降「飽和」脂肪、限鈉<6 g、規律有氧、限酒、戒菸。有氧增心肺耐力(增肌靠阻力訓練)。衛教應個別化(非依人員方便用單一法)；低健康識能用白話/回覆示教；剛確診者勿立即大量副作用衛教(增焦慮)。評量：安置性(前測)、診斷性(找困難)、形成性(歷程)、總結/確定性(成效)。</p>"}, "醫病溝通與專師角色法規": {"title": "醫病溝通與專師角色法規", "html": "<p><b>核心概念：</b>「專科護理師於醫師監督下執行醫療業務辦法」、護理人員法之專師業務範圍，以及具體有效的醫病溝通。</p><p><b>專師業務(護理人員法)：</b>護理自主業務(健康評估、預防保健衛教、護理指導諮詢)<u>不需</u>醫師監督；<b>醫療業務</b>(侵入處置、開立醫囑、傷口縫合等)須在醫師監督下依辦法執行。專師非「醫師助理」。113新增家庭科專師(社區人口群照護，<u>仍可於醫院執業</u>)。外國證照返國須重考我國證照。</p><p><b>監督下執行辦法重點：</b>機構須成立<b>委員會(副院長以上召集、醫護主管副召)</b>，核定「預立醫療流程內容」<b>及</b>標準作業程序。流程訂定內容含：病人症狀/病史/身體評估等情境或診斷、監督醫師及監督方式、回報醫師病人狀況與處置(<u>不含流行病學趨勢</u>)。監督「不以醫師親自在場為必要」；病歷須<b>24小時內</b>核簽。專師可代開：檢驗/影像醫囑、藥物處方、入院許可、留置導尿等；<b>不可代開</b>：DNR同意書、死亡證明、出院診斷證明。居家護理所亦須成立委員會(負責人召集)、機構核定流程，監督醫師可傳真簽署。是否推行流程取決醫院意願(非強制)。</p><p><b>溝通與安全：</b>具體請求＝可觀察可測量(「每天下床2次」)；清楚溝通是臨床決策基礎、傾聽與表達並重、倫理困境應正面溝通。職場暴力(家屬推倒醫護)機構<b>應通報警察並啟動保護關懷</b>(不因當事人不追究而免)。</p>"}, "健康政策與分級醫療": {"title": "健康政策與分級醫療", "html": "<p><b>核心概念：</b>緊急傷病患轉診規範、自殺防治通報，以及當前健康政策方向。</p><p><b>緊急傷病患轉診(緊急醫療救護法/轉診辦法)：</b>無法提供必要處置時，應<b>先給予穩定處置</b>、向病人/親屬說明轉診原因並取得<b>書面同意</b>、先聯繫後送醫院後轉診；<b>後送醫院不得拒絕</b>接受轉診；轉診原因/風險須記載病歷(不可省略)；救護工具與人員由醫院安排(非病患自行指定)；穩定後轉回原院須經同意。</p><p><b>自殺防治通報：</b>依精神衛生法/自殺防治法，<b>不需當事人同意</b>即通報(即時介入救命)；系統設於衛福部，地方由社區心理衛生中心承辦。</p><p><b>當前政策：</b>2024「健康台灣推動委員會」建言方向：改善醫事人員工作環境、長照3.0、健康台灣深耕計畫、強化預防與健康促進等(<u>非以控制健保總額為核心</u>)。</p>"}};
const TORDER=["醫學倫理與法律", "安寧緩和與善終", "老年醫學與長期照護", "實證醫學與醫療品質", "癌症篩檢與預防保健", "健康行為與健康促進", "醫病溝通與專師角色法規", "健康政策與分級醫療"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if((q.answer_status||'').indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if((q.answer_status||'').indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if((q.answer_status||'').indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if((q.answer_status||'').indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 let opts='';
 for(const k of ['A','B','C','D','E']){ if(q.options[k]!==undefined) opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='np_fm_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'\U0001F44B 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
