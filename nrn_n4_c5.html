疲累/吸不到』』,應『軟大洞』」。本題「錯誤」者為B。","options":{"A":"正確。可將母奶擠在特殊奶瓶中餵食。","B":"錯誤(本題答案)。應選柔軟孔大的奶嘴(非較硬孔小)。","C":"正確。抱成直立姿勢餵食、常拍背排氣。","D":"正確。無法吸吮可用塑膠滴管或湯匙緩慢餵食。"},"sources":["Nelson《兒科學》唇腭裂","奶嘴"]}},"102030-N4-76":{"quick":"唇腭裂最常引起的健康問題是「反覆性中耳炎」。","detail":{"background":"唇腭裂(cleft lip/palate):『餵食『特殊奶瓶/柔軟『大洞(非小硬洞)』奶嘴、塑膠滴管/湯匙、『直立姿『餵食、常拍背排氣(吞入空氣多)』;『最常引起『『反覆性中耳炎』(腭裂使歐氏管功能不良)』、餵食困難、語言問題』。術後護理:『『手肘(elbow)約束』防手摸傷口、『避免『俯臥(壓傷口)』採『仰臥/側臥』、『避免吸吮『安撫奶嘴/哭泣『(拉扯縫合處)』』、餵食後清水清潔口腔、『出現『不停吞嚥『=傷口『出血『徵象』』。唇裂修補可早(出生數週~3月),腭裂修補約9~18個月(語言發展前)。 『腭裂『使『歐氏管(耳咽管)『開閉功能不良、引流不暢』→『『反覆性『中耳炎』(最常見併發症)、聽力受損』』。本題最常引起者為「反覆性中耳炎」(B);脫水、營養不足、腹瀉非最常見併發症。本題為B。","options":{"A":"脫水非唇腭裂最常見併發症。","B":"正確。腭裂致歐氏管功能不良→反覆性中耳炎。","C":"營養不足可有但非「最常」引起。","D":"腹瀉與唇腭裂無關。"},"sources":["Nelson《兒科學》唇腭裂","中耳炎"]}},"107030-N4-77":{"quick":"唇裂與腭裂手術後護理正確的是「出現不停的吞嚥動作,應評估傷口處是否出血」。","detail":{"background":"唇腭裂(cleft lip/palate):『餵食『特殊奶瓶/柔軟『大洞(非小硬洞)』奶嘴、塑膠滴管/湯匙、『直立姿『餵食、常拍背排氣(吞入空氣多)』;『最常引起『『反覆性中耳炎』(腭裂使歐氏管功能不良)』、餵食困難、語言問題』。術後護理:『『手肘(elbow)約束』防手摸傷口、『避免『俯臥(壓傷口)』採『仰臥/側臥』、『避免吸吮『安撫奶嘴/哭泣『(拉扯縫合處)』』、餵食後清水清潔口腔、『出現『不停吞嚥『=傷口『出血『徵象』』。唇裂修補可早(出生數週~3月),腭裂修補約9~18個月(語言發展前)。 (1)「『不停『吞嚥』動作=『傷口『出血(血液流入咽喉)的徵象』,應評估」——正確;(2)『術後採『仰臥/側臥(非俯臥,壓傷口)』』,B錯;(3)『啼哭/吸吮安撫奶嘴會『拉扯縫合處』,應『避免(非用奶嘴安撫)』』,C錯;(4)『術後『可『進食(軟質/液體)』,『非『拆線前禁食』』』,D錯。本題為A。","options":{"A":"正確。不停吞嚥動作應評估傷口是否出血。","B":"錯。術後採仰臥/側臥(非俯臥壓傷口)。","C":"錯。啼哭/吸吮奶嘴拉扯縫合處,應避免。","D":"錯。術後可進食,非拆線前禁食。"},"sources":["Nelson《兒科學》唇腭裂術後","出血"]}},"109110-N4-72":{"quick":"3個月唇裂修補術後護理中「協助採取俯臥姿勢,以促進分泌物流出,預防呼吸道阻塞」為錯誤。","detail":{"background":"唇腭裂(cleft lip/palate):『餵食『特殊奶瓶/柔軟『大洞(非小硬洞)』奶嘴、塑膠滴管/湯匙、『直立姿『餵食、常拍背排氣(吞入空氣多)』;『最常引起『『反覆性中耳炎』(腭裂使歐氏管功能不良)』、餵食困難、語言問題』。術後護理:『『手肘(elbow)約束』防手摸傷口、『避免『俯臥(壓傷口)』採『仰臥/側臥』、『避免吸吮『安撫奶嘴/哭泣『(拉扯縫合處)』』、餵食後清水清潔口腔、『出現『不停吞嚥『=傷口『出血『徵象』』。唇裂修補可早(出生數週~3月),腭裂修補約9~18個月(語言發展前)。 唇裂術後:手肘約束防碰傷口、避免吸吮安撫奶嘴、餵奶後清水清潔口腔皆正確。「『採『『俯臥』姿勢』』錯誤——『俯臥會『使『臉部傷口『摩擦床面『裂開/感染』』,『應『仰臥/側臥』』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。唇裂術後應仰臥/側臥(非俯臥,會摩擦傷口)。","B":"正確。適當約束手肘避免碰觸傷口。","C":"正確。避免吸吮、暫勿用安撫奶嘴。","D":"正確。餵奶後清水清潔口腔預防感染。"},"sources":["Nelson《兒科學》唇裂術後","仰臥"]}},"110110-N4-73":{"quick":"嬰兒唇顎裂手術後注意事項中「避免哭泣影響傷口,可使用安撫奶嘴安撫之」為錯誤。","detail":{"background":"唇腭裂(cleft lip/palate):『餵食『特殊奶瓶/柔軟『大洞(非小硬洞)』奶嘴、塑膠滴管/湯匙、『直立姿『餵食、常拍背排氣(吞入空氣多)』;『最常引起『『反覆性中耳炎』(腭裂使歐氏管功能不良)』、餵食困難、語言問題』。術後護理:『『手肘(elbow)約束』防手摸傷口、『避免『俯臥(壓傷口)』採『仰臥/側臥』、『避免吸吮『安撫奶嘴/哭泣『(拉扯縫合處)』』、餵食後清水清潔口腔、『出現『不停吞嚥『=傷口『出血『徵象』』。唇裂修補可早(出生數週~3月),腭裂修補約9~18個月(語言發展前)。 唇顎裂術後:手肘約束避免抓縫線、直立坐姿餵食、毛毯限制翻身避免碰傷口皆正確。「『用『安撫『奶嘴』安撫』』錯誤——『『吸吮『安撫奶嘴『的『吸吮動作『會『拉扯/裂開『縫合處』』,『術後『應『避免吸吮『安撫奶嘴』』(改用其他方式安撫)』」。本題「錯誤」者為B。","options":{"A":"正確。適時約束嬰兒手臂避免抓縫線。","B":"錯誤(本題答案)。安撫奶嘴的吸吮會拉扯縫合處,應避免。","C":"正確。直立式坐姿較適合餵食。","D":"正確。可用毛毯限制翻身避免碰傷口。"},"sources":["Nelson《兒科學》唇顎裂術後","奶嘴"]}},"113030-N4-32":{"quick":"1歲腭裂修補術後約束護理正確的是「手肘約束法」。","detail":{"background":"唇腭裂(cleft lip/palate):『餵食『特殊奶瓶/柔軟『大洞(非小硬洞)』奶嘴、塑膠滴管/湯匙、『直立姿『餵食、常拍背排氣(吞入空氣多)』;『最常引起『『反覆性中耳炎』(腭裂使歐氏管功能不良)』、餵食困難、語言問題』。術後護理:『『手肘(elbow)約束』防手摸傷口、『避免『俯臥(壓傷口)』採『仰臥/側臥』、『避免吸吮『安撫奶嘴/哭泣『(拉扯縫合處)』』、餵食後清水清潔口腔、『出現『不停吞嚥『=傷口『出血『徵象』』。唇裂修補可早(出生數週~3月),腭裂修補約9~18個月(語言發展前)。 腭裂(及唇裂)術後『約束『手肘(elbow restraint)』』——『限制『手肘『彎曲『使手『無法摸到『臉部/口腔『傷口』』,但仍可活動上臂』。本題正確為「手肘約束法」(C);木乃伊約束(全身,過度)、手臂約束、背心式約束非唇腭裂術後首選。本題為C。","options":{"A":"木乃伊約束限制全身,過度。","B":"手臂約束非腭裂術後首選。","C":"正確。手肘約束法防手摸口腔傷口。","D":"背心式約束限制軀幹,非此用途。"},"sources":["Nelson《兒科學》腭裂術後","手肘約束"]}},"113180-N4-26":{"quick":"合併唇腭裂嬰幼兒手術『前』護理最適當的是「餵食時,餵食器放於口腔內後方或臉頰內側面,避免奶水進鼻腔」。","detail":{"background":"唇腭裂(cleft lip/palate):『餵食『特殊奶瓶/柔軟『大洞(非小硬洞)』奶嘴、塑膠滴管/湯匙、『直立姿『餵食、常拍背排氣(吞入空氣多)』;『最常引起『『反覆性中耳炎』(腭裂使歐氏管功能不良)』、餵食困難、語言問題』。術後護理:『『手肘(elbow)約束』防手摸傷口、『避免『俯臥(壓傷口)』採『仰臥/側臥』、『避免吸吮『安撫奶嘴/哭泣『(拉扯縫合處)』』、餵食後清水清潔口腔、『出現『不停吞嚥『=傷口『出血『徵象』』。唇裂修補可早(出生數週~3月),腭裂修補約9~18個月(語言發展前)。 唇腭裂術『前』餵食:『『將『餵食器/奶嘴『放『口腔內『後方/臉頰內側『(健側)』』,『避免『奶水『經裂縫『進入鼻腔(嗆咳)』』、直立姿、軟大洞奶嘴』。本題最適當為「餵食器放口腔後方/臉頰內側避免奶水進鼻腔」(D);孔小奶嘴(A錯,應軟大洞)、術前即鼻胃管餵食(B,非必要,先嘗試經口特殊餵食)、平躺餵食(C錯,應直立防嗆)。本題為D。","options":{"A":"錯。應用孔大軟奶嘴(非孔小)。","B":"術前先嘗試經口特殊餵食,非一律鼻胃管。","C":"錯。應直立姿餵食(非平躺,易嗆入鼻腔)。","D":"正確。餵食器放口腔後方/臉頰內側,避免奶水進鼻腔。"},"sources":["Nelson《兒科學》唇腭裂","術前餵食"]}},"114030-N4-46":{"quick":"4個月唇裂修補術後照護較適當的是「須給予適時約束手肘,以避免摩擦臉部影響傷口癒合」。","detail":{"background":"唇腭裂(cleft lip/palate):『餵食『特殊奶瓶/柔軟『大洞(非小硬洞)』奶嘴、塑膠滴管/湯匙、『直立姿『餵食、常拍背排氣(吞入空氣多)』;『最常引起『『反覆性中耳炎』(腭裂使歐氏管功能不良)』、餵食困難、語言問題』。術後護理:『『手肘(elbow)約束』防手摸傷口、『避免『俯臥(壓傷口)』採『仰臥/側臥』、『避免吸吮『安撫奶嘴/哭泣『(拉扯縫合處)』』、餵食後清水清潔口腔、『出現『不停吞嚥『=傷口『出血『徵象』』。唇裂修補可早(出生數週~3月),腭裂修補約9~18個月(語言發展前)。 唇裂術後:(1)『採『仰臥/側臥(非俯臥,摩擦傷口)』』,A錯;(2)『『不停吞嚥『是『出血『徵象(非正常)』,應評估』』,B錯;(3)『『吸吮『安撫奶嘴『拉扯縫合處,應『避免』』』,C錯;(4)「『『手肘約束『避免『摩擦臉部『影響傷口癒合』」——正確。本題為D。","options":{"A":"錯。應仰臥/側臥(非俯臥摩擦傷口)。","B":"錯。不停吞嚥是出血徵象(非正常)。","C":"錯。吸吮安撫奶嘴拉扯縫合處,應避免。","D":"正確。手肘約束避免摩擦臉部影響傷口癒合。"},"sources":["Nelson《兒科學》唇裂術後","手肘約束"]}},"102110-N4-72":{"quick":"胃食道逆流治療藥物cimetidine(tagamet)的作用是「抑制胃酸分泌」。","detail":{"background":"胃食道逆流(GER):『餵奶後溢奶嘔吐(嘔吐物『不含膽汁』、為胃內容物)』;護理『『配方奶加『麥粉/米粉『增稠』』、少量多餐、『餵後『拍背排氣』、『餵後『直立/頭高(非仰臥平躺)』約30分鐘』;藥物『cimetidine(H2阻斷劑)『抑制胃酸』、促腸蠕動劑』;『24小時食道酸鹼值測定『是最準確診斷』』。氣管食道瘻管(TEF)/食道閉鎖:『餵食即『咳嗽(coughing)、哽塞(choking)、發紺(cyanosis)『3C』、口吐泡沫、嗆奶』;『新生兒『口鼻抽吸『清除呼吸道分泌物』』;術前『禁食、『口咽『持續『抽吸『近端食道盲端分泌物』、頭高45~60度防胃液逆流入肺』;術後『鼻胃管『滑脫『勿『自行『重新放置(防戳傷吻合處)』、抽吸管『不可超過吻合處』、安撫奶嘴(非營養性吸吮安撫)』。 『cimetidine(Tagamet)是『『H2受體阻斷劑』』,『作用為『『抑制『胃酸分泌』』(減少胃酸逆流刺激食道)』。本題為「抑制胃酸分泌」(D);促酵素分解、促腸胃蠕動、抑制嘔吐非cimetidine作用。本題為D。","options":{"A":"非促酵素分解。","B":"促腸胃蠕動是另一類藥(如metoclopramide)。","C":"非止吐劑。","D":"正確。cimetidine是H2阻斷劑,抑制胃酸分泌。"},"sources":["藥理 cimetidine","H2阻斷"]}},"102110-N4-75":{"quick":"氣管食道瘻管「3C」臨床表徵除咳嗽、哽塞外,還包括「發紺(cyanosis)」。","detail":{"background":"胃食道逆流(GER):『餵奶後溢奶嘔吐(嘔吐物『不含膽汁』、為胃內容物)』;護理『『配方奶加『麥粉/米粉『增稠』』、少量多餐、『餵後『拍背排氣』、『餵後『直立/頭高(非仰臥平躺)』約30分鐘』;藥物『cimetidine(H2阻斷劑)『抑制胃酸』、促腸蠕動劑』;『24小時食道酸鹼值測定『是最準確診斷』』。氣管食道瘻管(TEF)/食道閉鎖:『餵食即『咳嗽(coughing)、哽塞(choking)、發紺(cyanosis)『3C』、口吐泡沫、嗆奶』;『新生兒『口鼻抽吸『清除呼吸道分泌物』』;術前『禁食、『口咽『持續『抽吸『近端食道盲端分泌物』、頭高45~60度防胃液逆流入肺』;術後『鼻胃管『滑脫『勿『自行『重新放置(防戳傷吻合處)』、抽吸管『不可超過吻合處』、安撫奶嘴(非營養性吸吮安撫)』。 氣管食道瘻管(TEF)餵食時的『3C』:『『Coughing(咳嗽)、Choking(哽塞)、『Cyanosis(發紺)』』(奶/分泌物經瘻管入氣管)。本題還包括「發紺(cyanosis)」(C);捻髮音、爆裂聲、尖聲哭叫非3C。本題為C。","options":{"A":"捻髮音非3C之一。","B":"爆裂聲非3C。","C":"正確。3C=咳嗽、哽塞、發紺(cyanosis)。","D":"尖聲哭叫非3C。"},"sources":["Nelson《兒科學》TEF","3C"]}},"106110-N4-75":{"quick":"氣管食道瘻管術後照護中「若鼻胃管滑脫應立即重新放置,以免胃液損及傷口」為錯誤。","detail":{"background":"胃食道逆流(GER):『餵奶後溢奶嘔吐(嘔吐物『不含膽汁』、為胃內容物)』;護理『『配方奶加『麥粉/米粉『增稠』』、少量多餐、『餵後『拍背排氣』、『餵後『直立/頭高(非仰臥平躺)』約30分鐘』;藥物『cimetidine(H2阻斷劑)『抑制胃酸』、促腸蠕動劑』;『24小時食道酸鹼值測定『是最準確診斷』』。氣管食道瘻管(TEF)/食道閉鎖:『餵食即『咳嗽(coughing)、哽塞(choking)、發紺(cyanosis)『3C』、口吐泡沫、嗆奶』;『新生兒『口鼻抽吸『清除呼吸道分泌物』』;術前『禁食、『口咽『持續『抽吸『近端食道盲端分泌物』、頭高45~60度防胃液逆流入肺』;術後『鼻胃管『滑脫『勿『自行『重新放置(防戳傷吻合處)』、抽吸管『不可超過吻合處』、安撫奶嘴(非營養性吸吮安撫)』。 TEF術後:頭高45~60度防逆流、用安撫奶嘴(非營養性吸吮)減哭泣、抽吸管不超過吻合處皆正確。「『鼻胃管滑脫『『立即『重新放置』』』錯誤——『術後鼻胃管滑脫『『不可『自行『重新插入』』(會『戳傷『食道『吻合處』』,應『通知醫師處理』」。本題「錯誤」者為C。","options":{"A":"正確。頭部抬高45~60度避免胃容物逆流。","B":"正確。用安撫奶嘴減少哭泣造成胃腸壓力。","C":"錯誤(本題答案)。鼻胃管滑脫不可自行重插(戳傷吻合處),應通知醫師。","D":"正確。抽吸管長度不可超越吻合處。"},"sources":["Nelson《兒科學》TEF術後","鼻胃管"]}},"108020-N4-59":{"quick":"6個月胃食道逆流(GER)護理指導正確的是「添加麥粉或米粉,泡製較濃稠的配方奶」。","detail":{"background":"胃食道逆流(GER):『餵奶後溢奶嘔吐(嘔吐物『不含膽汁』、為胃內容物)』;護理『『配方奶加『麥粉/米粉『增稠』』、少量多餐、『餵後『拍背排氣』、『餵後『直立/頭高(非仰臥平躺)』約30分鐘』;藥物『cimetidine(H2阻斷劑)『抑制胃酸』、促腸蠕動劑』;『24小時食道酸鹼值測定『是最準確診斷』』。氣管食道瘻管(TEF)/食道閉鎖:『餵食即『咳嗽(coughing)、哽塞(choking)、發紺(cyanosis)『3C』、口吐泡沫、嗆奶』;『新生兒『口鼻抽吸『清除呼吸道分泌物』』;術前『禁食、『口咽『持續『抽吸『近端食道盲端分泌物』、頭高45~60度防胃液逆流入肺』;術後『鼻胃管『滑脫『勿『自行『重新放置(防戳傷吻合處)』、抽吸管『不可超過吻合處』、安撫奶嘴(非營養性吸吮安撫)』。 (1)「『添加『麥粉/米粉『增稠『配方奶』(稠化減逆流)」——正確;(2)『GER嘔吐物『『不含膽汁』(為胃內容物)』』,B錯;(3)『餵後採『『直立/頭高(非仰臥平躺)』』』,C錯;(4)『餵食『仍須『拍背排氣(減胃脹減逆流)』,『非『避免拍背』』』,D錯。本題為A。","options":{"A":"正確。添加麥粉/米粉泡濃稠配方奶(減逆流)。","B":"錯。GER嘔吐物不含膽汁(為胃內容物)。","C":"錯。餵後採直立/頭高(非仰臥平躺)。","D":"錯。餵食仍須拍背排氣(減胃脹)。"},"sources":["Nelson《兒科學》GER","增稠"]}},"108110-N4-24":{"quick":"新生兒出生後進行口鼻抽吸的目的是「移除呼吸道分泌物」。","detail":{"background":"新生兒出生後『口鼻抽吸(先口後鼻)』目的:『『清除/移除『口鼻『呼吸道『分泌物/羊水/黏液』』,『維持『呼吸道通暢『利建立呼吸』』。本題為「移除呼吸道分泌物」(B);刺激迷走神經(過度抽吸反致心搏過緩)、引發嘔吐反射、移除CO2非口鼻抽吸目的。本題為B。","options":{"A":"刺激迷走神經是過度抽吸的副作用(致心搏過緩),非目的。","B":"正確。移除口鼻呼吸道分泌物、維持呼吸道通暢。","C":"非引發嘔吐反射。","D":"非移除二氧化碳。"},"sources":["Nelson《兒科學》口鼻抽吸","分泌物"]}},"108110-N4-49":{"quick":"8個月疑似胃食道逆流(GER)診斷檢查正確的是「24小時食道酸鹼值測定,是最準確的診斷方法」。","detail":{"background":"胃食道逆流(GER):『餵奶後溢奶嘔吐(嘔吐物『不含膽汁』、為胃內容物)』;護理『『配方奶加『麥粉/米粉『增稠』』、少量多餐、『餵後『拍背排氣』、『餵後『直立/頭高(非仰臥平躺)』約30分鐘』;藥物『cimetidine(H2阻斷劑)『抑制胃酸』、促腸蠕動劑』;『24小時食道酸鹼值測定『是最準確診斷』』。氣管食道瘻管(TEF)/食道閉鎖:『餵食即『咳嗽(coughing)、哽塞(choking)、發紺(cyanosis)『3C』、口吐泡沫、嗆奶』;『新生兒『口鼻抽吸『清除呼吸道分泌物』』;術前『禁食、『口咽『持續『抽吸『近端食道盲端分泌物』、頭高45~60度防胃液逆流入肺』;術後『鼻胃管『滑脫『勿『自行『重新放置(防戳傷吻合處)』、抽吸管『不可超過吻合處』、安撫奶嘴(非營養性吸吮安撫)』。 (1)『食道鏡『看『食道黏膜/食道炎(非『確認逆流『量』)』』,A錯;(2)『上腸胃道攝影『喝『含『顯影劑『(非牛奶)』』』,B不精確;(3)『腹部超音波『非『確認食道炎位置(用於幽門狹窄等)』』,C錯;(4)「『『24小時食道『酸鹼(pH)值測定『是『最『準確』的『GER『診斷』」——正確。本題為D。","options":{"A":"錯。食道鏡看黏膜/食道炎(非確認逆流量)。","B":"上腸胃道攝影喝含顯影劑(非牛奶)。","C":"錯。腹部超音波非確認食道炎位置。","D":"正確。24小時食道pH測定是GER最準確診斷。"},"sources":["Nelson《兒科學》GER","pH測定"]}},"111110-N4-72":{"quick":"食道氣管瘻管(TEF)放置鼻胃管中「鼻胃管灌食後鼓勵採左側臥以預防吸入性肺炎」較不適當。","detail":{"background":"胃食道逆流(GER):『餵奶後溢奶嘔吐(嘔吐物『不含膽汁』、為胃內容物)』;護理『『配方奶加『麥粉/米粉『增稠』』、少量多餐、『餵後『拍背排氣』、『餵後『直立/頭高(非仰臥平躺)』約30分鐘』;藥物『cimetidine(H2阻斷劑)『抑制胃酸』、促腸蠕動劑』;『24小時食道酸鹼值測定『是最準確診斷』』。氣管食道瘻管(TEF)/食道閉鎖:『餵食即『咳嗽(coughing)、哽塞(choking)、發紺(cyanosis)『3C』、口吐泡沫、嗆奶』;『新生兒『口鼻抽吸『清除呼吸道分泌物』』;術前『禁食、『口咽『持續『抽吸『近端食道盲端分泌物』、頭高45~60度防胃液逆流入肺』;術後『鼻胃管『滑脫『勿『自行『重新放置(防戳傷吻合處)』、抽吸管『不可超過吻合處』、安撫奶嘴(非營養性吸吮安撫)』。 (1)鼻胃管長度鼻尖→耳垂→劍突——正確;(2)反抽有胃液表位置正確——正確;(3)灌食前反抽評估殘餘量——正確;(4)「『灌食後採『『左『側臥』』」較不適當——『『灌食後應『『頭高/右側臥(利胃排空、減逆流)』』或頭抬高,『TEF更須『頭高45~60度』防逆流入氣管;『『左側臥『非『預防吸入性肺炎『的『適當『姿勢』』」。本題較不適當者為D。","options":{"A":"適當。鼻胃管長度鼻尖→耳垂→劍突。","B":"適當。反抽有胃液表位置正確。","C":"適當。灌食前反抽評估殘餘量。","D":"較不適當(本題答案)。應頭高/右側臥利胃排空(非左側臥)。"},"sources":["Nelson《兒科學》TEF","灌食姿勢"]}},"114100-N4-47":{"quick":"先天性食道閉鎖合併遠端氣管食道瘻管新生兒術前護理最適當的是「頭部抬高45~60度,降低胃液逆流」。","detail":{"background":"胃食道逆流(GER):『餵奶後溢奶嘔吐(嘔吐物『不含膽汁』、為胃內容物)』;護理『『配方奶加『麥粉/米粉『增稠』』、少量多餐、『餵後『拍背排氣』、『餵後『直立/頭高(非仰臥平躺)』約30分鐘』;藥物『cimetidine(H2阻斷劑)『抑制胃酸』、促腸蠕動劑』;『24小時食道酸鹼值測定『是最準確診斷』』。氣管食道瘻管(TEF)/食道閉鎖:『餵食即『咳嗽(coughing)、哽塞(choking)、發紺(cyanosis)『3C』、口吐泡沫、嗆奶』;『新生兒『口鼻抽吸『清除呼吸道分泌物』』;術前『禁食、『口咽『持續『抽吸『近端食道盲端分泌物』、頭高45~60度防胃液逆流入肺』;術後『鼻胃管『滑脫『勿『自行『重新放置(防戳傷吻合處)』、抽吸管『不可超過吻合處』、安撫奶嘴(非營養性吸吮安撫)』。 食道閉鎖+遠端TEF術前:『『頭部『抬高『45~60度『降低『胃液『經瘻管『逆流入肺』』、『持續『口咽『抽吸『近端食道盲端『分泌物(非禁止抽吸)』、『禁食『改『靜脈營養(非鼻管餵食,食道閉鎖無法經食道)』』。本題最適當為「頭高45~60度降胃液逆流」(C);鼻管餵食(A錯,食道閉鎖無法)、禁止抽吸(B錯,須持續抽吸盲端)、避免吸奶嘴(D非重點)。本題為C。","options":{"A":"錯。食道閉鎖無法鼻管餵食(用靜脈營養)。","B":"錯。須持續口咽抽吸近端盲端分泌物(非禁止)。","C":"正確。頭部抬高45~60度降低胃液逆流入肺。","D":"避免吸奶嘴非術前重點。"},"sources":["Nelson《兒科學》食道閉鎖","頭高"]}},"102110-N4-71":{"quick":"幽門狹窄敘述正確的是「出現噴射狀的嘔吐現象」。","detail":{"background":"幽門狹窄(pyloric stenosis):『好發『足月『男嬰(約出生3~6週)』』;『『『噴射狀『嘔吐(餵食後)』、嘔吐物『含『酸性胃內容物『『不含膽汁』』(阻塞在幽門、膽管開口之上)』、『上腹『由『左至右『胃蠕動波』、『右上腹『橄欖狀『腫塊』、體重不增脫水』;『反覆嘔吐『失『胃酸(HCl)』→『代謝性『鹼』中毒(非酸中毒)、低血氯低血鉀』』。處置:『先矯正『脫水/電解質/鹼中毒』→『幽門切開術(pyloromyotomy)』』;術後『約4~8小時後『先給少量葡萄糖水』、漸進餵食、餵後拍背、『右側臥/頭高『利胃排空』』。腹部評估順序:『視→『聽(先聽診,避免觸診叩診影響腸蠕動音)』→叩→觸』;正常腸蠕動約『5~30次/分』。 (1)『好發『『足月『男嬰(非早產兒比足月高)』』』,A錯;(2)「『『噴射狀『嘔吐』」——正確;(3)『嘔吐物『『不含『膽汁(阻塞在膽管開口之上)』』』,C錯;(4)『反覆嘔吐失胃酸→『代謝性『『鹼』中毒(非酸中毒)』』,D錯。本題為B。","options":{"A":"錯。好發足月男嬰(非早產兒)。","B":"正確。出現噴射狀嘔吐。","C":"錯。嘔吐物不含膽汁。","D":"錯。容易代謝性『鹼』中毒(非酸中毒)。"},"sources":["Nelson《兒科學》幽門狹窄","噴射嘔吐"]}},"103100-N4-52":{"quick":"兒童腹部身體評估正確的是「聽診腸蠕動的性質與頻率,正常腸蠕動次數約為5~30次/分」(本題D)。","detail":{"background":"幽門狹窄(pyloric stenosis):『好發『足月『男嬰(約出生3~6週)』』;『『『噴射狀『嘔吐(餵食後)』、嘔吐物『含『酸性胃內容物『『不含膽汁』』(阻塞在幽門、膽管開口之上)』、『上腹『由『左至右『胃蠕動波』、『右上腹『橄欖狀『腫塊』、體重不增脫水』;『反覆嘔吐『失『胃酸(HCl)』→『代謝性『鹼』中毒(非酸中毒)、低血氯低血鉀』』。處置:『先矯正『脫水/電解質/鹼中毒』→『幽門切開術(pyloromyotomy)』』;術後『約4~8小時後『先給少量葡萄糖水』、漸進餵食、餵後拍背、『右側臥/頭高『利胃排空』』。腹部評估順序:『視→『聽(先聽診,避免觸診叩診影響腸蠕動音)』→叩→觸』;正常腸蠕動約『5~30次/分』。 腹部評估:(1)『順序『視→『『聽『(先於觸叩,避免影響腸音)』→叩→觸』』(非視叩觸聽)』,A錯;(2)『『右『上』腹『橄欖狀『腫塊『是『幽門狹窄(非『左下腹『軟質塊』)』』,B錯;(3)『『疼痛部位『『最『後『評估/觸診(非最先叩診)』』』,C錯;(4)「『聽診腸蠕動,正常約『『5~30(本題作5~40)次/分』」——本題依官方為D(正常腸蠕動次數範圍)。本題為D。","options":{"A":"錯。順序視→聽→叩→觸(非視叩觸聽)。","B":"錯。右上腹橄欖狀腫塊是幽門狹窄(非左下腹)。","C":"錯。疼痛部位應最後評估(非最先叩診)。","D":"正確(官方)。聽診腸蠕動,正常約5~30次/分。"},"sources":["Nelson《兒科學》腹部評估","順序"]}},"104100-N4-73":{"quick":"6個月鋇劑灌腸確診腸套疊,護理評估指導中「呈噴射狀嘔吐,嘔吐物不含膽汁」為錯誤(此屬幽門狹窄表徵)。","detail":{"background":"腸套疊(intussusception):『『陣發性『腹痛哭鬧『(雙腿屈向腹)、『『草醬/果醬般『暗紅『血便』、右上腹『香腸狀『腫塊』、嘔吐(可含膽汁)』;『鋇劑灌腸『可『復位(液壓);無法復位則手術』,術後『屈膝側臥』。「『『噴射狀『嘔吐、不含膽汁』』錯誤——『那是『『幽門狹窄『的『表徵;『腸套疊『非噴射狀『不含膽汁』之典型』」。本題「錯誤」者為B。","options":{"A":"正確。腸套疊解果醬般暗紅血便。","B":"錯誤(本題答案)。噴射狀嘔吐不含膽汁是幽門狹窄表徵(非腸套疊)。","C":"正確。鋇劑灌腸無法還原即採外科療法。","D":"正確。外科術後協助維持屈膝側臥姿。"},"sources":["Nelson《兒科學》腸套疊","果醬便"]}},"105030-N4-73":{"quick":"3週幽門狹窄手術前後護理『不適當』的是「術前協助矯正嚴重嘔吐造成的代謝性『酸』中毒」。","detail":{"background":"幽門狹窄(pyloric stenosis):『好發『足月『男嬰(約出生3~6週)』』;『『『噴射狀『嘔吐(餵食後)』、嘔吐物『含『酸性胃內容物『『不含膽汁』』(阻塞在幽門、膽管開口之上)』、『上腹『由『左至右『胃蠕動波』、『右上腹『橄欖狀『腫塊』、體重不增脫水』;『反覆嘔吐『失『胃酸(HCl)』→『代謝性『鹼』中毒(非酸中毒)、低血氯低血鉀』』。處置:『先矯正『脫水/電解質/鹼中毒』→『幽門切開術(pyloromyotomy)』』;術後『約4~8小時後『先給少量葡萄糖水』、漸進餵食、餵後拍背、『右側臥/頭高『利胃排空』』。腹部評估順序:『視→『聽(先聽診,避免觸診叩診影響腸蠕動音)』→叩→觸』;正常腸蠕動約『5~30次/分』。 幽門狹窄手術前後:術前記錄輸出入量/嘔吐性狀/尿比重、術前矯正脫水電解質、術後4~8小時給少量葡萄糖水皆正確。「『術前矯正嘔吐造成的『代謝性『酸』中毒』』不適當——『幽門狹窄『反覆嘔吐失『胃酸』→『代謝性『『鹼』中毒(非酸中毒)』,應矯正『鹼』中毒』」。本題不適當者為B。","options":{"A":"適當。術前記錄輸出入量、嘔吐性狀、尿比重。","B":"不適當(本題答案)。幽門狹窄是代謝性『鹼』中毒(非酸中毒)。","C":"適當。術前矯正脫水及電解質不平衡。","D":"適當。術後4~8小時開始給少量葡萄糖水。"},"sources":["Nelson《兒科學》幽門狹窄","鹼中毒"]}},"106111-N4-76":{"quick":"出生3週、噴射狀嘔吐(不含膽汁)、左至右胃蠕動波、右上腹橄欖狀腫塊,是「幽門狹窄」。","detail":{"background":"幽門狹窄(pyloric stenosis):『好發『足月『男嬰(約出生3~6週)』』;『『『噴射狀『嘔吐(餵食後)』、嘔吐物『含『酸性胃內容物『『不含膽汁』』(阻塞在幽門、膽管開口之上)』、『上腹『由『左至右『胃蠕動波』、『右上腹『橄欖狀『腫塊』、體重不增脫水』;『反覆嘔吐『失『胃酸(HCl)』→『代謝性『鹼』中毒(非酸中毒)、低血氯低血鉀』』。處置:『先矯正『脫水/電解質/鹼中毒』→『幽門切開術(pyloromyotomy)』』;術後『約4~8小時後『先給少量葡萄糖水』、漸進餵食、餵後拍背、『右側臥/頭高『利胃排空』』。腹部評估順序:『視→『聽(先聽診,避免觸診叩診影響腸蠕動音)』→叩→觸』;正常腸蠕動約『5~30次/分』。 本題『出生3週、餵後『噴射狀嘔吐、酸性胃內容物『不含膽汁』、『左至右『胃蠕動波』、『右上腹『橄欖狀『腫塊』』為『幽門狹窄(pyloric stenosis)』典型表徵。本題為「幽門狹窄」(B);巨結腸症(便秘胎便延遲)、膽道閉鎖(黃疸灰白便)、橫膈疝氣(呼吸窘迫)非此。本題為B。","options":{"A":"巨結腸症以便秘/胎便延遲為主。","B":"正確。噴射嘔吐+橄欖狀腫塊+左至右蠕動波=幽門狹窄。","C":"膽道閉鎖以黃疸灰白便為主。","D":"橫膈疝氣以呼吸窘迫為主。"},"sources":["Nelson《兒科學》幽門狹窄","橄欖腫塊"]}},"107030-N4-79":{"quick":"4週幽門切開術護理中「術後餵食,宜採左側平躺方式」為錯誤。","detail":{"background":"幽門狹窄(pyloric stenosis):『好發『足月『男嬰(約出生3~6週)』』;『『『噴射狀『嘔吐(餵食後)』、嘔吐物『含『酸性胃內容物『『不含膽汁』』(阻塞在幽門、膽管開口之上)』、『上腹『由『左至右『胃蠕動波』、『右上腹『橄欖狀『腫塊』、體重不增脫水』;『反覆嘔吐『失『胃酸(HCl)』→『代謝性『鹼』中毒(非酸中毒)、低血氯低血鉀』』。處置:『先矯正『脫水/電解質/鹼中毒』→『幽門切開術(pyloromyotomy)』』;術後『約4~8小時後『先給少量葡萄糖水』、漸進餵食、餵後拍背、『右側臥/頭高『利胃排空』』。腹部評估順序:『視→『聽(先聽診,避免觸診叩診影響腸蠕動音)』→叩→觸』;正常腸蠕動約『5~30次/分』。 幽門切開術:術前監測嘔吐物/輸出入量/尿比重、術前矯正『代謝性鹼中毒』、術後避免餵食過快常拍背皆正確(B「鹼中毒」正確)。「『術後餵食『採『『左『側『平躺』』』錯誤——『術後餵食應『『右『側臥/頭高『(利『胃排空『減逆流嘔吐)』』(非左側平躺)』」。本題「錯誤」者為D。","options":{"A":"正確。術前監測嘔吐物質與量、輸出入量、尿比重。","B":"正確。術前矯正嘔吐造成的代謝性鹼中毒。","C":"正確。術後避免餵食過快、常拍背排氣。","D":"錯誤(本題答案)。術後餵食宜右側臥/頭高(非左側平躺)。"},"sources":["Nelson《兒科學》幽門切開術","右側臥"]}},"110110-N4-74":{"quick":"6週幽門狹窄正確的是「嘔吐多發生在餵食完後」。","detail":{"background":"幽門狹窄(pyloric stenosis):『好發『足月『男嬰(約出生3~6週)』』;『『『噴射狀『嘔吐(餵食後)』、嘔吐物『含『酸性胃內容物『『不含膽汁』』(阻塞在幽門、膽管開口之上)』、『上腹『由『左至右『胃蠕動波』、『右上腹『橄欖狀『腫塊』、體重不增脫水』;『反覆嘔吐『失『胃酸(HCl)』→『代謝性『鹼』中毒(非酸中毒)、低血氯低血鉀』』。處置:『先矯正『脫水/電解質/鹼中毒』→『幽門切開術(pyloromyotomy)』』;術後『約4~8小時後『先給少量葡萄糖水』、漸進餵食、餵後拍背、『右側臥/頭高『利胃排空』』。腹部評估順序:『視→『聽(先聽診,避免觸診叩診影響腸蠕動音)』→叩→觸』;正常腸蠕動約『5~30次/分』。 (1)『嘔吐物『『不含『膽汁(非黃褐色含膽汁)』』』,A錯;(2)「『嘔吐『多發生在『『餵食『完後』』(噴射狀)」——正確;(3)『胃蠕動波『『由『左至右(非右至左)』』』,C錯;(4)『幽門狹窄『大便『正常或量少『(非含血液黏膜;含血黏膜是『腸套疊/腸炎』)』』,D錯。本題為B。","options":{"A":"錯。嘔吐物不含膽汁(非黃褐色)。","B":"正確。嘔吐多發生在餵食完後(噴射狀)。","C":"錯。胃蠕動波由左至右(非右至左)。","D":"錯。幽門狹窄大便正常/量少(非含血黏膜)。"},"sources":["Nelson《兒科學》幽門狹窄","嘔吐"]}},"111110-N4-75":{"quick":"幽門切開術(pyloromyotomy)正確的是「若給予葡萄糖水未出現嘔吐,8小時後可開始漸進式給予餵食」。","detail":{"background":"幽門狹窄(pyloric stenosis):『好發『足月『男嬰(約出生3~6週)』』;『『『噴射狀『嘔吐(餵食後)』、嘔吐物『含『酸性胃內容物『『不含膽汁』』(阻塞在幽門、膽管開口之上)』、『上腹『由『左至右『胃蠕動波』、『右上腹『橄欖狀『腫塊』、體重不增脫水』;『反覆嘔吐『失『胃酸(HCl)』→『代謝性『鹼』中毒(非酸中毒)、低血氯低血鉀』』。處置:『先矯正『脫水/電解質/鹼中毒』→『幽門切開術(pyloromyotomy)』』;術後『約4~8小時後『先給少量葡萄糖水』、漸進餵食、餵後拍背、『右側臥/頭高『利胃排空』』。腹部評估順序:『視→『聽(先聽診,避免觸診叩診影響腸蠕動音)』→叩→觸』;正常腸蠕動約『5~30次/分』。 幽門切開術後:(1)『術後『約4~8小時『先給『少量『葡萄糖水/電解質液『(不需『禁食至『排氣』,幽門切開非腸吻合)』』』,A不精確;(2)「『葡萄糖水『未嘔吐,『約8小時後『開始『漸進式餵食』」——正確;(3)『餵食『抬高頭部、餵後『右側臥/頭高(非左側臥)』』,C錯;(4)『幽門切開『術後『不易『腸阻塞』,『無『需補『脂溶性維生素(那是膽道閉鎖)』』』,D錯。本題為B。","options":{"A":"術後約4~8小時給葡萄糖水,不需禁食至排氣。","B":"正確。葡萄糖水未嘔吐,8小時後漸進式餵食。","C":"錯。餵後右側臥/頭高(非左側臥)。","D":"錯。幽門切開術不需補脂溶性維生素。"},"sources":["Nelson《兒科學》幽門切開術","餵食"]}},"113180-N4-33":{"quick":"壞死性結腸炎(necrotizing enterocolitis, NEC)敘述正確的是「引起的原因是腸黏膜缺血缺氧」。","detail":{"background":"壞死性腸炎(NEC):『好發『早產兒』,『主因『『腸黏膜『『缺血『缺氧(週產期窒息/低灌流)』+腸道未成熟+餵食(配方奶)+細菌』』』;『常侵犯『迴腸末端與近端結腸(非幽門/小腸近端)』、革蘭氏『陰性』菌』;處置『立即『禁食、全靜脈營養、鼻胃管減壓(非餵半奶)、避免肛溫』。本題正確為「腸黏膜缺血缺氧」(C);革蘭氏陽性(A錯,多陰性)、幽門/小腸近端(B錯)、鼻胃管餵半奶(D錯,應禁食)。本題為C。","options":{"A":"錯。NEC多革蘭氏『陰性』菌(非陽性)。","B":"錯。常侵犯迴腸末端/近端結腸(非幽門/小腸近端)。","C":"正確。NEC主因是腸黏膜缺血缺氧。","D":"錯。NEC應立即禁食(非鼻胃管餵半奶)。"},"sources":["Nelson《兒科學》NEC","缺血缺氧"]}},"114100-N4-36":{"quick":"腹部觸診右上腹觸及橄欖樣狀腫塊,可判斷是「幽門狹窄」。","detail":{"background":"幽門狹窄(pyloric stenosis):『好發『足月『男嬰(約出生3~6週)』』;『『『噴射狀『嘔吐(餵食後)』、嘔吐物『含『酸性胃內容物『『不含膽汁』』(阻塞在幽門、膽管開口之上)』、『上腹『由『左至右『胃蠕動波』、『右上腹『橄欖狀『腫塊』、體重不增脫水』;『反覆嘔吐『失『胃酸(HCl)』→『代謝性『鹼』中毒(非酸中毒)、低血氯低血鉀』』。處置:『先矯正『脫水/電解質/鹼中毒』→『幽門切開術(pyloromyotomy)』』;術後『約4~8小時後『先給少量葡萄糖水』、漸進餵食、餵後拍背、『右側臥/頭高『利胃排空』』。腹部評估順序:『視→『聽(先聽診,避免觸診叩診影響腸蠕動音)』→叩→觸』;正常腸蠕動約『5~30次/分』。 『『右『上』腹『觸及『『橄欖樣『腫塊』』是『『幽門狹窄(肥厚幽門肌)』』的典型體徵』。本題為「幽門狹窄」(B);糞便填塞(可觸及但非橄欖狀)、腸套疊(右上腹『香腸狀』腫塊)、巨結腸症(腹脹便秘)非橄欖狀腫塊。本題為B。","options":{"A":"糞便填塞非橄欖狀腫塊。","B":"正確。右上腹橄欖狀腫塊=幽門狹窄。","C":"腸套疊是『香腸狀』腫塊(非橄欖狀)。","D":"巨結腸症以腹脹便秘為主。"},"sources":["Nelson《兒科學》幽門狹窄","橄欖腫塊"]}},"101110-N4-34":{"quick":"2個月先天性巨結腸症手術前後醫護處置正確的是「若更換造瘻口袋而造成持續出血,需立即就醫」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 (1)『腸道準備『用『『生理食鹽水『(非『肥皂水』,刺激黏膜/水中毒)』』』,A錯;(2)『兩階段手術『間隔『依個別狀況(非固定1個月)』』,B不精確;(3)「『更換造瘻口袋『造成『『持續出血『需『立即就醫』(異常)」——正確;(4)『造瘻口術後『『『低』渣『(非高渣)『飲食』』』,D錯。本題為C。","options":{"A":"錯。腸道準備用生理食鹽水(非肥皂水)。","B":"兩階段間隔依狀況,非固定1個月。","C":"正確。更換造瘻口袋造成持續出血需立即就醫。","D":"錯。造瘻口術後採『低』渣飲食(非高渣)。"},"sources":["Nelson《兒科學》巨結腸症","造瘻"]}},"102030-N4-74":{"quick":"8歲人工肛門造瘻口護理指導『不適當』的是「可利用圖片說明造瘻口呈白色表示功能良好」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 人工肛門造瘻口護理:遊戲娃娃示範更換、術後3週內低渣飲食、穿寬鬆不需腰帶衣服皆適當。「『造瘻口『呈『『白色『表示『功能良好』』』不適當——『『正常『造瘻口『呈『『紅色『濕潤(血循良好)』』;『『白/黑/深色『=『『血循『不良(異常)』』」。本題不適當者為D。","options":{"A":"適當。用遊戲/娃娃模型示範更換造瘻口袋與清潔。","B":"適當。術後3週內採低渣飲食減腸蠕動。","C":"適當。穿寬鬆、不需腰帶的衣服。","D":"不適當(本題答案)。正常造瘻口呈紅色(白色=血循不良異常)。"},"sources":["Nelson《兒科學》造瘻口","紅色"]}},"102110-N4-74":{"quick":"慢性輕微巨結腸症保守療法飲食指導正確的是「低渣、高熱量、高蛋白飲食」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 巨結腸症『保守療法/造瘻後『飲食』:『『『低渣『(減糞量與腸蠕動負擔)、『高熱量、高蛋白『(營養與修復)』』。本題正確為「低渣、高熱量、高蛋白」(B);高渣(增糞量,不宜)、低熱量(營養不足)、低蛋白(修復不足)皆不符。本題為B。","options":{"A":"高渣增糞量,不宜。","B":"正確。低渣、高熱量、高蛋白飲食。","C":"低熱量營養不足,不宜。","D":"低蛋白修復不足,不宜。"},"sources":["Nelson《兒科學》巨結腸症","低渣"]}},"103100-N4-77":{"quick":"兒童巨結腸症(Megacolon)敘述正確的是「引起原因為某一段腸壁缺乏副交感神經節」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 (1)「『某段『腸壁『缺乏『副交感『神經節『細胞』→無蠕動』」——正確;(2)『好發『直腸『乙狀結腸『『遠端(非降結腸後段)』』』,B不精確;(3)『『果醬『大便『是『腸套疊(非巨結腸症,後者『便秘/帶狀糞便』)』』,C錯;(4)『多『『暫時性『造瘻『(非『永久』性結腸造瘻)』,『最終『切除吻合』』』,D錯。本題為A。","options":{"A":"正確。某段腸壁缺乏副交感神經節細胞。","B":"好發直腸乙狀結腸遠端,「降結腸後段」不精確。","C":"錯。果醬便是腸套疊(非巨結腸症)。","D":"錯。多暫時性造瘻(非永久性結腸造瘻)。"},"sources":["Nelson《兒科學》巨結腸症","神經節"]}},"106030-N4-73":{"quick":"9歲腸道手術前清潔灌腸(cleansing enema)技術正確的是「請兒童張口深呼吸,潤滑14Fr.肛管後,推入兒童肛門內7.5公分」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 清潔灌腸:(1)『用『『生理食鹽水『(非『蒸餾水『600mL,蒸餾水致『水中毒』)』』』,A錯;(2)『採『『左『側臥『右膝屈曲『(非平躺右側臥)』』』,B錯;(3)『灌腸筒『液面距肛門『約『『45~60cm『(本題C作45~60『對』,但其他細節)』』』,C接近但其他;(4)「『『張口『深呼吸『(放鬆肛門括約肌)、『潤滑『肛管『推入『約『7.5cm』(學齡兒)」——正確。本題為D。","options":{"A":"錯。用生理食鹽水(非蒸餾水,致水中毒)。","B":"錯。採左側臥右膝屈曲(非平躺右側臥)。","C":"灌腸筒液面距肛門約45~60cm(此項接近,但本題答D)。","D":"正確。張口深呼吸、潤滑肛管推入約7.5cm。"},"sources":["Nelson《兒科學》灌腸","技術"]}},"106030-N4-74":{"quick":"1歲半克隆氏症人工結腸造瘻口居家護理『錯誤』的是「造瘻口黏膜需比周圍皮膚低,以保護周圍皮膚」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 造瘻口護理:術後暫時性腫脹3~6週漸縮、『正常呈『紅色(黑/深色=血循不良)』、保護膜剪『比造瘻口『大約0.5cm』皆正確。「『造瘻口『黏膜『需『比周圍皮膚『『低』』錯誤——『造瘻口黏膜應『『略『高於『周圍皮膚『(突出『使糞便『直接『排入『袋中『不刺激『周圍皮膚)』(非比皮膚低)』」。本題「錯誤」者為D。","options":{"A":"正確。術後暫時性腫脹約3~6週漸縮。","B":"正確。正常呈紅色,黑/深色表血循不良。","C":"正確。保護膜剪比造瘻口大約0.5cm。","D":"錯誤(本題答案)。造瘻口黏膜應略『高於』周圍皮膚(非低)。"},"sources":["Nelson《兒科學》造瘻口","突出"]}},"109030-N4-79":{"quick":"先天性巨結腸症臨床表徵中「嘔吐物不含膽汁」為錯誤。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 巨結腸症表徵:『新生兒『胎便『延遲『排出』、嬰幼兒『慢性便秘』、生長遲滯』皆正確。「『『嘔吐物『『不含『膽汁』』錯誤——『巨結腸症『阻塞『在『遠端『結腸『(膽管開口『之下』)』,『嘔吐物『『可『含『膽汁(綠色)』』(『不含膽汁『是『幽門狹窄』)』」。本題「錯誤」者為B。","options":{"A":"正確。新生兒胎便延遲排出(>24~48小時)。","B":"錯誤(本題答案)。巨結腸症嘔吐物『可含膽汁』(不含膽汁是幽門狹窄)。","C":"正確。嬰幼兒慢性便秘。","D":"正確。嬰幼兒生長遲滯。"},"sources":["Nelson《兒科學》巨結腸症","膽汁"]}},"110030-N4-75":{"quick":"腸套疊鋇劑灌腸治療後正確的是「解出正常的褐色糞便,表示腸套疊可能復原」。","detail":{"background":"腸套疊(intussusception)鋇劑/空氣灌腸復位後:『『解出『『正常『褐色『糞便『(或排出『鋇劑/果醬便後『轉『正常便)』表示『『復位『成功』』;『腸套疊『『可『再『復發(非不需擔心)』、『灌腸『可『復位『(非『必須『外科手術』)』』。本題正確為「解出正常褐色糞便表示可能復原」(D);可完全復原不復發(A錯,會復發)、必須外科手術(B錯)、初次灰白便異常(C錯)。本題為D。","options":{"A":"錯。腸套疊復位後仍可能復發。","B":"錯。灌腸可復位(非必須外科手術)。","C":"解出正常便才是復原(非灰白便異常)。","D":"正確。解出正常褐色糞便表示腸套疊可能復原。"},"sources":["Nelson《兒科學》腸套疊","復位"]}},"112110-N4-75":{"quick":"腸套疊(Intussusception)治療護理正確的是「鋇劑灌腸是以液體和空氣壓力將嵌入腸子推回原位」。","detail":{"background":"腸套疊治療:(1)『『不可『趴睡『壓迫『自動『復位(無效且危險)』』,A錯;(2)『外科『手術『『不可『拉扯『(以『輕『擠『或『切除『壞死段』)』』,B錯;(3)「『『鋇劑(或空氣)『灌腸『以『『液壓/氣壓『將『嵌入『腸子『推回『原位』(非手術復位)」——正確;(4)『復位後『須『觀察『有無『復發『(非『立即『出院)』』,D錯。本題為C。","options":{"A":"錯。不可趴睡壓迫自動復位。","B":"錯。外科不可拉扯復位(以輕擠或切除壞死段)。","C":"正確。鋇劑灌腸以液壓/氣壓將腸子推回原位。","D":"錯。復位後須觀察復發(非立即出院)。"},"sources":["Nelson《兒科學》腸套疊","灌腸復位"]}},"113030-N4-46":{"quick":"先天性巨結腸症照護手術護理指導正確的是「保守療法應採低渣、高熱量、高蛋白飲食」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 (1)「『保守療法『『低渣、高熱量、高蛋白『飲食』」——正確;(2)『手術前『腸道準備『用『『生理食鹽水『(非『肥皂水』)』』,B錯;(3)『術後『造瘻口『『暫時性『腫脹『是『『正常『(非『立即『通報『異常)』』』,C錯;(4)『造瘻口『黏膜『『略『高於『周圍皮膚『(非『比『皮膚『低)』』,D錯。本題為A。","options":{"A":"正確。保守療法採低渣、高熱量、高蛋白飲食。","B":"錯。手術前腸道準備用生理食鹽水(非肥皂水)。","C":"錯。術後造瘻口暫時性腫脹是正常(非立即通報)。","D":"錯。造瘻口黏膜略高於周圍皮膚(非比皮膚低)。"},"sources":["Nelson《兒科學》巨結腸症","低渣"]}},"113100-N4-46":{"quick":"5歲巨結腸症腸道無神經節部位切除術後護理『錯誤』的是「提供高纖飲食以促進早期排便」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 巨結腸症術後:定時評估疼痛給止痛、定時翻身防肺炎、觀察『肛門狹窄/糞便失禁』合併症皆正確。「『提供『『高纖『飲食『促『早期『排便』』錯誤——『術後『腸吻合『需『『癒合『,『初期『應『『低渣『飲食『(減糞量與蠕動,利吻合處癒合)』,『非『高纖『促排便』』」。本題「錯誤」者為D。","options":{"A":"正確。定時評估疼痛、必要時依醫囑給止痛劑。","B":"正確。定時翻身預防肺炎或肺擴張不全。","C":"正確。術後觀察肛門狹窄及糞便失禁合併症。","D":"錯誤(本題答案)。術後初期應低渣飲食(非高纖,利吻合癒合)。"},"sources":["Nelson《兒科學》巨結腸症術後","低渣"]}},"113180-N4-47":{"quick":"人工肛門造瘻口術後護理指導較適當的是「術後三週內採低渣飲食,減少腸蠕動」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 (1)『造瘻口『流出『大量『『水樣『引流『是『『異常(脫水風險;非功能正常)』』』,A錯;(2)「『術後『三週內『『低渣『飲食『減『腸蠕動(利癒合)』」——正確;(3)『正常造瘻口『呈『『紅色『濕潤『(非『深黑『乾燥)』』,C錯;(4)『『乙狀『結腸『造口『糞便『多『成『『形(固體;非液狀)』』(『迴腸『造口『才『液狀)』』,D錯。本題為B。","options":{"A":"錯。大量水樣引流是異常(脫水風險)。","B":"正確。術後三週內採低渣飲食減少腸蠕動。","C":"錯。正常造瘻口呈紅色濕潤(非深黑乾燥)。","D":"錯。乙狀結腸造口糞便多成形(非液狀)。"},"sources":["Nelson《兒科學》造瘻口","低渣"]}},"114030-N4-47":{"quick":"8歲嚴重便秘大量灌腸護理指導『最不適當』的是「大量灌腸溶液的溫度,以30~36°C左右較合適」。","detail":{"background":"先天性巨結腸症(Hirschsprung/congenital megacolon):『某段『腸壁『缺乏『副交感『神經節細胞』』→『該段『無蠕動『近端『糞便堆積『巨大結腸』』』;『好發『直腸『乙狀結腸『遠端』;表現『新生兒『胎便『延遲『排出(>24~48小時)』、腹脹、嘔吐(可含膽汁)、慢性便秘、生長遲滯』』;『常『兩階段『手術『(先『造瘻『減壓→『無神經節段『切除『吻合)』』』,『保守療法/造瘻後『低渣、高熱量、高蛋白『飲食』』。人工肛門造瘻口護理:『『正常造瘻口『呈『紅色『濕潤(『黑色/深色『=『血循不良『扭轉脫出』)』』、『造瘻口『黏膜『應『略『高於『周圍皮膚『(防糞便刺激皮膚)』』、『保護膜剪『比造瘻口『大約0.5cm』』、術後『低渣飲食』、暫時性腫脹3~6週漸縮』。清潔/大量灌腸:『『左側臥『右膝屈曲』、灌腸筒『液面距肛門『約45~60cm』、肛管潤滑插入『約7.5cm』、『溶液溫度『約『40~43°C(略高於體溫;過冷致痙攣)』』;『出現『臉色蒼白/冷汗/心跳加快『應『停止『通知醫師』』。巨結腸症『禁『『肥皂水『灌腸(刺激腸黏膜/水中毒),用『生理食鹽水』』。 大量灌腸:遊戲娃娃示範、出現臉色蒼白冷汗心跳加快應停止通知醫師、採左側臥右膝屈曲皆適當。「『灌腸『溶液『溫度『30~36°C』」最不適當——『灌腸溶液溫度應『約『『40~43°C(略高於體溫)』』;『『30~36°C『過『低『(『過冷『刺激『腸『痙攣『不適)』』」。本題最不適當者為A。","options":{"A":"最不適當(本題答案)。灌腸溶液溫度應約40~43°C(30~36°C過低致痙攣)。","B":"適當。用遊戲/故事/娃娃模型示範灌腸目的步驟。","C":"適當。出現臉色蒼白冷汗心跳加快應停止通知醫師。","D":"適當。採左側臥、右膝屈曲姿勢。"},"sources":["Nelson《兒科學》灌腸","溫度"]}},"115030-N4-45":{"quick":"腸套疊(intussusception)敘述正確的是「右上腹可觸及香腸狀的腫塊」。","detail":{"background":"腸套疊:(1)「『『右『上』腹『可觸及『『香腸狀『腫塊』」——正確;(2)『最常見『『迴盲『型(迴腸『嵌入『盲腸/結腸)『(非『乙狀結腸『崁入『直腸)』』,B錯;(3)『臨床『陣發性『腹痛、嘔吐、『『果醬『血便(非脂肪便)』』,C錯;(4)『出現『腹膜炎/腸穿孔『須『『外科『手術『(『禁『鋇劑『灌腸『,會『穿孔『惡化)』』,D錯。本題為A。","options":{"A":"正確。右上腹可觸及香腸狀腫塊。","B":"錯。最常見迴盲型(非乙狀結腸嵌入直腸)。","C":"錯。臨床為果醬血便(非脂肪便)。","D":"錯。腹膜炎/穿孔須外科手術(禁鋇劑灌腸)。"},"sources":["Nelson《兒科學》腸套疊","香腸腫塊"]}},"101110-N4-8":{"quick":"4歲疝氣手術護理『較不適當』的是「使用10公分數字量表評估疼痛程度」。","detail":{"background":"疝氣(hernia):『臍疝氣『多『隨年齡『自癒(非更嚴重)』;『腹股溝疝氣『若『『紅、硬、疼痛『=『嵌頓(箝閉)『須『及早『手術』、做『疝氣囊『高位『結紮』;男女比約『4~10:1(男多)』』。闌尾炎(appendicitis):『轉移性右下腹痛、發燒、噁心嘔吐、『反彈痛、『板狀腹『=腹膜炎』;『『禁『熱敷/瀉劑/止痛(遮蔽症狀/穿孔)』』;術後『半坐臥利引流、評估傷口紅腫熱痛、鼓勵早期下床』。學齡前疝氣手術『焦慮『減輕:『以『遊戲/娃娃/醫療物品『角色扮演、避免『「切除/切開」『字眼、臉譜量表評疼痛』。 4歲(學齡前)疝氣手術:注射後膠布覆蓋(轉移注意減恐懼)、避免「切除/切開」字眼、遊戲表達疼痛皆適當。「『用『『10公分『『數字『量表『評『疼痛』』較不適當——『『數字量表『需『『抽象『數字概念『,『『4歲(運思前期)『理解『有限』,『應用『『臉譜『量表(FACES)』』』。本題較不適當者為C。","options":{"A":"適當。注射後膠布覆蓋(轉移注意減恐懼)。","B":"適當。避免「切除/切開」字眼。","C":"較不適當(本題答案)。4歲應用臉譜量表(數字量表太抽象)。","D":"適當。運用遊戲方式讓其表達疼痛。"},"sources":["Nelson《兒科學》疝氣","疼痛評估"]}},"101110-N4-35":{"quick":"疝氣敘述正確的是「腹股溝疝氣若局部出現紅、硬且疼痛時,必須及早手術」。","detail":{"background":"疝氣(hernia):『臍疝氣『多『隨年齡『自癒(非更嚴重)』;『腹股溝疝氣『若『『紅、硬、疼痛『=『嵌頓(箝閉)『須『及早『手術』、做『疝氣囊『高位『結紮』;男女比約『4~10:1(男多)』』。闌尾炎(appendicitis):『轉移性右下腹痛、發燒、噁心嘔吐、『反彈痛、『板狀腹『=腹膜炎』;『『禁『熱敷/瀉劑/止痛(遮蔽症狀/穿孔)』』;術後『半坐臥利引流、評估傷口紅腫熱痛、鼓勵早期下床』。學齡前疝氣手術『焦慮『減輕:『以『遊戲/娃娃/醫療物品『角色扮演、避免『「切除/切開」『字眼、臉譜量表評疼痛』。 (1)『臍疝氣『多『『隨年齡『自癒『(非『更趨『嚴重)』』』,A錯;(2)「『腹股溝疝氣『『紅、硬、疼痛『=『嵌頓『須『『及早『手術』」——正確;(3)『橫膈疝氣『是『先天『缺損『須『手術『修補『(非『只『高位『結紮)』』,C錯;(4)『腹股溝疝氣『『男『多『於『女(約4~10:1;非1:5女多)』』,D錯。本題為B。","options":{"A":"錯。臍疝氣多隨年齡自癒(非更嚴重)。","B":"正確。腹股溝疝氣紅硬疼痛(嵌頓)須及早手術。","C":"錯。橫膈疝氣須手術修補(非只高位結紮)。","D":"錯。腹股溝疝氣男多於女(非1:5)。"},"sources":["Nelson《兒科學》疝氣","嵌頓"]}},"104030-N4-73":{"quick":"9歲疑闌尾炎護理措施正確的是「協助採屈膝臥躺姿勢,以增加其舒適感」。","detail":{"background":"疝氣(hernia):『臍疝氣『多『隨年齡『自癒(非更嚴重)』;『腹股溝疝氣『若『『紅、硬、疼痛『=『嵌頓(箝閉)『須『及早『手術』、做『疝氣囊『高位『結紮』;男女比約『4~10:1(男多)』』。闌尾炎(appendicitis):『轉移性右下腹痛、發燒、噁心嘔吐、『反彈痛、『板狀腹『=腹膜炎』;『『禁『熱敷/瀉劑/止痛(遮蔽症狀/穿孔)』』;術後『半坐臥利引流、評估傷口紅腫熱痛、鼓勵早期下床』。學齡前疝氣手術『焦慮『減輕:『以『遊戲/娃娃/醫療物品『角色扮演、避免『「切除/切開」『字眼、臉譜量表評疼痛』。 闌尾炎護理:(1)『腹部評估『順序『視→『『聽『(先聽診)→叩→觸』』(非視叩觸聽)』,A錯;(2)『闌尾炎『評估『『反彈痛/麥氏點『壓痛』(非『巴賓斯基『徵象,那是『神經』反射)』』,B錯;(3)「『採『『屈膝『臥躺『(減腹壁張力『減痛、增舒適)」——正確;(4)『闌尾炎『『禁『『熱敷『(『加速『發炎『穿孔)』』』,D錯。本題為C。","options":{"A":"錯。腹部評估順序視→聽→叩→觸。","B":"錯。闌尾炎評估反彈痛/麥氏點(巴賓斯基是神經反射)。","C":"正確。採屈膝臥躺減腹壁張力、增舒適。","D":"錯。闌尾炎禁熱敷(加速穿孔)。"},"sources":["Nelson《兒科學》闌尾炎","屈膝"]}},"107030-N4-61":{"quick":"5歲疝氣手術減輕焦慮最適宜的是「拿繃帶、紗布、安全剪刀、膠布與洋娃娃,引導小玲了解治療過程」。","detail":{"background":"疝氣(hernia):『臍疝氣『多『隨年齡『自癒(非更嚴重)』;『腹股溝疝氣『若『『紅、硬、疼痛『=『嵌頓(箝閉)『須『及早『手術』、做『疝氣囊『高位『結紮』;男女比約『4~10:1(男多)』』。闌尾炎(appendicitis):『轉移性右下腹痛、發燒、噁心嘔吐、『反彈痛、『板狀腹『=腹膜炎』;『『禁『熱敷/瀉劑/止痛(遮蔽症狀/穿孔)』』;術後『半坐臥利引流、評估傷口紅腫熱痛、鼓勵早期下床』。學齡前疝氣手術『焦慮『減輕:『以『遊戲/娃娃/醫療物品『角色扮演、避免『「切除/切開」『字眼、臉譜量表評疼痛』。 學齡前(5歲)術前減焦慮:『以『『醫療『物品(繃帶紗布剪刀膠布)+『娃娃『角色扮演『讓其『具體『了解『治療『過程、表達感受』』。本題最適宜為「醫療物品+洋娃娃引導了解過程」(C);說別人勇敢經過(A,比較不適切)、說明切開目的(B,「切開」字眼增恐懼)、母親避免討論寸步不離(D,過度保護)。本題為C。","options":{"A":"說別人勇敢經過非最適切。","B":"「切開」字眼會增5歲恐懼。","C":"正確。用醫療物品+娃娃角色扮演具體了解過程。","D":"母親避免討論寸步不離是過度保護。"},"sources":["Nelson《兒科學》學齡前","遊戲"]}},"109110-N4-76":{"quick":"11歲闌尾炎盲腸切除術後護理正確的是「定時監測傷口有無紅、腫、熱、痛等發炎現象」。","detail":{"background":"疝氣(hernia):『臍疝氣『多『隨年齡『自癒(非更嚴重)』;『腹股溝疝氣『若『『紅、硬、疼痛『=『嵌頓(箝閉)『須『及早『手術』、做『疝氣囊『高位『結紮』;男女比約『4~10:1(男多)』』。闌尾炎(appendicitis):『轉移性右下腹痛、發燒、噁心嘔吐、『反彈痛、『板狀腹『=腹膜炎』;『『禁『熱敷/瀉劑/止痛(遮蔽症狀/穿孔)』』;術後『半坐臥利引流、評估傷口紅腫熱痛、鼓勵早期下床』。學齡前疝氣手術『焦慮『減輕:『以『遊戲/娃娃/醫療物品『角色扮演、避免『「切除/切開」『字眼、臉譜量表評疼痛』。 闌尾切除術後:(1)『疼痛『『依醫囑『給『止痛(非『少用『止痛劑)、『『禁『腹部『熱敷(致出血/感染)』』,A錯;(2)「『定時『監測『傷口『紅腫熱痛『發炎『現象』」——正確;(3)『鼓勵『『早期『下床『活動『(防腸沾黏/血栓;非『臥床『減少『下床)』』,C錯;(4)『有『引流『管『採『『半坐臥『(利引流;非平躺)』』,D錯。本題為B。","options":{"A":"錯。應依醫囑給止痛、禁腹部熱敷。","B":"正確。定時監測傷口紅腫熱痛等發炎現象。","C":"錯。鼓勵早期下床活動(非臥床)。","D":"錯。有引流管採半坐臥(非平躺)。"},"sources":["Nelson《兒科學》闌尾切除","術後"]}},"111110-N4-50":{"quick":"4歲半疝氣手術護理『較不適當』的是「注射後用膠布覆蓋注射部位,其目的是要轉移注意力,減輕疼痛」。","detail":{"background":"疝氣(hernia):『臍疝氣『多『隨年齡『自癒(非更嚴重)』;『腹股溝疝氣『若『『紅、硬、疼痛『=『嵌頓(箝閉)『須『及早『手術』、做『疝氣囊『高位『結紮』;男女比約『4~10:1(男多)』』。闌尾炎(appendicitis):『轉移性右下腹痛、發燒、噁心嘔吐、『反彈痛、『板狀腹『=腹膜炎』;『『禁『熱敷/瀉劑/止痛(遮蔽症狀/穿孔)』』;術後『半坐臥利引流、評估傷口紅腫熱痛、鼓勵早期下床』。學齡前疝氣手術『焦慮『減輕:『以『遊戲/娃娃/醫療物品『角色扮演、避免『「切除/切開」『字眼、臉譜量表評疼痛』。 4歲半疝氣手術:臉譜量表評疼痛、避免「切除/切開」字眼、遊戲角色扮演表達疼痛皆適當。「『注射後『膠布『覆蓋『目的『『轉移『注意力『減痛』」較不適當——『『學齡前『注射後『貼『膠布『的『『主要『目的『是『『減輕『『身體『完整性『受損『的『恐懼『(怕『身體『破洞/血流光)』』,『非『轉移『注意『減痛』」。本題較不適當者為C。","options":{"A":"適當。用臉譜量表評估術前術後疼痛。","B":"適當。避免「切除/切開」字眼。","C":"較不適當(本題答案)。貼膠布主要減身體完整性受損恐懼(非轉移注意減痛)。","D":"適當。運用角色扮演表達疼痛感受。"},"sources":["Nelson《兒科學》學齡前","膠布"]}},"102030-N4-72":{"quick":"9個月嘔吐脫水、血Na+147 mEq/L,脫水類型是「高張性脫水」。","detail":{"background":"兒童脫水程度(以體重流失%):『輕度『<5%(嬰兒)』、中度『5~10%』、重度『>10%(嬰兒,兒童>9%)』』。徵象:『輕『口渴尿稍少;中『囟門凹陷、皮膚黏膜乾、眼眶凹、尿少、脈搏增快、皮膚飽滿度差;重『哭無淚、無尿、嗜睡、脈搏快弱、血壓降、休克』。脫水『張力『型』:依血鈉『低張(<130)、等張(130~150)、高張(>150)』。治療:『輕中度『『口服『葡萄糖『電解質液(ORS)』為主、繼續『哺『母乳/餵食』;重度『靜脈輸液』』;『腹瀉『可『改『無乳糖配方(暫時乳糖不耐)』、『勿『泡『濃『奶(增滲透壓加重腹瀉)』』。腸胃炎病原:『輪狀病毒(rotavirus)『好發『嬰幼兒『秋冬』、『有『口服『疫苗(2~3劑)』、『糞口『傳染、產『腸毒素『水瀉、可併『上呼吸道』、糞便『漂白水消毒』;『諾羅病毒『各『年齡『、無疫苗、『酒精『乾洗手『無效『(須『肥皂『洗手/含氯)』、急性期『禁食補液』;『沙門氏菌『『血絲/黏液『便』』。腹瀉臀部護理:『中性肥皂清水洗『擦乾』、暴露空氣自然乾、塗凡士林/氧化鋅『隔離糞便;『『避免『烤燈『(燙傷風險)』。 『血鈉『『>150為『高張、130~150『等張、<130『低張』』。本題『Na+『147 mEq/L『接近『正常上限『,『官方歸『『高張性『脫水『(失水『多『於『失鈉,血鈉『偏高)』』。本題為「高張性脫水」(C)。(註:147介於等張上界,本題依官方判高張。)","options":{"A":"低張性脫水血鈉<130。","B":"等張性脫水血鈉130~150。","C":"正確(官方)。血鈉偏高=高張性脫水。","D":"「輕度」是程度非張力型分類。"},"sources":["Nelson《兒科學》脫水","高張"]}},"103100-N4-75":{"quick":"2歲腹瀉血絲便糞便培養(stool culture)的目的是「確認腸道感染致病菌原」。","detail":{"background":"『糞便『培養(stool culture)』:『『培養『確認『『腸道『感染的『『致病『『細菌『(如沙門氏菌、志賀氏菌、大腸桿菌等)』』』。本題目的為「確認腸道感染致病菌原」(B);寄生蟲(糞便鏡檢/蟲卵)、病毒(抗原/PCR)、碳水化合物吸收(還原醣)非糞便『培養』的目的。本題為B。","options":{"A":"寄生蟲用糞便鏡檢/蟲卵(非培養)。","B":"正確。糞便培養確認腸道感染致病菌。","C":"病毒用抗原/PCR(非培養)。","D":"碳水化合物吸收用還原醣測定。"},"sources":["Nelson《兒科學》糞便培養","細菌"]}},"104030-N4-72":{"quick":"3個月持續腹瀉維持臀部會陰皮膚完整性,應『避免』的措施是「每4小時使用烤燈0.5~1小時,烤燈需距離臀部30公分」。","detail":{"background":"兒童脫水程度(以體重流失%):『輕度『<5%(嬰兒)』、中度『5~10%』、重度『>10%(嬰兒,兒童>9%)』』。徵象:『輕『口渴尿稍少;中『囟門凹陷、皮膚黏膜乾、眼眶凹、尿少、脈搏增快、皮膚飽滿度差;重『哭無淚、無尿、嗜睡、脈搏快弱、血壓降、休克』。脫水『張力『型』:依血鈉『低張(<130)、等張(130~150)、高張(>150)』。治療:『輕中度『『口服『葡萄糖『電解質液(ORS)』為主、繼續『哺『母乳/餵食』;重度『靜脈輸液』』;『腹瀉『可『改『無乳糖配方(暫時乳糖不耐)』、『勿『泡『濃『奶(增滲透壓加重腹瀉)』』。腸胃炎病原:『輪狀病毒(rotavirus)『好發『嬰幼兒『秋冬』、『有『口服『疫苗(2~3劑)』、『糞口『傳染、產『腸毒素『水瀉、可併『上呼吸道』、糞便『漂白水消毒』;『諾羅病毒『各『年齡『、無疫苗、『酒精『乾洗手『無效『(須『肥皂『洗手/含氯)』、急性期『禁食補液』;『沙門氏菌『『血絲/黏液『便』』。腹瀉臀部護理:『中性肥皂清水洗『擦乾』、暴露空氣自然乾、塗凡士林/氧化鋅『隔離糞便;『『避免『烤燈『(燙傷風險)』。 腹瀉臀部護理:中性肥皂清水洗後紙巾吸乾、暴露空氣自然乾、塗凡士林/羊毛脂隔離糞便皆適當。「『使用『『烤燈『(0.5~1小時)』」應『避免』——『『嬰兒『皮膚『嬌嫩,『『烤燈『有『『燙傷『風險『,『現多『『不『建議『使用『烤燈』」。本題應避免者為D。","options":{"A":"適當。中性肥皂清水洗後紙巾吸乾。","B":"適當。暴露空氣自然乾燥。","C":"適當。塗凡士林/羊毛脂隔離糞便刺激。","D":"本題答案(應避免)。烤燈有燙傷風險,不建議使用。"},"sources":["Nelson《兒科學》臀部護理","烤燈"]}},"106030-N4-75":{"quick":"沙門氏菌(Salmonella)感染兒童急性腸胃炎大便型態正確的是「含有血絲」。","detail":{"background":"兒童脫水程度(以體重流失%):『輕度『<5%(嬰兒)』、中度『5~10%』、重度『>10%(嬰兒,兒童>9%)』』。徵象:『輕『口渴尿稍少;中『囟門凹陷、皮膚黏膜乾、眼眶凹、尿少、脈搏增快、皮膚飽滿度差;重『哭無淚、無尿、嗜睡、脈搏快弱、血壓降、休克』。脫水『張力『型』:依血鈉『低張(<130)、等張(13 0)、高張(>150)』。治療:『輕中度『『口服『葡萄糖『電解質液(ORS)』為主、繼續『哺『母乳/餵食』;重度『靜脈輸液』』;『腹瀉『可『改『無乳糖配方(暫時乳糖不耐)』、『勿『泡『濃『奶(增滲透壓加重腹瀉)』』。腸胃炎病原:『輪狀病毒(rotavirus)『好發『嬰幼兒『秋冬』、『有『口服『疫苗(2~3劑)』、『糞口『傳染、產『腸毒素『水瀉、可併『上呼吸道』、糞便『漂白水消毒』;『諾羅病毒『各『年齡『、無疫苗、『酒精『乾洗手『無效『(須『肥皂『洗手/含氯)』、急性期『禁食補液』;『沙門氏菌『『血絲/黏液『便』』。腹瀉臀部護理:『中性肥皂清水洗『擦乾』、暴露空氣自然乾、塗凡士林/氧化鋅『隔離糞便;『『避免『烤燈『(燙傷風險)』。 『重度『脫水『徵象:『『哭『『無『眼淚』、『『無尿、囟門『深凹、眼眶凹、皮膚飽滿度極差、『脈搏『『快『而『弱(非下降)』、『嗜睡、休克』』。本題重度脫水徵象為「哭沒有眼淚」(B);頻尿(A錯,應少/無尿)、體重減輕<5%(C錯,重度>10%)、脈搏下降(D錯,應快)。本題為B。","options":{"A":"錯。重度脫水應少/無尿(非頻尿)。","B":"正確。哭沒有眼淚是重度脫水徵象。","C":"錯。體重減輕<5%是輕度(重度>10%)。","D":"錯。重度脫水脈搏快而弱(非下降)。"},"sources":["Nelson《兒科學》重度脫水","無淚"]}},"112110-N4-76":{"quick":"5個月持續腹瀉護理指導『較不適當』的是「需泡兩倍濃度的全奶,防止營養不良」。","detail":{"background":"兒童脫水程度(以體重流失%):『輕度『<5%(嬰兒)』、中度『5~10%』、重度『>10%(嬰兒,兒童>9%)』』。徵象:『輕『口渴尿稍少;中『囟門凹陷、皮膚黏膜乾、眼眶凹、尿少、脈搏增快、皮膚飽滿度差;重『哭無淚、無尿、嗜睡、脈搏快弱、血壓降、休克』。脫水『張力『型』:依血鈉『低張(<130)、等張(130~150)、高張(>150)』。治療:『輕中度『『口服『葡萄糖『電解質液(ORS)』為主、繼續『哺『母乳/餵食』;重度『靜脈輸液』』;『腹瀉『可『改『無乳糖配方(暫時乳糖不耐)』、『勿『泡『濃『奶(增滲透壓加重腹瀉)』』。腸胃炎病原:『輪狀病毒(rotavirus)『好發『嬰幼兒『秋冬』、『有『口服『疫苗(2~3劑)』、『糞口『傳染、產『腸毒素『水瀉、可併『上呼吸道』、糞便『漂白水消毒』;『諾羅病毒『各『年齡『、無疫苗、『酒精『乾洗手『無效『(須『肥皂『洗手/含氯)』、急性期『禁食補液』;『沙門氏菌『『血絲/黏液『便』』。腹瀉臀部護理:『中性肥皂清水洗『擦乾』、暴露空氣自然乾、塗凡士林/氧化鋅『隔離糞便;『『避免『烤燈『(燙傷風險)』。 腹瀉護理:中性肥皂清水洗臀部擦乾、可改『無乳糖配方奶(暫時乳糖不耐)』、輕中度給電解質口服液皆適當。「『泡『『兩倍『濃度『的『全奶』」較不適當——『『泡『濃『奶『會『『增『滲透壓『『加重『腹瀉『與『脫水』,『應『正常『濃度『或『稀釋』」。本題較不適當者為B。","options":{"A":"適當。中性肥皂清水清洗臀部並擦乾。","B":"較不適當(本題答案)。泡兩倍濃奶增滲透壓加重腹瀉。","C":"適當。可改無乳糖配方奶(暫時乳糖不耐)。","D":"適當。輕中度腹瀉給電解質口服液。"},"sources":["Nelson《兒科學》腹瀉","奶濃度"]}},"112180-N4-46":{"quick":"輪狀病毒與諾羅病毒比較『錯誤』的是「輪狀病毒會產生腸毒素,諾羅病毒機轉尚不清楚」(本題C為錯誤項;依官方需核對)——本題答C。","detail":{"background":"兒童脫水程度(以體重流失%):『輕度『<5%(嬰兒)』、中度『5~10%』、重度『>10%(嬰兒,兒童>9%)』』。徵象:『輕『口渴尿稍少;中『囟門凹陷、皮膚黏膜乾、眼眶凹、尿少、脈搏增快、皮膚飽滿度差;重『哭無淚、無尿、嗜睡、脈搏快弱、血壓降、休克』。脫水『張力『型』:依血鈉『低張(<130)、等張(130~150)、高張(>150)』。治療:『輕中度『『口服『葡萄糖『電解質液(ORS)』為主、繼續『哺『母乳/餵食』;重度『靜脈輸液』』;『腹瀉『可『改『無乳糖配方(暫時乳糖不耐)』、『勿『泡『濃『奶(增滲透壓加重腹瀉)』』。腸胃炎病原:『輪狀病毒(rotavirus)『好發『嬰幼兒『秋冬』、『有『口服『疫苗(2~3劑)』、『糞口『傳染、產『腸毒素『水瀉、可併『上呼吸道』、糞便『漂白水消毒』;『諾羅病毒『各『年齡『、無疫苗、『酒精『乾洗手『無效『(須『肥皂『洗手/含氯)』、急性期『禁食補液』;『沙門氏菌『『血絲/黏液『便』』。腹瀉臀部護理:『中性肥皂清水洗『擦乾』、暴露空氣自然乾、塗凡士林/氧化鋅『隔離糞便;『『避免『烤燈『(燙傷風險)』。 輪狀vs諾羅:輪狀好發嬰幼兒/諾羅各年齡(A對)、輪狀有疫苗/諾羅無(B對)、兩者糞口傳染(D對)。本題『錯誤』為C:依官方,『『C『敘述『有誤』(輪狀病毒『致病『機轉『與『腸毒素/吸收不良『相關,『但『「輪狀『產生『腸毒素、諾羅『機轉『不清」『的『對比『敘述『不正確』)』。本題「錯誤」者為C。","options":{"A":"正確。輪狀好發嬰幼兒,諾羅好發所有年齡層。","B":"正確。輪狀有疫苗,諾羅無疫苗。","C":"錯誤(本題答案)。此腸毒素/機轉對比敘述不正確。","D":"正確。兩者傳染途徑均屬糞口傳染。"},"sources":["疾管署 病毒性腸胃炎","輪狀諾羅"]}},"113030-N4-47":{"quick":"兒童急性腹瀉護理處置最適當的是「水分的補充可給與口服葡萄糖電解質水」。","detail":{"background":"兒童脫水程度(以體重流失%):『輕度『<5%(嬰兒)』、中度『5~10%』、重度『>10%(嬰兒,兒童>9%)』』。徵象:『輕『口渴尿稍少;中『囟門凹陷、皮膚黏膜乾、眼眶凹、尿少、脈搏增快、皮膚飽滿度差;重『哭無淚、無尿、嗜睡、脈搏快弱、血壓降、休克』。脫水『張力『型』:依血鈉『低張(<130)、等張(130~150)、高張(>150)』。治療:『輕中度『『口服『葡萄糖『電解質液(ORS)』為主、繼續『哺『母乳/餵食』;重度『靜脈輸液』』;『腹瀉『可『改『無乳糖配方(暫時乳糖不耐)』、『勿『泡『濃『奶(增滲透壓加重腹瀉)』』。腸胃炎病原:『輪狀病毒(rotavirus)『好發『嬰幼兒『秋冬』、『有『口服『疫苗(2~3劑)』、『糞口『傳染、產『腸毒素『水瀉、可併『上呼吸道』、糞便『漂白水消毒』;『諾羅病毒『各『年齡『、無疫苗、『酒精『乾洗手『無效『(須『肥皂『洗手/含氯)』、急性期『禁食補液』;『沙門氏菌『『血絲/黏液『便』』。腹瀉臀部護理:『中性肥皂清水洗『擦乾』、暴露空氣自然乾、塗凡士林/氧化鋅『隔離糞便;『『避免『烤燈『(燙傷風險)』。 (1)『腸道吸附劑(kaolin-pectin)『『不『與『食物『一起『(且『現多『不『建議『常規『使用)』』』,A不當;(2)『『不『以『『雞湯『取代『配方奶『(雞湯『電解質『不均、營養『不足)』』,B錯;(3)「『水分補充『給『『口服『葡萄糖『電解質『水(ORS)』」——正確;(4)『配方奶『『不可『泡『『濃『(增滲透壓加重腹瀉)』』,D錯。本題為C。","options":{"A":"吸附劑不與食物一起、且非常規建議。","B":"錯。不以雞湯取代配方奶(電解質不均)。","C":"正確。給口服葡萄糖電解質水(ORS)補充。","D":"錯。配方奶不可泡濃(加重腹瀉)。"},"sources":["Nelson《兒科學》急性腹瀉","ORS"]}},"114100-N4-48":{"quick":"6個月輪狀病毒急性腸胃炎、體重8→7.4kg,護理處置正確的是「接受電解質口服液治療後,鼓勵持續哺餵母奶」。","detail":{"background":"兒童脫水程度(以體重流失%):『輕度『<5%(嬰兒)』、中度『5~10%』、重度『>10%(嬰兒,兒童>9%)』』。徵象:『輕『口渴尿稍少;中『囟門凹陷、皮膚黏膜乾、眼眶凹、尿少、脈搏增快、皮膚飽滿度差;重『哭無淚、無尿、嗜睡、脈搏快弱、血壓降、休克』。脫水『張力『型』:依血鈉『低張(<130)、等張(130~150)、高張(>150)』。治療:『輕中度『『口服『葡萄糖『電解質液(ORS)』為主、繼續『哺『母乳/餵食』;重度『靜脈輸液』』;『腹瀉『可『改『無乳糖配方(暫時乳糖不耐)』、『勿『泡『濃『奶(增滲透壓加重腹瀉)』』。腸胃炎病原:『輪狀病毒(rotavirus)『好發『嬰幼兒『秋冬』、『有『口服『疫苗(2~3劑)』、『糞口『傳染、產『腸毒素『水瀉、可併『上呼吸道』、糞便『漂白水消毒』;『諾羅病毒『各『年齡『、無疫苗、『酒精『乾洗手『無效『(須『肥皂『洗手/含氯)』、急性期『禁食補液』;『沙門氏菌『『血絲/黏液『便』』。腹瀉臀部護理:『中性肥皂清水洗『擦乾』、暴露空氣自然乾、塗凡士林/氧化鋅『隔離糞便;『『避免『烤燈『(燙傷風險)』。 計算:『體重流失『(8-7.4)÷8=『7.5%』』→『『中度『脫水(非重度)』』,A「重度」錯;(2)『輪狀病毒『『糞口『傳染(非『飛沫;不需戴口罩防飛沫)』』,B錯;(3)「『電解質『口服液『治療『後『鼓勵『『持續『哺『母奶』(母乳『可『繼續、有助腸黏膜修復)」——正確;(4)『輪狀病毒『疫苗『是『『口服(非注射),且『6個月『已『過『首劑『建議『接種『年齡(非『此時『建議『注射)』』,D錯。本題為C。","options":{"A":"錯。流失7.5%是中度脫水(非重度)。","B":"錯。輪狀病毒糞口傳染(非飛沫,不需戴口罩防飛沫)。","C":"正確。電解質口服液治療後鼓勵持續哺母奶。","D":"錯。輪狀病毒疫苗是口服(非注射)。"},"sources":["Nelson《兒科學》輪狀病毒","母乳"]}},"114170-N4-47":{"quick":"諾羅病毒(norovirus)急性腸胃炎敘述正確的是「急性期採禁食和補充水分電解質」。","detail":{"background":"兒童脫水程度(以體重流失%):『輕度『<5%(嬰兒)』、中度『5~10%』、重度『>10%(嬰兒,兒童>9%)』』。徵象:『輕『口渴尿稍少;中『囟門凹陷、皮膚黏膜乾、眼眶凹、尿少、脈搏增快、皮膚飽滿度差;重『哭無淚、無尿、嗜睡、脈搏快弱、血壓降、休克』。脫水『張力『型』:依血鈉『低張(<130)、等張(130~150)、高張(>150)』。治療:『輕中度『『口服『葡萄糖『電解質液(ORS)』為主、繼續『哺『母乳/餵食』;重度『靜脈輸液』』;『腹瀉『可『改『無乳糖配方(暫時乳糖不耐)』、『勿『泡『濃『奶(增滲透壓加重腹瀉)』』。腸胃炎病原:『輪狀病毒(rotavirus)『好發『嬰幼兒『秋冬』、『有『口服『疫苗(2~3劑)』、『糞口『傳染、產『腸毒素『水瀉、可併『上呼吸道』、糞便『漂白水消毒』;『諾羅病毒『各『年齡『、無疫苗、『酒精『乾洗手『無效『(須『肥皂『洗手/含氯)』、急性期『禁食補液』;『沙門氏菌『『血絲/黏液『便』』。腹瀉臀部護理:『中性肥皂清水洗『擦乾』、暴露空氣自然乾、塗凡士林/氧化鋅『隔離糞便;『『避免『烤燈『(燙傷風險)』。 諾羅病毒:(1)『『各『年齡『(非『只『嬰幼兒)、『多『『冬季『(非夏季)』』,A錯;(2)『諾羅病毒『『『無『疫苗(非『口服『疫苗)』』,B錯;(3)『『酒精/乾洗手『『『無效『(須『肥皂『洗手『或『含氯『消毒)』』,C錯;(4)「『急性期『『禁食『(讓腸道休息)+補充『水分電解質』」——正確。本題為D。","options":{"A":"錯。諾羅各年齡、多冬季(非僅嬰幼兒夏季)。","B":"錯。諾羅無疫苗(非口服疫苗)。","C":"錯。酒精/乾洗手對諾羅無效(須肥皂/含氯)。","D":"正確。急性期禁食並補充水分電解質。"},"sources":["疾管署 諾羅病毒","禁食補液"]}},"115030-N4-27":{"quick":"16歲長期厭食症症狀或行為『最不適當』的是「嗜睡及腹瀉」。","detail":{"background":"神經性厭食症(anorexia nervosa):『『過度『操控『食物『節食/催吐、『『自覺『體重『過重『(身體心像扭曲)、『『停經(閉經)、『心搏『過『慢、低血壓、低體溫、『『便秘『(非『腹瀉)、嗜睡『可能『但『非『典型』』。「『『嗜睡『及『『腹瀉』』最不適當——『厭食症『多『『便秘『(非『腹瀉)』(進食少、腸蠕動慢)』」。本題最不適當者為C。","options":{"A":"符合。過分操控食物。","B":"符合。自覺體重過重(身體心像扭曲)。","C":"最不適當(本題答案)。厭食症多『便秘』(非腹瀉)。","D":"符合。常有停經情形。"},"sources":["DSM-5 厭食症","便秘"]}},"103030-N4-75":{"quick":"粥樣瀉(celiac disease)應避免給予的食物是「麵包」。","detail":{"background":"乳糜瀉/粥樣瀉(celiac disease):『對『『麩質(gluten,『麥『類『蛋白)』『『無法『耐受『的『『自體免疫『腸病變』』→『絨毛『萎縮『吸收不良、脂肪便、生長遲滯』;『飲食『『終生『『避免『麩質『——『禁『『小麥、大麥、黑麥、『燕麥(可能交叉污染)』;『『可『食『『米、玉米、馬鈴薯、蛋、肉』』。新生兒壞死性腸炎(NEC):『好發『早產兒』、『主因『『腸黏膜『缺血『缺氧+未成熟+餵食(配方奶)+細菌』、『常侵犯『迴腸末端/近端結腸』;『處置『『立即『禁食、全靜脈營養、鼻胃管減壓、『避免『肛溫(傷腸黏膜)』;『母乳『(IgA)『為『最佳『預防』。 乳糜瀉須『避免『『麩質(麥類)』』食物。『『麵包『(『小麥『製品『含『麩質)』應避免』。本題避免者為「麵包」(B);米飯、豆漿、玉米『不含麩質『可食』。本題為B。","options":{"A":"米飯不含麩質,可食。","B":"正確。麵包(小麥含麩質)應避免。","C":"豆漿不含麩質,可食。","D":"玉米不含麩質,可食。"},"sources":["Nelson《兒科學》乳糜瀉","麩質"]}},"108110-N4-63":{"quick":"新生兒壞死性腸炎(NEC)敘述『錯誤』的是「常侵犯部位為乙狀結腸及直腸壺腹處」。","detail":{"background":"乳糜瀉/粥樣瀉(celiac disease):『對『『麩質(gluten,『麥『類『蛋白)』『『無法『耐受『的『『自體免疫『腸病變』』→『絨毛『萎縮『吸收不良、脂肪便、生長遲滯』;『飲食『『終生『『避免『麩質『——『禁『『小麥、大麥、黑麥、『燕麥(可能交叉污染)』;『『可『食『『米、玉米、馬鈴薯、蛋、肉』』。新生兒壞死性腸炎(NEC):『好發『早產兒』、『主因『『腸黏膜『缺血『缺氧+未成熟+餵食(配方奶)+細菌』、『常侵犯『迴腸末端/近端結腸』;『處置『『立即『禁食、全靜脈營養、鼻胃管減壓、『避免『肛溫(傷腸黏膜)』;『母乳『(IgA)『為『最佳『預防』。 NEC:因週產期窒息腸道缺氧引起、母乳(IgA)為最佳預防、避免測肛溫皆正確。「『『常侵犯『『乙狀結腸『及『直腸壺腹』』錯誤——『NEC『最常『侵犯『『『迴腸『末端『與『近端『結腸』(非乙狀結腸/直腸壺腹)』」。本題「錯誤」者為B。","options":{"A":"正確。因週產期窒息腸道缺氧引起壞死及細菌侵犯。","B":"錯誤(本題答案)。NEC最常侵犯迴腸末端/近端結腸(非乙狀結腸直腸壺腹)。","C":"正確。母乳(IgA)為最佳預防方法。","D":"正確。避免測肛溫以免傷害腸黏膜。"},"sources":["Nelson《兒科學》NEC","迴腸末端"]}},"111030-N4-73":{"quick":"乳糜瀉(celiac disease)不適合食用的食物是「燕麥片」。","detail":{"background":"乳糜瀉/粥樣瀉(celiac disease):『對『『麩質(gluten,『麥『類『蛋白)』『『無法『耐受『的『『自體免疫『腸病變』』→『絨毛『萎縮『吸收不良、脂肪便、生長遲滯』;『飲食『『終生『『避免『麩質『——『禁『『小麥、大麥、黑麥、『燕麥(可能交叉污染)』;『『可『食『『米、玉米、馬鈴薯、蛋、肉』』。新生兒壞死性腸炎(NEC):『好發『早產兒』、『主因『『腸黏膜『缺血『缺氧+未成熟+餵食(配方奶)+細菌』、『常侵犯『迴腸末端/近端結腸』;『處置『『立即『禁食、全靜脈營養、鼻胃管減壓、『避免『肛溫(傷腸黏膜)』;『母乳『(IgA)『為『最佳『預防』。 乳糜瀉須避免『含麩質『麥類』。『『燕麥『(『可能『含『麩質『或『交叉污染),『『不適合『麩質過敏『兒童食用』。本題不適合者為「燕麥片」(A);玉米、米飯、蛋『不含麩質『可食』。本題為A。","options":{"A":"正確。燕麥(含麩質/交叉污染)不適合麩質過敏兒童。","B":"玉米不含麩質,可食。","C":"米飯不含麩質,可食。","D":"蛋不含麩質,可食。"},"sources":["Nelson《兒科學》乳糜瀉","燕麥"]}},"113030-N4-35":{"quick":"26週NEC護理照護『最不適當』的是「護理評估發現腸蠕動減慢,嘔吐物不含膽汁」(本題D)——本題答D。","detail":{"background":"乳糜瀉/粥樣瀉(celiac disease):『對『『麩質(gluten,『麥『類『蛋白)』『『無法『耐受『的『『自體免疫『腸病變』』→『絨毛『萎縮『吸收不良、脂肪便、生長遲滯』;『飲食『『終生『『避免『麩質『——『禁『『小麥、大麥、黑麥、『燕麥(可能交叉污染)』;『『可『食『『米、玉米、馬鈴薯、蛋、肉』』。新生兒壞死性腸炎(NEC):『好發『早產兒』、『主因『『腸黏膜『缺血『缺氧+未成熟+餵食(配方奶)+細菌』、『常侵犯『迴腸末端/近端結腸』;『處置『『立即『禁食、全靜脈營養、鼻胃管減壓、『避免『肛溫(傷腸黏膜)』;『母乳『(IgA)『為『最佳『預防』。 NEC護理:避免肛溫、觀察活動力下降/體溫不穩/呼吸窘迫、立即禁食給全靜脈營養皆適當。本題『最不適當/錯誤』為D:『『NEC『腸阻塞『時『嘔吐物『『『可『含『膽汁(綠色,因阻塞在『膽管開口『之下)』,『『「嘔吐物『『不含『膽汁」『敘述『與『NEC『不符(且『腸蠕動『減慢『+『腹脹『+『含膽汁『嘔吐『是『NEC『典型)』』。本題最不適當者為D。","options":{"A":"適當。避免測量肛溫(防傷腸黏膜)。","B":"適當。觀察活動力下降、體溫不穩、呼吸窘迫。","C":"適當。立即禁食、給全靜脈營養。","D":"最不適當(本題答案)。NEC嘔吐物『可含膽汁』(非不含膽汁)。"},"sources":["Nelson《兒科學》NEC","膽汁"]}},"113180-N4-45":{"quick":"乳糜或粥樣瀉(celiac disease)敘述正確的是「是自體免疫疾病,對麩質無法耐受所造成的腸病變」。","detail":{"background":"乳糜瀉/粥樣瀉(celiac disease):『對『『麩質(gluten,『麥『類『蛋白)』『『無法『耐受『的『『自體免疫『腸病變』』→『絨毛『萎縮『吸收不良、脂肪便、生長遲滯』;『飲食『『終生『『避免『麩質『——『禁『『小麥、大麥、黑麥、『燕麥(可能交叉污染)』;『『可『食『『米、玉米、馬鈴薯、蛋、肉』』。新生兒壞死性腸炎(NEC):『好發『早產兒』、『主因『『腸黏膜『缺血『缺氧+未成熟+餵食(配方奶)+細菌』、『常侵犯『迴腸末端/近端結腸』;『處置『『立即『禁食、全靜脈營養、鼻胃管減壓、『避免『肛溫(傷腸黏膜)』;『母乳『(IgA)『為『最佳『預防』。 (1)「『『自體免疫『疾病,『對『麩質『無法『耐受『所『造成『的『腸病變』」——正確;(2)『飲食『『避免『『穀『麥『類『麩質(非『以『穀麥『為主)』』,B錯;(3)『有『『腹瀉/脂肪便、腹脹(非『無腹痛『解血絲便)』』,C錯;(4)『治療『『以『『無麩質『飲食『(非『廣效『抗生素)』』,D錯。本題為A。","options":{"A":"正確。自體免疫疾病,對麩質無法耐受所致腸病變。","B":"錯。飲食應避免穀麥類麩質(非以其為主)。","C":"錯。有腹瀉/脂肪便(非無腹痛解血絲便)。","D":"錯。治療以無麩質飲食(非廣效抗生素)。"},"sources":["Nelson《兒科學》乳糜瀉","自體免疫"]}},"101030-N4-74":{"quick":"膽道閉鎖病因及臨床表徵『錯誤』的是「間接膽紅素增加,造成皮膚呈現黃綠色」。","detail":{"background":"膽道閉鎖(biliary atresia):『膽管『閉鎖『→『膽汁『無法『排入『腸道』→『『『阻塞性『黃疸(『『直接『/結合『膽紅素『升高,『非『間接)、『灰白色『大便(無膽色素)、『暗茶色『尿(尿『膽紅素)、『皮膚『黃綠色』;『『缺『膽鹽『→『『脂肪『與『『脂溶性『維生素(ADEK)『吸收『不良』』。處置:『『嬰兒『大便卡『比色『早期『發現、『『葛西『手術(Kasai)『最佳『時機『『出生『『60天『內(愈早愈好,減肝損傷)』、『最終『常需『肝『移植』;『飲食『『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化)、『高蛋白、補『脂溶性『維生素』;『未治療『→『肝硬化、脾腫大、肝昏迷』。膽管炎為術後常見併發症。 (1)膽汁無法排出致大便灰白——正確;(2)缺膽鹽無法吸收脂肪及脂溶性維生素——正確;(3)「『『『間接『膽紅素『增加』」錯誤——『膽道閉鎖是『『『阻塞性』黃疸,『升高的是『『『直接(結合)『膽紅素』』(非間接);皮膚黃綠色是直接膽紅素堆積』;(4)尿含膽紅素呈暗茶色——正確。本題「錯誤」者為C。","options":{"A":"正確。膽汁無法排出,大便逐漸變灰白色。","B":"正確。缺膽鹽無法吸收脂肪及脂溶性維生素。","C":"錯誤(本題答案)。是『直接』膽紅素增加(非間接)。","D":"正確。尿含膽紅素呈暗茶色。"},"sources":["Nelson《兒科學》膽道閉鎖","直接膽紅素"]}},"103100-N4-76":{"quick":"膽道閉鎖父母護理指導『錯誤』的是「病童需要長期攝取長鏈脂肪酸之配方奶或低蛋白牛奶」。","detail":{"background":"膽道閉鎖(biliary atresia):『膽管『閉鎖『→『膽汁『無法『排入『腸道』→『『『阻塞性『黃疸(『『直接『/結合『膽紅素『升高,『非『間接)、『灰白色『大便(無膽色素)、『暗茶色『尿(尿『膽紅素)、『皮膚『黃綠色』;『『缺『膽鹽『→『『脂肪『與『『脂溶性『維生素(ADEK)『吸收『不良』』。處置:『『嬰兒『大便卡『比色『早期『發現、『『葛西『手術(Kasai)『最佳『時機『『出生『『60天『內(愈早愈好,減肝損傷)』、『最終『常需『肝『移植』;『飲食『『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化)、『高蛋白、補『脂溶性『維生素』;『未治療『→『肝硬化、脾腫大、肝昏迷』。膽管炎為術後常見併發症。 膽道閉鎖指導:注意皮膚尿液茶黃色、葛西手術最佳時機『出生60天內』、定期追蹤肝功能皆正確。「『攝取『『『長鏈『脂肪酸『配方奶『或『低蛋白『牛奶』」錯誤——『應『『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化『易吸收)、『『高蛋白『(非『長鏈/低蛋白)』』。本題「錯誤」者為D。","options":{"A":"正確。注意皮膚、尿液是否呈茶黃色。","B":"正確。葛西手術最佳時機在出生60天內。","C":"正確。定期追蹤病童肝功能變化。","D":"錯誤(本題答案)。應攝取『中鏈』脂肪酸、『高』蛋白(非長鏈/低蛋白)。"},"sources":["Nelson《兒科學》膽道閉鎖","MCT"]}},"106030-N4-72":{"quick":"1個月膽道閉鎖鼻胃管灌食150mL、反抽胃殘餘量50mL,正確措施是「將反抽的胃殘餘量灌回,再灌入100mL」。","detail":{"background":"鼻胃管灌食『胃殘餘量』處理:『『將『反抽『的『『胃殘餘量『『『灌『回『(避免『丟棄『電解質/胃酸)』,『『再『補『灌『『該次『灌食量『『減去『殘餘量『的『差額(『150-50=『100mL)』』,『使『『總『入量『=『該次『灌食量』』。本題為「灌回殘餘量、再灌入100mL」(C);暫停通知醫師(A,殘餘量未過多不需停)、倒掉殘餘再灌150(B錯,丟棄電解質)、灌回再灌150(D錯,總量過多)。本題為C。","options":{"A":"殘餘量50mL未過多,不需暫停通知醫師。","B":"錯。倒掉殘餘量會丟失電解質。","C":"正確。灌回殘餘量50,再灌入100(總量150)。","D":"錯。灌回再灌150會使總量過多(200)。"},"sources":["Nelson《兒科學》鼻胃管","殘餘量"]}},"109030-N4-62":{"quick":"膽道閉鎖致肝硬化脾腫大肝昏迷,家屬家庭支持『不適當』的是「主動多次提及並討論未能於出生時及早發現膽道閉鎖的原由」。","detail":{"background":"膽道閉鎖(biliary atresia):『膽管『閉鎖『→『膽汁『無法『排入『腸道』→『『『阻塞性『黃疸(『『直接『/結合『膽紅素『升高,『非『間接)、『灰白色『大便(無膽色素)、『暗茶色『尿(尿『膽紅素)、『皮膚『黃綠色』;『『缺『膽鹽『→『『脂肪『與『『脂溶性『維生素(ADEK)『吸收『不良』』。處置:『『嬰兒『大便卡『比色『早期『發現、『『葛西『手術(Kasai)『最佳『時機『『出生『『60天『內(愈早愈好,減肝損傷)』、『最終『常需『肝『移植』;『飲食『『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化)、『高蛋白、補『脂溶性『維生素』;『未治療『→『肝硬化、脾腫大、肝昏迷』。膽管炎為術後常見併發症。 家庭支持:會談焦點放家屬關心的事、同理傾聽焦慮、真誠關懷提供資源皆適當。「『『主動『『多次『提及『未能『及早『發現『的『原由』」不適當——『『反覆『提『『「為何『沒早『發現」『會『『加重『父母『『罪惡感/自責』,『應『『避免『(focus『於『當前『照護與支持)』」。本題不適當者為B。","options":{"A":"適當。會談焦點放在家屬關心的事情上。","B":"不適當(本題答案)。反覆提「未能及早發現」會加重父母罪惡感。","C":"適當。陪伴鼓勵表達、同理傾聽焦慮。","D":"適當。真誠關懷、提供訊息與資源。"},"sources":["Nelson《兒科學》家庭支持","罪惡感"]}},"109030-N4-66":{"quick":"膽道閉鎖(6歲)面臨死亡,父母與其討論死亡『錯誤』的是「僅提及快樂的事情,避免引發哀傷反應,以減輕焦慮」。","detail":{"background":"與末期兒童討論死亡:應『『誠實『回應、『讓『兒童『『表達『對死亡『的『想法(問「你的想法呢?」)、『父母『主動『分享『自己『面對『死亡『的『感受』。「『『僅『提『『快樂『的事、『避免『引發『哀傷』」錯誤——『『迴避『死亡『話題『反『不利『兒童『表達『與『因應;『應『『誠實『開放『討論』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。不應僅提快樂事、迴避死亡(應誠實開放討論)。","B":"正確。小瑋主動提死亡時認真回應、不虛張聲勢。","C":"正確。問「你的想法呢?」讓其表達對死亡想法。","D":"正確。父母主動分享自己面對死亡的感受。"},"sources":["Nelson《兒科學》末期","死亡討論"]}},"109110-N4-75":{"quick":"嬰兒大便卡比對顏色早期發現膽道閉鎖,主要目的是「儘早進行手術,減少肝臟損傷」。","detail":{"background":"膽道閉鎖(biliary atresia):『膽管『閉鎖『→『膽汁『無法『排入『腸道』→『『『阻塞性『黃疸(『『直接『/結合『膽紅素『升高,『非『間接)、『灰白色『大便(無膽色素)、『暗茶色『尿(尿『膽紅素)、『皮膚『黃綠色』;『『缺『膽鹽『→『『脂肪『與『『脂溶性『維生素(ADEK)『吸收『不良』』。處置:『『嬰兒『大便卡『比色『早期『發現、『『葛西『手術(Kasai)『最佳『時機『『出生『『60天『內(愈早愈好,減肝損傷)』、『最終『常需『肝『移植』;『飲食『『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化)、『高蛋白、補『脂溶性『維生素』;『未治療『→『肝硬化、脾腫大、肝昏迷』。膽管炎為術後常見併發症。 『嬰兒『大便卡『比色『早期『發現『膽道閉鎖(灰白便)』的『主要目的『:『『『儘早(『出生『60天『內)『進行『『葛西『手術』,『『減少『『肝臟『損傷『(延誤『致『肝硬化)』』。本題主要目的為「儘早手術、減少肝臟損傷」(C);預防核黃疸(那是『間接』膽紅素/新生兒黃疸)、特殊奶粉、排膽劑非大便卡目的。本題為C。","options":{"A":"核黃疸與間接膽紅素相關,非大便卡目的。","B":"非為早期給特殊奶粉。","C":"正確。儘早手術(葛西)減少肝臟損傷。","D":"非為給排膽劑。"},"sources":["Nelson《兒科學》膽道閉鎖","大便卡"]}},"111030-N4-45":{"quick":"膽道閉鎖父母猶豫是否手術,以家庭為中心護理最適當的是「利用圖片、影片與模型向病童父母解說治療的選擇」。","detail":{"background":"膽道閉鎖(biliary atresia):『膽管『閉鎖『→『膽汁『無法『排入『腸道』→『『『阻塞性『黃疸(『『直接『/結合『膽紅素『升高,『非『間接)、『灰白色『大便(無膽色素)、『暗茶色『尿(尿『膽紅素)、『皮膚『黃綠色』;『『缺『膽鹽『→『『脂肪『與『『脂溶性『維生素(ADEK)『吸收『不良』』。處置:『『嬰兒『大便卡『比色『早期『發現、『『葛西『手術(Kasai)『最佳『時機『『出生『『60天『內(愈早愈好,減肝損傷)』、『最終『常需『肝『移植』;『飲食『『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化)、『高蛋白、補『脂溶性『維生素』;『未治療『→『肝硬化、脾腫大、肝昏迷』。膽管炎為術後常見併發症。 以家庭為中心:『『提供『『充分『資訊『(圖片/影片/模型『解說『治療『選擇)『讓『父母『『知情『決策』。本題最適當為「圖片影片模型解說治療選擇」(B);減少風險訊息(A錯,應充分告知)、(C)說明絕無動到胎神雖澄清但非最適當核心、由父母決定醫護不參與(D錯,應提供專業建議共同決策)。本題為B。","options":{"A":"錯。不應為避免擔憂而減少風險訊息(應充分告知)。","B":"正確。用圖片影片模型解說治療選擇,助知情決策。","C":"澄清胎神迷思可,但非最適當核心。","D":"錯。醫護應提供專業建議共同決策(非完全不參與)。"},"sources":["Nelson《兒科學》家庭中心","知情"]}},"112030-N4-76":{"quick":"先天性膽道閉鎖敘述正確的是「若未治療,易出現肝硬化、脾腫大現象」。","detail":{"background":"膽道閉鎖(biliary atresia):『膽管『閉鎖『→『膽汁『無法『排入『腸道』→『『『阻塞性『黃疸(『『直接『/結合『膽紅素『升高,『非『間接)、『灰白色『大便(無膽色素)、『暗茶色『尿(尿『膽紅素)、『皮膚『黃綠色』;『『缺『膽鹽『→『『脂肪『與『『脂溶性『維生素(ADEK)『吸收『不良』』。處置:『『嬰兒『大便卡『比色『早期『發現、『『葛西『手術(Kasai)『最佳『時機『『出生『『60天『內(愈早愈好,減肝損傷)』、『最終『常需『肝『移植』;『飲食『『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化)、『高蛋白、補『脂溶性『維生素』;『未治療『→『肝硬化、脾腫大、肝昏迷』。膽管炎為術後常見併發症。 (1)『常缺『『脂溶性(非水溶性)『維生素』』,A錯;(2)『葛西『手術『『預後『『不一定『良好『(常『仍『需『肝『移植)』』,B錯;(3)「『未治療『→『『肝硬化、脾腫大(門脈高壓)』」——正確;(4)『糞便『『灰白色(無膽色素;非『血絲/暗紅)』』,D錯。本題為C。","options":{"A":"錯。常缺『脂溶性』維生素(非水溶性)。","B":"錯。葛西手術預後不一定良好(常需肝移植)。","C":"正確。未治療易出現肝硬化、脾腫大。","D":"錯。糞便灰白色(非含血絲暗紅)。"},"sources":["Nelson《兒科學》膽道閉鎖","肝硬化"]}},"113030-N4-45":{"quick":"膽道閉鎖敘述『錯誤』的是「容易影響脂肪的消化吸收,導致水溶性維生素缺乏」。","detail":{"background":"膽道閉鎖(biliary atresia):『膽管『閉鎖『→『膽汁『無法『排入『腸道』→『『『阻塞性『黃疸(『『直接『/結合『膽紅素『升高,『非『間接)、『灰白色『大便(無膽色素)、『暗茶色『尿(尿『膽紅素)、『皮膚『黃綠色』;『『缺『膽鹽『→『『脂肪『與『『脂溶性『維生素(ADEK)『吸收『不良』』。處置:『『嬰兒『大便卡『比色『早期『發現、『『葛西『手術(Kasai)『最佳『時機『『出生『『60天『內(愈早愈好,減肝損傷)』、『最終『常需『肝『移植』;『飲食『『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化)、『高蛋白、補『脂溶性『維生素』;『未治療『→『肝硬化、脾腫大、肝昏迷』。膽管炎為術後常見併發症。 膽道閉鎖:灰白便暗茶尿、膽管炎為術後常見併發症、用『中鏈脂肪酸『高蛋白『牛奶皆正確。「『影響脂肪『消化吸收『致『『『水溶性『維生素『缺乏』」錯誤——『缺膽鹽『影響『脂肪『吸收『→『『『脂溶性『維生素(ADEK)『缺乏』』(非『水溶性)』」。本題「錯誤」者為B。","options":{"A":"正確。常出現灰白色大便、暗茶色尿液。","B":"錯誤(本題答案)。是『脂溶性』維生素缺乏(非水溶性)。","C":"正確。膽管炎是手術後常見併發症。","D":"正確。提供中鏈脂肪酸配方奶、高蛋白牛奶。"},"sources":["Nelson《兒科學》膽道閉鎖","脂溶性"]}},"115030-N4-47":{"quick":"8個月膽道閉鎖術後膽道炎,飲食護理指導正確的是「採用中鏈脂肪酸的配方奶」。","detail":{"background":"膽道閉鎖(biliary atresia):『膽管『閉鎖『→『膽汁『無法『排入『腸道』→『『『阻塞性『黃疸(『『直接『/結合『膽紅素『升高,『非『間接)、『灰白色『大便(無膽色素)、『暗茶色『尿(尿『膽紅素)、『皮膚『黃綠色』;『『缺『膽鹽『→『『脂肪『與『『脂溶性『維生素(ADEK)『吸收『不良』』。處置:『『嬰兒『大便卡『比色『早期『發現、『『葛西『手術(Kasai)『最佳『時機『『出生『『60天『內(愈早愈好,減肝損傷)』、『最終『常需『肝『移植』;『飲食『『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化)、『高蛋白、補『脂溶性『維生素』;『未治療『→『肝硬化、脾腫大、肝昏迷』。膽管炎為術後常見併發症。 膽道閉鎖飲食:『『中鏈『脂肪酸(MCT)『配方奶『(不需『膽汁『消化『易吸收)、『高蛋白、補『『脂溶性『維生素』。本題正確為「中鏈脂肪酸配方奶」(D);補水溶性維生素(A錯,應脂溶性)、低鈣(B錯,無此需要)、限制蛋白(C錯,應高蛋白)。本題為D。","options":{"A":"錯。應補『脂溶性』維生素(非水溶性)。","B":"錯。無需低鈣飲食。","C":"錯。應高蛋白(非限制蛋白)。","D":"正確。採用中鏈脂肪酸(MCT)配方奶。"},"sources":["Nelson《兒科學》膽道閉鎖","MCT"]}},"103100-N4-44":{"quick":"國小三年級反覆腹痛嘔吐(檢查無問題、上學前抱怨),護理師優先處理是「建議媽媽嘗試鼓勵小美說出上學的感受」。","detail":{"background":"神經性厭食症(anorexia nervosa):青少年女性多、身體心像扭曲(自覺胖)、過度節食/催吐、閉經、心搏過慢低血壓低體溫便秘;『護理『『『最『優先『=『『改善『『嚴重『營養『不良(生命『徵象『穩定)』,『再『行為契約『討論『營養『目標、心理治療矯正身體心像、家庭治療』;『營養『復健『體重『回復『宜『『緩慢(每週『0.5~1kg)』,『『過快『增重『致『『再餵食『症候群/『心血管『負擔『過重』。復發性腹痛(recurrent abdominal pain):『『『臍『周『腹痛、『『無『器質『病因、『『時間『不『規律、『『無『發燒/體重『減輕、『多與『『心理『社會『壓力『有關(如『拒學)』。鼻胃管/口胃管灌食:『長度『鼻尖→耳垂→『劍突』、『反抽『有『胃液/測pH『確認位置』、『灌食前『反抽『殘餘量』、『灌食後『『右側『半坐臥/頭高30度』(利胃排空防逆流)、『出現『嘔吐/腹脹/呼吸暫停『停止『灌食』。 本例『反覆『腹痛『嘔吐『但『檢查『無『器質『問題、『『在家『休息『就『不痛、『『上學『前『發作『不想上學』→『『屬『『心理『社會『因素(『可能『拒學/學校『壓力)』。護理師『『優先『=『『鼓勵『『說出『上學『的『感受(探究『心理『根源)』。本題優先為B;留家休息(A,強化逃避)、直接轉心理諮商(C,先了解再轉)、邀同學來玩(D,非優先)。本題為B。","options":{"A":"錯。讓其留家休息會強化逃避行為。","B":"正確。鼓勵小美說出上學的感受(探究心理根源)。","C":"直接轉諮商前應先了解感受(非最優先)。","D":"邀同學來玩非優先處理。"},"sources":["Nelson《兒科學》復發性腹痛","心理"]}},"103100-N4-80":{"quick":"14歲厭食症護理計畫『須優先處理』的是「改善嚴重的營養不良」。","detail":{"background":"神經性厭食症(anorexia nervosa):青少年女性多、身體心像扭曲(自覺胖)、過度節食/催吐、閉經、心搏過慢低血壓低體溫便秘;『護理『『『最『優先『=『『改善『『嚴重『營養『不良(生命『徵象『穩定)』,『再『行為契約『討論『營養『目標、心理治療矯正身體心像、家庭治療』;『營養『復健『體重『回復『宜『『緩慢(每週『0.5~1kg)』,『『過快『增重『致『『再餵食『症候群/『心血管『負擔『過重』。復發性腹痛(recurrent abdominal pain):『『『臍『周『腹痛、『『無『器質『病因、『『時間『不『規律、『『無『發燒/體重『減輕、『多與『『心理『社會『壓力『有關(如『拒學)』。鼻胃管/口胃管灌食:『長度『鼻尖→耳垂→『劍突』、『反抽『有『胃液/測pH『確認位置』、『灌食前『反抽『殘餘量』、『灌食後『『右側『半坐臥/頭高30度』(利胃排空防逆流)、『出現『嘔吐/腹脹/呼吸暫停『停止『灌食』。 厭食症『護理『『『優先『順序『=『『先『『改善『『嚴重『『營養『不良『(『維持『『生命『徵象『穩定『、矯正『電解質)』,『『再『處理『心理『/家庭『/身體『心像』。本題優先為「改善嚴重營養不良」(D);改善家人互動、教應對能力、心理諮商矯正身體心像皆在『生理穩定『之後。本題為D。","options":{"A":"改善家人互動在生理穩定之後。","B":"教個人應對能力在之後。","C":"心理諮商矯正身體心像在之後。","D":"正確。優先改善嚴重營養不良(維持生命徵象)。"},"sources":["DSM-5/Nelson 厭食症","營養優先"]}},"106110-N4-56":{"quick":"31週早產兒進食壓力性行為線索『不是』「吸不到5分鐘就不吸奶,睡著了」(本題D)——本題答D。","detail":{"background":"早產兒『餵食『壓力『暗示『行為(feeding stress cues):『『呼吸『喘、『鼻翼『搧動、『心跳『變慢、『嗆奶『咳嗽、『膚色『改變(發紺)、『因『呼吸『中止『吞嚥』。本題問『不是『壓力『線索』,答案D:『『「吸不到5分鐘『就『不吸『睡著了」『是『『『疲累/飽足『的『『正常『行為『(『非『『壓力『性『行為『線索;『壓力『線索『是『『生理『不穩『如『呼吸喘『發紺『心跳慢)』』。本題不是壓力線索者為D。(註:依官方本題答D。)","options":{"A":"是壓力線索(吸吮無力疲倦)——但本題以D為「不是」。","B":"是壓力線索。呼吸喘、鼻翼搧動、心跳變慢。","C":"是壓力線索。嗆奶、咳嗽、膚色改變。","D":"本題答案(官方)。視為疲累/飽足的行為,非生理壓力線索。"},"sources":["Nelson《兒科學》早產兒餵食","壓力線索"]}},"107030-N4-45":{"quick":"兒童復發性腹痛(recurrent abdominal pain)的特徵是「①肚臍周圍+④腹痛時間不規律(即14)」。","detail":{"background":"神經性厭食症(anorexia nervosa):青少年女性多、身體心像扭曲(自覺胖)、過度節食/催吐、閉經、心搏過慢低血壓低體溫便秘;『護理『『『最『優先『=『『改善『『嚴重『營養『不良(生命『徵象『穩定)』,『再『行為契約『討論『營養『目標、心理治療矯正身體心像、家庭治療』;『營養『復健『體重『回復『宜『『緩慢(每週『0.5~1kg)』,『『過快『增重『致『『再餵食『症候群/『心血管『負擔『過重』。復發性腹痛(recurrent abdominal pain):『『『臍『周『腹痛、『『無『器質『病因、『『時間『不『規律、『『無『發燒/體重『減輕、『多與『『心理『社會『壓力『有關(如『拒學)』。鼻胃管/口胃管灌食:『長度『鼻尖→耳垂→『劍突』、『反抽『有『胃液/測pH『確認位置』、『灌食前『反抽『殘餘量』、『灌食後『『右側『半坐臥/頭高30度』(利胃排空防逆流)、『出現『嘔吐/腹脹/呼吸暫停『停止『灌食』。 復發性腹痛特徵:『①『『臍『周『腹痛、④『『時間『『不『規律』;『『『非『轉移性(②錯,轉移性是『闌尾炎)、『『無『腹瀉(③『鬆軟『大便『非『典型)、『『『無『發燒/體重『減輕(⑤『伴『體溫『升高『非『復發性『腹痛,而是『器質『感染)』。本題特徵為「①④(14)」(A)。","options":{"A":"正確。①臍周腹痛+④時間不規律(14)。","B":"145含⑤體溫升高(非復發性腹痛)。","C":"235含②轉移性、⑤發燒(非此)。","D":"245含⑤發燒(非此)。"},"sources":["Nelson《兒科學》復發性腹痛","特徵"]}},"108020-N4-53":{"quick":"14歲厭食症(BMI13、自覺胖)維持營養護理措施最適合的是「建立行為契約,與玲玲討論營養攝取目標」。","detail":{"background":"神經性厭食症(anorexia nervosa):青少年女性多、身體心像扭曲(自覺胖)、過度節食/催吐、閉經、心搏過慢低血壓低體溫便秘;『護理『『『最『優先『=『『改善『『嚴重『營養『不良(生命『徵象『穩定)』,『再『行為契約『討論『營養『目標、心理治療矯正身體心像、家庭治療』;『營養『復健『體重『回復『宜『『緩慢(每週『0.5~1kg)』,『『過快『增重『致『『再餵食『症候群/『心血管『負擔『過重』。復發性腹痛(recurrent abdominal pain):『『『臍『周『腹痛、『『無『器質『病因、『『時間『不『規律、『『無『發燒/體重『減輕、『多與『『心理『社會『壓力『有關(如『拒學)』。鼻胃管/口胃管灌食:『長度『鼻尖→耳垂→『劍突』、『反抽『有『胃液/測pH『確認位置』、『灌食前『反抽『殘餘量』、『灌食後『『右側『半坐臥/頭高30度』(利胃排空防逆流)、『出現『嘔吐/腹脹/呼吸暫停『停止『灌食』。 厭食症『營養『護理』:『『『建立『『行為『契約(『與『病童『『共同『討論『營養『攝取『目標、『獎勵『進食)』、『緩慢『增重(每週0.5~1kg)、『轉介『家庭『心理『諮商』。本題最適合為「建立行為契約討論營養目標」(C);監測到願意進食(A被動)、每週增3kg(B過快危險)、不需轉介家庭諮商(D錯,需家庭治療)。本題為C。","options":{"A":"被動監測非最適合(應主動契約)。","B":"錯。每週增3kg過快(致再餵食症候群)。","C":"正確。建立行為契約,與其討論營養攝取目標。","D":"錯。厭食症需轉介家庭心理諮商。"},"sources":["DSM-5 厭食症","行為契約"]}},"108020-N4-78":{"quick":"2個月鼻胃管管灌餵食正確的是「如出現嘔吐、腹脹、呼吸暫停等徵象應立即停止灌食」。","detail":{"background":"神經性厭食症(anorexia nervosa):青少年女性多、身體心像扭曲(自覺胖)、過度節食/催吐、閉經、心搏過慢低血壓低體溫便秘;『護理『『『最『優先『=『『改善『『嚴重『營養『不良(生命『徵象『穩定)』,『再『行為契約『討論『營養『目標、心理治療矯正身體心像、家庭治療』;『營養『復健『體重『回復『宜『『緩慢(每週『0.5~1kg)』,『『過快『增重『致『『再餵食『症候群/『心血管『負擔『過重』。復發性腹痛(recurrent abdominal pain):『『『臍『周『腹痛、『『無『器質『病因、『『時間『不『規律、『『無『發燒/體重『減輕、『多與『『心理『社會『壓力『有關(如『拒學)』。鼻胃管/口胃管灌食:『長度『鼻尖→耳垂→『劍突』、『反抽『有『胃液/測pH『確認位置』、『灌食前『反抽『殘餘量』、『灌食後『『右側『半坐臥/頭高30度』(利胃排空防逆流)、『出現『嘔吐/腹脹/呼吸暫停『停止『灌食』。 (1)『『『總『灌入『量『『不『包含『殘餘量『(殘餘量『是『『扣除『或『回灌『的『前次『未『消化『量;A「殘餘量+灌食量」不精確)』』,A錯;(2)「『出現『嘔吐、腹脹、呼吸暫停『『立即『『停止『灌食』」——正確;(3)『餵食後『採『『右『側『半坐臥(非『左側)』』,C錯;(4)『鼻胃管灌食『『可『給『安撫『奶嘴(非營養性吸吮『安撫、促進口腔『發展;非『影響呼吸)』』,D錯。本題為B。","options":{"A":"錯。總灌入量不含殘餘量(殘餘量扣除/回灌)。","B":"正確。出現嘔吐腹脹呼吸暫停應立即停止灌食。","C":"錯。餵食後採右側半坐臥(非左側)。","D":"錯。可給安撫奶嘴(非營養性吸吮,促口腔發展)。"},"sources":["Nelson《兒科學》鼻胃管","停止灌食"]}},"108110-N4-51":{"quick":"厭食症營養復健期過度餵食、體重快速增加可能造成「心血管負擔過重」。","detail":{"background":"神經性厭食症(anorexia nervosa):青少年女性多、身體心像扭曲(自覺胖)、過度節食/催吐、閉經、心搏過慢低血壓低體溫便秘;『護理『『『最『優先『=『『改善『『嚴重『營養『不良(生命『徵象『穩定)』,『再『行為契約『討論『營養『目標、心理治療矯正身體心像、家庭治療』;『營養『復健『體重『回復『宜『『緩慢(每週『0.5~1kg)』,『『過快『增重『致『『再餵食『症候群/『心血管『負擔『過重』。復發性腹痛(recurrent abdominal pain):『『『臍『周『腹痛、『『無『器質『病因、『『時間『不『規律、『『無『發燒/體重『減輕、『多與『『心理『社會『壓力『有關(如『拒學)』。鼻胃管/口胃管灌食:『長度『鼻尖→耳垂→『劍突』、『反抽『有『胃液/測pH『確認位置』、『灌食前『反抽『殘餘量』、『灌食後『『右側『半坐臥/頭高30度』(利胃排空防逆流)、『出現『嘔吐/腹脹/呼吸暫停『停止『灌食』。 厭食症『營養『復健『若『『『過度『餵食『/『體重『增加『『過快』→『『『再餵食『症候群(refeeding syndrome)』、『『『心血管『負擔『過重(體液『電解質『移動、心衰竭)』。本題可能造成「心血管負擔過重」(A);無月經(是厭食症本身)、胃出血、暴食症非過度餵食的直接後果。本題為A。","options":{"A":"正確。過度餵食/快速增重致心血管負擔過重(再餵食症候群)。","B":"無月經是厭食症本身表現。","C":"胃出血非過度餵食直接後果。","D":"暴食症非過度餵食直接造成。"},"sources":["DSM-5 厭食症","再餵食"]}},"110030-N4-47":{"quick":"早產兒口胃管灌食『不適當』的是「灌食時,早產兒頭部抬高大於30度」(本題C)——本題答C。","detail":{"background":"神經性厭食症(anorexia nervosa):青少年女性多、身體心像扭曲(自覺胖)、過度節食/催吐、閉經、心搏過慢低血壓低體溫便秘;『護理『『『最『優先『=『『改善『『嚴重『營養『不良(生命『徵象『穩定)』,『再『行為契約『討論『營養『目標、心理治療矯正身體心像、家庭治療』;『營養『復健『體重『回復『宜『『緩慢(每週『0.5~1kg)』,『『過快『增重『致『『再餵食『症候群/『心血管『負擔『過重』。復發性腹痛(recurrent abdominal pain):『『『臍『周『腹痛、『『無『器質『病因、『『時間『不『規律、『『無『發燒/體重『減輕、『多與『『心理『社會『壓力『有關(如『拒學)』。鼻胃管/口胃管灌食:『長度『鼻尖→耳垂→『劍突』、『反抽『有『胃液/測pH『確認位置』、『灌食前『反抽『殘餘量』、『灌食後『『右側『半坐臥/頭高30度』(利胃排空防逆流)、『出現『嘔吐/腹脹/呼吸暫停『停止『灌食』。 早產兒口胃管灌食:無菌蒸餾水潤滑、餵食前檢查殘餘量、每日熱量100~120 Kcal/kg皆適當。本題『不適當』為C:依官方,『『「灌食時『頭部『抬高『『『大於『30度」』『不適當』——『官方『認為『此『敘述『有誤(『早產兒『灌食『頭部『抬高『『約『『30度『即可,『「『大於『30度」『的『角度『敘述『不適當『或『與『標準『不符)』』。本題不適當者為C。","options":{"A":"適當。插口胃管時先以無菌蒸餾水潤滑。","B":"適當。每次餵食前先檢查胃內殘餘量。","C":"不適當(本題答案)。頭部抬高約30度即可(「大於30度」敘述不適當)。","D":"適當。每日攝取熱量約100~120 Kcal/kg。"},"sources":["Nelson《兒科學》早產兒灌食","頭高"]}},"112030-N4-53":{"quick":"早產兒經口餵食發展照護原則『錯誤』的是「對於妊娠週數低及低體重的早產兒,餵食時間應延長至60分鐘以減少壓力」。","detail":{"background":"神經性厭食症(anorexia nervosa):青少年女性多、身體心像扭曲(自覺胖)、過度節食/催吐、閉經、心搏過慢低血壓低體溫便秘;『護理『『『最『優先『=『『改善『『嚴重『營養『不良(生命『徵象『穩定)』,『再『行為契約『討論『營養『目標、心理治療矯正身體心像、家庭治療』;『營養『復健『體重『回復『宜『『緩慢(每週『0.5~1kg)』,『『過快『增重『致『『再餵食『症候群/『心血管『負擔『過重』。復發性腹痛(recurrent abdominal pain):『『『臍『周『腹痛、『『無『器質『病因、『『時間『不『規律、『『無『發燒/體重『減輕、『多與『『心理『社會『壓力『有關(如『拒學)』。鼻胃管/口胃管灌食:『長度『鼻尖→耳垂→『劍突』、『反抽『有『胃液/測pH『確認位置』、『灌食前『反抽『殘餘量』、『灌食後『『右側『半坐臥/頭高30度』(利胃排空防逆流)、『出現『嘔吐/腹脹/呼吸暫停『停止『灌食』。 早產兒經口餵食:出現飢餓暗示(尋乳吸吮)可準備、出現壓力暗示(疲倦嗆奶呼吸暫停發紺)減緩或停止、觀察呼吸膚色調整流速皆正確。「『餵食『時間『『『延長『至『『60『分鐘』」錯誤——『『餵食『時間『『『過長(60分鐘)『『反『『增『『耗氧『與『疲累『壓力』;『早產兒『餵食『宜『『『適度『時間(約『20~30『分鐘),『疲累『即『停止』」。本題「錯誤」者為C。","options":{"A":"正確。出現飢餓暗示(尋乳吸吮)可開始準備。","B":"正確。出現壓力暗示(疲倦嗆奶呼吸暫停發紺)減緩或停止。","C":"錯誤(本題答案)。餵食延長至60分鐘反增耗氧疲累(應適度時間)。","D":"正確。觀察呼吸膚色,調整奶瓶位置及流速。"},"sources":["Nelson《兒科學》早產兒餵食","時間"]}},"113100-N4-45":{"quick":"病童放置鼻胃管護理較適當的是「管灌結束後宜採右側半坐臥或坐姿,頭部抬高30度」。","detail":{"background":"神經性厭食症(anorexia nervosa):青少年女性多、身體心像扭曲(自覺胖)、過度節食/催吐、閉經、心搏過慢低血壓低體溫便秘;『護理『『『最『優先『=『『改善『『嚴重『營養『不良(生命『徵象『穩定)』,『再『行為契約『討論『營養『目標、心理治療矯正身體心像、家庭治療』;『營養『復健『體重『回復『宜『『緩慢(每週『0.5~1kg)』,『『過快『增重『致『『再餵食『症候群/『心血管『負擔『過重』。復發性腹痛(recurrent abdominal pain):『『『臍『周『腹痛、『『無『器質『病因、『『時間『不『規律、『『無『發燒/體重『減輕、『多與『『心理『社會『壓力『有關(如『拒學)』。鼻胃管/口胃管灌食:『長度『鼻尖→耳垂→『劍突』、『反抽『有『胃液/測pH『確認位置』、『灌食前『反抽『殘餘量』、『灌食後『『右側『半坐臥/頭高30度』(利胃排空防逆流)、『出現『嘔吐/腹脹/呼吸暫停『停止『灌食』。 (1)『鼻胃管『長度『『鼻尖→『耳垂→『『劍突『(非『僅『鼻尖→耳垂)』』,A錯;(2)『『測『位置『『不可『『將『末端『浸水『看『氣泡『(若『誤入『『氣管『會『誤判;應『抽胃液/測pH/聽氣過水聲)』』,B錯;(3)『灌食『總量『『『需『考慮『殘餘量』』,C錯;(4)「『管灌後『採『『右側『半坐臥/坐姿、頭部『抬高30度』(利胃排空防逆流)」——正確。本題為D。","options":{"A":"錯。鼻胃管長度鼻尖→耳垂→劍突(非僅鼻尖→耳垂)。","B":"錯。不可浸水看氣泡(誤入氣管會誤判),應抽胃液/測pH。","C":"錯。灌食總量需考慮殘餘量。","D":"正確。管灌後採右側半坐臥/坐姿、頭抬高30度。"},"sources":["Nelson《兒科學》鼻胃管","右側半坐臥"]}},"101030-N4-7":{"quick":"剖腹產後第2天未排氣腹脹,最適宜的『獨立性』護理措施是「協助多翻身,並給予薄荷油擦拭腹部,以促進腸蠕動」。","detail":{"background":"剖腹產後腹脹(腸蠕動未恢復)的『獨立性(護理師可自行執行)』措施:『『多『翻身/早期『活動、『『薄荷油『擦『腹部、熱敷『促『腸蠕動』。本題最適宜為「多翻身+薄荷油擦腹部」(C);鬆開束腹帶(A無助腸蠕動)、請醫師給塞劑/灌腸(B『需醫囑『非獨立性)、請醫師增軟便劑(D需醫囑)。本題為C。","options":{"A":"鬆開束腹帶無助於腸蠕動恢復。","B":"塞劑/灌腸需醫囑(非獨立性措施)。","C":"正確。多翻身+薄荷油擦腹部促腸蠕動(獨立性)。","D":"增軟便劑需醫囑(非獨立性)。"},"sources":["新文京《產科護理學》產後腹脹","獨立性"]}},"101110-N4-75":{"quick":"子宮頸癌IIb期子宮根除術後護理問題『除外』(不會出現)的是「下肢肢體活動障礙」。","detail":{"background":"子宮根除術(廣泛性子宮切除+骨盆淋巴清除)術後問題:『『膀胱『功能障礙(『造瘻/滲尿、尿瀦留)』、『『便秘『腹瀉『交替(腸蠕動受影響)、『『下肢『『淋巴『水腫(淋巴清除)』。「『『下肢『『『肢體『『活動『障礙』」『除外』——『子宮根除術『『不『傷『『下肢『運動『神經/肌肉』,『不會『造成『下肢『活動『障礙(會『水腫『但『非『活動『障礙)』。本題除外者為C。","options":{"A":"會。膀胱造瘻口滲尿(膀胱功能障礙)。","B":"會。便秘與腹瀉交替(腸蠕動受影響)。","C":"本題答案(除外)。子宮根除術不致下肢活動障礙。","D":"會。下肢淋巴水腫(淋巴清除)。"},"sources":["Berek婦科 子宮根除術","淋巴水腫"]}},"102030-N4-9":{"quick":"孕7週每天早晨噁心嘔吐,最合宜的回答是「這是荷爾蒙變化引起的反應」。","detail":{"background":"孕早期『晨吐(morning sickness)』:『『多『因『『懷孕『『荷爾蒙(『hCG、雌激素)『變化『引起』,『『多『於『『第一『孕期『(約12週前)『出現,『多『自然『緩解』。本題最合宜為「荷爾蒙變化引起的反應」(D);胃位置改變(A非主因)、胃酸減少要檢查(B不正確且增焦慮)、推給醫師(C推諉)。本題為D。","options":{"A":"胃位置改變非晨吐主因。","B":"胃酸減少要檢查不正確且增焦慮。","C":"推給醫師是推諉(護理師可衛教)。","D":"正確。這是懷孕荷爾蒙變化引起的反應。"},"sources":["新文京《產科護理學》晨吐","荷爾蒙"]}},"102110-N4-15":{"quick":"待產中暈眩、嘴唇麻刺感,最可能原因是「換氣過度」。","detail":{"background":"待產『陣痛『時『因『疼痛/焦慮『『『呼吸『過快『過深(換氣過度hyperventilation)』→『『CO2『排出『過多『→『『『呼吸性『鹼『中毒『→『『『『暈眩、『『嘴唇/手指『『麻『刺感、抽搐』。本題最可能為「換氣過度」(D);脫水、臥床過久、睡眠不足非此典型表現。本題為D。","options":{"A":"脫水非麻刺感典型原因。","B":"臥床過久非此。","C":"睡眠不足非此。","D":"正確。換氣過度致呼吸性鹼中毒→暈眩、嘴唇麻刺。"},"sources":["新文京《產科護理學》待產","換氣過度"]}},"103030-N4-70":{"quick":"急性腎衰竭兒童出現「心悸」時需懷疑血鉀過高。","detail":{"background":"急性腎衰竭(ARF)『高血鉀(hyperkalemia)』:『腎『排鉀『不足『→『血鉀『升高『→『『影響『『心臟『傳導『→『『『心悸、心律不整、『心電圖『T波『高尖、嚴重『心室『顫動』。本題需懷疑高血鉀者為「心悸」(B);頭痛、無尿(是腎衰竭表現非高血鉀特異)、便秘非高血鉀的心臟徵象。本題為B。","options":{"A":"頭痛非高血鉀特異徵象。","B":"正確。心悸(心律不整)是高血鉀的心臟徵象。","C":"無尿是腎衰竭表現,非高血鉀特異。","D":"便秘非高血鉀徵象(低血鉀才腸蠕動降)。"},"sources":["Nelson《兒科學》高血鉀","心悸"]}},"103100-N4-25":{"quick":"產後生理變化『錯誤』的是「產後初期心輸出量減少,可能發生心搏過緩」(本題B)——本題答B。","detail":{"background":"產後生理變化:產後約4週恢復孕前心輸出量、肌肉用力脫水致短暫體溫上升、橫膈壓力降呼吸順暢皆正確。「『產後『初期『心輸出量『『『減少』」錯誤——『『產後『初期『因『子宮『血液『回流『體循環+『組織『間液『回收『→『『心輸出量『『『『增加(非減少)』』,『可『『心搏『過『緩(bradycardia,代償)』』。本題「錯誤」者為B(心輸出量初期增加非減少)。","options":{"A":"正確。產後約4週恢復孕前心輸出量。","B":"錯誤(本題答案)。產後初期心輸出量『增加』(非減少),可心搏過緩。","C":"正確。肌肉用力與脫水致短暫體溫上升。","D":"正確。橫膈壓力降低使呼吸較產前順暢。"},"sources":["新文京《產科護理學》產後","心輸出量"]}},"103100-N4-34":{"quick":"孕10週陰道少量褐色分泌物伴腹痛(先兆性流產),『較不恰當』的建議是「應到醫院接受陰道內診檢查」。","detail":{"background":"孕早期『陰道『出血『伴『腹痛(『先兆性『流產『徵象)』:應『『臥床『休息、『『暫停『性生活、『繼續『觀察『分泌物』。「『接受『『陰道『『內診『檢查』」較不恰當——『『先兆『流產『『出血『時『『陰道『內診『可能『『刺激『子宮『加重『出血/流產』,『應『『避免『不必要『的『內診(以『超音波『評估)』」。本題較不恰當者為B。","options":{"A":"恰當。建議臥床休息。","B":"較不恰當(本題答案)。出血時陰道內診刺激子宮,應避免(用超音波)。","C":"恰當。繼續觀察陰道分泌物情形。","D":"恰當。暫停性生活。"},"sources":["新文京《產科護理學》先兆流產","內診"]}},"104030-N4-18":{"quick":"產後1週嬰兒是否吃到足夠奶水評估『錯誤』的是「1天小便的次數約3~4次」。","detail":{"background":"母乳哺餵『足夠『指標』:『『每2~3小時『餵『1次、『『1天『『小便『『『『6~8次『以上(『尿量足『表『奶水足)』、『體重『漸增(1個月約增『0.5~1kg)、吃飽後『安詳『入睡』。「『1天『小便『『『3~4次』」錯誤——『奶水『足『時『1天『小便『應『『『≥6次』(3~4次『偏少『提示『攝取『不足)』」。本題「錯誤」者為B。","options":{"A":"正確。平均每2~3小時餵食1次。","B":"錯誤(本題答案)。奶水足時1天小便應≥6次(非3~4次)。","C":"正確。體重漸增,1個月約增0.5公斤(以上)。","D":"正確。吃飽後會安詳舒服睡著。"},"sources":["新文京《產科護理學》母乳","尿量"]}},"104030-N4-30":{"quick":"葡萄胎(Mole)敘述正確的是「臨床表徵包括嚴重噁心嘔吐、子宮腫大超過懷孕週數、可能測不到胎心音」。","detail":{"background":"葡萄胎(hydatidiform mole,妊娠滋養層疾病):(1)『好發『『年齡『『極端(『<20或『>35『歲『婦女;非『丈夫『>45/抽菸)』』,A錯;(2)「『嚴重『噁心『嘔吐(高hCG)、『子宮『『腫大『『超過『週數、『『測『不到『胎心音(無胎兒)」——正確;(3)『追蹤『標記『是『『『hCG(非『FSH)』』,C錯;(4)『治療『『『清除『葡萄胎(子宮『搔刮)+『追蹤『hCG『(非『給『高劑量『hCG)』』,D錯。本題為B。","options":{"A":"錯。好發年齡極端(<20或>35歲),非丈夫>45。","B":"正確。嚴重噁心嘔吐、子宮腫大超過週數、測不到胎心音。","C":"錯。追蹤標記是hCG(非FSH)。","D":"錯。治療是清除葡萄胎+追蹤hCG(非給高劑量hCG)。"},"sources":["Berek婦科 葡萄胎","hCG"]}},"104100-N4-61":{"quick":"返家照顧急性中耳炎兒童護理指導『錯誤』的是「抗生素服用到耳朵不痛時就停止」。","detail":{"background":"急性中耳炎返家:喝奶餵食採坐姿(防奶經歐氏管入中耳)、擤鼻涕壓一側鼻孔、每6個月聽力測驗皆正確。「『『抗生素『『服用『到『『耳朵『『不痛『就『『停止』」錯誤——『『抗生素『須『『『『服完『『整個『療程『(『耳不痛『不代表『細菌『清除;『提早『停『致『『抗藥性/復發)』」。本題「錯誤」者為C。","options":{"A":"正確。喝奶餵食採坐姿(防奶經歐氏管入中耳)。","B":"正確。擤鼻涕時壓住一側鼻孔。","C":"錯誤(本題答案)。抗生素須服完整療程(非耳不痛就停)。","D":"正確。每6個月做一次聽力測驗。"},"sources":["Nelson《兒科學》中耳炎","療程"]}},"105030-N4-24":{"quick":"預防產後便秘最適宜的措施是「早期下床活動」。","detail":{"background":"預防『產後『便秘』:『『『早期『『下床『活動(促腸蠕動)、『多『『喝水(『≥2000~3000cc)、『高纖『飲食、養成『排便『習慣』。本題最適宜為「早期下床活動」(A);飲水<2000cc(B錯,應多喝)、持續托腹帶促腸蠕動(C無此作用)、減少排便防痔瘡(D錯,應規律排便)。本題為A。","options":{"A":"正確。早期下床活動促進腸蠕動。","B":"錯。應多喝水(≥2000cc,非不超過)。","C":"托腹帶無促腸蠕動作用。","D":"錯。應規律排便(非減少排便)。"},"sources":["新文京《產科護理學》產後便秘","活動"]}},"105030-N4-34":{"quick":"妊娠36週、血壓160/110,可能發展成子癇症的徵候是「②深部肌腱反射過度+③噁心嘔吐(即23)」。","detail":{"background":"妊娠高血壓/子癇前症『進展為『子癇症(eclampsia,抽搐)』的『危險『徵候(嚴重型/即將抽搐)』:『『②『『深部『肌腱『反射『『過度(亢進)、『『③『『噁心『嘔吐、『『上腹『痛、『『頭痛、『視力『模糊、『『『尿量『『『減少(『非『增加)』』。本題為「②③(23)」(B);①尿量『增加『錯(應『減少『寡尿)。本題為B。","options":{"A":"12含①尿量增加(錯,應減少)。","B":"正確。②深部肌腱反射過度+③噁心嘔吐(23)。","C":"13含①尿量增加(錯)。","D":"123含①(錯)。"},"sources":["新文京《產科護理學》子癇前症","反射亢進"]}},"105090-N4-15":{"quick":"待產婦護理正確的是「鼓勵定時解尿,以利胎兒下降」。","detail":{"background":"待產婦護理:(1)「『『鼓勵『『定時『『解尿『(『膀胱『排空『『利『『胎兒『下降『與『子宮『收縮)」——正確;(2)『『避免『『平躺『(『『仰臥『致『『下腔靜脈『壓迫『低血壓);宜『『左側『臥』』,B錯;(3)『『待產『『可『『進『『清淡『飲食/水分『(非『一律『禁食;依產程)』』,C錯;(4)『『『常規『『灌腸『『『非『『必要(現多『不『常規『灌腸)』』,D錯。本題為A。","options":{"A":"正確。鼓勵定時解尿,膀胱排空利胎兒下降。","B":"錯。避免平躺(致低血壓),宜左側臥。","C":"錯。待產可進清淡飲食(非一律禁食)。","D":"錯。灌腸非必要護理(現多不常規)。"},"sources":["新文京《產科護理學》待產","解尿"]}},"106030-N4-53":{"quick":"胎便吸入症候群(MAS)護理評估判斷正確的是「會導致缺氧及小氣道阻塞」。","detail":{"background":"胎便吸入症候群(MAS):『『黏稠『胎便『『吸入『『阻塞『『『小『氣道『→『『『缺氧、『肺泡『過度『擴張『破裂『氣胸、化學性『肺炎』。本題正確為「缺氧及小氣道阻塞」(D);腸阻塞/腹瀉(A,胎便吸入是『呼吸』問題非腸道)、呼吸性鹼中毒(B錯,缺氧致『酸』中毒)、肺栓塞肋膜積水(C非典型)。本題為D。","options":{"A":"錯。MAS是呼吸問題(非腸阻塞/腹瀉)。","B":"錯。缺氧致呼吸性『酸』中毒(非鹼中毒)。","C":"肺栓塞肋膜積水非MAS典型。","D":"正確。MAS導致缺氧及小氣道阻塞。"},"sources":["Nelson《兒科學》MAS","小氣道"]}},"106111-N4-18":{"quick":"促進陰道生產相關措施正確的是「評估解尿可避免膀胱過漲」。","detail":{"background":"促進陰道生產:(1)『『避免『平躺『(致低血壓);宜『左側臥/活動』,A錯;(2)『『待產『『可『『進『清淡『飲食(非『一律『禁食)』』,B錯;(3)「『『評估『『解尿『『避免『『『膀胱『過漲『(膀胱『脹『阻礙『胎頭『下降)」——正確;(4)『『灌腸『『非『『必要(現多『不『常規)』』,D錯。本題為C。","options":{"A":"錯。避免平躺(致低血壓),宜活動/左側臥。","B":"錯。待產可進清淡飲食(非一律禁食)。","C":"正確。評估解尿避免膀胱過漲阻礙胎頭下降。","D":"錯。灌腸非必要(現多不常規)。"},"sources":["新文京《產科護理學》生產","膀胱"]}},"106111-N4-64":{"quick":"6歲心導管檢查後護理正確的是「24小時維持穿刺部位肢體之平直」。","detail":{"background":"心導管檢查後:(1)『『清醒後『『即可『進食『(非『禁食24小時)』』,A錯;(2)「『『『維持『『穿刺部位『『肢體『『平直『(『止血『防『出血;『約『臥床『4~6小時『或『依規定)」——正確;(3)『『砂袋『加壓『約『『2~4小時(『重量『依『情況;1.5kg『砂袋『描述『可,但『時間)』』,C接近;(4)『生命徵象『『第1小時『『每15分鐘(非『每小時)』』,D錯。本題依官方為B。","options":{"A":"錯。清醒後即可進食(非禁食24小時)。","B":"正確(官方)。維持穿刺部位肢體平直(止血)。","C":"砂袋加壓約2~4小時(此項接近,但本題答B)。","D":"錯。生命徵象第1小時每15分鐘(非每小時)。"},"sources":["Nelson《兒科學》心導管","平直"]}},"107030-N4-21":{"quick":"剖腹產後第2天進食腹脹,『不恰當』的措施是「鼓勵進食奶製品」。","detail":{"background":"剖腹產後腹脹護理:腹部擦薄荷油、下床活動、依醫囑用肛門栓劑皆恰當(促腸蠕動排氣)。「『『鼓勵『進食『『奶製品』」不恰當——『『奶製品(及『豆類、甜食)『『『『產氣『『加重『『腹脹』,『腹脹『未『排氣『時『應『『避免『產氣『食物』」。本題不恰當者為A。","options":{"A":"不恰當(本題答案)。奶製品產氣加重腹脹。","B":"恰當。於腹部擦拭薄荷油促腸蠕動。","C":"恰當。協助產婦下床活動。","D":"恰當。依醫囑使用肛門栓劑。"},"sources":["新文京《產科護理學》產後腹脹","產氣"]}},"107030-N4-38":{"quick":"全子宮切除術前腸道準備『不恰當』的是「前三天採低渣飲食」(本題A)——本題答A。","detail":{"background":"子宮切除術『術前『腸道『準備』:『『使用『『抗生素(『腸道『減菌)、『瀉劑、『溫水『灌腸『(『清空『腸道)』。本題『不恰當』為A:依官方,『「『前『『三天『『採『低渣『飲食」『不恰當』——『『術前『『腸道『準備『『多『採『『『清流質/低渣『『約『『1~2天『即可(『「『前『三天』」『時間『敘述『與『標準『不符,或『官方『判『低渣『非『此『情境『重點)』』。本題不恰當者為A。","options":{"A":"不恰當(本題答案,官方)。低渣飲食時間/此項敘述與標準不符。","B":"恰當。使用抗生素(腸道減菌)。","C":"恰當。使用瀉劑清空腸道。","D":"恰當。溫水灌腸。"},"sources":["Berek婦科 術前腸道準備","低渣"]}},"109030-N4-8":{"quick":"懷孕28週羊水指數(AFI)小於5公分(羊水過少),表示胎兒可能「子宮內生長遲滯」。","detail":{"background":"『羊水『過少(AFI『<5cm/oligohydramnios)』可能原因/關聯:『『『胎兒『『泌尿『系統『異常(『腎『發育『不良/尿路『阻塞,『尿少)、『『『胎盤『功能『不良『→『『『子宮內『『生長『遲滯(IUGR)、過熟兒、破水』。本題表示「子宮內生長遲滯」(D);水腦、胎兒過重、食道閉鎖(食道閉鎖致『羊水『過『多』)非羊水過少。本題為D。","options":{"A":"水腦非羊水過少的關聯。","B":"胎兒過重與羊水過多/糖尿病相關。","C":"食道閉鎖致羊水『過多』(非過少)。","D":"正確。羊水過少可能子宮內生長遲滯(胎盤功能不良)。"},"sources":["新文京《產科護理學》羊水過少","IUGR"]}},"109110-N4-24":{"quick":"產後婦女生理復舊變化正確的是「產後初期有利尿現象,可將身體組織囤積過多的液體排出體外」。","detail":{"background":"產後復舊:(1)「『產後『初期『『『利尿『現象『(『懷孕『囤積『的『體液『排出)」——正確;(2)『產後『體溫『『上升『約『『『24小時內、『『≤38°C(非『持續2~3天)』』,B錯;(3)『產後『脈搏『『『『減慢『(『心搏『過緩;非『增快至100)』』,C錯;(4)『產後『腹肌『鬆弛『『『『『便秘『傾向『(非『輕瀉;腸蠕動『『慢)』』,D錯。本題為A。","options":{"A":"正確。產後初期利尿,排出囤積的體液。","B":"錯。產後體溫上升約24小時內、≤38°C(非持續2~3天)。","C":"錯。產後脈搏『減慢』(心搏過緩),非增快至100。","D":"錯。產後便秘傾向(腸蠕動慢),非輕瀉。"},"sources":["新文京《產科護理學》產後復舊","利尿"]}},"109110-N4-29":{"quick":"神經系統反射敘述正確的是「①擁抱反射(四肢對稱外展伸直)+④頸部強直反射(轉向側手腳伸展、對側屈曲)(即14)」。","detail":{"background":"新生兒反射:(1)「『擁抱反射(Moro)『突然『改變『姿勢『→『四肢『『對稱『外展『伸直『再『內收』」——正確;(2)『尋乳反射『觸『嘴角『→『『頭『『轉向『刺激側『張口『尋乳(非『舌頭『伸出)』』,②錯;(3)『巴賓斯基『刺激『足底『外側『→『腳趾『『『『扇形『張開『背屈(非『內縮)』』,③錯;(4)「『頸部『強直『反射(tonic neck)『頭轉『一側『→『『轉向『側『手腳『伸展、『對側『屈曲(『擊劍『姿)」——正確。本題為「①④(14)」(D)。","options":{"A":"12含②(尋乳反射敘述錯)。","B":"23含②③(皆錯)。","C":"34含③(巴賓斯基敘述錯)。","D":"正確。①擁抱反射+④頸部強直反射(14)。"},"sources":["Nelson《兒科學》原始反射","Moro"]}},"110030-N4-40":{"quick":"婦科體外放射治療後腹瀉護理指導『不適當』的是「增加乳製品攝取」。","detail":{"background":"放射治療(骨盆)後『放射性『腸炎『腹瀉』護理:『『維持『水分『平衡、『『『低渣『飲食、必要時『止瀉劑』。「『『增加『『乳製品『攝取』」不適當——『『放射『腸炎『常『『『暫時『『『乳糖『不耐』,『『乳製品『『『加重『『腹瀉』,『應『『避免『或『減少』」。本題不適當者為B。","options":{"A":"適當。維持水分平衡(防脫水)。","B":"不適當(本題答案)。放射腸炎乳糖不耐,乳製品加重腹瀉。","C":"適當。採用低渣飲食。","D":"適當。必要時使用止瀉劑。"},"sources":["婦科 放射性腸炎","乳糖不耐"]}},"110110-N4-31":{"quick":"懷孕32週突發無痛性鮮紅陰道出血(疑前置胎盤)住院安胎,『錯誤』的是「若安胎失敗,只能採剖腹生產」。","detail":{"background":"『『無痛『『鮮紅『陰道『出血(『懷孕『後期)『多『『『前置胎盤(placenta previa)』』。處置:『密切『觀察『生命徵象/出血、『『『禁止『『陰道『內診『(會『『加重『出血)、『評估『治療『前『向『家屬『說明』。「『安胎『失敗『『『只能『剖腹『生產』」錯誤——『『前置胎盤『『『若『『部分『前置/邊緣『且『出血『可控『『『或可『陰道『試產(『『完全『前置『才『『一定『剖腹);『『「『只能『剖腹」『過於『絕對(本題以B為錯誤)』』。本題「錯誤」者為B。","options":{"A":"正確。密切觀察生命徵象及出血狀況。","B":"錯誤(本題答案)。「安胎失敗只能剖腹」過於絕對(視前置程度)。","C":"正確。評估治療前向個案家屬說明程序。","D":"正確。禁止執行陰道檢查(防加重出血)。"},"sources":["新文京《產科護理學》前置胎盤","剖腹"]}},"110110-N4-65":{"quick":"6個月法洛氏四重症維持心輸出量足夠灌流的護理『不適當』的是「每次餵食時間不宜太短,應超過30分鐘」。","detail":{"background":"法洛(TOF)維持心輸出量/灌流:集中護理安撫減哭泣、避免便秘閉氣用力、柔軟大洞奶嘴餵奶皆適當。「『『每次『餵食『『『超過『30分鐘』」不適當——『『心臟病『嬰兒『易『『疲累『耗氧,『『每次『餵食『『『不『超過『『30分鐘(『餵太久『增『耗氧『疲累)』」。本題不適當者為D。","options":{"A":"適當。集中護理、安撫情緒、減少哭泣。","B":"適當。避免便秘造成閉氣用力增心臟負擔。","C":"適當。選柔軟、吸食洞孔稍大的奶嘴。","D":"不適當(本題答案)。每次餵食應『不超過』30分鐘(非超過)。"},"sources":["Nelson《兒科學》法洛","餵食"]}},"112030-N4-4":{"quick":"懷孕時雌性素增加造成孕期不適,正確的是「使陰道黏膜增生,陰道分泌物會增加」。","detail":{"background":"懷孕『雌性素(estrogen)『增加『的『作用』:『『使『『陰道『『黏膜『『增生『『『充血、『『分泌物『『『增加(『白帶)、乳房『發育』。本題正確為「陰道黏膜增生、分泌物增加」(C);頻尿(子宮壓迫膀胱,非雌激素鬆弛膀胱)、心灼熱(『『黃體素『使『腸胃『蠕動『降『+『括約肌『鬆弛,非雌激素)、便秘(黃體素使平滑肌鬆弛)非雌激素主要作用。本題為C。","options":{"A":"頻尿是子宮壓迫膀胱(非雌激素鬆弛膀胱)。","B":"心灼熱是黃體素使腸胃蠕動降(非雌激素)。","C":"正確。雌性素使陰道黏膜增生、分泌物增加。","D":"便秘是黃體素使平滑肌鬆弛(非雌激素)。"},"sources":["新文京《產科護理學》孕期","雌激素"]}},"112030-N4-46":{"quick":"兒童性虐待常見表徵『錯誤』的是「肢體瘦小、皮下脂肪不足的營養不良現象」。","detail":{"background":"兒童『性『虐待『常見『表徵』:『『『外陰/肛門/口/喉『『撕裂傷『瘀傷『腫脹、『『不合宜『性『知識/性化『行為、『睡眠『紊亂『害怕『獨處『同儕『關係『薄弱、『『反覆『『尿道『感染『解尿『困難』。「『『肢體『瘦小、『皮下『脂肪『不足『的『『營養不良』」錯誤——『『『營養不良/瘦小『是『『『『疏忽(neglect)』『的『表徵,『『『非『『性『虐待『的『『常見『表徵』」。本題「錯誤」者為B。","options":{"A":"正確。外陰肛門口喉處撕裂傷瘀傷腫脹。","B":"錯誤(本題答案)。營養不良/瘦小是『疏忽』的表徵(非性虐待)。","C":"正確。睡眠紊亂、害怕獨處、同儕關係薄弱。","D":"正確。反覆的尿道感染及解尿困難。"},"sources":["兒少保護 性虐待","表徵"]}},"112180-N4-31":{"quick":"病童使用Fentanyl貼片護理指導『錯誤』的是「貼片使用期限為24小時,使用貼片時需註明起迄時間」。","detail":{"background":"Fentanyl(吩坦尼)『貼片(『鴉片類『經皮『製劑)』:『『經『『皮膚『吸收、『造成『呼吸『變慢、『貼『平坦『乾燥『處(前胸/後背/上臂/大腿)、『易『耐藥『成癮『便秘、『需『註明『起迄『時間』。「『『使用『期限『『『24小時』」錯誤——『『Fentanyl『貼片『『一片『『可『『維持『『約『『『72小時(3天)』』(非24小時)』」。本題「錯誤」者為D。","options":{"A":"正確。鴉片類經皮吸收,會造成呼吸速度變慢。","B":"正確。貼於平坦處(前胸、後背、上臂、大腿)。","C":"正確。易產生耐藥性、成癮或便秘。","D":"錯誤(本題答案)。Fentanyl貼片可維持約72小時(非24小時)。"},"sources":["藥理 Fentanyl貼片","72小時"]}},"114030-N4-40":{"quick":"5歲長期服用毛地黃(digoxin)護理指導最適當的是「若服藥前測量一分鐘心跳低於90次則暫停服藥一次」(本題D應為錯誤;最適當另選)——本題答D。","detail":{"background":"毛地黃護理:(1)『『嬰兒『心尖脈『<90~100、『『幼兒『<70『暫停(『5歲『幼兒『以『<70『為界;『「<90」『的『界值『須『依『年齡)』』;(2)『『勿『『與『『食物『混合(影響吸收)』』;(3)『『用『利尿劑『時『『『鼓勵『『含鉀『食物(香蕉/深綠菜;『非『避免)』』;(4)「『『漏服『『『4小時(『未超『6小時)『『發現『『補服』」——本題依官方判D最適當(漏服未超6小時可補服)。本題為D。","options":{"A":"5歲幼兒以心尖脈<70為暫停界值(「<90」是嬰兒值)。","B":"錯。勿與食物混合(影響吸收)。","C":"錯。用利尿劑應鼓勵含鉀食物(非避免)。","D":"正確(官方)。服藥後4小時(未超6小時)發現忘記可補服。"},"sources":["Nelson《兒科學》毛地黃","漏服"]}},"114170-N4-34":{"quick":"早產兒呼吸暫停照護處置『錯誤』的是「通常以Indomethacin治療,且須監測血中濃度」。","detail":{"background":"早產兒『呼吸暫停(apnea of prematurity,中樞未成熟)』:『餵奶時呼吸暫停須減緩/停止餵食待恢復、頸部微仰維持呼吸道、給觸覺刺激維持呼吸道通暢皆正確。「『『以『『Indomethacin『治療』」錯誤——『『早產兒『『呼吸『暫停『『用『『『咖啡因(caffeine)/茶鹼(theophylline)『『『呼吸『興奮劑『治療』;『『Indomethacin『是『『關閉『『『開放性『動脈『導管(PDA)』的『藥(非治呼吸暫停)』」。本題「錯誤」者為B。","options":{"A":"正確。餵奶時呼吸暫停須減緩/停止餵食待恢復。","B":"錯誤(本題答案)。早產兒呼吸暫停用『咖啡因』(Indomethacin是關閉PDA)。","C":"正確。頸部微仰維持呼吸道通暢。","D":"正確。給觸覺刺激並維持呼吸道通暢。"},"sources":["Nelson《兒科學》早產兒呼吸暫停","咖啡因"]}},"115030-N4-36":{"quick":"瀕死兒童肌肉緊張力降低,『最不適當』的是「吞嚥困難時仍儘量鼓勵由口進食,訓練肌肉張力」。","detail":{"background":"瀕死兒童『肌肉『緊張『力『降低』照護:『腸胃道『噁心嘔吐便秘腹瀉、『食慾『不佳『少量『多餐、『尿『瀦留『留置『導尿『防感染皆適當。「『『吞嚥『困難『時『『『儘量『鼓勵『由口『進食『訓練『肌肉『張力』」最不適當——『『瀕死『『吞嚥『困難『時『『勉強『經口『進食『『『會『『嗆入/吸入『性『肺炎』,『應『『以『『舒適『為主『(『不『勉強『進食)』」。本題最不適當者為C。","options":{"A":"適當。腸胃道出現噁心嘔吐便秘或腹瀉。","B":"適當。食慾不佳時提供少量多餐。","C":"最不適當(本題答案)。吞嚥困難勉強經口進食會嗆入(應以舒適為主)。","D":"適當。尿瀦留留置導尿管時注意預防感染。"},"sources":["Nelson《兒科學》瀕死","吞嚥"]}}},TO=["1唇腭裂", "2食道氣管食道瘻管與胃食道逆流", "3幽門狹窄", "4巨結腸症與人工肛門造瘻", "5腸套疊疝氣與闌尾炎", "6急性腸胃炎腹瀉與脫水", "7吸收不良乳糜瀉IBD與壞死性腸炎", "8膽道閉鎖與肝膽", "9厭食症復發性腹痛腹部評估與鼻胃管營養", "10母嬰產科與其他借題"],LEC={"1唇腭裂":{"html":"<p><b>唇腭裂(cleft lip/palate)</b>:餵食用<b>特殊奶瓶/柔軟大洞奶嘴</b>、滴管湯匙、<b>直立姿</b>餵食常拍背;<b>最常引起反覆性中耳炎</b>(腭裂致歐氏管功能不良)。</p><p><b>術後</b>:<b>手肘約束</b>防摸傷口、<b>避免俯臥(改仰臥/側臥)</b>、<u>避免吸吮安撫奶嘴/哭泣</u>(拉扯縫合處)、<b>不停吞嚥=出血徵象</b>、餵後清水清潔口腔。</p>"},"2食道氣管食道瘻管與胃食道逆流":{"html":"<p><b>胃食道逆流(GER)</b>:溢奶嘔吐<b>不含膽汁</b>;配方奶<b>加麥粉/米粉增稠</b>、少量多餐、餵後<b>直立/頭高</b>、拍背;<b>cimetidine抑制胃酸</b>;<b>24小時食道pH測定最準確</b>。</p><p><b>氣管食道瘻管(TEF)/食道閉鎖</b>:餵食<b>3C(咳嗽Coughing、哽塞Choking、發紺Cyanosis)</b>;術前禁食+持續口咽抽吸盲端+頭高45~60度;術後<u>鼻胃管滑脫勿自行重插(戳傷吻合處)</u>、抽吸管不超過吻合處。</p>"},"3幽門狹窄":{"html":"<p><b>幽門狹窄(pyloric stenosis)</b>:足月男嬰(3~6週)、<b>噴射狀嘔吐不含膽汁</b>、<b>左至右胃蠕動波</b>、<b>右上腹橄欖狀腫塊</b>、<b>代謝性鹼中毒</b>(失胃酸)。先矯正脫水/電解質/鹼中毒→幽門切開術;術後4~8小時給葡萄糖水、漸進餵食、<b>右側臥/頭高</b>。腹部評估順序<b>視→聽→叩→觸</b>。</p>"},"4巨結腸症與人工肛門造瘻":{"html":"<p><b>巨結腸症(Hirschsprung)</b>:腸壁<b>缺乏副交感神經節</b>(直腸乙狀結腸遠端)、<b>胎便延遲排出</b>、慢性便秘、嘔吐<b>可含膽汁</b>;保守/造瘻後<b>低渣高熱量高蛋白</b>;<u>禁肥皂水灌腸(用生理食鹽水)</u>。</p><p><b>人工肛門造瘻口</b>:正常<b>紅色濕潤</b>(黑/深色=血循不良)、黏膜<b>略高於皮膚</b>、保護膜剪比造瘻口大0.5cm、術後低渣;乙狀結腸造口糞便成形。<b>灌腸</b>:左側臥右膝屈曲、溫度40~43°C、肛管插7.5cm。</p>"},"5腸套疊疝氣與闌尾炎":{"html":"<p><b>腸套疊</b>:陣發腹痛、<b>果醬般血便</b>、<b>右上腹香腸狀腫塊</b>、迴盲型;<b>鋇劑/空氣灌腸液壓復位</b>(穿孔/腹膜炎則手術)、可復發。<b>疝氣</b>:臍疝氣多自癒;腹股溝疝氣<b>紅硬痛(嵌頓)須及早手術</b>。<b>闌尾炎</b>:轉移性右下腹痛、<u>禁熱敷/瀉劑/止痛</u>、屈膝臥、術後半坐臥早下床。學齡前手術避免「切除/切開」字眼、臉譜量表。</p>"},"6急性腸胃炎腹瀉與脫水":{"html":"<p><b>脫水程度(體重%)</b>:輕<5%、<b>中5~10%</b>、重>10%(哭無淚/無尿/脈快弱)。張力型:低張<130、等張130~150、高張>150。治療:輕中度<b>口服電解質液(ORS)</b>+繼續母乳、重度靜脈輸液;<u>勿泡濃奶</u>、可改無乳糖配方。</p><p><b>病原</b>:<b>輪狀病毒</b>嬰幼兒秋冬、<b>口服疫苗</b>、糞口、可併上呼吸道、漂白水消毒;<b>諾羅</b>各年齡、無疫苗、<u>酒精乾洗手無效</u>、急性期禁食補液;沙門氏菌<b>血絲便</b>。臀部護理<u>避免烤燈(燙傷)</u>。</p>"},"7吸收不良乳糜瀉IBD與壞死性腸炎":{"html":"<p><b>乳糜瀉(celiac disease)</b>:對<b>麩質(麥類蛋白)無法耐受的自體免疫腸病變</b>→絨毛萎縮吸收不良;<b>終生避免麩質</b>(小麥大麥黑麥燕麥),可食米玉米馬鈴薯蛋肉。</p><p><b>壞死性腸炎(NEC)</b>:早產兒、<b>腸黏膜缺血缺氧</b>+未成熟+配方奶+細菌、侵犯<b>迴腸末端/近端結腸</b>、嘔吐<b>可含膽汁</b>;<b>立即禁食+全靜脈營養+鼻胃管減壓</b>、避免肛溫;<b>母乳(IgA)為最佳預防</b>。</p>"},"8膽道閉鎖與肝膽":{"html":"<p><b>膽道閉鎖(biliary atresia)</b>:阻塞性黃疸(<b>直接膽紅素↑</b>)、<b>灰白便、暗茶尿、皮膚黃綠</b>、缺膽鹽致<b>脂溶性維生素(ADEK)吸收不良</b>;<b>嬰兒大便卡早期發現</b>、<b>葛西手術出生60天內</b>(愈早愈好)、常需肝移植;飲食<b>中鏈脂肪酸(MCT)配方奶+高蛋白+補脂溶性維生素</b>;未治療→肝硬化脾腫大。膽管炎為術後常見併發症。</p>"},"9厭食症復發性腹痛腹部評估與鼻胃管營養":{"html":"<p><b>厭食症(anorexia)</b>:青少年女性、身體心像扭曲(自覺胖)、閉經、心搏過慢便秘;<b>護理最優先=改善嚴重營養不良</b>、行為契約、體重回復<b>緩慢(每週0.5~1kg)</b>(過快致再餵食症候群/心血管負擔)。<b>復發性腹痛</b>:臍周、無器質病因、時間不規律、無發燒、與心理壓力(拒學)有關。</p><p><b>鼻胃管灌食</b>:長度<b>鼻尖→耳垂→劍突</b>、反抽胃液/測pH確認、灌食前測殘餘量、灌食後<b>右側半坐臥/頭高30度</b>、出現嘔吐腹脹呼吸暫停停止灌食。</p>"},"10母嬰產科與其他借題":{"html":"<p><b>產科</b>:剖腹產後腹脹用薄荷油/翻身/活動(<u>避免奶製品等產氣食物</u>);晨吐=荷爾蒙變化;待產暈眩嘴唇麻=換氣過度(呼吸性鹼中毒);先兆流產出血<u>避免陰道內診</u>;前置胎盤無痛鮮紅出血<u>禁內診</u>;子癇前症<b>反射亢進</b>;葡萄胎<b>子宮腫大超過週數、測不到胎心音、追蹤hCG</b>;羊水過少→IUGR。</p><p><b>其他</b>:高血鉀<b>心悸</b>;中耳炎抗生素<b>服完療程</b>;Fentanyl貼片<b>72小時</b>;早產兒呼吸暫停用<b>咖啡因</b>(Indomethacin是關PDA);新生兒反射(Moro對稱外展、頸部強直擊劍姿)。</p>"}};

TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c5_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
