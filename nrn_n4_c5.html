忘記服藥應補服"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"10母嬰產科與其他借題","topic_num":"小兒腸胃肝膽與營養","topic_code":"C5","q_num":40,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"若服藥前測量一分鐘心跳低於90次則暫停服藥一次","B":"建議與其他食物混合餵食,以利藥物吸收","C":"若使用利尿劑(Lasix),避免香蕉、深綠色蔬菜等含鉀高之食物","D":"於服藥時間後4小時發現忘記服藥應補服"},"img":""},{"id":"114170-N4-34","code":"114170","roc":"114","cat":"N4","catname":"產兒科護理學","num":34,"stem":"有關早產兒呼吸暫停的照護處置,下列敘述何者錯誤?","opts":{"A":"餵奶期間若有呼吸暫停須減緩或停止餵食,待膚色恢復粉紅、四肢放鬆等再繼續餵食","B":"通常以Indomethacin 治療,且須監測血中濃度","C":"為了維持呼吸道通暢,可將其頸部微仰,勿過度屈曲及伸展","D":"若有呼吸暫停,需給予觸覺刺激,並維持呼吸道通暢"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"10母嬰產科與其他借題","topic_num":"小兒腸胃肝膽與營養","topic_code":"C5","q_num":34,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"餵奶期間若有呼吸暫停須減緩或停止餵食,待膚色恢復粉紅、四肢放鬆等再繼續餵食","B":"通常以Indomethacin 治療,且須監測血中濃度","C":"為了維持呼吸道通暢,可將其頸部微仰,勿過度屈曲及伸展","D":"若有呼吸暫停,需給予觸覺刺激,並維持呼吸道通暢"},"img":""},{"id":"115030-N4-36","code":"115030","roc":"115","cat":"N4","catname":"產兒科護理學","num":36,"stem":"瀕死兒童出現肌肉緊張力降低,下列敘述何者最不適當?","opts":{"A":"腸胃道會出現噁心、嘔吐、便秘或腹瀉等症狀","B":"食慾不佳時可以提供病童少量多餐的方式","C":"吞嚥困難時仍儘量鼓勵由口進食,訓練肌肉張力","D":"有尿瀦留而留置導尿管時,需注意預防感染問題"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"10母嬰產科與其他借題","topic_num":"小兒腸胃肝膽與營養","topic_code":"C5","q_num":36,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"腸胃道會出現噁心、嘔吐、便秘或腹瀉等症狀","B":"食慾不佳時可以提供病童少量多餐的方式","C":"吞嚥困難時仍儘量鼓勵由口進食,訓練肌肉張力","D":"有尿瀦留而留置導尿管時,需注意預防感染問題"},"img":""}],E={"101030-N4-75":{"quick":"唇腭裂(cleft lip and palate)餵食注意事項錯誤的是「為避免嗆到,瓶餵時宜選擇較硬且孔小的奶嘴」(B)。","detail":{"background":"唇腭裂因口腔裂隙無法形成有效吸吮負壓,瓶餵應選「較軟、孔較大(或十字孔)的特殊奶嘴」以利奶水流出、減少費力與吞氣,故「較硬孔小」錯誤。其餘正確:可將母奶擠到特殊奶瓶餵、餵食採直立姿勢並常拍背排氣、無法吸吮可用滴管或湯匙緩慢餵。","options":{"A":"正確。可將母奶擠在特殊奶瓶中餵食。","B":"錯誤(本題答案)。應選較軟、孔較大的奶嘴(非較硬孔小)。","C":"正確。直立姿勢餵食並常拍背排氣。","D":"正確。無法吸吮可用滴管或湯匙緩慢餵食。"},"sources":["新文京《兒科護理學》唇腭裂","大孔奶嘴"]}},"102030-N4-76":{"quick":"唇腭裂(cleft lip and palate)最常引起的健康問題是「反覆性中耳炎」(B)。","detail":{"background":"腭裂使咽鼓管(歐氏管)功能異常、中耳引流不良,最常引起「反覆性中耳炎」並可影響聽力。脫水、營養不足、腹瀉非唇腭裂最特異/最常見的健康問題(雖餵食困難可能影響營養,但最典型併發症是中耳炎)。","options":{"A":"脫水非唇腭裂最常見問題。","B":"正確。腭裂致咽鼓管功能異常,最常引起反覆性中耳炎。","C":"營養不足可能但非最典型併發症。","D":"腹瀉與唇腭裂無關。"},"sources":["新文京《兒科護理學》唇腭裂","中耳炎"]}},"107030-N4-77":{"quick":"唇裂與腭裂手術後護理正確的是「出現不停的吞嚥動作,應評估傷口處是否出血」(A)。","detail":{"background":"唇/腭裂術後若病童「不停吞嚥」,可能是傷口出血、血液流入口咽被吞下的徵象,應立即評估傷口出血。術後應避免俯臥(防壓迫摩擦傷口)、避免吸吮與安撫奶嘴(防縫合處裂開)、術後可漸進餵食(非拆線前全程禁食)。","options":{"A":"正確。不停吞嚥可能是傷口出血徵象,應評估。","B":"錯。應避免俯臥(防壓迫摩擦傷口)。","C":"錯。應避免奶嘴/吸吮(防縫合處裂開)。","D":"錯。術後可漸進餵食(非拆線前全程禁食)。"},"sources":["新文京《兒科護理學》唇腭裂","術後出血"]}},"109110-N4-72":{"quick":"3個月唇裂(cleft lip)修補術後護理錯誤的是「協助採取俯臥姿勢,以促進分泌物流出,預防呼吸道阻塞」(A)。","detail":{"background":"唇裂修補術後應避免「俯臥」(會壓迫摩擦傷口致裂開),宜採仰臥或側臥並抬高頭部。其餘正確:適當約束手肘避免病童碰觸傷口、避免吸吮與安撫奶嘴、餵奶後給清水清潔口腔預防感染。","options":{"A":"錯誤(本題答案)。應避免俯臥(壓迫摩擦傷口),宜仰臥/側臥。","B":"正確。適當約束手肘避免碰觸傷口。","C":"正確。避免吸吮,安撫奶嘴暫勿使用。","D":"正確。餵奶後給清水清潔口腔預防感染。"},"sources":["新文京《兒科護理學》唇裂","勿俯臥"]}},"110110-N4-73":{"quick":"嬰兒唇顎裂手術後護理注意事項錯誤的是「避免哭泣影響傷口,可使用安撫奶嘴安撫之」(B)。","detail":{"background":"唇顎裂術後應「避免吸吮與安撫奶嘴」(吸吮動作會牽動、裂開縫合處),可用其他方式安撫。其餘正確:適時約束手臂避免抓到縫線、採直立坐姿餵食、用毛毯限制翻身避免碰到傷口。","options":{"A":"正確。適時約束手臂避免抓到縫線。","B":"錯誤(本題答案)。應避免安撫奶嘴(吸吮會牽動縫合處)。","C":"正確。直立式坐姿是較適合餵食的方式。","D":"正確。用毛毯限制翻身避免碰到傷口。"},"sources":["新文京《兒科護理學》唇顎裂","勿奶嘴"]}},"113030-N4-32":{"quick":"1歲腭裂(cleft palate)修補術後約束護理正確的是「手肘約束法」(C)。","detail":{"background":"腭裂修補術後須防病童把手或物品放入口中碰觸傷口,採「手肘約束法(elbow restraint)」限制手肘彎曲、使手無法摸到嘴,同時保留肢體活動度。木乃伊約束(全身)、手臂約束(綁床)、背心約束皆過度或不適用此情境。","options":{"A":"木乃伊約束(全身)過度,不適用。","B":"手臂約束(綁床)非此情境首選。","C":"正確。手肘約束法防手摸到口腔傷口。","D":"背心式約束限制軀幹,非防手碰口。"},"sources":["新文京《兒科護理學》腭裂","手肘約束"]}},"113180-N4-26":{"quick":"合併唇裂與腭裂嬰幼兒手術前護理措施最適當的是「餵食時,餵食器放於口腔內後方或臉頰內側面,避免奶水進鼻腔內」(D)。","detail":{"background":"唇腭裂術前餵食:將餵食器(奶嘴/滴管)放在口腔後方或健側臉頰內側,讓奶水順利進入咽部、避免從裂隙進入鼻腔嗆到;宜用孔較大的軟奶嘴(非孔小)、採直立姿勢餵(非平躺);多可經口餵食(非一律鼻胃管)。","options":{"A":"錯。宜用孔較大的奶嘴(非孔小,孔小吸不到)。","B":"錯。多可經口特殊餵食(非一律鼻胃管)。","C":"錯。餵食應採直立(非平躺,平躺易嗆/奶入鼻)。","D":"正確。餵食器放口腔後方或臉頰內側,避免奶入鼻腔。"},"sources":["新文京《兒科護理學》唇腭裂","餵食位置"]}},"114030-N4-46":{"quick":"4個月唇裂(cleft lip)修補術後照護較適當的是「須給與適時約束手肘,以避免摩擦臉部影響傷口癒合」(D)。","detail":{"background":"唇裂術後須適時「手肘約束」避免病童手摩擦/抓傷臉部傷口。應避免俯臥(壓迫傷口);不停吞嚥要評估是否傷口出血(非正常現象);避免吸吮與安撫奶嘴(會牽動縫合處)。","options":{"A":"錯。應避免俯臥(壓迫傷口)。","B":"錯。不停吞嚥可能是傷口出血(非正常現象)。","C":"錯。應避免安撫奶嘴(吸吮牽動傷口)。","D":"正確。適時約束手肘避免摩擦臉部影響傷口癒合。"},"sources":["新文京《兒科護理學》唇裂","手肘約束"]}},"102110-N4-72":{"quick":"胃食道逆流治療藥物cimetidine(tagamet)的作用是「抑制胃酸分泌」(D)。","detail":{"background":"cimetidine是H2受體拮抗劑,作用是「抑制胃酸分泌」,減少胃食道逆流時胃酸對食道的傷害(食道炎)。它非促進酵素分解、非促進腸胃蠕動(那是promotility藥)、非止吐藥。","options":{"A":"非促進酵素分解。","B":"促進腸胃蠕動是promotility藥(非cimetidine)。","C":"非止吐藥。","D":"正確。cimetidine(H2拮抗劑)抑制胃酸分泌。"},"sources":["新文京《兒科護理學》GER","H2拮抗劑"]}},"102110-N4-75":{"quick":"氣管食道瘻管(TEF)兒童常呈現的「3C」表徵,除咳嗽、哽塞外還包括「發紺(cyanosis)」(C)。","detail":{"background":"氣管食道瘻管(TEF)/食道閉鎖的典型「3C」是咳嗽(Coughing)、哽塞(Choking)、發紺(Cyanosis):因奶水經瘻管進入氣管或無法下食道而溢出,引起嗆咳與缺氧發紺,餵食時加劇。","options":{"A":"捻髮音是肺部聽診(非3C)。","B":"爆裂音是肺部聽診(非3C)。","C":"正確。3C是咳嗽、哽塞、發紺(cyanosis)。","D":"尖聲哭叫非TEF的3C。"},"sources":["新文京《兒科護理學》TEF","3C"]}},"106110-N4-75":{"quick":"先天性氣管食道瘻管嬰兒術後照護重點錯誤的是「若鼻胃管滑脫應立即重新放置,以免胃液損及傷口」(C)。","detail":{"background":"TEF瘻管關閉與食道吻合術後,鼻胃管位置與長度經精密設定以保護吻合處,若「滑脫不可自行貿然重新插入」(以免戳傷新吻合處),應通知醫師處理。其餘正確:頭抬高45~60度防胃容物逆流、用安撫奶嘴滿足吸吮減少哭泣、抽吸管長度不可超過吻合處。","options":{"A":"正確。頭部抬高45~60度避免胃容物逆流。","B":"正確。用安撫奶嘴減少哭泣致腸胃壓上升。","C":"錯誤(本題答案)。鼻胃管滑脫不可自行重插(恐傷吻合處),應通知醫師。","D":"正確。抽吸管長度不可超越吻合處。"},"sources":["新文京《兒科護理學》TEF","勿自行重插"]}},"108020-N4-59":{"quick":"6個月胃食道逆流(GER)護理指導正確的是「添加麥粉或米粉,泡製較濃稠的配方奶」(A)。","detail":{"background":"GER護理可將配方奶「加稠(加米精/麥粉)」減少溢奶逆流、餵食後採直立或頭高姿勢(非平躺)、少量多餐、餵食中與後拍背排氣。GER的嘔吐物「不含膽汁」(逆流是胃內容物,非膽汁)。","options":{"A":"正確。添加麥粉/米粉加稠配方奶減少逆流。","B":"錯。GER溢奶不含膽汁(含膽汁是腸阻塞)。","C":"錯。餵食後應採直立/頭高(非仰臥平躺)。","D":"錯。仍應拍背排氣(減少胃脹逆流)。"},"sources":["新文京《兒科護理學》GER","加稠"]}},"108110-N4-24":{"quick":"新生兒出生後進行口鼻抽吸的目的是「移除呼吸道分泌物」(B)。","detail":{"background":"新生兒出生後口鼻抽吸的主要目的是「清除口鼻咽的羊水、黏液等分泌物」,維持呼吸道通暢、促進有效呼吸。其非為刺激迷走神經、引發嘔吐反射或移除二氧化碳。","options":{"A":"非刺激迷走神經(過度抽吸反致迷走反射心搏過緩)。","B":"正確。移除呼吸道(口鼻咽)分泌物維持通暢。","C":"非引發嘔吐反射。","D":"非移除二氧化碳。"},"sources":["新文京《兒科護理學》新生兒","口鼻抽吸"]}},"108110-N4-49":{"quick":"8個月疑似胃食道逆流(GER)診斷檢查正確的是「24小時食道酸鹼值測定,是最準確的診斷方法」(D)。","detail":{"background":"24小時食道pH值監測是診斷胃食道逆流「最準確(黃金標準)」的方法,可量化酸逆流的次數與時間。食道鏡看食道黏膜病變(非量逆流量)、上腸胃道攝影喝「含顯影劑的鋇劑」(非牛奶)看結構、腹部超音波非確認食道炎位置的工具。","options":{"A":"食道鏡看黏膜病變(非量逆流量多寡)。","B":"上腸胃道攝影喝鋇劑顯影劑(非含顯影劑牛奶)。","C":"腹部超音波非確認食道炎位置。","D":"正確。24小時食道pH值測定是最準確診斷方法。"},"sources":["新文京《兒科護理學》GER","24小時pH"]}},"111110-N4-72":{"quick":"食道氣管瘻管(TEF)放置鼻胃管護理較不適當的是「鼻胃管灌食後鼓勵採左側臥以預防吸入性肺炎」(D)?——本題答D。","detail":{"background":"本題官方答案為D。一般灌食後採「右側臥或頭高半坐臥」促進胃排空、減少逆流與吸入,而非左側臥,故D較不適當。其餘正確:鼻胃管長度由鼻尖→耳垂→劍突、反抽有胃液確認位置、灌食前反抽評估殘餘量了解消化。","options":{"A":"正確。長度由鼻尖→耳垂→劍突。","B":"正確。反抽有胃液表示位置正確。","C":"正確。灌食前反抽評估殘餘量。","D":"較不適當(本題答案)。灌食後宜右側臥/頭高(非左側臥)促胃排空防吸入。"},"sources":["新文京《兒科護理學》鼻胃管","右側臥"]}},"114100-N4-47":{"quick":"先天性食道閉鎖合併遠端氣管食道瘻管新生兒術前護理措施最適當的是「頭部抬高45~60度,降低胃液逆流」(C)。","detail":{"background":"食道閉鎖合併遠端TEF術前,頭抬高45~60度可減少胃液經瘻管逆流入氣管(防吸入性肺炎)。術前須「禁食」並由近端食道盲端「持續抽吸」分泌物(非由鼻管餵食、非禁止抽吸);應避免吸奶嘴是減少吞氣但首要是禁食抽吸防吸入。","options":{"A":"錯。食道閉鎖無法由鼻管餵食(須禁食、靜脈/手術後餵)。","B":"錯。應持續抽吸近端盲端分泌物(非禁止抽吸)。","C":"正確。頭抬高45~60度降低胃液經瘻管逆流。","D":"避免吸奶嘴非首要(首要是禁食、抽吸防吸入)。"},"sources":["新文京《兒科護理學》食道閉鎖","頭高"]}},"102110-N4-71":{"quick":"幽門狹窄(pyloric stenosis)敘述正確的是「出現噴射狀的嘔吐現象」(B)。","detail":{"background":"肥厚性幽門狹窄好發出生後2~8週的「足月男嬰」(非早產兒高),因幽門肌肥厚阻塞,典型「噴射狀嘔吐」、嘔吐物「不含膽汁」(阻塞在幽門、膽管開口下游之前)、因大量吐酸致「代謝性鹼中毒」(非酸中毒)、右上腹可摸到橄欖狀腫塊。","options":{"A":"錯。好發足月男嬰(非早產兒高)。","B":"正確。出現噴射狀嘔吐。","C":"錯。嘔吐物不含膽汁(阻塞在膽管開口上游)。","D":"錯。大量吐酸致代謝性鹼中毒(非酸中毒)。"},"sources":["新文京《兒科護理學》幽門狹窄","噴射嘔吐"]}},"103100-N4-52":{"quick":"兒童腹部身體評估正確的是「腹部評估順序應為視診、聽診、叩診、觸診」?——本題答D(正常腸蠕動約3~40次/分,此題官方答案為D...實際選項D描述腸蠕動頻率)。","detail":{"background":"兒童腹部評估順序應為「視診→聽診→叩診→觸診」(觸診放最後,因觸診會干擾腸蠕動聲);正常腸蠕動音約每分鐘5~30(本題官方以「約3~40次/分」之選項為正解D);疼痛部位應「最後」觸診(非最先叩診);左下腹腫塊非幽門狹窄(幽門狹窄在右上腹)。","options":{"A":"錯。順序應為視、聽、叩、觸(觸診最後)。","B":"錯。幽門狹窄腫塊在右上腹(非左下腹)。","C":"錯。疼痛部位應最後檢查(非最先叩診)。","D":"正確(本題答案)。聽診腸蠕動性質與頻率(正常腸蠕動次數)。"},"sources":["新文京《兒科護理學》腹部評估","視聽叩觸"]}},"104100-N4-73":{"quick":"6個月鋇劑灌腸確診腸套疊,護理評估與指導錯誤的是「呈噴射狀嘔吐,嘔吐物不含膽汁」(B)。","detail":{"background":"腸套疊典型是「陣發性腹痛、果醬般暗紅血便、右上腹香腸狀腫塊」,嘔吐多為反射性(可含膽汁),並非「噴射狀不含膽汁」(那是幽門狹窄),故B錯誤(此題病情是腸套疊)。其餘正確:果醬般暗紅血便、鋇劑灌腸無法復位則手術、術後屈膝側臥減張力。","options":{"A":"正確。解便特徵為果醬般的暗紅色血便。","B":"錯誤(本題答案)。噴射狀不含膽汁嘔吐是幽門狹窄(非腸套疊)。","C":"正確。鋇劑灌腸無法復位即採外科療法。","D":"正確。術後協助屈膝側臥減少傷口張力。"},"sources":["新文京《兒科護理學》腸套疊","果醬便"]}},"105030-N4-73":{"quick":"3週幽門狹窄備行幽門切開術,手術前後護理不適當的是「術前協助矯正嚴重嘔吐造成的代謝性酸中毒」(B)。","detail":{"background":"幽門狹窄因大量吐出胃酸,造成「代謝性鹼中毒」(低血氯、低血鉀性鹼中毒),術前須矯正的是鹼中毒而非酸中毒,故B錯誤。其餘正確:術前記錄輸出入量/嘔吐物性狀/尿比重、矯正脫水與電解質不平衡、術後4~8小時可開始少量葡萄糖水漸進餵食。","options":{"A":"正確。術前記錄輸出入量、嘔吐物性狀及尿比重。","B":"不適當(本題答案)。幽門狹窄是代謝性鹼中毒(非酸中毒)。","C":"正確。術前矯正脫水及電解質不平衡。","D":"正確。術後4~8小時可開始給少量葡萄糖水。"},"sources":["新文京《兒科護理學》幽門狹窄","鹼中毒"]}},"106111-N4-76":{"quick":"出生3週、餵食後噴射狀嘔吐(酸性、不含膽汁)、左至右胃蠕動波、右上腹橄欖狀腫塊,是「幽門狹窄(pyloric stenosis)」(B)。","detail":{"background":"肥厚性幽門狹窄典型:出生數週後噴射狀嘔吐、嘔吐物酸性不含膽汁(阻塞在膽管開口上游)、上腹可見由左向右的胃蠕動波、右上腹摸到橄欖狀腫塊。巨結腸症(便秘腹脹)、膽道閉鎖(灰白便黃疸)、橫膈疝氣(呼吸窘迫)不符此表現。","options":{"A":"巨結腸症以便秘腹脹為主(非噴射嘔吐)。","B":"正確。噴射嘔吐不含膽汁+橄欖狀腫塊=幽門狹窄。","C":"膽道閉鎖以灰白便、黃疸為主。","D":"橫膈疝氣以呼吸窘迫為主。"},"sources":["新文京《兒科護理學》幽門狹窄","橄欖腫塊"]}},"107030-N4-79":{"quick":"4週幽門狹窄行幽門切開術,護理措施錯誤的是「術後餵食,宜採左側平躺方式」(D)。","detail":{"background":"幽門切開術後餵食宜採「右側臥或頭高半坐臥」促進胃排空、減少逆流,而非左側平躺,故D錯誤。其餘正確:術前監測嘔吐物質與量/輸出入量/尿比重、術前矯正大量吐酸造成的代謝性鹼中毒、術後避免餵食過快並拍背排氣。","options":{"A":"正確。術前監測嘔吐物、輸出入量、尿比重。","B":"正確。術前矯正嘔吐造成的代謝性鹼中毒。","C":"正確。術後避免餵食過快、常拍背排氣。","D":"錯誤(本題答案)。術後餵食宜右側臥/頭高(非左側平躺)。"},"sources":["新文京《兒科護理學》幽門狹窄","右側臥"]}},"110110-N4-74":{"quick":"6週幽門狹窄敘述正確的是「嘔吐多發生在餵食完後」(B)。","detail":{"background":"幽門狹窄因幽門肥厚阻塞,胃內容物無法排空,典型「餵食後不久即噴射狀嘔吐」;嘔吐物「不含膽汁」(非黃褐含膽汁)、胃蠕動波是「由左至右」(非右至左)、大便不含血液黏膜(含血便是腸套疊)。","options":{"A":"錯。嘔吐物不含膽汁(非黃褐含膽汁)。","B":"正確。嘔吐多發生在餵食完後(噴射狀)。","C":"錯。胃蠕動波由左至右(非右至左)。","D":"錯。大便不含血液黏膜(血便是腸套疊)。"},"sources":["新文京《兒科護理學》幽門狹窄","餵後嘔吐"]}},"111110-N4-75":{"quick":"幽門切開術(pyloromyotomy)正確的是「嬰兒需禁食至排氣後,始可給予少量的葡萄糖水或電解質口服液」?——本題答B。","detail":{"background":"本題官方答案為B。幽門切開術後採漸進式餵食:先給少量葡萄糖水/電解質液,若未嘔吐,約「8小時後可漸進增加餵食」。餵食宜抬高頭部、右側臥/半坐臥(非左側臥);幽門切開不致腸阻塞需補脂溶性維生素(非常規)。","options":{"A":"術後採漸進餵食(不必嚴格禁食到排氣才給,給少量葡萄糖水測試)。","B":"正確。給葡萄糖水未嘔吐,8小時後可漸進式餵食。","C":"錯。餵食後宜右側臥/半坐臥(非左側臥)。","D":"錯。幽門切開術後非以補脂溶性維生素為重點。"},"sources":["新文京《兒科護理學》幽門狹窄","漸進餵食"]}},"113180-N4-33":{"quick":"壞死性結腸炎(necrotizing enterocolitis, NEC)敘述正確的是「引起的原因是腸黏膜缺血缺氧」(C)。","detail":{"background":"新生兒壞死性腸炎(NEC)好發早產兒,主因是「腸黏膜缺血缺氧」(周產期窒息、低灌流)後細菌侵犯致腸壁壞死,好發迴腸末端與近端結腸(非幽門/小腸近端);處置「立即禁食、全靜脈營養」(非鼻胃管餵半奶);致病菌非以革蘭氏陽性菌為主。","options":{"A":"錯。NEC非以革蘭氏陽性菌最常侵犯(多為腸內菌)。","B":"錯。好發迴腸末端與近端結腸(非幽門/小腸近端)。","C":"正確。NEC主因是腸黏膜缺血缺氧。","D":"錯。NEC應立即禁食(非鼻胃管餵半奶)。"},"sources":["新文京《兒科護理學》NEC","缺血缺氧"]}},"114100-N4-36":{"quick":"腹部觸診右上腹摸到橄欖樣腫塊,可判斷是「幽門狹窄」(B)。","detail":{"background":"右上腹摸到「橄欖狀(olive-shaped)腫塊」是肥厚性幽門狹窄的典型理學發現(肥厚的幽門肌)。糞便填塞多在左下腹摸到糞塊、腸套疊多在右上腹摸到「香腸狀」腫塊伴果醬便、巨結腸症以腹脹便秘為主。","options":{"A":"糞便填塞多在左下腹摸到糞塊。","B":"正確。右上腹橄欖狀腫塊=幽門狹窄。","C":"腸套疊是香腸狀腫塊(非橄欖狀)。","D":"巨結腸症以腹脹便秘為主(非橄欖狀腫塊)。"},"sources":["新文京《兒科護理學》幽門狹窄","橄欖腫塊"]}},"101110-N4-34":{"quick":"2個月先天性巨結腸症手術前後醫護處置正確的是「若更換造瘻口袋而造成持續出血,需立即就醫」(C)。","detail":{"background":"巨結腸症因遠端腸壁缺乏副交感神經節致便秘腹脹,常先做暫時性結腸造瘻再二期根治。造瘻口黏膜血管豐富,輕微滲血正常,但「持續出血」異常須就醫。腸道準備清潔灌腸應用「等張生理食鹽水」(非肥皂水,肥皂水刺激);兩階段手術間隔依個別狀況非固定1個月;造瘻口術後採「低渣」飲食(非高渣)。","options":{"A":"錯。清潔灌腸應用生理食鹽水(肥皂水刺激腸黏膜)。","B":"兩階段手術間隔依個別狀況(非固定1個月)。","C":"正確。更換造瘻口袋造成持續出血須立即就醫。","D":"錯。造瘻口術後採低渣飲食(非高渣)。"},"sources":["新文京《兒科護理學》巨結腸症","造瘻"]}},"102030-N4-74":{"quick":"8歲腸阻塞人工肛門造瘻口護理指導不適當的是「可利用圖片說明造瘻口呈白色表示功能良好」(D)。","detail":{"background":"健康的造瘻口應呈「紅色/粉紅色」(血流良好),呈白色、蒼白、暗紫或黑色表示血循不良/缺血,屬異常,故「白色表示功能良好」錯誤。其餘適當:用遊戲/娃娃示範更換造瘻口袋與清潔、術後3週內低渣飲食減少蠕動、選寬鬆不需腰帶的衣服。","options":{"A":"適當。用遊戲或娃娃示範更換造瘻口袋與清潔。","B":"適當。術後3週內低渣飲食減少腸蠕動。","C":"適當。選寬鬆、不需腰帶的衣服。","D":"不適當(本題答案)。造瘻口應呈紅色(白色表示缺血,非功能良好)。"},"sources":["新文京《兒科護理學》造瘻口","紅色"]}},"102110-N4-74":{"quick":"慢性輕微巨結腸症保守療法飲食指導正確的是「低渣、高熱量、高蛋白飲食」(B)。","detail":{"background":"巨結腸症保守療法的飲食原則是「低渣(減少糞便量與腸道刺激)、高熱量、高蛋白(維持營養與生長)」。高渣會增加糞便堆積、加重便秘腹脹,故不宜高渣;熱量蛋白須足夠,故非低熱量。","options":{"A":"錯。應低渣(非高渣,高渣加重便秘)。","B":"正確。低渣、高熱量、高蛋白飲食。","C":"錯。熱量須足夠(非低熱量)。","D":"錯。應低渣(非高渣)。"},"sources":["新文京《兒科護理學》巨結腸症","低渣"]}},"103100-N4-77":{"quick":"兒童巨結腸症(Megacolon)敘述正確的是「引起原因為某一段腸壁缺乏副交感神經節」(A)。","detail":{"background":"先天性巨結腸症(Hirschsprung病)因「遠端腸壁缺乏副交感神經節細胞」致該段腸無法蠕動放鬆、糞便堆積近端腸擴大。好發「直腸乙狀結腸」(非降結腸後段);果醬便是腸套疊(非巨結腸);多做「暫時性」造瘻再二期根治(非一定永久造瘻)。","options":{"A":"正確。某段腸壁缺乏副交感神經節(無蠕動)。","B":"錯。好發直腸乙狀結腸(非降結腸後段)。","C":"錯。果醬便是腸套疊(非巨結腸)。","D":"錯。多暫時性造瘻再二期根治(非須永久造瘻)。"},"sources":["新文京《兒科護理學》巨結腸症","神經節缺乏"]}},"106030-N4-73":{"quick":"9歲腸道手術前清潔灌腸(cleansing enema)技術正確的是「將灌腸筒掛於點滴架上,使液面與兒童肛門距離45~60公分」(C)。","detail":{"background":"兒童清潔灌腸:灌腸筒液面與肛門距離約45~60公分(壓力適中、不過快);灌腸液用「生理食鹽水」(非蒸餾水,蒸餾水低張易致水中毒)、溫度約37~40.6°C;體位採「左側臥屈膝」(非右側臥);肛管插入深度依年齡(學齡童約7.5~10公分,深呼吸放鬆肛門括約肌)。","options":{"A":"錯。灌腸用生理食鹽水(蒸餾水低張易水中毒)。","B":"錯。應採左側臥屈膝(非右側臥)。","C":"正確。灌腸筒液面與肛門距離45~60公分。","D":"插入深度約7.5公分大致合理(此題以C為正解)。"},"sources":["新文京《基本護理學》灌腸","45~60公分"]}},"106030-N4-74":{"quick":"1歲半克隆氏症人工結腸造瘻口居家護理錯誤的是「造瘻口黏膜需比周圍皮膚低,以保護周圍皮膚及造瘻口的完整,促進傷口癒合」(D)。","detail":{"background":"正常造瘻口黏膜應「略高於(突出)周圍皮膚」以利排出物進入造口袋、減少滲漏侵蝕周圍皮膚,並非「比周圍皮膚低」,故D錯誤。其餘正確:術後暫時腫脹3~6週後縮小、好的造瘻口呈紅色(黑/深色表血循不良)、保護膜剪成略大於造口約0.5公分。","options":{"A":"正確。造瘻口暫時腫脹約3~6週後漸縮小。","B":"正確。紅色為佳,黑/深色表血循不佳。","C":"正確。保護膜剪略大於造口約0.5公分。","D":"錯誤(本題答案)。造瘻口黏膜應略高於(突出)周圍皮膚(非較低)。"},"sources":["新文京《兒科護理學》造瘻口","突出"]}},"109030-N4-79":{"quick":"先天性巨結腸症(congenital megacolon)臨床表徵錯誤的是「嘔吐物不含膽汁」(B)。","detail":{"background":"巨結腸症因遠端腸阻塞,糞便與腸內容物逆積,嘔吐物「常含膽汁」(阻塞在膽管開口下游的腸段),故「嘔吐物不含膽汁」錯誤(不含膽汁是幽門狹窄)。其餘正確:新生兒胎便延遲排出(>24~48小時)、嬰幼兒慢性便秘、生長遲滯。","options":{"A":"正確。新生兒胎便延遲排出。","B":"錯誤(本題答案)。巨結腸症嘔吐物常含膽汁(不含膽汁是幽門狹窄)。","C":"正確。嬰幼兒慢性便秘。","D":"正確。嬰幼兒生長遲滯。"},"sources":["新文京《兒科護理學》巨結腸症","含膽汁"]}},"110030-N4-75":{"quick":"腸套疊(intussusception)接受鋇劑灌腸治療後正確的是「解出正常的褐色糞便,表示腸套疊可能復原」(D)。","detail":{"background":"腸套疊鋇劑(或空氣)灌腸復位後,若「解出正常褐色糞便(含原本灌入的鋇劑)」表示腸道通暢、復位成功。腸套疊「可能復發」(非不需擔心)、鋇劑灌腸成功就不一定要手術(復位失敗或腸壞死才手術)、解灰白便非正常代表(此處不適用)。","options":{"A":"錯。腸套疊可能復發(非不需擔心)。","B":"錯。鋇劑灌腸成功不一定要手術(失敗才手術)。","C":"此選項敘述不符(復位看是否排正常便)。","D":"正確。解出正常褐色糞便表示腸套疊可能復原。"},"sources":["新文京《兒科護理學》腸套疊","復位"]}},"112110-N4-75":{"quick":"腸套疊(Intussusception)治療和護理措施正確的是「鋇劑灌腸是以液體和空氣壓力將嵌入腸子推回原位」(C)。","detail":{"background":"腸套疊以「鋇劑(或空氣)灌腸」利用液體/空氣壓力把套入的腸段推回復位(兼具診斷與治療)。不可趴睡壓迫復位(無效且危險);手術復位是「輕柔擠回」非用力拉扯(拉扯會撕裂腸);復位後仍須觀察(可能復發),非立即出院。","options":{"A":"錯。趴睡壓迫無法復位(危險)。","B":"錯。手術是輕柔擠回(非拉扯,拉扯撕裂腸)。","C":"正確。鋇劑灌腸以液體和空氣壓力推回腸子。","D":"錯。復位後仍須觀察(可能復發),非立即出院。"},"sources":["新文京《兒科護理學》腸套疊","鋇劑復位"]}},"113030-N4-46":{"quick":"先天性巨結腸症(congenital megacolon)照護和手術護理指導正確的是「保守療法應採低渣、高熱量、高蛋白飲食」(A)。","detail":{"background":"巨結腸症保守療法飲食採「低渣、高熱量、高蛋白」。腸道準備清潔灌腸用「生理食鹽水」(非肥皂水);術後造瘻口暫時腫脹是「正常」(非須立即通報);健康造瘻口黏膜略「高於」周圍皮膚(非較低)且黏膜無痛覺神經。","options":{"A":"正確。保守療法採低渣、高熱量、高蛋白飲食。","B":"錯。腸道準備用生理食鹽水(非肥皂水)。","C":"錯。術後造瘻口腫脹是正常(非須立即通報)。","D":"造瘻口黏膜無痛覺但應略高於皮膚(非較低)。"},"sources":["新文京《兒科護理學》巨結腸症","低渣"]}},"113100-N4-46":{"quick":"5歲巨結腸症腸道無神經節部位切除術後護理錯誤的是「提供高纖飲食以促進早期排便」(D)。","detail":{"background":"巨結腸症術後早期應採「低渣飲食」減少腸道刺激與糞便量、利吻合處癒合,並非高纖(高纖增加糞量與蠕動,不利早期吻合處),故D錯誤。其餘正確:定時評估疼痛依醫囑止痛、協助翻身防肺炎/肺擴張不全、觀察肛門狹窄與糞便失禁合併症。","options":{"A":"正確。定時評估疼痛,必要時依醫囑給止痛劑。","B":"正確。協助翻身預防肺炎或肺擴張不全。","C":"正確。觀察肛門狹窄及糞便失禁合併症。","D":"錯誤(本題答案)。術後早期應低渣飲食(非高纖促排便)。"},"sources":["新文京《兒科護理學》巨結腸症","術後低渣"]}},"113180-N4-47":{"quick":"人工肛門造瘻口術後護理指導較適當的是「術後三週內採低渣飲食,減少腸蠕動」(B)。","detail":{"background":"造瘻口術後3週內採「低渣飲食」減少腸蠕動與糞便量、利傷口癒合。造瘻口流出大量水樣物可能脫水/異常(非正常);健康造瘻口呈「紅潤濕潤」(非深黑乾燥);乙狀結腸造口因位置較遠端、糞便多「成形」(非液狀,液狀是迴腸造口)。","options":{"A":"錯。流出大量水樣物可能異常/脫水(非功能正常)。","B":"正確。術後3週內低渣飲食減少腸蠕動。","C":"錯。健康造瘻口紅潤濕潤(非深黑乾燥)。","D":"錯。乙狀結腸造口糞便多成形(液狀是迴腸造口)。"},"sources":["新文京《兒科護理學》造瘻口","低渣"]}},"114030-N4-47":{"quick":"8歲長期便秘行大量灌腸護理指導最不適當的是「大量灌腸溶液的溫度,以30~36°C左右較合適」(A)。","detail":{"background":"灌腸溶液溫度應接近體溫、約「37~40.6°C」(太低會刺激腸痙攣與不適),30~36°C偏低不適當。其餘適當:用遊戲/故事/娃娃示範解釋灌腸、灌腸中出現臉色蒼白冒冷汗心跳快應停止並通知醫師、採左側臥右膝屈曲姿勢。","options":{"A":"最不適當(本題答案)。灌腸溶液應約37~40.6°C(30~36°C偏低刺激腸痙攣)。","B":"適當。用遊戲/故事/娃娃示範解釋灌腸。","C":"適當。出現臉色蒼白冒冷汗心跳快應停止並通知醫師。","D":"適當。採左側臥、右膝屈曲姿勢。"},"sources":["新文京《基本護理學》灌腸","溫度"]}},"115030-N4-45":{"quick":"腸套疊(intussusception)敘述正確的是「右上腹可觸及香腸狀的腫塊」(A)。","detail":{"background":"腸套疊(好發嬰幼兒)典型:右上腹可觸及「香腸狀腫塊」、陣發性腹痛、果醬般暗紅血便、嘔吐。最常見型態是「迴腸套入結腸(迴盲部)」(非乙狀結腸入直腸);症狀是果醬血便(非脂肪便);出現腹膜炎/腸穿孔須「手術」(非鋇劑灌腸,穿孔禁灌腸)。","options":{"A":"正確。右上腹可觸及香腸狀腫塊。","B":"錯。最常見是迴腸套入結腸迴盲部(非乙狀結腸入直腸)。","C":"錯。是果醬血便(非脂肪便)。","D":"錯。腹膜炎/穿孔須手術(穿孔禁鋇劑灌腸)。"},"sources":["新文京《兒科護理學》腸套疊","香腸腫塊"]}},"101110-N4-8":{"quick":"4歲疝氣手術治療,較不適當的護理措施是「使用10公分數字量表評估疼痛程度」(C)。","detail":{"background":"4歲幼兒尚無法理解抽象的「數字評分量表(0~10)」,應使用適齡的「臉譜量表(faces scale)」或行為觀察評估疼痛,故用10公分數字量表不適當。其餘適當:注射後貼膠布(學齡前怕身體完整性受損)、避免用切除/切開等驚嚇字眼、用遊戲表達疼痛感受。","options":{"A":"適當。注射後貼膠布(維護身體完整感)。","B":"適當。避免用切除/切開等驚嚇字眼。","C":"較不適當(本題答案)。4歲宜用臉譜量表(非抽象的10公分數字量表)。","D":"適當。用遊戲方式讓病童表達疼痛感受。"},"sources":["新文京《兒科護理學》疼痛評估","臉譜量表"]}},"101110-N4-35":{"quick":"疝氣敘述正確的是「腹股溝疝氣若局部出現紅、硬且疼痛時,必須及早手術」(B)。","detail":{"background":"腹股溝疝氣若出現「局部紅、硬、疼痛」表示可能箝閉/絞扼(腸子卡住缺血),屬急症須及早手術。臍疝氣多隨成長自癒(非更嚴重);橫膈疝氣是橫膈缺損致腹腔臟器入胸腔(非只做疝氣囊高位結紮);腹股溝疝氣男:女約「4~6:1」(男多於女,非1:5)。","options":{"A":"錯。臍疝氣多隨成長自癒(非更趨嚴重)。","B":"正確。腹股溝疝氣紅硬疼痛(箝閉)須及早手術。","C":"錯。橫膈疝氣是橫膈缺損(非只做疝氣囊高位結紮)。","D":"錯。腹股溝疝氣男多於女(非1:5)。"},"sources":["新文京《兒科護理學》疝氣","箝閉"]}},"104030-N4-73":{"quick":"9歲下腹痛發燒噁心嘔吐煩躁(疑闌尾炎),護理措施正確的是「協助採屈膝臥躺姿勢,以增加其舒適感」(C)。","detail":{"background":"疑似闌尾炎/腹膜刺激時,協助「屈膝臥躺(屈髖屈膝)」可放鬆腹肌、減輕腹痛增加舒適。腹部評估順序是「視、聽、叩、觸」(觸診最後,非視叩觸聽);巴賓斯基徵象是評估錐體束(非闌尾炎);「禁熱敷腹部」(熱敷會促進發炎、增加闌尾破裂風險)。","options":{"A":"錯。腹部評估順序是視、聽、叩、觸(非視叩觸聽)。","B":"錯。巴賓斯基徵象評估錐體束(非闌尾炎)。","C":"正確。協助屈膝臥躺放鬆腹肌、增加舒適。","D":"錯。禁熱敷腹部(會加重發炎、增破裂風險)。"},"sources":["新文京《兒科護理學》闌尾炎","屈膝"]}},"107030-N4-61":{"quick":"5歲疝氣手術,減輕手術焦慮最適宜的是「拿繃帶、紗布、安全剪刀、膠布與洋娃娃,引導小玲了解治療過程」(C)。","detail":{"background":"學齡前兒童(5歲)以「治療性遊戲」最能減輕手術焦慮:用娃娃與醫療用物示範、讓孩子操作扮演,將陌生情境具體化、增加掌控感。講別人勇敢經歷、僅口頭說明、避免在面前討論並非最有效的減焦慮方式。","options":{"A":"講別人勇敢經歷非最有效(每個孩子不同)。","B":"僅口頭說明對學齡前不夠具體。","C":"正確。用醫療用物與娃娃做治療性遊戲引導了解過程。","D":"寸步不離陪伴雖好,但治療性遊戲更直接減焦慮。"},"sources":["新文京《兒科護理學》治療性遊戲","學齡前"]}},"109110-N4-76":{"quick":"11歲闌尾炎盲腸切除術後護理措施正確的是「定時監測傷口有無紅、腫、熱、痛等發炎現象」(B)。","detail":{"background":"闌尾切除術後須監測傷口感染徵象(紅腫熱痛)與是否腹膜炎。疼痛應「適當給止痛劑」(非少用)、且「禁腹部熱敷」(熱敷增發炎);應鼓勵「早期下床活動」促腸蠕動與復原(非臥床少動);有引流管時採「半坐臥(Fowler氏)」利引流至骨盆(非平躺)。","options":{"A":"錯。疼痛應適當給止痛劑、禁腹部熱敷。","B":"正確。定時監測傷口紅腫熱痛等發炎現象。","C":"錯。應鼓勵早期下床活動(非臥床少動)。","D":"錯。有引流管採半坐臥利引流(非平躺)。"},"sources":["新文京《兒科護理學》闌尾炎術後","傷口監測"]}},"111110-N4-50":{"quick":"4歲半疝氣手術,較不適當的護理措施是「向小明解說開刀過程,應避免使用切除切開等字眼來說明」?——本題答C。","detail":{"background":"本題官方答案為C。「注射後用膠布覆蓋注射部位」的目的是滿足學齡前兒童維護「身體完整性」的心理需求(怕器官/血液流失),而非「轉移注意力減輕疼痛」,故C的理由敘述不適當。其餘適當:用臉譜量表評估術前後疼痛、避免用切除/切開驚嚇字眼、用角色扮演遊戲表達疼痛。","options":{"A":"適當。用臉譜量表評估術前後疼痛。","B":"適當。避免用切除/切開等驚嚇字眼。","C":"較不適當(本題答案)。貼膠布是維護身體完整性(非轉移注意力減痛)。","D":"適當。用角色扮演等遊戲表達術前後疼痛。"},"sources":["新文京《兒科護理學》學齡前","身體完整性"]}},"102030-N4-72":{"quick":"9個月嘔吐2天脫水、血鈉147 mEq/L,脫水類型是「高張性脫水」(C)。","detail":{"background":"依血鈉值分脫水類型:低張性(<130)、等張性(130~150)、高張性(>150)。但臨床上血鈉「>145~147即偏高」傾向高張性脫水(失水多於失鈉)。本題血鈉147、官方判為高張性脫水。高張性脫水細胞內脫水、口渴明顯,補液須緩慢避免腦水腫。","options":{"A":"低張性脫水血鈉<130。","B":"等張性脫水血鈉約130~150(本題147偏高,判高張)。","C":"正確。血鈉147偏高,屬高張性脫水。","D":"輕度脫水是程度(非依血鈉分的張力類型)。"},"sources":["新文京《兒科護理學》脫水","高張"]}},"103100-N4-75":{"quick":"2歲食慾差腹脹腹瀉腹痛、便有血絲,糞便培養(stool culture)的目的是「確認腸道感染致病菌原」(B)。","detail":{"background":"糞便「培養(culture)」的目的是培養出腸道感染的致病「細菌」(如沙門氏菌、志賀氏菌),血絲便提示細菌性腸炎。寄生蟲是看糞便蟲卵鏡檢、病毒是抗原/PCR檢測、碳水化合物吸收是還原糖等檢查,皆非「培養」的目的。","options":{"A":"寄生蟲是糞便蟲卵鏡檢(非培養)。","B":"正確。糞便培養是確認腸道感染致病菌。","C":"病毒是抗原/PCR檢測(非培養)。","D":"碳水化合物吸收是還原糖檢查(非培養)。"},"sources":["新文京《兒科護理學》糞便培養","細菌"]}},"104030-N4-72":{"quick":"3個月持續腹瀉,維持臀部會陰皮膚完整性應避免的是「每4小時使用烤燈0.5~1小時,烤燈需距離臀部30公分」(D)。","detail":{"background":"嬰兒臀部護理「應避免烤燈」(嬰兒皮膚嬌嫩、易燙傷,且現已不建議);正確做法是溫和清潔拭乾、暴露空氣自然乾燥、塗凡士林/氧化鋅保護隔離糞便。","options":{"A":"適當。中性溫和肥皂清水洗後紙巾吸乾。","B":"適當。暴露空氣自然乾燥。","C":"適當。塗凡士林/羊毛脂隔離糞便刺激。","D":"應避免(本題答案)。烤燈有燙傷風險(嬰兒不建議)。"},"sources":["新文京《兒科護理學》尿布疹","勿烤燈"]}},"106030-N4-75":{"quick":"沙門氏菌(Salmonella)感染引起的兒童急性腸胃炎,大便型態是「含有血絲」(D)。","detail":{"background":"沙門氏菌等侵襲性細菌感染腸黏膜,大便常「含血絲與黏液、發炎性」並伴發燒;水樣無臭多為病毒性(輪狀病毒)、膿樣或黏液也可見於其他細菌性,但沙門氏菌典型以「血絲便」為代表。","options":{"A":"水樣無臭多為病毒性(輪狀病毒)。","B":"含膿樣分泌物非沙門氏菌典型。","C":"含黏膜非最典型描述。","D":"正確。沙門氏菌侵襲腸黏膜,大便含血絲。"},"sources":["新文京《兒科護理學》沙門氏菌","血絲便"]}},"106110-N4-76":{"quick":"輪狀病毒(rotavirus)感染引起兒童急性腸胃炎正確的是「常併有上呼吸道感染」(D)。","detail":{"background":"輪狀病毒好發嬰幼兒、經「糞口」傳染(非飛沫),引起水樣腹瀉並「常合併上呼吸道感染症狀(發燒、咳嗽)」;是病毒感染「不需抗生素」(支持療法為主);糞便處理一般妥善清潔即可(非須漂白水才能棄置的特殊規定)。","options":{"A":"錯。輪狀病毒主要糞口傳染(非飛沫)。","B":"糞便妥善處理即可(非須漂白水才棄置的規定)。","C":"錯。病毒感染不需抗生素治療。","D":"正確。常併有上呼吸道感染症狀。"},"sources":["新文京《兒科護理學》輪狀病毒","糞口"]}},"107030-N4-78":{"quick":"9個月腹瀉、體重9→8.3公斤、囟門凹陷、皮膚黏膜乾、脈搏增加、少尿,脫水程度是「中度脫水」(B)。","detail":{"background":"脫水程度(體重流失%):輕度(嬰兒<5%)、中度(5~10%)、重度(>10%)。本例流失(9−8.3)÷9≈7.8%,屬「中度脫水」,且囟門凹陷、皮膚黏膜乾、脈搏增加、少尿符合中度脫水表現。","options":{"A":"輕度脫水<5%。","B":"正確。流失約7.8%(5~10%)=中度脫水。","C":"重度脫水>10%。","D":"極重度非標準分級(此例為中度)。"},"sources":["新文京《兒科護理學》脫水","中度"]}},"107110-N4-49":{"quick":"9個月、9公斤,一天解水便數次、現8公斤,屬「重度脫水」(D)。","detail":{"background":"脫水程度(體重流失%):輕<5%、中5~10%、重>10%。本例流失(9−8)÷9≈11.1%,>10%,屬「重度脫水」,須靜脈輸液矯正。","options":{"A":"非正常體液流失(流失11%)。","B":"輕度脫水<5%。","C":"中度脫水5~10%。","D":"正確。流失約11%(>10%)=重度脫水。"},"sources":["新文京《兒科護理學》脫水","重度"]}},"108020-N4-57":{"quick":"4歲急性腸胃炎,護理師溝通錯誤的是「首次互動宜安排與小華單獨談話」(C)。","detail":{"background":"與幼兒(4歲)溝通,首次互動宜「有家長/熟悉的人陪伴」以減少分離焦慮與陌生恐懼,不宜單獨談話,故C錯誤。其餘正確:先讓幼兒熟悉護理師存在、配合幼兒高度(蹲下平視)談話、避免說「打針一點都不痛」(不實承諾失信任)。","options":{"A":"正確。先讓小華熟悉護理師的存在。","B":"正確。配合小華的高度與他談話。","C":"錯誤(本題答案)。幼兒首次互動宜有家長陪伴(非單獨談話)。","D":"正確。避免說打針一點都不痛(不實承諾)。"},"sources":["新文京《兒科護理學》溝通","陪伴"]}},"109110-N4-73":{"quick":"腹瀉3天每天10次、體重10→9.2公斤、尿量減少,脫水程度是「中度脫水」(C)。","detail":{"background":"脫水程度(體重流失%):輕<5%、中5~10%、重>10%。本例流失(10−9.2)÷10=8%,屬「中度脫水」,須補充水分電解質。","options":{"A":"有脫水(流失8%)。","B":"輕度脫水<5%。","C":"正確。流失8%(5~10%)=中度脫水。","D":"重度脫水>10%。"},"sources":["新文京《兒科護理學》脫水","中度"]}},"110030-N4-74":{"quick":"預防輪狀病毒感染的家屬護理指導錯誤的是「需注射兩劑輪狀病毒疫苗」(B)。","detail":{"background":"輪狀病毒疫苗是「口服」疫苗(非注射),且依廠牌為「2或3劑」口服,故「需注射兩劑」敘述錯誤。其餘正確:勤洗手、減少出入公共場所、勿吃生食並保持廚房器具食材清潔。","options":{"A":"正確。鼓勵勤洗手。","B":"錯誤(本題答案)。輪狀病毒疫苗是口服(非注射)。","C":"正確。減少出入公共場所。","D":"正確。勿吃生食、保持廚房器具食材清潔。"},"sources":["新文京《兒科護理學》輪狀病毒","口服疫苗"]}},"110110-N4-75":{"quick":"2歲嘔吐發燒38.6度、解水樣綠便多次、進食尿量減少、體重14→13.1公斤,脫水程度是「中度脫水」(C)。","detail":{"background":"脫水程度(體重流失%):輕<5%、中5~10%、重>10%。本例流失(14−13.1)÷14≈6.4%,屬「中度脫水」,須補充水分電解質、評估循環。","options":{"A":"有脫水(流失6.4%)。","B":"輕度脫水<5%。","C":"正確。流失約6.4%(5~10%)=中度脫水。","D":"重度脫水>10%。"},"sources":["新文京《兒科護理學》脫水","中度"]}},"112110-N4-73":{"quick":"評估病童「重度脫水」會有的徵象是「哭沒有眼淚」(B)。","detail":{"background":"重度脫水(>10%)徵象:哭時無淚、口腔黏膜乾、眼眶與囟門凹陷、皮膚飽滿度差、尿量極少或無尿、脈搏快而弱、血壓下降、嗜睡。「哭沒有眼淚」符合;頻尿、體重減輕<5%(輕度)、脈搏下降(重度是脈搏增快)皆非重度脫水。","options":{"A":"重度脫水是少尿/無尿(非頻尿)。","B":"正確。哭沒有眼淚是重度脫水徵象。","C":"體重減輕<5%是輕度脫水(非重度)。","D":"重度脫水脈搏增快而弱(非下降)。"},"sources":["新文京《兒科護理學》脫水","哭無淚"]}},"112110-N4-76":{"quick":"5個月持續腹瀉護理指導較不適當的是「需泡兩倍濃度的全奶,防止營養不良」(B)。","detail":{"background":"腹瀉時不可把配方奶「泡濃(兩倍濃度)」(高滲透壓會加重腹瀉與脫水),應依正常比例或暫用無乳糖配方;可給口服電解質液補充。其餘適當:中性溫和肥皂清水洗臀擦乾、改喝無乳糖配方奶(腹瀉常致暫時乳糖不耐)、輕中度腹瀉給電解質口服液。","options":{"A":"適當。中性溫和肥皂清水清洗臀部並擦乾。","B":"較不適當(本題答案)。不可泡兩倍濃度全奶(高滲透壓加重腹瀉)。","C":"適當。可改喝無乳糖配方奶(腹瀉致乳糖不耐)。","D":"適當。輕中度腹瀉給電解質口服液。"},"sources":["新文京《兒科護理學》腹瀉","勿泡濃"]}},"112180-N4-46":{"quick":"輪狀病毒(rotavirus)和諾羅病毒(norovirus)比較錯誤的是「輪狀病毒會產生腸毒素,諾羅病毒機轉尚不清楚」(C)。","detail":{"background":"輪狀病毒致病機轉是病毒破壞小腸絨毛上皮、影響吸收與分泌(其NSP4具腸毒素「樣」作用,但敘述為「產生腸毒素」並不精確),官方判C為錯誤。其餘正確:輪狀好發嬰幼兒、諾羅好發各年齡;輪狀有疫苗、諾羅無;兩者皆糞口傳染。","options":{"A":"正確。輪狀好發嬰幼兒,諾羅好發各年齡層。","B":"正確。輪狀有疫苗,諾羅無疫苗。","C":"錯誤(本題答案)。輪狀致病以破壞絨毛為主(敘述為產生腸毒素不精確)。","D":"正確。兩者傳染途徑均屬糞口傳染。"},"sources":["新文京《兒科護理學》病毒腸炎","機轉"]}},"113030-N4-47":{"quick":"兒童急性腹瀉時護理處置最適當的是「水分的補充可給與口服葡萄糖電解質水」(C)。","detail":{"background":"急性腹瀉處置首重「補充水分與電解質」,可給口服葡萄糖電解質液(ORS)預防脫水。腸道吸附劑(kaolin-pectin)不建議常規併食物使用;不可用「雞湯」取代配方奶(電解質不均);配方奶「不可泡濃」(高滲透壓加重腹瀉)。","options":{"A":"腸道吸附劑不建議常規使用。","B":"錯。不可用雞湯取代配方奶(電解質不均)。","C":"正確。給口服葡萄糖電解質液補充水分。","D":"錯。配方奶不可泡濃(高滲透壓加重腹瀉)。"},"sources":["新文京《兒科護理學》腹瀉","ORS"]}},"114100-N4-48":{"quick":"6個月輪狀病毒急性腸胃炎、體重8→7.4公斤,護理處置正確的是「接受電解質口服液治療後,鼓勵持續哺餵母奶」(C)。","detail":{"background":"本例流失(8−7.4)÷8=7.5%屬「中度脫水」(非重度)。輪狀病毒急性腸胃炎可給口服電解質液,並「鼓勵持續哺餵母乳」(母乳有保護成分、且不需停餵)。輪狀是「糞口」傳染(非飛沫戴口罩);疫苗是「口服」(非注射2劑)。","options":{"A":"流失7.5%是中度脫水(非重度)。","B":"錯。輪狀病毒糞口傳染(非飛沫,非戴口罩)。","C":"正確。給電解質口服液後鼓勵持續哺餵母奶。","D":"錯。輪狀病毒疫苗是口服(非注射2劑)。"},"sources":["新文京《兒科護理學》輪狀病毒","持續母乳"]}},"114170-N4-47":{"quick":"諾羅病毒(norovirus)引起的急性腸胃炎正確的是「急性期採禁食和補充水分電解質」(D)。","detail":{"background":"諾羅病毒急性腸胃炎以支持療法為主:急性嘔吐期可「短暫禁食、補充水分電解質」,症狀緩解後漸進飲食。諾羅好發「各年齡層、多見冬季」(非僅嬰幼兒夏季);「無疫苗」(非口服疫苗);諾羅對酒精「抵抗」,須用含氯漂白水消毒(非酒精乾洗手)。","options":{"A":"錯。諾羅好發各年齡、多見冬季(非僅嬰幼兒夏季)。","B":"錯。諾羅無疫苗(非口服疫苗接種)。","C":"錯。諾羅對酒精抵抗,須含氯漂白水(非酒精乾洗手)。","D":"正確。急性期採禁食和補充水分電解質。"},"sources":["新文京《兒科護理學》諾羅病毒","支持療法"]}},"115030-N4-27":{"quick":"16歲長期厭食症、嚴重營養不良,厭食症症狀或行為最不適當的是「嗜睡及腹瀉」(C)。","detail":{"background":"厭食症(神經性厭食)以過度操控食物、自覺體重過重(身體心像扭曲)、限制進食致嚴重營養不良、停經(下視丘性無月經)、便秘(進食少蠕動慢)、心搏過緩、低體溫為特徵。「嗜睡及腹瀉」並非厭食症典型(常是便秘而非腹瀉),故最不適當。","options":{"A":"符合。過分操控食物。","B":"符合。自覺體重過重(身體心像扭曲)。","C":"最不適當(本題答案)。厭食症常便秘(非腹瀉);嗜睡腹瀉非典型。","D":"符合。常有停經情形(下視丘性無月經)。"},"sources":["新文京《兒科護理學》厭食症","便秘"]}},"103030-N4-75":{"quick":"粥樣瀉(celiac disease)應避免給予的食物是「麵包」(B)。","detail":{"background":"乳糜瀉(粥樣瀉/celiac disease)是對麩質(gluten)不耐的自體免疫腸病變,須「無麩質飲食」,避免含麩質的小麥、大麥、黑麥製品(如麵包)。米飯、豆漿、玉米不含麩質,可食用。","options":{"A":"米飯不含麩質,可食用。","B":"正確。麵包(小麥麩質)應避免。","C":"豆漿不含麩質,可食用。","D":"玉米不含麩質,可食用。"},"sources":["新文京《兒科護理學》乳糜瀉","無麩質"]}},"108110-N4-63":{"quick":"新生兒壞死性腸炎(NEC)錯誤的是「常侵犯部位為乙狀結腸及直腸壺腹處」(B)。","detail":{"background":"NEC好發早產兒,因周產期窒息致腸道缺血缺氧、再灌注與細菌侵犯,常侵犯「迴腸末端與近端結腸」而非乙狀結腸/直腸壺腹,故B錯誤。其餘正確:周產期窒息腸缺氧致壞死、哺餵母乳(IgA)為最佳預防、避免測肛溫以免傷害腸黏膜。","options":{"A":"正確。周產期窒息腸缺氧致壞死及細菌侵犯。","B":"錯誤(本題答案)。NEC常侵犯迴腸末端與近端結腸(非乙狀結腸/直腸壺腹)。","C":"正確。哺餵母乳(IgA)為最佳預防。","D":"正確。避免測肛溫以免傷害腸黏膜。"},"sources":["新文京《兒科護理學》NEC","迴腸末端"]}},"111030-N4-73":{"quick":"乳糜瀉(celiac disease)不適合食用的食物是「燕麥片」(A)。","detail":{"background":"乳糜瀉須無麩質飲食。燕麥本身雖不含麩質,但市售燕麥片常在加工中受小麥麩質「交叉污染」,故對麩質過敏的乳糜瀉兒童不適合食用(除非標示無麩質)。玉米、米飯、蛋本身無麩質,可食用。","options":{"A":"不適合(本題答案)。燕麥片常受麩質交叉污染,不適合。","B":"玉米不含麩質,可食用。","C":"米飯不含麩質,可食用。","D":"蛋不含麩質,可食用。"},"sources":["新文京《兒科護理學》乳糜瀉","燕麥污染"]}},"113030-N4-35":{"quick":"26週早產壞死性腸炎(NEC)護理照護最不適當的是「護理評估發現腸蠕動減慢,嘔吐物不含膽汁」(D)。","detail":{"background":"NEC的腹部表現是腹脹、腸蠕動減弱、「嘔吐物常含膽汁(腸阻塞)」與血便,故「嘔吐物不含膽汁」不符,最不適當。其餘適當:避免測肛溫防傷腸黏膜、初期觀察活動力下降/體溫不穩/呼吸窘迫、立即禁食給全靜脈營養。","options":{"A":"適當。避免測肛溫防腸道受損。","B":"適當。觀察活動力下降、體溫不穩、呼吸窘迫。","C":"適當。立即禁食給全靜脈營養。","D":"最不適當(本題答案)。NEC嘔吐物常含膽汁(非不含膽汁)。"},"sources":["新文京《兒科護理學》NEC","含膽汁"]}},"113180-N4-45":{"quick":"乳糜或粥樣瀉(celiac disease)正確的是「是自體免疫疾病,對麩質無法耐受所造成的腸病變」(A)。","detail":{"background":"乳糜瀉是「自體免疫」疾病,對麩質(gluten)不耐造成小腸絨毛萎縮、吸收不良。飲食治療是「無麩質」(避免穀類麥類,故B錯);臨床有腹瀉、脂肪便、腹脹、生長遲滯(非無腹痛解血絲便);治療靠飲食非廣效抗生素。","options":{"A":"正確。自體免疫、對麩質不耐造成的腸病變。","B":"錯。飲食治療是無麩質(避免穀麥類,非以穀麥為主)。","C":"錯。有腹瀉脂肪便腹脹(非無腹痛解血絲便)。","D":"錯。治療靠無麩質飲食(非廣效抗生素)。"},"sources":["新文京《兒科護理學》乳糜瀉","自體免疫"]}},"101030-N4-74":{"quick":"膽道閉鎖之病因及臨床表徵錯誤的是「間接膽紅素增加,造成皮膚呈現黃綠色」(C)。","detail":{"background":"膽道閉鎖因膽道阻塞、膽汁無法排入腸道,造成「直接(結合型)膽紅素」逆流入血而升高,皮膚呈黃綠色、尿含膽紅素(暗茶色)、大便因無膽色素而灰白。間接(未結合)膽紅素增加是溶血性黃疸,非膽道閉鎖,故C錯誤。其餘正確:膽汁無法排出致灰白便、缺膽鹽致脂肪與脂溶性維生素吸收不良、尿含膽紅素呈暗茶色。","options":{"A":"正確。膽汁無法排出至腸道,大便逐漸變灰白色。","B":"正確。缺膽鹽無法吸收脂肪及脂溶性維生素。","C":"錯誤(本題答案)。是直接膽紅素增加(間接增加是溶血性)。","D":"正確。尿中含膽紅素,尿液呈暗茶色。"},"sources":["新文京《兒科護理學》膽道閉鎖","直接膽紅素"]}},"103100-N4-76":{"quick":"膽道閉鎖(Biliary atresia)父母護理指導錯誤的是「病童需要長期攝取長鏈脂肪酸之配方奶或低蛋白牛奶」(D)。","detail":{"background":"膽道閉鎖因缺膽鹽無法消化「長鏈脂肪」,應改用「中鏈脂肪酸(MCT)」配方奶(不需膽鹽即可吸收)、且須「高蛋白、高熱量」維持生長,故「長鏈脂肪酸/低蛋白」錯誤。其餘正確:注意皮膚尿液是否茶黃、葛西手術最適時機在出生60天內、定期追蹤肝功能。","options":{"A":"正確。注意病童皮膚、尿液是否呈茶黃色。","B":"正確。葛西手術最適時機在出生60天內。","C":"正確。需定期追蹤肝功能變化。","D":"錯誤(本題答案)。應用中鏈脂肪酸配方奶、高蛋白(非長鏈脂肪/低蛋白)。"},"sources":["新文京《兒科護理學》膽道閉鎖","中鏈脂肪"]}},"106030-N4-72":{"quick":"1個月膽道閉鎖鼻胃管灌食(每餐150mL)、反抽胃殘餘量50mL,正確的護理措施是「將反抽的胃殘餘量灌回,再灌入100mL」(C)。","detail":{"background":"鼻胃管灌食前反抽出的胃殘餘量代表上次未消化完的奶,應「灌回(避免流失電解質與胃酸)」,並從本次預定量中「扣除殘餘量」(150−50=100mL)再灌入,以免過量致腹脹嘔吐。殘餘量過多(如超過餵食量一定比例)才需評估暫停。","options":{"A":"殘餘50mL未達須停餵的程度(灌回扣量即可)。","B":"錯。不應倒掉殘餘量(會流失電解質胃酸)。","C":"正確。殘餘量灌回,本次扣除後再灌入100mL。","D":"錯。應扣除殘餘量(150−50=100,非再灌150)。"},"sources":["新文京《兒科護理學》鼻胃管","殘餘量扣除"]}},"109030-N4-62":{"quick":"3個月膽道閉鎖未治療致肝硬化,提供家屬支持不適當的是「主動多次提及並討論未能於小群出生時及早發現膽道閉鎖的原由」(B)。","detail":{"background":"家庭支持應「以家屬關心的事為焦點、同理傾聽、真誠關懷、提供資源」,不應「反覆提及未能早期發現的原由」(會加深父母的自責與罪惡感),故B不適當。其餘適當:焦點放在家屬關心的事、陪伴傾聽焦慮、真誠關懷並提供訊息資源。","options":{"A":"適當。會談焦點放在家屬關心的事情上。","B":"不適當(本題答案)。反覆提及未及早發現會加深父母自責。","C":"適當。陪伴並同理傾聽家屬焦慮。","D":"適當。流露真誠關懷並提供訊息與資源。"},"sources":["新文京《兒科護理學》家庭支持","勿加深自責"]}},"109030-N4-66":{"quick":"6歲膽道閉鎖面臨死亡,父母與病童討論死亡錯誤的是「僅提及快樂的事情,避免引發哀傷反應,以減輕小瑋焦慮」(A)。","detail":{"background":"與末期兒童談死亡,應「誠實、開放、認真回應」其疑問,讓孩子有機會表達對死亡的想法與恐懼;「僅提快樂事、避談死亡」會使孩子孤立、無法處理情緒,故A錯誤。其餘正確:孩子主動提及死亡時認真回應不虛應、問「你的想法呢」讓他表達、父母主動分享自己的感受。","options":{"A":"錯誤(本題答案)。不應僅提快樂事避談(應誠實開放回應)。","B":"正確。孩子主動提及死亡時認真回應、不虛張聲勢。","C":"正確。問「你的想法呢」讓孩子表達。","D":"正確。父母主動分享自己面對死亡的感受。"},"sources":["新文京《兒科護理學》末期溝通","誠實"]}},"109110-N4-75":{"quick":"嬰兒大便卡比對顏色早期發現膽道閉鎖,主要目的是「儘早進行手術,減少肝臟損傷」(C)。","detail":{"background":"兒童健康手冊的「嬰兒大便卡」是讓家長比對大便顏色(灰白便為警訊),目的是「早期發現膽道閉鎖、儘早(出生60天內)接受葛西手術」以建立膽汁引流、減少肝臟硬化損傷。其非預防核黃疸、非給特殊奶粉、非給排膽劑。","options":{"A":"預防核黃疸是新生兒黃疸(非膽道閉鎖大便卡目的)。","B":"非為給特殊奶粉(膽道閉鎖無此代謝奶粉)。","C":"正確。早期發現、儘早手術減少肝臟損傷。","D":"膽道閉鎖無「排膽劑」可使膽汁排出(須手術)。"},"sources":["新文京《兒科護理學》膽道閉鎖","大便卡"]}},"111030-N4-45":{"quick":"1個月膽道閉鎖、父母猶豫是否手術,以家庭為中心護理最適當的是「利用圖片、影片與模型向病童父母解說治療的選擇」(B)。","detail":{"background":"以家庭為中心的護理強調「提供充分資訊、協助父母理解後共同決策」。用圖片、影片、模型解說治療選擇能幫助父母了解、做知情決定。不應隱瞞手術風險、不應糾正民俗信念(應尊重同理)、也不應讓父母獨自決定而醫護不參與(應提供專業協助)。","options":{"A":"錯。不應為減少擔憂而隱瞞開刀風險(應充分告知)。","B":"正確。用圖片影片模型解說治療選擇,協助知情決策。","C":"錯。對民俗信念應尊重同理(非直接駁斥)。","D":"錯。醫護應提供專業協助(非完全不參與)。"},"sources":["新文京《兒科護理學》家庭中心","知情決策"]}},"112030-N4-76":{"quick":"先天性膽道閉鎖正確的是「若未治療,易出現肝硬化、脾腫大現象」(C)。","detail":{"background":"膽道閉鎖若未治療,膽汁鬱積致進行性「肝硬化、門脈高壓、脾腫大」、肝衰竭。其缺乏的是「脂溶性」維生素(非水溶性);葛西手術後仍可能進展,預後不一定良好(部分仍需肝移植);大便是「灰白便」(非血絲暗紅便)。","options":{"A":"錯。是脂溶性維生素缺乏(非水溶性)。","B":"錯。葛西術後預後不一定良好(部分需肝移植)。","C":"正確。未治療易肝硬化、脾腫大。","D":"錯。大便是灰白便(非血絲暗紅便)。"},"sources":["新文京《兒科護理學》膽道閉鎖","肝硬化"]}},"113030-N4-45":{"quick":"膽道閉鎖(biliary atresia)錯誤的是「容易影響脂肪的消化吸收,導致水溶性維生素缺乏」(B)。","detail":{"background":"膽道閉鎖因膽鹽缺乏影響脂肪消化,導致「脂溶性維生素(A、D、E、K)」缺乏,而非水溶性,故B錯誤。其餘正確:灰白便、暗茶色尿、膽管炎是術後常見合併症、用不需膽汁消化的中鏈脂肪酸配方奶與高蛋白。","options":{"A":"正確。常出現灰白色大便、暗茶色尿液。","B":"錯誤(本題答案)。是脂溶性維生素缺乏(非水溶性)。","C":"正確。膽管炎是手術後常見合併症之一。","D":"正確。提供中鏈脂肪酸配方奶、高蛋白牛奶。"},"sources":["新文京《兒科護理學》膽道閉鎖","脂溶性"]}},"115030-N4-47":{"quick":"8個月膽道閉鎖術後偶發膽道炎,飲食護理指導正確的是「採用中鏈脂肪酸的配方奶」(D)。","detail":{"background":"膽道閉鎖因膽鹽不足無法消化長鏈脂肪,應「採用中鏈脂肪酸(MCT)配方奶」(不需膽鹽即可吸收),並補充「脂溶性」維生素(非水溶性)、給高蛋白高熱量(非限蛋白)、不需低鈣。","options":{"A":"錯。應補脂溶性維生素(非水溶性)。","B":"錯。不需低鈣飲食。","C":"錯。應給高蛋白高熱量(非限蛋白)。","D":"正確。採用中鏈脂肪酸配方奶(不需膽鹽即可吸收)。"},"sources":["新文京《兒科護理學》膽道閉鎖","MCT"]}},"103100-N4-44":{"quick":"國小三年級反覆腹痛嘔吐(在家不痛)、不想上學,護理師優先處理的步驟是「建議媽媽嘗試鼓勵小美說出上學的感受」(B)。","detail":{"background":"小美在家不痛、上學前腹痛、檢查無器質問題,屬「學校相關的身心症狀(可能拒學/焦慮)」。優先處理是「鼓勵孩子表達對上學的感受」找出心理壓力來源,而非讓她留家(強化逃避)、急著轉介心理諮商或安排同學來玩。","options":{"A":"讓她留家會強化逃避(非優先)。","B":"正確。優先鼓勵孩子說出對上學的感受找壓力源。","C":"轉介心理諮商非第一步(先了解感受)。","D":"邀同學來玩非處理拒學的優先步驟。"},"sources":["新文京《兒科護理學》拒學","表達感受"]}},"103100-N4-80":{"quick":"14歲體重快速減輕、診斷厭食症,護理計畫中須優先處理的是「改善嚴重的營養不良」(D)。","detail":{"background":"厭食症若已嚴重營養不良,會危及生命(心律不整、電解質失衡),故護理首要優先處理「生理層面的營養不良與生命徵象穩定」,待生理穩定後再處理身體心像、家庭互動與因應能力等心理社會問題。","options":{"A":"改善家人互動是後續心理社會處理。","B":"教導應對能力是後續處理。","C":"矯正身體心像的心理諮商是後續。","D":"正確。優先處理嚴重營養不良(危及生命)。"},"sources":["新文京《兒科護理學》厭食症","營養優先"]}},"106110-N4-56":{"quick":"31週早產兒由口餵食,不是進食壓力性行為線索(feeding stress cues)的是「會因為呼吸而中止吞嚥」(D)。","detail":{"background":"早產兒餵食的壓力線索(須減緩/停餵)包括:吸不到5分鐘就睡著、呼吸喘鼻翼煽動心跳變慢、嗆奶咳嗽膚色改變。「因呼吸而短暫中止吞嚥(吸吮-吞嚥-呼吸協調)」是正常的生理協調節律,而非壓力線索,故D不是。","options":{"A":"是壓力線索。吸不到5分鐘就睡著。","B":"是壓力線索。呼吸喘、鼻翼煽動、心跳變慢。","C":"是壓力線索。嗆奶、咳嗽、膚色改變。","D":"不是(本題答案)。因呼吸短暫中止吞嚥是正常協調節律(非壓力線索)。"},"sources":["新文京《兒科護理學》早產兒餵食","壓力線索"]}},"107030-N4-45":{"quick":"兒童復發性腹痛(recurrent abdominal pain)的特徵是「①腹痛出現在肚臍周圍+③解出鬆軟的大便+④腹痛時間不規律(即134)」(A)。","detail":{"background":"兒童功能性復發性腹痛(RAP)特徵:①痛多在「肚臍周圍」(臍周)、③可伴排便習慣改變(鬆軟便)、④發作時間「不規律」、與壓力情緒相關;它「非轉移性」疼痛(②錯,轉移痛是闌尾炎等器質性)、且「不伴發燒」(⑤錯,發燒提示器質性)。故為①③④。","options":{"A":"正確。①臍周痛+③鬆軟便+④不規律(134)。","B":"145含⑤發燒(發燒提示器質性,非RAP)。","C":"235含②轉移痛、⑤發燒(器質性特徵)。","D":"245含②⑤(非RAP特徵)。"},"sources":["新文京《兒科護理學》復發性腹痛","臍周"]}},"108020-N4-53":{"quick":"14歲厭食症(BMI 13、自覺很胖)維持營養護理措施最適合的是「建立行為契約,與玲玲討論營養攝取目標」(C)。","detail":{"background":"厭食症營養復健宜以「行為契約」與病人共同訂定可達成的營養攝取與體重目標,給予結構與正向增強、漸進增重(每週約0.5~1公斤,過快會致再餵食症候群與心血管負擔)。不宜被動等她願意才進食、不宜每週增3公斤(過快)、且須轉介家庭心理諮商(厭食症需家庭與心理介入)。","options":{"A":"被動等她願意才進食非積極營養維持。","B":"每週增3公斤過快(再餵食症候群風險)。","C":"正確。建立行為契約共同討論營養攝取目標。","D":"厭食症須轉介家庭心理諮商(非不需)。"},"sources":["新文京《兒科護理學》厭食症","行為契約"]}},"108020-N4-78":{"quick":"2個月鼻胃管餵食敘述正確的是「如出現嘔吐、腹脹、呼吸暫停等徵象應立即停止灌食」(B)。","detail":{"background":"鼻胃管灌食時若出現嘔吐、腹脹、呼吸暫停等不耐受徵象,應「立即停止灌食」並評估。總灌入量是「該次灌食量」(殘餘量灌回後扣除,非殘餘量加灌食量);餵食後採「右側臥或頭高半坐臥」(非左側);可給安撫奶嘴滿足吸吮需求(非影響呼吸)。","options":{"A":"錯。總量是該次灌食量(殘餘量灌回扣除,非相加)。","B":"正確。出現嘔吐腹脹呼吸暫停應立即停止灌食。","C":"錯。餵食後採右側臥/頭高(非左側)。","D":"錯。可給安撫奶嘴滿足吸吮(非影響呼吸)。"},"sources":["新文京《兒科護理學》鼻胃管","停灌"]}},"108110-N4-51":{"quick":"厭食症營養復健期間因過度餵食、體重快速增加可能造成的問題是「心血管負擔過重」(A)。","detail":{"background":"厭食症長期營養不良後若「過快補充營養(過度餵食)」,會發生「再餵食症候群」:體液與電解質快速移動致水分滯留、心臟負荷增加(心衰竭、心律不整)、低磷血症,故心血管負擔過重是主要風險。無月經是長期營養不良所致(非過度餵食)、胃出血與暴食症非過度餵食的直接後果。","options":{"A":"正確。過度餵食致再餵食症候群、心血管負擔過重。","B":"無月經是長期營養不良(非過度餵食)。","C":"胃出血非過度餵食直接後果。","D":"暴食症是另一種飲食障礙(非過度餵食後果)。"},"sources":["新文京《兒科護理學》厭食症","再餵食症候群"]}},"110030-N4-47":{"quick":"早產兒口胃管灌食注意事項不適當的是「灌食時,早產兒頭部抬高大於30度」(C)。","detail":{"background":"早產兒口胃管灌食時頭部抬高「約15~30度」即可,「大於30度」並非建議(本題官方判不適當;過度抬高或角度不當對極小早產兒非標準)。其餘適當:插管先以無菌蒸餾水潤滑、每次餵食前檢查胃殘餘量、每日攝取熱量約100~120Kcal/kg。","options":{"A":"適當。插口胃管先以無菌蒸餾水潤滑。","B":"適當。每次餵食前先檢查胃內殘餘量。","C":"不適當(本題答案)。頭部抬高約15~30度即可(大於30度非建議)。","D":"適當。每日攝取熱量約100~120Kcal/kg。"},"sources":["新文京《兒科護理學》早產兒口胃管","抬高"]}},"112030-N4-53":{"quick":"早產兒經口餵食發展照護原則錯誤的是「對於妊娠週數低及低體重的早產兒,餵食時間應延長至60分鐘以減少壓力」(C)。","detail":{"background":"早產兒餵食時間「不宜過長」(延長至60分鐘反而增加能量消耗與疲倦、壓力),應在出現壓力線索時減緩或停止、適時休息,故C錯誤。其餘正確:出現安靜清醒期與飢餓暗示(尋乳、吸吮)即可準備餵、出現壓力暗示(疲倦嗆奶呼吸暫停發紺)減緩或停餵、觀察呼吸膚色調整奶瓶位置流速。","options":{"A":"正確。安靜清醒且有飢餓暗示即可準備餵食。","B":"正確。出現壓力暗示行為需減緩或停止餵食。","C":"錯誤(本題答案)。餵食不宜延長至60分鐘(過長增疲倦/壓力)。","D":"正確。觀察呼吸膚色調整奶瓶位置與流速。"},"sources":["新文京《兒科護理學》早產兒餵食","時間"]}},"113100-N4-45":{"quick":"病童放置鼻胃管護理較適當的是「管灌結束後宜採右側半坐臥或坐姿,頭部抬高30度」(D)。","detail":{"background":"鼻胃管灌食後採「右側半坐臥或坐姿、頭抬高約30度」促進胃排空、減少逆流與吸入。插入長度是「鼻尖→耳垂→劍突」(非僅鼻尖至耳垂);確認位置用反抽胃液或聽診(不可只用「末端浸水看氣泡」,氣泡表示誤入氣管);灌食總量「須考慮(扣除)殘餘量」。","options":{"A":"錯。長度是鼻尖→耳垂→劍突(非僅鼻尖至耳垂)。","B":"錯。末端浸水出現氣泡表示誤入氣管(危險,非確認方法)。","C":"錯。灌食總量須考慮殘餘量(非不需)。","D":"正確。管灌後採右側半坐臥/坐姿、頭抬高30度。"},"sources":["新文京《兒科護理學》鼻胃管","右側半坐臥"]}},"101030-N4-7":{"quick":"剖腹產後第2天未排氣腹脹、束腹帶使用中,最適宜的獨立性護理措施是「協助多翻身,並給予薄荷油擦拭腹部,以促進腸蠕動」(C)。","detail":{"background":"獨立性護理措施是護理師可自行執行、不需醫囑者。促進產後腸蠕動可「協助翻身、下床活動、薄荷油按摩腹部」皆屬獨立性措施。給塞劑/灌腸、增加軟便劑屬「醫囑(合作性)」措施;鬆開束腹帶非促腸蠕動的恰當做法。","options":{"A":"鬆開束腹帶非促進腸蠕動的恰當獨立措施。","B":"給塞劑/灌腸須醫囑(非獨立性護理)。","C":"正確。翻身+薄荷油擦腹是獨立性促腸蠕動措施。","D":"增加軟便劑須醫囑(非獨立性護理)。"},"sources":["新文京《產科護理學》產後腹脹","獨立措施"]}},"101110-N4-75":{"quick":"子宮頸癌IIb期接受子宮根除術,術後可能出現的護理問題除外「下肢肢體活動障礙」(C)。","detail":{"background":"子宮根除術(範圍大、影響鄰近膀胱與神經、淋巴清除)常見:膀胱功能障礙(尿瀦留、膀胱造瘻滲尿)、腸蠕動改變(便秘腹瀉)、下肢淋巴水腫(淋巴結清除)。「下肢肢體活動障礙(運動功能)」非子宮根除術的典型術後問題,故除外。","options":{"A":"是。膀胱造瘻口滲尿(膀胱功能受影響)。","B":"是。便秘與腹瀉交替(腸蠕動改變)。","C":"除外(本題答案)。下肢肢體活動障礙非子宮根除術典型問題。","D":"是。下肢淋巴水腫(淋巴結清除)。"},"sources":["新文京《婦科》子宮根除術","淋巴水腫"]}},"102030-N4-9":{"quick":"懷孕7週每天早晨噁心嘔吐,護理師最合宜的回答是「這是荷爾蒙變化引起的反應」(D)。","detail":{"background":"孕早期晨吐(morning sickness)主要與「人類絨毛膜促性腺激素(hCG)、雌激素」等荷爾蒙上升有關,屬常見生理現象。回答應正確衛教其成因(荷爾蒙變化),而非歸因胃位置改變(那是孕晚期)、胃酸減少、或推諉給醫師。","options":{"A":"胃位置改變是孕晚期(非7週晨吐主因)。","B":"非胃酸減少所致。","C":"推諉(我只是護理師)非合宜回應。","D":"正確。孕早期晨吐是荷爾蒙變化引起的反應。"},"sources":["新文京《產科護理學》孕吐","荷爾蒙"]}},"102110-N4-15":{"quick":"待產婦暈眩、嘴唇麻刺感,最可能的原因是「換氣過度」(D)。","detail":{"background":"待產時焦慮、疼痛致呼吸過快(換氣過度),排出過多CO2造成呼吸性鹼中毒,出現頭暈、口唇與肢端麻刺感。處置是以手拱杯或紙袋罩口鼻緩慢呼吸重吸CO2。脫水、臥床過久、睡眠不足非此典型表現。","options":{"A":"脫水非此典型表現(換氣過度才有麻刺感)。","B":"臥床過久非主因。","C":"睡眠不足非主因。","D":"正確。換氣過度致呼吸性鹼中毒、口唇肢端麻刺。"},"sources":["新文京《產科護理學》換氣過度","麻刺"]}},"103030-N4-70":{"quick":"急性腎衰竭兒童出現「心悸」時須懷疑血鉀過高(B)。","detail":{"background":"急性腎衰竭排鉀減少易致「高血鉀」,高血鉀會影響心肌電位、造成心律不整、心悸,嚴重致心臟停止,故出現「心悸」須懷疑高血鉀並監測心電圖。頭痛、無尿、便秘非高血鉀的特異徵象。","options":{"A":"頭痛非高血鉀特異徵象。","B":"正確。心悸(心律不整)須懷疑高血鉀。","C":"無尿是腎衰竭本身(非高血鉀特異徵象)。","D":"便秘非高血鉀徵象。"},"sources":["新文京《兒科護理學》高血鉀","心悸"]}},"103100-N4-25":{"quick":"產後生理變化錯誤的是「產後初期心輸出量減少,可能發生心搏過緩」(B)。","detail":{"background":"產後初期因子宮收縮使大量血液回流體循環,心輸出量「增加」(非減少),且常見「心搏過緩(產後脈搏偏慢)」是因迷走神經張力與每搏量增加的代償,並非心輸出量減少所致,故B敘述錯誤。其餘正確:約產後4週恢復孕前心輸出量、用力與脫水致短暫體溫上升、橫膈壓力降低呼吸較順暢。","options":{"A":"正確。約產後4週恢復至孕前心輸出量。","B":"錯誤(本題答案)。產後初期心輸出量增加(非減少)。","C":"正確。用力與脫水致短暫體溫上升。","D":"正確。橫膈壓力降低使呼吸較產前順暢。"},"sources":["新文京《產科護理學》產後","心輸出量增"]}},"103100-N4-34":{"quick":"妊娠10週陰道少量褐色分泌物伴腹痛(疑先兆流產),較不恰當的建議是「應到醫院接受陰道內診檢查」(B)。","detail":{"background":"先兆流產(妊娠早期出血腹痛)應「避免陰道內診」(內診刺激可能加重出血或誘發流產),宜先臥床休息、暫停性生活、觀察出血並就醫評估(以超音波為主)。故「接受陰道內診」較不恰當。","options":{"A":"恰當。建議臥床休息。","B":"較不恰當(本題答案)。先兆流產應避免陰道內診(以免刺激加重)。","C":"恰當。繼續觀察陰道分泌物情形。","D":"恰當。暫停性生活。"},"sources":["新文京《產科護理學》先兆流產","避內診"]}},"104030-N4-18":{"quick":"產後1週嬰兒是否吃飽的評估錯誤的是「1天小便的次數約3~4次」(B)。","detail":{"background":"喝足夠奶水的新生兒「一天應有6片以上濕尿布(小便6~8次)」,「3~4次」過少表示攝取不足,故B錯誤。其餘正確:每2~3小時餵一次、體重逐漸增加(約每月0.5~1公斤以上)、吃飽後安詳舒服入睡。","options":{"A":"正確。平均每2~3小時餵食1次。","B":"錯誤(本題答案)。吃飽應一天小便6次以上(3~4次過少)。","C":"正確。體重逐漸增加(月增約0.5公斤以上)。","D":"正確。吃飽後會安詳舒服地睡著。"},"sources":["新文京《產科護理學》母乳評估","濕尿布"]}},"104030-N4-30":{"quick":"葡萄胎(Mole)敘述正確的是「臨床表徵包括嚴重噁心嘔吐、子宮腫大超過懷孕週數、可能測不到胎心音」(B)。","detail":{"background":"葡萄胎因滋養層異常增生、hCG極高,典型「嚴重噁心嘔吐(妊娠劇吐)、子宮腫大超過實際週數、無胎心音、陰道出血」。好發於高齡(尤>40歲)產婦與極年輕者(非丈夫年紀);追蹤標記是「hCG」(非FSH);治療以子宮排空清除為主、追蹤hCG(非給高劑量hCG治療)。","options":{"A":"好發高齡產婦/極年輕者(非丈夫年紀)。","B":"正確。嚴重孕吐、子宮大於週數、可能無胎心音。","C":"錯。追蹤標記是hCG(非FSH)。","D":"錯。治療是子宮排空清除(非給高劑量hCG)。"},"sources":["新文京《產科護理學》葡萄胎","hCG高"]}},"104100-N4-61":{"quick":"返家照顧急性中耳炎(AOM)兒童護理指導錯誤的是「抗生素服用到耳朵不痛時就停止」(C)。","detail":{"background":"急性中耳炎抗生素須「服完整個療程」,不可因耳朵不痛就自行停藥(以免感染未清除復發、抗藥性),故C錯誤。其餘正確:喝奶餵食採坐姿(避免奶經咽鼓管入中耳)、擤鼻涕一次壓一側鼻孔(避免壓力把分泌物推入中耳)、定期追蹤聽力。","options":{"A":"正確。喝奶餵食採坐姿(防奶入中耳)。","B":"正確。擤鼻涕壓住一側鼻孔(防分泌物入中耳)。","C":"錯誤(本題答案)。抗生素須服完療程(非耳不痛就停)。","D":"正確。每隔6個月做一次聽力測驗。"},"sources":["新文京《兒科護理學》中耳炎","服完療程"]}},"105030-N4-24":{"quick":"預防產後便秘的護理措施最適宜的是「早期下床活動」(A)。","detail":{"background":"預防產後便秘:早期下床活動促進腸蠕動、攝取足夠水分(每天>2000c.c.,非限制)、高纖飲食、養成定時排便。持續用托腹帶與減少排便次數無助於(甚至加重)便秘,故A最適宜。","options":{"A":"正確。早期下床活動促進腸蠕動。","B":"錯。應攝取足夠水分(非限制不超過2000c.c.)。","C":"錯。持續托腹帶無助於促腸蠕動。","D":"錯。應正常排便(減少排便次數加重便秘)。"},"sources":["新文京《產科護理學》產後便秘","下床"]}},"105030-N4-34":{"quick":"妊娠36週、BP 160/110,可能發展成子癇症的危險徵候是「②深部肌腱反射過度+③噁心、嘔吐(即23)」(B)。","detail":{"background":"重度子癇前症進展為子癇症的警示徵象包括:深部肌腱反射過度(反射亢進、預示抽搐)、頭痛、視力模糊、上腹痛、噁心嘔吐、寡尿。①「尿量增加」並非危險徵象(子癇前症常是寡尿/蛋白尿),故危險徵候為②③。","options":{"A":"12含①尿量增加(非危險徵象)。","B":"正確。②深部肌腱反射過度+③噁心嘔吐(23)。","C":"13含①(尿量增加非危險徵象)。","D":"123含①(非全部)。"},"sources":["新文京《產科護理學》子癇前症","反射亢進"]}},"105090-N4-15":{"quick":"待產婦護理正確的是「鼓勵定時解尿,以利胎兒下降」(A)。","detail":{"background":"待產時鼓勵「定時解尿、排空膀胱」,因脹滿膀胱會阻礙胎頭下降與產程進展,故A正確。待產不宜長時間平躺(宜左側臥避免壓迫下腔靜脈);可進食清淡流質(非一律禁食);常規灌腸已非必要措施(非必要護理)。","options":{"A":"正確。鼓勵定時解尿、排空膀胱以利胎兒下降。","B":"錯。不宜長時間平躺(宜左側臥)。","C":"錯。可進食清淡流質(非一律禁食)。","D":"錯。常規灌腸非必要護理措施。"},"sources":["新文京《產科護理學》待產","解尿"]}},"106030-N4-53":{"quick":"胎便吸入症候群護理評估與判斷正確的是「會導致缺氧及小氣道阻塞」(D)。","detail":{"background":"胎便吸入症候群(MAS)是胎兒吸入混胎便的羊水,胎便阻塞小氣道、引起肺擴張不全與過度充氣、化學性肺炎,導致「缺氧、小氣道阻塞、呼吸窘迫」,可併發呼吸性「酸中毒」(非鹼中毒)。非導致腸阻塞腹瀉、非肺栓塞肋膜積水。","options":{"A":"錯。胎便吸入致呼吸問題(非腸阻塞腹瀉)。","B":"錯。會致呼吸性酸中毒(非鹼中毒)。","C":"非肺栓塞及肋膜積水。","D":"正確。導致缺氧及小氣道阻塞(呼吸窘迫)。"},"sources":["新文京《兒科護理學》胎便吸入","小氣道"]}},"106111-N4-18":{"quick":"促進陰道生產的相關措施正確的是「評估解尿可避免膀胱過漲」(C)。","detail":{"background":"待產促進產程:鼓勵排空膀胱(脹滿膀胱阻礙胎頭下降);不宜長時間平躺(宜採直立/側臥助下降與循環);可進食清淡流質補充能量(非一律禁食);常規灌腸非必要(非為減少會陰感染)。","options":{"A":"錯。不宜平躺(宜直立/側臥助胎兒下降與循環)。","B":"錯。可進食清淡流質(非一律禁食)。","C":"正確。評估解尿避免膀胱過脹(利胎頭下降)。","D":"錯。灌腸非減少會陰感染的必要措施。"},"sources":["新文京《產科護理學》待產","排空膀胱"]}},"106111-N4-64":{"quick":"6歲心導管檢查後護理措施正確的是「24小時維持穿刺部位肢體之平直」(B)。","detail":{"background":"心導管檢查(經股動脈)後須「維持穿刺側肢體平直(約24小時)」、加壓止血、避免彎曲以防出血/血腫。檢查後不需禁食24小時(清醒即可漸進進食);加壓砂袋重量約1公斤(非1.5)且時間依情況;術後初期應「較密集(如每15~30分鐘)」監測生命徵象(非每小時一次)。","options":{"A":"錯。檢查後清醒即可漸進進食(非禁食24小時)。","B":"正確。24小時維持穿刺部位肢體平直防出血。","C":"砂袋約1公斤(非1.5公斤)。","D":"術後初期應較密集監測生命徵象(非每小時一次)。"},"sources":["新文京《兒科護理學》心導管","肢體平直"]}},"107030-N4-21":{"quick":"剖腹產後第二天進食、腹脹不舒服,不恰當的措施是「鼓勵進食奶製品」(A)。","detail":{"background":"產後腹脹應促進腸蠕動排氣,「奶製品(及易產氣食物)會增加脹氣」,故不恰當。其餘恰當:腹部擦薄荷油促蠕動、協助下床活動促排氣、依醫囑用肛門栓劑。","options":{"A":"不恰當(本題答案)。奶製品易產氣加重腹脹。","B":"恰當。腹部擦拭薄荷油促進腸蠕動。","C":"恰當。協助產婦下床活動促排氣。","D":"恰當。依醫囑使用肛門栓劑。"},"sources":["新文京《產科護理學》產後腹脹","避產氣"]}},"107030-N4-38":{"quick":"全子宮切除手術之術前腸道準備不恰當的是「前三天採低渣飲食」(A)?——本題答A。","detail":{"background":"本題官方答案為A。腸道準備目的是清空腸道,術前應採「無渣/清流質」飲食(較「低渣」更徹底),故以「低渣飲食」作為術前三天準備被官方判為不夠恰當。其餘恰當:使用抗生素(降低腸道菌)、使用瀉劑、溫水灌腸清空腸道。","options":{"A":"不恰當(本題答案)。術前應採無渣/清流質(比低渣更徹底清空腸道)。","B":"恰當。使用抗生素降低腸道菌叢。","C":"恰當。使用瀉劑清空腸道。","D":"恰當。溫水灌腸清空腸道。"},"sources":["新文京《婦科》腸道準備","清流質"]}},"109030-N4-8":{"quick":"懷孕28週、羊水指數(AFI)<5公分(羊水過少),表示胎兒可能「子宮內生長遲滯」(D)。","detail":{"background":"羊水過少(AFI<5)常與「胎盤功能不良、子宮內生長遲滯(IUGR)、胎兒泌尿系統異常(腎發育不良/尿路阻塞)」有關。水腦、食道閉鎖會致「羊水過多」(胎兒吞嚥減少);胎兒過重非羊水過少表現。","options":{"A":"水腦致羊水過多(非過少)。","B":"胎兒過重非羊水過少表現。","C":"食道閉鎖致羊水過多(吞嚥減少)。","D":"正確。羊水過少表示胎兒可能子宮內生長遲滯(IUGR)。"},"sources":["新文京《產科護理學》羊水過少","IUGR"]}},"109110-N4-24":{"quick":"產後婦女生理復舊變化正確的是「產後初期有利尿現象,可將身體組織囤積過多的液體排出體外」(A)。","detail":{"background":"產後不再有胎盤循環,孕期囤積的組織間液回流並排除,出現「利尿(多尿、多汗)」屬正常。產後體溫上升通常<38度且不超過24小時(非升至38度持續2~3天);產後脈搏多「偏慢(心搏過緩)」(非增快到100);產後初期腸蠕動「減慢」易便秘(非輕瀉)。","options":{"A":"正確。產後初期利尿排除組織囤積過多液體。","B":"錯。體溫上升通常<38度且不超過24小時。","C":"錯。產後脈搏多偏慢(非增快至100)。","D":"錯。產後初期腸蠕動減慢易便秘(非輕瀉)。"},"sources":["新文京《產科護理學》產後復舊","利尿"]}},"109110-N4-29":{"quick":"神經系統反射敘述正確的是「①擁抱反射四肢對稱外展伸直+④頸部強直反射(轉向側手腳伸展對側屈曲)(即14)」(D)。","detail":{"background":"①擁抱反射(Moro):突然改變姿勢使新生兒四肢「對稱性外展且伸直」再內收;④頸部強直反射(tonic neck):平躺頭轉向一側,「轉向側手腳伸展、對側屈曲」(擊劍姿)。②尋乳反射是觸碰嘴角頭轉向刺激側「張口尋乳」(非伸舌);③巴賓斯基反射是劃足底外緣,腳趾「向上翹呈扇形張開」(非內縮)。故正確為①④。","options":{"A":"12含②(尋乳是頭轉向尋乳,非伸舌)。","B":"23含②③(描述皆錯)。","C":"34含③(巴賓斯基是腳趾上翹扇形,非內縮)。","D":"正確。①擁抱反射+④頸部強直反射(14)。"},"sources":["新文京《兒科護理學》新生兒反射","Moro"]}},"110030-N4-40":{"quick":"婦科體外放射治療後腹瀉的護理指導不適當的是「增加乳製品攝取」(B)。","detail":{"background":"放射性腸炎/腹瀉時應採「低渣、低乳糖」飲食(放療常致暫時乳糖不耐),增加乳製品會加重腹瀉,故B不適當。其餘適當:維持水分電解質平衡、採低渣飲食、必要時用止瀉劑。","options":{"A":"適當。維持水分平衡(防脫水)。","B":"不適當(本題答案)。增加乳製品會加重腹瀉(放療致乳糖不耐)。","C":"適當。採用低渣飲食。","D":"適當。必要時使用止瀉劑。"},"sources":["新文京《婦科》放療腹瀉","低乳糖"]}},"110110-N4-31":{"quick":"妊娠32週突發陰道出血(無腹痛、鮮紅、量中,疑前置胎盤)安胎,護理錯誤的是「若安胎失敗,只能採剖腹生產」(B)?——本題答B。","detail":{"background":"本題官方答案為B。無痛性鮮紅出血疑「前置胎盤」,處置上「禁止陰道內診」(以免大出血)。但「只能剖腹生產」的絕對表述不恰當——是否剖腹須視前置胎盤類型、出血量與胎兒狀況而定(完全性前置才一定剖腹),故B為錯誤的絕對化敘述。其餘正確:密切觀察生命徵象與出血、處置前向個案家屬說明、禁止陰道檢查。","options":{"A":"正確。密切觀察生命徵象及出血狀況。","B":"錯誤(本題答案)。是否剖腹須視前置胎盤類型/出血/胎兒而定(非只能剖腹的絕對說法)。","C":"正確。處置前向個案與家屬說明程序。","D":"正確。禁止執行陰道檢查(防大出血)。"},"sources":["新文京《產科護理學》前置胎盤","禁內診"]}},"110110-N4-65":{"quick":"6個月法洛氏四重畸形(TOF)維持心輸出量的護理措施不適當的是「每次餵食時間不宜太短,應超過30分鐘」(D)。","detail":{"background":"法洛氏四重症(發紺型先心)餵食應「縮短餵食時間(避免過度耗能與缺氧)」,故「應超過30分鐘」不適當。其餘適當:集中護理安撫減少哭泣(哭鬧增加右左分流缺氧)、避免便秘閉氣用力(增心臟負擔)、選柔軟大孔奶嘴減少吸吮費力。","options":{"A":"適當。集中護理、安撫減少哭泣(防缺氧發作)。","B":"適當。避免便秘閉氣用力增加心臟負擔。","C":"適當。選柔軟、大孔奶嘴減少吸吮費力。","D":"不適當(本題答案)。餵食應縮短時間(非超過30分鐘,過長耗能缺氧)。"},"sources":["新文京《兒科護理學》法洛氏四重症","縮短餵食"]}},"112030-N4-4":{"quick":"懷孕時因雌性素增加造成的孕期不適正確的是「使陰道黏膜增生,陰道分泌物會增加」(C)。","detail":{"background":"孕期雌激素增加使「陰道黏膜增生、血流增加,分泌物增多(白帶)」。頻尿是子宮壓迫膀胱(非雌激素使膀胱鬆弛);心灼熱與便秘是「黃體素(progesterone)」使平滑肌鬆弛、腸胃蠕動變慢所致(非雌激素),故C正確。","options":{"A":"錯。頻尿是子宮壓迫膀胱(非雌激素使膀胱鬆弛)。","B":"心灼熱是黃體素使平滑肌鬆弛(非雌激素)。","C":"正確。雌激素使陰道黏膜增生、分泌物增加。","D":"便秘是黃體素使平滑肌放鬆(非雌激素)。"},"sources":["新文京《產科護理學》孕期不適","雌激素"]}},"112030-N4-46":{"quick":"兒童性虐待常見表徵錯誤的是「肢體瘦小、皮下脂肪不足的營養不良現象」(B)。","detail":{"background":"兒童「性」虐待的常見表徵:外陰/肛門/口腔撕裂瘀傷腫脹、反覆尿道感染與解尿困難、性病、睡眠紊亂、害怕獨處、同儕關係薄弱、退化或性化行為。「肢體瘦小、皮下脂肪不足的營養不良」是「疏忽(neglect)」的表現,非性虐待特徵,故B錯誤。","options":{"A":"是。外陰肛門口腔撕裂瘀傷腫脹。","B":"錯誤(本題答案)。營養不良是疏忽(neglect)表現(非性虐待特徵)。","C":"是。睡眠紊亂、害怕獨處、同儕關係薄弱。","D":"是。反覆尿道感染及解尿困難。"},"sources":["新文京《兒科護理學》性虐待","表徵"]}},"112180-N4-31":{"quick":"病童使用Fentanyl貼片的護理指導錯誤的是「貼片使用期限為24小時,使用貼片時需註明起迄時間」(D)。","detail":{"background":"Fentanyl(吩坦尼)穿皮貼片是長效鴉片類,每片作用「約72小時」(非24小時),須註明起迄時間。其餘正確:屬鴉片類經皮吸收、會抑制呼吸(呼吸變慢);貼於平坦處(前胸後背上臂大腿);易產生耐藥性、成癮、便秘等鴉片類副作用。","options":{"A":"正確。鴉片類經皮吸收、會使呼吸速度變慢。","B":"正確。貼於平坦處(前胸後背上臂大腿)。","C":"正確。易產生耐藥性、成癮或便秘。","D":"錯誤(本題答案)。Fentanyl貼片約72小時更換(非24小時)。"},"sources":["新文京《兒科護理學》Fentanyl貼片","72小時"]}},"114030-N4-40":{"quick":"5歲長期服用毛地黃(digoxin)護理指導最適當的是「若使用利尿劑(Lasix),避免香蕉、深綠色蔬菜等含鉀高之食物」(D)?——本題答D。","detail":{"background":"本題官方答案為D。服毛地黃合併使用排鉀利尿劑(Lasix)時,須注意「低血鉀會增加毛地黃毒性」——本題D敘述須再斟酌,但官方以D為最適當(就「合併利尿劑須注意鉀」的方向)。服毛地黃前測心尖脈,兒童心跳低於「90~100次/分」才暫停(A的90可,但須測心尖脈1分鐘);不可與食物混餵影響劑量(B不當);漏服超過一定時間不補服(D相關)。註:臨床上服毛地黃且用排鉀利尿劑應「補鉀(避免低血鉀加重毒性)」,故飲食衛教須謹慎。","options":{"A":"兒童心跳低於90~100才暫停,須測心尖脈1分鐘(此敘述不夠完整)。","B":"錯。不可與食物混餵(影響劑量吸收)。","C":"低血鉀增毛地黃毒性,用排鉀利尿劑時須注意補鉀(非一味避高鉀)。","D":"本題官方答案。合併利尿劑時須注意鉀離子變化(以官方判定為最適當)。"},"sources":["新文京《兒科護理學》毛地黃","鉀"]}},"114170-N4-34":{"quick":"早產兒呼吸暫停的照護處置錯誤的是「通常以Indomethacin治療,且須監測血中濃度」(B)。","detail":{"background":"早產兒呼吸暫停的藥物治療是「咖啡因(caffeine citrate)或茶鹼」(刺激呼吸中樞),而非Indomethacin(後者用於關閉開放性動脈導管),故B錯誤。其餘正確:餵奶時呼吸暫停須減緩/停餵待膚色恢復、維持呼吸道通暢勿過度屈曲伸展、呼吸暫停時給觸覺刺激並維持呼吸道通暢。","options":{"A":"正確。餵奶呼吸暫停須減緩/停餵待膚色恢復再餵。","B":"錯誤(本題答案)。早產兒呼吸暫停用咖啡因/茶鹼(Indomethacin是關閉PDA)。","C":"正確。頸部微仰維持呼吸道通暢,勿過度屈曲伸展。","D":"正確。呼吸暫停給觸覺刺激並維持呼吸道通暢。"},"sources":["新文京《兒科護理學》早產兒呼吸暫停","咖啡因"]}},"115030-N4-36":{"quick":"瀕死兒童出現肌肉緊張力降低,護理最不適當的是「吞嚥困難時仍儘量鼓勵由口進食,訓練肌肉張力」(C)。","detail":{"background":"瀕死期肌張力下降、吞嚥困難時,「不應勉強由口進食」(會嗆入、吸入性肺炎),應改以舒適餵食/其他途徑,以安寧舒適為原則,故C最不適當。其餘適當:腸胃道出現噁心嘔吐便秘腹瀉症狀的處理、食慾不佳給少量多餐、尿瀦留留置導尿時注意預防感染。","options":{"A":"適當。腸胃道會出現噁心嘔吐便秘腹瀉等症狀。","B":"適當。食慾不佳可少量多餐。","C":"最不適當(本題答案)。吞嚥困難不應勉強由口進食(會嗆入)。","D":"適當。留置導尿時注意預防感染。"},"sources":["新文京《兒科護理學》瀕死","勿勉強進食"]}}},TO=["1唇腭裂", "2食道氣管食道瘻管與胃食道逆流", "3幽門狹窄", "4巨結腸症與人工肛門造瘻", "5腸套疊疝氣與闌尾炎", "6急性腸胃炎腹瀉與脫水", "7吸收不良乳糜瀉IBD與壞死性腸炎", "8膽道閉鎖與肝膽", "9厭食症復發性腹痛腹部評估與鼻胃管營養", "10母嬰產科與其他借題"],LEC={"1唇腭裂":{"html":"<p><b>唇腭裂(cleft lip/palate)</b>:餵食用<b>特殊奶瓶/柔軟大洞奶嘴</b>、滴管湯匙、<b>直立姿</b>餵食常拍背;<b>最常引起反覆性中耳炎</b>(腭裂致歐氏管功能不良)。</p><p><b>術後</b>:<b>手肘約束</b>防摸傷口、<b>避免俯臥(改仰臥/側臥)</b>、<u>避免吸吮安撫奶嘴/哭泣</u>(拉扯縫合處)、<b>不停吞嚥=出血徵象</b>、餵後清水清潔口腔。</p>"},"2食道氣管食道瘻管與胃食道逆流":{"html":"<p><b>胃食道逆流(GER)</b>:溢奶嘔吐<b>不含膽汁</b>;配方奶<b>加麥粉/米粉增稠</b>、少量多餐、餵後<b>直立/頭高</b>、拍背;<b>cimetidine抑制胃酸</b>;<b>24小時食道pH測定最準確</b>。</p><p><b>氣管食道瘻管(TEF)/食道閉鎖</b>:餵食<b>3C(咳嗽Coughing、哽塞Choking、發紺Cyanosis)</b>;術前禁食+持續口咽抽吸盲端+頭高45~60度;術後<u>鼻胃管滑脫勿自行重插(戳傷吻合處)</u>、抽吸管不超過吻合處。</p>"},"3幽門狹窄":{"html":"<p><b>幽門狹窄(pyloric stenosis)</b>:足月男嬰(3~6週)、<b>噴射狀嘔吐不含膽汁</b>、<b>左至右胃蠕動波</b>、<b>右上腹橄欖狀腫塊</b>、<b>代謝性鹼中毒</b>(失胃酸)。先矯正脫水/電解質/鹼中毒→幽門切開術;術後4~8小時給葡萄糖水、漸進餵食、<b>右側臥/頭高</b>。腹部評估順序<b>視→聽→叩→觸</b>。</p>"},"4巨結腸症與人工肛門造瘻":{"html":"<p><b>巨結腸症(Hirschsprung)</b>:腸壁<b>缺乏副交感神經節</b>(直腸乙狀結腸遠端)、<b>胎便延遲排出</b>、慢性便秘、嘔吐<b>可含膽汁</b>;保守/造瘻後<b>低渣高熱量高蛋白</b>;<u>禁肥皂水灌腸(用生理食鹽水)</u>。</p><p><b>人工肛門造瘻口</b>:正常<b>紅色濕潤</b>(黑/深色=血循不良)、黏膜<b>略高於皮膚</b>、保護膜剪比造瘻口大0.5cm、術後低渣;乙狀結腸造口糞便成形。<b>灌腸</b>:左側臥右膝屈曲、溫度40~43°C、肛管插7.5cm。</p>"},"5腸套疊疝氣與闌尾炎":{"html":"<p><b>腸套疊</b>:陣發腹痛、<b>果醬般血便</b>、<b>右上腹香腸狀腫塊</b>、迴盲型;<b>鋇劑/空氣灌腸液壓復位</b>(穿孔/腹膜炎則手術)、可復發。<b>疝氣</b>:臍疝氣多自癒;腹股溝疝氣<b>紅硬痛(嵌頓)須及早手術</b>。<b>闌尾炎</b>:轉移性右下腹痛、<u>禁熱敷/瀉劑/止痛</u>、屈膝臥、術後半坐臥早下床。學齡前手術避免「切除/切開」字眼、臉譜量表。</p>"},"6急性腸胃炎腹瀉與脫水":{"html":"<p><b>脫水程度(體重%)</b>:輕<5%、<b>中5~10%</b>、重>10%(哭無淚/無尿/脈快弱)。張力型:低張<130、等張130~150、高張>150。治療:輕中度<b>口服電解質液(ORS)</b>+繼續母乳、重度靜脈輸液;<u>勿泡濃奶</u>、可改無乳糖配方。</p><p><b>病原</b>:<b>輪狀病毒</b>嬰幼兒秋冬、<b>口服疫苗</b>、糞口、可併上呼吸道、漂白水消毒;<b>諾羅</b>各年齡、無疫苗、<u>酒精乾洗手無效</u>、急性期禁食補液;沙門氏菌<b>血絲便</b>。臀部護理<u>避免烤燈(燙傷)</u>。</p>"},"7吸收不良乳糜瀉IBD與壞死性腸炎":{"html":"<p><b>乳糜瀉(celiac disease)</b>:對<b>麩質(麥類蛋白)無法耐受的自體免疫腸病變</b>→絨毛萎縮吸收不良;<b>終生避免麩質</b>(小麥大麥黑麥燕麥),可食米玉米馬鈴薯蛋肉。</p><p><b>壞死性腸炎(NEC)</b>:早產兒、<b>腸黏膜缺血缺氧</b>+未成熟+配方奶+細菌、侵犯<b>迴腸末端/近端結腸</b>、嘔吐<b>可含膽汁</b>;<b>立即禁食+全靜脈營養+鼻胃管減壓</b>、避免肛溫;<b>母乳(IgA)為最佳預防</b>。</p>"},"8膽道閉鎖與肝膽":{"html":"<p><b>膽道閉鎖(biliary atresia)</b>:阻塞性黃疸(<b>直接膽紅素↑</b>)、<b>灰白便、暗茶尿、皮膚黃綠</b>、缺膽鹽致<b>脂溶性維生素(ADEK)吸收不良</b>;<b>嬰兒大便卡早期發現</b>、<b>葛西手術出生60天內</b>(愈早愈好)、常需肝移植;飲食<b>中鏈脂肪酸(MCT)配方奶+高蛋白+補脂溶性維生素</b>;未治療→肝硬化脾腫大。膽管炎為術後常見併發症。</p>"},"9厭食症復發性腹痛腹部評估與鼻胃管營養":{"html":"<p><b>厭食症(anorexia)</b>:青少年女性、身體心像扭曲(自覺胖)、閉經、心搏過慢便秘;<b>護理最優先=改善嚴重營養不良</b>、行為契約、體重回復<b>緩慢(每週0.5~1kg)</b>(過快致再餵食症候群/心血管負擔)。<b>復發性腹痛</b>:臍周、無器質病因、時間不規律、無發燒、與心理壓力(拒學)有關。</p><p><b>鼻胃管灌食</b>:長度<b>鼻尖→耳垂→劍突</b>、反抽胃液/測pH確認、灌食前測殘餘量、灌食後<b>右側半坐臥/頭高30度</b>、出現嘔吐腹脹呼吸暫停停止灌食。</p>"},"10母嬰產科與其他借題":{"html":"<p><b>產科</b>:剖腹產後腹脹用薄荷油/翻身/活動(<u>避免奶製品等產氣食物</u>);晨吐=荷爾蒙變化;待產暈眩嘴唇麻=換氣過度(呼吸性鹼中毒);先兆流產出血<u>避免陰道內診</u>;前置胎盤無痛鮮紅出血<u>禁內診</u>;子癇前症<b>反射亢進</b>;葡萄胎<b>子宮腫大超過週數、測不到胎心音、追蹤hCG</b>;羊水過少→IUGR。</p><p><b>其他</b>:高血鉀<b>心悸</b>;中耳炎抗生素<b>服完療程</b>;Fentanyl貼片<b>72小時</b>;早產兒呼吸暫停用<b>咖啡因</b>(Indomethacin是關PDA);新生兒反射(Moro對稱外展、頸部強直擊劍姿)。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c5_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
