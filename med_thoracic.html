‧其他手術","id":"112080-27","q_num":27,"src":"民國112年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":27,"stem":"關於呼吸道的疾病,下列敘述何者最不適當?","options":{"A":"氣管的腺樣囊狀癌(adenoid cystic carcinoma)可能沿著神經上下擴散","B":"需長期使用呼吸器者,不適合做氣管修補手術","C":"曲黴菌球(aspergilloma fungus ball)使用抗黴菌藥物治療3 個月為首選","D":"局部的支氣管擴張症適合手術切除"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-27","topic_code":"T5","topic":"氣管支氣管‧感染性肺疾‧其他手術","id":"114070-27","q_num":27,"src":"民國114年第二次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":33,"stem":"下列關於游離肺(sequestration)的敘述,何者錯誤?","options":{"A":"可以分為肺葉外(extralobar)游離肺與肺葉內(intralobar)游離肺","B":"與正常肺部通常以支氣管相通","C":"其動脈供應主要來自主動脈","D":"治療以手術切除為主"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"102110-33","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"102110-33","q_num":33,"src":"民國102年第二次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":45,"stem":"關於肺外型游離肺(extra-pulmonary sequestration)的敘述,下列何者錯誤?","options":{"A":"其血液供應來自體循環","B":"與支氣管有相通及氣體交流","C":"大部分發生在肺下葉","D":"較常見於左肺"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"107020-45","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"107020-45","q_num":45,"src":"民國107年第一次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":46,"stem":"關於先天性肺部呼吸道畸形(congenital pulmonary airway malformation)的治療,下列何者比較正確?","options":{"A":"新生兒胸部X光發現右上肺葉有大囊泡狀病灶,出生後即因呼吸衰竭插管治療,應緊急進行開胸手術","B":"新生兒產前懷疑右下肺葉有實質狀病灶,出生後呼吸平穩,應立即接受肺部電腦斷層檢查","C":"新生兒產前懷疑左上肺葉有小囊泡狀病灶,於出生後6個月大時接受電腦斷層確診,應於2歲之後再手術","D":"3個月大男嬰因呼吸急促,經X光及電腦斷層檢查發現左下肺葉多囊泡狀病灶,應安排磁振造影(MRI)確定血管走向"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"107080-46","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"107080-46","q_num":46,"src":"民國107年第二次","img":""},{"exam_code":"109080","roc_year":109,"exam_round":"第二次","num":27,"stem":"下列何種胸壁腫瘤,在血液檢驗中,通常不會有異常發現?","options":{"A":"漿細胞瘤(plasmacytoma)","B":"骨纖維發育不良(fibrous dysplasia)","C":"骨肉瘤(osteosarcoma)","D":"Ewing氏肉瘤(Ewing's sarcoma)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109080-27","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"109080-27","q_num":27,"src":"民國109年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":23,"stem":"關於先天性肺部疾病,下列敘述何者錯誤?","options":{"A":"支氣管囊腫(bronchogenic cyst)無症狀不需要手術切除","B":"肺葉肺氣腫(lobar emphysema)為最常切除的肺部先天性囊腫疾病","C":"肺內游離肺(intralobar pulmonary sequestration)常發於下肺葉,血液回流到肺靜脈","D":"肺血管吊索(pulmonary vascular sling)常伴有喘鳴發生"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"110080-23","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"110080-23","q_num":23,"src":"民國110年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":45,"stem":"一個懷孕28 周的準媽媽,在接受例行的產前超音波檢查,由婦產科醫師檢查出:在胎兒的右肺出現了泡泡狀的病灶。而在此之前,準媽媽與寶寶的檢查,都未出現特別的異狀。婦產科醫師再安排了更詳盡的胎兒檢查,推斷此胎兒患有「先天性肺呼吸道畸形(CPAMs, congenital pulmonary airway malformations)」。於是,婦產科醫師將準媽媽轉介到小兒外科醫師的門診,希望小兒外科醫師跟準媽媽解釋,寶寶在出生之後,寶寶可能需要接受的治療。下列是小兒外科醫師跟著急的準媽媽的病解,何者最不適當?","options":{"A":"先天性肺呼吸道畸形(CPAMs)是一種在正常肺部組織中生長出的多囊結構腫塊。這種多囊腫塊,通常會侷限在某一側的肺部或是某一塊肺葉","B":"有可能會發生胎兒窘迫","C":"此病灶並無轉為惡性腫瘤的可能","D":"如果在懷孕的過程及出生之後,病兒均沒有特別的症狀,我們可以先監控觀察,等到約六個月大前,再考慮進行手術將其病灶切除。但少數的病例在出生後就出現呼吸窘迫的現象,此時就要進行緊急手術將其肺部的病灶切除"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"110080-45","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"110080-45","q_num":45,"src":"民國110年第二次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":48,"stem":"Haller index或稱凹陷指數,常用於漏斗胸(pectus excavatum)的嚴重度評估,是由Dr. Haller等人在1987年所提出來的方法,圖中A為白色橫向雙箭頭線長度;B、D分別為左右兩側白色縱向雙箭頭線長度;C為中間黑色縱向雙箭頭線長度;E為中間白色縱向雙箭頭線長度,則Haller index為何?","options":{"A":"A/C","B":"(B+D)/2C","C":"C/E","D":"(B+D)/A"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"113070-48","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"113070-48","q_num":48,"src":"民國113年第二次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":49,"stem":"下列先天性肺部異常(bronchopulmonary malformations),何者最不容易出現自發性氣胸(spontaneous pneumothorax)?","options":{"A":"先天性肺葉氣腫(congenital lobar emphysema)","B":"支氣管源性囊腫(bronchogenic cyst)","C":"游離肺(pulmonary sequestration)","D":"先天性肺部呼吸道畸形(congenital pulmonary airway malformation)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114020-49","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"114020-49","q_num":49,"src":"民國114年第一次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":47,"stem":"一名3 歲大男童,被父母親帶到小兒外科門診。據父母表示,男童在出生的時候,他們就發現到前胸壁有凹陷的情況,但是不太明顯。隨著男童長大,這個狀況逐漸嚴重。有關此男童的狀況,下列敘述何者錯誤?","options":{"A":"這男孩的狀況是漏斗胸(pectus excavatum)。漏斗胸的發生率約為1/400,且男孩的人數是女孩的3~4倍","B":"發現孩子有此狀況時,要特別注意有無合併先天性心臟疾病,如二尖瓣脫垂(mitral valve prolapse),或其他結締組織疾病,如Ehlers-Danlos syndrome、Marfan syndrome","C":"此疾病是否嚴重到需要手術矯正,應該進行多項評估,包括凹陷指數(Haller index)、心肺功能及其胸壁變形的速率等","D":"Nuss procedure 是目前最常運用的手術方式,而最適合的矯正年齡為3 歲之前。其置入的矯正板,約在2~3 年後需再次手術取出"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114070-47","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"114070-47","q_num":47,"src":"民國114年第二次","img":""}],E={"102030-4":{"quick":"RUL 5 cm+臟層肋膜侵犯=T2;氣管前(同側縱膈)淋巴陽性=N2→IIIA(本題多重答案 B/C/D 均給分)。","detail":{"background":"AJCC 第 7 版:腫瘤 5 cm(>3≤5)或侵犯臟層肋膜=T2a;右側氣管前淋巴結為「同側縱膈(N2)」;T2N2M0=「Stage IIIA」。本題官方多重答案,B(N1)、C(IIIA)、D(IIB)皆給分(因分期版本/淋巴站歸屬爭議)。","options":{"A":"T 應為 T2(非 T3)。","B":"(給分)N 分類爭議。","C":"★正解(本題答案):IIIA(T2N2)。","D":"(給分)IIB 爭議。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"102030-29":{"quick":"正確為 B:肺腺癌較鱗狀細胞癌「易早期(血行)轉移」。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"錯:台灣最常見為腺癌,非鱗癌。","B":"★正確(本題答案):腺癌易早期轉移。","C":"錯:腺癌多在周邊,非肺門。","D":"錯:小細胞肺癌以化放療為主,非手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"102110-1":{"quick":"50F 不吸菸、持續咳嗽 2 月、肺病灶→D:應考慮診斷性切片。","detail":{"background":"單一肺結節(SPN):肺實質內「≤3 cm」、邊界清楚、無淋巴腫大或肺擴張不全之孤立病灶。良性鈣化型態(中央/層狀/爆米花)、2 年無變大→良性可不切;高風險(年齡大、吸菸、邊緣毛刺、>1 cm)需診斷性切片/切除;部分位置深者無法楔狀切除需肺葉切除。","options":{"A":"位置非答題重點。","B":"持續症狀之病灶不宜假設良性。","C":"不宜僅每月追蹤而延誤。","D":"★正確(本題答案):診斷性切片。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"103030-28":{"quick":"惡性肋膜腔積液至少屬 D:IIIB(舊 AJCC 惡性積液=T4→IIIB;新版列 M1a/IV)。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"IIA 過低。","B":"IIB 過低。","C":"IIIA 過低。","D":"★正確(本題答案):至少 IIIB(惡性積液)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"103100-28":{"quick":"錯在 C:肺癌「局部侵犯橫膈膜(T3/T4)」仍可能切除,非手術禁忌。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"是禁忌:喉返神經麻痺(縱膈侵犯)。","B":"是禁忌:上腔靜脈症候群。","C":"★錯誤(本題答案):橫膈侵犯非絕對禁忌。","D":"是禁忌:肝臟轉移(M1)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"104030-27":{"quick":"錯在 D:bronchoalveolar(現原位腺癌)「適合手術」。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"正確:Stage I 以手術為主。","B":"正確:Stage II 手術為主+輔助化放。","C":"正確:IIIb 以化放療為主。","D":"★錯誤(本題答案):BAC 適合手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"104030-29":{"quick":"「可不切除」情況之敘述錯在 D:愛滋病本身非不切除之理由。","detail":{"background":"單一肺結節(SPN):肺實質內「≤3 cm」、邊界清楚、無淋巴腫大或肺擴張不全之孤立病灶。良性鈣化型態(中央/層狀/爆米花)、2 年無變大→良性可不切;高風險(年齡大、吸菸、邊緣毛刺、>1 cm)需診斷性切片/切除;部分位置深者無法楔狀切除需肺葉切除。","options":{"A":"可不切:2 年無變大。","B":"可不切:良性鈣化。","C":"可不切:結核引起。","D":"★錯誤(本題答案):愛滋非不切除理由。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"105020-26":{"quick":"頸部淋巴硬塊→D:先頸部淋巴細針穿刺切片(確認 N3/M1 再定治療)。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"未確診不宜直接切肺。","B":"未確診不宜直接切肺。","C":"未確診不宜直接清掃。","D":"★正確(本題答案):頸部淋巴 FNA 切片。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"105020-28":{"quick":"錯在 B:內視鏡(VATS)切轉移瘤「非標準」(常需開胸手觸診找微小病灶)。","detail":{"background":"肺轉移瘤切除(metastasectomy)條件:原發腫瘤已控制無復發、無肺外轉移(或可控)、病灶可完全切除且保留足夠肺功能。多採開胸以「手觸診」找出影像未顯之小結節(VATS 非標準);目的減少腫瘤負擔/可能治癒(如肉瘤、大腸癌、生殖細胞瘤)。轉移瘤多呈「球形、邊緣平滑」。攝護腺癌骨轉移多為「成骨性(osteoblastic)」。","options":{"A":"正確:原發無復發才做。","B":"★錯誤(本題答案):VATS 非標準術式。","C":"正確:可減少腫瘤負擔。","D":"正確:術前胸部 MRI 不一定需要。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"106020-27":{"quick":"肺癌術後最常見死因 A:肺炎併敗血症。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"★正確(本題答案):肺炎併敗血症。","B":"心衰非最常見。","C":"腎衰非最常見。","D":"肝衰非最常見。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"106080-19":{"quick":"正確為 B(123):腺癌最常見、鱗癌與抽菸最相關且位中央;4(小細胞可手術治癒)錯。","detail":{"backgroun 小。","C":"左上葉體積大。","D":"左下葉體積大。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"110020-22":{"quick":"正確為 D:DLCO<50% 應加測運動心肺功能(較準確評估手術風險)。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"錯:ppo-FEV1>40% 較合理;FEV1 非「術後肺容積」指標描述有誤。","B":"錯:ppo-FEV1 20–30% 風險高,非安全。","C":"錯:DLCO<60–80% 才增風險(門檻描述偏高)。","D":"★正確(本題答案):DLCO<50% 加測運動心肺功能。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"110080-24":{"quick":"正確為 B:鱗狀細胞癌(中央)較腺癌易由痰液細胞學驗出。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"錯:非均需腦 MRI。","B":"★正確(本題答案):鱗癌易痰液檢出。","C":"錯:LDCT 可降高危群死亡率(NLST)。","D":"錯:PET 非篩檢工具。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"111020-33":{"quick":"正確為 C:局部切除無法診斷之肺腫瘤,有時須做肺葉切除。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"錯:極早期小細胞肺癌可手術。","B":"錯:II 期需輔助化療。","C":"★正確(本題答案):診斷需要時行肺葉切除。","D":"錯:單發腦轉移仍可切肺。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"111080-74":{"quick":"最恰當為 D:攝護腺癌轉移肋骨可為「成骨性(osteoblastic)」病灶。","detail":{"background":"肺轉移瘤切除(metastasectomy)條件:原發腫瘤已控制無復發、無肺外轉移(或可控)、病灶可完全切除且保留足夠肺功能。多採開胸以「手觸診」找出影像未顯之小結節(VATS 非標準);目的減少腫瘤負擔/可能治癒(如肉瘤、大腸癌、生殖細胞瘤)。轉移瘤多呈「球形、邊緣平滑」。攝護腺癌骨轉移多為「成骨性(osteoblastic)」。","options":{"A":"錯:肺轉移不一定合併縱膈/肺門淋巴腫。","B":"錯:肺轉移多球形邊緣平滑。","C":"錯:肋膜轉移常多發且生肋膜積液。","D":"★正確(本題答案):攝護腺癌成骨性轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"112020-27":{"quick":"錯在 D:肺腺癌「較易」轉移至腦(非較不易)。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"正確:腺癌最常見。","B":"正確:源自支氣管黏液細胞。","C":"正確:多在周邊。","D":"★錯誤(本題答案):腺癌較易腦轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"113020-27":{"quick":"錯在 D:小細胞肺癌確診多已「擴散」,「不」適合手術(以化放療為主)。","detail":{"background":"肺癌:①腺癌(adenocarcinoma)=台灣與全球最常見,源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即可血行轉移(腦/骨/肝/腎上腺);②鱗狀細胞癌=與抽菸最相關、多在「中央肺門」、可空洞;③小細胞肺癌(SCLC)=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」(僅極早期 T1-2N0 才考慮);④大細胞癌。分期(TNM)決定治療:Stage I/II 以「手術切除(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIA 多模式;IIIB/IV 以化放療/標靶/免疫為主。可切除性評估:對側縱膈(N3)、遠端轉移、惡性肋膜積液(M1a)、喉返/膈神經麻痺、上腔靜脈症候群為不適合根治手術之徵象;單純橫膈/胸壁(T3)仍可切除。術前評估:胸部 CT、PET、腦影像(分期)、「肺功能(FEV1、DLCO,DLCO<50% 加做運動心肺測試)」。LDCT 可降低高危族群肺癌死亡率(NLST)。術後最常見死因=「肺炎併敗血症」;最常見併發症=痰積致肺擴張不全(atelectasis)。","options":{"A":"正確:多在中央。","B":"正確:分侷限期/擴展期。","C":"正確:五年存活率差。","D":"★錯誤(本題答案):SCLC 多擴散,不適合手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"114070-25":{"quick":"與胸腔疾病最不相關 C:假性紅血球增多症(pseudopolycythemia)。","detail":{"background":"肺癌/胸腔病變相關症候群:上腔靜脈症候群(SVC,縱膈腫瘤/肺癌壓迫)、Horner 症候群(肺尖 Pancoast 腫瘤侵犯交感神經鏈)、Pancoast 症候群(肺尖腫瘤+臂叢/肋骨)。「假性紅血球增多(血液濃縮)」與胸腔疾病無直接關聯。","options":{"A":"相關:上腔靜脈症候群。","B":"相關:Horner 症候群(Pancoast)。","C":"★最不相關(本題答案):假性紅血球增多症。","D":"相關:Pancoast 症候群。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"101030-24":{"quick":"錯在 D:原發性「非精原(nonseminoma)」生殖細胞瘤第一線為「化療」,非手術。","detail":{"background":"縱膈生殖細胞瘤:好發年輕男性。①畸胎瘤(teratoma)最常見、良性多、手術切除;②精原細胞瘤(seminoma)約佔 1/3—「AFP 正常、bHCG 可輕度上升」、對「放療/化療反應佳」;③非精原(nonseminoma,如卵黃囊/胚胎癌/絨毛膜癌)—AFP 及/或 bHCG 顯著上升、「第一線為 cisplatin 化療」,殘餘腫塊再手術。腫瘤標記(AFP/bHCG)用於鑑別、評估療效、追蹤復發;須檢查生殖腺。","options":{"A":"正確:後縱膈神經源多為神經鞘瘤。","B":"正確:胸腺瘤最常合併重症肌無力。","C":"正確:囊實性+脂肪+鈣化=畸胎瘤。","D":"★錯誤(本題答案):非精原第一線為化療。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"102030-35":{"quick":"錯在 C:下行性壞死性縱膈炎「需」積極外科引流(非不需)。","detail":{"background":"下行性壞死性縱膈炎(descending necrotizing mediastinitis):多源自「牙源性(odontogenic)/咽後感染」,經頸部筋膜層因重力與縱膈負壓下行;為多菌種口腔常在菌。死亡率高,治療須「廣效抗生素＋積極外科清創引流(頸部+縱膈)」。","options":{"A":"正確:多為牙源性感染。","B":"正確:重力+負壓下行。","C":"★錯誤(本題答案):需外科引流。","D":"正確:口腔常在菌。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"102110-30":{"quick":"錯在 B:後縱膈腫瘤「小孩惡性比例較成人高」(neuroblastoma)。","detail":{"background":"縱膈腔分區與好發腫瘤:①前縱膈(最常見腫瘤區)—胸腺瘤、淋巴瘤、生殖細胞瘤、胸內甲狀腺(4 T:Thymoma/Teratoma/Thyroid/Terrible lymphoma);②中縱膈(腫瘤最少)—囊腫(支氣管/心包/腸源)、淋巴結;③後縱膈—神經源性腫瘤(成人 schwannoma、小孩 neuroblastoma)。「小孩最常見縱膈腫瘤=神經源性」;小孩後縱膈惡性(neuroblastoma)比例較成人高。","options":{"A":"正確:最常見為 schwannoma。","B":"★錯誤(本題答案):小孩惡性比例較成人高。","C":"正確:最常見惡性為 neuroblastoma。","D":"正確:良性以手術為主。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"103100-31":{"quick":"錯在 C:胸腺瘤「非良性」,可侵犯/種植/遠端轉移。","detail":{"background":"胸腺瘤(thymoma):前上縱膈最常見腫瘤;最常合併「重症肌無力(MG)」(約 30–50% 胸腺瘤合併 MG;反之約 10–15% MG 病人有胸腺瘤),亦合併純紅血球再生不良、低球蛋白血症。「非良性」—可被膜外侵犯、種植轉移、上腔靜脈症候群。治療以「完整手術切除」為主(預後關鍵),Masaoka II 期以上術後加放療,無法切除者以「cisplatin 為主化療」有效。Masaoka 分期:I 被膜完整、II 被膜侵犯、III 侵犯鄰近器官(心包/大血管/肺)、IVa 肋膜/心包種植、IVb 淋巴/血行轉移。","options":{"A":"正確:手術切除為主。","B":"正確:重症肌無力最常伴隨。","C":"★錯誤(本題答案):胸腺瘤非良性、可轉移。","D":"正確:完整切除影響預後。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"104090-27":{"quick":"縱膈腫瘤最少發生於 D:中縱膈腔。","detail":{"background":"縱膈腔分區與好發腫瘤:①前縱膈(最常見腫瘤區)—胸腺瘤、淋巴瘤、生殖細胞瘤、胸內甲狀腺(4 T:Thymoma/Teratoma/Thyroid/Terrible lymphoma);②中縱膈(腫瘤最少)—囊腫(支氣管/心包/腸源)、淋巴結;③後縱膈—神經源性腫瘤(成人 schwannoma、小孩 neuroblastoma)。「小孩最常見縱膈腫瘤=神經源性」;小孩後縱膈惡性(neuroblastoma)比例較成人高。","options":{"A":"前縱膈最常見。","B":"上縱膈常見。","C":"後縱膈次之。","D":"★正確(本題答案):中縱膈最少。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"105100-27":{"quick":"錯在 A:前縱膈瘤併主動脈侵犯、AFP/bHCG 正常→應「先切片」再依病理治療,「不應先切除再輔助化療」。","detail":{"background":"縱膈生殖細胞瘤:好發年輕男性。①畸胎瘤(teratoma)最常見、良性多、手術切除;②精原細胞瘤(seminoma)約佔 1/3—「AFP 正常、bHCG 可輕度上升」、對「放療/化療反應佳」;③非精原(nonseminoma,如卵黃囊/胚胎癌/絨毛膜癌)—AFP 及/或 bHCG 顯著上升、「第一線為 cisplatin 化療」,殘餘腫塊再手術。腫瘤標記(AFP/bHCG)用於鑑別、評估療效、追蹤復發;須檢查生殖腺。","options":{"A":"★錯誤(本題答案):不應先切除,應先切片。","B":"正確:治療前應切片。","C":"正確:應檢查生殖腺。","D":"正確:可能對放療有反應(seminoma/lymphoma)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"106080-17":{"quick":"錯在 A:Masaoka「IVa=肋膜/心包種植」,「胸腔外(遠端)轉移為 IVb」。","detail":{"background":"胸腺瘤(thymoma):前上縱膈最常見腫瘤;最常合併「重症肌無力(MG)」(約 30–50% 胸腺瘤合併 MG;反之約 10–15% MG 病人有胸腺瘤),亦合併純紅血球再生不良、低球蛋白血症。「非良性」—可被膜外侵犯、種植轉移、上腔靜脈症候群。治療以「完整手術切除」為主(預後關鍵),Masaoka II 期以上術後加放療,無法切除者以「cisplatin 為主化療」有效。Masaoka 分期:I 被膜完整、II 被膜侵犯、III 侵犯鄰近器官(心包/大血管/肺)、IVa 肋膜/心包種植、IVb 淋巴/血行轉移。","options":{"A":"★錯誤(本題答案):胸腔外轉移為 IVb,非 IVa。","B":"正確:I=被膜完整。","C":"正確:II=被膜侵犯。","D":"正確:III=侵犯鄰近器官。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"106080-21":{"quick":"錯在 C:cisplatin 化療對胸腺瘤「有效」。","detail":{"background":"胸腺瘤(thymoma):前上縱膈最常見腫瘤;最常合併「重症肌無力(MG)」(約 30–50% 胸腺瘤合併 MG;反之約 10–15% MG 病人有胸腺瘤),亦合併純紅血球再生不良、低球蛋白血症。「非良性」—可被膜外侵犯、種植轉移、上腔靜脈症候群。治療以「完整手術切除」為主(預後關鍵),Masaoka II 期以上術後加放療,無法切除者以「cisplatin 為主化療」有效。Masaoka 分期:I 被膜完整、II 被膜侵犯、III 侵犯鄰近器官(心包/大血管/肺)、IVa 肋膜/心包種植、IVb 淋巴/血行轉移。","options":{"A":"正確:前上縱膈最常見腫瘤。","B":"正確:II 期切除後常加放療。","C":"★錯誤(本題答案):cisplatin 對胸腺瘤有效。","D":"正確:大部分 MG 未合併胸腺瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"107080-24":{"quick":"錯在 D:縱膈腫瘤「多數無症狀(偶發)」,非超過 2/3 有症狀。","detail":{"background":"縱膈腔分區與好發腫瘤:①前縱膈(最常見腫瘤區)—胸腺瘤、淋巴瘤、生殖細胞瘤、胸內甲狀腺(4 T:Thymoma/Teratoma/Thyroid/Terrible lymphoma);②中縱膈(腫瘤最少)—囊腫(支氣管/心包/腸源)、淋巴結;③後縱膈—神經源性腫瘤(成人 schwannoma、小孩 neuroblastoma)。「小孩最常見縱膈腫瘤=神經源性」;小孩後縱膈惡性(neuroblastoma)比例較成人高。","options":{"A":"正確:症狀取決於位置/大小/惡性度。","B":"正確:可有 Horner 症候群。","C":"正確:胸腺瘤可有重症肌無力。","D":"★錯誤(本題答案):多數無症狀。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"108030-29":{"quick":"錯在 A:精原細胞瘤「AFP 正常」(bHCG 可輕度升),AFP 顯著升表示非精原。","detail":{"background":"縱膈生殖細胞瘤:好發年輕男性。①畸胎瘤(teratoma)最常見、良性多、手術切除;②精原細胞瘤(seminoma)約佔 1/3—「AFP 正常、bHCG 可輕度上升」、對「放療/化療反應佳」;③非精原(nonseminoma,如卵黃囊/胚胎癌/絨毛膜癌)—AFP 及/或 bHCG 顯著上升、「第一線為 cisplatin 化療」,殘餘腫塊再手術。腫瘤標記(AFP/bHCG)用於鑑別、評估療效、追蹤復發;須檢查生殖腺。","options":{"A":"★錯誤(本題答案):seminoma AFP 不顯著升高。","B":"正確:可鑑別精原 vs 非精原。","C":"正確:可評估化療效果。","D":"正確:追蹤復發。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"108080-23":{"quick":"錯在 B:精原細胞瘤(seminoma)「AFP 不升高」(AFP 升高見於非精原/卵黃囊)。","detail":{"background":"縱膈生殖細胞瘤:好發年輕男性。①畸胎瘤(teratoma)最常見、良性多、手術切除;②精原細胞瘤(seminoma)約佔 1/3—「AFP 正常、bHCG 可輕度上升」、對「放療/化療反應佳」;③非精原(nonseminoma,如卵黃囊/胚胎癌/絨毛膜癌)—AFP 及/或 bHCG 顯著上升、「第一線為 cisplatin 化療」,殘餘腫塊再手術。腫瘤標記(AFP/bHCG)用於鑑別、評估療效、追蹤復發;須檢查生殖腺。","options":{"A":"正確:畸胎瘤最常見。","B":"★錯誤(本題答案):seminoma AFP 不升高。","C":"正確:非精原可見 bHCG 升高。","D":"正確:seminoma 對放療較有效。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"109080-28":{"quick":"正確為 B:約 1/3 縱膈生殖細胞瘤為精原細胞瘤。","detail":{"background":"縱膈生殖細胞瘤:好發年輕男性。①畸胎瘤(teratoma)最常見、良性多、手術切除;②精原細胞瘤(seminoma)約佔 1/3—「AFP 正常、bHCG 可輕度上升」、對「放療/化療反應佳」;③非精原(nonseminoma,如卵黃囊/胚胎癌/絨毛膜癌)—AFP 及/或 bHCG 顯著上升、「第一線為 cisplatin 化療」,殘餘腫塊再手術。腫瘤標記(AFP/bHCG)用於鑑別、評估療效、追蹤復發;須檢查生殖腺。","options":{"A":"錯:好發年輕男性,非>65 歲。","B":"★正確(本題答案):約 1/3 為 seminoma。","C":"錯:seminoma AFP 不升高。","D":"錯:FNA 非最安全準確之診斷。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"110020-21":{"quick":"正確為 A:手術為胸腺瘤主要成功治療,必要時切除重建上腔靜脈預後較好。","detail":{"background":"胸腺瘤(thymoma):前上縱膈最常見腫瘤;最常合併「重症肌無力(MG)」(約 30–50% 胸腺瘤合併 MG;反之約 10–15% MG 病人有胸腺瘤),亦合併純紅血球再生不良、低球蛋白血症。「非良性」—可被膜外侵犯、種植轉移、上腔靜脈症候群。治療以「完整手術切除」為主(預後關鍵),Masaoka II 期以上術後加放療,無法切除者以「cisplatin 為主化療」有效。Masaoka 分期:I 被膜完整、II 被膜侵犯、III 侵犯鄰近器官(心包/大血管/肺)、IVa 肋膜/心包種植、IVb 淋巴/血行轉移。","options":{"A":"★正確(本題答案):手術為主、可切除重建 SVC。","B":"錯:約 10–15% MG 有胸腺瘤(非 10–50% 數據描述偏差)。","C":"錯:胸腺瘤可致 SVC 症候群。","D":"錯:Masaoka IVa 為種植非淋巴轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"110020-23":{"quick":"錯在 A:精原性生殖細胞瘤「不分泌 AFP」(AFP 升高見於非精原)。","detail":{"background":"縱膈生殖細胞瘤:好發年輕男性。①畸胎瘤(teratoma)最常見、良性多、手術切除;②精原細胞瘤(seminoma)約佔 1/3—「AFP 正常、bHCG 可輕度上升」、對「放療/化療反應佳」;③非精原(nonseminoma,如卵黃囊/胚胎癌/絨毛膜癌)—AFP 及/或 bHCG 顯著上升、「第一線為 cisplatin 化療」,殘餘腫塊再手術。腫瘤標記(AFP/bHCG)用於鑑別、評估療效、追蹤復發;須檢查生殖腺。","options":{"A":"★錯誤(本題答案):seminoma 不分泌 AFP。","B":"正確:小孩多神經源性腫瘤。","C":"正確:先手術再輔助治療預後較好。","D":"正確:小胸腺瘤合併 MG 應盡早切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"110080-27":{"quick":"錯在 D:胸腺瘤合併「重症肌無力/純紅再障/低球蛋白血症」,非脊椎異常(vertebral anomalies)。","detail":{"background":"胸腺瘤(thymoma):前上縱膈最常見腫瘤;最常合併「重症肌無力(MG)」(約 30–50% 胸腺瘤合併 MG;反之約 10–15% MG 病人有胸腺瘤),亦合併純紅血球再生不良、低球蛋白血症。「非良性」—可被膜外侵犯、種植轉移、上腔靜脈症候群。治療以「完整手術切除」為主(預後關鍵),Masaoka II 期以上術後加放療,無法切除者以「cisplatin 為主化療」有效。Masaoka 分期:I 被膜完整、II 被膜侵犯、III 侵犯鄰近器官(心包/大血管/肺)、IVa 肋膜/心包種植、IVb 淋巴/血行轉移。","options":{"A":"正確:神經纖維瘤—von Recklinghausen。","B":"正確:類癌—類癌症候群。","C":"正確:胸腺瘤—重症肌無力。","D":"★錯誤(本題答案):胸腺瘤非合併脊椎異常。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"111020-31":{"quick":"錯在 D:急性縱膈炎危急,「抗生素不足」,須外科引流清創。","detail":{"background":"縱膈炎:急性多源自牙源性/食道破裂/術後,危急、須「抗生素＋外科引流清創」;慢性肉芽腫性多因組織漿菌/結核,纖維化性(sclerosing/fibrosing)常因慢性淋巴結發炎(如肺結核、組織漿菌),手術多僅診斷/緩解併發症。","options":{"A":"正確:急性可因齒齦炎。","B":"正確:慢性手術多診斷/緩解用。","C":"正確:纖維性多因慢性淋巴結炎(結核)。","D":"★錯誤(本題答案):急性需外科引流,非抗生素即可。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"111080-30":{"quick":"錯在 B:支氣管囊腫(bronchogenic cyst)最常見,但「通常不與支氣管相通」。","detail":{"background":"原發縱膈囊腫:多無症狀。①支氣管囊腫(最常見,氣管隆突附近,「通常不與氣管支氣管相通」);②心包囊腫(好發右側心膈角);③腸源囊腫(食道旁)。","options":{"A":"正確:多無症狀。","B":"★錯誤(本題答案):支氣管囊腫通常不與支氣管相通。","C":"正確:心包囊腫好發右側心膈角。","D":"正確:腸源囊腫於食道旁。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"112020-30":{"quick":"錯在 D:縱膈惡性生殖細胞瘤「男性顯著好發」(有性別差異)。","detail":{"background":"縱膈生殖細胞瘤:好發年輕男性。①畸胎瘤(teratoma)最常見、良性多、手術切除;②精原細胞瘤(seminoma)約佔 1/3—「AFP 正常、bHCG 可輕度上升」、對「放療/化療反應佳」;③非精原(nonseminoma,如卵黃囊/胚胎癌/絨毛膜癌)—AFP 及/或 bHCG 顯著上升、「第一線為 cisplatin 化療」,殘餘腫塊再手術。腫瘤標記(AFP/bHCG)用於鑑別、評估療效、追蹤復發;須檢查生殖腺。","options":{"A":"正確:良性畸胎瘤部分切除也鮮少復發。","B":"正確:後縱膈常為神經源性。","C":"正確:seminoma 對化放療反應好。","D":"★錯誤(本題答案):惡性生殖細胞瘤男性好發。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"113070-29":{"quick":"錯在 A:胸腺瘤是「成人」腫瘤,「兒童最常見縱膈腫瘤為神經源性」。","detail":{"background":"胸腺瘤(thymoma):前上縱膈最常見腫瘤;最常合併「重症肌無力(MG)」(約 30–50% 胸腺瘤合併 MG;反之約 10–15% MG 病人有胸腺瘤),亦合併純紅血球再生不良、低球蛋白血症。「非良性」—可被膜外侵犯、種植轉移、上腔靜脈症候群。治療以「完整手術切除」為主(預後關鍵),Masaoka II 期以上術後加放療,無法切除者以「cisplatin 為主化療」有效。Masaoka 分期:I 被膜完整、II 被膜侵犯、III 侵犯鄰近器官(心包/大血管/肺)、IVa 肋膜/心包種植、IVb 淋巴/血行轉移。","options":{"A":"★錯誤(本題答案):胸腺瘤非兒童最常見。","B":"正確:盡量手術切除。","C":"正確:可合併重症肌無力。","D":"正確:無法切除以 cisplatin 化療有效。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"114070-26":{"quick":"小孩最常見縱膈腫瘤 C:神經源性腫瘤(neurogenic tumor)。","detail":{"background":"縱膈腔分區與好發腫瘤:①前縱膈(最常見腫瘤區)—胸腺瘤、淋巴瘤、生殖細胞瘤、胸內甲狀腺(4 T:Thymoma/Teratoma/Thyroid/Terrible lymphoma);②中縱膈(腫瘤最少)—囊腫(支氣管/心包/腸源)、淋巴結;③後縱膈—神經源性腫瘤(成人 schwannoma、小孩 neuroblastoma)。「小孩最常見縱膈腫瘤=神經源性」;小孩後縱膈惡性(neuroblastoma)比例較成人高。","options":{"A":"胸腺囊腫非最常見。","B":"淋巴瘤非最常見。","C":"★正確(本題答案):神經源性腫瘤。","D":"生殖細胞瘤非最常見。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"101030-26":{"quick":"錯在 D:惡性間皮瘤預後極差,五年存活率遠低於 70%(約 10% 以下)。","detail":{"background":"惡性肋膜間皮瘤(mesothelioma):與「石綿(asbestos)暴露」相關(潛伏 20–40 年)、好發 40 歲以上男性;侵犯壁層及臟層肋膜、呈呼吸困難+肋膜積液;預後極差(中位存活約 1 年、五年存活<10%)。","options":{"A":"正確:石綿暴露史。","B":"正確:侵犯壁層+臟層肋膜。","C":"正確:呼吸困難+肋膜積液。","D":"★錯誤(本題答案):五年存活非 70%(極差)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"102110-31":{"quick":"錯在 D:「細針穿刺引流無效」非標準手術適應症之列。","detail":{"background":"氣胸:原發性自發氣胸(年輕高瘦男、肺尖 bleb 破裂)vs 續發性(COPD/間質肺病等)。小量原發無症狀者可觀察/抽氣,非絕對需插胸管;大量/有症狀插胸管。手術(VATS bullectomy+肋膜固定)適應症:同側復發≥2 次、對側或雙側、持續漏氣>72 小時、合併血胸/膿胸/慢性氣胸、特殊職業(飛行/潛水)、首次但巨大 bleb。張力性氣胸=縱膈偏移、橫膈反轉、大量空氣、休克,須緊急減壓。","options":{"A":"適應症:持續漏氣>72 小時。","B":"適應症:同側復發≥2 次。","C":"適應症:合併血胸/膿胸/慢性氣胸。","D":"★錯誤(本題答案):細針穿刺非氣胸處置/非標準適應症。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"103030-30":{"quick":"非手術適應症為 C:插胸管後「立即」追蹤 X 光呈肺塌陷(肺擴張需時間,單此非適應症)。","detail":{"background":"氣胸:原發性自發氣胸(年輕高瘦男、肺尖 bleb 破裂)vs 續發性(COPD/間質肺病等)。小量原發無症狀者可觀察/抽氣,非絕對需插胸管;大量/有症狀插胸管。手術(VATS bullectomy+肋膜固定)適應症:同側復發≥2 次、對側或雙側、持續漏氣>72 小時、合併血胸/膿胸/慢性氣胸、特殊職業(飛行/潛水)、首次但巨大 bleb。張力性氣胸=縱膈偏移、橫膈反轉、大量空氣、休克,須緊急減壓。","options":{"A":"是:復發性氣胸。","B":"是:合併大量血胸。","C":"★非適應症(本題答案):插管後立即仍塌陷。","D":"是:張力性氣胸(緊急減壓)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"106020-30":{"quick":"錯在 D:原發性氣胸「插胸管非絕對需要」(小量無症狀可觀察/抽氣)。","detail":{"background":"氣胸:原發性自發氣胸(年輕高瘦男、肺尖 bleb 破裂)vs 續發性(COPD/間質肺病等)。小量原發無症狀者可觀察/抽氣,非絕對需插胸管;大量/有症狀插胸管。手術(VATS bullectomy+肋膜固定)適應症:同側復發≥2 次、對側或雙側、持續漏氣>72 小時、合併血胸/膿胸/慢性氣胸、特殊職業(飛行/潛水)、首次但巨大 bleb。張力性氣胸=縱膈偏移、橫膈反轉、大量空氣、休克,須緊急減壓。","options":{"A":"正確:病史+理學+X 光可診斷。","B":"正確:CT 非常規。","C":"正確:COPD 引起為續發性。","D":"★錯誤(本題答案):插胸管非絕對需要。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"107080-25":{"quick":"正確為 D:假性乳糜胸常由「類風濕肋膜炎或結核」所致。","detail":{"background":"乳糜胸(chylothorax):胸管(thoracic duct)受損,乳白(禁食時可澄清)、富含「三酸甘油脂(>110 mg/dL)、乳糜微粒、淋巴球(非嗜酸球)」。最常因「創傷/手術(食道切除、縱膈淋巴廓清、左頸/鎖骨上廓清)」,亦見腫瘤(淋巴瘤)。胸管多在右下胸,手術結紮多採「右側」。保守治療:中鏈三酸甘油脂(MCT,直接入門脈不經淋巴)或禁食+TPN 1–2 週;無效或量大則結紮。假性乳糜胸見於類風濕肋膜炎/結核(膽固醇結晶)。","options":{"A":"錯:乳糜胸最常見於「右側」。","B":"錯:最常因創傷/手術,非腫瘤。","C":"錯:量少可保守,非唯一靠結紮。","D":"★正確(本題答案):假性乳糜胸=RA/結核。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"108030-26":{"quick":"正確為 D:肺炎旁積液葡萄糖通常下降、<60 mg/dL。","detail":{"background":"肋膜積液:漏出液(transudate,Light 標準皆陰,如心衰/肝硬化/腎病)vs 滲出液(exudate,符合 Light 任一:積液/血清蛋白>0.5、LDH 比>0.6、LDH>2/3 上限)。複雜性肺炎旁積液/膿胸:pH<7.2、葡萄糖<60、LDH 高、化膿→須「引流/胸腔鏡」。惡性積液多為 exudate;女性最常因「乳癌」、整體肺癌/乳癌/淋巴瘤最多;黑色素瘤少見。引流不延長存活;反覆者行「肋膜固定術(talc 效果最佳)」。","options":{"A":"錯:漏出液見於心衰/肝硬化,非肺炎。","B":"錯:滲出液混濁、蛋白高。","C":"錯:滲出液 LDH 比>0.6。","D":"★正確(本題答案):肺炎旁積液葡萄糖<60。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"108080-21":{"quick":"錯在 D:肋膜固定術(pleurodesis)「對惡性積液有效」。","detail":{"background":"肋膜積液:漏出液(transudate,Light 標準皆陰,如心衰/肝硬化/腎病)vs 滲出液(exudate,符合 Light 任一:積液/血清蛋白>0.5、LDH 比>0.6、LDH>2/3 上限)。複雜性肺炎旁積液/膿胸:pH<7.2、葡萄糖<60、LDH 高、化膿→須「引流/胸腔鏡」。惡性積液多為 exudate;女性最常因「乳癌」、整體肺癌/乳癌/淋巴瘤最多;黑色素瘤少見。引流不延長存活;反覆者行「肋膜固定術(talc 效果最佳)」。","options":{"A":"正確:惡性積液多為 exudate。","B":"正確:乳癌/肺癌最常造成。","C":"正確:胸腔鏡可引流兼診斷。","D":"★錯誤(本題答案):pleurodesis 有效。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"110020-26":{"quick":"錯在 B:乳糜胸手術多採「右側」處理(胸管走右下胸)。","detail":{"background":"乳糜胸(chylothorax):胸管(thoracic duct)受損,乳白(禁食時可澄清)、富含「三酸甘油脂(>110 mg/dL)、乳糜微粒、淋巴球(非嗜酸球)」。最常因「創傷/手術(食道切除、縱膈淋巴廓清、左頸/鎖骨上廓清)」,亦見腫瘤(淋巴瘤)。胸管多在右下胸,手術結紮多採「右側」。保守治療:中鏈三酸甘油脂(MCT,直接入門脈不經淋巴)或禁食+TPN 1–2 週;無效或量大則結紮。假性乳糜胸見於類風濕肋膜炎/結核(膽固醇結晶)。","options":{"A":"正確:左頸/鎖骨上廓清可致。","B":"★錯誤(本題答案):手術多採右側,非左側。","C":"正確:保守治療 1–2 週。","D":"正確:結紮橫膈上胸管為主。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"110080-22":{"quick":"正確為 A:女性惡性肋膜積液最常因「乳癌」。","detail":{"background":"肋膜積液:漏出液(transudate,Light 標準皆陰,如心衰/肝硬化/腎病)vs 滲出液(exudate,符合 Light 任一:積液/血清蛋白>0.5、LDH 比>0.6、LDH>2/3 上限)。複雜性肺炎旁積液/膿胸:pH<7.2、葡萄糖<60、LDH 高、化膿→須「引流/胸腔鏡」。惡性積液多為 exudate;女性最常因「乳癌」、整體肺癌/乳癌/淋巴瘤最多;黑色素瘤少見。引流不延長存活;反覆者行「肋膜固定術(talc 效果最佳)」。","options":{"A":"★正確(本題答案):女性最常乳癌。","B":"錯:引流不提升存活。","C":"錯:部分肺癌積液仍可手術。","D":"錯:talc 沾黏效果最佳(非最差)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"112080-28":{"quick":"非惡性肋膜積液常見成因 D:黑色素瘤。","detail":{"background":"肋膜積液:漏出液(transudate,Light 標準皆陰,如心衰/肝硬化/腎病)vs 滲出液(exudate,符合 Light 任一:積液/血清蛋白>0.5、LDH 比>0.6、LDH>2/3 上限)。複雜性肺炎旁積液/膿胸:pH<7.2、葡萄糖<60、LDH 高、化膿→須「引流/胸腔鏡」。惡性積液多為 exudate;女性最常因「乳癌」、整體肺癌/乳癌/淋巴瘤最多;黑色素瘤少見。引流不延長存活;反覆者行「肋膜固定術(talc 效果最佳)」。","options":{"A":"常見:肺腺癌。","B":"常見:淋巴瘤。","C":"常見:間皮瘤。","D":"★非常見(本題答案):黑色素瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"113020-29":{"quick":"錯在 B:乳糜富含三酸甘油脂、乳糜微粒與「淋巴球」(非嗜酸性球)。","detail":{"background":"乳糜胸(chylothorax):胸管(thoracic duct)受損,乳白(禁食時可澄清)、富含「三酸甘油脂(>110 mg/dL)、乳糜微粒、淋巴球(非嗜酸球)」。最常因「創傷/手術(食道切除、縱膈淋巴廓清、左頸/鎖骨上廓清)」,亦見腫瘤(淋巴瘤)。胸管多在右下胸,手術結紮多採「右側」。保守治療:中鏈三酸甘油脂(MCT,直接入門脈不經淋巴)或禁食+TPN 1–2 週;無效或量大則結紮。假性乳糜胸見於類風濕肋膜炎/結核(膽固醇結晶)。","options":{"A":"正確:乳白或禁食時澄清。","B":"★錯誤(本題答案):富含淋巴球,非嗜酸球。","C":"正確:食道切除/縱膈廓清後常見。","D":"正確:量少用 MCT 飲食或禁食。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"113070-27":{"quick":"錯在 C:保守治療應給「中鏈(MCT)」三酸甘油脂飲食,非長鏈(長鏈經淋巴吸收會加重乳糜)。","detail":{"background":"乳糜胸(chylothorax):胸管(thoracic duct)受損,乳白(禁食時可澄清)、富含「三酸甘油脂(>110 mg/dL)、乳糜微粒、淋巴球(非嗜酸球)」。最常因「創傷/手術(食道切除、縱膈淋巴廓清、左頸/鎖骨上廓清)」,亦見腫瘤(淋巴瘤)。胸管多在右下胸,手術結紮多採「右側」。保守治療:中鏈三酸甘油脂(MCT,直接入門脈不經淋巴)或禁食+TPN 1–2 週;無效或量大則結紮。假性乳糜胸見於類風濕肋膜炎/結核(膽固醇結晶)。","options":{"A":"正確:乳糜高三酸甘油脂。","B":"正確:淋巴廓清術後常見。","C":"★錯誤(本題答案):應用 MCT 非長鏈。","D":"正確:肺腫瘤亦可引起。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"114070-72":{"quick":"最不恰當 D:張力性氣胸為「大量」空氣漏入(非少量)。","detail":{"background":"氣胸:原發性自發氣胸(年輕高瘦男、肺尖 bleb 破裂)vs 續發性(COPD/間質肺病等)。小量原發無症狀者可觀察/抽氣,非絕對需插胸管;大量/有症狀插胸管。手術(VATS bullectomy+肋膜固定)適應症:同側復發≥2 次、對側或雙側、持續漏氣>72 小時、合併血胸/膿胸/慢性氣胸、特殊職業(飛行/潛水)、首次但巨大 bleb。張力性氣胸=縱膈偏移、橫膈反轉、大量空氣、休克,須緊急減壓。","options":{"A":"恰當:吐氣相 PA 可助診斷不明顯氣胸。","B":"恰當:張力性氣胸縱膈偏移。","C":"恰當:張力性氣胸可橫膈反轉。","D":"★最不恰當(本題答案):張力性為大量空氣。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"115020-7":{"quick":"肺炎旁積液 pH 7.1、葡萄糖 30、化膿(膿胸)→C:儘早引流或胸腔鏡介入。","detail":{"background":"肋膜積液:漏出液(transudate,Light 標準皆陰,如心衰/肝硬化/腎病)vs 滲出液(exudate,符合 Light 任一:積液/血清蛋白>0.5、LDH 比>0.6、LDH>2/3 上限)。複雜性肺炎旁積液/膿胸:pH<7.2、葡萄糖<60、LDH 高、化膿→須「引流/胸腔鏡」。惡性積液多為 exudate;女性最常因「乳癌」、整體肺癌/乳癌/淋巴瘤最多;黑色素瘤少見。引流不延長存活;反覆者行「肋膜固定術(talc 效果最佳)」。","options":{"A":"錯:膿胸不可只觀察。","B":"錯:反覆穿刺不足以處理膿胸。","C":"★正確(本題答案):儘早引流/胸腔鏡。","D":"錯:換抗生素+一週後追蹤延誤。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"115020-39":{"quick":"最不適當為 B(本題多重答案 B/C 均給分):間皮瘤外科非僅切片/姑息,可行肋膜外全肺切除/肋膜切除等根治性手術。","detail":{"background":"惡性間皮瘤:石綿相關、>40 歲男性好發;外科可行「肋膜外全肺切除(EPP,切肺+臟層/壁層肋膜+心包+橫膈)」或肋膜切除/剝脫,屬多模式治療一環,非僅切片與姑息;單一療法皆難延長存活,以多模式為主。本題官方 B、C 均給分。","options":{"A":"正確:石綿相關、>40 歲男性。","B":"★最不適當(本題答案,給分):外科非僅切片/姑息。","C":"(給分)單一療法難延長存活。","D":"正確:EPP 切除範圍描述正確。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"104090-2":{"quick":"氣管偏右+左側呼吸音弱+左胸皮下氣腫+休克→C:左側張力性氣胸。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"右大量血胸不合(氣管偏右、左呼吸音弱)。","B":"右張力性氣胸應氣管偏左。","C":"★正確(本題答案):左側張力性氣胸。","D":"心包填塞無偏移/皮下氣腫。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"105020-75":{"quick":"引流後再休克→D:重新評估病人(ABC,找出惡化原因再決定)。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"插管非首要。","B":"未達開胸指徵前先評估。","C":"再插胸管非首選。","D":"★正確(本題答案):重新評估病人。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"105020-77":{"quick":"胸骨下方撞擊+左第 8 肋骨折→最不可能 C:大血管破裂。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"可能:肺(葉)破裂。","B":"可能:氣管/支氣管破裂。","C":"★最不可能(本題答案):大血管破裂。","D":"可能:橫膈膜破裂(下位肋骨)。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"106020-6":{"quick":"胸管置放位置正確為 A:第 4 或 5 肋間、腋中線。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"★正確(本題答案):4–5 肋間腋中線。","B":"第 2 肋間鎖骨中線用於緊急減壓針刺,非引流。","C":"第 6–7 肋間過低(恐傷橫膈/腹臟)。","D":"位置有標準,非全憑情況。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"107020-76":{"quick":"引流 800 mL 後再休克→D:重新評估病人。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"插管非首要。","B":"先評估是否達開胸指徵。","C":"輸血同時仍須評估原因。","D":"★正確(本題答案):重新評估病人。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"107080-28":{"quick":"創傷後急性呼吸不足最常見原因 B:氣胸。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"肺挫傷亦常見但非最常見。","B":"★正確(本題答案):氣胸。","C":"肋骨骨折本身。","D":"ARDS 較晚發生。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"108030-75":{"quick":"引流 700 mL 後再休克→D:重新評估病人。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"插管非首要。","B":"先評估開胸指徵。","C":"輸血同時須評估。","D":"★正確(本題答案):重新評估病人。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"111080-29":{"quick":"正確為 D:皮下氣腫+縱膈氣腫→須考慮食道或氣管受傷。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"錯:頸部穿刺傷食道亦可能傷,須檢查。","B":"錯:穿刺物不可先移除(壓迫止血)。","C":"錯:鈍傷無外表瘀青仍可有氣血胸。","D":"★正確(本題答案):縱膈氣腫疑食道/氣管傷。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"112020-2":{"quick":"錯在 B:小孩肋骨「較有彈性、不易骨折」(非較易)。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"正確:下位肋骨骨折查腹內臟器。","B":"★錯誤(本題答案):小孩肋骨較不易骨折。","C":"正確:小孩較易張力性氣胸。","D":"正確:轉院前少量氣胸仍應放胸管。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"113070-2":{"quick":"正確為 C:張力性氣胸「低血容時可能無頸靜脈怒張」。","detail":{"background":"胸部創傷急救(ATLS):立即致命傷=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞。張力性氣胸:患側呼吸音消失、氣管「偏向對側」、患側皮下氣腫、頸靜脈怒張(低血容時可不明顯)、休克→「立即針刺/胸管減壓」。開放性氣胸:三邊膠布封+胸管。胸管置放:「第 4–5 肋間、腋中線」,沿肋骨「上緣」進入(下緣有神經血管束)。大量血胸開胸指徵:初次引流>1500 mL,或持續>200 mL/hr×2–4 小時;處置不穩定者先「重新評估(ABC)」找原因再決定。皮下+縱膈氣腫→疑「食道或氣管」損傷。小孩肋骨「較有彈性、不易骨折」,外力直接傳至肺(肺挫傷)、且較易張力性氣胸。下位肋骨(9–12)骨折要查腹內臟器(肝脾)。","options":{"A":"錯:開放性氣胸三邊封+放胸管,非等變化。","B":"錯:不可經傷口放胸管(感染/路徑)。","C":"★正確(本題答案):張力性氣胸可無頸靜脈怒張。","D":"錯:胸管沿肋骨「上緣」進入(下緣有神經血管)。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"102030-30":{"quick":"錯在 C:bullous emphysema 手術為「肺大泡切除(bullectomy)」,不一定肺葉切除。","detail":{"background":"感染性肺疾外科:①肺膿瘍—多厭氧菌/吸入,X 光見「氣液平面」空洞,可合併膿胸,亦與金黃葡萄球菌菌血症相關;「大部分以抗生素+引流即癒」,手術僅限併支氣管肋膜瘻管、大咳血、慢性無法引流、疑癌。②支氣管擴張症—手術限「侷限單肺葉、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。③肺結核—手術用於多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。④咳血—大量定義>600 mL/24h;硬式支氣管鏡優於軟式(抽吸/止血),支氣管動脈栓塞有效。⑤氣管惡性腫瘤—最常見為「鱗狀細胞癌」,次為腺樣囊狀癌(沿神經/黏膜下擴散)。⑥麴菌球(aspergilloma)—抗黴藥滲透差,症狀/咳血者以「手術切除」為主。⑦多汗症—胸腔鏡交感神經切除(T2–T3/T3–T4),傷及 T1 致 Horner;副作用代償性多汗、血/氣胸。","options":{"A":"適應症:漏氣致氣胸。","B":"適應症:肺大泡>單側半胸。","C":"★錯誤(本題答案):不一定需肺葉切除。","D":"正確:無症狀小者觀察。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"102110-29":{"quick":"肺膿瘍手術適應症「不包括」C:持續大量膿痰(可內科+引流)。","detail":{"background":"感染性肺疾外科:①肺膿瘍—多厭氧菌/吸入,X 光見「氣液平面」空洞,可合併膿胸,亦與金黃葡萄球菌菌血症相關;「大部分以抗生素+引流即癒」,手術僅限併支氣管肋膜瘻管、大咳血、慢性無法引流、疑癌。②支氣管擴張症—手術限「侷限單肺葉、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。③肺結核—手術用於多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。④咳血—大量定義>600 mL/24h;硬式支氣管鏡優於軟式(抽吸/止血),支氣管動脈栓塞有效。⑤氣管惡性腫瘤—最常見為「鱗狀細胞癌」,次為腺樣囊狀癌(沿神經/黏膜下擴散)。⑥麴菌球(aspergilloma)—抗黴藥滲透差,症狀/咳血者以「手術切除」為主。⑦多汗症—胸腔鏡交感神經切除(T2–T3/T3–T4),傷及 T1 致 Horner;副作用代償性多汗、血/氣胸。","options":{"A":"是:併支氣管肋膜瘻管。","B":"是:大量咳血。","C":"★不包括(本題答案):持續大量膿痰。","D":"是:疑合併肺癌。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"103100-27":{"quick":"錯在 D:肺結核手術「非全以胸腔鏡」(常需開胸,沾黏緻密)。","detail":{"background":"感染性肺疾外科:①肺膿瘍—多厭氧菌/吸入,X 光見「氣液平面」空洞,可合併膿胸,亦與金黃葡萄球菌菌血症相關;「大部分以抗生素+引流即癒」,手術僅限併支氣管肋膜瘻管、大咳血、慢性無法引流、疑癌。②支氣管擴張症—手術限「侷限單肺葉、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。③肺結核—手術用於多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。④咳血—大量定義>600 mL/24h;硬式支氣管鏡優於軟式(抽吸/止血),支氣管動脈栓塞有效。⑤氣管惡性腫瘤—最常見為「鱗狀細胞癌」,次為腺樣囊狀癌(沿神經/黏膜下擴散)。⑥麴菌球(aspergilloma)—抗黴藥滲透差,症狀/咳血者以「手術切除」為主。⑦多汗症—胸腔鏡交感神經切除(T2–T3/T3–T4),傷及 T1 致 Horner;副作用代償性多汗、血/氣胸。","options":{"A":"正確:多重抗藥為常見適應症。","B":"正確:併黴菌/大咳血考慮手術。","C":"正確:術前白蛋白>3 g/dL 較佳。","D":"★錯誤(本題答案):非全以胸腔鏡。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"104030-30":{"quick":"錯在 D:肺膿瘍「大部分以內科(抗生素+引流)即癒」,非開刀。","detail":{"background":"感染性肺疾外科:①肺膿瘍—多厭氧菌/吸入,X 光見「氣液平面」空洞,可合併膿胸,亦與金黃葡萄球菌菌血症相關;「大部分以抗生素+引流即癒」,手術僅限併支氣管肋膜瘻管、大咳血、慢性無法引流、疑癌。②支氣管擴張症—手術限「侷限單肺葉、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。③肺結核—手術用於多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。④咳血—大量定義>600 mL/24h;硬式支氣管鏡優於軟式(抽吸/止血),支氣管動脈栓塞有效。⑤氣管惡性腫瘤—最常見為「鱗狀細胞癌」,次為腺樣囊狀癌(沿神經/黏膜下擴散)。⑥麴菌球(aspergilloma)—抗黴藥滲透差,症狀/咳血者以「手術切除」為主。⑦多汗症—胸腔鏡交感神經切除(T2–T3/T3–T4),傷及 T1 致 Horner;副作用代償性多汗、血/氣胸。","options":{"A":"正確:可與葡萄球菌菌血症相關。","B":"正確:常合併膿胸。","C":"正確:多以內科治療。","D":"★錯誤(本題答案):非大部分需開刀。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"104090-26":{"quick":"惡性氣管腫瘤最常見組織型 C:鱗狀細胞癌。","detail":{"background":"感染性肺疾外科:①肺膿瘍—多厭氧菌/吸入,X 光見「氣液平面」空洞,可合併膿胸,亦與金黃葡萄球菌菌血症相關;「大部分以抗生素+引流即癒」,手術僅限併支氣管肋膜瘻管、大咳血、慢性無法引流、疑癌。②支氣管擴張症—手術限「侷限單肺葉、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。③肺結核—手術用於多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。④咳血—大量定義>600 mL/24h;硬式支氣管鏡優於軟式(抽吸/止血),支氣管動脈栓塞有效。⑤氣管惡性腫瘤—最常見為「鱗狀細胞癌」,次為腺樣囊狀癌(沿神經/黏膜下擴散)。⑥麴菌球(aspergilloma)—抗黴藥滲透差,症狀/咳血者以「手術切除」為主。⑦多汗症—胸腔鏡交感神經切除(T2–T3/T3–T4),傷及 T1 致 Horner;副作用代償性多汗、血/氣胸。","options":{"A":"腺樣囊狀癌次之。","B":"腺癌少。","C":"★正確(本題答案):鱗狀細胞癌。","D":"小細胞少。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"104090-74":{"quick":"錯在 C:淋巴管平滑肌增生症(LAM)幾乎只發生於女性,「男性發生率非與女性相當」。","detail":{"background":"淋巴管平滑肌增生症(LAM):幾乎只見「育齡女性」、與結節硬化(tuberous sclerosis)肺部病灶相似(瀰漫薄壁囊);可致「自發性氣胸、乳糜胸」,並合併腎臟血管肌脂瘤、神經系統病變。","options":{"A":"正確:與結節硬化肺病灶相似。","B":"正確:可發生自發性氣胸。","C":"★錯誤(本題答案):LAM 幾乎只見女性。","D":"正確:可累及腎臟/神經系統。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"105020-10":{"quick":"錯在 B:多汗症交感神經切除主要在「T2–T3(或 T3–T4)」,非第四、五。","detail":{"background":"感染性肺疾外科:①肺膿瘍—多厭氧菌/吸入,X 光見「氣液平面」空洞,可合併膿胸,亦與金黃葡萄球菌菌血症相關;「大部分以抗生素+引流即癒」,手術僅限併支氣管肋膜瘻管、大咳血、慢性無法引流、疑癌。②支氣管擴張症—手術限「侷限單肺葉、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。③肺結核—手術用於多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。④咳血—大量定義>600 mL/24h;硬式支氣管鏡優於軟式(抽吸/止血),支氣管動脈栓塞有效。⑤氣管惡性腫瘤—最常見為「鱗狀細胞癌」,次為腺樣囊狀癌(沿神經/黏膜下擴散)。⑥麴菌球(aspergilloma)—抗黴藥滲透差,症狀/咳血者以「手術切除」為主。⑦多汗症—胸腔鏡交感神經切除(T2–T3/T3–T4),傷及 T1 致 Horner;副作用代償性多汗、血/氣胸。","options":{"A":"正確:手掌腋下多汗可交感神經切除改善。","B":"★錯誤(本題答案):主要在 T2–T3,非 T4–T5。","C":"正確:傷 T1 致 Horner 症候群。","D":"正確:副作用含血胸/氣胸。"},"sources":["Sabiston Textbook o ":"錯:血管栓塞術通常有效。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"112080-27":{"quick":"錯在 B:肺膿瘍「與葡萄球菌菌血症有關」(可血行播散)。","detail":{"background":"感染性肺疾外科:①肺膿瘍—多厭氧菌/吸入,X 光見「氣液平面」空洞,可合併膿胸,亦與金黃葡萄球菌菌血症相關;「大部分以抗生素+引流即癒」,手術僅限併支氣管肋膜瘻管、大咳血、慢性無法引流、疑癌。②支氣管擴張症—手術限「侷限單肺葉、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。③肺結核—手術用於多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。④咳血—大量定義>600 mL/24h;硬式支氣管鏡優於軟式(抽吸/止血),支氣管動脈栓塞有效。⑤氣管惡性腫瘤—最常見為「鱗狀細胞癌」,次為腺樣囊狀癌(沿神經/黏膜下擴散)。⑥麴菌球(aspergilloma)—抗黴藥滲透差,症狀/咳血者以「手術切除」為主。⑦多汗症—胸腔鏡交感神經切除(T2–T3/T3–T4),傷及 T1 致 Horner;副作用代償性多汗、血/氣胸。","options":{"A":"正確:膿瘍破裂可致氣胸。","B":"★錯誤(本題答案):與葡萄球菌菌血症有關。","C":"正確:空腔氣液平面。","D":"正確:多以抗生素治癒。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"114070-27":{"quick":"最不適當 C:麴菌球(aspergilloma)抗黴藥滲透差,「症狀/咳血者以手術切除為主」,非抗黴藥 3 個月為首選。","detail":{"background":"感染性肺疾外科:①肺膿瘍—多厭氧菌/吸入,X 光見「氣液平面」空洞,可合併膿胸,亦與金黃葡萄球菌菌血症相關;「大部分以抗生素+引流即癒」,手術僅限併支氣管肋膜瘻管、大咳血、慢性無法引流、疑癌。②支氣管擴張症—手術限「侷限單肺葉、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。③肺結核—手術用於多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。④咳血—大量定義>600 mL/24h;硬式支氣管鏡優於軟式(抽吸/止血),支氣管動脈栓塞有效。⑤氣管惡性腫瘤—最常見為「鱗狀細胞癌」,次為腺樣囊狀癌(沿神經/黏膜下擴散)。⑥麴菌球(aspergilloma)—抗黴藥滲透差,症狀/咳血者以「手術切除」為主。⑦多汗症—胸腔鏡交感神經切除(T2–T3/T3–T4),傷及 T1 致 Horner;副作用代償性多汗、血/氣胸。","options":{"A":"正確:氣管腺樣囊狀癌可沿神經擴散。","B":"正確:長期呼吸器者不適合氣管修補。","C":"★最不適當(本題答案):麴菌球以手術為主。","D":"正確:侷限支氣管擴張適合手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"102110-33":{"quick":"錯在 B:游離肺「不與正常支氣管相通」。","detail":{"background":"先天性肺部與胸壁畸形:①游離肺(sequestration)—無正常支氣管相通、「血供來自體循環(主動脈)」;肺葉內型(intralobar,多下葉、靜脈回流肺靜脈)、肺葉外型(extralobar,自有臟層肋膜、靜脈回流體循環);治療手術切除。②先天性肺呼吸道畸形(CPAM)—多囊塊、可致胎兒窘迫/水腫,「有惡性轉化風險(胸膜肺母細胞瘤等)」,有症狀者手術、無症狀亦多於嬰幼期切除。③支氣管囊腫—即使無症狀「仍建議切除」(感染/惡變)。④漏斗胸(pectus excavatum)—發生率約 1/400、男:女 3–4:1、可合併二尖瓣脫垂/結締組織病;嚴重度用「Haller index=胸廓橫徑/前後徑」(>3.25 顯著);Nuss 手術最適「青春期前後」矯正,非 3 歲前。⑤胸壁腫瘤—骨纖維發育不良(fibrous dysplasia)血檢多正常;漿細胞瘤(M 蛋白)、骨肉瘤(ALP↑)、Ewing 肉瘤有異常。","opt ller index=胸廓橫徑/前後徑」(>3.25 顯著);Nuss 手術最適「青春期前後」矯正,非 3 歲前。⑤胸壁腫瘤—骨纖維發育不良(fibrous dysplasia)血檢多正常;漿細胞瘤(M 蛋白)、骨肉瘤(ALP↑)、Ewing 肉瘤有異常。","options":{"A":"漿細胞瘤有 M 蛋白。","B":"★正確(本題答案):纖維發育不良血檢正常。","C":"骨肉瘤 ALP 升高。","D":"Ewing 肉瘤可有異常。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"110080-23":{"quick":"錯在 A:支氣管囊腫「即使無症狀仍建議切除」(感染/惡變風險)。","detail":{"background":"先天性肺部與胸壁畸形:①游離肺(sequestration)—無正常支氣管相通、「血供來自體循環(主動脈)」;肺葉內型(intralobar,多下葉、靜脈回流肺靜脈)、肺葉外型(extralobar,自有臟層肋膜、靜脈回流體循環);治療手術切除。②先天性肺呼吸道畸形(CPAM)—多囊塊、可致胎兒窘迫/水腫,「有惡性轉化風險(胸膜肺母細胞瘤等)」,有症狀者手術、無症狀亦多於嬰幼期切除。③支氣管囊腫—即使無症狀「仍建議切除」(感染/惡變)。④漏斗胸(pectus excavatum)—發生率約 1/400、男:女 3–4:1、可合併二尖瓣脫垂/結締組織病;嚴重度用「Haller index=胸廓橫徑/前後徑」(>3.25 顯著);Nuss 手術最適「青春期前後」矯正,非 3 歲前。⑤胸壁腫瘤—骨纖維發育不良(fibrous dysplasia)血檢多正常;漿細胞瘤(M 蛋白)、骨肉瘤(ALP↑)、Ewing 肉瘤有異常。","options":{"A":"★錯誤(本題答案):支氣管囊腫無症狀仍宜切除。","B":"正確:肺葉肺氣腫為最常切除之先天囊性病。","C":"正確:肺葉內游離肺多下葉、回流肺靜脈。","D":"正確:肺血管吊索常伴喘鳴。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"110080-45":{"quick":"錯在 C:CPAM「有惡性轉化可能」(如胸膜肺母細胞瘤)。","detail":{"background":"先天性肺部與胸壁畸形:①游離肺(sequestration)—無正常支氣管相通、「血供來自體循環(主動脈)」;肺葉內型(intralobar,多下葉、靜脈回流肺靜脈)、肺葉外型(extralobar,自有臟層肋膜、靜脈回流體循環);治療手術切除。②先天性肺呼吸道畸形(CPAM)—多囊塊、可致胎兒窘迫/水腫,「有惡性轉化風險(胸膜肺母細胞瘤等)」,有症狀者手術、無症狀亦多於嬰幼期切除。③支氣管囊腫—即使無症狀「仍建議切除」(感染/惡變)。④漏斗胸(pectus excavatum)—發生率約 1/400、男:女 3–4:1、可合併二尖瓣脫垂/結締組織病;嚴重度用「Haller index=胸廓橫徑/前後徑」(>3.25 顯著);Nuss 手術最適「青春期前後」矯正,非 3 歲前。⑤胸壁腫瘤—骨纖維發育不良(fibrous dysplasia)血檢多正常;漿細胞瘤(M 蛋白)、骨肉瘤(ALP↑)、Ewing 肉瘤有異常。","options":{"A":"正確:CPAM 多囊塊侷限某肺葉。","B":"正確:可致胎兒窘迫。","C":"★錯誤(本題答案):CPAM 有惡變可能。","D":"正確:無症狀可觀察至約 6 月大再考慮手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"113070-48":{"quick":"Haller index(凹陷指數)= A:A/C(胸廓橫徑 ÷ 最凹處前後徑)。","detail":{"background":"先天性肺部與胸壁畸形:①游離肺(sequestration)—無正常支氣管相通、「血供來自體循環(主動脈)」;肺葉內型(intralobar,多下葉、靜脈回流肺靜脈)、肺葉外型(extralobar,自有臟層肋膜、靜脈回流體循環);治療手術切除。②先天性肺呼吸道畸形(CPAM)—多囊塊、可致胎兒窘迫/水腫,「有惡性轉化風險(胸膜肺母細胞瘤等)」,有症狀者手術、無症狀亦多於嬰幼期切除。③支氣管囊腫—即使無症狀「仍建議切除」(感染/惡變)。④漏斗胸(pectus excavatum)—發生率約 1/400、男:女 3–4:1、可合併二尖瓣脫垂/結締組織病;嚴重度用「Haller index=胸廓橫徑/前後徑」(>3.25 顯著);Nuss 手術最適「青春期前後」矯正,非 3 歲前。⑤胸壁腫瘤—骨纖維發育不良(fibrous dysplasia)血檢多正常;漿細胞瘤(M 蛋白)、骨肉瘤(ALP↑)、Ewing 肉瘤有異常。","options":{"A":"★正確(本題答案):A/C(橫徑/前後徑)。","B":"非此定義。","C":"非此定義。","D":"非此定義。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"114020-49":{"quick":"最不易自發性氣胸 C:游離肺(sequestration,實質塊狀、非含氣囊泡破裂機轉)。","detail":{"background":"先天性肺部與胸壁畸形:①游離肺(sequestration)—無正常支氣管相通、「血供來自體循環(主動脈)」;肺葉內型(intralobar,多下葉、靜脈回流肺靜脈)、肺葉外型(extralobar,自有臟層肋膜、靜脈回流體循環);治療手術切除。②先天性肺呼吸道畸形(CPAM)—多囊塊、可致胎兒窘迫/水腫,「有惡性轉化風險(胸膜肺母細胞瘤等)」,有症狀者手術、無症狀亦多於嬰幼期切除。③支氣管囊腫—即使無症狀「仍建議切除」(感染/惡變)。④漏斗胸(pectus excavatum)—發生率約 1/400、男:女 3–4:1、可合併二尖瓣脫垂/結締組織病;嚴重度用「Haller index=胸廓橫徑/前後徑」(>3.25 顯著);Nuss 手術最適「青春期前後」矯正,非 3 歲前。⑤胸壁腫瘤—骨纖維發育不良(fibrous dysplasia)血檢多正常;漿細胞瘤(M 蛋白)、骨肉瘤(ALP↑)、Ewing 肉瘤有異常。","options":{"A":"先天肺葉氣腫可過度充氣。","B":"支氣管源囊腫可破裂。","C":"★最不易(本題答案):游離肺。","D":"CPAM 囊泡可破裂致氣胸。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"114070-47":{"quick":"錯在 D:Nuss 手術最適矯正年齡為「青春期前後」,非 3 歲之前。","detail":{"background":"先天性肺部與胸壁畸形:①游離肺(sequestration)—無正常支氣管相通、「血供來自體循環(主動脈)」;肺葉內型(intralobar,多下葉、靜脈回流肺靜脈)、肺葉外型(extralobar,自有臟層肋膜、靜脈回流體循環);治療手術切除。②先天性肺呼吸道畸形(CPAM)—多囊塊、可致胎兒窘迫/水腫,「有惡性轉化風險(胸膜肺母細胞瘤等)」,有症狀者手術、無症狀亦多於嬰幼期切除。③支氣管囊腫—即使無症狀「仍建議切除」(感染/惡變)。④漏斗胸(pectus excavatum)—發生率約 1/400、男:女 3–4:1、可合併二尖瓣脫垂/結締組織病;嚴重度用「Haller index=胸廓橫徑/前後徑」(>3.25 顯著);Nuss 手術最適「青春期前後」矯正,非 3 歲前。⑤胸壁腫瘤—骨纖維發育不良(fibrous dysplasia)血檢多正常;漿細胞瘤(M 蛋白)、骨肉瘤(ALP↑)、Ewing 肉瘤有異常。","options":{"A":"正確:漏斗胸發生率約 1/400、男:女 3–4:1。","B":"正確:注意合併二尖瓣脫垂/結締組織病。","C":"正確:評估 Haller index、心肺功能、變形速率。","D":"★錯誤(本題答案):Nuss 最適青春期,非 3 歲前。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}}},TO=["肺癌與肺結節手術", "縱膈腔腫瘤與感染", "肋膜疾病與氣胸", "胸部創傷外科", "氣管支氣管‧感染性肺疾‧其他手術", "先天性肺部與胸壁畸形"],LEC={"肺癌與肺結節手術":{"title":"肺癌與肺結節手術","html":"\n<p><b>細胞型:</b><b>腺癌(adenocarcinoma)</b>=台灣與全球最常見、源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即血行轉移(腦/骨/肝/腎上腺);<b>鱗狀細胞癌</b>=與抽菸最相關、多在「中央肺門」、可空洞、痰液細胞學較易檢出;<b>小細胞肺癌(SCLC)</b>=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」。</p>\n<p><b>分期決定治療:</b>Stage I/II→「手術(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIB/IV→化放療/標靶/免疫。<b>不適合根治手術:</b>對側縱膈(N3)、遠端轉移、惡性肋膜積液、喉返/膈神經麻痺、上腔靜脈症候群;單純橫膈/胸壁(T3)仍可切除。</p>\n<p><b>術前評估:</b>胸部 CT、PET、腦影像、<b>肺功能(FEV1、DLCO;DLCO<50% 加做運動心肺測試)</b>。LDCT 可降高危群肺癌死亡率(NLST)。術後最常見死因=<b>肺炎併敗血症</b>;最常見併發症=<b>痰積致肺擴張不全(atelectasis)</b>。肺葉切除對肺功能影響最小者=右中葉。</p>\n<p><b>SPN:</b>≤3 cm 孤立病灶;良性鈣化/2 年無變大可不切;高風險需切片/切除。<b>肺轉移瘤切除</b>:原發控制、無肺外轉移、可完全切除;多開胸手觸診(VATS 非標準)。肺癌相關症候群:SVC、Horner、Pancoast。</p>\n"},"縱膈腔腫瘤與感染":{"title":"縱膈腔腫瘤與感染","html":"\n<p><b>分區好發:</b><b>前縱膈(最常見)</b>—4T:胸腺瘤(Thymoma)、畸胎瘤/生殖細胞瘤(Teratoma)、胸內甲狀腺(Thyroid)、淋巴瘤(Terrible lymphoma);<b>中縱膈(最少)</b>—囊腫(支氣管/心包/腸源)、淋巴結;<b>後縱膈</b>—神經源性(成人 schwannoma、小孩 neuroblastoma)。<b>小孩最常見=神經源性</b>;小孩後縱膈惡性比例較成人高。</p>\n<p><b>胸腺瘤:</b>前上縱膈最常見;最常合併<b>重症肌無力</b>(亦純紅再障、低球蛋白血症);「非良性」可侵犯/種植/SVC 症候群;治療以<b>完整手術切除</b>為主(預後關鍵),II 期以上加放療,無法切除以 cisplatin 化療。<b>Masaoka:</b>I 被膜完整、II 被膜侵犯、III 侵鄰近器官、IVa 肋膜/心包種植、IVb 淋巴/血行轉移。</p>\n<p><b>生殖細胞瘤(年輕男性):</b>畸胎瘤最常見(良性手術);<b>精原(seminoma,約 1/3)</b>—AFP 正常、bHCG 可輕升、放化療反應佳;<b>非精原</b>—AFP/bHCG 顯著升、第一線 cisplatin 化療,殘餘再手術。標記用於鑑別/療效/追蹤。</p>\n<p><b>縱膈炎:</b>急性(牙源性/食道破裂)危急→抗生素+<b>外科引流清創</b>;下行性壞死性縱膈炎多牙源性、須積極引流;纖維化性多慢性淋巴結炎(結核/組織漿菌)。</p>\n"},"肋膜疾病與氣胸":{"title":"肋膜疾病與氣胸","html":"\n<p><b>氣胸:</b>原發性(年輕高瘦男、肺尖 bleb)vs 續發性(COPD/間質肺病)。小量原發無症狀可觀察/抽氣,<b>插胸管非絕對需要</b>。<b>手術(VATS bullectomy+肋膜固定)適應症:</b>同側復發≥2 次、雙側、持續漏氣>72 h、合併血/膿胸、特殊職業。<b>張力性氣胸</b>=縱膈偏對側、大量空氣、休克(頸靜脈怒張低血容時可不明顯)→緊急減壓。</p>\n<p><b>肋膜積液:</b>漏出液(心衰/肝硬化)vs 滲出液(Light 標準:蛋白比>0.5、LDH 比>0.6、LDH>2/3 上限)。<b>複雜性肺炎旁/膿胸</b>:pH<7.2、葡萄糖<60、化膿→<b>引流/胸腔鏡</b>。惡性積液多 exudate、女性最常乳癌;<b>肋膜固定術(talc 效果最佳)</b>;引流不延長存活。</p>\n<p><b>乳糜胸:</b>胸管受損、乳白(禁食澄清)、高三酸甘油脂+乳糜微粒+<b>淋巴球(非嗜酸球)</b>;最常因創傷/手術(食道切除、縱膈/左頸廓清);胸管走右下胸→手術多採<b>右側</b>;保守用 <b>中鏈三酸甘油脂(MCT)</b> 或禁食 TPN。假性乳糜胸=RA/結核。</p>\n<p><b>惡性間皮瘤:</b>石綿相關、>40 歲男、預後極差(五年<10%);外科可行肋膜外全肺切除(EPP)。</p>\n"},"胸部創傷外科":{"title":"胸部創傷外科","html":"\n<p><b>立即致命傷(ATLS):</b>氣道阻塞、<b>張力性氣胸</b>、<b>開放性氣胸</b>、<b>大量血胸</b>、連枷胸/肺挫傷、心包填塞。</p>\n<p><b>張力性氣胸:</b>患側呼吸音消失、氣管偏對側、患側皮下氣腫、休克→<b>立即針刺/胸管減壓</b>。<b>開放性氣胸:</b>三邊膠布封+胸管。</p>\n<p><b>胸管置放:</b><b>第 4–5 肋間、腋中線</b>,沿肋骨<b>上緣</b>進入(下緣有神經血管束);不可經傷口放置。</p>\n<p><b>大量血胸開胸指徵:</b>初次引流>1500 mL,或持續>200 mL/hr×2–4 h。引流後再休克者先<b>重新評估(ABC)</b>找原因再決定開胸。</p>\n<p><b>要點:</b>皮下+縱膈氣腫→疑<b>食道或氣管</b>損傷;穿刺物不可先移除;小孩肋骨較有彈性「不易骨折」、較易張力性氣胸;下位肋骨(9–12)骨折查腹內臟器。</p>\n"},"氣管支氣管‧感染性肺疾‧其他手術":{"title":"氣管支氣管‧感染性肺疾‧其他手術","html":"\n<p><b>肺膿瘍:</b>厭氧菌/吸入、X 光「氣液平面」空洞、可合併膿胸、與葡萄球菌菌血症相關;<b>大部分抗生素+引流即癒</b>,手術限併支氣管肋膜瘻管/大咳血/慢性無法引流/疑癌。</p>\n<p><b>支氣管擴張症:</b>手術限「<b>侷限單肺葉</b>、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。</p>\n<p><b>肺結核手術:</b>多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。<b>麴菌球(aspergilloma)</b>抗黴藥滲透差→症狀/咳血者以手術為主。</p>\n<p><b>咳血:</b>大量>600 mL/24h;<b>硬式支氣管鏡優於軟式</b>;支氣管動脈栓塞有效。<b>氣管惡性腫瘤</b>最常見=鱗狀細胞癌,次為腺樣囊狀癌(沿神經/黏膜下擴散、生長慢)。</p>\n<p><b>多汗症:</b>胸腔鏡交感神經切除(<b>T2–T3</b>);傷 T1→Horner;副作用代償性多汗、血/氣胸。<b>LAM</b>(育齡女性、似結節硬化肺病灶、自發氣胸/乳糜胸)。</p>\n"},"先天性肺部與胸壁畸形":{"title":"先天性肺部與胸壁畸形","html":"\n<p><b>游離肺(sequestration):</b>無正常支氣管相通、<b>血供來自體循環(主動脈)</b>;肺葉內型(下葉、回流肺靜脈)、肺葉外型(自有臟層肋膜、回流體循環);手術切除。最不易自發性氣胸。</p>\n<p><b>CPAM(先天性肺呼吸道畸形):</b>多囊塊、可致胎兒窘迫/水腫、<b>有惡性轉化風險</b>;呼吸衰竭者緊急手術,無症狀亦多於嬰幼期切除。<b>支氣管囊腫</b>即使無症狀仍建議切除。</p>\n<p><b>漏斗胸(pectus excavatum):</b>發生率約 1/400、男:女 3–4:1、可合併二尖瓣脫垂/結締組織病;<b>Haller index=胸廓橫徑/前後徑</b>(>3.25 顯著);<b>Nuss 手術最適青春期前後</b>(非 3 歲前)。</p>\n<p><b>胸壁腫瘤:</b>骨纖維發育不良(fibrous dysplasia)血檢多正常;漿細胞瘤(M 蛋白)、骨肉瘤(ALP↑)、Ewing 肉瘤有異常。</p>\n"}};

let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_thoracic_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'\U0001F44B 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
