D":"Nuss procedure 是目前最常運用的手術方式,而最適合的矯正年齡為3 歲之前。其置入的矯正板,約在2~3 年後需再次手術取出"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114070-47","topic_code":"T6","topic":"先天性肺部與胸壁畸形","id":"114070-47","q_num":47,"src":"民國114年第二次","img":""}],E={"102030-4":{"quick":"RUL 5 cm+臟層肋膜侵犯=T2;氣管前(同側縱膈)淋巴陽性=N2→IIIA(本題多重答案 B/C/D 均給分)。","detail":{"background":"非小細胞肺癌TNM(AJCC 7版):腫瘤5cm且侵犯臟層肋膜=T2;同側縱膈(氣管前)淋巴結陽性=N2→合併為IIIA期。本題T2N2M0=IIIA;因分期界定差異B/C/D均給分。","options":{"A":"T 應為 T2(非 T3)。","B":"(給分)N 分類爭議。","C":"★正解(本題答案):IIIA(T2N2)。","D":"(給分)IIB 爭議。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"102030-29":{"quick":"正確為 B:肺腺癌較鱗狀細胞癌「易早期(血行)轉移」。","detail":{"background":"肺癌組織型與行為:肺腺癌(周邊型、最常見、與抽菸關聯較弱)較鱗狀細胞癌『易早期血行轉移』(B對);鱗癌位中央肺門、與抽菸最相關;小細胞肺癌(中央、神經內分泌)以化放療為主非手術。台灣最常見為腺癌(非鱗癌)。","options":{"A":"錯:台灣最常見為腺癌,非鱗癌。","B":"★正確(本題答案):腺癌易早期轉移。","C":"錯:腺癌多在周邊,非肺門。","D":"錯:小細胞肺癌以化放療為主,非手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"102110-1":{"quick":"50F 不吸菸、持續咳嗽 2 月、肺病灶→D:應考慮診斷性切片。","detail":{"background":"不吸菸中年女性持續咳嗽2月、CT見肺病灶,惡性不能排除→應『診斷性切片』取得病理(D);不宜僅定期追蹤,不吸菸不代表良性(肺腺癌常見於不吸菸女性)。","options":{"A":"位置非答題重點。","B":"持續症狀之病灶不宜假設良性。","C":"不宜僅每月追蹤而延誤。","D":"★正確(本題答案):診斷性切片。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"103030-28":{"quick":"惡性肋膜腔積液至少屬 D:IIIB(舊 AJCC 惡性積液=T4→IIIB;新版列 M1a/IV)。","detail":{"background":"肺癌惡性肋膜腔積液之分期:舊AJCC列為T4→至少IIIB期;新版(8版)改列M1a→第IV期。惡性積液代表已無法根治性切除。本題以舊版『至少IIIB』(D)。","options":{"A":"IIA 過低。","B":"IIB 過低。","C":"IIIA 過低。","D":"★正確(本題答案):至少 IIIB(惡性積液)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"103100-28":{"quick":"錯在 C:肺癌「局部侵犯橫膈膜(T3/T4)」仍可能切除,非手術禁忌。","detail":{"background":"肺癌『不適合手術』之情況:喉返神經麻痺(縱膈侵犯/N2-3)、上腔靜脈症候群、遠端(肝)轉移皆不可切除;而『局部侵犯橫膈膜(T3/T4)』仍可能整塊切除,非絕對手術禁忌(故C錯)。","options":{"A":"是禁忌:喉返神經麻痺(縱膈侵犯)。","B":"是禁忌:上腔靜脈症候群。","C":"★錯誤(本題答案):橫膈侵犯非絕對禁忌。","D":"是禁忌:肝臟轉移(M1)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"104030-27":{"quick":"錯在 D:bronchoalveolar(現原位腺癌)「適合手術」。","detail":{"background":"非小細胞肺癌治療:Stage I/II以手術為主(II可輔助化放療)、IIIb以化放療為主;細支氣管肺泡癌(現稱原位/微浸潤腺癌)『適合手術』預後佳→故D『不適合手術』錯誤。","options":{"A":"正確:Stage I 以手術為主。","B":"正確:Stage II 手術為主+輔助化放。","C":"正確:IIIb 以化放療為主。","D":"★錯誤(本題答案):BAC 適合手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"104030-29":{"quick":"「可不切除」情況之敘述錯在 D:愛滋病本身非不切除之理由。","detail":{"background":"單一肺結節『可不切除(良性傾向)』之情況:2年追蹤無變大、典型良性鈣化、結核引起;愛滋病本身非『不切除』之理由(免疫不全反而需排除感染/惡性)→故D錯。","options":{"A":"可不切:2 年無變大。","B":"可不切:良性鈣化。","C":"可不切:結核引起。","D":"★錯誤(本題答案):愛滋非不切除理由。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"105020-26":{"quick":"頸部淋巴硬塊→D:先頸部淋巴細針穿刺切片(確認 N3/M1 再定治療)。","detail":{"background":"肺癌病人頸部淋巴硬塊提示可能N3/遠端轉移,應先『頸部淋巴結細針穿刺切片(FNA)』確認分期再定治療(D),不宜貿然手術切除原發。","options":{"A":"未確診不宜直接切肺。","B":"未確診不宜直接切肺。","C":"未確診不宜直接清掃。","D":"★正確(本題答案):頸部淋巴 FNA 切片。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"105020-28":{"quick":"錯在 B:內視鏡(VATS)切轉移瘤「非標準」(常需開胸手觸診找微小病灶)。","detail":{"background":"轉移性肺腫瘤切除原則:原發已控制、可完全切除、無其他不可切轉移時施行,可減少腫瘤負擔。『VATS內視鏡』因無法觸診常漏微小病灶,『非標準術式』(故B錯),多需開胸觸診。","options":{"A":"正確:原發無復發才做。","B":"★錯誤(本題答案):VATS 非標準術式。","C":"正確:可減少腫瘤負擔。","D":"正確:術前胸部 MRI 不一定需要。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"106020-27":{"quick":"肺癌術後最常見死因 A:肺炎併敗血症。","detail":{"background":"肺癌(肺葉/肺切除)術後最常見死因為『肺炎併敗血症』(A);術後痰液滯留、肺擴張不全、咳痰無力增加感染風險,故術後胸腔物理治療與清痰重要。","options":{"A":"★正確(本題答案):肺炎併敗血症。","B":"心衰非最常見。","C":"腎衰非最常見。","D":"肝衰非最常見。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"106080-19":{"quick":"正確為 B(123):腺癌最常見、鱗癌與抽菸最相關且位中央;4(小細胞可手術治癒)錯。","detail":{"background":"肺癌組織型:①腺癌最常見、②鱗癌與抽菸最相關、③鱗癌好發肺門中央(123皆對);④小細胞肺癌多已擴散、以化放療為主『不』適手術治癒(錯)。故正確123(B)。","options":{"A":"134:含 4(錯)。","B":"★正確(本題答案):1、2、3。","C":"124:含 4(錯)。","D":"234:含 4(錯)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"107080-27":{"quick":"錯在 A:SPN 定義為「≤3 cm」(非<2 cm)。","detail":{"background":"單一肺結節(SPN)定義為『直徑≤3公分』、被正常肺實質包圍、無症狀之病灶(故A『<2公分』錯);<50%為惡性;典型良性鈣化可不手術;部分位置無法楔狀切除。","options":{"A":"★錯誤(本題答案):SPN 為≤3 cm。","B":"正確:<50% 為惡性(視族群)。","C":"正確:良性鈣化不需切除。","D":"正確:部分 SPN 無法楔狀切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"108030-28":{"quick":"肺癌術後最常見死因 A:肺炎合併敗血症。","detail":{"background":"肺癌術後最常見死亡原因為『肺炎合併敗血症』(A);術後痰液滯留、肺擴張不全、咳痰無力增加感染風險,故術後清痰與深呼吸訓練重要。","options":{"A":"★正確(本題答案):肺炎合併敗血症。","B":"心律不整非最常見死因。","C":"腎衰非。","D":"中風非。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"108030-30":{"quick":"右下肺葉切除術後最常見併發症 A:痰積致肺泡萎陷(atelectasis)。","detail":{"background":"肺葉切除術後最常見併發症為『痰液積存致肺泡萎陷(atelectasis)』(A);右下肺葉切除後咳痰不易,須積極清痰、深呼吸。皮下氣腫、膿胸、支氣管胸膜瘻管較少見。","options":{"A":"★正確(本題答案):atelectasis。","B":"皮下氣腫較少。","C":"膿胸較少。","D":"支氣管胸膜瘻管較少。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"108080-22":{"quick":"肺癌手術「非必要」檢查 C:腦血管攝影。","detail":{"background":"肺癌術前必要評估:肺功能(評估可切除餘量)、胸部CT(分期)、PET(偵測轉移)。『腦血管攝影』非必要檢查(C);有神經症狀才安排腦部影像。","options":{"A":"必要:肺功能。","B":"必要:PET 分期。","C":"★非必要(本題答案):腦血管攝影。","D":"必要:胸部 CT。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"109020-20":{"quick":"肺葉切除後對肺功能影響最小 B:右肺中葉(體積最小)。","detail":{"background":"各肺葉切除對術後肺功能之影響與其體積相關;『右肺中葉』體積最小,切除後對肺功能影響最小(B)。術前以肺功能與預估術後FEV1評估可承受度。","options":{"A":"右上葉體積大。","B":"★正確(本題答案):右肺中葉最小。","C":"左上葉體積大。","D":"左下葉體積大。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"110020-22":{"quick":"正確為 D:DLCO<50% 應加測運動心肺功能(較準確評估手術風險)。","detail":{"background":"肺切除前肺功能評估:預估術後FEV1與DLCO為關鍵;『DLCO<50%應加做運動心肺功能檢查(VO2max)』較準確評估手術風險(D)。其餘FEV1門檻、DLCO數值之選項敘述不正確。","options":{"A":"錯:ppo-FEV1>40% 較合理;FEV1 非「術後肺容積」指標描述有誤。","B":"錯:ppo-FEV1 20–30% 風險高,非安全。","C":"錯:DLCO<60–80% 才增風險(門檻描述偏高)。","D":"★正確(本題答案):DLCO<50% 加測運動心肺功能。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"110080-24":{"quick":"正確為 B:鱗狀細胞癌(中央)較腺癌易由痰液細胞學驗出。","detail":{"background":"肺癌檢查:鱗狀細胞癌位中央氣道、『較腺癌易由痰液細胞學驗出』(B);低劑量CT可降低高危險群肺癌死亡率(NLST);非所有病人例行腦MRI;PET非篩檢替代。","options":{"A":"錯:非均需腦 MRI。","B":"★正確(本題答案):鱗癌易痰液檢出。","C":"錯:LDCT 可降高危群死亡率(NLST)。","D":"錯:PET 非篩檢工具。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"111020-33":{"quick":"正確為 C:局部切除無法診斷之肺腫瘤,有時須做肺葉切除。","detail":{"background":"肺癌手術:對『局部(楔狀)切除無法確診之肺腫瘤,有時須做肺葉切除』以取得診斷與治療(C);早期小細胞肺癌(T1-2N0)亦可手術;部分IB以上需輔助化療;單一可切除腦轉移仍可考慮切除原發。","options":{"A":"錯:極早期小細胞肺癌可手術。","B":"錯:II 期需輔助化療。","C":"★正確(本題答案):診斷需要時行肺葉切除。","D":"錯:單發腦轉移仍可切肺。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"111080-74":{"quick":"最恰當為 D:攝護腺癌轉移肋骨可為「成骨性(osteoblastic)」病灶。","detail":{"background":"胸腔轉移性腫瘤:肺轉移多為多發、球型、邊緣平滑;肋膜轉移常多發並產生積液;『攝護腺癌轉移肋骨可為成骨性(osteoblastic)病灶』(D最恰當)。","options":{"A":"錯:肺轉移不一定合併縱膈/肺門淋巴腫。","B":"錯:肺轉移多球形邊緣平滑。","C":"錯:肋膜轉移常多發且生肋膜積液。","D":"★正確(本題答案):攝護腺癌成骨性轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"112020-27":{"quick":"錯在 D:肺腺癌「較易」轉移至腦(非較不易)。","detail":{"background":"肺腺癌:為肺癌最常見組織型、好發周邊、源自支氣管上皮黏液細胞;與鱗癌相比『較易』血行轉移(包括腦),故D『較不易轉移至腦』錯誤。","options":{"A":"正確:腺癌最常見。","B":"正確:源自支氣管黏液細胞。","C":"正確:多在周邊。","D":"★錯誤(本題答案):腺癌較易腦轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"113020-27":{"quick":"錯在 D:小細胞肺癌確診多已「擴散」,「不」適合手術(以化放療為主)。","detail":{"background":"小細胞肺癌:多位中央、神經內分泌來源、分侷限期/擴展期、5年存活差;確診時多已『擴散』,以化療±放療為主『不』適手術,故D『局部侵犯為主、適合手術』錯。","options":{"A":"正確:多在中央。","B":"正確:分侷限期/擴展期。","C":"正確:五年存活率差。","D":"★錯誤(本題答案):SCLC 多擴散,不適合手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"114070-25":{"quick":"與胸腔疾病最不相關 C:假性紅血球增多症(pseudopolycythemia)。","detail":{"background":"胸腔(肺尖/縱膈)相關症候群:上腔靜脈症候群、Horner症候群、Pancoast症候群(肺尖癌)皆與胸腔病灶有關;『假性紅血球增多症(pseudopolycythemia,血漿容積減少)』與胸腔疾病最不相關(C)。","options":{"A":"相關:上腔靜脈症候群。","B":"相關:Horner 症候群(Pancoast)。","C":"★最不相關(本題答案):假性紅血球增多症。","D":"相關:Pancoast 症候群。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","NCCN NSCLC Guideline","AJCC Cancer Staging"]}},"101030-24":{"quick":"錯在 D:原發性「非精原(nonseminoma)」生殖細胞瘤第一線為「化療」,非手術。","detail":{"background":"縱膈腫瘤:後縱膈最常見神經源性腫瘤;前縱膈胸腺瘤最常合併重症肌無力;CT見囊實性+脂肪→畸胎瘤。『原發性非精原(nonseminoma)生殖細胞瘤』第一線為『化療』而非先手術(故D錯)。","options":{"A":"正確:後縱膈神經源多為神經鞘瘤。","B":"正確:胸腺瘤最常合併重症肌無力。","C":"正確:囊實性+脂肪+鈣化=畸胎瘤。","D":"★錯誤(本題答案):非精原第一線為化療。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"102030-35":{"quick":"錯在 C:下行性壞死性縱膈炎「需」積極外科引流(非不需)。","detail":{"background":"下行性壞死性縱膈炎:多源自牙源性/口咽感染,經重力與縱膈負壓下行;培養多為口腔正常菌叢。治療『須積極外科引流清創』+廣效抗生素(故C『不需引流』錯),死亡率高。","options":{"A":"正確:多為牙源性感染。","B":"正確:重力+負壓下行。","C":"★錯誤(本題答案):需外科引流。","D":"正確:口腔常在菌。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"102110-30":{"quick":"錯在 B:後縱膈腫瘤「小孩惡性比例較成人高」(neuroblastoma)。","detail":{"background":"後縱膈腫瘤多為神經源性:成人以良性schwannoma最常見;『兒童惡性比例較成人高』(常為neuroblastoma)→故B『成人惡性比例較高』錯。良性者以手術切除為主。","options":{"A":"正確:最常見為 schwannoma。","B":"★錯誤(本題答案):小孩惡性比例較成人高。","C":"正確:最常見惡性為 neuroblastoma。","D":"正確:良性以手術為主。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"103100-31":{"quick":"錯在 C:胸腺瘤「非良性」,可侵犯/種植/遠端轉移。","detail":{"background":"胸腺瘤:手術切除為主、完整切除為預後關鍵;最常合併重症肌無力;『非全為良性』,可侵犯被膜/種植肋膜甚至遠端轉移(故C『良性、不轉移』錯)。","options":{"A":"正確:手術切除為主。","B":"正確:重症肌無力最常伴隨。","C":"★錯誤(本題答案):胸腺瘤非良性、可轉移。","D":"正確:完整切除影響預後。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"104090-27":{"quick":"縱膈腫瘤最少發生於 D:中縱膈腔。","detail":{"background":"縱膈腫瘤好發分區:前縱膈(胸腺瘤、生殖細胞瘤、淋巴瘤、甲狀腺)、後縱膈(神經源性)、上縱膈多見;『中縱膈』腫瘤(多為囊腫/淋巴結)相對最少(D)。","options":{"A":"前縱膈最常見。","B":"上縱膈常見。","C":"後縱膈次之。","D":"★正確(本題答案):中縱膈最少。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"105100-27":{"quick":"錯在 A:前縱膈瘤併主動脈侵犯、AFP/bHCG 正常→應「先切片」再依病理治療,「不應先切除再輔助化療」。","detail":{"background":"前縱膈瘤併主動脈侵犯、AFP/βHCG正常:應先『切片』取得病理(可能為淋巴瘤/胸腺瘤/精原瘤,各治療不同),不應先切除再輔助化療(故A錯);須查性腺、精原瘤對放療敏感。","options":{"A":"★錯誤(本題答案):不應先切除,應先切片。","B":"正確:治療前應切片。","C":"正確:應檢查生殖腺。","D":"正確:可能對放療有反應(seminoma/lymphoma)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"106080-17":{"quick":"錯在 A:Masaoka「IVa=肋膜/心包種植」,「胸腔外(遠端)轉移為 IVb」。","detail":{"background":"胸腺瘤Masaoka分期:I=被膜完整無侵犯;II=被膜侵犯;III=肉眼侵犯鄰近器官;IVa=肋膜/心包腔種植;『IVb=淋巴或血行(胸腔外)遠端轉移』。故A『IVa=胸腔外轉移』錯誤。","options":{"A":"★錯誤(本題答案):胸腔外轉移為 IVb,非 IVa。","B":"正確:I=被膜完整。","C":"正確:II=被膜侵犯。","D":"正確:III=侵犯鄰近器官。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"106080-21":{"quick":"錯在 C:cisplatin 化療對胸腺瘤「有效」。","detail":{"background":"胸腺瘤:前上縱膈最常見之縱膈腫瘤;第二期術後常加放療;『以cisplatin為主之化療有效』(故C『效果不佳』錯);多數重症肌無力病人未合併胸腺瘤(但胸腺瘤約30–50%合併MG)。","options":{"A":"正確:前上縱膈最常見腫瘤。","B":"正確:II 期切除後常加放療。","C":"★錯誤(本題答案):cisplatin 對胸腺瘤有效。","D":"正確:大部分 MG 未合併胸腺瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"107080-24":{"quick":"錯在 D:縱膈腫瘤「多數無症狀(偶發)」,非超過 2/3 有症狀。","detail":{"background":"縱膈腫瘤之臨床症狀依位置/大小/惡性度而定;可有Horner症候群、胸腺瘤合併重症肌無力;『多數為無症狀偶然發現』,並非超過2/3有症狀(故D錯)。","options":{"A":"正確:症狀取決於位置/大小/惡性度。","B":"正確:可有 Horner 症候群。","C":"正確:胸腺瘤可有重症肌無力。","D":"★錯誤(本題答案):多數無症狀。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"108030-29":{"quick":"錯在 A:精原細胞瘤「AFP 正常」(bHCG 可輕度升),AFP 顯著升表示非精原。","detail":{"background":"縱膈生殖細胞瘤之AFP/βHCG:『精原細胞瘤(seminoma)AFP正常』(βHCG可輕度升),AFP顯著升高表示非精原(卵黃囊瘤);此二標記可分型、評估療效與偵測復發。故A『精原AFP顯著升高』錯。","options":{"A":"★錯誤(本題答案):seminoma AFP 不顯著升高。","B":"正確:可鑑別精原 vs 非精原。","C":"正確:可評估化療效果。","D":"正確:追蹤復發。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"108080-23":{"quick":"錯在 B:精原細胞瘤(seminoma)「AFP 不升高」(AFP 升高見於非精原/卵黃囊)。","detail":{"background":"縱膈生殖細胞瘤:畸胎瘤最常見;非精原瘤可見βHCG升高;精原瘤對放療敏感。『精原細胞瘤AFP不升高』(AFP升見於非精原/卵黃囊)→故B『seminoma AFP升高』錯。","options":{"A":"正確:畸胎瘤最常見。","B":"★錯誤(本題答案):seminoma AFP 不升高。","C":"正確:非精原可見 bHCG 升高。","D":"正確:seminoma 對放療較有效。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"109080-28":{"quick":"正確為 B:約 1/3 縱膈生殖細胞瘤為精原細胞瘤。","detail":{"background":"縱膈生殖細胞瘤:好發年輕男性;『約1/3為精原細胞瘤』(B正確);精原瘤AFP不升(C錯);FNA常不足診斷且需配合腫瘤標記(D錯);非好發65歲以上(A錯)。","options":{"A":"錯:好發年輕男性,非>65 歲。","B":"★正確(本題答案):約 1/3 為 seminoma。","C":"錯:seminoma AFP 不升高。","D":"錯:FNA 非最安全準確之診斷。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"110020-21":{"quick":"正確為 A:手術為胸腺瘤主要成功治療,必要時切除重建上腔靜脈預後較好。","detail":{"background":"胸腺瘤:『手術為主要成功治療,必要時切除並重建上腔靜脈預後較好』(A正確);胸腺瘤約30–50%合併MG;侵襲性胸腺瘤可致SVC症候群;Masaoka IVa為種植非淋巴轉移。","options":{"A":"★正確(本題答案):手術為主、可切除重建 SVC。","B":"錯:約 10–15% MG 有胸腺瘤(非 10–50% 數據描述偏差)。","C":"錯:胸腺瘤可致 SVC 症候群。","D":"錯:Masaoka IVa 為種植非淋巴轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"110020-23":{"quick":"錯在 A:精原性生殖細胞瘤「不分泌 AFP」(AFP 升高見於非精原)。","detail":{"background":"縱膈疾病:『精原性生殖細胞瘤不分泌AFP』(AFP升見於非精原)→故A錯;兒童縱膈瘤常為神經源性;腫瘤切除後再輔助治療預後較佳;小胸腺瘤合併MG應儘早手術。","options":{"A":"★錯誤(本題答案):seminoma 不分泌 AFP。","B":"正確:小孩多神經源性腫瘤。","C":"正確:先手術再輔助治療預後較好。","D":"正確:小胸腺瘤合併 MG 應盡早切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"110080-27":{"quick":"錯在 D:胸腺瘤合併「重症肌無力/純紅再障/低球蛋白血症」,非脊椎異常(vertebral anomalies)。","detail":{"background":"縱膈腫瘤相關症候群配對:neurofibroma–von Recklinghausen、carcinoid–類癌症候群、thymoma–重症肌無力皆正確;『thymoma–脊椎異常』錯誤(胸腺瘤合併MG/純紅再障/低球蛋白血症),故D。","options":{"A":"正確:神經纖維瘤—von Recklinghausen。","B":"正確:類癌—類癌症候群。","C":"正確:胸腺瘤—重症肌無力。","D":"★錯誤(本題答案):胸腺瘤非合併脊椎異常。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"111020-31":{"quick":"錯在 D:急性縱膈炎危急,「抗生素不足」,須外科引流清創。","detail":{"background":"縱膈炎:急性可因齒齦/口咽感染下行;慢性纖維性縱膈炎手術多僅診斷或緩解;『急性縱膈炎危急,單給抗生素不足,須外科引流清創』(故D『抗生素即可、不需手術』錯)。","options":{"A":"正確:急性可因齒齦炎。","B":"正確:慢性手術多診斷/緩解用。","C":"正確:纖維性多因慢性淋巴結炎(結核)。","D":"★錯誤(本題答案):急性需外科引流,非抗生素即可。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"111080-30":{"quick":"錯在 B:支氣管囊腫(bronchogenic cyst)最常見,但「通常不與支氣管相通」。","detail":{"background":"原發性縱膈囊腫:多無症狀;支氣管囊腫(bronchogenic cyst)最常見、位氣管隆突附近但『通常不與支氣管相通』(故B『常與支氣管相通』錯);心包囊腫好發右側心膈角;腸源性囊腫沿食道旁。","options":{"A":"正確:多無症狀。","B":"★錯誤(本題答案):支氣管囊腫通常不與支氣管相通。","C":"正確:心包囊腫好發右側心膈角。","D":"正確:腸源囊腫於食道旁。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"112020-30":{"quick":"錯在 D:縱膈惡性生殖細胞瘤「男性顯著好發」(有性別差異)。","detail":{"background":"成人縱膈腫瘤:後縱膈常為神經源性;精原瘤對化放療效果佳;良性畸胎瘤即使部分切除亦少復發;『縱膈惡性生殖細胞瘤男性顯著好發,有性別差異』(故D『無性別差異』錯)。","options":{"A":"正確:良性畸胎瘤部分切除也鮮少復發。","B":"正確:後縱膈常為神經源性。","C":"正確:seminoma 對化放療反應好。","D":"★錯誤(本題答案):惡性生殖細胞瘤男性好發。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"113070-29":{"quick":"錯在 A:胸腺瘤是「成人」腫瘤,「兒童最常見縱膈腫瘤為神經源性」。","detail":{"background":"胸腺瘤為『成人』前縱膈腫瘤(兒童最常見縱膈瘤為神經源性)→故A『兒童最常見』錯;治療以手術切除為主、可合併MG;無法立即手術者以cisplatin為主化療有效。","options":{"A":"★錯誤(本題答案):胸腺瘤非兒童最常見。","B":"正確:盡量手術切除。","C":"正確:可合併重症肌無力。","D":"正確:無法切除以 cisplatin 化療有效。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"114070-26":{"quick":"小孩最常見縱膈腫瘤 C:神經源性腫瘤(neurogenic tumor)。","detail":{"background":"兒童最常見之縱膈腫瘤為『神經源性腫瘤(neurogenic tumor)』(後縱膈,如神經母細胞瘤/節細胞瘤)(C);成人前縱膈以胸腺瘤多見。","options":{"A":"胸腺囊腫非最常見。","B":"淋巴瘤非最常見。","C":"★正確(本題答案):神經源性腫瘤。","D":"生殖細胞瘤非最常見。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Masaoka Staging","NCCN Thymoma/Germ Cell Guideline"]}},"101030-26":{"quick":"錯在 D:惡性間皮瘤預後極差,五年存活率遠低於 70%(約 10% 以下)。","detail":{"background":"惡性間皮瘤:多有石綿暴露史、侵犯壁層與臟層肋膜、表現呼吸困難與肋膜積液;預後極差,『五年存活率遠低於70%』(約<10%)→故D錯。","options":{"A":"正確:石綿暴露史。","B":"正確:侵犯壁層+臟層肋膜。","C":"正確:呼吸困難+肋膜積液。","D":"★錯誤(本題答案):五年存活非 70%(極差)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"102110-31":{"quick":"錯在 D:「細針穿刺引流無效」非標準手術適應症之列。","detail":{"background":"自發性氣胸手術適應症:初次發作引流後『持續漏氣>72小時』、同側復發、雙側/對側曾氣胸、合併血/膿胸或慢性氣胸、特殊職業(飛行員/潛水)。『細針穿刺引流無效』非標準手術適應症之列(D)。","options":{"A":"適應症:持續漏氣>72 小時。","B":"適應症:同側復發≥2 次。","C":"適應症:合併血胸/膿胸/慢性氣胸。","D":"★錯誤(本題答案):細針穿刺非氣胸處置/非標準適應症。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"103030-30":{"quick":"非手術適應症為 C:插胸管後「立即」追蹤 X 光呈肺塌陷(肺擴張需時間,單此非適應症)。","detail":{"background":"氣胸手術適應症:復發性氣胸、合併大量血胸、張力性氣胸、持續漏氣。『插胸管後立即追蹤X光仍見肺塌陷』非手術適應症(C)——肺再擴張需時間,應先觀察引流成效。","options":{"A":"是:復發性氣胸。","B":"是:合併大量血胸。","C":"★非適應症(本題答案):插管後立即仍塌陷。","D":"是:張力性氣胸(緊急減壓)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"106020-30":{"quick":"錯在 D:原發性氣胸「插胸管非絕對需要」(小量無症狀可觀察/抽氣)。","detail":{"background":"原發性自發性氣胸:可由病史/理學/X光診斷、routine不需CT;COPD引起者屬續發性。『插胸管非絕對需要』——少量無症狀者可觀察或單純抽氣(故D『絕對需要』錯)。","options":{"A":"正確:病史+理學+X 光可診斷。","B":"正確:CT 非常規。","C":"正確:COPD 引起為續發性。","D":"★錯誤(本題答案):插胸管非絕對需要。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"107080-25":{"quick":"正確為 D:假性乳糜胸常由「類風濕肋膜炎或結核」所致。","detail":{"background":"乳糜胸:多發生右側(胸管走右下胸);最常因手術/外傷,腫瘤(淋巴瘤)亦可;治療先保守(禁脂/中鏈脂肪)無效再結紮胸管。『假性乳糜胸常由類風濕肋膜炎或結核所致』(D正確)。","options":{"A":"錯:乳糜胸最常見於「右側」。","B":"錯:最常因創傷/手術,非腫瘤。","C":"錯:量少可保守,非唯一靠結紮。","D":"★正確(本題答案):假性乳糜胸=RA/結核。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"108030-26":{"quick":"正確為 D:肺炎旁積液葡萄糖通常下降、<60 mg/dL。","detail":{"background":"肋膜積液:漏出液(心衰/肝硬化,蛋白低、清澈)vs滲出液(感染/惡性,蛋白高,Light's準則);『肺炎旁積液之葡萄糖通常下降、<60 mg/dL』(D正確),pH低提示複雜性需引流。","options":{"A":"錯:漏出液見於心衰/肝硬化,非肺炎。","B":"錯:滲出液混濁、蛋白高。","C":"錯:滲出液 LDH 比>0.6。","D":"★正確(本題答案):肺炎旁積液葡萄糖<60。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"108080-21":{"quick":"錯在 D:肋膜固定術(pleurodesis)「對惡性積液有效」。","detail":{"background":"肋膜積液:惡性積液多為滲出液、最常因乳癌/肺癌轉移;胸腔鏡可同時引流與診斷;『肋膜固定術(pleurodesis,如滑石粉)對惡性復發積液有效』→故D『無效』錯。","options":{"A":"正確:惡性積液多為 exudate。","B":"正確:乳癌/肺癌最常造成。","C":"正確:胸腔鏡可引流兼診斷。","D":"★錯誤(本題答案):pleurodesis 有效。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"110020-26":{"quick":"錯在 B:乳糜胸手術多採「右側」處理(胸管走右下胸)。","detail":{"background":"乳糜胸:左頸/鎖骨上淋巴廓清可傷胸管;胸管(thoracic duct)走『右下胸』,故外科多採『右側』結紮處理(故B『常從左側處理』錯);保守治療約1–2週。","options":{"A":"正確:左頸/鎖骨上廓清可致。","B":"★錯誤(本題答案):手術多採右側,非左側。","C":"正確:保守治療 1–2 週。","D":"正確:結紮橫膈上胸管為主。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"110080-22":{"quick":"正確為 A:女性惡性肋膜積液最常因「乳癌」。","detail":{"background":"惡性肋膜積液:『女性最常因乳癌』(A正確);引流可緩解症狀但未必延長存活;肺癌惡性積液屬T4/M1a多不適根治手術;滑石粉肋膜固定術可用於反覆積液。","options":{"A":"★正確(本題答案):女性最常乳癌。","B":"錯:引流不提升存活。","C":"錯:部分肺癌積液仍可手術。","D":"錯:talc 沾黏效果最佳(非最差)。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"112080-28":{"quick":"非惡性肋膜積液常見成因 D:黑色素瘤。","detail":{"background":"惡性肋膜積液常見成因:肺腺癌、乳癌、淋巴瘤、間皮瘤;『黑色素瘤』相對少造成惡性肋膜積液(D)。","options":{"A":"常見:肺腺癌。","B":"常見:淋巴瘤。","C":"常見:間皮瘤。","D":"★非常見(本題答案):黑色素瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"113020-29":{"quick":"錯在 B:乳糜富含三酸甘油脂、乳糜微粒與「淋巴球」(非嗜酸性球)。","detail":{"background":"乳糜胸:外觀乳白或澄清;富含三酸甘油脂、乳糜微粒與『淋巴球』(非嗜酸性球)→故B錯;醫源性常見於食道切除/縱膈淋巴廓清術後;量少可中鏈三酸甘油脂飲食保守治療。","options":{"A":"正確:乳白或禁食時澄清。","B":"★錯誤(本題答案):富含淋巴球,非嗜酸球。","C":"正確:食道切除/縱膈廓清後常見。","D":"正確:量少用 MCT 飲食或禁食。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"113070-27":{"quick":"錯在 C:保守治療應給「中鏈(MCT)」三酸甘油脂飲食,非長鏈(長鏈經淋巴吸收會加重乳糜)。","detail":{"background":"乳糜胸保守治療應給『中鏈三酸甘油脂(MCT)』飲食——MCT直接入門靜脈、不經淋巴,可減少乳糜形成;『長鏈三酸甘油脂』經淋巴吸收反加重乳糜(故C錯)。富含三酸甘油脂、可因腫瘤引起。","options":{"A":"正確:乳糜高三酸甘油脂。","B":"正確:淋巴廓清術後常見。","C":"★錯誤(本題答案):應用 MCT 非長鏈。","D":"正確:肺腫瘤亦可引起。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"114070-72":{"quick":"最不恰當 D:張力性氣胸為「大量」空氣漏入(非少量)。","detail":{"background":"疑似氣胸X光:可請病人吐氣後再照PA以放大氣胸;張力性氣胸特徵為縱膈偏移、患側橫膈反轉、『大量』空氣漏入致高壓(故D『通常為少量』最不恰當)。","options":{"A":"恰當:吐氣相 PA 可助診斷不明顯氣胸。","B":"恰當:張力性氣胸縱膈偏移。","C":"恰當:張力性氣胸可橫膈反轉。","D":"★最不恰當(本題答案):張力性為大量空氣。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"115020-7":{"quick":"肺炎旁積液 pH 7.1、葡萄糖 30、化膿(膿胸)→C:儘早引流或胸腔鏡介入。","detail":{"background":"肺炎旁積液之分層:單純性(pH>7.2、糖>60)可抗生素;複雜性/膿胸(pH<7.2、葡萄糖<40–60、化膿)須儘早引流。本例pH 7.1、糖30、化膿=膿胸→『儘早引流或胸腔鏡介入』(C)。","options":{"A":"錯:膿胸不可只觀察。","B":"錯:反覆穿刺不足以處理膿胸。","C":"★正確(本題答案):儘早引流/胸腔鏡。","D":"錯:換抗生素+一週後追蹤延誤。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"115020-39":{"quick":"最不適當為 B(本題多重答案 B/C 均給分):間皮瘤外科非僅切片/姑息,可行肋膜外全肺切除/肋膜切除等根治性手術。","detail":{"background":"惡性間皮瘤:與石綿暴露相關、好發40歲以上男性;外科角色『非僅切片/姑息』,可行肋膜外全肺切除或肋膜切除等減積/根治手術(故B最不適當);採多模式治療,B/C均給分。","options":{"A":"正確:石綿相關、>40 歲男性。","B":"★最不適當(本題答案,給分):外科非僅切片/姑息。","C":"(給分)單一療法難延長存活。","D":"正確:EPP 切除範圍描述正確。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","BTS Pleural Disease Guideline"]}},"104090-2":{"quick":"氣管偏右+左側呼吸音弱+左胸皮下氣腫+休克→C:左側張力性氣胸。","detail":{"background":"張力性氣胸:患側胸腔高壓→患側呼吸音消失、皮下氣腫、氣管推向『對側』、頸靜脈怒張、休克。本例氣管偏右+左胸呼吸音弱+左胸皮下氣腫+低血壓→左側張力性氣胸(C),須立即針刺/胸管減壓。","options":{"A":"右大量血胸不合(氣管偏右、左呼吸音弱)。","B":"右張力性氣胸應氣管偏左。","C":"★正確(本題答案):左側張力性氣胸。","D":"心包填塞無偏移/皮下氣腫。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"105020-75":{"quick":"引流後再休克→D:重新評估病人(ABC,找出惡化原因再決定)。","detail":{"background":"胸部外傷血胸引流後『再度休克』:應先『重新評估病人(ABCDE)』找出惡化原因(持續出血/張力性氣胸/心包填塞)再決定處置(D);大量血胸初引流>1500mL或持續>200mL/hr考慮開胸。","options":{"A":"插管非首要。","B":"未達開胸指徵前先評估。","C":"再插胸管非首選。","D":"★正確(本題答案):重新評估病人。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"105020-77":{"quick":"胸骨下方撞擊+左第 8 肋骨折→最不可能 C:大血管破裂。","detail":{"background":"胸骨下方鈍擊+左第8肋(低位)骨折:最可能傷及橫膈、肺、(脾/肝);『大血管(主動脈)破裂』多見於高速減速傷、與此撞擊機轉最不相符(C最不可能);低位肋骨骨折應評估腹內臟器。","options":{"A":"可能:肺(葉)破裂。","B":"可能:氣管/支氣管破裂。","C":"★最不可能(本題答案):大血管破裂。","D":"可能:橫膈膜破裂(下位肋骨)。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"106020-6":{"quick":"胸管置放位置正確為 A:第 4 或 5 肋間、腋中線。","detail":{"background":"創傷血氣胸之胸管置放位置:『第4或第5肋間、腋中線(乳頭水平、胸大肌外緣後方之安全三角)』(A);避開第2肋間鎖骨中線(用於減壓針)與過低位置(以免傷及橫膈/腹臟)。","options":{"A":"★正確(本題答案):4–5 肋間腋中線。","B":"第 2 肋間鎖骨中線用於緊急減壓針刺,非引流。","C":"第 6–7 肋間過低(恐傷橫膈/腹臟)。","D":"位置有標準,非全憑情況。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"107020-76":{"quick":"引流 800 mL 後再休克→D:重新評估病人。","detail":{"background":"胸部槍傷血胸引流800mL後血壓回升旋即再降→『重新評估病人』(D),警覺持續出血或合併張力性氣胸/填塞;ATLS原則先找惡化原因,必要時開胸。","options":{"A":"插管非首要。","B":"先評估是否達開胸指徵。","C":"輸血同時仍須評估原因。","D":"★正確(本題答案):重新評估病人。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"107080-28":{"quick":"創傷後急性呼吸不足最常見原因 B:氣胸。","detail":{"background":"胸部創傷後急性呼吸不足之最常見原因為『氣胸』(B,含張力性);其次為肺挫傷、連枷胸;ARDS多為後期併發。早期辨識氣胸並減壓最關鍵。","options":{"A":"肺挫傷亦常見但非最常見。","B":"★正確(本題答案):氣胸。","C":"肋骨骨折本身。","D":"ARDS 較晚發生。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"108030-75":{"quick":"引流 700 mL 後再休克→D:重新評估病人。","detail":{"background":"胸部外傷血胸引流700mL後再度休克→『重新評估病人(ABCDE)』(D),勿固著於單一處置;判斷持續性出血(開胸指徵)、張力性氣胸或心包填塞。","options":{"A":"插管非首要。","B":"先評估開胸指徵。","C":"輸血同時須評估。","D":"★正確(本題答案):重新評估病人。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"111080-29":{"quick":"正確為 D:皮下氣腫+縱膈氣腫→須考慮食道或氣管受傷。","detail":{"background":"頸/胸外傷:頸部穿刺傷可同時傷氣管與『其後之食道』仍須評估(A錯);插入之穿刺物『不可現場拔除』(B錯);無外表瘀傷『不能排除』氣血胸(C錯);『皮下氣腫+縱膈氣腫應考慮食道或氣管受傷』(D正確)。","options":{"A":"錯:頸部穿刺傷食道亦可能傷,須檢查。","B":"錯:穿刺物不可先移除(壓迫止血)。","C":"錯:鈍傷無外表瘀青仍可有氣血胸。","D":"★正確(本題答案):縱膈氣腫疑食道/氣管傷。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"112020-2":{"quick":"錯在 B:小孩肋骨「較有彈性、不易骨折」(非較易)。","detail":{"background":"小兒胸部外傷:低位肋骨骨折應評估腹臟;『兒童肋骨富彈性、較不易骨折』(故B『較易骨折』錯)——故可無肋骨骨折仍有內傷;兒童較易發展張力性氣胸;轉院前少量氣胸仍宜放胸管。","options":{"A":"正確:下位肋骨骨折查腹內臟器。","B":"★錯誤(本題答案):小孩肋骨較不易骨折。","C":"正確:小孩較易張力性氣胸。","D":"正確:轉院前少量氣胸仍應放胸管。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"113070-2":{"quick":"正確為 C:張力性氣胸「低血容時可能無頸靜脈怒張」。","detail":{"background":"胸部外傷急救:開放性氣胸用『三邊密封』敷料(全封會變張力性,A錯);不可經傷口放胸管(B錯);『張力性氣胸於低血容時可能無頸靜脈怒張』(C正確);胸管應沿肋骨『上緣』進入以避開肋下血管神經(D錯)。","options":{"A":"錯:開放性氣胸三邊封+放胸管,非等變化。","B":"錯:不可經傷口放胸管(感染/路徑)。","C":"★正確(本題答案):張力性氣胸可無頸靜脈怒張。","D":"錯:胸管沿肋骨「上緣」進入(下緣有神經血管)。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e"]}},"102030-30":{"quick":"錯在 C:bullous emphysema 手術為「肺大泡切除(bullectomy)」,不一定肺葉切除。","detail":{"background":"bullous emphysema手術:適應症含肺大泡破裂致氣胸、肺大泡占單側胸腔>50%壓迫;手術為『肺大泡切除(bullectomy)』保留正常肺,『不一定肺葉切除』(故C錯);無症狀小泡可觀察。","options":{"A":"適應症:漏氣致氣胸。","B":"適應症:肺大泡>單側半胸。","C":"★錯誤(本題答案):不一定需肺葉切除。","D":"正確:無症狀小者觀察。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"102110-29":{"quick":"肺膿瘍手術適應症「不包括」C:持續大量膿痰(可內科+引流)。","detail":{"background":"肺膿瘍手術適應症:併支氣管肋膜瘻管、大量咳血、懷疑合併肺癌、內科治療失敗。『持續大量膿痰』可內科抗生素+姿位引流處理,非手術適應症(C)。","options":{"A":"是:併支氣管肋膜瘻管。","B":"是:大量咳血。","C":"★不包括(本題答案):持續大量膿痰。","D":"是:疑合併肺癌。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"103100-27":{"quick":"錯在 D:肺結核手術「非全以胸腔鏡」(常需開胸,沾黏緻密)。","detail":{"background":"肺結核手術適應症:多重抗藥性、合併麴菌球/大咳血、毀損肺。術前白蛋白>3 g/dL較佳。因結核肺沾黏緻密,『非全以胸腔鏡進行,常需開胸』(故D錯)。","options":{"A":"正確:多重抗藥為常見適應症。","B":"正確:併黴菌/大咳血考慮手術。","C":"正確:術前白蛋白>3 g/dL 較佳。","D":"★錯誤(本題答案):非全以胸腔鏡。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"104030-30":{"quick":"錯在 D:肺膿瘍「大部分以內科(抗生素+引流)即癒」,非開刀。","detail":{"background":"肺膿瘍:常與葡萄球菌菌血症/吸入有關、可合併膿胸;『大部分以內科(抗生素+姿位引流/經皮引流)即可痊癒』,僅少數需手術(故D『大部分需開刀』錯)。","options":{"A":"正確:可與葡萄球菌菌血症相關。","B":"正確:常合併膿胸。","C":"正確:多以內科治療。","D":"★錯誤(本題答案):非大部分需開刀。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"104090-26":{"quick":"惡性氣管腫瘤最常見組織型 C:鱗狀細胞癌。","detail":{"background":"成人原發惡性氣管腫瘤最常見為『鱗狀細胞癌(squamous cell carcinoma)』(與抽菸相關),其次為腺樣囊狀癌(adenoid cystic);治療以氣管切除重建為主(C)。","options":{"A":"腺樣囊狀癌次之。","B":"腺癌少。","C":"★正確(本題答案):鱗狀細胞癌。","D":"小細胞少。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"104090-74":{"quick":"錯在 C:淋巴管平滑肌增生症(LAM)幾乎只發生於女性,「男性發生率非與女性相當」。","detail":{"background":"淋巴管平滑肌增生症(LAM):好發育齡女性,影像見瀰漫薄壁囊泡(與結節硬化症肺病灶相似)、易自發性氣胸,可合併腎臟血管肌脂瘤/神經系統異常;『幾乎只見於女性』(故C『男女相當』錯)。","options":{"A":"正確:與結節硬化肺病灶相似。","B":"正確:可發生自發性氣胸。","C":"★錯誤(本題答案):LAM 幾乎只見女性。","D":"正確:可累及腎臟/神經系統。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"105020-10":{"quick":"錯在 B:多汗症交感神經切除主要在「T2–T3(或 T3–T4)」,非第四、五。","detail":{"background":"胸腔交感神經切除術治多汗症:手掌/腋下多汗可改善;主要切除部位為『T2–T3(或T3–T4)』交感神經節(故B『第4、5』錯);切T1可致Horner症候群;副作用含代償性多汗、血/氣胸。","options":{"A":"正確:手掌腋下多汗可交感神經切除改善。","B":"★錯誤(本題答案):主要在 T2–T3,非 T4–T5。","C":"正確:傷 T1 致 Horner 症候群。","D":"正確:副作用含血胸/氣胸。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"105100-28":{"quick":"正確為 D(僅 23):腺樣囊狀癌多以「生長緩慢之氣管支氣管病灶」表現、可局部氣管切除;1(周邊)4(絕不轉移)錯。","detail":{"background":"肺/氣管腺樣囊狀癌:②可局部氣管切除、③多以生長緩慢之中央氣管支氣管病灶表現(23正確);①多位『中央氣道』非周邊、④可沿黏膜下/神經侵犯並『可能遠端轉移』(1、4錯)。故僅23(D)。","options":{"A":"12:含 1(錯,非周邊)。","B":"234:含 4(錯,可遠端轉移)。","C":"134:含 1、4(錯)。","D":"★正確(本題答案):僅 2、3。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"106020-28":{"quick":"「不是」單純肺葉切除適應症 C:雙側嚴重支氣管擴張(瀰漫無法以單肺葉切除解決)。","detail":{"background":"支氣管擴張症之單純肺葉切除適應症:局限單肺葉、內科治療失敗反覆肺炎、反覆咳血影響生活。『雙側瀰漫嚴重支氣管擴張』無法以單肺葉切除解決→非適應症(C)。","options":{"A":"是:內科失敗反覆肺炎。","B":"是:反覆咳血影響生活。","C":"★不是(本題答案):雙側嚴重瀰漫。","D":"是:侷限單肺葉。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"106020-29":{"quick":"正確為 B:大量咳血之診斷治療「硬式支氣管鏡優於軟式」。","detail":{"background":"咳血:大量咳血多定義為24小時>500mL(非300);診斷與治療『硬式支氣管鏡優於軟式』(視野大、可大量吸引、保護氣道)(B正確);支氣管動脈栓塞對控制出血有效。","options":{"A":"錯:大量咳血定義>600 mL/24h(非 300)。","B":"★正確(本題答案):硬式支氣管鏡較佳。","C":"錯:血管攝影非一定要做。","D":"錯:血管栓塞術通常有效。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"112080-27":{"quick":"錯在 B:肺膿瘍「與葡萄球菌菌血症有關」(可血行播散)。","detail":{"background":"肺膿瘍:破裂可致膿氣胸;X光/CT見空洞含氣液平面;大部分抗生素即癒;『與葡萄球菌菌血症有關』(可血行播散)→故B『與葡萄球菌菌血症無關』錯。","options":{"A":"正確:膿瘍破裂可致氣胸。","B":"★錯誤(本題答案):與葡萄球菌菌血症有關。","C":"正確:空腔氣液平面。","D":"正確:多以抗生素治癒。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"114070-27":{"quick":"最不適當 C:麴菌球(aspergilloma)抗黴藥滲透差,「症狀/咳血者以手術切除為主」,非抗黴藥 3 個月為首選。","detail":{"background":"麴菌球(aspergilloma):長在既有空洞內,『抗黴菌藥滲透差、口服療效有限』,有症狀/咳血者以『手術切除』為主(故C『抗黴藥3個月治療』最不適當);腺樣囊狀癌可沿黏膜下擴展;局部支擴適合手術。","options":{"A":"正確:氣管腺樣囊狀癌可沿神經擴散。","B":"正確:長期呼吸器者不適合氣管修補。","C":"★最不適當(本題答案):麴菌球以手術為主。","D":"正確:侷限支氣管擴張適合手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"102110-33":{"quick":"錯在 B:游離肺「不與正常支氣管相通」。","detail":{"background":"游離肺(sequestration):分肺葉外/肺葉內型;『不與正常支氣管相通』(故B錯);動脈供應主要來自『體循環(主動脈)』;治療以手術切除為主。","options":{"A":"正確:分肺葉外/肺葉內型。","B":"★錯誤(本題答案):不與支氣管相通。","C":"正確:血供主要來自主動脈(體循環)。","D":"正確:治療以手術切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"107020-45":{"quick":"錯在 B:肺葉外型游離肺「不與支氣管相通、無氣體交換」。","detail":{"background":"肺葉外型游離肺:有自己的胸膜包被、血供來自體循環、靜脈回流體循環;『不與支氣管相通、無氣體交換』(故B錯);多在左肺下葉、可合併其他畸形。","options":{"A":"正確:血供來自體循環。","B":"★錯誤(本題答案):不與支氣管相通。","C":"正確:多在下葉。","D":"正確:較常見於左側。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"107080-46":{"quick":"比較正確為 A:新生兒大囊泡 CPAM 致呼吸衰竭插管→應「緊急開胸切除」。","detail":{"background":"先天性肺呼吸道畸形(CPAM)治療:出生即呼吸衰竭之大囊泡病灶→『緊急開胸切除』(A);無症狀者多建議於數月至1歲擇期切除(有感染/惡變[胸膜肺母細胞瘤]風險)。","options":{"A":"★正確(本題答案):呼吸衰竭者緊急手術。","B":"呼吸平穩者非「立即」CT。","C":"時機描述不當。","D":"非以 MRI 為必要步驟。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"109080-27":{"quick":"血檢通常無異常的胸壁腫瘤 B:骨纖維發育不良(fibrous dysplasia)。","detail":{"background":"胸壁腫瘤之血液檢查:漿細胞瘤(M蛋白)、骨肉瘤(ALP升)、Ewing肉瘤(可LDH/白血球升)多有異常;『骨纖維發育不良(fibrous dysplasia)』血檢通常正常(B)。","options":{"A":"漿細胞瘤有 M 蛋白。","B":"★正確(本題答案):纖維發育不良血檢正常。","C":"骨肉瘤 ALP 升高。","D":"Ewing 肉瘤可有異常。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"110080-23":{"quick":"錯在 A:支氣管囊腫「即使無症狀仍建議切除」(感染/惡變風險)。","detail":{"background":"先天性肺疾:『支氣管囊腫即使無症狀仍建議切除』(感染/惡變風險)→故A錯;先天性肺葉氣腫為最常需切除者;肺內游離肺血供來自體循環;肺血管吊索常致喘鳴。","options":{"A":"★錯誤(本題答案):支氣管囊腫無症狀仍宜切除。","B":"正確:肺葉肺氣腫為最常切除之先天囊性病。","C":"正確:肺葉內游離肺多下葉、回流肺靜脈。","D":"正確:肺血管吊索常伴喘鳴。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"110080-45":{"quick":"錯在 C:CPAM「有惡性轉化可能」(如胸膜肺母細胞瘤)。","detail":{"background":"先天性肺呼吸道畸形(CPAM):正常肺中之多囊腫塊、可致胎兒窘迫/水腫;『有惡性轉化可能(如胸膜肺母細胞瘤)』→故C『無惡性可能』錯;無症狀者可監測後擇期切除。","options":{"A":"正確:CPAM 多囊塊侷限某肺葉。","B":"正確:可致胎兒窘迫。","C":"★錯誤(本題答案):CPAM 有惡變可能。","D":"正確:無症狀可觀察至約 6 月大再考慮手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"113070-48":{"quick":"Haller index(凹陷指數)= A:A/C(胸廓橫徑 ÷ 最凹處前後徑)。","detail":{"background":"漏斗胸嚴重度之Haller(凹陷)指數=『胸廓內側橫徑(A) ÷ 胸骨後緣至脊椎前緣之最小前後徑(C)』=A/C(A);正常約<2.5,>3.25多列為手術指標。","options":{"A":"★正確(本題答案):A/C(橫徑/前後徑)。","B":"非此定義。","C":"非此定義。","D":"非此定義。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"114020-49":{"quick":"最不易自發性氣胸 C:游離肺(sequestration,實質塊狀、非含氣囊泡破裂機轉)。","detail":{"background":"先天性肺異常與自發性氣胸:含氣囊泡型(先天性肺葉氣腫、支氣管囊腫、CPAM)因囊泡破裂可致氣胸;『游離肺(sequestration)』為實質塊狀、血供來自體循環,最不易自發性氣胸(C)。","options":{"A":"先天肺葉氣腫可過度充氣。","B":"支氣管源囊腫可破裂。","C":"★最不易(本題答案):游離肺。","D":"CPAM 囊泡可破裂致氣胸。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}},"114070-47":{"quick":"錯在 D:Nuss 手術最適矯正年齡為「青春期前後」,非 3 歲之前。","detail":{"background":"漏斗胸(pectus excavatum):前胸壁凹陷、隨成長加重;發生率約1/300–400、男多於女;須注意合併二尖瓣脫垂等心臟異常;以Haller指數評估;『Nuss手術最適矯正年齡為青春期前後』(故D『3歲前』錯)。","options":{"A":"正確:漏斗胸發生率約 1/400、男:女 3–4:1。","B":"正確:注意合併二尖瓣脫垂/結締組織病。","C":"正確:評估 Haller index、心肺功能、變形速率。","D":"★錯誤(本題答案):Nuss 最適青春期,非 3 歲前。"},"sources":["Sabiston Textbook of Surgery, 21e","Shields’ General Thoracic Surgery, 8e","Pediatric Surgery (Coran)"]}}},TO=["肺癌與肺結節手術", "縱膈腔腫瘤與感染", "肋膜疾病與氣胸", "胸部創傷外科", "氣管支氣管‧感染性肺疾‧其他手術", "先天性肺部與胸壁畸形"],LEC={"肺癌與肺結節手術":{"title":"肺癌與肺結節手術","html":"\n<p><b>細胞型:</b><b>腺癌(adenocarcinoma)</b>=台灣與全球最常見、源自支氣管黏液細胞、多在「周邊」、不吸菸者亦得、早期即血行轉移(腦/骨/肝/腎上腺);<b>鱗狀細胞癌</b>=與抽菸最相關、多在「中央肺門」、可空洞、痰液細胞學較易檢出;<b>小細胞肺癌(SCLC)</b>=中央、神經內分泌、惡性度高、確診多已擴散,「以化放療為主、非手術」。</p>\n<p><b>分期決定治療:</b>Stage I/II→「手術(肺葉切除+縱膈淋巴清掃)」為主,II 期術後輔助化療;IIIB/IV→化放療/標靶/免疫。<b>不適合根治手術:</b>對側縱膈(N3)、遠端轉移、惡性肋膜積液、喉返/膈神經麻痺、上腔靜脈症候群;單純橫膈/胸壁(T3)仍可切除。</p>\n<p><b>術前評估:</b>胸部 CT、PET、腦影像、<b>肺功能(FEV1、DLCO;DLCO<50% 加做運動心肺測試)</b>。LDCT 可降高危群肺癌死亡率(NLST)。術後最常見死因=<b>肺炎併敗血症</b>;最常見併發症=<b>痰積致肺擴張不全(atelectasis)</b>。肺葉切除對肺功能影響最小者=右中葉。</p>\n<p><b>SPN:</b>≤3 cm 孤立病灶;良性鈣化/2 年無變大可不切;高風險需切片/切除。<b>肺轉移瘤切除</b>:原發控制、無肺外轉移、可完全切除;多開胸手觸診(VATS 非標準)。肺癌相關症候群:SVC、Horner、Pancoast。</p>\n"},"縱膈腔腫瘤與感染":{"title":"縱膈腔腫瘤與感染","html":"\n<p><b>分區好發:</b><b>前縱膈(最常見)</b>—4T:胸腺瘤(Thymoma)、畸胎瘤/生殖細胞瘤(Teratoma)、胸內甲狀腺(Thyroid)、淋巴瘤(Terrible lymphoma);<b>中縱膈(最少)</b>—囊腫(支氣管/心包/腸源)、淋巴結;<b>後縱膈</b>—神經源性(成人 schwannoma、小孩 neuroblastoma)。<b>小孩最常見=神經源性</b>;小孩後縱膈惡性比例較成人高。</p>\n<p><b>胸腺瘤:</b>前上縱膈最常見;最常合併<b>重症肌無力</b>(亦純紅再障、低球蛋白血症);「非良性」可侵犯/種植/SVC 症候群;治療以<b>完整手術切除</b>為主(預後關鍵),II 期以上加放療,無法切除以 cisplatin 化療。<b>Masaoka:</b>I 被膜完整、II 被膜侵犯、III 侵鄰近器官、IVa 肋膜/心包種植、IVb 淋巴/血行轉移。</p>\n<p><b>生殖細胞瘤(年輕男性):</b>畸胎瘤最常見(良性手術);<b>精原(seminoma,約 1/3)</b>—AFP 正常、bHCG 可輕升、放化療反應佳;<b>非精原</b>—AFP/bHCG 顯著升、第一線 cisplatin 化療,殘餘再手術。標記用於鑑別/療效/追蹤。</p>\n<p><b>縱膈炎:</b>急性(牙源性/食道破裂)危急→抗生素+<b>外科引流清創</b>;下行性壞死性縱膈炎多牙源性、須積極引流;纖維化性多慢性淋巴結炎(結核/組織漿菌)。</p>\n"},"肋膜疾病與氣胸":{"title":"肋膜疾病與氣胸","html":"\n<p><b>氣胸:</b>原發性(年輕高瘦男、肺尖 bleb)vs 續發性(COPD/間質肺病)。小量原發無症狀可觀察/抽氣,<b>插胸管非絕對需要</b>。<b>手術(VATS bullectomy+肋膜固定)適應症:</b>同側復發≥2 次、雙側、持續漏氣>72 h、合併血/膿胸、特殊職業。<b>張力性氣胸</b>=縱膈偏對側、大量空氣、休克(頸靜脈怒張低血容時可不明顯)→緊急減壓。</p>\n<p><b>肋膜積液:</b>漏出液(心衰/肝硬化)vs 滲出液(Light 標準:蛋白比>0.5、LDH 比>0.6、LDH>2/3 上限)。<b>複雜性肺炎旁/膿胸</b>:pH<7.2、葡萄糖<60、化膿→<b>引流/胸腔鏡</b>。惡性積液多 exudate、女性最常乳癌;<b>肋膜固定術(talc 效果最佳)</b>;引流不延長存活。</p>\n<p><b>乳糜胸:</b>胸管受損、乳白(禁食澄清)、高三酸甘油脂+乳糜微粒+<b>淋巴球(非嗜酸球)</b>;最常因創傷/手術(食道切除、縱膈/左頸廓清);胸管走右下胸→手術多採<b>右側</b>;保守用 <b>中鏈三酸甘油脂(MCT)</b> 或禁食 TPN。假性乳糜胸=RA/結核。</p>\n<p><b>惡性間皮瘤:</b>石綿相關、>40 歲男、預後極差(五年<10%);外科可行肋膜外全肺切除(EPP)。</p>\n"},"胸部創傷外科":{"title":"胸部創傷外科","html":"\n<p><b>立即致命傷(ATLS):</b>氣道阻塞、<b>張力性氣胸</b>、<b>開放性氣胸</b>、<b>大量血胸</b>、連枷胸/肺挫傷、心包填塞。</p>\n<p><b>張力性氣胸:</b>患側呼吸音消失、氣管偏對側、患側皮下氣腫、休克→<b>立即針刺/胸管減壓</b>。<b>開放性氣胸:</b>三邊膠布封+胸管。</p>\n<p><b>胸管置放:</b><b>第 4–5 肋間、腋中線</b>,沿肋骨<b>上緣</b>進入(下緣有神經血管束);不可經傷口放置。</p>\n<p><b>大量血胸開胸指徵:</b>初次引流>1500 mL,或持續>200 mL/hr×2–4 h。引流後再休克者先<b>重新評估(ABC)</b>找原因再決定開胸。</p>\n<p><b>要點:</b>皮下+縱膈氣腫→疑<b>食道或氣管</b>損傷;穿刺物不可先移除;小孩肋骨較有彈性「不易骨折」、較易張力性氣胸;下位肋骨(9–12)骨折查腹內臟器。</p>\n"},"氣管支氣管‧感染性肺疾‧其他手術":{"title":"氣管支氣管‧感染性肺疾‧其他手術","html":"\n<p><b>肺膿瘍:</b>厭氧菌/吸入、X 光「氣液平面」空洞、可合併膿胸、與葡萄球菌菌血症相關;<b>大部分抗生素+引流即癒</b>,手術限併支氣管肋膜瘻管/大咳血/慢性無法引流/疑癌。</p>\n<p><b>支氣管擴張症:</b>手術限「<b>侷限單肺葉</b>、內科失敗反覆肺炎/咳血」;雙側瀰漫者不適合切除。</p>\n<p><b>肺結核手術:</b>多重抗藥、併黴菌球/大咳血、毀損肺;術前白蛋白>3 g/dL 較佳,非全以胸腔鏡。<b>麴菌球(aspergilloma)</b>抗黴藥滲透差→症狀/咳血者以手術為主。</p>\n<p><b>咳血:</b>大量>600 mL/24h;<b>硬式支氣管鏡優於軟式</b>;支氣管動脈栓塞有效。<b>氣管惡性腫瘤</b>最常見=鱗狀細胞癌,次為腺樣囊狀癌(沿神經/黏膜下擴散、生長慢)。</p>\n<p><b>多汗症:</b>胸腔鏡交感神經切除(<b>T2–T3</b>);傷 T1→Horner;副作用代償性多汗、血/氣胸。<b>LAM</b>(育齡女性、似結節硬化肺病灶、自發氣胸/乳糜胸)。</p>\n"},"先天性肺部與胸壁畸形":{"title":"先天性肺部與胸壁畸形","html":"\n<p><b>游離肺(sequestration):</b>無正常支氣管相通、<b>血供來自體循環(主動脈)</b>;肺葉內型(下葉、回流肺靜脈)、肺葉外型(自有臟層肋膜、回流體循環);手術切除。最不易自發性氣胸。</p>\n<p><b>CPAM(先天性肺呼吸道畸形):</b>多囊塊、可致胎兒窘迫/水腫、<b>有惡性轉化風險</b>;呼吸衰竭者緊急手術,無症狀亦多於嬰幼期切除。<b>支氣管囊腫</b>即使無症狀仍建議切除。</p>\n<p><b>漏斗胸(pectus excavatum):</b>發生率約 1/400、男:女 3–4:1、可合併二尖瓣脫垂/結締組織病;<b>Haller index=胸廓橫徑/前後徑</b>(>3.25 顯著);<b>Nuss 手術最適青春期前後</b>(非 3 歲前)。</p>\n<p><b>胸壁腫瘤:</b>骨纖維發育不良(fibrous dysplasia)血檢多正常;漿細胞瘤(M 蛋白)、骨肉瘤(ALP↑)、Ewing 肉瘤有異常。</p>\n"}};

 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}

  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+

}

 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_thoracic_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
