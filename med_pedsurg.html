第一次","num":52,"stem":"小兒並非成人的縮體,所以對於需要接受手術的新生兒,更需嚴密評估及監測其生理狀況。下列對於新生兒的生理描述及評估,何者錯誤?","options":{"A":"新生兒的組織灌流量(tissue perfusion)可由微血管回填充時間(capillary refill time)來監測。若時間超過2秒,則表示其組織灌流量不足","B":"新生兒的肺部發育尚未完全,出生後肺部仍會持續發育出新生的終末細支氣管(terminal bronchioles)及肺泡(alveoli),而此過程會持續到約8個月大。而在早產的新生兒,不成熟的肺功能常是導致其死亡的重要原因","C":"新生兒有較大的單位體重表面積與水分無感流失(insensible fluid losses),因此保暖十分重要","D":"新生兒在失溫後,會以「非顫抖性生熱(nonshivering thermogenesis)」的方式來產熱,導致代謝率及耗氧量大增,時間一長便會造成血灌流量不足及酸血症"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111020-52","topic_code":"T5","topic":"小兒外科總論與其他","id":"111020-52","q_num":52,"src":"民國111年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":44,"stem":"小兒外科特有的先天性疾病,其外科治療術式常會依首創者姓名而命名,下列組合何者錯誤?","options":{"A":"腸道旋轉不良(malrotation);Ladd procedure","B":"鰓裂遺跡(branchial cleft remnant);Sistrunk operation","C":"巨腸症(Hirschsprung's disease);Soave procedure","D":"無肛症(anorectal malformation);Peña operation"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112080-44","topic_code":"T5","topic":"小兒外科總論與其他","id":"112080-44","q_num":44,"src":"民國112年第二次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":55,"stem":"關於兒童的腹腔鏡手術(pediatric laparoscopy)之敘述,下列何者錯誤?","options":{"A":"腹腔鏡手術在嬰兒及幼童需使用較短(15~20 cm)且小的器械","B":"因兒童的腹腔較小,因此使用較小的(5 mm)鏡頭亦可以提供足夠光源","C":"氣腹壓力維持在12毫米汞柱壓力有利於手術進行","D":"兒童的深層靜脈栓塞(DVT)發生機會低,不需要給與預防性血栓藥物"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113070-55","topic_code":"T5","topic":"小兒外科總論與其他","id":"113070-55","q_num":55,"src":"民國113年第二次","img":""}],E={"102110-16":{"quick":"正確為 D:上腹可摸到橄欖狀腫塊(olive mass)。","detail":{"background":"新生兒消化道急症:①肥厚性幽門狹窄(IHPS)—約「3–6 週」非膽汁性噴射嘔吐、上腹「橄欖狀腫塊」、超音波診斷、「低血氯低血鉀代謝性鹼中毒」(嘔吐失 HCl)、治療「幽門肌切開(pyloromyotomy)」、預後佳;②十二指腸閉鎖—「雙泡徵(double bubble)」、合併唐氏症;③腸旋轉不良併中腸扭轉(malrotation+volvulus)—「膽汁性嘔吐」之外科急症、上消化道攝影見十二指腸空腸接合異位/螺旋狀,治療 Ladd 手術;④小腸閉鎖—腹脹、膽汁嘔吐 小兒外科總論:新生兒生理—體表面積/體重比大、無感水分流失多須保暖、非顫抖性生熱、出生後肺持續發育「肺泡(alveoli)」(非終末細支氣管)。腹腔鏡:用較短小器械、5 mm 鏡頭、氣腹壓力宜「較低(約 8–10 mmHg)」、兒童 DVT 風險低多不需預防。冠名術式:腸旋轉不良—Ladd;巨腸症—Soave/Swenson/Duhamel;無肛症—Peña(後矢狀肛門直腸成形);甲狀舌管囊腫—Sistrunk(非鰓裂)。","options":{"A":"正確:用較短小器械。","B":"正確:5 mm 鏡頭可用。","C":"★錯誤(本題答案):氣腹壓宜較低。","D":"正確:兒童 DVT 風險低多不需預防。"},"sources":["Coran Pediatric Surgery","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}}},TO=["新生兒與小兒消化道", "腹壁缺損與疝氣", "小兒實質腫瘤", "頸部腫塊與斜頸", "小兒外科總論與其他"],LEC={"新生兒與小兒消化道":{"title":"新生兒與小兒消化道","html":"\n<p><b>膽汁性嘔吐=外科急症</b>,須排除<b>腸旋轉不良併中腸扭轉(malrotation+volvulus)</b>(上消化道攝影見十二指腸空腸接合異位/螺旋狀,治療 Ladd 手術)。</p>\n<p><b>肥厚性幽門狹窄(IHPS):</b>約「3–6 週」<b>非膽汁性噴射嘔吐</b>、上腹「橄欖狀腫塊」、超音波診斷、<b>低血氯低血鉀代謝性鹼中毒</b>、治療「幽門肌切開(pyloromyotomy)」、預後佳。</p>\n<p><b>閉鎖:</b>十二指腸閉鎖=<b>雙泡徵(double bubble)</b>、合併唐氏症;小腸閉鎖=腹脹、膽汁嘔吐、胎便稀疏、<b>羊水過多</b>。環狀胰/十二指腸蹼亦致近端阻塞。</p>\n<p><b>先天性巨腸症(Hirschsprung):</b>直腸切片無神經節細胞、<b>乙醯膽鹼酶染色增強(陽性)、calretinin 陰性</b>(PAS 非診斷用);75–80% 侵犯直腸乙狀結腸;<b>最大死因=腸炎</b>。</p>\n"},"腹壁缺損與疝氣":{"title":"腹壁缺損與疝氣","html":"\n<p><b>臍膨出(omphalocele):</b>「腹中線、缺口大、<b>有腹膜囊包覆</b>、常合併其他先天異常/染色體異常(約 50%)、肝臟可膨出」。</p>\n<p><b>腹裂(gastroschisis):</b>「<b>臍右側、缺口小、無囊膜、腸子直接暴露</b>、較少合併其他異常、需<b>較多靜脈輸液</b>(暴露腸失液多)」。</p>\n"},"小兒實質腫瘤":{"title":"小兒實質腫瘤","html":"\n<p><b>神經母細胞瘤(neuroblastoma):</b><b>幼兒最常見之顱外實質腫瘤</b>、源自神經嵴(交感)、65% 腹部(腎上腺髓質)、查尿兒茶酚胺(VMA/HVA)、MIBG 掃描;<b>4S 期(<1 歲、原發局限+擴散限皮膚/肝/骨髓,『不含骨頭』)預後佳</b>。</p>\n<p><b>腎母細胞瘤(Wilms/nephroblastoma):</b><b>WT1 基因</b>、約 10% 合併先天異常(WAGR/Beckwith)、轉移肺/肝。</p>\n<p><b>薦尾畸胎瘤:</b>新生兒畸胎瘤<b>最好發薦尾部</b>、多良性、手術須<b>切除尾骨(防復發)</b>並結紮中薦動脈。<b>橫紋肌肉瘤</b>好發頭頸/泌尿生殖/四肢,「腸胃道較少」。</p>\n"},"頸部腫塊與斜頸":{"title":"頸部腫塊與斜頸","html":"\n<p><b>小兒頸部腫塊:</b>常見<b>囊狀水瘤、鰓裂囊腫、甲狀舌管囊腫</b>(畸胎瘤非常見)。鰓裂遺跡—<b>第二對最常見</b>、開口於胸鎖乳突肌前緣、可有黏液分泌、手術根除。淋巴結需切片之警訊:<b>鎖骨上、>2 cm、固定、持續增大</b>。</p>\n<p><b>先天肌肉性斜頸(torticollis):</b><b>胸鎖乳突肌(SCM)纖維化</b>(非斜方肌/胸舌肌)、2 月內以頸部腫塊表現、臉轉向患側受限、約 20% 合併髖發育不良、<b>首選伸展/物理治療</b>。</p>\n"},"小兒外科總論與其他":{"title":"小兒外科總論與其他","html":"\n<p><b>新生兒生理:</b>體表/體重比大、無感水分流失多須保暖、非顫抖性生熱;出生後肺持續發育<b>肺泡(alveoli)</b>(非終末細支氣管)。</p>\n<p><b>小兒腹腔鏡:</b>用較短小器械、5 mm 鏡頭、氣腹壓力宜<b>較低(約 8–10 mmHg)</b>、兒童 DVT 風險低多不需預防。</p>\n<p><b>冠名術式:</b>腸旋轉不良—<b>Ladd</b>;巨腸症—Soave/Swenson/Duhamel;無肛症—<b>Peña</b>;甲狀舌管囊腫—<b>Sistrunk</b>(非鰓裂)。</p>\n"}};

TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_pedsurg_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
