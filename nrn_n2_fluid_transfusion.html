","q_num":21,"roc_year":"107","exam_code":"107110","src":"民國107年","options":{"A":"保留輸血裝置與採集血液送檢驗","B":"請值班醫師開醫囑給藥","C":"停止輸血,以0.9% NaCl 維持靜脈通暢","D":"記錄輸出入量"},"img":""},{"id":"107110-N2-22","code":"107110","roc":"107","cat":"N2","catname":"基本護理學與護理行政","num":22,"stem":"承上題,小可出現的是何種輸血副作用?","opts":{"A":"過敏反應","B":"急性溶血反應","C":"類過敏反應","D":"延遲性溶血反應"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"7輸血反應","topic_code":"B6-7","q_num":22,"roc_year":"107","exam_code":"107110","src":"民國107年","options":{"A":"過敏反應","B":"急性溶血反應","C":"類過敏反應","D":"延遲性溶血反應"},"img":""},{"id":"111030-N2-24","code":"111030","roc":"111","cat":"N2","catname":"基本護理學與護理行政","num":24,"stem":"李先生體重60 公斤,輸血醫囑「Blood transfusion PRBC(packed RBC)2 units」,輸血開始15 分鐘 後,出現頭痛、寒顫、發燒、呼吸困難、低血壓等症狀,此時護理師在通知醫師之前,最優先的處理 為何?","opts":{"A":"立即停止輸血,以生理鹽水維持靜脈通暢","B":"調慢滴速,測量生命徵象","C":"抽血做血液培養","D":"調高病人床頭,給予氧氣"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"7輸血反應","topic_code":"B6-7","q_num":24,"roc_year":"111","exam_code":"111030","src":"民國111年","options":{"A":"立即停止輸血,以生理鹽水維持靜脈通暢","B":"調慢滴速,測量生命徵象","C":"抽血做血液培養","D":"調高病人床頭,給予氧氣"},"img":""},{"id":"112030-N2-24","code":"112030","roc":"112","cat":"N2","catname":"基本護理學與護理行政","num":24,"stem":"有關輸血引起過敏性休克反應,下列敘述何者錯誤?","opts":{"A":"輸血1 週後發生","B":"低血壓","C":"嘔吐","D":"蕁麻疹"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"7輸血反應","topic_code":"B6-7","q_num":24,"roc_year":"112","exam_code":"112030","src":"民國112年","options":{"A":"輸血1 週後發生","B":"低血壓","C":"嘔吐","D":"蕁麻疹"},"img":""},{"id":"113030-N2-18","code":"113030","roc":"113","cat":"N2","catname":"基本護理學與護理行政","num":18,"stem":"在輸血過程中,病人出現皮膚癢、紅疹、鼻塞及呼吸困難等症狀,可能是發生下列何種輸血反應?","opts":{"A":"熱原反應","B":"過敏反應","C":"溶血反應","D":"肺栓塞反應"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"7輸血反應","topic_code":"B6-7","q_num":18,"roc_year":"113","exam_code":"113030","src":"民國113年","options":{"A":"熱原反應","B":"過敏反應","C":"溶血反應","D":"肺栓塞反應"},"img":""},{"id":"113100-N2-16","code":"113100","roc":"113","cat":"N2","catname":"基本護理學與護理行政","num":16,"stem":"輸血時發生咳嗽、心搏過速、高血壓及呼吸困難症狀,最有可能發生下列何種反應?","opts":{"A":"溶血反應","B":"循環負荷過量","C":"過敏性反應","D":"熱原反應"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"7輸血反應","topic_code":"B6-7","q_num":16,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"溶血反應","B":"循環負荷過量","C":"過敏性反應","D":"熱原反應"},"img":""},{"id":"113180-N2-15","code":"113180","roc":"113","cat":"N2","catname":"基本護理學與護理行政","num":15,"stem":"周小妹連續給予大量靜脈注射導致有循環負荷過量(Circulatory Overload)問題,最可能出現下列何種症 狀?1水腫 2皮膚起紅疹 3血壓下降 4呼吸困難 5頸靜脈怒張","opts":{"A":"123","B":"234","C":"345","D":"145"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"7輸血反應","topic_code":"B6-7","q_num":15,"roc_year":"113","exam_code":"113180","src":"民國113年","options":{"A":"123","B":"234","C":"345","D":"145"},"img":""}],E={"103100-N2-18":{"quick":"中度脫水徵候=哭泣時沒有眼淚。","detail":{"background":"小兒脫水評估:中度~重度脫水徵候有「眼窩凹陷、哭泣時無眼淚、口腔黏膜乾、皮膚彈性差、尿量減少、尿比重升高、囟門凹陷」。選項C「哭泣時沒有眼淚」是脫水徵候(C正確)。A嘔吐是脫水原因非徵候;B汗流量增加非脫水(脫水汗少);D尿比重「升高」非降低(脫水濃縮尿)。故哭泣無眼淚(C)。","options":{"A":"嘔吐是原因,非脫水徵候。","B":"脫水時汗流量減少,非增加。","C":"正確(本題答案)。哭泣無眼淚是脫水徵候。","D":"脫水尿比重升高,非降低。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"104100-N2-26":{"quick":"體液容積過多「最不可能」出現血壓下降(應血壓上升)。","detail":{"background":"體液容積過多(過度水化)的徵象:A脈搏呈洪脈、B呼吸短促(肺水腫)、D頸靜脈怒張、血壓上升、體重增加、水腫。選項C「血壓下降」最不可能(本題答案)——體液過多血容量增加應「血壓『上升』」;血壓下降是體液不足(脫水)的表現。故最不可能為血壓下降(C)。","options":{"A":"洪脈是體液過多表現。","B":"呼吸短促(肺水腫)是體液過多。","C":"正確(本題答案)。體液過多應血壓上升,非下降。","D":"頸靜脈怒張是體液過多。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"106030-N2-22":{"quick":"炎夏口渴脫水時血漿滲透壓「升高」非降低;稱滲透壓降低為錯誤。","detail":{"background":"炎夏出汗、口渴(輕度脫水)時的調節:A腎素-血管收縮素系統活化、Angiotensin II上升(對);B醛固酮促鈉再吸收、鉀離子濃度可下降(對);D ADH(抗利尿激素)分泌增加保水(對)。選項C「血漿滲透壓降低」錯誤——脫水時水分流失、血漿濃縮,血漿滲透壓「升高」(刺激ADH與口渴),故C為錯誤敘述(本題答案)。","options":{"A":"正確。Angiotensin II上升。","B":"正確。醛固酮促鈉再吸收。","C":"錯誤(本題答案)。脫水時血漿滲透壓升高,非降低。","D":"正確。ADH分泌增加保水。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"106110-N2-30":{"quick":"醛固酮作用於腎臟「遠曲小管/集尿管」非近曲小管;稱作用於近曲小管為錯誤。","detail":{"background":"留鹽激素(醛固酮,Aldosterone):A由腎上腺皮質分泌、又稱醛固酮(對);B主要作用促「留鈉排鉀」(對);D使水分隨鈉再吸收進入血液、增加血量(對)。選項C「作用於腎臟的『近曲小管』使鈉再吸收」錯誤——醛固酮主要作用在腎臟的「遠曲小管與集尿管」促進鈉再吸收與鉀排泄,非近曲小管,故C為錯誤敘述(本題答案)。","options":{"A":"正確。腎上腺皮質分泌、又稱醛固酮。","B":"正確。促留鈉排鉀。","C":"錯誤(本題答案)。醛固酮作用於遠曲小管/集尿管,非近曲小管。","D":"正確。使水分隨鈉進入血液增加血量。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"107110-N2-26":{"quick":"驗證脫水=尿比重>1.030(1)、血清鈉上升>145(3)→「13」。","detail":{"background":"脫水(體液容積不足)的檢驗數值:1尿比重>1.030(尿濃縮)、3血清鈉上升可能>145 mEq/L(血液濃縮)。脫水時尿比重「升高」非<1.010(2錯,2是稀釋);血清鈉「上升」非<135(4錯,4是低血鈉/水過多)。故脫水驗證為「13」。","options":{"A":"正確(本題答案,13)。尿比重>1.030、血清鈉>145。","B":"含4(血鈉下降)不符。","C":"含2(尿比重<1.010)不符。","D":"含2、4不符。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"108020-N2-30":{"quick":"脫水生命徵象=體溫上升、脈搏弱且快、呼吸增加、血壓下降。","detail":{"background":"脫水(體液容積缺失)的生命徵象:體溫「上升」(散熱差/感染)、脈搏「弱且快(代償)」、呼吸速率「增加(代償)」、血壓「下降(血容量不足)」(B正確)。脫水是血容量減少→心搏代償加快、血壓下降。故B正確。體液水分通則:脫水→ADH與醛固酮增加保鈉保水、血漿滲透壓升高、尿濃縮(比重>1.030);體液過多→水腫、頸靜脈怒張、洪脈、血壓上升;無感水分喪失經皮膚呼吸蒸發(發燒呼吸快增加)。","options":{"A":"脫水呼吸增加(非減少)、血壓下降(非上升)。","B":"正確(本題答案)。體溫升、脈搏弱快、呼吸增、血壓降。","C":"脫水體溫升、脈搏快、血壓降,非如此。","D":"脫水脈搏快、呼吸增、血壓降,非如此。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"110110-N2-37":{"quick":"增加無感性水分喪失=發燒(2)、呼吸短促(3)→「23」。","detail":{"background":"無感性水分喪失(insensible losses)=經皮膚(非出汗的蒸發)與呼吸道蒸發、無法察覺的水分流失。增加者:2發燒(代謝增、體溫高、蒸發多)、3呼吸短促(呼吸道蒸發增)。選項1腹瀉是「可感」的腸道水分流失(非無感);4利尿劑增加「尿液(可感)」排出。故增加無感性水分喪失為「23」。","options":{"A":"含1(腹瀉是可感流失)不符。","B":"正確(本題答案,23)。發燒、呼吸短促增加無感水分喪失。","C":"含4(利尿劑是可感)不符。","D":"含1、4不符。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"111030-N2-31":{"quick":"糞便呈扁平/鉛筆型/細線狀為「異常」(腸腔狹窄),非正常;稱細線狀為正常為錯誤。","detail":{"background":"糞便特性:A鬆軟/水狀=腸蠕動增加(對);B乾硬=脫水或腸蠕動減慢(對);C潛血反應陽性=大腸腫瘤等出血(對)。選項D「糞便形狀呈扁平、鉛筆型或細線狀為正常」錯誤——扁平/鉛筆狀/細線狀糞便提示「腸腔狹窄(腫瘤、痙攣)」屬異常,非正常,故D為錯誤敘述(本題答案)。","options":{"A":"正確。鬆軟水狀=腸蠕動增加。","B":"正確。乾硬=脫水或蠕動減慢。","C":"正確。潛血陽性可能大腸腫瘤。","D":"錯誤(本題答案)。鉛筆狀細線狀糞便是異常(腸腔狹窄)。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"112110-N2-21":{"quick":"體液容積缺失與「血壓上升」無關(脫水血壓下降);稱血壓上升為無關項。","detail":{"background":"急性腸胃炎大量嘔吐致「體液容積缺失(脫水)」的徵象:A脈搏速率加快(代償)、B尿量減少(腎保水)、C體溫上升——皆相關。選項D「血壓『上升』」與體液容積缺失無關(本題答案)——脫水血容量減少應「血壓『下降』」,血壓上升不是脫水徵象。故無關項為血壓上升(D)。","options":{"A":"脈搏加快與脫水相關。","B":"尿量減少與脫水相關。","C":"體溫上升與脫水相關。","D":"正確(本題答案)。脫水血壓下降,血壓上升無關。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"112180-N2-13":{"quick":"馬拉松大量流汗脫水:ADH分泌增加(1)、腎小管再吸收增加(3)→「13」。","detail":{"background":"大量流汗未補水(脫水、血漿滲透壓升高)的生理反應:1 ADH(抗利尿激素)分泌「增加」保水、3腎小管水分再吸收「增加」(濃縮尿)。選項2「醛固酮分泌『減少』」錯誤(脫水時醛固酮『增加』促留鈉保水);4「腎小管排鈉留鉀」錯誤(脫水時是『留鈉』排鉀)。故為「13」。","options":{"A":"含2(醛固酮減少)錯。","B":"含4(排鈉留鉀)錯。","C":"正確(本題答案,13)。ADH增加、腎小管再吸收增加。","D":"含2、4不符。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"113180-N2-1":{"quick":"賽前心跳快、口乾、冒汗=全身適應症候群「警覺期」。","detail":{"background":"全身適應症候群(GAS,Selye壓力反應)三期:警覺期(alarm,交感神經興奮:心跳加速、肌肉收縮、口乾、冒汗、瞳孔放大,為應戰準備)→抵抗期(resistance,身體適應抵抗)→耗竭期(exhaustion,資源耗盡)。賽前的心跳快、口乾、冒汗屬「警覺期」(A正確)。故警覺期(A)。","options":{"A":"正確(本題答案)。賽前交感興奮=警覺期。","B":"抵抗期是身體適應抵抗階段。","C":"耗竭期是資源耗盡階段。","D":"恢復期非GAS標準三期。"},"sources":["新文京《基本護理學》體液與水分平衡","華杏《最新基本護理學》體液調節"]}},"103100-N2-22":{"quick":"輸血過快/大量輸血易致低血鈣症(枸櫞酸鹽結合鈣)。","detail":{"background":"大量/快速輸血合併症:儲血所含「枸櫞酸鹽(citrate,抗凝劑)」會結合血中游離鈣,造成「低血鈣症(hypocalcemia)」(A正確,表現手足抽搐、心律不整);另可致檸檬酸鹽蓄積、高血鉀(儲存血鉀外漏)、低體溫、代謝性鹼中毒(枸櫞酸代謝成碳酸氫根)。故低血鈣症(A)。","options":{"A":"正確(本題答案)。枸櫞酸鹽結合鈣致低血鈣症。","B":"儲血鉀外漏致高血鉀,非低血鉀。","C":"枸櫞酸代謝致鹼中毒,非酸中毒。","D":"非呼吸性酸中毒。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"104030-N2-32":{"quick":"血鎂8.1 mEq/L不在正常範圍(正常約1.5~2.5)。","detail":{"background":"電解質正常值:血鉀3.5~5.0、血鈉135~145、血鈣4.5~5.5(mEq/L,或8.5~10.5 mg/dL)、血鎂1.5~2.5 mEq/L。選項D「血鎂8.1 mEq/L」遠超過正常(1.5~2.5)為異常(D正確)。A鉀4.2、B鈉142、C鈣5.0皆在正常範圍。故血鎂8.1異常(D)。","options":{"A":"血鉀4.2正常。","B":"血鈉142正常。","C":"血鈣5.0正常。","D":"正確(本題答案)。血鎂8.1超過正常(1.5~2.5)。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"105030-N2-31":{"quick":"鈉離子「不」負責將碳水化合物轉成熱能;稱鈉轉碳水為熱能為錯誤。","detail":{"background":"鈉離子功能:A維持神經肌肉正常運作(對)、C維持細胞內外滲透壓與體液平衡(對)、D協助心肌收縮控制(對)。選項B「將碳水化合物轉成熱能」錯誤——碳水化合物代謝產能與鈉離子無直接關係(需酵素、維生素B群等),鈉的主要功能是滲透壓、神經肌肉傳導,故B為錯誤敘述(本題答案)。","options":{"A":"正確。維持神經肌肉運作。","B":"錯誤(本題答案)。鈉不負責將碳水化合物轉熱能。","C":"正確。維持細胞內外滲透壓。","D":"正確。協助心肌收縮控制。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"107030-N2-27":{"quick":"高血鉀與低血鉀皆會出現=噁心(2)、心律不整(3)→「23」。","detail":{"background":"高血鉀與低血鉀「共同」症狀:2噁心(腸胃)、3心律不整(影響心肌電位)——兩者皆會出現。選項1「深部肌腱反射『喪失』」主要是「高血鉀/高血鎂」(低血鉀是肌無力但反射減弱程度不同);4「腸蠕動減少(腸麻痺)」主要見於「低血鉀」(高血鉀反而可能腸蠕動增加/腹瀉)。故共同症狀為「23」。","options":{"A":"含1(深部反射喪失偏高血鉀/高血鎂)。","B":"正確(本題答案,23)。噁心、心律不整為兩者共同。","C":"含4(腸蠕動減少偏低血鉀)。","D":"含1不符。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"107030-N2-28":{"quick":"高血鈉常見症狀=皮膚與黏膜乾燥(細胞脫水)。","detail":{"background":"高血鈉(hypernatremia,血鈉>145)常因「水分不足/流失」致細胞外高滲、細胞內脫水,症狀有「口渴、皮膚與黏膜乾燥、發燒、躁動、意識改變」(D正確)。A體溫「上升」非下降;B高血鈉非姿位性低血壓(脫水可能有,但典型是黏膜乾);C高血鈉尿量「減少、尿比重升高」非增加。故皮膚黏膜乾燥(D)。","options":{"A":"高血鈉體溫可上升,非下降。","B":"姿位性低血壓非高血鈉典型。","C":"高血鈉尿量減少、尿比重升高。","D":"正確(本題答案)。高血鈉致皮膚與黏膜乾燥。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"108110-N2-29":{"quick":"15% KCl 20 mL IV push:須質疑「給藥途徑(不可推注)」與「劑量過量」→「13」。","detail":{"background":"抽血鉀3.4(輕度低血鉀),醫囑「15% KCL(10mEq/5mL)20 mL I.V. push St.」:1給藥「途徑」錯誤(KCl絕不可IV push,須稀釋緩慢滴注)、3「劑量」過大(20 mL=40 mEq一次推注致命)——須向醫師質疑。本題官方答案「13」(途徑+劑量)。KCl是高警訊藥,IV push會致命性高血鉀心律不整。","options":{"A":"正確(本題答案,13)。質疑給藥途徑(不可推注)與劑量。","B":"組合不符。","C":"正確即13。","D":"組合不符。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"109030-N2-29":{"quick":"長期臥床可能造成血鈣增高(骨鈣釋出)。","detail":{"background":"電解質不平衡:B「長期臥床可能造成血鈣增高」正確(制動致骨質流失、鈣釋入血)。A Furosemide(Lasix,排鉀利尿)造成血鉀「過低」(非過高);C腹瀉流失腸液致血鉀「過低」(非過高);D水分攝取不足致血鈉「過高(濃縮)」(非過低)。故B正確。","options":{"A":"Furosemide致血鉀過低,非過高。","B":"正確(本題答案)。長期臥床骨鈣釋出致血鈣增高。","C":"腹瀉致血鉀過低,非過高。","D":"水分不足致血鈉過高,非過低。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"110110-N2-34":{"quick":"血鉀2.9(低血鉀)情境=嘔吐(流失胃液與鉀)。","detail":{"background":"吳女士檢驗:鈉138(正常)、鉀2.9(低,正常3.5~5)、氯102(正常)、鈣4.8(正常)→「低血鉀」。最可能情境是「嘔吐(C)」——大量嘔吐流失含鉀的胃液與消化液致低血鉀(且伴代謝性鹼中毒)。過度水化(稀釋多項)、脫水(濃縮升高)、長期臥床(致高血鈣非低血鉀)皆不符單純低血鉀。故嘔吐(C)。","options":{"A":"過度水化會稀釋多項電解質。","B":"脫水致濃縮升高,非低血鉀。","C":"正確(本題答案)。嘔吐流失胃液致低血鉀。","D":"長期臥床致高血鈣,非低血鉀。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"111110-N2-20":{"quick":"甘草與毛地黃合用可能引發「低血鉀」(增毛地黃毒性),非高血鉀;稱高血鉀為錯誤。","detail":{"background":"藥物食物禁忌:B鎮靜劑避免與茶(咖啡因)同服降藥效(對);C葡萄柚汁干擾鈣離子阻斷劑肝臟代謝(對,升濃度);D酒精促進抗組織胺對中樞的抑制(對)。選項A「甘草與毛地黃合用可能引發高血鉀」錯誤——甘草(glycyrrhizin)有類醛固酮作用會「促鉀排出致『低血鉀』」,低血鉀會「增強毛地黃毒性(心律不整)」,故A為錯誤敘述(本題答案,應為低血鉀)。","options":{"A":"錯誤(本題答案)。甘草+毛地黃致低血鉀(增毒性),非高血鉀。","B":"正確。鎮靜劑勿與茶同服。","C":"正確。葡萄柚汁干擾鈣阻斷劑代謝。","D":"正確。酒精增強抗組織胺中樞抑制。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"111110-N2-31":{"quick":"尿液紅血球增加「不」因肝膽疾病(肝膽致膽紅素尿非血尿);稱肝膽疾病為錯誤。","detail":{"background":"尿液紅血球(血尿)增加原因:A導尿受傷(機械損傷)、B尿路結石(刮傷尿路)、D輸血血型不合(溶血、血紅素尿)——皆可致尿中紅血球/血色素增加。選項C「肝膽疾病」錯誤(本題答案)——肝膽疾病造成的是「膽紅素尿(深茶色)」非血尿(紅血球),故C為錯誤敘述。","options":{"A":"導尿受傷可致血尿。","B":"尿路結石可致血尿。","C":"錯誤(本題答案)。肝膽疾病致膽紅素尿,非血尿。","D":"輸血血型不合溶血致血色素尿。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"112180-N2-8":{"quick":"服Lasix(排鉀利尿)「不」應衛教避免攝取含鉀食物(反而需補鉀);稱避免含鉀食物為不適當。","detail":{"background":"下肢水腫服「Lasix(furosemide,排鉀利尿劑)」:A早餐飯後服(對,避免夜尿、減胃刺激)、C注意電解質檢驗(對,監測鉀)、D評估攝入排出量(對)。選項B「衛教避免攝取含鉀食物」不適當——Lasix會「排鉀致低血鉀」,應「補充含鉀食物(香蕉、柑橘)」而非避免,故B為不適當(本題答案)。","options":{"A":"適當。早餐飯後服。","B":"不適當(本題答案)。排鉀利尿應補鉀,非避免含鉀食物。","C":"適當。注意電解質檢驗。","D":"適當。評估攝入排出量。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"112180-N2-12":{"quick":"鉀2.9判讀=低血鉀(hypokalemia)。","detail":{"background":"檢驗:鈉138(正常135~145)、鉀2.9(低,正常3.5~5.0)、氯102(正常)、鈣4.8(正常4.5~5.5)。鉀2.9<3.5→「低血鉀(hypokalemia)」(B正確)。非高血鈉(鈉正常)、非低血鈣(鈣正常)、非低血鈉(鈉正常)。故低血鉀(B)。","options":{"A":"血鈉138正常,非高血鈉。","B":"正確(本題答案)。鉀2.9=低血鉀。","C":"血鈣4.8正常,非低血鈣。","D":"血鈉138正常,非低血鈉。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"114030-N2-31":{"quick":"構成牙齒骨骼的礦物質除鈣外主要還有鎂(3)、磷(4)→「34」。","detail":{"background":"構成牙齒與骨骼的主要礦物質:鈣(Ca)、磷(P,以磷酸鈣形式)、鎂(Mg)。除鈣外主要為「鎂(3)、磷(4)」(B,本題答案「34」)。鋅(1)、鉀(2)非骨骼牙齒主要構成礦物質。故為「34」。電解質正常值:鉀3.5~5.0、鈉135~145、鈣4.5~5.5(mEq/L)、鎂1.5~2.5;低血鉀(嘔吐腹瀉利尿)肌無力腸蠕動減；高血鉀心律不整；排鉀利尿劑(Lasix)需補鉀；甘草致低血鉀增毛地黃毒性。","options":{"A":"含1(鋅)、2(鉀)不符。","B":"正確(本題答案,34)。鎂、磷與鈣構成骨骼牙齒。","C":"含1不符。","D":"含2不符。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"114170-N2-22":{"quick":"腹瀉護理:補充鈉、鉀離子與水分(流失電解質)。","detail":{"background":"一般腹瀉護理:B「補充鈉、鉀離子與水分」正確——腹瀉流失大量水分與電解質(鈉、鉀、碳酸氫根),須補充(口服電解質液)。A急性期應「清淡、清流/低渣」非高熱量;C應避免「高纖維」(刺激腸道、加重腹瀉);D肛門周圍皮膚應「清潔、塗保護(氧化鋅)」非類固醇軟膏(類固醇延緩癒合)。故B正確。","options":{"A":"急性期宜清淡,非增加高熱量。","B":"正確(本題答案)。補充鈉鉀離子與水分。","C":"腹瀉應避免高纖維(刺激腸道)。","D":"肛周宜塗保護劑,非類固醇軟膏。"},"sources":["新文京《基本護理學》電解質","華杏《最新基本護理學》電解質異常"]}},"101030-N2-24":{"quick":"嚴重嘔吐流失胃酸→代謝性鹼中毒。","detail":{"background":"嚴重嘔吐流失大量「胃酸(HCl,含H⁺與Cl⁻)」,體內氫離子減少、碳酸氫根相對增多,造成「代謝性鹼中毒(metabolic alkalosis)」(B正確,常伴低血鉀、低血氯)。腹瀉流失碳酸氫根才致代謝性酸中毒。故嘔吐→代謝性鹼中毒(B)。","options":{"A":"腹瀉流失碳酸氫根才致代謝性酸中毒。","B":"正確(本題答案)。嘔吐流失胃酸致代謝性鹼中毒。","C":"呼吸性酸中毒是CO2滯留。","D":"呼吸性鹼中毒是換氣過度。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"101030-N2-36":{"quick":"早晨起床血壓較傍晚低(血壓有日夜變化)。","detail":{"background":"血壓變化:B「早晨起床(剛睡醒)的血壓較傍晚(下午)低」正確(血壓有日夜節律,清晨起床後漸升、下午達高峰、夜間睡眠最低)。A「冬天」血壓較高(寒冷血管收縮),非夏冬都高;C飲酒過量血管「擴張」短期降壓、長期升壓(非單純收縮);D留鹽激素(醛固酮)促鈉水滯留使血壓「上升」非下降。故B正確。","options":{"A":"冬天血壓較高,非夏冬都高。","B":"正確(本題答案)。早晨起床血壓較傍晚低。","C":"飲酒過量短期血管擴張,非單純收縮。","D":"留鹽激素使血壓上升,非下降。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"101110-N2-39":{"quick":"深而快的呼吸=換氣過度(Hyperventilation)。","detail":{"background":"呼吸型態:「深而快」的呼吸是「換氣過度(Hyperventilation)」(C正確)——使CO2排出過多致呼吸性鹼中毒。潮式(陳施氏)是漸深漸淺週期、呼吸過速(Tachypnea)是「快而淺」、畢歐氏是不規則。故深而快=換氣過度(C)。酸鹼判讀:pH與PaCO2反向=呼吸性、pH與HCO3同向=代謝性;嘔吐→代謝性鹼中毒、腹瀉→代謝性酸中毒、換氣過度→呼吸性鹼、CO2滯留(COPD/嗎啡)→呼吸性酸;Kussmaul深快=代謝性酸中毒代償;緩衝系統=重碳酸鹽/磷酸鹽/蛋白質。","options":{"A":"潮式呼吸是漸深漸淺週期。","B":"呼吸過速是快而淺。","C":"正確(本題答案)。深而快=換氣過度。","D":"畢歐氏是不規則呼吸。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"102030-N2-40":{"quick":"代謝性酸中毒出現庫斯毛耳氏呼吸(Kussmaul,深而快)。","detail":{"background":"代謝性酸中毒(如DKA、尿毒症)時,身體代償性增加呼吸排出CO2,出現「庫斯毛耳氏呼吸(Kussmaul’s,深而快、規則)」(C正確)。換氣不足(CO2滯留致酸中毒)、畢歐氏(不規則)、陳施氏(漸深漸淺週期)皆非代謝性酸中毒典型。故庫斯毛耳氏呼吸(C)。","options":{"A":"換氣不足是CO2滯留,非代謝性酸中毒代償。","B":"畢歐氏是不規則呼吸。","C":"正確(本題答案)。代謝性酸中毒=庫斯毛耳呼吸。","D":"陳施氏是漸深漸淺週期。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"103030-N2-40":{"quick":"嗎啡過量呼吸型態=呼吸過慢(抑制呼吸中樞)。","detail":{"background":"嗎啡(morphine)等鴉片類藥物過量會「抑制延腦呼吸中樞」,造成「呼吸過慢(緩慢、淺)」甚至呼吸停止(C正確,瞳孔縮小三聯徵)。呼吸過速、換氣過度、呼吸短促皆非嗎啡過量典型。故呼吸過慢(C)。酸鹼判讀:pH與PaCO2反向=呼吸性、pH與HCO3同向=代謝性;嘔吐→代謝性鹼中毒、腹瀉→代謝性酸中毒、換氣過度→呼吸性鹼、CO2滯留(COPD/嗎啡)→呼吸性酸;Kussmaul深快=代謝性酸中毒代償;緩衝系統=重碳酸鹽/磷酸鹽/蛋白質。","options":{"A":"呼吸過速非嗎啡過量。","B":"換氣過度非嗎啡過量。","C":"正確(本題答案)。嗎啡過量致呼吸過慢。","D":"呼吸短促非嗎啡過量典型。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"103100-N2-27":{"quick":"氯化鈉「不是」人體緩衝系統(緩衝系統=重碳酸鹽/磷酸鹽/蛋白質)。","detail":{"background":"人體酸鹼緩衝系統:A重碳酸鹽(碳酸氫根)緩衝系統(最主要)、B磷酸鹽緩衝系統、D蛋白質緩衝系統(含血紅素)。選項C「氯化鈉緩衝系統」不是人體緩衝系統(本題答案)——氯化鈉是電解質、無酸鹼緩衝能力。故非緩衝系統者為氯化鈉(C)。酸鹼判讀:pH與PaCO2反向=呼吸性、pH與HCO3同向=代謝性;嘔吐→代謝性鹼中毒、腹瀉→代謝性酸中毒、換氣過度→呼吸性鹼、CO2滯留(COPD/嗎啡)→呼吸性酸;Kussmaul深快=代謝性酸中毒代償;緩衝系統=重碳酸鹽/磷酸鹽/蛋白質。","options":{"A":"重碳酸鹽是主要緩衝系統。","B":"磷酸鹽是緩衝系統。","C":"正確(本題答案)。氯化鈉非緩衝系統。","D":"蛋白質是緩衝系統。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"105090-N2-43":{"quick":"門窗緊閉頭暈=CO2濃度上升、呼吸速率增快(代償)。","detail":{"background":"門窗緊閉、空氣不流通→「CO2濃度上升、O2下降」,CO2上升刺激呼吸中樞使「呼吸速率增快(代償排CO2)」、並致頭暈不適(B正確)。A「O2上升」錯(密閉O2下降);C「呼吸減緩」錯(CO2升刺激呼吸加快);D換氣過度是CO2下降(與此相反)。故B正確。","options":{"A":"密閉空間O2下降,非上升。","B":"正確(本題答案)。CO2上升、呼吸速率增快。","C":"CO2上升刺激呼吸加快,非減緩。","D":"換氣過度是CO2下降,與此相反。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"106111-N2-27":{"quick":"pH7.28↓、PaCO2 48↑、HCO3 23正常=呼吸性酸中毒。","detail":{"background":"血液氣體判讀(pH 7.28低=酸中毒;PaCO2 48高=呼吸性;HCO3 23正常):pH偏酸+PaCO2升高(CO2滯留)+HCO3正常(尚未代償)→「呼吸性酸中毒(respiratory acidosis)」(A正確)。記:pH與PaCO2「反向」=呼吸性;pH與HCO3「同向」=代謝性。此處pH↓PaCO2↑(反向)=呼吸性酸中毒。故A正確。","options":{"A":"正確(本題答案)。pH↓PaCO2↑=呼吸性酸中毒。","B":"呼吸性鹼中毒是pH↑PaCO2↓。","C":"代謝性酸中毒是pH↓HCO3↓。","D":"代謝性鹼中毒是pH↑HCO3↑。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"106111-N2-44":{"quick":"缺氧會出現心搏過速(代償性)。","detail":{"background":"心搏過速(tachycardia)的情況:A「缺氧(hypoxia)」——身體代償性增加心率以輸送更多氧(A正確)。B顱內壓上升致「心搏過『緩』」(Cushing反應);C高血鉀致心搏過緩/心律不整;D毛地黃中毒致心搏過緩/心律不整。故缺氧致心搏過速(A)。","options":{"A":"正確(本題答案)。缺氧代償性心搏過速。","B":"顱內壓上升致心搏過緩(Cushing反應)。","C":"高血鉀致心搏過緩。","D":"毛地黃中毒致心搏過緩。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"110030-N2-31":{"quick":"換氣過度→呼吸性鹼中毒(CO2排出過多)。","detail":{"background":"換氣過度(hyperventilation,深快呼吸)使「CO2排出過多、PaCO2下降」,碳酸減少、pH上升,造成「呼吸性鹼中毒(respiratory alkalosis)」(B正確,表現口周/手腳麻、頭暈、手足抽搐)。換氣不足(CO2滯留)才致呼吸性酸中毒。故換氣過度→呼吸性鹼中毒(B)。","options":{"A":"呼吸性酸中毒是換氣不足CO2滯留。","B":"正確(本題答案)。換氣過度致呼吸性鹼中毒。","C":"代謝性酸中毒非換氣過度直接致。","D":"代謝性鹼中毒非換氣過度致。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"110030-N2-38":{"quick":"顱內壓上升:體溫上升、呼吸過慢(Cushing反應/腦幹受壓)。","detail":{"background":"顱內壓上升(腦挫傷):體溫調節中樞受影響可「體溫上升(中樞性高熱)」、腦幹受壓致「呼吸變慢且不規則(呼吸過慢)」、並有「血壓上升、心搏過緩(Cushing三徵)」(B正確)。故體溫上升、呼吸過慢(B)。酸鹼判讀:pH與PaCO2反向=呼吸性、pH與HCO3同向=代謝性;嘔吐→代謝性鹼中毒、腹瀉→代謝性酸中毒、換氣過度→呼吸性鹼、CO2滯留(COPD/嗎啡)→呼吸性酸;Kussmaul深快=代謝性酸中毒代償;緩衝系統=重碳酸鹽/磷酸鹽/蛋白質。","options":{"A":"顱內壓上升呼吸過慢,非過速。","B":"正確(本題答案)。顱內壓上升致體溫上升、呼吸過慢。","C":"非體溫下降、換氣過度。","D":"非體溫下降、換氣不足。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"111110-N2-21":{"quick":"pH7.25↓、PaCO2 65↑、HCO3 25正常=呼吸性酸中毒。","detail":{"background":"血氣判讀(pH 7.25低=酸中毒;PaCO2 65高=呼吸性;HCO3 25正常):pH↓+PaCO2↑(反向)+HCO3正常(未代償)→「呼吸性酸中毒(respiratory acidosis)」(A正確,常見COPD、呼吸抑制致CO2滯留)。故A正確。","options":{"A":"正確(本題答案)。pH↓PaCO2↑=呼吸性酸中毒。","B":"呼吸性鹼中毒是pH↑PaCO2↓。","C":"代謝性酸中毒是pH↓HCO3↓。","D":"代謝性鹼中毒是pH↑HCO3↑。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"111110-N2-39":{"quick":"換氣過度=深而快的呼吸(2)、CO2下降而O2上升(3)→「23」。","detail":{"background":"換氣過度(hyperventilation)特徵:2「深而快」的呼吸、3使血液中「CO2下降(排出多)、O2上升」、致呼吸性鹼中毒。選項1「慢而淺」錯(換氣不足才慢淺);4「O2下降」錯(換氣過度O2上升)。故換氣過度特徵為「23」。酸鹼判讀:pH與PaCO2反向=呼吸性、pH與HCO3同向=代謝性;嘔吐→代謝性鹼中毒、腹瀉→代謝性酸中毒、換氣過度→呼吸性鹼、CO2滯留(COPD/嗎啡)→呼吸性酸;Kussmaul深快=代謝性酸中毒代償;緩衝系統=重碳酸鹽/磷酸鹽/蛋白質。","options":{"A":"含1(慢而淺)錯。","B":"含1、4不符。","C":"正確(本題答案,23)。深而快、CO2下降O2上升。","D":"含4(O2下降)錯。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"112030-N2-46":{"quick":"顱內壓增高時呼吸速率「變慢」非變快;稱呼吸變快為錯誤。","detail":{"background":"疾病與異常呼吸:B COPD病人會有端坐呼吸(對);C血氧不足會呼吸過速(對,代償);D代謝性酸中毒會換氣過度(對,Kussmaul代償)。選項A「腦內壓(顱內壓)增高時,呼吸速率變快」錯誤——顱內壓增高壓迫腦幹呼吸中樞,呼吸「變慢且不規則」(非變快),故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。顱內壓增高呼吸變慢,非變快。","B":"正確。COPD有端坐呼吸。","C":"正確。血氧不足呼吸過速。","D":"正確。代謝性酸中毒換氣過度。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"113100-N2-20":{"quick":"尿液pH過低(酸性尿)原因=代謝性酸中毒(2)、飢餓(3)→「23」。","detail":{"background":"尿液pH「過低(酸性)」的原因:2代謝性酸中毒(身體排酸、尿排H⁺)、3飢餓(脂肪分解產酮體、酸性代謝物)。選項1「呼吸性鹼中毒」會使尿液「偏鹼」(排碳酸氫根);4「泌尿道感染」常因產尿素酶細菌(變形桿菌)使尿液「偏鹼」。故尿pH過低為「23」。","options":{"A":"含1(呼吸性鹼中毒→鹼性尿)、4(UTI→鹼性尿)不符。","B":"正確(本題答案,23)。代謝性酸中毒、飢餓致酸性尿。","C":"含1不符。","D":"含4不符。"},"sources":["新文京《基本護理學》酸鹼平衡","華杏《最新基本護理學》血液氣體分析與呼吸型態"]}},"101030-N2-22":{"quick":"5%葡萄糖溶液=輸入時等張、進入細胞後成低張(葡萄糖被代謝)。","detail":{"background":"5%葡萄糖溶液(D5W):剛輸入血管時為「等張」(滲透壓約278 mOsm/L,與血漿接近),但進入體內後葡萄糖被細胞「代謝消耗」,僅剩「自由水」分布全身,故「進入細胞後變成低張(實質供水)」(B正確)。2.5%葡萄糖是低張;D5W混合食鹽水/林格氏為等張或高張。故B正確。","options":{"A":"2.5%葡萄糖是低張溶液。","B":"正確(本題答案)。5%葡萄糖輸入等張、代謝後成低張。","C":"D5W混0.45%食鹽水偏等張~高張。","D":"D5W混林格氏為高張。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"101110-N2-25":{"quick":"高張性靜脈輸液=3%食鹽水。","detail":{"background":"靜脈輸液張力:低張(0.45%、0.33%食鹽水、2.5%葡萄糖)、等張(0.9%食鹽水、林格氏、D5W輸入時)、高張(3%食鹽水、10%葡萄糖、D5在0.9%食鹽水)。選項D「3%食鹽水」是高張溶液(D正確)。0.45%、0.33%是低張,0.9%是等張。故3%食鹽水為高張(D)。","options":{"A":"0.45%食鹽水是低張。","B":"0.33%食鹽水是低張。","C":"0.9%食鹽水是等張。","D":"正確(本題答案)。3%食鹽水是高張溶液。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"103030-N2-29":{"quick":"0.9%食鹽水與林格氏皆為等張溶液。","detail":{"background":"本題承上(兩溶液):0.9%生理食鹽水與乳酸鹽林格氏溶液皆為「等張溶液」(B正確,滲透壓與血漿接近,不會使細胞脹縮、用於補充細胞外液)。故兩者皆等張(B)。溶液張力:低張(0.45%/0.33%食鹽水、2.5%葡萄糖,補細胞內水、脫水尿崩,禁腦損傷)、等張(0.9%食鹽水、林格氏、D5W輸入時,補細胞外液)、高張(3%食鹽水、10%以上葡萄糖、D5S,降腦水腫,中心靜脈給)。輸血只配0.9%食鹽水。","options":{"A":"兩者非高張。","B":"正確(本題答案)。0.9%食鹽水與林格氏皆等張。","C":"後者(林格氏)亦為等張,非高張。","D":"兩者皆等張,非低張。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"103100-N2-28":{"quick":"等張性溶液=林格氏溶液。","detail":{"background":"等張性溶液(與血漿滲透壓相近):0.9%生理食鹽水、乳酸鹽林格氏溶液、D5W(輸入時)。選項B「林格氏溶液」是等張(B正確)。0.45%食鹽水是低張、3%食鹽水是高張、台大5號是低張(維持液)。故林格氏溶液為等張(B)。溶液張力:低張(0.45%/0.33%食鹽水、2.5%葡萄糖,補細胞內水、脫水尿崩,禁腦損傷)、等張(0.9%食鹽水、林格氏、D5W輸入時,補細胞外液)、高張(3%食鹽水、10%以上葡萄糖、D5S,降腦水腫,中心靜脈給)。輸血只配0.9%食鹽水。","options":{"A":"0.45%食鹽水是低張。","B":"正確(本題答案)。林格氏溶液是等張。","C":"3%食鹽水是高張。","D":"台大5號是低張維持液。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"104100-N2-25":{"quick":"輕微脫水給林格氏溶液目的=維持正常生理運作(補充體液電解質)。","detail":{"background":"李小弟腹瀉輕微脫水,醫囑「林格氏溶液(Ringer’s,等張、含多種電解質)300 c.c.」的目的是「補充流失的體液與電解質、維持正常生理運作(血容量、循環)」(B正確)。林格氏液非止瀉藥(A錯)、非止痛(C錯)、非診斷用(D錯)。故維持正常生理運作(B)。","options":{"A":"林格氏液非止瀉藥。","B":"正確(本題答案)。補充體液電解質維持生理運作。","C":"非止痛用。","D":"非診斷用途。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"105030-N2-26":{"quick":"輸FFP前後適當輸液=0.9%生理食鹽水。","detail":{"background":"輸血(含FFP)前後與血品「同一管路」只能用「0.9%生理食鹽水(等張、無鈣無糖)」沖洗維持(B正確)。0.45%食鹽水(低張致溶血)、5%葡萄糖(致紅血球凝集溶血)、乳酸鹽林格氏(含鈣會與枸櫞酸抗凝劑作用形成血塊)皆「不可」與血品共用。故0.9%生理食鹽水(B)。","options":{"A":"0.45%食鹽水低張會致溶血。","B":"正確(本題答案)。輸血用0.9%生理食鹽水。","C":"5%葡萄糖致紅血球凝集溶血。","D":"林格氏含鈣會與抗凝劑形成血塊。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"105090-N2-25":{"quick":"低張輸液「無助於」全身循環量(水分移出血管至組織);稱有助循環量為錯誤。","detail":{"background":"低張性輸液(0.45%食鹽水等)特性:B液體進入體內由「血管移至組織間隙/細胞內」(對,補細胞內水)、C大量輸注會引發「水中毒(細胞水腫)」(對)、D每小時輸液量宜小於400 ml(對)。選項A「有助於全身循環量」錯誤——低張液水分會移出血管進入細胞,「不能有效擴充血管內循環量」(擴循環量是等張/膠體液),故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。低張液水分移出血管,無助循環量。","B":"正確。液體由血管移至組織間隙。","C":"正確。大量輸注引發水中毒。","D":"正確。每小時宜<400 ml。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"106030-N2-3":{"quick":"腦血管損傷(顱內壓高)「不適合」低張液0.45% NaCl(加重腦水腫)。","detail":{"background":"腦血管損傷/顱內壓上升病人應避免「低張溶液」(水分移入細胞、加重「腦水腫」與顱內壓)。選項C「0.45% NaCl(低張)」不適合(C正確,本題答案)。A 5%G in 0.2%NaCl(偏低張也須謹慎,但本題以0.45%為答案)、B 10%葡萄糖水(高張)、D 0.9% NaCl(等張)。腦損傷宜用等張/高張(降腦水腫),避免低張。故0.45% NaCl不適合(C)。","options":{"A":"5%G in 0.2%NaCl雖偏低張,本題以0.45%為答案。","B":"10%葡萄糖是高張,非加重腦水腫。","C":"正確(本題答案)。低張0.45% NaCl加重腦水腫,不適合。","D":"0.9% NaCl是等張,可用。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"106030-N2-24":{"quick":"輸血前後同一管路可用=0.9%食鹽水溶液。","detail":{"background":"可與血品「同一條輸液管路」前後使用者:只有「0.9%生理食鹽水(等張、無糖無鈣)」(A正確)。5%葡萄糖(致紅血球凝集溶血)、乳酸鹽林格氏(含鈣與抗凝劑形成血塊)、台大5號(含糖低張)皆不可與血品共用。故0.9%食鹽水(A)。溶液張力:低張(0.45%/0.33%食鹽水、2.5%葡萄糖,補細胞內水、脫水尿崩,禁腦損傷)、等張(0.9%食鹽水、林格氏、D5W輸入時,補細胞外液)、高張(3%食鹽水、10%以上葡萄糖、D5S,降腦水腫,中心靜脈給)。輸血只配0.9%食鹽水。","options":{"A":"正確(本題答案)。輸血前後用0.9%食鹽水。","B":"5%葡萄糖致紅血球凝集。","C":"林格氏含鈣會形成血塊。","D":"台大5號含糖低張,不可共用。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"106030-N2-49":{"quick":"低張性靜脈輸液=2.5%葡萄糖水溶液。","detail":{"background":"低張性溶液(滲透壓低於血漿):2.5%葡萄糖水、0.45%食鹽水、0.33%食鹽水。選項A「2.5%葡萄糖水溶液」是低張(A正確)。5%葡萄糖(輸入時等張)、10%葡萄糖(高張)、5%葡萄糖加0.45%食鹽水(高張)皆非低張。故2.5%葡萄糖水為低張(A)。","options":{"A":"正確(本題答案)。2.5%葡萄糖水是低張。","B":"5%葡萄糖輸入時等張。","C":"10%葡萄糖是高張。","D":"5%葡萄糖+0.45%食鹽水是高張。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"106111-N2-25":{"quick":"等張性溶液=林格氏溶液(3)、乳酸鹽溶液(4)→「34」。","detail":{"background":"等張性溶液:3林格氏溶液、4乳酸鹽(林格氏)溶液——皆等張(與血漿滲透壓接近)。選項1「2.5%葡萄糖溶液」是低張;2「10%葡萄糖溶液」是高張。故等張為「34」。溶液張力:低張(0.45%/0.33%食鹽水、2.5%葡萄糖,補細胞內水、脫水尿崩,禁腦損傷)、等張(0.9%食鹽水、林格氏、D5W輸入時,補細胞外液)、高張(3%食鹽水、10%以上葡萄糖、D5S,降腦水腫,中心靜脈給)。輸血只配0.9%食鹽水。","options":{"A":"含1(2.5%低張)、2(10%高張)不符。","B":"含1不符。","C":"含2不符。","D":"正確(本題答案,34)。林格氏、乳酸鹽溶液皆等張。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"107030-N2-21":{"quick":"體液容積缺失與「WBC 12000」無關(WBC升高反映感染/發炎,非脫水指標)。","detail":{"background":"急性腸胃炎禁食、D5S輸液中,「體液容積缺失(脫水)」的相關數值:A脈搏100次/分(代償加快)、C 24小時尿量500 mL(少尿、腎保水)、D BP 90/60(血壓偏低)——皆與脫水相關。選項B「WBC 12000/mm³(白血球升高)」與「脫水」無關(本題答案)——WBC升高反映「感染/發炎」,非體液容積缺失指標。故無關項為WBC(B)。","options":{"A":"脈搏100代償加快,與脫水相關。","B":"正確(本題答案)。WBC升高反映感染,與脫水無關。","C":"尿量500 mL偏少,與脫水相關。","D":"BP 90/60偏低,與脫水相關。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"107110-N2-34":{"quick":"嬰幼兒清潔灌腸宜用生理食鹽水(避免電解質不平衡)。","detail":{"background":"嬰幼兒清潔灌腸:應選「生理食鹽水(0.9% NaCl,等張)」(B正確)——避免低張的「清水/肥皂水」大量吸收致「水中毒/電解質不平衡」(嬰幼兒體表面積大、腸黏膜吸收快、風險高)。0.2%肥皂水、清水(低張)、冰水皆不宜。故生理食鹽水(B)。","options":{"A":"肥皂水低張會致電解質不平衡。","B":"正確(本題答案)。嬰幼兒清潔灌腸宜用生理食鹽水。","C":"清水低張致水中毒。","D":"冰水刺激、不宜。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"108020-N2-23":{"quick":"「不是」低張溶液=5%葡萄糖混0.225%食鹽水(屬等張~偏等張);其餘為低張。","detail":{"background":"低張溶液:0.33%食鹽水、0.45%食鹽水、2.5%葡萄糖水。選項A「5%葡萄糖混合0.225%食鹽水溶液」——5%葡萄糖(等張)+0.225%食鹽水使其滲透壓接近「等張」,「不是低張」(A正確,本題答案)。B 0.33%、C 0.45%、D 2.5%葡萄糖皆為低張。故不是低張者為A。","options":{"A":"正確(本題答案)。5%葡萄糖+0.225%食鹽水偏等張,非低張。","B":"0.33%食鹽水是低張。","C":"0.45%食鹽水是低張。","D":"2.5%葡萄糖水是低張。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"109110-N2-30":{"quick":"0.45% NaCl(低張)適用於脫水(補細胞內水)。","detail":{"background":"0.45% NaCl(低張溶液)使水分移入細胞,適用於「脫水(尤其細胞內脫水、高血鈉性脫水)」補充細胞內水分(A正確)。營養不良(需熱量蛋白)、嚴重燒傷(需等張/膠體補血容量)、顱內壓過高(低張會加重腦水腫,禁用)皆不適合低張液。故脫水(A)。","options":{"A":"正確(本題答案)。0.45% NaCl低張適用於脫水。","B":"營養不良需熱量蛋白,非低張液。","C":"嚴重燒傷需等張/膠體補血容量。","D":"顱內壓過高禁用低張液(加重腦水腫)。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"110030-N2-26":{"quick":"0.33%食鹽水(低張)適用於尿崩症。","detail":{"background":"0.33%食鹽水(低張溶液)適用於「尿崩症(diabetes insipidus)」——尿崩症大量排出稀釋尿致「高血鈉、細胞內脫水」,需低張液補充自由水(B正確)。顱內壓過高(禁低張)、嚴重燒傷(需等張膠體)、營養不良(需熱量)皆不適合。故尿崩症(B)。","options":{"A":"顱內壓過高禁用低張液。","B":"正確(本題答案)。0.33%食鹽水低張適用尿崩症。","C":"嚴重燒傷需等張膠體。","D":"營養不良需熱量蛋白。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"111110-N2-22":{"quick":"D5S(5%葡萄糖+0.9%食鹽水)是「高張」溶液,非等張;稱等張為錯誤。","detail":{"background":"D5S醫囑(D5S 80 mL/hr):A含5%葡萄糖(對)、B含0.9%氯化鈉(對)、D適用於水腫/補充等(視情況)。選項C「屬於等張溶液」錯誤——5%葡萄糖(等張)+0.9%食鹽水(等張)合併後總滲透壓相加,屬「高張溶液」(約560 mOsm/L),非等張,故C為錯誤敘述(本題答案)。","options":{"A":"正確。含5%葡萄糖。","B":"正確。含0.9%氯化鈉。","C":"錯誤(本題答案)。D5S是高張溶液,非等張。","D":"依情況適用,本題以C為錯誤。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"112110-N2-22":{"quick":"12.5% glucose water=高張溶液。","detail":{"background":"葡萄糖溶液張力:2.5%(低張)、5%(等張)、10%以上(高張)。「12.5% glucose water」濃度>10%,屬「高張溶液」(C正確,滲透壓高,須由中心靜脈或較大靜脈給予,周邊給易致靜脈炎)。故高張溶液(C)。溶液張力:低張(0.45%/0.33%食鹽水、2.5%葡萄糖,補細胞內水、脫水尿崩,禁腦損傷)、等張(0.9%食鹽水、林格氏、D5W輸入時,補細胞外液)、高張(3%食鹽水、10%以上葡萄糖、D5S,降腦水腫,中心靜脈給)。輸血只配0.9%食鹽水。","options":{"A":"12.5%葡萄糖是高張,非低張。","B":"非等張(5%才等張)。","C":"正確(本題答案)。12.5% glucose water是高張溶液。","D":"是高張葡萄糖,非含糖電解質溶液。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"112180-N2-14":{"quick":"乳酸鹽林格氏(等張)含乳酸代謝為碳酸氫根,「肝臟疾病慎用」;稱適用於肝臟疾病為錯誤。","detail":{"background":"靜脈溶液:A 0.9% NaCl等張、輸血前後用(對);B 2.5%葡萄糖低張、可用於尿崩症(對);C 0.45% NaCl低張、禁用於腦血管損傷(對)。選項D「乳酸鹽林格氏溶液為等張,適用於肝臟疾病」錯誤——林格氏所含「乳酸鹽」需經「肝臟」代謝成碳酸氫根,肝功能不良者代謝乳酸能力差、易乳酸堆積,故肝臟疾病「慎用」乳酸鹽林格氏,D為錯誤敘述(本題答案)。","options":{"A":"正確。0.9% NaCl等張、輸血前後用。","B":"正確。2.5%葡萄糖低張、可用於尿崩症。","C":"正確。0.45% NaCl禁用於腦血管損傷。","D":"錯誤(本題答案)。乳酸鹽林格氏肝病慎用(乳酸經肝代謝)。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"114030-N2-14":{"quick":"「不是」低張溶液=乳酸鹽林格氏(等張);其餘為低張。","detail":{"background":"低張溶液:0.33% NaCl、Half Saline(0.45% NaCl)、2.5% Glucose Water。選項B「Lactated Ringer’s solution(乳酸鹽林格氏)」是「等張」溶液(B正確,本題答案,不是低張)。A 0.33% NaCl、C Half Saline、D 2.5% Glucose 皆為低張。故不是低張者為林格氏(B)。","options":{"A":"0.33% NaCl是低張。","B":"正確(本題答案)。乳酸鹽林格氏是等張,非低張。","C":"Half Saline(0.45%)是低張。","D":"2.5% Glucose是低張。"},"sources":["新文京《基本護理學》靜脈輸液溶液","華杏《最新基本護理學》溶液張力與適應症"]}},"101030-N2-21":{"quick":"長期靜脈留置宜選「副頭靜脈(前臂)」(粗直、不在關節、易固定)。","detail":{"background":"長期靜脈留置針部位選擇原則:選「前臂(非關節處)、粗直、易固定」的靜脈,如「副頭靜脈、貴要靜脈」(前臂)(C正確)。掌背靜脈、手掌靜脈弓(末梢細、活動影響);肘正中靜脈在「肘關節處」(彎曲影響滴速、不適長期)。故副頭靜脈(C)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"掌背靜脈末梢細,不適長期。","B":"肘正中靜脈在關節處,不適長期。","C":"正確(本題答案)。副頭靜脈前臂粗直,適長期。","D":"手掌靜脈弓末梢細小。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"101030-N2-23":{"quick":"靜脈點滴突然畏寒:立即停止注射、保暖並通知醫師。","detail":{"background":"靜脈點滴中突然「畏寒(寒顫)」,可能為「輸液污染致發熱反應」或藥物反應,最優先處置是「立即停止注射、保暖並通知醫師」(C正確),保留輸液送檢。A當發燒前兆不處理、B逕自給抗生素、D僅繼續觀察皆不當。故立即停止、保暖、通知醫師(C)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"畏寒非正常,不可不處理。","B":"不可逕自給抗生素。","C":"正確(本題答案)。立即停止注射、保暖並通知醫師。","D":"應停止而非僅觀察。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"102030-N2-17":{"quick":"penicillin加至100 c.c.、半小時滴完、精密套管(60gtt/mL)→100×60÷30=200滴/分。","detail":{"background":"滴速=總量×滴系數÷時間(分)。精密輸液套(60 gtt/mL),100 c.c.於半小時(30分)滴完:100×60÷30=200滴/分(D正確)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"25滴計算錯誤。","B":"50滴計算錯誤。","C":"100滴(誤算)。","D":"正確(本題答案)。100×60÷30=200滴/分。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"102030-N2-27":{"quick":"手術當天放靜脈針優先選「前臂副頭靜脈」(非關節、利手術中輸液)。","detail":{"background":"手術病人放靜脈針優先選「前臂(非關節處)、粗直易固定」的靜脈,如「副頭靜脈」(B正確)——手術中需穩定輸液,避免肘關節處(彎曲影響)。掌背頭靜脈(末梢)、肘正中靜脈(關節)、上臂貴要靜脈(較深)皆非首選。故前臂副頭靜脈(B)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"掌背頭靜脈末梢,非首選大量輸液。","B":"正確(本題答案)。前臂副頭靜脈非關節、易固定。","C":"肘正中靜脈在關節處。","D":"上臂貴要靜脈較深。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"103030-N2-25":{"quick":"沿靜脈發紅+滴速變慢(靜脈炎):停止該部位注射。","detail":{"background":"沿靜脈注射處「發紅、滴速變慢」=靜脈炎徵象,正確優先處置是「停止該部位注射、拔除、另選部位重新注射」(A正確),並可熱敷患處。B生理食鹽水沖洗(不解決發炎)、C調整速度(無效)、D冰敷按摩(靜脈炎不可按摩)皆不當。故停止該部位注射(A)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"正確(本題答案)。靜脈炎停止該部位注射。","B":"沖洗不解決靜脈炎。","C":"調速無法解決發炎。","D":"靜脈炎不可按摩。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"103100-N2-3":{"quick":"留有體液污漬的玻璃引流瓶=感染性「不可燃」廢棄物、置「紅色」容器→「24」。","detail":{"background":"醫療廢棄物分類:玻璃(不可燃)+沾染病人體液(感染性)=「感染性『不可燃』廢棄物」、應置於「紅色」容器密封儲存(本題答案「24」:2不可燃感染性、4紅色容器)。紅色=感染性可燃?——依規範感染性廢棄物以「紅色」標示;玻璃為不可燃感染性。選項1可燃、3黃色不符。故「24」。","options":{"A":"含1(可燃)不符,玻璃不可燃。","B":"含1不符。","C":"含3(黃色)不符。","D":"正確(本題答案,24)。不可燃感染性、紅色容器。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"103100-N2-21":{"quick":"靜脈輸注部位冰冷、腫脹、有壓迫感=輸液浸潤。","detail":{"background":"靜脈輸注部位「冰冷、腫脹、有壓迫感、滴速變慢、回血不良」=「輸液浸潤(infiltration)」(C正確,藥液漏入皮下組織)。感染(紅腫熱痛+膿+發燒)、血栓性靜脈炎(沿靜脈紅腫熱痛變硬)、循環負荷過量(全身水腫呼吸喘)皆非「冰冷腫脹」。故輸液浸潤(C)。","options":{"A":"感染是紅腫熱痛+膿+發燒。","B":"血栓性靜脈炎是沿靜脈紅腫熱痛變硬。","C":"正確(本題答案)。冰冷腫脹壓迫感=輸液浸潤。","D":"循環負荷過量是全身水腫呼吸喘。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"103100-N2-26":{"quick":"靜脈留置針推入軟管後:以手指按壓「穿刺部位前端血管」(防血液流出、利固定)。","detail":{"background":"靜脈留置針(留置軟管)穿刺、退出針芯前,為固定留置針並「防止血液由軟管流出」,應「以手指按壓穿刺部位『前端(近心端)的血管』」阻斷血流(C正確),再接上輸液管。按穿刺點本身或留置針出口無法有效阻斷近心端血流。故按壓穿刺部位前端血管(C)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"按壓穿刺部位本身無法阻斷近心端血流。","B":"按壓血液流出口效果有限。","C":"正確(本題答案)。按壓穿刺部位前端(近心)血管。","D":"反折針頭非固定防漏血做法。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"104030-N2-4":{"quick":"加針劑藥物至輸液袋後測量血壓:前項已洗手、無接觸體液,可不需再洗手。本題答案A。","detail":{"background":"本題官方答案A。洗手時機(WHO接觸病人前後、無菌操作前、接觸體液後、接觸環境後):A「加針劑藥物至輸液袋後,測量血壓」——加藥(清潔操作)未接觸病人體液,接著量血壓(接觸完整皮膚),前項已洗手可不需「再次」洗手。B壓瘡傷口間(接觸傷口/體液須洗手)、C觸診腹部後拿東西(接觸病人後須洗手)、D拔留置針後(接觸血液須洗手)皆須再洗手。故A。","options":{"A":"正確(本題答案)。加藥後量血壓,前項已洗手可不需再洗。","B":"兩傷口間須洗手(接觸體液)。","C":"觸診病人後須洗手。","D":"拔留置針(接觸血液)後須洗手。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"105030-N2-28":{"quick":"靜脈滴速不規則可考慮拔除重打者=注射針管阻塞。","detail":{"background":"靜脈滴速不規則的處理:A「注射針管阻塞(凝血塊堵塞、無回血)」——無法回抽暢通時,須「拔除留置針、重新注射」(A正確,不可硬沖入凝血塊致栓塞)。B輸液管不通暢(調整管路)、C固定不當(重新固定)、D高度不夠(調高點滴架)皆可調整解決,不需拔針重打。故注射針管阻塞(A)。","options":{"A":"正確(本題答案)。針管阻塞無回血,拔除重打。","B":"輸液管不通暢可調整管路。","C":"固定不當可重新固定。","D":"高度不夠可調高點滴架。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"106030-N2-54":{"quick":"靜脈管路阻塞且無回血:拔除原留置針並重新注射。","detail":{"background":"靜脈輸液管路「阻塞且測試無回血」(凝血塊堵塞),最適切是「拔除原留置針並重新注射」(C正確)。A反折扭壓「沖擠凝血塊」、B、D「以空針沖/反抽凝血塊」皆危險——強行沖入會將凝血塊推入血流致「栓塞」,不可。故拔除重打(C)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"不可沖擠凝血塊(致栓塞)。","B":"不可沖洗凝血塊入血流。","C":"正確(本題答案)。拔除原留置針並重新注射。","D":"反抽凝血塊不可靠且危險。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"106110-N2-23":{"quick":"沿靜脈發紅+滴速變慢(靜脈炎):更換靜脈注射部位。","detail":{"background":"沿靜脈「發紅、注入速度變慢」=靜脈炎,正確處置是「更換靜脈注射部位(停止原部位、另選注射)」(B正確),原部位可熱敷。A調高點滴架(無效)、C生理食鹽水沖洗(不解決發炎)、D發紅處熱敷(可緩解但仍須換部位)。故更換注射部位(B)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"調高點滴架無法解決靜脈炎。","B":"正確(本題答案)。靜脈炎更換注射部位。","C":"沖洗不解決發炎。","D":"熱敷可緩解但仍須換部位。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"106111-N2-24":{"quick":"輸液致靜脈炎處置=重新更換注射部位。","detail":{"background":"靜脈炎處置:A「重新更換注射部位」正確(停止原部位、另選靜脈注射)、原部位可溫敷。B「按摩患處」錯誤(靜脈炎/血栓性靜脈炎不可按摩,防血栓脫落);C病人頭部放低、D左側臥是「空氣栓塞」的處置非靜脈炎。故重新更換注射部位(A)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"正確(本題答案)。靜脈炎重新更換注射部位。","B":"靜脈炎不可按摩患處。","C":"頭部放低是空氣栓塞處置。","D":"左側臥是空氣栓塞處置。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"106111-N2-26":{"quick":"靜脈輸液「室溫」溶液吸收最好?應「接近體溫」吸收佳;稱室溫吸收最好為錯誤。","detail":{"background":"影響靜脈輸液吸收因素:A接近體液成分者易吸收(對)、C脫水者溶液吸收快(對,組織缺水)、D臥床不動者吸收差(對,循環慢)。選項B「在室溫下溶液吸收最好」錯誤——溶液「接近體溫(37°C)」時吸收最好(過冷會刺激血管收縮、減慢吸收),室溫偏低非最佳,故B為錯誤敘述(本題答案)。","options":{"A":"正確。接近體液成分易吸收。","B":"錯誤(本題答案)。接近體溫吸收最好,非室溫。","C":"正確。脫水者吸收快。","D":"正確。臥床不動者吸收差。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"108110-N2-35":{"quick":"循環負荷過量徵象=水腫(1)、呼吸短促(4)→「14」。","detail":{"background":"靜脈輸液「循環負荷過量(circulatory overload)」=輸液過快過多致血容量驟增,徵象:1水腫、4呼吸短促(肺水腫)、頸靜脈怒張、血壓「上升」、脈搏「洪而強」、咳泡沫痰。選項2「脈搏變慢而強」錯(是「快而洪」);3「血壓下降」錯(是「上升」)。故循環負荷過量為「14」。","options":{"A":"含2(脈搏變慢)錯。","B":"正確(本題答案,14)。水腫、呼吸短促為循環負荷過量。","C":"含...不符。","D":"含3(血壓下降)錯。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"109110-N2-31":{"quick":"循環負荷過量:調慢點滴流速並抬高頭部(高坐臥位減心臟負荷)。","detail":{"background":"循環負荷過量(輸液過量致肺水腫)立即處置:「調慢(或停止)點滴流速、協助病人採高坐臥位(抬高頭部、下肢下垂)以減少靜脈回心、減輕心肺負荷」、給氧、通知醫師(A正確)。B抬高下肢(增回心,反加重)、C左側臥(空氣栓塞用)、D右側臥皆不對。故調慢流速並抬高頭部(A)。","options":{"A":"正確(本題答案)。調慢流速並抬高頭部減心臟負荷。","B":"抬高下肢增回心,加重負荷。","C":"左側臥是空氣栓塞處置。","D":"右側臥非循環負荷過量處置。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"109110-N2-34":{"quick":"左前臂留置針更衣:先脫右(健側)、先穿左(患側)→「14」。","detail":{"background":"有靜脈留置針(左前臂)的更衣原則:「脫健側、穿患側」——先脫「右側(健側,1)」、先穿「左側(留置針側/患側,4)」,使有管路的肢體活動最少、避免牽扯留置針(本題答案「14」)。故先脫右、先穿左(14)。靜脈注射:部位由上肢遠端向近端、避關節、長期選前臂副頭/貴要靜脈;浸潤(腫冷壓痛無回血)→停止移除;靜脈炎(沿靜脈紅腫熱痛)→更換部位不可按摩;循環負荷過量→調慢流速抬高頭部；管路阻塞無回血→拔除重打勿沖凝塊。","options":{"A":"13組合不符(穿應先患側左)。","B":"正確(本題答案,14)。先脫右(健)、先穿左(患)。","C":"23組合不符。","D":"24組合不符。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"110030-N2-24":{"quick":"5%葡萄糖1000+生理食鹽水1000=2000 mL/24hr、普通套管(15gtt/mL)→約20~21滴/分。本題答案B。","detail":{"background":"滴速=總量×滴系數÷時間(分)。總量2000 mL、24小時(1440分)、普通套管(以15 gtt/mL):2000×15÷1440≈20.8≈21滴/分(B約20滴/分,本題答案)。記:2000÷24≈83 mL/hr,普通套管83×15÷60≈21滴/分。故約20滴/分(B)。","options":{"A":"8滴/分過慢。","B":"正確(本題答案)。約20~21滴/分。","C":"30滴/分偏快。","D":"84滴/分過快(誤算)。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"110030-N2-28":{"quick":"輸血時病人呼吸困難不適「不」可只調慢流速(應停止輸血);稱調慢流速為不適當。","detail":{"background":"成人輸血護理:A輸血前核對血型/Rh(對)、B放置20G留置針(對,較粗利輸血)、C開始15分鐘流速25 gtt/min(對,慢速觀察)。選項D「病人主訴呼吸困難且不適時,調慢流速」不適當——呼吸困難可能是嚴重輸血反應(過敏/溶血/循環負荷),應「立即停止輸血、以生理食鹽水維持、通知醫師」,僅「調慢流速」延誤處置,故D為不適當(本題答案)。","options":{"A":"適當。輸血前核對血型/Rh。","B":"適當。放置20G留置針。","C":"適當。開始15分鐘慢速觀察。","D":"不適當(本題答案)。呼吸困難應停止輸血,非只調慢。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"110110-N2-35":{"quick":"點滴不順、無回血、水腫且冰冷(浸潤):停止輸注並移除靜脈留置針。","detail":{"background":"右手臂點滴「流速不順、無回血、注射部位水腫且冰冷」=「輸液浸潤(藥液漏皮下)」,最適當是「停止輸注並移除靜脈留置針」、另選部位重打(D正確)。A調位置調高點滴架(無效)、B熱敷(視藥物、但首要是停止移除)、C調整留置針長度(不當)。故停止並移除(D)。","options":{"A":"浸潤調位置無效。","B":"熱敷視藥物,首要是停止移除。","C":"不可調整留置針長度。","D":"正確(本題答案)。浸潤停止輸注並移除留置針。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"110110-N2-36":{"quick":"靜脈輸注部位選擇:應從上肢遠端靜脈開始選。","detail":{"background":"靜脈輸注部位選擇原則:A「應從上肢『遠端』靜脈開始選」正確(由遠而近、保留近心血管供後續使用)。B優先「上肢」非下肢(下肢易血栓);C肘關節處非最佳(彎曲影響滴速);D浸潤重打應選浸潤部位的「近心端(上方)」或另一肢,非遠心端(遠心端在漏出點下方仍會漏)。故由上肢遠端開始(A)。","options":{"A":"正確(本題答案)。從上肢遠端靜脈開始選。","B":"應優先上肢,非下肢深部靜脈。","C":"肘關節處非最佳(彎曲影響)。","D":"浸潤重打應選近心端或另一肢,非遠心端。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"112110-N2-23":{"quick":"靜脈穿刺:大量輸液選前臂靜脈優於手背靜脈。","detail":{"background":"靜脈穿刺部位原則:B「給予大量輸液選擇前臂的靜脈優於手背靜脈」正確(前臂靜脈較粗、流速快、利大量輸液)。A 1歲以內嬰兒優先「頭皮/手背足背」非下肢(下肢易血栓);C TPN(高張)須由「中心靜脈/較大靜脈」非較細靜脈;D「不可」選關節處靜脈(彎曲影響、易滲漏)。故B正確。","options":{"A":"嬰兒優先頭皮手背足背,非下肢。","B":"正確(本題答案)。大量輸液選前臂優於手背。","C":"TPN須中心靜脈,非較細靜脈。","D":"不可選關節處靜脈。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"113100-N2-15":{"quick":"KCl醫囑:右側乳癌術後右上下肢禁止施打靜脈注射。本題答案A。","detail":{"background":"本題官方答案A。乳癌「右側乳房切除術」後,右側「上肢(及同側)」因腋下淋巴結廓清、淋巴回流受損,「禁止在患側手臂施打靜脈注射、抽血、量血壓」(防淋巴水腫與感染)(A正確)。B KCl抽取量/稀釋須正確、C精密套管滴數須依醫囑計算、D注射部位發紅腫脹壓痛是「異常(滲漏/靜脈炎)」非正常。故A正確。","options":{"A":"正確(本題答案)。乳癌術後患側上下肢禁止靜脈注射。","B":"KCl抽取/稀釋須正確計算。","C":"滴數須依醫囑計算。","D":"發紅腫脹壓痛是異常,非正常。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"114030-N2-15":{"quick":"靜脈採血:避免從正接受靜脈輸液治療的部位抽血。","detail":{"background":"靜脈採血步驟:B「避免從正接受靜脈輸液治療的部位(同側)抽血」正確(輸液會稀釋檢體、影響數值)。A成人用「20~22G」非27號(過細,溶血);C酒精消毒後「待自然乾」非用手搧風(污染);D血液應「沿管壁緩慢注入、輕輕混勻」非快速注入用力搖晃(致溶血)。故B正確。","options":{"A":"成人用20~22G,非27號(過細溶血)。","B":"正確(本題答案)。避免從輸液側抽血。","C":"酒精待自然乾,非手搧風。","D":"血液沿管壁緩慢注入,非快速搖晃。"},"sources":["新文京《基本護理學》靜脈注射","華杏《最新基本護理學》靜脈穿刺與輸液合併症"]}},"101110-N2-28":{"quick":"冷藏血液回溫不應超過「30分鐘」非2小時;稱不超過2小時為錯誤。","detail":{"background":"輸血過程:A最初10~15分鐘速度20~40滴/分(慢速觀察反應)(對);C每單位血製品於1~4小時內輸完(對,避免久放滋菌);D加壓輸血壓力不超過300 mmHg(對)。選項B「冷藏血液放置室溫回溫,但不應超過2小時」錯誤——冷藏血取出後應於「30分鐘內」輸用、室溫放置「不超過30分鐘」(久置易滋菌、溶血),非2小時,故B為錯誤敘述(本題答案)。","options":{"A":"正確。最初10~15分20~40滴/分。","B":"錯誤(本題答案)。冷藏血回溫不超過30分鐘,非2小時。","C":"正確。每單位1~4小時內輸完。","D":"正確。加壓不超過300 mmHg。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"102110-N2-22":{"quick":"輸血雙重核對「不」包括捐血者姓名;核對病人血型/成分/血袋號碼等。","detail":{"background":"輸血前二位醫護人員雙重核對(double check)項目:病人姓名、病歷號碼、「血型(B)、血液成分(C)、血袋號碼(D)、Rh因子、血品有效期」。選項A「捐血者姓名」不在核對項目(本題答案)——捐血者為匿名,核對是「受血病人」身分與血袋資料,不核對捐血者姓名。故不包括捐血者姓名(A)。","options":{"A":"正確(本題答案)。雙重核對不包括捐血者姓名。","B":"血型是核對項目。","C":"血液成分是核對項目。","D":"血袋號碼是核對項目。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"103030-N2-26":{"quick":"瓶裝血超過21天「不可重新消毒再用」(應丟棄);稱消毒後再用為錯誤。","detail":{"background":"全血(Whole Blood)輸血:A含血球、血漿及血清白蛋白等成分(對);B適用於術後大失血(對);C嬰兒換血用儲存<3天的新鮮血(對,鉀低、2,3-DPG高)。選項D「瓶裝血若超過21天,應重新消毒後再用」錯誤——血液不可「消毒再用」,過期(超過保存期限)的血應「報廢丟棄」,故D為錯誤敘述(本題答案)。","options":{"A":"正確。全血含血球血漿白蛋白。","B":"正確。適用術後大失血。","C":"正確。嬰兒換血用<3天新鮮血。","D":"錯誤(本題答案)。過期血應丟棄,不可消毒再用。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"103030-N2-27":{"quick":"輸血最初10分鐘維持20~40滴/分。","detail":{"background":"輸血措施:D「最初10分鐘維持20~40滴/分(慢速)」正確,以便觀察有無急性反應。A應用「較粗針(18~20G)」非23號(細針致溶血、流速慢);B輸血前血袋「不可熱水加溫」(高溫致溶血,需用專用加溫器≦37~40°C);C「不可用葡萄糖溶液」沖洗(致紅血球凝集溶血,應用0.9%食鹽水)。故D正確。","options":{"A":"應用18~20G粗針,非23號。","B":"不可熱水加溫(致溶血)。","C":"不可用葡萄糖沖洗(致溶血),應0.9%食鹽水。","D":"正確(本題答案)。最初10分鐘20~40滴/分。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"104030-N2-23":{"quick":"交叉試驗應「供血者血球與受血者血清不凝集」(主側);稱供血者血清與受血者血球不凝集即可為錯誤。","detail":{"background":"輸血注意:B輸血前後僅用0.9%食鹽水(對);C每單位4小時內輸完(對);D輸血後15分鐘無反應可調40~60滴/分(對)。選項A「交叉試驗中,供血者的『血清』和受血者的『血球』不凝集即可」錯誤——交叉配血「主側試驗(最重要)」是「『供血者血球』與『受血者血清』」不凝集(確認受血者無對抗供血者紅血球的抗體);A把血清血球對反了且「即可」忽略次側,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。主側是供血者血球與受血者血清不凝集。","B":"正確。輸血前後僅用0.9%食鹽水。","C":"正確。每單位4小時內輸完。","D":"正確。15分鐘無反應可調40~60滴/分。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"104030-N2-24":{"quick":"雙重核對:輸血前與另一名醫護核對,並帶到病人單位再確認個案。","detail":{"background":"輸血雙重核對:C「輸血前與另一名醫護同仁核對(血袋與醫囑),並『帶到病人單位再確認病人身分』」正確(核對後須在病床旁再次核對病人姓名病歷號與手圈)。A「輸血前核對一次、輸血後再核對」不對(核對在輸血前);B「輸血前核對兩次」未含床邊確認病人;D「與個案核對」不足(須二位醫護核對)。故C正確。","options":{"A":"核對在輸血前,非輸血後。","B":"核對兩次未含床邊確認病人。","C":"正確(本題答案)。二人核對後帶到病人單位再確認。","D":"須二位醫護核對,非僅與個案核對。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"105030-N2-25":{"quick":"FFP置35°C溫水回溫30分鐘後再輸注。","detail":{"background":"輸新鮮冷凍血漿(FFP):A「FFP置於35~37°C溫水中回溫(約30分鐘)後再輸注」正確(FFP是冷凍的,需解凍回溫;溫度不可過高致蛋白變性)。B開始速度應「慢(如20~40滴/分)」非60 gtts/min;C應「使用『有』濾網的輸血套」(過濾血塊);D若暫停輸FFP「不可放回冷凍庫」(解凍後不可再冷凍,應儘速使用或丟棄)。故A正確。","options":{"A":"正確(本題答案)。FFP置35°C溫水回溫30分鐘後輸注。","B":"開始應慢速,非60 gtts/min。","C":"應用有濾網的輸血套。","D":"解凍後不可放回冷凍庫。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"106111-N2-32":{"quick":"輸血雙重核對除基本項外,還包括血品名稱(1)、過敏史(4)、血袋內有無...(5)→「156」?本題答案D。","detail":{"background":"本題官方答案D(156)。輸血共同雙重核對,除病人姓名、病歷號、血袋號碼、ABO血型、Rh因子外,還應包括:1血品名稱、5血袋內有無「凝集/變色/血塊/氣泡」(外觀檢查)、6血品有效日期。選項2血液溫度、3血液來源、4過敏史非「雙重核對血袋」的核對項目(過敏史是輸血前評估)。本題以「156」(血品名稱、外觀、有效期)為正確。","options":{"A":"含2、3不符。","B":"含2、3、4不符。","C":"含2、3、4不符。","D":"正確(本題答案,156)。血品名稱、外觀、有效期。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"108020-N2-25":{"quick":"可增加血液膠體滲透壓的血品=血清白蛋白。","detail":{"background":"增加血液「膠體滲透壓(維持血管內水分)」的血品是「血清白蛋白(albumin)」(C正確)——白蛋白是血漿主要膠體蛋白,輸注可拉回組織水分、擴充血容量(用於低白蛋白血症、水腫)。白血球濃厚液(抗感染)、血小板濃厚液(止血)、冷凍血漿沉澱品(凝血因子)非主要增加膠體滲透壓。故血清白蛋白(C)。","options":{"A":"白血球濃厚液用於抗感染。","B":"血小板濃厚液用於止血。","C":"正確(本題答案)。血清白蛋白增加膠體滲透壓。","D":"冷凍血漿沉澱品補凝血因子。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"108110-N2-7":{"quick":"輸注濃縮紅血球前須先做血液交叉測試。","detail":{"background":"輸注濃縮紅血球(packed RBC)前,病人必須先接受「血液交叉(配合)測試(cross matching)」與血型鑑定(D正確)——確認供血者紅血球與受血者血清相容、無凝集,避免溶血反應。心功能、腎功能、血液培養非輸血前的必要配血檢驗。故血液交叉測試(D)。","options":{"A":"心功能測試非輸血前必要。","B":"腎功能測試非輸血前必要。","C":"血液培養非配血檢驗。","D":"正確(本題答案)。輸PRBC前須做血液交叉測試。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"109030-N2-10":{"quick":"交叉試驗目的「不是」檢查過敏」(是查血球凝集/相容性);稱交叉試驗查過敏為非必要檢驗中之錯誤項。本題答案D。","detail":{"background":"本題官方答案D(非必要/敘述錯誤)。輸血前必要檢驗:A檢查病人與供血者血清/血球間有無凝集(交叉配血)、B血型鑑定(ABO)。選項C「交叉試驗目的為檢查是否產生『過敏』現象」與D「檢查抗原-抗體反應是否產生『過敏』」敘述錯誤——交叉試驗目的是檢查「紅血球凝集(溶血)相容性」非「過敏」。本題以D為答案(非一般輸血前必要檢驗/敘述有誤)。核心:交叉配血查溶血凝集,非查過敏。","options":{"A":"是輸血前必要(查血球凝集)。","B":"是輸血前必要(查血型)。","C":"交叉試驗查凝集相容,非過敏。","D":"正確(本題答案)。交叉試驗非查過敏(查抗原抗體凝集)。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"109030-N2-26":{"quick":"輸PRBC 2 units後血紅素約可增加1~1.2 gm/dL。","detail":{"background":"輸血:D「輸血後血紅素約可增加1~1.2 gm/dL(每單位PRBC約升Hb 1 g/dL)」正確。A血液交叉配合試驗在「輸血『前』」做(非輸血後);B輸PRBC主要目的是「增加紅血球攜氧」(非增加體液容積);C每單位輸血時間應「<4小時(1~4小時)」非大於4小時。故D正確。","options":{"A":"交叉配血在輸血前做,非輸血後。","B":"輸PRBC是增加攜氧,非增加體液容積。","C":"每單位應<4小時,非大於4小時。","D":"正確(本題答案)。輸2U PRBC血紅素約升1~1.2 g/dL。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"111110-N2-24":{"quick":"一般輸血完「不」應立即用林格氏溶液輸注(含鈣會與抗凝劑形成血塊);稱輸血完用林格氏為錯誤。","detail":{"background":"輸血措施:A病人姓名、血型、血液種類、血袋號碼為必核對(對);B輸血開始15分鐘內20~40滴/分(對);C除大量失血休克外一般不加壓輸血(對)。選項D「一般輸血完,應立即使用林格氏溶液輸注」錯誤——血品前後與同管路只能用「0.9%生理食鹽水」,乳酸鹽林格氏「含鈣」會與血中枸櫞酸抗凝劑作用形成血塊,故D為錯誤敘述(本題答案)。","options":{"A":"正確。姓名血型血種血袋號碼必核對。","B":"正確。開始15分鐘20~40滴/分。","C":"正確。一般不加壓輸血。","D":"錯誤(本題答案)。輸血前後用0.9%食鹽水,非林格氏(含鈣形成血塊)。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"112030-N2-25":{"quick":"輸血反應「不」應立即拔除靜脈注射(應停止輸血但保留靜脈以食鹽水維持);稱立即拔針為錯誤。","detail":{"background":"輸血注意:A輸血前後輸注0.9% N/S(對);B冷藏血回溫不超過1小時(對,部分教材30分~1小時);D每單位最好2小時內、最多不超過4小時(對)。選項C「輸血後若發生輸血反應,應立即拔除靜脈注射」錯誤——發生輸血反應應「立即停止輸血,但『保留靜脈通路』改以0.9%食鹽水維持(以便給藥急救)」,不可拔除靜脈針,故C為錯誤敘述(本題答案)。","options":{"A":"正確。輸血前後用0.9% N/S。","B":"正確。冷藏血回溫不超過1小時。","C":"錯誤(本題答案)。輸血反應應停止輸血保留靜脈,非拔針。","D":"正確。每單位最多4小時內輸完。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"112180-N2-15":{"quick":"輸血雙重核對項目=血型(2)、血液成分(3)、血液有效日期(4)→「234」。","detail":{"background":"輸血二位護理人員共同雙重核對項目:2血型、3血液成分、4血液有效日期(及病人姓名、病歷號、血袋號碼、Rh)。選項1「捐血者姓名」、5「捐血者病歷號碼」非核對項目(捐血者匿名,核對的是受血病人與血袋資料)。故雙重核對為「234」。輸血核對:二人雙重核對病人姓名病歷號、血型Rh、血品名稱成分、血袋號碼、有效期、外觀(不核對捐血者);交叉配血主側=供血者血球＋受血者血清不凝集;血品前後只用0.9%食鹽水(勿葡萄糖致溶血、勿林格氏含鈣成塊);冷藏血回溫≤30分；最初15分20~40滴/分；每單位≤4小時；加壓≤300 mmHg；加溫器≤40°C。","options":{"A":"含1(捐血者姓名)不符。","B":"含1、5不符。","C":"正確(本題答案,234)。血型、血液成分、有效日期。","D":"含5不符。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"113180-N2-16":{"quick":"輸血最初15分滴速宜「慢(20~40 gtts/min)」非60~80;稱60~80為錯誤。","detail":{"background":"輸血注意:B血漿製品最好2小時內輸完(對);C加壓器壓力不高於300 mmHg(對);D輸血前後用0.9% N/S(對)。選項A「最初15分,滴速宜維持60~80 gtts/min」錯誤——輸血「最初15分鐘」應「慢速(20~40滴/分)」密切觀察有無急性反應,確認無反應後才加快,60~80過快,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。最初15分宜20~40滴/分,非60~80。","B":"正確。血漿製品2小時內輸完。","C":"正確。加壓器不高於300 mmHg。","D":"正確。輸血前後用0.9% N/S。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"114170-N2-15":{"quick":"輸血:血漿製品應在收到後儘速、最慢2小時內輸完。","detail":{"background":"輸血注意:C「血漿製品應在收到後儘速輸完,最慢2小時內輸注完畢」正確。A最初應「20~40滴/分(較慢)」觀察,但本題以C為最適當;B加壓帶壓力應「不超過300 mmHg(約)」非100~200 cmHg/400(單位與數值不當);D血品領取後「不可放護理站冰箱」(一般冰箱溫度不符血品儲存規範,應退回血庫或儘速使用)。故C正確。","options":{"A":"最初宜20~40滴/分,本題以C為最適當。","B":"加壓壓力不超過300 mmHg,選項數值不當。","C":"正確(本題答案)。血漿製品最慢2小時內輸完。","D":"血品不可放護理站一般冰箱。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"115030-N2-17":{"quick":"輸血:每單位2小時內輸完(1)、加溫器溫度38~40°C(3)→「13」。","detail":{"background":"輸血注意:1每單位血品最好在2小時內輸完(對,≤4小時);3使用輸血「加溫器」時溫度以「38~40°C」為原則(對,不可過高致溶血)。選項2「加壓器壓力>300 mmHg」錯誤(加壓不可超過300 mmHg);4(視內容)。本題官方答案「13」。核心:每單位2小時(≤4)、加溫器≤38~40°C、加壓≤300 mmHg。","options":{"A":"正確(本題答案,13)。每單位2小時內、加溫器38~40°C。","B":"含...不符。","C":"含2(加壓>300)錯。","D":"含2不符。"},"sources":["新文京《基本護理學》輸血","華杏《最新基本護理學》輸血種類與核對"]}},"101030-N2-52":{"quick":"急性溶血反應症狀=寒顫(3)、胸悶(4)→「34」。","detail":{"background":"輸血急性溶血反應(血型不合):紅血球被破壞,症狀「寒顫(3)、發燒、胸悶/胸痛(4)、頭痛、噁心、血壓『下降』、心搏『過速』、腰背痛、血紅素尿、寡尿」。選項1「心搏過『緩』」錯(是過速);2「血壓『上升』」錯(是下降)。故急性溶血反應為「34」(寒顫、胸悶)。","options":{"A":"含1(心搏過緩)、2(血壓上升)錯。","B":"含2不符。","C":"含2不符。","D":"正確(本題答案,34)。寒顫、胸悶為急性溶血反應。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"102030-N2-29":{"quick":"寒顫頭痛噁心血壓下降血尿=溶血反應。","detail":{"background":"輸血出現「寒顫、頭痛、噁心、血壓下降、血尿(血紅素尿)」=「急性溶血反應(hemolytic reaction)」(A正確,血型不合致紅血球大量破壞)。熱原反應(發冷發燒、無血尿)、過敏反應(蕁麻疹癢、無血尿)、循環負荷過重(呼吸喘水腫、無血尿)皆無「血尿」。故溶血反應(A)。","options":{"A":"正確(本題答案)。血壓下降+血尿=溶血反應。","B":"熱原反應是發冷發燒,無血尿。","C":"過敏反應是蕁麻疹癢,無血尿。","D":"循環負荷過重是呼吸喘水腫。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"102110-N2-23":{"quick":"輸PRBC出現紅疹癢、呼吸喘(過敏反應):停止輸血、以生理食鹽水維持靜脈。","detail":{"background":"輸血中出現「皮膚紅疹、癢、呼吸有點喘」=「過敏(或更嚴重)反應」,首要步驟是「停止輸血,以0.9%生理食鹽水維持靜脈通路」(D正確),再評估通知醫師(嚴重過敏給抗組織胺/腎上腺素)。A減慢續輸、B減慢給epinephrine(未先停)、C拔除靜脈注射針頭(應保留靜脈)皆不當。故停止輸血、食鹽水維持(D)。","options":{"A":"出現反應應停止,非減慢續輸。","B":"應先停止輸血,且未保留靜脈。","C":"應保留靜脈,非拔除針頭。","D":"正確(本題答案)。停止輸血、以生理食鹽水維持靜脈。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"104030-N2-25":{"quick":"急性溶血反應「不」包括皮膚紅疹癢(那是過敏反應);稱紅疹癢為溶血徵象為錯誤。","detail":{"background":"急性溶血反應徵象:B發燒、寒顫、C呼吸困難、頭痛、D低血壓、心搏過速、腰背痛、血紅素尿。選項A「皮膚出現紅疹、癢」不是溶血反應的徵象(本題答案)——「紅疹、癢、蕁麻疹」是「過敏反應」的表現;溶血反應以發燒寒顫、血尿、低血壓為主。故不是溶血徵象者為紅疹癢(A)。","options":{"A":"正確(本題答案)。紅疹癢是過敏反應,非溶血反應。","B":"發燒寒顫是溶血反應。","C":"呼吸困難頭痛是溶血反應。","D":"低血壓心搏過速是溶血反應。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"104030-N2-26":{"quick":"溶血反應最首要步驟=停止輸血,以生理食鹽水維持靜脈通暢。","detail":{"background":"輸血發生急性溶血反應,「最首要(立即)」步驟是「停止輸血,並以0.9%生理食鹽水維持靜脈通暢」(D正確)——先阻止更多不合血進入,保留靜脈以利急救給藥。之後才「通知醫師與血庫(A)、測量生命徵象(B)、調慢滴數(C)」。故D最首要。輸血反應:急性溶血(血型不合,早發、寒顫發燒腰背痛血紅素尿低血壓無尿,最嚴重)、過敏(蕁麻疹癢、呼吸困難)、熱原(發冷發燒)、循環負荷過量(血壓上升肺水腫頸靜脈怒張)。處置一律:立即停止輸血、保留靜脈以0.9%食鹽水維持、通知醫師血庫送檢,不可拔除靜脈針。","options":{"A":"通知醫師血庫是後續,非最首要。","B":"測量生命徵象是後續。","C":"應停止非調慢。","D":"正確(本題答案)。立即停止輸血、食鹽水維持靜脈。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"104100-N2-21":{"quick":"輸血血型不合導致急性溶血反應。","detail":{"background":"輸血若「血型不合(ABO不相容)」,受血者血清中的抗體攻擊供血者紅血球,造成大量紅血球破壞,即「急性溶血反應(acute hemolytic reaction)」(B正確,寒顫發燒、腰背痛、血紅素尿、低血壓、急性腎衰竭,最嚴重致命)。過敏反應(血漿蛋白)、栓塞、循環過荷皆非血型不合直接所致。故急性溶血反應(B)。","options":{"A":"過敏反應是對血漿蛋白,非血型不合。","B":"正確(本題答案)。血型不合致急性溶血反應。","C":"栓塞非血型不合所致。","D":"循環過荷是輸液過量。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"106030-N2-25":{"quick":"輸血5~15分寒顫心搏過速呼吸困難血壓下降無尿=急性溶血反應。","detail":{"background":"輸血「最初5~15分鐘」即出現「寒顫、心搏過速、呼吸困難、血壓下降、無尿」=「急性溶血反應」(C正確,血型不合,發生快、最嚴重,無尿/血紅素尿是腎受損)。過敏反應(蕁麻疹癢)、熱原反應(發冷發燒、無休克無尿)、循環負荷過重(呼吸喘水腫、血壓上升)皆非。故急性溶血反應(C)。","options":{"A":"過敏反應是蕁麻疹癢。","B":"熱原反應是發冷發燒,無休克無尿。","C":"正確(本題答案)。早發+血壓下降無尿=急性溶血反應。","D":"循環負荷過重是血壓上升、水腫。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"107110-N2-21":{"quick":"早產兒輸血10分鐘出現反應:停止輸血、以0.9% NaCl維持靜脈通暢。","detail":{"background":"早產兒輸血後10分鐘出現反應(疑急性溶血/輸血反應),首要處置是「立即停止輸血,以0.9% NaCl(生理食鹽水)維持靜脈通暢」(C正確),保留輸血裝置與檢體送檢、通知醫師。A保留裝置採血送檢(是後續)、B請醫師開藥(未先停)、D記錄輸出入量(非首要)。故停止輸血、食鹽水維持(C)。","options":{"A":"保留裝置採血是後續,非最首要。","B":"應先停止輸血,非先請醫師開藥。","C":"正確(本題答案)。停止輸血、0.9% NaCl維持靜脈。","D":"記錄輸出入量非首要。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"107110-N2-22":{"quick":"早產兒輸血10分鐘出現反應=急性溶血反應。","detail":{"background":"承上題,輸血後「10分鐘(早發)」即出現反應,最可能是「急性溶血反應(acute hemolytic reaction)」(B正確,血型不合,發生最快最嚴重)。過敏反應(蕁麻疹)、類過敏(IgA缺乏)、延遲性溶血(數天後)皆非「10分鐘早發+嚴重」典型。故急性溶血反應(B)。","options":{"A":"過敏反應是蕁麻疹癢。","B":"正確(本題答案)。10分鐘早發=急性溶血反應。","C":"類過敏是IgA缺乏者。","D":"延遲性溶血是數天後。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"111030-N2-24":{"quick":"輸血15分鐘出現頭痛寒顫發燒呼吸困難低血壓(溶血/嚴重反應):立即停止輸血、生理鹽水維持靜脈。","detail":{"background":"輸PRBC開始15分鐘出現「頭痛、寒顫、發燒、呼吸困難、低血壓」(嚴重輸血反應/溶血),首要處置是「立即停止輸血,以生理鹽水維持靜脈通暢」(A正確),再測生命徵象、通知醫師血庫、送檢。B調慢滴速(應停止)、C抽血培養(後續)、D調高床頭給氧(後續支持)皆非最首要。故立即停止輸血(A)。","options":{"A":"正確(本題答案)。立即停止輸血、生理鹽水維持靜脈。","B":"應停止輸血,非調慢滴速。","C":"抽血培養是後續。","D":"調高床頭給氧是後續支持。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"112030-N2-24":{"quick":"輸血過敏性休克「非」輸血1週後發生(是輸血中/數分鐘內);稱1週後為錯誤。","detail":{"background":"輸血引起「過敏性休克反應」:B低血壓、C嘔吐、D蕁麻疹——皆為過敏反應徵象。選項A「輸血1週後發生」錯誤——過敏性(嚴重過敏/anaphylaxis)反應是「輸血中或開始數分鐘~數十分鐘內」即發生(立即型過敏),非1週後(1週後是「延遲性溶血反應」),故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。過敏性休克是輸血中即發,非1週後。","B":"正確。過敏可致低血壓。","C":"正確。過敏可致嘔吐。","D":"正確。過敏可致蕁麻疹。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"113030-N2-18":{"quick":"輸血中皮膚癢紅疹鼻塞呼吸困難=過敏反應。","detail":{"background":"輸血中出現「皮膚癢、紅疹、鼻塞及呼吸困難」=「過敏反應(allergic reaction)」(B正確,對供血者血漿蛋白過敏,輕者蕁麻疹、重者支氣管痙攣/過敏性休克)。熱原反應(發冷發燒)、溶血反應(血尿低血壓)、肺栓塞反應皆非「皮膚癢紅疹」典型。故過敏反應(B)。","options":{"A":"熱原反應是發冷發燒。","B":"正確(本題答案)。皮膚癢紅疹=過敏反應。","C":"溶血反應是血尿低血壓。","D":"肺栓塞非皮膚癢紅疹典型。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"113100-N2-16":{"quick":"輸血時咳嗽心搏過速高血壓呼吸困難=循環負荷過量。","detail":{"background":"輸血中出現「咳嗽、心搏過速、『高血壓』、呼吸困難(肺水腫)」=「循環負荷過量(circulatory overload)」(B正確,輸血過快過多致血容量驟增、肺水腫;特徵是『血壓上升』、頸靜脈怒張)。溶血反應(血壓「下降」)、過敏(蕁麻疹)、熱原(發冷發燒)皆非「高血壓+肺水腫」。故循環負荷過量(B)。","options":{"A":"溶血反應血壓下降,非高血壓。","B":"正確(本題答案)。高血壓+呼吸困難=循環負荷過量。","C":"過敏性反應是蕁麻疹癢。","D":"熱原反應是發冷發燒。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"113180-N2-15":{"quick":"循環負荷過量症狀=水腫(1)、呼吸困難(4)、頸靜脈怒張(5)→「145」。","detail":{"background":"循環負荷過量(輸液過量)症狀:1水腫、4呼吸困難(肺水腫)、5頸靜脈怒張、血壓「上升」、洪脈、咳泡沫痰。選項2「皮膚起紅疹」是「過敏反應」(非循環負荷);3「血壓下降」錯(循環負荷是血壓『上升』)。故循環負荷過量為「145」。輸血反應:急性溶血(血型不合,早發、寒顫發燒腰背痛血紅素尿低血壓無尿,最嚴重)、過敏(蕁麻疹癢、呼吸困難)、熱原(發冷發燒)、循環負荷過量(血壓上升肺水腫頸靜脈怒張)。處置一律:立即停止輸血、保留靜脈以0.9%食鹽水維持、通知醫師血庫送檢,不可拔除靜脈針。","options":{"A":"含2(紅疹屬過敏)、3(血壓下降)不符。","B":"含2、3不符。","C":"含3不符。","D":"正確(本題答案,145)。水腫、呼吸困難、頸靜脈怒張。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}},"112110-N2-24":{"quick":"輸FFP出現頭暈呼吸困難血壓下降:立刻停止輸血、以0.9% N/S維持靜脈通暢。","detail":{"background":"張女士術後輸FFP過程出現「頭暈、呼吸困難、血壓下降」(嚴重輸血反應/過敏性休克),最適當的立即處置是「立刻停止輸血,並使用0.9% N/S(生理食鹽水)維持靜脈輸液管路通暢」(D正確),再通知醫師急救。A當正常持續輸血、B減慢滴速跑回護理站、C減慢滴速給利尿劑——皆未先停止輸血,延誤處置。故立刻停止輸血、食鹽水維持(D)。","options":{"A":"頭暈呼吸困難非正常,不可持續輸血。","B":"應立即停止,非減慢滴速且離開。","C":"應停止輸血,非減慢滴速續輸。","D":"正確(本題答案)。立刻停止輸血、0.9% N/S維持靜脈。"},"sources":["新文京《基本護理學》輸血反應","華杏《最新基本護理學》輸血合併症"]}}},TO=["1體液與水分平衡", "2電解質異常(鈉鉀鈣鎂)", "3酸鹼平衡血液氣體分析與呼吸型態", "4靜脈輸液溶液張力與適應症", "5靜脈注射技術部位選擇與輸液合併症", "6輸血種類與核對", "7輸血反應"],LEC={"1體液與水分平衡":{"html":"\n<p><b>體液調節:</b><b>ADH(抗利尿激素)</b>=血漿滲透壓升高/血量減少時分泌、腎集尿管保水;<b>醛固酮(留鹽激素)</b>=腎上腺皮質分泌、作用於<b>遠曲小管/集尿管</b>促「留鈉排鉀」、保水升血壓。</p>\n<p><b>脫水(體液容積缺失):</b>口渴、皮膚黏膜乾、眼窩凹陷、哭無淚、<b>尿少且尿比重>1.030</b>、血鈉升高;生命徵象=體溫升、脈搏弱而快、呼吸增、<b>血壓下降</b>;ADH與醛固酮↑。</p>\n<p><b>體液容積過多:</b>水腫、<b>頸靜脈怒張、洪脈、呼吸短促(肺水腫)、血壓上升</b>、體重增。</p>\n<p><b>無感性水分喪失:</b>經皮膚與呼吸道蒸發(無法察覺);<b>發燒、呼吸短促</b>增加;腹瀉/利尿是「可感」流失。GAS壓力反應:警覺期(交感興奮心跳快口乾冒汗)→抵抗期→耗竭期。</p>\n"},"2電解質異常(鈉鉀鈣鎂)":{"html":"\n<p><b>正常值:</b>鉀(K)3.5~5.0、鈉(Na)135~145、鈣(Ca)4.5~5.5(或8.5~10.5 mg/dL)、鎂(Mg)1.5~2.5 mEq/L。</p>\n<p><b>鉀:</b><b>低血鉀</b>(嘔吐、腹瀉、排鉀利尿劑Lasix)→肌無力、腸蠕動減、心律不整;<b>高血鉀</b>→心律不整、深部反射改變。排鉀利尿者須<b>補鉀</b>;<b>甘草</b>類醛固酮作用致低血鉀、增毛地黃毒性。共同症狀:噁心、心律不整。</p>\n<p><b>鈉:</b>高血鈉(水不足)→皮膚黏膜乾、躁動;低血鈉(嘔吐/水過多)。<b>鈣:</b>長期臥床骨鈣釋出致高血鈣;大量輸血枸櫞酸結合鈣致低血鈣。鈉功能=滲透壓、神經肌肉傳導、心肌收縮(非轉換碳水為熱能)。</p>\n<p><b>礦物質:</b>構成骨骼牙齒=鈣、磷、鎂。緩衝系統=重碳酸鹽/磷酸鹽/蛋白質(氯化鈉非緩衝)。</p>\n"},"3酸鹼平衡血液氣體分析與呼吸型態":{"html":"\n<p><b>判讀口訣:</b>看 pH(<7.35酸/>7.45鹼)→看 PaCO2(呼吸)與 HCO3(代謝)。<b>pH與PaCO2「反向」=呼吸性</b>;<b>pH與HCO3「同向」=代謝性</b>。</p>\n<p><b>四型成因:</b><b>呼吸性酸中毒</b>=CO2滯留(COPD、嗎啡抑制呼吸);<b>呼吸性鹼中毒</b>=換氣過度(深快呼吸、CO2排太多);<b>代謝性酸中毒</b>=腹瀉失HCO3、DKA、尿毒(代償:Kussmaul深快呼吸);<b>代謝性鹼中毒</b>=嘔吐失胃酸、大量輸血(枸櫞酸)。</p>\n<p><b>呼吸型態:</b>庫斯毛耳(深快,代謝性酸中毒)、陳施氏(漸深漸淺週期)、畢歐氏(不規則)、換氣過度(深快)、換氣不足(CO2滯留)。<b>顱內壓上升</b>→呼吸變慢、體溫升(Cushing三徵:血壓升、心搏緩、呼吸慢)。緩衝系統=重碳酸鹽/磷酸鹽/蛋白質。</p>\n"},"4靜脈輸液溶液張力與適應症":{"html":"\n<p><b>低張溶液</b>(0.45%、0.33%食鹽水、2.5%葡萄糖):水分移入細胞、補細胞內水;適用<b>脫水、尿崩症、高血鈉</b>;大量輸注致<b>水中毒</b>;<b>禁用於腦損傷/顱內壓高</b>(加重腦水腫)。</p>\n<p><b>等張溶液</b>(0.9%食鹽水、乳酸鹽林格氏、D5W輸入時):補細胞外液/血容量;<b>5%葡萄糖輸入時等張、代謝後成低張</b>;林格氏含乳酸經肝代謝(肝病慎用)。</p>\n<p><b>高張溶液</b>(3%食鹽水、10%以上葡萄糖、12.5%葡萄糖、D5S):降腦水腫/補熱量;須由中心靜脈或較大靜脈給(周邊易靜脈炎)。</p>\n<p><b>輸血只能配0.9%食鹽水</b>:勿用葡萄糖(致紅血球凝集溶血)、勿用林格氏(含鈣與抗凝劑成血塊)。</p>\n"},"5靜脈注射技術部位選擇與輸液合併症":{"html":"\n<p><b>部位選擇:</b>由<b>上肢遠端往近端</b>選、保留近心血管;避開關節處(彎曲影響);長期/大量選<b>前臂副頭、貴要靜脈</b>;嬰兒選頭皮手背足背;TPN(高張)須中心靜脈;留置針退針芯前按壓穿刺部位「前端(近心)血管」防漏血。</p>\n<p><b>滴速</b>=總量×滴系數÷時間(分),精密60 gtt/mL、普通15~20 gtt/mL。</p>\n<p><b>合併症:</b><b>浸潤</b>(腫脹、冰冷、壓痛、無回血、滴慢)→停止移除、另選部位;<b>靜脈炎</b>(沿靜脈紅腫熱痛)→更換部位、不可按摩;<b>循環負荷過量</b>→調慢流速、抬高頭部、給氧;<b>管路阻塞無回血</b>→拔除重打,<b>勿沖擠凝血塊</b>(致栓塞);畏寒(發熱反應)→停止、保暖、通知醫師。</p>\n"},"6輸血種類與核對":{"html":"\n<p><b>血品:</b>全血(大失血)、濃縮紅血球PRBC(增攜氧,每單位升Hb約1 g/dL)、新鮮冷凍血漿FFP(凝血因子,35~37°C回溫、勿再冷凍)、血小板(止血)、白蛋白(增膠體滲透壓)。</p>\n<p><b>雙重核對(二人):</b>病人姓名、病歷號、<b>血型Rh、血品名稱成分、血袋號碼、有效期、外觀</b>;<u>不核對捐血者姓名</u>;床邊再確認病人。<b>交叉配血主側</b>=供血者血球＋受血者血清不凝集。</p>\n<p><b>輸血操作:</b>輸PRBC前須<b>血液交叉測試</b>;前後與同管路<b>只用0.9%食鹽水</b>;18~20G粗針;冷藏血回溫<b>≤30分</b>;最初10~15分<b>20~40滴/分</b>慢速觀察;每單位<b>≤4小時</b>;加壓<b>≤300 mmHg</b>;加溫器<b>≤38~40°C</b>;過期血丟棄不可消毒再用。</p>\n"},"7輸血反應":{"html":"\n<p><b>急性溶血反應</b>(血型不合,最嚴重):輸血<b>早發(數~15分鐘)</b>,寒顫、發燒、腰背痛、胸悶、<b>血紅素尿、低血壓、心搏過速、無尿</b>;ABO不相容致紅血球大量破壞、急性腎衰竭。</p>\n<p><b>過敏反應</b>:對血漿蛋白過敏,<b>蕁麻疹、紅疹、癢、鼻塞、呼吸困難</b>,重者過敏性休克。<b>熱原反應</b>:發冷、發燒(無血尿無休克)。<b>循環負荷過量</b>:輸太快太多,<b>血壓上升、頸靜脈怒張、咳嗽、肺水腫呼吸困難</b>。延遲性溶血=數天後。</p>\n<p><b>處置(一律):</b><b>立即停止輸血→保留靜脈、改0.9%生理食鹽水維持→測生命徵象→通知醫師與血庫→保留血袋與檢體送檢</b>;<u>不可拔除靜脈針</u>(留作急救給藥)。過敏給抗組織胺/腎上腺素;循環負荷過量調慢流速抬高頭部給氧利尿。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_b6_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
