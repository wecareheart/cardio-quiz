性","B":"有高尿酸血症的人大部分都會有痛風","C":"好發於肢體近端大關節","D":"可能造成腎臟病變的併發症"},"img":""},{"id":"114170-N1-30","code":"114170","roc":"114","cat":"N1","catname":"基礎醫學","num":30,"stem":"下列何種疾病是因為FGFR3 基因突變而造成侏儒症(dwarfism)?","opts":{"A":"軟骨發育不全(achondroplasia)","B":"纖維性發育不良(fibrous dysplasia)","C":"佝僂病(rickets)","D":"先天性成骨不全症(osteogenesis imperfecta)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"disc":"path","topic":"B15神經肌肉骨骼皮膚病理","q_num":30,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"軟骨發育不全(achondroplasia)","B":"纖維性發育不良(fibrous dysplasia)","C":"佝僂病(rickets)","D":"先天性成骨不全症(osteogenesis imperfecta)"},"img":""}],E={"102030-N1-36":{"quick":"凋亡（apoptosis）由粒線體釋出細胞色素c啟動內在路徑，故與粒線體最相關，選D。","detail":{"background":"細胞死亡分壞死（necrosis，被動、發炎反應）與凋亡（apoptosis，程序性、不引發發炎）。凋亡有兩條啟動路徑：①內在（粒線體）路徑——細胞壓力使粒線體外膜通透化（受Bcl-2家族調控），釋出細胞色素c（cytochrome c）到細胞質，與Apaf-1組成凋亡體（apoptosome）活化caspase-9→執行型caspase；②外在（死亡受體）路徑——Fas/TNF受體活化caspase-8。故與凋亡「最相關」的胞器是粒線體。凋亡形態：細胞皺縮、染色質濃縮、凋亡小體形成、被吞噬而不滲漏，不引起發炎。","options":{"A":"內質網與蛋白摺疊/鈣儲存有關，非凋亡啟動核心胞器。","B":"高爾基體管修飾包裝，非凋亡核心。","C":"溶酶體與壞死/自噬較相關，非凋亡的啟動樞紐。","D":"正確：粒線體釋細胞色素c啟動內在凋亡路徑。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-33":{"quick":"細胞腫脹（cellular swelling）是可逆性損傷，故選A。","detail":{"background":"細胞損傷分可逆與不可逆。可逆性變化：①細胞腫脹（cellular/hydropic swelling，因ATP不足使Na幫浦失能、鈉水內流，是最早、最常見的可逆變化）；②脂肪變性（fatty change）；粒線體腫脹、內質網擴張、膜泡狀凸出皆屬可逆。不可逆變化的標誌是「細胞核改變」三部曲：核濃縮（pyknosis，染色質濃縮深染）→核崩裂（karyorrhexis，核碎裂）→核溶解（karyolysis，核淡化消失），以及粒線體出現緻密體、膜嚴重破裂。故選項中唯一可逆者為細胞腫脹（A）；B、C、D皆為不可逆的核變化。","options":{"A":"正確：細胞腫脹是最早的可逆性損傷。","B":"核濃縮是不可逆損傷（細胞死亡）的核變化。","C":"核崩裂是不可逆的核變化。","D":"核溶解是不可逆的核變化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-34":{"quick":"澱粉樣變性病（amyloidosis）是異常蛋白質沉積於細胞「外」，故選D。","detail":{"background":"類澱粉（amyloid）是一群錯誤摺疊成β褶板（β-pleated sheet）結構的蛋白質，沉積在「細胞外」組織間質，造成器官結構與功能破壞。其與澱粉無關（名稱來自染色反應），化學本質是蛋白質。種類：AL型（免疫球蛋白輕鏈，見於多發性骨髓瘤）、AA型（血清類澱粉A，見於慢性發炎）、Aβ（阿茲海默）、甲狀腺髓質癌的降鈣素源型等。沉積於腎、心、肝、神經等致器官衰竭。故澱粉樣變性＝細胞外蛋白質堆積（D）。","options":{"A":"細胞內澱粉堆積是肝醣儲積等，非amyloid。","B":"細胞內脂肪堆積是脂肪變性。","C":"細胞外水分堆積是水腫。","D":"正確：amyloidosis是細胞外異常蛋白質沉積。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-34":{"quick":"濁腫（cloudy swelling）最不易出現在「肺臟」，故選D。","detail":{"background":"濁腫（cloudy swelling，混濁腫脹）是細胞可逆性損傷的早期表現，因缺氧或中毒使ATP減少、鈉幫浦失能、細胞內水分增加而腫脹混濁，好發於「代謝旺盛、富粒線體」的實質器官——心肌、肝、腎小管上皮細胞最常見。肺臟為含氣的氣體交換器官、實質細胞代謝型態不同，最不易出現典型的濁腫。故選D（肺臟）。","options":{"A":"心臟代謝旺盛，易見濁腫。","B":"肝臟易見濁腫。","C":"腎小管上皮易見濁腫。","D":"正確：肺臟最不易出現濁腫。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-38":{"quick":"證明類澱粉（amyloid）最常用「剛果紅（Congo red）」染色，故選B。","detail":{"background":"類澱粉的特殊染色是「剛果紅（Congo red）」——染後在偏光顯微鏡下呈現特徵性的「蘋果綠雙折射（apple-green birefringence）」，是診斷amyloidosis的金標準。H&E是一般組織常規染色（amyloid呈無定形粉紅）；鍍銀染色用於基底膜、網狀纖維、真菌、螺旋體；抗酸染色（acid fast，Ziehl-Neelsen）用於結核分枝桿菌等抗酸菌。故證明amyloid用剛果紅（B）。","options":{"A":"H&E是常規染色，不能特異證明amyloid。","B":"正確：剛果紅染色＋偏光下蘋果綠雙折射證明amyloid。","C":"鍍銀染色用於基底膜/真菌/螺旋體。","D":"抗酸染色用於結核菌等抗酸菌。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-33":{"quick":"「細胞核崩裂」是不可逆損傷，故選D。","detail":{"background":"可逆性細胞損傷的形態：細胞膜泡狀凸出（blebbing，A）、粒線體腫脹（B）、內質網擴張（C）、核糖體脫落、細胞腫脹、脂肪變性，去除刺激後可回復。不可逆損傷的標誌是嚴重膜破壞與「核變化」——核濃縮、核崩裂（karyorrhexis，D）、核溶解，以及粒線體緻密體形成。故D（細胞核崩裂）屬不可逆，是答案（題問「不是可逆性」）。","options":{"A":"細胞膜泡狀凸出是可逆變化。","B":"粒線體腫脹是可逆變化。","C":"內質網擴張是可逆變化。","D":"正確：細胞核崩裂是不可逆損傷。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-41":{"quick":"脂肪變性（fatty change）是可逆性損傷，故選A。","detail":{"background":"脂肪變性（fatty change/steatosis）是細胞內三酸甘油脂異常堆積，常見於肝（酒精、肥胖、毒素），屬「可逆性」損傷，去除病因可回復。對比B溶酶體破裂（釋出水解酶造成自我消化）、C核溶解、D核破裂皆為不可逆損傷的特徵。故可逆者選A。脂肪變性的機轉包括脂肪酸進入增加、脂蛋白輸出障礙、三酸甘油脂合成增加等。","options":{"A":"正確：脂肪變性是可逆性損傷。","B":"溶酶體破裂釋水解酶，屬不可逆損傷。","C":"核溶解是不可逆損傷。","D":"核破裂是不可逆損傷。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-33":{"quick":"細胞壞死時核變化「最早」出現核濃縮（pyknosis），故選A。","detail":{"background":"細胞壞死的核變化呈時序三部曲：①核濃縮（pyknosis，最早，染色質凝聚、核縮小深染）→②核崩裂（karyorrhexis，核碎裂成片）→③核溶解（karyolysis，DNA酶分解使核淡化消失）。胞膜破裂則伴隨整個壞死過程使內容物外漏引發發炎。題問「最早」出現者為核濃縮（A）。","options":{"A":"正確：核濃縮（pyknosis）是壞死核變化最早出現者。","B":"核破裂（karyorrhexis）是第二步。","C":"核溶解（karyolysis）是第三步。","D":"胞膜破裂伴隨壞死全程，非「最早的核變化」。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-33":{"quick":"發炎時與「疼痛」最相關的化學媒介物是緩激肽（bradykinin），故選B。","detail":{"background":"發炎五大徵象（紅腫熱痛及功能喪失）由不同化學媒介介導。與「疼痛」最相關者是緩激肽（bradykinin，激肽系統產物，直接刺激痛覺神經末梢），前列腺素（PGE2）也使痛覺受器敏感化。組織胺（histamine）主管血管擴張與通透性增加（早期紅腫）；趨化激素（chemokine）負責白血球趨化；血清素（serotonin）類似組織胺作用於血管。故疼痛選緩激肽（B）。","options":{"A":"組織胺主管血管擴張與通透性，非主要致痛。","B":"正確：緩激肽是發炎致痛的主要媒介。","C":"趨化激素負責白血球趨化。","D":"血清素作用於血管，非主要致痛。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-34":{"quick":"急性發炎膿瘍的主要發炎細胞是「嗜中性白血球」，故選C。","detail":{"background":"急性發炎以「嗜中性白血球（neutrophil，多形核白血球）」為主，是最先抵達、數量最多的發炎細胞，吞噬病原並形成膿（pus，即死亡的嗜中性球、組織碎屑與病菌），膿瘍（abscess）即局限性化膿。慢性發炎則以淋巴球、漿細胞、巨噬細胞為主。嗜伊紅性白血球與過敏、寄生蟲感染相關。故膿瘍主要細胞為嗜中性白血球（C）。","options":{"A":"淋巴球主導慢性發炎。","B":"漿細胞見於慢性發炎。","C":"正確：膿瘍以嗜中性白血球為主。","D":"嗜伊紅性球與過敏/寄生蟲相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-33":{"quick":"慢性發炎病灶中出現機會「最少」的是嗜中性白血球，故選C。","detail":{"background":"慢性發炎以「單核細胞浸潤」為特徵：巨噬細胞（主角）、淋巴球、漿細胞，並有組織破壞與纖維修復、血管新生。嗜中性白血球（neutrophil）是「急性」發炎的主角，在慢性發炎中出現機會最少（除非急性發作或化膿性慢性感染）。嗜伊紅性球可見於寄生蟲與過敏相關的慢性發炎。故慢性發炎最少見者為嗜中性白血球（C）。","options":{"A":"淋巴球是慢性發炎常見細胞。","B":"漿細胞是慢性發炎常見細胞。","C":"正確：嗜中性白血球是急性發炎主角，慢性最少見。","D":"嗜伊紅性球可見於慢性過敏/寄生蟲發炎。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-42":{"quick":"「吞噬（phagocytosis）」不屬於白血球外滲（extravasation）的步驟，故選D。","detail":{"background":"白血球外滲（leukocyte extravasation，自血管進入組織）的步驟依序為：①著邊（margination）與滾動（rolling，selectin介導）→②穩固黏著（adhesion，integrin與ICAM介導）→③穿越內皮（transmigration/diapedesis）→④沿趨化梯度移行（chemotaxis）到病灶。而「吞噬（phagocytosis）」是白血球「到達組織後」清除病原的步驟，不屬於「外滲」過程本身。故選D。","options":{"A":"著邊是外滲第一步。","B":"黏著是外滲步驟。","C":"穿越內皮是外滲步驟。","D":"正確：吞噬發生於外滲之後，不屬外滲步驟。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-33":{"quick":"白血球外滲「最先」發生的是著邊（margination），故選C。","detail":{"background":"急性發炎血管通透性增加、血流變慢，白血球從血流中央移向血管壁邊緣＝「著邊（margination）」與鋪道，這是外滲的第一步；接著經selectin介導「滾動」、integrin介導「穩固黏著」、「穿越內皮（transmigration）」、最後沿趨化因子「移行（migration/chemotaxis）」到病灶。故最先發生者為著邊（C）。","options":{"A":"鋪道（pavementing）伴隨著邊，但題給標準答案為著邊先。","B":"移行是後期步驟。","C":"正確：著邊（margination）最先發生。","D":"穿越內皮在黏著之後。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-33":{"quick":"不屬於典型慢性發炎浸潤細胞的是嗜中性白血球，故選A。","detail":{"background":"慢性發炎的浸潤細胞是「單核細胞系」：巨噬細胞（macrophage，核心）、淋巴球（lymphocyte）、漿細胞（plasma cell），有時嗜伊紅性球。嗜中性白血球（neutrophil，多形核）是「急性」發炎的標誌細胞，不屬典型慢性發炎浸潤細胞。故選A。","options":{"A":"正確：嗜中性白血球是急性發炎細胞，非慢性。","B":"巨噬細胞是慢性發炎核心。","C":"淋巴球是慢性發炎細胞。","D":"漿細胞是慢性發炎細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-40":{"quick":"最可能延緩傷口癒合的是「使用類固醇藥物」，故選D。","detail":{"background":"影響傷口癒合的因素：促進癒合者包括良好對合（縫合）、清潔、控制感染、充足營養（蛋白質、維生素C、鋅）、良好血流。延緩癒合者：感染（最常見）、類固醇（糖皮質素抑制發炎、抑制膠原合成與纖維母細胞、延緩癒合）、糖尿病、營養不良（缺維生素C致膠原交聯不良）、缺氧/血流不足、異物、放射線、高齡。故選項中延緩癒合者為類固醇（D）；縫合、清潔、抗生素皆有助癒合。","options":{"A":"縫合對合傷口有助癒合。","B":"維持清潔有助癒合。","C":"使用抗生素控制感染有助癒合。","D":"正確：類固醇抑制發炎與膠原合成，延緩傷口癒合。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-38":{"quick":"與微血管性血管瘤相似、有大量微血管增生的是化膿性肉芽腫（pyogenic granuloma），故選A。","detail":{"background":"化膿性肉芽腫（pyogenic granuloma，又稱小葉性微血管瘤lobular capillary hemangioma）其實是一種微血管增生的病灶（名稱誤導，非真正化膿或肉芽腫），由大量增生的微血管組成，與微血管性血管瘤組織學相似，常見於皮膚黏膜外傷或孕婦牙齦，易出血。囊性水瘤（cystic hygroma）是淋巴管畸形；血管球瘤（glomus tumor）來自血管球體（疼痛性甲下小瘤）；蜘蛛網血管擴張（spider telangiectasia）是中央小動脈擴張（見於肝病/雌激素）。故選A。","options":{"A":"正確：化膿性肉芽腫是微血管大量增生，與微血管瘤相似。","B":"囊性水瘤是淋巴管畸形。","C":"血管球瘤來自血管球體。","D":"蜘蛛網血管擴張是中央小動脈擴張病灶。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-25":{"quick":"發炎導致組織「表面」壞死稱為潰瘍（ulcer），故選B。","detail":{"background":"發炎相關名詞：①潰瘍（ulcer）——組織「表面」（上皮/黏膜）局部壞死脫落形成的缺損（如胃潰瘍、壓瘡），為表面壞死（B正確）；②膿瘍（abscess）——組織內局限性化膿性壞死腔；③肉芽腫（granuloma）——巨噬細胞（類上皮細胞）聚集的慢性發炎；④蟹足腫（keloid）——傷口癒合時膠原過度增生。故表面壞死＝潰瘍（B）。","options":{"A":"膿瘍是組織內局限化膿腔，非表面壞死。","B":"正確：潰瘍是組織表面壞死脫落形成的缺損。","C":"肉芽腫是慢性發炎巨噬細胞聚集。","D":"蟹足腫是膠原過度增生的疤痕。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-21":{"quick":"急性發炎正確敘述為C：受損組織分泌的緩激肽與痛覺有關，故選C。","detail":{"background":"逐項：A急性發炎主要白血球是「嗜中性白血球」而非嗜酸性球（錯）；B血管通透性增加時滲出的是富含蛋白與細胞的「滲出液（exudate）」而非「漏出液（transudate，蛋白少、見於靜水壓變化）」（錯）；C緩激肽（bradykinin）刺激痛覺神經末梢，與發炎疼痛有關（正確）；D造成血管舒張的主要媒介是「組織胺、一氧化氮、前列腺素」，介白素-1（IL-1）主要是致發熱與內皮活化的細胞激素，非血管舒張主角（錯）。故選C。","options":{"A":"急性發炎主要白血球是嗜中性球，非嗜酸性球。","B":"通透性增加滲出的是滲出液（exudate），非漏出液。","C":"正確：緩激肽與發炎疼痛有關。","D":"血管舒張主媒介是組織胺/NO/前列腺素，非IL-1。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114100-N1-21":{"quick":"帶狀疱疹水泡的發炎形式（病毒性、漿液性水泡）與其他三者（化膿性）最不同，故選D。","detail":{"background":"膿胸（empyema，胸腔積膿）、急性闌尾炎、膿瘍三者皆為「化膿性（嗜中性球為主）」發炎；而帶狀疱疹（varicella-zoster virus）引起的水泡是「病毒性發炎」，表現為表皮內水泡、氣球樣變性與多核巨細胞、淋巴球浸潤，屬漿液性/病毒性發炎，與前三者的化膿性發炎形式最不相同。故選D。","options":{"A":"膿胸是化膿性發炎。","B":"急性闌尾炎是化膿性發炎。","C":"膿瘍是化膿性發炎。","D":"正確：帶狀疱疹水泡是病毒性發炎，與化膿性不同。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-34":{"quick":"肝臟鬱血與「心」功能不佳最相關，故選B。","detail":{"background":"肝臟鬱血（congestion）最常因「右心衰竭」或全心衰竭，使體循環靜脈回流受阻、血液淤積於肝靜脈與肝竇，造成肝中央靜脈周圍鬱血、長期形成「肉荳蔻肝（nutmeg liver）」（中央區暗紅鬱血、周邊脂肪變性的斑駁外觀），嚴重者中央區出血壞死、心源性肝硬化。故肝鬱血與心功能不佳最相關（B）。","options":{"A":"腦功能與肝鬱血無直接關係。","B":"正確：右心/全心衰竭致肝鬱血（肉荳蔻肝）。","C":"胃與肝鬱血無直接因果。","D":"腎功能與肝鬱血非直接相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-33":{"quick":"產後突發呼吸困難、發紺、休克合併瀰漫性出血，最可能是羊水栓塞（amniotic fluid embolism），故選B。","detail":{"background":"羊水栓塞是產科急症：分娩時羊水（含胎兒細胞、胎脂、胎糞）進入母體循環，栓塞肺血管並引發過敏樣反應與瀰漫性血管內凝血（DIC）。臨床突發呼吸困難、發紺、低血壓休克、抽搐，並因DIC出現皮下與全身出血——本題「肺水腫＋皮下出血」正是DIC表現。死亡率高。對比產後出血（A為失血性休克但無栓塞肺水腫）、敗血性休克（感染病程）、電解質異常皆不符這組合。故選B。","options":{"A":"電解質異常不致此急性栓塞與DIC表現。","B":"正確：羊水栓塞致肺栓塞＋DIC（肺水腫、皮下出血）。","C":"產後出血是失血性休克，無此栓塞肺水腫組合。","D":"敗血性休克有感染病程，與產後即刻發作不符。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-35":{"quick":"休克缺氧傷害「最少」見於肌肉，故選A。","detail":{"background":"休克（低灌流）造成各器官缺氧性傷害，但器官對缺氧耐受度不同：腦、心、腎為「對缺氧最敏感」的器官（休克時最先受害——腦缺氧意識障礙、心內膜下梗塞、腎急性腎小管壞死）。骨骼肌相對代謝彈性較大、對缺氧耐受較佳，休克時缺氧性傷害最少見。故選A（肌肉）。","options":{"A":"正確：骨骼肌對缺氧耐受較佳，休克傷害最少。","B":"心臟對缺氧敏感，休克易受害。","C":"腎臟對缺氧敏感（ATN）。","D":"腦部對缺氧最敏感。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-35":{"quick":"肺循環血栓栓塞主要塞在「肺動脈」，故選A。","detail":{"background":"肺血栓栓塞（pulmonary thromboembolism）的栓子多來自下肢深部靜脈血栓（DVT），隨靜脈回流經右心進入肺循環，卡在「肺動脈」及其分支（大者塞主肺動脈成鞍狀栓塞致猝死，小者塞末梢分支致肺梗塞）。故主要栓塞部位為肺動脈（A）。肺靜脈、肺泡、肺淋巴管非血栓栓塞卡塞處。","options":{"A":"正確：肺血栓栓塞卡在肺動脈及其分支。","B":"肺靜脈非靜脈來源栓子的卡塞處。","C":"肺泡是氣體交換處，非血管。","D":"肺淋巴管非血栓栓塞部位。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-41":{"quick":"最不適當的敘述是B：主動充血是「小動脈」擴張引起，非小靜脈，故選B。","detail":{"background":"充血分兩型：①主動充血（hyperemia）——「小動脈擴張」使動脈血流入「增加」，組織因充滿含氧血而呈鮮紅，見於運動、發炎、發熱（A、B比較：流量增加對，但B說「小靜脈擴張」錯，應為小動脈）；②被動充血（congestion）——靜脈血液「流出受阻」使血液淤積（C對），組織因缺氧血紅蛋白累積呈藍紫色（發紺，D對）。故最不適當者為B（主動充血應是小動脈擴張）。","options":{"A":"兩型都使該部位血量增加，敘述正確。","B":"正確（為最不適當）：主動充血是小動脈擴張，非小靜脈。","C":"被動充血是靜脈流出受阻，正確。","D":"被動充血致缺氧血累積呈藍紫色，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-36":{"quick":"「血液白蛋白增加」不是血管內靜水壓上升的原因，故選A。","detail":{"background":"水腫的Starling機制：①微血管「靜水壓上升」（促液體濾出）——常因充血性心衰竭、鈉鹽滯留致血量增加、靜脈回流受阻（B、C、D皆使靜水壓上升）；②血漿「膠體滲透壓下降」（白蛋白「減少」，如腎病症候群、肝硬化、營養不良）也致水腫。題問「靜水壓上升原因」，A「白蛋白增加」與靜水壓無關（白蛋白「減少」才致水腫，且屬膠體滲透壓機制非靜水壓），故選A為例外。","options":{"A":"正確：白蛋白增加不是靜水壓上升原因（白蛋白減少屬膠體滲透壓機制）。","B":"充血性心衰竭使靜水壓上升。","C":"鈉鹽滯留增加血量、靜水壓上升。","D":"靜脈回流受阻使靜水壓上升。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-26":{"quick":"不正常血栓形成的因素「不包括」Hageman因子缺乏，故選B。","detail":{"background":"血栓形成的Virchow三要素：①內皮損傷（A，最重要）；②血流異常（鬱滯或紊亂層流，C）；③高凝血狀態（hypercoagulability，D）。Hageman因子（第XII因子）是「促進」凝血（內在路徑起始）的因子，其「缺乏」反而會延長凝血時間（aPTT延長）但弔詭地不出血（且可能因纖溶不足略增血栓，但題意取「缺乏不利凝血」）——故「Hageman因子缺乏」不是促進血栓的因素，為例外（B）。","options":{"A":"內皮損傷是Virchow三要素，促血栓。","B":"正確：Hageman（XII）因子缺乏不促進血栓，是例外。","C":"血流鬱滯/紊亂促血栓。","D":"高凝血狀態促血栓。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-22":{"quick":"心因性休克「不」會出現尿量增加，故選D。","detail":{"background":"心因性休克（cardiogenic shock，如大面積心肌梗塞）心輸出量驟降，組織灌流不足，臨床表現：低血壓（A）、代償性心跳加快而脈搏「快而弱」（B）、呼吸急促（C，肺鬱血/代謝性酸中毒代償）、皮膚濕冷發紺、意識改變，以及腎灌流不足致「尿量減少（少尿）」。故「尿量增加」不會出現，是例外（D）。","options":{"A":"低血壓是休克表現。","B":"快而弱的脈搏是休克代償表現。","C":"呼吸急促是休克表現。","D":"正確：休克致腎灌流不足、尿量減少，非增加。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-37":{"quick":"區別良性與惡性腫瘤「最重要」的特徵是「轉移（metastasis）」，故選D。","detail":{"background":"良性vs惡性腫瘤的鑑別特徵：分化、生長速度、局部侵襲、轉移。其中「轉移（metastasis）」是惡性腫瘤的「絕對」標誌——只要發生轉移，即可確定為惡性；良性腫瘤絕不轉移。侵襲性次之（良性有包膜不侵襲，惡性局部浸潤）。分化與生長速度只是傾向（惡性多分化差、生長快，但有例外）。故最重要、最可靠的鑑別是轉移（D）。","options":{"A":"分化是傾向指標，有例外。","B":"侵襲是重要特徵但轉移更具決定性。","C":"生長速度只是傾向。","D":"正確：轉移是惡性的絕對標誌（最重要）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-36":{"quick":"錯誤敘述為A：「分期（staging）」比「分級（grading）」更具預後評估價值，故選A。","detail":{"background":"腫瘤評估兩系統：①分級（grading）——依腫瘤細胞「分化程度」（與正常組織相似度、核異型、有絲分裂數）分高中低分化（B正確）；②分期（staging）——依腫瘤「侵犯範圍」（原發腫瘤大小T、淋巴結N、遠端轉移M）以TNM系統判定（C、D正確）。臨床上「分期比分級更具預後與治療指引價值」（分期反映腫瘤實際擴散程度）。題說「分級較分期更具預後價值」是錯的（A為錯誤敘述）。","options":{"A":"正確（為錯誤敘述）：分期比分級更具預後價值，非分級。","B":"分級依分化程度，正確。","C":"分期依侵犯範圍，正確。","D":"分期依TNM系統，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-38":{"quick":"腫瘤的「分化（differentiation）」是指與原本正常組織的相似程度，故選A。","detail":{"background":"分化（differentiation）指腫瘤實質細胞在形態與功能上「與正常來源組織的相似程度」：高分化（well-differentiated）＝很像正常組織（多為良性或低惡性度）；低分化/未分化（anaplastic）＝與正常組織差異大、細胞異型明顯（高惡性度）。故分化＝與正常組織相似程度（A）。有無莢膜是良惡性鑑別之一、有絲分裂數與血管供應是惡性度的其他指標，皆非「分化」的定義。","options":{"A":"正確：分化指與正常來源組織的相似程度。","B":"有無莢膜是良惡性特徵，非分化定義。","C":"有絲分裂數反映增生活性，非分化定義。","D":"血管供應非分化定義。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-36":{"quick":"與惡性腫瘤發生關係最密切的是「異生（dysplasia）」，故選D。","detail":{"background":"細胞適應與癌前變化：增生（hyperplasia，細胞數增加）、肥大（hypertrophy，細胞變大）、化生（metaplasia，一種成熟細胞被另一種取代，如Barrett食道）多為「可逆」適應；而「異生（dysplasia，細胞失序、核異型、極性喪失但未侵犯基底膜）」是「癌前病變」，與惡性腫瘤發生關係最密切，嚴重異生可進展為原位癌、侵襲癌。故選D。化生若持續刺激也可進展為異生再癌變，但「最密切」者為異生。","options":{"A":"增生多為可逆適應。","B":"肥大是細胞變大的適應。","C":"化生是可逆的細胞型態轉換（雖可進展但非最密切）。","D":"正確：異生是癌前病變，與惡性發生最密切。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-41":{"quick":"TNM系統的「N」指淋巴結侵犯（lymph nodal involvement），故選D。","detail":{"background":"TNM分期系統：T（tumor）＝原發腫瘤大小與侵犯深度（T1-T4）；N（node）＝「區域淋巴結」轉移程度（N0無、N1-N3漸多）；M（metastasis）＝遠端轉移（M0無、M1有）。故N指淋巴結侵犯（D）。M1（有遠端轉移）預後比M0差。TNM是「分期（staging）」系統，反映腫瘤擴散範圍，是預後與治療的重要依據。","options":{"A":"N非神經組織。","B":"無殘留腫瘤是R分類，非N。","C":"N非鼻咽侵犯。","D":"正確：N指區域淋巴結侵犯。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-36":{"quick":"「易局部侵犯及轉移」不是良性腫瘤的特性，故選C。","detail":{"background":"良性腫瘤特性：①常有纖維包膜、界限明顯、局限生長（A）；②細胞與來源組織形態相似（高分化，B）；③生長速度慢（D）；④「不侵犯、不轉移」。而「易局部侵犯及轉移」是「惡性」腫瘤的特性（C），故為良性所「不具備」者，選C。良性腫瘤雖一般不致命，但若壓迫重要構造（如腦膜瘤壓腦）仍可造成問題。","options":{"A":"良性常有包膜局限，是良性特性。","B":"良性與來源組織相似，是良性特性。","C":"正確：侵犯與轉移是惡性特性，非良性。","D":"良性生長慢，是良性特性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-37":{"quick":"癌前期細胞的特徵是「異生（dysplasia）」，故選D。","detail":{"background":"癌前病變（precancerous）以「異生（dysplasia）」為特徵：細胞大小形狀不一（多型性）、核大深染、核質比增加、有絲分裂增多且位置異常、細胞排列極性喪失，但「尚未穿破基底膜」（與原位癌的差別在嚴重度，與侵襲癌的差別在未突破基底膜）。萎縮、肥大、增生屬適應變化，非癌前特徵。故選D。","options":{"A":"萎縮是細胞變小的適應。","B":"肥大是細胞變大的適應。","C":"增生是細胞數增加的適應。","D":"正確：異生（dysplasia）是癌前細胞特徵。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-36":{"quick":"「接觸轉移」不是惡性腫瘤的轉移路徑，故選D。","detail":{"background":"惡性腫瘤三大轉移路徑：①淋巴轉移（lymphatic，癌最常見，如上皮癌經淋巴結）；②血路轉移（hematogenous，肉瘤常見，經靜脈到肺肝等）；③體腔播種（seeding/transcoelomic，如卵巢癌播散腹腔、肺癌散胸膜）。沒有「接觸轉移（contact）」這種路徑（D為虛構選項，腫瘤不靠單純接觸轉移到鄰近器官）。故選D。","options":{"A":"淋巴轉移是真實路徑。","B":"血路轉移是真實路徑。","C":"播種式（體腔）轉移是真實路徑。","D":"正確：無「接觸轉移」這種轉移路徑。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-38":{"quick":"正常細胞癌變的「第一步」是出現無法被修復的突變，故選D。","detail":{"background":"癌症是多步驟基因突變累積的結果。「第一步」是細胞DNA發生「突變（mutation）」且「無法被正常修復機制修復」（如修復基因缺陷使突變固定下來），啟動致癌過程。之後才逐步獲得癌症的特徵（hallmarks）：持續增生訊號（B自我複製）、逃避凋亡與生長抑制、無限複製能力（A長生不死/端粒酶）、誘導血管新生、侵襲轉移、逃避免疫（C）。故「第一步」是不可修復的突變（D），其餘是後續獲得的能力。","options":{"A":"長生不死是後續獲得的特徵。","B":"持續自我複製是後續特徵。","C":"逃避免疫是後續特徵。","D":"正確：出現無法修復的突變是癌變第一步。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-42":{"quick":"最正確敘述為B：惡性腫瘤的分期比分級更重要，故選B。","detail":{"background":"逐項：A「TNM是分級系統」錯——TNM是「分期（staging）」系統；B「惡性腫瘤分期比分級更重要」正確（分期反映擴散範圍、最具預後與治療指引價值）；C「分期評估分化程度」錯——評估分化的是「分級（grading）」，分期評估侵犯範圍；D「M1比M0預後更好」錯——M1（有遠端轉移）預後比M0「更差」。故選B。","options":{"A":"TNM是分期系統，非分級。","B":"正確：惡性腫瘤分期比分級更重要。","C":"評估分化的是分級，非分期。","D":"M1（有轉移）預後比M0更差，非更好。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-44":{"quick":"最不適當的是C：良性腫瘤「不」常見細胞多形性，故選C。","detail":{"background":"良性腫瘤特性：①常有纖維包膜、界限明顯（A正確）；②生長慢、血供足，少見壞死出血（B正確）；③細胞分化良好、形態一致，「少見細胞多形性（pleomorphism）」（C說常見多形性，錯——多形性是「惡性」特徵）；④核質比接近正常（D正確）。故最不適當者為C。多形性（細胞大小形狀不一）、核深染、異常分裂是惡性指標。","options":{"A":"良性常有纖維包膜，正確。","B":"良性少見壞死出血，正確。","C":"正確（為最不適當）：多形性是惡性特徵，良性少見。","D":"良性核質比接近正常，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-45":{"quick":"細胞質少、圓形、具神經內分泌特性的肺腫瘤是小細胞癌（small cell carcinoma），故選C。","detail":{"background":"肺癌分型：小細胞肺癌（small cell carcinoma, SCLC）——源自神經內分泌細胞，顯微鏡下「細胞小、細胞質少、圓形或燕麥狀（oat cell）、核染色質細緻」，具神經內分泌特性（可分泌ADH、ACTH致副腫瘤症候群），與抽菸高度相關、惡性度高、早期轉移、對化放療敏感但易復發。腺癌（周邊、不吸菸者/女性常見）、鱗狀細胞癌（中央、吸菸、角化）、大細胞癌（未分化、大細胞）皆為非小細胞肺癌。故神經內分泌、小細胞者為小細胞癌（C）。","options":{"A":"腺癌細胞質豐富、形成腺體，非神經內分泌小細胞。","B":"鱗狀細胞癌有角化，非小細胞。","C":"正確：小細胞癌細胞小、具神經內分泌特性。","D":"大細胞癌是大細胞未分化，非小圓形。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-34":{"quick":"最不代表惡性細胞特徵的是「核質比下降」，故選D。","detail":{"background":"惡性細胞的核形態特徵：①多型性（pleomorphism，大小形狀不一，A）；②核濃染（hyperchromasia，DNA增多深染，B）；③異常有絲分裂相（abnormal mitosis，C）；④「核質比『增加』（nuclear/cytoplasmic ratio increased，正常約1:4~1:6，惡性可達1:1）」、核大、核仁明顯。題說「核質比『下降』」與惡性相反（惡性是上升），故最不代表惡性，選D。","options":{"A":"多型性是惡性特徵。","B":"核濃染是惡性特徵。","C":"異常分裂相是惡性特徵。","D":"正確：惡性是核質比「上升」，下降不代表惡性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-37":{"quick":"青黴素過敏（即發型）是IgE與抗原結合使肥大細胞去顆粒（第一型過敏），故選C。","detail":{"background":"過敏反應（hypersensitivity）四型：第一型（即發型/IgE型）——抗原與肥大細胞表面IgE交聯，使肥大細胞「去顆粒」釋出組織胺等，造成蕁麻疹、過敏性休克（青黴素過敏、氣喘、過敏性鼻炎）；第二型（抗體媒介/細胞毒性）——抗體攻擊細胞表面抗原（如溶血、ITP）；第三型（免疫複合體）——抗原抗體複合體沉積（如SLE、血清病、鏈球菌後腎炎）；第四型（遲發型/T細胞媒介）——T細胞分泌淋巴激素，引起肉芽腫（結核、接觸性皮膚炎、移植排斥）。青黴素急性過敏屬第一型，故選C。","options":{"A":"免疫複合體沉積是第三型。","B":"抗體破壞細胞是第二型。","C":"正確：IgE使肥大細胞去顆粒是第一型（即發型）。","D":"T細胞分泌淋巴激素肉芽腫是第四型。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-39":{"quick":"修格連氏症候群（Sjögren syndrome）是自體免疫疾病，故選C。","detail":{"background":"選項鑑別：①布魯頓氏病（Bruton，X-linked agammaglobulinemia）——B細胞分化缺陷的「原發免疫缺乏」；②狄喬治氏症候群（DiGeorge）——胸腺發育不良致T細胞缺乏的「免疫缺乏」；③修格連氏症候群（Sjögren）——「自體免疫」疾病，淋巴球浸潤破壞淚腺與唾液腺，造成乾眼乾口（乾燥症），常伴抗SSA/SSB抗體（C正確）；④威-亞氏症候群（Wiskott-Aldrich）——濕疹、血小板低下、免疫缺乏的X-linked疾病。故自體免疫者為Sjögren（C）。","options":{"A":"布魯頓氏病是免疫缺乏（B細胞分化缺陷）。","B":"狄喬治症候群是免疫缺乏（胸腺發育不良）。","C":"正確：修格連氏症候群是自體免疫疾病。","D":"威-亞氏症候群是免疫缺乏症候群。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-35":{"quick":"HIV藉結合淋巴球表面的「CD4」進入細胞，故選A。","detail":{"background":"人類免疫不全病毒（HIV）的外套膜醣蛋白gp120與輔助型T淋巴球表面的「CD4」分子高親和力結合，再藉輔受體（CCR5或CXCR4）進入細胞，感染並破壞CD4+ T細胞，使CD4數目下降、細胞免疫崩潰，發展為AIDS。故HIV的主要目標受體是CD4（A）。CD8是細胞毒性T細胞、CD20是B細胞標記、CD23與B細胞/IgE相關。","options":{"A":"正確：HIV結合CD4進入輔助型T細胞。","B":"CD8是細胞毒性T細胞標記。","C":"CD20是B細胞標記。","D":"CD23與B細胞/IgE相關，非HIV受體。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-36":{"quick":"AIDS主要破壞「CD4陽性T淋巴球」，故選A。","detail":{"background":"AIDS（後天免疫缺乏症候群）由HIV感染並破壞「CD4+ 輔助型T淋巴球」造成。CD4+ T細胞是免疫系統的協調中樞，其數目下降（<200/μL）使細胞免疫崩潰，導致伺機性感染（肺囊蟲肺炎、念珠菌、結核、CMV）與相關惡性腫瘤（Kaposi肉瘤、淋巴瘤）。故被破壞的是CD4+ T細胞（A）。","options":{"A":"正確：AIDS破壞CD4陽性T淋巴球。","B":"CD8是細胞毒性T細胞，非主要被破壞者。","C":"CD20是B細胞，非HIV主要標的。","D":"CD30淋巴球非HIV主要破壞對象。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-35":{"quick":"HIV進入T細胞的高親和力受體是「CD4」，故選B。","detail":{"background":"HIV的gp120與T細胞表面「CD4」分子高親和力結合，這是病毒附著與進入的關鍵第一步，再藉趨化因子輔受體（CCR5/CXCR4）完成融合進入。故高親和力受體為CD4（B）。CD3是T細胞受體複合物、CD5/CD10是其他淋巴球標記，皆非HIV受體。","options":{"A":"CD3是TCR複合物，非HIV受體。","B":"正確：HIV高親和力受體是CD4。","C":"CD5非HIV受體。","D":"CD10非HIV受體。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-41":{"quick":"骨髓移植後皮膚皮疹是「T細胞媒介」損傷（移植物對抗宿主反應，GVHD），故選C。","detail":{"background":"異體骨髓（造血幹細胞）移植後，移植物中的「供者T淋巴球」辨識宿主組織為異物，攻擊宿主器官，稱「移植物對抗宿主疾病（graft-versus-host disease, GVHD）」，好發於皮膚（皮疹）、肝（黃疸）、腸道（腹瀉）。其損傷由「供者T細胞媒介」（屬第四型細胞媒介免疫）。故皮膚皮疹與T細胞媒介損傷相關（C）。","options":{"A":"非嗜酸性球媒介。","B":"非肥大細胞媒介（非第一型過敏）。","C":"正確：GVHD是供者T細胞媒介損傷。","D":"非B細胞媒介。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-34":{"quick":"Sjögren症候群唾液腺有大量「淋巴球」浸潤，故選C。","detail":{"background":"修格連氏症候群（Sjögren syndrome）是自體免疫外分泌腺病變，淚腺與唾液腺受「淋巴球（主要為T細胞與B細胞）」大量浸潤、形成淋巴濾泡並破壞腺體，造成乾眼（角結膜乾燥）、乾口（口乾），可合併類風濕關節炎或SLE，並增加黏膜相關淋巴瘤（MALT lymphoma）風險。故唾液腺浸潤細胞為淋巴球（C）。","options":{"A":"嗜中性球是急性化膿發炎，非Sjögren。","B":"嗜酸性球與過敏/寄生蟲相關。","C":"正確：Sjögren唾液腺有大量淋巴球浸潤。","D":"組織球非Sjögren主要浸潤細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-35":{"quick":"X-linked agammaglobulinemia是「前驅B細胞不能分化成B細胞」，故選A。","detail":{"background":"性聯無伽瑪球蛋白血症（X-linked agammaglobulinemia，Bruton病）：因Bruton酪胺酸激酶（BTK）基因突變，使「前驅B細胞（pre-B cell）無法分化成成熟B細胞」，導致B細胞與所有免疫球蛋白（抗體）幾乎缺乏，患者（幾乎都是男孩）反覆細菌感染。對比：胸腺發育不良是DiGeorge（T細胞缺乏）；ADA基因突變是嚴重複合型免疫缺乏（SCID）；第二級MHC缺乏是裸淋巴球症候群。故選A。","options":{"A":"正確：pre-B細胞無法分化成B細胞（BTK突變）。","B":"胸腺發育不良是DiGeorge。","C":"ADA突變是SCID。","D":"MHC II缺乏是裸淋巴球症候群。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-33":{"quick":"手指僵硬、吞嚥困難、真皮明顯纖維化，最可能是全身性硬皮病（systemic scleroderma），故選B。","detail":{"background":"全身性硬化症（systemic sclerosis/scleroderma）是以「過度膠原沉積與纖維化」為特徵的自體免疫病：皮膚（尤其手指）變硬、僵硬、雷諾現象；食道平滑肌纖維化致吞咽困難與蠕動障礙；可侵犯肺（間質纖維化）、腎、心。抗Scl-70（瀰漫型）、抗著絲點抗體（CREST局限型）。題述「非發炎性真皮纖維化＋手指僵硬＋吞嚥困難」典型符合硬皮病（B）。皮肌炎是肌肉發炎（近端肌無力＋皮疹）、Sjögren是乾燥症、僵直性脊椎炎是中軸關節。故選B。","options":{"A":"皮肌炎是發炎性肌病（近端肌無力＋皮疹），非真皮纖維化。","B":"正確：全身性硬皮病致真皮纖維化、手指僵硬、食道蠕動障礙。","C":"Sjögren是乾眼乾口。","D":"僵直性脊椎炎是中軸關節炎。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-43":{"quick":"病人幾乎都是男性的免疫疾病是布魯頓氏病（Bruton，X性聯），故選D。","detail":{"background":"布魯頓氏病（X-linked agammaglobulinemia）因BTK基因位於X染色體、屬X性聯隱性遺傳，「幾乎都發生在男性」（男性只一條X，突變即發病）。SLE好發於育齡「女性」；DiGeorge是22q11缺失（無性別差異）；IgA缺乏症無明顯性別偏向。故幾乎都是男性者為Bruton病（D）。","options":{"A":"SLE好發於女性。","B":"DiGeorge無明顯性別偏向。","C":"IgA缺乏症無明顯性別偏向。","D":"正確：Bruton病X性聯，幾乎都是男性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-24":{"quick":"吃海鮮後皮膚癢、蕁麻疹是「立即型過敏反應」（第一型），故選A。","detail":{"background":"食物（海鮮）過敏引起皮膚癢與蕁麻疹，是典型的「第一型（立即型/IgE型）過敏反應」：過敏原與肥大細胞表面IgE交聯，數分鐘內去顆粒釋放組織胺，造成蕁麻疹、血管性水腫、搔癢，嚴重可過敏性休克。發作快（立即型）。故選A。第二型（抗體媒介細胞毒性）、第三型（免疫複合物）、第四型（遲發型T細胞）皆不符這種速發的蕁麻疹。","options":{"A":"正確：海鮮蕁麻疹是第一型立即型（IgE）過敏。","B":"抗體媒介（第二型）是細胞毒性，非速發蕁麻疹。","C":"免疫複合物（第三型）如血清病，非速發。","D":"遲發型（第四型）數天才發作，非立即蕁麻疹。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-23":{"quick":"與即發型過敏關聯「最小」的是TH1細胞，故選A。","detail":{"background":"即發型（第一型）過敏反應的關鍵角色：IgE抗體（B）、肥大細胞（mast cell，去顆粒釋組織胺，C）、嗜酸性球（eosinophil，晚期反應與組織損傷，D）、TH2細胞（分泌IL-4/IL-5促IgE生成與嗜酸性球）。而「TH1細胞」主導的是細胞免疫與第四型遲發型過敏（分泌IFN-γ活化巨噬細胞），與即發型過敏關聯「最小」。故選A。","options":{"A":"正確：TH1主導第四型遲發型，與即發型關聯最小。","B":"IgE是第一型過敏核心。","C":"肥大細胞是第一型過敏核心。","D":"嗜酸性球參與第一型過敏晚期反應。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-26":{"quick":"與過敏性疾病最相關的白血球增多是「嗜酸性球（eosinophil）」，故選B。","detail":{"background":"過敏性疾病（氣喘、過敏性鼻炎、異位性皮膚炎）與寄生蟲感染時，血中「嗜酸性球（eosinophil）」增多——嗜酸性球受TH2細胞的IL-5召集，釋放主要鹼性蛋白等造成組織損傷與慢性過敏發炎。故過敏相關白血球增多為嗜酸性球（B）。嗜中性球增多見於細菌感染、單核球見於慢性感染、淋巴球增多見於病毒感染。","options":{"A":"嗜中性球增多見於細菌感染。","B":"正確：嗜酸性球增多與過敏（及寄生蟲）最相關。","C":"單核球增多見於慢性感染。","D":"淋巴球增多見於病毒感染。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-22":{"quick":"SLE造成的血球低下主要與「第二型過敏反應」有關，故選B。","detail":{"background":"全身性紅斑性狼瘡（SLE）是多重抗體的自體免疫病。其造成的「血球數目低下（溶血性貧血、白血球減少、血小板減少）」主要機轉是「第二型過敏反應」——自體抗體直接結合血球表面抗原，經補體或吞噬作用破壞血球（抗體媒介細胞毒性）。而SLE的「腎炎、血管炎、關節炎」則主要是「第三型（免疫複合體沉積）」。題問血球低下，故選第二型（B）。","options":{"A":"第一型是IgE即發型過敏，非血球破壞。","B":"正確：血球低下是第二型（抗體媒介細胞毒性）。","C":"第三型（免疫複合體）主導SLE的腎炎血管炎，非血球低下。","D":"第四型是T細胞媒介，非血球破壞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-22":{"quick":"慢性肉芽腫病（CGD）是「吞噬細胞氧化酶基因缺陷」致無法毒殺細菌，故選A。","detail":{"background":"慢性肉芽腫病（chronic granulomatous disease, CGD）：因「NADPH氧化酶（phagocyte oxidase）基因缺陷」，吞噬細胞無法產生過氧化物與活性氧（呼吸爆發），雖能吞噬卻無法「氧化性毒殺」吞入的細菌（尤其過氧化氫酶陽性菌如金黃葡萄球菌、麴菌），導致反覆感染與肉芽腫形成（A正確）。對比：B吞噬小體與溶酶體無法融合是Chédiak-Higashi；C補體調節缺陷（如C1抑制劑缺乏）是遺傳性血管性水腫（D所述陣發性水腫）。故選A。","options":{"A":"正確：CGD是NADPH氧化酶基因缺陷，無法氧化毒殺細菌。","B":"吞噬小體與溶酶體不融合是Chédiak-Higashi。","C":"補體調節缺陷致過度發炎是其他病。","D":"陣發性水腫是遺傳性血管性水腫（C1抑制劑缺乏）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-38":{"quick":"痛痛病（Itai-Itai disease）是「鎘（cadmium）」中毒，故選B。","detail":{"background":"痛痛病（Itai-Itai）是日本富山縣因礦場廢水汙染稻米，居民長期攝入「鎘（cadmium）」中毒所致：鎘累積破壞腎小管（致蛋白尿、葡萄糖尿）並干擾鈣磷代謝與維生素D活化，造成嚴重骨軟化症與多發性病理性骨折，病人喊「痛、痛」而得名。對比：鉛中毒（貧血、腹絞痛、神經病變）、汞中毒（水俁病，神經損害）、砷中毒（烏腳病、皮膚癌）。故痛痛病為鎘（B）。","options":{"A":"鉛中毒致貧血、神經病變、腹絞痛。","B":"正確：痛痛病是鎘中毒（骨軟化、腎損）。","C":"汞中毒是水俁病（神經損害）。","D":"砷中毒是烏腳病/皮膚病變。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-36":{"quick":"台灣西南沿海的烏腳病與「砷（arsenic）」汙染最相關，故選D。","detail":{"background":"烏腳病（blackfoot disease）流行於台灣西南沿海（嘉南、屏東沿海），因居民長期飲用含高量「砷（arsenic）」的深井地下水，造成末梢血管阻塞性病變、肢端缺血壞疽（腳變黑），並增加皮膚癌、膀胱癌、肺癌等砷相關癌症風險。故烏腳病為砷中毒（D）。","options":{"A":"鉛中毒非烏腳病病因。","B":"鎘中毒是痛痛病。","C":"汞中毒是水俁病。","D":"正確：烏腳病是砷中毒（西南沿海高砷地下水）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-38":{"quick":"長期酗酒最易缺乏「維生素B1（thiamine）」，故選B。","detail":{"background":"長期酗酒者因飲食不均、腸道吸收障礙與肝代謝改變，最易缺乏「維生素B1（thiamine/硫胺）」。缺B1造成：Wernicke腦病（眼肌麻痺、運動失調、意識混亂）與Korsakoff症候群（記憶喪失、虛談），合稱Wernicke-Korsakoff症候群；以及濕性腳氣病（高輸出心衰）。故酗酒最易缺B1（B）。臨床上酒精中毒病人補糖前須先補B1，以免誘發Wernicke腦病。","options":{"A":"維生素A缺乏致夜盲、乾眼，非酗酒首要。","B":"正確：酗酒最易缺維生素B1（thiamine）。","C":"維生素C缺乏致壞血病。","D":"維生素B2缺乏致口角炎，非酗酒首要。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-36":{"quick":"與潛水有關的栓塞是「氣體栓塞」，故選B。","detail":{"background":"潛水夫病（減壓病/caisson disease）：潛水時高壓使氮氣大量溶於血液與組織，若快速上升（減壓過快），溶解的氮氣形成「氣泡」進入血液與組織＝「氣體栓塞（gas/air embolism）」，阻塞血管造成關節痛（bends）、神經損害、呼吸窘迫。故與潛水相關的栓塞為氣體栓塞（B）。脂肪栓塞見於長骨骨折、血栓栓塞見於DVT、腫瘤栓塞見於癌侵血管。","options":{"A":"脂肪栓塞見於長骨骨折。","B":"正確：潛水減壓致氣體（氮氣）栓塞。","C":"血栓栓塞與DVT相關。","D":"腫瘤栓塞見於癌侵入血管。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-43":{"quick":"核型46,XX,t(2;5)是「轉位（translocation）」，故選A。","detail":{"background":"染色體結構異常的命名：t(translocation,轉位)＝兩條染色體間片段互換（如t(2;5)表示第2與第5號染色體轉位）；del(deletion,脫失)＝片段缺失；inv(inversion,倒置)＝片段顛倒；iso(isochromosome,同染色體)＝一臂缺失另一臂重複。題目核型46,XX,t(2;5)(q31;p14)的「t」即「轉位」（A）。許多血液腫瘤有特徵性轉位（如CML的t(9;22)費城染色體）。","options":{"A":"正確：t代表轉位（translocation）。","B":"脫失是del。","C":"倒置是inv。","D":"同染色體是iso。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-34":{"quick":"潛水夫病（caisson disease）的主因是「氣體」，故選B。","detail":{"background":"潛水夫病（caisson disease/減壓病）：高壓環境下氮氣溶入體內，快速減壓（上升過快）時氮氣形成「氣泡（氣體）」造成氣體栓塞，阻塞血管引起關節疼痛、神經與肺部症狀，慢性可致股骨頭缺血壞死。故主因是「氣體（氮氣氣泡）」（B）。治療用高壓氧。與腫瘤、念珠菌、幽門桿菌無關。","options":{"A":"腫瘤塊非減壓病病因。","B":"正確：潛水夫病主因是氮氣氣泡（氣體栓塞）。","C":"白色念珠菌是黴菌感染，無關。","D":"幽門桿菌與胃潰瘍相關，無關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-38":{"quick":"離子性放射線傷害最主要因破壞細胞的「DNA」，故選C。","detail":{"background":"游離（離子性）放射線（X光、γ射線）的傷害機轉：①直接破壞DNA（雙股斷裂）；②間接經水解離產生自由基（活性氧）破壞DNA。DNA是最關鍵的標的——DNA損傷致細胞死亡、突變或癌變。故放射線傷害主要破壞DNA（C）。快速分裂的細胞（骨髓、腸黏膜、生殖細胞、淋巴組織）對放射線最敏感。","options":{"A":"細胞膜非放射線傷害主要標的。","B":"蛋白質可被自由基損傷但非主要致命標的。","C":"正確：放射線主要破壞DNA。","D":"粒線體可受損但DNA是關鍵標的。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-43":{"quick":"2歲、體重僅60%、水腫腹水、皮膚色素改變、髮色改變，是紅孩兒病（Kwashiorkor），故選B。","detail":{"background":"兒童蛋白質-能量營養不良兩型：①紅孩兒病（Kwashiorkor）——「蛋白質」嚴重缺乏（熱量尚可，如斷奶後只吃澱粉），特徵是「水腫腹水（低白蛋白致膠體滲透壓下降）、脂肪肝、皮膚色素脫失與剝落、頭髮變色（旗幟徵）、生長遲滯」，本題典型符合（B）；②消瘦症（Marasmus）——「總熱量」嚴重缺乏，特徵是極度消瘦、皮包骨、無水腫。故有水腫與皮膚髮色改變者為Kwashiorkor（B）。","options":{"A":"維生素D缺乏致佝僂病（骨骼），非此全身表現。","B":"正確：Kwashiorkor（蛋白質缺乏，水腫、皮膚髮色改變）。","C":"消瘦症（Marasmus）是極度消瘦、無水腫。","D":"葉酸缺乏致巨球性貧血，非此表現。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-42":{"quick":"錯誤敘述為B：懸浮微粒「顆粒愈小」傷害愈強（非愈大），故選B。","detail":{"background":"空氣污染懸浮微粒（particulate matter, PM）：A來自煤、油、柴油燃燒（正確）；B「顆粒愈大傷害愈強」錯——「顆粒愈小（如PM2.5，直徑≤2.5μm）傷害愈強」，因小顆粒能深入到肺泡甚至進入血液循環，引發全身發炎與心肺疾病；大顆粒多被上呼吸道攔截清除（C正確，可沉積肺部或被清除）；D刺激發炎反應（正確）。故錯誤為B。PM2.5與肺癌、心血管疾病、慢性肺病相關。","options":{"A":"PM來自燃燒過程，正確。","B":"正確（為錯誤敘述）：顆粒愈「小」傷害愈強，非愈大。","C":"吸入微粒可沉積肺部或被清除，正確。","D":"懸浮微粒刺激發炎，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-24":{"quick":"錯誤敘述為C：唐氏症發生率與「母親」年齡有關（非父親），故選C。","detail":{"background":"唐氏症（Down syndrome，21三體症）：A可用FISH輔助診斷（正確）；B是最常見的「體染色體」疾病（正確）；C「發生率與父親年齡有關、母親較小」錯——唐氏症發生率主要與「母親年齡」相關（高齡產婦因卵子減數分裂不分離風險增加，35歲以上顯著上升），與父親年齡關係小；D第21對染色體多1條（三體，正確）。故錯誤為C。臨床表現：智能障礙、特殊面容、心臟缺損、早發失智。","options":{"A":"可用FISH診斷，正確。","B":"是最常見體染色體疾病，正確。","C":"正確（為錯誤敘述）：發生率與「母親」年齡相關，非父親。","D":"第21對多1條（三體），正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-24":{"quick":"壞血病（scurvy）是維生素C缺乏，故選A。","detail":{"background":"壞血病（scurvy）是「維生素C（抗壞血酸ascorbic acid）」缺乏所致。維生素C是膠原蛋白合成中脯胺酸與離胺酸羥化的輔因子，缺乏使膠原合成缺陷、血管脆弱，造成牙齦出血腫脹、皮下與關節出血、傷口癒合不良、毛囊角化、牙齒鬆動、貧血。故壞血病為維生素C缺乏（A）。航海時代水手因缺新鮮蔬果罹病，後發現柑橘可預防。","options":{"A":"正確：壞血病是維生素C缺乏。","B":"維生素A缺乏致夜盲乾眼。","C":"維生素D缺乏致佝僂/骨軟化。","D":"維生素B12缺乏致惡性貧血。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-23":{"quick":"特納氏症候群（Turner，45,X）是「性染色體」異常，不屬體染色體數量異常，故選A。","detail":{"background":"體染色體（autosome，第1-22對）「數量異常」的疾病：愛德華氏症候群（Edwards，18三體）、帕陀氏症候群（Patau，13三體）、唐氏症（Down，21三體）皆為體染色體三體症（B、C、D）。而特納氏症候群（Turner syndrome，45,X，缺一條X）是「性染色體」數量異常（女性表型、身材矮小、原發無月經、蹼頸），不屬體染色體異常。故例外為Turner（A）。","options":{"A":"正確：Turner（45,X）是性染色體異常，非體染色體。","B":"Edwards是18三體（體染色體）。","C":"Patau是13三體（體染色體）。","D":"Down是21三體（體染色體）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-39":{"quick":"金黃色葡萄球菌感染主要引起「化膿性發炎」，故選C。","detail":{"background":"金黃色葡萄球菌（Staphylococcus aureus）是典型的「化膿菌（pyogenic）」，感染引起「化膿性發炎（suppurative inflammation）」——以大量嗜中性白血球浸潤、組織液化壞死形成膿（pus）為特徵，造成膿疱、癤、癰、膿瘍、蜂窩組織炎、骨髓炎等。對比：肉芽腫性發炎（結核、梅毒、黴菌）、出血性反應（病毒性出血熱）。故金黃葡萄球菌為化膿性發炎（C）。","options":{"A":"肉芽腫性見於結核、梅毒、黴菌。","B":"細胞增生性非化膿菌典型。","C":"正確：金黃葡萄球菌引起化膿性發炎。","D":"出血性反應見於某些病毒。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-33":{"quick":"橡皮腫（gumma）是「肉芽腫性」炎症，故選A。","detail":{"background":"橡皮腫（gumma）是「第三期梅毒」的特徵病變——一種「肉芽腫性（granulomatous）」發炎：中央凝固性壞死、周圍由類上皮細胞、淋巴球、漿細胞與纖維組織包繞，質地像橡皮，可發生於皮膚、骨、肝等。是梅毒螺旋體引發的遲發型（第四型）免疫反應。故橡皮腫為肉芽腫性炎症（A）。","options":{"A":"正確：橡皮腫（gumma）是肉芽腫性炎症（三期梅毒）。","B":"漿液性發炎是稀薄滲出（如水泡）。","C":"化膿性是嗜中性球膿液。","D":"纖維性發炎是富纖維蛋白滲出。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-35":{"quick":"「病毒」感染最少引起敗血性休克，故選D。","detail":{"background":"敗血性休克（septic shock）最常由「細菌」感染引起，尤其革蘭氏陰性菌的內毒素（endotoxin/LPS）與革蘭氏陽性菌的外毒素、黴菌（如念珠菌）也可引起——這些病原激發大量發炎細胞激素（TNF、IL-1）造成全身血管擴張、通透性增加、低血壓與多器官衰竭。「病毒」感染相對最少直接引起典型的敗血性休克（雖嚴重病毒感染也可致休克，但機轉與細菌內外毒素不同）。故最少者為病毒（D）。","options":{"A":"革蘭氏陽性菌（外毒素）可致敗血性休克。","B":"革蘭氏陰性菌（內毒素）是敗血性休克典型病因。","C":"黴菌（念珠菌）可致敗血性休克。","D":"正確：病毒感染最少引起典型敗血性休克。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-43":{"quick":"錯誤敘述為B：HSV-2「會」經產道造成新生兒感染，故選B。","detail":{"background":"第二型單純疱疹（HSV-2，生殖器疱疹）：A感染黏膜上皮形成核內包涵體（Cowdry type A inclusion）與多核巨細胞（正確）；B「不會經產道造成新生兒感染」錯——孕婦生殖道活動性HSV-2感染「會」在分娩經產道傳給新生兒，造成新生兒疱疹（可致命的腦炎或全身性感染），故活動性感染常建議剖腹產；C可形成水泡（正確）；D對免疫健全者通常不致命（正確，潛伏復發）。故錯誤為B。","options":{"A":"形成Cowdry A型核內包涵體，正確。","B":"正確（為錯誤敘述）：HSV-2會經產道感染新生兒。","C":"HSV-2形成水泡，正確。","D":"免疫健全者通常不致命，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-33":{"quick":"白喉偽膜主要成分「不包括」膠原纖維，故選D。","detail":{"background":"白喉（diphtheria，白喉桿菌）的特徵是咽喉部「偽膜（pseudomembrane）」——由壞死的上皮細胞、纖維蛋白（fibrin）、發炎的白血球（嗜中性球）、細菌與滲出物凝結而成的灰白色膜，緊附黏膜，剝離易出血、可阻塞氣道。其成分「不包括膠原纖維（collagen，屬正常結締組織成分，非偽膜滲出物）」。故選D。白喉毒素還可損害心肌與神經。","options":{"A":"壞死上皮是偽膜成分。","B":"纖維蛋白是偽膜成分。","C":"白血球是偽膜成分。","D":"正確：膠原纖維不是偽膜成分。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-41":{"quick":"錯誤敘述為D：感染性單核球增多症「不是」肉芽腫性炎症，故選D。","detail":{"background":"感染性單核球增多症（infectious mononucleosis）：A由EB病毒（Epstein-Barr virus）引起（正確）；B臨床喉嚨痛、淋巴結腫大、發燒、脾腫（正確）；C經唾液（接吻）傳染，又稱「接吻病」（正確）；D「是肉芽腫性炎症」錯——其病理是「淋巴組織反應性增生」，血中出現大量「非典型淋巴球（活化的T細胞）」，並非肉芽腫性炎症。故錯誤為D。","options":{"A":"由EB病毒引起，正確。","B":"喉嚨痛淋巴腫大發燒，正確。","C":"接吻（唾液）傳染，正確。","D":"正確（為錯誤敘述）：是淋巴增生反應，非肉芽腫性炎症。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-37":{"quick":"水痘病毒潛伏神經元、成人復發表現為帶狀皰疹（varicella-zoster），故選C。","detail":{"background":"水痘-帶狀疱疹病毒（varicella-zoster virus, VZV）：初次感染造成「水痘（chickenpox）」（兒童全身水泡疹），痊癒後病毒「潛伏在背根神經節的感覺神經元」；當成人免疫力下降時「再活化」，沿單一神經皮節分布復發，表現為「帶狀疱疹（herpes zoster/shingles）」——單側帶狀分布的疼痛性水泡疹。故復發型式為帶狀疱疹（C）。麻疹、德國麻疹、玫瑰疹是其他病毒。","options":{"A":"麻疹是另一種病毒（measles）。","B":"德國麻疹是風疹病毒。","C":"正確：VZV再活化表現為帶狀皰疹。","D":"玫瑰疹是HHV-6。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-45":{"quick":"錯誤敘述為C：硬性下疳（chancre）是「第一期」梅毒而非第二期，故選C。","detail":{"background":"梅毒（syphilis，梅毒螺旋體Treponema pallidum）：A性接觸傳染（正確，也可垂直母嬰）；B分三期（正確）；C「硬性下疳（chancre）是第二期出現」錯——硬性下疳（無痛性硬潰瘍，於外生殖器）是「第一期」梅毒的特徵；第二期是全身性皮疹（含手掌足底）與扁平濕疣；D第三期造成心臟血管（梅毒性主動脈炎/動脈瘤）與神經病變（神經性梅毒、脊髓癆）及橡皮腫（正確）。故錯誤為C。","options":{"A":"性交傳染，正確。","B":"分三期，正確。","C":"正確（為錯誤敘述）：硬性下疳是「第一期」非第二期。","D":"第三期致心血管與神經病變，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-40":{"quick":"錯誤敘述為B：EB病毒主要感染「B淋巴球」而非吞噬細胞，故選B。","detail":{"background":"感染性單核球增多症（EB病毒）：A由EB病毒引起（正確）；B「病毒主要感染吞噬細胞」錯——EB病毒主要感染「B淋巴球」（經CD21受體進入），刺激B細胞增生，繼而引發T細胞反應；C血中「非典型淋巴球」是反應性活化的「T淋巴球」（正確）；D症狀多在4-6週後緩解（正確）。故錯誤為B。EB病毒也與鼻咽癌、Burkitt淋巴瘤相關。","options":{"A":"由EB病毒引起，正確。","B":"正確（為錯誤敘述）：EB病毒主要感染B淋巴球，非吞噬細胞。","C":"非典型淋巴球是活化T細胞，正確。","D":"症狀4-6週緩解，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-37":{"quick":"錯誤敘述為A：內毒素是革蘭氏「陰性」菌細胞壁成分（非陽性），故選A。","detail":{"background":"細菌內毒素（endotoxin）：A「是革蘭氏陽性菌細胞壁成分」錯——內毒素是革蘭氏「陰性菌」外膜的「脂多醣（LPS）」成分；B細菌死亡裂解後釋出（正確，內毒素是結構成分，非分泌的外毒素）；C引起發燒（致熱原，正確）；D可激發大量細胞激素引起敗血性休克與急性呼吸窘迫症候群（ARDS，正確）。故錯誤為A。對比外毒素是活菌「分泌」的蛋白毒素（革蘭氏陽性與陰性菌皆可）。","options":{"A":"正確（為錯誤敘述）：內毒素是革蘭氏「陰性」菌成分，非陽性。","B":"細菌死亡釋出內毒素，正確。","C":"內毒素致熱（發燒），正確。","D":"內毒素可致ARDS，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-35":{"quick":"帶狀疱疹病毒初次感染後潛伏在「背根神經節的神經元」，故選A。","detail":{"background":"水痘-帶狀疱疹病毒（VZV）初次感染（水痘）後，病毒沿感覺神經逆行潛伏在「背根神經節（dorsal root ganglion）的感覺神經元」（及腦神經節）內，呈潛伏狀態；當免疫力下降時再活化，沿該神經皮節分布造成帶狀疱疹。故潛伏部位為背根神經節神經元（A）。這也是為何帶狀疱疹沿單側皮節分布且伴神經痛。","options":{"A":"正確：VZV潛伏在背根神經節的神經元。","B":"非潛伏於造血幹細胞。","C":"非潛伏於血管內皮細胞。","D":"非潛伏於表皮基底層細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-28":{"quick":"對病毒組織趨向性影響「最小」的是宿主細胞膜的脂肪組成，故選B。","detail":{"background":"病毒的組織趨向性（tropism，感染特定細胞/組織的傾向）取決於：①宿主細胞表面是否有病毒結合的「受體蛋白」（A，最關鍵，如HIV需CD4）；②細胞內是否有病毒複製所需的「轉錄因子/酵素」（C）；③物理屏障如溫度、pH、解剖可及性（D）。而「細胞膜的脂肪組成」對趨向性影響「最小」（雖有膜套病毒需融合，但脂肪組成非決定趨向性的主因）。故選B。","options":{"A":"表面受體蛋白是趨向性關鍵，影響大。","B":"正確：細胞膜脂肪組成對趨向性影響最小。","C":"胞內轉錄因子影響病毒複製與趨向性。","D":"溫度pH等物理屏障影響趨向性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114100-N1-24":{"quick":"人類病原體中體積「最小」的是普利昂蛋白（prion），故選B。","detail":{"background":"病原體大小由大到小：原生動物（protozoa，單細胞真核，最大）＞黴菌（fungi）＞細菌（bacteria）＞病毒（virus）＞「普利昂蛋白（prion，最小）」。普利昂是無核酸的「錯誤摺疊蛋白質」，藉誘導正常蛋白變構而傳播，造成傳播性海綿狀腦病（庫賈氏病、狂牛病）。它沒有DNA/RNA，是已知最小、最簡單的病原。故最小者為prion（B）。","options":{"A":"黴菌比prion大很多。","B":"正確：prion（錯誤摺疊蛋白）是最小病原。","C":"細菌比prion與病毒都大。","D":"原生動物是最大的病原。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-24":{"quick":"正確敘述為C：抗原移型（antigenic shift）是流感大流行的主因，故選C。","detail":{"background":"流行性感冒病毒（influenza virus）：A是「RNA病毒」（正交黏液病毒科），非DNA（錯）；B最易引起「大流行（pandemic）」的是「type A」（可感染禽鳥豬等動物宿主、易重組），非type B（錯）；C「抗原移型（antigenic shift，基因重組產生全新亞型，人群無免疫力）是大流行（pandemic）的主因」（正確）——對比抗原漂變（antigenic drift，小突變）造成季節性流行（epidemic）；D決定亞型的是表面「血球凝集素（H）」與「神經胺酸酶（N，neuraminidase）」（如H1N1），非核蛋白（錯）。故選C。","options":{"A":"流感是RNA病毒，非DNA。","B":"易致大流行的是type A，非B。","C":"正確：抗原移型是大流行主因。","D":"決定亞型的是H與N（neuraminidase），非核蛋白。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-40":{"quick":"粥樣腫（atheroma）中最常見的發炎細胞是巨噬細胞，故選D。","detail":{"background":"動脈粥狀硬化（atherosclerosis）的粥樣斑塊（atheroma）核心是脂質與「泡沫細胞（foam cell）」——即吞噬了氧化低密度脂蛋白（oxLDL）的「巨噬細胞（macrophage）」。發炎是動脈粥狀硬化的核心機制：內皮受損→單核球浸潤分化為巨噬細胞→吞脂成泡沫細胞→平滑肌增生、膠原沉積形成纖維帽。故粥樣腫最常見發炎細胞為巨噬細胞（D），也有T淋巴球參與。","options":{"A":"嗜酸性球與過敏/寄生蟲相關。","B":"嗜鹼性球非粥樣斑主要細胞。","C":"漿細胞非粥樣斑主角。","D":"正確：巨噬細胞（泡沫細胞）是粥樣腫主要發炎細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-44":{"quick":"慢性鬱血出現「心臟衰竭細胞」的器官是肺臟，故選B。","detail":{"background":"左心衰竭使肺靜脈鬱血，肺泡微血管壓力升高、紅血球漏出到肺泡腔，被肺泡巨噬細胞吞噬後形成含「含鐵血黃素（hemosiderin）」的巨噬細胞，稱為「心臟衰竭細胞（heart failure cell）」，是慢性肺鬱血（左心衰竭）的特徵。故出現此細胞的器官為肺臟（B）。長期肺鬱血致肺纖維化、棕色硬化。","options":{"A":"心臟本身非心衰竭細胞出現處。","B":"正確：肺臟在慢性鬱血出現心臟衰竭細胞。","C":"肝臟慢性鬱血形成肉荳蔻肝，非心衰竭細胞。","D":"脾臟非心衰竭細胞出現處。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-36":{"quick":"左心室衰竭最先引起「肺」水腫，故選A。","detail":{"background":"左心室衰竭使左心無法有效將血液打入體循環，血液回堵於肺循環→肺靜脈與肺微血管壓力升高→液體滲入肺間質與肺泡→「肺水腫」（呼吸困難、端坐呼吸、夜間陣發性呼吸困難、咳粉紅色泡沫痰）。故左心衰竭最先致肺水腫（A）。相對地，右心衰竭致體循環鬱血（下肢水腫、肝腫大、頸靜脈怒張）。","options":{"A":"正確：左心衰竭最先致肺水腫。","B":"腎水腫非左心衰竭最先表現。","C":"胃非左心衰竭水腫器官。","D":"腸水腫見於右心衰竭（體循環鬱血）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-39":{"quick":"心肌炎最常見的原因是「病毒感染」，故選D。","detail":{"background":"心肌炎（myocarditis）最常見的病因是「病毒感染」，尤其是柯薩奇病毒B（Coxsackie B）、腺病毒、流感病毒等，病毒直接損傷心肌或引發免疫反應，造成淋巴球浸潤與心肌壞死，臨床可從無症狀到心衰竭、心律不整甚至猝死。其他原因（細菌、寄生蟲如Chagas病的克氏錐蟲、藥物、過敏、自體免疫）較少見。故最常見為病毒（D）。","options":{"A":"酒精致擴張型心肌病變，非心肌炎主因。","B":"抽菸與冠心病相關，非心肌炎主因。","C":"過敏性心肌炎少見。","D":"正確：病毒感染是心肌炎最常見原因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-41":{"quick":"心肌梗塞最常見的併發症是「心律不整」，故選A。","detail":{"background":"急性心肌梗塞的併發症中，「心律不整（arrhythmia）」最常見（約90%病人發生）——梗塞與缺血使心肌電活動不穩，可出現心室早期收縮、心室頻脈/顫動（猝死主因）、傳導阻滯。其他併發症：心衰竭/心因性休克、心肌破裂（3-7天，致心包填塞）、乳頭肌斷裂、心室壁瘤、附壁血栓與栓塞、心包炎。故最常見併發症為心律不整（A），也是早期猝死的主因。","options":{"A":"正確：心律不整是心肌梗塞最常見併發症。","B":"心臟破裂是嚴重但較少見併發症。","C":"心衰竭常見但心律不整更普遍。","D":"栓塞是後期併發症。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-47":{"quick":"心肌梗塞「初期」浸潤的發炎細胞是嗜中性白血球，故選A。","detail":{"background":"心肌梗塞的病理時序：①0-4小時：肉眼與光鏡幾無變化（早期凝固性壞死開始）；②1天內：心肌凝固性壞死、「嗜中性白血球（neutrophil）」開始浸潤（急性發炎，1-3天達高峰）；③3-7天：巨噬細胞清除壞死組織；④1-2週：肉芽組織與血管新生；⑤2-8週：膠原纖維化形成疤痕。故梗塞「初期」浸潤細胞為嗜中性球（A）。","options":{"A":"正確：心肌梗塞初期浸潤嗜中性白血球。","B":"嗜酸性球非梗塞初期主角。","C":"淋巴球非梗塞初期主角。","D":"漿細胞非梗塞初期主角。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-39":{"quick":"體檢最常發現的心瓣膜異常是僧帽瓣脫垂（mitral valve prolapse），故選B。","detail":{"background":"僧帽瓣脫垂（mitral valve prolapse, MVP）是最常見的心瓣膜異常（盛行率約2-3%，年輕女性多），瓣葉黏液樣變性、增厚冗長，收縮期向左心房膨出，聽診有「收縮中期喀擊聲＋收縮晚期雜音」，多數無症狀、預後良好，偶有僧帽瓣逆流、心律不整或心內膜炎風險。故常規體檢最常發現者為MVP（B）。主動脈瓣狹窄/閉鎖不全、僧帽瓣鈣化較少見且多有症狀。","options":{"A":"僧帽瓣鈣化多見於老年，非體檢最常見。","B":"正確：僧帽瓣脫垂是最常見心瓣膜異常。","C":"主動脈瓣狹窄較少見。","D":"主動脈瓣閉鎖不全較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-39":{"quick":"與吸菸「較無」密切關係的是腦癌，故選A。","detail":{"background":"吸菸是多種疾病的重要危險因子：肺癌（最相關）、慢性支氣管炎與肺氣腫（COPD）、心肌梗塞與動脈粥狀硬化、膀胱癌、口腔/喉/食道/胰臟癌等。而「腦癌（原發性腦瘤）」與吸菸關係不明確、較無密切關聯。故選A。題中B（COPD）、C（肺癌）、D（心肌梗塞）皆與吸菸高度相關。","options":{"A":"正確：腦癌與吸菸較無密切關係。","B":"慢性支氣管炎肺氣腫與吸菸高度相關。","C":"肺癌與吸菸最相關。","D":"心肌梗塞與吸菸相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-40":{"quick":"肺栓子最常見來源是「下肢靜脈栓塞」，故選C。","detail":{"background":"肺血栓栓塞（pulmonary embolism）的栓子超過95%來自「下肢深部靜脈血栓（DVT）」（尤其膕靜脈以上的近端DVT），血栓脫落經下腔靜脈、右心進入肺動脈。危險因子為Virchow三要素（久臥、術後、骨折、惡性腫瘤、口服避孕藥、懷孕等）。故最常見來源為下肢靜脈栓塞（C）。腹/胸主動脈是動脈系統（栓子去全身非肺）、川崎病是冠狀動脈炎。","options":{"A":"腹主動脈是動脈系統，栓子不入肺。","B":"胸主動脈夾層非肺栓子來源。","C":"正確：下肢深部靜脈血栓是肺栓子最常見來源。","D":"川崎病是冠狀動脈炎，非肺栓子來源。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-40":{"quick":"嬰兒最常見的先天性心臟病是心室中膈缺損（VSD），故選B。","detail":{"background":"心室中膈缺損（ventricular septal defect, VSD）是「最常見的先天性心臟病」（單一病灶最常見），為左右心室間有缺損，造成左向右分流（無發紺，acyanotic），大缺損可致肺高壓與心衰竭（小缺損可自行閉合）。其他常見先天心：心房中膈缺損、開放性動脈導管。法洛氏四重症是最常見的「發紺型」先天心。故嬰兒最常見為VSD（B）。","options":{"A":"心房中膈缺損常見但VSD更常見。","B":"正確：心室中膈缺損是最常見先天性心臟病。","C":"房室中膈缺損與唐氏症相關但較少見。","D":"法洛氏四重症是最常見發紺型，非整體最常見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-38":{"quick":"錯誤敘述為C：法洛氏四重症是「右心室」出口（肺動脈）阻塞，非左心室，故選C。","detail":{"background":"法洛氏四重症（Tetralogy of Fallot）四個病變：①心室中膈缺損（VSD，A）；②主動脈跨騎於VSD之上（騎跨主動脈，B）；③「肺動脈狹窄／右心室出口阻塞（pulmonary stenosis）」——題說「左心室出口阻塞」錯，應為「右心室」出口（C為錯誤）；④右心室肥大（D）。因右心室出口阻塞使缺氧血經VSD進入主動脈，造成「發紺（cyanosis）」，是最常見的發紺型先天心。故錯誤為C。","options":{"A":"心室中膈缺損是TOF特徵，正確。","B":"主動脈騎跨VSD，正確。","C":"正確（為錯誤敘述）：是右心室出口（肺動脈）阻塞，非左心室。","D":"右心室肥大，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-39":{"quick":"心肌梗塞約「2-8週」產生明顯纖維化，故選D。","detail":{"background":"心肌梗塞修復時序：嗜中性球浸潤（1-3天）→巨噬細胞清除壞死（3-7天）→肉芽組織與新生血管（1-2週）→「膠原纖維化、疤痕形成（約2-8週，6週後成熟疤痕）」。故「明顯纖維化」出現於約2-8週（D）。此時心肌已被無收縮力的纖維疤痕取代，可形成心室壁瘤。","options":{"A":"3-6天是巨噬細胞清除期。","B":"7-9天是肉芽組織早期。","C":"10-12天肉芽組織持續，尚未明顯纖維化。","D":"正確：2-8週產生明顯纖維化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-34":{"quick":"最不容易造成血栓的是「肌肉層增生」，故選A。","detail":{"background":"造成血管內血栓的病理變化（符合Virchow三要素的內皮損傷與血流異常）：動脈瘤（aneurysm，血流紊亂淤滯，B）、粥狀動脈硬化（內皮損傷與斑塊破裂，C）、血管炎（內皮損傷，D）皆易致血栓。而「血管肌肉層增生（hyperplasia）」本身不直接損傷內皮或造成血流紊亂，最不易致血栓。故選A。","options":{"A":"正確：肌肉層增生最不易造成血栓。","B":"動脈瘤血流淤滯紊亂易致血栓。","C":"粥狀硬化內皮損傷與斑塊破裂易致血栓。","D":"血管炎損傷內皮易致血栓。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-40":{"quick":"阿索夫氏小體（Aschoff body）是「風濕熱」的特徵，故選C。","detail":{"background":"阿索夫氏小體（Aschoff body）是「風濕性心臟炎（風濕熱）」的特徵性病灶——一種肉芽腫樣結節，中央纖維素樣壞死，周圍有特殊的Aschoff巨細胞與Anitschkow細胞（毛毛蟲核）。風濕熱是A群鏈球菌咽炎後的自體免疫反應（分子模擬），侵犯心臟（全心炎）、關節、皮膚、神經，慢性可致僧帽瓣狹窄。故Aschoff body見於風濕熱（C）。","options":{"A":"心肌梗塞無Aschoff body。","B":"病毒性心肌炎是淋巴球浸潤，非Aschoff body。","C":"正確：Aschoff body是風濕熱特徵。","D":"黏液瘤是心臟腫瘤，非Aschoff body。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-40":{"quick":"最易侵犯主動脈滋養管致動脈瘤的傳染病是梅毒，故選A。","detail":{"background":"第三期梅毒的「梅毒性主動脈炎（syphilitic aortitis）」：梅毒螺旋體侵犯「主動脈（升主動脈為主）的血管滋養管（vasa vasorum）」，造成閉塞性動脈內膜炎，使主動脈中層壞死、彈性纖維破壞、管壁變弱，形成「梅毒性主動脈瘤（胸主動脈瘤）」與主動脈瓣閉鎖不全。故侵犯vasa vasorum致動脈瘤者為梅毒（A）。結核、痲瘋、白喉非典型此機轉。","options":{"A":"正確：梅毒侵犯主動脈vasa vasorum致動脈瘤。","B":"結核非主動脈滋養管動脈瘤典型病因。","C":"痲瘋侵犯周邊神經皮膚，非主動脈。","D":"白喉以毒素損心肌神經，非主動脈瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-34":{"quick":"最不易造成全身性血栓栓塞的栓子是「肺動脈瓣鈣化」，故選B。","detail":{"background":"全身性（systemic）血栓栓塞的栓子來自「左心系統或動脈」，隨體循環去全身器官（腦、腎、脾、腸、下肢）：左心室壁血栓（心肌梗塞後，A）、擴大左心房的血塊（心房顫動，C）、二尖瓣感染性心內膜炎的贅生物（D）皆可成栓子去全身。而「肺動脈瓣」位於右心輸出，其鈣化變性產生的栓子會進入「肺循環」（造成肺栓塞），不會去全身循環。故最不易致全身性栓塞者為肺動脈瓣鈣化（B）。","options":{"A":"左心室壁血栓去全身循環。","B":"正確：肺動脈瓣栓子進肺循環，非全身。","C":"左心房血塊（房顫）去全身循環。","D":"二尖瓣贅生物去全身循環。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-44":{"quick":"威利氏環好發的動脈瘤是漿果型動脈瘤（berry aneurysm），故選B。","detail":{"background":"漿果型（囊狀）動脈瘤（berry/saccular aneurysm）好發於腦底部「威利氏環（circle of Willis）」的動脈分叉處（尤其前交通動脈、後交通動脈、中大腦動脈分叉），因該處血管壁中層先天較薄弱。破裂會造成「自發性蛛網膜下腔出血（SAH）」（突發劇烈頭痛、頸僵硬），死亡率高。故威利氏環動脈瘤為漿果型（B）。分割性動脈瘤是主動脈剝離、蜿蜒狀是動靜脈畸形。","options":{"A":"囊狀是廣義形態，題給更精確的漿果型。","B":"正確：威利氏環好發漿果型（berry）動脈瘤。","C":"蜿蜒狀動脈瘤見於動靜脈畸形。","D":"分割性（剝離）動脈瘤見於主動脈。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-40":{"quick":"痔瘡的成因「不」包括動脈粥狀硬化，故選A。","detail":{"background":"痔瘡（hemorrhoid）是肛門直腸「靜脈叢」曲張，與「靜脈壓升高」相關：長期便秘用力排便（C）、懷孕（子宮壓迫靜脈回流，D）、肝硬化門脈高壓（B，門脈-體循環側枝）、久坐久站、老化。而「動脈粥狀硬化」是「動脈」病變，與痔瘡（靜脈曲張）無關。故不包括者為A。","options":{"A":"正確：動脈粥狀硬化是動脈病變，與痔瘡（靜脈）無關。","B":"肝硬化門脈高壓致痔靜脈曲張。","C":"長期便秘用力致痔瘡。","D":"懷孕壓迫靜脈致痔瘡。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-43":{"quick":"與外毒素「無關」的是大腸桿菌引發的敗血性休克（屬內毒素），故選D。","detail":{"background":"外毒素（exotoxin，活菌分泌的蛋白毒素）相關疾病：白喉毒素致心肌炎與神經病變（A）、霍亂弧菌腸毒素致大量水瀉（B）、破傷風桿菌的痙攣毒素致骨骼肌強直痙攣（C）。而「大腸桿菌（革蘭氏陰性）引發的敗血性休克」是「內毒素（endotoxin/LPS，細胞壁脂多醣）」所致，非外毒素。故與外毒素無關者為D。","options":{"A":"白喉性心肌炎由外毒素致，相關。","B":"霍亂腸毒素是外毒素，相關。","C":"破傷風痙攣毒素是外毒素，相關。","D":"正確：大腸桿菌敗血性休克是內毒素（LPS），非外毒素。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-39":{"quick":"最不可能引起左心衰竭的是「肺動脈狹窄」，故選D。","detail":{"background":"左心衰竭的病因是增加左心負荷或損傷左心：主動脈瓣功能不全（容量負荷，A）、二尖瓣功能不全（容量負荷，B）、缺血性心臟病（心肌損傷，C）、高血壓、主動脈瓣狹窄。而「肺動脈狹窄（pulmonary stenosis）」增加的是「右心室」後負荷，造成「右心」肥大與衰竭，不會直接引起左心衰竭。故最不可能者為D。","options":{"A":"主動脈瓣功能不全增加左心容量負荷，致左心衰。","B":"二尖瓣功能不全致左心容量負荷。","C":"缺血性心臟病損傷左心。","D":"正確：肺動脈狹窄影響右心，非左心衰竭。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-36":{"quick":"心臟原發性腫瘤機率最高的腔室是左心房，故選A。","detail":{"background":"心臟原發性腫瘤罕見，最常見的良性原發腫瘤是「黏液瘤（myxoma）」，約75-80%發生於「左心房」（多附於卵圓窩附近的心房中膈），帶蒂可阻塞二尖瓣造成類似二尖瓣狹窄的症狀、栓塞與全身症狀。故原發腫瘤機率最高的腔室為左心房（A）。（心臟最常見的腫瘤其實是轉移性，但問原發以左心房黏液瘤為主。）","options":{"A":"正確：左心房是原發性心臟腫瘤（黏液瘤）最好發處。","B":"左心室較少見原發腫瘤。","C":"右心房較左心房少。","D":"右心室較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-41":{"quick":"雷諾現象＋食道運動障礙＋ANA陽性，最可能是局限性硬皮病（CREST），故選D。","detail":{"background":"局限型全身性硬化症（limited systemic sclerosis，舊稱CREST症候群）特徵：C鈣質沉積（Calcinosis）、R雷諾現象（Raynaud）、E食道運動障礙（Esophageal dysmotility）、S指端硬化（Sclerodactyly）、T微血管擴張（Telangiectasia），抗著絲點抗體（anti-centromere）陽性、ANA陽性。題述雷諾＋食道運動障礙＋ANA陽性典型符合（D）。SLE、Sjögren、Graves不以此組合表現。故選D。","options":{"A":"SLE以多系統免疫複合體病變為主，非此典型組合。","B":"Sjögren是乾眼乾口。","C":"Graves是甲狀腺亢進。","D":"正確：局限性硬皮病（CREST）含雷諾＋食道運動障礙。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-35":{"quick":"堵塞性血栓血管炎（Buerger病）最常侵犯「腳（下肢末梢）」血管，故選B。","detail":{"background":"堵塞性血栓血管炎（thromboangiitis obliterans，Buerger病/伯格氏病）：好發於年輕「重度吸菸」男性，是中小動靜脈的節段性發炎與血栓，最常侵犯「四肢末梢（尤其下肢/腳）」血管，造成肢端缺血、間歇性跛行、靜止痛、缺血性潰瘍與壞疽（嚴重需截肢），戒菸是關鍵治療。故最常侵犯腳（B）。","options":{"A":"腦非Buerger病主要侵犯處。","B":"正確：Buerger病最常侵犯下肢（腳）末梢血管。","C":"腎非Buerger病主侵犯處。","D":"脾非Buerger病主侵犯處。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-42":{"quick":"慢性右心衰竭致肝中央區出血性壞死稱「荳蔻肝（nutmeg liver）」，故選B。","detail":{"background":"慢性右側（或全心）心臟衰竭使體循環鬱血、肝靜脈回流受阻，肝小葉「中央靜脈周圍（中央區）」鬱血、缺氧，造成中央區肝細胞出血性壞死，而周邊區脂肪變性，切面呈紅黃相間斑駁狀，似肉荳蔻剖面，稱「荳蔻肝（nutmeg liver）」。長期可致心源性肝硬化。故選B。","options":{"A":"脂肪肝是脂肪變性，非此鬱血壞死。","B":"正確：慢性右心衰竭致荳蔻肝（中央區出血壞死）。","C":"肉芽腫是慢性發炎，非鬱血。","D":"潰瘍是表面壞死，非肝鬱血。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112030-N1-28":{"quick":"兒童最常見的後天性心臟病是川崎氏病（Kawasaki disease），故選A。","detail":{"background":"川崎氏病（Kawasaki disease）是嬰幼兒「後天性」心臟病的最常見原因——一種急性中小動脈血管炎（病因不明，疑感染誘發免疫），好發5歲以下，特徵：持續高燒>5天、雙側非化膿性結膜炎、草莓舌與口唇紅裂、皮疹、頸淋巴結腫、手足硬腫脫皮。最嚴重併發症是「冠狀動脈瘤」（致心肌梗塞猝死），治療用免疫球蛋白與阿斯匹靈。故兒童最常見後天性心臟病為川崎病（A）。","options":{"A":"正確：川崎氏病是兒童最常見後天性心臟病。","B":"心肌梗塞罕見於兒童。","C":"高血壓心臟病非兒童常見。","D":"細菌性心內膜炎較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-23":{"quick":"粥狀硬化引起的動脈瘤最常發生於「腹部（腹主動脈）」，故選C。","detail":{"background":"動脈粥狀硬化是「腹主動脈瘤（abdominal aortic aneurysm, AAA）」的最常見原因——粥狀斑塊破壞主動脈中層、管壁變弱而膨出，最常發生於「腎動脈以下的腹主動脈」（該處無滋養血管、易受粥狀硬化）。好發老年男性吸菸者，破裂死亡率極高（突發腹/背痛、休克）。故粥狀硬化動脈瘤最常於腹部（C）。（梅毒性動脈瘤則好發胸主動脈。）","options":{"A":"頸部非粥狀硬化動脈瘤好發處。","B":"胸主動脈瘤多與梅毒/結締組織病相關。","C":"正確：粥狀硬化動脈瘤最常於腹主動脈。","D":"大腿非主要好發處。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-21":{"quick":"最易出現脂褐質（lipofuscin）沉積的是「萎縮的心肌細胞」，故選A。","detail":{"background":"脂褐質（lipofuscin，脂褐素）是細胞內脂質過氧化的不可消化殘餘物（自由基損傷產物），堆積於「老化或萎縮」的細胞中，呈黃棕色顆粒，故又稱「磨損色素（wear and tear pigment）」，最常見於老化萎縮的「心肌細胞」與肝細胞、神經元（致器官呈棕色萎縮，brown atrophy）。故最易沉積者為萎縮的心肌細胞（A）。泡沫細胞含的是脂質與膽固醇（非脂褐質）。","options":{"A":"正確：萎縮老化的心肌細胞最易沉積脂褐質。","B":"增生脂肪細胞含三酸甘油脂，非脂褐質。","C":"肥大肌肉非脂褐質典型沉積處。","D":"泡沫細胞含氧化LDL，非脂褐質。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-25":{"quick":"最常引起心肌炎的原因是病毒，故選A。","detail":{"background":"心肌炎（myocarditis）最常見病因是「病毒感染」（柯薩奇病毒B、腺病毒、流感、COVID等），病毒直接損傷或引發免疫媒介心肌損傷，組織學見淋巴球浸潤與心肌壞死。其他較少見：細菌、披衣菌、立克次體、寄生蟲（Chagas）、藥物過敏、自體免疫。故最常見為病毒（A）。","options":{"A":"正確：病毒是心肌炎最常見原因。","B":"黴菌性心肌炎少見（免疫低下者）。","C":"披衣菌少見。","D":"立克次體少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-26":{"quick":"不是動脈粥狀硬化高危險因子的是「嚼檳榔」，故選D。","detail":{"background":"動脈粥狀硬化的主要危險因子：高血脂（尤其高LDL，A）、高血壓（B）、抽菸（C）、糖尿病、男性、年齡、家族史、肥胖、缺乏運動。而「嚼檳榔」主要與「口腔癌、口腔黏膜下纖維化」相關，不是動脈粥狀硬化的典型危險因子。故選D。","options":{"A":"高血脂是動脈粥狀硬化危險因子。","B":"高血壓是危險因子。","C":"抽菸是危險因子。","D":"正確：嚼檳榔與口腔癌相關，非動脈粥狀硬化危險因子。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-21":{"quick":"與營養不良性鈣化「最不相關」的是高血鈣致腎鈣化（屬轉移性鈣化），故選C。","detail":{"background":"病理性鈣化兩型：①營養不良性鈣化（dystrophic calcification）——發生在「受損/壞死的組織」，血鈣「正常」，如動脈粥狀硬化斑塊（A）、胰臟炎脂肪壞死的皂化鈣化（B）、受損心臟瓣膜（D）、結核病灶、陳舊血栓；②轉移性鈣化（metastatic calcification）——發生在「正常組織」，因「高血鈣（如副甲狀腺亢進、維生素D過量）」沉積於腎、肺、胃黏膜等。題中C「高血鈣導致腎鈣化」屬「轉移性」鈣化，與營養不良性鈣化最不相關。故選C。","options":{"A":"粥狀斑塊鈣化是營養不良性鈣化。","B":"胰臟炎脂肪壞死鈣化是營養不良性鈣化。","C":"正確：高血鈣致腎鈣化是轉移性鈣化，非營養不良性。","D":"受損瓣膜鈣化是營養不良性鈣化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-25":{"quick":"心肌梗塞病理時序為3→1→2→4，即凝固性壞死→嗜中性球→巨噬細胞→肉芽組織，故選C。","detail":{"background":"心肌梗塞病理變化時序：③心肌「凝固性壞死（coagulative necrosis）」最先出現（數小時-1天）→①「嗜中性白血球浸潤」（1-3天急性發炎）→②「巨噬細胞」清除死亡細胞（3-7天）→④「肉芽組織與膠原纖維」堆積修復（1-8週纖維化）。故順序為3→1→2→4（選C，3124）。記憶：壞死→中性球→巨噬細胞→纖維化。","options":{"A":"1432順序錯（嗜中性球不在最先）。","B":"2143順序錯。","C":"正確：3124（凝固壞死→嗜中性球→巨噬細胞→肉芽組織）。","D":"4231順序錯。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-25":{"quick":"造成主動脈及分支發炎狹窄、無脈症的是高安氏動脈炎（Takayasu arteritis），故選A。","detail":{"background":"高安氏動脈炎（Takayasu arteritis，無脈症pulseless disease）是大血管炎，好發年輕亞洲女性，侵犯「主動脈及其主要分支（尤其主動脈弓分支）」，造成肉芽腫性發炎、管壁增厚與「狹窄」，使上肢脈搏減弱或摸不到（無脈症）、血壓差異、頭暈、間歇性跛行。故無脈症為高安氏動脈炎（A）。川崎病侵犯冠狀動脈、韋格納肉芽腫侵犯上下呼吸道與腎、Buerger病侵犯四肢末梢。","options":{"A":"正確：高安氏動脈炎侵犯主動脈分支致無脈症。","B":"川崎病侵犯冠狀動脈（兒童）。","C":"韋格納肉芽腫侵犯呼吸道與腎。","D":"Buerger病侵犯四肢末梢小血管。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114100-N1-22":{"quick":"鬱血性心衰竭肺水腫最相關的機制是「肺微血管靜水壓增加」，故選A。","detail":{"background":"鬱血性心衰竭（左心衰竭）的肺水腫機制：左心無法有效排血，血液回堵肺循環，使「肺微血管靜水壓（hydrostatic pressure）增加」，液體依Starling力被推出微血管進入肺間質與肺泡，造成肺水腫。故最相關機制為肺微血管靜水壓增加（A）。膠體滲透壓下降（低白蛋白，如腎病）、通透性增加（如ARDS發炎）、淋巴阻塞是其他水腫機制，非心衰竭肺水腫主因。","options":{"A":"正確：心衰竭致肺微血管靜水壓增加而肺水腫。","B":"膠體滲透壓降低見於低白蛋白（腎病/肝病），非心衰竭主因。","C":"通透性增加見於ARDS發炎。","D":"淋巴阻塞非心衰竭肺水腫主因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-24":{"quick":"心肌梗塞後「4小時內」肉眼與光鏡都無明顯變化，故選B。","detail":{"background":"心肌梗塞的病理在最初期無法察覺：「梗塞後約0-4小時內」，無論肉眼或光學顯微鏡都「看不出明顯變化」（細胞已缺血受損但形態尚未改變）；約4-12小時開始出現凝固性壞死的早期變化（如波浪狀纖維、收縮帶壞死）、肉眼蒼白；1天後明顯。電子顯微鏡或生化標記（troponin）可更早偵測。故「4小時內」無明顯變化（B）。","options":{"A":"12小時後已有早期變化。","B":"正確：4小時內肉眼與光鏡無明顯變化。","C":"1天後已有明顯壞死變化。","D":"7天後已進入修復期。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-25":{"quick":"急性心肌梗塞最常見的病因是「冠狀動脈粥狀硬化致血管阻塞」，故選C。","detail":{"background":"急性心肌梗塞（acute myocardial infarction）最常見、最重要的病因是「冠狀動脈粥狀硬化（atherosclerosis）」——斑塊破裂或糜爛使其上形成「血栓」，急性阻塞冠狀動脈，使該供血區心肌缺血壞死。故主因為冠狀動脈粥狀硬化血栓阻塞（C）。冠狀動脈痙攣（如Prinzmetal/變異型）、血管炎、栓塞是少數其他原因。故選C。","options":{"A":"細菌性心內膜炎非心肌梗塞主因。","B":"冠狀動脈痙攣是少數原因。","C":"正確：冠狀動脈粥狀硬化血栓阻塞是心肌梗塞最常見病因。","D":"血管炎是少數原因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-41":{"quick":"肺氣腫（emphysema）與「抽菸」最有關，故選A。","detail":{"background":"肺氣腫（emphysema）是慢性阻塞性肺病（COPD）的一型，特徵是「終末細支氣管遠端的肺泡壁被破壞、肺泡腔擴大」、彈性回縮喪失。最主要的危險因子是「抽菸」（中央小葉型最常見）——香菸煙霧引起發炎，使嗜中性球與巨噬細胞釋出蛋白酶（彈性蛋白酶），破壞肺泡壁。少數因先天「α1-抗胰蛋白酶缺乏」（全小葉型，年輕非吸菸者）。故與肺氣腫最有關者為抽菸（A）。","options":{"A":"正確：抽菸是肺氣腫最主要危險因子。","B":"流感是急性病毒感染，非肺氣腫主因。","C":"喝酒與肺氣腫無關。","D":"自體免疫非肺氣腫典型病因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-40":{"quick":"與氣胸（pneumothorax）關聯性「最低」的是肺癌，故選D。","detail":{"background":"氣胸（pneumothorax）是空氣進入肋膜腔使肺塌陷。原發性自發氣胸多見於瘦高年輕男性（肺尖小泡bleb破裂）；繼發性氣胸與既有肺病相關——肺氣腫（肺大泡破裂，A）、氣喘（過度充氣，B）、結核病（空洞破入肋膜，C）皆可致氣胸。肺癌相對與氣胸關聯性「最低」（雖空洞型肺癌偶可，但非典型）。故選D。","options":{"A":"肺氣腫肺大泡破裂可致氣胸。","B":"氣喘過度充氣可致氣胸。","C":"結核空洞破裂可致氣胸。","D":"正確：肺癌與氣胸關聯性最低。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-40":{"quick":"支氣管擴張（bronchiectasis）最常併發「細菌感染」，故選A。","detail":{"background":"支氣管擴張（bronchiectasis）是支氣管因反覆感染與發炎，管壁平滑肌與彈性組織被破壞而「永久不可逆擴張」，造成大量膿痰、慢性咳嗽、咳血。其與「細菌感染」形成惡性循環——擴張的支氣管引流不良、痰液滯留，反覆細菌（綠膿桿菌、金黃葡萄球菌、流感嗜血桿菌）感染加重破壞。故最常併發細菌感染（A）。常見於囊性纖維化、纖毛功能障礙、阻塞、慢性感染後。","options":{"A":"正確：支氣管擴張最常併發細菌感染（惡性循環）。","B":"病毒感染非主要併發。","C":"寄生蟲感染非主要併發。","D":"支氣管癌非主要併發。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-39":{"quick":"抽菸與「肺栓塞」較無關，故選A。","detail":{"background":"抽菸與多種肺病相關：肺癌（B，最相關）、肺氣腫（C）、慢性支氣管炎（D）——皆因香菸傷害氣道與肺實質。而「肺栓塞」是來自下肢深部靜脈血栓的栓子阻塞肺動脈，主要危險因子是Virchow三要素（久臥、術後、骨折、惡性腫瘤、口服避孕藥等），與抽菸關聯較低（雖抽菸可輕微增加凝血傾向，但非主要）。故較無關者為肺栓塞（A）。","options":{"A":"正確：肺栓塞主因是DVT，與抽菸較無關。","B":"肺癌與抽菸最相關。","C":"肺氣腫與抽菸相關。","D":"慢性支氣管炎與抽菸相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-38":{"quick":"最常見的肺癌組織型是「腺癌（adenocarcinoma）」，故選A。","detail":{"background":"近年肺癌組織型以「腺癌（adenocarcinoma）」最常見（取代過去的鱗狀細胞癌），尤其女性與不吸菸者，好發於肺「周邊」，與EGFR等基因突變相關（可標靶治療）。其他：鱗狀細胞癌（中央、與吸菸最相關、可空洞與角化）、小細胞癌（中央、神經內分泌、吸菸、早轉移）、大細胞癌（未分化）。故最常見為腺癌（A）。","options":{"A":"正確：腺癌是目前最常見的肺癌組織型。","B":"鱗狀細胞癌過去常見，現次於腺癌。","C":"小細胞癌約佔15%。","D":"大細胞癌較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-38":{"quick":"間皮瘤（mesothelioma）與「石棉」關係最密切，故選B。","detail":{"background":"惡性間皮瘤（malignant mesothelioma）是源自肋膜（或腹膜）間皮的惡性腫瘤，與「石棉（asbestos）」暴露關係最密切（潛伏期可達20-40年），即使少量石棉暴露也可致病，吸菸會加乘風險。石棉相關疾病還有石棉肺（間質纖維化）、肋膜斑、肺癌、喉癌。矽塵致矽肺、碳粉致煤工塵肺。故間皮瘤與石棉最相關（B）。","options":{"A":"矽致矽肺，非間皮瘤主因。","B":"正確：石棉與間皮瘤關係最密切。","C":"碳粉致煤工塵肺。","D":"塵蟎與過敏相關，非間皮瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-39":{"quick":"大葉性肺炎中巨噬細胞與纖維芽細胞最多的時期是「消解期（resolution）」，故選D。","detail":{"background":"大葉性肺炎（lobar pneumonia，肺炎鏈球菌）的四期病程：①充血期（congestion，血管充血、漿液滲出）；②紅色肝變期（red hepatization，肺泡充滿紅血球、纖維蛋白、嗜中性球，肺實變如肝）；③灰色肝變期（gray hepatization，紅血球溶解、纖維膿性滲出，灰色）；④「消解期（resolution）」——「巨噬細胞」大量出現清除滲出物與碎屑、纖維芽細胞參與修復，肺泡結構逐漸恢復。故巨噬細胞與纖維芽細胞最多在消解期（D）。","options":{"A":"充血期以血管充血漿液為主。","B":"紅色肝變期以紅血球纖維蛋白為主。","C":"灰色肝變期以纖維膿性滲出為主。","D":"正確：消解期巨噬細胞與纖維芽細胞最多（清除修復）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-40":{"quick":"間皮瘤（mesothelioma）好發於「肋膜」，故選D。","detail":{"background":"惡性間皮瘤源自體腔的「間皮（mesothelium）」，最常發生於「肋膜（pleura，胸膜）」（也可腹膜、心包），與石棉暴露密切相關。腫瘤瀰漫包裹肺、造成胸痛、呼吸困難、血性肋膜積液，預後極差。故間皮瘤好發於肋膜（D）。支氣管、細支氣管、肺泡是肺實質，非間皮所在。","options":{"A":"支氣管是氣道，非間皮。","B":"細支氣管非間皮。","C":"肺泡非間皮。","D":"正確：間皮瘤好發於肋膜（胸膜間皮）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-41":{"quick":"女性最常罹患的肺癌是「腺癌（adenocarcinoma）」，故選B。","detail":{"background":"肺腺癌（adenocarcinoma）是「女性」與「不吸菸者」最常見的肺癌組織型，好發於肺周邊，常帶EGFR、ALK等驅動基因突變（可標靶治療）。相對地，鱗狀細胞癌與小細胞癌與「吸菸」更相關（男性過去較多）。故女性最常見肺癌為腺癌（B）。","options":{"A":"鱗狀細胞癌與吸菸最相關（男性過去較多）。","B":"正確：女性最常見肺癌是腺癌。","C":"小細胞癌與吸菸相關。","D":"大細胞癌較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-39":{"quick":"肺癌標靶治療最主要針對「EGFR」基因突變，故選C。","detail":{"background":"肺腺癌的標靶治療最主要針對「表皮生長因子受體（EGFR）」基因突變——EGFR突變（尤其亞洲不吸菸女性常見）可用EGFR酪胺酸激酶抑制劑（gefitinib、erlotinib、osimertinib）治療，療效佳。其他可標靶的驅動基因有ALK、ROS1、KRAS（G12C）。p53是腫瘤抑制基因（非標靶熱點）、Her2主要在乳癌。故肺癌標靶最主要為EGFR（C）。","options":{"A":"p53是腫瘤抑制基因，非標靶主要對象。","B":"KRAS過去難標靶（近年G12C才有藥），非最主要。","C":"正確：EGFR是肺腺癌標靶治療最主要對象。","D":"Her2/Neu主要在乳癌。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-43":{"quick":"Crohn病正確敘述為D：比潰瘍性大腸炎易發生腸道狹窄，故選D。","detail":{"background":"克隆氏病（Crohn disease）特徵：跳躍式病灶、「全層（transmural）發炎」、可侵犯消化道任何部位（末端迴腸最常）、「非乾酪性肉芽腫（non-caseating granuloma，A說易出現乾酪性肉芽腫錯，乾酪性是結核）」、卵石樣黏膜、瘻管。因全層發炎與纖維化，「比潰瘍性大腸炎更易發生腸道狹窄（stricture）與瘻管」（D正確）。C錯——兩者皆可有腸道外免疫表現（關節炎、虹彩炎等）；B錯——潰瘍性大腸炎的大腸癌風險「較高」（全大腸瀰漫黏膜病變）。故選D。","options":{"A":"Crohn是非乾酪性肉芽腫，乾酪性是結核。","B":"潰瘍性大腸炎大腸癌風險較高，非Crohn。","C":"兩者皆可有腸道外免疫疾病。","D":"正確：Crohn全層發炎纖維化，較易腸道狹窄。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-39":{"quick":"慢性支氣管炎最主要的病理特徵是「支氣管黏膜腺體增生」，故選C。","detail":{"background":"慢性支氣管炎（chronic bronchitis）臨床定義為「連續兩年、每年至少三個月有咳嗽痰」。病理特徵是「支氣管黏膜下黏液腺體增生肥大、杯狀細胞增多」（Reid指數增加），造成黏液分泌「增多」（B說減少錯）、慢性咳嗽痰多。主要病因是抽菸。並非嗜酸性球（那是氣喘）或色素沉澱。故最主要病理特徵為黏膜腺體增生（C）。","options":{"A":"大量嗜酸性球是氣喘特徵，非慢性支氣管炎。","B":"分泌物應「增多」而非減少。","C":"正確：支氣管黏膜下腺體增生是慢性支氣管炎特徵。","D":"色素沉澱非慢性支氣管炎主要特徵。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-39":{"quick":"錯誤敘述為D：氣喘是支氣管壁肌肉「肥大」而非萎縮，故選D。","detail":{"background":"慢性氣喘（asthma）的病理變化（氣道重塑）：①支氣管上皮基底膜增厚（A正確）；②支氣管壁嗜伊紅性白血球與肥大細胞浸潤（過敏性發炎，B正確）；③黏膜下腺體與杯狀細胞增生、黏液栓（C正確）；④「支氣管平滑肌『肥大與增生』」——題說「肌肉萎縮」錯（D為錯誤，應為肥大）。平滑肌肥大使支氣管易痙攣收縮。故錯誤為D。","options":{"A":"基底膜增厚是氣喘特徵，正確。","B":"嗜伊紅性球浸潤是氣喘特徵，正確。","C":"黏膜下腺體增大，正確。","D":"正確（為錯誤敘述）：氣喘是平滑肌「肥大」非萎縮。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-39":{"quick":"吸入「石棉」最可能導致間皮瘤，故選C。","detail":{"background":"吸入「石棉（asbestos）」纖維是惡性間皮瘤（mesothelioma）最主要的危險因子，潛伏期長達20-40年，少量暴露即可致病。石棉也致石棉肺（肺纖維化）、肺癌、喉癌。矽末致矽肺、碳粉致煤工塵肺、一般灰塵刺激較輕。故導致間皮瘤者為石棉（C）。","options":{"A":"碳粉致煤工塵肺，非間皮瘤。","B":"矽末致矽肺。","C":"正確：石棉導致間皮瘤。","D":"一般灰塵非間皮瘤病因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-40":{"quick":"黴漿菌肺炎病理特徵是「淋巴球及組織球浸潤於細支氣管旁肺泡間質」（非典型/間質性肺炎），故選B。","detail":{"background":"黴漿菌（Mycoplasma pneumoniae）肺炎是「非典型肺炎（atypical/walking pneumonia）」：病理為「間質性肺炎」——淋巴球與組織球（單核細胞）浸潤於細支氣管周圍的「肺泡間質與肺泡壁」，而非肺泡腔內化膿（B正確）。臨床乾咳、低燒、症狀較輕（C說高燒濃痰是典型細菌性肺炎，錯）；非大葉性（A錯，大葉性是肺炎鏈球菌）；黴漿菌無細胞壁、不能用一般染色檢出（D錯，甲苯胺藍非其檢測法）。故選B。","options":{"A":"大葉性肺炎是肺炎鏈球菌，非黴漿菌。","B":"正確：黴漿菌致間質性肺炎（淋巴球組織球浸潤間質）。","C":"高燒濃痰是典型細菌性肺炎，非黴漿菌。","D":"黴漿菌無細胞壁，非甲苯胺藍檢出。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-35":{"quick":"岡氏複合體（Ghon complex）是「結核桿菌」感染的病理特徵，故選A。","detail":{"background":"岡氏複合體（Ghon complex）是「原發性肺結核（Mycobacterium tuberculosis感染）」的特徵：包括肺實質的原發病灶（Ghon focus，多在肺中葉/下葉上部的乾酪性肉芽腫）＋引流的肺門淋巴結病變。癒合後鈣化稱Ranke complex。故岡氏複合體為結核桿菌感染（A）。麴菌、隱球菌、毛黴菌是其他黴菌。","options":{"A":"正確：岡氏複合體是結核桿菌感染特徵。","B":"麴菌致麴菌病，非岡氏複合體。","C":"隱球菌致隱球菌病。","D":"毛黴菌致毛黴菌病。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-36":{"quick":"岡氏複合體（Ghon complex）是「原發性結核病」的表現，故選A。","detail":{"background":"岡氏複合體（Ghon complex）＝肺原發病灶（Ghon focus）＋肺門淋巴結病變，是「原發性結核病（primary tuberculosis）」（初次感染，多在兒童）的特徵性表現。繼發性（再活化）結核則好發於肺尖、形成空洞。結核性腸炎、粟粒性結核是其他擴散型式。故岡氏複合體屬原發性結核（A）。","options":{"A":"正確：岡氏複合體是原發性結核病的表現。","B":"繼發性結核好發肺尖、空洞，非岡氏複合體。","C":"結核性腸炎是腸道擴散。","D":"粟粒狀結核是血行播散。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-37":{"quick":"肺泡內充滿泡沫狀嗜酸性物質的肺炎是肺囊蟲（Pneumocystis jirovecii）肺炎，故選A。","detail":{"background":"肺囊蟲肺炎（Pneumocystis jirovecii pneumonia, PJP，舊稱PCP）是AIDS等免疫低下者的伺機性感染：組織學特徵是「肺泡內充滿泡沫狀（foamy）、嗜酸性的滲出物」（內含囊蟲），銀染（GMS）或免疫染色可見圓形囊體。臨床乾咳、進行性呼吸困難、低血氧。故泡沫狀嗜酸性物質者為肺囊蟲（A）。CMV見核內包涵體（貓頭鷹眼）、隱球菌有莢膜、念珠菌是酵母菌與假菌絲。","options":{"A":"正確：肺囊蟲肺炎肺泡內泡沫狀嗜酸性滲出物。","B":"CMV見核內包涵體（貓頭鷹眼），非泡沫滲出。","C":"隱球菌有厚莢膜。","D":"念珠菌是酵母菌與假菌絲。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-46":{"quick":"錯誤敘述為D：肺塵埃沉著症是「微粒直接致纖維化」而非「過敏反應」所致，故選D。","detail":{"background":"肺塵埃沉著症（pneumoconiosis，塵肺症）：A因吸入礦物微粒堆積肺內引起纖維化（正確）；B好發於礦工、玻璃切割、陶瓷工等職業（正確）；C石棉沉著症與肋膜惡性間皮瘤相關（正確）；D「對微粒產生過敏反應導致纖維化」錯——塵肺症的纖維化主要是巨噬細胞吞噬無法消化的礦物微粒後釋出細胞激素與自由基「直接」引起的纖維化反應，非「過敏（hypersensitivity）」反應（過敏性肺炎才是免疫過敏機轉）。故錯誤為D。","options":{"A":"吸入微粒堆積致纖維化，正確。","B":"好發於礦工等職業，正確。","C":"石棉沉著與間皮瘤相關，正確。","D":"正確（為錯誤敘述）：塵肺纖維化非過敏反應，是微粒直接致纖維化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-33":{"quick":"肺動脈栓塞導致死亡屬於「心因性休克」，故選B。","detail":{"background":"大面積肺動脈栓塞（pulmonary embolism）阻塞肺循環，使右心室後負荷驟增、右心衰竭、左心回血不足、心輸出量驟降，造成「阻塞性/心因性休克（cardiogenic/obstructive shock）」——本質是心臟泵血功能因機械阻塞而失效。題選分類中歸「心因性休克（B）」（廣義含阻塞性）。低血容性（失血）、敗血性（感染）、過敏性（過敏）休克機轉不同。故選B。","options":{"A":"低血容性休克是失血/脫水，非肺栓塞。","B":"正確：肺栓塞致阻塞性/心因性休克。","C":"敗血性休克是感染所致。","D":"過敏性休克是過敏反應所致。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-35":{"quick":"急性期較不會出現肋膜積液的是「氣喘」，故選B。","detail":{"background":"肋膜積液（pleural effusion）的成因：鬱血性心衰竭（靜水壓上升的漏出液，A）、肺栓塞（梗塞致發炎/出血性積液，C）、肋膜炎（滲出液，D）皆常見肋膜積液。而「氣喘（asthma）」是支氣管的可逆性氣道阻塞與痙攣，急性發作以喘鳴、呼氣困難為主，「不會」造成肋膜積液。故較不會出現者為氣喘（B）。","options":{"A":"鬱血性心衰竭致漏出性肋膜積液。","B":"正確：氣喘是氣道病變，不致肋膜積液。","C":"肺栓塞可致肋膜積液。","D":"肋膜炎致滲出性積液。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-45":{"quick":"支氣管平滑肌肥大、腺體增生、嗜酸性球增多，最可能是過敏性氣喘，故選D。","detail":{"background":"本題描述「支氣管平滑肌肥大、黏膜下腺體增生、嗜酸性白血球浸潤、突發呼吸困難」是「過敏性氣喘（allergic asthma）」的典型病理：第一型過敏反應使肥大細胞去顆粒、嗜酸性球浸潤，造成可逆性支氣管痙攣、黏液栓、氣道重塑（平滑肌肥大、基底膜增厚）。故選D。急性肺炎是肺泡化膿、支氣管擴張是管壁破壞擴張、肺氣腫是肺泡壁破壞，皆不符這組嗜酸性球與平滑肌肥大的描述。","options":{"A":"急性肺炎是肺泡化膿，非平滑肌肥大嗜酸性球。","B":"支氣管擴大症是管壁破壞，非此。","C":"肺氣腫是肺泡壁破壞，非此。","D":"正確：過敏性氣喘（嗜酸性球、平滑肌肥大、可逆痙攣）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-34":{"quick":"肺栓塞栓子最常見來源是「下肢深部靜脈」，故選D。","detail":{"background":"肺栓塞（pulmonary embolism）的栓子超過95%來自「下肢深部靜脈血栓（deep vein thrombosis, DVT）」，尤其膝以上的近端深部靜脈（膕、股、髂靜脈），血栓較大、易脫落隨血流經右心到肺動脈。大隱靜脈是「淺」靜脈（淺層栓塞較少致肺栓塞）、上下腔靜脈是匯流大靜脈（非血栓常見起源）。故最常見來源為下肢深部靜脈（D）。","options":{"A":"上腔靜脈非肺栓塞栓子常見來源。","B":"下腔靜脈是匯流靜脈，非起源。","C":"大隱靜脈是淺靜脈，較少致肺栓塞。","D":"正確：下肢深部靜脈是肺栓塞栓子最常見來源。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-35":{"quick":"嗜伊紅性白血球增多「不」由EB病毒感染引起，故選C。","detail":{"background":"嗜伊紅性白血球（eosinophil）增多的常見原因記憶「NAACP」：腫瘤（Neoplasia）、過敏與氣喘（Allergy/Asthma，B）、腎上腺功能不足（Addison）、膠原血管病/自體免疫（如天皰瘡pemphigus，A）、寄生蟲感染（Parasites，D）。而「EB病毒感染」引起的是「非典型『淋巴球』增多」（感染性單核球增多症），非嗜酸性球增多。故不引起嗜酸性球增多者為EB病毒（C）。","options":{"A":"天皰瘡（自體免疫）可致嗜酸性球增多。","B":"氣喘（過敏）致嗜酸性球增多。","C":"正確：EB病毒致淋巴球增多，非嗜酸性球。","D":"寄生蟲感染致嗜酸性球增多。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-36":{"quick":"社區型急性肺炎最常由「肺炎鏈球菌（Streptococcus）」引起，故選C。","detail":{"background":"社區型急性肺炎（community-acquired pneumonia, CAP）的最常見「典型」致病菌是「肺炎鏈球菌（Streptococcus pneumoniae）」——革蘭氏陽性雙球菌，造成大葉性肺炎（高燒、咳鐵鏽色痰、肋膜性胸痛、肺實變）。黴漿菌是「非典型」肺炎常見菌（年輕人）；隱球菌、麴菌是免疫低下者的黴菌感染。故CAP最常見為肺炎鏈球菌（C）。","options":{"A":"黴漿菌是非典型肺炎常見菌，非典型CAP首位。","B":"隱球菌是免疫低下者黴菌感染。","C":"正確：肺炎鏈球菌是社區型典型肺炎最常見菌。","D":"麴菌是免疫低下者黴菌感染。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-45":{"quick":"與新生兒呼吸窘迫症候群「最不相關」的是「體重過大」，故選A。","detail":{"background":"新生兒呼吸窘迫症候群（neonatal RDS，又稱hyaline membrane disease）：因「肺表面活性物質（surfactant）缺乏」（第二型肺泡細胞未成熟），肺泡表面張力高而塌陷，造成出生後進行性呼吸困難、缺氧（B、D正確），組織學見「玻璃質膜（hyaline membrane）」沉積於肺泡（C正確）。危險因子是「早產（體重過『輕』）、母親糖尿病、剖腹產」——故「致病機轉與體重『過大』有關」錯（A為最不相關，應為早產低體重）。故選A。","options":{"A":"正確（為最不相關）：RDS與早產低體重相關，非體重過大。","B":"surfactant缺乏是RDS核心，正確。","C":"玻璃質膜形成致缺氧，正確。","D":"新生兒呼吸困難是RDS表現，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-23":{"quick":"最不適當的是C：膝「以下」的小腿深部靜脈血栓肺栓塞風險「較低」，故選C。","detail":{"background":"靜脈血栓與肺栓塞：A靜脈曲張者淺層靜脈血栓風險較高（正確）；B淺層靜脈血栓比深層較少致肺栓塞（正確）；C「膝部『以下』（小腿）深部靜脈血栓肺栓塞風險較高」錯——小腿（膝以下）的深部靜脈血栓較小，肺栓塞風險「較低」；「膝以上（近端，股、髂）」的深部靜脈血栓才有較高肺栓塞風險（血栓大）；D鬱血性心衰竭（血流淤滯）可致靜脈血栓（正確）。故最不適當為C。","options":{"A":"靜脈曲張者淺層血栓風險高，正確。","B":"淺層血栓較少致肺栓塞，正確。","C":"正確（為最不適當）：膝以下小腿DVT肺栓塞風險較「低」，非高。","D":"心衰竭血流淤滯致靜脈血栓，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-26":{"quick":"咳嗽數月、體重減輕、發熱、多發性乾酪樣肉芽腫，最可能感染結核桿菌，故選A。","detail":{"background":"「乾酪樣肉芽腫（caseating granuloma）」是「結核分枝桿菌（Mycobacterium tuberculosis）」感染的特徵性病理——中央乾酪性壞死、周圍類上皮細胞、Langhans巨細胞與淋巴球。臨床慢性咳嗽、體重減輕、夜間盜汗、低燒、咳血（典型結核症狀）。故多發性乾酪樣肉芽腫者為結核（A）。弓蟲、念珠菌、金黃葡萄球菌不形成乾酪性肉芽腫。","options":{"A":"正確：乾酪樣肉芽腫是結核桿菌感染特徵。","B":"弓蟲不形成乾酪性肉芽腫。","C":"念珠菌是化膿/酵母菌感染。","D":"金黃葡萄球菌是化膿性感染。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112030-N1-27":{"quick":"過敏性鼻炎反覆發作致鼻黏膜灰白色葡萄狀增生是「鼻息肉」，故選B。","detail":{"background":"過敏性鼻炎或慢性鼻竇炎反覆發炎，使鼻黏膜水腫增生、突出形成「鼻息肉（nasal polyp）」——外觀呈「灰白色、半透明、葡萄狀（grape-like）」的軟組織，組織學見水腫的黏膜、嗜酸性球浸潤與增生的腺體，可阻塞鼻道致鼻塞、嗅覺減退。故灰白葡萄狀增生為鼻息肉（B）。鼻咽癌是惡性腫瘤、黴菌感染與鼻中膈彎曲表現不同。","options":{"A":"鼻咽癌是惡性腫瘤，非葡萄狀良性增生。","B":"正確：過敏反覆發炎致鼻息肉（灰白葡萄狀）。","C":"黴菌感染表現不同。","D":"鼻中膈彎曲是結構問題，非黏膜增生。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-22":{"quick":"下肢深部靜脈血栓「不」引起肝臟栓塞，故選D。","detail":{"background":"下肢深部靜脈血栓（DVT）的臨床表現：患側下肢遠端水腫（A）、疼痛與壓痛（B，Homans徵）、發紅發熱；血栓脫落經下腔靜脈、右心到肺動脈造成「肺栓塞（C）」（最危險併發症）。但DVT的栓子隨靜脈回流只會到「肺」，「不會」到肝臟（肝由肝動脈與門脈供血，下肢靜脈血栓不經肝）。故不會引起者為肝臟栓塞（D）。","options":{"A":"患側下肢水腫是DVT表現。","B":"患側疼痛是DVT表現。","C":"肺栓塞是DVT最危險併發症。","D":"正確：DVT栓子去肺，不致肝臟栓塞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-27":{"quick":"鼻咽癌中對放射線治療敏感性最好的是「未分化性癌」，故選C。","detail":{"background":"鼻咽癌（nasopharyngeal carcinoma, NPC）與EB病毒、遺傳、醃製食物相關，台灣與華南高發。組織型分：角化鱗狀細胞癌、非角化性癌、「未分化性癌（undifferentiated carcinoma）」。其中「未分化性癌」分化最差、細胞增殖最快，對「放射線治療最敏感、效果最佳」（放療是鼻咽癌的主要治療）。故選C。一般而言分化越差的腫瘤對放療越敏感。","options":{"A":"角化鱗狀細胞癌分化較好，放療敏感性較差。","B":"非角化性癌放療敏感性中等。","C":"正確：未分化性癌放療敏感性最佳。","D":"腺癌少見且放療敏感性較差。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-25":{"quick":"社區性肺炎最常見的致病菌是「肺炎鏈球菌」，故選B。","detail":{"background":"社區性肺炎（community-acquired pneumonia）最常見的「典型」致病菌是「肺炎鏈球菌（Streptococcus pneumoniae）」——革蘭氏陽性雙球菌，造成大葉性肺炎（高燒、咳鐵鏽色痰、肋膜性胸痛）。金黃葡萄球菌（流感後續發）、流感嗜血桿菌（COPD者）、黴漿菌（非典型）是其他病因但較不及肺炎鏈球菌常見。故選B。","options":{"A":"金黃葡萄球菌常見於流感後續發，非首位。","B":"正確：肺炎鏈球菌是社區性肺炎最常見致病菌。","C":"流感嗜血桿菌常見於COPD者。","D":"黴漿菌是非典型肺炎。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-25":{"quick":"「肺膿瘍」不是石棉相關疾病，故選D。","detail":{"background":"石棉（asbestos）相關疾病：①廣泛間質性纖維化（石棉肺asbestosis，A）；②肋膜斑與肋膜間皮瘤（mesothelioma，B）；③肺癌與「喉癌（laryngeal carcinoma，C）」（石棉是上呼吸道致癌物）。而「肺膿瘍（lung abscess）」是「化膿性細菌感染」（吸入、肺炎後）造成的局限化膿壞死腔，與石棉暴露「無關」。故非石棉相關者為D。","options":{"A":"間質性纖維化（石棉肺）是石棉相關。","B":"肋膜間皮瘤與石棉密切相關。","C":"喉癌與石棉相關。","D":"正確：肺膿瘍是細菌感染，非石棉相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-23":{"quick":"COPD最適當的敘述是D：包括肺氣腫與慢性支氣管炎，故選D。","detail":{"background":"慢性阻塞性肺病（COPD）：A好發於「吸菸」病患（非不吸菸，錯）；B「FEV1會『下降』」（氣道阻塞使一秒用力呼氣量降低，B說上升錯）；C「FEV1/FVC比值『下降』<0.7」是阻塞性肺病的診斷標準（C說上升錯，上升是限制性肺病的型態）；D「COPD包括肺氣腫與慢性支氣管炎」兩種（正確）。故最適當為D。","options":{"A":"COPD好發於吸菸者，非不吸菸。","B":"FEV1下降，非上升。","C":"FEV1/FVC比值下降，非上升。","D":"正確：COPD包括肺氣腫與慢性支氣管炎。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-38":{"quick":"放射線最易傷害「腸胃道黏膜」（快速分裂細胞），故選B。","detail":{"background":"游離放射線對「快速分裂（high mitotic rate）」的細胞傷害最大：腸胃道黏膜上皮（不斷更新）、骨髓造血細胞、生殖細胞、淋巴組織、毛囊最敏感。腸胃道黏膜上皮屬「不穩定細胞（labile cell）」持續分裂，最易受放射線傷害（致黏膜炎、腹瀉）。相對地，肌肉（永久細胞）、神經元對放射線耐受性高。故最易受傷者為腸胃道黏膜（B）。","options":{"A":"肝是穩定細胞，耐受較佳。","B":"正確：腸胃道黏膜快速分裂，最易受放射線傷害。","C":"血管內皮耐受中等。","D":"心肌是永久細胞，耐受高。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-42":{"quick":"B型肝炎病毒是DNA病毒，故選B。","detail":{"background":"五種肝炎病毒中，「B型肝炎病毒（HBV）」是唯一的「DNA病毒」（屬肝病毒科，部分雙股環狀DNA），其餘A、C、D、E型皆為RNA病毒。HBV經血液、體液、垂直（母嬰）傳染，可致急性與慢性肝炎、肝硬化、肝細胞癌。故DNA病毒為B型（B）。記憶：只有B肝是DNA病毒。","options":{"A":"A型是RNA病毒（經口傳染）。","B":"正確：B型肝炎是DNA病毒。","C":"C型是RNA病毒。","D":"E型是RNA病毒。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-41":{"quick":"嬰兒黃疸不退、糞便陶土色，最可能是膽道閉鎖（biliary atresia），故選D。","detail":{"background":"膽道閉鎖（biliary atresia）是新生兒肝外膽道進行性纖維化閉塞，膽汁無法排出：出生後「黃疸持續不退」（結合型高膽紅素血症）、「糞便漸呈灰白/陶土色（acholic stool，因無膽紅素入腸）」、尿色深、肝腫大，是嬰兒「外科性黃疸」最常見原因與兒童肝臟移植最常見原因。須及早手術（Kasai）。原發性膽性肝硬化是成人自體免疫、肝母細胞瘤是腫瘤、Reye症候群是腦病合併肝脂肪變。故選D。","options":{"A":"原發性膽性肝硬化是成人自體免疫病。","B":"肝母細胞瘤是腫瘤，表現為腹部腫塊。","C":"Reye症候群是腦病＋肝脂肪變（與阿斯匹靈相關）。","D":"正確：膽道閉鎖致黃疸不退、陶土色便。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-34":{"quick":"胃腸道上皮細胞屬「不穩定細胞（labile cell）」，故選D。","detail":{"background":"依再生能力細胞分三類：①不穩定細胞（labile，持續分裂更新）——表皮、胃腸道黏膜上皮、骨髓造血細胞、淋巴組織；②穩定細胞（stable，平時靜止G0、受刺激可再生）——肝細胞、腎小管、纖維母細胞、平滑肌；③永久細胞（permanent，不能再生）——神經元、心肌、骨骼肌。故胃腸道上皮屬不穩定細胞（D），神經元、心肌、骨骼肌皆為永久細胞。","options":{"A":"神經元是永久細胞，不再生。","B":"心肌細胞是永久細胞。","C":"骨骼肌細胞是永久細胞。","D":"正確：胃腸道上皮是不穩定細胞（持續更新）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-43":{"quick":"正確敘述為C：克隆氏病較易產生瘻管，故選C。","detail":{"background":"潰瘍性結腸炎（UC）vs克隆氏病（CD）：①UC是「連續性」病變（從直腸向近端延伸、局限大腸黏膜與黏膜下層）；CD是「跳躍式（skip lesion）」全層發炎、可侵犯消化道任何部位（A說UC跳躍式錯）；②肉芽腫見於「CD」（非乾酪性），UC無（B說UC常見肉芽腫錯）；③CD因全層發炎纖維化，「較易產生瘻管（fistula）與狹窄」（C正確）；④CD「不只」局限大腸，常侵犯末端迴腸（D說只限大腸錯）。故選C。","options":{"A":"跳躍式是CD特徵，非UC（UC是連續性）。","B":"肉芽腫見於CD，非UC。","C":"正確：克隆氏病較易產生瘻管。","D":"CD可侵犯全消化道，非只限大腸。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-44":{"quick":"最常垂直傳染（母嬰）的肝炎病毒是B型，故選B。","detail":{"background":"B型肝炎病毒（HBV）是最常經「垂直傳染（母嬰、周產期）」的肝炎病毒——帶原母親在生產時將病毒傳給新生兒，且嬰兒感染後「慢性化率極高（>90%）」，故台灣推行新生兒B肝疫苗與免疫球蛋白接種阻斷母嬰傳染。C型也可垂直傳染但機率較低。A、E型經口（糞口）傳染。故最常垂直傳染為B型（B）。","options":{"A":"A型經糞口傳染。","B":"正確：B型最常垂直（母嬰）傳染且嬰兒慢性化率高。","C":"C型垂直傳染機率較低。","D":"D型需依附B型。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-40":{"quick":"成年人感染最易慢性化的肝炎病毒是C型，故選C。","detail":{"background":"各肝炎病毒慢性化率：「C型肝炎（HCV）」成年人感染後慢性化率「最高（約75-85%）」，常無症狀而進展為慢性肝炎、肝硬化、肝細胞癌；B型成年人感染慢性化率較低（約5-10%，但新生兒感染>90%慢性化）；A、E型「不會」慢性化（急性自限）。故成人最易慢性化者為C型（C）。","options":{"A":"A型不會慢性化。","B":"B型成人慢性化率約5-10%（低於C型）。","C":"正確：C型成人慢性化率最高（75-85%）。","D":"D型依附B型。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-41":{"quick":"最不易造成肝硬化的是雷氏症候群（Reye syndrome），故選D。","detail":{"background":"肝硬化的常見病因：病毒性肝炎（B、C型，A）、酒精性肝病、非酒精性脂肪肝、血色素沈著症（鐵沉積，B）、硬化性膽管炎（C）、自體免疫肝炎、Wilson病等慢性肝損傷。而「雷氏症候群（Reye syndrome）」是兒童病毒感染後使用阿斯匹靈引發的「急性腦病合併肝臟脂肪變性（微泡性脂肪變）」，是急性可逆/致命病程，「不會」造成慢性肝硬化。故最不易致肝硬化者為D。","options":{"A":"病毒性肝炎是肝硬化常見病因。","B":"血色素沈著症（鐵沉積）致肝硬化。","C":"硬化性膽管炎致膽汁性肝硬化。","D":"正確：Reye症候群是急性脂肪變，不致肝硬化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-42":{"quick":"錯誤敘述為C：Hirschsprung病被影響的腸段是「狹窄痙攣」而非擴大，故選C。","detail":{"background":"Hirschsprung病（先天性巨結腸症）：因神經嵴細胞遷移失敗，「遠端大腸（直腸乙狀結腸）黏膜下與肌間神經叢的神經節細胞缺失（aganglionosis）」（A正確），該段無蠕動、持續痙攣「狹窄」（C說被影響的腸段顯著擴大「錯」——是「狹窄」），其「近端」正常腸段因糞便堆積而代償性「擴大（巨結腸megacolon）」（B正確，巨結腸指近端）；男孩較女孩多（D正確）。新生兒胎便延遲、腹脹便秘。故錯誤為C。","options":{"A":"神經節細胞發育有問題，正確。","B":"又稱巨結腸症（近端擴大），正確。","C":"正確（為錯誤敘述）：被影響的腸段是狹窄痙攣，非擴大。","D":"男生比例較高，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-34":{"quick":"普魯士藍（Prussian blue）染藍色的是血鐵質（hemosiderin），故選C。","detail":{"background":"普魯士藍染色（Perls/Prussian blue）是檢測「鐵」的特殊染色，「血鐵質（hemosiderin，含鐵的儲鐵蛋白聚合物）」會被染成藍色，用於診斷鐵沉積（如血色素沈著症、慢性溶血、輸血後鐵過載）。類澱粉用剛果紅、膽紅素呈黃綠色、脂褐質是黃棕色磨損色素，皆非普魯士藍染色標的。故選C。","options":{"A":"類澱粉用剛果紅染色。","B":"膽紅素呈黃綠色，非普魯士藍。","C":"正確：血鐵質（含鐵）被普魯士藍染藍。","D":"脂褐質是黃棕色磨損色素。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-42":{"quick":"與長期口服避孕藥最相關的是肝細胞腺瘤（hepatic adenoma），故選A。","detail":{"background":"肝細胞腺瘤（hepatocellular adenoma）是良性肝腫瘤，與「長期口服避孕藥（雌激素）」及同化類固醇使用密切相關，好發於育齡女性，有破裂出血（尤其懷孕或經期）與少數惡性轉化風險，停藥可能消退。肝細胞癌與B/C肝、肝硬化相關；肝母細胞瘤是幼兒腫瘤；膽管癌與肝吸蟲、硬化性膽管炎相關。故與口服避孕藥最相關者為肝細胞腺瘤（A）。","options":{"A":"正確：肝細胞腺瘤與長期口服避孕藥（雌激素）相關。","B":"肝細胞癌與肝炎/肝硬化相關。","C":"肝母細胞瘤是幼兒腫瘤。","D":"膽管癌與肝吸蟲/硬化性膽管炎相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-36":{"quick":"變為口腔癌機率最高的是「紅斑（erythroplakia）」，故選B。","detail":{"background":"口腔癌前病變：「白斑（leukoplakia）」是無法刮除的白色斑塊，惡性轉化率約5-25%；「紅斑（erythroplakia）」是紅色天鵝絨樣斑塊，惡性轉化率「最高」（達50%以上，常已是嚴重異生或原位癌）。扁平苔癬惡性風險低、口瘡性潰瘍是良性復發性潰瘍。故惡性機率最高者為紅斑（B）。臨床上口腔紅斑比白斑更需警惕切片。","options":{"A":"白斑惡性轉化率約5-25%，低於紅斑。","B":"正確：紅斑（erythroplakia）惡性轉化率最高。","C":"扁平苔癬惡性風險低。","D":"口瘡性潰瘍是良性復發性潰瘍。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-39":{"quick":"最不易被放射線傷害的是「肌肉」，故選D。","detail":{"background":"放射線敏感度與細胞分裂活性成正比：快速分裂的「性腺（生殖細胞）、骨髓、腸胃道黏膜、淋巴組織」最敏感（易受傷）；而「肌肉（骨骼肌、心肌，屬永久細胞、不分裂）」與神經、骨骼最「耐受」放射線（最不易受傷）。故最不易受傷者為肌肉（D）。","options":{"A":"性腺（生殖細胞）對放射線敏感。","B":"骨髓對放射線敏感。","C":"腸胃道黏膜對放射線敏感。","D":"正確：肌肉是永久細胞，最不易受放射線傷害。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-41":{"quick":"骨外局部性漿細胞瘤最常發生在「鼻竇（上呼吸道）」，故選A。","detail":{"background":"髓外（骨外）漿細胞瘤（extramedullary plasmacytoma）是局限性漿細胞腫瘤，最常發生於「上呼吸道（鼻竇、鼻咽、鼻腔、口咽等黏膜相關淋巴組織）」（約80%）。相對地，多發性骨髓瘤是骨髓內漿細胞瘤、孤立性骨漿細胞瘤好發於中軸骨。故骨外局部漿細胞瘤最常於鼻竇（A）。","options":{"A":"正確：骨外漿細胞瘤最常發生於鼻竇等上呼吸道黏膜。","B":"肝臟非好發處。","C":"小腸非最常見處。","D":"四肢軟組織非好發處。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-42":{"quick":"正確敘述為C：瀰漫型胃癌好發年齡較年輕，故選C。","detail":{"background":"胃癌兩型（Lauren分類）：①腸型（intestinal type）——與「幽門桿菌、慢性萎縮性胃炎、腸化生、飲食硝酸鹽、部分胃切除後」相關（A、B、D所述與「腸型」相關而非瀰漫型，故錯），好發老年男性、形成腺體、預後較好；②瀰漫型（diffuse type）——印戒細胞、皮革胃（linitis plastica）、與E-cadherin（CDH1）突變相關、「好發年齡較年輕」、預後差（C正確）。故選C。","options":{"A":"幽門桿菌與「腸型」較相關，非瀰漫型。","B":"硝酸鹽與「腸型」相關。","C":"正確：瀰漫型好發年齡較年輕。","D":"胃切除後與「腸型」相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-43":{"quick":"兩歲以下兒童急性腹瀉最常見病原是輪狀病毒（Rotavirus），故選D。","detail":{"background":"「輪狀病毒（Rotavirus）」是兩歲以下嬰幼兒急性腹瀉（病毒性腸胃炎）「最常見」的病原——經糞口傳染，破壞小腸絨毛上皮，造成水樣腹瀉、嘔吐、發燒、脫水（嬰幼兒住院主因）。已有疫苗可預防。沙門桿菌、志賀桿菌是細菌性（侵襲性血便）、阿米巴是原蟲，皆非嬰幼兒急性腹瀉最常見。故選D。","options":{"A":"沙門桿菌是細菌性腹瀉，非嬰幼兒最常見。","B":"志賀桿菌致細菌性痢疾。","C":"阿米巴是原蟲性痢疾。","D":"正確：輪狀病毒是嬰幼兒急性腹瀉最常見病原。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-35":{"quick":"痔瘡是「靜脈」曲張所造成，故選B。","detail":{"background":"痔瘡（hemorrhoid）是肛門直腸黏膜下「靜脈叢（痔靜脈叢）」的曲張擴大——因靜脈壓升高（便秘用力、懷孕、久站久坐、門脈高壓）使靜脈淤血擴張、突出，內痔（齒狀線以上）無痛性出血，外痔（齒狀線以下）疼痛。故痔瘡是靜脈曲張（B），非動脈、淋巴管或微血管。","options":{"A":"痔瘡非動脈病變。","B":"正確：痔瘡是靜脈叢曲張。","C":"非淋巴管病變。","D":"非微血管病變。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-45":{"quick":"正確敘述為D：D型肝炎比B型更易發展成慢性肝病及肝硬化，故選D。","detail":{"background":"病毒性肝炎：A「A型經血液傳染」錯——A型經「糞口（飲食）」傳染、急性自限可自癒；B「Anti-HBe出現表示有免疫力」錯——表示有保護力的是「Anti-HBs（表面抗體）」，Anti-HBe只反映病毒複製降低；C「C型經飲食傳染」錯——C型經「血液」傳染（A型才是經飲食）；D「D型（合併B型感染）比單純B型更易發展成慢性肝病與肝硬化」正確（D型需依附B型，重疊感染加重病情）。故選D。","options":{"A":"A型經糞口傳染，非血液。","B":"有免疫力是Anti-HBs，非Anti-HBe。","C":"C型經血液傳染，非飲食。","D":"正確：D型（合併B型）更易致慢性肝病肝硬化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-46":{"quick":"偽膜性結腸炎與「困難梭狀桿菌（Clostridium difficile）」過度增生有關，故選D。","detail":{"background":"偽膜性結腸炎（pseudomembranous colitis）由「困難梭狀桿菌（Clostridioides difficile, C. diff）」過度增生引起——常因使用廣效抗生素（如clindamycin）破壞正常腸道菌叢，使C. diff增生並產生毒素（A、B毒素），造成大腸黏膜壞死、形成黃白色「偽膜（pseudomembrane）」、嚴重水瀉。治療用vancomycin或fidaxomicin。故選D。","options":{"A":"大腸桿菌某些型致腹瀉但非偽膜性結腸炎。","B":"志賀桿菌致細菌性痢疾。","C":"結核桿菌致腸結核。","D":"正確：偽膜性結腸炎由C. difficile過度增生引起。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-33":{"quick":"Barrett食道最具診斷意義的細胞是「杯狀細胞（goblet cell）」，故選C。","detail":{"background":"巴瑞特食道（Barrett esophagus）是長期胃食道逆流使遠端食道的「鱗狀上皮」被「腸型柱狀上皮（含杯狀細胞goblet cell）」取代＝「腸化生（intestinal metaplasia）」。診斷上「杯狀細胞」的出現是最具診斷意義的特徵（代表腸化生）。Barrett食道增加「食道腺癌」風險。故最具診斷意義者為杯狀細胞（C）。","options":{"A":"梭狀纖維芽細胞非Barrett診斷特徵。","B":"移形細胞見於泌尿道。","C":"正確：杯狀細胞（腸化生）是Barrett最具診斷意義特徵。","D":"纖毛柱狀細胞見於呼吸道。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-41":{"quick":"食道靜脈曲張時「黏膜下層」血管擴張最明顯，故選B。","detail":{"background":"食道靜脈曲張（esophageal varices）是肝硬化門脈高壓的併發症——門脈血流受阻，經食道下端的「黏膜下層（submucosa）靜脈叢」作為門脈-體循環側枝循環回流，使該處靜脈擴張突起（曲張）。黏膜下層靜脈最表淺易破裂，造成大量致命性上消化道出血。故擴張最明顯處為黏膜下層（B）。","options":{"A":"黏膜層非靜脈曲張主要擴張處。","B":"正確：食道靜脈曲張在黏膜下層血管擴張最明顯。","C":"肌肉層非主要曲張處。","D":"漿膜層非主要曲張處。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-33":{"quick":"困難梭狀桿菌（C. difficile）引起的腸道病變屬「偽膜性」炎症，故選B。","detail":{"background":"困難梭狀桿菌（Clostridioides difficile）的毒素破壞大腸黏膜，造成局部壞死與纖維蛋白、發炎細胞、黏液凝結形成黃白色「偽膜（pseudomembrane）」附於黏膜表面＝「偽膜性結腸炎」。故屬偽膜性炎症（B）。漿液性是稀薄滲出、化膿性是嗜中性球膿液、纖維性是富纖維蛋白。故選B。","options":{"A":"漿液性是稀薄滲出，非偽膜。","B":"正確：C. difficile致偽膜性炎症。","C":"化膿性是膿液，非偽膜。","D":"纖維性是纖維蛋白滲出。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-43":{"quick":"正確敘述為C：Barrett食道是因長期胃食道逆流所致，故選C。","detail":{"background":"巴瑞特食道（Barrett esophagus）：A「遠端食道長期潰瘍不癒」錯——是「腸化生」非潰瘍；B「增加鱗狀細胞癌危險」錯——增加的是「腺癌（adenocarcinoma）」風險（因柱狀上皮化生）；C「因長期胃食道逆流（GERD）所致」正確——慢性酸逆流使鱗狀上皮化生為柱狀上皮；D「女性比例高」錯——男性、白人、肥胖、慢性GERD者較多。故選C。","options":{"A":"是腸化生，非潰瘍不癒。","B":"增加食道「腺癌」風險，非鱗狀細胞癌。","C":"正確：Barrett食道因長期胃食道逆流（GERD）所致。","D":"男性比例較高，非女性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-44":{"quick":"較不是肝細胞癌好發因子的是「脂肪肝」，故選C。","detail":{"background":"肝細胞癌（hepatocellular carcinoma, HCC）的主要好發因子：慢性「B型肝炎」（B）、「C型肝炎」（D）、「酒精性肝病/肝硬化」（A）、黃麴毒素、血色素沈著症等——共同點是造成慢性肝損傷與肝硬化。而單純的「脂肪肝（脂肪變性）」本身致HCC風險相對「較低」（雖嚴重的非酒精性脂肪肝炎NASH進展為肝硬化後也會增加HCC，但比起肝炎病毒與酒精，單純脂肪肝較不是直接好發因子）。故較不是好發因子者為脂肪肝（C）。","options":{"A":"酒精性肝病是HCC好發因子。","B":"B型肝炎是HCC主要好發因子。","C":"正確：單純脂肪肝較不是HCC直接好發因子。","D":"C型肝炎是HCC好發因子。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-37":{"quick":"最可能導致脂肪肝的是「酗酒」，故選A。","detail":{"background":"脂肪肝（fatty liver/hepatic steatosis）是肝細胞內三酸甘油脂異常堆積。最常見原因是「酗酒（酒精性脂肪肝）」——酒精代謝改變脂肪酸氧化與脂蛋白輸出，使脂肪堆積；其次是肥胖、糖尿病、高血脂（非酒精性脂肪肝）。抽菸、大麻、嚼檳榔非脂肪肝典型原因。故選A。脂肪肝是可逆的，戒酒可改善。","options":{"A":"正確：酗酒是脂肪肝最常見原因。","B":"抽菸非脂肪肝典型原因。","C":"大麻非脂肪肝典型原因。","D":"嚼檳榔與口腔癌相關，非脂肪肝。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-38":{"quick":"對放射線耐受性較高的是「心臟肌肉」，故選D。","detail":{"background":"放射線耐受性與分裂活性成反比：骨髓造血細胞（A）、淋巴組織（B）、腸胃道黏膜（C）皆是快速分裂的不穩定細胞，對放射線「敏感（耐受性低）」。而「心臟肌肉（心肌，永久細胞、不分裂）」對放射線「耐受性高」。故耐受性較高者為心臟肌肉（D）。","options":{"A":"骨髓對放射線敏感。","B":"淋巴組織對放射線敏感。","C":"腸胃道黏膜對放射線敏感。","D":"正確：心肌（永久細胞）對放射線耐受性高。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-43":{"quick":"慢性胰臟炎最常見的原因是「長期酗酒」，故選B。","detail":{"background":"慢性胰臟炎（chronic pancreatitis）最常見的原因是「長期酗酒（酒精）」——酒精造成胰管蛋白栓塞、腺體反覆發炎與進行性纖維化、鈣化，最終胰臟內外分泌功能喪失（脂肪瀉、糖尿病、慢性腹痛）。其他原因：膽結石（多致「急性」胰臟炎）、高三酸甘油脂、遺傳（PRSS1）、自體免疫。故慢性胰臟炎最常見原因為長期酗酒（B）。","options":{"A":"吸菸是危險因子但非最常見主因。","B":"正確：長期酗酒是慢性胰臟炎最常見原因。","C":"膽結石多致急性胰臟炎。","D":"遺傳性胰臟炎少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-34":{"quick":"可逆性傷害最常以脂肪變性呈現的器官是「肝」，故選B。","detail":{"background":"脂肪變性（fatty change/steatosis）是細胞內三酸甘油脂堆積的可逆性損傷，最常發生於「肝臟」——肝是脂質代謝中樞，酒精、肥胖、糖尿病、毒素、缺氧、營養不良皆可致肝脂肪變性。心肌、腎也可脂肪變性但以肝最常見、最典型。故最常以脂肪變性呈現者為肝（B）。","options":{"A":"肺非脂肪變性典型器官。","B":"正確：肝最常以脂肪變性呈現可逆性傷害。","C":"腎可脂肪變性但不如肝典型。","D":"脾非脂肪變性典型器官。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-42":{"quick":"波雷特氏食道是遠端食道鱗狀上皮
