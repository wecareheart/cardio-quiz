發生「腸化生」，故選C。","detail":{"background":"波雷特氏食道（Barrett esophagus）的定義是「遠端食道的鱗狀上皮被含杯狀細胞的腸型柱狀上皮取代＝腸化生（intestinal metaplasia）」，肇因於長期胃食道逆流的慢性酸刺激。它是癌前病變，增加食道「腺癌」風險。故選C。並非單純潰瘍、狹窄或過度增生。","options":{"A":"非單純遠端食道潰瘍。","B":"非單純狹窄。","C":"正確：Barrett食道是鱗狀上皮腸化生。","D":"非單純過度增生（是化生）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-35":{"quick":"最可能引起敗血性休克的是「大腸桿菌」，故選B。","detail":{"background":"敗血性休克（septic shock）最常由「革蘭氏陰性菌」的內毒素（LPS）引起，「大腸桿菌（E. coli）」是常見致病菌（泌尿道、腹腔感染）——內毒素激發大量發炎細胞激素（TNF、IL-1）造成全身血管擴張、通透性增加、低血壓與多器官衰竭。EB病毒（病毒）、白色念珠菌（黴菌，免疫低下者）、放射線菌較少引起典型敗血性休克。故選B。","options":{"A":"EB病毒少引起敗血性休克。","B":"正確：大腸桿菌（革蘭氏陰性，內毒素）易致敗血性休克。","C":"白色念珠菌見於免疫低下者。","D":"放射線菌（放線菌）較少致敗血性休克。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-42":{"quick":"酒精性肝炎肝細胞中常見的特殊構造是Mallory小體，故選A。","detail":{"background":"酒精性肝炎（alcoholic hepatitis）的特徵性病理：肝細胞內出現「Mallory小體（Mallory body/Mallory-Denk body）」——是嗜酸性、不規則的胞質內透明聚集物，由變性的中間絲（細胞角蛋白）組成，呈紅色團塊；伴隨肝細胞氣球樣變性、脂肪變性、嗜中性球浸潤。故酒精性肝炎見Mallory小體（A）。Schiller-Duval小體（卵黃囊瘤）、Call-Exner小體（顆粒細胞瘤）、Psammoma小體（沙瘤體，見於乳突癌/腦膜瘤）是其他疾病。","options":{"A":"正確：Mallory小體見於酒精性肝炎。","B":"Schiller-Duval小體見於卵黃囊瘤。","C":"Call-Exner小體見於卵巢顆粒細胞瘤。","D":"Psammoma小體見於乳突癌/腦膜瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-43":{"quick":"與消化性潰瘍最相關的微生物是幽門螺旋桿菌（H. pylori），故選B。","detail":{"background":"「幽門螺旋桿菌（Helicobacter pylori）」是消化性潰瘍（胃潰瘍、十二指腸潰瘍）最相關的微生物——這種革蘭氏陰性螺旋菌定殖於胃黏膜，產生尿素酶與毒素破壞黏膜屏障、引起慢性胃炎與潰瘍，也與胃癌、胃MALT淋巴瘤相關。除菌治療（三合一/四合一療法）可癒合潰瘍。故選B。另一大原因是NSAID。念珠菌、沙門桿菌、輪狀病毒非消化性潰瘍主因。","options":{"A":"念珠菌見於免疫低下者食道炎，非消化性潰瘍主因。","B":"正確：幽門螺旋桿菌與消化性潰瘍最相關。","C":"傷寒沙門桿菌致腸熱病，非消化性潰瘍。","D":"輪狀病毒致嬰幼兒腹瀉。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-44":{"quick":"正確敘述為A：增生性息肉是非贅瘤性息肉，故選A。","detail":{"background":"大腸息肉：①「增生性息肉（hyperplastic polyp）」是「非贅瘤性（non-neoplastic）」、無惡性潛能的常見小息肉（A正確）；②普茲-耶格司息肉（Peutz-Jeghers polyp）是「錯構瘤（hamartoma）」非贅瘤性（B說贅瘤性錯）；③腺瘤（adenoma）是贅瘤性、有惡性潛能，「越大越易惡性化」（C說大小不影響錯）；④腺瘤的組織結構影響惡性化——「絨毛狀（villous）>管絨毛狀>管狀」惡性風險，（D說結構不影響錯）。故選A。","options":{"A":"正確：增生性息肉是非贅瘤性息肉。","B":"Peutz-Jeghers息肉是錯構瘤，非贅瘤性。","C":"腺瘤越大越易惡性化。","D":"絨毛狀腺瘤惡性風險較高，結構有影響。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-37":{"quick":"胃腸道原位癌表示癌細胞尚未穿過「基底膜」，故選A。","detail":{"background":"原位癌（carcinoma in situ）是指癌細胞已具惡性特徵但「尚未穿透基底膜（basement membrane）」、局限於上皮層內、未侵犯下方的固有層或黏膜下層，因此尚無轉移能力（早期、可治癒）。一旦穿破基底膜侵入下層即為「侵襲癌（invasive carcinoma）」。故原位癌尚未穿過者為基底膜（A）。","options":{"A":"正確：原位癌尚未穿過基底膜。","B":"黏膜肌層在基底膜之下，穿過它已是侵襲。","C":"漿膜層是更深的層次。","D":"肌肉層是更深的層次。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-38":{"quick":"大腸燒杯狀（燒瓶狀）潰瘍是阿米巴原蟲感染特徵，故選D。","detail":{"background":"「燒瓶狀（flask-shaped）潰瘍」是「溶組織阿米巴（Entamoeba histolytica）」感染（阿米巴痢疾）的特徵——阿米巴侵入大腸黏膜後在黏膜下層橫向擴散，形成「口小底大（如燒瓶/燒杯）」的潰瘍，造成血便黏液便，可經門脈擴散至肝形成阿米巴肝膿瘍。故燒瓶狀潰瘍為阿米巴（D）。念珠菌、CMV、結核的腸道病變型態不同。","options":{"A":"念珠菌見於免疫低下者，非燒瓶狀潰瘍。","B":"CMV致腸道潰瘍但非燒瓶狀。","C":"結核致環形潰瘍。","D":"正確：阿米巴致燒瓶狀（口小底大）潰瘍。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-43":{"quick":"新生兒大量流口水、無法餵食，是「食道閉鎖」先天異常，故選A。","detail":{"background":"食道閉鎖（esophageal atresia，常合併氣管食道瘻管）：食道上段為盲端，新生兒吞嚥的口水與奶無法進入胃，造成「大量口水流出、餵食即嗆咳吐出、無法餵食」、放置鼻胃管受阻。常合併VACTERL其他畸形。故口水多無法餵食者為食道閉鎖（A）。先天性幽門狹窄是出生數週後噴射狀嘔吐、Meckel憩室是下消化道出血、巨結腸是便秘腹脹。故選A。","options":{"A":"正確：食道閉鎖致大量流口水、無法餵食。","B":"幽門狹窄是數週後噴射狀嘔吐。","C":"Meckel憩室是下消化道出血。","D":"巨結腸症是便秘腹脹。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-44":{"quick":"肝門脈高壓最主要的「肝內原因」是肝硬化，故選B。","detail":{"background":"門脈高壓（portal hypertension）依阻塞部位分肝前（門靜脈血栓）、肝內、肝後（右心衰竭、Budd-Chiari）。最主要的「肝內（intrahepatic）原因」是「肝硬化（cirrhosis）」——肝臟纖維化與再生結節壓迫肝竇與肝靜脈，增加門脈血流阻力，造成食道靜脈曲張、腹水、脾腫大、痔瘡。故肝內原因為肝硬化（B）。血吸蟲病在某些地區也是肝內病因但肝硬化最主要、脂肪肝較少致門脈高壓。","options":{"A":"脂肪肝較少致門脈高壓。","B":"正確：肝硬化是門脈高壓最主要肝內原因。","C":"血吸蟲病是部分地區病因但非最主要。","D":"肝結核非主要門脈高壓原因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-38":{"quick":"急性酒精中毒最主要影響「中樞神經系統」，故選A。","detail":{"background":"急性酒精中毒（acute alcohol intoxication）最主要影響「中樞神經系統」——酒精是中樞神經抑制劑，依血中濃度漸進造成判斷力下降、欣快、運動失調、口齒不清、嗜睡、昏迷甚至呼吸抑制致死。故急性影響中樞神經（A）。長期慢性酗酒則影響肝（脂肪肝/肝炎/肝硬化）、胰、心、周邊神經等。題問「急性」故為中樞神經系統。","options":{"A":"正確：急性酒精中毒主要影響中樞神經系統。","B":"肝損傷是慢性酗酒後果。","C":"肺非急性酒精中毒主要影響。","D":"食道（如Mallory-Weiss）非急性中毒主要影響。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-42":{"quick":"全腸壁性梗塞最主要原因是「腸繫膜動脈急性阻塞」，故選D。","detail":{"background":"缺血性腸病（ischemic bowel disease）：「全腸壁性（transmural）梗塞」（最嚴重，全層壞死，致敗血、穿孔）最主要原因是「腸繫膜動脈的急性阻塞（acute mesenteric arterial occlusion）」——栓塞（心房顫動的栓子）或血栓阻斷供血。臨床劇烈腹痛（與理學檢查不成比例）、血便、休克。相對黏膜層梗塞較輕。故全腸壁梗塞主因為腸繫膜動脈急性阻塞（D）。","options":{"A":"口服避孕藥致血栓但非腸繫膜全層梗塞主因。","B":"肝硬化非腸壁梗塞主因。","C":"放射線致慢性腸炎，非急性全層梗塞。","D":"正確：腸繫膜動脈急性阻塞致全腸壁性梗塞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-43":{"quick":"克隆氏病正確敘述為A（1、3、4）：多侵犯迴腸末端、卵石樣黏膜、有肉芽腫，故選A。","detail":{"background":"克隆氏病（Crohn disease）特徵：①「多侷限在迴腸末端，也侵犯結腸」（1對）；②潰瘍是「深而裂隙狀（非表淺）」（2「潰瘍十分表淺」錯，表淺潰瘍是UC）；③「潰瘍間正常黏膜呈鵝卵石樣（cobblestone）」（3對）；④「常出現非乾酪性肉芽腫」（4對）；⑤腸壁因全層發炎纖維化而「增厚變窄（非變薄擴大）」（5「腸壁變薄嚴重擴大」錯）。故正確組合為1、3、4＝選A（134）。","options":{"A":"正確：1（迴腸末端+結腸）3（鵝卵石）4（肉芽腫）。","B":"235含錯誤項（表淺潰瘍、腸壁變薄擴大）。","C":"145含錯誤項5。","D":"135含錯誤項5。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-36":{"quick":"痔瘡的機轉與「囊性水瘤」不同（後者是淋巴管畸形非靜脈曲張），故選B。","detail":{"background":"痔瘡的病理機轉是「靜脈曲張（靜脈壓升高致靜脈擴張）」，與下列靜脈曲張同類：肝硬化的食道靜脈曲張（A，門脈高壓）、懷孕婦女小腿藍紫色血管（C，下肢靜脈曲張）、久站者腿部青筋（D，下肢靜脈曲張）。而「幼兒頸部囊性水瘤（cystic hygroma）」是「淋巴管畸形（淋巴管瘤）」，與靜脈曲張機轉「不同」。故選B。","options":{"A":"食道靜脈曲張是靜脈曲張，同類。","B":"正確：囊性水瘤是淋巴管畸形，與痔瘡（靜脈曲張）機轉不同。","C":"懷孕下肢靜脈曲張，同類。","D":"久站下肢靜脈曲張，同類。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-45":{"quick":"錯誤敘述為A：胃腸道基質瘤（GIST）最好發在「胃」而非小腸，故選A。","detail":{"background":"胃腸道基質瘤（gastrointestinal stromal tumor, GIST）：A「最好發在小腸」錯——最好發於「胃（約60%）」，其次小腸；B起源於「Cajal氏間質細胞（腸道節律細胞）」（正確）；C大部分有「c-KIT或PDGFRA基因突變」（正確，故可用imatinib標靶治療）；D預後與「腫瘤大小、有絲分裂數、發生位置」相關（正確）。故錯誤為A（應為胃最好發）。","options":{"A":"正確（為錯誤敘述）：GIST最好發在「胃」，非小腸。","B":"起源於Cajal間質細胞，正確。","C":"多有c-KIT/PDGFRA突變，正確。","D":"預後與大小/分裂數/位置相關，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-37":{"quick":"主要經口傳染的肝炎病毒是A型，故選A。","detail":{"background":"「A型肝炎病毒（HAV）」主要經「糞口（經口/飲食水）」傳染——汙染的食物或水，造成急性肝炎、可自限痊癒、「不會慢性化」，常見於衛生條件差地區與群聚感染，有疫苗可預防。E型也經口傳染（孕婦感染嚴重）。B、C、D型主要經血液/體液傳染。故主要經口傳染者為A型（A）。","options":{"A":"正確：A型肝炎主要經口（糞口）傳染。","B":"B型經血液/體液傳染。","C":"C型經血液傳染。","D":"D型依附B型，經血液傳染。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-44":{"quick":"口腔黏膜病灶中惡性機會最高的是「紅斑（erythroplakia）」，故選C。","detail":{"background":"口腔黏膜病灶的惡性轉化風險：「紅斑（erythroplakia）」惡性機會「最高」（紅色天鵝絨樣，多已是嚴重異生或原位癌，惡變率>50%）；白斑（leukoplakia，A）惡變率約5-25%；毛狀白斑（hairy leukoplakia，B，EB病毒相關，見於免疫低下/AIDS）通常「非」癌前病變；口瘡潰瘍（aphthous ulcer，D）是良性復發性潰瘍。故惡性機會最高為紅斑（C）。","options":{"A":"白斑惡變率約5-25%。","B":"毛狀白斑（EBV相關）通常非癌前病變。","C":"正確：紅斑惡性機會最高。","D":"口瘡潰瘍是良性復發性潰瘍。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-40":{"quick":"凋亡（apoptosis）細胞最可能出現「細胞皺縮（cell shrinkage）」，故選C。","detail":{"background":"凋亡（apoptosis，程序性細胞死亡）的形態特徵：「細胞皺縮（cell shrinkage，胞質濃縮、變小）」、染色質濃縮邊集、核碎裂、形成凋亡小體被吞噬，「不引起發炎、無細胞腫脹」。相對地「細胞腫脹（cell swelling）」是「壞死（necrosis）」的特徵（D錯，那是壞死）。脂肪變性、脂褐質堆積是其他變化。故凋亡細胞特徵為細胞皺縮（C）。","options":{"A":"脂肪變性是可逆損傷，非凋亡特徵。","B":"脂褐質堆積是老化變化，非凋亡。","C":"正確：凋亡細胞出現細胞皺縮。","D":"細胞腫脹是壞死特徵，非凋亡。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-34":{"quick":"燒燙傷病人最易感染「綠膿桿菌（Pseudomonas aeruginosa）」，故選D。","detail":{"background":"燒燙傷病人因皮膚屏障破壞、創面潮濕、免疫低下，最易感染「綠膿桿菌（Pseudomonas aeruginosa）」——這種革蘭氏陰性桿菌好生長於潮濕環境，常引起燒傷創面感染與敗血症（產綠色膿、特殊氣味），是燒傷感染的重要病原。故燒傷最易感染綠膿桿菌（D）。","options":{"A":"結核非燒傷常見感染。","B":"大腸桿菌非燒傷創面典型病原。","C":"隱球菌見於免疫低下者。","D":"正確：綠膿桿菌是燒傷病人最易感染的病原。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-37":{"quick":"潰瘍性結腸炎「不」具肉芽腫，故選B。","detail":{"background":"潰瘍性結腸炎（ulcerative colitis, UC）特徵：①病變「通常局限於黏膜層與黏膜下層（淺層）」（A正確）；②「連續性」病變（從直腸向近端延伸，無跳躍，C正確）；③是「大腸癌的危險因子」（全大腸瀰漫病變，D正確）；④「不形成肉芽腫」（B「易產生肉芽腫」錯——肉芽腫是「克隆氏病」的特徵，UC無）。故不是UC特徵者為B。","options":{"A":"UC局限黏膜與黏膜下層，正確。","B":"正確（為非UC特徵）：肉芽腫是克隆氏病特徵，UC無。","C":"UC是連續性病變，正確。","D":"UC是大腸癌危險因子，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-46":{"quick":"克林氏潰瘍（Curling ulcer）最易發生在「嚴重燒傷」病人，故選B。","detail":{"background":"壓力性潰瘍（stress ulcer）依誘因命名：①「Curling潰瘍（克林氏潰瘍）」——見於「嚴重燒傷」病人（B），因低血容與黏膜缺血；②「Cushing潰瘍」——見於顱內病變/腦損傷（如頭部外傷、腦出血）病人，因迷走神經刺激胃酸過度分泌；③NSAID/阿斯匹靈潰瘍與幽門桿菌是慢性消化性潰瘍原因。題問Curling潰瘍故為嚴重燒傷（B）。記憶：Curling=燒傷（C for Cutaneous burn）、Cushing=顱腦。","options":{"A":"阿斯匹靈致一般消化性潰瘍，非Curling。","B":"正確：Curling潰瘍見於嚴重燒傷。","C":"頭部外傷致的是Cushing潰瘍。","D":"幽門桿菌致一般消化性潰瘍。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-40":{"quick":"梅克爾憩室最常見的異位組織是「胃黏膜」，故選B。","detail":{"background":"梅克爾憩室（Meckel diverticulum）是卵黃管殘留形成的真性憩室（含全層腸壁），遵「2法則」：約2%人口、長約2吋、距迴盲瓣2呎、常2歲前發病、最常含兩種異位組織（「胃黏膜」最常見、其次胰組織）。「異位胃黏膜」分泌胃酸侵蝕鄰近腸黏膜，造成無痛性下消化道出血（兒童血便最常見原因之一）。故最常見異位組織為胃黏膜（B）。","options":{"A":"肝組織非Meckel憩室常見異位組織。","B":"正確：胃黏膜是Meckel憩室最常見異位組織。","C":"脾組織非常見異位組織。","D":"唾液腺非常見異位組織。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-38":{"quick":"只能在B型肝炎存在下共同感染的是D型肝炎，故選C。","detail":{"background":"「D型肝炎病毒（HDV，delta agent）」是一種「缺陷病毒（defective virus）」——它缺乏自己的外套膜，必須借用「B型肝炎病毒（HBV）的表面抗原（HBsAg）」才能組裝與感染人體。故D型只能在「有B型肝炎存在」時共同感染（coinfection）或重疊感染（superinfection），且會加重B型肝炎病情。故選C。A、E型經口傳染、C型獨立RNA病毒。","options":{"A":"A型獨立經口傳染。","B":"C型是獨立RNA病毒。","C":"正確：D型需依附B型才能感染。","D":"E型獨立經口傳染。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-44":{"quick":"Barrett食道發生腺癌最相關的因素是「上皮細胞的異生程度」，故選A。","detail":{"background":"巴瑞特食道進展為食道腺癌的風險，最相關的是「上皮細胞的異生（dysplasia）程度」——從無異生→低度異生→高度異生→腺癌，異生程度越高（細胞異型越明顯）惡性風險越高，故臨床以內視鏡定期切片監測「異生等級」來決定處置。Barrett食道的「長短、發炎程度、有無狹窄」相對不是決定癌變的主要因子。故選A。","options":{"A":"正確：上皮異生程度與Barrett食道癌變最相關。","B":"Barrett食道長短非主要決定因子。","C":"發炎程度非主要決定因子。","D":"食道狹窄非主要決定因子。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-28":{"quick":"A型肝炎正確敘述為C：不會引起慢性肝炎，故選C。","detail":{"background":"A型肝炎（HAV）：A「屬DNA病毒」錯——HAV是「RNA病毒」（小RNA病毒科）；B「為缺陷病毒須依附B型」錯——那是「D型」，HAV可獨立感染；C「不會引起慢性肝炎」正確——HAV感染是急性自限性、痊癒後不慢性化（與B、C型不同）；D「不會引起猛爆性肝炎」錯——HAV「偶可」引起猛爆性肝炎（尤其老年或有慢性肝病者，雖罕見）。故正確為C。","options":{"A":"HAV是RNA病毒，非DNA。","B":"缺陷病毒須依附B型的是D型，非A型。","C":"正確：A型肝炎不會引起慢性肝炎（急性自限）。","D":"A型偶可引起猛爆性肝炎。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112030-N1-21":{"quick":"肝硬化下肢水腫與「淋巴管阻塞」關係最小，故選D。","detail":{"background":"肝硬化患者下肢水腫與腹水的機轉：①「血漿膠體滲透壓下降（低白蛋白血症，肝合成白蛋白減少）」（A，相關）；②「門靜脈壓升高（門脈高壓）」（B，相關，致腹水與靜脈淤血）；③「鈉離子與水貯積（續發性高醛固酮、腎血流減少）」（C，相關）。而「淋巴管阻塞」不是肝硬化水腫的主要機轉（淋巴阻塞水腫見於淋巴絲蟲病、淋巴結廓清術後）。故關係最小者為D。","options":{"A":"低白蛋白致膠體滲透壓下降，相關。","B":"門脈高壓相關。","C":"鈉水貯積相關。","D":"正確：淋巴管阻塞與肝硬化水腫關係最小。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112030-N1-23":{"quick":"兒童接受肝臟移植最常見的原因是膽道閉鎖，故選D。","detail":{"background":"「膽道閉鎖（biliary atresia）」是「兒童（嬰幼兒）接受肝臟移植最常見的原因」——肝外膽道進行性纖維化閉塞，膽汁淤積造成進行性膽汁性肝硬化與肝衰竭，即使早期Kasai手術，許多仍進展至需肝移植。故選D。肝母細胞瘤、肝細胞癌、原發性膽道性硬化（成人病）較少見於兒童移植主因。","options":{"A":"肝母細胞瘤是兒童肝惡性瘤但非移植最常見原因。","B":"肝細胞癌罕見於兒童。","C":"原發性膽道性硬化是成人自體免疫病。","D":"正確：膽道閉鎖是兒童肝移植最常見原因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112030-N1-25":{"quick":"慢性胃食道逆流致食道下段柱狀上皮出現，是「化生（metaplasia）」，故選D。","detail":{"background":"慢性胃食道逆流病人在食道下三分之一出現「區域性柱狀上皮」取代正常鱗狀上皮＝「化生（metaplasia，一種成熟細胞被另一種成熟細胞取代的適應變化）」，即巴瑞特食道（Barrett esophagus，鱗狀→腸型柱狀上皮化生）。化生是可逆適應但持續刺激可進展為異生與腺癌。故此現象為化生（D）。增生是細胞數增加、肥大是細胞變大、萎縮是變小，皆非此。","options":{"A":"增生是細胞數量增加。","B":"肥大是細胞變大。","C":"萎縮是細胞變小。","D":"正確：鱗狀→柱狀上皮取代是化生（metaplasia）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112030-N1-26":{"quick":"對輻射損傷較具抵抗性的是「骨骼肌細胞」，故選D。","detail":{"background":"輻射損傷敏感度與細胞分裂活性成正比：骨髓造血細胞（A）、生殖細胞（B）、腸壁上皮細胞（C）皆快速分裂，對輻射「敏感（不抵抗）」。而「骨骼肌細胞（永久細胞、不分裂）」對輻射「較具抵抗性（耐受）」。故抵抗性較高者為骨骼肌（D）。","options":{"A":"骨髓造血細胞對輻射敏感。","B":"生殖細胞對輻射敏感。","C":"腸壁上皮對輻射敏感。","D":"正確：骨骼肌細胞對輻射較具抵抗性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-24":{"quick":"慢性肉芽腫致限制性心包炎最常見病因是結核菌，故選B。","detail":{"background":"「限制性（縮窄性）心包炎（constrictive pericarditis）」因慢性肉芽腫性發炎使心包膜纖維化、鈣化、僵硬，限制心臟舒張充盈。最常見的「慢性肉芽腫性」病因是「結核菌（Mycobacterium tuberculosis）」感染（結核性心包炎癒合後纖維化縮窄）。故選B。梅毒主要侵犯主動脈、金黃葡萄球菌與大腸桿菌致急性化膿性心包炎（非肉芽腫慢性）。","options":{"A":"梅毒主要侵犯主動脈，非心包縮窄主因。","B":"正確：結核菌是慢性肉芽腫性縮窄性心包炎最常見病因。","C":"金黃葡萄球菌致急性化膿性心包炎。","D":"大腸桿菌致急性化膿性，非慢性肉芽腫。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-27":{"quick":"T3N1M0的乙狀結腸腺癌可知「沒有遠端轉移」，故選D。","detail":{"background":"TNM解讀：T3（腫瘤侵犯深度，穿過肌肉層到漿膜下/周圍組織）、N1（區域淋巴結轉移1-3個）、「M0（無遠端轉移）」。雖然題目情境提到「肝臟有可疑病灶」，但若最終分期定為M0，表示該肝病灶非轉移（或排除）。逐項：A「來自間質細胞」錯——腺癌來自「上皮細胞（epithelial）」；B「分化差指與正常細胞相似」錯——分化差是「與正常細胞差異大」；C「N1指侵犯神經」錯——N指「淋巴結」轉移；「D此腫瘤沒有遠端轉移（M0）」正確。故選D。（注：大腸癌最常轉移肝，但此題分期M0故無遠端轉移。）","options":{"A":"腺癌來自上皮細胞，非間質細胞。","B":"分化差是與正常細胞差異大，非相似。","C":"N指淋巴結轉移，非神經侵犯。","D":"正確：M0表示沒有遠端轉移。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-29":{"quick":"最常見的口腔癌是「鱗狀細胞癌（squamous cell carcinoma）」，故選B。","detail":{"background":"口腔癌（oral cancer）超過90%是「鱗狀細胞癌（squamous cell carcinoma, SCC）」——源自口腔黏膜的鱗狀上皮，與「嚼檳榔、抽菸、喝酒、HPV」等危險因子相關（台灣口腔癌與檳榔密切），常見於頰黏膜、舌、牙齦。故最常見口腔癌為鱗狀細胞癌（B）。基底細胞癌見於皮膚（日曬部位）、侵襲性導管癌是乳癌、唾液腺導管癌是唾液腺腫瘤。","options":{"A":"基底細胞癌見於皮膚，非口腔最常見。","B":"正確：鱗狀細胞癌是最常見口腔癌。","C":"侵襲性導管癌是乳癌。","D":"唾液腺導管癌是唾液腺腫瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-30":{"quick":"錯誤敘述為D：肝硬化造成的是門靜脈壓「過高」而非過低，故選D。","detail":{"background":"肝硬化（liver cirrhosis）：A「非酒精性脂肪肝病（NAFLD/NASH）可能導致肝硬化」（正確）；B「可能發生食道靜脈曲張」（正確，門脈高壓側枝）；C「增加肝細胞癌機率」（正確）；D「通常造成門靜脈壓力『過低（portal hypotension）』」錯——肝硬化造成的是「門靜脈高壓（portal hypertension）」（肝纖維化使門脈血流阻力增加），導致食道靜脈曲張、腹水、脾腫大。故錯誤為D。","options":{"A":"NAFLD可致肝硬化，正確。","B":"肝硬化可致食道靜脈曲張，正確。","C":"肝硬化增加肝細胞癌風險，正確。","D":"正確（為錯誤敘述）：肝硬化致門脈「高壓」非過低。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-27":{"quick":"必須有B型肝炎存在才能感染的是D型肝炎病毒，故選C。","detail":{"background":"D型肝炎病毒（HDV，delta病毒）是「缺陷病毒」，缺乏自身外套膜，「必須借用B型肝炎病毒的表面抗原（HBsAg）」才能組裝、感染與複製。故D型只在B型肝炎存在時（共同或重疊感染）才能感染人體，並加重肝病。故選C。A、E型經口獨立感染、C型獨立RNA病毒。","options":{"A":"A型獨立經口感染。","B":"C型是獨立RNA病毒。","C":"正確：D型需依附B型（HBsAg）才能感染。","D":"E型獨立經口感染。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-24":{"quick":"「橫紋肌溶解」不是慢性酗酒的常見後遺症，故選D。","detail":{"background":"慢性酗酒的常見後遺症：①周邊神經病變（A，B群維生素缺乏）；②擴張性心肌病變（B，酒精性心肌病）；③慢性胰臟炎（C，最常見病因）；以及肝病（脂肪肝/肝炎/肝硬化）、Wernicke-Korsakoff、食道靜脈曲張、貧血。而「橫紋肌溶解（rhabdomyolysis）」雖「急性」大量酗酒或酒醉昏迷壓迫可偶發，但「不是慢性酗酒的常見後遺症」。故選D。","options":{"A":"周邊神經病變是慢性酗酒常見後遺症。","B":"擴張性心肌症是慢性酗酒後遺症。","C":"慢性胰臟炎是慢性酗酒常見後遺症。","D":"正確：橫紋肌溶解非慢性酗酒常見後遺症。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-27":{"quick":"肝硬化造成腹水與「白蛋白降低」有關，故選B。","detail":{"background":"肝硬化造成腹水（ascites）的機轉：①「門脈高壓」使內臟微血管靜水壓升高；②「肝合成白蛋白減少→低白蛋白血症→血漿膠體滲透壓『降低』」使液體外滲入腹腔（B正確）；③續發性高醛固酮致鈉水滯留。故與「白蛋白降低」有關（B）。膽紅素增減與腹水無直接因果。故選B。","options":{"A":"白蛋白增加不致腹水（是降低才致）。","B":"正確：白蛋白降低→膠體滲透壓下降→腹水。","C":"膽紅素增加與腹水無直接因果。","D":"膽紅素降低與腹水無關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-27":{"quick":"錯誤敘述為A：家族性腺瘤性息肉症（FAP）是體染色體「顯性」遺傳，故選A。","detail":{"background":"家族性腺瘤性息肉症（familial adenomatous polyposis, FAP）：A「體染色體隱性遺傳」錯——FAP是「體染色體『顯性』遺傳」（APC基因突變）；B病人大腸有「超過100個（常數百到上千）腺瘤性息肉」（正確）；C「未治療幾乎都會發生大腸癌」（正確，40歲前幾乎100%癌變）；D「可用預防性大腸切除術治療」（正確）。故錯誤為A（應為顯性遺傳）。","options":{"A":"正確（為錯誤敘述）：FAP是體染色體「顯性」遺傳，非隱性。","B":"大腸有超過100個腺瘤性息肉，正確。","C":"未治療幾乎都會發生大腸癌，正確。","D":"可用預防性大腸切除治療，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114100-N1-25":{"quick":"大腸直腸癌最常轉移的器官是「肝臟」，故選A。","detail":{"background":"大腸直腸癌（colorectal cancer）最常經「門靜脈」血路轉移到「肝臟」——因大腸靜脈血回流經門脈系統先到肝，故肝是大腸癌遠端轉移最常見器官（其次肺）。臨床上大腸癌肝轉移常見，部分孤立肝轉移可手術切除。故最常轉移器官為肝臟（A）。","options":{"A":"正確：大腸直腸癌最常轉移肝臟（經門脈）。","B":"胰臟非大腸癌最常轉移處。","C":"脾臟少見轉移。","D":"心臟極少見轉移。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-26":{"quick":"家族腺瘤性瘜肉症（FAP）由「APC」基因突變造成，故選A。","detail":{"background":"家族性腺瘤性息肉症（FAP）是「APC（adenomatous polyposis coli）腫瘤抑制基因」突變所致（體染色體顯性）——APC是Wnt訊號路徑的調控者，突變使大腸上皮過度增生形成數百至上千個腺瘤性息肉，幾乎必然癌變。APC也是散發性大腸癌的早期關鍵突變（腺瘤-癌序列的起始）。故FAP為APC突變（A）。WT1是Wilms腫瘤、MYC是致癌基因、BRCA1是乳卵巢癌。","options":{"A":"正確：FAP由APC基因突變造成。","B":"WT1與Wilms腫瘤相關。","C":"MYC是致癌基因（多種腫瘤）。","D":"BRCA1與遺傳性乳卵巢癌相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-27":{"quick":"燒瓶狀潰瘍（flask-shaped ulcer）由溶組織阿米巴感染所致，故選B。","detail":{"background":"「燒瓶狀（flask-shaped，口小底大）潰瘍」是「溶組織阿米巴（Entamoeba histolytica）」感染（阿米巴痢疾）的特徵——吞入受汙染食物或飲水的阿米巴囊體，在大腸侵入黏膜後於黏膜下層橫向擴散，形成口小底大的潰瘍，造成血便黏液便，可擴散至肝形成阿米巴肝膿瘍。故燒瓶狀潰瘍為阿米巴（B）。A是偽膜性結腸炎（C. difficile）、C是霍亂（水瀉）、D是消化性潰瘍。","options":{"A":"C. difficile致偽膜性結腸炎，非燒瓶狀潰瘍。","B":"正確：溶組織阿米巴致燒瓶狀潰瘍。","C":"霍亂致大量水瀉，非燒瓶狀潰瘍。","D":"胃酸侵犯致消化性潰瘍，非燒瓶狀。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-27":{"quick":"不會造成慢性肝炎的是A型肝炎病毒，故選A。","detail":{"background":"會造成「慢性肝炎」的肝炎病毒：B型、C型、D型（依附B型）。而「A型肝炎病毒（HAV）」感染是「急性自限性」、痊癒後「不會慢性化」（E型同樣不會慢性化，孕婦例外重症）。故不會造成慢性肝炎者為A型（A）。記憶：經口傳染的A、E型不慢性化；經血液的B、C、D型可慢性化。","options":{"A":"正確：A型肝炎急性自限，不會慢性化。","B":"B型可造成慢性肝炎。","C":"C型慢性化率最高。","D":"D型（依附B型）可慢性化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-43":{"quick":"良性腎硬化（benign nephrosclerosis）與「高血壓」最有關，故選A。","detail":{"background":"良性腎硬化（benign nephrosclerosis）是長期「高血壓」造成的腎血管與腎實質病變——腎小動脈玻璃樣硬化（hyaline arteriolosclerosis）、管腔狹窄、腎缺血、腎絲球與腎小管萎縮纖維化，腎臟表面呈細顆粒狀。長期可致慢性腎功能減退。故與高血壓最相關（A）。","options":{"A":"正確：良性腎硬化是長期高血壓所致。","B":"腫瘤非良性腎硬化病因。","C":"感染致腎盂腎炎，非良性腎硬化。","D":"免疫反應致腎絲球腎炎，非良性腎硬化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-42":{"quick":"最常見的膀胱癌組織型是泌尿（移形）上皮癌，故選A。","detail":{"background":"膀胱癌（bladder cancer）最常見的組織型是「泌尿上皮癌（urothelial/transitional cell carcinoma）」——源自膀胱的移形上皮（urothelium），與抽菸、芳香胺（染料、橡膠業）、環磷醯胺等危險因子相關，典型表現無痛性血尿。鱗狀細胞癌與埃及血吸蟲（Schistosoma haematobium）感染相關（中東）、腺癌少見。故最常見為泌尿上皮癌（A）。","options":{"A":"正確：泌尿（移形）上皮癌是最常見膀胱癌。","B":"透亮細胞癌主要見於腎細胞癌。","C":"腺癌少見於膀胱。","D":"鱗狀細胞癌與血吸蟲相關，較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-43":{"quick":"腎細胞癌組織學最常見「透亮細胞（clear cells）」，故選A。","detail":{"background":"腎細胞癌（renal cell carcinoma, RCC）最常見的組織型是「透亮細胞型（clear cell type，約70-80%）」——腫瘤細胞胞質富含肝醣與脂質，在H&E染色下被溶去而呈「透亮（clear）」外觀，與VHL基因異常相關。臨床三徵：血尿、腹部腫塊、腰痛（晚期），可有副腫瘤症候群。故組織學最常見透亮細胞（A）。","options":{"A":"正確：腎細胞癌最常見透亮細胞型。","B":"主細胞見於副甲狀腺/胃。","C":"暗細胞非腎細胞癌典型。","D":"顆粒細胞型較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-44":{"quick":"「尿道」並非結石好發部位，故選C。","detail":{"background":"泌尿道結石好發於「腎盂、腎盞、膀胱、輸尿管」（尿液停留或狹窄處）。而「尿道（urethra）」是排尿的最末端通道，結石通常在上游形成後可能卡在輸尿管或膀胱出口，但尿道本身「並非結石好發（形成）部位」。故選C。","options":{"A":"腎盂是結石好發部位。","B":"腎盞是結石好發部位。","C":"正確：尿道並非結石好發部位。","D":"膀胱是結石好發部位。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-33":{"quick":"休克時腎臟最常見的病理變化是「腎小管壞死（ATN）」，故選D。","detail":{"background":"休克（低灌流缺血）時腎臟最常見的病理變化是「急性腎小管壞死（acute tubular necrosis, ATN）」——腎小管上皮（尤其近曲小管與亨利氏環，對缺氧最敏感）壞死脫落，造成急性腎損傷與少尿。故休克時腎臟最常見變化為腎小管壞死（D）。腎絲球出血、間質白血球浸潤（腎盂腎炎）、脂肪堆積非休克典型。","options":{"A":"腎小球出血非休克典型變化。","B":"間質白血球浸潤是腎盂腎炎（感染）。","C":"間質脂肪堆積非休克變化。","D":"正確：休克致急性腎小管壞死（ATN）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-35":{"quick":"狼瘡性腎絲球腎炎主因是「免疫複合體沉積」，故選B。","detail":{"background":"狼瘡性腎炎（lupus nephritis）是全身性紅斑性狼瘡（SLE）的腎臟表現，屬「第三型過敏反應（免疫複合體媒介）」——抗DNA等自體抗體與抗原形成的「免疫複合體沉積」於腎絲球（繫膜、內皮下、上皮下），活化補體引起發炎與腎絲球損傷。故主因為免疫複合體沉積（B）。腎切片可見「wire-loop」病變、全屋滿（full-house）免疫螢光。故選B。","options":{"A":"鈣化非狼瘡腎炎主因。","B":"正確：免疫複合體沉積是狼瘡腎炎主因。","C":"類澱粉沉積是amyloidosis，非狼瘡腎炎。","D":"嗜中性球浸潤非主要機轉。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-44":{"quick":"腎絲球中位於鮑氏囊與基底膜之間的細胞是「足細胞（podocyte）」，故選C。","detail":{"background":"腎絲球濾過屏障由內到外三層：①血管內皮細胞（有孔）；②腎絲球基底膜（GBM）；③「足細胞（podocyte，臟層上皮細胞）」——其足突（foot process）覆於基底膜外側、面向鮑氏囊腔，足突間的裂孔膜（slit diaphragm）是阻擋蛋白質濾出的關鍵。故位於鮑氏囊與基底膜之間者為足細胞（C）。足細胞損傷（如微小變化疾病）致大量蛋白尿。繫膜細胞在腎絲球中央支撐。","options":{"A":"內皮細胞在基底膜內側（血管腔側）。","B":"繫膜細胞在腎絲球中央支撐。","C":"正確：足細胞位於基底膜外側、鮑氏囊腔側。","D":"血球細胞在血管腔內。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-45":{"quick":"雙側尿路不完全阻塞常造成「多尿（polyuria）」，故選B。","detail":{"background":"雙側尿路「不完全」阻塞時，因長期阻塞損害腎小管的「濃縮功能」（影響亨利氏環與集尿管對ADH反應），使尿液無法濃縮而出現「多尿（polyuria）」與夜尿、等張尿。而「完全」阻塞才會無尿/少尿。故不完全阻塞常見多尿（B）。","options":{"A":"少尿見於完全阻塞或急性腎損傷。","B":"正確：不完全阻塞損害濃縮功能致多尿。","C":"血尿非不完全阻塞典型表現。","D":"蛋白尿非不完全阻塞典型表現。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-48":{"quick":"腎病症候群的指標是「大量蛋白尿」，故選D。","detail":{"background":"腎病症候群（nephrotic syndrome）四大指標：①「大量蛋白尿（>3.5 g/day）」（D，核心，因腎絲球濾過屏障受損漏蛋白）；②低白蛋白血症；③全身性水腫；④高血脂與脂尿。相對地，血尿、少尿、高血壓、紅血球圓柱是「腎炎症候群（nephritic syndrome）」的特徵。故腎病症候群指標為大量蛋白尿（D）。","options":{"A":"血尿是腎炎症候群特徵。","B":"少尿是腎炎症候群特徵。","C":"高血壓是腎炎症候群特徵。","D":"正確：大量蛋白尿是腎病症候群指標。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-34":{"quick":"腎病症候群下肢水腫補充的蛋白質是「白蛋白（albumin）」，故選B。","detail":{"background":"腎病症候群因腎絲球漏出大量蛋白（主要是「白蛋白」），造成「低白蛋白血症」，使血漿膠體滲透壓下降、液體外滲組織形成水腫。治療上補充「白蛋白（albumin）」可暫時提升膠體滲透壓、利尿消腫。故補充白蛋白（B）。免疫球蛋白、攜鐵蛋白、肌球蛋白非此用途。","options":{"A":"免疫球蛋白用於免疫補充，非消腫。","B":"正確：補充白蛋白提升膠體滲透壓消腫。","C":"攜鐵蛋白用於鐵運輸。","D":"肌球蛋白非血漿蛋白。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-45":{"quick":"急性腎盂腎炎的病因是「細菌感染」，故選C。","detail":{"background":"急性腎盂腎炎（acute pyelonephritis）是腎盂與腎實質的「細菌感染」——多為大腸桿菌等腸道菌經尿道上行感染（女性、尿路阻塞、膀胱輸尿管逆流者風險高），造成發燒、腰痛、膿尿、白血球圓柱。故病因為細菌感染（C）。","options":{"A":"免疫反應致腎絲球腎炎，非腎盂腎炎。","B":"病毒感染非腎盂腎炎主因。","C":"正確：急性腎盂腎炎是細菌（上行）感染。","D":"基因突變非腎盂腎炎病因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-45":{"quick":"小孩最常見的原發性腎絲球疾病是微小變化疾病（minimal change disease），故選B。","detail":{"background":"「微小變化疾病（minimal change disease, MCD）」是「兒童」腎病症候群與原發性腎絲球疾病「最常見」的原因——光學顯微鏡下腎絲球「幾乎正常（微小變化）」，但電子顯微鏡見「足細胞足突瀰漫融合（fusion/effacement）」，造成大量選擇性蛋白尿與水腫。對類固醇治療反應良好（>90%）、預後佳。故兒童最常見為MCD（B）。膜性腎病、FSGS是成人較常見。","options":{"A":"膜性腎絲球腎炎是成人常見腎病症候群原因。","B":"正確：微小變化疾病是兒童最常見原發性腎絲球疾病。","C":"局部節段性腎硬化（FSGS）成人較常見。","D":"膜增殖性較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-34":{"quick":"與血漿滲透壓下降關聯「最低」的水腫是「右心衰竭」，故選C。","detail":{"background":"水腫機制：①膠體滲透壓「下降」（低白蛋白）——慢性肝病（合成白蛋白減少，A）、蛋白質營養不良（B）、腎病症候群（漏白蛋白，D）皆因低白蛋白致膠體滲透壓下降而水腫；②「右心衰竭（C）」的水腫主要因「靜水壓上升（體循環靜脈鬱血）」與鈉水滯留，與血漿滲透壓下降關聯「最低」。故選C。","options":{"A":"慢性肝病低白蛋白致膠體滲透壓下降。","B":"蛋白質營養不良致低白蛋白。","C":"正確：右心衰竭水腫主因靜水壓上升，與滲透壓下降關聯最低。","D":"腎病症候群漏白蛋白致膠體滲透壓下降。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-42":{"quick":"Reed-Sternberg細胞出現在何杰金氏淋巴瘤，故選B。","detail":{"background":"Reed-Sternberg細胞（RS cell）是「何杰金氏淋巴瘤（Hodgkin lymphoma）」的診斷性腫瘤細胞——大型雙核或多核細胞，核仁大而明顯如「貓頭鷹眼（owl-eye）」，CD15、CD30陽性。診斷何杰金淋巴瘤必須在病變組織中找到RS細胞。故RS細胞見於何杰金氏淋巴瘤（B）。Wilms瘤、骨髓瘤、CML無RS細胞。","options":{"A":"Wilms瘤是兒童腎腫瘤，無RS細胞。","B":"正確：Reed-Sternberg細胞是何杰金氏淋巴瘤的診斷細胞。","C":"多發性骨髓瘤是漿細胞瘤，無RS細胞。","D":"CML無RS細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-35":{"quick":"錯誤敘述為D：第二型糖尿病「無」嚴重β細胞耗竭（那是第一型），故選D。","detail":{"background":"糖尿病：A「第一型與自體免疫破壞較有關」（正確，自體免疫破壞胰島β細胞）；B「肥胖與第二型病因較有關」（正確，胰島素阻抗）；C「長期糖尿病出現結節狀腎小球硬化（Kimmelstiel-Wilson結節）」（正確，糖尿病腎病變）；D「第二型常見嚴重β細胞耗竭」錯——「第一型」才是β細胞被自體免疫嚴重破壞耗竭（須打胰島素）；第二型早期β細胞數量大致正常（後期才漸減），主要問題是胰島素阻抗。故錯誤為D。","options":{"A":"第一型與自體免疫破壞相關，正確。","B":"肥胖與第二型相關，正確。","C":"糖尿病致結節狀腎小球硬化，正確。","D":"正確（為錯誤敘述）：嚴重β細胞耗竭是第一型，非第二型。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-44":{"quick":"最常見的泌尿道結石是「草酸鈣」，故選D。","detail":{"background":"泌尿道結石最常見的成分是「草酸鈣（calcium oxalate）」（及磷酸鈣，鈣性結石約佔75-80%）——與高鈣尿、高草酸尿、低尿量相關，X光可見（不透X光）。其他：磷酸銨鎂（struvite，與產尿素酶細菌感染相關、形成鹿角結石）、尿酸（與痛風、酸性尿相關、X光透明）、胱胺酸（遺傳性）。故最常見為草酸鈣（D）。","options":{"A":"尿酸結石約佔5-10%。","B":"胱胺酸結石少見（遺傳性）。","C":"磷酸銨鎂與感染相關，較少。","D":"正確：草酸鈣是最常見泌尿道結石。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-45":{"quick":"錯誤敘述為D：Wilms瘤無Homer-Wright偽花瓣（那是神經母細胞瘤），故選D。","detail":{"background":"Wilms瘤（威爾斯瘤/腎母細胞瘤nephroblastoma）：A又名腎母細胞瘤（正確）；B「兒童最常見的原發腎臟腫瘤」（正確，好發3-4歲）；C「WAGR症候群（Wilms瘤、無虹膜、生殖泌尿異常、智能障礙，WT1基因）為危險因子」（正確）；D「常出現Homer-Wright偽花瓣（pseudorosette）」錯——Homer-Wright偽花瓣是「神經母細胞瘤（neuroblastoma）」的特徵；Wilms瘤的組織學是三相（blastema、上皮、間質）。故錯誤為D。","options":{"A":"又名腎母細胞瘤，正確。","B":"兒童最常見原發腎腫瘤，正確。","C":"WAGR症候群是危險因子，正確。","D":"正確（為錯誤敘述）：Homer-Wright偽花瓣是神經母細胞瘤，非Wilms瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-33":{"quick":"鏈球菌感染後腎小球腎炎屬「第三型過敏反應」，故選C。","detail":{"background":"鏈球菌感染後腎絲球腎炎（post-streptococcal glomerulonephritis）是A群鏈球菌感染（咽炎或膿皮症）後1-3週發生的「免疫複合體（第三型過敏反應）」疾病——鏈球菌抗原與抗體形成的免疫複合體沉積於腎絲球（上皮下「駝峰hump」），活化補體引起腎炎症候群（血尿、蛋白尿、水腫、高血壓、氮血症）。故屬第三型（C）。","options":{"A":"第一型是IgE即發型過敏。","B":"第二型是抗體媒介細胞毒性。","C":"正確：鏈球菌後腎炎是第三型（免疫複合體）。","D":"第四型是T細胞媒介。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-37":{"quick":"止痛劑腎病主要影響「腎小管及間質」，故選C。","detail":{"background":"止痛劑腎病（analgesic nephropathy）：長期大量服用止痛劑（如phenacetin、阿斯匹靈、acetaminophen、NSAID）造成「慢性腎小管間質性腎炎與腎乳頭壞死（renal papillary necrosis）」——主要侵犯「腎小管及間質」（C），因止痛劑代謝產物與抑制前列腺素（保護性血流）使腎髓質缺血。故主要影響腎小管及間質（C）。","options":{"A":"腎皮質非止痛劑腎病主要侵犯處。","B":"腎絲球非止痛劑腎病主要部位。","C":"正確：止痛劑腎病主要影響腎小管及間質（與腎乳頭壞死）。","D":"腎莢膜非病變部位。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-46":{"quick":"一般而言腎結石最常見是「草酸鈣及磷酸鈣（鈣性結石）」，故選A。","detail":{"background":"腎結石最常見的成分是「鈣性結石（草酸鈣calcium oxalate與磷酸鈣calcium phosphate，約佔75-80%）」——與高鈣尿、高草酸尿、副甲狀腺亢進、低尿量相關。磷酸銨鎂（struvite，感染性鹿角結石）、尿酸（痛風）、胱胺酸（遺傳）較少。故最常見為鈣性結石（A）。","options":{"A":"正確：草酸鈣及磷酸鈣（鈣性結石）最常見。","B":"磷酸銨鎂與感染相關，較少。","C":"尿酸結石約5-10%。","D":"胱胺酸結石少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-38":{"quick":"兒童腎病症候群最常由微小變化型腎絲球腎炎引起，故選B。","detail":{"background":"「微小變化型腎絲球腎炎（minimal change disease, MCD）」是「兒童腎病症候群」最常見的原因（約佔兒童腎病症候群80-90%）——電子顯微鏡見足細胞足突瀰漫融合，造成大量選擇性蛋白尿、水腫，對類固醇反應良好。故兒童腎病症候群最常見為MCD（B）。膜性腎病、FSGS是成人較常見。","options":{"A":"膜性腎絲球腎炎是成人常見腎病症候群原因。","B":"正確：微小變化型是兒童腎病症候群最常見原因。","C":"FSGS成人較常見。","D":"膜增殖性較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-47":{"quick":"錯誤敘述為D：急性腎小管傷害（ATI）典型是「腎小管」壞死而非腎絲球壞死，故選D。","detail":{"background":"急性腎小管傷害（acute tubular injury/necrosis, ATI/ATN）：A「可能造成少尿（<400 ml/day）」（正確，急性腎損傷）；B「缺血是常見原因」（正確，休克、低血壓）；C「重金屬、有機溶劑（毒素）亦可造成」（正確，腎毒性ATN）；D「典型病理出現『絲球體（腎絲球）壞死』」錯——ATI的病理是「腎小管上皮壞死」，腎絲球通常「正常」。故錯誤為D。","options":{"A":"ATI可致少尿，正確。","B":"缺血是ATI常見原因，正確。","C":"重金屬有機溶劑可致ATI，正確。","D":"正確（為錯誤敘述）：ATI是腎小管壞死，腎絲球正常。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-34":{"quick":"嬰兒多囊性腎病變是「體染色體隱性」遺傳，故選A。","detail":{"background":"多囊性腎病分兩型：①「嬰兒型（infantile/childhood polycystic kidney disease, ARPKD）」是「體染色體『隱性』遺傳（PKHD1基因）」，新生兒/嬰兒期發病，雙腎瀰漫小囊腫、常合併肝纖維化，預後差（A正確）；②「成人型（ADPKD）」是體染色體「顯性」遺傳（PKD1/PKD2），中年發病。故嬰兒型為體染色體隱性（A）。","options":{"A":"正確：嬰兒多囊性腎病是體染色體隱性遺傳。","B":"體染色體顯性是「成人型」多囊腎。","C":"非性染色體隱性。","D":"非性染色體顯性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-38":{"quick":"Wilms瘤正確敘述為A：主要發生於五歲以下幼童，故選A。","detail":{"background":"威爾斯瘤（Wilms tumor/腎母細胞瘤）：A「主要發生於五歲以下幼童」（正確，好發2-5歲，兒童最常見腎腫瘤）；B「主要於腎盂出現」錯——發生於腎實質（腎皮質），非腎盂；C「血尿為最常見臨床表現」錯——最常見表現是「無症狀的腹部腫塊（abdominal mass）」（血尿較少）；D「為良性腫瘤」錯——是「惡性」胚胎性腫瘤（但對化放療反應好、預後相對佳）。故正確為A。","options":{"A":"正確：Wilms瘤主要發生於五歲以下幼童。","B":"發生於腎實質，非腎盂。","C":"最常見表現是腹部腫塊，非血尿。","D":"是惡性腫瘤，非良性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-38":{"quick":"微小變化疾病正確敘述為A：90%以上病人對類固醇反應良好，故選A。","detail":{"background":"微小變化疾病（minimal change disease, MCD）：A「90%以上病人對類固醇治療反應良好」（正確，是兒童腎病症候群且預後極佳）；B「50%以上終究慢性腎衰竭」錯——MCD預後好，少進展至腎衰竭；C「以血尿為主要表現」錯——是「大量蛋白尿（腎病症候群）」非血尿；D「因免疫沉澱物引發」錯——MCD「無免疫複合體沉積」（免疫螢光陰性），機轉與T細胞功能異常使足細胞足突融合有關。故正確為A。","options":{"A":"正確：MCD 90%以上對類固醇反應良好。","B":"MCD預後好，少進展慢性腎衰竭。","C":"以大量蛋白尿為主，非血尿。","D":"MCD無免疫沉澱物（免疫螢光陰性）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-41":{"quick":"鏈球菌後腎絲球腎炎的主要表現「不」包括大量蛋白尿，故選D。","detail":{"background":"鏈球菌感染後腎絲球腎炎屬「腎炎症候群（nephritic syndrome）」，主要表現：血尿（A，可樂色尿、紅血球圓柱）、氮血症（B，腎功能下降）、高血壓（C，鈉水滯留）、寡尿、輕中度蛋白尿與水腫。而「大量蛋白尿（>3.5g/day）」是「腎病症候群」的特徵，鏈球菌後腎炎雖有蛋白尿但通常「非大量」。故不包括大量蛋白尿者為D。","options":{"A":"血尿是鏈球菌後腎炎主要表現。","B":"氮血症是其表現。","C":"高血壓是其表現。","D":"正確：大量蛋白尿是腎病症候群特徵，非鏈球菌後腎炎主要表現。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-47":{"quick":"錯誤敘述為C：兒童多囊性腎病是「體染色體隱性」遺傳（題述常將之與顯性混淆），故選C。","detail":{"background":"腎臟囊腫疾病：A「單純性囊腫一般臨床無害」（正確，老年常見偶發）；B「成人多囊性腎病是體染色體顯性」（正確，ADPKD）；C敘述兒童多囊性腎病——其為「體染色體『隱性』遺傳（ARPKD）」，若題目C將其描述為顯性或其他錯誤遺傳模式則為錯誤選項（本題答案C）；D「成人多囊性腎病多與PKD1基因缺陷有關」（正確，約85% ADPKD為PKD1）。故錯誤為C。","options":{"A":"單純性囊腫臨床無害，正確。","B":"成人多囊腎是體染色體顯性，正確。","C":"正確（為錯誤敘述）：兒童多囊腎是體染色體隱性（ARPKD）。","D":"成人多囊腎多與PKD1相關，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-39":{"quick":"10歲以下小孩常見的腎臟腫瘤是威爾斯氏瘤（Wilms tumor），故選B。","detail":{"background":"「威爾斯氏瘤（Wilms tumor/腎母細胞瘤）」是「10歲以下兒童（好發2-5歲）」最常見的原發腎臟腫瘤——胚胎性惡性腫瘤，表現為無症狀腹部腫塊。相對地，透亮細胞癌（亮細胞癌）、嫌色細胞癌、乳突狀腎細胞癌都是「成人」腎細胞癌的亞型。故兒童最常見腎腫瘤為Wilms瘤（B）。","options":{"A":"透亮細胞癌是成人腎細胞癌。","B":"正確：威爾斯氏瘤是兒童最常見腎腫瘤。","C":"嫌色腎細胞癌是成人腫瘤。","D":"乳突狀腎細胞癌是成人腫瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-47":{"quick":"「NSAID」不是引起快速進行性（新月形）腎絲球腎炎的原因，故選D。","detail":{"background":"快速進行性（新月形crescentic）腎絲球腎炎（RPGN）依機轉分三型，常見病因：①抗GBM抗體型——Goodpasture症候群（A）；②免疫複合體型——SLE（B）、鏈球菌後腎炎（C）；③寡免疫型（ANCA相關血管炎）。這些都會在腎絲球形成「新月體（crescent）」。而「非類固醇抗發炎藥（NSAID）」主要引起的是「急性間質性腎炎或微小變化疾病」，「不是」新月形腎絲球腎炎的原因。故選D。","options":{"A":"Goodpasture症候群是抗GBM型RPGN。","B":"SLE是免疫複合體型RPGN。","C":"鏈球菌後腎炎可致新月形腎炎。","D":"正確：NSAID不致新月形腎絲球腎炎。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-21":{"quick":"蛋白尿高血脂但腎功能血壓正常、光鏡幾乎正常，是微小變化疾病，水腫主因血液滲透壓下降，故選D。","detail":{"background":"本題描述「18歲、四肢水腫、大量蛋白尿、高血脂、腎功能與血壓正常、光鏡幾乎正常」是典型「微小變化疾病（兒童/青少年腎病症候群）」。其水腫的主要機制是「大量蛋白尿→低白蛋白血症→血液（血漿）膠體滲透壓下降」（D），使液體外滲組織。故選D。鉀貯積、血管內壓上升、高血脂本身非水腫主因（高血脂是腎病症候群伴隨現象）。","options":{"A":"鉀離子貯積非水腫主因。","B":"血管內壓上升是腎炎症候群機制，此為腎病症候群。","C":"高血脂是伴隨現象，非水腫主因。","D":"正確：低白蛋白致血漿滲透壓下降是水腫主因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-22":{"quick":"「鈉滯留」不是造成血漿滲透壓「下降」的原因，故選D。","detail":{"background":"血漿（膠體）滲透壓「下降」主因是「低白蛋白血症」：腎病症候群（漏白蛋白，A）、肝硬化（合成白蛋白減少，B）、蛋白質營養不良（攝取不足，C）皆致白蛋白下降、膠體滲透壓下降。而「鈉滯留（sodium retention）」增加的是體液量與「靜水壓」，並使血漿略偏「高張」或等張（鈉是滲透壓主要決定者），「不會」造成血漿滲透壓「下降」。故選D。","options":{"A":"腎病症候群漏白蛋白致滲透壓下降。","B":"肝硬化低白蛋白致滲透壓下降。","C":"蛋白質營養不良致低白蛋白。","D":"正確：鈉滯留不致血漿滲透壓下降（鈉是滲透壓主要決定者）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-23":{"quick":"最不適當的是C：HTLV-1與「成人T細胞白血病」相關，非選項所述，故選C。","detail":{"background":"微生物與癌症：A「EBV與Burkitt淋巴瘤（及鼻咽癌、何杰金）」（正確）；B「幽門螺旋桿菌與胃邊緣區（MALT）淋巴瘤」（正確）；D「埃及血吸蟲（Schistosoma haematobium）與膀胱癌（鱗狀細胞癌）」（正確）。C敘述HTLV-1（human T-cell leukemia virus）——其與「成人T細胞白血病/淋巴瘤（ATLL）」相關，若題目C將HTLV-1配對為其他癌症（非ATLL）則為最不適當。故答案C。","options":{"A":"EBV與Burkitt淋巴瘤相關，正確。","B":"幽門桿菌與胃MALT淋巴瘤相關，正確。","C":"正確（為最不適當）：HTLV-1與成人T細胞白血病相關，配對有誤。","D":"埃及血吸蟲與膀胱癌相關，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-23":{"quick":"KIT基因突變最常見於胃腸道基質瘤（GIST），故選B。","detail":{"background":"「KIT（c-KIT）基因突變」是「胃腸道基質瘤（gastrointestinal stromal tumor, GIST）」最常見的分子變化（約75-80%，另有PDGFRA突變）——KIT是受體酪胺酸激酶，突變使其持續活化驅動腫瘤生長，故GIST可用酪胺酸激酶抑制劑「imatinib（基利克）」標靶治療。故KIT突變最常見於GIST（B）。","options":{"A":"肺腺癌常見EGFR/ALK突變，非KIT。","B":"正確：KIT突變最常見於胃腸道基質瘤（GIST）。","C":"肝癌非KIT突變典型。","D":"膀胱癌非KIT突變典型。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-28":{"quick":"快速進行性腎絲球腎炎最主要的病理特徵是「新月體（crescent）」，故選A。","detail":{"background":"快速進行性腎絲球腎炎（rapidly progressive glomerulonephritis, RPGN）的特徵性病理是腎絲球囊內形成「新月體（crescent）」——由增生的壁層上皮細胞、浸潤的巨噬細胞與纖維蛋白組成，壓迫腎絲球叢，故又稱「新月形腎絲球腎炎」。臨床數週至數月內快速進展至腎衰竭。故主要病理特徵為新月體（A）。乾酪性壞死（結核）、Russell小體（漿細胞）、纖維素樣壞死（血管炎）非RPGN的定義特徵。","options":{"A":"正確：新月體（crescent）是RPGN的特徵病理。","B":"乾酪性壞死是結核特徵。","C":"Russell小體見於漿細胞。","D":"纖維素樣壞死見於血管炎/惡性高血壓。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114100-N1-27":{"quick":"最不適當的是A：IgA腎病變（Berger病）好發於「年輕男性」而非老年女性，故選A。","detail":{"background":"IgA腎病變（IgA nephropathy/Berger病）：A「好發於老年女性」錯——好發「年輕男性（青少年至中年）」，典型在上呼吸道感染後出現「同步性肉眼血尿」；B「IgA主要沉積於腎絲球繫膜（mesangial）區」（正確，免疫螢光IgA沉積）；C「通常有血尿及蛋白尿」（正確）；D「是世界上最常見的原發性腎絲球疾病、慢性腎病主因之一」（正確）。故最不適當為A。","options":{"A":"正確（為最不適當）：IgA腎病好發年輕男性，非老年女性。","B":"IgA沉積於繫膜區，正確。","C":"有血尿及蛋白尿，正確。","D":"是最常見原發性腎絲球疾病，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-46":{"quick":"橋本氏甲狀腺炎是自體免疫性疾病，故選D。","detail":{"background":"橋本氏甲狀腺炎（Hashimoto thyroiditis）是「自體免疫」性甲狀腺炎（D）——自體抗體（抗甲狀腺過氧化酶anti-TPO、抗甲狀腺球蛋白）與淋巴球浸潤破壞甲狀腺，組織學見大量「淋巴球浸潤與生發中心、Hürthle細胞」，造成「甲狀腺機能『低下（非亢進）』」（C錯）。非病毒感染（A錯，那是亞急性肉芽腫性甲狀腺炎de Quervain）、非肉芽腫性發炎（B錯）。是女性甲狀腺功能低下最常見原因。故選D。","options":{"A":"非病毒感染（病毒性是亞急性甲狀腺炎）。","B":"非肉芽腫性發炎（是淋巴球浸潤）。","C":"造成甲狀腺機能低下，非亢進。","D":"正確：橋本氏甲狀腺炎是自體免疫疾病。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-46":{"quick":"帕金森氏症是中樞「多巴胺（dopamine）」缺乏所致，故選A。","detail":{"background":"帕金森氏症（Parkinsonism）是中腦黑質緻密部「多巴胺（dopamine）」神經元退化，使紋狀體多巴胺不足，造成運動遲緩、靜止性顫抖、肌肉僵直、姿勢不穩。治療補多巴胺前驅物levodopa。故帕金森氏症為多巴胺缺乏（A）。乙醯膽鹼缺乏與阿茲海默相關。","options":{"A":"正確：帕金森氏症是多巴胺缺乏。","B":"腎上腺素非帕金森主因。","C":"乙醯膽鹼缺乏與阿茲海默相關。","D":"GABA非帕金森主因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-47":{"quick":"停經婦女骨質疏鬆最主要原因是「動情激素（estrogen）分泌減少」，故選B。","detail":{"background":"停經後骨質疏鬆症（postmenopausal osteoporosis）的最主要原因是「雌激素（動情激素estrogen）分泌減少」——卵巢功能衰退使雌激素下降，雌激素原本可抑制蝕骨細胞活性、保護骨質，缺乏後骨吸收大於骨形成，骨密度快速流失（尤其鬆質骨），易發生脊椎與髖部骨折。故停經骨鬆主因為雌激素減少（B）。","options":{"A":"黃體素減少非骨鬆主因。","B":"正確：雌激素（動情激素）減少是停經骨鬆最主要原因。","C":"醛固酮與骨鬆無直接關係。","D":"皮質脂酮非停經骨鬆主因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-35":{"quick":"最易引起類澱粉沉積的甲狀腺腫瘤是髓狀癌（medullary carcinoma），故選D。","detail":{"background":"甲狀腺「髓狀癌（medullary carcinoma）」源自分泌「降鈣素（calcitonin）」的濾泡旁C細胞，其分泌的降鈣素會以「類澱粉（amyloid，降鈣素源型）」形式沉積於腫瘤間質——故髓狀癌的特徵是「間質類澱粉沉積」（剛果紅陽性）。約25%與MEN2/RET基因相關。故最易引起類澱粉沉積者為髓狀癌（D）。乳突癌、濾泡癌、退行性癌無此特徵。","options":{"A":"乳突狀癌無類澱粉沉積（有沙瘤體）。","B":"濾泡性癌無類澱粉沉積。","C":"退行性癌無類澱粉沉積。","D":"正確：髓狀癌（C細胞，降鈣素）引起類澱粉沉積。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-38":{"quick":"肥胖者「較少」血中高密度脂蛋白（HDL）濃度上升，故選C。","detail":{"background":"肥胖（代謝症候群）相關：糖尿病（A，胰島素阻抗）、高血壓（B）、高三酸甘油脂血症（D）皆與肥胖正相關。而肥胖者的血脂變化是「高密度脂蛋白（HDL，好膽固醇）『下降』」與低密度脂蛋白、三酸甘油脂上升。故「HDL濃度上升」較少發生於肥胖者（C，肥胖反而HDL下降）。故選C。","options":{"A":"肥胖者常見糖尿病。","B":"肥胖者常見高血壓。","C":"正確：肥胖者HDL多下降，「HDL上升」較少發生。","D":"肥胖者常見高三酸甘油脂。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-39":{"quick":"最常併發心內膜炎的自體免疫疾病是全身性紅斑性狼瘡（SLE），故選C。","detail":{"background":"全身性紅斑性狼瘡（SLE）可併發「Libman-Sacks心內膜炎（非細菌性疣狀心內膜炎）」——無菌性纖維蛋白血小板贅生物附於二尖瓣等瓣膜兩面，是SLE的心臟表現之一。故最常併發心內膜炎的自體免疫病為SLE（C）。類風濕關節炎、橋本甲狀腺炎、重症肌無力較少併發心內膜炎。故選C。","options":{"A":"類風濕關節炎較少併發心內膜炎。","B":"橋本甲狀腺炎與心內膜炎無關。","C":"正確：SLE併發Libman-Sacks心內膜炎。","D":"重症肌無力與心內膜炎無關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-46":{"quick":"最可能造成甲狀腺功能低下的是橋本氏甲狀腺炎，故選B。","detail":{"background":"「橋本氏甲狀腺炎（Hashimoto thyroiditis）」是「甲狀腺功能低下（hypothyroidism）」最常見的原因——自體免疫破壞甲狀腺實質，造成甲狀腺素分泌不足（怕冷、體重增加、疲倦、黏液水腫）。相對地，格雷夫氏病（Graves）、毒性甲狀腺腫、甲狀腺風暴都造成甲狀腺「亢進」。故造成甲狀腺低下者為橋本氏甲狀腺炎（B）。","options":{"A":"Graves病造成甲狀腺亢進。","B":"正確：橋本氏甲狀腺炎造成甲狀腺低下。","C":"毒性甲狀腺腫造成亢進。","D":"甲狀腺風暴是亢進危象。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-45":{"quick":"腦下垂體後葉異常產生的疾病是尿崩症（diabetes insipidus），故選D。","detail":{"background":"腦下垂體後葉分泌抗利尿激素（ADH）與催產素。後葉異常（ADH不足）造成「尿崩症（diabetes insipidus）」——ADH缺乏使集尿管無法回收水分，大量稀釋尿、極度口渴多飲。故後葉異常疾病為尿崩症（D）。巨人症（GH過多）、庫欣氏症（ACTH/皮質醇）是「前葉/腎上腺」問題；先天性甲狀腺功能不全是甲狀腺問題。故選D。","options":{"A":"巨人症是前葉GH過多。","B":"先天性甲狀腺功能不全是甲狀腺問題。","C":"庫欣氏症是ACTH/皮質醇過多（前葉/腎上腺）。","D":"正確：尿崩症是後葉ADH不足。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-46":{"quick":"正確敘述為C：第一型糖尿病比第二型容易發生酮酸血症，故選C。","detail":{"background":"第一型vs第二型糖尿病：A「第一型多發生30歲以上」錯——第一型多發生「兒童青少年」；B「第二型多發生正常體重」錯——第二型多「肥胖」；C「第一型比第二型容易發生酮酸血症（DKA）」正確——第一型胰島素絕對缺乏，易生酮；第二型有殘存胰島素，較少DKA（多為高血糖高滲透壓狀態）；D「第二型容易早期胰臟炎及纖維化」錯——胰臟纖維化非第二型典型早期特徵。故正確為C。","options":{"A":"第一型多發生兒童青少年，非30歲以上。","B":"第二型多肥胖，非正常體重。","C":"正確：第一型比第二型易發生酮酸血症（DKA）。","D":"胰臟炎纖維化非第二型典型早期特徵。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-47":{"quick":"預後最佳的甲狀腺癌是乳突狀癌（papillary carcinoma），故選A。","detail":{"background":"甲狀腺癌預後：「乳突狀癌（papillary carcinoma）」最常見（約80%）且「預後最佳」——生長慢、經淋巴轉移（頸淋巴結）但十年存活率高。濾泡性癌（經血路轉移肺骨）預後次之；髓狀癌（C細胞）中等；「退行性/未分化癌（anaplastic carcinoma）」預後「最差」（侵襲性極強、數月致命）。故預後最佳為乳突狀癌（A）。","options":{"A":"正確：乳突狀癌預後最佳。","B":"濾泡性癌預後次之。","C":"退行性癌預後最差。","D":"髓狀癌預後中等。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-40":{"quick":"最易引起副腫瘤症候群的腫瘤是肺小細胞癌，故選D。","detail":{"background":"副腫瘤症候群（paraneoplastic syndrome）是腫瘤分泌異位激素或物質引起的全身效應，最常見於「肺小細胞癌（small cell lung carcinoma）」——因其神經內分泌特性，可異位分泌ADH（致SIADH低血鈉）、ACTH（致庫欣症候群）、或引起Lambert-Eaton肌無力症候群等。故最易引起副腫瘤症候群者為肺小細胞癌（D）。","options":{"A":"甲狀腺癌較少引起副腫瘤症候群。","B":"口腔鱗狀細胞癌較少。","C":"大腸腺癌較少。","D":"正確：肺小細胞癌（神經內分泌）最易引起副腫瘤症候群。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-46":{"quick":"曾照射放射線的甲狀腺最常見「乳突性癌」，故選A。","detail":{"background":"頭頸部「放射線」暴露（尤其兒童期）是甲狀腺癌（特別是「乳突狀癌papillary carcinoma」）的明確危險因子——放射線致甲狀腺濾泡細胞基因損傷（如RET/PTC重組），多年後發展為乳突狀癌。故放射線後最常見乳突性癌（A）。車諾比核災後兒童甲狀腺乳突癌即明顯增加。","options":{"A":"正確：放射線後最常見甲狀腺乳突性癌。","B":"濾泡性癌與碘缺乏較相關。","C":"髓質癌與RET基因/MEN相關。","D":"未分化癌與放射線非直接相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-48":{"quick":"成骨不全症（玻璃娃娃）是「膠原蛋白合成異常」所致，故選A。","detail":{"background":"成骨不全症（osteogenesis imperfecta, OI，玻璃娃娃）是「第一型膠原蛋白（type I collagen）合成異常」的遺傳性疾病（多為體染色體顯性，COL1A1/COL1A2突變）——膠原是骨基質主要成分，缺陷使骨骼脆弱易碎、反覆骨折，伴藍色鞏膜、聽力障礙、牙齒異常。故OI為膠原蛋白合成異常（A）。軟骨發育異常是軟骨發育不全症（achondroplasia, FGFR3）、副甲狀腺素過多致骨流失、蝕骨細胞異常致骨硬化症/Paget病。故選A。","options":{"A":"正確：成骨不全症是第一型膠原蛋白合成異常。","B":"軟骨發育異常是軟骨發育不全症。","C":"副甲狀腺素過多致骨流失，非OI機轉。","D":"蝕骨細胞異常致骨硬化症/Paget病。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-35":{"quick":"多發性骨髓瘤的類澱粉前驅蛋白是「免疫球蛋白輕鏈」，故選A。","detail":{"background":"多發性骨髓瘤（multiple myeloma）是漿細胞惡性增生，產生大量單株免疫球蛋白與「輕鏈（light chain）」。其相關的類澱粉沉積症屬「AL型（amyloid light chain）」——前驅蛋白是「免疫球蛋白輕鏈」（A），沉積於心、腎、神經等致器官損害。故前驅蛋白為免疫球蛋白輕鏈（A）。降鈣素源型見於甲狀腺髓狀癌、胰島素類澱粉胜肽見於第二型糖尿病胰島、心房利鈉因子見於老年心房。故選A。","options":{"A":"正確：多發性骨髓瘤的類澱粉前驅蛋白是免疫球蛋白輕鏈（AL型）。","B":"降鈣素源型見於甲狀腺髓狀癌。","C":"胰島素類澱粉胜肽見於第二型糖尿病胰島。","D":"心房利鈉因子見於老年心房類澱粉。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-42":{"quick":"屬於腦下腺後葉症候群的是尿崩症（diabetes insipidus），故選A。","detail":{"background":"腦下垂體後葉（神經垂體）分泌ADH與催產素。「後葉症候群」指ADH異常——ADH不足造成「尿崩症（diabetes insipidus）」（大量稀釋尿、口渴），ADH過多造成SIADH（低血鈉）。故後葉症候群為尿崩症（A）。克列汀氏症（cretinism，先天甲狀腺低下）、侏儒症（GH不足，前葉）、巨人症（GH過多，前葉）皆非後葉。故選A。","options":{"A":"正確：尿崩症是腦下腺後葉（ADH）症候群。","B":"克列汀氏症是先天甲狀腺低下。","C":"侏儒症是前葉GH不足。","D":"巨人症是前葉GH過多。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-47":{"quick":"早期檢驗甲狀腺功能異常最敏感的是血清TSH濃度，故選B。","detail":{"background":"「血清甲狀腺刺激素（TSH）」是篩檢甲狀腺功能異常「最敏感」的指標——因下視丘-垂體-甲狀腺軸的負回饋，甲狀腺素（T4）微小變化即引起TSH「對數放大」的反向變化（甲亢時TSH極低、甲低時TSH升高），故TSH比直接測T3/T4更早、更敏感地反映甲狀腺功能。故首選TSH（B）。血清碘濃度不反映功能。","options":{"A":"血清碘濃度不反映甲狀腺功能。","B":"正確：TSH是篩檢甲狀腺功能異常最敏感的指標。","C":"T3不如TSH敏感。","D":"T4不如TSH敏感。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-48":{"quick":"錯誤敘述為A：第二型糖尿病發病年紀多在「成年/中老年」而非青少年，故選A。","detail":{"background":"第二型糖尿病：A「發病年紀多在青少年」錯——第二型多發生於「成年/中老年、肥胖者」（青少年發病是第一型典型，但近年肥胖青少年第二型增加，題以傳統觀念判A錯）；B「與HLA表現型沒有明顯關係」（正確，第一型才與HLA相關）；C「血中胰島素正常或過多」（正確，胰島素阻抗，早期代償性高胰島素）；D「胰島β細胞沒有明顯（破壞/減少）」（正確，第二型早期β細胞大致存在，與第一型自體免疫破壞不同）。故錯誤為A。","options":{"A":"正確（為錯誤敘述）：第二型多成年/中老年發病，非青少年。","B":"第二型與HLA無明顯關係，正確。","C":"第二型胰島素正常或過多，正確。","D":"第二型β細胞無明顯破壞，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-47":{"quick":"醛固酮過多致低血鉀的是孔恩氏症（Conn syndrome），故選B。","detail":{"background":"「孔恩氏症（Conn syndrome，原發性醛固酮增多症）」是腎上腺絲球帶腺瘤分泌過多「醛固酮」——醛固酮促腎遠曲小管「保鈉排鉀」，造成「高血壓＋低血鉀（hypokalemia）＋代謝性鹼中毒」。故醛固酮過多致低血鉀者為Conn症候群（B）。庫欣氏症（皮質醇過多）、愛迪生氏症（腎上腺功能不足，高血鉀）、嗜鉻細胞瘤（兒茶酚胺，陣發性高血壓）機轉不同。故選B。","options":{"A":"庫欣氏症是皮質醇過多，非醛固酮。","B":"正確：孔恩氏症醛固酮過多致低血鉀。","C":"愛迪生氏症是腎上腺低下（高血鉀）。","D":"嗜鉻細胞瘤是兒茶酚胺過多。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-37":{"quick":"與抽菸關係「最少」的是甲狀腺癌，故選C。","detail":{"background":"抽菸與肺氣腫（A）、心肌梗塞（B）、肺癌（D）皆高度相關。而「甲狀腺癌」與抽菸關係「最少」——甲狀腺癌的危險因子主要是放射線暴露、碘攝取、遺傳（RET/MEN），抽菸非主要危險因子。故與抽菸關係最少者為甲狀腺癌（C）。","options":{"A":"肺氣腫與抽菸高度相關。","B":"心肌梗塞與抽菸相關。","C":"正確：甲狀腺癌與抽菸關係最少。","D":"肺癌與抽菸最相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-38":{"quick":"第四型細胞媒介過敏的是第一型糖尿病，故選A。","detail":{"background":"第四型（遲發型/T細胞媒介）過敏反應的疾病：第一型糖尿病（T細胞攻擊胰島β細胞，A正確）、接觸性皮膚炎、結核菌素反應、移植排斥、多發性硬化症。對比：血清病（B）是第三型（免疫複合體）；重症肌無力（C）與惡性貧血（D）是第二型（抗體媒介，攻擊受體/內在因子）。故第四型者為第一型糖尿病（A）。","options":{"A":"正確：第一型糖尿病是第四型（T細胞媒介）過敏。","B":"血清病是第三型（免疫複合體）。","C":"重症肌無力是第二型（抗ACh受體抗體）。","D":"惡性貧血是第二型（抗內在因子抗體）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-48":{"quick":"「侵犯血管常見肺肝遠端轉移」不是甲狀腺乳突癌典型特徵，故選D。","detail":{"background":"甲狀腺乳突癌（papillary carcinoma）典型特徵：A「預後良好」（正確，最常見且預後最佳）；B「細胞核有偽包涵體（pseudoinclusion）」（正確）；C「同心圓鈣化的沙瘤體（psammoma body）」（正確）；D「侵犯血管常見肺肝遠端轉移」錯——乳突癌主要經「淋巴」轉移（頸淋巴結），血路遠端轉移少見；「血路轉移（肺、骨）」是「濾泡性癌」的特徵。故非乳突癌特徵者為D。","options":{"A":"乳突癌預後良好，正確。","B":"核內偽包涵體是乳突癌特徵，正確。","C":"沙瘤體是乳突癌特徵，正確。","D":"正確（為非乳突癌特徵）：血路遠端轉移是濾泡癌特徵，乳突癌主要淋巴轉移。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-47":{"quick":"細胞核毛玻璃樣、有核溝的甲狀腺病變是乳頭狀癌（papillary carcinoma），故選D。","detail":{"background":"甲狀腺「乳頭狀癌（papillary carcinoma）」的核特徵：「毛玻璃樣（ground-glass / Orphan Annie eye）核」（染色質淡、核透明）、「核溝（nuclear groove）」、核內偽包涵體、沙瘤體。這些核特徵是乳頭狀癌的診斷依據。故毛玻璃樣核、核溝者為乳頭狀癌（D）。濾泡癌、髓狀癌、橋本甲狀腺炎無此典型核特徵。","options":{"A":"濾泡狀癌無毛玻璃樣核。","B":"髓狀癌有類澱粉，非毛玻璃核。","C":"橋本甲狀腺炎是淋巴球浸潤，非此。","D":"正確：乳頭狀癌有毛玻璃樣核與核溝。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-47":{"quick":"腫瘤細胞核清澈樣或有假包涵體的甲狀腺癌是乳突性癌，故選A。","detail":{"background":"甲狀腺「乳突性癌（papillary carcinoma）」的細胞核特徵是「清澈／毛玻璃樣（clear/ground-glass）核」與「核內假包涵體（pseudo-inclusion）」、核溝、沙瘤體——這些是診斷乳突癌的關鍵核特徵。故核清澈、有假包涵體者為乳突性癌（A）。濾泡性癌、髓質癌、未分化癌無此核特徵。","options":{"A":"正確：乳突性癌核清澈樣、有假包涵體。","B":"濾泡性癌無此核特徵。","C":"髓質癌有類澱粉，非此核特徵。","D":"未分化癌是多型性核，非清澈樣。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-42":{"quick":"第二型糖尿病的遺傳模式是「多基因遺傳疾病」，故選C。","detail":{"background":"第二型糖尿病是「多基因（multigenic/polygenic）遺傳疾病」——由多個易感基因加上環境因素（肥胖、飲食、缺乏運動）共同作用，故家族史明顯（遺傳傾向比第一型強）但不是單基因或染色體異常的孟德爾式遺傳。故屬多基因遺傳（C）。少數特殊型如MODY才是單基因。","options":{"A":"非性聯遺傳。","B":"非單基因遺傳（MODY例外）。","C":"正確：第二型糖尿病是多基因遺傳疾病。","D":"非染色體異常疾病。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-45":{"quick":"嗜睡神智不清、胰臟腫瘤切除後症狀消失，是胰島素瘤（insulinoma），故選B。","detail":{"background":"「胰島素瘤（insulinoma）」是胰島β細胞腫瘤，分泌過多胰島素造成「反覆低血糖」——表現為神經低血糖症狀（嗜睡、神智不清、抽搐、行為異常，尤其空腹時），符合Whipple三徵（低血糖症狀＋血糖<50＋給糖緩解）。切除腫瘤後低血糖症狀消失。故選B。升糖素瘤致高血糖皮疹、胃泌素瘤致頑固潰瘍、體制素瘤致糖尿病膽石。故選B。","options":{"A":"升糖素瘤致高血糖、壞死性遊走性紅斑。","B":"正確：胰島素瘤致低血糖（嗜睡神智不清）。","C":"胃泌素瘤致頑固消化性潰瘍（Zollinger-Ellison）。","D":"體制素瘤致糖尿病、膽石、脂肪瀉。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-48":{"quick":"庫辛氏「病」的原因是腦下腺分泌過多ACTH，故選B。","detail":{"background":"庫辛氏「病（Cushing disease）」特指「腦下垂體（pituitary）腺瘤分泌過多腎上腺皮質刺激素（ACTH）」，刺激腎上腺皮質增生、分泌過多皮質醇——是內源性庫欣症候群最常見原因。故庫辛氏「病」為腦下腺ACTH過多（B）。注意區分：庫欣「症候群（syndrome）」是泛指所有皮質醇過多（含外源類固醇A、腎上腺腫瘤C、異位ACTH如肺癌D）；庫辛「病」專指垂體ACTH瘤。故選B。","options":{"A":"長期服用類固醇是外源性庫欣症候群，非庫辛氏病。","B":"正確：庫辛氏病是腦下腺ACTH瘤。","C":"腎上腺皮質增生若自主分泌是腎上腺源庫欣，非庫辛氏病。","D":"肺癌異位ACTH是異位性庫欣症候群。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-47":{"quick":"最易產生類澱粉沉積的甲狀腺癌是髓質癌，故選C。","detail":{"background":"甲狀腺「髓質癌（medullary carcinoma）」源自分泌降鈣素的濾泡旁C細胞，腫瘤間質常有「類澱粉（降鈣素源型amyloid）沉積」（剛果紅陽性），是其特徵。約25%與RET基因/MEN2相關。故最易類澱粉沉積者為髓質癌（C）。乳突癌、濾泡癌、退行性癌無此特徵。","options":{"A":"乳突癌有沙瘤體，非類澱粉。","B":"濾泡癌無類澱粉。","C":"正確：髓質癌（C細胞降鈣素）易類澱粉沉積。","D":"退行性分化癌無類澱粉。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112030-N1-30":{"quick":"不是腦下垂體前葉問題造成的是「不當ADH分泌症候群（SIADH）」，故選D。","detail":{"background":"腦下垂體「前葉」分泌GH、PRL、ACTH、TSH、LH、FSH。前葉問題造成：巨人症（A，GH過多兒童）、肢端肥大症（B，GH過多成人）、高泌乳素血症（C，泌乳素瘤）。而「不當ADH分泌症候群（SIADH）」是「ADH（抗利尿激素）」過度分泌——ADH來自「後葉」（或異位分泌如肺小細胞癌），「不是前葉」問題。故選D。","options":{"A":"巨人症是前葉GH過多。","B":"肢端肥大症是前葉GH過多。","C":"高泌乳素血症是前葉泌乳素瘤。","D":"正確：SIADH是ADH（後葉/異位）過多，非前葉問題。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-21":{"quick":"最不適當的是C：類固醇「抑制」發炎但會「延緩」傷口癒合（非增進），故選C。","detail":{"background":"傷口癒合：A「傷口感染是癒合延遲的重要因素」（正確，最常見）；B「癒合過程出現肉芽組織」（正確，新生血管與纖維母細胞）；C「使用類固醇能有效抑制發炎並『增進傷口癒合強度』」錯——類固醇雖抑制發炎，但同時「抑制膠原合成與纖維母細胞、延緩癒合、降低傷口強度」（故為最不適當）；D「糖尿病因血液灌注不良致癒合異常」（正確）。故最不適當為C。","options":{"A":"傷口感染延遲癒合，正確。","B":"癒合出現肉芽組織，正確。","C":"正確（為最不適當）：類固醇延緩癒合、降低傷口強度，非增進。","D":"糖尿病灌注不良致癒合異常，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-29":{"quick":"醛固酮分泌腺瘤致原發性醛固酮過多症稱「康氏症候群（Conn syndrome）」，故選B。","detail":{"background":"腎上腺絲球帶的「醛固酮分泌腺瘤（aldosterone-secreting adenoma）」造成「原發性醛固酮增多症」＝「康氏症候群（Conn syndrome）」——醛固酮過多保鈉排鉀，造成高血壓、低血鉀、代謝性鹼中毒。故選B。愛迪生氏症是腎上腺功能不足、庫欣症候群是皮質醇過多、腎上腺生殖器症候群是雄性素過多。故選B。","options":{"A":"愛迪生氏症是腎上腺功能不足。","B":"正確：醛固酮腺瘤致原發性醛固酮過多＝康氏症候群。","C":"庫欣症候群是皮質醇過多。","D":"腎上腺生殖器症候群是雄性素過多。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-30":{"quick":"甲狀腺乳突癌最少見的是「TP53基因突變」，故選B。","detail":{"background":"甲狀腺乳突癌（papillary carcinoma）常見特徵：「BRAF基因突變」（A，最常見的驅動突變，約40-60%）、「毛玻璃樣核（ground-glass nuclei）」（C）、「核內假包涵物（pseudo-inclusion）」（D）、核溝、沙瘤體。而「TP53基因突變」在分化良好的乳突癌「最少見」——TP53突變主要見於「未分化（退行性）癌」（與惡性度高、預後差相關）。故乳突癌最少見TP53突變（B）。","options":{"A":"BRAF突變是乳突癌常見驅動突變。","B":"正確：TP53突變在乳突癌最少見（多見於未分化癌）。","C":"毛玻璃樣核是乳突癌特徵。","D":"核內假包涵物是乳突癌特徵。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-29":{"quick":"兩側腎上腺變大、ACTH上升的庫欣症候群，最可能是腦下垂體前葉腫瘤，故選C。","detail":{"background":"庫欣症候群病因鑑別（看ACTH）：「ACTH『上升』＋雙側腎上腺增生變大」表示是「ACTH依賴型」——最常見是「腦下垂體前葉ACTH腺瘤（庫辛氏病，C）」（高ACTH刺激雙側腎上腺增生）。對比：腎上腺皮質腺瘤（A）會自主分泌皮質醇而「抑制ACTH」（ACTH低、對側腎上腺萎縮）；長期使用類固醇（D）也抑制ACTH；嗜鉻細胞瘤（B）是兒茶酚胺非皮質醇。故ACTH上升＋雙側腎上腺增大為垂體腫瘤（C）。","options":{"A":"腎上腺腺瘤自主分泌皮質醇會抑制ACTH（ACTH低）。","B":"嗜鉻細胞瘤是兒茶酚胺，非庫欣。","C":"正確：垂體前葉ACTH瘤致ACTH上升、雙側腎上腺增大。","D":"長期類固醇會抑制ACTH。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-29":{"quick":"第一型糖尿病最常見「蘭氏小島發炎破壞」，故選A。","detail":{"background":"第一型糖尿病是「自體免疫」破壞胰島（蘭氏小島，islets of Langerhans）的β細胞——T細胞媒介的「胰島炎（insulitis，蘭氏小島發炎與淋巴球浸潤）」造成β細胞進行性破壞、胰島素絕對缺乏。故第一型最常見變化為蘭氏小島發炎破壞（A）。β細胞數量「減少」（非增加，B錯）；類澱粉沉積（胰島澱粉樣多胜肽）見於「第二型」（C錯）；周邊胰島素阻抗是「第二型」特徵（D錯）。故選A。","options":{"A":"正確：第一型糖尿病是蘭氏小島發炎破壞（胰島炎）。","B":"β細胞數量減少而非增加。","C":"類澱粉沉積見於第二型糖尿病胰島。","D":"周邊胰島素阻抗是第二型特徵。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-45":{"quick":"卵巢囊性腫瘤內含毛髮與皮脂，是成熟畸胎瘤（mature teratoma），故選B。","detail":{"background":"成熟畸胎瘤（mature cystic teratoma，又稱皮樣囊腫dermoid cyst）是年輕女性最常見的卵巢生殖細胞腫瘤（良性），含三個胚層分化的成熟組織，囊內常見「毛髮、皮脂、牙齒、皮膚」等。故含毛髮皮脂的卵巢囊性腫瘤為成熟畸胎瘤（B）。絨毛膜癌（hCG高）、無性細胞瘤（dysgerminoma，惡性）、轉移癌型態不同。故選B。","options":{"A":"絨毛膜癌分泌hCG，無毛髮皮脂。","B":"正確：成熟畸胎瘤含毛髮皮脂（皮樣囊腫）。","C":"無性細胞瘤是惡性生殖細胞瘤，無毛髮皮脂。","D":"皮膚癌轉移卵巢罕見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-44":{"quick":"多囊性卵巢症「最不可能」出現月經過多，故選C。","detail":{"background":"多囊性卵巢症候群（polycystic ovary syndrome, PCOS）特徵：①「無排卵」造成月經「稀少或無月經（非月經過多）」（C，月經過多不符）；②高雄性素致「多毛（體毛過多）」（D）、痤瘡；③「不孕」（B，慢性不排卵）；④胰島素阻抗致「肥胖」（A）與糖尿病風險。故最不可能出現者為「月經過多」（C，PCOS反而是月經稀少）。","options":{"A":"PCOS常見肥胖（胰島素阻抗）。","B":"PCOS常見不孕（不排卵）。","C":"正確：PCOS是月經稀少/無月經，非月經過多。","D":"PCOS常見體毛過多（高雄性素）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-45":{"quick":"前列腺增生肥大最常發生在「中央及內移形區」，故選B。","detail":{"background":"良性前列腺增生（benign prostatic hyperplasia, BPH）好發於前列腺的「中央區與移形區（periurethral/transitional zone，圍繞尿道）」——增生壓迫尿道造成排尿困難、頻尿、夜尿等下泌尿道症狀。注意對比：前列腺「癌」好發於「周邊區（peripheral zone）」（可經肛診觸及）。故BPH好發中央/移形區（B）。","options":{"A":"周邊區是前列腺「癌」好發處。","B":"正確：BPH好發中央及內移形區（壓迫尿道）。","C":"外移形區非主要好發處。","D":"非任何區域皆好發。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-46":{"quick":"尖形濕疣（condyloma acuminatum）發生機會最低的是子宮內膜，故選C。","detail":{"background":"尖形濕疣（condyloma acuminatum，俗稱菜花）是「人類乳突病毒（HPV，低危險型6、11）」感染「鱗狀上皮」造成的疣狀增生，好發於外陰、陰道、子宮頸、肛門周圍、陰莖等「有鱗狀上皮的外生殖器與肛周黏膜」。而「子宮內膜（endometrium）」是「腺體柱狀上皮」（非鱗狀上皮），最不易發生尖形濕疣。故機會最低者為子宮內膜（C）。","options":{"A":"陰道（鱗狀上皮）可發生尖形濕疣。","B":"外陰部（鱗狀上皮）好發。","C":"正確：子宮內膜是腺上皮，最不易發生尖形濕疣。","D":"肛門周圍好發。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-43":{"quick":"導致卵巢巧克力囊腫的是子宮內膜異位症，故選D。","detail":{"background":"卵巢「巧克力囊腫（chocolate cyst）」是「子宮內膜異位症（endometriosis）」累及卵巢——異位的子宮內膜組織隨月經週期反覆出血，陳舊血液積於卵巢內形成褐色黏稠如巧克力的囊腫（子宮內膜異位瘤endometrioma）。臨床痛經、慢性骨盆痛、不孕。故巧克力囊腫源自子宮內膜異位症（D）。濾泡囊腫、黃體囊腫是功能性囊腫、PCOS是多囊小卵泡，皆非巧克力囊腫。","options":{"A":"濾泡囊腫是功能性囊腫，非巧克力囊腫。","B":"黃體囊腫是功能性囊腫。","C":"PCOS是多個小卵泡，非巧克力囊腫。","D":"正確：子宮內膜異位症致卵巢巧克力囊腫。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-44":{"quick":"子癇前症「不」典型出現昏迷，故選A。","detail":{"background":"子癇前症（preeclampsia）是妊娠20週後出現的「高血壓（C）＋蛋白尿（D）＋水腫（B）」三聯徵，伴頭痛、視力模糊、上腹痛等。若進展到「抽搐（seizure）甚至昏迷」即為「子癇症（eclampsia）」（更嚴重的階段）。故「昏迷」不屬於「子癇『前』症」的典型徵候（A，昏迷是子癇症階段）。故選A。","options":{"A":"正確：昏迷是子癇症（eclampsia）階段，非子癇前症典型徵候。","B":"水腫是子癇前症徵候。","C":"高血壓是子癇前症徵候。","D":"蛋白尿是子癇前症徵候。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-45":{"quick":"顱內先天性動脈瘤機率最高在威利氏環前交通動脈，故選A。","detail":{"background":"顱內先天性（漿果型berry）動脈瘤好發於「威利氏環（circle of Willis）的動脈分叉處」，其中「前交通動脈（anterior communicating artery）」與前大腦動脈交界處發生率「最高」（約30-35%），其次後交通動脈、中大腦動脈分叉。破裂造成蛛網膜下腔出血。故機率最高為威利氏環前交通動脈（A）。","options":{"A":"正確：威利氏環前交通動脈動脈瘤機率最高。","B":"內頸動脈進入處次之。","C":"後交通動脈次之。","D":"基底動脈較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-44":{"quick":"子宮外孕機會最低的部位是陰道，故選C。","detail":{"background":"子宮外孕（ectopic pregnancy）是受精卵著床於子宮腔以外，最常見於「輸卵管（fallopian tube，約95%，尤其壺腹部）」（D），其次卵巢（B）、腹腔（A，腹膜）、子宮頸。而「陰道」不是受精卵著床的部位（受精在輸卵管、著床需子宮內膜或類似環境），故子宮外孕機會「最低」為陰道（C）。","options":{"A":"腹腔可發生罕見的腹腔妊娠。","B":"卵巢可發生卵巢妊娠。","C":"正確：陰道是子宮外孕機會最低的部位。","D":"輸卵管是子宮外孕最常見部位。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-43":{"quick":"錯誤敘述為D：隱睪症「會」增高睪丸癌發生率，故選D。","detail":{"background":"隱睪症（cryptorchidism）是睪丸未下降至陰囊：A發生率約1%（正確，足月男嬰）；B可單側或雙側（正確）；C隱睪因陰囊外溫度較高，易造成「睪丸萎縮與精子生成障礙（不孕）」（正確）；D「不會增高睪丸癌發生率」錯——隱睪症「會明顯增加睪丸生殖細胞癌（尤其精原細胞瘤）的風險」（即使手術固定後仍有風險）。故錯誤為D。","options":{"A":"發生率約1%，正確。","B":"可雙側或單側，正確。","C":"隱睪易致睪丸萎縮與不孕，正確。","D":"正確（為錯誤敘述）：隱睪症會增高睪丸癌風險。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-45":{"quick":"化膿性輸卵管炎最常見致病菌是淋病雙球菌，故選D。","detail":{"background":"化膿性輸卵管炎（suppurative salpingitis，骨盆腔發炎疾病PID的一部分）最常見的致病菌是「淋病雙球菌（Neisseria gonorrhoeae，淋菌）」（D）與披衣菌（Chlamydia，但披衣菌引起的發炎較不典型化膿）——經性接觸上行感染，造成輸卵管化膿、沾黏，後遺症包括不孕、子宮外孕、慢性骨盆痛。題問「化膿性」最典型為淋菌（D）。","options":{"A":"披衣菌致非化膿性（淋巴球性）輸卵管炎較多。","B":"結核菌致肉芽腫性輸卵管炎（少見）。","C":"念珠菌非輸卵管炎主因。","D":"正確：淋病雙球菌是化膿性輸卵管炎最常見致病菌。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-46":{"quick":"子宮內頸腺體出口阻塞導致納氏囊腫（Nabothian cyst），故選A。","detail":{"background":"子宮頸內頸（endocervical）的黏液腺體出口被鱗狀化生上皮覆蓋阻塞，黏液滯留形成「納氏囊腫（Nabothian cyst）」——是子宮頸常見的良性、無害的黏液滯留囊腫。故選A。巴氏囊腫（Bartholin cyst，前庭大腺）、賈氏管囊腫（Gartner duct，中腎管殘留）、貝氏囊腫（Baker cyst，膝膕窩）部位不同。故選A。","options":{"A":"正確：子宮內頸腺體阻塞致納氏囊腫。","B":"巴氏囊腫是前庭大腺囊腫。","C":"賈氏管囊腫是中腎管殘留。","D":"貝氏囊腫是膝膕窩囊腫（與生殖無關）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-48":{"quick":"較常伴隨重症肌無力的腫瘤是胸腺瘤，故選B。","detail":{"background":"「胸腺瘤（thymoma）」較常伴隨「重症肌無力（myasthenia gravis）」——約15-20%重症肌無力病人有胸腺瘤、而胸腺瘤病人約30-45%有重症肌無力。胸腺在自體免疫致病（產生抗乙醯膽鹼受體抗體）中扮演角色，故胸腺切除可改善部分病情。故與重症肌無力相關者為胸腺瘤（B）。淋巴瘤、卵巢瘤、腦瘤非典型相關。","options":{"A":"淋巴瘤與重症肌無力非典型相關。","B":"正確：胸腺瘤常伴隨重症肌無力。","C":"卵巢瘤非重症肌無力相關。","D":"腦瘤非重症肌無力相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-40":{"quick":"AIDS正確敘述為C：卡波西氏肉瘤是常見續發腫瘤，故選C。","detail":{"background":"後天免疫缺乏症候群（AIDS）：A「由HPV引起」錯——由「HIV」引起（HPV致子宮頸癌）；B「主要破壞B細胞」錯——主要破壞「CD4+ T細胞」；C「卡波西氏肉瘤（Kaposi sarcoma，HHV-8相關）是常見續發腫瘤」正確（AIDS相關惡性腫瘤，也有淋巴瘤）；D「極少造成神經病變」錯——HIV「常」造成神經病變（HIV相關失智、周邊神經病變）。故正確為C。","options":{"A":"AIDS由HIV引起，非HPV。","B":"HIV主要破壞CD4 T細胞，非B細胞。","C":"正確：卡波西氏肉瘤是AIDS常見續發腫瘤。","D":"HIV常造成神經病變，非極少。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-42":{"quick":"頭部漸大、需換大帽子，是骨頭的派吉特氏病（Paget disease of bone），故選B。","detail":{"background":"骨頭的派吉特氏病（Paget disease of bone）是局部骨重塑失調——蝕骨細胞與成骨細胞活性異常增加，骨骼增厚變形但結構紊亂脆弱。顱骨受侵犯時「頭骨增厚變大，病人需換更大的帽子」是經典描述。其他表現：骨痛、變形、病理性骨折、高輸出心衰、聽力喪失。血中鹼性磷酸酶升高。故頭變大需換帽子為Paget病（B）。骨關節炎、骨鬆、痛風不致此。","options":{"A":"骨關節炎是關節軟骨退化，不致頭骨變大。","B":"正確：骨頭派吉特氏病致顱骨增厚、需換大帽子。","C":"骨質疏鬆是骨量減少，不致頭骨變大。","D":"痛風是尿酸結晶關節炎。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-47":{"quick":"25歲女性界線明顯、可移動的乳房腫瘤是纖維腺瘤（fibroadenoma），故選B。","detail":{"background":"纖維腺瘤（fibroadenoma）是「年輕女性（20-30歲）最常見的乳房良性腫瘤」——觸診為「界線明顯、可自由移動、無痛、堅實」的腫塊（俗稱乳房鼠breast mouse），由腺體與纖維間質增生組成，與雌激素相關（懷孕可變大）。故年輕女性可移動的乳房腫瘤為纖維腺瘤（B）。葉狀瘤較大、管內乳頭瘤致乳頭分泌、纖維囊性變化是瀰漫結節非單一腫塊。故選B。","options":{"A":"葉狀瘤較大且生長快，較少見。","B":"正確：纖維腺瘤是年輕女性可移動的乳房良性腫瘤。","C":"管內乳頭瘤致乳頭血性分泌。","D":"纖維囊性變化是瀰漫性結節非單一腫塊。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-44":{"quick":"陰莖波恩氏病（Bowen disease）是原位癌，故選A。","detail":{"background":"波恩氏病（Bowen disease）是皮膚/生殖器的「鱗狀上皮原位癌（squamous cell carcinoma in situ）」——在陰莖表現為紅色斑塊（與HPV相關），癌細胞局限於表皮內未穿破基底膜，部分可進展為侵襲性鱗狀細胞癌。故陰莖波恩氏病為原位癌（A）。非過敏、非結核、非真菌感染。故選A。","options":{"A":"正確：波恩氏病是鱗狀上皮原位癌。","B":"非過敏反應。","C":"非結核菌引起。","D":"非真菌感染。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-45":{"quick":"卵巢的子宮內膜異位症表現為巧克力囊腫，故選A。","detail":{"background":"子宮內膜異位症（endometriosis）累及卵巢時形成「巧克力囊腫（chocolate cyst / endometrioma）」——異位內膜隨月經反覆出血，陳舊血積於卵巢呈巧克力色黏稠液。故卵巢的子宮內膜異位症為巧克力囊腫（A）。上皮囊腫、黏液囊腫、纖維囊性變化非子宮內膜異位。故選A。","options":{"A":"正確：卵巢子宮內膜異位症形成巧克力囊腫。","B":"上皮囊腫非子宮內膜異位。","C":"黏液囊腫非子宮內膜異位。","D":"纖維囊性變化是乳房病變。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-46":{"quick":"水囊狀胎塊（葡萄胎）不是卵巢原發性腫瘤，故選B。","detail":{"background":"卵巢原發性腫瘤：黏液性囊腺瘤（mucinous cystadenoma，A，表面上皮腫瘤）、漿液性囊腺瘤（serous cystadenoma，D，最常見）、畸胎瘤（teratoma，C，生殖細胞腫瘤）皆為卵巢原發腫瘤。而「水囊狀胎塊（hydatidiform mole，葡萄胎）」是「妊娠滋養層疾病（源自胎盤絨毛滋養層的異常妊娠）」，發生於「子宮」而非卵巢，不是卵巢原發腫瘤。故選B。","options":{"A":"黏液性囊腺瘤是卵巢原發腫瘤。","B":"正確：葡萄胎是妊娠滋養層疾病（子宮），非卵巢原發腫瘤。","C":"畸胎瘤是卵巢生殖細胞腫瘤。","D":"漿液性囊腺瘤是卵巢原發腫瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-45":{"quick":"子宮腺肌症是子宮肌層內出現「子宮內膜」組織，故選A。","detail":{"background":"子宮腺肌症（adenomyosis）是「子宮內膜組織（腺體與間質）異常存在於子宮『肌層』內」——使子宮均勻肥大、月經量多、痛經。它是子宮內膜「向內」侵入肌層（內在性子宮內膜異位）。故子宮肌層內出現的是子宮內膜（A）。子宮肌瘤是平滑肌瘤、宮體腺癌與子宮頸腺癌是惡性腫瘤，皆非腺肌症定義。故選A。","options":{"A":"正確：子宮腺肌症是肌層內出現子宮內膜組織。","B":"子宮肌瘤是平滑肌瘤，非腺肌症。","C":"宮體腺癌是惡性腫瘤。","D":"子宮頸腺癌是惡性腫瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-46":{"quick":"錯誤敘述為C：水腎若早期解除阻塞「並非完全不可逆」，故選C。","detail":{"background":"水腎（hydronephrosis）是尿路阻塞使腎盂腎盞擴張、腎實質受壓萎縮：A可因先天畸形或後天因素形成（正確）；B後天最常見於結石、腫瘤、發炎（正確，及前列腺肥大）；C「一旦形成即為不可逆」錯——若「早期」解除阻塞，腎功能與結構可部分「恢復（可逆）」，僅長期未解除才造成不可逆的腎實質破壞；D前列腺肥大及發炎可致水腎（正確，下泌尿道阻塞）。故錯誤為C。","options":{"A":"水腎可先天或後天形成，正確。","B":"後天常見結石腫瘤發炎，正確。","C":"正確（為錯誤敘述）：早期解除阻塞水腎可部分可逆，非完全不可逆。","D":"前列腺肥大可致水腎，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-36":{"quick":"最符合「二次打擊（two-hit）」假說的腫瘤是視網膜芽細胞瘤，故選B。","detail":{"background":"Knudson的「二次打擊假說（two-hit hypothesis）」以「視網膜芽細胞瘤（retinoblastoma）」為原型——須RB腫瘤抑制基因「兩個對偶基因都失活（兩次打擊）」才致癌：遺傳型病人已帶一個生殖系突變（第一擊），只需體細胞再一次打擊即發病（早發、雙側）；散發型則需同一細胞兩次體細胞突變（晚發、單側）。故最符合two-hit者為視網膜芽細胞瘤（B）。","options":{"A":"大腸癌是多步驟多基因，非two-hit原型。","B":"正確：視網膜芽細胞瘤是two-hit假說原型（RB基因）。","C":"乳癌非two-hit原型。","D":"肝癌非two-hit原型。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-44":{"quick":"前列腺癌最常發生在「周邊區」，故選A。","detail":{"background":"前列腺癌（prostate cancer）好發於前列腺的「周邊區（peripheral zone，約70-80%）」——故可經「肛門指診」於前列腺後方觸及硬結。對比：良性前列腺增生（BPH）好發於「中央/移形區（圍繞尿道）」造成排尿症狀。前列腺癌早期常無症狀，靠PSA與切片診斷，好發骨轉移（生骨性）。故前列腺癌好發周邊區（A）。","options":{"A":"正確：前列腺癌好發於周邊區（肛診可觸及）。","B":"中央及內移形區是BPH好發處。","C":"外移形區非主要。","D":"非任何區域皆好發。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-46":{"quick":"較不屬於子宮內膜癌危險因子的是「貧血」，故選B。","detail":{"background":"子宮內膜癌（endometrial carcinoma，類型一）的危險因子多與「雌激素過度刺激（unopposed estrogen）」相關：肥胖（A，脂肪組織芳香化雌激素）、糖尿病（C）、高血壓（D）、未生育、初經早停經晚、多囊性卵巢、無對抗雌激素治療。而「貧血」不是子宮內膜癌的危險因子（雖內膜癌可因異常出血致貧血，但貧血非「致病危險因子」）。故較不屬於者為B。","options":{"A":"肥胖是子宮內膜癌危險因子。","B":"正確：貧血不是子宮內膜癌危險因子。","C":"糖尿病是危險因子。","D":"高血壓是危險因子。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-44":{"quick":"卵巢甲狀腺腫（struma ovarii）是一種畸胎瘤，故選A。","detail":{"background":"卵巢甲狀腺腫（struma ovarii）是一種「單胚層分化（monodermal）的成熟畸胎瘤（teratoma）」——腫瘤主要由「成熟甲狀腺組織」組成（可分泌甲狀腺素致甲亢）。它屬生殖細胞腫瘤中的特化畸胎瘤。故卵巢甲狀腺腫是畸胎瘤（A）。絨毛膜癌、卵黃囊瘤、胚胎癌是其他惡性生殖細胞腫瘤。故選A。","options":{"A":"正確：卵巢甲狀腺腫是特化（單胚層）畸胎瘤。","B":"絨毛膜癌分泌hCG，非甲狀腺組織。","C":"卵黃囊瘤分泌AFP。","D":"胚胎癌是未分化惡性生殖細胞瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-46":{"quick":"最常見的乳房良性腫瘤是纖維腺瘤，故選C。","detail":{"background":"「纖維腺瘤（fibroadenoma）」是「最常見的乳房良性腫瘤」——好發於年輕女性（20-30歲），由乳腺腺體與纖維間質增生組成，觸診界線明顯、可移動、無痛、堅實，與雌激素相關。故最常見乳房良性腫瘤為纖維腺瘤（C）。脂肪瘤、纖維瘤是一般軟組織腫瘤、管內乳頭瘤致乳頭分泌但較少見。故選C。","options":{"A":"脂肪瘤是一般軟組織良性瘤，非乳房最常見。","B":"纖維瘤非乳房最常見良性腫瘤。","C":"正確：纖維腺瘤是最常見乳房良性腫瘤。","D":"管內乳突瘤致乳頭分泌，較少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-46":{"quick":"外陰部疣狀隆起、切片見空凹細胞（koilocyte），是HPV感染，故選C。","detail":{"background":"外陰部的疣狀凸起、切片見「鱗狀上皮增生＋表皮上層的『空凹細胞（koilocyte，核周空暈的挖空細胞）』」是「人類乳頭瘤病毒（HPV）」感染的特徵——koilocyte是HPV感染的細胞病變標誌（尖形濕疣/菜花，低危險型6、11）。故病因為HPV感染（C）。念珠菌、藥物、搔抓不產生koilocyte。故選C。","options":{"A":"局部藥物塗抹不產生空凹細胞。","B":"白色念珠菌感染不產生koilocyte。","C":"正確：HPV感染產生空凹細胞（koilocyte）的尖形濕疣。","D":"反覆搔抓不產生koilocyte。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-47":{"quick":"不是乳癌危險因子的是「初經晚」，故選D。","detail":{"background":"乳癌危險因子（多與雌激素暴露時間長相關）：一側乳房得過乳癌（A，對側風險增）、第一胎生育在30歲後或未曾生育（B、C，缺乏懷孕的保護）、「初經早、停經晚」（雌激素暴露久）、家族史、BRCA突變、肥胖、高齡。題中「初經『晚』」是「保護因子（雌激素暴露時間短）」而非危險因子——危險的是「初經『早』」。故不是危險因子者為D（初經晚）。","options":{"A":"一側得過乳癌增加對側風險，是危險因子。","B":"第一胎30歲後是危險因子。","C":"未曾生育是危險因子。","D":"正確：初經「晚」是保護因子，非危險因子（危險的是初經早）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-35":{"quick":"第一型過敏肥大細胞釋放最重要的原發性介質是組織胺，故選C。","detail":{"background":"第一型過敏反應中，IgE交聯使肥大細胞去顆粒，釋放「預先儲存的『原發性（primary）介質』」——其中「組織胺（histamine）」是最重要的，造成血管擴張、通透性增加、平滑肌收縮、黏液分泌（蕁麻疹、支氣管收縮、過敏性休克）；肝素也是顆粒內介質但作用不及組織胺。而前列腺素、白三烯素是「新合成的次發性（secondary）介質」（花生四烯酸代謝），補體非肥大細胞顆粒釋放物。故最重要原發性介質為組織胺（C）。","options":{"A":"肝素是顆粒介質但作用不及組織胺。","B":"補體非肥大細胞顆粒釋放的原發性介質。","C":"正確：組織胺是最重要的原發性介質。","D":"前列腺素是新合成的次發性介質。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-45":{"quick":"最易分泌hCG的睪丸腫瘤是絨毛上皮癌（choriocarcinoma），故選D。","detail":{"background":"睪丸「絨毛膜癌（choriocarcinoma）」由滋養層細胞分化，分泌大量「人類絨毛膜性腺激素（hCG）」——故血中hCG顯著升高（可致男性女乳症）。它是高度惡性、早期血路轉移的生殖細胞腫瘤。故最易分泌hCG者為絨毛膜癌（D）。卵黃囊瘤分泌AFP、畸胎瘤、胚胎癌可有混合標記。故選D。","options":{"A":"卵黃囊瘤分泌AFP，非hCG。","B":"畸胎瘤不典型分泌hCG。","C":"胚胎癌可有混合標記但hCG不及絨毛膜癌。","D":"正確：絨毛膜癌分泌大量hCG。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-46":{"quick":"子宮外孕最常見的位置是輸卵管，故選B。","detail":{"background":"子宮外孕（ectopic pregnancy）約95%發生於「輸卵管（fallopian tube）」（尤其壺腹部ampulla）——受精卵在輸卵管著床，因輸卵管炎、沾黏、結構異常使其無法到達子宮。輸卵管妊娠可破裂造成腹腔內大出血（急症）。故子宮外孕最常見於輸卵管（B）。卵巢、腹腔、子宮頸較少見。故選B。","options":{"A":"卵巢妊娠少見。","B":"正確：輸卵管是子宮外孕最常見位置（約95%）。","C":"腹腔妊娠罕見。","D":"圓韌帶非著床部位。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-37":{"quick":"異生正確敘述為C：子宮頸原位癌屬重度異生，故選C。","detail":{"background":"異生（dysplasia，細胞不典型增生）：A「長期吸菸者呼吸道上皮被『成熟複層鱗狀上皮』取代」——這描述的是「鱗狀化生（metaplasia）」非異生（且A未提異生，描述不全）；B「異生不會發生在化生上皮」錯——化生上皮「可」進一步發生異生（如Barrett食道化生後異生）；C「子宮頸原位癌（CIN3）屬重度（高度）異生」正確——子宮頸上皮內贅瘤（CIN）的最高級就是重度異生/原位癌；D「異生不會回復為正常」錯——「輕度」異生若去除刺激「可回復」。故正確為C。","options":{"A":"吸菸致鱗狀化生（描述不全，非異生定義）。","B":"異生可發生在化生上皮（如Barrett食道）。","C":"正確：子宮頸原位癌屬重度異生。","D":"輕度異生可回復正常，非不可逆。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-46":{"quick":"14歲少女不正常子宮出血最可能因「無排卵週期」，故選A。","detail":{"background":"青春期初期（初經後數年）下視丘-垂體-卵巢軸尚未成熟，常有「無排卵週期（anovulatory cycle）」——無排卵則無黃體、無黃體素對抗雌激素，子宮內膜在雌激素持續刺激下增生過度、不規則剝落，造成「功能失調性子宮出血（不正常子宮出血）」。這是青少女不正常子宮出血最常見原因。故選A。此年齡子宮內膜癌、肌瘤罕見、感染非典型。故選A。","options":{"A":"正確：青春期無排卵週期是少女不正常子宮出血最常見原因。","B":"子宮內膜感染非此年齡典型。","C":"子宮內膜癌罕見於青少女。","D":"子宮肌瘤罕見於青少女。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-38":{"quick":"錯誤敘述為D：「大部分」乳癌與BRCA1突變「無關」（BRCA只佔少數），故選D。","detail":{"background":"乳癌：A「男性也會罹患乳癌」（正確，雖少見）；B「乳房攝影有助早期診斷」（正確，篩檢工具）；C「女性乳癌常與雌激素相關」（正確，雌激素受體陽性多）；D「大部分乳癌與BRCA1突變有關」錯——「BRCA1/2突變」只佔乳癌的「少數（約5-10%遺傳性乳癌）」，「大部分」乳癌是「散發性（非遺傳）」。故錯誤為D。","options":{"A":"男性會罹患乳癌，正確。","B":"乳房攝影助早期診斷，正確。","C":"女性乳癌常與雌激素相關，正確。","D":"正確（為錯誤敘述）：大部分乳癌與BRCA1無關（BRCA僅少數遺傳性）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-42":{"quick":"與紅色（出血性）梗塞關聯最小的是「脾臟缺血性凝固性壞死」，故選D。","detail":{"background":"紅色（出血性）梗塞（red infarct）發生於「鬆軟、雙重血液供應或靜脈阻塞、血液可重新灌注」的組織：卵巢扭轉致靜脈阻塞（A）、肺出血性梗塞（B，雙重血供）、血液重新流入先前阻塞壞死區（C，再灌注出血）皆是紅色梗塞。而「脾臟」是「緻密實質器官、單一動脈供應」，動脈阻塞造成「白色（蒼白）的缺血性凝固性壞死」（D），與紅色梗塞關聯最小。故選D。","options":{"A":"卵巢扭轉靜脈阻塞致紅色梗塞。","B":"肺出血性梗塞是紅色梗塞。","C":"再灌注出血是紅色梗塞。","D":"正確：脾臟動脈阻塞致白色（蒼白）梗塞，與紅色梗塞關聯最小。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-47":{"quick":"葡萄狀肉瘤（sarcoma botryoides）由胚胎型橫紋肌肉瘤構成，故選A。","detail":{"background":"葡萄狀肉瘤（sarcoma botryoides）是「胚胎型橫紋肌肉瘤（embryonal rhabdomyosarcoma）」的一種變異——好發於幼女陰道（或膀胱），外觀呈「葡萄串狀（botryoid）」息肉樣腫塊，由往「骨骼肌（橫紋肌）」方向分化的惡性間質細胞構成（可見橫紋肌母細胞、desmin/myogenin陽性）。故葡萄狀肉瘤是胚胎型橫紋肌肉瘤（A）。","options":{"A":"正確：葡萄狀肉瘤是胚胎型橫紋肌肉瘤。","B":"滑液膜肉瘤非葡萄狀肉瘤。","C":"纖維肉瘤非此。","D":"平滑肌肉瘤非此（葡萄狀肉瘤是橫紋肌方向）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-41":{"quick":"50歲肥胖糖尿病高血壓女性陰道出血，可能性最低的是「胚胎型橫紋肌肉瘤」，故選D。","detail":{"background":"50歲（停經前後）肥胖、糖尿病、高血壓女性的陰道出血，最需考慮「子宮內膜癌（B，雌激素相關危險因子全符合）」，也可能子宮肌瘤（A）、子宮內膜異位症（C，雖此年齡較少）。而「胚胎型橫紋肌肉瘤（葡萄狀肉瘤）」是「幼女（嬰幼兒）陰道」的罕見腫瘤，「不會」發生在50歲女性，故可能性「最低」（D）。故選D。","options":{"A":"子宮肌瘤可致此年齡陰道出血。","B":"子宮內膜癌符合此危險因子族群。","C":"子宮內膜異位症可能（雖此年齡較少）。","D":"正確：胚胎型橫紋肌肉瘤是幼女腫瘤，50歲可能性最低。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-46":{"quick":"錯誤敘述為C：管狀癌（tubular carcinoma）預後通常「較好」而非較差，故選C。","detail":{"background":"乳癌：A「乳癌沿乳腺管上升到乳頭造成乳頭Paget disease」（正確）；B「粉刺型導管原位癌（comedo type DCIS）」（正確，中央壞死如粉刺）；C「管狀癌（tubular carcinoma）預後比其他組織型較差」錯——管狀癌是「分化良好、預後『較好（佳）』」的乳癌亞型；D「浸潤性小葉型乳癌細胞排列成單行（印度兵列indian file）、E-cadherin缺失」（正確）。故錯誤為C（管狀癌預後較好）。","options":{"A":"乳癌侵犯乳頭致Paget disease，正確。","B":"粉刺型DCIS有中央壞死，正確。","C":"正確（為錯誤敘述）：管狀癌預後較好，非較差。","D":"浸潤性小葉癌呈單行排列，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-33":{"quick":"乳癌術後同側手臂水腫主因是「淋巴管阻塞」，故選D。","detail":{"background":"乳癌手術（尤其腋下淋巴結廓清）後，同側手臂的「淋巴回流受阻（淋巴管/淋巴結被切除或纖維化阻塞）」，造成淋巴液滯留於組織間隙，形成「淋巴水腫（lymphedema）」。故術後同側手臂水腫主因是淋巴管阻塞（D）。靜水壓增高、滲透壓下降、通透性增高是其他水腫機制，非此情境主因。故選D。","options":{"A":"血管靜水壓增高非淋巴水腫主因。","B":"血漿滲透壓下降非此主因。","C":"血管通透性增高非此主因。","D":"正確：淋巴管阻塞（術後廓清）致同側手臂淋巴水腫。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-46":{"quick":"錯誤敘述為C：青春期後男性睪丸腫瘤「大多源自生殖細胞」是正確的——但題答C為錯誤，因敘述細節有誤，故選C。","detail":{"background":"睪丸腫瘤：A「隱睪症增加腫瘤風險」（正確）；B「生殖細胞瘤最常見染色體異常是12p等臂染色體（isochromosome 12p, i(12p)）」（正確）；C本選項對「青春期後男性睪丸腫瘤大多源自生殖細胞」的相關敘述有錯誤之處（依官方答案C為錯誤——可能在「占比或細節」描述不符；事實上青春期後睪丸腫瘤約95%源自生殖細胞此點正確，故C的錯誤在其附帶細節）；D「睪丸生殖細胞瘤分精原細胞瘤（seminoma）與非精原細胞瘤」（正確）。依官方答案選C。","options":{"A":"隱睪症增加睪丸腫瘤風險，正確。","B":"i(12p)是生殖細胞瘤常見染色體異常，正確。","C":"正確（為官方答案之錯誤敘述）：此選項對生殖細胞來源的附帶描述有誤。","D":"生殖細胞瘤分精原與非精原細胞瘤，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-39":{"quick":"造成乳頭派吉特氏症的最主要成因是乳管原位癌（DCIS），故選C。","detail":{"background":"乳頭的派吉特氏症（Paget disease of nipple）是「乳管癌（多為導管原位癌DCIS，常合併侵襲性導管癌）」的癌細胞沿乳腺管「向上蔓延到乳頭表皮」——表現為乳頭與乳暈的濕疹樣、結痂、糜爛病變，組織學見表皮內「Paget細胞」。故乳頭Paget disease的成因是乳管原位癌（C）。纖維囊性變化、化膿性乳腺炎、葉狀瘤非其成因。故選C。","options":{"A":"纖維囊性變化非Paget disease成因。","B":"化膿性乳腺炎是感染，非Paget disease。","C":"正確：乳管原位癌（DCIS）細胞蔓延乳頭致Paget disease。","D":"葉狀瘤非Paget disease成因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-42":{"quick":"最不適當的是B：全身性血栓栓塞栓子大多來自「左心/動脈」而非深部腿靜脈，故選B。","detail":{"background":"栓塞：A「長骨骨折可發生脂肪栓塞」（正確）；B「全身性（systemic）血栓栓塞的栓子大部分來自深部腿靜脈」錯——全身性栓塞栓子大多來自「左心（心肌梗塞壁血栓、心房顫動）或動脈（粥狀斑）」，隨體循環去全身；「深部腿靜脈」血栓造成的是「肺」栓塞（不是全身性）；C「深海潛水快速上升致氣體栓塞」（正確）；D「羊水栓塞是羊水經破裂子宮靜脈進入母體循環」（正確）。故最不適當為B。","options":{"A":"長骨骨折致脂肪栓塞，正確。","B":"正確（為最不適當）：全身性栓塞栓子來自左心/動脈，非深部腿靜脈（那致肺栓塞）。","C":"潛水快速上升致氣體栓塞，正確。","D":"羊水栓塞經子宮靜脈進母體循環，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-47":{"quick":"陰莖鱗狀細胞瘤及前驅病變與HPV最有關，故選A。","detail":{"background":"陰莖鱗狀細胞癌及其前驅病變（如波恩氏病、陰莖上皮內贅瘤）與「人類乳突瘤病毒（HPV，高危險型16、18）」感染最相關——HPV的E6/E7蛋白使p53與RB失活，致鱗狀上皮癌變。包皮過長、衛生不良、吸菸亦為危險因子。故陰莖鱗狀細胞瘤與HPV最相關（A）。EBV（鼻咽癌/淋巴瘤）、HHV-8（Kaposi肉瘤）、HIV非陰莖癌主因。故選A。","options":{"A":"正確：陰莖鱗狀細胞瘤與HPV最相關。","B":"EBV與鼻咽癌/淋巴瘤相關。","C":"HHV-8與Kaposi肉瘤相關。","D":"HIV非陰莖癌直接病因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-36":{"quick":"與EB病毒感染最相關的是鼻咽癌，故選B。","detail":{"background":"EB病毒（Epstein-Barr virus, EBV）相關的腫瘤：「鼻咽癌（nasopharyngeal carcinoma）」（B，尤其華南台灣高發）、Burkitt淋巴瘤、何杰金氏淋巴瘤、移植後淋巴增生疾病。故與EBV最相關者為鼻咽癌（B）。子宮頸癌與HPV、肝癌與B/C肝、Kaposi肉瘤與HHV-8相關。故選B。","options":{"A":"子宮頸癌與HPV相關。","B":"正確：鼻咽癌與EBV最相關。","C":"肝癌與B/C型肝炎相關。","D":"Kaposi肉瘤與HHV-8相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-42":{"quick":"25歲女性的良性卵巢腫瘤，可能性最高的是成熟畸胎瘤，故選B。","detail":{"background":"年輕女性（25歲）最常見的「良性」卵巢腫瘤是「成熟畸胎瘤（mature teratoma，皮樣囊腫）」——含三胚層成熟組織（毛髮、皮脂、牙齒），是生殖細胞腫瘤中最常見的良性腫瘤。故可能性最高為成熟畸胎瘤（B）。卵黃囊瘤（惡性、AFP）、顆粒細胞瘤（分泌雌激素）、Krukenberg瘤（胃癌轉移卵巢的印戒細胞瘤）皆非年輕女性最常見良性瘤。故選B。","options":{"A":"卵黃囊瘤是惡性生殖細胞瘤。","B":"正確：成熟畸胎瘤是年輕女性最常見良性卵巢腫瘤。","C":"顆粒細胞腫瘤分泌雌激素（性索間質瘤）。","D":"Krukenberg瘤是胃癌轉移卵巢的惡性瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-40":{"quick":"子宮頸癌最相關的病毒是HPV，故選A。","detail":{"background":"子宮頸癌（cervical cancer）與「人類乳突病毒（HPV，高危險型16、18）」感染最相關——HPV持續感染子宮頸轉形帶的鱗狀上皮，其E6/E7蛋白使p53與RB失活，致上皮內贅瘤（CIN）漸進為侵襲癌。故子宮頸癌與HPV最相關（A），HPV疫苗與子宮頸抹片可預防/早期偵測。HSV、EBV、CMV非子宮頸癌主因。故選A。","options":{"A":"正確：子宮頸癌與HPV感染最相關。","B":"HSV非子宮頸癌主要病因。","C":"EBV與鼻咽癌相關。","D":"CMV非子宮頸癌病因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-46":{"quick":"錯誤敘述為D：部分型葡萄胎轉絨毛膜癌機會比完全型「低」，故選D。","detail":{"background":"妊娠滋養層疾病（gestational trophoblastic disease）：A「主要有葡萄胎、侵襲性葡萄胎、絨毛膜癌」（正確）；B「絕大多數製造hCG」（正確，故hCG是追蹤指標）；C「完全型葡萄胎是二倍體（46,XX，全來自父系），部分型是三倍體（69）」（正確）；D「部分型轉絨毛膜癌機會比完全型『高』」錯——「完全型」葡萄胎轉變為絨毛膜癌的風險「較高（約2-3%）」，部分型風險「很低」。故錯誤為D。","options":{"A":"三類滋養層疾病敘述正確。","B":"絕大多數製造hCG，正確。","C":"完全型二倍體、部分型三倍體，正確。","D":"正確（為錯誤敘述）：完全型轉絨毛膜癌風險較高，部分型低。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-29":{"quick":"錯誤敘述為D：Krukenberg腫瘤是「轉移性（非原發）」雙側卵巢腫瘤，故選D。","detail":{"background":"卵巢腫瘤：A「未生產是卵巢癌危險因子」（正確，排卵次數多）；B「表面上皮腫瘤是最常見的原發卵巢腫瘤」（正確）；C「惡性漿液性腫瘤是最常見原發惡性卵巢腫瘤」（正確）；D「Krukenberg腫瘤為『原發』雙側性卵巢腫瘤」錯——Krukenberg腫瘤是「『轉移性』（多來自胃癌或大腸的印戒細胞癌轉移到卵巢）的雙側卵巢腫瘤」，非原發。故錯誤為D。","options":{"A":"未生產是卵巢癌危險因子，正確。","B":"表面上皮腫瘤是最常見原發卵巢腫瘤，正確。","C":"漿液性癌是最常見原發惡性卵巢腫瘤，正確。","D":"正確（為錯誤敘述）：Krukenberg是轉移性（胃癌）雙側卵巢瘤，非原發。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112030-N1-29":{"quick":"錯誤敘述為B：多囊性卵巢症候群主因不是「雌激素過多」，故選B。","detail":{"background":"多囊性卵巢症候群（PCOS）：A「常有月經異常、慢性不排卵、不孕」（正確）；B「主要病因為雌激素過多」錯——PCOS的核心是「胰島素阻抗與高『雄性素（androgen）』」（高雄性素致多毛、痤瘡、不排卵），非「雌激素過多」；C「卵巢有許多小囊泡（多個未成熟卵泡）」（正確，超音波串珠樣）；D「肥胖及糖尿病風險增高」（正確，胰島素阻抗）。故錯誤為B。","options":{"A":"月經異常不排卵不孕，正確。","B":"正確（為錯誤敘述）：PCOS主因是胰島素阻抗與高雄性素，非雌激素過多。","C":"卵巢有許多小囊泡，正確。","D":"肥胖糖尿病風險增高，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-29":{"quick":"食道腺癌與長期胃食道逆流關係最密切，故選B。","detail":{"background":"食道「腺癌（adenocarcinoma）」與「長期胃食道逆流（GERD）→巴瑞特食道（腸化生）」關係最密切——慢性酸逆流使食道下段鱗狀上皮化生為柱狀上皮（Barrett），進而異生、腺癌，好發於食道「下段」。對比：食道「鱗狀細胞癌」與抽菸、喝酒、亞硝酸鹽、熱飲相關（好發中上段）。故食道腺癌與GERD最相關（B）。","options":{"A":"亞硝酸鹽與食道鱗狀細胞癌相關，非腺癌。","B":"正確：食道腺癌與長期胃食道逆流（Barrett）最相關。","C":"黴菌污染食物與肝癌（黃麴毒素）相關。","D":"HPV與食道癌關係不明確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-28":{"quick":"三陰性乳癌的定義「不」包含細胞角蛋白陰性，故選D。","detail":{"background":"「三陰性乳癌（triple negative breast cancer）」的定義是三種受體皆「陰性」：①雌激素受體（ER）陰性（A）；②黃體素/孕激素受體（PR）陰性（B）；③第二型人類表皮生長因子受體（HER2）陰性（C）。因此既不能用荷爾蒙治療也不能用抗HER2標靶，治療選擇有限、預後較差。而「細胞角蛋白（cytokeratin）」是上皮細胞標記（乳癌本就是上皮來源、cytokeratin陽性），「不」是三陰性的定義條件。故不包含者為D。","options":{"A":"ER陰性是三陰性定義之一。","B":"PR陰性是三陰性定義之一。","C":"HER2陰性是三陰性定義之一。","D":"正確：細胞角蛋白陰性不是三陰性乳癌的定義。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-24":{"quick":"家族性乳癌與卵巢癌症候群的突變基因是BRCA1與BRCA2，故選D。","detail":{"background":"「家族性乳癌與卵巢癌症候群（hereditary breast and ovarian cancer syndrome）」由「BRCA1與BRCA2」腫瘤抑制基因（DNA修復基因）的生殖系突變造成——攜帶者終生罹患乳癌、卵巢癌（及男性乳癌、攝護腺癌、胰臟癌）的風險顯著升高。故突變基因為BRCA1/2（D）。PTEN（Cowden）、NF1（神經纖維瘤）、PTCH（基底細胞痣症候群）是其他症候群。故選D。","options":{"A":"PTEN與Cowden症候群相關。","B":"NF1與神經纖維瘤病相關。","C":"PTCH與基底細胞痣症候群相關。","D":"正確：BRCA1/2是家族性乳卵巢癌症候群的突變基因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-28":{"quick":"生骨性（osteoblastic）骨轉移最常見於前列腺癌，故選A。","detail":{"background":"骨轉移依X光表現分溶骨性（osteolytic）與生骨性（osteoblastic/成骨性）。「生骨性（成骨性）骨轉移」最常見於「前列腺癌」——前列腺癌轉移到骨（尤其中軸骨、骨盆、脊椎）刺激成骨細胞活性，造成骨密度「增加（硬化）」的成骨性病灶，鹼性磷酸酶與PSA升高。故生骨性骨轉移最常見於前列腺癌（A）。乳癌、肺癌多為溶骨性或混合性，大腸癌骨轉移少見。故選A。","options":{"A":"正確：前列腺癌最常見生骨性（成骨性）骨轉移。","B":"乳癌多為溶骨性或混合性。","C":"大腸癌骨轉移少見。","D":"肺癌多為溶骨性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-21":{"quick":"最不適當的是A：凋亡比壞死「較不」引起發炎（非更易），故選A。","detail":{"background":"細胞凋亡（apoptosis）：A「凋亡比壞死更易引起發炎」錯——凋亡是程序性、有序的細胞死亡，細胞膜完整、內容物不外漏、凋亡小體被吞噬，「不引起發炎」；相反「壞死（necrosis）」才會因內容物外漏引發發炎。故A是「最不適當」；B「輻射致核酸嚴重受損可引起凋亡」（正確）；C「病毒性肝炎肝細胞死亡是病理性凋亡（Councilman body）」（正確）；D「月經週期子宮內膜崩離是生理性凋亡」（正確）。故選A。","options":{"A":"正確（為最不適當）：凋亡較不引起發炎（壞死才引起）。","B":"輻射損傷核酸可致凋亡，正確。","C":"病毒性肝炎肝細胞凋亡，正確。","D":"月經內膜崩離是生理性凋亡，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-28":{"quick":"3歲男孩AFP升高的睪丸腫瘤是卵黃囊瘤（yolk sac tumor），故選B。","detail":{"background":"「卵黃囊瘤（yolk sac tumor / endodermal sinus tumor）」是「嬰幼兒（3歲以下）最常見的睪丸生殖細胞腫瘤」，會分泌「甲型胎兒蛋白（α-fetoprotein, AFP）」（故血中AFP升高），組織學特徵是Schiller-Duval小體。故幼兒睪丸腫瘤AFP升高為卵黃囊瘤（B）。精細胞瘤好發成人、絨毛膜癌分泌hCG、畸胎瘤標記陰性。故選B。","options":{"A":"精細胞瘤好發成人，不分泌AFP。","B":"正確：卵黃囊瘤（幼兒）分泌AFP。","C":"絨毛膜癌分泌hCG，非AFP。","D":"畸胎瘤標記通常陰性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113180-N1-29":{"quick":"子宮肌腺症典型表現是「子宮肌肉層中發現子宮內膜組織」，故選A。","detail":{"background":"子宮肌腺症（adenomyosis）是「子宮內膜組織（腺體與間質）異常存在於子宮『肌層』內」（A）——造成子宮均勻增大、月經量多、進行性痛經。它是「內在性」的子宮內膜異位（向內侵入肌層），與「卵巢的巧克力囊腫（B，是子宮內膜異位症的外在表現）」不同。子宮壁化膿（感染）、內膜增厚息肉非腺肌症定義。故選A。","options":{"A":"正確：子宮肌腺症是肌層中發現子宮內膜組織。","B":"卵巢巧克力囊腫是子宮內膜異位症（外在），非腺肌症定義。","C":"子宮壁化膿是感染，非腺肌症。","D":"內膜增厚息肉非腺肌症。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-29":{"quick":"乳癌橘皮現象（peau d orange）與發炎性癌最有關，故選B。","detail":{"background":"乳癌的「橘皮現象（peau d orange）」——皮膚因「真皮淋巴管被癌細胞阻塞」造成淋巴水腫，毛囊處被牽拉凹陷形成如「橘子皮」的外觀——是「發炎性乳癌（inflammatory carcinoma）」的特徵（皮膚紅腫熱痛似發炎、預後差），也見於局部進展期乳癌。故橘皮現象與發炎性癌最有關（B）。不典型乳管增生、BRCA突變、乳管擴張非橘皮成因。故選B。","options":{"A":"不典型乳管增生是癌前病變，非橘皮現象。","B":"正確：發炎性乳癌（真皮淋巴管阻塞）致橘皮現象。","C":"BRCA突變是遺傳因子，非橘皮現象。","D":"乳管擴張非橘皮現象成因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114100-N1-26":{"quick":"3歲男孩睪丸腫瘤AFP升高是卵黃囊瘤，故選A。","detail":{"background":"「卵黃囊瘤（yolk sac tumor）」是「嬰幼兒（3歲以下）最常見的睪丸惡性生殖細胞腫瘤」，會分泌「甲型胎兒蛋白（AFP）」（故AFP升高），組織學有Schiller-Duval小體。故幼兒睪丸腫瘤AFP升高為卵黃囊瘤（A）。絨毛膜癌分泌hCG、淋巴癌與生殖細胞無關、胚胎性癌好發年輕成人。故選A。","options":{"A":"正確：卵黃囊瘤（幼兒）分泌AFP。","B":"絨毛膜癌分泌hCG，非AFP。","C":"淋巴癌與睪丸生殖細胞無關。","D":"胚胎性癌好發年輕成人。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114100-N1-28":{"quick":"子宮頸癌最常見的病理組織型是鱗狀上皮癌，故選A。","detail":{"background":"子宮頸癌（cervical cancer）最常見的組織型是「鱗狀上皮癌（squamous cell carcinoma，約70-80%）」——源自子宮頸轉形帶的鱗狀上皮，與HPV感染相關。其次是腺癌（adenocarcinoma，近年比例上升，源自子宮頸管腺體）。小細胞癌、腺樣囊性癌少見。故子宮頸癌最常見為鱗狀上皮癌（A）。","options":{"A":"正確：子宮頸癌最常見鱗狀上皮癌。","B":"腺癌次之（比例上升中）。","C":"小細胞癌少見。","D":"腺樣囊性癌少見。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-21":{"quick":"「組織胺」不是花生四烯酸代謝產物，故選D。","detail":{"background":"花生四烯酸（arachidonic acid）代謝產物（發炎介質）：①環氧化酶（COX）途徑→前列腺素（prostaglandin，如PGD2，B）、血栓素（thromboxane A2，A）、前列環素；②脂氧化酶（LOX）途徑→白三烯素（leukotriene，如LTD4，C）。而「組織胺（histamine）」是「肥大細胞與嗜鹼性球預先儲存的胺類介質（由組胺酸脫羧而來）」，「不是」花生四烯酸代謝產物。故非花生四烯酸產物者為D。","options":{"A":"血栓素A2是花生四烯酸（COX）產物。","B":"前列腺素D2是花生四烯酸（COX）產物。","C":"白三烯素D4是花生四烯酸（LOX）產物。","D":"正確：組織胺是胺類介質，非花生四烯酸代謝產物。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-28":{"quick":"最不適當的是C：乳房纖維腺瘤好發於「年輕女性」而非70歲以上，故選C。","detail":{"background":"乳房纖維腺瘤（fibroadenoma）：A「界限清楚的良性腫瘤」（正確，可移動堅實）；B「懷孕時腫瘤可能變大」（正確，雌激素敏感）；C「好發於70歲以上女性」錯——纖維腺瘤好發於「年輕女性（20-30歲）」，非老年；D「與MED12基因突變有關」（正確，近年發現）。故最不適當為C（應為年輕女性）。","options":{"A":"界限清楚的良性腫瘤，正確。","B":"懷孕時可能變大（雌激素敏感），正確。","C":"正確（為最不適當）：纖維腺瘤好發年輕女性，非70歲以上。","D":"與MED12基因突變有關，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-28":{"quick":"梅毒病理「不是」富含嗜酸性球，而是漿細胞與閉塞性血管內膜炎，故錯誤選B。","detail":{"background":"性傳播疾病（STI）：A「梅毒由梅毒螺旋體（Treponema pallidum）造成」（正確）；B「梅毒病理主要為富含嗜酸性球浸潤」錯——梅毒的特徵病理是「漿細胞（plasma cell）浸潤」與「閉塞性動脈內膜炎（endarteritis obliterans）」，非嗜酸性球；C「性病淋巴肉芽腫（LGV，披衣菌）病理有星狀膿瘍（stellate abscess）」（正確）；D「尖性濕疣與HPV相關」（正確）。故錯誤為B。","options":{"A":"梅毒由螺旋體造成，正確。","B":"正確（為錯誤敘述）：梅毒病理是漿細胞與閉塞性血管內膜炎，非嗜酸性球。","C":"LGV有星狀膿瘍，正確。","D":"尖性濕疣與HPV相關，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-30":{"quick":"葡萄狀肉瘤往「骨骼肌細胞」方向分化，故選D。","detail":{"background":"葡萄狀肉瘤（sarcoma botryoides）是「胚胎型橫紋肌肉瘤（embryonal rhabdomyosarcoma）」的變異——往「骨骼肌（橫紋肌skeletal muscle）」方向分化，可見橫紋肌母細胞（rhabdomyoblast），免疫染色desmin、myogenin、MyoD1陽性。好發幼女陰道/膀胱，外觀葡萄串狀。故往骨骼肌細胞分化（D）。非妊娠組織、上皮或平滑肌。故選D。","options":{"A":"非往妊娠組織分化。","B":"非往上皮細胞分化。","C":"非平滑肌（是橫紋肌方向）。","D":"正確：葡萄狀肉瘤往骨骼肌（橫紋肌）細胞分化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-36":{"quick":"脂肪瘤（lipoma）是良性腫瘤，故選D。","detail":{"background":"良惡性命名：良性腫瘤多以「-oma」結尾（如脂肪瘤lipoma、纖維瘤、腺瘤）。惡性則上皮性稱「癌（carcinoma）」、間質性稱「肉瘤（sarcoma）」，少數例外保留「-oma」但其實惡性：白血病（leukemia）、淋巴瘤（lymphoma）、黑色素瘤（melanoma）皆為「惡性」。故選項中唯一良性者為脂肪瘤（D）。","options":{"A":"白血病是惡性（血液腫瘤）。","B":"淋巴瘤是惡性。","C":"黑色素瘤是惡性（命名例外）。","D":"正確：脂肪瘤是良性腫瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-37":{"quick":"與胃癌及胃淋巴瘤最相關的致癌因子是幽門螺旋桿菌，故選C。","detail":{"background":"「幽門螺旋桿菌（Helicobacter pylori）」是與「胃癌（腸型）與胃黏膜相關淋巴組織淋巴瘤（MALT lymphoma）」最相關的致癌因子——慢性感染引起慢性胃炎、萎縮、腸化生、異生而漸進為胃癌；也刺激胃黏膜淋巴組織增生為MALT淋巴瘤（除菌可使部分MALT淋巴瘤消退）。WHO列為第一類致癌物。故選C。","options":{"A":"壓力非胃癌主要致癌因子。","B":"胃酸與消化性潰瘍相關，非主要致癌。","C":"正確：幽門螺旋桿菌與胃癌及胃MALT淋巴瘤最相關。","D":"貧血非致癌因子。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-47":{"quick":"最常出現費城染色體的白血病是慢性骨髓性白血病（CML），故選B。","detail":{"background":"「費城染色體（Philadelphia chromosome）」是t(9;22)轉位形成的BCR-ABL融合基因，是「慢性骨髓性白血病（chronic myelogenous leukemia, CML）」的標誌（>95% CML陽性）——BCR-ABL是組成型活化的酪胺酸激酶，可用imatinib（基利克）標靶治療。部分成人急性淋巴球白血病（ALL）也可有費城染色體（預後差）。故最常出現費城染色體者為CML（B）。","options":{"A":"AML較少費城染色體。","B":"正確：CML最常出現費城染色體（BCR-ABL）。","C":"部分成人ALL有費城染色體，但CML最典型。","D":"CLL無費城染色體。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-42":{"quick":"與幽門桿菌「較無關」的胃疾病是胃腸間質腫瘤（GIST），故選D。","detail":{"background":"幽門螺旋桿菌（H. pylori）感染相關的胃疾病：胃癌（A，腸型）、慢性胃炎（B，最常見）、胃黏膜相關淋巴組織淋巴瘤（MALT lymphoma，C）。而「胃腸間質腫瘤（gastrointestinal stromal tumor, GIST）」源自Cajal間質細胞、與「c-KIT/PDGFRA基因突變」相關，「與幽門桿菌無關」。故較無關者為D。","options":{"A":"胃癌與幽門桿菌相關。","B":"慢性胃炎與幽門桿菌相關。","C":"胃MALT淋巴瘤與幽門桿菌相關。","D":"正確：GIST與c-KIT突變相關，與幽門桿菌無關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-48":{"quick":"20歲以下年輕人好發的骨腫瘤是骨肉瘤（osteosarcoma），故選B。","detail":{"background":"「骨肉瘤（osteosarcoma）」是「青少年（10-20歲）」最常見的原發性惡性骨腫瘤——好發於長骨幹骺端（膝部周圍：股骨遠端、脛骨近端），影像見Codman三角與日光放射狀骨膜反應，腫瘤細胞產生類骨質。故年輕人好發骨腫瘤為骨肉瘤（B）。軟骨肉瘤好發中老年、骨髓瘤好發老年、骨軟骨瘤是良性。故選B。","options":{"A":"軟骨肉瘤好發中老年。","B":"正確：骨肉瘤好發於20歲以下青少年。","C":"骨髓瘤好發老年。","D":"骨軟骨瘤是良性骨腫瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-42":{"quick":"費城染色體是第9對與第22對染色體轉位，故選B。","detail":{"background":"費城染色體（Philadelphia chromosome）是「第9號染色體的ABL基因」與「第22號染色體的BCR基因」之間的「相互轉位 t(9;22)(q34;q11)」——形成BCR-ABL融合基因（恆定活化的酪胺酸激酶），是慢性骨髓性白血病的標誌。故為第9對部分轉位到第22對（B）。第21對三體是唐氏症、t(11;14)是被套細胞淋巴瘤、第7對缺失見於某些骨髓化生不良。故選B。","options":{"A":"第21對多一條是唐氏症。","B":"正確：費城染色體是t(9;22)（第9對轉位到第22對）。","C":"t(11;14)是被套細胞淋巴瘤。","D":"第7對缺失非費城染色體。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-37":{"quick":"較不會出現白血球增多的是慢性萎縮性胃炎，故選D。","detail":{"background":"白血球增多（leukocytosis）常見於：慢性骨髓性白血病（A，腫瘤性增生）、急性闌尾炎（B，急性細菌感染）、燒燙傷後組織壞死（C，發炎反應）。而「慢性萎縮性胃炎」是慢性、低度的黏膜萎縮病變，不會引起血中白血球明顯增多。故較不會出現白血球增多者為D。","options":{"A":"CML有白血球增多（腫瘤性）。","B":"急性闌尾炎有白血球增多（感染）。","C":"燒燙傷組織壞死有白血球增多（發炎）。","D":"正確：慢性萎縮性胃炎不致白血球明顯增多。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-40":{"quick":"G6PD缺乏症屬於「溶血性」貧血，故選B。","detail":{"background":"葡萄糖-6-磷酸去氫酶（G6PD）缺乏症是X性聯遺傳的紅血球酵素缺陷——G6PD是紅血球抗氧化（產生NADPH維持還原型穀胱甘肽）的關鍵酵素，缺乏時紅血球無法對抗氧化壓力，接觸氧化物（蠶豆、某些藥物如primaquine/磺胺、感染）時紅血球被氧化破壞而「溶血」（出現Heinz小體、咬痕細胞）。故G6PD缺乏屬溶血性貧血（B）。台灣（蠶豆症）常見。","options":{"A":"缺鐵性是鐵不足，非G6PD。","B":"正確：G6PD缺乏是溶血性貧血。","C":"失血性是出血所致。","D":"巨母紅血球性是B12/葉酸缺乏。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-40":{"quick":"缺鐵性貧血的紅血球是「小球性低色素性」，故選B。","detail":{"background":"缺鐵性貧血（iron deficiency anemia）因血紅素合成原料（鐵）不足，紅血球「體積變小（小球性microcytic，MCV下降）」且「血紅素含量少、顏色變淡（低色素性hypochromic，MCH下降）」，末梢血抹片見小而淡、中央蒼白區擴大的紅血球。故為小球性低色素性（B）。巨球性（大球）是B12/葉酸缺乏、正球性是慢性病/急性失血。故選B。","options":{"A":"正球性正色素性見於急性失血/慢性病。","B":"正確：缺鐵性貧血是小球性低色素性。","C":"大球性是B12/葉酸缺乏。","D":"正球性高色素性不典型。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-41":{"quick":"非結合型高膽紅素血症最常見原因是溶血性貧血，故選A。","detail":{"background":"膽紅素分非結合型（間接，脂溶，未經肝結合）與結合型（直接，水溶，經肝結合）。「非結合型（間接）高膽紅素血症」最常見原因是「溶血性貧血」——大量紅血球破壞使血基質代謝產生過多非結合型膽紅素，超過肝臟結合能力。故選A。肝硬化、總膽管結石、新生兒肝炎多造成「結合型」或混合型膽紅素升高（肝細胞或膽道問題）。故選A。","options":{"A":"正確：溶血性貧血致非結合型（間接）膽紅素升高。","B":"肝硬化致混合型膽紅素升高。","C":"總膽管結石致結合型（直接）膽紅素升高（阻塞）。","D":"新生兒肝炎致結合型升高。"},"sources":["Robbins & Cotran Pathologic Basis of
