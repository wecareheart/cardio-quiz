 Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-37":{"quick":"淋巴瘤（lymphoma）屬於惡性腫瘤，故選C。","detail":{"background":"淋巴瘤（lymphoma）是淋巴組織（淋巴球）的「惡性」腫瘤（命名例外，雖以-oma結尾但惡性）。而脂肪瘤（lipoma，A）、囊狀腺瘤（cystadenoma，B）、軟骨瘤（chondroma，D）皆為「良性」腫瘤。故惡性者為淋巴瘤（C）。","options":{"A":"脂肪瘤是良性。","B":"囊狀腺瘤是良性。","C":"正確：淋巴瘤是惡性腫瘤。","D":"軟骨瘤是良性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-43":{"quick":"大腸癌正確敘述為A：大部分起源於腺瘤，故選A。","detail":{"background":"大腸癌：A「大部分起源於腺瘤（adenoma-carcinoma sequence，腺瘤→癌序列）」正確——大多數大腸癌由腺瘤性息肉經多步驟基因突變（APC→KRAS→p53）演變而來；B「左側大腸癌常以貧血表現」錯——左側（降結腸、乙狀結腸、直腸）管腔小、糞便成形，常以「阻塞、排便習慣改變、血便」表現；「右側」（升結腸）管腔大，常以「慢性出血致貧血」表現（B、D左右顛倒）；C「最重要預後因子是分化程度」錯——大腸癌最重要的預後因子是「分期（侵犯深度與淋巴結轉移，TNM/Dukes）」。故正確為A。","options":{"A":"正確：大部分大腸癌起源於腺瘤。","B":"左側大腸癌多以阻塞表現，右側才以貧血（左右顛倒）。","C":"最重要預後因子是分期，非分化程度。","D":"右側大腸癌多以貧血表現，左側才以阻塞（左右顛倒）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-47":{"quick":"「高血鈣症」不屬於Virchow三要素，故選D。","detail":{"background":"血栓形成的Virchow三要素（Virchow triad）：①內皮細胞損傷（endothelial injury，A）；②血流異常（不正常血流：鬱滯或紊亂，C）；③高凝血狀態（hypercoagulability，B）。而「高血鈣症（hypercalcemia）」不是Virchow三要素之一（雖鈣參與凝血反應，但不是三大致血栓要素）。故不屬於者為D。","options":{"A":"內皮損傷是Virchow三要素。","B":"高凝血能力是Virchow三要素。","C":"不正常血流是Virchow三要素。","D":"正確：高血鈣症不屬於Virchow三要素。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-34":{"quick":"與血管受傷後凝血「最無關」的是紅血球，故選C。","detail":{"background":"血管受傷後的止血凝血過程：①血管內皮細胞（A，受損暴露膠原與組織因子，並調節血管收縮）；②血小板（B，黏附聚集形成初級血栓栓子）；③凝血因子瀑布產生「纖維蛋白（fibrin，D）」網穩固血栓。而「紅血球（C）」雖被纏入血塊中，但「不直接參與凝血機制」，與凝血發生最無關。故選C。","options":{"A":"血管內皮細胞參與止血凝血。","B":"血小板是初級止血主角。","C":"正確：紅血球與凝血機制最無關。","D":"纖維蛋白是凝血最終產物。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105090-N1-42":{"quick":"帶有費城染色體的白血病是慢性骨髓細胞性白血病（CML），故選B。","detail":{"background":"「費城染色體（Philadelphia chromosome，t(9;22)BCR-ABL）」是「慢性骨髓細胞性白血病（chronic myelocytic/myelogenous leukemia, CML）」的標誌（>95%），BCR-ABL酪胺酸激酶可用imatinib標靶治療。部分成人急性淋巴球白血病也可有費城染色體（預後差）。故最典型帶費城染色體者為CML（B）。","options":{"A":"部分成人ALL有費城染色體，但CML最典型。","B":"正確：CML帶費城染色體（BCR-ABL）。","C":"AML較少。","D":"CLL無費城染色體。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-41":{"quick":"「貓頭鷹眼樣」大細胞核腫瘤是何杰金氏淋巴瘤（Reed-Sternberg細胞），故選B。","detail":{"background":"「貓頭鷹眼樣（owl-eye appearance）」的雙核大細胞是「Reed-Sternberg（RS）細胞」——是「何杰金氏淋巴瘤（Hodgkin lymphoma）」的診斷性腫瘤細胞（大型、雙核或多核、核仁大而明顯如貓頭鷹眼，CD15/CD30陽性）。故貓頭鷹眼樣細胞見於何杰金氏淋巴瘤（B）。末梢T細胞、瀰漫大B、Burkitt淋巴瘤無RS細胞。故選B。","options":{"A":"末梢T細胞淋巴瘤無RS細胞。","B":"正確：何杰金氏淋巴瘤有貓頭鷹眼樣RS細胞。","C":"瀰漫大B細胞淋巴瘤無RS細胞。","D":"伯基特淋巴瘤是星空現象，非RS細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106030-N1-48":{"quick":"18歲股骨幹骺端溶骨性病灶＋日光放射狀骨膜反應，是骨肉瘤，故選B。","detail":{"background":"本題描述「青少年（18歲）、股骨『幹骺端（骺端附近，膝部周圍）』、界線不清的溶骨性病灶、日光放射狀（sunburst）骨膜反應與Codman三角」是「骨肉瘤（osteosarcoma）」的典型——青少年最常見原發惡性骨腫瘤，腫瘤細胞產生類骨質。故選B。軟骨瘤、骨髓瘤（老年）、尤汶氏肉瘤（Ewing，骨幹、洋蔥皮樣）型態與好發不同。故選B。","options":{"A":"軟骨瘤是良性軟骨腫瘤。","B":"正確：骨肉瘤（青少年、幹骺端、日光放射狀）。","C":"多發性骨髓瘤好發老年（穿鑿狀溶骨）。","D":"尤汶氏肉瘤好發骨幹、洋蔥皮樣骨膜反應。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-41":{"quick":"缺鐵性貧血診斷錯誤的是C：攜鐵蛋白（transferrin）飽和度「降低」而非升高，故選C。","detail":{"background":"缺鐵性貧血的鐵代謝指標：A「平均紅血球色素值（MCH）下降」（正確，低色素）；B「血鐵蛋白（ferritin，反映儲鐵）量低」（正確，鐵儲存耗竭）；C「攜鐵蛋白（transferrin）飽和度『高』」錯——缺鐵時血清鐵低、總鐵結合能力（TIBC/transferrin）「升高」但「飽和度『降低』」（因鐵少）；D「平均紅血球體積（MCV）降低」（正確，小球性）。故錯誤為C。","options":{"A":"MCH下降（低色素），正確。","B":"血鐵蛋白（ferritin）低（儲鐵耗竭），正確。","C":"正確（為錯誤敘述）：transferrin飽和度「降低」非升高。","D":"MCV降低（小球性），正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-41":{"quick":"診斷何杰金氏淋巴瘤最重要需找到Reed-Sternberg細胞，故選D。","detail":{"background":"診斷「何杰金氏淋巴瘤（Hodgkin lymphoma）」最重要的是在病變組織中找到「Reed-Sternberg（RS）細胞」——大型雙核/多核、核仁明顯如貓頭鷹眼的腫瘤細胞（CD15、CD30陽性）。故選D。Langhans巨細胞（結核肉芽腫）、Langerhans細胞（組織球增生症）、Kupffer細胞（肝臟巨噬細胞）非何杰金淋巴瘤的診斷細胞。故選D。","options":{"A":"Langhans巨細胞見於肉芽腫（結核）。","B":"Langerhans細胞見於組織球增生症。","C":"Kupffer細胞是肝臟巨噬細胞。","D":"正確：Reed-Sternberg細胞是何杰金氏淋巴瘤診斷細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-36":{"quick":"最常見的口腔癌是鱗狀上皮癌，故選A。","detail":{"background":"口腔癌超過90%是「鱗狀上皮癌（squamous cell carcinoma）」——源自口腔黏膜鱗狀上皮，與嚼檳榔、抽菸、喝酒、HPV相關（台灣口腔癌與檳榔密切）。故最常見口腔癌為鱗狀上皮癌（A）。腺癌（唾液腺）、淋巴瘤、黑色素瘤較少。故選A。","options":{"A":"正確：鱗狀上皮癌是最常見口腔癌。","B":"腺癌見於唾液腺，較少。","C":"淋巴瘤較少。","D":"黑色素瘤少見於口腔。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-41":{"quick":"全胃切除後最易出現「維生素B12值降低」，故選C。","detail":{"background":"全胃切除後易發生「維生素B12缺乏（巨母紅血球性貧血）」——因胃「壁細胞」分泌的「內在因子（intrinsic factor）」是迴腸吸收維生素B12的必需，全胃切除後內在因子缺乏，使B12無法吸收，造成血清B12值降低與巨母紅血球性貧血（須注射B12補充）。故選C。也可能合併缺鐵（胃酸減少影響鐵吸收），但題給選項中B12最典型。","options":{"A":"攜鐵蛋白濃度上升非全胃切除典型。","B":"G6PD與全胃切除無關。","C":"正確：全胃切除致內在因子缺乏、維生素B12降低。","D":"抗紅血球抗體上升非全胃切除典型。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-36":{"quick":"慢性骨髓性白血病與ABL基因有關，故選C。","detail":{"background":"慢性骨髓性白血病（CML）與「ABL基因」有關——費城染色體t(9;22)使「第9號染色體的ABL基因」與「第22號的BCR基因」融合成「BCR-ABL」融合基因，產生恆定活化的酪胺酸激酶驅動白血病，可用imatinib標靶治療。故CML與ABL基因有關（C）。RAS、MYC、NF-1是其他致癌/腫瘤相關基因。故選C。","options":{"A":"RAS與多種實體癌相關，非CML標誌。","B":"MYC與Burkitt淋巴瘤相關。","C":"正確：CML與ABL基因（BCR-ABL）有關。","D":"NF-1與神經纖維瘤相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-41":{"quick":"惡性貧血（pernicious anemia）主要缺乏維生素B12，故選A。","detail":{"background":"惡性貧血（pernicious anemia）是「維生素B12缺乏」造成的巨母紅血球性貧血——因「自體免疫破壞胃壁細胞或抗內在因子抗體」，使內在因子缺乏，B12無法在迴腸吸收。B12缺乏致DNA合成障礙（巨母紅血球）、神經病變（亞急性合併退化）。故惡性貧血缺乏維生素B12（A）。葉酸缺乏也致巨母紅血球但無神經症狀。故選A。","options":{"A":"正確：惡性貧血是維生素B12缺乏（內在因子缺乏）。","B":"葉酸缺乏致巨母紅血球但無神經症狀。","C":"胺基酸缺乏非惡性貧血病因。","D":"鐵缺乏致小球性貧血，非惡性貧血。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-34":{"quick":"X性聯遺傳疾病是血友病，故選A。","detail":{"background":"X性聯（X-linked）隱性遺傳疾病：「血友病（hemophilia A第VIII因子、B第IX因子缺乏）」（A，幾乎都是男性發病）、G6PD缺乏症、紅綠色盲、杜顯氏肌肉失養症等。而囊狀纖維化（B，體染色體隱性CFTR）、鐮刀性貧血（C，體染色體隱性，β球蛋白）、家族性大腸息肉症（D，體染色體顯性APC）皆非X性聯。故X性聯者為血友病（A）。","options":{"A":"正確：血友病是X性聯遺傳疾病。","B":"囊狀纖維化是體染色體隱性。","C":"鐮刀性貧血是體染色體隱性。","D":"家族性大腸息肉症是體染色體顯性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-45":{"quick":"錯誤敘述為C：成人ALL預後比小孩「差」（非較佳），故選C。","detail":{"background":"急性淋巴母細胞性白血病（ALL）：A「可出現骨髓功能抑制（貧血、血小板低下、感染）」（正確）；B「染色體多倍體（hyperdiploidy）通常預後較佳」（正確）；C「相對於小孩，成人ALL預後較佳」錯——「小孩ALL預後好（治癒率高），成人ALL預後『較差』」；D「部分有t(9;22)表現BCR-ABL（費城染色體陽性ALL，預後差）」（正確）。故錯誤為C（成人ALL預後較差）。","options":{"A":"ALL可致骨髓抑制，正確。","B":"hyperdiploidy預後較佳，正確。","C":"正確（為錯誤敘述）：成人ALL預後比小孩差。","D":"部分ALL有t(9;22)（費城染色體），正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-34":{"quick":"長骨骨折2天後呼吸困難、躁動、神智不清，是脂肪栓塞，故選A。","detail":{"background":"「脂肪栓塞症候群（fat embolism syndrome）」典型發生於「長骨（股骨）骨折後1-3天」——骨髓的脂肪滴進入血液循環，栓塞肺血管與腦血管，造成「呼吸困難（低血氧）、神經症狀（躁動、神智不清）、皮膚瘀點（petechiae）」三聯徵。故長骨骨折後此症狀為脂肪栓塞（A）。硬腦膜下出血（外傷後）、細菌性肺炎、急性肺梗塞（血栓）的病程與此典型不符。故選A。","options":{"A":"正確：長骨骨折後脂肪栓塞（呼吸困難＋神經症狀＋瘀點）。","B":"硬腦膜下出血無此呼吸症狀組合。","C":"細菌性肺炎病程不符。","D":"急性肺梗塞（血栓）與骨折脂肪栓塞機轉不同。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-39":{"quick":"濾泡性淋巴瘤最常見的染色體變化是t(14;18)，故選A。","detail":{"background":"濾泡性淋巴瘤（follicular lymphoma，B細胞淋巴瘤）最常見的染色體變化是「t(14;18)(q32;q21)」——使「BCL-2基因」（第18號）受免疫球蛋白重鏈基因（第14號）增強子驅動而過度表現，BCL-2抑制凋亡使腫瘤細胞存活累積。故濾泡性淋巴瘤為t(14;18)（A）。t(15;17)是急性前骨髓性白血病（APL）、t(11;22)是尤汶氏肉瘤、t(4;11)是嬰兒ALL。故選A。","options":{"A":"正確：濾泡性淋巴瘤是t(14;18)（BCL-2）。","B":"t(15;17)是急性前骨髓性白血病。","C":"t(11;22)是尤汶氏肉瘤。","D":"t(4;11)是嬰兒ALL。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-44":{"quick":"常見的小球性貧血原因是缺鐵性貧血，故選A。","detail":{"background":"「小球性（microcytic）貧血」的常見原因（MCV下降）：「缺鐵性貧血（iron deficiency anemia）」（A，最常見）、地中海型貧血、慢性病貧血、鐵母細胞性貧血（記憶口訣「TICS/TAILS」）。而葉酸缺乏（B）、維生素B12缺乏（C）、惡性貧血（D）皆造成「巨球性（macrocytic）」貧血（MCV升高）。故小球性貧血為缺鐵性（A）。","options":{"A":"正確：缺鐵性貧血是常見小球性貧血。","B":"葉酸缺乏是巨球性貧血。","C":"B12缺乏是巨球性貧血。","D":"惡性貧血是巨球性貧血。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-43":{"quick":"急性淋巴母細胞白血病錯誤敘述為B：ALL以「B細胞型」為多（非T細胞型），故選B。","detail":{"background":"急性淋巴母細胞性白血病（ALL）：A「由不成熟B或T淋巴母細胞構成」（正確）；B「以T細胞型（T-ALL）為多」錯——ALL以「B細胞前驅型（pre-B/B-ALL）為多（約85%）」，T-ALL較少（約15%，好發青少年男性、縱膈腫塊）；C「大多表現末端去氧核苷酸轉移酶（TdT）」（正確，前驅淋巴母細胞標記）；D「大部分ALL有染色體異常」（正確）。故錯誤為B。","options":{"A":"由不成熟B或T淋巴母細胞構成，正確。","B":"正確（為錯誤敘述）：ALL以B細胞型為多，非T細胞型。","C":"大多表現TdT，正確。","D":"大部分ALL有染色體異常，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-37":{"quick":"不是肝衰竭臨床症狀的是「高白蛋白血症」，故選D。","detail":{"background":"肝衰竭（hepatic failure）的臨床表現：A「凝血病變致出血傾向」（正確，肝合成凝血因子減少）；B「男子女乳症（gynecomastia）」（正確，肝無法代謝雌激素致雌激素過多）；C「高氨血症（hyperammonemia）」（正確，肝無法將氨轉成尿素，致肝性腦病）；D「高白蛋白血症」錯——肝衰竭時肝合成白蛋白「減少」，造成「『低』白蛋白血症（hypoalbuminemia）」與水腫腹水，非高白蛋白。故不是症狀者為D。","options":{"A":"凝血病變出血傾向是肝衰竭症狀。","B":"男子女乳症是肝衰竭症狀。","C":"高氨血症（肝性腦病）是肝衰竭症狀。","D":"正確（為非症狀）：肝衰竭是低白蛋白血症，非高白蛋白。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-43":{"quick":"不參與過敏性氣喘的細胞是紅血球，故選B。","detail":{"background":"過敏性氣喘（第一型過敏反應）的參與細胞：TH2淋巴球（A，分泌IL-4/5/13）、肥大細胞（C，去顆粒釋組織胺）、嗜酸性球（晚期反應與組織損傷）、嗜中性球（D，部分嚴重氣喘）。而「紅血球（red blood cell，B）」是攜氧細胞，「不參與」過敏性氣喘的免疫發炎反應。故不參與者為B。","options":{"A":"TH2淋巴球參與過敏性氣喘。","B":"正確：紅血球不參與過敏性氣喘。","C":"肥大細胞參與過敏性氣喘。","D":"嗜中性球可參與嚴重氣喘。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-44":{"quick":"不是出血病症原因的是「維生素D缺乏」，故選A。","detail":{"background":"出血病症（bleeding disorder）的原因：von Willebrand病（B，最常見遺傳性出血病，vWF缺乏）、第VIII因子缺乏（C，血友病A）、肝硬化（D，凝血因子合成減少）、血小板異常、「維生素K缺乏（凝血因子II、VII、IX、X合成需維生素K）」。而「維生素『D』缺乏」造成的是「骨軟化/佝僂病（骨骼問題）」，「不是」出血病症原因（出血相關的是維生素「K」）。故不是出血原因者為A。","options":{"A":"正確：維生素D缺乏致骨病變，非出血病症（出血相關是維生素K）。","B":"von Willebrand病是出血病症。","C":"第VIII因子缺乏是血友病A（出血病）。","D":"肝硬化致凝血因子減少（出血傾向）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-45":{"quick":"自體免疫性胃炎錯誤敘述為A：好發於「胃體（body/fundus）」而非胃竇，故選A。","detail":{"background":"自體免疫性胃炎（autoimmune gastritis，A型胃炎）：A「最好發於胃竇（antrum）」錯——自體免疫性胃炎好發於「胃體與胃底（body/fundus）」（壁細胞所在處），胃竇較不受影響（胃竇型是幽門桿菌相關的B型胃炎）；B「血中可測得抗壁細胞與抗內在因子抗體」（正確）；C「胃黏膜萎縮、胃酸分泌減少（壁細胞被破壞）」（正確）；D「嚴重時致惡性貧血（內在因子缺乏、B12吸收障礙）」（正確）。故錯誤為A。","options":{"A":"正確（為錯誤敘述）：自體免疫性胃炎好發胃體胃底，非胃竇。","B":"有抗壁細胞與抗內在因子抗體，正確。","C":"胃黏膜萎縮、胃酸減少，正確。","D":"嚴重致惡性貧血，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-36":{"quick":"不屬於B細胞腫瘤的是蕈樣肉芽腫（mycosis fungoides，T細胞），故選D。","detail":{"background":"B淋巴球（B細胞）腫瘤：慢性淋巴細胞白血病（CLL，A）、濾泡性淋巴瘤（B）、伯基特氏淋巴瘤（Burkitt，C）皆為B細胞來源。而「蕈樣肉芽腫（mycosis fungoides）」是「皮膚T細胞淋巴瘤（cutaneous T-cell lymphoma）」——成熟CD4+ T細胞惡性增生侵犯皮膚（斑塊、腫瘤、Sézary症候群）。故不屬於B細胞腫瘤者為D。","options":{"A":"CLL是B細胞腫瘤。","B":"濾泡性淋巴瘤是B細胞腫瘤。","C":"伯基特氏淋巴瘤是B細胞腫瘤。","D":"正確：蕈樣肉芽腫是T細胞淋巴瘤，非B細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-43":{"quick":"細胞來源是上皮細胞的腫瘤是乳頭狀瘤（papilloma），故選D。","detail":{"background":"依細胞來源命名：「乳頭狀瘤（papilloma）」源自「上皮細胞（epithelial）」的良性腫瘤（如鱗狀上皮乳頭狀瘤）。而脂肪瘤（lipoma，A，脂肪間質）、血管瘤（hemangioma，B，血管）、淋巴瘤（lymphoma，C，淋巴細胞）皆為「間質（mesenchymal）或造血」來源。故上皮來源者為乳頭狀瘤（D）。","options":{"A":"脂肪瘤源自脂肪間質。","B":"血管瘤源自血管。","C":"淋巴瘤源自淋巴細胞。","D":"正確：乳頭狀瘤源自上皮細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-33":{"quick":"血清素（serotonin）屬於「血管活性胺」炎症介質，故選A。","detail":{"background":"發炎的化學介質分類：「血管活性胺（vasoactive amine）」——組織胺（histamine）與「血清素（serotonin/5-HT）」，由肥大細胞、嗜鹼性球、血小板釋放，造成血管擴張與通透性增加。其他介質系統：激肽系統（緩激肽）、補體系統（C3a、C5a）、凝血系統。故血清素屬血管活性胺（A）。","options":{"A":"正確：血清素屬血管活性胺（與組織胺同類）。","B":"激肽系統產物是緩激肽。","C":"補體系統產物是C3a/C5a。","D":"凝血系統產物是纖維蛋白等。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-39":{"quick":"胎兒紅血球母細胞症的主因是「母親與胎兒血型不合」，故選B。","detail":{"background":"胎兒紅血球母細胞症（erythroblastosis fetalis，新生兒溶血病）的主因是「母親與胎兒血型不合（Rh或ABO不合）」——Rh陰性母親懷Rh陽性胎兒，母親產生的抗Rh（IgG）抗體經胎盤進入胎兒，破壞胎兒紅血球造成溶血、貧血、黃疸、水腫（核黃疸風險）。可用抗D免疫球蛋白（RhoGAM）預防。故主因為母胎血型不合（B）。","options":{"A":"母親β鏈異常是地中海貧血，非此。","B":"正確：母親與胎兒血型不合（Rh/ABO）致胎兒溶血。","C":"母親紅血球膜異常非此病因。","D":"母親葉酸缺乏非此病因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-46":{"quick":"錯誤敘述為C：胃MALT淋巴瘤屬「B細胞」淋巴瘤（非T細胞），故選C。","detail":{"background":"胃黏膜相關淋巴組織淋巴瘤（gastric MALT lymphoma）：A「與慢性胃炎（幽門桿菌）有關」（正確）；B「可經除菌（幽門桿菌）治療、屬低惡性度淋巴瘤」（正確，早期除菌可消退）；C「屬T細胞淋巴瘤」錯——MALT淋巴瘤是「B細胞」邊緣區淋巴瘤；D「顯微鏡見淋巴上皮病灶（lymphoepithelial lesion，腫瘤B細胞侵入腺體上皮）」（正確）。故錯誤為C。","options":{"A":"與慢性胃炎（幽門桿菌）有關，正確。","B":"可除菌治療、低惡性度，正確。","C":"正確（為錯誤敘述）：胃MALT淋巴瘤是B細胞淋巴瘤，非T細胞。","D":"有淋巴上皮病灶，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-37":{"quick":"Heinz小體最常見於G6PD缺乏症的溶血性貧血，故選D。","detail":{"background":"Heinz小體（Heinz body）是「變性、氧化沉澱的血紅素」聚集物，最常見於「葡萄糖-6-磷酸去氫酶（G6PD）缺乏症」——G6PD缺乏使紅血球抗氧化能力不足，接觸氧化物時血紅素被氧化變性形成Heinz小體（脾臟移除後形成「咬痕細胞bite cell」），造成溶血。故Heinz小體最常見於G6PD缺乏（D）。免疫性溶血、地中海貧血、鐮刀血球的機轉不同。故選D。","options":{"A":"免疫性溶血是抗體破壞，非Heinz小體。","B":"地中海貧血是球蛋白鏈合成缺陷。","C":"鐮刀血球是HbS聚合。","D":"正確：G6PD缺乏症最常見Heinz小體。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-25":{"quick":"唐氏症錯誤敘述為C：早夭主因是「先天性心臟病」而非白血病，故選C。","detail":{"background":"唐氏症（Down syndrome）：A「常見第21對三體（trisomy 21）」（正確）；B「發生率與母親生育年齡正相關」（正確，高齡產婦風險增）；C「白血病是早夭最主要原因」錯——唐氏症雖白血病風險增加（約10-20倍），但「早夭（嬰幼兒死亡）的最主要原因是『先天性心臟病』（如房室中膈缺損）」；D「內眥贅皮、眼瞼縫向外上斜」（正確，特殊面容）。故錯誤為C。","options":{"A":"第21對三體，正確。","B":"發生率與母親年齡正相關，正確。","C":"正確（為錯誤敘述）：唐氏症早夭主因是先天性心臟病，非白血病。","D":"內眥贅皮、眼瞼外上斜，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-27":{"quick":"濾泡性淋巴瘤常見t(14;18)，故選B。","detail":{"background":"B細胞「濾泡性淋巴瘤（follicular lymphoma）」最常見的染色體異常是「t(14;18)」——使第18號的「BCL-2」抗凋亡基因受第14號免疫球蛋白重鏈增強子驅動而過度表現，腫瘤B細胞因抗凋亡而存活累積。故為t(14;18)（B）。trisomy 12見於CLL、t(11;14)是被套細胞淋巴瘤、t(9;22)是CML/費城染色體陽性ALL。故選B。","options":{"A":"trisomy 12見於CLL。","B":"正確：濾泡性淋巴瘤是t(14;18)（BCL-2）。","C":"t(11;14)是被套細胞淋巴瘤。","D":"t(9;22)是CML/費城染色體。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-22":{"quick":"多發性骨髓瘤的類澱粉前驅蛋白是免疫球蛋白輕鏈，故選B。","detail":{"background":"多發性骨髓瘤（multiple myeloma）的類澱粉沉積屬「AL型（amyloid light chain）」——前驅蛋白是漿細胞分泌的「免疫球蛋白輕鏈（immunoglobulin light chain，κ或λ）」，沉積於心、腎、舌、神經等。故前驅蛋白為免疫球蛋白輕鏈（B）。血清類澱粉A（SAA）是「AA型」（慢性發炎）、β2-微球蛋白與透析相關類澱粉、前白蛋白（transthyretin）與遺傳性/老年心臟類澱粉。故選B。","options":{"A":"血清類澱粉A是AA型（慢性發炎）前驅蛋白。","B":"正確：多發性骨髓瘤類澱粉前驅蛋白是免疫球蛋白輕鏈（AL型）。","C":"β2-微球蛋白與透析相關類澱粉。","D":"前白蛋白與老年/遺傳性心臟類澱粉。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-28":{"quick":"兒童最常見的白血病是急性淋巴母細胞性白血病（ALL），故選D。","detail":{"background":"「急性淋巴母細胞性白血病（acute lymphoblastic leukemia, ALL）」是「兒童最常見的白血病」（佔兒童白血病約75-80%，好發2-5歲），以B細胞前驅型為主，化療治癒率高。故兒童最常見白血病為ALL（D）。AML好發成人、CML/CLL是慢性白血病好發中老年。故選D。","options":{"A":"CML好發中年成人。","B":"CLL好發老年。","C":"AML好發成人。","D":"正確：ALL是兒童最常見白血病。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-23":{"quick":"地中海型貧血是體染色體「隱性」，與其他三者（顯性）遺傳模式不同，故選B。","detail":{"background":"遺傳模式：第一型神經纖維瘤症（NF1，A）、馬凡氏症（Marfan，C）、結節性硬化症（tuberous sclerosis，D）皆為「體染色體『顯性』遺傳」。而「地中海型貧血（thalassemia，B）」是「體染色體『隱性』遺傳」（α或β球蛋白基因缺陷）。故遺傳模式不同者為地中海型貧血（B，隱性）。","options":{"A":"神經纖維瘤症第一型是體染色體顯性。","B":"正確：地中海型貧血是體染色體隱性（與其他顯性不同）。","C":"馬凡氏症是體染色體顯性。","D":"結節性硬化症是體染色體顯性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-26":{"quick":"缺鐵性貧血的紅血球「體積小且顏色淺」，故選B。","detail":{"background":"缺鐵性貧血（iron deficiency anemia）因鐵不足、血紅素合成減少，紅血球呈「小球性低色素性」——即「體積小（microcytic，MCV下降）且顏色淺（hypochromic，中央蒼白區擴大）」。故為體積小且顏色淺（B）。","options":{"A":"體積小但顏色「淺」非深。","B":"正確：缺鐵性貧血紅血球體積小且顏色淺。","C":"體積大顏色深是巨母紅血球性（B12/葉酸）。","D":"體積大顏色淺不典型。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-22":{"quick":"最不適當的是B：肝衰竭時白蛋白通常「降低」而非正常，故選B。","detail":{"background":"肝衰竭引發腹部腫大（腹水）：A「常合併凝血功能障礙」（正確，凝血因子合成減少）；B「血漿白蛋白通常正常」錯——肝衰竭時肝合成白蛋白「減少」，造成「『低』白蛋白血症」，使血漿膠體滲透壓下降、腹水水腫；C「常合併腹水」（正確，門脈高壓＋低白蛋白）；D「常見原因是肝硬化」（正確）。故最不適當為B。","options":{"A":"肝衰竭合併凝血障礙，正確。","B":"正確（為最不適當）：肝衰竭白蛋白降低，非正常。","C":"肝衰竭常合併腹水，正確。","D":"肝硬化是常見原因，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-26":{"quick":"骨髓巨核細胞「減少」的血小板低下原因是再生不良性貧血，故選A。","detail":{"background":"血小板減少依骨髓巨核細胞分兩類：①骨髓巨核細胞「減少」（生成不足）——「再生不良性貧血（aplastic anemia，A）」（骨髓造血幹細胞衰竭，全血球減少含巨核細胞）、白血病浸潤、化療；②骨髓巨核細胞「正常或增多」（周邊破壞增加）——免疫性血小板減少紫斑（ITP，B）、血栓性血小板減少紫斑（TTP，C）、溶血性尿毒症候群（HUS，D），這些是「破壞」過多而骨髓代償性增多巨核細胞。故巨核細胞減少者為再生不良性貧血（A）。","options":{"A":"正確：再生不良性貧血骨髓巨核細胞減少（生成不足）。","B":"ITP是周邊破壞，巨核細胞正常/增多。","C":"TTP是周邊破壞（消耗），巨核細胞不減少。","D":"HUS是周邊破壞（消耗）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-22":{"quick":"與高凝血狀態「關聯最小」的是von Willebrand病，故選D。","detail":{"background":"高凝血狀態（hypercoagulability，易形成血栓）相關：長期臥床（A，血流淤滯）、口服避孕藥（B，雌激素增加凝血因子）、抗磷脂質症候群（C，自體抗體致動靜脈血栓）。而「von Willebrand病」是「von Willebrand因子缺乏」造成的「『出血』性疾病（血小板黏附與第VIII因子穩定缺陷）」，與「高凝血（血栓）」相反。故關聯最小者為D。","options":{"A":"長期臥床致血流淤滯、易血栓。","B":"口服避孕藥增加凝血傾向。","C":"抗磷脂質症候群致血栓。","D":"正確：von Willebrand病是出血病，與高凝血關聯最小。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-24":{"quick":"「肝硬化」不是鉛中毒的常見表現，故選A。","detail":{"background":"鉛中毒（lead poisoning）的常見表現：①兒童「智力發展障礙、行為問題」（B，鉛對發育中神經毒性）；②「周邊神經病變」（C，如垂腕wrist drop）；③「貧血」（D，鉛抑制血基質合成酵素，致小球性貧血、嗜鹼性點彩紅血球）；④腹絞痛、牙齦鉛線、腎病變。而「肝硬化」不是鉛中毒的常見表現。故非常見表現者為A。","options":{"A":"正確：肝硬化不是鉛中毒常見表現。","B":"兒童智力發展障礙是鉛中毒表現。","C":"周邊神經病變是鉛中毒表現。","D":"貧血是鉛中毒表現。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-26":{"quick":"何杰金氏淋巴瘤的腫瘤細胞是瑞德-史登堡氏細胞（Reed-Sternberg cell），故選C。","detail":{"background":"何杰金氏淋巴瘤（Hodgkin lymphoma）的診斷性腫瘤細胞是「瑞德-史登堡氏細胞（Reed-Sternberg cell, RS細胞）」——大型雙核/多核、核仁明顯如貓頭鷹眼，CD15、CD30陽性。故選C。淋巴母細胞（ALL）、副免疫母細胞（CLL）、Cajal-Retzius細胞（胚胎大腦皮質）非何杰金淋巴瘤的腫瘤細胞。故選C。","options":{"A":"淋巴母細胞見於急性淋巴白血病。","B":"副免疫母細胞見於CLL。","C":"正確：Reed-Sternberg細胞是何杰金氏淋巴瘤的腫瘤細胞。","D":"Cajal-Retzius細胞是胚胎大腦皮質細胞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-25":{"quick":"最常見的惡性淋巴瘤是瀰漫性大B細胞淋巴瘤，故選D。","detail":{"background":"「瀰漫性大B細胞淋巴瘤（diffuse large B-cell lymphoma, DLBCL）」是「最常見的惡性淋巴瘤（非何杰金淋巴瘤中最常見，約佔30-40%）」——侵襲性（高惡性度）但對化療反應佳（R-CHOP可治癒部分病人）。故最常見惡性淋巴瘤為DLBCL（D）。伯基特淋巴瘤、何杰金淋巴瘤、結外邊緣區淋巴瘤較少。故選D。","options":{"A":"伯基特淋巴瘤較少見。","B":"何杰金氏淋巴瘤較DLBCL少。","C":"結外邊緣區（MALT）淋巴瘤較少。","D":"正確：瀰漫性大B細胞淋巴瘤是最常見惡性淋巴瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-21":{"quick":"止血錯誤敘述為B：血小板初級止血是黏附於暴露的「膠原（透過vWF/GpIb）」而非E-selectin，故選B。","detail":{"background":"血管受傷後止血：A「內皮素（endothelin）釋放致血管收縮」（正確）；B「血小板與血管內皮上的E-selectin結合形成初級止血栓」錯——初級止血是血小板透過「GpIb受體經von Willebrand因子（vWF）黏附於『暴露的膠原』」（內皮損傷處），E-selectin是內皮表達、與「白血球」黏附（發炎）有關，非血小板止血；C「組織因子（tissue factor）活化外在凝血路徑」（正確）；D「凝血酶調節素（thrombomodulin）抗凝（活化蛋白C）」（正確）。故錯誤為B。","options":{"A":"內皮素致血管收縮，正確。","B":"正確（為錯誤敘述）：血小板黏附暴露膠原（vWF/GpIb），非與E-selectin結合。","C":"組織因子活化凝血，正確。","D":"凝血酶調節素抗凝，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"115030-N1-26":{"quick":"出現Hb Barts的是甲型（α）地中海型貧血，故選A。","detail":{"background":"「Bart氏血紅素（Hb Barts，γ4，四個γ鏈）」出現於「甲型（α）地中海型貧血」——α球蛋白鏈合成嚴重不足（四個α基因全缺失，胎兒水腫hydrops fetalis），過剩的γ鏈聚成Hb Barts（攜氧能力差）。故出現Hb Barts者為α地中海型貧血（A）。鐮刀型貧血（HbS）、遺傳性球狀紅血球症（膜缺陷）、缺鐵性貧血機轉不同。故選A。","options":{"A":"正確：甲型（α）地中海型貧血出現Hb Barts（γ4）。","B":"鐮刀型貧血是HbS。","C":"遺傳性球狀紅血球症是膜蛋白缺陷。","D":"缺鐵性貧血是鐵不足。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-35":{"quick":"大腿骨折後第二天突發呼吸急促，是脂肪栓塞，故選A。","detail":{"background":"長骨（股骨/大腿）骨折後1-3天出現「呼吸急促、低血氧、神經症狀（躁動神智不清）、皮膚瘀點」是「脂肪栓塞症候群（fat embolism syndrome）」——骨髓脂肪滴進入血流栓塞肺與腦血管。故車禍大腿骨折後第二天突發呼吸急促為脂肪栓塞（A）。氣體栓塞（潛水）、動脈血栓栓塞、DVT的情境不符。故選A。","options":{"A":"正確：長骨骨折後脂肪栓塞致呼吸急促。","B":"氣體栓塞與潛水相關。","C":"動脈血栓栓塞情境不符。","D":"DVT本身致肺栓塞但骨折後典型是脂肪栓塞。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101030-N1-48":{"quick":"帕金森氏病是基底核「黑質（substantia nigra）」異常，故選C。","detail":{"background":"帕金森氏病（Parkinson disease）是中腦「基底核的黑質（substantia nigra）緻密部」多巴胺神經元退化，使紋狀體多巴胺不足，造成動作遲緩、靜止性顫抖、僵直。殘存神經元可見Lewy體。故病變在黑質（C）。上運動神經元（大腦皮質）、下運動神經元（脊髓）、尾核（亨丁頓）非帕金森病變部位。故選C。","options":{"A":"上運動神經元病變非帕金森。","B":"下運動神經元病變是運動神經元疾病。","C":"正確：帕金森氏病是黑質（基底核）退化。","D":"尾核退化與亨丁頓相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-34":{"quick":"腦組織缺血壞死最常呈「液化性壞死」，故選B。","detail":{"background":"「腦（與脊髓）」的缺血壞死（如腦梗塞）最常呈現「液化性壞死（liquefactive necrosis）」——因腦組織富含脂質與水解酶、缺乏支持性結締組織，壞死後組織液化形成囊狀空腔。故腦缺血壞死為液化性壞死（B）。對比：多數實質器官（心、腎、脾）缺血是凝固性壞死、結核是乾酪性壞死、胰臟炎是脂肪壞死。故選B。","options":{"A":"脂肪壞死見於胰臟炎。","B":"正確：腦缺血壞死是液化性壞死。","C":"乾酪樣壞死見於結核。","D":"凝固性壞死見於心腎等實質器官缺血。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"101110-N1-45":{"quick":"最常見的神經膠細胞瘤是星狀細胞瘤（astrocytoma），故選C。","detail":{"background":"「星狀細胞瘤（astrocytoma）」是最常見的神經膠細胞瘤（glioma，源自星形膠細胞）——成人最常見的原發惡性腦瘤是其高惡性度型「多形性膠質母細胞瘤（glioblastoma multiforme, GBM，第IV級）」，預後極差。故最常見glioma為星狀細胞瘤（C）。寡突膠細胞瘤、室管膜瘤、髓芽母細胞瘤（兒童小腦）較少。故選C。","options":{"A":"寡突膠細胞瘤較少見。","B":"室管膜瘤較少見。","C":"正確：星狀細胞瘤是最常見的神經膠細胞瘤。","D":"髓芽母細胞瘤是兒童小腦腫瘤。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-37":{"quick":"由兩種胚層以上組成的腫瘤稱畸胎瘤（teratoma），故選D。","detail":{"background":"「畸胎瘤（teratoma）」是源自「生殖細胞」、由「三個胚層（外胚層、中胚層、內胚層）」分化組織組成的腫瘤——含皮膚、毛髮、牙齒、神經、軟骨、腺體等多種組織。故由兩種以上胚層組成者為畸胎瘤（D）。上皮癌（carcinoma）、肉瘤（sarcoma）是單一來源的惡性腫瘤、混合瘤（如唾液腺多形性腺瘤）是上皮與間質混合但非生殖細胞胚層。故選D。","options":{"A":"上皮癌是上皮來源的惡性腫瘤。","B":"肉瘤是間質來源的惡性腫瘤。","C":"混合瘤是上皮與間質混合（如唾液腺），非三胚層。","D":"正確：畸胎瘤由兩種以上胚層組成。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-47":{"quick":"阿茲海默症的特殊病理是神經纖維糾結，故選D。","detail":{"background":"阿茲海默症（Alzheimer disease）的特殊顯微病理：①「神經纖維糾結（neurofibrillary tangle）」——過度磷酸化的tau蛋白聚集（D）；②老年斑塊（senile/neuritic plaque）——β類澱粉沉積；伴大腦皮質（尤其海馬迴）萎縮。故Alzheimer特殊發現為神經纖維糾結（D）。海綿狀病變（庫賈病prion）、奈格利小體（狂犬病）、路易體（帕金森/路易體失智）是其他疾病。故選D。","options":{"A":"海綿狀病變見於庫賈病（prion）。","B":"奈格利小體見於狂犬病。","C":"路易體見於帕金森/路易體失智。","D":"正確：神經纖維糾結是阿茲海默症特殊病理。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102030-N1-48":{"quick":"大腳趾反覆急性關節炎、白色結石腫塊，是痛風（gout），故選A。","detail":{"background":"痛風（gout）是「尿酸鈉（monosodium urate）結晶」沉積於關節與周圍組織造成的發炎——最典型「第一蹠趾關節（大腳趾）的反覆急性關節炎（podagra）」，慢性形成「痛風石（tophus，白色尿酸鈉結晶沉積腫塊）」。故大腳趾反覆關節炎＋白色結石為痛風（A）。類風濕（對稱小關節）、骨關節炎（退化）、僵直性脊椎炎（中軸）型態不同。故選A。","options":{"A":"正確：痛風（尿酸鈉結晶，大腳趾、痛風石）。","B":"類風濕關節炎是對稱小關節滑膜炎。","C":"骨關節炎是退化性。","D":"僵直性脊椎炎侵犯中軸關節。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-33":{"quick":"老化或萎縮細胞最常出現脂褐質（lipofuscin），故選A。","detail":{"background":"「脂褐質（lipofuscin，脂褐素）」是脂質過氧化的不可消化殘餘物（自由基損傷的「磨損色素」），堆積於「老化或萎縮」細胞（心肌、肝、神經元），呈黃棕色顆粒，使器官呈棕色萎縮。故老化萎縮細胞的內源性色素為脂褐質（A）。黑色素（皮膚）、血鐵質（鐵沉積）、膽紅素（膽色素）非老化萎縮的標誌。故選A。","options":{"A":"正確：老化萎縮細胞最常出現脂褐質。","B":"黑色素見於皮膚黑色素細胞。","C":"血鐵質是鐵沉積色素。","D":"膽紅素是膽色素。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-35":{"quick":"杜顯氏肌肉萎縮症是「肌縮蛋白（dystrophin）」基因異常，故選A。","detail":{"background":"杜顯氏肌肉萎縮症（Duchenne muscular dystrophy, DMD）是X性聯隱性遺傳，「肌縮蛋白（dystrophin）」基因突變使該蛋白缺失——dystrophin連接肌纖維細胞骨架與細胞外基質，缺失使肌纖維膜不穩、反覆損傷壞死、被纖維脂肪取代，造成進行性近端肌無力（好發男孩、Gower徵、小腿假性肥大、CK升高）。故DMD是dystrophin異常（A）。","options":{"A":"正確：杜顯氏肌肉萎縮症是dystrophin基因異常。","B":"肌動蛋白非DMD缺陷蛋白。","C":"肌凝蛋白非DMD缺陷蛋白。","D":"結蛋白非DMD缺陷蛋白。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"102110-N1-48":{"quick":"佝僂病（rickets）是缺乏維生素D，故選C。","detail":{"background":"佝僂病（rickets）是「兒童」缺乏「維生素D」（或鈣磷）造成骨骼礦化不足的疾病——成長中的骨骼與生長板無法正常鈣化，造成骨骼軟化變形（O型腿/X型腿、肋骨念珠、囟門延遲閉合、雞胸）。成人對應為「軟骨症（osteomalacia）」。維生素D促進腸鈣磷吸收與骨礦化。故佝僂病缺乏維生素D（C）。","options":{"A":"維生素B12缺乏致惡性貧血。","B":"維生素C缺乏致壞血病。","C":"正確：佝僂病是維生素D缺乏。","D":"維生素E缺乏致溶血/神經病變。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-35":{"quick":"不屬於類風濕性關節炎特點的是「非侵蝕性關節炎」，故選A。","detail":{"background":"類風濕性關節炎（rheumatoid arthritis, RA）特點：①「侵蝕性（erosive）關節炎」——滑膜增生形成血管翳（pannus）侵蝕破壞關節軟骨與骨（A說「非侵蝕性」錯，RA是侵蝕性）；②對稱性多關節炎（B，好發手指近端指間關節PIP、掌指關節MCP、腕）；③晨間僵硬大於一小時（C）；④皮下類風濕結節（D）、類風濕因子與抗CCP抗體陽性。故不屬於者為A。","options":{"A":"正確（為非RA特點）：RA是「侵蝕性」關節炎，非非侵蝕性。","B":"對稱性關節炎是RA特點。","C":"晨間僵硬>1小時是RA特點。","D":"類風濕皮下結節是RA特點。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-47":{"quick":"預防老年骨質疏鬆最有效的是「年輕時多運動加強骨質」，故選C。","detail":{"background":"預防老年骨質疏鬆最有效的策略是「在年輕時（30歲前）透過充足運動（負重）、鈣與維生素D攝取，盡量提高『骨質尖峰量（peak bone mass）』」——骨質尖峰量越高，老年流失後剩餘骨量越多、骨折風險越低。故最有效為年輕時多運動加強骨質（C）。停經後才補鈣（A）效果有限、減肥（B）反而不利、骨密度檢查（D）是「偵測」非「預防」。故選C。","options":{"A":"停經後才補鈣效果有限。","B":"減肥不利骨質（適度體重有保護）。","C":"正確：年輕時運動加強骨質（提高骨質尖峰量）最有效預防。","D":"骨密度檢查是偵測，非預防。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103030-N1-48":{"quick":"背痛、右上肺病灶＋第五胸椎壓迫性病灶，最可能是結核桿菌，故選D。","detail":{"background":"本題「肺上葉病灶＋脊椎（第五胸椎）破壞性病灶」高度提示「結核桿菌（Mycobacterium tuberculosis）」感染——肺結核可血行散播至脊椎造成「脊椎結核（波特氏病Pott disease）」，破壞椎體與椎間盤、形成寒性膿瘍、駝背畸形。故肺＋脊椎病灶為結核（D）。梅毒、隱球菌、念珠菌的肺＋骨表現較不典型。故選D。","options":{"A":"梅毒可侵骨但此組合非典型。","B":"隱球菌主要侵肺與腦膜。","C":"念珠菌少侵脊椎。","D":"正確：結核（肺＋脊椎波特氏病）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"103100-N1-37":{"quick":"佝僂症是缺乏維生素D，故選C。","detail":{"background":"佝僂症（rickets）是兒童缺乏「維生素D」（或鈣磷）造成骨骼礦化不足——生長中骨骼軟化變形（O/X型腿、肋骨念珠、雞胸）。維生素D促進腸鈣磷吸收與骨礦化，缺乏致礦化障礙。故佝僂症缺乏維生素D（C）。維生素A（夜盲）、C（壞血病）、K（出血）缺乏致其他病。故選C。","options":{"A":"維生素A缺乏致夜盲乾眼。","B":"維生素C缺乏致壞血病。","C":"正確：佝僂症是維生素D缺乏。","D":"維生素K缺乏致出血。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104030-N1-47":{"quick":"腦皮質萎縮＋神經斑塊＋神經纖維糾結，是阿茲海默症，故選B。","detail":{"background":"「大腦皮質萎縮（尤其海馬迴、顳頂葉）＋顯微鏡下『老年斑塊（β類澱粉plaque）』與『神經纖維糾結（tau）』」是「阿茲海默症（Alzheimer disease）」的特徵——最常見的失智症。故選B。帕金森氏病（黑質Lewy體）、亨丁頓舞蹈症（尾核萎縮）、運動神經元疾病（ALS，運動神經元退化）病理不同。故選B。","options":{"A":"帕金森氏病是黑質退化、Lewy體。","B":"正確：阿茲海默症（皮質萎縮＋斑塊＋神經纖維糾結）。","C":"亨丁頓舞蹈症是尾核萎縮。","D":"運動神經元疾病是運動神經元退化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-33":{"quick":"褥瘡屬於「潰瘍性」病灶，故選C。","detail":{"background":"褥瘡（壓瘡pressure ulcer）是長期受壓部位（骨突處）因缺血壞死形成的「皮膚與皮下組織潰瘍」——屬「潰瘍性（ulcerative）」病灶（表面組織壞死缺損）。故選C。非先天畸形、非贅生性（腫瘤）、非過敏性。故選C。","options":{"A":"非先天性畸形。","B":"非贅生性（非腫瘤）。","C":"正確：褥瘡是潰瘍性病灶。","D":"非過敏性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"104100-N1-44":{"quick":"與維生素D缺乏「較無關」的是骨質壞死（osteonecrosis），故選C。","detail":{"background":"維生素D缺乏相關：佝僂症（A，兒童骨礦化不足）、軟骨症（B，成人骨礦化不足）、骨質疏鬆（D，維生素D與鈣不足促進骨流失）。而「骨質壞死（osteonecrosis，缺血性骨壞死/avascular necrosis）」是「骨骼血流中斷」造成的骨細胞死亡（如類固醇、酗酒、股骨頸骨折、潛水），與「維生素D缺乏」無直接關係。故較無關者為C。","options":{"A":"佝僂症與維生素D缺乏相關。","B":"軟骨症與維生素D缺乏相關。","C":"正確：骨質壞死是缺血所致，與維生素D缺乏較無關。","D":"骨質疏鬆與維生素D/鈣不足相關。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"105030-N1-48":{"quick":"手部多關節僵硬變形（無法打麻將），最可能是類風濕性關節炎，故選B。","detail":{"background":"婦女「手部多個小關節（指間、掌指）對稱性僵硬變形」（致無法做精細動作如打麻將）最可能是「類風濕性關節炎（rheumatoid arthritis, RA）」——對稱性多關節滑膜炎，侵蝕關節形成天鵝頸/鈕扣指變形、尺側偏移，晨僵>1小時。故選B。骨關節炎好發負重大關節與遠端指間（Heberden結節）、化膿性/結核性關節炎多為單關節感染。故選B。","options":{"A":"骨關節炎好發負重關節與遠端指間。","B":"正確：類風濕性關節炎（對稱手部小關節變形）。","C":"化膿性關節炎多單關節急性感染。","D":"結核性關節炎多單關節慢性感染。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-47":{"quick":"髓芽母細胞瘤錯誤敘述為A：好發於「兒童」而非老年人，故選A。","detail":{"background":"髓芽母細胞瘤（medulloblastoma）：A「好發於老年人」錯——好發於「兒童（小於10歲）」，是兒童最常見的惡性腦瘤之一；B「好發於小腦（中線小腦蚓部）」（正確，致腦壓增加、步態不穩）；C「顯微鏡下Homer-Wright玫瑰花形」（正確）；D「可隨腦脊髓液散播（drop metastasis）」（正確）。故錯誤為A（應為兒童）。","options":{"A":"正確（為錯誤敘述）：髓芽母細胞瘤好發兒童，非老年人。","B":"好發於小腦，正確。","C":"有Homer-Wright玫瑰花形，正確。","D":"可隨腦脊髓液散播，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106110-N1-48":{"quick":"波特氏病（Pott disease）與結核病最有關，故選B。","detail":{"background":"波特氏病（Pott disease）是「脊椎結核（tuberculous spondylitis）」——「結核桿菌」血行散播至脊椎，破壞椎體與椎間盤，造成脊椎塌陷、後凸畸形（駝背gibbus）、寒性膿瘍與神經壓迫。故波特氏病與結核病最有關（B）。梅毒、疱疹、猩紅熱非波特氏病病因。故選B。","options":{"A":"梅毒非波特氏病主因。","B":"正確：波特氏病是脊椎結核。","C":"疱疹非波特氏病。","D":"猩紅熱非波特氏病。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-33":{"quick":"皮膚修復機化時大量增生的是「微血管」，故選B。","detail":{"background":"傷口癒合的「機化（organization）」過程中形成「肉芽組織（granulation tissue）」——其特徵是「新生微血管（血管新生angiogenesis）大量增生」與纖維母細胞增生、膠原沉積。故機化時大量增生者為微血管（B）。軟骨、骨小樑（骨折癒合）、橫紋肌束非皮膚傷口機化的主角。故選B。","options":{"A":"軟骨增生見於骨折癒合，非皮膚機化。","B":"正確：機化時微血管（肉芽組織）大量增生。","C":"骨小樑見於骨折癒合。","D":"橫紋肌不參與皮膚機化增生。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"106111-N1-37":{"quick":"粒線體基因突變疾病是「母系遺傳」，故選A。","detail":{"background":"粒線體（mitochondria）有自己的DNA（mtDNA），且受精時粒線體幾乎全來自「卵子（母親）」，故粒線體基因突變疾病呈「母系遺傳（maternal inheritance）」——母親將突變傳給「所有子女」（不分性別），但只有女兒能再往下傳。例如Leber遺傳性視神經病變、MELAS、MERRF。故粒線體基因突變為母系遺傳（A）。","options":{"A":"正確：粒線體基因突變是母系遺傳。","B":"非父系遺傳（精子粒線體不傳）。","C":"非典型體染色體顯性。","D":"非典型體染色體隱性。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107030-N1-48":{"quick":"肌萎縮性側索硬化症（ALS）的中樞部位是脊髓，故選A。","detail":{"background":"肌萎縮性側索硬化症（amyotrophic lateral sclerosis, ALS，運動神經元疾病）侵犯「上運動神經元（大腦皮質運動區與皮質脊髓徑）」與「下運動神經元（脊髓前角細胞與腦幹運動核）」——「脊髓（A，前角下運動神經元與側索的皮質脊髓徑）」是主要病變部位之一。臨床漸進性肌無力、萎縮、肌束顫動（下運動神經元）＋痙攣、反射亢進（上運動神經元），感覺正常。故ALS中樞部位包含脊髓（A）。","options":{"A":"正確：ALS侵犯脊髓（前角與皮質脊髓徑）。","B":"小腦非ALS病變部位。","C":"枕葉（視覺）非ALS病變。","D":"顳葉非ALS病變。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"107110-N1-48":{"quick":"40歲女性對稱手指肘關節晨間僵硬，是類風濕性關節炎，故選B。","detail":{"background":"本題「中年女性、全身疲倦低燒、對稱性手指與肘關節晨間僵硬」是「類風濕性關節炎（rheumatoid arthritis, RA）」的典型——自體免疫對稱性多關節滑膜炎，晨僵>1小時，類風濕因子/抗CCP陽性，可有全身症狀。故選B。僵直性脊椎炎（年輕男性中軸）、退化性關節炎（負重大關節、無晨僵全身症狀）、痛風（大腳趾單關節）不符。故選B。","options":{"A":"僵直性脊椎炎好發年輕男性中軸關節。","B":"正確：類風濕性關節炎（中年女性、對稱手部小關節、晨僵）。","C":"退化性關節炎無此全身症狀與對稱小關節晨僵。","D":"痛風好發大腳趾單關節。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-39":{"quick":"硬腦膜外血腫關聯最大的血管是中腦膜動脈，故選B。","detail":{"background":"硬腦膜外血腫（epidural hematoma）最常因「中腦膜動脈（middle meningeal artery）破裂」——顳骨骨折（如外傷打到顳側）撕裂中腦膜動脈，動脈血快速積於硬腦膜與顱骨之間，典型「清醒期（lucid interval）後快速意識惡化」，CT呈「凸透鏡狀（雙凸）」高密度。故硬腦膜外血腫與中腦膜動脈最相關（B）。橋靜脈破裂是硬腦膜「下」血腫（新月形）。故選B。","options":{"A":"上矢狀靜脈竇非硬腦膜外血腫主因。","B":"正確：中腦膜動脈破裂致硬腦膜外血腫。","C":"橋靜脈破裂致硬腦膜「下」血腫。","D":"前大腦動脈非硬腦膜外血腫主因。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108020-N1-48":{"quick":"軟骨發育不全的特徵是四肢短、前額突出、鼻根凹陷但智力生殖力正常，故選A。","detail":{"background":"軟骨發育不全症（achondroplasia）是「FGFR3基因突變（體染色體顯性）」造成軟骨內骨化障礙——特徵是「四肢（近端）短小、頭大前額突出、鼻根（鼻樑）凹陷、三叉手」，但「軀幹大致正常、智力與生殖力『不受影響』」（A正確），是最常見的不成比例侏儒症。故選A。並非脊柱發育不全、不合併先心、智力與生育正常（C、D錯）。故選A。","options":{"A":"正確：軟骨發育不全四肢短、前額突出、鼻根凹陷，智力生殖力正常。","B":"是四肢短而非脊柱發育不全。","C":"非常合併先天性心臟病。","D":"智力與生育力正常，非低智商不孕。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-33":{"quick":"最不常以肉芽腫性發炎呈現的是B型肝炎，故選D。","detail":{"background":"肉芽腫性發炎（granulomatous inflammation）常見於：結核病（A，乾酪性肉芽腫）、痲瘋（B，類結核型肉芽腫）、類肉瘤病（C，sarcoidosis非乾酪性肉芽腫）、黴菌感染、克隆氏病、貓抓病等。而「B型肝炎」造成的是「肝細胞壞死與淋巴球浸潤的病毒性肝炎」，「不以肉芽腫性發炎呈現」。故最不常者為D。","options":{"A":"結核病是乾酪性肉芽腫。","B":"痲瘋是肉芽腫性發炎。","C":"類肉瘤病是非乾酪性肉芽腫。","D":"正確：B型肝炎不以肉芽腫呈現（病毒性肝炎）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"108110-N1-48":{"quick":"類風濕性關節炎病理是滑膜增生發炎、形成血管翳侵蝕軟骨，故選A。","detail":{"background":"類風濕性關節炎（RA）的病理特徵：「關節滑膜（synovium）增生與慢性發炎，形成『血管翳（pannus）』——增生的滑膜組織覆蓋並侵蝕關節軟骨與骨」（A正確），造成關節破壞變形。對比：B「軟骨變性磨損」是「骨關節炎（退化性）」；C「中軸骨慢性發炎」是「僵直性脊椎炎」；D「尿酸晶體沉積」是「痛風」。故RA病理為A。","options":{"A":"正確：RA是滑膜增生發炎、形成血管翳侵蝕軟骨。","B":"軟骨變性磨損是骨關節炎。","C":"中軸骨慢性發炎是僵直性脊椎炎。","D":"尿酸晶體沉積是痛風。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-38":{"quick":"狂牛病由普利子蛋白（prion）感染引起，故選A。","detail":{"background":"狂牛病（牛海綿狀腦病，及人類的變異型庫賈氏病）由「普利子蛋白（prion）」引起——prion是錯誤摺疊的蛋白質（無核酸），能誘導正常PrP蛋白變構聚集，造成腦組織海綿狀變性（傳播性海綿狀腦病）。prion對常規消毒（煮沸、福馬林）抗性強。故狂牛病由prion引起（A）。非病毒、原蟲、披衣菌。故選A。","options":{"A":"正確：狂牛病由普利子蛋白（prion）引起。","B":"非病毒感染。","C":"非原蟲感染。","D":"非披衣菌感染。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-40":{"quick":"腦梗塞後皮質出現囊狀區域，是「液化壞死」，故選C。","detail":{"background":"腦梗塞（缺血壞死）後，腦組織因富含脂質與水解酶、缺乏結締組織支撐，發生「液化壞死（liquefactive necrosis）」——壞死組織被分解液化、被巨噬細胞清除，最終形成「充滿液體的囊狀空腔（cystic cavity）」。故腦梗塞後囊狀區域是液化壞死（C）。凝固樣壞死（心腎）、脂肪壞死（胰）、纖維蛋白樣壞死（血管炎）非腦梗塞典型。故選C。","options":{"A":"凝固樣壞死見於心腎缺血。","B":"脂肪壞死見於胰臟炎。","C":"正確：腦梗塞後液化壞死形成囊狀空腔。","D":"類纖維蛋白樣壞死見於血管炎/惡性高血壓。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109030-N1-47":{"quick":"重症肌無力的主要病變在「神經肌肉接合處」，故選D。","detail":{"background":"重症肌無力（myasthenia gravis）是「神經肌肉接合處（neuromuscular junction）」的自體免疫疾病——自體抗體攻擊「肌肉終板的乙醯膽鹼受體（AChR）」，使神經肌肉傳遞障礙，造成「易疲勞性肌無力」（活動後加重、休息改善），常見眼瞼下垂、複視、吞嚥困難。故主要病變在神經肌肉接合處（D）。骨骼肌本身、運動神經元、基底核非主要病變部位。故選D。","options":{"A":"骨骼肌本身正常（是接合處傳遞問題）。","B":"運動神經元正常。","C":"基底核非重症肌無力病變部位。","D":"正確：重症肌無力病變在神經肌肉接合處。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-39":{"quick":"亨丁頓氏病錯誤敘述為C：通常在「中年（30-50歲）」發病而非兒童期，故選C。","detail":{"background":"亨丁頓氏病（Huntington disease）：A「是一種舞蹈症（chorea，不自主舞蹈樣動作）」（正確）；B「體染色體顯性遺傳（HTT基因CAG重複擴增）」（正確）；C「通常在兒童期發病」錯——通常在「中年（30-50歲）」發病（少數青少年型）；D「與大腦尾核及殼腦（紋狀體）退化有關」（正確，GABA神經元喪失）。故錯誤為C（應為中年發病）。","options":{"A":"是舞蹈症，正確。","B":"體染色體顯性遺傳，正確。","C":"正確（為錯誤敘述）：亨丁頓氏病通常中年發病，非兒童期。","D":"與尾核及殼腦退化相關，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"109110-N1-48":{"quick":"惡性軟組織腫瘤是胚胎型橫紋肌肉瘤，故選C。","detail":{"background":"惡性軟組織腫瘤（肉瘤sarcoma）：「胚胎型橫紋肌肉瘤（embryonal rhabdomyosarcoma）」是兒童最常見的軟組織肉瘤（往骨骼肌方向分化的惡性腫瘤）（C）。而纖維瘤（fibroma，A）、脂肪瘤（lipoma，B）是良性、不典型平滑肌瘤（atypical leiomyoma，D）是良性/低惡性度。故惡性者為胚胎型橫紋肌肉瘤（C）。","options":{"A":"纖維瘤是良性。","B":"脂肪瘤是良性。","C":"正確：胚胎型橫紋肌肉瘤是惡性軟組織腫瘤。","D":"不典型平滑肌瘤是良性/低惡性度。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-40":{"quick":"與骨質疏鬆「較無關」的徵候是發燒，故選A。","detail":{"background":"骨質疏鬆症（osteoporosis）是骨量減少、骨微結構退化、骨脆性增加，常見徵候：疼痛（B，尤其骨折後背痛）、脆弱性骨折（C，脊椎壓迫性骨折、髖部、腕部）、身高變矮與「脊柱後凸/側彎（D，脊椎壓迫變形）」。而「發燒（A）」不是骨質疏鬆的徵候（骨質疏鬆是代謝性骨病，無發炎發燒）。故較無關者為A。","options":{"A":"正確：發燒與骨質疏鬆較無關。","B":"疼痛（骨折後）是骨質疏鬆徵候。","C":"骨折是骨質疏鬆徵候。","D":"脊柱變形（後凸/側彎）是骨質疏鬆徵候。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-44":{"quick":"威爾森氏病錯誤敘述為A：是體染色體「隱性」遺傳（非顯性），故選A。","detail":{"background":"威爾森氏病（Wilson disease，肝豆狀核變性）：A「體染色體顯性遺傳」錯——是「體染色體『隱性』遺傳（ATP7B基因突變）」；B「銅離子無法正常代謝排泄，沉積於肝、腦（基底核）等器官」（正確）；C「角膜周圍可見棕綠色環（Kayser-Fleischer ring）」（正確）；D「可能有神經（運動障礙）及精神症狀」（正確）。故錯誤為A（應為隱性遺傳）。治療用銅螯合劑（penicillamine）。","options":{"A":"正確（為錯誤敘述）：威爾森氏病是體染色體隱性遺傳，非顯性。","B":"銅沉積於肝腦，正確。","C":"角膜K-F環，正確。","D":"有神經及精神症狀，正確。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110030-N1-48":{"quick":"骨折癒合順序是血塊→軟骨痂→骨性骨痂→層狀硬骨，故選A。","detail":{"background":"正常骨折癒合的順序：①「有機化血塊（organizing hematoma，骨折血腫機化）」→②「軟性骨痂（soft callus，纖維軟骨性骨痂）」→③「骨性（硬）骨痂（bony/hard callus，編織骨woven bone）」→④「重塑為層狀硬骨（lamellar bone remodeling）」。題目A選項符合此「血塊→軟骨痂→…」的正確起始順序。故選A。","options":{"A":"正確：血塊→軟性骨痂→骨性骨痂→層狀硬骨。","B":"順序跳過軟性骨痂，錯。","C":"順序有誤。","D":"順序跳過骨痂階段，錯。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-43":{"quick":"5歲兒童小腦中線快速生長腫瘤，是髓芽母細胞瘤，故選A。","detail":{"background":"5歲兒童「小腦（中線蚓部）」生長迅速的惡性腫瘤，造成腦壓增加（嘔吐、頭痛）與步態不穩（小腦症狀）——是「髓芽母細胞瘤（medulloblastoma）」，兒童最常見的惡性腦瘤之一（胚胎性小圓藍細胞瘤、Homer-Wright玫瑰花、可隨腦脊髓液散播）。故選A。室管膜瘤（第四腦室）、星狀細胞瘤（小腦毛狀星細胞瘤較良性）、寡突膠細胞瘤（成人大腦）較不符。故選A。","options":{"A":"正確：兒童小腦中線快速生長腫瘤是髓芽母細胞瘤。","B":"室管膜瘤好發第四腦室。","C":"小腦毛狀星細胞瘤較良性、生長慢。","D":"寡突膠細胞瘤好發成人大腦。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"110110-N1-48":{"quick":"好發年輕男性薦腸關節、HLA-B27陽性的是僵直性脊椎炎，故選A。","detail":{"background":"「僵直性脊椎炎（ankylosing spondylitis，黏連性脊椎關節炎）」好發「年輕男性」，侵犯「薦腸（骶髂）關節與脊椎中軸關節」，造成下背痛、晨僵、脊椎漸進融合（竹節狀脊椎bamboo spine），「HLA-B27陽性率高」。故選A。類風濕（對稱手部小關節）、退化性（負重大關節）、痛風（大腳趾）不符。故選A。","options":{"A":"正確：僵直性脊椎炎（年輕男性、薦腸關節、HLA-B27陽性）。","B":"類風濕關節炎侵犯對稱手部小關節。","C":"退化性關節炎好發負重大關節。","D":"痛風好發大腳趾。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-41":{"quick":"小於5歲兒童小腦最常見的腦瘤是髓母細胞瘤，故選C。","detail":{"background":"「髓母（芽）細胞瘤（medulloblastoma）」是「小於5歲兒童的小腦」最常見的惡性腦瘤——胚胎性小圓藍細胞腫瘤，好發小腦中線蚓部，造成腦壓增加與小腦症狀，可隨腦脊髓液散播。故選C。寡突膠細胞瘤（成人大腦）、室管膜瘤（第四腦室）、腦膜瘤（成人）非兒童小腦最常見。故選C。","options":{"A":"寡突膠細胞瘤好發成人大腦。","B":"室管膜瘤好發第四腦室。","C":"正確：髓母細胞瘤是兒童小腦最常見腦瘤。","D":"腦膜瘤好發成人。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111030-N1-48":{"quick":"病理性骨折是「潛在疾病（如轉移性腫瘤）造成的骨折」，故選D。","detail":{"background":"病理性骨折（pathological fracture）是指「骨骼本身有潛在病變（使骨質弱化），在『輕微外力或無明顯外傷』下即發生骨折」——常見潛在病變如轉移性腫瘤、惡性腫瘤、多發性骨髓瘤、骨質疏鬆、骨囊腫、骨感染等（D正確）。對比：A是「單純（外傷性）骨折」（無潛在病變）；B、C是「壓力性（疲勞性）骨折」（反覆活動造成，如行軍骨折）。故病理性骨折為D。","options":{"A":"單純外傷骨折、無潛在病變，非病理性骨折。","B":"反覆活動致壓力性骨折，非病理性。","C":"行軍致壓力性（疲勞性）骨折，非病理性。","D":"正確：潛在疾病（轉移性腫瘤等）造成的骨折是病理性骨折。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-21":{"quick":"不屬於風濕熱瓊斯標準主要標準的是「白血球增多」，故選C。","detail":{"background":"急性風濕熱的瓊斯氏標準（Jones criteria）「主要標準（major）」記憶「JONES」：J關節炎（多關節炎polyarthritis，D）、O心臟（心臟炎carditis，A，♥圖示）、N皮下結節（subcutaneous nodules）、E邊緣性紅斑（erythema marginatum，B）、S舞蹈症（Sydenham chorea）。而「白血球增多（leukocytosis，C）」屬「次要標準（minor）」（與發燒、關節痛、ESR/CRP升高、PR間期延長同列），非主要標準。故不屬於主要標準者為C。","options":{"A":"心臟炎是主要標準。","B":"邊緣性紅斑是主要標準。","C":"正確：白血球增多是次要標準，非主要標準。","D":"多關節炎是主要標準。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-22":{"quick":"重症肌無力是「肌肉運動減少，神經傳導正常」，故選B。","detail":{"background":"重症肌無力（myasthenia gravis）的病變在「神經肌肉接合處的乙醯膽鹼受體」（自體抗體破壞），故「神經本身傳導正常」，但訊號無法有效傳給肌肉，造成「肌肉運動（收縮）減少、易疲勞」。故為「肌肉運動減少、神經傳導正常」（B）。重複神經刺激檢查可見肌肉反應遞減（decremental response）。故選B。","options":{"A":"神經傳導正常（非減少）。","B":"正確：重症肌無力是肌肉運動減少、神經傳導正常。","C":"肌肉運動減少（非正常）。","D":"肌肉運動減少（非正常）。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"111110-N1-30":{"quick":"庫賈氏病（CJD）由Prion蛋白變異引起，故選D。","detail":{"background":"庫賈氏病（Creutzfeldt-Jakob disease, CJD）造成大腦皮質與深部灰質「海綿狀變性（spongiform change）」——由「普利子蛋白（prion）變異（錯誤摺疊）」引起的傳播性海綿狀腦病，臨床快速進行性失智、肌陣攣，預後極差。故CJD由prion引起（D）。非病毒、細菌、原蟲感染。故選D。","options":{"A":"非病毒感染。","B":"非細菌感染。","C":"非原蟲感染。","D":"正確：庫賈氏病由Prion蛋白變異引起。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112030-N1-24":{"quick":"與發炎關係最少的關節炎是骨關節炎（osteoarthritis），故選D。","detail":{"background":"骨關節炎（osteoarthritis, OA，退化性關節炎）是「關節軟骨的『退化磨損』」為主的「非發炎性（或低度發炎）」關節病——好發負重關節（膝、髖）與遠端指間關節（Heberden結節），與年齡、肥胖、過度使用相關。相對地，類風濕性關節炎（A，自體免疫滑膜炎）、化膿性關節炎（B，細菌感染）、結核性關節炎（C，結核感染）皆是「發炎性」關節炎。故與發炎關係最少者為骨關節炎（D）。","options":{"A":"類風濕性關節炎是發炎性（自體免疫）。","B":"化膿性關節炎是感染性發炎。","C":"結核性關節炎是感染性發炎。","D":"正確：骨關節炎是退化性，與發炎關係最少。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112110-N1-30":{"quick":"帕金森氏症錯誤敘述為D：長期出現的是Lewy體而非amyloid neuritic plaque，故選D。","detail":{"background":"帕金森氏症（Parkinson disease）：A「造成減慢性（hypokinetic）動作失調（動作遲緩）」（正確）；B「黑質產生多巴胺的神經元退化」（正確）；C「殘存神經元可發現Lewy bodies（α-突觸核蛋白聚集）」（正確）；D「長期出現含amyloid的neuritic plaques」錯——含β類澱粉的「neuritic plaque（老年斑塊）」是「阿茲海默症」的特徵，帕金森氏症的特徵是「Lewy體」非amyloid plaque。故錯誤為D。","options":{"A":"造成動作遲緩（hypokinetic），正確。","B":"黑質多巴胺神經元退化，正確。","C":"殘存神經元有Lewy體，正確。","D":"正確（為錯誤敘述）：amyloid neuritic plaque是阿茲海默特徵，非帕金森。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"112180-N1-23":{"quick":"最常發生非化膿性增殖性滑膜炎的是類風濕性關節炎，故選A。","detail":{"background":"「非化膿性增殖性滑膜炎（proliferative synovitis）」是「類風濕性關節炎（rheumatoid arthritis, RA）」的特徵病理——自體免疫使「滑膜（synovium）慢性增生發炎（非化膿性、無細菌）」，形成血管翳（pannus）侵蝕關節軟骨與骨。故選A。骨關節炎是軟骨退化（非增殖性滑膜炎）、脫臼是機械損傷、骨質疏鬆是骨量減少，皆非滑膜增生炎。故選A。","options":{"A":"正確：類風濕性關節炎是非化膿性增殖性滑膜炎。","B":"骨關節炎是軟骨退化，非增殖性滑膜炎。","C":"脫臼是機械性損傷。","D":"骨質疏鬆是骨量減少。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-29":{"quick":"進行性多灶性白質腦病（PML）由JC病毒引起，故選D。","detail":{"background":"進行性多灶性白質腦病（progressive multifocal leukoencephalopathy, PML）由「JC病毒（JC virus，一種多瘤病毒polyomavirus）」引起——好發於「免疫嚴重低下者（AIDS、免疫抑制劑如natalizumab使用者）」，JC病毒感染並破壞「寡突膠細胞」造成中樞神經多灶性脫髓鞘，臨床進行性神經功能缺損、預後差。故PML由JC病毒引起（D）。HSV-1（腦炎）、VZV（帶狀疱疹）、EBV（淋巴瘤）非PML病因。故選D。","options":{"A":"HSV-1致單純疱疹腦炎，非PML。","B":"VZV致帶狀疱疹。","C":"EBV與淋巴瘤相關。","D":"正確：PML由JC病毒引起。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113030-N1-30":{"quick":"軟骨發育不全由FGFR3（纖維母細胞生長因子受體3）基因突變造成，故選A。","detail":{"background":"軟骨發育不全症（achondroplasia）是「纖維母細胞生長因子受體3（fibroblast growth factor receptor 3, FGFR3）」基因突變（體染色體顯性）——FGFR3突變使其過度活化、「抑制」軟骨生長板的軟骨細胞增生，造成軟骨內骨化障礙，導致四肢短小的不成比例侏儒症。故選A。Fibrillin-1（馬凡氏症）、NF-1（神經纖維瘤）、TCIRG1（骨硬化症）是其他基因。故選A。","options":{"A":"正確：軟骨發育不全由FGFR3基因突變造成。","B":"Fibrillin-1突變是馬凡氏症。","C":"NF-1突變是神經纖維瘤病。","D":"TCIRG1突變是骨硬化症。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-27":{"quick":"由巴雷特氏食道惡性化的食道癌最常見腺癌，故選A。","detail":{"background":"巴瑞特食道（Barrett esophagus，腸化生）惡性化產生的食道癌最常見是「腺癌（adenocarcinoma）」——因Barrett食道是「柱狀（腺體）上皮化生」，異生後形成腺癌，好發食道下段、與胃食道逆流相關。故Barrett食道惡性化為腺癌（A）。食道「鱗狀細胞癌」則與抽菸喝酒相關（好發中上段）、非源自Barrett。故選A。","options":{"A":"正確：Barrett食道惡性化最常見腺癌。","B":"惡性黑色素瘤少見於食道。","C":"鱗狀細胞癌與抽菸喝酒相關，非源自Barrett。","D":"基底細胞癌見於皮膚，非食道。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"113100-N1-30":{"quick":"自發性蛛網膜下腔出血最常因「動脈瘤破裂」，故選A。","detail":{"background":"「自發性（非外傷性）蛛網膜下腔出血（spontaneous subarachnoid hemorrhage, SAH）」最常因「腦動脈瘤（漿果型berry aneurysm，好發威利氏環）破裂」——突發「霹靂性頭痛（雷擊頭痛thunderclap headache，此生最痛）」、頸僵硬、意識改變，死亡率高。故SAH最常因動脈瘤破裂（A）。CMV感染、中腦膜動脈破裂（硬腦膜外血腫）、中腦動脈阻塞（缺血性中風）非SAH主因。故選A。","options":{"A":"正確：自發性蛛網膜下腔出血最常因動脈瘤破裂。","B":"CMV感染與SAH無關。","C":"中腦膜動脈破裂致硬腦膜外血腫，非SAH。","D":"中腦動脈阻塞致缺血性中風，非出血。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114030-N1-30":{"quick":"庫賈氏病最典型病理是大腦海綿狀轉化，故選D。","detail":{"background":"庫賈氏病（Creutzfeldt-Jakob disease, CJD）最典型的病理變化是「大腦（皮質與深部灰質）的『海綿狀轉化（spongiform change）』」——神經氈出現大量空泡使腦組織呈海綿狀，伴神經元喪失與星形膠細胞增生，由prion蛋白變異引起。故CJD最典型病理為大腦海綿狀轉化（D）。脫髓鞘斑塊（多發性硬化）、腦膿瘍（細菌）、中腦黑質退化（帕金森）非CJD典型。故選D。","options":{"A":"脫髓鞘斑塊見於多發性硬化症。","B":"腦膿瘍是細菌感染。","C":"中腦黑質退化是帕金森氏病。","D":"正確：庫賈氏病最典型是大腦海綿狀轉化。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114100-N1-29":{"quick":"小腦天幕疝脫顳葉內側緣被擠壓，「腦萎縮」不會發生，故選B。","detail":{"background":"小腦天幕（鉤回）疝脫（transtentorial/uncal herniation）：顱內壓升高使顳葉內側（鉤回）越過小腦天幕緣下疝，擠壓鄰近構造：①壓迫「動眼神經（CN III）」→「同側瞳孔放大（C，固定散瞳）」；②壓迫「大腦後動脈」→「枕葉視覺皮質缺血（D）」；③腦壓上升（A）為前因。而「腦萎縮（B）」是慢性退化過程，「不會」是急性疝脫擠壓的即時後果。故不會發生者為B。","options":{"A":"腦壓上升是疝脫前因，會發生。","B":"正確（為不會發生）：腦萎縮是慢性退化，非急性疝脫後果。","C":"壓迫動眼神經致瞳孔放大，會發生。","D":"壓迫大腦後動脈致視覺皮質缺血，會發生。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114100-N1-30":{"quick":"痛風臨床正確敘述為D：可能造成腎臟病變併發症，故選D。","detail":{"background":"痛風（gout）：A「好發於生育年齡女性」錯——好發「中年男性與停經後女性」（雌激素有促尿酸排泄保護作用，故生育年齡女性少）；B「高尿酸血症的人大部分都會痛風」錯——高尿酸血症者「多數『不會』發作痛風」（只有部分會）；C「好發於肢體近端大關節」錯——痛風好發「肢體『遠端』小關節，尤其第一蹠趾關節（大腳趾）」；D「可能造成腎臟病變併發症（尿酸鹽腎病、尿酸結石）」正確。故正確為D。","options":{"A":"痛風好發中年男性，非生育年齡女性。","B":"高尿酸血症多數不會發作痛風。","C":"痛風好發遠端小關節（大腳趾），非近端大關節。","D":"正確：痛風可造成腎臟病變併發症。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}},"114170-N1-30":{"quick":"因FGFR3基因突變造成的侏儒症是軟骨發育不全，故選A。","detail":{"background":"「軟骨發育不全症（achondroplasia）」是「纖維母細胞生長因子受體3（FGFR3）」基因突變（體染色體顯性）造成——FGFR3過度活化抑制軟骨生長板增生，致軟骨內骨化障礙、四肢短小的不成比例侏儒症（智力生殖力正常）。故FGFR3突變致侏儒症者為軟骨發育不全（A）。纖維性發育不良（GNAS）、佝僂病（維生素D缺乏）、成骨不全（膠原）機轉不同。故選A。","options":{"A":"正確：軟骨發育不全由FGFR3基因突變造成。","B":"纖維性發育不良與GNAS基因相關。","C":"佝僂病是維生素D缺乏。","D":"成骨不全是膠原蛋白合成異常。"},"sources":["Robbins & Cotran Pathologic Basis of Disease 10e","實用病理學","Kumar 病理學"]}}},TO=["B1細胞損傷適應壞死凋亡", "B2發炎與修復", "B3血液動力學障礙血栓栓塞與休克", "B4腫瘤學總論", "B5免疫病理過敏與自體免疫", "B6遺傳先天與環境營養病理", "B7感染性疾病病理", "B8心血管系統病理", "B9呼吸系統病理", "B10消化肝膽胰系統病理", "B11泌尿腎臟病理", "B12生殖與乳房病理", "B13內分泌病理", "B14血液淋巴病理", "B15神經肌肉骨骼皮膚病理"],LEC={"B1細胞損傷適應壞死凋亡":{"title":"B1 細胞損傷、適應、壞死與凋亡 複習講義","html":"<h3>一、細胞適應</h3>\n<p>細胞面對刺激的可逆適應：<b>增生(hyperplasia,數目增)、肥大(hypertrophy,變大)、萎縮(atrophy,變小)、化生(metaplasia,一種成熟細胞被另一種取代,如Barrett食道鱗狀→柱狀)</b>。化生持續刺激可進展為異生(dysplasia,癌前變化)。</p>\n<h3>二、可逆 vs 不可逆損傷</h3>\n<p><b>可逆</b>：細胞腫脹(最早,ATP↓鈉幫浦失能)、脂肪變性(肝最常見)、膜泡狀凸出、粒線體腫脹、內質網擴張。<b>不可逆(死亡)的核變化三部曲</b>：核濃縮(pyknosis,最早)→核崩裂(karyorrhexis)→核溶解(karyolysis),及膜嚴重破壞。</p>\n<h3>三、壞死 vs 凋亡</h3>\n<p><b>壞死(necrosis)</b>：被動、引起發炎、膜破裂內容外漏。型態：凝固性(心腎)、液化性(腦)、乾酪性(結核)、脂肪性(胰)、纖維蛋白樣(血管炎)。<b>凋亡(apoptosis)</b>：程序性、不引起發炎、細胞皺縮、凋亡小體被吞噬;粒線體釋細胞色素c啟動(內在路徑);見於月經內膜崩離(生理)、病毒性肝炎(病理)。</p>\n<h3>四、細胞內沉積與鈣化</h3>\n<p>色素：<b>脂褐質(lipofuscin,老化萎縮磨損色素)、血鐵質(hemosiderin,鐵,普魯士藍染藍)、黑色素、膽紅素</b>。類澱粉(amyloid)=細胞外異常蛋白β褶板,剛果紅染色+偏光蘋果綠。鈣化:<b>營養不良性(壞死組織,血鈣正常)vs轉移性(高血鈣,正常組織)</b>。</p>"},"B2發炎與修復":{"title":"B2 發炎與組織修復 複習講義","html":"<h3>一、急性發炎</h3>\n<p>主角=<b>嗜中性白血球(neutrophil)</b>。化學媒介:組織胺(血管擴張通透性↑)、<b>緩激肽bradykinin(疼痛)</b>、前列腺素、白三烯素、補體。滲出液(exudate,富蛋白細胞)vs漏出液(transudate,蛋白少)。</p>\n<h3>二、白血球外滲(extravasation)</h3>\n<p>步驟:<b>著邊(margination,最先)→滾動(selectin)→黏著(integrin/ICAM)→穿越內皮(transmigration)→趨化移行</b>。吞噬(phagocytosis)發生於到達組織「之後」,不屬外滲步驟。</p>\n<h3>三、慢性發炎與肉芽腫</h3>\n<p>慢性發炎細胞=<b>巨噬細胞、淋巴球、漿細胞</b>(嗜中性球最少)。肉芽腫性發炎:結核(乾酪性)、痲瘋、梅毒、類肉瘤病、黴菌、克隆氏病。</p>\n<h3>四、修復與傷口癒合</h3>\n<p>肉芽組織=<b>微血管新生+纖維母細胞+膠原</b>。延緩癒合因子:感染(最常見)、<b>類固醇</b>、糖尿病、營養不良(維生素C缺乏致膠原交聯不良)、缺氧。潰瘍=表面壞死;膿瘍=局限化膿腔;蟹足腫=膠原過度增生。</p>"},"B3血液動力學障礙血栓栓塞與休克":{"title":"B3 血液動力學障礙、血栓、栓塞與休克 複習講義","html":"<h3>一、充血、水腫</h3>\n<p>主動充血(hyperemia,小動脈擴張,鮮紅)vs被動充血(congestion,靜脈流出受阻,藍紫)。肝鬱血(右心衰)→荳蔻肝;肺鬱血(左心衰)→心臟衰竭細胞(含鐵血黃素巨噬細胞)。水腫機制:靜水壓↑、膠體滲透壓↓(低白蛋白)、淋巴阻塞、通透性↑。</p>\n<h3>二、血栓(Virchow三要素)</h3>\n<p><b>①內皮損傷②血流異常(鬱滯/紊亂)③高凝血狀態</b>。下肢深部靜脈血栓(DVT)→肺栓塞(卡肺動脈);左心/動脈栓子→全身性栓塞(腦腎脾腸)。</p>\n<h3>三、栓塞</h3>\n<p>血栓栓塞(最常見)、脂肪栓塞(長骨骨折,呼吸+神經+瘀點)、氣體栓塞(潛水減壓)、羊水栓塞(產科,DIC)。</p>\n<h3>四、梗塞與休克</h3>\n<p>紅色(出血性)梗塞:疏鬆/雙重血供/靜脈阻塞/再灌注(肺、腸、卵巢扭轉);白色梗塞:緻密單一動脈(心、腎、脾)。休克型:<b>低血容、心因性、敗血性、過敏性、神經性</b>;休克對缺氧最敏感器官=腦心腎(肌肉最耐)。</p>"},"B4腫瘤學總論":{"title":"B4 腫瘤學總論 複習講義","html":"<h3>一、良性 vs 惡性</h3>\n<p>最重要鑑別=<b>轉移(metastasis,惡性絕對標誌)</b>。良性:有包膜、分化好、生長慢、不侵犯不轉移。惡性:多型性、核深染、核質比↑、異常分裂、侵犯轉移。</p>\n<h3>二、分化、分級、分期</h3>\n<p><b>分化(differentiation)</b>=與正常組織相似度。<b>分級(grading)</b>=依分化程度。<b>分期(staging)=TNM(T腫瘤、N淋巴結、M遠端轉移)</b>,比分級「更重要」(反映擴散範圍、決定預後治療)。</p>\n<h3>三、癌變過程</h3>\n<p>第一步=<b>不可修復的突變</b>。癌前變化=<b>異生(dysplasia)</b>;原位癌=未穿破基底膜;侵襲癌=穿破基底膜。二次打擊(two-hit)原型=視網膜芽細胞瘤(RB)。轉移路徑:淋巴(癌)、血路(肉瘤)、體腔播種(無「接觸轉移」)。</p>\n<h3>四、命名</h3>\n<p>良性多「-oma」;惡性上皮=癌(carcinoma)、間質=肉瘤(sarcoma)。例外:白血病、淋巴瘤、黑色素瘤、精原細胞瘤皆「惡性」。畸胎瘤=三胚層(生殖細胞)。</p>"},"B5免疫病理過敏與自體免疫":{"title":"B5 免疫病理、過敏與自體免疫 複習講義","html":"<h3>一、四型過敏反應</h3>\n<p><b>第一型(IgE/即發型)</b>:IgE使肥大細胞去顆粒釋組織胺(蕁麻疹、氣喘、過敏性休克);關鍵=IgE、肥大細胞、嗜酸性球、TH2。<b>第二型(抗體媒介細胞毒性)</b>:抗體攻擊細胞表面(溶血、ITP、重症肌無力、惡性貧血、SLE血球低下)。<b>第三型(免疫複合體)</b>:沉積致發炎(SLE腎炎、血清病、鏈球菌後腎炎)。<b>第四型(T細胞媒介遲發型)</b>:結核菌素、接觸性皮膚炎、移植排斥、第一型糖尿病、GVHD。</p>\n<h3>二、自體免疫病</h3>\n<p>SLE(多系統、抗dsDNA)、類風濕關節炎、Sjögren(乾燥症,唾液腺淋巴球浸潤)、硬皮病(纖維化)、橋本甲狀腺炎。</p>\n<h3>三、免疫缺乏</h3>\n<p>原發:Bruton病(X性聯,pre-B不分化)、DiGeorge(胸腺發育不良,T缺乏)、SCID(ADA)、慢性肉芽腫病(NADPH氧化酶缺陷)、Wiskott-Aldrich。後天:<b>AIDS(HIV破壞CD4 T細胞,經gp120-CD4結合)</b>;伺機感染與Kaposi肉瘤。</p>"},"B6遺傳先天與環境營養病理":{"title":"B6 遺傳、先天與環境營養病理 複習講義","html":"<h3>一、染色體與遺傳</h3>\n<p>體染色體三體:唐氏(21,與母年齡相關)、愛德華(18)、帕陀(13)。性染色體:Turner(45,X)、Klinefelter(47,XXY)。染色體結構:轉位t、脫失del、倒置inv。<b>粒線體基因突變=母系遺傳</b>。X性聯:血友病、G6PD、DMD、Bruton。</p>\n<h3>二、重金屬中毒</h3>\n<p><b>鎘→痛痛病(骨軟化);砷→烏腳病(西南沿海,肢端壞疽+皮膚癌);汞→水俁病;鉛→貧血、兒童智能障礙、周邊神經病變、腹絞痛。</b></p>\n<h3>三、維生素缺乏</h3>\n<p>維生素D→佝僂病(兒童)/軟骨症(成人);維生素C→壞血病(膠原合成);維生素B1(thiamine,酗酒)→Wernicke-Korsakoff;B12→惡性貧血;K→出血。</p>\n<h3>四、環境與營養</h3>\n<p>放射線傷害DNA,快速分裂細胞最敏感(骨髓、腸黏膜、生殖、淋巴);肌肉神經最耐受。潛水→氣體栓塞。Kwashiorkor(蛋白質缺乏,水腫)vs Marasmus(總熱量缺乏,消瘦)。PM2.5顆粒越小傷害越強。</p>"},"B7感染性疾病病理":{"title":"B7 感染性疾病病理 複習講義","html":"<h3>一、發炎型態與病原</h3>\n<p>化膿性(金黃葡萄球菌)、肉芽腫性(結核乾酪性、梅毒gumma)、病毒性(水泡、包涵體)。內毒素(endotoxin/LPS,革蘭氏陰性菌細胞壁,死菌釋出,致發燒/ARDS/敗血性休克)vs外毒素(分泌的蛋白毒素:白喉、霍亂、破傷風)。</p>\n<h3>二、病毒感染</h3>\n<p>EB病毒(感染B細胞,單核球增多症,非典型淋巴球=活化T細胞;鼻咽癌、Burkitt)。水痘-帶狀疱疹(潛伏背根神經節,再活化=帶狀疱疹)。HSV(Cowdry A型核內包涵體,可經產道感染新生兒)。流感(RNA,抗原移型致大流行)。</p>\n<h3>三、特殊感染</h3>\n<p>梅毒(螺旋體,三期:硬性下疳→全身疹→橡皮腫/心血管神經;漿細胞浸潤+閉塞性血管內膜炎)。結核(乾酪性肉芽腫、岡氏複合體=原發性)。病原大小:原蟲>黴菌>細菌>病毒><b>prion(最小,無核酸)</b>。</p>\n<h3>四、病毒趨向性</h3>\n<p>取決於宿主細胞受體蛋白、胞內轉錄因子、物理屏障(溫度pH);與細胞膜脂肪組成關係最小。</p>"},"B8心血管系統病理":{"title":"B8 心血管系統病理 複習講義","html":"<h3>一、動脈粥狀硬化與血管</h3>\n<p>粥狀斑塊核心=泡沫細胞(吞氧化LDL的巨噬細胞)。危險因子:高血脂、高血壓、抽菸、糖尿病。動脈瘤:腹主動脈(粥狀硬化最常見)、胸主動脈(梅毒)、漿果型(威利氏環,破裂致SAH)。血管炎:高安氏(主動脈分支、無脈症)、川崎(兒童冠狀動脈)、Buerger(年輕吸菸男、下肢)。</p>\n<h3>二、缺血性心臟病</h3>\n<p>心肌梗塞=冠狀動脈粥狀硬化血栓阻塞。病理時序:<b>0-4hr無變化→凝固性壞死→嗜中性球(1-3天)→巨噬細胞(3-7天)→肉芽組織→纖維化(2-8週)</b>。最常見併發症=心律不整。</p>\n<h3>三、心臟瓣膜與發炎</h3>\n<p>僧帽瓣脫垂(最常見瓣膜異常)。風濕熱→Aschoff小體、僧帽瓣狹窄。心肌炎最常見=病毒(柯薩奇B)。心臟原發腫瘤=左心房黏液瘤。</p>\n<h3>四、心衰竭與先天心</h3>\n<p>左心衰→肺水腫(靜水壓↑)、心臟衰竭細胞;右心衰→體循環鬱血、荳蔻肝。先天心:VSD最常見;法洛氏四重症(VSD+騎跨主動脈+肺動脈狹窄+右心肥大)=最常見發紺型。</p>"},"B9呼吸系統病理":{"title":"B9 呼吸系統病理 複習講義","html":"<h3>一、阻塞性肺病(COPD)</h3>\n<p>包括<b>肺氣腫(肺泡壁破壞,抽菸)與慢性支氣管炎(黏膜下腺體增生,連續兩年每年3個月咳痰)</b>。FEV1/FVC<0.7。氣喘:可逆性氣道阻塞、嗜酸性球、平滑肌肥大、基底膜增厚。支氣管擴張:不可逆擴張+細菌反覆感染。</p>\n<h3>二、肺炎</h3>\n<p>大葉性肺炎四期(充血→紅色肝變→灰色肝變→消解,巨噬細胞最多)。社區型典型=<b>肺炎鏈球菌</b>;非典型=黴漿菌(間質性,淋巴球浸潤);肺囊蟲(免疫低下,泡沫狀嗜酸性滲出);結核(岡氏複合體)。</p>\n<h3>三、肺癌</h3>\n<p>最常見=<b>腺癌(周邊,女性/不吸菸,EGFR標靶)</b>;鱗狀細胞癌(中央,吸菸,角化);小細胞癌(神經內分泌,副腫瘤症候群);大細胞癌。</p>\n<h3>四、肋膜與職業</h3>\n<p>間皮瘤(好發肋膜,與石棉最相關)。塵肺症(矽肺、煤工塵肺、石棉肺;微粒直接致纖維化非過敏)。氣胸(肺氣腫/氣喘/結核破裂)。肺栓塞(來自下肢深部靜脈,卡肺動脈)。</p>"},"B10消化肝膽胰系統病理":{"title":"B10 消化、肝膽胰系統病理 複習講義","html":"<h3>一、食道與胃</h3>\n<p><b>Barrett食道</b>=GERD致鱗狀上皮腸化生(杯狀細胞),增加食道腺癌。消化性潰瘍=幽門桿菌+NSAID。胃癌:腸型(幽門桿菌、硝酸鹽、老年)vs瀰漫型(印戒細胞、皮革胃、年輕)。壓力性潰瘍:Curling(燒傷)、Cushing(顱腦)。</p>\n<h3>二、腸道</h3>\n<p>克隆氏病(跳躍、全層、非乾酪肉芽腫、瘻管狹窄、迴腸末端)vs潰瘍性結腸炎(連續、黏膜層、大腸癌風險高)。偽膜性結腸炎=C.difficile。阿米巴=燒瓶狀潰瘍。大腸癌:腺瘤-癌序列(APC),最常轉移肝;FAP(APC顯性,>100息肉)。Hirschsprung(神經節缺失、近端巨結腸)、Meckel憩室(異位胃黏膜)。</p>\n<h3>三、肝</h3>\n<p>肝炎病毒:<b>B型=DNA、垂直傳染;C型=成人最易慢性化;A/E=經口不慢性化;D=依附B型</b>。脂肪肝(酗酒最常見)。酒精性肝炎=Mallory小體。肝硬化→門脈高壓(食道靜脈曲張、腹水[低白蛋白]、脾腫)、肝細胞癌。膽道閉鎖(嬰兒黃疸、陶土便,兒童肝移植首因)。</p>\n<h3>四、胰與膽</h3>\n<p>慢性胰臟炎=長期酗酒。GIST(胃最好發,c-KIT突變,Cajal細胞,imatinib)。非結合型膽紅素↑=溶血;結合型↑=膽道阻塞/肝細胞。</p>"},"B11泌尿腎臟病理":{"title":"B11 泌尿腎臟病理 複習講義","html":"<h3>一、腎絲球疾病</h3>\n<p><b>腎病症候群</b>(大量蛋白尿>3.5g、低白蛋白、水腫、高血脂):微小變化疾病(兒童最常見,足突融合,類固醇反應佳)、膜性腎病、FSGS。<b>腎炎症候群</b>(血尿、高血壓、氮血症):鏈球菌後腎炎(第三型免疫複合體、駝峰)、IgA腎病(Berger,年輕男、繫膜IgA)、新月形腎炎(crescent,RPGN:Goodpasture/SLE/ANCA)。狼瘡腎炎=免疫複合體。</p>\n<h3>二、腎小管間質與血管</h3>\n<p>急性腎小管壞死(ATN,休克缺血/腎毒素,腎絲球正常)。止痛劑腎病(腎小管間質+腎乳頭壞死)。良性腎硬化=高血壓。急性腎盂腎炎=細菌上行感染。</p>\n<h3>三、囊性與腫瘤</h3>\n<p>成人多囊腎(ADPKD,顯性,PKD1);嬰兒多囊腎(ARPKD,隱性)。腎細胞癌(成人,透亮細胞型,VHL);Wilms瘤(兒童<5歲,腹部腫塊,WT1/WAGR);膀胱癌(泌尿/移形上皮癌,抽菸/芳香胺)。</p>\n<h3>四、結石與阻塞</h3>\n<p>結石最常見=<b>草酸鈣(鈣性)</b>;磷酸銨鎂(感染/鹿角);尿酸(痛風);胱胺酸(遺傳)。水腎(阻塞,早期解除可逆)。不完全阻塞→多尿。</p>"},"B12生殖與乳房病理":{"title":"B12 生殖系統與乳房病理 複習講義","html":"<h3>一、女性生殖</h3>\n<p>子宮頸癌(HPV16/18,鱗狀細胞癌最常見)。子宮內膜癌(雌激素相關:肥胖/糖尿病/高血壓/未產)。子宮內膜異位症→卵巢巧克力囊腫;子宮腺肌症=肌層內子宮內膜。子宮外孕(輸卵管最常見)。PCOS(胰島素阻抗+高雄性素,月經稀少多毛肥胖)。子癇前症(高血壓+蛋白尿+水腫;抽搐=子癇症)。</p>\n<h3>二、卵巢腫瘤</h3>\n<p>表面上皮腫瘤最常見(漿液性);成熟畸胎瘤(年輕女最常見良性,毛髮皮脂);卵黃囊瘤(AFP);絨毛膜癌(hCG);Krukenberg(胃癌轉移,印戒,雙側)。妊娠滋養層疾病(葡萄胎,hCG;完全型轉絨毛膜癌風險較高)。</p>\n<h3>三、男性生殖</h3>\n<p>BPH(中央/移形區,排尿症狀)vs前列腺癌(周邊區,肛診,生骨性骨轉移,PSA)。睪丸腫瘤:精原細胞瘤(成人);卵黃囊瘤(幼兒,AFP);絨毛膜癌(hCG);i(12p)。隱睪增加睪丸癌風險。陰莖癌/波恩氏病=HPV、原位癌。</p>\n<h3>四、乳房</h3>\n<p>纖維腺瘤(年輕女最常見良性,可移動)。乳癌:多為散發(BRCA僅少數);雌激素相關;乳頭Paget disease(DCIS蔓延);橘皮現象=發炎性乳癌(真皮淋巴管阻塞);三陰性(ER/PR/HER2陰性,預後差)。BRCA1/2=家族性乳卵巢癌症候群。</p>"},"B13內分泌病理":{"title":"B13 內分泌病理 複習講義","html":"<h3>一、甲狀腺</h3>\n<p>橋本甲狀腺炎(自體免疫,淋巴球浸潤,甲狀腺低下最常見原因)vs Graves(亢進)。甲狀腺癌:<b>乳突狀癌(最常見、預後最佳、毛玻璃核/核溝/沙瘤體、放射線相關、淋巴轉移、BRAF);濾泡癌(血路轉移);髓質癌(C細胞、降鈣素、類澱粉、MEN2/RET);未分化癌(預後最差、TP53)</b>。TSH是篩檢甲狀腺功能最敏感指標。</p>\n<h3>二、腎上腺</h3>\n<p>皮質醇過多=庫欣症候群(垂體ACTH瘤=庫辛氏病,ACTH↑雙側增生)。醛固酮過多=Conn症候群(高血壓低血鉀)。腎上腺功能不足=愛迪生氏症(ACTH↑、色素沉著)。髓質=嗜鉻細胞瘤(兒茶酚胺)。</p>\n<h3>三、糖尿病</h3>\n<p>第一型(自體免疫破壞β細胞、胰島炎、酮酸血症、兒童青少年)vs第二型(胰島素阻抗、肥胖、多基因遺傳、胰島澱粉沉積)。併發症:結節狀腎小球硬化(Kimmelstiel-Wilson)。胰島素瘤(低血糖)、升糖素瘤、胃泌素瘤。</p>\n<h3>四、腦下垂體與骨代謝</h3>\n<p>前葉:巨人症/肢端肥大(GH)、高泌乳素血症。後葉:尿崩症(ADH不足)、SIADH(ADH過多)。停經骨鬆=雌激素↓。成骨不全(膠原)、軟骨發育不全(FGFR3)、骨頭Paget病(顱骨增厚需換帽)。</p>"},"B14血液淋巴病理":{"title":"B14 血液淋巴病理 複習講義","html":"<h3>一、貧血</h3>\n<p><b>小球性低色素</b>:缺鐵性(ferritin低、transferrin飽和度低)、地中海型(Hb Barts=α型)。<b>巨球性</b>:B12缺乏(惡性貧血,內在因子缺乏,全胃切除後)、葉酸缺乏。<b>溶血性</b>:G6PD缺乏(Heinz小體、咬痕細胞、蠶豆症)、遺傳性球狀紅血球症。胎兒紅血球母細胞症=母胎血型(Rh)不合。</p>\n<h3>二、白血病</h3>\n<p>急性淋巴母細胞白血病(ALL,兒童最常見,B型為主,TdT+);急性骨髓性(AML);慢性骨髓性(CML,費城染色體t(9;22)BCR-ABL,imatinib);慢性淋巴(CLL,老年)。</p>\n<h3>三、淋巴瘤</h3>\n<p><b>何杰金氏淋巴瘤=Reed-Sternberg細胞(貓頭鷹眼)</b>。非何杰金:瀰漫大B(最常見惡性淋巴瘤)、濾泡性(t(14;18)BCL-2)、Burkitt(MYC、星空)、MALT(B細胞,幽門桿菌,可除菌)、蕈樣肉芽腫(皮膚T細胞)。多發性骨髓瘤(漿細胞,輕鏈AL型類澱粉)。</p>\n<h3>四、止血凝血</h3>\n<p>Virchow三要素;止血:內皮素血管收縮→血小板黏附(vWF/GpIb結合膠原)→凝血瀑布(纖維蛋白)。出血病:von Willebrand病(最常見遺傳)、血友病(VIII/IX,X性聯)、維生素K缺乏、肝硬化。血小板低下:骨髓巨核細胞減少(再生不良性貧血)vs周邊破壞(ITP/TTP/HUS)。</p>"},"B15神經肌肉骨骼皮膚病理":{"title":"B15 神經、肌肉、骨骼、皮膚病理 複習講義","html":"<h3>一、神經退化性疾病</h3>\n<p><b>阿茲海默症</b>:皮質萎縮+老年斑塊(β類澱粉)+神經纖維糾結(tau)。<b>帕金森氏症</b>:黑質多巴胺神經元退化+Lewy體,動作遲緩。<b>亨丁頓舞蹈症</b>:尾核殼核退化,顯性CAG擴增,中年發病。<b>ALS</b>:上下運動神經元(脊髓前角)退化。<b>庫賈病(prion)</b>:海綿狀變性。腦缺血=液化壞死(囊狀空腔)。</p>\n<h3>二、腦瘤與血腫</h3>\n<p>星狀細胞瘤(最常見glioma,GBM惡性);髓芽母細胞瘤(兒童小腦中線)。硬腦膜外血腫=中腦膜動脈(顳骨骨折,雙凸);硬腦膜下=橋靜脈(新月)。自發性蛛網膜下腔出血=動脈瘤破裂。鉤回疝脫壓動眼神經(散瞳)。</p>\n<h3>三、肌肉疾病</h3>\n<p>杜顯氏肌肉失養症(DMD,dystrophin,X性聯,小腿假肥大);重症肌無力(神經肌肉接合處,抗AChR抗體,易疲勞,神經傳導正常)。</p>\n<h3>四、骨骼關節與皮膚</h3>\n<p>骨肉瘤(青少年、幹骺端、日光放射狀)。佝僂/軟骨症(維生素D)。骨質疏鬆(骨折/變形/無發燒)。波特氏病=脊椎結核。關節炎:<b>類風濕(對稱小關節、滑膜增生血管翳、晨僵>1hr)、骨關節炎(退化、負重關節、非發炎)、僵直性脊椎炎(年輕男、薦腸關節、HLA-B27)、痛風(尿酸鈉、大腳趾、痛風石)</b>。風濕熱Jones標準(JONES主要)。骨折癒合:血塊→軟骨痂→骨性骨痂→層狀硬骨。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^B(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='nrn_path_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
