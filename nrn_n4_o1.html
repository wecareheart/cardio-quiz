關陰道瘻管,下列敘述何者正確?","opts":{"A":"最常見的原因為手術傷害","B":"甲基藍試驗是以試紙測試","C":"治療方式以內科治療為主","D":"病人身上經常有糞便味"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"9骨盆鬆弛尿失禁脫垂與婦女健康議題","topic_num":"女性生殖生理婦科避孕更年期","topic_code":"O1-9","q_num":36,"roc_year":"109","exam_code":"109110","src":"民國109年","options":{"A":"最常見的原因為手術傷害","B":"甲基藍試驗是以試紙測試","C":"治療方式以內科治療為主","D":"病人身上經常有糞便味"},"img":""},{"id":"110110-N4-40","code":"110110","roc":"110","cat":"N4","catname":"產兒科護理學","num":40,"stem":"王女士26 歲,結婚2 年,因性交疼痛令其十分困擾而就診,下列護理措施何者錯誤?","opts":{"A":"夫婦兩人一起討論以發掘彼此忽略的問題","B":"為顧及配偶自尊,治療初期以王女士為主","C":"探討病因期間建議王女士暫時禁慾","D":"必要時可鼓勵使用無刺激性的潤滑劑"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"9骨盆鬆弛尿失禁脫垂與婦女健康議題","topic_num":"女性生殖生理婦科避孕更年期","topic_code":"O1-9","q_num":40,"roc_year":"110","exam_code":"110110","src":"民國110年","options":{"A":"夫婦兩人一起討論以發掘彼此忽略的問題","B":"為顧及配偶自尊,治療初期以王女士為主","C":"探討病因期間建議王女士暫時禁慾","D":"必要時可鼓勵使用無刺激性的潤滑劑"},"img":""}],E={"101110-N4-77":{"quick":"動情激素(雌激素)可穩定血管舒縮、防止熱潮紅;停經後雌激素下降才出現熱潮紅。","detail":{"background":"女性兩大性荷爾蒙由卵巢分泌:雌激素(estrogen,動情激素)主要由濾泡顆粒細胞分泌,作用包括促進子宮內膜增生(增生期)、維持陰道上皮厚度與肝醣含量(供乳酸桿菌酸化、產生潤滑與防禦)、穩定下視丘體溫調節中樞(故缺乏時出現熱潮紅、盜汗等血管舒縮症狀)、提升骨密度、改善情緒與認知、降低LDL。黃體素(progesterone)由排卵後黃體分泌,使子宮內膜轉為分泌期、升高基礎體溫約0.3–0.5°C(致排卵後高溫期)、使子宮頸黏液變稠、抑制子宮收縮以安胎。月經週期受下視丘GnRH→腦下垂體FSH/LH→卵巢回饋調控:濾泡期FSH促濾泡成熟分泌雌激素,雌激素高峰正回饋引發LH surge而排卵,黃體期黃體分泌雌激素與黃體素,未受孕則黃體萎縮、兩荷爾蒙驟降而月經來潮。考點陷阱:勿把「潤滑液/陰道濕潤」歸給黃體素(實為雌激素作用),也勿把「情緒低落」歸給雌激素(雌激素反而提升情緒,缺乏才低落)。","options":{"A":"錯。雌激素能改善而非使情緒低落;停經後雌激素下降才易情緒不穩、憂鬱。","B":"正確。雌激素穩定下視丘體溫中樞,可防止熱潮紅;停經缺乏雌激素才出現熱潮紅。","C":"錯。黃體素並不會「提升精力」,其主要作用是維持分泌期內膜、升體溫、安胎。","D":"錯。使陰道產生潤滑、維持上皮的是雌激素,非黃體素。"},"sources":["新文京《婦科護理學》女性生殖生理","Guyton生理學 女性生殖內分泌"]}},"102030-N4-38":{"quick":"基礎體溫曲線「先下降到最低點再上升進入高溫期」,該下降轉折點代表即將排卵。","detail":{"background":"基礎體溫法(BBT)是利用黃體素的升溫效應監測排卵的方法。原理:排卵後形成黃體分泌黃體素,黃體素作用於下視丘體溫調節中樞使基礎體溫上升0.3–0.5°C,故月經週期呈「雙相型」——排卵前(濾泡期)為低溫期約36.2–36.5°C,排卵後(黃體期)為高溫期約36.7°C以上,維持約12–14天。臨床判讀:在低溫轉高溫的交界、體溫到達最低點隨即上升的那一刻最接近排卵時間;連續高溫≥3天表示已排卵,高溫期持續≥16天可能懷孕。應用:每日晨醒未活動前(舌下)固定時間測量。卵子排出後存活約12–24小時、精子在女性生殖道可活2–3天,故受孕危險期約在體溫上升前2–3天到上升後1天。陷阱:著床(implantation)發生於受精後約6–7天,與BBT下降無直接對應;受精/受精卵分裂亦非BBT下降所代表的事件。","options":{"A":"錯。受精發生於排卵後輸卵管壺腹部,非以體溫下降為標記。","B":"正確。體溫降至最低點隨即上升,代表排卵即將或正在發生。","C":"錯。受精卵分裂在受精後於輸卵管內進行,與此曲線轉折無直接關係。","D":"錯。著床約在受精後6–7天,屬黃體中期,並非體溫下降所示時點。"},"sources":["新文京《婦科護理學》月經週期與排卵","家庭計畫 自然避孕法-基礎體溫"]}},"106110-N4-40":{"quick":"陰道正常分泌物(白帶)在排卵期、經前及孕期會「增多」而非減少。","detail":{"background":"陰道正常分泌物(白帶,leukorrhea)由子宮頸黏液、陰道上皮脫落細胞、滲出液與正常菌叢(以乳酸桿菌Lactobacillus為主)組成,呈白色或透明、無臭、量隨週期變化。生理功能:潤滑陰道、形成酸性環境(pH約3.8–4.5,乳酸桿菌將上皮肝醣代謝為乳酸)以抑制致病菌,故為陰道生態平衡的指標。受雌激素調控,雌激素愈高分泌愈多:故排卵期(黏液變多、清澈、可拉絲)、月經來潮前、以及懷孕期(雌激素持續高)白帶量均增加。異常白帶(顏色改變、異味、搔癢、泡沫或乳酪狀)才提示感染。陷阱:本題問「錯誤」者,選項說「經期前或孕期量會減少」與事實(增加)相反,故為錯誤敘述。","options":{"A":"正確敘述。白帶可濕潤陰道。","B":"正確敘述。白帶反映陰道酸鹼與菌叢平衡。","C":"正確敘述。白帶即leukorrhea(白帶)。","D":"錯誤敘述(本題答案)。經期前與孕期因雌激素高,白帶量是增加而非減少。"},"sources":["新文京《婦科護理學》陰道生理與白帶","婦女健康 陰道生態"]}},"108020-N4-40":{"quick":"FSH、LH才是腦下垂體前葉分泌的促性腺激素;動情激素(雌激素)由卵巢分泌,不是腦下垂體激素。","detail":{"background":"下視丘-腦下垂體-性腺軸:下視丘分泌GnRH(性腺釋素),刺激腦下垂體前葉的性腺刺激細胞分泌兩種「促性腺激素(gonadotropins)」——濾泡刺激素(FSH)與黃體生成素(LH)。FSH促進卵巢濾泡發育與顆粒細胞分泌雌激素;LH觸發排卵並維持黃體分泌黃體素。催乳激素(prolactin)雖也由腦下垂體前葉分泌,但屬於促進泌乳的激素、非促性腺激素(惟高泌乳素會抑制GnRH而致無月經)。雌激素(estrogen,動情激素)與黃體素則是「卵巢(性腺)」分泌的性類固醇,並會對下視丘-腦下垂體產生回饋調節。本題問「不屬於腦下垂體促性腺激素」,雌激素由卵巢分泌、最不屬於,為答案。","options":{"A":"FSH是腦下垂體前葉分泌的促性腺激素。","B":"LH是腦下垂體前葉分泌的促性腺激素。","C":"正確答案。動情激素(雌激素)由卵巢分泌,非腦下垂體促性腺激素。","D":"prolactin由腦下垂體前葉分泌(雖非促性腺激素,但屬腦下垂體激素);相對於卵巢分泌的雌激素,本題以雌激素最不屬於腦下垂體激素為答案。"},"sources":["Guyton生理學 下視丘-腦下垂體-性腺軸","新文京《婦科護理學》生殖內分泌"]}},"112110-N4-7":{"quick":"懷孕雌激素升高使陰道上皮肝醣增多、乳酸桿菌作用旺盛,故白帶量增、黏稠、無臭,屬正常生理。","detail":{"background":"懷孕期生殖道生理變化:高濃度雌激素使陰道與子宮頸上皮增生、肝醣含量增加,常駐乳酸桿菌(嗜乳酸桿菌, Doderlein bacilli)將肝醣分解為乳酸,使陰道pH更酸(約3.5–4.5)以防禦感染,同時分泌物(白帶)增多,呈白色黏稠、無臭味,稱生理性白帶,屬正常。子宮頸腺體增生並形成黏液栓(mucus plug)封住子宮頸口防止上行感染。護理指導:保持會陰清潔乾燥、穿棉質透氣內褲、勿灌洗陰道(會破壞酸性防禦);若分泌物變黃綠、乳酪狀、泡沫狀、有異味或合併搔癢灼熱,才為感染需就醫。陷阱:題述「黏稠、無臭」即正常生理性白帶,非念珠菌(乳酪狀、搔癢)或發炎。","options":{"A":"錯。陰道上皮發炎會有異味、顏色改變或搔癢,與題述無臭不符。","B":"錯。念珠菌感染分泌物呈白色乳酪狀並伴外陰搔癢,題述無此。","C":"正確。懷孕雌激素升高使乳酸桿菌作用旺盛,造成生理性白帶增多、無臭。","D":"錯。子宮頸黏液栓於分娩前才排出(落紅/黏液栓排出),非孕期白帶增加的原因。"},"sources":["新文京《產科護理學》妊娠期生理變化","Williams Obstetrics: maternal physiology"]}},"104100-N4-35":{"quick":"經前症候群飲食重點:多補充維生素B6(助神經傳導、緩情緒水腫),並限鹽、限咖啡因、限糖。","detail":{"background":"經前症候群(PMS, premenstrual syndrome)指在月經週期黃體期(經前1–2週)反覆出現生理、心理與行為症狀,月經來潮後緩解。可能與黃體素/雌激素波動、血清素下降、前列腺素及水鈉滯留有關。常見症狀:乳房脹痛、腹脹水腫、頭痛、易怒焦慮憂鬱、疲倦、食慾改變。嚴重影響功能者稱經前不悅症(PMDD)。飲食與生活處置:增加維生素B6(輔助合成血清素、改善情緒與水腫)、補充鈣與鎂、複合醣類少量多餐穩定血糖;限制鈉鹽(減少水腫)、咖啡因與酒精(減焦慮失眠乳房脹痛)、減少精製糖;規律有氧運動、充足睡眠、紓壓。嚴重者可用SSRI、口服避孕藥或NSAID。陷阱:不建議高鹽、不建議每日黑咖啡(咖啡因加重症狀)、低碳水反而易情緒不穩。","options":{"A":"錯。過低碳水化合物易血糖不穩、加重情緒症狀;建議複合醣類。","B":"葉酸主要與孕前/神經管缺損預防有關,非PMS飲食重點。","C":"錯。咖啡因會加重焦慮、失眠與乳房脹痛,應限制而非每日飲用。","D":"正確。維生素B6輔助血清素合成,可緩解PMS情緒與水腫症狀。"},"sources":["新文京《婦科護理學》經前症候群","ACOG: Premenstrual Syndrome"]}},"105030-N4-37":{"quick":"原發性痛經以前列腺素增高致子宮痙攣性疼痛為主,治療用「前列腺素抑制劑(NSAID)」而非前列腺素製劑。","detail":{"background":"原發性痛經(primary dysmenorrhea)指無骨盆腔器質性病變的經痛,常見於初經後1–2年開始的年輕未生育女性。機轉:排卵週期黃體期子宮內膜分泌大量前列腺素(PGF2α),引起子宮平滑肌強烈痙攣性收縮、血管收縮缺血而痛,常於月經來潮前數小時至來潮初期最劇,並伴噁心、腹瀉、頭痛。處置:首選非類固醇抗發炎藥(NSAID,如mefenamic acid、ibuprofen)抑制前列腺素合成,經前即開始服用效果佳;口服避孕藥抑制排卵與內膜增生可減少前列腺素;非藥物:下腹局部熱敷、溫熱飲品、規律運動。陷阱:題目選項「服用前列腺素製劑」是錯誤——前列腺素正是致痛物質,應給的是前列腺素「抑制劑」。續發性痛經(如子宮內膜異位、肌瘤、PID)則有器質病因、痛感型態不同。","options":{"A":"正確措施。連續服用口服避孕藥抑制排卵與內膜,可減輕原發性痛經。","B":"正確措施。溫熱飲品可緩解痙攣不適。","C":"正確措施。下腹局部熱敷促進血液循環、緩解子宮痙攣。","D":"錯誤(本題答案)。應給「前列腺素抑制劑(NSAID)」,而非前列腺素製劑——前列腺素本身即致痛物質。"},"sources":["新文京《婦科護理學》痛經","ACOG: Dysmenorrhea / NSAID 治療"]}},"105090-N4-35":{"quick":"原發性痛經為「下腹痙攣性疼痛」,典型於月經來潮前數小時至來潮初期最明顯。","detail":{"background":"原發性痛經的疼痛特性是辨識重點:屬痙攣性(cramping)而非單純充血性脹痛,因前列腺素引發子宮強力收縮缺血所致;發生時間多在月經開始前數小時至月經來潮第一、二天(初期)最劇烈,隨經血排出、內膜剝離完成而漸緩,通常不會持續整個經期。常伴隨噁心、嘔吐、腹瀉、頭暈、頭痛等前列腺素全身效應。鑑別:續發性痛經(子宮內膜異位、腺肌症、肌瘤、PID)常於月經前較久即開始、持續較久或經後仍痛,並隨年齡加重。本題正確敘述為「下腹痙攣性疼痛(2)」與「月經開始前數小時/來潮初期最明顯(4、6)」之組合。","options":{"A":"依選項組合判斷;原發性痛經非單純「充血性」疼痛。","B":"本題答案組合:對應「痙攣性疼痛+來潮初期(數小時內)最明顯」之正確敘述。","C":"不符原發性痛經之痙攣性、來潮初期最劇之特性。","D":"不符;原發性痛經多不持續整個經期。"},"sources":["新文京《婦科護理學》原發性痛經","ACOG: Dysmenorrhea"]}},"106030-N4-39":{"quick":"經前症候群指在月經黃體期反覆出現生理、心理與行為的週期性變化,月經來潮後緩解。","detail":{"background":"PMS的核心定義是「週期性」與「黃體期相關」:症狀於排卵後的黃體期出現、月經來潮後數日內消退,且需連續多個週期反覆發生才符合。病因尚未完全明朗,與卵巢類固醇(雌激素/黃體素)的週期波動、中樞血清素(serotonin)敏感性下降、前列腺素與水鈉滯留等有關,非單純某一激素「不足」或「過多」所致,也不一定有潛在婦科器質疾病。症狀光譜廣:乳房脹痛、腹脹、水腫、頭痛(生理)、易怒、焦慮、憂鬱、注意力差(心理)、暴食或社交退縮(行為)。嚴重者為PMDD。處置:生活型態調整、運動、限鹽限咖啡因、補B6/鈣鎂,必要時SSRI或口服避孕藥。","options":{"A":"正確。PMS為黃體期出現、月經後緩解的週期性生理心理行為變化。","B":"錯。PMS非單由前列腺素、黃體素、留鹽激素「過多」所導致,病因為多因素。","C":"錯。PMS不一定與潛在婦科器質疾病有關。","D":"錯。並非催乳激素分泌不足所引起。"},"sources":["新文京《婦科護理學》經前症候群","ACOG: PMS"]}},"110030-N4-37":{"quick":"經前症候群護理首重生活型態調整:規律作息、良好睡眠、運動與飲食調整(限鹽、限咖啡因)。","detail":{"background":"PMS以非藥物的生活型態調整為基礎護理:規律作息與充足而良好的睡眠可穩定情緒與自律神經;規律有氧運動促進腦內啡、改善情緒與水腫;飲食上採少量多餐、複合醣類穩定血糖,限制鈉鹽以減輕水腫脹痛、限制咖啡因與酒精以減少焦慮失眠及乳房脹痛、補充維生素B6與鈣鎂;紓壓與認知調適亦有幫助。藥物則保留給症狀嚴重者(SSRI、口服避孕藥、NSAID)。陷阱選項:高鹽會加重水腫;雌性素並非PMS常規預防用藥;咖啡因與冰涼含糖飲料會加重症狀。","options":{"A":"錯。高鹽會加重水鈉滯留與水腫脹痛,應限鹽。","B":"錯。雌性素非PMS常規預防用藥。","C":"錯。咖啡因加重焦慮失眠、含糖冰飲不利症狀控制。","D":"正確。調整生活作息、確保良好睡眠品質為PMS基礎護理。"},"sources":["新文京《婦科護理學》PMS護理","ACOG: PMS lifestyle management"]}},"110110-N4-39":{"quick":"原發性月經疼痛(原發性痛經)與子宮內膜分泌的前列腺素增高最相關。","detail":{"background":"原發性痛經的致病關鍵是前列腺素(prostaglandin, 尤PGF2α):黃體期子宮內膜在黃體素作用下儲積前列腺素,月經來潮內膜剝離時大量釋放,引起子宮平滑肌強力收縮、血管收縮缺血而產生痙攣性疼痛。這也是NSAID(前列腺素合成抑制劑)有效的原因。相對地,子宮肌瘤、卵巢腫瘤、經血量過多等屬於可造成「續發性」痛經或月經異常的器質性因素,與原發性痛經的機轉不同。本題問與「原發性」月經疼痛最相關者,答案為前列腺素。","options":{"A":"正確。前列腺素增高致子宮痙攣,是原發性痛經主因。","B":"子宮肌瘤屬器質性病變,造成續發性痛經,非原發性。","C":"卵巢腫瘤屬器質性病變,非原發性痛經機轉。","D":"經血量過多屬月經異常表現,非原發性痛經的致病因。"},"sources":["新文京《婦科護理學》原發性痛經","ACOG: Dysmenorrhea pathophysiology"]}},"111030-N4-39":{"quick":"經前症候群好發於有排卵週期的生育年齡女性,可自初經後年輕時期即開始出現。","detail":{"background":"PMS的發生需有排卵性月經週期(黃體期),故出現在初經後、具排卵功能的生育年齡階段;停經後(無排卵、無黃體期)或排卵被抑制時症狀消失。臨床上各生育年齡層皆可見,本題選項中以「初經階段年輕時期」屬有排卵週期的時期、符合PMS可出現的生命週期(相對於老年停經期);輸卵管結紮並不影響卵巢排卵與黃體期,但題幹以「初經階段年輕時期」為答案,強調PMS屬生育年齡(有排卵)現象。護理重點仍為週期性辨識與生活型態調整。","options":{"A":"結紮不影響排卵,雖仍可能有PMS,但非本題最佳答案。","B":"停經前老年期排卵漸停、黃體期消失,PMS漸緩,不符。","C":"生產後6個月若哺乳常無排卵,PMS不明顯。","D":"本題答案。初經後年輕時期具排卵週期,可開始出現PMS。"},"sources":["新文京《婦科護理學》PMS流行病學","ACOG: PMS"]}},"111110-N4-37":{"quick":"經期不適可補充維生素E(具緩解經痛、乳房脹痛之輔助效果)。","detail":{"background":"維生素在月經保健的角色:維生素E為抗氧化劑,部分研究顯示可減輕原發性痛經與經前乳房脹痛,故經期不適常建議補充;維生素B6有助緩解PMS情緒與水腫;鈣鎂亦有輔助。相對地,維生素A過量有致畸與肝毒性風險、維生素D主要與鈣磷骨骼代謝有關、維生素C與抗氧化及鐵吸收有關,皆非經期不適的首選補充。整體仍以均衡飲食、限鹽限咖啡因、規律運動與熱敷為基礎,維生素為輔助。","options":{"A":"維生素A與經期不適無直接緩解作用,過量有毒性。","B":"維生素D主與骨骼鈣磷代謝相關,非經期不適首選。","C":"正確。維生素E可輔助緩解經痛與乳房脹痛。","D":"維生素C與抗氧化、鐵吸收相關,非經期不適補充重點。"},"sources":["新文京《婦科護理學》月經保健","婦女營養 維生素E與痛經"]}},"112110-N4-36":{"quick":"月經期間禁用清潔液灌洗陰道——會破壞陰道酸性與正常菌叢、增加上行感染風險。","detail":{"background":"月經期間陰道與子宮頸口較開放、子宮內膜創面為細菌易孳生環境,衛生原則在「清潔、乾爽、勿破壞防禦」:外陰可用清水或中性肥皂由前往後清潔、勤換衛生棉(每2–4小時)、採淋浴避免盆浴泡澡(防上行感染)、穿寬鬆棉質透氣內褲。絕對不可用清潔液或灌洗器灌洗陰道——灌洗會沖掉保護性乳酸桿菌、改變酸鹼值,反增細菌性陰道炎、念珠菌感染與骨盆腔炎(PID)風險,亦無清潔必要(陰道有自淨能力)。陷阱:許多婦科題反覆考「不可陰道灌洗」此觀念。","options":{"A":"錯誤(本題答案)。清潔液灌洗陰道會破壞菌叢與酸鹼、增加感染,應禁止。","B":"適當。中性肥皂或清水清潔會陰即可。","C":"適當。經期採淋浴,避免盆浴以防上行感染。","D":"適當。寬鬆棉質內褲透氣、減少悶熱與感染。"},"sources":["新文京《婦科護理學》月經衛生","婦女健康 陰道灌洗之危害"]}},"101030-N4-2":{"quick":"HRT只能緩解停經症狀並有乳癌等風險,絕非「保證身心健康、永保青春」。","detail":{"background":"更年期(menopause)指卵巢功能衰退、雌激素下降致月經終止(連續12個月無月經),平均約50–52歲。症狀:血管舒縮(熱潮紅、盜汗)、泌尿生殖萎縮(陰道乾澀、性交痛、頻尿)、情緒睡眠障礙,長期則骨質流失與心血管風險上升。荷爾蒙補充療法(HRT)以雌激素(有子宮者需併用黃體素以保護內膜防內膜癌)緩解中重度停經症狀,屬「症狀緩解」而非預防慢性病的萬靈丹。2002年美國WHI(婦女健康倡議)研究發現,長期合併雌激素+黃體素的HRT與乳癌、靜脈血栓、中風、冠心症風險增加相關,故主張採「最低有效劑量、最短必要時間」、個別評估風險、症狀緩解後逐步減量停藥(約用6–9個月後評估)。HRT並非人人適用,有乳癌、血栓、不明陰道出血、嚴重肝病、子宮內膜癌者禁用。","options":{"A":"正確敘述。HRT定位為緩解停經症狀,非預防疾病。","B":"正確敘述。症狀減輕後可於6–9個月內逐漸減量停藥。","C":"錯誤(本題答案)。HRT不能「保證身心健康、永保青春」,且有乳癌等風險,須個別評估。","D":"正確敘述。WHI(2002)發現HRT與乳癌風險相關。"},"sources":["新文京《婦科護理學》更年期與HRT","WHI Study 2002; NAMS 停經荷爾蒙治療立場"]}},"101110-N4-78":{"quick":"更年期卵巢衰退→雌性素分泌減少(2)、回饋使FSH分泌增加(4)。","detail":{"background":"更年期生殖內分泌的核心變化是「卵巢功能衰退」:濾泡耗竭,雌激素與抑制素(inhibin)分泌減少,對下視丘-腦下垂體的負回饋減弱,於是腦下垂體代償性大量分泌促性腺激素——FSH與LH皆上升,其中FSH上升尤為顯著(FSH>40 IU/L常作為停經的內分泌指標)。黃體素因停止排卵、無黃體形成而減少(非增加)。臨床對應:雌激素低下→熱潮紅、陰道萎縮、骨質流失、LDL上升;FSH/LH升高為診斷參考。本題正確組合為「雌性素分泌減少(2)+FSH分泌增加(4)」。","options":{"A":"含「黃體素增加」與「LH減少」皆錯。","B":"含「黃體素增加」錯;更年期黃體素因不排卵而減少。","C":"正確答案。雌性素減少(2)+FSH增加(4)。","D":"含「LH減少」錯;更年期LH是上升。"},"sources":["Guyton生理學 更年期內分泌","新文京《婦科護理學》更年期"]}},"101110-N4-79":{"quick":"HRT主要目的是緩解血管舒縮症狀(熱潮紅、盜汗)。","detail":{"background":"HRT的主要適應症是中重度血管舒縮症狀(熱潮紅、夜間盜汗)與泌尿生殖道萎縮症狀(陰道乾澀、性交痛),也可延緩停經早期骨質流失。其機轉是補充缺乏的雌激素(有子宮者加黃體素保護內膜)。HRT「不是」用來使月經規則化(更年期目標非恢復月經)、也不是用來「減少靜脈血栓」(反而會增加血栓風險,血栓病史為禁忌),情緒穩定僅為次要附帶效果而非主要目的。使用原則:最低有效劑量、最短必要期間、定期評估乳房與子宮內膜。","options":{"A":"正確。緩和熱潮紅、盜汗等血管舒縮症狀為HRT主要目的。","B":"錯。HRT非為使月經週期規則化。","C":"錯。HRT反而增加靜脈血栓風險,血栓史為禁忌。","D":"錯。情緒穩定為附帶效果,非主要目的。"},"sources":["NAMS 停經荷爾蒙治療","新文京《婦科護理學》HRT適應症"]}},"102030-N4-39":{"quick":"更年期預防骨質疏鬆:每日鈣攝取約1000–1200 mg、維生素D、負重運動。","detail":{"background":"停經後雌激素驟降使破骨細胞活性相對增強、骨吸收>骨生成,骨密度快速流失(停經後前5–10年最快),增加骨質疏鬆與骨折風險。預防護理:足量鈣攝取(停經後婦女建議約1000–1200 mg/天,本題以1200 mg計)、維生素D(約800–1000 IU)、規律「負重性」運動(健走、慢跑、阻力訓練可刺激成骨、增進骨密度與平衡防跌)、戒菸限酒、適量咖啡因、必要時藥物(雙磷酸鹽、SERM等)。陷阱:不應避免負重運動(負重運動有益)、不需嚴禁咖啡(適量即可)、體重不應低於理想體重(過瘦反增骨鬆風險)。","options":{"A":"錯。應「進行」負重運動以增骨密度,而非避免。","B":"錯。適量咖啡即可,不需嚴禁。","C":"正確。每日鈣約1200 mg。","D":"錯。體重不應低於理想體重,過瘦增加骨鬆風險。"},"sources":["新文京《婦科護理學》骨質疏鬆預防","NOF/國健署 骨質疏鬆鈣與維生素D建議"]}},"103100-N4-35":{"quick":"更年期飲食不宜過度低熱量(25 kcal/kg/day過低);應均衡並增加鈣與維生素D。","detail":{"background":"更年期飲食目標是維持理想體重、保骨、護心血管:攝取足量鈣(1000–1200 mg/天,如每日2份奶製品)、維生素D(約400–800 IU)、優質蛋白與纖維,限飽和脂肪與精製糖以防停經後LDL上升與體重增加,限鈉防高血壓。熱量應依活動量給予維持健康體重的適當熱量,「25 kcal/kg/day」屬偏低(接近臥床或減重的限制熱量),長期過低易營養不良、加速肌肉與骨質流失,故不恰當。其餘奶製品、足量鈣、維生素D皆為正確衛教。","options":{"A":"恰當。每日2份奶製品補鈣。","B":"不恰當(本題答案)。25 kcal/kg/day熱量過低,不適合作為一般更年期飲食。","C":"恰當。增加鈣至1200–1400 mg/天護骨。","D":"恰當。維生素D 400 IU/天助鈣吸收。"},"sources":["新文京《婦科護理學》更年期營養","國健署 成人營養建議"]}},"105030-N4-40":{"quick":"停經婦女因雌激素驟降致骨吸收增加,為骨質疏鬆高危險群。","detail":{"background":"骨質疏鬆危險因子:停經(雌激素下降,最重要的女性危險因子)、高齡、女性、體型瘦小、家族史、鈣與維生素D攝取不足、缺乏運動(久坐)、抽菸、過量飲酒與咖啡因、長期使用類固醇、白人或亞洲人種。雌激素能抑制破骨細胞,停經後缺乏使骨流失加速,停經後前5–10年流失最快。保護因子:規律負重運動、足量鈣與維生素D、不吸菸、適量咖啡與酒。本題「停經婦女」即典型高危;其餘選項(不菸不酒不咖啡、足量鈣、運動員)反而是保護因子。","options":{"A":"正確。停經婦女雌激素下降,為骨質疏鬆高危險群。","B":"錯。不菸不酒不咖啡為保護因子。","C":"錯。每日鈣1500 mg屬足量,為保護而非危險。","D":"錯。運動員規律負重運動,骨密度較佳。"},"sources":["新文京《婦科護理學》骨質疏鬆危險因子","NOF Osteoporosis risk factors"]}},"105090-N4-37":{"quick":"混合雌激素+黃體素HRT初期常見副作用:體重增加、乳房腫脹、(撤退性)月經出現。","detail":{"background":"開始合併型HRT(雌激素+黃體素)初期,因外源性性荷爾蒙作用,常見可逆性副作用:水鈉滯留致體重增加與水腫、乳房脹痛、噁心、頭痛;若採週期性黃體素方案,停藥期會有撤退性出血(類似月經再出現);陰道分泌物可能增加。膚色變淡並非典型(雌激素反而可能造成黑斑/色素沉著)、陰道分泌物多為增加而非減少。這些初期副作用多隨時間調整或調量而緩解。需衛教婦女預期這些變化、規則回診評估乳房與內膜,並警覺異常出血或單側下肢腫痛(血栓)等須就醫的徵象。本題正確組合為體重增加(1)、乳房腫脹(3)、月經出現(4)。","options":{"A":"本題答案組合,對應體重增加、乳房腫脹、撤退性月經出現等初期副作用。","B":"不符;缺乏正確的乳房腫脹/月經出現組合。","C":"與正解組合不一致。","D":"含「膚色變淡/分泌物減少」等非典型項目,錯誤。"},"sources":["新文京《婦科護理學》HRT副作用","NAMS HRT counseling"]}},"106030-N4-38":{"quick":"更年期雌激素減少→LDL上升、HDL下降,心血管疾病風險增加。","detail":{"background":"更年期雌激素下降的多重影響:(1)心血管——雌激素原可升HDL、降LDL、維持血管內皮功能,缺乏後LDL上升、HDL下降,停經後女性冠心病風險逐漸接近男性;(2)骨骼——雌激素抑制破骨細胞,缺乏使骨吸收增加(破骨細胞活性增強,而非成骨細胞減少)致骨鬆;(3)泌尿生殖——雌激素(非雄性素)維持陰道上皮,缺乏致萎縮性陰道炎、乾澀與性交痛;(4)血管舒縮——熱潮紅。HRT並非人人適用(有禁忌者不可用)。本題正確敘述為「雌性素減少→LDL增加→易心血管疾病」。","options":{"A":"正確。雌激素減少使LDL增加,心血管風險上升。","B":"錯。骨鬆是「破骨細胞活性增強、骨吸收增加」,非成骨細胞減少所致(且因雌激素而非黃體素)。","C":"錯。陰道萎縮性發炎源於「雌激素」減少,非雄性素。","D":"錯。並非所有更年期婦女都可接受HRT,有禁忌者不可用。"},"sources":["新文京《婦科護理學》更年期生理","NAMS; 停經與心血管/骨骼"]}},"109030-N4-40":{"quick":"更年期FSH與LH皆上升(尤以FSH顯著)。","detail":{"background":"更年期下視丘-腦下垂體-卵巢軸的回饋:卵巢濾泡耗竭→雌激素與抑制素下降→對腦下垂體負回饋減弱→FSH與LH代償性「皆上升」,其中FSH升高更明顯(FSH>40 IU/L常用作停經內分泌指標)。故四個選項中唯有「FSH上升、LH上升」正確。臨床應用:不明原因停經或評估卵巢功能時可測FSH/LH與雌二醇;但更年期診斷主要仍依連續12個月無月經之臨床判定,內分泌檢驗為輔助。","options":{"A":"錯。FSH與LH皆上升,非下降。","B":"錯。FSH不是下降,是上升。","C":"錯。LH亦為上升而非下降。","D":"正確。FSH上升、LH上升。"},"sources":["Guyton生理學 更年期","新文京《婦科護理學》更年期內分泌"]}},"110030-N4-21":{"quick":"更年期變化:FSH大量增加(1)、LDL增加(3)。","detail":{"background":"更年期生理變化整理:(1)促性腺激素——FSH大量增加(最敏感指標)、LH亦升;(2)性類固醇——雌性素「減少」(非增加);(3)脂質——雌激素缺乏使LDL增加、HDL下降,心血管風險升;(4)陰道——雌激素缺乏使陰道上皮萎縮、肝醣與乳酸桿菌減少,pH「升高(變鹼)」而非下降,易萎縮性陰道炎。故正確組合為FSH增加(1)+LDL增加(3)。陷阱:雌性素是減少、陰道pH是上升,兩者皆為錯誤敘述。","options":{"A":"正確答案。FSH大量增加(1)+LDL增加(3)。","B":"含「雌性素分泌增加」錯。","C":"含「陰道pH值下降」錯(實為上升)。","D":"兩項皆錯(雌性素增加、pH下降)。"},"sources":["新文京《婦科護理學》更年期生理變化","NAMS"]}},"110030-N4-36":{"quick":"更年期仍需定期做子宮頸抹片檢查(子宮頸癌風險不因停經消失)。","detail":{"background":"更年期保健衛教:(1)定期篩檢——停經後仍應依指引定期子宮頸抹片(子宮頸癌好發於停經前後,風險不因停經而消失),並注意乳房自我檢查與乳房攝影、骨密度檢查;(2)熱潮紅——避免誘發因子(辛辣、熱飲、酒精、情緒激動),採洋蔥式穿著、涼爽環境,而非「多喝冰涼飲品」(短暫且不建議作為處置主軸);(3)萎縮性陰道炎乾澀——可用水性潤滑劑或局部雌激素,不必因此停止性生活;(4)避免未經證實的民俗療法。本題正確且最適當者為「仍需定期做子宮頸抹片檢查」。","options":{"A":"錯。多喝冰涼飲品非建議的熱潮紅處置主軸。","B":"正確。更年期後仍需定期子宮頸抹片篩檢。","C":"錯。不建議來路不明的民俗療法。","D":"錯。陰道乾澀可用潤滑劑/局部雌激素改善,不需停止性行為。"},"sources":["國健署 子宮頸抹片篩檢建議","新文京《婦科護理學》更年期保健"]}},"110110-N4-36":{"quick":"憂鬱症不是HRT禁忌;真正禁忌為血栓、雌激素依賴性腫瘤、不明陰道出血、嚴重肝病等。","detail":{"background":"HRT的禁忌症(不可使用):已知或疑似乳癌、雌激素依賴性惡性腫瘤(如子宮內膜癌)、不明原因陰道出血、現有或曾有靜脈血栓栓塞/肺栓塞或動脈血栓(中風、心肌梗塞)、嚴重肝功能異常、已知或疑似懷孕。相對注意:控制良好的高血壓、糖尿病、偏頭痛等需個別評估。憂鬱症「不是」HRT的禁忌(情緒問題可另行處理,必要時抗憂鬱藥)。本題問「何者錯誤(即不是禁忌)」,答案為憂鬱症。註:子宮頸原位癌與雌激素依賴性較低,但乳癌/內膜癌為明確禁忌。","options":{"A":"是禁忌。下肢靜脈血栓(VTE史)為HRT禁忌。","B":"本題答案。憂鬱症「不是」HRT禁忌。","C":"高血壓為相對禁忌/需評估,通常列為應注意或避免。","D":"雌激素依賴性子宮頸/內膜病變屬禁忌範疇。"},"sources":["NAMS HRT禁忌","新文京《婦科護理學》HRT"]}},"110110-N4-37":{"quick":"更年期防骨鬆鈣攝取應增至約1000–1200 mg/天,「500 mg」太低、不適當。","detail":{"background":"更年期護理指導重點:(1)定期子宮頸抹片與乳房檢查;(2)防骨鬆——鈣攝取增加至約1000–1200 mg/天(本題選項「500 mg」明顯不足,故為不適當)、維生素D約400–800 IU/天、負重運動、戒菸限酒;(3)護心血管——減少高糖高油脂、限鈉、規律運動以對抗停經後LDL上升。陷阱:鈣500 mg/天遠低於停經婦女需求,無法有效預防骨鬆。其餘抹片、維生素D 400 IU、減少高糖高油皆為正確衛教。","options":{"A":"適當。定期子宮頸抹片。","B":"不適當(本題答案)。鈣應增至約1000–1200 mg/天,500 mg太低。","C":"適當。減少高糖高油脂護心血管。","D":"適當。維生素D 400 IU/天助鈣吸收。"},"sources":["國健署 鈣攝取建議","新文京《婦科護理學》更年期保健"]}},"114100-N4-25":{"quick":"更年期FSH分泌增加(卵巢衰退使負回饋減弱、腦下垂體代償)。","detail":{"background":"再次強化更年期荷爾蒙四大方向:雌激素(Estrogen)減少、黃體素(Progesterone)減少(不排卵無黃體)、FSH增加(最顯著、為停經指標)、LH增加。本題唯一正確為「FSH分泌增加」。其餘三項(LH減少、雌激素增加、黃體素增加)皆與更年期變化相反。臨床:FSH>40 IU/L+連續12個月無月經支持停經;但臨床診斷以無月經12個月為主、內分泌為輔。","options":{"A":"正確。FSH分泌增加。","B":"錯。LH是增加而非減少。","C":"錯。雌激素是減少。","D":"錯。黃體素是減少。"},"sources":["Guyton生理學","新文京《婦科護理學》更年期內分泌"]}},"101030-N4-5":{"quick":"哺乳婦女最佳避孕為保險套——不含荷爾蒙、不影響泌乳與嬰兒。","detail":{"background":"產後/哺乳期避孕原則:應避免含雌激素的複方口服避孕藥(雌激素會抑制泌乳、減少乳汁,且產後高凝狀態增血栓風險),故哺乳婦女首選非荷爾蒙的屏障法——「保險套」(同時防性病、不影響乳汁、可立即使用)。其他選擇:純黃體素製劑(迷你丸、針劑)對泌乳影響小,可於產後數週使用;子宮內避孕器(IUD)宜產後4–6週子宮復舊後置入;泌乳停經避孕法(LAM)僅在產後6個月內、全親餵且月經未恢復時有效。自然避孕法(觀察黏液、安全期)在產後月經未規則時不可靠。本題「最佳」者為保險套。","options":{"A":"不佳。含雌激素口服避孕藥會抑制泌乳,哺乳期不建議。","B":"觀察陰道黏液在產後月經未規則時不可靠。","C":"正確。保險套不含荷爾蒙、不影響泌乳且防性病,為哺乳期最佳。","D":"安全期法在產後週期未恢復時不可靠。"},"sources":["家庭計畫 產後避孕","WHO MEC 哺乳期避孕建議"]}},"102110-N4-39":{"quick":"迷你丸(純黃體素)主要靠使子宮頸黏液變稠、內膜不利著床而避孕,不一定抑制排卵。","detail":{"background":"迷你丸(mini-pill, 純黃體素口服避孕藥)成分僅黃體脂酮(progestin),無雌激素。避孕機轉主要為:使子宮頸黏液變稠阻精子進入、使子宮內膜變薄不利著床、部分抑制排卵(但不如複方穩定)。特點:適合哺乳婦女與不能用雌激素者(不影響乳汁、血栓風險低),須每日固定時間服用(誤差容許窗較短),常見副作用為不規則出血(月經週期可能延長或點狀出血)。本題問「錯誤」者:選項說「主要功能在抑制排卵」並不正確——迷你丸主要靠黏液與內膜效應,抑制排卵非其主要且穩定的機轉。","options":{"A":"錯誤(本題答案)。迷你丸主要靠子宮頸黏液變稠與內膜效應,非穩定抑制排卵。","B":"正確。主成分為黃體脂酮(純黃體素)。","C":"正確。常見副作用為不規則出血、週期延長。","D":"正確。產後使用不影響乳汁分泌,適合哺乳婦女。"},"sources":["家庭計畫 口服避孕藥","WHO 避孕方法-progestin-only pill"]}},"103100-N4-26":{"quick":"母乳+配方奶混合哺餵者LAM不可靠,最適合的避孕方式是保險套。","detail":{"background":"產後避孕時機與選擇:(1)需多早避孕——產後即使月經未恢復仍可能排卵,「不能等到月經來才避孕」,純母乳全親餵且月經未恢復者LAM僅在產後6個月內有效;本題為「母乳+配方奶混合哺餵」,因親餵不足、泌乳停經效應不可靠,需另採避孕。(2)首選——含雌激素口服避孕藥於哺乳與產後早期不建議;IUD宜產後4–6週置入;故最適合且可立即使用者為保險套。陷阱:選項「月經未恢復前不須避孕」「產後一週即可服複方口服避孕藥」皆錯。","options":{"A":"錯。產後月經恢復前仍可能排卵,需避孕。","B":"錯。月經未恢復前仍可能排卵受孕,須避孕。","C":"正確。混合哺餵者最適合且可立即使用的是保險套。","D":"錯。產後早期不建議使用含雌激素的口服避孕藥(影響泌乳、增血栓)。"},"sources":["家庭計畫 產後避孕","WHO MEC"]}},"103100-N4-28":{"quick":"曾剖腹產者可裝置子宮內避孕器;不明出血、月經過多、子宮發炎為禁忌。","detail":{"background":"子宮內避孕器(IUD)適應與禁忌:適合需長效、可逆、不含或含黃體素避孕者;曾剖腹產或自然產後子宮復舊正常者皆可置入(產後4–6週為佳)。禁忌:不明原因陰道出血(可能掩蓋病灶)、月經過多或嚴重痛經(銅T會加重出血與痛經,可考慮含黃體素的Mirena反而減量)、急性骨盆腔發炎或子宮頸/陰道感染(增上行感染)、子宮畸形或腫瘤、懷孕、有子宮外孕高風險者需謹慎。本題「曾剖腹產者」非禁忌,可裝置;其餘月經過多、子宮外孕史、子宮發炎皆屬禁忌或需謹慎。","options":{"A":"正確。曾剖腹產者子宮復舊後可置入IUD。","B":"錯。月經過多者裝銅T會加重出血,屬禁忌。","C":"錯。有子宮外孕病史者使用IUD需謹慎/相對禁忌。","D":"錯。子宮發炎(感染)為IUD禁忌,易上行感染。"},"sources":["家庭計畫 IUD適應與禁忌","WHO MEC: IUD"]}},"105030-N4-22":{"quick":"有子宮外孕史、未哺乳、3年後才生育、月經不規則者,口服避孕藥較適當。","detail":{"background":"依個案條件選避孕法:此婦女(1)有子宮外孕病史——IUD相對禁忌(IUD避孕失敗時子宮外孕比例較高、且擔心上行感染),故不選IUD;(2)未哺乳——可用含雌激素複方口服避孕藥(無哺乳禁忌);(3)預計3年後再生育——需可逆、長效穩定者,結紮為永久絕育不適合;(4)月經不規則——口服避孕藥還可調節週期。綜合最適當為「口服避孕藥」(可逆、有效、兼調經)。陷阱:子宮外孕史避開IUD;想再生育避開結紮;月經不規則使安全期法不可靠。","options":{"A":"錯。有子宮外孕病史,IUD相對禁忌。","B":"正確。口服避孕藥可逆、有效並可調節不規則月經,適合此個案。","C":"錯。月經不規則使月經週期法不可靠。","D":"錯。結紮為永久絕育,與3年後想生育不符。"},"sources":["家庭計畫 避孕方法選擇","WHO MEC"]}},"105090-N4-19":{"quick":"產後純母乳哺餵者不宜用含雌性素(estrogen)口服避孕藥——會抑制泌乳。","detail":{"background":"產後純母乳哺餵的避孕指導:可用且建議——保險套(立即、不影響乳汁)、IUD(產後4–6週置入)、純黃體素製劑、LAM(產後6個月內全親餵且無月經)。不建議——「含雌性素的複方口服避孕藥」,因雌激素會抑制泌乳量、影響乳汁,且產後早期高凝狀態增加血栓風險。本題問「較不恰當」者即「口服含雌性素避孕藥」。陷阱:純母乳者LAM可用、IUD可用、保險套可用,唯含雌激素口服藥不宜。","options":{"A":"恰當。可續用保險套。","B":"恰當。產後4–6週可置入IUD。","C":"不恰當(本題答案)。含雌性素口服避孕藥會抑制泌乳,哺乳期不建議。","D":"恰當。全親餵且月經未恢復可採泌乳停經避孕法(LAM)。"},"sources":["WHO MEC 哺乳期避孕","家庭計畫 產後避孕"]}},"106030-N4-20":{"quick":"純母乳哺餵坐月子期間最好的避孕方法為保險套。","detail":{"background":"坐月子(產褥早期)且純母乳哺餵的避孕:此時不宜含雌激素口服避孕藥(抑制泌乳、產後高凝增血栓)、IUD宜待產後4–6週子宮復舊後置入、基礎體溫/安全期在產後月經未規則時不可靠。故產褥早期立即可用、不影響泌乳又防性病者為「保險套」。LAM雖可用但需全親餵且月經未恢復,且仍建議搭配屏障法更保險。本題最佳為保險套。","options":{"A":"錯。含雌激素口服避孕藥抑制泌乳,哺乳期不建議。","B":"錯。產後月經未規則,基礎體溫法不可靠。","C":"錯。IUD宜產後4–6週子宮復舊後再置入,產褥早期不適合。","D":"正確。保險套立即可用、不影響泌乳並防性病。"},"sources":["家庭計畫 產後避孕","WHO MEC"]}},"106030-N4-36":{"quick":"子宮外孕史不是口服避孕藥的禁忌;血栓史、懷孕、高血壓才是禁忌。","detail":{"background":"複方口服避孕藥(含雌激素+黃體素)禁忌:現有或曾有靜脈血栓栓塞/肺栓塞、缺血性心臟病或中風、已知或疑似懷孕、雌激素依賴性腫瘤(乳癌)、嚴重肝病、未控制高血壓(≥160/100)、35歲以上每日吸菸≥15支、有前兆型偏頭痛、產後哺乳早期等。子宮外孕「病史」並非口服避孕藥禁忌——口服避孕藥抑制排卵,反而降低子宮外孕風險(IUD才需留意子宮外孕)。本題問禁忌「何者錯誤」,答案為「子宮外孕史」(非禁忌)。","options":{"A":"是禁忌。血栓性疾病史不可用含雌激素口服避孕藥。","B":"是禁忌。已懷孕或疑似懷孕不可使用。","C":"是禁忌(尤未控制者)。高血壓使用含雌激素藥增心血管風險。","D":"本題答案。子宮外孕史「不是」口服避孕藥禁忌(藥物抑制排卵反降外孕風險)。"},"sources":["WHO MEC 口服避孕藥禁忌","家庭計畫"]}},"106110-N4-22":{"quick":"陰道生產後置入IUD的適當時機為產後4–6週(子宮復舊後)。","detail":{"background":"IUD置入時機:一般建議產後4–6週子宮復舊完成、子宮頸閉合後置入,以降低脫落與子宮穿孔風險(雖也有產後立即置入方案,但脫落率較高)。月經期間置入(子宮頸略開、可確認未懷孕)為常見時機之一,但本題針對陰道生產後,正解為產後4–6週。置入前確認無懷孕、無生殖道感染。衛教:置入後注意異常出血、下腹痛、發燒或分泌物異味(感染或脫落徵象),並定期檢查尾線。","options":{"A":"錯。產後隨時置入脫落率高,非常規建議。","B":"正確。陰道生產後約產後4–6週子宮復舊後置入。","C":"月經來潮置入為一般時機之一,但本題針對產後,正解為4–6週。","D":"錯。月經來前1週非建議時機。"},"sources":["家庭計畫 IUD置入時機","WHO MEC"]}},"106111-N4-23":{"quick":"產後口服避孕藥(含雌激素複方)約產後28天(子宮復舊、血栓風險下降)後再開始。","detail":{"background":"產後使用複方口服避孕藥(COC)的時機與限制:因產後早期靜脈血栓風險升高,非哺乳婦女一般建議產後約21–28天(本題以28天)血栓風險下降後再開始;哺乳婦女更應延後或改純黃體素/屏障法(雌激素抑制泌乳)。COC本身會抑制排卵(故說「不干擾排卵功能」是錯)。BMI≥24並非COC絕對禁忌(肥胖才需評估)。現代COC為「低劑量」雌激素,而非高劑量。本題正確為「產後28天後開始服用」。","options":{"A":"錯。BMI≥24非絕對不適用。","B":"正確。約產後28天血栓風險下降後開始。","C":"錯。COC會抑制排卵。","D":"錯。現代COC為低劑量雌激素,非高劑量。"},"sources":["WHO MEC 產後COC時機","家庭計畫"]}},"107030-N4-19":{"quick":"口服避孕藥使子宮頸黏液「變稠」(阻精子),而非變稀。","detail":{"background":"各避孕法原理:(1)保險套——物理屏障阻止精子進入陰道並防性病;(2)IUD——銅離子/異物反應引起局部無菌性發炎與前列腺素,干擾精子活動與受精卵著床(含黃體素的Mirena另使黏液變稠、內膜變薄);(3)複方口服避孕藥——抑制排卵為主,並使子宮頸黏液「變稠」阻精子、使內膜不利著床;(4)男性輸精管結紮——術後精囊仍有殘存精子,需約20次射精或3個月、複查精液無精子後才有效,期間仍需其他避孕。本題「錯誤」者為「口服避孕藥使黏液變稀」——應為變稠。","options":{"A":"正確。保險套阻精子進入陰道避孕。","B":"正確。IUD刺激局部前列腺素等干擾著床。","C":"錯誤(本題答案)。口服避孕藥使子宮頸黏液「變稠」而非變稀。","D":"正確。男性結紮後初期仍有殘精,需續用其他避孕至複查無精。"},"sources":["家庭計畫 避孕原理","WHO 避孕方法機轉"]}},"107110-N4-22":{"quick":"女性結紮(輸卵管)可於產後24–48小時內實施;卵巢仍排卵,男性結紮非立即有效。","detail":{"background":"絕育手術:(1)女性輸卵管結紮——可於產後24–48小時內(子宮底仍高、輸卵管位置表淺,經臍下小切口方便)或剖腹產同時施行,也可平時腹腔鏡進行;結紮後卵巢功能不變、仍排卵與分泌荷爾蒙、仍有月經,只是卵子無法與精子結合。(2)男性輸精管結紮——較簡單安全,但術後精囊內仍有殘存精子,需約3個月或射精約20次、複查精液確認無精子後才具避孕效果,故「非立即有效」,且不會造成腹腔沾黏(輸精管在陰囊)。本題正確為「女性結紮可於產後24–48小時內實施」。","options":{"A":"正確。女性結紮可於產後24–48小時內實施。","B":"錯。結紮後卵巢仍排卵、仍製造卵子與荷爾蒙。","C":"錯。男性結紮後仍有殘精,非立即有效,需複查無精。","D":"錯。男性結紮在陰囊輸精管,不致腹腔沾黏。"},"sources":["家庭計畫 絕育手術","優生保健 結紮衛教"]}},"108110-N4-17":{"quick":"基礎體溫避孕的危險期約為排卵前3天至排卵後2天。","detail":{"background":"基礎體溫(BBT)避孕法:利用黃體素排卵後升溫的原理。月經前半段為低溫期,排卵後體溫上升0.3–0.5°C進入高溫期。由於精子在女性生殖道可存活約2–3天、卵子排出後約存活12–24小時,故受孕「危險期」約涵蓋排卵前3天至排卵後2天;欲避孕者於此期間禁慾或加用屏障法,待體溫上升並維持3天後進入「安全期」。注意:BBT只能事後確認已排卵,無法事前精準預測,單用避孕效果有限,常與其他方法併用。本題正確敘述為「危險期是排卵前3天及排卵後2天」。","options":{"A":"正確。危險期約排卵前3天至排卵後2天。","B":"錯。排卵時體溫上升只能「事後」確認排卵,無法事前精準確認危險期。","C":"敘述方向相反/不精確;高溫期是排卵「後」的持續高溫。","D":"錯。排卵後體溫上升(高溫期),非下降。"},"sources":["家庭計畫 自然避孕法","新文京《婦科護理學》基礎體溫"]}},"110110-N4-20":{"quick":"哺乳婦女若想用子宮內避孕器,須等產後約4–6週返診時再置入。","detail":{"background":"本題個案哺乳、產後出院前詢問避孕:含雌激素口服避孕藥於哺乳期不建議(抑制泌乳),故不宜立即吃以前的避孕藥;若選IUD,須等子宮復舊(產後約4–6週返診)再置入,產後立即置入脫落率高。哺乳期間立即可用者為保險套或純黃體素製劑。陷阱:選項「現在開始吃混合雌黃體素避孕藥」錯(哺乳禁雌激素);「餵母奶不可吃任何口服避孕藥、只能禁慾」過於絕對(純黃體素仍可)。本題最適當為「IUD要等4–6週後返診置入」。","options":{"A":"過於絕對。哺乳可用純黃體素口服避孕藥,非只能禁慾。","B":"非最佳。重點是哺乳期避免雌激素並選對IUD時機。","C":"錯。哺乳期不建議現在開始含雌激素的複方避孕藥。","D":"正確。IUD須產後4–6週返診時再置入。"},"sources":["WHO MEC 哺乳期避孕","家庭計畫 IUD時機"]}},"110110-N4-21":{"quick":"事後避孕:Mifepristone(RU486)為抗黃體素,可干擾排卵/內膜而用於緊急避孕。","detail":{"background":"無防護性行為後的緊急(事後)避孕,需在性行為後一定時限內使用:(1)左旋諾孕酮(levonorgestrel)單方黃體素,72小時內愈早愈有效;(2)抗黃體素Mifepristone(RU486)——具拮抗黃體素作用,可抑制或延遲排卵、改變子宮內膜,低劑量可作為緊急避孕(高劑量併前列腺素則用於人工流產);(3)含銅IUD為最有效的事後避孕,可於5天內置入;(4)Yuzpe法(高劑量雌+黃體素)為較舊方法,副作用多。本題答案選B,說明RU486抗黃體素可用於避免懷孕。注意衛教:緊急避孕為補救措施,非常規方法,且不防性病。","options":{"A":"不適當。直接談墮胎並建議繼續懷孕,未處理其避孕需求。","B":"本題答案。RU486(mifepristone)抗黃體素,可用於緊急避孕。","C":"不適當。緊急避孕有時效性,不應只觀察等確定懷孕。","D":"Yuzpe高劑量雌激素法副作用大,非首選;本題以B為正解。"},"sources":["WHO 緊急避孕指引","家庭計畫 事後避孕"]}},"111030-N4-22":{"quick":"泌乳停經避孕法(LAM):全親餵(不分晝夜)且月經未恢復,於產後6個月內具避孕效果。","detail":{"background":"產婦想「自然」避孕、不想用藥或器材,可衛教泌乳停經避孕法(LAM, lactational amenorrhea method):成立需同時滿足三條件——(1)產後6個月內、(2)全親餵(不分晝夜、不加配方奶與副食品,哺乳間隔不過長)、(3)月經尚未恢復;頻繁吸吮使泌乳素高、抑制GnRH與排卵而避孕,符合三條件時避孕效果約98%。一旦月經恢復、開始添加副食品、或超過6個月,效果即下降,須改用其他方法。陷阱:安全期/基礎體溫在產後月經未規則時不可靠(選項B、C、D所述危險期、安全期、體溫法在此情境皆不準確)。","options":{"A":"正確。無論晝夜全親餵且月經未恢復,產後6個月內LAM可避孕。","B":"錯。產後月經未規則,以週期計算危險期不可靠。","C":"錯。產後排卵可能先於月經,不能因月經未來就不避孕。","D":"錯。產後基礎體溫法因週期未恢復而不可靠。"},"sources":["WHO/家庭計畫 LAM 三條件","新文京《產科護理學》產後避孕"]}},"111030-N4-23":{"quick":"Depo-Provera(長效黃體素針)注射後非立即避孕,前期建議併用保險套。","detail":{"background":"各荷爾蒙避孕法重點:(1)Depo-Provera(長效醋酸甲羥孕酮針劑)——若非於月經來潮初期注射,需約7天才產生避孕效果,故初期建議併用保險套;(2)含黃體素IUD(Mirena)——產後約4–6週置入,效期約5年(非3年);(3)複方口服避孕藥——一般於月經來潮第1–5天開始(非「月經結束後1週」),可使子宮頸黏液變稠;(4)迷你丸(純黃體素)——主要靠黏液與內膜效應避孕,並非「干擾正常排卵」為主。本題正確敘述為「Depo-Provera注射後不會立即避孕,建議先用保險套」。","options":{"A":"錯。Mirena效期約5年,非3年。","B":"錯。複方避孕藥多於月經來潮第1–5天開始,非月經結束後1週。","C":"敘述不精確;迷你丸主要靠黏液變稠/內膜效應,非以干擾排卵為主。","D":"正確。Depo-Provera注射後非立即避孕,前期併用保險套。"},"sources":["家庭計畫 注射型避孕","WHO MEC; Mirena 仿單"]}},"111110-N4-26":{"quick":"安全期(月曆)法:危險期起點為最短週期減18、終點為最長週期減約11(本題以最長減10計)。","detail":{"background":"月曆(安全期)避孕法需先記錄至少6個月經週期,找出最短與最長週期長度。危險期(易受孕期)的計算:起始日=最短週期天數−18;結束日=最長週期天數−11(部分教材採−10)。例如週期26–32天者,危險期約第8天(26−18)到第21–22天(32−11/−10)。此法僅適合月經規律者,卵子排出後存活約12–24小時、精子可活2–3天,故危險期需涵蓋排卵前後數天;避孕效果僅約80%左右,單用不可靠。本題以選項「最長月經週期減10、最短月經週期減18」為正解,呈現危險期上下界的計算概念。","options":{"A":"非重點;需同時掌握最長與最短週期以計算危險期上下界。","B":"本題答案。以最短週期−18、最長週期−10(或−11)界定危險期。","C":"錯。卵子排出後存活約12–24小時,非48–72小時。","D":"避孕效果約80%屬此法限制,但非本題所問的指導要點。"},"sources":["家庭計畫 月曆避孕法","WHO 自然避孕法"]}},"112030-N4-25":{"quick":"純母乳哺餵者最不推薦含雌激素的口服避孕藥(抑制泌乳)。","detail":{"background":"產後純母乳哺餵的避孕排序:可用——保險套(立即、不影響泌乳)、IUD(產後4–6週置入)、純黃體素製劑、LAM(6個月內全親餵且無月經);最不推薦——含雌激素的「複方口服避孕藥」,因雌激素抑制泌乳量、影響哺乳,且產後高凝增血栓風險。本題問「最不推薦」者即口服(複方)避孕藥。注意:純黃體素的迷你丸對泌乳影響小,與含雌激素的複方不同。","options":{"A":"最不推薦(本題答案)。含雌激素口服避孕藥抑制泌乳。","B":"可用。產後4–6週可置入IUD。","C":"可用。保險套不影響泌乳並防性病。","D":"可用。全親餵且月經未恢復可採LAM。"},"sources":["WHO MEC 哺乳期避孕","家庭計畫"]}},"113100-N4-16":{"quick":"月經週期不規則者並非IUD禁忌,相對適合;不明出血、月經過多、嚴重痛經才不適合。","detail":{"background":"子宮內避孕器(IUD)的不適合/禁忌:不明原因陰道出血(可能掩蓋惡性病灶,須先查明)、月經量過多(銅T會加重出血致貧血)、嚴重痛經(銅T加重痛經)、急性骨盆腔感染或生殖道感染、子宮畸形或腫瘤、懷孕、子宮外孕高風險。月經週期「不規則」本身並非IUD禁忌——IUD不依賴使用者每日配合、長效可逆,對週期不規則(不易用安全期或每日服藥)者反而是合適選擇(若為含黃體素IUD還可減少經量)。本題答案為「月經週期不規則者」適合裝置。","options":{"A":"不適合。不明原因陰道出血須先查明,為禁忌。","B":"正確(本題答案)。月經週期不規則非禁忌,相對適合長效IUD。","C":"不適合。月經過多者銅T會加重出血。","D":"不適合。嚴重痛經者銅T會加重痛經。"},"sources":["家庭計畫 IUD禁忌","WHO MEC: IUD"]}},"114030-N4-23":{"quick":"妊娠期糖尿病產婦產後避孕,較合適且無代謝/血栓疑慮者為保險套。","detail":{"background":"有妊娠期糖尿病(GDM)病史婦女產後避孕考量:含雌激素的複方口服避孕藥可能影響糖脂代謝與增加血栓風險(尤產後早期、若合併肥胖或血管病變更需謹慎);IUD置入須產後4–6週、且糖尿病者感染風險略增需評估;結紮為永久絕育,除非確定不再生育否則不宜貿然選擇。相對而言「保險套」不影響代謝、不增血栓、可立即使用且防性病,對GDM產婦產後早期最為合適與安全。故本題選保險套。","options":{"A":"須產後4–6週置入,且糖尿病者需評估感染風險,非最即時合適。","B":"含雌激素影響糖脂代謝、增血栓,GDM產婦較不宜為首選。","C":"結紮為永久絕育,除非確定不再生育否則不宜。","D":"正確。保險套不影響代謝、不增血栓、立即可用,最合適。"},"sources":["WHO MEC 糖尿病與避孕","家庭計畫 產後避孕"]}},"101030-N4-1":{"quick":"維持陰道生態:避免過量碳水/糖(減少念珠菌)、勿灌洗、穿棉質透氣內褲。","detail":{"background":"正常陰道生態靠乳酸桿菌(Lactobacillus)將上皮肝醣代謝為乳酸,維持酸性(pH 3.8–4.5)以抑制致病菌。維持衛教重點:(1)勿用清潔液灌洗陰道——破壞菌叢與酸鹼、反增感染;(2)穿棉質透氣內褲、避免久穿緊身褲與護墊悶熱潮濕;(3)如廁後由前往後擦拭;(4)避免攝取過多精製碳水化合物/糖——血糖升高有利念珠菌生長,糖尿病或高糖飲食者反覆黴菌感染風險高;(5)衛生棉條/棉墊勤更換,避免長時間使用(降低毒性休克與孳生)。陷阱:衛生棉條不能用來保持乾爽(長時間使用反增感染與TSS)、純棉內褲應「鼓勵穿著」、不應陰道灌洗。","options":{"A":"錯。長時間使用衛生棉條反增感染與毒性休克風險,非維持乾爽方法。","B":"錯。應「鼓勵」穿棉質透氣內褲,而非避免。","C":"錯。陰道灌洗會破壞菌叢與酸鹼、增加感染,應避免。","D":"正確。減少過多碳水/糖攝取可降低重複性念珠菌(黴菌)感染。"},"sources":["新文京《婦科護理學》陰道生態與衛教","婦女健康 念珠菌陰道炎危險因子"]}},"101030-N4-22":{"quick":"念珠菌(黴菌)陰道炎用抗黴菌藥;metronidazole(Flagyl)是抗厭氧菌/滴蟲藥,對念珠菌無效。","detail":{"background":"念珠菌陰道炎(Candida vulvovaginitis):白色念珠菌過度增生,典型白色乳酪狀分泌物、外陰劇癢、灼熱、紅腫。誘因:抗生素(殺乳酸桿菌)、口服避孕藥/類固醇、糖尿病/高糖、懷孕、免疫低下。治療:抗黴菌藥(局部clotrimazole/miconazole陰道塞劑或口服fluconazole),並去除誘因(暫停口服避孕藥/抗生素/類固醇、控制血糖);外陰可短期類固醇藥膏止癢。Metronidazole(Flagyl)用於滴蟲與細菌性陰道炎(厭氧菌),對念珠菌無效。本題問「除外(不適用)」者即口服metronidazole。","options":{"A":"除外(本題答案)。metronidazole治滴蟲/厭氧菌,對念珠菌無效。","B":"適用。教導抗黴菌陰道塞劑使用。","C":"適用。外陰可短期塗類固醇止癢。","D":"適用。暫停口服避孕藥(誘因之一)有助改善。"},"sources":["新文京《婦科護理學》念珠菌陰道炎","CDC STI Treatment Guidelines: VVC"]}},"102030-N4-35":{"quick":"急性骨盆腔炎典型表現之一為下腹/腹部壓痛(常伴反彈痛、子宮頸搖動痛)。","detail":{"background":"骨盆腔發炎(PID)是上生殖道(子宮內膜、輸卵管、卵巢、骨盆腹膜)的感染,常由披衣菌、淋病雙球菌等性傳染病原上行,或放置IUD、產後/流產後感染。典型症狀:下腹兩側壓痛、子宮頸搖動痛(cervical motion tenderness)、附件壓痛、發燒、異常陰道分泌物(膿狀)、性交痛;嚴重者反彈痛、腹膜炎徵象。合併症:輸卵管沾黏致不孕、子宮外孕、慢性骨盆痛、輸卵管卵巢膿瘍。本題典型症狀為「腹部有壓痛感」。陷阱:腹部鼓音、腸音增加、會陰皮膚發紅非PID典型。","options":{"A":"錯。腹部鼓音非PID典型表現。","B":"錯。腸音增加非PID特徵。","C":"錯。會陰皮膚發紅非PID典型。","D":"正確。下腹/腹部壓痛(伴子宮頸搖動痛)為PID典型症狀。"},"sources":["新文京《婦科護理學》骨盆腔炎","CDC STI Guidelines: PID"]}},"102110-N4-36":{"quick":"口服避孕藥反而降低PID風險(使黏液變稠);多重性伴侶、放置IUD、陰道灌洗才是高危。","detail":{"background":"PID危險因子:性活躍且多重性伴侶、性傳染病(披衣菌/淋病)、近期放置子宮內避孕器(置入時上行感染)、陰道灌洗(破壞防禦並把病原沖入上生殖道)、年輕(子宮頸柱狀上皮外露易感染)、過去PID史、不安全性行為。保護因子:屏障避孕(保險套)、單一性伴侶、口服避孕藥(使子宮頸黏液變稠,降低上行感染、降低PID風險)。本題問「不是高危」者即「近期開始服用口服避孕藥」。","options":{"A":"本題答案。口服避孕藥使黏液變稠,反降低PID風險,非高危。","B":"是高危。放置IUD時可能上行感染。","C":"是高危。多重性伴侶增加性傳染病與PID。","D":"是高危。陰道灌洗破壞防禦並把病原沖入上生殖道。"},"sources":["CDC STI Guidelines: PID risk","新文京《婦科護理學》PID"]}},"103100-N4-36":{"quick":"糖尿病(高血糖)婦女最易發生念珠菌(黴菌)陰道炎。","detail":{"background":"不同陰道炎的好發與特徵:(1)念珠菌陰道炎——白色乳酪狀分泌物、劇癢,好發於糖尿病/高血糖、抗生素或口服避孕藥使用者、懷孕、免疫低下;高血糖使陰道肝醣與葡萄糖增加,利於念珠菌生長,故糖尿病婦女最易發生。(2)滴蟲陰道炎——黃綠泡沫狀、腥臭、草莓子宮頸,屬性傳染。(3)細菌性陰道炎(BV)——灰白稀薄、魚腥味、whiff test陽性、clue cells,乳酸桿菌減少。(4)萎縮性陰道炎——停經後雌激素缺乏,黏膜變薄乾澀。本題糖尿病中年婦女最易為念珠菌。","options":{"A":"細菌性陰道炎與菌叢失衡有關,非糖尿病最典型。","B":"萎縮性陰道炎好發停經後雌激素缺乏者。","C":"正確。高血糖利念珠菌生長,糖尿病婦女最易念珠菌陰道炎。","D":"非特異性陰道炎非糖尿病特有。"},"sources":["新文京《婦科護理學》陰道炎鑑別","CDC STI Guidelines: VVC"]}},"104030-N4-36":{"quick":"PID不宜以子宮內避孕器避孕(會增上行感染);性伴侶同治、多喝水、增強免疫才正確。","detail":{"background":"骨盆腔發炎護理指導:(1)避孕——避免IUD(置入或留置增上行感染風險),改以保險套(防性病又防再感染);(2)性伴侶應一起接受治療(性傳染原雙方根治、避免乒乓感染),治療期間禁慾或全程戴套;(3)足量水分(約2000 c.c./天)、營養與休息以增強免疫;(4)規則完成抗生素療程、採半坐臥以利引流、衛教安全性行為。本題問「錯誤」者為「建議以IUD避孕」。","options":{"A":"錯誤(本題答案)。PID不宜用IUD避孕,會增上行感染。","B":"正確。性伴侶應一起治療。","C":"正確。每天約2000 c.c.水分。","D":"正確。增強免疫力有助預防感染。"},"sources":["新文京《婦科護理學》PID護理","CDC STI Guidelines"]}},"104100-N4-29":{"quick":"面對性病可能由配偶傳染,最恰當回應是請配偶一起檢查與治療(避免乒乓感染),非歸咎或隱瞞。","detail":{"background":"性傳染病的伴侶通知與治療是控制與根治關鍵:當婦女懷疑被配偶傳染、情緒激動時,護理師應以同理、不批判態度回應,說明性傳染病常雙向傳染、需「伴侶同時檢查與治療」以根治並避免重複(乒乓)感染,並維護隱私。不宜:鼓動拒絕性生活/對立、建議隱瞞配偶(無法根治、持續傳染)、或迴避伴侶治療的必要性。本題最恰當為「可能是先生傳染,請先生一起來檢查治療」。","options":{"A":"正確。說明可能雙向傳染並請配偶一起檢查治療,符合伴侶同治原則。","B":"不恰當。挑起對立、建議拒絕性生活非治療重點。","C":"不恰當。建議隱瞞配偶無法根治且持續傳染。","D":"雖強調治療,但忽略「伴侶必須一起檢查治療」的核心,非最佳。"},"sources":["CDC STI Guidelines: partner therapy","新文京《婦科護理學》性傳染病護理"]}},"104100-N4-36":{"quick":"黃綠色、量多、泡沫狀、腥臭的分泌物為陰道滴蟲感染的典型表現。","detail":{"background":"依分泌物特徵辨陰道炎:(1)滴蟲陰道炎(Trichomonas vaginalis)——黃綠色、泡沫狀、量多、腥臭,外陰搔癢灼熱,內診可見「草莓樣子宮頸」(點狀出血),屬性傳染病;(2)念珠菌——白色乳酪狀、劇癢;(3)細菌性陰道炎——灰白稀薄、魚腥味;(4)萎縮性陰道炎——停經後黏膜薄、乾澀,分泌物少。治療滴蟲用metronidazole,性伴侶須同治、治療期間戴套或禁慾、服藥忌酒。本題泡沫狀黃綠腥臭為滴蟲。","options":{"A":"念珠菌為白色乳酪狀,非黃綠泡沫。","B":"正確。黃綠泡沫腥臭為滴蟲陰道炎典型。","C":"披衣菌常無症狀或稀薄分泌物,非泡沫狀。","D":"萎縮性陰道炎分泌物少、乾澀,非泡沫腥臭。"},"sources":["新文京《婦科護理學》陰道炎鑑別","CDC STI Guidelines: Trichomoniasis"]}},"104100-N4-37":{"quick":"滴蟲陰道炎護理:性伴侶應同時治療(2)、治療期間行房戴保險套(3)。","detail":{"background":"滴蟲陰道炎(性傳染)護理重點:(1)藥物——metronidazole(口服),性伴侶「必須同時治療」以免乒乓感染;(2)治療期間性行為應全程戴保險套或禁慾;(3)服metronidazole期間及之後72小時內「禁酒」(避免雙硫侖樣反應:噁心嘔吐心悸潮紅);(4)不可陰道灌洗(破壞菌叢、無助治療);(5)滴蟲非雌激素缺乏所致,不需補充女性荷爾蒙。本題正確組合為「性伴侶同治(2)+行房戴套(3)」。陷阱:每天陰道灌洗(1)與補充女性荷爾蒙(4)皆錯。","options":{"A":"含「每天陰道灌洗」錯。","B":"含「每天陰道灌洗」錯。","C":"正確。性伴侶同時治療+行房戴保險套。","D":"含「補充女性荷爾蒙」錯,滴蟲非雌激素缺乏所致。"},"sources":["CDC STI Guidelines: Trichomoniasis","新文京《婦科護理學》滴蟲陰道炎"]}},"104100-N4-40":{"quick":"披衣菌(砂眼披衣菌)生殖道感染常無症狀,易上行致輸卵管炎、沾黏而造成不孕。","detail":{"background":"易致不孕的生殖道感染以「披衣菌(Chlamydia trachomatis)」與「淋病」最典型:兩者常上行引起骨盆腔發炎(PID)、輸卵管炎與沾黏、阻塞,造成不孕與子宮外孕風險;披衣菌尤其常「無症狀」而延誤治療,是已開發國家不孕與輸卵管性不孕的重要原因。相較之下,念珠菌、滴蟲、嗜血桿菌(細菌性陰道炎)雖造成不適,較少直接導致輸卵管阻塞性不孕。預防與篩檢披衣菌、伴侶同治、安全性行為可降低不孕。本題答案為披衣菌陰道炎。","options":{"A":"正確。披衣菌常無症狀、上行致輸卵管沾黏,易造成不孕。","B":"嗜血桿菌(BV)較少直接致輸卵管性不孕。","C":"滴蟲造成不適,較少直接致輸卵管阻塞性不孕。","D":"念珠菌為局部感染,不致輸卵管性不孕。"},"sources":["CDC STI Guidelines: Chlamydia","新文京《婦科護理學》性傳染病與不孕"]}},"105030-N4-38":{"quick":"滴蟲陰道炎以Metronidazole(Flagyl)為最有效治療藥物。","detail":{"background":"陰道滴蟲(Trichomonas vaginalis)為性傳染原蟲:(1)傳染——主要經性接觸,也可能經潮濕物品短暫存活傳播(故「只會經直接接觸」敘述太絕對);(2)族群——任何年齡性活躍女性皆可感染,停經後不一定較少;(3)治療——首選metronidazole或tinidazole(對厭氧/原蟲有效),為最有效藥物,服藥期間禁酒;(4)伴侶——「必須同時治療」,不論伴侶有無症狀(男性多無症狀但帶原),否則乒乓感染。本題正確敘述為「Metronidazole為最有效治療藥物」。","options":{"A":"錯。滴蟲主要經性接觸,但非「只會」直接接觸,潮濕物品亦可能短暫傳播。","B":"錯。停經後並非較少感染。","C":"正確。metronidazole為滴蟲最有效治療。","D":"錯。性伴侶不論有無症狀都應同時治療。"},"sources":["CDC STI Guidelines: Trichomoniasis","新文京《婦科護理學》滴蟲陰道炎"]}},"106111-N4-38":{"quick":"陰道感染護理採半坐臥(利引流),非垂頭仰臥;塞劑後平躺、四環素避曬、伴侶同治皆正確。","detail":{"background":"陰道/骨盆腔感染護理:(1)休息姿勢採半坐臥(Fowler)以利分泌物向下引流、避免上行;「垂頭仰臥(頭低腳高)」反促分泌物上行,為錯誤;(2)陰道栓劑使用後宜平躺約30分鐘助吸收、睡前用較佳;(3)服用四環素類(tetracycline/doxycycline)會增加光敏感,須避免曝曬陽光、空腹服並避與含鈣/鐵/制酸劑同服;(4)性伴侶同時接受治療。本題問「錯誤」者為「採垂頭仰臥式休息」。","options":{"A":"正確。陰道栓劑後平躺30分鐘助吸收。","B":"正確。四環素增光敏感,應避免曬太陽。","C":"錯誤(本題答案)。應採半坐臥利引流,而非垂頭仰臥(會促上行)。","D":"正確。性傳染相關感染性伴侶應同治。"},"sources":["新文京《婦科護理學》陰道感染護理","藥理 四環素衛教"]}},"107030-N4-40":{"quick":"急性骨盆腔炎不可大小便後做會陰灌洗(會把病原沖入上生殖道);應半坐臥、靜脈抗生素、暫停性生活。","detail":{"background":"急性PID照護:(1)抗生素——依醫囑靜脈/口服抗生素涵蓋淋病、披衣菌與厭氧菌,完成療程;(2)姿勢——採半坐臥(Fowler)促引流、減少上行;(3)暫停性生活、性伴侶同治、安全性行為衛教;(4)會陰護理由前往後、保持清潔乾燥,但「不可會陰灌洗」(沖洗會把下生殖道病原帶入上生殖道、加重感染);(5)監測發燒、疼痛、分泌物變化。本題問「錯誤」者為「大小便後執行會陰灌洗」。","options":{"A":"正確。應暫停性生活,避免傳染與加重。","B":"錯誤(本題答案)。會陰灌洗會把病原沖入上生殖道,不可做。","C":"正確。病情穩定可協助下床活動。","D":"正確。依醫囑靜脈滴注抗生素。"},"sources":["CDC STI Guidelines: PID","新文京《婦科護理學》PID護理"]}},"107110-N4-39":{"quick":"流產後發燒、下腹壓痛、子宮頸膿狀分泌,培養出淋病/披衣菌/黴漿菌,最可能為骨盆腔炎(PID)。","detail":{"background":"流產(或產後)後出現發燒、下腹痛、子宮頸口膿狀分泌物,且細菌培養為淋病雙球菌、披衣菌、黴漿菌等性傳染/上行病原,典型為上生殖道感染——骨盆腔炎(PID)。流產/分娩後子宮頸開放、子宮內膜創面,易上行感染。鑑別:子宮外孕以停經後出血+單側劇痛+可能休克為主、無膿狀分泌與多重性病原;巴氏腺囊腫為外陰局部腫塊;卵巢囊腫多無發燒膿狀分泌。PID需靜脈/口服抗生素、伴侶同治,延誤可致不孕。本題診斷為骨盆腔炎。","options":{"A":"子宮外孕以停經+單側劇痛+出血為主,非膿狀分泌+多重病原。","B":"巴氏腺囊腫為外陰局部腫塊,非此表現。","C":"卵巢囊腫多無發燒與膿狀分泌物。","D":"正確。流產後發燒、下腹壓痛、膿狀分泌+性病原培養,診斷為骨盆腔炎。"},"sources":["CDC STI Guidelines: PID","新文京《婦科護理學》流產後感染"]}},"108020-N4-39":{"quick":"骨盆腔炎常見且重要的合併症為不孕(輸卵管沾黏阻塞)。","detail":{"background":"PID特性:(1)病原——多為「多種菌」混合(淋病、披衣菌合併厭氧菌等),非單一病原;(2)合併症——輸卵管炎與沾黏、阻塞→不孕、子宮外孕、慢性骨盆痛、輸卵管卵巢膿瘍,其中「不孕」為最重要的長期合併症;(3)治療期間——應「禁慾」並性伴侶同治,非不需禁慾;(4)症狀——常有異常(膿狀)陰道分泌物、下腹痛、發燒。本題正確敘述為「常見之合併症為不孕」。","options":{"A":"錯。PID常為多種病原混合感染。","B":"正確。輸卵管沾黏阻塞致不孕為重要合併症。","C":"錯。治療期間應禁慾並伴侶同治。","D":"錯。PID常有異常(膿狀)陰道分泌物。"},"sources":["CDC STI Guidelines: PID complications","新文京《婦科護理學》PID"]}},"108110-N4-37":{"quick":"口服metronidazole(Flagyl)治療期間「不可飲酒」(雙硫侖樣反應)。","detail":{"background":"Metronidazole治滴蟲陰道炎護理指導:(1)服藥期間及停藥後至少48–72小時「禁酒」——藥物抑制乙醛脫氫酶,飲酒會引起雙硫侖(disulfiram)樣反應:潮紅、噁心嘔吐、心悸、頭痛;(2)性伴侶「同時」治療,不應等婦女治療無效後才治伴侶;(3)不可陰道清水沖洗或灌洗(破壞菌叢、無助療效);(4)治療滴蟲與口服避孕藥無必然關係,不需特地配合口服避孕藥。本題正確為「服藥期間不可飲酒」。","options":{"A":"錯。性伴侶應「同時」治療,而非無效後才治。","B":"錯。不可陰道沖洗灌洗。","C":"正確。服metronidazole期間禁酒(雙硫侖樣反應)。","D":"錯。治療滴蟲不需配合口服避孕藥。"},"sources":["藥理 metronidazole-酒精交互作用","CDC STI Guidelines"]}},"109030-N4-35":{"quick":"萎縮性陰道炎因「雌激素」缺乏使黏膜萎縮變薄,非黃體素缺乏。","detail":{"background":"萎縮性陰道炎(atrophic vaginitis):好發於停經後或卵巢切除、雌激素低下者。機轉:雌激素缺乏→陰道上皮萎縮變薄、肝醣與乳酸桿菌減少→陰道pH升高(變鹼)→防禦力下降、易續發其他菌感染;症狀為陰道乾澀、分泌物改變、外陰搔癢刺痛、性交痛、易出血。治療:局部或全身雌激素補充、陰道潤滑/保濕劑。本題問「錯誤」者:選項說「因黃體素缺乏使陰道萎縮」——應為「雌激素」缺乏,故錯誤。","options":{"A":"正確。常見於更年期後或卵巢切除(雌激素低下)婦女。","B":"錯誤(本題答案)。應為「雌激素」缺乏致黏膜萎縮,非黃體素。","C":"正確。雌激素缺乏使pH升高,利其他菌生長。","D":"正確。主要症狀為分泌物、外陰搔癢與刺痛。"},"sources":["新文京《婦科護理學》萎縮性陰道炎","NAMS 泌尿生殖道萎縮"]}},"109030-N4-37":{"quick":"念珠菌陰道炎治療需停用口服避孕藥、抗生素與類固醇(這些為誘發因子)。","detail":{"background":"各類陰道感染護理要點:(1)念珠菌——治療同時應停用或檢視誘發因子:廣效抗生素(殺乳酸桿菌)、口服避孕藥(雌激素)、類固醇與控制血糖,並用抗黴菌藥;(2)滴蟲——性傳染,治療期間應戴套或禁慾、性伴侶「同時」治療(非「完全禁止」性行為的措辭重點,而是伴侶同治+保護);(3)披衣菌——性伴侶「必須」治療,藥物為doxycycline或azithromycin,而非gentamicin。本題正確敘述為「念珠菌治療需停用口服避孕藥、抗生素與類固醇」。","options":{"A":"正確。念珠菌治療應停用口服避孕藥/抗生素/類固醇等誘因。","B":"敘述不精確;滴蟲治療重點為伴侶同治+戴套,而非僅「完全禁止」。","C":"錯。披衣菌患者的性伴侶需治療。","D":"錯。披衣菌應用doxycycline/azithromycin,非Gentamycin。"},"sources":["CDC STI Guidelines","新文京《婦科護理學》陰道炎護理"]}},"109110-N4-39":{"quick":"外陰搔癢、黃綠泡沫狀有異味分泌物、草莓狀子宮頸,為陰道鞭毛滴蟲感染。","detail":{"background":"「草莓樣子宮頸(strawberry cervix)」+黃綠泡沫狀惡臭分泌物+外陰搔癢,是滴蟲陰道炎(Trichomonas vaginalis,陰道鞭毛蟲)的典型組合:點狀子宮頸出血形成草莓外觀,屬性傳染病。治療metronidazole、伴侶同治、戴套禁酒。鑑別:砂眼披衣菌多無症狀或稀薄分泌;白色念珠菌為白色乳酪狀、劇癢、無泡沫;梅毒螺旋體以硬下疳、皮疹、潛伏期表現,非陰道分泌物為主。本題答案為陰道鞭毛滴蟲。","options":{"A":"砂眼披衣菌常無症狀,非草莓子宮頸+泡沫分泌。","B":"念珠菌為白色乳酪狀,非黃綠泡沫。","C":"梅毒以硬下疳/皮疹為主,非此分泌型態。","D":"正確。草莓子宮頸+黃綠泡沫惡臭=陰道鞭毛滴蟲。"},"sources":["CDC STI Guidelines: Trichomoniasis","新文京《婦科護理學》滴蟲"]}},"109110-N4-40":{"quick":"毒性休克症候群(TSS)多發生於經期使用衛生棉條的女性。","detail":{"background":"毒性休克症候群(TSS, toxic shock syndrome):多由金黃葡萄球菌(部分A群鏈球菌)外毒素(TSST-1)引起,典型與「經期長時間使用高吸力衛生棉條」相關(棉條滯留提供細菌增生與毒素吸收環境),也見於手術傷口、產後。臨床:突發高燒、低血壓(休克)、瀰漫性紅疹後脫皮、多器官系統受累(腸胃、肝腎、肌肉、中樞)。預防衛教:衛生棉條勤更換(每4–8小時)、夜間改用衛生棉、避免高吸力棉條長時間使用。本題正確敘述為「多發生於經期使用衛生棉條」。","options":{"A":"正確。TSS多與經期長時間使用衛生棉條相關。","B":"錯。為金黃葡萄球菌(外毒素)所致,非黴漿菌。","C":"錯。臨床常見高燒。","D":"錯。為多器官系統受累,非單一系統。"},"sources":["CDC; 新文京《婦科護理學》毒性休克症候群","婦女健康 衛生棉條安全"]}},"110110-N4-35":{"quick":"骨盆腔炎住院治療應護理指導安全性生活;不可陰道灌洗、不應過度限水、宜半坐臥而非側臥引流。","detail":{"background":"PID住院護理:(1)衛教安全性生活與伴侶同治、暫停性行為,以根治並防再感染;(2)採半坐臥(Fowler)促分泌物向下引流(非單純側臥);(3)「不可」陰道灌洗(沖入病原、破壞防禦);(4)維持足量水分(發燒需補水,而非限液1000 c.c.內);(5)依醫囑抗生素、監測發燒疼痛分泌物。本題正確者為「護理指導安全性生活」。","options":{"A":"正確。應護理指導安全性生活(伴侶同治、防再感染)。","B":"不佳。應採半坐臥促引流,非側臥。","C":"錯。不可陰道灌洗。","D":"錯。發燒需補水,不應限液1000 c.c.內。"},"sources":["CDC STI Guidelines: PID","新文京《婦科護理學》PID護理"]}},"111030-N4-38":{"quick":"本題為送分題(各選項均給分)。骨盆腔炎臨床徵候包含下腹兩側悶痛與內診子宮頸搖動痛。","detail":{"background":"PID臨床評估要點(本題經評定為送分,各答案均給分):典型徵候包括下腹兩側鈍痛/悶痛、子宮頸搖動痛(cervical motion tenderness,內診移動子宮頸引發疼痛)、附件壓痛、發燒、膿狀陰道分泌物、性交痛;嚴重者反彈痛。選項中「下腹兩側鈍鈍悶痛」與「內診子宮頸有移動性疼痛」皆符合;而「腹部腫大腰圍變大」較像腫瘤/腹水、「原發性月經過少」非PID特徵。由於選項敘述存在爭議,官方判定送分,各答案均給分。臨床仍以下腹痛、子宮頸搖動痛、附件壓痛三聯與發燒、膿性分泌為診斷重點。","options":{"A":"下腹兩側悶痛符合PID臨床表現。","B":"腹部腫大腰圍變大較像腫瘤/腹水,非PID典型(本題送分)。","C":"原發性月經過少非PID特徵(本題送分)。","D":"內診子宮頸搖動痛為PID重要徵候。"},"sources":["CDC STI Guidelines: PID 診斷","考選部 公告:本題送分"]}},"111110-N4-39":{"quick":"外陰搔癢灼熱、濃稠白色乳酪狀附著物,為白色念珠球菌陰道炎。","detail":{"background":"白色念珠菌陰道炎典型:外陰劇癢、灼熱、紅腫,分泌物呈白色乳酪狀(curd-like)、附著於陰道壁,排尿/性交不適。誘因:抗生素、口服避孕藥、類固醇、糖尿病/高血糖、懷孕、免疫低下。治療抗黴菌藥(局部塞劑或口服fluconazole)並去除誘因。鑑別:砂眼披衣菌多無症狀;梅毒以硬下疳/皮疹;陰道鞭毛滴蟲為黃綠泡沫惡臭+草莓子宮頸。本題乳酪狀白色附著物=白色念珠球菌。","options":{"A":"砂眼披衣菌多無症狀,非乳酪狀分泌。","B":"正確。白色乳酪狀附著物+外陰搔癢灼熱=念珠菌。","C":"梅毒以硬下疳/皮疹為主。","D":"滴蟲為黃綠泡沫惡臭,非乳酪狀。"},"sources":["CDC STI Guidelines: VVC","新文京《婦科護理學》念珠菌陰道炎"]}},"112030-N4-39":{"quick":"尖型濕疣(菜花)由HPV第6、11型引起(非16、18型);16、18型主要與子宮頸癌相關。","detail":{"background":"尖型濕疣(condyloma acuminata, 菜花):由人類乳突病毒(HPV)引起,「低危險型」HPV-6、11為主(約90%),造成生殖器、肛門周圍菜花樣疣狀增生;屬性傳染病,潛伏期約2週–8個月。治療:局部藥物(podophyllin、imiquimod、三氯醋酸)、冷凍(液態氮)、電燒、雷射或手術切除,易復發。預防:HPV疫苗(四價/九價含6、11型可防菜花)、安全性行為。陷阱:HPV「16、18」型為「高危險型」,主要與子宮頸癌/癌前病變相關,非菜花主因;故本題「由HPV 16、18引起」為錯誤敘述。","options":{"A":"錯誤(本題答案)。菜花主要由低危險型HPV-6、11引起;16、18為致癌高危型。","B":"正確。潛伏期約2週至8個月。","C":"正確。常見於生殖器、肛門等部位。","D":"正確。治療含雷射、液態氮冷凍、藥物等。"},"sources":["CDC STI Guidelines: Genital warts/HPV","新文京《婦科護理學》尖型濕疣"]}},"113030-N4-25":{"quick":"面對罹患梅毒、擔憂婚姻的婦女,最適當是傾聽其不安、鼓勵與配偶共同面對並接受治療。","detail":{"background":"性傳染病(如梅毒)患者常伴隨羞愧、恐懼、婚姻關係焦慮等情緒,護理應以治療性溝通為先:傾聽、同理、不批判,協助情緒宣洩,再循序衛教疾病與治療(梅毒以penicillin為首選,非cefazolin)、伴侶通知與同治的重要性,並維護隱私。不宜:命令式要求立即聯絡配偶、貶抑情緒(「哭泣無法解決」)、或在未評估與未獲同意下逕行施打非首選藥物。本題最適當為「傾聽不安與擔憂,鼓勵與先生共同面對、接受治療」。","options":{"A":"過於命令、忽略情緒,且未先建立信任。","B":"梅毒首選為penicillin而非cefazolin,且未處理情緒。","C":"貶抑情緒,非治療性溝通。","D":"正確。傾聽同理、鼓勵與配偶共同面對並治療。"},"sources":["CDC STI Guidelines: Syphilis(penicillin)","新文京 治療性溝通"]}},"101030-N4-19":{"quick":"急性子宮頸炎時不宜做子宮頸抹片(發炎細胞干擾判讀、易出血),應先治療發炎再採檢。","detail":{"background":"子宮頸抹片(Pap smear)採檢注意:應避開月經期、發炎急性期;急性子宮頸炎時大量發炎細胞與膿會干擾細胞判讀、且易出血,應先治療發炎後再採檢。採檢前24–48小時避免性行為、陰道塞劑、灌洗。月經結束後數天(如第5天)為適當時機。子宮頸曾做錐狀切除(conization)者仍可、也應追蹤抹片;3天前有性生活雖建議避開24–48小時,但非「絕對不適合」的首要禁忌。本題「不適合」抹片者為「急性子宮頸炎」。","options":{"A":"正確(本題答案)。急性子宮頸炎時不宜抹片,應先治療發炎。","B":"適合。月經結束後第5天為良好採檢時機。","C":"仍可且應追蹤;錐狀手術後並非抹片禁忌。","D":"建議避開24–48小時,但非如急性發炎般的絕對不適合。"},"sources":["國健署 子宮頸抹片採檢須知","新文京《婦科護理學》子宮頸癌篩檢"]}},"101030-N4-20":{"quick":"體腔內放射線治療期間應採「低渣(低纖)飲食」減少腸蠕動,「高纖維」飲食為錯誤。","detail":{"background":"子宮頸癌體腔內放射線治療(腔內近接治療, brachytherapy)護理:(1)放射防護——限制孕婦及孩童訪客、限制接觸時間與距離(時間短、距離遠、屏蔽);(2)治療期間病人需臥床、限制活動以避免放射源(填充物)移位,鼓勵床上運動防血栓但不可大幅翻動;(3)飲食採「低渣(低纖)」以減少腸蠕動與排便、避免放射源移位與腹瀉,而非高纖維;(4)治療前須評估血球(如白血球>3000、血紅素>10)達標才施行。本題問「錯誤」者為「高蛋白高纖維飲食」(應低渣低纖)。","options":{"A":"正確。限制孕婦及孩童訪客(放射防護)。","B":"錯誤(本題答案)。應採低渣低纖飲食減少腸蠕動,非高纖維。","C":"正確。治療期間鼓勵適度床上運動防血栓(但避免放射源移位)。","D":"正確。需評估白血球/血紅素達標才治療。"},"sources":["新文京《婦科護理學》子宮頸癌放療護理","腔內近接治療護理"]}},"104030-N4-35":{"quick":"高齡本身非子宮頸癌的危險因子;HPV感染、性病史、免疫低下(HIV)才是。","detail":{"background":"子宮頸癌危險因子:核心為「持續感染高危險型人類乳突病毒(HPV-16、18等)」;其他:多重性伴侶、早年初次性行為、性傳染病史、吸菸、免疫抑制(如HIV/愛滋)、長期口服避孕藥、多產、社經弱勢與篩檢不足。預防:HPV疫苗、安全性行為、定期抹片。本題問「不是」危險因子者——「高齡婦女」並非子宮頸癌的危險因子(雖好發於中年,但年齡本身非如HPV般的致病危險因子);HPV、HIV、性病史皆為危險因子。","options":{"A":"是危險因子。HPV是子宮頸癌主因。","B":"是危險因子。HIV/免疫低下增加風險。","C":"是危險因子。性病史與多重性伴侶相關。","D":"本題答案。高齡本身非子宮頸癌危險因子。"},"sources":["國健署 子宮頸癌防治","新文京《婦科護理學》子宮頸癌危險因子"]}},"105030-N4-36":{"quick":"子宮頸癌早期可有接觸性出血(性交後出血)與異常陰道出血,屬重要早期表徵。","detail":{"background":"子宮頸癌:(1)危險群為「低」社經/篩檢不足、HPV感染、多重性伴侶、早年性行為、吸菸者,非高社經;(2)早期表現——常見「接觸性出血(性交後出血)」、不規則陰道出血、血性或惡臭分泌物,題目以此為早期病徵;(3)篩檢——有性經驗女性應定期抹片,65歲後若先前篩檢正常可依指引評估,並非一律「無需」;(4)HPV疫苗——建議於青春期(性行為前)接種效果最佳,非僅成年女性。本題正確敘述為「性交疼痛/接觸性出血與異常陰道出血為早期病徵」。","options":{"A":"錯。高社經非高危險群,篩檢不足/HPV才是。","B":"正確。接觸性出血與異常陰道出血為子宮頸癌可能早期表徵。","C":"錯。並非65歲後一律無需抹片,須依篩檢史評估。","D":"錯。HPV疫苗建議青春期(性行為前)接種最佳。"},"sources":["國健署 子宮頸癌篩檢/HPV疫苗","新文京《婦科護理學》子宮頸癌"]}},"105090-N4-38":{"quick":"人類乳突病毒(HPV)感染與子宮頸癌形成最相關。","detail":{"background":"子宮頸癌的主要病因是持續性感染高危險型人類乳突病毒(HPV,尤16、18型,約佔七成);HPV經性接觸感染,持續感染導致子宮頸上皮內病變(CIN)進展為癌。其他病原(大腸桿菌、金黃葡萄球菌、淋病雙球菌)與子宮頸癌「形成」無直接因果。防治三道防線:HPV疫苗(初級預防)、定期子宮頸抹片/HPV檢測(次級預防早期偵測)、治療癌前病變。本題答案為人類乳突病毒。","options":{"A":"大腸桿菌與子宮頸癌無因果。","B":"金黃葡萄球菌與子宮頸癌無因果。","C":"正確。HPV持續感染是子宮頸癌主因。","D":"淋病雙球菌與子宮頸癌無直接因果。"},"sources":["IARC/WHO HPV與子宮頸癌","國健署 子宮頸癌防治"]}},"106030-N4-40":{"quick":"較早有性經驗(早年初次性行為)為子宮頸癌的危險因子。","detail":{"background":"子宮頸癌危險因子再整理:持續HPV感染、早年(青春期)初次性行為(子宮頸轉換區未成熟、較易受HPV感染)、多重性伴侶、性病史、吸菸、免疫抑制、多產、長期口服避孕藥、篩檢不足。保護:單一性伴侶、安全性行為、HPV疫苗、定期抹片。本題危險因子為「較早有性經驗」;糖尿病、單一性伴侶、未生育皆非子宮頸癌的主要危險因子(未生育反而較是子宮內膜癌相關)。","options":{"A":"糖尿病非子宮頸癌主要危險因子。","B":"單一性伴侶為保護因子。","C":"未生育較與子宮內膜癌相關,非子宮頸癌主因。","D":"正確。較早有性經驗增加HPV感染與子宮頸癌風險。"},"sources":["國健署 子宮頸癌危險因子","新文京《婦科護理學》"]}},"106110-N4-39":{"quick":"晚期子宮頸癌用Cisplatin後耳鳴與聽力喪失,屬「化療(cisplatin)的耳毒性/神經毒性」,非放射線所致。","detail":{"background":"Cisplatin(順鉑)常用於子宮頸癌的同步化放療,其重要副作用:腎毒性(需水化)、耳毒性(耳鳴、高頻聽力喪失)、周邊神經病變(手腳麻木、感覺異常,對冷刺激敏感)、噁心嘔吐、骨髓抑制。耳鳴與聽力喪失是cisplatin直接耳毒性的表現,屬化療毒性而非放射線使DNA鍵斷裂的效應(放射線DNA斷裂是其殺癌機轉,但不解釋耳毒性)。護理:嚴重時減量或停藥、監測聽力與腎功能、神經病變者保暖避冷刺激、防跌。本題問「錯誤」者為「此症狀為放射線導致DNA鍵斷裂」(實為化療耳毒性)。","options":{"A":"正確護理。周邊神經病變對冷敏感,教導使用手套圍巾避冷刺激。","B":"正確。嚴重耳毒/神經毒性時需降低化療劑量。","C":"錯誤(本題答案)。耳鳴聽力喪失為cisplatin耳毒性,非放射線DNA斷裂所致。","D":"正確。此屬化療引起的周邊(及耳)神經毒性。"},"sources":["藥理 Cisplatin 耳毒性/神經毒性","NCCN 子宮頸癌同步化放療"]}},"106111-N4-36":{"quick":"曾感染HPV的婦女子宮頸癌風險最高,應列為優先衛教與篩檢對象。","detail":{"background":"子宮頸癌預防衛教的優先對象,應鎖定風險最高者:曾感染高危險型HPV的婦女進展為子宮頸上皮病變與癌的風險最高,須加強定期篩檢與追蹤,故列為優先。其餘:單一性伴侶且使用保險套者風險較低;長期抽菸雖為危險因子但若無HPV感染風險相對較低;故四位中以「曾感染HPV的42歲婦女」最該優先衛教。本題答案為C。","options":{"A":"單一性伴侶風險較低,非最優先。","B":"抽菸是危險因子,但若無HPV感染,風險低於已感染者。","C":"正確。曾感染HPV者風險最高,應優先衛教與篩檢。","D":"性行為使用保險套者風險較低。"},"sources":["國健署 子宮頸癌篩檢","IARC HPV"]}},"108110-N4-2":{"quick":"人類乳突病毒(HPV)感染是子宮頸癌的高危險因素。","detail":{"background":"再次確認:子宮頸癌的高危險病原為「人類乳突病毒(HPV)」,尤其高危險型16、18型持續感染。梅毒螺旋體、淋病雙球菌雖屬性傳染病,但與子宮頸癌「形成」無直接因果;單純疱疹病毒(HSV-2)過去曾被討論為協同因子,但主因仍是HPV。預防:HPV疫苗+定期抹片/HPV檢測+安全性行為。本題答案為HPV。","options":{"A":"梅毒螺旋體與子宮頸癌無直接因果。","B":"淋病雙球菌與子宮頸癌無直接因果。","C":"疱疹病毒曾被視為協同因子,但主因為HPV。","D":"正確。HPV(人類乳突病毒)為子宮頸癌高危險病原。"},"sources":["IARC/WHO HPV","國健署 子宮頸癌防治"]}},"109030-N4-39":{"quick":"子宮頸抹片是目前預防(早期偵測)子宮頸癌最好的方式。","detail":{"background":"子宮頸抹片(Pap smear)是篩檢子宮頸癌前病變與早期癌的核心工具,可大幅降低子宮頸癌發生率與死亡率,為「目前預防子宮頸癌最好的方式(次級預防)」。台灣國健署提供30歲以上「有性經驗」婦女子宮頸抹片(近年並推動HPV檢測與年輕族群方案)。採檢前須避免陰道沖洗(會洗掉細胞、影響判讀),避開月經與發炎期。無性經驗者感染HPV機率極低,非一律每3年篩檢。本題正確敘述為「子宮頸抹片是預防子宮頸癌最好方式」。","options":{"A":"敘述不精確;補助對象為30歲以上有性經驗婦女(且方案會調整),非「35歲以上一年一次」固定說法。","B":"錯。無性經驗者風險極低,非不論有無性經驗都要每3年篩檢。","C":"錯。檢查前不可沖洗陰道(會洗掉細胞影響判讀)。","D":"正確。子宮頸抹片為預防子宮頸癌最好的方式。"},"sources":["國健署 子宮頸抹片政策","新文京《婦科護理學》"]}},"110030-N4-38":{"quick":"根除性子宮切除術後可能因神經損傷致排尿問題,需接受膀胱訓練。","detail":{"background":"子宮頸癌護理:(1)根除性子宮切除(radical hysterectomy)需廣泛切除子宮旁組織,易傷及支配膀胱的自主神經,術後常見排尿功能障礙(尿瀦留/排空不全),需留置導尿、膀胱訓練、教導定時排尿與餘尿監測;(2)全子宮切除術後一般需約6–8週恢復,1個月內仍應避免提重物、劇烈活動與性行為(非1個月即可爬樓梯提重物);(3)放療部位皮膚乾燥搔癢應依指示護理,「不可自行隨意塗抹乳液」(某些含金屬或油性製劑會影響放療),須經醫護指示;(4)放療前血球標準一般為白血球>3000、血紅素>10(非2000/12)。本題正確為「根除性子宮切除術後需膀胱訓練」。","options":{"A":"正確。根除性子宮切除傷及膀胱神經,術後需膀胱訓練。","B":"錯。全子宮切除術後約6–8週才恢復,1個月內勿提重物。","C":"錯。放療部位不可自行隨意塗抹乳液,須依醫護指示。","D":"錯。放療前一般要求白血球>3000、血紅素>10。"},"sources":["新文京《婦科護理學》子宮頸癌手術/放療護理","婦癌術後膀胱功能"]}},"111030-N4-36":{"quick":"HPV疫苗接種後「仍需定期子宮頸抹片」(疫苗不涵蓋所有致癌型別)。","detail":{"background":"HPV疫苗:有二價(16、18)、四價(6、11、16、18)、九價(再加31、33、45、52、58等)。重點衛教:(1)接種後「仍須定期子宮頸抹片」——疫苗無法涵蓋所有高危型別,且對已感染者無治療效果;(2)需完整接種劑次(依年齡2–3劑),非「一劑終生有效」;(3)型別為16、18(及四價6、11防菜花、九價更多型),不含「30、31」之說法錯誤;(4)約60–70%子宮頸癌由HPV-16、18引起(非30、31型)。本題正確為「接種後仍需定期抹片」。","options":{"A":"正確。接種HPV疫苗後仍需定期子宮頸抹片。","B":"錯。需完整接種劑次,非一劑終生有效。","C":"錯。型別為16、18等,非「30、31」。","D":"錯。約60–70%子宮頸癌由16、18型引起,非30、31型。"},"sources":["國健署 HPV疫苗","CDC HPV vaccine"]}},"111030-N4-37":{"quick":"陰道鏡的最大優點是可清楚檢視子宮頸「轉換區(transformation zone)」之病灶。","detail":{"background":"陰道鏡(colposcopy):當子宮頸抹片異常時的進一步檢查,以放大鏡觀察子宮頸表面,塗醋酸與碘(Schiller test)後辨識異常上皮並導引切片。其最大價值在清楚檢視「子宮頸轉換區(squamocolumnar junction / transformation zone)」——即鱗狀上皮與柱狀上皮交界、HPV感染與子宮頸上皮內病變(CIN)及子宮頸癌最常起源的部位。故本題答案為「子宮頸轉換區」。陰道鏡無法看到子宮頸內口以上深部(需內膜搔刮或其他檢查)。","options":{"A":"非陰道鏡最大優點所在部位。","B":"非陰道鏡重點觀察區。","C":"子宮頸內口與子宮體交接屬深部,陰道鏡看不到。","D":"正確。陰道鏡最能清楚檢視子宮頸轉換區(病變好發處)。"},"sources":["新文京《婦科護理學》陰道鏡","婦癌 子宮頸轉換區"]}},"114170-N4-24":{"quick":"子宮頸抹片並非「不管有無性經驗30歲以上都每年篩檢」;無性經驗者風險極低、不需常規篩檢。","detail":{"background":"子宮頸抹片採檢與政策:(1)採檢前24小時避免陰道塞劑與性行為、避開月經期、產後至少6週再做;(2)抹片採檢後以95%酒精浸泡或噴固定液固定再送檢;(3)篩檢對象——子宮頸癌與HPV性接觸相關,故建議「有性經驗」女性定期篩檢(台灣補助30歲以上有性經驗婦女),無性經驗者感染HPV機率極低、不需常規篩檢。本題問「錯誤」者:選項說「不管有無性經驗,30歲以上每年篩檢」——忽略「有性經驗」前提,故錯誤。","options":{"A":"正確。檢查前24小時避免陰道塞劑與性行為。","B":"正確。避開月經期、產後至少6週再檢查。","C":"正確。採檢後以95%酒精或固定液固定再送檢。","D":"錯誤(本題答案)。應為「有性經驗」者篩檢,無性經驗者不需常規篩檢。"},"sources":["國健署 子宮頸抹片篩檢對象","新文京《婦科護理學》"]}},"107110-N4-40":{"quick":"子宮頸糜爛最常用的治療為冷凍治療(cryotherapy)。","detail":{"background":"子宮頸糜爛(cervical erosion/ectropion)指子宮頸柱狀上皮外翻至外子宮頸,常無症狀或有分泌物增多、接觸性出血;多為良性生理變化(尤年輕、口服避孕藥、懷孕者),須先抹片排除病變。治療(有症狀時)以「冷凍治療(液態氮/cryotherapy)」最常用——破壞異常柱狀上皮使鱗狀上皮再生,簡便、可門診施行;其他可用電燒灼、雷射。子宮內膜破壞術用於子宮內膜病變/異常出血,非子宮頸糜爛。本題最常用為冷凍治療。","options":{"A":"電燒灼可用,但非「最常用」之首選。","B":"正確。冷凍治療為子宮頸糜爛最常用治療。","C":"雷射可用,但非最常規。","D":"子宮內膜破壞術用於內膜病變,非子宮頸糜爛。"},"sources":["新文京《婦科護理學》子宮頸糜爛","婦科門診處置"]}},"101030-N4-21":{"quick":"上皮性卵巢癌追蹤復發的腫瘤指標為血清CA-125。","detail":{"background":"卵巢癌腫瘤指標:上皮性卵巢癌以「CA-125」最常用於治療反應監測與復發追蹤(術前升高、治療後下降、復發再升);惟CA-125亦見於子宮內膜異位、PID、懷孕等良性情況,特異性不足,不單獨用於篩檢。其他指標:CA-153用於乳癌、SCC-Ag用於鱗狀細胞癌(子宮頸、頭頸、肺鱗癌)、β-hCG用於妊娠滋養層疾病(葡萄胎、絨毛膜癌)與生殖細胞瘤、AFP用於肝癌與卵黃囊瘤、CEA用於大腸癌。本題上皮性卵巢癌追蹤用CA-125。","options":{"A":"SCC-Ag為鱗狀細胞癌指標,非卵巢癌追蹤。","B":"CA-153為乳癌指標。","C":"hCG為妊娠滋養層疾病/生殖細胞瘤指標。","D":"正確。CA-125為上皮性卵巢癌追蹤指標。"},"sources":["新文京《婦科護理學》卵巢癌","NCCN Ovarian Cancer"]}},"102110-N4-33":{"quick":"年輕(32歲)且乳腺緻密、有家族史者,乳癌篩檢宜選乳房超音波。","detail":{"background":"乳癌篩檢工具選擇與年齡/乳腺密度有關:(1)年輕女性(<40歲)乳腺組織緻密,乳房攝影(mammography)敏感度較低且輻射考量,故32歲女性篩檢首選「乳房超音波」(無輻射、對緻密乳腺與囊實性鑑別佳);(2)乳房攝影適用於40–45歲以上一般篩檢;(3)細針抽吸細胞學(FNA)是對已發現腫塊的診斷性檢查,非篩檢;(4)乳管攝影用於乳頭異常分泌之評估。有家族史者可較早並加強監測(高風險者另考慮MRI)。本題32歲有家族史,篩檢宜選乳房超音波。","options":{"A":"正確。年輕緻密乳腺者篩檢宜用乳房超音波。","B":"乳房攝影對年輕緻密乳腺敏感度低,非首選。","C":"FNA為腫塊診斷性檢查,非篩檢。","D":"乳管攝影用於乳頭分泌評估,非一般篩檢。"},"sources":["新文京《婦科護理學》乳癌篩檢","ACS 乳癌篩檢指引"]}},"103030-N4-32":{"quick":"腹腔鏡子宮肌瘤切除術中採「頭低腳高的膀胱截石臥位」,使腸推向頭側、利骨盆腔視野。","detail":{"background":"婦科腹腔鏡手術術前/術中照護:(1)腸道準備依醫囑(可能需灌腸或瀉劑使腸排空、視野清楚),非僅塞劑而已;(2)皮膚準備需「清洗肚臍」(臍部為腹腔鏡進入點,須徹底清潔降低感染),不可避開臍部;(3)術中採「頭低腳高(Trendelenburg)合併膀胱截石臥位」——使腸往頭側移、暴露骨盆腔器官利操作;(4)腹腔鏡灌入二氧化碳建立氣腹,非為排出顯影劑而大量輸液。本題適當者為「採頭低腳高之膀胱截石姿勢」。","options":{"A":"不足。腸道準備常需更完整(灌腸/瀉劑),非僅塞劑。","B":"錯。臍部為入鏡點需徹底清潔,不可避開。","C":"正確。術中採頭低腳高之膀胱截石臥位。","D":"錯。腹腔鏡用CO2氣腹,非為排顯影劑而大量輸液。"},"sources":["新文京《婦科護理學》腹腔鏡手術護理","婦科微創手術"]}},"103030-N4-33":{"quick":"腹腔鏡術後肩膀痛,因灌入腹腔的二氧化碳刺激橫膈/膈神經(轉移痛)所致。","detail":{"background":"腹腔鏡手術後常見「肩膀/肩背部疼痛」:建立氣腹所灌入的二氧化碳殘留於腹腔、刺激橫膈與膈神經(phrenic nerve, C3–C5),經轉移痛(referred pain)反映至肩部(C3–C5皮節),通常於術後1–2天緩解。護理:說明為正常暫時現象、採半坐臥助CO2吸收、適度走動、局部熱敷或按摩、止痛藥;多在數日內自行消退。本題正確解釋為「打入腹腔的CO2刺激膈神經所致」。","options":{"A":"錯。非肩膀固定壓迫所致。","B":"正確。腹腔CO2刺激膈神經,轉移痛至肩部。","C":"錯。非內視鏡刺激肋間神經。","D":"錯。非心肌受刺激的反射痛。"},"sources":["新文京《婦科護理學》腹腔鏡術後護理","膈神經轉移痛"]}},"103030-N4-34":{"quick":"卵巢癌晚期壓迫骨盆腔器官,常見腹脹(1)、腹水(2)、頻尿(5)等症狀。","detail":{"background":"卵巢癌有「沉默殺手」之稱:早期多無症狀,晚期腫瘤增大或腹腔內擴散壓迫鄰近器官才出現非特異症狀——腹脹、腰圍變大、腹水、消化不良、食慾差、頻尿/排尿困難(壓迫膀胱)、便秘(壓迫腸道)、骨盆/腹部不適,體重可能不增反減。本題正確組合為腹脹(1)、腹水(2)、頻尿(5)。陷阱:性交後出血(3)較屬子宮頸病變、月經量多(4)較屬子宮肌瘤/內膜病變、陰道分泌物增加(6)較屬感染或子宮頸/內膜病變,皆非卵巢癌典型。","options":{"A":"正確。腹脹(1)+腹水(2)+頻尿(5)為卵巢癌晚期壓迫表現。","B":"含性交後出血(3),較屬子宮頸病變。","C":"含月經量多(4),較屬子宮肌瘤/內膜病變。","D":"含陰道分泌物增加(6),較屬感染或子宮頸/內膜病變。"},"sources":["新文京《婦科護理學》卵巢癌臨床表現","NCCN Ovarian Cancer"]}},"103100-N4-37":{"quick":"卵巢腫瘤增大以壓迫症狀(頻尿便秘、腰圍變大、腹脹痛)為主;異常陰道出血非典型(屬子宮病變)。","detail":{"background":"卵巢腫瘤增大的症狀來自腫塊本身與壓迫:腰圍變大、腹脹、腹部脹痛、壓迫膀胱致頻尿、壓迫腸道致便秘、下肢水腫;惡性者可有腹水。卵巢腫瘤一般「不」直接造成異常陰道出血(陰道出血多源自子宮頸或子宮內膜病變);少數分泌雌激素的功能性卵巢腫瘤可間接影響內膜而出血,但非典型。本題問「除外(非典型)」者為「異常陰道出血」。","options":{"A":"是症狀。壓迫膀胱/腸道致頻尿、便秘。","B":"是症狀。腫瘤增大致腰圍突然變大。","C":"除外(本題答案)。異常陰道出血非卵巢腫瘤典型,多屬子宮病變。","D":"是症狀。腹部脹痛。"},"sources":["新文京《婦科護理學》卵巢腫瘤","婦科腫瘤學"]}},"104030-N4-40":{"quick":"子宮內膜癌的危險因子為肥胖(脂肪組織芳香化酶使雌激素過量、無對抗性刺激內膜)。","detail":{"background":"子宮內膜癌(endometrial carcinoma)與「長期無對抗的雌激素刺激」有關。危險因子:肥胖(脂肪芳香化酶將雄性素轉為雌激素,內源性雌激素過多)、未生育/不孕、初經早停經晚(暴露雌激素時間長)、多囊卵巢(無排卵長期雌激素)、糖尿病與高血壓(常與肥胖共病)、單用雌激素HRT(無黃體素保護)、Tamoxifen(對子宮的類雌激素作用)、家族史(Lynch症候群)。表現多為停經後或不規則陰道出血,常早期即被發現。本題危險因子為「肥胖」。陷阱:早婚、多重性伴侶、長期子宮頸炎屬子宮頸癌相關,非內膜癌。","options":{"A":"早婚與子宮頸癌相關,非內膜癌主因。","B":"正確。肥胖致內源性雌激素過多,為子宮內膜癌危險因子。","C":"多重性伴侶與子宮頸癌(HPV)相關。","D":"長期子宮頸炎與子宮頸病變相關,非內膜癌。"},"sources":["新文京《婦科護理學》子宮內膜癌","NCCN Endometrial Cancer"]}},"104100-N4-38":{"quick":"乳癌放療部位皮膚不可黏貼膠布(摩擦刺激);宜穿寬鬆衣物、避免陽光、輕柔護理。","detail":{"background":"放射治療皮膚反應護理:照射部位皮膚易乾燥、變黑、脫屑甚至濕性脫皮。護理原則——保持清潔乾燥、用溫水輕拍勿搓揉、穿寬鬆柔軟棉質衣物減少摩擦、避免陽光直曬與冷熱刺激、勿擦含金屬(如鋅)或刺激性乳液(除非醫護指示專用保濕劑)、勿在照射區「黏貼膠布」(撕除時傷害脆弱皮膚)、勿抓搔。膚色變深多於療程後數週至數月漸退。本題「不恰當」者為「黏貼膠布避免摩擦」(反而傷皮)。","options":{"A":"不恰當(本題答案)。放療皮膚不可黏貼膠布,撕除會損傷皮膚。","B":"恰當。穿寬鬆衣服減少摩擦。","C":"恰當。避免陽光照射刺激。","D":"恰當。膚色變深多會自然褪去。"},"sources":["新文京《腫瘤護理》放療皮膚照護","ONS 放射性皮膚炎護理"]}},"106030-N4-16":{"quick":"子宮(肌瘤)切除術後6週內應避免性生活,以促進陰道殘端傷口癒合。","detail":{"background":"子宮切除術後出院衛教:(1)術後約6週內避免性生活、提重物、劇烈運動與盆浴,以利陰道殘端/腹部傷口癒合;(2)不需溫水坐浴「促進分泌物排除」(全子宮切除後無經血、陰道殘端需癒合,坐浴非常規且可能增感染);(3)術後早期不宜踩單車等增加骨盆腔壓力的運動;(4)術後陰道若持續中量血色分泌物為異常,應就醫(少量褐色分泌物可能正常,但「持續中量血色」非正常)。本題適當者為「術後6週內避免性生活」。","options":{"A":"不適當。全子宮切除後無需以坐浴促分泌物排除。","B":"不適當。術後6週內不宜踩單車等增腹壓運動。","C":"正確。術後6週內避免性生活以利殘端癒合。","D":"不適當。術後1個月持續中量血色分泌物為異常,應就醫。"},"sources":["新文京《婦科護理學》子宮切除術後護理","婦科手術後衛教"]}},"106111-N4-35":{"quick":"與子宮內膜異位有關者:卵巢巧克力囊腫(1)、子宮腺肌症(3)。","detail":{"background":"子宮內膜異位症(endometriosis):子宮內膜組織異位生長於子宮腔外(卵巢、骨盆腹膜、子宮肌層等),受週期性荷爾蒙影響出血,造成經痛、慢性骨盆痛、性交痛與不孕。相關病灶:(1)卵巢巧克力囊腫(endometrioma)——異位內膜在卵巢出血積成陳舊血囊;(3)子宮腺肌症(adenomyosis)——子宮內膜長入子宮肌層,致子宮增大、經痛、經量多,屬內膜異位的一種類型。絨毛膜癌(2)屬妊娠滋養層惡性腫瘤、骨盆腔發炎(4)屬感染,與內膜異位無關。本題正確組合為(1)+(3)。","options":{"A":"含絨毛膜癌(2),與內膜異位無關。","B":"正確。卵巢巧克力囊腫(1)+子宮腺肌症(3)。","C":"含絨毛膜癌(2),錯。","D":"含骨盆腔發炎(4),屬感染非內膜異位。"},"sources":["新文京《婦科護理學》子宮內膜異位症","ESHRE Endometriosis Guideline"]}},"107030-N4-36":{"quick":"腹腔鏡子宮肌瘤切除術中應採「頭低腳高」臥位(非頭高腳低)。","detail":{"background":"腹腔鏡婦科手術照護要點:(1)術前皮膚準備須清洗肚臍(入鏡點);(2)術中採「頭低腳高(Trendelenburg)」使腸往頭側移、暴露骨盆腔,而非頭高腳低;(3)術後因氣腹與麻醉,腸蠕動恢復(排氣)後再進食,一般禁食數小時觀察,可漸進飲食;(4)術後肩背痛為CO2刺激膈神經之轉移痛,可半坐臥、走動、熱敷或局部按摩緩解。本題問「錯誤」者為「術中維持頭高腳低臥式」(應頭低腳高)。","options":{"A":"正確。術前清洗肚臍(入鏡點)。","B":"錯誤(本題答案)。應採頭低腳高,而非頭高腳低。","C":"大致正確。術後待腸蠕動恢復後漸進進食。","D":"正確。術後肩背痛(CO2刺激膈神經)可局部按摩緩解。"},"sources":["新文京《婦科護理學》腹腔鏡手術","婦科微創手術臥位"]}},"107030-N4-37":{"quick":"子宮肌瘤可用口服避孕藥(或GnRH類似物)抑制與平衡女性荷爾蒙、緩解症狀。","detail":{"background":"子宮肌瘤(uterine myoma/leiomyoma)為雌激素依賴的良性平滑肌瘤,停經後多萎縮。處置依症狀與生育需求:(1)藥物——口服避孕藥或黃體素可調節荷爾蒙、減少經量;GnRH類似物可暫時縮小肌瘤(術前用),停藥後復發;(2)肌瘤切除術(myomectomy)保留子宮,術後仍有月經、不需補充女性荷爾蒙、肌瘤可能復發;(3)全子宮切除為根治,但非「最好」的單一處置(須考量生育與個別狀況)。惡性變(肉瘤)極少見。本題正確為「可服用口服避孕藥抑制及平衡女性荷爾蒙」。","options":{"A":"錯。肌瘤切除術保留子宮,術後仍有月經。","B":"正確。口服避孕藥可調節荷爾蒙、緩解肌瘤症狀。","C":"錯。肌瘤切除術後不需補充女性荷爾蒙。","D":"錯。全子宮切除非一律「最好」,須依症狀與生育需求個別決定。"},"sources":["新文京《婦科護理學》子宮肌瘤","ACOG Uterine Fibroids"]}},"107110-N4-36":{"quick":"女陰癌早期病變不明顯、常被忽略而延誤診斷。","detail":{"background":"女陰(外陰)癌(vulvar cancer):少見,好發於停經後年長婦女,組織型「以鱗狀細胞癌為主」(非基底細胞癌);與HPV感染、外陰上皮內病變、慢性外陰營養不良(硬化性苔癬)、吸菸相關。早期表現如外陰搔癢、灼熱、皮膚變化或小結節/潰瘍,「不明顯且易被忽略」而延誤;治療以「手術(外陰切除±淋巴結廓清)為主」,放療/化療為輔。本題正確敘述為「早期病變不明顯常被忽略」。陷阱:非台灣最常見生殖器惡性腫瘤、第一期非以放療為主、非基底細胞癌為主。","options":{"A":"錯。女陰癌少見,非台灣女性較常見生殖器惡性腫瘤。","B":"正確。早期病變不明顯,常被忽略而延誤。","C":"錯。第一期以手術為主,非放射線治療。","D":"錯。女陰癌以鱗狀細胞癌為主,非基底細胞癌。"},"sources":["新文京《婦科護理學》外陰癌","NCCN Vulvar Cancer"]}},"108020-N4-35":{"quick":"長期服用Tamoxifen須評估:噁心嘔吐(3)、更年期症狀(4)、末梢水腫(5)等副作用。","detail":{"background":"Tamoxifen(泰莫西芬)為選擇性雌激素受體調節劑(SERM),用於荷爾蒙受體陽性乳癌的輔助治療,抑制乳房雌激素作用以降低復發。副作用:類更年期症狀(熱潮紅、停經樣症狀)、噁心嘔吐、末梢水腫、月經改變、陰道分泌物/乾澀;重要風險——「子宮內膜增生/內膜癌」(對子宮呈類雌激素作用,須警覺異常陰道出血)與「靜脈血栓栓塞」風險增加。本題須評估的副作用組合為噁心嘔吐(3)、更年期症狀(4)、末梢水腫(5)。陷阱:血糖過低(1)、鈣離子過低(2)非其典型副作用。","options":{"A":"含血糖過低(1)、鈣離子過低(2),非Tamoxifen典型副作用。","B":"正確。噁心嘔吐(3)+更年期症狀(4)+末梢水腫(5)。","C":"含鈣離子過低(2),不符。","D":"含血糖過低(1),不符。"},"sources":["藥理 Tamoxifen(SERM)副作用","NCCN Breast Cancer"]}},"108020-N4-36":{"quick":"子宮肌瘤常見表現為「不正常子宮出血」(經量多、經期延長)。","detail":{"background":"子宮肌瘤特性:(1)位置分型——以「肌層內(intramural)肌瘤」最常見(非漿膜下);黏膜下肌瘤雖少但最易造成異常子宮出血;(2)症狀——常見不正常子宮出血(經量過多、經期延長致貧血)、骨盆壓迫感、頻尿、便秘、痛經,亦可能不孕或流產;(3)惡性變——肉瘤化極罕見(<0.5%),故非「易產生惡性病變」;(4)病因——為雌激素(及黃體素)依賴性,停經後萎縮,非「黃體素過多」單一所致。本題正確敘述為「常有不正常子宮出血」。","options":{"A":"錯。以肌層內肌瘤最常見,非漿膜下。","B":"錯。肌瘤惡性變極罕見。","C":"正確。常造成不正常子宮出血。","D":"錯。為雌激素依賴性,非單純黃體素過多。"},"sources":["新文京《婦科護理學》子宮肌瘤","ACOG Fibroids"]}},"109030-N4-38":{"quick":"子宮內膜癌好發於晚停經(雌激素暴露時間長)的婦女。","detail":{"background":"子宮內膜癌與長期無對抗的雌激素刺激相關:危險因子包括晚停經、初經早(雌激素暴露時間長)、未生育、肥胖、多囊卵巢、糖尿病高血壓、單用雌激素HRT、Tamoxifen、Lynch症候群。臨床:最常見且重要的表現是「異常陰道出血(尤停經後出血)」,常因此早期被發現;非以下腹疼痛為主。治療以「手術(全子宮+雙側輸卵管卵巢切除±淋巴)為主」,化放療為輔,非以化療為主。長期使用「黃體素」反而是保護(對抗雌激素),非危險因子;危險的是「單用雌激素」。本題正確為「晚停經婦女較易發生」。","options":{"A":"錯。長期使用「黃體素」是保護;危險的是單用雌激素。","B":"錯。常見表現為異常陰道出血,非下腹疼痛。","C":"錯。治療以手術為主,非化學治療。","D":"正確。晚停經(雌激素暴露長)較易發生。"},"sources":["新文京《婦科護理學》子宮內膜癌","NCCN Endometrial Cancer"]}},"110030-N4-35":{"quick":"多囊性卵巢症候群(PCOS)非「雌性素分泌過多」,而是雄性素過多、無排卵。","detail":{"background":"多囊性卵巢症候群(PCOS):因下視丘-腦下垂體-卵巢軸失調與胰島素阻抗,造成「雄性素(androgen)過多」、慢性無排卵。臨床表徵:月經稀少或無月經、多毛/痤瘡(高雄性素)、肥胖、胰島素阻抗(易第2型糖尿病、代謝症候群)、不孕、超音波見多囊卵巢;長期無對抗雌激素增子宮內膜癌風險。治療:減重、口服避孕藥調經與抗雄性素、metformin改善胰島素阻抗、誘導排卵助孕。本題問「非」表徵者為「雌性素分泌過多」(應為雄性素過多)。","options":{"A":"本題答案(非表徵)。PCOS為雄性素過多,非雌性素分泌過多。","B":"是表徵。常合併肥胖與胰島素阻抗。","C":"是表徵。高雄性素致多毛。","D":"是表徵。慢性無排卵致月經過少或無月經。"},"sources":["新文京《婦科護理學》多囊性卵巢症候群","Rotterdam PCOS Criteria"]}},"111030-N4-34":{"quick":"子宮內膜癌多因停經後/異常出血「早期」即被發現,並非出現症狀時多已晚期。","detail":{"background":"子宮內膜癌:(1)常見症狀為不正常陰道出血(尤停經後出血),這使其常於「早期」被察覺與診斷(預後相對較佳),故「出現症狀時多已晚期」為錯誤敘述;(2)為子宮體最常見的惡性腫瘤;(3)診斷以子宮內膜取樣——子宮內膜切片或分段刮搔術(D&C)為主,加上經陰道超音波評估內膜厚度;(4)治療以手術為主。本題問「錯誤」者為「病人出現症狀時多已進入晚期」。","options":{"A":"正確。常見症狀為不正常陰道出血。","B":"正確。為子宮體最常見癌症。","C":"錯誤(本題答案)。內膜癌因異常出血多「早期」發現,非多已晚期。","D":"正確。診斷以子宮內膜刮搔術(D&C)/切片為主。"},"sources":["新文京《婦科護理學》子宮內膜癌","NCCN"]}},"112030-N4-37":{"quick":"絨毛膜癌對化療高度敏感,治療「以化學治療為主」,而非以手術為主放療為輔。","detail":{"background":"絨毛膜癌(choriocarcinoma)屬妊娠滋養層腫瘤(GTD)的惡性型:(1)約半數由葡萄胎惡性變而來,也可繼發於流產、子宮外孕或正常妊娠後;(2)血清β-hCG為診斷與追蹤療效的最重要指標(持續升高);(3)早期血行轉移,最常轉移至「肺」(咳血、肺結節),也可至陰道、腦、肝;(4)治療——絨毛膜癌對「化學治療高度敏感」,以化療為主(如MTX、actinomycin-D、EMA-CO),治癒率高;手術/放療為輔。本題問「錯誤」者為「以手術治療為主、放射線治療為輔」(實為化療為主)。","options":{"A":"正確。約50%由葡萄胎惡性變而來。","B":"正確。常轉移至肺臟。","C":"正確。血清hCG為診斷與追蹤最重要依據。","D":"錯誤(本題答案)。絨毛膜癌對化療敏感,以化學治療為主。"},"sources":["新文京《婦科護理學》妊娠滋養層腫瘤","FIGO GTD"]}},"112030-N4-40":{"quick":"子宮內膜癌全切+雙側輸卵管卵巢切除術後:勿提重物(2)、告知可能出現更年期症狀(3)。","detail":{"background":"子宮內膜癌行全子宮+雙側輸卵管卵巢切除(BSO)術後護理:(1)切除卵巢後雌激素驟降,將出現「手術性更年期症狀」(熱潮紅、陰道乾澀等),須事先告知並衛教因應;(2)術後約6–8週內避免提重物、劇烈運動與性行為,促傷口/陰道殘端癒合;(3)追蹤——術後初期(如前1–2年)回診較密集(常每3個月一次),非每6個月;(4)術後性行為恢復時間依癒合而定(約6–8週後),非半年。本題正確組合為「勿提重物(2)+告知更年期症狀(3)」。","options":{"A":"含「每6個月回診一次」,術後初期應更密集。","B":"含「每6個月回診」,不符。","C":"正確。勿提重物(2)+告知更年期症狀(3)。","D":"含「術後半年避免性行為」,一般約6–8週即可,過於保守。"},"sources":["新文京《婦科護理學》婦癌手術後護理","NCCN Endometrial Cancer 追蹤"]}},"112110-N4-39":{"quick":"多囊性卵巢症候群表徵為月經過少/無月經,非「月經次數過多」。","detail":{"background":"PCOS診斷(Rotterdam準則,符合三者中二):(1)排卵障礙(月經稀少或無月經);(2)高雄性素(臨床多毛痤瘡或生化雄性素升高);(3)超音波多囊卵巢形態。常合併胰島素阻抗、肥胖、代謝症候群與不孕。因慢性無排卵,月經是「過少或無」而非過多。本題問「錯誤」者為「月經次數過多」。處置:減重、口服避孕藥、抗雄性素、metformin、誘導排卵。","options":{"A":"正確。雄性素分泌過多。","B":"正確。排卵障礙(慢性無排卵)。","C":"正確。常見胰島素阻抗。","D":"錯誤(本題答案)。PCOS為月經過少/無月經,非月經過多。"},"sources":["Rotterdam PCOS Criteria","新文京《婦科護理學》PCOS"]}},"112110-N4-40":{"quick":"子宮肌瘤術後護理應密切觀察與紀錄出血量、性質與顏色。","detail":{"background":"子宮肌瘤手術後護理:(1)術後出血為重要併發症,須密切觀察並紀錄「出血量、性質、顏色」與生命徵象,警覺內出血;(2)微創(腹腔鏡)手術恢復較快,不需臥床24小時,鼓勵早期下床活動以防血栓與促腸蠕動;(3)術後一般6週內避免性行為、提重物與劇烈運動(含重訓),不可返家「立即」恢復性生活或重訓;(4)監測傷口、發燒與排尿。本題正確為「密切觀察與紀錄出血量、性質、顏色」。","options":{"A":"正確。密切觀察並紀錄出血量、性質、顏色。","B":"錯。微創術後鼓勵早期下床,非臥床24小時。","C":"錯。不可立即恢復性生活,約需6週。","D":"錯。術後6週內避免重訓等劇烈運動。"},"sources":["新文京《婦科護理學》子宮肌瘤術後護理","婦科手術後衛教"]}},"113100-N4-25":{"quick":"對卵巢癌術後身體心像/性生活擔憂的病人,不宜以「不要負面思考、全心配合」帶過情緒。","detail":{"background":"婦癌(卵巢癌減積手術)術後面對身體心像改變與性功能/女性角色失落,護理應以同理支持與開放溝通為先:鼓勵表達感受、與配偶溝通彼此疑慮、提供具體因應(術後更年期症狀可加長前戲、用水性潤滑劑改善乾澀)、徵得同意後引介病友支持團體促進正向調適。不宜「告訴病人不要負面思考、應全心配合治療」——此為否定情緒、阻斷表達的非治療性回應。本題問「較不恰當」者即此選項A。","options":{"A":"較不恰當(本題答案)。否定情緒、要求不要負面思考,屬非治療性回應。","B":"恰當。鼓勵與配偶溝通彼此感受。","C":"恰當。提供改善陰道乾澀的具體方法。","D":"恰當。徵得同意後引介病友支持促進調適。"},"sources":["新文京 治療性溝通","腫瘤心理照護"]}},"113180-N4-11":{"quick":"子宮內膜異位症的藥物為抑制雌激素/造成假停經或假懷孕者;「排卵藥」反促雌激素,非治療藥。","detail":{"background":"子宮內膜異位症藥物治療目標是抑制卵巢雌激素、使異位內膜萎縮:(1)含黃體素的口服避孕藥(造成「假懷孕」狀態、抑制內膜);(2)單方黃體素(如dienogest);(3)雄性素衍生物Danazol(抑制FSH/LH、造成低雌激素);(4)GnRH類似物(GnRH analogs,降調節致「假停經」、低雌激素)。這些皆降低雌激素以縮小病灶、緩解經痛與保留生育。「排卵藥(如clomiphene)」用於促進排卵助孕,會增加雌激素、無助甚至不利內膜異位,故為錯誤(非治療藥)。本題問「錯誤」者為「排卵藥」。","options":{"A":"錯誤(本題答案)。排卵藥促排卵/雌激素,非內膜異位治療藥。","B":"正確。含黃體素口服避孕藥可抑制異位內膜。","C":"正確。Danazol(雄性素衍生)造成低雌激素環境。","D":"正確。GnRH類似物造成假停經、低雌激素。"},"sources":["新文京《婦科護理學》子宮內膜異位症藥物","ESHRE Endometriosis"]}},"114100-N4-24":{"quick":"子宮內膜癌全切+放療後陰道易乾澀、狹窄、分泌「減少」,而非分泌增加影響性生活。","detail":{"background":"子宮內膜癌全子宮切除合併放射線治療之護理:骨盆腔放療與切除卵巢使陰道黏膜萎縮、乾澀、彈性下降甚至沾黏狹窄,分泌物「減少」而非增加;故「陰道分泌物會增加,影響性生活」為不適當(錯誤)敘述。正確護理:使用水性潤滑劑改善乾澀、必要時陰道擴張器預防狹窄、鼓勵夫妻溝通身體改變、術後約6個月內避免提重物、追蹤回診。本題問「不適當」者為選項A(分泌物會增加)。","options":{"A":"不適當(本題答案)。放療後陰道乾澀、分泌「減少」,非增加。","B":"適當。可用水性潤滑劑改善乾澀。","C":"適當。鼓勵夫妻溝通身體狀況改變。","D":"適當。術後約6個月內避免提重物。"},"sources":["新文京《婦科護理學》婦癌放療後護理","放療後陰道狹窄處理"]}},"114170-N4-25":{"quick":"子宮內膜異位症可用口服避孕藥抑制排卵、使異位內膜萎縮。","detail":{"background":"子宮內膜異位症重點:(1)病灶可超出骨盆腔(雖以骨盆腔最常見,亦可見於腸道、橫膈、肺等遠處),故「只侷限骨盆腔」錯誤;(2)診斷的黃金標準是腹腔鏡直視+病理,不能僅憑血中雌激素濃度;(3)為雌激素依賴的慢性病,藥物或手術後仍可能「復發」,非治療後不再復發;(4)口服避孕藥(尤其含黃體素)可抑制排卵、造成假懷孕狀態使異位內膜萎縮、緩解經痛,為常用藥物治療。本題正確敘述為「口服避孕藥可抑制排卵、使異位內膜萎縮」。","options":{"A":"錯。病灶可超出骨盆腔(腸、橫膈、肺等)。","B":"錯。診斷靠腹腔鏡+病理,非僅血中雌激素濃度。","C":"錯。治療後仍可能復發。","D":"正確。口服避孕藥抑制排卵、使異位內膜萎縮。"},"sources":["新文京《婦科護理學》子宮內膜異位症","ESHRE Endometriosis Guideline"]}},"115030-N4-25":{"quick":"卵巢癌致病:初經「早」、停經「晚」、未生育者風險較高;「初經太晚或停經太早」並非高危(為錯誤敘述)。","detail":{"background":"卵巢癌危險因子與「排卵次數多(持續排卵假說)」相關:年齡愈大風險愈高、未生育/不孕、初經早、停經晚(排卵年數長)、家族史(BRCA1/2、Lynch症候群)、乳癌個人/家族史。保護因子:多次懷孕、哺乳、長期使用口服避孕藥(減少排卵)。故「初經太晚或停經太早」會「減少」排卵年數,風險反而較低,題目敘述其「罹病率較高」為錯誤。本題問「錯誤」者即此選項B。","options":{"A":"正確。年齡越大罹病率越高。","B":"錯誤(本題答案)。應為初經早、停經晚風險較高;初經晚/停經早反而較低。","C":"正確。卵巢癌與乳癌家族史者風險較高。","D":"正確。懷孕與哺乳(減少排卵)為保護因子。"},"sources":["新文京《婦科護理學》卵巢癌危險因子","NCCN Ovarian Cancer"]}},"101110-N4-80":{"quick":"卵巢過度刺激症候群(OHSS)由「誘發排卵藥物」引起,非荷爾蒙補充療法(HRT)。","detail":{"background":"卵巢過度刺激症候群(OHSS)是人工生殖誘導排卵的併發症:使用排卵藥(尤其外源性gonadotropin/HMG加hCG誘發排卵)後卵巢過度反應、多個濾泡增大、血管通透性增加,導致體液滲出第三間隙——腹水、肋膜積液、血液濃縮、電解質失衡,嚴重者寡尿、腎功能下降、血栓與凝血異常。多於排卵(給hCG)後數天發生,若懷孕(內源性hCG持續)症狀可延續至妊娠6–8週。處置:輕症觀察補水、監測體重腹圍尿量;重症住院補液、白蛋白、抗凝、必要時引流腹水。本題問「錯誤」者:OHSS由誘排卵藥引起,「使用HRT而引起OHSS」為錯誤。","options":{"A":"正確。OHSS因使用誘發排卵藥物而發生。","B":"正確。排卵(給hCG)後2–8天發生,懷孕者可延續至妊娠6–8週。","C":"錯誤(本題答案)。OHSS由誘排卵藥引起,非HRT。","D":"正確。嚴重者有腹水、凝血異常、腎功能降低致少尿。"},"sources":["生殖醫學 OHSS","新文京《婦科護理學》人工生殖併發症"]}},"102110-N4-37":{"quick":"女性排卵功能檢查可測「血清黃體素(progesterone)」——黃體期升高代表已排卵。","detail":{"background":"評估女性是否排卵的檢查:(1)血清黃體素——於黃體中期(約月經週期第21天)抽血,黃體素明顯升高表示已排卵,為直接的排卵功能指標;(2)基礎體溫雙相變化;(3)排卵試紙偵測LH surge;(4)超音波追蹤濾泡。子宮輸卵管攝影(HSG)是檢查輸卵管是否通暢與子宮腔形態(非測排卵);腹腔鏡用於診斷子宮內膜異位、骨盆沾黏等;hCG檢查用於驗孕/滋養層疾病。本題測排卵機能者為「血清黃體素檢查」。","options":{"A":"腹腔鏡用於診斷骨盆病灶,非測排卵。","B":"正確。黃體期血清黃體素升高代表已排卵。","C":"hCG用於驗孕/滋養層疾病,非測排卵。","D":"子宮輸卵管攝影檢查輸卵管通暢,非測排卵。"},"sources":["生殖醫學 排卵評估","新文京《婦科護理學》不孕檢查"]}},"103030-N4-36":{"quick":"精蟲濃度300萬/c.c.遠低於正常(≥1500萬/mL),屬「精蟲數目太少(寡精症)」。","detail":{"background":"精液分析(semen analysis)正常參考值(WHO):精液量≥1.5 mL、精蟲濃度≥1500萬/mL(總數≥3900萬)、活動力(總活動力)≥40%、正常形態≥4%。本例:精液量4 c.c.(正常)、濃度300萬/c.c.(遠低於1500萬→寡精症 oligospermia)、活動力60%(正常)、正常形態50%(正常)。故主要問題為「精蟲數目太少」。採檢須禁慾2–7天、手淫法收集於無菌容器、室溫1小時內送檢、不可用一般保險套(含殺精劑)。本題答案為精蟲數目太少。","options":{"A":"正確。濃度300萬/c.c.遠低於正常(≥1500萬/mL),為寡精症。","B":"錯。活動力60%在正常範圍。","C":"錯。正常形態50%屬正常。","D":"錯。濃度過低,結果並非正常。"},"sources":["WHO 精液分析參考值","新文京《婦科護理學》男性不孕"]}},"103100-N4-39":{"quick":"同房試驗(性交後試驗)是檢查精子在子宮頸黏液中的存活與活動,非檢查「陰道構造」。","detail":{"background":"不孕檢查項目與目的:(1)基礎體溫——雙相變化判斷是否排卵;(2)子宮輸卵管攝影(HSG)——檢查子宮腔形態與輸卵管是否通暢;(3)精液分析——評估精子數量、形態與活動力;(4)同房試驗(post-coital test, 性交後試驗)——於排卵期性交後數小時取子宮頸黏液鏡檢,評估精子在黏液中的存活與活動力、及黏液品質與精子互動,「非檢查陰道構造」。本題問「錯誤」者為「同房試驗以檢查陰道構造」。","options":{"A":"正確。基礎體溫可了解是否排卵。","B":"錯誤(本題答案)。同房試驗評估精子在子宮頸黏液的活動,非檢查陰道構造。","C":"正確。子宮輸卵管攝影檢查子宮輸卵管構造/通暢。","D":"正確。精液分析確認精子數量、形狀、活動力。"},"sources":["生殖醫學 不孕檢查","新文京《婦科護理學》"]}},"104030-N4-39":{"quick":"在「低溫」環境工作不是男性不孕原因;高溫(三溫暖、緊身褲)才會損害精子生成。","detail":{"background":"男性不孕與「睪丸溫度升高」及生活/毒性因子相關:陰囊溫度需低於體溫約2°C才利精子生成,故經常泡三溫暖/溫泉、穿緊身牛仔褲、久坐、發燒等使陰囊溫度升高會損害精子;抽菸、酗酒、藥物、毒物、放化療、靜脈曲張、賀爾蒙異常等亦致不孕。相對地,「在低溫環境工作」不會損害(甚至無害於)精子生成,故非不孕原因。本題問「不是」原因者即「在低溫環境中工作」。","options":{"A":"是原因。泡三溫暖溫泉使陰囊溫度升高,損害精子。","B":"是原因。抽菸酗酒影響精子生成。","C":"是原因。緊身褲使陰囊溫度升高。","D":"本題答案。低溫環境工作非男性不孕原因。"},"sources":["生殖醫學 男性不孕危險因子","新文京《婦科護理學》"]}},"104100-N4-39":{"quick":"雙側輸卵管阻塞、先生精液正常者,適合體外受精-胚胎植入(IVF-ET,試管嬰兒)。","detail":{"background":"人工協助生殖技術依病因選擇:(1)IVF-ET(體外受精-胚胎植入,試管嬰兒)——取卵在體外與精子受精成胚胎再植入子宮,「不需經過輸卵管」,故是「雙側輸卵管阻塞」的標準解決方式;(2)AIH(夫精人工授精)——將處理後精子注入子宮腔,需「輸卵管通暢」,適用輕度男性因素或子宮頸因素,不適合輸卵管阻塞;(3)GIFT(輸卵管精卵植入)、ZIFT(受精卵輸卵管植入)——皆需「輸卵管功能正常」,故輸卵管阻塞不適用。本題輸卵管阻塞+精液正常,適合IVF-ET。","options":{"A":"AIH需輸卵管通暢,輸卵管阻塞不適用。","B":"GIFT需輸卵管功能正常,不適用。","C":"正確。IVF-ET不需經輸卵管,適合雙側輸卵管阻塞。","D":"ZIFT需輸卵管功能正常,不適用。"},"sources":["生殖醫學 ART 適應症","新文京《婦科護理學》人工生殖"]}},"105030-N4-3":{"quick":"注射hCG後約「36小時」排卵;取卵手術安排在hCG後約34–36小時(排卵前),非12小時內。","detail":{"background":"不孕症常用藥物:(1)Clomiphene citrate——口服排卵藥,抗雌激素回饋促FSH/LH分泌而誘排卵;(2)HMG(human menopausal gonadotropin)——含FSH/LH,促濾泡發育;(3)Progesterone——黃體支持,促進子宮內膜分泌期變化、利受精卵著床;(4)hCG——模擬LH surge觸發最終卵子成熟與排卵,施打後約「36小時」排卵,IVF取卵手術通常安排在hCG後約34–36小時(排卵之前)取出成熟卵。本題問「錯誤」者:選項說「hCG注射後12小時內排卵,此時取卵」——時間錯誤(約36小時後排卵,取卵在34–36小時),故為錯誤。","options":{"A":"正確。Clomiphene為常用口服排卵藥。","B":"正確。HMG促進卵泡發育。","C":"正確。Progesterone促進受精卵著床(黃體支持)。","D":"錯誤(本題答案)。hCG後約36小時排卵,取卵在34–36小時,非12小時內。"},"sources":["生殖醫學 IVF 用藥/取卵時機","新文京《婦科護理學》不孕治療"]}},"106030-N4-37":{"quick":"精液收集以「手淫(自慰)」方式取得,不可用一般保險套(含殺精劑),禁慾約2–7天,室溫1小時內送檢。","detail":{"background":"精液檢查採檢衛教:(1)收集方式——以手淫(自慰)方式將精液直接射入無菌廣口容器,「不可用一般保險套」收集(乳膠與殺精劑會殺死精子影響結果;必要時用特製無殺精劑收集套);(2)禁慾時間——採檢前禁慾約2–7天(過短量少、過長活動力下降);(3)運送——收集後置「室溫」、避免過冷過熱,於1小時內送檢(勿冷藏,低溫降低活動力);(4)需多次檢查確認。本題正確為「以手淫方式收集精液」。","options":{"A":"錯。禁慾約2–7天即可,「7–10天」過長。","B":"錯。不可用一般保險套(含殺精劑)收集。","C":"正確。以手淫方式收集於無菌容器。","D":"錯。應室溫運送、勿冷藏(低溫降活動力)。"},"sources":["WHO 精液採檢","新文京《婦科護理學》精液檢查"]}},"106110-N4-4":{"quick":"本題為送分題。精液檢查正確作法:禁慾3–7天、手淫法收集、室溫1小時內送、不可冷凍。","detail":{"background":"精液分析採檢要點(本題經評定送分,各答案均給分):(1)禁慾約3–7天再採檢;(2)以「手淫(自慰)」法收集於無菌容器,不可用一般保險套或性交中斷法(殺精劑/丟失前段精液影響結果);(3)收集後置室溫、2小時內(理想1小時內)送至實驗室;(4)「不可冷凍/冷藏保存」(低溫降低精子活動力)。題目選項涉及保險套/性交中斷收集與冷凍保存等錯誤敘述的組合,因敘述有爭議官方判定送分。臨床仍以上述正確採檢原則為準。","options":{"A":"涉及採檢方式敘述;本題送分,各答案均給分。","B":"涉及冷凍保存等錯誤敘述;本題送分。","C":"本題送分,各答案均給分。","D":"本題送分,各答案均給分。"},"sources":["WHO 精液採檢","考選部 公告:本題送分"]}},"106111-N4-40":{"quick":"人工生殖流程順序:促卵泡成熟(1)→偵測卵泡成熟度(3)→注射hCG引發排卵(2)→人工授精/取卵(4)→維持黃體期(5)。","detail":{"background":"人工生殖(IVF)的標準流程:(1)以排卵藥(gonadotropin)「促卵泡成熟」;(3)以超音波與荷爾蒙「偵測卵泡成熟度」(監測濾泡大小與E2);(2)當濾泡成熟時注射hCG「引發最終成熟與排卵」(扳機);(4)於hCG後約34–36小時「執行取卵/人工授精技術」(IVF取卵、體外受精或ICSI);(5)植入後以黃體素「維持黃體期」支持著床。故正確順序為1→3→2→4→5,即選項「13245」。陷阱:hCG須在偵測濾泡成熟「之後」才打,故2要在3之後。","options":{"A":"12345順序錯;hCG(2)應在偵測成熟(3)之後。","B":"正確。1→3→2→4→5(促成熟→偵測→hCG排卵→授精→黃體支持)。","C":"15324順序錯。","D":"12354順序錯。"},"sources":["生殖醫學 IVF 流程","新文京《婦科護理學》人工生殖"]}},"107110-N4-1":{"quick":"人工生殖法規定受術者須為「不孕夫妻」,未婚者不可為受術者。","detail":{"background":"我國「人工生殖法」重點:(1)受術者限「不孕夫妻」(須有合法婚姻關係),故「未婚者可為受術者」為錯誤;(2)禁止「代理孕母」(目前法律不允許);(3)精卵捐贈者與受術夫妻不得有「四親等內」血親或姻親關係(避免近親);(4)捐贈生殖細胞者有年齡限制(如男性、女性各有規定範圍);(5)禁止選擇性別(醫學必要除外)、禁止買賣生殖細胞。本題問「錯誤」者為「未婚者可為受術者」。","options":{"A":"正確。禁止代理孕母。","B":"錯誤(本題答案)。受術者限不孕夫妻,未婚者不可。","C":"正確。精卵捐贈不得為四親等內血親。","D":"正確。捐贈者有年齡規定。"},"sources":["人工生殖法","新文京《婦科護理學》生殖醫學倫理法規"]}},"108110-N4-39":{"quick":"精液檢查:手淫法收集,室溫(避免過冷過熱)於1–2小時內送檢。","detail":{"background":"精液檢查運送與採檢:(1)以手淫法直接射入無菌容器,不可用一般保險套(殺精劑)或性交中斷法;(2)收集後維持「室溫」(接近體溫、避免過冷過熱)、避免日曬,於約1–2小時內送至實驗室;(3)不可冰塊冷藏(7°C以下)或過度保溫(42°C)——過冷降低活動力、過熱破壞精子;(4)禁慾2–7天、需多次採檢確認。本題正確為「室溫1–2小時內送檢」。","options":{"A":"錯。不可用一般保險套收集(殺精劑)。","B":"錯。冰塊7°C以下冷藏會降低精子活動力。","C":"錯。42°C保溫過熱會破壞精子。","D":"正確。室溫於1–2小時內送檢。"},"sources":["WHO 精液採檢/運送","新文京《婦科護理學》"]}},"109030-N4-36":{"quick":"不孕夫妻性生活指導:排卵期前後「隔日(非每天)」行房較佳,避免精子密度被稀釋。","detail":{"background":"不孕夫妻助孕性生活指導:(1)行房頻率——排卵期前後建議「隔日(每2天)」行房,使精子質量與密度維持較佳(每日射精反而稀釋精子濃度);(2)排卵期黏液——子宮頸黏液在排卵期由黏稠變稀薄清澈、量多、可拉絲(利精子穿行);(3)性交後可墊枕頭抬高臀部、平躺片刻,助精液停留;(4)鼓勵夫妻溝通感受、減壓。本題問「錯誤」者為「排卵期前後每天行房」(應隔日)。","options":{"A":"錯誤(本題答案)。應「隔日」行房,每天行房稀釋精子濃度。","B":"正確。性交後墊高臀部助精液停留。","C":"正確。鼓勵夫妻溝通感受。","D":"正確。排卵期黏液由黏稠變稀薄、量增。"},"sources":["生殖醫學 助孕指導","新文京《婦科護理學》不孕護理"]}},"109110-N4-34":{"quick":"試管嬰兒驗孕未孕、病人否認結果時,應鼓勵表達疑問與擔憂、提供支持並與醫療團隊討論後續。","detail":{"background":"人工生殖失敗(驗孕陰性)對夫妻是重大失落與壓力,病人否認檢驗結果常為哀傷的否認期反應。護理應採同理、支持的治療性溝通:鼓勵其表達疑問、擔憂與情緒,陪伴哀傷,必要時協助聯絡配偶共同面對,並與醫療團隊討論後續治療計畫(再次療程或其他選擇),而非以「報告最準、請再接再厲」「努力接受現實」等否定或催促的回應草率帶過。本題最適當為「鼓勵表達疑問與擔憂、與團隊共同討論後續」。","options":{"A":"雖可聯絡醫師解釋,但未先處理情緒,非最佳。","B":"催促「再接再厲」忽略當下哀傷情緒。","C":"要求「努力接受現實」否定情緒,非治療性。","D":"正確。鼓勵表達情緒、提供支持並與團隊討論後續。"},"sources":["新文京 治療性溝通","生殖醫學 失敗後心理照護"]}},"111110-N4-38":{"quick":"精液檢查以手淫法收集,不可用一般保險套(含殺精劑);其餘禁慾3–5天、室溫、1–2小時送檢正確。","detail":{"background":"精液檢查採檢正確原則複習:禁慾約3–5天(2–7天範圍)、以手淫法收集於無菌廣口容器、室溫保存避免過冷過熱、1–2小時內送檢。錯誤作法:用一般保險套或性交中斷法收集(乳膠與殺精劑殺精、性交中斷丟失含精子量最多的前段)。本題問「錯誤」者為「自慰射精並以保險套方式收集」——應直接射入無菌容器,不可用一般保險套。","options":{"A":"正確。檢查前禁慾3–5天。","B":"錯誤(本題答案)。不可用一般保險套收集(含殺精劑),應直接射入無菌容器。","C":"正確。室溫保存。","D":"正確。1–2小時內送檢。"},"sources":["WHO 精液採檢","新文京《婦科護理學》"]}},"112030-N4-36":{"quick":"精蟲濃度800萬/mL低於正常(≥1500萬/mL),屬「精蟲減少症(寡精症)」。","detail":{"background":"依WHO參考值判讀此精液分析:精液量7 c.c.(偏多但量過多非主要問題)、濃度800萬/mL(低於正常≥1500萬→寡精症 oligospermia)、活動力42%(略高於40%邊緣,尚可)、正常形態50%(正常)。主要異常為「精蟲濃度過低」,故為「精蟲減少症」。鑑別名詞:無精症(azoospermia,無精子)、寡精症(oligospermia,濃度低)、弱精症(asthenospermia,活動力低)、畸形精蟲症(teratospermia,形態異常)、精液過少症(hypospermia,精液量<1.5 mL)。本題答案為精蟲減少症。","options":{"A":"錯。濃度800萬/mL低於正常,非一切正常。","B":"錯。正常形態50%尚可,非畸形精蟲症為主。","C":"錯。精液量7 c.c.不算過少。","D":"正確。濃度<1500萬/mL為精蟲減少症(寡精症)。"},"sources":["WHO 精液分析參考值","新文京《婦科護理學》男性不孕"]}},"112110-N4-37":{"quick":"抗穆氏管荷爾蒙(AMH)反映卵巢卵子儲量、不受月經週期影響,可於週期任何時間檢測。","detail":{"background":"抗穆氏管荷爾蒙(AMH, Anti-Müllerian Hormone)由卵巢小竇前/竇狀濾泡的顆粒細胞分泌:(1)反映「卵巢卵子儲量(ovarian reserve)」,用於評估卵巢功能與預測對排卵刺激的反應、輔助不孕評估;(2)「不受月經週期影響」,故可於週期任何一天抽血(不需限定第14天)——此為AMH相對於FSH的優點;(3)年輕女性AMH平均約2–4 μg/L(ng/mL),隨年齡與卵巢功能下降而降低。本題問「錯誤」者為「受月經週期影響,需於第14天檢測」(實際不受週期影響、任何時間皆可)。","options":{"A":"正確。AMH反映卵子儲量。","B":"正確。可評估卵巢功能。","C":"錯誤(本題答案)。AMH不受月經週期影響,可任何時間檢測,不限第14天。","D":"大致正確。年輕女性AMH約2–4 μg/L。"},"sources":["生殖醫學 卵巢儲量 AMH","新文京《婦科護理學》不孕評估"]}},"101110-N4-76":{"quick":"凱格爾運動正確執行的指標:放在陰道口的食指可感到骨盆底肌的收縮。","detail":{"background":"凱格爾運動(Kegel exercise)是收縮放鬆骨盆底肌(提肛肌群)以強化骨盆底、預防與改善壓力性尿失禁、骨盆器官脫垂、增進產後與性功能。正確要領:收縮「提肛/憋住排尿與排便」的肌肉,維持數秒再放鬆,反覆多組;執行時「腹部、大腿與臀部放鬆」,不可憋氣或縮小腹。確認方法:將手指置於陰道口可感受到骨盆底肌收縮上提,或排尿中途能短暫中斷尿流(僅用於確認肌群、不建議常做)。本題正確指標為「放在陰道口的食指感到骨盆肌收縮」。","options":{"A":"錯。深呼吸憋氣10秒非凱格爾要領(不可憋氣)。","B":"解尿時中斷尿流可確認肌群,但不建議當作常規練習方式。","C":"錯。應收縮骨盆底肌而非小腹收縮。","D":"正確。陰道口食指感到骨盆底肌收縮,代表使用正確肌群。"},"sources":["新文京《婦科護理學》骨盆底肌運動","尿失禁 Kegel 衛教"]}},"102110-N4-32":{"quick":"凱格爾運動目的不含「改善腹直肌分離」(那是腹部運動);其目的為強化骨盆底、預防壓力性尿失禁等。","detail":{"background":"凱格爾運動針對「骨盆底肌(提肛肌群)」:(1)是陰道(骨盆底)收縮與放鬆交互的運動;(2)促進會陰部血液循環、減輕會陰腫脹疼痛(產後或痔瘡);(3)強化骨盆底支持,預防與改善「壓力性尿失禁」、骨盆器官脫垂,並增進性功能。它「不能改善腹直肌分離(diastasis recti)」——腹直肌分離需藉腹部核心(腹橫肌)運動矯正,與骨盆底肌訓練不同。本題問「錯誤(非其目的)」者為「改善腹直肌分離」。","options":{"A":"正確目的。陰道收縮放鬆交互運動。","B":"正確目的。促進會陰循環、減輕腫脹疼痛。","C":"錯誤(本題答案)。腹直肌分離需腹部運動矯正,非凱格爾目的。","D":"正確目的。預防壓力性尿失禁。"},"sources":["新文京《婦科護理學》骨盆底肌運動","產後復健"]}},"103030-N4-35":{"quick":"強暴施暴者來自各種社會背景、多數無精神疾病診斷;強暴本質為暴力/權力犯罪而非性衝動。","detail":{"background":"性侵害(強暴)的正確認知:(1)強暴是以「暴力、控制與權力」為核心的犯罪行為,非單純「性衝動」過強所致;(2)施暴者來自「各種不同社會經濟與背景」,多數「沒有」精神疾病診斷,不能以「有精神障礙無法控制」為其開脫;(3)婚姻關係中仍可能成立強制性交(「夫妻間沒有強暴問題」為錯誤觀念);(4)受害者非自願、無分年齡性別。護理對受害者應提供安全、保密、同理的支持與證據採集(性侵害驗傷)、危機處理與後續轉介。本題正確敘述為「施暴者來自各種社會背景且多無精神疾病診斷」。","options":{"A":"錯。婚姻中仍可能成立強制性交。","B":"錯。強暴為暴力/權力犯罪,非性衝動較活躍所致。","C":"錯。施暴者多數無精神疾病,不能以此卸責。","D":"正確。施暴者來自各種社會背景,多無精神疾病診斷。"},"sources":["性侵害防治 概念","新文京《婦科護理學》性侵害護理"]}},"105030-N4-35":{"quick":"提供性病「相關知識/衛教」屬PLISSIT模式的「訊息限制(Limited Information)」階段。","detail":{"background":"Annon的PLISSIT性諮商模式分四層級,由淺入深:(1)P(Permission允諾)——給予許可,讓個案安心談論性議題;(2)LI(Limited Information訊息限制)——提供與其問題「相關的特定資訊/衛教」(如性病傳染知識),為本題情境;(3)SS(Specific Suggestions特定建議)——針對個別問題給具體行為建議;(4)IT(Intensive Therapy加強治療)——轉介專業性治療師做深入治療。護理師多執行前兩層級(P與LI)。本題提供性病傳染知識,屬「訊息限制(LI)」。","options":{"A":"允諾(P)是給予談論性議題的許可,非提供知識。","B":"正確。提供性病相關知識屬訊息限制(LI)。","C":"特定建議(SS)是針對個別問題的具體行為建議。","D":"加強治療(IT)需轉介專業性治療,屬最深層級。"},"sources":["Annon PLISSIT 模式","新文京 性健康諮商"]}},"105090-N4-40":{"quick":"壓力性尿失禁的護理指導以「骨盆底肌肉運動(凱格爾)」為核心。","detail":{"background":"壓力性尿失禁(stress urinary incontinence):咳嗽、大笑、打噴嚏、提重物等腹壓上升時,因骨盆底肌與尿道括約肌支持不足而漏尿,常見於多產、停經(雌激素低)、肥胖、年長婦女。第一線非侵入處置為「骨盆底肌肉運動(凱格爾運動)」——強化骨盆底支持、改善控尿;搭配減重、膀胱訓練、改善便秘與咳嗽、必要時局部雌激素或手術(尿道中段吊帶)。本題承上題(壓力性尿失禁)最恰當護理指導為「骨盆底肌肉運動」。陷阱:含膠質食物、白天減少喝水、負重運動皆非針對性處置。","options":{"A":"錯。含膠質食物與壓力性尿失禁無直接關係。","B":"錯。過度減少喝水易濃縮尿液刺激膀胱,非首選。","C":"正確。骨盆底肌肉運動(凱格爾)為壓力性尿失禁核心處置。","D":"錯。漸進式負重運動非針對壓力性尿失禁。"},"sources":["新文京《婦科護理學》尿失禁","壓力性尿失禁保守治療"]}},"106030-N4-35":{"quick":"第一度子宮脫垂與支持子宮的「子宮薦骨韌帶、主韌帶(基底韌帶)」無力有關。","detail":{"background":"子宮的支持構造:主要由「主韌帶(cardinal/基底韌帶, Mackenrodt)」與「子宮薦骨韌帶(uterosacral ligament)」提供向上向後的核心支持,維持子宮在骨盆腔的位置;圓韌帶(維持前傾)與闊韌帶主要為固定/包覆而非主要承重。當這些主要支持韌帶(尤主韌帶與子宮薦骨韌帶)鬆弛無力(多產、停經、慢性腹壓增加),子宮即下垂(脫垂)。脫垂分度:第一度(子宮頸下降至陰道內)、第二度(達陰道口)、第三度(脫出陰道口外)。本題第一度子宮脫垂與「子宮薦骨韌帶、主韌帶」無力有關。","options":{"A":"闊韌帶、圓韌帶主為固定/前傾,非主要承重支持。","B":"正確。子宮薦骨韌帶與主韌帶為子宮主要支持,無力致脫垂。","C":"圓韌帶非主要承重支持。","D":"輸卵管骨盆韌帶、闊韌帶非子宮主要承重支持。"},"sources":["新文京《婦科護理學》骨盆器官脫垂","骨盆底解剖"]}},"106030-N4-41":{"quick":"神經性厭食症患者「自覺身體外型太瘦」並非其表徵——他們有身體心像扭曲、即使消瘦仍覺自己胖。","detail":{"background":"神經性厭食症(anorexia nervosa)好發於青春期女性:核心為對肥胖的強烈恐懼與「身體心像扭曲」——即使體重明顯過低,仍自覺「太胖」而持續限制進食、過度運動或催吐;BMI偏低、嚴重者出現停經(≥3個月)、四肢冰冷怕冷、低血壓心搏過緩、毛髮細軟(lanugo)、電解質失衡、骨質疏鬆。進食行為異常(玩弄食物、極少量進食)。本題問「不是」表徵者為「自覺身體外型太瘦」——實際患者扭曲地自覺太胖,故為非表徵。","options":{"A":"是表徵。進食時玩弄食物、迴避進食。","B":"本題答案(非表徵)。患者身體心像扭曲、自覺太胖而非太瘦。","C":"是表徵。體重過低致超過3個月無月經。","D":"是表徵。代謝率下降致四肢冰冷、怕冷。"},"sources":["DSM-5 神經性厭食症","新文京 青少年身心健康"]}},"107030-N4-39":{"quick":"婦女腹部(經腹)超音波檢查需「脹滿膀胱」——多喝水憋尿,使膀胱充盈作為聲窗顯像骨盆腔。","detail":{"background":"婦科超音波兩途徑:(1)經腹部超音波——需「脹滿膀胱」(檢查前多喝水、憋尿不解小便),充盈的膀胱可推開腸氣、作為透音窗清楚顯示子宮卵巢;(2)經陰道超音波——則需「排空膀胱」、影像更近更清晰。本題為「腹部超音波」,護理指導為「喝水脹膀胱」。腹部超音波非侵入性、不需簽署侵入性同意書或鎮靜劑。陷阱:排空膀胱是「陰道」超音波的準備,與腹部超音波相反。","options":{"A":"非必要。一般腹部超音波非侵入性,不需簽侵入同意書。","B":"錯。不需鎮靜劑。","C":"錯。排空膀胱是「經陰道」超音波的準備。","D":"正確。經腹超音波需多喝水脹膀胱作為聲窗。"},"sources":["新文京《婦科護理學》婦科超音波","影像檢查護理"]}},"108110-N4-38":{"quick":"子宮托(pessary)放置於「陰道後穹窿」以托住下垂的子宮頸/子宮。","detail":{"background":"子宮托(pessary)是子宮/骨盆器官脫垂的保守(非手術)治療:置入陰道內支撐脫垂的子宮與陰道壁,適合不適合手術、年長或暫時性需求者。放置位置:後緣置於「陰道後穹窿」、前緣抵於恥骨聯合後方,藉以承托子宮頸。護理:定期取出清潔(避免長期壓迫致潰瘍、感染、瘻管)、合併局部雌激素改善黏膜、教導自我清潔與回診追蹤、注意異常分泌或出血。本題正確放置部位為「陰道後穹窿」。","options":{"A":"錯。前穹窿非主要承托位置。","B":"正確。子宮托後緣置於陰道後穹窿承托子宮頸。","C":"錯。非置於子宮頸外口。","D":"錯。非置於子宮頸內口。"},"sources":["新文京《婦科護理學》骨盆器官脫垂/子宮托","Pessary 照護"]}},"109110-N4-36":{"quick":"陰道瘻管最常見原因為「手術傷害」(婦科/骨盆手術、產傷、放療或惡性侵犯)。","detail":{"background":"陰道瘻管(vaginal fistula)指陰道與膀胱(膀胱陰道瘻)或直腸(直腸陰道瘻)等之間形成異常通道:(1)最常見原因——骨盆腔/婦科「手術傷害」(如子宮切除術),其他為難產產傷(產程遲滯壓迫缺血)、骨盆腔放射治療、惡性腫瘤侵犯、感染;(2)膀胱陰道瘻表現為陰道「持續漏尿」(非糞便味),直腸陰道瘻才有糞便/排氣經陰道;(3)診斷可用亞甲藍(甲基藍)「染料試驗」——將染液注入膀胱,看陰道棉墊是否染色(非「試紙」測試);(4)治療多需「手術修補」(非以內科治療為主)。本題正確敘述為「最常見原因為手術傷害」。","options":{"A":"正確。陰道瘻管最常見原因為手術傷害。","B":"錯。甲基藍試驗是注入染液看陰道是否染色,非「試紙」。","C":"錯。治療多需手術修補,非以內科治療為主。","D":"錯。膀胱陰道瘻為漏「尿」;糞便味見於直腸陰道瘻,非「經常」。"},"sources":["新文京《婦科護理學》陰道瘻管","婦科手術併發症"]}},"110110-N4-40":{"quick":"性交疼痛的處置應「夫妻共同參與」,不應「為顧及配偶自尊而治療初期只以妻子為主」。","detail":{"background":"性交疼痛(dyspareunia)病因多元(陰道乾澀、感染、陰道痙攣、子宮內膜異位、骨盆病變、心理因素等),處置強調「伴侶共同參與」的整體性照護:(1)夫妻一起討論、發掘彼此被忽略的問題與感受;(2)探討病因期間可建議暫時禁慾,減輕疼痛與焦慮;(3)必要時使用無刺激性的水性潤滑劑改善乾澀;(4)治療生理病因並提供性諮商。本題問「錯誤」者為「為顧及配偶自尊,治療初期以王女士(妻子)為主」——應夫妻共同參與,而非單方,故錯誤。","options":{"A":"正確。夫婦一起討論發掘忽略的問題。","B":"錯誤(本題答案)。性問題應夫妻共同參與,不應只以單方為主。","C":"正確。探討病因期間可建議暫時禁慾。","D":"正確。必要時用無刺激性潤滑劑改善。"},"sources":["新文京 性健康/性功能障礙","婦女性健康照護"]}}},TO=["1女性生殖生理與月經週期", "2痛經經前症候群與月經衛生", "3更年期與荷爾蒙補充療法", "4避孕方法與家庭計畫", "5陰道炎骨盆腔感染與性傳染病", "6子宮頸癌子宮頸疾病與抹片篩檢", "7子宮卵巢腫瘤子宮內膜異位與乳癌", "8不孕症與生殖醫學", "9骨盆鬆弛尿失禁脫垂與婦女健康議題"],LEC={"1女性生殖生理與月經週期":{"html":"\n<p><b>下視丘–腦下垂體–卵巢軸:</b>下視丘分泌 GnRH → 腦下垂體前葉分泌<b>促性腺激素 FSH、LH</b> → 卵巢分泌雌激素(estrogen,動情激素)與黃體素(progesterone)。注意:雌激素與黃體素是<b>卵巢(性腺)</b>分泌,<b>不是</b>腦下垂體激素;catecholamine 無關。</p>\n<p><b>月經週期(以28天為例):</b>濾泡期 FSH 促濾泡發育分泌雌激素 → 雌激素高峰正回饋引發 <b>LH surge → 排卵</b> → 黃體期黃體分泌雌激素+黃體素 → 未受孕黃體萎縮、兩荷爾蒙驟降 → 月經來潮。</p>\n<ul>\n<li><b>雌激素作用:</b>促子宮內膜增生、維持陰道上皮厚度與肝醣(供乳酸桿菌酸化、潤滑)、穩定體溫中樞(缺乏→熱潮紅)、升 HDL 降 LDL、護骨、提升情緒。</li>\n<li><b>黃體素作用:</b>內膜轉分泌期、<b>升基礎體溫 0.3–0.5°C</b>(排卵後高溫期)、子宮頸黏液變稠、安胎抑制宮縮。</li>\n<li><b>基礎體溫(BBT):</b>雙相型;體溫降到最低點隨即上升 = 排卵;高溫期≥16天可能懷孕。</li>\n<li><b>白帶(leukorrhea):</b>正常為白色/透明、無臭、酸性(pH 3.8–4.5,乳酸桿菌作用),排卵期、經前、孕期因雌激素高而<b>增多</b>(非減少);懷孕黏稠無臭白帶為生理性。</li>\n</ul>\n<p><b>陷阱:</b>潤滑/陰道濕潤是雌激素(非黃體素);情緒低落是「缺乏」雌激素;estrogen 非腦下垂體促性腺激素。</p>\n"},"2痛經經前症候群與月經衛生":{"html":"\n<p><b>原發性痛經(primary dysmenorrhea):</b>無器質病變、初經後年輕女性常見。機轉:黃體期內膜儲積<b>前列腺素(PGF2α)</b>,月經來潮時釋放致子宮強力痙攣缺血而痛,常於來潮前數小時~來潮初期最劇,伴噁心腹瀉頭痛。治療:首選 <b>NSAID(前列腺素抑制劑)</b>,經前即服;口服避孕藥抑制排卵;熱敷、溫飲、運動。<b>陷阱:給的是前列腺素「抑制劑」,不是前列腺素製劑。</b></p>\n<p><b>續發性痛經:</b>子宮內膜異位、腺肌症、肌瘤、PID 等器質病因,痛感型態不同(較早開始、持續較久)。</p>\n<p><b>經前症候群(PMS):</b>黃體期反覆出現生理(乳房脹、水腫、頭痛)、心理(易怒焦慮憂鬱)、行為的<b>週期性</b>變化,月經來潮後緩解。多因素(性荷爾蒙波動、血清素↓、前列腺素、水鈉滯留)。處置以<b>生活型態調整</b>為基礎:規律作息與良好睡眠、運動、限鹽限咖啡因限酒、補<b>維生素B6</b>與鈣鎂;嚴重者 SSRI/口服避孕藥。經期不適亦可補<b>維生素E</b>。</p>\n<p><b>月經衛生:</b>勤換衛生棉、採淋浴避盆浴、棉質透氣內褲、清水或中性肥皂清潔外陰;<b>絕對不可用清潔液灌洗陰道</b>(破壞菌叢酸鹼、增感染與PID)。</p>\n"},"3更年期與荷爾蒙補充療法":{"html":"\n<p><b>更年期生理:</b>卵巢濾泡耗竭 → 雌激素↓、抑制素↓ → 負回饋減弱 → <b>FSH、LH 皆上升(FSH 尤顯著,>40 IU/L 為停經指標)</b>;黃體素因不排卵而↓。連續12個月無月經=停經。</p>\n<ul>\n<li><b>症狀:</b>熱潮紅、盜汗(血管舒縮);陰道乾澀、萎縮性陰道炎、性交痛;情緒睡眠障礙;長期 → 骨質流失、LDL↑(心血管風險↑)。</li>\n<li><b>骨質疏鬆預防:</b>鈣 <b>1000–1200 mg/天</b>、維生素D 400–800 IU、<b>負重運動</b>、戒菸限酒;勿過低熱量、勿避免負重運動、體重勿低於理想。</li>\n</ul>\n<p><b>荷爾蒙補充療法(HRT):</b>主要目的緩解<b>血管舒縮症狀(熱潮紅)</b>與泌尿生殖萎縮;有子宮者須加黃體素保護內膜防內膜癌。<b>2002 WHI</b>:長期合併 HRT 與乳癌、血栓、中風、冠心風險↑ → 採最低有效劑量、最短必要期間,症狀緩解後 6–9 個月減量停藥。</p>\n<p><b>HRT 禁忌:</b>乳癌、雌激素依賴腫瘤(內膜癌)、不明陰道出血、靜脈/動脈血栓史、嚴重肝病、懷孕。<b>憂鬱症「不是」禁忌。</b></p>\n<p><b>保健:</b>停經後仍須定期子宮頸抹片;陰道乾澀用潤滑劑/局部雌激素,不需停止性行為;避免熱潮紅誘因(辛辣熱飲酒)。</p>\n"},"4避孕方法與家庭計畫":{"html":"\n<p><b>屏障法(保險套):</b>不含荷爾蒙、防性病、可立即使用,為<b>哺乳/產後早期首選</b>。</p>\n<p><b>口服避孕藥:</b>(1)複方(雌+黃體素)抑制排卵為主+黏液變稠+內膜不利著床;<b>哺乳期不用(雌激素抑制泌乳)、產後約21–28天血栓風險下降後再用</b>;禁忌:血栓史、懷孕、未控制高血壓、乳癌、35歲吸菸≥15支。(2)迷你丸(純黃體素)主靠黏液變稠/內膜效應(非穩定抑制排卵),適哺乳婦女,常見不規則出血。</p>\n<p><b>子宮內避孕器(IUD):</b>產後 <b>4–6 週</b>子宮復舊後置入;禁忌:不明出血、月經過多、嚴重痛經、生殖道感染、子宮外孕高風險。月經不規則者非禁忌。</p>\n<p><b>注射(Depo-Provera):</b>非月經初期注射需約7天才生效,前期併用保險套。</p>\n<p><b>自然避孕:</b>BBT 危險期=排卵前3天~排卵後2天;月曆法危險期=最短週期−18 至最長週期−11(部分教材−10),僅適規律者,效果約80%。<b>泌乳停經法(LAM):</b>產後6個月內+全親餵(不分晝夜)+月經未恢復,三條件齊備才有效。</p>\n<p><b>結紮:</b>女性結紮可產後24–48小時內施行,術後仍排卵有月經;男性結紮<b>非立即有效</b>(需約3個月/20次射精、複查無精)。<b>緊急避孕:</b>性行為後限時使用(levonorgestrel、RU486 抗黃體素、銅T),為補救非常規。</p>\n"},"5陰道炎骨盆腔感染與性傳染病":{"html":"\n<table border=\"1\" cellpadding=\"4\" style=\"border-collapse:collapse\"><tr><th>陰道炎</th><th>分泌物/特徵</th><th>治療</th></tr>\n<tr><td>念珠菌(黴菌)</td><td>白色乳酪狀、劇癢;好發糖尿病/抗生素/口服避孕藥/孕期</td><td>抗黴菌藥;去誘因(停抗生素/避孕藥/類固醇、控血糖)</td></tr>\n<tr><td>滴蟲(性傳染)</td><td>黃綠泡沫、腥臭、草莓子宮頸</td><td>metronidazole;<b>伴侶同治、戴套、服藥禁酒</b></td></tr>\n<tr><td>細菌性(BV)</td><td>灰白稀薄、魚腥味、clue cells</td><td>metronidazole</td></tr>\n<tr><td>萎縮性</td><td>停經後<b>雌激素</b>缺乏、黏膜薄乾澀、pH↑</td><td>局部雌激素/潤滑劑</td></tr></table>\n<p><b>骨盆腔發炎(PID):</b>多由披衣菌/淋病上行(多種菌),或放 IUD、產後流產後感染。症狀:下腹兩側壓痛、<b>子宮頸搖動痛</b>、附件壓痛、發燒、膿狀分泌、性交痛。重要合併症:<b>輸卵管沾黏 → 不孕、子宮外孕</b>。護理:靜脈/口服抗生素完成療程、<b>半坐臥引流</b>、暫停性生活、伴侶同治、多喝水、<b>不可陰道灌洗</b>、不用IUD避孕。</p>\n<p><b>性傳染病:</b>需<b>伴侶同治</b>、安全性行為衛教;<b>披衣菌</b>常無症狀、易致輸卵管性不孕;<b>菜花</b>由 HPV-6、11(低危型);梅毒首選 penicillin;<b>毒性休克症候群</b>與經期長時間用衛生棉條相關(金黃葡萄球菌外毒素)。對 STD 患者採同理、保密、不批判的治療性溝通。</p>\n"},"6子宮頸癌子宮頸疾病與抹片篩檢":{"html":"\n<p><b>病因:</b>持續感染高危險型 <b>HPV(16、18 型約佔七成)</b>。危險因子:多重性伴侶、早年初次性行為、性病史、吸菸、免疫低下(HIV)、長期口服避孕藥、篩檢不足。<b>高齡本身非危險因子。</b></p>\n<p><b>三道防線:</b>① HPV 疫苗(初級;<b>接種後仍須定期抹片</b>,需完整劑次,二價16/18、四價+6/11防菜花、九價更廣)② 子宮頸抹片/HPV 檢測(次級早期偵測,<b>有性經驗</b>女性篩檢)③ 治療癌前病變。</p>\n<ul>\n<li><b>抹片注意:</b>避開月經與<b>急性子宮頸炎</b>(發炎細胞干擾、易出血),採檢前24–48小時勿性行為/塞劑/灌洗,採後95%酒精/固定液固定送檢。無性經驗者風險極低、不需常規篩檢。</li>\n<li><b>早期表現:</b>接觸性出血(性交後出血)、不規則陰道出血、血性惡臭分泌。</li>\n<li><b>陰道鏡:</b>抹片異常時進一步檢查,最能看清<b>子宮頸轉換區(病變好發處)</b>。</li>\n<li><b>治療:</b>根除性子宮切除術後易傷膀胱神經 → 需<b>膀胱訓練</b>;腔內放療採低渣飲食、臥床防放射源移位、限制孕婦孩童訪客。</li>\n</ul>\n<p><b>子宮頸糜爛:</b>柱狀上皮外翻,有症狀者最常用<b>冷凍治療</b>。</p>\n"},"7子宮卵巢腫瘤子宮內膜異位與乳癌":{"html":"\n<p><b>子宮肌瘤:</b>雌激素依賴良性平滑肌瘤,以肌層內最常見;常致<b>不正常子宮出血</b>、壓迫、痛經;惡性變罕見。藥物:口服避孕藥/GnRH類似物;肌瘤切除保留子宮(術後仍有月經、不需補荷爾蒙)。</p>\n<p><b>子宮內膜癌:</b>長期<b>無對抗雌激素</b>刺激 → 危險因子:肥胖、未生育、初經早晚停經、多囊卵巢、糖尿病高血壓、單用雌激素、Tamoxifen、Lynch。最常見表現<b>停經後/異常陰道出血</b>(多早期發現);診斷 D&C/內膜切片;治療以手術為主。長期用「黃體素」是保護。</p>\n<p><b>卵巢癌:</b>「沉默殺手」,晚期才有腹脹、腹水、頻尿、腰圍變大;指標 <b>CA-125</b>。危險因子:年齡大、未生育、初經早停經晚、BRCA/家族史;保護:多產、哺乳、口服避孕藥。<b>多囊卵巢(PCOS):</b>雄性素過多、無排卵(月經過少/無)、胰島素阻抗、多毛肥胖(非雌激素過多、非月經過多)。</p>\n<p><b>子宮內膜異位症:</b>異位內膜(卵巢巧克力囊腫、腺肌症)致經痛、慢性骨盆痛、不孕。診斷靠腹腔鏡+病理;藥物以<b>降雌激素</b>為主(口服避孕藥、黃體素、Danazol、GnRH類似物),<b>排卵藥不是治療藥</b>;治療後仍可能復發。</p>\n<p><b>絨毛膜癌:</b>滋養層惡性,hCG 追蹤,易轉移肺,<b>對化療敏感、以化學治療為主</b>。<b>乳癌:</b>年輕緻密乳腺篩檢用超音波;Tamoxifen(SERM)副作用含更年期症狀、噁心、水腫、<b>內膜癌與血栓風險↑</b>;放療皮膚勿黏膠布、穿寬鬆、避曬。</p>\n"},"8不孕症與生殖醫學":{"html":"\n<p><b>不孕檢查:</b>女性——BBT/血清黃體素(黃體中期升高=已排卵)、子宮輸卵管攝影(輸卵管通暢與子宮腔)、超音波追蹤濾泡、<b>AMH(卵巢儲量,不受月經週期影響、任何時間可測)</b>;同房試驗看精子在子宮頸黏液活動。男性——<b>精液分析</b>。</p>\n<p><b>精液分析(WHO):</b>量≥1.5 mL、濃度≥1500萬/mL、活動力≥40%、正常形態≥4%。採檢:禁慾2–7天、<b>手淫法</b>收集於無菌容器(不可用一般保險套/性交中斷)、<b>室溫1–2小時內送檢</b>(勿冷藏勿過熱)。寡精症=濃度低、弱精症=活動力低、畸形精蟲症=形態異常。男性不孕與<b>高溫</b>(三溫暖、緊身褲)、菸酒相關;低溫工作非原因。</p>\n<p><b>人工協助生殖:</b>輸卵管阻塞 → <b>IVF-ET(試管,不需經輸卵管)</b>;AIH/GIFT/ZIFT 需輸卵管通暢。<b>IVF流程:</b>促卵泡成熟→偵測成熟度→hCG扳機(後約36小時排卵,取卵在34–36小時)→取卵授精→黃體素支持。</p>\n<p><b>OHSS:</b>誘排卵藥(非HRT)引起,排卵後數天發生,腹水、血液濃縮、凝血/腎功能異常,懷孕者延續至妊娠6–8週。<b>人工生殖法:</b>受術者限不孕夫妻(未婚不可)、禁代理孕母、捐贈不得四親等內血親。失敗時以同理支持、鼓勵表達情緒。</p>\n"},"9骨盆鬆弛尿失禁脫垂與婦女健康議題":{"html":"\n<p><b>骨盆底解剖:</b>子宮主要由<b>主韌帶與子宮薦骨韌帶</b>支持;鬆弛(多產、停經、慢性腹壓↑)致子宮脫垂(分三度)。</p>\n<p><b>凱格爾運動(Kegel):</b>收縮放鬆<b>骨盆底肌(提肛肌)</b>,強化骨盆底、預防/改善<b>壓力性尿失禁</b>與脫垂、促會陰循環。正確確認:陰道口手指可感到收縮、腹臀大腿放鬆不憋氣。<b>不能改善腹直肌分離</b>(那需腹部運動)。</p>\n<p><b>壓力性尿失禁:</b>腹壓上升(咳嗽大笑)時漏尿;第一線為凱格爾運動,搭配減重、膀胱訓練、改善便秘咳嗽。</p>\n<p><b>子宮托(pessary):</b>脫垂的保守治療,後緣置於<b>陰道後穹窿</b>承托;定期取出清潔、合併局部雌激素、注意潰瘍感染。</p>\n<p><b>陰道瘻管:</b>最常見原因<b>手術傷害</b>(亦產傷、放療、腫瘤);膀胱陰道瘻=持續漏尿;甲基藍染料試驗;<b>多需手術修補</b>。</p>\n<p><b>婦女健康其他:</b>婦科經腹超音波需<b>脹滿膀胱</b>(經陰道超音波則排空);性交疼痛處置須<b>夫妻共同參與</b>;性侵害是暴力/權力犯罪、施暴者多無精神疾病、婚姻內仍可成立;PLISSIT 模式:允諾→訊息限制(衛教知識)→特定建議→加強治療(轉介);神經性厭食症有身體心像扭曲(自覺胖)、停經、怕冷。</p>\n"}};

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}

const TOTAL=Q.length, KEY='n4_o1_v1';
let PROG={}, wrongOnly=false;

function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}

 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
