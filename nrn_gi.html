":{"A":"是。腹水。","B":"錯誤(本題答案)。是門脈高壓,非全身高血壓。","C":"是。肝性腦病變。","D":"是。食道靜脈曲張。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"107110-N3-9":{"quick":"利尿劑「不能」促進氨排除;肝性腦病變用lactulose/限蛋白降氨。","detail":{"background":"肝性腦病變表現為意識改變、人格與行為變化、撲動性震顫(asterixis)、血氨上升；誘因有上消化道出血、高蛋白飲食、感染、便秘、低血鉀、鹼中毒與鎮靜劑；治療以降低腸道氨生成與吸收為核心。","options":{"A":"正確。昏迷前期嗜睡。","B":"正確。應預防便秘。","C":"正確。為血氨升高致中樞神經障礙。","D":"錯誤(本題答案)。利尿劑不能促氨排除(反致低鉀鹼中毒加重肝腦病變);降氨用lactulose、限蛋白。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"108020-N3-12":{"quick":"Lactulose:酸化糞便、減少氨及含氮物吸收,並產生輕瀉(導瀉)作用。","detail":{"background":"Lactulose為不可吸收雙醣，在結腸被細菌分解產酸使腸道酸化、將NH3轉為不易吸收的NH4+並促進排便，藉此降低血氨；以每日2~3次軟便為調整目標，腹瀉過度需減量以免脫水與低血鉀。","options":{"A":"錯誤。非預防腸道感染壞死。","B":"正確(本題答案)。Lactulose減少氨/含氮廢物吸收並輕瀉導出。","C":"錯誤。與尿液滲透壓/肝腎症候群無直接關係。","D":"錯誤。Lactulose不降門脈高壓或減腹水。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"108110-N3-11":{"quick":"抽腹水1500mL後可能因腹內壓驟降、體液移位→「心跳加快」(低血容反應)。","detail":{"background":"快速放出大量腹水(>數公升)會使腹內壓驟降、內臟血管擴張、有效循環血量下降,導致心跳加快、血壓下降(低血容/循環衰竭),甚至誘發肝腎症候群。故放液應緩慢並視量補充白蛋白。抽1500mL後最可能出現心跳加快(代償)。 補充：快速放出大量腹水(>數公升)使腹內壓驟降、內臟血管擴張、有效循環血量下降,致心跳加快、血壓下降甚至循環衰竭與肝腎症候群;故放液應緩慢並依量補充白蛋白維持膠體滲透壓。","options":{"A":"放液後腹壓「下降」反使呼吸較順,非加快。","B":"正確(本題答案)。低血容代償致心跳加快。","C":"放液與發燒無直接關係。","D":"血壓多「下降」非上升。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"109030-N3-12":{"quick":"阻塞性黃疸因膽汁無法入腸、脂溶性維生素K吸收差→凝血酶原時間延長。","detail":{"background":"黃疸鑑別:①溶血性—間接膽紅素↑、糞便色深、非肝硬化專屬;②肝細胞性—直接間接皆↑,白血球不一定增多;③阻塞性—直接膽紅素↑、灰白便、茶色尿,因膽汁不入腸致脂溶性維生素K吸收不良→凝血因子合成減少→「凝血酶原時間(PT)延長」。三型中只有結合型膽紅素升高者(肝細胞性、阻塞性)尿膽紅素才增加,溶血性尿膽紅素不增加。","options":{"A":"錯誤。溶血性黃疸非肝硬化所致(是紅血球破壞)。","B":"錯誤。肝細胞性黃疸白血球不一定增多。","C":"正確(本題答案)。阻塞性黃疸維生素K吸收差致PT延長。","D":"錯誤。溶血性黃疸尿膽紅素不增加(間接膽紅素不溶於水)。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"109030-N3-38":{"quick":"Furosemide是利尿劑,非食道靜脈曲張治療藥。","detail":{"background":"食道靜脈曲張藥物：急性出血以somatostatin/octreotide或terlipressin降內臟血流止血；預防再出血用非選擇性β阻斷劑(propranolol/nadolol)降門脈壓；合併內視鏡結紮或硬化治療效果更佳。","options":{"A":"錯誤(本題答案)。Furosemide是利尿劑(用於腹水),非食道靜脈曲張用藥。","B":"正確。Propranolol降門脈壓做預防。","C":"正確。Sandostatin(octreotide)控制出血。","D":"正確。Vasopressin收縮內臟血管止血。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"110030-N3-10":{"quick":"酒精性肝硬化不以「全身搔癢」為特徵;搔癢是膽汁鬱積(膽源性/阻塞)表徵。","detail":{"background":"各型肝硬化臨床:①壞死後肝硬化(B/C肝)會黃疸;②膽源性肝硬化因膽汁鬱積→黃疸、脂肪便、皮膚搔癢(膽鹽沉積);③酒精性肝硬化表現為肝腫大、腹水、營養不良、男性女乳,搔癢非其特徵;④心因性(右心衰竭)肝硬化致肝鬱血腫大。故「酒精性肝硬化全身搔癢」錯誤。","options":{"A":"正確。壞死後肝硬化會黃疸。","B":"正確。膽源性肝硬化脂肪便。","C":"錯誤(本題答案)。全身搔癢屬膽汁鬱積(膽源性),非酒精性特徵。","D":"正確。心因性肝硬化肝臟腫大。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"110030-N3-11":{"quick":"肝性腦病變:維持排便通暢(預防便秘)以減少氨吸收。","detail":{"background":"肝性腦病變處置：給lactulose使腸道酸化、排氨並通便，必要時加rifaximin抑制產氨菌；矯正誘因(止血、控制感染、補鉀、避免鎮靜劑)；急性期限蛋白並改以植物性或支鏈胺基酸蛋白來源。","options":{"A":"正確(本題答案)。維持排便通暢減少腸道氨吸收。","B":"錯誤。應「限制」蛋白(40~60g),非高蛋白。","C":"錯誤。鎮靜安眠藥經肝代謝,會誘發/加重肝腦病變。","D":"錯誤。Lactulose機轉是酸化糞便減少氨吸收/導瀉,非「抑制細菌」(抑菌是Neomycin)。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"110110-N3-11":{"quick":"肝硬化飲食:低鈉(防腹水);足夠熱量、適量優質蛋白(肝腦病變時才限蛋白)、低脂。","detail":{"background":"肝硬化飲食原則:①低鈉(預防/治療腹水水腫);②足夠熱量(高碳水);③適量優質蛋白(維持營養,但發生肝性腦病變時須限蛋白40~60g);④低脂(肝功能差脂肪消化差);⑤補充維生素;⑥禁酒。故「低鈉飲食」正確。高脂、高蛋白(腦病變時)、低熱量皆不適當。","options":{"A":"正確(本題答案)。低鈉飲食。","B":"錯誤。應足夠熱量,非低熱量。","C":"錯誤。應低脂。","D":"錯誤。肝性腦病變時須限蛋白,非高蛋白。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"111030-N3-10":{"quick":"肝硬化腹水機轉:血清白蛋白「下降」(致膠體滲透壓降);非靜力壓下降、非膠體壓上升。","detail":{"background":"肝硬化引起腹水之正確機轉為門脈高壓加低白蛋白血症使液體滲入腹腔、有效循環血量下降續發RAAS活化造成鈉水滯留；常多機轉並存，故治療兼顧限鈉、利尿與補白蛋白。","options":{"A":"錯誤。是微血管「靜水壓上升」(門脈高壓),非下降。","B":"正確(本題答案)。血清白蛋白下降。","C":"錯誤。血漿膠體滲透壓「下降」,非上升。","D":"錯誤。有效循環血量「下降」,非上升。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"111110-N3-11":{"quick":"原發性肝癌常同時罹患B型肝炎;好發男性、亞非地區、AFP(α-胎兒蛋白)升高。","detail":{"background":"原發性肝細胞癌(HCC):好發「男性」、亞洲與非洲(B/C肝盛行區),常合併B型肝炎與肝硬化;腫瘤標記為「α-胎兒蛋白(AFP)」升高(非β);臨床有右上腹腫塊/痛、體重減輕、黃疸、腹水。 補充：原發性肝細胞癌好發亞非B/C肝盛行區之男性,常合併B肝與肝硬化;腫瘤標記為α-胎兒蛋白(AFP)升高;臨床有右上腹腫塊/痛、體重減輕、黃疸、腹水;高危險群每6個月超音波+AFP篩檢。","options":{"A":"錯誤。肝癌好發男性,非女性。","B":"錯誤。原發性肝癌常見於亞非B肝盛行區,非歐美。","C":"正確(本題答案)。原發性肝癌常合併B型肝炎。","D":"錯誤。是「α」-胎兒蛋白(AFP)升高,非β。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"111110-N3-17":{"quick":"溶血性黃疸PT「正常」(肝功能正常);PT延長是阻塞性/肝細胞性。","detail":{"background":"黃疸:①阻塞性黃疸膽汁不入腸,糞便灰白色、維生素K吸收差→PT延長;②膽鹽沉積皮膚致搔癢;③茶色尿(結合型膽紅素/尿膽素原增加)。溶血性黃疸是紅血球破壞致間接膽紅素升高,肝臟合成凝血因子功能正常,故「PT正常」,題目「溶血性黃疸PT延長」錯誤。","options":{"A":"正確。阻塞性黃疸大便灰白色。","B":"錯誤(本題答案)。溶血性黃疸PT正常(肝功能未受損),非延長。","C":"正確。膽鹽沉積皮膚致搔癢。","D":"正確。尿膽素原增加致茶色尿。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"112180-N3-10":{"quick":"肝硬化腹水:醛固酮(留鹽激素)作用亢進致鈉水滯留增加。","detail":{"background":"肝硬化腹水常見成因：門脈高壓、低白蛋白血症、續發性醛固酮增多致鈉水滯留；血漿膠體滲透壓下降與淋巴回流超載亦參與。正確處置為限鈉、spironolactone利尿與監測體重變化。","options":{"A":"錯誤。腹水主因肝硬化門脈高壓,非左心衰竭。","B":"錯誤。白蛋白不足致「膠體滲透壓下降」,非靜水壓上升。","C":"正確(本題答案)。醛固酮亢進致鈉水滯留。","D":"錯誤。門脈高壓使血漿「靜水壓」上升,膠質滲透壓是「下降」非上升。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"113030-N3-6":{"quick":"肝硬化嚴重腹水+意識混亂:ALT/AST輕升(1)+血氨上升120(4)=14。","detail":{"background":"肝硬化合併肝性腦病變實驗室:①肝細胞受損致ALT、AST輕度上升(ALT80、AST55);②白蛋白「下降」(<3.5,題目4.0偏正常→此項不符肝硬化);③凝血酶原時間「延長」(PT應比正常長,題目5秒偏短不符);④血氨(ammonia)升高(120,正常約15~45)致肝性腦病變意識混亂。故符合者為1ALT/AST升高+4血氨升高=14。","options":{"A":"正確(本題答案)。1肝酵素升高+4血氨升高。","B":"(此選項代號)若為12則含白蛋白正常不符。","C":"23不符。","D":"34不符(PT 5秒偏短不合肝硬化)。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"113180-N3-8":{"quick":"TACE術後需定期監測肝功能;術前禁食、門脈阻塞為禁忌、術後臥床勿立即活動。","detail":{"background":"經肝動脈化學栓塞(TACE):術前需禁食、查凝血功能;「門靜脈主幹阻塞」者因正常肝實質也靠門脈供血,栓塞肝動脈恐致肝衰竭,屬「禁忌」非適應症;術後須平躺、穿刺處加壓、勿立即翻身活動;因栓塞致肝細胞缺血壞死,術後須「定期監測肝臟功能」(AST/ALT、膽紅素)與栓塞後症候群。","options":{"A":"錯誤。術前需禁食。","B":"錯誤。門靜脈阻塞是「禁忌」,非適應症。","C":"正確(本題答案)。術後需定期監測肝功能。","D":"錯誤。術後應臥床、勿立即翻身活動。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"114030-N3-8":{"quick":"Lactulose目的:酸化糞便,減少氨在腸道生成與吸收。","detail":{"background":"肝性腦病變病人給予Lactulose的目的是「降低血氨」——透過腸道酸化使氨轉為NH4+不被吸收，並增加排便以排出含氮廢物；並非單純治療便秘，劑量以每日數次軟便為調整準則。","options":{"A":"正確(本題答案)。酸化糞便減少氨在腸道吸收。","B":"抑制腸內細菌減少氨是Neomycin的機轉,非lactulose。","C":"非預防肝腎症候群。","D":"非減輕腹水。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"114100-N3-3":{"quick":"肝性腦病變誘發因子:感染、便秘、腸胃道出血、低血鉀/鹼中毒;「高血鉀」非誘發因子。","detail":{"background":"肝性腦病變誘發因子：上消化道出血(腸道蛋白負荷增加)、高蛋白飲食、感染、便秘、低血鉀與代謝性鹼中毒、脫水、鎮靜安眠藥；與之相反的措施(如補鉀、通便、控制出血)則為預防而非誘因。","options":{"A":"是誘發因子。感染。","B":"是。便秘。","C":"是。腸胃道出血(腸道蛋白增加產氨)。","D":"不是(本題答案)。是「低」血鉀/鹼中毒誘發,高血鉀非主要誘發因子。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"114100-N3-9":{"quick":"食道靜脈曲張不可服鎮靜劑(恐誘發肝腦病變);避免用力咳嗽提重物、軟質、溫食。","detail":{"background":"食道靜脈曲張出血病人衛教：避免用力解便(用軟便劑)、避免粗硬燙食與酒精、避免增加腹壓動作；規律服用β阻斷劑、定期內視鏡追蹤；出現吐血、解黑便、頭暈應立即就醫，屬高再出血風險族群。","options":{"A":"正確。避免用力咳嗽提重物(增腹/門脈壓)。","B":"正確。軟質飲食避免粗糙刮傷曲張靜脈。","C":"正確。避免過熱過冷食物。","D":"不適當(本題答案)。不可服鎮靜劑(經肝代謝、恐誘發肝性腦病變)。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"114170-N3-9":{"quick":"原發性肝癌好發亞非地區「男性」,非歐美女性。","detail":{"background":"原發性肝癌:B肝/C肝、肝硬化、黃麴毒素為危險因子;好發於亞洲、非洲(B/C肝盛行)之「男性」;臨床右上腹腫大/壓痛;腫瘤標記AFP(α-胎兒蛋白)為重要診斷與治療追蹤指標。「好發歐美地區女性」錯誤。 補充：原發性肝癌好發亞非B/C肝盛行區之男性,危險因子為B/C肝、肝硬化、黃麴毒素、酗酒;臨床右上腹腫大壓痛;AFP為重要診斷與追蹤指標;「好發歐美女性」錯誤。","options":{"A":"適當。B肝為肝癌危險因子。","B":"適當。右上腹腫大壓痛為臨床表徵。","C":"最不適當(本題答案)。原發性肝癌好發亞非男性,非歐美女性。","D":"適當。AFP為肝癌重要指標。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"115030-N3-9":{"quick":"肝性腦病變深腱反射「增強/亢進」(非消失);肌張力增、撲翼震顫、巴賓斯基(+)。","detail":{"background":"肝性腦病變神經學表徵:意識改變、撲翼樣震顫(asterixis,非昏迷期出現)、肌張力增加、肌肉僵直抽搐、深腱反射「亢進」、巴賓斯基反射陽性(上運動神經元徵象)、肝臭。深腱反射「消失」屬下運動神經元/周邊神經病變,與肝性腦病變不符,故為錯誤。","options":{"A":"錯誤(本題答案)。肝性腦病變深腱反射「亢進」,非消失。","B":"正確。肌肉僵直、抽搐。","C":"正確。巴賓斯基反射陽性。","D":"正確。非昏迷期出現撲翼樣震顫。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"101030-N3-34":{"quick":"膽結石以「膽固醇結石」最普遍(非色素結石)。","detail":{"background":"膽結石以膽固醇結石最常見(約占八成)，與膽汁中膽固醇過飽和、膽囊收縮減弱、成核加速有關；色素結石則與溶血、感染、肝硬化相關。危險因子為5F(女性、40歲以上、肥胖、多產、家族史)，多數無症狀，進食油膩後右上腹悶痛並可放射至右肩胛。","options":{"A":"錯誤(本題答案)。以膽固醇結石最普遍,非色素結石。","B":"正確。對脂肪食物缺乏耐受力(脂肪餐誘發痛)。","C":"正確。疼痛可反射至右肩胛。","D":"正確。Ursodiol可溶解膽固醇、減少膽汁膽固醇含量。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"101110-N3-61":{"quick":"膽結石飲食:低脂(避免脂肪餐誘發膽囊收縮疼痛)。","detail":{"background":"膽結石/膽囊疾病飲食以「低脂」為核心——脂肪經CCK刺激膽囊收縮而誘發膽絞痛，故應限制油炸、肥肉、蛋黃、奶油等高脂食物；急性發作期禁食讓膽囊休息，緩解後採低脂、適量蛋白、高纖、少量多餐飲食。","options":{"A":"錯誤。高脂會誘發膽囊收縮痛。","B":"錯誤。乳酪類高脂。","C":"正確(本題答案)。低脂流質飲食。","D":"錯誤。蛋類及奶油高脂高膽固醇。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"102030-N3-15":{"quick":"急性膽囊炎墨菲氏徵象(Murphy sign)陽性。","detail":{"background":"急性膽囊炎多因結石阻塞膽囊管，臨床以右上腹持續痛、放射至右肩或肩胛、發燒、噁心嘔吐、墨菲氏徵象陽性(深吸氣觸壓右上腹因疼痛暫停吸氣)為特徵；血檢白血球上升，可能有輕度黃疸。","options":{"A":"正確(本題答案)。墨菲氏徵象陽性。","B":"錯誤。疼痛反射至「右」肩胛,非左。","C":"錯誤。鹼性磷酸酶(ALP)上升,非下降。","D":"錯誤。洛夫辛氏徵象是闌尾炎。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"102110-N3-63":{"quick":"膽結石高危險:肥胖、多產之女性(5F)。","detail":{"background":"膽固醇結石促發因子可記為「5F」——Female(女性、雌激素增膽固醇分泌)、Forty(40歲以上)、Fat(肥胖)、Fertile(多次懷孕)、Family(家族史)；此外快速減重、長期禁食或全靜脈營養、糖尿病、高脂飲食亦增加風險。","options":{"A":"錯誤。女性發生率「高」於男性。","B":"正確(本題答案)。肥胖、多產女性(5F)易得膽結石。","C":"錯誤。口服避孕藥(動情素)使罹患率「升高」。","D":"錯誤。40歲以後發生率「升高」。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"102110-N3-78":{"quick":"Cholestyramine(questran)結合膽道中的膽鹽(減少膽鹽刺激所致搔癢)。","detail":{"background":"Cholestyramine(膽鹼苯乙烯/questran)為陰離子交換樹脂,在腸道與「膽鹽」結合形成不被吸收的複合物隨糞便排出,可降低膽汁鬱積病人血中膽鹽濃度、緩解膽汁性「皮膚搔癢」,並降低膽固醇。它不溶解結石、不解平滑肌痙攣;且會結合脂溶性維生素影響其吸收(非促進)。","options":{"A":"正確(本題答案)。結合膽道中的膽鹽。","B":"錯誤。非解平滑肌痙攣(那是抗膽鹼藥)。","C":"錯誤。不分解膽固醇結石。","D":"錯誤。反而會「妨礙」脂溶性維生素吸收。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"105030-N3-14":{"quick":"膽絞痛輻射至右肩或背部;墨菲氏在「右」上腹、止痛用meperidine非morphine。","detail":{"background":"膽絞痛多於進食油膩餐後或夜間發作，為右上腹/上腹持續性絞痛、可放射至右肩或右肩胛下角，常伴噁心嘔吐；與結石暫時阻塞膽囊管、膽囊強力收縮有關，可持續數小時而非短暫即解。","options":{"A":"錯誤。墨菲氏徵象在「右」上腹,非左上腹。","B":"正確(本題答案)。疼痛輻射至右肩或背部。","C":"錯誤。止痛宜用meperidine(Demerol),morphine會使Oddi括約肌痙攣加重痛。","D":"錯誤。膽絞痛無「膝胸俯臥可緩解」之特徵。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"105030-N3-17":{"quick":"腹腔鏡膽囊切除術後居家:此題為「送分」(選項皆視為正確)。","detail":{"background":"腹腔鏡膽囊切除術後居家照護:回家後可逐漸下床走動;手術中灌入二氧化碳可致術後右肩/肩頸疼痛(數日內消退);每日以肥皂與水清洗穿刺部位、保持乾燥;短期內避免提重物。本題經考選部評定為「送分(選項均給分)」。 補充：腹腔鏡膽囊切除為微創手術,術中灌入CO2氣腹,術後CO2刺激橫膈致右肩/肩頸痛數日內消退;傷口小、恢復快,可早期下床,穿刺處以肥皂水清洗保持乾燥,短期避免提重物。本題經評定送分。","options":{"A":"回家可下床走動(正確)。","B":"短期避免舉重(合理,惟1年過長)。","C":"手術中充氣致右肩疼痛(正確)。","D":"肥皂水清洗穿刺部位(正確)。「本題送分,各選項均給分」。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"105090-N3-12":{"quick":"墨菲氏徵象(Murphy sign)出現於「膽囊炎」。","detail":{"background":"墨菲氏徵象(Murphy’s sign)為診斷急性膽囊炎的理學表徵：檢查者手指置於右上腹肋緣下請病人深吸氣，發炎腫大的膽囊下移觸及指尖引發疼痛而使吸氣中止即為陽性，指向膽囊發炎，而非胃、胰或闌尾疾病。","options":{"A":"食道靜脈曲張無墨菲氏徵象。","B":"正確(本題答案)。膽囊炎墨菲氏徵象陽性。","C":"胰臟炎是透納/卡倫徵象。","D":"肝癌無墨菲氏徵象。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"106030-N3-14":{"quick":"急性膽囊炎以墨菲氏徵象(Murphy sign)評估。","detail":{"background":"急性膽囊炎評估：墨菲氏徵象陽性、右上腹壓痛與肌防衛；首選影像為腹部超音波(可見膽囊壁增厚>3mm、膽囊周圍積液、結石及超音波墨菲氏徵象)；實驗室見白血球上升、可能ALP與膽紅素輕度上升。","options":{"A":"巴賓斯基是上運動神經元徵象。","B":"布魯辛斯基是腦膜炎徵象。","C":"格林-巴利是周邊神經病變。","D":"正確(本題答案)。墨菲氏徵象評估膽囊炎。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"106110-N3-14":{"quick":"膽結石高危險:口服避孕藥/動情素者、肥胖女性;「喜吃蔬果者」非高風險。","detail":{"background":"膽固醇結石高風險為5F族群(女性、40歲以上、肥胖、多產、家族史)及雌激素使用、快速減重、長期禁食/全靜脈營養、糖尿病、高三酸甘油酯；相反地，規律運動、體位正常、適度膳食纖維者風險較低，常為「何者錯誤」之關鍵。","options":{"A":"是高風險。口服避孕藥(動情素)增加膽固醇結石。","B":"是高風險。動情素治療之停經婦女。","C":"錯誤(本題答案)。多吃蔬果者非膽結石高風險(高纖維反為保護)。","D":"是高風險。肥胖女性。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"107030-N3-13":{"quick":"膽囊炎止痛「不用morphine」(致Oddi括約肌痙攣);用atropine/buscopan/pro-banthine抗痙攣。","detail":{"background":"急性膽囊炎處置：急性期禁食讓膽囊休息、靜脈輸液與電解質補充、止痛(傳統避免嗎啡以免Oddi括約肌痙攣，常用meperidine或NSAID)、抗生素涵蓋腸內菌；確定治療為膽囊切除術(多採腹腔鏡)。","options":{"A":"正確。Atropine預防膽道平滑肌痙攣。","B":"正確。Buscopan減輕痙攣痛。","C":"錯誤(本題答案)。Morphine會使Oddi括約肌痙攣、加重膽道痛,不宜用。","D":"正確。Pro-Banthine消除平滑肌痙攣。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"108020-N3-13":{"quick":"膽結石膽囊炎合併「總膽管阻塞」→膽汁不入腸→糞便呈灰白色。","detail":{"background":"當膽結石阻塞「總膽管」,膽汁(含膽紅素代謝產物糞膽素)無法進入腸道,糞便失去正常黃褐色而呈「灰白(陶土)色」;同時膽紅素逆流入血致阻塞性黃疸、茶色尿、皮膚搔癢。 補充：總膽管阻塞使膽汁(含糞膽素)無法入腸,糞便失去黃褐色而呈灰白(陶土)色,同時膽紅素逆流入血致阻塞性黃疸、茶色尿、皮膚搔癢、維生素K吸收差致PT延長。","options":{"A":"黃色為正常膽汁入腸。","B":"正確(本題答案)。總膽管阻塞致灰白色便。","C":"黑色多為上消化道出血。","D":"深褐色非阻塞性黃疸表現。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"110030-N3-16":{"quick":"T型管「不可常規沖洗」(以免逆行感染或膽道壓力過高);引流棕綠色、逐漸減量、引流袋低於傷口。","detail":{"background":"膽道手術後T型管(T-tube)引流總膽管膽汁:①引流液正常為棕綠色(膽汁色),量約每日200~500mL並逐漸減少;②引流袋固定低於膽囊/傷口高度(利重力引流、防逆流);③活動時夾管或袋低於腰部;④「不可常規沖洗」T管(增加膽道感染與壓力);⑤拔管前先夾管試驗觀察黃疸/腹痛。","options":{"A":"正確。引流液為棕綠色(膽汁)。","B":"正確。引流量逐漸減少。","C":"錯誤(本題答案)。不可每日常規沖洗T型管(恐逆行感染)。","D":"正確。引流袋位置低於腰部/傷口。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"110110-N3-12":{"quick":"ERCP用於評估肝胰壺腹、膽道及胰臟病變;需禁食、查凝血功能。","detail":{"background":"內視鏡逆行性膽胰攝影(ERCP):經十二指腸鏡將導管插入Vater壺腹,注入顯影劑攝影膽道與胰管,可診斷及治療(取石、放支架、括約肌切開)膽道、胰臟、肝胰壺腹病變。檢查前須禁食6~8小時、查凝血功能;併發症為胰臟炎、出血、穿孔、膽道感染。歐迪氏括約肌鬆弛是用「靜脈注射」藥物(如glucagon、buscopan)非口服硫酸鎂。","options":{"A":"錯誤。檢查前須禁食。","B":"錯誤。鬆弛Oddi括約肌不是用口服硫酸鎂。","C":"錯誤。口服硫酸鎂無法鬆弛Oddi括約肌。","D":"正確(本題答案)。ERCP評估肝胰壺腹、膽道及胰臟病變。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"111030-N3-16":{"quick":"膽結石高危險:女性、肥胖、口服避孕藥;「曾接受胃部手術者」最不可能。","detail":{"background":"膽固醇結石好發於5F——女性、40歲以上、肥胖、多產婦、家族史，加上雌激素、快速減重、糖尿病等代謝因素；「最不可能」之高危群通常為與這些因子相反者(如年輕、體位正常、無相關代謝因素之男性)。","options":{"A":"是高危險。女性(5F)。","B":"是高危險。肥胖。","C":"是高危險。口服避孕藥(動情素)。","D":"最不可能(本題答案)。曾接受胃部手術者非膽結石高危險群。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"112030-N3-10":{"quick":"ERCP導管不易進總膽管時,用「MgSO4(硫酸鎂)」使Oddi括約肌鬆弛。","detail":{"background":"ERCP時若導管不易進入總膽管,可給予藥物使歐迪氏括約肌(sphincter of Oddi)鬆弛以利插管。臨床上靜脈glucagon、buscopan或「硫酸鎂(MgSO4)」可鬆弛平滑肌括約肌。Atropine、Xylocaine主要為抗痙攣/局麻,本題標準答案為MgSO4。","options":{"A":"Atropine為抗膽鹼,非本題答案。","B":"Buscopan亦鬆弛平滑肌,但本題答案為MgSO4。","C":"正確(本題答案)。MgSO4使Oddi括約肌鬆弛。","D":"Xylocaine為局部麻醉。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"113030-N3-9":{"quick":"膽道結石「女性」發生機率高於男性(5F),非男性高;膽囊炎多由結石、用Demerol止痛。","detail":{"background":"膽道疾病:①膽囊炎大部分(>90%)由結石阻塞膽囊管造成;②膽道結石「女性」發生率高於男性(5F危險因子);③止痛用meperidine(Demerol)肌注,避免morphine(致Oddi括約肌痙攣);④急性膽囊炎右上腹痛、墨菲氏徵象陽性。故「膽道結石男性比女性高」錯誤。","options":{"A":"正確。膽囊炎多由結石造成。","B":"錯誤(本題答案)。膽道結石女性發生率高於男性,非男性高。","C":"正確。可用Demerol肌注止痛。","D":"正確。急性膽囊炎右上腹疼痛。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"113100-N3-9":{"quick":"膽囊炎:觸診膽囊壓痛、吸氣時更痛(墨菲氏徵象);用Demerol非morphine。","detail":{"background":"急性膽囊炎疼痛為右上腹持續痛、放射右肩，進食油膩加劇；處置採禁食、靜脈輸液、止痛(傳統避免嗎啡因可能增加Oddi括約肌壓力)、抗生素；墨菲氏徵象陽性協助診斷，確定治療為膽囊切除。","options":{"A":"錯誤。膽囊炎是「右」上腹痛輻射至右肩背,非左上腹輻射左背。","B":"正確(本題答案)。觸診膽囊壓痛、吸氣時加重(墨菲氏徵象)。","C":"錯誤。應用meperidine(Demerol),morphine致Oddi括約肌痙攣。","D":"錯誤。羅氏(Rovsing)徵象是闌尾炎。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"113180-N3-3":{"quick":"墨菲氏徵象(Murphy sign)陽性是急性膽囊炎的特徵。","detail":{"background":"墨菲氏徵象陽性是「急性膽囊炎」的典型理學特徵——檢查者於右上腹肋緣下深壓並請病人深吸氣，病人因發炎腫大的膽囊下移觸痛而突然暫停吸氣即為陽性；此徵象常用於與胃炎、胰臟炎、肝炎等其他上腹疾病鑑別，是膽囊炎床邊評估的重要工具。","options":{"A":"急性腸胃炎無墨菲氏徵象。","B":"急性闌尾炎是麥氏點/洛夫辛徵象。","C":"急性胰臟炎是透納/卡倫徵象。","D":"正確(本題答案)。急性膽囊炎墨菲氏徵象陽性。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"114100-N3-6":{"quick":"膽囊術後須監測腹脹、腹肌僵硬、嘔吐等膽汁性腹膜炎徵象。","detail":{"background":"膽囊炎護理：評估右上腹痛、墨菲氏徵象、發燒與黃疸；急性期禁食、靜脈輸液、依醫囑止痛與抗生素；緩解後衛教低脂飲食、少量多餐、避免油炸與蛋黃；術後觀察傷口、引流及併發症。","options":{"A":"錯誤。膽囊炎右上腹痛輻射至「右肩背」,非右下腹。","B":"正確(本題答案)。膽囊術後監測腹脹腹硬嘔吐等腹膜炎徵象。","C":"錯誤。用Demerol止痛,morphine致Oddi括約肌痙攣。","D":"錯誤。術後引流棕綠色(膽汁)為正常,非須立即通知。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"114170-N3-10":{"quick":"膽囊癌常見腺癌,好發「年長者」(非年輕人),早期症狀似膽囊炎。","detail":{"background":"膽囊癌:組織型以「腺癌」最常見,好發於老年(60~70歲)女性,常合併膽結石與慢性膽囊炎;早期症狀不明顯、與膽囊炎相似(右上腹痛、噁心、體重減輕),診斷時多已晚期、預後差;處置含手術切除與化療。「好發於年輕人」錯誤。 補充：膽囊癌以腺癌最常見、好發老年(常合併膽結石與慢性膽囊炎)、早期症狀似膽囊炎、診斷多已晚期預後差;處置含手術切除與化療;「好發年輕人」錯誤。","options":{"A":"適當。常含手術與化學治療。","B":"適當。早期症狀不明顯,似膽囊炎。","C":"最不適當(本題答案)。膽囊癌好發年長者,非年輕人。","D":"(分型描述)非本題重點。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"114170-N3-50":{"quick":"阻塞性黃疸ALP「大於正常值」(膽道阻塞指標升高)。","detail":{"background":"阻塞性黃疸(膽道阻塞)實驗室:①結合型(直接)膽紅素升高、尿膽紅素增加致「茶色尿」;②膽汁不入腸→糞便「灰白色」(非茶色);③膽道酵素鹼性磷酸酶(ALP)、γ-GT明顯「大於正常值」;④維生素K吸收差致凝血酶原時間(PT)「延長」(非正常);⑤與膽道結石/腫瘤阻塞有關,非輸血溶血反應(那是溶血性黃疸)。","options":{"A":"錯誤。膽紅素「不入腸」致糞便灰白,不是糞便呈茶色(茶色是尿)。","B":"正確(本題答案)。ALP大於正常值。","C":"錯誤。阻塞性黃疸PT「延長」,非正常。","D":"錯誤。與輸血溶血反應無關(那是溶血性黃疸)。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"115030-N3-7":{"quick":"口服膽囊攝影:檢查前採低脂飲食;前一晚口服含碘顯影劑、急性膽囊炎為禁忌。","detail":{"background":"口服膽囊攝影(oral cholecystography):①檢查「前一天晚餐採低脂飲食」(避免膽囊排空影響顯影),晚餐後口服含碘顯影劑經肝排入膽囊;②隔日空腹攝影;③急性膽囊炎、嚴重肝功能不良、碘過敏、膽道完全阻塞為「禁忌」(非適應症);④檢查後排尿燒灼非顯影劑常見副作用、不代表泌尿道感染。故「檢查前需採低脂飲食」正確。","options":{"A":"正確(本題答案)。檢查前採低脂飲食。","B":"錯誤。急性膽囊炎為禁忌,非適應症。","C":"錯誤。含碘顯影劑於「前一晚」服用,非檢查前30分鐘。","D":"錯誤。排尿燒灼非此檢查常見/代表泌尿道感染。"},"sources":["新文京《內外科護理學》膽道疾病","華杏《內外科護理學》膽結石/膽囊炎","Tokyo Guidelines 膽囊炎","Harrison 21e Gallstones"]}},"103030-N3-10":{"quick":"胰臟炎康復期飲食:低脂、高醣、適量蛋白;「低纖維」非其飲食原則重點(不適當者)。","detail":{"background":"急性胰臟炎康復期飲食：先禁食讓胰臟休息，待腸蠕動恢復、疼痛與澱粉酶下降後，由清流質漸進到低脂、高碳水、適量蛋白飲食，少量多餐；應避免高脂與酒精(刺激胰液分泌、誘發復發)。","options":{"A":"適當。低脂肪(減少胰液刺激)。","B":"適當。高醣供熱量。","C":"適當。適量(高)蛋白質修復。","D":"不適當(本題答案)。低纖維非胰臟炎康復期飲食重點/原則。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"104100-N3-17":{"quick":"急性胰臟炎止痛用meperidine,不用Codeine類(增加Oddi括約肌痙攣)。","detail":{"background":"急性胰臟炎處置：禁食與鼻胃管減壓使胰臟休息、積極靜脈輸液、止痛、監測併發症(低血鈣、低血容、ARDS、假性囊腫)；膽石性者處理膽道；不應於急性期早期進食高脂或飲酒。","options":{"A":"正確。禁食+鼻胃管引流抑制胰液。","B":"錯誤(本題答案)。止痛宜用meperidine,Codeine/morphine類會使Oddi括約肌痙攣加重痛。","C":"正確。抗膽鹼藥降低胰液分泌。","D":"正確。H2阻斷劑減少胃酸(間接減少胰液刺激)。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"105030-N3-18":{"quick":"胰液功能:中和酸性乳糜、分解脂肪/蛋白/澱粉;「將醣分解成單醣」是小腸刷狀緣酶非胰液主功能(本題答案)。","detail":{"background":"胰液(pancreatic juice)含重碳酸鹽(中和進入十二指腸的酸性乳糜)及消化酶:胰澱粉酶(amylase,將澱粉分解為雙醣/麥芽糖)、胰脂肪酶(lipase,分解脂肪為脂肪酸與甘油)、胰蛋白酶(trypsin等,分解蛋白質為胜肽/胺基酸)。將雙醣再「分解成單醣」是小腸刷狀緣的雙醣酶(maltase等)功能,非胰液,故為「不是胰液功能」者。","options":{"A":"是。重碳酸鹽中和酸性乳糜。","B":"不是(本題答案)。胰澱粉酶將澱粉分解為雙醣;分解成單醣是小腸刷狀緣酶。","C":"是。胰脂肪酶分解脂肪為脂肪酸。","D":"是。胰蛋白酶分解蛋白質為胺基酸。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"105090-N3-11":{"quick":"急性胰臟炎24小時內:澱粉酶與脂肪酶皆「升高」。","detail":{"background":"急性胰臟炎發作24小時內血清「澱粉酶(amylase)」先上升(3~6小時起、約24小時達高峰)，脂解酶(lipase)上升較晚但持續較久且更專一；可伴「血鈣下降」(脂肪皂化)、血糖與白血球上升。","options":{"A":"錯誤。兩者皆升高,非降低。","B":"錯誤。脂肪酶亦升高。","C":"錯誤。澱粉酶亦升高。","D":"正確(本題答案)。澱粉酶升高、脂肪酶升高。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"106030-N3-17":{"quick":"分泌可分解「脂肪及蛋白質」消化酶的器官是「胰臟」。","detail":{"background":"胰臟外分泌部分泌含多種消化酶的胰液:胰脂肪酶(分解脂肪)、胰蛋白酶/胰凝乳蛋白酶(分解蛋白質)、胰澱粉酶(分解澱粉),可同時消化脂肪、蛋白質與醣類,是消化功能最完整的腺體。胃僅分泌胃蛋白酶(蛋白)、唾液腺分泌澱粉酶(醣)。 補充：胰臟外分泌部分泌含脂肪酶、蛋白酶、澱粉酶之胰液,可同時消化脂肪、蛋白與醣,並以重碳酸鹽中和酸性乳糜;胃僅分泌胃蛋白酶、唾液腺分泌澱粉酶,功能均不及胰臟完整。","options":{"A":"胃只分泌胃蛋白酶(蛋白質)。","B":"正確(本題答案)。胰臟分泌脂肪酶、蛋白酶、澱粉酶。","C":"小腸有刷狀緣酶但非分泌完整三大消化酶之腺體。","D":"十二指腸非主要消化酶分泌器官。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"107110-N3-16":{"quick":"急性胰臟炎:膽石/酒精為主因(1)+造成電解質酸鹼不平衡(4)=14;血鈣「下降」、出血性是Turner非Rovsing。","detail":{"background":"急性胰臟炎最常見病因為膽石症與酗酒；血清澱粉酶、脂解酶上升而血鈣可「下降」(脂肪壞死皂化耗鈣)；出血性胰臟炎可見Cullen(臍周)與Grey-Turner(腰脅)瘀斑，屬重症徵象。","options":{"A":"12錯(2血鈣應「下降」非上升)。","B":"正確(本題答案)。1膽石酒精主因+4電解質酸鹼不平衡。","C":"23錯(3出血性是Grey Turner徵象,非Rovsing)。","D":"34錯。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"110030-N3-15":{"quick":"急性胰臟炎:血清澱粉酶上升(脂肪酶亦上升、血鈣下降、血糖上升)。","detail":{"background":"急性胰臟炎檢驗：血清澱粉酶、脂解酶上升(lipase更專一且持久)、白血球上升、血糖上升、血鈣「下降」、CRP升高；影像(CT)評估壞死範圍；以Ranson或APACHE評估嚴重度。","options":{"A":"錯誤。血清鈣「下降」(脂肪皂化),非上升。","B":"正確(本題答案)。血清澱粉酶上升。","C":"錯誤。血清脂肪酶「上升」,非下降。","D":"錯誤。血糖「上升」,非下降。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"111110-N3-10":{"quick":"慢性胰臟炎典型:腹痛、脂肪痢、血糖上升;「透納氏徵象」是急性出血性胰臟炎,非慢性典型。","detail":{"background":"慢性胰臟炎(chronic pancreatitis)因反覆發炎致胰腺纖維化、外分泌與內分泌功能喪失:典型三徵為「慢性腹痛、脂肪痢(脂肪消化酶不足)、糖尿病/血糖上升(胰島素分泌不足)」,並有體重減輕、鈣化。透納氏徵象(Grey Turner sign,脅腹瘀斑)是「急性出血性胰臟炎」表現,非慢性胰臟炎典型徵象,故為錯誤。","options":{"A":"是。慢性腹痛。","B":"是。脂肪痢。","C":"是。血糖上升(內分泌不足)。","D":"錯誤(本題答案)。透納氏徵象屬急性出血性胰臟炎,非慢性典型。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"112180-N3-11":{"quick":"急性胰臟炎康復期應「低脂、適量蛋白、高醣」,非高脂高蛋白高醣。","detail":{"background":"急性胰臟炎處置以「讓胰臟休息」為核心：禁食、必要時鼻胃管減壓、積極輸液、止痛、矯正電解質(尤其低血鈣)；「最不適當」者通常為早期給高脂飲食、口服進食或刺激胰液分泌之做法。","options":{"A":"適當。腹痛未改善前禁食。","B":"適當。鼻胃管引流抑制胰液。","C":"適當。側臥彎膝減輕疼痛。","D":"最不適當(本題答案)。康復期應「低脂」,非高脂肪高蛋白高醣。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"113180-N3-10":{"quick":"急性胰臟炎:膽道/酗酒為因(1)+急性後仍須低脂飲食(4)=14;血鈣「下降」、痛輻射至「背/左肩」非右肩。","detail":{"background":"急性胰臟炎：常見病因為膽道疾病與飲酒；血清澱粉酶與脂解酶上升、血鈣可下降；疼痛位於上腹、可放射至「背部」(非右肩)；重症可致出血壞死、低血容休克與多器官衰竭。","options":{"A":"12錯(2血鈣應下降非過高)。","B":"正確(本題答案)。1膽道酗酒+4急性後須低脂飲食。","C":"23錯(3痛在上腹輻射背部/左肩,非下腹輻射右肩)。","D":"34錯。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"114030-N3-9":{"quick":"鼻胃管目的是「減壓、抑制胰液分泌、減輕嘔吐」,非「抽出胰澱粉酶」。","detail":{"background":"急性胰臟炎治療：禁食、輸液、止痛、矯正電解質與監測併發症；傳統止痛避免嗎啡(理論上增Oddi括約肌壓)；恢復期採低脂飲食、戒酒；膽石性者處理膽道。誤述其飲食或止痛原則即為錯誤。","options":{"A":"正確。上腹中央痛輻射至背、突發持續劇烈。","B":"正確。澱粉酶、脂肪酶升高、血鈣下降。","C":"錯誤(本題答案)。鼻胃管目的是減壓、抑制胰液分泌、緩解嘔吐,非「抽出胰澱粉酶」。","D":"正確。穩定後採低脂低蛋白高醣飲食。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"115030-N3-6":{"quick":"急性胰臟炎因膽道疾病致膽汁與胰液逆流而引起。","detail":{"background":"急性胰臟炎為胰酶在胰內被活化「自我消化」所致，最常見病因為膽石與酗酒；典型上腹劇痛放射至背、前傾可減痛；血清澱粉酶/脂解酶上升、血鈣下降；治療以禁食、輸液、止痛為主。","options":{"A":"正確(本題答案)。膽道疾病致膽汁、胰液逆流活化胰酶而發炎。","B":"錯誤。墨菲氏徵象是膽囊炎,非胰臟炎。","C":"錯誤。康復期應低脂,非高脂。","D":"錯誤。血清鈣濃度通常「下降」,非升高。"},"sources":["新文京《內外科護理學》胰臟炎","華杏《內外科護理學》胰臟疾病","Atlanta Classification 急性胰臟炎"]}},"101030-N3-44":{"quick":"鼻腔出血立即處理:身體前傾、按壓鼻翼(鼻中隔)約10~15分鐘。","detail":{"background":"鼻腔出血(epistaxis)立即處理:請病人坐起並「頭向前傾」(避免血液流入咽喉嗆咳/吞入),以拇指與食指捏壓「鼻翼軟骨部(鼻中隔前下方)」約10~15分鐘持續壓迫止血,可冷敷鼻樑。頭「後仰」會使血液流入咽喉,錯誤。 補充：鼻出血多源自鼻中隔前下方的Kiesselbach血管叢;前傾可避免血液倒流入咽喉造成嗆咳或誤吞而誤判出血量;若按壓15分鐘仍不止或為後鼻出血,需鼻填塞或就醫。","options":{"A":"錯誤。頭後仰會使血流入咽喉,應前傾。","B":"冰敷鼻樑為輔助,非立即止血關鍵。","C":"正確(本題答案)。按壓鼻翼10~15分鐘直接壓迫止血。","D":"紗布塞鼻非首要立即處置。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"103030-N3-13":{"quick":"大腸鏡禁忌:潰瘍性結腸炎急性期、息肉剛切除、嚴重心絞痛;「便秘」非禁忌(本題答案)。","detail":{"background":"大腸(纖維)鏡檢查禁忌症:腸穿孔、急性嚴重潰瘍性結腸炎/毒性巨結腸(易穿孔)、腸息肉剛切除後(腸壁脆弱)、嚴重心肺疾病(如嚴重心絞痛無法耐受)、腹膜炎、無法配合者。便秘本身不是大腸鏡禁忌(反而可能需檢查找原因),故為「敘述錯誤(不是禁忌)」者。","options":{"A":"錯誤(本題答案)。便秘不是大腸鏡禁忌症。","B":"是禁忌。急性潰瘍性結腸炎易穿孔。","C":"是禁忌。息肉剛切除腸壁脆弱。","D":"是禁忌。嚴重心絞痛無法耐受。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"103030-N3-18":{"quick":"胃酸分泌受副交感(2)+組織胺H2(3)+胃泌素(5)促進=235。","detail":{"background":"胃酸(壁細胞)分泌的促進因子:①副交感(迷走/parasympathetic)神經刺激乙醯膽鹼;②組織胺(透過H2受體);③胃泌素(gastrin)。交感神經興奮抑制泌酸;血清素(serotonin)非主要泌酸刺激;H2受體「阻斷劑」是抑制泌酸的藥物(非生理控制因子)。故選2副交感+3組織胺(H2)+5胃泌素=235。","options":{"A":"135含1交感(抑制)、4血清素,錯。","B":"234含4血清素錯。","C":"145錯。","D":"正確(本題答案)。2副交感+3組織胺(H2)+5胃泌素。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"103100-N3-17":{"quick":"「肝臟」不分泌蛋白酶(本題送分);胃、胰、小腸黏膜皆分泌蛋白(消化)酶。","detail":{"background":"分泌蛋白酶(蛋白質消化酶)者:胃黏膜(主細胞)分泌胃蛋白酶原(pepsinogen)、胰臟分泌胰蛋白酶/胰凝乳蛋白酶、小腸黏膜分泌腸肽酶(刷狀緣胜肽酶)。肝臟主要功能為製造膽汁、代謝解毒、合成血漿蛋白,並不分泌「蛋白酶」。本題經考選部評定為「送分(各選項均給分)」。","options":{"A":"胃黏膜分泌胃蛋白酶原。","B":"肝臟不分泌蛋白酶(原答案,惟本題送分)。","C":"胰臟分泌胰蛋白酶。","D":"小腸黏膜分泌胜肽酶。「本題送分,各選項均給分」。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"104030-N3-13":{"quick":"TPN突然停止易致「低血糖症」(內生胰島素仍高、外來高糖驟停)。","detail":{"background":"全靜脈營養(TPN)為高濃度葡萄糖輸注,身體會分泌較多胰島素以代謝。若「突然停止」TPN,血中仍有大量胰島素而葡萄糖驟減,易發生「反彈性低血糖」(冒汗、心悸、無力、意識改變)。故TPN應逐漸減速停止,或停止後續接10%葡萄糖。 補充：TPN含高濃度葡萄糖,身體代償分泌較多胰島素;驟停時血糖快降而胰島素仍高致反彈性低血糖(冒汗、心悸、無力、意識變化),故須逐漸減速或停後續接10%葡萄糖。","options":{"A":"錯誤。突然停止是低血糖,非高血糖(高血糖是輸注過快時)。","B":"正確(本題答案)。突然停止TPN致反彈性低血糖。","C":"與鈉無直接關係。","D":"與鉀無直接關係。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"104030-N3-15":{"quick":"胃鏡前噴Atropine目的:減少唾液(及消化道)分泌,利檢查視野。","detail":{"background":"Atropine為抗膽鹼(抗副交感)藥,於內視鏡檢查前給予可「減少唾液與消化道分泌」、減少蠕動與痙攣,使檢查視野清晰、減少嗆咳。咽喉局部麻醉是用xylocaine噴劑;消除作嘔反射也屬局麻範疇。本題Atropine主要目的為減少唾液分泌。 補充：Atropine為抗膽鹼藥,抑制副交感使唾液與消化道分泌減少、蠕動降低,利內視鏡視野;副作用為口乾、心跳加快、瞳孔放大、尿滯留,青光眼與前列腺肥大者慎用。咽喉麻醉另以xylocaine噴劑。","options":{"A":"非消除胃內氣體。","B":"咽喉麻醉是xylocaine,非atropine。","C":"正確(本題答案)。Atropine減少唾液分泌。","D":"消除作嘔反射是局部麻醉之效。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"104030-N3-17":{"quick":"鼻胃管胃灌洗應用「生理食鹽水」,非清水(清水致電解質流失)。","detail":{"background":"鼻胃管留置護理:①需胃灌洗時應使用「生理食鹽水(等張)」,用清水會因低張致電解質流失/稀釋;②喉部不適可給局麻口含劑;③可嚼口香糖/含冰塊刺激唾液保持口腔濕潤;④每日清潔鼻孔、更換固定膠帶預防壓瘡;⑤定期確認管路位置與通暢。故「用清水避免電解質不平衡」錯誤(恰相反)。","options":{"A":"錯誤(本題答案)。胃灌洗應用生理食鹽水,清水反致電解質不平衡。","B":"正確。喉部不適可給麻醉口含劑。","C":"正確。嚼口香糖刺激唾液。","D":"正確。每日清潔鼻孔更換膠帶防壓瘡。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"104100-N3-14":{"quick":"腸胃道交感神經興奮→抑制蠕動分泌、括約肌(幽門)收縮。","detail":{"background":"自律神經對腸胃道作用:①副交感(迷走)興奮→促進蠕動與腺體分泌、括約肌鬆弛(消化「進行」狀態);②交感興奮→抑制蠕動與分泌、使括約肌(如幽門括約肌)收縮、血流減少(消化「暫停」狀態)。故交感興奮會「引起幽門括約肌收縮」。 補充：自律神經對腸胃道為拮抗作用—副交感(迷走)促進蠕動分泌、括約肌鬆弛(消化進行);交感則抑制蠕動分泌、使幽門等括約肌收縮、內臟血管收縮(消化暫停),故壓力/緊張時易消化不良。","options":{"A":"錯誤。交感「抑制」胃分泌。","B":"正確(本題答案)。交感興奮使幽門括約肌收縮。","C":"錯誤。交感「抑制」腸蠕動。","D":"錯誤。交感使內臟血管「收縮」,非放鬆。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"104100-N3-15":{"quick":"抑制胃液胃酸分泌的腸胃道物質為「前列腺素(prostaglandin)」。","detail":{"background":"抑制胃酸分泌的調節物質:前列腺素(prostaglandin,並增加黏液與重碳酸鹽保護黏膜)、生長抑素(somatostatin)、secretin、GIP。乙醯膽鹼、組織胺、胃泌素皆為「刺激」泌酸者。故受刺激後會抑制胃液、胃酸分泌者為前列腺素。","options":{"A":"錯誤。乙醯膽鹼刺激泌酸。","B":"錯誤。組織胺刺激泌酸。","C":"錯誤。胃泌素刺激泌酸。","D":"正確(本題答案)。前列腺素抑制胃酸分泌、保護黏膜。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"105030-N3-12":{"quick":"上腸胃道攝影檢查「不給硫酸鎂」(瀉劑用於下消化道準備);需禁食、檢查後多喝水排鋇。","detail":{"background":"上腸胃道(上消化道)鋇劑攝影:①檢查前禁食6~8小時;②口服鋇劑顯影食道、胃、十二指腸/小腸;③檢查後鼓勵多喝水並可給輕瀉劑促鋇劑排出(預防鋇劑滯留致便秘/阻塞),數天內可解白色糞便。「檢查時給服硫酸鎂」錯誤(硫酸鎂是清腸瀉劑,用於下消化道/大腸攝影前準備,非上消化道攝影時服用)。","options":{"A":"正確。檢查前禁食6~8小時。","B":"錯誤(本題答案)。上腸胃道攝影不於檢查「時」服硫酸鎂。","C":"正確。檢查後多喝水促鋇排出。","D":"正確。包含胃及小腸攝影。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"106111-N3-10":{"quick":"唾液澱粉酶(ptyalin)消化「澱粉」。","detail":{"background":"唾液含「唾液澱粉酶(ptyalin/α-amylase)」與舌脂酶。唾液澱粉酶在口腔中將澱粉(多醣)初步分解為麥芽糖(雙醣),是醣類消化的起點。蛋白質消化始於胃(胃蛋白酶)、脂肪主要在小腸(胰脂酶+膽鹽)、蔗糖由小腸刷狀緣蔗糖酶分解。故唾液酶消化澱粉。","options":{"A":"正確(本題答案)。唾液澱粉酶消化澱粉。","B":"蛋白質由胃蛋白酶開始消化。","C":"脂肪主要在小腸消化。","D":"蔗糖由小腸蔗糖酶分解。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"109110-N3-13":{"quick":"大腸鏡禁忌不含「便秘」;急性UC、心絞痛、息肉剛切除皆為禁忌(本題答案A)。","detail":{"background":"大腸鏡檢查禁忌症:腸穿孔/腹膜炎、急性嚴重潰瘍性結腸炎或毒性巨結腸、腸息肉剛切除後(腸壁脆弱)、嚴重心肺疾病(嚴重心絞痛)、無法配合或凝血嚴重異常者。便秘並非大腸鏡禁忌。本題問「不是禁忌者」為便秘。 補充：大腸鏡禁忌為腸穿孔/腹膜炎、急性嚴重潰瘍性結腸炎/毒性巨結腸、腸息肉剛切除後、嚴重心肺疾病(嚴重心絞痛)、無法配合者;便秘並非禁忌,反而可能需檢查找出阻塞或腫瘤原因。","options":{"A":"正確(本題答案)。便秘不是大腸鏡禁忌症。","B":"是禁忌。嚴重心絞痛。","C":"是禁忌。潰瘍性結腸炎急性期。","D":"是禁忌。腸息肉剛切除後。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"110110-N3-13":{"quick":"上腸胃道攝影:檢查後多喝水排鋇(3)+2~3天解白色糞便為正常(4)=34。","detail":{"background":"上腸胃道鋇劑攝影:①檢查前需禁食6~8小時(非無需禁食);②不需清潔灌腸(那是下消化道攝影);③檢查後鼓勵多喝開水促鋇劑排出;④鋇劑使糞便變白,檢查後2~3天可解白色糞便為正常。故選3多喝水排鋇+4白色糞便正常=34。 補充：上腸胃道鋇劑攝影檢查前禁食6~8小時、不需清潔灌腸(那是下消化道攝影);檢查後多喝水並可給輕瀉劑促鋇排出,2~3天解白色糞便為正常;若便秘無法排鋇可致阻塞。","options":{"A":"12錯(1須禁食、2不需清潔灌腸)。","B":"13錯(1錯)。","C":"24錯(2錯)。","D":"正確(本題答案)。3多喝水排鋇+4白色糞便為正常。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"110110-N3-15":{"quick":"TPN突然停止易致「低血糖症」(反彈性低血糖)。","detail":{"background":"全靜脈營養(TPN)輸注高濃度葡萄糖,身體胰島素分泌增加;若突然停止輸注,血糖驟減而胰島素仍高,造成「反彈性低血糖」。故TPN應逐漸減速或停止後續接低濃度葡萄糖。輸注「過快」才致高血糖、滲透性利尿;液體負荷過重是輸注過量。 補充：TPN輸注高濃度葡萄糖使胰島素分泌增加,突然停止輸注時血糖驟減而胰島素仍高致反彈性低血糖;輸注過快才致高血糖與滲透性利尿;故TPN須逐漸減速或停後續接低濃度葡萄糖。","options":{"A":"液體負荷過重是輸注「過量」,非突然停止。","B":"高血糖是輸注「過快」,非停止。","C":"正確(本題答案)。突然停止致反彈性低血糖。","D":"與鈉無直接關係。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"111110-N3-12":{"quick":"下腸胃道攝影:檢查前清潔灌腸、檢查後2~3天解灰白色糞便為正常。","detail":{"background":"下腸胃道(鋇劑灌腸,barium enema)攝影:①檢查前2~3天低渣、前1天清流質並服瀉劑、檢查前需「清潔灌腸」清空大腸;②經肛門灌入鋇劑顯影大腸;③檢查後多喝水並可給瀉劑促鋇排出,2~3天解出「灰白色糞便」為正常。故「檢查前須清潔灌腸」與「檢查後2~3天解灰白便正常」皆正確,標準答案為D。","options":{"A":"錯誤。前1天清流質,前2天非正常飲食(應低渣)。","B":"正確但本題標準答案選D(亦正確,題型單選最適者)。","C":"錯誤。檢查後應多喝水排鋇,非限水。","D":"正確(本題答案)。檢查後2~3天解灰白色糞便為正常。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"112180-N3-8":{"quick":"腹腔鏡檢查:過於肥胖為禁忌之一(視野與穿刺困難)。","detail":{"background":"腹腔鏡檢查/手術:於腹腔灌入二氧化碳(氣腹)建立視野。禁忌/相對禁忌:嚴重凝血異常(如PT明顯延長)、嚴重心肺疾病、廣泛腹腔沾黏、過度肥胖(穿刺與視野困難)。檢查中CO2氣腹刺激橫膈可致「肩部」轉移痛(非後腰);凝血酶原時間20秒(延長)應「不可」貿然執行;插入時請病人配合非「大口吐氣摒息」。故「過於肥胖為禁忌之一」正確。","options":{"A":"正確(本題答案)。過於肥胖為禁忌之一。","B":"錯誤。PT 20秒(延長)不宜貿然執行。","C":"錯誤。非請個案大口吐氣摒住呼吸。","D":"錯誤。CO2氣腹致「肩部」轉移痛,非後腰抽痛。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}},"113100-N3-8":{"quick":"TPN併發症:空氣栓塞、低血糖(驟停)、液體負荷過量、感染、電解質/高血糖;「腸道纖毛增生」錯(反而萎縮)。","detail":{"background":"全靜脈營養(TPN)併發症:①導管相關—空氣栓塞、氣胸、導管感染/敗血症、血栓;②代謝—高/低血糖(輸太快高血糖、驟停低血糖)、電解質不平衡、肝功能異常;③輸注過量—液體負荷過重;④長期不經腸道—腸道黏膜「萎縮」(纖毛/絨毛萎縮)、腸道屏障功能下降與細菌移位。故「腸道纖毛增生」錯誤(應為萎縮)。","options":{"A":"是併發症。空氣栓塞。","B":"是併發症。低血糖(驟停)。","C":"是併發症。液體負荷過量。","D":"錯誤(本題答案)。長期TPN致腸絨毛「萎縮」,非增生。"},"sources":["新文京《內外科護理學》消化系統評估與檢查","華杏《內外科護理學》TPN與鼻胃管","生理學 消化系統"]}}},TO=["G1食道疾病", "G2消化性潰瘍與胃炎", "G3胃癌與胃切除術後", "G4大腸直腸癌與腸造口", "G5發炎性腸道疾病憩室炎與肛門直腸", "G6腸阻塞闌尾炎與腹膜炎", "G7腸道感染腹瀉吸收不良與其他腸疾", "G8病毒性肝炎與肝功能", "G9肝硬化門脈高壓與肝癌", "G10膽道疾病", "G11胰臟炎", "G12消化系統解剖生理檢查與營養支持"],LEC={"G1食道疾病":{"title":"G1 食道疾病 複習講義","html":"<h3>一、食道解剖重點(高頻考點)</h3>\n<p>食道「沒有漿膜層」,僅黏膜、黏膜下層(含豐富淋巴叢)、肌肉層、外膜。此特性使<b>食道癌早期即經淋巴快速轉移</b>、吻合處血供差易滲漏,是預後差與術後併發症的解剖根源。</p>\n<h3>二、胃食道逆流(GERD)</h3>\n<p>病生理=<b>下食道括約肌(LES)壓力過低或不適當鬆弛</b>→胃酸逆流。最常見症狀為<b>心灼熱(heartburn)</b>、反胃、吞嚥困難。降低LES壓力(促逆流)者:菸、酒、咖啡因、巧克力、薄荷、高脂、抗膽鹼藥、鈣阻斷劑;增加LES壓力者:乙醯膽鹼/副交感藥、胃泌素、metoclopramide、蛋白質。<b>護理指導(必背)</b>:床頭抬高4~6吋、餐後2~3小時勿平躺/彎腰/運動、睡前2~3小時勿進食、少量多餐細嚼慢嚥、減重、戒菸酒咖啡、避免緊身衣與便秘;藥物以PPI為主,不用β-blocker。</p>\n<h3>三、食道癌</h3>\n<p>台灣以<b>鱗狀細胞癌</b>最常見(菸酒檳榔、過熱過鹹醃漬刺激食物),好發<b>中段</b>、男性居多;歐美因肥胖/Barrett食道使下段腺癌增加。主症為<b>進行性吞嚥困難</b>(先固體後流質)、體重減輕、聲沙(喉返神經)、嗆咳。營養採高蛋白高熱量低渣易吞嚥飲食,必要時胃造口/管灌;光動力治療後避光約1個月。</p>\n<h3>四、裂孔疝氣與其他</h3>\n<p><b>食道裂孔疝氣</b>:胃經橫膈食道裂孔上疝至縱膈,滑動型(約90%最常見、最易逆流);好發肥胖多產年長女性、腹壓升高者。<b>食道弛緩不能(achalasia)</b>:LES無法鬆弛+食道蠕動消失,鋇劑呈鳥嘴狀,情緒壓力加重,易併滯留性食道炎與食道癌。<b>食道憩室</b>:鋇劑食道攝影定位,餐後勿平躺以免食物逆流。</p>"},"G2消化性潰瘍與胃炎":{"title":"G2 消化性潰瘍與胃炎 複習講義","html":"<h3>一、胃酸分泌生理與藥物分類</h3>\n<p>胃酸由胃底腺<b>壁細胞</b>分泌(主細胞分泌胃蛋白酶原);促進泌酸:迷走(副交感、乙醯膽鹼)、胃泌素、組織胺(H2);抑制:交感、脂肪、前列腺素、生長抑素。抗潰瘍藥分三類:①<b>減少胃酸分泌</b>—H2拮抗劑、PPI、抗膽鹼;②中和胃酸—制酸劑;③<b>細胞保護</b>—sucralfate、misoprostol、bismuth(不減酸,只護膜)。</p>\n<h3>二、胃潰瘍 vs 十二指腸潰瘍(必考鑑別)</h3>\n<p><b>胃潰瘍</b>:餐後30分~1小時痛(進食加重)、好發中老年、胃酸正常或偏低、有惡性變可能、嘔血較常見。<b>十二指腸潰瘍</b>:空腹/半夜痛(進食緩解)、好發較年輕、胃酸偏高、惡變少、解黑便較常見。兩者主因皆為<b>H. pylori</b>與NSAID。三大合併症:出血(最常見)、穿孔(最危急,多為十二指腸前壁,致腹膜炎、橫膈下游離氣體)、幽門阻塞。</p>\n<h3>三、H. pylori 與治療</h3>\n<p>三合一療法=<b>PPI+兩種抗生素</b>(amoxicillin+clarithromycin或metronidazole);加bismuth即四合一。Hp相關疾病:B型(胃竇)慢性胃炎、消化性潰瘍、胃腺癌、MALT淋巴瘤。Sucralfate須空腹服(餐前1小時及睡前)、副作用便秘、勿與他藥同服。Cimetidine經腎排泄須監測腎功能。</p>\n<h3>四、胃炎</h3>\n<p>急性胃炎原因:壓力、NSAID/aspirin、酒精、抽菸、鼻胃管、Hp;急性期應禁食/清淡。慢性胃炎:<b>A型(自體免疫,胃體,致內在因子缺乏→惡性貧血,與Hp無關)</b>;<b>B型(最常見,胃竇,與Hp相關)</b>。上消化道出血嚴重時心搏過速、血壓下降、皮膚濕冷蒼白;血管加壓素止血後須逐漸減量。</p>"},"G3胃癌與胃切除術後":{"title":"G3 胃癌與胃切除術後 複習講義","html":"<h3>一、胃癌</h3>\n<p>以<b>腺癌</b>最常見,好發<b>胃竇/胃小彎遠端</b>、40歲以上男性;危險因子:<b>H. pylori(WHO第一類致癌物)</b>、萎縮性胃炎、高鹽醃漬燻製食物、亞硝胺、惡性貧血、胃息肉。萎縮性胃炎使壁細胞減少→胃酸「降低」。</p>\n<h3>二、傾倒症候群(Dumping Syndrome)——最高頻考點</h3>\n<p>機轉:胃切除(尤其<b>Billroth II/全胃切除</b>,失幽門調節)後,<b>高張性食糜快速進入空腸</b>。①<b>早期型(餐後10~30分鐘)</b>:腸腔滲透壓上升→細胞外液(血漿)移入腸腔→循環血量驟減→心悸、頭暈、出汗、腹脹、噁心、腹瀉。②<b>晚期型(餐後2~3小時)</b>:大量醣快速吸收→insulin過度分泌→反應性低血糖。<b>預防飲食(必背)</b>:少量多餐、<b>乾濕分離(用餐時不喝湯/液體)</b>、低醣、高蛋白、適量脂肪、進食採半坐臥、<b>餐後平躺20~30分鐘</b>延緩排空。傾倒最常見於胃空腸吻合(Billroth II),Billroth I(胃十二指腸吻合)較少。</p>\n<h3>三、胃切除術後其他併發症</h3>\n<p>胃壁細胞分泌<b>內在因子</b>,與B12結合於迴腸吸收;胃切除後內在因子缺乏→<b>維生素B12吸收不良→惡性貧血</b>,須定期注射B12。另有鐵/葉酸缺乏、邊緣性潰瘍、鹼性回流性胃炎、吻合處出血;因排空加速多腹瀉,便秘罕見。</p>"},"G4大腸直腸癌與腸造口":{"title":"G4 大腸直腸癌與腸造口 複習講義","html":"<h3>一、大腸直腸癌</h3>\n<p>好發<b>直腸與乙狀結腸(左側)</b>;以腺癌最多。<b>左側</b>癌:管腔窄、糞便成形→阻塞、血便、糞便變細、<b>裏急後重</b>;<b>右側(升結腸)</b>癌:管腔大、糞便稀,症狀晚→缺鐵性貧血、腹塊、體重減輕。危險因子:腺瘤性息肉、<b>家族性腺瘤性息肉症(FAP)</b>、Lynch、發炎性腸病、高脂低纖精緻飲食、紅肉、家族史、年齡>50歲。保護因子:高纖蔬果、規律運動、維持適當體重。<b>CEA(癌胚抗原)</b>為最常用腫瘤標記,用於術前評估與<b>術後追蹤復發</b>(非篩檢)。術前腸道準備:前1天清流質+瀉劑清腸。</p>\n<h3>二、腸造口糞便性狀(依部位,必背)</h3>\n<p>由近端到遠端越來越成形:<b>迴腸造口</b>(液狀、含消化酶刺激皮膚、量多需補水≥1500~2000mL/天、<b>不可灌洗</b>、初期避免高纖防阻塞)→<b>升結腸</b>(半流質、水分需求增加、無規律、不灌洗)→<b>橫結腸</b>(半成形)→<b>降結腸/乙狀結腸</b>(成形便、最接近正常、<b>可訓練灌洗</b>建立規律排便)。</p>\n<h3>三、造口顏色與護理</h3>\n<p>正常造口<b>玫瑰紅(牛肉紅)且濕潤</b>;<b>蒼白=貧血/缺血</b>、暗紫黑=缺血壞死、嚴重水腫=回流受阻。造口袋開口比造口大約<b>1/8吋</b>保護周圍皮膚;採清潔技術;每次更換觀察造口與周圍皮膚。結腸灌洗用溫開水(37~40°C,不用肥皂水),灌洗袋底部與肩同高,腸絞痛時暫停。術後初期避免高渣以免阻塞。</p>"},"G5發炎性腸道疾病憩室炎與肛門直腸":{"title":"G5 發炎性腸道疾病、憩室炎與肛門直腸 複習講義","html":"<h3>一、發炎性腸道疾病(IBD)——潰瘍性結腸炎 vs 克隆氏病(必考鑑別)</h3>\n<p><b>潰瘍性結腸炎(UC)</b>:侵犯<b>黏膜/黏膜下層</b>、<b>連續性</b>、由直腸往近端、血便+大量膿黏液便+<b>裏急後重</b>明顯、併毒性巨結腸與大腸癌。<b>克隆氏病(Crohn)</b>:侵犯<b>全層腸壁</b>(腸壁增厚)、<b>跳躍式</b>、好發<b>迴腸末端</b>、瘻管/狹窄、肉芽腫、脂肪痢與營養不良。IBD好發15~35歲青壯年,與遺傳、免疫、感染、食物過敏相關。</p>\n<h3>二、憩室炎</h3>\n<p>好發乙狀結腸,低纖飲食使腸內壓升高。表徵:左下腹痛、痙攣痛、發燒、白血球上升、排便習慣改變(黃疸非其表徵)。併發症:膿瘍、穿孔致腹膜炎、下消化道出血、瘻管、腸狹窄(胰臟炎、腸麻痺非其併發症)。</p>\n<h3>三、肛門直腸疾病</h3>\n<p><b>痔瘡</b>:肛門直腸靜脈叢曲張,與久站久坐、便秘、懷孕、門脈高壓有關。<b>術後護理(必背)</b>:術後12~24小時可<b>溫水坐浴</b>(不可冰水,冰水使括約肌痙攣)、採<b>側臥或俯臥</b>避免壓迫傷口、初期低渣飲食(癒合後增纖維+水分≥2000mL)、監測<b>尿滯留</b>與出血(8小時內二塊以上敷料浸溼示出血)。<b>肛門瘻管</b>術後常見出血、瘻管復發、括約肌受損致解便失禁;便秘最少見。</p>"},"G6腸阻塞闌尾炎與腹膜炎":{"title":"G6 腸阻塞、闌尾炎與腹膜炎 複習講義","html":"<h3>一、闌尾炎(高頻徵象題)</h3>\n<p>疼痛由<b>臍周轉移至右下腹麥氏點(McBurney point)</b>。徵象:麥氏點反彈痛、<b>洛夫辛氏(Rovsing,壓左下腹引起右下腹痛)</b>、<b>腰大肌(psoas)</b>、<b>閉孔肌(obturator)</b>徵象陽性;伴噁心嘔吐、低燒、<b>嗜中性球(白血球)上升</b>。<b>護理</b>:禁食、<b>勿灌腸/瀉劑、勿熱敷</b>(增蠕動/促發炎恐穿孔,可冰敷)、半坐臥使滲液局限骨盆腔、儘快手術、術後6週內勿提重物。注意:<b>墨菲氏徵象=膽囊炎、透納氏徵象=出血性胰臟炎,非闌尾炎</b>。</p>\n<h3>二、腸阻塞</h3>\n<p>表徵:腹部絞痛、腹脹、嘔吐(高位/小腸阻塞嘔吐早且多、可含糞臭味;低位/大腸阻塞嘔吐晚)、便秘/無排便排氣(<b>非腹瀉</b>)。機械性阻塞<b>早期腸音亢進(高亢)、晚期腸壞死/麻痺則消失</b>。大量體液滯留腸腔→脫水、低血容、<b>Na/K/Cl下降</b>、低血壓。<b>麻痺性腸阻塞</b>原因:腹部手術後、腹膜炎、<b>低血鉀</b>、抗膽鹼藥(低血鈉非主因)。處置:禁食、鼻胃管減壓、輸液矯正電解質。</p>\n<h3>三、腹膜炎</h3>\n<p>多由消化道穿孔(闌尾、潰瘍、憩室)使腸內細菌(以革蘭氏陰性菌如E. coli及厭氧菌為主)入腹腔。表徵:<b>持續劇烈腹痛、板狀腹(腹肌僵硬如木板)、反彈痛、壓痛、腸蠕動音減弱或消失、發燒、淺快呼吸</b>、噁心嘔吐、電解質不平衡,可進展為敗血性休克(末期體溫可下降)。護理採<b>半坐臥(Fowler)</b>使膿液局限骨盆腔。</p>"},"G7腸道感染腹瀉吸收不良與其他腸疾":{"title":"G7 腸道感染、腹瀉、吸收不良與其他腸疾 複習講義","html":"<h3>一、腸道感染與食物中毒</h3>\n<p><b>水瀉</b>:霍亂(米湯樣)、輪狀病毒(嬰幼兒)、諾羅病毒(<b>好發冬季</b>)。<b>血樣黏液便/裏急後重</b>:志賀氏菌、沙門氏菌(腹瀉發燒)、EHEC O157、阿米巴。<b>肉毒桿菌</b>產神經毒→複視、吞嚥困難、下行性麻痺(非血樣腹瀉)。食物中毒以<b>金黃色葡萄球菌腸毒素最常見</b>(嘔吐為主),嚴重度與量及毒素含量正相關;處理休克病人先穩定生命徵象與補液。<b>困難梭狀桿菌(C. difficile)</b>:厭氧革蘭陽性桿菌、形成孢子,長期抗生素誘發偽膜性結腸炎;<b>首選口服vancomycin/fidaxomicin</b>(靜脈vancomycin無效),接觸隔離、肥皂洗手(酒精殺不死孢子)。</p>\n<h3>二、吸收不良症候群</h3>\n<p>脂肪不良→脂肪痢+ADEK缺乏;碳水化合物不良→脹氣滲透性腹瀉;<b>蛋白質不良→體重下降、低白蛋白水腫</b>;B12/葉酸缺→巨母紅血球貧血;維生素D/鈣缺→骨軟化抽搐。</p>\n<h3>三、便秘、大便失禁與口腔疾病</h3>\n<p>老年便秘:增水分纖維、運動、定時排便、容積性瀉劑;<b>不可每天灌腸</b>(致依賴與電解質失衡)。大便失禁:減少咖啡因、酒、辛辣;評估用直腸測壓、排便圖、感覺試驗(乙狀結腸鏡看黏膜非優先)。<b>口腔疾病</b>:單純疱疹為HSV<b>病毒</b>感染(非細菌);念珠菌好發免疫低下;缺B2致口角炎;預防齲齒靠減糖、牙線、塗氟、清潔(植牙是修復非預防)。</p>"},"G8病毒性肝炎與肝功能":{"title":"G8 病毒性肝炎與肝功能 複習講義","html":"<h3>一、肝臟功能</h3>\n<p>醣代謝(葡萄糖↔肝醣)、合成白蛋白與<b>凝血因子</b>、代謝解毒(藥物、氨→尿素)、<b>製造膽汁(由肝分泌、儲存於膽囊,肝本身不儲存膽汁)</b>、儲存維生素ADEK·B12與鐵。合成抗體是漿細胞(免疫系統)的功能,非肝臟。</p>\n<h3>二、病毒性肝炎傳染途徑(必背)</h3>\n<p><b>A型、E型=糞口傳染</b>(飲食污染);<b>B型、C型、D型=血液/體液(性、母嬰垂直)傳染</b>。A肝不會慢性化;D肝需依附B肝共存。</p>\n<h3>三、B肝血清標記(高頻)</h3>\n<p><b>HBsAg(+)</b>=帶原/感染;<b>anti-HBs(+)</b>=有保護性抗體(康復或接種疫苗);<b>HBeAg(+)</b>=病毒複製活躍、<b>高傳染力</b>;anti-HBe(+)=傳染力下降;IgM anti-HBc=急性、IgG anti-HBc=曾感染。A肝:IgM anti-HAV(+)=急性、<b>IgG anti-HAV(+)=曾感染或接種(有免疫力)</b>。母嬰垂直傳染主要在<b>產程</b>(非子宮內經臍靜脈);母HBsAg+HBeAg皆陽性者,新生兒24小時內打<b>HBIG+B肝疫苗</b>阻斷。</p>\n<h3>四、肝炎治療與肝切片</h3>\n<p>慢性C肝傳統治療為<b>干擾素+ribavirin</b>(類固醇禁用、lamivudine/adefovir治B肝對C肝無效);近年以全口服DAA為主。<b>肝切片護理</b>:術前查凝血;施針時<b>深吐氣後摒住呼吸</b>(橫膈上移避免穿破);術後<b>右側臥+小枕/沙袋壓右肋緣下方</b>數小時止血、臥床休息、一週內勿舉重;<b>右肩轉移痛須懷疑橫膈下出血</b>。B/C肝後致肝硬化屬「壞死後肝硬化」。</p>"},"G9肝硬化門脈高壓與肝癌":{"title":"G9 肝硬化、門脈高壓與肝癌 複習講義","html":"<h3>一、肝硬化腹水機轉(必背)</h3>\n<p>①<b>門脈高壓</b>→腸繫膜微血管靜水壓上升;②<b>白蛋白合成減少→血漿膠體滲透壓下降</b>;③有效循環血量下降→<b>醛固酮(留鹽激素)亢進</b>→鈉水滯留;④淋巴液增加。治療:限鈉限水、利尿劑(<b>首選spironolactone保鉀</b>,可加furosemide,須監測低鈉低鉀)、白蛋白、必要時放液(放大量易致低血容、心跳加快、肝腎症候群,須緩慢並補白蛋白)。</p>\n<h3>二、肝硬化內分泌與皮膚徵象</h3>\n<p>肝對<b>雌激素(estrogen)</b>去活化下降→相對過多→<b>蜘蛛痣、紅掌、男性女乳、睪丸萎縮</b>。Child-Pugh分級五指標:膽紅素、白蛋白、PT、腹水、肝性腦病變(<b>血清肌酸酐屬MELD,非Child-Pugh</b>)。</p>\n<h3>三、肝性腦病變(HE)</h3>\n<p>肝衰竭使<b>氨(ammonia)蓄積</b>致中樞障礙。誘發因子:<b>腸胃道出血、高蛋白、便秘、感染、低血鉀/鹼中毒、脫水、鎮靜劑</b>(高血鉀非誘發因子)。表徵:意識改變、<b>撲翼樣震顫(asterixis)</b>、深腱反射亢進、巴賓斯基(+)、肝臭。處置:限蛋白40~60g、<b>Lactulose酸化糞便減少氨吸收並導瀉</b>、Neomycin抑制產氨菌、預防便秘、避免鎮靜劑。</p>\n<h3>四、食道靜脈曲張與肝癌</h3>\n<p>食道靜脈曲張為門脈高壓側枝,是肝硬化上消化道出血主因。藥物:vasopressin(收縮內臟血管、副作用心肌缺血)、somatostatin/octreotide(副作用少)、propranolol(降門脈壓做預防)、furosemide非靜脈曲張用藥。急性出血:止血(內視鏡結紮、S-B管壓迫,壓力20~40mmHg且間歇放鬆)、輸新鮮冷凍血漿、軟質溫食、<b>勿用鎮靜安眠藥</b>(恐誘發HE)。<b>肝癌</b>:好發亞非B/C肝盛行區男性、合併肝硬化,腫瘤標記<b>AFP</b>;膽結石非肝癌因子。<b>TAE/TACE</b>利用肝癌主由肝動脈供血,栓塞後症候群(發燒需監測體溫),門脈主幹阻塞為禁忌,術後臥床監測肝功能。黃疸:阻塞性糞便灰白、PT延長;溶血性PT正常。</p>"},"G10膽道疾病":{"title":"G10 膽道疾病 複習講義","html":"<h3>一、膽結石與危險因子(5F)</h3>\n<p>台灣與西方以<b>膽固醇結石</b>最多;危險因子<b>5F</b>:Female女性、Fat肥胖、Forty四十歲以上、Fertile多產、Fair(及家族史、<b>口服避孕藥/動情素</b>、快速減重、糖尿病)。多吃蔬果(高纖)為保護因子。飲食採<b>低脂</b>(脂肪餐誘發膽囊收縮痛)。</p>\n<h3>二、急性膽囊炎(高頻徵象)</h3>\n<p>九成由結石阻塞膽囊管引起。表徵:<b>右上腹/上腹痛輻射至右肩胛</b>、<b>墨菲氏徵象(Murphy sign)陽性</b>(深吸氣觸壓右肋下因痛停止吸氣)、發燒、噁心嘔吐、脂肪餐後加重、<b>ALP上升</b>。<b>止痛用meperidine(Demerol),不用morphine</b>(嗎啡使Oddi括約肌痙攣加重痛);抗痙攣用atropine、buscopan、pro-banthine;處置禁食、鼻胃管、抗生素、膽囊切除。</p>\n<h3>三、阻塞性黃疸與膽道檢查/手術</h3>\n<p><b>總膽管阻塞</b>:膽汁不入腸→糞便<b>灰白(陶土)色</b>、茶色尿、ALP/γ-GT上升、維生素K吸收差致<b>PT延長</b>。<b>ERCP</b>:評估肝胰壺腹/膽道/胰臟,需禁食、查凝血,鬆弛Oddi括約肌用靜脈藥/MgSO4。<b>T型管</b>:引流棕綠色膽汁、量逐漸減少、引流袋低於傷口、<b>不可常規沖洗</b>(防逆行感染)。腹腔鏡膽囊切除術後右肩痛因CO2氣腹。<b>膽囊癌</b>以腺癌最常見、好發老年、早期似膽囊炎、預後差。</p>"},"G11胰臟炎":{"title":"G11 胰臟炎 複習講義","html":"<h3>一、急性胰臟炎(高頻)</h3>\n<p>最常見病因為<b>膽道疾病(膽結石)與酗酒</b>;機轉為胰酶在胰腺內被活化造成<b>自體消化</b>。臨床:<b>上腹/左上腹劇痛輻射至背部</b>、噁心嘔吐、發燒;血清<b>澱粉酶(amylase)與脂肪酶(lipase)皆上升</b>(lipase較專一持久);出血性胰臟炎見<b>脅腹瘀斑(Grey Turner)、臍周瘀斑(Cullen)</b>;<b>血鈣下降</b>(脂肪皂化)、血糖上升。處置:<b>禁食讓胰臟休息、鼻胃管引流抑制胰液</b>、輸液矯正電解質、<b>止痛用meperidine(避免morphine/codeine)</b>、抗膽鹼藥/H2阻斷劑、<b>側臥彎膝</b>減痛;康復期採<b>低脂、適量蛋白、高醣</b>飲食、禁酒。</p>\n<h3>二、慢性胰臟炎</h3>\n<p>反覆發炎致胰腺纖維化、內外分泌功能喪失,典型三徵:<b>慢性腹痛、脂肪痢(外分泌不足)、糖尿病/血糖上升(內分泌不足)</b>,並有體重減輕與胰臟鈣化。透納氏徵象屬急性出血性胰臟炎,非慢性典型。</p>\n<h3>三、胰液功能</h3>\n<p>胰液含重碳酸鹽(中和酸性乳糜)及消化酶:<b>胰澱粉酶</b>(澱粉→雙醣)、<b>胰脂肪酶</b>(脂肪→脂肪酸甘油)、<b>胰蛋白酶</b>(蛋白質→胜肽/胺基酸);可同時消化脂肪、蛋白、醣,是消化最完整的腺體。將雙醣再分解成單醣是小腸刷狀緣酶,非胰液。</p>"},"G12消化系統解剖生理檢查與營養支持":{"title":"G12 消化系統解剖生理、檢查與營養支持 複習講義","html":"<h3>一、消化生理重點</h3>\n<p>胃酸由<b>壁細胞</b>分泌;促進泌酸:<b>副交感、組織胺(H2)、胃泌素</b>;抑制:交感、<b>前列腺素</b>(並護膜)、脂肪、生長抑素。自律神經:副交感促蠕動分泌、括約肌鬆弛;<b>交感抑制蠕動分泌、幽門括約肌收縮、內臟血管收縮</b>。消化酶:唾液澱粉酶(澱粉)、胃蛋白酶(蛋白)、胰液(脂肪/蛋白/澱粉)、小腸刷狀緣酶(雙醣→單醣);肝臟不分泌蛋白酶。</p>\n<h3>二、消化道檢查護理(必背)</h3>\n<p><b>上腸胃道(鋇劑)攝影</b>:前禁食6~8小時、不需清潔灌腸、檢查後多喝水排鋇、2~3天解白色糞便正常(不於檢查時服硫酸鎂)。<b>下腸胃道(鋇劑灌腸)</b>:前清潔灌腸、檢查後解灰白便正常。<b>大腸鏡禁忌</b>:腸穿孔/急性嚴重UC/息肉剛切除/嚴重心絞痛(<b>便秘非禁忌</b>)。<b>胃鏡前Atropine</b>:減少唾液與消化道分泌(咽喉麻醉用xylocaine)。<b>腹腔鏡</b>:過於肥胖、嚴重凝血異常為禁忌,CO2氣腹致肩部轉移痛。</p>\n<h3>三、鼻胃管與全靜脈營養(TPN)</h3>\n<p><b>鼻胃管</b>:胃灌洗用<b>生理食鹽水</b>(非清水以免電解質流失);每日清潔鼻孔換膠帶防壓瘡;移除後鼻出血→身體前傾+按壓鼻翼10~15分鐘。<b>TPN</b>:為高濃度葡萄糖,<b>突然停止易致反彈性低血糖</b>(須逐漸減速或續接低濃度葡萄糖);輸注過快致高血糖;併發症含空氣栓塞、導管感染、液體負荷過重、電解質失衡、長期致<b>腸絨毛萎縮</b>(非增生)。</p>"}};

TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n3_gi_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
