 秒,可執行此檢查","C":"插入腹腔鏡前需請個案大口吐氣後並摒住呼吸","D":"檢查時因灌入二氧化碳會引起後腰部抽痛"},"img":""},{"id":"113100-N3-8","code":"113100","roc":"113","cat":"N3","catname":"內外科護理學","num":8,"stem":"有關全腸道外營養療法(TPN)常見的併發症,下列何者錯誤?","opts":{"A":"空氣栓塞","B":"低血糖症","C":"液體負荷過量","D":"腸道纖毛增生"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"system_code":"S3","system_name":"消化與肝膽胰系統","topic_code":"G12","topic":"G12消化系統解剖生理檢查與營養支持","q_num":8,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"空氣栓塞","B":"低血糖症","C":"液體負荷過量","D":"腸道纖毛增生"},"img":""}],E={"101030-N3-32":{"quick":"食道無漿膜層、黏膜下層淋巴管豐富 → 早期即經淋巴快速轉移。","detail":{"background":"食道在解剖上最大特色是「沒有漿膜層(serosa)」，僅由黏膜、黏膜下層、肌肉層與外膜構成；黏膜下層含豐富的淋巴叢，且食道縱向淋巴引流四通八達，故食道癌即使尚未穿透肌層，也常已沿黏膜下淋巴管縱向擴散與遠處轉移，是其預後差、發現多屬中晚期的主因。食道癌組織型態在台灣與亞洲以鱗狀細胞癌(squamous cell carcinoma)為主，與菸、酒、檳榔、過熱及醃漬刺激食物有關；好發於食道中段。","options":{"A":"正確。食道黏膜層(及黏膜下層)淋巴管豐富，腫瘤易早期經淋巴管轉移，為食道癌快速擴散主因。","B":"錯誤。食道「沒有漿膜層」，不存在漿膜層淋巴管。","C":"非主因。血行轉移較淋巴轉移晚，肌肉層血管非快速轉移關鍵。","D":"食道為複層鱗狀上皮，並非「上皮脆弱」造成快速轉移。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"102110-N3-14":{"quick":"食道癌術後重建胃管，固體與水分開吞、細嚼慢嚥、少量多餐以防逆流與吻合處負擔。","detail":{"background":"食道癌手術常以胃或結腸做食道重建(esophagectomy with gastric pull-up)，術後因失去正常下食道括約肌與胃容量縮小，易發生逆流、傾倒症狀與吻合處滲漏。飲食指導重點：少量多餐、細嚼慢嚥、進食採坐姿並維持30分鐘以上、避免菸酒與刺激性食物。固體食物可與水同時進食以幫助通過吻合口，因此「勿與水同時進食」並非絕對禁忌(此為錯誤選項)。","options":{"A":"正確。細嚼慢嚥可減少吻合口阻塞與逆流。","B":"錯誤(本題答案)。固體配合少量水分有助食物通過重建食道吻合口，不需嚴格分開。","C":"正確。少量多餐可減輕胃容量不足與傾倒症狀。","D":"正確。菸酒刺激食道黏膜應避免。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"102110-N3-65":{"quick":"GERD 護理：餐後勿臥、床頭抬高4~6吋、減重、少量多餐、避免高脂與睡前進食。","detail":{"background":"胃食道逆流(GERD)的核心病生理為下食道括約肌(LES)壓力降低或不適當鬆弛，使胃酸逆流至食道造成心灼熱(heartburn)。護理與生活型態指導：①睡眠時床頭抬高4~6吋利用重力減少逆流；②餐後2~3小時內勿平躺、勿彎腰或劇烈運動；③少量多餐、避免高脂、咖啡、巧克力、薄荷、酒精(皆降低LES壓力)；④戒菸、減重、避免緊身衣物。藥物以PPI為主。","options":{"A":"錯誤。飯後立即躺下會加重逆流。","B":"錯誤。睡前進食(含熱牛奶)會增加夜間逆流。","C":"正確(本題答案)。床頭抬高4~6吋利用重力減少夜間逆流。","D":"錯誤。彎腰會增加腹內壓而加重逆流。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"103030-N3-17":{"quick":"食道癌主症為進行性吞嚥困難、體重減輕、聲音沙啞、咳嗽，與頭暈最無關。","detail":{"background":"食道癌典型症狀為「進行性吞嚥困難」(先固體後流質)、體重減輕、胸骨後不適、嗆咳；侵犯喉返神經可致聲音沙啞，侵犯氣管支氣管則咳嗽、分泌物增加或氣管食道瘻。頭暈目眩屬非特異性、與食道癌無直接關聯，為最不相關之表徵。 補充：食道癌因食道無漿膜層、淋巴引流豐富,早期即淋巴轉移,確診時多屬中晚期;吞嚥困難為「進行性」(先固體後流質),侵犯喉返神經致聲沙、侵犯氣管致咳嗽嗆咳,頭暈非其表徵。","options":{"A":"相關。進行性吞嚥困難為最典型症狀。","B":"相關。腫瘤侵犯喉返神經致聲音沙啞。","C":"最不相關(本題答案)。頭暈目眩非食道癌特徵。","D":"相關。侵犯氣管/支氣管致咳嗽、分泌物增加。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"106110-N3-12":{"quick":"台灣食道癌以鱗狀細胞癌最常見(非腺癌)，好發中後段、男性居多、主症吞嚥困難。","detail":{"background":"食道癌組織型態：台灣及亞洲以「鱗狀細胞癌」最常見(與菸酒檳榔、過熱及醃漬食物有關)，好發於食道中段;歐美因肥胖與Barrett食道(GERD相關)使下段腺癌(adenocarcinoma)比例升高。男性發生率高於女性。主要症狀為進行性吞嚥困難與體重減輕。","options":{"A":"錯誤(本題答案)。台灣食道癌以鱗狀細胞癌最常見，非腺癌。","B":"正確。好發於食道中後段。","C":"正確。吞嚥困難為常見症狀。","D":"正確。男性居多。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"106111-N3-13":{"quick":"裂孔疝氣好發於肥胖、多產、年長女性(非瘦弱男性);胃經食道裂孔上疝致逆流灼熱。","detail":{"background":"橫膈食道裂孔疝氣(hiatal hernia)指胃的一部分經橫膈的食道裂孔向上疝脫進入胸腔(縱膈)。滑動型(sliding，最常見約90%)使賁門上移、LES功能受損而產生逆流、心口灼熱、噯氣;食道旁型(paraesophageal)逆流症狀少但易嵌頓。危險因子為肥胖、多產婦、年長、腹內壓升高，並非「男性及瘦弱者」。","options":{"A":"錯誤(本題答案)。好發於肥胖、多產之年長女性，非瘦弱男性。","B":"正確。胃經食道裂孔上疝至縱膈腔之定義。","C":"正確。餐後因逆流致心口灼熱。","D":"正確。LES功能受損致胃內容物與氣體逆流。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"107030-N3-12":{"quick":"降低 LES 壓力者:腸促胰素、抗膽鹼藥、菸、脂肪、巧克力等;副交感(膽鹼)藥反而增加 LES 壓力。","detail":{"background":"下食道括約肌(LES)張力受多種因素影響。降低LES壓力(促進逆流)者:secretin腸促胰素、抗膽鹼性(anticholinergic)藥物、菸、酒精、咖啡因、巧克力、薄荷、高脂食物、鈣離子阻斷劑、硝酸鹽。增加LES壓力者:乙醯膽鹼/副交感(膽鹼性)藥物、gastrin胃泌素、metoclopramide、蛋白質食物。故「副交感神經藥物」會增加而非降低LES壓力。","options":{"A":"會降低。腸促胰素(secretin)降低LES壓力。","B":"會降低。抗膽鹼藥物抑制副交感、降低LES張力。","C":"會降低。香菸降低LES壓力。","D":"錯誤(本題答案)。副交感(膽鹼性)藥物會「增加」LES壓力，不會降低。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"107030-N3-52":{"quick":"GERD 為 LES 壓力「太低」(非太高);心灼熱最常見、餐後勿躺、控制體重。","detail":{"background":"GERD病生理為LES壓力過低或不適當鬆弛、加上食道清除能力下降，使胃酸逆流。最常見症狀為心灼熱(heartburn)及反胃。處置:減重以降低腹內壓、進食後2小時內避免躺下或運動、避免誘發食物、PPI治療。 補充：GERD核心為下食道括約肌(LES)壓力過低或不適當鬆弛致胃酸逆流;心灼熱為最常見症狀;生活型態調整(減重、戒菸酒咖啡、餐後勿躺、床頭抬高)加PPI為主要治療。","options":{"A":"錯誤(本題答案)。GERD是LES壓力「太低」，非太高。","B":"正確。心灼熱為最常見症狀。","C":"正確。餐後2小時內避免躺下或運動。","D":"正確。控制體重減少腹內壓。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"107110-N3-11":{"quick":"GERD 常見心灼熱、反胃、吞嚥困難;腹瀉非典型表徵。","detail":{"background":"GERD臨床表徵以心灼熱(燒灼感)最常見，其次為反胃酸/反胃感、吞嚥困難或吞嚥疼痛、慢性咳嗽、夜咳、喉炎、氣喘樣症狀(食道外表現)。腹瀉並非GERD表徵。 補充：GERD常見心灼熱、反胃酸、吞嚥困難、慢性咳嗽、夜咳、喉炎、氣喘樣等食道外症狀;腹瀉非其表徵;長期逆流可致食道炎、狹窄、Barrett食道(腺癌前驅)。","options":{"A":"最不常見(本題答案)。腹瀉非GERD表徵。","B":"常見。心灼熱為最典型症狀。","C":"常見。反胃感。","D":"常見。逆流長期可致食道狹窄而吞嚥困難。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"108020-N3-11":{"quick":"食道重建術後最嚴重併發症為「吻合處滲漏」,可致縱膈炎、敗血症而致命。","detail":{"background":"食道切除重建術(esophagectomy)後最嚴重、致死率最高的併發症為「吻合口滲漏(anastomotic leak)」,因食道無漿膜層、血供差、吻合口張力大,滲漏會導致縱膈炎、膿胸、敗血症。術後需密切觀察發燒、胸痛、白血球上升、引流液性質,並延後經口進食、先確認吻合口癒合(如吞嚥攝影)。吸入性肺炎雖常見但非最嚴重。","options":{"A":"最嚴重(本題答案)。吻合處滲漏致縱膈炎/敗血症,死亡率高。","B":"常見但非最嚴重。吸入性肺炎可處理。","C":"腹瀉(傾倒)非最嚴重。","D":"吞嚥困難非致命併發症。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"108020-N3-14":{"quick":"裂孔疝氣症狀多在餐後「立即/平躺時」出現,非飽餐1小時後才出現。","detail":{"background":"橫膈食道裂孔疝氣症狀來自逆流:心口灼熱、噯氣、胸骨後或頸背緊迫感,常於餐後平躺、彎腰、腹壓增加時「立即」加重,而非延遲到飽餐後1小時才出現。 補充：橫膈食道裂孔疝氣使胃經食道裂孔上疝至縱膈,賁門/LES功能受損致逆流;症狀(心口灼熱、噯氣、胸頸背緊迫感)多於餐後平躺、彎腰、腹壓增加時「立即」加重,而非延遲到飽餐1小時後。","options":{"A":"正確。心口灼熱為典型表徵。","B":"正確。逆流可致食道炎與狹窄而吞嚥困難。","C":"錯誤(本題答案)。症狀多在餐後立即/平躺時出現,非1小時後才出現。","D":"正確。胸頸背緊迫感為常見不適。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"109030-N3-16":{"quick":"GERD 護理:少量多餐、床頭抬高、避免便秘、睡前勿進食宵夜。","detail":{"background":"GERD生活指導:少量多餐、細嚼慢嚥;睡覺時床頭抬高利用重力;避免便秘(用力解便增加腹內壓);避免睡前2~3小時進食(宵夜會增加夜間逆流);避免高脂、咖啡、酒、菸、巧克力等降低LES壓力之物質;減重。 補充：GERD護理為少量多餐細嚼慢嚥、睡覺床頭抬高、避免便秘(用力解便增腹壓)、睡前2~3小時勿進食、避免高脂咖啡酒菸巧克力(降低LES壓力)、減重;吃宵夜會增加夜間逆流。","options":{"A":"正確。少量多餐。","B":"錯誤(本題答案)。睡前吃宵夜會增加夜間逆流。","C":"正確。床頭抬高減少逆流。","D":"正確。避免便秘以免腹內壓升高。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"110030-N3-13":{"quick":"食道弛緩不能:LES 無法鬆弛、好發食道下1/3、早期即吞嚥困難、情緒壓力加重、易併食道炎。","detail":{"background":"食道弛緩不能(achalasia)病生理為食道體部蠕動消失加上LES無法正常鬆弛(因肌間神經叢神經節細胞退化),使食物滯留於食道下段。特徵:固體與液體皆吞嚥困難(早期即出現)、食物逆流、胸痛、體重減輕;症狀常因情緒壓力與冰冷食物加劇;長期食物滯留可致逆流性/滯留性食道炎,並增加食道癌風險。鋇劑攝影呈「鳥嘴狀」狹窄。治療:鈣離子阻斷劑/硝酸鹽、肉毒桿菌注射、氣球擴張或Heller肌切開術。","options":{"A":"錯誤。病變在LES/食道下段,非上1/3。","B":"錯誤。會引發滯留性/逆流性食道炎。","C":"錯誤。早期即出現吞嚥困難。","D":"正確(本題答案)。症狀隨情緒壓力加劇。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"110030-N3-17":{"quick":"GERD 居家:避免腹壓升高活動、戒菸酒咖啡、避高油高熱量、餐後勿立即平躺。","detail":{"background":"GERD居家照護:避免增加腹內壓的活動(彎腰、提重物、緊身衣、便秘);戒菸、酒、咖啡;避免高油脂高熱量(延遲胃排空、降低LES壓力);餐後2~3小時內勿平躺、床頭抬高;少量多餐、減重。 補充：GERD居家照護為避免增加腹內壓活動(彎腰、提重物、緊身衣、便秘)、戒菸酒咖啡、避免高油高熱量(延遲胃排空、降LES壓力)、餐後2~3小時勿平躺、床頭抬高、少量多餐、減重。","options":{"A":"正確。避免腹壓升高活動。","B":"正確。戒菸酒咖啡。","C":"正確。避高油高熱量。","D":"錯誤(本題答案)。進食後立即平躺會加重逆流。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"111030-N3-12":{"quick":"食道癌常見吞嚥困難、食慾不振、聲音沙啞;腹痛非典型(病灶在食道而非腹部)。","detail":{"background":"食道癌位於胸腔食道,典型症狀為進行性吞嚥困難、體重減輕、食慾不振、胸骨後不適、嗆咳、侵犯喉返神經致聲音沙啞。腹痛並非食道癌常見表徵(病灶不在腹腔)。 補充：食道癌位於胸腔食道,症狀為進行性吞嚥困難、體重減輕、食慾不振、胸骨後不適、嗆咳、侵犯喉返神經致聲沙;腹痛非其表徵(病灶不在腹腔);台灣以鱗狀細胞癌為主、好發中段。","options":{"A":"常見。進行性吞嚥困難。","B":"常見。食慾不振致體重下降。","C":"不是(本題答案)。腹痛非食道癌典型表徵。","D":"常見。侵犯喉返神經致聲音沙啞。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"111030-N3-13":{"quick":"裂孔疝氣:胃經食道裂孔上疝至縱膈;滑動型最常見且最易逆流。","detail":{"background":"膈裂孔疝氣依解剖分:①滑動型(sliding,約90%最常見,賁門上移、最易產生逆流症狀);②食道旁型(paraesophageal/rolling,胃底經裂孔上疝而賁門位置正常,逆流少但易嵌頓絞窄)。病因為橫膈食道裂孔變寬、腹內壓「升高」、年長韌帶鬆弛、肥胖、多產等。","options":{"A":"正確(本題答案)。定義即胃自食道裂孔往上進入縱膈腔。","B":"錯誤。食道旁型逆流症狀「少」(滑動型才常逆流)。","C":"錯誤。滑動型約占90%,非20%。","D":"錯誤。病因為腹內壓「升高」,非降低。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"111030-N3-17":{"quick":"心口灼熱為 LES 異常致逆流的燒灼感,平躺會加重(非緩解)。","detail":{"background":"心口灼熱(heartburn)是GERD最常見症狀,為胃酸逆流刺激食道黏膜產生胸骨後燒灼感,典型於餐後、平躺、彎腰時加重,常被描述為灼熱而非絞痛或打結。處置:餐後勿平躺、床頭抬高、避免誘發食物、PPI。 補充：心口灼熱(heartburn)是GERD最常見症狀,為胃酸逆流刺激食道黏膜的胸骨後燒灼感,餐後、平躺、彎腰時加重;痙攣痛或打結感較似食道痙攣/achalasia;處置為餐後勿躺、床頭抬高、PPI。","options":{"A":"正確。為下食道括約肌異常致逆流。","B":"錯誤(本題答案)。心口灼熱為「燒灼感」,而非痙攣痛或打結般(後者較似食道痙攣);此為本題敘述錯誤處。","C":"錯誤(本題答案另一錯處)。進食後平躺會「加重」而非緩解症狀。","D":"正確。為食道疾病常見症狀。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"111110-N3-13":{"quick":"GERD:心灼熱最常見、LES 壓力「太低」、不用β阻斷劑、餐後勿躺。","detail":{"background":"GERD要點:①心灼熱為最常見症狀;②病生理為LES壓力「過低」或不適當鬆弛;③藥物以PPI、H2阻斷劑、制酸劑、促腸蠕動劑為主,β-blocker並非治療藥(且可能降低LES壓力);④進食後應保持直立、勿躺下。 補充：GERD要點—心灼熱最常見、病生理為LES壓力過低或不適當鬆弛、不以β-blocker治療(以PPI/H2/制酸劑為主)、進食後應保持直立勿躺;長期逆流可致食道炎、狹窄與Barrett食道。","options":{"A":"正確(本題答案)。心灼熱為最常見症狀。","B":"錯誤。LES壓力「太低」才致逆流,非太高。","C":"錯誤。GERD不使用β-blocker治療。","D":"錯誤。進食後躺下會加重逆流。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"112030-N3-16":{"quick":"食道憩室:以鋇劑食道攝影定位(非CT);可內視鏡但需小心,症狀重可切除吻合。","detail":{"background":"食道憩室(esophageal diverticulum,如咽食道交界的Zenker憩室)為食道壁向外囊袋狀膨出,食物滯留致口臭、逆流、吞嚥困難、夜間嗆咳。診斷以「鋇劑食道攝影」最佳可定位憩室;內視鏡需謹慎以免穿孔(並非絕對禁止)。治療:症狀嚴重可手術切除憩室並吻合;餐後2小時勿劇烈運動以免食物逆流。","options":{"A":"錯誤(本題答案)。確定位置以鋇劑食道攝影為主,而非電腦斷層。","B":"正確。症狀嚴重可切除憩室後吻合黏膜。","C":"(此敘述爭議)內視鏡須小心避免穿孔。","D":"正確。餐後2小時勿劇烈運動避免食物逆流。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"112110-N3-16":{"quick":"食道癌病因:嗜過熱過鹹刺激食物、菸酒;鱗狀細胞癌最常見、好發中段、男性居多。","detail":{"background":"食道癌危險因子:長期菸、酒、檳榔,過熱、過鹹、醃漬、刺激性食物,亞硝胺,Barrett食道(GERD)、achalasia等。台灣以鱗狀細胞癌為主,好發食道中段,男性多於女性。 補充：食道癌危險因子為長期菸酒檳榔、過熱過鹹醃漬刺激食物、亞硝胺、Barrett食道、achalasia;台灣以鱗狀細胞癌為主、好發食道中段、男性居多;主症為進行性吞嚥困難。","options":{"A":"錯誤。好發於食道中段,非上1/3。","B":"錯誤。台灣以鱗狀細胞癌最常見,非腺癌。","C":"正確(本題答案)。嗜過熱過鹹刺激性食物為重要危險因子。","D":"錯誤。男性罹病率高於女性。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"114030-N3-10":{"quick":"食道憩室以鋇劑攝影定位;非典型灼熱、平躺反加重、不一定急須手術。","detail":{"background":"食道憩室診斷以鋇劑食道攝影定位最佳。臨床以食物滯留、口臭、逆流、吞嚥困難、夜咳為主,「胸口灼熱」非主症;餐後平躺會使滯留食物逆流而加重,故不應平躺;無症狀小憩室可觀察,並非一發生就須緊急手術。 補充：食道憩室為食道壁囊袋狀膨出,食物滯留致口臭、逆流、夜間嗆咳、吞嚥困難;診斷以鋇劑食道攝影定位最佳;餐後平躺會使滯留食物逆流加重,無症狀小憩室可觀察,不一律緊急手術。","options":{"A":"錯誤。胸口灼熱非食道憩室主要症狀(那較似GERD)。","B":"正確(本題答案)。鋇劑食道攝影可確定憩室位置。","C":"錯誤。餐後平躺會使食物逆流加重不適。","D":"錯誤。無症狀者可觀察,非一律須儘速手術。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"114030-N3-6":{"quick":"GERD:餐後勿平躺、睡前2~3小時勿進食、少量多餐、肥胖者減重。","detail":{"background":"GERD護理指導:進食後保持直立勿平躺、睡前2~3小時勿進食、少量多餐細嚼慢嚥、床頭抬高、避免高脂咖啡酒菸巧克力、肥胖者減重以降腹內壓。 補充：GERD護理為進食後保持直立勿平躺、睡前2~3小時勿進食、少量多餐細嚼慢嚥、床頭抬高、避免高脂咖啡酒菸巧克力、肥胖者減重以降腹內壓;餐後立即平躺會加重逆流。","options":{"A":"錯誤(本題答案)。進食後立即平躺會加重逆流。","B":"正確。睡前2~3小時勿進食。","C":"正確。少量多餐細嚼慢嚥。","D":"正確。肥胖者減重。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"114100-N3-7":{"quick":"食道癌:應採高蛋白高熱量「低渣」軟質/流質飲食維持營養,非低蛋白高渣。","detail":{"background":"食道癌營養支持因吞嚥困難,應採高蛋白、高熱量、易吞嚥(軟質、流質、低渣)飲食,必要時管灌或胃造口;光動力治療後皮膚對光敏感需避光約4~6週;食道下端癌可胃造口,中段癌可食道重建。鼓勵「低蛋白、高醣高渣」飲食錯誤(高渣不易吞嚥、低蛋白不利修復)。","options":{"A":"正確。食道下端癌可胃造口維持營養。","B":"正確。中段食道癌可行食道重建。","C":"正確。光動力治療後需避光約1個月。","D":"錯誤(本題答案)。應採高蛋白、高熱量、低渣易吞嚥飲食,非低蛋白高渣。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"114170-N3-7":{"quick":"GERD 最適當:床頭抬高睡覺(1)+避免提重物彎腰(4)=14;緊身衣與餐後躺平皆錯。","detail":{"background":"GERD護理:①床頭抬高睡覺利用重力減少逆流(正確);②穿緊身衣會增加腹內壓而加重逆流(錯誤);③進食後需保持直立、勿躺平(錯誤);④避免提重物或彎腰以免腹內壓升高(正確)。故正確組合為1+4。 補充：GERD護理—床頭抬高利用重力減逆流、避免提重物彎腰(減腹壓)為適當;穿緊身衣增腹壓、進食後躺平皆加重逆流;再配合少量多餐、減重、戒菸酒咖啡與PPI治療。","options":{"A":"13不適當。3進食後躺平會加重逆流。","B":"正確(本題答案)。1床頭抬高+4避免提重物彎腰皆正確。","C":"24不適當。2緊身衣增加腹內壓。","D":"34不適當。3躺平錯誤。"},"sources":["新文京《內外科護理學》消化系統","華杏《內外科護理學》食道疾病","Harrison 21e Disorders of the Esophagus"]}},"101030-N3-33":{"quick":"制酸/抗潰瘍藥分三類:減少胃酸(H2阻斷、PPI、抗膽鹼);細胞保護劑(cytoprotective)是保護黏膜非減酸。","detail":{"background":"消化性潰瘍藥物作用機轉分:①減少胃酸分泌—H2受體拮抗劑(ranitidine)、質子幫浦抑制劑PPI(omeprazole)、抗膽鹼藥物(降低迷走神經刺激);②中和胃酸—制酸劑;③細胞保護(cytoprotective)—sucralfate、misoprostol、bismuth,於潰瘍面形成保護層或增加黏液/前列腺素,並不減少胃酸分泌。題問「不會減少胃酸者」即cytoprotective drugs。","options":{"A":"會減少。H2受體拮抗劑抑制組織胺刺激壁細胞泌酸。","B":"會減少。抗膽鹼藥抑制副交感對壁細胞之刺激。","C":"會減少。PPI抑制壁細胞質子幫浦,最強抑酸。","D":"不會減少(本題答案)。細胞保護劑是保護黏膜,不抑制泌酸。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"101110-N3-70":{"quick":"Amphojel(氫氧化鋁)是「制酸劑/中和胃酸」,並非減少胃酸「分泌」。","detail":{"background":"本題問「減少胃酸分泌之藥物」何者錯誤。Pepcid(famotidine,H2阻斷)、Losec(omeprazole,PPI)、Zantac(ranitidine,H2阻斷)皆「抑制胃酸分泌」;而Amphojel(aluminum hydroxide,氫氧化鋁)是「制酸劑」,作用為「中和」已分泌的胃酸,並非減少分泌,故為錯誤選項。","options":{"A":"錯誤(本題答案)。Amphojel是制酸劑,中和胃酸而非減少分泌。","B":"正確。Pepcid為H2阻斷劑,減少泌酸。","C":"正確。Losec為PPI,抑制泌酸最強。","D":"正確。Zantac為H2阻斷劑,減少泌酸。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"102030-N3-11":{"quick":"十二指腸潰瘍:飯後2~3小時/空腹/半夜痛、進食緩解、胃酸「正常或增加」、惡變機率低。","detail":{"background":"十二指腸潰瘍特徵:疼痛多在飯後2~3小時、半夜、空腹時發生,進食或制酸劑可緩解(因食物中和胃酸);與H. pylori、胃酸分泌增加有關,故胃酸「正常或偏高」;惡性變機率低。胃潰瘍則餐後30分鐘~1小時痛、進食可能加重、胃酸正常或偏低、有惡性變可能。","options":{"A":"正確。十二指腸潰瘍飯後2~3小時痛。","B":"正確。進食可緩解疼痛。","C":"正確。十二指腸潰瘍惡變機率較小。","D":"錯誤(本題答案)。十二指腸潰瘍胃酸分泌「正常或增加」,非過低。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"102110-N3-61":{"quick":"H. pylori 三合一:PPI + 兩種抗生素(amoxicillin+clarithromycin/metronidazole);bismuth屬四合一。tagamet(H2)非標準三合一。","detail":{"background":"H. pylori根除常用「三合一療法」:一種PPI(如omeprazole)+兩種抗生素(amoxicillin、clarithromycin或metronidazole),療程7~14天;若加上bismuth(鉍劑)即為「四合一療法」。本題選項中tagamet(cimetidine)為H2阻斷劑,並非三合一療法的標準組成,故為錯誤。","options":{"A":"錯誤(本題答案)。tagamet(H2阻斷)非三合一療法標準藥;應為PPI。","B":"bismuth屬四合一療法成分。","C":"amoxicillin為標準三合一之抗生素。","D":"metronidazole為標準三合一之抗生素之一。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"102110-N3-77":{"quick":"PUD診斷:胃液分析測胃酸量/游離酸;胃鏡+切片/尿素呼氣/糞便抗原確認 Hp,非IgE。","detail":{"background":"消化性潰瘍診斷:①內視鏡(胃鏡)為首選,可直視潰瘍並切片,但「確認H. pylori」需另做切片快速尿素酶試驗(CLO)、病理或尿素呼氣試驗、糞便抗原,胃鏡本身不能「直接」確立Hp;②上腸胃道鋇劑攝影僅輔助,非最有效;③胃液分析(gastric analysis)測量胃液量與游離酸有助評估;④Hp血清檢測為IgG抗體(非IgE)。","options":{"A":"錯誤。胃鏡須加切片/尿素試驗才能確立Hp,不能「直接」確立。","B":"錯誤。上腸胃道攝影非最有效診斷,內視鏡才是。","C":"正確(本題答案)。胃液分析可測胃液量與游離酸量。","D":"錯誤。Hp血清檢測為IgG抗體,非IgE。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"103100-N3-10":{"quick":"胃潰瘍:餐後30分~1小時痛(進食加重)+常見噁心嘔吐;選2+3=23。","detail":{"background":"胃潰瘍(gastric ulcer)特徵:上腹/劍突下疼痛,典型在「進食後30分鐘~1小時」發生(因食物刺激泌酸與胃壁收縮),進食常加重疼痛、體重減輕、常伴噁心嘔吐;胃酸正常或偏低。題目1右上腹痛(較似膽道)、4半夜空腹痛(屬十二指腸潰瘍)皆非胃潰瘍。故選2(噁心嘔吐)+3(餐後30分~1小時痛)=23。","options":{"A":"12錯。1右上腹痛非胃潰瘍典型。","B":"正確(本題答案)。2噁心嘔吐+3餐後30分~1小時痛。","C":"24錯。4半夜空腹痛屬十二指腸潰瘍。","D":"34錯。4屬十二指腸潰瘍。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"104030-N3-11":{"quick":"急性胃炎常見原因:壓力、NSAID、鼻胃管抽吸、抽菸、酒精、Hp;1+2+3+4皆是→123(本題答案A)。","detail":{"background":"急性胃炎(acute gastritis)原因:身心壓力(壓力性潰瘍/Curling、Cushing)、NSAIDs/aspirin、酒精、抽菸、H. pylori、鼻胃管刺激、化療放療、攝入腐蝕性物質。本題1壓力、2NSAID、3鼻胃管抽吸、4抽菸皆為常見原因。答案A=123(依考選部公布答案)。","options":{"A":"正確(本題答案,依公布答案)。1壓力2NSAID3鼻胃管抽吸皆為常見原因。","B":"124亦含抽菸,但本題公布答案為123。","C":"134。","D":"234。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"104030-N3-12":{"quick":"PUD術後:急性胃膨脹常於術後早期、鹼性回流性胃炎因十二指腸液逆流、出血因縫線滑落、傾倒因高張食糜快速入空腸;「立刻可見」之敘述為錯。","detail":{"background":"消化性潰瘍手術(胃次全切除)後併發症:①急性胃膨脹—因麻醉與手術操作致胃張力下降,但「不一定術後立刻」出現,常於術後早期數日;②鹼性回流性胃炎—十二指腸內容物(膽汁)逆流刺激殘胃;③出血—縫線滑脫或吻合處;④傾倒症候群—高張食糜快速進入空腸。本題答案為敘述錯誤者,選A(急性胃膨脹「立刻可見」之描述不正確)。","options":{"A":"錯誤(本題答案)。急性胃膨脹非手術後「立刻」可見。","B":"正確。鹼性(酸性)回流性胃炎因十二指腸內容物逆流。","C":"正確。出血常因縫線滑落。","D":"正確。傾倒症候群因高張食糜快速入空腸。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"104100-N3-12":{"quick":"PUD穿孔多發生於「十二指腸前壁」,屬外科急症;立即禁食、抗生素、緊急手術。","detail":{"background":"消化性潰瘍穿孔為外科急症,十二指腸潰瘍穿孔(前壁)較胃潰瘍常見,造成急性腹膜炎(板狀腹、反彈痛、X光見游離氣體)。處置:立即禁食、鼻胃管減壓、靜脈輸液、廣效抗生素、緊急手術修補。故「發生位置常見於胃」之敘述錯誤(較常見於十二指腸)。 補充：消化性潰瘍穿孔多見於十二指腸前壁,造成急性化學性腹膜炎,立位腹部X光可見橫膈下游離氣體;典型板狀腹、反彈痛、劇痛;處置為禁食、鼻胃管減壓、輸液、抗生素與緊急手術修補。","options":{"A":"錯誤(本題答案)。穿孔較常見於「十二指腸」前壁,非胃。","B":"正確。穿孔後立即禁食。","C":"正確。需抗生素治療腹膜炎。","D":"正確。應緊急手術修補。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"104100-N3-13":{"quick":"PUD常見合併症:出血、穿孔、阻塞(幽門狹窄)、頑固性疼痛;敗血症非直接合併症。","detail":{"background":"消化性潰瘍三大合併症為:出血(最常見)、穿孔(最危急)、幽門阻塞(瘢痕狹窄致胃出口阻塞);另有頑固性、難癒合之潰瘍。敗血症並非潰瘍本身的直接合併症(除非穿孔致腹膜炎續發感染)。 補充：消化性潰瘍三大合併症為出血(最常見,嘔血/解黑便)、穿孔(最危急,腹膜炎)、幽門阻塞(瘢痕狹窄致胃出口阻塞、嘔吐脹氣);敗血症非潰瘍本身直接合併症,除非穿孔致續發感染。","options":{"A":"是。頑固性腹痛(難治性潰瘍)。","B":"是。出血為最常見合併症。","C":"是。幽門瘢痕狹窄致阻塞。","D":"錯誤(本題答案)。敗血症非PUD直接合併症。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"104100-N3-36":{"quick":"Sucralfate:餐前1小時及睡前空腹服、形成保護膜、副作用便秘、勿與其他藥同服。","detail":{"background":"Sucralfate(Ulsanic)為細胞保護劑,在酸性環境下與潰瘍面蛋白結合形成保護層。服用須知:①空腹服用(餐前1小時及睡前),不可與制酸劑或食物同服(影響附著);②不能中和胃酸;③與其他藥物(如digoxin、phenytoin、抗生素)間隔2小時以免影響吸收;④主要副作用為「便秘」(含鋁)。病人答「要注意是否有便秘」表示正確了解。","options":{"A":"錯誤。sucralfate不中和胃酸(那是制酸劑)。","B":"錯誤。應餐前空腹服,非餐後。","C":"錯誤。與毛地黃等藥物應間隔服用,不可同服。","D":"正確(本題答案)。便秘為主要副作用,須注意。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"105030-N3-10":{"quick":"PUD術後併發症常見:胃內出血、邊緣性潰瘍、傾倒症候群;便秘最不常見。","detail":{"background":"消化性潰瘍胃切除術後常見併發症:吻合處出血、邊緣性(stomal)復發潰瘍、傾倒症候群、貧血(B12/鐵/葉酸吸收不良)、脂肪痢、鹼性回流性胃炎。由於胃切除後食糜快速通過、腸蠕動增加,常見腹瀉而非便秘,故「便秘」最不常見。 補充：胃切除後食糜快速通過、腸蠕動增加,常見腹瀉、傾倒症候群、邊緣性潰瘍、吻合處出血、貧血(B12/鐵/葉酸不良);便秘因排空加速反而最少見。","options":{"A":"最不常見(本題答案)。術後多腹瀉/傾倒,便秘罕見。","B":"常見。吻合處胃內出血。","C":"常見。邊緣復發性潰瘍。","D":"常見。傾倒症候群。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"105030-N3-15":{"quick":"Cimetidine(Tagamet)經腎排泄、且抑制肝CYP450,使用時需監測腎功能。","detail":{"background":"消化性潰瘍藥物中,cimetidine(Tagamet,H2阻斷劑)主要經腎臟排泄,腎功能不全者須減量並監測腎功能;且cimetidine抑制肝臟CYP450,易與theophylline、warfarin、phenytoin等產生交互作用,並有男性女乳、意識混亂(老人)等副作用。Amoxicillin、metronidazole、omeprazole雖也部分經腎/肝代謝,但本題標準答案為cimetidine。","options":{"A":"amoxicillin經腎排但非本題重點。","B":"正確(本題答案)。Cimetidine需監測腎功能、注意藥物交互作用。","C":"metronidazole主要經肝代謝。","D":"omeprazole(PPI)主要經肝代謝。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"105090-N3-2":{"quick":"胃潰瘍好發中老年(非年輕人);穿孔禁食、十二指腸潰瘍進食緩解、Hp為主因。","detail":{"background":"消化性潰瘍:胃潰瘍好發於50~60歲中老年人(非年輕人),與NSAID、Hp、胃黏膜防禦下降有關;十二指腸潰瘍好發較年輕族群,進食可緩解疼痛;穿孔後立即禁食;Hp為主要致病因。 補充：胃潰瘍好發中老年(50~60歲)、餐後痛、胃酸正常或偏低、有惡性變可能;十二指腸潰瘍好發較年輕、空腹/夜間痛、進食緩解、胃酸偏高;主因皆為Hp與NSAID;穿孔後立即禁食手術。","options":{"A":"正確。穿孔後立即禁食。","B":"錯誤(本題答案)。胃潰瘍好發中老年,非年輕人。","C":"正確。十二指腸潰瘍進食可緩解疼痛。","D":"正確。Hp感染為主因。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"106030-N3-10":{"quick":"PUD用藥:H2接受器(非H1)拮抗劑、PPI、黏膜保護劑、前列腺素;H1錯。","detail":{"background":"消化性潰瘍藥物:①組織胺「H2」受體拮抗劑(ranitidine、famotidine)抑制壁細胞泌酸;②質子幫浦抑制劑PPI;③黏膜障壁保護劑(sucralfate、bismuth);④前列腺素類似物(misoprostol)增加黏液與重碳酸鹽。組織胺H1拮抗劑為抗過敏藥(如diphenhydramine),與胃酸無關,故敘述錯誤。","options":{"A":"錯誤(本題答案)。應為H2拮抗劑,H1拮抗劑是抗過敏藥。","B":"正確。質子幫浦抑制劑。","C":"正確。黏膜障壁防禦製劑。","D":"正確。前列腺素合成製劑。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"106030-N3-15":{"quick":"消化性潰瘍主要病變在「胃+十二指腸」=34。","detail":{"background":"消化性潰瘍(peptic ulcer)指胃酸與胃蛋白酶接觸之黏膜潰瘍,主要病變部位為「胃」(胃潰瘍,好發胃小彎)與「十二指腸」(十二指腸潰瘍,好發球部);亦可見於食道下端、胃空腸吻合處(邊緣性潰瘍),但主要為胃與十二指腸。故選3胃+4十二指腸=34。","options":{"A":"12錯(口腔/食道非主要)。","B":"13錯。","C":"23錯。","D":"正確(本題答案)。3胃+4十二指腸。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"106110-N3-13":{"quick":"胃酸由胃底腺的「壁細胞(parietal cell)」分泌;主細胞分泌胃蛋白酶原。","detail":{"background":"胃黏膜腺體細胞分工:①壁細胞(parietal/oxyntic cell)分泌鹽酸(HCl)與內在因子(intrinsic factor);②主細胞(chief cell)分泌胃蛋白酶原(pepsinogen);③黏液頸細胞分泌黏液與重碳酸鹽;④G細胞分泌胃泌素。胃小彎、胃大彎為解剖位置,非分泌細胞。故胃酸由「壁細胞」分泌。","options":{"A":"錯誤。胃小彎是解剖位置非分泌細胞。","B":"正確(本題答案)。壁細胞分泌胃酸與內在因子。","C":"錯誤。胃大彎是解剖位置。","D":"錯誤。主細胞分泌胃蛋白酶原,非胃酸。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"107030-N3-30":{"quick":"胃潰瘍:餐後痛、胃酸量正常、嘔血較解黑便常見、上腹痛(非右上腹)。","detail":{"background":"胃潰瘍臨床:疼痛位於上腹/劍突下,「餐後30分鐘~1小時」發生,胃酸分泌「正常或偏低\";因病灶較高,出血時「嘔血(hematemesis)較解黑便常見\";右上腹痛較似膽道疾病。故四選項中「胃酸分泌量正常」正確。 補充：胃潰瘍餐後30分~1小時痛(進食加重)、上腹痛、常見噁心嘔吐與體重減輕、胃酸正常或偏低、出血時嘔血較常見;十二指腸潰瘍則空腹/夜間痛、進食緩解、解黑便較常見。","options":{"A":"錯誤。胃潰瘍多為上腹/劍突下痛,非右上腹。","B":"錯誤。半夜空腹痛屬十二指腸潰瘍。","C":"正確(本題答案)。胃潰瘍胃酸分泌量正常(或偏低)。","D":"錯誤。胃潰瘍嘔血較解黑便常見。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"107110-N3-10":{"quick":"Hp 相關胃部疾病:B型(胃竇)慢性胃炎、消化性潰瘍、急性胃炎、胃癌、MALT淋巴瘤=234。","detail":{"background":"H. pylori感染相關疾病:B型慢性胃炎(胃竇為主)、消化性潰瘍(胃及十二指腸)、急性胃炎、胃腺癌、胃黏膜相關淋巴組織(MALT)淋巴瘤。A型(自體免疫)慢性胃炎發生於胃體,與內在因子抗體/惡性貧血有關,與Hp無關;胃食道逆流(GERD)與Hp也無明確關聯。故選2B型慢性胃炎+3消化性潰瘍+4急性胃炎=234。","options":{"A":"123錯(含1A型慢性胃炎,與Hp無關)。","B":"正確(本題答案)。2B型慢性胃炎3消化性潰瘍4急性胃炎。","C":"245錯(5胃食道逆流與Hp無關)。","D":"345錯。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"107110-N3-12":{"quick":"胃潰瘍因胃黏膜防禦下降(胃酸常正常/偏低),非胃酸分泌增加。","detail":{"background":"胃潰瘍vs十二指腸潰瘍:①兩者疼痛皆有燒灼感;②十二指腸潰瘍多半夜、空腹痛,進食緩解;③出血時十二指腸潰瘍常解黑便;④十二指腸潰瘍與胃酸分泌「增加」有關,而胃潰瘍主因是「胃黏膜防禦機制下降」,胃酸常正常或偏低。故「胃潰瘍因胃酸分泌增加」之敘述錯誤。","options":{"A":"正確。兩者疼痛皆有燒灼感。","B":"正確。十二指腸潰瘍多半夜空腹痛。","C":"正確。十二指腸潰瘍常見解黑便。","D":"錯誤(本題答案)。胃潰瘍主因是黏膜防禦下降,胃酸正常或偏低,非分泌增加。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"108110-N3-13":{"quick":"左上腹痛、進食後(約1小時)更痛 → 胃潰瘍。","detail":{"background":"依疼痛時序鑑別:胃潰瘍痛在「餐後30分~1小時、進食加重」(因食物刺激泌酸與胃收縮);十二指腸潰瘍痛在「空腹、半夜、進食緩解」。本題「吃了東西後1小時更痛」符合胃潰瘍。胃潰瘍上腹/左上腹痛,GERD為心灼熱,慢性胃炎多模糊不適。 補充：依疼痛時序鑑別,胃潰瘍「餐後30分~1小時、進食加重」之上腹/左上腹痛;十二指腸潰瘍「空腹、夜間痛、進食緩解」;GERD為心灼熱;慢性胃炎症狀較模糊;確診靠胃鏡與切片。","options":{"A":"GERD為心灼熱,不符進食加重之上腹潰瘍痛。","B":"慢性胃炎症狀較模糊。","C":"正確(本題答案)。進食後加重之上腹痛=胃潰瘍。","D":"十二指腸潰瘍是空腹痛、進食緩解。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"108110-N3-9":{"quick":"上消化道出血:嘔血/解黑便、嚴重時心搏過速、血壓下降(休克),皮膚冰冷蒼白。","detail":{"background":"上消化道出血(Treitz韌帶以上,如食道/胃/十二指腸)表現:嘔血(鮮紅或咖啡渣樣)、解黑便(tarry stool);出血量大時血容量不足致心搏過速、血壓下降、姿勢性低血壓、皮膚濕冷蒼白、休克。下消化道出血才常解鮮血便。 補充：上消化道出血(Treitz韌帶以上)表現嘔血(鮮紅或咖啡渣樣)、解黑便;出血量大致心搏過速、血壓下降、姿勢性低血壓、皮膚濕冷蒼白、休克;下消化道出血才常解鮮血便。","options":{"A":"錯誤。鮮血便多為「下」消化道出血。","B":"錯誤。上消化道出血源在食道/胃/十二指腸,非結腸。","C":"正確(本題答案)。嚴重時心搏過速、血壓不穩(低血容性休克)。","D":"錯誤。失血時皮膚應是冰冷蒼白,非發熱潮紅。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"109110-N3-16":{"quick":"空腹/半夜痛、進食緩解 → 十二指腸潰瘍。","detail":{"background":"「餓的時候痛、半夜痛醒」是十二指腸潰瘍的典型疼痛時序(空腹、夜間,進食或制酸劑可緩解),因夜間基礎胃酸分泌高且無食物中和。胃潰瘍則餐後痛、進食加重。 補充：「餓的時候痛、半夜痛醒」是十二指腸潰瘍典型疼痛時序,因夜間基礎胃酸高且無食物中和,進食或制酸劑可緩解;胃潰瘍則餐後痛、進食加重;確診靠胃鏡與Hp檢測。","options":{"A":"GERD為心灼熱,非空腹痛。","B":"慢性胃炎症狀模糊。","C":"胃潰瘍是餐後痛、進食加重。","D":"正確(本題答案)。空腹/半夜痛、進食緩解=十二指腸潰瘍。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"109110-N3-17":{"quick":"刺激胃液分泌:胃泌素(gastrin)、迷走(副交感)、組織胺;交感與脂肪/三酸甘油酯抑制。","detail":{"background":"刺激胃液/胃酸分泌的因素:迷走神經(副交感、乙醯膽鹼)、胃泌素(gastrin)、組織胺(histamine)、蛋白質食物、咖啡因、酒精。抑制者:交感神經興奮、脂肪(三酸甘油酯刺激CCK/腸抑胃素)、secretin、前列腺素、生長抑素。故選胃泌素。","options":{"A":"錯誤。交感神經興奮「抑制」胃分泌。","B":"正確(本題答案)。胃泌素刺激胃酸分泌。","C":"錯誤。三酸甘油酯/脂肪抑制胃排空與泌酸。","D":"錯誤。核甘酸非泌酸刺激因子。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"110110-N3-14":{"quick":"胃潰瘍:常見噁心嘔吐(2)+胃酸分泌正常(4)=24。","detail":{"background":"胃潰瘍特徵:餐後30分~1小時痛(進食加重)、上腹痛、常見噁心嘔吐、體重減輕、胃酸分泌正常或偏低。題項1右上腹痛(似膽道)、3進食後2~3小時/半夜/空腹痛(屬十二指腸潰瘍)皆不符。故選2常見噁心嘔吐+4胃酸正常=24。 補充：胃潰瘍餐後痛(進食加重)、上腹痛、常見噁心嘔吐、體重減輕、胃酸正常;十二指腸潰瘍空腹/半夜痛、進食緩解、胃酸偏高;右上腹痛較似膽道疾病,並非胃潰瘍典型。","options":{"A":"13錯。","B":"14錯。","C":"23錯(3屬十二指腸潰瘍)。","D":"正確(本題答案)。2噁心嘔吐+4胃酸正常。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"111110-N3-14":{"quick":"PUD:潰瘍深度達黏膜肌層以下(非破壞肌肉層)、好發中老年、Hp為主因、十二指腸潰瘍空腹痛。","detail":{"background":"消化性潰瘍指胃/十二指腸黏膜因胃酸-胃蛋白酶與防禦失衡而形成超過黏膜肌層的缺損;主因為H. pylori感染與NSAID;胃潰瘍好發中老年(非年輕人);十二指腸潰瘍空腹/夜間痛、進食「緩解」(非加劇)。 補充：消化性潰瘍是胃/十二指腸黏膜因胃酸-胃蛋白酶與防禦失衡形成超過黏膜肌層的缺損;主因為Hp與NSAID;胃潰瘍好發中老年餐後痛、十二指腸潰瘍空腹痛進食緩解;Hp根除可大幅降低復發。","options":{"A":"錯誤。潰瘍是黏膜缺損,非「破壞肌肉層」之描述。","B":"錯誤。胃潰瘍好發中老年。","C":"錯誤。十二指腸潰瘍進食後「緩解」,非30分鐘內加劇。","D":"正確(本題答案)。Hp感染為主因。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"112030-N3-14":{"quick":"A型慢性胃炎為自體免疫(胃體、惡性貧血、與Hp無關);B型才與Hp相關。","detail":{"background":"慢性胃炎分型:A型(自體免疫性)位於胃「體」與胃底,因抗壁細胞/內在因子抗體破壞壁細胞,致內在因子缺乏→維生素B12吸收不良→惡性貧血,與Hp無關,胃泌素常升高;B型(最常見)位於胃「竇」,與H. pylori感染相關,胃泌素值正常。故「A型主要與Hp有關」錯誤。","options":{"A":"錯誤(本題答案)。A型為自體免疫,與Hp無關;B型才與Hp相關。","B":"正確。B型發生在胃竇處。","C":"正確。B型胃泌素值正常。","D":"正確。A型致內在因子缺乏→B12缺乏→惡性貧血。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"112110-N3-11":{"quick":"PUD藥物:制酸劑、前列腺素類似物、PPI、H2(第二型,非第一型)拮抗劑。","detail":{"background":"消化性潰瘍治療藥物:制酸劑(中和胃酸)、前列腺素類似物(misoprostol,增加黏液保護)、質子幫浦抑制劑(PPI)、組織胺「第二型(H2)」受體拮抗劑。第一型組織胺(H1)拮抗劑為抗過敏藥,與胃酸無關,故敘述錯誤。 補充：消化性潰瘍治療藥物為制酸劑(中和)、前列腺素類似物(misoprostol,增黏液保護)、PPI、H2(第二型)受體拮抗劑、黏膜保護劑(sucralfate)及Hp根除;第一型(H1)拮抗劑是抗過敏藥,與胃酸無關。","options":{"A":"正確。制酸劑。","B":"正確。前列腺素合成劑(misoprostol)。","C":"正確。質子幫浦抑制劑。","D":"錯誤(本題答案)。應為H2(第二型)拮抗劑,非第一型。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"112110-N3-15":{"quick":"急性胃炎需「禁食」讓胃休息,而非正常飲食;制酸、避免水楊酸/類固醇/菸酒。","detail":{"background":"急性胃炎護理:急性期應「禁食」或清淡流質讓胃黏膜休息,待症狀緩解漸進飲食;依醫囑給予制酸劑(氫氧化鋁/鎂)中和胃酸;避免水楊酸(aspirin)、NSAID、類固醇、菸、酒、咖啡等刺激物;維持規律作息與減壓。故「不需禁食、可正常飲食」錯誤。","options":{"A":"正確。給予制酸劑。","B":"錯誤(本題答案)。急性期應禁食/清淡,非正常飲食。","C":"正確。避免水楊酸與類固醇。","D":"正確。規律作息、避免菸酒。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"112180-N3-9":{"quick":"PUD藥物目的:中和胃酸、減少泌酸、保護黏膜;非「促進胃排空」。","detail":{"background":"消化性潰瘍藥物治療目的在於降低胃酸對黏膜的侵蝕並促進癒合:①中和胃酸(制酸劑);②減少胃酸分泌(H2阻斷、PPI、抗膽鹼);③保護黏膜障壁(sucralfate、misoprostol、bismuth);④根除Hp。促進胃排空(prokinetic)是用於胃輕癱/GERD,並非PUD的藥物治療目的。","options":{"A":"正確目的。中和胃酸。","B":"錯誤(本題答案)。促進胃排空非PUD藥物治療目的。","C":"正確目的。減少胃酸分泌。","D":"正確目的。保護黏膜屏障。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"114100-N3-8":{"quick":"上消化道出血:出血停止後血管加壓素「不可立刻停」,需逐漸減量以防反彈;監測嘔吐物與血便、肢端循環、腹脹。","detail":{"background":"上消化道出血照護:①監測嘔吐物(咖啡渣/鮮紅)與糞便顏色(黑便)以評估出血;②監測休克徵象(肢端冰冷、指甲床蒼白、心搏過速、血壓下降);③評估腹部脹硬(可能再出血或穿孔);④血管加壓素(vasopressin)止血後須「逐漸減量」而非立即停藥,以免血管反彈再出血。","options":{"A":"正確。監測嘔吐物與大便顏色。","B":"正確。監測休克徵象。","C":"錯誤(本題答案)。出血停止後vasopressin應逐漸減量,不可立刻停。","D":"正確。評估腹部脹硬。"},"sources":["新文京《內外科護理學》消化性潰瘍與胃炎","華杏《內外科護理學》胃十二指腸疾病","Harrison 21e Peptic Ulcer Disease","ACG Guideline H. pylori 2017"]}},"101030-N3-36":{"quick":"預防傾倒:用餐時勿同時進食液體(乾濕分離),減緩高張食糜快速入空腸。","detail":{"background":"傾倒症候群因胃切除後幽門失去調節，高滲食糜快速進入小腸引發體液移入腸腔。減緩措施：少量多餐、乾濕分離(用餐時不喝湯水)、低糖(避免精製糖)、高蛋白適量脂肪、餐後採半臥或平躺休息。","options":{"A":"錯誤。高醣澱粉會加重傾倒,應低醣。","B":"錯誤。快速進食加重傾倒,應細嚼慢嚥少量多餐。","C":"錯誤。進食後宜平躺20~30分鐘以延緩胃排空。","D":"正確(本題答案)。用餐時勿進食液體(乾濕分離)可減緩排空、預防傾倒。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"101110-N3-66":{"quick":"增加高醣食物「無法」預防傾倒,反而誘發(高張醣快速吸收致低血糖)。","detail":{"background":"預防傾倒症候群以「延緩胃排空、降低腸腔滲透壓」為原則——少量多餐、低碳水化合物(避免高糖)、餐時不喝大量液體、餐後平躺；反之高糖、用餐時大量飲水、餐後立即活動會「促發」而非預防。","options":{"A":"可預防。進餐時不喝湯(乾濕分離)。","B":"無法預防(本題答案)。高醣食物會誘發傾倒,應低醣。","C":"可預防。飯後躺下延緩排空。","D":"可預防。少量多餐。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"102030-N3-14":{"quick":"預防傾倒:低醣(低糖)飲食;勿飯前/進食時多喝水、飯後勿立即散步。","detail":{"background":"傾倒症候群護理衛教：採高蛋白、適量脂肪、低糖(限精製醣類)飲食，少量多餐，固體與液體分開(用餐時及餐前後不喝大量水)，餐後左側臥或平躺20~30分鐘以延緩胃排空。","options":{"A":"錯誤。飯前多喝水加速排空。","B":"錯誤。進食時多喝湯(乾濕未分離)加重傾倒。","C":"錯誤。飯後立即活動加速排空。","D":"正確(本題答案)。低糖(低醣)飲食可預防傾倒。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"102030-N3-16":{"quick":"胃切除後內在因子缺乏→維生素B12吸收不良→惡性貧血。","detail":{"background":"胃壁細胞分泌「內在因子(intrinsic factor)」,與維生素B12結合後於迴腸末端吸收。胃次全/全切除後內在因子缺乏,使B12吸收不良,數年後耗盡儲存量而出現「惡性貧血(巨母紅血球性貧血)」與神經病變,故術後常需定期肌肉注射B12。鐵、葉酸也可能吸收不良。","options":{"A":"維生素A為脂溶性,與胃切除關係小。","B":"維生素C與胃切除無直接關係。","C":"葉酸亦可能受影響但非本題重點。","D":"正確(本題答案)。內在因子缺乏→B12吸收不良→惡性貧血。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"103030-N3-11":{"quick":"胃癌:好發胃小彎、腺癌最常見、男多於女;胃酸分泌「減少」(非增加)。","detail":{"background":"胃癌(gastric cancer):組織型以腺癌最常見,好發於胃小彎與胃竇;男性多於女性;危險因子有H. pylori、慢性萎縮性胃炎、醃漬燻製高鹽飲食、亞硝胺、惡性貧血、胃息肉。萎縮性胃炎使壁細胞減少,胃酸分泌「降低(低胃酸/無胃酸)」,並非增加。","options":{"A":"正確。好發於胃小彎。","B":"正確。腺癌最常見。","C":"正確。男性發生率高於女性。","D":"錯誤(本題答案)。胃癌多伴萎縮性胃炎致胃酸「減少」,非增加。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"103030-N3-19":{"quick":"Billroth-II 術後傾倒症狀:少量多餐最適當。","detail":{"background":"次全胃切除(Billroth-II)後餐後15~30分鐘出現腹脹、心悸、頭暈、冒汗、腹瀉為典型「早期傾倒症候群」，因高滲食糜快速進入空腸。護理：少量多餐、乾濕分離、低糖高蛋白、餐後平躺休息。","options":{"A":"錯誤。高碳水化合物加重傾倒。","B":"錯誤。用餐時多喝湯加重傾倒。","C":"正確(本題答案)。少量多餐減緩食糜快速入空腸。","D":"錯誤。餐後散步加速排空,應平躺。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"104100-N3-11":{"quick":"傾倒最常見於 Billroth II(胃空腸吻合),非胃十二指腸(Billroth I)吻合。","detail":{"background":"傾倒症候群分早期(餐後15~30分：高滲食糜致血容量移入腸腔，出現心悸、冒汗、頭暈、腹瀉)與晚期(餐後1~3小時：過量糖引發胰島素過度分泌致反應性低血糖)；飲食採低糖、乾濕分離、少量多餐。","options":{"A":"正確。早期型於餐後10~30分鐘出現。","B":"正確。進食後不宜立即下床,宜平躺。","C":"正確。晚期型於餐後2~3(4)小時(反應性低血糖)。","D":"錯誤(本題答案)。最常見於胃「空腸」吻合(Billroth II),非胃十二指腸吻合。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"105090-N3-8":{"quick":"胃癌好發於胃竇/胃小彎遠端,非近端1/3;腺癌最常見、40歲後、與Hp相關。","detail":{"background":"胃癌好發部位為胃竇、幽門前區及胃小彎(遠端);以腺癌最常見;多發生於40歲以後,男性居多;與H. pylori感染、萎縮性胃炎、高鹽醃漬飲食、亞硝胺相關。故「好發於胃近端1/3」錯誤。 補充：胃癌以腺癌最常見,好發胃竇與胃小彎遠端、40歲以上男性;危險因子為Hp、萎縮性胃炎、高鹽醃漬燻製食物、亞硝胺;萎縮性胃炎使壁細胞減少而胃酸「降低」,非近端1/3好發。","options":{"A":"正確。胃腺癌最常見。","B":"正確。多發生於40歲之後。","C":"錯誤(本題答案)。好發於胃竇/遠端,非近端1/3。","D":"正確。與Hp感染有關。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"106030-N3-11":{"quick":"預防傾倒:少量多餐+高脂高蛋白低醣+進食採半坐臥餐後躺下=124(3多液體錯)。","detail":{"background":"預防傾倒症候群正確措施：少量多餐、採高蛋白適量脂肪「低醣」飲食、用餐時不多進食液體(乾濕分離)、餐後採半坐臥或平躺休息；高醣飲食與用餐大量飲液皆會促發症狀。","options":{"A":"123錯。3用餐時多進食液體會加重傾倒。","B":"正確(本題答案)。1少量多餐+2高脂高蛋白低醣+4半坐臥進食後躺下。","C":"134錯。","D":"234錯。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"106111-N3-9":{"quick":"預防傾倒飲食:低糖、高脂肪、高蛋白(延緩排空)。","detail":{"background":"傾倒症候群飲食：限制單醣與精製糖、增加蛋白質與纖維以延緩胃排空，固體液體分開進食、少量多餐；避免一次大量、過甜或過熱的流質，以免高滲液快速進入小腸誘發症狀。","options":{"A":"錯誤。高糖會誘發傾倒。","B":"(低糖低脂高蛋白)亦低糖,但脂肪可延緩排空,標準答案選D。","C":"錯誤。高糖會誘發傾倒。","D":"正確(本題答案)。低糖、高脂肪、高蛋白延緩胃排空,預防傾倒。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"107030-N3-10":{"quick":"傾倒常見於 Billroth II 術後;為「高張」食糜快速入空腸所致,治療低醣。","detail":{"background":"傾倒症候群為胃切除(尤Billroth II)後失去幽門調控、食糜快速傾入小腸所致；早期以心血管與腸胃症狀為主(心悸、冒汗、腹脹、腹瀉)，晚期為反應性低血糖；治療以飲食調整為主，多隨時間改善。","options":{"A":"錯誤。傾倒為心搏「過速」、血壓下降,非高血壓心搏緩慢。","B":"正確(本題答案)。常見於Billroth II手術病人。","C":"錯誤。是「高張性」食糜快速流入空腸,非低張性。","D":"錯誤。治療應「低醣」,非增加碳水化合物。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"108020-N3-9":{"quick":"預防傾倒:採少量多餐。","detail":{"background":"預防傾倒症候群：少量多餐、低糖高蛋白、乾濕分離(用餐時不喝湯水)、餐後平躺或左側臥延緩排空；避免高滲糖類與餐時大量飲液；症狀多於術後數月隨腸道適應而緩解。","options":{"A":"錯誤。多進食液體加重傾倒(應乾濕分離)。","B":"錯誤。餐後立即散步加速排空。","C":"正確(本題答案)。少量多餐。","D":"(高脂低蛋白低糖)應為高蛋白,本題標準答案選C。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"109110-N3-41":{"quick":"胃癌與 Helicobacter pylori 感染有關(WHO第一類致癌物)。","detail":{"background":"H. pylori(幽門螺旋桿菌)為WHO列為第一類(明確)致癌物,是胃腺癌與胃MALT淋巴瘤的主要危險因子;其引起慢性胃炎→萎縮性胃炎→腸上皮化生→異生→胃癌之多階段致癌過程。EB病毒亦與少數胃癌相關,但本題最相關為Hp。HPV與子宮頸癌、CMV、E. coli與胃癌無直接關聯。","options":{"A":"CMV與胃癌無直接關聯。","B":"E. coli與胃癌無直接關聯。","C":"正確(本題答案)。Hp為胃癌主要致病菌。","D":"HPV與子宮頸癌相關,非胃癌。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"110110-N3-16":{"quick":"全胃切除後進食稀飯30分出現心悸頭暈→食物(高張食糜)快速進入腸道致傾倒。","detail":{"background":"全胃切除後喪失幽門調節，進食後高滲食糜快速進入小腸，使體液由血管移入腸腔、腸道擴張並刺激自律神經，於餐後約15~30分鐘出現腹脹、心悸、頭暈、冒汗——即「早期傾倒症候群」。","options":{"A":"錯誤。胰島素分泌「太少」非早期傾倒機轉(晚期才insulin過多致低血糖)。","B":"錯誤。非單純攝水過多。","C":"錯誤。缺胃酸非此症狀主因。","D":"正確(本題答案)。食物快速進入腸道(高張食糜)→體液移位→早期傾倒。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"111030-N3-11":{"quick":"預防傾倒:少量多餐、進食採半坐臥姿勢。","detail":{"background":"傾倒症候群護理指導以延緩胃排空為核心：少量多餐、低碳水高蛋白、乾濕分離、餐後平躺；避免高糖飲食與餐時大量飲水；晚期反應性低血糖者可於兩餐間補充蛋白質點心。","options":{"A":"正確(本題答案)。少量多餐+進食採半坐臥姿勢延緩排空。","B":"錯誤。富含水分食物(乾濕未分離)加重傾倒。","C":"錯誤。應減少碳水化合物,非增加。","D":"錯誤。應低糖,非高糖。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"112110-N3-10":{"quick":"Billroth II 術後傾倒早期機轉:細胞外液迅速移入腸道→循環血量減少。","detail":{"background":"次全胃切除(Billroth II)後幽門功能喪失，進食後高滲食糜快速傾入空腸，引發血容量移入腸腔、腸道擴張，於餐後約20分鐘出現腹脹、心悸、頭暈、冒汗，為「早期傾倒症候群」。","options":{"A":"部分相關但非最核心機轉。","B":"此為「晚期」傾倒(2~3小時後反應性低血糖)機轉,非餐後20分鐘者。","C":"正確(本題答案)。細胞外液迅速移入腸道、循環血量減少(早期傾倒)。","D":"錯誤。傾倒與amylase大量分泌無關。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"113030-N3-10":{"quick":"預防傾倒「不適宜」高醣食物(會誘發);宜適量脂肪、高蛋白、乾性食物。","detail":{"background":"預防傾倒症候群飲食：少量多餐、低糖、高蛋白適量脂肪、乾濕分離、餐後平躺；「不適宜」者通常為高糖飲食、用餐時大量喝湯水、餐後立即活動等會促發症狀的做法。","options":{"A":"不適宜(本題答案)。高醣會誘發傾倒,應低醣。","B":"適宜。適量脂肪延緩排空。","C":"適宜。高蛋白延緩排空。","D":"適宜。乾性食物(乾濕分離)減緩排空。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"113100-N3-7":{"quick":"胃癌:腺癌最常見、好發中老年男性、與醃漬高鹽食物攝取過多有關。","detail":{"background":"胃癌以「腺癌」最常見(非胃淋巴癌);好發於40歲以上中老年、男性居多;與醃漬、燻製、高鹽、亞硝胺食物、Hp感染、萎縮性胃炎相關;好發部位為胃竇/胃小彎遠端(非與食道接近的賁門部)。 補充：胃癌以腺癌最常見、好發40歲以上中老年男性、好發胃竇/胃小彎遠端;與醃漬高鹽燻製食物、亞硝胺、Hp感染、萎縮性胃炎相關;早期症狀不明顯,易延誤診斷。","options":{"A":"錯誤。腺癌最常見,非胃淋巴癌。","B":"錯誤。好發40歲以上男性,非40歲以下女性。","C":"錯誤。好發胃竇/遠端,非與食道接近之賁門。","D":"正確(本題答案)。與醃漬高鹽食物攝取過多有關。"},"sources":["新文京《內外科護理學》胃癌與胃切除術後護理","華杏《內外科護理學》傾倒症候群","Harrison 21e Gastric Cancer / Postgastrectomy"]}},"101030-N3-35":{"quick":"大腸直腸癌的腫瘤指標/預後追蹤指標為 CEA。","detail":{"background":"大腸直腸癌術後預後與分期(TNM/Dukes)、淋巴結轉移數、切緣是否乾淨、組織分化度有關；CEA為最常用追蹤指標，術前升高、術後應下降，若再度上升提示復發或轉移，可早期偵測。","options":{"A":"AFP為肝癌/生殖細胞瘤指標。","B":"PSA為攝護腺癌指標。","C":"CA-125為卵巢癌指標。","D":"正確(本題答案)。CEA為大腸直腸癌指標。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"101030-N3-37":{"quick":"大腸手術前一天採清流質飲食,以減少腸內糞渣。","detail":{"background":"大腸直腸癌手術前腸道準備:術前2~3天低渣飲食,「術前1天清流質(clear liquid)」飲食,並配合瀉劑與清潔灌腸、口服抗生素以清空腸道、降低術後感染。手術前夜及當天禁食。清流質可提供水分電解質又不留糞渣。 補充：完整腸道準備可降低術後吻合口感染與腹腔污染;清流質定義為室溫下透明、無渣、無乳的液體(清湯、過濾果汁、運動飲料、果凍),提供水分與電解質但不留糞渣,手術當天則禁食。","options":{"A":"禁食是手術當天/前夜,非前一天全日。","B":"正確(本題答案)。術前一天採清流質飲食。","C":"軟質飲食仍含纖維殘渣。","D":"正常飲食殘渣多,不利腸道準備。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"101110-N3-63":{"quick":"迴腸造口為液狀排泄、「不可灌洗」;只有乙狀/降結腸造口可灌洗。","detail":{"background":"迴腸造口排出液狀、含消化酶之糞水，量多且刺激皮膚，須注意脫水與電解質流失及造口周圍皮膚保護(凸面底座、皮膚保護膜)，飲食初期低渣、充分補水≥1500~2000mL；造口正常呈鮮紅濕潤。","options":{"A":"錯誤(本題答案)。迴腸造口排泄為液狀、無規律,「不可」灌洗;灌洗僅適用降結腸/乙狀結腸造口。","B":"正確。觀察造口周圍皮膚。","C":"正確。早餐前或餐後2~4小時(排泄較少時)更換裝置。","D":"正確。初期避免高纖以免阻塞造口。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"103030-N3-12":{"quick":"直腸癌最常見症狀為排便習慣改變與「裏急後重」、血便。","detail":{"background":"直腸癌位置低,常見症狀為排便習慣改變、裏急後重(tenesmus,有便意但解不乾淨)、血便/黏液便、糞便變細、肛門墜脹。柏油便(黑便)多為上消化道出血;噁心嘔吐非直腸癌典型。 補充：直腸癌位置低,糞便已成形,腫瘤使管腔狹窄而出現裏急後重、糞便變細、血便;確診靠肛門指診、乙狀結腸鏡/大腸鏡切片;治療依分期採前位/腹會陰切除+輔助化放療。","options":{"A":"正確(本題答案)。裏急後重為直腸癌典型。","B":"柏油便屬上消化道出血。","C":"腹部鈍痛非直腸癌最常見。","D":"噁心嘔吐非典型。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"103100-N3-14":{"quick":"橫結腸造口大便為半成形(半流質與成形之間)。","detail":{"background":"腸造口糞便性狀依部位而異：迴腸造口最稀(液狀含酶、刺激皮膚)、升結腸半糊狀、橫結腸半成形、乙狀/降結腸最成形且接近正常糞便；越近端越稀、水分與電解質流失越多。","options":{"A":"錯誤。迴腸造口為液狀,非成形。","B":"錯誤。乙狀結腸造口為成形便,非半流質。","C":"正確(本題答案)。橫結腸造口為半成形。","D":"錯誤。升結腸造口為半流質,非「流質」(較近迴腸才液狀)。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"103100-N3-9":{"quick":"大腸癌最好發於「直腸」與乙狀結腸。","detail":{"background":"大腸癌(結直腸癌)好發部位:直腸與乙狀結腸最多(約占一半以上),其次為升結腸/盲腸。左側(降結腸、乙狀結腸、直腸)癌易腸阻塞、血便、糞便變細、裏急後重;右側(升結腸)癌腸腔大、症狀晚,常以貧血、體重減輕、腹部腫塊表現。 補充：大腸癌好發直腸與乙狀結腸(左側),因管腔較窄、糞便成形,易出現阻塞、血便、糞便變細、裏急後重;右側(升結腸)管腔大、糞便稀,症狀晚,多以缺鐵性貧血、腹塊、體重減輕表現。","options":{"A":"升結腸非最好發。","B":"橫結腸較少。","C":"降結腸次之。","D":"正確(本題答案)。直腸最好發。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"104030-N3-14":{"quick":"迴腸造口初期應避免高纖(以免阻塞);每日補水≥1500mL、造口袋大1/8吋。","detail":{"background":"迴腸造口護理：造口呈鮮紅濕潤為正常(暗紫提示缺血、蒼白提示貧血)；糞水稀且含消化酶易刺激皮膚，需貼合良好的造口袋與皮膚保護、注意水分電解質補充；袋約1/3~1/2滿即排空。","options":{"A":"正確。造口袋開口比造口大1/8吋保護皮膚。","B":"錯誤(本題答案)。迴腸造口初期應「避免」高纖維(易阻塞造口),非鼓勵多食。","C":"正確。睡前避免大吃大喝。","D":"正確。每天至少1500mL以上液體補充(迴腸造口失水多)。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"104100-N3-10":{"quick":"結腸造口照護用「清潔技術」即可;每次更換須觀察造口周圍皮膚。","detail":{"background":"結腸造口居家照護:採「清潔技術」(非無菌)更換用具;每次更換皆須觀察造口顏色(玫瑰紅為正常)及周圍皮膚有無紅腫破損;兩片式用具可重複使用底座較經濟與保護皮膚;造口袋通常3~7天更換或滲漏即換,並非固定2週。 補充：結腸造口採清潔技術即可;造口正常為玫瑰紅且濕潤,蒼白示貧血、暗紫黑示缺血;造口袋開口比造口大約1/8吋以保護周圍皮膚;每次更換皆觀察造口顏色與周圍皮膚有無破損。","options":{"A":"錯誤。用清潔技術即可,非無菌。","B":"正確(本題答案)。每次更換皆須觀察造口周圍皮膚。","C":"單片式非一定優先,兩片式較保護皮膚。","D":"錯誤。造口用具非固定可用2週,視滲漏更換。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"105030-N3-16":{"quick":"直腸結腸癌腫瘤指標為 CEA(癌胚抗原)。","detail":{"background":"癌胚抗原(CEA)是大腸直腸癌最常用的血清腫瘤標記，用於術前評估、術後追蹤與偵測復發；但專一性不高(吸菸、發炎、其他腺癌也可上升)，不適合單獨篩檢，須配合大腸鏡與影像確診。","options":{"A":"TNF為發炎細胞激素,非腫瘤標記。","B":"正確(本題答案)。CEA為大腸直腸癌標記。","C":"CRP為發炎指標。","D":"BRCA1為乳癌/卵巢癌基因。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"106030-N3-68":{"quick":"右側結腸癌常以貧血、腹塊表現;「裏急後重」是「左側/直腸」癌特徵。","detail":{"background":"結腸癌:CEA為其腫瘤標記;以腺癌最多;危險因子有高脂低渣精緻飲食、息肉、IBD、家族史。右側(升結腸)癌腸腔大、糞便仍稀,症狀晚,常以缺鐵性貧血、體重減輕、腹部腫塊表現;「裏急後重」是左側結腸/直腸癌特徵(糞便成形且管腔狹窄),故右側結腸癌出現裏急後重之敘述錯誤。","options":{"A":"正確。CEA為癌症標記。","B":"正確。以腺癌占最多。","C":"錯誤(本題答案)。裏急後重是左側/直腸癌特徵,非右側結腸癌。","D":"正確。高脂低渣精緻食物為危險因子。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"106030-N3-9":{"quick":"結腸灌洗液用「溫開水(微溫生理性液體)」,不用2%肥皂水(刺激黏膜)。","detail":{"background":"結腸造口灌洗(僅適乙狀/降結腸造口)以建立規律排便:用溫開水500~1000mL、水溫約37~40°C(接近體溫);灌洗袋底部懸掛約與肩同高(或造口上方45~50cm)使重力適中;灌注中若腸絞痛應暫停讓痙攣緩解再續灌。「2%肥皂水」刺激腸黏膜,不可作灌洗液。","options":{"A":"錯誤(本題答案)。灌洗用溫開水,不可用2%肥皂水(刺激黏膜)。","B":"正確。水溫約37~38°C。","C":"正確。灌洗袋底部與肩同高。","D":"正確。腸絞痛時暫停灌注。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"106110-N3-11":{"quick":"造口呈「蒼白色」示血紅素不足/貧血。","detail":{"background":"評估造口病人是否貧血可由造口黏膜顏色判斷：正常造口為鮮紅濕潤，黏膜「蒼白」提示貧血、暗紅或暗紫提示缺血壞死；結腸造口糞便較成形，慢性出血或營養不良時可出現黏膜蒼白等貧血徵象。","options":{"A":"藍紫色示缺血/瘀血。","B":"嚴重水腫示靜脈回流受阻/水腫。","C":"正確(本題答案)。蒼白色示貧血(血紅素不足)。","D":"粉紅/玫瑰紅為正常。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"106111-N3-16":{"quick":"只有「乙狀結腸(降結腸)造口」糞便成形,可學灌洗建立排便型態。","detail":{"background":"造口灌洗用於建立規律排便型態，僅適用於糞便較成形的「降結腸或乙狀結腸造口(永久性)」；迴腸造口與升結腸造口因排出液狀或半流質、無法形成規律排便，不適合灌洗。","options":{"A":"迴腸造口液狀,不可灌洗。","B":"升結腸半流質,不適合灌洗。","C":"橫結腸半成形,灌洗效果差。","D":"正確(本題答案)。乙狀結腸造口糞便成形,可灌洗建立規律。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"107110-N3-13":{"quick":"結腸癌危險因子:低纖維(1)、排便習慣不正常(3)、結腸息肉(4)=134。","detail":{"background":"大腸癌危險因子:高脂肪、低纖維、精緻紅肉/燒烤食物,排便習慣異常/慢性便秘,大腸息肉(尤其腺瘤性)、發炎性腸病、家族性腺瘤性息肉症(FAP)、Lynch症候群、大腸癌家族史、年齡>50歲、肥胖、抽菸酗酒。題項2「低脂肪」為保護因子(非危險),故選1低纖維+3排便異常+4息肉=134。","options":{"A":"123含2低脂肪(保護因子)錯。","B":"124錯。","C":"正確(本題答案)。1低纖維+3排便異常+4息肉。","D":"234錯。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"108020-N3-15":{"quick":"迴腸造口正常顏色為「玫瑰紅(牛肉紅)」且濕潤。","detail":{"background":"造口黏膜正常顏色為「鮮紅(牛肉紅)且濕潤」，代表血流良好；蒼白提示貧血，暗紅、暗紫或黑色提示血液循環不良或缺血壞死需立即處理；迴腸造口術後早期略水腫亦屬正常。","options":{"A":"黑褐色示壞死。","B":"藍紫色示缺血。","C":"正確(本題答案)。玫瑰紅為正常造口顏色。","D":"粉白色示貧血/缺血。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"109030-N3-10":{"quick":"大腸癌與「高脂低纖」飲食有關;攝取「植物性蛋白/高纖蔬果」是保護因子。","detail":{"background":"大腸癌病因/危險因子:大腸息肉(腺瘤)、發炎性腸病(UC/Crohn)、缺乏纖維與蔬果、高脂高紅肉精緻飲食、家族史、年齡。富含植物性蛋白與高纖蔬果是「保護因子」而非病因,故C敘述錯誤。 補充：大腸癌與大腸腺瘤性息肉、發炎性腸病、高脂低纖精緻飲食、紅肉燒烤、家族史、年齡>50歲相關;富含植物性蛋白與高纖蔬果是「保護因子」非病因;定期糞便潛血與大腸鏡可早期發現。","options":{"A":"正確。大腸息肉為危險因子。","B":"正確。發炎性腸病增加風險。","C":"錯誤(本題答案)。富含植物性蛋白/高纖是保護因子,非病因。","D":"正確。缺乏高纖蔬果增加風險。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"109110-N3-12":{"quick":"大腸癌好發於「年齡>50歲」;年齡小於40歲非高危險因子。","detail":{"background":"大腸癌高危險因子:大腸腺瘤性息肉、慢性便秘/排便異常、大腸癌或息肉症家族史、發炎性腸病、高脂低纖飲食、年齡>50歲。年齡「小於40歲」並非高危險族群(年輕者風險相對低,除非遺傳症候群),故為錯誤。 補充：大腸癌高危險因子為腺瘤性息肉、慢性便秘/排便異常、家族史、發炎性腸病、高脂低纖飲食、年齡>50歲;年齡<40歲非高危險(除非FAP/Lynch等遺傳症候群);篩檢建議45~50歲起。","options":{"A":"正確。大腸息肉為高危險因子。","B":"正確。習慣性便秘相關。","C":"錯誤(本題答案)。好發>50歲,<40歲非高危險。","D":"正確。家族史增加風險。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"110030-N3-14":{"quick":"結腸癌典型:解便習慣改變、裏急後重、腹脹、血便;「灰白便」是膽道阻塞,非結腸癌。","detail":{"background":"結腸癌典型臨床:排便習慣改變(便秘腹瀉交替)、裏急後重、糞便變細、血便/黏液便、腹脹、腹痛、貧血、體重減輕、腸阻塞。灰白色(陶土色)糞便代表膽汁無法進入腸道(膽道阻塞/阻塞性黃疸),並非結腸癌典型表徵。 補充：結腸癌典型為排便習慣改變(便秘腹瀉交替)、裏急後重、糞便變細、血便/黏液便、腹脹腹痛、貧血、體重減輕;灰白(陶土)色便代表膽汁無法入腸(膽道阻塞/阻塞性黃疸),非結腸癌表徵。","options":{"A":"典型。解便習慣改變。","B":"不是(本題答案)。灰色便是膽道阻塞之表徵。","C":"典型。裏急後重。","D":"典型。腹脹。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"110110-N3-10":{"quick":"造口術後三週內應避免高渣(高纖)飲食,以免阻塞造口。","detail":{"background":"腸造口護理衛教：造口袋約1/3~1/2滿即排空、底座開口比造口大約2~3mm避免摩擦或滲漏、皮膚以溫水清潔勿用刺激性消毒劑、觀察造口顏色；迴腸造口需多補充水分與電解質。","options":{"A":"正確。造口應為粉紅/玫瑰紅。","B":"正確。乙狀結腸造口為成形便。","C":"正確。避免產氣食物。","D":"錯誤(本題答案)。術後初期(三週內)應避免高渣飲食,以免阻塞造口。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"110110-N3-9":{"quick":"術前診斷與術後追蹤大腸癌復發之指標為 CEA。","detail":{"background":"CEA(癌胚抗原)可作為大腸直腸癌的輔助指標——術前評估腫瘤負荷、術後監測治療反應、追蹤是否復發；惟非確診工具，確診仍需大腸鏡切片，CA19-9等其他標記專一性更低。","options":{"A":"正確(本題答案)。CEA可用於術前評估與術後追蹤復發。","B":"Hb是貧血指標。","C":"AFP是肝癌指標。","D":"FOB(糞便潛血)為篩檢工具,非追蹤復發指標。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"111110-N3-41":{"quick":"長期低纖維/精緻飲食最相關癌症為「大腸癌」。","detail":{"background":"長期攝取低纖維、高脂、精緻、紅肉燒烤飲食,使糞便在腸道停留久、致癌物接觸腸黏膜時間增加,與「大腸(結直腸)癌」最相關。胃癌與高鹽醃漬/Hp相關;肝癌與肝炎/黃麴毒素相關;乳癌與荷爾蒙/家族史相關。 補充：長期低纖維、高脂、精緻、紅肉燒烤飲食使糞便停留久、致癌物接觸腸黏膜時間增加,與大腸(結直腸)癌最相關;胃癌與高鹽醃漬/Hp、肝癌與肝炎/黃麴毒素、乳癌與荷爾蒙相關。","options":{"A":"胃癌與醃漬高鹽相關。","B":"肝癌與肝炎相關。","C":"正確(本題答案)。大腸癌與低纖維精緻飲食最相關。","D":"乳癌與荷爾蒙相關。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"112030-N3-11":{"quick":"升結腸造口:半流質、水分需求增加、無規律、不適合灌洗。","detail":{"background":"升結腸造口位於右側腹，排出半流質至半糊狀糞便(較迴腸稍成形但仍含水分與消化酶、具刺激性)，需注意周圍皮膚保護與水分補充；因排便不規則，不適合做造口灌洗。","options":{"A":"正確(本題答案)。升結腸造口水分流失多,水分需求增加。","B":"錯誤。升結腸造口糞便為半流質(非半成形,半成形是橫結腸)。","C":"錯誤。升結腸造口不適合灌洗(僅乙狀/降結腸可)。","D":"錯誤。升結腸造口排便無規律,訓練後仍難規律。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"112030-N3-13":{"quick":"迴腸造口應「記錄引流量」(失水多需監測);避免高纖、不過度限水。","detail":{"background":"迴腸造口排稀糞水、量多含消化酶，護理重點為水分電解質補充、造口周圍皮膚保護、低渣易消化飲食、避免易產氣與易阻塞食物(如高纖維未充分咀嚼食物)；造口呈鮮紅濕潤為正常。","options":{"A":"錯誤。蛋、乳酪等易產氣/有味,非特別鼓勵;重點非此。","B":"錯誤。迴腸造口初期應避免高纖維(易阻塞)。","C":"正確(本題答案)。記錄迴腸造口引流量以監測脫水。","D":"錯誤。迴腸造口失水多,每日應攝取至少1500~2000mL,而非不超過1500。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"112110-N3-36":{"quick":"避免結腸癌保護因子:維持適當體重(3)、規律運動(4)、適當纖維(5)=345。","detail":{"background":"大腸癌保護因子:高纖維蔬果、維持適當體重、規律運動、限制紅肉與油脂、戒菸酒、補充鈣與葉酸、定期篩檢。題項1鼓勵食用紅肉、2不需限制油脂皆為「危險因子」(非保護),3維持適當體重、4規律運動、5補充適當纖維為保護因子,故選345。 補充：大腸癌保護因子為高纖蔬果、維持適當體重、規律運動、限制紅肉與油脂、戒菸酒、補充鈣與葉酸、定期篩檢;紅肉與高油脂為危險因子;45~50歲起應做糞便潛血或大腸鏡篩檢。","options":{"A":"135含1紅肉(危險)錯。","B":"234含2不限油脂(危險)錯。","C":"245含2錯。","D":"正確(本題答案)。3體重+4運動+5纖維。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"112110-N3-9":{"quick":"大腸癌術後是否復發之追蹤指標為 CEA。","detail":{"background":"大腸直腸癌術後以血清CEA定期監測復發：術後CEA回降至正常後，若隨訪中再上升常早於影像發現復發或轉移；CEA非篩檢工具，需與大腸鏡、CT等併用判讀。","options":{"A":"AFP為肝癌指標。","B":"正確(本題答案)。CEA為大腸癌追蹤復發指標。","C":"CRP為發炎指標。","D":"TNF非腫瘤標記。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"113030-N3-8":{"quick":"升結腸造瘻排便無規律性(半流質、水分需求增加、不灌洗)。","detail":{"background":"腸造口特性依部位：迴腸造口糞便液狀、酶多刺激皮膚、需大量補水；升/橫結腸半流質；降/乙狀結腸成形、可做灌洗建立規律排便。越遠端越成形、對皮膚刺激越小。","options":{"A":"正確(本題答案)。升結腸造瘻排便無規律性。","B":"錯誤。迴腸造瘻是「液狀」,非半成形。","C":"錯誤。乙狀結腸造瘻液體需求不需特別增加(是升結腸/迴腸才需增加)。","D":"錯誤。橫結腸造瘻仍需人工造口袋。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"114030-N3-7":{"quick":"大腸癌高危險因子:家族型腺瘤性息肉症(FAP)病史。","detail":{"background":"大腸癌高危險因子:家族性腺瘤性息肉症(FAP,幾乎100%惡變)、Lynch症候群、大腸腺瘤性息肉、發炎性腸病、大腸癌家族史、高脂低纖飲食、年齡>50歲。攝取蔬菜高纖是「保護因子」;Hp與胃癌相關;胃酸分泌過多與消化性潰瘍相關,皆非大腸癌危險因子。","options":{"A":"錯誤。高纖蔬菜是保護因子。","B":"錯誤。Hp與胃癌相關。","C":"正確(本題答案)。FAP病史為大腸癌高危險因子。","D":"錯誤。胃酸過多與PUD相關,非大腸癌。"},"sources":["新文京《內外科護理學》大腸直腸癌與腸造口護理","華杏《內外科護理學》結腸造口","NCCN Colorectal Cancer Guideline"]}},"102110-N3-75":{"quick":"腸憩室炎併發症:膿瘍、穿孔腹膜炎、出血、瘻管、阻塞;「腸麻痺」非其潛在合併症。","detail":{"background":"憩室炎(diverticulitis)為大腸(尤其乙狀結腸)憩室發炎,常見併發症:膿瘍形成、穿孔致腹膜炎、出血(下消化道出血)、瘻管(膀胱/陰道)、腸狹窄阻塞。腸麻痺(麻痺性腸阻塞)為腹腔手術/腹膜炎後續發,非憩室炎的「潛在合併症」(本題答案)。","options":{"A":"是。穿孔致腹膜炎。","B":"不是(本題答案)。腸麻痺非憩室炎潛在合併症。","C":"是。膿瘍形成。","D":"是。下消化道出血。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"103030-N3-15":{"quick":"克隆氏病侵犯「全層腸壁」致腸壁增厚;非連續性、好發迴腸末端。","detail":{"background":"克隆氏病(Crohn)可侵犯口腔至肛門任一段、病灶呈「跳躍式」、為全層發炎，易併瘻管、狹窄、肛周膿瘍與營養吸收不良；糞便多為非血性慢性腹瀉；與UC(連續性、僅黏膜/黏膜下層、血便)鑑別。","options":{"A":"正確(本題答案)。克隆氏病侵犯全層腸壁、使腸壁增厚。","B":"錯誤。腺疱膿瘍(crypt abscess)是潰瘍性結腸炎特徵。","C":"錯誤。毒性巨結腸是潰瘍性結腸炎合併症。","D":"錯誤。侵犯直腸及遠端結腸是潰瘍性結腸炎,克隆氏好發迴腸末端。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"103030-N3-16":{"quick":"痔瘡術後:觀察尿滯留(肛門痛/麻醉致排尿困難)為重要護理。","detail":{"background":"痔瘡術後護理：溫水坐浴(每日數次、每次15~20分)促進循環、減痛與清潔、預防感染；高纖飲食與軟便劑避免用力解便；觀察出血；止痛與傷口護理；避免久坐久站與便秘。","options":{"A":"正確(本題答案)。觀察尿滯留現象。","B":"錯誤。術後12~24小時即可溫水坐浴,非3天後。","C":"錯誤。術後當天應低渣飲食,非高渣。","D":"錯誤。應鼓勵做會陰收縮運動促進循環,非限制。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"103100-N3-11":{"quick":"痔瘡術後採側臥/俯臥避免壓迫傷口,非半坐臥;水分≥2000mL、解便有痛。","detail":{"background":"痔瘡為肛門直腸靜脈叢曲張，分內痔(齒狀線上、無痛性鮮血)與外痔(齒狀線下、有疼痛)；誘因為久站久坐、便秘用力、懷孕、門脈高壓；治療含高纖飲食、坐浴、橡皮圈結紮或手術切除。","options":{"A":"正確。久站久坐(姿勢)是危險因子。","B":"正確。解便時肛門疼痛。","C":"錯誤(本題答案)。應採側臥/俯臥避免壓迫肛門傷口,非半坐臥。","D":"正確。每日攝取水分2000mL以上預防便秘。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"104100-N3-16":{"quick":"憩室炎表徵:發燒(1)+痙攣性腹痛(2)+腹瀉(3)=123;黃疸非憩室炎表徵。","detail":{"background":"憩室炎臨床表徵:左下腹痛(乙狀結腸最常見)、痙攣性腹痛、發燒、白血球上升、噁心、排便習慣改變(腹瀉或便秘)、便血。黃疸與膽道/肝臟疾病相關,非憩室炎表徵,故選1發燒+2痙攣性腹痛+3腹瀉=123。 補充：憩室炎好發乙狀結腸,因低纖飲食使腸內壓升高、糞石嵌入憩室發炎;表徵為左下腹痛、痙攣痛、發燒、白血球上升、排便習慣改變;併發膿瘍、穿孔、出血、瘻管。黃疸屬肝膽,非憩室炎。","options":{"A":"正確(本題答案)。1發燒+2痙攣性腹痛+3腹瀉。","B":"124含4黃疸錯。","C":"134含4黃疸錯。","D":"234含4黃疸錯。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"105090-N3-13":{"quick":"克隆氏病侵犯全層腸壁、腸壁增厚(同103030-15)。","detail":{"background":"克隆氏病特徵：全層、跳躍式病灶(好發迴腸末端與右結腸)、腹痛腹瀉(常非血性)、體重減輕、瘻管與狹窄、肛周病變及腸外表現；鵝卵石樣黏膜為其典型內視鏡所見。","options":{"A":"正確(本題答案)。侵犯全層腸壁使腸壁增厚。","B":"錯誤。連續性病灶是潰瘍性結腸炎,克隆氏為跳躍式。","C":"錯誤。毒性巨結腸屬潰瘍性結腸炎。","D":"錯誤。侵犯直腸遠端結腸屬潰瘍性結腸炎。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"106110-N3-10":{"quick":"肛門瘻管術後合併症:出血、瘻管復發、解便失禁(括約肌受損);「便秘」最少見。","detail":{"background":"肛門瘻管(anal fistula)手術(瘻管切開/切除)後常見併發症:出血、感染、瘻管復發、傷口癒合不良,及因括約肌受損致「解便失禁」。便秘並非瘻管手術的典型併發症(反而因疼痛可能暫時排便困難,但非主要),故為最少見。 補充：肛門瘻管手術(瘻管切開/切除)後常見出血、感染、瘻管復發、括約肌受損致解便失禁;便秘因疼痛可暫時排便困難但非典型併發症,故最少見;術後溫水坐浴、高纖飲食、軟便劑助癒合。","options":{"A":"常見。傷口出血。","B":"最少見(本題答案)。便秘非瘻管術後典型併發症。","C":"可見。括約肌受損致解便失禁。","D":"常見。瘻管復發。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"107030-N3-11":{"quick":"UC較常侵犯小腸之敘述錯誤;克隆氏才常侵犯小腸(迴腸末端)。","detail":{"background":"潰瘍性結腸炎侵犯黏膜及黏膜下層、由直腸往近端「連續」分布、典型為血便、易增加大腸癌風險；克隆氏病為全層、跳躍式、好發迴腸、易瘻管與狹窄。兩者特性敘述顛倒即為錯誤。","options":{"A":"正確。潰瘍性結腸炎較常血便及黏液。","B":"錯誤(本題答案)。侵犯小腸(迴腸)是「克隆氏病」,非潰瘍性結腸炎。","C":"正確。克隆氏病較常脂肪痢(吸收不良)。","D":"正確。兩者均致腹瀉與營養缺乏。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"108020-N3-16":{"quick":"痔瘡術後「不立即」溫水坐浴(術後12~24小時後);低渣飲食、側臥俯臥、觀察尿滯留。","detail":{"background":"痔瘡術後護理：溫水坐浴、高纖飲食與充足水分、軟便劑避免用力解便、止痛、觀察出血量；「不適當」者常為以長時間冰敷取代坐浴、長期禁食、忽略排便照護或鼓勵用力等做法。","options":{"A":"不適當(本題答案)。痔瘡出血手術後不宜「立即」溫水坐浴,應於術後12~24小時、出血穩定後。","B":"適當。觀察尿滯留。","C":"適當。建議低渣飲食。","D":"適當。採側臥或俯臥。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"109030-N3-9":{"quick":"肛門瘻管術後常見併發症:出血(1)+瘻管復發(3)+解便失禁(4)=134。","detail":{"background":"肛門瘻管手術後常見併發症為出血、瘻管復發、肛門括約肌受損致解便失禁、傷口感染。腹股溝疝氣與瘻管手術無關。故選1出血+3瘻管復發+4解便失禁=134。 補充：肛門瘻管手術後常見出血、瘻管復發、括約肌受損致解便失禁、傷口感染;腹股溝疝氣與瘻管手術無關;術後以溫水坐浴、高纖軟便、保持傷口清潔促進癒合。","options":{"A":"123含2腹股溝疝氣錯。","B":"124含2錯。","C":"正確(本題答案)。1出血+3瘻管復發+4解便失禁。","D":"234含2錯。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"109110-N3-11":{"quick":"憩室炎併發症:膿瘍(1)+出血(2)+瘻管(4)=124;胰臟炎非憩室炎併發症。","detail":{"background":"憩室炎併發症:膿瘍、穿孔腹膜炎、下消化道出血、瘻管(膀胱陰道)、腸狹窄阻塞。胰臟炎與憩室炎無關。故選1膿瘍+2出血+4瘻管=124。 補充：憩室炎併發症為膿瘍、穿孔致腹膜炎、下消化道出血、瘻管(膀胱/陰道)、腸狹窄阻塞;胰臟炎與憩室炎無關;急性期禁食/低渣、抗生素,反覆發作或併發症需手術切除病段。","options":{"A":"123含3胰臟炎錯。","B":"正確(本題答案)。1膿瘍+2出血+4瘻管。","C":"134含3錯。","D":"234含3錯。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"110110-N3-17":{"quick":"痔瘡術後初期應「低渣」飲食(非高纖);溫水坐浴、側俯臥、監測出血。","detail":{"background":"痔瘡術後護理：溫水坐浴促傷口癒合與止痛、高纖飲食配軟便劑防便秘、第一次解便宜有人陪伴觀察出血、避免久坐；錯誤做法如術後立即灌腸、長時間冰敷、鼓勵憋便或用力解便等。","options":{"A":"正確。術後12小時可溫水坐浴。","B":"正確。側躺/俯臥避免壓迫。","C":"正確。8小時內二塊以上敷料浸溼示出血。","D":"錯誤(本題答案)。手術後初期應「低渣」飲食,待傷口癒合再漸增高纖。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"111110-N3-9":{"quick":"發炎性腸道疾病(IBD)病因與感染、免疫、食物過敏、遺傳相關;東方盛行率低於歐美。","detail":{"background":"發炎性腸道疾病(IBD,含UC與Crohn)為慢性復發性腸道發炎,病因不明,與遺傳、自體免疫、腸道菌叢、感染、食物過敏、環境(吸菸對Crohn不利)相關;好發於15~35歲青壯年(非60~80歲);女性略多或男女相近;盛行率歐美高於東方(但亞洲近年上升)。","options":{"A":"錯誤。好發15~35歲青壯年,非60~80歲。","B":"錯誤。並非男性明顯較高。","C":"正確(本題答案)。可能與感染、免疫、食物過敏相關。","D":"錯誤。盛行率歐美高於東方國家。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"112110-N3-12":{"quick":"潰瘍性結腸炎:裏急後重(3)+糞便經常帶血(4)=34;侵犯全腸壁與肛門瘻管屬克隆氏。","detail":{"background":"潰瘍性結腸炎(UC)特徵:侵犯「黏膜/黏膜下層」(非全層)、連續性、由直腸往近端、血便/膿黏液便、裏急後重明顯、腹瀉。「侵犯全腸壁」與「肛門瘻管」是克隆氏病特徵。故選3裏急後重+4糞便帶血=34。 補充：潰瘍性結腸炎侵犯黏膜/黏膜下層、連續性、由直腸往近端、血便膿黏液便、裏急後重明顯;「侵犯全腸壁」與「肛門瘻管」是克隆氏病特徵;UC併發毒性巨結腸與大腸癌風險升高。","options":{"A":"12錯(1侵犯全腸壁屬克隆氏)。","B":"14錯。","C":"23錯(2肛門瘻管屬克隆氏)。","D":"正確(本題答案)。3裏急後重+4糞便帶血。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"113180-N3-7":{"quick":"痔瘡術後:監測解尿型態(防尿滯留);溫水(非冰水)坐浴、初期低渣、可側俯臥。","detail":{"background":"痔瘡切除術後適當護理：溫水坐浴每日3~4次、高纖維飲食配合足量水分與軟便劑、依醫囑止痛、觀察肛門出血、漸進活動避免久坐久站；避免便秘用力與粗硬刺激食物。","options":{"A":"錯誤。應溫水坐浴,冰水使括約肌痙攣加重疼痛。","B":"正確(本題答案)。定時監測解尿型態(預防尿滯留)。","C":"錯誤。初期應低渣飲食,癒合後再增纖維。","D":"錯誤。應採側臥或俯臥避免壓迫傷口。"},"sources":["新文京《內外科護理學》發炎性腸道疾病與肛門直腸疾病","華杏《內外科護理學》IBD/痔瘡","Harrison 21e IBD"]}},"102030-N3-17":{"quick":"闌尾炎白血球(嗜中性球)上升;「嗜伊紅性白血球增加」錯誤。","detail":{"background":"闌尾炎典型疼痛由臍周或上腹「轉移」至右下腹麥氏點(McBurney點)，伴噁心、嘔吐、食慾不振、低度發燒、反彈痛；穿孔前疼痛常先減輕再加劇並出現腹膜炎徵象；白血球輕中度上升。","options":{"A":"正確。常伴噁心嘔吐。","B":"錯誤(本題答案)。闌尾炎是嗜中性球增加,非嗜伊紅性白血球(後者見於過敏/寄生蟲)。","C":"正確。洛夫辛氏徵象陽性。","D":"正確。麥氏點反彈壓痛。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"102110-N3-80":{"quick":"闌尾炎禁忌灌腸/瀉劑(增蠕動致穿孔);禁食、半坐臥、可冰敷。","detail":{"background":"疑似闌尾炎護理：禁食準備手術、「禁止灌腸與瀉劑」(增加腸蠕動恐致穿孔)、「禁止熱敷腹部」(促進發炎與穿孔)、可冰敷止痛、監測有無穿孔或腹膜炎徵象；確定治療為闌尾切除術。","options":{"A":"正確。禁食。","B":"正確。半坐臥使滲液局限。","C":"錯誤(本題答案)。不可灌腸(增加腸蠕動恐致闌尾穿孔)。","D":"正確。冰敷可緩解(不可熱敷)。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"103100-N3-13":{"quick":"麻痺性腸阻塞原因:腹部手術後、腹腔感染、副交感抑制劑、電解質異常(低血鉀);「低血鈉」非主因。","detail":{"background":"麻痺性(動力性)腸阻塞(paralytic ileus)因腸蠕動停止而非機械阻塞,常見原因:腹部手術後、腹膜炎/腹腔感染、低血鉀(電解質失衡)、副交感神經抑制劑(抗膽鹼藥)、脊髓損傷、缺血、腹膜刺激。低血鈉並非麻痺性腸阻塞之常見原因(低血「鉀」才是),故為錯誤。","options":{"A":"錯誤(本題答案)。低血「鉀」才致麻痺性腸阻塞,低血鈉非主因。","B":"正確。腹部手術後常見。","C":"正確。腹腔感染。","D":"正確。副交感抑制劑(抗膽鹼)抑制蠕動。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"104100-N3-51":{"quick":"腹膜炎呼吸「淺而快」(腹痛使深呼吸受限),非加深;腸蠕動停止、板狀腹、電解質失衡。","detail":{"background":"腹膜炎為腹膜發炎，典型症狀：持續性腹痛、腹部肌肉僵硬如木板(肌防衛)、壓痛與反彈痛、腸蠕動音「減弱或消失」(麻痺性腸阻塞)、發燒、心搏加速；腸蠕動音增強並非腹膜炎表現。","options":{"A":"錯誤(本題答案)。腹膜炎因腹痛而呼吸「淺而快」,非加深加快。","B":"正確。腸蠕動停止(麻痺性腸阻塞)。","C":"正確。腹壁肌肉僵硬(板狀腹)。","D":"正確。電解質不平衡。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"105090-N3-15":{"quick":"闌尾炎破裂併腹膜炎:腹部觸診出現反彈痛。","detail":{"background":"闌尾破裂併發腹膜炎：全腹壓痛與反彈痛、腹肌僵硬如木板、腸蠕動音減弱或消失、發燒、心搏與呼吸加速、病人不敢移動採屈膝臥姿；是消化道穿孔後細菌與內容物污染腹膜的結果。","options":{"A":"正確(本題答案)。反彈痛為腹膜炎徵象。","B":"錯誤。是白血球增加,非紅血球。","C":"錯誤。腸蠕動音「減弱或消失」,非增加。","D":"錯誤。腹腔積膿/積液叩診雖可濁音,但典型徵象為反彈痛;此項描述非最佳。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"105090-N3-3":{"quick":"腸阻塞:腹痛、嘔吐、腹脹、便秘(無排便排氣);「腹瀉」非典型。","detail":{"background":"腸阻塞臨床：陣發性腹部絞痛、腹脹、嘔吐(高位早且劇、低位晚且可含糞臭味)、無法排便排氣；機械性早期腸蠕動音亢進呈高頻金屬音、後期麻痺則減弱消失；「腹瀉」非典型表現。","options":{"A":"是。腹部絞痛。","B":"是。嘔吐。","C":"是。腹脹。","D":"錯誤(本題答案)。腸阻塞是便秘/無排便排氣,非腹瀉。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"106110-N3-16":{"quick":"腸阻塞使體液滯留腸腔→循環血量嚴重減少→低血壓。","detail":{"background":"腸阻塞依部位症狀不同：小腸高位阻塞嘔吐早而劇、脫水與電解質流失明顯；低位或大腸阻塞腹脹顯著、嘔吐晚、可吐糞臭物；機械性阻塞早期蠕動音亢進、晚期消失；X光見階梯狀液平面。","options":{"A":"錯誤。高位(迴腸以上)阻塞嘔吐早,低位阻塞嘔吐晚;敘述顛倒。","B":"正確(本題答案)。體液滯留腸腔致循環血量減少而低血壓。","C":"錯誤。腸壓增加使吸收下降、體液滯留,尿量「減少」非增加。","D":"錯誤。嘔吐失液致Na/K/Cl下降,但白血球因發炎/血液濃縮常上升。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"106111-N3-15":{"quick":"壓左下腹引起右側麥氏點疼痛=洛夫辛徵象(Rovsing sign)。","detail":{"background":"按壓「左下腹」引發「右下腹麥氏點」疼痛為Rovsing徵象陽性，提示腹膜受刺激、支持闌尾炎診斷；其機轉為左側結腸氣體推移刺激發炎的闌尾與腹膜，是闌尾炎的理學評估之一。","options":{"A":"咳嗽徵象是咳嗽引發右下腹痛。","B":"正確(本題答案)。洛夫辛徵象=壓左下腹引起右下腹(麥氏點)痛。","C":"閉孔肌徵象是屈髖內旋引發痛。","D":"腰大肌徵象是伸髖引發痛。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"107110-N3-14":{"quick":"疼痛由臍周轉移至右下腹+閉孔肌徵象陽性→確認闌尾炎。","detail":{"background":"闌尾炎診斷：疼痛由臍周轉移至右下腹麥氏點伴噁心、厭食；檢查可見白血球上升，影像以腹部超音波或電腦斷層確認(闌尾腫大>6mm、周圍積液)；理學有反彈痛、Rovsing、腰大肌徵象。","options":{"A":"錯誤。應觸診右下腹反彈痛,非左上腹。","B":"錯誤。左肩輻射痛較似脾/膈刺激。","C":"正確(本題答案)。閉孔肌徵象陽性支持闌尾炎。","D":"錯誤。墨菲氏徵象是膽囊炎。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"108110-N3-10":{"quick":"小腸阻塞:嘔吐頻率增加(早且多);便秘晚現、腹脹較輕、早期腸音亢進。","detail":{"background":"小腸阻塞：臍周陣發絞痛、腹脹、早期頻繁嘔吐(可含膽汁、低位含糞臭味)、脫水與低鈉低鉀低氯及代謝性鹼中毒、無排便排氣；早期高頻金屬樣腸蠕動音、後期減弱；立位腹部X光見階梯狀液平面。","options":{"A":"錯誤。小腸阻塞早期仍可排出阻塞遠端糞便,便秘非最早表現。","B":"錯誤。小腸阻塞腹脹較輕且嘔吐早,大腸阻塞才晚期明顯腹脹。","C":"正確(本題答案)。小腸(高位)阻塞嘔吐頻率增加且早。","D":"錯誤。晚期腸壞死/麻痺時腸音消失(早期才亢進)。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"108110-N3-12":{"quick":"腹膜炎常見致病菌為革蘭氏陰性菌(如 E. coli)及厭氧菌。","detail":{"background":"續發性腹膜炎多源自消化道穿孔(闌尾、潰瘍、憩室)，致病菌以腸道菌叢為主，最常見為「大腸桿菌(E. coli)」等格蘭氏陰性桿菌與厭氧菌(如Bacteroides)，常為多菌種混合感染。","options":{"A":"(本題公布答案A)續發性腹膜炎多為腸道革蘭氏陰性菌(E. coli)等混合感染;惟原發性自發性腹膜炎亦可革蘭氏陽性,依考選部答案選A。","B":"黴菌少見。","C":"厭氧菌雖常合併但非單一最常見。","D":"真菌少見。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"109030-N3-8":{"quick":"闌尾炎術後6週內避免提重物;術前禁食勿灌腸、勿熱敷、勿臥床不動。","detail":{"background":"闌尾炎術前護理：禁食、靜脈輸液、半坐臥減輕腹壓、止痛；「不可」灌腸、瀉劑、熱敷或在確診前給強效止痛掩蓋病情；疑穿孔者監測腹膜炎徵象並儘速安排手術。","options":{"A":"錯誤。右下腹不可熱敷(促發炎穿孔)。","B":"錯誤。術前不可灌腸。","C":"錯誤。術後鼓勵早期下床活動,非盡量臥床。","D":"正確(本題答案)。術後6週內避免提重物。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"109110-N3-15":{"quick":"腹膜炎徵象:腹肌僵硬如木板(2)+壓痛及反彈痛(3)=23。","detail":{"background":"腹膜炎理學發現：腹部肌肉僵硬如木板、壓痛與反彈痛、腸蠕動音「減弱消失」；疼痛輻射至背或肩多見於胰臟炎或膽道疾病，腸蠕動音增強見於早期腸阻塞，皆非腹膜炎典型表現。","options":{"A":"13錯。","B":"14錯(4腸音應減弱非增強)。","C":"正確(本題答案)。2板狀腹+3壓痛反彈痛。","D":"24錯。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"109110-N3-9":{"quick":"闌尾炎徵象:麥氏點壓痛(2)+普氏/腰大肌徵象(3)+閉孔肌徵象(4)=234;墨菲氏是膽囊炎。","detail":{"background":"闌尾炎理學評估：麥氏點壓痛與反彈痛、Rovsing徵象(壓左下腹引右下腹痛)、腰大肌徵象、閉孔肌徵象陽性；墨菲氏徵象屬膽囊炎、非闌尾炎，是常見鑑別陷阱。","options":{"A":"123含1墨菲氏(膽囊炎)錯。","B":"124含1錯。","C":"134含1錯。","D":"正確(本題答案)。2麥氏點+3腰大肌(Psoas)+4閉孔肌徵象。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"110030-N3-55":{"quick":"透納氏徵象(Grey Turner sign)是出血性胰臟炎(脅腹瘀斑),非闌尾炎。","detail":{"background":"闌尾炎徵象包括轉移性右下腹痛、麥氏點壓痛與反彈痛、Rovsing/腰大肌/閉孔肌徵象、低度發燒與白血球上升；墨菲氏徵象(膽囊炎)、Cullen或Grey-Turner徵象(出血性胰臟炎)則非闌尾炎表現。","options":{"A":"不是(本題答案)。透納氏徵象是出血性胰臟炎之脅腹瘀斑,非闌尾炎。","B":"是。洛夫辛徵象。","C":"是。腰大肌徵象。","D":"是。閉孔肌徵象。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"111030-N3-9":{"quick":"腸阻塞:嘔吐(1)+腹脹(2)+腹部絞痛(3)=123;腹瀉非典型。","detail":{"background":"腸阻塞核心表徵為嘔吐、腹脹、腹部絞痛，並無法排氣排便；「腹瀉」非典型(完全阻塞下方腸段排空後反而停止排便)；高位阻塞嘔吐早，低位阻塞腹脹較明顯。","options":{"A":"正確(本題答案)。1嘔吐+2腹脹+3腹部絞痛。","B":"124含4腹瀉錯。","C":"134含4錯。","D":"234含4錯。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"112110-N3-13":{"quick":"腹膜炎發炎致發燒,但末期敗血/休克時體溫可下降;「體溫持續上升」之絕對化敘述為錯。","detail":{"background":"腹膜炎臨床：持續性劇烈腹痛、板狀腹、壓痛與反彈痛、腸蠕動音減弱消失、發燒、白血球上升、淺快呼吸與心搏快、病人靜止屈膝以減痛；若敘述「腸蠕動音亢進」或「喜歡活動」即為錯誤。","options":{"A":"正確。常見嘔吐。","B":"正確。持續腹痛。","C":"正確。腸蠕動降低(麻痺性腸阻塞)。","D":"錯誤(本題答案)。體溫雖升高,但敗血性休克末期可下降,非「持續上升」。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"114100-N3-10":{"quick":"疝氣術後:陰囊支托後再下床(3)+多吃蔬果預防便秘(4)=34。","detail":{"background":"腹股溝疝氣修補術後護理:①傷口處「冰敷」減輕腫脹(非熱敷);②肥胖/搬運重工者應減重並避免提重物增加腹內壓;③陰囊水腫者以陰囊支托帶托住後再下床;④多攝取蔬果與水分預防便秘(用力解便增加腹內壓致復發);⑤避免咳嗽用力,搬運工等粗重工作需待數週恢復,不可立即上班。故選3陰囊支托+4蔬果防便秘=34。","options":{"A":"12錯(1熱敷錯、2應適度減重)。","B":"23錯(2錯)。","C":"正確(本題答案)。3陰囊支托+4多蔬果防便秘。","D":"45錯(5不可立即從事搬運工作)。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"114170-N3-6":{"quick":"小腸阻塞:嘔吐物含糞臭味(2)+電解質Na/K/Cl下降(3)+早期腸音亢進(非消失)→1劍突下強蠕動波;選123。","detail":{"background":"小腸阻塞：可見腹部強蠕動波、嘔吐物含糞臭味、大量腸液流失致鈉鉀氯下降與代謝性鹼中毒、脫水；阻塞「早期」腸蠕動音亢進(非消失)，須與後期麻痺性腸阻塞鑑別。","options":{"A":"正確(本題答案)。1劍突下強蠕動波+2糞臭嘔吐物+3電解質下降。","B":"124含4錯(早期腸音亢進非消失)。","C":"134含4錯。","D":"234含4錯。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"115030-N3-10":{"quick":"闌尾炎破裂併腹膜炎:腹部僵硬(1)+強烈反彈痛(2)=12;腸音應減弱、叩診氣腹可鼓音。","detail":{"background":"闌尾破裂腹膜炎表徵：觸診腹部僵硬、強烈反彈痛、腹部叩診因積液與發炎呈「實音」；腸蠕動音「減少或消失」(非增加)為麻痺性腸阻塞，故含「腸蠕動音增加」之選項為錯誤。","options":{"A":"正確(本題答案)。1腹部僵硬(板狀腹)+2強烈反彈痛。","B":"14錯(4腹部若穿孔有游離氣體叩診可鼓音,非實音;且腸音減弱)。","C":"23錯(3腸音應減弱非增加)。","D":"34錯。"},"sources":["新文京《內外科護理學》急腹症","華杏《內外科護理學》闌尾炎/腸阻塞/腹膜炎","Harrison 21e Acute Appendicitis / Peritonitis"]}},"102110-N3-15":{"quick":"大便失禁優先檢查為直腸測壓、排便圖、直腸感覺試驗;乙狀結腸鏡非「優先」評估失禁機能。","detail":{"background":"大便失禁(faecal incontinence)評估著重肛門括約肌與直腸感覺/儲存功能:直腸肛門測壓(anorectal manometry)、直腸感覺功能試驗、排便造影(排便圖)、肛門超音波/肌電圖。乙狀結腸鏡主要看「黏膜病灶(腫瘤、發炎)」,並非評估失禁機轉的優先檢查,故為「除外」項。","options":{"A":"除外(本題答案)。乙狀結腸鏡看黏膜病灶,非評估失禁機能的優先檢查。","B":"是優先。直腸測壓評估括約肌壓力。","C":"是優先。排便圖。","D":"是優先。直腸感覺功能試驗。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"103030-N3-46":{"quick":"口部單純性疱疹為「病毒(HSV)」感染,非革蘭氏陰性菌。","detail":{"background":"口部單純性疱疹(herpes labialis)由「單純疱疹病毒第一型(HSV-1)」感染引起,非細菌(更非革蘭氏陰性菌)。表現為口唇水疱、潰瘍、疼痛;誘發因子有日曬、發燒、壓力、免疫低下。護理:避免過熱刺激性食物、進食後口腔護理、避免日曬、抗病毒藥(acyclovir)。","options":{"A":"錯誤(本題答案)。為HSV病毒感染,非格蘭氏陰性菌。","B":"正確。避免過熱刺激性食物。","C":"正確。進食後立即口腔護理。","D":"正確。避免日曬(誘發因子)。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"103100-N3-12":{"quick":"諾瓦克(諾羅)病毒胃腸炎好發於「冬季」,非夏天。","detail":{"background":"腸道感染:①霍亂(Vibrio cholerae)主症為大量「米湯樣水瀉」致脫水;②志賀氏菌(Shigella)、出血性大腸桿菌(EHEC O157)、阿米巴致「血樣黏液便/血便」、裏急後重;③諾瓦克/諾羅病毒(Norovirus)為急性病毒性胃腸炎,好發「冬季」(冬季嘔吐病),非夏天。故D錯誤。","options":{"A":"正確。霍亂主症為水瀉。","B":"正確。志賀氏菌糞便含血樣黏液。","C":"正確。出血性結腸炎(EHEC)致急性出血性腹瀉。","D":"錯誤(本題答案)。諾瓦克病毒好發冬季,非夏天。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"105030-N3-11":{"quick":"腹瀉合併大量血和膿樣黏液 → 潰瘍性結腸炎。","detail":{"background":"出現「腹瀉合併大量血便與膿樣黏液、裏急後重」最典型為潰瘍性結腸炎(UC,黏膜廣泛潰瘍);腸激躁症候群以腹痛與排便習慣改變為主、無血便膿便;一般腸胃炎多自限性水瀉;結腸癌可血便但較少大量膿黏液。 補充：潰瘍性結腸炎侵犯黏膜/黏膜下層、連續性、由直腸往近端,典型血便+大量膿黏液便+裏急後重;克隆氏病侵犯全層、跳躍式、好發迴腸末端,以脂肪痢、瘻管、狹窄為主。","options":{"A":"正確(本題答案)。潰瘍性結腸炎致血便+膿黏液+裏急後重。","B":"腸激躁無血便膿便。","C":"腸胃炎多水瀉。","D":"結腸癌較少大量膿黏液。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"105090-N3-10":{"quick":"老年便秘「不應」每天灌腸(致依賴/電解質失衡);宜增水分纖維、運動、容積性瀉劑。","detail":{"background":"老年便秘護理:增加水分與膳食纖維、規律運動與訓練腹肌、養成定時排便、可用容積性(膨脹性)瀉劑;「不可」每天定時灌腸,長期灌腸會造成腸道依賴、電解質流失與黏膜傷害。 補充：老年便秘多因活動少、纖維水分不足、藥物(鴉片類、抗膽鹼)所致;護理重點為增水分纖維、規律運動、養成定時排便、容積性瀉劑;長期灌腸會致腸道依賴與電解質流失,應避免。","options":{"A":"錯誤(本題答案)。不應鼓勵每天灌腸(致依賴與電解質失衡)。","B":"正確。多水分纖維。","C":"正確。增加腹肌力量運動。","D":"正確。容積性輕瀉劑。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"106111-N3-14":{"quick":"輕度大便失禁應減少「咖啡」(刺激腸蠕動);其餘食物影響小。","detail":{"background":"輕度大便失禁飲食:減少刺激腸蠕動與致瀉食物—咖啡、酒、辛辣、油膩、過量含咖啡因飲料、人工甜味劑;增加可溶性纖維使糞便成形。蕃茄、蔓越莓汁、茄子非主要致瀉刺激物。故應減少咖啡。 補充：大便失禁飲食應減少刺激腸蠕動與致瀉物—咖啡因、酒、辛辣、油膩、人工甜味劑;增加可溶性纖維使糞便成形;並做提肛(凱格爾)運動強化括約肌、養成定時排便。","options":{"A":"正確(本題答案)。咖啡因刺激腸蠕動,應減少。","B":"蕃茄影響小。","C":"蔓越莓汁影響小。","D":"茄子影響小。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"108110-N3-76":{"quick":"食物中毒休克應「先處理休克/脫水」(ABC、補液),非先追查何種食物。","detail":{"background":"食物中毒多由細菌污染食物(金黃色葡萄球菌腸毒素最常見、沙門氏菌、肉毒桿菌)或誤食毒蕈/河豚。症狀嚴重度與「食入污染物量及毒素含量」正相關。處理休克病人時應「優先處理生命徵象、脫水與休克(輸液、ABC)」,而非先追查是哪種食物導致。 補充：食物中毒以金黃色葡萄球菌腸毒素最常見(潛伏期短、嘔吐為主),其次沙門氏菌、肉毒桿菌(神經麻痺);嚴重度與食入量及毒素含量正相關;處理休克病人應先穩定生命徵象與補液,再追查食物。","options":{"A":"正確。多為細菌污染或誤食毒蕈。","B":"正確。金黃色葡萄球菌中毒最常見。","C":"正確。嚴重度與量及毒素含量正相關。","D":"錯誤(本題答案)。應先處理休克/脫水,非先了解何種食物。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"109030-N3-11":{"quick":"腸道(大腸鏡)檢查前一日採「清流質飲食」以清空腸道。","detail":{"background":"大腸內視鏡/鋇劑灌腸檢查前腸道準備:檢查前2~3天低渣,「前1天清流質飲食」並服瀉劑清腸,檢查前禁食。清流質(清湯、果汁、運動飲料、果凍)提供水分電解質又不留糞渣,利於腸道清空與視野清晰。 補充：大腸鏡或鋇劑灌腸前腸道準備為前2~3天低渣、前1天清流質並服瀉劑清腸、檢查前禁食;清流質提供水分電解質又不留糞渣,使腸道清空、視野清晰,提高檢查準確度與安全。","options":{"A":"溫和飲食仍含纖維殘渣。","B":"限鈉非腸道準備重點。","C":"半流質仍有殘渣。","D":"正確(本題答案)。清流質飲食。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"109110-N3-10":{"quick":"水瀉+血樣黏液便病原:志賀氏菌、沙門氏菌、輪狀病毒;肉毒桿菌致「神經麻痺」非血樣腹瀉。","detail":{"background":"引起水瀉與血樣黏液便的腸道病原:志賀氏菌(Shigella,血便膿便裏急後重)、沙門氏菌(Salmonella,腹瀉發燒)、侵襲性大腸桿菌、輪狀病毒(嬰幼兒水瀉)。肉毒桿菌(Clostridium botulinum)產生神經毒素致複視、吞嚥困難、下行性肌肉麻痺、呼吸衰竭,並非血樣腹瀉,故為錯誤。","options":{"A":"正確。志賀氏桿菌致血樣黏液便。","B":"正確。沙門氏桿菌致腹瀉。","C":"正確。輪狀病毒致水瀉。","D":"錯誤(本題答案)。肉毒桿菌致神經麻痺,非血樣腹瀉。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"110030-N3-9":{"quick":"蛋白質吸收不良→體重下降、水腫;碳水化合物不良→脹氣腹瀉;脂肪不良→脂肪痢。","detail":{"background":"吸收不良症候群依缺乏營養素表現:①脂肪吸收不良→脂肪痢(惡臭油亮便)、脂溶性維生素ADEK缺乏;②碳水化合物吸收不良→脹氣、滲透性腹瀉、酸性糞便;③蛋白質吸收不良→體重下降、肌肉消耗、低白蛋白致水腫;④維生素B12/葉酸缺乏→巨母紅血球性貧血;⑤維生素D/鈣缺乏→骨軟化、抽搐。故「蛋白質吸收不良易出現體重下降」正確。","options":{"A":"錯誤。脂肪吸收不良致脂肪痢,肌肉無力較似電解質/蛋白問題。","B":"錯誤。碳水化合物不良致脹氣腹瀉,非水腫。","C":"正確(本題答案)。蛋白質吸收不良致體重下降。","D":"錯誤。B12缺乏致貧血/神經病變,口腔潰瘍較似B群/鐵缺乏。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"111030-N3-14":{"quick":"口腔炎常見疼痛、吞嚥困難、口腔出血;單純疱疹是病毒、缺B2致口角炎、念珠菌好發免疫低下。","detail":{"background":"口腔炎(stomatitis)分類:①單純疱疹性口腔炎—HSV「病毒」感染(非細菌);②念珠菌性(鵝口瘡)—白色念珠菌,好發於免疫低下、嬰幼兒、長期抗生素/類固醇者(非單純口腔衛生不良);③缺乏維生素「B2/B群」致口角炎(非維生素C,缺C致牙齦出血/壞血病);④共同症狀為疼痛、吞嚥困難、口腔黏膜紅腫潰瘍出血。","options":{"A":"錯誤。單純疱疹是病毒(HSV)感染,非細菌。","B":"錯誤。口角炎與維生素B2缺乏有關,非C。","C":"錯誤。念珠菌好發免疫低下/用藥者,非單純衛生不良。","D":"正確(本題答案)。口腔炎常有疼痛、吞嚥困難、口腔出血。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"111110-N3-16":{"quick":"預防齲齒非「建議植牙」;應牙線、塗氟、減少醣類、口腔清潔。","detail":{"background":"預防齲齒護理指導:減少含醣(尤其精緻糖、黏性甜食)攝取與進食頻率、餐後刷牙、使用牙線清除牙縫菜渣、牙齒塗氟強化琺瑯質、定期洗牙檢查、配戴假牙者每日清潔假牙。「建議植牙」是缺牙後的「修復」手段,並非「預防齲齒」的護理指導。 補充：預防齲齒重點為減少含醣(尤其黏性甜食)攝取與頻率、餐後刷牙、牙線清牙縫、牙齒塗氟、定期洗牙、假牙每日清潔;植牙是缺牙後的「修復」非「預防」齲齒手段。","options":{"A":"不是(本題答案)。植牙是缺牙修復,非預防齲齒。","B":"是。牙線剔牙清除牙縫殘渣。","C":"是。牙齒塗氟。","D":"是。減少醣類攝取。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"113030-N3-48":{"quick":"沙門氏桿菌中毒主症:腹瀉、噁心嘔吐、發燒。","detail":{"background":"食物中毒:①河豚中毒為其本身含「河豚毒素(神經毒)」,非處理過程細菌污染;②金黃色葡萄球菌中毒(腸毒素)主症為「噁心嘔吐、腹痛腹瀉」,潛伏期短(視力模糊吞嚥困難是肉毒桿菌);③沙門氏菌中毒主症為腹瀉、噁心嘔吐、發燒、腹痛;④嚴重度與食入污染物量及毒素含量「正相關」(非負相關)。故C正確。","options":{"A":"錯誤。河豚毒素為其本身所含,非細菌污染。","B":"錯誤。視力模糊吞嚥困難是肉毒桿菌,非金黃色葡萄球菌。","C":"正確(本題答案)。沙門氏菌主症腹瀉噁心嘔吐發燒。","D":"錯誤。嚴重度與量及毒素含量正相關。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"114100-N3-50":{"quick":"C. difficile 首選口服(非靜脈)vancomycin或fidaxomicin;靜脈vancomycin對腸道無效。","detail":{"background":"困難梭狀桿菌(C. difficile):厭氧革蘭氏陽性桿菌,能形成孢子,常因長期廣效抗生素破壞正常腸道菌叢而過度增生,產生毒素A/B致偽膜性結腸炎、水瀉,好發住院/長者。治療首選「口服vancomycin或fidaxomicin」(口服才能在腸腔達有效濃度);「靜脈注射vancomycin」對腸道感染無效(不分泌進腸腔)。需停用誘發抗生素、接觸隔離、肥皂洗手(酒精乾洗手殺不死孢子)。","options":{"A":"正確。厭氧革蘭陽性桿菌,易形成孢子。","B":"正確。好發長期使用抗生素之年長/住院者。","C":"錯誤(本題答案)。首選為「口服」vancomycin/fidaxomicin,靜脈vancomycin無效。","D":"正確。腹瀉期間採接觸隔離。"},"sources":["新文京《內外科護理學》腸道感染與營養吸收","華杏《內外科護理學》口腔疾病/食物中毒","CDC 食品中毒/腸道感染防治","IDSA C. difficile Guideline 2021"]}},"101030-N3-31":{"quick":"慢性C肝較佳合併:α干擾素(1)+ribavirin(4)=14。","detail":{"background":"傳統慢性C型肝炎標準治療為「長效干擾素(pegylated interferon-α)+ribavirin」(本題年代);adefovir、lamivudine為B肝抗病毒藥(核苷酸類似物),對C肝無效。(近年已以全口服直接抗病毒藥DAA為主,治癒率>95%,但本題依當年標準答案為α干擾素+ribavirin。)故選1+4=14。","options":{"A":"13含3lamivudine(治B肝)錯。","B":"24含2adefovir(治B肝)錯。","C":"正確(本題答案)。1α干擾素+4ribavirin。","D":"23皆B肝藥,錯。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"102110-N3-64":{"quick":"HBV母嬰傳染主要為「產程接觸血液/體液」(周產期),非經臍靜脈在子宮內傳染。","detail":{"background":"B型肝炎經血液、體液與母嬰垂直傳染，有慢性化與肝硬化、肝癌風險；HBsAg陽性表帶原、HBeAg陽性表高傳染力與病毒複製活躍、anti-HBs陽性表免疫(疫苗或感染後產生)；B肝疫苗可有效預防。","options":{"A":"正確。HBV是肝硬化與肝癌主要致病因。","B":"正確。急性感染成人多在6個月內康復。","C":"正確。少於10%成人急性感染會轉慢性/帶原。","D":"錯誤(本題答案)。母嬰傳染主要在「產程」,非經臍靜脈在子宮內。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"102110-N3-79":{"quick":"α干擾素治C肝最佳合併藥為 ribavirin。","detail":{"background":"慢性C型肝炎傳統治療為「干擾素-α + ribavirin」合併,療效優於單用;adefovir、lamivudine為B肝核苷(酸)類似物,對C肝無效;類固醇會抑制免疫、促進病毒複製,禁用於病毒性肝炎。 補充：ribavirin為核苷類似物,與干擾素協同抑制C肝病毒,主要副作用為溶血性貧血與致畸胎(孕婦禁用、停藥後仍需避孕);類固醇會抑制免疫、促進病毒複製,病毒性肝炎禁用。","options":{"A":"adefovir治B肝。","B":"lamivudine治B肝。","C":"正確(本題答案)。ribavirin與干擾素合併治C肝。","D":"類固醇禁用於病毒性肝炎。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"103100-N3-15":{"quick":"A肝糞口傳染(1)+anti-HCV(+)表曾感染C肝(4)=14。","detail":{"background":"病毒性肝炎：A、E型為糞口傳染(飲食污染、多為急性自限)；B、C、D型為血液體液傳染(可慢性化)；輸血感染以C型為主(非E型)；anti-HBs陽性才代表具保護力，anti-HBe非疫苗免疫指標。","options":{"A":"12錯(2輸血感染急性肝炎為C型非E型)。","B":"正確(本題答案)。1A肝糞口傳染+4 anti-HCV(+)表曾感染C肝。","C":"23錯(3 anti-HBe(+)非表示曾接種疫苗,接種後是anti-HBs(+))。","D":"34錯(3錯)。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"106030-N3-13":{"quick":"B、C肝感染後導致的肝硬化屬「壞死後肝硬化」。","detail":{"background":"肝硬化依病因分型:①酒精性(Laennec)肝硬化—長期酗酒;②壞死後(post-necrotic)肝硬化—B型、C型病毒性肝炎或毒素致肝細胞壞死後纖維化(台灣最常見);③膽源性(biliary)肝硬化—膽道長期阻塞/原發性膽汁性膽管炎;④心因性(cardiac)肝硬化—長期右心衰竭肝鬱血。故B、C肝後為「壞死後肝硬化」。","options":{"A":"酒精性與酗酒相關。","B":"正確(本題答案)。B、C肝後屬壞死後肝硬化。","C":"膽源性與膽道阻塞相關。","D":"心因性與右心衰竭相關。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"106030-N3-16":{"quick":"肝切片施針時應「深吐氣後摒住呼吸」,非深呼吸數次後吸氣屏息。","detail":{"background":"肝臟切片護理：術前查PT與血小板正常方可執行；術後採「右側臥」壓迫穿刺部位數小時止血、臥床休息、監測生命徵象與出血或氣胸徵象；最常見併發症為出血與膽汁性腹膜炎。","options":{"A":"正確。術前確認凝血試驗在可接受範圍。","B":"錯誤(本題答案)。施針時應「深吐氣後摒住呼吸」(使橫膈上移),非吸氣後屏息。","C":"正確。術後右側臥+小枕/沙袋壓迫右肋緣下方。","D":"正確。一週內避免舉重與激烈運動。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"106111-N3-11":{"quick":"肝臟「不儲存膽汁」(膽汁由肝分泌、儲存於膽囊);肝合成凝血因子、白蛋白、轉糖原。","detail":{"background":"肝臟主要功能:①醣代謝—將葡萄糖轉為肝醣儲存、糖質新生;②合成血漿蛋白(白蛋白)與凝血因子(I、II、V、VII、IX、X);③代謝/解毒(藥物、氨→尿素);④製造膽汁(膽汁由肝細胞「分泌」後送至「膽囊」儲存濃縮,肝臟本身不儲存膽汁);⑤儲存維生素(A、D、B12)與鐵。合成「抗體」是漿細胞(免疫系統)的功能,非肝臟。本題問錯誤者—「儲存膽汁」(肝不儲存膽汁)。","options":{"A":"正確。肝將葡萄糖轉為肝醣儲存。","B":"正確。肝合成凝血因子。","C":"錯誤(本題答案)。膽汁儲存於膽囊,肝臟只分泌不儲存。","D":"(抗體由漿細胞合成,非肝臟)亦非肝功能;惟本題標準答案為C。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"107030-N3-14":{"quick":"C肝標準治療為干擾素+Ribavirin;干擾素使ALT/AST「下降」、lamivudine對C肝無效。","detail":{"background":"慢性C肝(本題年代)標準治療為「干擾素 + ribavirin」;治療有效時肝功能ALT、AST會「下降」(非上升);lamivudine是抑制「B肝」DNA病毒,對C肝(RNA病毒)無效;干擾素副作用為流感樣症狀、發燒、體重減輕、全血球「下降(骨髓抑制)」、憂鬱,非體重增加亢奮。","options":{"A":"正確(本題答案)。干擾素+Ribavirin為當時標準治療。","B":"錯誤。治療有效ALT/AST會下降,非上升。","C":"錯誤。lamivudine抑制B肝DNA,對C肝無效。","D":"錯誤。干擾素副作用為血球下降、憂鬱,非體重增加亢奮。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"109030-N3-15":{"quick":"肝穿刺施針時:數次深呼吸後「深吐氣並摒住呼吸」(橫膈上移、肝下降)。","detail":{"background":"肝穿刺切片時，為避免橫膈穿孔與肝臟撕裂傷，於針頭插入肝臟瞬間應教導病人「吐氣後閉氣(屏住呼吸)」使橫膈固定不動，降低針隨呼吸移動造成撕裂的風險。","options":{"A":"錯誤。用力深呼吸會使肝隨橫膈移動,危險。","B":"錯誤。張嘴說「啊」非肝切片正確配合動作。","C":"錯誤。吸氣屏息使橫膈下降、肝上移,易穿破橫膈。","D":"正確(本題答案)。深吐氣並摒住呼吸,使橫膈上移避免穿孔撕裂。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"111110-N3-15":{"quick":"IgG anti-HAV(+)表示「曾經感染A型肝炎」(已有免疫力)。","detail":{"background":"A型肝炎血清標記:IgM anti-HAV(+)表示「目前急性感染」;IgG anti-HAV(+)表示「過去曾感染A肝(已康復)或接種疫苗後,具保護性免疫力」。A肝經糞口傳染、不會慢性化。故IgG anti-HAV(+)代表曾感染A肝。 補充：A肝經糞口傳染、不會慢性化;IgM anti-HAV(+)表急性感染,IgG anti-HAV(+)表「過去曾感染(已康復)或接種疫苗後具保護性免疫力」;預防靠飲食衛生與A肝疫苗。","options":{"A":"錯誤。A肝是糞口傳染,非血液污染。","B":"正確(本題答案)。IgG anti-HAV(+)表曾感染A肝。","C":"錯誤。急性期是IgM anti-HAV(+)。","D":"錯誤。IgG(+)代表「有」免疫力,非無。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"112030-N3-12":{"quick":"肝切片後若右肩疼痛應懷疑「橫膈下積血/出血」(刺激橫膈)。","detail":{"background":"肝活體切片：術前確認凝血功能正常並簽署同意書；穿刺時請病人吐氣後閉氣；術後右側臥加壓止血、臥床監測出血；併發症含出血、膽汁滲漏與氣胸，是診斷肝臟病變的重要侵入性檢查。","options":{"A":"錯誤。應教導吐氣後閉氣穿刺(非吸氣後)。","B":"錯誤。術後應採「右側臥」加壓止血,非正躺。","C":"正確(本題答案)。右肩轉移痛應懷疑橫膈下積血/出血。","D":"錯誤。術後需臥床休息數小時且避免下床,非「除如廁外」短暫。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"112030-N3-9":{"quick":"HBeAg(+)帶原者表示病毒複製活躍、「高傳染力」。","detail":{"background":"B肝帶原且HBeAg陽性代表病毒複製活躍、傳染力高、血中病毒量大，母嬰垂直傳染風險高；需追蹤肝功能與病毒量，必要時抗病毒治療；HBeAg轉陰並出現anti-HBe表示病毒複製下降。","options":{"A":"錯誤。HBeAg(+)非恢復期(恢復期是anti-HBs(+))。","B":"錯誤。有免疫力是anti-HBs(+)。","C":"正確(本題答案)。HBeAg(+)表病毒高傳染力。","D":"錯誤。HBeAg(+)與是否併發C肝無關。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"112110-N3-14":{"quick":"D型肝炎經「血液」傳染(需依附B肝),非糞口。","detail":{"background":"病毒性肝炎傳染途徑：A型、E型為糞口(飲食或飲水污染)；B型、C型、D型為血液體液與母嬰垂直；D型須依附B型才能感染(共同感染或重複感染)；混淆各型途徑為常見的錯誤敘述。","options":{"A":"正確。A型經糞口。","B":"正確。B型經血液。","C":"正確。C型經血液。","D":"錯誤(本題答案)。D型經血液(且需與B肝共存),非糞口。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"112180-N3-7":{"quick":"母HBsAg+HBeAg皆陽性,新生兒24小時內須打「B肝免疫球蛋白(HBIG)」+B肝疫苗。","detail":{"background":"母親HBsAg與HBeAg皆陽性者傳染力極高,新生兒為高危險群。出生24小時內(越早越好)應同時給予「B型肝炎免疫球蛋白(HBIG)」提供被動免疫立即保護,並接種第一劑B肝疫苗(主動免疫),之後依時程完成疫苗,可阻斷九成以上母嬰垂直傳染。本題單選最關鍵的「被動立即保護」為HBIG。","options":{"A":"干擾素非新生兒預防用藥。","B":"類固醇禁用。","C":"B肝疫苗須同時給,但本題強調24小時內被動免疫之HBIG。","D":"正確(本題答案)。B型肝炎免疫球蛋白(HBIG)提供立即被動免疫。"},"sources":["新文京《內外科護理學》病毒性肝炎","華杏《內外科護理學》肝臟疾病","AASLD Hepatitis B/C Guideline","台灣肝病防治"]}},"101030-N3-38":{"quick":"肝硬化腹水因白蛋白過少使血漿膠體滲透壓「下降」(非增加)。","detail":{"background":"肝硬化腹水機轉：門脈高壓使腸繫膜微血管靜水壓上升、低白蛋白血症使血漿膠體滲透壓下降而液體滲入腹腔；有效循環血量減少活化RAAS與ADH造成鈉水滯留；淋巴回流超載亦加重腹水。","options":{"A":"正確。門脈高壓使血漿靜水壓增加。","B":"正確。門脈高壓使淋巴液增加。","C":"錯誤(本題答案)。白蛋白過少使膠體滲透壓「下降」,非增加。","D":"正確。留鹽激素(醛固酮)亢進致鈉水滯留。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"101110-N3-62":{"quick":"溶血性黃疸因紅血球破壞過多(燒傷、輸血反應、溶血);膽結石致「阻塞性」黃疸非溶血性。","detail":{"background":"黃疸分三型:①溶血前性(溶血性)—紅血球破壞過多致「非結合型(間接)膽紅素」上升,見於嚴重燒傷、輸血反應、溶血性貧血、新生兒溶血;②肝細胞性—肝炎/肝硬化;③阻塞後性(阻塞性)—膽道結石、腫瘤阻塞致「結合型(直接)膽紅素」上升、灰白便、茶色尿。膽結石屬「阻塞性」黃疸,非溶血性,故為錯誤。","options":{"A":"正確。嚴重燒傷致紅血球破壞→溶血性黃疸。","B":"正確。紅血球破壞增加。","C":"正確。輸血反應致溶血。","D":"錯誤(本題答案)。膽結石致阻塞性黃疸,非溶血性。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"101110-N3-65":{"quick":"Propranolol是「非選擇性β阻斷劑」,降低門脈壓;非α阻斷劑、非維持門脈壓。","detail":{"background":"食道靜脈曲張出血藥物治療目的為「降低門脈壓力」：vasopressin/terlipressin收縮內臟血管、somatostatin/octreotide減少內臟血流；非選擇性β阻斷劑(propranolol)用於預防再出血，降低心輸出與內臟血流。","options":{"A":"正確。Vasopressin收縮血管平滑肌,易致心肌梗塞。","B":"正確。Somatostatin控制出血好且無明顯血管收縮副作用。","C":"正確。Ranitidine是H2拮抗劑,減少胃酸。","D":"錯誤(本題答案)。Propranolol是「β」阻斷劑、用於「降低」門脈壓,非α阻斷劑也非維持門脈壓。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"102030-N3-13":{"quick":"Neomycin是抑制腸內產氨細菌(減少氨生成),非「保護菌叢助消化」。","detail":{"background":"肝性腦病變因肝衰竭使腸道氨等含氮物無法代謝、累積影響中樞；護理：急性期限制蛋白質、給lactulose與抗生素(rifaximin/neomycin)減少腸道產氨、矯正誘因(出血、感染、低鉀、便秘)、評估意識與撲動性震顫。","options":{"A":"正確。限蛋白40~60g/天。","B":"正確。記錄手寫/畫圖樣本監測神經學變化。","C":"正確。Lactulose降血氨。","D":"錯誤(本題答案)。Neomycin是「抑制」腸內產氨菌減少氨,非保護菌叢助消化。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"102030-N3-18":{"quick":"蜘蛛狀血管瘤與紅掌與「動情激素(estrogen)」代謝減少(堆積)相關。","detail":{"background":"肝硬化時肝臟對雌激素(estrogen/動情激素)的代謝/去活化能力下降,使體內雌激素相對過多,造成蜘蛛狀血管瘤(spider angioma)、手掌紅斑(palmar erythema/紅掌)、男性女乳(gynecomastia)、睪丸萎縮、體毛減少等女性化表徵。","options":{"A":"腎上腺素與此無關。","B":"正確(本題答案)。動情激素(estrogen)代謝減少致蜘蛛痣與紅掌。","C":"甲狀腺素與此無關。","D":"留鹽激素與腹水水腫相關,非蜘蛛痣。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"102110-N3-62":{"quick":"Child-Pugh分級指標:膽紅素、白蛋白、PT(INR)、腹水、肝性腦病變;「血清肌酸酐」非其指標(屬MELD)。","detail":{"background":"Child-Pugh分級評估肝硬化嚴重度,五項指標:①血清總膽紅素、②血清白蛋白、③凝血酶原時間(PT/INR)、④腹水量、⑤肝性腦病變程度,分A/B/C級。血清肌酸酐(creatinine)是「MELD分數」的指標(評估等待肝移植),並非Child-Pugh分級指標,故為錯誤。","options":{"A":"正確。腹水量為Child-Pugh指標。","B":"正確。肝性腦病變為指標。","C":"錯誤(本題答案)。血清肌酸酐屬MELD分數,非Child-Pugh指標。","D":"正確。凝血酶原時間為指標。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"103030-N3-14":{"quick":"S-B管壓力不可「持續加壓」,需間歇放鬆以防食道黏膜壞死。","detail":{"background":"食道球(Sengstaken-Blakemore管)以氣囊壓迫食道與胃底靜脈曲張止血；護理需固定維持牽引、定時監測氣囊壓力、床邊備剪刀(氣囊上移阻塞呼吸道時立即剪管)、防吸入性肺炎，屬暫時性止血措施。","options":{"A":"正確。各管道註明功用(食道氣囊、胃氣囊、抽吸管)。","B":"正確。定時抽吸口腔分泌物防吸入性肺炎。","C":"正確。食道氣囊壓力約20~40mmHg。","D":"錯誤(本題答案)。不可「持續」加壓,需間歇放鬆(每8~12小時)以免食道黏膜缺血壞死。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"103100-N3-16":{"quick":"肝癌危險因子:肝硬化、B肝、黃麴毒素、C肝、酒精;膽結石非肝癌危險因子。","detail":{"background":"肝細胞癌(HCC)危險因子:慢性B型/C型肝炎、肝硬化(任何病因)、黃麴毒素(Aflatoxin,污染花生玉米)、長期酗酒、非酒精性脂肪肝、糖尿病、血色素沉著症。膽結石與膽道疾病/膽囊癌相關,並非「肝細胞癌」的危險因子,故為錯誤。 補充：台灣肝癌九成以上與B/C肝及肝硬化相關;黃麴毒素污染花生玉米、酗酒、脂肪肝、糖尿病亦為危險因子;高危險群應每6個月做腹部超音波+AFP篩檢。膽結石屬膽道疾病非肝癌因子。","options":{"A":"正確。肝硬化為主要危險因子。","B":"正確。B肝病毒感染。","C":"正確。黃麴毒素。","D":"錯誤(本題答案)。膽結石非肝癌危險因子。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"104030-N3-16":{"quick":"長期用furosemide要監測「低血鈉/低血鉀」(非高血鈉);spironolactone為腹水第一線。","detail":{"background":"肝硬化腹水護理：限鈉(約2g/天)與依醫囑限水、每日測體重與腹圍評估治療反應、半坐臥減輕呼吸困難、保護皮膚；利尿劑(以spironolactone為主)需監測電解質；大量腹水可治療性腹腔穿刺並補白蛋白。","options":{"A":"正確。每天測體重、腹圍、I/O。","B":"正確。叩診移動性濁音/液體波動確認腹水。","C":"錯誤(本題答案)。長期用furosemide應監測「低血鈉、低血鉀」,非高血鈉。","D":"正確。Spironolactone(保鉀利尿)為腹水第一線藥。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"104030-N3-18":{"quick":"蜘蛛狀痣與男性女乳因「動情激素(Estrogen)」代謝改變(相對過多)。","detail":{"background":"肝硬化時肝對雌激素去活化能力下降,雌激素相對過多→蜘蛛狀痣、男性女乳、紅掌、睪丸萎縮。雄性素(testosterone)則相對下降。Aldosterone與腹水水腫相關。Prolactin與此非主因。 補充：肝硬化對雌激素去活化能力下降,雌激素相對過多致蜘蛛痣、紅掌、男性女乳、睪丸萎縮、體毛減少;雄性素相對下降。這些屬慢性肝病的皮膚與內分泌徵象。","options":{"A":"Aldosterone與腹水水腫相關。","B":"正確(本題答案)。Estrogen代謝改變致蜘蛛痣與男性女乳。","C":"Prolactin非主因。","D":"Testosterone是相對下降,非致蜘蛛痣主因。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"105030-N3-13":{"quick":"肝性腦病變病人應「預防便秘」(減少氨吸收/生成);肝昏迷應限蛋白、初期非昏睡不醒。","detail":{"background":"肝硬化照護:①肝昏迷(肝性腦病變)病人應採高熱量、「限制蛋白(40~60g)」、適量脂肪、低鈉飲食(非高蛋白);②初期肝性腦病變表現為性格改變、嗜睡、撲翼震顫,「可被喚醒」(末期才昏迷不醒);③應預防便秘以減少腸道氨的生成與吸收(用lactulose);④蜘蛛痣、男性女乳屬肝硬化表徵但睪丸是「萎縮」非腫脹。","options":{"A":"錯誤。肝昏迷應「限蛋白」,非高蛋白。","B":"錯誤。初期肝性腦病變嗜睡但可喚醒,非昏睡不醒。","C":"正確(本題答案)。預防便秘以防症狀惡化。","D":"錯誤。肝硬化是睪丸「萎縮」,非腫脹。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"105090-N3-14":{"quick":"腹水病人床頭抬高約30~45度即可(半坐臥助呼吸);80度過高不適當。","detail":{"background":"肝硬化合併腹水護理：採低鈉飲食、限水、抬高床頭利呼吸、監測體重腹圍與電解質；使用保鉀利尿劑spironolactone預防低血鉀；避免使用會加重肝腦病變或腎損之藥物；觀察自發性腹膜炎徵象。","options":{"A":"正確。每天定時量體重。","B":"正確。監測利尿劑成效。","C":"正確。依醫囑限水。","D":"錯誤(本題答案)。床頭抬高約30~45度半坐臥即可,80度過高不適當。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"105090-N3-9":{"quick":"黃疸表徵:茶色尿、皮膚搔癢、鞏膜黃;阻塞性黃疸糞便為「灰白(陶土)色」非橘色便。","detail":{"background":"黃疸(膽紅素>2~3mg/dL)表徵:鞏膜與皮膚黃染、茶色(深黃)尿(尿膽紅素增加)、皮膚搔癢(膽鹽沉積);阻塞性黃疸因膽汁無法入腸,糞便呈「灰白色(陶土色)」,並非橘色便,故為錯誤。 補充：黃疸是膽紅素>2~3 mg/dL沉積組織所致;表徵為鞏膜與皮膚黃染、茶色尿(尿膽紅素增加)、膽鹽沉積致搔癢;阻塞性黃疸因膽汁不入腸使糞便呈灰白(陶土)色,非橘色便。","options":{"A":"正確。茶色尿。","B":"正確。膽鹽沉積致皮膚搔癢。","C":"正確。鞏膜黃染。","D":"錯誤(本題答案)。阻塞性黃疸糞便為灰白(陶土)色,非橘色便。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"106030-N3-12":{"quick":"肝硬化腹水機轉中,血漿膠體滲透壓是「下降」非增加。","detail":{"background":"肝硬化腹水形成機轉：①門脈高壓增腸繫膜靜水壓②肝合成白蛋白減少使血漿膠體滲透壓下降③有效血量下降活化醛固酮/ADH致鈉水滯留④肝臟對醛固酮代謝減少使其作用延長，共同促成腹水。","options":{"A":"正確。門脈高壓。","B":"正確。留鹽激素(醛固酮)增加。","C":"錯誤(本題答案)。白蛋白減少使膠體滲透壓「下降」,非增加。","D":"正確。血清蛋白(白蛋白)減少。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"106110-N3-15":{"quick":"腹水病人需「限鈉限水」,並非飲食不需限制。","detail":{"background":"肝硬化腹水居家照護衛教：每日固定時間量體重與腹圍、低鈉(避免醃漬加工食品)、依醫囑服利尿劑並回診監測電解質、皮膚保養避免破損；出現發燒腹痛(疑自發性腹膜炎)或意識改變應立即就醫。","options":{"A":"正確。每日監測體重及腹圍。","B":"正確。勿舉重過勞。","C":"錯誤(本題答案)。腹水病人需限鈉、限水,並非飲食不需限制。","D":"正確。不可隨意服藥(經肝代謝)。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"106110-N3-9":{"quick":"手掌紅斑(紅掌)因肝對「動情激素」代謝減少致雌激素相對過多。","detail":{"background":"肝硬化手掌紅斑(palmar erythema)成因為肝臟對雌激素(estrogen)的代謝/去活化能力下降,雌激素相對增加致皮膚微血管擴張。同機轉造成蜘蛛痣、男性女乳。 補充：手掌紅斑(palmar erythema)因肝對雌激素代謝下降、雌激素相對過多致皮膚微血管擴張;同機轉造成蜘蛛痣、男性女乳,皆為慢性肝病/肝硬化的皮膚徵象。","options":{"A":"門靜脈高壓與腹水/靜脈曲張相關,非紅掌主因。","B":"非感染所致。","C":"膽紅素堆積致黃疸/搔癢,非紅掌。","D":"正確(本題答案)。肝臟荷爾蒙(雌激素)代謝減少→紅掌。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"106111-N3-12":{"quick":"食道靜脈曲張破裂應「優先止血」;不可服鎮靜安眠藥(恐誘發肝腦病變)。","detail":{"background":"食道靜脈曲張為肝硬化門脈高壓使血液經側枝循環(胃左靜脈→食道下段靜脈叢)回流形成的曲張靜脈，易破裂大量出血；誘因包括用力、粗硬食物、嘔吐與腹壓上升，是肝硬化上消化道出血的主因。","options":{"A":"正確。為肝硬化上消化道出血主因。","B":"正確。破裂出血時首要止血。","C":"正確。可輸新鮮冷凍血漿補凝血因子。","D":"錯誤(本題答案)。不可服鎮靜安眠藥(經肝代謝、恐誘發肝性腦病變)。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"107030-N3-15":{"quick":"TAE副作用為栓塞後發燒(post-embolization syndrome),術後需監測體溫。","detail":{"background":"肝動脈栓塞(TAE/TACE)利用肝癌主要由「肝動脈」供血之特性,經導管注入栓塞物(±化療藥)阻斷腫瘤血流使其缺血壞死。術後常見「栓塞後症候群」:發燒、右上腹痛、噁心(故需監測體溫);術後須平躺、穿刺處加壓止血、勿立即下床;適用於無法手術切除但肝功能尚可、無門脈主幹阻塞者(門脈阻塞為相對禁忌,非適用所有肝癌)。","options":{"A":"錯誤。術後需平躺、穿刺處止血,不可立即下床。","B":"正確(本題答案)。副作用為發燒,術後監測體溫。","C":"錯誤。是栓塞「肝動脈」血流,非堵肝門靜脈。","D":"錯誤。非適用「所有」肝癌(門脈主幹阻塞、肝衰竭為禁忌)。"},"sources":["新文京《內外科護理學》肝硬化與門脈高壓","華杏《內外科護理學》肝性腦病變/肝癌","AASLD Cirrhosis / HCC Guideline"]}},"107110-N3-15":{"quick":"肝硬化合併症:腹水、肝性腦病變、食道靜脈曲張、出血;「高血壓」非其合併症(是門脈高壓)。","detail":{"background":"肝硬化主要合併症:門脈高壓(食道胃靜脈曲張出血、脾腫大、痔)、腹水、肝性腦病變、自發性細菌性腹膜炎、肝腎症候群、凝血障礙、黃疸、肝細胞癌。是「門脈」高壓而非全身性「高血壓」,故「高血壓」為錯誤合併症。 補充：肝硬化合併症源於門脈高壓與肝功能不全—食道胃靜脈曲張出血、腹水、脾腫大、肝性腦病變、自發性細菌性腹膜炎、肝腎症候群、凝血障礙、肝癌;是「門脈」高壓而非全身性高血壓。","options
