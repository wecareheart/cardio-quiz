,"system_name":"急重症與圍手術期","topic_code":"T10","topic":"T10環境急症多重外傷與圍手術期","q_num":48,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"熱中暑(heat stroke)","B":"熱性痙攣(heat cramp)","C":"熱衰竭(heat exhaustion)","D":"熱暈厥(heat syncope)"},"img":""}],E={"101030-N3-61":{"quick":"蒸氣燙傷、傷口紅、劇痛、有滲液與水腫且深及真皮深層→深層性部分皮層燒傷(深二度)。","detail":{"background":"燒傷深度依受損達到的皮膚層次分四級。一度(表淺)僅傷及表皮，皮膚發紅、乾燥、疼痛、無水泡，約3～7天癒合不留疤(如曬傷)。淺二度(表淺部分皮層)傷及表皮與真皮乳頭層，鮮紅濕潤、有水泡、劇痛，約10～21天癒合、少疤。深二度(深層部分皮層)傷及真皮網狀層，呈紅白相間或灰白、有水泡、痛覺較鈍但仍痛、滲液與水腫明顯，需3～4週以上且易增生疤痕與攣縮，常需植皮。三度(全皮層)整層表皮真皮連同附屬器破壞，乾燥、皮革狀焦痂、蠟白或焦黑、受壓不變蒼白、因神經破壞而無痛，無法自行癒合。蒸氣屬高熱且接觸時間久，常造成較深的部分皮層損傷；本題傷口有明顯滲液與水腫、深及真皮，故歸為深二度。","options":{"A":"焦痂(eschar)是三度全皮層燒傷壞死組織的外觀，乾燥皮革狀、無滲液，與本題濕潤紅腫不符。","B":"全皮層(三度)應為乾燥、皮革狀、無痛、受壓不變蒼白，與本題劇痛、滲液不符。","C":"表淺性部分皮層(淺二度)癒合快、約2週、疤痕少；本題滲液水腫明顯、損傷較深，超過淺二度範圍。","D":"正確。深層性部分皮層(深二度)達真皮深層，紅、痛、水泡、滲液與水腫明顯，癒合慢且易留疤。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"102110-N3-33":{"quick":"電燒傷以「組織電阻越大產熱越多、傷害越重」為核心，故選阻力愈大組織傷害愈嚴重。","detail":{"background":"電燒傷的嚴重度取決於電壓、電流、電阻、接觸時間與電流路徑。依焦耳定律產熱量與組織電阻成正比，電阻由小到大為神經、血管、肌肉、皮膚、肌腱、脂肪、骨骼，電阻大的組織(如骨骼)產生的熱最多、周邊組織傷害最重，因此電燒傷常呈「外表小、內部廣」的冰山現象，皮膚外觀無法反映深部破壞。交流電(AC)較同電壓直流電危險，因會引起肌肉強直收縮使患者無法放手、延長接觸並易誘發心室顫動。電流通過可造成橫紋肌溶解、肌球蛋白尿與急性腎小管壞死，並導致心律不整，需大量輸液、鹼化尿液與心電圖監測。","options":{"A":"錯誤。電燒傷深部損傷遠大於體表，無法只憑皮膚外觀評估受傷程度。","B":"正確。電阻愈大的組織產熱愈多、傷害愈嚴重(骨骼周邊組織受損最重)。","C":"錯誤。交流電(AC)較直流電(DC)危險，而非直流電造成傷害較嚴重。","D":"錯誤。血管、神經電阻最小、最易導電，但「傷害最嚴重」的是電阻大、產熱多的組織。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"103030-N3-45":{"quick":"錯誤者：因燒傷急性期是水腫造成體重「上升」，且每天監測體重非電燒傷的重點處置。","detail":{"background":"電燒傷護理重點在於評估深部組織損傷與兩大致命併發症：橫紋肌溶解導致的急性腎衰竭，與電流通過心臟造成的心律不整(含心室顫動、心跳停止)。因此須評估電流對肌肉、骨骼、內臟的破壞，監測尿量與尿色(肌球蛋白尿呈茶色)以早期發現急性腎小管壞死，並持續心電圖監測心律不整。燒傷後48～72小時內處於體液復甦期，因微血管通透性增加、體液滲入組織間隙而呈現水腫、體重上升，並非體重下降；雖然燒傷後期會進入高代謝狀態，但急性期監測重點是尿量、心律與循環，而非每日體重。","options":{"A":"正確處置。須評估電流對肌肉、骨骼、器官造成的深部損傷。","B":"正確處置。監測尿量以評估是否發生急性腎衰竭(肌球蛋白沉積致ATN)。","C":"正確處置。電流通過心臟可致心律不整，須持續監測心率心律。","D":"錯誤(本題答案)。急性期因液體滲漏造成水腫、體重上升；每日測體重非電燒傷急性照護重點。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"104030-N3-46":{"quick":"錯誤者：燒傷壓力反應使血糖「上升」(高血糖)，非低血糖。","detail":{"background":"大面積燒傷初期48小時為體液復甦(休克)期，主要病生理是微血管通透性大幅增加，血漿與蛋白滲入組織間隙，造成局部水泡與全身性水腫、血管內容積急遽流失而出現低血容積性休克，心輸出量降低、腎臟灌流不足而易引發急性腎小管壞死與少尿。此時交感神經與壓力荷爾蒙(腎上腺素、皮質醇、升糖素)大量分泌，造成高代謝與高血糖，而非低血糖；細胞破壞釋出鉀離子使初期呈高血鉀，鈉隨液體移入組織間隙而呈低血鈉。","options":{"A":"正確。微血管通透性增加形成水泡與水腫。","B":"正確。血漿流失使心輸出量降低、易致低血容積休克。","C":"正確。腎灌流不足可引起急性腎衰竭。","D":"錯誤(本題答案)。應是壓力反應導致「高血糖」，而非低血糖。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"104100-N3-47":{"quick":"錯誤者：燒傷早期細胞破壞釋鉀，應為「高血鉀」而非血鉀過低。","detail":{"background":"燒傷後心血管系統變化以「燒傷休克」為核心：傷後微血管通透性增加，血漿、電解質與蛋白滲漏至組織間隙形成水泡與水腫，當燒傷面積超過15～20%體表面積時數小時內可發生全身性水腫；血管內容積急速流失造成早期低血容積、心輸出量下降、脈搏淺快、中心靜脈壓下降。電解質方面，組織與紅血球破壞釋出大量鉀離子，初期(48小時內)呈高血鉀，可影響心臟傳導；待利尿期(約48～72小時後)液體回到血管、鉀隨尿流失才轉為低血鉀。","options":{"A":"正確。微血管通透性增加形成水泡與水腫。","B":"正確。面積超過15～20%數小時內可全身水腫。","C":"正確。早期血漿流失造成低血容積。","D":"錯誤(本題答案)。早期為高血鉀(細胞釋鉀)，非血鉀過低。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"105090-N3-48":{"quick":"灰白色、無彈性、大面積水泡→深二度燒傷，癒合約需3～4週。","detail":{"background":"深二度(深層部分皮層)燒傷傷及真皮網狀層，外觀常呈蒼白、灰白或紅白相間、表面無彈性、可有水泡，因部分神經末梢受損而痛覺較鈍但仍有疼痛；因殘存的毛囊、汗腺等附屬器較少，癒合需3～4週以上，且易產生肥厚性疤痕與關節攣縮，臨床上常考慮植皮以縮短病程、減少疤痕。對照一度3～7天、淺二度約2週可自行癒合不需植皮；三度為乾燥皮革狀焦痂、無水泡、無痛、無法自行癒合需植皮。本題仍有水泡且無焦痂，故為深二度而非三度。","options":{"A":"錯誤。一度僅表皮受損、發紅無水泡，3～5天癒合，與灰白大水泡不符。","B":"錯誤。淺二度鮮紅濕潤、約2週癒合，本題灰白無彈性屬更深層。","C":"正確。深二度燒傷，傷口癒合約需3～4週。","D":"錯誤。三度為乾燥皮革狀焦痂、無水泡；本題仍有水泡，非三度。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"106110-N3-45":{"quick":"正確描述：三度燒傷皮膚乾燥、受壓不變蒼白、呈皮革狀焦痂。","detail":{"background":"各燒傷深度臨床表徵：表淺部分皮層(淺二度)鮮紅、濕潤、有水泡、劇烈疼痛；深二度呈灰白或紅白相間、痛覺較鈍；三度(全皮層)整層真皮與附屬器破壞，皮膚乾燥、蠟白或焦黑、呈皮革狀焦痂、受壓不會變蒼白(微血管已破壞)、因神經末梢破壞而無痛或僅深部鈍痛；四度更深及肌肉骨骼、焦黑炭化、無痛。判斷深度時「受壓是否變蒼白(blanching)」與「痛覺」是重要指標：能變蒼白且劇痛多為部分皮層，不變蒼白且無痛多為全皮層。","options":{"A":"錯誤。表淺部分皮層應為「劇烈疼痛」，非僅中重度疼痛。","B":"錯誤。四度燒傷因神經破壞應為「無痛」，非中重度疼痛。","C":"錯誤。深二度多呈灰白、紅白相間、痛覺較鈍，非粉紅紅腫劇痛(此較像淺二度)。","D":"正確。三度乾燥、皮革狀焦痂、受壓不變蒼白、無痛。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"107030-N3-44":{"quick":"成人20%部分皮層(二度)燒傷→屬中度燒傷。","detail":{"background":"依美國燒傷學會分級，成人燒傷嚴重度約略為：輕度=部分皮層<15%體表面積、全皮層<2%；中度=部分皮層15～25%、全皮層2～10%(且不在臉、手、腳、會陰、關節)；重度(major)=部分皮層>25%、全皮層>10%，或臉/手/腳/會陰/重要關節燒傷、電燒傷、合併吸入性損傷或重大外傷、嬰幼兒與老人或合併內科疾病者。本題王先生20%部分皮層、位於雙下肢，落在15～25%部分皮層範圍，故為中度燒傷。","options":{"A":"錯誤。輕度為部分皮層<15%，本題20%已超過。","B":"正確。部分皮層15～25%屬中度燒傷。","C":"錯誤。重度需>25%部分皮層或>10%全皮層或特殊部位/吸入損傷等。","D":"錯誤。並非標準分級用語，且未達重度標準。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"107110-N3-47":{"quick":"錯誤者：二度燒傷不一定「不留疤」，深二度常留疤甚至需植皮。","detail":{"background":"不同深度的癒合與疤痕：一度僅表皮受損，數天內由基底層細胞再生，癒合後不留疤；淺二度約2週可自行癒合、疤痕少；深二度傷及真皮深層，癒合慢(>3～4週)且易產生肥厚性疤痕與攣縮，臨床常需植皮。三度全皮層破壞、無殘存上皮再生來源，無法自行癒合，需皮膚移植；四度深及肌肉骨骼，需皮瓣移植甚至截肢。因此把「二度燒傷可自行癒合且不會有疤痕」一概而論並不正確——這只適用於淺二度。","options":{"A":"正確。一度可自行癒合且不留疤。","B":"錯誤(本題答案)。深二度會留疤、常需植皮，不能說二度都不留疤。","C":"正確。三度無法自行癒合，需皮膚移植。","D":"正確。四度需皮膚或皮瓣移植。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"107110-N3-48":{"quick":"錯誤者：燒傷初期腎絲球過濾率「下降」而非增加。","detail":{"background":"大面積燒傷初期(48小時內)對腎臟的影響源於兩個機轉：一是血漿大量流失造成低血容積、腎血流與腎絲球過濾率(GFR)下降，導致少尿、尿濃縮、尿比重上升；二是肌肉與紅血球破壞釋出大量肌球蛋白(myoglobin)與血紅素，於酸性尿中沉積形成色素圓柱阻塞腎小管，造成急性腎小管壞死(ATN)。因此復甦期須足量輸液維持尿量(成人約0.5～1 mL/kg/hr、電燒傷或血紅素尿時更高)、必要時鹼化尿液，以沖洗色素、預防永久性腎損傷。","options":{"A":"正確。組織破壞釋肌球蛋白，可引起急性腎小管壞死。","B":"錯誤(本題答案)。初期GFR下降(非上升)而導致少尿、急性腎衰竭。","C":"正確。腎灌流不足出現少尿、尿比重增加。","D":"正確。需足量補液維持尿量以防永久性腎損傷。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"109030-N3-41":{"quick":"錯誤者：燒傷初期低血容積使中心靜脈壓「下降」，非升高。","detail":{"background":"燒傷初期48小時對心血管的影響由「燒傷休克」主導：微血管通透性增加使血漿滲入組織間隙，造成全身性水腫與血管內容積流失，結果是中心靜脈壓(CVP)下降、心輸出量減少、血壓下降、脈搏淺快(代償性心搏過速)。此外傷後早期可能有心肌抑制因子使心收縮力降低，更加重心輸出量下降。CVP是評估前負荷與輸液是否足夠的指標，初期偏低，隨著復甦補液與後期液體回流才逐漸回升。","options":{"A":"錯誤(本題答案)。初期低血容積使中心靜脈壓下降，非升高。","B":"正確。心輸出量減少。","C":"正確。微血管通透性增加致全身性水腫。","D":"正確。代償性脈搏淺快。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"111030-N3-47":{"quick":"錯誤者：三度(全皮層)燒傷因神經破壞應「無痛」，非劇烈疼痛。","detail":{"background":"燒傷深度與疼痛的關係是常考重點：一度傷及表皮、神經末梢完整，有疼痛；二度傷及真皮、神經末梢暴露或受刺激，淺二度劇痛、深二度痛覺較鈍；三度全皮層連同真皮內神經末梢一併破壞，故傷口本身「無痛或僅深部鈍痛」，反而是周邊較淺的二度區域疼痛；四度更深及肌肉骨骼亦無痛。臨床判讀時，「無痛、乾燥、皮革狀、受壓不變蒼白」是全皮層燒傷的指標。","options":{"A":"正確。一度表皮受損、有疼痛感。","B":"正確。二度傷及真皮、會疼痛(淺二度劇痛)。","C":"錯誤(本題答案)。三度全皮層神經破壞應為無痛，而非劇烈疼痛。","D":"正確。四度深及肌肉骨骼、神經破壞、無痛感。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"111110-N3-47":{"quick":"錯誤者：燒傷後48～72小時進入利尿期，應是血比容「下降」、尿量增加。","detail":{"background":"燒傷的體液變化分兩期。復甦(休克)期(0～48小時)：微血管通透性增加、血漿外滲，造成血液濃縮(血比容上升)、低血容積、少尿、尿濃縮、尿比重上升；細胞破壞釋鉀致高血鉀，須密切監測以免心律不整。利尿(液體回流)期(約48～72小時後)：微血管通透性恢復、組織間液回到血管內，血液被稀釋使血比容下降、尿量增加，鉀隨尿流失轉為低血鉀、鈉因稀釋而下降。另外，燒傷後可因應激性胃黏膜病變出現庫林氏潰瘍(Curling ulcer)，常在傷後數日內發生。","options":{"A":"正確。48小時內須監測高血鉀以防危及心臟。","B":"正確。初期少尿、尿濃縮、尿比重增加。","C":"正確。應激性壓力性潰瘍(Curling ulcer)可在傷後數日出現。","D":"錯誤(本題答案)。48～72小時為利尿期，血比容應下降、尿量增加，而非升高與少尿。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"112110-N3-45":{"quick":"正確：交流電(AC)造成的傷害較同電壓直流電嚴重。","detail":{"background":"電燒傷損傷特性：交流電(AC)在同電壓下較直流電(DC)危險，因AC引起肌肉強直收縮使患者「抓住電源無法放手」延長接觸時間，且更易誘發心室顫動。電流通過身體會造成深部組織廣泛破壞，不僅在入口與出口處——電流沿阻力最小路徑(神經、血管)傳導並在高電阻組織(骨骼)周邊產生大量熱能，造成「外表小、內部大」的傷害。組織電阻由小到大為神經<血管<肌肉<皮膚<脂肪<骨骼，電阻越大產熱越多、損傷越嚴重。","options":{"A":"錯誤。損傷不只在入口出口，電流通過全程造成深部廣泛破壞。","B":"正確。交流電較直流電傷害嚴重(肌肉強直無法放手、易致心室顫動)。","C":"錯誤。電阻大的組織產熱多、更易造成損傷，而非不易。","D":"錯誤。骨骼電阻大於血管(電阻順序血管<肌肉<皮膚<脂肪<骨骼)。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"113030-N3-28":{"quick":"四度熱燒傷因神經破壞，「急性疼痛」相對較不常發生。","detail":{"background":"四度燒傷深及全皮層、皮下脂肪、肌肉甚至骨骼，神經末梢已完全破壞，故傷口本身多為無痛或僅深部鈍痛，急性劇烈疼痛反而較不常出現(疼痛多來自周邊較淺的二度區域)。反觀大面積燒傷常見且須優先處理的健康問題包括：因皮膚屏障喪失與蒸發散熱造成體溫過低；微血管通透性增加致大量體液流失與低血容積；皮膚保護喪失加上組織壞死造成的潛在性感染風險。故「急性疼痛」相對於其他三者較不常發生。","options":{"A":"常見。皮膚屏障喪失與大量蒸發散熱導致體溫過低。","B":"常見。微血管滲漏造成體液容積缺失。","C":"較不常發生(本題答案)。四度神經破壞、傷口本身多無痛。","D":"常見。皮膚屏障喪失與壞死組織造成潛在感染風險。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"113180-N3-28":{"quick":"本題一律給分：燒傷初期血液濃縮使血比容上升，血紅素變化(破壞↓/濃縮↑)易生爭議。","detail":{"background":"燒傷初期(復甦期)因微血管通透性增加、血漿外滲，血液被濃縮，血比容(Hct)上升是典型表現。至於血紅素(Hb)，一方面熱與機械破壞使紅血球溶解、Hb可下降；另一方面血液濃縮又使測得值相對偏高，方向取決於失血/破壞與濃縮何者主導，臨床上不一定一致。由於選項對Hb方向的描述存在爭議(原訂答案A為血紅素降低、血比容升高)，本題公告為一律給分。重點觀念是：燒傷急性期最一致的是「血液濃縮、血比容上升」，並會出現高血鉀、低血鈉。","options":{"A":"原訂答案。血紅素因紅血球破壞下降、血比容因濃縮上升(屬可接受)。","B":"血比容升高為真；血紅素方向因濃縮亦可能升高，故併入給分。","C":"血比容下降與初期濃縮不符，但因整體爭議一律給分。","D":"血比容下降與初期濃縮不符，但因整體爭議一律給分。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"104100-N3-44":{"quick":"錯誤者：合併吸入性損傷屬「重度」燒傷，非中度。","detail":{"background":"美國燒傷學會嚴重度分級中，凡合併吸入性損傷、電燒傷、合併重大外傷，或燒傷在臉、手、腳、會陰、重要關節等特殊部位者，無論面積大小皆歸為重度(major)燒傷，須轉送燒傷中心。成人面積標準約為：部分皮層15～25%、全皮層2～10%(不在特殊部位)屬中度；部分皮層>25%或全皮層>10%屬重度。吸入性損傷因會引起呼吸道水腫、阻塞與肺損傷、死亡率高，故一律列為重度。","options":{"A":"錯誤(本題答案)。合併吸入性損傷屬重度燒傷，非中度。","B":"正確。成人2～10%體表面積的三度(全皮層)燒傷屬中度。","C":"正確。臉部或會陰部的二到三度燒傷屬重度。","D":"正確。電擊傷一律歸為重度燒傷。"},"sources":["新文京《內外科護理學》燒傷照護","美國燒傷學會(ABA)燒傷深度與嚴重度分級"]}},"101110-N3-31":{"quick":"燒傷補液目標：脈搏<110次/分、尿量維持30～50 mL/小時。","detail":{"background":"燒傷體液復甦的目標是維持足夠的器官灌流，臨床以「尿量」為最重要、最敏感的指標——成人理想尿量約0.5～1 mL/kg/hr，即30～50 mL/小時(兒童約1 mL/kg/hr，電燒傷或血紅素/肌球蛋白尿時須提高至75～100 mL/hr以沖洗色素)。其他指標包括脈搏維持在110次/分以下、收縮壓>90～100 mmHg、神智清楚、血比容回到正常範圍、無代謝性酸中毒。補液過少會導致器官低灌流，過多則造成肺水腫與腔室症候群，故須依尿量「動態調整」輸液速度，而非死守公式。","options":{"A":"尿量50 mL/hr以上偏高、脈搏120偏快，非標準目標。","B":"正確。脈搏<110次/分、尿量30～50 mL/小時為復甦目標。","C":"尿量30 mL/小時以下代表灌流不足，是復甦不足的表現。","D":"脈搏<100、尿量50～60偏離標準範圍。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"102030-N3-45":{"quick":"正確者為3、4：須監測CVP、維持尿量≥30 mL/hr；帕克蘭用乳酸林格液(不含葡萄糖/膠體)、依體重與面積計算。","detail":{"background":"第一個24小時燒傷補液以帕克蘭公式為準：4 mL ×體重(kg)×燒傷面積(%TBSA)的乳酸林格氏液(晶體液)，前8小時(自受傷時起算)給一半、後16小時給另一半。第一個24小時只用晶體液，「不」加葡萄糖液與膠體(膠體會從通透性增加的微血管漏出，第二個24小時才考慮給膠體)。計算只需「體重與燒傷面積」，與身高無關。補液過程須依尿量(成人≥30 mL/hr)與中心靜脈壓等血流動力學指標動態調整。故敘述3(觀察CVP)與4(尿量≥30)正確，1(補葡萄糖及膠體)與2(用身高計算)錯誤，答案為3、4。","options":{"A":"12錯誤：1補葡萄糖膠體、2用身高皆錯。","B":"14錯誤：含錯誤的敘述1。","C":"23錯誤：含錯誤的敘述2(用身高)。","D":"正確。3監測CVP、4維持尿量≥30 mL/hr皆正確。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"102110-N3-32":{"quick":"錯誤者：中心靜脈壓正常值約5～12 cmH₂O(≈2～8 mmHg)，寫成「5～12 mmHg」單位錯誤。","detail":{"background":"燒傷給液是否足夠，可由多項指標判斷：尿量30～50 mL/小時、收縮壓維持90～110 mmHg、神智與定向力清楚、脈搏<110次/分、中心靜脈壓(CVP)在正常範圍。CVP的正常值以「公分水柱(cmH₂O)」表示約為5～12 cmH₂O，換算為毫米汞柱(mmHg)約2～8 mmHg(1 mmHg≈1.36 cmH₂O)。選項把CVP寫成「5～12 mmHg」是把cmH₂O的數值錯置到mmHg，數值偏高、單位錯誤，故為錯誤敘述。","options":{"A":"正確。尿量30～50 mL/小時是適當灌流的指標。","B":"正確。收縮壓維持90～110 mmHg屬合理範圍。","C":"錯誤(本題答案)。CVP正常約5～12 cmH₂O(≈2～8 mmHg)，非5～12 mmHg。","D":"正確。對人、時、地定向力清楚代表腦灌流足夠。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"103100-N3-45":{"quick":"錯誤者：老人或心肺功能差者「不是」一律給公式半量，而應依尿量等指標審慎滴定。","detail":{"background":"燒傷輸液以面積與體重套公式(如帕克蘭4 mL×kg×%TBSA)計算起始量，再以尿量為主要指標動態調整；第一個24小時與第二個24小時的補液內容與速率不同(前24小時晶體液、前8小時給半量；後24小時減速並可加膠體與維持液)。對於老人、嬰幼兒或心肺功能異常者，並非「直接給公式一半」——這樣可能導致復甦不足、器官低灌流；正確作法是「照公式起算、但更密切監測尿量與CVP、放慢速度避免肺水腫」，依反應個別調整。故「輸液量為公式的一半」是錯誤敘述。","options":{"A":"正確。依燒傷面積與體重套公式估算補充量。","B":"錯誤(本題答案)。老人/心肺異常者不應一律給半量，而須依尿量審慎調整。","C":"正確。第一與第二個24小時的補液量與內容不同。","D":"正確。尿量是評估補液是否足夠的重要指標。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"105030-N3-80":{"quick":"九的法則：左上肢9%＋左下肢正面9%＋軀幹正面18%＝36%。","detail":{"background":"成人「九的法則」估算燒傷面積：頭頸9%、每側上肢9%(前4.5、後4.5)、軀幹前18%、軀幹後18%、每側下肢18%(前9、後9)、會陰1%。本題陳小姐燒傷部位為左上肢(全)9%、左下肢「正面」9%、軀幹「正面」18%，合計9＋9＋18＝36%。九的法則適合成人快速估算，但兒童頭部比例較大、下肢較小，需改用Lund-Browder圖表才準確。","options":{"A":"18%僅軀幹正面，漏算上下肢。","B":"27%可能少算一個下肢正面或上肢。","C":"30%非本題部位加總。","D":"正確。9(左上肢)＋9(左下肢正面)＋18(軀幹正面)＝36%。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"108020-N3-43":{"quick":"復甦達標指標：尿量每小時50毫升(灌流足夠)。","detail":{"background":"燒傷體液復甦是否達標，最重要看「尿量」是否維持在成人約30～50 mL/hr(0.5～1 mL/kg/hr)。其他達標表現為：脈搏回到110次/分以下、血壓回穩、神智清楚、血比容回到正常(約35～45%)、尿比重正常(約1.010～1.020)、無代謝性酸中毒。選項中Hct 60%代表血液仍濃縮(復甦不足)、脈搏130代償性過快(不足)、尿比重1.035代表尿濃縮(灌流不足)，皆非達標；唯有尿量50 mL/hr代表灌流恢復，是正確的復甦目標。","options":{"A":"Hct 60%代表血液濃縮、復甦不足，非達標。","B":"脈搏130次/分為代償性過快，代表灌流不足。","C":"尿比重1.035代表尿濃縮、體液不足。","D":"正確。尿量每小時50毫升代表灌流足夠，是復甦達標指標。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"109110-N3-48":{"quick":"九的法則：軀幹正面18%＋右上肢前面4.5%＝22.5%。","detail":{"background":"計算燒傷面積時只計入「實際受傷」的部位。本題受傷處為軀幹正面(發紅有水泡，屬二度，計18%)與右上肢前面(灰白有水泡，計4.5%，因上肢前面為整支9%的一半)，合計18＋4.5＝22.5%。注意一度燒傷(僅發紅、無水泡)依慣例「不」計入燒傷面積，但本題軀幹正面已有大片水泡屬二度，故計入。九的法則中每側上肢9%、分前後各4.5%，本題只傷右上肢「前面」故取4.5%。","options":{"A":"18%僅算軀幹正面，漏算右上肢前面。","B":"正確。軀幹正面18%＋右上肢前面4.5%＝22.5%。","C":"27%可能把整支右上肢9%或多算面積。","D":"40.5%明顯高估。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"112180-N3-29":{"quick":"本題一律給分：Lund-Browder與九的法則計分標準不同，臀部、軀幹背面比例有差異。","detail":{"background":"Lund-Browder圖表依年齡細分各部位比例，比九的法則更精準(尤其兒童)。本題燒傷為後背部、右後上肢、左後上肢、左右臀部。若以九的法則估算：軀幹後18＋右上肢後4.5＋左上肢後4.5＝27，臀部另計約5%，合計約32%；但Lund-Browder中軀幹後側、臀部各有不同細分值(成人臀部每側約2.5%)，與九的法則數值不一致，導致各算法答案分歧。因選項對「以Lund-Browder計算」的標準答案有爭議，本題公告一律給分。重點是掌握兩種估面積方法的差異與適用對象。","options":{"A":"27%可能漏算臀部。","B":"原訂答案。約後背18＋雙後上肢9＋臀部5≈32%。","C":"36%偏高，估算方式不同。","D":"45%明顯高估。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"112180-N3-30":{"quick":"本題一律給分：承上題面積爭議；若以32%、65kg計帕克蘭，前8小時約4,160 mL。","detail":{"background":"帕克蘭公式：第一個24小時補液量＝4 mL×體重(kg)×燒傷面積(%TBSA)的乳酸林格氏液，前8小時(自受傷時起算)給一半。以承上題面積32%、體重65 kg計算：總量＝4×65×32＝8,320 mL，前8小時給一半＝4,160 mL(選項D)。但由於承上題燒傷面積本身有爭議(Lund-Browder與九的法則數值不同)，使本題計算結果亦受影響，故與上題一併公告一律給分。重點是熟記公式與「前8小時給半量」的時間分配。","options":{"A":"2,550 mL對應較小面積估值。","B":"3,650 mL對應其他面積估值。","C":"3,850 mL對應其他面積估值。","D":"原訂答案。4×65×32＝8,320 mL，前8小時半量＝4,160 mL。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"113100-N3-28":{"quick":"帕克蘭：總量12,000 c.c.的前8小時給一半＝6,000 c.c.。","detail":{"background":"帕克蘭公式將第一個24小時的總補液量分兩段：前8小時(自受傷時間起算，非自到院起算)給總量的一半，後16小時給另一半。本題已算出總量為12,000 c.c.，故前8小時應補12,000÷2＝6,000 c.c.，後16小時補6,000 c.c.。注意「前8小時自受傷起算」是常考重點——若病人到院時已過數小時，則須把剩餘時間內補完該給的量，速度要相應加快。","options":{"A":"3,000 c.c.為四分之一量，計算錯誤。","B":"4,000 c.c.為三分之一量，計算錯誤。","C":"正確。前8小時給一半＝12,000÷2＝6,000 c.c.。","D":"12,000 c.c.為全部24小時量，非前8小時量。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"114170-N3-27":{"quick":"九的法則：左上肢全部9%＋左下肢正面9%＋軀幹正面18%＝36%。","detail":{"background":"成人九的法則：頭頸9、每上肢9、軀幹前18、軀幹後18、每下肢18(前9後9)、會陰1。本題受傷部位為左上肢「全部」(9%)、左下肢「正面」(整支18%的一半即9%)、軀幹「正面」(18%)，合計9＋9＋18＝36%。判讀時務必看清是「全部」或「前/後面」——上肢前後各4.5、下肢前後各9，計錯前後是最常見失分點。","options":{"A":"18%僅軀幹正面。","B":"27%漏算一部位(如左下肢正面)。","C":"30%非本題加總。","D":"正確。左上肢9＋左下肢正面9＋軀幹正面18＝36%。"},"sources":["新文京《內外科護理學》燒傷體液復甦","美國燒傷學會帕克蘭公式(Parkland formula)與九的法則"]}},"102030-N3-43":{"quick":"開放式敷法常用於臉部、會陰部等不易包紮的部位。","detail":{"background":"燒傷傷口照護分開放式(暴露法)與閉鎖式(包紮法)。開放式敷法將傷口塗藥後暴露於空氣，使滲液乾燥形成保護性焦痂，便於觀察傷口與滲液，最適用於臉部、會陰部、單側軀幹等不易固定包紮的部位；缺點是病室須維持溫暖、保護隔離以防感染與失溫。閉鎖式(包紮)則以敷料覆蓋，適用於肢體與植皮(補皮)區，可固定移植皮、減少污染與疼痛。開放法的重點是保暖與無菌，而非促進藥物吸收或維持高濕度。","options":{"A":"錯誤。開放法目的在暴露乾燥、便於觀察，非促進藥物吸收。","B":"錯誤。開放法須維持環境溫暖乾燥，並非維持高濕度60%以上。","C":"錯誤。補皮(植皮)區需閉鎖式包紮以固定保護移植皮，不用開放法。","D":"正確。臉部、會陰等不易包紮處常用開放式暴露法。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"105090-N3-44":{"quick":"大面積燒傷劇痛應採「靜脈滴注嗎啡(Morphine IV)」。","detail":{"background":"大面積燒傷因組織水腫、周邊灌流不穩，肌肉與皮下注射的藥物吸收不規則、起效慢且不可預測，故急性劇痛時止痛藥應採「靜脈(IV)」途徑給予並小量滴定，首選嗎啡(morphine)。口服止痛起效太慢、無法處理10分劇痛；哌替啶(Demerol/meperidine)易蓄積具神經毒性代謝物(normeperidine)且效力較弱、非首選；無論Demerol或嗎啡走肌注、皮下都因吸收不穩而不適用於大面積燒傷。故靜脈滴注嗎啡最適宜。","options":{"A":"口服止痛起效慢，無法控制10分劇痛。","B":"肌肉注射吸收不規則、Demerol非首選。","C":"正確。靜脈滴注嗎啡，小量滴定、起效快可預測。","D":"皮下注射吸收不穩定、Demerol非首選。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"106110-N3-43":{"quick":"急性期止痛最適：morphine小劑量靜脈給予並滴定(IV every 5 min)。","detail":{"background":"嚴重燒傷急性期止痛原則為「靜脈、小劑量、頻繁滴定」，首選嗎啡。選項morphine 4 mg IV每5分鐘可依疼痛與生命徵象逐步調整、起效快，最適合急性劇痛；肌肉注射(IM)在組織水腫時吸收不可預測；meperidine口服效力弱且具normeperidine神經毒性；fentanyl貼片(Duragesic)為長效、適用於慢性穩定疼痛，起效慢、不適用於急性處置。","options":{"A":"正確。靜脈小劑量嗎啡頻繁滴定，最適合急性劇痛。","B":"肌肉注射吸收不穩，不適合急性期。","C":"meperidine口服效力弱、具代謝物神經毒性。","D":"fentanyl貼片為長效慢起效，用於慢性疼痛，非急性處置。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"106111-N3-44":{"quick":"肢體「環形(circumferential)全層燒傷」最易因焦痂壓迫造成腔室症候群。","detail":{"background":"腔室症候群指肢體腔室內壓力升高、超過微血管灌流壓，造成神經血管缺血。環形(circumferential)全層燒傷時，僵硬無彈性的焦痂如同止血帶環繞肢體，加上組織水腫使腔室壓上升，最易壓迫深部血流而引發腔室症候群與肢體缺血，須緊急焦痂切開術(escharotomy)減壓。評估以6P(疼痛、蒼白、無脈、感覺異常、麻痺、患肢冰冷)為主。本題25歲右上肢「環形燒傷」最符合此高危情境；耳、頸、足的局部燒傷較不易形成環繞壓迫。","options":{"A":"正確。右上肢環形燒傷的焦痂環繞壓迫，最易致腔室症候群。","B":"耳部局部燒傷不形成肢體環繞壓迫。","C":"頸部電燒傷風險在呼吸道與心律，非典型肢體腔室症候群。","D":"單一足部化學燒傷若非環形，壓迫風險較低。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"107110-N3-49":{"quick":"錯誤者：離開火場當下無呼吸異常「不代表」沒有吸入性灼傷，水腫可延遲數小時出現。","detail":{"background":"吸入性灼傷的呼吸道水腫與肺損傷常「延遲」數小時至24小時才表現，初期可無症狀，故不能因離開火場當下呼吸正常就排除。高度懷疑指標包括：臉部/頸部燒傷、鼻毛燒焦、聲音嘶啞、喘鳴、碳粒痰、密閉空間火場史；一旦出現呼吸窘迫應「及早」插管(待水腫加重後插管極困難)；意識不清、頭痛、噁心嘔吐須懷疑一氧化碳中毒。對疑似吸入性灼傷者應持續監測、給高濃度氧氣並備妥插管。","options":{"A":"正確。臉部燒傷應高度懷疑合併吸入性灼傷。","B":"正確。出現呼吸窘迫應及早插管以防水腫致氣道阻塞。","C":"正確。意識不清、頭痛、噁心嘔吐要懷疑一氧化碳中毒。","D":"錯誤(本題答案)。水腫可延遲出現，當下無症狀不能排除吸入性灼傷。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"108110-N3-41":{"quick":"燒傷靜脈給H₂受體阻斷劑(如Tagamet)目的：預防壓力性潰瘍(Curling ulcer)。","detail":{"background":"大面積燒傷是極度的生理壓力源，胃黏膜血流減少、胃酸相對增加，易發生應激性潰瘍，稱為庫林氏潰瘍(Curling ulcer)，可在傷後數日內出血。預防方式是抑制胃酸，給予H₂受體阻斷劑(cimetidine/Tagamet、ranitidine)或質子幫浦抑制劑，並早期腸道營養維持黏膜完整。H₂阻斷劑作用在減少胃酸分泌、保護胃黏膜，與促進腸蠕動、補充血容積或保護腎臟無關。","options":{"A":"錯誤。H₂阻斷劑抑制胃酸，不刺激腸蠕動。","B":"錯誤。預防低血容積靠輸液，非H₂阻斷劑。","C":"正確。抑制胃酸以預防壓力性(Curling)潰瘍。","D":"錯誤。腎保護靠輸液維持灌流，與H₂阻斷劑無關。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"108110-N3-42":{"quick":"錯誤者：水療水溫應接近體溫(約37°C)，26.6～29.4°C過低易致失溫。","detail":{"background":"水療(hydrotherapy)用於清除壞死組織、減少菌落、便於換藥與運動，可降低感染與疤痕形成。重點原則：水溫應接近體溫約37°C(過低使大面積燒傷病人失溫、過高加重組織傷害)；水中可加入優碘(Beta-iodine)抑菌、加入食鹽使接近生理鹽濃度以減少電解質流失；每次時間不宜過久(約20～30分鐘以內)以免失溫與電解質流失。選項把水溫訂在26.6～29.4°C過低，是錯誤敘述。","options":{"A":"錯誤(本題答案)。水溫應接近體溫約37°C，26.6～29.4°C過低易失溫。","B":"正確。水中加優碘可抑制細菌生長。","C":"正確。加入食鹽使接近生理鹽濃度，減少電解質流失。","D":"正確。水療可降低感染並減少瘢痕形成。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"108110-N3-43":{"quick":"鼻毛燒焦、聲音嘶啞、喘鳴、碳粒痰→吸入性灼傷。","detail":{"background":"吸入性灼傷的典型表徵為密閉火場史加上：鼻毛或顏面毛髮燒焦、聲音嘶啞、喘鳴聲、碳粒痰(含碳的黑色痰)、呼吸有燒焦味、咽喉紅腫。這些代表上呼吸道與聲門周圍已受熱與煙塵傷害，水腫可在數小時內惡化導致氣道阻塞，須密切監測並及早插管、給高濃度氧氣。一氧化碳中毒以意識改變、頭痛為主而非碳粒痰；電燒傷與化學灼傷有各自接觸史，與本題煙塵吸入表現不同。","options":{"A":"一氧化碳中毒以意識不清、頭痛為主，無碳粒痰、喘鳴。","B":"電燒傷由電流接觸造成，與煙塵吸入表現不同。","C":"正確。鼻毛燒焦、聲嘶、喘鳴、碳粒痰是吸入性灼傷指標。","D":"化學性灼傷由化學物接觸，非火場煙塵吸入表現。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"108110-N3-44":{"quick":"正確：焦痂切開術後若仍無法改善灌流，可進一步做筋膜切開術(fasciotomy)。","detail":{"background":"焦痂切開術(escharotomy)用於肢體或軀幹的環形全層燒傷，當僵硬焦痂壓迫造成肢體缺血或胸廓擴張受限時，沿焦痂縱向切開以減壓。切開深度僅達焦痂與皮下，雖焦痂本身因神經破壞而較不痛，但切至有活力組織仍可能疼痛、且須止血與覆蓋敷料(非不予包紮)。若切開焦痂後深部腔室壓仍高、灌流仍未改善，則須進一步行「筋膜切開術(fasciotomy)」打開肌肉腔室減壓。焦痂切開適用於熱/電的環形燒傷，而非輻射燒傷。","options":{"A":"焦痂切開雖用於環形燒傷，但切至活力組織仍可能需止痛，「無需麻醉」過於絕對。","B":"錯誤。焦痂切開用於環形燒傷，非輻射燒傷。","C":"錯誤。切開後仍須止血並覆蓋敷料，非不予包紮。","D":"正確。焦痂切開後灌流仍未改善時，進一步行筋膜切開術。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"108110-N3-45":{"quick":"錯誤者：「泡」應以「冷水(微涼)」沖泡，不可泡「冰水」(血管收縮、失溫、加深傷害)。","detail":{"background":"燒傷現場急救五步驟「沖、脫、泡、蓋、送」：沖——以流動的冷水(室溫微涼水)沖患部15～30分鐘以移除餘熱、止痛；脫——在水中小心移除衣物、飾品，若衣物與傷口沾黏則勿強行撕除；泡——持續浸泡於微涼的冷水中(不可用冰水或冰塊，會引起血管收縮、組織缺血、失溫並加深傷害)；蓋——以乾淨布單覆蓋保暖防污染；送——盡速送醫。故「泡在冰水中」是錯誤敘述。","options":{"A":"正確。以流動冷水沖患部移除餘熱。","B":"正確。沾黏衣物勿強行脫除以免撕裂傷口。","C":"錯誤(本題答案)。應泡微涼冷水，不可泡冰水(會血管收縮、失溫、加深傷害)。","D":"正確。以乾淨布單覆蓋保暖防污染。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"109030-N3-43":{"quick":"錯誤者：化學灼傷「不可」塗中和劑，應以大量清水沖洗。","detail":{"background":"化學性灼傷處置原則是「立即移除化學物質、大量清水沖洗」：先去除沾染衣物與粉狀化學物，再以大量流動清水持續沖洗至少20分鐘以上(鹼性物質須沖更久，因會持續皂化深層組織)；眼睛灼傷以生理食鹽水或清水大量沖洗。切勿塗抹「中和劑」，因酸鹼中和為放熱反應，反而產生熱量加深組織傷害，且延誤沖洗時間。故「塗中和劑」是錯誤處置。","options":{"A":"正確。立即去除身上化學物質。","B":"錯誤(本題答案)。不可塗中和劑(放熱反應加重傷害)，應大量清水沖洗。","C":"正確。以大量流動清水沖洗至少20分鐘。","D":"正確。眼睛灼傷以生理食鹽水或清水沖洗。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"110030-N3-45":{"quick":"錯誤者：急性腎衰竭風險在休克(急性)期，非「恢復期」才預防。","detail":{"background":"化學物質燒傷的病程與一般燒傷相似：休克(急性)期因血漿流失、低血容積，須預防低血鈉與代謝性酸中毒，並因肌球蛋白/血紅素尿與低灌流而是「急性腎衰竭」的高危時段；利尿(回流)期液體回到血管、鉀隨尿流失，須預防低血鉀；現場應「先沖洗去除化學物再送醫」。把預防急性腎衰竭放在「恢復期」是時序錯誤——AKI主要發生在急性低灌流期，恢復期反而是器官功能逐漸回復的階段。","options":{"A":"正確。休克期預防低血鈉與代謝性酸中毒。","B":"正確。利尿期鉀隨尿流失，須預防低血鉀。","C":"正確。現場應先大量沖洗再送醫。","D":"錯誤(本題答案)。急性腎衰竭風險在急性/休克期，非恢復期才預防。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"110110-N3-47":{"quick":"錯誤者：0.5% Silver Nitrate(硝酸銀)造成「低血鈉/低血鉀/低血氯」，非高血鈉。","detail":{"background":"燒傷局部抗菌敷料各有電解質與副作用：1% Silver Sulfadiazine(磺胺嘧啶銀)是最常用、滲透力佳、不易造成酸鹼電解質不平衡，但可能引起白血球減少(須監測WBC)；0.5% Silver Nitrate(硝酸銀)為低張溶液，會將鈉、鉀、氯離子由傷口滲出帶走，造成「低血鈉、低血鉀、低血氯」，並使傷口染黑、須密切監測電解質；Gentamicin/Mafenide等可深入焦痂、適用於軟骨部位(如耳、鼻)，但Gentamicin具腎毒性、Mafenide可致代謝性酸中毒。故「硝酸銀造成高血鈉」描述方向相反，是錯誤敘述。","options":{"A":"正確。1% SSD不易造成酸鹼與電解質不平衡。","B":"錯誤(本題答案)。硝酸銀造成低血鈉(離子被低張液帶走)，非高血鈉。","C":"正確。Gentamicin可用於臉部，但具腎毒性須監測腎功能。","D":"正確。使用1% SSD應觀察白血球(WBC)是否減少。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"111110-N3-44":{"quick":"部分皮層燒傷的立即處置：以生理食鹽水(或冷水)浸泡降溫。","detail":{"background":"燒傷部位的「立即」護理是降溫與清潔：以微涼的生理食鹽水或冷水浸泡/沖洗患部，移除餘熱、減輕疼痛與組織續發傷害(避免冰水以防失溫與血管收縮)。抬高肢體減輕水腫是後續處置而非「最立即」；局部抗菌用藥在清潔評估後進行；水泡是否清創依大小與位置而定，並非立即手術切開。故面對剛燒傷的部分皮層傷口，最優先是浸泡降溫。","options":{"A":"正確。立即以生理食鹽水/冷水浸泡降溫、移除餘熱。","B":"抬高減輕水腫屬後續處置，非最立即。","C":"局部用藥在清潔評估後進行，非最立即。","D":"立即手術切開水泡清創並非急救首步。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"112030-N3-43":{"quick":"吸入性灼傷緊急處置：維持呼吸道通暢，面罩給100%氧氣。","detail":{"background":"面對多人吸入性灼傷，緊急處置首重「呼吸道與氧合」：維持呼吸道通暢並以面罩給100%高濃度氧氣(同時治療可能合併的一氧化碳中毒)，密切評估是否需要「及早」插管——出現呼吸窘迫、喘鳴、聲嘶時應提早插管，因水腫加重後插管極困難。體位採半坐臥(semi-Fowler)以利呼吸與減輕水腫，而非平躺；輸液須建立「靜脈(IV)」通道，而非由口鼻腔。","options":{"A":"正確。維持呼吸道通暢並以面罩給100%氧氣。","B":"錯誤。呼吸窘迫時應「及早」插管，而非不插管。","C":"錯誤。應採半坐臥利呼吸減水腫，非平躺側臥。","D":"錯誤。輸液應由靜脈(IV)建立，非由口鼻腔。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"112030-N3-44":{"quick":"深二度燒傷特徵：灰白色有水泡、附屬器部分殘存、表皮與真皮層受損(2、4、5)。","detail":{"background":"深二度(深層部分皮層)燒傷傷及表皮與真皮網狀層，外觀呈灰白或紅白相間、有水泡；因部分神經末梢受損，痛覺較鈍(較淺二度的「劇痛」為輕)；真皮深部的毛囊、汗腺等附屬器部分殘存(這是仍可能緩慢自行癒合的原因)；損傷層次為表皮加部分真皮層。對照敘述1(發紅無水泡)是一度的特徵、3(劇烈疼痛)較符合淺二度，故不選；正確組合為2、4、5。","options":{"A":"134錯誤：含1(一度特徵)、3(劇痛偏淺二度)。","B":"145錯誤：含1與3。","C":"235錯誤：含3(劇痛較屬淺二度)。","D":"正確。2灰白有水泡、4附屬器部分殘存、5表皮真皮受損，為深二度特徵。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"112110-N3-46":{"quick":"水療最適宜措施：水中加入食鹽以補充流失的電解質(接近生理鹽濃度)。","detail":{"background":"熱燒傷水療的護理重點：水溫應接近體溫(約37°C)以避免失溫(32～34°C偏低)；水中可加食鹽使接近生理鹽濃度，補充經傷口流失的電解質、減少滲透性體液流失，是合宜處置；每次水療時間不宜過久(約20～30分鐘內)，過長(如1小時)會造成失溫與電解質大量流失。優碘可抑菌但濃度與本題其他敘述需整體判斷。綜合而言「加入食鹽補充電解質」是最適宜的措施。","options":{"A":"水溫32～34°C偏低，應接近體溫約37°C。","B":"濃度與抑菌敘述非本題最適選項。","C":"正確。水中加食鹽補充流失電解質、接近生理鹽濃度。","D":"水療每次約20～30分鐘為宜，1小時過久易失溫與電解質流失。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"113180-N3-27":{"quick":"高壓氧治療作用：提高組織氧合、活化組織並促進上皮細胞生長與傷口癒合。","detail":{"background":"高壓氧治療(HBOT)讓病人在加壓艙吸入高濃度氧，提高血漿與組織溶氧量，可改善燒傷與缺血傷口的氧合、促進纖維母細胞與上皮細胞增生、加速傷口癒合與膠原合成，並有抑菌(尤其厭氧菌)、減少水腫的效果，臨床也用於一氧化碳中毒、氣壞疽等。它的核心作用是「增加組織氧供、促進癒合」，而非提升意識程度、促進毛髮生長或改善情緒。","options":{"A":"提升意識非高壓氧對燒傷傷口的主要作用。","B":"正確。提高組織氧合、活化組織並促進上皮細胞生長。","C":"促進毛髮生長非其治療目的。","D":"改善憂鬱情緒非高壓氧的作用機轉。"},"sources":["新文京《內外科護理學》燒傷急性期傷口照護","美國燒傷學會吸入性損傷與焦痂切開術指引"]}},"101110-N3-32":{"quick":"錯誤者：彈性衣應待傷口癒合、植皮穩定、腫脹消退後才穿戴，不可在腫脹消失前就穿。","detail":{"background":"壓力(彈性)衣藉持續加壓抑制肥厚性疤痕與攣縮，原則是「傷口癒合或植皮穩定、腫脹消退後」開始穿戴，每天約23小時(僅沐浴與傷口護理時脫下)，持續穿到疤痕成熟(約12～18個月、疤痕變平變軟)；因會逐漸失去彈力，常訂製兩套輪替清洗。若在植皮尚未穩固、腫脹未消時就穿戴，壓力會破壞未癒合的移植皮、影響存活，故為錯誤。","options":{"A":"錯誤(本題答案)。應待植皮穩定、腫脹消退後才穿，過早會破壞移植皮。","B":"正確。除沐浴與傷口護理外其他時間(約23小時)應持續穿戴。","C":"正確。訂製兩套輪替，避免長時間穿著失去彈力。","D":"正確。持續穿戴至疤痕成熟為止。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"103100-N3-46":{"quick":"決定是否植皮的主要因素為「燒傷的深度」與「面積」(1、3)。","detail":{"background":"是否需要植皮主要取決於傷口能否自行癒合，關鍵在「深度」與「面積」。深度方面：一度、淺二度可自行上皮化癒合，不需植皮；深二度視癒合速度與疤痕風險，三度與四度因全層破壞、無上皮再生來源，無法自行癒合，必須植皮(或皮瓣)。面積方面：大面積全層燒傷自體皮源不足、癒合慢、感染與攣縮風險高，更需植皮並考慮分次手術。燒傷的「時間」與「原因」相對不是決定植皮與否的主要依據。","options":{"A":"12錯誤：含2(時間)，非主要因素。","B":"正確。深度(1)與面積(3)決定是否需要植皮。","C":"24錯誤：時間與原因非主要決定因素。","D":"34錯誤：含4(原因)，非主要因素。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"104030-N3-47":{"quick":"錯誤者：膝蓋應維持「伸展」抗變形姿位，而非屈曲。","detail":{"background":"燒傷後因疼痛，病人傾向把關節擺在舒適的「屈曲、內收」位置，但這正是日後攣縮的方向，故須採「抗變形姿位(anti-deformity position)」——與攣縮方向相反：頸部維持伸直、肩與手臂外展約90～110度、手肘伸展、髖部伸展且外展、膝蓋「伸展」、踝關節維持90度背屈。把膝蓋擺成屈曲會促成屈曲攣縮，是錯誤的治療性姿勢。","options":{"A":"正確。手臂外展90～110度為抗變形姿位。","B":"正確。髖部伸展可預防屈曲攣縮。","C":"錯誤(本題答案)。膝蓋應維持「伸展」，屈曲會造成攣縮。","D":"正確。手肘伸展為抗變形姿位。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"104100-N3-46":{"quick":"錯誤者：受皮(植皮)區術後3～5天內應固定不動，不可隔天就換藥。","detail":{"background":"植皮術後照護重點在讓移植皮「貼合存活」。受皮區(recipient)術後須固定不動、加壓包紮，第一次換藥通常延到術後第3～5天，過早(隔天)掀開敷料會剪斷新生微血管、使移植皮移位脫落、無法黏合；受皮肢體可抬高減輕腫脹。供皮區(donor)則初期短時間加壓止血，癒合後可塗乳液減少搔癢與乾燥。故「受皮區隔天換藥」是錯誤敘述。","options":{"A":"錯誤(本題答案)。受皮區應固定3～5天不動，過早換藥會使移植皮脫落。","B":"正確。受皮部位術後抬高以減輕腫脹。","C":"正確。供皮傷口可適當加壓減少出血。","D":"正確。供皮傷口癒合後可塗乳液減少搔癢。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"105030-N3-47":{"quick":"錯誤者：壓力(彈性)衣應日夜持續穿戴約23小時，不是「白天穿、晚上脫」。","detail":{"background":"預防燒傷後攣縮的措施包括：將肢體擺在功能性/抗變形姿位、執行主動或被動全關節運動、使用副木固定、早期下床從事日常生活活動，以及穿戴壓力衣抑制疤痕。壓力衣的關鍵在「持續加壓」，須每天穿戴約23小時(日夜皆穿，僅沐浴與傷口護理時脫下)，持續到疤痕成熟；若只白天穿、晚上脫，壓力中斷會讓疤痕增生與攣縮，故為錯誤敘述。","options":{"A":"正確。肢體擺放維持功能性(抗變形)位置。","B":"正確。執行主動或被動關節運動。","C":"正確。鼓勵早期下床、執行日常生活活動。","D":"錯誤(本題答案)。壓力衣須日夜持續穿戴約23小時，非晚上脫除。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"105090-N3-45":{"quick":"左下肢預防攣縮：使用「膝蓋副木」維持膝關節伸展。","detail":{"background":"預防攣縮的核心是把關節固定在「抗變形姿位」並避免長時間維持屈曲。下肢方面：髖關節應維持「伸展、外展」(避免屈曲、內收)；膝關節維持「伸展」，可使用膝副木固定於伸展位；仰臥時膝下「不可」墊枕頭(會造成膝屈曲攣縮)。本題針對左下肢，使用膝蓋副木維持伸展是正確措施；至於肩膀全關節運動屬上肢，與左下肢預防攣縮無直接關係。","options":{"A":"錯誤。髖關節應維持伸展、外展，而非屈曲、內收。","B":"正確。使用膝蓋副木維持膝關節伸展，預防屈曲攣縮。","C":"肩膀運動屬上肢，與左下肢預防攣縮無關。","D":"錯誤。膝下置枕會造成膝屈曲攣縮，應避免。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"106030-N3-43":{"quick":"錯誤者：三度(全皮層)燒傷無法自行癒合，生物敷料只是暫時覆蓋，「仍需植皮」。","detail":{"background":"三度燒傷整層皮膚與附屬器破壞，沒有上皮再生來源，無法自行癒合，最終一定要植皮(或皮瓣)永久覆蓋。處置流程包括：以水療去除壞死組織、減少菌落；無法自然脫落或已感染的壞死組織以擴創術(debridement)移除；環形焦痂壓迫循環時行焦痂切開術。生物敷料(如異體皮、人工敷料)僅是「暫時性」覆蓋以保護創面、減少感染與疼痛，等床面乾淨後仍須自體植皮，故「長期覆蓋不需植皮」是錯誤。","options":{"A":"正確。水療可去除壞死組織、減少菌落、避免感染。","B":"錯誤(本題答案)。生物敷料只是暫時覆蓋，三度燒傷仍須植皮。","C":"正確。無法脫落或感染的壞死組織以擴創術移除。","D":"正確。環形焦痂限制循環時行焦痂切開術以免缺血壞死。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"106030-N3-44":{"quick":"錯誤者：供皮區以敷料覆蓋、初期短時間加壓止血即可，不需持續加壓72小時。","detail":{"background":"自體植皮護理重點在於「使移植皮存活」與「供皮區癒合」。移植皮(受皮)區須評估有無出血或血腫(血塊會使皮無法黏合而失敗)，並固定不動約3～7天讓微血管長入。供皮區(donor)是部分皮層創面，覆蓋敷料後初期短時間加壓以止血，之後保持乾燥讓上皮再生，癒合後可塗乳液軟化、減少搔癢。將供皮區「以壓迫性敷料持續加壓72小時」並非常規(止血只需數小時、過度加壓反妨礙上皮化)，為錯誤敘述。","options":{"A":"正確。評估植皮區出血/血腫，以免移植皮無法黏合。","B":"正確。植皮區3～7天固定不動，利於微血管長入。","C":"錯誤(本題答案)。供皮區初期短時間加壓止血即可，非持續加壓72小時。","D":"正確。供皮區癒合後可塗乳液軟化、減少搔癢。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"106111-N3-46":{"quick":"植皮後出院指導：燒傷部位避免直接陽光照射(以防色素沉著)。","detail":{"background":"燒傷植皮後出院的居家照護要點：新生與植皮皮膚對紫外線敏感，直接日曬易造成色素沉著與曬傷，須防曬、避免直接陽光；已癒合的疤痕應「按摩」並塗抹乳液保濕，以軟化疤痕、減少肥厚與搔癢；持續關節運動、穿壓力衣以防攣縮，而非長期臥床制動。故「避免直接陽光照射」是正確指導，其餘三項皆與正確作法相反。","options":{"A":"錯誤。疤痕「應」按摩以軟化、預防增生。","B":"正確。燒傷植皮部位避免直接陽光照射，防色素沉著。","C":"錯誤。已癒合傷口「應」塗乳液保濕、減少搔癢。","D":"錯誤。應持續關節運動，不可一味臥床制動。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"107030-N3-45":{"quick":"錯誤者：植皮/燒傷部位應「避免」日曬，而非多接觸日照。","detail":{"background":"植皮前後護理：術後密切監測傷口滲液性質與有無出血(血腫會使移植皮失敗)；供皮區取皮後以敷料覆蓋、加壓約4～6小時減少滲血，癒合後可塗乳液減少搔癢與乾燥。新生與植皮皮膚對紫外線特別敏感，日曬會造成色素沉著與灼傷，須嚴格防曬，不應為了合成維生素D而「多接觸日照」，故為錯誤敘述。","options":{"A":"正確。監測滲液性質與有無出血。","B":"正確。供皮區取皮後加壓約4～6小時減少滲血。","C":"正確。供皮區癒合後可使用乳液減少搔癢。","D":"錯誤(本題答案)。應避免日曬以防色素沉著，非多接觸日照。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"108020-N3-46":{"quick":"錯誤者：植皮部位應「避免」曬太陽，曬太陽不利、易色素沉著。","detail":{"background":"自體植皮後出院指導：鼓勵全範圍關節運動、使用副木支持以預防攣縮；燒傷部位穿壓力衣加壓抑制疤痕並塗潤膚乳液保濕。植皮與新生皮膚對紫外線敏感，曬太陽會造成色素沉著與曬傷，反而有害，應防曬而非「多曬太陽促進黑色素」，故為錯誤敘述。","options":{"A":"正確。鼓勵全範圍關節運動以維持功能。","B":"錯誤(本題答案)。植皮部位應避免日曬，曬太陽會色素沉著。","C":"正確。穿壓力衣並使用潤膚乳液。","D":"正確。使用副木等支持物避免關節攣縮。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"109110-N3-46":{"quick":"右髖燒傷的抗變形姿位：髖關節屈曲0度(伸展)、仰臥腿伸展。","detail":{"background":"為維持髖關節最大功能、預防攣縮，須採「抗變形姿位」——與攣縮方向相反。髖關節容易往「屈曲、內收」攣縮，故應維持「伸展(屈曲0度)且外展」，仰臥時雙腿伸展。把髖維持屈曲30度、膝屈曲或大腿內收，都是促成攣縮的錯誤姿位。本題正確為髖屈曲0度、仰臥腿伸展。","options":{"A":"錯誤。髖維持屈曲30度會促成屈曲攣縮。","B":"正確。髖關節屈曲0度(伸展)、仰臥腿伸展為抗變形姿位。","C":"錯誤。膝屈曲30度會造成膝屈曲攣縮。","D":"錯誤。大腿內收為攣縮方向，應改外展。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"110030-N3-46":{"quick":"錯誤者：疤痕「應」按摩(配合壓力與保濕)以減少增生，而非避免按摩。","detail":{"background":"燒傷居家照護要點：每天評估傷口、換藥，出現紅腫熱痛膿等感染徵象需就醫；已癒合傷口塗乳液保濕避免乾燥龜裂；持續肢體復健運動預防攣縮。疤痕處理的標準作法是「按摩＋壓力衣＋保濕」三管齊下，按摩能軟化疤痕、促進膠原重塑、減少肥厚性疤痕與攣縮，故「避免按摩疤痕」是錯誤指導。","options":{"A":"正確。每天評估傷口換藥，感染徵象需就醫。","B":"正確。已癒合傷口塗乳液保濕避免乾燥。","C":"錯誤(本題答案)。疤痕應按摩以減少增生，而非避免按摩。","D":"正確。持續復健運動避免肢體攣縮。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"114030-N3-29":{"quick":"正確：肩部燒傷應使手臂外展、遠離身體(抗變形姿位)。","detail":{"background":"植皮術後與抗變形姿位：肩部燒傷易往「內收」攣縮，故應使手臂「外展、遠離身體」維持肩關節功能；膝部燒傷應維持「伸展」、膝下不墊枕頭(墊枕造成屈曲攣縮)；供皮區不需以石膏夾板固定(固定的是受皮區)；植皮與新生皮膚應避免日曬以防色素沉著。故正確者為「肩部燒傷使手臂外展遠離身體」。","options":{"A":"錯誤。需固定不動的是受皮(植皮)區，供皮區不需石膏固定。","B":"錯誤。移植部位應避免日照，以防色素沉著。","C":"正確。肩部燒傷使手臂外展、遠離身體，維持肩功能。","D":"錯誤。膝部應維持伸展，膝下墊枕會造成屈曲攣縮。"},"sources":["新文京《內外科護理學》燒傷復健與植皮照護","燒傷抗變形姿位與壓力治療原則"]}},"103030-N3-76":{"quick":"錯誤者：血紅素<8 g/dL「不是」SIRS的診斷標準。","detail":{"background":"系統性炎症反應症候群(SIRS)由1992年美國胸腔醫學會/重症醫學會提出，四項標準符合兩項以上即成立：①體溫>38°C或<36°C；②心跳>90次/分；③呼吸>20次/分或PaCO₂<32 mmHg；④白血球>12,000/μL或<4,000/μL或未成熟白血球(band)>10%。血紅素濃度反映貧血/出血，並非SIRS的判定條件，故「Hb<8 g/dL」為錯誤選項。SIRS加上感染證據即為敗血症。","options":{"A":"正確。體溫>38°C(或<36°C)為SIRS標準之一。","B":"正確。心跳>90次/分為SIRS標準之一。","C":"正確。白血球>12,000/μL為SIRS標準之一。","D":"錯誤(本題答案)。血紅素<8 g/dL非SIRS標準。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"103100-N3-38":{"quick":"錯誤者：急性大出血休克應「先以大量晶體液快速擴容」，而非一開始即輸濃縮紅血球。","detail":{"background":"急性大出血造成低血容積休克時，血管內容積急遽流失，組織灌流不足。處置首要是建立大管徑靜脈通路、快速輸注等張晶體液(0.9%生理食鹽水或乳酸林格液)恢復循環血量，並控制出血源；體位採平躺、抬高下肢以增加回心血量。輸血(濃縮紅血球)保留給嚴重或持續出血、晶體液無法維持灌流者，且大量輸血須合併血漿與血小板補充凝血因子，單給「濃縮紅血球」並非急救首選。失血達30～40%以上會出現明顯休克，紅血球與血色素於體液回流稀釋後下降。","options":{"A":"大致正確。失血約30～40%以上會造成明顯休克。","B":"正確。可採平躺、抬高下肢(頭低腳高)增加回心血量。","C":"正確。出血與後續稀釋使紅血球數目下降。","D":"錯誤(本題答案)。應先以晶體液快速擴容，非一開始即輸濃縮紅血球。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"103100-N3-76":{"quick":"錯誤者：休克代償期因過度換氣，呈「呼吸性鹼中毒」，非呼吸性酸中毒。","detail":{"background":"休克代償期(compensatory)身體啟動代償機轉維持重要器官灌流：交感神經興奮使心跳加快、末梢血管收縮，血壓仍可維持正常或略升；呼吸加快加深(過度換氣)排出二氧化碳，造成「呼吸性鹼中毒」；腎血流減少使尿量下降；腦灌流稍降可出現輕度意識混亂、躁動。若代償失敗進入進行期，才轉為血壓下降與乳酸堆積的「代謝性酸中毒」。故代償期應為呼吸性鹼中毒，「呼吸性酸中毒」為錯誤。","options":{"A":"正確。代償期血壓可維持正常或略升。","B":"正確。腎血流減少使尿量下降。","C":"正確。腦灌流稍降可出現意識混亂、躁動。","D":"錯誤(本題答案)。代償期過度換氣應為呼吸性鹼中毒。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"104030-N3-76":{"quick":"過度換氣、血壓正常、皮膚濕冷、尿少、呼吸性鹼中毒→休克「代償期」。","detail":{"background":"此組表現是休克代償期的典型：交感神經興奮使末梢血管收縮，血壓仍維持「正常」、皮膚濕黏冰冷、尿量減少；呼吸加快加深(過度換氣)排出CO₂造成呼吸性鹼中毒。代償期的重點是「血壓仍正常」但已有灌流不足的徵象。對照進行期會出現血壓下降與代謝性酸中毒、不可逆期則多重器官衰竭。本題血壓仍正常且為呼吸性鹼中毒，故屬代償期。","options":{"A":"開始(早)期變化尚不明顯，未到明顯代償表現。","B":"正確。血壓仍正常、呼吸性鹼中毒、皮膚濕冷為代償期。","C":"進行期會血壓下降、轉為代謝性酸中毒。","D":"不可逆期為多重器官衰竭、對治療無反應。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"104030-N3-77":{"quick":"錯誤者：尿量<30 mL/小時代表灌流仍不足，「不是」治療改善的表徵。","detail":{"background":"休克治療是否改善，看器官灌流是否恢復：尿量回到≥30 mL/小時(成人0.5～1 mL/kg/hr)、在「無升壓劑」下收縮壓>90 mmHg、意識清楚、呼吸困難改善、皮膚轉溫暖、乳酸下降、代謝性酸中毒改善。尿量「小於30 mL/小時」反而代表腎灌流仍不足、休克未改善，故是錯誤(不屬於改善)的表徵。","options":{"A":"錯誤(本題答案)。尿量<30 mL/hr代表灌流不足，非改善表徵。","B":"正確。無升壓劑下收縮壓>90 mmHg是改善表現。","C":"正確。意識清楚代表腦灌流恢復。","D":"正確。呼吸困難改善是病情好轉。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"104100-N3-26":{"quick":"提升心因性休克心輸出量：使用主動脈內氣球幫浦(IABP)。","detail":{"background":"心因性休克的核心是心臟幫浦衰竭、心輸出量下降，治療目標是增加心輸出量並減輕心臟負荷。主動脈內氣球幫浦(IABP)於舒張期充氣、收縮期洩氣，能增加冠狀動脈灌流並降低後負荷，提升心輸出量，是心因性休克的機械輔助首選之一(另有正性肌力藥物、必要時心室輔助裝置)。利尿劑減少前負荷不能增加CO；心律調節器僅在心搏過緩或傳導阻滯時有用；連續性透析用於腎衰竭/容積過多，皆非直接提升CO的方法。","options":{"A":"正確。主動脈內氣球幫浦可增加心輸出量、改善冠脈灌流。","B":"利尿劑減少前負荷，不能直接增加心輸出量。","C":"心律調節器只在心搏過緩/傳導阻滯時適用。","D":"連續性透析用於腎衰竭/容積過多，非提升CO。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"105030-N3-76":{"quick":"主動脈剝離、張力性氣胸阻礙心臟有效輸出→「阻塞性休克」。","detail":{"background":"阻塞性休克(obstructive shock)指心臟與大血管的血流受到「機械性阻塞」而無法有效輸出，常見原因有張力性氣胸(胸內壓上升壓迫腔靜脈與心臟)、心包填塞、大塊肺栓塞、主動脈剝離等。其特點是心臟本身與血容積可正常，但血流被阻擋，須解除阻塞(如針刺減壓、心包穿刺、取栓)才能改善。心因性是幫浦衰竭、低血容積是容積流失、分布性是血管擴張，皆與本題機轉不同。","options":{"A":"心因性是心肌幫浦功能衰竭，非機械性阻塞。","B":"正確。主動脈剝離、張力性氣胸造成機械性阻塞，屬阻塞性休克。","C":"分布性是血管擴張(敗血/過敏/神經)，非阻塞。","D":"低血容積性是容積流失，非阻塞。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"105030-N3-77":{"quick":"車禍大腿傷口持續出血、BP低、CVP低、SVR上升、蒼白濕冷→低血容積性休克。","detail":{"background":"張先生有持續出血的大傷口，血壓80/40偏低、中心靜脈壓僅2 cmH₂O(前負荷不足)、全身血管阻力(SVR)代償性上升、皮膚蒼白濕冷、口渴、心跳快(140)，這些是「低血容積性休克」的典型：血容積流失→前負荷與CVP下降→代償性心搏過速與血管收縮→皮膚蒼白濕冷。處置以止血與快速晶體液/輸血擴容為主。心因性會CVP上升、阻塞性有機械阻塞、分布性SVR下降且皮膚溫暖，皆與本題不符。","options":{"A":"正確。持續出血、CVP低、SVR上升、蒼白濕冷為低血容積性休克。","B":"心因性休克CVP會上升，與本題CVP低不符。","C":"阻塞性休克有機械阻塞(如氣胸、填塞)，本題為失血。","D":"分布性休克SVR下降、皮膚溫暖，與本題相反。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"105090-N3-75":{"quick":"錯誤者：「血管張力改變使血管腔擴大」描述的是分布性休克，非心因性休克。","detail":{"background":"心因性休克是因心肌功能不良(如大面積心肌梗塞、心衰竭)使心輸出量下降，血液淤積於心臟之前，故出現血壓下降、中心靜脈壓與肺動脈楔壓「上升」、肺鬱血、尿量減少、皮膚濕冷。選項A描述的是「全身血管張力改變、血管腔室擴大造成循環不足」——這是分布性(血管性)休克(敗血、過敏、神經性)的機轉，並非心因性休克，故為錯誤敘述。","options":{"A":"錯誤(本題答案)。血管擴張、血管腔擴大屬分布性休克，非心因性。","B":"正確。心因性休克因心肌功能不良使心輸出量下降。","C":"正確。心因性休克血壓下降、CVP上升(血液淤積)。","D":"正確。心輸出量下降使腎灌流減少、尿量下降。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"106030-N3-26":{"quick":"心因性休克血流動力學：肺動脈楔壓(PAWP)上升。","detail":{"background":"心因性休克因左心幫浦衰竭，心輸出量下降，血液淤積在心臟之前，使中心靜脈壓(右心前負荷)、右心室壓力與「肺動脈楔壓(PAWP，反映左心房/左心室舒張末壓)」皆上升，肺鬱血、肺水腫。血流動力學特徵為：CO下降、CVP上升、PAWP上升、SVR上升(代償)。故四選項中只有「肺動脈楔壓上升」正確；CVP與右心室壓力應上升(非下降)、心輸出量應下降(非上升)。","options":{"A":"錯誤。心因性休克中心靜脈壓上升，非下降。","B":"錯誤。右心室壓力上升，非下降。","C":"正確。肺動脈楔壓(PAWP)上升，反映左心衰竭、肺鬱血。","D":"錯誤。心輸出量下降，非上升。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"106111-N3-77":{"quick":"尿路感染合併血壓55/30、無尿、發燒心跳快→敗血性休克。","detail":{"background":"此病人因留置導尿管導致泌尿道感染(感染源)，出現體溫38.5°C、心跳130、呼吸35(符合SIRS)，加上血壓55/30極低且無尿(器官低灌流)。敗血症的進程為：SIRS(僅炎症反應)→敗血症(SIRS＋感染)→嚴重敗血症(合併器官功能障礙)→敗血性休克(經充分輸液後仍持續低血壓、需升壓劑、合併乳酸上升)。本題已有明確感染源、嚴重低血壓與無尿(器官衰竭)，符合「敗血性休克」。處置須及早抗生素、大量輸液、必要時升壓劑(去甲腎上腺素)。","options":{"A":"SIRS僅指炎症反應，未涵蓋此處的感染＋嚴重低血壓。","B":"敗血症為SIRS＋感染，尚未到嚴重低血壓階段。","C":"嚴重敗血症有器官障礙，但本題已出現持續嚴重低血壓。","D":"正確。感染源明確、嚴重低血壓且無尿，為敗血性休克。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"107110-N3-80":{"quick":"錯誤者：休克代償時腎素(renin)「上升」(活化RAAS)，非下降。","detail":{"background":"休克時為保住血壓與血容積，會啟動神經內分泌代償：交感神經興奮、腎臟低灌流刺激腎素(renin)分泌「上升」，活化腎素-血管收縮素-醛固酮系統(RAAS)，使血管收縮素II增加、醛固酮上升(保鈉保水)；腦下垂體分泌ACTH(促皮質醇)與抗利尿激素(ADH)上升(保水、血管收縮)。這些都是「升高」以維持血壓血容積。故「腎素下降」與代償方向相反，為錯誤。","options":{"A":"正確。醛固酮上升，保鈉保水。","B":"正確。ACTH上升，促皮質醇分泌。","C":"錯誤(本題答案)。腎素應上升(活化RAAS)，非下降。","D":"正確。抗利尿激素(ADH)上升，保水、血管收縮。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"108110-N3-75":{"quick":"不包括者：休克漸進期應出現「代謝性酸中毒」，非代謝性鹼中毒。","detail":{"background":"休克對肝臟代謝的影響：早期因壓力荷爾蒙(腎上腺素、皮質醇)促進肝醣分解與糖質新生，血糖「上升」；隨休克漸進，肝細胞缺氧、肝醣耗竭與肝功能受損，血糖轉為「下降」，且肝臟清除乳酸的能力下降(乳酸轉換下降)，乳酸堆積造成「代謝性酸中毒」。因此「漸進期出現代謝性鹼中毒」與實際相反，是不包括(錯誤)的選項。","options":{"A":"屬於。早期壓力反應使血糖上升。","B":"不包括(本題答案)。漸進期應為代謝性酸中毒，非鹼中毒。","C":"屬於。漸進期肝清除乳酸能力下降(乳酸轉換下降)。","D":"屬於。漸進期肝醣耗竭、肝功能受損使血糖下降。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"110030-N3-79":{"quick":"錯誤者：休克初期是「交感神經」釋放腎上腺素使心跳加快，非副交感神經。","detail":{"background":"休克初期的正常代償是「交感神經系統」興奮：釋放腎上腺素與正腎上腺素，使心跳加快、心收縮力增強、全身末梢血管收縮以維持血壓，血液重新分配到腦與心臟，導致四肢末梢血管收縮、皮膚蒼白冰冷、腎血流減少而尿量下降。副交感神經作用相反(心跳變慢、血管擴張)，與休克代償方向不符，故「副交感神經釋放腎上腺素使心跳加快」為錯誤。","options":{"A":"錯誤(本題答案)。是交感神經(非副交感)釋放腎上腺素使心跳加快。","B":"正確。腎血流減少(血液重新分配)。","C":"正確。末梢血管收縮使四肢溫度降低。","D":"正確。全身末梢血管收縮以維持血壓。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"110110-N3-76":{"quick":"低血容積性休克應「優先補充水分或血品」。","detail":{"background":"休克處置須對因：低血容積性休克(出血、燒傷、脫水)的根本問題是「容積不足」，故首要是大量輸注晶體液(NS/LR)、必要時輸血恢復循環血量。心因性休克是幫浦衰竭，補太多液體反而加重肺水腫，須用正性肌力藥與機械輔助；過敏性休克首要是腎上腺素並移除過敏原；敗血性休克雖也需輸液，但同時須抗生素與升壓劑。故「優先給水分/血品」最符合低血容積性休克。","options":{"A":"心因性休克補液過多會加重肺水腫，非優先輸液。","B":"正確。低血容積性休克首要補充晶體液/血品恢復血量。","C":"過敏性休克首要是腎上腺素並移除過敏原。","D":"敗血性休克須同時抗生素與升壓劑，非單純補液。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"110110-N3-78":{"quick":"進行期/不可逆期表徵：PaCO₂>40 mmHg(呼吸衰竭、CO₂蓄積)。","detail":{"background":"休克晚期(進行期/不可逆期)代償機轉崩潰：心跳由快轉為過緩或不規則、呼吸由快轉為慢而衰竭、CO₂無法排出而蓄積使PaCO₂上升(>40 mmHg)、合併嚴重乳酸性代謝酸中毒使pH下降(<7.35，而非鹼中毒)。選項中心跳70～80、呼吸12～15屬正常範圍，pH>7.50是早期過度換氣的鹼中毒，皆非晚期表現；唯有PaCO₂>40 mmHg反映呼吸衰竭與CO₂蓄積，符合進行/不可逆期。","options":{"A":"心跳70～80次/分屬正常，非晚期表現。","B":"呼吸12～15次/分屬正常，非晚期表現。","C":"pH>7.50為鹼中毒(早期過度換氣)，晚期應為酸中毒。","D":"正確。PaCO₂>40 mmHg代表呼吸衰竭、CO₂蓄積，屬進行/不可逆期。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"111030-N3-76":{"quick":"不是休克代償機轉者：「促進腸胃蠕動」(休克時血液分流離開腸胃，蠕動反而減少)。","detail":{"background":"休克的代償機轉以交感神經與內分泌活化為核心：刺激交感神經分泌腎上腺素使血管收縮、心跳加快；呼吸加速加深以增加氧供與排CO₂；活化RAAS分泌血管收縮素促進血管收縮、保鈉保水。為了把有限血流集中到腦與心臟，血液會「分流離開」腸胃道與皮膚，使腸胃灌流與蠕動「減少」(腸蠕動下降、易腸麻痺)。故「促進腸胃蠕動」與代償方向相反，不是休克的代償機轉。","options":{"A":"是代償。交感神經分泌腎上腺素使血管收縮。","B":"是代償。呼吸加速加深增加氧供。","C":"是代償。血管收縮素促進血管收縮。","D":"不是(本題答案)。休克時腸胃灌流與蠕動減少，非促進蠕動。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"111110-N3-78":{"quick":"錯誤者：矯正休克低血壓應「先快速輸注晶體液」，而非優先輸血。","detail":{"background":"休克低血壓的初步處置是迅速恢復循環血量：放置「大管徑」周邊靜脈導管(管徑越大、輸液越快)，快速輸注等張晶體液(0.9% NS或LR)；中心靜脈導管可用於監測中心靜脈壓與給藥；並密切監測血壓變化以評估反應。輸血(尤其濃縮紅血球)保留給嚴重/持續出血、晶體液無法維持灌流者，並非一律「優先輸血」。故「應優先輸血以恢復循環血量」為錯誤。","options":{"A":"錯誤(本題答案)。應先快速輸注晶體液，非一律優先輸血。","B":"正確。應使用大管徑導管以加快輸液速度。","C":"正確。中心靜脈導管利於監測CVP與給藥。","D":"正確。密切監測血壓變化評估治療反應。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"112030-N3-77":{"quick":"皮膚潮紅、溫暖見於「分布性休克」：敗血性與神經性(2、4)。","detail":{"background":"皮膚「潮紅、溫暖」是分布性(血管性)休克早期的特徵——因周邊血管廣泛擴張、血流滯留在擴張的血管床，皮膚呈溫暖潮紅(暖休克)，包括敗血性休克(早期)與神經性休克。相對地，低血容積性與心因性休克因代償性血管收縮、血液分流，皮膚呈「蒼白、濕冷」(冷休克)。故有皮膚潮紅溫暖者為2敗血性與4神經性，答案24。","options":{"A":"12錯誤：低血容性為皮膚蒼白濕冷。","B":"13錯誤：心因性為皮膚濕冷。","C":"正確。敗血性(2)與神經性(4)為分布性休克，皮膚潮紅溫暖。","D":"34錯誤：心因性為皮膚濕冷。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"112110-N3-78":{"quick":"血壓仍維持(130/100)、心跳快、皮膚濕冷、尿少、呼吸性鹼中毒→休克「代償期」。","detail":{"background":"本病人雖嚴重創傷，但血壓仍「維持甚至偏高」(交感代償使血管收縮、舒張壓上升)、心跳呼吸加快、皮膚濕冷、尿量減少、過度換氣造成呼吸性鹼中毒——這些都是休克「代償期」的特徵：靠交感神經與血管收縮把血壓撐住，但已有灌流不足的早期徵象。進行期會血壓「下降」並轉為代謝性酸中毒，不可逆期則多重器官衰竭。本題血壓未下降、為呼吸性鹼中毒，故屬代償期。","options":{"A":"早期變化尚不明顯，未達明顯代償徵象。","B":"正確。血壓仍維持、呼吸性鹼中毒、皮膚濕冷為代償期。","C":"進行期血壓會下降並轉為代謝性酸中毒。","D":"不可逆期為多重器官衰竭、對治療無反應。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"112180-N3-49":{"quick":"摔車骨折持續出血、BP低、心跳快、皮膚冷濕、微血管充填>2秒→低血容積性休克。","detail":{"background":"此病人因大腿骨折「血流不止」造成失血，出現血壓80/58偏低、心跳136過快、皮膚冷潮濕、微血管充填時間>2秒(末梢灌流不良)、焦慮——這是「低血容積性休克」的典型，因失血使前負荷不足、代償性心搏過速與末梢血管收縮。處置以止血、固定骨折、快速晶體液與必要時輸血為主。血管性(分布性)休克皮膚會溫暖潮紅、神經性休克常心跳變慢且血管擴張、心因性休克有心臟病因與CVP上升，皆與本題失血機轉不符。","options":{"A":"正確。失血造成低血容積性休克(心跳快、皮膚冷濕、CRT延長)。","B":"血管性休克皮膚溫暖潮紅、SVR下降，與本題不符。","C":"神經性休克常見心跳緩、血管擴張，非本題失血表現。","D":"心因性休克有心臟病因、CVP上升，非外傷失血。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"113030-N3-47":{"quick":"休克體溫下降的護理：靜脈輸液或血液應「加溫至接近體溫」再輸入。","detail":{"background":"休克病人因末梢灌流不足與大量輸液常出現體溫過低，正確的保暖原則是「核心被動回溫、避免末梢主動加熱」：將靜脈輸注的液體或血液加溫至接近正常體溫(避免大量冷輸液造成失溫與心律不整)、提高室溫、覆蓋保暖被毯。應避免用熱水袋、電毯直接包裹四肢或熱水浴，因末梢主動加熱會使周邊血管擴張、血液被引離核心器官(後降效應)而加重休克，且感覺遲鈍者易燙傷。","options":{"A":"錯誤。顫抖代表須保暖，調低室溫會加重失溫。","B":"正確。輸注的液體或血液應加溫至接近體溫再輸入。","C":"錯誤。熱水袋/電毯包四肢使末梢血管擴張、血液離開核心，且易燙傷。","D":"錯誤。熱水浴使周邊血管擴張、加重休克。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"113180-N3-47":{"quick":"SIRS四條件中正確者為1(體溫>38或<36)、4(白血球>12000或<4000)。","detail":{"background":"SIRS診斷四項標準(符合兩項以上)：①體溫>38°C或<36°C；②心跳>90次/分；③呼吸>20次/分或PaCO₂<32 mmHg；④白血球>12,000/μL或<4,000/μL。本題選項2寫「心跳<60次/分」方向錯誤(應為>90)；選項3寫「PaCO₂<40 mmHg」數值錯誤(標準為<32 mmHg)；選項1(體溫)與4(白血球)正確。故答案為1、4。","options":{"A":"12錯誤：選項2(心跳<60)方向錯，應為>90。","B":"正確。1(體溫>38或<36)與4(白血球>12000或<4000)正確。","C":"23錯誤：2、3敘述皆有誤。","D":"34錯誤：選項3的PaCO₂數值有誤(應<32)。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"113180-N3-50":{"quick":"分布性(血管性)休克因血管擴張，包含敗血性、過敏性、神經性(1、3、4)。","detail":{"background":"分布性(distributive/vasogenic)休克的共同機轉是「血管廣泛擴張」使血液重新分布、有效循環容積相對不足，包含：敗血性休克(內毒素引發發炎介質致血管擴張)、過敏性休克(IgE介導組織胺釋放致血管擴張與通透性增加)、神經性休克(交感張力喪失致血管擴張、常合併心跳變慢)。低血容積性是容積流失、心因性是幫浦衰竭，皆「非」血管擴張機轉。故分布性休克為1敗血性、3過敏性、4神經性，答案134。","options":{"A":"123錯誤：含2(低血容積，非血管擴張)。","B":"正確。敗血性(1)、過敏性(3)、神經性(4)屬分布性休克。","C":"245錯誤：含2(低血容積)、5(心因性)。","D":"345錯誤：含5(心因性，幫浦衰竭非血管擴張)。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"114170-N3-37":{"quick":"最不適當：低血容積休克進行期是「代謝性(乳酸性)酸中毒」，而非呼吸性酸中毒；乳酸林格液仍可使用。","detail":{"background":"低血容積休克進行期(progressive)代償失敗：心輸出量與血壓下降、組織持續缺氧使乳酸堆積，造成「代謝性酸中毒(乳酸性)」，並出現皮膚濕冷、體溫下降、尿少與BUN、肌酸酐上升(腎前性氮血症)。處置仍以等張晶體液(0.9% NS或乳酸林格液)快速擴容為主，乳酸林格液在一般休克復甦是適當選擇(僅嚴重肝衰竭或極高乳酸時才特別斟酌)。選項C把進行期酸中毒說成「呼吸性酸中毒」並稱「須避免輸注乳酸林格液」，與標準處置不符，最不適當。","options":{"A":"適當。代償失敗、皮膚濕冷、體溫下降。","B":"適當。心輸出量與血壓下降，可輸0.9%生理食鹽水擴容。","C":"最不適當(本題答案)。進行期為代謝性(乳酸)酸中毒，且乳酸林格液仍可使用。","D":"適當。腎前性氮血症使BUN與肌酸酐上升。"},"sources":["新文京《內外科護理學》休克","美國重症醫學會SIRS/敗血症診斷標準與休克分類"]}},"103030-N3-77":{"quick":"錯誤者：成人CPR按壓與吹氣比例「不論一人或兩人都是30:2」，非一人15:2。","detail":{"background":"2010年AHA準則重要變革：將成人基本救命術步驟由A-B-C改為「C-A-B」(先胸部按壓)，強調儘早高品質按壓；檢查脈搏不可超過10秒，無脈搏立即開始按壓。成人CPR的按壓與吹氣比例「無論單人或雙人都是30:2」(15:2僅用於兒童/嬰兒的雙人施救)。對嬰幼兒等窒息性停止，單人施救者應先CPR兩分鐘再求救。故「一人15:2、兩人30:2」描述錯誤。","options":{"A":"正確。2010年起成人BLS步驟為C-A-B。","B":"正確。檢查脈搏時間不超過10秒。","C":"錯誤(本題答案)。成人不論一人或兩人皆30:2，非一人15:2。","D":"正確。嬰幼兒無呼吸時單人先CPR兩分鐘再求救。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"103100-N3-74":{"quick":"能用力咳嗽=有效咳嗽，應「不干擾、鼓勵繼續咳」並觀察，不貿然拍背或哈姆立克。","detail":{"background":"異物哽塞分「部分阻塞(有效咳嗽)」與「完全阻塞(無效咳嗽)」。當病人滿臉通紅、能「用力咳嗽」、能發出聲音，代表呼吸道仍部分通暢、自身咳嗽是最有效的排除方式，此時應「不干擾、鼓勵其持續用力咳嗽並密切觀察」，貿然拍背或哈姆立克反而可能使異物移位至完全阻塞。只有當咳嗽變得微弱無力、無法說話發聲、發紺、握頸窒息手勢時，才表示完全阻塞，需立即施行哈姆立克(腹戳)法。","options":{"A":"有效咳嗽時不需拍背，鼓勵自行咳出即可。","B":"正確。能用力咳嗽屬有效咳嗽，不干擾、鼓勵繼續咳並觀察。","C":"清醒且能咳嗽者不需躺下施行哈姆立克。","D":"仍能用力咳嗽時不需立即哈姆立克，以免使異物移位惡化。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"103100-N3-77":{"quick":"錯誤者：檢查傷患「第一步」應評估意識與ABC(呼吸道、呼吸、循環)，非先量瞳孔血壓體溫。","detail":{"background":"急救現場原則：先確保現場安全、迅速抵達並快速評估傷病嚴重度(勿破壞事故現場以利後續調查)；以觀察、接觸、交談快速檢查傷患；觀察現場與致傷物以推測傷害機轉。檢查傷患的「第一步」永遠是評估意識與生命徵象的ABC——呼吸道是否通暢、有無呼吸、有無循環(脈搏/大出血)，而非先測量瞳孔、血壓、體溫等次要項目。故「第一步先檢查瞳孔、血壓、體溫」為錯誤。","options":{"A":"正確。迅速抵達、評估嚴重度、勿破壞現場。","B":"正確。以觀察、接觸、交談檢查傷患。","C":"正確。觀察現場與致傷物以判斷傷害機轉。","D":"錯誤(本題答案)。第一步應評估意識與ABC，非先量瞳孔血壓體溫。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"104100-N3-9":{"quick":"除外者：成人「心臟病發」屬目擊性心因停止，應「先求救/取AED」，不先做2分鐘CPR。","detail":{"background":"單人施救時，對「窒息性(缺氧性)停止」如溺水、藥物中毒、創傷、嬰幼兒，因主因是缺氧，應先做2分鐘CPR(優先供氧)再去求救。但成人「心臟病發」造成的突發性心臟停止，多為心室顫動(VF)，最關鍵的是「儘早電擊去顫」，故應「先求救、儘速取得AED」再CPR(call first / phone first)。因此心臟病發是「先CPR 2分鐘」原則的除外情況。","options":{"A":"除外(本題答案)。心臟病發多為VF，應先求救取AED再CPR。","B":"溺水為窒息性停止，先CPR 2分鐘再求救。","C":"藥物中毒為窒息性停止，先CPR 2分鐘再求救。","D":"創傷病人為窒息性停止，先CPR 2分鐘再求救。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"105030-N3-75":{"quick":"錯誤者：懷疑頸椎創傷應採「推下顎法(jaw-thrust)」打開呼吸道，非壓額抬下巴法。","detail":{"background":"打開呼吸道有兩法：一般無頸椎損傷者用「壓額抬下巴法(head-tilt chin-lift)」；但懷疑頸椎創傷(如車禍、高處墜落、跌倒)者，須採「推下顎法(jaw-thrust)」，在不後仰頸部的情況下托起下顎開放氣道，以免加重脊髓損傷。無按壓的人工呼吸成人約每分鐘10～12次(每5～6秒一次)；評估時除看有無呼吸，也要看呼吸型態是否適當；吹氣若感到阻力，最常見原因是舌根後墜堵住呼吸道(故須先正確開放氣道)。","options":{"A":"錯誤(本題答案)。懷疑頸椎創傷應採推下顎法，非壓額抬下巴。","B":"正確。成人人工呼吸約每分鐘10～12次。","C":"正確。須觀察呼吸型態是否適當。","D":"正確。吹氣有阻力最常因舌根後墜堵住呼吸道。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"106030-N3-75":{"quick":"錯誤者：成人胸部按壓速率應為每分鐘100～120次，非80次。","detail":{"background":"高品質胸部按壓要點：位置在兩乳頭連線中央(胸骨下半部)；速率每分鐘100～120次；成人按壓深度至少5公分(不超過6公分)；每次按壓後讓胸廓「完全回彈」；盡量減少中斷，更換施救者時中斷時間以10秒為限；按壓與吹氣比30:2。選項B「速度每分鐘80次」過慢，無法產生足夠循環，是錯誤敘述。","options":{"A":"正確。按壓位置為兩乳頭連線中央(胸骨下半部)。","B":"錯誤(本題答案)。按壓速率應為100～120次/分，非80次。","C":"正確。成人按壓深度至少5公分。","D":"正確。更換施救者中斷時間以10秒為限。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"106110-N3-72":{"quick":"電擊器顯示「心搏停止(asystole)」屬不可電擊心律，應「繼續CPR」。","detail":{"background":"去顫(電擊)只對「可電擊心律」有效，即心室顫動(VF)與無脈搏心室心搏過速(pulseless VT)。當監測顯示「心搏停止(asystole)」或「無脈性電氣活動(PEA)」屬「不可電擊心律」，電擊無效且浪費時間，正確處置是「立即繼續高品質CPR」並給予腎上腺素、找尋並矯正可逆病因(5H5T)。故面對asystole應繼續CPCR，而非電擊。","options":{"A":"asystole不可電擊；且成人去顫能量約120～200焦耳(雙相)，非常規360。","B":"asystole屬不可電擊心律，給電擊無效。","C":"貼片可備妥，但顯示asystole時重點是繼續CPR而非準備電擊。","D":"正確。心搏停止為不可電擊心律，應繼續高品質CPR。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"106110-N3-74":{"quick":"不包括者：「使用人工呼吸器」是支持呼吸，並非促進中毒物質排出的方法。","detail":{"background":"促進已吸收毒物排出體外的方法包括：給予瀉藥(腸道排除)、利尿與「尿液酸鹼調整」——鹼化尿液可加速弱酸性藥物(如阿斯匹靈、巴比妥)排出，酸化尿液則理論上可促進弱鹼性藥物排出(現多已少用)；以及血液透析、活性碳吸附等。人工呼吸器(機械通氣)是維持呼吸與氧合的「支持性治療」，並不能促進毒物排出，故不包括在內。","options":{"A":"包括。瀉藥可促進腸道排除毒物。","B":"包括(概念上)。酸化尿液可促進弱鹼性藥物排出。","C":"不包括(本題答案)。人工呼吸器是呼吸支持，非促進毒物排出。","D":"包括。鹼化尿液可加速弱酸性藥物(如阿斯匹靈)排出。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"107110-N3-79":{"quick":"本題一律給分：跌倒老先生疑有頸椎傷，開放氣道方式在「壓額抬下巴」與「推下顎」間有爭議。","detail":{"background":"一般無頸椎傷者開放呼吸道用「壓額抬下巴法」，但本題為「跌倒」的老先生，可能合併頸椎損傷，依規範應改用「推下顎法」以免加重脊髓傷害；然而非專業或單人施救情境下，AHA也允許在無法有效推下顎時改用壓額抬下巴以確保通氣。因選項對「跌倒(疑頸椎傷)情境該用何法」存在判讀爭議，本題公告一律給分。重點觀念：一般病人用壓額抬下巴、疑頸椎傷者優先推下顎法。","options":{"A":"推下顎法：適用於疑似頸椎損傷者(本題情境可接受)。","B":"壓額抬下巴法：一般開放氣道法(原訂答案，但跌倒疑頸椎傷有爭議)。","C":"壓舌板撐口法非開放氣道的標準手法。","D":"插入氣管內管屬高級氣道，非基本救命術的徒手開放氣道。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"108110-N3-77":{"quick":"不包括者：「基礎及高級緊急醫療服務(院前EMS)」屬院外停止(OHCA)鏈，非院內(IHCA)鏈。","detail":{"background":"生存之鏈依停止地點分院內(IHCA)與院外(OHCA)。院內心臟停止(IHCA)的環節為：監測與預防→立即辨識並啟動緊急應變系統(院內急救小組)→立即高品質CPR→快速去顫→高級救命術與心臟停止後照護(→復原)。「基礎及高級緊急醫療服務(EMS、救護車院前救護)」是院外停止(OHCA)鏈才有的環節，因院內病人已在醫療機構內，不需院前EMS。故IHCA不包括「基礎及高級EMS」。","options":{"A":"包括。立即辨識心臟停止並啟動緊急應變系統。","B":"包括。立即進行高品質CPR。","C":"包括。進行快速去顫。","D":"不包括(本題答案)。基礎/高級EMS屬院外(OHCA)鏈，非院內。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"109030-N3-72":{"quick":"正確：心臟按壓掌根置於兩乳頭連線與胸骨中線交接處(胸骨下半部)。","detail":{"background":"胸外心臟按壓要點：掌根置於「兩乳頭連線與胸骨中線交接處」(即胸骨下半部)，雙手交疊垂直下壓；成人按壓與通氣比為30:2(非15:1)；速率100～120次/分(非60～80)；深度至少5公分並完全回彈。需注意外按壓所產生的心輸出量僅約正常的「四分之一到三分之一(25～33%)」，遠不到60%，故須持續、用力、快速且減少中斷以維持灌流。","options":{"A":"錯誤。成人按壓與通氣比為30:2，非15:1。","B":"錯誤。胸外按壓僅達正常心搏出量約25～33%，非60%。","C":"錯誤。按壓速率應100～120次/分，非60～80。","D":"正確。掌根置於兩乳頭連線與胸骨中線交接處。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"109030-N3-73":{"quick":"孕婦(或肥胖者)呼吸道梗塞應採「胸戳法(chest thrust)」，非腹戳法。","detail":{"background":"異物哽塞完全阻塞時，一般成人施行哈姆立克腹戳法(abdominal thrust)。但「孕婦(尤其後期)與明顯肥胖者」因腹部膨大，腹戳法不適用且可能傷及胎兒或無法有效施力，應改採「胸戳法(chest thrust)」——在胸骨下半部快速向內按壓以產生氣流排除異物。刺激喉頭或喝水都無法解除完全阻塞，且可能加重。故孕婦呼吸道梗塞最適當的是胸戳法。","options":{"A":"孕婦腹部膨大，腹戳法不適用且可能傷及胎兒。","B":"正確。孕婦/肥胖者呼吸道梗塞應採胸戳法。","C":"刺激喉頭無法解除完全阻塞。","D":"喝水無助於排除哽塞，且可能加重阻塞。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"110030-N3-76":{"quick":"CPCR第一期(基本救命)最優先：維持循環(胸部按壓)。","detail":{"background":"心腦肺甦醒術(CPCR)分三期：第一期為基本救命術(BLS)，第二期高級救命術，第三期腦復甦與停止後照護。第一期(BLS)以C-A-B進行——首先「維持循環(Circulation)」即立即高品質胸部按壓，其次開放呼吸道(Airway)、給予人工呼吸(Breathing)。靜脈輸液與給藥屬高級救命、低溫治療屬停止後腦保護，皆在後期。故第一期最優先是維持循環(按壓)。","options":{"A":"靜脈輸液屬高級救命術(第二期)，非最優先。","B":"正確。第一期BLS以C-A-B，最優先為維持循環(按壓)。","C":"低溫治療屬停止後照護(第三期腦保護)。","D":"氧氣/人工呼吸在按壓之後(C-A-B中的B)。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"110110-N3-79":{"quick":"錯誤者：碳酸氫鈉(NaHCO₃)用於治療「代謝性酸中毒」，非鹼血症。","detail":{"background":"常用急救藥物作用：Amiodarone(胺碘酮)為抗心律不整藥，用於持續性心室顫動或無脈搏心室心搏過速；Atropine(阿托品)抗迷走、加快心率，用於症狀性心搏過緩；Dopamine(多巴胺)為升壓/正性肌力藥，用於低血壓與休克；Sodium Bicarbonate(碳酸氫鈉)為鹼性緩衝劑，用於矯正「代謝性酸中毒」(如長時間心臟停止、嚴重酸血症)，而非治療鹼血症。故「NaHCO₃用於治療鹼血症」方向相反，為錯誤。","options":{"A":"正確。Amiodarone用於VF或無脈搏VT。","B":"正確。Atropine用於心搏過緩。","C":"正確。Dopamine用於治療低血壓。","D":"錯誤(本題答案)。NaHCO₃用於矯正代謝性酸中毒，非治療鹼血症。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"112030-N3-75":{"quick":"正確：甦醒球(Ambu Bag)接氧氣流速應調至12～15公升/分鐘。","detail":{"background":"使用甦醒球面罩(BVM)給人工呼吸要點：面罩「較尖(窄)的部位對準鼻樑」、寬的一端在下巴，採EC手法使面罩密合口鼻；氧氣流速調至12～15 L/min(接上儲氧袋可提供接近100%氧氣)；擠壓球囊到「胸部明顯起伏」即可，不可用力把球囊完全壓扁(過度通氣會造成胃脹氣、嘔吐吸入與氣壓傷)。BVM用於呼吸不足/停止、SpO₂偏低者，而非SpO₂正常(95%)時。故正確者為氧氣流速12～15 L/min。","options":{"A":"錯誤。SpO₂ 95%通氣尚足，BVM用於呼吸不足/停止者。","B":"錯誤。面罩較尖(窄)部位應對準鼻樑，非下巴。","C":"正確。氧氣流速調至12～15公升/分鐘。","D":"錯誤。擠壓到胸部起伏即可，不可完全壓扁(避免氣壓傷與胃脹)。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"112030-N3-76":{"quick":"CPR成功徵象：四肢有動作、自發性呼吸、刺激眼瞼會眨眼(1、2、3)。","detail":{"background":"CPR有效/復甦成功的徵象代表腦與器官灌流恢復：摸到頸動脈搏動、血壓回升、出現自發性呼吸、四肢有動作反應、膚色轉紅潤、瞳孔由放大「縮小且對光反射恢復(會收縮)」、刺激眼瞼會眨眼。選項4「瞳孔對光反射固定」代表瞳孔無反應，是腦灌流不足的「不良」徵象，而非成功；成功應是瞳孔對光「有反應(會縮)」。故正確組合為1、2、3。","options":{"A":"正確。四肢有動作、自發呼吸、刺激眼瞼會眨眼皆為成功徵象。","B":"124錯誤：含4(瞳孔固定為不良徵象)。","C":"134錯誤：含4(瞳孔固定)。","D":"234錯誤：含4(瞳孔對光反射固定)。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"112180-N3-50":{"quick":"2020院內停止(IHCA)生存之鏈：1辨識預防→2啟動應變→3高品質CPR→4去顫→5停止後照護→6復原。","detail":{"background":"2020年AHA生存之鏈為院內(IHCA)新增「復原(recovery)」環節，順序為：①早期辨識與預防(監測病情、避免心臟停止發生)→②啟動緊急應變系統(院內急救小組)→③立即施行高品質CPR→④快速去顫→⑤心臟停止後照護→⑥復原(出院後復健與身心追蹤)。院內鏈強調「預防」放在最前(在院內可監測高危病人提前介入)。故正確次序為1→2→3→4→5→6。","options":{"A":"正確。1辨識預防→2啟動應變→3高品質CPR→4去顫→5停止後照護→6復原。","B":"順序錯亂，去顫與啟動應變位置不符。","C":"將去顫(4)排在CPR(3)之前，順序錯誤。","D":"將去顫提前到CPR與啟動應變之前，錯誤。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"113100-N3-47":{"quick":"應先做2分鐘CPR再求救者：成人「野溪溺水」(窒息性停止)。","detail":{"background":"單人施救的求救時機取決於停止機轉。「窒息性(缺氧性)停止」如溺水，主因是缺氧，應先做2分鐘CPR提供氧氣再去求救/取AED(care first)。而心因性停止(如心臟衰竭、急性心肌梗塞)多為心室顫動，重點在儘早去顫，應「先求救取AED」。腦中風昏迷、糖尿病酮酸中毒昏迷若仍有呼吸脈搏並非心臟停止，重點是儘速送醫而非CPR。本題溺水屬窒息性停止，應先CPR 2分鐘再求救。","options":{"A":"心臟衰竭呼吸停止多為心因性，應先求救取AED。","B":"急性腦中風昏迷重點在儘速送醫，非先CPR。","C":"正確。溺水為窒息性停止，先CPR 2分鐘再求救。","D":"酮酸中毒昏迷重點在送醫處理，非心臟停止情境。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"113180-N3-48":{"quick":"用餐時突發劇咳、呼吸困難伴喘鳴聲→呼吸道(異物)梗塞。","detail":{"background":"「用餐時」突發劇烈咳嗽、呼吸困難並伴隨「咻咻」的喘鳴(stridor)，是典型的食物異物造成呼吸道部分梗塞——異物卡在喉部或氣管，氣流通過狹窄處發出喘鳴，身體以劇咳企圖排出。此時若仍能用力咳嗽屬部分阻塞，鼓勵繼續咳；若轉為無法咳嗽、發聲、發紺則為完全阻塞，須立即哈姆立克法。心肌梗塞以胸痛為主、主動脈剝離以撕裂性胸背痛、肺栓塞以突發呼吸困難胸痛為主，均無「進食時嗆咳＋喘鳴」的特徵。","options":{"A":"正確。進食時突發劇咳、呼吸困難伴喘鳴為呼吸道異物梗塞。","B":"心肌梗塞以胸悶胸痛為主，無進食嗆咳喘鳴。","C":"主動脈剝離為撕裂性胸背痛，非進食嗆咳。","D":"肺栓塞為突發呼吸困難胸痛，無進食哽塞史。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"114030-N3-47":{"quick":"2020院內停止(IHCA)生命之鏈：早期監測與預防→啟動應變→高品質CPR→去顫→停止後照護→復原(3→6→1→2→4→5)。","detail":{"background":"本題各環節編號為：1高品質CPR、2去顫、3早期監測與預防、4心臟停止後照護、5復原、6啟動緊急應變系統。依2020年院內(IHCA)生存之鏈，正確次序為：早期監測與預防(3)→啟動緊急應變系統(6)→立即高品質CPR(1)→快速去顫(2)→心臟停止後照護(4)→復原(5)，即3→6→1→2→4→5。院內鏈把「監測與預防」放在最前，因住院病人可被持續監測、在惡化前提早介入。","options":{"A":"順序錯誤，未把監測預防置於最前。","B":"正確。3→6→1→2→4→5(監測預防→啟動應變→CPR→去顫→停止後照護→復原)。","C":"將啟動應變(6)置於最前，順序錯誤。","D":"去顫與CPR順序顛倒，錯誤。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"114100-N3-49":{"quick":"正確：每次按壓後應讓胸部「完全回彈」再進行下一次按壓。","detail":{"background":"成人高品質胸部按壓要點：手掌根置於「胸骨下半部(兩乳頭連線中央)」而非胸骨上1/3；按壓速率100～120次/分(140以上過快會使深度與回彈不足)；垂直用力下壓深度「至少5公分」(不超過6公分)，3公分過淺；每次按壓後讓胸廓「完全回彈(full recoil)」，使心臟充分回填血液，才進行下一次按壓；並盡量減少中斷。故「每次按壓後等胸部完全回彈才再按壓」為正確。","options":{"A":"錯誤。應置於胸骨「下半部」(兩乳頭連線中央)，非上1/3。","B":"錯誤。速率100～120次/分，140以上過快。","C":"錯誤。按壓深度至少5公分，3公分過淺。","D":"正確。每次按壓後讓胸部完全回彈再按壓。"},"sources":["新文京《內外科護理學》急救與CPR","美國心臟協會(AHA)成人基本救命術與生存之鏈"]}},"102030-N3-80":{"quick":"發燒、高血壓、心跳快但意識生命徵象未立即危及→TTAS第二級(危急)。","detail":{"background":"TTAS(臺灣急診檢傷與急迫度分級)依急迫度分五級，等候處置時限分別為：第一級復甦急救(立即)、第二級危急(10分鐘)、第三級緊急(30分鐘)、第四級次緊急(60分鐘)、第五級非緊急(120分鐘)。本題孫先生65歲、呼吸喘、體溫39.1°C、收縮壓186 mmHg、脈搏105，呈現潛在危急(高血壓合併呼吸喘、發燒)但尚無立即致命的呼吸心跳停止或嚴重休克，依其生命徵象與主訴判為第二級危急，須儘速(約10分鐘內)評估處置。","options":{"A":"第一級為立即致命(如心跳呼吸停止、嚴重休克)，本題尚未到。","B":"正確。呼吸喘合併高血壓、發燒、心跳快屬第二級危急。","C":"第三級緊急的急迫度較本題低。","D":"第四級次緊急明顯低估本題的危急程度。"},"sources":["新文京《內外科護理學》急診檢傷","臺灣急診檢傷與急迫度分級量表(TTAS)；大量傷患START檢傷"]}},"102110-N3-43":{"quick":"已插管且有內出血傾向→生命受立即威脅，屬第一級復甦急救，應「立即處置」。","detail":{"background":"檢傷分級依生命威脅急迫度決定處置時限。白太太已有氣管內管留置(代表呼吸道/呼吸已危及)並有內出血傾向(潛在大出血、循環不穩)，屬最高急迫度的第一級「復甦急救」，須「立即」處置、不可等待。TTAS各級處置/再評估時限：一級立即、二級10分鐘、三級30分鐘、四級60分鐘、五級120分鐘。故本題應立即處置。","options":{"A":"正確。已插管且內出血傾向屬第一級，應立即處置。","B":"20分鐘對應較低急迫度，低估其危急。","C":"60分鐘為第四級，明顯不適合此危急病人。","D":"此為立即危及生命情況，絕非門診就醫。"},"sources":["新文京《內外科護理學》急診檢傷","臺灣急診檢傷與急迫度分級量表(TTAS)；大量傷患START檢傷"]}},"103030-N3-78":{"quick":"錯誤者：中心體溫>38°C合併臉色潮紅、脈搏加快，急迫度應較高(約三級)，不應只列為四級。","detail":{"background":"TTAS依生命徵象與主訴判級。到院前死亡(OHCA)屬第一級復甦急救；收縮壓>200 mmHg並有胸痛主訴(高血壓急症合併心臟症狀)屬第二級危急；GCS 14～15(意識近正常)的較輕情況可落在第三級。中心體溫>38°C且臉色潮紅、脈搏加快代表發燒合併全身性反應/感染徵象，急迫度應較高(約第三級緊急)，列為第四級「次緊急」過低，與TTAS判級不符，故為錯誤敘述。","options":{"A":"正確。到院前死亡(OHCA)屬第一級復甦急救。","B":"正確。SBP>200合併胸痛屬第二級危急。","C":"正確。GCS 14～15意識近正常可屬第三級。","D":"錯誤(本題答案)。發燒合併全身反應急迫度應較高，非第四級。"},"sources":["新文京《內外科護理學》急診檢傷","臺灣急診檢傷與急迫度分級量表(TTAS)；大量傷患START檢傷"]}},"104100-N3-78":{"quick":"SaO₂<92、SBP<90、GCS約10但仍有呼吸→屬TTAS第二級(危急)。","detail":{"background":"本題王先生呼吸費力、喘鳴、SaO₂<92%、體溫38.5°C、收縮壓<90 mmHg、GCS E3V3M4(約10分，意識中度改變)，呈現呼吸窘迫合併低血壓與意識改變，屬「潛在立即危及生命」的第二級危急，須在約10分鐘內積極處置(給氧、建立靜脈通路、查因)。第一級保留給已無呼吸/心跳或嚴重到瀕死者；本題仍有自主呼吸與可測得的生命徵象，故判為第二級危急。","options":{"A":"一級復甦急救多用於心跳呼吸停止或瀕死者。","B":"正確。呼吸窘迫＋低血壓＋意識改變屬第二級危急。","C":"三級緊急的急迫度較本題低。","D":"四級次緊急明顯低估本題危急程度。"},"sources":["新文京《內外科護理學》急診檢傷","臺灣急診檢傷與急迫度分級量表(TTAS)；大量傷患START檢傷"]}},"106030-N3-78":{"quick":"錯誤者：START中「可自行行走者」應繫「綠色」牌(輕傷、第三優先)，非黃色。","detail":{"background":"大量傷患START檢傷以「能否行走、呼吸、循環、意識」快速分四級並以顏色標示：紅色(第一優先，立即危及生命、可救活)、黃色(第二優先，傷勢重但可暫等)、綠色(第三優先，可自行行走的輕傷)、黑色(死亡或瀕死、最後處理)。流程先請「能走者」走到一旁標綠色；不能走者評估呼吸(無呼吸開放氣道仍無→黑色)、循環(橈動脈微弱/回充>2秒→紅色)、意識(無法聽從指令→紅色)。選項C把「可自行行走者」標成黃色錯誤，應為綠色。","options":{"A":"正確。START依救治順序分四級並以顏色區分。","B":"正確。橈動脈微弱、末梢回充>2秒者標紅色(第一優先)。","C":"錯誤(本題答案)。可自行行走者應標綠色，非黃色。","D":"正確。無法聽從指令者標紅色(第一優先)。"},"sources":["新文京《內外科護理學》急診檢傷","臺灣急診檢傷與急迫度分級量表(TTAS)；大量傷患START檢傷"]}},"107030-N3-77":{"quick":"依官方TTAS判定，本題溺水病人的檢傷等級為第4級(次緊急)。","detail":{"background":"TTAS依主訴與生命徵象判級(一級立即、二級10分、三級30分、四級60分、五級120分)。本題劉小弟溺水後到院，體溫34°C、心跳102、呼吸32、血壓80/60，肺部有水泡音與X光肺水腫。雖有低體溫與肺水腫等需密切監測的表現，依官方公布之TTAS判定結果列為第4級(次緊急)。臨床上仍須持續監測呼吸、血氧與循環，因溺水後肺損傷可能延遲惡化。應對照記住TTAS各級的處置時限與再評估頻率。","options":{"A":"第2級危急的急迫度高於官方判定。","B":"第3級緊急非官方判定結果。","C":"官方判定為第4級(次緊急，本題答案)。","D":"第5級非緊急的急迫度過低。"},"sources":["新文京《內外科護理學》急診檢傷","臺灣急診檢傷與急迫度分級量表(TTAS)；大量傷患START檢傷"]}},"109110-N3-76":{"quick":"正確：TTAS第五級(非緊急)每120分鐘再評估一次。","detail":{"background":"TTAS五級的「再評估(重新檢傷)頻率」與處置時限相對應：第一級復甦急救須持續監測；第二級危急每10～15分鐘；第三級緊急每30分鐘；第四級次緊急每60分鐘；第五級非緊急每120分鐘再評估一次。等級名稱對應：一級復甦急救、二級危急、三級緊急、四級次緊急、五級非緊急。選項B「非緊急等級每120分鐘評估一次」正確；緊急等級是第三級(非第二級)、其再評估約每30分鐘(非90分鐘)、復甦急救須持續(非每10分鐘固定)。","options":{"A":"復甦急救須持續監測，非每10分鐘一次。","B":"正確。非緊急(第五級)每120分鐘再評估一次。","C":"緊急等級是第三級，非第二級(第二級為危急)。","D":"緊急等級再評估約每30分鐘，非90分鐘。"},"sources":["新文京《內外科護理學》急診檢傷","臺灣急診檢傷與急迫度分級量表(TTAS)；大量傷患START檢傷"]}},"110030-N3-77":{"quick":"中樞性疼痛程度4～7分(中度疼痛)→TTAS第三級(緊急)。","detail":{"background":"TTAS將疼痛程度納入判級依據，並區分「中樞性(內臟/胸腹)疼痛」與「周邊性(四肢)疼痛」。中樞性疼痛屬較高權重：疼痛8～10分(重度)約列第二級危急；4～7分(中度)約列第三級緊急；1～3分(輕度)則較低級。本題中樞性疼痛4～7分屬中度，對應第三級緊急(約30分鐘內處置)。判級時須結合疼痛分數與其他生命徵象綜合決定。","options":{"A":"第一級用於立即危及生命，非單純中度疼痛。","B":"中樞性疼痛8～10分(重度)才約列第二級。","C":"正確。中樞性疼痛4～7分(中度)屬第三級緊急。","D":"第四級對應更輕的急迫度。"},"sources":["新文京《內外科護理學》急診檢傷","臺灣急診檢傷與急迫度分級量表(TTAS)；大量傷患START檢傷"]}},"114100-N3-47":{"quick":"正確：車禍OHCA到院應「立即復甦急救」(屬第一級)。","detail":{"background":"OHCA(到院前心臟停止)指病人在到達醫院前已發生心臟停止，但「不等於」宣布死亡；只要無明確死亡徵象，到院後應「立即施行復甦急救(CPR、去顫、高級救命)」，屬檢傷第一級。檢傷標黑色是給「已死亡或瀕死無法救治」者作最後處理，不能一律把OHCA當黑色。處置上是「邊救邊評估」、立即CPR，而非先從頭到腳慢慢評估。故正確為「病人應立即復甦急救」。","options":{"A":"錯誤。OHCA指到院前心臟停止，不等於宣布死亡。","B":"錯誤。OHCA到院仍應積極急救，非一律標黑色最後處理。","C":"錯誤。應立即CPR復甦，而非先從頭到腳慢評估。","D":"正確。車禍OHCA到院應立即復甦急救。"},"sources":["新文京《內外科護理學》急診檢傷","臺灣急診檢傷與急迫度分級量表(TTAS)；大量傷患START檢傷"]}},"102110-N3-1":{"quick":"有機磷中毒的縮瞳、多汗、流涎屬「蕈毒鹼性(muscarinic)」作用。","detail":{"background":"有機磷抑制乙醯膽鹼酯酶(AChE)，使乙醯膽鹼堆積而過度刺激副交感受體，臨床分兩類作用：「蕈毒鹼性(muscarinic)」表現為SLUDGE——流涎、流淚、排尿、腹瀉、腸蠕動增加、嘔吐，加上縮瞳(瞳孔針尖)、支氣管分泌增加與心搏過緩、多汗；「菸鹼性(nicotinic)」表現為肌肉抽動、無力、麻痺與交感興奮。本題縮瞳、多汗、流涎為典型蕈毒鹼性作用。解毒劑為阿托品(對抗蕈毒鹼效應)＋解磷定PAM(重活化AChE)。","options":{"A":"消化道刺激無法解釋縮瞳與多汗等全身副交感表現。","B":"菸鹼性作用以肌肉抽動、無力、麻痺為主，非縮瞳流涎。","C":"正確。縮瞳、多汗、流涎為蕈毒鹼性(muscarinic)作用。","D":"神經性反射作用非有機磷中毒的藥理分類用語。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"104030-N3-78":{"quick":"巴比妥過量抑制呼吸中樞→通氣下降→血中二氧化碳過高(高碳酸血症)。","detail":{"background":"巴比妥類是中樞神經抑制劑，過量會抑制延腦呼吸中樞，造成呼吸變慢變淺(肺泡通氣量下降)。通氣不足使二氧化碳無法排出而蓄積，產生「高碳酸血症(PaCO₂上升)」與呼吸性酸中毒，同時因肺泡通氣不足也導致低血氧。其根本機轉是「中樞性呼吸抑制→通氣下降」，而非肺內血液分流、呼吸道阻力上升或氣體擴散障礙等肺部本身問題。處置以維持呼吸道、必要時插管使用呼吸器支持通氣為主。","options":{"A":"巴比妥不是經由肺內血液分流增加致低血氧。","B":"正確。中樞抑制使通氣下降，導致血中CO₂過高。","C":"非呼吸道阻力上升，而是中樞性通氣下降。","D":"非氣體擴散障礙，而是肺泡通氣不足。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"104100-N3-76":{"quick":"錯誤者：一氧化碳是「無色、無臭、無味」的氣體，並非惡臭。","detail":{"background":"一氧化碳(CO)是無色、無臭、無味的氣體(故易被忽略而中毒)，與血紅素的親和力約為氧氣的200～300倍，會形成碳氧血紅素(COHb)使血紅素無法攜氧，造成組織缺氧。臨床症狀包括頭痛、眩暈、噁心、肌肉無力、意識改變，嚴重時昏迷死亡，皮膚黏膜可呈現「櫻桃紅(桃紅色)」。發現中毒時應立即將病人移到通風處並給予高濃度氧氣(必要時高壓氧)。選項B說CO「惡臭」與事實相反(CO無臭)，故為錯誤敘述。","options":{"A":"正確。CO與血紅素親和力約為氧的200～300倍。","B":"錯誤(本題答案)。CO為無色、無臭、無味氣體，非惡臭。","C":"正確。造成組織缺氧，皮膚可呈桃紅色。","D":"正確。發現中毒應速移至通風處。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"105090-N3-46":{"quick":"一氧化碳中毒的診斷項目：測「碳氧血紅素(COHb，一氧化碳血色素)」。","detail":{"background":"一氧化碳中毒因CO與血紅素結合形成碳氧血紅素(COHb)，使血紅素喪失攜氧能力。診斷的關鍵檢驗是測量血中「碳氧血紅素濃度(COHb%)」，而非一般血紅素、血比容或尿素氮。要注意一般脈搏血氧監測儀(SpO₂)無法分辨COHb與含氧血紅素，常顯示「假性正常」，故須抽血測COHb或用CO血氧儀。COHb>10%開始有症狀、>60%可致昏迷死亡。","options":{"A":"血中尿素氮反映腎功能，與CO中毒診斷無關。","B":"一般血紅素濃度無法反映CO結合情形。","C":"正確。測碳氧血紅素(COHb)是CO中毒的診斷項目。","D":"血比容反映紅血球比例，非CO中毒診斷依據。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"106030-N3-76":{"quick":"錯誤者：巴拉刈中毒「不可常規給氧」，給氧會加重肺纖維化(氧自由基傷害)。","detail":{"background":"巴拉刈(Paraquat，除草劑)毒性藉產生「氧自由基」破壞細胞膜與結締組織，含氧量最高的「肺臟」受傷最重，會進展為進行性肺纖維化；24小時內也常出現急性腎衰竭、肝損傷。處置上的重要陷阱是「避免給氧」——因為氧反而促進自由基生成、加速肺纖維化惡化，除非嚴重低血氧(SaO₂明顯下降)才在必要下使用。故「立即給氧以預防缺氧」是錯誤處置。其他處置包括儘速洗胃、給活性碳或漂白土(Fuller’s earth)吸附、支持療法。","options":{"A":"正確。食入後口腔黏膜與咽部會潰爛灼傷。","B":"正確。24小時內可出現急性腎衰竭。","C":"錯誤(本題答案)。不可常規給氧，氧會加重肺纖維化。","D":"正確。儘速洗胃以減少吸收。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"106110-N3-42":{"quick":"一氧化碳中毒的臨床表徵：黏膜呈「櫻桃紅(桃紅色)」。","detail":{"background":"一氧化碳中毒形成碳氧血紅素(COHb)呈鮮紅色，使皮膚與黏膜呈現特徵性的「櫻桃紅(桃紅色)」，並造成組織缺氧的全身症狀：頭痛、眩暈、噁心、肌肉無力、意識改變，嚴重者昏迷死亡。它不像吸入性灼傷會有碳粒痰、喘鳴或鼻翼煽動，也不是以咳嗽為主。故CO中毒的代表性臨床表徵是黏膜櫻桃紅。","options":{"A":"吐氣喘鳴與鼻翼煽動屬呼吸窘迫/氣道問題，非CO中毒特徵。","B":"正確。CO中毒黏膜呈櫻桃紅(桃紅色)。","C":"碳粒痰是吸入性灼傷的表現，非CO中毒。","D":"咳嗽非CO中毒的代表性表徵。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"106111-N3-78":{"quick":"錯誤者：CO與血紅素的親和力約為氧的「200～300倍」，非20倍。","detail":{"background":"一氧化碳與血紅素親和力極高，約為氧氣的200～300倍，極微量即可大量佔據血紅素形成碳氧血紅素(COHb)。COHb濃度與症狀相關：>10%開始有頭痛等症狀、>60%可昏迷甚至死亡。治療給高濃度氧競爭結合位、加速CO排出——CO半衰期在呼吸室內空氣約4～5小時、給100%純氧約縮短至60～90分鐘、高壓氧治療可縮短至約20～30分鐘。選項A把親和力說成「20倍」嚴重低估，為錯誤。","options":{"A":"錯誤(本題答案)。CO親和力約為氧的200～300倍，非20倍。","B":"正確。COHb>10%即可出現中毒症狀。","C":"正確。高壓氧可將CO半衰期縮短至約20～30分鐘。","D":"正確。COHb>60%可致昏迷甚至死亡。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"107030-N3-73":{"quick":"錯誤者：巴拉刈主要經「腎臟」排泄(並蓄積於肺)，非經肝臟排泄。","detail":{"background":"巴拉刈進入體內後藉產生氧自由基破壞細胞膜與結締組織，腎臟與肝臟最先受損，並主動蓄積在「含氧量最高的肺臟」造成最嚴重的進行性肺纖維化。其排泄途徑主要經「腎臟」(由腎排出)，急性期常見急性腎衰竭使排泄受阻、毒性更重。選項D稱「主要經由肝臟排泄」與事實不符(應為腎臟)，故為錯誤敘述。臨床須避免給氧、儘速洗胃與吸附劑、支持療法。","options":{"A":"正確。藉氧自由基破壞細胞膜與結締組織。","B":"正確。腎臟與肝臟最先受到傷害。","C":"正確。含氧量最高的肺臟受傷最嚴重(進行性肺纖維化)。","D":"錯誤(本題答案)。巴拉刈主要經腎臟排泄，非肝臟。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"107110-N3-77":{"quick":"錯誤者：嗎啡(morphine)「不是」有機磷的解毒劑；解毒劑為阿托品＋PAM，嗎啡反而抑制呼吸禁用。","detail":{"background":"有機磷中毒處置：①維持呼吸道通暢、清除分泌物、必要時插管使用呼吸器；②給予解毒劑——阿托品(atropine)拮抗蕈毒鹼效應、解除分泌物與心搏過緩，並以解磷定(PAM/pralidoxime)重活化乙醯膽鹼酯酶；③除污：脫去並清除被污染衣物、協助沐浴洗頭以去除皮膚殘留；④照護者須穿戴口罩、手套、隔離衣等防護以免二次污染。嗎啡會抑制呼吸中樞，對已有呼吸抑制的有機磷中毒者「禁用」，更非解毒劑，故為錯誤。","options":{"A":"正確。維持呼吸道通暢，必要時插管。","B":"錯誤(本題答案)。嗎啡非解毒劑且會抑制呼吸；解毒劑為阿托品＋PAM。","C":"正確。協助除污、沐浴洗頭去除皮膚殘留。","D":"正確。照護者須做好個人防護以免二次污染。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"108020-N3-78":{"quick":"一氧化碳中毒護理：給予高濃度氧氣(必要時高壓氧)。","detail":{"background":"一氧化碳中毒的治療核心是「給高濃度氧氣」——用非再吸入型面罩給100%氧，競爭血紅素結合位、加速CO排出並改善組織缺氧，嚴重者(COHb高、昏迷、孕婦)考慮高壓氧治療。CO由「吸入」進入，不是吃進去的，故催吐、給解毒劑、洗胃皆無意義；中毒者應「休息、減少活動」以降低耗氧，而非鼓勵活動。故正確措施為給予高濃度氧氣。","options":{"A":"正確。給予高濃度氧氣以加速CO排出、改善缺氧。","B":"錯誤。應休息減少耗氧，非鼓勵活動。","C":"錯誤。CO由吸入而來，催吐無意義。","D":"錯誤。CO中毒無特定口服解毒劑，治療靠氧氣/高壓氧。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"109110-N3-79":{"quick":"錯誤者：有機磷「有」解毒劑(阿托品＋解磷定PAM)，並非無拮抗劑。","detail":{"background":"有機磷農藥可由吸入、攝食、皮膚吸收進入體內，與乙醯膽鹼酯酶(AChE)結合使其失活，造成乙醯膽鹼堆積、過度刺激而致呼吸抑制、呼吸道分泌物大量增加、縮瞳、肌肉無力麻痺。它「有」明確解毒劑：阿托品拮抗蕈毒鹼效應、解磷定(PAM)在中毒早期可重活化AChE。選項C稱「尚無拮抗劑可使用」與事實不符，為錯誤敘述。","options":{"A":"正確。進入途徑包括吸入、攝食、皮膚吸收。","B":"正確。與AChE結合使乙醯膽鹼堆積，最終致神經麻痺。","C":"錯誤(本題答案)。有機磷有解毒劑(阿托品＋PAM)，非無拮抗劑。","D":"正確。會造成呼吸抑制與呼吸道分泌物增加。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"111110-N3-77":{"quick":"錯誤者：使用阿托品應滴定到「分泌物減少、阿托品化」，把心跳維持在60左右屬給藥不足。","detail":{"background":"有機磷中毒護理包括維持呼吸道通暢、清醒者可催吐減少吸收、照護者防護並維持通風。解毒以阿托品為主，其劑量「不是」以把心跳壓在60次/分為目標——心跳60代表副交感仍過度、阿托品給量不足；正確終點是「阿托品化」：呼吸道與口腔分泌物明顯減少、肺部囉音消失、皮膚乾燥，心跳通常會回升到約80～100次/分以上。故「維持心跳60左右」是錯誤的給藥指標。","options":{"A":"正確。維持呼吸道通暢。","B":"正確。清醒者可催吐以減少有機磷吸收。","C":"正確。照護者須防護並維持通風。","D":"錯誤(本題答案)。阿托品應滴定到分泌物減少(阿托品化)，非把心跳壓在60。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"113100-N3-49":{"quick":"瞳孔針尖樣縮小(<2 mm)→有機磷或鴉片(嗎啡類)中毒(1、3)。","detail":{"background":"瞳孔大小是中毒辨識的重要線索。「針尖樣縮瞳(pinpoint，瞳孔<2 mm)」見於：有機磷中毒(蕈毒鹼效應使瞳孔括約肌收縮)與鴉片類(嗎啡、海洛因)中毒(刺激動眼神經副交感核)。相對地，安非他命與古柯鹼屬交感興奮劑，會使瞳孔「放大(散瞳)」。故本題針尖瞳可能為1有機磷或3鴉片中毒，答案1、3。","options":{"A":"12錯誤：安非他命(2)為散瞳，非縮瞳。","B":"正確。有機磷(1)與鴉片(3)造成針尖樣縮瞳。","C":"24錯誤：安非他命與古柯鹼皆散瞳。","D":"34錯誤：古柯鹼(4)為交感興奮致散瞳。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"114170-N3-47":{"quick":"巴拉松(有機磷)中毒最適當：靜脈注射Atropine或PAM(解磷定)緩解症狀。","detail":{"background":"巴拉松屬有機磷殺蟲劑，誤食後抑制乙醯膽鹼酯酶，出現蕈毒鹼症狀(噁心、嘔吐、流淚、流涎、痰多、縮瞳、支氣管分泌增加)與菸鹼症狀(肌肉無力)。最適當的處置是給予解毒劑——阿托品(atropine)拮抗蕈毒鹼效應並使分泌物減少、PAM(解磷定)重活化AChE；同時維持呼吸道、除污。要注意有機磷中毒是「縮瞳」而非散瞳；有機磷多有「大蒜味」(杏仁味是氰化物)；對清醒且食入者多可洗胃/催吐，並非一律不可。故正確為「給Atropine或PAM緩解症狀」。","options":{"A":"有機磷多為大蒜味，杏仁味是氰化物，敘述錯誤。","B":"正確。給予Atropine或PAM以緩解有機磷中毒症狀。","C":"食入者多可洗胃/早期催吐，非一律不可。","D":"有機磷初期為「縮瞳」(非放大)，敘述錯誤。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"115030-N3-48":{"quick":"錯誤者：Apomorphine是「催吐劑」，並非有機磷的解毒劑(解毒劑為阿托品＋PAM)。","detail":{"background":"有機磷中毒臨床處置：進行胃灌洗以減少吸收，過程須維持呼吸道通暢、必要時插管；因有機磷可經皮膚吸收，照護者須戴口罩、手套、穿隔離衣防護，並除去沾染嘔吐物的衣物、協助沐浴去污。解毒劑是阿托品(拮抗蕈毒鹼)與解磷定PAM(重活化AChE)。Apomorphine(阿樸嗎啡)是中樞性「催吐劑」，可用於催吐但「不是」有機磷的解毒劑，故選項A把它說成拮抗劑為錯誤。","options":{"A":"錯誤(本題答案)。Apomorphine是催吐劑，非有機磷解毒劑(解毒劑為阿托品＋PAM)。","B":"正確。胃灌洗時維持呼吸道通暢，必要時插管。","C":"正確。有機磷可經皮吸收，照護者須防護。","D":"正確。除去沾染嘔吐物衣物並協助沐浴去污。"},"sources":["新文京《內外科護理學》中毒急症","有機磷/一氧化碳/巴拉刈中毒處置與解毒劑"]}},"103100-N3-75":{"quick":"蛇咬正確護理為2、3：去除戒指等影響血循物品、保持咬傷肢體低於心臟。","detail":{"background":"毒蛇咬傷的現場處置原則是「減少毒液擴散、避免加重組織傷害」：保持冷靜、限制患肢活動、移除戒指手錶等會在腫脹後妨礙血循的物品；患肢以夾板固定並維持在「低於心臟」的位置以減緩毒液回流(但不可過度下垂)；儘速就醫並注射抗蛇毒血清。禁忌包括：冰敷(造成血管收縮、加重局部缺血壞死)、口吸或切開傷口、飲酒或塗酒精(促進循環加速毒液擴散)、給予阿斯匹靈類(抗血小板會加重出血毒蛇造成的出血)。故正確為2、3。","options":{"A":"12錯誤：1冰敷會加重局部缺血壞死。","B":"14錯誤：4阿斯匹靈會加重出血。","C":"正確。2去除影響血循物品、3患肢低於心臟。","D":"35錯誤：5酒精消毒會促進毒液擴散。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"104100-N3-77":{"quick":"錯誤者：腐蝕劑(來舒/Lysol)中毒「不可催吐」，催吐會使腐蝕物再次灼傷食道。","detail":{"background":"來舒(Lysol)為含甲酚的腐蝕性消毒劑，誤食屬腐蝕劑中毒，會灼傷口腔、食道與胃黏膜(損傷常見於胃中部與出口處)。處置原則與所有腐蝕劑中毒相同——「禁止催吐、禁止洗胃、禁止中和劑」，因催吐使腐蝕物逆流再次灼傷食道、增加穿孔風險；應以大量清水/牛奶稀釋(在無穿孔下)、維持呼吸道、補充液體與電解質、必要時內視鏡評估。故「以催吐協助排空胃內物」是錯誤處置。","options":{"A":"依本題框架，來舒屬腐蝕劑中毒(視為酸性腐蝕劑)。","B":"損傷處通常在胃中部與出口處。","C":"錯誤(本題答案)。腐蝕劑中毒禁止催吐，以免再次灼傷食道。","D":"必要時補充大量液體以維持體液電解質平衡。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"105090-N3-76":{"quick":"會侵犯神經系統(神經毒)的毒蛇是「雨傘節」。","detail":{"background":"臺灣常見毒蛇依毒性分兩大類：「神經性毒(neurotoxin)」如雨傘節、眼鏡蛇，毒素阻斷神經肌肉傳導，造成眼瞼下垂、複視、吞嚥困難、肌肉無力與呼吸麻痺，局部腫脹疼痛相對輕；「出血性毒(hemotoxin)」如青竹絲、龜殼花、百步蛇，造成局部劇烈腫脹、瘀血、壞死與凝血異常。故會侵犯神經系統的是「雨傘節」。辨識毒蛇種類有助選擇對應的抗蛇毒血清(神經性或出血性)。","options":{"A":"青竹絲為出血性毒，以局部腫脹壞死為主。","B":"龜殼花為出血性毒。","C":"正確。雨傘節為神經性毒，會侵犯神經系統。","D":"百步蛇為出血性毒。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"105090-N3-78":{"quick":"酸性物質中毒正確處置：確認無穿孔後，可用水或制酸劑稀釋。","detail":{"background":"經口食入酸性腐蝕物的處置與鹼性相同，核心是「不催吐、不洗胃、不中和」：催吐與插鼻胃管反抽會使腐蝕物再次灼傷食道並增加穿孔風險；用檸檬汁等「中和」酸性會產生放熱反應反而加重傷害。正確作法是先評估有無穿孔(理學檢查、影像、內視鏡)，在確認「無腸胃道穿孔」的情況下，給予少量水或制酸劑「稀釋」、維持呼吸道、補充液體電解質並止痛。故正確為「內視鏡確認無穿孔後可用水或制酸劑稀釋」。","options":{"A":"錯誤。腐蝕劑中毒禁催吐，會再次灼傷食道。","B":"錯誤。檸檬汁中和為放熱反應，加重傷害。","C":"錯誤。插鼻胃管反抽有穿孔風險，不宜。","D":"正確。確認無穿孔後可用水或制酸劑稀釋。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"106030-N3-77":{"quick":"食物中毒後出現複視、眼瞼下垂、吞嚥困難等神經症狀→肉毒桿菌中毒。","detail":{"background":"不同食物中毒的特徵：沙門氏桿菌與大腸桿菌以腹瀉、腹痛、發燒等腸胃炎為主；金黃色葡萄球菌(腸毒素)以食入後數小時內劇烈嘔吐為主；而「肉毒桿菌(Clostridium botulinum)」產生的神經外毒素會阻斷乙醯膽鹼釋放，造成「下行性對稱性麻痺」與顱神經症狀——複視、眼瞼下垂、視力模糊、吞嚥困難、構音障礙，嚴重時呼吸肌麻痺，且「通常不發燒」。故本題神經症狀屬肉毒桿菌中毒。","options":{"A":"沙門氏桿菌以腹瀉、發燒等腸胃炎為主，無神經症狀。","B":"葡萄球菌以食後數小時劇烈嘔吐為主。","C":"大腸桿菌以腹瀉腹痛為主。","D":"正確。複視、眼瞼下垂、吞嚥困難為肉毒桿菌神經毒表現。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"107030-N3-76":{"quick":"中毒病人最優先：「穩定生命徵象」(維持呼吸道、呼吸、循環ABC)。","detail":{"background":"處理中毒病人的優先順序遵循急救ABC原則：第一優先永遠是「穩定生命徵象」——維持呼吸道通暢、確保呼吸與循環、處理意識與休克，因為許多中毒致死的直接原因是呼吸抑制或循環衰竭。生命徵象穩定後，再進行清除毒物(催吐/洗胃/活性碳/沖洗)、確認毒物種類、查詢毒物資訊(如毒物諮詢中心)與給予解毒劑。故最優先是穩定生命徵象，而非先確認或清除毒物。","options":{"A":"確認中毒物質在穩定生命徵象之後。","B":"清除毒物前須先穩定生命徵象。","C":"正確。最優先是穩定生命徵象(維持ABC)。","D":"查詢毒物資訊屬後續步驟，非最優先。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"109030-N3-75":{"quick":"錯誤者：肉毒桿菌中毒「通常不發燒」，不會有高燒。","detail":{"background":"肉毒桿菌中毒因食入被肉毒桿菌(俗稱臘腸桿菌)產生的外毒素污染的食物(常見於保存不當的真空/罐裝/醃漬食品)。臨床以「神經症狀」為核心——下行性對稱性麻痺、複視、眼瞼下垂、視力模糊、吞嚥與構音困難，嚴重時呼吸肌麻痺；腸胃道症狀(噁心嘔吐)可有可無，但「通常不發燒」(這點可與一般感染性食物中毒區別)。治療須儘速注射抗毒素，並洗胃、灌腸以清除腸道殘留毒素、支持呼吸。故「會有高燒」為錯誤敘述。","options":{"A":"正確。因食入肉毒桿菌外毒素污染的食物所致。","B":"錯誤(本題答案)。肉毒桿菌中毒通常不發燒，不會有高燒。","C":"正確。會有視力模糊、複視等神經症狀。","D":"正確。除注射抗毒素外，須洗胃灌腸清除腸道毒素。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"113100-N3-50":{"quick":"正確：肉毒桿菌外毒素不耐熱，食物以100°C加熱10分鐘可破壞毒素。","detail":{"background":"肉毒桿菌(Clostridium botulinum)是厭氧菌，其「芽孢」極耐熱(需121°C高壓滅菌)，但所產生的「神經外毒素」不耐熱，食物以100°C加熱「至少10分鐘」即可破壞毒素，這是預防的重要方法。臨床上肉毒桿菌中毒「先出現腸胃道症狀，再出現下行性神經麻痺」(視力模糊、眼瞼下垂、吞嚥困難)；治療有抗毒素可用；此菌為厭氧菌，在真空包裝、罐裝等缺氧環境反而「容易存活繁殖」。故正確敘述為「100°C加熱10分鐘可破壞(毒素)」。","options":{"A":"正確。外毒素不耐熱，100°C加熱10分鐘可破壞。","B":"多先有腸胃道症狀再出現神經症狀，「首先神經症狀」不全然正確。","C":"錯誤。肉毒桿菌中毒有抗毒素可治療。","D":"錯誤。肉毒桿菌為厭氧菌，在真空包裝中反而易存活。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"114170-N3-46":{"quick":"蛇咬最適當：辨識蛇的形狀顏色，並去除戒指等會影響血循的物品。","detail":{"background":"登山被蛇咬傷的正確現場處置：保持冷靜、限制患肢活動、辨識蛇的形狀與顏色(有助判斷神經性或出血性毒、選擇抗蛇毒血清)、移除戒指手錶等腫脹後會妨礙血循的物品、患肢固定維持低於心臟並儘速送醫。禁忌包括：切開傷口或口吸毒液(增加感染、傷害組織且救助者中毒)、冰敷(加重局部缺血壞死)、塗酒精/飲酒(促進循環擴散毒液)、為了打死蛇而延誤就醫或被二次咬傷(只需記住外觀或拍照即可)。故最適當為辨識蛇種並去除影響血循物品。","options":{"A":"正確。辨識蛇外觀並去除戒指等影響血循的物品。","B":"錯誤。割開傷口、口吸毒液會增加感染與救助者中毒。","C":"錯誤。酒精消毒促進擴散、冰敷加重缺血壞死。","D":"錯誤。不需冒險打死蛇而延誤就醫，記下外觀即可。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"115030-N3-49":{"quick":"錯誤者：誤食強鹼「不可立即胃灌洗」，會增加食道與胃穿孔風險。","detail":{"background":"強鹼(如清潔劑、通樂)誤食屬腐蝕劑中毒，會造成液化性壞死、深層灼傷食道與胃，穿孔風險高。處置原則為「禁催吐、禁洗胃(胃灌洗)、禁中和劑」——洗胃會使腐蝕物再度通過食道並可能造成穿孔；中和酸鹼為放熱反應加重傷害。正確作法是維持呼吸道、注意口腔與食道灼傷、評估有無穿孔(疑潰瘍/穿孔者先禁食)、在無穿孔下少量清水或牛奶稀釋、補充液體電解質與止痛。故「立即給予胃灌洗」是錯誤處置。","options":{"A":"錯誤(本題答案)。強鹼誤食不可胃灌洗，會增加穿孔風險。","B":"正確。不可給中和劑(放熱反應加重傷害)。","C":"正確。疑似胃潰瘍/穿孔應先禁食。","D":"正確。須注意口腔與食道之灼傷。"},"sources":["新文京《內外科護理學》中毒與蛇咬急救","腐蝕性中毒、毒蛇咬傷與肉毒桿菌中毒處置"]}},"103030-N3-36":{"quick":"錯誤者：「出血性腸胃刺激」是非類固醇消炎止痛藥(NSAID)的副作用，不是麻醉性止痛劑(鴉片類)。","detail":{"background":"麻醉性止痛劑(鴉片類，如嗎啡、哌替啶)作用於中樞，常見副作用包括：抑制呼吸中樞造成呼吸抑制、便秘(腸蠕動減少)、噁心嘔吐、嗜睡與意識改變、瞳孔縮小、尿滯留、低血壓與成癮。它並不會直接造成「出血性腸胃刺激/胃腸道出血」——胃黏膜糜爛出血是非類固醇消炎止痛藥(NSAID，如阿斯匹靈、ibuprofen)抑制前列腺素的典型副作用。故「出血性腸胃刺激」不屬於麻醉性止痛劑的副作用，為錯誤。","options":{"A":"正確。鴉片類使腸蠕動減少而便秘。","B":"正確。噁心嘔吐為常見副作用。","C":"正確。中樞抑制造成嗜睡。","D":"錯誤(本題答案)。出血性腸胃刺激是NSAID的副作用，非麻醉性止痛劑。"},"sources":["新文京《內外科護理學》環境急症與外傷","熱傷害、低體溫、溺水與多重外傷出血處置"]}},"106110-N3-80":{"quick":"錯誤者：嚴重低體溫(<30°C)的心室顫動對「電擊去顫反應差」，應先回溫再考慮電擊。","detail":{"background":"低體溫病人的回溫與支持處置：給予「加溫過」的靜脈輸液維持循環與尿量、用呼吸器給予溫暖潮濕的氧氣協助核心回溫、以重碳酸鈉矯正合併的代謝性酸中毒。心臟方面要注意：當核心體溫低於約30°C時，心肌對電擊去顫與藥物反應極差，反覆電擊往往無效，正確策略是「持續CPR並積極回溫」，待核心體溫回升到約30°C以上再嘗試去顫(口訣：未回溫前不宣告死亡、限制電擊次數)。故「體溫<30°C的心室顫動予以電擊」是不恰當的處置。","options":{"A":"正確。給予加溫的靜脈輸液以維持循環與尿量。","B":"正確。以呼吸器給溫暖潮濕氧氣協助核心回溫。","C":"正確。以重碳酸鈉矯正合併的代謝性酸中毒。","D":"錯誤(本題答案)。<30°C的VF對電擊反應差，應先回溫再去顫。"},"sources":["新文京《內外科護理學》環境急症與外傷","熱傷害、低體溫、溺水與多重外傷出血處置"]}},"107030-N3-78":{"quick":"錯誤者：溺水後的肺水腫不可給「利尿劑」，因屬非心因性(肺損傷)且病人多有低血容積。","detail":{"background":"溺水(near-drowning)後的肺水腫屬「非心因性」肺損傷(吸入造成肺泡微血管通透性增加、類似ARDS)，不是因為體液過多，給利尿劑無助於排水且會加重低血容積與循環不穩，故不適當。正確照護包括：完整評估有無其他外傷(常合併頸椎或頭部傷)、給氧並支持呼吸(嚴重者插管、正壓通氣/PEEP)、密切監測血壓以早期發現低血壓、積極保溫矯正低體溫(加熱毯、烤燈、溫輸液)。故「給予利尿劑促進肺部水分排出」為錯誤措施。","options":{"A":"正確。應評估有無其他身體損傷(常合併外傷)。","B":"錯誤(本題答案)。溺水肺水腫屬非心因性，給利尿劑無益且加重低血容積。","C":"正確。密切監測血壓以早期發現低血壓。","D":"正確。提供保溫措施矯正低體溫。"},"sources":["新文京《內外科護理學》環境急症與外傷","熱傷害、低體溫、溺水與多重外傷出血處置"]}},"108020-N3-75":{"quick":"車禍大腿骨折合併大撕裂傷、持續出血→低血容積性休克。","detail":{"background":"吳先生因車禍造成左大腿骨折且有15公分長、3公分深的撕裂傷並持續出血，是典型外傷性出血導致的「低血容積性休克」——大量失血使前負荷與循環血量不足，引發代償性心搏過速、血管收縮、皮膚濕冷與血壓下降。處置以「止血＋快速補充容積(晶體液、必要時輸血)」為核心。血管性(分布性)休克為血管擴張、皮膚溫暖；心因性為心臟幫浦衰竭；神經性為交感張力喪失致血管擴張且心跳偏慢，皆與本題外傷失血機轉不符。","options":{"A":"血管性休克為血管擴張、皮膚溫暖，與失血不符。","B":"心因性休克為心臟幫浦衰竭，非外傷失血。","C":"正確。外傷持續失血造成低血容積性休克。","D":"神經性休克為交感張力喪失致血管擴張、心跳偏慢，非本題。"},"sources":["新文京《內外科護理學》環境急症與外傷","熱傷害、低體溫、溺水與多重外傷出血處置"]}},"108020-N3-76":{"quick":"依症狀徵象估計失血量約「大於1500～2000 mL」(第三級出血)。","detail":{"background":"創傷失血依美國外科學院分級(以70 kg成人約5,000 mL血量計)：第一級<15%(<750 mL)生命徵象大致正常；第二級15～30%(750～1500 mL)心搏過速、脈壓變窄；第三級30～40%(1500～2000 mL)明顯心搏過速、血壓下降、尿量減少、意識改變；第四級>40%(>2000 mL)危及生命。吳先生大腿骨折合併深撕裂傷且持續出血，依其心搏過速、低血壓、皮膚濕冷與焦慮等代償失敗的表現，估計失血量約落在第三級(>1500～2000 mL)。","options":{"A":"<750 mL為第一級，生命徵象多正常，與本題不符。","B":"750～1500 mL為第二級，表現較本題輕。","C":"正確。約1500～2000 mL(第三級出血)，符合其休克表現。","D":">2000 mL為第四級，若無瀕死表現則略高估。"},"sources":["新文京《內外科護理學》環境急症與外傷","熱傷害、低體溫、溺水與多重外傷出血處置"]}},"108020-N3-77":{"quick":"不適宜者：對失血性休克應先止血與輸液輸血，「腦部電腦斷層」非立即必要處置。","detail":{"background":"外傷性低血容積休克的立即處置首重「止血與恢復循環」：抬高出血的患肢、必要時以止血帶或直接加壓控制大出血；建立大管徑靜脈通路依醫囑快速補充晶體液，並補充全血或血漿(大量失血須一併補凝血因子)。腦部電腦斷層用於評估顱內傷，本題傷害集中在大腿、且病人正處於失血休克需即時急救穩定，安排腦部CT既非立即必要、也會延誤救命處置，故為「不適宜」的立即處置。","options":{"A":"適宜。抬高患肢、止血帶控制大腿大出血。","B":"適宜。依醫囑快速補充液體。","C":"適宜。大量失血依醫囑補充全血或血漿。","D":"不適宜(本題答案)。失血休克應先止血輸液，腦部CT非立即必要。"},"sources":["新文京《內外科護理學》環境急症與外傷","熱傷害、低體溫、溺水與多重外傷出血處置"]}},"114030-N3-48":{"quick":"高溫下昏倒、皮膚乾熱無汗、體溫41.5°C、意識改變→熱中暑(heat stroke)。","detail":{"background":"熱傷害依嚴重度分：熱痙攣(運動後因鈉流失造成肌肉痙攣，體溫正常)、熱衰竭(大量流汗致脫水，皮膚濕冷蒼白、體溫正常或略高、血壓偏低)、熱暈厥(高溫久站血液鬱積下肢致短暫昏厥)、以及最嚴重的「熱中暑(heat stroke)」——體溫調節中樞失能，核心體溫>40°C、「皮膚乾熱無汗」、意識改變(昏迷、抽搐)，是致命急症。本題72歲老人(高危族群)在高溫下昏倒、皮膚乾熱、體溫41.5°C，符合熱中暑。處置須快速降溫(移到陰涼、脫衣、灑水搧風、冰敷大血管處)、補液與支持。","options":{"A":"正確。皮膚乾熱無汗、體溫>40°C、意識改變為熱中暑。","B":"熱痙攣以肌肉痙攣為主、體溫正常，非高燒昏倒。","C":"熱衰竭皮膚濕冷、大量流汗、體溫多正常，與乾熱不符。","D":"熱暈厥為短暫昏厥、可自行恢復，體溫不會達41.5°C。"},"sources":["新文京《內外科護理學》環境急症與外傷","熱傷害、低體溫、溺水與多重外傷出血處置"]}}},TO=["T1燒傷深度分類病生理變化與嚴重度", "T2燒傷面積評估與體液復甦", "T3燒傷急性期傷口照護與吸入性灼傷", "T4燒傷植皮復健與居家照護", "T5休克的分類病生理與處置", "T6心肺復甦術生存之鏈與呼吸道哽塞", "T7急診檢傷分類(TTAS與START)", "T8農藥氣體與藥物中毒", "T9腐蝕性蛇咬與生物毒素中毒", "T10環境急症多重外傷與圍手術期"],LEC={"T1燒傷深度分類病生理變化與嚴重度":{"title":"T1 燒傷深度、病生理變化與嚴重度 複習講義","html":"<h3>一、燒傷深度四分類(看「水泡、顏色、痛覺、blanch、癒合」)</h3>\n<ul>\n<li><b>一度(表淺)</b>：僅表皮；發紅、乾燥、<b>無水泡</b>、有痛；3～7天癒合<b>不留疤</b>(曬傷)。</li>\n<li><b>淺二度(表淺部分皮層)</b>：表皮＋真皮乳頭層；鮮紅濕潤、<b>有水泡、劇痛</b>、受壓變蒼白；約2週(10～21天)癒合、少疤。</li>\n<li><b>深二度(深層部分皮層)</b>：真皮網狀層；<b>灰白/紅白相間、有水泡、痛覺較鈍</b>、滲液水腫；3～4週以上、易疤與攣縮、常需植皮。</li>\n<li><b>三度(全皮層)</b>：整層真皮與附屬器破壞；<b>乾燥、皮革狀焦痂、無痛、受壓不變蒼白</b>；無法自行癒合需植皮。</li>\n<li><b>四度</b>：深及皮下脂肪、肌肉、骨；焦黑炭化、無痛；需皮瓣甚至截肢。</li>\n</ul>\n<p>判讀口訣：能變蒼白＋劇痛＝部分皮層；不變蒼白＋無痛＝全皮層。三、四度<b>無痛</b>是常考陷阱(神經破壞)。</p>\n<h3>二、嚴重度分級(成人，ABA)</h3>\n<ul>\n<li>輕度：部分皮層<15%、全皮層<2%。</li>\n<li>中度：部分皮層15～25%、全皮層2～10%(不在特殊部位)。</li>\n<li><b>重度(major)</b>：部分皮層>25%或全皮層>10%；<b>或臉/手/腳/會陰/關節、電燒傷、合併吸入性損傷或重大外傷、嬰幼兒老人</b>。<b>吸入性損傷一律重度</b>。</li>\n</ul>\n<h3>三、初期(48小時內)病生理＝「燒傷休克」</h3>\n<ul>\n<li>微血管通透性↑→血漿外滲→<b>水泡、全身水腫(>20%)、低血容積、CO↓、CVP↓、脈搏淺快、血比容↑</b>。</li>\n<li>電解質：細胞破壞釋鉀→<b>初期高血鉀</b>、鈉移入組織→低血鈉；壓力反應→<b>高血糖</b>(非低血糖)。</li>\n<li>腎：低灌流＋肌球蛋白/血紅素尿→<b>GFR↓、少尿、急性腎小管壞死</b>。</li>\n<li>48～72小時進入<b>利尿期</b>：液體回流→血比容↓、尿量↑、低血鉀。</li>\n</ul>\n<h3>四、電燒傷重點</h3>\n<p>外表小、內部大(冰山)；<b>電阻大組織(骨)產熱多、傷害重</b>；<b>交流電(AC)較直流電危險</b>(肌肉強直無法放手、易VF)；橫紋肌溶解→肌球蛋白尿→監測尿量、心律。</p>"},"T2燒傷面積評估與體液復甦":{"title":"T2 燒傷面積評估與體液復甦 複習講義","html":"<h3>一、九的法則(成人，估面積)</h3>\n<ul>\n<li>頭頸9、<b>每上肢9</b>(前4.5/後4.5)、<b>軀幹前18、後18</b>、<b>每下肢18</b>(前9/後9)、會陰1。</li>\n<li>只計受傷部位；看清「全部 vs 前/後面」；<b>一度(僅發紅無水泡)不計入</b>面積。</li>\n<li>兒童頭大腿小，需改用<b>Lund-Browder圖表</b>才準。</li>\n</ul>\n<h3>二、帕克蘭公式(Parkland，第一個24小時)</h3>\n<ul>\n<li>總量＝<b>4 mL ×體重(kg)×燒傷面積(%TBSA)</b>，用<b>乳酸林格氏液(晶體液)</b>。</li>\n<li><b>前8小時給一半、後16小時給另一半</b>；前8小時<b>自「受傷時間」起算</b>(非到院起算)。</li>\n<li>第一個24小時<b>不加葡萄糖、不加膠體</b>(膠體會從滲漏微血管漏出)；第二個24小時才考慮膠體。</li>\n<li>計算只需<b>體重與面積，與身高無關</b>。</li>\n</ul>\n<h3>三、復甦達標指標(最重要看尿量)</h3>\n<ul>\n<li><b>尿量30～50 mL/小時(0.5～1 mL/kg/hr)</b>是最敏感指標；電燒傷/血紅素尿時須提高到75～100。</li>\n<li>脈搏<110、收縮壓90～110、神智清楚、血比容回正常、無代謝性酸中毒。</li>\n<li>CVP正常約<b>5～12 cmH₂O</b>(≈2～8 mmHg)；依尿量「動態調整」輸液，過少低灌流、過多肺水腫。</li>\n<li>老人/心肺差者<b>不是給公式半量</b>，而是照算後更密切監測、放慢速度。</li>\n</ul>"},"T3燒傷急性期傷口照護與吸入性灼傷":{"title":"T3 燒傷急性期傷口照護與吸入性灼傷 複習講義","html":"<h3>一、現場急救五步驟「沖、脫、泡、蓋、送」</h3>\n<p>沖(流動<b>冷水</b>15～30分)、脫(沾黏勿強脫)、泡(<b>微涼冷水，禁冰水</b>)、蓋(乾淨布單保暖)、送。冰水會血管收縮、失溫、加深傷害。</p>\n<h3>二、吸入性灼傷</h3>\n<ul>\n<li>指標：<b>臉/頸燒傷、鼻毛燒焦、聲音嘶啞、喘鳴、碳粒痰、密閉火場史</b>。</li>\n<li>水腫可<b>延遲數小時</b>出現→當下無症狀不能排除；呼吸窘迫應<b>「及早」插管</b>(等水腫後極難插)。</li>\n<li>給100%高濃度氧(兼治CO中毒)、半坐臥、IV輸液。</li>\n</ul>\n<h3>三、傷口照護與用藥</h3>\n<ul>\n<li><b>開放式(暴露法)</b>：臉、會陰；環境保暖無菌。<b>閉鎖式(包紮)</b>：肢體、植皮區。</li>\n<li><b>水療</b>：水溫接近體溫<b>~37°C</b>、加食鹽接近生理鹽濃度、時間20～30分(過久/過冷會失溫電解質流失)。</li>\n<li>抗菌敷料：1% SSD最常用、不易電解質不平衡但可致<b>白血球減少</b>；<b>0.5%硝酸銀→低血鈉/低血鉀/低血氯</b>(非高血鈉)、染黑。</li>\n<li><b>H₂阻斷劑(Tagamet)</b>：預防壓力性潰瘍(<b>Curling ulcer</b>)。</li>\n</ul>\n<h3>四、焦痂切開術 vs 筋膜切開術</h3>\n<p><b>環形全層燒傷</b>焦痂壓迫→<b>腔室症候群</b>(6P)→<b>焦痂切開術</b>減壓；若灌流仍未改善→進一步<b>筋膜切開術</b>。高壓氧可提高組織氧合、促進上皮癒合。</p>"},"T4燒傷植皮復健與居家照護":{"title":"T4 燒傷植皮、復健與居家照護 複習講義","html":"<h3>一、是否植皮 & 植皮術後</h3>\n<ul>\n<li>決定植皮主因＝<b>深度與面積</b>(三、四度無法自癒必植皮)；生物敷料只是<b>暫時</b>覆蓋。</li>\n<li><b>受皮(植皮)區</b>：固定不動<b>3～5(～7)天</b>、抬高減腫；第一次換藥延後，過早會使移植皮脫落。</li>\n<li><b>供皮區</b>：取皮後<b>短時間加壓4～6小時</b>止血，之後保持乾燥，癒合後塗乳液。</li>\n</ul>\n<h3>二、抗變形姿位(anti-deformity，與攣縮方向相反)</h3>\n<ul>\n<li>頸伸直、<b>肩外展90～110°</b>、肘伸展、<b>髖伸展且外展</b>、<b>膝伸展</b>、踝背屈90°。</li>\n<li>陷阱：舒適的「屈曲、內收」正是攣縮方向；<b>膝下勿墊枕</b>(造成膝屈曲攣縮)。</li>\n</ul>\n<h3>三、壓力(彈性)衣</h3>\n<p>傷口癒合、植皮穩定、<b>腫脹消退後才穿</b>；每天<b>約23小時(日夜皆穿)</b>，僅沐浴/傷口護理脫；穿到疤痕成熟(約12～18個月)；訂兩套輪替。</p>\n<h3>四、疤痕與居家</h3>\n<ul>\n<li>疤痕「<b>按摩＋壓力衣＋保濕乳液</b>」三管齊下軟化、防增生。</li>\n<li>新生/植皮皮膚對紫外線敏感→<b>避免直接日曬</b>(防色素沉著)。</li>\n<li>持續關節運動防攣縮，<b>不可一味臥床制動</b>。</li>\n</ul>"},"T5休克的分類病生理與處置":{"title":"T5 休克的分類、病生理與處置 複習講義","html":"<h3>一、四大類休克(機轉、血流動力學)</h3>\n<ul>\n<li><b>低血容積性</b>(出血/燒傷/脫水)：CVP↓、CO↓、SVR↑(代償)、皮膚蒼白濕冷；首要<b>補晶體液/輸血</b>。</li>\n<li><b>心因性</b>(MI/心衰)：幫浦衰竭，CO↓、<b>CVP↑、肺動脈楔壓(PAWP)↑</b>、肺鬱血；用正性肌力藥、<b>IABP</b>(補液過多會肺水腫)。</li>\n<li><b>阻塞性</b>(張力性氣胸/心包填塞/大塊肺栓塞/主動脈剝離)：機械阻塞血流；須<b>解除阻塞</b>。</li>\n<li><b>分布性/血管性</b>(<b>敗血、過敏、神經</b>)：血管擴張、SVR↓、<b>皮膚潮紅溫暖(暖休克)</b>。</li>\n</ul>\n<h3>二、休克分期</h3>\n<ul>\n<li><b>代償期</b>：血壓「正常或略升」、心跳快、<b>過度換氣→呼吸性鹼中毒</b>、皮膚濕冷、尿少。</li>\n<li><b>進行期</b>：代償失敗、<b>血壓下降、代謝性(乳酸)酸中毒</b>、器官缺血、BUN/Cr↑。</li>\n<li><b>不可逆期</b>：多重器官衰竭、CO₂蓄積(PaCO₂>40)、pH↓、對治療無反應。</li>\n</ul>\n<h3>三、神經內分泌代償(全部「上升」)</h3>\n<p>交感神經興奮(<b>非副交感</b>)→腎上腺素↑、血管收縮、心跳快、四肢冷；<b>腎素↑→醛固酮↑</b>、ACTH↑、ADH↑(保鈉保水)；腸胃灌流與蠕動<b>減少</b>。肝臟：早期高血糖、漸進期低血糖與乳酸清除↓→<b>代謝性酸中毒</b>。</p>\n<h3>四、敗血症光譜與SIRS</h3>\n<p>SIRS四標準(≥2)：<b>體溫>38或<36、HR>90、RR>20或PaCO₂<32、WBC>12000或<4000</b>。SIRS＋感染＝敗血症→嚴重敗血症→<b>敗血性休克</b>(充分輸液後仍低血壓)。</p>\n<h3>五、護理重點</h3>\n<p>大管徑周邊IV＋<b>快速晶體液</b>(非一律先輸血)；輸注的液體/血液<b>加溫</b>；<b>勿用熱水袋/電毯包四肢</b>(末梢血管擴張、血液離開核心)。</p>"},"T6心肺復甦術生存之鏈與呼吸道哽塞":{"title":"T6 心肺復甦術、生存之鏈與呼吸道哽塞 複習講義","html":"<h3>一、成人高品質CPR(AHA)</h3>\n<ul>\n<li>步驟<b>C-A-B</b>；檢查脈搏<b>≤10秒</b>；按壓位置<b>兩乳頭連線中央(胸骨下半部)</b>。</li>\n<li>速率<b>100～120次/分</b>、深度<b>至少5公分</b>(≤6)、<b>每次完全回彈</b>、減少中斷(更換施救者中斷≤10秒)。</li>\n<li>按壓:吹氣＝<b>30:2(成人不論單/雙人)</b>；15:2僅兒童/嬰兒雙人。胸外按壓只達正常CO約<b>25～33%</b>。</li>\n<li>甦醒球(BVM)：尖端對<b>鼻樑</b>、氧流速<b>12～15 L/min</b>、擠到胸部起伏即可(勿完全壓扁)。</li>\n</ul>\n<h3>二、求救時機(單人)</h3>\n<p><b>心因性停止(心臟病發)＝先求救取AED</b>(多為VF，重點儘早去顫)；<b>窒息性停止(溺水、中毒、創傷、嬰幼兒)＝先CPR 2分鐘再求救</b>。</p>\n<h3>三、去顫</h3>\n<p>可電擊＝<b>VF / 無脈搏VT</b>；不可電擊＝<b>心搏停止(asystole)、PEA</b>→繼續CPR＋給藥。急救藥：amiodarone(VF/VT)、atropine(心搏過緩)、dopamine(低血壓)、<b>NaHCO₃用於代謝性酸中毒(非鹼血症)</b>。</p>\n<h3>四、生存之鏈(2020，IHCA院內)</h3>\n<p><b>早期監測與預防→啟動緊急應變→高品質CPR→快速去顫→停止後照護→復原</b>。院內把「預防」放最前；院外(OHCA)才有院前EMS環節。</p>\n<h3>五、呼吸道異物哽塞</h3>\n<ul>\n<li><b>能用力咳(有效咳嗽)</b>→鼓勵繼續咳、勿干擾。</li>\n<li><b>完全阻塞(不能咳/發聲、發紺)</b>→哈姆立克腹戳法；<b>孕婦/肥胖者改胸戳法</b>。</li>\n<li>開放氣道：一般用壓額抬下巴；<b>疑頸椎傷(車禍/跌倒)用推下顎法</b>。</li>\n</ul>"},"T7急診檢傷分類(TTAS與START)":{"title":"T7 急診檢傷分類(TTAS與START) 複習講義","html":"<h3>一、TTAS 五級(臺灣急診檢傷與急迫度)</h3>\n<table border=\"1\" cellspacing=\"0\" cellpadding=\"4\" style=\"border-collapse:collapse;font-size:.9rem\">\n<tr><th>級數</th><th>名稱</th><th>處置/再評估時限</th></tr>\n<tr><td>第一級</td><td>復甦急救</td><td>立即(持續監測)</td></tr>\n<tr><td>第二級</td><td>危急</td><td>10分鐘</td></tr>\n<tr><td>第三級</td><td>緊急</td><td>30分鐘</td></tr>\n<tr><td>第四級</td><td>次緊急</td><td>60分鐘</td></tr>\n<tr><td>第五級</td><td>非緊急</td><td>120分鐘</td></tr>\n</table>\n<ul>\n<li>判級依「<b>主訴＋生命徵象＋意識＋疼痛</b>」綜合。中樞性疼痛權重高：8～10分≈二級、4～7分≈三級。</li>\n<li>常見：已插管/嚴重內出血/OHCA→一級；SBP>200＋胸痛、SaO₂<92＋低血壓→二級。</li>\n</ul>\n<h3>二、START 大量傷患檢傷(四色)</h3>\n<ul>\n<li><b>紅(第一優先)</b>：立即危及生命但可救(呼吸>30、橈動脈弱/回充>2秒、無法聽指令)。</li>\n<li><b>黃(第二優先)</b>：傷重但可暫等。</li>\n<li><b>綠(第三優先)</b>：<b>可自行行走的輕傷</b>。</li>\n<li><b>黑</b>：死亡/瀕死無法救治，最後處理。</li>\n</ul>\n<p>流程：先讓「能走者」走開標綠→評估呼吸→循環→意識。OHCA到院不等於死亡，應立即復甦急救、邊救邊評估。</p>"},"T8農藥氣體與藥物中毒":{"title":"T8 農藥、氣體與藥物中毒 複習講義","html":"<h3>一、有機磷(殺蟲劑/巴拉松)</h3>\n<ul>\n<li>機轉：抑制<b>乙醯膽鹼酯酶(AChE)</b>→乙醯膽鹼堆積。途徑：吸入、攝食、<b>皮膚吸收</b>(照護者須防護)。</li>\n<li><b>蕈毒鹼性(SLUDGE＋縮瞳、分泌物多、心搏緩)</b>；<b>菸鹼性(肌肉抽動、無力、麻痺)</b>。</li>\n<li>解毒劑＝<b>阿托品(拮抗蕈毒鹼)＋解磷定PAM(重活化AChE)</b>；<b>嗎啡禁用</b>(抑制呼吸)。</li>\n<li>阿托品終點＝<b>「阿托品化」(分泌物減少、皮膚乾)</b>，非把心跳壓在60。</li>\n</ul>\n<h3>二、一氧化碳(CO)</h3>\n<ul>\n<li><b>無色、無臭、無味</b>；與血紅素親和力為氧的<b>200～300倍</b>→COHb→組織缺氧、黏膜<b>櫻桃紅</b>。</li>\n<li>診斷測<b>碳氧血紅素(COHb)</b>(SpO₂會假性正常)；COHb>10%有症狀、>60%昏迷死亡。</li>\n<li>治療＝<b>高濃度氧氣</b>(半衰期室內空氣~4～5hr、100%O₂~60～90分、高壓氧~20～30分)；移到通風處、休息。</li>\n</ul>\n<h3>三、巴拉刈(Paraquat 除草劑)</h3>\n<p>氧自由基傷害；<b>肺(含氧最高)受傷最重→進行性肺纖維化</b>；24小時內急性腎衰竭；<b>主要經腎排泄</b>。陷阱：<b>避免給氧</b>(氧加重肺纖維化)；儘速洗胃＋吸附劑。</p>\n<h3>四、瞳孔與一般原則</h3>\n<ul>\n<li><b>針尖瞳(pinpoint)</b>：有機磷、鴉片；<b>散瞳</b>：安非他命、古柯鹼。</li>\n<li>巴比妥/鴉片過量→呼吸抑制→高碳酸血症。</li>\n<li>中毒<b>最優先＝穩定生命徵象(ABC)</b>；促排方法：瀉藥、尿液酸鹼調整、透析、活性碳(<b>人工呼吸器是支持，非促排</b>)。</li>\n</ul>"},"T9腐蝕性蛇咬與生物毒素中毒":{"title":"T9 腐蝕性、蛇咬與生物毒素中毒 複習講義","html":"<h3>一、腐蝕劑中毒(強酸、強鹼、來舒Lysol)</h3>\n<ul>\n<li><b>三禁：禁催吐、禁洗胃(胃灌洗)、禁中和劑</b>(催吐/洗胃再次灼傷食道、增穿孔；中和為放熱反應加重傷害)。</li>\n<li>正確：維持呼吸道、評估有無穿孔、<b>無穿孔下少量清水/牛奶稀釋</b>、補液電解質、注意口腔食道灼傷、疑穿孔先禁食。</li>\n<li>酸→液化較淺、傷胃中部出口；鹼→液化性壞死較深、易穿孔。</li>\n</ul>\n<h3>二、毒蛇咬傷</h3>\n<ul>\n<li><b>神經性毒：雨傘節、眼鏡蛇</b>(眼瞼下垂、複視、吞嚥困難、呼吸麻痺)；<b>出血性毒：青竹絲、龜殼花、百步蛇</b>(腫脹、瘀血、壞死、凝血異常)。</li>\n<li>處置：冷靜、限制活動、<b>辨識蛇外觀、去除戒指</b>、患肢固定<b>低於心臟</b>、儘速送醫打抗蛇毒血清。</li>\n<li><b>禁忌：冰敷、切開口吸、酒精/飲酒、阿斯匹靈、為打蛇延誤就醫</b>。</li>\n</ul>\n<h3>三、肉毒桿菌(臘腸桿菌)中毒</h3>\n<ul>\n<li>食入<b>外毒素</b>污染食物(保存不當真空/罐裝/醃漬)；<b>厭氧菌→真空包裝反而易存活</b>。</li>\n<li>神經症狀：<b>下行性麻痺、複視、眼瞼下垂、吞嚥困難；通常不發燒</b>。</li>\n<li>預防：<b>外毒素不耐熱，100°C加熱10分鐘可破壞</b>(芽孢耐熱需121°C)。治療：<b>抗毒素</b>＋洗胃灌腸。</li>\n</ul>\n<p>食物中毒鑑別：沙門/大腸＝腹瀉發燒；葡萄球菌＝數小時內劇吐；<b>肉毒＝神經症狀無燒</b>。</p>"},"T10環境急症多重外傷與圍手術期":{"title":"T10 環境急症、多重外傷與圍手術期 複習講義","html":"<h3>一、熱傷害</h3>\n<ul>\n<li><b>熱中暑(heat stroke)</b>：核心>40°C、<b>皮膚乾熱無汗</b>、意識改變→致命急症，<b>快速降溫</b>(陰涼、脫衣、灑水搧風、大血管冰敷)。</li>\n<li>熱衰竭：大量出汗、<b>皮膚濕冷</b>、體溫多正常、低血壓；熱痙攣：肌肉痙攣；熱暈厥：久站短暫昏厥。</li>\n</ul>\n<h3>二、低體溫回溫</h3>\n<p>加溫靜脈輸液、呼吸器給溫暖潮濕氧、NaHCO₃矯正酸中毒；<b>核心體溫<30°C時心臟對電擊去顫反應差</b>→先積極回溫、限制電擊、未回溫不宣告死亡。</p>\n<h3>三、溺水(near-drowning)</h3>\n<p>肺水腫屬<b>非心因性(類ARDS)</b>→<b>不給利尿劑</b>；給氧/正壓通氣、評估合併外傷、監測血壓、積極保溫。</p>\n<h3>四、多重外傷與出血分級</h3>\n<ul>\n<li>外傷大量出血→<b>低血容積性休克</b>；處置先<b>止血(加壓/止血帶)＋快速輸液輸血</b>；失血休克時<b>腦部CT非立即必要</b>。</li>\n<li>失血分級(70kg)：Ⅰ<15%(<750mL)、Ⅱ15～30%(750～1500)、<b>Ⅲ30～40%(1500～2000，心搏快、血壓降、尿少)</b>、Ⅳ>40%(>2000，瀕死)。</li>\n</ul>\n<h3>五、麻醉性止痛劑(圍手術期/鴉片類)</h3>\n<p>副作用：<b>呼吸抑制、便秘、噁心嘔吐、嗜睡、縮瞳、尿滯留</b>；<b>胃腸道出血是NSAID的副作用，不是鴉片類</b>。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^T(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
