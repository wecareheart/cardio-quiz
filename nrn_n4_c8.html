A":"血色素(Hb)","B":"平均紅血球體積(MCV)","C":"鐵離子(Fe++)","D":"α-胎兒蛋白(α-AFP)"},"img":""}],E={"101030-N4-67":{"quick":"10歲缺鐵性貧血注射鐵劑Imferon方式錯誤的是「注射後需揉搓注射部位,以促進藥物吸收」(D)。","detail":{"background":"注射型鐵劑(Imferon/iron dextran)有顏色、外漏會造成皮膚染色與疼痛,故須採Z字形深部肌肉注射、抽藥後更換新針頭(避免針上殘留鐵劑刺激皮下),注射後略停5~10秒再拔針,且注射後不可揉搓(揉搓會使鐵劑沿針道滲漏至皮下造成染色)。","options":{"A":"正確。抽藥後更換新針頭,避免針上殘留鐵劑刺激皮下。","B":"正確。採Z字形肌肉注射防鐵劑滲漏染色。","C":"正確。注射後略停5~10秒再拔針。","D":"錯誤(本題答案)。注射後勿揉搓(揉搓會使鐵劑滲漏至皮下染色)。"},"sources":["新文京《兒科護理學》缺鐵性貧血","Z字注射"]}},"101110-N4-25":{"quick":"5個月缺鐵性貧血、只喝牛奶果汁拒食鐵劑,較適當的護理指導是「以小滴管餵食鐵劑後,再給予柳橙、蕃茄等果汁」(C)。","detail":{"background":"嬰兒缺鐵性貧血治療以口服鐵劑為主,維生素C(柑橘、蕃茄汁)可促進鐵吸收;鐵劑勿與牛奶併服(牛奶抑制鐵吸收)。對拒食的嬰兒可用小滴管餵鐵劑後再給果汁,既助吸收又提高接受度,優於改用侵入性肌注或與牛奶混餵。","options":{"A":"錯。鐵劑與奶製品併餵會抑制鐵吸收。","B":"肌肉注射為侵入性,非首選(口服無效才考慮)。","C":"正確。小滴管餵鐵劑後給維C果汁,助吸收又提高接受度。","D":"富鐵副食品是輔助,但5個月嬰兒拒食情境下當下指導以滴管餵鐵劑+維C較直接。"},"sources":["新文京《兒科護理學》缺鐵性貧血","維生素C"]}},"102030-N4-65":{"quick":"缺鐵性貧血嬰兒口服鐵劑餵食正確的是「鐵劑可以在飯前1小時與柑橘類果汁一起服用,吸收效果會更好」(D)。","detail":{"background":"口服鐵劑宜飯前1小時空腹服用以利吸收,並與富含維生素C的柑橘類果汁併服可增加鐵吸收;勿與牛奶/制酸劑併服(抑制吸收);服鐵劑後糞便變黑是正常現象(未吸收的鐵)、不需停藥;若腹瀉等不適可改為飯後服用以減輕腸胃刺激。","options":{"A":"錯。鐵劑與牛奶併服會抑制鐵吸收。","B":"引起不適應改飯後服用減輕刺激(非更早的飯前30分鐘)。","C":"錯。糞便變黑是正常(未吸收的鐵),不需停藥。","D":"正確。飯前1小時與柑橘類果汁併服,吸收更好。"},"sources":["新文京《兒科護理學》缺鐵性貧血","空腹維C"]}},"102110-N4-63":{"quick":"正確服用鐵劑的方式是「飯前1小時與果汁一起服用」(A)。","detail":{"background":"口服鐵劑最佳方式是飯前1小時空腹、搭配富含維生素C的果汁服用以促進吸收。牛奶、制酸劑(中和胃酸)、茶皆會抑制鐵吸收,不可併服。","options":{"A":"正確。飯前1小時空腹與果汁(維C)併服,吸收最佳。","B":"錯。與牛奶併服抑制鐵吸收。","C":"錯。與制酸劑併服抑制鐵吸收。","D":"錯。與制酸劑併服抑制鐵吸收。"},"sources":["新文京《兒科護理學》缺鐵性貧血","空腹維C"]}},"103030-N4-67":{"quick":"9個月體重停滯、Hb 8、診斷缺鐵性貧血,正確的是「鐵劑最好在飯前1小時與含維生素C之果汁一起服用」(B)。","detail":{"background":"缺鐵性貧血為後天營養性貧血(非遺傳);治療以口服鐵劑為主,飯前1小時空腹搭配維生素C果汁吸收最佳;母乳可繼續哺餵並添加富鐵副食品(非須停母乳);口服鐵劑為首選,肌注鐵劑後不可揉搓(防染色)。","options":{"A":"錯。缺鐵性貧血是後天營養性(非體染色體隱性遺傳)。","B":"正確。鐵劑飯前1小時與含維C果汁併服。","C":"錯。可繼續母乳並加富鐵副食品(非須停母乳)。","D":"錯。肌注鐵劑後不可揉搓(防皮膚染色),且口服為首選。"},"sources":["新文京《兒科護理學》缺鐵性貧血","非遺傳"]}},"108020-N4-47":{"quick":"缺鐵性貧血口服鐵劑注意事項錯誤的是「合併制酸劑服用,吸收較佳」(B)。","detail":{"background":"口服鐵劑宜飯前1小時空腹服用吸收較佳;制酸劑會中和胃酸、抑制鐵吸收,不可併服;液態鐵劑宜用吸管服用以免染牙;服鐵劑期間糞便呈黑色是正常現象。","options":{"A":"正確。飯前1小時空腹服用吸收較佳。","B":"錯誤(本題答案)。制酸劑會抑制鐵吸收,不可併服。","C":"正確。液態鐵劑宜用吸管服用以免染牙。","D":"正確。服鐵劑期間糞便呈黑色是正常。"},"sources":["新文京《兒科護理學》缺鐵性貧血","制酸劑"]}},"111030-N4-67":{"quick":"缺鐵性貧血與地中海型貧血血液檢驗正確的是「缺鐵性貧血血清鐵質降低;地中海型貧血鐵蛋白(ferritin)則上升」(C)。","detail":{"background":"兩者皆為小球性貧血(MCV、MCH皆降低)。鑑別在鐵代謝:缺鐵性貧血因鐵不足→血清鐵與鐵蛋白(ferritin)皆降低;地中海型貧血鐵不缺、又因常輸血→鐵蛋白上升(甚至鐵過載)。缺鐵性好發6~24個月,地中海型為遺傳性、自幼即可表現。","options":{"A":"錯。兩者MCH皆低於正常(非地中海型正常)。","B":"錯。兩者MCV皆低於正常(非缺鐵正常)。","C":"正確。缺鐵性血清鐵降低;地中海型鐵蛋白上升。","D":"缺鐵性好發6~24個月,地中海型為遺傳性自幼可表現(發病時間不同)。"},"sources":["新文京《兒科護理學》貧血鑑別","鐵蛋白"]}},"111110-N4-67":{"quick":"5歲缺鐵性貧血Hb 5.5,與此檢驗值最不相關的身體反應是「常出現發燒症狀」(A)。","detail":{"background":"重度缺鐵性貧血(Hb 5.5)因攜氧能力下降,身體以代償方式維持供氧:心跳加快(休息時可達100~120次/分)、易疲倦、注意力不集中、生長發展遲緩。發燒是感染/發炎的徵象,與貧血本身的攜氧不足無直接關係。","options":{"A":"最不相關(本題答案)。發燒是感染徵象,與貧血攜氧不足無直接關係。","B":"相關。貧血代償使休息時心跳加快100~120次/分。","C":"相關。供氧不足致注意力不集中。","D":"相關。長期貧血致生長發展遲緩。"},"sources":["新文京《兒科護理學》缺鐵性貧血","代償"]}},"112180-N4-41":{"quick":"4歲缺鐵性貧血鐵劑(Imferon)注射不適當的是「注入鐵劑後應該立即拔針」(C)。","detail":{"background":"注射型鐵劑須Z字形深部肌肉注射、針以90度插入、注射後勿揉搓(防滲漏染色);關鍵是注入後應略停5~10秒再拔針,讓鐵劑擴散、避免沿針道回滲至皮下造成染色與疼痛,故「立即拔針」不適當。","options":{"A":"適當。以Z字形深部肌肉注射防滲漏。","B":"適當。持針以90度插入皮膚(深部肌注)。","C":"不適當(本題答案)。應略停5~10秒再拔針(非立即拔針)。","D":"適當。勿揉搓注射部位防染色。"},"sources":["新文京《兒科護理學》缺鐵性貧血","拔針"]}},"113030-N4-41":{"quick":"嬰幼兒缺鐵性貧血正確的是「常發生於6~24個月大的足月兒」(B)。","detail":{"background":"缺鐵性貧血是嬰幼兒最常見的營養性貧血,好發6~24個月大的足月兒(母體儲存鐵約6個月耗盡、副食品鐵補充不足);為後天營養性(非遺傳);紅血球呈小球性(MCV小於正常);長期貧血以心跳加快代償(非過慢)。","options":{"A":"錯。缺鐵性貧血是後天營養性(非體染色體隱性遺傳)。","B":"正確。常發生於6~24個月大的足月兒。","C":"錯。紅血球體積比正常小(小球性,非變大)。","D":"錯。長期貧血致心跳加快代償(非過慢)。"},"sources":["新文京《兒科護理學》缺鐵性貧血","6~24個月"]}},"115030-N4-41":{"quick":"10個月缺鐵性貧血口服鐵劑指導正確的是「鐵劑與柑橘類果汁一起服用,會促進鐵劑吸收」(A)。","detail":{"background":"口服鐵劑搭配維生素C(柑橘類果汁)可促進鐵吸收;制酸劑、牛奶皆會抑制鐵吸收不可併服;服鐵劑後糞便變黑是正常現象、不需停藥就醫。","options":{"A":"正確。與柑橘類果汁(維C)併服促進鐵吸收。","B":"錯。制酸劑會抑制鐵吸收。","C":"錯。糞便變黑是正常(未吸收的鐵),不需停藥。","D":"錯。與牛奶併服會抑制鐵吸收。"},"sources":["新文京《兒科護理學》缺鐵性貧血","維生素C"]}},"101110-N4-26":{"quick":"β型海洋性貧血(β-Thalassemia)患童錯誤的是「出生後即出現明顯的、嚴重的溶血性貧血症狀」(B)。","detail":{"background":"β型海洋性貧血是體染色體隱性遺傳。因胎兒期以HbF(α2γ2)為主、不需β鏈,故出生時無症狀;待出生後數月HbF轉為需β鏈的HbA時,β鏈製造不足才逐漸出現溶血性貧血(約3~6個月後)。重症需終身定期輸血維持Hb>10、並給排鐵劑防鐵質沉著。","options":{"A":"正確。屬體染色體隱性遺傳疾病。","B":"錯誤(本題答案)。出生時無症狀,數月後HbF轉HbA才漸出現貧血(非出生即嚴重溶血)。","C":"正確。重症需終身定期輸血維持Hb>10。","D":"正確。長期輸血需給排鐵劑防血鐵質沉著症。"},"sources":["新文京《兒科護理學》海洋性貧血","HbF"]}},"102030-N4-66":{"quick":"未治療會出現顱骨變大、塌鼻、暴牙、顴骨突出面部表徵的是「β型海洋性貧血(β-thalassemia)」(A)。","detail":{"background":"β型海洋性貧血因慢性溶血、骨髓代償性增生造血,使骨髓腔擴大、骨皮質變薄,造成特有的顱骨變大、塌鼻、暴牙、顴骨突出的「地中海面容」。鐮狀細胞貧血、再生不良性貧血、血友病無此典型面容。","options":{"A":"正確。骨髓代償增生造成地中海面容(顱骨變大、塌鼻、暴牙)。","B":"鐮狀細胞貧血以血管阻塞危象為主,無此典型面容。","C":"再生不良性貧血是全血球減少,無此面容。","D":"血友病是凝血因子缺乏,與面容無關。"},"sources":["新文京《兒科護理學》海洋性貧血","地中海面容"]}},"102110-N4-6":{"quick":"父母皆為α型地中海貧血帶因者,下一胎也為帶因者的機率是「1/2」(C)。","detail":{"background":"體染色體隱性遺傳,父母皆為帶因者(Aa×Aa),子代基因型比例為1/4正常(AA)、1/2帶因者(Aa)、1/4患病(aa)。故「帶因者(Aa)」的機率為1/2。","options":{"A":"0不對(帶因者比例不為0)。","B":"1/4是患病(aa)或正常(AA)各別的機率,非帶因。","C":"正確。帶因者(Aa)機率為1/2。","D":"1不對(非全部帶因)。"},"sources":["新文京《兒科護理學》遺傳","隱性遺傳比例"]}},"103030-N4-66":{"quick":"鐮刀狀細胞貧血(sickle cell anemia)處置正確的是「以濃縮紅血球作輸血治療」(C)。","detail":{"background":"鐮狀細胞貧血因HbS使紅血球在缺氧時鐮狀化、阻塞血管造成疼痛危象。處置:嚴重貧血/危象時以濃縮紅血球輸血;止痛用嗎啡等(勿用aspirin,恐影響凝血並酸化加重鐮狀化);腫脹用熱敷促循環(非冷敷,冷會加重血管收縮鐮狀化);須充分補充水分(非限水,脫水加重鐮狀化)。","options":{"A":"錯。止痛勿用aspirin(影響凝血、酸化加重鐮狀化),用嗎啡。","B":"錯。應熱敷促循環(冷敷會加重血管收縮鐮狀化)。","C":"正確。嚴重貧血/危象以濃縮紅血球輸血。","D":"錯。應充分補水(限水/脫水會加重鐮狀化)。"},"sources":["新文京《兒科護理學》鐮狀細胞貧血","輸血"]}},"106110-N4-9":{"quick":"海洋性貧血敘述錯誤的是「是一種體染色體顯性遺傳疾病」(A)。","detail":{"background":"海洋性貧血是體染色體「隱性」遺傳(非顯性)。α型由第16對染色體控制α血球素的基因缺損、β型由第11對染色體控制β血球素的基因缺損;重症β型海洋性貧血根治的唯一方法是造血幹細胞(骨髓)移植。","options":{"A":"錯誤(本題答案)。海洋性貧血是體染色體隱性遺傳(非顯性)。","B":"正確。α型是第16對染色體α血球素基因缺損。","C":"正確。β型是第11對染色體β血球素基因缺損。","D":"正確。根治重症β型的唯一方法是骨髓移植。"},"sources":["新文京《兒科護理學》海洋性貧血","隱性遺傳"]}},"106110-N4-67":{"quick":"7歲重度β-海洋性貧血定期輸血,外觀視診錯誤的是「膚色蒼白」(B)。","detail":{"background":"重度β型海洋性貧血因骨髓代償增生造成體型矮瘦、塌鼻頭大(地中海面容)、肝脾腫大致腹部腫大;又因長期輸血導致鐵質沉著於皮膚,膚色多呈「古銅色/暗沉」而非蒼白,故「膚色蒼白」的視診描述錯誤。","options":{"A":"正確。骨髓增生致體型矮瘦。","B":"錯誤(本題答案)。長期輸血鐵沉著使膚色呈古銅/暗沉(非蒼白)。","C":"正確。骨髓增生致塌鼻、頭大(地中海面容)。","D":"正確。肝脾腫大致腹部腫大。"},"sources":["新文京《兒科護理學》海洋性貧血","鐵沉著"]}},"107110-N4-46":{"quick":"鐮狀細胞貧血(sickle cell anemia)不會出現的臨床表徵是「顱骨變大、顴骨隆起」(A)。","detail":{"background":"鐮狀細胞貧血因HbS使紅血球鐮狀化、阻塞微血管,造成末端肢體腫脹疼痛(手足症候群)、視網膜病變致失明、肝脾腫大等血管阻塞性表現。「顱骨變大、顴骨隆起」的地中海面容是β型海洋性貧血(骨髓代償增生)的特徵,非鐮狀細胞貧血。","options":{"A":"不會(本題答案)。顱骨變大顴骨隆起是β海洋性貧血(非鐮狀細胞貧血)。","B":"會。末端肢體腫脹與疼痛(手足症候群)。","C":"會。視網膜病變以致失明。","D":"會。肝、脾腫大。"},"sources":["新文京《兒科護理學》鐮狀細胞貧血","血管阻塞"]}},"109110-N4-66":{"quick":"不是體染色體隱性遺傳的是「G-6-PD缺乏症」(C)。","detail":{"background":"G-6-PD缺乏症(蠶豆症)是「性聯隱性」遺傳(X染色體),好發男性。原發性再生不良性貧血(Fanconi氏)、海洋性貧血、鐮狀細胞貧血皆為體染色體隱性遺傳。故G-6-PD缺乏症不屬於體染色體隱性遺傳。","options":{"A":"是體染色體隱性。Fanconi氏再生不良性貧血。","B":"是體染色體隱性。海洋性貧血。","C":"本題答案(非)。G-6-PD缺乏症是性聯隱性遺傳(X染色體)。","D":"是體染色體隱性。鐮狀細胞貧血。"},"sources":["新文京《兒科護理學》遺傳","性聯隱性"]}},"112110-N4-67":{"quick":"Hb 4.1須輸血,正確的是「輸血過程中使用溫血器,但溫度不可高於37°C」(D)。","detail":{"background":"輸血護理:可用溫血器但溫度不可超過37°C(過熱會溶血);過敏反應應立即停止輸血、保留靜脈以生理食鹽水維持(不可在血袋中加藥);注射部位灼熱感應停輸並評估(且只能用生理食鹽水沖洗、不可用5%葡萄糖水,葡萄糖會使紅血球溶血聚集);急性溶血反應因血型不合多在輸血後「數分鐘內(早期)」出現。","options":{"A":"錯。過敏反應應立即停輸,不可在血袋中加藥。","B":"錯。輸血管路只能用生理食鹽水(5%葡萄糖水會溶血)。","C":"錯。急性溶血反應多在輸血後早期(數分鐘~15分鐘內)出現(非2小時)。","D":"正確。可用溫血器但溫度不可高於37°C(過熱溶血)。"},"sources":["新文京《兒科護理學》輸血","溫血器"]}},"114030-N4-41":{"quick":"海洋性貧血兒童使用排鐵劑(deferoxamine)治療錯誤的是「適應的年齡為5~7歲,因遵從性會更好」(B)。","detail":{"background":"長期輸血的海洋性貧血兒童會鐵質沉積,須用排鐵劑(deferoxamine)排鐵;通常在開始定期輸血、體內鐵負荷達一定程度後(約2~3歲起)即須開始排鐵,並非等到5~7歲;排鐵過程尿液呈紅/橘紅色、需補充維生素C(助排鐵)、可皮下注射且宜夜間長時間執行。","options":{"A":"正確。排鐵過程尿液呈紅色或橘紅色。","B":"錯誤(本題答案)。應在鐵負荷達標即開始排鐵(約2~3歲起),非等到5~7歲。","C":"正確。排鐵過程需補充維生素C助排鐵。","D":"正確。可皮下注射,宜夜間長時間執行。"},"sources":["新文京《兒科護理學》海洋性貧血","排鐵劑"]}},"114100-N4-49":{"quick":"β型海洋性貧血(體染色體隱性),父母皆帶因者,下一代罹患(患病)的機率是「四分之一」(B)。","detail":{"background":"體染色體隱性遺傳,父母皆為帶因者(Aa×Aa),子代為1/4正常(AA)、1/2帶因者(Aa)、1/4患病(aa)。問「罹患海洋性貧血(患病aa)」的機率,為1/4。","options":{"A":"1/2是帶因者(Aa)的機率,非患病。","B":"正確。患病(aa)機率為1/4。","C":"3/4是「帶因或患病」合計,非單純患病。","D":"百分之百不對。"},"sources":["新文京《兒科護理學》遺傳","隱性遺傳比例"]}},"102110-N4-64":{"quick":"不是再生不良性貧血(aplastic anemia)病童常用治療藥劑的是「immunoglobulin」(D)。","detail":{"background":"再生不良性貧血是骨髓造血功能衰竭、全血球減少。治療含免疫抑制(antilymphocyte/antithymocyte globulin、cyclosporine抑制自體免疫破壞骨髓)、雄性素(testosterone刺激造血),嚴重者造血幹細胞移植。免疫球蛋白(immunoglobulin)用於免疫缺乏或ITP等,非再生不良性貧血的常用治療。","options":{"A":"是常用藥。cyclosporine(免疫抑制)。","B":"是常用藥。testosterone(雄性素刺激造血)。","C":"是常用藥。antilymphocyte globulin(免疫抑制)。","D":"本題答案(非)。immunoglobulin非再生不良性貧血常用治療。"},"sources":["新文京《兒科護理學》再生不良性貧血","免疫抑制"]}},"102110-N4-65":{"quick":"網狀細胞計數(reticulocyte)檢驗的目的是測量「骨髓製造紅血球的速率」(B)。","detail":{"background":"網狀細胞是剛從骨髓釋出、尚未完全成熟的紅血球,其數目反映骨髓造血(製造紅血球)的活性。網狀細胞上升代表骨髓造血活躍(如溶血、出血後或鐵劑治療有效);下降代表骨髓造血低下(如再生不良性貧血)。","options":{"A":"紅血球總數是RBC count(非網狀細胞的目的)。","B":"正確。網狀細胞反映骨髓製造紅血球的速率。","C":"全血球計數是CBC(非此)。","D":"紅血球內血紅素濃度是MCHC(非此)。"},"sources":["新文京《兒科護理學》貧血檢查","網狀細胞"]}},"104030-N4-66":{"quick":"鐮狀細胞危機(sickle cell crisis)疼痛護理錯誤的是「使用局部冷敷達到止痛」(C)。","detail":{"background":"鐮狀細胞危機因紅血球鐮狀化阻塞血管致缺血疼痛。護理:嚴重疼痛用嗎啡、放鬆轉移注意力、舒適臥位、充分補水與保暖。應「熱敷」促進血管擴張改善循環;冷敷會使血管收縮、加重鐮狀化與阻塞,故冷敷止痛錯誤。","options":{"A":"正確。嚴重疼痛可用嗎啡緩解。","B":"正確。放鬆活動轉移注意力。","C":"錯誤(本題答案)。應熱敷(冷敷會血管收縮加重鐮狀化)。","D":"正確。提供舒適臥位緩解疼痛。"},"sources":["新文京《兒科護理學》鐮狀細胞貧血","勿冷敷"]}},"105090-N4-64":{"quick":"再生不良性貧血臨床症狀與檢查錯誤的是「胎兒紅血球降低時,易出現進行性的溶血性貧血」(D)。","detail":{"background":"再生不良性貧血是骨髓造血衰竭致全血球減少:紅血球少(血容積<30%)→心跳加快、呼吸急促代償;嗜中性白血球<1500→易細菌感染;血小板<50000→瘀斑出血。其本質是「造血不足」而非「溶血」,故「進行性溶血性貧血」的描述錯誤(溶血是海洋性/鐮狀細胞貧血)。","options":{"A":"正確。血容積<30%時心跳加快、呼吸急促代償。","B":"正確。嗜中性白血球<1500易細菌感染。","C":"正確。血小板<50000易瘀斑出血。","D":"錯誤(本題答案)。再生不良性貧血是造血不足(非進行性溶血)。"},"sources":["新文京《兒科護理學》再生不良性貧血","造血不足"]}},"110030-N4-68":{"quick":"16歲再生不良性貧血住院接受ALG及cyclosporin治療,較適當的護理是「發燒時避免使用aspirin,以免延長出血時間」(D)。","detail":{"background":"再生不良性貧血全血球減少,血小板低下易出血,故發燒退燒應避免aspirin(會抑制血小板功能、延長出血時間),改用acetaminophen。因白血球低下須保護性隔離、避免生食(生菜沙拉易帶菌)、避免訪客群聚感染;青春期外觀改變的藥物副作用應誠實告知並協助調適。","options":{"A":"錯。白血球低下應避免生食(生菜沙拉易帶菌致感染)。","B":"錯。應誠實告知藥物外觀副作用並協助調適(非隱瞞)。","C":"錯。白血球低下須保護性隔離,不宜安排同學群聚探訪。","D":"正確。發燒避免aspirin(防抑制血小板、延長出血時間)。"},"sources":["新文京《兒科護理學》再生不良性貧血","避aspirin"]}},"110110-N4-68":{"quick":"鐮狀細胞貧血敘述錯誤的是「疼痛時可用Aspirin止痛」(C)。","detail":{"background":"鐮狀細胞貧血因遺傳性血紅素S(HgbS)使紅血球在缺氧時變形成鐮刀狀、阻塞血管致疼痛,為體染色體隱性遺傳。止痛應用嗎啡等;aspirin會影響凝血且偏酸性可能加重鐮狀化,故不宜用aspirin止痛。","options":{"A":"正確。紅血球變形呈鐮刀狀。","B":"正確。遺傳因子血紅素S(HgbS)造成紅血球變形。","C":"錯誤(本題答案)。疼痛不宜用Aspirin(影響凝血、酸化加重鐮狀化),用嗎啡。","D":"正確。經體染色體隱性遺傳。"},"sources":["新文京《兒科護理學》鐮狀細胞貧血","勿aspirin"]}},"114170-N4-42":{"quick":"8歲再生不良性貧血(全血球下降)入院治療,最適當的護理是「避免給予粗糙、堅硬的食物,以防口腔黏膜受損」(B)。","detail":{"background":"再生不良性貧血全血球減少:血小板低下易出血(避免粗硬食物以防口腔黏膜出血、避免碰撞)、白血球低下易感染(須保護性隔離、不宜安排同學探訪)、紅血球低下宜減少耗氧活動(非鼓勵戶外運動);發燒退燒避免aspirin(防延長出血)。","options":{"A":"錯。紅血球低下宜減少耗氧活動(非鼓勵戶外活動)。","B":"正確。避免粗糙堅硬食物防口腔黏膜出血。","C":"錯。白血球低下須保護性隔離,不宜安排同學探訪。","D":"錯。發燒避免aspirin(會延長出血時間),用acetaminophen。"},"sources":["新文京《兒科護理學》再生不良性貧血","防出血"]}},"102030-N4-73":{"quick":"血友病診斷性檢查正確的是「部分凝血酶原(PTT)時間延長」(C)。","detail":{"background":"血友病是凝血因子缺乏(A型缺第八因子、B型缺第九因子)的內在凝血路徑異常。檢查表現為PTT(部分凝血活酶時間)延長,而血小板數目、出血時間(BT)、凝血酶原時間(PT,外在路徑)皆正常。","options":{"A":"錯。血友病血小板數目正常(凝血因子缺乏,非血小板問題)。","B":"錯。出血時間正常(血小板功能正常)。","C":"正確。PTT(內在路徑)時間延長。","D":"錯。PT(外在路徑)正常。"},"sources":["新文京《兒科護理學》血友病","PTT"]}},"104030-N4-67":{"quick":"血友病關節出血緊急處理錯誤的是「避免直接加壓,以石膏固定患肢」(B)。","detail":{"background":"血友病關節出血的急性處理為RICE原則:休息、冰敷(局部冷敷促血管收縮止血)、加壓、抬高患肢至心臟高度以上,並依醫囑注射凝血因子。應「直接加壓」止血,且不用石膏完全固定(會致關節僵硬攣縮),故B錯誤。","options":{"A":"正確。依醫囑注射凝血因子。","B":"錯誤(本題答案)。應直接加壓止血,不以石膏固定(會致關節攣縮)。","C":"正確。局部冷敷促血管收縮止血。","D":"正確。抬高出血部位至心臟高度以上。"},"sources":["新文京《兒科護理學》血友病","RICE"]}},"105090-N4-49":{"quick":"血友病病童關節血腫較少出現的部位是「肩關節」(D)。","detail":{"background":"血友病關節血腫好發於承重與活動度大的關節,以膝關節最常見,其次踝、肘關節。肩關節因承重與活動模式不同,相對較少出現關節血腫。","options":{"A":"膝關節是最常見部位。","B":"踝關節常見。","C":"肘關節常見。","D":"正確。肩關節較少出現關節血腫。"},"sources":["新文京《兒科護理學》血友病","關節血腫"]}},"106030-N4-66":{"quick":"血友病病童運動建議正確的是「游泳」(C)。","detail":{"background":"血友病應避免碰撞性、易受傷的運動(籃球、跳馬、網球等衝撞或關節劇烈活動),以免出血。游泳是非碰撞、低衝擊的有氧運動,可強化肌肉與關節又不易受傷,最適合血友病病童。","options":{"A":"籃球是碰撞性運動,易出血,不建議。","B":"網球關節劇烈活動,較不建議。","C":"正確。游泳非碰撞、低衝擊,最適合。","D":"跳馬是衝撞性運動,易受傷出血。"},"sources":["新文京《兒科護理學》血友病","游泳"]}},"106111-N4-65":{"quick":"A型血友病(缺第八凝血因子)凝血功能檢查正確的是「凝血時間延長,出血時間正常」(A)。","detail":{"background":"A型血友病缺乏第八凝血因子,屬內在凝血路徑異常,故凝血時間(PTT)延長;而出血時間反映血小板功能、血友病血小板正常,故出血時間正常。","options":{"A":"正確。凝血時間(PTT)延長,出血時間正常。","B":"錯。血友病出血時間正常(非延長)。","C":"錯。出血時間正常(非延長)。","D":"錯。凝血時間延長(非正常)。"},"sources":["新文京《兒科護理學》血友病","凝血時間"]}},"106111-N4-67":{"quick":"屬體染色體隱性遺傳的血液疾病是「①鐮刀狀細胞貧血+④β型海洋性貧血」(B,即14)。","detail":{"background":"①鐮狀細胞貧血與④β型海洋性貧血皆為體染色體隱性遺傳。②缺鐵性貧血是後天營養性(非遺傳);③A型血友病是性聯隱性遺傳(X染色體、好發男性,非體染色體隱性)。故體染色體隱性者為①④。","options":{"A":"12含②缺鐵性貧血(非遺傳)。","B":"正確。①鐮狀細胞貧血+④β海洋性貧血皆體染色體隱性。","C":"23含②、③(③是性聯隱性)。","D":"34含③A型血友病(性聯隱性,非體染色體隱性)。"},"sources":["新文京《兒科護理學》遺傳","體染色體隱性"]}},"109030-N4-74":{"quick":"不屬於體染色體隱性遺傳的血液疾病是「A型血友病(hemophilia)」(A)。","detail":{"background":"A型血友病是「性聯隱性」遺傳(X染色體、好發男性)。Fanconi氏症候群(原發性再生不良性貧血)、鐮狀細胞貧血、β-海洋性貧血皆為體染色體隱性遺傳。故A型血友病不屬於體染色體隱性遺傳。","options":{"A":"本題答案(非)。A型血友病是性聯隱性遺傳(X染色體)。","B":"是體染色體隱性。Fanconi氏症候群。","C":"是體染色體隱性。鐮狀細胞貧血。","D":"是體染色體隱性。β-海洋性貧血。"},"sources":["新文京《兒科護理學》遺傳","性聯隱性"]}},"109110-N4-67":{"quick":"8歲血友病(hemophilia)最適當的護理是「鼓勵病童從事適度的活動,以強化其關節肌肉」(B)。","detail":{"background":"血友病護理:鼓勵適度非碰撞運動(如游泳)以強化關節周圍肌肉、保護關節;關節出血時應冷敷(非熱敷)促血管收縮止血;刷牙用軟毛牙刷防牙齦出血;止痛勿用aspirin(影響血小板凝集、加重出血),用acetaminophen。","options":{"A":"錯。關節出血應冷敷(非熱敷),熱敷會血管擴張加重出血。","B":"正確。鼓勵適度(非碰撞)活動強化關節肌肉。","C":"錯。應用軟毛牙刷(硬毛刷會致牙齦出血)。","D":"錯。止痛勿用aspirin(影響血小板凝集),用acetaminophen。"},"sources":["新文京《兒科護理學》血友病","適度運動"]}},"111030-N4-68":{"quick":"血友病關節血腫最常發生的部位是「膝關節」(D)。","detail":{"background":"血友病的關節血腫(hemarthrosis)最常發生於膝關節,其次為踝、肘關節;反覆關節出血會造成關節病變與攣縮,故須及早處理與保護。","options":{"A":"腕關節較少。","B":"肘關節常見但非最常。","C":"踝關節常見但非最常。","D":"正確。膝關節是最常發生關節血腫的部位。"},"sources":["新文京《兒科護理學》血友病","膝關節"]}},"114100-N4-43":{"quick":"3歲確診血友病的臨床表徵正確的是「皮膚出現瘀血,刷牙時牙齦出血」(A)。","detail":{"background":"血友病是凝血因子缺乏致凝血障礙,臨床以出血傾向為主:皮膚瘀血瘀斑、牙齦出血、關節血腫、輕微外傷後出血不止。臉色蒼白虛弱是貧血、易感染是白血球問題、黃疸肝脾腫大是溶血,皆非血友病典型表現。","options":{"A":"正確。皮膚瘀血、刷牙牙齦出血(出血傾向)。","B":"臉色蒼白昏倒是貧血表現(非血友病)。","C":"易感染是白血球問題(非血友病)。","D":"黃疸肝脾腫大是溶血表現(非血友病)。"},"sources":["新文京《兒科護理學》血友病","出血傾向"]}},"104100-N4-66":{"quick":"2歲ITP(特發性血小板減少紫斑症)醫療處置錯誤的是「血小板低下持續6個月且使用類固醇無效時,即需施行脾臟切除術」(D)。","detail":{"background":"ITP是自體免疫抗體破壞血小板。處置:類固醇/靜脈免疫球蛋白阻斷抗體破壞血小板、禁用aspirin(抑制血小板凝集加重出血)、血小板<20000或致命出血時輸血小板。脾臟切除是慢性難治型才考慮,且兒童ITP多自限性自癒,3歲前應盡量避免脾切(脾切後易嚴重感染),故D錯誤。","options":{"A":"正確。類固醇阻斷自體免疫抗體破壞血小板。","B":"正確。禁用aspirin(防抑制血小板凝集致出血)。","C":"正確。血小板<20000或致命出血時輸注血小板。","D":"錯誤(本題答案)。兒童ITP多自癒,3歲幼兒應避免脾切(防嚴重感染)。"},"sources":["新文京《兒科護理學》ITP","脾切"]}},"105030-N4-66":{"quick":"ITP幼兒護理指導錯誤的是「此類紫斑症的病因可能與自體免疫有關,僅能長期以藥物控制病情」(A)。","detail":{"background":"ITP是自體免疫破壞血小板,但兒童ITP大多為急性、自限性,多在數週至數月內自行緩解,並非「僅能長期藥物控制」。護理重點:居家防跌防碰撞(床欄與地板鋪保護墊)、血小板<20000觀察自發性出血、避免含aspirin藥物(防影響血小板凝集)。","options":{"A":"錯誤(本題答案)。兒童ITP多急性自限性、可自癒(非僅能長期藥物控制)。","B":"正確。注意居家安全、鋪保護墊防碰撞出血。","C":"正確。血小板<20000觀察自發性出血。","D":"正確。避免含aspirin藥物防影響血小板凝集。"},"sources":["新文京《兒科護理學》ITP","自限性"]}},"112030-N4-68":{"quick":"3歲發燒後出現多處紫斑、診斷ITP,錯誤的是「建議3歲前施行脾臟切除手術」(D)。","detail":{"background":"ITP是自體免疫障礙,常於病毒感染後發生;兒童ITP多為急性自限性,治療用類固醇、禁用aspirin。脾臟切除僅用於慢性難治型,且幼兒(尤<5歲)脾切後易發生嚴重莢膜菌感染,應盡量避免在3歲前脾切,故D錯誤。","options":{"A":"正確。ITP是一種自體免疫的障礙。","B":"正確。使用類固醇治療。","C":"正確。指導禁用阿斯匹靈(防影響血小板凝集)。","D":"錯誤(本題答案)。幼兒應避免3歲前脾切(防嚴重感染),且兒童ITP多自癒。"},"sources":["新文京《兒科護理學》ITP","脾切"]}},"102110-N4-49":{"quick":"張媽媽得知張小妹確診ALL後焦急哭泣,護理師最適宜的處理是「陪伴張媽媽,並鼓勵他表達擔心的問題」(C)。","detail":{"background":"家屬剛得知孩子罹患重症(ALL)時處於震驚、焦慮的情緒危機,此時護理首重情緒支持:陪伴、傾聽、鼓勵表達感受與擔憂,建立信任後再適時提供疾病與治療資訊。急著保證療效、單向衛教或只通知醫師,都忽略了當下的情緒需求。","options":{"A":"急著保證療效忽略當下情緒,非首要。","B":"此刻先情緒支持,衛教資訊待情緒穩定後再提供。","C":"正確。陪伴並鼓勵表達擔憂(情緒支持優先)。","D":"通知醫師非當下最適宜的直接處理。"},"sources":["新文京《兒科護理學》白血病","情緒支持"]}},"102110-N4-67":{"quick":"ALL誘導期化學治療敘述錯誤的是「一般會合併使用bactrim預防泌尿道感染」(C)。","detail":{"background":"ALL誘導期(最初4~5週)目標是達到骨髓芽細胞<5%的緩解,約95%病童此期可緩解;用藥後7~14天會骨髓抑制、易感染。合併使用的bactrim(co-trimoxazole)目的是預防「卡氏肺囊蟲肺炎(PCP)」,而非泌尿道感染,故C錯誤。","options":{"A":"正確。誘導期最初4~5週達骨髓芽細胞<5%緩解。","B":"正確。約95%病童此期結束後癌細胞剩約1%。","C":"錯誤(本題答案)。bactrim是預防卡氏肺囊蟲肺炎(PCP),非泌尿道感染。","D":"正確。用藥7~14天會骨髓抑制、易感染。"},"sources":["新文京《兒科護理學》白血病","PCP"]}},"103030-N4-50":{"quick":"13歲白血病住院,最不適當的護理是「為避免阿文擔心,病情解釋不宜過於詳細」(D)。","detail":{"background":"學齡期/青少年病童有理解病情的能力與權利,適當、誠實的病情解釋反而能減少不確定感與恐懼;刻意隱瞞或含糊會增加焦慮與不信任。其餘(進門先敲門尊重隱私、鼓勵與同學電話聯繫、徵得同意安排探訪)皆維護其發展需求,適當。","options":{"A":"適當。進門先敲門尊重隱私。","B":"適當。鼓勵打電話找同學聊天維持同儕連結。","C":"適當。徵求同意鼓勵同學探訪。","D":"最不適當(本題答案)。應誠實適度解釋病情(隱瞞反增焦慮)。"},"sources":["新文京《兒科護理學》白血病","誠實告知"]}},"103030-N4-68":{"quick":"5歲ALL化療中,WBC 2000、seg 15%、band 1%,絕對嗜中性白血球(ANC)是「320/mm3」(B)。","detail":{"background":"ANC=白血球總數×(成熟嗜中性球seg%+不成熟嗜中性球band%)=2000×(15%+1%)=2000×0.16=320/mm³。ANC<500表示嚴重嗜中性球低下,感染風險極高,須保護性隔離。","options":{"A":"150算法錯誤。","B":"正確。2000×(15%+1%)=320/mm³。","C":"700算法錯誤。","D":"1400算法錯誤(未只計seg+band)。"},"sources":["新文京《兒科護理學》白血病","ANC"]}},"103100-N4-73":{"quick":"12歲ALL化療後WBC 4800、Hb 11.8、血小板15000,正確的護理是「為防出血應避免碰撞跌倒」(C)。","detail":{"background":"判讀檢驗值:WBC 4800(尚可)、Hb 11.8(接近正常、無明顯貧血)、血小板15000(嚴重偏低,正常15~40萬)。血小板嚴重低下的首要護理是防止出血:避免碰撞跌倒、避免侵入性操作、用軟毛牙刷。此時並無明顯感染或貧血風險,防出血才是重點。","options":{"A":"WBC尚可、無嚴重嗜中性球低下,保護隔離非此時重點。","B":"Hb 11.8接近正常、無明顯貧血。","C":"正確。血小板15000嚴重低下,首要防出血(避免碰撞跌倒)。","D":"防便秘非此檢驗值的重點。"},"sources":["新文京《兒科護理學》白血病","血小板"]}},"104030-N4-68":{"quick":"白血病化療期間服用Bactrim的目的正確的是「預防感染卡氏肺囊蟲肺炎」(B)。","detail":{"background":"白血病化療致免疫低下,易發生伺機性感染。Bactrim(co-trimoxazole)在化療期間的主要目的是預防卡氏肺囊蟲肺炎(PCP)。它不能提升嗜中性球數目(那是G-CSF)、不能緩解胚芽細胞生長(那是化療藥)、也非降尿酸(那是allopurinol)。","options":{"A":"提升嗜中性球是G-CSF(非Bactrim)。","B":"正確。Bactrim預防卡氏肺囊蟲肺炎(PCP)。","C":"緩解胚芽細胞生長是化療藥的作用。","D":"抑制尿酸形成是allopurinol。"},"sources":["新文京《兒科護理學》白血病","PCP"]}},"104100-N4-71":{"quick":"白血病誘導期化療後特別容易出現的問題是「①感染+④自發性出血」(B,即14)。","detail":{"background":"誘導期化療造成骨髓抑制:嗜中性球低下→易①感染(含②卡氏肺囊蟲肺炎)、血小板低下→④自發性出血、紅血球低下→貧血。本題選項以「①感染+④自發性出血」最直接對應骨髓抑制的兩大後果;③聽力障礙是特定藥物(如cisplatin)毒性,非誘導期普遍問題。","options":{"A":"12的②PCP雖也會,但①④更直接對應骨髓抑制(官方取14)。","B":"正確。①感染+④自發性出血(骨髓抑制兩大後果)。","C":"23含③聽力障礙(非誘導期普遍問題)。","D":"34含③聽力障礙(非普遍)。"},"sources":["新文京《兒科護理學》白血病","骨髓抑制"]}},"105030-N4-71":{"quick":"白血病病童貧血最可能的導因是「紅血球製造減少」(B)。","detail":{"background":"白血病是骨髓中異常白血球(芽細胞)大量增生,擠壓正常造血空間,使紅血球、血小板與正常白血球製造減少,因而出現貧血、出血與感染。故白血病貧血的主因是骨髓造血空間被佔據致「紅血球製造減少」。","options":{"A":"葉酸不足是巨球性貧血(非白血病貧血主因)。","B":"正確。骨髓被芽細胞佔據致紅血球製造減少。","C":"骨髓被疤痕組織取代是骨髓纖維化(非白血病)。","D":"淋巴細胞破壞紅血球是自體免疫溶血(非白血病主因)。"},"sources":["新文京《兒科護理學》白血病","造血受抑"]}},"105090-N4-70":{"quick":"ALL病童接受化學治療後出現血球低下問題的時間是「7~14天」(B)。","detail":{"background":"化療藥物抑制骨髓造血,血球最低點(nadir)通常出現在化療後約7~14天,此時嗜中性球與血小板最低、感染與出血風險最高,須密切監測並採保護措施;之後骨髓逐漸恢復。","options":{"A":"24~72小時太早。","B":"正確。化療後約7~14天出現血球低下(nadir)。","C":"4~6週太晚。","D":"2~3個月太晚。"},"sources":["新文京《兒科護理學》白血病","nadir"]}},"106030-N4-69":{"quick":"7歲持續發燒、易流鼻血、疑似ALL,可確定診斷的檢查是「骨髓中未成熟白血球細胞有85%」(D)。","detail":{"background":"白血病的確診靠骨髓檢查:骨髓中未成熟白血球(芽細胞)比例增高(一般≥20~25%即可診斷,本題85%明確),是確立診斷的依據。周邊血白血球或血小板數值、腦脊髓液僅作輔助/評估侵犯,不能單獨確診。","options":{"A":"周邊血白血球數量僅輔助,不能確診。","B":"血小板數量僅反映出血風險,不能確診。","C":"腦脊髓液是評估中樞侵犯,非確診依據。","D":"正確。骨髓中未成熟白血球85%可確定診斷。"},"sources":["新文京《兒科護理學》白血病","骨髓確診"]}},"106111-N4-71":{"quick":"兒童ALL預後正確的是「侵犯到中樞神經者預後較差」(C)。","detail":{"background":"兒童ALL預後因子:發病年齡1~10歲(尤2~6歲)預後較佳、>10歲或<1歲較差;B細胞型較T細胞型佳;白血球數低者佳;有中樞神經或睪丸侵犯者預後較差。故「侵犯中樞神經預後較差」正確。","options":{"A":"錯。>13歲(青少年)預後較差(非較佳)。","B":"錯。T細胞型預後較差(非較佳)。","C":"正確。侵犯到中樞神經者預後較差。","D":"錯。性別非主要預後因子(此敘述不成立)。"},"sources":["新文京《兒科護理學》白血病","預後"]}},"107030-N4-50":{"quick":"白血病病童輸注紅血球濃縮液護理錯誤的是「輸血出現寒顫、心跳過速、不安及發燒等反應,可使用溫血器維持血液溫度在30°C~34°C」(D)。","detail":{"background":"輸血出現寒顫、心跳過速、發燒等反應代表輸血反應(溶血或熱原反應),正確處置是「立即停止輸血」並以生理食鹽水維持靜脈、通報醫師,而非用溫血器繼續輸。其餘正確:監測輸血前/開始15分鐘/完成後生命徵象、輸血管路只能用生理食鹽水、用微凝集過濾器與幫浦控速。","options":{"A":"正確。輸血前、開始15分鐘、完成後監測生命徵象。","B":"正確。輸血管路只能用生理食鹽水排氣沖洗。","C":"正確。用微凝集過濾器與幫浦控速約5mL/kg/hr。","D":"錯誤(本題答案)。出現輸血反應應立即停輸(非繼續用溫血器)。"},"sources":["新文京《兒科護理學》輸血","停輸"]}},"108020-N4-73":{"quick":"1歲ALL誘導期化療、發燒,WBC 100、Hb 7.6、血小板10000,正確的護理是「依醫囑立即給予廣效性的預防性抗生素」(A)。","detail":{"background":"WBC 100(ANC極低)發燒屬發燒性嗜中性球低下(febrile neutropenia),是腫瘤急症,須立即依醫囑給廣效抗生素。退燒禁用aspirin(防出血、雷氏症候群);ANC極低時須保護性隔離、避免群聚活動;免疫低下禁打活疫苗(水痘)。","options":{"A":"正確。發燒性嗜中性球低下須立即給廣效預防性抗生素。","B":"錯。退燒禁用Aspirin(防出血、雷氏症候群)。","C":"錯。ANC極低須保護隔離、限制活動(非鼓勵多活動)。","D":"錯。免疫低下禁打活疫苗(水痘)。"},"sources":["新文京《兒科護理學》白血病","發燒性嗜中性球低下"]}},"109030-N4-50":{"quick":"兒童白血病敘述正確的是「急性淋巴球性白血病好發於2~6歲兒童」(B)。","detail":{"background":"兒童白血病以「急性淋巴球性白血病(ALL)」最常見,好發2~6歲(非慢性骨髓性);發病年齡與預後有關(2~10歲預後較佳);確診靠骨髓檢查(非腰椎穿刺,腰椎穿刺是評估中樞侵犯)。","options":{"A":"錯。兒童最常見是急性淋巴球性白血病(非慢性骨髓性)。","B":"正確。ALL好發於2~6歲兒童。","C":"錯。發病年齡與預後有關(2~10歲較佳)。","D":"錯。確診是骨髓檢查(腰椎穿刺是評估中樞侵犯)。"},"sources":["新文京《兒科護理學》白血病","ALL好發"]}},"109110-N4-68":{"quick":"9歲白血病化療、ANC 800,護理措施不適當的是「發燒時使用肛門塞劑來退燒」(C)。","detail":{"background":"ANC 800偏低、有感染風險,護理應採保護措施:接觸前後洗手、禁打活疫苗、低微生物飲食。發燒退燒應避免肛門塞劑與肛溫測量,因免疫/血小板低下時肛門黏膜易破損出血並引入細菌感染,故C不適當。","options":{"A":"適當。接觸病童前後都要洗手。","B":"適當。禁止施打活性疫苗(免疫低下)。","C":"不適當(本題答案)。避免肛門塞劑(防黏膜破損出血、引入感染)。","D":"適當。飲食遵守低微生物餐原則。"},"sources":["新文京《兒科護理學》白血病","避肛門"]}},"109110-N4-69":{"quick":"3歲ALL誘導期化療敘述錯誤的是「allopurinol是用來預防腫瘤溶血症候群的藥物」(B)。","detail":{"background":"ALL誘導期重點:2~10歲(如3歲)較6個月或12歲預後佳;中樞神經與睪丸是最常復發處;MTX/Ara-C/鞘內化療預防中樞復發。allopurinol的作用是抑制尿酸生成、預防「腫瘤溶解症候群(tumor lysis syndrome)」造成的高尿酸血症;題目B寫成「腫瘤溶血症候群」且把allopurinol的作用範圍泛化,用詞與概念有誤,故為錯誤敘述。","options":{"A":"正確。3歲(2~10歲)較6個月或12歲預後較佳。","B":"錯誤(本題答案)。應為預防「腫瘤溶解症候群」的高尿酸血症(非腫瘤溶血症候群)。","C":"正確。中樞神經與睪丸是ALL最常復發處。","D":"正確。MTX、Ara-C、鞘內化療預防中樞神經復發。"},"sources":["新文京《兒科護理學》白血病","allopurinol"]}},"110110-N4-70":{"quick":"化療期間ANC 320,較適當的護理指導是「教導個案注意預防感染,需採保護性隔離措施」(C)。","detail":{"background":"ANC=絕對嗜中性白血球計數,反映抗細菌感染能力。ANC 320(<500)屬嚴重嗜中性球低下,感染風險極高,須採保護性隔離、預防感染。ANC並非判斷白血病緩解的指標(緩解看骨髓芽細胞),低下對應的是感染而非自發性出血(那是血小板)。","options":{"A":"錯。緩解與否看骨髓芽細胞(非ANC)。","B":"ANC正常值雖隨情況略異,但此題重點是低下需防感染。","C":"正確。ANC 320嚴重低下,須保護性隔離預防感染。","D":"自發性出血是血小板低下(非ANC)的問題。"},"sources":["新文京《兒科護理學》白血病","ANC隔離"]}},"112030-N4-69":{"quick":"10歲ALL化療護理錯誤的是「Mycostatin指導於飯後使用,預防革蘭氏陽性菌感染」(D)。","detail":{"background":"各化療藥副作用:L-asparaginase致高血糖須監測血糖;Prednisolone(類固醇)增加感染須保護隔離;Vincristine致神經毒性(手腳麻刺、便秘)。Mycostatin(nystatin)是抗黴菌藥、用於預防/治療口腔念珠菌(鵝口瘡),作用對象是黴菌而非「革蘭氏陽性菌」,故D錯誤。","options":{"A":"正確。L-asparaginase致高血糖須監測血糖。","B":"正確。Prednisolone增加感染機會須保護隔離。","C":"正確。Vincristine致手腳麻刺感與便秘。","D":"錯誤(本題答案)。Mycostatin是抗黴菌(預防念珠菌/鵝口瘡),非預防革蘭氏陽性菌。"},"sources":["新文京《兒科護理學》白血病","nystatin"]}},"112110-N4-69":{"quick":"5歲白血病引導緩解期護理指導錯誤的是「接受脊髓腔內(intrathecal)注射化療藥後,需鼓勵立即下床活動避免血栓產生」(D)。","detail":{"background":"鞘內(脊髓腔內)注射化療後,如同腰椎穿刺,須平躺數小時並補充水分以預防低顱壓性頭痛,而非立即下床活動。其餘正確:監測血球、接觸前後洗手、侵入性治療無菌;依醫囑給G-CSF提升嗜中性球;此期密集化療多經人工血管給藥。","options":{"A":"正確。監測血球、洗手、侵入性治療無菌。","B":"正確。依醫囑注射G-CSF提升嗜中性球。","C":"正確。此期密集化療多經人工血管給藥。","D":"錯誤(本題答案)。鞘內注射後須平躺數小時(防低顱壓頭痛),非立即下床。"},"sources":["新文京《兒科護理學》白血病","鞘內注射"]}},"112110-N4-70":{"quick":"初診斷ALL有腫瘤溶解症候群(TLS)危機,敘述錯誤的是「限制水分攝取」(C)。","detail":{"background":"腫瘤溶解症候群(TLS)是大量癌細胞快速崩解釋出鉀、磷、尿酸,致高尿酸、高血鉀、高血磷與急性腎損傷。處置應「大量補充水分(水化)」加速排出、給allopurinol/rasburicase降尿酸、處理電解質異常。故「限制水分」錯誤(限水會加重結晶沉積與腎損傷)。","options":{"A":"正確。監測血液尿酸值。","B":"正確。針對高血鉀/磷/尿酸等代謝異常處置。","C":"錯誤(本題答案)。應大量補水(水化),非限制水分。","D":"正確。給allopurinol降尿酸。"},"sources":["新文京《兒科護理學》白血病","TLS水化"]}},"113100-N4-41":{"quick":"急性淋巴性白血病最有效的鑑別(確診)診斷是「骨髓抽吸檢查」(B)。","detail":{"background":"白血病的確診金標準是骨髓抽吸(及切片)檢查,可見骨髓中異常增生的未成熟白血球(芽細胞)。周邊血液檢查、淋巴組織切片、腦脊髓液僅作初步篩檢或評估侵犯範圍,不能取代骨髓檢查作確診。","options":{"A":"血液檢查僅初步篩檢。","B":"正確。骨髓抽吸檢查是確診金標準。","C":"淋巴組織切片非ALL確診依據。","D":"腦脊髓液是評估中樞侵犯,非確診。"},"sources":["新文京《兒科護理學》白血病","骨髓確診"]}},"113100-N4-44":{"quick":"白血病化療注射Rasburicase及Allopurinol的目的正確的是「預防腫瘤溶解症候群造成高尿酸血症」(B)。","detail":{"background":"Allopurinol抑制尿酸生成、Rasburicase將尿酸分解,兩者皆用於降低血中尿酸,以預防/治療腫瘤溶解症候群(大量癌細胞崩解釋出尿酸)所造成的高尿酸血症與急性腎損傷。","options":{"A":"預防卡氏肺囊蟲肺炎是Bactrim。","B":"正確。Rasburicase與Allopurinol預防TLS的高尿酸血症。","C":"預防中樞復發是鞘內化療(MTX等)。","D":"治療念珠菌鵝口瘡是Mycostatin。"},"sources":["新文京《兒科護理學》白血病","降尿酸"]}},"114030-N4-43":{"quick":"初診斷白血病臨床表徵最適當的是「發燒、疲憊」(C)。","detail":{"background":"白血病因骨髓被芽細胞佔據致正常血球減少:嗜中性球低→發燒/感染、紅血球低→臉色蒼白疲憊、血小板低→瘀斑出血,並可有淋巴結與肝脾腫大。故「發燒、疲憊」最符合初診斷表現。血壓下降心律不整、呼吸困難臉潮紅、腹痛少尿皆非白血病典型初症。","options":{"A":"血壓下降心律不整非白血病初症。","B":"呼吸困難臉潮紅非白血病典型。","C":"正確。發燒(感染)、疲憊(貧血)是白血病初診斷表現。","D":"腹痛少尿非白血病典型初症。"},"sources":["新文京《兒科護理學》白血病","臨床表徵"]}},"114100-N4-44":{"quick":"3歲ALL,WBC 2500、seg 8%、band 10%,絕對嗜中性白血球(ANC)是「450」(D)。","detail":{"background":"ANC=白血球總數×(成熟seg%+不成熟band%)=2500×(8%+10%)=2500×0.18=450/mm³。ANC介於500以下屬嗜中性球低下,感染風險升高。","options":{"A":"300算法錯誤。","B":"350算法錯誤。","C":"400算法錯誤。","D":"正確。2500×(8%+10%)=450。"},"sources":["新文京《兒科護理學》白血病","ANC"]}},"101030-N4-69":{"quick":"5歲威爾姆氏腫瘤(Wilms tumor)術後護理較不適當的是「此腫瘤常轉移至腦部,不需監測神經功能」(A)。","detail":{"background":"威爾姆氏腫瘤是源自腎臟的惡性胚胎瘤,最常轉移至肺部(非腦部),術後須監測腎功能、體重、輸出入量與血壓(對側腎功能與高血壓)。可用繪畫/治療性遊戲協助表達、並協助接受後續治療。「常轉移腦部、不需監測神經功能」既與轉移部位不符、又忽略評估,故不適當。","options":{"A":"較不適當(本題答案)。Wilms tumor最常轉移肺部(非腦部);且不應免除評估。","B":"適當。監測腎功能、體重、輸出入量及血壓。","C":"適當。繪畫或治療性遊戲讓病童表達感受。","D":"適當。協助病童及家屬接受後續治療。"},"sources":["新文京《兒科護理學》Wilms tumor","轉移肺"]}},"101110-N4-28":{"quick":"學齡期骨肉瘤截肢術後護理較不適當的是「避免與病童談及生活方式的改變及失落,因為其對自我認識並未成熟」(D)。","detail":{"background":"學齡期兒童已有相當的自我認知與情緒表達能力,截肢造成的身體心像改變與失落需要被傾聽、引導表達與支持,刻意迴避反而阻礙心理調適。其餘正確:殘肢彈繃固定防攣縮、即早下床活動與復健、教導殘肢照顧與義肢使用。","options":{"A":"適當。殘肢以彈性繃帶固定防攣縮。","B":"適當。即早下床活動有助心理適應。","C":"適當。教導殘肢照顧與義肢使用、即早復健。","D":"較不適當(本題答案)。應傾聽引導表達失落(學齡兒有表達能力,迴避阻礙調適)。"},"sources":["新文京《兒科護理學》骨肉瘤","身體心像"]}},"106111-N4-68":{"quick":"威廉氏腫瘤(Wilm's tumor)病童照護錯誤的是「手術前監測病童的血銅含量」(B)。","detail":{"background":"威廉氏腫瘤術前最重要的是「避免觸診腹部」(以防腫瘤包膜破裂、癌細胞擴散);術後監測血壓變化與輸出入量(評估對側腎功能)。血銅含量與威廉氏腫瘤無關(銅代謝異常見於Wilson氏病),故術前監測血銅為錯誤。","options":{"A":"正確。術前避免觸診腹部(防腫瘤破裂擴散)。","B":"錯誤(本題答案)。血銅與Wilms tumor無關(銅異常見於Wilson氏病)。","C":"正確。術後注意血壓變化(對側腎功能)。","D":"正確。術後評估輸出入量。"},"sources":["新文京《兒科護理學》Wilms tumor","勿觸診"]}},"108110-N4-75":{"quick":"7歲威廉氏腫瘤第三期將接受腎臟切除術,正確的是「需監測腎功能、血壓及輸出入量」(D)。","detail":{"background":"威廉氏腫瘤是惡性腎臟腫瘤;術前避免觸診腹部(防破裂擴散),術後須監測腎功能、血壓與輸出入量(評估單一腎功能與高血壓)。第三期已局部擴散,須合併化療/放療(非僅手術即可根除)。","options":{"A":"錯。威廉氏腫瘤是惡性(非良性無觸痛)。","B":"錯。術前避免按摩/觸診腹部(防腫瘤破裂)。","C":"錯。第三期已擴散,須合併化療放療(非僅手術根除)。","D":"正確。需監測腎功能、血壓及輸出入量。"},"sources":["新文京《兒科護理學》Wilms tumor","術後監測"]}},"109030-N4-75":{"quick":"威廉氏腫瘤(Wilms tumor)臨床表徵錯誤的是「低血壓」(B)。","detail":{"background":"威廉氏腫瘤典型表現為腹部無痛性腫塊,可伴腹痛、血尿、貧血、疲倦;因腫瘤可分泌腎素或壓迫腎血管,常造成「高血壓」而非低血壓,故B錯誤。","options":{"A":"可出現。疼痛。","B":"錯誤(本題答案)。威廉氏腫瘤常致高血壓(非低血壓)。","C":"可出現。貧血。","D":"可出現。疲倦。"},"sources":["新文京《兒科護理學》Wilms tumor","高血壓"]}},"109110-N4-70":{"quick":"5歲神經母細胞瘤第三期,最不適當的敘述是「可以推測小美已經轉移至骨髓、骨骼、肝臟等處」(C)。","detail":{"background":"神經母細胞瘤分期:第三期為局部腫瘤超過中線、無法完全切除,但尚「未」遠處轉移;遠處轉移(骨髓、骨骼、肝臟)屬第四期。故對「第三期」推測已遠處轉移最不適當。腫瘤源自交感神經(常見腎上腺),症狀依位置而異,壓迫眼眶可致眼瞼下垂。","options":{"A":"適當。腫瘤超中線、已無法完全切除(第三期特徵)。","B":"適當。症狀依腫瘤位置而出現不同進展。","C":"最不適當(本題答案)。遠處轉移(骨髓骨骼肝)屬第四期,非第三期。","D":"適當。轉移至眼眶可致眼瞼下垂。"},"sources":["新文京《兒科護理學》神經母細胞瘤","分期"]}},"110030-N4-70":{"quick":"兒童腫瘤好發部位錯誤的是「骨肉瘤(osteosarcoma)最常發生於肱骨(humerus)」(A)。","detail":{"background":"骨肉瘤最常發生於長骨的幹骺端,以「股骨遠端、脛骨近端(膝關節周圍)」最常見,而非肱骨。其餘正確:最常見原發性腦瘤是膠質瘤、神經母細胞瘤最常發生於腎上腺髓質、威廉氏腫瘤發生於腎臟。","options":{"A":"錯誤(本題答案)。骨肉瘤最常見於股骨遠端/脛骨近端(膝周),非肱骨。","B":"正確。最常見原發性腦瘤是膠質瘤(glioma)。","C":"正確。神經母細胞瘤最常發生在腎上腺髓質。","D":"正確。威廉氏腫瘤是發生於腎臟的惡性腫瘤。"},"sources":["新文京《兒科護理學》骨肉瘤","股骨遠端"]}},"110110-N4-69":{"quick":"3歲神經母細胞瘤化療裝置人工血管,不適當的是「PICC是最適合小明化學治療期間,長期給藥的方式」(D)。","detail":{"background":"兒童長期化療給藥首選Port-A(植入式人工血管),因其完全植入皮下、感染風險低、活動方便、適合長期反覆使用。PICC維護需求高、留置時間相對短,並非長期化療的最適方式。Port-A由外科醫師於手術室植入、定期以含肝素生理食鹽水沖洗、給藥前反抽確認回血。","options":{"A":"正確。Port-A由外科醫師於手術室植入。","B":"正確。PICC可由受訓護理師執行插入。","C":"正確。Port-A定期以含肝素生理食鹽水沖洗。","D":"不適當(本題答案)。長期化療首選Port-A(非PICC)。"},"sources":["新文京《兒科護理學》人工血管","Port-A"]}},"112180-N4-43":{"quick":"威爾姆氏腫瘤(Wilms tumor)起源的器官是「腎臟」(C)。","detail":{"background":"威爾姆氏腫瘤(腎母細胞瘤)是兒童最常見的腎臟惡性腫瘤,源自腎臟的胚胎組織,好發於2~5歲幼兒,常以無痛性腹部腫塊表現。","options":{"A":"骨骼是骨肉瘤/尤恩氏肉瘤。","B":"血液是白血病。","C":"正確。威爾姆氏腫瘤起源於腎臟。","D":"腦是腦瘤。"},"sources":["新文京《兒科護理學》Wilms tumor","腎臟"]}},"113180-N4-43":{"quick":"3歲神經母細胞瘤第三期,提供父母的護理指導不適當的是「需抽血監測兒茶酚胺(catecholamine)以確認是否轉移」(C)。","detail":{"background":"神經母細胞瘤源自交感神經,會分泌兒茶酚胺(及其代謝物VMA、HVA),監測兒茶酚胺/代謝物是用於「診斷與追蹤腫瘤活性」,而非用來「確認是否轉移」(轉移評估靠骨髓檢查、影像)。其餘正確:症狀依壓迫部位、第三期超中線無法完全切除、骨髓檢查確認侵犯。","options":{"A":"適當。症狀與壓迫部位有關。","B":"適當。第三期超過中線、手術無法完全切除。","C":"不適當(本題答案)。兒茶酚胺用於診斷/追蹤活性,非確認轉移(轉移靠骨髓/影像)。","D":"適當。骨髓檢查確認骨髓是否受侵犯。"},"sources":["新文京《兒科護理學》神經母細胞瘤","兒茶酚胺"]}},"114030-N4-44":{"quick":"3歲威爾姆氏腫瘤第三期護理錯誤的是「放射線治療主要採全身性治療,避免腫瘤擴散」(D)。","detail":{"background":"放射線治療是「局部」治療(針對腫瘤床/局部區域照射),並非全身性治療(全身性是化療)。其餘正確:術前避免觸診腹部(防破裂擴散)、第三期治療含腎切除+化療+放療、白血球<1000採保護性隔離。","options":{"A":"正確。避免觸診腹部防腫瘤破裂擴散。","B":"正確。治療含腎臟切除、化療及放療。","C":"正確。白血球<1000採保護性隔離。","D":"錯誤(本題答案)。放射線是局部治療(全身性是化療)。"},"sources":["新文京《兒科護理學》Wilms tumor","局部放療"]}},"114100-N4-42":{"quick":"視力檢查發現右眼白色反光(貓眼反射),可能罹患「視網膜母細胞瘤」(D)。","detail":{"background":"白瞳症(貓眼反射,leukocoria)是視網膜母細胞瘤最常見的早期表徵,因腫瘤位於視網膜、反射光線呈白色。視網膜母細胞瘤是兒童最常見的眼內惡性腫瘤,須及早診治以保命與保眼。","options":{"A":"白內障是水晶體混濁(雖也可白瞳,但本題指向惡性腫瘤)。","B":"神經母細胞瘤轉移眼眶致眼瞼下垂/瘀斑(非白瞳)。","C":"結膜色素退化非貓眼反射。","D":"正確。貓眼反射(白瞳症)是視網膜母細胞瘤典型表徵。"},"sources":["新文京《兒科護理學》視網膜母細胞瘤","白瞳"]}},"114100-N4-45":{"quick":"骨肉瘤(osteosarcoma)症狀及治療錯誤的是「白天疼痛感受較夜晚明顯」(B)。","detail":{"background":"骨肉瘤好發青少年、常見於長骨幹骺端(股骨遠端等),可因骨質破壞致病理性骨折。其疼痛特徵是「夜間疼痛較明顯」(夜間痛、休息時痛),而非白天較明顯,故B錯誤。","options":{"A":"正確。骨質破壞易致病理性骨折。","B":"錯誤(本題答案)。骨肉瘤夜間疼痛較明顯(非白天)。","C":"正確。好發於青少年。","D":"正確。惡性骨肉瘤常見於長骨。"},"sources":["新文京《兒科護理學》骨肉瘤","夜間痛"]}},"104030-N4-55":{"quick":"4歲神經母細胞瘤末期、轉移骨骼及肺,瀕死時護理評估不是會出現的症狀是「尿崩現象」(B)。","detail":{"background":"兒童癌症瀕死期常見:貧血出血(骨髓衰竭)、躁動不安(代謝/缺氧)、呼吸急促或不規則(陳施氏呼吸)、循環衰竭。尿崩(大量稀釋尿)是抗利尿激素不足(腦下垂體/下視丘病變)的表現,並非神經母細胞瘤瀕死期的典型症狀,故B不是。","options":{"A":"是。貧血、出血(骨髓衰竭)。","B":"本題答案(非)。尿崩是ADH不足表現,非瀕死期典型。","C":"是。躁動不安。","D":"是。呼吸急促。"},"sources":["新文京《兒科護理學》瀕死","症狀"]}},"104030-N4-69":{"quick":"13歲白血病化療禿髮覺得自己很醜,較適合的說法是「停止治療數個月後,頭髮就會再長出」(A)。","detail":{"background":"化療造成的禿髮是「可逆」的,停止化療後數個月頭髮會再長出,如實告知此事實能給病童具體的希望與心理支持。其餘說法(耍酷、吹蓬鬆遮掩、減少洗髮)是淡化或不正確的安慰,未真正回應其身體心像困擾。","options":{"A":"正確。化療禿髮可逆,停藥數月後頭髮會再長出。","B":"淡化感受、未真正回應困擾。","C":"吹蓬鬆遮掩無法解決,且禿髮明顯。","D":"減少洗髮無助於化療性掉髮。"},"sources":["新文京《兒科護理學》化療","禿髮可逆"]}},"104100-N4-55":{"quick":"15歲白血病末期面臨死亡的反應與護理錯誤的是「應對小容隱瞞有關其瀕臨死亡的事實」(C)。","detail":{"background":"青少年對死亡已有成熟理解,刻意隱瞞瀕死事實反而增加孤立與不信任;應以誠實、適齡的方式溝通並陪伴。青少年面臨發展與死亡的雙重危機、會尋找生死意義、擔心被同儕孤立,應鼓勵同學接觸支持。","options":{"A":"正確。青少年正經歷發展與死亡的雙重危機。","B":"正確。會尋找生與死的目的與意義。","C":"錯誤(本題答案)。不應隱瞞瀕死事實(應誠實適齡溝通)。","D":"正確。擔心被孤立,應鼓勵同學接觸。"},"sources":["新文京《兒科護理學》青少年","誠實"]}},"105090-N4-51":{"quick":"14歲急性白血病再復發,青少年對死亡的理解及反應錯誤的是「較易與醫護人員表達自己對死亡的看法」(C)。","detail":{"background":"青少年對死亡有成熟理解但仍有許多疑問;常認為自己不會這麼年輕就死(覺得自己無敵);情感上較難向父母表達、也常不易主動向醫護坦露對死亡的看法(傾向與同儕分享或壓抑),故「較易與醫護表達」與青少年實際反應不符。","options":{"A":"正確。對死亡有成熟理解但仍有許多疑問。","B":"正確。較易認為自己不會年輕就死(無敵感)。","C":"錯誤(本題答案)。青少年常不易主動向醫護表達死亡看法。","D":"正確。較不能與父母溝通取得支持。"},"sources":["新文京《兒科護理學》青少年","死亡反應"]}},"108110-N4-58":{"quick":"9歲白血病須住院至少一個月,此階段(學齡期)兒童最關心的事是「學業與同儕關係」(D)。","detail":{"background":"依Erikson發展,學齡期(6~12歲)處於勤奮對自卑,最重視學校學業表現與同儕團體歸屬。長期住院使其擔心跟不上課業、與同學疏離。與父母分離焦慮是幼兒期、閹割焦慮是學齡前期的議題。","options":{"A":"與父母分離焦慮是幼兒期議題。","B":"活動限制非學齡期最關心。","C":"閹割焦慮是學齡前期議題。","D":"正確。學齡期最關心學業與同儕關係。"},"sources":["新文京《兒科護理學》學齡期","勤奮"]}},"110030-N4-57":{"quick":"8歲神經母細胞瘤末期問護理師是否快死了,較適當的回應是「為什麼你突然問這個問題,說說看你在擔心什麼」(B)。","detail":{"background":"當末期兒童詢問死亡時,適當回應是以開放式問句引導其表達真正的擔憂與感受(探詢、傾聽),而非否認、轉移或敷衍。先了解孩子問此問題背後的情緒與需要,才能給予適切支持。","options":{"A":"否認並阻止表達(不當)。","B":"正確。開放式探詢、引導表達擔憂(治療性溝通)。","C":"質疑、轉移,未回應情緒。","D":"說教式回答,未回應孩子的擔憂。"},"sources":["新文京《兒科護理學》末期","開放式溝通"]}},"112110-N4-54":{"quick":"13歲骨肉瘤轉移肺部、生命末期,可評估到的生理變化正確的是「括約肌控制降低,造成大小便失禁」(C)。","detail":{"background":"瀕死期生理變化:循環衰竭使四肢末梢冰冷、脈搏變弱(非變強);呼吸常呈陳施氏呼吸(週期性深淺;非庫斯莫爾深快,後者見於糖尿病酮酸中毒);肌肉張力與括約肌控制下降致大小便失禁;感覺方面「聽覺」最後消失(視覺較早減退)。","options":{"A":"錯。瀕死多為陳施氏呼吸(庫斯莫爾深快見於DKA)。","B":"錯。瀕死周邊循環減少、末梢脈搏變弱(非變強)。","C":"正確。括約肌控制降低造成大小便失禁。","D":"錯。聽覺最後消失(非視力最後消失)。"},"sources":["新文京《兒科護理學》瀕死","聽覺最後"]}},"112180-N4-44":{"quick":"12歲化療掉髮悶悶不樂,護理措施錯誤的是「告知小恩掉髮是必然的副作用,且不可逆」(A)。","detail":{"background":"化療性掉髮是「可逆」的,停藥後會再長出,告知「不可逆」既不正確又加深其挫折。應鼓勵表達感受、共同討論用頭巾/假髮遮蓋、介紹同齡病友分享經驗以支持身體心像調適。","options":{"A":"錯誤(本題答案)。化療掉髮是可逆的(停藥會再長,非不可逆)。","B":"正確。鼓勵表達對掉髮的想法與感受。","C":"正確。共同討論頭巾、假髮遮蓋。","D":"正確。介紹同齡病友分享掉髮經驗。"},"sources":["新文京《兒科護理學》化療","禿髮可逆"]}},"113030-N4-34":{"quick":"12歲急性骨髓性白血病末期,對父母發脾氣怪罪,最適合的照護是「仔細傾聽其話語,鼓勵小紅表達內心的需要」(A)。","detail":{"background":"末期病童的憤怒(Kübler-Ross哀傷的憤怒期)是情緒宣洩,照護首重接納與傾聽,鼓勵表達內心真正的需要與恐懼,而非急著導正、轉移焦點或為他人辯解。先同理情緒,才能進一步支持。","options":{"A":"正確。傾聽並鼓勵表達內心需要(接納憤怒期情緒)。","B":"急著導向治療,未回應情緒。","C":"轉移焦點,未處理當下憤怒情緒。","D":"為父母醫療團隊辯解,未同理孩子。"},"sources":["新文京《兒科護理學》末期","憤怒期"]}},"101030-N4-52":{"quick":"9歲腦瘤剛開始化療嚴重嘔吐,媽媽質疑化療是否值得,護理師較適當的回答是「我介紹另一位病童母親跟你認識,我們一起聊一聊」(A)。","detail":{"background":"家屬面對孩子化療的痛苦而動搖時,需要的是情緒支持與同儕經驗分享,而非空泛保證或否定其感受。介紹有相同經歷的病童母親、提供支持團體,能讓家屬被理解、獲得實際因應經驗,是治療性溝通。其餘三項是不當保證或淡化感受。","options":{"A":"正確。引介同儕經驗分享、提供情緒支持(治療性溝通)。","B":"淡化家屬感受、未回應其擔憂。","C":"空泛保證,未處理情緒。","D":"空泛保證(都在掌握中),未回應擔憂。"},"sources":["新文京《兒科護理學》化療","情緒支持"]}},"101030-N4-68":{"quick":"癌症兒童化療期間營養照顧錯誤的是「為預防便秘,每日需大量補充高纖維的蔬菜、水果」(C)。","detail":{"background":"化療期間因骨髓抑制、免疫低下,生食蔬果易帶菌致感染,須採低微生物飲食(避免大量生鮮蔬果);且口腔黏膜炎時粗纖維會刺激傷口。應於食慾最佳時給高熱量高蛋白、少量多餐不強迫、口腔破皮給溫和軟質食物。","options":{"A":"正確。食慾最佳時給高熱量高蛋白食物。","B":"正確。食慾不佳時少量多餐、不強迫進食。","C":"錯誤(本題答案)。免疫低下宜低微生物飲食,不宜大量生鮮蔬果(易帶菌感染)。","D":"正確。口腔破皮給溫度適中、不刺激的軟質食物。"},"sources":["新文京《兒科護理學》化療","低微生物飲食"]}},"102110-N4-66":{"quick":"8歲準備接受異體骨髓移植錯誤的是「新輸入的骨髓細胞,於骨髓移植後隔天就能發揮造血功能」(D)。","detail":{"background":"異體骨髓移植:捐贈者與受贈者的HLA須吻合;移植前約7天接受高劑量化療/放療清除骨髓與癌細胞、騰出空間;經中心靜脈導管(Hickman)輸入骨髓。新植入的造血幹細胞需約2~4週(植入attachment)才開始造血,並非隔天,故D錯誤。","options":{"A":"正確。捐髓者與受贈者HLA須吻合。","B":"正確。移植前7日接受化療/放療清髓。","C":"正確。以Hickman導管輸入骨髓。","D":"錯誤(本題答案)。新骨髓約需2~4週才造血(非隔天)。"},"sources":["新文京《兒科護理學》骨髓移植","植入"]}},"103100-N4-74":{"quick":"周邊血液幹細胞移植前,捐贈者先施打3~6天G-CSF的理由是「驅動骨髓內的幹細胞移至周邊血液」(A)。","detail":{"background":"周邊血液幹細胞移植需從捐贈者周邊血採集足量幹細胞。G-CSF(白血球生成激素)可動員(驅動)骨髓內的造血幹細胞釋出至周邊血液,使後續以分離術從周邊血採集到足夠幹細胞。","options":{"A":"正確。G-CSF動員骨髓幹細胞移至周邊血以利採集。","B":"增加免疫力非此處採集前用藥的主要目的。","C":"減少GVHD非G-CSF動員的目的。","D":"G-CSF是動員釋出(非增加幹細胞濃度/增生)。"},"sources":["新文京《兒科護理學》幹細胞移植","G-CSF"]}},"104030-N4-70":{"quick":"7歲化療期間口腔黏膜破損照護錯誤的是「提供高蛋白、高熱量的堅果類食物」(B)。","detail":{"background":"口腔黏膜炎時應給溫和、軟質、不刺激的食物;堅果類堅硬粗糙會摩擦刺激破損黏膜、加重疼痛與出血,不適合。其餘正確:用軟棉棒做口腔護理避免牙齦出血、餐前依醫囑用局部麻醉劑減痛、餐後給Mycostatin(nystatin)漱口防念珠菌。","options":{"A":"正確。用軟棉棒勤作口腔護理避免牙齦出血。","B":"錯誤(本題答案)。堅果堅硬粗糙會刺激破損黏膜(應給軟質)。","C":"正確。餐前依醫囑給口腔局部麻醉劑減痛。","D":"正確。餐後給Mycostatin漱口防念珠菌。"},"sources":["新文京《兒科護理學》化療","口腔黏膜炎"]}},"104100-N4-67":{"quick":"病童輸血護理及注意事項錯誤的是「使用溫血器將輸入之血液維持在35°C~37°C」(B)。","detail":{"background":"本題官方答案為B。輸血核對病童姓名、血型、配對號碼與交叉試驗;以生理食鹽水沖洗管路並測生命徵象;用幫浦控速、開始15分鐘內慢速觀察反應。一般常規輸血不需例行加溫,溫血器僅用於大量快速輸血或低體溫等特定情況、且溫度上限37°C;此題以「常規輸血即用溫血器維持35~37°C」的敘述為不恰當(常規輸血不需例行加溫)。","options":{"A":"正確。核對姓名、血型、配對號碼及交叉試驗。","B":"錯誤(本題答案)。常規輸血不需例行用溫血器加溫(僅特定情況使用)。","C":"正確。以生理食鹽水沖洗管路並測生命徵象。","D":"正確。用幫浦、開始15分鐘內慢速(每分鐘不超過2mL)觀察。"},"sources":["新文京《兒科護理學》輸血","溫血器"]}},"105030-N4-68":{"quick":"為嬰兒執行輸血正確的是「輸血前須先用生理食鹽水沖洗點滴管道」(B)。","detail":{"background":"嬰兒輸血:輸血前後以生理食鹽水沖洗管路(其他溶液如葡萄糖水會使紅血球溶血、林格氏液含鈣會凝血);開始15分鐘內應「慢速」滴注以觀察過敏/溶血反應(非快速);不可在血液中加入任何藥物(含抗生素)。輸血量不大時用一般輸血套即可。","options":{"A":"輸血量不大用一般輸血套即可(非全程精密點滴套)。","B":"正確。輸血前後用生理食鹽水沖洗管路。","C":"錯。開始15分鐘內應慢速(非快速)觀察反應。","D":"錯。不可在血液中加入抗生素等藥物。"},"sources":["新文京《兒科護理學》輸血","生理食鹽水"]}},"106030-N4-70":{"quick":"化療藥物副作用與護理正確的是「Vincristine(Oncovin)易造成便秘,應視需要依醫囑使用軟便劑」(D)。","detail":{"background":"各化療藥特異毒性:Vincristine致神經毒性(便秘、手腳麻刺、垂足),須給軟便劑與監測;Cyclophosphamide致出血性膀胱炎(須多喝水);Cisplatin致腎毒性與聽神經毒性(須監測腎與聽力);Methotrexate致黏膜炎/肝腎毒性。故各選項配對中只有D正確。","options":{"A":"錯。Cyclophosphamide致出血性膀胱炎(聽神經毒性是Cisplatin)。","B":"錯。Cisplatin致腎/聽神經毒性(出血性膀胱炎是Cyclophosphamide)。","C":"錯。Methotrexate致黏膜炎/肝腎毒性(心臟毒性是doxorubicin)。","D":"正確。Vincristine致便秘,依醫囑用軟便劑。"},"sources":["新文京《兒科護理學》化療藥","Vincristine"]}},"106030-N4-71":{"quick":"接受Port-A導管植入病童護理錯誤的是「需限制與導管植入處同側的手臂之活動」(A)。","detail":{"background":"Port-A完全植入皮下,設計即為方便活動、長期反覆使用,「不需」限制同側手臂活動。其餘正確:定期以含肝素生理食鹽水沖洗保持通暢、注射化療藥前先反抽看回血確認在血管內、插針不易回血可請病童抬高手臂或變換姿勢。","options":{"A":"錯誤(本題答案)。Port-A不需限制同側手臂活動(設計即方便活動)。","B":"正確。定期以含肝素生理食鹽水沖洗管路。","C":"正確。注射化療藥前反抽看回血。","D":"正確。插針不易回血可請病童抬高手臂。"},"sources":["新文京《兒科護理學》Port-A","活動"]}},"107030-N4-74":{"quick":"注射化學藥物出現紅腫、疼痛及水泡(外滲)時,正確的處理順序是「4停止注射→2以空針反抽滲漏藥物→3局部冰敷/熱敷或塗藥→1每日追蹤滲漏部位」(A,即4231)。","detail":{"background":"化療藥外滲(extravasation)是緊急狀況,正確順序:①立即停止注射(4)、②保留針頭以空針反抽殘留藥物(2)、③依藥物性質局部冰敷或熱敷或給解毒劑(3)、④後續每日追蹤滲漏部位變化(1)。先止損、再抽藥、再處置、最後追蹤。","options":{"A":"正確。4停止→2反抽→3冰/熱敷或塗藥→1追蹤(4231)。","B":"4321順序錯(追蹤不應在處置前)。","C":"2341未先停止注射。","D":"3241未先停止注射。"},"sources":["新文京《兒科護理學》化療","外滲處理"]}},"107030-N4-75":{"quick":"5歲化療後食慾下降噁心嘔吐體重減輕,護理措施錯誤的是「林小弟想吃鮮奶、奶昔,也可以讓他吃」(B)。","detail":{"background":"本題官方答案為B。化療免疫低下期間採低微生物飲食,未經充分滅菌的鮮奶/奶昔等乳製品易帶菌,有感染風險,不宜隨意給予。其餘正確:讓病童共同選擇/準備餐點增加進食意願、用卡通擺盤提高食慾、每天一起測量體重監測。","options":{"A":"正確。讓病童共同選擇/準備餐點增加意願。","B":"錯誤(本題答案)。化療期間鮮奶/奶昔等易帶菌,有感染風險不宜隨意給。","C":"正確。用卡通樣式擺盤提高食慾。","D":"正確。每天一起測量體重監測營養。"},"sources":["新文京《兒科護理學》化療","低微生物飲食"]}},"111110-N4-71":{"quick":"3歲化療,WBC 1200、seg 11%、band 1%、mono 2%、lymph 37%,絕對嗜中性白血球(ANC)是「144」(B)。","detail":{"background":"ANC=白血球總數×(成熟嗜中性球seg%+不成熟嗜中性球band%)=1200×(11%+1%)=1200×0.12=144/mm³(單核球、淋巴球不計入)。ANC<500屬嚴重低下,須保護性隔離。","options":{"A":"24算法錯誤。","B":"正確。1200×(11%+1%)=144。","C":"156誤把單核球計入。","D":"444誤把淋巴球計入。"},"sources":["新文京《兒科護理學》ANC","計算"]}},"112030-N4-71":{"quick":"癌症嬰幼兒接受骨髓穿刺檢查最常選擇的部位是「脛骨」(C)。","detail":{"background":"骨髓穿刺部位選擇依年齡:成人/較大兒童常用後腸骨脊(髂後上棘)或胸骨;但嬰幼兒因髂骨尚小、骨髓腔淺,常選擇「脛骨(近端脛骨)」作為穿刺部位,取得較易且安全。胸骨在幼兒過薄危險、股骨/腰椎非常規骨髓穿刺處。","options":{"A":"胸骨在嬰幼兒過薄危險。","B":"股骨非常規骨髓穿刺處。","C":"正確。嬰幼兒常選脛骨(近端)作骨髓穿刺。","D":"腰椎是腰椎穿刺(取腦脊髓液),非骨髓穿刺。"},"sources":["新文京《兒科護理學》骨髓穿刺","脛骨"]}},"112110-N4-72":{"quick":"17歲將接受造血幹細胞移植錯誤的是「急性移植體對抗宿主疾病(GVHD)可能在幹細胞移植後4~6個月之間出現」(B)。","detail":{"background":"造血幹細胞移植:移植前高劑量化療破壞骨髓與癌細胞、騰出空間;過程採保護性隔離觀察副作用;以Hickman輸注幹細胞後約14~28天開始造血。「急性」GVHD通常發生在移植後100天內(尤前數週),4~6個月後出現的是「慢性」GVHD,故B(把4~6個月稱為急性GVHD)錯誤。","options":{"A":"正確。移植前高劑量化療破壞骨髓癌細胞、騰出空間。","B":"錯誤(本題答案)。急性GVHD多在移植後100天內(4~6個月後是慢性GVHD)。","C":"正確。過程採保護性隔離並觀察副作用。","D":"正確。Hickman輸注幹細胞後約14~28天開始造血。"},"sources":["新文京《兒科護理學》幹細胞移植","GVHD"]}},"113180-N4-41":{"quick":"6歲因不明貧血進行骨髓抽吸術,處置及護理錯誤的是「此年紀穿刺部位以近側脛骨優先」(A)。","detail":{"background":"骨髓抽吸部位依年齡:嬰幼兒(較小)常選脛骨,但較大兒童(如6歲)與成人首選「後腸骨脊(髂後上棘)」,該處骨髓豐富且安全,故6歲以脛骨「優先」不恰當。其餘正確:穿刺後紗布加壓至少15分鐘防出血、術前評估出血傾向與凝血藥物、術後1小時內密切監測生命徵象與出血。","options":{"A":"錯誤(本題答案)。6歲應以後腸骨脊優先(脛骨多用於嬰幼兒)。","B":"正確。穿刺後紗布加壓至少15分鐘防出血。","C":"正確。術前評估出血異常或凝血藥物。","D":"正確。術後1小時內密切監測生命徵象及出血。"},"sources":["新文京《兒科護理學》骨髓抽吸","後腸骨脊"]}},"113180-N4-42":{"quick":"預防腫瘤溶解症候群(TLS)的處置錯誤的是「持續監測尿糖」(A)。","detail":{"background":"TLS是大量癌細胞崩解釋出鉀、磷、尿酸致代謝危機。預防處置:化療前大量給水(水化)促排出、依醫囑服allopurinol降尿酸、靜脈輸液加碳酸氫鈉鹼化尿液(防尿酸結晶)。應監測的是尿酸、電解質(鉀/磷/鈣)與腎功能,而非「尿糖」,故A錯誤。","options":{"A":"錯誤(本題答案)。應監測尿酸與電解質(非尿糖)。","B":"正確。化療前大量給水(水化)。","C":"正確。依醫囑按時服用allopurinol降尿酸。","D":"正確。靜脈輸液加碳酸氫鈉鹼化尿液防尿酸結晶。"},"sources":["新文京《兒科護理學》TLS","水化"]}},"115030-N4-43":{"quick":"化療中WBC 1000、seg 26%、band 2%、lymph 68%、mono 4%,絕對嗜中性白血球(ANC)是「280」(C)。","detail":{"background":"ANC=白血球總數×(成熟seg%+不成熟band%)=1000×(26%+2%)=1000×0.28=280/mm³(淋巴球、單核球不計入)。ANC<500屬嚴重嗜中性球低下,須保護性隔離防感染。","options":{"A":"680誤把淋巴球計入。","B":"320算法錯誤。","C":"正確。1000×(26%+2%)=280。","D":"200算法錯誤。"},"sources":["新文京《兒科護理學》ANC","計算"]}},"101110-N4-44":{"quick":"正常孕婦一般常規檢查不包括的是「口服葡萄糖耐量試驗(OGTT)」(D)。","detail":{"background":"孕婦初次產檢常規含梅毒血清(VDRL)、全血球計數(CBC)、血型與Rh因子辨認、B肝、德國麻疹抗體、HIV、尿液等。OGTT(口服葡萄糖耐量試驗)是針對妊娠糖尿病篩檢、於妊娠24~28週進行的特定檢查,並非每位孕婦初診的一般常規項目。","options":{"A":"是常規。梅毒血清試驗(VDRL)。","B":"是常規。全血球計數(CBC)。","C":"是常規。ABO及Rh因子辨認。","D":"本題答案(不包括)。OGTT於24~28週篩妊娠糖尿病,非一般常規初診項目。"},"sources":["新文京《產科護理學》產檢","OGTT"]}},"103030-N4-7":{"quick":"由外胚層發育而來的胎兒組織是「神經組織」(C)。","detail":{"background":"三胚層分化:外胚層→表皮、神經系統(神經組織)、感覺器官;中胚層→骨骼肌、骨骼、血液、心血管、泌尿生殖;內胚層→消化道與呼吸道上皮、膀胱尿道上皮。故神經組織由外胚層發育。","options":{"A":"膀胱、尿道(上皮)由內胚層(中胚層參與)。","B":"紅血球由中胚層。","C":"正確。神經組織由外胚層發育。","D":"骨骼肌由中胚層。"},"sources":["新文京《產科護理學》胚胎","外胚層"]}},"103030-N4-62":{"quick":"黴漿菌性肺炎(mycoplasma pneumonia)敘述錯誤的是「大多侵犯1~4歲幼兒,較不容易傳染給其他家人」(A)。","detail":{"background":"黴漿菌肺炎好發學齡兒童與年輕成人(非1~4歲幼兒),且傳染力高、易在家庭與群聚間傳染。其表現為乾咳、痰少且痰中以單核白血球為主、胸部X光見下肺葉間質性浸潤;治療用紅黴素(10~14天)或azithromycin(約3天)。","options":{"A":"錯誤(本題答案)。好發學齡兒/年輕成人、傳染力高(非1~4歲、不易傳染)。","B":"正確。乾咳、痰少、痰中為單核白血球。","C":"正確。X光見下肺葉間質性肺炎陰影。","D":"正確。紅黴素10~14天或azithromycin 3天。"},"sources":["新文京《兒科護理學》黴漿菌肺炎","學齡兒"]}},"104100-N4-31":{"quick":"Rh陰性初孕婦、先生Rh陽性,適宜的護理是「若激敏反應尚未產生,則在產後72小時給予母體注射300μg的Rhogam,可避免激敏反應產生」(B)。","detail":{"background":"Rh陰性母親懷Rh陽性胎兒有產生抗D抗體(激敏)的風險,會威脅後續妊娠。預防為在產後72小時內(及孕28週)給母體注射Rh免疫球蛋白(Rhogam)中和進入母體的胎兒Rh陽性紅血球,阻止母體產生抗D抗體。間接庫氏試驗檢測母體血中的抗體(非抗原)。","options":{"A":"錯。胎兒血型不一定皆Rh陽性(視父親基因型)。","B":"正確。產後72小時內注射Rhogam可避免激敏反應。","C":"錯。Rhogam中和進入母體的胎兒Rh陽性紅血球(非中和母體Rh陰性紅血球)。","D":"錯。間接庫氏試驗檢測母體血中抗D抗體(非抗原數目)。"},"sources":["新文京《產科護理學》Rh","Rhogam"]}},"105030-N4-60":{"quick":"細菌性肺炎(Bacterial pneumonia)敘述錯誤的是「最常見的致病原為黴漿菌」(A)。","detail":{"background":"細菌性肺炎最常見的致病原是肺炎鏈球菌(Streptococcus pneumoniae),臨床多有高燒(>39°C)、血中顆粒性白血球(嗜中性球)升高,須給抗生素治療。黴漿菌引起的是「非典型肺炎」、不屬典型細菌性肺炎的最常見病原,故A錯誤。","options":{"A":"錯誤(本題答案)。細菌性肺炎最常見病原是肺炎鏈球菌(非黴漿菌)。","B":"正確。通常有高燒(>39°C)。","C":"正確。血中顆粒性白血球升高。","D":"正確。通常需給抗生素治療。"},"sources":["新文京《兒科護理學》細菌性肺炎","肺炎鏈球菌"]}},"105090-N4-29":{"quick":"懷孕期間貧血原因與診斷正確的是「孕婦血紅素低於11g/dl、血清鐵蛋白濃度低於12μg/dl時,即表示有缺鐵性貧血」(A)。","detail":{"background":"孕婦缺鐵性貧血的診斷標準是Hb<11g/dl且鐵蛋白(ferritin)<12μg/dl。海洋性貧血是「體染色體」隱性遺傳(非性染色體);β型海洋性貧血是第11對染色體β-globin基因突變(此為海洋性貧血、非缺鐵性);同型海洋性貧血帶因者的胎兒視型別而定(乙型重症致命、甲型重症水腫死產),非「大多畸形」。","options":{"A":"正確。Hb<11、鐵蛋白<12即缺鐵性貧血。","B":"錯。海洋性貧血是體染色體隱性遺傳(非性染色體)。","C":"錯。β-globin基因突變是海洋性貧血(非缺鐵性貧血)。","D":"視型別而定(非大多畸形;表述過度)。"},"sources":["新文京《產科護理學》孕期貧血","診斷"]}},"106030-N4-10":{"quick":"懷孕26週正常的血液變化是「血紅素下降」(D)。","detail":{"background":"孕期血漿容積增加比紅血球增加多,造成「生理性血液稀釋」,使血紅素與血比容相對下降(生理性貧血);白血球輕度上升、纖維蛋白原與凝血因子增加(高凝狀態)。故正常的是血紅素下降。","options":{"A":"錯。孕期纖維蛋白原增加(非減少)。","B":"錯。血比容因血液稀釋而下降(非上升)。","C":"錯。白血球輕度增加(非減少)。","D":"正確。血液稀釋使血紅素下降(生理性貧血)。"},"sources":["新文京《產科護理學》孕期血液","血液稀釋"]}},"106110-N4-32":{"quick":"孕婦缺鐵性貧血敘述錯誤的是「補充鐵劑應於飯前服用以利吸收」(B)。","detail":{"background":"本題官方答案為B。一般原則鐵劑空腹(飯前)吸收較佳,但孕婦常有噁心、腸胃不適,臨床多建議「隨餐或飯後」服用以減少腸胃刺激、提高遵從性,故就孕婦情境而言「應於飯前服用」的指導被視為不恰當。其餘正確:新生兒延遲斷臍增加鐵儲存、鐵劑與維生素C併服助吸收、多攝取紅肉與深綠色蔬菜。","options":{"A":"正確。新生兒出生後延遲斷臍可增加鐵儲存。","B":"錯誤(本題答案)。孕婦因噁心/腸胃不適,鐵劑多建議隨餐或飯後服用(非飯前)。","C":"正確。鐵劑可與維生素C同服以利吸收。","D":"正確。鼓勵多攝取紅肉及深綠色蔬菜。"},"sources":["新文京《產科護理學》孕期貧血","隨餐"]}},"106111-N4-32":{"quick":"葡萄胎敘述錯誤的是「為安全起見皆進行預防性化學治療」(C)。","detail":{"background":"葡萄胎是滋養層細胞異常增生、血中hCG明顯增高;治療以子宮排空(清除術)為主,術後須定期追蹤hCG至正常,並避孕1年以防復發/惡化為絨毛膜癌。並非「皆」進行預防性化療,只有高風險或hCG異常持續者才化療,故C錯誤。","options":{"A":"正確。主要是滋養層細胞異常增生。","B":"正確。血中hCG濃度增高。","C":"錯誤(本題答案)。非皆預防性化療(以清除術+追蹤hCG為主,高風險者才化療)。","D":"正確。1年內宜避免懷孕以防復發。"},"sources":["新文京《產科護理學》葡萄胎","hCG追蹤"]}},"107030-N4-53":{"quick":"10歲長期服用抗癲癇藥物應定期檢查的項目,除外「心肺功能檢查」(D)。","detail":{"background":"長期服用抗癲癇藥物須定期監測:血中藥物濃度(維持治療範圍)、肝功能(多數抗癲癇藥經肝代謝、具肝毒性)、血球數量(部分藥物致骨髓抑制/血球異常)。心肺功能檢查並非抗癲癇藥物常規監測項目,故除外。","options":{"A":"需檢查。血中藥物濃度。","B":"需檢查。肝臟功能。","C":"需檢查。血球數量。","D":"本題答案(除外)。心肺功能非抗癲癇藥常規監測。"},"sources":["新文京《兒科護理學》抗癲癇藥","監測"]}},"107110-N4-35":{"quick":"卵巢癌第2次腹腔內化療、主訴一直噁心,最適當的回應是「少量多餐,攝取高熱量、高蛋白質飲食可逐漸減緩噁心的現象」(D)。","detail":{"background":"化療引起的噁心,適當衛教是提供具體可行的飲食策略(少量多餐、高熱量高蛋白、避免油膩)並配合止吐藥,以實際緩解症狀。其餘回應是淡化感受、推薦無實證的偏方(人蔘)或預告更多副作用增加焦慮,皆不適當。","options":{"A":"淡化感受(過幾天就好),未提供協助。","B":"推薦無實證偏方(人蔘),不適當。","C":"預告更多副作用,增加焦慮。","D":"正確。少量多餐、高熱量高蛋白可緩解噁心。"},"sources":["新文京《兒科護理學》化療","止吐飲食"]}},"108110-N4-20":{"quick":"產後生理變化正確的是「產後12~24小時內,排尿量增加為正常現象,是為了排除懷孕時滯留多餘的水份」(B)。","detail":{"background":"產後因不再有胎盤循環、組織間液回流,身體須排除孕期滯留的水分,故產後12~24小時至數日內排尿量(利尿)增加屬正常。產後24小時內體溫可因脫水/用力略升(非下降);產後高凝狀態用霍曼氏試驗評估下肢「靜脈」血栓(非動脈);產後心輸出量短暫增加但脈搏多偏慢(60~70次/分),非80~120。","options":{"A":"錯。產後24小時內體溫可略升(脫水/用力),非下降。","B":"正確。產後利尿增加排除孕期滯留水分,屬正常。","C":"霍曼氏試驗評估下肢靜脈血栓(非動脈炎,用詞不當)。","D":"錯。產後脈搏多偏慢(60~70次/分),非80~120。"},"sources":["新文京《產科護理學》產後","利尿"]}},"108110-N4-40":{"quick":"更年期婦女脂質與脂蛋白改變錯誤的是「高密度脂蛋白(HDL)增加」(B)。","detail":{"background":"更年期雌激素下降,失去其對血脂的保護作用,導致:HDL(好膽固醇)「下降」、LDL(壞膽固醇)上升、纖維蛋白原濃度增加、血小板凝集增加,整體心血管風險上升。故「HDL增加」錯誤(應為下降)。","options":{"A":"正確。血小板凝集增加。","B":"錯誤(本題答案)。更年期HDL下降(非增加)。","C":"正確。低密度脂蛋白(LDL)增加。","D":"正確。纖維蛋白原濃度增加。"},"sources":["新文京《產科護理學》更年期","HDL"]}},"109030-N4-6":{"quick":"第三孕期蛋奶素孕婦飲食指導錯誤的是「需額外增加維生素E攝取,促進紅血球發育」(A)。","detail":{"background":"孕期造血與紅血球發育關鍵營養是鐵、葉酸、維生素B12(非維生素E);維生素E是抗氧化劑,與促進紅血球發育無直接關係,且不需特別額外大量補充。其餘正確:多攝取多醣少單醣、第三孕期仍補葉酸(深綠蔬菜)、鐵需求增加。","options":{"A":"錯誤(本題答案)。促紅血球發育是鐵/葉酸/B12(非維生素E)。","B":"正確。攝取多醣類、避免單醣。","C":"正確。此孕期仍補葉酸,多吃深綠色蔬菜。","D":"正確。鐵劑補充量增加以供嬰兒出生後使用。"},"sources":["新文京《產科護理學》孕期營養","造血營養"]}},"110030-N4-30":{"quick":"女陰癌(外陰癌)敘述正確的是「術後應採仰臥式,維持大腿45度外張,膝關節90度彎曲之姿勢」(D)。","detail":{"background":"外陰癌根除術後傷口在外陰會陰部,為減少傷口張力、促進癒合與引流,須採仰臥、大腿外展約45度、膝關節彎曲約90度的姿勢。外陰癌多生長緩慢、以局部淋巴轉移為主、早期以手術治療為主(非化療為主)。","options":{"A":"外陰癌多生長緩慢(非生長快速)。","B":"多經淋巴轉移(此項描述為直接接觸局部轉移,不精確)。","C":"早期以手術為主(非化學治療為主)。","D":"正確。術後仰臥、大腿45度外張、膝90度彎曲減傷口張力。"},"sources":["新文京《產科護理學》外陰癌","術後姿勢"]}},"110030-N4-59":{"quick":"川崎氏症(Kawasaki disease)臨床表徵錯誤的是「亞急性期紅血球沉降速率和血小板數值降低」(D)。","detail":{"background":"川崎氏症急性期持續發燒5天以上、兩眼結膜充血、草莓舌、頸部淋巴結腫;亞急性期手指腳趾肛門脫皮,並可有關節痛。發炎指標方面,川崎氏症的紅血球沉降速率(ESR)與血小板數值是「升高」(尤亞急性期血小板顯著上升),而非降低,故D錯誤。","options":{"A":"正確。急性期持續發燒5天以上。","B":"正確。急性期兩眼結膜充血、草莓舌、頸淋巴結腫。","C":"正確。亞急性期可能出現關節痛。","D":"錯誤(本題答案)。亞急性期ESR與血小板數值升高(非降低)。"},"sources":["新文京《兒科護理學》川崎氏症","血小板升"]}},"110110-N4-18":{"quick":"產婦產後第1天生理變化錯誤的是「凝血因子(coagulation)減少」(B)。","detail":{"background":"產後為止血需要,身體呈高凝狀態,凝血因子與纖維蛋白原「增加」(故產後血栓風險升高),並非減少。其餘正確:產後白血球增多(leukocytosis)、黃體素與雌性素因胎盤娩出而下降。","options":{"A":"正確。白血球增多症(leukocytosis)。","B":"錯誤(本題答案)。產後凝血因子增加(高凝狀態),非減少。","C":"正確。黃體素(progesterone)下降。","D":"正確。雌性素(estrogen)下降。"},"sources":["新文京《產科護理學》產後","高凝"]}},"111030-N4-2":{"quick":"不是接受產前遺傳諮詢高危險群孕婦的是「初次被診斷為妊娠糖尿病的經產婦」(C)。","detail":{"background":"產前遺傳諮詢的高危險群包括高齡(≥34歲)、曾生育先天異常兒、夫妻一方為遺傳疾病(如海洋性貧血)帶原者等與「遺傳/染色體異常」相關者。妊娠糖尿病是代謝性疾病、非遺傳指標,故初診妊娠糖尿病的經產婦不屬於產前遺傳諮詢的高危險群。","options":{"A":"是高危群。懷孕年齡34.8歲(高齡)。","B":"是高危群。曾生下先天性心臟病兒。","C":"本題答案(非)。妊娠糖尿病是代謝性(非遺傳指標)。","D":"是高危群。先生是海洋性貧血帶原者。"},"sources":["新文京《產科護理學》遺傳諮詢","高危群"]}},"111030-N4-35":{"quick":"卵巢癌醫療措施錯誤的是「初診斷之卵巢癌化療藥物以微脂體小紅莓(Lipo-Dox)為首選」(D)。","detail":{"background":"卵巢癌治療以手術(分期手術、減積手術)合併化學治療為主流,分期手術前須腸道準備,減積手術盡量切除所有腫瘤。初診斷卵巢癌的第一線化療是「鉑類+紫杉醇(carboplatin+paclitaxel)」,微脂體小紅莓(Lipo-Dox)多用於復發性卵巢癌,非初診斷首選,故D錯誤。","options":{"A":"正確。手術合併化療為主流。","B":"正確。分期手術前應腸道準備。","C":"正確。減積手術盡量切除腫瘤。","D":"錯誤(本題答案)。初診斷首選鉑類+紫杉醇(Lipo-Dox用於復發)。"},"sources":["新文京《產科護理學》卵巢癌","一線化療"]}},"111110-N4-9":{"quick":"懷孕24週、BMI 23、Hb 11.2、Hct 35%,飲食指導除外(不需)的是「每日額外增加鐵劑攝取量45mg」(B)。","detail":{"background":"孕期(此例Hb 11.2、未達貧血<11)的常規飲食增量為:每日熱量較孕前增300卡、蛋白質增約10g、足夠鈣質。常規孕婦鐵補充約27~30mg/日;「每日額外增加45mg」是針對已缺鐵性貧血者的治療劑量,此例非貧血,故不需45mg,為除外項。","options":{"A":"需要。每日熱量較孕前增300卡。","B":"本題答案(除外)。45mg是缺鐵性貧血治療量,此例非貧血(常規約27~30mg)。","C":"需要。每日增蛋白質10g。","D":"需要。攝取足夠含鈣食物。"},"sources":["新文京《產科護理學》孕期營養","鐵補充"]}},"112180-N4-22":{"quick":"妊娠12週、MCV 60fl,最優先處置是「安排配偶接受紅血球平均容積(MCV)之血液篩檢」(C)。","detail":{"background":"孕婦MCV<80(此例60)為小球性,須鑑別缺鐵性貧血與海洋性貧血。海洋性貧血篩檢流程:孕婦MCV偏低→「先安排配偶做MCV篩檢」,若雙方皆MCV偏低(皆疑帶因)再進一步做基因檢查與胎兒診斷(絨毛膜取樣)。故最優先是先驗配偶MCV,而非直接做基因或侵入性胎兒檢查。","options":{"A":"基因檢查是配偶也低之後的進一步步驟(非最優先)。","B":"同上,基因檢查非第一步。","C":"正確。最優先先安排配偶做MCV血液篩檢。","D":"絨毛膜取樣是確認雙方帶因後才做(侵入性,非最優先)。"},"sources":["新文京《產科護理學》海洋性貧血","MCV篩檢"]}},"112180-N4-23":{"quick":"承上題,若配偶亦為海洋性貧血帶因者,胎兒狀況正確的是「若胎兒為乙型海洋性貧血重症者,則其在胎兒時期是正常的」(C)。","detail":{"background":"夫妻皆帶因(體染色體隱性),胎兒患重症機率為1/4(非75%)、與性別無關。乙型海洋性貧血因胎兒期以HbF(α2γ2、不需β鏈)為主,故重症乙型胎兒在「胎兒時期是正常的」,出生後HbF轉為需β鏈的HbA時才出現貧血。重症乙型與孕婦妊娠高血壓無直接關係(甲型重症胎兒水腫才與孕婦子癇前症相關)。","options":{"A":"錯。重症機率為1/4(非75%)。","B":"錯。體染色體隱性遺傳,與胎兒性別無關。","C":"正確。乙型重症胎兒期以HbF為主,故胎兒時期正常。","D":"錯。乙型重症與孕婦妊娠高血壓無直接關係。"},"sources":["新文京《產科護理學》海洋性貧血","HbF"]}},"112180-N4-47":{"quick":"11歲慢性腎衰竭護理照護最不適當的是「給與高鉀之飲食指導,如香蕉、橘子,以避免低血鉀導致心律不整現象」(C)。","detail":{"background":"慢性腎衰竭因腎臟排鉀能力下降,易發生「高血鉀」而致心律不整,飲食應「限制鉀」(避免香蕉、橘子等高鉀食物),而非給高鉀飲食,故C最不適當。其餘正確:觀察出血傾向、尿霜搔癢給潤膚劑、補鐵與葉酸防腎性貧血。","options":{"A":"適當。觀察瘀傷、紫斑等出血現象。","B":"適當。尿霜致搔癢可給潤膚劑。","C":"最不適當(本題答案)。慢性腎衰竭應限鉀(易高血鉀),非給高鉀飲食。","D":"適當。補鐵與葉酸防腎性貧血。"},"sources":["新文京《兒科護理學》慢性腎衰竭","限鉀"]}},"113030-N4-40":{"quick":"川崎氏症病童治療及目的正確的是「給與免疫球蛋白(IVIG)可有效降低冠狀動脈瘤發生」(B)。","detail":{"background":"川崎氏症的標準治療是高劑量靜脈免疫球蛋白(IVIG)合併阿斯匹靈,IVIG可顯著降低冠狀動脈瘤的發生率。阿斯匹靈在川崎氏症的目的是抗發炎與抑制血小板凝集(非促進凝集);舞蹈症是風濕熱、苯巴比妥非川崎用藥;盤尼西林非川崎治療。","options":{"A":"錯。阿斯匹靈在川崎是抗發炎/抑制血小板凝集(非促進凝集)。","B":"正確。IVIG可有效降低冠狀動脈瘤發生。","C":"錯。舞蹈症是風濕熱(苯巴比妥非川崎用藥)。","D":"錯。盤尼西林非川崎氏症治療。"},"sources":["新文京《兒科護理學》川崎氏症","IVIG"]}},"113180-N4-39":{"quick":"10歲持續乾咳、輕微發燒、X光兩側下肺葉間質性浸潤、痰中單核白血球上升、雙胞胎妹妹也有類似症狀,最可能的肺炎致病因子是「黴漿菌」(C)。","detail":{"background":"黴漿菌肺炎好發學齡兒童、傳染力高(故家中手足同患)、表現乾咳與輕微發燒、X光呈下肺葉間質性浸潤、痰中以單核白血球為主,完全符合此例。金黃葡萄球菌、肺炎鏈球菌多為高燒、肺實質化;b型嗜血桿菌多致會厭炎/侵襲性感染。","options":{"A":"金黃葡萄球菌肺炎多高燒、膿胸,非間質性。","B":"肺炎鏈球菌多高燒、肺實質化(大葉性)。","C":"正確。黴漿菌(學齡兒、家庭傳染、乾咳、間質浸潤、單核球)。","D":"b型嗜血桿菌多致會厭炎等侵襲性感染。"},"sources":["新文京《兒科護理學》黴漿菌肺炎","間質浸潤"]}},"114030-N4-6":{"quick":"可用來篩檢孕婦是否為海洋性貧血帶因者的血液檢驗值是「平均紅血球體積(MCV)」(B)。","detail":{"background":"海洋性貧血為小球性貧血,帶因者紅血球偏小,故以「平均紅血球體積(MCV)」做初步篩檢(MCV<80須進一步鑑別缺鐵或海洋性貧血)。血色素只反映貧血程度、鐵離子反映鐵狀態、α-胎兒蛋白用於神經管缺損/染色體篩檢,皆非海洋性貧血帶因的篩檢指標。","options":{"A":"血色素只反映貧血程度,非帶因篩檢。","B":"正確。MCV是海洋性貧血帶因者的篩檢指標(小球性)。","C":"鐵離子反映鐵狀態(鑑別缺鐵),非帶因篩檢。","D":"α-胎兒蛋白用於神經管缺損/染色體篩檢。"},"sources":["新文京《產科護理學》海洋性貧血","MCV"]}}},TO=["1缺鐵性貧血", "2海洋性貧血", "3其他貧血", "4白血病", "5血友病", "6ITP血小板減少紫斑症", "7實體腫瘤", "8化療副作用與護理輸血", "9癌症末期死亡與心理", "10母嬰產科與其他借題"],LEC={"1缺鐵性貧血":{"html":"<p><b>缺鐵性貧血(IDA)</b>:好發<b>6~24個月足月兒</b>(非遺傳)、MCV/MCH低(小球低色素)、血清鐵與鐵蛋白低。表現蒼白、易疲倦、注意力不集中、心跳<b>增快</b>(代償)。</p><p><b>口服鐵劑</b>:<b>飯前1小時空腹</b>、<b>與維生素C/柑橘果汁同服</b>促吸收、<u>勿與牛奶/制酸劑/茶同服</u>、用吸管(防染牙)、<b>大便變黑屬正常</b>勿停藥。注射鐵劑(Imferon):Z字形深部肌注、注後略停5~10秒、<u>勿揉搓</u>。</p>"},"2海洋性貧血":{"html":"<p><b>海洋性貧血</b>:<b>體染色體隱性</b>(α型第16對、β型第11對)、父母帶因每胎1/4重症。重症β約<b>出生後3~6個月</b>漸出現溶血、骨髓增生致<b>顱骨變大塌鼻暴牙顴骨突出</b>、肝脾腫大。</p><p>治療<b>終身定期輸血+排鐵劑(deferoxamine,約2~3歲起、尿橘紅、補維生素C、夜間皮下)</b>、根治骨髓移植。篩檢<b>MCV<80</b>初篩。<b>鐮狀細胞</b>:止痛用嗎啡(勿aspirin)、熱敷(非冷)、多水化。</p>"},"3其他貧血":{"html":"<p><b>再生不良性貧血</b>:骨髓造血衰竭→全血球減少;治療免疫抑制(<b>ALG/ATG、cyclosporine</b>)、testosterone、骨髓移植(<u>非immunoglobulin</u>);護理保護隔離、避外傷出血、避aspirin、軟質食物。</p><p><b>網狀細胞計數</b>反映<b>骨髓製造紅血球速率</b>。<b>鐮狀細胞貧血</b>:體染色體隱性、HbS致鐮變血管阻塞疼痛危機,止痛嗎啡(勿aspirin)、<b>熱敷(勿冷敷)</b>、多水化。</p>"},"4白血病":{"html":"<p><b>兒童白血病</b>:最常<b>ALL(好發2~6歲)</b>;發燒疲憊蒼白、瘀斑、骨痛、肝脾淋巴結腫;<b>確診骨髓抽吸(芽細胞>25%,非腰椎穿刺)</b>;中樞神經/睪丸侵犯預後差。誘導期4~5週達緩解、用藥7~14天骨髓抑制。</p><p><b>ANC=白血球×(segment%+band%)</b>,<500~1000須保護性隔離、低微生物餐、勿活疫苗/aspirin、發燒立即抗生素、勿肛門途徑。<b>Bactrim</b>預防PCP、<b>allopurinol/Rasburicase</b>預防腫瘤溶解症候群(高尿酸,須大量水化勿限水)。</p>"},"5血友病":{"html":"<p><b>血友病</b>:<b>性聯(X)隱性</b>(男性發病)、A型缺第VIII因子;<b>PTT延長、出血時間/血小板/PT正常</b>;深部組織/關節出血、瘀血、刷牙牙齦出血。<b>關節血腫最常膝關節</b>(其次踝肘;少肩腕)。</p><p>處置:補充凝血因子、關節出血<b>RICE(休息/冰敷血管收縮/加壓/抬高至心臟以上)</b>、<u>勿石膏固定/勿熱敷/勿aspirin</u>、軟毛牙刷、<b>游泳</b>等非碰撞運動強化關節(避籃球/網球/跳馬)。</p>"},"6ITP血小板減少紫斑症":{"html":"<p><b>特發性血小板減少紫斑症(ITP)</b>:自體免疫抗體破壞血小板→多處紫斑/出血;多病毒感染後發生、<b>多自限可自癒</b>(非僅能長期控制)。治療類固醇、嚴重(血小板<20000或致命出血)輸血小板/IVIG;<b>慢性(>6~12月)無效才考慮脾切(非幼兒常規/非3歲前)</b>;禁aspirin、環境安全防外傷(床欄護墊)。</p>"},"7實體腫瘤":{"html":"<p><b>Wilms腫瘤(腎母細胞瘤)</b>:起源腎臟、無痛腹部腫塊、<u>勿觸診/按摩腹部(防擴散)</u>、可高血壓(腎素)、術後監測腎功能/血壓/輸出入量、轉移肺/肝(非腦)。<b>神經母細胞瘤</b>:腎上腺髓質、腹部腫塊過中線、監測兒茶酚胺、浣熊眼。</p><p><b>骨肉瘤</b>:青少年、長骨、<b>夜間疼痛加重</b>、病理性骨折。<b>視網膜母細胞瘤</b>:白色瞳孔反光(<b>貓眼反射</b>)。兒童腫瘤好發:白血病>腦瘤(膠質瘤)>淋巴瘤;骨肉瘤好發股骨遠端/脛骨近端(膝附近)。</p>"},"8化療副作用與護理輸血":{"html":"<p><b>化療藥毒性</b>:Vincristine→便秘/手腳麻、Cyclophosphamide→出血性膀胱炎(多喝水)、Cisplatin→腎/聽神經毒、MTX→口腔黏膜炎/肝毒。<b>外滲處理:①停止注射②空針反抽③局部敷藥④追蹤(4231)</b>。口腔黏膜炎軟質食物(非堅果)。</p><p><b>骨髓穿刺</b>嬰幼兒最常脛骨、大童腸骨脊。<b>造血幹細胞移植</b>:HLA吻合、約14~28天造血、急性GVHD多移植後100天內。<b>Port-A</b>完全植入皮下不限制同側手臂。輸血用生理食鹽水沖洗、溫血器≤37°C、勿加藥入血。<b>ANC=白血球×(seg%+band%)</b>。</p>"},"9癌症末期死亡與心理":{"html":"<p><b>兒童對死亡理解</b>:學齡前可逆/魔幻思考(以為懲罰)、學齡期漸理解不可逆、青少年成熟但覺自己不會年輕死。<b>瀕死</b>:末梢冰冷脈搏弱、呼吸不規則、括約肌鬆弛失禁、<b>聽覺最後消失</b>(非視力)。</p><p>護理:<b>誠實開放討論死亡</b>(勿隱瞞)、傾聽鼓勵表達情緒/需要、允許同學接觸減孤立。<b>化療禿髮可逆</b>(停藥數月再長出)、鼓勵表達、討論頭巾假髮、介紹同齡病友。學齡期住院最關心學業與同儕關係。</p>"},"10母嬰產科與其他借題":{"html":"<p><b>孕期血液</b>:血液稀釋致血紅素下降(生理性貧血)、纖維蛋白原/白血球增加;孕婦Hb<11+鐵蛋白<12=缺鐵性貧血。<b>海洋性貧血篩檢MCV<80</b>初篩→配偶也篩MCV→基因確認。<b>Rh不合</b>:產後72小時內注射Rhogam(抗D)避免激敏。</p><p><b>其他</b>:黴漿菌肺炎好發學齡兒/年輕成人、間質浸潤、群聚;細菌性肺炎最常肺炎鏈球菌;川崎氏症亞急性期<b>血小板升高</b>(冠狀動脈瘤風險)、IVIG降動脈瘤;CKD易高血鉀須<b>限鉀</b>;更年期HDL下降;產後凝血因子增加(高凝)。</p>"}};

let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c8_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
