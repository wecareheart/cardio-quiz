、『『『『勿『揉搓『注射部位(『防『染色/滲漏)』。 (1)「『『鐵劑『『與『『柑橘『(維生素C)『果汁『『同服『『促『吸收』」——正確;(2)『『勿『『與『『制酸劑『同服(『抑『吸收)』』,B錯;(3)『『排『『黑色『糞便『是『『正常(『勿『停藥)』』,C錯;(4)『『勿『『加入『『牛奶『同服(『抑『吸收)』』,D錯。本題為A。","options":{"A":"正確。鐵劑與柑橘類果汁同服促進吸收。","B":"錯。勿與制酸劑同服(抑吸收)。","C":"錯。排黑色糞便是正常(勿停藥)。","D":"錯。勿加入牛奶同服(抑吸收)。"},"sources":["Nelson《兒科學》IDA","維生素C"]}},"101110-N4-26":{"quick":"β型海洋性貧血(β-Thalassemia)患童敘述『錯誤』的是「出生後即出現明顯的、嚴重的溶血性貧血症狀」。","detail":{"background":"海洋性貧血(thalassemia,地中海貧血):『『體染色體『『隱性『遺傳』(『父母『皆『帶因『每胎『1/4『重症、1/2帶因、1/4正常;『α型『第16對、β型『第11對『基因『缺損)』;『重症β『『出生後『『約『3~6個月『漸『出現『溶血性『貧血(『非『出生即『嚴重)』、『『顱骨『變大『塌鼻『暴牙『顴骨『突出(『骨髓『增生)、體型矮瘦、肝脾腫大、膚色蒼白』;『治療『『終身『『定期『輸血『維持『Hb『>『9~10、『『『排鐵劑(deferoxamine,『防『血鐵『沉著;『皮下『夜間『注射、補『維生素C、尿『橘紅、約『2~3歲起『用)』、『根治『『骨髓/造血幹細胞『移植』。篩檢:『『MCV『『<『80(『偏低)『初篩→『基因『確認』;『夫妻『皆『帶因『須『產前『診斷』。鐮刀狀細胞貧血(sickle cell)亦『體染色體『隱性。 β型海洋性貧血:屬體染色體隱性遺傳、終身定期輸血維持Hb>10、長期輸血給排鐵劑防血鐵沉著皆正確。「『『出生後『『即『『出現『『明顯『嚴重『溶血』」錯誤——『重症β『『約『『出生『『3~6個月『後『『『漸『出現(『因『胎兒『血紅素HbF『此時『漸『被『HbA『取代『才『顯現)』,『『非『出生『即『嚴重』」。本題「錯誤」者為B。","options":{"A":"正確。屬體染色體隱性遺傳疾病。","B":"錯誤(本題答案)。重症β約出生後3~6個月才漸出現(非出生即嚴重)。","C":"正確。需終身定期輸血維持血色素>10。","D":"正確。長期輸血需給排鐵劑防血鐵質沉著。"},"sources":["Nelson《兒科學》β海洋性貧血","3~6個月"]}},"102030-N4-66":{"quick":"未經治療會出現顱骨變大、塌鼻、暴牙、顴骨突出面部表徵的血液疾患是「β型海洋性貧血」。","detail":{"background":"海洋性貧血(thalassemia,地中海貧血):『『體染色體『『隱性『遺傳』(『父母『皆『帶因『每胎『1/4『重症、1/2帶因、1/4正常;『α型『第16對、β型『第11對『基因『缺損)』;『重症β『『出生後『『約『3~6個月『漸『出現『溶血性『貧血(『非『出生即『嚴重)』、『『顱骨『變大『塌鼻『暴牙『顴骨『突出(『骨髓『增生)、體型矮瘦、肝脾腫大、膚色蒼白』;『治療『『終身『『定期『輸血『維持『Hb『>『9~10、『『『排鐵劑(deferoxamine,『防『血鐵『沉著;『皮下『夜間『注射、補『維生素C、尿『橘紅、約『2~3歲起『用)』、『根治『『骨髓/造血幹細胞『移植』。篩檢:『『MCV『『<『80(『偏低)『初篩→『基因『確認』;『夫妻『皆『帶因『須『產前『診斷』。鐮刀狀細胞貧血(sickle cell)亦『體染色體『隱性。 『重症『β型『海洋性貧血『『『未『治療』→『『骨髓『『代償性『增生』→『『『『顱骨『變大、『『塌鼻、『『暴牙、『『顴骨『突出(『海洋性『貧血『面容)』。本題為「β型海洋性貧血」(A);鐮狀細胞貧血(血管阻塞)、再生不良性貧血(全血球減少)、血友病(凝血)非此面部表徵。本題為A。","options":{"A":"正確。β型海洋性貧血未治療→骨髓增生致顱骨變大塌鼻暴牙。","B":"鐮狀細胞貧血是血管阻塞。","C":"再生不良性貧血是全血球減少。","D":"血友病是凝血障礙。"},"sources":["Nelson《兒科學》海洋性貧血","面容"]}},"102110-N4-6":{"quick":"父母皆α型地中海貧血帶因者,下一胎也為α型帶因者的機率是「1/2」。","detail":{"background":"海洋性貧血(thalassemia,地中海貧血):『『體染色體『『隱性『遺傳』(『父母『皆『 缺損。","C":"正確。β型是第11對染色體基因缺損。","D":"正確。根治β型唯一方法是骨髓移植。"},"sources":["Nelson《兒科學》海洋性貧血","隱性"]}},"106110-N4-67":{"quick":"7歲重度型β-海洋性貧血定期輸血外觀視診『錯誤』的是「腹部腫大」(本題B)?——本題答B。","detail":{"background":"海洋性貧血(thalassemia,地中海貧血):『『體染色體『『隱性『遺傳』(『父母『皆『帶因『每胎『1/4『重症、1/2帶因、1/4正常;『α型『第16對、β型『第11對『基因『缺損)』;『重症β『『出生後『『約『3~6個月『漸『出現『溶血性『貧血(『非『出生即『嚴重)』、『『顱骨『變大『塌鼻『暴牙『顴骨『突出(『骨髓『增生)、體型矮瘦、肝脾腫大、膚色蒼白』;『治療『『終身『『定期『輸血『維持『Hb『>『9~10、『『『排鐵劑(deferoxamine,『防『血鐵『沉著;『皮下『夜間『注射、補『維生素C、尿『橘紅、約『2~3歲起『用)』、『根治『『骨髓/造血幹細胞『移植』。篩檢:『『MCV『『<『80(『偏低)『初篩→『基因『確認』;『夫妻『皆『帶因『須『產前『診斷』。鐮刀狀細胞貧血(sickle cell)亦『體染色體『隱性。 本題問『錯誤』,答案B。重度β海洋性貧血外觀:體型矮瘦、膚色蒼白、塌鼻頭大(顱骨增生)、肝脾腫大(腹部腫大)。依官方本題『錯誤』為B:『『「膚色『蒼白」『的『敘述『被『判『錯誤』——『或『因『『定期『『輸血『後『『膚色『『不一定『『蒼白(『且『『長期『輸血『鐵『沉著『致『『膚色『『『『偏『『黑/古銅』)』。本題「錯誤」者為B(膚色描述)。","options":{"A":"視診可見體型矮瘦。","B":"錯誤(本題答案)。長期輸血鐵沉著膚色偏黑/古銅(非單純蒼白)。","C":"視診塌鼻、頭大(顱骨增生)。","D":"視診腹部腫大(肝脾腫大)。"},"sources":["Nelson《兒科學》海洋性貧血","膚色"]}},"107110-N4-46":{"quick":"鐮狀細胞貧血(sickle cell anemia)病童『不會』出現的臨床表徵是「顱骨變大、顴骨隆起」。","detail":{"background":"海洋性貧血(thalassemia,地中海貧血):『『體染色體『『隱性『遺傳』(『父母『皆『帶因『每胎『1/4『重症、1/2帶因、1/4正常;『α型『第16對、β型『第11對『基因『缺損)』;『重症β『『出生後『『約『3~6個月『漸『出現『溶血性『貧血(『非『出生即『嚴重)』、『『顱骨『變大『塌鼻『暴牙『顴骨『突出(『骨髓『增生)、體型矮瘦、肝脾腫大、膚色蒼白』;『治療『『終身『『定期『輸血『維持『Hb『>『9~10、『『『排鐵劑(deferoxamine,『防『血鐵『沉著;『皮下『夜間『注射、補『維生素C、尿『橘紅、約『2~3歲起『用)』、『根治『『骨髓/造血幹細胞『移植』。篩檢:『『MCV『『<『80(『偏低)『初篩→『基因『確認』;『夫妻『皆『帶因『須『產前『診斷』。鐮刀狀細胞貧血(sickle cell)亦『體染色體『隱性。 鐮狀細胞貧血:末端肢體腫脹疼痛(血管阻塞)、視網膜病變失明、肝脾腫大皆會出現。「『『顱骨『變大、『顴骨『隆起』」『不會』出現於鐮狀細胞貧血——『『『顱骨『變大『顴骨『突出(『骨髓『增生『面容)『是『『『『『海洋性『貧血(thalassemia)』的『表現(『非『鐮狀細胞)』」。本題不會出現者為A。","options":{"A":"本題答案(不會)。顱骨變大顴骨隆起是海洋性貧血(非鐮狀細胞)。","B":"會。末端肢體腫脹與疼痛(血管阻塞)。","C":"會。視網膜病變致失明。","D":"會。肝、脾腫大。"},"sources":["Nelson《兒科學》鐮狀細胞","顱骨"]}},"109110-N4-66":{"quick":"體染色體隱性遺傳疾病『錯誤』的是「G-6-PD缺乏症」。","detail":{"background":"海洋性貧血(thalassemia,地中海貧血):『『體染色體『『隱性『遺傳』(『父母『皆『帶因『每胎『1/4『重症、1/2帶因、1/4正常;『α型『第16對、β型『第11對『基因『缺損)』;『重症β『『出生後『『約『3~6個月『漸『出現『溶血性『貧血(『非『出生即『嚴重)』、『『顱骨『變大『塌鼻『暴牙『顴骨『突出(『骨髓『增生)、體型矮瘦、肝脾腫大、膚色蒼白』;『治療『『終身『『定期『輸血『維持『Hb『>『9~10、『『『排鐵劑(deferoxamine,『防『血鐵『沉著;『皮下『夜間『注射、補『維生素C、尿『橘紅、約『2~3歲起『用)』、『根治『『骨髓/造血幹細胞『移植』。篩檢:『『MCV『『<『80(『偏低)『初篩→『基因『確認』;『夫妻『皆『帶因『須『產前『診斷』。鐮刀狀細胞貧血(sickle cell)亦『體染色體『隱性。 『『體染色體『隱性』遺傳:『『原發性『再生不良性貧血(Fanconi)、『『海洋性貧血、『『鐮狀細胞『貧血』皆是。「『『G-6-PD『缺乏症』」『錯誤』(非體染色體隱性)——『『『G-6-PD『缺乏症(蠶豆症)『是『『『『『性聯(X染色體)『『隱性』遺傳(『非『體染色體)』」。本題「錯誤」者為C。","options":{"A":"是體染色體隱性。原發性再生不良性貧血(Fanconi)。","B":"是體染色體隱性。海洋性貧血。","C":"錯誤(本題答案)。G-6-PD缺乏症是『性聯』隱性(非體染色體)。","D":"是體染色體隱性。鐮狀細胞貧血。"},"sources":["Nelson《兒科學》遺傳","G-6-PD性聯"]}},"112110-N4-67":{"quick":"血紅素4.1須輸血治療正確的是「輸血過程中使用溫血器,但溫度不可高於37°C」。","detail":{"background":"輸血護理:(1)『『過敏『反應『『『『立即『『『停止『輸血(『非『血袋『加『抗組織胺『滴注)』』,A錯;(2)『『注射部位『『灼熱『『可能『『滲漏/靜脈炎『須『評估(『非『立即『改『5%『葡萄糖;『輸血『管『不可『接『葡萄糖,『會『溶血)』』,B錯;(3)『急性『溶血『反應『『『多『『『立即/數分鐘內(『非『2小時)』』,C錯;(4)「『『使用『『溫血器『『溫度『『『不可『『高於『『37°C』(『過熱『致『溶血)」——正確。本題為D。","options":{"A":"錯。過敏反應立即停止輸血(非血袋加藥)。","B":"錯。輸血管不可接葡萄糖(會溶血)。","C":"錯。急性溶血反應多立即出現(非2小時)。","D":"正確。溫血器溫度不可高於37°C(防溶血)。"},"sources":["Nelson《兒科學》輸血","溫血器"]}},"114030-N4-41":{"quick":"海洋性貧血兒童使用排鐵劑(deferoxamine)『錯誤』的是「適應的年齡為5~7歲,因遵從性會更好」。","detail":{"background":"海洋性貧血(thalassemia,地中海貧血):『『體染色體『『隱性『遺傳』(『父母『皆『帶因『每胎『1/4『重症、1/2帶因、1/4正常;『α型『第16對、β型『第11對『基因『缺損)』;『重症β『『出生後『『約『3~6個月『漸『出現『溶血性『貧血(『非『出生即『嚴重)』、『『顱骨『變大『塌鼻『暴牙『顴骨『突出(『骨髓『增生)、體型矮瘦、肝脾腫大、膚色蒼白』;『治療『『終身『『定期『輸血『維持『Hb『>『9~10、『『『排鐵劑(deferoxamine,『防『血鐵『沉著;『皮下『夜間『注射、補『維生素C、尿『橘紅、約『2~3歲起『用)』、『根治『『骨髓/造血幹細胞『移植』。篩檢:『『MCV『『<『80(『偏低)『初篩→『基因『確認』;『夫妻『皆『帶因『須『產前『診斷』。鐮刀狀細胞貧血(sickle cell)亦『體染色體『隱性。 排鐵劑(deferoxamine):排鐵過程尿液橘紅、補充維生素C、皮下注射晚間執行皆正確。「『『適應『年齡『『5~7歲』」錯誤——『『排鐵劑『『『約『『『2~3歲』(『或『輸血『約『『10~20次/鐵蛋白『高『時)『『『即『『開始』(『早期『開始『防『鐵『沉著『器官『損傷;『非『5~7歲『才『因『遵從性)』」。本題「錯誤」者為B。","options":{"A":"正確。排鐵過程尿液呈紅色或橘紅色。","B":"錯誤(本題答案)。約2~3歲即開始排鐵(非5~7歲)。","C":"正確。排鐵過程需補充維他命C。","D":"正確。可皮下注射,宜在晚間執行。"},"sources":["Nelson《兒科學》排鐵劑","早期"]}},"114100-N4-49":{"quick":"β型海洋性貧血(體染色體隱性),父母皆帶因,下一代罹患海洋性貧血的機率是「四分之一」。","detail":{"background":"海洋性貧血(thalassemia,地中海貧血):『『體染色體『『隱性『遺傳』(『父母『皆『帶因『每胎『1/4『重症、1/2帶因、1/4正常;『α型『第16對、β型『第11對『基因『缺損)』;『重症β『『出生後『『約『3~6個月『漸『出現『溶血性『貧血(『非『出生即『嚴重)』、『『顱骨『變大『塌鼻『暴牙『顴骨『突出(『骨髓『增生)、體型矮瘦、肝脾腫大、膚色蒼白』;『治療『『終身『『定期『輸血『維持『Hb『>『9~10、『『『排鐵劑(deferoxamine,『防『血鐵『沉著;『皮下『夜間『注射、補『維生素C、尿『橘紅、約『2~3歲起『用)』、『根治『『骨髓/造血幹細胞『移植』。篩檢:『『MCV『『<『80(『偏低)『初篩→『基因『確認』;『夫妻『皆『帶因『須『產前『診斷』。鐮刀狀細胞貧血(sickle cell)亦『體染色體『隱性。 『『體染色體『隱性』:『『父母『皆『帶因(Aa × Aa)』→『『子代『『『1/4(『四分之一)『『『重症『罹病(aa)、『1/2『帶因、『1/4『正常』。本題下一代罹病機率為「四分之一」(B)。","options":{"A":"二分之一是帶因機率(非罹病)。","B":"正確。父母皆帶因,下一代罹病機率1/4。","C":"四分之三不對。","D":"百分之百不對。"},"sources":["Nelson《兒科學》海洋性貧血","1/4"]}},"102110-N4-64":{"quick":"『不是』再生不良性貧血(aplastic anemia)常用治療藥劑的是「immunoglobulin」。","detail":{"background":"再生不良性貧血(aplastic anemia):『骨髓『造血『衰竭』→『『全血球『減少(『紅/白/血小板『皆『降)』;表現『貧血(血容積<30%心跳快呼吸喘)、『感染(嗜中性<1500)、『出血(血小板<50000瘀斑)』;『治療『『免疫抑制(『抗淋巴球蛋白ALG/ATG、cyclosporine)、testosterone、骨髓移植』;『『『非『immunoglobulin』;護理『保護隔離防感染、避免外傷出血、避免aspirin』。網狀細胞計數(reticulocyte):『反映『『骨髓『『製造『紅血球『的『『速率』。鐮狀細胞貧血(sickle cell):『體染色體『隱性、HbS『致『紅血球『鐮『變『血管『阻塞『疼痛危機』;『止痛『嗎啡(『勿『aspirin)、『熱敷(非冷)、『多『水化(非限水)、舒適臥位』。生理性貧血:嬰兒2~3個月HbF降、骨髓未追上,屬正常。 再生不良性貧血『常用『藥劑』:『『cyclosporine(免疫抑制)、『testosterone(刺激造血)、『antilymphocyte globulin(ALG/ATG免疫抑制)』。「『『immunoglobulin(免疫球蛋白)』」『不是』常用治療——『『免疫球蛋白『『用於『『ITP/免疫『缺乏『等,『『非『『再生不良性貧血『的『常用『治療』」。本題不是者為D。","options":{"A":"是。cyclosporine(免疫抑制)。","B":"是。testosterone(刺激造血)。","C":"是。antilymphocyte globulin(ALG免疫抑制)。","D":"本題答案(非)。immunoglobulin非再生不良性貧血常用治療。"},"sources":["Nelson《兒科學》再生不良性貧血","藥劑"]}},"102110-N4-65":{"quick":"2個月生理性貧血開立網狀細胞計數(reticulocyte)的目的是測量「骨髓製造紅血球的速率」。","detail":{"background":"再生不良性貧血(aplastic anemia):『骨髓『造血『衰竭』→『『全血球『減少(『紅/白/血小板『皆『降)』;表現『貧血(血容積<30%心跳快呼吸喘)、『感染(嗜中性<1500)、『出血(血小板<50000瘀斑)』;『治療『『免疫抑制(『抗淋巴球蛋白ALG/ATG、cyclosporine)、testosterone、骨髓移植』;『『『非『immunoglobulin』;護理『保護隔離防感染、避免外傷出血、避免aspirin』。網狀細胞計數(reticulocyte):『反映『『骨髓『『製造『紅血球『的『『速率』。鐮狀細胞貧血(sickle cell):『體染色體『隱性、HbS『致『紅血球『鐮『變『血管『阻塞『疼痛危機』;『止痛『嗎啡(『勿『aspirin)、『熱敷(非冷)、『多『水化(非限水)、舒適臥位』。生理性貧血:嬰兒2~3個月HbF降、骨髓未追上,屬正常。 『網狀細胞(reticulocyte)』是『『『未成熟『紅血球』,『『其『『計數『『反映『『『骨髓『『『製造『『紅血球『的『『『速率(『升『=『造血『活躍;『降『=『骨髓『製造『不足)』。本題目的為「測量骨髓製造紅血球速率」(B);紅血球數目(CBC)、全血球計數、紅血球內血紅素濃度(MCHC)非網狀細胞計數目的。本題為B。","options":{"A":"紅血球數目是RBC count(非網狀細胞)。","B":"正確。網狀細胞計數反映骨髓製造紅血球的速率。","C":"全血球計數是CBC。","D":"紅血球血紅素濃度是MCHC。"},"sources":["Nelson《兒科學》網狀細胞","造血速率"]}},"104030-N4-66":{"quick":"鐮狀細胞危機(sickle cell crisis)血管阻塞疼痛護理『錯誤』的是「使用局部冷敷達到止痛」。","detail":{"background":"再生不良性貧血(aplastic anemia):『骨髓『造血『衰竭』→『『全血球『減少(『紅/白/血小板『皆『降)』;表現『貧血(血容積<30%心跳快呼吸喘)、『感染(嗜中性<1500)、『出血(血小板<50000瘀斑)』;『治療『『免疫抑制(『抗淋巴球蛋白ALG/ATG、cyclosporine)、testosterone、骨髓移植』;『『『非『immunoglobulin』;護理『保護隔離防感染、避免外傷出血、避免aspirin』。網狀細胞計數(reticulocyte):『反映『『骨髓『『製造『紅血球『的『『速率』。鐮狀細胞貧血(sickle cell):『體染色體『隱性、HbS『致『紅血球『鐮『變『血管『阻塞『疼痛危機』;『止痛『嗎啡(『勿『aspirin)、『熱敷(非冷)、『多『水化(非限水)、舒適臥位』。生理性貧血:嬰兒2~3個月HbF降、骨髓未追上,屬正常。 鐮狀細胞危機疼痛護理:嚴重疼痛用嗎啡、放鬆轉移注意力、舒適臥位皆正確。「『『使用『『局部『『『冷』敷『止痛』」錯誤——『鐮狀細胞『危機『『『勿『『冷敷』(『『冷『致『『血管『『『收縮『『『加重『『血管『阻塞『與『鐮變)』;『應『『『熱敷』」。本題「錯誤」者為C。","options":{"A":"正確。嚴重疼痛可用嗎啡緩解。","B":"正確。教導放鬆身心轉移注意力。","C":"錯誤(本題答案)。勿冷敷(冷致血管收縮加重阻塞),應熱敷。","D":"正確。提供舒適臥位緩解疼痛。"},"sources":["Nelson《兒科學》鐮狀細胞","勿冷敷"]}},"105090-N4-64":{"quick":"再生不良性貧血臨床症狀與實驗室檢查『錯誤』的是「胎兒紅血球降低時,易出現進行性的溶血性貧血」。","detail":{"background":"再生不良性貧血(aplastic anemia):『骨髓『造血『衰竭』→『『全血球『減少(『紅/白/血小板『皆『降)』;表現『貧血(血容積<30%心跳快呼吸喘)、『感染(嗜中性<1500)、『出血(血小板<50000瘀斑)』;『治療『『免疫抑制(『抗淋巴球蛋白ALG/ATG、cyclosporine)、testosterone、骨髓移植』;『『『非『immunoglobulin』;護理『保護隔離防感染、避免外傷出血、避免aspirin』。網狀細胞計數(reticulocyte):『反映『『骨髓『『製造『紅血球『的『『速率』。鐮狀細胞貧血(sickle cell):『體染色體『隱性、HbS『致『紅血球『鐮『變『血管『阻塞『疼痛危機』;『止痛『嗎啡(『勿『aspirin)、『熱敷(非冷)、『多『水化(非限水)、舒適臥位』。生理性貧血:嬰兒2~3個月HbF降、骨髓未追上,屬正常。 再生不良性貧血:血容積<30%心跳快呼吸急促、嗜中性<1500易感染、血小板<50000易瘀斑出血皆正確。「『『胎兒『紅血球『降低『『進行性『『溶血性『貧血』」錯誤——『『『再生不良性『貧血『是『『『『骨髓『『『造血『『衰竭(『『製造『不足)』,『『『非『『『溶血(『紅血球『破壞;『溶血『性『貧血『是『另一類『如『海洋性/鐮狀)』」。本題「錯誤」者為D。","options":{"A":"正確。血容積<30%會心跳加快、呼吸急促。","B":"正確。嗜中性<1500易細菌感染。","C":"正確。血小板<50000易瘀斑及出血。","D":"錯誤(本題答案)。再生不良性是骨髓造血衰竭(非溶血性貧血)。"},"sources":["Nelson《兒科學》再生不良性貧血","造血衰竭"]}},"110030-N4-68":{"quick":"16歲再生不良性貧血用ALG及cyclosporin治療護理較適當的是「發燒時,避免使用aspirin,以免延長出血時間」。","detail":{"background":"再生不良性貧血(aplastic anemia):『骨髓『造血『衰竭』→『『全血球『減少(『紅/白/血小板『皆『降)』;表現『貧血(血容積<30%心跳快呼吸喘)、『感染(嗜中性<1500)、『出血(血小板<50000瘀斑)』;『治療『『免疫抑制(『抗淋巴球蛋白ALG/ATG、cyclosporine)、testosterone、骨髓移植』;『『『非『immunoglobulin』;護理『保護隔離防感染、避免外傷出血、避免aspirin』。網狀細胞計數(reticulocyte):『反映『『骨髓『『製造『紅血球『的『『速率』。鐮狀細胞貧血(sickle cell):『體染色體『隱性、HbS『致『紅血球『鐮『變『血管『阻塞『疼痛危機』;『止痛『嗎啡(『勿『aspirin)、『熱敷(非冷)、『多『水化(非限水)、舒適臥位』。生理性貧血:嬰兒2~3個月HbF降、骨髓未追上,屬正常。 (1)『『食慾不振『『『勿『『選『『生菜沙拉(『『生食『『感染『風險;『免疫『低下『須『『低微生物『餐)』』,A錯;(2)『『青春期『『『應『『『告知『藥物『副作用(『尊重/準備;『非『隱瞞)』』,B錯;(3)『『『避免『『社交『『隔離『但『『『免疫『低下『『須『『限制『『探訪(『安排『同學『探訪『增『感染『風險)』』,C欠妥;(4)「『『發燒『『避免『『aspirin『『免『延長『出血『時間』(血小板『低)」——正確。本題為D。","options":{"A":"錯。勿選生菜沙拉(生食感染風險,須低微生物餐)。","B":"錯。應告知藥物副作用(非隱瞞)。","C":"免疫低下須限制探訪(非鼓勵同學探訪)。","D":"正確。發燒避免aspirin(免延長出血時間)。"},"sources":["Nelson《兒科學》再生不良性貧血","aspirin"]}},"110110-N4-68":{"quick":"鐮狀細胞貧血敘述『錯誤』的是「疼痛時可用Aspirin止痛」。","detail":{"background":"再生不良性貧血(aplastic anemia):『骨髓『造血『衰竭』→『『全血球『減少(『紅/白/血小板『皆『降)』;表現『貧血(血容積<30%心跳快呼吸喘)、『感染(嗜中性<1500)、『出血(血小板<50000瘀斑)』;『治療『『免疫抑制(『抗淋巴球蛋白ALG/ATG、cyclosporine)、testosterone、骨髓移植』;『『『非『immunoglobulin』;護理『保護隔離防感染、避免外傷出血、避免aspirin』。網狀細胞計數(reticulocyte):『反映『『骨髓『『製造『紅血球『的『『速率』。鐮狀細胞貧血(sickle cell):『體染色體『隱性、HbS『致『紅血球『鐮『變『血管『阻塞『疼痛危機』;『止痛『嗎啡(『勿『aspirin)、『熱敷(非冷)、『多『水化(非限水)、舒適臥位』。生理性貧血:嬰兒2~3個月HbF降、骨髓未追上,屬正常。 鐮狀細胞貧血:紅血球變形呈鐮刀狀、HbS致變形、體染色體隱性遺傳皆正確。「『『疼痛『時『『用『『『Aspirin『止痛』」錯誤——『鐮狀細胞『疼痛『『『勿『『aspirin(『『aspirin『『酸化『+『影響『血小板,『加重『鐮變/出血)』;『『用『『『嗎啡『等』」。本題「錯誤」者為C。","options":{"A":"正確。紅血球變形呈鐮刀狀。","B":"正確。HbS造成紅血球變形。","C":"錯誤(本題答案)。疼痛勿用Aspirin(加重鐮變/出血),用嗎啡。","D":"正確。經體染色體隱性遺傳。"},"sources":["Nelson《兒科學》鐮狀細胞","勿aspirin"]}},"114170-N4-42":{"quick":"8歲再生不良性貧血(全血球下降)護理最適當的是「避免給予粗糙、堅硬的食物,以防口腔黏膜受損」。","detail":{"background":"再生不良性貧血(aplastic anemia):『骨髓『造血『衰竭』→『『全血球『減少(『紅/白/血小板『皆『降)』;表現『貧血(血容積<30%心跳快呼吸喘)、『感染(嗜中性<1500)、『出血(血小板<50000瘀斑)』;『治療『『免疫抑制(『抗淋巴球蛋白ALG/ATG、cyclosporine)、testosterone、骨髓移植』;『『『非『immunoglobulin』;護理『保護隔離防感染、避免外傷出血、避免aspirin』。網狀細胞計數(reticulocyte):『反映『『骨髓『『製造『紅血球『的『『速率』。鐮狀細胞貧血(sickle cell):『體染色體『隱性、HbS『致『紅血球『鐮『變『血管『阻塞『疼痛危機』;『止痛『嗎啡(『勿『aspirin)、『熱敷(非冷)、『多『水化(非限水)、舒適臥位』。生理性貧血:嬰兒2~3個月HbF降、骨髓未追上,屬正常。 (1)『『『避免『『戶外『活動(『血小板『低『易『出血、『白血球『低『易『感染;『非『鼓勵)』』,A錯;(2)「『『避免『『粗糙『堅硬『食物『『防『『口腔『黏膜『受損『出血』(血小板『低)」——正確;(3)『『『限制『『探訪(『免疫『低下『防『感染;『非『鼓勵『同學『探訪)』』,C欠妥;(4)『『發燒『『勿『『aspirin(『延長『出血;『用『acetaminophen)』』,D錯。本題為B。","options":{"A":"錯。避免戶外活動(血小板低易出血)。","B":"正確。避免粗糙堅硬食物防口腔黏膜受損出血。","C":"免疫低下須限制探訪(非鼓勵)。","D":"錯。發燒勿用Aspirin(延長出血)。"},"sources":["Nelson《兒科學》再生不良性貧血","口腔黏膜"]}},"102030-N4-73":{"quick":"血友病診斷性檢查正確的是「部分凝血酶原(PTT)時間延長」。","detail":{"background":"血友病(hemophilia):『『性聯(X)『隱性『遺傳(『男性『發病)』;『A型『缺『『第VIII『凝血因子、B型『缺『第IX』;『『凝血『時間(PTT/aPTT)『『延長,『『出血『時間『『正常、血小板『正常、PT『正常』;『表現『『深部『組織/關節『出血(『血腫)、瘀血、刷牙『牙齦『出血、輕傷『流血『不止』;『『關節『血腫『最常『『『膝關節』(其次『踝/肘;『少『肩/腕)』。處置:『『『補充『『凝血『因子、『關節『出血『『『RICE(休息Rest、冰敷Ice局部冷敷血管收縮、加壓Compression、抬高Elevation至心臟以上)、『『勿『『石膏『固定/勿『熱敷、『『勿『aspirin、軟毛牙刷、適度『活動(『游泳)強化『關節『肌肉、避『碰撞『運動(籃球/網球/跳馬)』。 血友病檢查:(1)『血小板『『『正常(『非『減少)』』,A錯;(2)『出血『時間『『『正常(『非『延長;『出血時間『反映『血小板)』』,B錯;(3)「『『部分『凝血酶原『時間(PTT/aPTT)『『『延長』(『內在『凝血『路徑『因子『VIII/IX『缺)」——正確;(4)『凝血酶原(PT)『『『正常(『外在『路徑;『非『延長)』』,D錯。本題為C。","options":{"A":"錯。血小板數目正常(非減少)。","B":"錯。出血時間正常(非延長)。","C":"正確。PTT時間延長(內在凝血路徑因子缺)。","D":"錯。PT正常(非延長)。"},"sources":["Nelson《兒科學》血友病","PTT"]}},"104030-N4-67":{"quick":"血友病關節出血緊急處理『錯誤』的是「避免直接加壓,以石膏固定患肢」。","detail":{"background":"血友病(hemophilia):『『性聯(X)『隱性『遺傳(『男性『發病)』;『A型『缺『『第VIII『凝血因子、B型『缺『第IX』;『『凝血『時間(PTT/aPTT)『『延長,『『出血『時間『『正常、血小板『正常、PT『正常』;『表現『『深部『組織/關節『出血(『血腫)、瘀血、刷牙『牙齦『出血、輕傷『流血『不止』;『『關節『血腫『最常『『『膝關節』(其次『踝/肘;『少『肩/腕)』。處置:『『『補充『『凝血『因子、『關節『出血『『『RICE(休息Rest、冰敷Ice局部冷敷血管收縮、加壓Compression、抬高Elevation至心臟以上)、『『勿『『石膏『固定/勿『熱敷、『『勿『aspirin、軟毛牙刷、適度『活動(『游泳)強化『關節『肌肉、避『碰撞『運動(籃球/網球/跳馬)』。 血友病關節出血:依醫囑注射凝血因子、局部冷敷血管收縮、抬高出血部位至心臟以上皆正確。「『『避免『直接『加壓,『『以『『石膏『固定』」錯誤——『關節『出血『『『應『『『加壓(Compression)『止血』,『『且『『『不需『『石膏『固定』(『RICE『原則:『休息/冰/加壓/抬高;『石膏『不利『後續『活動『與『觀察)』」。本題「錯誤」者為B。","options":{"A":"正確。依醫囑注射凝血因子。","B":"錯誤(本題答案)。應加壓止血(非避免加壓),且不需石膏固定。","C":"正確。局部冷敷促血管收縮。","D":"正確。抬高出血部位至心臟高度以上。"},"sources":["Nelson《兒科學》血友病","加壓"]}},"105090-N4-49":{"quick":"血友病病童關節血腫『較少』出現的部位是「肩關節」。","detail":{"background":"血友病(hemophilia):『『性聯(X)『隱性『遺傳(『男性『發病)』;『A型『缺『『第VIII『凝血因子、B型『缺『第IX』;『『凝血『時間(PTT/aPTT)『『延長,『『出血『時間『『正常、血小板『正常、PT『正常』;『表現『『深部『組織/關節『出血(『血腫)、瘀血、刷牙『牙齦『出血、輕傷『流血『不止』;『『關節『血腫『最常『『『膝關節』(其次『踝/肘;『少『肩/腕)』。處置:『『『補充『『凝血『因子、『關節『出血『『『RICE(休息Rest、冰敷Ice局部冷敷血管收縮、加壓Compression、抬高Elevation至心臟以上)、『『勿『『石膏『固定/勿『熱敷、『『勿『aspirin、軟毛牙刷、適度『活動(『游泳)強化『關節『肌肉、避『碰撞『運動(籃球/網球/跳馬)』。 血友病『關節『血腫』『最常『『『負重/活動『大『的『關節』:『『『膝關節(最常)、『踝、『肘』;『『『肩關節『『『『較『『『少』(『非『主要『負重/活動『關節)』。本題較少出現者為「肩關節」(D)。","options":{"A":"膝關節最常出現。","B":"踝關節常出現。","C":"肘關節常出現。","D":"正確。肩關節較少出現(非主要負重關節)。"},"sources":["Nelson《兒科學》血友病","關節"]}},"106030-N4-66":{"quick":"血友病病童運動建議正確的是「游泳」。","detail":{"background":"血友病(hemophilia):『『性聯(X)『隱性『遺傳(『男性『發病)』;『A型『缺『『第VIII『凝血因子、B型『缺『第IX』;『『凝血『時間(PTT/aPTT)『『延長,『『出血『時間『『正常、血小板『正常、PT『正常』;『表現『『深部『組織/關節『出血(『血腫)、瘀血、刷牙『牙齦『出血、輕傷『流血『不止』;『『關節『血腫『最常『『『膝關節』(其次『踝/肘;『少『肩/腕)』。處置:『『『補充『『凝血『因子、『關節『出血『『『RICE(休息Rest、冰敷Ice局部冷敷血管收縮、加壓Compression、抬高Elevation至心臟以上)、『『勿『『石膏『固定/勿『熱敷、『『勿『aspirin、軟毛牙刷、適度『活動(『游泳)強化『關節『肌肉、避『碰撞『運動(籃球/網球/跳馬)』。 血友病『運動』:『『『選『『『『非『碰撞性『運動』如『『『游泳(『水中『浮力『減『關節『負荷、又『強化『肌肉)』、健走、騎固定式腳踏車』。本題正確為「游泳」(C);籃球、網球、跳馬皆『『碰撞/衝擊『大』易『出血,不宜。本題為C。","options":{"A":"籃球碰撞大易出血,不宜。","B":"網球衝擊大,不宜。","C":"正確。游泳是非碰撞性運動,適合血友病。","D":"跳馬衝擊大,不宜。"},"sources":["Nelson《兒科學》血友病","游泳"]}},"106111-N4-65":{"quick":"A型血友病(缺第八凝血因子)凝血功能檢查正確的是「凝血時間延長,出血時間正常」。","detail":{"background":"血友病(hemophilia):『『性聯(X)『隱性『遺傳(『男性『發病)』;『A型『缺『『第VIII『凝血因子、B型『缺『第IX』;『『凝血『時間(PTT/aPTT)『『延長,『『出血『時間『『正常、血小板『正常、PT『正常』;『表現『『深部『組織/關節『出血(『血腫)、瘀血、刷牙『牙齦『出血、輕傷『流血『不止』;『『關節『血腫『最常『『『膝關節』(其次『踝/肘;『少『肩/腕)』。處置:『『『補充『『凝血『因子、『關節『出血『『『RICE(休息Rest、冰敷Ice局部冷敷血管收縮、加壓Compression、抬高Elevation至心臟以上)、『『勿『『石膏『固定/勿『熱敷、『『勿『aspirin、軟毛牙刷、適度『活動(『游泳)強化『關節『肌肉、避『碰撞『運動(籃球/網球/跳馬)』。 A型血友病(缺第VIII因子):『『『凝血『時間(PTT/凝血)『『『延長』(『內在『路徑『因子『缺)、『『『出血『時間『『『正常』(『血小板『與『血管『功能『正常)』。本題正確為「凝血時間延長、出血時間正常」(A)。","options":{"A":"正確。凝血時間延長、出血時間正常。","B":"錯。出血時間正常(非延長)。","C":"錯。出血時間正常(非延長)。","D":"錯。凝血時間延長(非正常)。"},"sources":["Nelson《兒科學》血友病","凝血時間"]}},"106111-N4-67":{"quick":"屬於體染色體隱性遺傳的血液疾病是「①鐮刀狀細胞貧血+④β型海洋性貧血(即14)」。","detail":{"background":"血液疾病遺傳:『①『『鐮刀狀細胞『貧血『=『『體染色體『隱性』;『④『『β型『海洋性『貧血『=『『體染色體『隱性』;『②『『缺鐵性『貧血『『『非『遺傳(『鐵『不足)』;『③『『A型『血友病『=『『『性聯(X)『隱性(『非『體染色體)』。本題體染色體隱性者為「①④(14)」(B)。","options":{"A":"12含②(缺鐵性貧血非遺傳)。","B":"正確。①鐮刀狀細胞貧血+④β海洋性貧血(14)。","C":"23含② 網球/跳馬)』。 血友病『關節『血腫』『『最常『『『發生『『『膝關節』(『負重/活動『最大『的『關節)』。本題為「膝關節」(D);腕、肘、踝雖也可但膝關節最常。本題為D。","options":{"A":"腕關節非最常。","B":"肘關節常但非最常。","C":"踝關節常但非最常。","D":"正確。血友病關節血腫最常發生於膝關節。"},"sources":["Nelson《兒科學》血友病","膝關節"]}},"114100-N4-43":{"quick":"3歲血友病臨床表徵正確的是「皮膚出現瘀血,刷牙時牙齦出血」。","detail":{"background":"血友病(hemophilia):『『性聯(X)『隱性『遺傳(『男性『發病)』;『A型『缺『『第VIII『凝血因子、B型『缺『第IX』;『『凝血『時間(PTT/aPTT)『『延長,『『出血『時間『『正常、血小板『正常、PT『正常』;『表現『『深部『組織/關節『出血(『血腫)、瘀血、刷牙『牙齦『出血、輕傷『流血『不止』;『『關節『血腫『最常『『『膝關節』(其次『踝/肘;『少『肩/腕)』。處置:『『『補充『『凝血『因子、『關節『出血『『『RICE(休息Rest、冰敷Ice局部冷敷血管收縮、加壓Compression、抬高Elevation至心臟以上)、『『勿『『石膏『固定/勿『熱敷、『『勿『aspirin、軟毛牙刷、適度『活動(『游泳)強化『關節『肌肉、避『碰撞『運動(籃球/網球/跳馬)』。 血友病臨床:『『『皮膚『『瘀血/瘀斑、『『刷牙『『牙齦『出血、『『關節『血腫、『輕傷『流血『不止、深部『組織『出血』。本題正確為「皮膚瘀血、刷牙牙齦出血」(A);臉色蒼白呼吸快昏倒(B是急性貧血/出血休克)、易疲倦食慾不振易感染(C是白血病/再障)、黃疸肝脾腫大(D是溶血)非血友病典型。本題為A。","options":{"A":"正確。皮膚瘀血、刷牙牙齦出血(凝血障礙)。","B":"臉色蒼白呼吸快昏倒是急性失血/貧血。","C":"易疲倦食慾不振易感染是白血病/再障。","D":"黃疸肝脾腫大是溶血。"},"sources":["Nelson《兒科學》血友病","瘀血"]}},"104100-N4-66":{"quick":"2歲ITP醫療處置『錯誤』的是「血小板低下持續6個月且使用類固醇無效時,即需施行脾臟切除術」(本題D)?——本題答D。","detail":{"background":"特發性血小板減少紫斑症(ITP):『『『自體免疫『『抗體『『破壞『血小板』→『『血小板『『減少『『多處『紫斑/瘀斑/出血』;『多『『病毒『感染『後『發生、『『『多『『自限『可『自癒(『非『僅能『長期『藥物『控制)』;『治療『『類固醇(阻斷『自體『抗體)、『嚴重(血小板『<『20000『或『致命『出血)『輸『血小板/IVIG』、『『慢性『>『『6~12個月『無效『才『考慮『『脾臟『切除(『非『3歲前『常規)』;『護理『『禁『aspirin(『抑『血小板『凝集)、『環境『安全『防『外傷『出血(『床欄『護墊)、血小板『<『20000『觀察『自發性『出血』。 本題問『錯誤』,答案D。ITP處置:類固醇阻斷自體抗體、禁aspirin防出血、血小板<20000或致命出血輸血小板皆正確。本題『錯誤』為D:依官方,『『「6個月『無效『即『脾臟『切除」』『敘述『被『判『『錯誤』——『『脾臟『切除『『多『『保留『給『『『『慢性『(『>『12個月)、『『嚴重『、『藥物『『多次『無效『的『『年長『兒童』(『『幼兒『『盡量『『避免『脾切;『6個月『即切『過早)』」。本題「錯誤」者為D。","options":{"A":"正確。靜脈/口服類固醇阻斷自體免疫抗體破壞血小板。","B":"正確。禁用含aspirin藥物防出血。","C":"正確。血小板<20000或急性致命出血時輸血小板。","D":"錯誤(本題答案)。脾切多保留給慢性嚴重多次無效年長兒(6個月即切過早)。"},"sources":["Nelson《兒科學》ITP","脾切"]}},"105030-N4-66":{"quick":"ITP幼兒護理指導『錯誤』的是「此類紫斑症的病因可能與自體免疫有關,僅能長期以藥物控制病情」。","detail":{"background":"特發性血小板減少紫斑症(ITP):『『『自體免疫『『抗體『『破壞『血小板』→『『血小板『『減少『『多處『紫斑/瘀斑/出血』;『多『『病毒『感染『後『發生、『『『多『『自限『可『自癒(『非『僅能『長期『藥物『控制)』;『治療『『類固醇(阻斷『自體『抗體)、『嚴重(血小板『<『20000『或『致命『出血)『輸『血小板/IVIG』、『『慢性『>『『6~12個月『無效『才『考慮『『脾臟『切除(『非『3歲前『常規)』;『護理『『禁『aspirin(『抑『血小板『凝集)、『環境『安全『防『外傷『出血(『床欄『護墊)、血小板『<『20000『觀察『自發性『出血』。 ITP護理:環境安全防外傷(床欄地板鋪保護墊)、血小板<20000觀察自發性出血、避免aspirin皆正確。「『『『僅能『『『長期『『藥物『控制』」錯誤——『『兒童『ITP『『『『多『『『『自限/自癒』(『多數『『數週『~『數月『內『『恢復;『『非『『僅能『『長期『控制)』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。兒童ITP多自限/自癒(非僅能長期藥物控制)。","B":"正確。注意居家環境安全,床欄地板鋪保護墊。","C":"正確。血小板<20000觀察自發性出血。","D":"正確。避免含aspirin藥物防影響血小板凝集。"},"sources":["Nelson《兒科學》ITP","自限"]}},"112030-N4-68":{"quick":"3歲ITP敘述『錯誤』的是「建議3歲前施行脾臟切除手術」。","detail":{"background":"特發性血小板減少紫斑症(ITP):『『『自體免疫『『抗體『『破壞『血小板』→『『血小板『『減少『『多處『紫斑/瘀斑/出血』;『多『『病毒『感染『後『發生、『『『多『『自限『可『自癒(『非『僅能『長期『藥物『控制)』;『治療『『類固醇(阻斷『自體『抗體)、『嚴重(血小板『<『20000『或『致命『出血)『輸『血小板/IVIG』、『『慢性『>『『6~12個月『無效『才『考慮『『脾臟『切除(『非『3歲前『常規)』;『護理『『禁『aspirin(『抑『血小板『凝集)、『環境『安全『防『外傷『出血(『床欄『護墊)、血小板『<『20000『觀察『自發性『出血』。 ITP:自體免疫障礙、用類固醇治療、禁aspirin皆正確。「『『建議『『『3歲『前『『施行『脾臟『切除『手術』」錯誤——『『『兒童『ITP『『『『多『『自癒,『『脾臟『切除『『『保留『給『『『慢性『嚴重『難治者(『且『『幼兒『『盡量『『避免『脾切『防『感染);『『『非『『「3歲前『常規『脾切」』」。本題「錯誤」者為D。","options":{"A":"正確。這是一種自體免疫的障礙。","B":"正確。使用類固醇治療。","C":"正確。禁止使用阿斯匹靈藥物。","D":"錯誤(本題答案)。幼兒ITP多自癒,不建議3歲前常規脾切。"},"sources":["Nelson《兒科學》ITP","勿脾切"]}},"102110-N4-49":{"quick":"急性淋巴性白血病確診後母親焦急掉淚,護理師最適宜處理是「陪伴張媽媽,並鼓勵他表達擔心的問題」。","detail":{"background":"孩子『確診『白血病『母親『『焦急『掉淚』→『『護理師『應『『『『陪伴、『『同理、『『鼓勵『『表達『擔心/情緒』。本題最適宜為「陪伴並鼓勵表達擔心」(C);說治療效果好(A,空泛保證)、提供化療訊息(B,情緒當下非首要)、通知醫師(D,推諉)非最適。本題為C。","options":{"A":"「治療效果良好」是空泛保證。","B":"情緒當下提供訊息非首要。","C":"正確。陪伴並鼓勵表達擔心的問題。","D":"通知醫師是推諉(護理師可先陪伴)。"},"sources":["Nelson《兒科學》白血病","陪伴"]}},"102110-N4-67":{"quick":"ALL誘導期化學治療『錯誤』的是「一般會合併使用bactrim(backtar)預防泌尿道感染」。","detail":{"background":"兒童白血病:『『最常『『急性淋巴球性『白血病(ALL,好發『2~6歲)』;表現『『發燒、疲憊、蒼白(貧血)、易『流鼻血/瘀斑(血小板低)、骨痛、肝脾淋巴結腫』;『『確診『『『骨髓『抽吸(芽細胞『>『25%;『非『腰椎穿刺)』;『預後『『侵犯『中樞『神經/睪丸『較『差、『2~10歲『較佳、女『優於『男』。化療『誘導期(induction)』:『罹病『最初『4~5週『達『緩解(芽細胞『<5%)、『『用藥『7~14天『發生『骨髓『抑制(『血球『低下)』;『化療『常『合併『『Bactrim『預防『『卡氏『肺囊蟲『肺炎(PCP)』、『allopurinol/Rasburicase『預防『『腫瘤『溶解『症候群(『高尿酸)』;『化療『前『大量『給水、碳酸氫鈉『鹼化『尿』。ANC(絕對嗜中性白血球)=『白血球『×『(『成熟segment%+『不成熟band%)』;『ANC『<『500~1000『須『『保護性『隔離、低微生物『餐、勿『活疫苗/aspirin、發燒『立即『抗生素』。腫瘤溶解症候群(TLS):『高尿酸、高鉀、高磷、低鈣』;『預防『大量『水化、allopurinol、勿『限水』。化療藥:Vincristine(便秘/手腳麻)、Cyclophosphamide(出血性膀胱炎多喝水)、Cisplatin(腎/聽神經毒性)。 ALL誘導期:罹病最初4~5週達骨髓芽細胞<5%緩解、95%此期後癌細胞剩約1%、用藥7~14天骨髓抑制感染皆正確。「『『合併『『bactrim『預防『『『泌尿道『感染』」錯誤——『『Bactrim『『預防『『『『卡氏『肺囊蟲『肺炎(PCP)』(『『非『泌尿道『感染)』」。本題「錯誤」者為C。","options":{"A":"正確。罹病最初4~5週達骨髓芽細胞<5%緩解。","B":"正確。95%此期後癌細胞剩約1%。","C":"錯誤(本題答案)。Bactrim預防卡氏肺囊蟲肺炎(PCP),非泌尿道感染。","D":"正確。用藥7~14天骨髓抑制易感染。"},"sources":["Nelson《兒科學》ALL","Bactrim"]}},"103030-N4-50":{"quick":"13歲白血病住院護理措施『最不適當』的是「為避免阿文擔心,病情解釋不宜過於詳細」。","detail":{"background":"青少年(13歲)白血病:進房先敲門(尊重隱私)、病情穩定鼓勵打電話找同學、徵求同意鼓勵同學探訪皆適當。「『『病情『解釋『『不宜『『過於『詳細』」最不適當——『『青少年『『『認知『成熟、『有『『知的『權利』,『『應『『『『誠實『『提供『『適當『資訊(『非『隱瞞/簡略)』」。本題最不適當者為D。","options":{"A":"適當。進房門先敲門(尊重隱私)。","B":"適當。病情穩定鼓勵打電話找同學。","C":"適當。徵求同意鼓勵同學探訪。","D":"最不適當(本題答案)。青少年有知的權利,應誠實提供資訊(非隱瞞)。"},"sources":["Nelson《兒科學》青少年","誠實"]}},"103030-N4-68":{"quick":"5歲ALL化療(WBC 2000、segment 15%、band 1%)ANC是「320/mm3」。","detail":{"background":"兒童白血病:『『最常『『急性淋巴球性『白血病(ALL,好發『2~6歲)』;表現『『發燒、疲憊、蒼白(貧血)、易『流鼻血/瘀斑(血小板低)、骨痛、肝脾淋巴結腫』;『『確診『『『骨髓『抽吸(芽細胞『>『25%;『非『腰椎穿刺)』;『預後『『侵犯『中樞『神經/睪丸『較『差、『2~10歲『較佳、女『優於『男』。化療『誘導期(induction)』:『罹病『最初『4~5週『達『緩解(芽細胞『<5%)、『『用藥『7~14天『發生『骨髓『抑制(『血球『低下)』;『化療『常『合併『『Bactrim『預防『『卡氏『肺囊蟲『肺炎(PCP)』、『allopurinol/Rasburicase『預防『『腫瘤『溶解『症候群(『高尿酸)』;『化療『前『大量『給水、碳酸氫鈉『鹼化『尿』。ANC(絕對嗜中性白血球)=『白血球『×『(『成熟segment%+『不成熟band%)』;『ANC『<『500~1000『須『『保護性『隔離、低微生物『餐、勿『活疫苗/aspirin、發燒『立即『抗生素』。腫瘤溶解症候群(TLS):『高尿酸、高鉀、高磷、低鈣』;『預防『大量『水化、allopurinol、勿『限水』。化療藥:Vincristine(便秘/手腳麻)、Cyclophosphamide(出血性膀胱炎多喝水)、Cisplatin(腎/聽神經毒性)。 ANC計算:『『ANC『=『『白血球『×『(『segment%『+『band%)』=『『2000『×『(『15%『+『1%)『=『2000『×『0.16『=『『『320/mm3』。本題為「320/mm3」(B)。","options":{"A":"150不對。","B":"正確。2000×(15%+1%)=320/mm3。","C":"700不對。","D":"1400不對。"},"sources":["Nelson《兒科學》ANC","計算"]}},"103100-N4-73":{"quick":"12歲ALL化療後(WBC 4800、Hb 11.8、血小板15000)護理正確的是「為防出血應避免碰撞跌倒」。","detail":{"background":"兒童白血病:『『最常『『急性淋巴球性『白血病(ALL,好發『2~6歲)』;表現『『發燒、疲憊、蒼白(貧血)、易『流鼻血/瘀斑(血小板低)、骨痛、肝脾淋巴結腫』;『『確診『『『骨髓『抽吸(芽細胞『>『25%;『非『腰椎穿刺)』;『預後『『侵犯『中樞『神經/睪丸『較『差、『2~10歲『較佳、女『優於『男』。化療『誘導期(induction -55":{"quick":"15歲白血病末期面臨死亡反應與護理『錯誤』的是「應對小容隱瞞有關其瀕臨死亡的事實」。","detail":{"background":"兒童對死亡的理解(依年齡):『『嬰幼兒『無『概念、『學齡前『可逆/魔幻思考(『認為『生病『是『懲罰)、『學齡期『漸『理解『不可逆『但『仍『恐懼、『青少年『成熟『理解『但『覺『自己『不會『年輕『死、易『與『醫護『談『不易『與『父母『溝通』。瀕死『生理『變化』:『『循環『衰竭(末梢『冰冷『脈搏『弱、『非『變強)、『呼吸『不規則、『括約肌『鬆弛『大小便『失禁、『『『聽覺『『『最後『消失(『非『視力)』、躁動、貧血出血(白血病末期)』。護理:『『誠實『『開放『討論『死亡(『勿『隱瞞)、『傾聽『鼓勵『表達『情緒/需要、『允許『同學『接觸『減『孤立、『陪伴『家屬』。化療『禿髮/掉髮』:『『『停藥『數月後『『『會『『再『長出』、『鼓勵『表達『感受、『共同『討論『頭巾/假髮、『介紹『同齡『病友『分享』。 青少年末期:經歷發展與死亡雙重危機、尋找生死意義、擔心被孤立鼓勵同學接觸皆正確。「『『應『『『隱瞞『『瀕臨『死亡『事實』」錯誤——『『青少年『『認知『成熟、『有『『知的『權利』,『『『應『『『誠實『『開放『討論(『非『隱瞞)』」。本題「錯誤」者為C。","options":{"A":"正確。正經歷發展與死亡的雙重危機。","B":"正確。可能尋找生與死的目的與意義。","C":"錯誤(本題答案)。不應隱瞞瀕死事實(青少年有知的權利,應誠實開放)。","D":"正確。擔心被孤立,鼓勵同學接觸。"},"sources":["Nelson《兒科學》青少年末期","誠實"]}},"105090-N4-51":{"quick":"14歲急性白血病復發,青少年對死亡理解及反應『錯誤』的是「較不能與父母溝通以取得父母的支持」(本題C?)——本題答C。","detail":{"background":"兒童對死亡的理解(依年齡):『『嬰幼兒『無『概念、『學齡前『可逆/魔幻思考(『認為『生病『是『懲罰)、『學齡期『漸『理解『不可逆『但『仍『恐懼、『青少年『成熟『理解『但『覺『自己『不會『年輕『死、易『與『醫護『談『不易『與『父母『溝通』。瀕死『生理『變化』:『『循環『衰竭(末梢『冰冷『脈搏『弱、『非『變強)、『呼吸『不規則、『括約肌『鬆弛『大小便『失禁、『『『聽覺『『『最後『消失(『非『視力)』、躁動、貧血出血(白血病末期)』。護理:『『誠實『『開放『討論『死亡(『勿『隱瞞)、『傾聽『鼓勵『表達『情緒/需要、『允許『同學『接觸『減『孤立、『陪伴『家屬』。化療『禿髮/掉髮』:『『『停藥『數月後『『『會『『再『長出』、『鼓勵『表達『感受、『共同『討論『頭巾/假髮、『介紹『同齡『病友『分享』。 本題問『錯誤』,答案C。青少年:對死亡有成熟理解但仍有疑問、易認為自己不會年輕死、較不能與父母溝通皆正確(D其實正確)。本題『錯誤』為C:依官方,『『「較『『易『『與『『醫護人員『『表達『『對死亡『的『看法」』被『判『錯誤』——『『青少年『『『『其實『『『『較『『難『『『主動『『表達『死亡『看法(『『可能『『『隱藏『情緒、『『或『『與『同儕『談『多『於『醫護;『敘述『過於『絕對)』」。本題「錯誤」者為C。","options":{"A":"正確。對死亡有成熟理解但仍有許多疑問。","B":"正確。較易認為自己不會在年輕時就死亡。","C":"錯誤(本題答案)。青少年未必較易與醫護表達死亡看法(可能隱藏情緒)。","D":"正確。較不能與父母溝通取得支持。"},"sources":["Nelson《兒科學》青少年","溝通"]}},"108110-N4-58":{"quick":"9歲白血病住院至少一個月,此階段(學齡期)兒童最關心的事是「學業與同儕關係」。","detail":{"background":"兒童對死亡的理解(依年齡):『『嬰幼兒『無『概念、『學齡前『可逆/魔幻思考(『認為『生病『是『懲罰)、『學齡期『漸『理解『不可逆『但『仍『恐懼、『青少年『成熟『理解『但『覺『自己『不會『年輕『死、易『與『醫護『談『不易『與『父母『溝通』。瀕死『生理『變化』:『『循環『衰竭(末梢『冰冷『脈搏『弱、『非『變強)、『呼吸『不規則、『括約肌『鬆弛『大小便『失禁、『『『聽覺『『『最後『消失(『非『視力)』、躁動、貧血出血(白血病末期)』。護理:『『誠實『『開放『討論『死亡(『勿『隱瞞)、『傾聽『鼓勵『表達『情緒/需要、『允許『同學『接觸『減『孤立、『陪伴『家屬』。化療『禿髮/掉髮』:『『『停藥『數月後『『『會『『再『長出』、『鼓勵『表達『感受、『共同『討論『頭巾/假髮、『介紹『同齡『病友『分享』。\n『學齡期(9歲)』兒童『『住院『『最『關心』:『『『『學業『『與『『同儕『『關係(『怕『落後/被『同學『遺忘;『此階段『發展『重『『勤勉『與『『同儕『歸屬)』。本題為「學業與同儕關係」(D);與父母分離(嬰幼兒最怕)、活動限制(幼兒/學齡前)、閹割焦慮(學齡前性器期)非學齡期最關心。本題為D。","options":{"A":"與父母分離是嬰幼兒最怕。","B":"活動限制是幼兒/學齡前。","C":"閹割焦慮是學齡前性器期。","D":"正確。學齡期最關心學業與同儕關係。"},"sources":["Nelson《兒科學》學齡期","同儕"]}},"110030-N4-57":{"quick":"8歲神經母細胞瘤末期問護理師是否快死,較適當回答是「為什麼你突然問這個問題,說說看你在擔心什麼」。","detail":{"background":"兒童對死亡的理解(依年齡):『『嬰幼兒『無『概念、『學齡前『可逆/魔幻思考(『認為『生病『是『懲罰)、『學齡期『漸『理解『不可逆『但『仍『恐懼、『青少年『成熟『理解『但『覺『自己『不會『年輕『死、易『與『醫護『談『不易『與『父母『溝通』。瀕死『生理『變化』:『『循環『衰竭(末梢『冰冷『脈搏『弱、『非『變強)、『呼吸『不規則、『括約肌『鬆弛『大小便『失禁、『『『聽覺『『『最後『消失(『非『視力)』、躁動、貧血出血(白血病末期)』。護理:『『誠實『『開放『討論『死亡(『勿『隱瞞)、『傾聽『鼓勵『表達『情緒/需要、『允許『同學『接觸『減『孤立、『陪伴『家屬』。化療『禿髮/掉髮』:『『『停藥『數月後『『『會『『再『長出』、『鼓勵『表達『感受、『共同『討論『頭巾/假髮、『介紹『同齡『病友『分享』。 兒童『問『「我是否『快死」』→『『護理師『應『『『『先『『了解/探索『『其『『想法『與『擔心(『開放『式『回應、『誠實『陪伴)』。本題較適當為「為什麼突然問、說說你擔心什麼」(B);否認(A,「沒有啊」否認)、轉移質疑(C,「聽錯了」)、空泛(D,「每個人都會死」)非適當。本題為B。","options":{"A":"「沒有啊」是否認(不誠實)。","B":"正確。探索其想法與擔心(開放式回應)。","C":"「聽錯了」是質疑/轉移。","D":"「每個人都會死」空泛不貼心。"},"sources":["Nelson《兒科學》瀕死溝通","探索"]}},"112110-N4-54":{"quick":"13歲骨肉瘤生命末期生理變化正確的是「括約肌控制降低,造成大小便失禁」。","detail":{"background":"兒童對死亡的理解(依年齡):『『嬰幼兒『無『概念、『學齡前『可逆/魔幻思考(『認為『生病『是『懲罰)、『學齡期『漸『理解『不可逆『但『仍『恐懼、『青少年『成熟『理解『但『覺『自己『不會『年輕『死、易『與『醫護『談『不易『與『父母『溝通』。瀕死『生理『變化』:『『循環『衰竭(末梢『冰冷『脈搏『弱、『非『變強)、『呼吸『不規則、『括約肌『鬆弛『大小便『失禁、『『『聽覺『『『最後『消失(『非『視力)』、躁動、貧血出血(白血病末期)』。護理:『『誠實『『開放『討論『死亡(『勿『隱瞞)、『傾聽『鼓勵『表達『情緒/需要、『允許『同學『接觸『減『孤立、『陪伴『家屬』。化療『禿髮/掉髮』:『『『停藥『數月後『『『會『『再『長出』、『鼓勵『表達『感受、『共同『討論『頭巾/假髮、『介紹『同齡『病友『分享』。 瀕死生理:(1)『呼吸『『不規則(『陳施氏;『非『庫斯莫爾深快,『那是『DKA)』』,A錯;(2)『周邊『循環『『『『減少』,『末梢『脈搏『『『『弱(『非『增加變強)』』,B錯;(3)「『『括約肌『『控制『『降低『『大小便『『失禁』」——正確;(4)『『痛覺『變遲鈍,『『『聽覺『『『最後『消失(『非『視力)』』,D錯。本題為C。","options":{"A":"錯。呼吸不規則(陳施氏),非庫斯莫爾深快。","B":"錯。周邊循環減少、末梢脈搏弱(非增加變強)。","C":"正確。括約肌控制降低,大小便失禁。","D":"錯。聽覺最後消失(非視力)。"},"sources":["Nelson《兒科學》瀕死","失禁"]}},"112180-N4-44":{"quick":"12歲化療掉髮悶悶不樂不願互動,護理措施『錯誤』的是「告知小恩掉髮是必然的副作用,且不可逆」。","detail":{"background":"兒童對死亡的理解(依年齡):『『嬰幼兒『無『概念、『學齡前『可逆/魔幻思考(『認為『生病『是『懲罰)、『學齡期『漸『理解『不可逆『但『仍『恐懼、『青少年『成熟『理解『但『覺『自己『不會『年輕『死、易『與『醫護『談『不易『與『父母『溝通』。瀕死『生理『變化』:『『循環『衰竭(末梢『冰冷『脈搏『弱、『非『變強 clophosphamide→出血性膀胱炎(多喝水)、『Cisplatin→腎/聽神經毒、『MTX→口腔黏膜炎/肝毒』。外滲處理順序:①停止注射→②空針反抽→③局部冰熱敷/解毒劑→④追蹤(即4231)。骨髓穿刺:嬰幼兒最常脛骨、大童腸骨脊、穿後加壓≥15分鐘、術後1小時監測。造血幹細胞移植:HLA吻合、移植前高劑量化放療、Hickman輸入、約14~28天造血、急性GVHD多移植後100天內、保護隔離。G-CSF驅動骨髓幹細胞至周邊血液。Port-A:heparin生理食鹽水沖洗、注藥前反抽回血、完全植入皮下不限制同側手臂。輸血:核對血袋血型交叉、生理食鹽水沖洗管路、開始15分慢、溫血器≤37°C、勿加藥入血。ANC=白血球×(成熟segment%+不成熟band%)。 腫瘤溶解症候群(TLS):化療前大量給水、按時服allopurinol、靜脈輸液加碳酸氫鈉鹼化尿皆正確。「監測尿糖」錯誤——『TLS須監測『尿酸/血鉀/血磷/血鈣/腎功能』(細胞溶解釋放物質),非監測尿糖。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。TLS監測尿酸/鉀/磷/鈣(非尿糖)。","B":"正確。化學治療前大量給水(水化)。","C":"正確。依醫囑按時服用allopurinol。","D":"正確。靜脈輸液加碳酸氫鈉鹼化尿液。"},"sources":["Nelson《兒科學》TLS","監測"]}},"115030-N4-43":{"quick":"化療中(WBC 1000、segment 26%、band 2%)ANC是「280」。","detail":{"background":"化療『副作用『與『護理』:『噁心嘔吐(少量多餐、高熱量高蛋白、止吐劑、食慾佳時進食)、『口腔『黏膜『破損(『軟棉棒『口腔護理、餐前『局部『麻醉劑、餐後『Mycostatin『漱口治念珠菌、避堅硬酸辣;非堅果)、『骨髓抑制(保護隔離)、『禿髮(可逆)、便秘(Vincristine)』。化療藥毒性:『Vincristine→便秘/手腳麻(神經毒)、『Cyclophosphamide→出血性膀胱炎(多喝水)、『Cisplatin→腎/聽神經毒、『MTX→口腔黏膜炎/肝毒』。外滲處理順序:①停止注射→②空針反抽→③局部冰熱敷/解毒劑→④追蹤(即4231)。骨髓穿刺:嬰幼兒最常脛骨、大童腸骨脊、穿後加壓≥15分鐘、術後1小時監測。造血幹細胞移植:HLA吻合、移植前高劑量化放療、Hickman輸入、約14~28天造血、急性GVHD多移植後100天內、保護隔離。G-CSF驅動骨髓幹細胞至周邊血液。Port-A:heparin生理食鹽水沖洗、注藥前反抽回血、完全植入皮下不限制同側手臂。輸血:核對血袋血型交叉、生理食鹽水沖洗管路、開始15分慢、溫血器≤37°C、勿加藥入血。ANC=白血球×(成熟segment%+不成熟band%)。 ANC計算:ANC=1000×(26%+2%)=1000×0.28=280。本題為「280」(C)。","options":{"A":"680不對。","B":"320不對。","C":"正確。1000×(26%+2%)=280。","D":"200不對。"},"sources":["Nelson《兒科學》ANC","計算"]}},"101110-N4-44":{"quick":"正常孕婦一般常規檢查『不包括』「口服葡萄糖耐量試驗(OGTT)」。","detail":{"background":"孕婦一般常規檢查:梅毒血清(VDRL)、全血球計數(CBC)、ABO及Rh因子、尿液、B肝、德國麻疹抗體。「OGTT」不包括於初診一般常規——『OGTT是妊娠約24~28週篩檢妊娠糖尿病時才做。本題不包括者為D。","options":{"A":"包括。梅毒血清試驗(VDRL)。","B":"包括。全血球計數(CBC)。","C":"包括。ABO及Rh因子辨認。","D":"本題答案(不包括)。OGTT是24~28週篩檢妊娠糖尿病(非一般常規)。"},"sources":["新文京《產科護理學》產檢","OGTT"]}},"103030-N4-7":{"quick":"由外胚層發育而來的胎兒組織是「神經組織」。","detail":{"background":"胚層發育:『外胚層→神經組織、皮膚表皮、感覺器官;『中胚層→骨骼肌、紅血球、骨骼、腎泌尿、循環;『內胚層→消化道/呼吸道上皮、膀胱/尿道內襯。本題由外胚層發育者為「神經組織」(C);膀胱尿道(內胚層)、紅血球(中胚層)、骨骼肌(中胚層)非外胚層。本題為C。","options":{"A":"膀胱、尿道由內胚層發育。","B":"紅血球由中胚層發育。","C":"正確。神經組織由外胚層發育。","D":"所有骨骼肌由中胚層發育。"},"sources":["新文京《產科護理學》胚層","外胚層"]}},"103030-N4-62":{"quick":"黴漿菌性肺炎(mycoplasma pneumonia)『錯誤』的是「大多侵犯1~4歲幼兒,較不容易傳染給其他家人」。","detail":{"background":"黴漿菌性肺炎:乾咳無痰/少量痰單核白血球、胸部X光下肺葉間質性肺炎陰影、紅黴素/azithromycin治療皆正確。「大多侵犯1~4歲幼兒、較不傳染家人」錯誤——『黴漿菌肺炎『好發學齡兒童與年輕成人』(非1~4歲),且會飛沫傳染家人/群聚。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。黴漿菌肺炎好發學齡兒/年輕成人、會飛沫傳染(非1~4歲不易傳染)。","B":"正確。乾咳少痰、單核白血球。","C":"正確。胸部X光下肺葉間質性肺炎陰影。","D":"正確。紅黴素或azithromycin治療。"},"sources":["Nelson《兒科學》黴漿菌肺炎","學齡"]}},"104100-N4-31":{"quick":"Rh陰性初孕婦(先生Rh陽性)護理措施為宜的是「若激敏反應尚未產生,則在產後72小時給予母體注射300μg的Rhogam,可避免激敏反應產生」。","detail":{"background":"Rh不合:(1)胎兒不一定皆Rh陽性(視父親基因型),A錯;(2)「激敏尚未產生,產後72小時內注射300μg Rhogam(抗D免疫球蛋白)避免激敏」——正確;(3)Rhogam中和『胎兒Rh陽性紅血球』(非母體Rh陰性)、阻母體產D抗體,C錯;(4)間接庫姆斯試驗查母體抗體(非Rh陽性抗原數),D錯。本題為B。","options":{"A":"錯。胎兒不一定皆Rh陽性(視父親基因型)。","B":"正確。產後72小時內注射Rhogam避免激敏。","C":"錯。Rhogam中和胎兒Rh陽性紅血球(非母體Rh陰性)。","D":"錯。間接庫姆斯試驗查母體抗體(非Rh陽性抗原數)。"},"sources":["新文京《產科護理學》Rh不合","Rhogam"]}},"105030-N4-60":{"quick":"細菌性肺炎(Bacterial pneumonia)『錯誤』的是「最常見的致病原為黴漿菌」。","detail":{"background":"細菌性肺炎:通常高燒>39°C、血中顆粒性白血球升高、需抗生素治療皆正確。「最常見致病原為黴漿菌」錯誤——『黴漿菌是『非典型』肺炎致病原;細菌性肺炎最常見『肺炎鏈球菌』。本題「錯誤」者為A。 補充:細菌性肺炎好發冬春、由肺炎鏈球菌/金黃葡萄球菌/b型嗜血桿菌等引起;典型表現高燒>39°C、寒顫、咳嗽濃痰、胸痛、呼吸快、肺實質浸潤(肺葉/節段),白血球(顆粒球)升高;治療抗生素。與黴漿菌(非典型,學齡兒、乾咳、間質浸潤、單核球)區別是常考點。","options":{"A":"錯誤(本題答案)。細菌性肺炎最常見肺炎鏈球菌(黴漿菌是非典型肺炎)。","B":"正確。通常高燒>39°C。","C":"正確。血中顆粒性白血球升高。","D":"正確。需給予抗生素治療。"},"sources":["Nelson《兒科學》細菌性肺炎","肺炎鏈球菌"]}},"105090-N4-29":{"quick":"懷孕期間貧血原因與診斷正確的是「當孕婦血紅素低於11 g/dl,血清中鐵蛋白濃度低於12μg/dl時,即表示有缺鐵性貧血」。","detail":{"background":"孕期貧血:(1)「孕婦Hb<11、鐵蛋白<12=缺鐵性貧血」——正確;(2)海洋性貧血是『體染色體』遺傳(非性染色體),B錯;(3)β血球基因突變是海洋性貧血(非缺鐵性),C錯;(4)同型帶因胎兒重症海洋性貧血(非大多畸形),D欠精確。本題為A。","options":{"A":"正確。孕婦Hb<11、鐵蛋白<12即缺鐵性貧血。","B":"錯。海洋性貧血是體染色體遺傳(非性染色體)。","C":"錯。β基因突變是海洋性貧血(非缺鐵性)。","D":"同型帶因胎兒重症海洋性貧血(非大多畸形)。"},"sources":["新文京《產科護理學》孕期貧血","缺鐵"]}},"106030-N4-10":{"quick":"懷孕26週正常的血液變化是「血紅素下降」。","detail":{"background":"懷孕血液變化:血漿容積增加>紅血球增加→生理性血液稀釋→血紅素/血比容『下降』(生理性貧血);纖維蛋白原『增加』、白血球『增加』。本題正常變化為「血紅素下降」(D);纖維蛋白原減少(A錯)、血比容上升(B錯)、白血球減少(C錯)非正常。本題為D。","options":{"A":"錯。纖維蛋白原增加(非減少)。","B":"錯。血比容下降(血液稀釋),非上升。","C":"錯。白血球增加(非減少)。","D":"正確。血紅素下降(生理性血液稀釋)。"},"sources":["新文京《產科護理學》孕期血液","血紅素下降"]}},"106110-N4-32":{"quick":"孕婦缺鐵性貧血『錯誤』的是「補充鐵劑應於飯前服用以利吸收」。","detail":{"background":"本題問『錯誤』,答案B。孕婦缺鐵性貧血:新生兒延遲斷臍、鐵劑與維生素C同服、多攝紅肉深綠蔬菜皆正確。本題『錯誤』為B:鐵劑飯前空腹吸收最佳但腸胃不適明顯,孕婦常改『隨餐/飯後』服用減不適(官方此題以「飯前」為錯)。本題「錯誤」者為B。","options":{"A":"正確。新生兒採延遲斷臍(增鐵儲存)。","B":"錯誤(本題答案,官方)。孕婦常改飯後服用減腸胃不適(非一律飯前)。","C":"正確。鐵劑與維生素C同服利吸收。","D":"正確。鼓勵多攝紅色肉類及深綠色蔬菜。"},"sources":["新文京《產科護理學》孕期鐵劑","飯後"]}},"106111-N4-32":{"quick":"葡萄胎『錯誤』的是「為安全起見皆進行預防性化學治療」。","detail":{"background":"葡萄胎:主要滋養層細胞異常增生、血中hCG增高、1年內避免懷孕防復發皆正確。「皆進行預防性化療」錯誤——『葡萄胎清除後主要『追蹤hCG』監測惡性變,並非皆預防性化療(僅高風險/hCG不降才化療)。本題「錯誤」者為C。","options":{"A":"正確。主要是滋養層細胞異常增生。","B":"正確。會造成血中hCG濃度增高。","C":"錯誤(本題答案)。並非皆預防性化療(主要追蹤hCG,高風險才化療)。","D":"正確。1年內避免懷孕防復發。"},"sources":["Berek婦科 葡萄胎","追蹤"]}},"107030-N4-53":{"quick":"10歲長期服抗癲癇藥物應定期檢查項目『除外』「心肺功能檢查」。","detail":{"background":"抗癲癇藥定期監測:血中藥物濃度、肝功能(多經肝代謝)、血球數量(某些藥致血球異常)。「心肺功能檢查」除外——『抗癲癇藥主要監測血中濃度/肝/血球,非常規心肺功能。本題除外者為D。 補充:長期服抗癲癇藥(如phenytoin、valproic acid、carbamazepine)須定期監測:血中藥物濃度(維持治療範圍如phenytoin 10~20μg/mL)、肝功能(多經肝代謝、valproate肝毒)、全血球(carbamazepine致白血球/血小板降);phenytoin另注意牙齦增生、葉酸缺乏。心肺功能非抗癲癇藥常規監測。","options":{"A":"須查。血中藥物濃度。","B":"須查。肝臟功能檢查。","C":"須查。血球數量檢查。","D":"本題答案(除外)。非常規心肺功能檢查。"},"sources":["藥理 抗癲癇藥","監測"]}},"107110-N4-35":{"quick":"卵巢癌腹腔化療後一直噁心,最適當回應是「少量多餐,攝取高熱量、高蛋白質飲食可逐漸減緩噁心的現象」。","detail":{"background":"化療噁心回應:提供具體有效的護理建議(少量多餐、高熱量高蛋白、止吐劑)。本題最適當為「少量多餐高熱量高蛋白減緩噁心」(D);過幾天就好(A忽視)、吃人蔘(B偏方)、還有其他副作用(C增焦慮)非適當。本題為D。","options":{"A":"「過幾天就好」忽視當下不適。","B":"「吃人蔘」是偏方。","C":"「還有其他副作用」增焦慮。","D":"正確。少量多餐、高熱量高蛋白可減緩噁心。"},"sources":["婦科 化療噁心","少量多餐"]}},"108110-N4-20":{"quick":"產後生理變化正確的是「產後12~24小時內,排尿量增加為正常現象,是為了排除懷孕時滯留多餘的水份」。","detail":{"background":"產後生理:(1)產後24小時內體溫『輕微上升』(非下降;用力脫水),A錯;(2)「產後12~24小時排尿量增加(利尿排懷孕滯留水份)」——正確;(3)霍曼氏試驗評下肢『靜脈』血栓(非動脈),C欠精確;(4)產後心輸出量增脈搏『減慢』(心搏過緩;非增至80~120),D錯。本題為B。","options":{"A":"錯。產後體溫輕微上升(非下降)。","B":"正確。產後12~24小時排尿量增加(利尿排滯留水份)。","C":"霍曼氏評下肢『靜脈』血栓(非動脈)。","D":"錯。產後脈搏減慢(心搏過緩),非增至80~120。"},"sources":["新文京《產科護理學》產後","利尿"]}},"108110-N4-40":{"quick":"更年期婦女脂質與脂蛋白改變『錯誤』的是「高密度脂蛋白(HDL)增加」。","detail":{"background":"更年期雌激素下降→血脂不利變化:血小板凝集增加、LDL增加、纖維蛋白原增加。「HDL增加」錯誤——『更年期『HDL下降』(雌激素減使保護性HDL降、心血管風險升),非增加。本題「錯誤」者為B。 補充:更年期雌激素減少使脂質往不利方向變化(LDL↑、HDL↓、三酸甘油酯↑)、血小板凝集與纖維蛋白原↑,故停經後女性心血管疾病風險上升。荷爾蒙補充療法(HRT)需權衡乳癌/血栓風險。HDL是「好膽固醇」,更年期下降是重點。","options":{"A":"正確。血小板凝集增加。","B":"錯誤(本題答案)。更年期HDL『下降』(非增加)。","C":"正確。LDL增加。","D":"正確。纖維蛋白原濃度增加。"},"sources":["婦科 更年期","HDL"]}},"109030-N4-6":{"quick":"第三孕期蛋奶素婦女孕期飲食指導『錯誤』的是「需額外增加維生素E攝取,促進紅血球發育」。","detail":{"background":"孕期飲食:應攝多醣避單醣、補葉酸多吃深綠蔬菜、第三孕期鐵劑增加皆正確。「額外增維生素E促紅血球發育」錯誤——『促紅血球發育需『鐵、葉酸、維生素B12』(維生素E是抗氧化,非促紅血球)。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。促紅血球發育需鐵/葉酸/B12(非維生素E)。","B":"正確。應攝取多醣類避免單醣。","C":"正確。此孕期仍應補葉酸多吃深綠蔬菜。","D":"正確。第三孕期鐵劑補充量增加。"},"sources":["新文京《產科護理學》孕期飲食","鐵葉酸"]}},"110030-N4-30":{"quick":"女陰癌敘述正確的是「術後應採仰臥式,維持大腿45度外張,膝關節90度彎曲之姿勢」。","detail":{"background":"女陰癌:(1)早期生長緩慢(非快速),A欠精確;(2)多淋巴轉移(非直接接觸局部),B欠精確;(3)早期治療以『手術』為主(非化療),C錯;(4)「術後仰臥、大腿45度外張、膝90度彎曲」(減會陰傷口張力)——正確。本題為D。","options":{"A":"女陰癌早期生長緩慢(「快速」欠精確)。","B":"多淋巴轉移(非直接接觸局部)。","C":"錯。早期治療以手術為主(非化療)。","D":"正確。術後仰臥、大腿45度外張、膝90度彎曲(減傷口張力)。"},"sources":["Berek婦科 女陰癌","姿勢"]}},"110030-N4-59":{"quick":"川崎氏症(Kawasaki disease)臨床表徵『錯誤』的是「亞急性期紅血球沉降速率和血小板數值降低」。","detail":{"background":"川崎氏症:急性期持續發燒5天以上、急性期兩眼結膜充血草莓舌頸淋巴結腫、亞急性期關節痛皆正確。「亞急性期ESR和血小板降低」錯誤——『川崎氏症發炎反應,『ESR和血小板『升高』(血小板升致冠狀動脈瘤/血栓風險),非降低。本題「錯誤」者為D。","options":{"A":"正確。急性期持續發燒5天以上。","B":"正確。急性期兩眼結膜充血、草莓樣舌、頸淋巴結腫。","C":"正確。亞急性期可能關節痛。","D":"錯誤(本題答案)。亞急性期ESR和血小板『升高』(非降低)。"},"sources":["Nelson《兒科學》川崎氏症","血小板升"]}},"110110-N4-18":{"quick":"產婦產後第1天生理變化『錯誤』的是「凝血因子(coagulation)減少」。","detail":{"background":"產後第1天:白血球增多症、黃體素減少、雌性素減少皆正確。「凝血因子減少」錯誤——『產後凝血因子『增加』(高凝狀態;防產後出血,但增血栓風險),非減少。本題「錯誤」者為B。 補充:產後第1天生理變化包括生理性白血球增多症(可達25000~30000,屬正常勿誤為感染)、黃體素與雌性素急降(胎盤娩出)、產後利尿(排懷孕滯留體液)、凝血因子增加(高凝狀態防產後出血但增血栓風險,須觀察下肢血栓)。","options":{"A":"正確。白血球增多症(leukocytosis)。","B":"錯誤(本題答案)。產後凝血因子『增加』(高凝狀態),非減少。","C":"正確。黃體素減少。","D":"正確。雌性素減少。"},"sources":["新文京《產科護理學》產後","凝血"]}},"111030-N4-2":{"quick":"『不是』接受產前遺傳諮詢高危險群孕婦的是「初次被診斷為妊娠糖尿病的經產婦」。","detail":{"background":"產前遺傳諮詢高危險群:高齡(≥34~35歲)、曾生先天異常/遺傳病兒、家族遺傳病史、夫妻一方染色體/海洋性貧血帶因。「初次妊娠糖尿病經產婦」不是——『妊娠糖尿病是代謝/孕期問題(非遺傳疾病諮詢對象)。本題不是者為C。","options":{"A":"是。懷孕34.8歲(高齡)。","B":"是。曾生先天性心臟病兒。","C":"本題答案(不是)。妊娠糖尿病是代謝問題(非遺傳諮詢對象)。","D":"是。先生海洋性貧血帶原者。"},"sources":["新文京《產科護理學》遺傳諮詢","高危群"]}},"111030-N4-35":{"quick":"卵巢癌醫療措施『錯誤』的是「初診斷之卵巢癌化療藥物以微脂體小紅莓(Lipo-Dox)為首選」。","detail":{"background":"卵巢癌:手術+化療為主流、分期手術前腸道準備、減積手術盡可能切除腫瘤皆正確。「初診斷Lipo-Dox首選」錯誤——『卵巢癌第一線化療多『鉑類(carboplatin)+紫杉醇(paclitaxel)』;Lipo-Dox多用於『復發』性卵巢癌(非初診斷首選)。本題「錯誤」者為D。","options":{"A":"正確。以手術合併化療為主流。","B":"正確。分期手術前應進行腸道準備。","C":"正確。減積手術盡可能切除腫瘤。","D":"錯誤(本題答案)。初診斷首選鉑類+紫杉醇(Lipo-Dox用於復發)。"},"sources":["Berek婦科 卵巢癌","鉑類"]}},"111110-N4-9":{"quick":"懷孕24週(Hb 11.2、Hct 35%)飲食指導『除外』「每日額外增加鐵劑攝取量45 mg」。","detail":{"background":"孕期(24週,Hb 11.2接近正常)飲食:每日熱量較孕前增300卡、每日增蛋白質10g、攝取足夠鈣質皆正確。本題『除外』為B:一般孕婦每日鐵建議約『30 mg』(缺鐵才增至60~100mg);此例Hb 11.2接近正常非明顯缺鐵,「額外增45mg」過量/非常規。本題除外者為B。","options":{"A":"須。每日熱量較孕前增加300卡。","B":"本題答案(除外)。一般孕婦每日鐵約30mg(非額外增45mg)。","C":"須。每日增加蛋白質10g。","D":"須。攝取足夠含鈣質食物。"},"sources":["新文京《產科護理學》孕期營養","鐵"]}},"112180-N4-22":{"quick":"妊娠12週MCV 60 fl(疑海洋性貧血帶因)最優先處置是「安排配偶接受紅血球平均容積(MCV)之血液篩檢」。","detail":{"background":"孕婦『MCV<80(本例60,小球性)』疑『海洋性貧血帶因』:最優先『先安排『配偶『也做MCV血液篩檢』(初篩;若配偶MCV也低才進一步基因檢查與胎兒診斷)。本題最優先為「配偶做MCV篩檢」(C);孕婦基因檢查(A,先MCV初篩再基因)、配偶基因檢查(B,先MCV)、絨毛膜取樣(D,確認配偶帶因後才做胎兒診斷)非最優先。本題為C。","options":{"A":"孕婦基因檢查在MCV初篩之後。","B":"配偶基因檢查在MCV初篩之後。","C":"正確。最優先安排配偶做MCV血液篩檢(初篩)。","D":"絨毛膜取樣在確認配偶帶因後才做。"},"sources":["新文京《產科護理學》海洋性貧血篩檢","配偶MCV"]}},"112180-N4-23":{"quick":"承上題,配偶亦為海洋性貧血帶因者,胎兒狀況正確的是「若胎兒為乙型海洋性貧血重症者,則其在胎兒時期是正常的」。","detail":{"background":"夫妻皆β海洋性貧血帶因:(1)胎兒重症罹病率『1/4(25%)』(非75%),A錯;(2)『體染色體隱性『與性別無關』(非有關),B錯;(3)「若胎兒為『乙(β)型』海洋性貧血重症,『胎兒時期是正常的』」——正確(因『胎兒期主要是HbF(α2γ2),β鏈缺陷在出生後HbF轉HbA才顯現,故胎兒期正常);(4)重症胎兒非致丁女士妊娠高血壓,D錯。本題為C。","options":{"A":"錯。重症罹病率1/4(非75%)。","B":"錯。體染色體隱性與性別無關。","C":"正確。乙型重症胎兒時期正常(胎兒期主HbF,β缺陷出生後才顯現)。","D":"錯。重症胎兒非致妊娠高血壓。"},"sources":["新文京《產科護理學》β海洋性貧血","胎兒期正常"]}},"112180-N4-47":{"quick":"11歲慢性腎衰竭護理照護『最不適當』的是「給與高鉀之飲食指導,如香蕉、橘子,以避免低血鉀導致心律不整現象」。","detail":{"background":"慢性腎衰竭(CKD):觀察瘀傷紫斑預防出血、尿霜搔癢給潤膚劑、補鐵與葉酸防貧血皆適當。「給『高鉀』飲食(香蕉橘子)避免低血鉀」最不適當——『CKD『腎排鉀差『易『高血鉀』(致心律不整),『應『限鉀』(避免香蕉橘子等高鉀;非給高鉀)。本題最不適當者為C。","options":{"A":"適當。觀察瘀傷紫斑預防出血。","B":"適當。尿霜搔癢給潤膚劑。","C":"最不適當(本題答案)。CKD易高血鉀應限鉀(非給高鉀香蕉橘子)。","D":"適當。補鐵與葉酸防貧血。"},"sources":["Nelson《兒科學》CKD","限鉀"]}},"113030-N4-40":{"quick":"川崎氏症病童治療及目的正確的是「給與免疫球蛋白(IVIG)可有效降低冠狀動脈瘤發生」。","detail":{"background":"川崎氏症治療:(1)給aspirin是『抗發炎/抗血小板』(非促血小板凝集),A錯;(2)「給免疫球蛋白(IVIG)『有效降低冠狀動脈瘤』發生」——正確(IVIG+aspirin是標準治療);(3)苯巴比妥治癲癇(非舞蹈症;且非川崎治療),C錯;(4)盤尼西林是抗細菌(川崎非細菌感染),D錯。本題為B。","options":{"A":"錯。aspirin是抗發炎/抗血小板(非促凝集)。","B":"正確。IVIG有效降低冠狀動脈瘤發生。","C":"錯。苯巴比妥非川崎治療。","D":"錯。盤尼西林是抗細菌(川崎非細菌感染)。"},"sources":["Nelson《兒科學》川崎氏症","IVIG"]}},"113180-N4-39":{"quick":"10歲乾咳間質性浸潤單核白血球上升、雙胞胎妹妹類似症狀,最可能致病因子是「黴漿菌」。","detail":{"background":"本例『學齡兒(10歲)、乾咳多日、輕微發燒、雙側下肺葉『間質性浸潤』、痰『單核白血球』上升、家中群聚(雙胞胎妹妹類似)』→『典型『黴漿菌(Mycoplasma)肺炎』(學齡兒好發、非典型肺炎、間質浸潤、群聚)。本題為「黴漿菌」(C);金黃葡萄球菌、肺炎鏈球菌、b型嗜血桿菌是『典型細菌性』(多葉性實質浸潤、顆粒球升),非間質性。本題為C。","options":{"A":"金黃葡萄球菌是典型細菌性(實質浸潤)。","B":"肺炎鏈球菌是典型細菌性。","C":"正確。學齡兒間質性浸潤+群聚=黴漿菌肺炎。","D":"b型嗜血桿菌是典型細菌性。"},"sources":["Nelson《兒科學》黴漿菌肺炎","間質性"]}},"114030-N4-6":{"quick":"用來篩檢孕婦是否為海洋性貧血帶因者的血液檢驗值是「平均紅血球體積(MCV)」。","detail":{"background":"孕婦『海洋性貧血『帶因『初篩』:『『平均紅血球體積(MCV)』』——『MCV『<『80 fl(小球性)』是『海洋性貧血(及缺鐵)『的初篩指標(海洋性貧血帶因者MCV偏低)。本題為「MCV」(B);血色素(Hb,反映貧血程度非帶因篩檢)、鐵離子(Fe,缺鐵相關)、α-胎兒蛋白(α-AFP,神經管缺損/唐氏篩檢)非海洋性貧血帶因篩檢。本題為B。","options":{"A":"Hb反映貧血程度(非帶因篩檢)。","B":"正確。MCV<80是海洋性貧血帶因初篩指標。","C":"鐵離子與缺鐵相關。","D":"α-AFP是神經管缺損/唐氏篩檢。"},"sources":["新文京《產科護理學》海洋性貧血","MCV"]}}},TO=["1缺鐵性貧血", "2海洋性貧血", "3其他貧血", "4白血病", "5血友病", "6ITP血小板減少紫斑症", "7實體腫瘤", "8化療副作用與護理輸血", "9癌症末期死亡與心理", "10母嬰產科與其他借題"],LEC={"1缺鐵性貧血":{"html":"<p><b>缺鐵性貧血(IDA)</b>:好發<b>6~24個月足月兒</b>(非遺傳)、MCV/MCH低(小球低色素)、血清鐵與鐵蛋白低。表現蒼白、易疲倦、注意力不集中、心跳<b>增快</b>(代償)。</p><p><b>口服鐵劑</b>:<b>飯前1小時空腹</b>、<b>與維生素C/柑橘果汁同服</b>促吸收、<u>勿與牛奶/制酸劑/茶同服</u>、用吸管(防染牙)、<b>大便變黑屬正常</b>勿停藥。注射鐵劑(Imferon):Z字形深部肌注、注後略停5~10秒、<u>勿揉搓</u>。</p>"},"2海洋性貧血":{"html":"<p><b>海洋性貧血</b>:<b>體染色體隱性</b>(α型第16對、β型第11對)、父母帶因每胎1/4重症。重症β約<b>出生後3~6個月</b>漸出現溶血、骨髓增生致<b>顱骨變大塌鼻暴牙顴骨突出</b>、肝脾腫大。</p><p>治療<b>終身定期輸血+排鐵劑(deferoxamine,約2~3歲起、尿橘紅、補維生素C、夜間皮下)</b>、根治骨髓移植。篩檢<b>MCV<80</b>初篩。<b>鐮狀細胞</b>:止痛用嗎啡(勿aspirin)、熱敷(非冷)、多水化。</p>"},"3其他貧血":{"html":"<p><b>再生不良性貧血</b>:骨髓造血衰竭→全血球減少;治療免疫抑制(<b>ALG/ATG、cyclosporine</b>)、testosterone、骨髓移植(<u>非immunoglobulin</u>);護理保護隔離、避外傷出血、避aspirin、軟質食物。</p><p><b>網狀細胞計數</b>反映<b>骨髓製造紅血球速率</b>。<b>鐮狀細胞貧血</b>:體染色體隱性、HbS致鐮變血管阻塞疼痛危機,止痛嗎啡(勿aspirin)、<b>熱敷(勿冷敷)</b>、多水化。</p>"},"4白血病":{"html":"<p><b>兒童白血病</b>:最常<b>ALL(好發2~6歲)</b>;發燒疲憊蒼白、瘀斑、骨痛、肝脾淋巴結腫;<b>確診骨髓抽吸(芽細胞>25%,非腰椎穿刺)</b>;中樞神經/睪丸侵犯預後差。誘導期4~5週達緩解、用藥7~14天骨髓抑制。</p><p><b>ANC=白血球×(segment%+band%)</b>,<500~1000須保護性隔離、低微生物餐、勿活疫苗/aspirin、發燒立即抗生素、勿肛門途徑。<b>Bactrim</b>預防PCP、<b>allopurinol/Rasburicase</b>預防腫瘤溶解症候群(高尿酸,須大量水化勿限水)。</p>"},"5血友病":{"html":"<p><b>血友病</b>:<b>性聯(X)隱性</b>(男性發病)、A型缺第VIII因子;<b>PTT延長、出血時間/血小板/PT正常</b>;深部組織/關節出血、瘀血、刷牙牙齦出血。<b>關節血腫最常膝關節</b>(其次踝肘;少肩腕)。</p><p>處置:補充凝血因子、關節出血<b>RICE(休息/冰敷血管收縮/加壓/抬高至心臟以上)</b>、<u>勿石膏固定/勿熱敷/勿aspirin</u>、軟毛牙刷、<b>游泳</b>等非碰撞運動強化關節(避籃球/網球/跳馬)。</p>"},"6ITP血小板減少紫斑症":{"html":"<p><b>特發性血小板減少紫斑症(ITP)</b>:自體免疫抗體破壞血小板→多處紫斑/出血;多病毒感染後發生、<b>多自限可自癒</b>(非僅能長期控制)。治療類固醇、嚴重(血小板<20000或致命出血)輸血小板/IVIG;<b>慢性(>6~12月)無效才考慮脾切(非幼兒常規/非3歲前)</b>;禁aspirin、環境安全防外傷(床欄護墊)。</p>"},"7實體腫瘤":{"html":"<p><b>Wilms腫瘤(腎母細胞瘤)</b>:起源腎臟、無痛腹部腫塊、<u>勿觸診/按摩腹部(防擴散)</u>、可高血壓(腎素)、術後監測腎功能/血壓/輸出入量、轉移肺/肝(非腦)。<b>神經母細胞瘤</b>:腎上腺髓質、腹部腫塊過中線、監測兒茶酚胺、浣熊眼。</p><p><b>骨肉瘤</b>:青少年、長骨、<b>夜間疼痛加重</b>、病理性骨折。<b>視網膜母細胞瘤</b>:白色瞳孔反光(<b>貓眼反射</b>)。兒童腫瘤好發:白血病>腦瘤(膠質瘤)>淋巴瘤;骨肉瘤好發股骨遠端/脛骨近端(膝附近)。</p>"},"8化療副作用與護理輸血":{"html":"<p><b>化療藥毒性</b>:Vincristine→便秘/手腳麻、Cyclophosphamide→出血性膀胱炎(多喝水)、Cisplatin→腎/聽神經毒、MTX→口腔黏膜炎/肝毒。<b>外滲處理:①停止注射②空針反抽③局部敷藥④追蹤(4231)</b>。口腔黏膜炎軟質食物(非堅果)。</p><p><b>骨髓穿刺</b>嬰幼兒最常脛骨、大童腸骨脊。<b>造血幹細胞移植</b>:HLA吻合、約14~28天造血、急性GVHD多移植後100天內。<b>Port-A</b>完全植入皮下不限制同側手臂。輸血用生理食鹽水沖洗、溫血器≤37°C、勿加藥入血。<b>ANC=白血球×(seg%+band%)</b>。</p>"},"9癌症末期死亡與心理":{"html":"<p><b>兒童對死亡理解</b>:學齡前可逆/魔幻思考(以為懲罰)、學齡期漸理解不可逆、青少年成熟但覺自己不會年輕死。<b>瀕死</b>:末梢冰冷脈搏弱、呼吸不規則、括約肌鬆弛失禁、<b>聽覺最後消失</b>(非視力)。</p><p>護理:<b>誠實開放討論死亡</b>(勿隱瞞)、傾聽鼓勵表達情緒/需要、允許同學接觸減孤立。<b>化療禿髮可逆</b>(停藥數月再長出)、鼓勵表達、討論頭巾假髮、介紹同齡病友。學齡期住院最關心學業與同儕關係。</p>"},"10母嬰產科與其他借題":{"html":"<p><b>孕期血液</b>:血液稀釋致血紅素下降(生理性貧血)、纖維蛋白原/白血球增加;孕婦Hb<11+鐵蛋白<12=缺鐵性貧血。<b>海洋性貧血篩檢MCV<80</b>初篩→配偶也篩MCV→基因確認。<b>Rh不合</b>:產後72小時內注射Rhogam(抗D)避免激敏。</p><p><b>其他</b>:黴漿菌肺炎好發學齡兒/年輕成人、間質浸潤、群聚;細菌性肺炎最常肺炎鏈球菌;川崎氏症亞急性期<b>血小板升高</b>(冠狀動脈瘤風險)、IVIG降動脈瘤;CKD易高血鉀須<b>限鉀</b>;更年期HDL下降;產後凝血因子增加(高凝)。</p>"}};

function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c8_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
