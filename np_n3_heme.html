"X光骨頭侵蝕為支持證據，非本題主要標準。","D":"IgA<0.1非診斷標準。"},"sources":["IMWG Myeloma Criteria","新文京《內外科護理學》"]}},"115030-N3-24":{"quick":"多發性骨髓瘤高血鈣(意識變化)，處置給Zometa(雙磷酸鹽)並水化，非限水或喝牛奶。","detail":{"background":"承上題，多發性骨髓瘤併高血鈣致意識變化。處置:大量「生理食鹽水水化」促進鈣排出(非限制水分)、給「雙磷酸鹽(如Zometa/zoledronic acid)」抑制蝕骨、降低血鈣並保護骨骼(D正確);避免高鈣飲食(故不鼓勵多喝牛奶);allopurinol是降尿酸(用於高尿酸/腫瘤溶解)，非降鈣。本題正確為D(給Zometa)。","options":{"A":"高血鈣應避免高鈣飲食，不鼓勵多喝牛奶。","B":"應水化(非限水)以排鈣。","C":"Allopurinol降尿酸，非降鈣。","D":"正確：給Zometa(雙磷酸鹽)降血鈣並保護骨骼。"},"sources":["Harrison Hypercalcemia/Myeloma","新文京《內外科護理學》"]}},"101110-N3-50":{"quick":"DIC接受肝素治療有效時，因消耗減緩，纖維蛋白原(fibrinogen)會回升。","detail":{"background":"瀰漫性血管內凝血(DIC)是凝血系統過度活化、廣泛微血栓消耗凝血因子與血小板，繼發纖溶亢進而出血。實驗室:血小板↓、PT/aPTT延長、纖維蛋白原↓、D-dimer與纖維蛋白分解產物(FDP)↑。給肝素是阻斷異常凝血、減少凝血因子消耗;治療「有效」時，消耗減緩使「纖維蛋白原回升(增加)」、D-dimer與FDP下降、血小板回升。本題顯示療效者為B(fibrinogen增加)。","options":{"A":"PT時間「縮短(改善)」才示療效，增加表示惡化。","B":"正確：fibrinogen回升表示消耗減緩、治療有效。","C":"D-dimer增加表示凝血纖溶持續，非療效。","D":"FDP增加表示纖溶持續，非療效。"},"sources":["Harrison DIC","新文京《內外科護理學》"]}},"102030-N3-39":{"quick":"本題為送分題(各選項均給分)：ITP血小板10,000極低，護理以「預防出血」為核心。","detail":{"background":"特發性血小板減少性紫斑症(ITP)血小板10,000/mm³極低，護理重點為「預防出血」:給軟便劑避免用力解便(D)、避免阿斯匹靈/NSAID、避免用力咳嗽與侵入處置;輸血小板的維持目標與時機(B)依出血狀況而定。因選項中B、D的處置敘述在臨床上各有可商榷處(輸血小板閾值、給軟便劑的情境)，本題公告為送分(各選項均給分)。核心觀念仍為:血小板極低時一切護理以防出血為原則。","options":{"A":"每小時用力咳嗽會增加出血風險，不宜。","B":"輸血小板維持20,000的目標與時機依出血狀況而定(屬可商榷)。","C":"阿斯匹靈抑制血小板會加重出血，不可用。","D":"給軟便劑避免用力解便防出血(合理)，本題整體送分。"},"sources":["Harrison ITP","考選部公告(送分)"]}},"102030-N3-40":{"quick":"血友病關節血腫時應「冰敷與制動」，不可熱敷(熱敷會增加出血)。","detail":{"background":"血友病(第VIII或IX凝血因子缺乏)易自發性與關節出血(hemarthrosis)。再出血預防與處置:關節血腫時「制動、冰敷、抬高、加壓(RICE)」以止血止痛，「不可熱敷」(熱會擴張血管加重出血);避免阿斯匹靈等抗血小板藥;隨身攜帶疾病識別卡;拔牙或手術前預防性補充缺乏的凝血因子(第VIII因子)。本題問錯誤者:「關節血腫給局部熱敷」錯，故選A。","options":{"A":"錯誤(本題答案)：關節血腫應冰敷制動，不可熱敷。","B":"避免含阿斯匹靈感冒藥正確。","C":"隨身攜帶血友病識別卡正確。","D":"拔牙手術前預防性輸第八凝血因子正確。"},"sources":["Harrison Hemophilia","新文京《內外科護理學》"]}},"102030-N3-41":{"quick":"DIC護理評估不需「監測維生素K數值」；應監測凝血、血小板、出血徵象與血液動力學。","detail":{"background":"DIC的護理評估重點:監測生命徵象與血液動力學(出血/休克)、觀察各部位出血跡象(瘀斑、血尿、黑便、注射處滲血)、追蹤凝血檢查(血小板、PT/aPTT、纖維蛋白原、D-dimer/FDP)。「監測體內維生素K數值」並非DIC的常規評估項目(維生素K與肝臟合成凝血因子II、VII、IX、X有關，是Warfarin的相關營養素)。本題問錯誤者，故選B。","options":{"A":"監測生命徵象正確。","B":"錯誤(本題答案)：DIC不常規監測維生素K數值。","C":"觀察出血跡象正確。","D":"監測血液動力學正確。"},"sources":["Harrison DIC","新文京《內外科護理學》"]}},"103100-N3-36":{"quick":"DIC的PT、PTT時間「延長」(凝血因子被消耗)，非縮短。","detail":{"background":"DIC由感染、惡性疾病、產科併發症(羊水栓塞)、創傷、毒蛇咬傷等觸發，凝血過度活化消耗凝血因子與血小板，繼發纖溶。實驗室:PT與PTT「延長」、血小板↓、纖維蛋白原↓、D-dimer/FDP↑;臨床以出血為常見症狀(也有微血栓致器官缺血);治療為處理病因並補充血小板、新鮮冷凍血漿，必要時用肝素阻斷異常凝血。本題問錯誤者:「PT、PTT時間縮短」錯(應延長)，故選B。","options":{"A":"感染與惡性疾病是DIC可能病因正確。","B":"錯誤(本題答案)：DIC的PT、PTT延長，非縮短。","C":"出血為常見症狀正確。","D":"可補充血小板/FFP及肝素治療正確。"},"sources":["Harrison DIC","新文京《內外科護理學》"]}},"105090-N3-39":{"quick":"急性ITP(兒童病毒感染後)多自發痊癒、病程短、「較少復發」；會復發者為慢性型。","detail":{"background":"特發性血小板減少性紫斑症(ITP):急性型好發於兒童、常於病毒感染後發生、病程少於6個月、「自發性痊癒機會高、較少復發」;慢性型好發於成人(尤女性)、病程>6個月、易反覆。本題問急性ITP特性錯誤者:「會復發」錯(急性型較少復發，反覆是慢性型特徵)，故選C。","options":{"A":"急性ITP好發於兒童病毒感染後正確。","B":"病程少於6個月正確。","C":"錯誤(本題答案)：急性ITP較少復發(反覆為慢性型)。","D":"自發性痊癒機會高正確。"},"sources":["Harrison ITP","新文京《內外科護理學》"]}},"106110-N3-40":{"quick":"慢性淋巴性白血病非DIC的典型誘因；敗血症、羊水栓塞、毒蛇咬傷才是。","detail":{"background":"DIC由「大量凝血活酶(組織因子)釋入血流」觸發凝血因子全面活化:常見誘因為敗血症(內毒素)、產科急症(羊水栓塞、胎盤早期剝離)、嚴重創傷/燒傷、毒蛇咬傷、急性前骨髓性白血病(APL)、大範圍組織壞死。慢性淋巴性白血病並非典型DIC誘因。本題問錯誤者，故選D(慢性淋巴性白血病)。","options":{"A":"敗血症是DIC常見誘因。","B":"羊水栓塞是DIC產科誘因。","C":"毒蛇咬傷可誘發DIC。","D":"錯誤(本題答案)：慢性淋巴性白血病非DIC典型誘因。"},"sources":["Harrison DIC","新文京《內外科護理學》"]}},"106111-N3-41":{"quick":"血小板減少症「容易」出現皮膚黏膜紫斑瘀斑，非不容易。","detail":{"background":"血小板減少症(thrombocytopenia)指血小板<100,000/mm³;>30,000且無明顯出血通常先觀察不需治療;嚴重低下(<20,000)易自發性出血，可出現皮膚黏膜紫斑、瘀斑、點狀出血、鼻齦出血，甚至顱內出血致頭痛、意識改變等中樞症狀。本題問錯誤者:「黏膜或皮膚不容易出現紫斑或瘀斑」錯(血小板低正是容易瘀斑紫斑)，故選D。","options":{"A":"血小板<100,000為血小板過低症，定義正確。","B":">30,000無嚴重出血通常不需治療正確。","C":"可有顱內出血致頭痛、意識改變正確。","D":"錯誤(本題答案)：血小板低容易出現紫斑瘀斑。"},"sources":["Harrison Thrombocytopenia","新文京《內外科護理學》"]}},"106111-N3-42":{"quick":"DIC的纖維蛋白原(fibrinogen)濃度「下降」(被消耗)，非上升。","detail":{"background":"急性DIC實驗室:凝血因子與血小板被廣泛消耗→血小板減少、PT與aPTT延長、「纖維蛋白原下降」;纖溶亢進→纖維蛋白分解物(FDP)與D-dimer上升。本題問錯誤者:「纖維蛋白原濃度上升」錯，急性DIC的纖維蛋白原應下降，故選C。(註:纖維蛋白原為急性期反應物，慢性代償性DIC偶可不低，但急性DIC典型為下降。)","options":{"A":"血小板減少正確。","B":"PT與aPTT延長正確。","C":"錯誤(本題答案)：急性DIC纖維蛋白原下降，非上升。","D":"FDP濃度增加正確。"},"sources":["Harrison DIC","新文京《內外科護理學》"]}},"107030-N3-32":{"quick":"口服Warfarin監測「凝血酶原時間(PT/INR)」。","detail":{"background":"抗凝劑監測:Warfarin(香豆素)抑制維生素K依賴凝血因子(II、VII、IX、X)，作用於「外因性凝血路徑」，以「凝血酶原時間(PT)」及其標準化值INR監測(治療範圍多為INR 2–3);Heparin(肝素)作用於內因性路徑，以「活化部分凝血活酶時間(aPTT)」監測。本題長期口服Warfarin應監測PT(A)。","options":{"A":"正確：Warfarin監測凝血酶原時間(PT/INR)。","B":"aPTT用於監測Heparin。","C":"PTT用於內因性路徑/Heparin。","D":"ACT用於高劑量肝素(如心導管/體外循環)監測。"},"sources":["Katzung Anticoagulants","新文京《內外科護理學》"]}},"107110-N3-45":{"quick":"DIC病人「可以用力解便」代表預防出血指導錯誤，需重新教導。","detail":{"background":"DIC病人有嚴重出血傾向，預防出血指導應:避免用力解便(給軟便劑、避免Valsalva)、避免用力咳嗽擤鼻涕、用電動刮鬍刀、用軟毛牙刷不用牙線、避免肌肉注射與侵入處置。若病人表示「可以用力解便」，代表理解錯誤(用力會升高腹/顱內壓致出血)，需重新指導。本題問需重新指導(錯誤理解)者，故選A。","options":{"A":"需重新指導(本題答案)：不可用力解便，會致出血。","B":"用電鬍刀刮鬍子(避免刀片割傷)正確。","C":"不用力咳嗽擤鼻涕正確。","D":"不用牙線、用軟毛牙刷正確。"},"sources":["新文京《內外科護理學》DIC","Harrison DIC"]}},"108020-N3-25":{"quick":"Heparin(肝素)的解毒劑是Protamine sulfate(魚精蛋白)。","detail":{"background":"抗凝劑解毒劑:Heparin(肝素)過量以「Protamine sulfate(魚精蛋白)」中和(帶正電與帶負電肝素結合);Warfarin過量以「維生素K(Phytonadione)」逆轉，急需時用新鮮冷凍血漿或凝血酶原複合物。Streptokinase是血栓溶解劑;維生素B12用於惡性貧血。本題肝素解毒劑為Protamine sulfate(A)。","options":{"A":"正確：Protamine sulfate是Heparin解毒劑。","B":"Streptokinase是血栓溶解劑，非解毒劑。","C":"Vitamin B12用於惡性貧血。","D":"Vitamin K1是Warfarin的解毒劑，非Heparin。"},"sources":["Katzung Anticoagulants","新文京《內外科護理學》"]}},"108020-N3-35":{"quick":"血小板40,000：避免Aspirin/Heparin、給軟便藥減少排便受傷(24)。","detail":{"background":"血小板40,000/mm³屬中度低下:1此值「不會非常容易自發性出血」(自發性出血多在<20,000，故1錯);2應避免使用Aspirin或Heparin等抗血小板/抗凝藥(正確);3應「避免肌肉注射」(會出血血腫，故3錯，肌注非最佳);4給軟便藥減少用力排便致黏膜出血(正確)。故正確組合為2、4(C)。","options":{"A":"含1(40,000非極易自發出血)。","B":"含1、3錯。","C":"正確：2避免Aspirin/Heparin、4給軟便藥。","D":"含3(肌肉注射不佳)。"},"sources":["Harrison Thrombocytopenia","新文京《內外科護理學》"]}},"110030-N3-39":{"quick":"血小板減少症應教導「避免閉氣用力(Valsalva)」以防出血。","detail":{"background":"血小板減少症照護:避免使用抑制血小板的NSAID/Aspirin(A錯);用軟毛牙刷、「不用牙線/牙籤」(會牙齦出血，B錯);避免閉氣用力(Valsalva會升高顱內/腹內壓致出血)(C正確);鼻黏膜乾燥「可塗凡士林」保濕防鼻黏膜龜裂出血(D錯，應可塗)。本題問正確者，故選C。","options":{"A":"NSAID抑制血小板，應避免。","B":"應避免牙線/牙籤(會牙齦出血)。","C":"正確：避免閉氣用力(Valsalva)以防出血。","D":"鼻黏膜乾燥可塗凡士林保濕(防龜裂出血)。"},"sources":["新文京《內外科護理學》","Harrison Thrombocytopenia"]}},"110030-N3-56":{"quick":"服用Warfarin應「維持穩定」的維生素K攝取，不可鼓勵多吃高維生素K食物(會降低藥效)。","detail":{"background":"Warfarin為維生素K拮抗劑，注意事項:觀察異常出血(血尿、黑便、鼻出血、牙齦出血);定期監測PT/INR;維生素K會「拮抗」Warfarin降低抗凝效果，故飲食中高維生素K食物(青花椰菜、菠菜、深綠蔬菜)應「維持穩定攝取量」、不可忽多忽少或刻意多吃(會使INR波動失效);過量出血時以Phytonadione(維生素K1)逆轉。本題問錯誤者:「鼓勵多吃高維生素K食品」錯，故選C。","options":{"A":"教導觀察異常出血症狀正確。","B":"此項偏向藥物副作用觀察，非本題最錯誤者。","C":"錯誤(本題答案)：不可鼓勵多吃高維生素K食物，會降低Warfarin藥效。","D":"出血時可給Phytonadione(維生素K1)逆轉正確。"},"sources":["Katzung Warfarin","新文京《內外科護理學》"]}},"110030-N3-78":{"quick":"敗血性休克引發的DIC，應「優先治療敗血症的導因」。","detail":{"background":"敗血性休克→DIC的處置原則是「治療根本病因(敗血症)」，控制感染源與抗生素，DIC才能改善;支持性給予血小板、新鮮冷凍血漿補充凝血因子(非優先全血)。其他敘述:DIC是凝血因子與血小板被「過度消耗」(非單純被抑制)、症狀以瀰漫出血與微血栓器官缺血為主(非皮膚水泡)。本題問正確者，故選C(優先治療敗血症導因)。","options":{"A":"DIC是凝血因子與血小板被消耗，敘述不精確。","B":"DIC症狀為出血與微血栓，非皮膚水泡。","C":"正確：應優先治療敗血症的根本導因。","D":"治療以補充血小板與FFP為主，非優先全血。"},"sources":["Surviving Sepsis","Harrison DIC"]}},"110110-N3-37":{"quick":"血小板10,000極低，護理評估重點是「意識狀態」(警覺顱內出血)。","detail":{"background":"化療後血小板10,000 cells/mm³屬極重度低下(<20,000易自發出血、<10,000顱內出血高風險)。最危急的是「自發性顱內出血」，故護理評估重點為「意識狀態」(意識改變、頭痛、瞳孔變化為顱內出血徵象);並避免一切增加出血的行為。體溫(感染)、腸蠕動、皮膚等非此時最關鍵。本題評估重點為A(意識狀態)。","options":{"A":"正確：血小板極低，評估意識狀態以早期發現顱內出血。","B":"體溫變化反映感染，非血小板低下首要。","C":"腸蠕動音非此題重點。","D":"皮膚飽和度非血小板低下的評估重點。"},"sources":["Harrison Thrombocytopenia","新文京《內外科護理學》"]}},"111030-N3-38":{"quick":"特異性血小板減少性紫斑症(ITP)：與自體免疫有關、骨髓巨核細胞增加、須避免Aspirin(123)。","detail":{"background":"特異性(免疫性)血小板減少性紫斑症(ITP)特性:1與自體免疫有關(產生抗血小板抗體，脾臟破壞血小板);2骨髓檢查可見「巨核細胞代償性增加」(製造增加但周邊被破壞);3須避免Aspirin等抑制血小板藥物;4急性ITP多發生於「病毒(非細菌)」感染後(故4錯)。故正確組合為1、2、3(A)。","options":{"A":"正確：1自體免疫、2巨核細胞增加、3避免Aspirin。","B":"含4(細菌感染後錯，應病毒)。","C":"含4錯。","D":"含4錯且缺1。"},"sources":["Harrison ITP","新文京《內外科護理學》"]}},"111030-N3-41":{"quick":"血小板8萬/μL「不是正常」(正常約15萬–40萬)，屬血小板減少。","detail":{"background":"血小板正常值約150,000–400,000/μL(15萬–40萬)，故8萬/μL屬「血小板減少」而非正常(A錯，本題答案)。癌症病人出血照護:消化道出血可用冰鹽水灌洗止血、有出血傾向者限制使用Coumadin/Heparin等抗凝劑、避免肌肉注射與量肛溫等侵入性處置以免出血。本題問錯誤者，故選A。","options":{"A":"錯誤(本題答案)：血小板8萬/μL非正常(正常15–40萬)，屬減少。","B":"消化道出血可用冰鹽水灌洗正確。","C":"出血傾向者限用Coumadin/Heparin正確。","D":"避免肌肉注射、量肛溫等侵入處置正確。"},"sources":["血小板常值","新文京《內外科護理學》"]}},"112030-N3-35":{"quick":"DIC：與感染有關、纖維蛋白原下降、常出現出血症狀(134)。","detail":{"background":"DIC正確敘述:1與感染(敗血症)等有關;3檢查時「纖維蛋白原下降」(被消耗);4臨床「常出現出血症狀」(瘀斑、滲血、黏膜出血)為主。2「常出現凝血症狀」相對不正確—DIC雖有微血栓，但臨床表現以「出血」為主(消耗性凝血病)。故正確組合為1、3、4(C)。","options":{"A":"含2(以凝血症狀表現不正確)。","B":"含2錯。","C":"正確：1與感染有關、3纖維蛋白原下降、4出血症狀。","D":"含2且缺1。"},"sources":["Harrison DIC","新文京《內外科護理學》"]}},"112030-N3-40":{"quick":"血小板減少症處置正確：天冷鼻黏膜塗凡士林保濕防龜裂出血。","detail":{"background":"癌症病人血小板減少症處置:避免NSAID(抑制血小板，A錯);輸「血小板(非凝血因子)」以避免自發性出血(B錯，凝血因子是用於凝血因子缺乏);避免刺激性瀉劑/灌腸與用力(用軟便劑，Bisacodyl栓劑刺激可能致黏膜出血，C不佳);「天冷時鼻黏膜塗凡士林保濕」防鼻黏膜乾裂出血(D正確)。本題問正確者，故選D。","options":{"A":"NSAID抑制血小板，不可給。","B":"血小板低應輸血小板，非凝血因子。","C":"刺激性栓劑/灌腸可能致黏膜出血，宜用軟便劑。","D":"正確：鼻黏膜塗凡士林保濕防龜裂出血。"},"sources":["Harrison Thrombocytopenia","新文京《內外科護理學》"]}},"112180-N3-26":{"quick":"化療後血小板30,000，最適宜：天冷鼻黏膜塗凡士林保濕防出血。","detail":{"background":"本例WBC 3,000、血小板30,000(低)、Hb 12。血小板低下照護以防出血為主:避免NSAID(抑制血小板，A錯);用「軟毛牙刷」不用電動牙刷或牙線徹底刷(會牙齦出血，B錯);避免灌腸與用力(甘油灌腸刺激直腸黏膜可能出血，宜軟便劑，C不佳);「天冷鼻黏膜塗凡士林保濕」防乾裂出血(D正確)。本題最適宜為D。","options":{"A":"NSAID抑制血小板，不可給。","B":"電動牙刷徹底清潔易牙齦出血，宜軟毛牙刷。","C":"甘油灌腸刺激黏膜可能出血，宜軟便劑。","D":"正確：鼻黏膜塗凡士林保濕防出血。"},"sources":["Harrison Thrombocytopenia","新文京《內外科護理學》"]}},"114100-N3-23":{"quick":"血友病不需「頻繁抽血監測凝血指數」；應減少不必要侵入處置。","detail":{"background":"血友病(凝血因子缺乏)易出血。護理指導:不可服用阿斯匹靈/NSAID(抑制血小板加重出血)、避免激烈與碰撞性運動(防關節肌肉出血)、避免不必要的注射、抽血與手術(侵入處置會出血)、出血時補充凝血因子。「頻繁抽血監測凝血指數」屬不必要的侵入處置(會增加出血、且血友病主要是因子活性問題)，不適當。本題問不適當者，故選C。","options":{"A":"不可自行服阿斯匹靈止痛劑正確。","B":"避免激烈碰撞活動正確。","C":"不適當(本題答案)：不需頻繁抽血，應減少不必要侵入處置。","D":"避免不必要注射或手術正確。"},"sources":["Harrison Hemophilia","新文京《內外科護理學》"]}},"102030-N3-36":{"quick":"本題為送分題(各選項均給分)：PRBC仍含少量白血球與血小板，且1單位約升Hb 1 g/dL(非2)。","detail":{"background":"濃縮紅血球(PRBC)是全血移除大部分血漿後的紅血球製品，「仍含少量白血球與血小板」(除非減白處理);保存於1–6°C;慢性貧血使用可提升攜氧而少增容量、降低心臟負荷。本題問「錯誤」者:A「完全不含白血球及血小板」錯;D「輸1單位使Hb上升2 g/dL」亦不精確(實約上升1 g/dL)，因有兩個可爭議的錯誤敘述，本題公告為送分(各選項均給分)。","options":{"A":"PRBC仍含少量白血球與血小板，此敘述為錯誤之一。","B":"保存於1–6°C正確。","C":"慢性貧血使用降低心臟負荷正確。","D":"1單位PRBC約升Hb 1 g/dL(非2)，亦屬爭議，故本題送分。"},"sources":["新文京《內外科護理學》輸血","考選部公告(送分)"]}},"102110-N3-22":{"quick":"輸血後15分鐘出現喘、發燒38.5°C、脈搏加快，最優先「立即停止輸血」並以NS維持管路。","detail":{"background":"輸血反應多在開始後15分鐘內出現，故前15分鐘須密切監測並放慢速度。一旦出現發燒、寒顫、呼吸困難、心搏過速等反應，最優先且立即的措施是「停止輸血、改以生理食鹽水維持靜脈管路通暢」(避免更多血品進入並保留靜脈通路);再通知醫師、測生命徵象、保留血袋與血液尿液送檢。繼續輸血、僅放慢觀察、只打電話而未停輸都不正確。本題正確為D。","options":{"A":"不可繼續輸血，應立即停止。","B":"出現反應不可僅放慢觀察，須停止。","C":"通知醫師之前應先停止輸血並維持管路。","D":"正確：立即停止輸血並以生理食鹽水維持管路通暢。"},"sources":["輸血反應處置","新文京《內外科護理學》"]}},"103030-N3-43":{"quick":"細菌性輸血反應是血品在輸注過程被污染所致。","detail":{"background":"輸血反應類型:溶血反應與「ABO血型不相容」最相關(也包括Rh不相容)，是輸入紅血球與受血者抗體反應(故A、D敘述有誤);過敏反應多在輸血開始後「數分鐘內」發生(非2天後);「細菌性反應」是血製品被細菌污染，輸注後快速高燒、寒顫甚至休克(C正確);熱原(發燒)反應是受血者體內抗白血球抗體所致。本題問正確者，故選C。","options":{"A":"溶血反應與Rh及ABO血型不相容皆有關。","B":"過敏反應通常在輸血開始數分鐘內，非2天後。","C":"正確：細菌性反應為血製品被污染所致。","D":"此敘述為溶血反應機轉，非熱原反應(熱原是抗白血球抗體)。"},"sources":["輸血反應分類","新文京《內外科護理學》"]}},"103100-N3-40":{"quick":"輸血循環過度負荷(TACO)：收縮壓上升、呼吸困難(12)。","detail":{"background":"輸血相關循環過度負荷(TACO)是輸血量/速度過快使循環容量過載致心衰肺水腫，常見於老年、心腎功能不全者。表現:1「血壓(收縮壓)上升」、2「呼吸困難」、咳嗽、頸靜脈怒張、肺囉音。3寒顫、4蕁麻疹、5黃疸分別屬熱原/過敏/溶血反應，非TACO。故正確組合為1、2(A)。處置:停/減慢輸血、採坐姿、給氧、利尿。","options":{"A":"正確：1收縮壓上升、2呼吸困難為循環過載表現。","B":"含3(寒顫)屬熱原反應。","C":"含3、4非循環過載。","D":"含5(黃疸)屬溶血反應。"},"sources":["輸血反應TACO","新文京《內外科護理學》"]}},"104030-N3-39":{"quick":"輸血管路只能用「0.9%生理食鹽水」沖洗。","detail":{"background":"輸血用靜脈管路只能搭配「0.9%生理食鹽水(等張)」沖洗與維持，因其不含鈣、不會與血品凝集或溶血。含葡萄糖溶液(5%、10%)會使紅血球凝集/溶血;含鈣的林格氏液(Lactated Ringer)會與血品中的抗凝劑(檸檬酸)結合促進凝血，皆不可用於輸血管路;0.45%為低張亦不適合。本題正確為A(0.9%生理食鹽水)。","options":{"A":"正確：0.9%生理食鹽水可用於輸血管路。","B":"0.45%生理食鹽水為低張，不適合。","C":"5%葡萄糖會使紅血球凝集/溶血。","D":"10%葡萄糖會溶血，不可用。"},"sources":["輸血護理","新文京《內外科護理學》"]}},"104030-N3-42":{"quick":"輸血反應暫停輸血時應以「生理食鹽水」維持管路，不可用含鈣的林格氏液。","detail":{"background":"輸血治療要點:過敏反應通常在輸血開始(常50 mL內)發生;發燒(>38°C)、寒顫是急性溶血/熱原反應常見徵象;Rh(-)血液可給Rh(+)或(-)接受者(O型Rh-為萬用紅血球捐血者)。發生反應暫停輸血時，應以「0.9%生理食鹽水」維持管路，「不可用林格氏液(含鈣)」(會與血品檸檬酸結合致凝集)。本題問錯誤者:「給予林格氏液維持管路」錯，故選D。","options":{"A":"過敏反應常在輸血50 mL內發生正確。","B":"發燒為急性溶血反應常見徵象正確。","C":"Rh(-)可給Rh(+)或(-)接受者正確。","D":"錯誤(本題答案)：應以生理食鹽水維持管路，不可用林格氏液。"},"sources":["輸血護理","新文京《內外科護理學》"]}},"104030-N3-48":{"quick":"溶血性輸血反應多因「輸入血液與病人血型不合(ABO不相容)」。","detail":{"background":"急性溶血性輸血反應最嚴重，多因「ABO血型不相容」(常為核對錯誤)，受血者抗體攻擊輸入紅血球致血管內溶血。表徵:輸血「開始數分鐘至1小時內」出現寒顫發燒、下背/腰痛、血紅素尿、低血壓、急性腎衰竭與DIC(非2–3天後、非皮膚搔癢)。皮膚搔癢蕁麻疹是「過敏反應」。本題問正確者，故選B(血型不合)。","options":{"A":"溶血反應非過敏物質引起，是血型不合抗原抗體反應。","B":"正確：溶血性反應多因輸入血型與病人血型不合。","C":"溶血反應多在輸血數分鐘至1小時內，非2–3天後。","D":"皮膚搔癢是過敏反應，非溶血反應典型表徵。"},"sources":["輸血反應","新文京《內外科護理學》"]}},"104100-N3-40":{"quick":"輸血不可用「加壓袋加壓至360 mmHg」快速輸入(高壓致溶血)。","detail":{"background":"輸血安全:輸血前須「雙重核對」血袋與病人資料(A正確);血袋掛於適當高度利重力滴注(B正確);全程監測生命徵象(C正確)。「使用輸血加壓袋加壓至360 mmHg」必須避免—過高壓力會造成紅血球機械性「溶血」與管路爆破風險(加壓輸血壓力上限一般≤300 mmHg且須用專用設備)。本題問必須避免者，故選D。","options":{"A":"輸血前雙重核對血袋與病人資料正確。","B":"血袋掛適當高度利滴注正確。","C":"全程注意生命徵象變化正確。","D":"必須避免(本題答案)：加壓至360 mmHg會致溶血。"},"sources":["輸血安全","新文京《內外科護理學》"]}},"105030-N3-41":{"quick":"輸血反應(高燒寒顫呼吸困難)最優先「立即停止輸血」。","detail":{"background":"輸血中出現發高燒、寒顫、呼吸困難等反應，處置的「第一步」即「立即停止輸血」以阻斷反應來源，並改以生理食鹽水維持管路;接著評估生命徵象、通知醫師、依醫囑給藥(抗組織胺/退燒/類固醇)、給氧、保留血袋與血尿標本送檢。給氧、給藥、確認意識都在「停止輸血之後」。本題最優先為D(立即停止輸血)。","options":{"A":"確認意識非最優先，應先停止輸血。","B":"通知醫師給藥在停輸血之後。","C":"給氧在停止輸血之後。","D":"正確：最優先立即停止輸血。"},"sources":["輸血反應處置","新文京《內外科護理學》"]}},"105090-N3-51":{"quick":"溶血性輸血反應應停輸血但「維持靜脈輸液(生理食鹽水)」，不可暫停所有輸液。","detail":{"background":"發生溶血性輸血反應處置:立即停止輸血、但「以生理食鹽水維持靜脈輸液」以維持血壓、保護腎臟、利尿排出溶血產物(不可暫停所有輸液);觀察尿量與尿色(血紅素尿)、注意體液電解質與腎功能、保留血袋與血尿標本送檢。本題問錯誤者:「暫停任何輸液」錯(應持續NS輸液保護腎臟)，故選B。","options":{"A":"立即停止輸血正確。","B":"錯誤(本題答案)：應以NS維持輸液保護腎臟，不可暫停所有輸液。","C":"觀察小便量(血紅素尿)正確。","D":"注意體液電解質變化正確。"},"sources":["輸血反應處置","新文京《內外科護理學》"]}},"106110-N3-47":{"quick":"急性溶血性輸血反應必須「立即中斷輸血」，不可繼續。","detail":{"background":"急性溶血性輸血反應是危及生命的急症，處置:立即「停止(中斷)輸血」、以生理食鹽水維持管路與血壓;密切監測生命徵象、收集血液與尿液標本送檢比對、記錄輸出入量並監測尿量(防急性腎衰竭)。本題問錯誤者:「輸血不能中斷」錯，急性溶血反應必須立即中斷輸血，故選B。","options":{"A":"密切監測生命徵象正確。","B":"錯誤(本題答案)：急性溶血反應必須立即中斷輸血。","C":"收集血液尿液標本送檢正確。","D":"記錄輸出入量(監測腎功能)正確。"},"sources":["輸血反應處置","新文京《內外科護理學》"]}},"107030-N3-33":{"quick":"溶血性黃疸(肝前性)：肝功能正常、間接(未結合)膽紅素上升、尿膽紅素「不」增加。","detail":{"background":"輸血溶血造成的黃疸屬「肝前性(溶血性)黃疸」:大量紅血球破壞使「未結合(間接)膽紅素」上升;肝臟本身正常故「肝功能指數正常」(A正確);未結合膽紅素不溶於水、不經腎排出，故「尿膽紅素不增加」(尿膽素原可能增加);凝血酶原時間不受影響(凝血因子由肝合成，肝正常)。本題問正確者，故選A(肝功能指數正常)。","options":{"A":"正確：溶血性(肝前)黃疸肝功能指數正常。","B":"凝血酶原時間不延長(肝功能正常)。","C":"尿膽紅素不增加(未結合膽紅素不入尿)。","D":"增加的是未結合(間接)膽紅素，非結合型。"},"sources":["Harrison Jaundice","新文京《內外科護理學》"]}},"107030-N3-42":{"quick":"輸注血小板速度「不可太慢」；血小板須在短時間內輸完(過慢易失活/凝集)。","detail":{"background":"輸注血小板注意事項:血小板須「較快速」於規定時間內(通常每單位數分鐘至30分內、整體勿超過4小時)輸完，速度過慢反而使血小板失活與凝集，故「愈慢愈好」錯(A為本題答案);輸後若過敏可依醫囑給抗組織胺、類固醇;反覆輸注效果不佳(同種免疫)可改用單一供血者(HLA配對)血小板;輸後寒顫發燒屬熱原反應。本題問錯誤者，故選A。","options":{"A":"錯誤(本題答案)：血小板須較快輸完，非愈慢愈好。","B":"過敏時依醫囑給抗組織胺、類固醇正確。","C":"反覆輸注效果不佳可用單一供血者血小板正確。","D":"輸後寒顫發燒為熱原反應正確。"},"sources":["輸血護理 血小板","新文京《內外科護理學》"]}},"107030-N3-48":{"quick":"急性溶血性輸血反應「最不可能」出現血管怒張(常為低血壓休克)。","detail":{"background":"急性溶血性輸血反應(多ABO不合)典型症狀:寒顫、發燒、下背/腰痛、胸悶、血紅素尿(尿色變深紅)、低血壓甚至休克、急性腎衰竭與DIC。因發生休克時血壓下降，故「血管怒張(代表容量過載/循環充盈)」最不可能出現(溶血反應反而是低血壓);頸靜脈怒張較見於循環過度負荷(TACO)。本題問最不可能者，故選C(血管怒張)。","options":{"A":"寒顫、發燒為溶血反應常見。","B":"下背痛為溶血反應典型。","C":"最不可能(本題答案)：血管怒張(溶血反應常為低血壓)。","D":"急性腎衰竭為溶血反應併發症。"},"sources":["輸血反應","新文京《內外科護理學》"]}},"111110-N3-40":{"quick":"輸血中頭痛、咳嗽、呼吸困難、心跳加快、血壓升高，為循環過度負荷(TACO)。","detail":{"background":"輸血不良反應鑑別:循環過度負荷(TACO)因容量過載致心衰肺水腫，表現「血壓上升、呼吸困難、咳嗽、頭痛、心搏過速、頸靜脈怒張」;急性溶血反應為發燒寒顫腰痛血紅素尿低血壓;過敏反應為蕁麻疹搔癢;輸血相關急性肺損傷(TRALI)為輸血後6小時內急性低血氧肺水腫但「血壓常下降」。本例血壓「上升」最符合循環過度負荷(B)。","options":{"A":"急性溶血反應常為低血壓、腰痛、血紅素尿。","B":"正確：血壓上升、呼吸困難、咳嗽為循環過度負荷。","C":"過敏反應以蕁麻疹搔癢為主。","D":"TRALI血壓常下降、急性低血氧。"},"sources":["輸血反應TACO/TRALI","新文京《內外科護理學》"]}},"114030-N3-49":{"quick":"全血不適用於「過敏性休克」病人；過敏性休克非輸血適應症。","detail":{"background":"輸血品項與適應症:血小板濃厚液→血小板減少症;紅血球濃厚液(2單位)→提升成人血色素約1–1.2 g/dL/單位(2單位約上升2 g/dL);新鮮冷凍血漿(FFP)→補充凝血因子，用於DIC、凝血因子缺乏、大量輸血。全血用於「大量急性失血合併血容積不足」，並非用於「過敏性休克」(過敏性休克應給腎上腺素、抗組織胺、類固醇、輸液，非輸全血)。本題問錯誤者，故選C。","options":{"A":"血小板濃厚液治療血小板減少症正確。","B":"2單位紅血球濃厚液提升Hb約1–1.2 g/dL(每單位)正確。","C":"錯誤(本題答案)：全血不適用於過敏性休克。","D":"新鮮冷凍血漿適用於DIC正確。"},"sources":["輸血適應症","新文京《內外科護理學》"]}},"114100-N3-25":{"quick":"輸血中乾咳、血壓上升、嚴重呼吸困難，為循環過度負荷(TACO)。","detail":{"background":"本例輸血中出現「乾咳、血壓上升、嚴重呼吸困難」，是容量過載致急性肺水腫，最符合「循環過度負荷(TACO)」，好發於老年、心腎功能不全、輸血量/速度過快者。鑑別:過敏為蕁麻疹搔癢、熱原為發燒寒顫、溶血為腰痛血紅素尿低血壓。本題最有可能為A(循環過度負荷)。","options":{"A":"正確：乾咳、血壓上升、呼吸困難為循環過度負荷。","B":"過敏反應以蕁麻疹搔癢為主。","C":"熱原反應以發燒寒顫為主。","D":"溶血反應以腰痛、血紅素尿、低血壓為主。"},"sources":["輸血反應TACO","新文京《內外科護理學》"]}},"114100-N3-26":{"quick":"循環過度負荷處置：停/減慢輸血、採坐姿、給氧利尿，嚴重者協助放血術。","detail":{"background":"承上題(TACO循環過度負荷)的護理處置:立即停止或減慢輸血、協助病人採「坐姿/半坐臥(非平躺)」減少靜脈回流、給氧、依醫囑利尿(furosemide)、必要時嚴重者「放血術(phlebotomy)」移除部分血液減輕容量負荷。本題正確為D(協助放血術);平躺會加重肺水腫、給類固醇是過敏處置、持續輸血會惡化。故選D。","options":{"A":"應採坐姿/半坐臥，平躺會加重肺水腫。","B":"類固醇是過敏反應處置，非循環過載。","C":"循環過載應停/減慢輸血，不可持續。","D":"正確：嚴重循環過載可協助放血術減輕容量負荷。"},"sources":["輸血反應TACO處置","新文京《內外科護理學》"]}},"101030-N3-59":{"quick":"骨髓抽取部位為兩側後腸骨、前腸骨與胸骨等富含骨髓的扁平骨。","detail":{"background":"骨髓捐贈與抽取:捐贈者也可能有心理調適議題需支持(故「應沒有調適問題」錯);骨髓抽取在「手術室全身或半身(脊椎)麻醉」下進行(非僅局部麻醉);抽取部位選骨髓豐富的扁平骨—「兩側後腸骨嵴、前腸骨嵴、胸骨」等(C正確);抽取量依受髓者體重計算(常數百至約1000 mL含血)，術後需臥床觀察、補充水分鐵質，非「抽250 mL立即下床」。本題正確為C。","options":{"A":"捐贈者也可能有心理調適議題，需評估與支持。","B":"骨髓抽取採全身或半身麻醉，非僅局部麻醉。","C":"正確：抽取部位為兩側後/前腸骨、胸骨等。","D":"抽取量依體重計算且術後需臥床觀察，非立即下床。"},"sources":["Harrison HSCT","新文京《內外科護理學》"]}},"101110-N3-49":{"quick":"異體骨髓移植後免疫力低且服免疫抑制劑，外出須防曬(避免皮膚癌與光敏)，不可不防曬。","detail":{"background":"異體骨髓移植後居家護理:移植後免疫力長期低下並服用免疫抑制劑(環孢靈)，須避免進出公共場所、外出戴口罩;定時監測環孢靈血中濃度與調整;充足睡眠、發燒立即就醫。因免疫抑制劑增加「光敏感與皮膚癌風險」，外出應「防曬、穿長袖、戴帽」，不可穿短袖不防曬。本題問錯誤者:「可穿短袖不需防曬」錯，故選C。","options":{"A":"避免進出公共場所、外出戴口罩正確。","B":"服環孢靈與抗生素並監測血中濃度正確。","C":"錯誤(本題答案)：免疫抑制者外出須防曬，不可穿短袖不防曬。","D":"保持睡眠、發燒立即就醫正確。"},"sources":["移植後居家照護","新文京《內外科護理學》"]}},"102110-N3-73":{"quick":"骨髓移植前捐髓者與受髓者都需經過周延檢查與評估(含HLA配對)。","detail":{"background":"對骨髓移植的正確認識:移植前「捐髓者與受髓者都需周延檢查與HLA配對評估」以確保安全與配對成功(C正確);移植仍有風險(感染、GVHD、肝靜脈阻塞、排斥等並非無風險);適應症不限「有希望的疾病」此種模糊說法;捐贈者「不一定來自親人」(可為非親屬骨髓庫配對者)。本題正確為C。","options":{"A":"此敘述模糊，非正確認識。","B":"移植仍有相當風險，非已無風險。","C":"正確：捐髓者與受髓者移植前都需周延檢查與評估。","D":"捐贈者不一定來自親人，可為非親屬配對。"},"sources":["Harrison HSCT","新文京《內外科護理學》"]}},"103030-N3-39":{"quick":"骨髓移植前的前置治療是「高劑量化療＋全身性放射照射」，非「局部」骨髓放療。","detail":{"background":"骨髓移植前的前置處置(conditioning):給予「高劑量化學治療」與「全身性放射照射(TBI)」以摧毀病人原有惡性細胞與骨髓、抑制免疫以利植入;移植前須做「HLA配對」;並給口服腸道滅菌藥減少感染。前置放療是「全身性」而非「局部骨髓」放射治療。本題問錯誤者:「局部骨髓的放射線治療」錯，故選B。","options":{"A":"高劑量化學治療為前置處置正確。","B":"錯誤(本題答案)：前置放療為全身性照射，非局部骨髓。","C":"HLA配對檢查正確。","D":"口服腸道滅菌藥物減少感染正確。"},"sources":["Harrison HSCT Conditioning","新文京《內外科護理學》"]}},"103030-N3-44":{"quick":"輸注幹細胞「不可用一般輸血用濾網輸液套」(會濾掉幹細胞)。","detail":{"background":"周邊血液幹細胞移植:須HLA配對吻合;捐贈者施打白血球生成激素(G-CSF)動員幹細胞至周邊血再分離收集;移植前受贈者接受高劑量化療與全身放射(前置處置)摧毀免疫與骨髓。輸注幹細胞時「不可使用含濾網的標準輸血輸液套」，因濾網會濾除珍貴的幹細胞，須用專用不含過濾的套組。本題問錯誤者:「使用有濾網的輸血用輸液套」錯，故選C。","options":{"A":"HLA配對需吻合正確。","B":"施打G-CSF增加周邊幹細胞正確。","C":"錯誤(本題答案)：不可用含濾網輸血套，會濾掉幹細胞。","D":"移植前化療與全身放射破壞免疫正確。"},"sources":["周邊血幹細胞移植","新文京《內外科護理學》"]}},"104030-N3-36":{"quick":"周邊血幹細胞收集用檸檬酸抗凝，會螫合鈣致「低血鈣」(口唇麻、手腳抽筋)。","detail":{"background":"周邊血幹細胞收集(血液成分分離術)使用「檸檬酸鹽(citrate)」作為抗凝劑，檸檬酸會「螫合鈣離子」造成捐贈者暫時性「低血鈣」，出現口唇與肢端麻刺感、手腳抽筋、頭昏、發冷等低血鈣症狀(Chvostek/Trousseau徵象)。處置:補充鈣(口服或靜脈)、放慢分離速度。本題原因為低血鈣(A)。","options":{"A":"正確：檸檬酸螫合鈣致低血鈣，出現口唇麻、手腳抽筋。","B":"高血鈣症狀為嗜睡、便秘，不符。","C":"低血鉀為肌無力、心律不整，非此典型。","D":"高血鉀為心律不整，非此症狀。"},"sources":["血液成分分離術","新文京《內外科護理學》"]}},"105030-N3-38":{"quick":"周邊血幹細胞收集為非侵入性，捐贈者收集後稍事休息無不適即可返家。","detail":{"background":"周邊血液幹細胞收集:捐贈者於收集「前數天」即開始皮下注射白血球生成激素(G-CSF)動員幹細胞(非只當天打);收集採「血液成分分離術」非手術，「不需全身麻醉」;收集後捐贈者稍事休息、確認無低血鈣等不適即可返家(C正確);收集的幹細胞以冷凍保存於「-196°C液態氮」(非-40°C)。本題正確為C。","options":{"A":"周邊血幹細胞收集不需全身麻醉。","B":"G-CSF於收集前數天即開始施打，非只當天。","C":"正確：收集後稍事休息無不適即可返家。","D":"幹細胞保存於-196°C液態氮，非-40°C。"},"sources":["周邊血幹細胞移植","新文京《內外科護理學》"]}},"108110-N3-35":{"quick":"異體移植後3週紅疹＋腹瀉＋肝功能異常是「移植物抗宿主病(GVHD)」，非藥物過敏。","detail":{"background":"異體骨髓移植後出現的「全身紅疹(斑丘疹，常起於手掌腳掌)、腹瀉、肝功能異常與膽紅素上升」是「急性移植物抗宿主病(acute GVHD)」的典型三器官表現:皮膚、腸胃道、肝臟。可做皮膚切片確診;治療以類固醇與加強免疫抑制。本題問錯誤者:「顯示為嚴重藥物過敏」錯，應為GVHD，故選D。","options":{"A":"注意肝功能異常與膽紅素上升(肝GVHD)正確。","B":"可做皮膚切片確診GVHD正確。","C":"皮膚出現斑丘疹正確。","D":"錯誤(本題答案)：此為GVHD而非藥物過敏。"},"sources":["Harrison GVHD","新文京《內外科護理學》"]}},"110030-N3-41":{"quick":"GVHD侵犯皮膚、腸胃道(腹瀉)、肝臟(膽紅素上升)，不會以「便祕」表現。","detail":{"background":"移植物抗宿主病(GVHD)是異體移植中供者免疫細胞攻擊宿主組織，三大標的器官:皮膚(皮疹、紅斑、脫屑)、肝臟(膽紅素上升、肝功能受損)、腸胃道(嚴重「腹瀉」、腹痛、噁心)。GVHD的腸胃道表現是腹瀉而非便祕。本題問錯誤者:「便祕」錯，故選D。","options":{"A":"膽紅素上升(肝GVHD)正確。","B":"皮疹(皮膚GVHD)正確。","C":"肝功能受損(肝GVHD)正確。","D":"錯誤(本題答案)：GVHD腸胃道表現為腹瀉，非便祕。"},"sources":["Harrison GVHD","新文京《內外科護理學》"]}},"111030-N3-36":{"quick":"移植後2週黃疸、腹水、體重增加，最可能為「肝靜脈阻塞疾病(VOD/SOS)」。","detail":{"background":"肝靜脈阻塞疾病(VOD，又稱肝竇阻塞症候群SOS)是骨髓移植前置處置(高劑量化放療)損傷肝竇內皮所致，多在「移植後3週內」出現:右上腹痛、「黃疸、腹水、體重增加(體液滯留)、肝腫大」三聯。本例移植後2週黃疸腹水體重增加最符合VOD(C)。慢性GVHD多於移植100天後;間質性肺炎以呼吸症狀為主。","options":{"A":"感染以發燒為主，不符黃疸腹水。","B":"間質性肺炎以呼吸症狀為主。","C":"正確：移植後黃疸、腹水、體重增加為肝靜脈阻塞疾病(VOD)。","D":"慢性GVHD多於移植100天後出現。"},"sources":["Harrison VOD/SOS","新文京《內外科護理學》"]}},"111030-N3-37":{"quick":"異體移植後早期(2週內)感染以「細菌與黴菌」為主；巨細胞病毒(CMV)多在中期(約30–100天)。","detail":{"background":"異體骨髓移植合併症:移植前曾肝炎者增加肝靜脈阻塞(VOD)機率;急性GVHD以皮膚、腸胃道、肝臟為主;慢性GVHD發生率與年齡相關(年長者較高)。感染時序:早期(植入前約0–30天，嗜中性球低下)以「細菌與黴菌(念珠菌、麴菌)、HSV」為主;中期(約30–100天)以「巨細胞病毒(CMV)、PCP」為主;晚期以莢膜菌為主。故「移植後2星期內感染以CMV最常見」錯(2週內以細菌黴菌為主)。本題問錯誤者，故選D。","options":{"A":"移植前肝炎增加肝靜脈阻塞機率正確。","B":"急性GVHD以皮膚、腸胃道、肝臟為主正確。","C":"慢性GVHD發生率與年齡有關正確。","D":"錯誤(本題答案)：2週內感染以細菌黴菌為主，CMV在中期。"},"sources":["Harrison HSCT Infection Timeline","新文京《內外科護理學》"]}},"112030-N3-36":{"quick":"異體周邊血幹細胞移植宿主「較易」發生慢性GVHD。","detail":{"background":"異體周邊血液幹細胞移植:捐贈者「需」施打白血球生成激素(G-CSF)動員幹細胞(故A錯);受贈者與捐贈者HLA配對「需吻合」(配對不合會嚴重排斥/GVHD，故B錯);因周邊血幹細胞產品含較多T淋巴球，「宿主較易發生慢性GVHD」(C正確);移植後免疫低下「易受病毒感染(如CMV)」(故D錯)。本題正確為C。","options":{"A":"捐贈者需施打G-CSF動員幹細胞。","B":"HLA配對需吻合。","C":"正確：異體周邊血幹細胞移植宿主較易有慢性GVHD。","D":"移植後免疫低下易受病毒感染。"},"sources":["Harrison HSCT","新文京《內外科護理學》"]}},"112110-N3-33":{"quick":"急性GVHD多在移植後100天內，主要侵犯表皮(皮膚)、腸胃道與肝臟。","detail":{"background":"急性移植物抗宿主病(acute GVHD):通常發生於移植後「100天內」(非6個月);主要侵犯「皮膚(表皮，斑丘疹起於手掌腳掌)、腸胃道(腹瀉)、肝臟(膽紅素上升)」三器官(並非全身所有器官皆侵犯);是供者T細胞辨識宿主抗原引發的「免疫發炎反應」(會有發炎)。本題問正確者:「大多是表皮組織受到破壞」(皮膚為最常見受侵器官)，故選D。","options":{"A":"急性GVHD多在移植後100天內，非六個月。","B":"主要侵犯皮膚、腸胃道、肝臟，非全身所有器官。","C":"GVHD是免疫發炎反應，會有發炎。","D":"正確：急性GVHD大多侵犯表皮(皮膚)組織。"},"sources":["Harrison GVHD","新文京《內外科護理學》"]}},"112180-N3-27":{"quick":"移植後2週右上腹痛、黃疸、腹水，最可能為肝靜脈阻塞疾病(VOD)。","detail":{"background":"肝靜脈阻塞疾病(VOD/SOS)為前置高劑量化放療傷害肝竇內皮，於「移植後約3週內」出現:右上腹痛、肝腫大壓痛、黃疸、腹水與體重增加。本例移植後2週右上腹痛＋黃疸＋腹水最符合VOD(C)。鑑別:急性GVHD以皮疹腹瀉肝功能異常為主、感染以發燒為主、腸阻塞以腹脹嘔吐停止排氣便為主。","options":{"A":"感染以發燒為主，不符。","B":"急性GVHD以皮疹、腹瀉為主。","C":"正確：移植後黃疸、腹水、右上腹痛為肝靜脈阻塞(VOD)。","D":"腸阻塞以腹脹嘔吐為主。"},"sources":["Harrison VOD/SOS","新文京《內外科護理學》"]}},"113030-N3-25":{"quick":"供髓者抽出的骨髓經過濾後可立即輸注給受髓者。","detail":{"background":"骨髓捐贈(供髓者)護理:骨髓抽取於「全身或半身麻醉」下進行(故A「半身麻醉」雖可，但本題以D為正確答案);抽取量依受髓者體重計算(常約10–15 mL/kg、總量數百至約1000 mL，故「約100 c.c.」太少);術後須臥床休息、補水補鐵(故「不需平躺」錯);抽出的骨髓「經過濾(去骨片脂肪)後可立即靜脈輸注給受髓者」(D正確)。本題正確為D。","options":{"A":"骨髓抽取多採全身麻醉(半身亦可)，非本題正解。","B":"抽取量依體重計算，約100 c.c.太少。","C":"術後需平躺休息觀察，非不需平躺。","D":"正確：骨髓過濾後可立即輸注給受髓者。"},"sources":["Harrison HSCT","新文京《內外科護理學》"]}},"114030-N3-25":{"quick":"急性骨髓性白血病第一次完全緩解後接受自體骨髓移植，5年存活率相對最高。","detail":{"background":"造血幹細胞移植的療效與疾病類型、緩解狀態相關:在「第一次完全緩解(CR1)」時移植，因腫瘤負荷最低、療效最好。本題四選項比較，官方答案為「急性骨髓性白血病第一次完全緩解後接受自體骨髓移植(A)」5年存活率最高。重點觀念:於CR1早期移植、疾病對治療反應佳者預後較好。本題選A。","options":{"A":"正確(本題答案)：AML第一次完全緩解後自體骨髓移植5年存活率最高。","B":"AML自體周邊血幹細胞移植，本題以A為最高。","C":"ALL自體骨髓移植存活率較A低。","D":"ALL自體周邊血幹細胞移植存活率較A低。"},"sources":["Harrison HSCT Outcomes","新文京《內外科護理學》"]}},"101030-N3-62":{"quick":"改良型乳房根除術後患側手臂「禁止量血壓、抽血、打針」以防淋巴水腫。","detail":{"background":"改良型乳房根除術(MRM)切除全乳房與腋下淋巴結但「保留胸大肌」(傳統根除術才切胸大肌)。因切除腋下淋巴結，患側手臂淋巴回流受阻，「易發生淋巴水腫」，故術後患側手臂「禁止量血壓、抽血、注射、提重物、束緊」以免加重水腫與感染;術後早期應循序漸進復健(初期手肘以下小範圍，數天後再做爬牆等大關節運動)，避免過早大動作牽扯傷口。本題正確為B(禁止量血壓抽血)。","options":{"A":"改良型根除術保留胸大肌，非移除。","B":"正確：患側手臂禁止量血壓、抽血等以防淋巴水腫。","C":"術後初期應循序復健，洗臉等需依進度，非立即大動作。","D":"術後易發生淋巴水腫，非極少。"},"sources":["新文京《內外科護理學》乳癌","NCCN Breast Cancer"]}},"102030-N3-44":{"quick":"賀癌平(Herceptin/trastuzumab)主要副作用是「心臟毒性」，非嚴重脫髮。","detail":{"background":"賀癌平(trastuzumab)是抗HER2的「單株抗體」標靶藥，用於HER2過度表現的轉移性乳癌。主要副作用是「心臟毒性(左心室功能下降、心衰)」，故使用前與使用期間須監測心臟功能(LVEF);輸注反應(發冷發燒)也常見;但「嚴重脫髮」並非trastuzumab的特徵副作用(脫髮主要是傳統細胞毒性化療)。本題問錯誤者:「有嚴重脫髮的副作用」錯，故選C。","options":{"A":"用於HER2過度表現之轉移性乳癌正確。","B":"為單株抗體正確。","C":"錯誤(本題答案)：主要副作用是心臟毒性，非嚴重脫髮。","D":"使用前及期間需監測心臟功能正確。"},"sources":["Katzung trastuzumab","NCCN Breast Cancer"]}},"103030-N3-38":{"quick":"乳癌蕈狀傷口、拒看鏡子、無法接受外觀，健康問題是「身體心像紊亂」。","detail":{"background":"本例葉太太因乳癌合併蕈狀傷口、「無法接受自己的外觀、拒絕用鏡子看傷口、自暴自棄」，反映對自身身體外觀與完整性的負向認知與情緒，最符合「身體心像紊亂(disturbed body image)」的護理診斷。雖也可能伴焦慮或哀傷，但核心問題是對外觀/身體形象的困擾。護理:接納情緒、漸進面對傷口、轉介支持團體、必要時心理諮商。本題為B(身體心像紊亂)。","options":{"A":"焦慮非本例核心(核心是外觀身體形象困擾)。","B":"正確：拒看外觀、無法接受身體改變為身體心像紊亂。","C":"預期性哀傷是針對預期失落，非本例核心。","D":"不遵從與治療配合有關，非本例。"},"sources":["NANDA 身體心像紊亂","新文京《內外科護理學》"]}},"105090-N3-38":{"quick":"乳房根除術後肩關節運動可促進淋巴回流、改善與預防淋巴水腫。","detail":{"background":"改良式乳房根除術後復健:循序漸進的「肩關節運動(爬牆、轉繩、鐘擺)」可促進淋巴與靜脈回流、維持關節活動度、預防與改善淋巴水腫(A正確);改良式根除術「保留胸大肌」(故B「切除胸大肌」錯);淋巴水腫可能在術後早期或數月甚至數年後發生(非固定1個月);復健應循序漸進，「術後初期做小範圍、約術後數天再逐步增加」，非術後3天就立即做全關節運動(以免牽扯傷口)。本題正確為A。","options":{"A":"正確：肩關節運動可改善淋巴水腫。","B":"改良式根除術保留胸大肌，非切除。","C":"淋巴水腫不限術後1個月，可較早或更晚。","D":"復健應循序漸進，非術後3天就做全關節運動。"},"sources":["新文京《內外科護理學》乳癌復健","NCCN"]}},"105090-N3-43":{"quick":"生產次數「多」是乳癌的「保護因子」，非高危險群。","detail":{"background":"乳癌危險因子(與雌激素暴露時間相關):家族史(母親姊妹罹患、BRCA基因)、高脂肪飲食/肥胖、初經早、停經晚(雌激素暴露長)、未生育或晚生育、未哺乳、長期荷爾蒙補充。「多次生產與哺乳」會「降低」乳癌風險(屬保護因子)。本題問錯誤者:「生產次數越多者(為高危險群)」錯，故選D。","options":{"A":"母親或姊妹罹患乳癌為危險因子。","B":"高脂肪飲食為危險因子。","C":"初經早、停經晚(雌激素暴露長)為危險因子。","D":"錯誤(本題答案)：多次生產是保護因子，非高危險群。"},"sources":["NCCN Breast Cancer Risk","新文京《內外科護理學》"]}},"106030-N3-41":{"quick":"乳癌的腫瘤標記不是固定「CEA 1.0~3.0」；CEA非乳癌特異標記、數值非診斷依據。","detail":{"background":"乳癌敘述:高脂肪飲食/肥胖罹患率較高(A正確);腫塊最常見於「乳房外上1/4」(因該處乳腺組織最多)(B正確);乳癌會侵犯淋巴系統(腋下淋巴結)(D正確)。「乳癌病人CEA值介於1.0~3.0 ng/mL」此敘述錯誤—CEA非乳癌特異標記(乳癌追蹤用CA15-3、CEA)，且腫瘤標記數值不能如此一概而論作為診斷。本題問錯誤者，故選C。","options":{"A":"高脂肪飲食者罹患率較高正確。","B":"腫塊最常見於乳房外上1/4正確。","C":"錯誤(本題答案)：CEA非乳癌特異標記，數值非如此固定。","D":"乳癌會侵犯淋巴系統正確。"},"sources":["NCCN Breast Cancer","新文京《內外科護理學》"]}},"107030-N3-37":{"quick":"乳癌術後復健循序漸進：術後約2天可做手肘以下關節運動。","detail":{"background":"乳癌術後患肢復健應「循序漸進」:術後初期(約24–48小時、約第2天)即可開始「手肘以下(手指、手腕)的小範圍關節運動」促進循環、預防淋巴水腫(B正確);不需等引流管拔除才開始復健(早期小範圍活動是安全的);刷牙洗臉等日常輕度活動可較早進行(非要等4–7天);劇烈活動如游泳須等傷口完全癒合(非術後1週)。本題正確為B(術後2天可做手肘以下關節運動)。","options":{"A":"引流管拔除前仍可做小範圍復健，非完全不能做。","B":"正確：術後約2天可做手肘以下關節運動。","C":"刷牙洗臉等輕度活動可較早進行。","D":"游泳須等傷口完全癒合，非術後1週。"},"sources":["新文京《內外科護理學》乳癌復健","NCCN"]}},"110030-N3-40":{"quick":"預防淋巴水腫：臥床時用枕頭墊高患臂，使手腕高於手肘、手肘高於肩膀(促進回流)。","detail":{"background":"預防乳癌術後淋巴水腫:臥床或休息時「抬高患肢，使手腕高於手肘、手肘高於肩膀」，利用重力促進淋巴與靜脈回流(D正確);復健循序漸進(手指手腕運動可早期開始);爬牆、轉繩等大關節運動須待「引流管拔除後」再做(有引流管時做會牽扯傷口，故B錯);側臥時患臂的擺位以舒適並抬高為原則。本題正確為D。","options":{"A":"手指屈曲腕部伸展可更早(約術後1–2天)開始。","B":"爬牆轉繩等大動作須待引流管拔除後才做。","C":"此擺位描述不利回流，非最佳。","D":"正確：墊高患臂使手腕>手肘>肩膀促進回流。"},"sources":["新文京《內外科護理學》淋巴水腫","NCCN"]}},"110030-N3-47":{"quick":"乳癌腫塊「多為無痛性」硬塊，非多數有疼痛感。","detail":{"background":"乳癌敘述:約5–10%與遺傳(BRCA)有關;乳房自我檢查無法檢測到所有腫瘤(仍須影像篩檢);最常發生於「乳房外上1/4」;典型表現為「無痛性、質硬、邊界不清、固定」的腫塊，伴乳頭凹陷、皮膚橘皮樣變、乳頭異常分泌。「多數乳癌腫塊有疼痛感」錯—乳癌腫塊多為無痛性(疼痛性腫塊較常見於良性如纖維囊腫)。本題問錯誤者，故選B。","options":{"A":"約5–10%乳癌與遺傳有關正確。","B":"錯誤(本題答案)：乳癌腫塊多為無痛性，非多數疼痛。","C":"乳房自我檢查不能檢測所有腫瘤正確。","D":"最常發生於乳房外上1/4正確。"},"sources":["NCCN Breast Cancer","新文京《內外科護理學》"]}},"111030-N3-42":{"quick":"乳頭下腫塊會牽扯造成乳頭回縮或高低不一，是乳癌徵象。","detail":{"background":"乳癌症狀與分期:好發於「乳房外上1/4」(非內上，故A錯);腫塊多為「無痛性」(故C「疼痛性腫塊」錯);乳頭下/乳暈後腫塊會牽扯韌帶造成「乳頭回縮、乳頭位置高低不一」、皮膚凹陷或橘皮樣變(D正確);分期方面T2N1M0依AJCC約為IIB期(非第三期，故B錯)。本題問正確者，故選D。","options":{"A":"乳癌好發於乳房外上1/4，非內上。","B":"T2N1M0約為IIB期，非第三期。","C":"乳癌腫塊多為無痛性，非疼痛性。","D":"正確：乳頭下腫塊牽扯致乳頭回縮或高低不一。"},"sources":["AJCC Breast Cancer","新文京《內外科護理學》"]}},"113030-N3-21":{"quick":"trastuzumab(Herceptin)為靜脈滴注給藥，須監測心臟功能(14)。","detail":{"background":"trastuzumab(Herceptin)是抗HER2單株抗體:1為「靜脈滴注」給藥(非口服，故2錯);主要副作用是「心臟毒性」，須在使用前與使用期間「監測心臟功能(LVEF)」(4正確);輸注反應(發冷發燒)常見;丘疹、手足症候群是「小分子標靶(如EGFR抑制劑、sorafenib)」的皮膚副作用(故3非trastuzumab重點)。故正確組合為1、4(B)。","options":{"A":"含3(丘疹手足症候群非trastuzumab重點)。","B":"正確：1靜脈滴注、4監測心臟功能。","C":"含2(口服錯)、3。","D":"含2(空腹口服錯)。"},"sources":["Katzung trastuzumab","NCCN"]}},"113100-N3-33":{"quick":"Letrozole(芳香環酶抑制劑)用於「停經後」婦女，非轉移乳癌第一線通用、亦非僅服2–5年此敘述。","detail":{"background":"乳癌荷爾蒙(內分泌)治療:用於ER或PR陽性者，療效較好(C正確);停經後婦女效果通常較好(B正確);抗雌激素(tamoxifen)與芳香環酶抑制劑(letrozole)會降低雌激素，導致「骨質疏鬆」，需定期骨密度檢查(D正確)。Letrozole(Femara)是「芳香環酶抑制劑」，僅適用於「停經後」婦女(停經前卵巢仍製造雌激素，芳香環酶抑制劑無效)，且輔助治療療程常達5年甚至延長—題敘「轉移性乳癌第一線、需服2~5年」之定位不正確。本題問錯誤者，故選A。","options":{"A":"錯誤(本題答案)：Letrozole用於停經後婦女，此第一線與2–5年定位不正確。","B":"停經後婦女荷爾蒙治療效果較好正確。","C":"ER/PR陽性者治療效果較好正確。","D":"抗雌激素治療致骨質疏鬆，需定期骨密度檢查正確。"},"sources":["NCCN Breast Cancer Endocrine Tx","新文京《內外科護理學》"]}},"110110-N3-39":{"quick":"化學治療是使用具細胞毒性的藥物來縮小腫瘤或控制症狀。","detail":{"background":"化學治療(化療)的特性:使用「細胞毒性藥物」干擾癌細胞的分裂與生長，以縮小腫瘤、控制症狀或清除微轉移(A正確)。多數化療藥「無法有效通過血腦障壁(BBB)」，故中樞侵犯需鞘內給藥(故B錯);常採「多種藥物合併(combination)」以增加療效並降低抗藥性，但「副作用也會增加」(C雖也描述合併治療，但題目正解取A);現行治療並非「高劑量、低毒性」而是依方案給予足量並安排療程間隔讓正常組織恢復(故D錯)。本題正確為A。","options":{"A":"正確：化療使用細胞毒性藥物縮小腫瘤或控制症狀。","B":"多數化療藥不易通過血腦障壁，需鞘內給藥。","C":"合併多藥可增療效但副作用增加，惟本題正解取A。","D":"非高劑量低毒性、減少次數，而是足量並安排療程恢復。"},"sources":["Katzung Chemotherapy","新文京《內外科護理學》"]}},"106110-N3-34":{"quick":"錯誤者：動情素/黃體素受體(ER/PR)含量越「高」，荷爾蒙治療反應越好(非越低越好)。","detail":{"background":"乳癌荷爾蒙(內分泌)治療適用於荷爾蒙受體陽性(ER/PR陽性)的腫瘤，作用是阻斷雌激素對癌細胞的刺激。關鍵原則：腫瘤的「動情素受體(ER)與黃體素受體(PR)含量越高、陽性度越強，對荷爾蒙治療的反應越好」；受體陰性者反應差。Tamoxifen(選擇性雌激素受體調節劑)是轉移性乳癌與輔助治療常用藥，一般療程約5年(部分延長至10年)；停經後婦女除Tamoxifen外更常用芳香環酶抑制劑，療效佳。常見副作用有倦怠、皮膚癢、噁心嘔吐、潮紅、停經症狀，Tamoxifen並增加子宮內膜癌與血栓風險。故「受體含量越低反應越好」與事實相反，為錯誤。","options":{"A":"正確。可有倦怠、皮膚癢、噁心嘔吐等副作用。","B":"正確。停經後婦女(可用芳香環酶抑制劑等)治療效果良好。","C":"正確。Tamoxifen為轉移性乳癌常用藥，療程一般約5年。","D":"錯誤(本題答案)。ER/PR受體含量越「高」反應越好，非越低越好。"},"sources":["新文京《內外科護理學》乳癌與荷爾蒙治療","乳癌荷爾蒙受體與內分泌治療(Tamoxifen)"]}}},TO=["H1腫瘤學總論與致癌危險因子", "H2癌症分期腫瘤標記與診斷檢查", "H3化學治療藥物與給藥", "H4化療副作用骨髓抑制與感染防護", "H5放射線治療", "H6癌症疼痛安寧與瀕死照護", "H7癌症急症", "H8貧血與紅血球疾病", "H9白血病骨髓檢查與血球基礎", "H10淋巴瘤與多發性骨髓瘤", "H11出血與凝血疾病", "H12輸血與血品", "H13造血幹細胞與骨髓移植", "H14乳癌"],LEC={"H1腫瘤學總論與致癌危險因子":{"title":"H1 腫瘤學總論與致癌危險因子 複習講義","html":"<h3>一、良性 vs 惡性(最常考)</h3><p>判別核心是「<b>生物行為</b>」而非大小或部位。<b>良性</b>：分化良好、生長慢、<b>有纖維被膜</b>、膨脹性生長、邊界清楚可動、<b>不浸潤不轉移</b>。<b>惡性</b>：分化不良(anaplasia)、生長快(對數生長)、<b>無被膜</b>、<b>浸潤</b>破壞、<b>會轉移</b>(致死關鍵)、喪失接觸抑制、誘導血管新生。但良性長在<b>密閉腔(顱內)</b>仍可壓迫致命。</p><h3>二、腫瘤命名</h3><p>上皮惡性→<b>癌(carcinoma)</b>；間葉/結締組織(骨、軟骨、脂肪、肌肉)惡性→<b>肉瘤(sarcoma)</b>；造血淋巴→白血病/淋巴瘤；-oma多為良性。</p><h3>三、轉移</h3><p>途徑：<b>淋巴(癌)、血行(肉瘤)、體腔種植</b>。最常轉移到<b>肺、肝、骨、腦</b>(腎較少)。</p><h3>四、致癌危險因子與病毒</h3><p>菸酒檳榔、肥胖高脂、醃漬(亞硝胺)、石綿→肺/間皮、苯→白血病、苯胺染料→膀胱、甲醛→鼻咽。<b>致癌病毒</b>：HPV→子宮頸；EBV→鼻咽、Burkitt；B/C肝→肝癌；幽門桿菌(細菌)→胃癌。<b>A肝不致肝癌</b>。</p><h3>五、預防三段</h3><p>初級=健康促進與特殊保護(疫苗、戒菸)；次級=<b>早期發現(篩檢、定期身體檢查)</b>；三級=復健。</p>"},"H2癌症分期腫瘤標記與診斷檢查":{"title":"H2 癌症分期、腫瘤標記與診斷 複習講義","html":"<h3>一、TNM分期</h3><p><b>T</b>原發腫瘤(Tis原位癌、Tx無法評估、T0無原發)；<b>N</b>淋巴結(Nx無法評估、N1–3轉移)；<b>M</b>遠端轉移(M0無、M1有)。前綴：<b>c</b>臨床、<b>p</b>病理(術後)、<b>y</b>治療後、<b>r</b>復發。<b>G</b>分化級數：G1良好→<b>G4最差(未分化)</b>。何杰金氏用<b>Ann Arbor</b>(I單區、II橫膈同側≥2區、III橫膈兩側、IV結外瀰漫)。</p><h3>二、腫瘤標記(用於追蹤監測，非單獨診斷)</h3><p>肝癌–<b>AFP</b>；攝護腺–<b>PSA</b>；乳癌–<b>CEA/CA15-3</b>；大腸直腸–CEA；卵巢–CA125；胰臟膽道–CA19-9；鼻咽–EBV；生殖細胞–AFP/β-hCG。</p><h3>三、診斷檢查</h3><p>影像(超音波/CT/MRI/PET)<b>找病灶</b>；<b>組織病理切片(biopsy)是確診黃金標準</b>，內視鏡可直視兼切片。刮取細胞學適合篩檢不能確診。裝節律器者禁MRI；高血糖影響PET。</p>"},"H3化學治療藥物與給藥":{"title":"H3 化學治療藥物與給藥 複習講義","html":"<h3>一、細胞週期與藥物</h3><p>週期：G1→S(DNA合成)→G2→M(有絲分裂)；<b>G0休止期</b>細胞化療難毒殺(復發來源)。<b>長春花鹼(vincristine)作用M期</b>；抗代謝(MTX、5-FU、Ara-C)作用S期；烴基類/白金類為週期非特異。化療毒殺<b>快速分裂</b>細胞(骨髓、毛囊、腸黏膜、生殖)，<b>神經細胞分裂慢</b>影響小。</p><h3>二、化療分類</h3><p><b>誘導性</b>=高劑量多藥達緩解；鞏固/增強=清除殘存；維持=長期低劑量；輔助=術後清微轉移；新輔助=術前縮瘤；救援=復發再治療。</p><h3>三、藥物準備(防護)</h3><p><b>垂直層流生物安全櫃</b>調配；穿防水長袖隔離衣、戴口罩帽子護目鏡手套；抽藥維持vial內<b>負壓</b>防氣霧；廢棄物丟<b>細胞毒性專用容器</b>。</p><h3>四、外滲(extravasation)處置★</h3><p><b>發泡劑(vesicant)</b>：anthracyclines(doxorubicin)、vinca(vincristine)、mitomycin→外滲致壞死。處置：<b>①立即停止注射但先不拔針②由原針回抽殘留藥液③解毒劑④抬高患肢、勿加壓</b>。冷熱敷依藥性：多數發泡劑<b>冷敷</b>，但<b>植物鹼(vinca)用溫熱敷</b>。</p><h3>五、給藥途徑與特殊藥</h3><p>Port-A：<b>局部麻醉</b>植入、尖端達上腔靜脈、用<b>無損傷(Huber)針</b>、注發泡藥前測回血。<b>難過血腦障壁→鞘內(腰椎穿刺/Ommaya)</b>。cisplatin腎/耳毒性、補鎂；cyclophosphamide<b>出血性膀胱炎</b>(水化+mesna)；doxorubicin<b>心臟毒性</b>。</p>"},"H4化療副作用骨髓抑制與感染防護":{"title":"H4 化療副作用、骨髓抑制與感染防護 複習講義","html":"<h3>一、骨髓抑制(最重要)</h3><p>化療毒殺骨髓→白血球↓(感染)、血小板↓(出血)、紅血球↓(貧血)。<b>谷底(nadir)約給藥後7–14天</b>。</p><h3>二、ANC計算與感染風險★</h3><p><b>ANC＝WBC×(Seg%＋Band%)</b>。≥1500正常；500–1000中度低下；<b>&lt;500嚴重→保護隔離</b>。可給<b>G-CSF</b>升嗜中性球。判斷感染風險看<b>ANC</b>(非總白血球)。</p><h3>三、保護(反向)隔離</h3><p>用<b>正壓</b>單人病房(非負壓！)；ANC&lt;500執行；嗜中性球低下時感染症狀<b>不典型</b>(發燒可能是唯一表現)→<b>發燒不可自行退燒，須就醫經驗性抗生素</b>。低菌飲食：避生食、生菜、未削皮水果、活菌(優格養樂多)；可吃<b>可剝皮的柑橘</b>。</p><h3>四、口腔黏膜炎(stomatitis)</h3><p>保持<b>濕潤</b>、軟毛牙刷、餐前xylocaine減痛、餐後不含酒精漱口液清潔、進食非刺激溫涼軟食、<b>持續良好口腔清潔最能減痛</b>。Nystatin治念珠菌。免疫低下易<b>HSV-1疱疹性口腔炎</b>(早期用Acyclovir)。</p><h3>五、其他副作用</h3><p>噁心嘔吐、落髮、出血性膀胱炎、疲倦。放射皮膚反應另見H5。</p>"},"H5放射線治療":{"title":"H5 放射線治療 複習講義","html":"<h3>一、放射敏感度</h3><p>與<b>分裂速率成正比、與分化成反比</b>；含氧高較敏感。<b>淋巴瘤、白血病、生殖細胞瘤、皮膚癌敏感</b>；<b>軟骨肉瘤、神經細胞放射抗性</b>(效果差)。</p><h3>二、輻射防護三原則★</h3><p><b>時間短(集中護理)、距離遠(強度與距離平方成反比)、屏蔽(鉛板)</b>。脫落射源用<b>長柄鑷子</b>夾入鉛桶；勿徒手。</p><h3>三、體內放療(近接)</h3><p><b>密封式</b>：射源在容器內，<b>排泄物不具放射性</b>，但病人本身是輻射源→限制訪客時間距離、住單人房。<b>非密封式(如I-131)</b>：排泄物具放射性。</p><h3>四、皮膚照護★</h3><p>勿洗去定位標記；<b>清水輕柔清潔、勿用肥皂搓洗</b>、勿含酒精/香精乳液、勿熱敷日曬、電動刮鬍刀。急性反應：紅斑→乾性脫屑→<b>濕性脫屑(滲液)用NS沖洗+親水敷料(DuoDerm)</b>。<b>色素沉著屬慢性反應</b>。</p><h3>五、頭頸/胸壁放療</h3><p>口乾(唾液腺破壞)、口腔黏膜炎、味覺改變(多可恢復)、最大張口運動防牙關緊閉；胸壁放療致<b>放射性食道炎</b>(吞嚥痛、胸口灼熱)。</p>"},"H6癌症疼痛安寧與瀕死照護":{"title":"H6 癌症疼痛、安寧與瀕死照護 複習講義","html":"<h3>一、WHO癌痛三階梯★</h3><p>原則：<b>口服優先(by mouth)、按時給藥(by the clock)、階梯漸進(by the ladder)、個別化</b>。第一階<b>非鴉片(NSAID/acetaminophen)</b>→第二階弱效鴉片→第三階強效鴉片(嗎啡)。純鴉片<b>無天花板效應</b>；<b>解毒劑Naloxone</b>。Fentanyl貼片<b>強效</b>、72小時換、貼平坦完整皮膚、避熱源。Meperidine不用於慢性癌痛。<b>PCA</b>可減量貼合需求。</p><h3>二、安寧緩和</h3><p><b>不以治癒為目標</b>，重症狀控制與生活品質；<b>四全(全人全家全隊全程)</b>，家屬為照護對象；可居家不限住院；末期仍可緩解性放療。</p><h3>三、Kübler-Ross五階段★</h3><p><b>否認→憤怒(「為什麼是我」)→磋商(交換時間/撐到某事)→憂鬱(失落悲傷)→接受</b>。可反覆跳躍。</p><h3>四、瀕死照護</h3><p>知覺消退<b>聽覺最後消失</b>(持續溫和說話)；意識不清者<b>側臥</b>利分泌物流出；<b>嘎嘎音(death rattle)不抽痰</b>(改側臥引流、減分泌)；不勉強進食；肛周用氧化鋅。臨終關懷採<b>開放溝通</b>、評估調適、主動陪伴(四道人生)。</p>"},"H7癌症急症":{"title":"H7 癌症急症 複習講義","html":"<h3>一、上腔靜脈症候群(SVCS)</h3><p>縱膈病灶壓迫上腔靜脈，最常見<b>肺癌</b>。症狀：臉頸上肢腫脹、靜脈怒張、頭痛、呼吸困難，<b>平躺/晨起加重</b>。處置：<b>半坐臥抬高床頭</b>、放療(最常用)/化療。</p><h3>二、腫瘤溶解症候群(TLS)★</h3><p>大量癌細胞崩解→<b>高血鉀、高血磷、高尿酸、低血鈣</b>＋急性腎損傷。處置：<b>大量水化(輸液，非減少)</b>、allopurinol/rasburicase降尿酸、Sodium Bicarbonate鹼化尿液、Kayexalate降鉀、必要時透析；<b>不輸維生素C</b>(代謝草酸傷腎)。</p><h3>三、惡性高血鈣症</h3><p>骨轉移/PTHrP致高血鈣，常見乳癌、肺癌、骨髓瘤。症狀：<b>意識混亂、嗜睡、噁心嘔吐、便秘、多尿、心律不整</b>。處置：<b>NS水化＋雙磷酸鹽(Zometa)</b>、降鈣素；避高鈣飲食。</p><h3>四、惡性脊髓壓迫</h3><p>常見乳癌/肺/攝護腺骨轉移，最好發<b>胸椎</b>。症狀：<b>背痛(最早)</b>、感覺運動障礙、大小便失禁、Babinski陽性(<b>非Brudzinski</b>)。急給類固醇＋放療/減壓手術。</p>"},"H8貧血與紅血球疾病":{"title":"H8 貧血與紅血球疾病 複習講義","html":"<h3>一、缺鐵性貧血(最常見)</h3><p>小球低色素；<b>蒼白、平滑舌炎、匙狀甲、吞嚥困難、異食癖</b>。鐵劑：<b>空腹/兩餐間服</b>、配<b>維生素C</b>、避牛奶/茶/制酸劑/玉米(抑制吸收)、吸管服液態鐵+漱口防染色、肌注用<b>Z型</b>不按摩；糞便變黑。<b>動物性(血基質)鐵較易吸收</b>。</p><h3>二、惡性貧血(維生素B12缺乏)★</h3><p>胃壁細胞/內在因子缺乏(<b>胃切除、自體免疫</b>)→巨球性、<b>大球性RBC</b>、牛肉舌、<b>神經症狀(手足麻木、協調差)</b>(與缺鐵鑑別點)、間接膽紅素↑。<b>Schilling試驗</b>診斷；<b>終生肌注B12</b>。</p><h3>三、再生不良性貧血</h3><p>骨髓被破壞→<b>全血球減少(pancytopenia)</b>；可幹細胞移植。</p><h3>四、紅血球增多症/真性紅血球增多症</h3><p>血液濃稠→<b>臉紅暗紅(非蒼白)、搔癢、頭痛、血栓、出血、痛風</b>(感染非併發症)。護理：<b>多喝水稀釋、適度活動防血栓(勿久臥)</b>。</p><h3>五、EPO</h3><p>紅血球生成素由<b>腎(主)、肝</b>製造，障礙致貧血(腎性貧血)。</p>"},"H9白血病骨髓檢查與血球基礎":{"title":"H9 白血病、骨髓檢查與血球基礎 複習講義","html":"<h3>一、白血球與血球常值</h3><p><b>嗜中性球50–70%</b>主吞噬趨化(抗細菌主力)；淋巴球20–40%；單核球2–8%；嗜酸/鹼性少量。成人男Hb約14–18、Hct 42–52%、WBC 4000–10000。</p><h3>二、白血病分類★</h3><p>急性=芽細胞(blast)增生、進展快；慢性=較成熟細胞、進展慢。<b>CML：>90%費城染色體(BCR-ABL)、白血球極高、脾腫大、血小板常增多</b>(用酪胺酸激酶抑制劑)；<b>CLL：成熟小淋巴球增生、好發>50歲、早期觀察</b>。死因以<b>感染、出血</b>為主。</p><h3>三、診斷與緩解</h3><p>確診靠<b>骨髓抽吸/切片</b>(芽細胞比例、染色體、免疫表型)。<b>完全緩解</b>：骨髓芽細胞&lt;5%、周邊血<b>無芽細胞</b>、造血恢復、無器官浸潤。</p><h3>四、骨髓檢查</h3><p>成人抽吸部位<b>後腸骨嵴(最常)、胸骨</b>；<b>脛骨用於嬰幼兒</b>。局部麻醉、術後砂袋加壓≥5分鐘、觀察出血感染。預防中樞侵犯用<b>鞘內注射</b>(非注入骨髓)。</p>"},"H10淋巴瘤與多發性骨髓瘤":{"title":"H10 淋巴瘤與多發性骨髓瘤 複習講義","html":"<h3>一、何杰金氏淋巴瘤(HL)</h3><p><b>Reed-Sternberg細胞</b>為特徵；<b>無痛性</b>淋巴結腫大(常頸部)、<b>B症狀(發燒、夜間盜汗、體重減輕)</b>、皮膚搔癢、飲酒後結節痛；<b>連續性</b>擴散、<b>雙峰年齡</b>、男略多；Ann Arbor分期；預後與分期相關、治癒率高。</p><h3>二、非何杰金氏淋巴瘤(NHL)</h3><p>侵犯<b>周邊多處淋巴結、瀰漫不連續、易侵骨髓</b>；B症狀較HL少。<b>IPI預後指標</b>：年齡>60、LDH↑、ECOG≥2、分期III/IV、結外>1部位(<b>不含性別</b>)。治療R-CHOP；化療前篩<b>HBsAg+lamivudine</b>防B肝再活化。</p><h3>三、多發性骨髓瘤(MM)★</h3><p><b>骨髓漿細胞惡性增生</b>，分泌單株免疫球蛋白與輕鏈→尿<b>本瓊氏蛋白(Bence Jones)</b>。臨床<b>CRAB</b>：高血鈣(Calcium)、腎損(Renal)、貧血(Anemia)、骨痛溶骨(Bone)。診斷：骨髓漿細胞比例↑、M蛋白、CRAB。護理：<b>適度活動防骨折(勿完全不動)、穿背架、多喝水降鈣、高血鈣給Zometa</b>。</p>"},"H11出血與凝血疾病":{"title":"H11 出血與凝血疾病 複習講義","html":"<h3>一、血小板減少症</h3><p>正常15–40萬/μL；&lt;10萬=減少；<b>&lt;2萬易自發出血、&lt;1萬顱內出血高風險</b>。護理：避NSAID/Aspirin、軟毛牙刷<b>不用牙線</b>、<b>避免閉氣用力(Valsalva)</b>、給軟便劑、鼻黏膜塗凡士林、評估<b>意識狀態</b>(防顱內出血)。</p><h3>二、特發性血小板減少性紫斑症(ITP)</h3><p><b>自體免疫</b>抗血小板抗體、脾破壞；<b>骨髓巨核細胞增加</b>；<b>急性型好發兒童病毒感染後、自發痊癒高、少復發</b>；慢性型好發成人女性、易反覆。避Aspirin。</p><h3>三、血友病</h3><p>第VIII/IX因子缺乏；關節出血(hemarthrosis)→<b>制動、冰敷、抬高(勿熱敷)</b>；避Aspirin與不必要侵入處置；術前補因子；攜識別卡。</p><h3>四、DIC★</h3><p>誘因：敗血症、羊水栓塞、毒蛇咬傷、APL(<b>非CLL</b>)。凝血過度活化→消耗→繼發纖溶<b>出血</b>。檢驗：<b>血小板↓、PT/aPTT延長、纖維蛋白原↓、D-dimer/FDP↑</b>。治療：<b>先治病因</b>、補血小板/FFP、必要時肝素(有效時纖維蛋白原回升)。</p><h3>五、抗凝劑</h3><p><b>Warfarin監測PT/INR</b>、解毒<b>維生素K(Phytonadione)</b>、飲食維生素K須穩定;<b>Heparin監測aPTT</b>、解毒<b>Protamine sulfate</b>。</p>"},"H12輸血與血品":{"title":"H12 輸血與血品 複習講義","html":"<h3>一、輸血原則</h3><p>管路只用<b>0.9%生理食鹽水</b>(葡萄糖溶血、林格氏液含鈣凝集)；輸血前<b>雙重核對</b>；<b>前15分鐘放慢密切監測</b>(反應多此時出現)；勿用加壓袋過高壓(>360 mmHg致溶血)。</p><h3>二、輸血反應處置★</h3><p>出現發燒寒顫/喘/反應→<b>立即停止輸血、改NS維持管路</b>、通知醫師、保留血袋與血尿送檢。<b>暫停輸血但須維持NS輸液</b>(勿停所有輸液)。</p><h3>三、反應類型鑑別</h3><p><b>急性溶血</b>(ABO不合)：寒顫發燒、<b>腰背痛、血紅素尿、低血壓、腎衰</b>(非血管怒張)。<b>過敏</b>：蕁麻疹搔癢(數分鐘內)。<b>熱原</b>：抗白血球抗體致發燒寒顫。<b>細菌污染</b>：高燒休克。<b>循環過度負荷(TACO)</b>：<b>血壓↑、呼吸困難、咳嗽、頸靜脈怒張</b>→坐姿、給氧、利尿、嚴重放血術。<b>TRALI</b>：6小時內低血氧、血壓↓。</p><h3>四、血品適應症</h3><p>PRBC→貧血(1單位↑Hb約1g/dL)；血小板濃厚液→血小板減少(須<b>快速</b>輸完)；FFP→DIC/凝血因子缺乏；<b>全血→大量急性失血(非過敏性休克)</b>。</p>"},"H13造血幹細胞與骨髓移植":{"title":"H13 造血幹細胞與骨髓移植 複習講義","html":"<h3>一、移植前準備</h3><p><b>HLA配對</b>需吻合；前置處置=<b>高劑量化療＋全身性放射照射(TBI)</b>摧毀骨髓與免疫；口服腸道滅菌藥。供髓者與受髓者皆需周延檢查評估。</p><h3>二、幹細胞來源與收集</h3><p><b>骨髓抽取</b>：全/半身麻醉、後腸骨嵴等、量依體重、過濾後可立即輸注。<b>周邊血幹細胞</b>：捐贈前數天打<b>G-CSF</b>動員、血液成分分離術(不需全麻)、用<b>檸檬酸抗凝→低血鈣</b>(口唇麻、手腳抽筋→補鈣)；冷凍於<b>-196°C液態氮</b>。輸注幹細胞<b>不可用含濾網輸血套</b>。</p><h3>三、GVHD(移植物抗宿主病)★</h3><p>異體移植中供者T細胞攻擊宿主。<b>急性GVHD(100天內)</b>侵犯<b>皮膚(斑丘疹)、腸胃道(腹瀉)、肝臟(膽紅素↑)</b>(非便秘)；可皮膚切片確診。慢性GVHD與年齡相關。</p><h3>四、肝靜脈阻塞疾病(VOD/SOS)</h3><p>前置化放療傷肝竇，<b>移植後約3週內</b>：<b>右上腹痛、黃疸、腹水、體重增加</b>。</p><h3>五、感染時序</h3><p>早期(0–30天)細菌黴菌HSV；中期(30–100天)<b>CMV、PCP</b>；晚期莢膜菌。移植後免疫低下需長期防感染、外出防曬戴口罩。</p>"},"H14乳癌":{"title":"H14 乳癌 複習講義","html":"<h3>一、危險因子與表現</h3><p>家族史/BRCA、肥胖高脂、<b>初經早停經晚(雌激素暴露長)</b>、未生育晚生育未哺乳；<b>多次生產/哺乳為保護因子</b>。表現：<b>無痛性</b>硬塊(最常<b>外上1/4</b>)、乳頭凹陷/高低不一、橘皮樣變、異常分泌。會侵犯腋下淋巴。</p><h3>二、手術與淋巴水腫★</h3><p>改良型乳房根除術切全乳房+腋下淋巴結但<b>保留胸大肌</b>。腋下淋巴清除→<b>患側手臂淋巴水腫</b>→<b>禁量血壓、抽血、注射、提重物</b>；臥床<b>抬高患臂(手腕>手肘>肩膀)</b>促回流。復健<b>循序漸進</b>：術後約2天做手肘以下運動，<b>爬牆轉繩待引流管拔除後</b>，肩關節運動改善淋巴水腫。</p><h3>三、藥物治療</h3><p><b>Herceptin/trastuzumab</b>：抗HER2單株抗體、靜脈滴注、主要副作用<b>心臟毒性</b>(監測LVEF，非脫髮)。<b>荷爾蒙治療</b>(ER/PR陽性效果好)：tamoxifen、<b>芳香環酶抑制劑(letrozole)用於停經後</b>；副作用<b>骨質疏鬆</b>(定期骨密度)。</p><h3>四、心理護理</h3><p>乳房切除+蕁狀傷口易<b>身體心像紊亂</b>：接納情緒、漸進面對、支持團體。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^H(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='medn3heme_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
