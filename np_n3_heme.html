ic":"H14乳癌","topic_code":"H14","q_num":42,"roc_year":"111","exam_code":"111030","src":"民國111年","options":{"A":"好發部位在乳房的內上1/4 處","B":"T2N1M0 屬於癌症分期的第三期","C":"最常見的症狀為疼痛性腫塊","D":"乳頭下腫塊會造成乳頭回縮或高低不一"},"img":""},{"id":"113030-N3-21","code":"113030","roc":"113","cat":"N3","catname":"內外科護理學","num":21,"stem":"針對接受trastuzumab(Herceptin®)治療的癌症病人之護理,下列何者正確?1靜脈滴注給藥 2空腹口 服給藥 3監測丘疹、手足症候群 4監測心臟功能","opts":{"A":"13","B":"14","C":"23","D":"24"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"system_code":"S7","system_name":"血液與腫瘤","topic":"H14乳癌","topic_code":"H14","q_num":21,"roc_year":"113","exam_code":"113030","src":"民國113年","options":{"A":"13","B":"14","C":"23","D":"24"},"img":""},{"id":"113100-N3-33","code":"113100","roc":"113","cat":"N3","catname":"內外科護理學","num":33,"stem":"有關乳癌病人荷爾蒙治療之敘述,下列何者錯誤?","opts":{"A":"Letrozole(Femara)是轉移性乳癌第一線用藥,需服用2~5 年","B":"停經後婦女的荷爾蒙治療效果比停經前婦女好","C":"雌性素受體(ER)或黃體素受體(PR)呈陽性者,治療效果較好","D":"抗雌性素治療會有骨質疏鬆副作用,需定期做骨質密度檢查"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"system_code":"S7","system_name":"血液與腫瘤","topic":"H14乳癌","topic_code":"H14","q_num":33,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"Letrozole(Femara)是轉移性乳癌第一線用藥,需服用2~5 年","B":"停經後婦女的荷爾蒙治療效果比停經前婦女好","C":"雌性素受體(ER)或黃體素受體(PR)呈陽性者,治療效果較好","D":"抗雌性素治療會有骨質疏鬆副作用,需定期做骨質密度檢查"},"img":""}],E={"104100-N3-38":{"quick":"良性與惡性腫瘤最根本的差異在「侵犯與轉移」的生物行為，而非體積、部位或養分。","detail":{"background":"腫瘤良惡性的區分不是看大小或長在哪裡，而是看細胞的生物行為。良性腫瘤分化良好、生長慢、有纖維被膜、以膨脹(expansile)方式推擠周圍組織、不浸潤亦不轉移，手術完整切除即可治癒。惡性腫瘤分化不良(anaplasia)、生長快且呈對數生長、無被膜、以浸潤(invasion)方式破壞並侵入周圍組織與血管淋巴管，並可經淋巴、血行、體腔種植轉移到遠處，這是造成死亡的關鍵。因此「侵犯組織的特性(invasiveness/metastasis)」才是兩者最主要的鑑別點；體積大的可能是良性、小的也可能已轉移。","options":{"A":"腫瘤體積大小不能區分良惡性，良性脂肪瘤可以很大、惡性腫瘤可能很小已轉移。","B":"部位不是良惡性的判定依據。","C":"良性與惡性都需要血液養分供應(惡性更會誘發血管新生)，非鑑別點。","D":"正確：是否浸潤周圍組織並轉移，是良性與惡性最主要的差異。"},"sources":["新文京《內外科護理學》腫瘤護理","Harrison 21e Neoplasia"]}},"105090-N3-34":{"quick":"姑息(palliative)治療目標是減輕症狀、提升生活品質，不以治癒或完全切除腫瘤為目的。","detail":{"background":"癌症治療依目標分為根治性(curative，徹底清除腫瘤)、輔助/新輔助(adjuvant/neoadjuvant)、與姑息性(palliative)。姑息治療用於無法治癒或晚期病人，以「減輕症狀、控制疼痛、維持功能與生活品質」為核心，可包含姑息性手術、放療、化療(如止血、解除阻塞、緩解骨痛)。現代癌症治療強調多模式合併(手術+放療+化療+標靶/免疫)以提升療效，而非單一方式最好；分期是治療選擇的重要依據但非唯一(還須考量病理型態、分子標記、體能狀態、病人意願)。","options":{"A":"多採多模式合併治療效果較好，非單一治療。","B":"分期是重要考量但非唯一，仍須看病理、分子標記、體能與意願。","C":"正確：姑息治療以減輕症狀、提升生活品質為考量。","D":"控制癌症不一定以完全切除為目標，許多情況以控制與緩解為主。"},"sources":["新文京《內外科護理學》腫瘤護理","NCCN 緩和醫療指引"]}},"105090-N3-42":{"quick":"實質固態癌最常見的血行轉移好發器官是肺、肝、骨、腦；腎臟相對少見。","detail":{"background":"惡性腫瘤的血行(hematogenous)轉移有器官親和性，最常見的轉移標的依序為肺、肝、骨骼與腦，因這些器官血流豐富且微血管床利於癌細胞滯留增殖(種子與土壤學說)。肺與肝是靜脈回流與門脈系統的「過濾器」最常受侵；骨轉移好發於中軸骨(脊椎、骨盆、肋骨)且乳癌、攝護腺癌、肺癌、腎癌、甲狀腺癌最常見；腦轉移常見於肺癌、乳癌、黑色素瘤。相對之下腎臟雖血流豐富但臨床上轉移相對少見，故為四者中最少。","options":{"A":"肝是常見轉移部位(門脈過濾)。","B":"正確：腎臟相對少見為轉移部位。","C":"腦是常見轉移部位(肺癌、乳癌、黑色素瘤)。","D":"骨骼是常見轉移部位(中軸骨)。"},"sources":["新文京《內外科護理學》","Harrison 21e Metastasis"]}},"106030-N3-36":{"quick":"惡性腫瘤「無被膜」、分化不良、血管化高、具轉移性；具包膜是良性腫瘤特徵。","detail":{"background":"惡性腫瘤的核心特性：細胞分化不良(anaplasia)、核質比增高、有絲分裂指數高、生長快速且呈對數生長；無纖維被膜包覆，以浸潤方式破壞周圍組織；會誘導血管新生(angiogenesis)以供應大量養分(故嚴重血管化)；並具侵犯與轉移能力。「具包膜(被膜)」是良性腫瘤的特徵，能將腫瘤局限、邊界清楚、可動性佳，手術易完整切除。本題問「錯誤」者，故選具包膜。","options":{"A":"錯誤(本題答案)：具包膜是良性腫瘤特徵，惡性腫瘤無被膜。","B":"惡性腫瘤分化不良(anaplasia)正確。","C":"惡性腫瘤誘導血管新生、血管化嚴重正確。","D":"惡性腫瘤具轉移性正確。"},"sources":["新文京《內外科護理學》","Robbins Pathology Neoplasia"]}},"106030-N3-39":{"quick":"人類乳突病毒(HPV)，尤其16、18型，是子宮頸癌的主要致病原。","detail":{"background":"多種病毒與特定癌症相關：HPV(16、18型)→子宮頸癌、肛門癌、口咽癌；EB病毒→鼻咽癌、Burkitt淋巴瘤；B/C型肝炎病毒→肝細胞癌；人類T細胞白血病病毒(HTLV-1)→成人T細胞白血病；幽門螺旋桿菌(細菌)→胃癌、MALT淋巴瘤。HPV經性接觸傳染，持續感染高危型導致子宮頸上皮內病變進展為侵襲癌，故疫苗接種與子宮頸抹片是重要預防。","options":{"A":"乳癌與HPV無關。","B":"胃癌與幽門螺旋桿菌相關，非HPV。","C":"正確：HPV感染與子宮頸癌密切相關。","D":"卵巢癌與HPV無關。"},"sources":["新文京《內外科護理學》","WHO HPV與子宮頸癌"]}},"106110-N3-61":{"quick":"隱睪症(cryptorchidism)是睪丸癌最主要的危險因子。","detail":{"background":"睪丸癌好發於15–35歲年輕男性，以生殖細胞瘤(精原細胞瘤、非精原細胞瘤)為主。最重要危險因子為隱睪症(未降睪丸)，即使手術固定後風險仍升高，且對側正常睪丸風險也增加；其他因子包括家族史、先前對側睪丸癌、不孕、Klinefelter症候群。臨床表現為無痛性睪丸硬塊，腫瘤標記AFP、β-hCG、LDH有助診斷與追蹤。精索靜脈曲張、無精蟲症與長期接觸金屬非主要致癌因子。","options":{"A":"正確：隱睪症是睪丸癌最主要的危險因子。","B":"精索靜脈曲張與不孕相關，非主要致癌因子。","C":"長期接觸金屬非睪丸癌主要危險因子。","D":"無精蟲症非睪丸癌的主要危險因子。"},"sources":["Campbell-Walsh Urology","新文京《內外科護理學》"]}},"106111-N3-37":{"quick":"惡性腫瘤「無纖維膜包覆」；有纖維膜包覆是良性腫瘤特徵。","detail":{"background":"惡性腫瘤特性包含細胞分化差、核大且核質比高、生長速率呈對數生長、對身體有全身性影響(惡病質、副腫瘤症候群、發燒、貧血)、可浸潤與轉移。關鍵在於惡性腫瘤「無纖維被膜」，邊界不清、以浸潤方式向外擴展；而良性腫瘤多有完整纖維膜包覆使邊界清楚、可動性佳。本題問錯誤敘述，故選「有纖維膜包覆」。","options":{"A":"惡性腫瘤細胞分化差正確。","B":"錯誤(本題答案)：惡性腫瘤無纖維膜包覆。","C":"惡性腫瘤呈對數生長正確。","D":"惡性腫瘤對身體有全身性影響正確。"},"sources":["新文京《內外科護理學》","Robbins Pathology"]}},"108020-N3-37":{"quick":"癌細胞「喪失接觸抑制」會持續增殖堆疊；保有接觸抑制是正常細胞特性。","detail":{"background":"癌細胞的生物特性：P53等腫瘤抑制基因受損使DNA修復與細胞凋亡失調、有絲分裂指數高增殖快、對生長因子需求增加且因代謝旺盛需更多養分、並「喪失接觸抑制(loss of contact inhibition)」使細胞即使彼此接觸仍持續分裂堆疊(正常細胞會在接觸時停止生長)。本題問錯誤敘述：癌細胞「會有接觸抑制」是錯的，因癌細胞正是喪失此抑制。","options":{"A":"P53基因受損、抑制修復為癌細胞特性，正確。","B":"癌細胞代謝旺盛需要的養分比正常細胞多(非少)，此項本身為敘述其特性傾向，但題目重點在C。","C":"錯誤(本題答案)：癌細胞喪失接觸抑制，不會有接觸抑制作用。","D":"癌細胞有絲分裂指數高、增殖快正確。"},"sources":["Robbins Pathology Hallmarks of Cancer","新文京《內外科護理學》"]}},"108020-N3-38":{"quick":"良性腫瘤「有纖維膜包覆」、無轉移、分化良好、觸診可動；無被膜屬惡性。","detail":{"background":"良性腫瘤特徵：細胞分化良好、形態接近正常組織、生長緩慢且呈膨脹性、有完整纖維被膜包覆使邊界清楚、觸診時可動性佳、不浸潤亦不轉移，手術完整切除後預後良好且少復發。本題問「錯誤」者，「無纖維膜包覆」是惡性腫瘤特徵，故選之。良性腫瘤若長在密閉腔(如顱內)仍可能因壓迫產生症狀。","options":{"A":"良性腫瘤無轉移性正確。","B":"錯誤(本題答案)：良性腫瘤有纖維膜包覆。","C":"良性腫瘤細胞分化良好正確。","D":"良性腫瘤觸診具可動性正確。"},"sources":["新文京《內外科護理學》","Robbins Pathology"]}},"108110-N3-37":{"quick":"定期身體檢查屬「次級預防(早期發現)」，非初級預防。","detail":{"background":"疾病預防三段五級：初級預防(primary)針對致病前，包含健康促進與特殊保護，如均衡飲食、規律運動、戒菸酒檳榔、避免致癌物與接種疫苗(HPV、B肝)；次級預防(secondary)為早期發現早期治療，如定期身體檢查、癌症篩檢(抹片、糞便潛血、乳房攝影);三級預防為限制殘障與復健。本題問初級預防「錯誤」者，定期身體檢查屬次級預防，故選D。","options":{"A":"避免隨便服藥、減少菸酒屬初級預防。","B":"均衡飲食、多吃蔬果屬初級預防。","C":"規律運動屬初級預防。","D":"錯誤(本題答案)：定期身體檢查是次級預防(早期發現)，非初級預防。"},"sources":["公共衛生學三段五級","新文京《內外科護理學》"]}},"108110-N3-40":{"quick":"A型肝炎不會導致肝癌；與肝癌相關的是B、C型肝炎病毒。","detail":{"background":"致癌病毒對應：B、C型肝炎病毒→肝細胞癌(慢性感染、肝硬化進展)；EB病毒→鼻咽癌、Burkitt淋巴瘤;人類乳突病毒→子宮頸癌；人類疱疹病毒第8型→Kaposi肉瘤;幽門螺旋桿菌(細菌)→胃癌。A型肝炎為糞口傳染的急性自限性肝炎，不會慢性化、亦不導致肝癌。本題問錯誤敘述，故選A。(註:子宮頸癌主因為HPV，題中「巨細胞病毒導致子宮頸癌」嚴格而言也不精確，但最明確錯誤者為A肝致肝癌。)","options":{"A":"錯誤(本題答案)：A型肝炎病毒不會導致肝癌，肝癌與B、C肝相關。","B":"EB病毒導致鼻咽癌正確。","C":"此選項以子宮頸癌為對應，題目以A為最明確錯誤。","D":"幽門螺旋桿菌導致胃癌正確。"},"sources":["新文京《內外科護理學》","WHO 病毒與癌症"]}},"109030-N3-32":{"quick":"惡性腫瘤特徵：分化不良、生長快速、易轉移易復發；有被膜為良性。","detail":{"background":"惡性腫瘤的特徵組合為：細胞通常分化不良(1)、生長速度迅速(3)、容易轉移與復發(4)；而「有被膜包覆(2)」是良性腫瘤特徵。故正確組合為1、3、4。惡性腫瘤無被膜、以浸潤方式破壞組織並轉移，這也是治療上難以完全清除、易復發的原因。補充:良性與惡性鑑別核心在「分化、生長速度、被膜、浸潤與轉移」;有被膜、邊界清楚、分化良好者為良性，無被膜、浸潤破壞並轉移者為惡性。臨床陷阱:不可只憑腫瘤大小或部位判定良惡性。","options":{"A":"含2(有被膜)為良性特徵，錯。","B":"含2錯。","C":"正確：1分化不良、3生長迅速、4易轉移復發。","D":"含2錯，且缺1。"},"sources":["新文京《內外科護理學》","Robbins Pathology"]}},"109030-N3-34":{"quick":"手術治療用於切除原發癌或可切除的轉移性實質(固態)腫瘤。","detail":{"background":"癌症手術的角色：診斷(切片)、分期(如哨兵淋巴結)、治療(切除原發腫瘤或局部/可切除之轉移病灶)、緩解(解除阻塞、止血、止痛)與重建。冷凍切片是術中快速病理「診斷」非分期手術；雷射手術可精準切除並具止血效果(減少而非增加出血);手術較適用於局部、邊界清楚之實質腫瘤，對全身瀰漫或化放療敏感的腫瘤(如白血病、淋巴瘤)非首選。故正確為「切除原發或已轉移的固態實質腫瘤」。","options":{"A":"冷凍手術(切片)是術中病理診斷，非分期手術。","B":"正確：手術用於切除原發癌或可切除之轉移固態腫瘤。","C":"分化差、生長快速且非局限者多非手術首選，常需化放療。","D":"雷射手術可止血，會減少而非增加出血。"},"sources":["新文京《內外科護理學》腫瘤手術","Sabiston Surgery"]}},"110110-N3-35":{"quick":"長期接觸甲醛主要與鼻咽癌/白血病相關，非大腸癌；其餘致癌敘述正確。","detail":{"background":"常見職業與環境致癌物：吃檳榔→口腔癌；荷爾蒙(雌激素)補充→子宮內膜癌、乳癌；石綿(asbestos)→肺癌、間皮瘤；苯(benzene)→白血病；苯胺染料→膀胱癌;甲醛(formaldehyde)→鼻咽癌與白血病。本題問錯誤敘述：「長期接觸甲醛增加大腸癌」不正確，甲醛主要與鼻咽癌相關，故選C。","options":{"A":"檳榔增加口腔癌正確。","B":"荷爾蒙治療增加子宮內膜癌正確。","C":"錯誤(本題答案)：甲醛主要與鼻咽癌/白血病相關，非大腸癌。","D":"石綿增加肺癌正確。"},"sources":["IARC 致癌物分類","新文京《內外科護理學》"]}},"111030-N3-24":{"quick":"軟骨肉瘤(chondrosarcoma)源自結締組織(骨/軟骨)；其餘為間葉但非「結締組織」典型代表此題取軟骨肉瘤。","detail":{"background":"腫瘤命名依組織來源：上皮→癌(carcinoma)；間葉/結締組織(骨、軟骨、脂肪、纖維、肌肉)→肉瘤(sarcoma)。軟骨肉瘤(chondrosarcoma)源自軟骨(結締組織)，是本題標準答案。滑液膜肉瘤、血管肉瘤、淋巴管肉瘤雖名為肉瘤，但題意取最典型源自結締(支持)組織者為軟骨肉瘤。記憶要點：-oma多為良性、carcinoma為上皮惡性、sarcoma為間葉惡性、白血病/淋巴瘤為造血淋巴系統惡性。","options":{"A":"滑液膜肉瘤源自關節滑膜周圍組織。","B":"正確：軟骨肉瘤源自軟骨(結締組織)。","C":"血管肉瘤源自血管內皮。","D":"淋巴管肉瘤源自淋巴管內皮。"},"sources":["Robbins Pathology 腫瘤命名","新文京《內外科護理學》"]}},"112030-N3-41":{"quick":"良性腫瘤雖良性，若長在密閉腔(如顱內)會壓迫、阻塞管腔產生症狀。","detail":{"background":"良惡性腫瘤比較：惡性無被膜以浸潤方式侵犯、可轉移，手術不易完整切除故成效受限；良性有被膜、膨脹性生長、細胞排列規則、分化良好。惡性腫瘤細胞排列不規則但良性多規則(故「不管良惡性皆不規則」錯)。良性腫瘤雖不轉移，但若生長於顱內、脊椎管等密閉空間，會因壓迫鄰近構造或阻塞管腔(如腦室、膽道)而產生嚴重甚至致命症狀，這是本題正確敘述。","options":{"A":"惡性腫瘤浸潤無被膜，手術反而不易完整切除、成效未必佳。","B":"良性腫瘤細胞排列規則，非皆不規則。","C":"以浸潤方式侵入是惡性而非良性的特徵。","D":"正確：良性腫瘤長於密閉空間會壓迫、阻塞管腔產生症狀。"},"sources":["新文京《內外科護理學》","Robbins Pathology"]}},"112110-N3-35":{"quick":"肥胖+菸酒+愛吃醃漬品者屬高癌症風險，「飲食不用限制」不適宜。","detail":{"background":"本例67歲、BMI 30(肥胖)、菸酒不離手、嗜食醃漬食品，集多項致癌危險因子：肥胖與多種癌(食道、大腸、乳、子宮內膜)相關；菸酒協同增加口腔、食道、肝癌；醃漬食品含亞硝胺與高鹽，增加胃癌、食道癌風險。護理應介入生活型態：戒菸(轉介戒菸門診)、限酒、減重(轉介減重門診)、增加蔬果攝取(每日至少5份)、減少醃漬與加工食品。故「飲食可不用限制」最不適宜。","options":{"A":"最不適宜(本題答案)：此高風險者飲食需調整，不能不限制。","B":"轉介減重門診適宜。","C":"增加蔬果攝取每日至少5份適宜。","D":"轉介戒菸門診適宜。"},"sources":["新文京《內外科護理學》","癌症防治飲食指引"]}},"113030-N3-22":{"quick":"肉瘤(sarcoma)主要以「血行轉移」擴散；以淋巴轉移為主的是癌(carcinoma)。","detail":{"background":"癌細胞轉移途徑有三：淋巴轉移、血行(hematogenous)轉移、體腔內種植式播種。一般而言上皮性「癌(carcinoma)」傾向先循淋巴轉移；間葉性「肉瘤(sarcoma)」傾向以血行方式轉移(常先轉移到肺)。常見遠端轉移部位為肺、肝、骨。本題問錯誤敘述：「惡性肉瘤常以淋巴轉移」不正確，肉瘤以血行轉移為主，故選B。","options":{"A":"轉移指癌細胞從原發部位擴散到其他組織器官，正確。","B":"錯誤(本題答案)：肉瘤以血行轉移為主，非淋巴轉移。","C":"三種轉移方式(淋巴、血行、體腔種植)正確。","D":"肺、肝、骨為常見轉移部位正確。"},"sources":["Robbins Pathology Metastasis","新文京《內外科護理學》"]}},"114030-N3-26":{"quick":"幽門螺旋桿菌與「胃癌、MALT淋巴瘤」相關，非食道癌；此誤解需澄清。","detail":{"background":"本題找需澄清誤解者(致癌因子配對錯誤)：檳榔→口腔癌(正確)；過量飲酒→肝癌、乳癌、食道癌(正確);苯胺染料(油漆工)→膀胱癌(正確);幽門螺旋桿菌→胃癌與胃MALT淋巴瘤，而非食道癌(錯誤，需澄清)。食道癌主要與菸酒、熱燙飲食、亞硝胺、Barrett食道(胃食道逆流)相關。故D需進一步衛教澄清。","options":{"A":"檳榔→口腔癌正確，無須澄清。","B":"酒精→肝、乳、食道癌正確。","C":"苯胺染料→膀胱癌正確。","D":"需澄清(本題答案)：幽門螺旋桿菌與胃癌相關，非食道癌。"},"sources":["IARC 致癌物","Sleisenger GI"]}},"115030-N3-21":{"quick":"惡性腫瘤細胞特性：缺乏接觸抑制、未分化、黏著性低活動力高(易轉移)。","detail":{"background":"惡性腫瘤細胞與正常細胞的差異：1.缺乏接觸抑制故過度堆疊增殖;3.處於未分化(anaplasia)狀態;5.細胞間黏著性(adhesion)降低、活動力增高，易脫離原發灶而侵犯轉移。第2項「可快速增殖」雖也成立，第4項「當需要更多細胞時才增殖」是正常細胞的調控特性(癌細胞失去此調控、無限增殖)，故最能代表惡性特性的正確組合為1、3、5。","options":{"A":"含4(正常細胞調控特性)，不符。","B":"含4，不符。","C":"正確：1缺乏接觸抑制、3未分化、5黏著低活動高。","D":"含4，且缺1，不符。"},"sources":["Robbins Hallmarks of Cancer","新文京《內外科護理學》"]}},"104030-N3-41":{"quick":"TNM中G代表分化級數，G4是分化最差(未分化)，非分化良好。","detail":{"background":"TNM分期：T(tumor)代表原發腫瘤大小/侵犯深度，Tis為原位癌、Tx為無法評估;N(node)代表區域淋巴結，Nx為臨床無法評估、N1–3為轉移程度;M(metastasis)代表遠端轉移，M0無、M1有。另以G(grade)表示組織分化級數，G1分化良好(惡性度低)、G4分化最差/未分化(惡性度高)。本題問錯誤敘述:「G4代表分化良好」錯，G4是分化不良，故選D。","options":{"A":"Tis代表原位癌正確。","B":"Nx代表臨床上無法評估局部淋巴結正確。","C":"M1代表遠端轉移正確。","D":"錯誤(本題答案)：G4代表分化最差(未分化)，非分化良好。"},"sources":["AJCC Cancer Staging","新文京《內外科護理學》"]}},"106030-N3-37":{"quick":"本題為送分題：3cm(T2)、同側腋下淋巴結(N1)、無遠處(M0)依分期準則歸屬有爭議，全部給分。","detail":{"background":"乳癌TNM:腫瘤3cm屬T2(2–5cm)、侵犯同側可移動腋下淋巴結屬N1、無遠處轉移M0。依現行AJCC解剖分期T2N1M0為IIB期;但部分教科書簡化分期將「腫瘤伴淋巴結轉移」歸為較晚期。因分期準則版本不一致導致答案爭議，本題公告為送分(全部選項均給分)。學習重點仍在熟記TNM定義與分期邏輯:T看大小、N看淋巴結、M看遠端轉移。","options":{"A":"送分題，各選項均給分。","B":"依AJCC解剖分期T2N1M0為IIB期。","C":"部分簡化分期將淋巴結轉移歸較晚期，本題官方給分。","D":"第IV期需有遠端轉移(M1)，此例M0。"},"sources":["AJCC Breast Cancer Staging","考選部公告(送分)"]}},"106110-N3-36":{"quick":"骨骼轉移會破壞骨質釋出鈣，常出現高血鈣症。","detail":{"background":"癌症病人實驗室檢查的臨床意義:白血球不一定低(感染、白血病或類白血病反應時反而高);骨骼轉移(乳癌、攝護腺癌、肺癌、多發性骨髓瘤)因蝕骨細胞活化破壞骨質、釋出鈣離子，常出現高血鈣症(嗜睡、噁心、便秘、多尿、心律不整);化學治療大量破壞細胞釋出普林代謝物，使尿酸「上升」而非下降(腫瘤溶解症候群);腫瘤標記主要用於治療監測與追蹤，敏感度與特異度不足，「不能單獨作為診斷依據」。故正確為骨轉移常見高血鈣。","options":{"A":"白血球不一定低於正常值。","B":"正確：骨骼轉移常出現高血鈣。","C":"化療破壞細胞使尿酸上升，非降低。","D":"腫瘤標記不能單獨作為診斷依據。"},"sources":["Harrison 21e Oncologic Emergencies","新文京《內外科護理學》"]}},"106110-N3-39":{"quick":"確定癌症診斷最有效的方法是取得組織做病理切片，內視鏡可直視並切片。","detail":{"background":"影像檢查(超音波、電腦斷層、核磁共振)可偵測腫瘤位置、大小、範圍與分期，但僅為輔助;確立癌症診斷的黃金標準是「組織病理切片(biopsy)」。內視鏡能直接觀察病灶並同步進行組織切片(如胃鏡、大腸鏡、支氣管鏡)，故在選項中是協助確定癌症診斷最有效者。記憶:影像找病灶、病理下診斷。","options":{"A":"超音波為影像輔助，不能確診。","B":"正確：內視鏡可直視並切片取得病理確診。","C":"電腦斷層為影像輔助，不能確診。","D":"核磁共振為影像輔助，不能確診。"},"sources":["新文京《內外科護理學》癌症診斷","Harrison 21e"]}},"106111-N3-33":{"quick":"腫瘤標記正確配對：前列腺癌–PSA、鼻咽癌–EBV。","detail":{"background":"常見腫瘤標記:肝細胞癌–AFP(非CEA);攝護腺癌–PSA;乳癌–CEA與CA15-3(非AFB);鼻咽癌–EB病毒抗體(EBV);大腸直腸癌–CEA;卵巢癌–CA125;胰臟癌/膽道–CA19-9;睪丸生殖細胞瘤–AFP、β-hCG。本題1(肝癌–CEA)與3(乳癌–AFB)配對錯誤，正確為2(前列腺癌–PSA)與4(鼻咽癌–EBV)，故選C(2、4)。","options":{"A":"1肝癌–CEA配對錯誤(肝癌為AFP)。","B":"含3乳癌–AFB錯誤。","C":"正確：2前列腺癌–PSA、4鼻咽癌–EBV配對正確。","D":"含3乳癌–AFB錯誤。"},"sources":["NCCN Tumor Markers","新文京《內外科護理學》"]}},"106111-N3-39":{"quick":"由刮取細胞做的細胞學檢查並非確診最有效法；組織切片才是黃金標準。","detail":{"background":"癌症診斷檢查要點:確立診斷最有效的是「組織病理切片」，而非由表面刮取細胞做的細胞學(cytology，如抹片)——細胞學適合篩檢但不足以確診。其他正確敘述:血糖過高者接受PET(正子掃描)因組織攝取氟化去氧葡萄糖受血糖干擾易偽陽/偽陰;裝心臟節律器者不可做核磁共振(強磁場);打顯影劑的胸部電腦斷層檢查前需禁食數小時以防嘔吐吸入。本題問錯誤者，故選A。","options":{"A":"錯誤(本題答案)：刮取細胞之細胞學非確診最有效法，組織切片才是。","B":"高血糖影響PET結果易偽陽性，正確。","C":"裝節律器者不宜做MRI正確。","D":"打顯影劑前需禁食正確。"},"sources":["新文京《內外科護理學》","Harrison 21e 診斷"]}},"108020-N3-36":{"quick":"乳癌相關腫瘤標記為CEA(與CA15-3)。","detail":{"background":"腫瘤標記與癌別:CEA→大腸直腸癌、乳癌;PSA→攝護腺癌;AFP→肝細胞癌、生殖細胞瘤;鹼性磷酸酶(ALP)→骨轉移、肝膽疾病(非特異腫瘤標記);CA15-3→乳癌(尤其轉移追蹤);CA125→卵巢癌;CA19-9→胰臟/膽道癌。本題與乳癌相關者為CEA(carcinoembryonic antigen)，故選A。","options":{"A":"正確：CEA與乳癌(及大腸直腸癌)相關。","B":"PSA為攝護腺癌標記。","C":"AFP為肝癌、生殖細胞瘤標記。","D":"鹼性磷酸酶非特異腫瘤標記，反映骨/肝膽。"},"sources":["NCCN Tumor Markers","新文京《內外科護理學》"]}},"108020-N3-39":{"quick":"CA19-9是胰臟/膽道與消化道腫瘤標記，非乳癌標記。","detail":{"background":"常見腫瘤標記正確配對:CA125→卵巢癌;AFP→肝細胞癌;CEA→大腸直腸癌(與乳癌);CA19-9→胰臟癌、膽道與消化道腫瘤(非乳癌);乳癌應為CEA、CA15-3。本題問錯誤敘述:「CA19-9為乳癌標記」錯，故選A。腫瘤標記主要用於療效監測與復發追蹤，不適合單獨用於篩檢或診斷。","options":{"A":"錯誤(本題答案)：CA19-9為胰臟/膽道腫瘤標記，非乳癌。","B":"CA125為卵巢癌標記正確。","C":"AFP為肝癌標記正確。","D":"CEA為大腸直腸癌標記正確。"},"sources":["NCCN Tumor Markers","新文京《內外科護理學》"]}},"109030-N3-77":{"quick":"手術後病理報告以p(pathologic)為前綴，已切除可定M0；應為pT2N1M0。","detail":{"background":"TNM前綴:c代表臨床分期(clinical，治療前由理學/影像評估)、p代表病理分期(pathologic，手術切除後由病理確定)、y代表治療後分期、r代表復發。本例「手術後病理報告」故以p開頭;腫瘤3cm為T2、腋下2顆淋巴結轉移為N1;手術已切除並評估無遠處轉移可記M0(Mx是無法評估遠端轉移時用，已評估則用M0)。故正確為pT2N1M0(D)。","options":{"A":"cT2N1M0的c為臨床分期，與「手術後病理」不符。","B":"cT2N1Mx為臨床分期且Mx，不符病理報告。","C":"pT2N1M0前綴正確但題目選項對照以D為正解(本題官方答案D)。","D":"正確(本題官方答案)：pT2N1Mx，病理分期前綴p。"},"sources":["AJCC Staging Prefixes","新文京《內外科護理學》"]}},"112030-N3-39":{"quick":"手術後病理組織分期前綴應為pTNM，非sTNM。","detail":{"background":"TNM分期類型:治療前臨床分期以cTNM表示;手術切除病理組織後的分期以pTNM(pathologic)表示，而非sTNM;治療後分期以yTNM(如ycTNM、ypTNM)表示;復發或再治療以rTNM表示;屍檢分期以aTNM。本題問錯誤敘述，「手術後病理分期以sTNM表示」錯，正確應為pTNM，故選B。","options":{"A":"治療前臨床分期cTNM正確。","B":"錯誤(本題答案)：手術後病理分期應為pTNM，非sTNM。","C":"復發以rTNM正確。","D":"治療後分期ycTNM正確。"},"sources":["AJCC Staging","新文京《內外科護理學》"]}},"112110-N3-34":{"quick":"CA15-3不適合作為「早期」鑑別診斷乳癌的標記。","detail":{"background":"腫瘤標記是一系列與癌症相關、可量測的化學物質(蛋白、抗原、酵素、荷爾蒙)。其臨床限制:對早期癌敏感度低、特異度不足，故「不建議單獨用於篩檢、早期鑑別診斷或預測預後」，主要用於治療反應監測與復發追蹤。CA15-3用於乳癌「轉移/復發追蹤」，而非早期診斷。本題問錯誤敘述:「CA15-3為早期鑑別診斷乳癌的標記」錯，故選B。","options":{"A":"腫瘤標記為可測量之相關化學物質，正確。","B":"錯誤(本題答案)：CA15-3不適合作為早期鑑別診斷標記，主要用於追蹤。","C":"腫瘤標記不建議用於篩檢診斷預測預後，正確。","D":"對較早期癌敏感度低正確。"},"sources":["NCCN Tumor Markers","新文京《內外科護理學》"]}},"113100-N3-23":{"quick":"正確腫瘤標記應用：CEA監測大腸直腸癌、PSA為攝護腺癌指標、CA15-3監測轉移乳癌。","detail":{"background":"腫瘤標記應用:1.CEA可監測結腸直腸癌治療效果與復發(正確);3.PSA為攝護腺癌偵測與治療指標(正確);4.CA15-3監測晚期或遠端轉移乳癌之治療反應(正確);2.CA125主要監測卵巢癌(非胰臟癌，胰臟為CA19-9，故錯);5.AFP為肝細胞癌與生殖細胞瘤標記(非肺癌，故錯)。正確組合為1、3、4，選B。","options":{"A":"含2(CA125非胰臟癌)、5(AFP非肺癌)錯。","B":"正確：1 CEA大腸直腸癌、3 PSA攝護腺癌、4 CA15-3轉移乳癌。","C":"含2、5錯。","D":"含2、5錯。"},"sources":["NCCN Tumor Markers","新文京《內外科護理學》"]}},"114170-N3-22":{"quick":"Tx代表原發腫瘤「無法評估」，不是「無原發病灶」(無原發為T0)。","detail":{"background":"TxN1M0、G4的判讀:Tx指原發腫瘤「無法評估」(非無原發，無原發病灶應為T0);N1代表區域淋巴結受侵犯;M0代表無遠端轉移;G4代表細胞分化最差/未分化。本題問最不適當(錯誤)敘述:「Tx=無原發病灶」錯，Tx是無法評估，故選A。補充:TNM中T0表「無原發病灶證據」、Tx表「原發腫瘤無法評估」，兩者意義不同不可混淆;N1為區域淋巴受侵、M0為無遠端轉移、G4為分化最差(惡性度最高)。考試常以「Tx=無原發」設陷阱。","options":{"A":"最不適當(本題答案)：Tx是原發腫瘤無法評估，非無原發病灶。","B":"M0代表無遠端轉移正確。","C":"N1代表原發部位區域淋巴受侵犯正確。","D":"G4代表細胞未分化正確。"},"sources":["AJCC Staging","新文京《內外科護理學》"]}},"101030-N3-60":{"quick":"化療藥外滲最優先處置：立即停止注射，由原針頭儘量回抽殘留藥液。","detail":{"background":"發泡性(vesicant)化療藥(如Adriamycin/doxorubicin、vincristine、mitomycin)外滲會造成組織壞死。出現注射部位刺痛、腫脹、無回血即懷疑外滲。標準處置順序:1.立即停止注射但「先不要拔針」;2.以原針頭儘量回抽殘留藥液;3.依藥物特性給予對應解毒劑與冷/熱敷(多數發泡劑冷敷使血管收縮局限傷害，植物鹼類如vincristine則溫熱敷);4.抬高患肢、標記範圍、通報並記錄。最優先即「停止+由原針回抽」。","options":{"A":"正確：立即停止注射並以另一空針由原針頭回抽藥物，是最優先處置。","B":"不可立即拔針，應先回抽殘留藥液再依規範拔除。","C":"懷疑外滲不可繼續注射觀察。","D":"多數發泡劑外滲應冷敷(非熱敷)，且加壓會擴散傷害。"},"sources":["Oncology Nursing Society 外滲指引","新文京《內外科護理學》"]}},"101110-N3-46":{"quick":"化療藥準備：限制他人靠近、鋪防水墊、穿戴防護裝備、藥品貼標籤(2346)。","detail":{"background":"化療藥屬細胞毒性危害藥(hazardous drug)，準備須在「垂直層流生物安全櫃(class II BSC)」操作而非水平層流(水平氣流會吹向操作者);須2禁止他人靠近準備區、3工作檯鋪塑膠底防水紙墊、4穿防水長袖隔離衣加護目鏡手套口罩、6藥品貼標籤;5抽藥時應維持vial內「負壓」以防氣霧外漏(非正壓)。故正確組合為2、3、4、6(C)。1(水平櫃)與5(正壓)皆錯。","options":{"A":"含1(水平櫃錯，應垂直)。","B":"含1與5(正壓錯)。","C":"正確：2禁人靠近、3防水墊、4防護裝備、6貼標籤。","D":"含5(正壓錯)。"},"sources":["USP <800> 危害藥處理","新文京《內外科護理學》"]}},"102110-N3-7":{"quick":"mitomycin外滲時不可「立刻拔針」，應先由原針回抽殘留藥液。","detail":{"background":"mitomycin為發泡性化療藥，外滲處置原則同其他vesicant:檢查回血與腫脹、停止注射但先保留針頭回抽藥液、注射解毒劑、依藥性冷敷(mitomycin多採冷敷)、抬高患肢。本題問錯誤者:「停止注射並立刻拔出針頭套管」錯，因為應先用原針頭回抽殘留藥物再依規範移除，立刻拔針會喪失回抽機會並使藥液留在組織。","options":{"A":"檢查回血與腫脹正確。","B":"錯誤(本題答案)：不可立刻拔針，應先由原針回抽殘留藥液。","C":"外滲部位注射解毒劑減少傷害正確。","D":"mitomycin為發泡劑，外滲後冷敷正確。"},"sources":["ONS 外滲指引","新文京《內外科護理學》"]}},"103100-N3-34":{"quick":"白血球8,000/μL為正常值，不是化療禁忌；感染、近期手術、肝腎損傷才是。","detail":{"background":"化學治療相對禁忌:活動性感染(化療加重骨髓抑制)、近期手術(影響傷口癒合)、嚴重肝腎功能損傷(影響藥物代謝排泄、毒性蓄積)、嚴重骨髓抑制(WBC<3000、ANC<1500、血小板過低)、孕期等。白血球8,000/μL在正常範圍(4,000–10,000)，並非禁忌。本題問錯誤者，故選D。","options":{"A":"感染是化療禁忌之一。","B":"昨天剛接受腹部手術屬近期手術禁忌。","C":"肝腎功能損傷影響代謝排泄為禁忌。","D":"錯誤(本題答案)：WBC 8,000/μL為正常，非化療禁忌。"},"sources":["新文京《內外科護理學》","Harrison 21e Chemotherapy"]}},"104030-N3-43":{"quick":"面對病人併用中藥又要求保密，宜先了解想法、衛教利弊並鼓勵與醫師討論。","detail":{"background":"此題為護理倫理與病人安全的權衡:中藥可能與化療藥交互作用(影響代謝、肝毒性、出血)，醫療團隊須知悉以確保安全(誠實/不傷害原則);但同時應尊重病人自主與治療性溝通。最佳處置是「先了解病人服用中藥的想法與需求，提供利弊衛教，鼓勵其主動與醫師討論後共同決定」，兼顧自主、誠實與安全;而非當場否定、無條件保密或逕自告知而破壞信任。故選D。","options":{"A":"當場否定並要求立即停藥，未尊重病人、易破壞關係。","B":"為病人隱瞞影響用藥安全的資訊，違反不傷害原則。","C":"逕自告知雖誠實但忽略治療性溝通與病人自主。","D":"正確：先了解想法、衛教利弊、鼓勵與醫師討論再決定。"},"sources":["護理倫理四原則","新文京《內外科護理學》"]}},"104100-N3-34":{"quick":"Vincristine屬發泡性(vesicant)植物鹼，外滲會造成組織水疱與壞死。","detail":{"background":"化療藥依外滲傷害分:發泡劑(vesicant，外滲致水疱、潰瘍、壞死，如anthracyclines如doxorubicin、vinca alkaloids如vincristine/vinblastine、mitomycin)、刺激劑(irritant，致發炎疼痛但少壞死，如bleomycin、cisplatin、5-FU)、非發泡劑。Ifosfamide、methotrexate、bleomycin多屬刺激或非發泡劑。本題問會致水疱壞死者，故選Vincristine(D)。","options":{"A":"Ifosfamide非典型發泡劑。","B":"Methotrexate為非發泡/刺激劑。","C":"Bleomycin為刺激劑，少致壞死。","D":"正確：Vincristine為發泡劑，外滲致水疱壞死。"},"sources":["ONS 外滲分類","新文京《內外科護理學》"]}},"104100-N3-35":{"quick":"輸注單株抗體出現發冷寒顫(輸注反應)，最優先立即停止滴注並改打生理食鹽水。","detail":{"background":"Rituximab等單株抗體常見輸注相關反應(infusion reaction):發冷、寒顫、發燒、皮疹、低血壓，多發生於首次輸注初期。處置原則同藥物反應:最優先「立即停止該藥滴注，改以生理食鹽水維持靜脈通路」，再評估生命徵象、依醫囑給予抗組織胺/類固醇/退燒，必要時備急救。先停藥是阻斷反應來源的關鍵步驟。","options":{"A":"給碳酸氫鈉非首要處置。","B":"添加衣物無法處理輸注反應。","C":"正確：立即停止滴注並改打生理食鹽水維持通路為最優先。","D":"備急救設備為後續，先停藥最優先。"},"sources":["輸注反應處置","新文京《內外科護理學》"]}},"105030-N3-43":{"quick":"使用cisplatin應「補充」而非避免鎂離子，因其會造成低血鎂與腎毒性。","detail":{"background":"Cisplatin(白金類)主要毒性:腎毒性(近曲小管損傷)、耳毒性(高頻聽損、耳鳴)、嚴重噁心嘔吐、周邊神經病變、電解質流失(低血鎂、低血鉀、低血鈣)。護理:大量水化與利尿保護腎臟、監測尿量與腎功能、評估聽力、止吐、少量多餐、並「補充鎂離子」以矯正低血鎂。本題問錯誤者:「避免投予鎂離子製劑」錯，應補鎂，故選D。","options":{"A":"少量多餐減輕噁心嘔吐正確。","B":"觀察小便性質顏色監測腎毒性正確。","C":"評估聽力監測耳毒性正確。","D":"錯誤(本題答案)：cisplatin致低血鎂，應補充而非避免鎂。"},"sources":["Katzung Pharmacology Cisplatin","新文京《內外科護理學》"]}},"105090-N3-35":{"quick":"中樞神經腫瘤化療常用鞘內(腰椎穿刺)注射與Ommaya儲存槽給藥(③④)。","detail":{"background":"多數全身性化療藥難以通過血腦障壁(BBB)，故中樞神經系統腫瘤或預防中樞侵犯時，需採「鞘內(intrathecal)給藥」直接送入腦脊髓液。途徑包括③腰椎穿刺鞘內注射，或④植入Ommaya儲存槽反覆給藥;①靜脈、②Port-A皆為全身靜脈給藥，藥物難達中樞。故正確為③④(D)。","options":{"A":"①②為全身靜脈途徑，藥難過BBB。","B":"①③僅一項中樞途徑。","C":"②③僅一項中樞途徑。","D":"正確：③腰椎穿刺鞘內注射＋④Ommaya儲存槽，直接送藥至中樞。"},"sources":["新文京《內外科護理學》","Harrison 21e CNS Chemotherapy"]}},"105090-N3-36":{"quick":"神經細胞不屬於快速分裂細胞，故化療副作用較小。","detail":{"background":"化療藥主要毒殺「快速分裂」的細胞，因此正常組織中分裂旺盛者最易受波及而產生副作用:骨髓造血細胞(骨髓抑制)、毛髮毛囊(落髮)、腸胃道黏膜(口腔炎、腹瀉)、生殖細胞。神經細胞(神經元)為高度分化、分裂極慢甚至不再分裂的細胞，故化療對其直接毒殺影響較小(但某些藥如vincristine、cisplatin仍可致周邊神經病變)。本題問不屬快速分裂者，故選C。","options":{"A":"骨髓為快速分裂細胞，化療易致骨髓抑制。","B":"毛囊為快速分裂，化療致落髮。","C":"正確：神經細胞分裂慢，化療副作用較小。","D":"腸胃道黏膜快速分裂，化療致黏膜炎。"},"sources":["新文京《內外科護理學》","Katzung 細胞週期"]}},"106030-N3-34":{"quick":"化療藥抽取應維持vial內「負壓」以防藥液氣霧外濺；保持正壓為錯誤。","detail":{"background":"化療藥準備重點:垂直層流櫃調配、戴PVC手套穿長袖隔離衣與口罩帽子護目鏡並以無菌技術操作、藥液量勿超過針筒3/4以免脫落污染、抽藥時維持vial內「負壓」(回抽空氣)避免高壓使藥液氣霧外濺暴露操作者。本題問錯誤者:「保持瓶內正壓」錯，應為負壓，故選C。","options":{"A":"垂直層流櫃保護人員與藥品正確。","B":"戴手套隔離衣口罩護目鏡無菌操作正確。","C":"錯誤(本題答案)：應維持vial內負壓，非正壓。","D":"藥液勿達針筒3/4以免脫落污染正確。"},"sources":["USP <800>","新文京《內外科護理學》"]}},"106030-N3-35":{"quick":"化療適應症為惡性淋巴瘤第II、III期；合併感染或肝腎功能不良屬相對禁忌。","detail":{"background":"化療適合用於對化療敏感、可耐受治療的情況，如惡性淋巴瘤第II、III期(對化療反應佳)。而「合併活動性感染」、「合併肝功能不良」、「合併腎功能不良」均屬相對禁忌或需先處理/減量的情況，因會加重毒性或影響藥物代謝排泄。故正確適應症為D(惡性淋巴瘤II、III期)。","options":{"A":"急性淋巴性白血病合併肺炎(感染)需先控制感染。","B":"何杰金氏病合併肝功能不良影響藥物代謝。","C":"多發性骨髓瘤合併腎功能不良影響排泄。","D":"正確：惡性淋巴瘤第II、III期為化療適應症。"},"sources":["新文京《內外科護理學》","NCCN Lymphoma"]}},"106110-N3-33":{"quick":"化療靜脈給藥應選直徑大、有彈性的血管為原則。","detail":{"background":"化療靜脈給藥原則:Port-A導管尖端最常置於上腔靜脈與右心房交界，但人工血管座(port)埋於前胸皮下(故「最常植入位置是上腔靜脈」之敘述不精確);植入Port-A採「局部麻醉」非全身麻醉;選擇周邊注射部位應「先遠心端再近心端」以保留血管;發泡性藥宜經中央靜脈或大而有彈性的血管給予以降低外滲傷害。故正確為D(選直徑大、有彈性血管)。","options":{"A":"Port導管尖端在上腔靜脈，但人工血管座埋於前胸皮下，敘述不精確。","B":"植入Port-A採局部麻醉，非全身麻醉。","C":"周邊注射應先遠心端再近心端。","D":"正確：選直徑大、有彈性的血管為原則。"},"sources":["新文京《內外科護理學》","靜脈治療指引"]}},"106111-N3-36":{"quick":"以高劑量合併多種藥物、目標達緩解的化療是「誘導性(induction)」化療。","detail":{"background":"化療依目的分類:誘導性(induction)以高劑量多藥合併，目標使疾病(如急性白血病)達完全緩解;鞏固/增強性(consolidation/intensification)在緩解後再給藥以清除殘存癌細胞;維持性(maintenance)長期低劑量維持緩解;輔助性(adjuvant)手術/放療後給予以清除微轉移;新輔助(neoadjuvant)術前縮小腫瘤;救援性(salvage)用於復發或第一線失敗者。本題描述高劑量多藥達緩解，為誘導性，選A。","options":{"A":"正確：高劑量合併多藥達緩解為誘導性化療。","B":"增強(鞏固)性用於緩解後清除殘存癌細胞。","C":"輔助性用於手術/放療後清除微轉移。","D":"救援性用於復發或前線失敗者。"},"sources":["新文京《內外科護理學》","Harrison 21e Chemotherapy"]}},"107030-N3-34":{"quick":"化療滲漏正確處置：由原針頭回抽殘留藥液(先不拔針)。","detail":{"background":"化療外滲處置:懷疑外滲時先停止注射但保留原針頭，由原針回抽殘留藥液以減少組織內藥量;再依藥性給予解毒劑與冷/熱敷。「迅速停止且立即拔針」錯(失去回抽機會);解毒劑劑量與針號依醫囑與藥物規範而非固定18號;vincristine屬植物鹼，外滲應「溫熱敷」(非冰敷)以促進吸收分散。故正確為B(由原針回抽)。","options":{"A":"不應立即拔針，需先回抽藥液。","B":"正確：由原針頭回抽以除去殘留藥液。","C":"針號與解毒劑依藥物規範與醫囑，非固定18號。","D":"Vincristine外滲應溫熱敷，非冰敷。"},"sources":["ONS 外滲指引","新文京《內外科護理學》"]}},"107030-N3-39":{"quick":"神經元細胞高度分化、分裂速度最慢(幾乎不再分裂)。","detail":{"background":"細胞依分裂能力分:持續分裂(labile)細胞如骨髓造血、表皮、腸胃道黏膜、毛囊、生殖細胞，分裂快速;穩定(stable)細胞如肝、腎，平時靜止但受刺激可分裂;永久(permanent)細胞如神經元、心肌、骨骼肌，高度分化、幾乎不再分裂。故神經元分裂速度最慢，這也是化療對神經元直接毒殺較小的原因。選A。","options":{"A":"正確：神經元為永久細胞，分裂速度最慢。","B":"骨髓幹細胞分裂快速。","C":"毛囊上皮分裂快速。","D":"生殖細胞分裂快速。"},"sources":["Robbins 細胞適應與再生","新文京《內外科護理學》"]}},"107030-N3-40":{"quick":"癌細胞不易進入細胞週期的時期是G0休止期，是化療較難毒殺的階段。","detail":{"background":"細胞週期:G1(合成前期)、S(DNA合成)、G2(合成後期)、M(有絲分裂);G0為休止期，細胞暫離週期不分裂。化療藥(尤其週期特異性藥)主要毒殺「正在週期中分裂」的細胞，對處於G0休止期的細胞作用差，這也是腫瘤殘存與復發的原因之一;故化療常以多次給藥讓G0細胞重新進入週期再殺。本題問癌細胞「不易進入週期」的時期，即G0(A)。","options":{"A":"正確：G0休止期細胞不在週期中，化療較難毒殺。","B":"G1為週期內合成前期。","C":"G2為合成後期，在週期內。","D":"S期為DNA合成期，在週期內。"},"sources":["Katzung 細胞週期","新文京《內外科護理學》"]}},"107110-N3-38":{"quick":"長春花鹼類(vincristine)作用於細胞週期M期，抑制微管干擾有絲分裂。","detail":{"background":"化療藥依細胞週期作用:長春花鹼類(vinca alkaloids，如vincristine、vinblastine)與紫杉醇類作用於M期，與微管蛋白(tubulin)結合抑制紡錘體形成而停滯有絲分裂;抗代謝藥(如MTX、5-FU、Ara-C)作用於S期;烴基化合物(alkylating)與白金類為週期非特異;bleomycin作用於G2期。故vincristine作用於M期，選A。","options":{"A":"正確：vincristine作用於M期干擾有絲分裂。","B":"G1期非vinca主要作用期。","C":"S期為抗代謝藥作用期。","D":"G2期為bleomycin作用期。"},"sources":["Katzung Pharmacology","新文京《內外科護理學》"]}},"108110-N3-38":{"quick":"oncovin(vincristine)屬發泡劑(vesicant)。","detail":{"background":"常見化療藥英文商品/學名對照與外滲分類:oncovin=vincristine(發泡劑vesicant，外滲致壞死);ara-C=cytarabine(抗代謝，非發泡);bleomycin(刺激劑);endoxan=cyclophosphamide(非發泡，主毒性出血性膀胱炎)。本題問發泡劑，故選oncovin(D)。記憶:anthracyclines與vinca alkaloids是最典型的發泡劑。","options":{"A":"ara-C(cytarabine)非發泡劑。","B":"bleomycin為刺激劑。","C":"endoxan(cyclophosphamide)非發泡劑。","D":"正確：oncovin(vincristine)為發泡劑。"},"sources":["ONS 外滲分類","新文京《內外科護理學》"]}},"108110-N3-39":{"quick":"B肝帶原者化療不可採用來路不明的「保肝偏方」，以免肝毒性與交互作用。","detail":{"background":"B型肝炎帶原者接受化療時，免疫抑制可能誘發病毒再活化導致猛爆性肝炎，故需先篩檢HBsAg並預防性使用抗病毒藥(如lamivudine、entecavir)，並監測肝功能。護理指導:勿亂服來路不明的保肝偏方(可能肝毒性或與化療藥交互作用)、出入公共場所戴口罩防感染、白血球低時吃剝皮水果減少感染、出現黃疸或食慾差立即就醫。本題問錯誤者，故選A。","options":{"A":"錯誤(本題答案)：不可採用親友提供的保肝偏方，恐肝毒性與交互作用。","B":"出入公共場所戴口罩防感染正確。","C":"白血球低時吃剝皮水果補充維生素正確。","D":"黃疸食慾差立即就醫正確。"},"sources":["AASLD HBV再活化預防","新文京《內外科護理學》"]}},"109030-N3-36":{"quick":"Port-A可由腋/鎖骨下靜脈置入，注射發泡藥前應測試回血(②③)。","detail":{"background":"Port-A人工血管:植入採「局部麻醉」(故①全身麻醉錯);導管可經鎖骨下靜脈或腋靜脈置入，尖端達上腔靜脈(②正確);注射發泡性藥物前應「測試是否有回血」確認位置在血管內(③正確);須使用專用無損傷(Huber/non-coring)針而非「一般空針」垂直插入(④錯，一般空針會切損隔膜)。故正確為②③(C)。","options":{"A":"含①(全身麻醉錯)。","B":"含①與④錯。","C":"正確：②可經腋/鎖骨下靜脈置入、③注射發泡藥前測回血。","D":"含④(一般空針錯，應用無損傷針)。"},"sources":["靜脈治療Port-A照護","新文京《內外科護理學》"]}},"110030-N3-38":{"quick":"植物鹼類(vinca)化療藥外滲應「溫熱敷」促進吸收分散。","detail":{"background":"化療外滲正確觀念:並非所有外滲都立即有疼痛紅腫(部分延遲);懷疑外滲應停止注射但「先回抽再依規範處理」而非立即拔針;冷熱敷依藥性—多數發泡劑(anthracyclines)冷敷使血管收縮局限傷害，但「植物鹼類(vinca alkaloids)與VePesid」例外應「溫熱敷」促進藥物吸收分散;加壓會擴大傷害。本題正確為C(植物鹼外滲溫熱敷)。","options":{"A":"外滲不一定都立即有疼痛紅腫。","B":"懷疑外滲應先回抽再處理，非立即拔針。","C":"正確：植物鹼類外滲應溫熱敷。","D":"加壓會使藥液擴散加重傷害。"},"sources":["ONS 外滲冷熱敷指引","新文京《內外科護理學》"]}},"111030-N3-39":{"quick":"Doxorubicin屬抗腫瘤抗生素(anthracycline)非類固醇，主毒性為心臟毒性。","detail":{"background":"化療藥機轉與副作用:Cisplatin屬白金類(題敘為烴基類，但其腎毒性、耳毒性、周邊神經病變正確);5-FU屬抗代謝藥，副作用口腔炎、骨髓抑制;Vincristine屬植物鹼作用M期干擾有絲分裂;Doxorubicin(Adriamycin)屬「抗腫瘤抗生素anthracycline」，作用為嵌入DNA與抑制topoisomerase II，主要毒性為「累積性心臟毒性」與發泡外滲，並非類固醇、也不會促G0進入分裂。本題問錯誤者，故選C。","options":{"A":"Cisplatin致噁心嘔吐、耳毒性、周邊神經病變正確。","B":"5-FU抗代謝藥致口腔炎、骨髓抑制正確。","C":"錯誤(本題答案)：Doxorubicin為anthracycline非類固醇，主毒性為心臟毒性。","D":"Vincristine植物鹼作用M期正確。"},"sources":["Katzung Pharmacology","新文京《內外科護理學》"]}},"111110-N3-43":{"quick":"化療常見副作用：紅血球減少、口腔黏膜破損、掉頭髮(345)。","detail":{"background":"化療毒殺快速分裂細胞，常見副作用為骨髓抑制(3紅血球減少致貧血、白血球與血小板亦減少)、4腸胃道黏膜受損(口腔黏膜破損、噁心腹瀉)、5毛囊受損掉髮。1便秘非通例(部分藥如vincristine可致);2白血球「增加」錯(化療使其減少)。正確組合為3、4、5(D)。","options":{"A":"含1便秘、2白血球增加錯。","B":"含1便秘。","C":"含2白血球增加錯。","D":"正確：3紅血球減少、4口腔黏膜破損、5掉頭髮。"},"sources":["新文京《內外科護理學》","化療副作用"]}},"112110-N3-39":{"quick":"cyclophosphamide毒性不包括畏光；其特徵毒性為出血性膀胱炎。","detail":{"background":"Cyclophosphamide(Cytoxan)為烴基化合物，特徵毒性是代謝產物acrolein刺激膀胱造成「出血性膀胱炎」(預防:大量水化、使用mesna);也有骨髓抑制、噁心嘔吐、落髮、高劑量心臟毒性與SIADH。畏光(photophobia)並非其典型副作用。本題問不包括者，故選D。","options":{"A":"出血性膀胱炎為cyclophosphamide特徵毒性。","B":"骨髓抑制為其副作用。","C":"高劑量可致心臟毒性。","D":"不包括(本題答案)：畏光非cyclophosphamide典型毒性。"},"sources":["Katzung Pharmacology","新文京《內外科護理學》"]}},"113030-N3-24":{"quick":"doxorubicin外滲不應「溫熱敷」，anthracycline外滲應冷敷。","detail":{"background":"doxorubicin(anthracycline)為發泡劑，注射時點滴不順、針旁發紅刺痛即懷疑外滲。處置:可能為熱反應時給NS與類固醇;懷疑外滲停止注射並以原針回抽藥液;墊高注射部位且局部「避免加壓」;anthracycline外滲應「冷敷」(使血管收縮局限傷害)並可用解毒劑dexrazoxane。本題問不適當者:「給予溫熱敷」錯(應冷敷)，故選D。","options":{"A":"熱反應時給NS與dexamethasone為合理處置。","B":"懷疑外滲停止注射以原針回抽藥物正確。","C":"墊高部位且避免加壓正確。","D":"不適當(本題答案)：anthracycline外滲應冷敷，非溫熱敷。"},"sources":["ONS 外滲冷熱敷","新文京《內外科護理學》"]}},"113100-N3-26":{"quick":"干擾素治療常出現類似流行性感冒的症狀(發燒、寒顫、肌肉痠痛)。","detail":{"background":"干擾素(interferon)為生物反應調節劑，用於某些白血病、淋巴瘤、黑色素瘤、慢性肝炎。最常見副作用為「類流感症狀」:發燒、寒顫、頭痛、肌肉關節痠痛、疲倦，多在給藥初期出現，可給退燒止痛藥緩解;也有骨髓抑制、憂鬱。給藥途徑以皮下或肌肉注射為主(非皮內)。介白素-2(IL-2)才較易出現低血壓、肺水腫、腎功能低下(微血管滲漏)。故正確為C(類流感症狀)。","options":{"A":"高劑量干擾素未必增加抗體與淋巴球。","B":"低血壓、肺水腫、腎功能低下為IL-2(非干擾素)的嚴重副作用。","C":"正確：干擾素常見類流感症狀。","D":"多採皮下或肌肉注射，非皮內。"},"sources":["Katzung 生物製劑","新文京《內外科護理學》"]}},"113180-N3-21":{"quick":"vincristine屬危害藥，準備不適當者：抽藥後空針管路應丟「化療專用(細胞毒性)廢棄物」桶。","detail":{"background":"化療藥準備防護:穿戴護目鏡、手套、口罩、防水長隔離衣;核對藥物標籤;於「垂直層流操作櫃」抽取。處置廢棄物時，抽藥後的空針、管路、殘藥屬「細胞毒性/化療專用廢棄物」，應丟入專用化療廢棄物容器(常為紫色/黃色標示之cytotoxic容器)，而非一般感染性垃圾桶。本題問不適當者，故選D。","options":{"A":"穿戴護目鏡手套口罩防水隔離衣正確。","B":"核對藥物標籤正確。","C":"於垂直層流櫃抽取正確。","D":"不適當(本題答案)：化療廢棄物應丟細胞毒性專用容器，非一般感染性垃圾桶。"},"sources":["USP <800> 廢棄物處理","新文京《內外科護理學》"]}},"114030-N3-23":{"quick":"難過血腦障壁的中樞化療採Ommaya儲存槽與鞘內注射(24)。","detail":{"background":"中樞神經系統腫瘤若選用難以通過血腦障壁的藥物，需直接送入腦脊髓液，途徑為②Ommaya reservoir(植入式儲存槽，反覆鞘內給藥)與④intrathecal injection(鞘內/腰椎穿刺注射)。①Port-A、③Hickman catheter皆為中央靜脈導管，屬全身靜脈途徑，藥物難達中樞。故正確為②④(D)。","options":{"A":"①③為靜脈導管，藥難過BBB。","B":"含①靜脈途徑。","C":"含③靜脈導管。","D":"正確：②Ommaya儲存槽＋④鞘內注射，直接送藥至中樞。"},"sources":["新文京《內外科護理學》","Harrison CNS Chemotherapy"]}},"114100-N3-22":{"quick":"sorafenib手足症候群護理：避免摩擦、塗尿素乳膏或凡士林保濕(12)。","detail":{"background":"sorafenib(Nexavar)等多激酶抑制標靶藥常致「手足皮膚反應(手足症候群)」:手掌腳掌脫皮、龜裂、刺痛、紅腫。護理指導:①洗手不用力搓洗、穿寬鬆舒適鞋避免摩擦壓迫;②患部塗尿素乳膏或凡士林保濕後穿襪/手套;外出仍須防曬且「可以」擦防曬乳(故③錯);皮膚乾癢不建議冰熱敷刺激(故④錯)。正確為①②(A)。","options":{"A":"正確：①不用力搓洗穿寬鬆鞋、②塗尿素乳膏或凡士林保濕。","B":"含③(可擦防曬乳)、④(不宜冰熱敷)錯。","C":"含③錯。","D":"含④錯。"},"sources":["標靶治療皮膚照護","新文京《內外科護理學》"]}},"115030-N3-25":{"quick":"化療外滲正確處置：於滲漏部位四周注射解毒劑(先回抽、勿立即拔針、勿加壓、抬高患肢)。","detail":{"background":"靜脈化療外滲護理:懷疑外滲先停止注射但「保留原針回抽殘留藥液」(不立即拔針)、抬高(非放低)患肢、避免加壓(加壓使藥液擴散)、依藥性冷/熱敷、並「於滲漏部位四周皮下注射對應解毒劑」以中和或分散藥物減少組織壞死。故正確為D(於滲漏四周注射解毒劑)。","options":{"A":"應先回抽再依規範移除，非立即拔針。","B":"應抬高患肢，非放低。","C":"不可加壓，會使藥液擴散加重傷害。","D":"正確：於滲漏部位四周注射解毒劑。"},"sources":["ONS 外滲指引","新文京《內外科護理學》"]}},"101110-N3-47":{"quick":"ANC＝WBC×(Seg%＋Band%)＝2000×(40%＋5%)＝900/mm³。","detail":{"background":"絕對嗜中性白血球(ANC)是評估感染風險的核心指標，公式為ANC＝白血球總數×(節狀核Seg%＋帶狀核Band%)。本例WBC 2,000×(40%＋5%)＝2,000×0.45＝900/mm³。判讀:ANC≥1,500正常;500–1,000中度低下;<500嚴重嗜中性球低下(neutropenia)，感染風險極高須保護隔離。ANC 900表示已中度低下，須加強感染預防。","options":{"A":"800為計算錯誤。","B":"正確：2000×45%＝900/mm³。","C":"1,040計算錯誤(未只計Seg＋Band)。","D":"2,000為總白血球數，非ANC。"},"sources":["新文京《內外科護理學》ANC","Harrison 21e Neutropenia"]}},"103030-N3-42":{"quick":"ANC低下可給顆粒球群落刺激因子(G-CSF)促進嗜中性球生成以持續化療。","detail":{"background":"化療後骨髓抑制使ANC下降，可給予造血生長因子刺激恢復:顆粒球群落刺激因子(G-CSF，如filgrastim)促進嗜中性球增生與成熟，縮短嗜中性球低下期、降低發燒性嗜中性球低下與感染，使化療得以如期進行;紅血球生成素(EPO)用於貧血;血小板生成素(TPO/romiplostim)用於血小板低下。干擾素、IL-2、抗淋巴球蛋白並非用於提升嗜中性球。故選G-CSF(B)。","options":{"A":"干擾素為生物反應調節劑，非升嗜中性球用。","B":"正確：G-CSF促進嗜中性球生成。","C":"IL-2活化淋巴球，非升嗜中性球。","D":"抗淋巴球蛋白為免疫抑制，與升白血球無關。"},"sources":["Katzung 造血生長因子","新文京《內外科護理學》"]}},"103100-N3-35":{"quick":"化療後骨髓造血谷底(nadir)約在7–14天，非「三天」就到達。","detail":{"background":"白血病化療照護:ANC<500須保護隔離;G-CSF可促進白血球恢復減少感染;教導避免閉氣用力(Valsalva)以防血小板低下時顱內或黏膜出血。化療後白血球與血小板會逐漸下降，最低點(nadir，谷底)通常在「給藥後7–14天」(依藥物不同)，非三天就到達;之後骨髓恢復、血球回升。本題問錯誤者:「化療後三天就達谷底」錯，故選B。","options":{"A":"ANC<500採保護隔離正確。","B":"錯誤(本題答案)：nadir約在7–14天，非三天。","C":"G-CSF減少感染正確。","D":"避免閉氣用力以防出血正確。"},"sources":["新文京《內外科護理學》","Harrison Chemotherapy nadir"]}},"103100-N3-39":{"quick":"保護隔離用「正壓」單人病房(保護免疫低下者)，非負壓。","detail":{"background":"保護(反向)隔離用於免疫力極低者(ANC<500)，目的是「保護病人不被外界病原感染」，故病室採「正壓」通風(室內氣壓高於外界、潔淨空氣往外流，含HEPA過濾);負壓病房是用於「防止傳染原外散」(如結核、麻疹)。其他正確措施:依醫囑給預防性抗生素、選擇有完整果皮可剝除的水果(避免生菜與未削皮水果帶菌)。本題問錯誤者:「使用負壓單人病房」錯，故選B。","options":{"A":"ANC<500採保護隔離正確。","B":"錯誤(本題答案)：保護隔離應用正壓病房，非負壓。","C":"依醫囑預防性抗生素正確。","D":"選有完整果皮包覆的水果正確。"},"sources":["CDC 保護環境(PE)","新文京《內外科護理學》"]}},"103100-N3-41":{"quick":"AML化療中需立即通報的危險徵象：發冷寒顫、注射部位紅腫、小便灼熱(感染徵象，145)。","detail":{"background":"嗜中性球低下病人感染徵象不典型，任何感染線索都須警覺並立即通報:1發冷或寒顫(可能菌血症)、4靜脈注射部位紅腫(導管相關感染)、5小便灼熱(泌尿道感染)皆為感染徵象，需立即告知;2排軟便兩次、3呼吸22次/分屬可接受範圍，非緊急。故正確組合為1、4、5(C)。發燒性嗜中性球低下(febrile neutropenia)是腫瘤科急症。","options":{"A":"含2(軟便兩次)非緊急。","B":"含3(呼吸22次)非緊急。","C":"正確：1發冷寒顫、4注射部位紅腫、5小便灼熱皆為感染徵象須通報。","D":"含2、3非緊急且缺1、5。"},"sources":["IDSA 發燒性嗜中性球低下","新文京《內外科護理學》"]}},"104030-N3-40":{"quick":"輕微口腔炎應鼓勵進食非刺激性食物、餐後清潔口腔、保持口腔濕潤。","detail":{"background":"化療/放療致口腔黏膜炎(stomatitis/mucositis)護理:保持口腔「濕潤」(非乾燥)、用軟毛牙刷、餐前可用xylocaine漱口減痛、餐後以溫和漱口液或生理食鹽水清潔、進食非刺激性(避免辛辣、過酸、過熱、粗糙、高纖)、溫涼質軟食物。不需禁食(維持營養促進癒合);高纖粗糙食物會刺激黏膜。故最適宜為C(非刺激性食物＋餐後清潔)。","options":{"A":"應保持口腔濕潤，非乾燥。","B":"不需禁食，需維持營養促進癒合。","C":"正確：進食非刺激性食物、用餐後清潔口腔。","D":"高纖粗糙食物會刺激受損黏膜。"},"sources":["新文京《內外科護理學》口腔黏膜炎","MASCC/ISOO Mucositis"]}},"105030-N3-35":{"quick":"骨髓抑制是化療「延遲」副作用(7–14天nadir)，非立即出現。","detail":{"background":"化療副作用依時序:立即/急性(數小時–數天)如噁心嘔吐、過敏/輸注反應、出血性膀胱炎(cyclophosphamide)、發泡外滲;早期(數天–數週)如口腔炎、腹瀉、落髮;延遲如骨髓抑制(白血球與血小板nadir約7–14天)、貧血(紅血球壽命長故更晚)。本題問「立即出現」副作用中的錯誤者:「骨髓抑制」屬延遲副作用，非立即，故選B。","options":{"A":"噁心嘔吐為立即副作用。","B":"錯誤(本題答案)：骨髓抑制為延遲副作用(nadir 7–14天)。","C":"口腔炎為早期副作用。","D":"出血性膀胱炎(如cyclophosphamide)可急性出現。"},"sources":["新文京《內外科護理學》","Harrison Chemotherapy toxicity"]}},"105030-N3-36":{"quick":"WBC低、Hb低、血小板低下，最嚴重影響是「高燒39°C＋疲憊＋呼吸喘」(感染敗血徵象)。","detail":{"background":"本例WBC 1,900(低)、Hb 10.8(輕貧血)、Plt 99,000(輕度低)。對骨髓抑制病人威脅最大的是「感染」，因嗜中性球低下時感染可迅速進展為敗血症甚至死亡。選項中「體溫39°C、疲憊、呼吸喘」代表發燒性嗜中性球低下合併可能敗血/肺部感染，是最危急、影響最嚴重者(C);其餘為一般上呼吸道症狀、放射皮膚反應或便秘，相對不危急。","options":{"A":"咳嗽流鼻水喉嚨痛為輕度上呼吸道症狀。","B":"疲憊噁心皮膚發紅相對不危急。","C":"正確：高燒39°C＋疲憊＋呼吸喘提示感染/敗血，最嚴重。","D":"皮膚發紅頭痛便秘非最危急。"},"sources":["IDSA 發燒性嗜中性球低下","新文京《內外科護理學》"]}},"105030-N3-37":{"quick":"化療後白血球減少與貧血的原因是「骨髓造血功能受抑制」。","detail":{"background":"化療藥毒殺快速分裂細胞，骨髓造血幹細胞首當其衝受抑制，導致全血球減少:白血球減少(易感染)、紅血球減少(貧血、疲倦)、血小板減少(出血)。故白血球減少與貧血的共同根本原因是「骨髓功能受抑制」(D)，而非脾、肝、腎細胞破壞。紅血球壽命約120天故貧血出現較晚。","options":{"A":"脾臟破壞紅血球非化療貧血主因。","B":"肝細胞損傷非主因。","C":"腎細胞損傷影響EPO但非化療此題主因。","D":"正確：骨髓功能受抑制導致白血球減少與貧血。"},"sources":["新文京《內外科護理學》","Harrison Myelosuppression"]}},"105090-N3-37":{"quick":"ANC＝2,500×(Band 30%＋Seg 20%)＝2,500×50%＝1,250/μL。","detail":{"background":"ANC計算須把「節狀核(Seg)」與「帶狀核(Band，未成熟桿狀)」嗜中性球百分比相加再乘以白血球總數。本例WBC 2,500×(30%＋20%)＝2,500×0.50＝1,250/μL。1,250屬中度低下(500–1,000嚴重、<500極嚴重)，須加強感染預防。常見陷阱是只算Seg而漏算Band。","options":{"A":"500計算錯誤。","B":"750錯誤。","C":"1,000錯誤(未含全部Band＋Seg)。","D":"正確：2,500×50%＝1,250/μL。"},"sources":["新文京《內外科護理學》ANC","Harrison Neutropenia"]}},"107030-N3-35":{"quick":"保護隔離未確立致病原前可採廣效抗生素治療(經驗性治療)。","detail":{"background":"保護(反向)隔離正確觀念:用於免疫低下者，採「正壓」病房(非負壓);ANC<500(非<1,500)才採嚴格保護隔離;發燒性嗜中性球低下未確立病原前應立即「經驗性廣效抗生素」治療(不等培養結果，因可迅速惡化);醫護進入隔離室主要採無菌與防護(口罩、洗手、必要時帽子隔離衣)，重點在不把病原帶給病人。故正確為B(未確立病原採廣效抗生素)。","options":{"A":"保護隔離用正壓病房，非負壓。","B":"正確：未確立致病原前採經驗性廣效抗生素治療。","C":"ANC<500才採嚴格保護隔離，非<1,500。","D":"此項雖防護重要，但題意以B最正確(經驗性治療為關鍵)。"},"sources":["IDSA Febrile Neutropenia","新文京《內外科護理學》"]}},"109030-N3-35":{"quick":"停止化療的危險數據：白血球1,500/μL與ANC 1,000/μL(14)。","detail":{"background":"化療需暫停或延後的血液指標通常為:白血球<3,000–3,500/μL、ANC<1,500/μL、血小板<100,000/μL。本題:1白血球1,500(過低，須考慮停);4ANC 1,000(<1,500，須停);2紅血球500萬(正常);3血小板11萬(>10萬，可)。故正確組合為1、4(B)。重點在ANC<1,500與白血球過低時化療毒性風險高。","options":{"A":"含2(紅血球正常)。","B":"正確：1白血球1,500過低、4 ANC 1,000<1,500，須考慮停化療。","C":"含2、3皆在可接受範圍。","D":"含3(血小板11萬尚可)。"},"sources":["新文京《內外科護理學》","化療劑量調整"]}},"109030-N3-39":{"quick":"口腔炎護理不宜「自行購買漱口水」(含酒精會刺激黏膜)，應依醫囑使用。","detail":{"background":"癌症病人口腔炎護理:餐前用0.1% xylocaine漱口減痛、餐後以軟毛牙刷與溫和(不含酒精)漱口液清潔、食用冷的流質或軟質食物減少刺激並補充營養維生素。不宜「自行購買漱口水」，因市售漱口水多含酒精會刺激並乾燥已受損黏膜，應依醫囑選用不含酒精的漱口液。本題問錯誤者，故選D。","options":{"A":"餐前xylocaine漱口減痛正確。","B":"餐後軟毛牙刷清潔正確。","C":"冷流質食物減少刺激、補充維生素正確。","D":"錯誤(本題答案)：不宜自行買含酒精漱口水，應依醫囑使用。"},"sources":["新文京《內外科護理學》","口腔黏膜炎照護"]}},"109110-N3-43":{"quick":"癌症治療會破壞唾液腺使唾液分泌減少而口乾。","detail":{"background":"癌症治療(尤其頭頸部放療、化療)對口腔黏膜影響:味蕾受損致味覺改變，但治療後「多會逐漸恢復」(故A錯);唾液腺受破壞使唾液分泌減少、口乾(B正確);止痛噴劑應在「進食前」使用以減痛助進食(餐後用無助進食，故C錯);Nystatin為抗黴菌懸液，含漱後應「停留接觸黏膜一段時間再吞服或吐出」以治療口腔念珠菌(部分指引含後吞服，題敘「漱口後吐掉」並非治療念珠菌最佳，故D不選)。正確為B。","options":{"A":"味覺多會在治療後逐漸恢復，非永久不恢復。","B":"正確：唾液腺受破壞使唾液減少口乾。","C":"止痛噴劑應於進食前使用助進食。","D":"Nystatin治念珠菌須接觸黏膜，非單純漱口吐掉。"},"sources":["新文京《內外科護理學》","頭頸部放療口腔照護"]}},"110030-N3-43":{"quick":"血小板「低於20,000/μL」才易自發性出血，非低於50,000。","detail":{"background":"骨髓抑制各血球低下與處置:ANC下降易感染、ANC<500採保護隔離;血紅素過低可輸注紅血球濃厚液;血小板低下出血風險—一般>50,000可耐受多數侵入處置，<20,000才「易自發性出血」、<10,000為輸血小板閾值與顱內出血高風險。本題問錯誤者:「血小板<50,000易自發性出血」錯(應<20,000)，故選B。","options":{"A":"ANC下降易感染正確。","B":"錯誤(本題答案)：自發性出血多在血小板<20,000，非<50,000。","C":"ANC<500採保護隔離正確。","D":"血紅素過低可補充紅血球濃厚液正確。"},"sources":["新文京《內外科護理學》","輸血閾值指引"]}},"110110-N3-42":{"quick":"評估感染風險應看「嗜中性球(ANC)」，比看總白血球更準確。","detail":{"background":"癌症病人感染問題:感染是病人死亡主因之一、與治療致骨髓抑制有關、G-CSF皮下注射可增加白血球。判斷感染風險的關鍵指標是「絕對嗜中性白血球(ANC)」而非白血球總數，因總白血球可能含淋巴球或受其他因素影響，而嗜中性球才是對抗細菌的主力。本題問錯誤者:「白血球比嗜中性球更能反映易受感染」錯(應是ANC更能反映)，故選C。","options":{"A":"感染是癌症病人死亡主因正確。","B":"感染與骨髓抑制有關正確。","C":"錯誤(本題答案)：ANC比白血球總數更能反映感染風險。","D":"G-CSF皮下注射增加白血球正確。"},"sources":["IDSA Neutropenia","新文京《內外科護理學》"]}},"111110-N3-37":{"quick":"口腔黏膜障礙：含類固醇口內膏緩解疼痛發炎、Nystatin漱口後吐掉防念珠菌(14)。","detail":{"background":"口腔黏膜障礙照護:1含類固醇口內膏可緩解局部疼痛與發炎(正確);4使用無糖口香糖可刺激唾液維持口腔濕潤(正確);2 Nystatin雖防念珠菌，但題敘「漱口後吐掉不可吞服」與部分指引(含漱後可吞以治療食道念珠菌)不同，本題不取;3病人對「甜味」敏感度下降而對苦味敏感增加，且苦瓜芥菜屬刺激性不宜，故3錯。正確組合為1、4(B)。","options":{"A":"含2(Nystatin敘述不取本題)。","B":"正確：1類固醇口內膏緩解疼痛發炎、4口香糖維持口腔濕潤。","C":"含3(味覺敘述與刺激食物錯)。","D":"含3錯。"},"sources":["新文京《內外科護理學》","口腔黏膜炎照護"]}},"111110-N3-38":{"quick":"ANC<500/mm³要採保護隔離；嗜中性球低下者發炎症狀常不典型。","detail":{"background":"癌症病人感染照護要點:嗜中性球低下時因發炎反應細胞不足，感染常「不出現典型發炎症狀」(可無紅腫化膿，發燒可能是唯一表現，故A錯);養樂多、優格等含活菌發酵食品對嚴重免疫低下者「不建議」(可能含菌，故B錯);ANC<500/mm³要採保護隔離(C正確);家屬接種「活性減毒疫苗」後應間隔足夠時間且免疫低下病人本身避免活疫苗，3週仍須謹慎(D不夠嚴謹)。正確為C。","options":{"A":"嗜中性球低下者感染症狀常不典型，未必發燒。","B":"活菌發酵食品對重度免疫低下者不建議。","C":"正確：ANC<500/mm³採保護隔離。","D":"接種活疫苗者探視免疫低下病人須更謹慎。"},"sources":["CDC 保護環境","新文京《內外科護理學》"]}},"112030-N3-33":{"quick":"CCRT骨髓抑制者採「保護隔離」但用正壓病房，非負壓。","detail":{"background":"本例WBC 3,000、嗜中性(seg＋band)25%→ANC≈750(中度低下)、血小板50,000。骨髓抑制照護:發燒避免用NSAID退燒(掩蓋發燒且影響血小板);避免生鮮未處理蔬果(防菌);ANC低下時注射G-CSF提升嗜中性球;若需保護隔離應用「正壓」病房。本題問錯誤者:「轉至負壓式單人病房保護隔離」錯(保護隔離用正壓)，故選B。","options":{"A":"發燒避免用NSAID退燒(影響血小板、掩蓋發燒)正確。","B":"錯誤(本題答案)：保護隔離應用正壓病房，非負壓。","C":"避免生鮮未妥善處理蔬果正確。","D":"注射G-CSF提升嗜中性球正確。"},"sources":["CDC 保護環境","新文京《內外科護理學》"]}},"112110-N3-37":{"quick":"減緩化療口腔黏膜炎疼痛，最能改善的是「持續良好的口腔清潔」。","detail":{"background":"化療致口腔黏膜炎，預防與減痛的核心是「持續且良好的口腔清潔(oral care)」:軟毛牙刷、不含酒精漱口液、生理食鹽水或蘇打水漱口，可降低感染、減少潰瘍惡化與疼痛。暫停化療非首要、監測全血球與定期檢查黏膜屬「評估」而非「減痛處置」。故最能減緩疼痛者為C(持續良好口腔清潔)。","options":{"A":"暫停化療非減痛之首要處置。","B":"監測全血球計數屬評估，非直接減痛。","C":"正確：持續良好的口腔清潔最能減緩黏膜炎疼痛。","D":"定期檢查黏膜屬評估，非減痛處置。"},"sources":["MASCC/ISOO Mucositis","新文京《內外科護理學》"]}},"113180-N3-6":{"quick":"不可用2% lidocaine「清潔厚舌苔」；lidocaine是表面麻醉止痛，非清潔劑。","detail":{"background":"維持口腔黏膜完整原則:張口呼吸者可用濕紗布覆蓋口腔保濕;放療致口乾者若無禁忌每日攝水2,000–3,000 mL;鼓勵由口進食、咀嚼運動刺激唾液分泌。2% lidocaine(Xylocaine)為「表面麻醉止痛劑」用於減輕黏膜疼痛，不是用來「清潔厚舌苔」(清潔厚舌苔應用軟牙刷或紗布輕拭、蘇打水)，且過度使用麻醉劑會抑制吞嚥保護反射致吸入。本題問錯誤者，故選D。","options":{"A":"張口呼吸者以濕紗布覆蓋口腔保濕正確。","B":"放療口乾者每日攝水2,000–3,000 mL正確。","C":"由口進食、咀嚼促進唾液分泌正確。","D":"錯誤(本題答案)：lidocaine為止痛麻醉劑，非用於清潔厚舌苔。"},"sources":["新文京《內外科護理學》","口腔照護"]}},"114030-N3-22":{"quick":"顆粒球低下(嗜中性球低下)病人宜選「可剝皮的柑橘」(低菌、補充維生素C)。","detail":{"background":"嗜中性球(顆粒球)低下病人採「低菌飲食(neutropenic diet)」:避免生食、未削皮水果、生菜、未滅菌乳品與發酵食品。溏心蛋(半生)、泡菜(生醃發酵)、優格(含活菌)皆有帶菌風險不宜;柑橘類有完整厚果皮、食用前可剝皮去除表面污染，相對安全且補充維生素C。故最適切為C(柑橘)。","options":{"A":"溏心蛋為半生蛋，帶菌風險不宜。","B":"泡菜為生醃發酵食品，帶菌不宜。","C":"正確：柑橘可剝皮、低菌且補充維生素C。","D":"優格含活菌，重度免疫低下者不宜。"},"sources":["低菌飲食指引","新文京《內外科護理學》"]}},"114170-N3-19":{"quick":"化療病人發燒不可「自行服退燒藥」，發燒須立即就醫(可能發燒性嗜中性球低下)。","detail":{"background":"化療病人護理指導:避免接觸上呼吸道感染者、避免生菜沙拉與生魚片(低菌飲食)、減少出入公共場所。發燒對嗜中性球低下者是腫瘤科急症(可能febrile neutropenia)，「不可自行服退燒藥」掩蓋病情，應立即就醫評估與經驗性抗生素治療。本題問最不適當者，故選C。","options":{"A":"勿與上呼吸道感染者接觸正確。","B":"勿食生菜沙拉、生魚片(低菌飲食)正確。","C":"最不適當(本題答案)：發燒不可自行服退燒藥，須立即就醫。","D":"減少出入公共場所正確。"},"sources":["IDSA Febrile Neutropenia","新文京《內外科護理學》"]}},"115030-N3-29":{"quick":"疱疹性齒齦口腔炎由單純疱疹第一型病毒(HSV-1)感染所致。","detail":{"background":"化療致免疫低下時易發生病毒再活化，疱疹性齒齦口腔炎(herpetic gingivostomatitis)由「單純疱疹病毒第一型(HSV-1)」感染引起，表現為口腔黏膜成簇小水疱、潰瘍、疼痛。處置:抗病毒藥(Acyclovir)應「儘早(症狀初期)」使用以縮短病程，而非等嚴重才用;水疱「不可擠壓」(會擴散感染);口腔護理應在進食前先止痛以利進食，且需持續清潔不可等不痛才做。故正確為A(HSV-1所致)。","options":{"A":"正確：由單純疱疹第一型病毒(HSV-1)感染所致。","B":"Acyclovir應儘早使用，非等嚴重才用。","C":"水疱不可擠壓，會擴散感染。","D":"口腔護理應持續，餐前止痛助進食，非等不痛才做。"},"sources":["新文京《內外科護理學》","HSV口腔感染"]}},"101030-N3-23":{"quick":"輻射防護三原則：時間短、距離遠、有屏蔽。集中照護(縮短時間)並站在鉛板後(屏蔽)正確。","detail":{"background":"放射線防護(ALARA)三大原則:1.時間(time)—接觸時間越短暴露越少，故採集中護理;2.距離(distance)—暴露量與距離平方成反比(距離越遠暴露越少，故距離與暴露量成「反比」而非正比);3.屏蔽(shielding)—使用鉛板、鉛衣阻擋。脫落的封閉式植入物「不可徒手拾取」，須用長柄鑷子夾入鉛桶;污染排泄物須以鉛容器收集待過半衰期再處理(不鏽鋼無屏蔽效果)。本題正確為A(集中照護＋站鉛板後)。","options":{"A":"正確：集中照護(縮短時間)並站鉛板後(屏蔽)符合防護原則。","B":"植入物脫出不可徒手拾起，須用長柄鑷子夾入鉛桶。","C":"距離與暴露量成「反比」(平方反比)，非正比。","D":"污染嘔吐物應以鉛容器處理，不鏽鋼無屏蔽。"},"sources":["輻射防護ALARA","新文京《內外科護理學》"]}},"103100-N3-37":{"quick":"軟骨肉瘤對放射線相對敏感度較低(放射抗性)。","detail":{"background":"放射敏感度與細胞分裂速率成正比、與分化程度成反比:分裂快、分化差、含氧高的細胞較敏感。淋巴瘤、白血病(造血淋巴系統)、生殖細胞瘤、皮膚癌(基底/鱗狀)對放射線高度敏感;而骨、軟骨、肌肉、神經等分化良好、生長慢的間葉組織腫瘤(如軟骨肉瘤、骨肉瘤)對放射相對「不敏感(放射抗性)」，多以手術為主。本題問敏感度較低者，故選軟骨肉瘤(B)。","options":{"A":"淋巴瘤對放射線高度敏感。","B":"正確：軟骨肉瘤分化良好，放射敏感度較低。","C":"白血病對放射線敏感。","D":"皮膚癌對放射線敏感。"},"sources":["Radiobiology 放射敏感度","新文京《內外科護理學》"]}},"104030-N3-10":{"quick":"頭頸部放療仍應鼓勵由口進食(維持營養與功能)，「儘量勿由口進食」不適當。","detail":{"background":"頭頸部放療常致口腔黏膜炎、口乾、味覺改變。維持口腔黏膜完整與濕潤:用軟毛牙刷、餐後立即清潔口腔、多補充水分、含維生素C片或無糖含片刺激唾液。應「鼓勵由口進食」(質軟、非刺激、營養均衡)以維持營養與咀嚼吞嚥功能，除非嚴重黏膜炎或吞嚥困難才考慮其他途徑。本題問較不適當者:「儘量勿由口進食」錯，故選C。","options":{"A":"用軟毛牙刷清潔口腔適當。","B":"進食後立即清潔口腔適當。","C":"較不適當(本題答案)：應鼓勵由口進食以維持營養與功能。","D":"維生素C片刺激唾液、助黏膜，適當。"},"sources":["新文京《內外科護理學》","頭頸部放療口腔照護"]}},"104100-N3-39":{"quick":"放射皮膚出現「滲液(濕性脫屑)」時不應保持乾燥不管，應以生理食鹽水清潔並用親水敷料。","detail":{"background":"放射線皮膚照護:治療期間不可洗去皮膚定位標記;照射部位以清水輕柔清潔、勿用肥皂搓洗、勿貼膠布;乾性脫屑可依醫囑塗保濕乳液(不含金屬、香精、酒精);避免日曬、冷熱敷與摩擦。當皮膚出現「濕性脫屑/滲液」時，不應一味保持乾燥，而應以生理食鹽水清潔並覆以親水性敷料(如DuoDerm)促進濕潤癒合。本題問錯誤者:「滲液時保持皮膚乾燥」錯，故選D。","options":{"A":"不可自行洗去皮膚標記正確。","B":"照射部位以清水清洗正確。","C":"乾性脫屑可塗(合適)乳液正確。","D":"錯誤(本題答案)：滲液(濕性脫屑)應以NS清潔並用親水敷料，非保持乾燥。"},"sources":["放射皮膚反應照護","新文京《內外科護理學》"]}},"106111-N3-34":{"quick":"後荷式體內放療照護不靠「穿鉛衣」降暴露(鉛衣對高能γ屏蔽有限)，主要靠時間短與距離遠。","detail":{"background":"子宮頸癌後荷式(after-loading)近接體內放射治療:射源植入體腔，護理時防護以「時間、距離、屏蔽」為原則—採集中護理縮短時間、保持距離;若射源脫落須用長柄鑷子夾入鉛桶;病人尿液/排泄物若採用會釋出之射源需放鉛桶待過半衰期。臨床上對高能γ射線「鉛衣屏蔽效果有限」，主要仍靠縮短時間與拉開距離，故「穿鉛衣可降低暴露」之敘述為錯誤(本題答案A)。","options":{"A":"錯誤(本題答案)：鉛衣對高能γ屏蔽有限，主要靠時間與距離防護。","B":"射源脫落用長柄鑷子夾入鉛桶正確。","C":"尿液放鉛桶待過半衰期再處理正確。","D":"採集中護理減少暴露正確。"},"sources":["近接放療防護","新文京《內外科護理學》"]}},"107110-N3-41":{"quick":"放療合併化療作為主要治療的輔助，屬「輔助性(adjuvant)」治療。","detail":{"background":"放射治療依目的分:根除性(curative，單獨即可治癒)、輔助性(adjuvant，搭配手術或化療以加強局部控制、清除殘存)、姑息性(palliative，減輕症狀如止痛、止血、解阻塞)、預防性(prophylactic，如預防腦轉移之全腦照射)。乳癌第四期合併化學治療給予放療，是配合全身治療加強局部控制，屬輔助性(B)。","options":{"A":"根除性指單獨放療即可治癒。","B":"正確：合併化療加強治療，屬輔助性。","C":"誘導性為化療術語(高劑量達緩解)。","D":"預防性如預防性腦照射，非此情境。"},"sources":["新文京《內外科護理學》","放射治療目的分類"]}},"108020-N3-33":{"quick":"放射線對「神經細胞」治療效果較差(分化高、分裂慢、放射抗性)。","detail":{"background":"放射敏感度:分裂快、分化差、含氧充足的細胞較敏感;分化高、分裂慢、缺氧的細胞較抗放射。骨髓、毛囊為快速分裂故敏感(也因此有副作用);含氧量高的細胞放射敏感(氧增強效應)。神經細胞為高度分化、幾乎不分裂的永久細胞，放射治療效果較差(放射抗性)。本題問效果較差者，故選C(神經細胞)。","options":{"A":"骨髓快速分裂，放射敏感。","B":"毛囊快速分裂，放射敏感。","C":"正確：神經細胞分化高分裂慢，放射效果差。","D":"含氧量高細胞放射敏感(氧效應)。"},"sources":["Radiobiology","新文京《內外科護理學》"]}},"108020-N3-34":{"quick":"封閉式(密封)體內放療病人排泄物「不具放射性」；故「排泄物具放射性」為錯。","detail":{"background":"體內放射治療分密封(sealed/封閉式)與非密封(unsealed)。密封式(如銥-192近接治療)射源被包覆於容器內植入體腔/組織，射源不會進入體液，故「病人排泄物不具放射性」;但病人本身在植入期間是輻射源，須限制訪客接觸時間與距離、住單人房、射源若掉落用長柄鑷子夾起。非密封式(如放射碘I-131口服)其排泄物才具放射性。本題問錯誤者:「(密封式)病人排泄物具放射性」錯，故選C。","options":{"A":"限制訪客接觸時間與距離正確。","B":"住單人房減少對他人影響正確。","C":"錯誤(本題答案)：密封式體內放療病人排泄物不具放射性。","D":"植入物掉落用長柄鑷子夾起正確。"},"sources":["近接放療","新文京《內外科護理學》"]}},"109110-N3-39":{"quick":"放射線強度與距離平方成反比，距放射源越遠暴露量越少。","detail":{"background":"放射防護觀念:1.強度與距離平方成反比(平方反比定律)，距離加倍暴露量降為1/4，故越遠越安全(A正確);採集中護理是為「縮短時間」，但鉛衣對高能γ屏蔽有限故非主要靠穿隔離衣(B不精確);密封式體內放療病人排泄物「不具放射性」，不需特別沖洗(C錯);非密封式體內放療移除植入器後，因放射性核種已進入體內，病人體液仍可能具放射性，並非立即不具放射性(D錯)。故正確為A。","options":{"A":"正確：放射強度與距離平方成反比，越遠暴露越少。","B":"採集中護理是縮短時間，鉛衣對γ屏蔽有限。","C":"密封式體內放療排泄物不具放射性。","D":"非密封式移除植入器後體液仍可能具放射性。"},"sources":["輻射防護平方反比","新文京《內外科護理學》"]}},"110110-N3-41":{"quick":"頭頸部放療照射部位發紅「不可熱敷」(會加重皮膚損傷)。","detail":{"background":"頭頸部放療照護:照射部位皮膚反應(發紅、乾/濕性脫屑)不可冷熱敷、不可日曬與摩擦，僅以清水輕柔清潔;最大張口與咀嚼運動可預防放療後牙關緊閉(顳顎關節纖維化);唾液腺破壞致口乾;進食前用止痛劑減輕黏膜炎疼痛助進食。本題問錯誤者:「照射部位發紅可熱敷」錯(熱會加重損傷)，故選A。","options":{"A":"錯誤(本題答案)：照射部位發紅不可熱敷，會加重皮膚損傷。","B":"最大張口及咀嚼運動預防牙關緊閉正確。","C":"唾液腺破壞致口乾正確。","D":"進食前用止痛劑減輕疼痛正確。"},"sources":["頭頸部放療照護","新文京《內外科護理學》"]}},"111030-N3-40":{"quick":"放射照射部位皮膚不可用肥皂「搓洗」，應以清水輕柔清潔。","detail":{"background":"放射皮膚照護:照射部位避免機械與化學刺激—僅以清水輕柔清潔、勿用肥皂搓洗(會破壞表皮屏障)、不塗含酒精乳液、可依醫囑塗氧化鋅保護、刮鬍只能用電動刮鬍刀(避免刀片刮傷)、避免日曬冷熱敷膠布。本題問錯誤者:「用中性肥皂搓洗避免感染」錯(不可搓洗)，故選A。","options":{"A":"錯誤(本題答案)：照射部位不可用肥皂搓洗，應清水輕柔清潔。","B":"不可塗含酒精乳液正確。","C":"可依醫囑塗氧化鋅正確。","D":"只能用電動刮鬍刀正確。"},"sources":["放射皮膚照護","新文京《內外科護理學》"]}},"112180-N3-28":{"quick":"四級口腔黏膜炎疼痛劇烈，可規律給予全身性止痛劑緩解。","detail":{"background":"頭頸部放療口腔影響與處置:口腔黏膜炎依WHO分級1–4級，四級最嚴重(廣泛潰瘍、無法進食)，需規律給予全身性止痛劑(含鴉片類)緩解疼痛(D正確);避免高纖粗糙食物刺激黏膜(故A錯，應軟質);放療期間口乾與黏膜脆弱，活動假牙不宜整天配戴(會摩擦致潰瘍，故B錯);Nystatin是抗黴菌藥治「念珠菌(黴菌)」感染非細菌，且含漱接觸黏膜後使用(故C錯)。正確為D。","options":{"A":"應軟質飲食，高纖粗糙會刺激黏膜。","B":"放療期不宜整天戴活動假牙，會摩擦致潰瘍。","C":"Nystatin治念珠菌(黴菌)非細菌。","D":"正確：四級口腔黏膜炎可規律給予全身性止痛劑。"},"sources":["MASCC/ISOO Mucositis","新文京《內外科護理學》"]}},"113180-N3-22":{"quick":"胸壁/縱膈放療致吞嚥痛與胸口灼熱，最可能是「放射性食道炎」。","detail":{"background":"放射治療的副作用與照射部位相關。胸壁、縱膈或乳房放療時食道在照射範圍內，食道黏膜受損產生「放射性食道炎(radiation esophagitis)」，表現為吞嚥疼痛(odynophagia)、胸骨後灼熱與緊繃感，通常在放療數週後出現。處置:軟質溫和飲食、局部麻醉漱劑、制酸劑、止痛。本題症狀(吞嚥痛、胸口灼熱緊繃)最符合放射性食道炎(D)。","options":{"A":"肺炎以咳嗽發燒呼吸困難為主，非吞嚥痛。","B":"食道裂孔疝氣非放療急性結果。","C":"胃炎以上腹痛為主，不符吞嚥痛。","D":"正確：放射性食道炎致吞嚥痛與胸口灼熱緊繃。"},"sources":["放射治療副作用","新文京《內外科護理學》"]}},"113180-N3-32":{"quick":"放射皮膚乾燥脫皮最適當處置：用清水清潔該區域避免組織損傷。","detail":{"background":"放射皮膚乾性脫屑護理:以清水輕柔清潔避免摩擦與組織損傷、可塗不含香精/酒精/金屬的溫和保濕乳;禁止熱敷(加重損傷)、禁含香精乳液(刺激)、禁去角質劑(破壞脆弱表皮)。本題最適當者為B(清水清潔避免組織損傷);A熱敷、C含香精乳液、D去角質皆會刺激或損傷皮膚。","options":{"A":"熱敷會加重放射皮膚損傷。","B":"正確：用清水清潔該區域避免組織損傷。","C":"含香精乳液會刺激敏感皮膚。","D":"去角質劑破壞脆弱表皮，不可用。"},"sources":["放射皮膚照護","新文京《內外科護理學》"]}},"114030-N3-21":{"quick":"體外放療出現濕性脫屑(濕濕的)應以生理食鹽水沖洗後覆親水敷料(DuoDerm)。","detail":{"background":"體外放射皮膚反應分級:紅斑→乾性脫屑→濕性脫屑(滲液)→潰瘍壞死。出現「濕濕的(濕性脫屑/滲液)」時應以生理食鹽水沖洗清潔，再覆以親水性敷料(如DuoDerm)維持濕潤、促進癒合、減少感染。凡士林等油性、溫濕敷、刮鬍膏皆不適當(油膜影響劑量、熱與摩擦加重損傷)。本題正確為C(NS沖洗＋親水敷料)。","options":{"A":"濕性脫屑不宜塗凡士林油膜(影響劑量與滲液)。","B":"溫濕敷會加重皮膚損傷。","C":"正確：0.9% NS沖洗後以親水敷料(DuoDerm)覆蓋。","D":"照射部位應避免刮鬍刀片，宜電動刮鬍刀。"},"sources":["放射皮膚濕性脫屑照護","新文京《內外科護理學》"]}},"114100-N3-24":{"quick":"色素沉著屬放射皮膚的「慢性/晚期」反應，非急性反應。","detail":{"background":"放射皮膚反應分急性與慢性。急性反應(治療中至數週內):紅斑(發紅敏感)、乾性脫屑、濕性脫屑、毛髮脫落。慢性/晚期反應(數月至數年):色素沉著、皮膚萎縮變薄、毛細血管擴張、纖維化、色素改變。本題問「不是急性反應」者:色素沉著屬慢性反應，故選A。","options":{"A":"不是急性(本題答案)：色素沉著屬慢性/晚期反應。","B":"發紅敏感(紅斑)為急性反應。","C":"乾性脫屑為急性反應。","D":"濕性脫屑為急性反應。"},"sources":["放射皮膚反應分期","新文京《內外科護理學》"]}},"101030-N3-58":{"quick":"安寧緩和「不以治癒疾病為導向」，而是症狀控制與身心靈全人照顧。","detail":{"background":"安寧緩和醫療(palliative/hospice care)用於末期或無法治癒的病人，目標「不是治癒疾病」，而是減輕痛苦、控制症狀、提升生活品質;強調全人(身心靈)、全家、全隊、全程的「四全照顧」，家屬亦為照護對象(含哀傷輔導);常結合非藥物與輔助療法(芳香、音樂、按摩)協助症狀控制。本題問錯誤者:「以治癒疾病為導向」錯，故選A。","options":{"A":"錯誤(本題答案)：安寧緩和不以治癒疾病為導向，而是症狀控制與舒適。","B":"採非藥物與輔助療法協助症狀控制正確。","C":"滿足身心靈照護需求正確。","D":"家屬納入照護對象正確。"},"sources":["安寧緩和醫療條例","新文京《內外科護理學》"]}},"101110-N3-48":{"quick":"癌症慢性疼痛：儘量口服、Fentanyl貼片72小時換、按時給藥(124)。","detail":{"background":"WHO癌痛處置原則:1儘可能「口服(by mouth)」給藥(方便、非侵入);2 Fentanyl穿皮貼片每72小時(3天)更換一次，提供穩定血中濃度;4「按時(by the clock)」規則給藥維持血中濃度，而非3「疼痛時才給(prn)」(慢性癌痛應預防性按時給藥，prn會使疼痛波動難控);5 Meperidine(Demerol)因代謝物normeperidine會蓄積致神經毒性，「不」建議用於慢性癌痛。故正確為1、2、4(B)。","options":{"A":"含3(疼痛才給)錯，慢性癌痛應按時給藥。","B":"正確：1口服優先、2 Fentanyl貼片72小時換、4按時給藥。","C":"含3、5錯。","D":"含5(Meperidine非慢性癌痛首選)錯。"},"sources":["WHO 癌痛三階梯","新文京《內外科護理學》"]}},"103100-N3-71":{"quick":"安寧療護理念不含「治癒疾病」；以減輕症狀、促進舒適、支持性照顧為核心。","detail":{"background":"安寧療護(hospice)的理念是接受疾病不可治癒的事實，將照護重心由「治癒(cure)」轉為「照護(care)」:減輕症狀(疼痛、呼吸困難、噁心)、促進舒適、提供身心靈與家庭的支持性照顧、維護尊嚴與生活品質。「治癒疾病」並非安寧療護的目標，最不適宜。本題問最不適宜者，故選C。","options":{"A":"減輕症狀是安寧理念。","B":"促進舒適是安寧理念。","C":"最不適宜(本題答案)：治癒疾病非安寧療護目標。","D":"支持性照顧是安寧理念。"},"sources":["安寧緩和醫療","新文京《內外科護理學》"]}},"104030-N3-38":{"quick":"中度持續痛＋換藥時重度痛，宜用強效＋弱效麻醉性止痛劑合併控制。","detail":{"background":"依WHO三階梯與癌痛處置:中度至重度疼痛(尤其換藥引發的突發痛breakthrough pain)，應給予足量「強效麻醉性止痛劑(如morphine)」作為基礎止痛，並於換藥前追加短效鴉片或合併弱效止痛以控制突發痛。本例「一直中度疼痛＋換藥重度疼痛」需強效＋弱效合併、按時加突發劑量，最適宜為C。僅觀察(A)延誤止痛、手術(B)非緩解此類疼痛之適當手段、單用短效藥(D)不足以控制持續性中重度痛。","options":{"A":"繼續觀察會延誤疼痛控制。","B":"手術非緩解蕈狀傷口疼痛的適當處置。","C":"正確：強效麻醉性止痛劑加弱效止痛劑合併控制中重度疼痛。","D":"單用短效鴉片不足以控制持續中重度疼痛。"},"sources":["WHO 癌痛三階梯","新文京《內外科護理學》"]}},"104100-N3-37":{"quick":"疼痛分數7分(重度)，最優先依醫囑給止痛藥緩解疼痛。","detail":{"background":"安寧療護以症狀控制與舒適為優先。疼痛評估分數7/10屬重度疼痛，依「以病人為中心、優先緩解痛苦」原則，最優先處置是「依醫囑(需要時)給予止痛藥物」即時緩解疼痛;其餘聽診呼吸音、測血壓、詢問飲食皆為一般評估，相對非當下最優先。疼痛是第五生命徵象，重度疼痛需即時處理。故選B。","options":{"A":"聽診呼吸音為一般評估，非當下最優先。","B":"正確：重度疼痛(7分)最優先依醫囑給止痛藥。","C":"測血壓非當下最優先。","D":"詢問飲食非當下最優先。"},"sources":["疼痛為第五生命徵象","新文京《內外科護理學》"]}},"105030-N3-40":{"quick":"「為什麼是我？老天爺不公平」屬Kübler-Ross的憤怒期。","detail":{"background":"Kübler-Ross臨終五階段:否認(denial，不相信、震驚)、憤怒(anger，「為什麼是我」、責怪外界與他人)、磋商(bargaining，討價還價、向上天交換時間)、憂鬱(depression，失落、退縮哭泣)、接受(acceptance，平靜面對)。本例「為什麼是我?我都聽話了，老天爺對我太不公平」是責怪與不平，屬「憤怒期」(B)。各階段非必然依序，可反覆或跳躍。","options":{"A":"否認期表現為不相信、震驚。","B":"正確：責怪、覺得不公平屬憤怒期。","C":"磋商期為討價還價交換時間。","D":"接受期為平靜面對。"},"sources":["Kübler-Ross 五階段","新文京《內外科護理學》"]}},"105090-N3-41":{"quick":"安寧療護不限於住院；可於居家、社區或門診提供，並非「要住院才能接受」。","detail":{"background":"安寧療護的提供方式多元:住院安寧病房、安寧居家療護、安寧共同照護、社區安寧;病人可在家中接受安寧照護以符合在地老化與善終意願。其理念為減輕症狀、促進舒適、四全照顧(全人全家全隊全程);末期病人仍可接受症狀緩解性放療(如止痛、止血)。本題問錯誤者:「病人要住院才能接受安寧療護」錯，故選D。","options":{"A":"目的在減輕症狀促進舒適正確。","B":"四全照顧(全人全家全隊全程)正確。","C":"仍可接受緩解性放射線治療正確。","D":"錯誤(本題答案)：安寧療護不限住院，可居家/社區提供。"},"sources":["安寧居家療護","新文京《內外科護理學》"]}},"106110-N3-35":{"quick":"「我快死了，再也看不到女兒」表達失落悲傷，屬憂鬱期。","detail":{"background":"Kübler-Ross五階段中，「憂鬱期(depression)」表現為深沉失落、悲傷、退縮、為即將失去的關係與未竟之事哀傷。本例「我快要死了，再也看不到我女兒」是對失去摯愛關係的預期性哀傷與失落，屬憂鬱期(C)。此期應陪伴、傾聽、允許表達悲傷，不急於勸阻或過度保證。","options":{"A":"震驚與否認期為不相信。","B":"磋商期為討價還價交換時間。","C":"正確：表達失落悲傷屬憂鬱期。","D":"接受期為平靜面對。"},"sources":["Kübler-Ross 五階段","新文京《內外科護理學》"]}},"106111-N3-35":{"quick":"瀕死出現嘎嘎音(death rattle)不應「抽痰」，抽痰反增不適；宜改變姿勢、減少分泌。","detail":{"background":"瀕死病人照護以舒適為原則:便秘以舒適處理、不勉強插肛管;疼痛積極處理、不需顧慮藥物成癮;四肢冰冷時保暖但「不宜直接用熱水袋/電毯」於末梢(感覺遲鈍易燙傷，宜用被毯保暖)—此題以D最明確錯誤。嘎嘎音(death rattle)是分泌物積於咽喉隨呼吸振動，抽痰刺激反增加分泌與不適，應改採側臥引流、減少給液、必要時用抗膽鹼藥(如atropine/scopolamine)減少分泌，而非抽痰。本題問錯誤者，故選D。","options":{"A":"便秘以舒適為主不勉強插肛管正確。","B":"疼痛處理不需顧慮成癮正確。","C":"四肢冰冷保暖正確(惟熱源須謹防燙傷)。","D":"錯誤(本題答案)：death rattle不應抽痰，宜側臥引流、減分泌。"},"sources":["安寧末期症狀處置","新文京《內外科護理學》"]}},"107030-N3-36":{"quick":"癌痛三階梯：定時給藥、口服優先、從非麻醉性製劑開始(136)。","detail":{"background":"WHO癌痛三階梯給藥五原則:1定時(by the clock)規則給藥維持血中濃度(非2需要時才給);3口服優先(by mouth，非4靜脈優先);6由「非麻醉性製劑(非鴉片，如NSAID/acetaminophen)」開始，不足再加弱效、再加強效鴉片(階梯漸進，非5一開始就用低效麻醉劑);並個別化(by the individual)。故正確為1、3、6(A)。","options":{"A":"正確：1定時給藥、3口服優先、6從非麻醉性製劑開始。","B":"含4(靜脈優先)、5錯。","C":"含2(需要時)、5錯。","D":"含2、4錯。"},"sources":["WHO 癌痛三階梯","新文京《內外科護理學》"]}},"107110-N3-40":{"quick":"末期安寧護理目標是減輕或緩解病人不舒服的症狀。","detail":{"background":"癌症末期接受安寧療護的護理目標，核心是「減輕或緩解病人不舒服的症狀」(疼痛、呼吸困難、噁心嘔吐、躁動)，提升生活品質與維護尊嚴。並非以教導疾病知識、評估適應能力或處理家庭照顧問題為主要目標(這些是次要或情境性的)。本題問護理目標，故選D。補充:安寧療護以「四全照顧(全人、全家、全隊、全程)」為架構，護理目標聚焦症狀控制與生活品質，而非治癒或灌注不切實際的希望;末期病人仍可接受症狀緩解性放療與止痛。","options":{"A":"評估適應能力非末期主要護理目標。","B":"家人不願照顧的護理非核心目標。","C":"教導疾病知識非末期主要目標。","D":"正確：減輕或緩解病人不舒服的症狀。"},"sources":["安寧療護目標","新文京《內外科護理學》"]}},"108110-N3-33":{"quick":"瀕死病人「聽覺」是最後消失的知覺。","detail":{"background":"瀕死病人知覺消退順序一般為:飢餓感→口渴→味覺與嗅覺→視覺(畏光、視力模糊)→觸覺(由下肢往上漸失)→「聽覺(最後消失)」。因此即使病人意識不清或無反應，仍應假設其能聽見，照護時持續溫和說話、解釋處置、給予安慰與道別，並提醒家屬把握與病人說話的機會。本題問最後消失的知覺，故選C(聽覺)。","options":{"A":"味覺較早消失。","B":"觸覺在聽覺之前消失。","C":"正確：聽覺是最後消失的知覺。","D":"嗅覺較早消失。"},"sources":["瀕死照護","新文京《內外科護理學》"]}},"109030-N3-76":{"quick":"「讓我活到女兒結婚再走」屬Kübler-Ross磋商期(討價還價)。","detail":{"background":"磋商期(bargaining)的特徵是與命運/上天/醫師「討價還價」，希望以某種交換(行善、配合治療)換取延長生命或達成心願(如撐到某個重要事件)。本例「我希望能活到女兒結婚…就讓我活到那時候」正是以心願交換時間的討價還價，屬磋商期(B)。護理應傾聽、協助完成可達成的心願。","options":{"A":"否認期為不相信診斷。","B":"正確：以心願交換時間屬磋商期。","C":"憤怒期為責怪不平。","D":"接受期為平靜面對。"},"sources":["Kübler-Ross 五階段","新文京《內外科護理學》"]}},"109110-N3-40":{"quick":"Fentanyl貼片是「強效」麻醉性止痛劑，非弱效；其餘照護敘述正確。","detail":{"background":"Fentanyl穿皮止痛貼片:屬「強效」鴉片類(效價約嗎啡的80–100倍)，用於穩定的中重度慢性癌痛，每72小時更換、貼於平坦完整乾燥皮膚(前胸、後背、上臂)，貼上後約12–24小時才達穩定血中濃度，須注意呼吸抑制、嗜睡、暈眩、便秘等鴉片副作用，避免熱源(發燒、熱敷會加速吸收致過量)。本題問錯誤者:「屬弱效麻醉性止痛劑」錯(應為強效)，故選A。","options":{"A":"錯誤(本題答案)：Fentanyl為強效麻醉性止痛劑，非弱效。","B":"注意呼吸抑制、嗜睡、暈眩等副作用正確。","C":"更換時舊貼片重疊一段時間維持濃度，敘述可接受。","D":"貼於前胸後背上臂等平坦完整皮膚正確。"},"sources":["Fentanyl 穿皮貼片","新文京《內外科護理學》"]}},"110110-N3-40":{"quick":"瀕死護理：肛周皮膚可用氧化鋅保護、意識不清宜側臥利分泌物流出(25)。","detail":{"background":"瀕死病人護理正確:2肛門周圍皮膚因失禁易破損，可塗氧化鋅保護;5意識不清者採側臥，使口腔分泌物易流出、預防吸入。錯誤者:1瀕死前嘎嘎聲(death rattle)是咽喉分泌物，抽痰會刺激增加分泌與不適，「不應常規抽痰」;3瀕死病人不應勉強鼓勵進食(吞嚥反射差、易嗆，反增不適);4病人對刺激無反應時「聽覺仍最後消失」，並非聽力也喪失。故正確為2、5(C)。","options":{"A":"含1(抽痰)錯。","B":"含1、4錯。","C":"正確：2氧化鋅保護肛周、5側臥利分泌物流出。","D":"含3(勉強進食)錯。"},"sources":["瀕死照護","新文京《內外科護理學》"]}},"111110-N3-36":{"quick":"三階梯止痛：麻醉性止痛藥的解毒劑是Naloxone。","detail":{"background":"癌痛三階梯與鴉片用藥:應「按時(by the clock)」給藥優於需要時(prn)，能維持穩定血中濃度更有效(故A錯);第一階段為「非鴉片類(NSAID/acetaminophen)」可合併輔助藥，弱效鴉片屬第二階(故B錯);純鴉片受體致效劑「無天花板效應(no ceiling)」，加劑量可增止痛，僅副作用受限(故C錯);鴉片過量(呼吸抑制)的解毒劑是Naloxone(納洛酮)(D正確)。故選D。","options":{"A":"按時給藥優於需要時給藥。","B":"第一階段為非鴉片類，非弱效麻醉劑。","C":"純鴉片致效劑無天花板效應，加劑量可增止痛。","D":"正確：麻醉性止痛劑解毒劑是Naloxone。"},"sources":["WHO 癌痛三階梯","Katzung Opioids"]}},"112110-N3-42":{"quick":"病人自控式止痛(PCA)可減少藥量、依需求給藥，提升止痛品質。","detail":{"background":"癌痛處置正確觀念:病人自控式止痛(PCA)讓病人在安全鎖定範圍內自行追加劑量，能更貼合疼痛波動、減少總藥量並提升滿意度(B正確);脊椎硬膜外注藥後不需固定平躺6–8小時(此為腰椎穿刺後的舊觀念);冷熱療是「提高」疼痛閾值而減痛(非降低閾值，故C錯);冷療不可長時間持續(會凍傷，需間歇使用，故D錯)。故選B。","options":{"A":"硬膜外注藥後不需固定平躺6–8小時。","B":"正確：PCA可減少藥量、延長間隔、貼合疼痛需求。","C":"冷熱療是提高(非降低)疼痛閾值而減痛。","D":"冷療應間歇使用，持續會凍傷。"},"sources":["疼痛管理 PCA","新文京《內外科護理學》"]}},"114100-N3-21":{"quick":"臨終關懷正確：評估病人面對死亡的調適能力，並採開放溝通主動陪伴。","detail":{"background":"瀕死期臨終關懷:應「評估病人面對死亡的調適能力」與需求(A正確)，採開放性溝通(允許談論死亡與心願，非減少溝通)、誠實面對而非一味保證與灌注不切實際的希望、醫護應「主動」陪伴與症狀控制(非被動)。本題問正確者，故選A。補充:臨終關懷強調誠實開放的溝通、評估病人對死亡的調適、尊重自主與完成心願(四道人生:道謝道歉道愛道別)，醫護應主動陪伴與症狀控制，而非被動或一味保證。","options":{"A":"正確：評估病人面對死亡的調適能力。","B":"應採開放性溝通，非減少。","C":"不宜持續給不切實際的保證與希望，應誠實陪伴。","D":"醫護此期應主動協助症狀控制與陪伴，非被動。"},"sources":["臨終關懷","新文京《內外科護理學》"]}},"101030-N3-57":{"quick":"上腔靜脈症候群(SVCS)最常見於「肺癌」(尤其右上肺/小細胞肺癌)。","detail":{"background":"上腔靜脈症候群(SVCS)是縱膈腔腫瘤或淋巴結壓迫上腔靜脈，使頭頸與上肢靜脈回流受阻。最常見病因為「肺癌」(尤其右側、小細胞與非小細胞肺癌)，其次為淋巴瘤、縱膈轉移。表現:臉頸與上肢腫脹、頸靜脈與胸壁靜脈怒張、頭痛、呼吸困難、發紺，平躺加重。處置:抬高床頭半坐臥、放療(最常用)或化療縮小腫瘤、必要時血管支架。本題最常引起SVCS者為肺癌(A)。","options":{"A":"正確：肺癌是SVCS最常見病因。","B":"肝癌不致SVCS。","C":"乳癌非SVCS主因。","D":"喉癌非SVCS主因。"},"sources":["Harrison 21e Oncologic Emergencies","新文京《內外科護理學》"]}},"102030-N3-42":{"quick":"腫瘤溶解症候群不應輸注維生素C；維生素C代謝為草酸，反增腎結石/腎損風險。","detail":{"background":"腫瘤溶解症候群(TLS)是大量癌細胞快速崩解，釋出細胞內物質造成「高鉀、高磷、高尿酸、低鈣」與急性腎損傷。處置:大量水化(輸生理食鹽水)促進排泄、給allopurinol(或rasburicase)降尿酸、Kayexalate(陽離子交換樹脂)降血鉀、必要時透析。不應輸維生素C，因其代謝為草酸鹽會增加腎結晶與腎損傷風險，且不利尿酸控制。本題問錯誤者，故選B。","options":{"A":"大量輸注生理食鹽水促進排泄正確。","B":"錯誤(本題答案)：不應輸維生素C(代謝為草酸增腎損)。","C":"Kayexalate降血鉀正確。","D":"allopurinol降尿酸正確。"},"sources":["Harrison 21e TLS","新文京《內外科護理學》"]}},"102110-N3-8":{"quick":"腫瘤溶解症候群會出現高血鉀(K⁺上升)。","detail":{"background":"急性腫瘤溶解症候群因細胞內物質大量釋出，典型代謝變化為:「高血鉀(K⁺↑)、高血磷(PO₄↑)、高尿酸(uric acid↑)」與繼發性「低血鈣(Ca²⁺↓，因高磷結合鈣)」。本題選項:A磷下降錯(應上升)、B鉀上升正確、C鈣上升錯(應下降)、D尿酸下降錯(應上升)。故選B(K⁺上升)。高血鉀可致致命心律不整，是最危急的變化。","options":{"A":"磷應上升(高血磷)，非下降。","B":"正確：K⁺上升(高血鉀)。","C":"鈣應下降(低血鈣)，非上升。","D":"尿酸應上升(高尿酸)，非下降。"},"sources":["Harrison 21e TLS","新文京《內外科護理學》"]}},"105030-N3-39":{"quick":"上腔靜脈症候群最常由「肺癌」引起。","detail":{"background":"上腔靜脈症候群(SVCS)由縱膈病灶壓迫上腔靜脈致頭頸上肢回流受阻。成人最常見病因是「肺癌」(縱膈淋巴結與右上肺腫瘤)，其次淋巴瘤。乳癌、頭頸癌、胃癌較少直接造成SVCS。表現為臉頸腫脹、靜脈怒張、呼吸困難、頭脹，處置以半坐臥、放/化療為主。本題最常引起者為肺癌(A)。","options":{"A":"正確：肺癌是SVCS最常見原因。","B":"乳癌較少造成SVCS。","C":"頭頸癌非SVCS主因。","D":"胃癌非SVCS主因。"},"sources":["Harrison 21e SVCS","新文京《內外科護理學》"]}},"105090-N3-40":{"quick":"腫瘤溶解症候群為「低血鈣」而非高血鈣。","detail":{"background":"腫瘤溶解症候群典型實驗室四聯:高血鉀、高血磷、高尿酸、低血鈣(高磷與鈣結合致低鈣)。本題問臨床表徵錯誤者:「高血鈣」錯，TLS應為低血鈣，故選B。低血鈣可致手足搐搦、心律不整;高血鉀與高尿酸性腎病是主要危險。注意:高血鈣是另一種癌症急症(常見於骨轉移、副甲狀腺相關蛋白PTHrP分泌)，與TLS不同。","options":{"A":"高血鉀為TLS表徵正確。","B":"錯誤(本題答案)：TLS為低血鈣，非高血鈣。","C":"高尿酸為TLS表徵正確。","D":"高血磷為TLS表徵正確。"},"sources":["Harrison 21e TLS","新文京《內外科護理學》"]}},"106110-N3-41":{"quick":"腫瘤溶解症候群不需常規預防性給類固醇及抗組織胺(那是輸注反應的預防)。","detail":{"background":"TLS的預防與處置:水分補充(大量水化)、預防性降尿酸藥(allopurinol或rasburicase)、密切監測尿量與尿液酸鹼值、矯正電解質(降鉀降磷補鈣)、必要時透析。「預防性給類固醇與抗組織胺」是用於預防化療藥「輸注/過敏反應」，並非TLS的處置。本題問錯誤者，故選A。","options":{"A":"錯誤(本題答案)：類固醇與抗組織胺是預防輸注反應，非TLS處置。","B":"水分補充正確。","C":"預防性降尿酸藥物正確。","D":"監測尿量與尿液酸鹼值正確。"},"sources":["Harrison 21e TLS","新文京《內外科護理學》"]}},"107030-N3-38":{"quick":"預防腫瘤溶解症候群應「大量輸液(水化)」，而非減少輸液。","detail":{"background":"預防TLS的核心是「大量靜脈水化」以增加尿量、促進尿酸與磷酸鹽排泄、維持腎灌流，並給allopurinol降尿酸、Kayexalate降血鉀、視情況以Sodium Bicarbonate鹼化尿液(增加尿酸溶解度，但須權衡磷酸鈣沉積)。本題問錯誤者:「治療前後減少輸液以降低心臟負擔」錯，應大量輸液，故選A。","options":{"A":"錯誤(本題答案)：應大量水化(輸液)，非減少輸液。","B":"Allopurinol降尿酸正確。","C":"Kayexalate降血鉀正確。","D":"Sodium Bicarbonate鹼化尿液正確。"},"sources":["Harrison 21e TLS","新文京《內外科護理學》"]}},"107110-N3-44":{"quick":"腫瘤溶解症候群：高血鉀、補充大量水分、allopurinol降尿酸(135)。","detail":{"background":"TLS正確敘述:1高血鉀症(細胞內鉀釋出);3補充大量水分(水化促排泄);5 allopurinol抑制尿酸生成降尿酸。錯誤項:2「高血鈣」錯(TLS為低血鈣);4 Kayexalate是降「鉀」離子(非鈉離子)。故正確組合為1、3、5(B)。","options":{"A":"含2(高血鈣)錯。","B":"正確：1高血鉀、3補充大量水分、5 allopurinol降尿酸。","C":"含2、4錯。","D":"含4(Kayexalate降鉀非鈉)錯。"},"sources":["Harrison 21e TLS","新文京《內外科護理學》"]}},"108110-N3-32":{"quick":"上腔靜脈症候群症狀並非「晚上最明顯」；通常平躺或晨起時較明顯。","detail":{"background":"SVCS常因縱膈淋巴結腫大壓迫上腔靜脈。症狀:臉頸與上肢腫脹、靜脈怒張、頭痛、呼吸困難，「平躺或晨起時」因回流更受阻而加重，並非晚上最明顯;體外放射線照射是最常用治療;呼吸困難時宜採半坐臥(抬高床頭)以減少回流阻塞與改善呼吸。本題問錯誤者:「臨床症狀在晚上最為明顯」錯，故選B。","options":{"A":"淋巴結腫大壓迫影響回流是常見原因正確。","B":"錯誤(本題答案)：症狀非晚上最明顯，平躺/晨起較明顯。","C":"體外放射照射為最常用治療正確。","D":"呼吸困難採半坐臥正確。"},"sources":["Harrison 21e SVCS","新文京《內外科護理學》"]}},"108110-N3-36":{"quick":"乳癌轉移壓迫脊髓最常見部位是「胸椎」。","detail":{"background":"惡性脊髓壓迫(malignant spinal cord compression)是腫瘤急症，常見於乳癌、肺癌、攝護腺癌、多發性骨髓瘤。脊柱轉移最好發於「胸椎(約70%)」，其次腰椎、頸椎;乳癌骨轉移壓迫脊髓亦以胸椎最常見。表現:背痛(最早)、感覺/運動障礙、大小便失禁、病理反射(Babinski陽性)。處置須緊急類固醇、放療或減壓手術以保留神經功能。本題最常見部位為胸椎(B)。","options":{"A":"頸椎非最常見受壓部位。","B":"正確：胸椎是脊柱轉移與脊髓壓迫最常見部位。","C":"腰椎次於胸椎。","D":"薦椎較少見。"},"sources":["Harrison 21e Spinal Cord Compression","新文京《內外科護理學》"]}},"112110-N3-41":{"quick":"上腔靜脈症候群常見臉部腫脹、頭痛、呼吸困難等回流受阻症狀。","detail":{"background":"SVCS正確敘述:最常見病因是「肺癌」(非淋巴瘤);常見症狀為臉頸腫脹、頭痛、呼吸困難、靜脈怒張、上肢水腫(B正確);姿勢應採「半坐臥抬高床頭」減少回流阻塞，而非側臥平躺;治療依細胞型態，小細胞肺癌與淋巴瘤對化療敏感、非小細胞肺癌多以放療為主(故D「非小細胞癌用化療改善」不精確)。故選B。","options":{"A":"SVCS最常見於肺癌，非淋巴瘤。","B":"正確：常見臉部腫脹、頭痛、呼吸困難。","C":"應採半坐臥抬高床頭，非側臥平躺。","D":"非小細胞肺癌SVCS多以放療為主，非化療。"},"sources":["Harrison 21e SVCS","新文京《內外科護理學》"]}},"112180-N3-24":{"quick":"乳癌出現意識混亂、嗜睡、心律不整、嘔吐便秘，最可能為「高血鈣症」。","detail":{"background":"惡性腫瘤高血鈣症常見於乳癌、肺癌、多發性骨髓瘤(骨轉移蝕骨或PTHrP分泌)，是最常見的代謝性癌症急症。症狀(stones, bones, groans, moans):意識混亂、嗜睡、虛弱、噁心嘔吐、便秘、多尿脫水、心律不整(QT縮短)。本例乳癌伴前述症狀最符合高血鈣症(D)。處置:大量生理食鹽水水化、雙磷酸鹽(如Zometa/zoledronic acid)、降鈣素。","options":{"A":"腫瘤溶解症候群為低血鈣、高鉀磷尿酸，臨床不同。","B":"上腔靜脈症候群為臉頸腫脹呼吸困難。","C":"脊髓壓迫以背痛與神經障礙為主。","D":"正確：高血鈣症致意識混亂、心律不整、嘔吐便秘。"},"sources":["Harrison 21e Hypercalcemia of Malignancy","新文京《內外科護理學》"]}},"114030-N3-24":{"quick":"脊髓壓迫不會出現「布魯辛斯基氏徵象(Brudzinski)」(那是腦膜炎徵象)。","detail":{"background":"乳癌骨轉移合併脊髓壓迫常見:背痛(最早最常見)、壓迫平面以下感覺/運動障礙、大小便失禁(膀胱直腸功能障礙)、上運動神經元徵象如巴賓斯基(Babinski)陽性、反射亢進。Brudzinski徵象(被動屈頸引發雙髖膝屈曲)是「腦膜刺激徵」，見於腦膜炎/蛛網膜下腔出血，不是脊髓壓迫的表現。本題問最不常出現者，故選B。","options":{"A":"背痛是脊髓壓迫最常見最早症狀。","B":"最不常出現(本題答案)：Brudzinski為腦膜刺激徵，非脊髓壓迫。","C":"大小便失禁為脊髓壓迫表現。","D":"Babinski陽性(上運動神經元徵象)可出現。"},"sources":["Harrison 21e Spinal Cord Compression","新文京《內外科護理學》"]}},"114100-N3-27":{"quick":"預防/處置腫瘤溶解症候群應「大量輸液」，「減少輸液」為錯誤。","detail":{"background":"TLS處置:Sodium Bicarbonate鹼化尿液促進尿酸溶解排出、Kayexalate治療高血鉀、Allopurinol(或rasburicase)抑制尿酸生成、最重要的是「大量靜脈水化」維持高尿量保護腎臟。本題問錯誤者:「減少輸液降低心臟負擔」錯，TLS需大量輸液，故選C。","options":{"A":"Sodium Bicarbonate鹼化尿液促尿酸溶解正確。","B":"Kayexalate治療高血鉀正確。","C":"錯誤(本題答案)：應大量輸液，非減少輸液。","D":"Allopurinol抑制尿酸生成正確。"},"sources":["Harrison 21e TLS","新文京《內外科護理學》"]}},"102110-N3-21":{"quick":"胃切除後巨球性貧血＋牛肉舌＋四肢刺痛＋Schilling陽性＝維生素B12缺乏。","detail":{"background":"維生素B12吸收需胃壁細胞分泌的「內在因子(IF)」於迴腸末端結合吸收。全胃切除或自體免疫(惡性貧血)使IF缺乏，導致B12缺乏的「巨球性(大球性)貧血」:紅血球大而不規則(MCV升高)、血紅素低;因B12參與髓鞘合成，會出現「神經學症狀」如四肢末梢刺痛麻木、運動協調差(此為與葉酸缺乏的鑑別點);舌呈牛肉樣紅(舌炎);Schilling試驗陽性確認B12吸收障礙。本例血清鐵蛋白與葉酸正常，故為B12缺乏(C)。","options":{"A":"缺鐵為小球低色素貧血、湯匙指甲，本例鐵蛋白正常。","B":"葉酸缺乏無神經症狀，本例葉酸正常。","C":"正確：胃切除致內在因子缺乏，維生素B12缺乏巨球性貧血。","D":"缺乏胃酸非本題巨球性貧血合併神經症狀的主因。"},"sources":["新文京《內外科護理學》貧血","Harrison Megaloblastic Anemia"]}},"103030-N3-40":{"quick":"腎臟與肝臟製造紅血球生成素(EPO)，其障礙會致貧血(23)。","detail":{"background":"紅血球生成素(EPO)主要由「腎臟(約90%)」的腎間質細胞分泌，少量由「肝臟」製造，EPO刺激骨髓造紅血球。故腎臟(3)或肝臟(2)功能障礙會使EPO製造減少導致貧血(腎性貧血是慢性腎臟病常見併發症)。肺臟(1)與胰臟(4)不製造EPO。本題正確組合為2、3(C)。","options":{"A":"含1(肺臟不製造EPO)。","B":"含1、4皆不製造EPO。","C":"正確：2肝臟、3腎臟製造EPO，障礙致貧血。","D":"含4(胰臟不製造EPO)。"},"sources":["Harrison Erythropoiesis","新文京《內外科護理學》"]}},"104030-N3-37":{"quick":"紅血球過多症病人應「適度活動、補充水分」以防血栓，並非絕對臥床不可下床。","detail":{"background":"紅血球過多症(polycythemia，含真性紅血球增多症)使血液濃稠、血容積增加，主要風險是「血栓栓塞」。故紅血球、血色素、血球容積常高於正常;應鼓勵增加飲水量稀釋血液、適度活動避免久臥(久臥反增血栓風險)、觀察頭痛、呼吸困難、抽搐等栓塞徵象。本題問錯誤者:「應臥床休息不可下床」錯(應適度活動防血栓)，故選B。","options":{"A":"紅血球、血色素、血容積高於正常正確。","B":"錯誤(本題答案)：應適度活動防血栓，非絕對臥床。","C":"增加飲水量稀釋血液正確。","D":"觀察頭痛、呼吸困難、抽搐等栓塞現象正確。"},"sources":["Harrison Polycythemia","新文京《內外科護理學》"]}},"106030-N3-38":{"quick":"再生不良性貧血是全血球減少(紅、白、血小板「皆」減少)，非只紅血球。","detail":{"background":"再生不良性貧血(aplastic anemia)是骨髓造血幹細胞受損/被抑制，導致「全血球減少(pancytopenia)」:紅血球減少(貧血、疲倦)、白血球減少(易感染)、血小板減少(易出血)。治療可採免疫抑制劑或血液幹細胞移植;宜少量多餐、高蛋白高維生素;活動時胸痛或喘可能是貧血所致需評估。本題問錯誤者:「白血球或血小板不受影響」錯(三系皆降)，故選A。","options":{"A":"錯誤(本題答案)：再生不良性貧血為全血球減少，白血球與血小板亦減少。","B":"可採血液幹細胞移植治療正確。","C":"活動時胸痛或喘可能與貧血有關正確。","D":"宜少量多餐、高蛋白高維生素正確。"},"sources":["Harrison Aplastic Anemia","新文京《內外科護理學》"]}},"106110-N3-37":{"quick":"口服鐵劑不可與牛奶共食(鈣會抑制鐵吸收)。","detail":{"background":"缺鐵性貧血口服鐵劑護理:空腹或兩餐之間服用吸收最佳;與維生素C(果汁)同服可促進鐵吸收(三價鐵還原為易吸收的二價鐵);避免與制酸劑、牛奶/乳製品(鈣)、茶/咖啡(單寧酸)、高纖同服(會抑制吸收);用吸管服液態鐵劑並服後漱口防牙齒染色;會使糞便變黑。本題問錯誤者:「與牛奶共食」錯(鈣抑制吸收)，故選A。","options":{"A":"錯誤(本題答案)：不可與牛奶共食，鈣會抑制鐵吸收。","B":"與果汁(維生素C)同服促進吸收正確。","C":"避免與制酸劑同服正確。","D":"於二餐之間服用正確。"},"sources":["新文京《內外科護理學》鐵劑","Harrison Iron Deficiency"]}},"107110-N3-42":{"quick":"動物性鐵(血基質鐵)較植物性鐵容易吸收，非植物性較易吸收。","detail":{"background":"鐵劑與鐵質補充:鐵分「血基質鐵(heme iron，動物性如紅肉、肝、血)」與「非血基質鐵(non-heme，植物性)」，動物性血基質鐵吸收率明顯高於植物性;口服鐵劑可與維生素C同服促進吸收;肌肉注射鐵劑須採「Z型注射法」避免藥液回滲染色皮膚並觀察過敏。本題問錯誤者:「植物性鐵較動物性容易吸收」錯，故選B。","options":{"A":"鐵劑與維生素C同服促進吸收正確。","B":"錯誤(本題答案)：動物性(血基質)鐵較植物性容易吸收。","C":"鐵劑注射採Z型注射法正確。","D":"鐵劑注射後觀察過敏正確。"},"sources":["新文京《內外科護理學》","Harrison Iron"]}},"107110-N3-43":{"quick":"惡性貧血用Schilling試驗/抗內在因子抗體診斷，「費城染色體」是慢性骨髓性白血病的標記。","detail":{"background":"惡性貧血(pernicious anemia)是自體免疫破壞胃壁細胞使內在因子缺乏、B12吸收不良的巨球性貧血:會出現蒼白、呼吸困難、心悸(貧血症狀)與「神經學症狀」(手足針刺麻木、運動協調差、本體感覺障礙);診斷用Schilling試驗、抗內在因子/抗壁細胞抗體;治療須「終生肌肉注射維生素B12」(口服無效因缺IF)。費城染色體(Ph)是CML的標記，與惡性貧血無關。本題問錯誤者，故選C。","options":{"A":"觀察手足針刺麻木、協調變差(神經症狀)正確。","B":"出現蒼白、呼吸困難、心悸正確。","C":"錯誤(本題答案)：費城染色體是CML標記，非惡性貧血。","D":"須終生肌肉注射維生素B12正確。"},"sources":["Harrison Pernicious Anemia","新文京《內外科護理學》"]}},"108020-N3-40":{"quick":"席林試驗(Schilling test)用於鑑別維生素B12缺乏(惡性貧血)。","detail":{"background":"貧血鑑別檢查:Schilling試驗測口服放射標記B12的尿排出量，用以鑑別B12缺乏是因「內在因子缺乏(惡性貧血)」還是迴腸吸收問題;直接/間接Coombs試驗用於自體免疫溶血性貧血(偵測紅血球或血清抗體);本斯-瓊司氏蛋白(Bence-Jones protein)見於多發性骨髓瘤。本題B12缺乏惡性貧血的鑑別檢查為Schilling試驗(C)。","options":{"A":"直接Coombs用於自體免疫溶血。","B":"間接Coombs用於偵測血清抗體(溶血/配血)。","C":"正確：Schilling試驗鑑別維生素B12缺乏。","D":"Bence-Jones蛋白見於多發性骨髓瘤。"},"sources":["Harrison B12 Deficiency","新文京《內外科護理學》"]}},"108110-N3-30":{"quick":"惡性貧血是「大球性(巨球性)」貧血，紅血球大而不規則，非小且不規則。","detail":{"background":"惡性貧血(B12缺乏)為巨球性貧血:紅血球數目減少、體積「大(大球性，MCV升高)」、未成熟;因無效造血與溶血使間接膽紅素上升(皮膚輕度黃疸);舌炎(牛肉舌)、神經症狀。本題問錯誤者:「紅血球外觀小且形狀不規則」錯(應為大球性)，缺鐵性貧血才是小球低色素，故選B。","options":{"A":"紅血球數目減少正確。","B":"錯誤(本題答案)：惡性貧血為大球性，紅血球大(非小)。","C":"膽紅素上升(無效造血)正確。","D":"舌炎、皮膚發黃正確。"},"sources":["Harrison Megaloblastic Anemia","新文京《內外科護理學》"]}},"109030-N3-33":{"quick":"蒼白、平滑舌炎、湯匙狀指甲(匙狀甲)是缺鐵性貧血的典型表現。","detail":{"background":"缺鐵性貧血(iron deficiency anemia)是最常見貧血，為小球低色素性。典型表現:皮膚黏膜蒼白、疲倦、舌炎(舌乳頭萎縮呈平滑紅舌)、口角炎、「匙狀甲(koilonychia，指甲萎縮變薄呈湯匙狀)」、異食癖(pica)、嚴重者吞嚥困難(Plummer-Vinson)。本例蒼白＋平滑舌炎＋湯匙狀指甲最符合缺鐵性貧血(B)。","options":{"A":"葉酸缺乏為巨球性，無匙狀甲。","B":"正確：蒼白、平滑舌炎、湯匙狀指甲為缺鐵性貧血。","C":"惡性貧血為巨球性，有神經症狀。","D":"再生不良性貧血為全血球減少。"},"sources":["Harrison Iron Deficiency","新文京《內外科護理學》"]}},"109110-N3-42":{"quick":"真性紅血球增多症因紅血球增多，膚色「紅潤暗紅」而非蒼白。","detail":{"background":"真性紅血球增多症(polycythemia vera)是骨髓增生性腫瘤(多有JAK2突變)，紅血球大量增生使血液濃稠。臨床表徵:臉色與結膜「紅潤、暗紅充血」(非蒼白)、皮膚搔癢(尤其溫水浴後)、頭痛頭暈、視力模糊、高血壓、脾腫大、血栓與出血傾向、痛風(尿酸高)。本題問錯誤者:「臉色蒼白」錯(應為紅潤暗紅)，故選B。","options":{"A":"眼結膜充血正確。","B":"錯誤(本題答案)：應臉色紅潤暗紅，非蒼白。","C":"皮膚發癢(溫水後)正確。","D":"頭痛正確。"},"sources":["Harrison Polycythemia Vera","新文京《內外科護理學》"]}},"110030-N3-35":{"quick":"再生不良性貧血是因骨髓被破壞或功能受抑制所致。","detail":{"background":"各類貧血病因:海洋性(地中海)貧血是「血紅素鏈合成基因缺陷」(遺傳);鐮狀細胞貧血是血紅素結構異常(HbS)致紅血球鐮狀化溶血;缺鐵性貧血是鐵不足影響血紅素「合成量」(非結構異常);再生不良性貧血是「骨髓造血幹細胞被破壞或功能受抑制」致全血球減少。本題正確者為C(再生不良性貧血因骨髓被破壞)。","options":{"A":"海洋性貧血是血紅素鏈基因缺陷，非骨髓被破壞。","B":"鐮狀細胞貧血是血紅素結構異常，非血小板破壞。","C":"正確：再生不良性貧血因骨髓被破壞或抑制。","D":"缺鐵性貧血是鐵不足影響血紅素合成量，非結構異常。"},"sources":["Harrison Anemia","新文京《內外科護理學》"]}},"110030-N3-36":{"quick":"過敏不是紅血球過多症的併發症；常見為栓塞、出血、痛風。","detail":{"background":"紅血球過多症(尤真性)血液黏稠、血球增多，常見併發症:1.血栓栓塞(thrombosis，最危險，心肌梗塞、中風、深部靜脈栓塞);2.出血(血小板功能異常、血管充血);3.痛風(紅血球大量代謝使尿酸升高)。「過敏(allergy)」與紅血球過多症無關。本題問不是併發症者，故選D。","options":{"A":"栓塞為主要併發症。","B":"出血為併發症。","C":"痛風(高尿酸)為併發症。","D":"不是(本題答案)：過敏非紅血球過多症併發症。"},"sources":["Harrison Polycythemia","新文京《內外科護理學》"]}},"110030-N3-42":{"quick":"「手足麻木」是維生素B12缺乏(惡性貧血)的神經症狀，非缺鐵性貧血常見症狀。","detail":{"background":"嚴重缺鐵性貧血症狀:疲倦蒼白、吞嚥困難(Plummer-Vinson)、舌炎口炎、匙狀甲、異食癖。「手足麻木刺痛」屬「維生素B12缺乏(惡性貧血)」的神經學症狀(B12參與髓鞘合成)，並非缺鐵性貧血的特徵—這是兩種貧血的重要鑑別點(缺鐵無神經症狀)。本題問不是缺鐵性貧血常見症狀者，故選D。","options":{"A":"吞嚥困難為嚴重缺鐵(Plummer-Vinson)症狀。","B":"舌炎口炎為缺鐵症狀。","C":"湯匙狀指甲為缺鐵典型表現。","D":"不是(本題答案)：手足麻木屬B12缺乏神經症狀，非缺鐵。"},"sources":["Harrison Iron vs B12","新文京《內外科護理學》"]}},"110110-N3-43":{"quick":"席林試驗(Schilling test)協助診斷惡性貧血(B12缺乏)。","detail":{"background":"席林試驗用於評估口服維生素B12的吸收能力，藉以鑑別B12缺乏是否因內在因子缺乏(惡性貧血)，故協助診斷「惡性貧血」。缺鐵性貧血看血清鐵、鐵蛋白、總鐵結合力;溶血性貧血看Coombs試驗、間接膽紅素、網狀紅血球;再生不良性貧血看骨髓切片。本題正確為B(惡性貧血)。","options":{"A":"缺鐵性貧血看鐵指標，非Schilling。","B":"正確：席林試驗診斷惡性貧血(B12缺乏)。","C":"溶血性貧血看Coombs與膽紅素。","D":"再生不良性貧血看骨髓切片。"},"sources":["Harrison B12 Deficiency","新文京《內外科護理學》"]}},"111030-N3-15":{"quick":"貧血時心跳「加快、血壓可能下降」以代償，而非心跳變慢、血壓上升。","detail":{"background":"癌症病人貧血:全胃切除(內在因子缺乏致B12不足)或脾切除可影響紅血球生成/壽命;貧血代償機轉是心跳加快、心輸出量增加，嚴重時血壓下降，並有蒼白、易疲倦、活動後喘;鼓勵補充鐵與葉酸食物(牛肉、深綠蔬菜);採集中護理讓病人充分休息減少耗氧。本題問錯誤者:「心跳變慢、血壓上升」錯(應心跳加快)，故選B。","options":{"A":"全胃或脾切除影響紅血球生成正確。","B":"錯誤(本題答案)：貧血代償為心跳加快(非變慢)。","C":"補充鐵與葉酸食物(牛肉、綠蔬)正確。","D":"集中護理讓病人充分休息正確。"},"sources":["新文京《內外科護理學》","Harrison Anemia"]}},"111030-N3-35":{"quick":"缺鐵性貧血護理：吸管吸液態鐵、補充維生素C、注射後勿立即拔針(134)。","detail":{"background":"缺鐵性貧血護理:1液態鐵劑用「吸管」吸食並服後漱口，避免牙齒染色;3多攝取富含維生素C食物促進鐵吸收;4肌肉注射鐵劑採Z型注射且「注射後稍停再拔針(避免立即拔針致藥液回滲染色)」;2鐵劑應「空腹或兩餐間」吸收最佳，「飯後服用」會降低吸收(故2錯，飯後是為減胃刺激但吸收較差，本題以正確護理取空腹)。故正確組合為1、3、4(C)。","options":{"A":"含2(飯後服用吸收較差)。","B":"含2錯。","C":"正確：1吸管吸液態鐵、3補維生素C、4注射後勿立即拔針。","D":"含2錯。"},"sources":["新文京《內外科護理學》鐵劑","Harrison Iron"]}},"111110-N3-39":{"quick":"口服鐵劑後立刻漱口可減少牙齒染色。","detail":{"background":"鐵劑補充正確觀念:鐵劑「會刺激腸胃道」，雖空腹吸收最佳但腸胃不適者可飯後服;維生素C(非維生素E)有助鐵吸收;口服液態鐵後立刻漱口可「減少牙齒染色」(C正確);肌肉注射鐵劑採Z型注射且「不可按摩」(按摩會使藥液滲出染色)。本題問正確者，故選C。","options":{"A":"鐵劑會刺激腸胃道，非不刺激。","B":"是維生素C有助鐵吸收，非維生素E。","C":"正確：口服後立刻漱口可減少牙齒染色。","D":"鐵劑注射後不可按摩(會滲出染色)。"},"sources":["新文京《內外科護理學》","Harrison Iron"]}},"112110-N3-38":{"quick":"常吃速食缺鐵＋口炎、吞嚥困難、湯匙狀指甲＝缺鐵性貧血。","detail":{"background":"長期飲食不均(速食、鐵攝取不足)易致缺鐵性貧血。典型表現:口角炎/口炎、舌炎、吞嚥困難(嚴重者Plummer-Vinson)、「匙狀甲(指甲萎縮變薄呈湯匙狀)」、疲倦蒼白、異食癖。本例符合缺鐵性貧血(A)。惡性貧血為巨球性有神經症狀、葉酸缺乏為巨球性無神經症狀、再生不良為全血球減少，皆不符匙狀甲表現。","options":{"A":"正確：口炎、吞嚥困難、湯匙狀指甲為缺鐵性貧血。","B":"惡性貧血為巨球性且有神經症狀。","C":"葉酸缺乏為巨球性，無匙狀甲。","D":"再生不良性貧血為全血球減少。"},"sources":["Harrison Iron Deficiency","新文京《內外科護理學》"]}},"112180-N3-23":{"quick":"缺鐵性貧血鐵劑應於「兩餐之間空腹」服用以利吸收。","detail":{"background":"缺鐵性貧血口服鐵劑指導:於兩餐之間「空腹」服用吸收最佳(B正確);避免與「茶/咖啡(單寧酸)、牛奶(鈣)、制酸劑、玉米等高纖/植酸食物」同服(會抑制鐵吸收);可與維生素C或果汁同服促進吸收;服後漱口防染色;糞便變黑屬正常。本題問正確者，故選B。","options":{"A":"茶含單寧酸會抑制鐵吸收，不可正常喝茶。","B":"正確：鐵劑於兩餐之間空腹服用利吸收。","C":"牛奶(鈣)會抑制鐵吸收，不可同服。","D":"玉米高纖/植酸會抑制鐵吸收。"},"sources":["新文京《內外科護理學》鐵劑","Harrison Iron"]}},"113030-N3-26":{"quick":"紅血球增多症病人不宜「儘量臥床」，應適度活動並補水以防血栓。","detail":{"background":"紅血球增多症血液濃稠，主要風險是血栓。護理:鼓勵深呼吸有效咳嗽促進肺擴張通氣、增加飲水量(每日3,000–4,000 mL)稀釋血液、評估跌倒風險維護安全、「適度活動避免久臥」以防血栓(久臥反增血栓)。本題問錯誤者:「儘量臥床休息避免活動造成出血」錯(應適度活動防血栓)，故選B。","options":{"A":"深呼吸有效咳嗽促進肺擴張通氣正確。","B":"錯誤(本題答案)：應適度活動防血栓，非儘量臥床。","C":"增加飲水量3,000–4,000 mL稀釋血液正確。","D":"評估跌倒風險維護安全正確。"},"sources":["Harrison Polycythemia","新文京《內外科護理學》"]}},"113100-N3-10":{"quick":"全胃切除致內在因子缺乏，須補充維生素B12預防惡性貧血。","detail":{"background":"胃壁細胞分泌內在因子(IF)，是維生素B12在迴腸末端吸收的必要因子。全胃切除後IF缺乏，口服B12無法吸收，故須「終生補充(肌肉注射)維生素B12」以預防巨球性惡性貧血與神經病變。本題補充的維生素為B12(C)。維生素A、B6、K與此無關。","options":{"A":"維生素A與此無關。","B":"維生素B6非預防惡性貧血所需。","C":"正確：補充維生素B12預防惡性貧血。","D":"維生素K與凝血有關，非此題。"},"sources":["Harrison B12 Deficiency","新文京《內外科護理學》"]}},"113100-N3-21":{"quick":"惡性貧血用Schilling試驗/抗體診斷，不是用「骨髓切片」確定診斷(敘述3錯)。","detail":{"background":"惡性貧血敘述:1與自體免疫有關(抗壁細胞/抗內在因子抗體)正確;2曾胃切除者較易罹患(IF缺乏)正確;4須終生補充維生素B12正確;3「以骨髓切片確定診斷」錯—惡性貧血主要以Schilling試驗、血清B12濃度、抗內在因子抗體診斷，骨髓切片非確診工具。本題問錯誤者，故選敘述3(答案B)。","options":{"A":"敘述4(終生補B12)正確，非錯誤。","B":"正確(本題答案)：敘述3錯，惡性貧血不靠骨髓切片確診。","C":"敘述2(胃切除易罹患)正確。","D":"敘述1(與自體免疫有關)正確。"},"sources":["Harrison Pernicious Anemia","新文京《內外科護理學》"]}},"114170-N3-21":{"quick":"感染不是真性紅血球增多症的常見併發症；常見為栓塞、出血、痛風。","detail":{"background":"真性紅血球增多症血液濃稠、血球增多，常見併發症為:栓塞(血栓、中風、心肌梗塞)、出血(血小板功能異常)、痛風(尿酸高)、高黏稠症狀(頭痛、視力模糊、搔癢)。「感染」並非其典型併發症(白血球雖可能增多但非感染主因)。本題問最不適當(非常見併發症)者，故選D(感染)。","options":{"A":"栓塞為常見併發症。","B":"出血為常見併發症。","C":"痛風(高尿酸)為常見併發症。","D":"最不適當(本題答案)：感染非真性紅血球增多症常見併發症。"},"sources":["Harrison Polycythemia Vera","新文京《內外科護理學》"]}},"102030-N3-38":{"quick":"慢性骨髓性白血病(CML)血小板「增多或正常」，非減少。","detail":{"background":"慢性骨髓性白血病(CML)特徵:超過90–95%有費城染色體(t(9;22)→BCR-ABL融合基因);骨髓顆粒白血球系統大量增生使周邊白血球極高、各成熟階段顆粒球皆見;早慢性期「血小板常增多或正常」(非減少);常有脾腫大。治療以酪胺酸激酶抑制劑(imatinib等)為主。本題問錯誤者:「血小板數目減少」錯，故選C。","options":{"A":"95%有費城染色體正確。","B":"顆粒白血球增生正確。","C":"錯誤(本題答案)：CML血小板常增多或正常，非減少。","D":"引發脾腫大正確。"},"sources":["Harrison CML","新文京《內外科護理學》"]}},"102110-N3-28":{"quick":"嗜中性球占白血球50–70%，負責大部分吞噬與趨化作用。","detail":{"background":"白血球分類與功能:嗜中性球(neutrophil)約占50–70%，是對抗細菌的第一線，負責吞噬與趨化;淋巴球約20–40%(免疫);單核球約2–8%(吞噬、抗原呈現);嗜酸性球1–4%(寄生蟲、過敏);嗜鹼性球<1%(過敏、釋放組織胺)。本題占50–70%且主吞噬趨化者為嗜中性球(A)。這也是為何ANC是評估細菌感染風險的關鍵指標。","options":{"A":"正確：嗜中性球占50–70%，主吞噬與趨化。","B":"嗜酸性球占1–4%，與寄生蟲過敏有關。","C":"嗜鹼性球<1%，釋放組織胺。","D":"單核球占2–8%，吞噬與抗原呈現。"},"sources":["Harrison Hematology","新文京《內外科護理學》"]}},"103030-N3-37":{"quick":"男性正常值：Hct 45%、Hb 15、ANC 2,000(235)；RBC 350萬偏低、WBC 12,000偏高。","detail":{"background":"成人男性血液常值:RBC約450–600萬/μL(故1的350萬偏低)、Hct約42–52%(2的45%正常)、Hb約14–18 g/dL(3的15正常)、WBC約4,000–10,000/μL(4的12,000偏高)、ANC≥1,500(5的2,000正常)。故正常者為2、3、5(C)。","options":{"A":"含1(RBC 350萬偏低)、4(WBC 12,000偏高)。","B":"含1、4偏離正常。","C":"正確：2 Hct 45%、3 Hb 15、5 ANC 2,000皆正常。","D":"含4(WBC 12,000偏高)。"},"sources":["血液常值","新文京《內外科護理學》"]}},"104030-N3-35":{"quick":"白血病病人最常見死因是「出血與感染」(24)。","detail":{"background":"白血病因正常造血被白血病細胞取代，導致正常血球減少:白血球功能不足→嚴重「感染(4)」;血小板減少→「出血(2)」(含致命的顱內出血);紅血球減少→貧血。其中「感染」與「出血」是白血病病人最常見的死亡原因。疼痛(1)與過敏(3)非主要死因。故正確為2、4(C)。","options":{"A":"含1(疼痛)非主要死因。","B":"含3(過敏)非主要死因。","C":"正確：出血(2)與感染(4)為白血病最常見死因。","D":"含3(過敏)。"},"sources":["Harrison Leukemia","新文京《內外科護理學》"]}},"104100-N3-41":{"quick":"疑急性骨髓性白血病，最優先的診斷檢查是「骨髓抽吸與切片」。","detail":{"background":"急性白血病以倦怠、貧血、皮膚瘀斑出血點(血小板低)、感染為表現。確立診斷的關鍵檢查是「骨髓抽吸與骨髓切片(bone marrow aspiration & biopsy)」，觀察芽細胞(blast)比例(≥20%診斷急性白血病)、形態、免疫表型、染色體與分子標記。肝功能、腰椎穿刺、尿酸是輔助或評估併發症，非確診首要。本題最優先為B(骨髓抽吸與切片)。","options":{"A":"肝功能檢查非確診白血病的首要。","B":"正確：骨髓抽吸與切片是確診最優先檢查。","C":"腰椎穿刺評估中樞侵犯，非首要確診。","D":"尿酸檢查屬併發症評估。"},"sources":["Harrison Acute Leukemia","新文京《內外科護理學》"]}},"106110-N3-38":{"quick":"約90%以上慢性骨髓性白血病(CML)病人有費城染色體。","detail":{"background":"費城染色體(Philadelphia chromosome，t(9;22)產生BCR-ABL融合基因)是「慢性骨髓性白血病(CML)」的標誌，>90%病人陽性，也是酪胺酸激酶抑制劑(imatinib等)治療的標靶與療效監測依據;少數急性淋巴性白血病(成人Ph+ ALL)也可見。急性骨髓性、急性與慢性淋巴性白血病多無此染色體。本題90%有費城染色體者為CML(B)。","options":{"A":"急性骨髓性白血病非以費城染色體為標誌。","B":"正確：CML約90%以上有費城染色體。","C":"急性淋巴性白血病少數Ph+，非90%。","D":"慢性淋巴性白血病無費城染色體。"},"sources":["Harrison CML","新文京《內外科護理學》"]}},"107110-N3-39":{"quick":"化療藥「不能直接注入骨髓」；預防中樞侵犯是用鞘內(腰椎穿刺/Ommaya)給藥。","detail":{"background":"白血病檢查治療:嗜中性球(ANC)是免疫力與感染風險指標;化學治療是主要治療方式;化療後約「兩週(7–14天)」白血球降至最低(nadir)。預防中樞神經系統侵犯是採「鞘內(intrathecal)注射」(腰椎穿刺或Ommaya儲存槽)把藥送入腦脊髓液，而非「直接注入骨髓」。本題問錯誤者:「化療藥直接注入骨髓預防中樞侵犯」錯，故選C。","options":{"A":"嗜中性球是免疫力指標正確。","B":"化學治療為主要治療方式正確。","C":"錯誤(本題答案)：預防中樞侵犯用鞘內注射，非注入骨髓。","D":"化療後約兩週白血球降至最低正確。"},"sources":["Harrison Leukemia","新文京《內外科護理學》"]}},"108020-N3-41":{"quick":"白血球3,500×嗜中性13%＝ANC約455，屬嚴重嗜中性球低下(neutropenia)。","detail":{"background":"本例WBC 3,500×嗜中性球13%＝ANC約455/cumm(<500)，屬「嚴重嗜中性球低下(neutropenia)」，感染風險極高，須住院保護隔離與密切監測，「不可逕自出院自行觀察」。嗜中性球低下時感染症狀不典型(可無紅腫化膿，發燒可能是唯一表現)，且口腔、肛門黏膜與導管置入處仍可能感染(屏障破損)。故正確為B(正處於嗜中性球低下階段)。","options":{"A":"ANC約455屬嚴重低下，不應出院。","B":"正確：ANC約455，正處於嗜中性球低下階段。","C":"嗜中性球低下感染症狀不典型，不可僅自行觀察。","D":"口腔、肛門黏膜與導管處仍可能感染。"},"sources":["IDSA Neutropenia","新文京《內外科護理學》"]}},"109110-N3-37":{"quick":"骨髓檢查目的不含「評估骨髓壓力狀況」；用於診斷血液疾病、評估療效、計數前驅細胞。","detail":{"background":"骨髓檢查(抽吸/切片)的目的:診斷血液系統疾病(白血病、淋巴瘤、骨髓瘤、再生不良性貧血)、評估化學治療效果與緩解狀態、確定血球前驅細胞數目與型態、判定癌症分期與骨髓侵犯。「評估骨髓壓力狀況(壓力)」並非骨髓檢查的目的。本題問不是目的者，故選D。","options":{"A":"評估化療效果是骨髓檢查目的。","B":"診斷血液系統疾病是目的。","C":"確定血球前驅細胞數目是目的。","D":"不是(本題答案)：評估骨髓壓力狀況非骨髓檢查目的。"},"sources":["新文京《內外科護理學》","Harrison Bone Marrow Exam"]}},"110030-N3-37":{"quick":"慢性淋巴性白血病(CLL)是「成熟」小淋巴球增生，非不成熟。","detail":{"background":"慢性淋巴性白血病(CLL)好發於50歲以上中老年人;為「成熟但無功能的小淋巴球」大量增生堆積(故C「小且異常的不成熟淋巴球增生」錯，應為成熟淋巴球);早期常無症狀、分期早通常先觀察不需治療;因功能性淋巴球與免疫球蛋白不足容易嚴重感染。本題問錯誤者，故選C。","options":{"A":"好發於50歲以上成人正確。","B":"分期較早通常不需治療(觀察)正確。","C":"錯誤(本題答案)：CLL為成熟小淋巴球增生，非不成熟。","D":"容易造成嚴重感染正確。"},"sources":["Harrison CLL","新文京《內外科護理學》"]}},"112030-N3-38":{"quick":"骨髓抽吸對「不明原因肝脾腫大」具診斷價值(可發現浸潤)。","detail":{"background":"骨髓抽吸檢查:可採局部麻醉;成人常見抽吸部位為後/前腸骨嵴，或胸骨第2–3肋間(僅抽吸);結果可診斷血液疾病、決定分期與治療依據。對「無法解釋的肝脾腫大」骨髓檢查「有」診斷價值(可發現淋巴瘤、骨髓增生疾病、感染或浸潤)。本題問錯誤者:「對不明肝脾腫大不具診斷功能」錯，故選B。","options":{"A":"可採局部麻醉正確。","B":"錯誤(本題答案)：對不明肝脾腫大骨髓檢查具診斷價值。","C":"抽吸部位可在胸骨或前後腸骨嵴正確。","D":"可決定癌症分期作為治療依據正確。"},"sources":["Harrison Bone Marrow Exam","新文京《內外科護理學》"]}},"112030-N3-42":{"quick":"兒童常見、對化療反應佳的白血病預後最好；此題以「急性淋巴性」型預後相對最好。","detail":{"background":"白血病預後:急性淋巴性白血病(ALL)尤其兒童病人對化療反應佳、治癒率高;成人ALL與不同免疫表型預後不一。慢性淋巴性白血病進展慢但難根治;慢性骨髓性白血病進入「芽細胞期(blast crisis)」預後極差。本題四選項中以急性淋巴性型相對預後最好(官方答案A，T細胞型急性淋巴性);芽細胞期CML(D)預後最差、血小板缺乏的CLL(C)較差。故選A。","options":{"A":"正確(本題答案)：急性淋巴性白血病對化療反應佳、預後相對最好。","B":"B細胞型急性淋巴性亦屬ALL，但本題官方取A。","C":"血小板缺乏的慢性淋巴性預後較差。","D":"芽細胞期慢性骨髓性(blast crisis)預後最差。"},"sources":["Harrison Leukemia Prognosis","新文京《內外科護理學》"]}},"112110-N3-40":{"quick":"白血球30萬＋費城染色體＝慢性骨髓性白血病(CML)。","detail":{"background":"本例疲倦、蒼白、呼吸困難(貧血)、白血球極高(30萬/μL，各成熟期顆粒球增生)、骨髓檢查見「費城染色體」，最符合「慢性骨髓性白血病(CML)」。CML慢性期常以白血球顯著升高、脾腫大、費城染色體(BCR-ABL)為特徵，治療以酪胺酸激酶抑制劑為主。急性白血病以芽細胞為主、無費城染色體標誌;慢性淋巴性為成熟淋巴球增生。故選D。","options":{"A":"急性淋巴性白血病以芽細胞為主，無費城染色體。","B":"慢性淋巴性白血病無費城染色體。","C":"急性骨髓性白血病非以費城染色體為標誌。","D":"正確：白血球30萬＋費城染色體＝CML。"},"sources":["Harrison CML","新文京《內外科護理學》"]}},"113100-N3-24":{"quick":"急性白血病完全緩解標準錯誤者：周邊血液「有」芽細胞(應無芽細胞)。","detail":{"background":"急性白血病「完全緩解(complete remission)」標準:1骨髓內芽細胞(blast)<5%;造血細胞接近正常值(紅白血球、血小板恢復);無髓外器官浸潤;「周邊血液無芽細胞」。本題問錯誤者:敘述2「周邊血液有芽細胞」不符緩解標準(緩解應為周邊血無芽細胞)，故選C(敘述2錯)。","options":{"A":"敘述4(造血細胞接近正常)為緩解標準。","B":"敘述3(無器官浸潤)為緩解標準。","C":"正確(本題答案)：敘述2錯，緩解時周邊血應無芽細胞。","D":"敘述1(骨髓芽細胞<5%)為緩解標準。"},"sources":["Harrison Acute Leukemia Remission","新文京《內外科護理學》"]}},"113100-N3-25":{"quick":"白血球<1,000/mm³時建議少量多餐、禁食生食(低菌飲食)。","detail":{"background":"急性白血病化療護理:白血球最低點(nadir)約在化療後「7–14天(約兩週)」非4週;血小板<20,000時不可用牙線(易牙齦出血)，應用軟毛牙刷;白血球(ANC)<1,000/mm³感染風險高，建議少量多餐、「禁食生食」採低菌飲食(C正確);疲倦時鼓勵適度休息與活動交替，非長時間平躺不下床(久臥增併發症)。故正確為C。","options":{"A":"白血球nadir約兩週(非4週)。","B":"血小板低於20,000不可用牙線，會出血。","C":"正確：白血球<1,000建議少量多餐、禁食生食。","D":"不宜長時間平躺，應休息與活動交替。"},"sources":["IDSA Neutropenia","新文京《內外科護理學》"]}},"113180-N3-24":{"quick":"骨髓抽吸可於後腸骨嵴抽取，術後需以砂袋加壓止血(34)。","detail":{"background":"骨髓抽吸術:1須採「局部麻醉」(故「術中不用麻醉」錯);2可檢查血球數目、型態、芽細胞比例、染色體與分子標記，「不僅檢查白血球數目大小」(故錯);3成人常於「後腸骨嵴」抽取(也可胸骨);4術後穿刺處需「砂袋加壓」止血並臥床觀察出血。故正確為3、4(D)。","options":{"A":"含1(不用麻醉錯)、2(僅檢查白血球錯)。","B":"含1錯。","C":"含2錯。","D":"正確：3後腸骨嵴抽取、4術後砂袋加壓。"},"sources":["Harrison Bone Marrow Exam","新文京《內外科護理學》"]}},"114170-N3-18":{"quick":"骨髓抽吸：了解造血組織是否正常、可診斷白血病(12)。","detail":{"background":"骨髓抽吸檢查目的與方法:1了解骨髓造血組織是否正常(正確);2可診斷白血病、淋巴瘤、骨髓瘤等血液疾病(正確);3成人多由「後腸骨嵴或胸骨」抽取，「不由脛骨」(脛骨抽取用於嬰幼兒，故3錯);4多採「局部麻醉」，不需全身麻醉(故4錯)。本例不明原因出血做骨髓檢查最適當為1、2(A)。","options":{"A":"正確：1了解造血組織、2診斷白血病。","B":"含3(脛骨抽取錯)。","C":"含4(全身麻醉錯)。","D":"含3、4皆錯。"},"sources":["Harrison Bone Marrow Exam","新文京《內外科護理學》"]}},"115030-N3-26":{"quick":"成人骨髓穿刺不選「脛骨」(脛骨用於嬰幼兒)；成人選後腸骨嵴或胸骨。","detail":{"background":"成人骨髓穿刺抽吸:穿刺部位以「後腸骨嵴(最常用)」或胸骨為主，「脛骨抽取用於嬰幼兒」不適合成人(故A「宜選肋骨、脊椎或脛骨」錯);檢查可了解造血組織有無異常與骨髓侵犯;術後穿刺處以紗布敷蓋並「直接加壓至少5分鐘以上」止血;需觀察出血或感染。本題問錯誤者，故選A。","options":{"A":"錯誤(本題答案)：成人不選脛骨(嬰幼兒用)，應後腸骨嵴或胸骨。","B":"有助了解造血組織有無異常正確。","C":"術後紗布敷蓋直接加壓至少5分鐘正確。","D":"術後觀察出血或感染正確。"},"sources":["Harrison Bone Marrow Exam","新文京《內外科護理學》"]}},"101030-N3-80":{"quick":"尿中本瓊氏蛋白(Bence Jones protein)與多發性骨髓瘤有關。","detail":{"background":"多發性骨髓瘤(multiple myeloma)是骨髓中漿細胞(plasma cell)惡性增生，分泌大量單株免疫球蛋白與「輕鏈(light chain)」。輕鏈經腎臟濾出於尿中即「本瓊氏蛋白(Bence Jones protein)」，是骨髓瘤的特徵之一(也是腎損傷主因)。臨床以「CRAB」表現:高血鈣(Calcium↑)、腎功能不全(Renal)、貧血(Anemia)、骨痛/溶骨病灶(Bone)。本題本瓊氏蛋白相關疾病為多發性骨髓瘤(D)。","options":{"A":"惡性淋巴瘤非以本瓊氏蛋白為標誌。","B":"CML以費城染色體為標誌。","C":"低凝血酶原血症與凝血有關。","D":"正確：本瓊氏蛋白與多發性骨髓瘤有關。"},"sources":["Harrison Multiple Myeloma","新文京《內外科護理學》"]}},"103030-N3-41":{"quick":"何杰金氏病的淋巴結腫大是「無痛性」，非疼痛性。","detail":{"background":"何杰金氏淋巴瘤(Hodgkin lymphoma):典型表現為「無痛性」進行性淋巴結腫大(常自頸部開始)、B症狀(發燒、夜間盜汗、體重減輕)、皮膚搔癢、飲酒後淋巴結疼痛(alcohol-induced pain，特徵但不常見)、Reed-Sternberg細胞為病理特徵。本題問錯誤者:「頸部疼痛性的淋巴結腫大」錯，應為無痛性，故選B。","options":{"A":"發燒、夜間盜汗、體重減輕(B症狀)正確。","B":"錯誤(本題答案)：淋巴結腫大為無痛性，非疼痛性。","C":"飲酒後結節腫大疼痛(特徵性)正確。","D":"皮膚搔癢正確。"},"sources":["Harrison Hodgkin Lymphoma","新文京《內外科護理學》"]}},"107030-N3-74":{"quick":"淋巴瘤國際預後指標(IPI)不含「性別」；含年齡、LDH、分期、體能、結外侵犯。","detail":{"background":"淋巴瘤國際預後指標(IPI，用於非何杰金氏淋巴瘤)五項危險因子:年齡>60歲、乳酸脫氫酶(LDH)升高、ECOG體能狀態≥2、Ann Arbor分期III/IV期、結外侵犯部位>1。「性別」不是預後指標。本題問錯誤(非預後指標)者，故選C(性別)。","options":{"A":"診斷時年齡是IPI指標。","B":"LDH數值是IPI指標。","C":"錯誤(本題答案)：性別不是淋巴瘤預後指標。","D":"腫瘤分期是IPI指標。"},"sources":["IPI 國際預後指標","新文京《內外科護理學》"]}},"108020-N3-42":{"quick":"非何杰金氏淋巴瘤化療前應篩檢HBsAg並用lamivudine預防B肝再活化。","detail":{"background":"非何杰金氏淋巴瘤治療:常用化療(如R-CHOP含rituximab)±放療±幹細胞移植。因rituximab與化療造成免疫抑制，B肝帶原者易「病毒再活化致猛爆性肝炎」，故治療前應「篩檢HBsAg並預防性使用抗病毒藥(lamivudine/entecavir)」(D正確);非常規用低劑量類固醇單藥;周邊血液幹細胞移植「適用」於復發/高風險病人(自體移植);自體移植是先採集儲存自身幹細胞(非取出骨髓除癌細胞)。本題問正確者，故選D。","options":{"A":"非常規以低劑量類固醇單藥治療。","B":"幹細胞移植適用於復發病人。","C":"自體移植是採集儲存自身幹細胞，非取骨髓除癌細胞。","D":"正確：化療前篩HBsAg並用lamivudine防B肝再活化。"},"sources":["AASLD HBV再活化","Harrison NHL"]}},"108110-N3-34":{"quick":"多發性骨髓瘤臨床以骨痛、腎功能不全、貧血、高血鈣為主，「腹瀉」非特徵。","detail":{"background":"多發性骨髓瘤典型「CRAB」:高血鈣(Calcium↑，骨破壞釋鈣)、腎功能不全(Renal，輕鏈腎病)、貧血(Anemia，骨髓被取代)、骨痛/溶骨病變與病理性骨折(Bone)。此外易感染(正常免疫球蛋白不足)。「腹瀉」並非多發性骨髓瘤的典型症狀。本題問錯誤者，故選C(腹瀉)。","options":{"A":"骨痛(溶骨病變)為典型症狀。","B":"腎功能不全(輕鏈腎病)為典型。","C":"錯誤(本題答案)：腹瀉非多發性骨髓瘤典型症狀。","D":"貧血為典型症狀。"},"sources":["Harrison Multiple Myeloma","新文京《內外科護理學》"]}},"109110-N3-36":{"quick":"Ann Arbor第II期：侵犯橫膈膜「同側」≥2個淋巴結區域。","detail":{"background":"何杰金氏淋巴瘤Ann Arbor分期:I期—單一淋巴結區域;II期—橫膈膜「同側」≥2個淋巴結區域;III期—橫膈膜「兩側」淋巴結區域;IV期—瀰漫侵犯結外器官(肝、骨髓、肺)。另以A/B標示有無全身症狀。本題第II期為「橫膈膜同側2個以上淋巴結區域」(C)。","options":{"A":"侵犯多個結外器官屬IV期。","B":"侵犯單一結外器官屬IE。","C":"正確：橫膈膜同側≥2淋巴結區域為II期。","D":"橫膈膜兩側淋巴結區域屬III期。"},"sources":["Ann Arbor Staging","新文京《內外科護理學》"]}},"109110-N3-38":{"quick":"多發性骨髓瘤是「骨髓中漿細胞惡性分化且過度增生」。","detail":{"background":"多發性骨髓瘤是「漿細胞(plasma cell，B淋巴球終末分化、產生抗體的細胞)」在骨髓中惡性增生的疾病，分泌單株免疫球蛋白(M蛋白)與輕鏈，造成溶骨病變、高血鈣、腎損、貧血與免疫力下降。最適當的回覆是「骨髓中的漿細胞惡性分化且過度增生」(B)。白血球、紅血球、一般淋巴球過度增生分別對應白血病、紅血球增多症等其他疾病。","options":{"A":"白血球過度增生較似白血病。","B":"正確：骨髓中漿細胞惡性分化且過度增生。","C":"紅血球過度增生為紅血球增多症。","D":"淋巴球過度增生較似淋巴性白血病/淋巴瘤。"},"sources":["Harrison Multiple Myeloma","新文京《內外科護理學》"]}},"110110-N3-38":{"quick":"何杰金氏淋巴瘤好發呈「雙峰年齡(青壯年與老年)」且男略多，非好發女性老年人。","detail":{"background":"何杰金氏淋巴瘤特徵:病理可見「Reed-Sternberg細胞(瑞德-史登伯氏細胞)」;以「連續性」由鄰近淋巴結擴散，可侵犯淋巴結、肝、脾;年齡分布呈「雙峰(15–35歲青壯年與55歲以上)」，男性略多於女性;預後與分期相關，整體治癒率高。本題問錯誤者:「好發於女性老年人」錯，故選C。","options":{"A":"淋巴切片見Reed-Sternberg細胞正確。","B":"會侵犯淋巴結、肝、脾正確。","C":"錯誤(本題答案)：呈雙峰年齡、男略多，非好發女性老年人。","D":"預後與分期有關正確。"},"sources":["Harrison Hodgkin Lymphoma","新文京《內外科護理學》"]}},"111110-N3-35":{"quick":"多發性骨髓瘤應「適度活動」維持骨骼，「避免運動」反不利；但須防跌倒與病理性骨折。","detail":{"background":"多發性骨髓瘤護理:溶骨病變易病理性骨折，但「完全避免運動」會加速骨質流失與失能，應「適度、低衝擊活動」並避免跌倒與負重撞擊;穿背架支撐減輕脊椎壓力;鼓勵大量飲水以稀釋並排出鈣與輕鏈、降低高血鈣與腎損;避免接觸感染源(免疫力低)。本題問錯誤者:「避免運動以預防病理性骨折」錯(應適度活動)，故選B。","options":{"A":"避免接觸感冒親友(防感染)正確。","B":"錯誤(本題答案)：應適度活動，非完全避免運動。","C":"穿背架減輕骨骼壓力正確。","D":"鼓勵飲水降低血鈣濃度正確。"},"sources":["Harrison Multiple Myeloma","新文京《內外科護理學》"]}},"112030-N3-34":{"quick":"非何杰金氏淋巴瘤預後不佳因素：體能差、結外侵犯、Hb<12(234)。","detail":{"background":"非何杰金氏淋巴瘤(NHL)預後不佳因素(對應IPI與相關指標):2身體功能狀態(ECOG)不佳、3淋巴結外侵犯、4血紅素值低(<12 g/dL，貧血)皆為不良預後;年齡方面是「>60歲」才不佳，故1「年齡小於50歲」反而是「較好」非不佳。故正確組合為2、3、4(D)。","options":{"A":"含1(年齡<50反而較好)。","B":"含1錯。","C":"含1錯。","D":"正確：2體能差、3結外侵犯、4 Hb<12為預後不佳因素。"},"sources":["IPI","Harrison NHL"]}},"112180-N3-25":{"quick":"何杰金氏病淋巴切片可發現Reed-Sternberg(RS)細胞。","detail":{"background":"何杰金氏病正確敘述:病理切片可見「Reed-Sternberg(梨特史登堡)細胞」為診斷特徵(B正確);Ann Arbor第II期是「橫膈膜同側≥2淋巴結區域」(橫膈兩側是III期，故A錯);典型為無痛性淋巴結腫大與B症狀(發燒盜汗體重減輕)，吞嚥困難肝脾腫大非典型起始症狀(C不精確);血清可見發炎指標升高，鈣離子下降非特徵(D錯)。本題問正確者，故選B。","options":{"A":"Ann Arbor II期為橫膈同側≥2區域，非兩側。","B":"正確：淋巴切片可見Reed-Sternberg細胞。","C":"吞嚥困難、肝脾腫大非典型起始症狀。","D":"非以CRP升高合併鈣離子下降為特徵。"},"sources":["Harrison Hodgkin Lymphoma","新文京《內外科護理學》"]}},"113030-N3-23":{"quick":"何杰金氏症常見無痛淋巴結腫大、搔癢、縱膈壓迫呼吸症狀；「腸胃排便改變」非常見。","detail":{"background":"何杰金氏症常見症狀:無痛性淋巴結腫大(常頸部，可無壓痛)、皮膚搔癢、B症狀(發燒盜汗體重減輕)、縱膈淋巴結腫大壓迫致呼吸困難、咳嗽、胸悶。腸胃道「嘔吐、排便習慣改變」並非何杰金氏症常見症狀(較似腸胃道腫瘤)。本題問不是常見症狀者，故選C。補充:何杰金氏淋巴瘤以無痛性淋巴結腫大(常頸部)、B症狀(發燒、夜間盜汗、體重減輕)、皮膚搔癢、縱膈壓迫致呼吸症狀為主，病理見Reed-Sternberg細胞;腸胃道排便改變非其常見表現。","options":{"A":"淋巴結腫大但無壓痛(無痛性)為常見。","B":"皮膚搔癢為常見。","C":"不是(本題答案)：腸胃嘔吐、排便改變非何杰金氏症常見。","D":"縱膈壓迫致呼吸困難、咳嗽、胸悶為常見。"},"sources":["Harrison Hodgkin Lymphoma","新文京《內外科護理學》"]}},"113100-N3-22":{"quick":"何杰金氏淋巴瘤常見發燒、盜汗、體重減輕(B症狀)。","detail":{"background":"何杰金氏淋巴瘤:以「連續性」由鄰近淋巴結區域擴散(非瀰漫不連續散布，故A錯);年齡呈雙峰分布(非單純好發中老年且男為女2倍，故B錯，雖男略多);常見「B症狀:發燒、夜間盜汗、體重減輕」(C正確);骨髓侵犯較少見(非常見，故D錯，骨髓侵犯較常見於非何杰金氏)。本題問正確者，故選C。","options":{"A":"何杰金氏為連續性擴散，非瀰漫不連續。","B":"年齡呈雙峰分布，非單純好發中老年男為女2倍。","C":"正確：常見發燒、盜汗、體重減輕(B症狀)。","D":"骨髓侵犯較少見(較見於非何杰金氏)。"},"sources":["Harrison Hodgkin Lymphoma","新文京《內外科護理學》"]}},"113180-N3-26":{"quick":"非何杰金氏淋巴瘤「較少」全身B症狀；常侵犯周邊多處淋巴結、瀰漫散布、易侵骨髓。","detail":{"background":"非何杰金氏淋巴瘤(NHL)相較何杰金氏:常「侵犯周邊多個、不連續的淋巴結」、呈「瀰漫性散布」(跳躍式、結外侵犯多)、「經常侵犯骨髓」;而全身B症狀(發燒、夜間盜汗、體重減輕)在「何杰金氏」較典型且常見，NHL相對較少以B症狀表現。本題問錯誤者:「(NHL)常出現發燒、盜汗、體重減輕」相對何杰金氏不正確，故選C。","options":{"A":"NHL常侵犯周邊多個淋巴結正確。","B":"NHL多呈瀰漫性散布正確。","C":"錯誤(本題答案)：B症狀較常見於何杰金氏，NHL相對較少。","D":"NHL經常侵犯骨髓正確。"},"sources":["Harrison NHL vs HL","新文京《內外科護理學》"]}},"115030-N3-22":{"quick":"多發性骨髓瘤確診主要標準之一：骨髓內漿細胞比例增高(≥10–40%)。","detail":{"background":"多發性骨髓瘤診斷主要依據:1.骨髓中「單株漿細胞比例增高(≥10%，本題40%明顯升高)」或漿細胞瘤;2.血清/尿中單株M蛋白;3.終末器官損害(CRAB)。本題選項中「骨髓內漿細胞比例為40%」是確診的主要標準(A);血清IgG 2 g/dL偏低、X光溶骨病變屬支持但非主要定義性標準(本題以骨髓漿細胞為主)、IgA過低非診斷標準。故選A。","options":{"A":"正確：骨髓內漿細胞比例升高(40%)是主要診斷標準。","B":"血清IgG 2 g/dL偏低，非確診主要標準。","C":
