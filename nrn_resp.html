焦慮者,易致呼吸性鹼中毒","C":"嚴重腹瀉者,易致代謝性鹼中毒","D":"嚴重嘔吐者,易致代謝性酸中毒"},"img":""},{"id":"112030-N3-52","code":"112030","roc":"112","cat":"N3","catname":"內外科護理學","num":52,"stem":"有關慢性咳嗽病人進行支氣管鏡檢查後,下列護理措施何者最適宜?","opts":{"A":"床頭抬高至80~90 度","B":"禁食直到作嘔反射恢復","C":"臥床休息至少4 小時","D":"咳出微量血絲痰應立即通知醫師"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"system_code":"S1","system_name":"呼吸系統","topic":"R10呼吸系統評估診斷與其他","topic_code":"R10","q_num":52,"roc_year":"112","exam_code":"112030","src":"民國112年","options":{"A":"床頭抬高至80~90 度","B":"禁食直到作嘔反射恢復","C":"臥床休息至少4 小時","D":"咳出微量血絲痰應立即通知醫師"},"img":""},{"id":"112030-N3-54","code":"112030","roc":"112","cat":"N3","catname":"內外科護理學","num":54,"stem":"有關病人的肺部身體評估,下列結果何者異常?","opts":{"A":"吸氣時胸廓對稱性往外擴張","B":"肺部基底部出現反響音","C":"下肺區出現支氣管呼吸音","D":"胸廓左右徑大於前後徑"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"system_code":"S1","system_name":"呼吸系統","topic":"R10呼吸系統評估診斷與其他","topic_code":"R10","q_num":54,"roc_year":"112","exam_code":"112030","src":"民國112年","options":{"A":"吸氣時胸廓對稱性往外擴張","B":"肺部基底部出現反響音","C":"下肺區出現支氣管呼吸音","D":"胸廓左右徑大於前後徑"},"img":""},{"id":"113030-N3-32","code":"113030","roc":"113","cat":"N3","catname":"內外科護理學","num":32,"stem":"下列何者是持續換氣不足病人之動脈血液氣體分析最可能出現的結果?","opts":{"A":"呼吸性酸中毒","B":"呼吸性鹼中毒","C":"代謝性酸中毒","D":"代謝性鹼中毒"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"system_code":"S1","system_name":"呼吸系統","topic":"R10呼吸系統評估診斷與其他","topic_code":"R10","q_num":32,"roc_year":"113","exam_code":"113030","src":"民國113年","options":{"A":"呼吸性酸中毒","B":"呼吸性鹼中毒","C":"代謝性酸中毒","D":"代謝性鹼中毒"},"img":""},{"id":"115030-N3-32","code":"115030","roc":"115","cat":"N3","catname":"內外科護理學","num":32,"stem":"王先生剛接受支氣管鏡檢查後返回病室,下列護理措施何者最適當?","opts":{"A":"在接下來的 8小時內大量補充液體","B":"進食前須先確認作嘔反射恢復","C":"協助身體躺向健側以利肺擴張","D":"靜脈注射Atropine以減少分泌物"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"system_code":"S1","system_name":"呼吸系統","topic":"R10呼吸系統評估診斷與其他","topic_code":"R10","q_num":32,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"在接下來的 8小時內大量補充液體","B":"進食前須先確認作嘔反射恢復","C":"協助身體躺向健側以利肺擴張","D":"靜脈注射Atropine以減少分泌物"},"img":""}],E={"101030-N3-69":{"quick":"肺炎好轉=實質化消退，叩診由濁音恢復為正常的「反響音(resonance)」。","detail":{"background":"肺炎是肺實質(肺泡)的急性感染發炎，肺泡內充滿發炎滲出液與白血球→肺泡實質化(consolidation)。實質化使含氣量下降、組織密度上升，故理學檢查呈「實質化四徵」：①叩診濁音(dullness)②觸覺震顫(tactile fremitus)增強③聽診支氣管呼吸音與爆裂音(crackles)④語音傳導增強(支氣管語音、羊鳴音)。治療有效時實質化逐漸吸收、肺泡重新充氣，上述異常徵象「逆轉」：叩診由濁音恢復為正常肺的反響音(resonance)、震顫與支氣管呼吸音減弱、發燒退、痰量減少、WBC 與CRP 下降、X 光浸潤消退。判斷療效要看「異常徵象消失」而非「異常徵象出現或加重」。","options":{"A":"支氣管呼吸音是「實質化仍存在」的徵象，出現代表肺炎尚未消退，非好轉。","B":"觸覺震顫增強同為實質化徵象，代表病灶持續，非好轉。","C":"咳出綠色黏液(膿痰)代表感染仍活躍/化膿，非控制良好的表現。","D":"正解。叩診恢復為正常的反響音(resonance)，表示肺泡重新充氣、實質化吸收，是肺炎被有效控制的指標。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"101110-N3-21":{"quick":"給抗生素「前」先抽血/痰培養，才能驗到真正致病菌、避免抗生素干擾。","detail":{"background":"細菌性肺炎一旦疑診應「及早」給予經驗性抗生素(每延遲一小時死亡率上升)，但在第一劑抗生素打下去之前，必須先採集微生物學檢體(血液培養、痰液革蘭氏染色與培養)。原因：抗生素會抑制細菌生長使培養「假陰性」，無法分離出致病菌、無法做藥敏(antibiogram)，後續就難以降階(de-escalation)為窄效抗生素。臨床流程通常是「先採檢體→立刻給經驗性抗生素」，兩者時間幾乎相連但採檢一定在前。胸部X 光是診斷工具但不影響抗生素時機；輸液、aspirin 並非優先且 aspirin 與肺炎處置無關。","options":{"A":"正解。給抗生素前先採血液(及痰)培養，確保能分離致病菌、做藥敏以利後續降階治療。","B":"靜脈輸液依需要給予，但非「給藥前必須先做」的關鍵步驟。","C":"胸部X 光是診斷依據，但不需在抗生素前完成，也不會被抗生素影響。","D":"口服阿斯匹林與細菌性肺炎治療無關，且非優先處置。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"102110-N3-50":{"quick":"預防吸入性肺炎要「抬高床頭」，意識不清者維持平臥是錯的。","detail":{"background":"吸入性肺炎(aspiration pneumonia)由口咽分泌物、胃內容物或食物被吸入下呼吸道引起，好發於吞嚥困難、意識障礙、有鼻胃管灌食者。預防核心是「減少逆流與誤吸」：①床頭抬高30–45 度(灌食時與灌食後30–60 分鐘維持)②翻身、口腔護理減少口咽菌定植③進食前評估吞嚥/作嘔反射(gag reflex)，選擇合適食物質地④鼻胃管灌食前監測胃殘餘量、避免過量過快。讓意識不清病人「平臥」會增加逆流與誤吸風險，是錯誤措施。","options":{"A":"每2 小時翻身可促進分泌物移動、預防肺塌陷與壓傷，是正確措施。","B":"錯誤(本題選此)。意識不清者平臥會增加胃內容物逆流誤吸風險，應抬高床頭、採半坐臥或側臥。","C":"進食前評估作嘔反射可判斷氣道保護能力，是正確的吸入預防措施。","D":"監測胃殘餘量可避免灌食過量造成胃膨脹逆流誤吸，是正確措施。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"104100-N3-58":{"quick":"肺炎球菌肺炎=實質化→觸覺震顫「增強」(B)。","detail":{"background":"肺炎鏈球菌(Streptococcus pneumoniae)是社區型細菌性肺炎最常見致病菌，典型造成「大葉性肺炎」，整葉肺泡實質化。實質化區因組織密實、傳音變好，理學檢查呈：觸覺震顫增強、叩診濁音、支氣管呼吸音、爆裂音、語音傳導增強(支氣管語音、耳語音、羊鳴音)。注意與「過度充氣」疾病(氣胸、肺氣腫)區分——後者叩診為過度反響音、震顫減弱。","options":{"A":"過度反響音(hyperresonance)見於氣胸/肺氣腫等含氣過多狀態，非實質化的肺炎。","B":"正解。實質化使傳音增強→觸覺震顫增強。","C":"細微爆裂音可在病灶區聽到，但不會「全肺均有」，肺炎多為局部病灶。","D":"肺炎不一定造成兩側不對稱胸廓擴張；大葉性肺炎可能患側擴張略減，但「不對稱擴張」非其特異典型發現。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"106110-N3-51":{"quick":"缺氧最早的腦部表現是「躁動不安」，非昏迷。","detail":{"background":"低血氧(hypoxemia)時中樞神經對缺氧最敏感，早期因代償性交感興奮與腦部缺氧出現「躁動不安、焦慮、注意力不集中、判斷力下降」等行為改變，常被誤認為情緒問題。隨缺氧加重才進展為意識混亂、嗜睡，最後昏迷。故躁動不安是缺氧的「早期警訊」，臨床上老人或肺炎病人突然躁動，應先想到是否缺氧並測血氧。","options":{"A":"昏迷是嚴重、晚期缺氧的表現，非最早。","B":"正解。躁動不安是缺氧最早的精神狀態改變。","C":"憂鬱非急性缺氧的典型早期表現。","D":"欣快感(euphoria)偶見但非缺氧最早最常見的精神改變。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"106110-N3-57":{"quick":"抗生素有效=退燒＋痰量減少(感染控制的客觀指標)。","detail":{"background":"評估抗生素療效要看「感染指標改善」：體溫下降、痰量減少且由膿性轉清、咳嗽減輕、呼吸困難改善、周邊血氧上升、WBC/CRP 下降、X 光浸潤(實質化)逐漸吸收。反之，血氧降低、X 光實質化增加、WBC 上升都代表感染惡化或抗生素無效。臨床上 48–72 小時是評估初步反應的時間點，無改善需重新評估致病菌與抗藥性。","options":{"A":"周邊血氧降低代表氧合惡化，是病情變差。","B":"X 光實質化增加代表肺炎範圍擴大，非好轉。","C":"全血球計數上升代表感染未受控。","D":"正解。體溫下降且濃痰減少是抗生素發揮作用、感染受控的客觀表現。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"106111-N3-51":{"quick":"痰黏咳不出→「補水＋教有效咳嗽」化痰排痰，不可限水。","detail":{"background":"肺炎病人痰液黏稠不易咳出時，護理重點是「稀釋痰液＋促進有效排出」：①充足水分(每日2000–3000 mL，無禁忌時)使痰液稀薄②蒸氣/噴霧濕化③教導有效咳嗽(深吸氣→屏氣→用力咳兩次)與哈氣(huffing)④胸腔物理治療(叩擊、姿位引流)⑤適度活動。要避免「限水」(會使痰更黏)。姿位引流不需「每小時」執行(過度且病人難耐)；高濃度氧氣並非化痰手段。","options":{"A":"姿位引流有助排痰但不需每小時執行，頻率過高不切實際。","B":"限制水分會使痰更黏稠難咳，是錯誤做法。","C":"給氧改善氧合但無法化痰；且「達到最高濃度」非目標(維持適當血氧即可)。","D":"正解。教導有效咳嗽配合補水，是促進黏痰排出的正確措施。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"106111-N3-53":{"quick":"發紺=血中氧合不足(去氧血紅素>5 g/dL)。","detail":{"background":"發紺(cyanosis)是皮膚黏膜呈藍紫色，源於微血管中「去氧血紅素濃度>5 g/dL」。細菌性肺炎時肺泡實質化、氣體交換面積下降→通氣灌流不匹配與彌散障礙→動脈血氧合不足(低血氧)→去氧血紅素增加→中央型發紺(舌、口唇)。注意：嚴重貧血者即使缺氧也不易出現發紺(因血紅素總量不足5 g/dL 去氧)。中央型發紺反映氧合問題，周邊型發紺則反映血循不良。","options":{"A":"心輸出量下降造成的是周邊循環不良(周邊型發紺)，非肺炎發紺的主因。","B":"肋膜積水非肺炎發紺的「主要」機轉。","C":"周邊血循不良造成周邊型發紺，非肺炎中央型發紺的主因。","D":"正解。肺炎氣體交換受損→血中氧合不足→去氧血紅素增加→發紺。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"107030-N3-58":{"quick":"痰靜置分三層(泡沫/清澈/濃稠膿)=支氣管擴張症的典型大量膿痰。","detail":{"background":"支氣管擴張症(bronchiectasis)是支氣管壁因反覆感染破壞而「不可逆擴張」，管腔積聚大量分泌物，臨床特徵為「慢性咳嗽合併大量膿痰」，痰量可達每日數百毫升。其膿痰靜置於容器後會「分三層」：上層泡沫(黏液與氣泡)、中層漿液清澈、下層膿性沉澱(膿與壞死組織)，為經典考點。常合併咳血、杵狀指、反覆肺部感染。肺炎、慢性支氣管炎痰量較少、不具此三層分層特徵。","options":{"A":"肺炎痰量較少，無三層分層的大量膿痰特徵。","B":"肺癌不以大量分層膿痰表現，常為咳血或刺激性咳嗽。","C":"正解。大量膿痰靜置分三層是支氣管擴張症的典型表現。","D":"慢性支氣管炎痰量較少，無典型三層分層。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"108020-N3-51":{"quick":"膿胸=膿液積在「肋膜腔」(非肺實質內)。","detail":{"background":"膿胸(empyema)是「肋膜腔(pleural space)」內積聚膿液，多為肺炎、肺膿瘍、胸部手術或外傷後感染擴散至肋膜腔所致。屬於複雜性肋膜積液(滲出液)，膿液內含大量白血球、細菌與纖維蛋白。治療需胸管引流(必要時纖維蛋白溶解劑或胸腔鏡清創)＋全身抗生素。要與「肺膿瘍」區分：肺膿瘍是肺「實質內」的化膿性壞死空洞，膿胸則在肺「外」的肋膜腔。","options":{"A":"肺泡是肺炎/肺水腫的病變部位，非膿胸。","B":"支氣管病變見於支氣管炎/支擴，非膿胸。","C":"肺實質是肺炎、肺膿瘍的部位；膿胸在實質「之外」。","D":"正解。膿胸是膿液積在肋膜腔。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"109030-N3-50":{"quick":"痰多咳不出，最能化痰的是「增加飲水量」稀釋痰液。","detail":{"background":"當肺炎病人出現「呼吸道清除功能失效」且分泌物多、無法有效咳嗽，護理目標是稀釋並移除分泌物。選項中最能直接促進痰液清除的是「增加飲水量」——充足水分使痰液變稀薄、容易咳出(無心衰/腎衰限水禁忌時，建議2000–3000 mL/日)，並可搭配濕化、胸腔物理治療、教導有效咳嗽。半坐臥有助呼吸但非直接化痰；胸式呼吸、噘嘴呼吸主要用於改善換氣型態而非排痰。","options":{"A":"胸式呼吸並非促進痰液清除的有效方法。","B":"正解。增加飲水量稀釋痰液，最能促進黏痰咳出。","C":"噘嘴式呼吸用於COPD 減少氣道塌陷，與排痰無直接關係。","D":"半坐臥改善呼吸但對「清除痰液」的直接幫助不如補水。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"109110-N3-52":{"quick":"給氧仍持續掉血氧<90% 是「立即處理」的危急徵象。","detail":{"background":"吸入性肺炎病人各種徵象中，最需「立即處理」的是「已調高給氧流速、周邊血氧仍持續下降且<90%」——代表氧合急速惡化、有呼吸衰竭之虞，需立即評估氣道、加強給氧甚至呼吸支持。相對地，少量血絲痰、後肺底些許爆裂音、抗生素治療兩天仍有發燒，雖需追蹤但非「立刻危及生命」。處置優先順序以ABC(氣道/呼吸/循環)為準，氧合崩壞最優先。","options":{"A":"帶血絲痰需評估但非立即危及生命。","B":"肺底些許爆裂音是常見肺部徵象，非急需立即處理。","C":"治療兩天仍發燒需評估療效，但不如氧合崩壞緊急。","D":"正解。給氧下血氧仍持續下降且<90% 代表氧合急速惡化，須立即處理。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"109110-N3-57":{"quick":"疑似肺炎入院最優先：「先採痰培養→再給抗生素」，故先送痰培養。","detail":{"background":"疑似細菌性肺炎入院，處置要兼顧「及早抗生素」與「先採微生物檢體」。在給抗生素之前必須先採痰(及血)培養，否則抗生素會干擾培養結果。題目要選「最優先」執行的醫囑，採痰培養須排在抗生素之前，故先收集痰液送培養。輸液、尿液分析非此情境最優先。臨床上採檢與抗生素時間相連，但採檢在前。","options":{"A":"靜脈輸液依需要給予，非此題最優先。","B":"抗生素要及早給，但必須在「採完培養後」，故非最先一步。","C":"尿液分析與肺炎診斷關聯低，非優先。","D":"正解。先收集痰液標本送培養，才不會被抗生素干擾，是最優先步驟。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"110110-N3-55":{"quick":"肺炎(尤其老人)常以「意識混亂」表現(缺氧/感染所致)。","detail":{"background":"肺炎的臨床表徵包括發燒、咳嗽、膿痰、呼吸急促(tachypnea，非過慢)、胸痛、呼吸困難與低血氧。老年人肺炎常「非典型」表現——可能無明顯發燒，反以「意識混亂、食慾差、跌倒、功能退化」為首發，源於缺氧與全身性感染影響中樞。臨床評估老人突發意識混亂應警覺感染(含肺炎)。泡沫狀痰見於肺水腫、頸靜脈怒張見於右心衰，皆非肺炎典型。","options":{"A":"肺炎多呼吸「過速」非過慢。","B":"頸靜脈怒張是右心衰竭/體液過量徵象，非肺炎典型。","C":"泡沫狀(粉紅)痰是肺水腫表現，非肺炎。","D":"正解。意識混亂(尤其老人)是肺炎常見表現，與缺氧及感染有關。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"111030-N3-56":{"quick":"右上肺葉肺炎不應「右側臥」(壓住患側不利擴張與引流)；好的姿位是健側臥/抬高床頭。","detail":{"background":"肺炎護理擺位原則：①一般採半坐臥(床頭抬高)促進肺擴張與呼吸②單側肺病灶時，採「健側在下、患側在上」之側臥(good lung down)較佳——使健側肺血流灌注良好、改善氧合，同時患側分泌物較易引流；若患側在下會壓迫患側、限制其擴張並惡化通氣灌流。故右上肺葉肺炎協助「右側臥(患側在下)」是不適當的。抱胸咳嗽、抬高床頭、鼓勵活動皆正確。","options":{"A":"不適當(本題選此)。右側臥使患側在下、受壓，限制患側肺擴張、不利氧合，應採健側臥。","B":"抱胸(夾枕)咳嗽可固定胸壁、減痛、增進咳嗽效率，正確。","C":"床頭抬高45 度促進肺擴張與呼吸，正確。","D":"鼓勵下床活動可促進肺擴張、預防併發症，正確。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"111030-N3-58":{"quick":"肺炎是肺實質發炎(肺塌陷/積水/發炎)，「支氣管擴張症」不屬其病生理變化。","detail":{"background":"肺炎是肺「實質」(肺泡)急性感染發炎，病生理包括：發炎反應(微血管通透性上升、白血球與滲出液湧入肺泡)、肺泡實質化、局部肺塌陷(atelectasis，分泌物阻塞所致)、肺泡積液(肺積水)。而「支氣管擴張症」是支氣管壁因「慢性反覆感染」破壞造成「不可逆」管腔擴張，屬慢性結構破壞疾病，並非急性肺炎當下肺實質的病生理變化。","options":{"A":"肺塌陷(分泌物阻塞、肺泡萎陷)是肺炎可見的病生理變化。","B":"正解(不包括此項)。支氣管擴張症是慢性不可逆結構病變，非肺炎急性肺實質變化。","C":"肺積水(肺泡內滲出液積聚)是肺炎病生理之一。","D":"發炎反應是肺炎最核心的病生理。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"112180-N3-38":{"quick":"細菌性肺炎必要檢查=胸部X光(2)＋痰液檢查(4)；肺功能非必要。","detail":{"background":"細菌性肺炎的核心診斷檢查：①胸部X 光攝影——確認肺浸潤/實質化、定位、評估合併症(肋膜積液、空洞)，是診斷「肺炎」的影像依據②痰液檢查(革蘭氏染色與培養)——找致病菌、做藥敏。血液培養、發炎指標亦常做。胸部電腦斷層非每位肺炎病人必要(僅用於複雜、診斷不明或疑併發症)；肺功能檢查(PFT)用於阻塞性/限制性肺病評估，非肺炎必要檢查。故答案為2＋4。","options":{"A":"13(CT＋PFT)皆非必要檢查。","B":"14(CT＋痰)含非必要的CT。","C":"23(X光＋PFT)含非必要的PFT。","D":"正解。24＝胸部X 光＋痰液檢查，為細菌性肺炎必要診斷檢查。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"113030-N3-35":{"quick":"肺炎鏈球菌肺炎不會以「呼吸離軌度增加」為徵象(胸廓擴張多對稱/患側略減)。","detail":{"background":"肺炎鏈球菌肺炎(大葉性肺炎)典型表徵：發燒、寒顫、咳嗽帶鏽色或膿痰(痰量增加)、胸膜性胸痛、呼吸急促、WBC 上升(核左移)、CRP 上升、胸部X 光肺浸潤/實質化、患側實質化徵(震顫增強、濁音、支氣管呼吸音)。「呼吸離軌度(胸廓擴張對稱性)增加」並非其表現——大葉性肺炎患側擴張通常「減少」或對稱，不會增加。","options":{"A":"痰液量增加是肺炎鏈球菌肺炎常見表現，適當。","B":"胸部X 光肺浸潤(實質化)是其典型影像，適當。","C":"白血球上升反映細菌感染，適當。","D":"最不適當(本題選此)。患側胸廓擴張多減少或對稱，不會「離軌度增加」。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"114030-N3-36":{"quick":"肺膿瘍=肺實質化膿空洞，理學常見「呼吸音減弱、可有肋膜摩擦音」。","detail":{"background":"肺膿瘍(lung abscess)是肺實質局部化膿壞死形成「含膿空洞」，常因吸入(意識不清、吞嚥障礙)、阻塞或續發於肺炎。臨床：發燒、夜間盜汗、體重減輕、咳大量惡臭膿痰(空洞與支氣管相通時)、可咳血。理學依病灶呈實質化或空洞徵象，病灶區「呼吸音減弱」，若波及肋膜可聞「肋膜摩擦音」。治療以長療程抗生素為主，必要時引流。","options":{"A":"正解。肺膿瘍病灶區呼吸音減弱，波及肋膜時可出現肋膜摩擦音。","B":"鼓音(tympany)見於含氣空腔如氣胸/腸脹，非肺膿瘍典型。","C":"吸氣期喘鳴(stridor)是上呼吸道阻塞徵象，非肺膿瘍。","D":"過度反響音見於氣胸/肺氣腫，非肺膿瘍實質化病灶。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"114100-N3-33":{"quick":"預防吸入性肺炎，餐後「立即平躺」是錯的(應維持坐姿/抬高30–60 分鐘)。","detail":{"background":"預防吸入性肺炎措施：進食/灌食時與「進食後30–60 分鐘」維持床頭抬高(坐姿或半坐臥30–45 度)，避免立刻平躺造成逆流誤吸；睡眠時床頭抬高約15–30 度並可採半側臥；鼻胃管灌食前評估胃殘餘量；吞嚥困難者進食前評估作嘔反射並調整食物質地、必要時請語言治療師評估吞嚥。故「餐後立即平躺」最不適當。","options":{"A":"最不適當(本題選此)。餐後立即平躺會增加逆流誤吸，應維持坐姿一段時間。","B":"睡覺時床頭抬高15–30 度半側臥可減少逆流，正確。","C":"灌食前評估胃殘餘量避免過量逆流，正確。","D":"進食前評估作嘔反射以選擇進食方式，正確。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"114170-N3-32":{"quick":"右肺大葉性肺炎=實質化→震顫增強(1)＋支氣管語音響亮(4)。","detail":{"background":"右肺大葉性肺炎(肺炎鏈球菌典型)造成右肺實質化。實質化使傳音變好，理學「實質化四徵」：①觸覺震顫增強②叩診濁音(非過度反響音)③聽診支氣管呼吸音與爆裂音(非喘鳴)④語音傳導增強(支氣管語音/羊鳴音字音響亮清楚)。故正確組合為「1 觸覺震顫增強＋4 支氣管語音響亮」。喘鳴(wheeze)見於氣道狹窄(氣喘)、過度反響音見於氣胸/肺氣腫，皆非實質化。","options":{"A":"12 含「過度反響音」錯誤(實質化為濁音)。","B":"34 含「喘鳴音」錯誤(實質化非喘鳴)。","C":"正解。14＝觸覺震顫增強＋支氣管語音響亮，符合實質化。","D":"23 兩者皆錯(過度反響音、喘鳴音皆非實質化)。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"114170-N3-31":{"quick":"急性支氣管炎多為病毒性、自限性，治療以「支持療法」(休息、水分、營養)為主。","detail":{"background":"急性支氣管炎是「支氣管(下呼吸道)」黏膜的急性發炎，絕大多數為病毒感染(流感、副流感、腺病毒、RSV 等)，呈自限性，臨床以咳嗽(可持續數週)、少量痰、偶有低燒為主。治療原則為「支持療法」——充分休息、均衡飲食、攝取足夠水分、症狀治療(止咳化痰)，並戒菸避免刺激；病毒性感染「不需」抗生素，濫用抗生素無益且增加抗藥性，僅在合併細菌感染或特定族群才考慮。要與肺炎(肺實質感染、X光浸潤)、上呼吸道感染(鼻咽喉)區分。","options":{"A":"急性支氣管炎是「下」呼吸道(支氣管)感染，非上呼吸道感染。","B":"描述的是喉與氣管(喉氣管炎)，急性支氣管炎病變在「支氣管」黏膜。","C":"病毒性感染不需抗生素，Ampicillin 並非第一選擇。","D":"正解。多為病毒自限性，以休息、均衡飲食、足夠水分等支持療法為主。"},"sources":["新文京《內外科護理學》呼吸系統","2019 ATS/IDSA 社區型肺炎指引"]}},"101030-N3-70":{"quick":"結核菌素(PPD)皮膚測試是測「是否曾受結核菌感染」(產生細胞免疫致敏)。","detail":{"background":"結核菌素皮膚測試(TST/PPD/Mantoux)是於前臂內側皮內注射純化蛋白衍生物(PPD)，48–72 小時後測量「硬結(induration)」直徑。原理為第IV 型遲發性過敏反應——曾受結核菌感染者體內已有致敏的T 淋巴球，再接觸PPD 即在局部引起細胞免疫反應形成硬結。因此PPD 是篩檢「是否曾受結核菌『感染』」(含潛伏感染)，不能單獨區分潛伏或活動性疾病、也不能決定用藥種類。向病人說明時應講「檢查是否有結核菌感染」。","options":{"A":"正解。PPD 用於檢查是否曾受結核菌感染(細胞免疫致敏)。","B":"PPD 不能判定是否為「開放性(具傳染力)」肺結核，那要靠痰抹片/培養。","C":"PPD 與選擇抗生素種類無關。","D":"PPD 是篩檢工具，非「通報前例行檢查」的目的描述。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"101030-N3-71":{"quick":"潛伏結核/高危險群「預防性(單一)治療」首選 Isoniazid(INH)。","detail":{"background":"潛伏結核感染(LTBI)或高危險群的「預防性治療」目的是殺滅體內潛伏的少量結核菌、防止進展為活動性結核，傳統首選「單一藥物 Isoniazid(INH)」療程9 個月(或INH＋Rifapentine 短程合併等新方案)。注意：活動性結核病需「多重藥物合併」(RIPE，至少四種)以防抗藥性；但「預防性」治療因菌量少，可用單一INH。INH 需併用維生素B6 預防周邊神經病變。","options":{"A":"Rifampin 用於治療(或部分LTBI 短程方案)，傳統預防性首選非單用RMP。","B":"Ethambutol 用於活動性結核合併治療，非預防性單藥。","C":"正解。潛伏結核/預防性治療首選單一 Isoniazid(INH)。","D":"Pyrazinamide 用於活動性結核初期合併治療，非預防性單藥。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"101110-N3-22":{"quick":"PPD 看「硬結」大小，一般≧10 mm 為陽性(不是看紅腫)。","detail":{"background":"PPD 結果判讀以「硬結(induration)」直徑為準，而非紅斑(erythema)大小。一般民眾≧10 mm 判為陽性；免疫低下(HIV、器官移植、近期接觸開放性個案、胸部X 光有舊結核病灶等高風險者)以≧5 mm 即判陽性。卡介苗(BCG)接種史可能造成偽陽性。判讀只量硬結、橫向測量，紅腫不計。","options":{"A":"正解。硬結≧10 mm 為一般人之陽性判讀標準。","B":"硬結5–9 mm 在一般人屬陰性(高風險者≧5 mm 才算陽性)。","C":"判讀看「硬結」非「紅腫」，紅腫≧10 mm 不作為陽性依據。","D":"紅腫5–9 mm 同樣不以紅腫判讀。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"102030-N3-51":{"quick":"MDR-TB=對「INH(2)＋RIF(4)」至少這兩個最重要的第一線藥同時抗藥。","detail":{"background":"多重抗藥性結核病(MDR-TB)的定義是結核菌「同時對 Isoniazid(INH)與 Rifampin(RIF)」這兩個最重要的第一線殺菌藥產生抗藥性(可再合併對其他藥抗藥)。INH 與RIF 是抗結核療程的兩大支柱，兩者皆失效會使治療困難、療程延長、需用二線藥。題目選項2＝INH、4＝RIF，故答案14。廣泛抗藥(XDR-TB)則在MDR 基礎上再對氟喹諾酮與部分二線注射劑抗藥。","options":{"A":"12(INH＋EMB)非MDR 定義。","B":"正解。14＝INH＋RIF 同時抗藥，即MDR-TB。","C":"23(EMB＋PZA)非MDR 定義。","D":"34(PZA＋RIF)非MDR 定義(缺INH)。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"102110-N3-11":{"quick":"原發結核常見咳嗽發燒、症狀不典型「不易診斷」(B)。","detail":{"background":"肺結核由結核分枝桿菌(Mycobacterium tuberculosis)經「飛沫核(空氣)」傳染。原發性感染後多數為潛伏(無症狀)，部分出現非特異的咳嗽、低燒、倦怠、體重減輕、夜間盜汗，因症狀不典型「不易早期診斷」。PPD 在感染後約2–10 週(常6–8 週)才轉陽。結核「不」經無生命物品(fomite)傳染，急性具傳染力期需「空氣(呼吸道)隔離」而非接觸隔離。感染治癒後「不」會終生免疫，仍可再感染或復發。","options":{"A":"PPD 轉陽約感染後6–8 週(2–10 週)，非「2–6 個月」才轉陽。","B":"正解。原發感染常見咳嗽、發燒等非特異症狀，不易診斷。","C":"結核經空氣飛沫核傳染、非無生命物品，急性期需空氣隔離非接觸隔離。","D":"結核治癒後不會終生免疫，仍可再感染或復發。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"103100-N3-52":{"quick":"EMB 的標誌性副作用是「視神經炎」(視力模糊、紅綠色盲)。","detail":{"background":"第一線抗結核藥副作用記憶：Isoniazid(INH)→周邊神經病變(併B6 預防)、肝毒性；Rifampin(RIF)→分泌物橙紅色、肝毒性、藥物交互作用多；Ethambutol(EMB)→「視神經炎」(視力模糊、辨色力下降特別是紅綠色盲，用藥前後查視力)；Pyrazinamide(PZA)→高尿酸血症(痛風)、肝毒性；Streptomycin(SM，二線注射)→第八對腦神經毒性(聽力/前庭)與腎毒性。本題A 正確對應EMB→視神經炎。","options":{"A":"正解。Ethambutol 引起視神經炎(視力模糊、紅綠色盲)。","B":"周邊神經炎是Isoniazid(INH)的副作用，非Streptomycin。","C":"聽力問題是Streptomycin(氨基糖苷)的耳毒性，非Pyrazinamide。","D":"高尿酸血症是Pyrazinamide 的副作用，非Isoniazid。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"103100-N3-57":{"quick":"開放性結核的傳染力，到「連續3 次痰抹片抗酸菌陰性」才解除。","detail":{"background":"開放性(痰抹片陽性、具傳染力)肺結核病人，有效治療約2 週後傳染力大幅下降，但「解除傳染力/解除空氣隔離」的客觀指標是「連續3 次(不同日)痰液抗酸菌(AFB)抹片均陰性」並臨床改善、規則服藥。胸部X 光改善慢、不能作為傳染力指標；PPD 一旦陽性常持續陽性、不反映傳染力；只「服藥6 個月」不等於痰已轉陰(需痰檢確認)。","options":{"A":"胸部X 光改善緩慢，不能用來判定傳染力消失。","B":"正解。連續3 次痰AFB 抹片陰性，代表傳染力解除。","C":"服藥達6 個月不等同痰已轉陰，傳染力以痰檢為準。","D":"PPD 陽性反映曾感染、非傳染力指標。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"103100-N3-80":{"quick":"第一線抗結核藥是 INH/RIF/EMB/PZA；列入 Rifabutin、Kanamycin 是錯誤(C)。","detail":{"background":"台灣結核病防治重點：結核病屬「第三類法定傳染病」應於一週內通報；多重抗藥性結核病(MDR-TB)屬「第二類」應於24 小時內通報。痰培養陽性代表具傳染力，需「呼吸道(空氣)隔離」(負壓病室、N95)。第一線抗結核藥為 Isoniazid(INH)、Rifampin(RMP)、Ethambutol(EMB)、Pyrazinamide(PZA)四種(RIPE)；Rifabutin 與 Kanamycin 屬替代/二線藥，將其列為「第一線」是錯誤敘述，故本題選C。","options":{"A":"結核病為第三類法定傳染病、一週內通報，敘述正確。","B":"痰培養陽性具傳染力、需呼吸道隔離，正確。","C":"錯誤(本題選此)。第一線藥為INH/RMP/EMB/PZA；Rifabutin、Kanamycin 非第一線。","D":"MDR-TB 屬第二類、24 小時內通報，正確。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"104030-N3-54":{"quick":"停止空氣隔離的指標=「痰培養/抹片連續陰性」(本題答連續2 次陰性)。","detail":{"background":"中止肺結核病人「空氣傳染防護(airborne precaution)」的依據是「傳染力已解除」，以微生物學證據為準——痰液抗酸菌檢查連續陰性(臨床上常採連續陰性數次並合併臨床改善與規則治療)。本題答案取「痰液培養連續2 次陰性」。病人「痊癒」太籠統、PPD 陰性不代表無傳染力、體溫正常只是臨床改善之一，皆非解除隔離的客觀微生物指標。","options":{"A":"「痊癒」定義不明確，非客觀解除隔離指標。","B":"皮膚測試陰性不代表無傳染力(且結核者PPD 常陽性)。","C":"體溫正常僅臨床改善之一，不足以判定無傳染力。","D":"正解。痰液培養連續陰性代表傳染力解除，可中止空氣隔離。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"105090-N3-52":{"quick":"肺結核初期最常見症狀是「乾咳」(慢性咳嗽)。","detail":{"background":"肺結核早期症狀多隱匿、非特異，最常見以「慢性咳嗽」起始，初期常為「乾咳」，隨病程進展才出現咳痰、痰量增加、甚至咳血(空洞侵蝕血管)；伴隨體質性症狀如午後低燒、夜間盜汗、倦怠、食慾不振、體重減輕。咳血、化膿性痰多屬較後期/進展期表現，呼吸變慢與結核無關。對長期咳嗽(>3 週)且有體重減輕者應警覺結核。","options":{"A":"呼吸變慢與肺結核無關。","B":"正解。初期最常見為乾咳(慢性咳嗽)。","C":"咳血(咳嗽帶血)多為較後期、空洞侵蝕血管的表現。","D":"化膿性痰較常見於細菌性肺炎/支擴，非結核初期典型。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"106030-N3-57":{"quick":"四種第一線藥中，「Ethambutol」主要副作用是視神經炎、不需監測肝功能。","detail":{"background":"第一線抗結核藥中 Isoniazid、Rifampin、Pyrazinamide 三者皆具「肝毒性」，治療期間需定期監測肝功能(AST/ALT)。Ethambutol(EMB)的主要毒性是「視神經炎」(視力模糊、紅綠色盲)，須監測視力/辨色力，而非肝功能。故四者中不需監測肝功能的是Ethambutol。","options":{"A":"正解。Ethambutol 主要監測視力(視神經炎)，不需常規監測肝功能。","B":"Isoniazid 具肝毒性，需監測肝功能。","C":"Pyrazinamide 具肝毒性與高尿酸，需監測肝功能。","D":"Rifampin 具肝毒性，需監測肝功能。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"106110-N3-50":{"quick":"確診結核「最準確」靠痰液「培養」(分離結核菌、金標準)。","detail":{"background":"結核診斷工具比較：胸部X 光(敏感但不具特異性、無法確診)、PPD/IGRA(篩檢曾否感染、不能確診活動性)、痰抹片抗酸菌染色(快速、判斷傳染力，但敏感度有限且不能分菌種)、「痰液培養」——能分離出結核分枝桿菌並做菌種鑑定與藥敏，是「確診」的金標準(最準確)，缺點是耗時數週。近年分子檢測(如GeneXpert)亦快速且準確。本題以「最準確」選痰液培養。","options":{"A":"支氣管鏡用於取檢體輔助，非確診最準確方式。","B":"正解。痰液培養可分離結核菌、為確診金標準(最準確)。","C":"胸部X 光無特異性，不能確診。","D":"PPD 只反映曾受感染，不能確診活動性結核。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"106111-N3-52":{"quick":"PPD 陽性者出現「夜間盜汗」等體質症狀，提示結核「活動期」。","detail":{"background":"PPD 陽性僅代表「曾受結核菌感染」(可能潛伏)。要判斷是否進入「活動期」(active TB)需看是否出現疾病症狀與細菌學/影像證據：典型活動期體質症狀為「午後低燒、夜間盜汗、倦怠、食慾不振、體重減輕」及慢性咳嗽、咳血、痰AFB 陽性、X 光浸潤或空洞。選項中「夜間盜汗」是活動期的代表性全身症狀。咳嗽有痰較不特異，體重「增加」與活動結核相反。","options":{"A":"呼吸音爆裂聲較不特異，非判斷活動期的代表症狀。","B":"咳嗽有痰不夠特異，多種呼吸道疾病皆有。","C":"正解。夜間盜汗是結核活動期的典型全身症狀。","D":"活動期常「體重減輕」，體重增加與之相反。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"107030-N3-59":{"quick":"Rifampin 會讓尿液/體液變「橙紅色」(無害，需衛教)。","detail":{"background":"Rifampin(RIF)會使尿液、汗液、淚液、唾液等所有體液染成「橙紅色」，屬無害的藥物色素效應，但須事先衛教病人(避免驚慌)並提醒軟式隱形眼鏡可能被染色。RIF 其他重點：強力肝臟酵素誘導劑(降低口服避孕藥、抗凝劑等多種藥效)、肝毒性、可致流感樣症候群。橙紅色尿是其經典考點。","options":{"A":"非綠色。","B":"正解。Rifampin 使尿液等體液呈橙紅色。","C":"非黑褐色。","D":"非藍色。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"108020-N3-52":{"quick":"服藥順從性差→最佳對策是「直接觀察治療(DOTS)」由人監督服藥。","detail":{"background":"結核治療療程長(≥6 個月)、易因症狀改善而自行停藥，造成治療失敗與抗藥性。對順從性不佳者，世界衛生組織與台灣推行的最佳策略是「直接觀察治療(DOTS, directly observed therapy)」——由關懷員/照顧者「親眼監督」病人每次服藥、確保完成全程。僅靠回診詢問、口頭警告或改藥都不如實地監督有效。本題以「請照顧者監督定時服藥」最符合DOTS 精神。","options":{"A":"正解。由照顧者監督服藥即DOTS 精神，最能確保完成療程。","B":"每週回診詢問仍依賴病人自述，無法確保實際服藥。","C":"換藥非首要對策，問題在順從性而非藥效。","D":"恐嚇式衛教效果有限，非最適當措施。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"112030-N3-55":{"quick":"MDR-TB=對「Isoniazid(2)＋Rifampin(4)」同時抗藥。","detail":{"background":"多重抗藥性結核病(MDR-TB)定義為結核菌「同時對 Isoniazid 與 Rifampin」這兩個核心第一線藥抗藥。題目選項2＝Isoniazid、4＝Rifampin，故答案24。此題與前述MDR 定義一致：兩大支柱藥同時失效即MDR，需改用較長療程之二線/新藥組合。","options":{"A":"13(EMB＋PZA)非MDR 定義。","B":"14(EMB＋Rifampin)缺Isoniazid，非MDR 定義。","C":"23(Isoniazid＋PZA)缺Rifampin，非MDR 定義。","D":"正解。24＝Isoniazid＋Rifampin 同時抗藥，即MDR-TB。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"113180-N3-35":{"quick":"結核出院衛教核心：「務必完成整個療程才能停藥」(勿症狀好就停)。","detail":{"background":"肺結核治療成功關鍵是「規則、足量、足療程、合併用藥」。出院衛教最重要的是強調「必須完成整個處方療程(通常6 個月以上)才可停藥」，不可因症狀改善或痰轉陰就自行停藥——過早停藥會造成復發與抗藥性。具傳染力期間應戴口罩、咳嗽禮節、保持通風、避免到人潮密集處(不可隨意參加聚會)；PPD 不需每3 個月重做(陽性會持續)。","options":{"A":"正解。必須完成整個療程才可停藥，是結核治療的核心衛教。","B":"剛開始用藥仍可能具傳染力，不可隨意參加聚會。","C":"錯誤觀念：不可症狀改善就停藥，必須完成全療程。","D":"PPD 不需每3 個月重做(已陽性會持續陽性)。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"113180-N3-37":{"quick":"結核最適合的診斷檢查是「痰液耐酸菌(抗酸菌)染色抹片」。","detail":{"background":"結核菌為「抗酸菌(acid-fast bacilli, AFB)」，細胞壁含分枝菌酸不易脫色，用Ziehl-Neelsen 抗酸染色可呈紅色桿菌。「痰液耐酸菌染色抹片」快速、可初步診斷並評估傳染力，是肺結核的適合診斷檢查(確診再靠培養)。痰液「革蘭氏染色」對結核菌不適用(結核菌不易被革蘭氏染色顯示)；X 光無特異性；肺功能測試與結核診斷無關。","options":{"A":"肺功能測試評估通氣/阻塞，與結核診斷無關。","B":"正解。痰液耐酸菌(抗酸菌)染色抹片是結核的適合診斷檢查。","C":"胸部X 光無特異性，不能據以確診。","D":"革蘭氏染色不適用於結核菌(需抗酸染色)。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"115030-N3-35":{"quick":"Ethambutol 重點副作用：視力模糊、紅綠色盲(視神經炎)，需監測視力。","detail":{"background":"Ethambutol(EMB)的標誌性毒性是「視神經炎」——表現為視力模糊、視野改變與「紅綠色辨色力下降(紅綠色盲)」，與劑量相關、停藥多可逆，用藥前後應評估視力與辨色力，並衛教出現視力改變立即回診。注意：橙紅色尿是Rifampin、需補B6 預防神經病變的是Isoniazid、與制酸劑(含鋁)併用會降低吸收的是Isoniazid/喹諾酮等，皆非EMB。故本題A 正確。","options":{"A":"正解。Ethambutol 須注意視力模糊與紅綠色盲(視神經炎)。","B":"橙紅色尿是Rifampin 的效應，非Ethambutol。","C":"補充B6 預防的是Isoniazid 的周邊神經病變，非Ethambutol。","D":"與制酸劑併用會降低吸收的是Isoniazid 等，非Ethambutol 必須併制酸劑。"},"sources":["新文京《內外科護理學》呼吸系統—肺結核","衛福部疾管署結核病防治工作手冊","WHO Tuberculosis Guidelines"]}},"101030-N3-52":{"quick":"全肺切除(pneumonectomy)後「較少用」胸腔引流——要讓積液填滿空腔。","detail":{"background":"肺癌手術原則：手術切除適合「早期(第I、II 期，部分IIIA)」可切除的非小細胞肺癌；IIIB 期以上多以化放療為主，不適手術。術前需評估心肺功能(肺量計、預估術後FEV1)，確保切除後仍有足夠肺功能(預估術後FEV1 通常需>40% 或>0.8–1 L，非固定「保留3 公升」)。各種肺切除中，「肺葉/肺節/楔形切除」術後需放胸管接水下引流(排出殘留氣體與血水、促肺擴張)；唯「全肺切除術(pneumonectomy)」術後「較少使用」胸腔引流，因要讓胸腔空腔逐漸被滲液填滿、避免抽吸造成縱膈移位。","options":{"A":"手術適合早期(I–II/部分IIIA)，IIIB 以上多非手術，故敘述錯誤。","B":"「腫塊>0.1 cm 即可手術」不是手術指標，且過小無法判定，敘述錯誤。","C":"術前評估FEV1 是看「預估術後保留功能是否足夠」，非固定「保留3 公升」，敘述錯誤。","D":"正解。全肺切除術後較少使用胸腔引流(避免抽吸造成縱膈移位、讓空腔被滲液填滿)。"},"sources":["新文京《內外科護理學》呼吸系統—肺癌與胸腔手術","NCCN Non-Small Cell Lung Cancer Guidelines"]}},"102110-N3-71":{"quick":"肺癌常轉移腦/骨/肝/腎上腺；「胰臟」非常見轉移部位。","detail":{"background":"肺癌惡性度高、易遠端轉移，最常見的轉移標的為「腦、骨骼、肝臟、腎上腺」(以及對側肺、淋巴結)。其中骨轉移可致病理性骨折與高血鈣、腦轉移致神經症狀、肝與腎上腺轉移常見。胰臟「不是」肺癌常見的轉移部位。臨床分期時常以腦部MRI、骨掃描、腹部影像評估這些好發部位。","options":{"A":"腦部是肺癌常見轉移部位。","B":"正解(錯誤敘述)。胰臟非肺癌常見轉移部位。","C":"骨骼是肺癌常見轉移部位(可致病理性骨折、高血鈣)。","D":"肝臟是肺癌常見轉移部位。"},"sources":["新文京《內外科護理學》呼吸系統—肺癌與胸腔手術","NCCN Non-Small Cell Lung Cancer Guidelines"]}},"103100-N3-58":{"quick":"「全肺切除術」術後不需胸腔水下引流(要讓空腔被滲液填滿)。","detail":{"background":"胸腔手術後是否放胸管水下引流，取決於是否要排出殘餘氣/液並促進「剩餘肺」再擴張：肺葉切除、肺節切除、楔形切除後「仍有肺組織需再擴張」，故需放胸管接水下引流(常含負壓抽吸)。但「全肺切除術(pneumonectomy)」整側肺已移除、無剩餘肺需擴張，術後「不需」(或僅放不接抽吸的引流)，目的是讓胸腔空腔逐漸由滲液填補、維持縱膈穩定；若給予負壓抽吸反而會把縱膈拉向術側造成移位。","options":{"A":"正解。全肺切除術後無剩餘肺需擴張，不需胸腔水下引流(避免縱膈移位)。","B":"肺葉切除後剩餘肺葉需再擴張，需放胸管引流。","C":"肺節切除後仍有肺組織，需引流。","D":"楔形切除後仍有肺組織，需引流。"},"sources":["新文京《內外科護理學》呼吸系統—肺癌與胸腔手術","NCCN Non-Small Cell Lung Cancer Guidelines"]}},"104100-N3-53":{"quick":"術前應教「腹式(橫膈)深呼吸、吐氣比吸氣長」，非「吸長吐短的胸式呼吸」(C 錯)。","detail":{"background":"肺葉切除術前護理指導：①戒菸(減少痰液與一氧化碳、改善纖毛功能與氧合)②心肺功能檢查(評估手術耐受度與預估術後功能恢復)③教導「腹式(橫膈)深呼吸並使吐氣長於吸氣」、有效咳嗽、誘發性肺量計，以利術後肺擴張、預防肺塌陷與肺炎④全關節活動(尤其術側肩臂)預防關節攣縮與肌肉萎縮。題目C 敘述「吸氣較吐氣長的胸式呼吸」與正確的「腹式、吐氣較長」相反，為錯誤選項。","options":{"A":"術前戒菸可減少分泌物、提升氧合，敘述正確。","B":"心肺功能檢查評估術後功能影響與恢復，敘述正確。","C":"錯誤(本題選此)。應教腹式深呼吸、吐氣長於吸氣，而非吸長吐短的胸式呼吸。","D":"全關節運動預防攣縮、維持肌張力，敘述正確。"},"sources":["新文京《內外科護理學》呼吸系統—肺癌與胸腔手術","NCCN Non-Small Cell Lung Cancer Guidelines"]}},"108110-N3-55":{"quick":"右肺葉切除後採「左(健)側臥或半坐臥」——讓患側殘餘肺葉擴張。","detail":{"background":"肺葉切除(lobectomy)術後仍有「同側殘餘肺葉」需再擴張，故擺位採「半坐臥」促進肺擴張，或採「健側在下、患側朝上」之側臥——使患側殘餘肺葉不受壓、得以充分擴張。右肺葉切除即採「左側臥(健側在下)或半坐臥」。注意此與「全肺切除」不同：全肺切除須避免完全側臥於健側(壓迫唯一的肺)，多採背臥或術側臥。","options":{"A":"「左或右側臥」未指明，患側(右)在下會壓迫殘餘肺葉，不適當。","B":"平躺(完全仰臥)不利患側肺擴張，非最適當。","C":"右側臥使患側在下受壓，限制殘餘肺葉擴張，不適當。","D":"正解。左(健)側臥或半坐臥，使患側殘餘肺葉得以擴張。"},"sources":["新文京《內外科護理學》呼吸系統—肺癌與胸腔手術","NCCN Non-Small Cell Lung Cancer Guidelines"]}},"110030-N3-57":{"quick":"小細胞肺癌生長最快、最惡性，但對化放療最敏感。","detail":{"background":"肺癌分小細胞肺癌(SCLC)與非小細胞肺癌(NSCLC：鱗狀細胞癌、腺癌、大細胞癌)。「小細胞肺癌」惡性度最高、倍增時間最短、最早遠端轉移、預後最差，且常合併副腫瘤症候群(如SIADH、ACTH 分泌)；但其對「化學治療與放射線治療」反應「最敏感」，故治療以化放療為主而非手術(多已轉移)。非小細胞肺癌則以手術切除(早期)為主要根治方式。","options":{"A":"正解。小細胞肺癌生長最快、最惡性，但對化放療最敏感。","B":"鱗狀細胞癌屬非小細胞肺癌，與抽菸相關、生長較慢。","C":"肺腺癌是最常見的非小細胞肺癌，非生長最快者。","D":"大細胞癌屬非小細胞肺癌，非「最惡性且對化放療最敏感」者。"},"sources":["新文京《內外科護理學》呼吸系統—肺癌與胸腔手術","NCCN Non-Small Cell Lung Cancer Guidelines"]}},"112030-N3-56":{"quick":"肺葉切除術後用「誘發性肺量計」促進深呼吸、預防肺塌陷(D)。","detail":{"background":"肺葉切除術後護理：①鼓勵使用「誘發性肺量計(incentive spirometry)」做深而慢的吸氣，使肺泡擴張、預防肺塌陷與肺炎②鼓勵(而非避免)術側肩臂與全關節運動，預防冰凍肩與攣縮③擺位採半坐臥或健側臥(患側朝上)使殘餘肺葉擴張——「臥向患側」是全肺切除的邏輯，肺葉切除不適用④肺功能檢查評估的是術前肺功能儲備與手術耐受度，非「咳嗽能力指標」。故正確為D。","options":{"A":"肺功能檢查評估的是肺功能儲備/手術耐受，非「術後咳嗽能力」指標。","B":"術後應「鼓勵」肩臂運動預防冰凍肩，而非避免。","C":"肺葉切除應使患側朝上(健側臥)以利殘餘肺擴張，「臥向患側」是全肺切除的做法，對肺葉切除不適當。","D":"正解。誘發性肺量計促進深呼吸、預防肺塌陷。"},"sources":["新文京《內外科護理學》呼吸系統—肺癌與胸腔手術","NCCN Non-Small Cell Lung Cancer Guidelines"]}},"113100-N3-31":{"quick":"右肺葉切除後「躺向左(健)側」——使患側殘餘肺葉擴張。","detail":{"background":"同肺葉切除擺位原則：採半坐臥或「健側在下、患側朝上」側臥，使患側殘餘肺葉不受壓而能擴張。汪先生為「右」肺葉切除，故躺向「左側(健側在下、右患側朝上)」最適合。俯臥、完全仰臥不利患側擴張；躺向右(患)側會壓迫殘餘肺葉。再次提醒：此為「肺葉切除」邏輯，與全肺切除(避免健側完全側臥)不同。","options":{"A":"正解。右肺葉切除後躺向左(健)側，使患側殘餘肺葉擴張。","B":"俯臥不利傷口與肺擴張，不適當。","C":"完全仰臥平躺不利患側肺擴張，非最適。","D":"躺向右(患)側壓迫殘餘肺葉，限制其擴張，不適當。"},"sources":["新文京《內外科護理學》呼吸系統—肺癌與胸腔手術","NCCN Non-Small Cell Lung Cancer Guidelines"]}},"101030-N3-11":{"quick":"肺塵症=限制型肺病：肺纖維化→「順應性下降、肺容積減少」(B)。","detail":{"background":"肺塵症(pneumoconiosis)是長期吸入無機粉塵(煤炭、矽、石綿等)引起的職業性「間質瀰漫性纖維化」，屬「限制型(restrictive)」肺疾——纖維化使肺變硬、「順應性(compliance)下降」、「肺容積(TLC、VC)減少」、彌散下降。各塵肺好發部位：煤末沈著病(anthracosis)與矽肺主要在「上葉」；石綿沈著病(asbestosis)為「下葉」瀰漫性間質纖維化合併肋膜斑塊，並增加肺癌與間皮瘤風險(非「結節」變化)。長期纖維化與低血氧可續發肺動脈高壓與肺心症。","options":{"A":"肺塵症造成「瀰漫性」纖維化，非「局部性」，敘述錯誤。","B":"正解。纖維化使肺順應性下降、肺容積減少(限制型)。","C":"煤末沈著病(及矽肺)主要病變在「上葉」，非中、下葉。","D":"石綿沈著病為「瀰漫性」纖維化＋肋膜斑塊(下葉)，非「結節」變化；結節性是矽肺特徵，敘述錯誤。"},"sources":["新文京《內外科護理學》呼吸系統—間質與職業性肺病、支氣管擴張、肺擴張不全"]}},"105030-N3-53":{"quick":"肺擴張不全(atelectasis)病灶區「呼吸音減弱」。","detail":{"background":"肺擴張不全(atelectasis)是肺泡塌陷、含氣量減少，常因分泌物阻塞、術後深呼吸不足、外壓(積液/氣胸)所致。理學評估：塌陷區「呼吸音減弱或消失」、叩診濁音、氣管可向「患側」偏移(體積減少牽引)；臨床可見呼吸「快而淺」(非慢而深)、低血氧、可能低度發燒、咳嗽。護理以深呼吸、誘發性肺量計、咳痰、活動、姿位引流促進復張。本題以「呼吸音減弱」為最可能發現。","options":{"A":"肺擴張不全常伴低度發燒，「正常口溫」非最可能發現。","B":"乾咳非其特異發現。","C":"正解。塌陷區呼吸音減弱或消失。","D":"肺擴張不全多呈「快而淺」呼吸，非慢而深。"},"sources":["新文京《內外科護理學》呼吸系統—間質與職業性肺病、支氣管擴張、肺擴張不全"]}},"108110-N3-56":{"quick":"支氣管擴張症最主要病因是「(反覆)細菌感染」破壞支氣管壁。","detail":{"background":"支氣管擴張症(bronchiectasis)是支氣管壁因「反覆感染與發炎」破壞肌肉與彈性組織，造成「不可逆」的管腔擴張。最主要病因是「(反覆)細菌感染」(如兒時麻疹、百日咳、肺炎、結核後遺，或阻塞、囊狀纖維化等使分泌物滯留→反覆感染的惡性循環)。臨床特徵為慢性咳嗽合併「大量膿痰(靜置分三層)」、反覆肺部感染、咳血、杵狀指。治療以引流排痰、抗生素、控制感染為主。","options":{"A":"正解。反覆細菌感染破壞支氣管壁是最主要病因。","B":"過敏非支氣管擴張症的主要病因。","C":"遺傳(如囊狀纖維化)是少數成因，非「最主要」。","D":"老化非其主要病因。"},"sources":["新文京《內外科護理學》呼吸系統—間質與職業性肺病、支氣管擴張、肺擴張不全"]}},"109030-N3-79":{"quick":"支擴病人出現「明顯咳血(血絲/血塊)」需盡速就醫。","detail":{"background":"支氣管擴張症因支氣管壁血管被反覆發炎侵蝕，可發生咳血，甚至「大量咳血(massive hemoptysis)」危及生命(窒息、失血)。故當痰中「明顯出現血絲或血塊」時，是需「盡速就醫」的警訊，須評估出血量、保持呼吸道通暢(患側朝下避免血液流入健側)、必要時支氣管動脈栓塞。痰因天熱變黏稠、痰分三層是疾病常態；飯後較喘多與飽脹有關，皆非緊急。","options":{"A":"天熱痰變黏稠是常見現象，補水即可，非緊急。","B":"正解。痰明顯出現血絲或血塊(咳血)需盡速就醫，慎防大咳血。","C":"進食大餐後較喘多為飽脹影響橫膈，非緊急狀況。","D":"痰分層是支擴大量膿痰的典型現象，非需急診的新狀況。"},"sources":["新文京《內外科護理學》呼吸系統—間質與職業性肺病、支氣管擴張、肺擴張不全"]}},"111110-N3-59":{"quick":"肺擴張不全=體積減少→患側「叩診濁音」、震顫與呼吸音減弱、氣管偏向「患側」。","detail":{"background":"肺擴張不全(體積喪失)的身體評估呈「容積減少」型態：①氣管與縱膈被牽引向「患側(同側)」偏移，非向健側②阻塞性塌陷時觸覺震顫「減弱」(空氣與聲音傳不進去)，非變大③叩診患側因含氣減少呈「濁音」④聽診患側呼吸音「減弱或消失」。故四選項中正確者為「叩診患側明顯濁音」。","options":{"A":"氣管被牽引向「患側」，非向健側擴張，敘述錯誤。","B":"阻塞性塌陷時觸覺震顫「減弱」，非變大。","C":"正解。含氣減少使患側叩診呈濁音。","D":"患側呼吸音「減弱或消失」，非變大。"},"sources":["新文京《內外科護理學》呼吸系統—間質與職業性肺病、支氣管擴張、肺擴張不全"]}},"101110-N3-29":{"quick":"服Warfarin 應「避免」高維生素K 食物(會拮抗藥效)；多吃是錯的。","detail":{"background":"Warfarin(Coumadin)是維生素K 拮抗劑，抑制肝臟合成依賴維生素K 的凝血因子(II、VII、IX、X)以抗凝。衛教重點：①維生素K 會「拮抗」Warfarin 使INR 下降、抗凝不足→應「維持穩定攝取、勿大量增加」深綠色蔬菜(花椰菜、菠菜、甘藍等)②定期監測PT/INR(治療目標INR 約2–3)③出血預防——軟毛牙刷、含蠟牙線、抽血後加壓15–20 分鐘、避免外傷、觀察牙齦/皮膚/血尿/黑便等出血徵象④戒菸、避免影響藥效的藥物與酒精。故「宜多吃富含維他命K 食物」為錯誤。","options":{"A":"戒菸對血管健康有益，敘述正確。","B":"錯誤(本題選此)。維生素K 拮抗Warfarin，應避免大量攝取、維持穩定，而非多吃。","C":"抽血後加壓15–20 分鐘可預防出血，正確。","D":"軟毛牙刷與含蠟牙線可減少牙齦出血，正確。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"103030-N3-57":{"quick":"肺栓塞會「心搏過速」，出現「心搏過緩」最不可能。","detail":{"background":"急性肺栓塞(PE)是血栓(多源自下肢深部靜脈)阻塞肺動脈，造成通氣灌流不匹配與肺循環阻力上升。典型臨床表徵：「突然」呼吸困難、胸膜性胸痛、心搏「過速」、呼吸過速、低血氧、焦慮不安、咳嗽或咳血，嚴重時低血壓、休克。因低血氧與交感興奮，心跳「加快」是常態；「心搏過緩」最不可能出現(僅在瀕死/嚴重缺氧末期)。","options":{"A":"突然呼吸困難是PE 最常見症狀。","B":"正解(最不可能)。PE 多為心搏過速，非過緩。","C":"胸膜性胸痛是PE 常見表現。","D":"焦慮不安(瀕死感)在PE 很常見。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"104030-N3-53":{"quick":"大範圍肺栓塞→肺循環阻力暴增→肺高壓→「右心衰竭」。","detail":{"background":"大範圍(massive)肺栓塞阻塞大量肺動脈床，使「肺血管阻力急遽上升、肺動脈壓升高(急性肺高壓)」，右心室後負荷暴增、急性擴張與衰竭(acute cor pulmonale)，可致心輸出量下降、低血壓與休克甚至猝死。這是PE 致命的核心血流動力學機轉。並非全身性血管阻力上升的左心衰，也與肝門靜脈、內頸靜脈阻塞無關。","options":{"A":"PE 影響的是「肺」循環，造成右心衰，非全身血管阻力上升致左心衰。","B":"正解。肺循環阻力上升→肺高壓→右心衰竭。","C":"肝門靜脈阻塞與PE 無關。","D":"內頸靜脈阻塞與PE 無關。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"105090-N3-53":{"quick":"PE→過度換氣致「呼吸性鹼中毒合併低血氧」(pH↑、PaCO2↓、PaO2↓)。","detail":{"background":"判讀ABG：pH 7.52(>7.45 鹼中毒)、PaCO2 28(<35 偏低，為呼吸性原因)、HCO3⁻ 24(正常)→「未代償之呼吸性鹼中毒」，同時PaO2 50(明顯低血氧)。此組合「低血氧＋因喘而CO2 被吹低的呼吸性鹼中毒」最符合「肺栓塞」——PE 造成低血氧刺激過度換氣排出CO2。COPD 多為呼吸性「酸」中毒(CO2 滯留)、DKA 為代謝性「酸」中毒(HCO3 低、pH 低)、心肌梗塞ABG 不具此特異型態。","options":{"A":"COPD 常CO2 滯留→呼吸性酸中毒，與此鹼中毒相反。","B":"DKA 為代謝性酸中毒(pH 低、HCO3 低)，與本題鹼中毒不符。","C":"正解。低血氧＋呼吸性鹼中毒(過度換氣)最符合肺栓塞。","D":"心肌梗塞無此特異ABG 型態。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"106030-N3-52":{"quick":"預防PE 最重要=「避免久坐久臥/制動」以預防深部靜脈血栓(DVT)。","detail":{"background":"肺栓塞的栓子多來自下肢深部靜脈血栓(DVT)，故預防PE 的根本是「預防DVT」。Virchow 三要素：血流滯留、血管內皮受損、血液高凝。最重要措施是「避免久坐久臥與長時間制動」——鼓勵早期下床活動、足踝運動、長途旅行定時起身、穿彈性襪、必要時抗凝預防。深呼吸咳嗽預防的是肺塌陷/肺炎、補水與避免劇烈運動非PE 預防的關鍵。","options":{"A":"深呼吸咳嗽主要預防肺塌陷與肺炎，非PE 的關鍵預防。","B":"補水有助但非預防PE 最重要措施。","C":"避免劇烈運動非PE 預防重點(反而鼓勵活動避免久臥)。","D":"正解。避免久坐久臥/制動以預防DVT，是預防PE 最重要的措施。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"106110-N3-53":{"quick":"疑似PE 最常見=「突然胸痛(胸膜性)」與突發呼吸困難。","detail":{"background":"評估疑似PE 時，最典型的是「突然發生」的症狀：突發性胸膜性胸痛、突發呼吸困難、心搏過速、呼吸過速、低血氧、焦慮不安、咳嗽/咳血。本題選「突然胸痛」。突然發冷發燒是感染表現、噘嘴式呼吸是COPD 病人代償方式、泡沫痰是肺水腫表現，皆非PE 典型。","options":{"A":"突然發冷發燒是感染表現，非PE 典型。","B":"正解。突然(胸膜性)胸痛是PE 常見表現。","C":"噘嘴式呼吸是COPD 病人的代償，非PE。","D":"泡沫痰見於肺水腫，非PE。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"108110-N3-51":{"quick":"血栓形成72 小時內可用「血栓溶解劑(streptokinase)」快速溶解血塊。","detail":{"background":"抗凝與溶栓的差別：Heparin、Warfarin 是「抗凝劑」——只能阻止「新」血栓形成、防止既有血栓擴大，並「不能溶解」已形成的血塊；要「快速溶解既有血塊」需用「血栓溶解劑(thrombolytics)」如streptokinase、urokinase、t-PA，於血栓形成早期(常為發病後數小時至約72 小時內、且大範圍PE 合併血流動力學不穩時)使用，可迅速溶解栓子、降低死亡率，但出血風險高。Aspirin 為抗血小板，效力不足以治療PE。","options":{"A":"Aspirin 是抗血小板藥，不足以溶解PE 血栓。","B":"Heparin 是抗凝劑，防止血栓擴大但不能溶解既有血塊。","C":"正解。Streptokinase 為血栓溶解劑，可快速溶解血塊。","D":"Warfarin 是口服抗凝劑，不能溶解血栓。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"108110-N3-52":{"quick":"Heparin 抗凝治療目標：aPTT 維持正常值的「1.5～2.5 倍」。","detail":{"background":"普通(未分段)肝素(unfractionated heparin)以靜脈輸注抗凝時，需監測「部分凝血活酶時間(aPTT)」並調整劑量，治療目標是維持aPTT 為「正常對照值的1.5～2.5 倍」(約治療範圍)。過低抗凝不足、過高出血風險增加。肝素過量的解毒劑是魚精蛋白(protamine sulfate)。Warfarin 則監測PT/INR(目標INR 2–3)。","options":{"A":"1.0–1.4 倍抗凝不足。","B":"正解。aPTT 維持正常值的1.5–2.5 倍。","C":"2.6–3.5 倍過高，出血風險增加。","D":"3.6–4.5 倍明顯過度抗凝。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"109030-N3-48":{"quick":"PE 病人坐姿避免「翹腳/交叉雙腿」(防靜脈回流受阻、DVT)。","detail":{"background":"PE 護理處置：①預防DVT——避免久坐久臥、避免「翹二郎腿或交叉雙腿」(壓迫膕窩使靜脈回流受阻)、鼓勵活動與足踝運動、穿彈性襪②抗凝衛教——服Warfarin 者「避免」大量維生素K 食物(青花椰、甘藍、菠菜會拮抗藥效，非多吃)③胸痛是肺梗塞/胸膜性疼痛，NTG(治冠狀動脈缺血)無效不適用④誘發性肺量計改善「通氣」與肺擴張，並非「增進肺部血流」。故正確為B。","options":{"A":"青花椰、甘藍、菠菜富含維生素K，服Warfarin 者應避免大量攝取，非鼓勵多食。","B":"正解。坐姿避免翹腳或交叉雙腿，以免靜脈回流受阻、促成DVT。","C":"NTG 用於冠狀動脈缺血性胸痛，對PE 胸痛無效。","D":"誘發性肺量計改善通氣與肺擴張，非「增進肺部血流」。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"111030-N3-57":{"quick":"Streptokinase 是「溶解血栓」的藥，敘述為「預防血栓形成」是錯的。","detail":{"background":"肺栓塞醫療處置：①氧氣治療維持氧合(PaO2 在60 mmHg 以上、SaO2≥90%)②抗凝(肝素→口服抗凝)防止血栓擴大、新栓子形成③大範圍且血流動力學不穩時用血栓溶解劑(streptokinase 等)「溶解」既有血栓④反覆PE 或抗凝禁忌者可放置下腔靜脈過濾器(IVC filter)攔截栓子⑤抬高下肢促進靜脈回流、避免DVT。題目C 把Streptokinase 描述成「預防血栓形成」是錯誤——它是「溶解」血栓的藥物，且本身會增加出血而非預防。","options":{"A":"給氧維持PaO2>60 mmHg 是正確處置。","B":"抬高下肢促進靜脈回流，正確。","C":"錯誤(本題選此)。Streptokinase 是「溶解」血栓的血栓溶解劑，非「預防血栓形成」。","D":"下腔靜脈過濾器可攔截栓子、預防再栓塞，正確。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"114170-N3-36":{"quick":"Warfarin 是「抗凝」(防止新血栓)，「有助溶解血栓」的敘述最不適當。","detail":{"background":"Warfarin 治療衛教：①監測PT/INR 調整劑量(目標INR 2–3)②避免大量富含維生素K 食物以免拮抗藥效③觀察出血徵象——皮膚出血點/紫斑、牙齦出血、血尿、黑便④軟毛牙刷、避免外傷、留意藥物交互作用。但Warfarin 是「抗凝劑」，作用是「阻止新血栓形成、防止既有血栓擴大」，「並不會溶解」已形成的血栓(溶栓需血栓溶解劑)，故「此藥物有助溶解血栓」的敘述最不適當。","options":{"A":"Warfarin 需監測PT/INR，正確。","B":"避免大量維生素K 食物以免拮抗藥效，正確。","C":"觀察出血點/紫斑等出血徵象，正確。","D":"最不適當(本題選此)。Warfarin 為抗凝劑，不能「溶解」血栓。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"115030-N3-36":{"quick":"PE 的V/Q 不匹配=肺泡「有通氣、但部分區域血流灌注受阻」(死腔效應)。","detail":{"background":"通氣(V)/灌流(Q)比值失衡有兩型：①「分流(shunt)」——有灌流但無通氣(如肺炎實質化、痰阻塞、肺水腫)，血流經過卻換不到氣②「死腔(dead space)」——有通氣但無灌流(如肺栓塞)，肺泡有氣體但該區肺血流被栓子阻斷、無法進行氣體交換。肺栓塞屬「死腔效應」——肺泡通氣足夠，但部分肺區血流灌注受阻下降，故選D。選項C 描述的是「分流」、A 是彌散障礙、B 是阻塞性通氣不足，皆非PE 機轉。","options":{"A":"隔膜增厚使氧氣無法擴散是「彌散障礙」，非PE 的V/Q 機轉。","B":"濃痰阻礙肺泡通氣是阻塞性通氣不足，非PE。","C":"有灌流但通氣不足是「分流」，與PE(死腔)相反。","D":"正解。肺泡有通氣但部分肺區血流灌注受阻下降，即PE 的死腔型V/Q 失衡。"},"sources":["新文京《內外科護理學》呼吸系統—肺栓塞","2019 ESC 急性肺栓塞指引"]}},"101030-N3-72":{"quick":"吸入型「類固醇(budesonide/Pulmicort)」用後要漱口，防口腔念珠菌與聲音沙啞。","detail":{"background":"氣喘吸入藥中，「吸入型類固醇(ICS，如budesonide/Pulmicort)」是控制(預防)藥，用後藥粉殘留口咽會造成「口腔念珠菌感染(鵝口瘡)、聲音沙啞」，故使用後必須「漱口並吐掉」。其餘吸入藥(支氣管擴張劑Aminophylline、抗膽鹼Atrovent、肥大細胞穩定劑Intal)無此口腔黴菌風險、不特別需要漱口。記憶：「吸入型類固醇＝用後漱口」。","options":{"A":"Aminophylline 為茶鹼類支氣管擴張劑，不需用後漱口。","B":"正解。Pulmicort(budesonide)是吸入型類固醇，用後需漱口防口腔念珠菌與聲沙。","C":"Atrovent(ipratropium)為抗膽鹼支氣管擴張劑，不需漱口。","D":"Intal(cromolyn)為肥大細胞穩定劑，不需漱口。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"102030-N3-53":{"quick":"肺功能檢查前「6 小時不用支氣管擴張劑」，以免影響真實肺功能。","detail":{"background":"氣喘病人做肺功能檢查(肺量計)前，為測得「未用藥的真實基礎肺功能」與評估支氣管擴張反應，檢查前應「停用支氣管擴張劑」一段時間(短效約6 小時、長效更久，依醫囑)。不需禁食、不需事先給類固醇或鎮靜劑(鎮靜會抑制配合用力呼吸)。檢查時病人需清醒配合用力吹氣。","options":{"A":"肺功能檢查不需禁食。","B":"檢查前不需口服類固醇(會影響基礎評估)。","C":"正解。檢查前6 小時停用支氣管擴張劑，以測得真實肺功能。","D":"鎮靜劑會抑制配合用力呼吸，不可使用。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"102110-N3-6":{"quick":"PEFR<紅燈區(一般<50%，本題以<60%)須立即就醫；其餘敘述均錯。","detail":{"background":"尖峰呼氣流速(PEFR)是氣喘自我監測工具，分「三色區」：綠燈(≥80% 個人最佳值，控制良好)、黃燈(50–80%，警戒、需加強用藥)、紅燈(一般定義<50%；部分教材用<60%，代表嚴重發作須立即就醫)。操作：每次連續吹3 次取「最高值」(非平均、非最低)；PEFR 與身高、年齡「及性別」均相關；達最佳值是否減藥需經醫師評估、不可自行減藥。本題以「PEFR 落入紅燈區須立即就醫」為正確敘述。","options":{"A":"達最佳預期值是否減藥需醫師評估，不可自行「即可減藥」。","B":"應取連續3 次的「最高值」記錄，非二次平均。","C":"正解。PEFR 落入紅燈區(嚴重發作)須立即就醫。","D":"PEFR 與身高、年齡「及性別」皆相關，敘述「與性別無關」錯誤。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"102110-N3-38":{"quick":"加熱噴霧不會誘發支氣管痙攣——說「加熱噴霧易致支氣管痙攣」需再衛教(C)。","detail":{"background":"噴霧(aerosol)治療正確衛教：採半坐臥姿利於藥液吸入與肺擴張、吸氣要「深而慢」並可閉氣片刻使藥沉積、治療後深呼吸與咳嗽排痰。一般加熱濕化噴霧反而有助稀釋分泌物、舒緩氣道；真正可能誘發「氣道反應/支氣管痙攣」的是「冷霧或過度刺激」與某些藥物。題目要找「說錯、需再衛教」者，C「使用加熱噴霧器容易發生支氣管痙攣」觀念不正確，需再指導。","options":{"A":"半坐臥姿適合噴霧治療，觀念正確。","B":"做完後深呼吸咳嗽有助排痰，觀念正確。","C":"正解(需再衛教)。加熱濕化噴霧並不會「容易誘發支氣管痙攣」，此觀念錯誤。","D":"吸氣深而慢使藥物沉積較佳，觀念正確。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"103100-N3-53":{"quick":"尖峰吐氣流速計操作：含緊吹口→「深吸氣後用力吐氣」。","detail":{"background":"尖峰吐氣流速計(peak flow meter)正確操作：①站立、流量計歸零②「深吸飽氣」③吹口含於雙唇間「咬緊密合」(不是放在牙齒中間漏氣)④「用力快速吐氣」一口氣⑤保持身體直立(不彎腰)，連續測3 次取最高值記錄。測量時機是固定每日早晚(評估控制趨勢)，而非「每次服藥前決定是否用藥」。本題正確操作為「深吸氣後經吹口用力吐氣」。","options":{"A":"吹口應「含於雙唇間咬緊密合」，置於牙齒中間會漏氣不準。","B":"正解。深吸飽氣後，經吹口用力快速吐氣。","C":"吐氣時身體應保持直立，不可向前彎腰(會影響數值)。","D":"PEFR 用於監測控制趨勢，非「每次服藥前決定是否用藥」。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"104030-N3-51":{"quick":"病毒感染「不用抗生素」——以抗生素治病毒感染是錯的(D)。","detail":{"background":"氣喘常用藥物作用：①吸入型β2 交感神經興奮劑(SABA/LABA)→鬆弛支氣管平滑肌、緩解或預防支氣管痙攣②吸入型類固醇(ICS)→抑制呼吸道黏膜慢性發炎(控制藥核心)③肥大細胞穩定劑(cromolyn)→抑制肥大細胞釋放發炎介質、減輕呼吸道發炎④白三烯素拮抗劑(montelukast)等。抗生素僅用於「細菌」感染，對「病毒」感染無效，「以抗生素治療病毒感染」是錯誤觀念。","options":{"A":"吸入型β2 興奮劑緩解支氣管痙攣，正確。","B":"類固醇抑制呼吸道炎症，正確。","C":"肥大細胞(巨細胞)穩定劑減輕呼吸道發炎，正確。","D":"錯誤(本題選此)。病毒感染不用抗生素，抗生素僅對細菌有效。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"104030-N3-57":{"quick":"尖峰吐氣流量可「反映氣道狹窄(阻塞)程度」。","detail":{"background":"尖峰吐氣流量(PEFR)反映「大氣道氣流阻塞的程度」——氣道愈狹窄、最大吐氣流速愈低，是氣喘控制的客觀監測指標。正確使用：站立深吸氣後用力吐氣、連續3 次取「最高值」(非最低)；落入紅燈區是嚴重發作須「立即就醫並依氣喘行動計畫使用『短效』支氣管擴張劑及就醫」，而非自行加「長效」擴張劑；測量前是「深吸飽氣」再經含口器「用力吐氣」(非吐盡再大吸氣)。本題正確為A。","options":{"A":"正解。PEFR 可反映氣道狹窄(阻塞)的程度。","B":"落入紅燈區應就醫並用「短效」緩解藥，非自行增加「長效」支氣管擴張劑。","C":"連續3 次應取「最高值」記錄，非最低值。","D":"操作是「深吸飽氣」後用力「吐氣」，非先吐盡再大吸氣。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"104100-N3-57":{"quick":"PEFR 維持在最佳值80% 以上(綠燈區)＝控制良好，不需調藥(D)。","detail":{"background":"氣喘自我照護正確認知：①急性發作時應立即用「短效β2 支氣管擴張劑(SABA)」緩解，而非吸入型「類固醇」(控制藥起效慢、不用於急救)②氣喘病人一般不需家用氧氣，「調整氧濃度」描述不適用居家氣喘自我照護③夜間因氣喘醒來代表「控制不佳」，非藥物有效④PEFR 維持在個人最佳值80% 以上屬綠燈區(控制良好)，可維持原計畫不需調藥。故D 為正確認知。","options":{"A":"急性發作應立即用短效支氣管擴張劑，非類固醇吸入劑。","B":"氣喘居家照護一般不涉及自行調整氧氣濃度，此描述不適用。","C":"夜間因氣喘醒來代表控制不佳，非藥物已生效。","D":"正解。PEFR≥最佳值80%(綠燈區)代表控制良好，不需調藥。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"105030-N3-48":{"quick":"氣喘是第I 型(IgE)過敏：介質含組織胺、緩激肽、SRS-A；「淋巴激活素」最不可能(屬第IV型)。","detail":{"background":"吸入花粉誘發的氣喘屬「第I 型(立即型、IgE 媒介)過敏反應」——過敏原使肥大細胞去顆粒，釋放「組織胺(histamine)、緩激肽(bradykinin)、白三烯素(即慢反應物質SRS-A)、前列腺素」等介質，造成支氣管平滑肌收縮、黏膜水腫、分泌增加。而「淋巴激活素(lymphokine)」是由活化T 淋巴球分泌、屬「第IV 型(遲發型、細胞媒介)」反應的產物，與立即型氣喘過敏的化學介質「最不相關」。","options":{"A":"組織胺是第I 型過敏的主要介質。","B":"緩激肽參與第I 型過敏的血管與支氣管反應。","C":"正解(最不可能)。淋巴激活素屬第IV 型細胞免疫，非立即型氣喘的介質。","D":"SRS-A(白三烯素)是第I 型過敏的重要介質。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"105030-N3-54":{"quick":"PEFR 計目的=「評估氣流阻塞程度」、監測氣喘控制。","detail":{"background":"尖峰吐氣流速計(peak flow meter)的目的是「評估氣道氣流阻塞的程度」、客觀監測氣喘控制狀態與早期偵測惡化，配合三色區與氣喘行動計畫調整用藥。它不是用來訓練呼吸肌(那是呼吸訓練器)、不是排痰工具、也不等同完整肺活量測量(肺活量需肺量計)。","options":{"A":"訓練呼吸肌是呼吸訓練器的功能，非PEFR 計目的。","B":"排痰由物理治療/誘發性肺量計等協助，非PEFR 計目的。","C":"肺活量需肺量計測量，PEFR 計只測尖峰吐氣流速。","D":"正解。PEFR 計用於評估氣流阻塞程度、監測氣喘控制。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"105090-N3-56":{"quick":"氣喘最典型呼吸音=「喘鳴(wheeze)」(呼氣相高調哨音)。","detail":{"background":"氣喘因支氣管平滑肌收縮、黏膜水腫與分泌物使氣道狹窄，氣流通過狹窄氣道產生「喘鳴(wheeze)」——高調、樂音樣，以「呼氣相」最明顯，是氣喘最典型的呼吸音。比較：哮吼(stridor)是上呼吸道(喉/氣管)阻塞的吸氣相粗糙聲、濕囉音(rales/crackles)見於肺泡有液體(肺炎、肺水腫)、鼾音(rhonchi)是大氣道分泌物造成的低調聲。","options":{"A":"哮吼(stridor)是上呼吸道阻塞的吸氣聲，非氣喘典型。","B":"正解。喘鳴(wheeze)是氣喘最典型的呼吸音(呼氣相明顯)。","C":"濕囉音見於肺泡積液(肺炎、肺水腫)，非氣喘典型。","D":"鼾音是大氣道分泌物的低調聲，非氣喘最典型。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"107110-N3-34":{"quick":"氣喘病人避用「β型阻斷劑」(會引發支氣管痙攣)。","detail":{"background":"氣喘合併高血壓的病人，降壓藥要避開「β腎上腺素受體阻斷劑(β-blocker)」——阻斷支氣管平滑肌的β2 受體會引起支氣管收縮、誘發或加重氣喘發作(非選擇性者尤甚)。可改用鈣離子阻斷劑、ACEI/ARB(注意ACEI 可能引咳)等。利尿劑、α阻斷劑、鈣離子拮抗劑一般不會誘發支氣管痙攣。","options":{"A":"亨利氏環利尿劑不會引發支氣管痙攣。","B":"α阻斷劑不會誘發支氣管收縮。","C":"正解。β阻斷劑會引起支氣管痙攣，氣喘病人應避免。","D":"鈣離子拮抗劑對支氣管無收縮作用，氣喘病人可用。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"109030-N3-49":{"quick":"吸入型類固醇「用後要漱口」(防口腔念珠菌、聲沙)；它是控制藥、不可驟停。","detail":{"background":"吸入型糖皮質類固醇(ICS)是氣喘「控制(預防)」藥，每日規律使用以抑制呼吸道慢性發炎。衛教重點：①使用「後」要「漱口並吐掉」，防止口腔念珠菌感染與聲音沙啞②非急救藥，急性發作要用短效β2 支氣管擴張劑③吸入時是「深而慢」吸氣、含口器密合、吸後閉氣5–10 秒(不是含在口中15 秒再吸)④長期使用不可自行驟停(此點對全身性類固醇尤其重要，需逐漸減量)。本題正確衛教為「使用後應漱口」。","options":{"A":"吸藥是含口器密合後「深慢吸入」，非「含在口中15 秒再吸」。","B":"急性發作應用短效支氣管擴張劑，ICS 不是急救藥。","C":"正解。吸入型類固醇使用後應漱口，防口腔念珠菌與聲沙。","D":"此點(不可驟停、逐漸減量)主要指「全身性」類固醇；本題最正確、直接的衛教為C 漱口。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"110110-N3-59":{"quick":"MDI 使用要「緩慢深吸氣」(非快速)；用後漱口、閉氣5–10 秒。","detail":{"background":"定量吸入器(MDI)正確使用：①搖勻、吐氣後含口器②「緩慢且深」地吸氣，同時按壓噴藥(快速吸氣會使藥物撞擊口咽、沉積到肺的量減少)③吸完「閉氣5–10 秒」使藥粒沉積肺部④用後漱口(尤其含類固醇者)。MDI 局部給藥、全身副作用較少，必要時加吸藥輔助器(spacer)提升肺部沉積。故「使用時需快速深吸氣」為錯誤。","options":{"A":"MDI 局部給藥，全身副作用較少，正確。","B":"含類固醇者用後需漱口，正確。","C":"錯誤(本題選此)。應「緩慢」深吸氣，快速吸氣會使藥物沉積口咽、降低肺部劑量。","D":"吸完閉氣5–10 秒使藥粒沉積，正確。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"111110-N3-57":{"quick":"Theophylline 治療濃度約10–20 μg/mL，12 屬治療範圍→「繼續輸注」。","detail":{"background":"Aminophylline(靜脈茶鹼)代謝為Theophylline，治療指數狹窄，治療血中濃度約「10–20 μg/mL」，>20 易中毒(噁心嘔吐、心悸心律不整、抽搐)。李先生濃度12 μg/mL 落在「治療範圍內」，代表劑量適當，最適當的護理是「繼續使用原Aminophylline 輸注」並持續監測。不需停藥、不需特別緊急通報(數值正常)、也不需懷疑檢驗有誤。","options":{"A":"數值在治療範圍內、屬正常，不需「立即」緊急通報。","B":"正解。12 μg/mL 在治療範圍(10–20)，繼續使用Aminophylline 輸注並監測。","C":"數值正常無中毒跡象，不需更換為不含藥的點滴。","D":"數值合理，不需質疑檢驗有誤。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"112110-N3-55":{"quick":"GINA 四項評估中此例符合2 項→「部分控制」(B)。","detail":{"background":"GINA 氣喘控制評估看過去4 週四項：①日間症狀>2 次/週②任何夜間因氣喘醒來③需用緩解藥>2 次/週④任何因氣喘的活動受限。符合0 項=控制良好、1–2 項=部分控制、3–4 項=控制不佳。陳女士：日間症狀每週一次(≤2/週，不算)、夜間醒來2 次(符合)、緩解藥>2 次/週(符合)、活動未受限(不算)→共2 項→「部分控制」。","options":{"A":"符合2 項，非0 項，非控制良好。","B":"正解。符合2 項(夜醒＋緩解藥>2/週)，屬部分控制。","C":"控制不佳需符合3–4 項，本例僅2 項。","D":"GINA 分類無「控制很差」此級，且本例為部分控制。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"113030-N3-33":{"quick":"fenoterol(β2 交感興奮劑)會刺激心臟β1→「心悸、心律不整」。","detail":{"background":"氣喘藥中會造成「心悸、心律不整」的是「β2 交感神經興奮劑(如fenoterol/Berotec、salbutamol)」——雖以β2 支氣管擴張為主，但仍有部分β1 作用刺激心臟，造成心跳加速、心悸、震顫、心律不整(高劑量或敏感者尤甚)，也可能低血鉀。比較：ipratropium(抗膽鹼)、budesonide(吸入類固醇)、montelukast(白三烯素拮抗劑)較少造成此心臟興奮反應。故本題選fenoterol。","options":{"A":"正解。fenoterol 為β2 交感興奮劑，兼有β1 作用，易致心悸、心律不整。","B":"ipratropium(抗膽鹼)較少造成心悸心律不整。","C":"budesonide(吸入類固醇)非造成心悸的典型藥。","D":"montelukast(白三烯素拮抗劑)不造成心臟興奮反應。"},"sources":["新文京《內外科護理學》呼吸系統—氣喘","GINA 2019 Global Strategy for Asthma"]}},"101030-N3-73":{"quick":"COPD 運動前可「依需要先用支氣管擴張劑」(B)，並採噘嘴呼吸、短吸長呼。","detail":{"background":"COPD 病人運動復健原則：①運動「前」可依需要先使用短效支氣管擴張劑，擴張氣道、提升運動耐受②採「噘嘴式呼吸」與「短吸長呼(吐氣比吸氣長)」，由鼻吸氣、噘嘴慢吐，避免氣道塌陷與CO2 滯留③循序漸進、含上肢運動(改善呼吸輔助肌)④避免「長吸短呼」(會加重氣陷)。故正確為「運動前可依需要用支氣管擴張劑」。","options":{"A":"應「短吸長呼(吐氣較長)」，「長吸短呼」會加重氣體滯留，錯誤。","B":"正解。運動前可依需要先用支氣管擴張劑，提升運動耐受。","C":"宜「鼻吸口(噘嘴)吐」，由口吸氣不利氣道控制。","D":"應「鼓勵」上半身運動以訓練呼吸輔助肌，非減少。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"101110-N3-25":{"quick":"COPD 合併肺心症(右心衰)會出現「頸靜脈怒張」(C)。","detail":{"background":"長期COPD 缺氧使肺血管收縮、肺動脈高壓，右心室後負荷增加終致「肺心症(cor pulmonale，右心衰竭)」。右心衰的徵象是「體循環鬱血」：頸靜脈怒張、肝腫大、下肢凹陷性水腫、腹水、體重增加。故「頸靜脈怒張」最能顯示合併肺心症。杵狀指反映慢性缺氧、胸痛與發燒非肺心症特異徵象。","options":{"A":"體溫升高提示感染，非肺心症特異徵象。","B":"胸痛非肺心症的特異表現。","C":"正解。頸靜脈怒張是右心衰(肺心症)體循環鬱血的徵象。","D":"杵狀指反映慢性缺氧，非右心衰竭的指標。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"102030-N3-54":{"quick":"橫膈式呼吸是「增加」潮氣容積與肺泡換氣，故「降低潮氣容積」為錯。","detail":{"background":"橫膈(腹式)呼吸訓練COPD 病人善用橫膈，預期效應：①「增加」潮氣容積與肺泡有效換氣②減慢呼吸速率、減少呼吸作功③改善氣體交換、增加活動耐力④增進對呼吸的控制感。它使每次呼吸更深更有效，故「降低潮氣容積」是錯誤敘述(應為增加)。","options":{"A":"錯誤(本題選此)。橫膈式呼吸「增加」潮氣容積，非降低。","B":"橫膈式呼吸可使呼吸變慢而深，降低呼吸速率，正確。","C":"改善換氣效率→增加活動耐力，正確。","D":"呼吸更深更有效→增加肺泡換氣，正確。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"102030-N3-56":{"quick":"COPD 氧療要「低濃度、低流速」，目標維持 SaO2 約90%。","detail":{"background":"COPD(尤其CO2 滯留型)氧療原則是「低濃度、低流量(常1–2 L/min 或Venturi 24–28%)」，目標維持「SaO2 約88–92%(約90%)、PaO2 約55–65 mmHg」即可。原因：慢性CO2 滯留者呼吸驅動部分依賴「低血氧」，若給高濃度氧、把PaO2 拉太高，會抑制呼吸驅動→CO2 麻醉(CO2 narcosis)、呼吸抑制。故維持SaO2 約90% 正確；高濃度氧、PaO2≥95、5–6 L/min 高流速皆不適當。","options":{"A":"COPD 給高濃度氧可能抑制呼吸驅動致CO2 滯留，錯誤。","B":"目標PaO2 約55–65 即可，維持≥95 過高、有CO2 麻醉風險。","C":"正解。COPD 氧療目標維持SaO2 約90%(88–92%)。","D":"5–6 L/min 屬高流速，COPD 應低流量(常1–2 L/min)。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"103030-N3-54":{"quick":"噘嘴呼吸=製造呼氣末正壓、「防氣道塌陷、促進吐氣」(C)。","detail":{"background":"噘嘴式呼吸(pursed-lip breathing)是COPD 重要技巧：吐氣時噘嘴(像吹口哨)增加口腔阻力，在氣道內產生「呼氣末正壓」，使塌陷傾向的小氣道維持開放、延長並完整吐氣，把滯留的氣體與CO2 排出，減少氣陷、改善呼吸困難與通氣。其主要目的是「預防呼吸道塌陷、促進吐氣」，而非排痰或增加吸氣。","options":{"A":"噘嘴呼吸主要促進「吐氣」與防氣道塌陷，非鬆動排痰(那靠物理治療)。","B":"它作用在「吐氣」相，非增加吸氣。","C":"正解。製造呼氣末正壓，預防呼吸道塌陷、促進完整吐氣。","D":"目的是促進吐氣排出滯留氣體，非降低潮氣容積。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"103100-N3-51":{"quick":"肺氣腫=阻塞型→FEV1「下降」，故「FEV1 增加」為錯。","detail":{"background":"肺氣腫(emphysema)是肺泡壁破壞、彈性回縮力喪失、氣體滯留(air trapping)的阻塞型肺病。肺功能變化：肺總量(TLC)增加、肺餘容積(RV)增加、肺活量(VC)下降、「第一秒用力呼氣容積(FEV1)下降」、FEV1/FVC 比值下降(<70%)。故「FEV1 增加」是錯誤敘述(應為下降)。","options":{"A":"氣體滯留使TLC 增加，正確。","B":"氣道阻塞使VC 下降，正確。","C":"氣體滯留使RV 增加，正確。","D":"錯誤(本題選此)。阻塞型肺病FEV1「下降」，非增加。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"103100-N3-56":{"quick":"評估「通氣」有效性最佳指標=PaCO2(反映肺泡通氣)。","detail":{"background":"「通氣(ventilation)」指肺泡與外界的氣體交換，其有效性最直接的指標是「PaCO2」——CO2 排出完全依賴肺泡通氣，通氣不足則CO2 滯留(PaCO2 上升)、通氣過度則PaCO2 下降。慢性支氣管炎/COPD 通氣不足會CO2 滯留。PaO2、SaO2 反映「氧合」、pH 反映酸鹼，皆非評估「通氣」最直接的指標。","options":{"A":"正解。PaCO2 直接反映肺泡通氣，是評估通氣有效性的最佳指標。","B":"PaO2 反映氧合，非通氣。","C":"SaO2 反映血氧飽和(氧合)，非通氣。","D":"pH 反映酸鹼狀態，非通氣的直接指標。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"105030-N3-58":{"quick":"COPD 居家長期氧療可降低肺血管阻力、改善肺心症與存活(A)。","detail":{"background":"長期居家氧療(LTOT)用於COPD 慢性嚴重低血氧者(PaO2≤55 mmHg 或合併肺心症/紅血球增多時≤59)，每日≥15 小時。益處：改善血氧→「降低缺氧造成的肺血管收縮與肺血管阻力」、減輕肺動脈高壓與肺心症、改善存活率與生活品質。它不是只用於末期、不會造成生理性「氧氣依賴(成癮)」、夜間更應持續用氧(睡眠時血氧常更低)。","options":{"A":"正解。長期氧療改善缺氧、降低肺血管阻力，減輕肺心症並改善存活。","B":"LTOT 用於慢性嚴重低血氧者，非「僅」末期病人。","C":"氧療不會造成生理性氧氣成癮/依賴。","D":"夜間血氧常更低，更應持續用氧，非避免。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"105090-N3-55":{"quick":"COPD 呼吸困難可用Venturi 面罩或鼻導管「低濃度」給氧→正確組合12。","detail":{"background":"COPD 呼吸困難的氧療：可用「凡德里(Venturi)面罩」或「鼻導管」給予「低濃度、低流量」氧氣(目標SaO2 約90%)，並採「坐姿/身體前傾」而非平躺以利呼吸。題目敘述1(Venturi 可)、2(鼻導管可)正確；3「給40% 濃度氧」對CO2 滯留型COPD 偏高、不適當；4「維持平躺」錯誤(應坐起前傾)。故正確組合為1＋2。","options":{"A":"正解。12＝Venturi 面罩與鼻導管均可低濃度給氧，符合COPD 氧療。","B":"13 含「給40% 氧」偏高，不適合CO2 滯留型COPD。","C":"24 含「平躺」錯誤(應坐起前傾)。","D":"34 兩者(40% 氧、平躺)皆不適當。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"106030-N3-53":{"quick":"肺氣腫缺氧主因=肺泡壁破壞致「氣體交換面積減少」(C)。","detail":{"background":"肺氣腫的核心病變是「肺泡壁(肺泡間隔)破壞、肺泡融合成大囊」，使「氣體交換的表面積大幅減少」、肺泡微血管床也被破壞，加上彈性回縮力喪失、氣體滯留，導致氧合下降。其供氧減少的「主要」原因是「氣體交換面積減少」，而非呼吸肌麻痺、肋膜積水或單純氣道阻塞(慢性支氣管炎較以氣道阻塞為主)。","options":{"A":"肺氣腫非呼吸肌麻痺所致。","B":"肋膜積水非肺氣腫缺氧的主因。","C":"正解。肺泡壁破壞使氣體交換面積減少，是供氧減少主因。","D":"氣道阻塞較是慢性支氣管炎特徵；肺氣腫主因是交換面積減少。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"106110-N3-54":{"quick":"慢性支氣管炎是杯狀細胞↑、纖毛↓；「肺回縮力降低」是肺氣腫特徵→錯(C)。","detail":{"background":"慢性支氣管炎病理：氣道慢性發炎，「杯狀細胞增生、黏液腺肥大→黏液分泌大增」、「纖毛上皮受損減少→清除力下降」，造成慢性咳嗽多痰、反覆感染；長期缺氧可致右心衰竭(肺心症)。而「肺的回縮力(彈性)降低」是「肺氣腫(肺泡破壞)」的特徵，非慢性支氣管炎，故為錯誤敘述。","options":{"A":"杯狀細胞數目增加是慢性支氣管炎病理，正確。","B":"纖毛上皮減少使清除力下降，正確。","C":"錯誤(本題選此)。肺回縮力(彈性)降低是肺氣腫特徵，非慢性支氣管炎。","D":"長期缺氧可致右心衰(肺心症)，正確。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"106110-N3-55":{"quick":"COPD 飲食應「減少碳水化合物」(碳水代謝產生較多CO2)，增加為錯(C)。","detail":{"background":"COPD 飲食原則：①「少量多餐」減少腹脹壓迫橫膈②食物製作易咀嚼、軟質，減少進食時耗氧與呼吸困難③「減少高碳水化合物」——碳水代謝產生的CO2 較多(高呼吸商)，會加重CO2 滯留，故宜「適度提高脂肪比例、足夠蛋白質」④攝取適量鈣、鉀等電解質。題目「增加碳水化合物」與正確原則相反，為錯誤。","options":{"A":"少量多餐減少橫膈壓迫，正確。","B":"攝取適量鈣、鉀等電解質，正確。","C":"錯誤(本題選此)。應「減少」碳水化合物(產CO2 多)，非增加。","D":"易咀嚼食物減少進食耗氧，正確。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"106111-N3-58":{"quick":"CO2 滯留型COPD 氧合目標較低：PaO2 約50–65 mmHg(B)。","detail":{"background":"對於慢性CO2 滯留型COPD，氧療目標「不可把氧拉太高」，維持「PaO2 約55–65(本題50–65)mmHg、SaO2 約88–92%」即可，以免抑制依賴低血氧的呼吸驅動造成CO2 麻醉。維持PaO2 80–100 或SaO2 100% 對這類病人反而危險；SaO2 60% 則嚴重缺氧。故適當目標為PaO2 約50–65 mmHg。","options":{"A":"PaO2 80–100 對CO2 滯留型COPD 偏高，有抑制呼吸驅動風險。","B":"正解。維持PaO2 約50–65 mmHg(SaO2 約90%)為適當目標。","C":"SaO2 100% 代表氧過高，對CO2 滯留型COPD 危險。","D":"SaO2 60% 為嚴重缺氧，不可接受。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"107030-N3-55":{"quick":"肺氣腫造成換氣灌流比「失衡」(不一定減少)，敘述「比值會減少」為錯(A)。","detail":{"background":"肺氣腫特徵：肺泡壁破壞→氣體交換面積減少、彈性回縮喪失→氣體滯留、「呼氣期延長」、長期過度充氣形成「桶狀胸」、氣體交換障礙致低血氧。其通氣/灌流(V/Q)是「不均勻失衡」(有些區通氣多灌流少、有些相反)，並非單純「比值減少」，故A 敘述不準確、為錯誤選項。","options":{"A":"錯誤(本題選此)。肺氣腫造成V/Q「不均勻失衡」，非單純「比值減少」。","B":"肺泡破壞造成氣體交換障礙，正確。","C":"氣道阻塞與氣陷使呼氣期延長，正確。","D":"長期過度充氣形成桶狀胸，正確。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"107030-N3-56":{"quick":"Aminophylline 重點：1支氣管擴張＋3 IV 不超過20–25 mg/min→正確13。","detail":{"background":"Aminophylline(茶鹼)用於COPD/氣喘：1「主要作用為支氣管擴張」正確；3「靜脈注射速度不可過快(不超過約20–25 mg/min)」正確，過快會致心律不整、低血壓、抽搐。錯誤者：2 副作用是心律不整與「心搏過速」(非高血壓)；4 治療血中濃度應維持「10–20 μg/mL」(非20–40，20 以上即易中毒)。故正確組合為1＋3。","options":{"A":"12 含「副作用高血壓」錯誤(應為心律不整/心搏過速)。","B":"正解。13＝支氣管擴張＋靜注速度不可過快，正確。","C":"24 兩項皆錯(高血壓、濃度20–40)。","D":"34 含「濃度20–40」錯誤(治療濃度為10–20)。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"107030-N3-57":{"quick":"肺心症右心衰者「不宜大量補水」——攝取大量水分為錯(C)。","detail":{"background":"肺心症(右心衰竭)病人有體液鬱積(水腫、頸靜脈怒張、腹水)，照護需「限制水分與鈉」以免加重心衰與水腫。協助清除呼吸道分泌物可用：深呼吸與有效咳嗽、胸部叩擊與震顫、姿位引流等物理治療，但「攝取大量水分」對「合併右心衰的肺心症」病人是不適當的(會加重體液負荷)，故為錯誤。注意：單純痰黏需補水，但本題情境是肺心症右心衰，需限水。","options":{"A":"教導深呼吸、咳嗽促進排痰，正確。","B":"胸部叩擊、震顫鬆動分泌物，正確。","C":"錯誤(本題選此)。肺心症右心衰應限水，不宜攝取大量水分。","D":"姿位引流利用重力排痰，正確。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"107110-N3-57":{"quick":"橫膈＋噘嘴呼吸目的=1降低呼吸作功＋4促進CO2 排出→正確14。","detail":{"background":"橫膈式與噘嘴式呼吸對COPD 的目的：1「降低呼吸作功」(用橫膈取代費力的輔助肌、減少能量消耗)正確；4「促進二氧化碳排出」(噘嘴呼吸延長並完整吐氣、排出滯留CO2)正確。錯誤者：2 是使呼吸「變慢而深」(降低呼吸速率)，非「增加呼吸速率」；3 是「增加(有效)潮氣容積」，非「減少潮氣容積」。故正確組合為1＋4。","options":{"A":"12 含「增加呼吸速率」錯誤(應變慢)。","B":"正解。14＝降低呼吸作功＋促進CO2 排出。","C":"23 兩項皆錯(增加呼吸速率、減少潮氣容積)。","D":"34 含「減少潮氣容積」錯誤(應增加有效潮氣容積)。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"108020-N3-57":{"quick":"α1-抗胰蛋白酶缺乏→失去對彈性蛋白酶的保護→「肺氣腫」(B)。","detail":{"background":"α1-抗胰蛋白酶(α1-antitrypsin)是保護肺組織、抑制嗜中性球彈性蛋白酶的物質。先天「α1-抗胰蛋白酶缺乏」者，彈性蛋白酶不受抑制而持續破壞肺泡壁彈性組織，造成「早發性、全小葉型肺氣腫」(尤其抽菸更快)，是年輕人肺氣腫的重要病因。此缺乏與慢性支氣管炎、氣喘、支氣管擴張無直接因果。","options":{"A":"慢性支氣管炎與α1-抗胰蛋白酶缺乏無直接因果。","B":"正解。α1-抗胰蛋白酶缺乏導致肺泡彈性組織被破壞→肺氣腫。","C":"氣喘非α1-抗胰蛋白酶缺乏所致。","D":"支氣管擴張症非此缺乏的典型結果。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"108020-N3-58":{"quick":"COPD 最早的肺功能變化是「FEV1 下降」(D)。","detail":{"background":"COPD 是「阻塞型」肺病，最早、最敏感的肺功能異常是「用力呼氣第一秒容積(FEV1)下降」與FEV1/FVC 比值下降——反映呼氣氣流受阻。隨病程進展才出現用力呼氣時間延長、肺活量(VC)下降、肺餘容積(RV)上升(氣體滯留)。故「最早」出現的變化是FEV1 下降。","options":{"A":"用力呼氣時間延長是後續變化，非「最早」。","B":"肺活量降低出現較晚。","C":"肺餘容積上升(氣陷)為較後期變化。","D":"正解。FEV1 下降是COPD 最早、最敏感的肺功能變化。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"108110-N3-57":{"quick":"咳血「最不」屬於呼吸困難的徵象(D)。","detail":{"background":"呼吸困難(dyspnea)的徵象包括：端坐呼吸(orthopnea)、噘嘴式呼吸、使用呼吸輔助肌(胸鎖乳突肌、肋間肌)、鼻翼搧動、呼吸過速、發紺等。「咳血(hemoptysis)」是出血表現(見於結核、支擴、肺癌、PE 等)，並非「呼吸困難」本身的徵象，故最不相關。","options":{"A":"端坐呼吸是呼吸困難的典型徵象。","B":"噘嘴式呼吸是COPD 呼吸困難的代償徵象。","C":"使用胸鎖乳突肌(輔助呼吸肌)是呼吸費力的徵象。","D":"正解(最不常見/最不相關)。咳血是出血表現，非呼吸困難的徵象。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"108110-N3-60":{"quick":"橫膈式呼吸→改善換氣效率、「增加活動耐力」(D)。","detail":{"background":"教COPD 病人橫膈(腹式)呼吸的預期效果：增加有效潮氣容積與肺泡通氣、減慢呼吸速率、降低呼吸作功、改善氣體交換，因而「增加活動耐力」、提升日常活動表現與生活品質。故正確為「增加活動耐力」，而非減少潮氣容積、減少肺泡通氣或增加呼吸速率(這些都相反)。","options":{"A":"橫膈式呼吸「增加」有效潮氣容積，非減少。","B":"它「增加」肺泡通氣，非減少。","C":"它使呼吸變慢，「降低」呼吸速率，非增加。","D":"正解。改善換氣效率→增加活動耐力。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"109030-N3-51":{"quick":"噘嘴呼吸目的=延長吐氣、「減少CO2 滯留」(A)。","detail":{"background":"噘嘴式呼吸在吐氣時製造呼氣末正壓，使易塌陷的小氣道保持開放、延長並完整吐氣，把滯留肺內的氣體與「CO2 排出」，故主要目的是「減少二氧化碳滯留在肺部」、緩解呼吸困難與氣陷。它不是用來排痰、不是降低氣道壓力(反而增加口腔阻力)、也不是增加橫膈肌力(那是橫膈訓練)。","options":{"A":"正解。延長完整吐氣，減少CO2 滯留在肺部。","B":"排痰靠物理治療/補水，非噘嘴呼吸目的。","C":"噘嘴呼吸是「增加」口腔阻力製造呼氣末正壓，非降低氣道壓力。","D":"增加橫膈肌力是橫膈訓練的目標，非噘嘴呼吸。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"109030-N3-54":{"quick":"阻塞型肺病特徵=「FEV1/FVC 比值」下降(B)。","detail":{"background":"肺功能區分阻塞型與限制型的關鍵是「FEV1/FVC 比值」：阻塞型(COPD、氣喘)因呼氣氣流受阻，FEV1 下降比FVC 更明顯→「FEV1/FVC 比值下降(<70%)」，是阻塞的標誌。限制型則FEV1、FVC 同比例下降、比值正常或上升。DLCO 下降見於肺氣腫/間質病但非區分阻塞的關鍵；RV 在阻塞型反而「上升」(氣陷)，非下降。","options":{"A":"DLCO 下降不是區分阻塞型的關鍵指標。","B":"正解。FEV1/FVC 比值下降是阻塞型肺病的特徵。","C":"FEF25–75% 雖反映小氣道但非定義阻塞的標準指標。","D":"阻塞型RV 多「上升」(氣陷)，非下降。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"109110-N3-56":{"quick":"COPD 惡化ABG=「呼吸性酸中毒、CO2 滯留」(pH↓、PaCO2↑、HCO3 代償↑)→A。","detail":{"background":"COPD 惡化時通氣不足、CO2 滯留惡化，ABG 呈「呼吸性酸中毒」：pH 下降、PaCO2 上升，慢性者HCO3⁻代償性上升，並常伴低血氧。選項A：pH 7.30(酸)、PaCO2 60(高)、PaO2 70、HCO3 30(代償高)→最符合COPD 惡化(失代償的呼吸性酸中毒)。B、C 大致正常；D 為呼吸性鹼中毒(pH 7.55、PaCO2 30)與COPD 惡化相反。","options":{"A":"正解。pH↓、PaCO2↑、HCO3 代償↑＝呼吸性酸中毒，最能顯示COPD 惡化。","B":"數值接近正常，非惡化。","C":"完全正常的ABG。","D":"呼吸性鹼中毒(pH 7.55、PaCO2 30)與CO2 滯留惡化相反。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"110030-N3-54":{"quick":"Venturi 面罩特點=能提供「較精確固定的氧氣濃度」(C)。","detail":{"background":"Venturi(凡德里)面罩利用文氏效應以固定比例混入空氣，可提供「精確且固定的吸入氧濃度(FiO2，常24–50%)」，特別適合「CO2 滯留型COPD」需嚴格控制低濃度氧者。它屬「高流量、可控濃度」裝置但提供的是「低～中等且精確」的FiO2，並非高達70% 以上；增加濕度不是其主要特點；進食時通常需暫時改鼻導管。故主要特點為「氧濃度精確」。","options":{"A":"Venturi 面罩多提供24–50% 的可控濃度，非70% 以上。","B":"增加濕度不是Venturi 面罩的主要特點。","C":"正解。可提供精確、固定的吸入氧濃度。","D":"進食時面罩不便，常暫改鼻導管，非其特點。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"110030-N3-60":{"quick":"COPD 病人「使用呼吸輔助肌」代表呼吸窘迫，須優先處理(C)。","detail":{"background":"COPD 病人的評估中，「使用呼吸輔助肌(胸鎖乳突肌、肋間肌、鼻翼搧動)」代表「呼吸費力、呼吸窘迫」，是病情惡化、可能呼吸衰竭的急性警訊，須「優先」評估與處理(評估氧合與意識、調整氧療與支氣管擴張、通知醫師)。杵狀指、桶狀胸是「慢性」長期變化、白色濃痰是慢性表現，皆非當下最緊急。","options":{"A":"杵狀指是慢性缺氧的長期變化，非急需處理。","B":"白色濃痰是慢性表現，非最優先。","C":"正解。使用呼吸輔助肌代表呼吸窘迫，須優先處理。","D":"桶狀胸是慢性結構改變，非急性問題。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"111110-N3-55":{"quick":"慢性支氣管炎出院衛教核心=「戒菸與避免二手菸」(C)。","detail":{"background":"慢性支氣管炎/COPD 出院衛教最重要的是「戒菸並避免二手菸」——吸菸是COPD 最主要可改變的危險因子，戒菸能延緩肺功能下降。其餘正確衛教：充足水分稀釋痰液(不可限水)、減少高碳水化合物(產CO2 多)、每年接種流感疫苗與肺炎鏈球菌疫苗預防感染。故「戒菸或避免二手菸」為正確；限水、增醣、避免流感疫苗皆錯誤。","options":{"A":"應「補充」足夠水分稀釋痰液，限水錯誤。","B":"應「減少」碳水化合物(產CO2 多)，增加錯誤。","C":"正解。戒菸與避免二手菸是COPD 出院衛教核心。","D":"COPD 病人「應」每年接種流感疫苗，避免接種錯誤。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"111110-N3-56":{"quick":"COPD 阻塞嚴重度最重要指標=FEV1(B)。","detail":{"background":"評估COPD 氣流阻塞「嚴重度」最重要、GOLD 分級所用的指標是「第一秒用力呼氣容積(FEV1)」(以佔預測值百分比分GOLD 1–4 級)；診斷阻塞先看支氣管擴張後FEV1/FVC<0.70，再以FEV1% 判嚴重度。FVC、VC、TLC 雖為肺功能參數，但評估「阻塞嚴重度」以FEV1 為核心。","options":{"A":"FVC 用於計算比值，非評估阻塞嚴重度的核心。","B":"正解。FEV1 是評估COPD 阻塞嚴重度最重要的指標(GOLD 分級依據)。","C":"肺活量(VC)非阻塞嚴重度分級指標。","D":"全肺容量(TLC)非評估阻塞嚴重度的核心。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"112030-N3-53":{"quick":"GOLD 1–4 級的分級依據是「FEV1(% 預測值)」(B)。","detail":{"background":"GOLD(全球COPD 倡議組織)以「支氣管擴張後FEV1 佔預測值百分比」將氣流受限嚴重度分為GOLD 1(≥80%)、2(50–79%)、3(30–49%)、4(<30%)四級。注意：GOLD 也用症狀(CAT/mMRC)與急性惡化史做ABE 分組以指導治療，但「1–4 級的氣流受限分級」純依FEV1。RV、SaO2 非分級依據。","options":{"A":"肺餘容積(RV)非GOLD 1–4 分級依據。","B":"正解。GOLD 1–4 級依FEV1(% 預測值)分級。","C":"血氧濃度非GOLD 氣流受限分級依據。","D":"急性惡化次數用於風險/ABE 分組，非GOLD 1–4 級的分級依據。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"112110-N3-54":{"quick":"MDI 正確：吸藥後「閉氣約10 秒再緩慢吐氣」(C)。","detail":{"background":"fenoterol(Berotec，β2 支氣管擴張劑)MDI 正確使用：①使用前「搖勻」瓶身②吐氣後含口器，按壓噴藥「一次」並同時「緩慢深吸氣」(不可一次連按兩下後才吸)③吸完「閉氣約10 秒」使藥粒沉積肺部，再緩慢吐氣④此藥為支氣管擴張劑、非類固醇，用後不一定需漱口(吸入型「類固醇」才必須漱口)。故正確為C。","options":{"A":"使用前「應」搖勻瓶身，不搖晃錯誤。","B":"應一次按壓並同步吸入，「連按兩次再吸」不正確。","C":"正解。吸藥後閉氣約10 秒再緩慢吐氣，使藥粒沉積。","D":"此為支氣管擴張劑非類固醇，不一定需用後立即漱口(漱口主要針對吸入型類固醇)。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"112110-N3-58":{"quick":"肺氣腫=阻塞型，FEV1/FVC 應「<70%」；故「>80%」最不可能(C)。","detail":{"background":"肺氣腫屬阻塞型肺病，肺功能：TLC 增加、RV 增加、FEV1 下降、FEV1/FVC 比值「下降(<70%)」。選項C「FEV1/FVC>80%」代表比值正常/偏高，是「限制型」或正常肺的型態，「最不可能」出現在肺氣腫。其餘TLC 增加、FEV1 降低、RV 增加都是肺氣腫典型表現。","options":{"A":"氣體滯留使TLC 增加，是肺氣腫表現。","B":"FEV1 降低是肺氣腫表現。","C":"正解(最不可能)。肺氣腫FEV1/FVC 應<70%，>80% 不符。","D":"氣陷使RV 增加，是肺氣腫表現。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"112180-N3-37":{"quick":"COPD 護理首要(ABC)=「呼吸道清除功能失效」(B)。","detail":{"background":"依護理優先順序(ABC、生理需求優先)，COPD 病人最優先處理的護理診斷是「呼吸道清除功能失效(ineffective airway clearance)」——分泌物滯留、氣道阻塞直接威脅氣體交換與生命，需立即處理(排痰、支氣管擴張、氧療)。活動無耐力、自我照顧缺失、調適障礙重要但屬較次要、非立即危及生命，故排在後面。","options":{"A":"自我照顧能力缺失非立即危及生命，非最優先。","B":"正解。呼吸道清除功能失效直接威脅氣體交換，最優先。","C":"活動無耐力屬次要，非最優先。","D":"調適障礙屬心理社會問題，優先序最低。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"113030-N3-36":{"quick":"COPD 飲食：1進食時氧氣面罩改鼻導管＋2選易咀嚼食物→正確12。","detail":{"background":"COPD 進食衛教：1「進食時可將氧氣『面罩』換成鼻導『管(套管)』」——面罩會妨礙進食，改鼻導管可邊用氧邊進食、減少進食時缺氧，正確；2「選擇易咀嚼食物」減少咀嚼耗氧與呼吸困難，正確。錯誤者：3 應「減少」碳水化合物(產CO2 多)，非增加；4 應「補充足夠水分」稀釋痰液，非減少。故正確組合為1＋2。","options":{"A":"正解。12＝進食時改鼻導管給氧＋選易咀嚼食物。","B":"13 含「增加碳水化合物」錯誤。","C":"24 含「減少水分」錯誤。","D":"34 兩項皆錯(增醣、限水)。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"113100-N3-35":{"quick":"肺氣腫過度充氣→叩診「過度反響音」；「叩診濁音」不是其表現(C)。","detail":{"background":"肺氣腫因肺泡過度充氣、含氣量增加，身體評估：視診胸廓前後徑增加呈「桶狀胸」、聽診呼吸音「減弱」、觸診觸覺震顫「減弱」(過度含氣傳音差)、叩診呈「過度反響音(hyperresonance)」。選項C「叩診濁音」是「實質化/積液」(如肺炎、肋膜積水)的表現，「不是」肺氣腫的評估結果。","options":{"A":"肺氣腫呼吸音減弱，是其評估結果。","B":"桶狀胸(前後徑增加)是肺氣腫表現。","C":"正解(不是肺氣腫表現)。肺氣腫叩診為「過度反響音」，濁音見於實質化/積液。","D":"過度含氣使觸覺震顫減弱，是肺氣腫表現。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"113180-N3-36":{"quick":"COPD 喘不可貿然調高氧→正面回應家屬並解釋「高濃度氧反會抑制呼吸」(C)。","detail":{"background":"CO2 滯留型COPD 病人的呼吸驅動部分依賴低血氧，若家屬要求把氧調高、給高濃度氧，會抑制呼吸驅動造成CO2 麻醉、呼吸更困難甚至呼吸停止。護理師應以「同理但正確衛教」回應——肯定家屬感受，並說明高濃度氧反而會抑制病人呼吸；同時評估病人狀況、依醫囑處理。選項C 同時做到同理與正確衛教，最適當。A 否定家屬感受、B 擅自給100% 氧危險、D 平躺休息不當。","options":{"A":"否定、責怪家屬「太緊張」，缺乏同理且未處理問題，不適當。","B":"擅自改非再呼吸面罩給100% 氧，對CO2 滯留型COPD 危險。","C":"正解。同理家屬感受並正確衛教「高濃度氧反會抑制呼吸」。","D":"平躺不利呼吸、且未解決問題，不適當。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"114100-N3-36":{"quick":"COPD 護理最適當=「少量多餐」(C)。","detail":{"background":"COPD 護理指導：①飲食「少量多餐」、易咀嚼，減少腹脹壓迫橫膈與進食耗氧②減少碳水化合物(產CO2 多)、足夠蛋白質與適度脂肪③活動應「循序漸進、避免飯後立即運動」(餐前走半小時、餐後馬上運動都不適當，易加重呼吸困難)④氧療採「低流量」(高流量氧對CO2 滯留型COPD 危險)。四選項中最適當為「少量多餐」。","options":{"A":"餐前走路半小時不適當，活動應避免接近用餐、循序漸進。","B":"應「減少」碳水化合物(產CO2 多)，增加錯誤。","C":"正解。少量多餐減少橫膈壓迫與進食耗氧，最適當。","D":"高流量氧對CO2 滯留型COPD 危險，不可給高流量氧。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"114170-N3-35":{"quick":"肺心症(右心衰)應「限水」，鼓勵每日飲水2500 c.c. 最不適當(A)。","detail":{"background":"肺心症(右心衰竭)病人有體液鬱積，需「限制水分與鈉」。協助清除呼吸道分泌物可用胸部叩擊震顫、深呼吸與有效咳嗽、支氣管擴張劑等。但「鼓勵每日飲水至少2500 c.c.」對「合併右心衰的肺心症」病人會加重體液負荷與水腫，最不適當。(對照：單純痰黏無心衰者才鼓勵多補水；本題情境為肺心症故需限水。)","options":{"A":"最不適當(本題選此)。肺心症右心衰應限水，不宜鼓勵大量飲水。","B":"胸部叩擊、震顫鬆動分泌物，適當。","C":"教導深呼吸、咳嗽促進排痰，適當。","D":"給支氣管擴張劑改善氣道、利於排痰，適當。"},"sources":["新文京《內外科護理學》呼吸系統—慢性阻塞性肺疾病","GOLD 2019 慢性阻塞性肺疾病指引"]}},"101030-N3-68":{"quick":"胸腔放液(穿刺)採「坐直、雙手趴於床上桌」的姿勢。","detail":{"background":"胸腔穿刺放液術(thoracentesis)時，病人最佳姿勢是「坐直、身體略前傾，雙手與頭趴在跨床桌(over-bed table)上」——使肋間隙張開、橫膈下降、積液沉積於肺底後外側，利於進針抽液且降低傷及肺臟與血管的風險。若病人無法坐起，可採健側臥、患側在上、床頭抬高。穿刺後監測氣胸、出血、復張性肺水腫等併發症。","options":{"A":"俯臥平躺無法張開肋間隙、不利進針，不適當。","B":"正解。坐直、雙手趴於床上桌，使肋間隙張開利於放液。","C":"此擺位主要用於從患側引流的特定情況，非標準放液姿勢。","D":"頭低腳高不利積液沉積與進針，不適當。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"101110-N3-23":{"quick":"本題送分：車禍後一側呼吸音變小、吸吮傷口聲、奇異呼吸都可能提示氣胸/胸傷。","detail":{"background":"本題經評定為「送分(全給分)」。車禍胸部外傷後可能出現氣胸或合併傷的多種徵象：「一側呼吸音變小或消失」(氣胸/血胸)、「呼吸時有吸吮聲(sucking)」(開放性氣胸、胸壁穿透傷使空氣經傷口進出)、「奇異性呼吸(連枷胸時連枷段吸氣內陷、吐氣外突)」等。各選項分別對應不同的胸部創傷狀況，故全部給分。臨床上胸部鈍/穿刺傷後出現上述任一徵象都應警覺氣胸或嚴重胸傷，立即評估與處理。","options":{"A":"一側呼吸音變小可見於氣胸/血胸，屬可疑徵象。","B":"兩側喘鳴較屬氣道狹窄(氣喘)，本題仍給分。","C":"呼吸時吸吮聲提示開放性(穿透性)氣胸。","D":"胸廓逆行性(奇異)呼吸運動見於連枷胸。(本題全選項給分)"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"101110-N3-26":{"quick":"胸管「持續冒大量氣泡」代表持續漏氣/氣胸→立即通知醫師(C)。","detail":{"background":"胸腔水下引流系統中，水封瓶(或抽吸控制瓶)出現「持續性大量氣泡」代表肺臟或管路持續漏氣(air leak)，肺葉切除術後若如此，提示可能有持續漏氣/氣胸或系統漏氣，須評估並「立即通知醫師」處理。不可貿然調高抽吸壓力或自行更換組件掩蓋問題；亦非正常現象可放任觀察。(註：抽吸控制瓶的「規律」氣泡代表抽吸壓力存在，但「水封瓶持續大量氣泡」屬異常漏氣。)","options":{"A":"調高抽吸壓力無法解決漏氣，且可能造成傷害。","B":"更換組件不能處理肺/管路漏氣的根本問題。","C":"正解。持續大量氣泡提示持續漏氣/氣胸，需立即通知醫師。","D":"持續大量漏氣非正常現象，不可僅觀察。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"101110-N3-40":{"quick":"胸管引流「1 小時內血水≥約100–200 c.c. 以上」(本題400)須立即通知醫師。","detail":{"background":"放胸管後若引流出「大量、快速的血水」(一般以每小時>100 mL 持續數小時，或單次大量如本題1 小時400 c.c.)，提示活動性出血(如血胸再出血、血管損傷)，須「立即通知醫師」評估是否需手術止血。其餘現象多屬正常或可處理：水下引流瓶內隨呼吸冒少量氣泡可能(初期氣胸排氣)、吸氣疼痛常見、長玻管液面「無上下浮動」反而提示管路阻塞或肺已復張(需檢查而非一定緊急)。本題以「1 小時內引流400 c.c. 血水」最需立即通報。","options":{"A":"初期少量氣泡可能為排氣，非最緊急(大量持續才異常)。","B":"正解。1 小時內引流出400 c.c. 血水提示活動性出血，須立即通知醫師。","C":"用力吸氣疼痛常見，非立即危急。","D":"液面無浮動需檢查阻塞/復張，但非如大出血般立即危及生命。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"102030-N3-57":{"quick":"胸管「大量氣泡」=漏氣/氣胸→優先「通知醫師」(D)；疼痛則給止痛劑(C)亦給分。","detail":{"background":"左上肺葉切除術後，胸管引流出「大量氣泡」代表持續漏氣(air leak)、可能氣胸或系統漏氣，是須優先處理的異常——應「通知醫師」並檢查系統。本題為多重答案：通知醫師(D，處理漏氣)與依醫囑給止痛劑(C，緩解傷口疼痛以利深呼吸咳嗽)皆給分。不可「擠壓胸管移除血塊」(可能造成負壓傷害，現多不建議常規擠壓)，深呼吸咳嗽雖重要但在發現大量漏氣時非最優先。","options":{"A":"深呼吸咳嗽重要，但發現大量漏氣時非最優先。","B":"常規擠壓胸管可能產生過大負壓傷害，現多不建議。","C":"給止痛劑緩解傷口疼痛以利咳嗽深呼吸，為正確措施(本題給分)。","D":"正解之一。大量氣泡提示漏氣/氣胸，應優先通知醫師處理。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"102030-N3-58":{"quick":"自發性氣胸好發「年輕瘦高男性」，「好發老年人」為錯誤(A)。","detail":{"background":"原發性自發性氣胸(primary spontaneous pneumothorax)好發於「年輕、瘦高體型、男性、抽菸者」，機轉是肺尖部的氣泡(bleb/bulla)自發破裂使空氣進入肋膜腔，並有家族遺傳傾向。故「好發於老年人」是錯誤敘述(老年人多為續發性氣胸，與COPD 等肺病有關)。瘦高、抽菸史、家族史皆為其特徵。","options":{"A":"錯誤(本題選此)。原發自發性氣胸好發「年輕瘦高男性」，非老年人。","B":"瘦高體型是其典型特徵，正確。","C":"抽菸是危險因子，正確。","D":"有家族遺傳傾向，正確。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"102110-N3-42":{"quick":"滲出液特徵=Rivalta(+)(2)＋蛋白>3 g/dL(3)→正確23。","detail":{"background":"肋膜積液分「漏出液(transudate)」與「滲出液(exudate)」。滲出液多由「發炎、感染、腫瘤」造成微血管通透性增加，特徵：「比重>1.018(非<1.015)、蛋白質>3 g/dL、Rivalta 試驗陽性、LDH 高、細胞數多(含紅白血球可增加)」。漏出液則由靜水壓上升或膠體滲透壓下降(心衰、肝腎)造成，比重<1.015、蛋白<3、Rivalta 陰性。題目2(Rivalta 陽性)、3(蛋白>3)為滲出液特徵，1(比重<1.015)、4(紅血球正常)不符。故正確為23。","options":{"A":"12 含「比重<1.015」屬漏出液，不符滲出液。","B":"14 兩項皆非滲出液特徵。","C":"正解。23＝Rivalta 陽性＋蛋白>3 g/dL，符合滲出液。","D":"34 含「紅血球正常」不符(滲出液細胞常增加)。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"103030-N3-55":{"quick":"胸腔術後「不可保持平躺」，應半坐臥並起身活動以利肺擴張(A 錯)。","detail":{"background":"胸腔手術後促進有效呼吸與咳嗽：①採「半坐臥(非平躺)」促進肺擴張、利於橫膈下降與引流②使用止痛劑緩解傷口疼痛以利深呼吸與有效咳嗽(疼痛會使病人不敢咳)③鼓勵早期下床活動促進肺復張、預防併發症④使用誘發性肺量計做深呼吸。故「儘量保持平躺以減少呼吸作功」是錯誤(平躺不利肺擴張與排痰)。","options":{"A":"錯誤(本題選此)。應採半坐臥促進肺擴張，平躺不利呼吸與排痰。","B":"用止痛劑緩解疼痛以利有效咳嗽，正確。","C":"鼓勵早期下床活動促進肺復張，正確。","D":"使用誘發性肺量計促進深呼吸、預防肺塌陷，正確。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"103030-N3-56":{"quick":"氣胸致縱膈移位→壓迫大靜脈使「右心回流減少」(A)。","detail":{"background":"張力性(或大量)氣胸使患側胸腔壓力上升、肺塌陷，並把「縱膈推向健側」，壓迫大靜脈(上下腔靜脈)與心臟，使「靜脈回流(右心回流)減少」→心輸出量下降、低血壓、頸靜脈怒張，是致命機轉。同時壓迫健側肺使其「容量『減少』」(非增加)。故正解為「右心血液回流減少」。","options":{"A":"正解。縱膈移位壓迫大靜脈，右心靜脈回流減少→心輸出量下降。","B":"肋膜腔感染非縱膈移位的直接後果。","C":"心包膜破裂非縱膈移位造成。","D":"健側肺受壓，容量「減少」而非增加。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"103100-N3-54":{"quick":"放在「第二肋間(較高處)」的胸管主要「排除空氣」。","detail":{"background":"胸管放置位置依物理特性：「空氣較輕往上聚」→排氣的胸管放「較高、前胸第二肋間(鎖骨中線)」；「液體(血水)較重往下積」→引流的胸管放「較低、腋中線第8–9 肋間」。故放在「第二肋間」的胸管主要目的是「排除肋膜腔內的空氣」。胸管的目的是排出氣/液、恢復肋膜腔「負壓」使肺復張，並非維持正壓或作為注藥管道。","options":{"A":"引流血水的是放在「較低」位置的胸管，非第二肋間。","B":"正解。第二肋間(較高)胸管主要排除肋膜腔空氣。","C":"胸管目的是恢復肋膜腔「負壓」，非維持正壓。","D":"胸管非注射藥物的管道。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"103100-N3-55":{"quick":"胸管與引流系統接頭鬆脫時，立即「以止血鉗夾住胸管」防空氣進入。","detail":{"background":"胸腔引流系統靠水封維持單向引流、防止空氣逆流入肋膜腔。若「胸管與引流系統的接頭鬆脫」，外界空氣可能經開口進入肋膜腔造成氣胸，立即處置是「以兩把止血鉗(無齒鉗)夾住靠近胸壁端的胸管」暫時阻斷，並儘速重新接回無菌系統或將管口浸入無菌生理食鹽水中(水封)。(註：若是『胸管整支脫出胸壁』則改以凡士林/封閉敷料覆蓋傷口。)採自然引流或僅膠布固定無法阻止空氣逆入。","options":{"A":"採自然引流仍可能讓空氣逆入肋膜腔，不安全。","B":"以紗布封住「胸壁傷口」是「胸管整支脫出」時的做法；本題是「接頭鬆脫」應先夾管。","C":"正解。接頭鬆脫應立即以止血鉗夾住胸管，防空氣逆入，再重接系統。","D":"僅以膠布固定無法阻斷空氣逆流。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"104030-N3-55":{"quick":"皮下氣腫=觸診胸管周圍皮膚有「輾軋音(crepitus，捻髮感)」。","detail":{"background":"皮下氣腫(subcutaneous emphysema)是空氣滲入皮下組織，常見於胸管周圍或胸部外傷/氣胸後。評估方法是「觸診」皮膚，會摸到像踩雪/捏氣泡的「輾軋音(crepitus、捻髮感)」，皮膚摸起來如海綿狀並有爆裂感。輕微者觀察、嚴重(蔓延至頸臉、壓迫氣道)需處理。故評估皮下氣腫用「觸診皮膚是否有輾軋音」。","options":{"A":"比較吸吐氣時間是評估呼吸型態，與皮下氣腫無關。","B":"桶狀胸是慢性肺氣腫的視診表現，非皮下氣腫。","C":"正解。觸診胸管周圍皮膚有輾軋音(crepitus)即皮下氣腫。","D":"鼾音/乾囉音是氣道分泌物的聽診聲，非皮下氣腫評估法。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"104030-N3-56":{"quick":"開胸術後兩條胸管：「低位引流血水、高位引流氣體」(C)。","detail":{"background":"開胸切除肺葉後常放兩條胸管，依空氣/液體物理特性分工：「位置較低(腋中線第8–9 肋間)的胸管引流『液體(血水)』」、「位置較高(前胸第二肋間)的胸管引流『氣體(空氣)』」，兩者共同恢復肋膜腔負壓使剩餘肺復張。並非「同時引流血水」、也非一主一備、也非引流不同部位血水。故正確為「低位引血水、高位引氣體」。","options":{"A":"兩條胸管是分工排氣/排液，非單純因血水多而並行。","B":"兩管分別排「氣」與「液」，非引流不同部位血水。","C":"正解。位置較低引流血水、位置較高引流氣體。","D":"兩管各司其職(排液、排氣)，非主管與備用關係。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"104030-N3-58":{"quick":"滲出性肋膜積水：色較深、蛋白>3 g/dL、比重>1.018(C)。","detail":{"background":"肋膜積水分型：「漏出液」由靜水壓上升或膠體滲透壓下降(心衰、肝硬化、腎病)造成，色清澈淡黃、蛋白<3 g/dL、比重<1.015、Rivalta 陰性；「滲出液」由「發炎、感染、腫瘤」使微血管通透性增加造成，色較深混濁、蛋白>3 g/dL、比重>1.018、Rivalta 陽性、細胞多。積水區「觸覺震顫『減弱』」(液體阻隔傳音)非增強。故正確為C(滲出液特徵)。","options":{"A":"積水區觸覺震顫「減弱」，非增強。","B":"微血管滲透壓減少/淋巴回流增加偏向「漏出液」機轉，且描述不完整。","C":"正解。滲出性積水色深、蛋白>3 g/dL、比重>1.018。","D":"漏出液由靜水壓/膠體滲透壓改變所致，「發炎病變」是滲出液機轉，敘述錯誤。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"105030-N3-57":{"quick":"胸腔水下引流正常=水封瓶玻管「液面隨呼吸上下移動(tidaling)」(C)。","detail":{"background":"胸腔水下引流系統正常運作的指標：①水封瓶長玻管內「液面隨呼吸上下移動(tidaling)」——反映肋膜腔內壓隨呼吸變化、管路通暢、肺尚未完全復張(自然呼吸時吸氣上升、呼氣下降；用呼吸器則相反)②「持續性」氣泡屬異常(漏氣)，非正常③不可任意夾管(會使氣/液積在肋膜腔造成張力性氣胸)④水封瓶的無菌水不需每天更換(維持密閉系統)。故正確為「玻管液面隨呼吸上下移動」。","options":{"A":"「持續性」氣泡代表漏氣，是異常而非正常。","B":"不可任意夾管，會使氣液積聚造成張力性氣胸。","C":"正解。玻管液面隨呼吸上下移動(tidaling)是引流正常的指標。","D":"維持密閉系統，水封瓶的水不需每天更換。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"105090-N3-54":{"quick":"「感染」造成的肋膜積水多為「滲出性(exudative)」。","detail":{"background":"感染(如肺炎旁積液、膿胸、結核)造成的肋膜積水是因「發炎使微血管通透性增加」，蛋白與細胞滲出，屬「滲出性(exudative)」積液——蛋白>3 g/dL、比重>1.018、LDH 高、Rivalta 陽性，外觀常混濁、可含膿。漏出性則由靜水壓/膠體滲透壓改變(心衰、肝腎)造成、清澈。故感染性積水屬滲出性。","options":{"A":"漏出性由靜水壓/膠體滲透壓改變所致(心衰、肝腎)，非感染。","B":"正解。感染造成的積水屬滲出性(exudative)。","C":"清澈淡黃多為漏出液外觀，感染性多混濁。","D":"淋巴球為主多見於結核或乳糜胸等特定情況，非「感染積水」的一般定義性質。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"106030-N3-55":{"quick":"連枷胸治療重點在「肺部再擴張」與穩定胸壁、改善換氣(D)。","detail":{"background":"連枷胸(flail chest)是「相鄰多根肋骨各有兩處以上骨折」，使一段胸壁游離(連枷段)失去連續性，出現「奇異性(逆行性)呼吸」——吸氣時連枷段「向內塌陷」、吐氣時「向外膨出」，與正常胸壁相反，造成通氣無效、低血氧、死腔增加。常合併下方肺挫傷。治療重點為「促進肺部再擴張、改善換氣與氧合」(止痛、肺部物理治療、必要時正壓通氣『內固定』穩定胸壁、嚴重者手術固定)。","options":{"A":"是「肋骨(骨骼)多處骨折」造成，非單純胸腔肌肉創傷。","B":"連枷胸因疼痛與不穩多呈「淺而快」呼吸，非深慢。","C":"連枷段吸氣時「向內塌陷」，非向外膨出。","D":"正解。治療著重肺部再擴張、穩定胸壁與改善換氣。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"106110-N3-56":{"quick":"胸腔放液後不需監測「凝血功能變差」；要監測氣胸/復張性肺水腫/低血壓(A)。","detail":{"background":"胸腔穿刺放液術後的併發症監測：①「氣胸」(穿刺傷及肺臟)②「復張性肺水腫」(一次抽液過多使肺快速復張)③「低血壓/血管迷走反應」④出血、感染。「凝血功能變差」並非放液術『後』要監測的併發症(凝血異常是穿刺『前』要評估的風險因子，而非術後產生的併發症)。故不包括者為「凝血功能變差」。","options":{"A":"正解(不包括)。凝血功能是術前評估風險，非放液術後產生的併發症。","B":"氣胸是穿刺常見併發症，需監測。","C":"一次放液過多可致復張性肺水腫，需監測。","D":"放液可能引發低血壓/迷走反應，需監測。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"106111-N3-55":{"quick":"氣胸放胸管的目的=「移除肋膜腔中的氣體」使肺復張(C)。","detail":{"background":"氣胸是空氣積在肋膜腔、破壞負壓使肺塌陷。放胸管的目的是「把肋膜腔內的『空氣』排出、恢復負壓使肺復張」(胸管接水下引流，必要時負壓抽吸)。對「血胸/積液」則是引流液體。故氣胸放胸管的目的是「移除肋膜腔中的氣體」，而非監測出血、監測肺功能或引流液體(後者是針對積液)。","options":{"A":"監測出血非氣胸放胸管的主要目的(那較針對血胸的引流量)。","B":"胸管非用於監測肺功能。","C":"正解。氣胸放胸管是為移除肋膜腔中的氣體、使肺復張。","D":"引流液體是針對積液/血胸；氣胸主要排「氣」。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"106111-N3-56":{"quick":"傷口周圍皮膚「海綿狀＋爆裂音」=皮下氣腫(A)。","detail":{"background":"肺葉切除術後若評估到「傷口周圍皮膚像海綿狀、按壓有爆裂音(crepitus、捻髮感)」，代表空氣滲入皮下組織，即「皮下氣腫(subcutaneous emphysema)」——常因胸管周圍漏氣或肺漏氣使空氣外滲。輕微者觀察、嚴重蔓延須通報處理。此觸診捻髮感是皮下氣腫的標誌，與肋膜積水(液體)、氣胸(肺塌陷徵象)、連枷胸(奇異呼吸)不同。","options":{"A":"正解。皮膚海綿狀＋爆裂音(捻髮感)是皮下氣腫的典型表現。","B":"肋膜積水是肋膜腔積液，無皮膚捻髮感。","C":"氣胸表現為患側呼吸音減弱、過度反響音，非皮膚捻髮感。","D":"連枷胸表現為奇異性呼吸，非皮膚捻髮感。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"106111-N3-57":{"quick":"水封瓶玻管液面「隨呼吸上下移動(tidaling)」=引流功能正常(C)。","detail":{"background":"胸腔水下引流系統中，水封瓶長玻管內「液面隨呼吸上下移動(tidaling/oscillation)」是「引流功能正常、管路通暢」的指標，反映肋膜腔內壓隨呼吸週期變化。若液面「不再波動」可能是管路阻塞、扭結或肺已完全復張。連續性氣泡才代表漏氣。故液面隨呼吸上下移動代表「胸管引流功能正常」。","options":{"A":"液面「停止」波動才可能是阻塞；隨呼吸波動是正常。","B":"皮下氣腫以皮膚捻髮感評估，與玻管液面波動無關。","C":"正解。液面隨呼吸上下移動代表引流功能正常。","D":"漏氣的指標是「連續性氣泡」，非液面正常波動。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"107030-N3-53":{"quick":"水封瓶「大量氣泡」=漏氣→先「檢查引流系統有無漏氣處」(C)。","detail":{"background":"胸腔術後若水封瓶出現「大量氣泡」，代表系統有漏氣(air leak)，來源可能是「病人端(肺持續漏氣)」或「系統端(接頭鬆脫、管路破損)」。正確處置是「由近病人端往引流瓶端依序檢查管路各連接處是否密合/破損」找出漏氣點，必要時通知醫師。不可扭擠胸管、不可隨意減壓掩蓋問題、更非功能完好可不處理。故先「檢查引流系統有無漏氣處」。","options":{"A":"扭擠(夾)胸管會使氣液積聚、造成張力性氣胸，不當。","B":"減少抽吸壓力無法解決漏氣根本問題。","C":"正解。大量氣泡提示漏氣，先檢查引流系統各連接處是否漏氣。","D":"大量氣泡是漏氣異常，非功能完好可不處置。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"107110-N3-53":{"quick":"肺氣腫病人自發性氣胸最可能原因=「肺尖氣泡(bleb)破裂」(D)。","detail":{"background":"續發性自發性氣胸常見於肺氣腫(COPD)病人——肺泡壁破壞形成的肺尖「氣泡(bleb/bulla)」在咳嗽、用力或自發情況下「破裂」，使空氣由肺漏入肋膜腔造成氣胸，故突然呼吸短促。最可能原因是「肺臟頂端的氣泡破裂」。氣管食道瘻管、肋膜摩擦瘻管、胸壁穿刺傷皆非肺氣腫自發性氣胸的機轉。","options":{"A":"氣管食道瘻管與自發性氣胸無關。","B":"「肋膜摩擦間瘻管」非自發性氣胸機轉。","C":"胸壁穿刺傷是「外傷性(開放性)」氣胸，非「自發性」。","D":"正解。肺尖氣泡(bleb)破裂使空氣漏入肋膜腔，是肺氣腫自發性氣胸主因。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"108020-N3-53":{"quick":"連枷胸會造成「奇異性(逆行性)呼吸」(B)。","detail":{"background":"連枷胸因相鄰多肋多處骨折，游離的連枷段隨胸腔內壓而非隨肌肉運動，產生「奇異性呼吸」——吸氣時(胸腔負壓增大)連枷段「向內塌陷」、吐氣時「向外突出」，與正常胸壁相反，使有效通氣下降、死腔「增加」、低血氧。故正確為「會造成奇異性呼吸」。其餘敘述錯誤：死腔「增加」非減少；連枷段運動方向與D 所述相反。","options":{"A":"連枷胸使死腔「增加」，非減少。","B":"正解。連枷胸造成奇異性(逆行性)呼吸。","C":"胸腔吸氣時為「負壓」；此敘述對連枷胸機轉描述不正確。","D":"連枷段是「吸氣內陷、吐氣外突」，與此選項所述相反。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"108020-N3-54":{"quick":"氣胸患側=肺塌陷→「聽診呼吸音消失」(D)。","detail":{"background":"氣胸時患側肺塌陷、肋膜腔充氣，患側理學評估：「聽診呼吸音減弱或消失」、叩診「過度反響音(非濁音)」、觸覺震顫「減弱(非增強)」、患側胸廓擴張減少、嚴重者氣管偏向健側。濕囉音見於肺泡積液(肺炎/肺水腫)、非氣胸。故患側最可能發現為「呼吸音消失」。","options":{"A":"氣胸叩診為「過度反響音」，非濁音(濁音見於積液/實質化)。","B":"氣胸患側觸覺震顫「減弱」，非增強。","C":"濕囉音見於肺泡積液(肺炎/肺水腫)，非氣胸。","D":"正解。氣胸患側肺塌陷，聽診呼吸音消失。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"108020-N3-55":{"quick":"水封瓶「持續小量氣泡」→先檢查「各連接處是否密合(找漏氣)」(B)。","detail":{"background":"胸腔水下引流系統若觀察到水封瓶「持續有小量氣泡」，提示系統可能有漏氣(air leak)。正確處置是「由病人端往引流瓶端逐一檢查管路各連接處是否密合、有無破損」以找出並排除漏氣來源；若連接皆密合而仍持續冒泡，則可能是病人端(肺)持續漏氣，需通報。不可當作正常放任、不可隨意倒掉水封瓶的水、減壓也無法解決漏氣根本。","options":{"A":"持續氣泡提示漏氣，非正常現象，不可僅觀察。","B":"正解。先檢查引流裝置各連接處是否密合，找出漏氣來源。","C":"減少抽吸壓力不能解決漏氣根本問題。","D":"倒掉水封瓶的水會破壞水封、使空氣逆入，危險錯誤。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","BTS Pleural Disease Guideline"]}},"108110-N3-50":{"quick":"叩診濁音＋呼吸音減弱＋肋膜橫膈角變鈍=「肋膜積水」(C)。","detail":{"background":"右下肺叩診「濁音」、聽診呼吸音「減弱」、胸部X 光「右側肋膜橫膈角(costophrenic angle)變鈍」是「肋膜積水」的典型組合——液體聚積在肋膜腔底部使該區傳音差(濁音、呼吸音減弱)，X 光上液體填滿肋膜橫膈角使其由銳角變鈍角。對照：肺炎(實質化)也有濁音但震顫『增強』且X 光為浸潤；氣胸為過度反響音、呼吸音消失；腫瘤多為腫塊影。故最可能為肋膜積水。","options":{"A":"肺炎實質化雖濁音，但觸覺震顫增強、X 光為肺浸潤，與肋膜橫膈角變鈍不同。","B":"氣胸為過度反響音、呼吸音消失，非濁音。","C":"正解。濁音＋呼吸音減弱＋肋膜橫膈角變鈍＝肋膜積水。","D":"腫瘤多呈腫塊影，非肋膜橫膈角變鈍的積水表現。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"108110-N3-53":{"quick":"兩條胸管：「前胸第二肋間排氣、腋中線第8–9 肋間排液」(C)。","detail":{"background":"肺葉切除後兩條胸管依空氣/液體物理特性放置：「空氣輕往上」→排氣管放「前胸(鎖骨中線)第二肋間(較高、前方)」；「液體重往下」→引流管放「腋中線第8–9 肋間(較低、後外側)」。故正確敘述為「一支置於胸前第二肋間引流空氣，另一支置於腋中線第8–9 肋間引流肋膜腔下方的液體」。其餘選項把排氣/排液的位置或前後對應弄反。","options":{"A":"把「第二肋間引流液體」對應錯誤(第二肋間應排氣)。","B":"「腋中線第二肋間排空氣」位置敘述不正確。","C":"正解。胸前第二肋間排氣、腋中線第8–9 肋間排液。","D":"把第二肋間對應成排液、低位對應排氣，方向相反。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"109030-N3-52":{"quick":"肋骨骨折=「呼吸較淺、吸氣時疼痛加劇」(C)。","detail":{"background":"外傷性肋骨骨折因骨折端隨呼吸移動牽扯，「吸氣(胸廓擴張)時疼痛加劇」，病人為避痛而採「淺而快」的呼吸並不敢深呼吸咳嗽，易導致分泌物滯留、肺塌陷與肺炎。故典型表現為「較淺的呼吸型態，且吸氣時疼痛加劇」。護理重點為「止痛」(使能深呼吸咳嗽)、鼓勵深呼吸與肺部清潔，避免綁緊胸廓限制擴張。","options":{"A":"肋骨骨折多「淺而快」呼吸，非慢而深。","B":"疼痛在「吸氣(胸廓擴張)」時加劇，非吐氣。","C":"正解。呼吸較淺、吸氣時疼痛加劇。","D":"喟嘆式呼吸、飯後痛非肋骨骨折表現。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"109110-N3-53":{"quick":"張力性氣胸=「單側呼吸音減弱(/消失)」並氣管偏向健側(B)。","detail":{"background":"張力性氣胸是空氣只進不出、肋膜腔壓力持續上升的「急症」：患側肺完全塌陷、「單側呼吸音減弱或消失」、患側過度反響音、氣管與縱膈被推向「健側」、頸靜脈怒張、低血壓、呼吸窘迫，須立即「針刺減壓」。故臨床表徵為「單側呼吸音減弱」。吐氣喘鳴(氣道病)、單側積水、吸氣單側下陷(連枷胸)皆非張力性氣胸。","options":{"A":"吐氣喘鳴是氣道狹窄(氣喘)，非氣胸。","B":"正解。張力性氣胸患側呼吸音減弱/消失。","C":"張力性氣胸是肋膜腔積「氣」，非積水。","D":"吸氣時單側不正常下陷是連枷胸的奇異呼吸，非張力性氣胸。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"109110-N3-58":{"quick":"突發胸痛＋患側起伏小＋氣管偏向健側＋過度反響音=「氣胸」(B)。","detail":{"background":"打籃球時「突然」左胸尖銳疼痛、左胸起伏較小、氣管偏向「右(健)側」、左側呼吸音減弱、叩診「過度反響音」——這組合是典型「(張力性)氣胸」：年輕人運動時肺尖氣泡破裂自發性氣胸，患側肺塌陷使呼吸音減弱、含氣過多致過度反響音，張力升高把氣管推向健側。故最可能為氣胸。連枷胸需外力多肋骨折、肺炎為濁音、肺栓塞無過度反響音與氣管偏移。","options":{"A":"連枷胸需多根肋骨多處骨折(外傷)，表現為奇異呼吸，非此情境。","B":"正解。突發胸痛、患側起伏小、氣管偏健側、過度反響音＝氣胸。","C":"肺炎叩診為濁音、無氣管偏移，與過度反響音不符。","D":"肺栓塞無「過度反響音與氣管偏移」此類氣胸徵象。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"109110-N3-59":{"quick":"奇異性呼吸(paradoxical respiration)見於「連枷胸」(B)。","detail":{"background":"奇異性(逆行性)呼吸——胸壁某段在吸氣時「向內塌陷」、吐氣時「向外突出」，與正常胸壁相反——是「連枷胸」的特徵性表現，因相鄰多肋多處骨折使該段胸壁游離、隨胸內壓而非肌肉運動。張力性氣胸表現為患側呼吸音消失與氣管偏移、急性呼吸衰竭與肺高壓無此奇異胸壁運動。故答案為連枷胸。","options":{"A":"張力性氣胸表現為患側呼吸音消失、氣管偏移，非奇異呼吸。","B":"正解。連枷胸出現奇異性(逆行性)呼吸。","C":"急性呼吸衰竭無特異的奇異胸壁運動。","D":"肺高壓症不會出現奇異性呼吸。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"110030-N3-52":{"quick":"車禍後一側無呼吸音＋氣管偏移=張力性氣胸→立即「胸部針刺減壓」(C)。","detail":{"background":"車禍胸部外傷後「一側聽不到呼吸音、氣管偏向對側」是「張力性氣胸」的徵象——空氣只進不出使患側壓力暴增、肺塌陷、縱膈與大靜脈受壓致心輸出量下降，是會迅速致命的急症。最適當的「立即」處置是「胸部針刺減壓(於患側第二肋間鎖骨中線插粗針釋放壓力)」，再放胸管。此時優先解除張力，而非先抽血培養、先做ABG 或在尚有脈搏時就CPR。","options":{"A":"抽血培養非此急症的立即處置。","B":"若仍有循環，優先針刺減壓解除張力，而非直接CPR。","C":"正解。張力性氣胸須立即胸部針刺減壓解除壓力。","D":"ABG 是評估而非救命處置，不可延誤減壓。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"110030-N3-53":{"quick":"胸管接負壓引流時，抽吸控制瓶用「持續性抽吸」(D)。","detail":{"background":"胸管照護正確原則：①「負壓引流時，抽吸控制瓶採『持續性』抽吸」維持穩定負壓促進排氣排液與肺復張②不可常規夾管(間歇夾管會使氣液積在肋膜腔→張力性氣胸)③水封瓶「持續大量氣泡」是漏氣『異常』，非正常④鼓勵活動(可下床攜帶引流瓶，不需過度限制，但須保持引流瓶低於胸部、勿傾倒)。故正確為「負壓引流時抽吸控制瓶持續性抽吸」。","options":{"A":"不需嚴格限制活動，可在保護下下床活動。","B":"不可間歇夾管，會使氣液積聚造成張力性氣胸。","C":"水封瓶大量氣泡是漏氣異常，非正常。","D":"正解。負壓引流時抽吸控制瓶採持續性抽吸。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"110110-N3-53":{"quick":"胸腔放液後「血氧88%」最需緊急處理(可能氣胸/復張性肺水腫)(B)。","detail":{"background":"胸腔放液後最需「緊急處理」的是「周邊血氧88%」——提示可能發生氣胸或復張性肺水腫等併發症造成氧合下降，須立即評估呼吸、給氧、通知醫師。相對地，疼痛5 分、血壓156/88、平躺呼吸24 次/分雖需追蹤，但不如低血氧危急。處置優先以ABC(氣道/呼吸/循環)為準，氧合異常最優先。","options":{"A":"疼痛5 分需處理但非立即危及生命。","B":"正解。血氧88% 提示氧合惡化(氣胸/復張性肺水腫)，最需緊急處理。","C":"血壓156/88 略高，非最緊急。","D":"呼吸24 次/分略快，需觀察但不如低血氧危急。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"110110-N3-56":{"quick":"一次放液過多(>約1000–1500 c.c.)易致「復張性肺水腫」(C)。","detail":{"background":"胸腔放液一次抽出過多液體(一般建議單次不超過1000–1500 mL)，會使長期受壓塌陷的肺「快速復張」，微血管通透性與壓力急遽改變，造成「復張性肺水腫(re-expansion pulmonary edema)」，表現為咳嗽、呼吸困難、低血氧。故一次放液超過約1200 c.c. 可能發生肺水腫。血壓多「下降」(非急升)、不致高碳酸血症或肺纖維化。","options":{"A":"放液過多多致血壓「下降」，非急速上升。","B":"放液過多不會造成高碳酸血症。","C":"正解。一次放液過多使肺快速復張→復張性肺水腫。","D":"肺纖維化是慢性過程，非單次放液的急性併發症。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"111030-N3-59":{"quick":"胸腔術後深呼吸→「擴張肺泡、增加氣體交換表面積」(D)。","detail":{"background":"胸腔手術後鼓勵深呼吸(配合誘發性肺量計)的主要成效是「使塌陷的肺泡重新擴張、增加肺泡參與氣體交換的表面積」，預防術後肺塌陷與肺炎、促進剩餘肺復張。它是「降低」橫膈使胸腔擴大(非提高橫膈)，不是直接增加肺血流，也不是為了防過度通氣。故正確為「擴張肺泡、增加氣體交換表面積」。","options":{"A":"深吸氣是橫膈「下降(降低)」使胸腔擴大，「提高橫膈」描述錯誤。","B":"深呼吸主要擴張肺泡，非直接增加肺部血流量。","C":"深呼吸目的是肺復張，非控制流速防過度通氣。","D":"正解。擴張肺泡、增加氣體交換表面積，預防肺塌陷。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"111110-N3-52":{"quick":"胸腔術後咳嗽：先「坐起並以枕頭壓住傷口」減痛護傷再咳(D)。","detail":{"background":"促進胸腔術後有效咳嗽：①先給「適當止痛」(時間上於咳嗽前讓藥效達高峰，非死板隔2 小時或6 小時)②採「坐起」姿勢③以「枕頭或手按壓(夾抱)傷口(splinting)」支托胸壁、減痛並提升咳嗽效率④深吸氣後用力咳。選項中最適當的是「咳嗽前請病人坐起且以枕頭壓住傷口」。深呼吸後不需隔6 小時才咳、不需固定喝500 mL 水、止痛時機應配合藥效非死板隔2 小時。","options":{"A":"深呼吸後應接著有效咳嗽，不需隔6 小時。","B":"止痛應配合藥效高峰時機，非死板「咳前2 小時」。","C":"不需固定咳前喝500 mL 水。","D":"正解。坐起並以枕頭壓住(夾抱)傷口，減痛護傷以利有效咳嗽。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"111110-N3-54":{"quick":"液面「隨呼吸上下浮動」代表引流『正常運作中』，不是「可拔管」的指標(A 錯)。","detail":{"background":"移除胸管的正確措施：①拔管前提前給止痛劑②拔管時請病人「深吸氣後閉氣(或吐氣末閉氣)」並做Valsalva，避免空氣於拔管瞬間吸入肋膜腔③拔管後立即以「無菌凡士林(密封)紗布」覆蓋傷口防空氣進入。可拔管的指標是「肺已復張、無漏氣、引流量少、液面波動停止或X 光確認」。「液面隨呼吸上下浮動」代表引流『仍在運作、肺尚未完全復張』，反而『不是』可拔管的依據，故A 為錯誤。","options":{"A":"錯誤(本題選此)。液面隨呼吸波動代表引流仍運作中，非「可拔管」的指標。","B":"拔管前提前給止痛劑，正確。","C":"拔管時請病人深吸氣後閉氣，避免空氣吸入，正確。","D":"拔管後以無菌凡士林紗布密封傷口，正確。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"112030-N3-51":{"quick":"拔胸管時請病人「深吸氣後閉氣(Valsalva)」防空氣吸入肋膜腔(D)。","detail":{"background":"協助拔除胸管時，為避免拔管瞬間空氣經管口被吸入肋膜腔造成氣胸，應指導病人「深吸氣後閉氣並用力(Valsalva 動作)」(或於吐氣末閉氣)，使肋膜腔維持正壓的瞬間迅速拔管並立即以凡士林密封敷料覆蓋。緩慢吸吐、哈氣、快速吸吐皆無法在拔管瞬間維持正壓防空氣逆入。故正確為「深吸氣後閉氣」。","options":{"A":"緩慢吸吐無法在拔管瞬間維持正壓防空氣逆入。","B":"哈氣(huffing)是排痰技巧，非拔管時的指導。","C":"快速吸吐無法穩定維持正壓。","D":"正解。深吸氣後閉氣(Valsalva)使肋膜腔正壓，防空氣吸入。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"112110-N3-51":{"quick":"氣胸剛接胸管，水封瓶「連續性氣泡」屬不正常(漏氣)(B)。","detail":{"background":"氣胸剛接上胸管時，水封瓶可能在「吐氣/咳嗽」時「間歇」冒泡(排出肋膜腔積氣，屬正常)；但「『連續性』氣泡」代表系統或肺有「持續漏氣(air leak)」，是『不正常』現象，須檢查連接處或評估肺漏氣。正常表現包括：長玻管置於液面下約2 公分、液面隨呼吸上下波動(自主呼吸時吸氣上升、呼氣下降)。故「連續性氣泡」為不正常。","options":{"A":"長玻管保持在液面下2–3 公分是正常設置。","B":"正解(不正常)。水封瓶「連續性」氣泡代表持續漏氣，屬異常。","C":"自主呼吸時吸氣肋膜腔負壓增大、液面上升，屬正常波動。","D":"呼氣時液面下降，屬正常的呼吸性波動。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"112110-N3-53":{"quick":"胸壁鈍傷後「呼吸音降低」提示可能肺挫傷(B)。","detail":{"background":"肺挫傷(pulmonary contusion)是胸壁鈍傷後肺實質出血水腫，常於受傷後數小時逐漸惡化，表現為「患側呼吸音降低、囉音、低血氧、咳血絲痰、X 光浸潤」。故胸壁鈍傷後「呼吸音降低」可提示肺挫傷。呼吸通常「加快」非緩慢、桶狀胸是慢性肺氣腫的視診、吸吮聲是「開放性氣胸」的特徵，皆非肺挫傷指標。","options":{"A":"肺挫傷多呼吸「加快」，非緩慢。","B":"正解。胸壁鈍傷後呼吸音降低提示肺挫傷。","C":"桶狀胸是慢性肺氣腫表現，非急性肺挫傷。","D":"受傷部位吸吮聲是「開放性氣胸」特徵，非肺挫傷。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"112110-N3-57":{"quick":"自發性氣胸患側「橫膈離軌度應減小」，「離軌度變大」為錯(D)。","detail":{"background":"單側自發性氣胸的身體檢查：吸氣時「胸廓兩側不對稱(患側起伏小)」、患側「觸覺震顫減弱」、患側叩診「過度反響音」、患側呼吸音減弱/消失。患側因肺塌陷與含氣，胸廓與「橫膈的移動度(離軌度 excursion)『減小』」而非變大。故「橫膈膜離軌度變大」是錯誤敘述。","options":{"A":"吸氣時胸廓兩側不對稱(患側起伏小)，正確。","B":"患側觸覺震顫減弱，正確。","C":"患側叩診過度反響音，正確。","D":"錯誤(本題選此)。患側橫膈離軌度應「減小」，非變大。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"112180-N3-34":{"quick":"胸管照護最適當=「鼓勵咳嗽和深呼吸」促進肺復張(C)。","detail":{"background":"左肺切除術後使用胸管，最適當的護理是「鼓勵咳嗽和深呼吸(配合誘發性肺量計)」促進剩餘肺復張、排出分泌物、預防肺塌陷與肺炎。不可「每班常規夾管」(會使氣液積聚→張力性氣胸)；不建議「常規每2 小時擠壓胸管」(產生過大負壓傷害)；監測水封瓶液面波動雖也是照護內容，但相較之下「鼓勵咳嗽深呼吸」是最積極促進復原的措施。","options":{"A":"監測液面波動是照護之一，但非最積極促進復原的措施。","B":"不可每班常規夾管，會造成氣液積聚、張力性氣胸。","C":"正解。鼓勵咳嗽和深呼吸，促進肺復張、預防併發症。","D":"常規每2 小時擠壓胸管會產生過大負壓傷害，不建議。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"113030-N3-34":{"quick":"胸腔放液最適姿勢=「坐床緣、頭手趴在床旁桌」(B)。","detail":{"background":"胸腔穿刺放液術的最佳體位是「坐於床緣，頭與雙手向前趴在床旁(跨床)桌上」——使背部肋間隙張開、橫膈下降、積液沉積肺底後外側，利於進針、減少傷及肺與血管。若無法坐起可採半坐臥、患側在上。床頭30 度仰臥、患側在下側臥、俯臥皆不利進針與積液定位。","options":{"A":"床頭30 度仰臥肋間隙張開不足，非最適放液姿勢。","B":"正解。坐床緣、頭手趴在床旁桌，使肋間隙張開利於放液。","C":"患側在下不利該側積液引流與進針。","D":"俯臥不利背部進針與積液定位。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"113180-N3-34":{"quick":"胸腔穿刺前最適當=採「坐床緣、頭手趴床旁桌」的姿勢(B)。","detail":{"background":"胸腔穿刺放液術『前』的護理，重點是擺好「坐於床緣、頭手趴在床旁桌」的姿勢以利進針與積液定位，並說明過程、簽署同意書、必要時局部麻醉。此檢查「不需」常規禁食4–6 小時、不需給Atropine(非氣管/眼科檢查)、也不需移除假牙眼鏡(非全身麻醉或內視鏡)。故最適當為「坐床緣、頭手趴在床旁桌」。","options":{"A":"胸腔穿刺不需常規給Atropine(非氣管鏡/手術前用藥情境)。","B":"正解。採坐床緣、頭手趴床旁桌的姿勢，利於進針放液。","C":"移除假牙、眼鏡是全身麻醉/內視鏡前準備，胸腔穿刺不需。","D":"胸腔穿刺不需常規禁食4–6 小時。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"114030-N3-32":{"quick":"車禍後「一側聽不到/減弱呼吸音」應懷疑氣胸(A)。","detail":{"background":"車禍胸部外傷後若身體評估出現「一側聽不到呼吸音或呼吸音減弱」，應高度懷疑「氣胸(或血胸)」——患側肺塌陷使呼吸音消失，嚴重時氣管偏向健側(張力性氣胸)。兩側喘鳴是氣道狹窄(氣喘)、兩側囉音是肺泡積液、一側濁音較偏血胸/積液(而非氣胸的過度反響音)。故懷疑氣胸的徵象是「一側呼吸音減弱或消失」。","options":{"A":"正解。一側聽不到或減弱呼吸音，應懷疑氣胸。","B":"兩側喘鳴是氣道狹窄(氣喘)，非氣胸。","C":"兩側吸氣囉音是肺泡積液(肺水腫/肺炎)，非氣胸。","D":"一側叩診濁音較偏血胸/積液；氣胸應為過度反響音。"},"sources":["新文京《內外科護理學》呼吸系統—肋膜疾病、氣胸與胸腔引流","ATLS 胸部外傷處置"]}},"101110-N3-24":{"quick":"嚴重呼吸困難先做「重點評估、穩定後再完整評估」(C)。","detail":{"background":"面對「嚴重呼吸困難、剛住院」的急性病人，護理評估要依「ABC 與優先處理生命威脅」原則——先做「焦點式(focused)快速評估」獲取與呼吸困難直接相關的關鍵資訊(意識、呼吸型態、血氧、生命徵象)、立即處置穩定病人，「等情況穩定後」再做完整健康史與全身性身體評估。急性危急時若先做冗長的完整健康史或完整身體評估會延誤救命，故選C。","options":{"A":"先收集「完整健康史」會延誤急性呼吸困難的處置。","B":"急性危急時先做「完整身體檢查」過於冗長、延誤處理。","C":"正解。先取得呼吸困難相關重點訊息、穩定後再做完整評估。","D":"先做完整身體檢查再問家屬，仍延誤急性處置。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"101110-N3-28":{"quick":"抽菸破壞呼吸道「黏膜纖毛」清除分泌物的能力(B)。","detail":{"background":"香菸的有害物質會「破壞呼吸道黏膜的纖毛(cilia)」——纖毛負責把黏液與異物往上排出(黏液纖毛清除系統)。纖毛受損與麻痺後，分泌物與致病物滯留，造成慢性咳嗽多痰、反覆感染，長期更導致慢性支氣管炎、肺氣腫、肺癌。故向病人解釋抽菸傷肺的機轉，最正確的是「影響呼吸道黏膜纖毛排除分泌物的能力」。","options":{"A":"抽菸主要傷纖毛清除功能，非主要影響咳嗽/嘔吐反射。","B":"正解。抽菸破壞呼吸道黏膜纖毛排除分泌物的能力。","C":"濕潤吸入空氣主要由上呼吸道黏液完成，非抽菸傷肺的核心機轉。","D":"過濾空氣由鼻毛/黏膜執行，非抽菸傷肺的主要機轉。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"101110-N3-30":{"quick":"大量輸全血會造成「代謝性鹼中毒」(枸櫞酸代謝)，不致呼吸性鹼中毒(B)。","detail":{"background":"呼吸性鹼中毒由「過度換氣排出過多CO2」造成，常見原因：機械性過度換氣、焦慮/歇斯底里過度呼吸、敗血症(早期)、低血氧刺激換氣、發燒、水楊酸中毒早期。而「大量輸全血」是因血品中的「枸櫞酸(citrate)抗凝劑」在體內代謝成碳酸氫鹽，造成「代謝性鹼中毒」(屬代謝性、非呼吸性)。故不會導致「呼吸性」鹼中毒的是大量輸全血。","options":{"A":"機械性過度換氣排出過多CO2→呼吸性鹼中毒。","B":"正解(不會致呼吸性鹼中毒)。大量輸全血致「代謝性」鹼中毒(枸櫞酸代謝)。","C":"敗血症早期過度換氣→呼吸性鹼中毒。","D":"低血氧刺激換氣加快→呼吸性鹼中毒。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"102030-N3-55":{"quick":"最大吸氣後的最大呼氣容積=「肺活量(VC)」(B)。","detail":{"background":"肺活量(vital capacity, VC)定義為「在一次最大程度吸氣之後，能用力呼出的最大氣量」，等於潮氣容積＋吸氣儲備容積＋呼氣儲備容積。它反映肺可動用的最大通氣量，限制型肺病會下降。比較：潮氣容積(TV)是平靜呼吸每次的量、功能性肺餘量(FRC)是平靜吐氣後肺內餘氣。故「最大吸氣後測得的最大呼氣容積」即肺活量。","options":{"A":"「呼氣量」非標準肺容積術語，不精確。","B":"正解。最大吸氣後的最大呼出量＝肺活量(VC)。","C":"潮氣容積是平靜呼吸每次進出的量，非最大值。","D":"功能性肺餘量是平靜吐氣後肺內所餘氣量，非此定義。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"102110-N3-44":{"quick":"庫斯莫爾氏呼吸=「快而深」(代謝性酸中毒代償)(A)。","detail":{"background":"庫斯莫爾氏呼吸(Kussmaul’s breath
