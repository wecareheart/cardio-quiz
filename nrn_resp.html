ing)是「又快又深」的規則大呼吸，是身體對「代謝性酸中毒」(如糖尿病酮酸中毒DKA、尿毒症)的代償——藉由加深加快呼吸排出大量CO2、降低血中酸度。典型見於DKA(常伴爛蘋果味/丙酮味)。故其特徵是「呼吸快而深」。","options":{"A":"正解。庫斯莫爾氏呼吸為快而深的代償性大呼吸。","B":"慢而淺不符(可能見於呼吸抑制)。","C":"快而淺見於肋骨骨折/疼痛等，非Kussmaul。","D":"慢而深非Kussmaul 的特徵。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"102110-N3-72":{"quick":"長期缺氧→「杵狀指(clubbing)」(B)。","detail":{"background":"長期慢性缺氧(如COPD、支氣管擴張、發紺型先天性心臟病、肺癌)會使指端軟組織增生、指甲與甲床角度增大形成「杵狀指(clubbing finger)」，指甲呈杓狀彎曲、指端膨大。灰指甲是黴菌感染、匙狀指(凹甲)見於缺鐵性貧血、指甲凹陷見於其他甲營養問題，皆非長期缺氧的指標。","options":{"A":"灰指甲是黴菌感染，與缺氧無關。","B":"正解。長期缺氧導致杵狀指。","C":"匙狀指(凹甲)見於缺鐵性貧血。","D":"指甲凹陷非長期缺氧的典型變化。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"103030-N3-52":{"quick":"呼吸道狹窄聽診出現「喘鳴音(stridor)」(D)。","detail":{"background":"呼吸系統評估正確配對：①肺膿瘍是肺實質化膿，不會使「前後徑加大」(前後徑加大＝桶狀胸＝肺氣腫)②肺氣腫過度充氣使觸覺震顫「減弱」(非增強)③肋膜積水叩診為「濁音」(非過度反響音；過度反響音見於氣胸/肺氣腫)④「呼吸道狹窄」(上呼吸道阻塞)聽診出現「喘鳴音(stridor)」——正確。故選D。","options":{"A":"前後徑加大(桶狀胸)是肺氣腫，非肺膿瘍。","B":"肺氣腫觸覺震顫「減弱」，非增強。","C":"肋膜積水叩診為「濁音」，非過度反響音。","D":"正解。呼吸道狹窄聽診出現喘鳴音(stridor)。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"103030-N3-59":{"quick":"「呼吸過快」造成的是鹼中毒，不會誘發術後「呼吸性酸中毒」(C)。","detail":{"background":"術後呼吸性酸中毒源於「通氣不足、CO2 滯留」：因傷口疼痛不敢深呼吸咳嗽、腹脹使橫膈上抬呼吸受阻、麻醉/止痛劑抑制呼吸、手術傷及橫膈使換氣減少等，都會「通氣不足→CO2 上升→呼吸性酸中毒」。而「呼吸速率過快(過度換氣)」反而排出過多CO2→「呼吸性鹼中毒」，不會誘發酸中毒。故不會誘發呼吸性酸中毒者為「呼吸速率過快」。","options":{"A":"疼痛不敢深呼吸咳嗽→通氣不足→呼吸性酸中毒。","B":"腹脹壓迫橫膈→換氣受阻→呼吸性酸中毒。","C":"正解(不會誘發)。呼吸過快是過度換氣→呼吸性「鹼」中毒。","D":"手術傷及橫膈→換氣減少→呼吸性酸中毒。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"104100-N3-59":{"quick":"指甲與甲床角度超過「180 度」稱杵狀指(D)。","detail":{"background":"正常指甲與甲床的角度(Lovibond 角)約160 度。當長期缺氧使指端軟組織增生、該角度「增大至≥180 度」、指端膨大、指甲呈杓狀彎曲，即「杵狀指(clubbing)」。臨床以「角度消失/≥180 度」與Schamroth window 消失判斷。故超過180 度稱杵狀指。","options":{"A":"90 度遠小於杵狀指標準。","B":"120 度仍未達杵狀指。","C":"150 度接近正常上限，未達杵狀指。","D":"正解。角度≥180 度稱杵狀指。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"105030-N3-59":{"quick":"用力呼氣的主要輔助肌是「腹肌」(內肋間肌協助)(A)。","detail":{"background":"平靜呼吸時，「吸氣」靠橫膈與外肋間肌(主動)、「呼氣」是被動回彈。費力(用力)呼吸時需動用輔助肌：費力「吸氣」用胸鎖乳突肌、斜角肌、斜方肌等把胸廓上提；費力「呼氣」則主要靠「腹肌(收縮把腹內壓上推橫膈)」與內肋間肌幫助把氣用力排出。故用力呼氣主要的呼氣輔助肌是「腹肌」。","options":{"A":"正解。用力呼氣主要靠腹肌(內肋間肌協助)。","B":"斜方肌是費力「吸氣」的輔助肌，非呼氣。","C":"內肋間肌協助呼氣，但「主要」呼氣輔助肌是腹肌。","D":"胸鎖乳突肌是費力「吸氣」的輔助肌，非呼氣。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"106030-N3-51":{"quick":"正常生理下刺激呼吸中樞的主要物質是「二氧化碳(CO2)」(A)。","detail":{"background":"正常生理狀態下，呼吸中樞(延腦)主要受「動脈血中CO2(及隨之變化的[H⁺]/pH)」調控——CO2 上升、pH 下降會強烈刺激中樞化學受器使呼吸加深加快排出CO2，是調節呼吸最敏感、最主要的因素。氧氣(低血氧)經頸動脈體周邊化學受器刺激呼吸屬「次要」驅動(在慢性CO2 滯留者才變主要)。故正常生理下主要刺激物質為CO2。","options":{"A":"正解。CO2(及pH)是正常生理下刺激呼吸中樞的主要物質。","B":"低血氧經周邊化學受器刺激呼吸屬「次要」驅動。","C":"鈣離子非呼吸中樞的主要刺激物質。","D":"鉀離子非呼吸中樞的主要刺激物質。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"106030-N3-58":{"quick":"評估呼吸道阻塞嚴重度最重要的指標是「FEV1(第一秒用力吐氣量)」(D)。","detail":{"background":"評估「氣道阻塞」最重要、最敏感的指標是「第一秒用力呼氣容積(FEV1)」——氣道愈阻塞、第一秒能呼出的氣愈少，FEV1 與FEV1/FVC 下降。COPD 嚴重度(GOLD 分級)即以FEV1% 預測值評定。吸氣容量、功能性肺餘量、最大吸氣壓力評估的是其他面向，非「阻塞嚴重度」的核心指標。","options":{"A":"吸氣容量非評估阻塞嚴重度的核心指標。","B":"功能性肺餘量反映肺餘氣，非阻塞嚴重度核心。","C":"最大吸氣壓力評估呼吸肌力，非氣道阻塞嚴重度。","D":"正解。FEV1 是評估氣道阻塞嚴重度最重要的指標。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"106111-N3-65":{"quick":"過度換氣致呼吸性鹼中毒→「紙袋重複呼吸」回吸CO2(A)。","detail":{"background":"過度換氣(如焦慮、歇斯底里)排出過多CO2 造成「呼吸性鹼中毒」，出現頭暈、口周與手腳麻刺感、抽搐感。處置是「以紙袋(或杯狀手掌)罩住口鼻重複呼吸數次」，讓病人回吸自己呼出的CO2、提高血中CO2、矯正鹼中毒，並安撫情緒、引導放慢呼吸。注射NaHCO3 會加重鹼中毒、給HCl 不當、一般不需上呼吸器。故正確為紙袋重複呼吸。","options":{"A":"正解。以紙袋罩口鼻重複呼吸，回吸CO2 矯正呼吸性鹼中毒。","B":"過度換氣性鹼中毒一般不需上呼吸器。","C":"注射NaHCO3 會「加重」鹼中毒，錯誤。","D":"給HCl 並非過度換氣鹼中毒的處置。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"108020-N3-56":{"quick":"COPD 吸入過多氧→抑制呼吸驅動致CO2 滯留→呼吸性酸中毒(D)。","detail":{"background":"呼吸性酸中毒是「通氣不足、CO2 滯留(PaCO2 上升、pH 下降)」造成。慢性阻塞性肺疾病(COPD)病人若「吸入過多(高濃度)氧氣」，會抑制依賴低血氧的呼吸驅動，使換氣下降、CO2 進一步滯留，導致呼吸性酸中毒(CO2 麻醉)。故D 正確。其餘錯誤：換氣「過快」造成的是鹼中毒、水楊酸中毒早期是呼吸性「鹼」中毒、手腳麻刺感是「鹼」中毒(低血鈣症狀)而非酸中毒。","options":{"A":"換氣速率過「快」造成呼吸性鹼中毒，非酸中毒。","B":"水楊酸中毒早期是刺激呼吸→呼吸性「鹼」中毒。","C":"手腳麻刺感是「鹼」中毒(低游離鈣)的症狀，非酸中毒。","D":"正解。COPD 吸入過多氧抑制呼吸驅動→CO2 滯留→呼吸性酸中毒。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"108110-N3-54":{"quick":"聽診清楚聽到病人說的「話字」=「支氣管語音(bronchophony)」(B)。","detail":{"background":"語音傳導檢查(評估肺實質化)：①「支氣管語音(bronchophony)」——請病人正常說話(如數1-2-3)，若在肺野上經聽診器聽到「字音異常清晰響亮」即陽性②「耳語樣胸語音(whispered pectoriloquy)」——病人『耳語』也能清楚聽見③「羊鳴音(egophony)」——病人發「E」音聽起來變「A」。題目「清楚聽到病人『所說的話』」對應「支氣管語音(bronchophony)」。這些都在肺實質化(肺炎)時增強。","options":{"A":"羊語音是「E 變A」的特殊變化，非「清楚聽到說話」。","B":"正解。清楚聽到病人正常說話的字音＝支氣管語音(bronchophony)。","C":"耳語樣胸語音是聽到「耳語」清晰，本題為正常說話。","D":"摩擦音是肋膜發炎的摩擦聲，非語音傳導。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"111030-N3-65":{"quick":"本題送分：腹瀉應致代謝性「酸」中毒、嘔吐應致代謝性「鹼」中毒，C、D 皆敘述顛倒。","detail":{"background":"本題經評定為「送分」。酸鹼平衡常識：COPD→CO2 滯留→呼吸性酸中毒(A 對)；過度焦慮/歇斯底里過度換氣→呼吸性鹼中毒(B 對)；「嚴重腹瀉」會喪失大量含碳酸氫鹽的腸液→「代謝性『酸』中毒」(故C「腹瀉致代謝性鹼中毒」錯)；「嚴重嘔吐」會喪失大量胃酸(HCl)→「代謝性『鹼』中毒」(故D「嘔吐致代謝性酸中毒」也錯)。因C 與D 的敘述皆顛倒、不只一個錯誤，本題全給分。","options":{"A":"COPD 易致呼吸性酸中毒，敘述正確。","B":"過度焦慮/歇斯底里過度換氣易致呼吸性鹼中毒，正確。","C":"敘述顛倒：腹瀉應致代謝性「酸」中毒，非鹼中毒。","D":"敘述顛倒：嘔吐應致代謝性「鹼」中毒，非酸中毒。(本題送分)"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"112030-N3-52":{"quick":"支氣管鏡檢查後「禁食到作嘔反射恢復」防嗆咳吸入(B)。","detail":{"background":"支氣管鏡檢查時喉部局部麻醉會暫時抑制「作嘔反射(gag reflex)」，故檢查後最重要的護理是「禁食(NPO)直到作嘔反射恢復」，以免進食嗆咳、誤吸。其餘：採半坐臥(非床頭抬到80–90 度)、留觀但不一定臥床4 小時、檢查後「少量血絲痰」是常見的、可觀察，但若「大量咳血、呼吸困難、發燒」才需通報。故最適宜為「禁食到作嘔反射恢復」。","options":{"A":"床頭抬高至80–90 度過高、非必要，半坐臥即可。","B":"正解。禁食直到作嘔反射恢復，防嗆咳誤吸。","C":"不一定需臥床4 小時，依狀況觀察即可。","D":"檢查後「微量」血絲痰常見、可觀察，非一律立即通報。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"112030-N3-54":{"quick":"下肺區出現「支氣管呼吸音」是異常(實質化)(C)。","detail":{"background":"肺部評估正常 vs 異常：①吸氣時胸廓「對稱往外擴張」是正常②肺底(下肺區)正常叩診為「反響音」是正常③「支氣管呼吸音(bronchial breath sounds)」正常只應出現在氣管/大支氣管上方，若出現在「周邊下肺區」代表該處肺實質化(肺炎)傳音，屬「異常」④正常胸廓「左右徑大於前後徑」(前後徑較小)。故異常者為「下肺區出現支氣管呼吸音」。","options":{"A":"吸氣時胸廓對稱外擴是正常。","B":"肺底出現反響音(共鳴音)是正常。","C":"正解(異常)。下肺區(周邊)出現支氣管呼吸音代表肺實質化。","D":"胸廓左右徑大於前後徑是正常胸形。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"113030-N3-32":{"quick":"持續換氣不足→CO2 滯留→「呼吸性酸中毒」(A)。","detail":{"background":"「持續換氣不足(hypoventilation)」使CO2 無法有效排出而滯留，PaCO2 上升、[H⁺]增加、pH 下降，動脈血氣體分析呈「呼吸性酸中毒」，常合併低血氧。常見於呼吸抑制(藥物、中樞)、神經肌肉病變、嚴重COPD 等。故最可能出現呼吸性酸中毒。換氣「過度」才致呼吸性鹼中毒。","options":{"A":"正解。持續換氣不足→CO2 滯留→呼吸性酸中毒。","B":"呼吸性鹼中毒見於「過度」換氣，與換氣不足相反。","C":"代謝性酸中毒由代謝因素(如DKA、腎衰)造成，非換氣不足。","D":"代謝性鹼中毒由嘔吐/利尿等造成，非換氣不足。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"115030-N3-32":{"quick":"支氣管鏡後「進食前先確認作嘔反射恢復」防誤吸(B)。","detail":{"background":"支氣管鏡檢查後喉部局部麻醉暫抑作嘔反射，最重要的護理是「進食/喝水前先確認作嘔反射(gag reflex)已恢復」，以免嗆咳誤吸。其餘：不需特別「大量」灌注液體、姿勢採半坐臥(非一定健側臥)、檢查前才用Atropine 減分泌物(檢查『後』再給無意義)。故最適當為「進食前確認作嘔反射恢復」。","options":{"A":"檢查後不需刻意「大量」補充液體。","B":"正解。進食前先確認作嘔反射恢復，防誤吸。","C":"採半坐臥即可，非一定要躺向健側。","D":"Atropine 是檢查「前」減少分泌物用，檢查後再給無意義。"},"sources":["新文京《內外科護理學》呼吸系統—評估與診斷","基礎護理學—呼吸評估與酸鹼平衡"]}},"101030-N3-53":{"quick":"胸部創傷多肋骨骨折→通氣不足→CO2 滯留(hypercapnia)(C)。","detail":{"background":"高碳酸血症(hypercapnia，CO2 滯留)源於「肺泡『通氣』不足」(第二型呼吸衰竭)。胸部創傷合併多根肋骨骨折(甚至連枷胸)，因疼痛與胸壁不穩使呼吸變淺、通氣不足，CO2 無法有效排出而滯留。對照：一氧化碳中毒是攜氧障礙(低血氧但CO2 不一定高)、急性肺水腫與ARDS 初期多「過度換氣」使CO2 偏低(以低血氧為主)。故最可能CO2 過高者為胸部創傷多肋骨骨折。","options":{"A":"一氧化碳中毒是攜氧障礙(碳氧血紅素)，非以CO2 滯留為主。","B":"急性肺水腫初期多過度換氣、CO2 偏低，以低血氧為主。","C":"正解。多肋骨骨折→疼痛、通氣不足→CO2 滯留。","D":"ARDS 早期過度換氣、CO2 偏低，以難治性低血氧為主。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"101030-N3-77":{"quick":"脫離呼吸器時出現「呼吸肌疲乏」應立即「接回呼吸器」(D)。","detail":{"background":"呼吸器脫離(weaning)過程須密切監測病人耐受度：若出現「呼吸肌疲乏」徵象(呼吸淺快、用輔助肌、心搏過速、血氧下降、躁動、ABG 惡化)，代表尚未能自主維持通氣，應「立即接回呼吸器」讓呼吸肌休息，待狀況改善再試。脫離時宜採半坐臥(非平躺)、鼓勵家屬陪伴安撫降低焦慮、不可用肌肉鬆弛劑(會抑制自主呼吸)。","options":{"A":"脫離時宜半坐臥利於呼吸，平躺不適當。","B":"家屬陪伴可安撫病人、降低焦慮，不應避免。","C":"肌肉鬆弛劑會抑制自主呼吸，脫離期禁用。","D":"正解。出現呼吸肌疲乏應立即接回呼吸器讓呼吸肌休息。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"101110-N3-10":{"quick":"尿路感染引發ARDS=「全身性發炎反應(介質)造成肺損傷」(B)。","detail":{"background":"ARDS 可由肺外原因(如敗血症)引發。尿路感染→敗血症→「全身性發炎反應症候群(SIRS)」，大量發炎介質(細胞激素)循環損傷「肺泡-微血管膜」、使其通透性增加，造成非心因性肺水腫與廣泛肺泡損傷。故肺外敗血症引發ARDS 的機轉是「全身性發炎反應釋放的介質造成肺損傷」，而非病菌毒素或細菌直接到肺、也非發燒本身。","options":{"A":"並非單由病菌毒素直接造成，而是全身發炎反應介質。","B":"正解。全身性發炎反應釋放的介質損傷肺泡-微血管膜。","C":"肺外敗血症性ARDS 非因細菌經血到肺直接感染所致。","D":"發燒本身非ARDS 肺損傷的機轉。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"101110-N3-27":{"quick":"ARDS=白肺(1)＋A-aDO2 增大(2)＋難治性低血氧(4)→124。","detail":{"background":"ARDS 主要表徵：①胸部X 光「兩側瀰漫性浸潤(白肺 white-out)」②肺泡-動脈氧分壓差(A-aDO2)增大、氧合嚴重受損③「難治性低血氧(refractory hypoxemia)」——給高濃度氧仍無法矯正(因肺內分流)④功能性肺餘容量(FRC)「下降」(非增加，因肺泡塌陷)⑤屬「非心因性」肺水腫，肺微血管楔壓(PCWP)「≤18 mmHg」(非>12，用以排除心因性)。故正確組合為1、2、4(白肺、A-aDO2 增大、難治性低血氧)。","options":{"A":"正解。124＝白肺＋A-aDO2 增大＋難治性低血氧。","B":"135 含「FRC 增加」錯誤(ARDS 為FRC 下降)。","C":"234 含「FRC 增加」錯誤。","D":"245 含「PCWP>12」錯誤(ARDS 為PCWP≤18 的非心因性水腫)。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"102030-N3-59":{"quick":"拔管後痰多應「鼓勵足夠水分稀釋痰液」，限水1000 c.c. 防肺水腫是錯誤(C)。","detail":{"background":"病人拔除氣管內管後痰多黏稠、咳嗽胸痛，護理：①教肌肉放鬆/呼吸技巧降低焦慮②教橫膈式呼吸與噘嘴吐氣改善通氣③「攝取足夠水分(無禁忌時2000–3000 mL)稀釋痰液利於咳出」、配合濕化④協助下床活動促進肺擴張、有效咳嗽(可夾抱固定胸部減痛)。題目C「每天攝取1000 c.c. 液體以防肺水腫」是錯誤——此病人需『增加』水分稀釋痰液，限水反使痰更黏(除非另有心腎限水禁忌)。","options":{"A":"教肌肉放鬆技巧降低焦慮，正確。","B":"橫膈式呼吸與噘嘴吐氣改善通氣，正確。","C":"錯誤(本題選此)。痰多黏稠應「增加」水分稀釋痰液，限水1000 c.c. 不當。","D":"下床活動促進肺擴張、利排痰，正確。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"102030-N3-61":{"quick":"ARDS 需高壓力與精準潮氣量通氣→用「容積週期型呼吸器」(D)。","detail":{"background":"ARDS 肺順應性極差、需要較高壓力才能送入足夠氣體，並要「保證每次送入固定潮氣量」以做肺保護性通氣(低潮氣量6 mL/kg＋PEEP)。「容積週期型(volume-cycled)呼吸器」以送達設定容積為切換條件，能在肺順應性變差時仍維持固定潮氣量，最適合ARDS。負壓型(鐵肺)已少用、壓力週期型在順應性下降時潮氣量會不穩、時間週期型多用於新生兒。","options":{"A":"負壓型呼吸器(鐵肺)已少用，不適合ARDS。","B":"壓力週期型在肺順應性下降時潮氣量不穩定。","C":"時間週期型多用於新生兒，非ARDS 首選。","D":"正解。容積週期型可保證固定潮氣量，最適合順應性差的ARDS。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"102110-N3-2":{"quick":"ARDS 肺泡水腫破壞「第二型肺泡細胞」→表面張力素減少→肺塌陷(B)。","detail":{"background":"ARDS 時肺泡-微血管膜受損、肺泡內水腫，破壞「第二型肺泡細胞(type II pneumocyte)」——其功能是「分泌表面張力素(surfactant)」。表面張力素減少使肺泡表面張力上升、肺泡傾向塌陷，造成「廣泛性肺擴張不全(atelectasis)」、順應性下降與難治性低血氧。故受影響的是第二型細胞分泌表面張力素的功能。","options":{"A":"第一型細胞負責氣體交換，但造成廣泛塌陷的關鍵是表面張力素不足。","B":"正解。第二型肺泡細胞分泌表面張力素受損→肺泡塌陷。","C":"巨噬細胞吞噬功能非造成廣泛肺塌陷的主因。","D":"柯恩氏孔是肺泡間側枝通氣，非表面張力素機轉。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"102110-N3-76":{"quick":"二氧化碳過高型呼吸衰竭會「低血氧」，PaO2「正常」是錯誤(B)。","detail":{"background":"第二型(高碳酸血症型)呼吸衰竭以「PaCO2 升高(>50)」為主，常「同時合併低血氧(PaO2 下降)」；高CO2 使腦血管擴張(可致頭痛、顱內壓上升)、並造成「呼吸性酸中毒(pH 下降)」。故「PaO2 正常」是錯誤——通氣不足時氧合通常也受影響而下降。其餘PaCO2 升高、腦血管擴張、呼吸性酸中毒皆為其正確生理反應。","options":{"A":"第二型呼吸衰竭PaCO2 升高，正確。","B":"錯誤(本題選此)。通常合併「低血氧」，PaO2 不會正常。","C":"高CO2 使腦血管擴張，正確。","D":"CO2 滯留造成呼吸性酸中毒，正確。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"103030-N3-53":{"quick":"鼻導管3 L/min≈32%(1 L 約24%，每增1 L 約加4%)(B)。","detail":{"background":"低流量鼻導管(nasal cannula)提供的吸入氧濃度估算：1 L/min 約24%，「每增加1 L/min 約增加4%」→2 L≈28%、3 L≈32%、4 L≈36%、5 L≈40%、6 L≈44%。故3 L/min 約「32%」。注意實際濃度受病人潮氣量與呼吸型態影響，為估算值；鼻導管適用於需低濃度、長期、清醒可配合者。","options":{"A":"24% 對應1 L/min。","B":"正解。3 L/min 約32%。","C":"40% 對應約5 L/min。","D":"48% 超過鼻導管一般可達範圍。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"103030-N3-58":{"quick":"氣切後「氣切周圍組織腫脹＋觸到爆裂感」=皮下氣腫(B)。","detail":{"background":"氣管切開術後若空氣自氣切口漏入皮下組織，會造成「皮下氣腫」：觸診氣切周圍皮膚/組織出現「腫脹及爆裂感(crepitus/crackling sensation，捻髮感)」，是其典型徵象。雙上肺爆裂音是肺泡積液、過度反響音是含氣過多、單純呼吸困難非皮下氣腫專一徵象。故顯示皮下氣腫的是「氣切周圍組織腫脹及爆裂感」。","options":{"A":"雙上肺爆裂音是肺泡積液的聲音，非皮下氣腫。","B":"正解。氣切周圍組織腫脹＋觸到爆裂感(捻髮感)＝皮下氣腫。","C":"過度反響音見於氣胸/肺氣腫，非皮下氣腫的觸診徵象。","D":"呼吸困難非皮下氣腫的專一徵象。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"104030-N3-52":{"quick":"呼吸器「高壓力警報」常因「管路扭結」(或痰阻、咬管、氣胸)(A)。","detail":{"background":"呼吸器「高壓力警報(high pressure alarm)」代表氣流阻力或肺順應性增加：常見原因為「管路扭結/受壓、分泌物阻塞氣管內管、病人咬管、支氣管痙攣、氣胸、人機對抗」等。處置先查管路與抽痰。相對地，「低壓力警報」代表漏氣/脫落(管路鬆脫、氣囊漏氣)。故高壓警報的可能導因是「管路扭結」；管路鬆脫、氣囊漏氣屬低壓警報、氧濃度未調回與壓力警報無關。","options":{"A":"正解。管路扭結使氣道阻力上升→高壓力警報。","B":"管路鬆脫是「低」壓力警報的原因。","C":"氣囊漏氣造成漏氣→「低」壓力警報。","D":"氧濃度未調回與壓力警報無關。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"104030-N3-59":{"quick":"陽壓通氣使胸內壓上升→「靜脈回流減少」(C)。","detail":{"background":"陽壓呼吸(正壓通氣)在吸氣時把氣體「壓入」肺，使「胸腔內壓上升」，壓迫腔靜脈與心臟，造成「靜脈回流減少→心輸出量下降→血壓可能下降」，是正壓通氣的重要血流動力學副作用(尤其高PEEP、低血容時)。其他並非：不會使氣管「擴張」、不會增加吐氣量、可能因心輸出下降而反射『交感興奮』但那是代償非直接合併症。故正確為「靜脈回流減少」。","options":{"A":"陽壓通氣不會使氣管擴張。","B":"陽壓通氣與「吐氣量增加」無直接關係。","C":"正解。胸內壓上升壓迫大靜脈→靜脈回流減少。","D":"交感興奮是血壓下降後的反射代償，非陽壓通氣的直接合併症。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"104100-N3-54":{"quick":"「低血壓(灌流不足)」會影響脈搏血氧儀判讀(D)。","detail":{"background":"脈搏血氧儀(pulse oximetry)靠偵測指端「搏動性血流」的光吸收來估算SpO2，故凡是使「末梢灌流不足、搏動訊號變弱」的情況都會影響判讀準確性——「低血壓、休克、末梢冰冷血管收縮、低體溫」等。另指甲油、強光、嚴重貧血、碳氧血紅素也會干擾。發燒、心搏過速、呼吸急促本身不直接影響其準確度。故選低血壓。","options":{"A":"發燒不直接影響脈搏血氧儀判讀。","B":"心搏過速本身不影響血氧儀準確度。","C":"呼吸急促不直接干擾血氧儀讀值。","D":"正解。低血壓使末梢灌流不足、搏動訊號弱，影響判讀。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"104100-N3-55":{"quick":"抽痰一次「不超過10–15 秒」，達15 秒應停止(C)。","detail":{"background":"抽痰原則：①單次抽吸「不超過10–15 秒」(過久造成缺氧、心律不整)，故抽痰管放入達約15 秒應停止②抽吸前後給氧(pre/post-oxygenation)③若出現「SpO2 明顯下降(常<90%)、心律不整、心搏過慢/過速、發紺」應立即停止④抽吸壓力成人約100–150 mmHg。題目中「抽痰管放入達15 秒」已達單次上限應停止。心跳增加20 次、下降10 次、SpO2 降到95% 都還在可接受範圍未到立即停止標準。","options":{"A":"心跳增加20 次未到須立即停止的危險程度。","B":"心跳下降10 次仍在觀察範圍，未達立即停止標準。","C":"正解。單次抽吸不超過10–15 秒，達15 秒應停止。","D":"SpO2 95% 仍可接受，未到停止標準(常<90% 才停)。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"104100-N3-65":{"quick":"ARDS 主要病變部位是「肺泡-微血管膜」(D)。","detail":{"background":"ARDS 的核心病變在「肺泡-微血管膜(alveolar-capillary membrane)」——此膜受損使通透性增加，富含蛋白的液體與細胞滲入肺泡造成「非心因性肺水腫」、第二型細胞受損使表面張力素減少→肺泡塌陷、形成透明膜，導致瀰漫性肺泡損傷與難治性低血氧。故主要病變部位是肺泡-微血管膜，而非單純支氣管或肺實質局部。","options":{"A":"肺腺泡是結構單位，非ARDS 病變的精確定位。","B":"「肺實質」過於籠統，ARDS 核心在肺泡-微血管膜。","C":"支氣管非ARDS 的主要病變部位。","D":"正解。ARDS 主要病變在肺泡-微血管膜(通透性增加)。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"105030-N3-52":{"quick":"神經肌肉病變→呼吸肌無力→「潮氣容積下降」致通氣不足(A)。","detail":{"background":"神經肌肉病變(如重症肌無力、格林-巴利、脊髓損傷)導致呼吸衰竭的機轉是「呼吸肌無力→無法產生足夠的『潮氣容積』→肺泡通氣不足→CO2 滯留、低血氧」。其肺本身的氣體交換膜正常(無彌散障礙)、死腔不一定增加、CO2 排出是「減少」而非增加。故正確為「潮氣容積下降」。","options":{"A":"正解。呼吸肌無力使潮氣容積下降→通氣不足。","B":"神經肌肉病變主要是通氣幫浦衰竭，非死腔增加為主。","C":"通氣不足使CO2 排出「減少」、滯留，非增加。","D":"肺泡-微血管膜正常，無彌散(擴散)障礙。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"105030-N3-55":{"quick":"鼻腔氣管內插管「呼吸作功較大」(管徑小、阻力高)為正確(B)。","detail":{"background":"氣管內插管比較：①「頭顱骨(顱底)骨折」者『禁忌』經鼻插管(管子可能誤入顱腔)，應經口②鼻腔插管管徑較細、較長、阻力較大，病人「呼吸所需做的功較經口插管大」(正確)③插管時不可「快速擠壓甦醒球」(會造成胃脹氣與壓力傷害)，插管前先充分給氧④確認插管位置正確的是吐氣末CO2「可偵測到(波形/數值正常)」，而非「為0」(為0 代表插到食道)。故正確為B。","options":{"A":"顱底骨折者「禁忌」經鼻插管，應經口。","B":"正解。鼻腔插管管徑細、阻力大，呼吸作功較經口插管大。","C":"插管中不可快速擠壓甦醒球；應插管前充分給氧。","D":"吐氣末CO2「為0」代表插到食道(位置錯誤)，非正確指標。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"105030-N3-56":{"quick":"非再吸入面罩適合「短期需高濃度氧」者(B)。","detail":{"background":"氧療裝置：①潮濕瓶用於濕化氧氣、減少黏膜乾燥，不應為怕細菌而少用(應定期更換無菌水)②「非再吸入面罩(non-rebreather mask)」有儲氧袋與單向瓣，可提供高濃度氧(約90–100%)，「適合短期需高氧」的急性低血氧者③單純面罩需「5–8 L/min」(過低<5 易回吸CO2)，故「4 L 以下」不適合④鼻套管不適合「躁動不安」者(易移位)，躁動者較適合面罩。故正確為B。","options":{"A":"潮濕瓶應定期更換無菌水使用，不應為怕細菌而少用。","B":"正解。非再吸入面罩可給高濃度氧，適合短期需高氧者。","C":"單純面罩需5–8 L/min，「4 L 以下」過低易回吸CO2。","D":"躁動不安者鼻套管易移位，較適合用面罩。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"106030-N3-54":{"quick":"拔除人工氣道後出現「喘鳴(stridor)」=喉頭水腫氣道阻塞，須緊急處理(A)。","detail":{"background":"拔除人工氣道(氣管內管)後若出現「喘鳴(stridor，吸氣相高調聲)」，提示「喉頭水腫/喉痙攣造成上呼吸道阻塞」，是會迅速危及生命的急症，須立即處理(給氧、評估、必要時重新建立氣道、給類固醇/腎上腺素噴霧)。偶有粉紅色痰、右下肺些許爆裂音、呼吸26 次/分屬可觀察範圍，非立即危急。故喘鳴最需緊急處理。","options":{"A":"正解。拔管後喘鳴提示喉頭水腫氣道阻塞，須緊急處理。","B":"偶有粉紅色痰需觀察，非立即危急。","C":"右下肺些許爆裂音可觀察，非急症。","D":"呼吸26 次/分略快，需觀察但非立即危及生命。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"106110-N3-52":{"quick":"確認氣管內管位置最適當=「聽診雙側呼吸音」(B 端)。","detail":{"background":"評估氣管內管位置是否正確，床邊最適當的方式是「聽診雙側胸部呼吸音是否對稱、並聽上腹(胃部)無氣過水聲」——雙側呼吸音對稱代表管子在氣管適當深度；若左側減弱多為插太深入右主支氣管，胃部有聲音則插入食道。最客觀則加「吐氣末CO2(capnography)」與胸部X 光。膚色、呼吸速率、氣囊量都不能可靠確認位置。","options":{"A":"膚色變化不能可靠確認氣管內管位置。","B":"監測呼吸速率無法判定管子位置。","C":"氣囊內氣量與管子是否在正確位置無關。","D":"正解。聽診雙側呼吸音是否對稱(並確認胃部無氣過水聲)最適當。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"106111-N3-54":{"quick":"慢性肺病早期呼吸衰竭=「焦躁不安及意識混亂」(缺氧/CO2 早期)(C)。","detail":{"background":"慢性肺病病人早期呼吸衰竭(缺氧與CO2 開始滯留)的徵象是「神經行為改變」——焦躁不安、注意力不集中、判斷力下降、意識混亂、頭痛，源於缺氧與高CO2 影響中樞，是『早期』警訊。後期才出現發紺、嗜睡、昏迷、心搏過速、血壓變化。故早期表現為「焦躁不安及意識混亂」。低血壓、心搏過慢、發紺多屬晚期。","options":{"A":"低血壓多屬晚期；哮鳴音非早期呼吸衰竭的指標。","B":"早期心跳多「加快」而非過慢；過慢是晚期惡化。","C":"正解。焦躁不安與意識混亂是早期呼吸衰竭(缺氧/CO2)的徵象。","D":"發紺是「晚期」缺氧表現，非早期。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"107030-N3-51":{"quick":"ARDS 診斷：胸部X 光「兩側」浸潤、PCWP≤18(排除心因)、急性發作(D)。","detail":{"background":"ARDS(Berlin 定義)診斷標準：①「急性」發作(一週內，非慢性)②胸部X 光呈「『兩側』瀰漫性浸潤」(非單側)③氧合嚴重受損「PaO2/FiO2≤300(輕),≤200(中),≤100(重)」(故>200 不符重度標準)④「非心因性」——肺微血管楔壓「≤18 mmHg」或無左心衰證據。故正確敘述為「肺微血管楔壓≤18 mmHg」(排除心因性肺水腫)。","options":{"A":"ARDS 為「急性」發作，非慢性。","B":"氧合指數PaO2/FiO2「≤300/≤200」才符ARDS，>200 不符中重度標準。","C":"胸部X 光應為「兩側」瀰漫性浸潤，非單側。","D":"正解。PCWP≤18 mmHg(非心因性)是ARDS 診斷要件。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"107030-N3-75":{"quick":"成人經口氣管內管深度約21–23 公分，「25–27 公分」過深為錯(B)。","detail":{"background":"急救成人氣管內插管：①依「性別/體型」選管徑(女約7.0–7.5、男約7.5–8.0)②經口插入後，門齒處深度「約21–23 公分」(女約21、男約23)，並以聽診雙側呼吸音與capnography 確認③插管中若血氧降到約80% 應暫停、給100% 氧3–5 分鐘再試④可用Sellick 手法(壓環狀軟骨)減少胃內容物逆流誤吸。題目B「插入深度25–27 公分」過深(易入右主支氣管)，為錯誤敘述。","options":{"A":"依性別/體型選管，正確。","B":"錯誤(本題選此)。成人經口深度約21–23 公分，25–27 過深。","C":"血氧降到80% 應暫停、給100% 氧再試，正確。","D":"Sellick 手法(壓環狀軟骨)可防逆流誤吸，正確。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"107110-N3-54":{"quick":"PEEP 目的=維持呼氣末肺泡張開、「減少肺內分流」改善氧合(C)。","detail":{"background":"呼氣末正壓(PEEP)在「吐氣末」維持氣道正壓，使塌陷傾向的肺泡保持張開、「增加」功能性肺餘容量、減少「肺內分流(shunt)」(有血流卻無通氣的區域)、改善氧合與彌散面積。它「不是」打開氣管支氣管(那是支氣管擴張劑)、會使FRC「增加」(非減少)、並因胸內壓上升而「減少」靜脈回流(非增加)。故正確目的為「減少分流」。","options":{"A":"PEEP 撐開的是「肺泡」，非打開氣管支氣管。","B":"PEEP 使功能性肺餘容量「增加」，非減少。","C":"正解。PEEP 維持肺泡張開、減少肺內分流、改善氧合。","D":"PEEP 提高胸內壓，使靜脈回流「減少」非增加。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"107110-N3-55":{"quick":"氣管內管氣囊壓力應維持約20–25 mmHg，「35 mmHg」過高為錯(B)。","detail":{"background":"氣管內插管護理：①依需要評估並抽痰維持管路通暢(正確)②氣囊(cuff)壓力應維持「約20–25 mmHg(約25–30 cmH2O)」——足以密封防漏氣與誤吸、又不致壓迫氣管黏膜缺血壞死；「35 mmHg」過高會造成黏膜缺血(錯誤)③灌食時床頭抬高30–45 度防吸入性肺炎(正確)④依醫囑適度鎮靜防非預期拔管(正確)。故錯誤者為「氣囊壓力維持35 mmHg」。","options":{"A":"定時評估抽痰需要以維持管路通暢，正確。","B":"錯誤(本題選此)。氣囊壓力應約20–25 mmHg，35 過高會壓迫黏膜缺血。","C":"灌食時床頭抬高30–45 度防誤吸，正確。","D":"依醫囑鎮靜可預防非預期拔管，正確。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"107110-N3-56":{"quick":"鼻套管4 L/min≈36%(每1 L 約加4%、起算24%)(C)。","detail":{"background":"低流量鼻套管(nasal cannula)吸入氧濃度估算：1 L≈24%，每增加1 L 約加4%→2 L≈28%、3 L≈32%、「4 L≈36%」、5 L≈40%、6 L≈44%。故4 L/min 約「36%」。實際值受潮氣量影響為估算。鼻套管適合需低濃度、可長期、清醒配合者。","options":{"A":"28% 對應2 L/min。","B":"32% 對應3 L/min。","C":"正解。4 L/min 約36%。","D":"40% 對應5 L/min。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"109030-N3-53":{"quick":"PEEP 是「增加」功能性肺餘容積；用陽壓「降低FRC」的敘述錯誤(D)。","detail":{"background":"ARDS 處置：①維持血色素(必要時輸濃縮紅血球)以提升攜氧②用膠質溶液謹慎維持血壓並減少滲漏③低心輸出時用升壓劑改善灌流④機械通氣加「PEEP」——PEEP 是「『增加』功能性肺餘容積、撐開塌陷肺泡、減少分流、改善氧合」。題目D「使用陽壓呼吸器以『降低』功能性肺餘容積」與PEEP 的作用相反，是錯誤敘述。","options":{"A":"維持血色素以增加攜氧能力，合理處置。","B":"膠質溶液謹慎使用可減少滲漏、維持血容，屬處置考量。","C":"低心輸出時用升壓劑改善灌流，合理。","D":"錯誤(本題選此)。PEEP 是「增加」FRC，非降低。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"109030-N3-55":{"quick":"肺術後「粉紅色泡沫痰＋囉音＋呼吸困難」=急性肺水腫(D)。","detail":{"background":"肺部手術後出現「呼吸速率加快、『粉紅色泡沫狀痰』、持續咳嗽、呼吸困難、雙肺囉音」是「急性肺水腫」的典型表現——肺泡內充滿含血漿與紅血球的滲液，咳出粉紅泡沫痰。可能因術中輸液過量或左心功能不全。肺炎以膿痰發燒為主、氣胸是患側呼吸音消失/過度反響、肺栓塞以突發胸痛呼吸困難但無粉紅泡沫痰。故最可能為急性肺水腫。","options":{"A":"肺炎以發燒、膿痰為主，非粉紅泡沫痰。","B":"氣胸表現為患側呼吸音消失/過度反響音，非囉音與粉紅泡沫痰。","C":"肺栓塞為突發胸痛呼吸困難，無粉紅泡沫痰。","D":"正解。粉紅泡沫痰＋囉音＋呼吸困難＝急性肺水腫。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","2012 Berlin ARDS 定義"]}},"109110-N3-54":{"quick":"呼吸器「低壓力警報」=漏氣→先「檢查管路接頭是否鬆脫」(B)。","detail":{"background":"呼吸器「低壓力(low pressure)警報」代表系統「漏氣或脫接」，使氣道壓力達不到設定值——常見原因為管路接頭鬆脫、氣管內管脫出、氣囊(cuff)漏氣或破裂、管路破損。處置應先「逐一檢查呼吸器管路各接頭是否鬆脫、氣管內管是否在位、氣囊是否漏氣」並重新接好。抽痰、鎮靜止痛、安撫咬管是針對「高壓」警報的情況。","options":{"A":"抽痰是處理「高壓(阻塞)」警報，非低壓警報。","B":"正解。低壓力警報先檢查管路接頭是否鬆脫/脫接、氣囊是否漏氣。","C":"鎮靜止痛非低壓警報(漏氣)的處置。","D":"咬管造成的是「高壓」警報，非低壓。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"109110-N3-55":{"quick":"氣切病人抽痰時「最重要」是評估『血氧變化』防缺氧(D)。","detail":{"background":"抽痰會暫時中斷供氧並刺激氣道，可能造成「缺氧、心律不整、心搏過慢」，故抽痰過程「最重要」的是「持續評估血氧(SpO2)與生命徵象變化」，一旦血氧明顯下降或出現心律不整應立即停止抽吸、給氧。抽痰前後給氧、單次≤10–15 秒、無菌技術都重要，但「監測血氧變化」是確保安全、避免缺氧併發症的核心。聽診呼吸音、氣切護理是輔助，給抗焦慮劑非必要。","options":{"A":"氣切造口護理是常規照護，但非抽痰當下最重要的監測。","B":"聽診呼吸音可評估抽痰需要與效果，但非最重要的安全監測。","C":"抽痰不需常規給抗焦慮劑。","D":"正解。抽痰時最重要是評估血氧變化，防缺氧併發症。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"110030-N3-24":{"quick":"CO2 過高使病人「嗜睡→更不呼吸→CO2 再升」(CO2 麻醉)最危及生命(A)。","detail":{"background":"第二型呼吸衰竭CO2 滯留時，高CO2 本身會抑制中樞使病人「嗜睡、意識下降(CO2 麻醉/CO2 narcosis)」，而嗜睡又使呼吸更慢更淺、CO2 進一步升高，形成惡性循環，最終呼吸停止——是「最可能立即危及生命」的狀況，須立即支持通氣。相對地SpO2 90%、全身虛弱、血壓160/90 雖需處理但非立即致命。故選「嗜睡導致PaCO2 再升高」。","options":{"A":"正解。CO2 升高致嗜睡→通氣更差→CO2 再升(CO2 麻醉)，最危及生命。","B":"SpO2 90% 偏低需處理，但非立即致命。","C":"主訴全身虛弱非立即危及生命。","D":"血壓160/90 偏高需觀察，非立即致命。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"110030-N3-58":{"quick":"ARDS 咳嗽無效時「進行抽痰」清除分泌物(D)。","detail":{"background":"ARDS 病人促進有效呼吸道清除：翻身拍背、姿位引流、濕化、鼓勵深呼吸與咳嗽；「若病人咳嗽無效、分泌物滯留」則「進行抽痰」直接清除。題目其他選項數值/做法不當：給氧與翻身不是「每2 小時/每4 小時」這種僵化頻率為清除分泌物的標準、且「給鎮靜劑促進休息」會抑制咳嗽與呼吸、不利清除分泌物。故正確為「咳嗽無效時進行抽痰」。","options":{"A":"「每2 小時給氧」非促進呼吸道清除的正確描述。","B":"翻身應更頻繁(常每2 小時)，「每4 小時」不足且非清除分泌物核心。","C":"鎮靜劑會抑制咳嗽與呼吸，不利分泌物清除。","D":"正解。咳嗽無效、分泌物滯留時進行抽痰清除。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"110030-N3-59":{"quick":"PaO2 50 mmHg=「嚴重缺氧(hypoxia)」需積極處理(A)。","detail":{"background":"動脈血氧分壓(PaO2)正常約80–100 mmHg。PaO2「50 mmHg」明顯低於正常，屬「嚴重缺氧(hypoxemia/hypoxia)」(一般PaO2<60 即呼吸衰竭、<40 為危急)，會威脅組織氧合，須積極處理(給氧、找原因)。故「此病人有嚴重缺氧」正確；說「不會造成威脅」「在正常範圍」皆錯；嚴重缺氧常需較積極的氧療而非僅低流量(且若是CO2 滯留型仍須謹慎控制濃度)。","options":{"A":"正解。PaO2 50 mmHg 屬嚴重缺氧，須積極處理。","B":"PaO2 50 已嚴重偏低，對病人有威脅。","C":"PaO2 50 遠低於正常(80–100)，非正常範圍。","D":"嚴重缺氧通常需較積極氧療；僅低流量未必足夠(且CO2 滯留型須謹慎控濃度)。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"110110-N3-52":{"quick":"ABG 正常(pH 7.40、PaCO2 42、HCO3 24、PaO2 80)→可考慮開始脫離呼吸器(A)。","detail":{"background":"判讀此ABG：pH 7.40、PaCO2 42、HCO3⁻ 24、PaO2 80 皆在正常範圍，代表氧合與通氣均良好。呼吸器脫離(weaning)的前提是「病因改善、ABG 可接受、自主呼吸力足夠、血流動力學穩定」，此ABG 正常符合可「考慮開始脫離」的條件(再配合自主呼吸測試SBT、RSBI 等評估)。其餘把它判讀為呼吸性酸中毒(錯，ABG 正常)或不宜脫離皆不正確。","options":{"A":"正解。ABG 各值正常，可考慮開始評估脫離呼吸器。","B":"此ABG 正常，非呼吸性酸中毒，不需先矯正。","C":"此ABG 不是呼吸性酸中毒，判讀錯誤。","D":"PaCO2 與PaO2 皆正常，無阻礙脫離的問題。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"110110-N3-54":{"quick":"「肺栓塞」不是肺泡『通氣』不足的原因(它是灌流問題)(C)。","detail":{"background":"「肺泡通氣不足(hypoventilation)」造成的呼吸衰竭，原因在「通氣幫浦或驅動」出問題：睡眠呼吸中止症(上氣道阻塞/中樞)、頸椎損傷(膈神經/呼吸肌癱瘓)、安眠藥/鎮靜劑過量(抑制呼吸中樞)等。而「肺栓塞」是「灌流(perfusion)」被栓子阻斷的問題(死腔效應、V/Q 失衡)，肺泡『通氣』本身正常，並非「通氣不足」的原因。故選肺栓塞。","options":{"A":"睡眠呼吸中止症造成通氣不足，是原因之一。","B":"頸椎損傷致呼吸肌癱瘓→通氣不足，是原因。","C":"正解(不是)。肺栓塞是「灌流」問題(死腔)，非肺泡通氣不足。","D":"安眠藥過量抑制呼吸中樞→通氣不足，是原因。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"110110-N3-58":{"quick":"肺水腫處置順序=先擺高坐臥→給氧→呼叫醫師→備抽痰(3142)(D)。","detail":{"background":"肺水腫急性處置的合理順序(立即可做、不離開病人的優先)：①「協助採高坐臥(雙腳下垂)」——立即減少靜脈回流(前負荷)、改善呼吸②「經鼻導管給氧」改善氧合③「呼叫醫師」進一步處置(利尿、嗎啡、血管擴張)④「準備床邊抽痰用物」。故順序為3→1→4→2 ……依本題選項以「3142」最適當(擺位、給氧後通知醫師，再備抽痰)。核心是「先做立即減輕症狀與給氧，再通知醫師、備物」。","options":{"A":"1234 未把「立即擺高坐臥減前負荷」放最前，非最適。","B":"1432 順序不合(擺位應更前、抽痰備物可後)。","C":"2134 先呼叫醫師而延後給病人立即處置，非最適。","D":"正解。3142＝先高坐臥→給氧→呼叫醫師→備抽痰。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"111030-N3-52":{"quick":"PEEP 主要目的=「防止吐氣時肺泡塌陷」(D)。","detail":{"background":"呼氣末正壓(PEEP)在「吐氣末」維持氣道正壓，「防止肺泡在吐氣末塌陷」、維持肺泡張開、增加功能性肺餘容量、減少肺內分流、改善氧合，是ARDS 機械通氣的核心策略。它不是用來避免肺纖維化、不是「吸氣」時帶入更多氣體(那是潮氣量/吸氣壓)、也不是把100% 氧帶入(濃度由FiO2 決定)。故主要目的為「避免吐氣時肺泡塌陷」。","options":{"A":"PEEP 不是用來避免肺纖維化。","B":"吸氣帶入氣量由潮氣量/吸氣壓決定，非PEEP 的主要作用。","C":"帶入氧濃度由FiO2 設定決定，非PEEP。","D":"正解。PEEP 防止吐氣末肺泡塌陷、維持肺泡張開。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"111030-N3-53":{"quick":"肺水腫最典型症狀=「粉紅色泡沫痰」(C)。","detail":{"background":"肺水腫(常為左心衰竭引起)使含血漿與紅血球的滲液充滿肺泡，最典型的症狀是咳出「粉紅色泡沫狀痰」，合併嚴重呼吸困難、端坐呼吸、雙肺囉音、血氧下降、焦慮冒汗。肋膜摩擦音是肋膜炎、突然胸痛較像肺栓塞/心肌梗塞、杵狀指是慢性缺氧。故肺水腫最典型為粉紅泡沫痰。","options":{"A":"肋膜摩擦音是肋膜發炎的聲音，非肺水腫典型。","B":"突然胸痛較像肺栓塞/心肌梗塞，非肺水腫最典型。","C":"正解。粉紅色泡沫痰是肺水腫最典型症狀。","D":"杵狀指是慢性缺氧的長期變化，非肺水腫急性症狀。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"111030-N3-54":{"quick":"插管後「左側呼吸音減弱、右側正常」=管子插太深進右主支氣管(B)。","detail":{"background":"氣管內插管後若聽診「左側呼吸音減弱、右側正常」，最可能是「氣管內管插入過深、滑進『右主支氣管』」——因右主支氣管較直、較陡、較粗，管子易進入，導致只通氣右肺、左肺通氣不足。處置是把管子退出至雙側呼吸音對稱(門齒約21–23 公分)並重新固定。若插到食道則『兩側』呼吸音皆無、胃部有氣過水聲。","options":{"A":"插到食道會「兩側」呼吸音皆無，非僅左側減弱。","B":"正解。插太深進右主支氣管→只通氣右肺、左側呼吸音減弱。","C":"插在氣管分叉上方應雙側對稱，不會單側減弱。","D":"左肺肺炎不會在「剛插管」即造成此單側差異(應考慮管位)。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"111030-N3-55":{"quick":"呼吸器設定間歇深呼吸(嘆息)，主要預防「肺擴張不全」(D)。","detail":{"background":"機械通氣常設定每分鐘數次較大的「深呼吸(嘆息 sigh)」，目的是定期把肺泡撐開、避免長時間固定小潮氣量造成「肺泡塌陷、肺擴張不全(atelectasis)」，並促進表面張力素分布。故其首要預防的合併症是「肺擴張不全」。氣胸反而是過大壓力/容積的風險、肺栓塞與肺炎非靠嘆息預防。","options":{"A":"過大的潮氣量/壓力才增加氣胸風險；嘆息非為防氣胸。","B":"肺栓塞非靠呼吸器嘆息預防。","C":"肺炎預防靠口腔護理、抬高床頭等，非嘆息設定。","D":"正解。間歇深呼吸(嘆息)主要預防肺擴張不全。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"111110-N3-53":{"quick":"肺水腫常為「左心衰竭」所引起(B)。","detail":{"background":"肺水腫(pulmonary edema)是「肺泡與肺間質」積液(非肋膜腔積水)，最常見原因是「左心衰竭」——左心無法把血排出，血液鬱積於肺循環使肺微血管靜水壓上升、液體滲入肺泡，咳粉紅泡沫痰、嚴重呼吸困難。處置應「減少前負荷」(高坐臥、雙腳下垂、利尿、血管擴張、嗎啡)，而非增加前負荷或抬高下肢(會增加回心血量加重肺水腫)。故正確為「常為左心衰竭引起」。","options":{"A":"肺水腫是「肺泡/間質」積液，非「肋膜腔」過度積水(那是肋膜積水)。","B":"正解。肺水腫最常由左心衰竭引起。","C":"應「減少」前負荷，非增加前負荷。","D":"下肢抬高會增加靜脈回流、加重肺水腫，應雙腳下垂。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"111110-N3-58":{"quick":"ARDS=「微血管通透性增加→肺水腫」(A)。","detail":{"background":"ARDS 的病生理核心是「肺泡-微血管膜受損、『通透性增加』」，使富含蛋白的液體滲入肺間質與肺泡，造成「非心因性肺水腫」、肺泡塌陷與透明膜形成、難治性低血氧。其他選項皆錯：肺泡是「塌陷」非過度擴張、表面張力素是「減少」非過度分泌、是肺泡塌陷/實變而非支氣管擴張。故正確為「微血管通透性增加導致肺水腫」。","options":{"A":"正解。肺泡-微血管膜通透性增加→蛋白液滲漏→肺水腫。","B":"ARDS 肺泡「塌陷」、阻力上升，非過度擴張使阻力下降。","C":"表面張力素「減少」(第二型細胞受損)，非過度分泌。","D":"ARDS 是肺泡塌陷/實變，非支氣管擴張。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"112030-N3-57":{"quick":"心衰＋氣血胸＋呼吸衰竭者「不宜常規給全血」(易加重心衰/肺水腫)(C)。","detail":{"background":"此病人有「心衰竭病史」並出現急性呼吸衰竭。護理：①給止痛使能深呼吸、避免肺擴張不全(合理)②給氧改善氧合(FiO2 60%，合理)③飲食低醣高蛋白以減少CO2 產生(合理)。但「給全血避免血色素低下」對「有心衰竭」的病人最不適宜——大量輸『全血』會增加循環容量、加重心臟負荷與肺水腫風險(若真需提升攜氧應輸『濃縮紅血球』並謹慎控速)。故最不適宜為「給全血」。","options":{"A":"給止痛使能深呼吸、避免肺擴張不全，適宜。","B":"給氧FiO2 60% 改善氧合，適宜。","C":"最不適宜(本題選此)。心衰者輸全血增加容量負荷、加重肺水腫。","D":"低醣高蛋白飲食減少CO2 產生，適宜。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"112110-N3-56":{"quick":"誘發ARDS 最常見的危險因子是「敗血症/敗血性休克」(A)。","detail":{"background":"ARDS 的危險因子分「直接肺損傷」(肺炎、吸入、肺挫傷)與「間接(肺外)」(敗血症、大量輸血、胰臟炎、休克)。其中「敗血症(敗血性休克)」是「最常見」的誘發因子——全身性發炎反應釋放介質損傷肺泡-微血管膜。COPD、氣喘、心衰竭並非ARDS 的常見誘因(心衰造成的是『心因性』肺水腫，與ARDS 不同)。故最常見危險因子為敗血性休克。","options":{"A":"正解。敗血症/敗血性休克是誘發ARDS 最常見的危險因子。","B":"COPD 是慢性阻塞性肺病，非ARDS 的常見誘因。","C":"氣喘非ARDS 的常見誘發因子。","D":"心衰竭造成的是心因性肺水腫，非ARDS。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"112110-N3-76":{"quick":"鼻咽人工氣道尺寸=量「鼻尖到耳垂」的距離(C)。","detail":{"background":"鼻咽人工氣道(nasopharyngeal airway)的「長度」選擇，以「鼻尖到耳垂(同側鼻孔到耳垂)」的距離為量測依據；口咽人工氣道則量「嘴角到耳垂(或下顎角)」。長度合適才能末端落在咽部適當位置、有效暢通氣道又不刺激會厭。管徑則約與病人小指或鼻孔相當。故鼻咽人工氣道量「鼻尖至耳垂」。","options":{"A":"「嘴角至耳垂」是口咽人工氣道的量測法。","B":"「嘴角至下顎角」非鼻咽人工氣道的標準量法。","C":"正解。鼻咽人工氣道量「鼻尖至耳垂」的距離。","D":"「鼻孔至下顎角」非標準量測法。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"112180-N3-35":{"quick":"ABG 為代償性呼吸性酸中毒但氧合尚可→最優先「翻身、鼓勵深呼吸咳嗽」改善通氣(D)。","detail":{"background":"判讀ABG：pH 7.36(正常低限)、PaCO2 50(偏高)、HCO3⁻ 25、PaO2 88(尚可)→「(部分代償的)呼吸性酸中毒、CO2 略滯留但氧合尚可、pH 仍在正常邊緣」，屬可先以護理改善通氣的情況。最優先且護理師可立即執行的是「協助翻身、鼓勵深呼吸與有效咳嗽」促進通氣、排出CO2 與分泌物。pH 與PaO2 尚可、不需立即通報醫師或急著戴氧氣/再測血氧(已有ABG)。","options":{"A":"pH 仍在正常邊緣、氧合尚可，不需立即通報醫師。","B":"PaO2 88 氧合尚可，非首要戴氧氣鼻套管。","C":"已有ABG，不需立即再用脈衝式血氧儀。","D":"正解。最優先協助翻身、鼓勵深呼吸咳嗽，改善通氣排CO2。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"112180-N3-36":{"quick":"抽痰管插入深度過深(15–20 公分)不適當，應只到適當深度(C)。","detail":{"background":"氣切造口抽痰原則：①抽吸壓力約120–150 mmHg(成人)合理②抽吸前先給氧30–60 秒(預充氧)合理③抽痰完成後聽診呼吸音評估效果合理④「抽痰管插入深度」應到「感到阻力或約氣切套管末端／略過末端」即可(常約氣切管長加少許)，「插入15–20 公分過深」會刺激氣管隆突、造成黏膜損傷與劇咳缺氧，不適當。故C 為不適當。","options":{"A":"抽吸壓力120–150 mmHg(成人)合理，適當。","B":"抽吸前給氧30–60 秒預充氧，適當。","C":"不適當(本題選此)。插入15–20 公分過深，會傷氣管黏膜、刺激隆突。","D":"抽痰後聽診呼吸音評估效果，適當。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"113100-N3-36":{"quick":"PEEP 不會「改善血管通透性」(那是ARDS 病變本身)，此為錯誤目的(C)。","detail":{"background":"ARDS 用PEEP 的目的：①「減少肺內分流」②「減少肺泡塌陷、維持肺泡張開」③「改善氧合」。PEEP「無法改善(修復)肺泡-微血管膜的『通透性』」——通透性增加是ARDS 的病理本質，PEEP 只是把塌陷肺泡撐開改善氧合，並不能逆轉血管通透性。故「改善血管的通透性」是PEEP 的「錯誤」目的，為本題答案。","options":{"A":"PEEP 減少肺內分流，是其正確目的。","B":"PEEP 減少肺泡塌陷，是其正確目的。","C":"錯誤(本題選此)。PEEP 不能改善血管通透性(那是病變本質)。","D":"PEEP 改善氧合，是其正確目的。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"114030-N3-33":{"quick":"ARDS=「肺泡-微血管膜通透性受損→肺水腫」(D)。","detail":{"background":"ARDS 的本質是「肺泡-微血管膜通透性受損」，使富含蛋白的液體滲入肺泡造成「非心因性肺水腫」、肺泡塌陷與難治性低血氧。選項A(外分泌腺異常黏液聚集)描述的是囊狀纖維化、B(肺病致右心肥厚)是肺心症、C(肋膜腔積氣致肺塌陷)是氣胸，皆非ARDS。故正確為「肺泡微血管膜通透性受損而產生肺水腫」。","options":{"A":"外分泌腺異常黏液聚集是囊狀纖維化，非ARDS。","B":"肺病致右心肥厚是肺心症，非ARDS。","C":"肋膜腔積氣致肺塌陷是氣胸，非ARDS。","D":"正解。ARDS 是肺泡-微血管膜通透性受損→肺水腫。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"114030-N3-35":{"quick":"給氧裝置中「非再吸入面罩」可提供最高FiO2(約90–100%)(D)。","detail":{"background":"常見給氧裝置可達的最高吸入氧濃度(FiO2)由低到高：鼻套管(約24–44%)＜單純面罩(約40–60%)＜凡德里(Venturi)面罩(精確但低～中等，約24–50%)＜「非再吸入面罩(non-rebreather mask，有儲氧袋＋單向瓣)約90–100%」。故能提供「最高」FiO2 的是非再吸入面罩，適合短期需高濃度氧的危急低血氧者。","options":{"A":"凡德里面罩提供精確但低～中等濃度(約24–50%)，非最高。","B":"單純面罩約40–60%，非最高。","C":"氧氣鼻套管濃度最低(約24–44%)。","D":"正解。非再吸入面罩可達約90–100%，FiO2 最高。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"114100-N3-34":{"quick":"表面張力素細胞受損→肺泡塌陷→「肺擴張不全」(B)。","detail":{"background":"ARDS 中「第二型肺泡細胞(分泌表面張力素 surfactant)」受損，表面張力素減少使肺泡表面張力上升、肺泡傾向塌陷，造成「廣泛性肺擴張不全(atelectasis)」、順應性下降與難治性低血氧。故表面張力素細胞受損導致的是「肺擴張不全」。它不是造成支氣管收縮(那是氣喘)、肺栓塞或肺纖維化(纖維化是後期修復變化)。","options":{"A":"支氣管收縮是氣喘機轉，非表面張力素不足的結果。","B":"正解。表面張力素減少→肺泡塌陷→肺擴張不全。","C":"肺栓塞是血流灌注問題，與表面張力素無關。","D":"肺纖維化是ARDS 後期修復變化，非表面張力素細胞受損的「直接」結果。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"114100-N3-35":{"quick":"脈搏血氧儀(SpO2)正常=「95～100%」(D)。","detail":{"background":"脈搏血氧測量儀(pulse oximetry)測的是「血氧飽和度(SpO2)」，以「百分比(%)」表示，正常約「95–100%」(<90% 為低血氧需處理)。注意與「動脈血氧分壓PaO2(以mmHg 表示、正常80–100)」區分——本題問SpO2，故正常值為「95–100%」(單位是%)。選項用mmHg 或80–90% 皆不符。","options":{"A":"80–90 mmHg 是PaO2 的單位/偏低值，非SpO2。","B":"95–100 mmHg 用錯單位(SpO2 應為%)。","C":"80–90% 屬偏低的SpO2，非正常。","D":"正解。SpO2 正常為95–100%。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"114170-N3-33":{"quick":"評估「氧合與通氣」最適當=「動脈血液氣體分析(ABG)」(A)。","detail":{"background":"急性呼吸衰竭要同時評估「氧合(PaO2)與通氣(PaCO2)及酸鹼(pH)」，最適當、最完整的是「動脈血液氣體分析(ABG)」——可一次得到PaO2、PaCO2、pH、HCO3⁻、SaO2，判定呼吸衰竭型別(低氧型/高碳酸型)與酸鹼狀態。脈搏血氧儀只測SpO2(僅氧合、不知CO2)、胸部X 光看結構、血流動力學監測看循環，皆無法同時評估氧合與通氣。故選ABG。","options":{"A":"正解。ABG 可同時評估氧合(PaO2)與通氣(PaCO2)及酸鹼。","B":"血流動力學監測評估循環，非氧合與通氣。","C":"胸部X 光看肺結構，不能評估氧合與通氣數值。","D":"脈搏血氧儀只測SpO2(氧合)，無法得知PaCO2(通氣)。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"115030-N3-33":{"quick":"本題送分：呼吸器「高壓警報」可由積水、咬管/痰阻、氣胸引起，鬆脫/漏氣屬低壓——選項涵蓋不一致故全給分。","detail":{"background":"本題經評定為「送分」。呼吸器「高壓力警報」的原因應為氣道阻力或順應性「增加」：管路『積水』、扭結、分泌物阻塞或咬管、支氣管痙攣、『氣胸』、人機對抗。而「管路鬆脫」「氣囊漏氣」造成的是「低壓力」警報(漏氣)。本題選項同時混入屬「低壓」原因的鬆脫/漏氣與屬「高壓」的積水/氣胸，分類不一致，故全部給分。臨床判斷仍應依高壓/低壓警報分別處理。","options":{"A":"管路積水會增加阻力→屬「高壓」警報的原因。","B":"管路鬆脫是「低壓(漏氣)」警報原因，與高壓不符(本題仍給分)。","C":"氣囊漏氣屬「低壓(漏氣)」警報原因(本題仍給分)。","D":"氣胸使順應性驟降→屬「高壓」警報的原因。(本題送分)"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}},"115030-N3-34":{"quick":"早期氧合不足最可能=「躁動不安」(B)。","detail":{"background":"早期(輕度)氧合不足(缺氧)時，因腦部對缺氧敏感與交感代償，最早出現的是「躁動不安、焦慮、注意力不集中、判斷力下降」等神經行為改變，以及心搏「過速」、呼吸加快、血壓略升。發紺、低血壓、心搏過緩都是「晚期、嚴重」缺氧的表現。故早期最可能為「躁動不安」。臨床上病人突然躁動應先想到缺氧並測血氧。","options":{"A":"發紺是「晚期」嚴重缺氧表現，非早期。","B":"正解。躁動不安是早期氧合不足最可能的徵象。","C":"低血壓是晚期缺氧的表現。","D":"心搏過緩是嚴重/晚期缺氧表現；早期多為心搏過速。"},"sources":["新文京《內外科護理學》呼吸系統—呼吸衰竭、ARDS 與呼吸器照護","基礎護理學—氧療與抽痰"]}}},TO=["R1肺炎與下呼吸道感染", "R2肺結核", "R3慢性阻塞性肺疾病", "R4氣喘", "R5肺癌與肺部腫瘤", "R6肋膜疾病氣胸與胸腔引流", "R7間質職業性肺病與支氣管擴張", "R8呼吸衰竭重症與呼吸器氧療", "R9肺血管疾病", "R10呼吸系統評估診斷與其他"],LEC={"R1肺炎與下呼吸道感染":{"title":"R1 肺炎與下呼吸道感染 複習講義","html":"<h3>一、肺炎概念與分類</h3>\n<p>肺炎是肺「實質(肺泡)」的急性感染發炎，肺泡內充滿發炎滲出液→「實質化(consolidation)」。依場所分社區型(CAP，最常見肺炎鏈球菌)、醫院型(HAP)、呼吸器相關(VAP)、吸入性。下呼吸道感染還含急性支氣管炎(多病毒、自限、支持療法)、肺膿瘍(肺實質化膿空洞、惡臭膿痰)、膿胸(膿積在<b>肋膜腔</b>，非肺實質)。</p>\n<h3>二、實質化四徵(理學評估)</h3>\n<p>肺泡實質化使傳音變好：①<b>觸覺震顫增強</b> ②叩診<b>濁音</b> ③聽診支氣管呼吸音＋爆裂音 ④語音傳導增強(支氣管語音、羊鳴音)。與「過度充氣」(氣胸/肺氣腫：過度反響音、震顫減弱)相反。療效好轉時這些異常逆轉(濁音→反響音、退燒、痰減少、X光浸潤吸收)。</p>\n<h3>三、臨床表徵與診斷</h3>\n<p>發燒、咳嗽、膿痰、呼吸急促、胸痛、低血氧；<b>老人非典型→意識混亂</b>。缺氧最早腦部表現是「<b>躁動不安</b>」。必要診斷檢查＝<b>胸部X光＋痰液檢查</b>(CT、PFT 非必要)。給抗生素「前」一定先採血/痰培養。</p>\n<h3>四、護理重點</h3>\n<p>痰黏咳不出→<b>補足水分(2000–3000 mL)＋教有效咳嗽</b>＋濕化＋物理治療(勿限水)。單側肺炎擺位採<b>健側在下、患側朝上(半坐臥)</b>促患側擴張。預防吸入性肺炎：床頭抬高30–45 度、餐後勿立刻平躺、評估作嘔反射、監測胃殘餘量。療效以退燒＋痰減少判斷。</p>"},"R2肺結核":{"title":"R2 肺結核 複習講義","html":"<h3>一、致病與傳染</h3>\n<p>結核分枝桿菌(抗酸菌 AFB)經「<b>飛沫核(空氣)</b>」傳染，非無生命物品。原發感染多潛伏，PPD 約感染後 6–8 週轉陽。治癒後<b>不會終生免疫</b>，仍可再感染復發。屬<b>第三類法定傳染病(一週內通報)</b>；MDR-TB 屬第二類(24 小時內通報)。</p>\n<h3>二、診斷</h3>\n<p>PPD(結核菌素皮膚測試)：看「<b>硬結</b>」非紅腫，一般≧10 mm 陽性(免疫低下≧5 mm)，只代表「曾受感染」。痰「<b>抗酸菌(耐酸菌)染色抹片</b>」快速、判斷傳染力(革蘭氏染色不適用)；痰「<b>培養</b>」是確診金標準(最準確)。活動期看夜間盜汗、發燒、體重減輕、咳血。</p>\n<h3>三、第一線藥物(RIPE)與副作用</h3>\n<p><b>I</b>NH→周邊神經病變(併B6)、肝毒性；<b>R</b>IF(Rifampin)→體液<b>橙紅色</b>、肝毒性、酵素誘導；<b>E</b>MB(Ethambutol)→<b>視神經炎(視力模糊、紅綠色盲)</b>，監測視力；<b>P</b>ZA→<b>高尿酸</b>、肝毒性。三者(I/R/P)需監測肝功能，<b>EMB 監測視力</b>。潛伏結核/預防性治療用<b>單一 INH</b>。MDR-TB＝同時對 <b>INH＋RIF</b> 抗藥。</p>\n<h3>四、護理重點</h3>\n<p>具傳染力期需「<b>空氣(呼吸道)隔離</b>」(負壓室、N95)。傳染力解除＝<b>連續痰 AFB 陰性</b>(非X光、非服藥滿月數)。順從性差→<b>直接觀察治療(DOTS)</b>由人監督服藥。出院衛教核心＝「<b>必須完成整個療程才停藥</b>」，勿症狀好就停。</p>"},"R3慢性阻塞性肺疾病":{"title":"R3 慢性阻塞性肺疾病(COPD) 複習講義","html":"<h3>一、概念與分型</h3>\n<p>COPD 是「不可逆」氣流受限的阻塞型肺病，含「肺氣腫(肺泡壁破壞、彈性喪失、氣陷)」與「慢性支氣管炎(杯狀細胞↑、纖毛↓、黏液多)」。α1-抗胰蛋白酶缺乏→早發肺氣腫。長期缺氧→肺血管收縮→肺高壓→<b>肺心症(右心衰：頸靜脈怒張、下肢水腫)</b>。</p>\n<h3>二、肺功能與分級</h3>\n<p>阻塞標誌＝<b>FEV1/FVC 下降(<70%)</b>；最早、最敏感的變化是<b>FEV1 下降</b>。肺氣腫：TLC↑、RV↑、VC↓、FEV1↓、FEV1/FVC↓。GOLD 1–4 級依「<b>FEV1% 預測值</b>」。</p>\n<h3>三、氧療(關鍵)</h3>\n<p>CO2 滯留型 COPD 呼吸驅動部分靠低血氧，<b>須低濃度、低流量(1–2 L 或 Venturi 24–28%)，目標 SaO2 約 88–92%、PaO2 約 55–65</b>。給高濃度氧→抑制呼吸驅動→<b>CO2 麻醉</b>。Venturi 面罩特點＝濃度精確。長期居家氧療可降低肺血管阻力、改善肺心症與存活。</p>\n<h3>四、呼吸技巧與生活</h3>\n<p><b>噘嘴呼吸</b>＝製造呼氣末正壓、防氣道塌陷、促完整吐氣、減少 CO2 滯留；<b>橫膈式呼吸</b>＝增加有效潮氣容積、降低呼吸作功、增加活動耐力。飲食<b>少量多餐、減少碳水(產 CO2 多)、足夠蛋白、易咀嚼</b>；進食時面罩改鼻導管。<b>戒菸</b>是最重要可改變因子，每年打流感疫苗。出現<b>使用呼吸輔助肌</b>＝呼吸窘迫須優先處理。</p>"},"R4氣喘":{"title":"R4 氣喘 複習講義","html":"<h3>一、概念</h3>\n<p>氣喘是慢性氣道發炎與<b>可逆</b>性支氣管痙攣(第I 型 IgE 媒介過敏；介質含組織胺、緩激肽、白三烯素 SRS-A；淋巴激活素屬第IV 型)。最典型呼吸音＝<b>喘鳴(wheeze，呼氣相)</b>。</p>\n<h3>二、藥物</h3>\n<p><b>緩解(急救)藥＝短效 β2 興奮劑(SABA)</b>；<b>控制(預防)藥＝吸入型類固醇(ICS)</b>，用後<b>須漱口</b>防口腔念珠菌與聲沙、非急救用、不可驟停。β2 興奮劑(如 fenoterol)有 β1 作用→<b>心悸、心律不整</b>。茶鹼(Aminophylline)治療濃度 <b>10–20 μg/mL</b>(>20 中毒)、靜注不可過快。氣喘者<b>避用 β 阻斷劑</b>(誘發支氣管痙攣)。</p>\n<h3>三、尖峰呼氣流速(PEFR)監測</h3>\n<p>反映「氣道阻塞程度」。操作：站立、深吸飽氣、含緊吹口、用力快吐、連續 3 次取<b>最高值</b>。三色區：綠燈≥80%(良好)、黃燈 50–80%(警戒)、紅燈<50%(嚴重發作須立即就醫)。MDI 使用＝<b>緩慢深吸氣</b>(非快速)、吸後閉氣 5–10 秒、含類固醇者漱口。</p>\n<h3>四、控制程度(GINA)</h3>\n<p>過去 4 週看四項：①日間症狀>2 次/週 ②任何夜間醒來 ③緩解藥>2 次/週 ④活動受限。符合 0＝良好、1–2＝部分控制、3–4＝控制不佳。<b>夜間因氣喘醒來代表控制不佳</b>。</p>"},"R5肺癌與肺部腫瘤":{"title":"R5 肺癌與肺部腫瘤 複習講義","html":"<h3>一、分類與特性</h3>\n<p>分小細胞肺癌(SCLC)與非小細胞肺癌(NSCLC：腺癌最常見、鱗狀細胞癌、大細胞癌)。<b>小細胞肺癌生長最快、最惡性、最早轉移、預後最差，但對化放療最敏感</b>(以化放療為主)；NSCLC 早期以手術切除為主。常合併副腫瘤症候群(SIADH、ACTH)。常見轉移：<b>腦、骨、肝、腎上腺</b>(胰臟非常見)。</p>\n<h3>二、手術與術後擺位</h3>\n<p>手術適合早期(I–II/部分IIIA)，IIIB 以上多非手術。術前評估心肺功能與預估術後 FEV1。<b>肺葉/肺節/楔形切除術後需放胸管水下引流</b>(剩餘肺要復張)；<b>全肺切除(pneumonectomy)術後較少用胸腔引流</b>(避免抽吸造成縱膈移位、讓空腔被滲液填滿)。</p>\n<h3>三、擺位重點(易混)</h3>\n<p><b>肺葉切除</b>後採半坐臥或「健側在下、患側朝上(右肺葉切除→左側臥)」使殘餘肺葉擴張。<b>全肺切除</b>後則避免完全側臥於健側(壓迫唯一的肺)，採背臥或術側臥。術前教腹式深呼吸(吐氣較長)、術後用誘發性肺量計、鼓勵肩臂運動。</p>"},"R6肋膜疾病氣胸與胸腔引流":{"title":"R6 肋膜疾病、氣胸與胸腔引流 複習講義","html":"<h3>一、肋膜積水(滲出 vs 漏出)</h3>\n<p><b>滲出液(exudate)</b>＝發炎/感染/腫瘤→通透性增加：蛋白>3 g/dL、比重>1.018、Rivalta 陽性、細胞多、色深；<b>漏出液(transudate)</b>＝靜水壓/膠體滲透壓改變(心衰、肝腎)：清澈、蛋白<3、比重<1.015。理學：積水區叩診<b>濁音</b>、呼吸音減弱、震顫減弱、X 光肋膜橫膈角變鈍。放液姿勢＝<b>坐直、頭手趴床旁桌</b>；一次放液過多(>1000–1500 mL)→<b>復張性肺水腫</b>。</p>\n<h3>二、氣胸與連枷胸</h3>\n<p>氣胸：患側肺塌陷→呼吸音減弱/消失、<b>過度反響音</b>、震顫減弱。原發自發性氣胸好發<b>年輕瘦高男性抽菸者</b>(肺尖氣泡破裂)；COPD 為續發。<b>張力性氣胸</b>＝氣管偏向健側、低血壓→立即<b>針刺減壓</b>。<b>連枷胸</b>(多肋多處骨折)＝<b>奇異性呼吸</b>(吸氣內陷、吐氣外突)。皮下氣腫＝觸診捻髮感(crepitus)。肋骨骨折＝淺呼吸、吸氣痛。</p>\n<h3>三、胸腔水下引流(高頻考點)</h3>\n<p>位置：<b>排氣管放高位(前胸第2 肋間)、排液管放低位(腋中線第8–9 肋間)</b>。正常＝水封瓶玻管液面<b>隨呼吸上下移動(tidaling)</b>；<b>持續性氣泡＝漏氣(異常)</b>→先檢查各連接處。<b>不可常規夾管</b>(會致張力性氣胸)；接頭鬆脫→止血鉗夾管；整支脫出→凡士林密封敷料蓋傷口。負壓引流時抽吸控制瓶持續抽吸。拔管時請病人<b>深吸氣後閉氣(Valsalva)</b>，拔後凡士林紗布密封。</p>"},"R7間質職業性肺病與支氣管擴張":{"title":"R7 間質職業性肺病與支氣管擴張 複習講義","html":"<h3>一、肺塵症(職業性間質纖維化)</h3>\n<p>長期吸入無機粉塵→瀰漫性間質纖維化，屬「<b>限制型</b>」肺病：肺<b>順應性下降、肺容積減少</b>、彌散下降。好發部位：煤末沈著(anthracosis)、矽肺主要在「<b>上葉</b>」；石綿沈著(asbestosis)為「<b>下葉</b>」瀰漫纖維化＋肋膜斑塊，增加肺癌/間皮瘤風險(非「結節」變化，結節是矽肺特徵)。</p>\n<h3>二、支氣管擴張症</h3>\n<p>支氣管壁因「<b>反覆感染</b>」破壞→<b>不可逆擴張</b>。特徵：慢性咳嗽合併<b>大量膿痰(靜置分三層：泡沫/清澈/膿)</b>、反覆感染、咳血、杵狀指。出現<b>明顯咳血</b>須盡速就醫(慎防大咳血)。</p>\n<h3>三、肺擴張不全(atelectasis)</h3>\n<p>肺泡塌陷、含氣減少(分泌物阻塞、術後深呼吸不足、外壓)。理學：<b>呼吸音減弱、叩診濁音、氣管牽引向患側、震顫減弱、呼吸快而淺</b>。護理：深呼吸、誘發性肺量計、咳痰、活動、姿位引流促復張。</p>"},"R8呼吸衰竭重症與呼吸器氧療":{"title":"R8 呼吸衰竭、ARDS 與呼吸器氧療 複習講義","html":"<h3>一、呼吸衰竭分型</h3>\n<p>第一型(低氧型)：PaO2 低、CO2 不高(換氣灌流失衡，如 ARDS、肺水腫、PE)；第二型(高碳酸型)：<b>PaCO2 升高＋低血氧</b>(通氣不足：胸傷多肋骨折、神經肌肉病變、安眠藥過量、嚴重 COPD)。<b>CO2 麻醉</b>＝高 CO2 致嗜睡→更不呼吸→CO2 再升(最危及生命)。缺氧<b>早期＝躁動不安/意識混亂</b>，發紺/低血壓/心搏過緩屬晚期。</p>\n<h3>二、ARDS</h3>\n<p>核心＝「<b>肺泡-微血管膜通透性增加→非心因性肺水腫</b>」＋第二型細胞受損→<b>表面張力素↓→肺泡塌陷</b>。最常見誘因＝<b>敗血症</b>。Berlin 診斷：急性、<b>兩側</b>瀰漫浸潤(白肺)、PaO2/FiO2≤300/≤200、PCWP≤18(非心因)、<b>難治性低血氧</b>、FRC 下降。通氣用<b>容積週期型＋低潮氣量＋PEEP</b>。<b>PEEP</b>＝防吐氣末肺泡塌陷、減少分流、改善氧合、增加 FRC、減少靜脈回流(不能改善血管通透性)。</p>\n<h3>三、氧療與裝置</h3>\n<p>鼻導管估算：1 L≈24%，每增 1 L 約加 4%(3 L≈32%、4 L≈36%)。<b>非再吸入面罩 FiO2 最高(90–100%)</b>，適短期高氧；Venturi 精確。脈搏血氧儀(SpO2)正常 95–100%、低血壓會干擾判讀。評估氧合與通氣最完整＝<b>ABG</b>。</p>\n<h3>四、呼吸器與抽痰</h3>\n<p>氣管內管深度約 21–23 cm、氣囊壓 <b>20–25 mmHg</b>；確認位置＝<b>聽診雙側呼吸音＋capnography</b>；插太深進右主支氣管→<b>左側呼吸音減弱</b>。警報：<b>高壓＝阻塞</b>(扭結/痰/咬管/氣胸)、<b>低壓＝漏氣脫接</b>。脫離時出現呼吸肌疲乏→<b>接回呼吸器</b>。抽痰：單次≤10–15 秒、前後給氧、血氧/心律惡化即停。肺水腫＝<b>高坐臥(腳下垂)、給氧、減前負荷</b>(勿抬腿)。</p>"},"R9肺血管疾病":{"title":"R9 肺血管疾病 複習講義","html":"<h3>一、肺栓塞(PE)概念</h3>\n<p>血栓(多來自下肢深部靜脈 DVT)阻塞肺動脈→通氣灌流失衡。屬「<b>死腔效應</b>」：肺泡有通氣但該區<b>血流灌注受阻</b>(與「分流＝有灌流無通氣」相反)。Virchow 三要素：血流滯留、內皮受損、高凝。</p>\n<h3>二、臨床與診斷</h3>\n<p>典型「<b>突然</b>」呼吸困難、胸膜性胸痛、心搏<b>過速</b>(過緩最不可能)、呼吸過速、低血氧、焦慮、咳血。ABG＝<b>低血氧＋呼吸性鹼中毒</b>(過度換氣，pH↑、PaCO2↓、PaO2↓)。大範圍 PE→肺血管阻力暴增→肺高壓→<b>急性右心衰竭</b>、低血壓休克。</p>\n<h3>三、治療與護理</h3>\n<p><b>抗凝</b>(肝素→口服)：只防新血栓、<b>不能溶解既有血栓</b>；肝素監測 aPTT 維持正常值<b>1.5–2.5 倍</b>，解毒劑魚精蛋白。<b>血栓溶解劑(streptokinase/t-PA)</b>用於發病早期(約72 小時內)大範圍 PE「溶解血塊」。<b>Warfarin</b>監測 PT/INR(目標 2–3)、<b>避免大量維生素 K 食物</b>(花椰菜/菠菜會拮抗)、觀察出血、不能溶栓。反覆 PE 或抗凝禁忌→下腔靜脈過濾器。<b>預防＝避免久坐久臥、勿翹腳交叉腿、早期活動、彈性襪</b>。</p>"},"R10呼吸系統評估診斷與其他":{"title":"R10 呼吸系統評估、診斷與其他 複習講義","html":"<h3>一、身體評估</h3>\n<p>實質化(肺炎)：震顫增強、濁音、支氣管呼吸音、語音傳導增強(<b>支氣管語音 bronchophony＝聽到說話字音清楚</b>、羊鳴音 E→A、耳語胸語音)。過度充氣(氣胸/肺氣腫)：過度反響音、震顫減弱。呼吸道狹窄(上呼吸道阻塞)→<b>喘鳴(stridor)</b>。長期缺氧→<b>杵狀指(角度≥180 度)</b>。費力呼氣主要用<b>腹肌</b>。</p>\n<h3>二、肺功能與呼吸調節</h3>\n<p><b>肺活量(VC)</b>＝最大吸氣後能呼出的最大量。評估氣道阻塞嚴重度最重要＝<b>FEV1</b>。正常生理下刺激呼吸中樞主要物質＝<b>CO2(及 pH)</b>(低血氧為次要驅動)。</p>\n<h3>三、酸鹼平衡(高頻)</h3>\n<p>呼吸性酸中毒＝<b>通氣不足、CO2 滯留</b>(COPD 吸太多氧、術後不敢咳、腹脹、橫膈傷)；呼吸性鹼中毒＝<b>過度換氣</b>(焦慮、敗血症早期、低血氧、機械過度換氣；大量輸全血是「代謝性」鹼中毒)，處置以<b>紙袋重複呼吸</b>回吸 CO2。代謝性酸中毒(快深 Kussmaul 呼吸)＝腹瀉、DKA、腎衰；代謝性鹼中毒＝嘔吐、利尿。庫斯莫爾呼吸＝<b>快而深</b>。</p>\n<h3>四、支氣管鏡檢查後護理</h3>\n<p>喉部局麻會抑制作嘔反射，故檢查後<b>禁食/進食前先確認作嘔反射恢復</b>，防嗆咳誤吸；採半坐臥；微量血絲痰常見可觀察。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^R(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n3_resp_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
