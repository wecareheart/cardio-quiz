"topic_num":5,"topic":"出血、血小板與凝血疾病","answer_status":"normal","q_num":129,"src":"113合併卷"},{"num":133,"answer":"C","stem":"一位65歲病人因腹痛被送到急診室,電腦斷層顯示retroperitoneal hematoma。抽血檢查顯示Hb 10 gm/dL,WBC 10500/μL,platelet 165 K/μL;PT INR 1.1,aPTT 40” (正常對照27”),mixing test與正常 血漿混合後aPTT 37”。這位病人腹部出血的原因最可能為?","options":{"A":"Hereditary factor VIII deficiency。","B":"Hereditary factor VII deficiency。","C":"Acquired inhibitor to factor VIII。","D":"Acquired inhibitor to factor VII。","E":"Antiphospholipid antibody syndrome。"},"id":"114-133","roc_year":114,"source":"114合併PDF","topic_num":5,"topic":"出血、血小板與凝血疾病","answer_status":"normal","q_num":133,"src":"114合併卷"},{"num":15,"answer":"E","stem":"有關抗凝血劑的解藥(antidote)下列何者錯誤?","options":{"A":"Heparin的antidote是protamine","B":"Warfarin的antidote是vitamin K","C":"Dabigatran的antidote是idarucizumab","D":"Rivaroxaban的antidote是andexanet","E":"Apixaban的antidote是idarucizumab"},"id":"109-15","roc_year":109,"source":"109合併PDF","topic_num":6,"topic":"血栓、抗凝與疫苗相關血栓","answer_status":"normal","q_num":15,"src":"109合併卷"},{"num":82,"answer":"C","stem":"接種腺病毒載體SARS-COV-2疫苗偶發血栓性血小板低下(thrombotic thrombocytopenia),以下描述何者 錯誤?","options":{"A":"大多發生於接種疫苗後5至30天。","B":"常見腦靜脈血栓、腹腔內靜脈血栓或肺栓塞。","C":"表現與heparin-induced thrombocytopenia很像,與病人最近有使用heparin有關。","D":"病人血清中可測到對抗血小板第4因子(platelet factor 4)的血小板活化抗體,該抗體可經由與血小 板Fcγ接受器而活化血小板。","E":"治療建議以nonheparin抗凝血劑或IVIG。"},"id":"110-82","roc_year":110,"source":"110合併PDF","topic_num":6,"topic":"血栓、抗凝與疫苗相關血栓","answer_status":"normal","q_num":82,"src":"110合併卷"},{"num":113,"answer":"B","stem":"一位30歲女性打完COVID-19疫苗10天後開始頭痛,經檢查後確定有疫苗引起血栓塞(thrombosis),下列 何種疫苗較易引起此副作用?","options":{"A":"核酸疫苗(mRNA Vaccine)。","B":"病毒載體疫苗(Viral Vector Vaccine)。","C":"蛋白質次單位疫苗(Protein Subunit Vaccine)。","D":"不活動疫苗(Inactivated Vaccine)。","E":"減毒疫苗(Live- Attenuated Vaccine)。"},"id":"111-113","roc_year":111,"source":"111合併PDF","topic_num":6,"topic":"血栓、抗凝與疫苗相關血栓","answer_status":"normal","q_num":113,"src":"111合併卷"},{"num":114,"answer":"B","stem":"承接上題,此病人因疫苗引起的栓塞其機轉與下列何種血液細胞的成份抗體有關?","options":{"A":"白血球(Leukocyte)。","B":"血小板(Platelet)。","C":"淋巴球(Lymphocyte)。","D":"巨噬細胞(Macrophage)。","E":"嗜伊紅性白血球(Eosinophil)。"},"id":"111-114","roc_year":111,"source":"111合併PDF","topic_num":6,"topic":"血栓、抗凝與疫苗相關血栓","answer_status":"normal","q_num":114,"src":"111合併卷"},{"num":133,"answer":"C","stem":"未曾注射過heparin之病人,注射heparin後引發血小板低下(Heparin induced thrombocytopenia)最常出現 的時間為heparin 注射後","options":{"A":"1天內。","B":"1至3天。","C":"5至10天。","D":"14至28天。","E":"1個月後。"},"id":"111-133","roc_year":111,"source":"111合併PDF","topic_num":6,"topic":"血栓、抗凝與疫苗相關血栓","answer_status":"normal","q_num":133,"src":"111合併卷"},{"num":113,"answer":"A","stem":"一位64歲男性施打COVID-19 AZ疫苗7天後發生發燒,反應遲鈍及肚子痛,到醫院急診實驗室檢查顯示血 小板下降,腎功能下降,皮質酮(cortisol)低,電腦斷層掃描顯示多處動脈及靜脈栓塞,下列檢查那些是最 適合本疾病 ?(1) 纖維蛋白溶解(D-Dimer) (2) 抗血小板因子4抗體anti-PF4-IgG (anti-Platelet-Factor IgG antibodies) (3) 紅血球下降速度(ESR) (4) C-反應蛋白(CRP) (5) 紅血球數目(RBC)","options":{"A":"(1)+(2)。","B":"(1)+(3)。","C":"(1)+(4)。","D":"(2)+(5)。","E":"(2)+(4)。"},"id":"113-113","roc_year":113,"source":"113合併PDF","topic_num":6,"topic":"血栓、抗凝與疫苗相關血栓","answer_status":"normal","q_num":113,"src":"113合併卷"},{"num":146,"answer":"A","stem":"72歲男性,有高血壓、糖尿病與心房顫動病史,過去一年持續規則服用 apixaban 5 mg BID。因下週預計 接受大腸鏡檢查與多顆息肉切除,來門診諮詢抗凝血藥物的處理建議。無腎功能異常,無出血病史。關於 此病人抗凝藥物的「停藥與復藥」原則,何者正確? (1) Apixaban 建議於術前 48 小時停用 (2) Apixaban 復藥時可直接使用原劑量 (3) 術前應考慮使用 heparin bridging 避免中風風險 (4) Apixaban 應於術後至少 7 天再復藥以避免出血","options":{"A":"(1)+(2)。","B":"(2)+(4)。","C":"(1)+(3)。","D":"(2)+(3)+(4)。","E":"(1)+(2)+(3)+(4)。"},"id":"114-146","roc_year":114,"source":"114合併PDF","topic_num":6,"topic":"血栓、抗凝與疫苗相關血栓","answer_status":"normal","q_num":146,"src":"114合併卷"},{"num":149,"answer":"C","stem":"一名60歲男性,因胰臟腺癌住院接受化療,期間突然出現右側肢體無力。腦部MRI顯示多處散在性急性缺 血病灶,無心房顫動病史。關於此臨床情境的治療或診斷原則,下列何者正確?","options":{"A":"主要為腫瘤細胞局部侵犯腦部血管所致。","B":"腫瘤相關中風應避免使用靜脈血栓溶解治療(rtPA)。","C":"可考慮低分子量肝素(LWH)為中風後抗血栓藥物。","D":"由於血管再通率不佳,腫瘤相關中風不建議進行動脈血栓移除治療(endovascular thrombectomy)。","E":"D-dimer 在腫瘤相關中風無明確臨床意義,僅反應可能併有深部靜脈栓塞(DVT)。"},"id":"114-149","roc_year":114,"source":"114合併PDF","topic_num":6,"topic":"血栓、抗凝與疫苗相關血栓","answer_status":"normal","q_num":149,"src":"114合併卷"},{"num":166,"answer":"B","stem":"下列有關輸血相關之急性肺損傷(Transfusion-related acute lung injury)的敘述何者有誤?","options":{"A":"發生原因多為捐血者體內有高濃度之Anti-HLA class II 抗體","B":"一般發生於輸血後24小時","C":"病人有缺氧現象","D":"會出現肺水腫","E":"輸注男性或未曾懷孕婦女的血可減少發生機率"},"id":"109-166","roc_year":109,"source":"109合併PDF","topic_num":7,"topic":"輸血醫學","answer_status":"normal","q_num":166,"src":"109合併卷"},{"num":168,"answer":"D","stem":"Cryoprecipitate中帶有那些凝血因子? (1) fibrinogen (2) Factor VII (3) Factor VIII (4) von Willebrand factor","options":{"A":"(1)","B":"(2)","C":"(1)+(3)","D":"(1)+(3)+(4)","E":"(1)+(2)+(3)"},"id":"109-168","roc_year":109,"source":"109合併PDF","topic_num":7,"topic":"輸血醫學","answer_status":"normal","q_num":168,"src":"109合併卷"},{"num":136,"answer":"C","stem":"下列有關TRALI (transfusion-related acute lung injury)的敍述何者是正確的? (1) 多在輸血3天後發生 (2) 發生的原因常與捐血者體內有抗受血者HLA class II之抗體有關 (3) 病人的胸部X光會出現兩邊肺葉的浸潤","options":{"A":"(1)。","B":"(3)。","C":"(2)+(3)。","D":"(1)+(3)。","E":"(1)+(2)+(3)。"},"id":"111-136","roc_year":111,"source":"111合併PDF","topic_num":7,"topic":"輸血醫學","answer_status":"normal","q_num":136,"src":"111合併卷"},{"num":80,"answer":"D","stem":"冷凍沈澱(Cryoprecipitate)可用於治療何種病人? (1) Hypofibrinogenemia (2) Hypoalbuminemia (3) Hemophilia A (4) von Willebrand disease","options":{"A":"(1)+(2)。","B":"(1)+(3)。","C":"(1)+(2)+(3)。","D":"(1)+(3)+(4)。","E":"(1)+(2)+(3)+(4)。"},"id":"112-80","roc_year":112,"source":"112合併PDF","topic_num":7,"topic":"輸血醫學","answer_status":"normal","q_num":80,"src":"112合併卷"},{"num":133,"answer":"E","stem":"有關輸血相關的急性肺損傷(transfusion-related acute lung injury, TRALI)的敍述何者是錯誤的?","options":{"A":"經常在輸血中或輸血後6小時內發生。","B":"發生的原因常為輸入的血漿中有抗受血者HLA class II的抗體。","C":"病人會呈現缺氧、呼吸急促。","D":"病人肺部X-光常顯示有間質浸潤(interstitial infiltrate)。","E":"治療以類固醇為主。"},"id":"112-133","roc_year":112,"source":"112合併PDF","topic_num":7,"topic":"輸血醫學","answer_status":"normal","q_num":133,"src":"112合併卷"},{"num":136,"answer":"D","stem":"Cryoprecipitate中的成份可提供哪些病人使用 (1) Hemophilia A (2) Hypoalbuminemia (3) von Willebrand disease (4) Hypofibrinogenemia","options":{"A":"(1)+(2)。","B":"(2)+(4)。","C":"(1)+(3)。","D":"(1)+(3)+(4)。","E":"(1)+(2)+(3)+(4)。"},"id":"113-136","roc_year":113,"source":"113合併PDF","topic_num":7,"topic":"輸血醫學","answer_status":"normal","q_num":136,"src":"113合併卷"},{"num":136,"answer":"D","stem":"Cryoprecipitate中有何成份?(1) fibrinogen (2) factor VII (3) factor VIII (4) von Willebrand factor。","options":{"A":"(1)。","B":"(2)。","C":"(3)+(4)。","D":"(1)+(3)+(4)。","E":"(1)+(2)+(3)+(4)。"},"id":"114-136","roc_year":114,"source":"114合併PDF","topic_num":7,"topic":"輸血醫學","answer_status":"normal","q_num":136,"src":"114合併卷"},{"num":11,"answer":"C","stem":"腫瘤標記(tumor markers)的應用,可運用在惡性腫瘤的治療期間,作為治療成效的輔助評估。以下各種腫瘤標記與腫瘤的配對,哪些是正確的? (1)catecholamines與pheochromocytoma (2)calcitonin與papillary cancer of the thyroid (3)human chorionic gonadotropin (hCG)與gestational trophoblastic disease (4)α-fetoprotein與gonadal germ cell tumor","options":{"A":"(1)+(2)+(3)","B":"(1)+(2)+(4)","C":"(1)+(3)+(4)","D":"(2)+(3)+(4)","E":"(1)+(2)+(3)+(4)"},"id":"107-綜-11","roc_year":107,"source":"107舊站q5綜合卷","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":11,"src":"舊站綜合卷"},{"num":171,"answer":"C","stem":"癌症病人的處理評估,體能狀態(Performance status, PS) 是一個重要的常用指標。體能狀態的評估有一 個沿用多年的指標Karnofsky performance status (KPS)。今有一位60歲癌症病人,他日常生活完全可以 自理(self-care),不需人幫忙。但是他已沒有辦法正常的工作(active work),也沒有辦法參加正常活 動(normal activity)。醫師估計這樣的病人KPS約為幾分?","options":{"A":"KPS 90","B":"KPS 80","C":"KPS 70","D":"KPS 60","E":"KPS 50"},"id":"109-171","roc_year":109,"source":"109合併PDF","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":171,"src":"109合併卷"},{"num":136,"answer":"C","stem":"下列何者為tumor lysis的表現?(1) Hyperkalemia (2) Hypercalcemia (3) Hyperuricemia (4) renal function impairment","options":{"A":"(1)+(3)。","B":"(1)+(2)+(3)。","C":"(1)+(3)+(4)。","D":"(2)+(3)+(4)。","E":"(1)+(2)+(3)+(4)。"},"id":"110-136","roc_year":110,"source":"110合併PDF","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":136,"src":"110合併卷"},{"num":144,"answer":"D","stem":"下列那些病症或症候群(syndrome),可能會增加病人罹患癌症的風險? (1)Fanconi's anemia (2)Down syndrome (3)Fragile X syndrome (4)von Hippel-Lindau syndrome (5)Neurofibromatosis","options":{"A":"(1)+(3)+(4)。","B":"(2)+(3)+(4)。","C":"(1)+(2)+(3)+(5)。","D":"(1)+(2)+(4)+(5)。","E":"(1)+(2)+(3)+(4)+(5)。"},"id":"110-144","roc_year":110,"source":"110合併PDF","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":144,"src":"110合併卷"},{"num":139,"answer":"B","stem":"在 COVID-19 新冠疫情大流行(pandemic)危機期間,關於癌症病人即時提供治療的建議指引,發表於 (Kutikov A, et al. Ann Intern Med. 2020, DOI: 10.7326/M20-1133)。該一指引建議對下列癌症病人“高度 優先(理想情況下, 不應延遲)”即時提供癌症治療,但以下情況可能除外:","options":{"A":"Chemotherapy for testicular cancers。","B":"Chronic lymphocytic leukemia。","C":"Small cell lung cancer。","D":"Colon cancer with imminent obstruction。","E":"High-grade soft tissue sarcomas。"},"id":"111-139","roc_year":111,"source":"111合併PDF","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":139,"src":"111合併卷"},{"num":137,"answer":"B","stem":"Acute lymphoblastic leukemia (ALL)、Burkitt’s lymphoma等癌症治療後,經常可能出現「腫瘤溶解症候 群」(TLS, tumor lysis syndrome)。下列血清生化檢驗,何者為非?","options":{"A":"Hyperuricemia。","B":"Hypercalcemia。","C":"Hyperkalemia。","D":"Hyperphosphatemia。","E":"Elevated serum creatinine。"},"id":"112-137","roc_year":112,"source":"112合併PDF","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":137,"src":"112合併卷"},{"num":144,"answer":"D","stem":"下列是「癌細胞逃脫(evade)免疫系統 (Immune evasion) 」的眾多機制,請選出所有正確的可能機 制:(1) Induction of cytotoxic T-lymphocyte-associated protein 4 (CTLA-4) 。(2) Downregulation of cell surface proteins involved in immune recognition (such as major histocompatibility complex MHC proteins, etc.)。(3) Elaboration of immunosuppressive cytokines 。(4) Downregulation of T regulatory cells (Treg)。(5) Upregulation of myeloid-derived suppressor cells (MDSC)","options":{"A":"(2)+(3)+(4)。","B":"(3)+(4)+(5)。","C":"(1)+(2)+(4)+(5)。","D":"(1)+(2)+(3)+(5)。","E":"(1)+(2)+(3)+(4)+(5)。"},"id":"112-144","roc_year":112,"source":"112合併PDF","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":144,"src":"112合併卷"},{"num":137,"answer":"C","stem":"除了腫瘤負荷(tumor burden)之外,影響治療結果的第二個主要因素是病人的生理儲備能力(physiologic reserve)。在罹癌之前就長期臥床的病人,即使癌症分期相同,其預後通常會比完全活動自如的病人 差。生理儲備能力決定了一位病人能否承受癌症及其治療所帶來的生理壓力。然而,這項因素難以直接評 估,因此臨床上會參考其他替代指標,例如ECOG體能狀態評估(ECOG performance status, PS)或病 人的年齡。ECOG PS 分數在3分以上的病人,通常預後不佳,除非體能狀態差是腫瘤造成的且是可逆轉 的情況。下列描述相對應屬於哪一級的 ECOG 體能狀態(PS)?「病人可行走並能完成所有自我照 護,但無法從事正常工作活動。有超過一半的清醒時間中,病人是可以起身活動的。」","options":{"A":"ECOG PS 0。","B":"ECOG PS 1。","C":"ECOG PS 2。","D":"ECOG PS 3。","E":"ECOG PS 4。"},"id":"114-137","roc_year":114,"source":"114合併PDF","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":137,"src":"114合併卷"},{"num":143,"answer":"E","stem":"在癌症精準醫療的發展中,「跨癌別」(tumor-agnostic)的生物標記可指引特定抗癌藥物的使用,並已 獲得美國FDA的核准。這些跨癌別生物標記不依腫瘤原發部位,而是依分子特徵選擇治療。 下列何者是腫瘤藥物治療學歷史上「第一個」被美國FDA核准的「跨癌別」生物標記?","options":{"A":"EGFR 突變。","B":"BRAF V600E 突變。","C":"RET 融合。","D":"NTRK融合。","E":"MSI-H/dMMR(微衛星不穩定性高/錯配修復缺陷)。"},"id":"114-143","roc_year":114,"source":"114合併PDF","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":143,"src":"114合併卷"},{"num":144,"answer":"D","stem":"染色體改變為癌症中的基因變化提供了重要線索。染色體轉位(translocations)常見於液態腫瘤(liquid tumors),尤其是在血癌與淋巴腫瘤(lymphoid tumors)較為常見。人體實體腫瘤(solid tumors)中的 染色體改變具有異質性且相當複雜,通常由於這些腫瘤中常見的染色體不穩定性所造成的。近年來,在幾 種實體腫瘤也已鑑定出反覆出現的染色體轉位。 以下是與染色體轉位有關的代表性癌基因與人體癌症的配對,那些均為正確? (正確者須全選, 不要遺漏) (1) BCR-ABL:慢性骨髓性白血病(Chronic myeloid leukemia) (2) FLI-EWSR1:小細胞肺癌(Small cell lung cancer) (3) PAX3-FOXO1:橫紋肌肉瘤(Rhabdomyosarcoma) (4) PAX8-PPARG:甲狀腺癌(Thyroid cancer) (5) TMPRSS2-ERG:攝護腺癌(Prostate cancer)","options":{"A":"(1)+(2)+(5)。","B":"(1)+(3)+(5)。","C":"(1)+(3)+(4)。","D":"(1)+(3)+(4)+(5)。","E":"(1)+(2)+(3)+(4)+(5)。"},"id":"114-144","roc_year":114,"source":"114合併PDF","topic_num":8,"topic":"腫瘤學總論、腫瘤急症與精準醫療","answer_status":"normal","q_num":144,"src":"114合併卷"},{"num":165,"answer":"D","stem":"下列標靶治療與疾病的配對何者是錯誤的?","options":{"A":"Eltrombopag- Immune thrombocytopenic purpura","B":"Rituximab- B-cell lymphoma","C":"Brentuximab- Hodgkin’s lymphoma","D":"Ibrutinib- Multiple myeloma","E":"Imatinib- Chronic myeloid leukemia"},"id":"109-165","roc_year":109,"source":"109合併PDF","topic_num":9,"topic":"抗癌藥物：標靶與免疫治療","answer_status":"normal","q_num":165,"src":"109合併卷"},{"num":178,"answer":"A","stem":"癌症的免疫節制點抑制劑(immune checkpoint inhibitors)或標靶治療藥劑(molecular targeted agents)通常 針對特定的訊息傳遞路徑或分子標靶進行抑制,以達到治療癌症的目的。治療\"藥劑\"與免疫或分子\"標 靶\"的配對,下列那些為真? (1) Ipilimumab 與 CTLA-4 (2) Afatinib 與 EGFR (3) Rituximab 與 CD20 (4) Trastuzumab 與 HER-2 (5) Nivolumab 與 PD-L1","options":{"A":"(1)+(2)+(3)+(4)","B":"(1)+(3)+(4)+(5)","C":"(2)+(3)+(4)+(5)","D":"(2)+(4)+(5)","E":"(1)+(2)+(3)+(4)+(5)"},"id":"109-178","roc_year":109,"source":"109合併PDF","topic_num":9,"topic":"抗癌藥物：標靶與免疫治療","answer_status":"normal","q_num":178,"src":"109合併卷"},{"num":142,"answer":"C","stem":"自2012年以來,免疫治療的進入復興新時代,有些免疫節制點抑制劑 (Immune checkpoint inhibitors) 證 實可以有效治療癌症,且進入臨床實用階段,進一步有些癌症治療時也發現免疫節制點抑制劑重要的「預 測性生物標記」。轉移性大腸癌病人在接受PD-1抗體藥劑Pembrolizumab (Kytruda)治療時,已知下列何 種”預測性生物標記”情形下, Pembrolizumab (Kytruda)治療較為有效?","options":{"A":"MSS (microsatellite stable, 微小衛星體穩定性),defective MMR (mismatch repair 核酸誤配修復酵 素缺陷)。","B":"MSI-H (microsatellite instability-high, 微小衛星體高度不穩定性),proficient MMR (mismatch repair 核酸誤配修復酵素完整)。","C":"MSI-H (microsatellite instability-high, 微小衛星體高度不穩定性),defective MMR (mismatch repair 核酸誤配修復酵素缺陷)。","D":"MSS (microsatellite stable, 微小衛星體穩定性),proficient MMR (mismatch repair 核酸誤配修復酵 素完整)。","E":"以上皆非。"},"id":"110-142","roc_year":110,"source":"110合併PDF","topic_num":9,"topic":"抗癌藥物：標靶與免疫治療","answer_status":"normal","q_num":142,"src":"110合併卷"},{"num":143,"answer":"C","stem":"癌症的標靶治療藥劑(molecular targeted agents)或免疫節制點抑制劑(immune checkpoint inhibitors)通常 針對特定的分子標靶或免疫路徑進行抑制,以達到治療癌症的目的。治療「藥劑」與分子或免疫「標 靶」的配對,下列那些為真?(1)Nivolumab與PD-L1 (2)Afatinib與EGFR (3)Trastuzumab與HER-2 (4)Rituximab與CD20 (5)Ipilimumab與CTLA-4","options":{"A":"(1)+(2)+(3)+(4)。","B":"(1)+(3)+(4)+(5)。","C":"(2)+(3)+(4)+(5)。","D":"(1)+(2)+(4)+(5)。","E":"(1)+(2)+(3)+(4)+(5)。"},"id":"110-143","roc_year":110,"source":"110合併PDF","topic_num":9,"topic":"抗癌藥物：標靶與免疫治療","answer_status":"normal","q_num":143,"src":"110合併卷"},{"num":124,"answer":"A","stem":"在癌症治療中使用PD-1/PD-L1 checkpoint inhibitors時, 最常引起的自體免疫併發症為下列何者?","options":{"A":"Sjogren's syndrome。","B":"SLE。","C":"RA。","D":"ANCA-associated vasculitis。","E":"Polymyositis/dermatomyositis。"},"id":"112-124","roc_year":112,"source":"112合併PDF","topic_num":9,"topic":"抗癌藥物：標靶與免疫治療","answer_status":"normal","q_num":124,"src":"112合併卷"},{"num":143,"answer":"B","stem":"癌症的標靶治療藥劑(molecular targeted agents, MTAs),通常針對特定的訊息傳遞路徑或分子標靶進行 抑制,以達到治療癌症的目的。癌症的標靶治療藥劑(molecular targeted agents, MTAs) ,特定類 別(class)可能會有特定MTAs「類別相關毒性 (class toxicities) 」。VEGF(血管內皮生長因子, vascular endothelium growth factor)類別之MTAs (如: bevacizumab等) ,可能會有VEGF MTAs 之「類別相關毒 性」 (class toxicities)。下列何者為非?","options":{"A":"hypertension。","B":"hyperglycemia。","C":"proteinuria。","D":"bleeding or thrombosis。","E":"GI perforation。"},"id":"113-143","roc_year":113,"source":"113合併PDF","topic_num":9,"topic":"抗癌藥物：標靶與免疫治療","answer_status":"normal","q_num":143,"src":"113合併卷"},{"num":144,"answer":"B","stem":"癌症的免疫節制點抑制劑(immune checkpoint inhibitors, ICIs)通常針對特定的免疫節制點進行抑制，逆轉癌細胞對 T cells 之免疫 Evasion，重回免疫 Elimination，以達到治療癌症的目的。有關「免疫治療藥劑」與免疫節制分子的配對，下列那些為真？(1) Ipilimumab 與 CTLA-4 (2) Atezolizumab 與 PD-1 (3) Pembrolizumab 與 PD-1 (4) Nivolumab 與 PD-L1 (5) Durvalumab 與 PD-L1","options":{"A":"(1)+(5)","B":"(1)+(3)+(5)","C":"(1)+(2)+(5)","D":"(1)+(2)+(3)+(5)","E":"(1)+(2)+(3)+(4)+(5)"},"id":"113-144","roc_year":113,"source":"113合併PDF","topic_num":9,"topic":"抗癌藥物：標靶與免疫治療","answer_status":"normal","q_num":144,"src":"113合併卷"},{"num":113,"answer":"C","stem":"一位60歲男性,體重72公斤,罹患黑色素惡性腫瘤,接受免疫療法後出現肝炎。治療上給予高劑量類固 醇: methylprednisolone 160 mg / 日,使用2天後改為80 mg/日持續4週。關於類固醇的使用,下列何者 正確?","options":{"A":"因疫情控制良好,可立即停止使用類固醇。","B":"類固醇副作用多,因此不適合本病人使用。","C":"類固醇應由高劑量逐漸減量至低劑量,之後再停藥。","D":"當劑量減至20 mg/日時可直接停藥。","E":"當劑量減至10 mg/日時可直接停藥。"},"id":"114-113","roc_year":114,"source":"114合併PDF","topic_num":9,"topic":"抗癌藥物：標靶與免疫治療","answer_status":"normal","q_num":113,"src":"114合併卷"},{"num":11,"answer":"E","stem":"原發部位不明的轉移性上皮癌(carcinoma of unknown primary, CUP),病理組織常需要額外進行免疫組織染色(immunohistochemical stains),提供臨床上分辨癌症器官原發來源的參考依據。cytokeratin(CK)是經常使用的intermediate filaments染色,人體有20多種CK亞型,當顯示癌細胞CK20染色陽性且CK7染色陰性(CK20+/ CK7-)時,相對CUP最可能的原發器官為下列何者?","options":{"A":"lung","B":"breast","C":"endometrium","D":"pancreas","E":"colon"},"id":"108-綜-11","roc_year":108,"source":"108舊站q5綜合卷","topic_num":10,"topic":"實體腫瘤各論與癌症篩檢","answer_status":"normal","q_num":11,"src":"舊站綜合卷"},{"num":177,"answer":"B","stem":"有關前列腺特異抗原(PSA,prostate specific antigen)之敘述,下列何者為真?","options":{"A":"Most prostate cancer deaths occur in men with PSA levels below the top quartile.","B":"PSA is produced by malignant and non-malignant prostate cells.","C":"The US Preventive Services Task Force (USPSTF) recommends PSA screening in men between 55 and 69 years of age.","D":"The American Urological Association (AUA) recommends PSA screening in men 40-55 years of age.","E":"Asymptomatic men with an elevated PSA should receive a 2-week course of antibiotics before repeating PSA and considering biopsy."},"id":"109-177","roc_year":109,"source":"109合併PDF","topic_num":10,"topic":"實體腫瘤各論與癌症篩檢","answer_status":"normal","q_num":177,"src":"109合併卷"},{"num":139,"answer":"B","stem":"有一研究使用200個「原發部位不明上皮癌」(CUP, carcinoma of unknown primary)病人的腫瘤檢體,進 行「次世代基因定序分析」(NGS, next generation sequencing)。您推測最常見發生基因變異(genetic alterations)的基因為下列何者?","options":{"A":"KRAS。","B":"TP53。","C":"ARID1A。","D":"CDKN2A。","E":"mTOR。"},"id":"110-139","roc_year":110,"source":"110合併PDF","topic_num":10,"topic":"實體腫瘤各論與癌症篩檢","answer_status":"normal","q_num":139,"src":"110合併卷"},{"num":140,"answer":"C","stem":"67歲男性病人,主訴二個月逐漸加重的右腰痛,合併一個月逐漸加重的血尿(hematuria)。且自覺沒有胃 口,在二個月內體重減輕約3公斤。病人轉至大醫院求診,理學檢查觸診已發現右腰部有至少5公分大小腫 塊,腎功能大致正常。影像檢查發現右腎有一10公分實體腫塊,兩側肺野有多發的肺結節,顯示已有多發 肺臟轉移。細針穿刺切片病理證實為腎細胞癌(renal cell carcinoma)之亮細胞(clear cell)亞型。建議下一 步如何處置最為合適?","options":{"A":"Radical nephrectomy。","B":"Gemcitabine。","C":"Sunitinib。","D":"Interleukin-2。","E":"Interferon-γ。"},"id":"110-140","roc_year":110,"source":"110合併PDF","topic_num":10,"topic":"實體腫瘤各論與癌症篩檢","answer_status":"normal","q_num":140,"src":"110合併卷"},{"num":138,"answer":"C","stem":"有關原發部位不明的上皮癌(Carcinoma of unknown primary, CUP),除了病理組織的H&E染色型態之 外,有時需借助於免疫組織化學染色來協助判斷CUP的原發器官。下列哪一種標記的抗體核染色,約 有68%肺腺癌(adenocarcinoma of lung) 呈陽性,約有 25%的肺鱗狀上皮癌(squamous cell carcinoma of lung)呈陽性,經常做為肺臟(lung)為CUP原發器官之鑑別診斷輔助標記之ㄧ?","options":{"A":"CDX-2 transcription factor (CDX-2)。","B":"Thyroglobulin。","C":"Thyroid transcription factor 1 (TTF-1)。","D":"Cytokeratin (CK)。","E":"Leucocyte common antigen (LCA)。"},"id":"111-138","roc_year":111,"source":"111合併PDF","topic_num":10,"topic":"實體腫瘤各論與癌症篩檢","answer_status":"normal","q_num":138,"src":"111合併卷"},{"num":138,"answer":"D","stem":"約有15%至30%的乳癌有HER2的「過度表現」,通常用免疫組織化學染色法(IHC, immunohistochemistry) 3+,或IHC 2+且原位核酸雜合法(ISH, in situ hybridization)陽性的乳癌病 人,HER2的標靶治療有相當好的緩解率。但對HER2「低表現」(Low HER2) (IHC 1+,或IHC 2+且ISH陰性)的乳癌病人並不理想。然而,根據最新的藥劑研發結果,下列的某一個藥劑對HER2「低表 現」(Low HER2)的乳癌病人也有約52%的高緩解率。","options":{"A":"Trastuzumab。","B":"Lapatinib。","C":"Pertuzumab。","D":"Trastuzumab-Deruxtecan。","E":"Trastuzumab-Emtansine。"},"id":"112-138","roc_year":112,"source":"112合併PDF","topic_num":10,"topic":"實體腫瘤各論與癌症篩檢","answer_status":"normal","q_num":138,"src":"112合併卷"},{"num":140,"answer":"C","stem":"以下哪項與惡性肉瘤(sarcoma)的風險增加最不相關?","options":{"A":"Human herpes virus 8 (HHV8)。","B":"HIV。","C":"Trauma or previous injury。","D":"Prior radiation therapy。","E":"Li-Fraumeni syndrome。"},"id":"112-140","roc_year":112,"source":"112合併PDF","topic_num":10,"topic":"實體腫瘤各論與癌症篩檢","answer_status":"normal","q_num":140,"src":"112合併卷"},{"num":142,"answer":"D","stem":"67歲男性病人,有40 pack-years的吸菸史與高血壓病史,因無痛性巨觀血尿症(painless gross hematuria)求診,經由膀胱鏡(cystoscopy)檢查,發現膀胱後壁有一3公分的腫瘤。切片病理檢查證實為 一「肌肉侵入型泌尿上皮膀胱癌」(muscle-invasive bladder cancer, MIBC)。電腦斷層(CT)掃描顯示廣泛 的膀胱壁浸潤增厚,目前無周圍淋巴結增大的跡象。建議何者為下一步較適宜的治療選項?","options":{"A":"Intravesical BCG (Bacille Calmette-Guerin)。","B":"Repeat transurethral biopsy。","C":"Capecitabine-based chemotherapy。","D":"Neoadjuvant cisplatin-based combination chemotherapy, followed by radical cystectomy。","E":"Radiation therapy alone。"},"id":"112-142","roc_year":112,"source":"112合併PDF","topic_num":10,"topic":"實體腫瘤各論與癌症篩檢","answer_status":"normal","q_num":142,"src":"112合併卷"},{"num":140,"answer":"D","stem":"大多數乳癌為雌激素受體(ER)陽性。當乳癌在第一線荷爾蒙治療後,出現腫瘤惡化(progressive disease) 時,約有 40% 的病人會出現雌激素受體基因(ESR1)的突變。選擇性雌激素受體降解劑(SERDs, Selective estrogen receptor degraders)是一類新興的口服藥物,透過標靶野生型與突變型的雌激素受體,阻斷其訊 號傳遞並促使其在細胞內被降解。目前已有數種此類SERDs藥物正在臨床開發中,以下哪一項為新一代 口服選擇性雌激素受體降解劑(Oral SERD)?","options":{"A":"Tamoxifen。","B":"Arimidex。","C":"Letrozole。","D":"Camizestrant。","E":"Palbociclib。"},"id":"114-140","roc_year":114,"source":"114合併PDF","topic_num":10,"topic":"實體腫瘤各論與癌症篩檢","answer_status":"normal","q_num":140,"src":"114合併卷"},{"num":196,"answer":"B","stem":"臺灣人最常見的皮膚黑色素細胞癌 (Cutaneous melanoma) 是哪一型?","options":{"A":"結節型黑色素細胞癌 (nodular melanoma)","B":"肢端黑痣型黑色素細胞癌 (acral lentiginous melanoma)","C":"表淺擴散型黑色素細胞癌 (superficial spreading melanoma)","D":"惡性黑痣型黑色素細胞癌 (lentigo maligna melanoma)","E":"黏膜型黑色素細胞癌 (mucousal melanoma)"},"id":"109-196","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"皮膚癌（黑色素瘤與基底細胞癌）","answer_status":"normal","q_num":196,"src":"109合併卷"},{"num":197,"answer":"D","stem":"下列有關判斷是否為皮膚黑色素細胞癌 (Cutaneous melanoma) 的ABCDE口訣,哪些要考慮惡性?(1) A:對稱 (Asymmetry),病灶本身左右對稱的時候; (2) B邊緣 (Border),病灶邊緣規則的時候; (3) C顏色 (Color),病灶色澤均勻的時候; (4) D直徑 (Diameter) 大於6 mm的時候; (5) E演變 (Evolving),病灶大 小、形狀、顏色有變化,或是隆起、出血時","options":{"A":"(1)+(2)+(3)","B":"(2)+(3)+(4)","C":"(2)+(3)","D":"(4)+(5)","E":"(2)+(5)"},"id":"109-197","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"皮膚癌（黑色素瘤與基底細胞癌）","answer_status":"normal","q_num":197,"src":"109合併卷"},{"num":198,"answer":"B","stem":"下列有關基底細胞癌 (Basal cell carcinoma) 的臨床表現,何者正確?(1) 表淺型 (superficial) 基底細胞癌 最惡性,好發於四肢末梢,臨床上像濕疹病灶; (2) 結節型 (nodular) 基底細胞癌臨床上常見為緩慢長大的 結節,帶有珍珠光澤,邊緣隆起,且有擴張血絲; (3) 色素型 (pigmented) 基底細胞癌類似黑色素細胞 癌,極易轉移; (4) 硬皮型 (morpheaform) 基底細胞癌,臨床表現為單一、扁平或萎縮像疤痕般的板塊病 灶,具侵襲性","options":{"A":"(1)+(3)","B":"(2)+(4)","C":"(1)+(4)","D":"(2)+(3)","E":"(3)+(4)"},"id":"109-198","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"皮膚癌（黑色素瘤與基底細胞癌）","answer_status":"normal","q_num":198,"src":"109合併卷"},{"num":160,"answer":"D","stem":"關於黑色素瘤(melanoma) ,下列敘述何者正確? (1) 是皮膚癌中最常見的類型 (2) 就種族中黑色素瘤的亞型分布而言,黃種人肢端小痣性黑色素瘤 (acral lentiginous melanoma)所占比 例比白種人多,白種人黏膜黑色素瘤 (mucosal melanoma) 所占比例比黃種人多 (3) 痣(nevus)是黑色素瘤的危險因子之一,約有7成以上的皮膚黑色素瘤是由痣轉變而來。 (4) Breslow腫瘤厚度是黑色素瘤最重要的預後因子 (5) 一位罹患左足底肢端小痣性黑色素瘤的52歲女性,腫瘤厚度為2 mm但沒有潰瘍,她的左腹股溝沒有摸 到淋巴結腫,且電腦斷層掃描沒有看到全身性轉移,根據目前的治療標準,此病患除了接受皮膚腫瘤廣泛 切除外還要施行前哨淋巴結切片(sentinel lymph node biopsy)。","options":{"A":"(1)+(2)+(3)+(4)。","B":"(2)+(3)+(4)。","C":"(1)+(3)+(5)。","D":"(4)+(5)。","E":"(3)+(4)+(5)。"},"id":"110-160","roc_year":110,"source":"110合併PDF","topic_num":11,"topic":"皮膚癌（黑色素瘤與基底細胞癌）","answer_status":"normal","q_num":160,"src":"110合併卷"},{"num":142,"answer":"E","stem":"51歲女性病人,3年半之前,因後上背部黑色素瘤(melanoma)手術切除,癌症分期第IIB期。最近因呼吸 急促至急診就醫,發現兩側肺野多發病灶,後續檢查證實惡性黑色素瘤多發兩側肺轉移。在決定選擇標靶 治療、免疫節制點抑制劑、或化學治療之前,應檢驗何種基因突變(genetic mutation)的有無,對於選擇何 種標靶治療有最重要的參考價值?","options":{"A":"C-KIT。","B":"NRAS。","C":"HRAS。","D":"ERK。","E":"BRAF。"},"id":"111-142","roc_year":111,"source":"111合併PDF","topic_num":11,"topic":"皮膚癌（黑色素瘤與基底細胞癌）","answer_status":"normal","q_num":142,"src":"111合併卷"},{"num":156,"answer":"E","stem":"下列有關皮膚黑色素細胞癌 (cutaneous melanoma) 的治療何者正確? (1) 初診斷的第1~2期皮膚黑色素細胞癌 (cutaneous melanoma),首選治療為廣泛切除手術治療。 (2) 對於轉移性黑色素細胞癌,最常用的治療方式為化學治療 (chemotherapy),其次為免疫治療 (immunotherapies) 與標靶治療 (targeted therapies)。 (3) 轉移性黑色素細胞癌目前常用的標靶治療 (targeted therapies) 藥品包括BRAF抑制劑與表皮生長因子 受體 (EGFR) 抑制劑。 (4) 轉移性黑色素細胞癌目前常用的BRAF inhibitors包括vemurafenib、 dabrafenib與trametinib。 (5) 轉移性黑色素細胞癌目前常用的免疫治療 (immunotherapies) 藥品為immune T-cell checkpoint inhibitors,包括 ipilimumab、nivolumab與 pembrolizumab。","options":{"A":"(1)+(2)+(3)。","B":"(1)+(3)+(5)。","C":"(1)+(2)+(4)+(5)。","D":"(1)+(4)+(5)。","E":"(1)+(5)。"},"id":"114-156","roc_year":114,"source":"114合併PDF","topic_num":11,"topic":"皮膚癌（黑色素瘤與基底細胞癌）","answer_status":"normal","q_num":156,"src":"114合併卷"},{"num":157,"answer":"C","stem":"一位86歲男性皮膚出現如圖病灶,請問最可能診斷,與致病機轉何者正確?","options":{"A":"鱗狀細胞癌 (Squamous cell carcinoma);因為日曬引起P53基因突變造成。","B":"血管肉瘤 (Angiosarcoma);由於Smoothened homolog (SMO) 表現偏低造成。","C":"基底細胞癌 (Basal cell carcinoma);由於Hedgehog訊息傳遞路徑活化所造成。","D":"黑色素細胞癌 (Cutaneous melanoma);由於BRAF基因突變所造成。","E":"梅克爾細胞癌 (Merkel cell carcinoma);由於MCPyV病毒所造成。"},"id":"114-157","roc_year":114,"source":"114合併PDF","topic_num":11,"topic":"皮膚癌（黑色素瘤與基底細胞癌）","answer_status":"normal","img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAMeApQDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwBf+Ex8Txv8/iLV8e17J/jS3HjbxE5Xy/EOsAAc4vJOv/fVYAYnrzTyMjjiuC7PX5V2NqPxh4nxn/hI9ZP/AG+yf/FU0+NPEwBz4i1j/wADZP8A4qsXcyj72KQcA5+apcmHKuxsReOfEqy4PiLWCMd72T/4qoW8beKHdseJdZHoPtsv/wAVWSVDSA/dFORYULb2z6GlzMOVdjYt/G/icW7LL4j1jcTwftsmf/Qqhbxr4pWQL/wkutf+B0v/AMVWPI0LNnceOgpr5OGNHMx8q7G5P IFkbOWouONzPkWO2+Tyiz9QwPSnQLc3bnJd2bH3h2+tHltc3KgbR8oJJHNX7uPyNPEiSOGyBxU7mkrNGZdWzLMR5m3HbNFUross7AsWPrmipuWon//Z","q_num":157,"src":"114合併卷"}],E={"106-綜-12":{"quick":"全血球減少(pancytopenia)＝產生不足或破壞/扣留過多：嚴重 B12 缺乏(無效造血)、MDS(骨髓造血異常)、肝硬化(脾腫扣留＋造血抑制)、自體免疫(如 SLE/Evans)皆可造成，故四者全選(E)。","detail":{"background":"全血球減少(pancytopenia)指紅血球、白血球、血小板三系同時下降，臨床思路應拆解為三大機轉：①骨髓「生產不足」——再生不良性貧血、骨髓造血不良症候群(MDS)、骨髓被取代(白血病/淋巴瘤/轉移癌/纖維化)、巨母紅血球性造血障礙(嚴重維生素B12或葉酸缺乏，因DNA合成受阻導致無效造血ineffective erythropoiesis，三系皆受影響)、藥物/化療/輻射抑制。②周邊「破壞或扣留過多」——脾功能亢進(hypersplenism，如肝硬化門脈高壓導致脾腫大，將血球扣留破壞)、自體免疫破壞(如SLE、Evans症候群同時溶血＋免疫性血小板低下)。③稀釋或假性。本題四個選項分別對應：(1)嚴重B12缺乏(無效造血)、(2)MDS(骨髓異常增生)、(3)肝硬化(脾亢)、(4)自體免疫疾病，皆為pancytopenia的合理成因，故全選(E)。考試重點在於建立「pancytopenia不是單一疾病，而是須鑑別生產vs破壞」的系統性思維；初步評估包含網狀紅血球計數(reticulocyte，反映骨髓反應)、周邊血抹片與必要時骨髓檢查。","options":{"A":"不完整。自體免疫疾病確可造成pancytopenia，但其餘三項亦可。","B":"不完整。漏掉(1)B12缺乏與(3)肝硬化。","C":"不完整。漏掉(1)與(4)。","D":"不完整。漏掉(1)嚴重B12缺乏(可致巨母細胞性無效造血而三系下降)。","E":"正確。四種情況皆可造成全血球減少，分屬生產不足(B12缺乏、MDS)與破壞/扣留(肝硬化脾亢、自體免疫)。"},"sources":["Harrison 21e, Anemia and Polycythemia / Aplastic Anemia, Myelodysplasia","Williams Hematology, Pancytopenia approach"]}},"109-163":{"quick":"慢性病貧血(ACD)鐵代謝特徵：hepcidin「升高」(發炎IL-6誘導)→鐵被扣在巨噬細胞、血清鐵低、ferritin正常或高、儲鐵增加。故「hepcidin下降」與診斷不符，選E。","detail":{"background":"慢性病貧血/發炎性貧血(anemia of chronic disease/inflammation, ACD)是住院病人與慢性發炎(感染、自體免疫、惡性腫瘤)最常見的貧血型態之一。核心機轉是發炎細胞激素(尤其IL-6)誘導肝臟製造hepcidin(鐵調素)「上升」。Hepcidin會結合並降解腸道與巨噬細胞膜上的ferroportin(鐵外運蛋白)，導致：①腸道鐵吸收下降，②巨噬細胞內回收的鐵無法釋出而被「扣留」。結果是一種「功能性缺鐵」：血清鐵(serum iron)低、總鐵結合能力(TIBC/transferrin)正常或偏低(與真正缺鐵IDA的TIBC升高相反)、transferrin飽和度低，但儲鐵指標ferritin正常或升高(ferritin亦是急性期反應蛋白)、骨髓與巨噬細胞內儲鐵「增加」。貧血通常為正血球或輕度小血球性，程度多為輕中度。此外發炎抑制EPO反應、紅血球壽命略縮短。治療以處理原發病為主，必要時EPO刺激劑或靜脈鐵(若合併真正缺鐵)。本題問「與ACD不符合者」：A小血球(可)、B血清鐵低(可)、C ferritin正常或高(可)、D儲鐵增加(可)、E「hepcidin下降」——與ACD的hepcidin「升高」相反，故為答案(E)。","options":{"A":"符合。ACD可為正血球或小血球性貧血。","B":"符合。功能性缺鐵使血清鐵下降。","C":"符合。ferritin為儲鐵兼急性期蛋白，正常或升高。","D":"符合。鐵被扣留於巨噬細胞，儲鐵增加。","E":"不符合(為答案)。ACD之hepcidin因IL-6誘導而「升高」，非下降；正是hepcidin升高造成鐵滯留。"},"sources":["Harrison 21e, Iron Deficiency and Anemia of Chronic Disease","Williams Hematology, Anemia of Inflammation","Nemeth/Ganz, hepcidin biology"]}},"110-131":{"quick":"小血球貧血(MCV 68)但血清鐵/ferritin/TIBC皆正常、網狀紅血球不低、RBC計數不低 → 海洋性貧血(thalassemia trait)；缺鐵會有低鐵、低ferritin、高TIBC，與此不符，選C。","detail":{"background":"小血球性貧血(microcytic anemia, MCV<80)的四大鑑別為缺鐵性貧血(IDA)、海洋性貧血(thalassemia)、慢性病貧血、與鐵母細胞性貧血/鉛中毒。鑑別關鍵在「鐵代謝套組」與「RBC計數/紅血球分布」：本例25歲女性無症狀，Hb 9.1、MCV 68(明顯小血球)，但血清鐵145(正常)、TIBC 420(正常)、ferritin/血鐵質185(正常偏高)、網狀紅血球3.1%(不低甚至偏高)、RBC 4.43(相對不低)。IDA應呈現「低血清鐵、低ferritin、高TIBC、低transferrin飽和度、RBC偏低、RDW增大」，與本例的「鐵指標完全正常」明顯矛盾，故排除IDA。海洋性貧血(地中海型貧血)特徵：自幼、無症狀帶因者常見、顯著小血球但貧血程度與MCV下降不成比例(MCV很低但Hb僅輕中度下降)、RBC計數「相對偏高或正常」(Mentzer index = MCV/RBC <13 傾向thalassemia)、鐵指標正常、網狀紅血球可偏高(代償性溶血)。本例完全符合thalassemia trait，故選(C)。確診以血紅素電泳(β-thal會HbA2上升)或基因檢查(α-thal)。台灣為海洋性貧血高盛行區，產前篩檢與MCV<80且鐵正常者進一步電泳是重要公共衛生政策。","options":{"A":"錯誤。IDA應有低鐵、低ferritin、高TIBC，與本例鐵指標正常矛盾。","B":"錯誤。慢性病貧血血清鐵應低、TIBC正常或低，本例血清鐵正常且無慢性病。","C":"正確。小血球明顯但鐵指標全正常、RBC不低、網狀紅血球不低，符合海洋性貧血帶因。","D":"錯誤。MDS with ring sideroblasts多見於年長者、常正/大血球且網狀紅血球低，與本例25歲、小血球不符。","E":"錯誤。鉛中毒可小血球但多有暴露史與嗜鹼性點狀紅血球，鐵指標模式亦不同。"},"sources":["Harrison 21e, Disorders of Hemoglobin (Thalassemias)","Williams Hematology, Microcytic anemia differential","Mentzer index"]}},"111-131":{"quick":"大血球貧血(MCV 118)＋神經學異常(本體感/振動覺異常、舌炎、味覺喪失、肢端麻木)＝維生素 B12 缺乏；葉酸缺乏雖也大血球但「不會」神經病變，故選B。","detail":{"background":"大血球性貧血(macrocytic, MCV>100)分為巨母紅血球性(megaloblastic，DNA合成障礙)與非巨母紅血球性(肝病、酒精、甲狀腺低下、MDS、網狀紅血球大量增加)。巨母紅血球性最重要的兩個原因是維生素B12(cobalamin)與葉酸缺乏，兩者皆造成核質不同步、無效造血、可三系下降、LDH與間接膽紅素上升(髓內溶血)、周邊血見過分葉中性球(hypersegmented neutrophils)與巨卵圓紅血球。鑑別兩者的「關鍵在神經學表現」：維生素B12缺乏會造成亞急性合併退化(subacute combined degeneration)，侵犯脊髓後柱與側柱，表現為「振動覺與本體感覺異常、肢端麻木、步態不穩、Romberg陽性」，並可有舌炎(beefy red glossitis、味蕾萎縮)、味覺異常、認知改變——這些神經症狀「葉酸缺乏不會出現」，且若誤補葉酸雖可改善血液學但神經病變持續惡化，是重要陷阱。本例65歲、MCV 118、振動覺異常、舌頭光滑味蕾萎縮、手腳麻——典型B12缺乏，選(B)。B12缺乏常見原因：惡性貧血(內因子自體抗體/萎縮性胃炎)、胃切除、迴腸末端疾病、嚴格素食、PPI/metformin長期使用。治療為B12補充(肌注或高劑量口服)。","options":{"A":"錯誤。再生不良性貧血為全血球減少且網狀紅血球低、骨髓空虛，非大血球＋神經病變。","B":"正確。大血球貧血合併脊髓後柱症狀、舌炎、味覺喪失與肢端麻木，為典型B12缺乏。","C":"錯誤。葉酸缺乏雖造成大血球巨母細胞性貧血，但「不會」造成神經病變，是與B12鑑別的關鍵。","D":"錯誤。溶血性貧血網狀紅血球大量上升雖可使MCV偏高，但本例retic僅1.1%且有神經學表現，不符。","E":"錯誤。鉛中毒為小血球，且無此神經退化型態。"},"sources":["Harrison 21e, Megaloblastic Anemias (B12 & Folate)","Williams Hematology, Cobalamin deficiency","Subacute combined degeneration"]}},"112-131":{"quick":"小血球貧血(MCV 69)且「5年前血色素與MCV正常」→ 為「後天」逐漸發生 → 育齡女性最可能缺鐵性貧血(慢性失血)；海洋性貧血為先天、終生小血球，與5年前正常矛盾，故選B。","detail":{"background":"面對小血球性貧血，除了鐵代謝套組，「病程的時間軸」是極有力的鑑別線索。本例40歲女性現Hb 9.7、MCV 69.4(明顯小血球)，但回顧「5年前公司體檢Hb 12.1、MCV 80.3皆正常」——這代表貧血與小血球是「後天逐漸發生」。海洋性貧血(地中海型)是「先天、終生」存在的疾病，5年前不可能MCV正常，因此可直接排除(C)。育齡女性最常見的後天小血球貧血是缺鐵性貧血(IDA)，主因為慢性失血(月經過多最常見，其次腸胃道慢性失血)或鐵攝取/吸收不足。IDA的演進符合「先儲鐵耗竭(ferritin下降)→血清鐵下降、TIBC上升→小血球低血色素貧血、RDW增大」的時序，與本例「由正常MCV逐漸變小、Hb逐年下降」完全吻合。臨床上育齡女性新發IDA應評估月經與飲食，停經後或男性新發IDA則須警覺腸胃道惡性腫瘤而安排內視鏡。治療以口服硫酸亞鐵為主並找出失血源。故本題選(B)缺鐵性貧血。","options":{"A":"錯誤。再生不良性貧血為全血球減少、正/大血球，且非緩慢小血球化。","B":"正確。由正常MCV在數年內逐漸變小且貧血加重，符合後天缺鐵(育齡女性慢性失血)。","C":"錯誤。海洋性貧血為先天終生小血球，與5年前MCV 80.3正常的事實矛盾。","D":"錯誤。溶血性貧血多為正/大血球且網狀紅血球升高。","E":"錯誤。B12缺乏為大血球貧血，與小血球不符。"},"sources":["Harrison 21e, Iron Deficiency Anemia","Williams Hematology, Iron metabolism and IDA","GI workup of IDA in adults"]}},"113-130":{"quick":"大血球貧血(MCV 115)＋酗酒、飲食不均、網狀紅血球低、輕度間接膽紅素/LDH上升(無效造血)→ 葉酸缺乏；酒精族群葉酸缺乏遠較B12常見且無神經學描述，故選C。","detail":{"background":"大血球性貧血在「酗酒、營養不良」族群中，葉酸(folate)缺乏是最常見的原因。葉酸的體內儲存量小(僅約3–4個月)，故在飲食不均、酒精(酒精同時抑制葉酸吸收、干擾代謝並有骨髓直接毒性)、需求增加(懷孕、溶血)時很快耗竭。葉酸與B12缺乏皆造成巨母紅血球性貧血：大血球、網狀紅血球偏低(無效造血、髓內破壞)、輕度間接膽紅素與LDH上升(髓內溶血ineffective erythropoiesis)、過分葉中性球。鑑別點在於「神經學表現」：B12缺乏會有脊髓後柱與周邊神經病變，葉酸缺乏則無。本例55歲男性、酗酒、飲食不均、MCV 115、retic 0.5%(低)、總膽紅素1.78↑、直接膽紅素0.21(故為間接型上升)、LDH 293↑、ALT正常(20，故非肝炎主因)——典型葉酸缺乏之巨母紅血球性貧血，且無神經症狀描述，選(C)。臨床上酒精者亦可能同時缺B12，治療前最好同時檢測B12與葉酸，補充葉酸前若B12缺乏未矯正可能加重神經病變。","options":{"A":"錯誤。缺鐵為小血球，與MCV 115大血球矛盾。","B":"錯誤。溶血性貧血網狀紅血球應「升高」，本例retic 0.5%偏低(無效造血)，不符典型周邊溶血。","C":"正確。酗酒、營養不良、大血球、retic低、輕度間接膽紅素/LDH升高，符合葉酸缺乏之巨母細胞性貧血。","D":"錯誤。鉛中毒為小血球。","E":"錯誤。ALT僅20且為間接型膽紅素上升，肝炎並非主因。"},"sources":["Harrison 21e, Megaloblastic Anemias","Williams Hematology, Folate deficiency in alcoholism","Ineffective erythropoiesis markers"]}},"113-134":{"quick":"年輕女性、小血球(MCV 70)、ferritin 極低、糞便潛血陰性 → 缺鐵性貧血(月經失血為主)；無嚴重症狀或血行動力不穩，第一線為「口服硫酸亞鐵」補鐵，選A。","detail":{"background":"缺鐵性貧血(IDA)確診後的治療選擇須考量「貧血嚴重度、症狀、是否血行動力不穩、能否耐受口服」。本例25歲女性僅輕度疲倦、生命徵象穩定、僅Gr I/VI輕柔收縮期雜音(貧血所致功能性雜音)，小血球(MCV 70.3)、ferritin極低(確認儲鐵耗竭)、糞便潛血陰性(指向月經失血而非腸胃道出血)——典型育齡女性IDA。第一線治療應為「口服鐵劑(ferrous sulfate硫酸亞鐵)」，因其便宜、有效、安全；建議空腹或隔日給予以提升吸收(近年研究顯示隔日單次給予可降低hepcidin反彈、提升累積吸收)，療程需持續至Hb正常後再3–6個月以補足儲鐵。靜脈鐵保留給「無法耐受/吸收口服、嚴重持續失血、發炎性腸病、慢性腎病或需快速補鐵」者。輸血僅用於「血行動力不穩、嚴重症狀性貧血或活動性大量出血」，本例不需要。因此選(A)口服硫酸亞鐵。","options":{"A":"正確。穩定、輕症的IDA第一線為口服硫酸亞鐵，安全有效。","B":"次選。ferric maltol為較新口服鐵，多用於不耐傳統口服鐵或IBD者，非第一線首選。","C":"非首選。注射鐵保留給不能耐受/吸收口服或需快速補鐵者。","D":"錯誤。病人穩定無症狀，不需輸注紅血球。","E":"不足。單靠飲食補鐵無法矯正已存在的缺鐵性貧血，需藥物補鐵。"},"sources":["Harrison 21e, Iron Deficiency Anemia—Treatment","Williams Hematology, Oral iron therapy","Stoffel et al., alternate-day iron dosing"]}},"114-131":{"quick":"小血球貧血但「RBC 計數偏高(5.51 M/μL)」、Hb輕中度下降、Hct 31 → 紅血球數多但個個小而淡 → 海洋性貧血(thalassemia trait)；缺鐵會RBC偏低，故選D。","detail":{"background":"本題以實驗室數據與血液抹片考海洋性貧血(地中海型貧血)帶因的辨識。關鍵數據：Hb 9.3(輕中度貧血)、RBC 5.51×10⁶/μL(「偏高」)、Hct 31.2%、推算MCV ≈ Hct/RBC×10 ≈ 56.6 fL(顯著小血球)。海洋性貧血的特徵正是「紅血球數目相對偏高或正常，但每顆都小且血色素含量低」，因此呈現「明顯小血球、貧血程度卻相對輕、RBC不低反偏高」的不成比例現象；Mentzer index = MCV/RBC ≈ 56.6/5.51 ≈ 10.3(<13，傾向thalassemia)。相對地，缺鐵性貧血因生產受限，RBC計數通常「偏低」、RDW增大、ferritin低。血液抹片在thalassemia常見小球性低血色素紅血球、標靶細胞(target cells)、嗜鹼性點狀。本例典型thalassemia trait，選(D)。確診以血紅素電泳(β-thal: HbA2↑)或α基因分析；台灣為高盛行區，婚前/產前篩檢(MCV<80且鐵正常→電泳/基因)為重點政策，以預防重型海洋性貧血胎兒。","options":{"A":"錯誤。慢性病貧血多正/小血球但RBC不會偏高，且需有慢性發炎背景。","B":"錯誤。自體免疫溶血為正/大血球、網狀紅血球升高、Coombs陽性。","C":"錯誤。缺鐵性貧血RBC計數通常偏低、ferritin低，與本例RBC偏高不符。","D":"正確。小血球但RBC偏高、貧血程度不成比例、Mentzer index<13，為海洋性貧血帶因。","E":"錯誤。葉酸缺乏為大血球貧血。"},"sources":["Harrison 21e, Thalassemias","Williams Hematology, Thalassemia trait laboratory features","Mentzer index, Hb electrophoresis"]}},"109-167":{"quick":"75歲、全血球減少、骨髓化生不良(dysplasia)、blasts 9%、複雜染色體 → 高風險骨髓造血不良症候群(higher-risk MDS)；高齡不適合移植者首選去甲基化藥物 azacitidine，選D。","detail":{"background":"骨髓造血不良症候群(myelodysplastic syndrome, MDS)是源自造血幹細胞的克隆性疾病，特徵為「無效造血」造成周邊血球減少(常為一系至全血球)、骨髓細胞「化生不良(dysplasia)」、與轉化為急性骨髓性白血病的風險。診斷依WHO分類，骨髓與周邊blasts比例及細胞遺傳學是核心。風險分層常用IPSS-R(修訂版)，整合血球減少程度、骨髓blasts比例與「細胞遺傳學」：本例blasts 9%(高)、複雜染色體(complex karyotype，極差預後)、全血球減少，屬「高風險(higher-risk)MDS」。治療策略依風險與是否適合移植：①唯一可能治癒的方法是異體造血幹細胞移植(allo-HSCT)，但保留給「較年輕、體能佳、有合適捐者」者；本例75歲一般不適合。②高風險、不適合移植者的標準治療是「去甲基化藥物(hypomethylating agents)」azacitidine或decitabine，可延緩白血病轉化、改善存活與輸血需求。③低風險、以貧血為主者才用EPO/輸血支持、lenalidomide(del 5q)、luspatercept(ring sideroblasts)等。本例為高風險、高齡，最適當為azacitidine，選(D)。","options":{"A":"僅支持治療。輸注紅血球可緩解貧血但無法改變高風險MDS病程。","B":"僅支持治療。血小板輸注僅暫時止血。","C":"錯誤。EPO用於低風險、以貧血為主且EPO低者，對高風險、blasts高的MDS無益。","D":"正確。高風險MDS且高齡不適移植者，首選去甲基化藥物azacitidine。","E":"不適當。allo-HSCT雖為唯一治癒法，但75歲、複雜染色體者一般不適合。"},"sources":["Harrison 21e, Myelodysplastic Syndromes","Williams Hematology, MDS therapy","IPSS-R; NCCN MDS guidelines (hypomethylating agents)"]}},"109-169":{"quick":"55歲、全血球減少、骨髓「細胞極少(10%)、blasts正常、無化生不良」、鐵/B12/葉酸正常 → 再生不良性貧血；非年輕且未必有捐者，首選免疫抑制治療＝ATG＋cyclosporine，選C(2)+(3)。","detail":{"background":"再生不良性貧血(aplastic anemia)是骨髓造血幹細胞衰竭，造成「全血球減少＋骨髓低細胞性(hypocellular)、無異常細胞浸潤、無化生不良、無纖維化」的疾病；多數為免疫媒介(自體反應性T細胞攻擊造血幹細胞)，少數與藥物、病毒(肝炎相關)、輻射、陣發性夜間血色素尿(PNH)重疊、或先天(Fanconi)有關。本例55歲、全血球減少、骨髓細胞僅10%、blasts正常、無dysplasia、營養素正常，符合再生不良性貧血(與MDS的鑑別在於MDS有化生不良與較高blasts)。治療取決於「嚴重度、年齡、有無合適捐者」：①年輕(<40–50歲)、有HLA相合手足捐者的嚴重型，首選異體造血幹細胞移植(allo-HSCT)。②年長或無合適捐者者，首選「免疫抑制治療(IST)」——抗胸腺細胞球蛋白(ATG)＋環孢素(cyclosporine)，近年再加上eltrombopag可提升反應率。G-CSF僅輔助、不改變病程；單用cyclosporine療效不足。本例55歲，最適為ATG＋cyclosporine，選(C)。","options":{"A":"單獨allo-HSCT不適合此年齡且未述及捐者；且移植非55歲首選。","B":"單用cyclosporine療效不足，應與ATG併用。","C":"正確。年長或無捐者之再生不良性貧血首選免疫抑制治療：ATG＋cyclosporine。","D":"錯誤。G-CSF僅輔助升白血球、不能矯正幹細胞衰竭；allo-HSCT非此例首選。","E":"過度。IVIG非再生不良性貧血治療；ATG＋cyclosporine已足為核心，無須再加IVIG。"},"sources":["Harrison 21e, Aplastic Anemia","Williams Hematology, Immunosuppressive therapy for AA","Eltrombopag + IST (NIH studies)"]}},"110-132":{"quick":"PNH是GPI錨缺陷致紅血球膜失去 CD55 與「CD59」(補體調節蛋白)→ 補體媒介血管內溶血；選項D寫成「CD55與CD56」為錯誤敘述，選D。","detail":{"background":"陣發性夜間血色素尿(paroxysmal nocturnal hemoglobinuria, PNH)是後天造血幹細胞PIGA基因突變，造成GPI錨(glycosylphosphatidylinositol anchor)合成缺陷，使依賴GPI錨固定於細胞膜的「補體調節蛋白」缺失——最重要的是CD55(DAF, decay-accelerating factor)與CD59(MAC-inhibitory protein/MIRL)。缺乏CD55/CD59使紅血球無法抑制補體，導致「補體媒介的血管內溶血(intravascular hemolysis)」：表現為血色素尿(尤其晨尿深色)、LDH顯著升高、haptoglobin下降、間接膽紅素上升、網狀紅血球上升；長期可慢性鐵流失(經尿hemosiderin)而缺鐵。PNH三大臨床特徵為溶血、血栓傾向(尤其非典型部位如肝靜脈Budd-Chiari、腦靜脈)、與不同程度的骨髓衰竭(常與再生不良性貧血重疊)。診斷以「流式細胞儀偵測GPI錨蛋白(CD55/CD59)缺失」或FLAER為金標準。治療以補體C5抑制劑(eculizumab/ravulizumab)大幅降低溶血與血栓並改善存活，必要時抗凝、補鐵、葉酸。本題問「錯誤敘述」：A血管內溶血(對)、B LDH上升(對)、C haptoglobin下降(對)、E對C5抑制劑有反應(對)，唯D寫「失去CD55與CD56」錯誤(應為CD55與CD59，CD56是NK細胞標記)，故選(D)。","options":{"A":"正確。PNH為補體媒介之血管內溶血。","B":"正確。血管內溶血使LDH顯著上升。","C":"正確。游離血紅素消耗haptoglobin，使其下降。","D":"錯誤(為答案)。缺失的是CD55與「CD59」，非CD56(CD56是NK細胞標記，與PNH無關)。","E":"正確。C5補體抑制劑(eculizumab/ravulizumab)可有效控制溶血。"},"sources":["Harrison 21e, Paroxysmal Nocturnal Hemoglobinuria","Williams Hematology, PNH (GPI anchor, CD55/CD59)","Eculizumab in PNH"]}},"112-135":{"quick":"53歲嚴重再生不良性貧血(嚴重血球減少、骨髓再生不良)：免疫抑制治療為核心＝ATG＋cyclosporine，並可加 eltrombopag 促進造血；IVIG無益。故選C(1)+(2)+(3)。","detail":{"background":"嚴重再生不良性貧血(severe aplastic anemia)的嚴重度依血球數定義(嗜中性球<500、血小板<20,000、網狀紅血球低且骨髓細胞性<25%)。本例Hb 5.3、WBC 1050(嗜中性球僅約15%→絕對值極低)、血小板11,000、骨髓證實再生不良，屬嚴重型，預後與感染風險高。治療原則：①年輕且有HLA相合手足捐者→首選異體造血幹細胞移植。②年長(>40–50)或無合適捐者→「免疫抑制治療(IST)」為核心：抗胸腺細胞球蛋白(ATG，馬源優於兔源)＋環孢素(cyclosporine)。③近年大型試驗(NIH)證實在標準IST基礎上「加上血小板生成素受體促效劑eltrombopag」可顯著提升整體與完全反應率，已納入一線。④G-CSF、輸血、抗感染為支持。IVIG對再生不良性貧血「無治療角色」。因此本例最有幫助的組合為ATG＋cyclosporine＋eltrombopag，即(1)+(2)+(3)，選(C)。","options":{"A":"不完整。漏掉(2)cyclosporine，IST須ATG與cyclosporine併用。","B":"錯誤。含(4)IVIG(對再生不良無效)且漏cyclosporine、eltrombopag。","C":"正確。ATG＋cyclosporine為IST核心，加eltrombopag可提升反應率。","D":"錯誤。含(4)IVIG(無效)。","E":"錯誤。含(4)IVIG，IVIG非再生不良性貧血之治療。"},"sources":["Harrison 21e, Aplastic Anemia—Treatment","Townsley et al., Eltrombopag added to IST, NEJM 2017","Williams Hematology, Severe AA management"]}},"113-135":{"quick":"PNH實驗室：網狀紅血球上升(代償溶血)、慢性血色素尿致鐵流失→缺鐵、血色素尿(血管內溶血)；缺失的是CD55/CD59而非「CD58」。故選C(1)+(3)+(4)。","detail":{"background":"PNH的實驗室異常源自「補體媒介血管內溶血」與「慢性鐵流失」兩大機轉。①溶血指標：網狀紅血球增多(reticulocytosis，骨髓代償，但若合併骨髓衰竭可不升)、LDH顯著升高、haptoglobin下降、間接膽紅素上升。②血色素尿(hemoglobinuria)：大量血管內溶血使游離血紅素超過haptoglobin結合能力而由尿排出，尿呈深色(尤其晨尿)。③缺鐵(iron deficiency)：長期經尿流失血紅素鐵與hemosiderin，造成慢性鐵流失與缺鐵，是PNH特有且易被忽略的併發。診斷關鍵在流式細胞儀偵測「GPI錨蛋白缺失」——即CD55(DAF)與CD59(MIRL)缺失；本題的(2)「CD58 deficiency」是錯誤的(CD58/LFA-3並非GPI錨蛋白特異缺失指標)。故正確組合為(1)reticulocytosis＋(3)iron deficiency＋(4)hemoglobinuria，即(C)。","options":{"A":"錯誤。含(2)CD58 deficiency(應為CD55/CD59)，且漏(3)(4)。","B":"不完整。缺(4)hemoglobinuria。","C":"正確。網狀紅血球增多、缺鐵(慢性血色素尿致鐵流失)、血色素尿皆為PNH典型實驗室異常。","D":"錯誤。含(2)CD58 deficiency之錯誤敘述。","E":"錯誤。含(2)CD58 deficiency之錯誤敘述。"},"sources":["Harrison 21e, Paroxysmal Nocturnal Hemoglobinuria","Williams Hematology, PNH laboratory (iron loss, hemoglobinuria)","Flow cytometry CD55/CD59/FLAER"]}},"114-55":{"quick":"血栓性微血管病(TMA)共同表現＝微血管病性溶血(schistocytes、LDH升高、haptoglobin降低)＋血小板低下；TTP為ADAMTS13「降低」。選項C「schistocytes與高LDH」最正確，選C。","detail":{"background":"血栓性微血管病(thrombotic microangiopathy, TMA)是一群以「微血管內血小板血栓」為核心的疾病，臨床三聯為微血管病性溶血性貧血(microangiopathic hemolytic anemia, MAHA)＋血小板低下＋器官缺血。MAHA的實驗室標誌為周邊血抹片出現「破裂紅血球(schistocytes)」、LDH顯著升高、haptoglobin下降、間接膽紅素上升、網狀紅血球升高、Coombs陰性(非免疫性破壞，是機械性剪切)。TMA主要兩大類：①血栓性血小板低下性紫斑(TTP)——ADAMTS13(裂解超大型vWF多聚體的酵素)活性「嚴重降低(<10%)」，多為自體抗體所致，典型有神經學變化、發燒、腎損傷，治療為血漿置換＋類固醇＋(caplacizumab、rituximab)。②溶血性尿毒症候群(HUS)——典型由志賀毒素大腸桿菌(STEC)引起；非典型HUS(aHUS)為補體替代途徑失調，治療用eculizumab。本題逐項：A錯(TTP是ADAMTS13「降低」非升高)、B錯(ADAMTS13降低指向TTP而非aHUS)、D錯(溶血時haptoglobin應「降低」非升高)、E非「最正確」(腦/心功能障礙非所有TMA必備)，唯C「出現schistocytes與高LDH」是TMA共通且最正確的描述，選(C)。","options":{"A":"錯誤。TTP的ADAMTS13活性是「降低(<10%)」，非升高。","B":"錯誤。ADAMTS13降低指向TTP；aHUS為補體調節失調，ADAMTS13多正常。","C":"正確。破裂紅血球(schistocytes)與高LDH是TMA微血管病性溶血的共通標誌。","D":"錯誤。微血管病性溶血時haptoglobin應「降低」而非升高。","E":"不夠正確。腦與心功能障礙可見於TTP，但非所有TMA必備，故非「最正確」描述。"},"sources":["Harrison 21e, Thrombotic Microangiopathies (TTP/HUS)","Williams Hematology, ADAMTS13 and TTP","aHUS and complement (eculizumab)"]}},"114-129":{"quick":"63歲、全血球減少、骨髓「造血細胞極度減少、無異常浸潤」=再生不良性貧血；此年齡且常無合適捐者，免疫抑制治療首選 ATG(併cyclosporine)，選B。","detail":{"background":"本題與112-135同屬再生不良性貧血，重點在「治療選擇隨年齡與捐者而定」。診斷再生不良性貧血需骨髓「低細胞性、無異常細胞浸潤、無明顯化生不良」配合周邊全血球減少——本例63歲、Hb 6.5、WBC 1450(嗜中性球極低)、血小板14K、骨髓造血細胞極度減少且無浸潤，正符合。治療演算：①年輕(<40歲)且有HLA相合手足捐者的嚴重型→異體造血幹細胞移植可治癒。②年長(本例63歲)或無合適捐者→「免疫抑制治療」為主，核心藥為抗胸腺細胞球蛋白(ATG)，併用環孢素，現多再加eltrombopag。類固醇單用、雄性素(anabolic hormone)、α-干擾素皆非標準有效治療。本例63歲，最適當為ATG(免疫抑制治療)，選(B)。allo-HSCT在63歲、無述及捐者下非首選。","options":{"A":"不適合。63歲且未述及合適捐者，allo-HSCT非首選(移植適合較年輕者)。","B":"正確。年長或無捐者之再生不良性貧血，免疫抑制治療(ATG，併cyclosporine)為首選。","C":"錯誤。單用類固醇對再生不良性貧血無效。","D":"錯誤。雄性素(anabolic hormone)為舊式輔助，療效有限、非首選。","E":"錯誤。α-干擾素非再生不良性貧血治療。"},"sources":["Harrison 21e, Aplastic Anemia","Williams Hematology, IST in older patients","BSH/EBMT aplastic anemia guidelines"]}},"109-160":{"quick":"AML 帶 FLT3-ITD：在標準「7+3」(anthracycline＋cytarabine)誘導上加 FLT3 抑制劑 midostaurin(RATIFY試驗改善存活)，故選B。","detail":{"background":"急性骨髓性白血病(AML)的治療在「分子標記指引」時代已邁向精準化。傳統年輕/適合密集化療者的誘導治療為「7+3」方案：cytarabine連續輸注7天＋anthracycline(daunorubicin或idarubicin)3天。FLT3是受體酪胺酸激酶，約30%AML帶FLT3突變，其中內部串聯重複(internal tandem duplication, FLT3-ITD)預後較差、復發率高。RATIFY試驗(NEJM 2017)證實在FLT3突變(ITD或TKD)的新診斷AML，於7+3誘導與固化療程中加上FLT3抑制劑「midostaurin」並作為維持治療，可顯著改善整體存活，因此成為標準。第二代FLT3抑制劑gilteritinib則用於復發/難治FLT3突變AML(ADMIRAL試驗)。本例57歲AML帶FLT3-ITD，最適誘導為anthracycline＋cytarabine＋midostaurin，選(B)。此外FLT3-ITD(尤其高比值且NPM1野生型)常建議第一次完全緩解後進行異體造血幹細胞移植。","options":{"A":"不完整。標準7+3對FLT3突變者應「加上midostaurin」以改善存活。","B":"正確。FLT3突變AML於7+3誘導加FLT3抑制劑midostaurin(RATIFY試驗)為標準。","C":"錯誤。etoposide非FLT3突變AML的標準誘導，且未針對FLT3。","D":"錯誤。加etoposide並未針對FLT3標靶，非首選。","E":"錯誤。cyclophosphamide＋cytarabine非AML標準誘導(較近似淋巴系方案)。"},"sources":["Harrison 21e, Acute Myeloid Leukemia","Stone RM et al. RATIFY (midostaurin), NEJM 2017","NCCN AML guidelines (FLT3 inhibitors)"]}},"110-129":{"quick":"Inotuzumab ozogamicin＝抗 CD22 抗體藥物複合體(ADC)，核准用於復發/難治「B 細胞急性淋巴芽細胞白血病(B-ALL)」，選B。","detail":{"background":"B淋巴系細胞表面標記(CD19、CD22)是B-ALL免疫治療的重要標靶。Inotuzumab ozogamicin是「抗體藥物複合體(ADC)」：anti-CD22單株抗體連接細胞毒素calicheamicin，與B-ALL芽細胞上的CD22結合後內吞釋放毒素殺死細胞。INO-VATE試驗證實其在復發/難治B細胞前驅ALL的完全緩解率與橋接移植機會優於標準化療，故獲核准。需注意肝靜脈閉塞症候群/竇性阻塞症候群(VOD/SOS)風險，尤其後續接受移植者。對照其他B-ALL免疫治療：blinatumomab是「雙特異性T細胞銜接抗體(BiTE)」標靶CD19×CD3；tisagenlecleucel等CAR-T細胞療法標靶CD19。本題明確問anti-CD22藥物inotuzumab的適應症，為B細胞ALL，選(B)。","options":{"A":"錯誤。AML芽細胞不表現CD22(為淋巴系標記)。","B":"正確。Inotuzumab(anti-CD22 ADC)核准用於復發/難治B細胞ALL。","C":"錯誤。CLL治療以BTK抑制劑、BCL-2抑制劑、anti-CD20為主。","D":"錯誤。非何杰金淋巴瘤多用anti-CD20(rituximab)等，非anti-CD22 inotuzumab之主要適應。","E":"錯誤。ITP用類固醇、IVIG、TPO受體促效劑，與anti-CD22無關。"},"sources":["Harrison 21e, Acute Lymphoblastic Leukemia—Immunotherapy","Kantarjian H et al. INO-VATE, NEJM 2016","NCCN ALL guidelines (inotuzumab, VOD risk)"]}},"110-130":{"quick":"Venetoclax＝BCL-2 抑制劑(促凋亡)；與azacitidine或低劑量cytarabine併用，為老年/不適合密集化療AML的標準治療，選A。","detail":{"background":"Venetoclax是口服「BCL-2(B-cell lymphoma 2)抑制劑」。BCL-2是抗凋亡(anti-apoptotic)蛋白，白血病細胞常過度表現以逃避程序性死亡；抑制BCL-2可釋放促凋亡訊號(BAX/BAK)，恢復細胞凋亡。Venetoclax合併去甲基化藥物(azacitidine)或低劑量cytarabine，在「老年或不適合密集化療(7+3)的新診斷AML」顯著提升緩解率與存活(VIALE-A試驗，azacitidine+venetoclax vs azacitidine)，已成此族群標準，台灣亦有健保給付。使用初期需警覺腫瘤溶解症候群(TLS)，採劑量漸增(ramp-up)與預防措施。Venetoclax亦用於慢性淋巴細胞白血病(CLL)。本題問機轉，為BCL-2抑制劑，選(A)。","options":{"A":"正確。Venetoclax為BCL-2抑制劑，恢復白血病細胞凋亡。","B":"錯誤。MCL-1抑制劑仍多在試驗階段，非venetoclax機轉。","C":"錯誤。BTK抑制劑為ibrutinib/acalabrutinib。","D":"錯誤。RAS抑制劑非venetoclax。","E":"錯誤。免疫調節劑(IMiD)為lenalidomide等，與venetoclax機轉不同。"},"sources":["Harrison 21e, AML in older adults","DiNardo CD et al. VIALE-A (aza+venetoclax), NEJM 2020","NCCN AML (venetoclax, TLS prophylaxis)"]}},"111-129":{"quick":"AML預後不良之染色體/基因：t(6;9)、inv(3)/t(3;3)、TP53、ASXL1 皆差；而「NPM1突變且無FLT3-ITD」屬「良好預後」，為例外，選C。","detail":{"background":"AML的預後分層以「細胞遺傳學與分子標記」為核心(ELN 2022風險分層)。良好(favorable)：t(8;21)/RUNX1::RUNX1T1、inv(16)/t(16;16)/CBFB::MYH11(核心結合因子白血病CBF-AML)、APL之t(15;17)/PML::RARA、以及「NPM1突變且FLT3-ITD陰性(或低比值)」、雙等位CEBPA突變。不良(adverse)：複雜/單體核型、t(6;9)/DEK::NUP214、inv(3)或t(3;3)/GATA2;MECOM(EVI1)、TP53突變、ASXL1、RUNX1、以及FLT3-ITD合併不良背景等。本題問「預後很差者之例外」：A t(6;9)差、B t(3;3)差、D TP53差、E ASXL1差，唯C「NPM1 mutation without FLT3-ITD」屬「良好預後」，故為例外，選(C)。臨床意義：良好預後者多以化療鞏固即可，不良預後者傾向第一次緩解即行異體造血幹細胞移植。","options":{"A":"屬不良預後。t(6;9)/DEK::NUP214預後差。","B":"屬不良預後。t(3;3)/inv(3)涉及MECOM(EVI1)，預後差。","C":"正確(為例外)。NPM1突變且無FLT3-ITD屬「良好」預後，非預後差。","D":"屬不良預後。TP53突變預後極差。","E":"屬不良預後。ASXL1突變列為不良風險。"},"sources":["Harrison 21e, AML—Prognosis","Döhner H et al. ELN 2022 risk classification, Blood 2022","NPM1mut/FLT3-ITDneg favorable"]}},"111-130":{"quick":"Ibrutinib＝布魯頓酪胺酸激酶(BTK)抑制劑，用於CLL(尤其del(17p)/TP53)、套細胞淋巴瘤、華氏巨球蛋白血症等，選A。","detail":{"background":"Ibrutinib是第一個口服「布魯頓酪胺酸激酶(Bruton tyrosine kinase, BTK)抑制劑」。BTK是B細胞受體(BCR)訊號路徑的關鍵激酶，抑制後阻斷B腫瘤細胞的存活與增生訊號。Ibrutinib在慢性淋巴細胞白血病(CLL/SLL)療效顯著，尤其對傳統化學免疫治療反應差的「del(17p)/TP53突變」患者(這類病人預後差，免疫化療效果不佳)，台灣健保即給付於帶17p缺失且先前治療後惡化/復發者。其他適應包含套細胞淋巴瘤、華氏巨球蛋白血症、慢性移植物抗宿主病。常見副作用為心房顫動、出血傾向、高血壓。第二代BTK抑制劑acalabrutinib、zanubrutinib心臟副作用較少。本題問機轉，為BTK抑制劑，選(A)。","options":{"A":"正確。Ibrutinib為BTK抑制劑，阻斷B細胞受體訊號。","B":"錯誤。BCL-2抑制劑為venetoclax。","C":"錯誤。MCL-1抑制劑非ibrutinib。","D":"錯誤。RAS抑制劑非ibrutinib。","E":"錯誤。免疫調節劑為lenalidomide等。"},"sources":["Harrison 21e, Chronic Lymphocytic Leukemia","Williams Hematology, BTK inhibitors","NCCN CLL (ibrutinib for del(17p))"]}},"112-136":{"quick":"2022分類中預後較佳的AML亞型為核心結合因子白血病：t(8;21)、inv(16)/t(16;16)，以及APL之t(15;17)；t(6;9)屬不良。故(1)+(2)+(4)，選D。","detail":{"background":"WHO與ICC(International Consensus Classification) 2022對AML的分類更強調分子定義之亞型，預後分層延續ELN原則。「良好預後」的代表是核心結合因子AML(core-binding factor AML)：t(8;21)(q22;q22)/RUNX1::RUNX1T1與inv(16)(p13;q22)或t(16;16)/CBFB::MYH11，兩者對含高劑量cytarabine的鞏固反應佳；以及急性前髓細胞白血病(APL)之t(15;17)/PML::RARA——APL以全反式維甲酸(ATRA)＋砷劑(ATO)為基礎可達極高治癒率，是預後最佳、可不化療的AML亞型(但初期須警覺凝血異常/DIC與分化症候群)。相對地t(6;9)/DEK::NUP214屬「不良預後」。本題問「較好預後」：(1)t(8;21)、(2)inv(16)/t(16;16)、(4)APL t(15;17)皆佳，(3)t(6;9)差，故選(1)+(2)+(4)=(D)。","options":{"A":"不完整。漏掉(4)APL t(15;17)(預後極佳)。","B":"不完整。漏掉(1)t(8;21)。","C":"錯誤。含(3)t(6;9)(不良預後)。","D":"正確。t(8;21)、inv(16)/t(16;16)、APL t(15;17)皆屬良好預後。","E":"錯誤。含(3)t(6;9)(不良預後)。"},"sources":["Harrison 21e, AML classification & prognosis","WHO/ICC 2022 AML classification","APL: ATRA+ATO (Lo-Coco APL0406)"]}},"113-132":{"quick":"AML預後最差的核型之一為 inv(3)(q21q26)/t(3;3)，涉及GATA2;MECOM(EVI1)，常伴血小板正常/升高與單體7、預後極差，選D。","detail":{"background":"在AML的細胞遺傳學風險分層中，inv(3)(q21q26.2)或t(3;3)(q21;q26.2)導致GATA2與MECOM(EVI1)基因重排，是預後「最差」的核型之一：常合併單體7(monosomy 7)、對化療反應差、易早期復發、整體存活短，多建議第一次緩解即考慮異體造血幹細胞移植，臨床上有時伴隨血小板數正常甚至升高(因MECOM影響巨核細胞)。對照本題其他選項：t(8;21)/RUNX1::RUNX1T1與inv(16)/CBFB::MYH11屬「良好(核心結合因子)」、t(15;17)/PML::RARA(APL)預後「最佳」、NPM1突變(若無FLT3-ITD)屬「良好」。故預後最差者為(D)inv(3)/GATA2;MECOM。","options":{"A":"錯誤。t(8;21)/RUNX1::RUNX1T1屬良好預後(核心結合因子AML)。","B":"錯誤。inv(16)/CBFB::MYH11屬良好預後。","C":"錯誤。t(15;17)/PML::RARA為APL，預後最佳(ATRA+ATO可治癒)。","D":"正確。inv(3)/GATA2;MECOM(EVI1)預後最差，常伴單體7。","E":"錯誤。NPM1突變(無FLT3-ITD)屬良好預後。"},"sources":["Harrison 21e, AML cytogenetics","ELN 2022 adverse risk (inv(3)/MECOM)","WHO 2022 AML with MECOM rearrangement"]}},"114-130":{"quick":"白血球極度增多(>30萬)、左上腹脹(脾腫大)、抹片見各階段成熟之骨髓系細胞與嗜鹼性球增多 → 慢性骨髓性白血病(CML)，選C。","detail":{"background":"慢性骨髓性白血病(CML)是骨髓增生性腫瘤，由t(9;22)費城染色體產生BCR::ABL1融合基因、形成持續活化的酪胺酸激酶，驅動骨髓系細胞大量增生。臨床特徵：白血球「顯著增多」(常>100,000甚至數十萬)、明顯「脾腫大」(左上腹脹/不適)、常無明顯貧血或血小板下降(慢性期血小板正常或升高)。周邊血抹片是經典考點——可見「整個骨髓系成熟譜系(myelocyte、metamyelocyte、band、segmented)皆出現」、嗜鹼性球(basophilia)與嗜伊紅球增多、myelocyte與segmented出現雙峰(myelocyte bulge)，與急性白血病「大量原始芽細胞(blasts)伴成熟停滯」不同。本例WBC 322,380、左上腹脹(脾腫)、抹片所示，典型CML，選(C)。確診以BCR::ABL1(RT-PCR/FISH)。治療為酪胺酸激酶抑制劑(imatinib、dasatinib、nilotinib等)，預後大幅改善。鑑別：CMML有單核球增多、CNL為成熟嗜中性球增多且無BCR::ABL但有CSF3R突變。","options":{"A":"錯誤。AML以大量原始芽細胞為主，非成熟譜系全現、非如此高白血球伴脾腫的慢性表現。","B":"錯誤。ALL為淋巴芽細胞，臨床表現與抹片不同。","C":"正確。極高白血球、脾腫大、骨髓系全成熟譜系＋嗜鹼性球增多＝CML。","D":"錯誤。CMML以持續單核球增多(>1000且≥10%)為特徵，本例非。","E":"錯誤。CNL為成熟嗜中性球增多、無此抹片表現且罕見。"},"sources":["Harrison 21e, Chronic Myeloid Leukemia","Williams Hematology, CML peripheral blood","BCR::ABL1, TKI therapy"]}},"114-132":{"quick":"早期、無症狀的B細胞慢性淋巴性白血病(CLL)，標準處置為「觀察追蹤(watchful waiting)」，不需立即治療，選E。","detail":{"background":"慢性淋巴細胞白血病(CLL)是成人最常見的白血病，為成熟B淋巴球克隆累積，流式細胞儀典型為CD5+、CD19+、CD23+、表面免疫球蛋白弱表現。分期用Rai或Binet。CLL治療的核心原則是「早期、無症狀者不需治療」——多項研究證實對早期無症狀CLL「提早治療並不改善存活」，故標準為觀察追蹤(watchful waiting/active surveillance)，直到出現「治療指徵」才開始：包括症狀性或進展性淋巴結/脾腫大、有症狀的疾病(顯著疲倦、盜汗、體重下降、發燒)、進行性骨髓衰竭(貧血或血小板低下)、自體免疫血球減少對類固醇無反應、或淋巴球倍增時間短。本例70歲、僅輕度淋巴結與脾腫、無不適、無血球減少，屬早期無症狀，最適當為(E)觀察追蹤。當需治療時，現代首選為BTK抑制劑(ibrutinib/acalabrutinib)或venetoclax＋obinutuzumab，化療(chlorambucil)已少用。","options":{"A":"過度。Ibrutinib保留給有治療指徵者，無症狀早期不需立即用。","B":"過度。Venetoclax用於需治療之CLL，非無症狀早期首選。","C":"過時。Chlorambucil為舊式化療，且本例尚不需治療。","D":"錯誤。類固醇非無症狀CLL的處置。","E":"正確。早期、無症狀CLL標準為觀察追蹤，提早治療無存活益處。"},"sources":["Harrison 21e, Chronic Lymphocytic Leukemia","Williams Hematology, CLL—watch and wait","iwCLL treatment indications"]}},"114-134":{"quick":"Ph染色體陽性ALL為「B淋巴系」白血病(CD19+)，細胞表面不表現T細胞標記CD3；故「ALL細胞表面有CD3」為錯誤敘述，選B。","detail":{"background":"費城染色體陽性(Ph+)急性淋巴芽細胞白血病(ALL)帶t(9;22)、產生BCR::ABL1融合基因。重要特性：①「成人」ALL中Ph+比例(約25%且隨年齡上升)遠「高於」兒童ALL(約3–5%)，故A正確。②Ph+ ALL幾乎都是「B淋巴系前驅細胞(B-ALL)」，免疫表型為CD19+、CD10±、TdT+，「不表現T細胞標記CD3」；故選項B「ALL細胞表面有CD3」為錯誤敘述(CD3是T細胞標記)，為答案。③染色體可見t(9;22)，C正確。④Ph+ ALL對ABL酪胺酸激酶抑制劑(imatinib、dasatinib、ponatinib)反應良好，加入TKI已大幅改善預後，D正確。⑤異體造血幹細胞移植在第一次緩解可改善預後(尤其高風險者)，E正確。本題選錯誤者(B)。","options":{"A":"正確。Ph+在成人ALL發生率高於兒童ALL。","B":"錯誤(為答案)。Ph+ ALL為B淋巴系(CD19+)，細胞表面不表現T細胞標記CD3。","C":"正確。Ph染色體即t(9;22)。","D":"正確。Dasatinib等TKI對Ph+ ALL很有效。","E":"正確。異體造血幹細胞移植可改善Ph+ ALL預後。"},"sources":["Harrison 21e, Acute Lymphoblastic Leukemia (Ph+)","Williams Hematology, ALL immunophenotype","TKI + chemotherapy in Ph+ ALL"]}},"114-135":{"quick":"AML不良預後核型：t(6;9)、t(9;22)(Ph+/BCR-ABL)、inv(3)/MECOM、TP53突變 皆屬高風險；四者全選，選E。","detail":{"background":"本題列舉的四種異常皆屬AML「不良(adverse)風險」(ELN 2022)：(1)t(6;9)(p23;q34)/DEK::NUP214——常伴FLT3-ITD、預後差；(2)t(9;22)(q34;q11)/BCR::ABL1——AML帶費城染色體屬不良風險(WHO亦列為特定亞型)；(3)inv(3)(q21q26)/GATA2;MECOM(EVI1)——常伴單體7、預後最差之一；(4)mutated TP53——AML中TP53突變預後極差、對化療抗性高、移植後仍易復發。因此四者皆為預後較差，全選(E)。臨床上這些高風險者一旦達緩解即傾向異體造血幹細胞移植，並評估標靶/新藥(如TP53相關的試驗性藥物、含venetoclax方案)。此題與111-129、113-132同為AML細胞遺傳學風險分層的反覆考點，務必熟記「良好(CBF、APL、NPM1mut/FLT3neg)」對「不良(複雜核型、t(6;9)、inv(3)、TP53、Ph+)」兩大陣營。","options":{"A":"不完整。(3)inv(3)與(4)TP53亦屬不良預後，應一併選入。","B":"不完整。漏(1)t(6;9)與(3)inv(3)。","C":"不完整。漏(4)TP53。","D":"不完整。漏(1)t(6;9)。","E":"正確。t(6;9)、t(9;22)、inv(3)/MECOM、TP53突變皆屬AML不良預後。"},"sources":["Harrison 21e, AML cytogenetic/molecular risk","ELN 2022 adverse-risk AML","WHO 2022 AML with BCR::ABL1 / MECOM"]}},"107-綜-10":{"quick":"門脈靜脈血栓(非典型部位栓塞)＋周邊血JAK2突變 → 骨髓增生性腫瘤(MPN)；JAK2 V617F是PV/ET/PMF的標誌，選A。","detail":{"background":"「非典型部位的靜脈血栓(splanchnic/portal vein、肝靜脈Budd-Chiari、腦靜脈)」是骨髓增生性腫瘤(myeloproliferative neoplasm, MPN)的重要警訊，尤其當血球數可能尚未明顯升高(隱匿型)時。MPN(真性紅血球增多症PV、原發性血小板增多症ET、原發性骨髓纖維化PMF)約95%以上帶有JAK2(V617F最常見)、CALR或MPL突變，造成JAK-STAT路徑持續活化、骨髓系過度增生與血栓傾向。臨床上凡是內臟靜脈或腦靜脈血栓的年輕/中年患者，應檢測JAK2 V617F以篩檢潛在MPN(即使血色素、血小板正常)。本例50歲女性門脈靜脈血栓＋JAK2突變，最可能為MPN，選(A)。其他選項：PNH(B)也會血栓且可血色素尿，但與JAK2無關；protein S/C deficiency、antithrombin III deficiency(C/D/E)為遺傳性易栓症，亦不會有JAK2突變。","options":{"A":"正確。內臟靜脈血栓＋JAK2突變高度指向骨髓增生性腫瘤(MPN)。","B":"錯誤。PNH為GPI錨缺陷(CD55/CD59)，與JAK2突變無關。","C":"錯誤。Protein S缺乏為遺傳性易栓症，不會有JAK2突變。","D":"錯誤。Protein C缺乏同理，與JAK2無關。","E":"錯誤。抗凝血酶III缺乏為遺傳性易栓症，與JAK2無關。"},"sources":["Harrison 21e, Myeloproliferative Neoplasms","Williams Hematology, JAK2 V617F","Splanchnic vein thrombosis & MPN screening"]}},"109-161":{"quick":"真性紅血球增多症(PV)的標誌性基因突變為 JAK2(V617F約95%，exon12約3%)，選D。","detail":{"background":"真性紅血球增多症(polycythemia vera, PV)是以紅血球(及常合併白血球、血小板)過度增生為特徵的骨髓增生性腫瘤。WHO診斷需符合：①Hb/Hct或紅血球量升高(男Hb>16.5、女>16.0等)、②骨髓三系增生(panmyelosis)、③JAK2突變；次標準為血清EPO「降低」。約95–97%的PV帶JAK2 V617F(exon 14)突變，少數(約3%)為JAK2 exon 12突變，故「JAK2突變」幾乎是PV的必備分子標誌(CALR與MPL突變見於ET/PMF，PV罕見)。本例65歲女性Hb 19.5、Hct 58.5%、白血球與血小板亦升高，要證明PV最該檢測JAK2突變，選(D)。臨床上PV易血栓(動靜脈)、搔癢(洗澡後)、紅斑性肢痛，治療以放血(維持Hct<45%)、低劑量aspirin、高風險者加hydroxyurea或ruxolitinib(JAK抑制劑)。","options":{"A":"錯誤。BCR/ABL為CML之標誌，非PV。","B":"錯誤。ASXL1見於MDS/MPN等，非PV診斷標誌。","C":"錯誤。CALR突變主要見於ET與PMF，PV罕見。","D":"正確。約95%的PV帶JAK2 V617F，是其診斷標誌。","E":"錯誤。RUNX1與某些骨髓腫瘤相關，非PV診斷標誌。"},"sources":["Harrison 21e, Polycythemia Vera","WHO 2016/2022 PV criteria (JAK2, low EPO)","Williams Hematology, JAK2 in PV"]}},"109-162":{"quick":"Daratumumab＝抗CD38單株抗體，治療多發性骨髓瘤(漿細胞高表現CD38)，選A。","detail":{"background":"多發性骨髓瘤(multiple myeloma, MM)為惡性漿細胞克隆增生，分泌單株免疫球蛋白(M蛋白)，造成CRAB器官損害。漿細胞高度表現CD38，故CD38成為重要免疫治療標靶。Daratumumab是「抗CD38單株抗體」，透過補體依賴性細胞毒性(CDC)、抗體依賴性細胞毒性(ADCC)、吞噬與直接作用殺滅骨髓瘤細胞；併入一線(如Dara-VRd、Dara-VMP)與復發療程可顯著改善反應與存活，台灣已健保給付。使用前須注意會干擾輸血交叉配對(因紅血球亦微量表現CD38，造成間接Coombs偽陽性，需通知血庫)。對照：anti-CD20(rituximab)用於B細胞淋巴瘤、anti-SLAMF7(elotuzumab)、anti-BCMA(belantamab、CAR-T、teclistamab雙特異抗體)亦為MM標靶；proteasome抑制劑(bortezomib)與免疫調節劑(lenalidomide)為MM骨幹藥。本題機轉為anti-CD38，選(A)。","options":{"A":"正確。Daratumumab為抗CD38單株抗體，治療多發性骨髓瘤。","B":"錯誤。anti-CD20(rituximab)用於B細胞淋巴瘤。","C":"錯誤。CD138雖為漿細胞標記，但daratumumab標靶為CD38而非CD138。","D":"錯誤。proteasome抑制劑為bortezomib/carfilzomib，非daratumumab。","E":"錯誤。HDAC抑制劑為panobinostat等，非daratumumab。"},"sources":["Harrison 21e, Multiple Myeloma—Therapy","Williams Hematology, anti-CD38 antibodies","Daratumumab & blood bank interference"]}},"109-164":{"quick":"Double-hit 淋巴瘤＝同時有 MYC 與 BCL2(±BCL6)基因重組的高惡性度B細胞淋巴瘤，預後差，選A。","detail":{"background":"「Double-hit lymphoma(雙重打擊淋巴瘤)」在WHO分類中稱為「高惡性度B細胞淋巴瘤伴MYC與BCL2(和/或BCL6)重排(high-grade B-cell lymphoma with MYC and BCL2 and/or BCL6 rearrangements)」。其定義是同時帶有「MYC」重排，加上「BCL2」(和/或BCL6)重排。MYC驅動增生、BCL2抑制凋亡，兩者並存使腫瘤侵襲性極高、對標準R-CHOP反應差、預後不良，常需更強化方案(如DA-EPOCH-R)並積極評估CNS預防。最常見且預後最差的組合是MYC＋BCL2。本題問double-hit DLBCL的兩個基因重組，最典型為「MYC, BCL2」，選(A)。注意「double-expressor lymphoma」(免疫組化MYC與BCL2蛋白高表現但無基因重排)與double-hit不同，預後較double-hit稍好但仍差於一般DLBCL。","options":{"A":"正確。Double-hit以MYC＋BCL2(±BCL6)基因重排定義，最典型為MYC, BCL2。","B":"錯誤。BCL2＋BCL6若無MYC重排不構成double-hit之核心定義。","C":"錯誤。MCL1非double-hit定義基因。","D":"錯誤。MCL1非double-hit定義基因。","E":"錯誤。BCL1(cyclin D1)為套細胞淋巴瘤標記，非double-hit定義。"},"sources":["Harrison 21e, Non-Hodgkin Lymphoma","WHO classification: HGBL with MYC and BCL2/BCL6","Williams Hematology, double-hit lymphoma"]}},"110-134":{"quick":"原發性多血症(PV)最常見的基因突變為 JAK2(V617F)，約佔95%以上，選A。","detail":{"background":"本題與109-161同考PV的分子標誌。真性紅血球增多症(PV)約95–97%帶「JAK2 V617F」(位於exon 14)突變，少數為JAK2 exon 12突變(約3%)，幾乎所有PV病人皆可偵測到JAK2活化突變，使其成為診斷必備分子標準與最常見突變。CALR與MPL突變主要出現在原發性血小板增多症(ET)與原發性骨髓纖維化(PMF)，PV罕見。DNMT3A、TET2、ASXL1等屬「附加(secondary)」克隆性突變，可見於多種骨髓腫瘤但非PV的特異/最常見驅動突變。故PV最常見突變為(A)JAK2。JAK2 V617F造成JAK-STAT路徑不受EPO調控而持續活化，因此PV的血清EPO反而「降低」(與次發性多血症EPO升高相反，是重要鑑別)。","options":{"A":"正確。JAK2(V617F)為PV最常見、近乎必備之驅動突變(>95%)。","B":"錯誤。CALR主要見於ET/PMF，PV罕見。","C":"錯誤。MPL突變見於ET/PMF少數，非PV最常見。","D":"錯誤。DNMT3A為附加突變，非PV特異/最常見驅動。","E":"錯誤。IDH突變見於AML等，非PV最常見。"},"sources":["Harrison 21e, Polycythemia Vera","WHO PV criteria (JAK2)","JAK-STAT activation, low EPO in PV"]}},"111-134":{"quick":"鑑別原發性(PV)與次發性多血症：PV有JAK2突變、脾腫、白血球/血小板增多、血漿容量擴張且EPO「低」；而「EPO升高」是「次發性」的特徵，故為例外，選E。","detail":{"background":"多血症(polycythemia/erythrocytosis)分原發性(PV，骨髓自主增生)與次發性(EPO驅動，如缺氧、腎/肝腫瘤分泌EPO、外源EPO)。鑑別關鍵在「血清EPO」：PV因JAK2活化使紅血球生成不依賴EPO，故EPO「降低」；次發性多血症則EPO「升高(或不適當地正常)」。其他支持「PV(原發)」的特徵包括：①JAK2 V617F突變陽性、②脾腫大(splenomegaly)、③合併白血球與血小板增多(三系增生，次發性通常只有紅血球增多)、④血漿容量擴張。本題問「能幫忙鑑別為原發性而非次發性、何者為例外」——A JAK2突變、B脾腫、C血漿容量擴張、D白血球與血小板增多皆指向「原發PV」，唯E「EPO升高」是指向「次發性」(在PV中EPO應降低)，故為例外，選(E)。","options":{"A":"支持PV。JAK2突變指向原發性骨髓增生。","B":"支持PV。脾腫大常見於PV，次發性少見。","C":"支持PV。血漿容量擴張見於PV。","D":"支持PV。白血球與血小板同時增多(三系)指向原發性。","E":"正確(為例外)。EPO「升高」指向次發性多血症；PV的EPO應「降低」。"},"sources":["Harrison 21e, Polycythemia—Primary vs Secondary","WHO PV criteria (subnormal EPO)","Williams Hematology, erythrocytosis workup"]}},"112-129":{"quick":"Daratumumab作用機轉＝抗CD38單株抗體，為治療多發性骨髓瘤的有效藥物，選C。","detail":{"background":"此題與109-162重複考daratumumab的機轉，再次強調：daratumumab是「抗CD38(anti-CD38)單株抗體」。CD38是漿細胞高度表現的醣蛋白，daratumumab結合後透過補體依賴(CDC)、抗體依賴細胞毒(ADCC)、抗體依賴吞噬(ADCP)與直接誘導凋亡等多重機轉殺滅骨髓瘤細胞，並調節免疫微環境(減少免疫抑制細胞)。現已廣泛用於新診斷與復發/難治多發性骨髓瘤，常與bortezomib(蛋白酶體抑制劑)、lenalidomide(免疫調節劑)、dexamethasone組成四聯或三聯方案，大幅提升反應深度(含MRD陰性)與存活。臨床注意：①輸注反應(首劑常見，需前驅給藥)；②干擾輸血間接Coombs(需通知血庫並可用DTT處理)；③干擾M蛋白量測(IgG kappa可被誤判)。同類anti-CD38藥還有isatuximab。本題選(C)anti-CD38 antibody。","options":{"A":"錯誤。蛋白酶體抑制劑為bortezomib/carfilzomib。","B":"錯誤。BCL-2抑制劑為venetoclax。","C":"正確。Daratumumab為抗CD38單株抗體。","D":"錯誤。標靶為CD38而非CD138。","E":"錯誤。BTK抑制劑為ibrutinib。"},"sources":["Harrison 21e, Multiple Myeloma","Williams Hematology, anti-CD38 mAb mechanisms","Daratumumab lab interferences"]}},"112-130":{"quick":"欲證明真性紅血球增生症(PV)，最該檢測的基因突變為 JAK2，選A。","detail":{"background":"本題再次以臨床情境(頭暈頭痛、Hb 18.1、Hct 54%、白血球與血小板皆升高)考PV的分子診斷。真性紅血球增多症(PV)約95%以上帶JAK2 V617F突變(少數exon 12)，是WHO診斷的主要分子標準，故要「證明PV」最直接檢測JAK2。臨床線索亦支持PV：紅血球增多合併白血球與血小板增多(三系)、可能脾腫、血栓或微血管症狀(頭暈頭痛、紅斑肢痛、洗澡後搔癢)。確診後須排除次發性(EPO應偏低)。CALR/MPL主要見於ET/PMF；RUNX1、ASXL1、TET2為附加突變或見於其他骨髓腫瘤，非PV首要檢測。故選(A)JAK2。治療同前述：放血維持Hct<45%、低劑量aspirin、高風險加細胞減量藥(hydroxyurea)或ruxolitinib。","options":{"A":"正確。PV以JAK2突變為主要分子標準，欲證明PV首選檢測JAK2。","B":"錯誤。CALR主要見於ET/PMF。","C":"錯誤。RUNX1非PV診斷標誌。","D":"錯誤。ASXL1為附加突變，非PV首要。","E":"錯誤。TET2為附加突變，非PV診斷標誌。"},"sources":["Harrison 21e, Polycythemia Vera","WHO PV diagnostic criteria","JAK2 testing in erythrocytosis"]}},"112-134":{"quick":"鼻腔淋巴瘤、CD56(+)、EBER(+)、表面CD3(−)但細胞質CD3(+)、CD2(+)→ 結外NK/T細胞淋巴瘤(鼻型)，選A。","detail":{"background":"結外NK/T細胞淋巴瘤(extranodal NK/T-cell lymphoma, nasal type)是與EB病毒(EBV)強相關的侵襲性淋巴瘤，在亞洲/台灣相對常見，好發於鼻腔與上呼吸消化道，造成中線破壞性病變(舊稱lethal midline granuloma)。其免疫表型極具特徵：①「EBER陽性(EBV-encoded small RNA)」——幾乎為診斷必備；②「CD56陽性(+)」——NK細胞標記；③「表面CD3陰性、但細胞質CD3ε陽性(surface CD3−/cytoplasmic CD3+)」——反映NK細胞特性；④CD2+、cytotoxic分子(granzyme B、TIA-1、perforin)陽性，多數CD5−、CD20−(非B細胞)。本例完全符合，選(A)。治療含放療(早期局限)與含L-asparaginase之方案(如SMILE)，因常有MDR-1多重抗藥而傳統anthracycline效果差。鑑別：周邊T細胞淋巴瘤通常表面CD3+且EBER多陰性；B細胞淋巴瘤CD20+；Hodgkin為CD15/CD30+ Reed-Sternberg細胞。","options":{"A":"正確。EBER+、CD56+、cytoplasmic CD3+/surface CD3−、CD2+為NK/T細胞淋巴瘤(鼻型)典型表型。","B":"錯誤。周邊T細胞淋巴瘤多表面CD3+且EBER常陰性、CD56多陰性。","C":"錯誤。EBV+ B細胞淋巴瘤應CD20+等B標記陽性，本例CD20−。","D":"錯誤。Hodgkin為CD15/CD30+ Reed-Sternberg細胞，非此表型。","E":"錯誤。漿母細胞淋巴瘤表現漿細胞標記(CD138)，非CD56/cytoplasmic CD3型。"},"sources":["Harrison 21e, NK/T-cell Lymphoma","WHO classification, extranodal NK/T-cell lymphoma, nasal type","EBV, SMILE regimen"]}},"113-131":{"quick":"多發性骨髓瘤的「定義事件」為CRAB＋SLiM：高血鈣、腎損傷、貧血、骨病變等；「蛋白尿」本身非定義事件，為例外，選D。","detail":{"background":"多發性骨髓瘤(MM)的診斷與「冒煙型骨髓瘤(smoldering MM, SMM)」的區別，在於是否出現「骨髓瘤定義事件(myeloma-defining events, MDE)」。依IMWG準則，MDE包含：①CRAB器官損害——hyperCalcemia(高血鈣，校正鈣>11或>1 mg/dL above ULN)、Renal insufficiency(腎損傷，Cr>2或CrCl<40)、Anemia(貧血，Hb<10或低於正常2 g/dL)、Bone lesions(溶骨病變，影像≥1處)；②SLiM生物標記——clonal bone marrow plasma cells ≥60%、serum free light chain ratio ≥100(involved≥100 mg/L)、MRI >1處focal lesion。符合任一MDE即診斷MM需治療；若有M蛋白/漿細胞增多但無MDE則為SMM(觀察)。本題問「何者非定義事件」：A貧血、B腎損傷、C骨病變、E高血鈣皆為CRAB，唯D「蛋白尿(proteinuria)」本身「不是」骨髓瘤定義事件(雖然腎損傷或Bence-Jones蛋白可伴隨，但定義事件是『腎功能不全』而非單純蛋白尿)，故為例外，選(D)。","options":{"A":"是定義事件。貧血(Anemia)屬CRAB。","B":"是定義事件。腎功能不全(Renal)屬CRAB。","C":"是定義事件。溶骨病變(Bone lesion)屬CRAB。","D":"正確(為例外)。蛋白尿本身非MM定義事件；定義的是「腎功能不全」而非單純蛋白尿。","E":"是定義事件。高血鈣(hyperCalcemia)屬CRAB。"},"sources":["Harrison 21e, Multiple Myeloma—Diagnosis","IMWG diagnostic criteria (CRAB + SLiM)","Smoldering vs active myeloma"]}},"113-133":{"quick":"濾泡性淋巴瘤雖為晚期(橫膈上下皆侵犯)，但「低腫瘤負荷、無症狀、無臟器/血球影響」者標準處置為觀察追蹤(watchful waiting)，選E。","detail":{"background":"濾泡性淋巴瘤(follicular lymphoma, FL)是最常見的惰性(indolent)非何杰金淋巴瘤，帶t(14;18)/BCL2過度表現，病程緩慢但難治癒、易反覆復發。FL的治療決策「不單看分期」，而看「腫瘤負荷與症狀」：即使是晚期(III/IV期，橫膈上下或骨髓侵犯)，若屬「低腫瘤負荷、無症狀(asymptomatic, low tumor burden)」，依GELF準則(無大腫塊>7 cm、受侵淋巴結區<3且各<3 cm、無顯著脾腫、無器官壓迫、無全身症狀、無血球減少、無快速進展)，標準處置是「觀察追蹤(watchful waiting)」——多項研究顯示對低負荷無症狀FL「提早治療不改善整體存活」。本例48歲、橫膈上下多個1–2.5 cm淋巴結(無大腫塊)、無臟器侵犯、無不適、血球與肝腎功能正常——屬低負荷無症狀晚期FL，最適當為(E)觀察追蹤。當出現高腫瘤負荷或症狀時才治療，常用bendamustine＋rituximab(BR)或R-CHOP，並可rituximab維持。","options":{"A":"過度。單用rituximab可用於低負荷FL，但無症狀低負荷者「先觀察」即可。","B":"過度。R-CVP保留給需治療之高負荷/症狀性FL。","C":"過度。R-CHOP用於高負荷或組織學轉化者，非此低負荷無症狀者首選。","D":"過度。BR(bendamustine+rituximab)用於需治療之FL，非無症狀低負荷首選。","E":"正確。低腫瘤負荷、無症狀的晚期濾泡性淋巴瘤，標準為觀察追蹤。"},"sources":["Harrison 21e, Follicular Lymphoma","GELF criteria; watch-and-wait in low-burden FL","Williams Hematology, indolent NHL management"]}},"101-綜-9":{"quick":"血友病A合併第八因子抑制抗體出血時，採「繞道製劑(bypassing agents)」：rFVIIa、活化型凝血酶原複合體(aPCC)，及高劑量/豬源FVIII；三者皆可用，選E(1)+(2)+(3)。","detail":{"background":"血友病A(factor VIII deficiency)病人反覆輸注FVIII後，約25–30%(尤其重度)會產生「第八因子抑制抗體(inhibitor)」，使一般FVIII補充無效，出血控制變得困難。處理依抑制抗體效價(以Bethesda units, BU量化)：①低效價(<5 BU)可嘗試「高劑量FVIII」中和並止血。②高效價或反應型(anamnestic)：採用「繞道製劑(bypassing agents)」——重組活化第七因子(rFVIIa, eptacog alfa)或「活化型凝血酶原複合體濃縮劑(activated prothrombin complex concentrate, aPCC, FEIBA)」，繞過FVIII/FIX直接促進凝血酶生成。③「豬源(porcine)FVIII」(現為重組豬序列susoctocog alfa)因與人類抑制抗體交叉反應較低，可作另一止血選擇。長期則以「免疫耐受誘導(ITI)」清除抗體，並可用emicizumab(雙特異抗體模擬FVIII功能)做預防。本題列出rFVIIa、porcine FVIII、aPCC三者皆為合理止血選擇，故全選(E)。","options":{"A":"不完整。rFVIIa可用，但porcine FVIII與aPCC亦為選項。","B":"不完整。豬源FVIII可用，但其餘兩者亦是。","C":"不完整。aPCC可用，但其餘兩者亦是。","D":"不完整。漏掉(1)rFVIIa。","E":"正確。rFVIIa、豬源FVIII、aPCC皆可用於有FVIII抑制抗體者之出血控制。"},"sources":["Harrison 21e, Coagulation Disorders—Inhibitors","Williams Hematology, Factor VIII inhibitors (bypassing agents)","WFH hemophilia guidelines"]}},"102-綜-11":{"quick":"尿毒症(uremia)主要造成「血小板功能異常(質的缺陷)」而非血小板「數目」下降；Evans、肝硬化、HIV、penicillin皆會使血小板「數量」減少，故血小板低下機會最小者為D尿毒症。","detail":{"background":"血小板低下(thrombocytopenia)機轉分為①生成減少、②破壞/消耗增加、③脾扣留、④稀釋。本題比較五種情況造成「血小板數目」下降的可能性：A. Evans syndrome——自體免疫同時破壞血小板(ITP)與紅血球(AIHA)，必然血小板低下。B. 肝硬化——門脈高壓脾腫大扣留血小板、加上肝臟製造thrombopoietin減少，常見血小板低下。C. HIV感染——可透過免疫破壞與骨髓抑制造成血小板低下(HIV相關ITP常見)。E. Penicillin treatment——藥物可誘發免疫性血小板低下(drug-induced immune thrombocytopenia)。D. 尿毒症(uremia)——其特徵是「血小板『功能』異常(質的缺陷)」：尿毒素干擾血小板黏附與聚集、von Willebrand因子作用受損，導致出血傾向與出血時間延長，但血小板「數目」通常正常或僅輕度下降。故「出現血小板低下(數目減少)機會最小」者為(D)尿毒症。臨床上尿毒性出血以透析、去氨加壓素(DDAVP)、冷凍沉澱、矯正貧血(提高Hct)處理。","options":{"A":"會血小板低下。Evans症候群為免疫破壞血小板＋紅血球。","B":"會血小板低下。肝硬化脾亢扣留＋TPO減少。","C":"會血小板低下。HIV可致免疫性血小板低下與骨髓抑制。","D":"正確(機會最小)。尿毒症主要造成血小板「功能」異常，數目通常正常或僅輕度下降。","E":"會血小板低下。Penicillin可誘發藥物性免疫血小板低下。"},"sources":["Harrison 21e, Disorders of Platelets","Williams Hematology, Uremic platelet dysfunction","Drug-induced thrombocytopenia"]}},"108-綜-3":{"quick":"PT與aPTT「同時」延長，最不可能為第十二因子缺乏——FXII缺乏只延長aPTT(不影響PT)且不出血；warfarin、rivaroxaban、肝病可同時影響兩者，選D。","detail":{"background":"解讀凝血篩檢需熟記「PT走外在途徑(因子VII＋共同途徑)、aPTT走內在途徑(因子XII、XI、IX、VIII＋共同途徑)、兩者共用共同途徑(X、V、II、fibrinogen)」。本例PT 16.3(延長，INR 1.52)且PTT 54.3(延長)——「兩者同時延長」指向共同途徑缺陷、多因子缺乏(肝病、維生素K缺乏/warfarin)或廣效抗凝藥。逐項：A. Warfarin抑制維生素K依賴因子(II,VII,IX,X)，PT先延長、劑量大時aPTT亦延長——可。B. Rivaroxaban為Xa抑制劑(共同途徑)，可同時延長PT與aPTT(PT較敏感)——可。E. 肝病使多種凝血因子合成減少，PT與aPTT皆可延長——可。C. Aspirin僅抑制血小板功能，不影響PT/aPTT(嚴格說此題以D為最不可能)。D. 第十二因子(FXII)缺乏——只影響「內在途徑」故僅延長aPTT、「不影響PT」，且FXII缺乏「不會出血」(僅試管內aPTT延長)，因此無法解釋本例「PT亦延長」，為「最不可能」者，選(D)。","options":{"A":"可能。Warfarin延長PT，大劑量時aPTT亦延長。","B":"可能。Rivaroxaban(Xa抑制劑)可同時延長PT與aPTT。","C":"不影響凝血時間，但題目要選「最不可能」解釋PT＋aPTT同時延長者為D。","D":"正確(最不可能)。FXII缺乏只延長aPTT、不影響PT且不出血，無法解釋PT延長。","E":"可能。肝病使多因子減少，PT與aPTT皆延長。"},"sources":["Harrison 21e, Coagulation testing (PT/aPTT)","Williams Hematology, Factor XII deficiency (no bleeding)","DOAC effects on coagulation assays"]}},"109-98":{"quick":"aPTT延長、混合試驗「不能矯正」且「隨時間/溫育加重(time/temperature-dependent)」→ 第八因子抑制抗體 → 後天性血友病A，選B。","detail":{"background":"混合試驗(mixing study)是延長aPTT之鑑別利器：將病人血漿與正常血漿1:1混合，若aPTT「矯正(縮短至接近正常)」表示「因子缺乏」(正常血漿補足因子)；若「不矯正」表示存在「抑制物(inhibitor)」。抑制物又分兩型：①「立即型、與磷脂相關」如狼瘡抗凝物(lupus anticoagulant)——混合後即不矯正、不隨時間加重。②「時間/溫度依賴型(time- and temperature-dependent)」如「第八因子抑制抗體」——混合「開始」可能部分矯正(39.2\")，但於37°C「溫育1小時後反而再延長(51.2\")」，因抗FVIII抗體需時間中和正常血漿的FVIII。本例正符合後者，且臨床為「自發性軟組織瘀青/血腫」(非關節，老年女性)、僅aPTT延長(PT正常)——典型「後天性血友病A(acquired hemophilia A，自體抗FVIII抗體)」，選(B)。治療：繞道製劑(rFVIIa/aPCC)止血＋免疫抑制(類固醇±cyclophosphamide/rituximab)清除抗體。","options":{"A":"錯誤。抗磷脂症候群之狼瘡抗凝物混合後「即刻」不矯正且不隨時間加重，且通常為血栓而非自發出血。","B":"正確。混合試驗不矯正且隨溫育時間加重，為時間依賴型FVIII抑制抗體＝後天性血友病A。","C":"錯誤。von Willebrand disease混合試驗會矯正(因子缺乏型)，且多有黏膜出血史。","D":"錯誤。Warfarin過量會延長PT/INR(本例PT/INR正常)。","E":"錯誤。肝功能不全PT亦會延長且混合試驗多可矯正。"},"sources":["Harrison 21e, Acquired Hemophilia","Williams Hematology, Mixing studies & FVIII inhibitor","Acquired hemophilia A management"]}},"110-121":{"quick":"IVIG在血液疾病中對「免疫性血小板低下(ITP)」最為有效——透過Fc受體阻斷與調節，快速提升血小板，選C。","detail":{"background":"靜脈免疫球蛋白(IVIG)的作用機轉多元：阻斷網狀內皮系統巨噬細胞的Fc受體、抑制抗體媒介之血球破壞、調節補體與細胞激素、抗獨特型抗體中和自體抗體等。在血液學上，IVIG對「免疫性血小板低下(immune thrombocytopenia, ITP)」最具明確療效——透過Fcγ受體阻斷脾臟巨噬細胞對抗體包覆血小板的破壞，可在1–3天內快速提升血小板，特別適用於需「快速」升板的情境(嚴重出血、術前準備、孕婦)。本題其他選項並非IVIG的標準有效適應：A腎病症候群、B猛爆性肝炎、D甲狀腺風暴、E急性肺出血(若為抗GBM/血管炎需血漿置換與免疫抑制，IVIG非主力)。故選(C)。其他IVIG明確有效的免疫/神經疾病尚包括Guillain-Barré、慢性發炎性脫髓鞘多神經病(CIDP)、川崎病、原發性免疫缺乏的替代治療等，但本題情境以ITP為最佳答案。","options":{"A":"錯誤。腎病症候群非IVIG適應症。","B":"錯誤。猛爆性肝炎治療非IVIG。","C":"正確。IVIG對免疫性血小板低下(ITP)最有效，可快速升板(Fc受體阻斷)。","D":"錯誤。甲狀腺風暴治療為抗甲狀腺藥、β阻斷劑、碘劑、類固醇，非IVIG。","E":"錯誤。急性肺出血(如抗GBM/血管炎)以血漿置換與免疫抑制為主。"},"sources":["Harrison 21e, Immune Thrombocytopenia","Williams Hematology, IVIG mechanisms in ITP","ASH 2019 ITP guidelines"]}},"110-133":{"quick":"年輕、孤立性血小板低下(36K)、無其他異常 → 推定免疫性血小板低下(ITP，排除性診斷)；常規排除HCV/HIV/SLE/APS即可，「骨髓檢查」對年輕典型者最不需要，選E。","detail":{"background":"免疫性血小板低下(ITP)是「排除性診斷」：表現為孤立性血小板低下(其他血球與抹片正常)，無明確次發原因。對「新診斷、年輕、典型」的疑似ITP，ASH指引建議的基本評估包括病史/用藥、抹片、與排除常見次發原因——「C型肝炎(HCV)、HIV」(兩者皆可致免疫性血小板低下，且可治療)、自體免疫篩檢(SLE)、抗磷脂抗體(APS)、幽門桿菌(部分族群)。關鍵考點是「骨髓檢查(bone marrow examination)」對「典型、年輕(<60歲)、孤立性血小板低下、無其他血球異常或不典型特徵」者「並非常規必需」；骨髓檢查保留給年長(>60)、不典型(其他血球異常、脾腫、全身症狀)、對治療反應不佳或考慮其他骨髓疾病時。本例35歲、僅輕微瘀青、其他血球正常，最不需要的是(E)骨髓檢查。","options":{"A":"需要。HCV可致免疫性血小板低下，屬常規排除。","B":"需要。自體免疫(如SLE)篩檢屬常規排除。","C":"可考慮。H. pylori在部分病人與ITP相關，根除可改善。","D":"需要。抗磷脂抗體排除APS相關血小板低下。","E":"正確(最不需要)。年輕、典型孤立性血小板低下者不需常規骨髓檢查。"},"sources":["Harrison 21e, Immune Thrombocytopenia—Diagnosis","ASH 2019 ITP guidelines (limited workup)","Williams Hematology, ITP as diagnosis of exclusion"]}},"110-135":{"quick":"aPTT延長的可能原因：血友病(VIII/IX缺乏)、抗磷脂症候群(狼瘡抗凝物)、肝素使用、von Willebrand disease(伴FVIII下降)皆會延長aPTT，四者全選E。","detail":{"background":"aPTT(活化部分凝血活酶時間)反映「內在途徑(XII、XI、IX、VIII)＋共同途徑」。延長aPTT的常見原因可分「因子缺乏(混合試驗會矯正)」與「抑制物(不矯正)」：(1)血友病A/B——FVIII或FIX缺乏，典型僅aPTT延長(PT正常)；(2)抗磷脂症候群——狼瘡抗凝物在試管內延長aPTT(混合試驗不矯正)，但臨床反而「血栓」傾向(體內促凝)；(3)肝素(heparin)——增強antithrombin抑制IIa/Xa，主要延長aPTT(unfractionated heparin)；(4)von Willebrand disease——vWF是FVIII的載體與保護蛋白，vWF缺乏時FVIII半衰期縮短、血中FVIII下降，故重度vWD可延長aPTT(同時有黏膜出血、PFA異常)。四者皆會延長aPTT，故全選(E)。","options":{"A":"不完整。血友病會延長aPTT，但其餘三者亦會。","B":"不完整。漏(2)APS與(3)heparin。","C":"不完整。漏(2)APS與(4)vWD。","D":"不完整。漏(2)抗磷脂症候群。","E":"正確。血友病、抗磷脂症候群、肝素、von Willebrand disease皆可延長aPTT。"},"sources":["Harrison 21e, Approach to prolonged aPTT","Williams Hematology, Intrinsic pathway disorders","vWD and secondary FVIII reduction"]}},"111-78":{"quick":"鑑別血小板低下「原因」幫忙最小者為「血小板抗體(platelet antibody)檢測」——敏感度與特異度皆差、不影響ITP的排除性診斷，選E。","detail":{"background":"面對血小板低下，臨床評估著重「找出可治療的次發原因」與「區分生成不足vs破壞增加」。有用的檢查包括：抹片(看血小板大小、有無假性血小板低下、schistocytes、blasts)、排除感染(HIV、HCV——皆可致免疫性血小板低下且可治療)、自體免疫(SLE)、藥物史、肝脾評估等。本題問「幫忙最小者」：A. H. pylori(部分ITP相關)、B. SLE血清學、C. HCV、D. HIV皆能找出可治療的次發病因，對鑑別有幫助；唯E.「血小板抗體(anti-platelet antibody/platelet-associated IgG)」檢測「敏感度與特異度皆低」，陰性不能排除ITP、陽性也不專一，臨床指引「不建議」常規使用，對鑑別血小板低下原因幫助最小，故選(E)。ITP仍為排除性的臨床診斷，不靠抗體檢測確診。","options":{"A":"有幫助。H. pylori在部分病人與ITP相關。","B":"有幫助。SLE血清學可找出次發性免疫破壞。","C":"有幫助。HCV可致免疫性血小板低下且可治療。","D":"有幫助。HIV可致血小板低下且可治療。","E":"正確(幫助最小)。血小板抗體檢測敏感度/特異度差，不建議常規用於診斷。"},"sources":["Harrison 21e, Thrombocytopenia workup","ASH 2019 ITP guidelines (anti-platelet Ab not recommended)","Williams Hematology, platelet antibody testing limitations"]}},"112-132":{"quick":"PT正常、aPTT「孤立」延長的原因為VIII/IX缺乏、後天FVIII抑制、肝素、抗磷脂症候群；而第十三因子(FXIII)缺乏「PT與aPTT皆正常」，故為例外，選D。","detail":{"background":"「孤立性aPTT延長(PT正常)」指向「內在途徑(VIII、IX、XI、XII)」異常或抑制物，逐項分析本題：A. von Willebrand disease——重度時FVIII下降可延長aPTT。B. 後天性血友病A(acquired hemophilia A)——抗FVIII抗體，孤立aPTT延長、混合試驗不矯正。C. 肝素(heparin)——主要延長aPTT。E. 抗磷脂症候群(狼瘡抗凝物)——延長aPTT(混合不矯正)。D. 「第十三因子(FXIII)缺乏」——FXIII的功能是「交聯纖維蛋白、穩定血塊」，發生在「凝血瀑布之後」，因此「PT與aPTT皆正常」！FXIII缺乏的診斷需靠「血塊溶解試驗(尿素/clot solubility)」或FXIII活性測定，臨床表現為延遲性出血、傷口癒合不良、臍帶出血、復發流產。因此FXIII缺乏「不會」延長aPTT，為本題例外，選(D)。","options":{"A":"可延長aPTT。重度vWD伴FVIII下降。","B":"可延長aPTT。後天FVIII抑制抗體。","C":"可延長aPTT。肝素主要影響aPTT。","D":"正確(為例外)。FXIII缺乏PT與aPTT皆正常(作用於凝血瀑布下游、交聯纖維蛋白)，需clot solubility測試。","E":"可延長aPTT。抗磷脂症候群之狼瘡抗凝物。"},"sources":["Harrison 21e, Factor XIII deficiency","Williams Hematology, FXIII (clot stabilization, normal PT/aPTT)","Isolated aPTT prolongation differential"]}},"113-129":{"quick":"32歲、孤立性輕度血小板低下(52K)、無出血、其餘檢查正常 → 推定ITP但血小板>30K且無症狀，標準處置為「密切觀察追蹤」，選E。","detail":{"background":"免疫性血小板低下(ITP)的治療「依血小板數與出血風險」而非單純數字決定。ASH 2019指引：對「無出血或僅輕微出血、血小板≥30,000/μL」的成人ITP，建議「觀察(observation)」而非藥物治療，因出血風險低、治療副作用反而較大；只有當血小板<20,000–30,000或有出血、或有出血高風險(需手術、抗凝、高齡、外傷風險)時才以類固醇(±IVIG)起始治療。本例32歲女性、血小板52,000、僅輕微瘀青、無黏膜出血、肝腎與自體免疫檢查正常、無肝炎——屬輕度、無症狀，最適當為(E)密切觀察與追蹤；不需立即骨髓檢查(年輕典型者)、不需輸血小板(無嚴重出血且ITP輸注效益短暫)、抗血小板抗體幫助有限。","options":{"A":"非必要。年輕、典型孤立性血小板低下者不需常規骨髓檢查。","B":"非必要。無脾腫或肝病線索，腹部超音波非首要。","C":"幫助有限。抗血小板抗體敏感/特異度差，不改變處置。","D":"不需要。血小板52K且無嚴重出血，不需輸注血小板。","E":"正確。血小板≥30K且無症狀之ITP，標準處置為觀察追蹤。"},"sources":["Harrison 21e, Immune Thrombocytopenia—Management","ASH 2019 ITP guidelines (observe if Plt ≥30K, asymptomatic)","Williams Hematology, ITP treatment thresholds"]}},"114-133":{"quick":"老年、自發性腹膜後血腫、孤立aPTT延長、混合試驗「不矯正(40→37仍延長)」→ 後天性第八因子抑制抗體(acquired hemophilia A)，選C。","detail":{"background":"本題是後天性血友病A(acquired hemophilia A)的典型情境，與109-98互為對照。線索：①老年人「自發性、嚴重軟組織/腹膜後出血」(非關節出血，與先天血友病不同)；②「孤立性aPTT延長(PT與INR正常)」；③「混合試驗(mixing test)不矯正」(與正常血漿混合後aPTT仍延長，本例由40\"僅降至37\"且仍>正常27\")——代表存在「抑制物」而非因子缺乏。後天性血友病A是自體產生「抗第八因子(FVIII)抗體」，常見於老年、產後、自體免疫、惡性腫瘤或特發性。本例選(C)acquired inhibitor to factor VIII。鑑別：A/B為遺傳性因子缺乏(混合試驗應「矯正」，且FVII缺乏延長PT而非aPTT)；D後天抗FVII會延長PT非aPTT；E抗磷脂症候群雖混合不矯正但臨床以「血栓」為主而非自發大出血。治療：繞道製劑(rFVIIa/aPCC)止血＋免疫抑制(類固醇±rituximab/cyclophosphamide)清除抗體。","options":{"A":"錯誤。遺傳性FVIII缺乏(血友病A)混合試驗會「矯正」，且為自幼出血史。","B":"錯誤。遺傳性FVII缺乏延長「PT」而非aPTT。","C":"正確。孤立aPTT延長、混合試驗不矯正、老年自發大出血＝後天性FVIII抑制抗體。","D":"錯誤。後天抗FVII會延長PT，不符孤立aPTT延長。","E":"錯誤。抗磷脂症候群以血栓為主，少見自發性腹膜後大出血。"},"sources":["Harrison 21e, Acquired Hemophilia A","Williams Hematology, Mixing study interpretation","Acquired FVIII inhibitor management"]}},"109-15":{"quick":"抗凝劑解藥配對：heparin↔protamine、warfarin↔vitamin K(＋PCC)、dabigatran↔idarucizumab、Xa抑制劑(rivaroxaban/apixaban)↔andexanet alfa；「apixaban的解藥是idarucizumab」錯誤，選E。","detail":{"background":"各類抗凝劑的「逆轉/解藥」是急重症必備知識：①未分餾肝素(UFH)——魚精蛋白(protamine sulfate)中和(對低分子量肝素僅部分逆轉)。②warfarin(維生素K拮抗劑)——維生素K(緩慢)，急性大出血加「凝血酶原複合體濃縮劑(4-factor PCC)」(優於新鮮冷凍血漿，起效快)。③直接凝血酶抑制劑dabigatran——「idarucizumab(Praxbind)」(單株抗體片段，特異中和)。④第Xa因子抑制劑(rivaroxaban、apixaban、edoxaban)——「andexanet alfa」(重組去活性化Xa誘餌)，若無andexanet可用4-factor PCC。本題逐項：A protamine對heparin(對)、B vitamin K對warfarin(對)、C idarucizumab對dabigatran(對)、D andexanet對rivaroxaban(對)，唯E「apixaban的解藥是idarucizumab」錯誤——apixaban是Xa抑制劑，解藥應為「andexanet alfa」，idarucizumab只逆轉dabigatran，故選(E)。","options":{"A":"正確。Heparin以protamine中和。","B":"正確。Warfarin以vitamin K逆轉(急性加PCC)。","C":"正確。Dabigatran(直接凝血酶抑制劑)以idarucizumab特異逆轉。","D":"正確。Rivaroxaban(Xa抑制劑)以andexanet alfa逆轉。","E":"錯誤(為答案)。Apixaban為Xa抑制劑，解藥應為andexanet alfa，非idarucizumab(後者只逆轉dabigatran)。"},"sources":["Harrison 21e, Anticoagulants and reversal agents","idarucizumab (dabigatran), andexanet alfa (Xa inhibitors)","ACC 2020 anticoagulant reversal pathway"]}},"110-82":{"quick":"疫苗誘發免疫性血栓性血小板低下(VITT)與HIT「機轉相似(抗PF4抗體活化血小板)」但「無近期heparin暴露」；選項C稱「與最近使用heparin有關」為錯誤，選C。","detail":{"background":"疫苗誘發免疫性血栓性血小板低下(vaccine-induced immune thrombotic thrombocytopenia, VITT)是「腺病毒載體」COVID-19疫苗(AstraZeneca、Janssen)罕見但嚴重的副作用，多在接種後「5–30天」出現。機轉與「自體免疫型肝素誘發血小板低下(autoimmune HIT)」相似：產生「抗血小板第4因子(anti-PF4)IgG抗體」，但VITT是在「無heparin暴露」下，抗體即可活化血小板(經血小板FcγRIIa受體)與凝血系統，造成「血小板低下＋血栓(常為非典型部位：腦靜脈竇血栓CVST、內臟靜脈血栓、肺栓塞)」與高D-dimer、低fibrinogen。診斷：anti-PF4 ELISA(注意快速膠體免疫法可能偽陰)。治療關鍵——「避免使用heparin」、給予「非肝素類抗凝劑(如argatroban、fondaparinux、DOAC)」與「IVIG」(阻斷FcγRIIa活化)，嚴重時血漿置換、避免輸血小板。本題問「錯誤敘述」：A接種後5–30天(對)、B非典型部位血栓(對)、D anti-PF4抗體經Fcγ受體活化血小板(對)、E非肝素抗凝＋IVIG(對)，唯C稱「與最近使用heparin有關」錯誤——VITT「不需要heparin暴露」(這正是它與典型HIT的關鍵差異)，故選(C)。","options":{"A":"正確。VITT多在接種腺病毒載體疫苗後5–30天發生。","B":"正確。常見腦靜脈竇、內臟靜脈血栓與肺栓塞等非典型部位。","C":"錯誤(為答案)。VITT「無需」近期heparin暴露即可發生(與HIT機轉相似但不依賴heparin)。","D":"正確。anti-PF4抗體經血小板FcγRIIa活化血小板。","E":"正確。治療以非肝素類抗凝劑與IVIG為主。"},"sources":["Harrison 21e, Thrombocytopenia (VITT/HIT)","Greinacher A et al. VITT, NEJM 2021","ASH/ISTH VITT guidance (avoid heparin, IVIG)"]}},"111-113":{"quick":"COVID-19疫苗中，「病毒載體疫苗(viral vector)」(如AZ、Janssen)較易引起疫苗誘發免疫性血栓(VITT)，選B。","detail":{"background":"不同平台的COVID-19疫苗安全性訊號不同。「疫苗誘發免疫性血栓性血小板低下(VITT)」這個罕見但嚴重的血栓併發症，明確與「腺病毒『病毒載體(viral vector)』疫苗」相關——代表為AstraZeneca(ChAdOx1)與Janssen/J&J(Ad26)；其機轉為產生抗PF4抗體活化血小板(類似自體免疫型HIT但無heparin暴露)，多在接種後5–30天發生腦靜脈竇/內臟靜脈血栓伴血小板低下。相對地，mRNA疫苗(Pfizer、Moderna)主要的罕見血液/心血管訊號是「心肌炎/心包炎」(年輕男性、第二劑後)，而非VITT。蛋白質次單位、不活化、減毒疫苗則無此VITT訊號。本例30歲女性接種後10天頭痛、確診疫苗相關血栓——指向病毒載體疫苗，選(B)。","options":{"A":"錯誤。mRNA(核酸)疫苗主要罕見訊號為心肌炎，非VITT。","B":"正確。腺病毒病毒載體疫苗(AZ/Janssen)與VITT相關。","C":"錯誤。蛋白質次單位疫苗無VITT訊號。","D":"錯誤。不活化疫苗無VITT訊號。","E":"錯誤。減毒疫苗非COVID-19 VITT來源。"},"sources":["Harrison 21e, Vaccine-induced thrombotic thrombocytopenia","Greinacher/Schultz, VITT after ChAdOx1, NEJM 2021","CDC/EMA VITT safety signals"]}},"111-114":{"quick":"承上題：疫苗相關血栓(VITT)的機轉與「血小板(platelet)」成份抗體有關——抗血小板第4因子(anti-PF4)抗體活化血小板，選B。","detail":{"background":"此為111-113的承接題，考VITT的免疫機轉。VITT的核心是針對「血小板第4因子(platelet factor 4, PF4)」的IgG自體抗體。PF4是儲存於血小板α顆粒的趨化因子，疫苗(腺病毒載體成分)可能促使PF4形成具免疫原性的複合體，誘導anti-PF4 IgG。這些抗體與PF4形成免疫複合體後，經「血小板表面的FcγRIIa受體」交聯，造成血小板大量活化、聚集與消耗——結果同時出現「血小板低下」與「廣泛血栓(尤其腦靜脈竇、內臟靜脈)」，並大量消耗fibrinogen、D-dimer飆升。因此本題問「與何種血液細胞成份的抗體有關」——答案是「血小板(platelet)」(anti-PF4，PF4源自血小板)，選(B)。此機轉與自體免疫型HIT相同，故治療避免heparin、用非肝素抗凝與IVIG(阻斷FcγRIIa)。","options":{"A":"錯誤。與白血球抗體無關。","B":"正確。VITT與血小板(anti-PF4)抗體有關，經FcγRIIa活化血小板。","C":"錯誤。與淋巴球抗體無關。","D":"錯誤。與巨噬細胞抗體無關。","E":"錯誤。與嗜伊紅球抗體無關。"},"sources":["Harrison 21e, VITT pathophysiology","anti-PF4 antibodies & FcγRIIa platelet activation","ISTH VITT mechanism"]}},"111-133":{"quick":"未曾接觸heparin者，典型肝素誘發血小板低下(HIT)最常出現於用藥後「第5至10天」(產生anti-PF4/heparin抗體需時間)，選C。","detail":{"background":"肝素誘發血小板低下(heparin-induced thrombocytopenia, HIT, type II)是免疫媒介、會「促血栓」的嚴重藥物反應。機轉：heparin與血小板第4因子(PF4)結合形成複合體，誘導IgG抗體(anti-PF4/heparin)，免疫複合體經血小板FcγRIIa活化血小板，造成血小板「中度下降(常降50%、少見<20,000)」與動靜脈血栓。發作時間是經典考點：①「典型HIT」——『未曾接觸heparin』者，因需時間產生抗體，多在用藥後「第5–10天」出現血小板下降。②「快速發作型(rapid-onset)」——近期(<100天內)曾用heparin、體內已有抗體者，可在數小時內發生。③「延遲發作型(delayed-onset)」——停藥後數天才出現。診斷以4Ts評分＋anti-PF4 ELISA＋功能性試驗(serotonin release assay)。處理：「立即停用所有heparin」、改用非肝素抗凝劑(argatroban、fondaparinux、DOAC)、避免單純輸血小板、暫不給warfarin(待血小板回升以免warfarin皮膚壞死)。本例為「未曾接觸heparin」的典型HIT，最常於第5–10天，選(C)。","options":{"A":"錯誤。1天內為快速發作型(需近期曾暴露heparin)。","B":"錯誤。1–3天過早，未曾暴露者抗體尚未形成。","C":"正確。典型HIT(未曾接觸heparin)多於用藥後第5–10天發生。","D":"錯誤。14–28天偏晚，非典型發作高峰。","E":"錯誤。1個月後過晚。"},"sources":["Harrison 21e, Heparin-Induced Thrombocytopenia","Williams Hematology, HIT timing (typical 5–10 days)","ASH 2018 HIT guidelines (4Ts)"]}},"113-113":{"quick":"AZ疫苗後血小板低下＋多處動靜脈栓塞(含腎上腺出血致cortisol低)＝VITT；最適檢查為D-dimer與「anti-PF4抗體(anti-PF4-IgG)」，選A(1)+(2)。","detail":{"background":"本例64歲男性接種AZ(腺病毒載體)疫苗7天後出現「血小板下降、多處動靜脈栓塞、皮質酮(cortisol)偏低(提示腎上腺靜脈血栓/出血致腎上腺功能不全)」——典型疫苗誘發免疫性血栓性血小板低下(VITT)。診斷與監測的關鍵檢查為：(1)「D-dimer」——VITT常顯著升高(廣泛血栓與消耗性凝血)，並反映疾病活性；(2)「anti-PF4-IgG抗體(以ELISA)」——VITT的確診依據(注意：快速膠體/化學發光法可能偽陰，需用ELISA)。ESR與CRP(3)(4)為非特異發炎指標、紅血球數(5)無助診斷，故不選。最適組合為(1)D-dimer＋(2)anti-PF4-IgG，選(A)。治療同VITT原則：非肝素抗凝劑(argatroban/fondaparinux/DOAC)、IVIG、避免heparin與血小板輸注、監測fibrinogen。此題凸顯VITT可侵犯腎上腺造成急性腎上腺功能不全(低cortisol)，臨床須警覺並補充類固醇。","options":{"A":"正確。D-dimer(評估血栓/消耗)＋anti-PF4-IgG(確診VITT)為最適檢查。","B":"不佳。ESR為非特異發炎指標，對VITT診斷幫助有限。","C":"不佳。CRP非特異，無法確診VITT。","D":"不佳。anti-PF4正確但紅血球數(RBC)無診斷意義。","E":"不佳。anti-PF4正確但CRP非特異。"},"sources":["Harrison 21e, VITT diagnosis (anti-PF4 ELISA, D-dimer)","ASH VITT diagnostic guidance","VITT with adrenal vein thrombosis → adrenal insufficiency"]}},"114-146":{"quick":"DOAC(apixaban)圍術期：高出血風險手術(息肉切除)術前停藥約48小時、術後止血穩定即「以原劑量復藥」；DOAC「不需heparin bridging」、不需延後7天，故選A(1)+(2)。","detail":{"background":"直接口服抗凝劑(DOAC)的圍術期處理原則與warfarin不同，關鍵是「DOAC起效/退效快，通常不需橋接(bridging)」。停藥時機依「腎功能與手術出血風險」：apixaban(腎清除約27%)在腎功能正常者，低出血風險手術術前24小時停用、「高出血風險手術術前48小時停用」。大腸鏡併「多顆息肉切除」屬「高出血風險」處置，故apixaban宜術前約48小時停用((1)正確)。復藥時機：止血穩定後，低風險手術可24小時內、出血風險高的手術可延至48–72小時恢復，且「直接以原治療劑量復藥」((2)正確，DOAC不需從低劑量慢慢加)。重點觀念：(3)DOAC「不需heparin bridging」(bridging只考慮於極高血栓風險且使用warfarin者，且即使如此近年PERIOP-2/BRIDGE研究多不支持常規橋接)——故(3)錯；(4)「術後至少7天才復藥」過度保守、會增加血栓風險——故(4)錯。因此正確為(1)+(2)，選(A)。","options":{"A":"正確。高出血風險處置術前約48小時停apixaban，術後止血穩定以原劑量復藥。","B":"錯誤。含(4)「術後7天才復藥」過度延遲，增加血栓風險。","C":"錯誤。含(3)heparin bridging——DOAC不需橋接。","D":"錯誤。含(3)(4)兩項錯誤觀念。","E":"錯誤。含錯誤的(3)(4)。"},"sources":["Harrison 21e, Periprocedural anticoagulation","2017 ACC periprocedural DOAC pathway; PAUSE study (Douketis 2019)","DOAC: no routine bridging"]}},"114-149":{"quick":"癌症相關中風(Trousseau，胰腺癌＋多處散在性梗塞、無AF)以高凝狀態為機轉；中風後抗血栓可考慮「低分子量肝素(LMWH)」，選C。","detail":{"background":"癌症相關缺血性中風(cancer-associated stroke)常見於腺癌(尤其胰臟、肺、胃、卵巢)，機轉為腫瘤誘發的「高凝狀態(hypercoagulability)」——組織因子與黏液素促凝、有時合併非細菌性血栓性心內膜炎(NBTE)、D-dimer顯著升高。影像特徵為「多血管領域、多發散在性梗塞」(本例腦MRI多處散在缺血、無AF)，是Trousseau症候群的腦表現。臨床原則：(A)機轉是「全身高凝狀態與栓子」而非腫瘤局部侵犯腦血管——A錯；(B)若符合時間窗與條件，靜脈血栓溶解(rtPA)在癌症病人並非絕對禁忌(需個別評估出血風險)，不應一概「避免」——B錯；(C)癌症相關血栓/中風的抗血栓「可考慮低分子量肝素(LMWH)」——這與癌症相關靜脈血栓栓塞偏好LMWH(或對腸胃道/泌尿道無高出血風險者用Xa-DOAC)的原則一致，C正確；(D)若有大血管阻塞，仍可考慮機械取栓(endovascular thrombectomy)，不應因癌症一概排除——D錯;(E)D-dimer在癌症相關中風常顯著升高且有臨床意義(反映高凝、預測復發)，非「無意義」——E錯。故選(C)。","options":{"A":"錯誤。機轉為全身高凝狀態與栓子(Trousseau)，非腫瘤局部侵犯腦血管。","B":"錯誤。癌症非rtPA絕對禁忌，符合條件者仍可個別評估施打，不應一律避免。","C":"正確。癌症相關血栓/中風的抗血栓可考慮低分子量肝素(LMWH)。","D":"錯誤。大血管阻塞仍可考慮動脈取栓，不應因癌症一概排除。","E":"錯誤。D-dimer在癌症相關中風顯著升高且具臨床意義(反映高凝)。"},"sources":["Harrison 21e, Cancer-associated thrombosis (Trousseau)","Williams Hematology, malignancy and hypercoagulability","ASCO/ITAC VTE in cancer (LMWH/DOAC)"]}},"109-166":{"quick":"TRALI典型「輸血後6小時內」急性發作；選項B稱「一般發生於輸血後24小時」錯誤，選B。","detail":{"background":"輸血相關急性肺損傷(transfusion-related acute lung injury, TRALI)是輸血致死的主因之一，為非心因性肺水腫。定義與要點：①「時間」——典型於「輸血中或輸血後6小時內」急性發作(非24小時或3天)；②機轉——多數為捐血者血漿中含「抗受血者白血球之抗體(尤其anti-HLA class II，也有anti-HLA class I與anti-HNA)」，與受血者嗜中性球作用，活化白血球聚積於肺微血管並損傷內皮(「two-hit」假說：受血者既有發炎為第一擊、抗體為第二擊)；③臨床——急性低血氧、呼吸窘迫、發燒，胸部X光顯示「兩側肺浸潤(肺水腫樣)」，但無心衰竭/容積過載證據(與TACO循環過載鑑別：TRALI的BNP不高、利尿無效)；④治療——以「支持療法」為主(氧氣、必要時機械通氣、保護性肺通氣)，「類固醇與利尿劑無確切療效」，多數24–96小時內改善；⑤預防——以「男性或未曾懷孕女性的血漿」(降低抗HLA抗體，因多胎妊娠會致敏產生抗HLA抗體)、白血球減除等策略降低風險。","options":{"A":"正確。多因捐血者血漿含高濃度anti-HLA class II抗體。","B":"錯誤(為答案)。TRALI典型於輸血中或「6小時內」發作，非24小時。","C":"正確。病人出現缺氧現象。","D":"正確。表現為非心因性肺水腫(兩側肺浸潤)。","E":"正確。輸注男性或未曾懷孕女性的血漿可降低TRALI風險(減少抗HLA抗體)。"},"sources":["Harrison 21e, Transfusion Reactions (TRALI)","Williams Hematology, TRALI (within 6 h, anti-HLA II)","AABB TRALI prevention (male-predominant plasma)"]}},"109-168":{"quick":"冷凍沉澱(cryoprecipitate)富含 fibrinogen、Factor VIII、von Willebrand factor(及FXIII、fibronectin)，不含FVII，故選D(1)+(3)+(4)。","detail":{"background":"冷凍沉澱(cryoprecipitate)是新鮮冷凍血漿(FFP)在1–6°C緩慢解凍後析出的冷不溶性沉澱物，「濃縮」了特定凝血蛋白。其主要成分為：①「纖維蛋白原(fibrinogen，第I因子)」——最主要用途；②「第VIII因子(FVIII)」；③「von Willebrand factor(vWF)」；④「第XIII因子(FXIII)」與fibronectin。它「不含」第VII、IX、X、II等維生素K依賴因子(那些在PCC中)。臨床用途：低纖維蛋白原血症(hypofibrinogenemia，如DIC、大量輸血、產科出血、纖維蛋白原<150–200 mg/dL且出血)、第XIII因子缺乏；歷史上曾用於血友病A與vWD(現多改用因子濃縮劑或去氨加壓素，但缺貨時仍為選項)。本題問所含凝血因子，為fibrinogen＋FVIII＋vWF(不含FVII)，選(D)。","options":{"A":"不完整。除fibrinogen外尚有FVIII與vWF。","B":"錯誤。冷凍沉澱不以FVII為主要成分。","C":"不完整。漏掉(4)von Willebrand factor。","D":"正確。fibrinogen＋FVIII＋vWF(另含FXIII、fibronectin)。","E":"錯誤。含(2)FVII不正確(冷凍沉澱不含FVII)。"},"sources":["Harrison 21e, Blood Components (Cryoprecipitate)","AABB Technical Manual, cryoprecipitate contents","Williams Hematology, fibrinogen replacement"]}},"111-136":{"quick":"TRALI正確敘述：機轉常與捐血者血漿「抗受血者HLA class II抗體」有關(2)、胸部X光呈「兩側肺浸潤」(3)；「輸血3天後才發生」(1)錯誤(應為6小時內)，故選C(2)+(3)。","detail":{"background":"輸血相關急性肺損傷(transfusion-related acute lung injury, TRALI)是輸血致死的主因之一，為非心因性肺水腫。定義與要點：①「時間」——典型於「輸血中或輸血後6小時內」急性發作(非24小時或3天)；②機轉——多數為捐血者血漿中含「抗受血者白血球之抗體(尤其anti-HLA class II，也有anti-HLA class I與anti-HNA)」，與受血者嗜中性球作用，活化白血球聚積於肺微血管並損傷內皮(「two-hit」假說：受血者既有發炎為第一擊、抗體為第二擊)；③臨床——急性低血氧、呼吸窘迫、發燒，胸部X光顯示「兩側肺浸潤(肺水腫樣)」，但無心衰竭/容積過載證據(與TACO循環過載鑑別：TRALI的BNP不高、利尿無效)；④治療——以「支持療法」為主(氧氣、必要時機械通氣、保護性肺通氣)，「類固醇與利尿劑無確切療效」，多數24–96小時內改善；⑤預防——以「男性或未曾懷孕女性的血漿」(降低抗HLA抗體，因多胎妊娠會致敏產生抗HLA抗體)、白血球減除等策略降低風險。","options":{"A":"錯誤。(1)TRALI於6小時內發生，非3天後。","B":"不完整。(3)正確但(2)亦正確，應一併選。","C":"正確。(2)捐血者抗HLA class II抗體＋(3)兩側肺浸潤，皆為TRALI正確描述。","D":"錯誤。含(1)「3天後」之錯誤時間。","E":"錯誤。含(1)錯誤時間。"},"sources":["Harrison 21e, TRALI","Williams Hematology, TRALI mechanism (anti-HLA II)","Bilateral pulmonary infiltrates in TRALI"]}},"112-80":{"quick":"冷凍沉澱適用於低纖維蛋白原血症、血友病A、von Willebrand disease(因含fibrinogen/FVIII/vWF)；不含albumin故不治低白蛋白，選D(1)+(3)+(4)。","detail":{"background":"本題考冷凍沉澱(cry
