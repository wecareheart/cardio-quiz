oprecipitate)的「臨床適應症」。因其濃縮fibrinogen、FVIII、vWF、FXIII，故可用於：(1)低纖維蛋白原血症(hypofibrinogenemia)——最主要適應，見於DIC、大量輸血、產後出血、肝病合併出血；(3)血友病A(Hemophilia A，FVIII缺乏)——現代首選重組/血漿源FVIII濃縮劑，但無因子濃縮劑時冷凍沉澱仍可補FVIII；(4)von Willebrand disease——含vWF，去氨加壓素(DDAVP)或含vWF的FVIII濃縮劑為首選，冷凍沉澱為備用。而(2)低白蛋白血症(hypoalbuminemia)「不是」冷凍沉澱的適應症(冷凍沉澱不含有意義的白蛋白；補白蛋白用albumin製劑)。故正確為(1)+(3)+(4)，選(D)。","options":{"A":"錯誤。含(2)低白蛋白血症(非冷凍沉澱適應)。","B":"不完整。漏(4)von Willebrand disease。","C":"錯誤。含(2)低白蛋白血症。","D":"正確。低纖維蛋白原、血友病A、vWD皆可用冷凍沉澱(含fibrinogen/FVIII/vWF)。","E":"錯誤。含(2)低白蛋白血症。"},"sources":["Harrison 21e, Cryoprecipitate indications","AABB Technical Manual","Williams Hematology, fibrinogen/FVIII/vWF replacement"]}},"112-133":{"quick":"TRALI治療以「支持療法」為主(氧氣、保護性通氣)，類固醇與利尿劑無確切療效；選項E稱「治療以類固醇為主」錯誤，選E。","detail":{"background":"輸血相關急性肺損傷(transfusion-related acute lung injury, TRALI)是輸血致死的主因之一，為非心因性肺水腫。定義與要點：①「時間」——典型於「輸血中或輸血後6小時內」急性發作(非24小時或3天)；②機轉——多數為捐血者血漿中含「抗受血者白血球之抗體(尤其anti-HLA class II，也有anti-HLA class I與anti-HNA)」，與受血者嗜中性球作用，活化白血球聚積於肺微血管並損傷內皮(「two-hit」假說：受血者既有發炎為第一擊、抗體為第二擊)；③臨床——急性低血氧、呼吸窘迫、發燒，胸部X光顯示「兩側肺浸潤(肺水腫樣)」，但無心衰竭/容積過載證據(與TACO循環過載鑑別：TRALI的BNP不高、利尿無效)；④治療——以「支持療法」為主(氧氣、必要時機械通氣、保護性肺通氣)，「類固醇與利尿劑無確切療效」，多數24–96小時內改善；⑤預防——以「男性或未曾懷孕女性的血漿」(降低抗HLA抗體，因多胎妊娠會致敏產生抗HLA抗體)、白血球減除等策略降低風險。","options":{"A":"正確。TRALI多在輸血中或6小時內發生。","B":"正確。常因輸入血漿含抗受血者HLA class II抗體。","C":"正確。病人呈現缺氧、呼吸急促。","D":"正確。胸部X光可見間質/肺泡浸潤(兩側)。","E":"錯誤(為答案)。TRALI以支持療法為主，類固醇非主要治療(療效未證實)。"},"sources":["Harrison 21e, TRALI management (supportive)","Williams Hematology, TRALI treatment","TACO vs TRALI differentiation"]}},"113-136":{"quick":"冷凍沉澱可用於血友病A、von Willebrand disease、低纖維蛋白原血症(含FVIII/vWF/fibrinogen)；不治低白蛋白，選D(1)+(3)+(4)。","detail":{"background":"本題與112-80同考冷凍沉澱適應症，再次強化記憶。冷凍沉澱濃縮「fibrinogen、FVIII、vWF、FXIII」，故臨床用於：(1)血友病A(FVIII缺乏，無因子濃縮劑時備用)、(3)von Willebrand disease(含vWF)、(4)低纖維蛋白原血症(hypofibrinogenemia，最主要適應)。而(2)低白蛋白血症「非」冷凍沉澱適應(其不含albumin)。故選(1)+(3)+(4)=(D)。要點再提醒：纖維蛋白原是冷凍沉澱最核心的補充標的(出血且fibrinogen過低時)，FXIII缺乏亦可用，而現代血友病A/vWD優先用特異性因子濃縮劑或DDAVP，冷凍沉澱多為缺藥時的替代。","options":{"A":"錯誤。含(2)低白蛋白血症(非適應)。","B":"錯誤。含(2)低白蛋白血症且漏(1)(3)。","C":"不完整。漏(4)低纖維蛋白原血症。","D":"正確。血友病A、vWD、低纖維蛋白原血症皆可用冷凍沉澱。","E":"錯誤。含(2)低白蛋白血症。"},"sources":["Harrison 21e, Cryoprecipitate indications","AABB Technical Manual","Williams Hematology, transfusion components"]}},"114-136":{"quick":"冷凍沉澱的成分為 fibrinogen、Factor VIII、von Willebrand factor(及FXIII)，不含FVII，故選D(1)+(3)+(4)。","detail":{"background":"本題與109-168同考冷凍沉澱「成分」。冷凍沉澱(cryoprecipitate)由FFP低溫解凍析出，富含：(1)纖維蛋白原(fibrinogen)、(3)第VIII因子(FVIII)、(4)von Willebrand factor(vWF)，另含第XIII因子(FXIII)與fibronectin。它「不含」第VII因子(FVII)或其他維生素K依賴因子(II、VII、IX、X那些屬於凝血酶原複合體PCC)。因此正確組合為fibrinogen＋FVIII＋vWF，即(1)+(3)+(4)，選(D)。臨床記憶口訣：冷凍沉澱＝「8、13、vWF、fibrinogen、fibronectin」(Factor VIII、Factor XIII、vWF、纖維蛋白原、纖維連接蛋白)。","options":{"A":"不完整。除fibrinogen尚含FVIII與vWF。","B":"錯誤。冷凍沉澱不以FVII為成分。","C":"不完整。漏(1)fibrinogen。","D":"正確。fibrinogen＋FVIII＋vWF(另含FXIII)。","E":"錯誤。含(2)FVII不正確。"},"sources":["Harrison 21e, Cryoprecipitate composition","AABB Technical Manual (FVIII, XIII, vWF, fibrinogen, fibronectin)","Williams Hematology, blood products"]}},"107-綜-11":{"quick":"腫瘤標記配對：catecholamines↔嗜鉻細胞瘤、hCG↔妊娠滋養層腫瘤、AFP↔生殖細胞瘤皆正確；「calcitonin↔甲狀腺乳突癌」錯誤(calcitonin對應「髓質癌medullary」)，故(1)+(3)+(4)，選C。","detail":{"background":"腫瘤標記(tumor markers)可輔助診斷、評估治療反應與監測復發，但須與正確的腫瘤對應。本題四組配對：(1)兒茶酚胺/變腎上腺素(catecholamines/metanephrines)↔「嗜鉻細胞瘤(pheochromocytoma)」——正確，為診斷核心。(2)降鈣素(calcitonin)↔「甲狀腺乳突癌(papillary)」——錯誤！calcitonin由甲狀腺C細胞分泌，對應的是「甲狀腺髓質癌(medullary thyroid carcinoma)」(常見於MEN2)，乳突癌追蹤用thyroglobulin。(3)人類絨毛膜促性腺激素(hCG)↔「妊娠滋養層疾病(gestational trophoblastic disease)」——正確(亦見於部分生殖細胞瘤)。(4)甲型胎兒蛋白(AFP)↔「性腺生殖細胞瘤(gonadal germ cell tumor)」——正確(非精原細胞瘤之卵黃囊成分、肝細胞癌亦升高)。故正確組合為(1)+(3)+(4)，選(C)。考點在於「calcitonin對髓質癌而非乳突癌」這個常見陷阱。","options":{"A":"錯誤。含(2)calcitonin↔乳突癌之錯誤配對。","B":"錯誤。含(2)錯誤配對。","C":"正確。catecholamines↔嗜鉻細胞瘤、hCG↔妊娠滋養層腫瘤、AFP↔生殖細胞瘤。","D":"錯誤。含(2)calcitonin↔乳突癌(應為髓質癌)。","E":"錯誤。含(2)錯誤配對。"},"sources":["Harrison 21e, Tumor Markers","Calcitonin → medullary thyroid carcinoma","AFP/β-hCG in germ cell tumors"]}},"109-171":{"quick":"Karnofsky體能狀態(KPS)：可自我照護、但「無法工作、無法正常活動」對應 KPS 70(照顧自己但無法進行正常活動或工作)，選C。","detail":{"background":"Karnofsky performance status(KPS)以0–100分(每10分一級)評估癌症病人的功能狀態，是預後與治療耐受性的重要指標。對照：100=正常無症狀；90=能正常活動，有輕微症狀；80=勉強正常活動，有些症狀；「70=能自我照護，但『無法進行正常活動或工作』」；60=偶需協助，但多能自理；50=需相當協助與經常醫療照護；40=失能需特別照護；30=嚴重失能需住院；20=病重需積極支持；10=瀕死；0=死亡。本題描述「日常生活完全可自理(self-care)、不需人幫忙，但已無法正常工作(active work)、無法參加正常活動(normal activity)」——正對應「KPS 70」，選(C)。KPS與ECOG PS可大致換算(KPS 70–80 ≈ ECOG 1，KPS 50–60 ≈ ECOG 2)。","options":{"A":"錯誤。KPS 90為能正常活動僅輕微症狀。","B":"錯誤。KPS 80為勉強可正常活動。","C":"正確。可自我照護但無法工作/正常活動＝KPS 70。","D":"錯誤。KPS 60為偶需協助但多能自理。","E":"錯誤。KPS 50為需相當協助與經常醫療照護。"},"sources":["Harrison 21e, Performance status assessment","Karnofsky Performance Status scale","KPS vs ECOG correlation"]}},"110-136":{"quick":"腫瘤溶解症候群(TLS)＝高血鉀、高尿酸、高血磷、「低血鈣」、腎功能惡化；本題選項列高血鉀、高尿酸、腎損傷(無高血鈣)，選C(1)+(3)+(4)。","detail":{"background":"腫瘤溶解症候群(tumor lysis syndrome, TLS)是化療(或自發)使大量腫瘤細胞快速崩解，將細胞內物質釋入血流所致的腫瘤急症，好發於「高增殖、高負荷、對化療敏感」的腫瘤(Burkitt淋巴瘤、急性白血病尤其ALL、高白血球數)。代謝四聯為：①「高鉀血症(hyperkalemia)」——最危急、可致命性心律不整；②「高尿酸血症(hyperuricemia)」——核酸代謝產物，沉積腎小管致急性腎損傷；③「高磷血症(hyperphosphatemia)」——細胞內磷釋出；④「低鈣血症(hypocalcemia)」——磷酸鈣沉積使鈣下降(注意是『低』鈣，非高鈣)；並導致「急性腎損傷(腎功能惡化)」。本題列出(1)高血鉀、(2)高血鈣、(3)高尿酸、(4)腎功能損傷——其中(2)「高血鈣」錯誤(TLS是『低』血鈣)，正確為(1)+(3)+(4)，選(C)。預防/治療：水化、allopurinol或rasburicase(降尿酸)、監測電解質與腎功能、處理高血鉀。","options":{"A":"不完整。漏(4)腎功能損傷。","B":"錯誤。含(2)高血鈣(TLS應為低血鈣)。","C":"正確。高血鉀＋高尿酸＋腎功能損傷為TLS表現(鈣應為低)。","D":"錯誤。含(2)高血鈣。","E":"錯誤。含(2)高血鈣。"},"sources":["Harrison 21e, Oncologic Emergencies—Tumor Lysis Syndrome","Cairo-Bishop TLS criteria","Rasburicase/allopurinol prophylaxis"]}},"110-144":{"quick":"增加罹癌風險的遺傳症候群：Fanconi貧血(1)、唐氏症(2)、von Hippel-Lindau(4)、神經纖維瘤症(5)皆是；Fragile X(3)不增加癌症風險，故選D(1)+(2)+(4)+(5)。","detail":{"background":"許多遺傳症候群因DNA修復缺陷、抑癌基因失活或染色體不穩定而增加癌症風險：(1)「Fanconi貧血」——DNA交聯修復缺陷，骨髓衰竭並好發AML與頭頸/食道鱗癌。(2)「唐氏症(Down syndrome, 三染色體21)」——兒童急性白血病(尤其ALL與AMKL)風險顯著升高。(4)「von Hippel-Lindau(VHL)」——抑癌基因VHL失活，好發腎細胞癌(亮細胞)、嗜鉻細胞瘤、血管母細胞瘤、胰臟神經內分泌瘤。(5)「神經纖維瘤症(Neurofibromatosis)」——NF1(神經纖維瘤、惡性周邊神經鞘瘤、視神經膠質瘤、白血病)、NF2(神經鞘瘤、腦膜瘤)。而(3)「Fragile X(脆性X症候群)」——是最常見的遺傳性智能障礙原因(FMR1基因CGG重複擴增)，「不」增加癌症風險。故正確為(1)+(2)+(4)+(5)，選(D)。","options":{"A":"不完整。漏(2)唐氏症與(5)神經纖維瘤症，且含(3)Fragile X之錯誤。","B":"錯誤。含(3)Fragile X(不增加癌症風險)。","C":"錯誤。含(3)Fragile X。","D":"正確。Fanconi貧血、唐氏症、VHL、神經纖維瘤症皆增加癌症風險。","E":"錯誤。含(3)Fragile X(脆性X症與癌症風險無關)。"},"sources":["Harrison 21e, Cancer Genetics / Inherited cancer syndromes","Fanconi anemia, Down syndrome leukemia, VHL, NF","Fragile X (no cancer predisposition)"]}},"111-139":{"quick":"COVID-19大流行期間的癌症治療優先順序指引中，多數實體腫瘤與急症高度優先不可延遲；而「慢性淋巴細胞白血病(CLL)」屬惰性、可延後治療，為例外，選B。","detail":{"background":"COVID-19大流行初期(2020)醫療資源緊繃，Kutikov等(Ann Intern Med 2020)提出癌症治療「分流(triage)」框架，依「不治療的危害vs延遲的可行性」排序。原則：①「侵襲性、可治癒或具立即危害」的癌症與腫瘤急症應「高度優先、不應延遲」——如生殖細胞腫瘤(睪丸癌)的化療(高治癒率且進展快)、小細胞肺癌(SCLC，極具侵襲性、化療反應快需即時)、即將阻塞的大腸癌(D，急症)、高惡性度軟組織肉瘤(E，進展快)。②「惰性(indolent)、進展緩慢」的腫瘤則可「安全延後或觀察」——「慢性淋巴細胞白血病(CLL)」本就常採watch-and-wait，多數情況可延後治療，且其治療(尤其化學免疫)會增加免疫抑制與感染風險，故在疫情期屬「可延遲」的例外。本題問「高度優先、不應延遲」的『例外』——即可延後者，為(B)CLL。","options":{"A":"高度優先。睪丸生殖細胞瘤化療治癒率高、進展快，不應延遲。","B":"正確(為例外)。CLL為惰性、常觀察追蹤，可安全延後治療。","C":"高度優先。小細胞肺癌侵襲性高、化療反應快，需即時治療。","D":"高度優先。即將阻塞的大腸癌屬急症，需即時處置。","E":"高度優先。高惡性度軟組織肉瘤進展快，不應延遲。"},"sources":["Kutikov A et al. Ann Intern Med 2020 (M20-1133)","Harrison 21e, Oncology care prioritization","Indolent CLL—deferrable therapy"]}},"112-137":{"quick":"腫瘤溶解症候群(TLS)生化變化為高尿酸、高血鉀、高血磷、肌酸酐上升與「低血鈣」；選項「高血鈣」並非TLS表現，選B。","detail":{"background":"本題與110-136同考TLS，從反面問「何者『非』TLS表現」。TLS因大量腫瘤細胞崩解釋出細胞內物質，造成：高尿酸血症(hyperuricemia，核酸代謝)、高鉀血症(hyperkalemia，細胞內鉀釋出，最危急)、高磷血症(hyperphosphatemia)、續發「低鈣血症(hypocalcemia，磷酸鈣沉積消耗鈣)」、以及尿酸/磷酸鈣沉積腎小管造成急性腎損傷(creatinine上升)。因此「高血鈣(hypercalcemia)」是「錯誤」的——TLS是『低』鈣而非高鈣，選(B)。臨床上ALL、Burkitt淋巴瘤、高負荷高增殖腫瘤在化療(或自發)後最易發生；高危者應預防性水化、給allopurinol(降尿酸生成)或rasburicase(分解尿酸，尤其高尿酸/G6PD正常者)、密切監測電解質與腎功能、必要時透析。","options":{"A":"是TLS表現。高尿酸血症(核酸代謝產物)。","B":"正確(為非)。TLS為「低血鈣」而非高血鈣(磷酸鈣沉積)。","C":"是TLS表現。高鉀血症(細胞內鉀釋出)。","D":"是TLS表現。高磷血症(細胞內磷釋出)。","E":"是TLS表現。尿酸/磷酸鈣腎病致creatinine上升。"},"sources":["Harrison 21e, Tumor Lysis Syndrome","Cairo-Bishop criteria (hypocalcemia)","Oncologic emergencies"]}},"112-144":{"quick":"癌細胞免疫逃脫機制：誘導CTLA-4(1)、下調MHC等辨識分子(2)、分泌免疫抑制細胞激素(3)、增加髓系衍生抑制細胞MDSC(5)；「下調Treg」(4)錯誤(癌症反而『增加』Treg)，故選D(1)+(2)+(3)+(5)。","detail":{"background":"癌細胞透過多重機制逃脫免疫監視(immune evasion)，是免疫治療的理論基礎：(1)「誘導免疫檢查點」如CTLA-4、PD-1/PD-L1，抑制T細胞活化(故抗CTLA-4 ipilimumab、抗PD-1/PD-L1可解除此抑制)。(2)「下調與免疫辨識相關的細胞表面蛋白」如MHC class I，使細胞毒性T細胞無法辨識(亦可能引發NK反應)。(3)「分泌免疫抑制細胞激素」如TGF-β、IL-10，抑制效應T細胞與抗原呈現。(5)「增加(upregulation)髓系衍生抑制細胞(MDSC)」與腫瘤相關巨噬細胞，營造免疫抑制微環境。(4)「下調(downregulation)調節性T細胞(Treg)」——錯誤！癌症為了抑制抗腫瘤免疫，反而會「增加/招募(upregulation)Treg」到腫瘤微環境，Treg多會壓制抗腫瘤反應。故正確為(1)+(2)+(3)+(5)，選(D)。","options":{"A":"不完整。漏(1)CTLA-4與(5)MDSC，且含(4)錯誤。","B":"錯誤。含(4)下調Treg(應為增加Treg)。","C":"錯誤。含(4)下調Treg之錯誤。","D":"正確。誘導CTLA-4、下調MHC、分泌抑制性細胞激素、增加MDSC皆為免疫逃脫機制。","E":"錯誤。含(4)下調Treg(癌症應是增加Treg)。"},"sources":["Harrison 21e, Cancer Immunology / Immune evasion","Hanahan & Weinberg, hallmarks (avoiding immune destruction)","Tregs/MDSC in tumor microenvironment"]}},"114-137":{"quick":"ECOG體能狀態：可行走、能自我照護但「無法工作」、清醒時間>50%可起身活動 → ECOG PS 2，選C。","detail":{"background":"ECOG(Eastern Cooperative Oncology Group)體能狀態量表是腫瘤學最常用的功能評估，0–5分：「0=完全正常活動無限制」；「1=費力活動受限，但可走動並從事輕度工作(如輕家務、辦公)」；「2=可走動、能完成所有自我照護，但『無法從事任何工作活動』，且清醒時間中『超過50%』可起身活動」；「3=僅能有限自我照護，清醒時間『超過50%臥床或坐椅』」；「4=完全失能、無法自我照護、完全臥床」；「5=死亡」。本題描述「可行走、能完成所有自我照護、無法從事正常工作、清醒時間超過一半可起身活動」——精確對應「ECOG PS 2」，選(C)。ECOG PS≥3者通常預後不佳且難以耐受積極化療(除非體能差是腫瘤可逆因素所致)，是治療決策的重要依據。","options":{"A":"錯誤。PS 0為完全正常活動無限制。","B":"錯誤。PS 1為可走動且能從事輕度工作。","C":"正確。可自我照護、無法工作、清醒>50%可活動＝ECOG PS 2。","D":"錯誤。PS 3為清醒時間>50%臥床/坐椅、僅有限自理。","E":"錯誤。PS 4為完全臥床、無法自理。"},"sources":["Harrison 21e, ECOG performance status","Oken MM et al. ECOG PS scale","Performance status & treatment decisions"]}},"114-143":{"quick":"腫瘤學史上「第一個」被FDA核准的跨癌別(tumor-agnostic)生物標記為「MSI-H/dMMR」(2017年pembrolizumab核准用於所有MSI-H/dMMR實體瘤)，選E。","detail":{"background":"「跨癌別(tumor-agnostic/site-agnostic)」核准是精準腫瘤學的里程碑——藥物核准「不依腫瘤原發器官，而依分子特徵」。歷史第一個是2017年5月FDA核准「pembrolizumab(抗PD-1)用於任何『高度微衛星不穩定(MSI-H)或錯配修復缺陷(dMMR)』的不可切除/轉移實體瘤」(基於KEYNOTE-016/164等籃式試驗)——MSI-H/dMMR腫瘤因高突變負荷與新抗原而對免疫檢查點抑制劑反應良好。其後陸續有「NTRK融合」(larotrectinib 2018、entrectinib)、「高腫瘤突變負荷TMB-high」(pembrolizumab 2020)、「BRAF V600E」(dabrafenib+trametinib 2022)、「RET融合」(selpercatinib 2022)等跨癌別核准。本題問「第一個」，為(E)MSI-H/dMMR。其他選項(EGFR、BRAF V600E、RET、NTRK)雖也是重要標靶，但EGFR/RET為特定癌種、BRAF與NTRK的跨癌別核准均晚於MSI-H。","options":{"A":"錯誤。EGFR突變為肺癌等特定癌種標靶，非首個跨癌別標記。","B":"錯誤。BRAF V600E跨癌別核准(2022)晚於MSI-H。","C":"錯誤。RET融合核准較晚且偏特定癌種。","D":"錯誤。NTRK融合(larotrectinib 2018)為第二個跨癌別核准，晚於MSI-H。","E":"正確。MSI-H/dMMR(pembrolizumab, 2017)為史上第一個跨癌別生物標記核准。"},"sources":["Harrison 21e, Precision Oncology / tissue-agnostic approvals","FDA pembrolizumab MSI-H/dMMR approval (2017)","KEYNOTE-016/164"]}},"114-144":{"quick":"染色體轉位與癌症配對：BCR-ABL↔CML(1)、PAX3-FOXO1↔橫紋肌肉瘤(3)、PAX8-PPARG↔甲狀腺癌(4)、TMPRSS2-ERG↔攝護腺癌(5)皆正確；EWSR1-FLI1對應「尤文氏肉瘤」而非小細胞肺癌(2)，故選D(1)+(3)+(4)+(5)。","detail":{"background":"反覆性染色體轉位是許多腫瘤(尤其液態腫瘤與部分肉瘤)的致病驅動，並可作診斷與標靶依據。本題逐項：(1)BCR-ABL1(t(9;22))↔「慢性骨髓性白血病(CML)」(亦見於Ph+ ALL)——正確，imatinib標靶。(2)「FLI1-EWSR1(EWSR1-FLI1, t(11;22))」↔「『小細胞肺癌』」——錯誤！EWSR1-FLI1融合是「尤文氏肉瘤(Ewing sarcoma)」的標誌，與小細胞肺癌無關。(3)PAX3-FOXO1(t(2;13))↔「肺泡型橫紋肌肉瘤(alveolar rhabdomyosarcoma)」——正確。(4)PAX8-PPARG(t(2;3))↔「濾泡型甲狀腺癌(thyroid cancer)」——正確。(5)TMPRSS2-ERG↔「攝護腺癌(prostate cancer)」——正確(最常見的攝護腺癌融合基因)。故正確配對為(1)+(3)+(4)+(5)，選(D)；唯(2)錯誤(EWSR1-FLI1屬尤文氏肉瘤)。","options":{"A":"錯誤。含(2)EWSR1-FLI1↔小細胞肺癌之錯誤，且漏(3)(4)。","B":"不完整。漏(4)PAX8-PPARG。","C":"不完整。漏(5)TMPRSS2-ERG。","D":"正確。BCR-ABL↔CML、PAX3-FOXO1↔橫紋肌肉瘤、PAX8-PPARG↔甲狀腺癌、TMPRSS2-ERG↔攝護腺癌。","E":"錯誤。含(2)EWSR1-FLI1↔小細胞肺癌(應為尤文氏肉瘤)。"},"sources":["Harrison 21e, Cancer Cytogenetics / fusion oncogenes","EWSR1-FLI1 = Ewing sarcoma (not SCLC)","TMPRSS2-ERG in prostate cancer"]}},"109-165":{"quick":"標靶藥配對：Eltrombopag↔ITP、Rituximab↔B細胞淋巴瘤、Brentuximab↔何杰金、Imatinib↔CML皆正確；「Ibrutinib↔多發性骨髓瘤」錯誤(ibrutinib用於CLL/套細胞/華氏巨球蛋白血症)，選D。","detail":{"background":"本題考標靶藥物與其適應症的配對。逐項：A. Eltrombopag(口服TPO受體促效劑)↔免疫性血小板低下(ITP)——正確(亦用於再生不良性貧血)。B. Rituximab(抗CD20)↔B細胞淋巴瘤——正確。C. Brentuximab vedotin(抗CD30抗體藥物複合體)↔何杰金淋巴瘤(及CD30+ T細胞淋巴瘤)——正確。E. Imatinib(BCR-ABL酪胺酸激酶抑制劑)↔慢性骨髓性白血病(CML)——正確(亦用於GIST)。D. 「Ibrutinib↔多發性骨髓瘤」——錯誤！Ibrutinib是BTK抑制劑，適應症為慢性淋巴細胞白血病(CLL)、套細胞淋巴瘤(MCL)、華氏巨球蛋白血症，「並非」多發性骨髓瘤的標準用藥(MM以蛋白酶體抑制劑bortezomib、免疫調節劑lenalidomide、anti-CD38 daratumumab為骨幹)。故錯誤配對為(D)。","options":{"A":"正確。Eltrombopag(TPO-R促效劑)用於ITP。","B":"正確。Rituximab(抗CD20)用於B細胞淋巴瘤。","C":"正確。Brentuximab(抗CD30 ADC)用於何杰金淋巴瘤。","D":"錯誤(為答案)。Ibrutinib(BTK抑制劑)用於CLL/MCL/華氏巨球蛋白血症，非多發性骨髓瘤。","E":"正確。Imatinib(BCR-ABL TKI)用於CML。"},"sources":["Harrison 21e, Targeted cancer therapies","Ibrutinib indications (CLL/MCL/WM)","Multiple myeloma backbone drugs"]}},"109-178":{"quick":"配對為真者：Ipilimumab↔CTLA-4、Afatinib↔EGFR、Rituximab↔CD20、Trastuzumab↔HER2;「Nivolumab↔PD-L1」錯誤(nivolumab標靶PD-1)，故(1)+(2)+(3)+(4)，選A。","detail":{"background":"免疫檢查點抑制劑與標靶藥物的「藥物↔標靶」配對是高頻考點，務必精準區分「PD-1 vs PD-L1」抗體。逐項：(1)Ipilimumab↔CTLA-4——正確(第一個核准的檢查點抑制劑)。(2)Afatinib↔EGFR(第二代不可逆EGFR-TKI)——正確。(3)Rituximab↔CD20——正確。(4)Trastuzumab↔HER2——正確。(5)「Nivolumab↔PD-L1」——錯誤！Nivolumab與pembrolizumab是「抗PD-1」抗體；「抗PD-L1」抗體是atezolizumab、durvalumab、avelumab。因此(5)配對錯誤。正確組合為(1)+(2)+(3)+(4)，選(A)。記憶要訣：「-(li)zumab中含『PD-1』者為nivolumab/pembrolizumab/cemiplimab；atezo/durva/avelumab為PD-L1」。","options":{"A":"正確。Ipilimumab↔CTLA-4、Afatinib↔EGFR、Rituximab↔CD20、Trastuzumab↔HER2皆正確。","B":"錯誤。含(5)Nivolumab↔PD-L1之錯誤(nivolumab為PD-1)。","C":"錯誤。含(5)錯誤配對。","D":"錯誤。含(5)錯誤且漏(1)(3)。","E":"錯誤。含(5)Nivolumab↔PD-L1之錯誤。"},"sources":["Harrison 21e, Immune checkpoint inhibitors & targeted agents","Nivolumab/Pembrolizumab = anti-PD-1; Atezolizumab/Durvalumab = anti-PD-L1","Drug-target pairing"]}},"110-142":{"quick":"轉移性大腸癌對pembrolizumab(抗PD-1)反應較佳的預測性生物標記為「MSI-H＋dMMR(微衛星高度不穩定、錯配修復缺陷)」，選C。","detail":{"background":"免疫檢查點抑制劑(如pembrolizumab)在大腸癌的療效與「錯配修復(mismatch repair, MMR)狀態」密切相關。錯配修復缺陷(deficient MMR, dMMR)會導致「微衛星高度不穩定(microsatellite instability-high, MSI-H)」，使腫瘤累積大量突變與新抗原(neoantigen)、高度免疫原性，因此對抗PD-1治療反應佳。KEYNOTE-016/164/177等試驗證實：MSI-H/dMMR的轉移性大腸癌對pembrolizumab反應良好，KEYNOTE-177更顯示一線pembrolizumab優於化療(無惡化存活延長)。相對地，「微衛星穩定(MSS)/MMR完整(pMMR)」的大腸癌(占約95%)對單用檢查點抑制劑反應差。本題正確配對是「MSI-H(高度不穩定)＋dMMR(修復缺陷)」——兩者是同一現象的因果(dMMR→MSI-H)，選(C)。其他選項把MSI與MMR狀態錯配(如MSI-H配pMMR、MSS配dMMR)皆矛盾。","options":{"A":"錯誤。MSS與dMMR矛盾(dMMR會造成MSI-H而非MSS)。","B":"錯誤。MSI-H與pMMR矛盾。","C":"正確。MSI-H＋dMMR是pembrolizumab有效的預測性生物標記。","D":"錯誤。MSS/pMMR者對單用檢查點抑制劑反應差。","E":"錯誤。C為正確答案。"},"sources":["Harrison 21e, Immunotherapy biomarkers (MSI/MMR)","Le DT et al. KEYNOTE-016; André KEYNOTE-177","dMMR→MSI-H→neoantigen load"]}},"110-143":{"quick":"配對為真者：Afatinib↔EGFR、Trastuzumab↔HER2、Rituximab↔CD20、Ipilimumab↔CTLA-4;「Nivolumab↔PD-L1」錯誤(應為PD-1)，故(2)+(3)+(4)+(5)，選C。","detail":{"background":"本題與109-178互為對照，再次強化「PD-1 vs PD-L1」的精準配對。逐項：(1)「Nivolumab↔PD-L1」——錯誤(nivolumab是抗『PD-1』；抗PD-L1為atezolizumab/durvalumab/avelumab)。(2)Afatinib↔EGFR——正確。(3)Trastuzumab↔HER2——正確。(4)Rituximab↔CD20——正確。(5)Ipilimumab↔CTLA-4——正確。因此正確組合為(2)+(3)+(4)+(5)，選(C)；唯一錯誤是(1)nivolumab的標靶被寫成PD-L1。再次提醒：nivolumab、pembrolizumab、cemiplimab=抗PD-1；atezolizumab、durvalumab、avelumab=抗PD-L1；ipilimumab、tremelimumab=抗CTLA-4。","options":{"A":"錯誤。含(1)Nivolumab↔PD-L1之錯誤。","B":"錯誤。含(1)錯誤配對。","C":"正確。Afatinib↔EGFR、Trastuzumab↔HER2、Rituximab↔CD20、Ipilimumab↔CTLA-4皆正確。","D":"錯誤。含(1)錯誤且漏(3)。","E":"錯誤。含(1)Nivolumab↔PD-L1之錯誤。"},"sources":["Harrison 21e, Checkpoint inhibitors & targeted therapy","Anti-PD-1 vs anti-PD-L1 agents","Drug-target pairing"]}},"112-124":{"quick":"使用PD-1/PD-L1檢查點抑制劑時，常見的「風濕免疫」自體免疫併發症之一為乾燥症(Sjögren-like sicca)；本題答案為A。","detail":{"background":"免疫檢查點抑制劑(ICI)藉解除T細胞煞車而增強抗腫瘤免疫，但同時可引發廣泛的「免疫相關不良事件(immune-related adverse events, irAE)」，涵蓋皮膚(疹、白斑)、腸胃(結腸炎/腹瀉，常見)、內分泌(甲狀腺炎、垂體炎、第一型糖尿病)、肝(肝炎)、肺(肺炎)、與風濕(發炎性關節炎、肌炎、與「乾燥症樣(sicca/Sjögren-like)」表現)。在「風濕性irAE」中，發炎性關節炎與乾燥症(口乾眼乾)是常見型態；本題依其設定答案為(A)Sjögren syndrome(乾燥症樣表現)。臨床處置依嚴重度分級(CTCAE)：輕度局部處理或暫停藥，中重度給予全身性類固醇(視器官而定)，難治者加用其他免疫抑制(如TNF抑制劑用於結腸炎、mycophenolate用於肝炎)。整體而言，最常見的irAE是皮膚與腸胃，但本題聚焦「自體免疫(風濕)併發症」並以乾燥症為答案。","options":{"A":"正確(本題答案)。檢查點抑制劑可引發乾燥症樣(Sjogren-like sicca)風濕irAE。","B":"較少。ICI引發典型SLE相對少見。","C":"發炎性關節炎雖可見，但本題以乾燥症為答案。","D":"ANCA相關血管炎為較罕見的irAE。","E":"多發性肌炎/皮肌炎為較少見但可致命的irAE，非本題答案。"},"sources":["Harrison 21e, Immune-related adverse events","Rheumatic irAE (inflammatory arthritis, sicca/Sjögren-like)","ASCO/NCCN irAE management"]}},"113-143":{"quick":"VEGF(血管新生)抑制劑(如bevacizumab)的類別毒性：高血壓、蛋白尿、出血或血栓、腸胃道穿孔、傷口癒合不良；「高血糖」非VEGF類別毒性，選B。","detail":{"background":"VEGF(血管內皮生長因子)路徑抑制劑包括單株抗體bevacizumab、VEGFR酪胺酸激酶抑制劑(sunitinib、sorafenib、pazopanib等)與aflibercept。VEGF維持血管內皮恆定與修復，抑制後產生一組「類別相關毒性(class toxicities)」：①「高血壓(hypertension)」——最常見(一氧化氮↓、血管阻力↑)；②「蛋白尿(proteinuria)」與腎絲球病變(可達腎病症候群)；③「出血或血栓(bleeding or thrombosis)」——動脈血栓、出血(含咳血、腸胃出血)；④「腸胃道穿孔(GI perforation)」——少見但致命；⑤傷口癒合不良、可逆性後腦病變(PRES)、心功能不全。本題問「何者『非』VEGF類別毒性」：A高血壓、C蛋白尿、D出血/血栓、E腸胃道穿孔皆是，唯B「高血糖(hyperglycemia)」不是VEGF抑制劑的典型類別毒性(高血糖較常見於mTOR抑制劑everolimus或PI3K抑制劑)，故選(B)。","options":{"A":"是VEGF類別毒性。高血壓最常見。","B":"正確(為非)。高血糖非VEGF抑制劑類別毒性(較見於mTOR/PI3K抑制劑)。","C":"是VEGF類別毒性。蛋白尿/腎絲球病變。","D":"是VEGF類別毒性。出血與血栓風險增加。","E":"是VEGF類別毒性。腸胃道穿孔(少見但嚴重)。"},"sources":["Harrison 21e, Antiangiogenic therapy toxicities","Bevacizumab class effects (HTN, proteinuria, bleeding/thrombosis, GI perforation)","mTOR inhibitor → hyperglycemia"]}},"113-144":{"quick":"免疫治療藥↔標靶配對為真：Ipilimumab↔CTLA-4、Pembrolizumab↔PD-1、Durvalumab↔PD-L1;「Atezolizumab↔PD-1」與「Nivolumab↔PD-L1」皆錯(atezolizumab為PD-L1、nivolumab為PD-1)，故(1)+(3)+(5)，選B。","detail":{"background":"本題集中考檢查點抑制劑的「PD-1 vs PD-L1」歸屬。正確分類：抗PD-1抗體＝nivolumab、pembrolizumab、cemiplimab；抗PD-L1抗體＝atezolizumab、durvalumab、avelumab；抗CTLA-4＝ipilimumab、tremelimumab。逐項：(1)Ipilimumab↔CTLA-4——正確。(2)「Atezolizumab↔PD-1」——錯誤(atezolizumab是『PD-L1』)。(3)Pembrolizumab↔PD-1——正確。(4)「Nivolumab↔PD-L1」——錯誤(nivolumab是『PD-1』)。(5)Durvalumab↔PD-L1——正確。因此為真者為(1)+(3)+(5)，選(B)。此題與109-178、110-143同一考點群，反覆出現，務必牢記各藥的精確標靶。","options":{"A":"錯誤。漏(3)Pembrolizumab↔PD-1。","B":"正確。Ipilimumab↔CTLA-4、Pembrolizumab↔PD-1、Durvalumab↔PD-L1皆為真。","C":"錯誤。含(2)Atezolizumab↔PD-1之錯誤。","D":"錯誤。含(2)(4)錯誤配對。","E":"錯誤。含(2)(4)兩個錯誤配對。"},"sources":["Harrison 21e, Checkpoint inhibitor classes","Anti-PD-1: nivolumab/pembrolizumab; Anti-PD-L1: atezolizumab/durvalumab/avelumab","Anti-CTLA-4: ipilimumab"]}},"114-113":{"quick":"免疫治療引起的免疫相關肝炎，類固醇須「由高劑量逐漸減量(taper)至低劑量後再停藥」，不可驟停以免反彈，選C。","detail":{"background":"免疫檢查點抑制劑引起的「免疫相關肝炎(immune-related hepatitis)」是常見且可嚴重的irAE。處理原則依嚴重度(CTCAE分級)：中重度(G2以上、transaminase明顯上升)需「暫停或永久停用免疫治療」並給予「全身性類固醇(如methylprednisolone/prednisone 1–2 mg/kg/day)」，本例已給高劑量並計畫4週療程。關鍵在於「類固醇的減量(taper)」——必須「由高劑量逐漸減量至低劑量，通常於至少4–6週(嚴重者更久)緩慢減量後才停藥」，「不可驟然停藥」，否則肝炎易反彈復發，且長期高劑量驟停亦有腎上腺功能不全風險。類固醇難治者(72小時無改善)可加用mycophenolate mofetil(肝炎irAE不建議用infliximab，因其肝毒性)。本題正確為(C)由高劑量漸減至低劑量後再停；A立即停藥、D/E在20或10 mg就直接停皆為「驟停」而錯誤；B「不適合使用類固醇」亦錯(類固醇正是治療主力)。","options":{"A":"錯誤。不可立即停類固醇，會使免疫肝炎反彈。","B":"錯誤。類固醇正是免疫相關肝炎的治療主力，並非不適合。","C":"正確。類固醇須由高劑量逐漸減量至低劑量後再停藥(緩慢taper)。","D":"錯誤。減到20 mg/日就直接停屬驟停，易復發。","E":"錯誤。減到10 mg/日就直接停仍屬驟停，應更緩慢減量。"},"sources":["Harrison 21e, Management of irAE (hepatitis)","ASCO/NCCN irAE guidelines (steroid taper ≥4–6 weeks)","Mycophenolate for steroid-refractory ICI hepatitis"]}},"108-綜-11":{"quick":"CUP免疫染色 CK20(+)/CK7(−) 最常對應「大腸(colon)」原發；故選E。","detail":{"background":"原發部位不明癌(carcinoma of unknown primary, CUP)的免疫組織化學(IHC)中，cytokeratin(CK)亞型「CK7與CK20」的組合是判斷原發器官的經典工具。一般原則：①「CK7−/CK20+」→「大腸直腸(colorectal)」最典型(亦Merkel cell)；②「CK7+/CK20−」→肺、乳房、甲狀腺、卵巢、子宮內膜、胰膽道(部分)；③「CK7+/CK20+」→胰臟、膽道、胃、尿路上皮(膀胱)、部分卵巢黏液性；④「CK7−/CK20−」→肝細胞癌、腎細胞癌、攝護腺、鱗狀/神經內分泌。本題「CK20(+)且CK7(−)」最符合「大腸(colon)」原發，選(E)。進一步可加CDX-2(腸道)輔助確認。其他選項：lung/breast/endometrium多為CK7+/CK20−，pancreas多為CK7+/CK20+，皆與CK20+/CK7−不符。CUP的IHC策略是先以廣譜CK確認上皮來源，再以器官特異標記(TTF-1肺、CDX-2腸、GATA3乳房/尿路、PSA攝護腺、thyroglobulin/PAX8等)定位。","options":{"A":"錯誤。肺多為CK7+/CK20−(且TTF-1+)。","B":"錯誤。乳房多為CK7+/CK20−(GATA3+)。","C":"錯誤。子宮內膜多為CK7+/CK20−。","D":"錯誤。胰臟多為CK7+/CK20+。","E":"正確。CK20+/CK7−最符合大腸(colorectal)原發(可加CDX-2佐證)。"},"sources":["Harrison 21e, Carcinoma of Unknown Primary","CK7/CK20 IHC algorithm","CDX-2 for colorectal origin"]}},"109-177":{"quick":"PSA由「惡性與非惡性」攝護腺細胞皆會製造(故非癌症專一)，選B；其餘關於USPSTF/AUA年齡與處置的敘述皆有誤。","detail":{"background":"攝護腺特異抗原(prostate-specific antigen, PSA)是攝護腺上皮細胞分泌的絲胺酸蛋白酶，「正常與惡性攝護腺細胞皆會製造」，因此PSA「非攝護腺癌專一」——良性攝護腺肥大(BPH)、攝護腺炎、射精、攝護腺操作(切片、導尿)亦會升高，這是PSA作為篩檢工具特異度不足的根本原因(B正確)。篩檢指引：①USPSTF(2018)對「55–69歲」男性給予「C級——個別化、與醫師共同決策(shared decision-making)」而非一律建議篩檢，對「≥70歲」則『不建議(D級)』常規篩檢；選項C把它寫成「建議(recommends)55–69歲篩檢」過於絕對，與「個別化決策」的精神有出入，故視為不正確。②AUA建議的共同決策年齡約為55–69歲(非選項D所述40–55歲)，故D錯。③選項A(多數攝護腺癌死亡發生於PSA低於最高四分位者)不正確。④選項E(無症狀PSA升高者先給2週抗生素再追蹤)並非標準建議，故E錯。因此唯一正確為(B)。","options":{"A":"錯誤。並非多數攝護腺癌死亡發生於PSA低於最高四分位者。","B":"正確。PSA由惡性與非惡性攝護腺細胞皆會製造，故非癌症專一。","C":"不正確。USPSTF對55–69歲是「個別化共同決策(C級)」，非一律建議篩檢；≥70歲不建議。","D":"錯誤。AUA共同決策年齡約55–69歲，非40–55歲。","E":"錯誤。無症狀PSA升高者常規先給2週抗生素並非標準作法。"},"sources":["Harrison 21e, Prostate Cancer / PSA screening","USPSTF 2018 PSA (grade C 55–69, D ≥70)","PSA produced by benign & malignant cells"]}},"110-139":{"quick":"CUP以次世代定序分析，最常見的基因變異為「TP53」(各種癌共通、最高頻的突變抑癌基因)，選B。","detail":{"background":"原發部位不明癌(CUP)的次世代定序(NGS)研究顯示，其基因變異譜與一般實體腫瘤相似，而「TP53」是「人類癌症中最常突變的基因」(約半數實體腫瘤帶TP53突變)，在CUP亦為「最常見」的基因變異。TP53(位於17p13)編碼「基因體守護者(guardian of the genome)」p53蛋白，調控細胞週期停滯、DNA修復與凋亡；失活後細胞失去應對DNA損傷的剎車，促進基因不穩定與腫瘤生成。其次常見的CUP變異尚有KRAS、CDKN2A、ARID1A、PIK3CA等，但頻率皆低於TP53。本題選(B)TP53。NGS在CUP的價值不僅在分類，更在於找出「可標靶/可治療」的變異(如NTRK融合、MSI-H、BRAF、HER2等)，使部分CUP得以接受標靶或免疫治療。","options":{"A":"錯誤。KRAS常見於胰臟/大腸/肺，但CUP整體最高頻為TP53。","B":"正確。TP53是人類癌症與CUP中最常見的突變基因。","C":"錯誤。ARID1A可見但頻率低於TP53。","D":"錯誤。CDKN2A非CUP最常見變異。","E":"錯誤。mTOR非CUP最常見變異。"},"sources":["Harrison 21e, Carcinoma of Unknown Primary—molecular","TP53 most frequently mutated gene in cancer","NGS in CUP"]}},"110-140":{"quick":"轉移性「亮細胞型腎細胞癌(clear cell RCC)」已多處肺轉移，下一步為全身性標靶治療——抗血管新生TKI(sunitinib)，選C；不以單純根除性腎切除或舊式細胞激素為首選。","detail":{"background":"腎細胞癌(renal cell carcinoma, RCC)以亮細胞型(clear cell)最常見，與VHL基因失活、HIF-VEGF路徑活化高度相關，故「抗血管新生(VEGF/VEGFR)」治療有效。本例67歲、巨大腎腫塊合併「兩側多發肺轉移」——屬轉移性(IV期)RCC。處置原則：①轉移性RCC的核心是「全身性治療」；現代一線首選為「免疫檢查點抑制劑為基礎的合併療法(如ipilimumab+nivolumab，或pembrolizumab/avelumab+axitinib等IO+TKI)」，VEGFR-TKI(sunitinib、pazopanib、cabozantinib)為重要骨幹。②本題選項中針對「亮細胞RCC、HIF-VEGF驅動」最合適的是「sunitinib(VEGFR-TKI)」，選(C)。③「根除性腎切除(radical nephrectomy)」在廣泛轉移者非「下一步首選」(細胞減量腎切除cytoreductive nephrectomy角色在IO時代已選擇性)；④gemcitabine(化療)對亮細胞RCC效果差；⑤高劑量IL-2與interferon為舊式細胞激素療法，毒性大、已被標靶/免疫取代。故選(C)。","options":{"A":"非首選。廣泛肺轉移者，單純根除性腎切除非「下一步」；需全身治療。","B":"錯誤。Gemcitabine對亮細胞RCC效果不佳。","C":"正確。轉移性亮細胞RCC應給全身標靶治療，sunitinib(VEGFR-TKI)為合適選項。","D":"過時。高劑量IL-2毒性大、反應率低，已被標靶/免疫取代。","E":"過時。Interferon-γ非標準RCC治療。"},"sources":["Harrison 21e, Renal Cell Carcinoma","NCCN/ESMO mRCC (IO-based & VEGFR-TKI)","VHL-HIF-VEGF axis & antiangiogenics"]}},"111-138":{"quick":"CUP輔助判定「肺」原發的核染色標記為 TTF-1(約68%肺腺癌、25%肺鱗癌陽性)，選C。","detail":{"background":"甲狀腺轉錄因子-1(thyroid transcription factor 1, TTF-1/NKX2-1)是「肺」與「甲狀腺」上皮的核轉錄因子，IHC核染色陽性。在CUP判定原發器官時，TTF-1是「肺腺癌」最重要的標記之一——約「68%肺腺癌」陽性、「約25%肺鱗癌」陽性(鱗癌較低)，故常用於支持「肺」為原發來源(需配合臨床與其他標記，因甲狀腺癌亦TTF-1+，但甲狀腺另有thyroglobulin/PAX8)。本題描述完全對應TTF-1，選(C)。對照其他標記：CDX-2(A)為腸道(大腸)核標記；thyroglobulin(B)為甲狀腺濾泡細胞；cytokeratin(D)是廣譜上皮標記(確認上皮來源但不定器官)；leucocyte common antigen/LCA即CD45(E)是淋巴造血細胞標記(用於排除淋巴瘤)。故肺原發核染色標記為TTF-1。","options":{"A":"錯誤。CDX-2為腸道(大腸)核標記。","B":"錯誤。Thyroglobulin為甲狀腺濾泡細胞標記。","C":"正確。TTF-1約68%肺腺癌、25%肺鱗癌陽性，為肺原發核染色標記。","D":"錯誤。CK為廣譜上皮標記，不能定器官。","E":"錯誤。LCA(CD45)為淋巴造血細胞標記，用於排除淋巴瘤。"},"sources":["Harrison 21e, CUP immunohistochemistry","TTF-1 in lung adenocarcinoma (~68%)","PAX8/thyroglobulin (thyroid), CDX-2 (colon)"]}},"112-138":{"quick":"對 HER2「低表現(low HER2, IHC 1+或IHC 2+/ISH−)」乳癌亦有高緩解率的新藥為抗體藥物複合體 Trastuzumab-Deruxtecan(T-DXd)，選D。","detail":{"background":"乳癌的HER2狀態決定標靶策略。傳統HER2陽性(IHC 3+或IHC 2+/ISH+)才對anti-HER2有效；而約半數乳癌屬「HER2低表現(HER2-low：IHC 1+，或IHC 2+且ISH陰性)」，過去歸為HER2陰性、無法從傳統trastuzumab/pertuzumab/lapatinib獲益。突破來自「抗體藥物複合體(ADC)」Trastuzumab-Deruxtecan(T-DXd)：以抗HER2抗體連接拓樸異構酶I抑制劑deruxtecan，具高藥物-抗體比與「旁觀者效應(bystander effect)」，即使HER2低表現也能將毒素帶入並殺傷鄰近細胞。DESTINY-Breast04試驗(NEJM 2022)證實T-DXd在HER2-low轉移乳癌顯著優於化療(反應率約52%、延長存活)，開創「HER2-low」這個新治療族群。本題選(D)Trastuzumab-Deruxtecan。對照：trastuzumab/pertuzumab/lapatinib對HER2-low無效；T-DM1(trastuzumab-emtansine)在HER2-low效果亦不如T-DXd。需注意T-DXd的間質性肺病/肺炎風險。","options":{"A":"錯誤。Trastuzumab對HER2低表現無顯著療效。","B":"錯誤。Lapatinib(HER2 TKI)對HER2低表現無效。","C":"錯誤。Pertuzumab需與HER2高表現併用trastuzumab，對低表現無效。","D":"正確。Trastuzumab-Deruxtecan(T-DXd)對HER2-low乳癌有高緩解率(DESTINY-Breast04)。","E":"錯誤。T-DM1對HER2低表現效果不如T-DXd。"},"sources":["Harrison 21e, Breast Cancer—HER2-targeted therapy","Modi S et al. DESTINY-Breast04 (T-DXd in HER2-low), NEJM 2022","ADC bystander effect"]}},"112-140":{"quick":"惡性肉瘤(sarcoma)風險因子包括HHV8(卡波西氏肉瘤)、HIV、放射治療、Li-Fraumeni症候群;「外傷/舊傷(trauma)」與肉瘤風險『最不相關』，選C。","detail":{"background":"軟組織肉瘤(sarcoma)的已知危險因子：①病毒——「人類疱疹病毒第8型(HHV8)」與卡波西氏肉瘤(Kaposi sarcoma)、HIV/免疫抑制(增加卡波西與其他肉瘤)；②「先前放射治療(prior radiation)」——放療後肉瘤(如血管肉瘤、骨肉瘤)是明確的遲發併發；③遺傳症候群——「Li-Fraumeni(TP53胚系突變)」好發肉瘤、乳癌、腦瘤、腎上腺皮質癌；神經纖維瘤症NF1(惡性周邊神經鞘瘤)、視網膜母細胞瘤基因(RB1)、家族性腺瘤性息肉病(硬纖維瘤)等；④慢性淋巴水腫(Stewart-Treves的淋巴管肉瘤)、某些化學物質(氯乙烯→肝血管肉瘤)。而「外傷或舊傷(trauma/previous injury)」雖民間常聯想，但「並無可靠證據」顯示其增加肉瘤風險(病人常因外傷就醫才『發現』既有腫瘤，是時序錯覺)。故與肉瘤風險「最不相關」者為(C)trauma，選(C)。","options":{"A":"相關。HHV8與卡波西氏肉瘤相關。","B":"相關。HIV/免疫抑制增加卡波西及其他肉瘤風險。","C":"正確(最不相關)。外傷/舊傷與肉瘤風險無可靠因果關係。","D":"相關。先前放射治療為明確的放療後肉瘤危險因子。","E":"相關。Li-Fraumeni(TP53)好發肉瘤。"},"sources":["Harrison 21e, Soft Tissue Sarcoma—risk factors","HHV8/HIV (Kaposi), radiation-induced sarcoma, Li-Fraumeni","Trauma not a proven risk"]}},"112-142":{"quick":"肌肉侵入型膀胱癌(MIBC)的標準治療為「含cisplatin的新輔助化療後接根除性膀胱切除術(neoadjuvant cisplatin + radical cystectomy)」，選D。","detail":{"background":"泌尿上皮膀胱癌依是否侵犯肌肉層分流。「非肌肉侵入型(NMIBC)」以經尿道切除(TURBT)±膀胱內治療(BCG、化療)；「肌肉侵入型膀胱癌(muscle-invasive bladder cancer, MIBC)」則屬侵襲性、需根治性策略。MIBC的標準治療是「『含cisplatin的新輔助化療(neoadjuvant cisplatin-based chemotherapy)』後接『根除性膀胱切除術(radical cystectomy)＋骨盆淋巴結廓清』」——新輔助化療經隨機試驗證實可提升整體存活(約5–8%絕對存活益處)，並可能降期。本例「肌肉侵入型、廣泛膀胱壁浸潤、無淋巴結轉移」正屬此情境，選(D)。對照：A膀胱內BCG用於NMIBC(尤其原位癌/高風險)，對MIBC無效；B重複切片非治療；C capecitabine(口服fluoropyrimidine)非膀胱癌主力且非標準新輔助；E單獨放療療效不如手術(器官保留三合一放化療tri-modality是替代選項但非首選)。對不適合cisplatin者可考慮免疫治療或膀胱保留方案。","options":{"A":"錯誤。膀胱內BCG用於非肌肉侵入型膀胱癌，對MIBC無效。","B":"錯誤。重複切片非治療手段。","C":"錯誤。Capecitabine非膀胱癌標準治療。","D":"正確。MIBC標準為含cisplatin新輔助化療＋根除性膀胱切除術。","E":"非首選。單獨放療療效不如手術；膀胱保留需三合一放化療。"},"sources":["Harrison 21e, Bladder Cancer","NCCN/EAU MIBC (neoadjuvant cisplatin + cystectomy)","SWOG neoadjuvant chemo survival benefit"]}},"114-140":{"quick":"新一代「口服選擇性雌激素受體降解劑(oral SERD)」為 Camizestrant(可標靶野生型與ESR1突變型ER)，選D。","detail":{"background":"雌激素受體陽性(ER+)乳癌在內分泌治療後常因「ESR1(雌激素受體基因)突變」而對芳香酶抑制劑(AI)產生抗藥(突變使ER在無雌激素下仍持續活化)。「選擇性雌激素受體降解劑(selective estrogen receptor degrader, SERD)」可結合並「促使ER降解」，對野生型與『ESR1突變型』ER皆有效。第一個SERD是「fulvestrant」(需肌肉注射)；新一代為「口服SERD」，包括「camizestrant」、elacestrant(已FDA核准用於ESR1突變)、giredestrant等。本題問「新一代口服SERD」，答案為(D)Camizestrant。對照其他選項：A tamoxifen是選擇性雌激素受體調節劑(SERM)非SERD；B Arimidex(anastrozole)與C letrozole是芳香酶抑制劑(AI)；E palbociclib是CDK4/6抑制劑——皆非SERD。故選(D)。","options":{"A":"錯誤。Tamoxifen為SERM(選擇性調節劑)，非SERD。","B":"錯誤。Arimidex(anastrozole)為芳香酶抑制劑。","C":"錯誤。Letrozole為芳香酶抑制劑。","D":"正確。Camizestrant為新一代口服SERD，可標靶野生型與ESR1突變型ER。","E":"錯誤。Palbociclib為CDK4/6抑制劑。"},"sources":["Harrison 21e, Breast Cancer endocrine therapy","Oral SERDs (elacestrant, camizestrant) & ESR1 mutation","SERENA trials (camizestrant)"]}},"109-196":{"quick":"台灣(黃種人)最常見的皮膚黑色素瘤亞型為「肢端黑痣型(acral lentiginous melanoma)」，好發於手掌、腳掌、指(趾)甲，選B。","detail":{"background":"皮膚黑色素瘤(cutaneous melanoma)的亞型分布有顯著「種族差異」。白種人最常見的是「表淺擴散型(superficial spreading melanoma)」，與間歇性日曬、軀幹/四肢相關；而「亞洲人/黃種人與深膚色人種」最常見的是「肢端黑痣型(acral lentiginous melanoma, ALM)」——好發於「手掌、腳掌、指(趾)甲下(甲下黑色素瘤)」等非日曬部位，與紫外線關係小、常較晚被發現、預後較差。台灣的黑色素瘤以ALM為大宗，因此「腳底/指甲新出現或變化的黑色病灶」須高度警覺。本題問台灣最常見亞型，選(B)acral lentiginous melanoma。其他亞型：結節型(nodular)侵襲快、垂直生長期為主；惡性黑痣型(lentigo maligna)見於慢性日曬的老年臉部；黏膜型(mucosal)罕見且預後差。臨床診斷重視ABCDE與甲下色素縱帶(Hutchinson sign)。","options":{"A":"錯誤。結節型非台灣最常見亞型。","B":"正確。台灣/黃種人最常見為肢端黑痣型(手掌、腳掌、指甲)。","C":"錯誤。表淺擴散型是「白種人」最常見亞型。","D":"錯誤。惡性黑痣型見於老年慢性日曬臉部，非最常見。","E":"錯誤。黏膜型罕見。"},"sources":["Harrison 21e, Melanoma (subtypes & ethnicity)","Acral lentiginous melanoma in Asians","Hutchinson sign"]}},"109-197":{"quick":"黑色素瘤ABCDE中「要考慮惡性」者為：D 直徑>6 mm、E 病灶演變(大小/形狀/顏色改變、隆起、出血);A對稱、B邊緣規則、C色澤均勻屬「良性」描述。故選D(4)+(5)。","detail":{"background":"黑色素瘤的臨床篩檢口訣「ABCDE」用於辨識「惡性」特徵：A=Asymmetry「不對稱」(惡性病灶左右『不』對稱)；B=Border「邊緣不規則/模糊」(惡性邊緣『不』規則)；C=Color「顏色不均、多色」(惡性色澤『不』均勻、深淺混雜)；D=Diameter「直徑>6 mm」(>6 mm較需注意)；E=Evolving「演變」(病灶大小、形狀、顏色改變，或新出現隆起、出血、搔癢——是最重要的警訊)。本題選項把(1)(2)(3)寫成「對稱、邊緣規則、色澤均勻」這些是「良性」描述(故不選)，唯(4)「直徑>6 mm」與(5)「演變(改變/隆起/出血)」是正確的惡性警訊，選(D)。其中「E(Evolving)」被認為是最敏感的單一指標，任何快速變化的色素病灶都應評估。","options":{"A":"錯誤。對稱、邊緣規則、色澤均勻皆為「良性」描述。","B":"錯誤。邊緣規則、色澤均勻為良性，不應列為惡性特徵。","C":"錯誤。邊緣規則、色澤均勻屬良性。","D":"正確。直徑>6 mm與病灶演變(改變/隆起/出血)為惡性警訊。","E":"錯誤。含(2)邊緣規則(良性描述)。"},"sources":["Harrison 21e, Melanoma—ABCDE criteria","Evolving lesion as key warning sign","Dermatology screening"]}},"109-198":{"quick":"基底細胞癌(BCC)正確描述：結節型(nodular)為帶珍珠光澤、邊緣隆起、伴擴張血絲的緩慢結節(2);硬皮型(morpheaform)為扁平萎縮如疤痕、具侵襲性(4)。故選B(2)+(4)。","detail":{"background":"基底細胞癌(basal cell carcinoma, BCC)是最常見的皮膚癌，與長期紫外線曝曬、Hedgehog訊息路徑活化(PTCH1突變)相關；生長緩慢、「局部侵犯但極少轉移」。臨床亞型：(2)「結節型(nodular)」——最常見，表現為「緩慢長大、帶珍珠樣光澤(pearly)、邊緣捲起隆起、表面有擴張微血管(telangiectasia)，中央可潰瘍(rodent ulcer)」，敘述正確。(4)「硬皮型/硬斑型(morpheaform/sclerosing)」——表現為「單一、扁平或萎縮、像疤痕般的硬化板塊」，邊界不清、『具侵襲性』、易低估範圍，敘述正確。錯誤者：(1)「表淺型(superficial)」BCC其實是「侵襲性最低」、好發軀幹、像濕疹/紅斑鱗屑斑塊，並非「最惡性、好發四肢末梢」(描述錯誤)；(3)「色素型(pigmented)」BCC雖含黑色素類似黑色素瘤，但「BCC極少轉移」，「極易轉移」的描述錯誤。故正確為(2)+(4)，選(B)。治療以手術切除(Mohs用於高風險/臉部)，晚期/不可手術用Hedgehog抑制劑(vismodegib)。","options":{"A":"錯誤。(1)表淺型BCC侵襲性最低(非最惡性)、(3)BCC極少轉移。","B":"正確。結節型(珍珠光澤、邊緣隆起、擴張血絲)與硬皮型(疤痕樣、侵襲性)描述正確。","C":"錯誤。含(1)表淺型「最惡性」之錯誤描述。","D":"錯誤。含(3)色素型「極易轉移」之錯誤(BCC極少轉移)。","E":"錯誤。含(3)錯誤描述。"},"sources":["Harrison 21e, Basal Cell Carcinoma","Nodular vs morpheaform BCC; rarely metastasize","Hedgehog pathway, Mohs/vismodegib"]}},"110-160":{"quick":"黑色素瘤正確敘述：Breslow厚度為最重要預後因子(4);腫瘤厚2 mm無潰瘍、臨床淋巴結陰性者除廣泛切除外應做前哨淋巴結切片(5)。故選D(4)+(5)。","detail":{"background":"黑色素瘤的預後與治療決策核心：(4)「Breslow厚度(腫瘤垂直厚度，以mm計)是最重要的預後因子」——厚度越深，轉移與死亡風險越高，亦是T分期主軸(另潰瘍ulceration、有絲分裂率為輔)。(5)「前哨淋巴結切片(sentinel lymph node biopsy, SLNB)」適用於「中等厚度(約>0.8–1.0 mm，尤其≥1 mm或有潰瘍)、臨床淋巴結陰性、無遠端轉移」者，以評估區域淋巴結微轉移、做分期與後續輔助治療決策；本例「腳底ALM、厚度2 mm、無潰瘍、腹股溝未摸到淋巴結、無全身轉移」正符合SLNB適應，敘述正確。錯誤者：(1)黑色素瘤「不是」最常見的皮膚癌(最常見是基底細胞癌)，故錯；(2)種族亞型分布敘述顛倒(應為黃種人ALM比例高、白種人表淺擴散型多、黏膜型在深膚色相對較多)，描述有誤;(3)「約7成以上黑色素瘤由痣轉變而來」錯誤——多數黑色素瘤是「de novo(從正常皮膚新發)」，僅少部分源自既有痣。故正確為(4)+(5)，選(D)。","options":{"A":"錯誤。含(1)黑色素瘤為最常見皮膚癌之錯誤(最常見是BCC)。","B":"錯誤。含(2)(3)錯誤敘述。","C":"錯誤。含(1)(3)錯誤。","D":"正確。Breslow厚度為最重要預後因子；2 mm無潰瘍、淋巴結陰性者應做前哨淋巴結切片。","E":"錯誤。含(3)「7成由痣轉變」之錯誤(多為de novo)。"},"sources":["Harrison 21e, Melanoma—staging & prognosis","Breslow thickness; AJCC melanoma staging","Sentinel lymph node biopsy indications"]}},"111-142":{"quick":"轉移性黑色素瘤在選擇「標靶治療」前，最該檢測的基因突變為「BRAF」(V600E/K);BRAF突變者可用BRAF＋MEK抑制劑，選E。","detail":{"background":"轉移性黑色素瘤的全身治療有「免疫治療(檢查點抑制劑)」與「標靶治療」兩大方向，後者取決於「BRAF突變」狀態。約「40–50%皮膚黑色素瘤帶BRAF突變(以V600E最常見，其次V600K)」，這類病人可用「BRAF抑制劑(vemurafenib、dabrafenib、encorafenib)＋MEK抑制劑(trametinib、cobimetinib、binimetinib)」雙標靶，反應快、緩解率高(但易產生抗藥)。因此在決定是否給標靶治療前，「最重要的基因檢測是BRAF」，選(E)。對照其他選項：C-KIT突變主要見於「肢端型/黏膜型」黑色素瘤(可考慮imatinib)，但非最主要;NRAS突變雖常見且預後較差，但目前「無有效專一標靶」;HRAS、ERK非黑色素瘤標靶治療的主要檢測標的。故選(E)BRAF。免疫治療(抗PD-1±抗CTLA-4)則不論BRAF狀態皆可用，且常為一線。","options":{"A":"次要。C-KIT突變見於肢端/黏膜型黑色素瘤，非最主要檢測。","B":"無專一標靶。NRAS突變預後差但目前無有效專一標靶藥。","C":"錯誤。HRAS非黑色素瘤標靶檢測重點。","D":"錯誤。ERK為下游激酶，非首要檢測基因。","E":"正確。BRAF(V600E/K)突變決定可否用BRAF＋MEK抑制劑，為最重要檢測。"},"sources":["Harrison 21e, Melanoma—targeted therapy","BRAF V600 + MEK inhibitor combinations","C-KIT in acral/mucosal melanoma"]}},"114-156":{"quick":"黑色素瘤治療正確者：第1~2期首選「廣泛切除手術」(1);轉移性常用免疫治療為T細胞檢查點抑制劑ipilimumab/nivolumab/pembrolizumab(5)。故選E(1)+(5)。","detail":{"background":"皮膚黑色素瘤的治療依分期：(1)「早期(第1~2期，局限性)首選『廣泛局部切除(wide local excision)』」並依厚度決定安全邊界與是否前哨淋巴結切片——正確。(5)「轉移性黑色素瘤的免疫治療為『T細胞免疫檢查點抑制劑』，包括ipilimumab(抗CTLA-4)、nivolumab與pembrolizumab(抗PD-1)」——正確，且免疫治療(尤其抗PD-1±抗CTLA-4)已是轉移性黑色素瘤一線、大幅改善存活。錯誤者：(2)轉移性黑色素瘤「最常用的並非化學治療」——黑色素瘤對傳統化療(dacarbazine)反應差，現以『免疫治療與標靶治療』為主，故(2)錯；(3)轉移性黑色素瘤標靶治療是「BRAF抑制劑＋MEK抑制劑」，與「表皮生長因子受體(EGFR)抑制劑無關」(EGFR非黑色素瘤標靶)，故(3)錯；(4)vemurafenib、dabrafenib是「BRAF抑制劑」，但「trametinib是『MEK』抑制劑」而非BRAF抑制劑，故(4)把trametinib列為BRAF inhibitor錯誤。因此正確為(1)+(5)，選(E)。","options":{"A":"錯誤。含(2)化療為最常用(錯)與(3)EGFR抑制劑(錯)。","B":"錯誤。含(3)EGFR抑制劑之錯誤。","C":"錯誤。含(2)化療最常用與(4)trametinib誤列BRAF抑制劑。","D":"錯誤。含(4)trametinib誤列為BRAF抑制劑(實為MEK抑制劑)。","E":"正確。早期廣泛切除、轉移性用檢查點抑制劑(ipilimumab/nivolumab/pembrolizumab)。"},"sources":["Harrison 21e, Melanoma—management","Wide excision (early); checkpoint inhibitors (metastatic)","BRAF inhibitor (vemurafenib/dabrafenib) + MEK inhibitor (trametinib)"]}},"114-157":{"quick":"老年人慢性日曬部位、珍珠樣結節病灶 → 基底細胞癌(BCC)，致病機轉為「Hedgehog訊息傳遞路徑活化」(PTCH1失活/SMO活化)，選C。","detail":{"background":"本題以臨床圖片考最常見皮膚癌——基底細胞癌(BCC)及其分子機轉。BCC好發於「老年、長期日曬部位(臉、頭頸)」，典型為「珍珠樣光澤結節、邊緣捲起、表面擴張微血管、中央潰瘍(rodent ulcer)」，生長緩慢、極少轉移。其核心致病機轉是「Hedgehog(Hh)訊息傳遞路徑的異常活化」：正常時PTCH1(patched-1)抑制SMO(smoothened)；當PTCH1失活突變(或SMO活化突變)時，Hedgehog路徑「持續活化」，驅動GLI轉錄因子與細胞增生，導致BCC(此路徑亦是遺傳性Gorlin症候群的基礎)。因此晚期/不可手術BCC可用「Hedgehog/SMO抑制劑vismodegib、sonidegib」治療。本題選(C)基底細胞癌＋Hedgehog路徑活化。對照其他選項：A鱗狀細胞癌雖與日曬/p53突變相關但臨床形態不同；B血管肉瘤與SMO無關;D黑色素瘤(BRAF)形態為色素病灶;E梅克爾細胞癌(MCPyV病毒)為快速生長的紫紅色結節，皆與本例珍珠樣BCC不符。","options":{"A":"錯誤。鱗狀細胞癌形態(角化/潰瘍斑塊)與機轉(UV/p53)不同。","B":"錯誤。血管肉瘤與SMO低表現無關，臨床為紫紅色浸潤斑塊。","C":"正確。珍珠樣結節老人日曬部位＝基底細胞癌，機轉為Hedgehog路徑活化。","D":"錯誤。黑色素瘤為色素性病灶、機轉BRAF等，與本例不符。","E":"錯誤。梅克爾細胞癌(MCPyV)為快速生長紫紅結節，非珍珠樣BCC。"},"sources":["Harrison 21e, Basal Cell Carcinoma","Hedgehog pathway (PTCH1/SMO) activation in BCC","Vismodegib/sonidegib (SMO inhibitors)"]}}},TO=["貧血（缺鐵／B12／葉酸／慢性病／海洋性）", "溶血性貧血與骨髓衰竭（PNH／TMA／再生不良／MDS）", "白血病（急性與慢性）", "淋巴瘤、骨髓瘤與骨髓增生性腫瘤", "出血、血小板與凝血疾病", "血栓、抗凝與疫苗相關血栓", "輸血醫學", "腫瘤學總論、腫瘤急症與精準醫療", "抗癌藥物：標靶與免疫治療", "實體腫瘤各論與癌症篩檢", "皮膚癌（黑色素瘤與基底細胞癌）"];

const PKEY='im_heme_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
