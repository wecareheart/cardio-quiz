educt)是衍生自那一腦泡(brain vesicle)?","options":{"A":"菱腦(rhombencephalon)","B":"中腦(mesencephalon)","C":"間腦(diencephalon)","D":"端腦(telencephalon)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_114090-32","q_num":32,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"EM7神經系統與感覺器官發育","stem":"下列何者不是由神經嵴細胞(neural crest cell)衍生而成?","options":{"A":"黑色素細胞(melanocyte)","B":"交感節後神經元(postganglionic sympathetic neuron)","C":"甲狀腺之濾泡細胞(follicular cell of thyroid gland)","D":"腎上腺髓質之嗜鉻細胞(chromaffin cell of adrenal medulla)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med1_114090-36","q_num":36,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"EM7神經系統與感覺器官發育","stem":"神經垂體部(neurohypophysis)是衍生自:","options":{"A":"端腦(telencephalon)","B":"間腦(diencephalon)","C":"中腦(mesencephalon)","D":"髓腦(myelencephalon)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_115020-36","q_num":36,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"EM7神經系統與感覺器官發育","stem":"下列構造與其發育來源的位置配對,何者錯誤?","options":{"A":"橋腦及小腦(pons and cerebellum):後腦(metencephalon)","B":"四疊體(tectum):中腦(mesencephalon)","C":"乳狀體(mammillary body):間腦(diencephalon)","D":"視囊(optic vesicle):髓腦(myelencephalon)"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_108030-33","q_num":33,"roc_year":"108","exam_code":"108030","src":"民國108年","topic":"EM8肌肉骨骼與四肢發育","stem":"胚胎發育第四週時,橫中隔(septum transversum)的位置是相對於下列何種體節(somite)之高度?","options":{"A":"枕節","B":"頸節","C":"胸節","D":"腰節"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_110020-35","q_num":35,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"EM8肌肉骨骼與四肢發育","stem":"下列何者源自體節之生骨節(sclerotome)的間質細胞?","options":{"A":"脊椎骨(vertebra)","B":"髓核(nucleus pulposus)","C":"顱骨(cranium)","D":"四肢骨(appendicular skeleton)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_111020-32","q_num":32,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"EM8肌肉骨骼與四肢發育","stem":"下列何者由軸旁中胚層(paraxial mesoderm)衍生而來?","options":{"A":"脊索(notochord)","B":"體節(somite)","C":"體腔(coelom)","D":"原條(primitive streak)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_111020-36","q_num":36,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"EM8肌肉骨骼與四肢發育","stem":"下列有關四肢(limbs)發育的敘述,何者錯誤?","options":{"A":"肢芽(limb buds)於胚胎第四週末時,開始出現於體壁腹外側","B":"頂外胚層嵴(apical ectodermal ridge)誘導肢芽(limb buds)的生長及發育","C":"下肢芽(lower limb buds)較上肢芽(upper limb buds)晚一或二天發育","D":"發育中的上肢和下肢均以其縱軸朝外側旋轉90度"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_112020-35","q_num":35,"roc_year":"112","exam_code":"112020","src":"民國112年","topic":"EM8肌肉骨骼與四肢發育","stem":"骨骼系統的發育主要來自那兩種構造?1中胚層(mesoderm) 2內胚層(endoderm) 3神經外胚層 (neuroectoderm) 4神經嵴(neural crest)","options":{"A":"12","B":"13","C":"14","D":"24"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med1_113090-35","q_num":35,"roc_year":"113","exam_code":"113090","src":"民國113年","topic":"EM8肌肉骨骼與四肢發育","stem":"下列何者屬於軀幹的軸下肌(hypaxial muscle)?","options":{"A":"豎脊肌(erector spinae)","B":"腹直肌(rectus abdominis)","C":"闊背肌(latissmus dorsi)","D":"棘肌(spinalis)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""}],E={"med1_106100-32":{"quick":"原條(primitive streak)在第三週才出現,為四者中最晚。","detail":{"background":"早期胚胎發育時序:第1週受精→卵裂→桑葚胚→囊胚(blastocyst);第2週「兩層胚盤」形成,出現羊膜腔、卵黃囊、絨毛膜(初級絨毛villus約第2週末)、接合莖,著床完成(第2週「2」的法則);第3週「原腸化(gastrulation)」,背側中線出現「原條(primitive streak)」,細胞內移形成三胚層,並出現脊索與神經板。故四者中原條最晚出現(第3週),羊膜、卵黃囊與初級絨毛皆在第2週已出現。【深入】原條尾端的原結(Hensen結/primitive node)是組織者(organizer),分泌訊號誘導脊索與神經板;原條細胞內移依序形成內、中胚層(上胚層細胞經原條遷移取代下胚層成內胚層,夾層成中胚層)。原條一般於第4週退化消失;若殘留於尾端可發育為「薦尾畸胎瘤(sacrococcygeal teratoma)」—新生兒最常見的生殖細胞腫瘤、女嬰較多。","options":{"A":"羊膜第2週出現。","B":"卵黃囊第2週出現。","C":"初級絨毛第2週末出現。","D":"原條第3週才出現,最晚—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_107100-32":{"quick":"滋養層(trophoblast)由囊胚「外層細胞」衍生,非內細胞團。","detail":{"background":"囊胚分兩部:外圍的「滋養層(trophoblast)」→形成胎盤的絨毛膜(細胞滋養層+合體滋養層);內側的「內細胞團(inner cell mass/embryoblast)」→分化為上胚層(epiblast)與下胚層(hypoblast),進而衍生胚胎本體、羊膜、卵黃囊與接合莖(connecting stalk)。故卵黃囊、羊膜、接合莖皆源自內細胞團,唯「滋養層」源自外層細胞、不屬內細胞團衍生物。【深入】滋養層分兩層:外側合體滋養層(syncytiotrophoblast,侵入子宮內膜、分泌hCG維持黃體、構成胎盤屏障與內分泌)、內側細胞滋養層(cytotrophoblast,幹細胞)。滋養層異常增生與「葡萄胎(hydatidiform mole)」、「絨毛膜癌(choriocarcinoma)」相關(hCG異常升高為腫瘤標記)。內細胞團則分上胚層(→羊膜、胚胎三胚層)與下胚層(→卵黃囊、初級卵黃囊)。","options":{"A":"滋養層由外層細胞衍生,非內細胞團—正解。","B":"卵黃囊由內細胞團(下胚層)衍生。","C":"接合莖由內細胞團(胚外中胚層)衍生。","D":"羊膜由內細胞團(上胚層)衍生。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_108100-32":{"quick":"第一次減數分裂完成時產生次級精母細胞(secondary spermatocyte)。","detail":{"background":"精子生成(spermatogenesis):精原細胞(2n,有絲分裂)→初級精母細胞(primary spermatocyte, 4n DNA, 行減數分裂I)→「第一次減數分裂完成」產生兩個「次級精母細胞(secondary spermatocyte, 2 DNA→n染色體)」→減數分裂II→四個精細胞(spermatid, n)→變態為精子。故減數I完成時的產物為次級精母細胞。減數I是同源染色體分離(染色體數減半),減數II是姊妹染色分體分離。【深入】減數I是「同源染色體分離(染色體數2n→n)」、減數II是「姊妹染色分體分離」。減數分裂「不分離(nondisjunction)」會造成三體(如唐氏症21三體、Klinefelter 47,XXY)或單體(Turner 45,X)。男性精子生成全程約64–74天且青春期後持續進行;女性初級卵母細胞自胎兒期即停滯於減數I前期(dictyotene),至排卵才完成—故高齡產婦卵子不分離風險上升。","options":{"A":"精原細胞為有絲分裂的幹細胞。","B":"初級精母細胞進行減數I,尚未完成。","C":"減數I完成產生次級精母細胞—正解。","D":"精細胞為減數II完成後的產物。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109100-32":{"quick":"胎動(quickening)約在懷孕17–20週開始明顯感受。","detail":{"background":"胎動(quickening)是孕婦首次明顯感受胎兒活動,初產婦約在「妊娠17–20週」、經產婦可能稍早(約16週)感受到。這是評估妊娠週數與胎兒活力的臨床指標之一。對照其他發育里程碑:胎兒期(第9週起)、胎兒可存活界線約22–24週(肺發育至小管期末/囊期)。故胎動約17–20週。【深入】發育分期:受精至第8週為「胚胎期(器官生成、致畸最敏感)」,第9週起為「胎兒期(成長與成熟)」。胎動(quickening)初產婦約17–20週、經產婦約16週。胎兒「可存活界線(viability)」約22–24週(肺發育進入小管期末/囊期、表面張力素開始);故產科週數評估(末次月經、超音波、胎動)對處置(安胎、引產時機)至關重要。","options":{"A":"7–10週過早(胚胎尚小)。","B":"11–14週仍過早。","C":"17–20週開始明顯感受胎動—正解。","D":"22–25週通常已明顯,非「開始」。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113020-32":{"quick":"胚內體腔最早出現於外側(側板)中胚層。","detail":{"background":"第3週三胚層形成後,中胚層由內而外分為:軸旁中胚層(paraxial,→體節)、中間中胚層(intermediate,→泌尿生殖)、「外側(側板)中胚層(lateral plate mesoderm)」。外側中胚層內出現裂隙並融合形成「胚內體腔(intraembryonic coelom)」,並把側板分為臟層(splanchnic,貼內胚層)與體壁層(somatic,貼外胚層);胚內體腔日後發育成心包腔、胸膜腔與腹膜腔。故胚內體腔最早出現於外側中胚層。【深入】側板中胚層因胚內體腔的出現而分為「體壁層(somatic/parietal,貼外胚層→體壁、肢芽、漿膜壁層)」與「臟層(splanchnic/visceral,貼內胚層→腸壁平滑肌、漿膜臟層、心臟)」。胚內體腔起初為單一馬蹄形腔,日後經橫中隔與胸膜心包膜的分隔,形成心包腔、左右胸膜腔與腹膜腔。體腔分隔失敗→先天性橫膈疝氣。","options":{"A":"軸旁中胚層形成體節,非體腔起源。","B":"中間中胚層形成泌尿生殖系統。","C":"外側(側板)中胚層內最早出現胚內體腔—正解。","D":"內胚層形成消化道內襯,非體腔。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113090-32":{"quick":"咽弓在第4週才出現,第3週(第15–21天)尚未出現。","detail":{"background":"第3週(第15–21天)的關鍵事件:原腸化(gastrulation,形成三胚層的gastrula)、原條與脊索(notochord)出現、神經板與「神經溝(neural groove)」形成(神經胚開始)、體節開始出現、心血管系統開始發生。而「咽弓(pharyngeal arch)」要到「第4週」頭頸部發育時才出現。故第3週不會出現者為咽弓。【深入】第三週是器官生成前的關鍵,亦為「致畸高度敏感期」之始。原腸化分子由原結分泌(如nodal、SHH)誘導;脊索誘導其上方外胚層增厚成神經板(neural plate)→神經溝→第四週神經管閉合(頭側神經孔第25天、尾側第27–28天閉合)。神經管缺損(無腦症、脊柱裂)與葉酸不足相關,故孕前即應補充葉酸。咽弓要第四週才出現。","options":{"A":"原腸胚第3週出現。","B":"脊索第3週出現。","C":"神經溝第3週出現。","D":"咽弓第4週才出現,第3週不會—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114020-32":{"quick":"著床出血約在受精後一週、即真正末次月經後約三週;誤當月經會使預產期估算偏晚,真正預產期應提早約兩週。","detail":{"background":"預產期(EDD)以Naegele法則由「末次月經(LMP)第一天」推算(LMP+280天)。著床出血發生於受精後約6–12天,約在「真正LMP之後三週」。若孕婦把這次著床出血誤當作月經(LMP),則其推算的起點比真正LMP「晚了約兩週」(著床出血≈真LMP+3週,但被當成新的月經週期起點,相對排卵/受精僅差約一週前;就月經起算而言約晚兩週),導致她算出的預產期(7月1日)比真正預產期「晚」,故正確預產期應「提早約兩週」。【深入】Naegele法則:預產期=末次月經(LMP)第一天+1年−3個月+7天(≈+280天/40週)。著床出血約在受精後6–12天(≈真LMP後3週)。臨床上若月經史不準,以「早期超音波(尤其第一孕期頭臀長CRL)」校正週數最準確。週數誤判會影響唐氏症篩檢時機、安胎與引產決策。","options":{"A":"早一週與時序不符。","B":"晚一週方向相反。","C":"晚兩週方向相反。","D":"真正預產期比其估算早約兩週—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_115020-32":{"quick":"動情素(estrogen)在排卵前與排卵後各出現一次高峰(雙峰)。","detail":{"background":"月經週期的激素變化:濾泡期由發育中濾泡分泌「動情素(estrogen)」,於排卵「前」達第一個高峰(此高峰經正回饋觸發LH surge而排卵);排卵後黃體持續分泌動情素與黃體酮,使動情素出現「第二個(較低)高峰」於黃體中期。故動情素在排卵前後各有一次高峰(雙峰)。LH與FSH主要在排卵前surge一次;黃體酮主要在排卵「後」黃體期升高(單峰)。故為動情素。【深入】月經週期激素軸:濾泡期雌激素緩升,達閾值並持續48小時以上時對下視丘-腦下垂體產生「正回饋」,觸發LH大量分泌(LH surge)而排卵;排卵後黃體分泌雌激素(第二峰)與黃體酮,黃體酮使子宮內膜進入分泌期、體溫上升。若未受孕黃體退化、激素下降而月經來潮;若受孕則hCG維持黃體。雌激素雙峰(濾泡晚期高峰+黃體中期次峰)為其特徵。","options":{"A":"FSH主要排卵前surge一次。","B":"LH主要排卵前surge一次。","C":"動情素排卵前後各一次高峰—正解。","D":"黃體酮主要在排卵後黃體期升高(單峰)。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_115020-33":{"quick":"囊胚(blastocyst)時期會突破透明帶而孵化(hatching),準備著床。","detail":{"background":"受精後的卵裂在「透明帶(zona pellucida)」內進行:受精卵→2/4/8細胞→桑葚胚(morula,約第3天)→囊胚(blastocyst,約第4–5天,出現囊胚腔與內細胞團)。囊胚進入子宮腔後,約第5–6天「突破透明帶孵化(hatching)」,使滋養層得以直接接觸子宮內膜而著床。透明帶在此之前限制囊胚體積、防止輸卵管內過早著床(異位妊娠)。故孵化時期為囊胚。【深入】卵裂在透明帶內進行(防輸卵管內過早著床);囊胚於第5–6天突破透明帶「孵化(hatching)」,滋養層接觸子宮內膜後著床。著床多在第6–7天、子宮體後上壁,需「著床窗口(implantation window)」之子宮內膜容受性(progesterone調控)。著床位置異常→前置胎盤(子宮下段)或子宮外孕(輸卵管最常見)。","options":{"A":"受精卵仍在透明帶內。","B":"八細胞時期仍在透明帶內。","C":"桑葚胚仍在透明帶內。","D":"囊胚突破透明帶孵化—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_115020-34":{"quick":"性染色體三倍症(如Klinefelter, 47,XXY)常於青春期才因性徵/不孕被發現。","detail":{"background":"染色體數目異常辨正:(A)母親年齡「會」增加21三體(唐氏症)發生率(高齡產婦風險上升),敘述錯誤;(B)「性染色體三倍症(如47,XXY Klinefelter)」症狀較輕,常到「青春期」因第二性徵發育不全、男性女乳或不孕才被發現—正確;(C)透納氏症(Turner)為45,X,是「女性」、性腺與第二性徵發育不良(非男性),敘述錯誤;(D)染色體四倍體等嚴重異常多致早期流產,難足月,敘述錯誤。故正確者為B。【深入】各染色體數目異常核型與臨床:唐氏症(Down, 47,+21,母齡風險上升、智能障礙、心臟缺損、單一掌橫紋);愛德華氏症(Edwards, 47,+18);巴陶氏症(Patau, 47,+13);Klinefelter(47,XXY,男性、青春期才現睪丸小/不孕/男性女乳);Turner(45,X,女性、矮小、蹼頸、性腺發育不良)。多由減數不分離造成;嚴重者(三體大多、四倍體)多自然流產。","options":{"A":"孕婦年齡會影響21三體發生率,敘述錯誤。","B":"性染色體三倍症常於青春期才發現—正確,為正解。","C":"透納氏症為45,X女性、發育不良,敘述錯誤。","D":"四倍體胎兒多早期流產,難足月,敘述錯誤。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_115020-35":{"quick":"豎毛肌是平滑肌、源自中胚層,非外胚層。","detail":{"background":"皮膚的胚層來源:「表皮(epidermis)及其附屬器」—毛髮、指甲、皮脂腺、汗腺、乳腺—皆由「外胚層(表面外胚層)」衍生;而「真皮」與皮膚的「豎毛肌(arrector pili muscle,平滑肌)」則由「中胚層(真皮源自中胚層/部分神經嵴)」衍生。故來源不是外胚層者為豎毛肌。黑色素細胞則來自神經嵴。【深入】皮膚胚層來源:表皮與附屬器(毛髮、指甲、皮脂腺、汗腺、乳腺)源自「表面外胚層」;真皮源自中胚層(軀幹來自皮節dermatome、四肢來自側板中胚層、頭面部分來自神經嵴);「豎毛肌(平滑肌)」源自中胚層;表皮的黑色素細胞、Merkel細胞與周邊神經則源自「神經嵴」。外胚層發育不良(ectodermal dysplasia)會影響毛髮汗腺牙齒。","options":{"A":"皮脂腺由外胚層衍生。","B":"汗腺由外胚層衍生。","C":"頭髮由外胚層衍生。","D":"豎毛肌為平滑肌、源自中胚層,非外胚層—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_106100-33":{"quick":"第一咽囊向外延伸形成耳咽管與中耳腔,並非與第二咽囊連通。","detail":{"background":"耳的發育與第一咽器有關:第一「咽溝(groove,外胚層)」→外耳道;第一「咽膜」(外胚層+內胚層+間葉三層)→鼓膜;第一「咽囊(pouch,內胚層)」→管鼓隱窩(tubotympanic recess)→中耳鼓室與「耳咽管(auditory tube)」,耳咽管向內開口於「鼻咽」。故第一咽囊本身延伸形成耳咽管與中耳,並非「向下與第二咽囊連通」而成—D敘述錯誤。內耳(膜迷路)則源自外胚層的聽板(otic placode)。【深入】咽器(pharyngeal apparatus)由咽弓(中胚層+神經嵴,外覆外胚層、內襯內胚層)、咽囊(內胚層)、咽溝(外胚層)與咽膜組成。咽囊衍生:第一→管鼓隱窩(中耳/耳咽管);第二→腭扁桃;第三→下副甲狀腺+胸腺;第四→上副甲狀腺+鰓後體(C細胞)。咽囊衍生異常→DiGeorge症候群(第三、四咽囊發育不良→胸腺/副甲狀腺缺如)。","options":{"A":"外耳道源自第一咽溝,正確。","B":"鼓膜由第一咽膜(三層)構成,正確。","C":"鼓室源自第一咽囊,正確。","D":"稱第一咽囊向下與第二咽囊連通成耳咽管—錯誤,為正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109020-33":{"quick":"第一咽溝持續存在並衍生形成外聽道。","detail":{"background":"胚胎頸部外側有四對咽溝(pharyngeal groove,外胚層覆蓋)。其中「第一咽溝」持續存在,內陷形成「外聽道(external acoustic meatus)」;其底與第一咽膜(鼓膜)相接。第二、三、四咽溝則被第二咽弓向下增生覆蓋,共同圍成暫時的「頸竇(cervical sinus)」並隨後消失;頸竇殘留可形成頸側囊腫/瘻管。故持續存在並形成外聽道者為第一咽溝。【深入】四對咽溝中僅「第一咽溝」持續存在形成外聽道;第二咽弓向尾側過度增生覆蓋第二、三、四咽溝,圍成暫時的「頸竇(cervical sinus)」後消失。頸竇或第二咽裂殘留→「頸側囊腫/瘻管(branchial cyst/fistula)」,位於胸鎖乳突肌前緣,為兒童頸部側方腫塊常見原因。內耳膜迷路則另由外胚層「聽板(otic placode)」內陷成聽泡發育。","options":{"A":"第一咽溝持續存在、形成外聽道—正解。","B":"第二咽溝被覆蓋消失(頸竇)。","C":"第三咽溝被覆蓋消失。","D":"第四咽溝被覆蓋消失。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109020-36":{"quick":"臟顱(顏面骨骼)並非大腦的主要保護結構;保護腦者為神經顱。","detail":{"background":"顱骨(cranium)由腦周圍間質發育,分兩部:「神經顱(neurocranium)」包圍並保護腦—含膜性神經顱(顱頂扁平骨,膜內骨化)與軟骨性神經顱(顱底,由多塊軟骨癒合、軟骨內骨化);「臟顱(viscerocranium)」即顏面骨骼,其軟骨性部分由第一、二咽弓軟骨衍生。故「臟顱是大腦主要保護結構」錯誤(保護腦者為神經顱,臟顱構成顏面)。【深入】顱骨分膜內骨化(顱頂扁平骨、面骨大部—間質直接骨化,出生時留囟門便於產道塑形與腦生長)與軟骨內骨化(顱底—先成軟骨再骨化)。神經顱保護腦;臟顱(顏面骨)由第一、二咽弓軟骨(Meckel/Reichert)與膜性骨衍生。顱縫早閉(craniosynostosis)致頭型異常;軟骨發育不全影響顱底。","options":{"A":"起源於腦周圍間質,正確。","B":"部分神經顱(顱底)由多塊軟骨癒合,正確。","C":"稱臟顱是大腦主要保護結構—錯誤(應為神經顱),為正解。","D":"第一、二咽弓參與軟骨性臟顱,正確。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109100-36":{"quick":"神經外胚層不參與鼓膜形成;鼓膜由咽膜三層(外胚層+內胚層+間葉)構成。","detail":{"background":"鼓膜(tympanic membrane)由第一咽膜發育,含三層:外層=「第一咽溝的外胚層」、內層=「第一咽囊的內胚層」、中層=「第一與第二咽弓之間的間葉組織」。神經外胚層(neuroectoderm)發育為神經系統(腦、脊髓、神經嵴),不參與鼓膜形成。故不參與者為神經外胚層。【深入】鼓膜三層對應第一咽膜:外胚層(第一咽溝)、間葉(第一二咽弓,含血管神經)、內胚層(第一咽囊)。神經外胚層(neuroectoderm)衍生中樞與周邊神經系統、神經嵴(顏面間葉、黑色素細胞、神經節、腎上腺髓質等),不參與鼓膜。第一咽囊內胚層續成中耳黏膜與耳咽管;中耳積液(otitis media)即與耳咽管功能不良相關。","options":{"A":"第一二咽弓間葉組織為鼓膜中層,參與。","B":"第一咽囊內胚層為鼓膜內層,參與。","C":"神經外胚層不參與鼓膜形成—正解。","D":"第一咽溝外胚層為鼓膜外層,參與。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_110020-34":{"quick":"升主動脈源自動脈幹/主動脈囊,非咽弓(主動脈弓)動脈衍生。","detail":{"background":"咽弓(主動脈弓)動脈的衍生:第3弓→頸總動脈與頸內動脈近段(故左頸總動脈源自第3弓);第4弓→左側成主動脈弓、右側成右鎖骨下動脈近段;第6弓→肺動脈,左側並保留為動脈導管。而「升主動脈(ascending aorta)」與肺動脈幹則由「動脈幹(truncus arteriosus)」分隔、加上主動脈囊發育而來,並非咽弓動脈衍生。故不源自咽弓者為升主動脈。【深入】六對咽弓(主動脈)動脈的命運:第1、2弓大多退化;第3弓→頸總動脈+頸內動脈近段;第4弓→左成主動脈弓、右成右鎖骨下動脈近段;第5弓退化;第6弓→肺動脈、左側保留為動脈導管。升主動脈與肺動脈幹由動脈幹經主動脈肺動脈中隔(神經嵴參與)螺旋分隔而成。中隔分隔異常→法洛氏四重症、大血管轉位、永存動脈幹。","options":{"A":"動脈導管源自第六弓動脈。","B":"主動脈弓源自第四弓動脈。","C":"左頸總動脈源自第三弓動脈。","D":"升主動脈源自動脈幹/主動脈囊,非咽弓—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_111100-36":{"quick":"第二咽溝外胚層不參與鼓膜發育(鼓膜用第一咽溝外胚層)。","detail":{"background":"鼓膜三層:外胚層來自「第一咽溝」、內胚層來自「第一咽囊」、中間間葉來自「第一與第二咽弓」。第二咽溝(及第三、四)被第二咽弓覆蓋形成頸竇後消失,不參與鼓膜。故不包含於鼓膜發育者為「第二咽溝的外胚層」。【深入】鼓膜由第一咽膜發育(外:第一咽溝外胚層;中:第一二咽弓間葉;內:第一咽囊內胚層)。第二咽溝(及三、四)被第二咽弓覆蓋成頸竇後消失,不參與鼓膜。鼓膜的感覺神經反映其來源:外面由V3耳顳神經與迷走耳支、內面由舌咽神經鼓室支—與咽弓/咽囊神經支配一致。","options":{"A":"第一咽溝外胚層為鼓膜外層,參與。","B":"第二咽溝外胚層不參與鼓膜—正解。","C":"第一咽囊內胚層為鼓膜內層,參與。","D":"第一二咽弓間葉為鼓膜中層,參與。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_112020-33":{"quick":"舌的咽部(後1/3)源自咽下隆起(hypopharyngeal eminence,主要第三咽弓)。","detail":{"background":"舌的胚胎來源以「界溝/盲孔」為界:舌「前2/3(口部)」由第一咽弓的兩個外側舌膨大與一個中央舌芽(median tongue bud/tuberculum impar)發育(故一般感覺由V3);舌「後1/3(咽部)」由「咽下隆起(hypopharyngeal eminence/copula)」發育,主要來自第三咽弓(覆蓋第二弓),故一般感覺與味覺由IX。盲孔(foramen cecum)是甲狀腺下降的起點標誌。故舌咽部源自咽下隆起。【深入】舌以界溝(盲孔)分前後:前2/3由第一弓的外側舌膨大(lateral lingual swellings)與中央舌芽(tuberculum impar)發育→一般感覺V3、味覺鼓索VII;後1/3由「咽下隆起(hypopharyngeal eminence,第三弓為主覆蓋第二弓copula)」發育→一般感覺與味覺皆IX;最後部(會厭附近)由第四弓→迷走X。舌肌則源自枕體節肌母細胞(舌下神經XII)。盲孔是甲狀腺自此下降的起點。","options":{"A":"遠端/外側舌芽形成舌前2/3。","B":"中央舌芽屬舌前2/3。","C":"盲孔為甲狀腺下降起點,非舌咽部來源。","D":"咽下隆起(第三弓為主)形成舌咽部—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113020-33":{"quick":"第二咽弓衍生的肌肉由顏面神經(CN VII)支配。","detail":{"background":"咽弓的「弓-神經」對應(運動):第一弓→三叉神經(V3,咀嚼肌等);「第二弓→顏面神經(VII,表情肌、鐙骨肌、莖突舌骨肌、二腹肌後腹)」;第三弓→舌咽神經(IX,莖突咽肌);第四/六弓→迷走神經(X,咽喉肌)。故第二咽弓肌肉由顏面神經支配。【深入】咽弓神經支配的「鰓弓神經」邏輯:第1弓三叉V(咀嚼肌等)、第2弓顏面VII(表情肌、鐙骨肌、莖突舌骨肌、二腹肌後腹)、第3弓舌咽IX(莖突咽肌)、第4/6弓迷走X(咽喉肌)。每弓含自己的軟骨、肌肉、動脈與神經。故第二弓肌肉→顏面神經;顏面神經麻痺即第二弓衍生肌(表情肌)全癱,並可因鐙骨肌癱出現聽覺過敏。","options":{"A":"三叉神經支配第一弓肌肉。","B":"顏面神經支配第二弓肌肉—正解。","C":"舌咽神經支配第三弓肌肉。","D":"副神經併入迷走支配部分咽喉,非第二弓主神經。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113090-36":{"quick":"砧骨(與鎚骨)源自第一咽弓(Meckel軟骨)。","detail":{"background":"聽小骨的咽弓來源:「鎚骨(malleus)與砧骨(incus)源自第一咽弓的Meckel軟骨」;「鐙骨(stapes)源自第二咽弓的Reichert軟骨」。故砧骨源自第一咽弓。對應神經:鼓膜張肌(第一弓,V3)、鐙骨肌(第二弓,VII)。【深入】聽小骨咽弓來源:第一弓Meckel軟骨→鎚骨、砧骨(及下頜模板、蝶下頜韌帶);第二弓Reichert軟骨→鐙骨、莖突、莖突舌骨韌帶、舌骨小角與上半。對應中耳肌與神經:鼓膜張肌(第一弓,V3)、鐙骨肌(第二弓,VII)。聽小骨於中耳腔內由內胚層上皮包覆;先天聽小骨畸形可致傳導性聽損。","options":{"A":"砧骨源自第一咽弓(Meckel軟骨)—正解。","B":"第二咽弓衍生鐙骨。","C":"第三咽弓不衍生聽小骨。","D":"第四咽弓不衍生聽小骨。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114020-36":{"quick":"嚼肌(咀嚼肌)源自第一咽弓。","detail":{"background":"第一咽弓(Meckel軟骨)的肌肉衍生物為「咀嚼肌(咬肌masseter、顳肌、內外翼肌)、二腹肌前腹、下頜舌骨肌、鼓膜張肌、腭帆張肌」,皆由三叉神經(V3)支配。故咬肌源自第一咽弓。第二弓→表情肌(VII);第三弓→莖突咽肌(IX);第四/六弓→咽喉肌(X)。【深入】第一咽弓肌肉衍生(皆三叉V3支配):咀嚼肌(咬肌、顳肌、內外翼肌)、二腹肌前腹、下頜舌骨肌、鼓膜張肌、腭帆張肌。第一弓骨骼(Meckel軟骨)→鎚骨、砧骨;膜性骨→上下頜骨、顴骨、顳骨鱗部。第一弓發育異常→Treacher Collins症候群(顴骨、下頜發育不全)、第一弓症候群。","options":{"A":"咬肌源自第一咽弓—正解。","B":"第二弓衍生表情肌。","C":"第三弓衍生莖突咽肌。","D":"第四六弓衍生咽喉肌。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114090-33":{"quick":"第二咽弓形成聯合部(copula),後被第三弓擠壓而消失。","detail":{"background":"舌的發育中,「第二咽弓」在中線形成「聯合部(copula)」,但隨後被「第三咽弓(咽下隆起)」由後向前覆蓋擠壓而「消失」,故成人舌後1/3的黏膜主要由第三弓衍生(感覺由IX)。第一弓形成舌前2/3;第四弓參與會厭與最後部。故形成copula且最終消失者為第二咽弓。【深入】舌黏膜的咽弓貢獻:第一弓→舌前2/3;第二弓在中線形成「聯合部(copula)」但被第三弓(咽下隆起)由後向前覆蓋擠壓而消失,故成人舌後1/3黏膜主要第三弓衍生(IX);第四弓→會厭區(X)。此覆蓋過程解釋了「舌後1/3一般感覺與味覺皆由IX」而非第二弓的顏面神經;甲狀舌管殘留(沿盲孔下降路徑)可致甲狀舌管囊腫。","options":{"A":"第一咽弓形成舌前2/3。","B":"第二咽弓形成聯合部、後被擠壓消失—正解。","C":"第三咽弓覆蓋形成舌後1/3。","D":"第四咽弓參與會厭區。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_108030-35":{"quick":"動脈韌帶是動脈導管閉鎖後的纖維殘跡,連於主動脈弓與肺動脈幹之間。","detail":{"background":"動脈導管(ductus arteriosus)源自胚胎「左側第六咽弓動脈」的背側部,在胎兒期連接「肺動脈幹(分叉處/左肺動脈起點)」與「主動脈弓」(左鎖骨下動脈遠端),使右心室射出的血大部分繞過尚未通氣的肺、經導管進入降主動脈—故其攜帶的是含氧量中等的「混合血」(非純缺氧血)。出生後肺擴張、血氧上升使前列腺素(PGE2)下降、導管平滑肌收縮而功能性關閉(數小時),數週後纖維化成「動脈韌帶(ligamentum arteriosum)」;左喉返神經即繞行其下。臨床:早產兒因PGE2較高常見「開放性動脈導管(PDA)」,可用前列腺素抑制劑(indomethacin/ibuprofen)促關閉,或以PGE1維持其開放(用於需依賴導管供血的發紺型先心如大血管轉位)。故A正確;B(臍動脈)、C(只攜缺氧血)、D(連肺動脈與肺靜脈)皆錯。","options":{"A":"位於主動脈弓與肺動脈幹間—正解。","B":"臍動脈閉鎖成臍內側韌帶,非動脈韌帶。","C":"胎兒期導管攜混合血(含氧中等),非只缺氧血。","D":"連肺動脈與肺靜脈為錯誤描述。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109100-35":{"quick":"臍靜脈攜帶來自胎盤的含氧血,是胎兒循環中含氧量最高的血管。","detail":{"background":"胎兒循環的氧合特性與三大分流:含氧血由胎盤經「臍靜脈(umbilical vein)」回胎兒(含氧量最高,約80% SaO2),經(1)「靜脈導管(ductus venosus)」繞過肝竇直入下腔靜脈;血入右心房後經(2)「卵圓孔(foramen ovale)」優先導向左心房→左心室→升主動脈,優先供應冠狀動脈與腦(較高含氧血);右心室血則經肺動脈、(3)「動脈導管」繞過肺入降主動脈(較低含氧)。缺氧血最後由兩條「臍動脈」送回胎盤(含氧量最低)。故臍靜脈含氧量最高、臍動脈最低—與成人「動脈含氧高」相反,為高頻考點。","options":{"A":"主動脈為混合血(經動脈導管摻入較低氧血)。","B":"臍動脈含氧量最低(送回胎盤)。","C":"臍靜脈含氧量最高(自胎盤回胎兒)—正解。","D":"胎兒期肺未通氣,肺靜脈血量少且含氧不高。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_111020-35":{"quick":"動脈導管源自左側第六咽弓(動脈)的背側部。","detail":{"background":"六對咽弓(主動脈)動脈的命運是高頻考點:第1、2弓大多退化(殘留上頜/鐙骨動脈);第3弓→頸總動脈與頸內動脈近段;第4弓→左側成主動脈弓、右側成右鎖骨下動脈近段;第5弓不發育或退化;「第6弓→肺動脈,其『左側』背側部保留為動脈導管」。故動脈導管源自左側第六弓。發育中神經嵴細胞參與動脈幹與弓動脈的塑形,異常可致主動脈弓畸形(如右位主動脈弓、血管環、主動脈窄縮)。出生後第6弓動脈導管閉鎖成動脈韌帶。","options":{"A":"動脈導管源自左側第六弓—正解。","B":"第五弓不發育/退化。","C":"右側第五弓不形成動脈導管。","D":"左側第四弓形成主動脈弓。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_111100-35":{"quick":"第一孔由第一中隔下緣與心內膜墊融合而封閉。","detail":{"background":"心房中隔的發育(雙中隔機制):先由心房頂長出「第一中隔(septum primum)」向心內膜墊生長,其與心內膜墊之間的開口為「第一孔(foramen primum)」;第一孔「由第一中隔下緣與心內膜墊融合而封閉」。封閉前第一中隔上部細胞凋亡形成「第二孔(foramen secundum)」以維持右→左分流;其右側再長出較厚的「第二中隔(septum secundum)」部分覆蓋第二孔,留下「卵圓孔(foramen ovale)」,第一中隔則成為其活瓣。出生後左房壓上升將活瓣壓閉成卵圓窩。發育異常→心房中隔缺損(ASD);第一孔型ASD常合併心內膜墊缺損(房室中隔缺損,見於唐氏症)。","options":{"A":"第一孔由第一中隔與心內膜墊融合封閉—正解。","B":"第二中隔較晚出現,非封第一孔者。","C":"第一孔封閉靠融合而非細胞增生。","D":"第一與第二中隔融合是出生後卵圓孔關閉,非封第一孔。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113020-35":{"quick":"出生後肺擴張使肺血管阻力下降、肺血流量上升。","detail":{"background":"出生時循環的轉變:胎兒肺未通氣、肺血管阻力高,血液靠卵圓孔與動脈導管繞過肺。出生後第一口呼吸使肺泡擴張、氧分壓上升→「肺血管阻力顯著『下降』、肺血流量『上升』」(故B正確);肺動脈管壁(原較厚以承受高阻力)隨後逐漸「變薄」;左心房回血量增加使「左房壓上升並超過右房壓」,將卵圓孔活瓣壓閉(功能性關閉);血氧上升與PGE2下降使動脈導管收縮關閉;臍血管結紮使靜脈導管亦關閉。這些變化讓肺循環與體循環由「並聯(分流)」轉為「串聯」。故A(阻力增加)、C(管壁變厚)、D(右房壓高於左房)皆與出生後實況相反。","options":{"A":"出生後肺血管阻力下降(非增加)。","B":"出生後肺血流量上升—正解。","C":"肺動脈管壁出生後變薄(非變厚)。","D":"出生後左房壓高於右房(卵圓孔關閉)。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113090-34":{"quick":"下腔靜脈的肝臟段主要由卵黃靜脈(vitelline vein)發育而來。","detail":{"background":"下腔靜脈(IVC)的發育是「多段拼接」的複雜過程,由三套胚胎靜脈(卵黃靜脈vitelline、主靜脈cardinal、下/上主靜脈subcardinal/supracardinal)的不同段落整合而成:肝段(hepatic portion,含肝靜脈段)主要源自「右卵黃靜脈」(卵黃靜脈也形成肝竇、門靜脈);腎前段源自右下主靜脈;腎段源自下主-上主靜脈吻合;腎後段源自右上主靜脈。發育拼接異常可致IVC變異(如左位IVC、雙IVC、IVC肝段缺如併奇靜脈延續—常合併內臟異位)。故肝段主要由卵黃靜脈來。","options":{"A":"下腔靜脈肝段主要由卵黃靜脈發育—正解。","B":"臍靜脈退化(左臍靜脈成肝圓韌帶、靜脈導管成靜脈韌帶)。","C":"下主靜脈形成IVC腎段等,非肝段主源。","D":"上主靜脈形成IVC腎後段與奇靜脈。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114020-35":{"quick":"奇靜脈根部源自(右)後主靜脈。","detail":{"background":"軀幹靜脈的胚胎來源:最早為成對的前主靜脈(anterior cardinal,引流頭部)、後主靜脈(posterior cardinal,引流軀幹下部)與總主靜脈(common cardinal,匯入靜脈竇);其後出現下主靜脈(subcardinal,腎/性腺)與上主靜脈(supracardinal,體壁)。「奇靜脈系統」由上主靜脈與『後主靜脈』整合而成—「奇靜脈『根部』源自右後主靜脈」(其上段),其餘體幹段由右上主靜脈。前主靜脈則演變為內頸靜脈與上腔靜脈上段(經左右前主靜脈間吻合成左頭臂靜脈)。故奇靜脈根部=後主靜脈。","options":{"A":"奇靜脈根部源自(右)後主靜脈—正解。","B":"總主靜脈形成上腔靜脈下段/靜脈竇角。","C":"前主靜脈形成內頸靜脈/上腔靜脈上段。","D":"下主靜脈形成IVC腎段與腎/性腺靜脈。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114090-35":{"quick":"內側臍韌帶是閉鎖的臍動脈遺跡。","detail":{"background":"胎兒循環構造出生後的退化殘跡(高頻考點):臍「動脈」(送缺氧血回胎盤,成對)→閉鎖成「臍內側韌帶(medial umbilical ligament)」(其近段保留為膀胱上動脈);臍「靜脈」→肝圓韌帶(ligamentum teres);靜脈導管→靜脈韌帶(ligamentum venosum);動脈導管→動脈韌帶;卵圓孔→卵圓窩;臍尿管(urachus)→臍正中韌帶(median umbilical ligament,單一)。注意「內側(medial)」對應臍動脈(成對)、「正中(median)」對應臍尿管(單一),命名易混。門脈高壓時臍靜脈可再通致臍周靜脈曲張(caput medusae)。","options":{"A":"內側臍韌帶為臍動脈遺跡—正解。","B":"臍靜脈遺跡為肝圓韌帶。","C":"靜脈導管遺跡為靜脈韌帶。","D":"動脈導管遺跡為動脈韌帶。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_107100-33":{"quick":"胸腹膜(pleuroperitoneal membrane)早期占橫膈大部,新生兒時僅占小部分。","detail":{"background":"橫膈由四個胚胎成分癒合而成:(1)「橫中隔(septum transversum)」→中央腱;(2)成對的「胸腹膜(pleuroperitoneal membrane)」→關閉胸腹腔通道,「早期占橫膈大部分,但隨體壁肌肉長入而在新生兒只占很小部分」;(3)「食道背繫膜(dorsal mesentery of esophagus)」→兩側膈腳(crura);(4)由體壁長入的「肌肉(來自頸體節C3–5,故膈神經C3–5支配)」→周邊肌部。橫膈發育於第4–12週、自頸部下降。臨床:左側胸腹膜閉鎖最晚、最易缺損→「先天性橫膈疝氣(Bochdalek疝,後外側,左側多)」,腹臟疝入胸腔壓迫肺致肺發育不全。故早期占大部、新生兒占小部者為胸腹膜。","options":{"A":"胸腹膜早期占大部、新生兒占小部—正解。","B":"橫中隔形成中央腱(始終為中央部)。","C":"食道繫膜形成膈腳(小部分)。","D":"原始縱隔非橫膈組成成分。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_107100-34":{"quick":"氣管食道瘻管(TEF)是下呼吸道最常見的先天異常。","detail":{"background":"呼吸系統發育始於第4週前腸腹側「喉氣管溝/呼吸憩室(respiratory diverticulum)」,由「氣管食道中隔」將其與食道分隔。若中隔分隔不全→「氣管食道瘻管(tracheoesophageal fistula, TEF)」,是下呼吸道「最常見」的先天異常,>90%合併「食道閉鎖(esophageal atresia)」,最常見型為「近端食道盲端+遠端食道與氣管相通」。臨床:新生兒餵食嗆咳發紺、口水多、胃管無法下達、可合併羊水過多與「VACTERL」聯合畸形(脊椎/肛門/心臟/氣管食道/腎/肢體)。喉閉鎖、喉氣管食道裂、氣管狹窄皆罕見。","options":{"A":"喉閉鎖罕見。","B":"氣管食道瘻管為下呼吸道最常見先天異常—正解。","C":"喉氣管食道裂罕見。","D":"氣管狹窄罕見。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_108100-33":{"quick":"胸心包膜(pleuropericardial membrane)分隔胸膜腔與心包腔,與橫膈組成無關。","detail":{"background":"橫膈的四個胚胎組成:橫中隔(中央腱)、成對胸腹膜(關閉胸腹通道)、食道背繫膜(兩側膈腳)、體壁來源肌肉(周邊肌部)。而「胸心包膜(pleuropericardial membrane)」是把『胸膜腔與心包腔』分隔開、並參與形成纖維心包與漿膜心包壁層的膜(內含總主靜脈與膈神經),屬「胸腔內的分隔」,與橫膈(分隔胸腹腔)的組成無關。故與橫膈組成無關者為胸心包膜。此處易混:pleuro『pericardial』膜=分隔胸膜/心包;pleuro『peritoneal』膜=橫膈組成之一。","options":{"A":"橫中隔為橫膈中央腱。","B":"胸腹膜為橫膈組成。","C":"食道背繫膜形成膈腳。","D":"胸心包膜分隔胸膜腔與心包腔,與橫膈無關—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109020-32":{"quick":"因胚體快速生長,橫膈背部最終下降至約第一腰椎(L1)高度。","detail":{"background":"橫膈最初發生於頸部(橫中隔約對第3–5頸節,故肌肉與膈神經來自C3–5);隨胚體(尤其背側軀幹與心臟)快速生長,橫膈相對「下降」,其背側附著最終達約「第一腰椎(L1)」高度(膈腳更下達L2–3)。此「下降」解釋了膈神經何以源自頸髓(C3–5)卻支配位於胸腹交界的橫膈,也解釋橫膈刺激(如膈下膿瘍、心包炎)的痛覺轉移至「頸肩(C3–5皮節)」。腔靜脈孔約T8、食道裂孔T10、主動脈裂孔T12亦反映此最終位置。","options":{"A":"T8為腔靜脈孔高度,非橫膈背部最終位置。","B":"T10為食道裂孔。","C":"橫膈背部最終約L1—正解。","D":"L3過低。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_110020-32":{"quick":"肌原母細胞進入食道背繫膜內,衍生形成橫膈雙腳(膈腳)。","detail":{"background":"橫膈的肌肉由體壁(及頸體節C3–5)的肌原母細胞(myoblast)遷入各胚胎膜性原基發育而成:遷入「食道背繫膜(dorsal mesentery of esophagus)」者→形成橫膈的「雙腳(crura)」(右腳較長、圍繞食道形成食道裂孔);遷入胸腹膜與體壁者→周邊肌部;橫中隔則成中央腱(無肌)。故形成膈腳者為遷入食道背繫膜的肌母細胞。膈腳的括約作用協助防止胃食道逆流;此處鬆弛與食道裂孔疝氣有關。","options":{"A":"外側體壁肌母細胞形成周邊肌部。","B":"頸體節是肌母細胞來源,但膈腳由其遷入食道背繫膜形成。","C":"橫中隔成中央腱(無肌)。","D":"肌母細胞進入食道背繫膜形成膈腳—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_111020-33":{"quick":"氣管的腺體與內襯上皮皆源自前腸「內胚層」,非中胚層。","detail":{"background":"氣管(及整個呼吸道)的「上皮與腺體」源自前腸的「內胚層(endoderm)」—內胚層內襯分化為呼吸道纖毛柱狀上皮、杯狀細胞與黏液腺;而其周圍的「軟骨、平滑肌與結締組織」則源自包繞前腸的「臟層間葉/中胚層(splanchnic mesenchyme)」。故「腺體源自中胚層」錯誤(腺體屬上皮衍生、來自內胚層)。此「內胚層管+中胚層支持」的模式同樣適用於整個消化道與其衍生器官(肝、胰、甲狀腺等實質來自內胚層、間質來自中胚層)。","options":{"A":"氣管內襯上皮源於前腸內胚層,正確。","B":"氣管軟骨源於臟層間葉,正確。","C":"稱腺體源自中胚層—錯誤(腺體屬上皮、源自內胚層),為正解。","D":"氣管肌肉源於臟層間葉,正確。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113090-33":{"quick":"末囊期(terminal sac stage)開始出現明顯血氣障壁與較多表面張力劑。","detail":{"background":"肺發育五期:胚期(週4–7,肺芽分支)、偽腺期(pseudoglandular,週5–16,僅傳導性氣道、外觀似腺,無法氣體交換)、小管期(canalicular,週16–26,呼吸性細支氣管與微血管增生、第I/II型肺泡細胞開始分化、表面張力素少量出現)、「末囊期(terminal sac stage,週26–出生,終末囊形成、第I型肺泡細胞與微血管緊貼形成明顯『血氣障壁(blood-air barrier)』、第II型肺泡細胞分泌『表面張力素』顯著增加)」、肺泡期(alveolar,週32–出生後8歲,成熟肺泡增生)。故血氣障壁與較多surfactant出現於末囊期—這也是約26週後早產兒可望存活的解剖生理基礎。","options":{"A":"偽腺期僅傳導氣道,無氣體交換。","B":"末囊期出現明顯血氣障壁與較多表面張力劑—正解。","C":"小管期僅少量surfactant、血氣障壁尚未明顯。","D":"肺泡期為更後期的肺泡成熟。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114020-33":{"quick":"偽腺期(週5–16)肺無呼吸性構造,此時早產即使照護也無法存活。","detail":{"background":"肺發育各期與「可存活性(viability)」:偽腺期(pseudoglandular,週5–16)肺只有傳導性氣道、無呼吸性細支氣管與肺泡、無血氣障壁,此期早產「即使悉心照護仍無法存活」;小管期(週16–26)末期微血管與終末囊接近、約24週起「邊緣可存活」(極度依賴照護與表面張力素);末囊期(週26起)血氣障壁明顯、surfactant足、存活率大增。臨床:孕24週左右為「可存活界線」,早產兒因surfactant不足致「新生兒呼吸窘迫症候群(RDS)」,可用產前類固醇促肺成熟、產後外源性surfactant治療。故偽腺期早產無法存活。","options":{"A":"偽腺期肺無呼吸構造,早產無法存活—正解。","B":"末囊期(週26+)存活率大增。","C":"小管期末(約24週)邊緣可存活。","D":"肺泡期更成熟、可存活。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_106100-34":{"quick":"脾臟源自背側胃繫膜的「中胚層間質」,並非前腸內胚層。","detail":{"background":"消化道實質器官的來源原則:「內胚層」形成上皮/實質(如腸黏膜、肝、胰、甲狀腺),「中胚層」形成間質、肌肉與漿膜。但「脾臟(spleen)」是例外—它由「背側胃繫膜(dorsal mesogastrium)內的『中胚層間質』」凝集發育而成(故源自中胚層,非前腸內胚層),雖位於前腸系區域。脾原位於胃背側,隨胃沿縱軸順時針旋轉(左迷走轉前)而移至「左上腹」,並使背側胃繫膜形成胃脾韌帶與脾腎韌帶;胎兒期脾曾為造血器官(髓外造血),出生後轉為免疫與血液過濾。故B(源自內胚層)錯誤。","options":{"A":"最早出現於背側胃繫膜間,正確。","B":"稱源自前腸內胚層—錯誤(脾源自中胚層間質),為正解。","C":"隨胃旋轉移至左側,正確。","D":"胎兒期曾為造血器官,正確。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_108100-34":{"quick":"十二指腸發育中因上皮增生一度閉鎖,之後再管腔化(recanalization)。","detail":{"background":"十二指腸由「前腸尾段+中腸頭段」共同發育(交界約在膽管開口/大乳頭處,故血供為腹腔幹與腸繫膜上動脈雙重),呈C形「十二指腸環」,凹側抱胰頭。發育第5–6週時其「上皮細胞過度增生使管腔『一度閉鎖(obliteration)』」,隨後上皮空泡化再「管腔化(recanalization)」恢復通暢。再管腔化失敗→「十二指腸閉鎖(duodenal atresia)」(新生兒「雙泡徵double bubble」、羊水過多、與唐氏症相關)。隨胃旋轉,十二指腸環轉「向右」並大部分貼附後腹壁成次發性腹膜後。故D(因上皮增生一度閉鎖)正確;A(全前腸)、B(連卵黃柄者為中腸)、C(轉左)皆錯。","options":{"A":"十二指腸由前腸+中腸共同發育,非全前腸。","B":"連卵黃柄(卵黃管)者為中腸,非十二指腸。","C":"隨胃旋轉十二指腸轉向右側(非左)。","D":"因上皮增生一度閉鎖後再管腔化—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109020-35":{"quick":"靜脈導管位於肝內、退化成靜脈韌帶,不在前腹壁形成腹膜皺襞。","detail":{"background":"前腹壁內面臍下的五條腹膜皺襞各對應一胚胎殘跡:正中臍皺襞=臍尿管(urachus,正中臍韌帶);成對臍內側皺襞=閉鎖的臍動脈(臍內側韌帶);成對臍外側皺襞=下腹壁(下腹下)動脈(inferior epigastric artery)。「靜脈導管(ductus venosus)」則是胎兒肝內連接臍靜脈與下腔靜脈的分流,出生後退化為「肝內的靜脈韌帶(ligamentum venosum)」,並不在前腹壁形成腹膜皺襞。故不會造成前腹壁腹膜皺襞者為靜脈導管。(臍靜脈本身退化為肝圓韌帶,走肝鐮韌帶游離緣,亦非前腹壁皺襞。)","options":{"A":"靜脈導管在肝內、退化為靜脈韌帶,不形成前腹壁皺襞—正解。","B":"臍尿管形成正中臍皺襞。","C":"下腹下動脈形成臍外側皺襞。","D":"臍動脈形成臍內側皺襞。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109100-33":{"quick":"中腸環以腸繫膜上動脈(SMA)為軸心旋轉。","detail":{"background":"中腸(midgut,供血為腸繫膜上動脈SMA)發育出「中腸環」,其頂端連於卵黃柄(卵黃管);因肝與中腎快速生長、腹腔容積不足,中腸環於第6週經臍環疝出體外(生理性臍疝),並「以SMA為軸心」旋轉:疝出時逆時針90度,第10週回納腹腔時再逆時針180度,共「逆時針270度」。旋轉使空迴腸盤踞左側、結腸框置右側,盲腸由右上降至右下。旋轉異常→腸旋轉不良(malrotation)合併Ladd帶與中腸扭轉(midgut volvulus,新生兒急症)。故旋轉軸心為SMA。","options":{"A":"卵黃柄連於中腸環頂端,非旋轉軸心。","B":"腹腔動脈供前腸,非中腸軸。","C":"腸繫膜上動脈為中腸旋轉軸心—正解。","D":"下腸繫膜動脈供後腸。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_110020-33":{"quick":"中腸環(腹面觀)以SMA為軸逆時針旋轉共270度。","detail":{"background":"中腸環的旋轉(從腹面/前方觀)以腸繫膜上動脈為軸「逆時針(counterclockwise)」進行,總共「270度」:第一階段(疝出體外時,約第6週)逆時針90度;第二階段(回納腹腔時,約第10週)再逆時針180度。完成後十二指腸空腸曲位於SMA左下、橫結腸位於SMA前方、盲腸降至右下腹。若旋轉只到90度或方向相反→腸旋轉不良,易發生中腸扭轉(以SMA為軸絞窄血供)而腸壞死。故為逆時針270度。","options":{"A":"順時針180度與實際相反。","B":"順時針270度方向相反。","C":"逆時針180度角度不足。","D":"逆時針270度—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_111100-34":{"quick":"小腸約在第10週由體外(臍帶)返回腹腔。","detail":{"background":"中腸於第6週因腹腔容積不足(肝、中腎大)經臍環「生理性疝出(physiological herniation)」至臍帶內,在體外完成大部分旋轉;隨著腹腔擴大、肝與中腎相對縮小,約「第10週」腸管「返回腹腔(reduction)」並完成最後旋轉(空腸先回、盲腸最後)。若第10週後腸管未能完全回納→「臍膨出(omphalocele,腸臟突出於臍帶基部、外覆羊膜腹膜囊、常合併其他畸形與染色體異常)」;與「腹裂(gastroschisis,臍旁腹壁缺損、腸無囊膜直接外露)」需鑑別。故返回腹腔約在第10週。","options":{"A":"第四週中腸尚未疝出。","B":"第七週仍在體外旋轉。","C":"約第十週小腸返回腹腔—正解。","D":"第十二週已回納完畢。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_112020-34":{"quick":"生理性臍疝約發生於第六週。","detail":{"background":"發育正常的胚胎約在「第六週」,因肝臟與中腎快速生長使腹腔相對狹小,中腸環經臍環「生理性疝出(physiological umbilical herniation)」至臍帶近端,在體外以SMA為軸旋轉;約第10週腸管回納腹腔。此為「正常」的暫時現象(與病理性臍膨出不同)。超音波於第8–11週可見此生理性中腸疝,不應誤判為腹壁缺損;若第12週後仍見腸管在臍帶內才考慮病理(臍膨出)。故生理性臍疝約第六週發生。","options":{"A":"生理性臍疝約第六週發生—正解。","B":"第八週已疝出在體外旋轉中。","C":"第十週腸管開始回納。","D":"第十二週已回納完成。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113020-34":{"quick":"胃旋轉使十二指腸轉向右側,並大部分貼附後腹壁(次發性腹膜後)。","detail":{"background":"十二指腸發育要點:由「前腸尾段+中腸頭段」共同形成(交界在大乳頭),故血供為「腹腔幹(上胰十二指腸動脈)+腸繫膜上動脈(下胰十二指腸動脈)」雙重(非SMA+IMA)。隨胃沿縱軸旋轉,C形十二指腸環被推「向右」並貼附於後腹壁、被腹膜覆蓋成「次發性腹膜後器官」(僅第一段近端腹膜內)。發育中曾因上皮增生「一度閉鎖再管腔化」(非全程中空管狀)。故C最適當;A(前腸+後腸)、B(SMA+IMA)、D(全程中空)皆錯。","options":{"A":"由前腸+中腸共同發育,非前腸+後腸。","B":"血供為腹腔幹+SMA,非SMA+IMA。","C":"隨胃旋轉轉向右側、貼後腹壁—正解。","D":"發育中曾一度閉鎖再管腔化,非全程中空。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114020-34":{"quick":"腹胰芽主要發育為胰臟的鉤狀突與部分頭端。","detail":{"background":"胰臟由前腸內胚層(非中胚層)長出「背胰芽(dorsal bud,較大)」與「腹胰芽(ventral bud,與膽總管共基部)」兩個芽。隨十二指腸「向右」旋轉,腹胰芽連同膽總管繞至背側、與背胰芽癒合:「腹胰芽→形成胰臟的『鉤狀突(uncinate process)與部分頭下端』」;背胰芽→形成胰體、尾與頭上部。主胰管由腹胰管全部+背胰管遠段合成。發育異常:腹胰芽兩葉異常包繞十二指腸→「環狀胰臟(annular pancreas)」(罕見,造成『十二指腸阻塞』而非胃阻塞,可合併唐氏症);背腹胰管未融合→胰管分裂(pancreas divisum)。故C正確;A(中胚層)、B(轉左)、D(常見/胃阻塞)皆錯。","options":{"A":"胰芽源自前腸內胚層,非中胚層。","B":"十二指腸旋轉向右(非左)。","C":"腹胰芽發育為鉤狀突與部分頭端—正解。","D":"環狀胰臟罕見、造成十二指腸阻塞(非胃阻塞)。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_107100-35":{"quick":"輸尿管源自後腎憩室(輸尿管芽,metanephric diverticulum)。","detail":{"background":"後腎(metanephros,永久腎)由兩部分交互誘導發育:(1)「後腎憩室/輸尿管芽(metanephric diverticulum/ureteric bud)」由中腎管近泄殖腔處長出,分支形成「輸尿管、腎盂、腎盞與集尿管系統」;(2)「後腎間質(metanephric mesoderm/blastema)」被輸尿管芽誘導形成「腎元(腎絲球至遠曲小管)」。故輸尿管源自後腎憩室(輸尿管芽),而非後腎間質。腎臟由骨盆上升至腰部、血供由低換高。發育異常:輸尿管芽分裂→「重複輸尿管」;誘導失敗→腎缺如;上升受阻→「馬蹄腎(被腸繫膜下動脈卡住)」、骨盆異位腎。","options":{"A":"後腎中胚層(間質)形成腎元,非輸尿管。","B":"原腎為暫時性、退化。","C":"中腎部分保留為男性生殖管,非輸尿管。","D":"輸尿管源自後腎憩室(輸尿管芽)—正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_108030-32":{"quick":"人類絨毛膜促性腺激素(hCG)由融合(合體)滋養層分泌。","detail":{"background":"hCG由胎盤絨毛的「合體滋養層(syncytiotrophoblast)」分泌,自著床後(受精約第8天)開始,作用為「維持黃體(corpus luteum)」使其持續分泌黃體酮與雌激素以維繫早孕(取代LH),約第8–10週後胎盤接手分泌類固醇、hCG下降。臨床:hCG是驗孕(血/尿)的標的;異常升高見於「葡萄胎、絨毛膜癌、多胎」;唐氏症母血篩檢中hCG偏高。合體滋養層同時分泌人類胎盤泌乳素(hPL)。故製造hCG者為合體滋養層,非腦下垂體/黃體/蛻膜。","options":{"A":"腦下垂體前葉分泌LH/FSH等,非hCG。","B":"合體滋養層分泌hCG—正解。","C":"黃體是hCG的『標的』(受hCG維持),非製造者。","D":"蛻膜為母體子宮內膜反應,非分泌hCG。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_108030-34":{"quick":"膀胱三角源自中腎管(mesonephric duct)尾端的吸收,非後腎管。","detail":{"background":"膀胱由「泌尿生殖竇(urogenital sinus)」上段發育,其內襯上皮源自「內胚層」;胚胎期膀胱頂經臍尿管(urachus)與尿囊(allantois)相連,出生後閉鎖成正中臍韌帶。膀胱「三角(trigone)」則由「成對中腎管(mesonephric duct)」尾段被吸收併入膀胱後壁而成(初為中胚層、後被內胚層上皮覆蓋)—故B稱「源於後腎管(metanephric duct)」錯誤(應為中腎管)。膀胱在嬰幼兒為腹腔器官,隨骨盆生長逐漸下降,約青春期定位於小骨盆。三角區因來源不同,是膀胱鏡定位輸尿管口與膀胱腫瘤好發的重要區。故B錯誤。","options":{"A":"膀胱內襯上皮源自內胚層(泌尿生殖竇),正確。","B":"稱三角源自後腎管—錯誤(應為中腎管尾端吸收),為正解。","C":"膀胱隨生長下降、學齡仍偏腹腔,敘述屬位置變化範疇。","D":"胚胎期膀胱經臍尿管與尿囊相連,正確。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_108100-35":{"quick":"男性的性腺索(髓質索)發育成細精管(seminiferous tubules)。","detail":{"background":"性腺分化:未分化性腺有表面上皮內生的「初級性索」。若有Y染色體SRY基因→睪丸分化:「髓質性索(gonadal/medullary cord)發育為『細精管(seminiferous tubules)』與睪丸網(rete testis)」,支持細胞分泌AMH使副中腎管退化、間質細胞分泌睪固酮使中腎管發育為副睪/輸精管;皮質索退化。若無SRY(女性)→卵巢:髓質索退化,「皮質索」分裂包繞生殖細胞形成「原始濾泡(primordial follicles)」。故C(男性性腺索→細精管)正確;A(性腺索在女性成濾泡)、B(皮質索在男性成副睪)、D(皮質索在女性成輸卵管)皆錯—副睪源自中腎管、輸卵管源自副中腎管。","options":{"A":"女性是皮質索(非性腺/髓質索)形成原始濾泡。","B":"男性副睪源自中腎管,非皮質索。","C":"男性性腺(髓質)索發育成細精管—正解。","D":"輸卵管源自副中腎管,非皮質索。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109020-34":{"quick":"精索積水因鞘突(processus vaginalis)閉鎖不全所致。","detail":{"background":"睪丸下降時,腹膜向陰囊延伸形成「鞘突(processus vaginalis)」,引導睪丸經腹股溝管入陰囊;正常情況鞘突近端閉鎖、僅遠端殘留為睪丸鞘膜(tunica vaginalis)。若鞘突「閉鎖不全」:完全未閉且夠大→腹腔臟器進入成「先天性腹股溝間接疝氣」;僅部分未閉、留下腔隙積聚腹膜液→「精索/睪丸鞘膜積水(hydrocele)」(透光試驗陽性,與疝氣鑑別)。故精索積水源自鞘突閉鎖不全。白膜是睪丸的纖維被膜、與積水無關。","options":{"A":"白膜為睪丸纖維被膜,非積水成因。","B":"鞘突閉鎖不全→精索積水—正解。","C":"泌尿生殖竇形成膀胱/尿道等,非此因。","D":"泌尿生殖褶形成外生殖器,非此因。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_109100-34":{"quick":"睪丸網源自性腺(髓質)索,非中腎管。","detail":{"background":"男性生殖管道的雙重來源:「中腎管(mesonephric/Wolffian duct,受睪固酮維持)」→輸出小管近段以外的『副睪、輸精管、精囊、射精管』;「性腺(髓質)索」→『細精管、直細精管、睪丸網』;中腎小管的一部分→輸出小管(efferent ductules)連接睪丸網與副睪。故「睪丸網(rete testis)」源自性腺索而「非中腎管」。記憶:中腎管=輸送管路(副睪→輸精管→精囊→射精管);性腺索=產精與匯流(細精管→睪丸網)。女性中腎管退化(殘留Gartner囊腫等)。","options":{"A":"睪丸網源自性腺索,非中腎管—正解。","B":"副睪源自中腎管。","C":"輸精管源自中腎管。","D":"精囊源自中腎管。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_111020-34":{"quick":"射精管源自中腎管(mesonephric duct)。","detail":{"background":"男性中腎管(Wolffian)在睪固酮作用下發育為一系列輸送管:副睪→輸精管→精囊(輸精管末端外突)→射精管(輸精管與精囊管匯合後穿入前列腺、開口於攝護腺尿道)。故「射精管(ejaculatory duct)源自中腎管」。而細精管、睪丸網源自性腺索;睪丸附件(appendix of testis)則是『副中腎管(Müllerian)』退化後的頭端殘跡(故男性睪丸附件、前列腺小囊為Müllerian殘跡)。前列腺與尿道球腺則由泌尿生殖竇內胚層發育。故C正確。","options":{"A":"細精管源自性腺索。","B":"睪丸網源自性腺索。","C":"射精管源自中腎管—正解。","D":"睪丸附件為副中腎管(Müllerian)殘跡。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114090-34":{"quick":"陰道由副中腎管(Müllerian)與竇陰道球泡(sinovaginal bulb)共同形成。","detail":{"background":"女性生殖管道:無睪固酮使中腎管退化、無AMH使「副中腎管(paramesonephric/Müllerian duct)」發育—兩側頭段成輸卵管,尾段融合成「子宮與陰道上1/3」。陰道為「雙重來源」:上部源自融合的副中腎管;下部由泌尿生殖竇背壁長出的「竇陰道球泡(sinovaginal bulb)」增生形成的陰道板(vaginal plate)管腔化而來。處女膜為陰道板與泌尿生殖竇交界處的膜。發育異常:副中腎管融合不全→雙角子宮/中隔子宮;竇陰道球泡未管腔化→陰道閉鎖、處女膜閉鎖(青春期經血滯留);Müllerian不發育→MRKH症候群(先天無陰道子宮)。故陰道由副中腎管+竇陰道球泡形成。","options":{"A":"中腎管在女性退化,非陰道主源。","B":"中腎管非陰道來源。","C":"副中腎管+竇陰道球泡共同形成陰道—正解。","D":"生殖結節形成陰蒂,非陰道。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_107100-36":{"quick":"紅核位於中腦被蓋(運動相關),不衍生自翼板。","detail":{"background":"神經管由「界溝(sulcus limitans)」分為背側「翼板(alar plate,感覺性/中繼核)」與腹側「基板(basal plate,運動性核)」。翼板衍生:脊髓背角、腦幹的感覺與中繼核—如「橄欖核、薄束/楔束核(gracile/cuneate nucleus)、四疊體上下丘(superior/inferior colliculus)」、小腦、紋狀體等。「紅核(red nucleus)」與黑質位於中腦被蓋,屬運動調控相關(基板/被蓋衍生),「不源自翼板」。故不衍生自翼板者為紅核。臨床:界溝兩側的「運動核近中線、感覺核偏外側」之排列,是腦幹核團定位的胚胎學基礎。","options":{"A":"橄欖核源自翼板。","B":"楔核(感覺中繼核)源自翼板。","C":"紅核位於中腦被蓋、屬運動相關,不源自翼板—正解。","D":"下丘源自翼板。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_108030-36":{"quick":"髓核是脊索(notochord)的殘留衍生物。","detail":{"background":"脊柱由體節的「生骨節(sclerotome)」細胞圍繞脊索與神經管發育:相鄰生骨節的尾半與下一節頭半重組(resegmentation)形成「椎體與椎弓」(故脊神經位於椎間孔、肌節跨越關節);「纖維環(anulus fibrosus)」亦來自生骨節間質。而「脊索(notochord)」本身在椎體處退化,僅在「椎間盤中央」殘留為「髓核(nucleus pulposus)」。故衍生自脊索者為髓核。臨床:脊索殘留異常增生→「脊索瘤(chordoma,好發於骶尾與顱底)」;脊索分裂異常→脊椎裂相關畸形。","options":{"A":"椎體源自生骨節(sclerotome),非脊索。","B":"髓核為脊索殘留衍生—正解。","C":"纖維環源自生骨節間質。","D":"椎弓源自生骨節。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_110020-36":{"quick":"視神經髓鞘僅形成至視神經盤(視乳頭/篩板)為止。","detail":{"background":"眼起源於間腦外突的「視囊→視杯」:視網膜的神經節細胞軸突匯聚形成「視神經(optic nerve)」—故視神經屬「中樞神經系統的延伸(由間腦/視杯衍生,非神經嵴、非大腦皮質)」,其髓鞘由「寡突膠細胞」形成,「僅包至視神經盤(篩板lamina cribrosa)為止,不進入視網膜」(故眼底鏡下正常視網膜神經纖維無髓鞘;若髓鞘越界覆蓋視網膜即為先天異常)。視神經髓鞘化在出生「後」約3個月才完成(非出生前完全)。故C正確;A、B、D皆錯。視神經因屬CNS,受損(視神經炎、青光眼)再生能力差。","options":{"A":"視神經髓鞘約出生後3個月才完成,非出生前完全。","B":"視神經源自視杯(間腦),非大腦皮質。","C":"髓鞘僅包至視神經盤—正解。","D":"視神經源自神經外胚層(視杯),非神經嵴。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_112020-36":{"quick":"角膜的形成主要由「水晶體(lens)」誘導,而非視網膜。","detail":{"background":"眼的發育為一連串誘導:視杯(間腦)誘導其表面的「體表外胚層」增厚成水晶體板→水晶體泡;水晶體泡再「誘導其前方的體表外胚層與間葉形成角膜」。角膜各層來源:「外層上皮=體表外胚層」;「角膜實質(間質)與內皮=神經嵴細胞(部分早期文獻歸中胚層,現多認為神經嵴/中胚層共同,內皮明確為神經嵴)」。故「角膜主要由視網膜誘導」錯誤(應為水晶體誘導)。題目選項B把間葉歸中胚層、C把內皮歸神經嵴—皆屬可接受敘述,唯A的「視網膜誘導」是錯的。臨床:水晶體缺失則角膜發育異常。","options":{"A":"稱角膜主要由視網膜誘導—錯誤(應為水晶體誘導),為正解。","B":"角膜間葉源自中胚層/神經嵴,屬可接受敘述。","C":"角膜內皮源自神經嵴細胞,正確。","D":"角膜外層上皮源自體表外胚層,正確。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113020-36":{"quick":"大腦導水管由中腦(mesencephalon)的腔發育而來。","detail":{"background":"三腦泡→五腦泡及其腔(腦室)的對應為高頻考點:前腦(prosencephalon)→端腦(telencephalon,大腦半球,腔=側腦室)+間腦(diencephalon,視丘/下視丘,腔=第三腦室);中腦(mesencephalon,腔=「大腦導水管cerebral aqueduct」);菱腦(rhombencephalon)→後腦(metencephalon,橋腦+小腦)+髓腦(myelencephalon,延腦)(腔=第四腦室)。故大腦導水管源自「中腦」,連接第三與第四腦室。臨床:導水管狹窄是先天性「阻塞性水腦」最常見原因之一。","options":{"A":"菱腦腔形成第四腦室,非導水管。","B":"中腦腔形成大腦導水管—正解。","C":"間腦腔形成第三腦室。","D":"端腦腔形成側腦室。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114090-32":{"quick":"甲狀腺濾泡細胞源自內胚層,不是神經嵴衍生物。","detail":{"background":"神經嵴細胞(neural crest)是「第四胚層」,衍生極廣:周邊神經系統(感覺與自主神經節、神經膠細胞許旺細胞)、「交感與副交感節後神經元」、「腎上腺髓質嗜鉻細胞」、「黑色素細胞」、頭面間葉(顏面骨/牙本質/咽弓軟骨)、主動脈肺動脈中隔、「甲狀腺『濾泡旁C細胞』(分泌降鈣素,源自鰓後體)」、腸神經系統等。而「甲狀腺『濾泡細胞(follicular cell)』分泌甲狀腺素,源自咽底內胚層(自盲孔下降)」,「並非神經嵴」。故不源自神經嵴者為甲狀腺濾泡細胞。臨床:神經嵴遷移異常→Hirschsprung病(腸神經節缺如)、神經母細胞瘤、嗜鉻細胞瘤。","options":{"A":"黑色素細胞源自神經嵴。","B":"交感節後神經元源自神經嵴。","C":"甲狀腺濾泡細胞源自內胚層,非神經嵴—正解。","D":"腎上腺髓質嗜鉻細胞源自神經嵴。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_114090-36":{"quick":"神經垂體(後葉)是間腦(diencephalon)向下外突的衍生物。","detail":{"background":"腦下垂體雙重來源:「神經垂體(後葉,neurohypophysis)」由「間腦(diencephalon)底部下視丘向下外突的『漏斗(infundibulum)』」發育—屬神經外胚層,含下視丘神經元軸突末梢(儲存釋放ADH、催產素),故與下視丘以垂體柄相連;「腺垂體(前葉,adenohypophysis)」則由口凹頂的外胚層「拉氏囊(Rathke氏囊)」向上發育而成(內分泌腺體)。兩者來源不同但合為一腺。故神經垂體源自間腦。臨床:拉氏囊殘留→顱咽瘤(craniopharyngioma);後葉/垂體柄受損→尿崩症。","options":{"A":"端腦形成大腦半球,非神經垂體。","B":"神經垂體源自間腦(漏斗)—正解。","C":"中腦形成四疊體/導水管。","D":"髓腦形成延腦。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_115020-36":{"quick":"視囊源自間腦(diencephalon),非髓腦,故此配對錯誤。","detail":{"background":"腦泡衍生定位:後腦(metencephalon)→橋腦與小腦(正確);中腦(mesencephalon)→四疊體tectum(上下丘)與大腦腳(正確);間腦(diencephalon)→視丘、下視丘、「乳狀體(mammillary body)」、神經垂體與「視囊/視杯(optic vesicle)」(正確);髓腦(myelencephalon)→延腦。故「視囊源自髓腦」配對「錯誤」—視囊實源自『間腦』,於第4週由間腦兩側外突,誘導眼的發育。記憶:眼是「間腦的延伸」,故視神經屬CNS。","options":{"A":"橋腦與小腦源自後腦,配對正確。","B":"四疊體源自中腦,配對正確。","C":"乳狀體源自間腦,配對正確。","D":"視囊源自間腦(非髓腦)—配對錯誤,為正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_108030-33":{"quick":"第四週橫中隔位於頸節(約C3–5)高度。","detail":{"background":"第四週時「橫中隔(septum transversum)」位於「頸節(cervical somites,約第3–5頸節)」高度,故由此處長入橫膈的肌母細胞與支配神經(膈神經phrenic nerve)皆源自C3–5(「C3,4,5 keep the diaphragm alive」)。隨胚體頸部伸展與心臟下降,橫膈相對下移至胸腹交界(背側達約L1)。此「下降」解釋膈神經何以遠程自頸髓下行支配橫膈,以及橫膈/膈下病灶(膈下膿瘍、膽囊、心包炎)痛覺轉移至「肩部(C3–5皮節,Kehr徵)」的臨床現象。故橫中隔第四週位於頸節高度。","options":{"A":"枕節形成舌肌(XII支配),非橫中隔位置。","B":"橫中隔第四週位於頸節(C3–5)高度—正解。","C":"胸節過低,橫膈為下降後才達此區。","D":"腰節更低。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_110020-35":{"quick":"脊椎骨源自體節生骨節(sclerotome)的間質細胞。","detail":{"background":"體節(somite,源自軸旁中胚層)分化為三部分:「生骨節(sclerotome)→中軸骨(脊椎骨vertebra、肋骨、部分枕骨)」;「肌節(myotome)→軀幹與肢帶骨骼肌」;「皮節(dermatome)→背部真皮」。故脊椎骨源自生骨節。比較其他骨骼來源:髓核源自脊索(非生骨節);顱骨「顱頂與面骨由神經嵴+軸旁中胚層、顱底由軸旁中胚層生骨節」(故C不純為生骨節);「四肢骨(appendicular skeleton)源自側板中胚層的體壁層(somatic/lateral plate),非生骨節」。生骨節重組(尾半+下節頭半)使脊神經得以由椎間孔穿出。","options":{"A":"脊椎骨源自生骨節間質—正解。","B":"髓核源自脊索,非生骨節。","C":"顱骨部分由神經嵴/軸旁中胚層,非單純生骨節。","D":"四肢骨源自側板(體壁)中胚層,非生骨節。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_111020-32":{"quick":"體節(somite)由軸旁中胚層(paraxial mesoderm)分節而來。","detail":{"background":"第三週原腸化後,中胚層自中線向外分為三區:「軸旁中胚層(paraxial mesoderm)→分節形成『體節(somite)』」(再分生骨節/肌節/皮節);「中間中胚層(intermediate)→泌尿生殖系統(腎、性腺管)」;「側板中胚層(lateral plate)→分體壁層與臟層,圍出體腔、形成漿膜、四肢骨與心血管」。故體節源自軸旁中胚層。脊索由原結遷移細胞形成(中胚層中軸,誘導神經板);原條本身是中胚層與內胚層細胞遷入的通道;體腔由側板中胚層裂開形成。故B正確。","options":{"A":"脊索源自原結遷移細胞(中軸),非軸旁中胚層體節。","B":"體節由軸旁中胚層分節而來—正解。","C":"體腔由側板中胚層裂開形成。","D":"原條是原腸化時細胞遷入的通道,非軸旁中胚層衍生。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_111020-36":{"quick":"上肢與下肢的旋轉「方向相反」,並非皆朝外側旋轉90度。","detail":{"background":"四肢發育:肢芽於「第四週末」出現於體壁腹外側(上肢芽略早,下肢芽晚約1–2天);肢芽由「頂外胚層嵴(apical ectodermal ridge, AER)」分泌FGF誘導其『近遠軸』延長(進展區增殖),後緣的「極化活性區(ZPA)」分泌SHH決定『前後軸(拇指→小指)』。第7–8週肢體旋轉但「上、下肢方向相反」:上肢沿縱軸「向外側(lateral)旋轉90度」使伸肌轉至背側、拇指朝外;「下肢則向內側(medial)旋轉90度」使伸肌轉至前方、大趾朝內、膝朝前。故D「上下肢均朝外側旋轉」錯誤。臨床:AER缺失→肢體缺如;ZPA異常SHH→多指。","options":{"A":"肢芽第四週末出現於體壁腹外側,正確。","B":"AER誘導肢芽生長發育,正確。","C":"下肢芽較上肢芽晚1–2天,正確。","D":"稱上下肢均朝外側旋轉90度—錯誤(上肢外旋、下肢內旋),為正解。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_112020-35":{"quick":"骨骼系統主要來自中胚層與神經嵴(選項1與4)。","detail":{"background":"骨骼系統的胚胎來源有二:「中胚層(mesoderm)」—軸旁中胚層生骨節(中軸骨:脊椎、肋骨、枕骨)、側板中胚層(四肢骨)、頭部部分顱底;「神經嵴(neural crest)」—顱顏的大部分(顏面骨、咽弓軟骨衍生、部分顱蓋)。內胚層形成消化呼吸道上皮、神經外胚層形成神經系統,皆不直接形成骨。故骨骼系統主要來自『中胚層+神經嵴(1與4)』。這解釋了顱顏骨何以兼有膜內骨化(神經嵴/間質直接成骨)與軟骨內骨化(中胚層軟骨模板),以及神經嵴病變(如顱顏發育異常Treacher Collins)會影響顏面骨。","options":{"A":"12(中胚層+內胚層)—內胚層不形成骨。","B":"13(中胚層+神經外胚層)—神經外胚層形成神經非骨。","C":"14(中胚層+神經嵴)—正解。","D":"24(內胚層+神經嵴)—內胚層不形成骨。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}},"med1_113090-35":{"quick":"腹直肌屬軀幹軸下肌(hypaxial),由脊神經腹支支配。","detail":{"background":"肌節(myotome)分背側「軸上部(epaxial)」與腹側「軸下部(hypaxial)」,兩者神經支配不同:「軸上肌(epaxial)→由脊神經『背支(dorsal ramus)』支配—即背部深層固有肌:豎脊肌(erector spinae,含棘肌spinalis/最長肌/髂肋肌)、橫突棘肌、夾肌等」;「軸下肌(hypaxial)→由脊神經『腹支(ventral ramus)』支配—即體壁與四肢肌:腹直肌、腹內外斜肌、肋間肌、前鋸肌、闊背肌與所有四肢肌」。故「腹直肌(rectus abdominis)」屬軸下肌。記憶法:由背支支配的背部固有肌=軸上;其餘(體壁、四肢、闊背肌等淺背肌雖位於背部但屬上肢肌、由臂叢支配)=軸下。故B正確;A豎脊肌、D棘肌屬軸上;C闊背肌雖在背部但屬上肢肌(胸背神經、腹支來源),題意以「軀幹軸下肌」最典型者為腹直肌。","options":{"A":"豎脊肌由背支支配,屬軸上肌。","B":"腹直肌屬軀幹軸下肌(腹支支配)—正解。","C":"闊背肌為淺背部的上肢肌(胸背神經),非典型軀幹軸下肌。","D":"棘肌屬豎脊肌一部、軸上肌。"},"sources":["Langman《醫用胚胎學》","Moore《發育中的人體》","Sadler胚胎學"]}}},TO=["EM1配子生成受精與早期胚胎發育", "EM2咽弓與頭頸部發育", "EM3心血管系統發育", "EM4呼吸系統與橫膈發育", "EM5消化系統發育", "EM6泌尿生殖系統發育", "EM7神經系統與感覺器官發育", "EM8肌肉骨骼與四肢發育"],LEC={"EM1配子生成受精與早期胚胎發育":{"title":"配子生成、受精與第1–3週","html":"<p><b>減數分裂與配子</b>:減數I分離同源染色體(2n→n)、減數II分離姊妹染色分體。精子生成青春期後持續(全程約64–74天);卵子自胎兒期停滯於減數I前期至排卵、減數II停滯至受精完成—故高齡卵子<b>不分離(nondisjunction)</b>風險高,易致三體(Down 47,+21)、單體(Turner 45,X)。</p><p><b>受精→著床</b>:輸卵管壺腹部受精;卵裂在透明帶內進行,桑椹胚→囊胚,第5–6天<b>孵化</b>後約第6–7天著床於子宮體後上壁。著床異常→前置胎盤、子宮外孕(輸卵管最常見)。</p><p><b>滋養層</b>:合體滋養層(syncytiotrophoblast)侵入內膜、分泌<b>hCG維持黃體</b>;細胞滋養層為幹細胞。葡萄胎/絨毛膜癌與滋養層異常增生相關(hCG↑為標記)。</p><p><b>原腸化(第3週)</b>:原條形成三胚層;原結(Hensen結)誘導脊索→誘導神經板。第3週為致畸高敏感期之始;原條尾端殘留→薦尾畸胎瘤。胚層衍生:外胚層(表皮、神經系統)、中胚層(肌肉骨骼、循環、泌尿生殖)、內胚層(消化呼吸道上皮、腺體實質)。</p><p><b>預產期</b>:Naegele法則=LMP+1年−3月+7天(≈40週);早期超音波(CRL)最準。</p>"},"EM2咽弓與頭頸部發育":{"title":"咽器、咽弓衍生與耳的發育","html":"<p><b>咽器</b>:咽弓(中胚層+神經嵴,外覆外胚層內襯內胚層)、咽囊(內胚層)、咽溝(外胚層)、咽膜。</p><p><b>咽弓的「弓-軟骨-肌肉-神經」對應(高頻)</b>:第1弓(Meckel軟骨→鎚骨/砧骨;咀嚼肌等;<b>三叉V3</b>);第2弓(Reichert軟骨→鐙骨/莖突/舌骨上部;表情肌、鐙骨肌;<b>顏面VII</b>);第3弓(舌骨大部;莖突咽肌;<b>舌咽IX</b>);第4/6弓(喉軟骨;咽喉肌;<b>迷走X</b>)。</p><p><b>咽囊衍生</b>:1→中耳/耳咽管;2→腭扁桃;3→下副甲狀腺+胸腺;4→上副甲狀腺+鰓後體(C細胞)。第3、4咽囊發育不良→<b>DiGeorge症候群</b>。</p><p><b>耳</b>:第1咽溝→外聽道;第1咽膜(三層)→鼓膜;第1咽囊→中耳/耳咽管;聽板(外胚層)→內耳膜迷路。頸竇殘留→頸側囊腫/瘻管。</p><p><b>舌</b>:前2/3(第1弓,感覺V3/味覺VII);後1/3(咽下隆起第3弓為主,IX);第2弓copula被擠壓消失;舌肌源自枕體節(XII)。盲孔為甲狀腺下降起點。</p><p><b>咽弓動脈</b>:3→頸總/頸內;4→主動脈弓(左)/右鎖骨下近段;6→肺動脈、左側動脈導管。</p>"},"EM3心血管系統發育":{"title":"心臟分隔、胎兒循環與大血管","html":"<p><b>心房中隔</b>:第一中隔下行,第一孔由<b>第一中隔與心內膜墊融合</b>而閉;上部凋亡成第二孔;右側第二中隔覆蓋留卵圓孔(第一中隔為活瓣)。缺損→ASD;第一孔型常合併心內膜墊缺損(唐氏症)。</p><p><b>胎兒循環三分流與含氧</b>:<b>臍靜脈含氧最高</b>→靜脈導管繞肝→下腔靜脈→經<b>卵圓孔</b>優先供腦/冠脈;右心血經<b>動脈導管</b>繞肺入降主動脈;<b>臍動脈含氧最低</b>送回胎盤。</p><p><b>出生轉變</b>:肺擴張→肺血管阻力↓、肺血流↑;左房壓↑>右房壓→卵圓孔關(→卵圓窩);血氧↑、PGE2↓→動脈導管關(→動脈韌帶)。早產PDA可用indomethacin關閉、PGE1維持開放(導管依賴型先心)。</p><p><b>殘跡</b>:臍動脈→臍內側韌帶(成對);臍尿管→臍正中韌帶(單一);臍靜脈→肝圓韌帶;靜脈導管→靜脈韌帶;動脈導管→動脈韌帶。</p><p><b>大血管/靜脈</b>:升主動脈與肺動脈幹由動脈幹經主肺中隔(神經嵴)螺旋分隔(異常→法洛/大血管轉位/永存動脈幹);IVC肝段源自卵黃靜脈;奇靜脈根部源自後主靜脈。</p>"},"EM4呼吸系統與橫膈發育":{"title":"喉氣管發育、肺五期與橫膈","html":"<p><b>呼吸憩室</b>:第4週前腸腹側出芽,氣管食道中隔分隔氣管與食道。分隔不全→<b>氣管食道瘻管(TEF,下呼吸道最常見先天異常)</b>,多合併食道閉鎖、可屬VACTERL。</p><p><b>氣管來源</b>:上皮與腺體=前腸<b>內胚層</b>;軟骨/平滑肌=臟層間葉(中胚層)。</p><p><b>肺發育五期</b>:胚期→偽腺期(週5–16,僅傳導氣道,<b>早產無法存活</b>)→小管期(週16–26,微血管增生,約24週邊緣可存活)→<b>末囊期(週26起,血氣障壁明顯、surfactant顯著↑)</b>→肺泡期(週32–出生後8歲)。surfactant不足→新生兒呼吸窘迫(RDS),產前類固醇+產後surfactant治療。</p><p><b>橫膈四組成</b>:橫中隔(中央腱)、成對胸腹膜、食道背繫膜(膈腳)、體壁肌肉(C3–5,膈神經)。第4週橫中隔位<b>頸節高度</b>、後相對下降至約L1。左後外側胸腹膜閉鎖最晚→<b>Bochdalek橫膈疝</b>(腹臟入胸致肺發育不全)。</p>"},"EM5消化系統發育":{"title":"腸道分區、旋轉與肝膽胰脾","html":"<p><b>三分區與血供</b>:前腸(腹腔幹)、中腸(SMA)、後腸(IMA)。十二指腸由前腸尾段+中腸頭段共同發育(雙重血供),發育中<b>上皮增生一度閉鎖再管腔化</b>(失敗→十二指腸閉鎖,雙泡徵、唐氏症)。</p><p><b>中腸旋轉</b>:第6週生理性臍疝(肝/中腎大、腹腔小)→以<b>SMA為軸逆時針共270度</b>(疝出90+回納180)→約第10週回納腹腔。未回納→臍膨出(有囊膜、合併畸形)vs腹裂(無囊膜)。旋轉不良→中腸扭轉(新生兒急症)。</p><p><b>肝膽胰脾</b>:肝/膽/腹胰芽/背胰芽皆由前腸<b>內胚層</b>出芽;隨十二指腸右轉,腹胰芽繞至背側與背胰芽癒合,<b>腹胰芽→鉤狀突+部分頭下端</b>;環狀胰臟(罕見)致十二指腸阻塞;胰管分裂(背腹胰管未融)。<b>脾為例外:源自背側胃繫膜的中胚層間質</b>(非內胚層),胎兒期曾造血。</p><p><b>前腹壁皺襞</b>:臍尿管→正中皺襞;臍動脈→臍內側皺襞;下腹下動脈→臍外側皺襞(靜脈導管在肝內、不形成前腹壁皺襞)。</p>"},"EM6泌尿生殖系統發育":{"title":"腎發育、膀胱與生殖管道分化","html":"<p><b>腎(後腎metanephros)</b>:<b>輸尿管芽(後腎憩室)→輸尿管/腎盂/腎盞/集尿管</b>;後腎間質→腎元(被誘導)。腎自骨盆上升、血供由低換高;上升受阻被IMA卡住→<b>馬蹄腎</b>;輸尿管芽分裂→重複輸尿管。</p><p><b>膀胱</b>:由泌尿生殖竇上段(內襯<b>內胚層</b>)發育,經臍尿管連尿囊(後成正中臍韌帶);<b>膀胱三角由中腎管尾端吸收</b>而成。</p><p><b>性腺與管道(SRY決定)</b>:有SRY→睪丸:<b>性腺(髓質)索→細精管、睪丸網</b>;支持細胞AMH使副中腎管退化、間質細胞睪固酮使<b>中腎管→副睪/輸精管/精囊/射精管</b>。無SRY→卵巢:皮質索→原始濾泡;<b>副中腎管→輸卵管/子宮/陰道上1/3</b>。</p><p><b>陰道雙重來源</b>:上部=副中腎管;下部=<b>竇陰道球泡</b>(陰道板管腔化)。Müllerian不發育→MRKH。</p><p><b>睪丸下降</b>:鞘突引導;閉鎖不全→腹股溝間接疝(大開口)或<b>鞘膜積水(透光陽性)</b>。</p>"},"EM7神經系統與感覺器官發育":{"title":"神經管、腦泡分區與眼耳神經嵴","html":"<p><b>神經管</b>:界溝分背側<b>翼板(感覺/中繼核:橄欖核、薄楔束核、上下丘)</b>與腹側<b>基板(運動核;紅核屬中腦被蓋運動相關)</b>。神經孔閉合(頭側第25天、尾側第27–28天),缺損→無腦症/脊柱裂(與葉酸相關)。</p><p><b>腦泡→腔(腦室)</b>:端腦(側腦室)、間腦(第三腦室)、<b>中腦(大腦導水管,狹窄→阻塞性水腦)</b>、後腦(橋腦+小腦)、髓腦(延腦)(後二者腔=第四腦室)。<b>神經垂體=間腦漏斗</b>;腺垂體=拉氏囊(殘留→顱咽瘤)。</p><p><b>眼</b>:視囊/視杯源自<b>間腦</b>(故視神經屬CNS、髓鞘僅至視神經盤、出生後3月才完成);水晶體由體表外胚層(受視杯誘導)→再<b>誘導角膜</b>;角膜外皮=體表外胚層、內皮=神經嵴。</p><p><b>神經嵴衍生(廣)</b>:周邊神經與神經節、自主節後神經元、<b>腎上腺髓質嗜鉻細胞、黑色素細胞、甲狀腺C細胞</b>、顏面間葉、主肺中隔。注意<b>甲狀腺濾泡細胞源自內胚層(非神經嵴)</b>。異常→Hirschsprung、神經母細胞瘤、嗜鉻細胞瘤。</p>"},"EM8肌肉骨骼與四肢發育":{"title":"體節分化、骨骼來源與肢芽","html":"<p><b>體節(軸旁中胚層分節)三分化</b>:<b>生骨節(sclerotome)→中軸骨(脊椎、肋骨)</b>;肌節(myotome)→骨骼肌;皮節(dermatome)→背部真皮。生骨節重組(尾半+下節頭半)使脊神經由椎間孔穿出。髓核源自脊索殘留。</p><p><b>骨骼系統來源=中胚層+神經嵴</b>:中軸骨/四肢骨(中胚層,四肢骨來自側板體壁層)、顱顏大部(神經嵴)。</p><p><b>軸上 vs 軸下肌</b>:<b>軸上(epaxial,背支支配)=豎脊肌、橫突棘肌、夾肌</b>;<b>軸下(hypaxial,腹支支配)=腹直肌、腹斜肌、肋間肌、四肢肌</b>。</p><p><b>四肢發育</b>:第4週末肢芽出現於體壁腹外側(上肢早1–2天);<b>AER(頂外胚層嵴)分泌FGF主導近遠軸延長</b>;ZPA分泌SHH決定前後軸。第7–8週旋轉<b>方向相反</b>:上肢外旋90度(拇指朝外)、下肢內旋90度(大趾朝內)。AER缺失→肢缺如;SHH異常→多指。</p><p><b>橫膈</b>:橫中隔第4週位頸節(C3–5,故膈神經C3–5;膈刺激痛轉移至肩)。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^EM(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='med1_emb_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
