"掌握護理部人力需求狀況,並進行供需分析","B":"醫院人力資源室決定招募方向、管道及效益指標評量","C":"招募工作完成半年後,進行活動效益評估","D":"為符合招募的成本效益,由人資管理師負責"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"11管理者角色變革危機與人力品質","topic_code":"A1-11","q_num":42,"roc_year":"113","exam_code":"113180","src":"民國113年","options":{"A":"掌握護理部人力需求狀況,並進行供需分析","B":"醫院人力資源室決定招募方向、管道及效益指標評量","C":"招募工作完成半年後,進行活動效益評估","D":"為符合招募的成本效益,由人資管理師負責"},"img":""},{"id":"114030-N2-8","code":"114030","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":8,"stem":"有關完全電子病歷優點的敘述,下列何者錯誤?","opts":{"A":"資料可供同體系共享,維持資料一致性","B":"醫療流程管制與修改方便,且不會留有紀錄","C":"資料完善,具結構化,可促進醫學研究","D":"不必有紙本病歷,可以減少醫院的成本"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"11管理者角色變革危機與人力品質","topic_code":"A1-11","q_num":8,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"資料可供同體系共享,維持資料一致性","B":"醫療流程管制與修改方便,且不會留有紀錄","C":"資料完善,具結構化,可促進醫學研究","D":"不必有紙本病歷,可以減少醫院的成本"},"img":""},{"id":"114030-N2-46","code":"114030","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":46,"stem":"對於工作意願低,工作能力也低的員工,下列何種管理策略最為適當?","opts":{"A":"移轉策略","B":"激發策略","C":"增強策略","D":"發展策略"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"11管理者角色變革危機與人力品質","topic_code":"A1-11","q_num":46,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"移轉策略","B":"激發策略","C":"增強策略","D":"發展策略"},"img":""}],E={"101030-N2-61":{"quick":"全面參與品質改善=Z理論(團體價值、參與式決策)。","detail":{"background":"管理理論:X理論(人性本惡、需嚴格監督)、Y理論(人性本善、自動自發)、Z理論(大內Ouchi,強調團體價值觀、參與式決策、長期僱用、全面參與)。「護理人員全面參與」降跌倒專案=Z理論(C正確)。系統理論強調輸入轉化輸出,非全面參與。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"X理論是嚴格監督。","B":"Y理論是自動自發。","C":"正確(本題答案)。全面參與=Z理論。","D":"系統理論強調輸入轉化輸出。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"101030-N2-65":{"quick":"會議成功:重要性高的議題排在前面。","detail":{"background":"會議成功原則:重要議題排前面(精神好、確保討論)(B正確);與會人員「以少而精」(15~20人過多、難聚焦);費時討論議題不一定排前(視重要性);不必確認每個人都參加(視議題相關性)。故重要議題排前(B)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"與會人員宜少而精,15~20人過多。","B":"正確(本題答案)。重要議題排前面。","C":"非以費時與否排序,以重要性。","D":"不必確認每人都參加。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"101110-N2-58":{"quick":"護理專案改進跌倒=Z理論(全員參與)。","detail":{"background":"以「護理專案」方式(全員討論參與)改進跌倒=Z理論(C正確,大內Ouchi:團體價值、參與式決策、全面參與)。X理論(監督)、Y理論(自發)、權變理論(因情境調整)皆非「全員參與專案」核心。故Z理論(C)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"X理論是嚴格監督。","B":"Y理論是自動自發。","C":"正確(本題答案)。全員參與專案=Z理論。","D":"權變理論是因情境調整。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"101110-N2-68":{"quick":"加開病床增人力資材儀器=系統理論的「輸入」。","detail":{"background":"Nadler與Tushman一致模式(系統觀):輸入(input,資源:人力、資材、儀器、設備)→轉化過程(transformation)→輸出(output,結果)→回饋圈。加開病床所需增加的「人力、資材、儀器、設備」屬「輸入」(A正確)。故輸入(A)。","options":{"A":"正確(本題答案)。人力資材儀器設備屬輸入。","B":"轉化過程是處理活動。","C":"輸出是結果。","D":"回饋圈是回饋修正。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"102030-N2-59":{"quick":"Gillies系統分析「轉化過程」=給予病人治療相關衛教。","detail":{"background":"Gillies(季麗絲)系統分析法:輸入(收集病史等資料)→轉化過程(對病人的處置、衛教等護理活動)→輸出(病人結果:疼痛減輕、自信增強)。選項C「給予病人治療相關衛教」=轉化過程(C正確)。A收集病史=輸入;B疼痛減輕、D自信增強=輸出。故C。","options":{"A":"收集病史是輸入。","B":"疼痛減輕是輸出。","C":"正確(本題答案)。給予衛教是轉化過程。","D":"自信增強是輸出。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"102030-N2-60":{"quick":"控制原則「不」適當=過程中不宜即時修正(應即時修正)。","detail":{"background":"控制(control)的原則:成果需量化(對)、會產生重大影響的活動為控制重點(對,80-20法則)、訂閾值容忍範圍(對)。選項D「在過程中『不宜』即時修正」不適當(本題答案)——控制應「即時偵測偏差並即時修正」,故D不適當。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"適當。成果需量化。","B":"適當。重大影響活動為控制重點。","C":"適當。訂閾值容忍範圍。","D":"不適當(本題答案)。過程中應即時修正。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"102030-N2-79":{"quick":"會議成功要訣=重要性高的議題宜排在會議前面。","detail":{"background":"會議成功要訣:D「重要性高的議題宜排在會議前面」正確。A「議程開會時才宣布」錯(應事先發放議程供準備);B「等全部到齊才開會」錯(準時開會,不必等全到);C「每位都發言後才移下一議題」錯(過度耗時、應適度掌控)。故D。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"議程應事先發放,非開會才宣布。","B":"應準時開會,不必等全到。","C":"不必每位發言才移議題(耗時)。","D":"正確(本題答案)。重要議題排會議前面。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"102030-N2-80":{"quick":"增聘人力確保病安減負荷=系統理論?本題答案C(系統理論輸入)。","detail":{"background":"本題官方答案C(系統理論)。護理部主任因離職率高、新人召募困難,建議「增聘照顧服務員(增加人力輸入)以確保病人安全與減少工作負荷」=從「系統理論」輸入面調整資源以改善輸出(C正確)。Z理論(團體參與)、官僚理論、權變理論皆非此資源輸入調整。故系統理論(C)。","options":{"A":"Z理論是團體參與決策。","B":"官僚理論是層級制度。","C":"正確(本題答案)。增聘人力屬系統理論輸入調整。","D":"權變理論是因情境調整。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"102110-N2-69":{"quick":"標準化作業受「科學管理」理論影響。","detail":{"background":"科學管理(泰勒Taylor):強調工作標準化、時間動作研究、專業分工、按件計酬、提高效率。「標準化作業」受科學管理影響(A正確)。行為科學(重人性)、系統(輸入輸出)、角色理論皆非。故科學管理(A)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。標準化作業受科學管理影響。","B":"行為科學重人性需求。","C":"系統理論是輸入輸出。","D":"角色理論非標準化來源。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"103030-N2-71":{"quick":"遲到扣績效=X理論(人性需嚴格管控)。","detail":{"background":"「病房會議遲到者扣當月績效」以懲罰管控=X理論(A正確,麥克葛羅格:人性懶惰、需嚴格監督獎懲)。Y理論(自發)、Z理論(團體參與)、系統理論皆非懲罰管控。故X理論(A)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。扣績效懲罰管控=X理論。","B":"Y理論是自動自發。","C":"Z理論是團體參與。","D":"系統理論是輸入輸出。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"103100-N2-61":{"quick":"官僚模式「不」含員工較會自動自發(官僚靠規章非自發)。","detail":{"background":"韋伯(Weber)理想官僚(科層)模式條件:不談私人關係(對,對事不對人)、升遷按規定(對)、每人擔任一項職位專業分工(對)。選項D「員工較會自動自發」不是官僚模式條件(本題答案)——官僚靠「規章制度、層級權威」運作,非靠員工自發(自發是Y理論)。故D。","options":{"A":"官僚不談私人關係。","B":"官僚升遷按規定。","C":"官僚每人擔任一項職位。","D":"正確(本題答案)。自動自發非官僚條件(屬Y理論)。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"103100-N2-72":{"quick":"護理長角色「不屬決策」角色=聯絡者(屬人際角色)。","detail":{"background":"Mintzberg管理者角色三類:人際角色(精神領袖figurehead、領導者leader、聯絡者liaison)、資訊角色(監督者、傳播者、發言人)、決策角色(企業家、騷亂平息者、資源調配者、協商者/調停者)。選項C「聯絡者」屬「人際角色」非決策角色(本題答案)。故C。","options":{"A":"騷亂平息者是決策角色。","B":"資源調配者是決策角色。","C":"正確(本題答案)。聯絡者是人際角色,非決策。","D":"調停者(協商者)是決策角色。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"103100-N2-78":{"quick":"病人抱怨檢查取消:先傾聽抱怨並找出問題所在。","detail":{"background":"病人空腹16小時後檢查被取消而抱怨,最適宜處理是「先傾聽抱怨並找出問題所在」(C正確,衝突/抱怨處理:先傾聽同理、再解決問題)。A不理會(忽視)、B馬上道歉(未了解問題)、D立即找督導公關(推卸)皆不當。故C。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"不理會抱怨不當。","B":"馬上道歉未先了解問題。","C":"正確(本題答案)。先傾聽抱怨找出問題。","D":"立即找他人是推卸。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"104030-N2-66":{"quick":"輸入轉化輸出=系統理論特點。","detail":{"background":"「輸入、轉化過程、輸出(及回饋)」是「系統理論(systems theory)」的特點(A正確)——將組織視為與環境互動的開放系統。回饋理論、情境理論、整合理論皆非此三段式架構核心。故系統理論(A)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。輸入轉化輸出是系統理論。","B":"回饋理論非此三段架構。","C":"情境理論是因情境調整。","D":"整合理論非此。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"104100-N2-7":{"quick":"健康觀:WHO認為健康是生理心理「社會」完全安適,非僅無疾病。本題答案B。","detail":{"background":"本題官方答案B(歐倫Orem健康觀正確項)。各家健康觀:WHO健康=「生理、心理及社會的完全安適狀態」,非僅「沒有疾病或虛弱」(D敘述不完整故錯);羅伊(Roy)適應模式;羅傑斯(Rogers)整體人;歐倫(Orem)自我照顧——健康是能成功處理面臨問題、達到自我照顧需求平衡(B正確)。故B。","options":{"A":"羅伊敘述須對應適應模式。","B":"正確(本題答案)。歐倫健康=成功處理問題達自我照顧。","C":"羅傑斯非與病菌互動。","D":"WHO健康含社會安適,非僅無疾病。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"105030-N2-61":{"quick":"「樂於被督促、嚮往安全感」不屬Y理論(屬X理論)。","detail":{"background":"麥克葛羅格Y理論(人性本善):天生喜歡工作(對)、合適情況下會尋求接受責任(對)、人都有潛力(對)。選項C「樂於被人督促、特別嚮往安全感」不屬Y理論(本題答案)——這是「X理論」對人性的看法(被動、需督促、求安穩)。故C。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"Y理論:天生喜歡工作。","B":"Y理論:會尋求接受責任。","C":"正確(本題答案)。樂於被督促嚮往安全=X理論。","D":"Y理論:人都有潛力。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"105090-N2-60":{"quick":"明確規則嚴格訓練督考獎金=古典時期(傳統理論)觀點。","detail":{"background":"管理理論時期:古典(傳統,泰勒科學管理/費堯/韋伯,重效率、標準、獎懲)、新古典(修正,霍桑/人際關係,重人性)、現代(系統/權變)。「明確工作規則程序、嚴格訓練督考、提案獎金」=古典時期觀點(A正確,重效率與標準化)。故A。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。明確規則嚴格督考=古典時期。","B":"新古典重人性需求。","C":"現代強調系統與情境。","D":"後現代非此。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"105090-N2-65":{"quick":"官僚(科層)組織「不」是較少結構化(科層高度結構化)。","detail":{"background":"官僚(科層)組織特性:可存在於各種規模組織(對)、傾向集權(對)、有非常專業化的作業程序(對)。選項A「較少結構化之組織行為」錯誤(本題答案)——官僚組織是「高度結構化、層級分明、規章嚴明」,非較少結構化。故A。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。官僚是高度結構化,非較少。","B":"官僚可存在各種規模組織。","C":"官僚傾向集權。","D":"官僚有專業化作業程序。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"106030-N2-64":{"quick":"官僚理論「不」是惡質的管理模式(是中性的合法權威制度)。","detail":{"background":"官僚(Bureaucracy)理論:韋伯(古典組織學之父)發展(對)、是機構中「合理合法的權威」(對)、強調制度凌駕於人(對)。選項C「是一種惡質的管理模式」錯誤(本題答案)——官僚是中性的「理性化、制度化」管理模式,「官僚」一詞在韋伯理論中無貶義。故C。","options":{"A":"官僚由韋伯發展。","B":"官僚是合理合法的權威。","C":"正確(本題答案)。官僚非惡質模式,是中性制度。","D":"官僚強調制度凌駕於人。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"106110-N2-57":{"quick":"運用科學研究設計專業分工=泰勒(科學管理)。","detail":{"background":"現代管理理論代表人物:泰勒(Taylor,科學管理,以科學研究實驗設計專業分工、標準化、提高效率,「科學管理之父」)。費堯(Fayol,行政管理、管理五功能)、韋伯(官僚)、赫茲伯格(雙因子)皆非「科學研究設計專業分工」。故泰勒(A)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。科學研究設計專業分工=泰勒。","B":"費堯是行政管理五功能。","C":"韋伯是官僚理論。","D":"赫茲伯格是雙因子理論。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"106110-N2-59":{"quick":"Y理論「不」含傾向外在控制的評值(Y理論重內在自我控制)。","detail":{"background":"Y理論觀點:民主方式(對)、鼓勵員工參與(對)、計畫方案有彈性(對)。選項D「傾向外在控制的評值」不屬Y理論(本題答案)——Y理論重「內在自我控制、自我引導」,外在嚴格控制是X理論。故D。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"Y理論:民主方式。","B":"Y理論:鼓勵員工參與。","C":"Y理論:計畫有彈性。","D":"正確(本題答案)。外在控制屬X理論,非Y理論。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"106111-N2-31":{"quick":"靜脈不明顯改善=濕熱敷(1)+下垂部位(3)?本題答案C「13」。","detail":{"background":"本題屬給藥/靜脈穿刺但歸管理站,官方答案「13」。靜脈不明顯改善措施:1局部「濕熱敷」(熱使血管擴張,題幹1若為濕冷敷則錯,本題正解組合為13)、3將穿刺部位「下垂(低於心臟)」使血管充盈。核心:濕熱敷+肢體下垂+輕拍+握拳使血管浮現,利穿刺。故13。","options":{"A":"12組合非官方。","B":"34不符。","C":"正確(本題答案,13)。濕熱敷+肢體下垂使血管充盈。","D":"24不符。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"107030-N2-57":{"quick":"系統理論「不屬輸出」=疾病史(屬輸入)。","detail":{"background":"系統理論:輸入(資源、病史資料)→轉化過程→輸出(結果:病患滿意度、疼痛減輕、合併症預防)。選項A「疾病史」屬「輸入」非輸出(本題答案)。B病患滿意度、C疼痛減輕、D合併症預防皆是輸出(結果)。故A。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。疾病史是輸入,非輸出。","B":"病患滿意度是輸出。","C":"疼痛減輕是輸出。","D":"合併症預防是輸出。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"107030-N2-58":{"quick":"官僚體制特徵「不」含重視人性化(官僚重制度非人性)。","detail":{"background":"韋伯官僚體制特徵:層級制度(對)、依專業分工(對)、依法行事(對)。選項D「重視人性化」錯誤(本題答案)——官僚重「規章制度、層級、依法」,「人性化」是新古典(行為科學)的重點,非官僚。故D。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"官僚採層級制度。","B":"官僚依專業分工。","C":"官僚依法行事。","D":"正確(本題答案)。重視人性化非官僚特徵。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"107030-N2-63":{"quick":"「被尊重重視、相信人有潛能自我實現」=新古典(修正理論)。","detail":{"background":"主張「讓同仁感受被尊重重視、相信人有潛能與創造力、希望自我實現」=新古典時期(修正理論,行為科學、人際關係,重人性需求)(B正確)。古典(重效率標準)、現代(系統權變)皆非以人性需求為核心。故新古典(B)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"古典時期重效率標準。","B":"正確(本題答案)。重人性需求自我實現=新古典。","C":"現代時期重系統情境。","D":"後現代非此。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"107030-N2-73":{"quick":"員工樂於工作=Y理論。","detail":{"background":"麥克葛羅格Y理論:人性本善、員工「樂於工作」、能自動自發、自我實現(C正確)。X理論(人性懶惰需監督)、Z理論(團體參與)、J理論皆非。故Y理論(C)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"J理論非標準。","B":"X理論是人性懶惰。","C":"正確(本題答案)。員工樂於工作=Y理論。","D":"Z理論是團體參與。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"108020-N2-57":{"quick":"Z理論重點=參與式決策(1)+團體價值(3)?本題答案D「135」。","detail":{"background":"本題官方答案「135」。大內(Ouchi)Z理論重點:1參與式決策、3團體價值觀、5(長期僱用/整體關懷等)。選項2「快速升遷」錯(Z理論強調『緩慢升遷』long-term);4「專業化歷練」錯(Z理論強調『非專業化的生涯路徑、多面歷練』)。故135。","options":{"A":"含2(快速升遷)錯。","B":"含2、4錯。","C":"含2、4錯。","D":"正確(本題答案,135)。參與式決策、團體價值等。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"108020-N2-67":{"quick":"新古典(修正理論)=Mayo發現非正式組織會影響正式組織領導。","detail":{"background":"新古典(修正理論):A「Mayo發現非正式組織普遍存在,會對正式組織領導造成影響」正確(霍桑研究、人際關係學派)。B霍桑研究發現「人際/社會因素」影響生產力(非規章);C Maslow認為需「由低而高」逐層滿足(非只滿足高層次);D McGregor的Y理論強調「個人與組織需求調和」(非組織重於個人)。故A。","options":{"A":"正確(本題答案)。Mayo發現非正式組織影響正式組織。","B":"霍桑研究發現人際因素影響生產力。","C":"Maslow需逐層滿足,非只高層次。","D":"Y理論強調個人組織需求調和。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"108110-N2-60":{"quick":"Y理論=人會自我引導自我控制(非需指揮);本題答案C「245」。","detail":{"background":"本題官方答案「245」。Y理論(McGregor)正確敘述:2人會自我引導、自我控制、4會尋求接受責任、5人有潛力創造力。選項1「人都需要被指揮監督」是X理論(錯)。故Y理論為「245」。核心:Y理論人性本善、自發、負責、有潛力。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"含1(需被指揮)是X理論。","B":"含1錯。","C":"正確(本題答案,245)。自我控制、負責、有潛力。","D":"含1錯。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"108110-N2-70":{"quick":"組織理論:新古典(修正理論)強調以人性需求進行組織管理。","detail":{"background":"組織理論:C「新古典(修正理論)強調以『人性需求』進行組織管理」正確(行為科學、霍桑、人際關係)。A「組織不需監督領導」錯;B「近代理論強調設計組織結構發揮效能」敘述須對應(此偏古典結構觀);D「古典理論強調民主式參與」錯(古典重效率標準集權,民主參與是新古典/現代)。故C。","options":{"A":"組織需監督領導。","B":"設計結構發揮效能偏古典。","C":"正確(本題答案)。新古典強調人性需求管理。","D":"民主參與非古典理論。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"109030-N2-58":{"quick":"人性樂觀進取自動自發自我實現=Y理論。","detail":{"background":"麥克葛羅格Y理論:主張人性「樂觀進取、樂於工作、能自動自發及自我實現」(B正確,人性本善)。X理論(人性懶惰需監督)、Z理論(團體參與)、權變理論(因情境調整)皆非。故Y理論(B)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"X理論是人性懶惰需監督。","B":"正確(本題答案)。樂觀自發自我實現=Y理論。","C":"Z理論是團體參與。","D":"權變理論是因情境調整。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"109030-N2-68":{"quick":"在職教育強化技能=Gillies管理過程的「轉化過程」。","detail":{"background":"Gillies護理管理過程(系統觀):輸入(人力物力資源)→轉化過程(管理活動:在職教育、訓練、領導等將輸入轉為成果)→輸出(成果)→回饋。「利用在職教育強化護理技能」=轉化過程(B正確)。故B。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"輸入是資源。","B":"正確(本題答案)。在職教育強化技能是轉化過程。","C":"輸出是成果。","D":"回饋是回饋修正。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"109110-N2-57":{"quick":"傳統vs修正管理理論:修正管理理論受人類行為思潮影響。","detail":{"background":"傳統(古典)vs修正(新古典)管理理論:B「修正管理理論有受到『人類行為思潮』(行為科學、人際關係)影響」正確。A「傳統理論不講究科學」錯(傳統的科學管理正是講究科學);C「兩者帶動系統理論」敘述須對應(系統理論是更後期);D「修正理論較不重視績效」錯(修正理論重人性但仍重績效)。故B。","options":{"A":"傳統的科學管理講究科學。","B":"正確(本題答案)。修正理論受人類行為思潮影響。","C":"系統理論是更後期。","D":"修正理論仍重績效。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"110030-N2-58":{"quick":"依情況變化適度調整永續經營=現代時期(系統理論)觀點。","detail":{"background":"「資訊時代、注意環境影響因素、依情況變化適度調整、永續經營」=新近/現代時期(系統理論、權變,強調與環境互動、開放系統、因應變化)(C正確)。古典(效率標準)、新古典(人性)皆非以環境互動調整為核心。故現代時期(C)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"古典時期重效率標準。","B":"新古典重人性需求。","C":"正確(本題答案)。依環境變化調整=現代系統時期。","D":"後現代非此。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"110030-N2-59":{"quick":"缺乏組織能力是內在因素;「文書工作繁雜」是外在因素。","detail":{"background":"時間管理障礙的內外因素:內在因素(個人習慣態度:難以拒絕他人、計畫不周全、缺乏組織能力、拖延);外在因素(環境/工作本身:文書工作繁雜、會議多、干擾)。選項D「文書工作繁雜」屬「外在因素」(本題答案)。A難以拒絕、B計畫不周、C缺乏組織能力皆內在。故D。","options":{"A":"難以拒絕他人是內在因素。","B":"計畫不周全是內在因素。","C":"缺乏組織能力是內在因素。","D":"正確(本題答案)。文書工作繁雜是外在因素。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"110110-N2-71":{"quick":"Y理論管理積極自發員工:依特質安排具挑戰性工作。","detail":{"background":"Y理論管理(員工積極自發有創意):C「依員工特質安排具挑戰性的工作(提供成長、發揮潛能)」最適當。A給金錢獎勵(偏保健因子)、B嚴格監督(X理論)、D強化安全感(低層次需求)皆非Y理論激勵自發員工的最佳方式。故C。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"金錢獎勵偏保健因子。","B":"嚴格監督是X理論。","C":"正確(本題答案)。依特質安排挑戰性工作。","D":"強化安全感是低層次需求。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"110110-N2-76":{"quick":"系統理論:輸出提高、輸入不變,即可提高生產力。","detail":{"background":"系統理論生產力=輸出/輸入。A「輸出量提高、輸入量不變,即可提高生產力」正確(產出增、投入同→生產力升)。B輸出不變輸入提高→生產力降;C輸出降輸入提高→生產力降;D輸出提高輸入降→生產力『升』(非降,D敘述錯)。故A。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。輸出提高輸入不變→生產力提高。","B":"輸出不變輸入提高→生產力降。","C":"輸出降輸入提高→生產力降。","D":"輸出提高輸入降→生產力升,非降。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"111030-N2-61":{"quick":"作業標準化適當分工提升服務量品質=科學管理理論。","detail":{"background":"護理部主任「重視護理作業標準化及適當分工,以提升服務量及品質」=科學管理理論(泰勒,標準化、專業分工、效率)(A正確)。管理程序學派(費堯五功能)、層次結構模式、行為科學學派皆非「標準化分工」核心。故科學管理(A)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。標準化分工=科學管理理論。","B":"管理程序學派是費堯五功能。","C":"層次結構模式非此。","D":"行為科學學派重人性。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"111030-N2-62":{"quick":"團體價值觀文化、員工參與式決策=Z理論。","detail":{"background":"強調「團體價值觀與文化、員工參與式決策(及長期僱用、整體關懷)」=Z理論(大內Ouchi)(B正確)。權變理論(因情境調整)、系統理論(輸入輸出)、管理者角色理論皆非。故Z理論(B)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"權變理論是因情境調整。","B":"正確(本題答案)。團體價值參與式決策=Z理論。","C":"系統理論是輸入輸出。","D":"管理者角色理論非此。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"112030-N2-59":{"quick":"行為科學學派=Maslow需求(2)+McGregor的X理論(3)?本題答案B「23」。","detail":{"background":"本題官方答案「23」。行為科學學派(新古典,重人性):2 Maslow需要層次理論、3 McGregor的X/Y理論(對人性的假設)皆屬行為科學。選項1「Smith的L理論」非標準理論(虛構);4...。故行為科學學派為「23」。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"含1(L理論)非標準。","B":"正確(本題答案,23)。Maslow需求、McGregor理論屬行為科學。","C":"含1錯。","D":"含...不符。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"112030-N2-66":{"quick":"組長中途請辭忘年會:了解困難從旁協助籌辦(授權後仍負責、支持)。","detail":{"background":"甲組長允諾籌辦忘年會後表示工作繁瑣請另指派,護理長最適當處理是「了解甲組長的困難,從旁協助籌辦(A)」——授權後主管仍負最終責任,應支持協助而非輕易撤換,培養員工能力。B另指派乙組長(放棄培養)、C指派乙組長一起(削弱甲)、D指派數位協助(過度)皆不如先了解協助。故A。","options":{"A":"正確(本題答案)。了解困難從旁協助籌辦。","B":"另指派乙組長放棄培養甲。","C":"指派乙一起削弱甲。","D":"指派數位協助過度。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"113030-N2-38":{"quick":"POSDCoRB:R代表Reporting(報告)。","detail":{"background":"顧力克(Gulick)POSDCoRB七功能:P規劃(Planning)、O組織(Organizing)、S用人(Staffing)、D指揮(Directing)、Co協調(Coordinating)、R報告(Reporting)、B預算(Budgeting)。選項A「R代表Reporting」正確。B P是Planning(非Process)、C O是Organizing(非Output)、D D是Directing(非Development)。故A。","options":{"A":"正確(本題答案)。R代表Reporting(報告)。","B":"P是Planning,非Process。","C":"O是Organizing,非Output。","D":"D是Directing,非Development。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"113180-N2-39":{"quick":"標準化、獎懲達成目標、注重工作績效=泰勒(科學管理)。","detail":{"background":"強調「護理工作標準化、以獎懲制度促使員工達成目標、注重工作績效」=泰勒(Taylor,科學管理:標準化、按件獎懲、效率績效)(B正確)。費堯(行政五功能)、韋伯(官僚)、大內(Z理論)皆非。故泰勒(B)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"費堯是行政管理五功能。","B":"正確(本題答案)。標準化獎懲績效=泰勒科學管理。","C":"韋伯是官僚理論。","D":"大內是Z理論。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"114030-N2-38":{"quick":"管理理論:管理科學學派主張運用數學計量處理問題、效益用數字表示。","detail":{"background":"管理理論:D「管理科學學派主張運用數學計量處理問題,所有效益都用數字表示」正確(作業研究、量化分析)。A修正vs傳統差異須對應(參與式決策團體價值是Z理論特徵);B「行為科學學派以日本Z理論最具代表」錯(Z理論屬現代/系統,非行為科學);C「管理程序學派以戴明為代表」錯(管理程序學派代表是費堯,戴明是品質管理)。故D。","options":{"A":"參與式決策團體價值是Z理論特徵。","B":"Z理論非行為科學學派代表。","C":"管理程序學派代表是費堯,非戴明。","D":"正確(本題答案)。管理科學學派用數學計量。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"114100-N2-24":{"quick":"影響體溫:新陳代謝速率增加會使體溫「上升」非下降;稱代謝增加體溫下降為錯誤。","detail":{"background":"影響體溫因素(本題歸管理站但屬生理):B老年人皮下脂肪薄、體溫較低(對);C女性排卵後黃體素使體溫升高(對);D晝夜節律傍晚4~8時體溫較清晨高(對)。選項A「新陳代謝速率增加會造成體溫『下降』」錯誤——代謝增加產熱增加、體溫『上升』,故A為錯誤(本題答案)。","options":{"A":"錯誤(本題答案)。代謝增加體溫上升,非下降。","B":"正確。老年人皮下脂肪薄體溫較低。","C":"正確。排卵後黃體素使體溫升。","D":"正確。傍晚體溫比清晨高。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"114170-N2-36":{"quick":"病房會議組成小組進行護理改善專案=Z理論(全員參與)。","detail":{"background":"「經病房會議討論決定組成小組進行護理改善專案」(全員參與、團體決策)=Z理論(C正確,大內:團體價值、參與式決策、全面參與)。X理論(監督獎懲)、Y理論(個人自發)、L理論(虛構)皆非。故Z理論(C)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"X理論是監督獎懲。","B":"Y理論是個人自發。","C":"正確(本題答案)。全員參與專案=Z理論。","D":"L理論非標準理論。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"115030-N2-40":{"quick":"Gillies管理五步驟「規劃」包括=制定標準(3)+擬定政策(4)+作成決策(5)+編列預算(6)。本題答案C「3456」。","detail":{"background":"本題官方答案「3456」。Gillies(季麗絲)護理管理五大步驟:規劃→組織→人事→領導→控制。其中「規劃(planning)」內容包括:3制定標準、4擬定政策、5作成決策、6編列預算(規劃面的政策標準預算決策)。選項1「設定評估內容」、2「做好工作設計」偏組織/控制面。故規劃含「3456」。","options":{"A":"1234含工作設計(組織面)不符。","B":"2345不符。","C":"正確(本題答案,3456)。制定標準、擬政策、作決策、編預算。","D":"1256不符。"},"sources":["新文京《護理行政》管理理論","華杏《護理行政學》管理學派與功能"]}},"101030-N2-57":{"quick":"培訓關懷特質=願意花時間了解、設身處地為他解決(身教關懷)。","detail":{"background":"培養新進人員「關懷(caring)」特質,最有效是「願意花時間了解其問題、設身處地為他解決(C)」——以身作則、實際關懷示範,讓新人感受並學習關懷。A嚴格督導技術、B寫讀後心得、D辦演講研習皆偏知識傳遞,難培養關懷情意。故C。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"嚴格督導難培養關懷。","B":"寫心得偏知識。","C":"正確(本題答案)。花時間了解、設身處地=身教關懷。","D":"演講研習偏知識傳遞。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"101030-N2-59":{"quick":"激勵溝通、支持部屬意見、帶來創新=轉換型領導。","detail":{"background":"轉換型(轉型)領導(transformational):以激勵、願景、個人魅力提升部屬、帶來創新與超越期望。「以激勵方式溝通、支持部屬意見、為組織帶來創新」=轉換型(B正確)。交易型(賞罰交換)、分享型、魅力型(個人魅力但未必創新)皆非最佳。故轉換型(B)。","options":{"A":"交易型是賞罰交換。","B":"正確(本題答案)。激勵創新=轉換型領導。","C":"分享型非此。","D":"魅力型偏個人魅力。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"101030-N2-73":{"quick":"腦力激盪提解決方法=民主式領導。","detail":{"background":"護理長讓護理師「以腦力激盪方式提出解決問題的方法」(鼓勵參與、集思廣益)=民主式(參與式)領導(B正確)。權威式(主管獨斷)、放任式(不干預)、說服式皆非「鼓勵全員提案」。故民主式(B)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"權威式是主管獨斷。","B":"正確(本題答案)。腦力激盪參與=民主式領導。","C":"放任式是不干預。","D":"說服式是說服接受。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"101030-N2-79":{"quick":"以精力充沛、能力強等條件甄選=特性(屬性)理論。","detail":{"background":"特性(屬性/特質)理論(Trait Theory):認為領導者具備某些先天特質(精力充沛、表達能力強、聰明、人際好)。以「個人特質條件」甄選領導者=特性理論(B正確)。管理方格(關心生產/員工)、情境理論(因情境)、期望模式皆非以特質為依據。故特性理論(B)。","options":{"A":"管理方格理論是關心生產/員工。","B":"正確(本題答案)。以個人特質甄選=特性理論。","C":"情境理論是因情境調整。","D":"期望模式理論非此。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"101110-N2-60":{"quick":"親自教導說明醫院評鑑=專技(專家)影響力。","detail":{"background":"領導者影響力(權力)種類:專技/專家權(專業知識能力)、法統/合法權(職位)、獎酬權、強制/脅迫權、參考/榜樣權、資訊權。護理長「親自教導說明醫院評鑑內容」(運用專業知識)=專技(專家)影響力(A正確)。故A。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。親自教導專業=專技(專家)影響力。","B":"法統是職位權力。","C":"獎酬是給予報酬。","D":"脅迫是懲罰威脅。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"101110-N2-72":{"quick":"危機處理「錯誤」=要讓全體員工共同參與(危機應由核心小組快速決策)。","detail":{"background":"危機發生時處理:領導者與部屬充分溝通(對)、運用80-20法則(對,聚焦關鍵)、組織內部運作紮實是預防危機第一步(對)。選項A「要讓全體員工共同參與」錯誤(本題答案)——危機處理講求「時效、由核心應變小組快速決策指揮」,不宜全員參與(耗時混亂)。故A。","options":{"A":"錯誤(本題答案)。危機應核心小組快速決策,非全員參與。","B":"正確。領導者與部屬充分溝通。","C":"正確。運用80-20法則。","D":"正確。內部運作紮實預防危機。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"101110-N2-73":{"quick":"低成熟度員工「最不適當」=授權型(低成熟者需指導非授權)。","detail":{"background":"Hersey-Blanchard情境領導:依員工成熟度配領導型態——低成熟(M1)用「告知型(telling,高任務低關係)」、低中(M2)用「銷售/推銷型(selling)」、中高(M3)用「參與型(participating)」、高(M4)用「授權型(delegating)」。對「低或低到中成熟度」員工,最不適當的是「授權型」(C正確,授權適用高成熟者)。故C。","options":{"A":"告知型適用低成熟度。","B":"參與型適用中高成熟度(本題問最不適當為授權)。","C":"正確(本題答案)。授權型適用高成熟度,對低成熟最不適當。","D":"銷售型適用低中成熟度。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"101110-N2-79":{"quick":"設挑戰目標激勵達成績效=途徑目標理論。","detail":{"background":"途徑(路徑)目標理論(House):領導者為部屬釐清達成目標的途徑、設定挑戰性目標、提供支持以激勵績效(成就導向型)。「針對有潛力者設挑戰性目標、激勵達成績效」=途徑目標理論(A正確)。特質理論、情境模式、管理方格皆非。故途徑目標理論(A)。","options":{"A":"正確(本題答案)。設挑戰目標激勵績效=途徑目標理論。","B":"特質理論是先天特質。","C":"情境模式是因成熟度。","D":"管理方格是關心生產/員工。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"102030-N2-61":{"quick":"高關心生產低關心員工(9,1)=職責(權威服從)管理。","detail":{"background":"Blake-Mouton管理方格(X軸關心生產、Y軸關心員工):(1,1)放任/無為、(1,9)鄉村俱樂部(高員工低生產)、(9,1)職責/權威服從(高生產低員工)、(5,5)中庸、(9,9)團隊管理。「高關心生產、低關心員工(9,1)」=職責管理(C正確)。故C。","options":{"A":"團隊管理是(9,9)。","B":"放任管理是(1,1)。","C":"正確(本題答案)。(9,1)=職責(權威服從)管理。","D":"鄉村俱樂部是(1,9)。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"102030-N2-73":{"quick":"參與式領導缺點=因個人對工作需求而影響決策。","detail":{"background":"參與式(民主式)領導缺點:C「因個人對工作的需求而影響決策(各持己見、決策受個人立場左右、較費時)」正確。A降低工作滿意度、B降低獨立思考、D降低自尊感皆是「權威式/X理論」的缺點,非參與式(參與式反而提升滿意與自尊)。故C。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"參與式提升滿意度,非降低。","B":"參與式促進獨立思考。","C":"正確(本題答案)。個人需求影響決策是參與式缺點。","D":"參與式提升自尊,非降低。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"102110-N2-60":{"quick":"依員工成熟度調整=情境理論。","detail":{"background":"情境理論(Situational theory,Hersey-Blanchard):領導型態依「員工成熟度」調整(告知/銷售/參與/授權)。「依員工成熟度作調整」=情境理論(A正確)。需求理論、方格理論、屬性理論皆非以成熟度為核心。故情境理論(A)。","options":{"A":"正確(本題答案)。依員工成熟度調整=情境理論。","B":"需求理論是激勵。","C":"方格理論是關心生產/員工。","D":"屬性理論是先天特質。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"102110-N2-68":{"quick":"大量傷患緊急命令派員=集權式領導。","detail":{"background":"醫院啟動大量傷患機制、督導「命令」病房派員支援並重新分配工作(緊急、由上而下命令)=集權式(權威式)領導(A正確)。緊急情況需快速集中決策指揮,參與式、放任式、民主式皆耗時不適危機。故集權式(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。緊急命令派員=集權式領導。","B":"參與式耗時不適危機。","C":"放任式是不干預。","D":"民主式耗時不適危機。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"103030-N2-61":{"quick":"剛畢業新進護理師(低成熟)=指導(告知)式。","detail":{"background":"Hersey-Blanchard情境領導:剛畢業、欠缺經驗(低成熟度M1)應採「指導(告知,telling)式」——高任務低關係、明確指導該做什麼如何做。參與式、銷售式、放任式適用較高成熟度。故指導式(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。低成熟新人用指導(告知)式。","B":"參與式適用中高成熟。","C":"銷售式適用低中成熟。","D":"放任式適用高成熟。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104030-N2-73":{"quick":"個人魅力、建立願景、激勵部屬更努力=轉換型領導。","detail":{"background":"轉換型領導(transformational):藉「個人魅力、建立願景、激勵部屬」提升部屬態度與努力、激發超越期望。題幹描述=轉換型(D正確)。情境領導(因成熟度)、交易型(賞罰交換)、分享型皆非。故轉換型(D)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"情境領導是因成熟度。","B":"交易型是賞罰交換。","C":"分享型非此。","D":"正確(本題答案)。魅力願景激勵=轉換型領導。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104030-N2-75":{"quick":"部屬忠誠支持程度=權變理論(費德勒)的情境因素。","detail":{"background":"費德勒(Fiedler)權變理論三情境因素:領導者與部屬的關係(部屬的忠誠支持)、工作結構、職位權力。「領導者感受到部屬的忠誠及支持程度」=權變理論的情境因素(領導者-部屬關係)(A正確)。特質、行為、管理方格理論皆非以情境因素分析。故權變理論(A)。","options":{"A":"正確(本題答案)。部屬忠誠支持=權變理論情境因素。","B":"特質理論是先天特質。","C":"行為理論是領導行為。","D":"管理方格是關心生產/員工。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104030-N2-76":{"quick":"第五級領導「不」含逆境歸咎運氣(第五級領導逆境反躬自省、成功歸功他人)。","detail":{"background":"柯林斯第五級領導特質:謙沖為懷的個性(對)、將個人名利置之度外以組織成功為念(對)、妥善安排接班計畫(對)。選項B「在逆境中會歸咎於運氣不好」不屬第五級領導(本題答案)——第五級領導「成功歸功他人/運氣,失敗反躬自省(窗與鏡)」,逆境不諉過於運氣。故B。","options":{"A":"第五級領導謙沖為懷。","B":"正確(本題答案)。逆境諉過運氣非第五級領導(應反躬自省)。","C":"第五級領導置個人名利於度外。","D":"第五級領導妥善安排接班。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104030-N2-77":{"quick":"費德勒權變「不」含溝通模式(三情境=工作結構、職位權力、領導者部屬關係)。","detail":{"background":"費德勒(Fiedler)權變理論三個情境因素:工作結構(A)、職位權力(B)、領導者與部屬的關係(D)。選項C「溝通模式」不是費德勒的情境因素(本題答案)。故C。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"工作結構是費德勒情境因素。","B":"職位權力是費德勒情境因素。","C":"正確(本題答案)。溝通模式非費德勒情境因素。","D":"領導者部屬關係是費德勒情境因素。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104030-N2-78":{"quick":"兩位資淺護理師需處理10病人=告知型(明確指導)。","detail":{"background":"Hersey-Blanchard情境領導:兩位資歷淺(低成熟度、能力意願不足)護理師面對突來10位病人求救,應採「告知型(telling)——給予明確指導告知該做什麼、如何做」(D正確)。授權型、參與型、推銷型適用較高成熟度。故告知型(D)。","options":{"A":"授權型適用高成熟。","B":"參與型適用中高成熟。","C":"推銷型適用低中成熟。","D":"正確(本題答案)。資淺需明確指導=告知型。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104100-N2-60":{"quick":"精力充沛具影響力自控判斷力受愛戴=屬性(特質)理論。","detail":{"background":"屬性(特質)理論:領導者具備某些個人特質(精力充沛、影響力、情緒自控、良好判斷決策力)而受愛戴。題幹以「個人特質」描述受愛戴的護理長=屬性理論(A正確)。情勢/情境理論(因情境)、目標理論皆非以特質為據。故屬性理論(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。個人特質受愛戴=屬性(特質)理論。","B":"情勢理論是因情境。","C":"目標理論是途徑目標。","D":"情境理論是因成熟度。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104100-N2-73":{"quick":"請督導協助護理長完成中心工作目標=授權(delegation)。","detail":{"background":"護理部主任「請各督導協助護理長完成護理部年度中心工作目標」(將任務交付下級執行)=授權(delegation)(A正確)。賦權(empowerment,給予能力與自主)、決策、控制皆非「將任務委派下級」。故授權(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。將任務委派下級=授權(delegation)。","B":"賦權是給予能力自主。","C":"決策是做決定。","D":"控制是管制。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104100-N2-77":{"quick":"以身作則關懷病人帶動人員=榜樣影響力。","detail":{"background":"護理長「以關懷態度對待病人,無形中護理人員也主動關懷」(以身作則、被效法)=榜樣(參考,referent)影響力(B正確)。專技(專業知識)、知識、獎酬皆非「被效法的榜樣」。故榜樣影響力(B)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"專技是專業知識。","B":"正確(本題答案)。以身作則被效法=榜樣影響力。","C":"知識影響力非此。","D":"獎酬是給予報酬。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104100-N2-78":{"quick":"失火緊急通知回院搬移病人=權威式領導。","detail":{"background":"醫院失火、護理部主任「緊急通知人員立即回院、要求各單位立即(配合)」(緊急、由上命令)=權威式(集權式)領導(A正確)。緊急危機需快速集中指揮,民主式、放任式、參與式耗時不適。故權威式(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。失火緊急命令=權威式領導。","B":"民主式耗時不適危機。","C":"放任式是不干預。","D":"參與式耗時不適危機。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"104100-N2-80":{"quick":"「我很忙改天再談」排班衝突=逃避。","detail":{"background":"護理長對排班衝突說「我現在很忙,這件事改天再談」(迴避、拖延)=逃避(Avoidance)(A正確,低關心自己也低關心他人)。順應、妥協、協同合作皆非。故逃避(A)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"正確(本題答案)。改天再談=逃避。","B":"順應是成全他人。","C":"妥協是各退一步。","D":"協同合作是雙贏。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"105030-N2-77":{"quick":"培育有潛能未來領導者=成就導向型(路徑目標)。","detail":{"background":"路徑-目標理論四領導型態:指導型、支援型、參與型、成就導向型。培育「有發展潛能的未來領導者」最適用「成就導向型(設定挑戰性目標、信任部屬能達成、激發追求卓越)」(C正確)。故成就導向型(C)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"指導型適用任務不明者。","B":"參與型適用需參與感者。","C":"正確(本題答案)。培育潛力領導者=成就導向型。","D":"支援型適用需支持者。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"105030-N2-78":{"quick":"工作完成後邀同仁慶功歡唱=獎酬影響力。","detail":{"background":"護理長「工作完成後邀同仁慶功歡唱」(給予正向報酬、聯誼獎勵)=獎酬(獎勵)影響力(B正確)。法統(職位)、資料(資訊)、專技(專業)皆非「給予報酬獎勵」。故獎酬(B)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"法統是職位權力。","B":"正確(本題答案)。慶功歡唱獎勵=獎酬影響力。","C":"資料是資訊權。","D":"專技是專業知識。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"105090-N2-73":{"quick":"增加權力「錯誤」=權力最重要在於互斥關係(權力在於互賴非互斥)。","detail":{"background":"護理師增加自身權力:對單位需求敏感增加重要性(對)、具他人未有能力增加依賴性(對)、強化專業增加不可取代性(對)。選項D「權力最重要在於『互斥』關係」錯誤(本題答案)——權力來自「互賴(依賴)關係」(他人對你的依賴),非互斥。故D。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"對需求敏感增加重要性。","B":"獨特能力增加依賴性。","C":"強化專業增加不可取代性。","D":"正確(本題答案)。權力在於互賴,非互斥。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"105090-N2-74":{"quick":"協助成員提升自我效能與自我管理=賦權(empowerment)。","detail":{"background":"賦權(empowerment):領導者「協助成員提升自我效能、增進自我管理能力」、授予能力與自主。題幹描述=賦權(A正確)。道德領導、轉型領導、策略領導皆非「提升自我效能與自我管理」核心。故賦權(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。提升自我效能自我管理=賦權。","B":"道德領導重倫理。","C":"轉型領導重願景激勵。","D":"策略領導重策略。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"105090-N2-75":{"quick":"藉角色澄清與工作要求引導激勵=交易型領導。","detail":{"background":"交易型領導(transactional):藉「角色澄清、工作要求、賞罰交換(達標給獎)」引導激勵員工。題幹「藉角色澄清與工作要求引導激勵」=交易型(B正確)。魅力領導、轉換型(願景激勵超越)、參與式皆非「角色澄清+工作要求」。故交易型(B)。","options":{"A":"魅力領導重個人魅力。","B":"正確(本題答案)。角色澄清工作要求=交易型領導。","C":"轉換型重願景激勵超越。","D":"參與式重共同決策。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"105090-N2-76":{"quick":"轉換型領導「不」含生產力(構成=魅力影響、啟發、激勵、個別關懷)。","detail":{"background":"轉換型領導四構成要素(4I):理想化影響力(idealized influence/魅力)、啟發激勵(inspirational motivation)、智能啟發(stimulation)、個別關懷(individualized consideration)。選項A「生產力(productivity)」不屬轉換型領導構成要素(本題答案)。故A。","options":{"A":"正確(本題答案)。生產力非轉換型領導要素。","B":"影響力是轉換型要素。","C":"啟發力是轉換型要素。","D":"激勵是轉換型要素。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"105090-N2-77":{"quick":"情境領導最關鍵要素=員工的成熟度。","detail":{"background":"Hersey-Blanchard情境領導理論中,領導行為判斷「最關鍵」的要素是「員工的成熟度(maturity/readiness)」(B正確)——依成熟度高低決定告知/銷售/參與/授權。上下溝通、主管直覺、組織型態皆非最關鍵。故員工成熟度(B)。","options":{"A":"上下溝通非最關鍵。","B":"正確(本題答案)。情境領導最關鍵=員工成熟度。","C":"主管直覺非依據。","D":"組織型態非最關鍵。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"105090-N2-78":{"quick":"新人求助改善知識技能:護理長用專家權影響。","detail":{"background":"新進護理師主動找護理長討論如何改善照護知識技能,護理長應運用「專家(專技)權(expert power)」——以專業知識能力指導協助(B正確)。強制權(懲罰)、合法權(職位)、資訊權皆非「以專業指導」。故專家權(B)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"強制權是懲罰威脅。","B":"正確(本題答案)。以專業指導=專家權。","C":"合法權是職位。","D":"資訊權是掌握資訊。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"106030-N2-77":{"quick":"頒「進步小天使」獎=獎勵權。","detail":{"background":"護理長「頒進步小天使獎」(給予獎勵肯定)=獎勵(獎酬,reward)權(D正確)。強制權(懲罰)、專家權(專業)、合法權(職位)皆非「給予獎勵」。故獎勵權(D)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"強制權是懲罰。","B":"專家權是專業知識。","C":"合法權是職位。","D":"正確(本題答案)。頒獎=獎勵權。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"106030-N2-74":{"quick":"對部屬友善關心需求作決策參考=支持型(路徑目標)。","detail":{"background":"路徑-目標理論:支持型(支援型)領導「對部屬友善、關心需求、營造和諧」。題幹「對部屬十分友善、關心需求、作為決策參考」=支持型(B正確)。指導型(明確任務)、參與型(共同決策)、成就型(挑戰目標)皆非。故支持型(B)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"指導型是明確任務。","B":"正確(本題答案)。友善關心需求=支持型。","C":"參與型是共同決策。","D":"成就型是挑戰目標。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"106110-N2-74":{"quick":"管理方格理論「錯誤」=X軸是領導者對員工的關心程度(X軸應為對生產的關心)。","detail":{"background":"Blake管理方格理論:以X軸(對『生產/工作』的關心)、Y軸(對『員工/人員』的關心)標出五種領導行為(對)、屬行為理論(對)、依方格位置發展合適領導(對)。選項A「X軸是領導者對『員工』的關心程度」錯誤(本題答案)——X軸應為對「生產(工作)」的關心,Y軸才是對員工的關心。故A。","options":{"A":"正確(本題答案)。X軸是對生產的關心,非對員工。","B":"正確。X、Y軸標出五種領導行為。","C":"正確。屬行為理論觀點。","D":"正確。依方格位置發展合適領導。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"106110-N2-75":{"quick":"氣爆院長現場坐鎮命令指派=集權式領導。","detail":{"background":"瓦斯氣爆傷患、院長「立即至現場坐鎮指揮、命令各負責人、指派資深人員」(緊急、集中命令)=集權式(權威式)領導(A正確)。緊急危機需快速集中指揮。故集權式(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。氣爆現場坐鎮命令=集權式領導。","B":"民主式耗時不適危機。","C":"放任式是不干預。","D":"參與式耗時不適危機。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"106111-N2-78":{"quick":"醫院評鑑請護理長主動選擇負責部分=參與式領導。","detail":{"background":"醫院評鑑準備「請每位護理長主動選擇負責的部分」(鼓勵自主參與)=參與式領導(A正確)。放任式(完全不管)、權威式(指派命令)、說服式皆非「讓部屬自主選擇參與」。故參與式(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。主動選擇負責=參與式領導。","B":"放任式是完全不管。","C":"權威式是指派命令。","D":"說服式是說服接受。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"106111-N2-79":{"quick":"管理者vs領導者:管理者權力來自職權、領導者權力來自個人特質。","detail":{"background":"管理者與領導者比較:B「管理者的權力來自『職權(職位)』,而領導者的權力來自『個人特質(影響力)』」正確。A顛倒(創新是領導者、維持平衡是管理者);C「管理者突出、領導者配合」顛倒(領導者突出);D「管理者重互動、領導者重結果」顛倒(管理者重結果/把事做對、領導者重做對的事/願景)。故B。","options":{"A":"創新是領導者,維持平衡是管理者(A顛倒)。","B":"正確(本題答案)。管理者權力來自職權、領導者來自特質。","C":"領導者較突出(C顛倒)。","D":"管理者重結果、領導者重願景(D顛倒)。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"107030-N2-75":{"quick":"最能激勵部屬不斷提升自我=轉換型領導。","detail":{"background":"最能「激勵部屬不斷提升自我能力」(超越期望、自我成長)=轉換型領導(B正確,願景激勵、智能啟發、個別關懷)。魅力型(偏個人魅力)、獨裁式、交易型(賞罰交換)皆不如轉換型能持續激發自我提升。故轉換型(B)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"魅力型偏個人魅力。","B":"正確(本題答案)。激勵自我提升=轉換型領導。","C":"獨裁式是命令。","D":"交易型是賞罰交換。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"107110-N2-74":{"quick":"民主式領導者較少藉助=職位權威。","detail":{"background":"民主式(參與式)領導者藉助:影響力、人際關係、溝通協調(達成群體目標)。「較少藉助」的是「職位權威(B)」——民主式靠參與協商而非職位命令權威(職位權威是權威式所倚重)。故職位權威(B)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"民主式藉助影響力。","B":"正確(本題答案)。民主式較少藉助職位權威。","C":"民主式藉助人際關係。","D":"民主式藉助溝通協調。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"108020-N2-74":{"quick":"要求穿戴制服識別證=合法權。","detail":{"background":"護理主管「要求上班穿戴規範制服及識別證」(依職位職權要求遵守規定)=合法(法統)權(C正確)。資訊權、強制權(懲罰)、專家權(專業)皆非「依職位要求遵守」。故合法權(C)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"資訊權是掌握資訊。","B":"強制權是懲罰。","C":"正確(本題答案)。依職位要求=合法權。","D":"專家權是專業知識。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"108020-N2-77":{"quick":"請同仁票選最優良護理人員=民主式領導。","detail":{"background":"護理長「請單位同仁票選最優良護理人員」(全員投票參與)=民主式領導(C正確)。參與式與民主式相近,但「票選」最典型體現民主(多數決參與)。放任式、權威式皆非。故民主式(C)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"參與式相近但票選典型為民主。","B":"放任式是不管。","C":"正確(本題答案)。票選=民主式領導。","D":"權威式是命令。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"108110-N2-76":{"quick":"以組織目標激勵、激發才智、感覺被尊重=轉換型領導。","detail":{"background":"護理長「以組織目標運用激勵人心方式溝通、激發部屬才智、讓部屬感覺被尊重認同」=轉換型領導(A正確,願景激勵、智能啟發、個別關懷)。交易型(賞罰)、魅力型(個人魅力)、分享型皆非。故轉換型(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。激勵才智被尊重=轉換型領導。","B":"交易型是賞罰交換。","C":"魅力型偏個人魅力。","D":"分享型非此。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"109110-N2-61":{"quick":"權變理論:調整內部結構須同時考慮組織外在因素。","detail":{"background":"權變理論(contingency):C「調整組織內部結構時,必須同時考慮組織的外在因素(環境)」正確——沒有最好的管理方式,須因應內外情境調整。A「氛圍不受領導風格影響」錯;B「動盪環境就無法達標」錯;D「不能用不同管理方式」錯(權變正是用不同方式)。故C。","options":{"A":"氛圍受領導風格影響。","B":"動盪環境仍可達標。","C":"正確(本題答案)。調整結構須考慮外在因素。","D":"權變正是用不同方式。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"109110-N2-75":{"quick":"管理方格理論最關鍵要素=關心部屬及工作。","detail":{"background":"Blake-Mouton管理方格理論的最關鍵構面是「關心部屬(員工)及關心工作(生產)」兩個面向(D正確)——以這兩軸標出領導風格。增加成熟度(情境理論)、激勵、領導者行為皆非管理方格的核心兩構面。故關心部屬及工作(D)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"增加成熟度是情境理論。","B":"激勵部屬非管理方格構面。","C":"領導者行為過於籠統。","D":"正確(本題答案)。關心部屬及工作是管理方格兩構面。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"110030-N2-72":{"quick":"資淺有意願員工=說明決策並提供澄清機會(銷售/推銷型)。","detail":{"background":"Hersey-Blanchard情境領導:資淺(能力不足)但「有意願」(M2,低中成熟度)→採「銷售/推銷型(selling)——說明決策並提供機會讓同仁澄清疑問」(A正確)。明確命令(告知型,適M1無意願)、協調分享(參與型M3)、讓參與建立SOP(M3)皆非M2最佳。故A。","options":{"A":"正確(本題答案)。資淺有意願(M2)=銷售型(說明並澄清)。","B":"協調分享是參與型(M3)。","C":"明確命令是告知型(M1)。","D":"讓參與建SOP是參與型(M3)。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"111110-N2-61":{"quick":"道格拉斯管理過程=確認需求(1)+現況分析(2)+擬定政策方案(3)?本題答案C「345」。","detail":{"background":"本題官方答案「345」。道格拉斯(Douglass)護理管理過程包括:3擬定政策與方案、4建立護理標準、5(評值/控制等)。選項1「確認基層人員需求」、2「進行現況分析」屬規劃前置但本題正確組合為「345」。核心:Douglass管理過程含政策方案、標準、評值。","options":{"A":"123非官方組合。","B":"234不符。","C":"正確(本題答案,345)。擬政策方案、建標準、評值。","D":"145不符。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"111110-N2-73":{"quick":"心理賦權:向同仁說明專案改善的必要性和意義。","detail":{"background":"Spreitzer心理賦權(psychological empowerment)四構面:意義(meaning)、自我效能(competence)、自主(self-determination)、影響力(impact)。A「護理長向同仁說明專案改善的『必要性和意義』」=賦予「意義」感(A正確,心理賦權)。B指定圈長、C要求定期回報、D自行協商皆非賦予意義感的賦權。故A。","options":{"A":"正確(本題答案)。說明必要性和意義=心理賦權(意義感)。","B":"指定圈長非賦權意義。","C":"要求回報是控制。","D":"自行協商非賦予意義。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"111110-N2-76":{"quick":"管理與領導:管理者擁有特定的影響力和權力。","detail":{"background":"管理與領導:B「管理者擁有特定的影響力和權力(職權)」正確。A「領導者是組織任命有正式職位」錯(『管理者』才是組織任命有職位,領導者可非正式);C「領導者把事情做對」錯(『管理者』把事做對do things right,領導者做對的事do right things);D「管理者引導群體做對的事」錯(顛倒,領導者做對的事)。故B。","options":{"A":"管理者才是組織任命有職位。","B":"正確(本題答案)。管理者擁有影響力和權力。","C":"管理者把事做對,領導者做對的事。","D":"領導者做對的事(D顛倒)。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"112030-N2-77":{"quick":"情境領導依=員工成熟度決定領導型態。","detail":{"background":"Hersey-Blanchard情境領導理論:領導者應依「員工成熟度(readiness)」決定領導型態(B正確)——成熟度高低對應告知/銷售/參與/授權。上下溝通、主管直覺、組織型態皆非。故員工成熟度(B)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"上下溝通非依據。","B":"正確(本題答案)。依員工成熟度決定領導型態。","C":"主管直覺非依據。","D":"組織型態非依據。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"112030-N2-79":{"quick":"依內外環境適度調配帶領達成目標=權變理論。","detail":{"background":"「依單位內部及外部環境作適度工作調配、帶領團隊達成共同目標」(因情境調整)=權變理論(C正確,因應內外情境調整管理方式)。特質理論(先天特質)、情境理論(雖相近但本題以權變的內外環境調配為答案)、偉人理論皆非。故權變理論(C)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"特質理論是先天特質。","B":"情境理論偏依成熟度。","C":"正確(本題答案)。依內外環境調配=權變理論。","D":"偉人理論非此。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"112110-N2-78":{"quick":"學有專精待人好被諮詢生涯=榜樣影響力。","detail":{"background":"李督導長「學有專精、待人接物頗獲好評」,護理師主動找她諮詢「個人生涯規畫及未來發展」(因敬重其人品典範而效法請益)=榜樣(referent)影響力(C正確)。法統(職位)、強制(懲罰)、專家(專業知識,若諮詢專業技術則是專家權,但此處諮詢『生涯發展』偏向因敬重其為人典範)。故榜樣影響力(C)。","options":{"A":"法統是職位權力。","B":"強制是懲罰。","C":"正確(本題答案)。因敬重典範請益=榜樣影響力。","D":"專家權偏專業技術指導。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"112110-N2-80":{"quick":"資深技術熟練、交待任務即離去=放任式領導。","detail":{"background":"10位急診病患同到、護理長因「當班護理師技術熟練且資深」而「將任務交待後即離去」(信任成熟員工、不干預)=放任式領導(C正確,適用高成熟度自主員工)。集權式(命令)、民主式(參與)、參與式皆非「交待後即離去不管」。故放任式(C)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"集權式是命令掌控。","B":"民主式是共同參與。","C":"正確(本題答案)。交待後即離去=放任式領導。","D":"參與式是共同決策。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"113030-N2-48":{"quick":"N1層級指導下可完成=推銷型(selling)。","detail":{"background":"Hersey-Blanchard情境領導:林護理師工作1.5年、「指導下可完成」整體照護、剛晉升N1(低中成熟度M2,有意願但能力仍需支持)→採「推銷/銷售型(selling)——高任務高關係,說明決策並支持」(B正確)。告知型(M1)、參與型(M3)、授權型(M4)皆非M2最佳。故推銷型(B)。","options":{"A":"告知型適用M1(無意願)。","B":"正確(本題答案)。N1指導下可完成(M2)=推銷型。","C":"參與型適用M3。","D":"授權型適用M4。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"113180-N2-50":{"quick":"同時考慮工作結構、領導者成員關係、職位權力=情境(權變)理論。","detail":{"background":"同時考慮「工作結構、領導者與成員關係、職位權力」三情境因素發展領導行為=情境(權變)理論(費德勒)(D正確)。管理方格(關心生產/員工)、途徑目標(釐清路徑)、特質理論(先天特質)皆非此三情境因素。故情境(權變)理論(D)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"管理方格是關心生產/員工。","B":"途徑目標是釐清路徑。","C":"特質理論是先天特質。","D":"正確(本題答案)。三情境因素=情境(權變)理論(費德勒)。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"114100-N2-48":{"quick":"關心業績效率、少關心需求=職責管理式領導(9,1)。","detail":{"background":"Blake-Mouton管理方格:「關心業績、要求達成任務效率,較少關心護理師需求」=職責管理式領導(produce or perish,9,1型,高生產低員工)(B正確)。無為式(1,1)、團隊管理(9,9)、中庸(5,5)皆非。故職責管理式(B)。","options":{"A":"無為式是(1,1)低生產低員工。","B":"正確(本題答案)。高業績低關心=職責管理式(9,1)。","C":"團隊管理是(9,9)。","D":"中庸式是(5,5)。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"114170-N2-46":{"quick":"給予升職加薪正面評價=獎勵權。","detail":{"background":"領導者「給予獎勵(升職、加薪、正面評價與鼓勵)」=獎勵(reward)權(A正確)。專家權(專業)、資訊權(資訊)、參考權(榜樣)皆非「給予獎勵」。故獎勵權(A)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"正確(本題答案)。升職加薪評價=獎勵權。","B":"專家權是專業知識。","C":"資訊權是掌握資訊。","D":"參考權是榜樣典範。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"114170-N2-47":{"quick":"新人求助精進知識技能=專家影響力。","detail":{"background":"新進護理師「找護理長討論如何精進臨床照護知識及技能」,護理長應運用「專家(expert)影響力」——以專業知識技能指導(C正確)。強制(懲罰)、榜樣(典範)、法統(職位)皆非「以專業指導精進技能」。故專家影響力(C)。領導理論演進:特質論(先天特質)→行為論(管理方格Blake-關心生產X軸/關心員工Y軸)→權變論(費德勒-工作結構職位權力領導者部屬關係;情境Hersey-Blanchard依員工成熟度配告知M1/銷售M2/參與M3/授權M4;路徑目標)→新近(轉換型-願景激勵超越/交易型-賞罰交換)。權力:法統合法/獎酬/強制/專家專技/榜樣參考/資訊。","options":{"A":"強制影響力是懲罰。","B":"榜樣影響力是典範效法。","C":"正確(本題答案)。以專業指導技能=專家影響力。","D":"法統影響力是職位。"},"sources":["新文京《護理行政》領導理論","華杏《護理行政學》領導型態與權力"]}},"102030-N2-5":{"quick":"想康復回校與好友打球=愛與歸屬感需求。","detail":{"background":"Maslow五大需求:生理→安全→愛與歸屬→自尊→自我實現。國中生「想康復回學校和好朋友一起打球」(渴望同儕互動、歸屬)=愛與歸屬感需求(B正確)。故B。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"生理需求是基本生存。","B":"正確(本題答案)。回校與好友互動=愛與歸屬感。","C":"自尊是受尊重肯定。","D":"自我實現是潛能發揮。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"102110-N2-55":{"quick":"人類最高層次需求=自我實現。","detail":{"background":"Maslow需求層級最高層是「自我實現(self-actualization)」——發揮潛能、實現自我理想(D正確)。生理、愛與歸屬、自尊皆為較低層次。故自我實現(D)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"生理需求最低層。","B":"愛與歸屬感是第三層。","C":"自尊自重是第四層。","D":"正確(本題答案)。最高層是自我實現。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"103100-N2-69":{"quick":"鼓勵照顧SARS病人=滿足安全需求。","detail":{"background":"SARS專責隔離病房鼓勵護理人員照顧SARS病人,依Maslow應先滿足「安全(safety)需求」——提供充足防護裝備、感染管制、保障人身安全(B正確)。確保安全後才談更高層次需求。故安全(B)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"生理需求非此情境核心。","B":"正確(本題答案)。照顧SARS先滿足安全需求(防護)。","C":"愛與歸屬非首要。","D":"自我實現是高層次。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"104100-N2-58":{"quick":"新病人環境介紹=安全需求。","detail":{"background":"護理師「給新病人環境介紹」(熟悉環境、減少陌生不安、增加安全感)=Maslow安全需求(B正確)。生理、自尊、自我實現皆非「環境介紹」對應的需求。故安全需求(B)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"生理需求是基本生存。","B":"正確(本題答案)。環境介紹=滿足安全需求。","C":"自尊是受尊重。","D":"自我實現是潛能發揮。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"104100-N2-67":{"quick":"晉升行政主管=雙因子理論的「成就」滿足。","detail":{"background":"Herzberg雙因子理論:激勵因子(內在:成就、肯定、工作本身、責任、升遷成長);保健因子(外在:薪資、安全、人際、工作環境)。「晉升為行政主管」=「成就(achievement)」激勵因子(C正確)。薪資、安全、人際皆保健因子。故成就(C)。","options":{"A":"薪資是保健因子。","B":"安全是保健因子。","C":"正確(本題答案)。晉升=成就激勵因子。","D":"人際是保健因子。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"105030-N2-4":{"quick":"子宮切除覺得不像女人=自尊自重需求。","detail":{"background":"子宮切除術後周女士「表示自己已不像女人」(自我價值、身體心像、自尊受損)=Maslow自尊自重需求(C正確)。護理師此時應協助維護其自尊。故自尊自重(C)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"安全需求非此情境。","B":"愛及歸屬非核心。","C":"正確(本題答案)。覺得不像女人=自尊自重受損。","D":"自我實現是潛能發揮。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"105030-N2-70":{"quick":"雙因子激勵因素影響授權=工作時受肯定。","detail":{"background":"Herzberg雙因子的「激勵因素」(內在、帶來滿足):工作時「受肯定(認可recognition)」(B正確)。A辦公室氣氛佳、C工作酬勞高、D工作條件良好皆是「保健因子」(外在、防止不滿但不激勵)。故工作受肯定(B)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"辦公室氣氛是保健因子。","B":"正確(本題答案)。工作受肯定=激勵因素。","C":"酬勞高是保健因子。","D":"工作條件是保健因子。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"106030-N2-60":{"quick":"清潔同仁置物櫃作懲罰=X理論。","detail":{"background":"「護理紀錄不完整第一名要負責清潔同仁置物櫃」(以懲罰管控)=X理論(B正確,人性需嚴格獎懲監督)。需要層級理論(Maslow)、目標設定理論、激勵理論皆非「懲罰管控」。故X理論(B)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"需要層級理論是Maslow。","B":"正確(本題答案)。懲罰管控=X理論。","C":"目標設定理論非此。","D":"激勵理論非懲罰。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"106111-N2-37":{"quick":"Maslow:最優先處理=協助病人維持身體舒適(生理需求)。","detail":{"background":"Maslow需求由低而高、低層次優先。選項中「協助病人維持身體舒適」=生理需求(最基本、最優先)(B正確)。A協助與家人溝通(愛歸屬)、C完成心願(自我實現)、D了解病情(認知/安全)皆較高層次。故維持身體舒適(B)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"與家人溝通是愛歸屬。","B":"正確(本題答案)。維持身體舒適=生理需求最優先。","C":"完成心願是自我實現。","D":"了解病情層次較高。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"106111-N2-61":{"quick":"雙因子激勵因素=通過個案報告晉升N3(成就肯定)。","detail":{"background":"Herzberg激勵因子(內在帶來滿足):A「恭喜通過個案報告送審、順利晉升N3」=成就+肯定+升遷(激勵因子,A正確)。B監督工作安全、C告知薪資福利、D工作環境融洽皆是「保健因子」(外在)。故A。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"正確(本題答案)。通過審查晉升=成就肯定激勵因子。","B":"監督安全是保健因子。","C":"薪資福利是保健因子。","D":"工作環境是保健因子。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"107110-N2-67":{"quick":"日常生活活動量表計分分類病人=因素分類法。","detail":{"background":"病人分類法:原型(prototype)分類法(依整體描述歸類)、因素(factor)分類法(依個別護理活動項目計分加總分類)。「用日常生活活動量表將生理需求計分、依計分點數分類」=因素分類法(B正確)。故因素分類法(B)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"原型分類是整體描述歸類。","B":"正確(本題答案)。依項目計分=因素分類法。","C":"客觀分類法非標準。","D":"主觀分類法非標準。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"108020-N2-60":{"quick":"願意互相支援扶持=愛及歸屬需求。","detail":{"background":"護理人員「願意在工作上互相支援、互相扶持」(同事間情感連結、團隊歸屬)=Maslow愛及歸屬需求(C正確)。生理、安全、自尊皆非「互相支援扶持」對應。故愛及歸屬(C)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"生理需求是基本生存。","B":"安全感是保障安全。","C":"正確(本題答案)。互相支援扶持=愛及歸屬。","D":"自尊是受尊重。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"108110-N2-31":{"quick":"藥物食物禁忌「錯誤」=菠菜會「加強」warfarin藥效(菠菜富含維生素K會「拮抗」warfarin)。","detail":{"background":"藥物食物禁忌:A茶水與鐵劑形成鞣酸鐵沉澱(對)、B牛奶抑制腸溶錠dulcolax吸收(對)、C酒精促進抗組織胺對中樞抑制(對)。選項D「菠菜會『加強』抗凝血劑warfarin藥效」錯誤——菠菜富含維生素K,會「拮抗(減弱)」warfarin的抗凝效果,故D為錯誤(本題答案)。","options":{"A":"正確。茶與鐵劑形成鞣酸鐵沉澱。","B":"正確。牛奶抑制dulcolax吸收。","C":"正確。酒精促進抗組織胺中樞抑制。","D":"錯誤(本題答案)。菠菜維生素K拮抗warfarin,非加強。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"109030-N2-64":{"quick":"月薪+警衛巡邏+相約出遊:護理師被滿足的是「愛與歸屬感」?本題答案C。","detail":{"background":"本題官方答案C(愛與歸屬感)。情境含月薪(生理/安全)、警衛巡邏(安全)、放假相約出遊(同儕情感連結)。題目問「下列何種需求」,以「相約一起出遊」對應的「愛與歸屬感」為答案(C)。Maslow各層次:薪資=生理安全、警衛=安全、出遊=愛與歸屬。故C。","options":{"A":"自尊是受尊重肯定。","B":"安全感對應警衛巡邏。","C":"正確(本題答案)。相約出遊=愛與歸屬感。","D":"生理需求對應薪資。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"109030-N2-67":{"quick":"雙因子激勵因子=表揚優秀員工。","detail":{"background":"Herzberg激勵因子(內在):A「表揚優秀員工(肯定recognition)」=激勵因子(A正確)。B員工旅遊、C員工加薪、D分配宿舍皆是「保健因子」(外在物質/環境)。故表揚優秀員工(A)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"正確(本題答案)。表揚員工=肯定激勵因子。","B":"員工旅遊是保健因子。","C":"加薪是保健因子。","D":"分配宿舍是保健因子。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"109110-N2-70":{"quick":"激勵氛圍「錯誤」=主管承擔所有工作(應給員工參與決策、挑戰任務)。","detail":{"background":"Marquis-Huston創造激勵氛圍策略:發展工作計畫給員工參與決策機會(對)、了解員工需求提供協助(對)、給挑戰性任務提供成長(對)。選項B「為避免增加員工負荷,主管應承擔所有工作」錯誤(本題答案)——應「適當授權、給員工成長機會」,主管承擔所有工作反而剝奪員工發展、不利激勵。故B。","options":{"A":"正確。給員工參與決策機會。","B":"正確(本題答案)。主管不應承擔所有工作(應授權)。","C":"正確。了解需求提供協助。","D":"正確。給挑戰性任務促成長。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"110110-N2-58":{"quick":"Maslow:護理主管應優先注意=薪資福利(生理需求)。","detail":{"background":"Maslow需求由低而高、低層次優先滿足。護理主管應「優先」注意護理人員的「薪資福利」=生理需求(最基本、最優先)(A正確)。升遷、專業成長、成就感皆較高層次。故薪資福利(A)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"正確(本題答案)。薪資福利=生理需求最優先。","B":"升遷層次較高。","C":"專業成長是自我實現。","D":"成就感是自尊。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"110110-N2-77":{"quick":"工作滿意含激勵因子與保健因子=雙因子理論。","detail":{"background":"說明「工作滿意度包含激勵因子(內在)及保健因子(外在)」的是「雙因子理論(Herzberg)」(A正確)。X和Y理論(人性假設)、滿足需求理論(Maslow)、ERG理論皆非「激勵+保健」二因子架構。故雙因子理論(A)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"正確(本題答案)。激勵+保健因子=雙因子理論。","B":"X、Y理論是人性假設。","C":"滿足需求理論是Maslow。","D":"ERG理論非二因子。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"111030-N2-1":{"quick":"Maslow最高層級需要=自我實現。","detail":{"background":"Maslow需求層級最高層是「自我實現(self-actualization)」(A正確)——發揮潛能、實現自我。愛及歸屬(第三)、自尊(第四)、安全(第二)皆較低。故自我實現(A)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"正確(本題答案)。最高層是自我實現。","B":"愛及歸屬是第三層。","C":"自尊是第四層。","D":"安全是第二層。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"112030-N2-10":{"quick":"Maslow護理問題優先序=低效性呼吸(2)→社交障礙(1)→身體心像(4)→靈性困擾(3)=2143。","detail":{"background":"Maslow需求由低而高排護理問題優先序:生理(低效性呼吸型態2,最優先)→愛與歸屬(社交互動障礙1)→自尊(身體心像改變4)→自我實現(靈性困擾3)。故順序「2143」(C正確)。生理>歸屬>自尊>靈性。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"2413順序不符。","B":"2134不符。","C":"正確(本題答案)。2143(呼吸→社交→身體心像→靈性)。","D":"2341不符。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"112030-N2-65":{"quick":"報酬與同儕一樣的激勵=公平理論。","detail":{"background":"公平理論(equity theory,Adams):員工會比較自己與他人(同儕)的「投入-報酬比」,感受公平與否而影響激勵。「報酬與同儕一樣」=公平理論(C正確)。ERG、期望理論、增強理論皆非「與同儕比較公平」。故公平理論(C)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"ERG理論是存在-關係-成長。","B":"期望理論是努力-績效-報酬期望。","C":"正確(本題答案)。與同儕比較=公平理論。","D":"增強理論是行為後果修正。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"112180-N2-44":{"quick":"專業能力進階制度=雙因子的「成長發展」激勵因素。","detail":{"background":"護理專業能力進階制度(N1→N4)運用Herzberg雙因子的「成長發展(growth/advancement)」激勵因素(B正確)——提供專業成長與晉升機會。工作保障、薪資福利、同儕關係皆是「保健因子」。故成長發展(B)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"工作保障是保健因子。","B":"正確(本題答案)。進階制度=成長發展激勵因素。","C":"薪資福利是保健因子。","D":"同儕關係是保健因子。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"113030-N2-39":{"quick":"票選最佳服務張貼相片鼓勵=滿足自尊需求。","detail":{"background":"「最佳服務票選、最高票者名字相片張貼佈告欄鼓勵」(受肯定、受尊重、成就感)=Maslow自尊需求(D正確)。生理、愛與歸屬、安全皆非「公開表揚肯定」對應。故自尊(D)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"生理需求是基本生存。","B":"愛與歸屬是情感連結。","C":"安全感是保障。","D":"正確(本題答案)。公開表揚=滿足自尊。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"113100-N2-2":{"quick":"孕婦會陰癢就醫=生理需求。","detail":{"background":"孕婦會陰極癢、分泌物、難以忍受而就醫(身體不適、需解除症狀)=Maslow生理需求(A正確,基本身體舒適)。安全、愛及歸屬、自尊皆非「解除身體不適」對應。故生理需求(A)。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"正確(本題答案)。會陰癢就醫=生理需求。","B":"安全需求非此。","C":"愛及歸屬非此。","D":"自尊非此。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"113100-N2-38":{"quick":"新人報到Maslow最優先=介紹用餐地點及員工廁所(生理需求)。","detail":{"background":"新進人員報到,依Maslow「最優先」提供的是「介紹用餐地點及員工廁所位置」=生理需求(D正確,基本生理需要)。A加Line群組(歸屬)、B隔離裝備演練(安全)、C在職教育(自我實現/成長)皆較高層次。故D。Maslow需求層級(由低而高優先):生理→安全→愛與歸屬→自尊→自我實現。Herzberg雙因子:激勵因子(內在:成就肯定升遷成長責任-帶來滿足)、保健因子(外在:薪資人際工作環境安全-只防不滿)。公平理論(與同儕比較)、期望理論、增強理論(依結果修正行為)、ERG理論。","options":{"A":"加Line群組是歸屬。","B":"隔離裝備是安全。","C":"在職教育是成長。","D":"正確(本題答案)。用餐廁所=生理需求最優先。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"114170-N2-43":{"quick":"激勵理論定義:增強理論認為行為會根據隨之而來的結果做修正。","detail":{"background":"激勵理論:C「增強理論(reinforcement)認為行為會根據隨之而來的『結果』做修正(獎勵增強、懲罰削弱)」正確。A「內容理論解釋行為如何被激發引導維持終止」錯(那是『過程』理論);B「過程理論著重特殊需求」錯(那是『內容』理論如Maslow/Herzberg);D「內容理論包含公平、期望、目標理論」錯(那些是『過程』理論)。故C。","options":{"A":"解釋行為過程是過程理論,非內容。","B":"著重需求是內容理論,非過程。","C":"正確(本題答案)。增強理論依結果修正行為。","D":"公平期望目標是過程理論,非內容。"},"sources":["新文京《護理行政》激勵理論","華杏《護理行政學》Maslow與Herzberg"]}},"101110-N2-62":{"quick":"護理長向督導長請求支援=上行溝通。","detail":{"background":"組織溝通方向:上行(下級向上級)、下行(上級向下級)、平行(同層級)、斜行(不同層級不同部門)。護理長(下級)向護理督導長(上級)請求支援=上行溝通(A正確)。故上行溝通(A)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"正確(本題答案)。護理長向督導長=上行溝通。","B":"下行是上級向下級。","C":"平行是同層級。","D":"斜行是不同層級不同部門。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"102110-N2-74":{"quick":"病房會議討論臨床業務=平行溝通。","detail":{"background":"病房會議中(同單位、同層級護理人員)討論臨床業務=平行溝通(C正確,同層級之間)。上行(向上)、下行(向下)、斜行(跨層級跨部門)皆非。故平行溝通(C)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"下行是上級向下級。","B":"上行是下級向上級。","C":"正確(本題答案)。同層級討論=平行溝通。","D":"斜行是跨層級跨部門。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"103030-N2-79":{"quick":"不受時間距離限制、速度最快=電子網路溝通。","detail":{"background":"組織溝通媒介中「資訊分享不受時間、距離、假日、人數限制,且速度最快」=電子網路(電子郵件/網路系統)(A正確)。演說簡報(受時空限制)、書面(慢)、電話(需即時連線)皆不如電子網路。故電子網路(A)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"正確(本題答案)。不受時空限制速度最快=電子網路。","B":"演說簡報受時空限制。","C":"書面溝通較慢。","D":"電話需即時連線。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"104030-N2-60":{"quick":"放計時器卻不知目的=缺乏溝通與協助的障礙。","detail":{"background":"護理長放計時器督促洗手,但護理師「不清楚放置目的」=管理障礙中的「缺乏溝通與協助」(C正確)——措施未充分溝通說明,員工不理解。A警覺性低、B專案管控不當、D未制定SOP皆非「目的未溝通」。故缺乏溝通與協助(C)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"非護理師警覺性低。","B":"非專案管控不當。","C":"正確(本題答案)。目的未說明=缺乏溝通與協助。","D":"非未制定SOP。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"105090-N2-72":{"quick":"年終獎金謠言流傳=葡萄藤式溝通。","detail":{"background":"年終獎金辦法尚在討論、護理師間「流傳謠言」=葡萄藤式(非正式)溝通(D正確,grapevine,口耳相傳的小道消息)。上行、下行、平行皆是正式溝通方向。故葡萄藤式溝通(D)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"上行是正式向上溝通。","B":"下行是正式向下溝通。","C":"平行是正式同層溝通。","D":"正確(本題答案)。流傳謠言=葡萄藤式(非正式)溝通。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"106111-N2-65":{"quick":"兩護理師車禍請假:護理長協調安排上班人員。","detail":{"background":"兩位護理師同時車禍請假、短時間無法上班,護理長最適當處理是「(護理長親自)協調安排上班人員」(C正確)——主管職責、即時調度人力確保病房運作。A書面請督導(緩不濟急)、B請受傷者自找代班(不近人情)、D請別病房支援(未先自行調度)皆不如護理長親自協調。故C。","options":{"A":"書面請督導緩不濟急。","B":"請受傷者自找代班不近人情。","C":"正確(本題答案)。護理長協調安排上班人員。","D":"應先自行調度,非直接請他病房。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"106111-N2-67":{"quick":"護理長交代實習老師注意事項=斜行溝通。","detail":{"background":"單位護理長(醫院人員)向「學校實習老師(不同組織/不同層級)」交代實習注意事項=斜行溝通(D正確,跨層級跨部門/組織)。上行、下行、平行皆是同組織內的方向。故斜行溝通(D)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"上行是向上級。","B":"下行是向下級。","C":"平行是同層級。","D":"正確(本題答案)。對實習老師=斜行溝通(跨層級)。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"106111-N2-68":{"quick":"「你私下換班讓我有不被尊重感覺」=直言型溝通。","detail":{"background":"護理長表達「你沒請假私下換班、造成困擾、讓我有不被尊重感覺、請遵守規定」(直接、坦誠表達自己感受與要求)=直言型(自我肯定式)溝通(C正確)。諒解型、提示型、警戒型皆非「直接坦誠表達」。故直言型(C)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"諒解型偏體諒。","B":"提示型偏暗示。","C":"正確(本題答案)。直接坦誠表達=直言型溝通。","D":"警戒型偏警告威脅。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"107110-N2-65":{"quick":"溝通是持續性的=每次溝通延續上一次的感受及關係。","detail":{"background":"組織溝通的「持續性」意指:D「每次溝通會延續上一次溝通的感受及關係(關係是累積的)」正確。A「不對所有人同等深度」是選擇性非持續性;B「雙方同時收發」是雙向性;C「訊息不可重來」是不可逆性。故持續性=延續上次感受關係(D)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"選擇性非持續性。","B":"雙向性非持續性。","C":"不可逆性非持續性。","D":"正確(本題答案)。延續上次感受關係=持續性。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"109110-N2-66":{"quick":"護理部與藥劑部各執己見請副院長協調=平行溝通。","detail":{"background":"護理部與藥劑部(同層級不同部門)為藥品包裝各執己見、請副院長主持協調會議=「平行溝通」(C正確,兩個同層級部門之間的溝通)。上行、下行、斜行皆非。故平行溝通(C)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"上行是向上級。","B":"下行是向下級。","C":"正確(本題答案)。兩同層部門=平行溝通。","D":"斜行是跨層級。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"111030-N2-69":{"quick":"不同層級單位人員間的溝通=斜行溝通。","detail":{"background":"「不同層級、不同單位人員之間」的溝通=斜行溝通(D正確,跨層級跨部門)。下行(上對下、同部門線)、上行(下對上)、平行(同層級)皆非「不同層級+不同單位」。故斜行溝通(D)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"下行是上對下。","B":"上行是下對上。","C":"平行是同層級。","D":"正確(本題答案)。不同層級不同單位=斜行溝通。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"111110-N2-69":{"quick":"護理長找A病房主任(醫師)溝通=平行溝通。","detail":{"background":"A病房護理人員受甲醫師情緒字眼困擾,護理長「找A病房的病房主任(醫師)溝通」(護理長與病房主任屬同層級主管)=平行溝通(C正確,同層級不同專業的橫向溝通)。上行、下行、非正式溝通皆非。故平行溝通(C)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"上行是向上級。","B":"下行是向下級。","C":"正確(本題答案)。護理長對病房主任=平行溝通。","D":"非正式溝通是私下小道消息。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"112110-N2-68":{"quick":"護理長直接與值班醫師溝通=斜行溝通。","detail":{"background":"護理人員與值班醫師爭執、護理長「直接與醫師溝通」——護理長(護理主管)與值班醫師(不同部門、層級未必對等)=斜行溝通(D正確,跨部門跨層級)。上行、下行、平行皆非。故斜行溝通(D)。組織溝通方向:上行(下對上)、下行(上對下)、平行(同層級)、斜行(不同層級不同部門)、葡萄藤式(非正式小道消息)。良好溝通:訊息必要、簡短直接、易取得、正式傳達;溝通是持續性的(延續上次關係)。","options":{"A":"上行是向上級。","B":"下行是向下級。","C":"平行是同層級。","D":"正確(本題答案)。護理長對值班醫師=斜行溝通。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"115030-N2-45":{"quick":"良好溝通管道要件「錯誤」=要傳達的訊息是即時的?本題答案A。","detail":{"background":"本題官方答案A(錯誤,須斟酌)。良好溝通管道要件:B訊息是必須的(對)、C組織成員容易取得訊息(對)、D訊息直接且正式傳達(對)。選項A「要傳達的訊息是『即時』的」——本題視為非要件/敘述不當而為答案。核心:良好溝通管道應簡短直接、訊息必要、易取得、正式傳達;「即時性」非其關鍵要件。故A。","options":{"A":"正確(本題答案)。即時性非良好溝通管道關鍵要件。","B":"訊息必須是要件。","C":"成員容易取得是要件。","D":"直接正式傳達是要件。"},"sources":["新文京《護理行政》溝通","華杏《護理行政學》組織溝通"]}},"101030-N2-60":{"quick":"分權組織優點=員工覺得自由且受尊重。","detail":{"background":"分權(decentralization)組織優點:A「員工覺得自由且受尊重(自主權大、士氣高)」正確。B「精簡組織避免重複浪費」、C「少數人擁有決策權」、D「部門間不易衝突」是「集權」的特點(集權精簡、決策集中)。故分權優點=員工自由受尊重(A)。","options":{"A":"正確(本題答案)。分權使員工自由受尊重。","B":"精簡避免浪費是集權優點。","C":"少數人決策是集權。","D":"部門不易衝突偏集權。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"101030-N2-80":{"quick":"魚與熊掌無法兼得=雙趨衝突。","detail":{"background":"衝突類型:雙趨(兩個都想要、只能選一,如魚與熊掌)、雙避(兩個都不想要、必選一)、趨避(同一目標既想要又怕,有利有弊)、認知衝突。「魚與熊掌無法兼得」=雙趨衝突(B正確)。故雙趨衝突(B)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"雙避是兩個都不想要。","B":"正確(本題答案)。魚與熊掌=雙趨衝突。","C":"趨避是同一目標有利有弊。","D":"認知衝突非此。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"101110-N2-67":{"quick":"衝突敘述較正確=衝突會產生建設性或破壞性的結果。","detail":{"background":"衝突(現代觀點):D「衝突會產生建設性或破壞性的結果(適度衝突有益、過度有害)」正確。A「衝突對了解問題沒幫助」錯(適度衝突可釐清問題);B「衝突降低解決問題能力」錯;C「管理者最好不要介入」錯(應適度管理)。故D。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"適度衝突有助了解問題。","B":"衝突不一定降低解決能力。","C":"管理者應適度介入。","D":"正確(本題答案)。衝突有建設性或破壞性結果。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"101110-N2-71":{"quick":"病患想多住院vs院方要求出院=雙方目標不同。","detail":{"background":"醫院行政要求按時出院、病患想多住幾天——雙方追求的目標不一致(院方:有效利用床位;病患:康復再出院)=「雙方目標不同」的衝突(C正確)。溝通阻斷、權力地位不同、個性不同皆非此衝突核心。故雙方目標不同(C)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"非溝通阻斷。","B":"非權力地位不同。","C":"正確(本題答案)。出院時機歧異=雙方目標不同。","D":"非個性不同。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"102030-N2-77":{"quick":"關心自己低、關心他人高=順從。","detail":{"background":"衝突處理行為(關心自己/關心他人二維):競爭(高自己低他人)、順從/順應(低自己高他人,犧牲自己滿足他人)、妥協(中等)、逃避(皆低)、合作(皆高)。「關心自己低、關心他人高」=順從(B正確)。故順從(B)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"競爭是高自己低他人。","B":"正確(本題答案)。低自己高他人=順從。","C":"妥協是各退一步。","D":"逃避是皆低。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"102110-N2-77":{"quick":"處理衝突中,關心自己低關心他人高=順從(同前)。","detail":{"background":"衝突處理:Thomas-Kilmann五型——「關心自己程度低、但關心他人程度高」=順從/順應(accommodation,犧牲自己利益成全他人)(B正確)。競爭(高自己)、妥協(中等)、逃避(皆低)皆非。故順從(B)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"競爭是高關心自己。","B":"正確(本題答案)。低自己高他人=順從。","C":"妥協是各退一步。","D":"逃避是皆不關心。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"103030-N2-57":{"quick":"衝突傳統觀點=衝突會降低績效應加以避免。","detail":{"background":"衝突的「傳統觀點(traditional view)」:認為衝突有害、會降低績效,應「加以避免/消除」(B正確)。A「促進創新應鼓勵」、C「自然產生不必壓制」、D「促進互動有利發展」是「人際關係觀點/互動觀點(現代)」。故傳統觀點=降低績效應避免(B)。","options":{"A":"促進創新是現代互動觀點。","B":"正確(本題答案)。降低績效應避免=傳統觀點。","C":"自然產生不壓制是人際關係觀點。","D":"促進互動有利是現代觀點。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"103030-N2-72":{"quick":"對自己及他人關心程度均高=合作。","detail":{"background":"衝突處理行為:「對自己及他人關心程度均高」=合作(collaboration,協同合作、雙贏)(D正確)。順從(低自己高他人)、妥協(中等)、逃避(皆低)皆非。故合作(D)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"順從是低自己高他人。","B":"妥協是各退一步。","C":"逃避是皆低。","D":"正確(本題答案)。皆高=合作。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"103030-N2-78":{"quick":"彼此迴避、拖延戰術=逃避。","detail":{"background":"衝突處理:雙方「彼此迴避、採取拖延戰術」=逃避(avoidance,不面對、拖延)(D正確)。妥協(各退讓)、順應(成全他人)、強迫(壓制)皆非「迴避拖延」。故逃避(D)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"妥協是各退讓。","B":"順應是成全他人。","C":"強迫是壓制對方。","D":"正確(本題答案)。迴避拖延=逃避。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"103100-N2-77":{"quick":"請護理人員協商提出排班表=合作。","detail":{"background":"護理長「請護理人員經協商後提出過年排班表」(雙方共同協商達成、兼顧彼此)=合作(collaboration,雙贏)(D正確)。競爭、逃避、順從皆非「協商共贏」。故合作(D)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"競爭是壓制對方。","B":"逃避是迴避。","C":"順從是成全他人。","D":"正確(本題答案)。協商提排班=合作。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"104030-N2-62":{"quick":"薪資與工作滿意=C=W>P(能力佳薪資低,感衝突疏離)。本題答案B。","detail":{"background":"本題官方答案B。Jaques能力(C)-生產力(W)-報酬(P)模式:B「當C=W>P:員工能力佳、薪資過低,會感到衝突,漸疏離工作」正確(能力與表現皆高但報酬低→不公平、疏離)。其餘組合敘述不符此模式的滿意/不滿意關係。故B。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"敘述不符模式。","B":"正確(本題答案)。C=W>P能力佳薪資低致衝突疏離。","C":"P>W>C敘述不符。","D":"W>C>P敘述不符。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"104030-N2-72":{"quick":"衝突過程中正式定義議題=認知與個人化階段。","detail":{"background":"Robbins衝突發展五階段:潛在對立(條件具備)→認知與個人化(感知並情緒化、『定義衝突議題』)→意圖→行為→結果。「正式定義衝突議題」=認知與個人化階段(C正確)。故C。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"潛在對立是條件階段。","B":"意圖與行為是後續。","C":"正確(本題答案)。定義議題=認知與個人化階段。","D":"顯示期非標準階段。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"108020-N2-64":{"quick":"醫護衝突處理較適當=運用衝突解決策略,控制衝突在適當程度。","detail":{"background":"急診護理長處理醫護衝突,最適當是「運用衝突解決的基本策略,控制衝突在適當的程度即可」(D正確)——適度衝突有建設性,管理者應管理而非一味壓制或逃避。A「盡力使不發生衝突」、B「大事化小事化無」(逃避)、C「請督導主任解決」(推卸)皆不當。故D。","options":{"A":"一味避免衝突不當。","B":"大事化小是逃避。","C":"請他人解決是推卸。","D":"正確(本題答案)。運用策略控制衝突在適當程度。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"109110-N2-72":{"quick":"Douglass衝突解決最優先=確認問題。","detail":{"background":"Douglass衝突解決模式步驟,「最優先」是「確認問題(identify the problem)」(A正確)——先釐清衝突的真正問題,才能尋求方案。團體互動、尋求可行方案、尋求外在資源皆是後續步驟。故確認問題(A)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"正確(本題答案)。衝突解決最優先=確認問題。","B":"尋求方案是後續。","C":"團體互動是後續。","D":"尋求外在資源是後續。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"110030-N2-73":{"quick":"家屬久候情緒失控=雙方目標不一致。","detail":{"background":"病人檢傷後久候50分鐘取得報告、家屬不耐久候情緒失控大鬧——家屬(希望快速處理)與醫療流程(依檢傷分級排序)目標不一致=「雙方目標不一致」的衝突(C正確)。人力不足(表面)、個性價值觀、權力地位皆非核心。故雙方目標不一致(C)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"人力不足是表面。","B":"非個性價值觀。","C":"正確(本題答案)。久候不耐=雙方目標不一致。","D":"非權力地位不同。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"110030-N2-74":{"quick":"醫師冷處理收集資料再反應=逃避。","detail":{"background":"醫師見家屬正在氣頭上,以「冷處理應對、希望收集更多資料後再反應」=逃避(avoidance,暫時迴避、不正面衝突)(A正確,Thomas衝突處理)。順從(成全)、競爭(壓制)、妥協(各退)皆非「冷處理拖延」。故逃避(A)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"正確(本題答案)。冷處理收集資料=逃避。","B":"順從是成全對方。","C":"競爭是壓制。","D":"妥協是各退一步。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"110110-N2-64":{"quick":"緩解衝突「不」適當=以權力來壓制雙方的衝突。","detail":{"background":"緩解衝突原則:A審慎選擇要處理的衝突(對)、B評估衝突當事人(對)、C分析衝突原因和根源(對)。選項D「以權力來壓制雙方的衝突」較不適當(本題答案)——以權力強壓只是暫時壓制、未解決根源、易再爆發,應以溝通協商化解。故D。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"適當。審慎選擇處理的衝突。","B":"適當。評估衝突當事人。","C":"適當。分析衝突原因根源。","D":"不適當(本題答案)。以權力壓制未解決根源。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"111030-N2-74":{"quick":"衝突過程中最適合運用技巧避免擴大=意圖及行為階段。","detail":{"background":"Robbins衝突五階段:潛在對立→認知個人化→意圖→行為→結果。「最適合運用衝突處理技巧避免非功能性衝突擴大」的是「意圖及行為階段」(C正確)——此階段衝突已外顯為行為,及時介入處理可避免惡化。故意圖及行為階段(C)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"潛在對立尚未外顯。","B":"認知個人化是感知階段。","C":"正確(本題答案)。意圖及行為階段最適合介入。","D":"結果階段已成定局。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"111030-N2-79":{"quick":"達到雙贏的衝突管理策略=合作。","detail":{"background":"可達到「雙贏(win-win)」的衝突管理策略是「合作(collaboration)」(B正確)——雙方充分溝通、整合彼此需求、共創最大利益。迴避(雙輸/拖延)、順從(犧牲自己)、支配(一方贏一方輸)皆非雙贏。故合作(B)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"迴避是拖延/雙輸。","B":"正確(本題答案)。合作=雙贏。","C":"順從是犧牲自己。","D":"支配是一方贏一方輸。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"111110-N2-78":{"quick":"藥劑部與護理部預算協調衝突=團體間衝突。","detail":{"background":"藥劑部主管與護理部主管(兩個部門/團體)審查年度預算協調發生衝突=團體間衝突(inter-group conflict)(B正確)。目標間衝突、組織間衝突(不同組織)、個人內在衝突皆非「兩部門間」。故團體間衝突(B)。衝突類型:雙趨(都想要選一,魚與熊掌)、雙避(都不想要)、趨避(同一目標有利有弊)。衝突發展五階段:潛在對立→認知與個人化(感知情緒化、定義議題)→意圖→行為→結果。衝突處理(關心自己/他人):競爭(高/低)、順從(低/高)、妥協(中)、逃避(低/低)、合作(高/高雙贏)。傳統觀點視衝突有害應避免;現代觀點適度衝突有建設性。","options":{"A":"目標間衝突非此。","B":"正確(本題答案)。兩部門間=團體間衝突。","C":"組織間衝突是不同組織。","D":"個人內在衝突是個人心理。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"112030-N2-75":{"quick":"感受知覺衝突並產生情緒反應=認知與個人化階段。","detail":{"background":"Robbins衝突五階段:當個體「感受/知覺到衝突,且產生情緒反應」=認知與個人化階段(perceived & felt conflict)(B正確)。潛在對立(條件)、意圖及行為(外顯)、結果皆非「感知+情緒」階段。故認知與個人化階段(B)。","options":{"A":"潛在對立是條件階段。","B":"正確(本題答案)。感知衝突並情緒化=認知與個人化階段。","C":"意圖及行為是外顯階段。","D":"結果階段是後果。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"112110-N2-76":{"quick":"同時完成碩士進修及評鑑難抉擇=雙趨衝突。","detail":{"background":"李護理長面臨「碩士班進修」與「評鑑任務」兩個都想完成卻難兼顧、難抉擇取捨=雙趨衝突(double approach conflict,兩個都想要的正向目標只能選一)(D正確)。雙避(都不想要)、趨避(同一目標有利有弊)、組織衝突皆非。故雙趨衝突(D)。","options":{"A":"雙避是兩個都不想要。","B":"趨避是同一目標有利有弊。","C":"組織衝突是組織層面。","D":"正確(本題答案)。兩者都想完成=雙趨衝突。"},"sources":["新文京《護理行政》衝突管理","華杏《護理行政學》衝突處理"]}},"102030-N2-67":{"quick":"緊急情況宜採集權式管理。","detail":{"background":"緊急情況需快速決策、集中指揮,宜採「集權式(centralization)」管理(A正確)。分權式(下放決策、較慢)、均權式、參與式皆耗時不適緊急。故集權式(A)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"正確(本題答案)。緊急情況宜集權式。","B":"分權式決策慢不適緊急。","C":"均權式非緊急首選。","D":"參與式耗時。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"102110-N2-70":{"quick":"單位護理長做預算計畫=分權式。","detail":{"background":"由「單位護理長」自行做預算計畫(決策權下放至基層單位)=分權式(decentralization)管理原則(B正確)。集權式(決策集中高層)、放任式、君權式皆非「基層自主決策」。故分權式(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"集權式決策集中高層。","B":"正確(本題答案)。單位主管做預算=分權式。","C":"放任式是不管。","D":"君權式非標準。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"102110-N2-73":{"quick":"聘學者專家擔任督導顧問協助研究=直線幕僚型組織。","detail":{"background":"組織型態:直線(line,指揮命令系統)、幕僚(staff,提供專業諮詢建議但無指揮權)。「聘學者專家擔任督導/顧問,協助推動研究」=直線幕僚型組織(A正確,幕僚提供專業協助)。金字塔型、矩陣型、扁平型皆非「顧問幕僚」。故直線幕僚型(A)。","options":{"A":"正確(本題答案)。聘顧問協助=直線幕僚型。","B":"金字塔型是層級結構。","C":"矩陣型是雙重隸屬。","D":"扁平型是層級少。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"103030-N2-65":{"quick":"非正式組織=具相近之價值觀。","detail":{"background":"非正式組織(informal organization):C「具相近之價值觀(因興趣、情感、價值觀自然結合)」正確。A「較不具影響力」錯(非正式組織影響力大);B「對組織不利」錯(可正可負);D「成員較不能暢所欲言」錯(非正式中反而較能暢所欲言)。故C。","options":{"A":"非正式組織影響力大。","B":"非正式組織可正可負,非必不利。","C":"正確(本題答案)。非正式組織具相近價值觀。","D":"非正式中較能暢所欲言。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"103030-N2-66":{"quick":"書寫組織任務宣言應以「顧客」需要為主要依據。","detail":{"background":"唐肯(Duncan)定義:書寫組織任務宣言(mission statement)應以「顧客(customer)的需要」為主要依據(D正確)——組織存在的理由是滿足顧客需求。工作人員、政府、老闆皆非任務宣言的首要依據。故顧客(D)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"工作人員非任務宣言首要依據。","B":"政府非首要。","C":"老闆非首要。","D":"正確(本題答案)。任務宣言以顧客需要為依據。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"103100-N2-62":{"quick":"組織分權「錯誤」=決定權是從上向下控制(分權是下放決策非由上控制)。","detail":{"background":"組織分權(decentralization):B各類專業人員共同參與決策(對)、C可培養優秀管理人才(對)、D單位主管有較大自主權(對)。選項A「決定權是從上向下控制」錯誤(本題答案)——分權是「將決策權『下放』給基層」,非由上向下控制(由上控制是集權)。故A。","options":{"A":"正確(本題答案)。分權是下放決策,非由上控制。","B":"分權各專業共同參與決策。","C":"分權培養管理人才。","D":"分權單位主管自主權大。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"103100-N2-66":{"quick":"感染管制中心依明文規定負責政策=功能職權。","detail":{"background":"職權類型:直線職權(指揮命令)、幕僚職權(諮詢建議)、功能職權(functional authority,就特定專業功能對其他單位有指揮權)。「感染管制中心依明文規定負責全院環境及感染管控政策(對各單位的感控有專業指揮權)」=功能職權(C正確)。故功能職權(C)。","options":{"A":"直線職權是指揮命令系統。","B":"幕僚職權只諮詢無指揮權。","C":"正確(本題答案)。專業功能指揮權=功能職權。","D":"金字塔型是結構非職權。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"103100-N2-67":{"quick":"同時接受多個委員會與督導指示=矩陣組織。","detail":{"background":"加護病房護理長「同時接受加護單位管理委員會、護理部督導、護理品質管理委員會」多方指示(雙重/多重隸屬)=矩陣(matrix)組織(B正確,跨功能與專案的雙重指揮)。分權、幕僚、扁平組織皆非「多重隸屬」。故矩陣組織(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"分權組織是決策下放。","B":"正確(本題答案)。多重隸屬指揮=矩陣組織。","C":"幕僚組織是諮詢。","D":"扁平組織是層級少。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"104030-N2-67":{"quick":"依員工態度情緒喜好形成=非正式組織。","detail":{"background":"依「員工的態度、情緒或喜好」自然形成的組織型態=非正式組織(informal organization)(B正確,因情感興趣價值觀結合,非明文規定)。正式組織(明文規定)、部門化組織、矩陣組織皆非「自然形成」。故非正式組織(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"正式組織是明文規定。","B":"正確(本題答案)。依態度喜好形成=非正式組織。","C":"部門化是正式劃分。","D":"矩陣組織是雙重隸屬。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"104100-N2-65":{"quick":"合併職權使層級減少=扁平組織。","detail":{"background":"醫院「將副主任、督導長與護理長職權合併、護理層級減為主任-護理長-護理師(三層)」=扁平(flat)組織(B正確,層級少、控制幅度大)。高聳(層級多)、矩陣(雙重隸屬)、中央集權皆非。故扁平組織(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"高聳組織是層級多。","B":"正確(本題答案)。層級減少=扁平組織。","C":"矩陣組織是雙重隸屬。","D":"中央集權是決策集中。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"106030-N2-75":{"quick":"設營養部醫療部護理部=功能式結構。","detail":{"background":"醫院「設有營養部、醫療部、護理部等(依專業功能劃分部門)」=功能式(functional)結構(B正確,依功能/專業分部門)。扁平式(層級少)、矩陣式(雙重隸屬)、幕僚式皆非「依功能分部門」。故功能式(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"扁平式是層級少。","B":"正確(本題答案)。依功能分部門=功能式結構。","C":"矩陣式是雙重隸屬。","D":"幕僚式是諮詢。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"106110-N2-65":{"quick":"組織文化「不」含=組織經費(經費非文化內涵)。","detail":{"background":"組織文化內涵:組織氣氛、組織創造力、組織價值觀(共同信念、行為規範)。選項C「組織經費」不屬組織文化(本題答案)——經費是財務資源,非文化(價值觀/信念/氣氛)的內涵。故組織經費(C)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"組織氣氛是文化內涵。","B":"組織創造力是文化內涵。","C":"正確(本題答案)。組織經費非文化內涵。","D":"組織價值觀是文化內涵。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"106110-N2-66":{"quick":"使命(mission)=代表組織存在的意義。","detail":{"background":"使命(mission):D「代表組織存在的意義/理由」正確。A「必須是專一特定性質」錯(使命較廣泛);B「可隨情況機動改變」錯(使命相對穩定持久);C「不見得與市場關聯」錯(使命與顧客/市場相關)。故使命=組織存在的意義(D)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"使命較廣泛,非專一特定。","B":"使命相對穩定,非機動改變。","C":"使命與市場/顧客相關。","D":"正確(本題答案)。使命=組織存在的意義。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"106110-N2-69":{"quick":"100床、護理師成熟自主性高=扁平式組織。","detail":{"background":"100床醫院、護理師「專業成熟度及自主性高」,宜採「扁平式組織」(C正確,層級少、控制幅度大、授權多、適合成熟自主的員工)。官僚式(層級嚴明)、矩陣式(雙重隸屬)、集權式皆不適「成熟自主」。故扁平式(C)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"官僚式層級嚴明不適自主員工。","B":"矩陣式是雙重隸屬。","C":"正確(本題答案)。成熟自主=扁平式組織。","D":"集權式決策集中。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"106111-N2-66":{"quick":"人力屬護理部、照護政策屬主任=矩陣式結構。","detail":{"background":"加護中心護理師「人力資源管理屬護理部、病人照顧政策接受加護中心主任領導」(雙重隸屬)=矩陣式(matrix)結構(C正確,功能線+專案/單位線雙重指揮)。功能式、部門式、扁平式皆非「雙重隸屬」。故矩陣式(C)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"功能式是單一功能分部門。","B":"部門式是依部門劃分。","C":"正確(本題答案)。雙重隸屬=矩陣式結構。","D":"扁平式是層級少。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"107030-N2-64":{"quick":"院長下分內科部外科部營養部護理部=功能式。","detail":{"background":"院長之下分「內科部、外科部、營養
