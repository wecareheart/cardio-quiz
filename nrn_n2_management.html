部、護理部(依專業功能劃分)」=功能式(functional)結構(B正確)。幕僚式(諮詢)、專案式(任務編組)、矩陣式(雙重隸屬)皆非「依功能分部」。故功能式(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"幕僚式是諮詢。","B":"正確(本題答案)。依功能分部=功能式。","C":"專案式是任務編組。","D":"矩陣式是雙重隸屬。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"107030-N2-68":{"quick":"控制幅度(span of control)=可決定人員配置的層級與數量。","detail":{"background":"控制幅度(span of control,一位主管直接管轄的部屬數):D「可以決定人員配置的層級與數量(幅度大則層級少、幅度小則層級多)」正確。A成員關係複雜度、B標準化程度、C集權狀況皆非控制幅度的定義。故D。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"非成員關係複雜度。","B":"非標準化程度。","C":"非集權狀況。","D":"正確(本題答案)。控制幅度決定層級與人員數量。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"108020-N2-69":{"quick":"組織結構與授權=組織越扁平化應增加授權程度。","detail":{"background":"組織結構與授權:A「組織結構越趨向扁平化,應增加授權的程度(層級少、控制幅度大、須多授權)」正確。B「越扁平控制幅度越小、決定權集中」錯(扁平是幅度『大』);C「組織規模越大宜分權」(此項其實合理,但本題以A為正解);D「金字塔型職權由上向下『遞增』」錯(應遞『減』,越往下職權越小)。故A。","options":{"A":"正確(本題答案)。組織越扁平應增加授權。","B":"扁平是控制幅度大,非小。","C":"大組織宜分權(本題正解A)。","D":"金字塔職權由上向下遞減,非遞增。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"108110-N2-67":{"quick":"護理督導長督導的單位數=管轄幅度。","detail":{"background":"「護理督導長負責督導的單位數」=管轄幅度(span of control,控制幅度,一位主管直接管轄的單位/部屬數)(B正確)。組織結構、組織溝通、階層範圍皆非「管轄的單位數」。故管轄幅度(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"組織結構是整體架構。","B":"正確(本題答案)。督導的單位數=管轄幅度。","C":"組織溝通非此。","D":"階層範圍非此。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"109030-N2-65":{"quick":"集權「不」是優點=職權和職責階層完整化(那是分權特性)。本題答案B。","detail":{"background":"本題官方答案B(集權非優點者)。集權(centralization)優點:A決策效率化易於管理、C減少部門間衝突、D人員設施可精簡。選項B「職權和職責階層完整化」不是集權的優點(本題答案)——階層完整化偏向分權/組織設計面,非集權特有優點。故B。","options":{"A":"集權優點:決策效率易管理。","B":"正確(本題答案)。階層完整化非集權優點。","C":"集權優點:減少部門衝突。","D":"集權優點:人員設施精簡。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"109030-N2-71":{"quick":"品質督導長同時參與品管中心=矩陣式組織。","detail":{"background":"原在護理部負責品質管理的督導長「同時參與醫院品管中心業務」(雙重隸屬:護理部+品管中心)=矩陣式(matrix)組織(A正確)。扁平式、同僚式、分權式皆非「雙重隸屬」。故矩陣式(A)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"正確(本題答案)。雙重隸屬=矩陣式組織。","B":"扁平式是層級少。","C":"同僚式非標準。","D":"分權式是決策下放。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"110030-N2-68":{"quick":"集結各領域人才組育成中心=矩陣式?本題答案B(功能式)。","detail":{"background":"本題官方答案B(功能式)。為提升研發、「集結各領域研究創新人才組成育成中心」——若依「專業功能(各領域人才)集結」可視為功能式編組(B)。本題以功能式為答案。核心:依專業功能/領域集結=功能式結構。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"矩陣式是雙重隸屬。","B":"正確(本題答案)。依領域功能集結=功能式。","C":"直線-幕僚式是諮詢。","D":"扁平式是層級少。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"110110-N2-68":{"quick":"癌症中心副主任架構屬中心、升遷薪水屬護理部=矩陣式。","detail":{"background":"癌症中心副主任「組織架構屬癌症中心、升遷薪水屬護理部」(雙重隸屬:專案線+功能線)=矩陣式組織(C正確)。直線式、幕僚式、委員會式皆非「雙重隸屬」。故矩陣式(C)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"直線式是單一指揮鏈。","B":"幕僚式是諮詢。","C":"正確(本題答案)。雙重隸屬=矩陣式。","D":"委員會式是合議。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"111030-N2-68":{"quick":"緊急事件講求時效=集權式結構。","detail":{"background":"醫院發生緊急事件、講求時效,宜採「集權式(centralization)結構」(C正確,決策集中、快速指揮)。簡單式、功能性、扁平式皆非「緊急時效」首選(集權最能快速決策)。故集權式(C)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"簡單式非緊急時效首選。","B":"功能性結構非此。","C":"正確(本題答案)。緊急講求時效=集權式。","D":"扁平式非緊急首選。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"111030-N2-71":{"quick":"同時負責護理部品質與醫品部RCA=矩陣式組織。","detail":{"background":"護理長「同時負責護理部品質管理、醫品部根本原因分析(RCA)專案」(雙重隸屬)=矩陣式(matrix)組織(D正確)。直線型、扁平式、幕僚型皆非「雙重隸屬」。故矩陣式(D)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"直線型是單一指揮鏈。","B":"扁平式是層級少。","C":"幕僚型是諮詢。","D":"正確(本題答案)。雙重隸屬=矩陣式組織。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"111110-N2-57":{"quick":"願景=一個組織未來想要達成的目標指引。","detail":{"background":"組織願景、價值觀、理念、使命:A「願景(vision)是組織未來想要達成的目標指引/未來圖像」正確。B「由每位員工設定價值觀」錯(價值觀是共同信念,非各自設定);C「理念是中心目標」敘述須對應;D「使命是未來的圖像」錯(『願景』才是未來圖像,使命是存在的理由)。故A。","options":{"A":"正確(本題答案)。願景=未來想達成的目標指引。","B":"價值觀是共同信念,非各自設定。","C":"理念敘述須對應。","D":"使命是存在理由,願景才是未來圖像。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"112030-N2-60":{"quick":"願景=組織追求的終極目標,讓員工知道未來展望。","detail":{"background":"願景(vision)內涵:C「組織追求的『終極目標』,讓員工知道未來的展望」最適宜。A「組織存在的主要目的」是『使命』;B「成員共同信念、行為依據」是『價值觀』;D「組織活動的步驟」是『程序/計畫』。故願景=終極目標未來展望(C)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"存在的主要目的是使命。","B":"共同信念是價值觀。","C":"正確(本題答案)。願景=終極目標未來展望。","D":"活動步驟是程序。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"112030-N2-67":{"quick":"組織結構=矩陣式組織是按專案需求組成。","detail":{"background":"組織結構:B「矩陣式組織是按專案需求組成(功能線+專案線雙重指揮)」正確。A「扁平式營運成本較高」錯(扁平層級少、成本較低);C「科層式最能反映同仁意見」錯(科層層級多、較難反映);D「委員式可提升決策品質」(委員合議可集思但較慢,本題以B為正解)。故B。","options":{"A":"扁平式成本較低,非較高。","B":"正確(本題答案)。矩陣式按專案需求組成。","C":"科層式較難反映同仁意見。","D":"委員式較慢(本題正解B)。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"112030-N2-74":{"quick":"喜歡一起旅遊唱歌聚集=非正式組織。","detail":{"background":"「喜歡一起旅遊、唱歌的同仁聚集組成」(因興趣情感自然結合)=非正式組織(informal organization)(B正確)。功能式、部門化、矩陣式皆是正式組織。故非正式組織(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"功能式是正式組織。","B":"正確(本題答案)。興趣聚集=非正式組織。","C":"部門化是正式劃分。","D":"矩陣式是正式雙重隸屬。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"112110-N2-69":{"quick":"只向一位主管負責、明確職掌呈報=單一指揮原則。","detail":{"background":"組織成員「只向一位主管負責,且有明確工作職掌及呈報系統」=單一指揮(unity of command)原則(D正確)——一個部屬只向一個直屬主管負責。保持彈性、任務權宜、維持平衡皆非「只向一位主管」。故單一指揮(D)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"保持彈性原則非此。","B":"任務權宜非此。","C":"維持平衡非此。","D":"正確(本題答案)。只向一位主管=單一指揮原則。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"112110-N2-70":{"quick":"重視規章、明確層級、高度分工=科層式結構。","detail":{"background":"組織「重視規章制度、強調明確層級關係、成員職責明確、高度功能分工」=科層式(bureaucratic,官僚)結構(B正確,韋伯官僚特徵)。簡單式(無正式結構)、功能式、專案式皆非。故科層式(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"簡單式是無正式結構。","B":"正確(本題答案)。規章層級分工=科層式結構。","C":"功能式是依功能分部。","D":"專案式是任務編組。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"113030-N2-43":{"quick":"規模小複雜性低的護理之家=簡單式結構。","detail":{"background":"「規模小、複雜性低」的護理之家最適合「簡單式結構(simple structure)」(C正確,層級少、集權於負責人、彈性高、適合小型組織)。專案式、矩陣式、科層式皆適大型/複雜組織。故簡單式(C)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"專案式適大型任務組織。","B":"矩陣式適大型複雜組織。","C":"正確(本題答案)。小規模低複雜=簡單式結構。","D":"科層式適大型組織。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"113180-N2-44":{"quick":"依人員專長專業分工劃分部門=功能式組織。","detail":{"background":"「依人員專長、專業分工來劃分部門」=功能式(functional)組織運作(B正確,依專業功能分部門)。直線式(指揮鏈)、部門式(依產品/地區)、集權式皆非「依專業分工」。故功能式(B)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"直線式是指揮鏈。","B":"正確(本題答案)。依專業分工=功能式組織。","C":"部門式是依產品/地區。","D":"集權式是決策集中。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"113180-N2-45":{"quick":"組織分權特性=於組織中發揮權力相互制衡功能。","detail":{"background":"組織分權特性:B「於組織中發揮權力相互制衡功能(權力分散、相互監督制衡)」正確。A「分權者對分配後的職責負有責任」——授權後主管仍負最終責任(此敘述須對應);C「造成權力過於集中或濫用」是『集權』的缺點(非分權);D「導致決策風險或重大失誤」非分權必然。故B。","options":{"A":"授權後主管仍負最終責任。","B":"正確(本題答案)。分權發揮權力相互制衡。","C":"權力過於集中是集權缺點。","D":"決策風險非分權必然。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"114030-N2-43":{"quick":"集權式組織優點=減少工作重複及成本。","detail":{"background":"集權式(centralization)組織優點:A「減少工作重複及成本(決策集中、避免重複浪費、精簡)」正確。B「員工覺得自由受尊重」、C「職權職責階層完整」、D「部門間容易溝通」是『分權』的特點。故集權優點=減少重複及成本(A)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"正確(本題答案)。集權減少工作重複及成本。","B":"員工自由受尊重是分權。","C":"階層完整偏分權。","D":"部門易溝通偏分權。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"114170-N2-39":{"quick":"護理部分權式組織=扁平式結構?本題答案B(高聳式可減少部門間衝突)。","detail":{"background":"本題官方答案B。組織結構敘述:B「高聳式結構,可減少部門間衝突(層級分明、職責清楚、衝突少)」為正確項。分權式組織通常對應「扁平式(層級少、授權多、員工自主高、利於留才)」;選項C「扁平式授權少員工自主低」、D「扁平式較不易留才」皆與扁平特性相反(錯),A「高聳式講求溝通效率」錯(高聳溝通層級多較慢)。本題以B為正確敘述。","options":{"A":"高聳式溝通層級多較慢,非講求效率。","B":"正確(本題答案)。高聳式層級分明可減少部門衝突。","C":"扁平式授權多員工自主高,非低。","D":"扁平式利於留才,非不易留才。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"115030-N2-44":{"quick":"分權化、各階層較多自主權=扁平式。","detail":{"background":"依組織結構「分權化程度高、各階層工作人員有較多自主權」的職權類型=扁平式(flat)組織(C正確,層級少、授權多、自主權大)。官僚式(層級嚴明)、矩陣式(雙重隸屬)、長型式(層級多)皆非「分權自主」。故扁平式(C)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"官僚式層級嚴明。","B":"矩陣式是雙重隸屬。","C":"正確(本題答案)。分權自主=扁平式。","D":"長型式是層級多。"},"sources":["新文京《護理行政》組織結構","華杏《護理行政學》組織型態與文化"]}},"102030-N2-64":{"quick":"好的解決方案「不包括」=應用較多資源(應用較少資源才好)。","detail":{"background":"管理者問題解決找好方案的條件:A符合組織目標、C確定性高、D冒險性低——皆是好方案的條件。選項B「應用較多資源」不是好方案的條件(本題答案)——好方案應「應用『較少』資源達成目標(經濟有效)」。故B。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"符合組織目標是好方案條件。","B":"正確(本題答案)。好方案應用較少資源,非較多。","C":"確定性高是好方案條件。","D":"冒險性低是好方案條件。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"102030-N2-72":{"quick":"發現未依常規執行,首先應=確認並承認問題。","detail":{"background":"問題解決步驟,首先應「確認並承認問題(identify the problem)」(B正確)——先確認問題存在與本質,才能後續分析、規劃方案。A命令依常規(未確認)、C參與分析、D計劃方案皆是後續步驟。故確認並承認問題(B)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"命令依常規未先確認問題。","B":"正確(本題答案)。首先確認並承認問題。","C":"分析問題是後續。","D":"計劃方案是後續。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"103030-N2-69":{"quick":"解決問題原則=先確認哪個問題影響組織利益最大。","detail":{"background":"解決問題原則:B「必須先確認那個問題是影響組織利益最大(優先處理重要問題)」最正確。A「無論大小都親自解決」錯(應授權、聚焦重要);C「不可透過院外專家」錯(必要時可借助外部專家);D「焦點放在每個小細節」錯(應抓重點非鑽小細節)。故B。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"不應事必躬親(應授權)。","B":"正確(本題答案)。先確認影響利益最大的問題。","C":"必要時可借助外部專家。","D":"應抓重點非鑽小細節。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"103100-N2-57":{"quick":"護理紀錄完成率下降,決策第一步=識別問題。","detail":{"background":"決策過程第一步是「識別(界定)問題(identify the problem)」(A正確)——先釐清問題本質,才能後續設定目標、找方案、選方案。選擇可行方案、推舉負責人、設定目標皆是後續步驟。故識別問題(A)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"正確(本題答案)。決策第一步=識別問題。","B":"選擇方案是後續。","C":"推舉負責人是後續。","D":"設定目標是後續。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"104030-N2-57":{"quick":"「均須正確洗手」=確定性決策。","detail":{"background":"決策類型(依結果可預測性):確定性(certainty,結果已知確定)、風險性(risk,有機率)、不確定性(uncertainty,結果未知)。「每位接觸病人均須正確洗手」(結果明確、依規定必做)=確定性決策(A正確)。故確定性決策(A)。","options":{"A":"正確(本題答案)。結果明確必做=確定性決策。","B":"不確定性是結果未知。","C":"情境混淆非標準。","D":"風險性是有機率。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"105090-N2-57":{"quick":"管路滑脫增加,第一步=界定問題,找出原因。","detail":{"background":"近一週管路滑脫人數增加,護理長「第一步」應「界定問題、找出原因(A)」——先釐清問題與原因,才能後續找方案、計畫、評估。評估決策效能、找替代政策、計畫活動步驟皆是後續。故界定問題找原因(A)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"正確(本題答案)。第一步界定問題找原因。","B":"評估決策效能是後續。","C":"找替代政策是後續。","D":"計畫活動步驟是後續。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"106030-N2-59":{"quick":"腦力激盪、德爾菲技術=團體決策。","detail":{"background":"「腦力激盪法(brainstorming)、德爾菲技術(Delphi)」皆是「團體(group)決策」方法(D正確,集合多人意見)。個人、諮商(主管聽建議後自決)、獨裁皆非「集合團體意見」。故團體決策(D)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"個人決策是一人決定。","B":"諮商是主管聽建議後自決。","C":"獨裁是主管獨斷。","D":"正確(本題答案)。腦力激盪德爾菲=團體決策。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"107030-N2-70":{"quick":"將過去意外列入新人訓練避免再發生=經驗談(問題解決法)。","detail":{"background":"護理長「將過去發生的意外疏失列入新人訓練,以避免再次發生」=以「經驗(經驗談,經驗法則)」解決問題(D正確,借鏡過去經驗預防)。直覺法、嘗試錯誤、自我解決皆非「借鏡過去經驗」。故經驗談(D)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"直覺法是憑直覺。","B":"嘗試錯誤是試誤。","C":"自我解決非借鏡經驗。","D":"正確(本題答案)。借鏡過去經驗=經驗談。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"108110-N2-58":{"quick":"決策矩陣分析=將不同方案及影響因素以矩陣列出依影響因素選擇。本題答案D。","detail":{"background":"本題官方答案D。決策矩陣分析(decision matrix):D「將不同方案及其影響因素以矩陣方式列出,決策者依各方案之『影響因素』選擇」正確。A「非數量方法」錯(可量化評分);B「依優缺點」、C「依成功機率與期望值」敘述不如D完整。故D。","options":{"A":"決策矩陣可量化評分。","B":"依優缺點敘述不完整。","C":"依機率期望值敘述不完整。","D":"正確(本題答案)。依方案的影響因素矩陣選擇。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"108110-N2-59":{"quick":"規劃的核心觀念=決策。","detail":{"background":"規劃(planning,建構發展解決問題或達成目標的行動方案)的「核心觀念」是「決策(decision making)」(A正確)——規劃過程本質是不斷做決策(選目標、選方案)。目標、預測、計畫皆是規劃要素但核心是決策。故決策(A)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"正確(本題答案)。規劃的核心觀念是決策。","B":"目標是規劃要素之一。","C":"預測是規劃要素之一。","D":"計畫是規劃產物。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"109030-N2-57":{"quick":"先提初步方針再聽意見、由護理長做決策=諮商型決策。","detail":{"background":"決策模式:護理長「先提初步方針→請同仁提意見→由護理長(自己)做決策」=諮商型(consultative)決策(C正確,主管徵詢部屬意見後仍自行決定)。獨裁型(不徵詢)、團體型(共同決定)、授權型(下放決定)皆非「徵詢後自決」。故諮商型(C)。","options":{"A":"獨裁型不徵詢意見。","B":"團體型是共同決定。","C":"正確(本題答案)。徵詢後自決=諮商型決策。","D":"授權型是下放決定。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"109030-N2-61":{"quick":"決策過程=界定問題→確立準則→列舉方案→分析利弊→執行方案。本題答案B。","detail":{"background":"本題官方答案B。決策過程合理順序:B「界定問題→確立決策準則→列舉可行方案→分析方案利弊→執行方案」正確——先界定問題,再訂評估準則,然後列方案、分析、執行。其餘順序顛倒(如先列方案再訂準則)。故B。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"先列方案再訂準則,順序不當。","B":"正確(本題答案)。界定→準則→列方案→分析→執行。","C":"分析在列方案前,順序不當。","D":"列方案在訂準則前,順序不當。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"109110-N2-60":{"quick":"增進決策技能=尋求合適諮詢資源(2)+用陌生眼光看事情(3)+掌握重要資訊(4)。本題答案B「234」。","detail":{"background":"本題官方答案「234」。增進個人決策技能:2尋求合適的諮詢資源、3採用陌生的眼光看事情(跳脫框架)、4學習掌握重要的資訊。選項1「完全採用別人意見」錯(應參考非完全照搬)。故234。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"含1(完全採用別人意見)錯。","B":"正確(本題答案,234)。諮詢資源、陌生眼光、掌握資訊。","C":"含...不符。","D":"含1錯。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"109110-N2-62":{"quick":"聽報告詢去年作法、不要差異經多人同意=政治的決策理論。","detail":{"background":"護理部主任決定慶祝活動「聽報告、詢去年作法、不要太大差異、要經多人同意」(權衡各方、求共識、避免風險)=政治的(political)決策理論(B正確,透過協商、妥協、聯盟達成可接受方案)。理性(最佳化)、行為(有限理性)、規範決策皆非「政治協商求共識」。故政治的決策理論(B)。","options":{"A":"理性決策追求最佳化。","B":"正確(本題答案)。協商求共識避風險=政治的決策理論。","C":"行為決策是有限理性。","D":"規範決策非此。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"109110-N2-74":{"quick":"火花濃煙緊急辨識解除危機=直覺思考。","detail":{"background":"值班護理長巡房發現「樓梯間火花濃煙、緊急辨識問題、解除危機」(時間緊迫、憑經驗快速判斷)=直覺(intuitive)思考(B正確,危急時憑經驗快速決策)。邏輯、理性、創意思考皆需較多時間分析,不適危急。故直覺思考(B)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"邏輯思考需時間推理。","B":"正確(本題答案)。危急快速判斷=直覺思考。","C":"理性思考需時間分析。","D":"創意思考非危急用。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"110030-N2-60":{"quick":"非量性決策工具=腦力激盪法。","detail":{"background":"決策工具:非量性(質性,憑判斷討論)如腦力激盪法、德爾菲法;量性(數量化)如模擬法、作業研究、排列法。選項A「腦力激盪法」=非量性決策工具(A正確)。模擬法、排列法、作業研究法皆是量性。故腦力激盪法(A)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"正確(本題答案)。腦力激盪法=非量性決策工具。","B":"模擬法是量性。","C":"排列法是量性。","D":"作業研究法是量性。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"110030-N2-78":{"quick":"主任與督導個別討論後主任決定=諮商二型決策。","detail":{"background":"Vroom-Yetton決策模式:諮商型分諮商一型(CI,個別徵詢後自決)、諮商二型(CII,集體徵詢後自決)。「主任與督導『個別討論』後、主任決定」——若個別徵詢應為諮商一型;惟本題官方答案為「諮商二型」(C),係將「與多位督導討論」視為集體諮商。核心:主管徵詢部屬後自行決定=諮商型。","options":{"A":"團體一型是共同決定。","B":"團體二型是共同決定。","C":"諮商一型是個別徵詢後自決。","D":"正確(本題答案)。徵詢督導後主任自決=諮商二型(CII)。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"110110-N2-60":{"quick":"LINE群組徵詢意見引導討論排定方案=名義(記名式)團體法。","detail":{"background":"護理長用「LINE群組徵詢大家意見、引導討論、排定解決方案」(成員具名提意見、彙整討論排序)=名義/記名式團體法(nominal group technique)(B正確)。問卷調查、焦點團體(面對面討論)、德菲法(匿名多輪、不互動)皆非「具名群組討論排序」。故名義團體法(B)。","options":{"A":"問卷調查非互動討論。","B":"正確(本題答案)。具名群組討論排序=名義團體法。","C":"焦點團體是面對面討論。","D":"德菲法是匿名多輪。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"111030-N2-66":{"quick":"非正式組織=對正式組織有影響(1)+增加工作知能(3)+因利害結合(4)。本題答案C「134」。","detail":{"background":"本題官方答案「134」。非正式組織特性:1對正式組織會產生影響力、3是一群能增加工作知能的人(資訊交流)、4因利害關係/情感結合。選項2「組成需明文規定」錯(非正式組織『不需』明文規定,自然形成);5...。故134。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"含2(明文規定)錯。","B":"345含2不符。","C":"正確(本題答案,134)。影響正式組織、增知能、利害結合。","D":"含2錯。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"112030-N2-61":{"quick":"防範先入為主決策陷阱=不要在最先的想法上錨定等(234)。本題答案B「234」。","detail":{"background":"本題官方答案「234」。防範決策「先入為主(錨定)」陷阱:2不要被最先的想法錨定、3徵詢不同意見、4以多元角度檢視(避免確認偏誤)。選項1「先徵詢他人意見不要思考解決方法」錯(應自己思考也參考他人,非完全不思考);5...。故234。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"含1(不思考)錯。","B":"正確(本題答案,234)。不錨定、徵詢不同意見、多元檢視。","C":"含5不符。","D":"含1錯。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"112030-N2-72":{"quick":"Keeney最佳問題解決方案=符合組織目標。","detail":{"background":"Keeney建議的最佳問題解決方案特性:A「符合組織目標」正確。B「使用較多資源」錯(應用較少資源);C「選擇高冒險性」錯(應低冒險);D「預期效果受限」錯(應預期效果佳)。故符合組織目標(A)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"正確(本題答案)。最佳方案符合組織目標。","B":"應用較少資源,非較多。","C":"應低冒險,非高冒險。","D":"應預期效果佳,非受限。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"112110-N2-57":{"quick":"直覺式決策=直覺訓練透過不斷練習累積培養。","detail":{"background":"直覺式決策(intuitive decision-making):B「直覺訓練是透過不斷的練習,累積培養出直覺能力」正確(直覺源自經驗累積)。A「直覺是超能力」錯(是經驗準備的產物);C「新人不合適過早培養直覺」錯(可逐步培養);D「目標混淆時不應用直覺」錯(目標混淆、時間緊迫時反而常用直覺)。故B。","options":{"A":"直覺非超能力,是經驗產物。","B":"正確(本題答案)。直覺透過練習累積培養。","C":"新人可逐步培養直覺。","D":"目標混淆時反而常用直覺。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"112110-N2-59":{"quick":"護理長層級的管理決策=病人問題解決。","detail":{"background":"管理決策層級:高層(策略,如大量傷患應變)、中層(戰術,如單位間人力調度、醫療糾紛)、基層/護理長(作業,如病人問題解決、單位日常運作)。「護理長層級」的決策=病人問題解決(D正確,第一線作業決策)。故病人問題解決(D)。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"大量傷患應變是高層決策。","B":"單位間人力調度是中層。","C":"醫療糾紛處理是中高層。","D":"正確(本題答案)。病人問題解決=護理長層級決策。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"113100-N2-39":{"quick":"培養決策直覺=充實的知識(1)+豐富的經驗(2)→「12」。","detail":{"background":"Gary Klein直覺決策能力的培養:1充實的知識、2豐富的經驗(直覺源自知識與經驗的累積、模式辨識)。選項3「財富的累積」、4「良好溝通能力」與培養決策直覺無直接關係。故為「12」。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"正確(本題答案,12)。充實知識、豐富經驗培養直覺。","B":"含3(財富)不符。","C":"含3、4不符。","D":"含4不符。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"113100-N2-44":{"quick":"Sullivan問題解決七步驟首要=確認問題。","detail":{"background":"Sullivan問題解決過程七步驟,首要進行的是「確認問題(define/identify the problem)」(B正確)——先釐清問題本質,才能後續收集資料、分析、訂方案。收集資料、分析資料、訂定方案皆是後續步驟。故確認問題(B)。","options":{"A":"收集資料是後續。","B":"正確(本題答案)。七步驟首要=確認問題。","C":"分析資料是後續。","D":"訂定方案是後續。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"114030-N2-49":{"quick":"問題解決原則=優先處理影響組織利益最大的問題。","detail":{"background":"問題解決原則:C「優先處理影響組織利益最大的問題(抓重點、依重要性排序)」正確。A「主管親自解決以縮短時間」錯(應適當授權);B「避免外部專家以免影響聲譽」錯(必要時可借助外部專家);D「主管須注意小細節」錯(應抓重點非鑽小細節)。故C。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"應適當授權,非事必躬親。","B":"必要時可借助外部專家。","C":"正確(本題答案)。優先處理影響利益最大的問題。","D":"應抓重點非鑽小細節。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"115030-N2-39":{"quick":"從眾方案選危害最小=最小極限性策略(minimax)。","detail":{"background":"決策者在「不利後果情況下,從眾多方案中選擇危害最小」的策略=最小極限性(minimax,使最大損失最小化)策略(C正確)。滿意性(夠好即可)、最少缺憾(minimize regret)、樂觀性(maximax,選最好結果)皆非「選危害最小」。故最小極限性策略(C)。","options":{"A":"滿意性策略是夠好即可。","B":"最少缺憾是使後悔最小。","C":"正確(本題答案)。選危害最小=最小極限性策略。","D":"樂觀性策略選最好結果。"},"sources":["新文京《護理行政》決策與問題解決","華杏《護理行政學》決策模式"]}},"103100-N2-58":{"quick":"規劃目的「錯誤」=提升不確定的程度(規劃應「降低」不確定性)。","detail":{"background":"規劃(planning)的目的:A提供部屬工作努力指標(對)、C減少重複及多餘行動(對)、D作為管制基礎(對)。選項B「提升不確定的程度」錯誤(本題答案)——規劃應「『降低』不確定性、增加可預測性」,非提升不確定。故B。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"規劃提供努力指標。","B":"正確(本題答案)。規劃應降低不確定性,非提升。","C":"規劃減少重複行動。","D":"規劃作為管制基礎。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"105030-N2-72":{"quick":"目標管理「不」是優點=極重視量化目標(過度重量化是缺點)。","detail":{"background":"目標管理(MBO)優點:A落實分權、B促進員工間溝通、D提高士氣。選項C「極重視量化目標」不是優點(本題答案)——MBO「過度強調量化目標」會忽略難量化但重要的面向,是其缺點而非優點。故C。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"MBO優點:落實分權。","B":"MBO優點:促進溝通。","C":"正確(本題答案)。過度重量化是MBO缺點,非優點。","D":"MBO優點:提高士氣。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"105030-N2-76":{"quick":"降低離職率屬管理過程的「控制」階段。","detail":{"background":"護理管理過程(規劃→組織→人事→領導→控制)。「降低離職率」屬「控制(controlling)」階段——監測指標(離職率)、發現偏差、採取改善(C正確)。領導、組織、規劃皆非「監測改善指標」。故控制(C)。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"領導是引導激勵。","B":"組織是建構結構。","C":"正確(本題答案)。監測改善離職率=控制階段。","D":"規劃是訂目標方案。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"105090-N2-62":{"quick":"「已有國際集團與當地業者合作」=SWOT的威脅(threats)。","detail":{"background":"SWOT分析:優勢/劣勢(內部);機會/威脅(外部環境)。「C國已有S國與K國等國際集團與當地業者合作(競爭者已進入、外部不利)」=威脅(threats)(D正確)。故威脅(D)。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"優勢是內部有利。","B":"劣勢是內部不利。","C":"機會是外部有利。","D":"正確(本題答案)。競爭者進入=威脅。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"105090-N2-63":{"quick":"「財團看好趨勢邀請合作」=SWOT的機會(opportunity)。","detail":{"background":"SWOT分析:「C國財團看好人口老化少子化趨勢、邀請G集團合作(外部環境帶來的有利商機)」=機會(opportunity)(C正確,外部有利因素)。優勢/劣勢是內部;威脅是外部不利。故機會(C)。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"優勢是內部有利。","B":"劣勢是內部不利。","C":"正確(本題答案)。外部商機=機會。","D":"威脅是外部不利。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"105090-N2-64":{"quick":"專案指導3個月繳進度報告「不包含」目標管理的=績效考核。","detail":{"background":"目標管理(MBO)要素:目標設定、行動規劃、定期檢討、績效考核。題幹含「目標設定(提升通過率)、行動規劃(每人指導一位每月4小時)、定期檢討(3個月後繳進度報告)」,但「不包含」明確的「績效考核(D)」步驟。故D(未提績效考核)。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"含目標設定(提升通過率)。","B":"含行動規劃(指導安排)。","C":"含定期檢討(3個月進度報告)。","D":"正確(本題答案)。未包含績效考核。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"105090-N2-71":{"quick":"目標管理目標設定後下一步=計畫(行動規劃)。","detail":{"background":"目標管理(MBO)步驟:目標設定→計畫(行動規劃,擬定達成目標的行動方案)→執行→檢討/控制。目標設定後的「下一步」是「計畫(D)」(擬定行動方案)。組織、領導、控制皆是後續。故計畫(D)。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"組織是後續。","B":"領導是後續。","C":"控制是後續。","D":"正確(本題答案)。目標設定後下一步=計畫(行動規劃)。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"108020-N2-58":{"quick":"依內外環境調整願景價值理念使命=策略性規劃。","detail":{"background":"規劃層級:策略性規劃(strategic,高層、長程、依內外環境調整組織願景/使命/價值)、操作規劃(operational,基層、短程)、方案/偶發規劃。「根據組織與內外環境關係,調整願景、價值觀、理念與使命」=策略性規劃(A正確)。故策略性規劃(A)。","options":{"A":"正確(本題答案)。調整願景使命=策略性規劃。","B":"偶發性規劃是應變。","C":"操作規劃是基層短程。","D":"方案規劃是特定方案。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"108020-N2-61":{"quick":"目標管理(MBO)=強調成員參與決策及共同制定目標。","detail":{"background":"彼得杜拉克目標管理(MBO):D「強調成員『參與決策及共同制定目標』」最適切。A「只關注組織目標非個人」錯(MBO結合組織與個人目標);B「對人性預設與X理論一致」錯(MBO符合Y理論);C「以過程為導向」錯(MBO是『結果/目標』導向)。故D。","options":{"A":"MBO結合組織與個人目標。","B":"MBO符合Y理論,非X理論。","C":"MBO是結果/目標導向,非過程。","D":"正確(本題答案)。MBO強調參與決策共同制定目標。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"108110-N2-77":{"quick":"報酬超過能力生產力且差距達10%以上=讓員工... 本題答案C。","detail":{"background":"本題官方答案C。Jaques能力(C)-生產力(W)-報酬(P)模式:C「報酬超過能力及生產力,但與實際及期望報酬差距達10%以上,讓(員工產生罪惡感/壓力等)」為正確敘述。核心:報酬與能力生產力的失衡會影響工作滿意度;報酬過高且差距大也會造成心理壓力。作答以官方C為準。","options":{"A":"能力超過報酬敘述不符。","B":"生產力超過報酬敘述不符。","C":"正確(本題答案)。報酬超過能力生產力差距達10%以上。","D":"生產力超過能力敘述不符。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"109030-N2-60":{"quick":"MBO的SMART:M是目標必須可測量(measurable)。","detail":{"background":"SMART目標原則:S具體(Specific)、M可測量(Measurable)、A可達成(Achievable)、R相關(Relevant)、T有時限(Time-bound)。選項A「M的意義是目標必須可以測量(measurable)」正確。B S是Specific(非superb)、C T是Time-bound(非transformable)、D R是Relevant(非remarkable)。故A。","options":{"A":"正確(本題答案)。M=可測量(measurable)。","B":"S是Specific,非superb。","C":"T是Time-bound,非transformable。","D":"R是Relevant,非remarkable。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"109110-N2-58":{"quick":"MBO(目標管理)=234(參與制定、定期檢討、結果導向)。本題答案B。","detail":{"background":"本題官方答案「234」。杜拉克目標管理(MBO)正確敘述:2成員參與制定目標、3定期檢討進度回饋、4以結果為導向、結合組織與個人目標。選項1「只關注組織目標非個人」錯(MBO結合兩者);5...。故234。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"含1(只關注組織)錯。","B":"正確(本題答案,234)。參與制定、定期檢討、結果導向。","C":"含5不符。","D":"含1錯。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"110030-N2-57":{"quick":"目標管理「錯誤」=主管決策(MBO應由主管與員工共同設定目標)。","detail":{"background":"目標管理(MBO):A可衡量的具體目標(對)、C明確的期限(對)、D績效的回饋評估(對)。選項B「主管決策」錯誤(本題答案)——MBO強調「主管與員工『共同』設定目標、參與決策」,非主管單獨決策。故B。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"MBO:可衡量具體目標。","B":"正確(本題答案)。MBO是共同設定,非主管單獨決策。","C":"MBO:明確期限。","D":"MBO:績效回饋評估。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"110030-N2-61":{"quick":"規劃護理管理工作的核心觀念=決策。","detail":{"background":"規劃(planning)護理管理工作的「核心觀念」是「決策(decision making)」(B正確)——規劃本質是做一連串決策(選目標、選方案)。分析資料、簡化流程、開源節流皆非規劃的核心觀念。故決策(B)。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"分析資料是規劃的一環。","B":"正確(本題答案)。規劃核心觀念=決策。","C":"簡化流程非核心。","D":"開源節流非核心。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"110030-N2-62":{"quick":"革新目標設定最佳=6個月內降低壓瘡發生率至0.10%(具體可測量有時限)。","detail":{"background":"目標設定應「具體、可測量、有時限、實際可達」。選項C「於6個月內降低病人壓瘡發生率至0.10%」最佳(C正確,有時限+可測量+實際)。A「滿意度至100%」(不切實際)、B「降低中心靜脈導管感染率」(無量化目標值/時限)、D「提升留任率」(無量化)皆不夠具體。故C。","options":{"A":"滿意度100%不切實際。","B":"無量化目標值與時限。","C":"正確(本題答案)。6個月內降至0.10%具體可測量有時限。","D":"無量化目標值。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"110110-N2-61":{"quick":"規劃目的「錯誤」=增加工作步驟(規劃應「簡化」減少步驟)。","detail":{"background":"規劃護理管理工作的目的:A設定明確目標(對)、B增加效率及效果(對)、C降低不確定的程度(對)。選項D「增加工作步驟」錯誤(本題答案)——規劃應「簡化流程、減少重複多餘的步驟」,非增加工作步驟。故D。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"規劃設定明確目標。","B":"規劃增加效率效果。","C":"規劃降低不確定性。","D":"正確(本題答案)。規劃應減少步驟,非增加。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"112110-N2-58":{"quick":"規劃原則=規劃應具體可行,切合實際狀況。","detail":{"background":"規劃原則:C「規劃應具體可行,切合實際狀況」正確。A「可憑直覺進行」錯(規劃應理性分析非憑直覺);B「應不連貫」錯(規劃應具連貫性);D「不宜理性分析」錯(規劃應理性分析)。故C。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"規劃應理性分析,非憑直覺。","B":"規劃應連貫,非不連貫。","C":"正確(本題答案)。規劃應具體可行切合實際。","D":"規劃應理性分析。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"112110-N2-60":{"quick":"訂定人員工作說明書及職責=組織(organizing)過程。","detail":{"background":"護理管理過程(規劃→組織→領導→控制)。「訂定人員的工作說明書及職責(劃分職權職責、建構分工)」=組織(organizing)階段(B正確)。規劃(訂目標)、領導(引導激勵)、控制(監測)皆非「劃分職責分工」。故組織(B)。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"規劃是訂目標方案。","B":"正確(本題答案)。訂工作說明書職責=組織過程。","C":"領導是引導激勵。","D":"控制是監測。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"112110-N2-62":{"quick":"具體可測量目標=降低感染性垃圾50公斤。","detail":{"background":"目標設定具體可測量:B「降低感染性垃圾50公斤(有明確量化數值)」最具體可測量(B正確)。A「提升住院滿意度」、C「提升開刀房留任率」、D「強化100位護理師書寫紀錄能力」皆缺乏明確的「可測量的量化目標值或衡量標準」(D雖有100位但「強化能力」難測量)。故B。","options":{"A":"提升滿意度無量化目標值。","B":"正確(本題答案)。降低50公斤可測量。","C":"提升留任率無量化目標值。","D":"「強化能力」難測量。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"112180-N2-36":{"quick":"非計畫性拔管0%目標=明確期間(1)+可測量(2)?本題答案A「12」。","detail":{"background":"本題官方答案「12」。「本年度非計畫性拔管發生率0%」符合MBO要素:1明確期間(本年度)、2可測量(發生率0%)。選項3、4...。核心:好的MBO目標須明確期限+可量化測量+實際。此目標含時限與量化指標。故12。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"正確(本題答案,12)。明確期間(本年度)、可測量(0%)。","B":"34不符。","C":"13不符。","D":"24不符。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"113030-N2-36":{"quick":"目標管理=主管須定期評值目標進度,並將結果回饋員工。","detail":{"background":"目標管理(MBO):D「主管須定期評值目標進度,並將結果回饋員工」正確。A「個人與組織目標各自獨立」錯(MBO應結合兩者);B「主管僅做決策、其餘授權員工獨立完成」錯(MBO強調共同參與);C「達成時間限制應保持彈性」錯(MBO應有明確期限)。故D。","options":{"A":"MBO應結合個人與組織目標。","B":"MBO強調共同參與,非只主管決策。","C":"MBO應有明確期限,非彈性。","D":"正確(本題答案)。定期評值進度並回饋員工。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"113180-N2-36":{"quick":"短中長程計畫=策略性規劃屬中程、由所有護理主管共同規劃。本題答案C。","detail":{"background":"本題官方答案C。護理部門計畫層級:C「策略性規劃屬中程計畫,應由所有護理主管共同規劃」為正確項。A「組織目標政策屬長程,由基層共同規劃」錯(長程應由高層規劃);B「作業規劃程序屬短程,由護理部主任規劃」錯(短程應由基層);D「各部門目標屬戰略性計畫,由督導規劃」敘述不當。故C。","options":{"A":"長程應由高層規劃,非基層。","B":"短程應由基層,非主任。","C":"正確(本題答案)。策略性規劃屬中程、由所有護理主管共同規劃。","D":"各部門目標敘述不當。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"114030-N2-36":{"quick":"使命或任務=應以顧客的需要為主要依據。","detail":{"background":"使命/任務(mission):B「應以『顧客的需要』為主要依據(組織存在是為滿足顧客)」正確。A「是策略性規劃的最後步驟」錯(使命是『起點/基礎』);C「依評鑑標準訂定」錯(使命依組織宗旨與顧客需求);D「為指引員工行為的基本準則」是『價值觀』非使命。故B。","options":{"A":"使命是規劃的起點,非最後步驟。","B":"正確(本題答案)。使命以顧客需要為依據。","C":"使命依宗旨與顧客需求,非評鑑標準。","D":"指引行為準則是價值觀。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"114030-N2-37":{"quick":"杜拉克目標管理屬=參與式管理。","detail":{"background":"彼得杜拉克目標管理(MBO)屬「參與式(participative)管理模式」(A正確)——主管與員工共同參與設定目標、自我控制達成。權威式、放任式、民主式(民主與參與相近但本題以參與式為答案)。故參與式管理(A)。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"正確(本題答案)。MBO屬參與式管理。","B":"權威式是命令。","C":"放任式是不管。","D":"民主式相近但本題答參與式。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"114170-N2-37":{"quick":"規劃的功能=增加達成目標機會(1)+各單位協調一致(2)+發揮管理績效(3)。本題答案A「123」。","detail":{"background":"本題官方答案「123」。規劃(planning)的功能/目的:1達成目標的機會增加、2各單位的協調一致性高、3能發揮管理績效(及降低不確定、作為控制基礎)。選項4「個人承諾度佳」、5「組織管理彈性(增加步驟)」非規劃核心功能。故123。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"正確(本題答案,123)。增達標機會、協調一致、發揮績效。","B":"234不符。","C":"345不符。","D":"145不符。"},"sources":["新文京《護理行政》規劃與目標管理","華杏《護理行政學》策略規劃與SWOT"]}},"101030-N2-71":{"quick":"望年會委託福委會全權辦理=功能性職權授權。","detail":{"background":"授權原則:醫院「委託福委會『全權辦理』望年會(就特定功能/事務授予完整職權)」=功能性職權(functional authority)授權(B正確)。工作範圍、統一指揮、金字塔狀階層皆非「就特定功能全權授權」。故功能性職權(B)。授權(delegation):授權不授責(主管仍負最終責任)、逐級授權、不可重複授權、公開授權、循指揮系統不越級(單一隸屬/指揮統一)、授權前先教育訓練、授權給有能力者、核心決策不授權。時間管理四象限:重要且緊急→重要不緊急(最該投入預防)→不重要緊急→不重要不緊急;適當拒絕、利用零碎時間、充分授權。","options":{"A":"工作範圍非此。","B":"正確(本題答案)。全權辦理特定事務=功能性職權。","C":"統一指揮是單一指揮。","D":"金字塔狀是層級結構。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"103030-N2-60":{"quick":"護理長不在授權資深護理師但有副護理長=違反指揮統一?本題答案A(職權與職責均衡)。","detail":{"background":"本題官方答案A。護理長不在時授權「資深護理師」代理,但病房已有「副護理長」在上班——應授權給副護理長(職位職責對應)。授權給資深護理師而非副護理長,違反「職權與職責均衡(職權應與職責相稱)」原則(A)。核心:授權應對應職位職責、循指揮系統。","options":{"A":"正確(本題答案)。違反職權與職責均衡(應授權副護理長)。","B":"指揮統一是只向一位主管。","C":"絕對的職責非此。","D":"金字塔形狀數量非此。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"103030-N2-77":{"quick":"依指揮統一原則適合=教育副主任授權甲督導及所屬護理長辦在職教育。","detail":{"background":"指揮統一(unity of command)原則:命令須循單一指揮系統、逐級下達。選項D「教育副主任授權甲督導及其所屬單位護理長辦理在職教育(循自己管轄系統逐級授權)」符合(D正確)。A「未經督導同意直接授權護理長」(越級)、B「甲督導授權乙督導所管轄單位」(跨系統)、C「兩位副主任同時指揮一督導」(雙頭馬車)皆違反指揮統一。故D。","options":{"A":"越級授權違反指揮統一。","B":"跨系統授權違反指揮統一。","C":"兩主任同指揮一督導違反統一。","D":"正確(本題答案)。循自己系統逐級授權符合指揮統一。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"104030-N2-59":{"quick":"時間管理「不」是迷思偏差=充分授權(充分授權是正確做法)。","detail":{"background":"時間管理常犯的迷思/偏差:A事必躬親、C能者多勞、D效率掛帥(只重效率忽略效能)——皆是迷思。選項B「充分授權」不是迷思偏差(本題答案)——充分授權是「正確的時間管理方法」(分擔工作、聚焦重要事務)。故B。授權(delegation):授權不授責(主管仍負最終責任)、逐級授權、不可重複授權、公開授權、循指揮系統不越級(單一隸屬/指揮統一)、授權前先教育訓練、授權給有能力者、核心決策不授權。時間管理四象限:重要且緊急→重要不緊急(最該投入預防)→不重要緊急→不重要不緊急;適當拒絕、利用零碎時間、充分授權。","options":{"A":"事必躬親是時間管理迷思。","B":"正確(本題答案)。充分授權是正確做法,非迷思。","C":"能者多勞是迷思。","D":"效率掛帥是迷思。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"104030-N2-74":{"quick":"時間管理「錯誤」=重要且不急迫的事應優先處理(應先處理重要且急迫)。","detail":{"background":"時間管理(四象限):應「先處理重要且緊急→重要但不緊急→不重要但緊急→不重要不緊急」。選項A「重要且『不』急迫的事應『優先』處理」錯誤(本題答案)——應先處理「重要且『緊急』」的事。B適當拒絕請託、C正確使用電話郵件、D利用零碎時間皆是正確的時間管理。故A。","options":{"A":"正確(本題答案)。應先處理重要且緊急,非重要不急迫。","B":"適當拒絕請託是正確。","C":"正確使用電話郵件是正確。","D":"利用零碎時間是正確。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"105090-N2-59":{"quick":"規劃活動依願景指派負責並授權=指導者角色功能?本題答案C。","detail":{"background":"本題官方答案C(指導者)。護理長「規劃一連串病房活動、依醫院願景、指派負責人員並有效授權」——統籌指揮、指派授權=指導者(director)角色功能(C)。促進者(facilitator)、生產者(producer)、創新者(innovator)皆非「統籌指派授權」。故指導者(C)。","options":{"A":"促進者偏協助促成。","B":"生產者偏產出績效。","C":"正確(本題答案)。統籌指派授權=指導者角色。","D":"創新者偏創新變革。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"106110-N2-58":{"quick":"常因找藥、家屬要床單、回電而中斷=時間管理的「中斷干擾」?本題答案A。","detail":{"background":"本題官方答案A。護理師發藥常因「在電腦系統找藥物作用、家屬要床單、回電」而中斷——這些都是時間管理的「干擾/中斷(interruption)」。題目問哪一部分屬某類別,以A「常在電腦系統上尋找藥物的作用」為答案(屬可改善的時間浪費/自我造成的中斷)。核心:辨識時間浪費來源以改善。","options":{"A":"正確(本題答案)。找藥物作用屬時間浪費/中斷。","B":"家屬要床單是外來中斷。","C":"回電是外來中斷。","D":"中斷衛教是結果。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"106110-N2-70":{"quick":"「不」是促進授權的因素=能拓展主管的威勢(授權目的非為主管威勢)。","detail":{"background":"促進主管授權的因素:A減輕主管時間限制、B卸除主管本身的責任?(授權非卸責)、D培育員工。選項C「能拓展主管的威勢」不是促進授權的因素(本題答案)——授權是為分工、培育員工、減輕負荷,非為「拓展主管威勢」。故C。(註:選項B「卸除責任」嚴格說授權後主管仍負最終責任,但本題以C為答案。)","options":{"A":"授權減輕主管時間限制。","B":"授權分擔工作(主管仍負最終責任)。","C":"正確(本題答案)。拓展威勢非授權目的。","D":"授權培育員工。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"106110-N2-72":{"quick":"授權原則「錯誤」=只限於例行性工作(授權不限例行性,亦可授權非例行)。","detail":{"background":"授權原則:B逐級授權(對)、C不可重複授權(對)、D公開授權(對)。選項A「只限於例行性工作」錯誤(本題答案)——授權「不限於例行性工作」,主管可將部分非例行但部屬能勝任的工作授權,但「政策制定、重大決策、人事考核」等核心職權不宜授權。故A。","options":{"A":"正確(本題答案)。授權不限例行性工作。","B":"授權應逐級授權。","C":"授權不可重複授權。","D":"授權應公開授權。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"108110-N2-72":{"quick":"授權保管麻醉藥出問題:護理長是管理者應負最後責任。","detail":{"background":"授權原則:授權者(主管)「授權但不授責」——授權後主管仍負「最後管理責任」。護理長授權組長保管麻醉藥,若數量出問題:C「護理長是病房管理者,應負最後管理責任」正確。A「組長負最後責任」錯;B「與管理無關」錯;D「組長與取用者共同負最後責任」錯。故C。","options":{"A":"授權後護理長仍負最後責任,非組長。","B":"與管理有關(護理長負責)。","C":"正確(本題答案)。護理長是管理者負最後管理責任。","D":"護理長負最後責任,非共同。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"109030-N2-59":{"quick":"時間管理外在因素=文書工作繁雜(同前;外在因素)。","detail":{"background":"時間管理障礙:內在(個人習慣:拖延、難拒絕、計畫不周、缺乏組織能力);外在(環境/工作本身:文書繁雜、會議多)。選項D「文書工作繁雜」屬外在因素(D正確)。A難以拒絕、B計畫不周、C缺乏組織能力皆內在。故D。授權(delegation):授權不授責(主管仍負最終責任)、逐級授權、不可重複授權、公開授權、循指揮系統不越級(單一隸屬/指揮統一)、授權前先教育訓練、授權給有能力者、核心決策不授權。時間管理四象限:重要且緊急→重要不緊急(最該投入預防)→不重要緊急→不重要不緊急;適當拒絕、利用零碎時間、充分授權。","options":{"A":"難以拒絕是內在因素。","B":"計畫不周是內在因素。","C":"缺乏組織能力是內在因素。","D":"正確(本題答案)。文書工作繁雜是外在因素。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"111030-N2-70":{"quick":"未經督導同意直接請護理長負責=違反單一隸屬關係(指揮統一)。","detail":{"background":"授權原則:護理部主任「未經督導長同意,直接(越級)請護理長負責專案」——違反「單一隸屬關係(指揮統一,命令應循直屬指揮系統逐級下達,不越級)」(A正確)。授權非授責、相互信賴、量力授權皆非此越級問題。故單一隸屬關係(A)。授權(delegation):授權不授責(主管仍負最終責任)、逐級授權、不可重複授權、公開授權、循指揮系統不越級(單一隸屬/指揮統一)、授權前先教育訓練、授權給有能力者、核心決策不授權。時間管理四象限:重要且緊急→重要不緊急(最該投入預防)→不重要緊急→不重要不緊急;適當拒絕、利用零碎時間、充分授權。","options":{"A":"正確(本題答案)。越級授權違反單一隸屬關係。","B":"授權非授責是責任原則。","C":"相互信賴非此。","D":"量力授權非此。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"111110-N2-67":{"quick":"管轄幅度設計=工作越重要管轄幅度應越小。","detail":{"background":"管轄幅度(span of control)設計:C「工作越『重要』,管轄幅度應越『小』(主管能仔細監督少數重要工作)」正確。A「環境越複雜幅度越大」錯(複雜應幅度小);B「充分授權幅度越小」錯(授權多可幅度大);D「工作性質變化越大幅度越大」錯(變化大應幅度小)。故C。","options":{"A":"環境複雜應幅度小,非大。","B":"充分授權可幅度大,非小。","C":"正確(本題答案)。工作越重要管轄幅度越小。","D":"工作變化大應幅度小,非大。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"111110-N2-68":{"quick":"護理長授權組長最適當=單位護理人員的排班。","detail":{"background":"授權應授「部屬能勝任、非核心決策」的事務。選項A「單位護理人員的排班(例行作業、組長可執行)」最適當授權給組長(A正確)。B「追回遺失麻醉藥物」(管制藥品須護理長親自處理)、C「擬定單位年度計畫」(核心規劃不宜授權)、D「提振低迷士氣」(領導職責)皆不宜授權組長。故A。","options":{"A":"正確(本題答案)。排班可授權組長。","B":"遺失麻醉藥須護理長親自處理。","C":"年度計畫是核心規劃不宜授權。","D":"提振士氣是領導職責。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"112110-N2-75":{"quick":"有效授權=授權之前需先提供資深護理師教育訓練。","detail":{"background":"有效授權原則:C「授權之前需先提供(被授權者)教育訓練(確保有能力勝任)」正確。A「絕對信任不追蹤」錯(授權後仍須適度追蹤、負最終責任);B「私下拜託」錯(授權應公開正式);D「同時授權二人相同任務」錯(易混亂、責任不清,不可重複授權)。故C。","options":{"A":"授權後仍須適度追蹤。","B":"授權應公開正式,非私下拜託。","C":"正確(本題答案)。授權前先提供教育訓練。","D":"不可重複授權同一任務。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"113100-N2-45":{"quick":"授權=主管對自己和對部屬的信賴關係。","detail":{"background":"授權(delegation):B「授權是主管對自己和對部屬的信賴關係(信任部屬能完成、也信任自己的判斷)」最適切。A「授權是最高管理者的特權」錯(各級主管皆可授權);C「授權給能力不足者是鼓勵」錯(應授權給有能力者);D「授權後就能減輕對工作的責任」錯(授權後主管仍負最終責任)。故B。","options":{"A":"各級主管皆可授權,非最高者特權。","B":"正確(本題答案)。授權是主管對自己與部屬的信賴關係。","C":"應授權給有能力者。","D":"授權後主管仍負最終責任。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"114100-N2-36":{"quick":"時間管理優先序=重要且緊急→重要但不緊急→不重要但緊急→不重要且不緊急。","detail":{"background":"時間管理四象限優先序:A「重要且緊急→重要但不緊急→不重要但緊急→不重要且不緊急」最適當(A正確)——先做重要且緊急,再做重要但不緊急(預防性、最該投入),最後處理不重要的。故A。授權(delegation):授權不授責(主管仍負最終責任)、逐級授權、不可重複授權、公開授權、循指揮系統不越級(單一隸屬/指揮統一)、授權前先教育訓練、授權給有能力者、核心決策不授權。時間管理四象限:重要且緊急→重要不緊急(最該投入預防)→不重要緊急→不重要不緊急;適當拒絕、利用零碎時間、充分授權。","options":{"A":"正確(本題答案)。重要緊急→重要不緊急→不重要緊急→不重要不緊急。","B":"順序不當。","C":"順序顛倒。","D":"順序顛倒。"},"sources":["新文京《護理行政》授權與時間管理","華杏《護理行政學》授權原則"]}},"101030-N2-67":{"quick":"建築折舊不隨病患人數變動=固定成本。","detail":{"background":"成本分類:固定成本(fixed,不隨產量/服務量變動,如建築折舊、設備、人員薪資、租金);變動成本(variable,隨服務量變動,如衛材、藥品)。「醫院建築物折舊率不隨服務病患人數變動」=固定成本(B正確)。故固定成本(B)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"可控制成本是可調整的。","B":"正確(本題答案)。建築折舊不隨人數=固定成本。","C":"混合成本含固定+變動。","D":"材料成本是變動成本。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"102030-N2-63":{"quick":"復健機投資回收年數計算=3年。本題答案B。","detail":{"background":"本題官方答案B(3年)。回收期計算:每月淨收益=使用500人次×(健保支付50元-成本支出20元)=500×30=15,000元/月=18萬/年。設備成本54萬÷18萬/年=3年回收。故3年(B)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"2年回收金額不足。","B":"正確(本題答案)。54萬÷18萬/年=3年。","C":"4年超過回收期。","D":"5年超過回收期。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"102030-N2-78":{"quick":"醫療機構占總成本比率最高=人事成本。","detail":{"background":"醫療機構成本特性:「人事成本(人力薪資福利)」占總成本比率最高(D正確)——醫療是勞力密集產業,人力成本通常占5~6成以上。設備、管理、材料成本皆低於人事成本。故人事成本(D)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"設備成本非最高。","B":"管理成本非最高。","C":"材料成本非最高。","D":"正確(本題答案)。人事成本占總成本比率最高。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"102110-N2-58":{"quick":"資訊系統「不」用於護理行政=分析病患經濟狀況及家中人數。","detail":{"background":"資訊系統在護理行政的應用:A安排在職教育計畫、B分析護理人員能力及人力分配、C單位護理成本分析——皆是護理行政應用。選項D「分析病患的經濟狀況及家中人數」不是護理行政應用(本題答案)——那是社工/病患資料,非護理行政管理。故D。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"安排在職教育是護理行政應用。","B":"人力分析是護理行政應用。","C":"護理成本分析是護理行政應用。","D":"正確(本題答案)。病患經濟家中人數非護理行政應用。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"102110-N2-61":{"quick":"「不」屬固定成本=衛材成本(衛材是變動成本)。","detail":{"background":"固定成本(不隨服務量變動):A員工薪資、C建築物折舊、D設備儀器費用。選項B「衛材成本」不屬固定成本(本題答案)——衛材隨病患/服務量增減而變動,是「變動成本」。故衛材成本(B)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"員工薪資是固定成本。","B":"正確(本題答案)。衛材成本是變動成本,非固定。","C":"建築折舊是固定成本。","D":"設備儀器是固定成本。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"102110-N2-71":{"quick":"醫療成本控制「較不正確」=做預算需超估以備不時之需。","detail":{"background":"單位醫療成本控制:A知道每月人事福利費用(對)、B知道每月醫材設備支出(對)、C知道每月收入成本損益(對)。選項D「做預算時需『超估』,以備不時之需」較不正確(本題答案)——預算應「合理精確估算」,刻意超估會浮編浪費、失去成本控制意義。故D。","options":{"A":"應知道人事福利費用。","B":"應知道醫材設備支出。","C":"應知道收入成本損益。","D":"較不正確(本題答案)。預算應合理精確,非超估。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"102110-N2-80":{"quick":"事先訂預算最高金額再申請=固定限額預算。","detail":{"background":"預算種類:固定限額預算(fixed ceiling,上級先訂預算最高金額/上限,下級在限額內申請)、彈性預算(隨活動量調整)、開放式預算(無上限申請)、零基預算(從零重新編列)。「主管事先訂預算最高金額,再交護理部擬訂提出申請」=固定限額預算(A正確)。故固定限額預算(A)。","options":{"A":"正確(本題答案)。先訂上限再申請=固定限額預算。","B":"彈性預算隨活動量調整。","C":"開放式預算無上限。","D":"零基預算從零編列。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"103030-N2-80":{"quick":"病人分類系統「不」是功能=提供醫師診療收費標準。","detail":{"background":"病人分類系統(依護理需求分級)功能:B長期監測病人類別及所需護理活動、C測量護理工作成果及績效、D做長程人力規劃及預算。選項A「提供醫師診療收費標準」不是病人分類系統的功能(本題答案)——病人分類是為「護理人力配置」,非醫師收費標準。故A。","options":{"A":"正確(本題答案)。醫師收費標準非病人分類功能。","B":"監測病人類別是其功能。","C":"測量護理績效是其功能。","D":"人力規劃預算是其功能。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"103100-N2-80":{"quick":"了解特定期間經營成果=損益表。","detail":{"background":"財務報表:損益表(income statement,反映特定『期間』的收入、成本、損益/經營成果);資產負債表(特定『時點』的財產);現金流量表。「了解醫院某特定期間之經營成果」=損益表(B正確)。財產管理表、薪資表、資產融通表皆非「期間經營成果」。故損益表(B)。","options":{"A":"財產管理表非經營成果。","B":"正確(本題答案)。特定期間經營成果=損益表。","C":"薪資表非經營成果。","D":"資產融通表非經營成果。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"104100-N2-69":{"quick":"直接成本=執行護理衛材(1)+護理人員薪資(2)→「12」。","detail":{"background":"成本分類(依與服務的直接關聯):直接成本(直接用於病人照護,如執行護理的衛材、第一線護理人員薪資);間接成本(支援性,如行政電腦設備、教育訓練、水電)。選項1執行護理衛材+2護理人員薪資=直接成本「12」(B正確)。3行政電腦、4教育訓練是間接。故12。","options":{"A":"14含教育訓練(間接)不符。","B":"正確(本題答案,12)。衛材、護理人員薪資=直接成本。","C":"23含行政電腦(間接)不符。","D":"34皆間接成本。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"105030-N2-59":{"quick":"編列電子車維修費用=固定預算?本題答案D。","detail":{"background":"本題官方答案D(固定預算)。預算種類:護理長「在年度預算中編列電子行動車維修費用」=固定預算(fixed budget,依固定項目編列、不隨業務量變動的例行性費用)。零基預算(從零)、績效預算、日落預算皆非「例行維修費編列」。故固定預算(D)。","options":{"A":"零基預算從零編列。","B":"績效預算依績效。","C":"日落預算有落日條款。","D":"正確(本題答案)。例行維修費編列=固定預算。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"107110-N2-57":{"quick":"損益平衡點服務件數=500件。本題答案D。","detail":{"background":"本題官方答案D(500)。損益平衡點(BEP)件數=固定成本÷(售價-變動成本)=50,000÷(250-150)=50,000÷100=500件。故損益平衡服務件數500(D)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"150件不符。","B":"250件不符。","C":"400件不符。","D":"正確(本題答案)。50000÷(250-150)=500件。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"107110-N2-58":{"quick":"預期收益10萬時服務件數=1500件。本題答案A。","detail":{"background":"本題官方答案A(1,500)。所需件數=(固定成本+目標利潤)÷(售價-變動成本)=(50,000+100,000)÷(250-150)=150,000÷100=1,500件。故1,500件(A)。管理理論演進:古典(泰勒科學管理-標準化效率/費堯行政管理五功能/韋伯官僚科層)→新古典(霍桑研究、人際關係、行為科學-重人性)→現代(系統理論-輸入轉化輸出回饋、權變理論-因情境調整)。X理論(人性懶惰需監督獎懲)、Y理論(人性自發負責有潛力)、Z理論(大內-團體價值參與式決策長期僱用)。","options":{"A":"正確(本題答案)。(50000+100000)÷100=1500件。","B":"1000件不符。","C":"600件不符。","D":"375件不符。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"107110-N2-63":{"quick":"固定成本=房屋租金(3)+設備折舊(4)+人員薪資(5)→「345」。","detail":{"background":"固定成本(不隨服務量變動):3房屋租金、4設備折舊、5人員薪資。選項1電費、2醫療耗材是「變動成本」(隨服務量變動)。故固定成本「345」(C正確)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"123含電費耗材(變動)不符。","B":"234含耗材不符。","C":"正確(本題答案,345)。房租、折舊、薪資=固定成本。","D":"145含電費不符。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"108020-N2-62":{"quick":"重大採購硬體建設預算=資本預算。","detail":{"background":"預算種類:資本預算(capital budget,重大採購、硬體建設、設備等長期資本支出);營運/經常預算(日常營運);現金支出預算。「醫院內重大採購或硬體建設所需預算」=資本預算(B正確)。故資本預算(B)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"營運預算是日常營運。","B":"正確(本題答案)。重大採購硬體=資本預算。","C":"現金支出預算是現金流。","D":"經常預算是經常性支出。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"108020-N2-63":{"quick":"預算敘述正確=零基預算每項都需說明編列理由。本題答案C。","detail":{"background":"本題官方答案C。零基預算(zero-base budget):C「每項預算都需說明編列理由(不參考過去、從零審視每項支出的必要性)」正確。A「立即採購屬開放式預算」、B「先設最高金額再申請屬固定限額預算」敘述須對應;D固定限額敘述。故零基預算每項需說明理由(C)。","options":{"A":"立即採購敘述不完整。","B":"先設上限是固定限額預算(敘述須對應)。","C":"正確(本題答案)。零基預算每項需說明編列理由。","D":"固定限額敘述須對應。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"108110-N2-63":{"quick":"損益平衡點=無盈餘也無損失的狀態。","detail":{"background":"損益平衡點(break-even point,BEP):C「無盈餘也無損失的狀態(總收入=總成本)」正確。A「收入大於BEP是利潤為負」錯(收入大於BEP有利潤);B「以固定成本為分子總成本為分母」錯(BEP件數=固定成本÷單位邊際貢獻);D「BEP為1萬指收入高於支出1萬」錯。故C。","options":{"A":"收入大於BEP有利潤,非負。","B":"BEP計算分母是單位邊際貢獻,非總成本。","C":"正確(本題答案)。BEP=無盈餘無損失。","D":"BEP是收支相等點。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"108110-N2-65":{"quick":"零基預算=每項預算都需說明編列理由。","detail":{"background":"零基預算(zero-base budget):C「每項預算都需說明編列理由(以零為基礎、重新審視每項支出的必要性與優先順序)」正確。A「從零議價」、B「從零無上限」、D「根據目標從零編列」皆敘述不當。零基預算核心是「不參考過去、每項從零證明其必要」。故C。","options":{"A":"非從零議價。","B":"非無上限。","C":"正確(本題答案)。零基預算每項需說明編列理由。","D":"非僅根據目標。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"108110-N2-75":{"quick":"直接成本=護理照護時的衛材使用。","detail":{"background":"直接成本(直接用於病人照護):C「護理照護時的衛材使用」正確。A會計部門行政管理成本、B護理人員教育訓練、D水電費皆是「間接成本」(支援性、非直接用於特定病人)。故護理衛材使用(C)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"行政管理成本是間接成本。","B":"教育訓練是間接成本。","C":"正確(本題答案)。護理照護衛材=直接成本。","D":"水電費是間接成本。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"109030-N2-79":{"quick":"直接成本=護理人員薪資(1)+執行護理衛材(3)→「13」。","detail":{"background":"直接成本(直接用於病人照護):1護理人員薪資、3執行護理時耗用的衛材。選項2行政作業電腦設備、4護理人員教育訓練費用是「間接成本」。故直接成本「13」(A正確)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"正確(本題答案,13)。護理人員薪資、執行護理衛材=直接成本。","B":"14含教育訓練(間接)不符。","C":"23含電腦設備(間接)不符。","D":"24皆間接。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"109030-N2-80":{"quick":"醫療成本控制「錯誤」=護理長作預算時應超估以備不時之需。","detail":{"background":"醫療成本控制:A護理主任應知人事費用成本(對)、B應知護病比與健保護理費收入連動(對)、C護理長應知衛材設備費用(對)。選項D「護理長作預算時應『超估』」錯誤(本題答案)——預算應合理精確估算,超估會浮編浪費、失去成本控制。故D。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"應知人事費用成本。","B":"應知護理費收入連動。","C":"應知衛材設備費用。","D":"正確(本題答案)。預算應合理,非超估。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"110030-N2-75":{"quick":"成本歸屬正確=直接成本含護理師薪水、衛材費用、醫師薪水。","detail":{"background":"成本歸屬:D「直接成本:護理師薪水、衛材費用、醫師薪水(直接用於病人照護的人力與材料)」正確。A固定成本含「門診量手術量」錯(那是變動);B變動成本含「護理師薪水手術床折舊主任薪水」錯(那些是固定);C間接成本含「醫師薪水」錯(醫師薪水是直接成本)。故D。","options":{"A":"門診量手術量是變動,非固定。","B":"薪水折舊是固定,非變動。","C":"醫師薪水是直接,非間接。","D":"正確(本題答案)。護理師/醫師薪水、衛材=直接成本。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"110110-N2-57":{"quick":"「不」屬固定成本=醫療衛材費用(衛材是變動成本)。","detail":{"background":"固定成本(不隨服務量變動):A護理人員薪資、C建築物折舊、D儀器設備費用。選項B「醫療衛材費用」不屬固定成本(本題答案)——衛材隨服務量變動,是變動成本。故醫療衛材費用(B)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"護理人員薪資是固定成本。","B":"正確(本題答案)。醫療衛材是變動成本,非固定。","C":"建築折舊是固定成本。","D":"儀器設備是固定成本。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"110110-N2-59":{"quick":"成本分析要項「不」含=基層員工的配合。","detail":{"background":"醫療成本分析要項:B正確的統計資料、C健全的會計制度、D健全的組織結構。選項A「基層員工的配合」不是成本分析的要項(本題答案)——成本分析需要正確數據、會計制度與組織架構,「基層配合」非分析本身的要項。故A。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"正確(本題答案)。基層員工配合非成本分析要項。","B":"正確統計資料是要項。","C":"健全會計制度是要項。","D":"健全組織結構是要項。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"110110-N2-62":{"quick":"不考量過去年度重新編列=零基預算。","detail":{"background":"預算種類:零基預算(zero-base budget,不參考過去年度、從零重新審視每項支出必要性)。「不考量過去年度的預算而重新編列」=零基預算(B正確)。設計計畫預算、固定式預算、開放式預算皆非「從零不參考過去」。故零基預算(B)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"設計計畫預算非此。","B":"正確(本題答案)。不參考過去從零編列=零基預算。","C":"固定式預算依固定項目。","D":"開放式預算無上限。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"110110-N2-66":{"quick":"「不」是營運成本=利息支出(利息是財務成本非營運)。","detail":{"background":"醫院營運成本:A人事成本、C藥品成本、D管理費用——皆是營運(經營)成本。選項B「利息支出」不是營運成本(本題答案)——利息是「財務(融資)成本」,非營運成本。故利息支出(B)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"人事成本是營運成本。","B":"正確(本題答案)。利息支出是財務成本,非營運。","C":"藥品成本是營運成本。","D":"管理費用是營運成本。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"111110-N2-75":{"quick":"間接成本=空調水電費(1)+行政管理費(2)+教育訓練費(4)→「124」。","detail":{"background":"間接成本(支援性、非直接用於特定病人):1空調水電費、2行政管理費、4護理教育訓練費。選項3護理衛材費是「直接成本」(直接用於病人)。故間接成本「124」(C正確)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"123含護理衛材(直接)不符。","B":"234含衛材不符。","C":"正確(本題答案,124)。空調水電、行政、教育=間接成本。","D":"134含衛材不符。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"112030-N2-69":{"quick":"預算概念正確=損益平衡點是指無盈餘也無損失。","detail":{"background":"預算基本概念:B「損益平衡點是指無盈餘也無損失(總收入=總成本)」正確。A「建築折舊是變動成本」錯(是固定成本);C「人員薪資屬可控性成本」錯(薪資多為固定/不可控性);D「侵入性檢查治療是單位的成本」錯(那是收入/服務項目,非成本)。故B。","options":{"A":"建築折舊是固定成本,非變動。","B":"正確(本題答案)。損益平衡點=無盈餘無損失。","C":"人員薪資多屬不可控成本。","D":"侵入性檢查是服務項目,非成本。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"112180-N2-37":{"quick":"零基預算「非」優點=主管可參考上期預算(零基不參考過去)。","detail":{"background":"零基預算優點:A每項預算都有編列理由、B每年支出重新審視、C全盤檢討過程提供溝通參與機會。選項D「主管可參考上期預算」非零基預算優點(本題答案)——零基預算「不參考過去/上期預算,從零開始」,故「參考上期」與零基精神相反。故D。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"零基優點:每項有編列理由。","B":"零基優點:每年重新審視。","C":"零基優點:提供溝通參與。","D":"正確(本題答案)。零基不參考上期預算。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"113030-N2-37":{"quick":"長照機構達損益平衡每月最少收住民=37人。本題答案D。","detail":{"background":"本題官方答案D(37人)。損益平衡:每位住民每月毛利=收費32,000×毛利率60%=19,200元。達損益平衡需覆蓋固定支出70萬:700,000÷19,200≈36.5→無條件進位37人。故至少37人(D)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"30人毛利不足。","B":"32人不足。","C":"35人不足。","D":"正確(本題答案)。70萬÷19200≈37人。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"113180-N2-37":{"quick":"成本分類正確=加班費屬可控制成本。","detail":{"background":"成本分類:A「加班費屬可控制成本(controllable,管理者可透過排班調度控制)」正確。B「水電費屬可控制成本」錯(水電多為不可控/固定);C「人員薪資屬變動成本」錯(薪資是固定成本);D「醫療耗材屬固定成本」錯(耗材是變動成本)。故A。","options":{"A":"正確(本題答案)。加班費屬可控制成本。","B":"水電費多為不可控成本。","C":"人員薪資是固定成本,非變動。","D":"醫療耗材是變動成本,非固定。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"113030-N2-50":{"quick":"護理成本控制「錯誤」=減少護理人員數(犧牲品質安全)。","detail":{"background":"護理成本控制方法:A護理作業資訊化(對,提高效率)、C降低衛材庫存量(對,減少積壓)、D正確計價防漏帳(對,確保收入)。選項B「減少護理人員數」錯誤(本題答案)——盲目減少護理人員會「犧牲照護品質與病人安全」,非正確的成本控制方法。故B。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"護理資訊化是正確成本控制。","B":"正確(本題答案)。減少護理人員犧牲品質安全。","C":"降低衛材庫存是正確控制。","D":"正確計價防漏帳是正確控制。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"113180-N2-46":{"quick":"護理成本管控正確=護理作業導入資訊化如護理紀錄。","detail":{"background":"護理成本管控:C「護理作業導入資訊化,如護理紀錄(提高效率、減少耗時與錯誤)」正確。A「只需護理長執行」錯(全員參與);B「多領衛材存放預防不夠用」錯(會積壓浪費);D「增加占床率讓病人多住院」錯(不當醫療、增成本)。故C。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"成本管控需全員參與,非只護理長。","B":"多領衛材會積壓浪費。","C":"正確(本題答案)。護理作業資訊化。","D":"讓病人多住院是不當醫療。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"114030-N2-39":{"quick":"損益平衡點=1000萬元。本題答案D。","detail":{"background":"本題官方答案D(1,000萬)。損益平衡點(以金額計)=固定成本÷(1-變動成本率)=固定成本÷邊際貢獻率。變動成本率=600/1000=0.6,邊際貢獻率=1-0.6=0.4;BEP=400萬÷0.4=1,000萬。故損益平衡點1,000萬(D)。","options":{"A":"200萬不符。","B":"400萬(固定成本)非BEP。","C":"600萬不符。","D":"正確(本題答案)。400萬÷0.4=1000萬。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"114170-N2-49":{"quick":"直接成本=調整護理人員薪資。","detail":{"background":"直接成本(直接用於病人照護的人力/材料):C「調整護理人員薪資(第一線照護人力)」屬直接成本。A汰換護理站電腦設備(間接)、B降低電費(間接)、D辦理教育訓練(間接)皆是間接成本。故護理人員薪資(C)。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"電腦設備是間接成本。","B":"電費是間接成本。","C":"正確(本題答案)。護理人員薪資=直接成本。","D":"教育訓練是間接成本。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"114170-N2-50":{"quick":"護理成本控制「最不適當」=使用報廢的醫療儀器(危及安全)。","detail":{"background":"護理成本控制方法:A縮短流程使工作簡化(對)、B水電空調節流(對)、C資材管理達零存貨(對)。選項D「使用報廢的醫療儀器」最不適當(本題答案)——使用報廢儀器會「危及病人安全與醫療品質」,絕不可為省成本而為,故D最不適當。故D。成本分類:固定成本(不隨服務量變動-薪資折舊租金設備)vs變動成本(隨量變-衛材藥品);直接成本(直接用於病人-護理師薪資衛材)vs間接成本(支援性-行政電腦教育訓練水電);可控制成本(加班費)。損益平衡點BEP=固定成本÷(售價-單位變動成本)=無盈餘無損失。預算:固定限額(先設上限)、零基(從零不參考過去)、資本(重大採購)。人事成本占醫療總成本最高。","options":{"A":"簡化流程是正確控制。","B":"水電節流是正確控制。","C":"零存貨是正確控制。","D":"最不適當(本題答案)。使用報廢儀器危及安全。"},"sources":["新文京《護理行政》成本與預算","華杏《護理行政學》財務管理"]}},"101030-N2-68":{"quick":"工作摘要說明職務關係任務責任=工作說明書。","detail":{"background":"人力資源文件:工作說明書(job description,說明職務的工作關係、任務、責任、職權);工作分析(分析工作內容);工作評值(評定工作價值)。「說明該職務的工作關係、任務及責任」=工作說明書(A正確)。故工作說明書(A)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"正確(本題答案)。說明職務關係任務責任=工作說明書。","B":"工作評值書是評定價值。","C":"工作分析書是分析內容。","D":"工作分類書是分類。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"101030-N2-75":{"quick":"Donabedian品質模式構面=結構品質、過程品質、結果品質。","detail":{"background":"Donabedian醫療品質管理模式三構面:結構(structure,如人力、設備、制度)、過程(process,如照護流程)、結果(outcome,如病人結果)。「結構品質、過程品質、結果品質」(D正確)。故D。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"品質保證管理控制非Donabedian構面。","B":"品質規劃管制改善是Juran三部曲。","C":"認定必要魅力品質是Kano模式。","D":"正確(本題答案)。結構、過程、結果=Donabedian。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"102030-N2-57":{"quick":"評核時全給高分彰顯領導=向日葵效應。","detail":{"background":"考核偏誤:向日葵效應(sunflower effect,主管給所有部屬高分以彰顯自己領導好);月暈效應(halo,以單一印象概括全部);集中趨勢(都給中間分);近因效應(以近期表現評斷)。「給所有人高分以彰顯自己領導效能」=向日葵效應(D正確)。故向日葵效應(D)。","options":{"A":"光圈效應非此。","B":"霍桑效應是受關注而改變行為。","C":"觸角效應非此。","D":"正確(本題答案)。全給高分彰顯領導=向日葵效應。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"102030-N2-58":{"quick":"經營者角度的績效=醫療資源應用的有效性。","detail":{"background":"以醫療機構經營管理者角度,績效(performance)的意義=「醫療資源應用的有效性(efficiency/effectiveness,以最少資源達最大產出)」(D正確)。就醫可近性、服務一貫性、公平性皆是醫療品質/可近性面向,非「經營績效」核心。故醫療資源應用的有效性(D)。","options":{"A":"就醫可近性是可近性面向。","B":"服務一貫性是品質面向。","C":"就醫公平性是公平面向。","D":"正確(本題答案)。資源應用有效性=經營績效。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"102110-N2-75":{"quick":"組織變革順序=解凍期→改變期→再凍期。","detail":{"background":"Lewin組織變革理論三階段:解凍(unfreezing,打破現狀、製造改變動機)→改變(change/moving,導入新做法)→再凍(refreezing,鞏固新狀態成常規)。順序「解凍期→改變期→再凍期」(C正確)。故C。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"順序顛倒。","B":"順序不當(改變期應在啟動前)。","C":"正確(本題答案)。解凍→改變→再凍。","D":"順序不當。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"103100-N2-63":{"quick":"未來護理行政趨勢=人員專業化(1)+管理企業化(3)+研究多元化(5)。本題答案D「135」。","detail":{"background":"本題官方答案「135」。未來護理行政趨勢:1人員專業化、3管理企業化、5研究多元化。選項2「考評專制化」錯(應民主化非專制);4「文書處理人工化」錯(應資訊化非人工)。故135。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"含2(專制化)、4(人工化)錯。","B":"含4錯。","C":"含2、4錯。","D":"正確(本題答案,135)。專業化、企業化、研究多元化。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"103100-N2-76":{"quick":"Mintzberg決策角色「不」含=聯絡者(屬人際角色)。","detail":{"background":"Mintzberg管理者角色:人際(精神領袖、領導者、聯絡者)、資訊(監督者、傳播者、發言人)、決策(企業家、騷亂平息者、資源調配者、協商者)。選項C「聯絡者」屬人際角色,非決策角色(本題答案)。故聯絡者(C)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"騷亂平息者是決策角色。","B":"資源調配者是決策角色。","C":"正確(本題答案)。聯絡者是人際角色,非決策。","D":"調停者(協商者)是決策角色。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"104030-N2-65":{"quick":"審查麻醉藥點班=Mintzberg的監督者角色。","detail":{"background":"Mintzberg資訊角色之「監督者(monitor)」:蒐集監測組織內外資訊。護理長「審查護理師麻醉藥點班情形(監測掌握資訊)」=監督者(B正確)。代表者(發言人/精神領袖)、領袖(領導者)、聯絡者皆非「監測審查」。故監督者(B)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"代表者是對外代表。","B":"正確(本題答案)。審查點班監測=監督者角色。","C":"領袖是領導激勵。","D":"聯絡者是建立人脈。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"104030-N2-80":{"quick":"實地訪查追蹤照護「錯誤」=關心醫院的營運盈虧。","detail":{"background":"導入追蹤評量法(tracer methodology,以病人實際就醫經歷追蹤照護過程):A方法為導入追蹤評量法(對)、B關心醫院行政系統完整性(對)、D關心專業人員如何與病人溝通(對)。選項C「關心醫院的營運盈虧」錯誤(本題答案)——追蹤評量關心的是「照護品質與系統」,非營運盈虧。故C。","options":{"A":"方法是導入追蹤評量法。","B":"關心行政系統完整性。","C":"正確(本題答案)。追蹤評量非關心營運盈虧。","D":"關心專業人員與病人溝通。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"105090-N2-79":{"quick":"風險管理「不」是事前措施=建立異常事件通報系統(那是事後/偵測措施)。","detail":{"background":"醫院風險管理「事前」措施:B進行危害分析、C建置個別災難應變指引、D每年定期教育訓練及評值。選項A「建立異常事件通報系統」不是事前風險管理(本題答案)——通報系統是「事件發生後」的偵測通報機制,非事前預防規劃。故A。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"正確(本題答案)。異常通報系統是事後機制,非事前。","B":"危害分析是事前措施。","C":"災難應變指引是事前措施。","D":"教育訓練評值是事前措施。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"106030-N2-10":{"quick":"專業性人際關係結束期重點=加強病人持續服藥的意願。","detail":{"background":"Peplau專業性人際關係四期:初始期、確認期、開拓期、結束期。結束期(termination)重點是「鞏固成效、為獨立做準備」:A「加強病人持續服藥的意願(出院後自我照顧的維持)」(A正確)。B激勵面對動機、C建立信任、D鼓勵參與照護皆是前期(初始/確認/開拓期)重點。故A。","options":{"A":"正確(本題答案)。加強持續服藥意願=結束期重點。","B":"激勵動機是前期。","C":"建立信任是初始期。","D":"鼓勵參與是開拓期。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"106030-N2-62":{"quick":"門診護理師參與改變過程屬=改變標的(Change Target)。","detail":{"background":"組織變革角色:主導改變者(change agent,推動變革)、改變標的(change target,被改變的對象)。門診護理師是「半年後將參與社區服務」的「被改變對象」=改變標的(B正確)。故改變標的(B)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"主導改變單位是推動者。","B":"正確(本題答案)。被改變對象=改變標的。","C":"改變區域非角色。","D":"改變速度非角色。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"106030-N2-63":{"quick":"「不」屬專科護理師角色功能=開立醫療處方。","detail":{"background":"專科護理師(NP)角色與功能:A執行病人管理工作、C參與學術研究、D制定護理標準。選項B「開立醫療處方」不屬專科護理師的角色功能(本題答案)——開立醫療處方是「醫師」的職權(NP在醫師監督下可執行部分醫療業務但非獨立開立處方)。故B。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"執行病人管理是NP功能。","B":"正確(本題答案)。開立醫療處方是醫師職權,非NP。","C":"參與學術研究是NP功能。","D":"制定護理標準是NP功能。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"106030-N2-72":{"quick":"突然大量傷患湧入急診:馬上指派護理師任務。","detail":{"background":"急診大量傷患湧入,急診護理長最適當處理是「馬上指派護理師任務(B)」——危機時快速分工、立即啟動人力調度。A設置應變小組(已啟動機制後)、C進行危害分析(事前/事後分析)、D指定發言人皆非「當下立即」的處置。故馬上指派任務(B)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"設應變小組非當下最急。","B":"正確(本題答案)。大量傷患馬上指派任務。","C":"危害分析非當下。","D":"指定發言人非當下急務。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"106110-N2-61":{"quick":"主任-督導-護理長-護理師層級=工作分級法。","detail":{"background":"工作評價方法:工作分級法(job ranking,將職位由高至低排序分級)、工作分類法(歸入既定類別)、因子比較法、點數系統法。「將護理組織分為主任-副主任-督導-護理長-副護理長-護理師(由高至低排序分級)」=工作分級法(B正確)。故工作分級法(B)。","options":{"A":"因子比較法是逐因子比較。","B":"正確(本題答案)。由高至低排序=工作分級法。","C":"工作分類法是歸入類別。","D":"點數系統法是計點。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"106110-N2-80":{"quick":"設定N3 N4人數增加並訓練輔導達標=目標管理法。","detail":{"background":"考核/評核方式:護理長「與同仁共同設定明年N3、N4人數增加20%、策劃教育訓練輔導協助達成目標」=目標管理法(MBO)(D正確,共同設定可測量目標、評估達成)。自我考核、心理評估、評核中心法皆非「共同設定目標達標」。故目標管理法(D)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"自我考核是自評。","B":"心理評估非此。","C":"評核中心法是情境模擬評估。","D":"正確(本題答案)。共同設定目標達標=目標管理法。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"106111-N2-62":{"quick":"人員流動觀念「錯誤」=視零流動率為管理目標。","detail":{"background":"人員流動觀念:A管理者應致力改善『可控制』的流動(對)、C流動率超50%表示組織有問題(對)、D理想流動率5~10%(對)。選項B「視零流動率為管理目標」錯誤(本題答案)——「零流動率」並非理想(適度流動可帶來新血、避免老化),理想流動率約5~10%。故B。","options":{"A":"應改善可控制的流動。","B":"正確(本題答案)。零流動率非理想目標。","C":"流動率超50%表示有問題。","D":"理想流動率5~10%。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"106111-N2-69":{"quick":"給所有被考核者高分彰顯領導=向日葵效果。","detail":{"background":"考核偏誤:向日葵效果(sunflower,主管給所有人高分以彰顯自己領導)、月暈效果(halo,單一印象概括)、集中趨勢(都給中間)、盲點效應。「為表示自己領導好,給所有被考核者高分」=向日葵效果(A正確)。故向日葵效果(A)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"正確(本題答案)。全給高分彰顯領導=向日葵效果。","B":"月暈效果是單一印象概括。","C":"集中趨勢是都給中間分。","D":"盲點效應非此。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"107030-N2-65":{"quick":"工作意願低但能力強=激發(策略)。","detail":{"background":"依員工意願與能力的管理策略(意願/能力四象限):意願高能力高→授權;意願低能力高→「激發(激勵其意願)」;意願高能力低→發展(培訓能力);意願低能力低→移轉。「意願低、能力極強」→激發策略(C正確,設法激勵提升其工作意願)。故激發(C)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"增強適用意願高能力高。","B":"發展適用意願高能力低。","C":"正確(本題答案)。意願低能力強=激發策略。","D":"移轉適用意願低能力低。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"107030-N2-67":{"quick":"個案管理=可提供病患持續性與連貫性的醫療照護。","detail":{"background":"個案管理(case management):C「可提供病患持續性與連貫性的醫療照護(統整跨專業資源、協調照護)」正確。A「建立費時故不必檢討修正」錯(應持續檢討修正);B「專為醫師設計協助治療」錯(是跨專業、以病人為中心);D「專為護理師設計」錯(是跨專業團隊)。故C。","options":{"A":"個案管理應持續檢討修正。","B":"個案管理是跨專業以病人為中心,非為醫師。","C":"正確(本題答案)。個案管理提供持續連貫照護。","D":"個案管理是跨專業,非僅護理師。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"107110-N2-75":{"quick":"聘學者擔任顧問協助研究=直線幕僚型(官僚組織)。","detail":{"background":"官僚式組織類型:金字塔型、高聳型、扁平型、直線幕僚型(line-staff,直線指揮+幕僚諮詢)。「延聘學者擔任顧問,協助指導同仁從事研究(幕僚提供專業協助)」=直線幕僚型(D正確)。故直線幕僚型(D)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"金字塔型是層級結構。","B":"高聳型是層級多。","C":"扁平型是層級少。","D":"正確(本題答案)。聘顧問協助=直線幕僚型。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"108110-N2-68":{"quick":"解凍改變再凍變革理論=路因(Lewin)提出。","detail":{"background":"組織變革理論「解凍(unfreezing)、改變(change)、再凍(refreezing)」三階段由「路因(Lewin)」提出(C正確)。柏拉圖(Pareto,80-20)、帕金森(Parkinson)、羅傑斯(Rogers,創新擴散)皆非。故路因(C)。","options":{"A":"柏拉圖是80-20法則。","B":"帕金森定律非變革理論。","C":"正確(本題答案)。解凍改變再凍=路因(Lewin)。","D":"羅傑斯是創新擴散理論。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"109030-N2-74":{"quick":"Donabedian「不」屬結構面=全院住院病人壓瘡發生率5%(屬結果面)。","detail":{"background":"Donabedian品質三構面:結構(人力、設備、制度,如護理人員年資、主管輪值、設施功能);過程(照護流程);結果(病人結果)。選項D「全院住院病人壓瘡發生率5%」屬「結果面」非結構面(本題答案)。A 2年以上護理人員占60%、B主管輪值、C設施功能皆屬結構面。故D。","options":{"A":"護理人員年資占比屬結構面。","B":"主管輪值屬結構面。","C":"設施功能屬結構面。","D":"正確(本題答案)。壓瘡發生率屬結果面,非結構面。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"109110-N2-67":{"quick":"依護理活動計分換算點數分類嚴重度=因素型分類法。","detail":{"background":"病人分類法:原型(prototype,整體描述歸類)、因素型(factor,依個別護理活動項目計分加總、換算點數分類);診斷型、病例組合(DRG)。「以護理活動項目設計、換算護理點數、依點數高低分類嚴重度」=因素型分類法(B正確)。故因素型分類法(B)。","options":{"A":"原型分類法是整體描述。","B":"正確(本題答案)。依項目計分換點數=因素型分類法。","C":"診斷型分類法依診斷。","D":"病例組合分類法是DRG。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"110030-N2-3":{"quick":"人生八個發展階段=艾瑞克森(Erikson)提出。","detail":{"background":"艾瑞克森(Erikson)心理社會發展理論:人生分八個發展階段,每階段有其發展任務與危機(B正確)。佛洛依德(性心理發展五期)、佩普洛(人際關係)、馬斯洛(需求層級)皆非「八個發展階段」。故艾瑞克森(B)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"佛洛依德是性心理發展五期。","B":"正確(本題答案)。人生八階段=艾瑞克森。","C":"佩普洛是人際關係理論。","D":"馬斯洛是需求層級。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"110030-N2-65":{"quick":"行為規範設計「較不適當」=個別彈性(應普遍適用一致)。","detail":{"background":"員工行為規範設計原則:A合理合法、B普遍適用、C具體簡潔。選項D「個別彈性」較不適當(本題答案)——行為規範應「普遍適用、一致性」(對全體一視同仁),「個別彈性」會造成標準不一、不公平。故D。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"規範應合理合法。","B":"規範應普遍適用。","C":"規範應具體簡潔。","D":"較不適當(本題答案)。規範應一致,非個別彈性。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"110030-N2-69":{"quick":"工作分享制屬「數量彈性」。","detail":{"background":"護理人力彈性運用:數量彈性(numerical,調整人力數量/工時,如工作分享制job sharing、兼職、部分工時);功能彈性(functional,一人多能多工)。「工作分享制」=數量彈性(A正確)。工作多樣化、專業性分工、領導彈性皆非「數量彈性」。故工作分享制(A)。","options":{"A":"正確(本題答案)。工作分享制=數量彈性。","B":"工作多樣化是功能彈性。","C":"專業性分工非數量彈性。","D":"領導彈性非數量彈性。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"110110-N2-78":{"quick":"給所有員工高分展現領導=向日葵效應。","detail":{"background":"績效考評效應:向日葵效應(sunflower,主管給所有部屬高分以展現自己領導能力強)、近因效應、霍桑效應、月暈效應。「為表示所管理單位無弱兵、展現高領導能力、給員工高評價」=向日葵效應(D正確)。故向日葵效應(D)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"近因效應是以近期表現評斷。","B":"霍桑效應是受關注改變行為。","C":"月暈效應是單一印象概括。","D":"正確(本題答案)。全給高分展現領導=向日葵效應。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"111030-N2-60":{"quick":"Mintzberg角色=護理長調配人力物力時間經費屬資源分配者。","detail":{"background":"Mintzberg管理者角色:A「護理長調配單位人力、物力、時間及經費,屬『資源分配者(resource allocator)』」正確。B參與院務會議報告應是『發言人/代言人』(非精神領袖);C傳達甄選短片應是『傳播者』(非代言人);D觀察人員身心健康工作表現應是『監督者』(非聯絡者)。故A。","options":{"A":"正確(本題答案)。調配人力物力經費=資源分配者。","B":"參與會議報告是發言人,非精神領袖。","C":"傳達訊息是傳播者,非代言人。","D":"觀察人員是監督者,非聯絡者。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"111110-N2-66":{"quick":"人力資源管理=強調員工參與組織經營。","detail":{"background":"人事管理vs人力資源管理:C「人力資源管理(HRM)強調員工參與組織經營(視員工為資產、重視發展與參與)」正確。A「HRM認為員工屬成本負擔」錯(那是傳統人事管理觀);B「人事管理強調勞資平等和諧」敘述須對應;D「人事管理強調人力確保開發維持」錯(那是HRM的重點)。故C。","options":{"A":"視員工為成本是傳統人事觀,非HRM。","B":"敘述須對應。","C":"正確(本題答案)。HRM強調員工參與組織經營。","D":"人力確保開發維持是HRM重點,非人事管理。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"111110-N2-77":{"quick":"風險危害分析=需要定期評估組織規劃及各項資源準備度。","detail":{"background":"醫院風險危害分析(HVA):C「需要定期評估組織規劃及各項資源準備度」正確。A「依SOP執行就不會發生風險」錯(無法完全避免);B「考量財產損失即可」錯(須考量人員、營運、聲譽等);D「危害風險由小到大排序、高迫切性優先」——應「由大到小、依風險高低優先處理高風險」(D敘述順序不當)。故C。","options":{"A":"依SOP無法完全避免風險。","B":"須考量人員營運聲譽,非僅財產。","C":"正確(本題答案)。定期評估規劃及資源準備度。","D":"應依風險高低優先,排序敘述不當。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"113100-N2-37":{"quick":"生涯發展:能力優良有潛力者給予前程管理。","detail":{"background":"依員工工作表現與發展需求擬定生涯發展:A「能力優良、有發展潛力者,給予『前程管理(career management,培養晉升)』」正確。B「能力普通安排再教育」、C「表現欠佳無改善空間給予輔導」(無改善空間者不是給輔導)、D「能力較差有改進空間者勸退資遣」(有改進空間應輔導非資遣)皆敘述不當。故A。","options":{"A":"正確(本題答案)。優良有潛力者給予前程管理。","B":"能力普通安排再教育敘述須對應。","C":"無改善空間者非給輔導。","D":"有改進空間應輔導,非勸退資遣。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"113180-N2-42":{"quick":"護理人力招募=掌握人力需求狀況並進行供需分析。","detail":{"background":"護理人力招募:A「掌握護理部人力需求狀況,並進行供需分析」正確(招募前先評估需求)。B「人資室決定招募方向管道」錯(護理部應主導護理人力招募方向);C「招募完成『半年後』評估效益」錯(應適時/儘早評估);D「為符合成本效益由人資管理師負責」錯(護理人力招募應由護理部主導)。故A。","options":{"A":"正確(本題答案)。掌握人力需求並供需分析。","B":"護理部應主導招募方向。","C":"應適時評估,非半年後。","D":"護理人力招募應由護理部主導。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"114030-N2-8":{"quick":"電子病歷優點「錯誤」=醫療流程管制與修改方便且不會留有紀錄。","detail":{"background":"完全電子病歷優點:A資料可供同體系共享、維持一致性(對)、C資料完善結構化、促進醫學研究(對)、D不必紙本、減少成本(對)。選項B「醫療流程管制與修改方便,且『不會留有紀錄』」錯誤(本題答案)——電子病歷的修改「會留下軌跡紀錄(audit trail)」以確保資料完整可追溯,非不留紀錄。故B。","options":{"A":"電子病歷可同體系共享。","B":"正確(本題答案)。電子病歷修改會留軌跡,非不留紀錄。","C":"電子病歷結構化促研究。","D":"電子病歷減少紙本成本。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"114030-N2-46":{"quick":"工作意願低能力也低=移轉策略。","detail":{"background":"依意願/能力四象限的管理策略:意願高能力高→授權/增強;意願低能力高→激發;意願高能力低→發展;意願低能力低→「移轉(轉調/轉介,另尋適合位置或處置)」。「工作意願低、工作能力也低」=移轉策略(A正確)。故移轉策略(A)。Mintzberg管理者角色:人際(精神領袖/領導者/聯絡者)、資訊(監督者/傳播者/發言人)、決策(企業家/騷亂平息者/資源分配者/協商者)。Lewin變革:解凍→改變→再凍。考核偏誤:向日葵效應(全給高分彰顯領導)、月暈(單一印象概括)、集中趨勢。Donabedian品質:結構/過程/結果。病人分類:原型(整體)、因素型(計分換點數)。管理者(把事做對/職權)vs領導者(做對的事/特質)。","options":{"A":"正確(本題答案)。意願低能力低=移轉策略。","B":"激發適用意願低能力高。","C":"增強適用意願高能力高。","D":"發展適用意願高能力低。"},"sources":["新文京《護理行政》管理者角色與變革","華杏《護理行政學》人力資源與品質"]}},"102110-N2-79":{"quick":"確認薪資層次最重要工作表現因子=責任。","detail":{"background":"工作評價以「工作表現因子(compensable factors)」決定薪資層次:技術需求、努力、責任、工作情況。確認護理長(管理職)薪資層次「最重要」的因子是「責任(responsibility,所負管理與決策責任)」(C正確)——管理職薪資主要反映其責任大小。故責任(C)。","options":{"A":"技術需求非管理職薪資最重因子。","B":"工作情況非最重。","C":"正確(本題答案)。管理職薪資最重因子=責任。","D":"身體需求非管理職最重。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"104100-N2-68":{"quick":"僅依政策制度執行宣導目標=管理者角色。","detail":{"background":"管理者(manager)vs領導者(leader):管理者「依組織政策、制度、紀律執行任務、維持運作、宣導組織目標宗旨(把事情做對)」。護理督導「僅依政策制度紀律執行、宣導目標宗旨」=管理者角色(A正確)。領導者重願景、創新、引導變革。故管理者(A)。","options":{"A":"正確(本題答案)。依政策制度執行宣導=管理者角色。","B":"策劃者偏規劃。","C":"諮詢者偏建議。","D":"領導者重願景創新。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"105030-N2-62":{"quick":"工作流程持續改善「不包括」=由管理者主導向下推動。","detail":{"background":"工作流程持續改善(品管圈/QCC精神):A由工作性質相近的人員組成(對)、B是持續問題改善的過程(對)、D是前瞻性預防性改善(對)。選項C「由管理者主導『向下推動』」不包括(本題答案)——持續改善應「由基層員工自發、由下而上參與」,非管理者由上向下強推。故C。","options":{"A":"由性質相近人員組成(對)。","B":"是持續改善過程(對)。","C":"正確(本題答案)。應由下而上,非管理者向下推動。","D":"是前瞻預防性改善(對)。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"107110-N2-60":{"quick":"中階管理者(督導長)規劃=部門性質之規劃。","detail":{"background":"規劃層級:高階(策略性規劃,組織整體長程)、中階(部門/戰術性規劃,如護理督導長的部門規劃)、基層(執行/作業規劃,短程)。「中階管理者如護理督導長的規劃」=部門性質之規劃(C正確)。故部門性質(C)。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"策略性規劃是高階。","B":"整體性規劃是高階。","C":"正確(本題答案)。中階督導長=部門性質規劃。","D":"執行性規劃是基層。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"107110-N2-61":{"quick":"決策的策略階段=決策者個人或組織未來欲達到的目標或期望。","detail":{"background":"決策制定過程的「策略(智力/情報)階段」:A「指決策者個人或組織未來欲達到的目標或期望(確立目標方向)」正確。B查明事實發展備選方案是「設計階段」;C選擇最佳方案是「選擇階段」;D確定專業分工是「組織」。故A。決策過程:界定問題→確立準則→列舉方案→分析利弊→執行。決策類型:確定性/風險性/不確定性。團體決策:腦力激盪、德爾菲(匿名多輪)、名義團體法(具名)、焦點團體。直覺決策(經驗累積、危急時用)。最佳方案:符合組織目標、用較少資源、確定性高、冒險性低。問題解決首要=確認/界定問題,優先處理影響利益最大者。","options":{"A":"正確(本題答案)。策略階段=確立未來目標期望。","B":"發展備選方案是設計階段。","C":"選擇方案是選擇階段。","D":"專業分工是組織。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"107110-N2-62":{"quick":"目標管理成功要件=345(把權限責任下放、共同參與等)。","detail":{"background":"本題官方答案「345」。目標管理(MBO)成功要件:3把權限與責任(下放)、4(共同參與設定目標)、5(定期檢討回饋)。選項1「主管清楚列出目標」(應共同設定非主管單方列出)、2「依個人能力分配不同目標」非MBO核心。故345。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"含1(主管單方列目標)不符。","B":"含2不符。","C":"正確(本題答案,345)。權責下放、共同參與、檢討回饋。","D":"含1不符。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"107110-N2-64":{"quick":"策略性規劃步驟=確認使命目標→SWOT分析→制定策略→執行策略→評估結果。","detail":{"background":"策略性規劃(strategic planning)正確步驟:D「確認組織的使命與目標→SWOT分析(評估內外環境)→制定策略→執行策略→評估結果」正確——須先做SWOT環境分析,才能據以制定策略。其餘選項把SWOT放在制定策略之後,順序不當。故D。","options":{"A":"SWOT在制定策略後,順序不當。","B":"評估結果在執行前,不當。","C":"SWOT在執行後,不當。","D":"正確(本題答案)。使命目標→SWOT→制定→執行→評估。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"107110-N2-70":{"quick":"延聘學者顧問協助研究=直線幕僚型(官僚組織)。","detail":{"background":"官僚式組織類型:金字塔型、高聳型、扁平型、直線幕僚型(line-staff)。「延聘學者擔任顧問,協助指導同仁從事研究(幕僚提供專業諮詢協助)」=直線幕僚型(D正確)。故直線幕僚型(D)。組織結構:直線(指揮鏈)、幕僚(諮詢無指揮權)、直線幕僚、功能式(依專業分部門)、矩陣式(雙重隸屬-功能線+專案線)、扁平式(層級少授權多自主高)、高聳式(層級多)、科層/官僚式(規章層級分工)、簡單式(小型)。集權(決策集中-緊急/精簡)vs分權(下放-自由受尊重)。控制/管轄幅度=一主管直轄部屬數。願景=未來圖像、使命=存在理由、價值觀=共同信念。","options":{"A":"金字塔型是層級結構。","B":"高聳型是層級多。","C":"扁平型是層級少。","D":"正確(本題答案)。聘顧問協助=直線幕僚型。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"111110-N2-80":{"quick":"編列電動床維修費=固定預算。","detail":{"background":"預算種類:固定預算(fixed budget,依固定項目編列、例行性費用)。護理長「年度預算中編列電動床維修費用(例行性維修費)」=固定預算(C正確)。績效預算(依績效)、日落預算(有落日條款)、零基預算(從零)皆非「例行維修費編列」。故固定預算(C)。","options":{"A":"績效預算依績效。","B":"日落預算有落日條款。","C":"正確(本題答案)。例行維修費=固定預算。","D":"零基預算從零編列。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"112030-N2-70":{"quick":"分權式組織特性=會使員工覺得自由度高且受尊重。","detail":{"background":"分權式(decentralization)組織特性:C「會使員工覺得自由度高且受尊重(決策權下放、自主權大、士氣高)」最適宜。A「士氣較低落」錯(分權士氣高);B「適合大型機構省人力」偏集權描述;D「增加決策時效性和品質」——分權決策較貼近現場但未必更快,本題以C為正解。故C。","options":{"A":"分權士氣高,非低落。","B":"省人力偏集權描述。","C":"正確(本題答案)。分權使員工自由度高且受尊重。","D":"本題以C為正解。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"113100-N2-41":{"quick":"雙因子激勵因素減少倦勤=提供明確升遷機會。","detail":{"background":"Herzberg雙因子理論:激勵因子(內在:成就、肯定、升遷、成長、責任)可提升滿意、減少倦勤異動;保健因子(外在:領導方式、上班天數、工作環境)只防止不滿。減少倦勤異動應強化「激勵因子」:C「提供明確升遷機會(成長/晉升,激勵因子)」正確。A檢討領導方式、B檢討上班天數、D友善工作環境皆是保健因子。故C。","options":{"A":"領導方式是保健因子。","B":"上班天數是保健因子。","C":"正確(本題答案)。明確升遷機會=激勵因子。","D":"工作環境是保健因子。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"113100-N2-47":{"quick":"SWOT:機會(opportunity)是外在環境中對組織有利的因素。","detail":{"background":"SWOT分析:優勢/劣勢=內部因素;機會/威脅=外部因素。C「機會(opportunity)是指外在環境中對組織有利的因素」正確。A「優勢是有利的『外部』因素」錯(優勢是內部);B「劣勢是與外界競爭的有害因素」錯(劣勢是內部不利);D「威脅包括機構財務效率員工素質」錯(那些是內部劣勢,非威脅)。故C。","options":{"A":"優勢是內部有利,非外部。","B":"劣勢是內部不利。","C":"正確(本題答案)。機會=外在環境對組織有利的因素。","D":"財務效率員工素質是內部劣勢,非威脅。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"114170-N2-40":{"quick":"目標管理成效「最不適當」=落實集權概念(MBO是分權參與)。","detail":{"background":"目標管理(MBO)成效:B促使部屬自我成長、C加強管制(控制)功能、D提高工作士氣——皆是MBO優點。選項A「落實集權概念」最不適當(本題答案)——MBO強調「分權、員工參與、共同設定目標、自我管理」,落實的是『分權』而非集權。故A。規劃層級:策略性(高階長程依SWOT調整願景使命)、部門性(中階)、執行性(基層短程)。MBO目標管理(杜拉克):參與式、共同設定可測量目標(SMART:Specific/Measurable/Achievable/Relevant/Time-bound)、定期檢討回饋、結果導向、分權。SWOT:優勢劣勢(內部)、機會威脅(外部)。策略規劃步驟:使命目標→SWOT→制定策略→執行→評估。","options":{"A":"最不適當(本題答案)。MBO是分權參與,非集權。","B":"MBO促使部屬自我成長。","C":"MBO加強管制功能。","D":"MBO提高工作士氣。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"115030-N2-49":{"quick":"問題解決原則=先確立影響利益最大的問題,再列出子問題。","detail":{"background":"問題解決處理原則:C「先確立影響組織利益最大的問題,再抽絲剝繭列出子問題(由大而小、聚焦重要)」正確。A「找完美方案、有時間壓力也不輕易決策」錯(應在合理時間內做滿意決策);B「不論大小都注重小細節」錯(應抓重點);D「將大小問題都分派部屬」錯(重大問題主管應親自處理)。故C。","options":{"A":"應在合理時間內做滿意決策。","B":"應抓重點,非鑽小細節。","C":"正確(本題答案)。先確立影響最大問題再列子問題。","D":"重大問題主管應親自處理。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}}},TO=["1管理理論與管理功能", "2領導理論型態與權力影響力", "3激勵理論", "4溝通協調", "5衝突管理", "6組織結構與組織文化", "7決策與問題解決", "8規劃目標管理與策略", "9授權與時間管理", "10護理成本預算與財務管理", "11管理者角色變革危機與人力品質"],LEC={"1管理理論與管理功能":{"html":"\n<p><b>管理理論演進:</b><b>古典(傳統)時期</b>——泰勒(Taylor)科學管理(標準化、時間動作研究、專業分工、按件獎懲、效率)、費堯(Fayol)行政管理(管理五功能、POSDCoRB)、韋伯(Weber)官僚/科層(層級、依法、不談私人關係、專業分工)。<b>新古典(修正)時期</b>——霍桑研究、Mayo、人際關係、行為科學(重人性需求)。<b>現代時期</b>——系統理論(輸入→轉化→輸出→回饋)、權變理論(因內外情境調整)。</p>\n<p><b>X/Y/Z理論:</b><b>X理論</b>(人性懶惰、需嚴格監督獎懲);<b>Y理論</b>(人性本善、自動自發、負責、有潛力);<b>Z理論</b>(大內Ouchi——團體價值觀、參與式決策、長期僱用、緩慢升遷、全面參與)。Gillies管理過程=輸入→轉化→輸出。</p>\n"},"2領導理論型態與權力影響力":{"html":"\n<p><b>領導理論演進:</b>特質論(先天特質)→行為論(<b>管理方格</b>Blake:X軸關心生產、Y軸關心員工;9,1職責、1,9鄉村俱樂部、9,9團隊、1,1無為)→權變論(<b>費德勒</b>:工作結構/職位權力/領導者-部屬關係;<b>情境Hersey-Blanchard</b>:依員工成熟度——M1告知、M2銷售、M3參與、M4授權;<b>路徑目標</b>:指導/支持/參與/成就)→新近(<b>轉換型</b>:願景激勵、智能啟發、個別關懷、超越期望;<b>交易型</b>:角色澄清、賞罰交換)。</p>\n<p><b>權力/影響力:</b>法統(合法、職位)、獎酬(獎勵)、強制(懲罰)、<b>專家(專技、專業知識)</b>、<b>榜樣(參考、效法典範)</b>、資訊。管理者(把事做對、職權)vs領導者(做對的事、個人特質)。</p>\n"},"3激勵理論":{"html":"\n<p><b>Maslow需求層級(由低而高、低層先滿足):</b>生理→安全→愛與歸屬→自尊→自我實現(最高)。護理應用:身體舒適=生理(最優先)、環境介紹=安全、同儕互動=愛與歸屬、表揚肯定=自尊。</p>\n<p><b>Herzberg雙因子:</b><b>激勵因子</b>(內在,帶來滿足:成就、肯定、升遷、成長、責任、工作本身);<b>保健因子</b>(外在,只防止不滿:薪資、人際、工作環境、安全、督導)。減少倦勤異動應強化激勵因子(如明確升遷)。</p>\n<p><b>其他:</b>公平理論(與同儕比較投入-報酬比)、期望理論(努力-績效-報酬)、<b>增強理論</b>(行為依結果修正)、ERG理論(存在-關係-成長)。內容理論(Maslow/Herzberg)vs過程理論(公平/期望/目標)。</p>\n"},"4溝通協調":{"html":"\n<p><b>溝通方向:</b><b>上行</b>(下級對上級)、<b>下行</b>(上級對下級)、<b>平行</b>(同層級/同層部門)、<b>斜行</b>(不同層級+不同部門/對外單位)、<b>葡萄藤式</b>(grapevine,非正式小道消息/謠言)。</p>\n<p><b>溝通特性:</b>持續性(每次延續上次的感受與關係)、雙向性、不可逆性。良好溝通管道:訊息必要、簡短直接、成員易取得、正式傳達。抱怨處理:先傾聽同理、找出問題,再解決。</p>\n"},"5衝突管理":{"html":"\n<p><b>衝突類型:</b><b>雙趨</b>(兩個都想要、只能選一,魚與熊掌)、<b>雙避</b>(兩個都不想要、必選一)、<b>趨避</b>(同一目標既想要又怕、有利有弊)。</p>\n<p><b>衝突發展五階段(Robbins):</b>潛在對立(條件)→<b>認知與個人化</b>(感知並情緒化、定義議題)→意圖→<b>行為</b>(外顯、最適合介入)→結果。</p>\n<p><b>衝突處理(關心自己/關心他人):</b>競爭(高/低)、<b>順從/順應</b>(低/高、犧牲自己)、妥協(中/中、各退一步)、<b>逃避</b>(低/低、迴避拖延)、<b>合作</b>(高/高、雙贏)。傳統觀點:衝突有害應避免;現代觀點:適度衝突有建設性,管理者應控制在適當程度,不以權力強壓。</p>\n"},"6組織結構與組織文化":{"html":"\n<p><b>組織結構:</b><b>直線</b>(指揮命令鏈)、<b>幕僚</b>(顧問諮詢、無指揮權)、<b>直線幕僚</b>(聘顧問協助)、<b>功能式</b>(依專業分部門:內外科營養護理部)、<b>矩陣式</b>(雙重隸屬:功能線+專案線)、<b>扁平式</b>(層級少、授權多、自主高、適成熟員工)、<b>高聳式</b>(層級多)、<b>科層/官僚式</b>(規章、層級、分工)、<b>簡單式</b>(小型低複雜)。</p>\n<p><b>集權vs分權:</b>集權(決策集中、緊急時效、精簡避免重複);分權(下放、員工自由受尊重、相互制衡)。<b>控制/管轄幅度</b>=一位主管直接管轄的部屬/單位數。<b>單一指揮</b>=只向一位主管負責。</p>\n<p><b>組織文化:</b>願景(未來圖像/目標指引)、使命(組織存在的理由,以顧客需要為依據)、價值觀(共同信念)、組織氣氛。</p>\n"},"7決策與問題解決":{"html":"\n<p><b>決策過程:</b>界定/確認問題(首要)→確立決策準則→列舉可行方案→分析方案利弊→執行方案→評估。決策類型:確定性、風險性、不確定性。</p>\n<p><
