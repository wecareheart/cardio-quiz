物及強效性鴉片類藥物", "B": "對於輕度疼痛病人,給予 acetaminophen 或非類固醇抗發炎藥物 ( NSAIDs ) 即可", "C": "類鴉片類藥物間的換算 morphine 是 oxycodone 的兩倍", "D": "相較於 NSAIDs,類鴉片類藥物的使用劑量無天花板效應"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "112_進階_內科_Q.pdf", "exam_tag": "112", "source": "MOHW", "topic": "癌症篩檢與安寧緩和", "topic_code": "H6", "topic_num": 6, "correction_note": ""}, {"id": "113-進階-內科-11", "roc_year": 113, "subject_group": "進階專科護理", "branch": "內科", "q_num": 11, "stem": "為安寧緩和醫療的病人進行身體評估時,下列敘述何者正確?", "options": {"A": "喉頭持續出現「咕嚕」聲,是因喉頭肌肉鬆弛,無法有效吞口水", "B": "以 PAIN 評估整體痛,「N」指的是 non - pharmacological management", "C": "一般情況下,腹水超過 300 mL 才能由超音波檢測出", "D": "陳施氏呼吸型態 ( Cheyne - Stokes ) 是呼吸淺快,之後逐漸變慢加深,又逐漸變淺快"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "113_進階_內科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "癌症篩檢與安寧緩和", "topic_code": "H6", "topic_num": 6, "correction_note": ""}, {"id": "113-進階-家庭-14", "roc_year": 113, "subject_group": "進階專科護理", "branch": "家庭", "q_num": 14, "stem": "有關家屬的哀傷撫慰 ( bereavement care ) 的敍述,下列何者錯誤?", "options": {"A": "哀傷撫慰不屬於安寧緩和療護範疇", "B": "哀傷的感受通常在第一年最為強烈", "C": "不同喪親情境,其哀傷程度有個別差異", "D": "感覺虛脫、緊張、心悸是哀傷的生理表現"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "113_進階_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "癌症篩檢與安寧緩和", "topic_code": "H6", "topic_num": 6, "correction_note": ""}, {"id": "113-通論-家庭-18", "roc_year": 113, "subject_group": "專科護理通論", "branch": "家庭", "q_num": 18, "stem": "58 歲女性病人,丈夫離家 15 年未有聯繫,獨自撫養現年 20 歲的兒子,病人因車禍腦部 重創入院,經 2 位臨床醫師診斷腦部損傷已不可治癒,近期內病程進行至死亡已不可避免, 兒子知悉後,完成不施行心肺復甦術同意書簽立,並嘗試聯繫父親,盼於母親離世前 探望,父親出現後,後悔未盡家庭責任,決定搶救到底,不同意兒子簽立不施行心肺 復甦術同意書的決定。依據「安寧緩和醫療條例」之規定,下列敘述何者最適當?", "options": {"A": "父親須先撤除兒子簽立的不施行心肺復甦術同意書,再以其決定為之", "B": "因兒子已先簽署不施行心肺復甦術同意書,應以兒子已簽署的內容為之", "C": "兩位家屬意見不一致,醫療團隊應依病人最大利益出具醫囑為之", "D": "依法配偶的意見優於成年子女,若父親出具書面意見,應以父親的決定為之"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "113_通論_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "癌症篩檢與安寧緩和", "topic_code": "H6", "topic_num": 6, "correction_note": ""}, {"id": "113-通論-5分科-26", "roc_year": 113, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 26, "stem": "依據民國 110 年 1 月 20 日修訂「安寧緩和醫療條例」,下列敘述何者正確?", "options": {"A": "安寧緩和醫療只能在專門的安寧療護機構中提供,其他醫療機構不得提供此服務", "B": "病人必須經過家屬同意,才能接受安寧緩和醫療服務", "C": "安寧緩和醫療的主要目的是延長病人生命", "D": "醫療機構必須告知病人及其家屬有關安寧緩和醫療的選擇,並尊重病人的自主決定"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "113_通論_5分科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "癌症篩檢與安寧緩和", "topic_code": "H6", "topic_num": 6, "correction_note": ""}, {"id": "113-通論-家庭-35", "roc_year": 113, "subject_group": "專科護理通論", "branch": "家庭", "q_num": 35, "stem": "關於目前政府補助高風險族群癌症篩檢,下列敘述何者正確?", "options": {"A": "糞便潛血檢查每年 1 次", "B": "口腔黏膜檢查每 2 年 1 次", "C": "子宮頸抹片檢查每 2 年 1 次", "D": "乳房 X 光攝影檢查每 3 年 1 次"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "113_通論_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "癌症篩檢與安寧緩和", "topic_code": "H6", "topic_num": 6, "correction_note": ""}, {"id": "113-通論-家庭-38", "roc_year": 113, "subject_group": "專科護理通論", "branch": "家庭", "q_num": 38, "stem": "關於國民健康署提供之口腔癌篩檢,下列敘述何者錯誤?", "options": {"A": "政府補助 30 歲以上嚼檳榔或吸菸民眾篩檢", "B": "政府補助 18 歲以上有嚼檳榔原住民篩檢", "C": "若檢查出疑似癌前病變者,應儘速就醫,並每年定期追蹤", "D": "可至健保特約具牙科、耳鼻喉科之醫療院所進行篩檢"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_通論_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "癌症篩檢與安寧緩和", "topic_code": "H6", "topic_num": 6, "correction_note": ""}, {"id": "114-通論-5分科-31", "roc_year": 114, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 31, "stem": "末期病人表達疼痛與不適時,下列何者最能展現專科護理師之臨床倫理與專業角色?", "options": {"A": "面對病人疼痛主訴時,可建議儘量忍耐以避免過度使用藥物而產生依賴", "B": "主動對病人表示安慰,並建議使用坊間草藥與輔助療法作為止痛選項之一", "C": "協助病人與家屬了解病情與安寧療護選項,並依醫療團隊討論擬定止痛計畫", "D": "為了立即減輕病人痛苦,可先調整鎮痛藥劑量,再跟醫師報備"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_通論_5分科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "癌症篩檢與安寧緩和", "topic_code": "H6", "topic_num": 6, "correction_note": ""}, {"id": "114-進階-內科-79", "roc_year": 114, "subject_group": "進階專科護理", "branch": "內科", "q_num": 79, "stem": "有關癌症末期病人接受安寧緩和醫療,治療腸胃道症狀的處置原則,下列何者最適當?", "options": {"A": "食慾不振時,可會診營養師提供高營養食物", "B": "類固醇對於惡性幽門狹窄造成的噁心嘔吐,具有緩解功效", "C": "為避免脫水,不建議給予利尿劑處理腹水", "D": "緩解便秘的首要步驟是減少液體攝取,以避免腹脹不適"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_進階_內科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "癌症篩檢與安寧緩和", "topic_code": "H6", "topic_num": 6, "correction_note": ""}], E={"105-TNPA-內科-5": {"quick": "TNM 中 N 代表淋巴結，N0 為無淋巴結轉移、N1→N3 程度漸增，故 (B) 正確。", "detail": {"background": "TNM 分期是實體腫瘤（solid tumor）最通用的解剖分期系統，由 AJCC/UICC 制定。T（Tumor）描述原發腫瘤的「局部範圍」——大小與侵犯深度，T1~T4 是腫瘤本身愈來愈大／侵犯愈深，並非等於臨床分期第 I~IV 期（分期是綜合 T、N、M 後換算）。N（Node）代表區域淋巴結轉移，N0 無、N1~N3 依轉移數目或範圍遞增。M（Metastasis）僅有 M0（無遠端轉移）與 M1（有遠端轉移）兩種，沒有 M2、M3。最後把 T、N、M 組合對照成第 I~IV 期（stage grouping）。重點觀念：TNM 適用於上皮性實體癌，但「造血系統惡性腫瘤」如白血病、淋巴瘤並不用 TNM——白血病依細胞型態與分子（WHO 分類），淋巴瘤用 Ann Arbor / Lugano 分期，多發性骨髓瘤用 ISS/R-ISS。", "options": {"A": "錯。T 代表腫瘤局部範圍（大小／侵犯深度），T1~T4 不等於臨床第 I~IV 期，分期須綜合 TNM。", "B": "正確。N=區域淋巴結，N0 無侵犯，N1~N3 隨轉移數目／區域增加而升高。", "C": "錯。M 只有 M0 與 M1，並無 M2 等更高數字。", "D": "錯。TNM 用於實體癌；白血病等造血系統惡性腫瘤不適用 TNM，改用 WHO 分類等。"}, "sources": "Harrison 21e（Cancer staging, AJCC TNM）；AJCC Cancer Staging Manual 8e。"}}, "106-106a-內科-9": {"quick": "惡性淋巴瘤需看「組織結構」分類，細胞學（cytology）不足以診斷，故 (D)。", "detail": {"background": "病理診斷依檢體不同分為細胞學（cytology，看散落的細胞）與組織病理（histology，看完整組織結構）。許多上皮癌可藉細胞學初步診斷：肺癌（痰液、支氣管刷洗、肋膜積液）、乳癌（細針抽吸 FNA）、大腸癌（刷檢、活檢）。但「淋巴瘤」的分類高度依賴淋巴結的「整體結構（architecture）」——濾泡是否破壞、被膜是否被侵犯、Reed-Sternberg 細胞分佈等，再加上免疫組織化學與流式細胞儀、分子檢測，才能區分 Hodgkin 與各亞型 non-Hodgkin。單靠細針抽吸的散落細胞無法判讀結構，易誤診，故淋巴瘤強調「切除式淋巴結活檢（excisional biopsy）」。", "options": {"A": "肺癌可用痰液細胞學、刷洗、肋膜液細胞學輔助診斷。", "B": "乳癌可用細針抽吸細胞學初步評估。", "C": "大腸癌可用刷檢／活檢，細胞學有輔助角色。", "D": "正確。淋巴瘤需完整組織結構（切除式活檢＋免疫染色／流式），細胞學不足，故不建議僅以 cytology 診斷。"}, "sources": "Harrison 21e（Approach to lymphoma diagnosis）；WHO Classification of Haematolymphoid Tumours 5e。"}}, "106-106b-外科-69": {"quick": "晚期上皮性卵巢癌術後首選 paclitaxel＋carboplatin 雙藥，故 (A)。", "detail": {"background": "上皮性卵巢癌（占卵巢癌約 90%）多在晚期（III/IV 期）才診斷，治療核心是「最大減積手術（debulking）＋含鉑（platinum）化療」。標準第一線方案經 GOG-111、GOG-158 等大型試驗確立為 paclitaxel（紫杉醇）＋carboplatin（卡鉑）雙藥，每 3 週一次共 6 循環；carboplatin 取代 cisplatin 是因毒性較低（神經、耳、腎毒性少）而療效相當。對殘留腫瘤量大者預後較差，故手術目標是達到 no gross residual。BRCA 突變或 HRD 陽性者可加 PARP 抑制劑維持治療。本題雖以卵巢癌為背景，但考點是「腫瘤學總論：含鉑雙藥為上皮性卵巢癌標準一線」這一普遍化療原則。", "options": {"A": "正確。paclitaxel＋carboplatin 為晚期上皮性卵巢癌標準第一線（GOG-111/158）。", "B": "gemcitabine＋carboplatin 用於「鉑敏感復發」卵巢癌，非首次一線首選。", "C": "liposomal doxorubicin 多用於鉑抗藥性復發，非一線單藥。", "D": "topotecan 用於復發治療，非一線單藥。"}, "sources": "Harrison 21e（Gynecologic malignancies；ovarian cancer chemotherapy）；NCCN Ovarian Cancer Guidelines。"}}, "106-106a-外科-79": {"quick": "pT2 為「肌肉侵犯型」膀胱癌，需根除性切除或化放療；經尿道灌注＋口服標靶（C）屬非肌肉侵犯型治療，故 (C) 錯。", "detail": {"background": "泌尿上皮癌（urothelial carcinoma）依侵犯深度分為「非肌肉侵犯型（NMIBC，Ta/T1/CIS）」與「肌肉侵犯型（MIBC，≥T2）」，兩者治療截然不同。NMIBC 以經尿道腫瘤切除（TURBT）＋膀胱內灌注（BCG 免疫治療或 mitomycin 化療）為主。本題病理為 high-grade infiltrating urothelial carcinoma、pT2（已侵犯肌肉層），屬 MIBC，標準治療是「根除性膀胱切除＋尿路改流（人工膀胱）」，並可考慮新輔助含鉑化療；不適合手術者可採膀胱保留的「同步化放療」。膀胱內灌注與口服標靶藥物是用於 NMIBC 的策略，對已侵犯肌肉的 pT2 不足，故 (C) 為錯誤後續治療。", "options": {"A": "正確處置。根除性膀胱切除＋人工膀胱是 MIBC（≥T2）標準手術。", "B": "正確處置。靜脈（全身）化療±放射線可用於 MIBC（新輔助化療、化放療膀胱保留）。", "C": "錯誤。經尿道膀胱化學灌注＋口服標靶屬 NMIBC 治療，對 pT2 肌肉侵犯型不足。", "D": "正確處置。膀胱內免疫療法（BCG）屬 NMIBC 範疇，本選項相對於 C 仍指向膀胱腔內治療概念；考點在凸顯 C 之灌注＋口服標靶組合不適用。"}, "sources": "Harrison 21e（Bladder cancer）；AUA/EAU Muscle-Invasive Bladder Cancer Guidelines。"}}, "107-TNPA-內科-19": {"quick": "可自由活動、能做輕鬆工作但粗重工作受限＝ECOG 1，故 (B)。", "detail": {"background": "ECOG performance status（體能狀態）是評估癌症病人日常功能與治療耐受度的重要量表，與預後及是否適合積極化療密切相關。分級：0＝完全正常活動，與發病前無異；1＝劇烈活動受限，但可走動並從事輕度或靜態工作（如輕鬆家務、辦公）；2＝可走動、生活完全自理，但無法工作，清醒時間臥床<50%；3＝僅能有限自理，清醒時臥床或坐椅>50%；4＝完全失能、無法自理、完全臥床；5＝死亡。題幹「可自由活動、能執行輕鬆工作、僅粗重工作受限」正符合 ECOG 1。臨床上 ECOG 0–1 通常才適合標準強度化療，≥3 多以支持／安寧為主。", "options": {"A": "0＝體能與發病前完全相同、無任何活動受限。", "B": "正確。1＝劇烈活動受限，但可走動並從事輕鬆工作（符合題幹）。", "C": "2＝無法從事任何工作，但生活可自理，臥床<50% 清醒時間。", "D": "3＝僅能有限自理，臥床／坐椅>50% 清醒時間。"}, "sources": "Harrison 21e（Performance status, Oncology assessment）；Oken MM et al. ECOG performance status, 1982。"}}, "107-TNPA-婦產科-61": {"quick": "已婚、可取得精子，化療前「冷凍胚胎」成功率最高，故 (C)。", "detail": {"background": "年輕癌症病人在化療（尤其 alkylating agents 如 cyclophosphamide）前應考慮生育保存（oncofertility），因化療具性腺毒性，可致卵巢功能衰竭與不孕。成功率排序一般為：冷凍胚胎（embryo）＞冷凍成熟卵子（oocyte）＞卵巢組織冷凍（ovarian tissue，仍屬發展中且有再植入腫瘤細胞顧慮）。冷凍胚胎需精子來源，技術最成熟、活產率最高；本題病人已婚可用配偶精子，故首選冷凍胚胎。若無伴侶可選冷凍卵子。整個流程需與腫瘤科協調，避免延誤化療時機（通常卵巢刺激約需 2 週）。此為「腫瘤學總論：化療性腺毒性與生育保存」之普遍考點。", "options": {"A": "冷凍部分卵巢組織為實驗性／發展中技術，成功率與活產率較低。", "B": "冷凍卵子可行（無伴侶時首選），但活產率略低於冷凍胚胎。", "C": "正確。已婚可取精，冷凍胚胎技術最成熟、日後懷孕成功率最高。", "D": "全卵巢冷凍保存技術門檻高、仍屬研究階段，非首選。"}, "sources": "Harrison 21e（Late effects of cancer therapy; fertility preservation）；ASCO Fertility Preservation Guideline 2018。"}}, "108a-TNPA-內科-28": {"quick": "TLS 造成高鉀、高磷、高尿酸，但血鈣「下降」，故較不可能高血鈣（D）。", "detail": {"background": "腫瘤溶解症候群（TLS）是大量腫瘤細胞快速崩解（常見於化療開始後 12–72 小時，好發高腫瘤負荷、高增殖如急性白血病、高惡性度淋巴瘤 Burkitt）將細胞內物質釋入血中所致的代謝急症。細胞內鉀釋出→高血鉀（致命性心律不整）；核酸代謝→高尿酸（尿酸結晶致急性腎損傷）；細胞內磷釋出→高血磷；而高血磷與鈣結合沉澱→低血鈣（hypocalcemia，可致抽搐、心律不整）。所以 TLS 的典型四聯為「高鉀、高磷、高尿酸、低鈣」。預防與治療：積極水化、降尿酸（allopurinol 預防、rasburicase 治療已升高之尿酸）、監測電解質與腎功能。本題問「較不可能」者即高血鈣。", "options": {"A": "高尿酸——核酸分解產生，TLS 典型表現。", "B": "高血鉀——細胞內鉀釋出，最危險（心律不整）。", "C": "高血磷——細胞內磷釋出。", "D": "正確（為較不可能者）。TLS 是「低血鈣」，因高磷使鈣磷沉澱，血鈣下降而非上升。"}, "sources": "Harrison 21e（Oncologic emergencies; Tumor lysis syndrome）；Coiffier B. TLS guidelines, JCO 2008。"}}, "108b-TNPA-婦產科-34": {"quick": "Paclitaxel 主要經肝臟 CYP 代謝，施打前須評估肝功能，故 (C)。", "detail": {"background": "化療藥物的清除途徑決定其在器官功能不全時的劑量調整。Paclitaxel（紫杉醇）主要由肝臟細胞色素 P450（CYP2C8、CYP3A4）代謝、膽汁排泄，肝功能不良時血中濃度上升、毒性增加，故施打前須評估肝功能（膽紅素、轉胺酶）並據以減量。相對地，carboplatin 與 topotecan 主要經「腎臟」排除，劑量依腎功能（GFR/Ccr）調整（carboplatin 用 Calvert 公式以 AUC 計算）。Doxorubicin（anthracycline）亦經肝膽清除、肝功能不良需減量，且具累積性心臟毒性——故臨床上 doxorubicin 也需注意肝功能；本題以單一最佳答案設計，鍵定 paclitaxel 為「以肝代謝為主、施打前務必評估肝功能」之代表。", "options": {"A": "Carboplatin 主要經腎排除，依腎功能（AUC/Ccr）調整，非以肝代謝為主。", "B": "Doxorubicin 確經肝膽清除（也需注意肝功能與心毒性），但本題鍵定 C。", "C": "正確。Paclitaxel 主要經肝臟 CYP 代謝、膽汁排泄，肝功能不良需減量。", "D": "Topotecan 主要經腎排除。"}, "sources": "Harrison 21e（Principles of cancer chemotherapy; drug metabolism）；藥品仿單（paclitaxel hepatic metabolism）。"}}, "108b-TNPA-內科-55": {"quick": "TLS 時血鈣「下降」而非上升，故敘述 (A) 不正確。", "detail": {"background": "承前題，腫瘤溶解症候群（TLS）的代謝異常為高血鉀、高血磷、高尿酸與「低血鈣」。低血鈣的機轉是大量細胞內磷釋放→高血磷→鈣磷乘積過高而沉澱於組織→血鈣下降，臨床可致感覺異常、手足搐搦、QT 延長與心律不整。風險因子包括治療前已高尿酸、腫瘤體積巨大（bulky）、高增殖率（急性白血病、Burkitt 淋巴瘤）、高 LDH、化療敏感度高、既有腎功能不全與脫水。處置以預防為主：積極靜脈水化維持尿量、降尿酸藥（allopurinol／rasburicase），高危者於化療前 24–48 小時開始；發生後密切監測電解質與腎功能，必要時透析。", "options": {"A": "正確（為不正確之敘述）。TLS 血鈣「下降」（高磷致鈣磷沉澱），非上升。", "B": "正確敘述。治療前高尿酸或腫瘤巨大（bulky）會增加 TLS 風險。", "C": "正確敘述。核酸分解使血中尿酸異常上升。", "D": "正確敘述。急性白血病（及高惡性度淋巴瘤）最易發生 TLS。"}, "sources": "Harrison 21e（Tumor lysis syndrome）；Cairo-Bishop TLS criteria。"}}, "109-進階-內科-12": {"quick": "EGFR 抑制劑特徵性副作用為「類青春痘皮膚疹（acneiform rash）」，較傳統化療多，故 (A)。", "detail": {"background": "表皮生長因子受體（EGFR）抑制劑分小分子 TKI（gefitinib、erlotinib、afatinib，用於 EGFR 突變肺腺癌）與單株抗體（cetuximab、panitumumab，用於大腸癌、頭頸癌）。因 EGFR 在皮膚與毛囊角質細胞高度表現，抑制後最具特徵的副作用是「類青春痘（acneiform/papulopustular）皮膚疹」，多分布於臉部與上胸背，常伴甲溝炎（paronychia）、皮膚乾燥、搔癢與腹瀉；有趣的是皮疹愈明顯往往代表療效愈好。相對地，「禿髮（alopecia）」是傳統細胞毒性化療（如 anthracycline、taxane）的典型；「手足症候群（hand-foot syndrome）」較常見於 capecitabine、5-FU 與多激酶抑制劑（sorafenib、sunitinib）。", "options": {"A": "正確。類青春痘皮膚疹（acneiform rash）是 EGFR 抑制劑最具特徵、較傳統化療顯著的副作用。", "B": "免疫相關水瀉較常見於免疫檢查點抑制劑；EGFR 抑制劑雖也腹瀉，但非「免疫反應」機轉。", "C": "禿髮是傳統細胞毒性化療（taxane/anthracycline）的典型，非 EGFR 抑制劑特徵。", "D": "手足症候群較常見於 capecitabine 與多激酶抑制劑（sorafenib/sunitinib）。"}, "sources": "Harrison 21e（Targeted therapy; EGFR inhibitors and dermatologic toxicity）。"}}, "110-進階-內科-79": {"quick": "前列腺癌＋突發雙下肢無力／感覺喪失＋椎根侵蝕＝惡性脊髓壓迫，故 (B)。", "detail": {"background": "惡性脊髓壓迫（malignant spinal cord compression, MSCC）是腫瘤急症，常因脊椎骨轉移壓迫硬脊膜囊／脊髓所致。最會骨轉移的癌症為前列腺癌、乳癌、肺癌與多發性骨髓瘤。臨床表現：背痛（最早、最常見，常先於神經學症狀數天至數週）、漸進或突發的雙下肢無力與感覺平面、反射改變，晚期出現膀胱（尿滯留／失禁）與腸道功能障礙。本題前列腺癌病人脊椎 X 光見「椎根（pedicle）侵蝕」（轉移典型徵象）合併雙下肢感覺喪失與無力，即典型 MSCC。處置須「即刻」：立即給予高劑量類固醇（dexamethasone）降低水腫、緊急 MRI 全脊椎確診、會診放射腫瘤與神經外科決定放療或減壓手術——延遲處理會造成不可逆癱瘓。", "options": {"A": "下腔靜脈栓塞造成下肢腫脹，不會造成感覺喪失與椎根侵蝕。", "B": "正確。骨轉移壓迫脊髓→惡性脊髓壓迫，需緊急類固醇＋MRI＋放療／手術。", "C": "腫瘤溶解症候群是代謝急症（電解質異常），不造成局部神經壓迫。", "D": "小腦血管栓塞造成共濟失調／眩暈，非雙下肢對稱性感覺運動喪失。"}, "sources": "Harrison 21e（Oncologic emergencies; spinal cord compression）。"}}, "110-進階-內科-80": {"quick": "廣效抗生素 3 天仍持續發燒應加上抗黴菌藥，故 (D) 正確。", "detail": {"background": "發燒性嗜中性球低下症（febrile neutropenia, FN）定義為單次口溫 ≥38.3°C（或 ≥38.0°C 持續 1 小時）合併嗜中性球絕對值 ANC < 500/µL（或預期 48 小時內降至 <500）。屬腫瘤急症，因免疫低下感染進展快、死亡率高。處置原則：(1) 抗生素「投藥前」務必先抽血液培養（含周邊與導管）並做必要培養／影像，但不可因等培養延誤抗生素；(2) 黃金時間內 1 小時內給予「抗綠膿桿菌」廣效 β-lactam（cefepime、piperacillin-tazobactam 或 carbapenem）為經驗治療核心；(3) 若 3–4 天後仍持續發燒、感染源不明，應加上「經驗性抗黴菌」治療（如念珠菌、麴菌）；(4) G-CSF 為輔助、不常規且不顯著降低死亡率。", "options": {"A": "錯。FN 定義是體溫 ≥38.3°C（單次）或 ≥38.0°C 持續 1 小時，非 39.3°C。", "B": "錯。投藥前須先抽血液細菌培養（但不可因此延誤抗生素）。", "C": "錯。G-CSF/白血球生成素為輔助治療，不能有效提升存活率，非常規。", "D": "正確。廣效抗生素 3–4 天仍持續發燒，應加上經驗性抗黴菌藥物。"}, "sources": "Harrison 21e（Febrile neutropenia）；IDSA Febrile Neutropenia Guideline 2010；NCCN。"}}, "111-進階-內科-77": {"quick": "轉移性乳癌腦轉移＋頭痛嘔吐＝顱內壓升高，首選 dexamethasone 降腦水腫，故 (D)。", "detail": {"background": "腦轉移（brain metastasis）常見於乳癌、肺癌、黑色素瘤。腫瘤周圍的血管性水腫（vasogenic edema）使顱內壓升高，臨床表現頭痛（清晨加劇）、噁心嘔吐、局部神經學缺損或意識改變。對症狀性腦水腫／顱內壓升高，第一線藥物是「高劑量皮質類固醇 dexamethasone」——能快速減少血管性水腫、緩解頭痛與神經症狀；接著再安排全腦放療、立體定位放療或手術。若合併癲癇才加抗癲癇藥（如 phenytoin/levetiracetam），但不預防性常規使用。calcitonin 用於惡性高血鈣，tramadol 為弱鴉片止痛非針對腦水腫。故本急症首選 dexamethasone。", "options": {"A": "tramadol 為弱鴉片止痛劑，無法處理腦水腫／顱內壓升高根本問題。", "B": "phenytoin 為抗癲癇藥，僅在合併癲癇時使用，非首選且不常規預防。", "C": "calcitonin 用於惡性高血鈣急性降鈣，與本題腦轉移無關。", "D": "正確。dexamethasone 快速減輕血管性腦水腫、降顱內壓，為症狀性腦轉移首選。"}, "sources": "Harrison 21e（Brain metastases; raised intracranial pressure）。"}}, "111-進階-外科-80": {"quick": "Paclitaxel 的代表性副作用為周邊神經病變，故 (A)。", "detail": {"background": "Paclitaxel（紫杉醇）屬 taxane 類，機轉為穩定微小管（microtubule）使其無法解聚，阻斷有絲分裂。其劑量限制性毒性除骨髓抑制（嗜中性球低下）外，最具特徵的是「周邊感覺神經病變」——手套襪套式麻木刺痛，與微小管在軸突運輸的角色受干擾有關，常為累積劑量相關、可能持續。其他常見副作用包括過敏反應（需前置給藥 steroid/抗組織胺）、關節肌肉痠痛、禿髮。它「不會」造成白血球增多（反而抑制骨髓）；便秘較常見於 vinca alkaloids（vincristine 的自主神經病變致腸蠕動下降）；續發性癌症較與 alkylating agents、topoisomerase II 抑制劑相關。", "options": {"A": "正確。周邊（感覺）神經病變是 paclitaxel 的代表性、劑量相關毒性。", "B": "續發性惡性腫瘤較與 alkylating agents／topoisomerase II 抑制劑相關。", "C": "錯。paclitaxel 抑制骨髓造成白血球「低下」，非增多。", "D": "便秘較常見於 vincristine（vinca alkaloid 自主神經病變）。"}, "sources": "Harrison 21e（Microtubule agents; taxane neurotoxicity）。"}}, "112-進階-內科-77": {"quick": "淋巴瘤＋下肢麻木無力＋尿滯留＝脊髓（馬尾）壓迫，故 (C)。", "detail": {"background": "本題與前列腺癌脊髓壓迫題同屬「惡性脊髓壓迫」概念，但以淋巴瘤為背景。淋巴瘤可因硬脊膜外腫塊或椎體侵犯壓迫脊髓／馬尾。關鍵鑑別點在於同時出現「運動（行走無力）＋感覺（足部麻木刺痛）＋自主神經（尿滯留、排便障礙）」的脊髓／馬尾症候群——尿滯留／失禁是重要警訊，代表壓迫已影響到圓錐或馬尾。tumor lysis 是代謝急症（電解質）、malignant hypercalcemia 表現為多尿、便秘、意識改變，均無局部脊髓壓迫之神經定位；peripheral neuropathy（化療引起）通常為對稱手套襪套式感覺異常，不會造成尿滯留與明顯運動麻痺合併膀胱功能障礙。處置同樣為緊急 dexamethasone＋MRI＋放療／手術。", "options": {"A": "tumor lysis syndrome 為代謝急症（高鉀磷尿酸、低鈣），非神經壓迫。", "B": "peripheral neuropathy 為對稱感覺異常，不會造成尿滯留與運動癱瘓。", "C": "正確。淋巴瘤壓迫脊髓／馬尾→運動＋感覺＋膀胱（尿滯留）症狀＝脊髓壓迫。", "D": "惡性高血鈣表現多尿、便秘、嗜睡，無局部脊髓壓迫定位。"}, "sources": "Harrison 21e（Oncologic emergencies; spinal cord compression）。"}}, "112-進階-內科-78": {"quick": "白血病化療後 pancytopenia＋高鉀＋高尿酸＋高磷＝腫瘤溶解症候群，故 (A)。", "detail": {"background": "本題提供 TLS 的典型實驗室組合：高血鉀（K 6.8）、高尿酸（13 mg/dL）、高血磷（P 10）——正是大量白血病細胞被化療崩解後細胞內物質釋出的結果。痙攣可由伴隨的低血鈣（高磷致鈣磷沉澱）或高鉀引發。鑑別：急性腎衰竭雖也可高鉀高磷，但 TLS 是「原因」（尿酸／磷結晶與大量崩解可續發 AKI），且病史明確為白血病化療後；惡性高血鈣是「高鈣」而非高磷高鉀；SIADH 表現為低血鈉。處置：積極水化、rasburicase 降尿酸、處理高鉀（鈣劑保護心臟、胰島素葡萄糖、利尿）、監測腎功能，嚴重時透析。預防勝於治療——高危者化療前即水化＋降尿酸。", "options": {"A": "正確。白血病化療後的高鉀／高尿酸／高磷（＋低鈣致痙攣）為 TLS 典型。", "B": "急性腎衰竭可為 TLS 的「續發後果」，但根本原因是腫瘤崩解。", "C": "惡性高血鈣是高「鈣」血症，與本題高磷高鉀不符。", "D": "SIADH 造成低血鈉，與本題電解質型態不符。"}, "sources": "Harrison 21e（Tumor lysis syndrome）。"}}, "113-進階-內科-27": {"quick": "FN 經驗性抗生素須涵蓋綠膿桿菌（antipseudomonal β-lactam），故 (B)。", "detail": {"background": "發燒性嗜中性球低下（FN）的經驗性抗生素首要原則是「廣效＋涵蓋綠膿桿菌（Pseudomonas aeruginosa）」，因綠膿桿菌感染兇猛、死亡率高。第一線單藥可選 cefepime、piperacillin-tazobactam 或抗綠膿 carbapenem（meropenem/imipenem）。是否加上抗 MRSA（如 vancomycin）並非常規，只在特定情況（疑似導管相關感染、皮膚軟組織感染、血流動力不穩、已知 MRSA 移生、嚴重黏膜炎）才加。常規合併抗黴菌也非一開始就用，而是持續發燒 4–7 天、感染源不明時才加。G-CSF/GM-CSF 為輔助，不常規且不顯著降低死亡率。投藥前先做血液培養但不可延誤第一劑抗生素（黃金 1 小時）。", "options": {"A": "抗 MRSA 非常規，只在特定適應症（導管感染、皮膚軟組織、不穩定、移生）才加。", "B": "正確。經驗性治療必須涵蓋綠膿桿菌（抗綠膿 β-lactam）。", "C": "抗黴菌非一開始常規，於持續發燒 4–7 天感染源不明時才加。", "D": "GM-CSF 非常規且不能有效降低死亡率。"}, "sources": "IDSA Febrile Neutropenia Guideline 2010；Harrison 21e；NCCN。"}}, "113-進階-婦產科-69": {"quick": "體腔內放療前須有足夠白血球，WBC 4000/µL 為可接受指標，故 (A)。", "detail": {"background": "放射治療（尤其婦癌的體腔內近接放療 brachytherapy）會抑制骨髓並影響全身狀況，治療前需確認血液與器官功能在可接受範圍。骨髓功能足夠（白血球與血小板正常）是能否如期治療的關鍵指標之一：WBC 約 4000/µL（正常 4000–10000）為可接受。相對地，Hb 6 g/dL 屬重度貧血（一般建議放療前 Hb 維持 ≥10 以確保腫瘤含氧、放療效果與耐受），需先矯正；Cr 0.45 mg/dL 偏低（多為肌肉量少，非治療指標重點）；AST 90 U/L 為升高（肝功能異常）。故四者中唯一落在「可接受、足以治療」的是 WBC 4000。本題考點為「治療前血球評估」的一般原則。", "options": {"A": "正確。WBC 4000/µL 屬正常範圍，骨髓功能足夠，可接受治療。", "B": "Hb 6 g/dL 為重度貧血，應先矯正（放療前宜 Hb≥10）。", "C": "Cr 0.45 mg/dL 偏低，非「可治療」之正向指標。", "D": "AST 90 U/L 為升高（肝功能異常），非可接受之指標。"}, "sources": "Harrison 21e（Principles of radiation therapy; pretreatment assessment）。"}}, "113-進階-家庭-79": {"quick": "胸腺瘤可伴隨多種腫瘤附屬症候群（如重症肌無力、純紅血球再生不良），故 (D)。", "detail": {"background": "胸腺瘤（thymoma）是「前縱膈腔（anterior mediastinum）」最常見的原發腫瘤之一（前縱膈四 T：Thymoma、Teratoma/germ cell、Thyroid、Terrible lymphoma）。好發於成年中老年（非青少年），男女相近。臨床最大特色是常合併「腫瘤附屬／自體免疫症候群（paraneoplastic）」，最典型為重症肌無力（myasthenia gravis，約 30–50% 胸腺瘤合併、約 10–15% MG 病人有胸腺瘤）；其他包括「純紅血球再生不良（pure red cell aplasia）」→造成貧血（非紅血球「增多」）、低丙種球蛋白血症（Good syndrome）等。前縱膈大腫塊可壓迫造成上腔靜脈症候群（SVC，非下腔靜脈）。治療以手術切除為主，合併 MG 者胸腺切除可改善。", "options": {"A": "錯。胸腺瘤好發於成年中老年，非青少年；性別差異不大。", "B": "錯。常伴隨純紅血球「再生不良」→貧血，而非紅血球增多症。", "C": "錯。前縱膈大腫塊壓迫造成「上腔靜脈」阻塞（SVC），非下腔靜脈。", "D": "正確。胸腺瘤可伴隨多種腫瘤附屬症候群（重症肌無力、PRCA、低球蛋白血症等）。"}, "sources": "Harrison 21e（Mediastinal masses; thymoma and paraneoplastic syndromes）。"}}, "113-進階-婦產科-80": {"quick": "Carboplatin 劑量以 AUC（Calvert 公式）計算，故 (A)。", "detail": {"background": "多數細胞毒性化療以體表面積（BSA, mg/m²）計算劑量，但 carboplatin 是重要例外——它幾乎完全經腎臟排除，故以「目標 AUC（area under the curve，藥物濃度-時間曲線下面積）」搭配腎功能計算，使用 Calvert 公式：總劑量(mg) = 目標 AUC ×（GFR + 25）。目標 AUC 常設 5–7（依方案與是否合併其他藥）。此法的好處是依個別腎功能個別化給藥，避免腎功能差者過量（骨髓抑制）或腎功能好者不足。相對地，cisplatin、paclitaxel 等多用 BSA。記憶要點：carboplatin＝AUC／Calvert／腎功能；這是腫瘤學總論常見計算題。", "options": {"A": "正確。Carboplatin 以目標 AUC（Calvert 公式：劑量=AUC×(GFR+25)）計算。", "B": "依體重（per weight）非 carboplatin 標準算法。", "C": "多數化療用體表面積（BSA），但 carboplatin 為例外。", "D": "Ccr（腎功能）是 Calvert 公式中的「變數之一」，但劑量單位以 AUC 表示，非直接以 Ccr 計量。"}, "sources": "Calvert AH et al. JCO 1989（Carboplatin dosing formula）；Harrison 21e。"}}, "114-進階-內科-77": {"quick": "上腔靜脈症候群以治療「病因」為主；類固醇＋利尿劑非首選治療，故敘述 (C) 錯。", "detail": {"background": "上腔靜脈症候群（SVC syndrome）是上腔靜脈被縱膈腫瘤（最常見肺癌，其次淋巴瘤、生殖細胞瘤）壓迫或血栓阻塞，造成臉頸上肢腫脹、頸靜脈怒張、頭脹、呼吸困難。處置核心是「針對病因」：對化放療敏感的腫瘤（小細胞肺癌、淋巴瘤、生殖細胞瘤）應盡快化療／放療使腫瘤縮小；對症狀嚴重（氣道阻塞、腦水腫）者可放置血管內支架快速緩解；若阻塞來自血栓才考慮抗凝。類固醇與利尿劑僅能暫時、有限地緩解，「不是首選的治療藥物」（證據有限），且利尿過度反致脫水與血栓。故 (C) 為錯誤敘述。", "options": {"A": "正確敘述。支架置放主要用於嚴重氣道阻塞或腦水腫等危急情況快速緩解。", "B": "正確敘述。淋巴瘤、生殖細胞瘤等化放療敏感腫瘤應盡快化療。", "C": "錯誤（為答案）。類固醇與利尿劑非首選治療，僅暫時有限緩解，應治療病因。", "D": "正確敘述。全身性抗凝僅在確定阻塞來自血栓時使用。"}, "sources": "Harrison 21e（Superior vena cava syndrome）。"}}, "114-進階-婦產科-78": {"quick": "Carboplatin 相較 cisplatin 神經／耳／腎毒性「較少」，但骨髓抑制「較多」，故 (D) 不適當。", "detail": {"background": "cisplatin 與 carboplatin 同為含鉑藥物但毒性側寫不同。cisplatin 的劑量限制毒性是腎毒性、嚴重噁心嘔吐、周邊神經毒性與耳毒性（需大量水化、止吐、監測腎功能與聽力）。carboplatin 則以「血液毒性」為劑量限制——尤其血小板低下與嗜中性球低下，骨髓抑制較 cisplatin「更明顯」；而其神經、耳、腎毒性與嘔吐則較 cisplatin「少」。因此以 AUC 依腎功能精算劑量正是為了控制其骨髓抑制。本題問「最不適當」者，即 (D)「較少骨髓抑制」——實際上 carboplatin 骨髓抑制較多。", "options": {"A": "適當。carboplatin 神經毒性較 cisplatin 少。", "B": "適當。carboplatin 耳毒性較少。", "C": "適當。carboplatin 腎毒性較少（故水化需求較低）。", "D": "不適當（為答案）。carboplatin 骨髓抑制（尤血小板低下）較 cisplatin「多」，非較少。"}, "sources": "Harrison 21e（Platinum compounds; carboplatin vs cisplatin toxicity）。"}}, "114-進階-婦產科-80": {"quick": "Epinephrine 不是止吐藥，無法緩解化療引起的噁心嘔吐，故 (A)。", "detail": {"background": "化療引起的噁心嘔吐（CINV）依機轉以多種止吐藥組合預防：5-HT3 受體拮抗劑（granisetron、ondansetron，阻斷腸道與 CTZ 的血清素訊號）、NK1 受體拮抗劑（aprepitant、fosaprepitant，阻斷 substance P，對延遲性嘔吐特別有效）、皮質類固醇（dexamethasone，機轉未完全明，與 5-HT3／NK1 併用增效）、必要時加 olanzapine 或多巴胺拮抗劑（metoclopramide）、苯二氮平類（針對預期性嘔吐）。高致吐性化療常用三聯（5-HT3＋NK1＋dexamethasone±olanzapine）。Epinephrine（腎上腺素）為擬交感神經藥，用於過敏性休克／心肺復甦，與止吐無關，故無法緩解 CINV。", "options": {"A": "正確（為無法止吐者）。epinephrine 為擬交感神經藥（過敏／急救用），非止吐藥。", "B": "granisetron 為 5-HT3 拮抗劑，標準止吐藥。", "C": "aprepitant 為 NK1 拮抗劑，對延遲性 CINV 特別有效。", "D": "dexamethasone 為止吐組合常用之類固醇。"}, "sources": "Harrison 21e（Chemotherapy-induced nausea and vomiting）；NCCN/ASCO Antiemesis Guidelines。"}}, "105-TNPA-通論-8": {"quick": "乳癌治療主要看腫瘤大小、組織型態、ER/PR（與 HER2）等；P53 基因表現非主要考量，故 (D)。", "detail": {"background": "乳癌治療屬「分子分型導向」的個別化醫療。決定治療的主要因素包括：(1) 解剖分期——腫瘤大小（T）、腋下淋巴結（N）、有無遠端轉移（M）；(2) 組織學型態與分化等級（grade）；(3) 荷爾蒙受體——雌激素受體（ER）與黃體素受體（PR）陽性者可用內分泌治療（tamoxifen、aromatase inhibitor）；(4) HER2 狀態——過度表現者用抗 HER2 標靶（trastuzumab）；(5) 增殖指標 Ki-67、以及基因表現檢測（如 Oncotype DX）評估化療效益。據此分為 Luminal A/B、HER2-enriched、三陰性等亞型給予不同治療。P53 突變雖與預後與三陰性乳癌相關，但「並非」臨床選擇治療的常規主要依據，故為答案。", "options": {"A": "腫瘤大小（T 分期）是決定手術與輔助治療的主要因素。", "B": "癌細胞種類（組織型態／分化）影響治療策略。", "C": "ER/PR 陽性與否決定是否使用內分泌治療，是核心考量。", "D": "正確（非主要考量）。P53 表現與預後相關，但非常規治療選擇的主要依據。"}, "sources": "Harrison 21e（Breast cancer; molecular subtypes and treatment）；NCCN Breast Cancer Guidelines。"}}, "105-TNPA-外科-63": {"quick": "放射線治療對「小體積、放射敏感」腫瘤效果好；對「體積大、惡性度低」者效果差，故敘述 (A) 錯。", "detail": {"background": "頭頸部癌（多為鱗狀上皮細胞癌，與菸酒、檳榔及 HPV 相關）治療採多模式：早期（I/II）可單用手術或放射治療（兩者治癒率相當，選擇依功能保留與部位）；晚期（III/IV）則合併手術＋放療，或同步化放療（cisplatin 為主）。放射治療的反應與「腫瘤體積」及「放射敏感度」相關：體積小、微小殘存病灶（microscopic disease）與放射敏感、高增殖（高惡性度）腫瘤對放療反應「好」；反之，「體積大且惡性度低（生長慢、乏氧核心多）」的腫瘤對放療反應「差」。故 (A)「放療對體積大、惡性度低的癌效果好」為錯誤。無法切除或已遠端轉移者以化學（全身性）治療為主。", "options": {"A": "錯誤（為答案）。放療對「小體積、放射敏感／高惡性度」效果好；體積大、惡性度低者反應差。", "B": "正確。早期手術或放療；晚期合併手術＋放療或加化療。", "C": "正確。無法切除或遠端轉移以化學治療為主。", "D": "正確。放療對微小體積病灶（microscopic disease）控制佳，常用於術後輔助。"}, "sources": "Harrison 21e（Head and neck cancer; principles of radiation oncology）。"}}, "105-TNPA-婦產科-70": {"quick": "Tamoxifen 標準療程為 5 年（部分延長至 10 年），非 2 年，故敘述 (A) 錯。", "detail": {"background": "Tamoxifen 為選擇性雌激素受體調節劑（SERM），對乳房組織為抗雌激素作用，用於 ER 陽性乳癌的內分泌（荷爾蒙）治療與高風險族群預防。標準輔助療程為「5 年」，多項試驗（ATLAS、aTTom）顯示延長至 10 年可進一步降低復發與死亡，故療程是 5–10 年而非 2 年。療效包括降低同側復發與「對側乳房新發乳癌」風險。副作用源於其組織選擇性：在乳房抗雌激素（治療效益）、但在子宮內膜呈「促雌激素」作用→增加子宮內膜增生與子宮內膜癌風險；另有靜脈血栓栓塞（DVT/PE）、肝功能異常、熱潮紅、白內障等。停經後病人也可選 aromatase inhibitor。", "options": {"A": "錯誤（為答案）。Tamoxifen 標準療程為 5 年，部分延長至 10 年，非 2 年。", "B": "正確。可降低對側乳房乳癌的發生率。", "C": "正確。副作用含深部靜脈栓塞、肝功能異常、熱潮紅。", "D": "正確。對子宮內膜為促雌激素作用，增加子宮內膜癌風險（需注意異常出血）。"}, "sources": "Harrison 21e（Endocrine therapy of breast cancer; SERM）；ATLAS/aTTom trials。"}}, "107-TNPA-通論-28": {"quick": "腰骶部輻射至髖部疼痛合併泌尿症狀，可能為前列腺癌「骨轉移」，故 (D) 正確。", "detail": {"background": "前列腺癌好發於老年男性，多起源於前列腺「周邊區（peripheral zone）」，故「早期常無症狀」；當出現排尿困難、頻尿等下泌尿道症狀時，多與良性前列腺肥大（BPH，源自移行區）有關，未必是癌。診斷工具：PSA（前列腺特異抗原）升高（>4 ng/mL 提高懷疑，但非確診，需切片病理確診；數值也受 BPH、發炎影響）；PAP（前列腺酸性磷酸酶）敏感度特異度差，已大致被 PSA 取代。前列腺癌最常「骨轉移（造骨性）」，造成腰骶、骨盆、髖部疼痛；若出現背痛輻射至髖、合併泌尿症狀，須警覺已轉移。故 (D) 正確。", "options": {"A": "錯。PSA 升高（且單位應為 ng/mL）只提高懷疑，確診需切片病理，非「高於 8 即確診」。", "B": "錯。PAP 敏感／特異度差，已被 PSA 取代，不用於確診。", "C": "錯。早期前列腺癌多「無症狀」（周邊區起源）；排尿症狀多與 BPH 有關。", "D": "正確。腰骶輻射至髖之骨痛合併泌尿症狀，可能已骨轉移。"}, "sources": "Harrison 21e（Prostate cancer; PSA, bone metastasis）。"}}, "107-TNPA-外科-50": {"quick": "局部 DCIS 不一定「必須」合併放療（低風險者可省略），故敘述 (C) 被列為錯誤（過度絕對）。", "detail": {"background": "乳管原位癌（DCIS）是侷限於乳管內、未穿破基底膜的「第 0 期」非侵犯性癌。治療原則：(1) 病灶廣泛或多中心 → 患側全乳房切除；(2) 局部侷限 → 乳房保留手術（BCS），術後多「加上」放射治療以降低局部復發；(3) ER 陽性者 → tamoxifen 等內分泌治療降低復發；(4) 因屬非侵犯性，「不需」輔助化療，腋下亦不需常規廓清（必要時前哨淋巴結）。本題官方答案為 (C)：其關鍵在「應（一律）合併放射治療」過於絕對——RTOG 9804 等研究顯示「低風險、小體積、低惡性度、邊緣足夠」的局部 DCIS，行 BCS 後「可省略放療」，故並非所有局部 DCIS 都「必須」加放療。臨床多數仍採 BCS＋RT，但「絕對化」敘述被判為不正確。", "options": {"A": "正確。ER 陽性 DCIS 可給予荷爾蒙治療（tamoxifen）降低復發。", "B": "正確。病灶分布廣泛／多中心應行患側全乳房切除。", "C": "錯誤（為答案）。局部 DCIS 不一定「必須」合併放療；低風險者可省略（RTOG 9804），「應合併」過於絕對。", "D": "正確。DCIS 為非侵犯性，不需輔助化療。"}, "sources": "Harrison 21e（Ductal carcinoma in situ）；RTOG 9804；NCCN Breast Cancer。"}}, "108a-TNPA-內科-32": {"quick": "人類乳突病毒（HPV）的檢驗與頭頸癌（口咽癌）治療選擇及預後密切相關，故 (D)。", "detail": {"background": "頭頸部鱗狀細胞癌的危險因子除菸、酒、檳榔外，「人類乳突病毒（HPV，尤其第 16 型）」在「口咽癌（oropharyngeal，扁桃腺、舌根）」扮演關鍵角色。HPV 相關（p16 陽性）口咽癌有獨特流行病學（較年輕、非吸菸者增加）與「明顯較佳的預後」與放化療反應，因此 AJCC 第 8 版將 HPV/p16 狀態納入口咽癌「獨立分期系統」，並影響治療強度（去強度治療 de-escalation 研究方興未艾）。故 HPV 的檢驗對頭頸癌的治療選擇與預後判斷有重要相關。HSV、VZV、HIV 與頭頸鱗癌的診斷分型／預後無此直接決定性關聯。", "options": {"A": "HSV 與頭頸鱗癌分型／預後無決定性關聯。", "B": "HIV 增加多種癌風險，但非頭頸鱗癌的分型／預後決定因子。", "C": "VZV 與頭頸鱗癌無關。", "D": "正確。HPV（p16）狀態決定口咽癌的分期、治療選擇與預後。"}, "sources": "Harrison 21e（Head and neck cancer; HPV-associated oropharyngeal carcinoma）；AJCC 8e。"}}, "108a-TNPA-外科-53": {"quick": "Trastuzumab（Herceptin）與 anthracycline 併用「會增加」心臟毒性，故敘述 (D) 錯。", "detail": {"background": "約 15–25% 乳癌有 HER2（human epidermal growth factor receptor 2）基因擴增／過度表現，屬侵襲性強、易復發的亞型。抗 HER2 標靶藥包括單株抗體 trastuzumab（Herceptin）、pertuzumab，小分子 TKI lapatinib、neratinib，及抗體藥物複合體 T-DM1/T-DXd，顯著改善 HER2 陽性乳癌預後。重要安全性：trastuzumab 具「心臟毒性」（左心室功能下降／心衰竭），多為可逆、與累積劑量較無關；但若「與 anthracycline（如 doxorubicin）同時併用」會「顯著增加」心臟毒性，故臨床上避免同時併用，改為序貫（先 anthracycline 再 trastuzumab）並監測 LVEF。故 (D)「同時使用不會增加心臟毒性」為錯誤。", "options": {"A": "正確。HER2 過度表現常導致乳癌復發、預後較差。", "B": "正確。trastuzumab 與 lapatinib 皆為抗 HER2 標靶藥。", "C": "正確。約 20–25% 乳癌有 HER2 過度表現。", "D": "錯誤（為答案）。trastuzumab 與 anthracycline 同時併用會增加心臟毒性，應避免併用、需監測 LVEF。"}, "sources": "Harrison 21e（HER2-targeted therapy; cardiotoxicity）。"}}, "110-進階-外科-35": {"quick": "睪丸生殖細胞瘤的腫瘤標記是 AFP、β-hCG、LDH，「不含 CEA」，故敘述 (D) 錯。", "detail": {"background": "睪丸腫瘤多為生殖細胞瘤（germ cell tumor，分精原細胞瘤 seminoma 與非精原 non-seminoma），好發年輕男性，最常見表現為「無痛性睪丸腫塊」。診斷與分期須整合：原發腫瘤病理、影像（後腹腔淋巴結與遠端）、以及「血清腫瘤標記」——AFP（α-fetoprotein，非精原如卵黃囊瘤、胚胎癌升高；純精原不升）、β-hCG（絨毛膜癌、部分精原升）、LDH（反映腫瘤量）。標記用於診斷、分期（S 分期）、治療反應監測與復發偵測。CEA 是「大腸癌等腺癌」的標記，「並非」睪丸生殖細胞瘤標記，故 (D) 錯誤。治療：高位（經腹股溝）根除性睪丸切除為初步，依分期加放療（精原）或含鉑化療（BEP）。", "options": {"A": "正確。分期須整合原發病理、影像淋巴結轉移與術後腫瘤標記（S 分期）。", "B": "正確。最常見症狀為無痛性睪丸腫塊。", "C": "正確。初期可行經高位（腹股溝）根除性睪丸切除。", "D": "錯誤（為答案）。睪丸生殖細胞瘤標記為 AFP、β-hCG、LDH，不含 CEA。"}, "sources": "Harrison 21e（Testicular germ cell tumors; tumor markers）。"}}, "111-進階-內科-19": {"quick": "多發性骨髓瘤以骨痛、貧血、腎損傷、高血鈣、反覆感染為主；「淋巴結腫大」非典型，故 (D) 錯。", "detail": {"background": "多發性骨髓瘤（MM）是骨髓中惡性「漿細胞（plasma cell）」單株增生並分泌單株免疫球蛋白（M protein）的血液惡性腫瘤，好發老年。典型表現以「CRAB」記憶：hyperCalcemia（高血鈣→多尿、便秘、意識改變）、Renal（腎損傷，輕鏈腎病、高血鈣、高尿酸）、Anemia（貧血→疲倦，骨髓被取代）、Bone（溶骨性病灶→骨痛、病理性骨折，X 光「穿鑿狀 punched-out」溶骨）。另因正常免疫球蛋白生成受抑、白血球功能異常→「反覆感染」（常見死因）。診斷靠血清／尿蛋白電泳、免疫固定、血清游離輕鏈、骨髓檢查與影像。淋巴結腫大「不是」MM 典型表現（那較屬淋巴瘤／白血病），故為答案。", "options": {"A": "正確。溶骨性病灶造成骨頭疼痛、病理性骨折（典型）。", "B": "正確。骨髓被漿細胞取代造成貧血。", "C": "正確。正常免疫球蛋白減少→反覆感染（常見死因）。", "D": "錯誤（為答案）。淋巴結腫大非 MM 典型（屬淋巴瘤／白血病表現）。"}, "sources": "Harrison 21e（Multiple myeloma; CRAB criteria）；IMWG diagnostic criteria。"}}, "111-通論-5分科-58": {"quick": "預防／監測 TLS 應追蹤尿酸、肌酐、鉀（與磷、鈣），ALT（肝功能）最不需要，故 (D)。", "detail": {"background": "本題為高腫瘤負荷急性骨髓性白血病（白血球 326.8 K、blast 98%）接受高劑量化療——是腫瘤溶解症候群（TLS）的極高風險族群。TLS 監測重點在「代謝四聯＋腎功能」：尿酸（uric acid，核酸分解產物，結晶致 AKI）、鉀（potassium，致命心律不整）、磷（phosphate）、鈣（calcium，低鈣）、以及肌酐（creatinine，反映腎功能與是否續發 AKI）。ALT（丙胺酸轉胺酶）反映「肝細胞」損傷，與 TLS 的代謝異常與腎損傷無直接關係，故為「最不需要」追蹤的項目。預防 TLS：積極水化、降尿酸（allopurinol／rasburicase），密切監測上述電解質與腎功能。", "options": {"A": "需要。尿酸是 TLS 核心監測（核酸分解、結晶致 AKI）。", "B": "需要。肌酐反映腎功能，TLS 易續發急性腎損傷。", "C": "需要。鉀離子升高最危險（心律不整），須密切監測。", "D": "正確（最不需要）。ALT 反映肝功能，與 TLS 代謝／腎損傷無直接關係。"}, "sources": "Harrison 21e（Tumor lysis syndrome; monitoring）；Cairo-Bishop criteria。"}}, "114-進階-婦產科-74": {"quick": "家族遺傳性乳癌卵巢癌＝gBRCA 突變；BRCA 突變卵巢癌優先用 platinum 與 PARP 抑制劑，故 (B) 234。", "detail": {"background": "本題描述「遺傳性乳癌卵巢癌症候群（HBOC）」：帶有生殖系（germline）BRCA1/BRCA2 突變者，乳癌與卵巢癌風險大增，常以「預防性雙側乳房切除＋輸卵管卵巢切除」降低風險——故家族基因為「②gBRCA」（非 MSH2，那屬 Lynch 症候群/錯配修復，主要與大腸／子宮內膜癌相關）。治療上，BRCA 突變腫瘤因同源重組修復（HR）缺陷，對「③含鉑藥物（platinum）」特別敏感；並可用「④PARP 抑制劑」（olaparib、niraparib）——利用「合成致死（synthetic lethality）」：PARP 抑制使單股斷裂無法修補，在 HR 缺陷（BRCA 突變）細胞中累積成雙股斷裂而死亡，是 BRCA 突變卵巢癌的優先標靶治療與維持治療。⑤tamoxifen 用於 ER+ 乳癌、⑥bevacizumab（抗血管新生）為輔助選項但非「因 BRCA」之優先。故答案為②③④＝(B)。", "options": {"A": "135＝含 MSH2（Lynch，非本題 HBOC）與 tamoxifen，不符。", "B": "正確。②gBRCA＋③platinum＋④PARP 抑制劑——HBOC 與 BRCA 突變卵巢癌優先治療。", "C": "145＝含 MSH2 與 tamoxifen，不符。", "D": "256＝含 tamoxifen、bevacizumab，非 BRCA 突變之優先標靶組合。"}, "sources": "Harrison 21e（Hereditary breast-ovarian cancer; BRCA, PARP inhibitors, synthetic lethality）；NCCN Genetic/Familial。"}}, "105-TNPA-外科-46": {"quick": "重型地中海貧血與鐮刀型血球貧血（功能性脾切除＋脾切除）OPSI 風險最大，故 (B)。", "detail": {"background": "脾臟是清除「莢膜細菌（encapsulated bacteria）」與被調理素（opsonin）標記病原的重要器官，並產生 IgM、properdin 等。脾切除後（或功能性無脾）對莢膜菌的清除大減，可發生「猛爆性脾切除後感染（OPSI）」——進展極快、死亡率高的敗血症。最主要病原是「莢膜的革蘭氏陽性菌」尤其肺炎鏈球菌（Streptococcus pneumoniae，最常見），其次 Haemophilus influenzae、Neisseria meningitidis，非 E. coli。風險「終身存在」（最高在術後 1–3 年，但非僅兩年）。風險最高族群為本身已有「功能性無脾」者，如重型地中海貧血、鐮刀型細胞貧血（脾臟反覆梗塞纖維化）再加上脾切除者。預防核心：脾切除前 ≥2 週接種肺炎鏈球菌、Hib、腦膜炎雙球菌疫苗，並衛教發燒即就醫、必要時備用抗生素。", "options": {"A": "錯。OPSI 風險「終身」存在（最高在頭 1–3 年），非僅兩年內。", "B": "正確。重型地中海貧血、鐮刀型細胞貧血（功能性無脾）再脾切除者風險最大。", "C": "錯。主因是莢膜「革蘭氏陽性」肺炎鏈球菌，非革蘭氏陰性 E. coli。", "D": "錯。機轉為脾臟無法過濾被調理素標記的莢膜菌、且抗體（IgM）生成下降，非「巨噬細胞無法作用」此一描述。"}, "sources": "Harrison 21e（Hyposplenism; OPSI; vaccination of asplenic patients）。"}}, "107-TNPA-通論-57": {"quick": "此為大球性貧血（MCV 112），先以網狀紅血球生成指數分類造血反應，故 (A)。", "detail": {"background": "貧血診斷的第一步是依 MCV 分類（小球<80、正球 80–100、大球>100），第二步是看「網狀紅血球生成指數（reticulocyte production index, RPI）」判斷骨髓反應——RPI 高（>2–3）代表骨髓代償良好（失血／溶血等「破壞或流失型」），RPI 低代表「生成不足型」（營養缺乏、骨髓問題、慢性病、腎性）。本例 MCV 112 fL 為大球性貧血，下一步用 RPI 區分是「大球＋低網狀球（生成不足，如 B12／葉酸缺乏、骨髓異常）」或「大球＋高網狀球（溶血／急性出血後的網狀球大量釋出）」，據此再選後續檢查方向，故 RPI 對「確認貧血原因」最有幫助、為最佳初步分流。血鐵相關用於小球性、Coombs 用於免疫溶血、血紅素電泳用於地中海貧血或血紅素病，皆為「特定方向」的後續檢查。", "options": {"A": "正確。RPI 是貧血分類的關鍵初步分流（生成不足 vs 破壞／流失），最有助確認方向。", "B": "血鐵相關試驗用於「小球性」貧血鑑別，本例為大球性，非首要。", "C": "Coombs 試驗針對「免疫性溶血」，需先有溶血線索才做。", "D": "血紅素電泳針對地中海貧血／血紅素病（多為小球性），非本例首選。"}, "sources": "Harrison 21e（Approach to the anemias; reticulocyte production index）。"}}, "108a-TNPA-內科-14": {"quick": "維生素 B12 在迴腸末端吸收，克隆氏症（Crohn’s）侵犯迴腸最易致 B12 缺乏，故 (B)。", "detail": {"background": "維生素 B12（cobalamin）需與胃壁細胞分泌的「內在因子（intrinsic factor）」結合，於「迴腸末端（terminal ileum）」吸收。任何影響此路徑者都會致 B12 缺乏：胃部疾病／胃切除（內在因子不足、惡性貧血的自體免疫胃炎）、迴腸疾病或切除。克隆氏症（Crohn’s disease）是好發於「迴腸末端」的慢性發炎性腸病，破壞 B12 吸收部位，最易造成 B12 缺乏（也常合併其他吸收不良）。B12 缺乏造成大球性（巨胚紅血球）貧血與神經學症狀（亞急性合併退化）。胰臟癌主要影響脂肪／蛋白消化；糖尿病、慢性腎病非典型 B12 吸收障礙原因。", "options": {"A": "胰臟癌影響外分泌消化（脂肪／蛋白），非 B12 吸收部位。", "B": "正確。克隆氏症侵犯迴腸末端（B12 吸收處），最易致 B12 缺乏。", "C": "糖尿病非 B12 吸收障礙的典型原因（長期 metformin 可輕度影響，但非最相關）。", "D": "慢性腎病造成腎性貧血（EPO 不足），非 B12 吸收障礙。"}, "sources": "Harrison 21e（Vitamin B12 deficiency; ileal absorption）。"}}, "108b-TNPA-內科-18": {"quick": "大腸直腸癌慢性腸道失血→缺鐵性貧血，故 (B)。", "detail": {"background": "大腸直腸癌（尤其右側結腸癌）常因腫瘤表面慢性、少量、不易察覺的「腸道出血」導致鐵質長期流失，造成「缺鐵性貧血（IDA）」——典型為小球低色素（MCV、MCH 低）、ferritin 低、血清鐵低、TIBC 高。臨床上「中老年人新發現的缺鐵性貧血」必須排除胃腸道惡性腫瘤，應安排上下消化道內視鏡。其餘選項機轉不符：再生不良性貧血為骨髓衰竭、葉酸／B12 缺乏為大球性營養性貧血，皆非 CRC 慢性失血的結果。故與大腸直腸癌最相關的是缺鐵性貧血。", "options": {"A": "再生不良性貧血為骨髓衰竭，與 CRC 失血無關。", "B": "正確。CRC 慢性腸道失血→鐵流失→缺鐵性貧血（IDA）。", "C": "葉酸缺乏為大球性營養性貧血，非失血機轉。", "D": "B12 缺乏為大球性貧血，非 CRC 失血所致。"}, "sources": "Harrison 21e（Iron deficiency anemia; GI blood loss workup）。"}}, "108a-TNPA-內科-31": {"quick": "缺乏葉酸為大球性貧血，故 (D) 正確。", "detail": {"background": "貧血依 MCV 與網狀球反應分類：小球性（<80）常見缺鐵、地中海貧血、慢性病；大球性（>100）常見 B12／葉酸缺乏（巨胚紅血球性）、酒精、肝病、甲狀腺低下、骨髓異常。網狀紅血球生成指數（RPI）>2–3 代表骨髓「代償良好」（失血／溶血），而非造血異常；造血功能異常者 RPI 反而低。急性出血「初期」因血漿與紅血球等比例流失，Hb／Hct 數值「未必立刻下降」，需數小時至補液後才反映，故急性出血時不能單以 Hb 評估失血量（要看生命徵象）。葉酸缺乏屬大球性貧血，故 (D) 正確。", "options": {"A": "錯。缺鐵性貧血是「小球性」（microcytic），非大球性。", "B": "錯。RPI>2 代表骨髓代償良好（溶血／失血），非造血功能異常。", "C": "錯。急性出血初期 Hb 未必立即下降，不能有效評估血容量（看生命徵象）。", "D": "正確。葉酸缺乏為大球性（巨胚紅血球性）貧血。"}, "sources": "Harrison 21e（Megaloblastic anemia; classification of anemia）。"}}, "109-進階-內科-27": {"quick": "溶血時 haptoglobin「下降」（被游離血紅素消耗），故 (A) 最不可能升高。", "detail": {"background": "溶血性貧血是紅血球破壞加速。實驗室特徵：(1) 紅血球破壞釋出血紅素，與 haptoglobin 結合並被清除→血中「haptoglobin 下降」（血管內溶血尤其明顯）；(2) 血紅素代謝→「間接膽紅素上升」（黃疸）、LDH 上升；(3) 骨髓代償增生→「網狀紅血球上升」；(4) 血液抹片可見破壞型紅血球——遺傳性球形紅血球症的 microspherocytes、機械性／微血管病變溶血的 schistocytes（裂片紅血球）。故「haptoglobin 升高」與溶血相反，為最不可能（答案 A）。若需鑑別免疫性溶血可加做 Coombs 試驗。", "options": {"A": "正確（最不可能）。溶血消耗 haptoglobin，使其「下降」而非升高。", "B": "符合。間接膽紅素上升（血紅素分解）。", "C": "符合。骨髓代償使網狀紅血球上升。", "D": "符合。抹片可見 microspherocytes（球形）或 schistocytes（裂片）。"}, "sources": "Harrison 21e（Hemolytic anemias; laboratory features）。"}}, "109-通論-其他-35": {"quick": "高 RBC 數（6.0 M）＋小球（MCV 70）＋輕度貧血，地中海貧血特徵明顯；但月經失血致缺鐵亦可能，故缺鐵性貧血與地中海貧血皆給分（A、B）。", "detail": {"background": "本題為小球性貧血鑑別的經典：年輕女性、RBC 高達 600 萬/µL（6.0 M）、Hb 11（僅輕度貧血）、MCV 70（小球）、Hct 34。兩大鑑別為缺鐵性貧血（IDA）與地中海貧血特徵（thalassemia trait）。關鍵線索：地中海貧血特徵者「紅血球數目偏高、貧血程度與小球不成比例（小球明顯但 Hb 僅輕降）」，且 Mentzer 指數＝MCV/RBC＝70/6≈11.7（<13 傾向地中海貧血；>13 傾向缺鐵）。本例 RBC 高、Mentzer<13，較支持地中海貧血。但病人「生理期剛結束＋飲酒」也提供失血／營養因素，缺鐵性貧血無法排除。因兩者皆有合理依據，官方判定 (A)、(B) 均給分。臨床確診需 ferritin（缺鐵低、地中海正常或高）與血紅素電泳（HbA2 上升支持 β-thalassemia trait）。", "options": {"A": "給分。月經失血可致缺鐵性貧血（小球性）；需 ferritin 確認。", "B": "給分。RBC 高、Mentzer<13、Hb 僅輕降，強烈傾向地中海貧血特徵；需電泳確認。", "C": "葉酸缺乏為「大球性」，與本例小球（MCV70）不符。", "D": "再生不良性貧血為全血球減少、骨髓衰竭，與單純小球性不符。"}, "sources": "Harrison 21e（Microcytic anemias; Mentzer index, thalassemia trait vs IDA）。"}}, "110-進階-內科-44": {"quick": "75 歲、體重下降、缺鐵性貧血（MCV60、ferritin10）＋CEA 60，疑大腸癌失血，優先上下消化道內視鏡，故 (B)。", "detail": {"background": "本題為「老年新發缺鐵性貧血＋腫瘤指標 CEA 顯著升高」的典型胃腸道惡性腫瘤情境。缺鐵性貧血指標齊全：MCV 60（小球）、ferritin 10 ng/mL（低，確診缺鐵）、血清鐵低、結膜蒼白。加上三個月體重下降、腹脹與 CEA 60 ng/mL（大腸／胃腸腺癌常見升高），高度懷疑胃腸道癌慢性失血。最有診斷價值且可同時切片／止血的是「上下消化道內視鏡」（胃鏡＋大腸鏡），可直接找出出血源並取得病理。腹部 X 光、超音波對黏膜病灶與早期腫瘤敏感度低；骨髓穿刺用於懷疑骨髓疾病（本例缺鐵原因明確為失血，非骨髓問題），非首選。", "options": {"A": "腹部 X 光對黏膜腫瘤、消化道出血源敏感度低。", "B": "正確。老年缺鐵性貧血＋CEA 升高，優先上下消化道內視鏡找出血／腫瘤並切片。", "C": "腹部超音波對腸道黏膜病灶敏感度低。", "D": "骨髓穿刺用於骨髓疾病；本例缺鐵原因明確（失血），非首選。"}, "sources": "Harrison 21e（Iron deficiency anemia workup; GI malignancy）。"}}, "111-進階-內科-74": {"quick": "缺鐵性貧血的總鐵結合力（TIBC）「升高」，故敘述 (D) 錯。", "detail": {"background": "缺鐵性貧血（IDA）的鐵代謝指標是高頻考點：因身體缺鐵，(1) 儲存鐵指標「ferritin 下降」（最敏感、最早）；(2) 血清鐵下降；(3) 身體代償增加運鐵蛋白（transferrin），故「總鐵結合力 TIBC 升高」、transferrin saturation 下降；(4) 紅血球為小球低色素（MCV、MCH 低）；(5) 因缺鐵造血受限，網狀紅血球（reticulocyte）低、補鐵後才上升。故 (D)「TIBC 降低」為錯誤（IDA 是 TIBC 升高）。對照慢性病貧血（ACD）：ferritin 正常或高、TIBC 低、鐵低——與 IDA 區分關鍵在 ferritin 與 TIBC 方向。", "options": {"A": "正確。IDA 屬小球性貧血（MCV<80）。", "B": "正確。缺鐵使造血受限，網狀紅血球降低（補鐵後回升）。", "C": "正確。ferritin 下降（最敏感的缺鐵指標）。", "D": "錯誤（為答案）。IDA 的 TIBC「升高」（運鐵蛋白代償增加），非降低。"}, "sources": "Harrison 21e（Iron deficiency anemia; iron studies）。"}}, "112-進階-內科-17": {"quick": "缺鐵性貧血特徵為 ferritin 下降，故 (D) 正確。", "detail": {"background": "承前題，缺鐵性貧血（IDA）的正確檢驗特徵：ferritin 下降（D，最敏感）、血清鐵下降、TIBC 升高、transferrin saturation 下降、MCV 與 MCH 下降（小球低色素）、網狀紅血球降低。錯誤敘述：(A) 網狀紅血球指數在 IDA 是「降低」非升高（造血原料不足）；(B) MCV 在 IDA 是「低於」正常（小球），非升高；(C) TIBC 在 IDA 是「升高」非降低。記憶口訣——「鐵低、ferritin 低、MCV 低、網狀球低，但 TIBC 高」。", "options": {"A": "錯。IDA 網狀紅血球指數降低（造血原料不足）。", "B": "錯。IDA 的 MCV 低於正常（小球性）。", "C": "錯。IDA 的 TIBC「升高」。", "D": "正確。ferritin 下降是 IDA 最具特徵、最敏感的指標。"}, "sources": "Harrison 21e（Iron deficiency anemia; iron studies）。"}}, "112-進階-內科-20": {"quick": "大球性（MCV 118）＋網狀球低（0.5%）＋輕度全血球減少＝維生素 B12 缺乏，故 (A)。", "detail": {"background": "本例 Hb 8.1（中度貧血）、MCV 118（明顯大球）、reticulocyte 0.5%（偏低，生成不足）、WBC 3750 與 platelet 115000（輕度全血球減少）——是「巨胚紅血球性貧血（megaloblastic anemia）」的典型，常見於維生素 B12 或葉酸缺乏。B12／葉酸缺乏導致 DNA 合成障礙→「無效造血（ineffective hematopoiesis）」，故紅血球大、網狀球反而低，並可累及白血球與血小板（輕度全血球減少）與抹片見過分葉嗜中性球。對照：缺鐵與地中海貧血為「小球」、自體免疫溶血為「網狀球升高、Coombs 陽性」。故最可能為 B12 缺乏。B12 缺乏還可有神經學症狀（與葉酸缺乏的鑑別點）。", "options": {"A": "正確。大球＋網狀球低＋輕度全血球減少＝B12 缺乏（巨胚紅血球性、無效造血）。", "B": "缺鐵性貧血為小球（MCV 低），不符。", "C": "地中海貧血為小球，不符。", "D": "自體免疫溶血為網狀球「升高」、Coombs 陽性，不符。"}, "sources": "Harrison 21e（Megaloblastic anemia; B12 deficiency）。"}}, "113-進階-家庭-2": {"quick": "缺鐵性貧血的總鐵結合力（TIBC）「升高」，故敘述 (D) 錯。", "detail": {"background": "同 IDA 鐵代謝考點：缺鐵性貧血常見檢驗為 ferritin 低（A 正確）、血清鐵濃度低（B 正確）、網狀紅血球計數低（C 正確，造血原料不足）、而「TIBC 升高」。故 (D)「TIBC 降低」為錯誤敘述。臨床上以 ferritin 最敏感（<15–30 ng/mL 即可診斷缺鐵），並與慢性病貧血（ferritin 正常／高、TIBC 低）鑑別。治療為口服或靜脈補鐵並「找出失血或吸收障礙的原因」（老年人務必排除胃腸道腫瘤）。", "options": {"A": "正確。ferritin 降低。", "B": "正確。血清鐵濃度降低。", "C": "正確。網狀紅血球計數降低（造血原料不足）。", "D": "錯誤（為答案）。IDA 的 TIBC「升高」，非降低。"}, "sources": "Harrison 21e（Iron deficiency anemia; iron studies）。"}}, "113-進階-家庭-33": {"quick": "再生不良性貧血為骨髓破壞／功能受抑制所致，故 (C)。", "detail": {"background": "依機轉，貧血可分為：(1) 生成減少——骨髓問題（再生不良性貧血、骨髓被腫瘤取代、純紅血球再生不良）、營養缺乏（鐵、B12、葉酸）、腎性（EPO 不足）、慢性病；(2) 破壞增加——溶血（遺傳性球形紅血球症、G6PD、自體免疫、地中海貧血、鐮狀細胞）；(3) 流失——出血。「再生不良性貧血（aplastic anemia）」是骨髓造血幹細胞受破壞／抑制（自體免疫、藥物、輻射、病毒）導致「全血球減少（pancytopenia）」與骨髓低細胞性，正屬「骨髓破壞或功能受抑」之代表。海洋性貧血與鐮狀細胞屬遺傳性溶血（破壞增加）、缺鐵屬營養缺乏，皆非骨髓衰竭機轉。", "options": {"A": "海洋性貧血（thalassemia）為遺傳性血紅素合成異常→無效造血／溶血，非骨髓衰竭。", "B": "鐮狀細胞貧血為遺傳性溶血（紅血球破壞增加）。", "C": "正確。再生不良性貧血為骨髓造血功能受破壞／抑制（全血球減少）。", "D": "缺鐵性貧血為造血原料不足（營養性），非骨髓破壞。"}, "sources": "Harrison 21e（Aplastic anemia; bone marrow failure）。"}}, "113-進階-內科-62": {"quick": "大球性（MCV 110）＋網狀球偏少＝維生素 B12 缺乏，故 (B)。", "detail": {"background": "本例 Hb 8（貧血）、MCV 110（大球）、網狀紅血球偏少（生成不足）——是巨胚紅血球性貧血型態，最可能為維生素 B12（或葉酸）缺乏。機轉為 DNA 合成障礙導致無效造血、紅血球體積大但生成不足（網狀球低）。鑑別：缺鐵性與地中海貧血皆為「小球」（與本例大球矛盾）；慢性腎病貧血多為「正球正色素」（EPO 不足），亦非大球。B12 缺乏者除大球性貧血外可有神經學症狀（亞急性合併退化、感覺異常），葉酸缺乏則無神經症狀——臨床上同時測 B12 與葉酸並找病因（吸收不良、胃／迴腸疾病、素食、藥物）。", "options": {"A": "缺鐵性貧血為小球（MCV 低），與大球矛盾。", "B": "正確。大球＋網狀球低＝B12（或葉酸）缺乏的巨胚紅血球性貧血。", "C": "地中海型貧血為小球性。", "D": "慢性腎病貧血多為正球正色素（EPO 不足）。"}, "sources": "Harrison 21e（Megaloblastic anemia）。"}}, "114-進階-家庭-41": {"quick": "B12 缺乏為「大球性」貧血，出現「小細胞性貧血」最不可能，故 (D)。", "detail": {"background": "本例 78 歲、次全胃切除（內在因子分泌減少）＋素食（B12 攝取不足）＋神經症狀（平衡差、認知下降）——典型維生素 B12 缺乏，因胃切除減少內在因子使迴腸吸收 B12 受阻，加上飲食不足。B12 缺乏臨床表現：(1) 巨胚紅血球性「大球性貧血」（MCV 高）；(2) 神經學「亞急性合併退化（subacute combined degeneration）」——感覺異常（paresthesias）、本體感覺與平衡障礙、認知改變甚至失智；(3) 黏膜表現如萎縮性舌炎（atrophic glossitis）；(4) 因無效造血亦可有輕度白血球與血小板減少。故「小細胞性（microcytic）貧血」與 B12 缺乏的「大球性」矛盾，為最不可能（答案 D）。", "options": {"A": "可能。感覺異常為 B12 缺乏神經學表現（亞急性合併退化）。", "B": "可能。萎縮性舌炎為 B12 缺乏黏膜表現。", "C": "可能。無效造血可致輕度血小板減少。", "D": "正確（最不可能）。B12 缺乏為「大球性」貧血，不會是小細胞性。"}, "sources": "Harrison 21e（Vitamin B12 deficiency; subacute combined degeneration）。"}}, "114-進階-內科-74": {"quick": "慢性血管內溶血＋血紅素尿＋感染後惡化＋Coombs 陰性＝陣發性夜間血紅素尿症（PNH），故 (D)。", "detail": {"background": "本例為「Coombs 陰性的慢性血管內溶血」：血紅素尿、深色尿、LDH 顯著升高、haptoglobin 幾乎測不到（血管內溶血），且「感染／壓力後惡化」、Coombs（直接抗球蛋白）陰性——典型為陣發性夜間血紅素尿症（PNH）。PNH 是後天獲得的造血幹細胞 PIGA 基因突變，使紅血球膜缺乏 GPI 錨定的補體調節蛋白（CD55、CD59），紅血球對補體攻擊敏感而發生「補體媒介的血管內溶血」，感染／發炎活化補體時惡化；可合併血栓（特殊部位如肝靜脈）與骨髓衰竭。診斷以流式細胞儀檢測 CD55/CD59 缺失（FLAER）。治療用補體抑制劑（eculizumab/ravulizumab）。Coombs 陰性正可排除自體免疫溶血（AIHA）。", "options": {"A": "自體免疫溶血性貧血為 Coombs「陽性」，與本例 Coombs 陰性不符。", "B": "藥物性溶血多有用藥史，且型態不符；本例特徵指向補體媒介溶血。", "C": "遺傳性球形紅血球症為 Coombs 陰性的血管「外」溶血，無明顯血紅素尿、抹片見球形紅血球。", "D": "正確。Coombs 陰性、血管內溶血、血紅素尿、感染後惡化＝PNH（CD55/CD59 缺失）。"}, "sources": "Harrison 21e（Paroxysmal nocturnal hemoglobinuria; complement-mediated hemolysis）。"}}, "106-106a-內科-10": {"quick": "Warfarin 以 INR 監測，靜脈血栓栓塞治療目標 INR 約 2.0–3.0（即 2.5），故 (D)。", "detail": {"background": "Warfarin（華法林）是維生素 K 拮抗劑，抑制維生素 K 依賴凝血因子（II、VII、IX、X）合成，用於肺栓塞／深部靜脈栓塞、心房顫動、機械瓣膜等。其療效以「凝血酶原時間（PT）」換算的「INR（國際標準化比值）」監測——標準化不同試劑的差異。對多數適應症（VTE、AF）目標 INR 為「2.0–3.0」（中間值 2.5）；機械瓣膜等高風險者目標較高（2.5–3.5）。aPTT 是監測「未分段肝素（UFH）」的指標，不用於 warfarin。故肺栓塞使用 warfarin 的治療標的為 INR≈2.5。INR<2 抗凝不足、>3 出血風險增。", "options": {"A": "aPTT 用於監測未分段肝素，非 warfarin；且 1.5 倍偏低。", "B": "aPTT 2.5 倍亦為肝素監測範疇，非 warfarin 指標。", "C": "INR 1.5 抗凝不足（未達 VTE 治療目標）。", "D": "正確。warfarin 治療 VTE 目標 INR 約 2.0–3.0（中間 2.5）。"}, "sources": "Harrison 21e（Anticoagulants; warfarin monitoring INR）；CHEST VTE Guidelines。"}}, "108a-TNPA-內科-26": {"quick": "長期服用 warfarin 出現出血，應先看凝血酶原時間（PT/INR）評估抗凝程度，故 (B)。", "detail": {"background": "Warfarin 使用中出現出血（如牙齦出血）時，首要是評估「抗凝是否過度」——以 PT 換算的 INR 為直接監測指標。INR 過高代表抗凝過度、出血風險增，需依程度處置（暫停、給維生素 K、嚴重時 PCC/FFP 逆轉）。本例僅輕微牙齦出血、已止血、無廣泛瘀斑出血點，最先要取得的是「PT（INR）」以判斷 warfarin 是否過量。CBC、Hb/Hct 評估的是「失血程度／貧血」（在大量出血時重要），第七凝血因子並非常規床邊監測項目。故先驗 PT/INR。", "options": {"A": "CBC 評估整體血球，非評估 warfarin 抗凝程度的首選。", "B": "正確。PT（INR）直接反映 warfarin 抗凝程度，出血時應先取得。", "C": "Hb/Hct 評估失血／貧血程度，於大量出血時才是重點。", "D": "第七凝血因子非常規床邊監測項目。"}, "sources": "Harrison 21e（Warfarin; management of bleeding）。"}}, "109-通論-其他-44": {"quick": "aPTT 檢查內在＋共同路徑，用於監控肝素治療，故 (C) 正確。", "detail": {"background": "凝血檢驗兩大指標：PT（prothrombin time）反映「外在＋共同路徑」（因子 VII、X、V、II、纖維蛋白原），用於監測 warfarin（以 INR）。aPTT（活化部分凝血活酶時間）反映「內在＋共同路徑」（因子 XII、XI、IX、VIII、X、V、II），用於監測「未分段肝素（UFH）」的療效。血小板「數目」由 CBC 測、血小板「功能」由其他檢驗（如出血時間、血小板功能分析），非 aPTT。瀰漫性血管內凝血（DIC）因凝血因子被大量消耗，PT 與 aPTT 皆「延長（上升）」而非下降。故 (C) 正確。", "options": {"A": "錯。血小板數目與功能不由 aPTT 評估。", "B": "錯。檢查外在＋共同路徑的是 PT，非 aPTT。", "C": "正確。aPTT 反映內在＋共同路徑，用於監控未分段肝素治療。", "D": "錯。DIC 時 aPTT 延長（凝血因子被消耗），非下降。"}, "sources": "Harrison 21e（Coagulation tests; aPTT, heparin monitoring）。"}}, "110-通論-其他-74": {"quick": "PT 檢查外在＋共同路徑（用於 warfarin），故 (B) 正確。", "detail": {"background": "PT（凝血酶原時間）反映「外在路徑＋共同路徑」（因子 VII、X、V、II、纖維蛋白原），以 INR 標準化後用於監測 warfarin。它對因子 VII（半衰期最短）最敏感，故 warfarin 初期 PT/INR 先上升。血小板數目／功能不由 PT 評估（A 錯）；監控「肝素」療效的是 aPTT 而非 PT（C 錯）；DIC 時凝血因子被大量消耗，PT「延長（上升）」非下降（D 錯）。記憶：PT→外在＋共同→warfarin／INR；aPTT→內在＋共同→heparin。", "options": {"A": "錯。血小板數目／功能不由 PT 評估。", "B": "正確。PT 反映外在＋共同路徑（並用於 warfarin/INR 監測）。", "C": "錯。監控肝素療效用 aPTT，非 PT。", "D": "錯。DIC 時 PT 延長（因子被消耗），非下降。"}, "sources": "Harrison 21e（Coagulation tests; PT/INR）。"}}, "110-進階-內科-74": {"quick": "新冠疫苗後出現極度血小板低下（5000）＋頭痛＋瘀斑＋D-dimer 升高＝疫苗誘發之血小板低下（VITT），故 (C)。", "detail": {"background": "本例疫苗注射 1 天後出現劇烈頭痛、下肢瘀斑紫斑、血小板由 25 萬驟降至 5000、D-dimer 顯著升高——是「疫苗誘發之免疫性血栓性血小板低下（VITT，vaccine-induced immune thrombotic thrombocytopenia）」的典型，與腺病毒載體 COVID 疫苗相關。機轉類似肝素誘發血小板低下（HIT）：產生對抗血小板第四因子（anti-PF4）的抗體，活化血小板與凝血→「血栓（常見不尋常部位如腦靜脈竇）＋血小板被消耗而低下＋D-dimer 升高」。劇烈頭痛須警覺腦靜脈竇血栓。治療要點：給予非肝素類抗凝、靜脈免疫球蛋白（IVIG），「避免」血小板輸注與肝素。雖檢驗（血小板低、D-dimer 高）與 DIC 部分重疊，但時序與疫苗明確相關、無敗血／創傷等 DIC 誘因，故指向 VITT；本題選項 (C)「疫苗施打後引發之血小板低下」為答案。", "options": {"A": "DIC 通常有敗血、創傷、產科等誘因且 PT/aPTT 延長；本例為疫苗相關免疫機轉。", "B": "紅斑性狼瘡可致血小板低下，但與「疫苗後急性發作＋血栓傾向」時序不符。", "C": "正確。COVID 疫苗後免疫性血小板低下／血栓（VITT，anti-PF4），需非肝素抗凝＋IVIG。", "D": "「類似 C 肝病毒引起」之描述無依據，非本例機轉。"}, "sources": "Greinacher A et al. NEJM 2021（VITT）；Harrison 21e（immune thrombocytopenia/HIT-like）。"}}, "111-進階-內科-64": {"quick": "服用 warfarin＋突發劇烈頭痛＋單側瞳孔放大＝疑顱內出血，最優先非顯影腦部電腦斷層，故 (B)。", "detail": {"background": "本例正在使用 warfarin（抗凝中）、突發「從未經歷過的劇烈頭痛（thunderclap）」、意識略降（GCS E3V5M6＝14）、左側瞳孔放大（提示同側腦疝／動眼神經受壓）——高度懷疑「顱內出血（抗凝相關腦出血或蛛網膜下腔出血）」，屬神經急症。最優先且快速的檢查是「非顯影腦部電腦斷層（non-contrast brain CT）」——對急性出血敏感、快速、可立即判斷是否出血與是否需逆轉抗凝／神經外科介入。腰椎穿刺在懷疑 SAH 而 CT 陰性時才考慮，且在意識下降／瞳孔不等／抗凝中屬禁忌（腦疝風險）。PET、EEG 對急性出血無診斷價值。確認出血後應立即逆轉 warfarin（維生素 K＋PCC）。", "options": {"A": "腦 PET 為代謝影像，對急性出血無診斷價值且耗時。", "B": "正確。非顯影腦 CT 為急性顱內出血最優先、快速的檢查。", "C": "腰椎穿刺在意識下降、瞳孔不等、抗凝中屬禁忌（腦疝風險）。", "D": "EEG 用於癲癇評估，與急性出血無關。"}, "sources": "Harrison 21e（Intracranial hemorrhage; anticoagulant-associated bleeding）。"}}, "112-進階-外科-79": {"quick": "術後可每 12 小時皮下注射肝素 5000 單位預防 VTE，故 (A) 正確。", "detail": {"background": "住院與術後病人是靜脈血栓栓塞（VTE）高風險族群，預防分藥物與機械。藥物預防：低劑量未分段肝素（UFH）5000 單位皮下注射，每 8–12 小時一次（A 正確）；或低分子量肝素（LMWH，如 enoxaparin）每日皮下。LMWH 主要「經腎排除」，嚴重腎功能障礙者會「蓄積、增加出血」，需減量或改用 UFH 並監測抗 Xa，故「腎功能障礙者亦可照常使用」不正確（B 錯）。LMWH 在多數情境效果不劣於、使用更方便、HIT 風險較低，並非 UFH 優於 LMWH（C 錯）。間歇式充氣加壓（IPC）是「預防」工具（用於出血風險高不宜抗凝者）；對「已形成」的急性 DVT 不以機械加壓「改善循環」為治療，治療是抗凝（D 錯）。", "options": {"A": "正確。術後 UFH 5000 單位皮下每 8–12 小時為標準 VTE 藥物預防。", "B": "錯。LMWH（enoxaparin）經腎排除，腎功能障礙者會蓄積出血，需減量／監測或改 UFH。", "C": "錯。LMWH 效果不劣於 UFH 且更方便、HIT 較少，非 UFH 優於 LMWH。", "D": "錯。間歇加壓為「預防」措施；已形成之 DVT 以抗凝治療為主。"}, "sources": "CHEST VTE Prophylaxis Guidelines；Harrison 21e（VTE prevention）。"}}, "113-進階-內科-6": {"quick": "有血小板低下＋慢性胃炎者退燒應選 acetaminophen（不影響血小板、不傷胃），故 (B)。", "detail": {"background": "退燒止痛藥的選擇須考量病人共病。本例「血小板低下＋慢性胃炎」者，應避免會抑制血小板功能與傷害胃黏膜的藥物。Aspirin 不可逆抑制環氧化酶（COX-1）使血小板功能下降（抗血小板作用持續整個血小板壽命約 7–10 天），且傷胃、有雷氏症候群風險；ibuprofen、naproxen 等 NSAIDs 可逆抑制血小板並刺激胃黏膜、增加出血。Acetaminophen（普拿疼）主要中樞作用退燒止痛，「不影響血小板功能、不傷胃黏膜」，是血小板低下或胃病病人的較安全選擇（注意肝功能與每日上限）。故選 (B)。", "options": {"A": "aspirin 不可逆抑制血小板、傷胃、有雷氏症候群風險，不適合。", "B": "正確。acetaminophen 不影響血小板、不傷胃，為此病人較安全的退燒藥。", "C": "ibuprofen 為 NSAID，抑制血小板並刺激胃黏膜，不適合。", "D": "naproxen 為 NSAID，同樣不適合血小板低下／胃炎者。"}, "sources": "Harrison 21e（Antipyretics; NSAID and platelet effects）。"}}, "113-進階-外科-67": {"quick": "Warfarin 一般於手術前 5 天停藥（待 INR 回復），故 (B) 正確。", "detail": {"background": "術前抗凝／降血糖藥的停藥時機是周術期管理重點。Warfarin 半衰期長、作用久，一般「手術前約 5 天停藥」使 INR 回到接近正常（<1.5），高血栓風險者再以肝素「橋接（bridging）」。直接口服抗凝劑（DOAC，如 rivaroxaban）半衰期短，依出血風險與腎功能多在「術前 1–2 天（24–48 小時）」停藥，而非手術當天才停（C 錯）。降血糖藥：sulfonylurea（磺醯尿素）因低血糖風險，多於「手術當天（早上）」停用，而非提前 3 天（A 錯）；DPP-4 抑制劑低血糖風險低，多可持續至手術當天或短暫暫停，不需提前 7 天（D 錯）。故正確為 (B) warfarin 術前 5 天停藥。", "options": {"A": "錯。sulfonylurea 多於手術「當天」停（低血糖風險），非前 3 天。", "B": "正確。warfarin 一般術前 5 天停藥（待 INR 回復，高風險者橋接）。", "C": "錯。rivaroxaban（DOAC）多於術前 1–2 天停，非手術當天才停。", "D": "錯。DPP-4 抑制劑低血糖風險低，不需提前 7 天停。"}, "sources": "CHEST Perioperative Anticoagulation Guidelines；Harrison 21e。"}}, "113-進階-內科-75": {"quick": "病毒感染後血小板 21000＋出血＝免疫性血小板低下（ITP），初步處置首選皮質類固醇，故 (C)。", "detail": {"background": "本例感染後出現「孤立性嚴重血小板低下（21000）」合併黏膜出血（流鼻血、口腔出血），最可能為免疫性血小板低下紫斑症（ITP）——自體抗體加速血小板破壞（常見於病毒感染後，兒童多自限、成人多慢性）。治療依出血嚴重度與血小板數：第一線為「皮質類固醇」（prednisolone 或 dexamethasone），抑制自體免疫破壞與抗體生成；嚴重出血或需快速提升時加「靜脈免疫球蛋白（IVIG）」（起效快但短暫）；血小板輸注僅在危及生命大出血時暫時使用（因會被自體抗體迅速破壞，非常規）；脾切除為第二線（藥物無效之慢性 ITP）。故初步處置首選皮質類固醇 (C)。", "options": {"A": "紅血球輸注用於貧血／失血量大，非處理血小板低下本身。", "B": "IVIG 用於嚴重出血或需快速提升血小板時（起效快但短暫），非單純初步首選。", "C": "正確。ITP 初步處置首選皮質類固醇（抑制免疫破壞）。", "D": "脾切除為藥物無效之慢性 ITP 的第二線治療，非初步處置。"}, "sources": "Harrison 21e（Immune thrombocytopenia, ITP）；ASH ITP Guidelines。"}}, "114-進階-內科-75": {"quick": "嚴重創傷＋多器官衰竭＋血小板低下＋PT/aPTT 延長＋D-dimer 升高＝瀰漫性血管內凝血（DIC），故 (D)。", "detail": {"background": "本例為嚴重創傷後多器官功能障礙，凝血檢驗呈「血小板下降、PT 與 aPTT 皆延長、D-dimer 升高（纖維蛋白分解產物）」——這組「消耗性凝血病」型態正是瀰漫性血管內凝血（DIC）。DIC 機轉：嚴重誘因（敗血症、創傷、產科、惡性腫瘤）引發全身凝血系統異常活化，廣泛微血栓消耗血小板與凝血因子→同時「出血」與「血栓」並存，纖溶活化使 D-dimer 升高。治療以「處理潛在病因」為核心，並依出血／血栓表現支持治療（血小板、新鮮冷凍血漿、冷凍沉澱補充）。鑑別：血友病（先天因子缺乏，PT 正常 aPTT 延長、無血小板低與 D-dimer 升）、von Willebrand 病（血小板功能異常、PT 正常）、TTP（微血管病性溶血＋血小板低，但 PT/aPTT 多正常、D-dimer 不一定升高）。故為 DIC。", "options": {"A": "血友病為先天因子 VIII/IX 缺乏，PT 正常、aPTT 延長，無血小板低與 D-dimer 升。", "B": "von Willebrand 病為血小板黏附異常，PT 正常，型態不符。", "C": "TTP 為微血管病性溶血＋血小板低，但 PT/aPTT 多正常，與本例 PT/aPTT 延長不符。", "D": "正確。創傷致消耗性凝血病：血小板低、PT/aPTT 延長、D-dimer 升＝DIC。"}, "sources": "Harrison 21e（Disseminated intravascular coagulation）；ISTH DIC scoring。"}}, "109-通論-其他-22": {"quick": "輸注紅血球濃縮液（PRBC）可增加血液攜氧能力，故 (D) 正確。", "detail": {"background": "各血品成分與用途是輸血醫學基礎：(1) 紅血球濃縮液（PRBC）——補充攜氧能力，用於有症狀貧血或失血，1 單位約升 Hb 1 g/dL。(2) 血小板——必須室溫（20–24°C）震盪保存（不可冷藏，4°C 會破壞功能），因此細菌生長風險「較高」、保存期短（約 5 天）。(3) 新鮮冷凍血漿（FFP）——含「所有凝血因子」但「不含血小板」，用於多種因子缺乏（如 DIC、warfarin 逆轉、大量輸血）。(4) 冷凍沉澱品（Cryoprecipitate）——由 FFP 製備，「濃縮」纖維蛋白原、第 VIII 因子、von Willebrand 因子、第 XIII 因子，故「單位體積纖維蛋白原比 FFP 高」，用於低纖維蛋白原血症。據此，(A)(B)(C) 皆錯，(D) 正確。", "options": {"A": "錯。冷凍沉澱品「單位體積」纖維蛋白原比 FFP 更高（cryo 是濃縮製品）。", "B": "錯。血小板須「室溫（20–24°C）」保存，細菌生長風險「較高」，非 4°C。", "C": "錯。FFP 含所有凝血因子但「不含血小板」。", "D": "正確。PRBC 補充紅血球→增加血液攜氧能力。"}, "sources": "Harrison 21e（Transfusion biology and therapy; blood components）；AABB Technical Manual。"}}, "109-進階-其他-35": {"quick": "乳酸林格氏液含「鈣離子」，會中和血袋中的檸檬酸鹽抗凝劑而促凝固，故 (C)。", "detail": {"background": "輸注紅血球濃縮液（PRBC）時若要稀釋或共用一條管路，標準是用「生理食鹽水（0.9% NaCl）」。「不可」使用含鈣的溶液如乳酸林格氏液（Lactated Ringer’s），原因是血袋中的抗凝保存劑為「檸檬酸鹽（citrate）」，靠螯合鈣離子來抗凝；若加入含鈣的林格氏液，外加的「鈣離子」會中和檸檬酸鹽的抗凝作用，導致血品在管路中「凝集（clotting）」。同理也避免含葡萄糖的溶液（造成紅血球凝集／溶血）。故不建議乳酸林格氏液稀釋 PRBC 的關鍵是其「含鈣離子」。", "options": {"A": "鈉離子（生理食鹽水也含）非禁用理由；生理食鹽水正是建議用液。", "B": "鉀離子並非乳酸林格不可用於稀釋 PRBC 的主因。", "C": "正確。林格氏液含鈣離子，會中和檸檬酸鹽抗凝劑而使血品凝固。", "D": "鎂離子非主要原因。"}, "sources": "AABB Technical Manual（Compatible IV solutions for RBC）；Harrison 21e。"}}, "109-進階-其他-52": {"quick": "紅血球濃縮液（1）與新鮮冷凍血漿（3）須 ABO 血型相容，故 (C) 1+3。", "detail": {"background": "ABO 相容性的考量取決於血品中含「紅血球抗原」或「血漿中的抗 A／抗 B 抗體」。(1) 紅血球濃縮液（PRBC）含紅血球抗原，輸入不相容紅血球會被受血者抗體攻擊→急性溶血反應，故「必須 ABO 相容」。(3) 新鮮冷凍血漿（FFP）含大量血漿抗體（抗 A／抗 B），若不相容會攻擊受血者紅血球，故「也必須 ABO 相容」（FFP 的相容方向與 RBC 相反，O 型血漿為萬用受贈、AB 型血漿為萬用捐贈）。相對地，血小板（2）與冷凍沉澱品（4）血漿量少、紅血球抗原少，ABO 相容性要求「較不嚴格」（盡量相合但必要時可跨型）。故須嚴格 ABO 相容者為 1＋3，答案 (C)。", "options": {"A": "1+2 不完整：血小板 ABO 要求較寬鬆。", "B": "2+3 不正確：應含紅血球（1）。", "C": "正確。PRBC（1）與 FFP（3）須嚴格 ABO 相容。", "D": "1+4 不正確：冷凍沉澱品（4）ABO 要求較寬鬆，應為 FFP（3）。"}, "sources": "AABB Technical Manual（ABO compatibility of components）；Harrison 21e。"}}, "110-進階-外科-43": {"quick": "大量輸血的 PRBC:FFP:血小板比例應接近 1:1:1，而非 4:1:1，故敘述 (A) 錯。", "detail": {"background": "大量輸血流程（MTP）用於嚴重失血（如創傷、產科大出血）。定義常為「24 小時內輸注 ≥10 單位 PRBC」或「3 小時內輸注 >½ 全身血量」。現代「損傷控制復甦（damage control resuscitation）」主張早期、平衡地輸注成分血，PRBC：FFP：血小板比例應「接近 1:1:1」（PROPPR 試驗），以同時補充攜氧、凝血因子與血小板、避免稀釋性凝血病；4:1:1 比例 FFP 與血小板過少，故 (A) 為錯誤。其他正確：大量輸血含檸檬酸鹽會螯合鈣→「低血鈣」，應補充鈣（B 正確）；24 小時 10 單位 PRBC 為大量輸血定義（C 正確）；保存血鉀偏高，慢性腎衰竭者要注意「高血鉀」（D 正確）。", "options": {"A": "錯誤（為答案）。比例應接近 1:1:1（PROPPR），非 4:1:1。", "B": "正確。檸檬酸鹽螯合鈣致低血鈣，應補充鈣。", "C": "正確。24 小時內輸 PRBC ≥10 單位為大量輸血定義之一。", "D": "正確。保存血鉀偏高，慢性腎衰竭者須注意高血鉀。"}, "sources": "PROPPR trial JAMA 2015；Harrison 21e（Massive transfusion）。"}}, "112-通論-其他-17": {"quick": "病人喪失決定能力後，醫師為避免其受致命傷害而輸血，秉持的是「不傷害原則」，故 (C)。", "detail": {"background": "本題考生物醫學倫理四原則：自主（autonomy，尊重病人自我決定）、不傷害（non-maleficence，不對病人造成傷害）、行善（beneficence，為病人謀福祉）、正義（justice，公平分配資源）。情境是病人原本「拒絕輸血（行使自主）」，但隨後因失血休克「意識不清、心智狀態已不適合做決定」，此時自主決定的前提（具決定能力）已不存在；醫師在「病人喪失能力、不立即處置將致命」的緊急情況下，為避免病人受到不可逆的嚴重傷害（死亡）而給予輸血——所依據的是「不傷害（避免致命傷害）／行善」原則。本題選項以「不傷害原則」為答案（C）。臨床實務上仍須衡量先前明確、具效力的預立意願（如耶和華見證人之書面拒絕），但在無有效預立意願且喪失能力的緊急情況下，以保全生命、避免傷害為依歸。", "options": {"A": "「保護原則」非標準生醫倫理四原則之一。", "B": "自主原則對應病人「有能力時」的拒絕；本例病人已喪失決定能力。", "C": "正確。病人喪失能力後為避免致命傷害而輸血＝不傷害（／行善）原則。", "D": "正義原則指資源公平分配，與本情境無關。"}, "sources": "Beauchamp & Childress, Principles of Biomedical Ethics；醫學倫理四原則。"}}, "113-通論-家庭-27": {"quick": "同前題：病人喪失決定能力後為避免致命傷害而輸血，秉持「不傷害原則」，故 (C)。", "detail": {"background": "本題與 112-通論-其他-17 為同一情境（子宮肌瘤大出血、病人拒絕輸血、之後失血休克意識不清、醫療團隊知會家人後輸血）。生醫倫理四原則中，當病人具決定能力時「拒絕輸血」屬行使「自主原則」；一旦因休克「意識不清、喪失決定能力」，自主的前提消失，醫師為防止病人因不輸血而死亡（不可逆的嚴重傷害），依「不傷害原則（避免造成／放任傷害）」而給予輸血。故答案為 (C) 不傷害原則。此類題目核心在辨識「能力喪失」這個轉折——能力存在時尊重自主，能力喪失且情況緊急時以不傷害／行善保全生命（除非有有效的預立醫療決定）。", "options": {"A": "「保護原則」非生醫倫理四原則。", "B": "自主原則對應病人有能力時的決定；本例已喪失決定能力。", "C": "正確。喪失能力後為避免致命傷害而輸血＝不傷害原則。", "D": "正義原則指公平分配資源，與本情境無關。"}, "sources": "Beauchamp & Childress, Principles of Biomedical Ethics。"}}, "114-進階-內科-76": {"quick": "輸血中發燒、呼吸困難、低血壓且持續低氧／呼吸窘迫＝輸血相關急性肺損傷（TRALI），故 (D)。", "detail": {"background": "輸血急性不良反應的鑑別是重要安全議題：(1) TRALI（輸血相關急性肺損傷）——輸血中或 6 小時內急性「非心因性肺水腫」，表現低氧、呼吸窘迫、發燒與「低血壓」，胸片雙側浸潤，機轉為捐血者抗白血球抗體（anti-HLA/HNA）活化受血者嗜中性球攻擊肺微血管；治療以支持性呼吸照護為主。(2) TACO（輸血相關循環過載）——容量過載致心因性肺水腫，特徵為「高血壓、頸靜脈怒張、BNP 升高」，利尿有效。(3) 非溶血性發熱反應——發冷發燒但「無低血壓與呼吸衰竭」，多自限。(4) 細菌污染／敗血性反應——高燒、寒顫、休克，常與血小板（室溫保存）相關。本例「發燒＋呼吸困難＋低血壓且持續呼吸窘迫」最符合 TRALI（低血壓＋低氧），故選 (D)。", "options": {"A": "TACO 為循環過載致「高血壓」性肺水腫，與本例低血壓不符。", "B": "非溶血性發熱反應有發燒寒顫但無低血壓與呼吸衰竭。", "C": "細菌污染常見高燒寒顫與敗血性休克，需培養佐證；本例型態最符 TRALI。", "D": "正確。輸血中急性低氧、呼吸窘迫、發燒、低血壓＝TRALI。"}, "sources": "Harrison 21e（Transfusion reactions; TRALI vs TACO）；AABB。"}}, "105-TNPA-通論-42": {"quick": "糞便潛血檢查（FOBT）已證實能及早發現大腸癌並降低其死亡率，故 (D)。", "detail": {"background": "有效的癌症篩檢須符合：疾病常見、有可偵測的早期階段、早期治療能改善預後，且篩檢工具經隨機試驗證實「降低死亡率」。台灣與國際公認、有實證降低死亡率的篩檢包括：糞便潛血（FOBT/FIT）降低大腸直腸癌死亡率、乳房 X 光攝影降低乳癌死亡率、子宮頸抹片降低子宮頸癌死亡率、低劑量電腦斷層（LDCT）對高危險吸菸者降低肺癌死亡率、口腔黏膜檢查對高危族群。胸部 X 光與痰液細胞學「未」證實能降低肺癌死亡率（PLCO/早期研究皆陰性）；PSA 用於前列腺癌篩檢「具爭議」（過度診斷、未明確降低總死亡率，需共享決策）。故本題經實證者為糞便潛血檢查（D）。", "options": {"A": "胸部 X 光未證實能降低肺癌死亡率（高危者改用 LDCT）。", "B": "痰液細胞學未證實能降低肺癌死亡率。", "C": "PSA 篩檢具爭議（過度診斷），未明確降低總死亡率。", "D": "正確。糞便潛血檢查已證實能早期發現大腸癌並降低其死亡率。"}, "sources": "Harrison 21e（Cancer screening; evidence-based screening）；國健署癌症篩檢政策。"}}, "107-TNPA-通論-10": {"quick": "病人未簽意願書，由最近親屬出具同意書即可；母親（父母同順位之一人）已簽，醫師可不施予 CPR，故 (C)。", "detail": {"background": "依「安寧緩和醫療條例」，末期病人本人未簽署意願書且無法表達時，得由「最近親屬」出具「不施行心肺復甦術（DNR）同意書」。最近親屬的範圍與順序為：配偶 →成年子女、孫子女 →父母 →兄弟姊妹 →祖父母…等。重要規則：(1)「同一順序者，得以其中一人行之」（不需該順位全部同意）；(2) 不同順序間意思表示不一致時，依順序在前者為準。本例 22 歲未婚、無配偶與子女，故最高順位為「父母」；父母同屬一順位，依「同一順位一人即可」，母親已出具同意書即為有效，醫師可不施予 CPR。哥哥姐姐（兄弟姊妹）屬「較後順位」，其反對不能推翻較前順位（父母）之決定。故 (C) 正確。", "options": {"A": "錯。法律未規定須「一家之主（父親）」同意；父母同順位一人即可。", "B": "錯。兄弟姊妹順位在父母之後，非以多數決，且不能推翻較前順位。", "C": "正確。父母同順位，母親一人出具同意書即有效，醫師可不施予 CPR。", "D": "錯。同順位（父母）得由一人行之，不必父母雙方一致。"}, "sources": "安寧緩和醫療條例（最近親屬出具 DNR 同意書之範圍與順序）。"}}, "107-TNPA-內科-16": {"quick": "乳房超音波「不能」取代乳房 X 光攝影、檢出率不同，故敘述 (C) 最不適當。", "detail": {"background": "乳癌篩檢以「乳房 X 光攝影（mammography）」為主要工具，是唯一經大型試驗證實能「降低乳癌死亡率（約 2–3 成）」的篩檢方法，對「微鈣化（microcalcification）」偵測敏感（常為早期 DCIS 徵象）。台灣國健署補助：45–69 歲婦女每 2 年 1 次；40–44 歲若二等親內曾罹乳癌者亦每 2 年 1 次。乳房超音波是「輔助」工具（對緻密乳房或腫塊評估有幫助），但「不能取代」乳房攝影，且兩者檢出標的不同（超音波對微鈣化敏感度差），檢出率並不相同。故 (C)「乳房超音波可取代乳房 X 光且具相同檢出率」為錯誤敘述。", "options": {"A": "正確。45–69 歲婦女建議每 2 年 1 次乳房 X 光攝影。", "B": "正確。40–44 歲二等親內有乳癌史者亦建議每 2 年 1 次。", "C": "錯誤（為答案）。超音波為輔助、不能取代乳房攝影，檢出率不同（對微鈣化敏感度差）。", "D": "正確。乳房攝影篩檢可降低約 3 成乳癌死亡率。"}, "sources": "Harrison 21e（Breast cancer screening）；國健署乳癌篩檢policy。"}}, "107-TNPA-通論-16": {"quick": "簽署意願書須「成年（20 歲以上）且具完全行為能力」，故 (A) 1＋3。", "detail": {"background": "「安寧緩和醫療暨維生醫療抉擇意願書」是病人「本人」預立、表達臨終時是否接受心肺復甦術或維生醫療的法律文件。簽署要件為：(1) 年齡須「20 歲以上（成年）」；(3) 具「完全行為能力」（能理解並自主決定）。故為①（20 歲以上）＋③（具備完全行為能力）＝(A)。選項中「18 歲以上」不符（意願書要件為 20 歲成年）；「非受監護宣告」雖與行為能力相關，但題目以「具完全行為能力」此一要件為核心表述。意願書與「同意書（由最近親屬代簽）」不同——意願書是本人意思，效力最強，可註記於健保卡。", "options": {"A": "正確。①20 歲以上＋③具完全行為能力，為簽署意願書之要件。", "B": "14＝含 18 歲以上，不符（要件為 20 歲）。", "C": "23＝含 18 歲以上，不符。", "D": "24＝含 18 歲以上，不符。"}, "sources": "安寧緩和醫療條例（意願書簽署要件：成年且具完全行為能力）。"}}, "108a-TNPA-內科-17": {"quick": "Fentanyl 貼片過量／突然停用後出汗、腹痛、躁動是「鴉片戒斷症狀」，故 (D) 正確。", "detail": {"background": "Fentanyl（吩坦尼）穿皮貼片用於穩定的慢性／癌症疼痛。藥理重點：(1) Fentanyl 效價約為 morphine 的「80–100 倍」（非 2 倍），脂溶性高、可穿皮吸收；(2) 貼片「起效慢」（約 12–24 小時達穩定血中濃度），故初貼時「不可立即停用」原本口服嗎啡，需重疊銜接以免疼痛失控；(3) 貼片每「72 小時（3 天）」更換一次（非 48 小時）；(4) 長期使用鴉片產生生理依賴，若突然停用或劑量驟降會出現「戒斷症狀」——流汗、腹痛、腹瀉、躁動不安、瞳孔放大、流淚流鼻水、起雞皮疙瘩等。故 (D) 正確。臨床上鴉片需逐步減量避免戒斷，且癌症疼痛規律給藥下「成癮（心理依賴）」其實罕見。", "options": {"A": "錯。fentanyl 效價約為 morphine 的 80–100 倍，非 2 倍。", "B": "錯。貼片起效慢（12–24 小時），需重疊銜接口服嗎啡，不可立即停用。", "C": "錯。貼片每 72 小時（3 天）更換，非 48 小時。", "D": "正確。出汗、腹痛、躁動為鴉片戒斷症狀（劑量驟降／停用時）。"}, "sources": "Harrison 21e（Opioid analgesics; transdermal fentanyl）。"}}, "108b-TNPA-通論-49": {"quick": "口腔癌篩檢補助對象為「30 歲以上」有嚼檳榔（含已戒）或吸菸者，敘述寫「40 歲以上」錯誤，故 (A)。", "detail": {"background": "國民健康署口腔癌篩檢（口腔黏膜檢查）政策補助對象為：「30 歲以上」有嚼檳榔（含已戒）或吸菸者，以及「18 歲以上至未滿 30 歲」有嚼檳榔（含已戒）的原住民。篩檢間隔為「每 2 年 1 次」，可至健保特約且具牙科或耳鼻喉科之醫療院所、衛生所、社區據點接受檢查。口腔癌與檳榔、菸、酒高度相關，早期黏膜病變（白斑、紅斑）可早期發現處置。本題 (A) 寫「40 歲以上」與政策的「30 歲以上」不符，為錯誤敘述。其餘 (B)(C)(D) 皆符合政策。", "options": {"A": "錯誤（為答案）。應為「30 歲以上」有嚼檳榔／吸菸者，非 40 歲以上。", "B": "正確。篩檢間隔每 2 年 1 次。", "C": "正確。可於社區、衛生所、醫院（特約院所）篩檢。", "D": "正確。18 歲以上至未滿 30 歲有嚼檳榔之原住民亦為補助對象。"}, "sources": "國民健康署口腔癌篩檢政策。"}}, "109-通論-其他-49": {"quick": "具決定能力的病人經充分討論後仍堅決拒絕化療，應尊重其自主權並停止化療，故 (A)。", "detail": {"background": "本例 60 歲乳癌第三期病人，意識清楚、具決定能力，已接受 8 次化療承受極大毒性，在醫師與配偶充分討論後，仍明確表達「不願繼續接受任何治療」。生物醫學倫理上，具決定能力的成年病人有權在被充分告知後「拒絕治療（informed refusal）」，醫療團隊應「尊重其自主權」，停止化療並轉為症狀控制／安寧支持，而非以家庭責任情緒勸說、或迂迴改放療「拐彎」繼續治療、或藉緩解藥物讓病人「忍耐完成療程」（這些都違反自主原則、形同強迫）。故 (A) 最適當。實務上同時應確認病人理解後果、評估是否有可逆的痛苦因素（如未控制的副作用、憂鬱），並提供安寧緩和選項。", "options": {"A": "正確。尊重具決定能力病人的自主決定，停止化療並轉症狀控制／安寧。", "B": "錯。以家人之名情緒勸說病人「忍耐完成」違反自主原則。", "C": "錯。未經同意改放療續行治療，仍違背病人「不願接受任何治療」之意願。", "D": "錯。藉緩解藥物讓病人「繼續完成療程」仍是違反其拒絕治療的決定。"}, "sources": "Beauchamp & Childress（autonomy, informed refusal）；安寧緩和理念。"}}, "110-進階-內科-12": {"quick": "「全程照護」指從接受安寧療護直到病人往生「並延續到家屬哀傷撫慰」，非「直至出院為止」，故敘述 (C) 錯。", "detail": {"background": "安寧緩和療護的核心理念為「五全照護」：全人（身、心、社、靈整體照護）、全家（病人與家屬同為照護對象，含家屬情緒與哀傷）、全程（從接受安寧療護開始、陪伴至病人往生，並延續到「喪親後的家屬哀傷輔導 bereavement care」）、全隊（醫師、護理師、社工、心理師、宗教師、復健、志工等跨領域團隊）、全社區（連結社區與居家資源）。故 (C)「全程照護＝直至病人出院為止」為錯誤——全程不是以「出院」為終點，而是涵蓋臨終與家屬喪親後的撫慰。", "options": {"A": "正確。全人照護＝對病人身心靈整體照護。", "B": "正確。全家照護＝兼顧家屬反應與需求。", "C": "錯誤（為答案）。全程照護延續至往生與家屬哀傷撫慰，非「直至出院為止」。", "D": "正確。全隊照護＝跨領域團隊共同照護。"}, "sources": "台灣安寧緩和療護「五全」理念；WHO Palliative Care。"}}, "110-進階-內科-13": {"quick": "呼吸困難的清醒末期病人可採半坐臥姿以利肺擴張，故 (A) 最適當。", "detail": {"background": "末期病人臨終照護以「舒適」為目標。(A) 呼吸困難時，清醒病人採半坐臥（Fowler’s）姿勢可降低橫膈壓迫、利肺擴張、改善呼吸費力，並可給予低劑量嗎啡緩解呼吸困難與氧氣支持，為適當措施。(B) 嗎啡引起的便秘應「預防性給予軟便／瀉劑」，而非直接插肛管，後者增加不適與侵入性。(C) WHO 三階梯第三階段（中重度疼痛）使用「強效」鴉片（如 morphine），非弱效。(D) 末期癌痛應「依需求給予足量（含高劑量）鴉片」緩解痛苦，不應因擔心意識不清或成癮而不足量——規律止痛下成癮罕見，劑量無天花板。故最適當為 (A)。", "options": {"A": "正確。呼吸困難之清醒病人採半坐臥姿以利肺部擴張（並可嗎啡／氧氣緩解）。", "B": "錯。嗎啡便秘應預防性給瀉劑，非直接插肛管。", "C": "錯。WHO 第三階段用「強效」鴉片，非弱效。", "D": "錯。末期癌痛不應因怕成癮而限量；應足量緩解，鴉片無天花板。"}, "sources": "WHO Analgesic Ladder；Harrison 21e（End-of-life care）。"}}, "111-進階-內科-3": {"quick": "肥胖病人鴉片劑量應以「淨體重（lean body mass）」計算較合適，而非總體重，故敘述 (C) 錯。", "detail": {"background": "鴉片類藥物使用要點：(A) 常見副作用包括噁心嘔吐、鎮靜、呼吸抑制、瞳孔縮小（針點瞳孔，過量徵象）、便秘（不會耐受，需長期預防）。(B) 長時間連續輸注 fentanyl 因其高脂溶性會「在組織蓄積」，使有效半衰期（context-sensitive half-time）延長、清除變慢，需注意過量。(C) 肥胖病人劑量計算應以「淨體重（lean body mass）」而非「總體重」較合適——以總體重計算易過量（尤其親脂性藥物分布複雜），故此敘述錯誤。(D) 合併 NSAIDs 或不同機轉止痛藥（多模式止痛 multimodal analgesia）可減少鴉片用量、提升止痛效果與安全性。故錯誤者為 (C)。", "options": {"A": "正確。鴉片副作用含噁心嘔吐、鎮靜、呼吸抑制、瞳孔縮小。", "B": "正確。連續輸注 fentanyl 會組織蓄積，清除變慢。", "C": "錯誤（為答案）。肥胖者應以淨體重（lean body mass）計算，非總體重。", "D": "正確。多模式止痛（合併 NSAIDs／不同機轉）可增效並提升安全性。"}, "sources": "Harrison 21e（Opioid pharmacology; multimodal analgesia）。"}}, "112-通論-其他-28": {"quick": "乳房攝影篩檢政府補助為「每 2 年 1 次，至 69 歲」，故 (A)。", "detail": {"background": "依國健署政策，乳房 X 光攝影篩檢補助對象與頻率為「45–69 歲婦女每 2 年 1 次」，另「40–44 歲且二等親內曾罹乳癌者」亦每 2 年 1 次。故 47 歲篩檢陰性女性，建議「每 2 年 1 次，可持續至 69 歲」（A）。乳房攝影是唯一經實證能降低乳癌死亡率的篩檢，2 年一次的間隔在敏感度與輻射／偽陽性間取得平衡。其餘選項的頻率（每 3 年、60 歲後改每年）與政策不符。", "options": {"A": "正確。45–69 歲每 2 年 1 次（至 69 歲）。", "B": "錯。無「60 歲後改每年」之規定。", "C": "錯。頻率為每 2 年非每 3 年。", "D": "錯。頻率與年齡規則皆不符。"}, "sources": "國健署乳癌篩檢政策。"}}, "112-進階-內科-80": {"quick": "口服嗎啡與 oxycodone 換算約為 1.5:1（oxycodone 較強），「morphine 是 oxycodone 兩倍」錯誤，故 (C)。", "detail": {"background": "癌症疼痛處理原則：(A) 多依 WHO 三階梯——第一階非鴉片（acetaminophen/NSAID）、第二階弱效鴉片（codeine/tramadol）、第三階強效鴉片（morphine/oxycodone/fentanyl），並依需求調整。(B) 輕度疼痛先給 acetaminophen 或 NSAIDs。(D) 強效鴉片「無天花板效應（no ceiling）」，可依疼痛逐步加量（受限於副作用而非劑量上限），這與有天花板的 NSAIDs 不同。(C) 鴉片等效換算：口服 oxycodone 效價約為口服 morphine 的「1.5 倍」（即 morphine 10 mg ≈ oxycodone 6.5–7.5 mg），故「morphine 是 oxycodone 的兩倍」並不正確（方向也相反，是 oxycodone 較強），為錯誤敘述。鴉片輪替（opioid rotation）時須正確換算並減量以防過量。", "options": {"A": "正確。多依 WHO 三階梯止痛。", "B": "正確。輕度疼痛給 acetaminophen 或 NSAIDs。", "C": "錯誤（為答案）。口服 oxycodone 約為 morphine 的 1.5 倍效價，非「morphine 為 oxycodone 兩倍」。", "D": "正確。強效鴉片無天花板效應，可依痛逐步加量。"}, "sources": "WHO Analgesic Ladder；Harrison 21e（opioid equianalgesia）。"}}, "113-進階-內科-11": {"quick": "臨終「喉頭咕嚕聲（death rattle）」因肌肉鬆弛無法有效清除口水分泌物，故 (A) 正確。", "detail": {"background": "安寧身體評估要點：(A) 臨終病人持續的喉頭「咕嚕聲（death rattle，瀕死喉鳴）」是因意識下降、咽喉肌肉鬆弛、無法有效吞嚥／咳出口水與分泌物，使氣流通過積聚分泌物產生聲響；處置以擺位（側臥）、減少不必要輸液、必要時抗膽鹼藥（減少分泌）為主，並向家屬說明病人通常不感痛苦。(B) 疼痛評估常用工具與「PAIN」字面意義不同，N 並非固定指「non-pharmacological management」，此敘述不正確。(C) 腹水以超音波可偵測的量遠低於 300 mL（可低至約 100 mL 或更少），「需超過 300 mL 才測得出」不正確。(D) 陳施氏呼吸（Cheyne-Stokes）是「漸強漸深後漸弱、再接呼吸暫停」的週期型態，選項描述順序錯置。故正確為 (A)。", "options": {"A": "正確。death rattle 因喉部肌肉鬆弛、無法清除口水分泌物所致。", "B": "錯。「PAIN」之 N 並非固定指 non-pharmacological management。", "C": "錯。超音波可偵測遠少於 300 mL 的腹水（約 100 mL 內）。", "D": "錯。Cheyne-Stokes 為漸強漸深後漸弱再暫停的週期，描述順序錯置。"}, "sources": "Harrison 21e（End-of-life symptoms; death rattle, Cheyne-Stokes）。"}}, "113-進階-家庭-14": {"quick": "哀傷撫慰（bereavement care）「屬於」安寧緩和療護範疇，故敘述 (A) 錯。", "detail": {"background": "哀傷撫慰（bereavement care）是安寧緩和療護「全程、全家」照護的重要一環，照護對象不只病人，也包括「喪親後的家屬」——協助其度過哀傷歷程、預防複雜性哀傷（complicated grief）。哀傷是正常反應，(B) 通常在喪親後「第一年最為強烈」（含忌日、節日的悲傷反應），多隨時間調適；(C) 哀傷程度因喪親情境（突然或預期、關係親疏、支持系統）而有個別差異；(D) 哀傷也有生理表現如虛脫、緊張、心悸、失眠、食慾改變等。故 (A)「哀傷撫慰不屬安寧療護範疇」為錯誤敘述。", "options": {"A": "錯誤（為答案）。哀傷撫慰是安寧緩和療護（全程、全家）的重要一環。", "B": "正確。哀傷感受通常在喪親後第一年最強烈。", "C": "正確。哀傷程度因情境與個人而有差異。", "D": "正確。虛脫、緊張、心悸等為哀傷的生理表現。"}, "sources": "WHO Palliative Care（bereavement support）；安寧療護五全理念。"}}, "113-通論-家庭-18": {"quick": "依安寧緩和醫療條例最近親屬順序「配偶優先於成年子女」，父親（配偶）出具書面意見即以其決定為之，故 (D)。", "detail": {"background": "本例病人（58 歲女性）為當事人，其「最近親屬」依安寧緩和醫療條例順序為：配偶 →成年子女、孫子女 →父母…。病人雖與丈夫分居 15 年，但「法律上仍為配偶」，順位高於成年兒子。當不同順序之最近親屬意思表示不一致時，「依順序在前者為準」，故配偶（即兒子的父親）之意見「優於」成年子女。父親出具書面意見不同意 DNR，依法應以「順位在前的配偶」之決定為之（D）。注意：最近親屬出具之同意書可由「順序在前者」變更／不同意；本題依法律順序，配偶意見優先。（倫理上雖有爭議，但題目問「依條例規定」之法律順位。）", "options": {"A": "錯。並非「父親須先撤除兒子同意書再以其決定」之程序；而是依順位配偶意見直接優先。", "B": "錯。兒子（成年子女）順位在配偶之後，不因「先簽」而優先。", "C": "依條例有明確順位（配偶優先），非僅以「最大利益」由團隊裁量。", "D": "正確。配偶（順位在前）之意見優於成年子女，依父親（配偶）書面決定為之。"}, "sources": "安寧緩和醫療條例（最近親屬順序：配偶優先）。"}}, "113-通論-5分科-26": {"quick": "醫療機構應告知病人與家屬安寧緩和選項並尊重病人自主決定，故 (D)。", "detail": {"background": "安寧緩和醫療條例（110 年修正）的精神在於尊重末期病人善終權與自主決定。重點：(A) 安寧緩和醫療「不限」於專門安寧機構，一般醫療機構（含住院、居家、社區）皆可提供。(B) 病人「本人」之意願（意願書）是核心，並非「必須經家屬同意」才能接受安寧療護（病人本人意思優先；本人無法表達時才由最近親屬出具同意書）。(C) 安寧緩和的主要目的是「緩解痛苦、提升末期生活品質與善終」，並非「延長生命」。(D) 醫療機構應「告知病人及家屬安寧緩和醫療之選擇，並尊重病人之自主決定」，符合法規與知情同意精神，為正確敘述。", "options": {"A": "錯。安寧緩和醫療不限於專門機構，各醫療機構與居家皆可提供。", "B": "錯。以病人本人意願為核心，非必須家屬同意。", "C": "錯。主要目的是緩解痛苦、提升生活品質與善終，非延長生命。", "D": "正確。應告知病人及家屬安寧選項並尊重病人自主決定。"}, "sources": "安寧緩和醫療條例（110 年修正）。"}}, "113-通論-家庭-35": {"quick": "政府補助高風險族群「口腔黏膜檢查每 2 年 1 次」，故 (B) 正確。", "detail": {"background": "國健署五大癌症篩檢補助（須記其頻率與對象）：(1) 糞便潛血（大腸癌）——50–74 歲「每 2 年 1 次」（非每年）；(2) 口腔黏膜檢查（口腔癌）——30 歲以上嚼檳榔／吸菸者、或 18 歲以上嚼檳榔原住民，「每 2 年 1 次」；(3) 子宮頸抹片（子宮頸癌）——30 歲以上婦女，傳統補助「每年 1 次」（建議至少每 3 年；近年朝 HPV 檢測調整）；(4) 乳房 X 光攝影（乳癌）——45–69 歲（及 40–44 高風險）「每 2 年 1 次」。據此，正確者為 (B)「口腔黏膜檢查每 2 年 1 次」。(A) FOBT 為每 2 年非每年；(C) 子宮頸抹片補助為每年（非每 2 年）；(D) 乳房攝影為每 2 年（非每 3 年），皆錯。", "options": {"A": "錯。糞便潛血為「每 2 年 1 次」（50–74 歲），非每年。", "B": "正確。口腔黏膜檢查每 2 年 1 次（高風險族群）。", "C": "錯。子宮頸抹片政府補助為每年 1 次（30 歲以上），非每 2 年。", "D": "錯。乳房 X 光攝影為每 2 年 1 次，非每 3 年。"}, "sources": "國民健康署五大癌症篩檢政策。"}}, "113-通論-家庭-38": {"quick": "口腔疑似癌前病變者應「儘速就醫處置／切片」而非僅「每年定期追蹤」，故敘述 (C) 錯。", "detail": {"background": "口腔癌篩檢（口腔黏膜檢查）補助：30 歲以上有嚼檳榔（含已戒）或吸菸者、18 歲以上有嚼檳榔之原住民，可至健保特約且具牙科或耳鼻喉科之院所篩檢，每 2 年 1 次。篩檢若發現疑似「癌前病變（如白斑、紅斑、疣狀增生）」或疑似口腔癌，應「儘速轉介就醫由專科醫師評估、必要時切片確診並處置」，而非僅「每年定期追蹤」——延遲處置會錯失早期治療。故 (C) 為錯誤敘述。(A)(B)(D) 皆符合政策（對象與篩檢院所）。", "options": {"A": "正確。補助 30 歲以上嚼檳榔或吸菸民眾。", "B": "正確。補助 18 歲以上有嚼檳榔之原住民。", "C": "錯誤（為答案）。疑似癌前病變應儘速就醫／切片處置，非僅每年追蹤。", "D": "正確。可至具牙科、耳鼻喉科之健保特約院所篩檢。"}, "sources": "國民健康署口腔癌篩檢政策。"}}, "114-通論-5分科-31": {"quick": "協助病人與家屬了解病情與安寧選項，並依團隊討論擬定止痛計畫，最能展現專業與倫理，故 (C)。", "detail": {"background": "面對末期病人的疼痛與不適，專科護理師應展現以病人為中心的專業與倫理：(C) 主動「協助病人與家屬了解病情與安寧療護選項」、評估疼痛、與「醫療團隊討論後擬定完整的止痛計畫」並評值——體現知情、團隊合作、以病人福祉為依歸，最為適當。其餘皆不當：(A) 叫病人「忍耐以免依賴」違反疼痛應充分緩解的原則（規律止痛下成癮罕見）；(B) 建議「坊間草藥」缺乏實證且可能交互作用、延誤治療；(D) 未經醫囑「先自行調整鎮痛劑量再報備」逾越權責、有安全與法律風險（應依醫囑或經授權之常規）。故 (C) 最能展現臨床倫理與專業角色。", "options": {"A": "錯。叫病人忍耐以免依賴，違反充分止痛原則。", "B": "錯。建議坊間草藥缺乏實證、有交互作用與延誤風險。", "C": "正確。協助理解病情與安寧選項，依團隊討論擬定止痛計畫。", "D": "錯。未經醫囑自行調整劑量逾越權責，有安全與法律風險。"}, "sources": "安寧緩和疼痛照護；專科護理師執業規範。"}}, "114-進階-內科-79": {"quick": "類固醇對惡性幽門狹窄造成的噁心嘔吐具緩解功效，故 (B) 最適當。", "detail": {"background": "末期病人腸胃道症狀的安寧處置：(A) 食慾不振（厭食-惡病質）在末期常見，「強行高營養灌食」不僅無法逆轉惡病質、反增不適與吸入風險，應以病人舒適與意願為原則（comfort feeding），非積極營養補充。(B) 皮質類固醇（如 dexamethasone）能減輕腫瘤周圍水腫、改善「惡性腸胃道阻塞（含惡性幽門狹窄）」造成的噁心嘔吐，並有提振食慾、止吐之效，為適當處置。(C) 惡性腹水可使用利尿劑（如 spironolactone±furosemide）合併必要時腹腔放液緩解，「不建議給利尿劑」之敘述不當。(D) 緩解便秘應「給予瀉劑並維持適當水分」，而非「減少液體攝取」（減少液體反加重便秘）。故最適當為 (B)。", "options": {"A": "錯。末期厭食不宜強行高營養灌食，應以舒適與意願為原則。", "B": "正確。類固醇可緩解惡性幽門狹窄／腸阻塞之噁心嘔吐（減水腫、止吐、促食慾）。", "C": "錯。惡性腹水可用利尿劑（spironolactone 等）±放液緩解。", "D": "錯。緩解便秘應給瀉劑並維持水分，非減少液體攝取。"}, "sources": "Harrison 21e（Palliative care; malignant bowel obstruction, corticosteroids）。"}}}, L={"腫瘤學總論、分期與腫瘤急症": {"title": "腫瘤學總論、分期與腫瘤急症", "html": "<p><b>核心概念：</b>本主題是 NP 血液腫瘤的「基礎框架」——癌症如何分期、如何評估體能、化療／標靶／放療的原理與副作用，以及四大「腫瘤急症」的辨識與處置。讀通本節，後面各論才有脈絡。</p><p><b>一、分期與評估。</b>實體腫瘤用 <b>TNM</b>：T＝原發腫瘤局部範圍（大小／侵犯深度，非等於臨床期別）、N＝區域淋巴結（N0 無、N1–3 漸增）、M＝遠端轉移（只有 M0／M1，無 M2）。造血系統惡性腫瘤<b>不用 TNM</b>（白血病用 WHO 分類、淋巴瘤用 Ann Arbor、骨髓瘤用 ISS）。體能以 <b>ECOG</b>：0 完全正常／1 劇烈活動受限但可做輕鬆工作／2 可自理不能工作（臥床<50%）／3 僅有限自理（臥床>50%）／4 完全臥床。ECOG 0–1 才適合標準化療。淋巴瘤需「切除式活檢看組織結構」，細胞學不足。</p><p><b>二、治療原理與副作用。</b>化療劑量多以體表面積（BSA）計，<b>carboplatin 例外以 AUC（Calvert：劑量＝AUC×(GFR+25)）依腎功能計</b>。藥物清除：paclitaxel 經<b>肝</b>（CYP，肝功能不良減量）、carboplatin/topotecan 經<b>腎</b>。代表性副作用要背：<b>paclitaxel→周邊神經病變</b>；anthracycline（doxorubicin）→心毒性，且與 <b>trastuzumab 併用會增加心毒性</b>；EGFR 抑制劑→<b>類青春痘皮疹</b>＋甲溝炎＋腹瀉（皮疹愈明顯療效愈好）；手足症候群→capecitabine／多激酶抑制劑；禿髮→傳統細胞毒性化療。carboplatin 比 cisplatin <b>神經／耳／腎毒性少，但骨髓抑制（血小板低下）較多</b>。化療止吐用 5-HT3（granisetron）＋NK1（aprepitant）＋dexamethasone（epinephrine 不是止吐藥）。生育保存：化療前首選<b>冷凍胚胎</b>＞冷凍卵子＞卵巢組織。</p><p><b>三、四大腫瘤急症（必考）。</b>① <b>腫瘤溶解症候群 TLS</b>：高腫瘤負荷化療後細胞崩解→<b>高鉀、高磷、高尿酸、低鈣</b>（記「三高一低」），好發急性白血病／Burkitt；監測尿酸、鉀、磷、鈣、肌酐（ALT 最不相關），預防靠水化＋allopurinol／rasburicase。② <b>惡性脊髓壓迫</b>：骨轉移（前列腺、乳、肺、骨髓瘤）壓迫脊髓→背痛＋下肢無力／感覺平面＋<b>尿滯留</b>；立即 dexamethasone＋MRI＋放療／手術。③ <b>發燒性嗜中性球低下 FN</b>：溫≥38.3℃且 ANC<500，先抽血培養但不延誤抗生素，經驗治療須<b>涵蓋綠膿桿菌</b>，持續發燒 3–4 天加抗黴菌（抗 MRSA、G-CSF 非常規）。④ <b>上腔靜脈症候群</b>：治療<b>病因</b>（化放療敏感腫瘤盡快化療、嚴重者支架），類固醇／利尿劑非首選。另腦轉移顱內壓升高首選 <b>dexamethasone</b>。</p>"}, "惡性腫瘤各論(白血病/淋巴瘤/骨髓瘤/實體腫瘤)": {"title": "惡性腫瘤各論(白血病/淋巴瘤/骨髓瘤/實體腫瘤)", "html": "<p><b>核心概念：</b>本節整合「血液惡性腫瘤」（白血病、淋巴瘤、多發性骨髓瘤）與「非器官專科實體腫瘤」（乳癌、攝護腺癌、頭頸癌、睪丸生殖細胞瘤）的關鍵診斷與治療概念。</p><p><b>血液惡性腫瘤。</b><b>多發性骨髓瘤（MM）</b>＝惡性漿細胞增生分泌單株 M 蛋白，記「<b>CRAB</b>」：高血鈣 Calcium、腎損傷 Renal、貧血 Anemia、骨痛／溶骨 Bone（穿鑿狀），加上正常免疫球蛋白下降→<b>反覆感染</b>；<b>淋巴結腫大非 MM 典型</b>（那是淋巴瘤）。<b>急性骨髓性白血病</b>白血球極高（blast 多）易 leukostasis 與 TLS。</p><p><b>實體腫瘤（非器官專科）。</b><b>乳癌</b>治療主看腫瘤大小、組織型、<b>ER/PR、HER2</b>（P53 非主要考量）；ER+ 用 tamoxifen（療程 5–10 年、降對側乳癌、但增子宮內膜癌與 DVT 風險）；<b>HER2</b>（占 15–25%）用 trastuzumab（與 anthracycline 併用增心毒性）。<b>DCIS（第 0 期）</b>：局部 BCS±放療、廣泛全乳切除、ER+ 給荷爾蒙、<b>不需化療</b>。<b>前列腺癌</b>多源於周邊區、早期無症狀，PSA 升高僅提高懷疑（需切片確診），最常<b>骨轉移</b>（腰骶髖痛）。<b>頭頸癌</b>與菸酒檳榔及 <b>HPV</b>（口咽癌，p16+ 預後較好、影響分期治療）相關；放療對小體積／放射敏感腫瘤效果好。<b>睪丸生殖細胞瘤</b>＝年輕男性無痛腫塊，標記為 <b>AFP、β-hCG、LDH（不含 CEA）</b>，高位根除性睪丸切除。<b>遺傳性乳癌卵巢癌（HBOC）</b>＝gBRCA 突變→預防性切除；BRCA 突變腫瘤對 <b>platinum 與 PARP 抑制劑</b>（合成致死）特別敏感。</p>"}, "貧血": {"title": "貧血", "html": "<p><b>核心概念：</b>貧血診斷兩步驟——先看 <b>MCV</b>（小球<80／正球／大球>100），再看 <b>網狀紅血球生成指數（RPI）</b>（高＝破壞／失血代償；低＝生成不足）。據此鎖定病因。</p><p><b>小球性（MCV↓）。</b>主要鑑別<b>缺鐵性貧血（IDA）</b>與<b>地中海貧血特徵</b>。IDA 鐵代謝口訣：「<b>鐵低、ferritin 低、MCV 低、網狀球低，但 TIBC 高</b>」（ferritin 最敏感）；常因慢性失血→<b>老年新發 IDA 必排除胃腸道癌</b>（CEA 升高＋IDA→上下消化道內視鏡）。地中海貧血特徵：<b>RBC 數目偏高、貧血程度與小球不成比例</b>、Mentzer 指數（MCV/RBC）<13、電泳 HbA2 升；ferritin 正常或高。慢性病貧血：ferritin 正常／高、TIBC 低。</p><p><b>大球性（MCV↑）。</b>多為 <b>B12／葉酸缺乏</b>（巨胚紅血球性、無效造血→紅血球大但<b>網狀球低</b>，可輕度全血球減少、過分葉嗜中性球）。<b>B12 缺乏</b>有神經學症狀（亞急性合併退化：感覺異常、平衡差、認知下降）與萎縮性舌炎；吸收靠胃內在因子＋<b>迴腸末端</b>，故<b>胃切除、克隆氏症、素食</b>易缺。葉酸缺乏無神經症狀。記住：B12 缺乏是「大球性」，出現小球性最不可能。</p><p><b>溶血性與骨髓性。</b><b>溶血</b>特徵：<b>haptoglobin 下降</b>、間接膽紅素↑、LDH↑、網狀球↑、抹片見球形（spherocytes）或裂片（schistocytes）紅血球；Coombs 陽性＝自體免疫溶血（AIHA）。<b>Coombs 陰性</b>＋血管內溶血＋血紅素尿＋感染後惡化＝<b>陣發性夜間血紅素尿症（PNH）</b>（CD55/CD59 缺失、補體媒介）。<b>再生不良性貧血</b>＝骨髓衰竭→全血球減少。脾切除後對莢膜菌（肺炎鏈球菌為主）易猛爆感染（OPSI），地中海／鐮狀細胞病人風險最大，須術前疫苗。</p>"}, "出血、血小板、血栓與抗凝": {"title": "出血、血小板、血栓與抗凝", "html": "<p><b>核心概念：</b>掌握兩大凝血檢驗、常見血小板／凝血疾病，以及抗凝藥的監測與周術期停藥。</p><p><b>凝血檢驗。</b><b>PT</b>（→INR）＝外在＋共同路徑，監測 <b>warfarin</b>（VTE 目標 INR 2–3）。<b>aPTT</b>＝內在＋共同路徑，監測<b>未分段肝素</b>。DIC 時 PT 與 aPTT 皆<b>延長</b>（因子被消耗）。warfarin 出血先驗 PT/INR、再依失血看 Hb/Hct。</p><p><b>血小板與出血疾病。</b><b>ITP</b>（免疫性血小板低下，常病毒後）＝孤立血小板低＋黏膜出血，初步首選<b>皮質類固醇</b>（嚴重加 IVIG，血小板輸注僅用於危及生命大出血，脾切除為第二線）。<b>VITT</b>＝COVID 疫苗後 anti-PF4 抗體→血小板驟降＋血栓＋D-dimer 升（劇烈頭痛警覺腦靜脈竇血栓；治療用非肝素抗凝＋IVIG，避免血小板輸注與肝素）。<b>DIC</b>＝嚴重誘因（敗血、創傷、產科）→血小板低＋PT/aPTT 延長＋D-dimer 升，治本＋成分血支持。鑑別：血友病（aPTT 延長、PT 正常）、von Willebrand（血小板功能異常）、TTP（微血管溶血＋血小板低、PT/aPTT 多正常）。血小板低下／胃炎者退燒選 <b>acetaminophen</b>（避 aspirin/NSAID）。</p><p><b>血栓與抗凝。</b>VTE 預防：UFH 5000 單位皮下每 8–12 小時；LMWH（enoxaparin）<b>經腎排除，腎功能不良會蓄積出血</b>需減量／監測。LMWH 效果不劣於 UFH 且更方便、HIT 較少。周術期停藥：<b>warfarin 術前 5 天停</b>（高風險橋接）；DOAC（rivaroxaban）術前 1–2 天停；sulfonylurea 手術當天停；DPP-4 可續用。抗凝中突發劇烈頭痛＋瞳孔不等＝疑顱內出血→<b>非顯影腦 CT</b>（腰椎穿刺禁忌）。</p>"}, "輸血與血品": {"title": "輸血與血品", "html": "<p><b>核心概念：</b>各血品成分用途、ABO 相容性、輸血急性不良反應與大量輸血流程。</p><p><b>血品成分。</b><b>PRBC</b>→補攜氧（1 單位升 Hb≈1）。<b>血小板</b>須<b>室溫（20–24℃）</b>保存（不可冷藏）→細菌污染風險較高、保存期短。<b>FFP</b>含所有凝血因子但<b>不含血小板</b>。<b>冷凍沉澱品（cryo）</b>＝濃縮纖維蛋白原、第 VIII 因子、vWF、第 XIII 因子（單位體積纖維蛋白原比 FFP 高）。<b>ABO 嚴格相容</b>者＝PRBC 與 FFP（FFP 含抗體，方向與 RBC 相反）；血小板與 cryo 要求較寬鬆。稀釋 PRBC 用<b>生理食鹽水</b>，不可用含鈣的乳酸林格（鈣中和檸檬酸鹽抗凝劑→凝集）。</p><p><b>大量輸血流程（MTP）。</b>定義＝24 小時內 PRBC ≥10 單位。現代主張平衡輸注 <b>PRBC:FFP:血小板 ≈ 1:1:1</b>（PROPPR；非 4:1:1）；檸檬酸鹽螯合鈣→<b>低血鈣</b>需補鈣；保存血鉀偏高，腎衰竭者注意高血鉀。</p><p><b>急性輸血反應。</b><b>TRALI</b>＝輸血中／6 小時內非心因性肺水腫，低氧＋呼吸窘迫＋發燒＋<b>低血壓</b>（捐血者抗白血球抗體）。<b>TACO</b>＝循環過載，<b>高血壓</b>＋容量過載性肺水腫，利尿有效。非溶血性發熱反應＝發冷發燒但無低血壓／呼吸衰竭。細菌污染＝高燒寒顫敗血（常與血小板相關）。倫理：病人具決定能力時拒輸血＝尊重自主；一旦喪失能力且危及生命而輸血＝<b>不傷害／行善原則</b>。</p>"}, "癌症篩檢與安寧緩和": {"title": "癌症篩檢與安寧緩和", "html": "<p><b>核心概念：</b>本節為 NP 高頻考區，涵蓋國健署五大癌症篩檢政策、安寧緩和醫療條例與最近親屬順序、末期症狀照護與疼痛處理原則。</p><p><b>癌症篩檢（須背頻率對象）。</b>有實證降低死亡率：<b>糞便潛血</b>（大腸癌，50–74 歲<b>每 2 年</b>）、<b>乳房 X 光攝影</b>（45–69 歲及 40–44 高風險，<b>每 2 年</b>，唯一證實降乳癌死亡率，超音波<b>不能取代</b>）、<b>子宮頸抹片</b>（30 歲以上，補助每年）、<b>口腔黏膜檢查</b>（30 歲以上嚼檳榔／吸菸、或 18 歲以上嚼檳榔原住民，<b>每 2 年</b>，疑癌前病變應儘速就醫切片而非僅追蹤）、高危吸菸者 LDCT。胸部 X 光、痰液細胞學未證實降肺癌死亡率；PSA 具爭議。</p><p><b>安寧緩和醫療條例。</b><b>意願書</b>（本人預立，效力最強）要件＝<b>20 歲成年＋具完全行為能力</b>。本人無法表達時由<b>最近親屬出具同意書</b>，順序：<b>配偶 →成年子女、孫子女 →父母 →兄弟姊妹…</b>；<b>同順位一人即可</b>、不同順位以在前者為準（故配偶優先於成年子女；父母同順位母親一人簽即有效，兄弟姊妹反對不能推翻）。安寧不限專門機構、目的是緩解痛苦與善終（非延長生命）、應告知選項並尊重病人自主。</p><p><b>末期症狀與疼痛。</b>「<b>五全</b>」＝全人、全家、全程（延續至往生與<b>家屬哀傷撫慰</b>，非到出院）、全隊、全社區。呼吸困難採半坐臥＋低劑量嗎啡＋氧氣；death rattle（喉鳴）＝肌肉鬆弛無法清口水，側臥／減少輸液／抗膽鹼。疼痛依 <b>WHO 三階梯</b>（非鴉片→弱效→強效鴉片），輕度用 acetaminophen/NSAID；<b>強效鴉片無天花板</b>可依痛加量；不應因怕成癮而限量（規律止痛成癮罕見）；肥胖以<b>淨體重</b>計量；oxycodone 約為 morphine 的 1.5 倍效價。Fentanyl 貼片效價約 morphine 80–100 倍、72 小時更換、起效慢需重疊口服、驟停會戒斷（出汗腹痛躁動）。類固醇可緩解惡性腸阻塞之噁心嘔吐。具決定能力病人拒絕化療應尊重自主。</p>"}};
const TORDER=["腫瘤學總論、分期與腫瘤急症", "惡性腫瘤各論(白血病/淋巴瘤/骨髓瘤/實體腫瘤)", "貧血", "出血、血小板、血栓與抗凝", "輸血與血品", "癌症篩檢與安寧緩和"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if((q.answer_status||'').indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if((q.answer_status||'').indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if((q.answer_status||'').indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if((q.answer_status||'').indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 let opts='';
 for(const k of ['A','B','C','D','E']){ if(q.options[k]!==undefined) opts+='<div class="opt"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
ce.addEventListener('click',e=>{if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render); fKw.oninput=render;
expandBtn=$('#expand'); expandBtn.onclick=()=>{expand=!expand;expandBtn.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
