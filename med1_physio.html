與特殊感覺生理","stem":"下列何者為身體在直線加速(linear acceleration)時協助維持平衡的最主要構造?","options":{"A":"Ruffini corpuscle","B":"organ of Corti","C":"semicircular canals","D":"utricle and saccule"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_111100-48","q_num":48,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"T3感覺與特殊感覺生理","stem":"下列何者最不可能造成視野缺失(scotoma)?","options":{"A":"散光(astigmatism)","B":"斜視(strabismus)","C":"黃斑部退化(macular degeneration)","D":"左側側膝核附近發生缺血缺氧中風(ischemic, hypoxic stroke around left lateral geniculate nucleus, LGN)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_111100-49","q_num":49,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"T3感覺與特殊感覺生理","stem":"下列有關耳蝸構造及功能的描述,何者最不適當?","options":{"A":"內毛細胞數量通常較外毛細胞少,卻主要負責聽覺刺激的分析,外毛細胞則和在背景噪音下刻意傾聽特定聲 音訊息有關","B":"scala media內的液體是內淋巴液,鉀離子的濃度遠比鈉離子為高","C":"越接近卵圓窗和圓形窗的basilar membrane越狹窄,負責越高頻聲音的登錄(encoding)","D":"耳蝸尖細的一端有一個孔道,使內淋巴液得以在scala vestibuli和scala tympani兩腔中相通"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_111100-52","q_num":52,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"T3感覺與特殊感覺生理","stem":"促使睡眠開始及維持睡眠的關鍵之一是下視丘preoptic area的神經活動。下列對preoptic area的描述,何者最為 適當?","options":{"A":"其神經活動與體溫調節及性腺荷爾蒙之分泌有關","B":"其神經元多分泌orexin做為efferent fibers聯外用的化學物質","C":"其神經活動在睡眠開始後會變得低下,且遠低於意識清醒時","D":"其神經活動和reticular activating system中神經元的活動會有互相增強(reciprocal facilitation)的現象"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_112020-48","q_num":48,"roc_year":"112","exam_code":"112020","src":"民國112年","topic":"T3感覺與特殊感覺生理","stem":"眼震(nystagmus)常被用以反映vestibular system 的反射功能。但眼震通常被定義為在頭部轉動後為抵抗眼球 位置的慣性,而拉往與頭部轉動的方向相同的急速眼球運動。而眼震的方向和兩耳水平半規管內之淋巴液流 動方向通常是相反的。在檢查時可使受測者挺直坐下,以水平軸為基準使其頭部向下偏約30 度,將冷水注入 受測者的左耳,其眼震的方向最可能是下列何項?","options":{"A":"向左","B":"向右","C":"先向左再向右","D":"先向右再向左"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_112020 ":"T13生殖生理","stem":"有關生殖生理很重要的「兩種細胞-兩種性促素學說(two-cell, two-gonadotropin theory)」是指:","options":{"A":"誘發睪丸(testis)生成釋放睪固酮(testosterone)的運作機制","B":"誘發睪丸(testis)生成釋放黃體素(progesterone)的運作機制","C":"誘發卵巢(ovary)生成釋放雌二醇(17β-estradiol)的運作機制","D":"誘發卵巢(ovary)生成釋放雄烯二酮(androstenedione)的運作機制"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med1_113020-68","q_num":68,"roc_year":"113","exam_code":"113020","src":"民國113年","topic":"T13生殖生理","stem":"有關腎上腺皮質分泌雄性素(androgen)作用的敘述,下列何者最不適當?","options":{"A":"其分泌作用主要受到促性腺激素(gonadotropins)的調控","B":"其先質dehydroepiandrosterone sulfate(DHEAS)血中濃度通常在20歲左右達到高峰","C":"在青春期前男性,若腎上腺雄性素分泌過量,可能造成假性性早熟(precocious pseudopuberty)","D":"在成年女性,若腎上腺雄性素分泌過量,可能造成腎上腺性徵異常綜合症(adrenogenital syndrome)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_113020-73","q_num":73,"roc_year":"113","exam_code":"113020","src":"民國113年","topic":"T13生殖生理","stem":"透明帶(zona pellucida)不存在於下列何者?","options":{"A":"secondary oocyte","B":"zygote","C":"morula","D":"implanted blastocyst"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_113090-73","q_num":73,"roc_year":"113","exam_code":"113090","src":"民國113年","topic":"T13生殖生理","stem":"下列有關生殖生理功能和調控的敘述,何者最不適當?","options":{"A":"睪固酮(testosterone)抑制腦下垂體前葉(anterior pituitary)分泌黃體生成素(luteinizing hormone, LH)","B":"抑制素(inhibin)抑制萊氏細胞(Leydig cell)分泌睪固酮(testosterone)","C":"睪固酮(testosterone)促進Wolffian duct分化","D":"二氫睪固酮(dihydrotestosterone, DHT)促進前列腺(prostate)發育"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_114020-73","q_num":73,"roc_year":"114","exam_code":"114020","src":"民國114年","topic":"T13生殖生理","stem":"下列何者在生殖週期中期誘發性促素(FSH 與LH)高峰分泌(surge),以促使卵細胞成熟與排卵?","options":{"A":"雌二醇(estradiol)","B":"黃體素(progesterone)","C":"前列腺素(prostaglandin)","D":"二氫睪固酮(dihydrotestosterone)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_114090-46","q_num":46,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"T13生殖生理","stem":"下列關於前列腺(prostate gland)的敘述,何者正確?","options":{"A":"男嬰的前列腺中可觀察到許多鈣化的前列腺凝結體(prostatic concretion)","B":"前列腺癌(prostatic carcinoma)最常發生於過渡區(transitional zone)","C":"前列腺的中央區(central zone)為前列腺腺體組織的最大區域","D":"腺體種類屬於管泡腺(tubuloalveolar gland)"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_114090-73","q_num":73,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"T13生殖生理","stem":"有關卵巢濾泡(follicle)的生長,下列敘述何者最不適當?","options":{"A":"最早期的濾泡為原始濾泡(primordial follicle),至青春期才會開始發育形成初級濾泡(primary follicle)","B":"初級濾泡的卵母細胞(oocyte)與顆粒細胞(granulosa cell)之間有透明帶(zona pellucida)形成","C":"月經週期初期,數個濾泡生長,而後會選出一個優勢濾泡(dominant follicle),達到最後成熟的濾泡","D":"濾泡凋零萎縮(atresia),在濾泡發育過程之各階段皆可能發生"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_115020-48","q_num":48,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"T13生殖生理","stem":"交感神經及副交感神經合作無間調節人體的許多功能及行為包括性行為,在男性進行性行為生殖器勃起時, 下列那一個敘述最恰當?","options":{"A":"交感神經節後神經元釋放乙醯膽鹼(acetylcholine)","B":"副交感神經節後神經元釋放乙醯膽鹼(acetylcholine)","C":"交感神經節後神經元釋放正腎上腺素(norepinephrine)","D":"副交感神經節後神經元釋放正腎上腺素(norepinephrine)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_115020-73","q_num":73,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"T13生殖生理","stem":"下列何者的主要作用是抑制anterior pituitary 的follicle-stimulating hormone(FSH)分泌,但對 luteinizing hormone(LH)的分泌則相對較無影響 ?","options":{"A":"progesterone","B":"estrogen","C":"inhibin B","D":"testosterone"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""}],E={"med1_108030-47":{"quick":"由高濃度往低濃度(被動)者為:Na-葡萄糖共同轉運的Na(2)與K滲漏通道的K(4)。","detail":{"background":"物質跨膜運輸依「是否順濃度梯度」分被動(順梯度、不耗能)與主動(逆梯度、耗能)。逐項:(1)Ca²⁺經Ca²⁺-ATPase幫浦回收入肌漿網=『逆梯度的初級主動運輸』(耗ATP);(2)Na⁺經SGLT進入腸細胞=Na⁺『順其電化學梯度』進入(同時帶動葡萄糖逆梯度=次級主動,但就『Na⁺本身』而言是高→低);(3)近端腎小管H⁺經Na⁺-H⁺逆向運輸分泌入管腔=H⁺『逆梯度』(靠Na⁺順梯度驅動,屬次級主動);(4)K⁺經滲漏鉀通道流出=K⁺『順梯度』高→低。故順濃度(高→低)者為2與4。記憶:幫浦與逆向運輸的「被驅動離子」逆梯度;順梯度的是驅動離子(Na)與滲漏離子(K)。","options":{"A":"13含逆梯度的Ca幫浦,不符。","B":"23含逆梯度的H分泌,不符。","C":"24(Na順梯度+K滲漏)皆高→低—正解。","D":"12含Ca幫浦逆梯度,不符。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_108100-47":{"quick":"guanylyl cyclase可被一氧化氮(NO)活化,產生cGMP。","detail":{"background":"鳥苷酸環化酶(guanylyl cyclase)催化GTP→『cGMP』(非cAMP;cAMP由adenylyl cyclase製造)。其『可溶型(sGC)被一氧化氮(NO)活化』—NO由內皮(eNOS)產生、擴散入血管平滑肌活化sGC↑cGMP→活化『protein kinase G(PKG)』(非PKC)→降胞內鈣→『血管「舒張」(vasodilation,非收縮)』。膜型(particulate)guanylyl cyclase則為心房利鈉肽(ANP)受體。故B正確。臨床:硝化甘油、亞硝酸鹽藥即經NO-cGMP舒張血管;PDE5抑制劑(sildenafil)抑制cGMP降解而強化此路徑。","options":{"A":"製造cAMP者為adenylyl cyclase(非guanylyl cyclase)。","B":"可被NO活化、產cGMP—正解。","C":"產物cGMP活化PKG(非PKC)。","D":"促進血管舒張(非收縮)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_109020-47":{"quick":"細胞凋亡時最典型為DNA片段化(caspase活化、不引發發炎)。","detail":{"background":"細胞凋亡(apoptosis,計畫性死亡)的特徵:『caspase(半胱天冬酶)被『活化』(非抑制)』啟動級聯;細胞『皺縮(體積變小,非脹大破裂)』、染色質濃縮、核內切酶將『DNA切成180bp倍數的片段(DNA fragmentation,電泳呈梯狀)』、形成凋亡小體被吞噬,『不釋出內容物、不引發發炎反應』。故最可能發生者為DNA片段化(B)。對比『壞死(necrosis)』:細胞脹大破裂、釋放內容物、引發發炎。故B正確。臨床:凋亡失調與腫瘤(逃避凋亡)、退化性疾病(過度凋亡)相關。","options":{"A":"caspase被「活化」(非抑制)。","B":"DNA片段化—正解。","C":"凋亡為細胞皺縮(脹破為壞死)。","D":"凋亡不引發發炎(壞死才會)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_109020-75":{"quick":"酵素藉「降低活化能」加速反應,不改變平衡。","detail":{"background":"酵素(enzyme)是生物催化劑:藉由穩定『過渡態』而『降低反應的活化能(ΔG‡,activation energy)』,使反應更易越過能障、『大幅加快「正、逆」反應速率』。它『不改變反應的熱力學平衡常數(Keq)與自由能變化(ΔG)』(平衡位置與反應方向由ΔG決定),只縮短達平衡的時間,且催化後酵素本身回復原狀可重複使用。故C正確;A(只抑制逆反應—錯,正逆同加速)、B(增平衡常數—錯)、D(增活化能—與催化相反)皆錯。臨床:酵素活性受溫度、pH、抑制劑、輔因子調控。","options":{"A":"酵素正逆反應皆加速(非只抑逆反應)。","B":"不改變平衡常數。","C":"降低活化能—正解。","D":"增加活化能與催化相反。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_109100-75":{"quick":"同向異位性:同種配體在一位點結合後影響「同種配體」在「其他位點」的結合。","detail":{"background":"異位調節(allosteric)指配體結合一處改變蛋白其他位點的構型與親和力:「同向異位性(homotropic)」=『同一種配體』,一分子結合後『影響「相同配體」結合到該蛋白「其他」位點的能力』(典型為協同作用,如O₂與血紅素的正協同S形曲線);「異向異位性(heterotropic)」=『不同配體/調節物』影響(如2,3-BPG、H⁺對血紅素)。故B正確。A(影響同一位點)、C(兩不同配體同一位點)、D(無構型變化—與異位定義相反)皆錯。血紅素的同向協同(O₂)使其在肺高效載氧、組織高效卸氧。","options":{"A":"同位點再結合非異位性定義。","B":"同配體影響其他位點結合—正解(homotropic)。","C":"兩不同配體屬heterotropic。","D":"異位作用必伴構型變化。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_110020-47":{"quick":"平滑內質網的IP3受器與IP3結合時釋出鈣離子。","detail":{"background":"胞內鈣訊號:平滑內質網(肌漿網)是鈣庫。釋鈣靠兩種通道:「IP₃受體(IP3R)」—Gq偶聯受體活化PLC產生『IP₃』,IP₃與IP₃R結合『開啟通道釋出Ca²⁺』(故B正確);「ryanodine受體(RyR)」—受膜去極化或鈣誘發鈣釋放(CICR)。比較錯誤:A Ca²⁺-ATPase(SERCA)是把鈣『打回』內質網(回收非釋出);C過極化不直接釋鈣;D store-operated channel在『細胞膜』、是內質網鈣排空後讓胞外鈣『進入細胞』(非內質網釋出)。故B正確。臨床:Gq-PLC-IP₃-Ca路徑媒介許多激素/神經傳導物作用(如平滑肌收縮)。","options":{"A":"Ca²⁺-ATPase把鈣打回內質網(非釋出)。","B":"IP3受器與IP3結合釋鈣—正解。","C":"過極化不直接釋鈣。","D":"store-operated channel在細胞膜、讓胞外鈣進入。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_110020-48":{"quick":"高張溶液的容積滲透濃度高於血漿(>約300 mOsm/L)。","detail":{"background":"張力(tonicity)以血漿正常滲透濃度約『300 mOsmol/L』為基準:「高張(hypertonic)」溶液滲透濃度『>300』、滲透壓『高於』血漿、水分比例『低於』血漿;紅血球置於高張液→水『流出』細胞→細胞『皺縮(非漲大)』。故D正確;A(漲大)、B(滲透壓低)、C(水分高)皆與高張相反。臨床:高張食鹽水(3%)用於嚴重低血鈉/腦水腫;靜脈輸液需注意張力以免溶血(低張)或皺縮(高張)。","options":{"A":"高張液使紅血球皺縮(非漲大)。","B":"高張液滲透壓高於血漿。","C":"高張液水分比例低於血漿。","D":"容積滲透濃度>300 mOsm/L—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_110020-74":{"quick":"280 nm吸光主要來自色胺酸(及酪胺酸)的芳香環。","detail":{"background":"蛋白質在『280 nm』有吸收峰,主要源自含『芳香環』的胺基酸—『色胺酸(tryptophan,吸收最強)』與酪胺酸(tyrosine),少量苯丙胺酸。故以280 nm吸光值可估算蛋白質濃度(Beer-Lambert定律)。絲胺酸、羥丁胺酸(蘇胺酸)、纈胺酸無芳香環、不在280 nm吸收。故C正確。注意:核酸在260 nm吸收(260/280比值用於評估蛋白質/核酸純度)。","options":{"A":"絲胺酸無芳香環、不吸280nm。","B":"蘇胺酸無芳香環。","C":"色胺酸芳香環吸280nm—正解。","D":"纈胺酸無芳香環。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_111020-47":{"quick":"Na⁺由右(NaCl)往左擴散使左水增加,右側留下Cl⁻而帶負電。","detail":{"background":"膜僅通透『水與Na⁺』(K⁺、Cl⁻不通透)。初始:左=1M KCl、右=1M NaCl。Na⁺右側高(1M)、左側0→『Na⁺由右向左擴散』;Na⁺移入左側使『左側滲透質點增加→水往左滲透→左側水分總量「增加」』。電荷:Na⁺離開右側、而Cl⁻不能跟隨→右側留下過多陰離子『帶負電』(此即擴散電位/Donnan效應的概念)。故C「左邊水分增加、右側帶負電」正確。此題測:可通透離子順梯度擴散會建立跨膜電位,且伴隨水的滲透移動。","options":{"A":"右側因失Na帶負電(正確),但左水應增加(此項說減少,錯)。","B":"左水增加且右側帶負(此說右側帶正,錯)。","C":"左水增加、右側帶負電—正解。","D":"右側帶負(此說帶正,錯)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_111020-53":{"quick":"鈉鉀幫浦每次「打出3個Na、打進2個K」,故「打進3Na打出2K」敘述錯誤。","detail":{"background":"鈉鉀幫浦(Na⁺/K⁺-ATPase)是初級主動運輸:每水解『一個ATP』,將『3個Na⁺打「出」細胞、2個K⁺打「入」細胞』(逆兩者梯度),維持細胞內高K低Na、並因淨輸出一正電荷而具生電性、維持滲透與細胞體積。故B「打進三個鈉、打出兩個鉀」方向寫反、錯誤。C、D正確:毛地黃(digoxin/digitalis)抑制此幫浦→胞內Na↑(間接使Na/Ca交換減少、胞內Ca↑增心肌收縮力;胞內Na/水滯留使細胞可能脹大)、且鉀梯度受擾可致去極化。故B為正解。臨床:幫浦失能→細胞腫脹;毛地黃中毒致心律不整、血鉀升高。","options":{"A":"每運轉耗一個ATP,正確。","B":"稱打進3Na打出2K—方向相反,錯誤,為正解(應打出3Na、打進2K)。","C":"抑制幫浦細胞可能脹大,正確。","D":"抑制幫浦可致去極化,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_111100-53":{"quick":"靜止膜電位-60mV時:K⁺漏出、Na⁺漏入(各自朝平衡電位移動)。","detail":{"background":"被動離子流向由『電化學梯度(膜電位 vs 該離子平衡電位)』決定。神經元K⁺平衡電位約-90mV、Na⁺約+60mV。在靜止膜電位『-60mV』時:對K⁺而言膜電位(-60)『高於(較正於)』E_K(-90)→K⁺受淨外向驅動『漏「出」細胞』;對Na⁺而言膜電位(-60)『遠低於』E_Na(+60)→Na⁺受強內向驅動『漏「入」細胞』。故D正確。鈉鉀幫浦持續把漏入的Na打出、漏出的K打回,維持穩態。記憶:離子總是朝其平衡電位方向移動。","options":{"A":"非兩者皆漏進。","B":"非兩者皆漏出。","C":"方向相反(應K出Na進)。","D":"K⁺漏出、Na⁺漏入—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_112020-52":{"quick":"過衝(去極化峰)Na⁺通透性高;下衝(過極化)K⁺通透性高。","detail":{"background":"動作電位的離子基礎:『去極化/過衝(overshoot,膜電位衝向+)』時『電壓閘控Na⁺通道開啟、Na⁺通透性大增』、Na⁺內流;隨後Na⁺通道失活、『電壓閘控K⁺通道開啟』使K⁺外流再極化;『下衝/過極化(undershoot/after-hyperpolarization)』時K⁺通道仍開、『K⁺通透性高』使膜電位短暫低於靜止值(趨近E_K)。故過衝對Na⁺、下衝對K⁺通透性特別高=D(鈉、鉀)。Na/K幫浦與通道關閉後回復靜止。故D正確。","options":{"A":"過衝為Na(非鉀)。","B":"過衝為Na(非鉀)。","C":"下衝為K(非鈉)。","D":"過衝Na、下衝K—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_114020-74":{"quick":"共價鍵在生理條件下穩定度最高。","detail":{"background":"分子間/內作用力的強度(鍵能)由高到低:『共價鍵(covalent,如雙硫鍵、肽鍵,~數十至百kcal/mol)』最強最穩定;其次為離子鍵/鹽橋(在水中因屏蔽而較弱)、氫鍵、最弱為凡得瓦力(van der Waals)。蛋白質的『一級結構』(肽鍵)與雙硫鍵屬共價、最穩;二三級結構靠大量氫鍵、離子鍵、疏水作用與凡得瓦力『個別弱但總和可觀』地維持。故生理條件下最穩定者為共價鍵。","options":{"A":"離子鍵在水中被屏蔽、較共價弱。","B":"共價鍵最穩定—正解。","C":"氫鍵較弱。","D":"凡得瓦力最弱。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_114020-75":{"quick":"phi(Φ)與psi(Ψ)二面角位於Cα原子兩側。","detail":{"background":"蛋白質主鏈每個胺基酸殘基有三個鍵:N–Cα、Cα–C(羰基)、C–N(肽鍵)。其中『肽鍵(C–N)因部分雙鍵性而剛性、不能自由轉動(角ω≈180°)』;可自由轉動的二面角有二:『phi(Φ)=繞「N–Cα」鍵』與『psi(Ψ)=繞「Cα–C(羰基)」鍵』—兩者皆『位於「Cα原子」的兩側』。故B正確。Φ/Ψ的允許組合由Ramachandran圖描述,決定二級結構(α螺旋、β摺板)。故Cα為樞紐。","options":{"A":"N非Φ/Ψ共同樞紐。","B":"Φ與Ψ位於Cα兩側—正解。","C":"羰基碳參與剛性肽鍵。","D":"Cβ為側鏈起點、非主鏈二面角樞紐。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_114020-76":{"quick":"酵素不改變反應的「熱力學平衡」,只改變動力學(活化能),故此敘述錯誤。","detail":{"background":"酵素特性:『改變動力學—降低活化能、加速達平衡』,但『「不」改變反應的熱力學平衡狀態(Keq、ΔG、平衡位置與方向不變)』—故B「酵素可改變其催化反應的熱力學平衡」錯誤。其餘正確:A具催化功能者不一定是蛋白質(『核酸酶ribozyme』如核糖體rRNA也有催化活性);C酵素改變(降低)活化能;D酵素催化後大多回復初始狀態可重複使用。故B為正解。記憶:酵素加速「到達」平衡,不移動平衡點。","options":{"A":"ribozyme(RNA)亦具催化活性,正確。","B":"稱酵素改變熱力學平衡—錯誤(只改動力學),為正解。","C":"酵素降低活化能,正確。","D":"催化後回復初始狀態,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_115020-47":{"quick":"鈉鈣交換子(NCX)屬次級主動運輸。","detail":{"background":"鈉鈣交換子(Na⁺/Ca²⁺ exchanger, NCX)利用『Na⁺順其電化學梯度內流的能量』,將『Ca²⁺逆梯度排出細胞(3Na⁺進換1Ca²⁺出)』—本身不直接水解ATP,而是『間接』依賴鈉鉀幫浦維持的Na⁺梯度,故屬「次級主動運輸(secondary active transport)的逆向運輸(antiport)」。故D正確。比較:簡單擴散/協助擴散順梯度不耗能(A、B);初級主動直接耗ATP(如Na/K幫浦、Ca-ATPase)(C)。臨床:毛地黃抑制Na/K幫浦→胞內Na↑→NCX排鈣減少→胞內Ca↑增心肌收縮力。","options":{"A":"簡單擴散順梯度、不耗能。","B":"協助擴散順梯度、不耗能。","C":"初級主動直接耗ATP(NCX非此)。","D":"NCX依Na梯度驅動、屬次級主動運輸—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Lehninger生物化學"]}},"med1_106100-47":{"quick":"腎上腺髓質受「節前交感神經」直接刺激而釋放腎上腺素。","detail":{"background":"腎上腺髓質是「特化的交感神經節」:其嗜鉻細胞相當於失去軸突的交感節後神經元,『直接受「節前交感神經元(preganglionic sympathetic)」的纖維支配』,以乙醯膽鹼(作用於菸鹼受體)刺激其分泌腎上腺素(約80%)與正腎上腺素入血。故為節前交感神經。一般交感路徑是節前(脊髓中側柱)→交感節換元→節後;但髓質特殊,節前纖維『不換元』直達髓質。臨床:此即髓質分泌兒茶酚胺受急性壓力(戰或逃)交感驅動的基礎;嗜鉻細胞瘤分泌過量兒茶酚胺致陣發高血壓。","options":{"A":"節後交感非直接刺激髓質。","B":"副交感不支配腎上腺髓質。","C":"節前交感神經直接刺激髓質—正解。","D":"副交感不支配髓質。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_106100-50":{"quick":"小腦半球的「側部」與運動皮層一起計畫與設計動作程序。","detail":{"background":"小腦功能分區:「側部(lateral hemisphere,新小腦/大腦小腦)」與大腦皮質迴路相連,參與『隨意動作的「計畫、設計與時序協調」』(動作起始前的程序規劃);「中間部(intermediate/脊髓小腦)」調節進行中肢體動作;「蚓部(vermis)與絨球小結葉(flocculonodular)」管軀幹姿勢、平衡與眼動(前庭小腦)。故與運動皮層一起計畫設計動作者為小腦半球側部。臨床:小腦病變→動作協調障礙、意向性顫抖、辨距不良。","options":{"A":"內側(中間部)調節進行中肢體動作。","B":"小腦半球側部計畫設計動作—正解。","C":"蚓部管軀幹姿勢平衡。","D":"絨球小結葉管平衡與眼動。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_106100-51":{"quick":"基底核與小腦負責隨意動作的計畫與程序設計。","detail":{"background":"運動控制階層:大腦皮質運動區發出指令,但『基底核(basal nuclei)與小腦』在動作執行前參與『計畫與設計隨意動作的程序』(經視丘回饋到皮質)—故D正確。比較錯誤:A骨骼肌不只受皮質控制(腦幹、脊髓反射亦可);B『α運動神經元胞體位於「脊髓前角」與腦幹運動核』(非大腦運動皮層);C基底核『不直接與骨骼肌形成突觸』(它調節皮質與腦幹的運動輸出,經多突觸間接影響)。故D正確。臨床:基底核病變(帕金森、亨汀頓)致運動起始/抑制異常;小腦病變致協調障礙。","options":{"A":"骨骼肌亦受腦幹/脊髓反射控制。","B":"α運動神經元胞體在脊髓前角(非運動皮層)。","C":"基底核不直接與骨骼肌形成突觸。","D":"基底核與小腦負責計畫設計隨意動作—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_107100-50":{"quick":"專注思考時額葉腦波為β波(beta rhythm)。","detail":{"background":"腦波(EEG)依頻率分:『β波(beta,>13 Hz,低振幅)』=清醒、『專注/思考/警醒』時(去同步化);『α波(alpha,8–13 Hz)』=清醒但放鬆閉眼;『θ波(theta,4–7 Hz)』=睏睡/兒童/淺睡;『δ波(delta,<4 Hz,高振幅)』=深睡(慢波睡眠)。考試專注時額葉應呈『β波』。故B正確。記憶:頻率隨警醒程度上升(β>α>θ>δ),清醒專注最快、深睡最慢。","options":{"A":"α波為放鬆閉眼清醒。","B":"β波為專注思考—正解。","C":"θ波為睏睡/淺睡。","D":"δ波為深睡。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_107100-52":{"quick":"瘦素經促進α-MSH(抑食慾)而減少進食。","detail":{"background":"下視丘弓狀核的食慾調控有兩群神經元:『POMC神經元』分泌『α-MSH(α-melanocyte stimulating hormone)』作用於MC4R→『抑制食慾(厭食路徑)』;『AgRP/NPY神經元』分泌NPY與AgRP→『促進食慾(促食路徑)』。脂肪分泌的『瘦素(leptin)』作用於下視丘:『促進POMC/α-MSH(抑食)、抑制NPY/AgRP(促食)』→整體『抑制食慾、增加能量消耗』。故瘦素促進的傳導物質為α-MSH。故A正確。臨床:leptin缺乏/受體缺陷→嚴重肥胖;多數肥胖者為瘦素阻抗。","options":{"A":"瘦素促進α-MSH抑食—正解。","B":"NPY為促食(瘦素抑制之)。","C":"orexin為促食/促醒。","D":"AgRP為促食(瘦素抑制之)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_108030-49":{"quick":"尾核(caudate nucleus)屬基底核,主導動作執行(運動調控)。","detail":{"background":"尾核(caudate nucleus)與殼核合稱「紋狀體(striatum)」,屬『基底核(basal ganglia)』—接收大腦皮質輸入、經direct/indirect路徑調節視丘與運動皮質,主導『隨意「動作」的選擇、起始與執行的調控』(運動功能)。故B「動作執行」最切題。基底核病變(帕金森、亨汀頓)以運動障礙表現。情緒(杏仁核)、自律調控(下視丘/孤束核)、記憶(海馬)各有其結構。(尾核亦參與認知/眼動,但選項中以運動最相關。)故B正確。","options":{"A":"情緒控制主要為杏仁核。","B":"尾核(基底核)主導動作調控—正解。","C":"自律調控為下視丘/腦幹。","D":"記憶為海馬。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_108100-48":{"quick":"星狀膠細胞「不」形成髓鞘(髓鞘由寡突膠/許旺細胞形成)。","detail":{"background":"星狀膠細胞(astrocyte)功能多元:參與『血腦屏障(以足突包繞微血管)』、『調節細胞外液離子(尤其緩衝K⁺)與神經傳導物質回收(如麩胺酸)』、『提供神經元能量(經乳酸穿梭供葡萄糖代謝產物)』、支持結構、形成膠質瘢痕。但它『「不」形成髓鞘』—中樞髓鞘由『寡突膠細胞』、周邊由『許旺細胞』形成。故不具的功能為形成髓鞘。故B正確。臨床:星狀膠瘤是最常見原發腦瘤;反應性星狀膠增生形成瘢痕阻礙CNS再生。","options":{"A":"星狀膠參與血腦屏障形成。","B":"星狀膠不形成髓鞘—正解。","C":"調節細胞外離子濃度。","D":"協助供葡萄糖/能量給神經元。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_108100-51":{"quick":"反覆練習形成的運動技能與「小腦」最相關。","detail":{"background":"運動學習與技能的腦區:『小腦(cerebellum)』在『運動技能的學習、協調與精準度校正(誤差校正、時序)』扮演核心—故反覆練習使投籃精準與小腦最相關。海馬(hippocampus)管『外顯/陳述性記憶(事實事件)』;基底核參與『習慣與程序性學習(亦相關,但精細動作協調以小腦為主)』;黑質供應紋狀體多巴胺。題意以運動技能的協調精準→小腦。故D正確。臨床:小腦損傷致動作不協調、辨距不良、無法習得平順動作。","options":{"A":"海馬管陳述性記憶(事實事件)。","B":"基底核管習慣/程序學習(動作協調以小腦為主)。","C":"黑質供紋狀體多巴胺。","D":"運動技能學習與小腦最相關—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_108100-52":{"quick":"小腦受損導致意向性顫抖、辨距不良與姿勢不穩。","detail":{"background":"小腦(cerebellum)是運動協調中樞,受損出現典型『小腦症候群』:『意向性/動態顫抖(intention tremor,接近目標時抖)』、『辨距不良(dysmetria,動作幅度不準)』、『姿勢與步態不穩(寬基底搖晃)』、輪替動作障礙(dysdiadochokinesia)、構音障礙、眼震。故B正確。比較:基底核病變以靜止顫抖、僵直、舞蹈等『不自主運動』為主(非意向性顫抖);大腦運動皮質損傷致對側無力(上運動神經元徵象)。故B正確。","options":{"A":"運動皮質損傷致對側無力(非意向性顫抖)。","B":"小腦損傷致意向性顫抖/辨距不良/姿勢不穩—正解。","C":"基底核病變以靜止顫抖/僵直/不自主運動為主。","D":"中腦非此症候群核心。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_108100-53":{"quick":"下運動神經元損傷見於肌萎縮性側索硬化症(ALS,亦含上運動神經元)。","detail":{"background":"運動神經元層級:『上運動神經元(UMN)』在皮質/腦幹下行;『下運動神經元(LMN)』在脊髓前角/腦幹運動核直接支配肌肉。LMN損傷→『弛緩性麻痺、肌萎縮、肌束顫動、反射消失』。選項中「肌萎縮性側索硬化症(ALS)」是運動神經元疾病,『同時侵犯上、下運動神經元』(故兼有萎縮顫動與痙攣亢進)。故C最符合「下運動神經元損傷」。比較:帕金森(基底核/黑質)、亨汀頓(紋狀體)屬基底核病;重症肌無力是『神經肌肉接合』突觸後膜病變(非運動神經元本身)。故C正確。","options":{"A":"帕金森為黑質-基底核病變。","B":"亨汀頓為紋狀體病變。","C":"ALS侵犯上下運動神經元—正解。","D":"重症肌無力為神經肌肉接合病變(非神經元)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109020-48":{"quick":"中腦邊緣多巴胺路徑與「動機與酬賞」行為最有關。","detail":{"background":"多巴胺路徑:『中腦邊緣路徑(mesolimbic,腹側被蓋區VTA→伏隔核/邊緣系統)』媒介『動機、酬賞、愉悅與成癮』—故D正確;中腦皮質路徑(mesocortical)與認知/執行;黑質紋狀體路徑(nigrostriatal)與運動(帕金森);結節漏斗路徑(tuberoinfundibular)抑制泌乳素。比較:恐懼感知與杏仁核、初級視覺與枕葉、身體平衡與小腦/前庭。故D正確。臨床:成癮藥物多增強中腦邊緣多巴胺;抗精神病藥阻斷D2(可致運動副作用與泌乳素上升)。","options":{"A":"恐懼為杏仁核。","B":"初級視覺為枕葉。","C":"平衡為小腦/前庭。","D":"動機與酬賞為中腦邊緣多巴胺路徑—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109020-55":{"quick":"踩到圖釘:左腿屈肌(股二頭肌)收縮屈曲縮回,右腿伸肌(股四頭肌)收縮支撐=交叉伸肌反射。","detail":{"background":"這是「屈肌退縮反射(flexor withdrawal)+交叉伸肌反射(crossed extensor reflex)」:左腳痛刺激→『同側(左)屈肌(股二頭肌)收縮、伸肌抑制』使患肢屈曲縮回避開傷害;同時為維持站立平衡,『對側(右)伸肌(股四頭肌)收縮、屈肌抑制』支撐體重(交叉伸肌反射)。故「左股二頭肌收縮、右股四頭肌收縮」=D。此為多突觸的保護性脊髓反射,展現交互抑制與對側平衡代償。故D正確。","options":{"A":"非雙側屈肌同時收縮。","B":"非雙側伸肌同時收縮。","C":"方向相反(左應屈肌、右應伸肌)。","D":"左股二頭肌(屈)+右股四頭肌(伸)—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109100-48":{"quick":"弓狀束受損導致傳導性失語症。","detail":{"background":"語言區與失語症:『Broca區(額葉下回,運動性語言)』受損→『表達不流利、但理解尚可(運動性/非流暢失語)』;『Wernicke區(顳上回後部,感覺性語言)』受損→『流利但內容無意義、理解差』;連接兩者的『弓狀束(arcuate fasciculus)』受損→『理解與表達尚可、但「複誦(repetition)障礙」=傳導性失語症(conduction aphasia)』。故A正確。比較錯誤:B描述的是Wernicke(非Broca)受損;C慣用右手者語言區多在『左』腦(非右);D語言皮質主要在『額/顳葉』(非頂葉)。故A正確。","options":{"A":"弓狀束受損→傳導性失語症—正解。","B":"流利但無意義為Wernicke受損(非Broca)。","C":"右利者語言區多在左腦(非右)。","D":"語言皮質在額/顳葉(非頂葉)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109100-50":{"quick":"基底核:直接路徑「增強」、間接路徑「降低」運動皮質活性。","detail":{"background":"基底核調控運動的兩條路徑(經視丘投射回皮質):『直接路徑(direct)』=紋狀體抑制GPi/SNr→解除對視丘的抑制(去抑制)→『增強視丘→運動皮質活性(促進動作)』;『間接路徑(indirect)』=經GPe、視丘下核增強GPi/SNr→『加強對視丘的抑制→降低運動皮質活性(抑制動作)』。兩者平衡調控動作的啟動與抑制。故B正確。臨床:帕金森(黑質多巴胺↓)→直接路徑減弱、間接路徑過強→運動減少(動作遲緩、僵直);亨汀頓→間接路徑受損→不自主舞蹈動作。","options":{"A":"方向相反(direct增強、indirect降低)。","B":"直接增強、間接降低運動皮質—正解。","C":"非兩者皆降低。","D":"非兩者皆增強。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109100-52":{"quick":"視交叉上核(SCN)是生物時鐘的主節律器。","detail":{"background":"生物晝夜節律(circadian rhythm)的主節律器是下視丘的『視交叉上核(suprachiasmatic nucleus, SCN)』—它以約24小時的內生節律調控睡眠-清醒、體溫、激素分泌等;並『接受視網膜經視網膜-下視丘束(RHT)傳入的光訊息』來與外界明暗同步(授時)。SCN再經多突觸路徑調控松果體分泌『褪黑激素』(暗期升高)。故B正確。比較:齒狀回(海馬,記憶)、蒼白球(基底核,運動)、孤束核(內臟感覺)。故B正確。","options":{"A":"齒狀回屬海馬(記憶)。","B":"視交叉上核為生物時鐘—正解。","C":"蒼白球為基底核(運動)。","D":"孤束核為內臟感覺中繼。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_110020-50":{"quick":"體溫調節中樞位於下視丘。","detail":{"background":"『下視丘(hypothalamus)』是體溫調節中樞:前部/視前區感測核心與皮膚溫度、設定『溫度設定點(set point)』,並驅動散熱(血管擴張、流汗,前下視丘)或產熱保溫(血管收縮、顫抖、棕色脂肪產熱,後下視丘)的反應。發燒時致熱原(IL-1、PGE₂)使設定點上調。故體溫調節中樞為下視丘(D)。下視丘同時整合飢飽、滲透壓、晝夜節律、自主與內分泌等恆定功能。故D正確。","options":{"A":"前運動皮質管運動準備。","B":"小腦管運動協調。","C":"杏仁核管情緒。","D":"下視丘為體溫調節中樞—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_110020-51":{"quick":"α-γ共同活化使肌肉收縮時肌梭仍保持張力、不喪失長度感測能力。","detail":{"background":"肌梭(muscle spindle)內的『梭內肌纖維』由『γ運動神經元』支配,梭外(主)肌纖維由『α運動神經元』支配。若只α活化使肌肉縮短,肌梭會鬆弛而『失去對長度變化的敏感(放電停止)』。『α-γ共同活化(co-activation)』使梭內纖維兩端隨之收縮、『維持肌梭張力與敏感度』,即使主肌縮短時『仍能持續感測肌肉長度』。故A正確(避免收縮時喪失肌肉「長度」訊息)。肌梭感『長度』、高爾基腱器感『張力』。故A正確。","options":{"A":"避免收縮時喪失肌肉長度訊息—正解。","B":"張力由高爾基腱器感測(非肌梭)。","C":"放鬆時非主要問題。","D":"張力非肌梭功能。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_110020-52":{"quick":"手部精細隨意動作主要強化皮質脊髓路徑(corticospinal tract)。","detail":{"background":"『皮質脊髓路徑(corticospinal tract,錐體路)』由運動皮質下行、大部分在延腦交叉,直接(或經中間神經元)支配脊髓前角運動神經元,主司『精細、技巧性的隨意動作(尤其手指)』。訓練手部精細動作即強化此路徑。故C正確。比較:腦幹路徑(前庭脊髓、網狀脊髓)管姿勢與粗大動作;背柱路徑是『感覺』(精細觸覺本體覺)上行;前外側脊髓視丘路徑是『痛溫覺』上行。故C正確。臨床:皮質脊髓路徑受損→對側精細動作喪失、巴賓斯基徵陽性。","options":{"A":"腦幹路徑管姿勢/粗大動作。","B":"背柱為感覺上行路徑(非運動)。","C":"皮質脊髓路徑管精細隨意動作—正解。","D":"脊髓視丘路徑為痛溫覺上行。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_110020-53":{"quick":"γ運動神經元支配梭內纖維,活化可誘發肌梭(梭內纖維)收縮。","detail":{"background":"肌梭內的『梭內肌纖維(intrafusal fiber)』由『γ運動神經元(γ-motor neuron/fusimotor)』支配—活化γ神經元使梭內纖維『兩端收縮』、拉緊中段感覺區、維持/調節肌梭對牽張的敏感度。而『α運動神經元』支配梭外的主肌纖維(產生力量)。故誘發肌梭收縮者為γ神經元。故D正確。β神經元(少數)同時支配梭內外;δ非運動神經元分類。記憶:α管力量、γ管肌梭靈敏度。","options":{"A":"α神經元支配梭外主肌纖維。","B":"δ非運動神經元分類。","C":"β少見、兼支配梭內外。","D":"γ神經元支配梭內纖維、誘發肌梭收縮—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_111100-51":{"quick":"警醒專注時頂/枕葉應呈高頻波(非<2 Hz),故此敘述最不適當。","detail":{"background":"EEG基本概念:A參考與紀錄電極置於頭皮(正確);B頭皮EEG振幅約在『微伏特(μV)』尺度(正確);D EEG反映電極下方皮質神經元『細胞外淨電流(主要突觸後電位總和)』(正確)。C「警醒或專心思考時頂/枕葉呈頻率極低<2 Hz的波」『錯誤』—警醒專注應為『高頻低幅的β波(去同步化)』,而<2 Hz是δ波(深睡)。故C最不適當,為正解。記憶:警醒→快波(β);深睡→慢波(δ)。","options":{"A":"參考與紀錄電極置頭皮,正確。","B":"振幅在μV尺度,正確。","C":"稱警醒時呈<2Hz慢波—錯誤(應為高頻β波),為正解。","D":"反映皮質細胞外淨電流,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_112020-50":{"quick":"對治療前事件無法回憶=逆行性失憶(retrograde amnesia)。","detail":{"background":"失憶分類:『逆行性失憶(retrograde amnesia)』=無法回憶『事件「之前」』已形成的記憶(對過去的遺忘);『順行性失憶(anterograde amnesia)』=無法形成『事件「之後」』的新記憶。題中病人「無法回憶治療『前』兩小時的事,但治療後的學習記憶正常」→屬『逆行性失憶』(對既往記憶的喪失)。故A正確。電痙攣治療(ECT)常見短暫逆行性失憶為副作用。confabulation(虛談)、jamais vu(舊事如新)非此情境。故A正確。","options":{"A":"對治療前記憶喪失=逆行性失憶—正解。","B":"順行性=無法形成新記憶(本例治療後學習正常)。","C":"虛談非失憶分類。","D":"舊事如新非此情境。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_112020-53":{"quick":"組織胺不屬於兒茶酚胺類(它由組胺酸去羧而來)。","detail":{"background":"兒茶酚胺(catecholamine)指含『兒茶酚(鄰苯二酚)環+胺基側鏈』、由『酪胺酸』經多巴→多巴胺→正腎上腺素→腎上腺素合成的一族:『多巴胺、正腎上腺素、腎上腺素』。而『組織胺(histamine)』由『組胺酸(histidine)去羧基』而成、含咪唑環,『不屬兒茶酚胺』。故D正確。組織胺媒介過敏、發炎、胃酸分泌與部分神經傳導。故D正確。","options":{"A":"多巴胺為兒茶酚胺。","B":"正腎上腺素為兒茶酚胺。","C":"腎上腺素為兒茶酚胺。","D":"組織胺非兒茶酚胺—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113020-49":{"quick":"自主神經節前神經元胞體位於脊髓的「中間外側柱」。","detail":{"background":"自主神經『節前神經元』胞體位置:交感為脊髓『胸腰段(T1–L2)的「中間外側柱(intermediolateral column, IML, Rexed lamina VII外側)」』;副交感為腦幹數對腦神經運動核(III、VII、IX、X)與脊髓『薦段(S2–4)』。題問脊髓處→『中間外側柱(intermediolateral column)』。故D正確。比較:背根神經節是『感覺』神經元(非自主節前);膠狀質(lamina II)是痛覺中繼;lamina IX是『軀體運動』前角神經元。故D正確。","options":{"A":"背根神經節為感覺神經元。","B":"膠狀質為痛覺中繼。","C":"lamina IX為軀體運動前角。","D":"中間外側柱為自主節前神經元胞體—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113020-52":{"quick":"膝狀神經節(顏面神經)凋亡不影響褪黑激素節律,故為最不可能影響者。","detail":{"background":"褪黑激素(melatonin)節律的路徑:光由『視網膜→視網膜下視丘束(RHT)→視交叉上核(SCN)→經交感路徑→松果體』,松果體的『N-乙醯轉移酶(NAT)』是合成速率限制酶(暗期升高)。故影響此節律的有:RHT萎縮(A)、松果體鈣化破壞(C)、NAT被抑制(D)。而『膝狀神經節(geniculate ganglion)是顏面神經(CN VII)的感覺節(味覺/外耳感覺)』,與褪黑激素節律無關→其凋亡『最不可能影響』。故B正確。","options":{"A":"RHT萎縮會影響光授時、影響節律。","B":"膝狀神經節(顏面神經)與褪黑激素無關—最不可能影響,為正解。","C":"松果體破壞影響褪黑激素分泌。","D":"抑制NAT影響褪黑激素合成。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113020-53":{"quick":"漸進電位「會」隨距離衰減,故「不隨距離消減」敘述錯誤。","detail":{"background":"漸進電位(graded potential,如突觸後電位、感受器電位)特性:A有『時間加成與空間加成(可疊加)』;B大小『隨刺激強度改變(分級的,非全有全無)』;C可為去極化(興奮)或過極化(抑制);但它是『被動的局部電流擴散、「會隨距離衰減(decremental)」』—故D「若為去極化則不隨距離消減」錯誤(漸進電位必隨距離遞減,僅在達閾值觸發動作電位後才能不衰減地長距離傳導)。故D為正解。對比:動作電位是全有全無、不衰減傳導。","options":{"A":"漸進電位有時間與空間加成,正確。","B":"大小隨刺激改變(分級),正確。","C":"可去極化或過極化,正確。","D":"稱去極化不隨距離消減—錯誤(漸進電位會衰減),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113020-54":{"quick":"BZD結合於GABA_A受體的BZD位點、增強GABA抑制作用助眠。","detail":{"background":"苯二氮平(BZD)助眠機轉:結合於『GABA_A受體』上的『BZD結合位點(別於GABA結合位)』,作為正向異位調節劑,『增加氯離子通道「開啟頻率」』、強化GABA的抑制作用(Cl⁻內流使神經元過極化)→鎮靜、抗焦慮、助眠、抗癲癇、肌肉鬆弛。故C正確。(巴比妥則增加通道「開啟時間」。)GABA是中樞主要『抑制性』傳導物質。故C正確。臨床:BZD過量可用flumazenil(BZD位點拮抗)逆轉;長期使用易耐受依賴。","options":{"A":"多巴胺受體非BZD作用點。","B":"麩胺酸為興奮性、非BZD作用點。","C":"GABA_A受體BZD位點—正解。","D":"甘胺酸受體(脊髓抑制)非BZD助眠位點。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113020-56":{"quick":"興奮動態γ運動神經元增加肌梭對「長度變化」的敏感度。","detail":{"background":"γ運動神經元分兩型:『動態γ(dynamic γ)』支配『核袋纖維(bag1)』→增強肌梭對『長度「變化速率」(動態敏感度)』的反應;『靜態γ(static γ)』支配核鏈與bag2纖維→增強對『靜態長度』的反應。故興奮『動態γ』使該肌肉肌梭『對長度變化(尤其速率)的敏感度增加』(Ia傳入放電增強)。故B正確。它不會降低張力、不使牽張反射消失(反而增敏)。故B正確。","options":{"A":"非降低張力(反增敏)。","B":"增加對長度變化的敏感度—正解。","C":"牽張反射不消失(反增強)。","D":"並非不受影響。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114020-51":{"quick":"K複合波最常出現於非快速動眼睡眠第二期(N2)。","detail":{"background":"睡眠分期(EEG):N1(淺睡,θ波,可見頂尖波);『N2』=出現『「睡眠紡錘波(sleep spindle)」與「K複合波(K complex)」』為特徵;N3(深睡/慢波睡眠,δ波);REM(類清醒的去同步化波、快速眼動、肌張力消失、作夢)。故K複合波最常見於『非快速動眼第二期(N2)』。故C正確。K複合波可能與睡眠維持、記憶鞏固有關。","options":{"A":"REM以去同步化快波與眼動為特徵。","B":"N1見頂尖波。","C":"N2見K複合波與紡錘波—正解。","D":"N3為δ慢波深睡。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114020-53":{"quick":"事實知識=外顯記憶;身手技能=內隱記憶。","detail":{"background":"長期記憶分:『外顯/陳述性記憶(explicit/declarative)』=可有意識回憶的『事實與事件(語意與情節記憶)』,依賴海馬與內側顳葉;『內隱/非陳述性記憶(implicit/non-declarative)』=『技能、習慣(程序性記憶)、制約、促發』,依賴基底核、小腦,不需意識。題中車禍後『「事實」(姓名職業)一度遺忘=外顯記憶受損(海馬/顳葉相關)』,而『「身手技能」保留=內隱(程序)記憶』。故B正確。經典案例H.M.切除海馬後無法形成新外顯記憶,但仍能學會新運動技能。","options":{"A":"事實應為外顯、身手為內隱(此項顛倒)。","B":"事實=外顯、身手=內隱—正解。","C":"事實非內隱。","D":"身手非外顯。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114020-54":{"quick":"釋放正腎上腺素、與清醒程度相關的神經元胞體位於網狀活化系統(藍斑核)。","detail":{"background":"維持『清醒/警醒(arousal)』的腦幹系統為『網狀活化系統(reticular activating system, RAS)』:其中『藍斑核(locus coeruleus,屬腦幹網狀結構)』的神經元釋放『正腎上腺素』,廣泛投射至皮質與下視丘,『提升白天清醒度與注意力』。故A正確。比較:下視丘有orexin/組織胺促醒系統(亦相關但題指NE);杏仁核(情緒)、內側前額葉(執行)非NE促醒主源。故A正確。臨床:RAS受損→昏迷;藍斑NE系統與注意力、壓力反應相關。","options":{"A":"網狀活化系統(含藍斑)釋NE維持清醒—正解。","B":"下視丘有orexin/組織胺促醒(非NE主源)。","C":"杏仁核管情緒。","D":"內側前額葉管執行功能。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114090-49":{"quick":"角迴(angular gyrus)受損致閱讀困難(失讀)。","detail":{"background":"頂葉的『角迴(angular gyrus,頂顳枕交界)』整合視覺與語言,將『文字的視覺形式與其語意/語音連結』,是『閱讀與書寫』的關鍵;受損致『失讀症(alexia)與失寫症(agraphia)』(口語可流利)。題中「中風後講話流利但閱讀困難」最符合『角迴病變』。故C正確。比較:Wernicke(理解差、言語空洞)、Broca(表達不流利)、弓狀束(複誦障礙)。故C正確。","options":{"A":"Wernicke受損致理解差、言語空洞。","B":"Broca受損致表達不流利。","C":"角迴受損致閱讀困難(失讀)—正解。","D":"弓狀束受損致複誦障礙。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114090-51":{"quick":"交感神經為「胸腰部門」,稱其為頭薦部門錯誤(頭薦是副交感)。","detail":{"background":"自主神經解剖:『交感(sympathetic)=胸腰部門(thoracolumbar, T1–L2)』;『副交感(parasympathetic)=頭薦部門(craniosacral, 腦神經III/VII/IX/X + S2–4)』。故A「交感也稱頭薦部門」『錯誤』(交感是胸腰部門)。其餘正確:B交感『節前』釋放乙醯膽鹼(節後多釋NE,汗腺例外);C副交感『節後』釋放乙醯膽鹼;D副交感神經節靠近標的器官(節後纖維短)、交感節(交感鏈)離器官遠。故A為正解。","options":{"A":"稱交感為頭薦部門—錯誤(交感是胸腰部門),為正解。","B":"交感節前釋乙醯膽鹼,正確。","C":"副交感節後釋乙醯膽鹼,正確。","D":"副交感神經節靠近標的器官,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_115020-52":{"quick":"雙側海馬切除後仍能學會騎腳踏車(程序記憶不依賴海馬)。","detail":{"background":"雙側海馬迴切除(如著名病例H.M.)→『嚴重順行性失憶:無法形成新的「外顯/陳述性記憶(事實、事件)」』,但『「程序性/內隱記憶(運動技能)」保留且仍可學習』(依賴基底核、小腦,不需海馬)。故術後最可能『仍可學會騎腳踏車(程序技能)』=B。其餘:A小學成績(久遠外顯記憶)多保留(逆行失憶通常較輕、遠期記憶較不受影響)但題以B最確定;C記得昨天聚餐朋友(新近外顯)、D記得30分鐘前對話(新外顯)→皆因無法形成新外顯記憶而『做不到』。故B正確。","options":{"A":"久遠記憶可能保留,但B更確定。","B":"仍可學會騎腳踏車(程序記憶不需海馬)—正解。","C":"無法形成新外顯記憶、記不得新近事件。","D":"無法保留30分鐘前新對話。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_115020-53":{"quick":"粗且有髓鞘的神經纖維傳導速度最快。","detail":{"background":"神經傳導速度取決於:『軸突直徑(越粗越快)』與『有無髓鞘(有髓鞘可跳躍式傳導saltatory conduction、遠快於無髓鞘)』。故『粗且有髓鞘(如Aα運動/本體覺纖維)』傳導最快(可達120 m/s)。最慢為『細且無髓鞘(C纖維,如慢痛、節後自主,約0.5–2 m/s)』。故C正確。髓鞘使動作電位於蘭氏結間跳躍,大幅提速並省能。故C正確。臨床:脫髓鞘疾病(多發性硬化、GBS)致傳導減慢/阻斷。","options":{"A":"細纖維較慢。","B":"細且無髓鞘最慢。","C":"粗且有髓鞘最快—正解。","D":"無髓鞘較有髓鞘慢。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_106100-46":{"quick":"虹膜屬眼球的「血管層(葡萄膜)」,非纖維層,故此敘述錯誤。","detail":{"background":"眼球壁三層:外層『纖維層(角膜+鞏膜)』、中層『血管層/葡萄膜(脈絡膜+睫狀體+虹膜)』、內層『神經層(視網膜)』。「虹膜(iris)」屬『血管層(葡萄膜)』前部—故A「虹膜屬纖維層」錯誤。虹膜以瞳孔為中心,藉『瞳孔括約肌(副交感,縮瞳)與放射肌(交感,散瞳)兩種平滑肌』控制瞳孔大小(C正確);虹膜為前、後房的分界(B正確);基質含血管與神經(D正確)。故A為正解。","options":{"A":"稱虹膜屬纖維層—錯誤(屬血管層/葡萄膜),為正解。","B":"虹膜為前後房分界,正確。","C":"瞳孔由平滑肌控制,正確。","D":"虹膜基質含血管神經,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_106100-52":{"quick":"聽覺受器(柯蒂氏器毛細胞)位於內耳。","detail":{"background":"聽覺傳導路徑:聲波經外耳道→鼓膜→中耳聽小骨(放大)→卵圓窗→『內耳耳蝸』。真正的『聽覺受器=耳蝸內「柯蒂氏器(organ of Corti)」的毛細胞』,位於『內耳』—毛細胞的靜纖毛受基底膜振動牽動而換能、經耳蝸神經傳入。故聽覺受器在內耳(D)。外耳、中耳僅傳導/放大,不含受器。故D正確。臨床:感覺神經性聽損源自內耳毛細胞/耳蝸神經;傳導性聽損源自外/中耳。","options":{"A":"中耳僅傳導放大、無受器。","B":"外耳道僅傳導。","C":"鼓膜為傳導構造。","D":"聽覺受器在內耳(柯蒂氏器)—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_106100-53":{"quick":"三叉神經傳一般感覺,與味蕾「味覺」訊號傳遞較不相關。","detail":{"background":"味覺傳入由三對腦神經:『顏面神經(VII,鼓索)傳舌前2/3味覺』、『舌咽神經(IX)傳舌後1/3味覺』、『迷走神經(X)傳會厭/咽部味覺』—皆入孤束核。而『三叉神經(V)傳遞舌的「一般體感覺(觸、痛、溫)」與辛辣等三叉化學感,並非味蕾的「味覺」訊號』。故與味覺傳遞較不相關者為三叉神經。故A正確。(注:三叉神經參與口腔觸覺與質地,但味覺本身由VII/IX/X。)","options":{"A":"三叉神經傳一般體感覺、與味覺傳遞較不相關—正解。","B":"顏面神經傳舌前2/3味覺。","C":"舌咽神經傳舌後1/3味覺。","D":"迷走神經傳咽部味覺。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_107100-48":{"quick":"光線先經過節細胞層才到達最深層的桿/錐細胞(視網膜為反向構造)。","detail":{"background":"視網膜是『反向(inverted)』排列:光線從玻璃體側進入,『最先穿過「神經節細胞層→雙極/水平/無軸突細胞層」,最後才到達最外(深)層的「光感受器(桿/錐細胞)」』(感光端朝向色素上皮)。故光線進入後最先經過的是『神經節細胞(ganglion cells)』。換能後訊號再反向往內傳:光感受器→雙極→節細胞→視神經。故C正確。黃斑中央凹處內層細胞側移,使光直達錐細胞、視覺最敏銳。","options":{"A":"桿/錐細胞在最深層、最後到達。","B":"雙極細胞在中層。","C":"光線最先經過節細胞層—正解。","D":"水平細胞在中層。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_107100-49":{"quick":"暗處桿細胞由cGMP維持cGMP-gated通道開啟、產生鈉內流(暗電流)。","detail":{"background":"桿細胞光傳導:『黑暗中』,胞內『cGMP濃度高』、使『cGMP-gated陽離子通道開啟』→Na⁺(與Ca²⁺)內流(『暗電流』)、細胞相對去極化、持續釋放麩胺酸。『光照時』→視紫質(視蛋白+11-順式視黃醛)活化→活化transducin(G蛋白)→活化磷酸二酯酶(PDE)→『cGMP分解下降』→通道關閉→Na內流減少→細胞『過極化』、減少麩胺酸釋放。故暗處產生Na內流的關鍵物質為『cGMP』。故B正確。","options":{"A":"cAMP非桿細胞光傳導的門控分子。","B":"cGMP維持暗電流(Na內流)—正解。","C":"transducin是光照活化的G蛋白(導致cGMP下降)。","D":"all-trans retinal為光照後產物。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_107100-51":{"quick":"單耳聽覺訊息「雙側」上行,傳至「兩側顳上回(初級聽覺皮質)」。","detail":{"background":"聽覺路徑高度『雙側化』:一耳的訊息經耳蝸神經核後,在腦幹多處(上橄欖核、外側丘系、下丘、內側膝狀體)『雙側交叉與上行』,最終投射到『兩側大腦的「顳上回(superior temporal gyrus)」初級聽覺皮質』。故右耳訊息傳至『兩側顳上回』。故C正確。此雙側性使單側聽覺皮質受損不致全聾(僅聲音定位受影響)。比較:中央後回(postcentral)是體感覺皮質(非聽覺)。故C正確。","options":{"A":"中央後回為體感覺皮質(非聽覺),且非單側。","B":"聽覺皮質在顳上回(非後顳回)。","C":"雙側顳上回(初級聽覺皮質)—正解。","D":"非僅右側(聽覺雙側化)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_107100-53":{"quick":"右眼外側(顳側)視野→經右視神經、在視交叉「交叉」→左視束→左側視丘。","detail":{"background":"視覺路徑與交叉規則:視野的『顳側(外側)視野』成像於『鼻側視網膜』,而『鼻側視網膜的纖維在視交叉「交叉」到對側』。故『右眼「外側(顳側)視野」→右眼鼻側視網膜→右視神經→在視交叉「交叉」→「左」視束→左側視丘(外側膝狀體)→左枕葉』。故A正確。(顳側視網膜纖維則不交叉、同側走。)整體:左腦處理雙眼的右半視野、右腦處理左半視野。故A正確。","options":{"A":"右眼外側視野經右視神經、視交叉交叉、左視束至左視丘—正解。","B":"鼻側視網膜纖維會交叉(此說不交叉,錯)。","C":"交叉前是視「神經」非視束。","D":"路徑與交叉規則不符。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_108030-48":{"quick":"氣味受器位於嗅覺上皮內的感覺神經元(嗅受器細胞)上。","detail":{"background":"嗅覺傳導:『氣味受器(odorant receptor,G蛋白偶聯受體)』表現於『鼻腔頂「嗅覺上皮」內的「嗅覺感覺神經元(雙極嗅受器細胞)」的纖毛膜上』—氣味分子結合後經Golf-腺苷酸環化酶-cAMP開啟陽離子通道使其去極化。其軸突(嗅神經)穿篩板入『嗅球』,在『嗅小球』與僧帽/簇狀細胞形成突觸。故氣味受器在嗅覺上皮的感覺神經元上(D)。僧帽/簇狀細胞、嗅皮質神經元是更下游、不表現氣味受器。故D正確。","options":{"A":"簇狀細胞在嗅球(下游),非受器所在。","B":"僧帽細胞在嗅球(下游)。","C":"嗅皮質為更高層處理。","D":"氣味受器在嗅覺上皮感覺神經元上—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_108030-50":{"quick":"視神經盤(視乳頭)無光感受器,故「富含光感受器」敘述錯誤。","detail":{"background":"視神經盤(optic disc/視乳頭)是視網膜上『視神經纖維匯聚穿出、視網膜中央血管進出』之處—此處『「沒有」光感受器(桿/錐細胞)』,故形成視野的『生理性盲點(blind spot)』。它與『黃斑(macula,視覺最敏銳的中央凹所在)』是視網膜上兩個不同構造。故B「視神經盤富含光感受器」錯誤,為正解。A、C、D皆正確。(題幹誤植macula densa,實指macula黃斑。)","options":{"A":"視神經盤與黃斑為兩不同構造,正確。","B":"稱視神經盤富含光感受器—錯誤(該處無光感受器),為正解。","C":"視神經盤為視神經聚集處,正確。","D":"視神經盤造成盲點,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_108100-49":{"quick":"三叉神經不參與瞳孔對光反射(其傳入是視神經II、傳出是動眼神經III)。","detail":{"background":"瞳孔對光反射弧:『傳入=視神經(II)』→中腦頂蓋前區→兩側『Edinger-Westphal核(動眼神經副交感核)』→『傳出=動眼神經(III)副交感纖維』→『睫狀神經節(ciliary ganglion)換元』→瞳孔括約肌收縮(縮瞳)。涉及中腦、EW核、睫狀神經節、動眼神經。『三叉神經(V)』為臉部一般感覺,『不參與』對光反射。故D正確。臨床:傳入缺陷(視神經病變)→患眼直接對光反射弱;傳出缺陷(動眼神經麻痺)→患側瞳孔散大固定。","options":{"A":"中腦含反射中樞,參與。","B":"睫狀神經節換元,參與。","C":"Edinger-Westphal核為副交感傳出核,參與。","D":"三叉神經不參與對光反射—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_108100-50":{"quick":"視神經(II)只含感覺纖維。","detail":{"background":"腦神經依纖維成分:『純感覺者=I嗅、II視、VIII前庭耳蝸』;『純運動者=III、IV、VI、XI、XII』;『混合者=V、VII、IX、X』。題問只含感覺纖維者→『第II腦神經視神經』。故A正確。(三叉V含感覺+咀嚼運動;顏面VII含運動+味覺/副交感;迷走X含運動感覺副交感—皆混合。)注:視神經實為間腦延伸、屬中樞白質束,但功能上為純感覺。故A正確。","options":{"A":"視神經(II)只含感覺纖維—正解。","B":"三叉神經為混合(感覺+運動)。","C":"顏面神經為混合。","D":"迷走神經為混合。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109020-49":{"quick":"咽部味覺由迷走神經(X)傳入延腦孤束核。","detail":{"background":"味覺傳入三神經:舌前2/3→『顏面神經VII(鼓索)』;舌後1/3→『舌咽神經IX』;會厭/咽部→『迷走神經X』,皆至延腦『孤束核』,再經視丘換元投射至味覺皮質(島葉/中央後回下部)。故C「咽部味覺經迷走神經」正確。比較錯誤:A舌前2/3由VII(非IX);B舌後1/3由IX(非舌下神經XII—XII是舌肌運動);D味覺訊號在孤束核與視丘『有停駐換元』(非直接投射皮質)。故C正確。","options":{"A":"舌前2/3由顏面神經VII(非舌咽)。","B":"舌後1/3由舌咽IX(舌下神經XII為運動)。","C":"咽部味覺由迷走神經傳入—正解。","D":"味覺經孤束核/視丘換元(非直達皮質)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109020-50":{"quick":"視交叉處受損→雙鼻側交叉纖維受損→「雙眼外側(顳側)視野」缺失(雙顳側偏盲)。","detail":{"background":"視交叉(optic chiasm)有來自『雙眼鼻側視網膜』的交叉纖維,而『鼻側視網膜對應「顳側(外側)視野」』。故視交叉中央受損(典型如腦下垂體腫瘤壓迫)→『雙眼顳側(外側)視野缺失=雙顳側偏盲(bitemporal hemianopia)』。故A正確。比較:單側視神經損傷→該『單眼全盲』;單側視束損傷→『對側半視野同向偏盲』。故A正確。臨床:垂體瘤、顱咽瘤壓迫視交叉為典型病因。","options":{"A":"視交叉受損→雙顳側(外側)偏盲—正解。","B":"左視神經損傷→左眼全盲(非雙外側)。","C":"右視神經損傷→右眼全盲。","D":"右視束損傷→左側同向偏盲。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109020-51":{"quick":"痛覺與溫度覺經前外側系統(脊髓視丘路徑)上行。","detail":{"background":"體感覺兩大上行系統:『背柱-內側丘系系統(dorsal column)』傳『精細觸覺、振動、本體覺』(同側上行至延腦才交叉);『前外側系統(anterolateral/脊髓視丘路徑)』傳『痛覺、溫度覺與粗觸覺』(在脊髓「進入該節段後即交叉」到對側上行)。故痛溫覺經『前外側系統』。故B正確。corticospinal/corticobulbar是『運動』下行路徑。臨床:脊髓半切(Brown-Séquard)→同側精細觸覺/運動喪失(背柱/皮質脊髓)、對側痛溫覺喪失(前外側,因已交叉)。","options":{"A":"背柱系統傳精細觸覺/本體覺(非痛溫)。","B":"前外側系統傳痛溫覺—正解。","C":"皮質脊髓為運動下行路徑。","D":"皮質延髓為運動下行路徑。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109020-52":{"quick":"正常人對「苦味」的感受閾值最低(最敏感)。","detail":{"background":"五種基本味覺中,人對『苦味』的『感受閾值最低=最敏感』(極低濃度即可察覺)—此為演化上的保護機制,因許多『有毒/有害物質帶苦味』,高敏感度有助於避免攝入毒物。相對地,對甜、鹹的閾值較高(需較高濃度才嚐到)。故C正確。味覺由VII/IX/X傳入孤束核。臨床:苦味受器(T2R家族)種類多,反映對多種毒素的廣泛偵測。","options":{"A":"酸味閾值非最低。","B":"甜味閾值較高。","C":"苦味閾值最低(最敏感)—正解。","D":"鹹味閾值較高。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109020-54":{"quick":"右側腰段背柱受損→同側(右腳)精細觸覺喪失,痛溫運動反射正常。","detail":{"background":"背柱-內側丘系系統傳『精細觸覺、振動、本體覺』且『在延腦才交叉』,故脊髓段的背柱損傷致『「同側」缺損』。題述「右腳觸覺喪失,但痛溫覺、運動、膝反射正常」→單純『精細觸覺缺損(背柱)』且為『同側(右側)』→『右側腰段脊髓的背柱(後索)』受損。故A正確。痛溫覺(前外側,已交叉)、運動(皮質脊髓)、反射皆正常,定位於背柱。故A正確。","options":{"A":"右側腰段背柱受損→同側右腳精細觸覺喪失—正解。","B":"左側背柱損傷會致左側(非右)缺損。","C":"前外側柱損傷影響痛溫覺(此例痛溫正常)。","D":"左側前外側柱不符同側觸覺缺損。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109100-47":{"quick":"頭部轉動的角加速度由半規管(semicircular canals)偵測。","detail":{"background":"前庭系統:『三個半規管(semicircular canals)』內的壺腹嵴感測『「角(旋轉)加速度」(頭部轉動)』—內淋巴慣性使頂帽偏移、彎曲毛細胞靜纖毛換能;『橢圓囊與球囊(utricle & saccule)的耳石器』則感測『「直線加速度」與重力(頭部傾斜/水平垂直位移)』。故偵測角加速度者為半規管。故C正確。柯蒂氏器(organ of Corti)是聽覺。故C正確。臨床:半規管耳石脫位→BPPV眩暈。","options":{"A":"柯蒂氏器為聽覺受器。","B":"耳蝸管為聽覺。","C":"半規管偵測角加速度—正解。","D":"橢圓囊/球囊偵測直線加速度。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109100-49":{"quick":"鮮味(umami)的媒介物為麩胺酸(glutamate)。","detail":{"background":"五種基本味覺的代表分子:甜=糖(glucose/蔗糖);鹹=Na⁺;酸=H⁺;苦=生物鹼/奎寧;『鮮(umami)=「麩胺酸(glutamate)」(及核苷酸IMP/GMP增效)』,經T1R1/T1R3味覺受體偵測。故D正確。麩胺酸鈉(味精MSG)即鮮味來源。故D正確。","options":{"A":"glucose為甜味。","B":"glycerol非鮮味媒介。","C":"NaCl為鹹味。","D":"麩胺酸為鮮味媒介—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109100-51":{"quick":"梅尼爾氏症的眩暈源於內耳(膜性迷路內淋巴水腫)。","detail":{"background":"梅尼爾氏症(Ménière’s disease)是『內耳膜性迷路的內淋巴水腫(endolymphatic hydrops)』,異常刺激前庭與耳蝸→典型『陣發性眩暈(vertigo)、波動性感覺神經性聽損、耳鳴、耳脹』。故眩暈源於『內耳』受異常刺激。故A正確。聽覺皮質、小腦、視交叉非其病灶。臨床:處置含低鈉飲食、利尿劑、前庭抑制劑。故A正確。","options":{"A":"內耳(膜性迷路內淋巴水腫)—正解。","B":"聽覺皮質非病灶。","C":"小腦病變致協調障礙(非梅尼爾)。","D":"視交叉與聽平衡無關。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_109100-53":{"quick":"升降梯的垂直直線加速由球囊(saccule)偵測。","detail":{"background":"耳石器分工:『橢圓囊(utricle)斑呈「水平」向,偵測「水平」直線加速與頭部傾斜』;『球囊(saccule)斑呈「垂直」向,偵測「垂直」直線加速(如電梯升降)』。故偵測『垂直位移(電梯加減速)』主要由『球囊』。故B正確。半規管偵測角加速、耳蝸司聽覺。故B正確。(兩耳石器共同提供重力與直線加速資訊以維持平衡。)","options":{"A":"橢圓囊偵測水平直線加速。","B":"球囊偵測垂直直線加速(電梯)—正解。","C":"半規管偵測角加速度。","D":"耳蝸為聽覺。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_110020-49":{"quick":"交感興奮使虹膜放射肌收縮、產生散瞳(mydriasis)。","detail":{"background":"瞳孔的自主控制:『交感神經』使『虹膜「放射肌(radial/dilator muscle)」收縮→散瞳(mydriasis)』(α1受體);『副交感神經』使『虹膜「括約肌(sphincter)」收縮→縮瞳(miosis)』、並使睫狀肌收縮以『近距離調視』。故交感興奮=放射肌收縮散瞳(B)。比較錯誤:A縮瞳是副交感;C/D睫狀肌收縮是『副交感』、助『近』距離視覺(非交感、非遠距離)。故B正確。臨床:交感受損(Horner)→縮瞳;散瞳劑(phenylephrine α1致效或抗膽鹼)用於眼底檢查。","options":{"A":"括約肌收縮縮瞳為副交感。","B":"放射肌收縮散瞳—正解(交感)。","C":"睫狀肌收縮為副交感、助近距離(非遠)。","D":"睫狀肌收縮非交感作用。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_111020-50":{"quick":"感光細胞(桿/錐)的接受域並非同心圓拮抗型;同心圓中心-周邊拮抗是「節細胞」特徵,故此敘述不適當。","detail":{"background":"視覺接受域:『神經節細胞(與雙極細胞)』具『「中心-周邊拮抗」的同心圓接受域(on-center/off-surround或反之)』—中心與周邊光刺激產生相反反應,藉側抑制(水平細胞媒介)增強對比與邊緣偵測。而『光感受器(桿/錐細胞)本身的接受域只是其感光點、並無中心-周邊拮抗的同心圓組織』。故C「感光細胞與節細胞接受域都是圓形且皆同心圓拮抗」『不適當』(拮抗同心圓是節細胞特徵、非感光細胞)。故C為正解(最不適當)。A、B、D對接受域的描述合理。","options":{"A":"接受域定義(影響細胞反應的視野範圍)合理。","B":"相鄰細胞接受域較相似/重疊,合理。","C":"稱感光細胞也具同心圓拮抗接受域—不適當(拮抗為節細胞特徵),為正解。","D":"on/off-center解析光點位置,合理。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_111020-52":{"quick":"個案『聽覺相關記憶無明顯缺損』,而planum temporale(顳平面)主司聽覺/語言關聯,與其缺損最不相關,故D。","detail":{"background":"Korsakoff症候群(慢性酗酒、維生素B1硫胺缺乏)→『間腦的「乳頭體(mammillary body)」與視丘背內側核退化』→嚴重『順行性與逆行性失憶、虛談(confabulation)』。題述酗酒致記憶障礙→與『乳頭體』最相關。故C正確。乳頭體是邊緣系統(Papez迴路)記憶環節。前額葉(執行)、海馬旁回、顳平面(語言/聽覺)非Korsakoff核心病灶。故C正確。臨床:Wernicke-Korsakoff,急性可補硫胺挽救。","options":{"A":"prefrontal cortex與執行功能、記憶提取有關,屬相關。","B":"parahippocampal cortex參與記憶,屬相關。","C":"mammillary body是Korsakoff記憶缺損核心病灶,最相關。","D":"★最不相關(本題答案)。顳平面主司聽覺,個案聽覺記憶保留,與其症狀最不相關。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_111020-56":{"quick":"直線加速時維持平衡主要靠橢圓囊與球囊(耳石器)。","detail":{"background":"維持平衡的前庭受器:『橢圓囊與球囊(utricle & saccule)的耳石器』偵測『直線加速度與重力(頭部位置)』;半規管偵測角加速。故直線加速時協助平衡的主要構造為『橢圓囊與球囊』。故D正確。Ruffini小體是皮膚機械受器(伸張)、柯蒂氏器是聽覺。故D正確。","options":{"A":"Ruffini小體為皮膚伸張受器。","B":"柯蒂氏器為聽覺。","C":"半規管偵測角加速度(非直線)。","D":"橢圓囊與球囊偵測直線加速—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_111100-48":{"quick":"散光是「屈光不正(成像模糊)」,不造成視野缺失(scotoma)。","detail":{"background":"視野缺失/暗點(scotoma)指『視野中某區域的視覺喪失』,源於『視覺「傳導路徑或視網膜」的局部損傷』:黃斑部退化(中央暗點)、外側膝狀體中風(對側視野缺損)、斜視(可致抑制性暗點/弱視)皆可造成。而『散光(astigmatism)是角膜/水晶體弧度不正導致「全視野成像模糊(屈光不正)」,並非局部視野「缺失」』。故A最不可能造成scotoma,為正解。散光可配柱面鏡矯正。故A正確。","options":{"A":"散光為屈光不正(全視野模糊)、非視野缺失—正解。","B":"斜視可致抑制性暗點。","C":"黃斑退化致中央暗點。","D":"外側膝狀體中風致視野缺損。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_111100-49":{"quick":"基底膜「靠近卵圓窗(基部)」較「窄而硬」、登錄「高頻」,故「越接近卵圓窗越狹窄負責高頻」正確;此題選最不適當為D。","detail":{"background":"耳蝸頻率拓樸(tonotopy):基底膜在『基部(近卵圓窗)較窄而硬→共振「高頻」』;在『頂端(近蝸頂)較寬而軟→共振「低頻」』。內毛細胞少但主司聽覺訊號分析(傳入),外毛細胞司主動放大與頻率銳化(A合理);scala media內淋巴高K低Na(B正確)。D「耳蝸尖端的孔道(蝸孔helicotrema)使內淋巴在前庭階與鼓室階相通」『不適當』—蝸孔相通的是『「外淋巴」(前庭階scala vestibuli與鼓室階scala tympani皆含外淋巴)』,而『內淋巴』在中間的scala media(不與之相通)。故D為正解(最不適當)。","options":{"A":"內毛細胞主司聽覺分析、外毛細胞司主動調諧,合理。","B":"scala media內淋巴高K,正確。","C":"近卵圓窗基底膜窄、登錄高頻,正確。","D":"稱蝸孔使「內淋巴」相通—錯誤(相通者為外淋巴),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_111100-52":{"quick":"視前區(preoptic area)的神經活動與體溫調節及性腺荷爾蒙分泌相關。","detail":{"background":"下視丘『視前區(preoptic area)』:是『體溫調節中樞(感測核心溫、驅動散熱)』、含『促性腺激素釋放(GnRH)相關神經元(調控性腺荷爾蒙)』,並有『腹外側視前核(VLPO)促進睡眠(以GABA抑制清醒系統)』。故A「與體溫調節及性腺荷爾蒙分泌有關」最適當。比較錯誤:B分泌orexin者是『外側下視丘』(非視前區;orexin促醒);C睡眠『開始後VLPO活動「增加」』(非低下);D它與RAS是『互相「抑制」(flip-flop)』而非互相增強。故A正確。","options":{"A":"視前區與體溫調節及性腺荷爾蒙有關—正解。","B":"orexin由外側下視丘分泌(非視前區)。","C":"睡眠時VLPO活動增加(非低下)。","D":"與RAS互相抑制(非增強)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_112020-48":{"quick":"水平半規管刺激引起的眼震,其快相方向與內淋巴流向相反—右轉時快相向右,答案為向右。","detail":{"background":"前庭眼反射與眼震(nystagmus):頭部『向右』水平轉動→右側水平半規管內淋巴相對『向壺腹(向左流)』、刺激增強→慢相眼球『代償性向左』、快相『回彈向右』。臨床命名以『快相方向』為眼震方向→『向右』。題意:眼震快相與頭轉同向(向右)、與內淋巴流向相反。故B(向右)正確。此為旋轉測試與冷熱試驗評估前庭功能的基礎。","options":{"A":"向左為慢相方向(非命名方向)。","B":"眼震(快相)向右—正解。","C":"非先左後右。","D":"非先右後左。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_112020-49":{"quick":"左側視覺忽略(忽略左半空間)源於「右側頂葉」損傷。","detail":{"background":"單側空間忽略(hemispatial neglect):病人忽略『對側(損傷對側)』半邊空間,常見於『「右側頂葉(下頂葉/頂顳交界)」損傷→忽略「左」半空間』(右頂葉主導空間注意,受損後左側被忽略且右側無法代償)。題述「忽略左半(畫紙左留白、左臉不化妝)、視網膜視神經正常」→『右側頂葉』損傷。故A正確。此為注意力/空間覺障礙(非單純視野缺損)。故A正確。","options":{"A":"右側頂葉損傷致左側空間忽略—正解。","B":"左頂葉損傷致右側忽略(較少且常被代償)。","C":"右枕葉致對側視野缺損(非忽略)。","D":"左枕葉致右視野缺損。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_112020-54":{"quick":"接受高頻聲波的毛細胞位於耳蝸基部。","detail":{"background":"耳蝸的頻率定位(tonotopy):基底膜『基部(近卵圓窗)較窄而硬→對「高頻」共振』;『頂端(蝸頂)較寬而軟→對「低頻」共振』。故接受高頻聲波興奮的毛細胞位於『耳蝸基部』。故A正確。此空間頻率編碼(位置學說)讓不同頻率刺激基底膜不同位置的毛細胞。臨床:噪音性與老年性聽損常先損基部高頻區→高頻聽力先下降。故A正確。","options":{"A":"耳蝸基部接受高頻—正解。","B":"蝸頂接受低頻。","C":"中央為中頻。","D":"非平均分布(有頻率定位)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113020-48":{"quick":"視網膜中只有節細胞(ganglion cell)能產生「動作電位」。","detail":{"background":"視網膜神經元的電生理特殊:光感受器(桿/錐)、雙極細胞、水平細胞、無軸突細胞大多以『分級電位(graded potential)』傳遞訊號(不產生典型動作電位);只有『神經節細胞(ganglion cell)』具軸突(組成視神經、需長距離傳導),『以全有全無的「動作電位」』把訊號送往中樞。故D正確。(無軸突細胞可有少量動作電位,但題以節細胞為標準答案。)故D正確。","options":{"A":"雙極細胞用分級電位。","B":"水平細胞用分級電位。","C":"無軸突細胞主要分級電位。","D":"節細胞產生動作電位—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113020-51":{"quick":"皮質傳出(投射)神經元—大型錐體細胞(Betz cell)位於第V層。","detail":{"background":"大腦皮質六層:傳『入』的視丘纖維主要終止於『第IV層(顆粒層)』(感覺皮質發達);傳『出/投射』的『大型錐體神經元(pyramidal/Betz cell)』胞體位於『第V層(內錐體層)』,其軸突下行至脊髓(皮質脊髓路)、腦幹或其他皮質。故傳出神經元在『第V層』。故D正確。(第VI層投射至視丘;II/III層為皮質間聯絡。)初級運動皮質(第IV層不明顯)第V層的Betz細胞最大。故D正確。","options":{"A":"第Ia層為分子層(少胞體)。","B":"第Ib非標準傳出層。","C":"第II層為外顆粒層(聯絡)。","D":"第V層為大型錐體(Betz)傳出神經元—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113090-48":{"quick":"Horner症候群為交感受損→「縮瞳」,故「瞳孔持續放大」最不可能出現。","detail":{"background":"Horner症候群(臉部交感神經路徑受損)三/四主徵:『「縮瞳(miosis)」(失去散瞳的放射肌張力)』、『眼瞼下垂(ptosis,Müller肌失神經)』、『同側臉部「無汗(額頭排汗減少)」』、『眼球內陷(enophthalmos,外觀)』。故『瞳孔「持續放大」』與Horner相反(交感受損應縮瞳)、『最不可能出現』。故C正確。臨床:病因含肺尖腫瘤(Pancoast)、頸動脈剝離、腦幹病變等。故C正確。","options":{"A":"額頭排汗減少(無汗)為Horner特徵。","B":"眼瞼下垂為Horner特徵。","C":"瞳孔放大與Horner相反(應縮瞳)—最不可能,為正解。","D":"眼球內陷為Horner特徵。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113090-49":{"quick":"語言優勢半球與人臉/負向表情辨識的優勢半球通常位於「不同」半球。","detail":{"background":"大腦半球互補式特化:多數人(含多數左利者)的『語言優勢半球在「左」腦』(Broca/Wernicke);而『臉孔辨識、情緒(尤其負向)表情辨識、視空間能力』則以『「右」腦』為優勢。故B「語言優勢半球與人臉/負向表情辨識優勢半球位於不同半球」正確。比較錯誤:A語言優勢多在『左』(非右);C將視空間轉時間表徵的描述不正確;D Wernicke失語是『理解障礙、言語流利但空洞』(非製造障礙、理解正常)。故B正確。","options":{"A":"語言優勢多在左腦(非右)。","B":"語言與臉孔/情緒辨識優勢在不同半球—正解。","C":"視空間轉時間表徵敘述不正確。","D":"Wernicke失語為理解障礙(非僅製造障礙)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113090-53":{"quick":"右視束損傷→兩眼「左」視野消失(左側同向偏盲)。","detail":{"background":"視交叉「後」的損傷造成『對側同向偏盲』:『右視束(optic tract)』含『兩眼「右側視網膜」纖維』(=右眼顳側+左眼鼻側),對應『「左半」視野』→右視束損傷致『兩眼「左」視野消失(左側同向偏盲)』。故A正確。比較:左視神經損傷→左眼全盲;視交叉損傷→雙顳側偏盲;視神經盤造成生理盲點(非半側偏盲)。故A正確。臨床:中風、腫瘤壓迫視束/視放射致同向偏盲。","options":{"A":"右視束損傷→兩眼左視野消失(左同向偏盲)—正解。","B":"左視神經損傷→左眼全盲。","C":"視交叉損傷→雙顳側偏盲。","D":"視神經盤造成生理盲點。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_113090-54":{"quick":"膝跳反射(牽張反射)為單突觸反射。","detail":{"background":"反射依突觸數分:『單突觸反射(monosynaptic)』=感覺神經元直接與運動神經元形成「一個突觸」,典型為『「牽張反射(肌牽張→Ia傳入→直接興奮α運動神經元→肌收縮)」,如「膝跳反射(knee jerk)」』。其餘為『多突觸反射』:縮回反射(屈肌退縮,經中間神經元)、條件反射(學習,多突觸)、伸肌反射等。故C正確。牽張反射是臨床深部肌腱反射(DTR)的基礎,用以評估反射弧完整性。故C正確。","options":{"A":"縮回反射為多突觸。","B":"條件反射為學習性多突觸。","C":"膝跳(牽張)反射為單突觸—正解。","D":"伸肌反射為多突觸。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114020-47":{"quick":"嗅球中每個嗅小球接收「同一類嗅覺受器」的軸突匯聚。","detail":{"background":"嗅覺處理:表現『「同一種」氣味受器的嗅覺感覺神經元,其軸突匯聚到嗅球中「同一個(或少數)嗅小球(glomerulus)」』,在此與僧帽/簇狀細胞形成突觸—形成氣味的空間編碼地圖。故A正確。比較錯誤:B嗅覺與情緒相關是因路徑連『杏仁核/邊緣系統』(不只海馬);C顆粒細胞是『抑制性中間神經元(GABA)抑制僧帽細胞』(非以麩胺酸刺激);D嗅覺第二信使是『cAMP』(非cGMP;cGMP是視覺)。故A正確。","options":{"A":"每個嗅小球接收同類受器軸突匯聚—正解。","B":"嗅覺-情緒經杏仁核/邊緣系統(不只海馬)。","C":"顆粒細胞為抑制性(GABA,非麩胺酸刺激)。","D":"嗅覺第二信使為cAMP(非cGMP)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114020-48":{"quick":"視交叉上核(SCN)在維持晝夜節律扮演最重要角色。","detail":{"background":"晝夜節律(circadian rhythm)的『主時鐘=下視丘「視交叉上核(SCN)」』,以約24小時內生節律調控睡眠、體溫、激素、進食等,並經視網膜-下視丘束接收光訊息與環境同步。室旁核(神經內分泌/自律)、視前區(體溫/睡眠)、上丘(視動反射)各有其功能,但維持晝夜節律以SCN最關鍵。故D正確。SCN損傷→晝夜節律喪失、睡眠-清醒失序。故D正確。","options":{"A":"室旁核管神經內分泌/自律。","B":"視前區管體溫/睡眠啟動。","C":"上丘管視動反射。","D":"視交叉上核為晝夜節律主時鐘—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114020-49":{"quick":"交感亢奮:節後纖維釋NE作用於虹膜放射肌α1受器→散瞳。","detail":{"background":"交感『節後』纖維大多釋放『正腎上腺素(NE)』作用於腎上腺素受體。逐項:D『NE作用於虹膜「放射肌」α1受器→「散瞳」』—正確;A心臟SA node加速是經『β1(非β2)』;B汗腺是交感的『例外—釋「乙醯膽鹼」作用於「蕈毒鹼(muscarinic)」受體』(非尼古丁);C支氣管平滑肌β2受體被NE/腎上腺素活化是『「舒張」(非收縮)』。故D正確。臨床:緊張時散瞳、心跳加速、支氣管擴張、流汗—交感「戰或逃」反應。故D正確。","options":{"A":"心跳加快經β1受體(非β2)。","B":"汗腺交感釋ACh作用於蕈毒鹼受體(非尼古丁)。","C":"支氣管β2活化為舒張(非收縮)。","D":"NE作用虹膜放射肌α1→散瞳—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114020-50":{"quick":"看近物時睫狀肌收縮、水晶體變厚以增聚焦力;「睫狀肌收縮但水晶體無法增聚焦稱近視」錯誤。","detail":{"background":"眼的調視(accommodation):看近物時『副交感使睫狀肌「收縮」→懸繫小帶鬆弛→水晶體因彈性變「厚(更凸)」→增加聚焦力(屈光力)』(C正確,看遠扁平、看近橢圓凸)。屈光不正:『遠視(hyperopia)=眼軸短/屈光力不足,看遠物焦點落「視網膜「後」』(A正確);『近視(myopia)=眼軸長/屈光力過強,焦點落視網膜「前」』;『散光=角膜/水晶體弧度不正』(D正確)。故B「看近物睫狀肌收縮但水晶體無法增聚焦稱近視」『錯誤』(該描述近似「老花presbyopia」的調視力下降,且近視定義不對)。故B為正解。","options":{"A":"遠視焦點落視網膜後,正確。","B":"稱睫狀肌收縮但無法增聚焦為近視—錯誤(此屬調視障礙/老花,近視定義不符),為正解。","C":"調視時水晶體變凸,正確。","D":"散光為弧度不正,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114090-50":{"quick":"杏仁核(amygdala)與恐懼情緒最直接相關。","detail":{"background":"『杏仁核(amygdaloid nucleus)』是邊緣系統處理『恐懼與威脅情緒』的核心—偵測威脅、產生恐懼反應(自主與行為)、並形成恐懼制約記憶。故與恐懼最直接相關者為杏仁核(C)。比較:視上核(分泌ADH)、視交叉上核(晝夜節律)、海馬迴(陳述性記憶/情境)。故C正確。臨床:杏仁核損傷→恐懼辨識與反應減弱;過度活化與焦慮/創傷後壓力症相關。","options":{"A":"視上核分泌ADH。","B":"視交叉上核管晝夜節律。","C":"杏仁核與恐懼情緒最相關—正解。","D":"海馬迴管陳述性記憶。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114090-53":{"quick":"垂直直線加速(垂直移動)由球囊(saccule)偵測。","detail":{"background":"耳石器分工:『球囊(saccule)的斑為「垂直」方位→偵測「垂直」直線加速度(如上下移動、電梯)』;『橢圓囊(utricle)為「水平」方位→偵測水平直線加速與頭傾』。故感受『垂直加速』主要由『球囊』。故C正確。半規管偵測角加速、柯蒂氏器司聽覺。故C正確。","options":{"A":"半規管偵測角加速度。","B":"橢圓囊偵測水平加速。","C":"球囊偵測垂直加速—正解。","D":"柯蒂氏器為聽覺。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_114090-54":{"quick":"副交感興奮使水晶體變「厚變凸(非變薄變長)」以利近看,故此項最不可能。","detail":{"background":"副交感興奮(看近物的調視):『睫狀肌環肌「收縮」(A正確)→懸繫小帶(zonule)張力「降低/鬆弛」(B正確)→水晶體因本身彈性而「變厚、變凸(增屈光力,利近距離)」、且「瞳孔縮小(D正確,括約肌收縮)」』。故C「水晶體變薄變長」『最不可能』—副交感調視應使水晶體變『厚而凸』(非變薄變長)。故C為正解。（變薄扁平是看遠物、睫狀肌放鬆時。)","options":{"A":"睫狀體環肌收縮,正確。","B":"懸繫小帶張力變低,正確。","C":"稱水晶體變薄變長—最不可能(應變厚變凸),為正解。","D":"瞳孔變小,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_115020-49":{"quick":"錐細胞在「黑暗」時cGMP大量產生(維持暗電流)。","detail":{"background":"光感受器(桿/錐)的光傳導:『黑暗中』鳥苷酸環化酶活性高、『cGMP大量產生且維持高濃度』→cGMP-gated通道開啟、Na⁺/Ca²⁺內流(暗電流)、細胞去極化、持續釋放麩胺酸。『光照時』活化視蛋白→transducin→PDE分解cGMP→cGMP下降→通道關閉→過極化。故黑暗時cGMP大量產生(B)。錐與桿機制相同(用cGMP,非cAMP)。故B正確。","options":{"A":"cAMP非光傳導門控分子。","B":"黑暗時cGMP大量產生—正解。","C":"cAMP非相關。","D":"cGMP在光照才下降(黑暗為高)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Principles of Neural Science》"]}},"med1_106100-54":{"quick":"肌漿網上的ryanodine受器活化時釋出鈣離子啟動收縮。","detail":{"background":"骨骼肌興奮收縮偶聯:動作電位沿T小管傳入→T小管膜的『電壓感應器dihydropyridine受器(DHPR)』構型改變→『機械式連動肌漿網上的「ryanodine受器(RyR)」開啟』→肌漿網內鈣大量釋入細胞質→Ca²⁺結合troponin C→收縮。故釋鈣的肌漿網受器為ryanodine受器。故D正確。nicotinic/muscarinic是乙醯膽鹼受體(在NMJ);DHPR在T小管(非肌漿網)。臨床:RyR1突變→惡性高熱(吸入麻醉劑誘發鈣失控釋放)。","options":{"A":"nicotinic受器在運動終板(NMJ)。","B":"muscarinic為副交感受體。","C":"DHPR在T小管膜(電壓感應器)。","D":"ryanodine受器在肌漿網、釋鈣—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_106100-55":{"quick":"肌凝蛋白輕鏈磷酸酶使MLC去磷酸化、抑制橫橋循環(平滑肌舒張)。","detail":{"background":"平滑肌收縮調控:Ca²⁺-calmodulin活化『肌凝蛋白輕鏈激酶(MLCK)』→使『肌凝蛋白輕鏈(MLC)「磷酸化」→啟動橫橋循環、收縮』。而『肌凝蛋白輕鏈「磷酸酶(MLCP)」作用相反:使MLC「去磷酸化」→「抑制橫橋循環、平滑肌舒張」』。故B正確。MLCP不與Ca²⁺結合、不抑制鈣釋放(那些是其他機制)。臨床:Rho激酶抑制MLCP(增加收縮敏感性);NO-cGMP則促進舒張。故B正確。","options":{"A":"磷酸化、促收縮者為MLC「激酶」(非磷酸酶)。","B":"MLCP使MLC去磷酸化、抑制橫橋循環—正解。","C":"MLCP不與Ca結合。","D":"MLCP不直接抑制鈣釋放。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_107100-54":{"quick":"運動終板上的nicotinic(菸鹼型)乙醯膽鹼受器活化可啟動肌肉動作電位。","detail":{"background":"神經肌肉接合(NMJ):運動神經末梢釋放乙醯膽鹼→與運動終板(肌膜)上的『菸鹼型(nicotinic)乙醯膽鹼受器』結合→該受器是『配體閘控陽離子通道』,開啟使Na⁺內流→產生終板電位(EPP)→達閾值觸發肌膜『動作電位』→傳入T小管啟動收縮。故啟動肌肉動作電位的終板受器為nicotinic受器。故A正確。muscarinic在副交感標的;DHPR/RyR在偶聯下游。臨床:重症肌無力為抗nicotinic受體抗體;箭毒(curare)阻斷此受體致麻痺。故A正確。","options":{"A":"nicotinic受器在終板、啟動肌動作電位—正解。","B":"muscarinic為副交感受體(非NMJ)。","C":"DHPR在T小管(偶聯下游)。","D":"RyR在肌漿網(釋鈣)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_107100-55":{"quick":"平滑肌收縮中Ca²⁺須與calmodulin結合(再活化MLCK)。","detail":{"background":"平滑肌『無troponin』,其鈣調控走『calmodulin路徑』:胞內Ca²⁺上升→『Ca²⁺與calmodulin(攜鈣素)結合』→活化『肌凝蛋白輕鏈激酶(MLCK)』→使肌凝蛋白輕鏈磷酸化→橫橋循環、收縮。故Ca²⁺結合的對象是calmodulin。故D正確。(骨骼/心肌則Ca²⁺結合troponin C。)平滑肌收縮慢、耗能少、可持久(latch狀態)。故D正確。","options":{"A":"actin為細肌絲主體(非鈣直接結合的調節點)。","B":"myosin非鈣直接結合對象。","C":"troponin是骨骼/心肌的鈣結合蛋白(平滑肌無)。","D":"平滑肌Ca²⁺結合calmodulin—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-51":{"quick":"平滑肌纖維的ATPase活性最低(收縮慢、耗能省)。","detail":{"background":"肌纖維依ATPase(肌凝蛋白)活性與收縮速度:骨骼肌的『快肌(fast-glycolytic、fast-oxidative-glycolytic)』ATPase活性高、收縮快;『慢氧化肌(slow-oxidative)』中等偏低;而『平滑肌(smooth muscle)』的肌凝蛋白ATPase活性『最低』—故收縮極慢、但耗能少、可長時間維持張力(經濟的latch機制)。故B正確。平滑肌雖慢,卻能以低能量維持血管/內臟長時間收縮。故B正確。","options":{"A":"慢氧化肌ATPase中低、仍高於平滑肌。","B":"平滑肌ATPase活性最低—正解。","C":"快氧化糖解肌ATPase高。","D":"快糖解肌ATPase最高。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-52":{"quick":"tropomyosin移位暴露actin上的肌凝蛋白結合位、使收縮進行。","detail":{"background":"骨骼肌收縮的鈣開關:靜息時『tropomyosin覆蓋actin上的肌凝蛋白結合位』、阻止橫橋形成。收縮時Ca²⁺與『troponin C』結合→troponin構型改變→『拉動tropomyosin移位→「暴露actin上的肌凝蛋白結合位」』→肌凝蛋白頭結合actin、行橫橋循環、肌絲滑動收縮。故B正確。(A方向錯—Ca結合troponin才啟動;C橫橋循環細節非tropomyosin直接作用;D tropomyosin不與myosin接合。)故B正確。","options":{"A":"Ca須「結合」troponin(非離開)才啟動收縮。","B":"暴露actin的肌凝蛋白結合位、使收縮—正解。","C":"ATP水解供能是橫橋循環、非tropomyosin變化直接致。","D":"tropomyosin不與myosin接合。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108100-54":{"quick":"DHPR是位於T小管膜上的電壓閘控鈣通道(兼電壓感應器)。","detail":{"background":"骨骼肌的『dihydropyridine受器(DHPR)』位於『「T小管(橫管)膜」上,是「電壓閘控(voltage-gated)」的L型鈣通道』—在骨骼肌主要作為『電壓感應器』,膜去極化使其構型改變、『機械式連動肌漿網上的RyR釋鈣』(骨骼肌的鈣內流非啟動收縮的主因)。故C正確。比較錯誤:A(ligand-gated)、B/D(位於肌漿網)皆錯—DHPR在T小管、電壓閘控。(心肌的DHPR則讓鈣內流觸發CICR。)故C正確。","options":{"A":"DHPR為電壓閘控(非ligand-gated)。","B":"DHPR在T小管(非肌漿網)。","C":"DHPR在T小管膜、電壓閘控鈣通道—正解。","D":"DHPR非位於肌漿網、非ligand-gated。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108100-55":{"quick":"骨骼肌不靠Ca-calmodulin-MLCK機制(那是平滑肌),故此敘述錯誤。","detail":{"background":"骨骼肌特性:A收縮力來自actin-myosin相互作用(正確);C『H帶位於肌節中央(僅含粗肌絲、無重疊處)』(正確);D『Z線兩側的I帶主要由細肌絲actin組成(僅細肌絲、無粗肌絲)』(正確)。B「Ca²⁺與calmodulin結合活化MLCK而收縮」『錯誤』—此為『平滑肌』機制;『骨骼肌』是『Ca²⁺與troponin C結合、移位tropomyosin』而收縮(無calmodulin/MLCK路徑)。故B為正解。記憶:骨骼/心肌=troponin;平滑肌=calmodulin/MLCK。","options":{"A":"收縮力來自actin-myosin互動,正確。","B":"稱骨骼肌靠Ca-calmodulin-MLCK—錯誤(此為平滑肌機制),為正解。","C":"H帶在肌節中央,正確。","D":"I帶主要由actin組成,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109020-56":{"quick":"終板電位發生於骨骼肌肌膜、屬興奮性電位。","detail":{"background":"終板電位(end plate potential, EPP):是乙醯膽鹼作用於『骨骼肌「肌細胞膜(運動終板)」上菸鹼受體』、開啟陽離子通道使Na⁺內流所產生的『「興奮性」局部去極化電位』(相當於骨骼肌的興奮性突觸後電位);足夠大時觸發肌膜動作電位。故A「發生在骨骼肌肌膜、屬興奮性」正確。它發生在『肌膜(突觸後)』而非運動神經元(突觸前);且為興奮性(非抑制性)。故A正確。臨床:重症肌無力EPP變小、不易達閾值致肌無力。","options":{"A":"發生於骨骼肌肌膜、興奮性—正解。","B":"發生於肌膜(突觸後),非運動神經元。","C":"為興奮性(非抑制性)。","D":"非運動神經元、非抑制性。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109020-57":{"quick":"募集順序:慢氧化→快氧化糖解→快糖解(由小到大運動單位)。","detail":{"background":"運動單位的募集遵循『大小原則(size principle)』:依需求由小而大依序徵召。對應肌纖維類型:『站立(低力/持久)→「慢氧化肌(slow-oxidative,第I型,抗疲勞)」』;『走路(中力)→「快氧化糖解肌(fast-oxidative-glycolytic,IIa)」』;『快跑/爆發(高力)→「快糖解肌(fast-glycolytic,IIx/IIb,力大但易疲勞)」』。故順序為slow-oxidative→fast-oxidative-glycolytic→fast-glycolytic(B)。故B正確。","options":{"A":"順序顛倒。","B":"慢氧化→快氧化糖解→快糖解—正解(大小原則)。","C":"中間順序錯。","D":"起始非快氧化糖解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109100-55":{"quick":"重症肌無力源於菸鹼型乙醯膽鹼受體缺損,可用乙醯膽鹼酯酶抑制劑治療。","detail":{"background":"重症肌無力(myasthenia gravis):自體抗體攻擊『神經肌肉接合「後膜」的菸鹼型乙醯膽鹼受體(nAChR)』使其數目減少→終板電位變小、易疲勞性肌無力(眼瞼下垂、複視、活動後加重)。治療用『乙醯膽鹼酯酶抑制劑(如pyridostigmine)』減少ACh分解、延長其作用以增強傳遞。故D正確。比較:肌肉痙攣、低血鈣手足搐搦、肌肉失養症(dystrophin缺陷)機制不同。故D正確。臨床:亦用胸腺切除、免疫抑制;Tensilon試驗診斷。","options":{"A":"肌肉痙攣非受體缺損。","B":"低血鈣手足搐搦為鈣問題。","C":"肌肉失養症為dystrophin缺陷。","D":"重症肌無力(nAChR缺損)、用膽鹼酯酶抑制劑—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-54":{"quick":"等長收縮潛伏期較短、但完成一次收縮所需時間較長(較慢)。","detail":{"background":"等長(isometric,長度不變、張力增)vs等張(isotonic,張力固定、長度縮短)單次收縮比較:等張收縮須先在『等長期建立足夠張力以克服負重』後才開始縮短,故其『縮短的「起始(可見運動的潛伏期)」較「晚」』、即等長收縮的潛伏期相對「短」;但就『完成「整次收縮(收縮+舒張)」的時間』而言,等張收縮較快結束,故『等長收縮所需時間較「長」』。故C「等長潛伏期較短、但完成收縮所需時間較長」正確。此反映負重影響收縮的時間特性。","options":{"A":"非皆較短。","B":"非皆較長。","C":"等長潛伏期短、完成時間長—正解。","D":"方向相反。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-55":{"quick":"骨骼肌收縮所需鈣離子主要來自肌漿網。","detail":{"background":"骨骼肌興奮收縮偶聯:動作電位經T小管使DHPR連動RyR,『鈣離子「主要由肌漿網(sarcoplasmic reticulum)」釋出』至細胞質啟動收縮(骨骼肌幾乎「不」依賴細胞外鈣內流)。故主要來源為肌漿網(C)。比較:『心肌』收縮需細胞外鈣內流觸發鈣誘發鈣釋放(CICR);『平滑肌』兼用細胞外鈣與肌漿網鈣。故C正確。臨床:肌漿網鈣幫浦(SERCA)再回收鈣使肌肉舒張。","options":{"A":"T小管傳遞電訊號、非鈣來源。","B":"粒線體非收縮鈣主源。","C":"骨骼肌鈣主要來自肌漿網—正解。","D":"細胞外液鈣為心/平滑肌觸發來源(骨骼肌少依賴)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111020-54":{"quick":"肉毒桿菌毒素破壞SNARE蛋白、阻止乙醯膽鹼釋放而使肌肉鬆弛。","detail":{"background":"肉毒桿菌毒素(botulinum toxin)機轉:進入運動神經末梢、『裂解SNARE蛋白(如SNAP-25/syntaxin/VAMP)』→突觸小泡無法與細胞膜融合→『阻止乙醯膽鹼釋放』→神經肌肉傳遞被阻斷→『弛緩性麻痺(肌肉鬆弛)』。臨床利用此鬆弛作用治療局部肌肉痙攣、斜頸、眼瞼痙攣、多汗與除皺。故B正確。比較:破傷風毒素則阻止抑制性傳導物質釋放致痙攣性麻痺。故B正確。","options":{"A":"非阻斷鈣通道。","B":"破壞SNARE蛋白、阻止ACh釋放—正解。","C":"非抑制ACh受體(那是箭毒)。","D":"非抑制乙醯膽鹼酶(那會增ACh)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111020-57":{"quick":"屍僵因ATP耗竭、肌凝蛋白橫橋無法自actin脫離而僵硬。","detail":{"background":"橫橋循環的脫離需『ATP結合於肌凝蛋白頭』使其自actin釋放。死亡後『ATP耗竭、無法再生』→『肌凝蛋白橫橋「卡」在actin上無法脫離』→肌肉持續僵硬=『屍僵(rigor mortis)』。同時鈣幫浦失能使鈣外漏、持續暴露結合位加劇。故主因是「橫橋無法自actin脫離(因缺ATP)」(C)。故C正確。屍僵約死後數小時出現、1–2天後因自溶而緩解。故C正確。","options":{"A":"屍僵時鈣反而外漏增加(非無法結合troponin)。","B":"tropomyosin持續覆蓋會「阻止」結合,與屍僵的持續結合相反。","C":"橫橋無法自actin脫離(缺ATP)—正解。","D":"屍僵核心是缺ATP使橋無法脫離(非ATP無法水解)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111100-55":{"quick":"負重越重收縮「期間」不會越長(反而縮短量小、較快結束),故此敘述錯誤。","detail":{"background":"負重(load)對等張單次收縮的影響:『負重越重→須先在等長期建立更大張力(故潛伏期越長A正確;產生張力越大D正確)、縮短「速度」越慢(B正確)、縮短「幅度」越小』。但『「收縮持續期間(twitch duration)」並非越重越長』—重負重下肌肉縮短少、較早回到原長,故C「負重越重收縮期間越長」『錯誤』。此即力-速度關係(force-velocity)的表現。故C為正解。","options":{"A":"負重越重潛伏期越長,正確。","B":"負重越重縮短速度越慢,正確。","C":"稱負重越重收縮期間越長—錯誤,為正解。","D":"負重越重需產生張力越大,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_112020-51":{"quick":"Ia型感覺神經元「能」傳送肌肉被拉長的速度與長度訊息,故「不能傳送」最不適當。","detail":{"background":"肌梭的Ia型(初級)感覺末梢『纏繞於各型梭內肌纖維(核袋與核鏈)中央』,『偵測肌肉「長度」與長度「變化速率(動態)」並向中樞傳送』。故A「不能傳送梭外肌被拉長的速度或張力訊息」『最不適當』—Ia確實傳送長度與速度訊息(只是「張力」由高爾基腱器Ib傳送,長度/速度由肌梭Ia)。其餘B(分布中央)、C/D(γ運動神經元活化增其敏感度)皆正確。故A為正解(最不適當)。記憶:肌梭(Ia/II)感長度與速度、Golgi腱器(Ib)感張力。","options":{"A":"稱Ia不能傳送被拉長速度/張力訊息—最不適當(Ia傳送長度與速度),為正解。","B":"Ia受器分布梭內纖維中央,正確。","C":"動態γ增Ia對速度敏感,正確。","D":"γ運動神經元增Ia敏感度,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_112020-55":{"quick":"支配「有氧肌(慢肌)」的運動神經元胞體較「小」(非較大),故此敘述錯誤。","detail":{"background":"有氧(慢氧化/紅肌,第I型)vs無氧(快糖解/白肌,第II型)纖維:A有氧肌富肌紅蛋白與微血管故稱『紅肌』(正確);B有氧肌纖維『直徑較細』(正確);D依大小原則『先募集小運動單位(有氧/慢肌),再募集大運動單位(無氧/快肌)』(正確)。C「支配有氧肌的運動神經元胞體較大」『錯誤』—『慢肌(有氧)由「小」運動神經元支配(低閾值、先募集)』;快肌由大神經元支配。故C為正解。","options":{"A":"有氧肌=紅肌,正確。","B":"有氧肌纖維直徑較小,正確。","C":"稱支配有氧肌的神經元較大—錯誤(應較小),為正解。","D":"先募集有氧(小)運動單位,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_112020-56":{"quick":"ATP結合肌凝蛋白頭可直接使actin與myosin分離。","detail":{"background":"橫橋循環:肌凝蛋白頭結合actin形成橫橋(力衝程後處於僵直態);『「ATP」結合於肌凝蛋白頭→使其對actin親和力下降→「橫橋自actin脫離」』;隨後ATP水解使頭部重新蓄勢。故『直接使actin與myosin分離者為ATP』(A)。Ca²⁺是「啟動」收縮(暴露結合位)而非分離;MLCK/MLCP是平滑肌調節。故A正確。此即缺ATP時屍僵(橋無法脫離)的原理。故A正確。","options":{"A":"ATP結合使橫橋自actin脫離—正解。","B":"Ca²⁺啟動結合(非使分離)。","C":"MLCP為平滑肌調節。","D":"MLCK為平滑肌收縮激酶。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113020-55":{"quick":"平滑肌收縮的鈣結合到攜鈣素(calmodulin)。","detail":{"background":"平滑肌『無troponin』,鈣調控走calmodulin路徑:Ca²⁺與『攜鈣素(calmodulin)』結合→Ca-calmodulin活化肌凝蛋白輕鏈激酶(MLCK)→肌凝蛋白輕鏈磷酸化→橫橋循環收縮。故誘發平滑肌收縮的鈣結合對象為calmodulin。故C正確。骨骼/心肌則結合troponin C。tropomyosin、myosin light chain非鈣直接結合點。故C正確。","options":{"A":"troponin為骨骼/心肌的鈣結合蛋白(平滑肌無)。","B":"tropomyosin非鈣直接結合點。","C":"平滑肌鈣結合calmodulin—正解。","D":"肌凝蛋白輕鏈是MLCK的受質(非鈣直接結合)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113090-50":{"quick":"終板電位發生在「突觸後的肌膜」,稱其發生在神經元軸突末梢膜上最不適當。","detail":{"background":"神經肌肉接合(NMJ):A接合後方為骨骼肌梭外纖維、前方為α運動神經元(正確);C前方釋乙醯膽鹼、後方肌膜的ACh受體為陽離子通道(正確);D迷你終板電位(MEPP)反映單一囊泡自發釋放、可推論前方釋放機制(正確)。B「終板電位(EPP)是指接合「前方」運動神經元軸突末梢膜上的電位」『最不適當』—EPP是發生於『「突觸後」的肌細胞膜(運動終板)』的去極化電位(非突觸前神經末梢)。故B為正解(最不適當)。","options":{"A":"接合後為梭外肌、前為α運動神經元,正確。","B":"稱EPP在突觸前神經末梢膜—最不適當(EPP在突觸後肌膜),為正解。","C":"前釋ACh、後膜受體為陽離子通道,正確。","D":"MEPP可推論釋放機制,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113090-55":{"quick":"磷酸肌酸(creatine phosphate)能以最快速度提供ATP。","detail":{"background":"肌肉ATP供應的速度:『「磷酸肌酸(creatine phosphate/磷酸肌胺酸)」最快』—經肌酸激酶把高能磷酸基「瞬間」轉給ADP生成ATP,供運動最初數秒的爆發需求;其次糖解(無氧,中速)、肝醣分解,『有氧磷酸化最慢但產量最大(持久運動)』。故最快者為磷酸肌酸。故D正確。運動能量供應序:ATP/磷酸肌酸(秒)→無氧糖解(分鐘)→有氧氧化(持久)。故D正確。","options":{"A":"有氧磷酸化最慢(但量大持久)。","B":"糖解中速。","C":"肝糖分解中速。","D":"磷酸肌酸最快提供ATP—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113090-56":{"quick":"具自發性去極化(節律性)的是單一單位平滑肌與特化心肌。","detail":{"background":"具『自發性去極化(自動節律性/pacemaker activity)』的肌細胞:『單一單位平滑肌(single-unit/visceral smooth muscle,如腸胃、子宮,經間隙接合同步、有慢波)』與『特化心肌(竇房結、房室結等節律組織)』—兩者皆能自發產生節律性電位、不需神經刺激即收縮。故D正確。『骨骼肌與多單位平滑肌』則需神經刺激觸發(無自發節律)。故D正確。臨床:竇房結是心臟主節律點;腸道慢波由ICC產生。","options":{"A":"骨骼肌無自發去極化。","B":"多單位平滑肌需神經刺激。","C":"多單位平滑肌無自發節律。","D":"單一單位平滑肌與特化心肌有自發去極化—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114020-55":{"quick":"屍僵主因是骨骼肌細胞內缺乏ATP。","detail":{"background":"屍僵(rigor mortis):死亡後『ATP耗竭且無法再生』→橫橋循環中肌凝蛋白頭『需ATP才能自actin脫離』,缺ATP使『橫橋卡在actin上無法分離』→肌肉持續僵硬。同時肌漿網鈣幫浦失能、鈣外漏持續觸發結合。故主因為『缺乏ATP』(D)。故D正確。乳酸累積、肝醣耗盡是伴隨現象、非直接機制;細胞內鈣反而上升(非缺鈣)。故D正確。","options":{"A":"乳酸累積為伴隨(非主因)。","B":"屍僵時胞內鈣上升(非缺鈣)。","C":"肝醣耗盡為伴隨。","D":"缺乏ATP使橫橋無法脫離—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114020-56":{"quick":"長度-張力關係:粗細肌絲橫橋可結合數目越多、產生張力越大。","detail":{"background":"骨骼肌『長度-張力關係』:主動張力取決於『粗、細肌絲「重疊」程度(可形成的橫橋數)』—在『最適長度(optimal length,約放鬆長度的100%、肌節~2.0–2.2μm)』時重疊最佳、橫橋最多、張力最大;過長(肌絲分離、橋少)或過短(肌絲相撞)張力皆下降。故D「可結合橫橋數越多張力越大」正確。比較錯誤:A範圍與單調關係不正確(超過最適長度張力反降);B最適長度約『100%』(非175%);C被動張力『會隨拉長而增加(結締組織彈性)』。故D正確。","options":{"A":"超過最適長度張力反而下降(非越長越大)。","B":"最適長度約放鬆長度100%(非175%)。","C":"被動張力隨拉長而增加。","D":"橫橋結合數越多張力越大—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-48":{"quick":"肉毒桿菌毒素使神經末梢難釋ACh、EPP變小、終致肌肉無法收縮,敘述最適當。","detail":{"background":"終板電位(EPP)正確概念(D):『肉毒桿菌毒素阻止運動神經末梢釋放乙醯膽鹼→EPP變小→無法達閾值→肌肉無法收縮(弛緩性麻痺)』—正確。比較錯誤:A乙醯膽鹼作用於肌膜的『「菸鹼型(nicotinic)」受體』(非蕈毒型muscarinic);B EPP是『Na⁺內流』造成的『局部去極化(非鉀內流、非動作電位本身)』;C沿T小管傳入引發肌漿網釋鈣的是『「動作電位」』而非EPP(EPP是觸發動作電位的局部電位)。故D正確。","options":{"A":"ACh作用於菸鹼型受體(非蕈毒型)。","B":"EPP由Na⁺內流造成(非鉀、非動作電位)。","C":"沿T小管傳入釋鈣者為動作電位(非EPP)。","D":"肉毒桿菌使ACh難釋放、EPP變小致無法收縮—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-55":{"quick":"運動最初幾秒ATP最可能來自磷酸肌胺酸(creatine phosphate)。","detail":{"background":"肌肉能量供應的時間序:『運動「最初數秒」靠現存ATP與「磷酸肌胺酸(creatine phosphate)」快速再生ATP(肌酸激酶)』;接著(數十秒至分鐘)『無氧糖解(葡萄糖/肝醣)』;持久運動則『有氧氧化(葡萄糖、「脂肪酸」)』。故最初幾秒主要來源為磷酸肌胺酸。故D正確。脂肪酸供能慢、用於長時間運動;蛋白質非主要燃料。故D正確。","options":{"A":"脂肪酸供能慢、用於長時間運動。","B":"葡萄糖(糖解)為其後數十秒。","C":"蛋白質非主要燃料。","D":"最初幾秒靠磷酸肌胺酸—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-56":{"quick":"2X型(快糖解)纖維較第1型更易疲勞。","detail":{"background":"骨骼肌纖維型:『第1型(慢氧化、紅肌)』粒線體多、肌紅蛋白與微血管豐富、抗疲勞、適持久;『第2X(/2B,快糖解、白肌)』粒線體少、肌紅蛋白與微血管少、收縮快力大但『易疲勞』、適爆發。故與第1型相比,2X型『更容易疲勞』(B)。A、C、D所述(粒線體多、肌紅蛋白豐富、微血管多)皆為『第1型』特徵、非2X型。故B正確。","options":{"A":"2X型粒線體較少(非更多)。","B":"2X型更易疲勞—正解。","C":"2X型肌紅蛋白較少。","D":"2X型微血管供應較少。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_115020-55":{"quick":"骨骼肌鈣經troponin啟動、平滑肌鈣經calmodulin啟動,敘述最適當。","detail":{"background":"鈣啟動收縮的差異:『骨骼肌(與心肌)』—Ca²⁺與『細肌絲上的「troponin C」(調節蛋白)』結合、移位tropomyosin暴露結合位;『平滑肌』—『無troponin』,Ca²⁺與『「攜鈣素calmodulin」』結合、活化MLCK使肌凝蛋白輕鏈磷酸化。故D「骨骼肌靠troponin、平滑肌靠calmodulin」最適當。比較錯誤:A平滑肌非鈣「直接」結合myosin;B平滑肌鈣非結合細肌絲調節蛋白(無troponin);C骨骼肌非靠MLCK。故D正確。","options":{"A":"平滑肌鈣非直接結合myosin(經calmodulin)。","B":"平滑肌無細肌絲troponin。","C":"骨骼肌非靠MLCK(平滑肌才是)。","D":"骨骼肌troponin、平滑肌calmodulin—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_106100-57":{"quick":"主動脈瓣逆流以「血量增加」(增前負荷、心搏量)代償。","detail":{"background":"主動脈瓣逆流(aortic regurgitation):舒張期血液由主動脈逆流回左心室→有效前向心輸出減少。代償機制:腎臟『「保留」鹽水使血量增加(RAAS活化、非排出)』→增加前負荷、左心室擴張(離心性肥大)、增大心搏量以維持前向輸出;心率亦可增快縮短舒張期以減少逆流時間。故B「血量增加」正確。比較錯誤:A右心室肥大與左側瓣膜逆流代償無關;C腎排鹽水增加會「減少」血量(與代償相反);D ANP分泌增加促排鈉利尿(亦相反)。故B正確。","options":{"A":"右心室肥大與左側AR代償無關。","B":"血量增加(增前負荷與心搏量)—正解。","C":"腎排鹽水增加會減血量(與代償相反)。","D":"ANP利尿與代償相反。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_106100-59":{"quick":"乳突肌/腱索受損→房室瓣關閉不全→收縮期血液逆流回心房。","detail":{"background":"房室瓣(二尖瓣/三尖瓣)藉『腱索(chordae tendineae)連於乳突肌』,在『心室收縮時拉住瓣膜防止其翻入心房』。若『乳突肌麻痺或腱索受損/斷裂』→瓣膜無法緊閉→『心室收縮期血液逆流回心房(房室瓣閉鎖不全/逆流)』。故C正確。比較:A/B(無法開啟/狹窄)與此機制相反;D是傳導(電)異常,非瓣膜結構問題。故C正確。臨床:急性腱索斷裂(心肌梗塞乳突肌斷裂)致急性二尖瓣逆流、肺水腫。","options":{"A":"瓣膜仍能開啟(問題在關不緊)。","B":"非狹窄(是關閉不全)。","C":"收縮期血液逆流回心房—正解。","D":"非電傳導異常。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-55":{"quick":"舒張期心雜音由「房室瓣狹窄」與「主動脈瓣閉鎖不全」引起。","detail":{"background":"心雜音時相對應血流異常時機:『收縮期雜音』=房室瓣「閉鎖不全(逆流)」或半月瓣(主動脈/肺動脈)「狹窄」;『舒張期雜音』=房室瓣(二尖/三尖瓣)「狹窄」(舒張期心室充填時血流經狹窄瓣)或半月瓣(主動脈/肺動脈)「閉鎖不全(逆流)」(舒張期血液逆流回心室)。故舒張期雜音由『房室瓣狹窄+主動脈瓣閉鎖不全』(C)。故C正確。記憶:狹窄在「血流通過該瓣的時相」雜音、閉鎖不全在「該瓣應關閉的時相」雜音。","options":{"A":"主動脈瓣狹窄為收縮期雜音。","B":"房室瓣閉鎖不全為收縮期雜音。","C":"房室瓣狹窄+主動脈瓣閉鎖不全=舒張期雜音—正解。","D":"房室瓣閉鎖不全(收縮期)+主動脈瓣狹窄(收縮期)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-56":{"quick":"抑制鈉鉀幫浦(如毛地黃)增加心肌收縮力。","detail":{"background":"增加心肌收縮力(contractility)的關鍵是『提高胞內鈣』。『抑制細胞膜Na⁺-K⁺-ATPase(毛地黃digoxin)』→胞內Na⁺升高→Na⁺/Ca²⁺交換子排鈣減少→『胞內Ca²⁺增加→收縮力上升』。故C正確。比較錯誤:A促進肌漿網Ca²⁺幫浦(SERCA)會把鈣快速回收→收縮力『下降』;B抑制RyR會減少釋鈣→收縮力下降;D增加Na/Ca交換子活性會把鈣排出更多→收縮力下降。故C正確。臨床:毛地黃為正性肌力藥(治收縮性心衰),但治療窗窄易中毒。","options":{"A":"促進SERCA回收鈣→收縮力下降。","B":"抑制RyR減少釋鈣→收縮力下降。","C":"抑制鈉鉀幫浦(毛地黃)增收縮力—正解。","D":"增Na/Ca交換排鈣→收縮力下降。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-57":{"quick":"心房顫動:QRS正常但R-R間隔不規則(無P波)。","detail":{"background":"心房顫動(atrial fibrillation)特徵:心房多處微折返、無協調收縮→『心電圖「無清楚P波(代以顫動波f)」、QRS波形「正常(因經正常His-Purkinje下傳)」但「R-R間隔絕對不規則」(因房室結不規則下傳)』。故B正確。比較錯誤:A P波應「消失/不明顯」(非明顯);C休息時心室充填靠被動充填仍佔大部分,失去心房收縮約損失『10–30%(非30–40%以上)』;D房室結反而常使心室率「偏快(快速心房顫動)」(非明顯下降)。故B正確。臨床:Af增中風(心房血栓)風險,需抗凝。","options":{"A":"P波應消失(非更明顯)。","B":"QRS正常但R-R不規則—正解。","C":"失去心房收縮約損10–30%(非30–40%以上)。","D":"房室不規則下傳常致心室率偏快。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109020-59":{"quick":"等容舒張期心室壓「大於或等於」心房壓(瓣膜仍關),敘述最符合。","detail":{"background":"心動週期壓力關係:『等容舒張期(isovolumic relaxation)』在主動脈瓣已關、房室瓣尚未開之間,心室壓正快速下降但『仍「大於」心房壓』(故房室瓣仍關閉),直到心室壓降至低於心房壓房室瓣才開、充填開始。故D「等容舒張期心室壓≥心房壓」正確。比較錯誤:A充填期心房壓略高於心室(才能充填),但與主動脈壓比較需分期;B射血期心室壓『高於』主動脈壓(才射血,非小於);C等容收縮期心室壓『小於』主動脈壓(尚未達開瓣,非大於等於)。故D正確。","options":{"A":"敘述與分期不符。","B":"射血期心室壓高於主動脈壓(非小於)。","C":"等容收縮期心室壓小於主動脈壓(瓣未開)。","D":"等容舒張期心室壓≥心房壓—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109020-60":{"quick":"普金杰系統阻斷→心室去極化不同步→QRS綜合波延長。","detail":{"background":"症狀-心電圖配對:『普金杰系統(束支)阻斷→心室經緩慢的肌肉間傳導去極化、不同步→「QRS綜合波增寬延長」』(B正確)。比較錯誤:A第一級房室阻斷是『PR間期延長』(非QT延長);C心肌『鉀通道』功能異常多致『再極化延遲→QT延長』(非PR延長);D左心室肥大致『QRS振幅增高、可能ST-T改變』,『高尖T波』典型見於『高血鉀』(非左室肥大)。故B正確。臨床:束支阻斷QRS≥0.12秒;高尖T波警示高血鉀。","options":{"A":"第一級房室阻斷為PR延長(非QT)。","B":"普金杰系統阻斷→QRS延長—正解。","C":"鉀通道功能降→QT延長(非PR)。","D":"高尖T波為高血鉀(非左室肥大)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111020-59":{"quick":"副交感釋乙醯膽鹼作用於心臟蕈毒鹼(muscarinic)受體、減慢心搏。","detail":{"background":"自主神經對心率:『交感』末梢釋正腎上腺素作用於SA node的『β1受體(非α)→加速心搏』;『副交感(迷走)』末梢釋『乙醯膽鹼作用於「蕈毒鹼(muscarinic, M2)受體」→開啟K⁺通道使節律細胞過極化、減慢去極化斜率→「減緩心搏」』。故D「副交感ACh作用muscarinic受體減緩心搏」正確。比較錯誤:A心臟加速經β1(非α1);B α2減慢敘述錯;C副交感作用於muscarinic(非nicotinic)且為減慢(非加快)。故D正確。","options":{"A":"交感加速經β1受體(非α1)。","B":"非α2受體。","C":"副交感作用muscarinic(非nicotinic)、為減慢。","D":"副交感ACh作用muscarinic受體減緩心搏—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111020-60":{"quick":"等容收縮期壓力:主動脈壓>左心室壓>左心房壓。","detail":{"background":"等容收縮期(isovolumic contraction):房室瓣已關、主動脈瓣尚未開,心室壓正『快速上升但「仍低於主動脈壓」(故主動脈瓣未開)』;而心室壓已『高於心房壓(房室瓣已關)』。故此期壓力排序為『主動脈壓 > 左心室壓 > 左心房壓』(A)。當心室壓上升超過主動脈壓時主動脈瓣才開、進入射血期。故A正確。記憶:等容收縮=兩瓣皆關、心室壓在房壓與主動脈壓「之間」。","options":{"A":"主動脈壓>左心室壓>左心房壓—正解。","B":"順序不符(心室壓應高於心房壓)。","C":"此期心室壓尚低於主動脈壓(非大於)。","D":"順序不符。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111020-61":{"quick":"Fick:心輸出量=耗氧量/動靜脈含氧差=1900/(188-134)≈35 L/min。","detail":{"background":"用Fick原理算心輸出量(CO)=『耗氧量(VO₂)÷ 動靜脈血氧含量差(a-v O₂ diff)』。代入:VO₂=1.9 L/min=『1900 mL/min』;a-v差=188−134=『54 mL/L』→CO=1900/54≈『35 L/min』。故B正確。(劇烈運動如跳繩時CO大增、組織攝氧增使a-v差加大。)Fick原理是測心輸出量的經典方法。故B正確。","options":{"A":"17.5計算錯誤。","B":"1900/54≈35 L/min—正解。","C":"70計算錯誤。","D":"14計算錯誤。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111100-57":{"quick":"P波反映心房「去極化」(非再極化),故此敘述錯誤。","detail":{"background":"心電圖波形對應:『P波=心房「去極化」』(隨後心房收縮;心房「再極化」被QRS掩蓋而不明顯);『QRS波=心室去極化(對應心室動作電位「初生/0期去極化」)』;『T波=心室「再極化」』;『ST段=心室動作電位的「高原期(plateau)」』(全心室皆去極化、無電位差)。故A「P波反映心房再極化」『錯誤』(應為心房去極化)。其餘B、C、D正確。故A為正解。","options":{"A":"稱P波反映心房再極化—錯誤(應為心房去極化),為正解。","B":"T波反映心室再極化,正確。","C":"QRS對應心室去極化初生期,正確。","D":"ST段對應心室高原期,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111100-58":{"quick":"主動脈瓣關閉「之後」(等容舒張)主動脈壓並非最高;最高壓在射血期,故此敘述錯誤。","detail":{"background":"主動脈瓣關閉的意義:A『產生第二心音(S2)』正確;B『開始等容舒張期』正確;C『結束心室射血期』正確。D「主動脈瓣關閉瞬間是主動脈壓最高時刻」『錯誤』—主動脈壓『最高點在「射血期(收縮高峰)」』;到主動脈瓣關閉時心室壓已下降、主動脈壓也已自高峰回落,關閉處在主動脈壓力曲線上對應『重搏切跡(dicrotic notch)』(非最高點)。故D為正解。記憶:S2與重搏切跡同時、非收縮壓峰值。","options":{"A":"主動脈瓣關閉產生S2,正確。","B":"關閉開始等容舒張期,正確。","C":"關閉結束射血期,正確。","D":"稱關閉瞬間主動脈壓最高—錯誤(對應重搏切跡非峰值),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111100-60":{"quick":"Fick:CO=600/(動脈O₂−肺動脈O₂)。若動脈200、混合靜脈140→600/60=10 L/min。","detail":{"background":"Fick原理:心輸出量(CO)=『全身耗氧量÷(體動脈含氧 − 混合靜脈含氧)』。混合靜脈血即『肺動脈血』(140 mL/L)。代入VO₂=600 mL/min、a-v差=(動脈約200 −肺動脈140)=60 mL/L→CO=600/60=『10 L/min』。故B正確。此題以肺動脈血代表混合靜脈血、肱動脈血代表體動脈血計算。故B正確。","options":{"A":"4.2計算錯誤。","B":"600/60=10 L/min—正解。","C":"30計算錯誤。","D":"34.2計算錯誤。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_112020-60":{"quick":"下腔靜脈接心臟處「沒有瓣膜」,稱其瓣膜開啟才回流最不合理。","detail":{"background":"瓣膜功能:A二尖瓣開啟使左房血流入左室(正確);B主動脈半月瓣開啟使左室血射向全身(正確);C股靜脈瓣膜開啟使血流向心(正確,四肢靜脈瓣防逆流)。D「下腔大靜脈接心臟處之瓣膜開啟血液才回右心房」『最不合理』—『大靜脈(上、下腔靜脈)與心房交界「沒有瓣膜」』,血液靠壓力梯度直接回流右心房(故中心靜脈壓可反映右房壓)。故D為正解(最不合理)。記憶:心臟四瓣(二尖、三尖、主動脈、肺動脈)+靜脈瓣;腔靜脈入口無瓣。","options":{"A":"二尖瓣開啟左房→左室,合理。","B":"主動脈瓣開啟左室→全身,合理。","C":"股靜脈瓣助血流向心,合理。","D":"稱下腔靜脈入口有瓣膜—最不合理(該處無瓣膜),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_112020-61":{"quick":"血量大增→心室舒張末期容積上升→依Frank-Starling心搏量增加。","detail":{"background":"血量(前負荷)增加的效應:回心血量↑→『心室舒張末期容積(EDV/前負荷)上升』→依『Frank-Starling定律(心肌纖維被拉長使收縮力增強)』→『心搏量(stroke volume)增加』。故A正確。此為靜脈回流增加時心臟自動增加輸出以匹配的機制。故A正確。臨床:過量輸液→前負荷過高→在衰竭心臟可致肺水腫(超過Starling曲線最佳點)。","options":{"A":"EDV上升、心搏量增加—正解(Frank-Starling)。","B":"EDV上升心搏量應增加(非減少)。","C":"血量增加EDV應上升(非降低)。","D":"方向皆錯。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113020-58":{"quick":"第一與第二心音之間=心室收縮射血期→心室容積快速下降。","detail":{"background":"心音與週期:『第一心音(S1)=房室瓣關閉(收縮期開始)』;『第二心音(S2)=半月瓣關閉(收縮期結束)』。故『S1與S2之間=心室「收縮期(等容收縮+射血)」』,其中射血期『心室容積快速下降(血液射出)』。故B正確。比較錯誤:A心房去極化(P波)在S1『之前』;C心房壓在收縮期呈c、x波變化、非單純先升後降的主導現象;D收縮期心室壓『大幅上升』(非維持不變)。故B正確。","options":{"A":"心房去極化在S1之前(舒張末)。","B":"心室容積快速下降(射血)—正解。","C":"心房壓非簡單先升後降。","D":"收縮期心室壓大幅上升(非不變)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113020-59":{"quick":"慢性中度貧血因血黏度降、後負荷低、回心增,最可能增加心輸出量。","detail":{"background":"增加心輸出量的情況:『慢性中度貧血』→血液黏稠度下降、周邊阻力降、組織缺氧致代償性『高輸出狀態(心率與心搏量增加以維持供氧)』→心輸出量『增加』。故A正確。比較錯誤:B心肌梗塞(收縮力↓)、C心肌炎(收縮力↓)皆『降低』心輸出量;D『增加靜脈順應性』使血液滯留靜脈、靜脈回流『減少』→前負荷降→心輸出量下降。故A正確。臨床:貧血、甲亢、動靜脈瘻、腳氣病等為高輸出性心衰原因。","options":{"A":"慢性中度貧血→高輸出狀態—正解。","B":"心肌梗塞降低收縮力與輸出。","C":"心肌炎降低收縮力。","D":"靜脈順應性增加使回流減少、輸出下降。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113090-58":{"quick":"傳導速度:普金杰系統 > 心房傳導路徑 > 竇房結(房室結最慢)。","detail":{"background":"心臟各組織傳導速度:最快為『普金杰纖維(Purkinje,約2–4 m/s,使心室同步去極化)』;其次『心室肌、心房傳導路徑(約1 m/s)』;『竇房結(SA node)與房室結(AV node)最慢(約0.05 m/s)』—房室結的延遲讓心房先完成收縮充填心室。故由快到慢:Purkinje > 心房路徑 > SA node(A)。故A正確。臨床:房室結延遲是心房-心室協調的關鍵;束支(普金杰)病變致QRS增寬。","options":{"A":"Purkinje>心房路徑>SA node—正解。","B":"SA node不快於心房路徑。","C":"SA node非最快。","D":"心房路徑不快於Purkinje。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113090-60":{"quick":"血量上升應使腎排鈉水增加、且心搏量增加;「收縮末期容積增加」最不可能。","detail":{"background":"血量(前負荷)增加的恆定反應:血量↑→周邊靜脈壓↑→靜脈回流↑→『舒張末期容積(前負荷)↑→依Frank-Starling「心搏量增加、動脈壓上升」(B、C正確)』;同時血壓/血量上升觸發『腎臟排鈉利尿增加(壓力性利尿、ANP、抑制RAAS)(D正確)』以回復血量。A「血量上升導致心臟「收縮末期容積(ESV)」增加」『最不可能』—血量增加是增『舒張末期容積(EDV)』與心搏量,ESV(收縮後殘留)反而因收縮力增強(Starling)而『不變或減少』。故A為正解(最不可能)。","options":{"A":"稱血量上升使收縮末期容積增加—最不可能(增的是舒張末期容積),為正解。","B":"靜脈壓升→心搏量增、動脈壓升,合理。","C":"靜脈回流增→心輸出量上升,合理。","D":"血量上升→腎排鈉水增加,合理。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114020-58":{"quick":"收縮期右心室壓並非「均高於」肺動脈壓(射血需右室壓略高、但非全程),此敘述最不適當。","detail":{"background":"左右心比較:A左右心室『心搏量相同』(串聯循環,正確);B『主動脈壓恆高於肺動脈壓與右室壓』(體循環高壓,正確);C『主動脈瓣與肺動脈瓣大致同步開關』(左右心同步收縮舒張,正確)。D「收縮期右心室壓「均」高於肺動脈壓」『最不適當』—右室射血時右室壓僅在射血段『略高於』肺動脈壓以開瓣,但收縮『等容期』右室壓仍低於肺動脈壓(瓣未開),故非「全收縮期均高於」。故D為正解(最不適當)。記憶:射血期心室壓略高於相應動脈壓、其餘時相不一定。","options":{"A":"左右心室心搏量相同,正確。","B":"主動脈壓恆高於肺動脈/右室壓,正確。","C":"主動脈瓣與肺動脈瓣大致同步,正確。","D":"稱收縮期右室壓均高於肺動脈壓—最不適當,為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114020-59":{"quick":"SA node動作電位主升段(0期)主要由「鈣離子」內流造成。","detail":{"background":"竇房結(SA node)是『慢反應細胞』:無穩定靜止電位(有自發舒張期去極化funny current If),其『動作電位「0期(上升段)」主要由「L型鈣通道」開啟、「Ca²⁺內流」造成』(去極化較慢);再極化靠K⁺外流。故D(鈣)正確。對比『心室肌(快反應細胞)』的0期是『Na⁺快速內流』。故SA node升段為鈣。故D正確。臨床:鈣通道阻斷劑(verapamil/diltiazem)減慢竇房結與房室結。","options":{"A":"鈉為心室肌(快反應)0期。","B":"氯非主升段離子。","C":"鉀為再極化(非升段)。","D":"SA node 0期主要為鈣內流—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114020-60":{"quick":"冠狀動脈血流主要在「舒張期」,因收縮期心肌壓迫冠脈且入口受瓣遮蔽。","detail":{"background":"冠狀動脈血流的特殊時相:『主要發生在「心舒張期」』—因『心收縮期收縮的心肌(尤其左室)壓迫壁內冠狀血管、且主動脈瓣開啟時瓣葉遮蔽冠狀動脈竇開口』,使收縮期左冠血流受阻;舒張期心肌鬆弛、主動脈瓣關閉(竇內壓維持),冠脈血流大增。故A正確(機制正確)。比較錯誤:B冠狀動脈『無瓣膜』;C/D稱收縮期為主與實際相反。故A正確。臨床:心搏過速縮短舒張期→冠脈灌注時間減少→易心肌缺血。","options":{"A":"舒張期為主、收縮期心肌壓迫且入口遮蔽—正解。","B":"冠狀動脈無瓣膜。","C":"收縮期心肌壓迫使血流反而受阻(非為主)。","D":"冠脈灌注非在收縮期為主。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-58":{"quick":"血鈣正常下高血鉀病人lead II常見高尖T波,敘述最適當。","detail":{"background":"ECG與電解質/導程:A『高血鉀(hyperkalemia)致「高尖T波(tall peaked T)」』,在lead II常見—正確(高鉀加速再極化使T波高尖)。比較錯誤:B一級房室阻斷是『PR間期「延長」(>0.2s)』(非縮短);C『aVR導程的QRS通常「向下偏斜」(因aVR方向與心臟主向相反),與lead II相反』(非相似向上);D胸前導程T波『V1可能倒置,但V2–V6通常「直立(向上)」』(非均向下)。故A為正解(最適當)。臨床:高血鉀進展:高尖T→PR延長/P變平→QRS增寬→正弦波→心搏停止。","options":{"A":"高血鉀lead II高尖T波—正解。","B":"一級房室阻斷PR延長(非縮短)。","C":"aVR的QRS常向下(與lead II相反)。","D":"V2–V6 T波多直立(非均向下)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-59":{"quick":"心室肌動作電位去極化與高原期之間的「初期再極化(1期切跡)」主要由短暫外向K電流造成。","detail":{"background":"心室肌(快反應)動作電位分期:0期(Na⁺快速內流去極化)→『1期「初期快速再極化(切跡notch)」由「短暫外向K⁺電流(Ito)」加上Na⁺通道失活造成』→2期高原期(L型Ca²⁺內流與K⁺外流平衡)→3期再極化(K⁺外流)→4期靜止。題述「去極化與高原期之間短暫再極化」即1期,主要為『短暫外向鉀電流』。故A(鉀)正確。此1期切跡在心外膜心肌較明顯。故A正確。","options":{"A":"初期再極化(1期)由短暫外向K電流造成—正解。","B":"鈉為0期去極化。","C":"鈣為2期高原期。","D":"氯非主因。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-60":{"quick":"兩種細胞的再極化「都」由K⁺通道開啟、K⁺外流造成,敘述最適當。","detail":{"background":"心室肌(快反應)vs SA node(慢反應)比較:D『兩者再極化「皆」由「K⁺通道開啟、K⁺外流」造成』—正確(再極化的共通機制)。比較錯誤:A『SA node「無穩定靜止電位」(有自發去極化)』,僅心室肌約-90mV(非兩者皆有);B『高原期(plateau)是「心室肌」特徵(L型鈣),SA node無明顯高原期』(非兩者皆有);C『去極化:心室肌0期是Na⁺內流、SA node 0期是「Ca²⁺」內流』(非兩者皆Na⁺)。故D為最適當。記憶:快反應(Na 0期、有高原)vs 慢反應(Ca 0期、自發節律);再極化皆靠K⁺。","options":{"A":"SA node無穩定靜止電位(非兩者皆-90mV)。","B":"高原期僅心室肌(SA node無)。","C":"SA node去極化為鈣(非鈉)。","D":"兩者再極化皆K⁺外流—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-62":{"quick":"Fick求靜脈含氧:靜脈O₂=動脈O₂−VO₂/CO=200−50=150 mL/L。","detail":{"background":"由Fick原理變形求『混合靜脈血含氧量』:動靜脈含氧差(a-v O₂ diff)=耗氧量(VO₂)÷心輸出量(CO)。將給定的VO₂與CO代入得a-v差=50 mL/L→『靜脈含氧 = 動脈含氧(200) − 50 = 150 mL/L』。故A正確。(組織耗氧使靜脈血含氧低於動脈;運動時a-v差加大。)此題反向應用Fick求靜脈血氧。故A正確。","options":{"A":"200−50=150 mL/L—正解。","B":"146計算不符。","C":"143計算不符。","D":"47計算不符。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_115020-57":{"quic
