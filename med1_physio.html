d1_109100-46":{"quick":"Sertoli細胞以緊密接合形成血睪屏障。","detail":{"background":"Sertoli(睪丸支持)細胞:C『相鄰Sertoli細胞間以「緊密接合」形成「血睪屏障」』(正確,保護生精細胞);其功能多元—支持營養生精細胞、分泌抑制素與AMH、androgen-binding protein、有內分泌(抑制素)與旁分泌作用(故非僅外分泌)。比較錯誤:A Sertoli細胞『青春期後不再增殖(數目固定、決定生精上限)』(非具複製能力);B細胞間接合是『「緊密接合」(非黏連接合為主)』;D非僅外分泌(亦分泌抑制素入血,有內分泌)。故C正確。","options":{"A":"Sertoli細胞青春期後不再複製。","B":"以緊密接合(非黏連接合)為主形成屏障。","C":"形成血睪屏障—正解。","D":"兼有內分泌(抑制素)非僅外分泌。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109100-70":{"quick":"濾泡促素(FSH)與男性「生殖器官的「形成(胚胎分化)」」最不相關。","detail":{"background":"男性生殖器官胚胎形成的關鍵:『Y染色體(SRY)→決定睪丸分化』、『雄性素(睪固酮/DHT)→男性內外生殖器分化』、『Müllerian抑制物質(MIS)→使副中腎管退化』。而『FSH主要在「青春期後」促進「生精(Sertoli功能)」,與胚胎期「生殖器官的形成/分化」最不相關』。故A(FSH)最不相關,為正解。記憶:胚胎性別分化靠SRY+雄性素+MIS;FSH是後天生精。故A正確。","options":{"A":"FSH與胚胎期生殖器形成最不相關—正解。","B":"Y染色體決定睪丸分化。","C":"雄性素分化生殖器。","D":"MIS使副中腎管退化。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109100-73":{"quick":"高泌乳素(prolactin)是此病人性慾下降與勃起障礙的元兇。","detail":{"background":"承上題(原發甲狀腺低下致TRH↑→泌乳素↑)。『「高泌乳素血症(hyperprolactinemia)」會「抑制下視丘GnRH」→降低LH/FSH與性腺類固醇→「性慾下降、勃起功能障礙(男性)、月經異常/泌乳」』。故造成此性功能障礙者為『泌乳素(B)』。故B正確。臨床:泌乳素瘤或藥物(抗多巴胺藥)致高泌乳素→性腺功能低下;多巴胺致效劑(bromocriptine、cabergoline)可降泌乳素改善。","options":{"A":"ACTH與此性功能障礙無直接關。","B":"高泌乳素致性慾下降/勃起障礙—正解。","C":"LH是被泌乳素抑制的下游(非元兇)。","D":"FSH亦為被抑制的下游。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_110020-46":{"quick":"睪丸縱隔由白膜(tunica albuginea)向內延伸增厚而成。","detail":{"background":"睪丸被膜與結構:『睪丸外覆「白膜(tunica albuginea)」(緻密結締組織)』;『白膜在睪丸後緣「向內延伸增厚」形成「睪丸縱隔(mediastinum testis)」,並由此放射出「中隔」把睪丸分成許多小葉』。睪丸網(rete testis)即位於縱隔內。故D正確。比較:鞘膜(tunica vaginalis)是更外層的腹膜衍生漿膜(臟層/壁層);皮膚是陰囊外層。故D正確。","options":{"A":"皮膚為陰囊外層。","B":"鞘膜臟層為漿膜(非縱隔來源)。","C":"鞘膜壁層為漿膜。","D":"睪丸縱隔由白膜延伸增厚而成—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_110020-72":{"quick":"抑制素B回饋抑制的是「FSH」(非LH),故此敘述錯誤。","detail":{"background":"Sertoli(賽托利)細胞功能:B提供生精細胞養分、C形成血睪屏障、D胚胎期分泌MIS使副中腎管退化—皆正確。A「抑制素B回饋抑制「黃體刺激素(LH)」」『錯誤』—『抑制素B「選擇性負回饋抑制腦下垂體「FSH」(非LH)」』;LH則受睪固酮(Leydig分泌)負回饋。故A為正解。記憶:inhibin B(Sertoli)→抑FSH;testosterone(Leydig)→抑LH。","options":{"A":"稱抑制素B抑制LH—錯誤(應抑FSH),為正解。","B":"提供生精細胞養分,正確。","C":"形成血睪屏障,正確。","D":"胚胎期分泌MIS,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_110020-73":{"quick":"黃體期主要類固醇是黃體酮(及雌激素);稱優勢卵泡在濾泡末期形成有誤;此題答D。","detail":{"background":"月經週期:A濾泡期主要類固醇是『雌激素(estrogen)』(正確);B近排卵期LH與FSH皆升(LH surge)(正確);C黃體期主要分泌『雌激素「與」黃體酮(progesterone)』(正確)。D「優勢卵泡(dominant follicle)形成主要發生於「濾泡期「末期」即將進入黃體期前」」『錯誤』—優勢卵泡是在『「濾泡期早-中期(約第5–7天)」被「選擇」』、之後持續發育至排卵,而非在濾泡期末期才形成。故D為正解(敘述時機錯誤)。","options":{"A":"濾泡期主要分泌雌激素,正確。","B":"近排卵期LH/FSH皆升,正確。","C":"黃體期分泌雌激素與黃體酮,正確。","D":"稱優勢卵泡在濾泡末期形成—錯誤(早中期即選擇),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111020-48":{"quick":"排卵後(黃體期)高雌激素與黃體酮負回饋抑制LH分泌。","detail":{"background":"排卵後進入黃體期:黃體分泌『大量黃體酮與雌激素』→『「對下視丘-腦下垂體「負回饋」→抑制LH(與FSH)分泌」』(避免新濾泡發育與再次排卵)。故B「雌激素抑制LH」正確(黃體期的負回饋)。比較錯誤:A黃體由『LH(非FSH)』維持;C子宮內膜『分泌期變化由黃體酮主導(非FSH促增生)』;D『黃體酮(progesterone,非雌激素)才使基礎體溫上升』(排卵後體溫升約0.3–0.5°C)。故B正確。","options":{"A":"黃體由LH維持(非FSH)。","B":"雌激素(黃體期)抑制LH—正解。","C":"內膜分泌期由黃體酮主導(非FSH)。","D":"基礎體溫上升由黃體酮(非雌激素)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111020-49":{"quick":"雄性素(androgen)參與引發睪丸下降,與生精能力密切相關。","detail":{"background":"睪丸下降至陰囊分兩階段:腹內段由『胰島素樣因子3(INSL3)』、腹股溝-陰囊段由『「雄性素(androgen,睪固酮)」主導』;睪丸下降至陰囊使其處於『較低溫環境』,是『正常生精(spermatogenesis)所必需』(故與精子生成能力密切相關)。故B正確。隱睪(cryptorchidism,未下降)→睪丸處於體溫高溫→生精障礙、不孕、惡性風險增。故B正確。","options":{"A":"activin非睪丸下降主因子。","B":"雄性素參與睪丸下降、與生精相關—正解。","C":"Wolffian退化因子非睪丸下降主因。","D":"VEGF為血管生成因子(非下降主因)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111100-72":{"quick":"LH作用於濾泡膜細胞(theca cells)促進雄性素(睪固酮/androstenedione)生成。","detail":{"background":"卵巢「兩細胞-兩性促素」學說:『「LH作用於「濾泡膜細胞(theca cells)」→以膽固醇生成「雄性素(androstenedione/睪固酮)」」』;雄性素再擴散至顆粒細胞;『FSH作用於「顆粒細胞(granulosa cells)」→活化「芳香酶(aromatase)」把雄性素轉成「雌二醇(estradiol)」』。故A「LH→theca cells→睪固酮(雄性素)」正確。比較:C(FSH→顆粒細胞→雌二醇)亦對,但題問LH作用故選A。故A正確。","options":{"A":"LH作用theca cells生成睪固酮(雄性素)—正解。","B":"theca cells不直接產雌二醇(雌二醇由顆粒細胞)。","C":"此為FSH→顆粒細胞→雌二醇(非LH)。","D":"顆粒細胞產雌二醇(非睪固酮)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_112020-73":{"quick":"兩細胞-兩性促素學說描述卵巢生成雌二醇(17β-estradiol)的機制。","detail":{"background":"「兩細胞-兩性促素(two-cell, two-gonadotropin)學說」解釋『卵巢「雌二醇(17β-estradiol)」的生成』:『「LH作用「濾泡膜細胞(theca)」→產雄性素(androstenedione)」;「FSH作用「顆粒細胞(granulosa)」→芳香酶把雄性素轉成「雌二醇」」』—需兩種細胞與兩種性促素協同。故C正確。此說明濾泡雌激素合成的分工。故C正確。","options":{"A":"非描述睪丸睪固酮機制。","B":"非睪丸黃體素機制。","C":"描述卵巢生成雌二醇的機制—正解。","D":"雄烯二酮是中間產物(終產物為雌二醇)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113020-68":{"quick":"腎上腺雄性素主要受「ACTH」調控,非促性腺激素,故此敘述最不適當。","detail":{"background":"腎上腺皮質(網狀帶)分泌雄性素(主要DHEA/DHEAS):A『「主要受「ACTH」調控」(非促性腺激素gonadotropins)』—故A「主要受促性腺激素調控」『最不適當』,為正解。B『DHEAS血中濃度約20歲達高峰、之後隨年齡下降(腎上腺機能初現adrenarche)』(正確);C青春期前腎上腺雄性素過量→『假性性早熟』(正確);D成年女性腎上腺雄性素過量→『腎上腺性徵異常綜合症(男性化)』(正確)。故A為正解。臨床:先天性腎上腺增生(21-羥化酶缺乏)→ACTH↑→腎上腺雄性素↑→女嬰男性化。","options":{"A":"稱主要受促性腺激素調控—最不適當(實受ACTH),為正解。","B":"DHEAS約20歲達高峰,正確。","C":"青春期前過量致假性性早熟,正確。","D":"成年女性過量致腎上腺性徵異常,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113090-73":{"quick":"抑制素抑制的是「FSH」,而非Leydig細胞分泌睪固酮,故此敘述最不適當。","detail":{"background":"男性生殖調控:A『睪固酮負回饋抑制腦下垂體LH』(正確);C『睪固酮促進「中腎管(Wolffian)」分化(副睪/輸精管/精囊)』(正確);D『DHT促進「前列腺」與男性外生殖器發育』(正確)。B「抑制素「抑制萊氏(Leydig)細胞分泌睪固酮」」『最不適當』—『抑制素(Sertoli分泌)是「負回饋抑制腦下垂體「FSH」」,並非抑制Leydig細胞的睪固酮分泌』。故B為正解。記憶:inhibin→抑FSH;testosterone→抑LH;DHT→前列腺/外生殖器。","options":{"A":"睪固酮抑制LH,正確。","B":"稱抑制素抑Leydig睪固酮—最不適當(抑制素抑FSH),為正解。","C":"睪固酮促Wolffian分化,正確。","D":"DHT促前列腺發育,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114020-73":{"quick":"週期中期雌二醇(estradiol)高峰以正回饋誘發FSH/LH潮放。","detail":{"background":"排卵的觸發:濾泡發育使『雌二醇(estradiol)漸升,於週期中期達「高峰」並持續→「對下視丘-腦下垂體「轉為正回饋」→誘發「LH(與FSH)潮放(surge)」→促使卵母細胞完成減數I、卵泡破裂排卵」』。故A(雌二醇)正確。比較:黃體酮在排卵後升、前列腺素參與排卵時卵泡破裂(非觸發surge)、DHT為雄性素。故A正確。記憶:雌二醇高峰(正回饋)→LH surge→排卵。","options":{"A":"雌二醇高峰正回饋誘發FSH/LH surge—正解。","B":"黃體酮在排卵後升(非誘發surge)。","C":"前列腺素助卵泡破裂(非觸發surge)。","D":"DHT為雄性素。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114090-46":{"quick":"前列腺屬「管泡腺(tubuloalveolar gland)」。","detail":{"background":"前列腺(prostate)組織:是『「複合管泡腺(tubuloalveolar gland)」,分泌弱鹼性、含PSA、酸性磷酸酶、檸檬酸與鋅的前列腺液(占精液約20–30%)』。故D正確。比較錯誤:A『前列腺凝結體(corpora amylacea)隨「年齡增加」(老年常見),非男嬰』;B『前列腺癌最常發生於「周邊區(peripheral zone)」』(非過渡區;過渡區是良性增生BPH好發);C『「周邊區」是前列腺最大的腺體區』(非中央區)。故D正確。臨床:BPH壓迫尿道(過渡區);前列腺癌在周邊區(故肛診可觸)。","options":{"A":"前列腺凝結體隨年齡增(非男嬰)。","B":"前列腺癌好發周邊區(非過渡區)。","C":"周邊區為最大腺體區(非中央區)。","D":"前列腺屬管泡腺—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-48":{"quick":"男性勃起由副交感神經節後釋放乙醯膽鹼(經NO)媒介。","detail":{"background":"男性性反應的自主控制:『「勃起(erection)」由「副交感神經(骨盆內臟神經S2-4)」媒介—其節後釋放「乙醯膽鹼」並促使內皮與神經釋放「NO」→陰莖海綿體平滑肌與螺旋動脈舒張、血竇充血而勃起』(口訣「Point=副交感勃起」)。故B正確。『「射精(ejaculation)」則由「交感(釋NE)」媒介(口訣「Shoot=交感射精」)』。故B正確(勃起=副交感ACh/NO)。臨床:PDE5抑制劑強化NO-cGMP助勃起;副交感受損致勃起障礙。","options":{"A":"交感節後主要釋NE(非ACh;汗腺等例外)。","B":"勃起由副交感釋ACh(經NO)—正解。","C":"交感NE主導射精(非勃起)。","D":"副交感釋ACh(非NE)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-73":{"quick":"抑制素B(inhibin B)主要抑制腦下垂體前葉的FSH分泌。","detail":{"background":"生殖負回饋:『「抑制素(inhibin B)」由「Sertoli細胞(男)/顆粒細胞(女)」分泌,「選擇性「抑制腦下垂體前葉的FSH」分泌」』(對LH影響小)。故C正確。比較:睪固酮主要抑LH;雌激素、黃體酮在不同時相有正/負回饋(主要影響LH與GnRH)。故C正確。記憶:inhibin→專一抑FSH(反映生精/濾泡功能);性類固醇→主抑LH。","options":{"A":"黃體酮主要影響LH/GnRH。","B":"雌激素有正/負回饋(主影響LH)。","C":"抑制素B抑制FSH—正解。","D":"睪固酮主要抑LH。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_106100-67":{"quick":"皮質醇對「紅血球」數目增加作用最強(並降低嗜酸性球與淋巴球)。","detail":{"background":"皮質醇(cortisol)對血球的影響:『增加「紅血球、嗜中性球、血小板」』、『「減少」嗜酸性球、嗜鹼性球、淋巴球(含T細胞,使之凋亡/重分布)』。故選項中促進數目增加最強者為『紅血球(D)』(嗜酸性球、T細胞、淋巴球反而被皮質醇『減少』)。故D正確。臨床:庫欣症/類固醇治療→嗜中性球增多但淋巴球與嗜酸性球減少(免疫抑制);故類固醇用於過敏(降嗜酸性球)。","options":{"A":"嗜酸性球被皮質醇減少。","B":"T細胞被皮質醇減少。","C":"淋巴球被皮質醇減少。","D":"紅血球被皮質醇增加最強—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_106100-70":{"quick":"腎上腺皮質分泌的多為脂溶性(類固醇)激素。","detail":{"background":"激素依化學性質分:『「類固醇(脂溶性)」激素—由「腎上腺皮質(皮質醇、醛固酮、雄性素)」、性腺、胎盤分泌,可穿膜結合「胞內/核受體」調控基因』;胜肽/蛋白與胺類(水溶性)—胃(gastrin)、心臟(ANP)、胰臟(胰島素/升糖素)多為胜肽、作用於膜受體。故脂溶性激素的腺體為『腎上腺皮質(D)』。故D正確。記憶:類固醇與甲狀腺素為脂溶性(核受體);多數激素為水溶性(膜受體)。","options":{"A":"胃分泌gastrin(胜肽)。","B":"心臟分泌ANP(胜肽)。","C":"胰臟分泌胰島素/升糖素(胜肽)。","D":"腎上腺皮質分泌類固醇(脂溶性)—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_107100-67":{"quick":"判斷甲狀腺功能低下最佳指標為血漿「游離態甲狀腺素(free T4)」降低。","detail":{"background":"評估甲狀腺功能:『「游離態甲狀腺素(free T4)」反映生物活性激素濃度,「不受結合球蛋白(TBG)變動影響」,是判斷功能的可靠指標』。故C「游離態甲狀腺素濃度降低」是甲狀腺低下的指標。比較錯誤:A TBG濃度變化不直接代表功能(只影響總量);B『「總T4/T3」受TBG影響(如懷孕、雌激素使TBG升而總量升但游離正常)』故較不可靠;D『原發性甲狀腺低下時TSH「升高(非降低)」』。故C正確。(臨床篩檢以TSH為主、配合free T4;此題以游離T4為最佳「直接」指標。)","options":{"A":"TBG濃度不直接代表功能。","B":"總T4/T3受TBG影響、較不可靠。","C":"游離態T4降低為最佳指標—正解。","D":"原發甲狀腺低下TSH升高(非降低)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_107100-70":{"quick":"皮質醇分泌高峰在「清晨(將醒)」、非入夜睡眠時間,故此敘述錯誤。","detail":{"background":"ACTH與皮質醇的晝夜節律:A『兩者分泌皆隨晝夜節律變化』(正確);C『晝夜變化主要由下視丘「視交叉上核(SCN)」調控』(正確);D『皮質醇受ACTH調控』(正確)。B「每日皮質醇產生量最多的時間在「入夜睡眠時間」」『錯誤』—『皮質醇高峰在「清晨將醒時(約6–8點)」、最低在「入睡後不久(午夜)」』。故B為正解。臨床:測皮質醇須注意時辰;午夜皮質醇升高見於庫欣症(節律消失)。","options":{"A":"ACTH/皮質醇皆隨晝夜節律,正確。","B":"稱高峰在入夜睡眠—錯誤(高峰在清晨),為正解。","C":"由SCN調控晝夜變化,正確。","D":"皮質醇受ACTH調控,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108030-71":{"quick":"腦下垂體切除後,壓力時須補充額外的腎上腺皮質素(cortisol)。","detail":{"background":"腦下垂體前葉功能不足的激素補充:D『「壓力時須補充額外cortisol」(因ACTH缺乏使腎上腺皮質醇不足,壓力下需求增加、否則腎上腺危象)』(正確)。比較錯誤:A『精子製造需「FSH+睪固酮」共同作用,只補雄性素「不足」恢復生精』;B『TSH缺乏致甲狀腺低下,「需」補甲狀腺素』(非不需);C『ADH由「後葉」分泌,「前葉」功能不足不致尿崩(除非後葉/垂體柄也受損)』。故D正確。臨床:全垂體功能低下需多重荷爾蒙補充(糖皮質素、甲狀腺素、性腺、必要時GH/ADH)。","options":{"A":"生精需FSH+睪固酮,只補雄性素不足。","B":"TSH缺乏需補甲狀腺素(非不需)。","C":"ADH由後葉分泌,前葉不足不必然尿崩。","D":"壓力時須補額外cortisol—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108100-67":{"quick":"thyroxine(甲狀腺素)是胺基酸衍生物,與其他三者(類固醇/類固醇衍生)結構不同。","detail":{"background":"激素化學分類:『「類固醇(steroid)」—aldosterone、testosterone;「1,25-二羥維生素D₃」為「類固醇衍生(固醇類)」激素』—三者皆「脂質/固醇骨架、核受體」。而『「thyroxine(T4,甲狀腺素)」是「酪胺酸(胺基酸)碘化衍生物」(胺類)』—化學屬性不同。故C(thyroxine)與其他三者不同,為正解。故C正確。記憶:類固醇(腎上腺/性腺/維生素D)vs 胺基酸衍生(甲狀腺素、兒茶酚胺)vs 胜肽。","options":{"A":"aldosterone為類固醇。","B":"1,25-(OH)₂D₃為固醇類。","C":"thyroxine為胺基酸衍生物—與其他不同,為正解。","D":"testosterone為類固醇。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108100-69":{"quick":"血鉀上升最明顯刺激「醛固酮(aldosterone)」分泌(促排鉀)。","detail":{"background":"血鉀(K⁺)上升的反應:『高血鉀「直接刺激腎上腺皮質球狀帶分泌「醛固酮(aldosterone)」」→作用集尿管增加排鉀』使血鉀回穩。故C正確。(醛固酮分泌受「血鉀」與「血管張力素II」雙重刺激,血鉀是強力直接刺激。)比較:ADH(滲透壓/血量)、ANP(血量擴張、利鈉)、血管張力素原(angiotensinogen是受質非激素)。故C正確。臨床:高血鉀→醛固酮↑排鉀;醛固酮不足(Addison/保鉀利尿)→高血鉀。","options":{"A":"ADH受滲透壓/血量調控(非血鉀)。","B":"血管張力素原是受質(非受血鉀直接刺激)。","C":"高血鉀刺激醛固酮—正解。","D":"ANP受血量擴張刺激。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108100-70":{"quick":"游離型甲狀腺素結合的是「胞內/核」受體,非細胞膜受體,故此敘述錯誤。","detail":{"background":"甲狀腺激素特性:A『主要藉血中結合蛋白(TBG等)運送』(正確);C『半衰期長(T4約7天,因高度結合)、較胜肽激素長』(正確);D『調控標的細胞「基因轉錄」』(正確,核受體)。B「游離型激素主要藉結合「標的細胞「細胞膜」上受器」」『錯誤』—甲狀腺素為「脂溶性」,『游離型「穿過細胞膜」,結合「胞內(核)受體」』調控基因(非膜受體)。故B為正解。記憶:脂溶性激素(甲狀腺素、類固醇)→核受體→改變基因表現(作用慢而持久)。","options":{"A":"藉血中結合蛋白運送,正確。","B":"稱游離型結合細胞膜受體—錯誤(應為核內受體),為正解。","C":"半衰期較胜肽激素長,正確。","D":"調控基因轉錄,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108100-71":{"quick":"催產素(oxytocin)主要促進排乳(milk ejection)與子宮收縮。","detail":{"background":"催產素(oxytocin,下視丘室旁/視上核合成、後葉釋放)的主要作用:『「促進乳腺肌上皮細胞收縮→「排乳(milk ejection,讓乳)」」』(B正確)、以及『促進「子宮平滑肌「收縮」」(分娩、產後止血)』。故B正確。比較錯誤:A催產素使子宮『收縮(非鬆弛)』;C/D與黃體分解/PGF2α的敘述非其主作用。故B正確。臨床:催產素用於催生/產後出血;吸吮反射刺激催產素分泌(排乳)與泌乳素(產乳)。","options":{"A":"催產素使子宮收縮(非鬆弛)。","B":"促進排乳(milk ejection)—正解。","C":"非抑制黃體分解為主作用。","D":"非抑制PGF2α為主作用。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108100-73":{"quick":"隱睪症不會造成高泌乳素血症,故為最不可能的病因。","detail":{"background":"此男性「睪固酮低(1.5)、泌乳素高(150)」→典型『「高泌乳素血症」抑制GnRH致性腺低下』。病因:A『抗多巴胺藥(抑制多巴胺,而多巴胺是泌乳素抑制因子)→泌乳素升』;B『腦下垂體「泌乳素瘤」→泌乳素升』;C『下視丘近垂體柄腫瘤→阻斷多巴胺下行→泌乳素升(垂體柄效應)』—皆可致高泌乳素。而D『「隱睪症(cryptorchidism)」造成的是「睪丸生精/睪固酮問題」,「不會」造成「高泌乳素血症」』。故D為最不可能的病因,為正解。","options":{"A":"抑制多巴胺藥→泌乳素升。","B":"垂體泌乳素瘤→泌乳素升。","C":"下視丘/垂體柄腫瘤→泌乳素升。","D":"隱睪症不致高泌乳素—最不可能,為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109020-46":{"quick":"甲狀腺是主要由「濾泡(follicle)」構成的內分泌腺。","detail":{"background":"內分泌腺組織:『「甲狀腺(thyroid)」是少數以「濾泡(follicle)」為結構單位的腺體—濾泡上皮圍成球狀、內含「膠質(colloid,儲存甲狀腺球蛋白)」』。故C正確。比較:胰臟(蘭氏小島團)、腎上腺(皮質束狀索/髓質)、松果腺(松果細胞群)非濾泡結構。故C正確。臨床:甲狀腺濾泡是合成儲存甲狀腺素之處;濾泡旁C細胞(神經嵴來源)分泌降鈣素。","options":{"A":"胰臟為蘭氏小島(非濾泡)。","B":"腎上腺為皮質索/髓質。","C":"甲狀腺由濾泡構成—正解。","D":"松果腺為松果細胞群。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109020-68":{"quick":"碘捕捉(iodide trapping)步驟需Na⁺/I⁻共轉運子與Na⁺/K⁺-ATPase參與。","detail":{"background":"甲狀腺素合成:『「碘捕捉(iodide trapping)」由濾泡細胞基底側「Na⁺/I⁻共轉運子(NIS)」把碘逆梯度送入細胞,動力來自「Na⁺/K⁺-ATPase」維持的Na梯度』。故C正確。比較錯誤:A濾泡內膠質(colloid)是『甲狀腺球蛋白(蛋白質)』(非脂肪);B『pendrin是頂膜把碘送入濾泡腔的轉運子(非把T4轉T3)』;D『「MIT+DIT→T3」、「DIT+DIT→T4」』(D說MIT+DIT→thyroxine錯,MIT+DIT生成的是T3)。故C正確。","options":{"A":"膠質為甲狀腺球蛋白(非脂肪)。","B":"pendrin運碘入濾泡腔(非T4轉T3)。","C":"碘捕捉用NIS+Na/K-ATPase—正解。","D":"MIT+DIT→T3(DIT+DIT才成T4)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109020-69":{"quick":"活化膽固醇酯水解酶的是Protein kinase A(非PKC),故此敘述錯誤。","detail":{"background":"皮質醇合成調控:A『ACTH經膜受體→Gs→「cAMP升高」』(正確);C『類固醇合成在「粒線體與平滑內質網」進行』(正確);D『皮質醇主要由腎上腺皮質「束狀帶」分泌』(正確)。B「Protein kinase 「C」活化膽固醇酯水解酶釋出膽固醇」『錯誤』—ACTH-cAMP活化的是『「Protein kinase A(PKA)」→磷酸化活化膽固醇酯水解酶、釋放膽固醇供合成』(非PKC)。故B為正解。記憶:ACTH→cAMP→PKA→膽固醇動員與類固醇合成。","options":{"A":"ACTH使cAMP升高,正確。","B":"稱PKC活化膽固醇酯水解酶—錯誤(應為PKA),為正解。","C":"類固醇在粒線體與平滑ER合成,正確。","D":"皮質醇由束狀帶分泌,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109020-71":{"quick":"催產素(oxytocin)由腦下垂體「後葉」釋放,非前葉製造。","detail":{"background":"腦下垂體前葉(腺垂體)分泌的激素:FSH、LH、ACTH、TSH、GH、泌乳素(prolactin)。而『「催產素(oxytocin)與抗利尿激素(ADH)」由「下視丘(室旁核/視上核)」神經元合成、經軸突運至「後葉(神經垂體)」儲存釋放』—非前葉製造。故D(oxytocin)非腦下垂體前葉所製造,為正解。故D正確。記憶:前葉=FLAT PiG(FSH/LH/ACTH/TSH/Prolactin/GH);後葉=ADH+oxytocin(下視丘製造)。","options":{"A":"FSH由前葉分泌。","B":"泌乳素由前葉分泌。","C":"ACTH由前葉分泌。","D":"催產素由後葉釋放(下視丘製造)—非前葉,為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109100-67":{"quick":"移植到腎包膜(脫離下視丘調控)的腦下垂體前葉:只有泌乳素↑、其餘下降。","detail":{"background":"腦下垂體前葉激素受下視丘調控的方向不同:『大多數激素(FSH/LH/TSH/ACTH/GH)需下視丘「釋放激素」「刺激」才分泌』;唯獨『「泌乳素(PRL)」主要受下視丘「多巴胺「抑制(tonic inhibition)」」』。把前葉『移植到腎包膜→「脫離下視丘調控(無釋放激素、也無多巴胺抑制)」』→『需釋放激素的FSH/LH/TSH(及GH)「下降(-)」、而原本被抑制的「PRL「升高(↑)」」』。故D(FSH-、LH-、TSH-、PRL↑)正確。故D正確。臨床:垂體柄切斷/壓迫→PRL升高(失多巴胺抑制)、其他垂體激素降。","options":{"A":"非全部上升。","B":"PRL會升高(非不變)。","C":"PRL會升高(非不變)。","D":"FSH/LH/TSH降、PRL升—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109100-69":{"quick":"四碘甲狀腺素(T4)在血中主要靠甲狀腺素結合球蛋白(TBG)運送。","detail":{"background":"甲狀腺素的血漿運送:『T4(tetraiodothyronine)與T3「>99%與血漿蛋白結合」,「主要載體為「甲狀腺素結合球蛋白(TBG)」(約70%)」』,其次transthyretin(TTR)與白蛋白。故主要靠TBG(C)。免疫球蛋白非其載體。游離型(<1%)才有生物活性。故C正確。臨床:TBG變動(懷孕/雌激素↑TBG、肝病↓)改變「總T4」但「游離T4」維持→評估宜用游離型。","options":{"A":"白蛋白為次要載體。","B":"transthyretin為次要載體。","C":"T4主要靠TBG運送—正解。","D":"免疫球蛋白非載體。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109100-71":{"quick":"泌乳素(prolactin)與分娩過程最不相關。","detail":{"background":"分娩(parturition)相關因子:『「催產素(oxytocin)」促子宮收縮、「前列腺素」促子宮收縮與子宮頸軟化、「胎兒ACTH-皮質醇」啟動成熟與內分泌變化(雌/孕激素比改變)』—皆與發動分娩有關。而『「泌乳素(prolactin)」主要在「產後促進「泌乳(乳汁產生)」」,與「分娩過程本身」最不相關』。故D正確。記憶:分娩=催產素+前列腺素+胎兒皮質醇;泌乳素=產後泌乳。","options":{"A":"胎兒ACTH-皮質醇與分娩啟動相關。","B":"催產素促子宮收縮。","C":"前列腺素促分娩。","D":"泌乳素與分娩過程最不相關—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109100-72":{"quick":"雙顳側偏盲+頭痛+腦壓高=腦下垂體腫瘤壓迫視交叉。","detail":{"background":"病人『「雙側顳側偏盲(bitemporal hemianopia)」+頭痛+腦壓增高』→典型『「腦下垂體腫瘤(pituitary tumor)」向上壓迫「視交叉(中央交叉纖維,來自雙眼鼻側視網膜)」→雙顳側視野缺損』。故D正確。比較:枕葉腫瘤→對側同向偏盲;顳葉→上象限盲;額葉→非視野缺損為主。故D正確。臨床:垂體大腺瘤可致雙顳側偏盲、頭痛、垂體功能異常(如泌乳素瘤);MRI鞍區評估。","options":{"A":"枕葉腫瘤致對側同向偏盲。","B":"顳葉腫瘤致上象限盲。","C":"額葉腫瘤非視野缺損為主。","D":"腦下垂體腫瘤壓視交叉→雙顳側偏盲—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_110020-45":{"quick":"腦下垂體前葉嗜酸性細胞分泌激素,胞內含豐富「分泌顆粒」。","detail":{"background":"腦下垂體前葉(腺垂體)的『嗜酸性細胞(acidophil)』分泌『生長激素(GH)與泌乳素(PRL)』—屬「主動合成分泌蛋白質激素」的細胞,胞質『含「大量分泌顆粒(secretory granule)」(儲存激素)』、發達的粗糙ER與高基氏體。題問其『「最豐富」的特徵性構造』→『分泌顆粒(A)』(嗜酸性即源自顆粒被酸性染料染色)。故A正確。(嗜鹼性細胞分泌TSH/FSH/LH/ACTH;嫌色細胞顆粒少。)故A正確。","options":{"A":"分泌顆粒最豐富(嗜酸性源於此)—正解。","B":"高基氏體存在但非最特徵性豐富構造。","C":"粗糙ER發達但非定義特徵。","D":"中心粒非分泌細胞特徵。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_110020-68":{"quick":"泌乳素(prolactin)與正常個體生長相關性最小。","detail":{"background":"促進正常生長的激素:『「生長激素(GH)」(經IGF-1)為主、「甲狀腺素」(正常發育與GH作用)、「性類固醇(雄性素androgens、雌激素estrogens)」(青春期生長陡增與骨骺成熟)、胰島素』。而『「泌乳素(prolactin)」主要功能是「泌乳」,與「個體身高生長」相關性最小』。故A正確。記憶:生長=GH/IGF-1+甲狀腺素+性激素+胰島素;泌乳素管泌乳。","options":{"A":"泌乳素與生長相關性最小—正解。","B":"生長激素為生長主力。","C":"雄性素促青春期生長。","D":"雌激素促生長陡增與骨骺成熟。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111020-46":{"quick":"腎上腺「球狀帶」分泌「礦物皮質素(醛固酮)」非糖皮質素,故此配對錯誤。","detail":{"background":"內分泌腺配對:B『腎上腺髓質—嗜鉻細胞』(正確);C『腦上腺(松果體epiphysis cerebri)—腦砂(brain sand/corpora arenacea鈣化體)』(正確);D『腦下垂體神經部(後葉)—赫氏小體(Herring body,軸突內神經分泌物儲存膨大)』(正確)。A「腎上腺「球狀帶(zona glomerulosa)」—「糖皮質素」分泌細胞」『錯誤』—『球狀帶分泌「礦物皮質素(醛固酮)」;「糖皮質素(皮質醇)由「束狀帶」分泌」』。故A為正解。記憶:球狀帶=醛固酮(鹽)、束狀帶=皮質醇(糖)、網狀帶=雄性素(性)。","options":{"A":"稱球狀帶分泌糖皮質素—錯誤(球狀帶分泌醛固酮),為正解。","B":"腎上腺髓質-嗜鉻細胞,正確。","C":"松果體-腦砂,正確。","D":"後葉-赫氏小體,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111020-71":{"quick":"身體發炎時腎上腺分泌皮質醇(cortisol)以對抗/減緩發炎。","detail":{"background":"發炎時的內分泌反應:『發炎物質(IL-1、IL-6、TNF)刺激下視丘-腦下垂體-腎上腺軸(HPA)→「腎上腺分泌「皮質醇(cortisol,糖皮質素)」」→「抑制發炎(抑制細胞激素、前列腺素、白血球募集)」』,是身體內生的抗發炎機制。故D正確。比較:腎素(血壓/血量)、維生素D(皮膚合成的是D3非B)、體抑素非抗發炎主角。故D正確。臨床:此即外源性糖皮質素(類固醇)作為強力抗發炎/免疫抑制藥的生理基礎。","options":{"A":"腎素調節血壓血量(非抗發炎)。","B":"皮膚合成維生素D3(非B)、非抗發炎。","C":"體抑素抑制激素分泌(非抗發炎主角)。","D":"腎上腺分泌皮質醇抗發炎—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111100-67":{"quick":"視交叉上核(SCN)是晝夜節律樞紐,並調控松果體分泌「褪黑素(melatonin)」。","detail":{"background":"晝夜節律的主時鐘是下視丘『「視交叉上核(SCN)」』,接受視網膜光訊息與環境同步,並『經多突觸路徑調控「松果體」於暗期分泌「褪黑素(melatonin)」』(夜間升高、助眠與授時)。故B「SCN+褪黑素」正確。比較:腦下垂體前葉(多種激素)、後葉(ADH/oxytocin)、室旁核(神經內分泌)非晝夜節律的核心樞紐配對。故B正確。","options":{"A":"前葉非晝夜節律樞紐。","B":"SCN為節律樞紐、調控褪黑素—正解。","C":"後葉非節律樞紐。","D":"室旁核非節律主樞紐。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111100-71":{"quick":"甲狀腺低下與生長激素不足在新生兒「皆可致身材矮小」,敘述最適當。","detail":{"background":"甲狀腺功能異常:A『「甲狀腺低下」與「生長激素不足」在新生兒「皆可造成身材矮小」』(正確,兩者皆影響生長)。比較錯誤:B『「中樞性(垂體/下視丘)」甲狀腺低下時TSH「不升反降」』,故非「都升高」;C『甲狀腺亢進時T3/T4升、但「TSH「降低」(負回饋,除非TSH瘤)」』,非都升;D『「先天性甲狀腺低下(克汀病)」會致智能障礙,但「生長激素不足「不」造成智能障礙」』,故非「都」。故A最適當,為正解。臨床:新生兒甲狀腺篩檢防克汀病(智能障礙+矮小)。","options":{"A":"甲狀腺低下與GH不足皆致矮小—正解。","B":"中樞性甲狀腺低下TSH不升(非都升)。","C":"甲亢時TSH降(非都升)。","D":"GH不足不致智能障礙(非都)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_112020-46":{"quick":"生長激素細胞(somatotropes)是腦下垂體前葉內分泌細胞中數目比例最高者。","detail":{"background":"腦下垂體前葉細胞:『「生長激素細胞(somatotropes,分泌GH)」「數目比例最高(約占前葉細胞40–50%)」、屬「嗜酸性細胞」、位於「前葉(腺垂體)」』。故B正確。比較錯誤:A位於『前葉(腺垂體)』(非後葉);C somatotropes為『「嗜酸性(acidophil)」』(非嗜鹼性);D屬嗜酸性細胞(非嫌色細胞)。故B正確。臨床:GH瘤(嗜酸性腺瘤)→肢端肥大/巨人症。","options":{"A":"位於前葉(非後葉)。","B":"somatotropes數目比例最高—正解。","C":"屬嗜酸性(非嗜鹼性)。","D":"非嫌色細胞(屬嗜酸性)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_112020-71":{"quick":"甲狀腺荷爾蒙生物活性:T3 > T4 > RT3。","detail":{"background":"甲狀腺激素的生物活性:『「T3(三碘甲狀腺素)」活性「最高」(約T4的3–5倍,是與核受體結合的主要活性形式)』;『T4活性較低(主要是「前驅儲存」形式,在周邊由去碘酶轉成T3)』;『「逆T3(reverse T3, RT3)「無活性」」』。故順序『T3 > T4 > RT3』(A)。故A正確。臨床:周邊5′-去碘酶把T4→T3(活化)或T4→RT3(去活化,見於壓力/重病的「低T3症候群」)。","options":{"A":"T3>T4>RT3—正解。","B":"T3活性高於T4(非T4>T3)。","C":"T4活性高於RT3。","D":"RT3無活性、最低。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113020-67":{"quick":"限水4小時→血漿滲透壓升→ADH分泌增、尿液濃縮(尿滲透壓增)。","detail":{"background":"限制喝水(脫水):『血漿滲透壓「上升」→刺激下視丘滲透壓感受器→「ADH(抗利尿激素)分泌「增加」」→集尿管水再吸收增→「尿液濃縮(尿滲透壓「增加」、尿量減少)」』。故A「尿液滲透壓及血漿ADH濃度均增加」正確。此為保水的正常代償(經滲透壓-ADH反射)。故A正確。臨床:水剝奪試驗用以鑑別尿崩症類型(中樞性 vs 腎性)。","options":{"A":"尿滲透壓與血漿ADH均增加—正解。","B":"尿滲透壓應增加(非減少)。","C":"ADH應增加(非減少)。","D":"兩者皆增加(非皆減少)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113020-69":{"quick":"急性壓力:ACTH升高(皮質醇↑)且同時活化交感神經。","detail":{"background":"急性壓力反應整合兩系統:A『「下視丘-腦下垂體-腎上腺軸(HPA):CRH→ACTH↑→皮質醇↑」與「交感-腎上腺髓質系統」「同時」被活化(戰或逃)」』(正確)。比較錯誤:B具「允許作用(permissive)」使兒茶酚胺對心血管作用的是『「皮質醇(糖皮質素)」』(非ACTH本身);C壓力時脂肪分解主要由『「兒茶酚胺(交感/腎上腺素)」』驅動(皮質醇是允許/長期作用,非急性脂解主因);D『切除交感神經會「削弱」壓力反應的能力』(非仍完整)。故A正確。","options":{"A":"壓力使ACTH升且活化交感—正解。","B":"允許作用來自皮質醇(非ACTH)。","C":"急性脂解主由兒茶酚胺(非糖皮質素)。","D":"切交感會削弱壓力反應(非完整)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113020-70":{"quick":"甲狀腺素在肌肉是「增加蛋白質分解(分解代謝)」非合成,故此敘述最不恰當。","detail":{"background":"甲狀腺素的組織作用:A『心臟:增加對兒茶酚胺反應(增心率心收縮力)』(正確);C『神經系統:促進大腦發育(胎兒/嬰兒必需)』(正確);D『脂肪:促進脂肪分解』(正確)。B「肌肉:增加「蛋白質合成」」『最不恰當』—『甲狀腺素(尤其過量)在肌肉「增加蛋白質「分解(catabolism)」」→肌肉消耗無力』(甲亢時肌肉萎縮無力)。故B為正解。記憶:甲狀腺素整體增代謝率、產熱、增兒茶酚胺敏感;過量致分解代謝(消瘦)。","options":{"A":"增加心臟對兒茶酚胺反應,正確。","B":"稱肌肉增加蛋白質合成—最不恰當(實增分解),為正解。","C":"促進大腦發育,正確。","D":"促進脂肪分解,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113090-46":{"quick":"腦下垂體「後葉」不合成激素(只儲存釋放下視丘製造的ADH/催產素)。","detail":{"background":"激素合成部位:A腦下垂體前葉(合成GH/TSH等)、C腎上腺皮質(合成類固醇)、D腎上腺髓質(合成兒茶酚胺)—皆『「合成」激素』。而『「腦下垂體「後葉(神經垂體)」「不合成激素」』—它只是『「儲存與釋放」由「下視丘(室旁核/視上核)」神經元合成、經軸突運來的「ADH與催產素」』。故B(後葉)細胞不合成激素,為正解。故B正確。記憶:後葉=神經分泌物的儲存釋放站(製造在下視丘)。","options":{"A":"前葉合成多種激素。","B":"後葉不合成激素(只儲存釋放)—正解。","C":"腎上腺皮質合成類固醇。","D":"腎上腺髓質合成兒茶酚胺。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113090-68":{"quick":"給予多巴胺受體致效劑會「抑制」泌乳素分泌,故最不具促進作用。","detail":{"background":"泌乳素(prolactin)分泌調控:『主要受下視丘「多巴胺「持續抑制」」』;促進其分泌的因素有『「睡眠(夜間升高)、壓力、懷孕(雌激素)、吸吮、TRH」』。而『「給予「多巴胺受體致效劑(dopamine agonist)」會「抑制」泌乳素分泌」』(與促進相反)。故D最不具促進作用(反而抑制),為正解。故D正確。臨床:多巴胺致效劑(bromocriptine、cabergoline)用於治療泌乳素瘤/高泌乳素血症;抗多巴胺藥(抗精神病)反致高泌乳素。","options":{"A":"睡眠促進泌乳素。","B":"壓力促進泌乳素。","C":"懷孕(雌激素)促進泌乳素。","D":"多巴胺致效劑抑制泌乳素—最不促進,為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113090-69":{"quick":"身材矮小但GH正常→最可能為「生長激素受體缺損」(Laron症候群)。","detail":{"background":"矮小但『血中GH濃度正常(甚至偏高)』→問題不在GH分泌,而在『「GH「受體」結構缺損→組織對GH無反應→IGF-1生成不足→生長障礙」=「Laron症候群(生長激素不敏感)」』。故B正確。比較錯誤:A GHRH受體缺損會使『GH「分泌減少」(GH應低,非正常)』;C體抑素不足會使『GH「增加」』(非致矮小);D動情素缺損影響青春期生長陡增、但本例GH正常且為6歲幼童。故B正確。臨床:Laron症GH高但IGF-1低,治療用重組IGF-1。","options":{"A":"GHRH受體缺損會使GH分泌減少(此例GH正常)。","B":"GH受體缺損(Laron)→GH正常但不生長—正解。","C":"體抑素不足會使GH增加(非矮小)。","D":"動情素缺損非此6歲幼童矮小主因。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114020-70":{"quick":"血中T4與T3「皆」主要與血漿蛋白結合;稱T3以游離型存在最不適當。","detail":{"background":"甲狀腺激素:A『TSH促進甲狀腺球蛋白(thyroglobulin)的「水解」釋出T3/T4』(正確);B『甲狀腺分泌的主要是「T4(約90%)」』(正確);D『標的細胞內與核受體結合的主要是「T3」(活性形式)』(正確)。C「血中T4主要與血漿蛋白結合,「T3則以游離型存在」」『最不適當』—『T4與T3「皆」>99%與血漿蛋白結合(T3結合稍弱、游離比例略高,但仍以結合型為主,非「以游離型存在」)』。故C為正解。記憶:T4、T3血中皆高度結合;組織內T4轉T3作用於核受體。","options":{"A":"TSH促甲狀腺球蛋白水解釋激素,正確。","B":"主要分泌T4,正確。","C":"稱T3以游離型存在—最不適當(T3亦主要與蛋白結合),為正解。","D":"核受體主要結合T3,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114090-69":{"quick":"黃體生成素(LH)與人類絨毛性腺刺激素(hCG)與TSH具相同的α次單元。","detail":{"background":"糖蛋白激素家族『「TSH、LH、FSH、hCG」「共用相同的α次單元」』,各以不同的β次單元決定其專一活性。故與TSH共用α次單元者為『LH與hCG(D)』(FSH亦是)。故D正確。比較:GH/PRL為單鏈非糖蛋白;ACTH是POMC衍生;ADH/oxytocin為九肽。故D正確。臨床:hCG與TSH α次單元相同→妊娠/絨毛癌的高hCG可「交叉刺激」甲狀腺(妊娠甲亢)。","options":{"A":"GH/PRL為單鏈、非此家族。","B":"ACTH非糖蛋白家族(FSH是,但ACTH不是)。","C":"ADH/oxytocin為九肽。","D":"LH與hCG與TSH共用α次單元—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-51":{"quick":"苯基乙醇胺N-甲基轉移酶(PNMT)把正腎上腺素轉成腎上腺素。","detail":{"background":"兒茶酚胺合成途徑:酪胺酸→多巴(DOPA)→多巴胺→正腎上腺素→『「苯基乙醇胺N-甲基轉移酶(PNMT)」把「正腎上腺素「甲基化」轉成「腎上腺素(epinephrine)」」』。PNMT主要在『腎上腺髓質(受皮質醇誘導)』。故D正確。其他N-甲基轉移酶作用於組織胺、菸鹼醯胺、胍基乙酸,與此無關。故D正確。臨床:嗜鉻細胞瘤分泌兒茶酚胺;PNMT受皮質醇調控故腎上腺髓質產腎上腺素。","options":{"A":"組織胺N-甲基轉移酶代謝組織胺。","B":"菸鹼醯胺N-甲基轉移酶作用於菸鹼醯胺。","C":"胍基乙酸N-甲基轉移酶在肌酸合成。","D":"PNMT把NE轉成腎上腺素—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-68":{"quick":"抗利尿激素(ADH)促進的是「集尿管(與遠端)」水再吸收,非近端腎小管,故此敘述最不適當。","detail":{"background":"腦下垂體後葉激素:A『催產素由「神經細胞(下視丘)」分泌』(正確);B『催產素促子宮平滑肌收縮』(正確);D『血漿滲透壓升高→促進ADH分泌』(正確)。C「ADH促進「近端腎小管」水再吸收」『最不適當』—『ADH作用於「集尿管(與遠曲小管末)」的V2受體→插入AQP2水通道→水再吸收;「近端腎小管」的水再吸收是「等滲、不受ADH調控」』。故C為正解。記憶:ADH作用點在集尿管(非近端)。","options":{"A":"催產素由下視丘神經細胞分泌,正確。","B":"催產素促子宮收縮,正確。","C":"稱ADH促近端腎小管水再吸收—最不適當(應為集尿管),為正解。","D":"血漿滲透壓升促ADH分泌,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-69":{"quick":"尿液濃縮功能受損屬「後葉(ADH)」問題;腦下垂體「前葉」功能低下最不可能致此。","detail":{"background":"腦下垂體『「前葉」功能低下(panhypopituitarism)』會缺乏前葉激素→『不孕(LH/FSH↓性腺低下,A會發生)、生長發育遲緩(GH↓,B會發生)、基礎代謝率變慢(TSH↓甲狀腺低下,C會發生)』。而『「尿液濃縮功能受損」是「ADH(後葉激素)缺乏=「尿崩症」」的表現』—屬『「後葉」問題,「前葉」功能低下「最不可能」造成尿濃縮受損』。故D正確。記憶:前葉不足→性腺/甲狀腺/生長/腎上腺低下;尿崩(濃縮差)是後葉ADH問題。","options":{"A":"前葉不足致性腺低下→不孕,會發生。","B":"GH不足致生長遲緩,會發生。","C":"TSH不足致代謝率慢,會發生。","D":"尿濃縮受損屬後葉ADH問題—前葉不足最不可能,為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109100-54":{"quick":"單一單位平滑肌在無外在刺激下仍維持低度張力(tone),多單位則否。","detail":{"background":"平滑肌分兩型:『「單一單位(single-unit/visceral)」如腸胃、子宮、血管—細胞間「間隙接合」電耦合成同步單位、具「自發節律(慢波)」、「無外在刺激仍維持低度「張力(tone)」」、可被牽張誘發收縮(myogenic)』;『「多單位(multi-unit)」如虹膜、輸精管、大動脈—各細胞「獨立、由神經個別支配」、無自發節律、靠神經刺激收縮』。故A「單一單位無刺激仍維持tone、多單位則否」正確。比較錯誤:B單一單位「會」自發動作電位;C單一單位「被拉長會」收縮;D兩者皆受激素調節。故A正確。","options":{"A":"單一單位無刺激維持低度張力—正解。","B":"單一單位會自發動作電位。","C":"單一單位被拉長會收縮。","D":"兩者皆受激素調節。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111020-58":{"quick":"B細胞無法形成漿細胞,最可能缺乏interleukin-2(IL-2,促淋巴球增殖分化)。","detail":{"background":"B細胞活化後須在輔助T細胞與細胞激素協助下增殖分化為『漿細胞(產抗體)』。其中『「介白素-2(IL-2)」是由活化T細胞分泌、「促進T與B淋巴球增殖、分化」的關鍵生長因子』—缺乏IL-2會使淋巴球(含B細胞)無法有效增殖分化成漿細胞。故C正確。比較:第I型干擾素(抗病毒)、第II型干擾素(IFN-γ,活化巨噬細胞)、群落刺激因子(CSF,促骨髓造血)非B細胞分化漿細胞的核心。故C正確。臨床:IL-2缺陷/IL-2受體缺陷致嚴重免疫缺乏。","options":{"A":"第I型干擾素抗病毒(非B分化)。","B":"第II型干擾素活化巨噬細胞。","C":"缺IL-2致淋巴球無法增殖分化成漿細胞—正解。","D":"CSF促造血(非B分化)。"},"sources":["Abbas《Cellular and Molecular Immunology》","Guyton & Hall《生理學》"]}},"med1_113090-52":{"quick":"蕈毒類受體(muscarinic)屬代謝型(metabotropic, G蛋白偶聯)受體。","detail":{"background":"受體分兩大類:『「離子型(ionotropic)受體=配體閘控離子通道(快)」—AMPA、NMDA(麩胺酸)、甘胺酸受體、菸鹼型乙醯膽鹼受體』;『「代謝型(metabotropic)受體=G蛋白偶聯受體(經第二信使,慢而持久)」—「蕈毒類(muscarinic)乙醯膽鹼受體」、腎上腺素受體、多巴胺、代謝型麩胺酸受體等』。故D(蕈毒類受體)為代謝型,為正解。故D正確。記憶:nicotinic=離子型(快);muscarinic=代謝型(G蛋白)。","options":{"A":"AMPA為離子型受體。","B":"NMDA為離子型受體。","C":"甘胺酸受體為離子型(Cl通道)。","D":"蕈毒類受體為代謝型(G蛋白偶聯)—正解。"},"sources":["Kandel《Neural Science》","Guyton & Hall《生理學》"]}},"med1_114090-52":{"quick":"正腎上腺素→α1受體是「傳導物質-代謝型受體」的正確配對。","detail":{"background":"神經傳導物質與『代謝型(G蛋白偶聯)受體』配對:A『「正腎上腺素→α1腎上腺素受體(Gq偶聯,代謝型)」』正確。比較錯誤:B『組織胺對應H受體(非5-HT1;5-HT1是血清素受體)』;C『乙醯膽鹼→「菸鹼(nicotinic)受體」是「離子型」(非代謝型)』(代謝型應為muscarinic);D『麩胺酸→AMPA受體是「離子型」(非代謝型)』(代謝型為mGluR)。故A正確。故A正確。","options":{"A":"正腎上腺素→α1受體(代謝型)—正解。","B":"組織胺對應H受體(非5-HT1)。","C":"ACh→菸鹼受體為離子型(非代謝型)。","D":"麩胺酸→AMPA為離子型(非代謝型)。"},"sources":["Kandel《Neural Science》","Guyton & Hall《生理學》"]}},"med1_106100-68":{"quick":"胰臟β細胞表面的葡萄糖轉運蛋白為GLUT2。","detail":{"background":"葡萄糖轉運蛋白(GLUT)組織分布:『GLUT1(紅血球、腦屏障,基礎攝取)、GLUT2(「胰β細胞、肝、腎、腸基底側」—高Km,作為「血糖感測器」,使β細胞攝糖速率隨血糖變化)、GLUT3(神經元)、GLUT4(肌肉/脂肪,胰島素依賴)』。故β細胞表面為『GLUT2』(B)—讓β細胞「感應」血糖濃度而調節胰島素分泌。故B正確。臨床:GLUT2缺陷影響血糖感測(Fanconi-Bickel症候群)。","options":{"A":"GLUT1在紅血球/腦屏障。","B":"胰β細胞為GLUT2(血糖感測)—正解。","C":"GLUT3在神經元。","D":"GLUT4在肌肉/脂肪(胰島素依賴)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_106100-69":{"quick":"刺激蛋白質合成「非」胰島素數秒內的急性作用(屬較慢的代謝效應)。","detail":{"background":"胰島素作用依時程:『「數秒(極快)」=「促進葡萄糖、胺基酸、鉀離子「進入」細胞(GLUT4上膜、增膜運輸)」』;『「數分鐘」=活化/抑制代謝酶(促肝醣與脂肪合成、抑制糖質新生)』;『「數小時-數天」=「增加蛋白質「合成」與基因轉錄、細胞生長」』。故A「刺激蛋白質合成」屬『較慢(數小時)的作用、非數秒急性』,為正解。比較:B(攝糖)、C(K⁺進入)、D(胺基酸攝取)皆為數秒快速膜運輸效應。故A正確。臨床:胰島素促K⁺進細胞→治療高血鉀。","options":{"A":"刺激蛋白質合成屬較慢作用、非數秒急性—正解。","B":"促葡萄糖攝取為數秒急性。","C":"促鉀進入細胞為數秒急性。","D":"促胺基酸攝取為數秒急性。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_106100-71":{"quick":"皮質醇(cortisol)最不可能促進骨質增加(反而造成骨流失)。","detail":{"background":"促進骨質量(bone mass)增加的激素:『生長激素(經IGF-1促骨生成)、睪固酮與雌激素(性類固醇,促骨形成、抑制骨吸收、雌激素尤其維持骨密度)』。而『「皮質醇(糖皮質素)」「抑制骨母細胞、增加骨吸收、減少腸鈣吸收與腎鈣再吸收」→「造成骨質「流失」(骨質疏鬆)」』。故D(cortisol)最不可能促進骨質增加,為正解。故D正確。臨床:庫欣症/長期類固醇→骨質疏鬆;停經(雌激素↓)→骨流失。","options":{"A":"生長激素促骨生成。","B":"睪固酮促骨形成。","C":"雌激素維持骨密度。","D":"皮質醇造成骨流失—最不可能促骨增加,為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_107100-65":{"quick":"此為糖尿病酮酸中毒(DKA);尿中HCO₃⁻排出「不會」較多(腎反而保留HCO₃⁻)。","detail":{"background":"病人口渴、呼吸有丙酮果香味、高血糖→『糖尿病酮酸中毒(DKA)』:代謝性酸中毒+高血糖。腎臟反應:『A尿pH「低」(排酸)、B尿NH₄⁺排出「多」(緩衝排酸)、C尿量「多」(高血糖滲透性利尿)』—皆會發生。而『D尿中「HCO₃⁻」排出「不會較多」—酸中毒時腎臟「再吸收/再生HCO₃⁻」以保留鹼,故尿HCO₃⁻「低」』。故D(尿HCO₃⁻較多)是『不會發生』的,為正解。記憶:代謝性酸中毒→腎保HCO₃⁻、排NH₄⁺與可滴定酸、尿酸性。","options":{"A":"尿pH較低(排酸),會發生。","B":"尿NH₄⁺排出多(緩衝),會發生。","C":"尿量多(滲透性利尿),會發生。","D":"尿HCO₃⁻排出多—不會發生(腎保留HCO₃⁻),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_107100-68":{"quick":"酮體由乙醯乙酸、β-羥丁酸、丙酮構成(123)。","detail":{"background":"酮體(ketone bodies)有三種:『「乙醯乙酸(acetoacetate,1)」、「β-羥丁酸(β-hydroxybutyrate,2)」、「丙酮(acetone,3)」』—由肝臟在脂肪酸β氧化(乙醯輔酶A過剩)時生成,供周邊(腦、肌肉)能量。故由123構成(C)。糖尿病酮酸中毒時三者升高(丙酮揮發致呼氣果香味)。故C正確(僅123)。","options":{"A":"1234多含一項。","B":"124漏β-羥丁酸或丙酮。","C":"僅123(乙醯乙酸+β-羥丁酸+丙酮)—正解。","D":"34不完整。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_107100-69":{"quick":"維生素D3轉成25-羥維生素D₃主要在肝臟進行。","detail":{"background":"維生素D活化兩步驟:『「肝臟」以25-羥化酶把維生素D₃(膽鈣化醇)轉成「25-羥維生素D₃(calcidiol)」(主要儲存/循環形式)』;再由『「腎臟」的1α-羥化酶轉成「1,25-二羥維生素D₃(calcitriol,活性形式)」』(受PTH、低磷刺激)。故D3→25-OH-D₃在『肝臟』(C)。故C正確。記憶:皮膚合成D3→肝25-OH→腎1,25-(活性)。臨床:肝病影響25-羥化;腎病/腎衰致活性D不足→腎性骨病變。","options":{"A":"皮膚合成維生素D3(非25-羥化處)。","B":"腎臟做最終1α-羥化(活化)。","C":"肝臟做25-羥化—正解。","D":"副甲狀腺分泌PTH(非羥化處)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108030-68":{"quick":"胰島素分泌主要隨「進食/血糖」變化,最不隨晝夜生物時鐘改變。","detail":{"background":"隨晝夜節律明顯變化者:『體溫(下午高、凌晨低)、皮質醇(清晨高峰)、褪黑激素(夜間高)、GH(深睡分泌)』。而『「胰島素」分泌「主要受「進食後血糖」即時調控」,雖有些微節律但「最不隨晝夜生物時鐘」變化』。故D(胰島素)最不隨晝夜時鐘,為正解。故D正確。記憶:皮質醇/褪黑激素/體溫/GH有明顯晝夜節律;胰島素跟餐後血糖走。","options":{"A":"體溫隨晝夜節律。","B":"皮質醇有明顯晝夜節律。","C":"褪黑激素夜間升高(晝夜節律)。","D":"胰島素隨進食血糖、最不隨晝夜時鐘—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108030-69":{"quick":"類固醇生成急性調節蛋白(StAR)把膽固醇送入粒線體(類固醇合成的速率限制步驟)。","detail":{"background":"類固醇合成的『速率限制步驟=膽固醇「進入粒線體內膜」』,由『「類固醇生成急性調節蛋白(StAR, steroidogenic acute regulatory protein)」「把膽固醇從粒線體外膜運送到「內膜」」』,再由粒線體內的「膽固醇側鏈裂解酶(P450scc)」把膽固醇轉成妊烯醇酮(pregnenolone)。故StAR的功能是『把膽固醇送入粒線體(C)』。故C正確。比較:把膽固醇轉妊烯醇酮是P450scc(非StAR);StAR非運膽固醇進「細胞」、非合成LDL。臨床:StAR突變→先天性類脂性腎上腺增生(類固醇合成衰竭)。","options":{"A":"轉成妊烯醇酮是P450scc(非StAR)。","B":"StAR運膽固醇入粒線體(非入細胞)。","C":"StAR把膽固醇送入粒線體—正解。","D":"StAR與LDL合成無關。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108030-70":{"quick":"甲狀腺素(脂溶性)主要進入細胞與「胞內(核)受器」結合。","detail":{"background":"激素受體位置依溶解度:『「脂溶性激素(甲狀腺素、類固醇)」「穿過細胞膜、與「胞內(核)受體」結合→調控基因轉錄」(作用慢而持久)』;『水溶性激素(胰島素、GH、ANP、胜肽)作用於「細胞膜受體」』。故主要進入細胞與胞內受器結合者為『甲狀腺素(A)』。故A正確。比較:胰島素(膜受體酪胺酸激酶)、GH(膜受體JAK-STAT)、ANP(膜受體鳥苷酸環化酶)皆膜受體。故A正確。","options":{"A":"甲狀腺素進入細胞與核受體結合—正解。","B":"胰島素作用膜受體。","C":"GH作用膜受體。","D":"ANP作用膜受體。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108100-68":{"quick":"β細胞內鈣濃度升高觸發胰島素自分泌囊泡釋出。","detail":{"background":"胰島素分泌機轉:『血糖經「GLUT2」進入β細胞→代謝產ATP→「ATP敏感性鉀通道「關閉」」→膜「去極化」→電壓閘控「鈣通道開啟、Ca²⁺內流」→「胞內鈣升高→觸發胰島素分泌囊泡胞吐釋放」』。故D「β細胞鈣濃度升高與胰島素釋放有關」正確。比較錯誤:A經「GLUT2」(非GLUT4);B鉀通道「關閉(非打開)」才去極化;C胺基酸主要經去極化/代謝促分泌(非主經cAMP)。故D正確。臨床:磺醯脲類(sulfonylurea)關閉K-ATP通道→促胰島素分泌(降血糖)。","options":{"A":"經GLUT2(非GLUT4)。","B":"K-ATP通道關閉(非打開)才去極化。","C":"胺基酸促分泌非主經cAMP。","D":"鈣升高觸發胰島素釋放—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109020-70":{"quick":"DHEA由「ACTH」調控(非LH),故此敘述錯誤。","detail":{"background":"脫氫異雄固酮(DHEA):A『是腎上腺(網狀帶)製造雄性素的「先驅物」』(正確);C『DHEA(S)約20歲達高峰、後隨年齡下降』(正確);D『女性DHEA過度分泌→男性化/腎上腺性徵異常』(正確)。B「「黃體刺激素(LH)」是調控腎上腺製造DHEA的主要激素」『錯誤』—『腎上腺雄性素(DHEA)主要受「ACTH」調控(非LH;LH調控性腺)』。故B為正解。記憶:腎上腺皮質(含網狀帶DHEA)受ACTH;性腺受LH/FSH。","options":{"A":"DHEA為腎上腺雄性素先驅物,正確。","B":"稱LH調控腎上腺DHEA—錯誤(應為ACTH),為正解。","C":"約20歲達高峰,正確。","D":"女性過度分泌致男性化,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109020-72":{"quick":"原發性高醛固酮血症常伴「葡萄糖耐受性不良」(低血鉀抑制胰島素)。","detail":{"background":"原發性高醛固酮血症(primary hyperaldosteronism, Conn症):醛固酮過多→『保鈉排鉀→「高血鈉、「低血鉀」、高血壓、代謝性鹼中毒」』。其中『「低血鉀「抑制胰島素分泌」→「葡萄糖耐受性不良(血糖偏高)」」』。故A正確。比較錯誤:B血鈉「升」(非流失);C「高血壓」(非低血壓);D血脂非特徵性下降。故A正確。臨床:難治性高血壓+低血鉀疑Conn症;醛固酮/腎素比篩檢。","options":{"A":"葡萄糖耐受性不良(低鉀抑胰島素)—正解。","B":"血鈉升高(非流失)。","C":"高血壓(非低血壓)。","D":"血脂非特徵性下降。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109100-68":{"quick":"促甲狀腺素(TSH)是最典型的促素(tropic hormone)。","detail":{"background":"『促素(tropic hormone)=「作用於「另一內分泌腺」、調控其分泌的激素」』,典型為腦下垂體前葉的『TSH(促甲狀腺)、ACTH(促腎上腺)、LH/FSH(促性腺)』。故D(TSH)最典型,為正解。比較:thyroxine是甲狀腺的「終末效應激素」(作用於全身組織非調控他腺)、IGF-1是生長因子、PGE2是局部介質—皆非促素。故D正確。","options":{"A":"thyroxine為終末效應激素(非促素)。","B":"IGF-1為生長因子。","C":"PGE2為局部介質。","D":"TSH為最典型促素—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_110020-69":{"quick":"腸道鈣吸收主要受活化態維生素D(calcitriol)調控。","detail":{"background":"鈣磷代謝:D『「腸道鈣吸收主要受「活化態維生素D(1,25-(OH)₂D₃,calcitriol)」調控」(促進腸鈣與磷吸收)』正確。比較錯誤:A『腸道吸收效率「磷比鈣好」(磷吸收約70%、鈣約30%)』(非鈣比磷好);B『約「85%的磷在「骨骼」」(非99%在血液;血中磷少)』;C『血鈣約「50%游離態、40%與白蛋白結合、10%與陰離子結合」(非95%以上游離)』。故D正確。臨床:維生素D缺乏→腸鈣吸收差→低血鈣、骨軟化/佝僂。","options":{"A":"磷吸收效率比鈣好(非鈣比磷好)。","B":"約85%磷在骨骼(非99%在血液)。","C":"血鈣約50%游離(非95%以上)。","D":"腸鈣吸收受活化維生素D調控—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_110020-70":{"quick":"長期高鈉飲食使滲透壓上升→ADH(升壓素)應「上升」,故「ADH下降」最不可能。","detail":{"background":"長期高鈉飲食:鈉與血量增加→恆定反應:『A「尿鈉排泄上升」(排多餘鈉)、B「ANP上升」(血量擴張、利鈉)、D「醛固酮下降」(減少保鈉)』—皆會發生。而『高鈉使「血漿滲透壓上升」→「ADH(升壓素/vasopressin)應「上升」(保水稀釋)」』→故C「ADH「下降」」『最不可能』,為正解。故C正確。記憶:高鈉→ANP↑、醛固酮↓、尿鈉↑、ADH↑(保水)。","options":{"A":"尿鈉排泄上升,會發生。","B":"ANP上升(血量擴張),會發生。","C":"稱升壓素濃度下降—最不可能(高滲應使ADH上升),為正解。","D":"醛固酮下降(減保鈉),會發生。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_110020-71":{"quick":"維生素D缺乏不會造成白化症(albinism為黑色素缺陷)。","detail":{"background":"長期維生素D缺乏→腸鈣磷吸收不良→低血鈣磷→『「骨礦化不良」:成人「軟骨症(osteomalacia)」、兒童佝僂病、骨痛骨折(A)、低血鈣致「肌肉抽搐/搐搦(B)」』。而『「白化症(albinism)」是「黑色素合成(酪胺酸酶)基因缺陷」,與維生素D「無關」』。故C(白化症)最不會發生,為正解。故C正確。記憶:維生素D缺乏=骨軟化/佝僂+低血鈣搐搦;白化症=黑色素缺陷(遺傳)。","options":{"A":"低血鈣骨礦化差致骨折,會發生。","B":"低血鈣致肌肉抽搐,會發生。","C":"白化症為黑色素缺陷、與維生素D無關—最不會,為正解。","D":"軟骨症為維生素D缺乏典型。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111020-69":{"quick":"腦下垂體切除後,醛固酮分泌量受影響最小(主要受RAAS與血鉀調控)。","detail":{"background":"腦下垂體切除→前葉促素(ACTH、TSH、LH/FSH)缺乏→『皮質醇(A,需ACTH)、性腺類固醇含黃體素(C,需LH/FSH)、甲狀腺素(D,需TSH)皆「下降」』。而『「醛固酮(aldosterone)」主要受「腎素-血管張力素系統(RAAS)與血鉀」調控、「ACTH僅輔助/允許」』→腦下垂體切除對醛固酮影響「最小」。故B正確(受影響最小)。故B正確。記憶:醛固酮獨立於垂體(RAAS/K主控);其餘皮質醇/性腺/甲狀腺需垂體促素。","options":{"A":"皮質醇需ACTH、會下降。","B":"醛固酮受RAAS/血鉀調控、受影響最小—正解。","C":"黃體素需LH、會下降。","D":"甲狀腺素需TSH、會下降。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111020-70":{"quick":"皮質醇(cortisol)不促進生長、且過量明顯抑制生長。","detail":{"background":"促進生長的激素:生長激素、甲狀腺素、胰島素、性類固醇(睪固酮、雌激素)。而『「皮質醇(糖皮質素)」「不促生長」,且「過量(庫欣/長期類固醇)會「明顯抑制生長」」—因其抑制骨生長板、促蛋白分解、抑制IGF-1作用』。故A(cortisol)為「不促生長且抑制生長」者,為正解。故A正確。臨床:兒童長期使用糖皮質素→生長遲緩;庫欣症兒童身材矮小。","options":{"A":"皮質醇不促生長且抑制生長—正解。","B":"胰島素促生長(合成代謝)。","C":"甲狀腺素促生長發育。","D":"睪固酮促生長。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111020-73":{"quick":"胰島素不足→肝臟酮體生成增加(脂肪分解、β氧化過剩)。","detail":{"background":"胰島素「不足」(如糖尿病)的代謝變化是『「分解代謝(catabolic)」佔優』:『「肝臟脂肪酸β氧化過剩→「酮體生成增加(C)」」、肝醣分解與糖質新生增加(高血糖)、脂肪分解增、蛋白分解增』。故C「肝臟酮體增加」正確。比較錯誤:A肝醣合成「減少」(非增加);B肌肉攝糖「減少」(GLUT4不上膜);D脂肪合成「減少」(脂解增)。故C正確。臨床:胰島素缺乏→糖尿病酮酸中毒(DKA,高血糖+酮體+代謝性酸中毒)。","options":{"A":"胰島素不足肝醣合成減少(非增加)。","B":"肌肉攝糖減少(非增加)。","C":"肝臟酮體生成增加—正解。","D":"脂肪合成減少(非增加)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111100-68":{"quick":"血管收縮素II刺激醛固酮分泌→減少腎臟鈉排放(保鈉)。","detail":{"background":"醛固酮(aldosterone)分泌與作用:C『「血管張力素II(angiotensin II)刺激醛固酮分泌」→醛固酮作用集尿管「增加鈉再吸收(減少鈉「排放」)、增加鉀與H⁺排出」』正確。比較錯誤:A體抑素不刺激醛固酮(且醛固酮與碘無關);B腎上腺素非醛固酮主要刺激(且與鈣再吸收無關);D『ACTH「僅輔助」刺激醛固酮(主要刺激為AngII與血鉀)、且醛固酮「增加(非減少)」鉀排放』。故C正確。記憶:醛固酮主要受AngII與高血鉀刺激→保鈉排鉀。","options":{"A":"體抑素不刺激醛固酮(且與碘無關)。","B":"腎上腺素非醛固酮主刺激(與鈣無關)。","C":"AngII刺激醛固酮→減少鈉排放—正解。","D":"ACTH僅輔助、且醛固酮增鉀排放(非減)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111100-69":{"quick":"登高山→腎上腺素分泌增加,促進肝糖分解(供腦葡萄糖)。","detail":{"background":"登高山低氧壓力→交感-腎上腺髓質活化:『「腎上腺素(epinephrine)分泌增加→「促進肝臟「肝糖分解(glycogenolysis)」」釋出葡萄糖→供腦能量」』。故B正確。比較錯誤:A雌二醇與此壓力反應無關、且糖原「生成」會「消耗」血糖(非供能);C多巴胺非腎上腺主要分泌的供能激素;D醛固酮管鈉/血量(非釋酮體)。故B正確。記憶:壓力/低氧→交感+腎上腺素→肝糖分解+脂解→升血糖供腦。","options":{"A":"雌二醇與此無關、糖原生成耗糖。","B":"腎上腺素增加、促肝糖分解供腦—正解。","C":"多巴胺非主要供能激素。","D":"醛固酮管鈉血量(非釋酮體)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_111100-70":{"quick":"半夜低血糖→腎上腺分泌腎上腺素(升糖反調節激素)。","detail":{"background":"低血糖時的『反調節(counter-regulatory)激素』升血糖:『升糖素(glucagon)、「腎上腺素(epinephrine,腎上腺髓質)」、皮質醇、生長激素』—促肝糖分解、糖質新生、脂解。故半夜血糖降時『「腎上腺分泌腎上腺素」(D)』協助升血糖。比較:secretin(消化)、腎臟維生素D(鈣)、somatostatin(抑制分泌)皆非升血糖反調節。故D正確。臨床:糖尿病自主神經病變使反調節(腎上腺素)反應鈍化→無自覺低血糖危險。","options":{"A":"secretin為消化激素(非升血糖)。","B":"維生素D管鈣磷(非血糖)。","C":"體抑素抑制分泌(非升血糖)。","D":"腎上腺分泌腎上腺素升血糖—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_112020-68":{"quick":"低鈉、高鉀的電解質型態最符合腎上腺功能不足(Addison)。","detail":{"background":"醛固酮缺乏(腎上腺功能不足/Addison)→『保鈉排鉀失能→「低血鈉(Na↓)、高血鉀(K↑)、代謝性酸中毒」』。題給電解質型態(相對低鈉高鉀傾向)→最符合『腎上腺功能不足(A)』。比較:原發性高醛固酮(高鈉低鉀)、庫欣症(高皮質醇,鈉鉀變化較輕)、低鈉飲食(僅鈉略低、鉀正常)皆不符合「低鈉+高鉀」組合。故A正確。臨床:Addison危象=低鈉高鉀低血糖低血壓、皮膚色素沉著(ACTH/MSH↑)。","options":{"A":"低鈉高鉀符合腎上腺功能不足(Addison)—正解。","B":"原發高醛固酮為高鈉低鉀。","C":"庫欣症鈉鉀變化較輕。","D":"低鈉飲食不致高鉀。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_112020-69":{"quick":"維生素D3可由食物攝取補充(亦可皮膚合成)。","detail":{"background":"維生素D3(膽鈣化醇, cholecalciferol):D『「可由「食物(動物性,如魚肝油)攝取」補充」,亦可由「皮膚經紫外線從7-脫氫膽固醇合成」』正確。比較錯誤:A『25-羥維生素D₃是D3「在肝臟羥化後」的產物(非D3本身別名)』;B『D3在「皮膚」合成(非肝臟;肝臟做25-羥化)』;C『「1α-羥化酶在「腎臟」作用形成活性1,25-(OH)₂D₃」—此敘述本身對活性化正確,但比較下D最直接適當』。故D最適當,為正解。記憶:D3來源=皮膚合成+食物;活化=肝25-OH→腎1,25。","options":{"A":"25-OH-D₃是肝羥化後產物(非D3別名)。","B":"D3在皮膚合成(非肝)。","C":"活性化敘述對但非最直接;D更適當。","D":"維生素D3可由食物攝取補充—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_112020-70":{"quick":"原發性高醛固酮血症的「低血鉀抑制胰島素分泌」,敘述最適當。","detail":{"background":"原發性高醛固酮血症(Conn症)→保鈉排鉀→『「低血鉀」』:D『「低血鉀「抑制胰島素分泌」(因β細胞需鉀維持功能)→可致葡萄糖耐受不良」』最適當。比較錯誤:A高血鈉「致胰島素抗性」非主要機制(高醛固酮的糖代謝異常主因是低鉀);B醛固酮非主要經交感升血糖;C醛固酮主要增「鈉與「水」」再吸收、非「葡萄糖」。故D正確。臨床:Conn症常見低血鉀、葡萄糖耐受不良、難治高血壓。","options":{"A":"高血鈉致胰島素抗性非主機制。","B":"醛固酮非經交感升血糖為主。","C":"醛固酮增鈉再吸收(非葡萄糖)。","D":"低血鉀抑制胰島素分泌—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_112020-72":{"quick":"胰島素不足造成「代謝性」酸中毒(非呼吸性),故呼吸性酸中毒最不可能。","detail":{"background":"胰島素不足(糖尿病)的後果:『A酮體增加、D游離脂肪酸增加(脂解)、B高血糖致「滲透性利尿」』—皆會發生。酸鹼方面是『「酮酸堆積→「「代謝性」酸中毒(metabolic acidosis,DKA)」」』,並引起『「代償性「過度換氣(Kussmaul呼吸)」排CO₂」→傾向「呼吸性「鹼」」代償』。故C「呼吸性「酸」中毒」『最不可能』(胰島素不足是代謝性酸中毒、呼吸代償是過度換氣排CO₂),為正解。故C正確。","options":{"A":"酮體增加,會發生。","B":"高血糖致滲透性利尿,會發生。","C":"呼吸性酸中毒—最不可能(實為代謝性酸中毒),為正解。","D":"游離脂肪酸升高,會發生。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113020-57":{"quick":"惡性貧血應補充維生素B12。","detail":{"background":"惡性貧血(pernicious anemia):『自體免疫破壞胃壁細胞或抗內在因子抗體→「內在因子缺乏→迴腸無法吸收維生素B12」→巨球性貧血+神經病變(亞急性合併退化)』。治療『「補充維生素B12(肌肉注射,繞過腸吸收障礙)」』。故B正確。比較:維生素A(視覺)、D(骨)、K(凝血)非此。故B正確。臨床:惡性貧血亦致萎縮性胃炎、舌炎、神經學症狀;需終生B12補充。","options":{"A":"維生素A與惡性貧血無關。","B":"補充維生素B12改善惡性貧血—正解。","C":"維生素D管骨代謝。","D":"維生素K管凝血。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113020-71":{"quick":"活性維生素D(1,25-(OH)₂D₃)由「腎臟」(非肝臟)生成,故此敘述最不恰當。","detail":{"background":"低血鈣的代償反應:A『副甲狀腺素(PTH)分泌增加』(正確)、C『PTH使腎「鈣再吸收增加→尿鈣排泄減少」』(正確)、D『經活性維生素D使「小腸鈣吸收增加」』(正確)。B「「肝臟」分泌1,25-(OH)₂D₃增加」『最不恰當』—『活性維生素D(1,25-(OH)₂D₃/calcitriol)是「腎臟」的1α-羥化酶生成(受PTH刺激),「非肝臟」(肝臟只做25-羥化)』。故B為正解。記憶:低血鈣→PTH↑→腎活化維生素D↑→腸鈣吸收↑、骨釋鈣、腎保鈣。","options":{"A":"PTH分泌增加,正確。","B":"稱肝臟分泌1,25-(OH)₂D₃—最不恰當(由腎臟生成),為正解。","C":"尿鈣排泄減少,正確。","D":"小腸鈣吸收增加,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113020-72":{"quick":"副交感神經活性升高會「促進(非抑制)」胰島素分泌,故此敘述錯誤。","detail":{"background":"胰島素分泌調控:B『主要受「血糖濃度」調控』(正確);C『高血糖時GLP-1(腸促胰島素)增強胰島素分泌』(正確);D『升糖素可旁分泌促進鄰近β細胞胰島素分泌』(正確)。A「「副交感神經活性升高會「抑制」胰島素分泌」」『錯誤』—『副交感(迷走、ACh)「促進(增加)」胰島素分泌(進食頭期/消化期);交感(腎上腺素α2)才「抑制」胰島素』。故A為正解。記憶:副交感→促胰島素(消化儲存);交感→抑胰島素(壓力升血糖)。","options":{"A":"稱副交感抑制胰島素—錯誤(應為促進),為正解。","B":"主要受血糖調控,正確。","C":"GLP-1增強胰島素分泌,正確。","D":"升糖素旁分泌促胰島素,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113090-51":{"quick":"一氧化氮(NO)不儲存於囊泡,而是「需要時即時合成、擴散」。","detail":{"background":"神經傳導物質的儲存:多數(ATP、催產素等胜肽、組織胺等胺類、乙醯膽鹼、麩胺酸)『儲存於「突觸前囊泡」、以胞吐釋放』。而『「一氧化氮(NO)」是「氣體傳導物質」—「不儲存於囊泡」,而是「依需求由NO合成酶「即時合成」、自由「擴散」穿膜」作用於鄰近細胞(逆行傳訊、活化guanylyl cyclase)』。故C(NO)不貯存於囊泡,為正解。故C正確。臨床:NO媒介血管舒張、神經可塑性、陰莖勃起。","options":{"A":"ATP儲存於囊泡共釋放。","B":"催產素儲存於神經分泌囊泡。","C":"NO不儲存於囊泡、即時合成擴散—正解。","D":"組織胺儲存於囊泡。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113090-70":{"quick":"檢測腎上腺皮質功能,以「皮質醇(cortisol)」血中濃度最具代表性。","detail":{"background":"評估『腎上腺皮質「功能(其分泌的終末效應激素)」』→測『「皮質醇(cortisol)」血中濃度最具代表性』(皮質醇是腎上腺皮質束狀帶的主要產物)。比較:皮質酮(corticosterone)在人類量少;ACTH(垂體)、CRH(下視丘)是『上游調控激素』(反映軸的不同層級,而非腎上腺皮質「本身的功能輸出」)。故A正確。臨床:晨間皮質醇、24小時尿游離皮質醇、刺激/抑制試驗評估腎上腺皮質功能。","options":{"A":"皮質醇最能代表腎上腺皮質功能—正解。","B":"皮質酮在人類量少。","C":"ACTH為垂體上游激素。","D":"CRH為下視丘上游激素。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113090-71":{"quick":"副甲狀腺素(PTH)升高血鈣的能力最強。","detail":{"background":"血鈣調節激素:『「副甲狀腺素(PTH)」「升血鈣能力最強」—促進「骨釋鈣、腎鈣再吸收、活化維生素D增腸鈣吸收」』;活性維生素D協助升血鈣(腸吸收);『「降鈣素(calcitonin)」反而「降血鈣」(抑蝕骨)』。泌乳素、催產素與血鈣無關。故B(PTH)升血鈣最強,為正解。故B正確。記憶:升血鈣=PTH(最強)+活性維生素D;降血鈣=降鈣素。臨床:副甲狀腺亢進→高血鈣;低下→低血鈣搐搦。","options":{"A":"降鈣素降血鈣(相反)。","B":"PTH升血鈣最強—正解。","C":"泌乳素與血鈣無關。","D":"催產素與血鈣無關。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_113090-72":{"quick":"飯後胰島素促進葡萄糖進入的主要標的之一為脂肪組織(經GLUT4)。","detail":{"background":"胰島素的『「胰島素依賴(GLUT4)」攝糖組織=「骨骼肌與「脂肪組織」」』—飯後胰島素使GLUT4上膜、促進葡萄糖進入肌肉與脂肪細胞而降血糖。題選項中『「脂肪組織(C)」』為胰島素依賴攝糖標的。比較:腎、大腦、小腸黏膜的攝糖『「不依賴」胰島素(用GLUT1/2/3)』。故C正確。臨床:第2型糖尿病為肌肉脂肪的胰島素抗性(GLUT4反應差)。","options":{"A":"腎臟攝糖不依賴胰島素。","B":"大腦用GLUT3(不依賴胰島素)。","C":"脂肪組織為胰島素依賴攝糖標的—正解。","D":"小腸黏膜不依賴胰島素。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114020-68":{"quick":"高血糖+高血壓+皮膚色素沉著=腦下垂體分泌過量ACTH(庫欣病)。","detail":{"background":"此人『高血糖、高血壓、「皮膚色素沉著」』→『「腦下垂體腫瘤分泌大量ACTH(庫欣「病」)」:過量ACTH→皮質醇↑(高血糖、高血壓)+「ACTH(與其前驅POMC的MSH活性)使「皮膚色素沉著」」』。故C正確。比較:腎上腺腫瘤自主分泌皮質醇(庫欣「症候群」)時『ACTH被抑制→「無」色素沉著』(故D不符色素沉著);先天性腎上腺增生(雄性化)、Addison(腎上腺不足、低皮質醇)不符高血糖高血壓組合。故C正確(色素沉著是高ACTH的線索)。","options":{"A":"先天性腎上腺增生以雄性化為主。","B":"Addison為腎上腺不足(低皮質醇)。","C":"腦下垂體ACTH過量(庫欣病)→高糖高壓+色素沉著—正解。","D":"腎上腺腫瘤自分泌皮質醇時ACTH低、無色素沉著。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114020-69":{"quick":"兩側副甲狀腺切除後血磷「升高」(非降低),故此敘述最不適當。","detail":{"background":"副甲狀腺素(PTH)作用:促骨釋鈣、腎「保鈣、「排磷」」、活化維生素D。『「兩側副甲狀腺切除→PTH缺乏」→「腎排磷減少→「血磷「升高」」、血鈣下降」』。故A「術後血磷濃度「降低」」『最不適當(錯誤)』—應為「升高」。其餘正確:B低血鈣致神經肌肉過度興奮(搐搦);C PTH促腎活化維生素D;D PTH增骨吸收。故A為正解。記憶:PTH→排磷保鈣;PTH缺乏→高磷低鈣。","options":{"A":"稱術後血磷降低—最不適當(應升高),為正解。","B":"低血鈣致神經肌肉過度興奮,正確。","C":"PTH促腎活化維生素D,正確。","D":"PTH增骨吸收,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114020-71":{"quick":"甲狀腺亢進且T4高、TSH被抑制(原發性)→最可能為甲狀腺腫瘤(自主分泌)。","detail":{"background":"此題:甲狀腺亢進、高T4。若為『「原發性(甲狀腺本身)」過度分泌→T4高、「TSH被負回饋「抑制(低)」」』→病灶在甲狀腺,如『「甲狀腺腫瘤/毒性結節(自主分泌)」或Graves病』。故A(甲狀腺腫瘤)最可能。比較:C腦下垂體TSH瘤、D下視丘瘤會使『TSH「升高」(中樞性甲亢)』(與TSH被抑制不符);B副甲狀腺萎縮與甲狀腺素無關。故A正確(原發性甲亢=甲狀腺源、TSH低)。","options":{"A":"甲狀腺腫瘤(自主分泌)→T4高TSH低—正解。","B":"副甲狀腺與甲狀腺素無關。","C":"垂體TSH瘤會使TSH升高(非被抑制)。","D":"下視丘瘤會使TSH升高。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114020-72":{"quick":"自主神經系統參與調節醛固酮分泌,敘述最適當。","detail":{"background":"激素相關敘述:C『「自主神經(交感)參與調節醛固酮分泌」(腎交感經β1促腎素釋放→AngII→醛固酮;醛固酮亦受血鉀與AngII主控)』最適當。比較錯誤:A『甲狀腺素衍生自「酪胺酸(碘化)」(非血清白蛋白)』;B『「雄性素(androgen)是合成「雌性素」的前驅物」(芳香酶把雄性素轉雌激素)』—選項把前驅關係寫反;D『類固醇激素衍生自「膽固醇」(非三酸甘油酯)』。故C正確。","options":{"A":"甲狀腺素衍生自酪胺酸(非白蛋白)。","B":"雄性素是雌性素的前驅物(選項寫反)。","C":"自主神經參與調節醛固酮分泌—正解。","D":"類固醇衍生自膽固醇(非三酸甘油酯)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114090-45":{"quick":"甲狀腺濾泡細胞環繞膠質(colloid)構成的濾泡是甲狀腺基本構造。","detail":{"background":"甲狀腺組織:B『「濾泡細胞(follicular cell)環繞中央「膠質(colloid,含甲狀腺球蛋白)」構成的「濾泡」是甲狀腺的基本構造單位」』正確。比較錯誤:A甲狀腺濾泡「大小不一」(非皆約2mm);C『甲狀腺球蛋白的碘化發生在「濾泡細胞「頂膜-膠質交界」(濾泡腔)」由「甲狀腺過氧化酶(TPO)」進行(非單純濾泡細胞「內」由thyroid oxidase)』;D『分泌降鈣素的是「濾泡「旁(parafollicular)」C細胞」(非濾泡細胞;濾泡細胞分泌T3/T4)』。故B正確。","options":{"A":"濾泡大小不一(非皆約2mm)。","B":"濾泡細胞環繞膠質構成濾泡為基本構造—正解。","C":"碘化在濾泡腔由TPO進行(非細胞內由oxidase)。","D":"降鈣素由濾泡旁C細胞分泌(非濾泡細胞)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114090-68":{"quick":"胰島素促進脂肪組織的脂肪合成(lipogenesis)。","detail":{"background":"胰島素(同化激素)作用:C『「促進脂肪組織「脂肪合成(lipogenesis)」、抑制脂解」』正確;並促肝醣與蛋白合成、促肌肉脂肪攝糖、抑制糖質新生與酮體生成。比較錯誤:A『血鉀「升高」會促進胰島素分泌(非降低);且胰島素促K⁺進細胞』;B胰島素「抑制(非促進)」肝臟葡萄糖生成;D胰島素「抑制(非促進)」酮體生成。故C正確。記憶:胰島素=同化(合成肝醣/脂肪/蛋白、攝糖、抑制分解與生酮)。","options":{"A":"高血鉀促進(非低血鉀)胰島素分泌。","B":"胰島素抑制肝葡萄糖生成(非促進)。","C":"胰島素促脂肪合成—正解。","D":"胰島素抑制酮體生成(非促進)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114090-70":{"quick":"壓力刺激下視丘分泌的是CRH(非ACTH;ACTH由腦下垂體前葉分泌),故此敘述最不適當。","detail":{"background":"環境改變的荷爾蒙反應:A『血糖降至40 mg/dL→腎上腺素大量分泌(反調節)』(正確);B『壓力→皮質醇分泌增加』(正確);D『晝夜節律參與調控ACTH分泌』(正確)。C「壓力刺激「下視丘神經細胞」分泌「ACTH」」『最不適當』—『壓力使下視丘分泌「CRH(腎上腺皮質釋素)」→「腦下垂體前葉」才分泌「ACTH」』(ACTH非下視丘分泌)。故C為正解。記憶:下視丘CRH→垂體ACTH→腎上腺皮質醇。","options":{"A":"低血糖致腎上腺素大量分泌,正確。","B":"壓力使皮質醇增加,正確。","C":"稱下視丘分泌ACTH—最不適當(下視丘分泌CRH、ACTH由垂體),為正解。","D":"晝夜節律調控ACTH,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114090-71":{"quick":"GLUT2缺失使β細胞無法感應血糖增加而分泌胰島素。","detail":{"background":"胰β細胞『以「GLUT2」攝入葡萄糖作為「血糖感測器」(高Km使攝糖速率隨血糖變化)→代謝產ATP→關K-ATP通道→去極化→鈣內流→胰島素分泌』。故『「GLUT2功能缺失」→β細胞「無法感應血糖增加」→胰島素分泌障礙』。故A正確。其餘選項的「葡萄糖-鈣/氯反向運輸」「葡萄糖-胺基酸共轉運」非β細胞感糖機制。故A正確。臨床:GLUT2突變(Fanconi-Bickel)影響血糖感測與肝腎糖代謝。","options":{"A":"GLUT2缺失使β細胞無法感應血糖—正解。","B":"無葡萄糖-鈣反向運輸此機制。","C":"無葡萄糖-氯反向運輸此機制。","D":"β細胞感糖非靠葡萄糖-胺基酸共轉運。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_114090-72":{"quick":"副甲狀腺切除→低血鈣→神經肌肉興奮性「上升(搐搦)」,故「興奮性下降」最不可能。","detail":{"background":"兩側副甲狀腺切除→PTH缺乏→『「血鈣「下降」、血磷「升高」、腸鈣吸收下降(因活性維生素D減少)」』。低血鈣使『「神經肌肉興奮性「上升」→手足搐搦(tetany)、Chvostek/Trousseau徵」』。故B「神經肌肉興奮性「下降」」『最不可能』(低血鈣應使興奮性「上升」),為正解。A(血磷升)、C(腸鈣吸收降)、D(血鈣降)皆會發生。故B正確。記憶:低血鈣=神經肌肉過度興奮(搐搦);高血鈣=興奮性下降(無力倦怠)。","options":{"A":"血磷升高(PTH缺乏),會發生。","B":"稱神經肌肉興奮性下降—最不可能(低血鈣應上升),為正解。","C":"腸鈣吸收下降,會發生。","D":"血鈣下降,會發生。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-46":{"quick":"副甲狀腺的主細胞(chief cell)主要分泌副甲狀腺素(PTH)。","detail":{"background":"內分泌細胞與激素:D『「副甲狀腺「主細胞(chief cell)」分泌「副甲狀腺素(PTH)」」』正確。比較錯誤:A『胰島「A(α)細胞」分泌「升糖素(glucagon)」(B(β)細胞才分泌胰島素)』;B『腎上腺髓質嗜鉻細胞分泌「兒茶酚胺(腎上腺素/正腎上腺素)」(非雄性激素;雄性素由皮質網狀帶)』;C『松果腺「松果體細胞(pinealocyte,非膠細胞)」分泌「褪黑激素」』。故D正確。","options":{"A":"胰島α細胞分泌升糖素(非胰島素)。","B":"腎上腺髓質分泌兒茶酚胺(非雄性素)。","C":"褪黑激素由松果體細胞(非膠細胞)分泌。","D":"副甲狀腺主細胞分泌PTH—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-67":{"quick":"皮質醇不促進骨骼肌攝取葡萄糖(其作用相反、是抗胰島素),故此最不可能。","detail":{"background":"壓力下皮質醇(糖皮質素)的作用:A『促肝糖質新生(升血糖)』、C『促骨骼肌蛋白分解(提供胺基酸做糖質新生原料)』、D『促脂肪細胞三酸甘油酯分解(脂解,供能)』—皆正確(分解代謝、升血糖、抗胰島素)。B「促進「骨骼肌攝取葡萄糖」」『最不可能』—皮質醇是『「抗胰島素(降低周邊組織攝糖)」』,會『「減少(非促進)」肌肉葡萄糖攝取』以維持血糖供腦。故B為正解。記憶:皮質醇=升血糖(糖質新生+抗胰島素)、蛋白脂肪分解。","options":{"A":"促肝糖質新生,會發生。","B":"稱促骨骼肌攝取葡萄糖—最不可能(皮質醇抗胰島素、減攝糖),為正解。","C":"促骨骼肌蛋白分解,會發生。","D":"促脂肪分解,會發生。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-70":{"quick":"PTH症狀但血中PTH正常/偏高→「PTH受體功能受損」(假性副甲狀腺低能症)。","detail":{"background":"病人有『副甲狀腺低下「症狀(低血鈣)」、但「血中PTH「正常/偏高」」』→問題不在PTH分泌不足,而在『「標的器官(腎、骨)的「PTH「受體」(Gs偶聯)功能受損」→對PTH無反應」=「假性副甲狀腺低能症(pseudohypoparathyroidism)」』。故C(PTH受體功能受損)正確。比較:A鈣受體缺損會影響PTH分泌調控(血鈣異常型態不同);B PTH合成分泌受損則『血PTH「低」』(與本例PTH不低不符);D降鈣素拮抗非此。故C正確。","options":{"A":"鈣受體缺損影響PTH分泌(血PTH不會偏高搭配低鈣症狀此型)。","B":"PTH合成分泌受損則血PTH低(本例PTH不低)。","C":"PTH受體功能受損(假性副甲低能)—正解。","D":"降鈣素拮抗非此機制。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-71":{"quick":"升糖素「促進(非抑制)」肝醣分解,故此敘述最不適當。","detail":{"background":"升糖素(glucagon,α細胞分泌,升血糖):A『運動刺激其分泌』(正確)、B『血中胺基酸增加刺激其分泌(避免進食蛋白後低血糖)』(正確)、C『促進肝臟「糖質新生(gluconeogenesis)」』(正確)。D「升糖素分泌增加會「抑制」肝臟「肝醣分解(glycogenolysis)」」『最不適當』—『升糖素「「促進(非抑制)」肝醣分解」與糖質新生→升血糖』。故D為正解。記憶:升糖素=升血糖(肝醣分解+糖質新生+生酮),與胰島素相反。","options":{"A":"運動刺激升糖素分泌,正確。","B":"高胺基酸刺激升糖素分泌,正確。","C":"促進肝糖質新生,正確。","D":"稱抑制肝醣分解—最不適當(升糖素促進之),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_115020-72":{"quick":"胎兒靜脈導管(ductus venosus)使含氧的臍靜脈血繞過肝臟、有效供氧。","detail":{"background":"妊娠與胎兒循環:C『「胎兒「靜脈導管(ductus venosus)」讓「臍靜脈的「含氧血」繞過肝竇」「直接」匯入下腔靜脈→有效把較高含氧血送往心臟與全身(尤其腦)」』最適當。比較錯誤:A孕婦醛固酮增加是為『保鈉維持血容量(非抗胰島素)』;B『「人類絨毛性腺刺激素(hCG)」(非FSH)是早孕監測指標』;D孕婦甲狀腺素增加是『因TBG升高與代謝需求(非調節血鈣;血鈣由PTH/維生素D調節,鈣經胎盤主動運送)』。故C正確。","options":{"A":"孕婦醛固酮增加為保鈉(非抗胰島素)。","B":"hCG(非FSH)為早孕指標。","C":"胎兒靜脈導管使含氧血有效供應—正解。","D":"孕婦甲狀腺素增加非為調血鈣。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_106100-72":{"quick":"排卵後黃體若未受孕約存活14天即退化(月經黃體)。","detail":{"background":"黃體(corpus luteum)生命週期:排卵後顆粒層與卵泡膜細胞黃體化形成黃體,分泌「黃體素(progesterone)」與雌激素維持子宮內膜。『若「未受孕」→黃體在「約「14天(月經週期後半固定的黃體期)」」後「自行退化成白體(corpus albicans)」→progesterone↓→子宮內膜剝落(月經)』。若「受孕」→胚胎滋養層分泌「hCG」維持黃體(妊娠黃體)約至妊娠10–12週、之後由胎盤接手。故未受孕黃體壽命約14天(C)。記憶:黃體期固定~14天(故排卵約在月經前14天);濾泡期長短才是週期變異來源。","options":{"A":"1天過短。","B":"5天過短。","C":"約14天(未受孕黃體期)—正解。","D":"28天為整個月經週期長度(非黃體壽命)。"},"sources":["Guyton & Hall《生理學》","Costanzo《Physiology》","Williams《內分泌學》"]}},"med1_106100-73":{"quick":"卵丘(cumulus oophorus)出現於成熟(Graafian)濾泡階段。","detail":{"background":"卵巢濾泡發育階段:原始濾泡(primordial)→初級濾泡(primary)→次級/前竇濾泡(preantral)→竇濾泡(antral/早期antral開始出現濾泡腔)→「成熟濾泡(mature/Graafian follicle)」。『「「卵丘(cumulus oophorus)」」=「包圍卵母細胞、把卵母細胞「懸於濾泡腔(antrum)中、連於濾泡壁」的「顆粒細胞團」」,在「「成熟(Graafian)濾泡」階段最明顯成形」』(此時濾泡腔大、卵母細胞被cumulus包覆突入腔內)。故B(mature follicle)正確。排卵時卵母細胞連同放射冠(corona radiata)一起排出。記憶:cumulus oophorus + antrum = 成熟濾泡特徵。","options":{"A":"初級濾泡尚無濾泡腔/卵丘。","B":"成熟(Graafian)濾泡—正解。","C":"前竇濾泡尚無腔。","D":"早期竇濾泡腔小、卵丘未明顯成形。"},"sources":["Guyton & Hall《生理學》","Costanzo《Physiology》","Williams《內分泌學》"]}},"med1_108030-73":{"quick":"泌乳素(prolactin)是乳汁「生成(合成)」最重要的激素。","detail":{"background":"泌乳的兩個激素分工:『「「泌乳素(prolactin, 腦下垂體前葉)」」→「促進乳腺腺泡「「合成「乳汁(milk synthesis)」」」(誘導酪蛋白、乳糖、脂質合成)」;「「催產素(oxytocin, 腦下垂體後葉)」」→「促乳腺肌上皮細胞收縮、「「噴乳(milk ejection/let-down)」」(把乳汁射出)」』。故「乳汁「生成」最重要者=泌乳素(B)」。比較:progesterone(孕期抑制泌乳、產後驟降才解抑)、prostaglandins非主泌乳。記憶:prolactin造乳、oxytocin噴乳。懷孕時高progesterone/estrogen使乳腺發育但抑制泌乳;分娩後胎盤娩出→progesterone↓→prolactin發揮作用開始泌乳。","options":{"A":"催產素司噴乳(非合成乳汁)。","B":"泌乳素促乳汁合成—正解。","C":"黃體素孕期反而抑制泌乳。","D":"前列腺素非主泌乳激素。"},"sources":["Guyton & Hall《生理學》","Costanzo《Physiology》","Williams《內分泌學》"]}},"med1_111100-73":{"quick":"卵子形成的第一次減數分裂「始於胚胎期」(出生時停在第一次減數分裂前期)。","detail":{"background":"卵子形成(oogenesis)時序:『「胚胎期」卵原細胞(oogonia)行有絲分裂增殖→分化成「初級卵母細胞(primary oocyte)」並「「開始「第一次減數分裂」、停滯在「前期I(prophase I, 雙線期dictyotene)」」」(A正確);「出生後「卵原細胞「不再」有絲分裂」(B錯,出生時卵母細胞數已定、之後只減少);「青春期後「每月一個」初級卵母細胞「完成第一次減數分裂」→次級卵母細胞」(C錯,非幼童期);「次級卵母細胞「停在「中期II(metaphase II)」」、「「受精」後才完成「第二次減數分裂」成卵子」(D錯,非排卵前完成)』。故A正確。記憶:初級卵母細胞停前期I(可達數十年)、次級卵母細胞停中期II(受精才完成)。","options":{"A":"第一次減數分裂始於胚胎期—正解。","B":"出生後卵原細胞不再有絲分裂(錯)。","C":"完成第一次減數分裂在青春期後每月一次(非幼童期)。","D":"第二次減數分裂受精後才完成(非排卵前)。"},"sources":["Guyton & Hall《生理學》","Costanzo《Physiology》","Williams《內分泌學》"]}},"med1_113020-73":{"quick":"透明帶在著床(植入子宮內膜)前已脫除,故「植入後的囊胚」無透明帶。","detail":{"background":"透明帶(zona pellucida)是包圍卵母細胞/早期胚胎的醣蛋白外殼:『存在於「次級卵母細胞、受精卵(zygote)、桑椹胚(morula)、(早期)囊胚」』,「在「著床前」由「孵化(hatching)」過程「脫除」→囊胚「破殼而出」才能「植入(著床)」子宮內膜」。故『「「已著床(植入)的囊胚(implanted blastocyst)」「不再有」透明帶」(D)』。功能:透明帶介導精卵專一辨識(ZP3)、誘發頂體反應、阻止多精受精(透明帶反應)、維持早期胚胎完整並防止輸卵管內早期著床。記憶:著床前必先「孵化脫透明帶」。","options":{"A":"次級卵母細胞有透明帶。","B":"受精卵有透明帶。","C":"桑椹胚有透明帶。","D":"已著床囊胚無透明帶(著床前已脫除)—正解。"},"sources":["Guyton & Hall《生理學》","Costanzo《Physiology》","Williams《內分泌學》"]}},"med1_114090-73":{"quick":"「原始濾泡至青春期才開始發育成初級濾泡」之敘述「最不適當」(發育在青春期前即持續進行)。","detail":{"background":"卵巢濾泡生長:B「初級濾泡的卵母細胞與顆粒細胞間有「透明帶」形成」(正確);C「月經週期初期數個濾泡生長、後選出「優勢濾泡(dominant follicle)」達成熟」(正確);D「濾泡閉鎖凋萎(atresia)可發生於發育「各階段」」(正確,絕大多數濾泡閉鎖)。A「最早期的「原始濾泡」「要到青春期才開始發育成初級濾泡」」「最不適當(錯誤)」—『「原始濾泡「在「胎兒期/青春期「之前」就「持續」有少量被招募啟動」發育成初級濾泡(此早期募集「不依賴促性腺激素」、自胎兒期即進行);只是「青春期後」才有「促性腺激素(FSH/LH)依賴的「週期性成熟與排卵」」』。故A為最不適當,為正解。記憶:初級濾泡形成不需FSH(基礎募集自胚胎期起);竇前→竇→成熟才需FSH。","options":{"A":"稱原始濾泡至青春期才發育—最不適當(基礎募集自青春期前持續進行),為正解。","B":"初級濾泡有透明帶形成,正確。","C":"選出優勢濾泡,正確。","D":"各階段皆可閉鎖,正確。"},"sources":["Guyton & Hall《生理學》","Costanzo《Physiology》","Williams《內分泌學》"]}}},TO=["T1細胞膜運輸與訊息傳遞", "T2中樞神經與運動生理", "T3感覺與特殊感覺生理", "T4肌肉生理", "T5心臟生理", "T6循環與血管生理", "T7血液與止血生理", "T8呼吸生理", "T9腎臟與體液電解質酸鹼", "T10消化生理", "T11內分泌(下視丘垂體甲狀腺腎上腺)", "T12胰島糖代謝與鈣磷骨代謝", "T13生殖生理"],LEC={"T1細胞膜運輸與訊息傳遞":{"title":"膜運輸、膜電位與訊號傳遞","html":"<p><b>運輸</b>:被動(順梯度,簡單/協助擴散)vs主動。初級主動(Na⁺/K⁺-ATPase「3Na出2K入」、Ca²⁺-ATPase)耗ATP;次級主動(SGLT、Na⁺/Ca²⁺交換子NCX)靠Na梯度。膽固醇調膜流動性(低溫維持)。</p><p><b>膜電位/動作電位</b>:靜止膜電位下K⁺漏出、Na⁺漏入;動作電位過衝(Na⁺內流)、下衝(K⁺外流);漸進電位「隨距離衰減」、有時空加成。</p><p><b>訊號</b>:guanylyl cyclase被NO活化產cGMP→血管舒張;IP₃使內質網釋鈣;G蛋白偶聯=代謝型(慢),離子閘控=離子型(快)。</p><p><b>生化</b>:酵素降低活化能(不改變平衡);共價鍵最穩;phi/psi在Cα兩側;色胺酸吸280nm;親和力層析專一性最佳。</p>"},"T2中樞神經與運動生理":{"title":"中樞神經、運動控制與自主神經","html":"<p><b>運動控制</b>:皮質脊髓路(精細隨意動作);基底核(直接路徑增強、間接路徑抑制運動,帕金森/亨汀頓);小腦(協調、誤差校正,損傷→意向性顫抖/辨距不良);α-γ共活化維持肌梭長度敏感度。</p><p><b>高級功能</b>:Broca(表達)/Wernicke(理解)/弓狀束(複誦)/角迴(閱讀);外顯記憶(海馬)vs內隱(基底核/小腦);右頂葉損傷→左側忽略;EEG:β(專注)>α(放鬆)>θ>δ(深睡);K複合波在N2。</p><p><b>下視丘/邊緣</b>:體溫、晝夜(SCN)、食慾(瘦素促α-MSH抑食)、恐懼(杏仁核)、酬賞(中腦邊緣多巴胺)。</p><p><b>自主神經</b>:交感=胸腰、副交感=頭薦;節前ACh、交感節後NE(汗腺例外)、副交感節後ACh;腎上腺髓質受節前交感直接支配。NMJ:菸鹼受體;肉毒桿菌破壞SNARE、沙林抑制乙醯膽鹼酯酶。</p>"},"T3感覺與特殊感覺生理":{"title":"視聽味嗅前庭與體感覺","html":"<p><b>視覺</b>:光先過節細胞、最後到桿/錐;暗處cGMP高(暗電流),光照transducin-PDE使cGMP↓→過極化;視交叉受損→雙顳側偏盲、視束→對側同向偏盲;視神經盤=盲點;角迴閱讀。瞳孔對光反射(II傳入、III傳出);調視(副交感→睫狀肌收縮、水晶體變凸)。</p><p><b>聽覺/前庭</b>:柯蒂氏器(內耳)毛細胞;耳蝸基部高頻、頂部低頻(tonotopy);半規管感角加速、橢圓囊(水平)/球囊(垂直)感直線加速;梅尼爾=內淋巴水腫。</p><p><b>味嗅</b>:味覺前2/3(VII)、後1/3(IX)、咽(X)→孤束核;苦味閾值最低;鮮味=麩胺酸;嗅受器在嗅上皮(雙極神經元)、cAMP訊號、每嗅小球收同類受器。</p><p><b>體感覺</b>:背柱(精細觸覺/本體覺,延腦交叉)vs前外側(痛溫覺,脊髓即交叉);節細胞才有動作電位。</p>"},"T4肌肉生理":{"title":"骨骼肌、心肌與平滑肌收縮","html":"<p><b>偶聯</b>:骨骼肌AP→T小管DHPR(電壓感應)機械連動肌漿網RyR釋鈣→Ca結合troponin C、tropomyosin移位露結合位;鈣主要來自肌漿網。三聯體(1T小管+2終池)在A-I交界。ATP使橫橋脫離(缺ATP→屍僵)。</p><p><b>纖維型</b>:慢氧化(紅肌、抗疲勞、小運動神經元先募集)vs快糖解(白肌、易疲勞);募集序:慢氧化→快氧化糖解→快糖解。能量:磷酸肌酸(最快)→糖解→有氧。</p><p><b>平滑肌</b>:無troponin,Ca結合calmodulin活化MLCK→肌凝蛋白輕鏈磷酸化;緻密體(細絲+中間絲固著);單一單位(自發節律、間隙接合)vs多單位;MLCP去磷酸化致舒張。心肌間盤(黏著+橋粒+間隙接合,無緊密接合);蒲金杰=特化心肌。</p>"},"T5心臟生理":{"title":"心動週期、心電圖與心輸出","html":"<p><b>心動週期</b>:等容收縮(主動脈壓>心室壓>心房壓)→射血→等容舒張(心室壓>心房壓)→充填;S1=房室瓣關、S2=半月瓣關(吸氣致S2分裂);心室容積快速下降在S1-S2間。</p><p><b>電生理</b>:傳導速度Purkinje>心房>SA/AV結(房室結延遲);心室肌(快反應)0期Na⁺、SA node(慢反應)0期Ca²⁺;再極化皆K⁺;1期切跡=短暫外向K。</p><p><b>ECG</b>:P=心房去極化、QRS=心室去極化、T=心室再極化、ST=高原期;高血鉀高尖T波;束支阻斷QRS寬。</p><p><b>調控/計算</b>:Frank-Starling(前負荷↑→心搏量↑);抑制Na-K幫浦(毛地黃)增收縮力;Fick:CO=耗氧量/動靜脈含氧差;冠脈血流在舒張期(收縮期心肌壓迫)。</p>"},"T6循環與血管生理":{"title":"血流動力學、血壓調節與微循環","html":"<p><b>血流動力學</b>:Poiseuille—流量∝半徑⁴、阻力∝黏度;靜脈含血量最大(容量血管);Korotkoff音在收縮壓與舒張壓之間;脈搏壓=收縮−舒張、MAP≈舒張+1/3脈搏壓;動脈硬化→收縮壓與脈搏壓↑。</p><p><b>感壓反射</b>:血壓↑→感壓受器放電↑→交感↓副交感↑→心率慢、血管舒張(失血則相反代償);切除感壓受器→血壓升且波動大;顱內壓上升→庫欣反應(血壓升、心跳降)。</p><p><b>微循環/局部</b>:Starling力(動脈端濾出+13、靜脈端吸收);小動脈前括約肌收縮→微血管壓↓濾過↓;器官血流自動調節(腦:壓降則血管擴張);冠脈血流與心肌代謝匹配;NO/ET-1平衡調血管張力;淋巴靠肌泵/瓣膜/自發收縮回流。</p>"},"T7血液與止血生理":{"title":"血球、止血與血型","html":"<p><b>血球</b>:紅血球無核無粒線體(糖解產能)、高表面積/體積比;白血球嗜中性最多、嗜鹼最少;肥大細胞駐組織(血中最不常見);MEP=血小板+紅血球共同前驅;紅血球生成正母紅血球起不再分裂(EPO調控)。</p><p><b>止血</b>:初級—vWF橋接膠原與血小板GPIb;凝血—thrombin使fibrinogen→fibrin;protein C(肝、抗凝);纖溶—tPA→plasmin分解fibrin。vWF缺乏→血小板不黏附;抗凝藥aspirin/heparin/prostacyclin(維生素K為促凝、不用)。</p><p><b>血型/血紅素</b>:AB型萬能受血、O型萬能捐血;HbF(α2γ2)對2,3-BPG親和低→氧親和力高(胎盤奪氧);鐮刀型(Glu→Val疏水聚集)不易過微血管、對瘧疾抵抗。</p>"},"T8呼吸生理":{"title":"氣體交換、肺容積與通氣調控","html":"<p><b>肺容積/力學</b>:VC=TLC−RV;肺泡通氣=(潮氣−死腔)×頻率(深慢呼吸有效);限制型(纖維化)FRC↓;阻塞型(肺氣腫)彈性回縮↓、順應性↑、FRC↑、阻力↑、DLCO↓;表面張力素(第II型肺泡細胞)降表面張力。</p><p><b>氣體交換/運送</b>:O₂正常為灌流限制、CO與肺水腫O₂為擴散限制;第I型肺泡細胞+內皮=氣血障壁;呼出氣PO₂(混死腔)>肺泡>動脈;貧血降氧「含量」非分壓;何登/波爾效應;氯轉移。</p><p><b>調控</b>:中樞化學受器(CO₂/H⁺)、周邊化學受器(頸動脈體,低氧時O₂敏感K通道受抑去極化);過度換氣→PaCO₂↓呼吸性鹼;高海拔→過度換氣(PaCO₂↓)、EPO↑;V/Q肺底低肺尖高;低O₂→肺血管收縮、低CO₂→支氣管收縮。</p>"},"T9腎臟與體液電解質酸鹼":{"title":"腎小管功能、清除率與酸鹼","html":"<p><b>腎小管</b>:近端(SGLT2吸糖、Na-葡萄糖/磷共轉運、刷狀緣最發達、吸65%Na與HCO₃⁻);亨利上升粗枝(NKCC2、不透水=稀釋節段);遠曲(NCC);集尿管(ENaC、AQP2受ADH調控)。細下降枝(AQP1)對水通透最大。</p><p><b>清除率</b>:GFR=菊糖清除率=U×V/P;PAH清除率≈腎血漿流量→÷(1−Hct)=腎血流量;排出<濾過=再吸收、>濾過=分泌。近腎絲球器:緻密斑(感NaCl)+JG細胞(腎素)+TGF(管液↑→腺苷→入球收縮→GFR↓)。</p><p><b>水鈉鉀</b>:ADH→集尿管AQP2→濃縮尿(限水時ADH↑尿濃縮);醛固酮→排鉀(高鉀刺激);鉀經遠端鉀通道分泌。電解質:細胞外Na⁺/Cl⁻、細胞內K⁺。</p><p><b>酸鹼</b>:近端再吸收HCO₃⁻、遠端分泌H⁺;尿緩衝=HCO₃⁻/磷酸鹽/氨;酸中毒→腎保HCO₃⁻、排NH₄⁺。</p>"},"T10消化生理":{"title":"胃腸運動、分泌與消化吸收","html":"<p><b>運動</b>:分節=混合、蠕動=推進、MMC(motilin、空腹清掃);肌間神經叢管運動、黏膜下管分泌;ICC產慢波(需spike才收縮);胃排空被十二指腸高脂(CCK)抑制最強;achalasia=食道肌間神經叢缺損。</p><p><b>分泌調控</b>:胃酸三刺激—gastrin(G細胞,CCK-B)、組織胺(ECL,H2)、ACh(迷走);D細胞somatostatin抑酸;胃泌素促黏膜增生。CCK(脂肪/胺基酸)→胰酶+膽囊收縮+抑胃排空;secretin(酸)→胰HCO₃⁻+抑胃酸。</p><p><b>消化吸收</b>:醣—SGLT1(葡萄糖/半乳糖,Na依賴)、GLUT5(果糖);蛋白—Na/H依賴共轉運(胺基酸+小胜肽);脂肪—膽鹽乳化+微膠粒、胰脂酶(需膽汁)、膽固醇擴散吸收。迴腸吸收B12與膽鹽(切除→貧血);肝細胞兼外分泌(膽汁)與類內分泌(血漿蛋白)。</p>"},"T11內分泌(下視丘垂體甲狀腺腎上腺)":{"title":"下視丘-垂體軸、甲狀腺與腎上腺","html":"<p><b>軸與激素類型</b>:下視丘(CRH/TRH/GnRH/GHRH/多巴胺)→前葉(ACTH/TSH/LH/FSH/GH/PRL)→標的腺。後葉(ADH/催產素)由下視丘製造、後葉只儲存(不合成)。脂溶性(類固醇、甲狀腺素)→核受體;水溶性→膜受體。糖蛋白激素(TSH/LH/FSH/hCG)共用α次單元。</p><p><b>甲狀腺</b>:濾泡細胞環繞膠質;碘捕捉(NIS+Na-K-ATPase);T4為主要分泌(高度結合TBG、半衰期長)、T3活性最強(T3>T4>RT3);最佳功能指標=游離T4;甲亢T4↑TSH↓。</p><p><b>腎上腺</b>:球狀帶醛固酮(受AngII/血鉀,非ACTH)、束狀帶皮質醇(受ACTH、含脂滴、晨間高峰)、網狀帶雄性素DHEA(受ACTH);髓質嗜鉻細胞(神經嵴、PNMT把NE→腎上腺素)。皮質醇=升血糖(糖質新生+抗胰島素)、抗發炎、骨流失、升紅血球降淋巴球。庫欣病(垂體ACTH瘤→色素沉著);Addison(低鈉高鉀低血壓色素沉著)。泌乳素受多巴胺抑制(垂體柄切斷→PRL↑)。</p>"},"T12胰島糖代謝與鈣磷骨代謝":{"title":"胰島素升糖素與鈣磷調節","html":"<p><b>胰島素分泌</b>:β細胞GLUT2感血糖→ATP↑→關K-ATP通道→去極化→鈣內流→胰島素釋放;副交感促分泌、交感(α2)抑制;GLP-1增強。胰島素=同化(攝糖GLUT4於肌肉脂肪、合成肝醣/脂肪/蛋白、抑糖質新生與生酮);數秒急性=攝糖/胺基酸/K⁺進細胞。</p><p><b>胰島素不足(糖尿病)</b>:高血糖、滲透性利尿、酮體↑、游離脂肪酸↑→「代謝性」酸中毒(DKA,Kussmaul呼吸代償);酮體=乙醯乙酸+β-羥丁酸+丙酮。升糖素(α細胞)升血糖(肝醣分解+糖質新生+生酮);低血糖反調節=升糖素/腎上腺素/皮質醇/GH。</p><p><b>鈣磷</b>:PTH(主細胞)升血鈣最強(骨釋鈣、腎保鈣排磷、活化維生素D);維生素D活化:皮膚D3→肝25-OH→腎1,25-(OH)₂D₃(活性,促腸鈣磷吸收);降鈣素降血鈣。低血鈣→神經肌肉過度興奮(搐搦);副甲狀腺切除→低鈣高磷搐搦;假性副甲低能=PTH受體缺損。</p>"},"T13生殖生理":{"title":"男女生殖內分泌與妊娠","html":"<p><b>男性</b>:下視丘GnRH→垂體LH(→Leydig睪固酮、抑LH)/FSH(→Sertoli生精、inhibin抑FSH);血睪屏障(Sertoli緊密接合,保護精母細胞);睪固酮促Wolffian管、DHT促前列腺與外生殖器、MIS使Müllerian退化;精子成型(spermiogenesis)形成頂體鞭毛。勃起=副交感(ACh/NO)、射精=交感。</p><p><b>女性週期</b>:濾泡期雌激素↑(兩細胞兩性促素:LH→theca雄性素、FSH→granulosa芳香酶→雌二醇);排卵前雌二醇高峰「正回饋」→LH surge→排卵;黃體期黃體酮+雌激素(負回饋抑LH、黃體酮升基礎體溫)。</p><p><b>其他</b>:Klinefelter(47,XXY,睪固酮低、LH/FSH高);腎上腺雄性素受ACTH(非LH);高泌乳素→性腺低下;垂體瘤壓視交叉→雙顳側偏盲;前列腺=管泡腺;胎兒靜脈導管供氧。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^T(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='med1_physio_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
