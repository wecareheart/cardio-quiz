k":"P波出現於心臟週期的「舒張末期(心房收縮屬舒張期)」,稱其在收縮期最不適當。","detail":{"background":"P波生理:A『P波=心房去極化、心房開始收縮』(正確);B『P波後心房收縮把血擠入心室→心室容積顯著升高(舒張末充填)』(正確);C『心房收縮使心房壓略升(a波)』(正確)。D「P波出現於心臟週期的「收縮期(systole)」」『最不適當』—P波與心房收縮發生在『心室「舒張末期」(心室收縮尚未開始,S1之前)』,習慣上心室「收縮期」始於QRS後的S1。故D為正解(最不適當)。記憶:心房收縮(P波)屬心室舒張末、是充填的最後加強。","options":{"A":"P波=心房去極化開始收縮,正確。","B":"P波後心室容積升高(心房收縮充填),正確。","C":"P波後心房壓略升,正確。","D":"稱P波在收縮期—最不適當(屬心室舒張末),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_115020-58":{"quick":"心電圖T波開始(心室再極化)屬收縮末,「最不可能發生於舒張期」。","detail":{"background":"心臟週期舒張期(diastole)可發生:A『第三心音(S3,舒張早期快速充填,血流衝擊心室壁)』;B『心房收縮(舒張末期)』;C『房室瓣打開(舒張期心室充填,房室瓣開)』—皆屬舒張期。D『心電圖T波開始』代表『心室「再極化」』,發生在『心室收縮期的末段(射血後期)』→『最不可能屬舒張期』。故D為正解(最不可能)。記憶:T波在收縮末、標誌心室再極化將進入舒張。故D正確。","options":{"A":"S3於舒張早期充填,可發生於舒張期。","B":"心房收縮於舒張末,屬舒張期。","C":"房室瓣於舒張期打開充填。","D":"T波開始(心室再極化)屬收縮末—最不可能在舒張期,為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_106100-58":{"quick":"血流量正比於管徑的「四次方」(Poiseuille);徑4 vs 2 → 2⁴=16倍。","detail":{"background":"Poiseuille定律:血流量(Q)=π·ΔP·r⁴/(8ηL)—在壓力差、黏度、長度相同下,『血流量正比於「管徑半徑的四次方(r⁴)」』。管徑4 cm與2 cm之比為2,故血流量之比=2⁴=『16倍』。故D正確。此第四次方關係解釋了『小動脈半徑微小變化即大幅改變血流與阻力』,使小動脈成為調節血流分配與周邊阻力的主要部位。故D正確。","options":{"A":"2倍為一次方關係(錯)。","B":"4倍為平方關係(錯)。","C":"8倍為立方關係(錯)。","D":"16倍=2⁴(四次方)—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_107100-57":{"quick":"血液黏滯係數增加直接使周邊總阻力(TPR)增加。","detail":{"background":"血管阻力(Poiseuille)R=8ηL/(πr⁴)—『阻力正比於黏度(η)』。故『血液黏滯係數增加→周邊總阻力(TPR)直接增加』(A)。其後可能使心臟後負荷增、若心輸出不變則平均動脈壓(MAP=CO×TPR)上升(非下降)。B(小動脈半徑增加)、D(心搏量增加)非黏度增加的直接效應。故A正確。臨床:紅血球增多症(polycythemia)血黏度高→TPR與血栓風險上升;貧血則黏度低、TPR低。","options":{"A":"黏度增加→周邊總阻力增加—正解。","B":"黏度增加不使小動脈半徑增加。","C":"TPR增加傾向使MAP上升(非下降)。","D":"非直接增加心搏量。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_107100-58":{"quick":"增加小動脈一氧化氮(NO)使血管舒張、血壓下降。","detail":{"background":"降血壓的途徑是『血管舒張或降低心輸出』。『增加小動脈「一氧化氮(NO)」→活化平滑肌guanylyl cyclase↑cGMP→血管「舒張」→周邊阻力下降→血壓下降』(C正確)。比較錯誤:A活化『β1』受體增心率心收縮力→血壓『升』(且血管平滑肌主要α1致收縮);B開啟鈣通道使平滑肌收縮→血壓升;D活化ACE→產生血管張力素II→血管收縮、保鈉→血壓升。故C正確。臨床:硝化物、ACE抑制劑(相反作用)等為降壓藥。","options":{"A":"β1活化增心輸出→血壓升。","B":"鈣通道開啟使血管收縮→血壓升。","C":"增NO使血管舒張→血壓下降—正解。","D":"ACE活化產生AngII→血壓升。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_107100-59":{"quick":"血漿膠體滲透壓降低→微血管濾過增加→組織液增多→淋巴流速增加。","detail":{"background":"淋巴生成取決於微血管淨濾過(Starling力)。『血漿膠體滲透壓(colloid osmotic pressure)「降低」』→吸回組織液的力量減弱→微血管「淨濾過增加」→組織間液增多→『淋巴生成與流速增加』。故C正確。比較:A微血管靜水壓升高(非降低)亦增濾過、B通透性增加(非降低)亦增濾過、D組織膠滲壓升高(非降低)亦增濾過—題問「降低」即可增淋巴者為『血漿膠體滲透壓』。故C正確。臨床:低白蛋白血症(血漿膠滲壓低)→水腫(濾過過多超過淋巴回收)。","options":{"A":"微血管靜水壓「升高」才增濾過(非降低)。","B":"通透性「增加」才增濾過。","C":"血漿膠體滲透壓降低→濾過增→淋巴增—正解。","D":"組織膠滲壓「升高」才增濾過。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-58":{"quick":"動脈粥狀硬化:收縮壓(1)與脈搏壓(3)增加(動脈變硬),故僅13。","detail":{"background":"動脈粥狀硬化使『大動脈壁「變硬、順應性下降」』→收縮期動脈無法有效膨脹緩衝→『「收縮壓(1)升高」、舒張壓相對降低或不變→「脈搏壓(3)=收縮壓−舒張壓 加大」』。故增加者為1與3(B)。舒張壓(2)常不升甚至降、平均動脈壓(4)變化不一(非必增)。故B(僅13)正確。臨床:單純收縮期高血壓與脈壓增大是老年動脈硬化的特徵,為心血管事件危險因子。","options":{"A":"123含舒張壓(不必增)。","B":"僅13(收縮壓+脈搏壓增加)—正解。","C":"23不符。","D":"1234過廣。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108100-57":{"quick":"大量失血時動脈感壓受器放電「減少」(壓力降),故「放電增加」最不可能。","detail":{"background":"大量失血→動脈壓下降→『動脈感壓受器(baroreceptor)受牽張減少→「放電頻率「降低」(非增加)」』→解除對血管運動中樞的抑制→『交感活性增加(B、心率、收縮力、靜脈與小動脈收縮)、副交感活性減少(C)、周邊總阻力增加(D)』的代償反射。故A「感壓受器放電增加」與實際相反、『最不可能發生』。故A為正解。記憶:壓降→感壓受器放電降→交感↑副交感↓(壓力反射的代償)。","options":{"A":"稱失血時感壓受器放電增加—最不可能(壓降應放電減少),為正解。","B":"靜脈交感活性增加,會發生。","C":"心臟副交感活性減少,會發生。","D":"周邊總阻力增加,會發生。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108100-58":{"quick":"副交感增加竇房結鉀通透性使其過極化、減慢心率。","detail":{"background":"副交感(迷走)對心臟:乙醯膽鹼作用於『竇房結M2受體→經Gi抑制腺苷酸環化酶(降cAMP)、並「增加K⁺通透性(開啟GIRK通道)使細胞膜「過極化」、減慢舒張期去極化」→心率減慢』。故D正確。比較錯誤:A刺激F型(funny)通道去極化是『交感』(加速)的作用、非副交感;B「直接」抑制cAMP用詞不精確且主要作用在節律細胞減慢(非延緩心室收縮);C活化β2致血管舒張是『交感/腎上腺素』(非副交感)。故D正確。","options":{"A":"刺激F型通道去極化為交感作用(加速)。","B":"副交感主要減慢節律(非延緩心室收縮速率為主)。","C":"β2致血管舒張為腎上腺素能(非副交感)。","D":"增竇房結K通透性致過極化、減慢心率—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108100-59":{"quick":"微血管前小動脈收縮→微血管靜水壓下降→濾過速率下降。","detail":{"background":"微血管前小動脈(precapillary arteriole)是『阻力血管』:其『收縮→下游微血管「靜水壓(hydrostatic pressure)下降」』→依Starling,濾過驅動力降→『微血管濾過(filtration)速率下降』(反而傾向吸收)。故B正確。比較錯誤:A微血管靜水壓應『下降』(非增加);C/D膠體滲透壓不因小動脈收縮而即時改變。故B正確。臨床:小動脈收縮(如交感↑)降低微血管壓、減少組織液濾出;小動脈舒張則增濾過(可致水腫)。","options":{"A":"微血管靜水壓下降(非增加)。","B":"微血管濾過速率下降—正解。","C":"血漿膠滲壓不因此即時改變。","D":"組織膠滲壓不因此上升。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109020-61":{"quick":"扣帶壓在收縮壓與舒張壓之間(130>cuff>90)時聽到間斷敲擊聲(Korotkoff音)。","detail":{"background":"血壓計聽診原理(Korotkoff音):當『扣帶壓「介於收縮壓與舒張壓之間(130 > cuff > 90)」』時,每次心搏收縮壓高峰使血流間歇通過被部分壓扁的動脈、產生『間斷的敲擊聲(Korotkoff音)』。扣帶壓『>收縮壓(130)』時血流完全阻斷、無聲;扣帶壓『<舒張壓(90)』時血流持續通暢、聲音消失。故B正確。第一個敲擊聲=收縮壓、聲音消失=舒張壓。故B正確。","options":{"A":"扣帶壓>收縮壓時血流阻斷、無聲。","B":"130>扣帶壓>90聽到間斷敲擊聲—正解。","C":"扣帶壓<舒張壓血流通暢、無聲。","D":"非全程可聽。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109100-57":{"quick":"靜脈系統含血量最大(約占全身血量60–70%)。","detail":{"background":"血液在循環系統的分布:『靜脈系統(含小靜脈、大靜脈)含血量最大,約占全身血量「60–70%」』—靜脈壁薄、順應性高,作為『容量血管(血液儲庫)』。其餘:動脈約15%、心臟約7%、肺循環約9%、微血管約5%。故含血量最大者為靜脈(C)。臨床:交感興奮使靜脈收縮、把儲血擠回心臟增加靜脈回流與心輸出(失血代償)。故C正確。","options":{"A":"心臟約占7%。","B":"動脈約占15%。","C":"靜脈含血量最大(約60–70%)—正解。","D":"微血管約占5%。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109100-58":{"quick":"擴張小動脈降低周邊阻力,並非升高右心房壓的因素。比較各選項以「降低靜脈回流」會升右房壓? 本題答C。","detail":{"background":"右心房壓(≈中心靜脈壓)由『靜脈回流與心臟射出的平衡』決定。『擴張小動脈、降低周邊阻力→血液更易由動脈流向靜脈端→增加靜脈回流→可使右心房壓「升高」』(C為本題答案)。比較:A加強心臟幫浦功能會把血更快射出、降右房壓;B降低靜脈回流會降右房壓;D失血血量減少會降右房壓。故在選項中最可能「升高」右房壓者為「擴張小動脈降周邊阻力(增靜脈回流)」(C)。記憶:增靜脈回流或心衰(射出不足)會升右房壓。","options":{"A":"加強幫浦功能降右房壓。","B":"降低靜脈回流降右房壓。","C":"擴張小動脈降阻力→增靜脈回流→右房壓升—正解。","D":"失血血量減少降右房壓。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109100-59":{"quick":"舉重當下肌肉「等長收縮壓迫血管」使局部血流受阻、周邊阻力上升。","detail":{"background":"舉重(尤其等長/Valsalva用力)當下,『大量骨骼肌「等長收縮」直接「機械壓迫」其內血管→局部血流受阻、血管阻力上升→周邊總阻力(TPR)增加』、血壓急遽上升。故A正確。比較:B心輸出增加是『心臟』因素(非TPR成因);C局部代謝物增加會使血管『舒張(降TPR)』(運動後充血);D感壓反射在血壓上升時反而『降低』交感(降TPR)。故當下TPR上升主因是肌肉壓迫血管(A)。故A正確。臨床:重量訓練的瞬間血壓飆高與此機制有關。","options":{"A":"肌肉收縮壓迫血管→TPR上升—正解。","B":"心輸出增加是心臟因素(非TPR)。","C":"局部代謝物使血管舒張(降TPR)。","D":"感壓反射在升壓時降TPR。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-58":{"quick":"器官血流下降時其小動脈可發生「自動調節性擴張」以維持血流。","detail":{"background":"小動脈血流調控:D『若某器官血流下降→局部缺氧與代謝物堆積(腺苷、CO₂、H⁺、K⁺)→「小動脈自動調節性「擴張」」以恢復血流』(代謝性自動調節)—正確。比較錯誤:A骨骼肌小動脈主要受『α(收縮)與β2(舒張)及局部代謝』多重調控(非僅β);B腎上腺素與『α受體』結合使血管『「收縮」』(非擴張);C血管平滑肌主要受『交感』調控,『副交感對多數血管無顯著支配』(且非致收縮)。故D正確。","options":{"A":"骨骼肌小動脈非僅受β受體調控。","B":"與α受體結合使血管收縮(非擴張)。","C":"多數血管無顯著副交感支配。","D":"器官血流下降時小動脈可擴張(自動調節)—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-59":{"quick":"失血20%啟動代償反射時,周邊總阻力(TPR)會「增加」。","detail":{"background":"失血約20%→動脈壓下降→感壓反射代償:『交感活性增加→小動脈收縮使「周邊總阻力(TPR)增加」、靜脈收縮增回流、心率與收縮力增』。故反射代償時『TPR增加』(C)。而心搏量(A)、心輸出量(B)、平均動脈壓(D)在失血後傾向『下降』(代償只是減緩下降、未必回正常)。故題問增加者為TPR(C)。故C正確。記憶:失血代償=交感↑→TPR↑、心率↑、靜脈收縮↑,以維持血壓。","options":{"A":"心搏量因失血而下降。","B":"心輸出量下降。","C":"周邊總阻力增加—正解(交感代償)。","D":"平均動脈壓傾向下降。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-60":{"quick":"切除感壓受器後,失去抑制性回饋→交感失抑制→平均動脈壓短期內顯著「升高」。","detail":{"background":"動脈感壓受器(baroreceptor)持續放電對血管運動中樞有『抑制(緩衝)』作用。若『完全切除其神經路徑→失去此抑制性緩衝→交感張力失去調節而上升→「平均動脈壓短期內顯著升高」、且血壓變異性大增(波動劇烈)』。故A正確。(長期因其他機制部分代償,但短期顯著升高。)此即「感壓受器去神經性高血壓」。故A正確。記憶:感壓受器是負回饋緩衝、移除後血壓升高且不穩。","options":{"A":"切除後平均動脈壓短期顯著升高—正解。","B":"非顯著下降。","C":"非先降後升。","D":"並非不受影響(血壓升高且波動大)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111020-62":{"quick":"失血致動脈壓下降時,心臟副交感活性應「減少」(非與此最不相關);本題選最不相關者為B—因副交感減少是「代償反應」而非「造成血壓下降的原因」。","detail":{"background":"王大明失血致平均動脈壓下降的『直接原因/相關因素』:A血量大幅下降(直接);C周邊靜脈壓減少、靜脈回流減少(→心輸出降);D心室舒張末期容積(前負荷)明顯減少(→心搏量降)—皆與血壓下降『直接相關』。而B「分布到心臟的副交感神經活性減少」是『身體偵測到血壓下降後啟動的「代償反應(使心率加快)」』,屬於『回復血壓的機轉』而非『造成血壓下降的原因』→故與「血壓下降的發生」最不相關。故B為正解。","options":{"A":"血量下降為血壓下降直接原因。","B":"副交感活性減少是代償反應(非血壓下降之因)—最不相關,為正解。","C":"靜脈回流減少→心輸出降,相關。","D":"前負荷減少→心搏量降,相關。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111100-59":{"quick":"感壓受器放電增加→交感降:微動脈交感活性減少、半徑增大、降周邊阻力(本題此選項描述「半徑縮小」有誤,答案取B為「最符合下調血壓」之意).","detail":{"background":"血壓微升→頸動脈竇與主動脈弓感壓受器放電『增加』→啟動降壓反射:『投射到微動脈的交感活性「減少」→微動脈「舒張(半徑增大)」→周邊總阻力下降』、『投射到靜脈交感減少→靜脈舒張、減少回流』、『心臟副交感增加+交感減少→心率與收縮力下降→心輸出降』。本題以B為答案(投射微動脈交感活性減少、降周邊總阻力);唯其選項文字「半徑縮小」與「降阻力」自相矛盾(應為半徑增大),依官方答案取B(交感減少→降周邊阻力)。整體機制:感壓受器放電增→交感↓副交感↑→血壓下降。","options":{"A":"靜脈交感減少應使靜脈舒張(降回流),方向描述有誤。","B":"微動脈交感減少→降周邊總阻力(官方答案)—正解(取降阻力之意)。","C":"心臟副交感增加減慢心率,屬降壓但本題取B。","D":"心臟交感減少降心搏量,屬降壓但本題取B。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_112020-59":{"quick":"脈搏壓=收縮壓−舒張壓=120−50=70 mmHg。","detail":{"background":"血壓參數:『脈搏壓(pulse pressure)=收縮壓−舒張壓』;『平均動脈壓(MAP)≈舒張壓+1/3脈搏壓』。此例舒張壓50、收縮壓120→『脈搏壓=120−50=70 mmHg』(B正確);MAP≈50+(70/3)≈73 mmHg(非85或97)。故B正確。脈搏壓加大反映大動脈順應性下降或心搏量增加。故B正確。","options":{"A":"170為收縮+舒張(錯,應為相減)。","B":"脈搏壓=120−50=70 mmHg—正解。","C":"MAP約73(非85)。","D":"MAP約73(非97)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113020-60":{"quick":"大失血代償時心臟副交感應「減少」(使心率加快),稱其「增加使心率增快」自相矛盾、最不可能。","detail":{"background":"大失血→動脈壓降→感壓反射代償:『心臟交感活性增加(增心率、收縮力、心搏量)(B)、靜脈交感增加(增回流、前負荷)(C)、微動脈交感增加(降半徑、增周邊阻力)(D)』、且『心臟「副交感活性「減少」」(使心率加快)』。A「分布到心臟的副交感活性「增加」使竇房結心跳「增快」」『最不可能/自相矛盾』—副交感增加應使心率『減慢』(與代償加快相反);代償應是副交感「減少」。故A為正解。","options":{"A":"稱副交感增加卻使心率增快—最不可能(矛盾),為正解。","B":"心臟交感增加增心搏量,合理。","C":"靜脈交感增加增回流,合理。","D":"微動脈交感增加增周邊阻力,合理。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113020-61":{"quick":"心跳速率減緩→心肌代謝需求降→冠狀動脈傾向「收縮」(代謝性血流下降)。","detail":{"background":"冠狀動脈血流受『局部代謝(心肌耗氧)』主導:心肌活動增→腺苷、CO₂等代謝物增→冠脈『舒張』。題問引起冠脈「收縮」者:『心跳速率減緩→心肌耗氧與代謝率下降→代謝性血管舒張因子減少→冠狀動脈傾向「收縮(血流下調)」』(B)。比較:A腺苷增加→舒張;C NO增加→舒張;D心臟代謝率增加→舒張。故B正確。記憶:冠脈血流與心肌代謝需求匹配(代謝性自動調節);需求降則血流降(血管相對收縮)。","options":{"A":"腺苷增加使冠脈舒張。","B":"心率減緩→代謝降→冠脈收縮—正解。","C":"NO增加使冠脈舒張。","D":"代謝率增加使冠脈舒張。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113090-59":{"quick":"交感興奮促淋巴管平滑肌「收縮」應「加速」淋巴流(非減緩),故此敘述最不易發生。","detail":{"background":"淋巴回流的推動力:B『骨骼肌泵(肌肉收縮擠壓淋巴管)增加淋巴流』、C『淋巴管平滑肌自發節律收縮把淋巴往心臟推』、D『淋巴管瓣膜防逆流、導向心臟』—皆正確促進回流。A「交感興奮促淋巴管平滑肌收縮可「減緩」淋巴流速」『最不易發生(錯誤)』—交感使淋巴管平滑肌收縮應『「加速」淋巴推送(增流速)』,而非減緩。故A為正解(最不易發生)。記憶:淋巴回流靠肌泵、淋巴管自發收縮、瓣膜、呼吸泵—皆促進、非減緩。","options":{"A":"稱交感收縮淋巴管減緩流速—最不易發生(應加速),為正解。","B":"骨骼肌泵增淋巴流,正確。","C":"淋巴管自發收縮推送,正確。","D":"瓣膜導向心臟,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114020-61":{"quick":"血壓上升的下調機制:活化釋放NO的神經元、減少endothelin-1(促血管舒張)。","detail":{"background":"血壓上升時的『下調(降壓)』反應傾向使『血管舒張』:『活化「釋放一氧化氮(NO,血管舒張因子)」的神經元/內皮、並「減少endothelin-1(強力血管收縮因子)」釋放』→血管舒張、阻力下降、血壓回降。故A正確。NO(舒張)增加+ET-1(收縮)減少=淨血管舒張。其餘選項方向矛盾。故A正確。臨床:內皮功能障礙(NO↓、ET-1↑)與高血壓、動脈硬化相關。","options":{"A":"活化NO神經元+減少ET-1→血管舒張降壓—正解。","B":"抑NO增ET-1會升壓(相反)。","C":"抑NO減ET-1方向矛盾。","D":"增NO又增ET-1方向矛盾。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-61":{"quick":"顱內壓上升:庫欣反應—血壓上升、心跳下降。","detail":{"background":"顱內壓(ICP)上升的『庫欣反應(Cushing reflex)』:ICP升高壓迫腦幹、腦灌注壓下降→交感大量驅動使『「血壓(尤其收縮壓)大幅上升」』以維持腦灌注;隨後高血壓刺激壓力反射使『「心跳「反射性減慢(心搏徐緩)」」』。故「血壓上升、心跳下降」(B)。常伴不規則呼吸=庫欣三徵。故B正確。臨床:庫欣三徵(高血壓、心搏徐緩、呼吸異常)是顱內壓危象/腦疝的警訊。","options":{"A":"血壓應上升(非下降)。","B":"血壓上升、心跳下降(庫欣反應)—正解。","C":"心跳應反射性減慢(非上升)。","D":"方向皆相反。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_115020-59":{"quick":"微血管動脈端Starling淨濾過壓約為+13 mmHg(向外濾出)。","detail":{"background":"微血管液體交換(Starling力):『淨濾過壓 =(微血管靜水壓 − 組織靜水壓)−(血漿膠滲壓 − 組織膠滲壓)』。在『動脈端』,微血管靜水壓較高、淨力為『向外濾出(正值)』,典型計算約『+13 mmHg』(此題組織靜水壓=0);靜脈端則微血管靜水壓降低、淨力轉為向內吸收(負值)。故B(13 mmHg)正確。此驅動動脈端濾出、靜脈端吸收的循環交換,多餘組織液由淋巴回收。故B正確。","options":{"A":"7非動脈端典型淨濾過壓。","B":"動脈端淨濾過壓約+13 mmHg—正解。","C":"59過高(接近單純靜水壓)。","D":"65過高。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_115020-60":{"quick":"腦部血流自動調節:灌注壓下降時腦血管「擴張」以維持血流。","detail":{"background":"血流自動調節(autoregulation):器官在一定灌注壓範圍內藉血管口徑變化維持血流恆定。『腦部』有良好自動調節—『灌注壓「下降」時腦血管「擴張」、灌注壓上升時腦血管收縮』以維持腦血流穩定(肌源性與代謝機制)。故A「腦部自動調節時血管擴張(對應壓降)」正確。肝臟的血流自動調節較弱、且其調控以肝動脈緩衝反應為特殊。故A正確(腦部自動調節經血管擴張維持血流)。臨床:腦自動調節在嚴重低血壓或慢性高血壓會失效→腦缺血或過度灌注。","options":{"A":"腦部自動調節經血管擴張維持血流—正解。","B":"肝臟自動調節較弱、非此題重點。","C":"壓降時腦血管應擴張(非收縮)。","D":"肝臟敘述不符。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_106100-56":{"quick":"von Willebrand factor主要由「內皮細胞與巨核細胞」製造,非血管平滑肌,故此敘述錯誤。","detail":{"background":"溫韋伯氏因子(von Willebrand factor, vWF)由『血管「內皮細胞」與「巨核細胞/血小板」製造』(非血管平滑肌)—故A錯誤。功能:B『血管受損暴露膠原時,vWF橋接「膠原與血小板GPIb受體」使血小板黏附』;C透過此黏附與訊號可活化血小板;D『與凝血第八因子(FVIII)結合作為載體、穩定保護之』。故A為正解。臨床:vWF缺乏=溫韋伯氏病(最常見遺傳性出血疾病,黏膜出血、bleeding time延長、FVIII亦降)。","options":{"A":"稱vWF主要由血管平滑肌製造—錯誤(由內皮與巨核細胞),為正解。","B":"橋接膠原與血小板,正確。","C":"參與活化血小板,正確。","D":"作為FVIII載體調控之,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_107100-56":{"quick":"凝血酶(thrombin)使纖維蛋白原→纖維蛋白,直接促進血塊形成。","detail":{"background":"凝血共同路徑終點:『凝血酶(thrombin, FIIa)把「纖維蛋白原(fibrinogen)」裂解成「纖維蛋白(fibrin)」單體並聚合、再經FXIIIa交聯成穩定血塊』—故A『直接促進血塊形成』正確。比較:B『plasminogen→plasmin』是『纖溶(溶解血塊)』(與形成相反);C tissue factor活化的是『外在路徑的FVII』(非內在的FXII;且為上游啟動非直接成塊);D敘述凝血因子組合不正確。故A正確。臨床:凝血酶為凝血核心,thrombin抑制劑(dabigatran)為抗凝藥。","options":{"A":"thrombin使fibrinogen→fibrin直接成塊—正解。","B":"plasmin為纖溶(溶塊)。","C":"tissue factor活化外在路徑FVII(非FXII)。","D":"凝血因子組合敘述不正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-53":{"quick":"病人為AB型(血漿無anti-A/anti-B抗體),可接受A、B、O型紅血球,三人均可捐血。","detail":{"background":"ABO輸血相容性(以「捐血者紅血球抗原 vs 受血者血漿抗體」判定):『AB型受血者血漿「無anti-A、無anti-B抗體」』→可接受帶A、B或無抗原的紅血球→『AB型是「萬能受血者」』。故A型、B型、O型三人的紅血球皆不被凝集、『三人均可捐血給AB型患者』。故C正確。(O型紅血球無A/B抗原為萬能捐血者;此處小量輸血主要考慮紅血球相容。)故C正確。","options":{"A":"非只有A、B型可捐(O型亦可)。","B":"非只有O型可捐。","C":"AB型為萬能受血者、三人均可捐—正解。","D":"非三人皆不可捐。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-54":{"quick":"protein C(抗凝蛋白)主要由肝臟生成。","detail":{"background":"血漿蛋白來源:『protein C(維生素K依賴的「抗凝」蛋白,經thrombomodulin活化後降解FVa、FVIIIa)主要由「肝臟」合成』—故A正確。比較:vWF由內皮/巨核細胞;G-CSF由內皮、巨噬細胞、纖維母細胞等;interferon-γ由T細胞/NK細胞。故A正確。臨床:protein C缺乏→易栓症;肝衰竭時凝血與抗凝蛋白(含protein C)皆減少;warfarin初期因protein C半衰期短先降可致暫時高凝(華法林壞死)。","options":{"A":"protein C由肝臟生成—正解。","B":"vWF由內皮/巨核細胞。","C":"G-CSF由內皮/巨噬等。","D":"IFN-γ由T/NK細胞。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108100-56":{"quick":"肥大細胞在「血液」中最不常見(它駐留於結締組織)。","detail":{"background":"正常血液白血球比例:嗜中性球最多(~60%)、淋巴球次之(~30%)、單核球(~5%)、嗜酸性球(~2–4%)、嗜鹼性球最少(<1%)。而『肥大細胞(mast cell)「不在血液中循環」—它由前驅細胞在「結締組織與黏膜」內成熟駐留』,故在『血液中最不常見(幾乎不見)』。故D正確。(肥大細胞與血中嗜鹼性球功能相似但分居組織與血液。)故D正確。","options":{"A":"嗜酸性球在血中約2–4%。","B":"淋巴球約30%。","C":"單核球約5%。","D":"肥大細胞駐留組織、血中最不常見—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109020-58":{"quick":"A型(含A抗原)紅血球輸給O型,O型血漿的anti-A抗體會使其溶解(凝集),故不可。","detail":{"background":"ABO輸血:『O型受血者血漿「同時有anti-A與anti-B抗體」』。若把『A型(紅血球帶A抗原)』輸給O型→『O型的「anti-A抗體」與A抗原結合→紅血球凝集、補體媒介溶血』。故不可輸。故D「O型的anti-A抗體使A抗原紅血球溶解」正確。(O型是萬能捐血者但只能接受O型血;此為主側不合。)故D正確。比較:A、C白血球吞噬/包覆敘述非機制;B Rh方向與本題主因不符(主因是ABO的anti-A)。故D正確。","options":{"A":"非白血球被紅血球包覆。","B":"主因為ABO的anti-A(非Rh)。","C":"非白血球吞噬機制。","D":"O型anti-A抗體使A抗原紅血球溶解—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109100-56":{"quick":"C-反應蛋白(CRP)是發炎急性期蛋白,與凝血機制調控最無關。","detail":{"background":"與凝血機制相關者:『fibrinogen(凝血受質、形成纖維蛋白)』、『protein C(抗凝)』、『thrombin(凝血核心酶)』—皆參與凝血/抗凝調控。而『C-反應蛋白(C-reactive protein, CRP)是「發炎急性期反應蛋白」(肝臟受IL-6誘導合成、作為發炎標記與調理素)』,『與凝血機制調控最無關』。故C正確。(CRP雖在發炎中升高、與心血管風險相關,但非凝血路徑成分。)故C正確。","options":{"A":"fibrinogen為凝血受質。","B":"protein C為抗凝蛋白。","C":"CRP為發炎急性期蛋白、與凝血調控最無關—正解。","D":"thrombin為凝血核心酶。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109100-74":{"quick":"血紅素S因Glu→Val使表面增疏水區、疏水交互作用增加而聚集。","detail":{"background":"鐮刀型血紅素(HbS):β鏈第6位『麩胺酸(Glu,帶負電親水)被纈胺酸(Val,疏水)取代』→在『去氧狀態下,Val使HbS分子表面出現「疏水黏點」,與相鄰HbS的疏水袋「以疏水交互作用」結合→聚合成長纖維(polymer)』使紅血球變鐮刀狀。故C「疏水性交互作用增加」正確。非共價/雙硫/離子鍵主導。故C正確。臨床:鐮刀化致溶血、血管阻塞(疼痛危象);缺氧、脫水、酸中毒促進鐮刀化。","options":{"A":"非形成共價鍵。","B":"非雙硫鍵。","C":"疏水交互作用增加致聚集—正解。","D":"非離子交互作用主導。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-56":{"quick":"血小板透過vWF與膠原蛋白接合而黏附於受損血管壁。","detail":{"background":"初級止血(血小板黏附):血管受損暴露『內皮下膠原蛋白』→『血漿中的vWF橋接「膠原」與血小板表面「GPIb受體」』→血小板黏附於受損處;接著活化、變形、釋放顆粒(ADP、TXA₂、serotonin)、經GPIIb/IIIa與fibrinogen互相聚集成血小板栓。故C「透過vWF與膠原接合」是黏附的關鍵。故C正確。比較:A是凝血瀑布(次級止血)、B tissue factor是外在路徑啟動、D serotonin釋放是黏附之後的活化反應。故C正確。","options":{"A":"凝血因子瀑布為次級止血(非黏附)。","B":"tissue factor啟動外在凝血路徑。","C":"vWF橋接血小板與膠原使黏附—正解。","D":"serotonin釋放是活化後反應。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-57":{"quick":"胎兒血紅素為α2γ2、對2,3-BPG親和力低使其對氧親和力較高(較易結合氧)。","detail":{"background":"胎兒血紅素(HbF)=『α2γ2鏈』;成人血紅素(HbA)=『α2β2鏈』。HbF的『γ鏈對「2,3-BPG(降低血紅素對氧親和力的調節物)」結合較弱』→HbF『對氧親和力「較高」(氧解離曲線左移)』→能在胎盤『從母體HbA「奪取」氧』供胎兒。故D正確。比較:A兩者鏈不同、攜氧特性不同(非相同);B ε2ζ2是更早期胚胎血紅素(非胎兒);C「α4」不是正常血紅素。故D正確。臨床:出生後HbF漸由HbA取代;遺傳持續性HbF可緩解鐮刀/地中海貧血。","options":{"A":"兩者鏈不同、攜氧不同(非相同)。","B":"ε2ζ2為胚胎期血紅素(非胎兒)。","C":"α4非正常血紅素。","D":"胎兒HbF(α2γ2)對氧親和力較高—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111100-56":{"quick":"維生素K是「促凝(合成凝血因子)」所需,抗凝治療時最不予考慮(反而是warfarin的拮抗劑)。","detail":{"background":"抗凝/抗血栓藥物:『aspirin(抑制TXA₂、抗血小板)』、『prostacyclin/PGI₂(抑制血小板聚集、血管舒張)』、『heparin(增強antithrombin、抑制凝血酶與FXa)』—皆用於抗凝/抗血栓。而『維生素K是肝臟合成「凝血因子II、VII、IX、X」所必需』,屬『「促凝」方向』,『抗凝治療時最不予考慮』(維生素K反而是warfarin過量的「解毒/拮抗劑」)。故B正確。臨床:warfarin拮抗維生素K以抗凝;出血時補維生素K逆轉。","options":{"A":"aspirin為抗血小板,可用於抗凝/抗栓。","B":"維生素K為促凝、抗凝治療不予考慮—正解。","C":"prostacyclin抑制血小板。","D":"heparin為抗凝劑。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_112020-57":{"quick":"鐮刀型紅血球較不易通過微血管(易阻塞)。","detail":{"background":"鐮刀型紅血球疾病(sickle-cell disease):『「遺傳性(體染色體隱性,HbS突變)」』(非A非遺傳)、是『血紅素結構異常致鐮刀化』(非EPO不足造成的貧血,B錯)、『鐮刀基因攜帶者「對瘧疾「較具」抵抗力」(平衡選擇,C的「較不具」錯)』。鐮刀化的紅血球『僵硬、變形→「不易通過微血管」、易黏附阻塞→血管阻塞性危象與溶血』。故D正確。臨床:疼痛危象、脾梗塞、缺氧/脫水誘發;治療含hydroxyurea(增HbF)。故D正確。","options":{"A":"為遺傳疾病(非非遺傳)。","B":"非EPO不足(是HbS突變)。","C":"鐮刀帶因者對瘧疾「較具」抵抗力(非較不具)。","D":"鐮刀紅血球不易通過微血管—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113090-57":{"quick":"離心後血漿約佔55%、血球(血比容)約45%;此題血漿體積比對應血比容,選30%者代表貧血/比容偏低,答A。","detail":{"background":"全血離心後分:上層『血漿(plasma)約55%』、下層『血球(主要紅血球,即血比容hematocrit, Hct)約「45%(男)/40%(女)」』、中間薄層白血球血小板。題以抽1 mL血離心測血漿體積推算:若『血比容約30%(偏低=貧血)』則血漿比例約70%。本題答案A(30%)指『該患者血比容約30%、偏低、提示貧血』。故A正確(對應血比容下降的臨床情境)。記憶:Hct正常男~45%、女~40%;<正常=貧血、>正常=紅血球增多/脫水。","options":{"A":"血比容約30%(偏低、提示貧血)—正解。","B":"40%為女性正常值附近。","C":"50%偏高。","D":"75%不合理(過高)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114020-57":{"quick":"缺乏vWF→血小板無法黏附於膠原蛋白(初級止血缺損)。","detail":{"background":"vWF橋接『內皮下膠原』與『血小板GPIb受體』使血小板黏附。『缺乏vWF→血小板「無法黏附於膠原」→初級止血缺損→黏膜皮膚出血、bleeding time延長』。故A正確。比較:B fibrinogen聚合不需vWF;C thrombin活化走凝血瀑布(不因缺vWF而永不活化);D缺vWF使止血變差(血塊不會更堅固)。故A正確。臨床:溫韋伯氏病亦因vWF載送FVIII減少而FVIII偏低、可有次級止血缺損。故A正確。","options":{"A":"缺vWF→血小板不黏附膠原—正解。","B":"fibrinogen聚合不需vWF。","C":"thrombin仍可由凝血瀑布活化。","D":"缺vWF止血變差(血塊非更堅固)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-57":{"quick":"可溶性纖維蛋白「片段」是纖溶「產物」,稱其聚集成纖維蛋白方向相反、為錯誤。","detail":{"background":"血栓溶解(纖維蛋白溶解)機制:A『內皮分泌「組織血漿素原活化劑(tPA)」』;B『tPA把plasminogen轉成「plasmin」』;D『tPA與「纖維蛋白(fibrin)」結合可大幅增強其活性(局部專一溶栓)』—皆正確。plasmin把纖維蛋白『「分解」成可溶性降解片段(FDP/D-dimer)』。故C「可溶性纖維蛋白片段「聚集成」纖維蛋白」『方向相反、錯誤』—片段是『分解產物』(纖溶把fibrin降解,而非片段重組成fibrin)。故C為正解。臨床:tPA(alteplase)用於急性缺血中風/心肌梗塞溶栓;D-dimer為纖溶標記。","options":{"A":"內皮分泌tPA,正確。","B":"plasminogen轉plasmin,正確。","C":"稱片段聚集成fibrin—方向相反、錯誤,為正解。","D":"tPA與fibrin結合增活性,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_106100-60":{"quick":"僅含碳水化合物的食物呼吸商(RQ)最高(=1.0)。","detail":{"background":"呼吸商(RQ)=產生CO₂/消耗O₂,反映代謝燃料:『碳水化合物 RQ=1.0(最高)』、蛋白質≈0.8、脂肪≈0.7。故僅含碳水化合物的食物RQ最高(A)。混合飲食約0.85。RQ用於估算能量消耗的燃料比例。故A正確。臨床:高碳水餵食使RQ趨1、CO₂產量增(對呼吸衰竭病人需注意);長期飢餓燒脂肪RQ趨0.7。","options":{"A":"碳水化合物RQ=1.0最高—正解。","B":"脂肪RQ約0.7。","C":"蛋白質RQ約0.8。","D":"混合飲食約0.85。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_106100-61":{"quick":"擴散限制過程:正常人CO與肺水腫患者O₂(35),屬擴散限制。","detail":{"background":"肺泡氣體交換分『「灌流限制(perfusion-limited)」』(氣體很快達平衡、交換量取決血流,如正常的O₂、CO₂、N₂O)與『「擴散限制(diffusion-limited)」』(整段肺微血管都未達平衡、交換受擴散障礙限制,如「CO(與血紅素結合快、分壓持續低)」與「肺水腫/纖維化時的O₂(屏障增厚)」)。故擴散限制者為『3(正常人CO)與5(肺水腫的O₂)』=D(僅35)。故D正確。記憶:CO永遠擴散限制;正常O₂是灌流限制、但屏障增厚或運動時可變擴散限制。","options":{"A":"125含灌流限制氣體。","B":"124含正常O₂/CO₂(灌流限制)。","C":"345含正常O₂(灌流限制)。","D":"僅35(CO與肺水腫O₂)擴散限制—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_106100-62":{"quick":"貧血(Hb減半)僅使「供周邊組織的氧氣量(4)」顯著偏低;PaO₂、SaO₂、肺泡PO₂正常。","detail":{"background":"貧血(Hb僅正常50%、心肺功能正常)的血氧參數:『體動脈「氧分壓(PaO₂)」由「溶解的O₂」決定→正常(1不低)』;『氧合血紅素「飽和百分比(SaO₂)」反映已結合的比例→正常(2不低)』;『肺泡PO₂取決於通氣→正常(3不低)』;但『血液「攜氧總量=Hb×1.34×SaO₂+溶解」因Hb減半而大降→「供給周邊組織的氧氣量(4)顯著偏低」』。故顯著偏低者僅4(D)。故D正確。重點:貧血降的是「氧含量(content)」,非「分壓(PO₂)」或「飽和度(%)」。","options":{"A":"234不低(PO₂/SaO₂/肺泡PO₂正常)。","B":"124不符。","C":"24不符。","D":"僅4(組織供氧量)偏低—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_107100-60":{"quick":"肺纖維化(限制型)功能性肺餘容量「減少」(非增加),故此敘述錯誤。","detail":{"background":"肺纖維化屬『限制型肺病』:肺變硬、順應性下降→『肺活量(VC)減少(A正確)』、『所有肺容量(含「功能性肺餘容量FRC」)「減少」』→故B「FRC增加」錯誤;『運動時呈淺快呼吸(C正確,以減少彈性作功)』;『FEV1減少但FEV1/FVC比值正常或升高(D的FEV1減少正確)』。故B為正解。對比『阻塞型(如肺氣腫)FRC「增加」(空氣滯留)』。故B正確。","options":{"A":"肺活量減少,正確。","B":"稱FRC增加—錯誤(限制型FRC減少),為正解。","C":"運動呈淺快呼吸,正確。","D":"FEV1減少,正確。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_107100-61":{"quick":"肺氣腫的彈性回縮力「減少」(非增加),故此敘述錯誤。","detail":{"background":"肺氣腫(emphysema,阻塞型):肺泡壁與彈性纖維破壞→『「彈性回縮力減少」(A錯誤)』、『肺順應性增加(B正確,易脹難縮)』、『功能性肺餘容量FRC增加(C正確,空氣滯留、過度充氣)』、『用力呼氣時小氣道因失去牽引而塌陷→呼氣氣流速率降低(D正確,FEV1/FVC下降)』。故A「彈性回縮力增加」為正解(實為減少)。記憶:肺氣腫=彈性回縮↓、順應性↑、FRC↑、呼氣氣流↓。故A正確。","options":{"A":"稱彈性回縮力增加—錯誤(肺氣腫減少),為正解。","B":"肺順應性增加,正確。","C":"FRC增加,正確。","D":"呼氣氣流速率降低,正確。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_107100-62":{"quick":"將血管收縮素I轉成II(ACE)最需要肺臟參與。","detail":{"background":"肺臟除氣體交換外有重要『非呼吸代謝功能』:『肺血管內皮含大量「血管收縮素轉換酶(ACE)」,把「血管收縮素I轉換成II(AngII)」』—此活化主要在『肺循環』進行。故D最需要肺臟。比較:A血清素是被肺『清除(攝取)』(非釋出);B緩激肽(bradykinin)被肺ACE『「去活化(分解)」』(非活化);C纖維蛋白原→纖維蛋白是凝血(非肺特異)。故D正確。臨床:ACE抑制劑因抑制肺ACE→AngII↓、緩激肽↑(故乾咳副作用)。","options":{"A":"血清素被肺清除(非釋出)。","B":"緩激肽被肺ACE去活化(非活化)。","C":"纖維蛋白形成屬凝血。","D":"肺ACE把AngI轉成AngII—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_108030-59":{"quick":"肺氣腫的「擴散容積」會「下降」(非增加),故不屬其變化。","detail":{"background":"肺氣腫變化:『呼吸道阻力增加(A,小氣道塌陷)』、『總肺容量增加(C,過度充氣)』、『通氣灌流失衡(D,肺泡與微血管破壞)』—皆會發生。而『「擴散容積/肺擴散能力(DLCO)」因肺泡壁與微血管床破壞、氣血交換面積減少而「下降」』。故B「擴散容積增加」『不屬肺氣腫的變化』,為正解。記憶:肺氣腫DLCO↓(對比氣喘DLCO常正常)。故B正確。","options":{"A":"呼吸道阻力增加,屬肺氣腫。","B":"擴散容積「下降」(非增加)、不屬肺氣腫變化—正解。","C":"總肺容量增加,屬肺氣腫。","D":"通氣灌流失衡,屬肺氣腫。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_108030-60":{"quick":"高海拔低氧→周邊化學受器驅動,每分鐘通氣量增加(過度換氣代償)。","detail":{"background":"登高(大氣壓低)→吸入氧分壓低→『動脈PaO₂下降(降至80 mmHg)→刺激「頸動脈體與主動脈體周邊化學受器」→反射性「增加每分鐘通氣量(過度換氣)」』以攝取更多氧。故D正確。比較錯誤:A過度換氣使CO₂排出→『呼吸性「鹼」血症』(非酸血症);B缺氧使紅血球『「增加」2,3-DPG降低親和力以利組織釋氧』(非減少、非增親和力);C缺氧『刺激(非抑制)』化學受器衝動。故D正確。臨床:高山症與低氧過度換氣、後續腎代償排HCO₃有關。","options":{"A":"過度換氣致呼吸性鹼血症(非酸血症)。","B":"2,3-DPG增加、降低氧親和力(非減少增親和力)。","C":"缺氧刺激(非抑制)化學受器。","D":"每分鐘通氣量增加—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_108030-61":{"quick":"呼出氣體的氧分壓最高(混合了死腔的高氧空氣)。","detail":{"background":"各處氧分壓(海平面):吸入濕化空氣PO₂≈150;『「呼出氣體」是「解剖死腔(未參與交換、近吸入空氣PO₂≈150)」與「肺泡氣(PO₂≈104)」的混合→PO₂≈120』;肺泡氣≈104;肺泡微血管末/體動脈血≈95–100;靜脈≈40。故給定四者中『呼出氣體PO₂(≈120)最高』,高於肺泡(104)、肺泡微血管血與體動脈血(≈95–100)。故D正確。(因呼出氣含死腔的高氧成分。)故D正確。","options":{"A":"肺泡PO₂約104。","B":"肺泡微血管血約95–100。","C":"體動脈血約95–100。","D":"呼出氣體PO₂最高(混死腔高氧)—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_108100-60":{"quick":"氣體交換發生於肺泡(2)與呼吸性細支氣管(4)等「呼吸區」。","detail":{"background":"呼吸道分『傳導區(無氣體交換,構成死腔)』與『呼吸區(進行氣體交換)』。傳導區:鼻、咽、喉、氣管、『支氣管(1)』、細支氣管、『末端細支氣管(3)』。呼吸區:『「呼吸性細支氣管(4)」、肺泡管、肺泡囊、「肺泡(2)」』(壁上有肺泡可交換)。故氣體交換在2與4(B,僅24)。故B正確。記憶:從「呼吸性細支氣管」開始才有肺泡、才交換;末端細支氣管仍屬傳導區。","options":{"A":"12含傳導區的支氣管。","B":"僅24(肺泡+呼吸性細支氣管)—正解。","C":"234含傳導區的末端細支氣管。","D":"134含傳導區。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_108100-61":{"quick":"甲管(高PO₂)的氧合血紅素多、卡巴胺基血紅素比例較低(何登效應)。","detail":{"background":"兩管CO₂分壓相同(46)、但甲管PO₂=100(高氧)、乙管PO₂=40(低氧)。『何登效應(Haldane effect):氧合的血紅素攜帶CO₂(含carbaminohemoglobin形式)的能力「較差」』。故『甲管(高氧、Hb多為氧合態)的carbaminohemoglobin比例「比乙管低」』(B正確)。其餘:A CO₂總含量甲管(氧合多)『較低』(非相同);C乙管(PO₂40)近似『混合靜脈血』(非體動脈血);D造成兩管差異的是『何登效應』(波爾效應是H⁺/CO₂影響O₂親和力,方向相反)。故B正確。","options":{"A":"甲管CO₂總含量較低(非相同,何登效應)。","B":"甲管carbaminohemoglobin比例較低—正解。","C":"乙管(PO₂40)近混合靜脈血(非動脈血)。","D":"此差異為何登效應(非波爾效應)。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_108100-62":{"quick":"總肺容量減肺餘容積=肺活量(VC)。","detail":{"background":"肺容積關係:『肺活量(VC)= 總肺容量(TLC) − 肺餘容積(RV)』=最大吸氣後能呼出的最大量。題給TLC=5000、RV=300→兩者差值即『肺活量』(A)。其餘:功能性肺餘容量(FRC)=RV+呼氣儲備容積;吸氣儲備容積、潮氣容積為其他分項。故A正確。記憶:VC=IRV+TV+ERV=TLC−RV。","options":{"A":"TLC−RV=肺活量—正解。","B":"吸氣儲備容積為VC的一部分。","C":"潮氣容積為平靜呼吸量。","D":"FRC=RV+ERV(非TLC−RV)。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_109020-62":{"quick":"COPD氣道阻力高,要達相同通氣量須產生「較大」的肋膜內壓變化。","detail":{"background":"通氣須克服氣道阻力與彈性回縮。『COPD(阻塞型)氣道阻力增加』→欲達『與正常人相同的通氣量』,須以『更大的驅動壓力(更大的肋膜內壓Pip變化、更費力)』來推動氣流通過高阻力氣道。故Pip變化『較大』(A)。此反映呼吸作功增加(用於克服氣道阻力)。故A正確。臨床:COPD病人呼吸費力、用力呼氣時小氣道塌陷加重阻塞。","options":{"A":"COPD須較大肋膜內壓變化—正解。","B":"非較小。","C":"非相等。","D":"阻力增加必使所需壓力變化變大。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_109020-63":{"quick":"肺氣腫患者呼吸道阻力顯著增加。","detail":{"background":"肺氣腫(阻塞型)顯著增加者為『呼吸道阻力(B)』—肺泡壁破壞使小氣道失去徑向牽引支撐、用力呼氣時易塌陷→阻力大增。比較:A『解剖死腔』變化不顯著(解剖死腔指傳導區容積,肺氣腫增的是「生理/肺泡死腔」);C『肺擴散容積「下降」』(交換面積減少);D『肺彈性「下降」』(回縮力減少)。故B正確。記憶:肺氣腫=阻力↑、順應性↑、彈性↓、DLCO↓。","options":{"A":"解剖死腔變化不顯著(增的是肺泡死腔)。","B":"呼吸道阻力顯著增加—正解。","C":"肺擴散容積下降(非增加)。","D":"肺彈性下降(非增加)。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_109100-60":{"quick":"表面張力素「降低」肺泡表面張力(非增加),故此敘述錯誤。","detail":{"background":"肺表面張力素(surfactant,由第II型肺泡細胞分泌的磷脂DPPC):A由第II型肺泡細胞分泌(正確);『「降低」肺泡表面張力→防止肺泡塌陷、增加肺順應性(易脹)、穩定大小不一的肺泡(Laplace)』(故C「增加順應性」正確;B「缺乏時肺泡不易擴張」正確)。D「可「增加」肺泡表面張力」『錯誤』—surfactant是『降低』表面張力。故D為正解。臨床:早產兒surfactant不足→新生兒呼吸窘迫症(肺泡塌陷、難擴張)。","options":{"A":"由第II型肺泡細胞分泌,正確。","B":"缺乏時肺泡不易擴張,正確。","C":"增加肺順應性,正確。","D":"稱增加表面張力—錯誤(應為降低),為正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_109100-61":{"quick":"登高七天最不可能的是「PaCO₂增加」(過度換氣使CO₂下降)。","detail":{"background":"登高(3000公尺)適應七天的變化:低氧→『PaO₂下降(B會發生)』→刺激過度換氣→『肺泡通氣量增加(D會發生)、CO₂排出使「PaCO₂「下降」(非增加)」』;低氧也經EPO使『血比容增加(A會發生)』。故C「PaCO₂增加」『最不可能』(過度換氣應使其下降)。故C為正解。記憶:高海拔=低氧→過度換氣(PaCO₂↓、呼吸性鹼)、EPO↑(Hct↑)、2,3-DPG↑。","options":{"A":"血比容增加(EPO),會發生。","B":"PaO₂下降,會發生。","C":"PaCO₂增加—最不可能(過度換氣使其下降),為正解。","D":"肺泡通氣量增加,會發生。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_109100-62":{"quick":"站立平靜呼吸時,V/Q比值在肺底「小於」肺尖。","detail":{"background":"直立肺的區域差異(重力):從肺尖到肺底,『通氣(V)與灌流(Q)「都」增加,但「灌流增加更多」』→故『「V/Q比值」在肺底「較低(小)」、在肺尖「較高(大)」』。題問「肺底小於肺尖」者=『V/Q比值(C)』。比較:肺通氣量(A)、血液灌流量(B)、順應性肺底皆『較大(非小於肺尖)』。故C正確。臨床:肺尖高V/Q(死腔效應)、肺底低V/Q(分流效應);結核好發肺尖與高V/Q高氧環境有關。","options":{"A":"肺通氣量肺底較大。","B":"血液灌流量肺底較大。","C":"V/Q比值肺底小於肺尖—正解。","D":"順應性肺底相對較大。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_110020-61":{"quick":"肺泡通氣量=（潮氣容積−死腔）×呼吸頻率;丙>乙>甲。","detail":{"background":"『肺泡通氣量 =(潮氣容積 − 死腔150)× 呼吸頻率』。計算:甲=(200−150)×30=『1500 mL/min』;乙=(500−150)×12=『4200 mL/min』;丙=(1000−150)×6=『5100 mL/min』。故丙>乙>甲(B)。故B正確。重點:雖三人「每分鐘總通氣量」可能相近(甲6000、乙6000、丙6000),但因死腔固定,『「淺快」呼吸(甲)的「有效肺泡通氣」最差、「深慢」呼吸(丙)最佳』。故B正確。臨床:故鼓勵深慢呼吸以提高有效肺泡通氣。","options":{"A":"甲(淺快)肺泡通氣最差(非最高)。","B":"丙>乙>甲(深慢者肺泡通氣最佳)—正解。","C":"三人肺泡通氣不同。","D":"順序不符。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_110020-62":{"quick":"表面活性劑不足時,使肺充氣(克服表面張力)的作功顯著增加。","detail":{"background":"呼吸作功分『「彈性作功(使肺充氣、克服表面張力與彈性回縮)」』與『「阻力作功(使空氣經呼吸道流動)」』。C『表面活性劑不足→肺泡表面張力增大、肺難擴張→「使肺充氣的(彈性)作功顯著增加」』(正確)。比較錯誤:A氣喘(阻塞)增的是『氣道「阻力」作功』(非充氣作功);B肺纖維化(限制)增的是『「彈性(充氣)」作功』(非氣道流動作功);D氣管「舒張」會「降低」氣道阻力與流動作功(非增加)。故C正確。","options":{"A":"氣喘增加氣道阻力作功(非充氣作功)。","B":"肺纖維化增加彈性(充氣)作功(非流動作功)。","C":"surfactant不足使充氣作功顯著增加—正解。","D":"氣管舒張降低流動作功(非增加)。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_111020-63":{"quick":"肺氧氣擴散容積在肺水腫時減少、運動時增加。","detail":{"background":"肺擴散容積(DLCO,單位時間每單位壓差的氣體擴散量)受『擴散面積、屏障厚度、肺微血管血量』影響:『肺水腫→屏障增厚、肺泡積液→擴散容積「減少」』;『運動→心輸出增、肺微血管「徵召與擴張(更多開放微血管、面積增)」→擴散容積「增加」』。故C「肺水腫減少、運動增加」正確。故C正確。臨床:DLCO下降見於肺氣腫、間質性肺病、肺水腫;DLCO上升見於運動、左向右分流、肺出血。","options":{"A":"肺水腫應減少(非增加)。","B":"肺水腫應減少。","C":"肺水腫減少、運動增加—正解。","D":"運動應增加(非減少)。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_111020-64":{"quick":"過度換氣:肺泡PO₂上升、肺泡PCO₂下降、動脈CO₂總含量下降(123皆是)。","detail":{"background":"過度換氣(hyperventilation,通氣超過代謝需求):『加速排出CO₂、攝入更多O₂』→『「肺泡PO₂上升(1)」、「肺泡PCO₂下降(2)」、動脈血「CO₂總含量顯著下降(3)」』→呼吸性鹼血症。故123皆會發生(D)。故D正確。臨床:過度換氣致低碳酸血症→腦血管收縮(頭暈)、鹼中毒(手足麻、搐搦因游離鈣下降)。","options":{"A":"12不完整(3亦發生)。","B":"23不完整(1亦發生)。","C":"13不完整(2亦發生)。","D":"123皆發生—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_111100-61":{"quick":"在FRC開始吸氣,氣體優先進入肺底(肺底順應性較佳)。","detail":{"background":"從『功能性肺餘容量(FRC)』開始吸氣時:因重力使肺底肋膜內壓較不負(肺底肺泡較「未脹」、位於順應性曲線陡峭段),『肺底肺泡順應性較佳、優先且較多地充氣→氣體優先分布到「肺底」』。故A正確。(相對地肺尖肺泡在FRC時已較脹、順應性較差、充氣少。)故A正確。臨床:此即正常肺底通氣較佳;但在低肺容量(殘餘容積附近)起吸時,肺底氣道可能先閉合而反由肺尖先充氣(閉合容積概念)。","options":{"A":"氣體優先進入肺底—正解。","B":"非肺中段為主。","C":"肺尖在FRC已較脹、充氣較少。","D":"非平均分布。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_111100-62":{"quick":"肺泡微血管(肺部)紅血球內HCO₃⁻較高(逆氯轉移、CO₂卸載使pH略升)。","detail":{"background":"氯轉移(chloride shift)與何登效應:在『組織微血管』CO₂進入紅血球→碳酸酐酶生成HCO₃⁻,HCO₃⁻外移入血漿、Cl⁻內移(氯轉移),紅血球內pH略降;到『肺泡微血管』則『「逆向」:血漿HCO₃⁻進入紅血球轉回CO₂呼出、Cl⁻外移』。題以B「肺泡微血管紅血球內[HCO₃⁻]較高」為答案(肺部紅血球接收血漿HCO₃⁻以轉成CO₂)。比較:D「組織微血管紅血球pH較高」錯(組織側CO₂多、pH較低)。故B正確(依官方答案,反映肺部逆氯轉移)。記憶:組織=CO₂入、Cl入、pH降;肺=CO₂出、Cl出。","options":{"A":"紅血球膜電位非此題重點。","B":"肺泡微血管紅血球內HCO₃⁻較高—正解(逆氯轉移)。","C":"組織側紅血球Cl⁻較高(非較低)。","D":"組織側紅血球pH較低(非較高)。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_112020-62":{"quick":"長吸氣(apneusis):破壞呼吸調節區(pneumotaxic, 1)+切斷迷走神經(4)。","detail":{"background":"呼吸節律的腦幹控制:『呼吸調節區(pneumotaxic center,橋腦上部)』與『迷走神經傳入(肺牽張受器)』共同「限制吸氣、促使吸氣轉呼氣」。若『「破壞呼吸調節區(1)」「並切斷迷走神經(4)」→失去終止吸氣的兩大煞車→「長吸氣(apneusis,持續吸氣痙攣)」』。故14(D)正確。(長吸中樞apneustic center在橋腦下部驅動吸氣。)故D正確。","options":{"A":"僅破壞呼吸調節區、迷走完整仍可終止吸氣。","B":"23不符。","C":"34不符。","D":"破壞呼吸調節區+切迷走(14)致長吸氣—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_112020-63":{"quick":"低氧時頸動脈體的O₂敏感性鉀通道受抑制→去極化(興奮)。","detail":{"background":"頸動脈體(carotid body)球細胞(glomus cell)的低氧感測:『PaO₂顯著下降→「O₂敏感性鉀離子通道「受抑制(關閉)」」→K⁺外流減少→細胞膜「去極化」→電壓閘控鈣通道開啟、鈣內流→釋放神經傳導物質→經舌咽神經傳入延腦呼吸中樞→刺激通氣增加』。故A正確。比較:鉀通道「活化(開)」會過極化(抑制),與低氧反應相反。故A正確。臨床:頸動脈體是低氧時驅動通氣的主要感測器。","options":{"A":"低氧使O₂敏感鉀通道受抑制、去極化—正解。","B":"鉀通道活化會過極化(非去極化)。","C":"受抑制應去極化(非過極化)。","D":"活化過極化與低氧反應相反。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_113020-62":{"quick":"氧分壓:吸入氣(1) > 呼出氣(3) > 肺泡氣(2)。","detail":{"background":"海平面各處PO₂:『吸入濕化空氣(在鼻腔,PO₂≈150,1最高)』;『肺泡氣(PO₂≈104,2)』;『呼出氣(在鼻腔,是死腔的高氧空氣與肺泡氣的混合,PO₂≈120,3)』。故大小為『吸入氣(150) > 呼出氣(120) > 肺泡氣(104)』=『1 > 3 > 2』(B)。故B正確。重點:呼出氣含未交換的死腔高氧空氣,故PO₂介於吸入氣與肺泡氣之間、「高於」純肺泡氣。","options":{"A":"1>2>3不符(呼出氣高於肺泡氣)。","B":"1>3>2(吸入>呼出>肺泡)—正解。","C":"1≠2(吸入高於肺泡)。","D":"2≠3。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_113020-63":{"quick":"碳酸酐酶抑制劑不過血腦障壁→中樞化學感受器活性不變(兩組相同)。","detail":{"background":"某藥抑制碳酸酐酶但『不能穿透血腦障壁』:故只影響周邊(如腎、周邊化學受器、紅血球),『「不影響中樞化學感受器」』(它在血腦障壁內,且其感測靠CO₂擴散入腦脊髓液後的H⁺)。故D「兩組中樞化學感受器活性相同」正確。比較:A肺泡通氣未必相同(周邊受影響可能變);B/C周邊(主動脈體、舌咽神經/頸動脈體)活性會因周邊碳酸酐酶抑制而改變(不一定如選項所述)。故D為正解(中樞不受不過BBB的藥影響)。臨床:acetazolamide(碳酸酐酶抑制劑)主要作用在腎(利尿、用於高山症、青光眼)。","options":{"A":"肺泡通氣未必相同。","B":"主動脈體活性敘述不確定。","C":"舌咽神經放電敘述不確定。","D":"中樞化學感受器活性相同(藥不過BBB)—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_113090-61":{"quick":"吸氣延長肺動脈瓣關閉(P2延後)→造成「第二心音」生理性分裂。","detail":{"background":"第二心音(S2)由『主動脈瓣(A2)與肺動脈瓣(P2)關閉』組成。『吸氣時胸內負壓增→靜脈回右心增多→右心室射血時間延長→「肺動脈瓣(P2)關閉延後」→A2與P2分開→「S2「生理性分裂」」(吸氣分裂、呼氣合一)』。故造成第二心音分裂(B)。故B正確。臨床:S2固定分裂見於心房中隔缺損;反常分裂見於主動脈瓣狹窄/左束支阻滯。","options":{"A":"第一心音由房室瓣關閉(非此機制)。","B":"吸氣致第二心音分裂—正解。","C":"第三心音為舒張早期充填。","D":"第四心音為心房收縮。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_113090-62":{"quick":"肺泡內壓在「呼氣階段中途」最為正值(高於大氣壓)。","detail":{"background":"呼吸循環中肺泡內壓(Palv,相對大氣壓)變化:『吸氣時Palv「負」(低於大氣壓,使空氣流入)』、吸氣末回到0;『呼氣時Palv「正」(高於大氣壓,使空氣流出)』、呼氣末回0。故『Palv最「正(高)」的時刻在「呼氣階段中途」』(D)、最「負」在吸氣中途。故D正確(問最高正壓時刻)。記憶:吸氣Palv負、呼氣Palv正;肋膜內壓全程為負。","options":{"A":"吸氣開始Palv轉負。","B":"吸氣中途Palv最負。","C":"吸氣末Palv≈0。","D":"呼氣中途Palv最正—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_113090-63":{"quick":"肺氣腫:呼吸道阻力增加(1)、生理無效腔增加(3)。","detail":{"background":"肺氣腫(阻塞型)特徵:『「呼吸道阻力增加(1)」(小氣道塌陷)』、『肺順應性「增加」(非減少,故2錯)』、『「生理無效腔增加(3)」(肺泡破壞、通氣灌流失衡使無效通氣增)』、『體動脈血氧飽和度「下降」(非不變,故4錯)』。故符合者為1與3(B,僅13)。故B正確。記憶:肺氣腫=阻力↑、順應性↑(非↓)、無效腔↑、SaO₂↓。","options":{"A":"1234含錯誤項(順應性增非減、SaO₂降非不變)。","B":"僅13(阻力增+無效腔增)—正解。","C":"23含順應性減少(錯)。","D":"14含SaO₂不變(錯)。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_113090-66":{"quick":"腎臟排除銨離子(NH₄⁺)是「排出H⁺、得到鹼」,非身體獲得H⁺的來源。","detail":{"background":"身體『獲得H⁺(酸)』的來源/狀況:A『腹瀉流失碳酸氫鹽(HCO₃⁻)→相對酸增(代謝性酸中毒)』;B『換氣不足(hypoventilation)→CO₂滯留→碳酸增(呼吸性酸中毒)』;D『蛋白質等代謝產生「非揮發性酸(硫酸、磷酸)」』—皆使身體得到H⁺。而C『腎臟排除NH₄⁺(銨)是「把H⁺排出體外、同時再生HCO₃⁻」的「排酸/得鹼」機制』→『不是身體「得到」H⁺的來源』。故C為正解(不是得H⁺來源)。腎臟以NH₄⁺與可滴定酸排H⁺、重吸收/再生HCO₃⁻維持酸鹼平衡。","options":{"A":"腹瀉失HCO₃⁻使酸增,屬得H⁺。","B":"換氣不足CO₂滯留,屬得H⁺。","C":"腎排NH₄⁺是排H⁺得鹼、非得H⁺來源—正解。","D":"代謝產非揮發酸,屬得H⁺。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_114020-62":{"quick":"鄰近肺小動脈被阻塞→該區CO₂下降→局部支氣管收縮(調節通氣配合灌流)。","detail":{"background":"肺的『通氣-灌流匹配』局部調節:A『某區肺小動脈「被阻塞(無灌流)」→該區肺泡無CO₂帶入、「肺泡CO₂分壓下降」→「局部支氣管「收縮」」』以減少對該無灌流區的無效通氣(把氣導向有灌流區)。故A最可能致支氣管收縮。比較:B肺泡CO₂「上升」會使支氣管『舒張』(非收縮);C吸氣使氣道擴張;D β2受體活化使支氣管『舒張』。故A正確。記憶:低CO₂→支氣管收縮;低O₂→肺血管收縮(兩種局部匹配機制)。","options":{"A":"肺小動脈阻塞→局部CO₂降→支氣管收縮—正解。","B":"肺泡CO₂上升使支氣管舒張(非收縮)。","C":"吸氣使氣道擴張。","D":"β2受體活化使支氣管舒張。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_114020-63":{"quick":"分泌表面張力素是「呼吸區(肺泡)」功能,非肺傳導區特性,故最不適當。","detail":{"background":"肺『傳導區(鼻至末端細支氣管,不交換氣體)』特性:A『分泌黏液(黏液纖毛清除)』、B『構成解剖無效腔』、D『以平滑肌調控呼吸道阻力』—皆正確。C『「分泌表面張力素」是「呼吸區的第II型肺泡細胞」功能(肺泡)』,『非傳導區特性』。故C「分泌表面張力素」為最不適當,為正解。記憶:傳導區=黏液/纖毛/平滑肌/死腔;呼吸區=肺泡/surfactant/氣體交換。","options":{"A":"傳導區分泌黏液,正確。","B":"傳導區構成解剖無效腔,正確。","C":"分泌surfactant為肺泡(呼吸區)功能、非傳導區—最不適當,為正解。","D":"傳導區調控氣道阻力,正確。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_114090-63":{"quick":"吸入「5%氧氣+5%CO₂」最可能造成低血氧加上高碳酸(刺激通氣最強且最危險)。","detail":{"background":"混合氣體成分對血氣的影響:吸入氧分壓決定氧合(21%≈正常、5%為嚴重低氧);吸入CO₂則使PaCO₂上升。『D「5%O₂+5%CO₂」』同時造成『「嚴重低氧 + 高碳酸」』—低氧與高CO₂皆強烈刺激通氣(且最危及氧合)。故依題意(造成最強通氣刺激/最缺氧)選D。比較:A(21%O₂)氧正常、C(21%O₂+5%CO₂)僅高碳酸、B(5%O₂)僅低氧。故D(低氧+高碳酸)效應最強。故D正確。","options":{"A":"21%O₂+微量CO₂≈正常空氣。","B":"5%O₂為低氧、但CO₂正常。","C":"21%O₂正常氧、僅高碳酸。","D":"5%O₂+5%CO₂(低氧+高碳酸)效應最強—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_115020-56":{"quick":"成熟紅血球「無粒線體」(靠無氧糖解產能),故「有許多粒線體」最不適當。","detail":{"background":"成熟紅血球特性:『「無細胞核(D正確)」、「「無粒線體」與其他胞器」→靠「無氧糖解」產ATP(避免自身耗氧、保留氧供運送)』;『雙凹圓盤狀使「表面積/體積比高」利氣體擴散(B正確)』;『攜帶O₂(血紅素)與CO₂(碳酸氫根/carbamino)(C正確)』。故A「有許多粒線體」『最不適當』(成熟紅血球無粒線體)。故A為正解。臨床:紅血球缺粒線體故不能行氧化磷酸化、依賴糖解(G6PD缺乏致溶血即與此代謝有關)。","options":{"A":"稱有許多粒線體—最不適當(成熟紅血球無粒線體),為正解。","B":"高表面積/體積比利擴散,正確。","C":"攜帶O₂與CO₂,正確。","D":"成熟紅血球無細胞核,正確。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_115020-61":{"quick":"內肋間肌參與「用力呼氣」(主動呼氣)。","detail":{"background":"呼吸肌:平靜吸氣靠『橫膈與外肋間肌(收縮提肋擴胸)』;平靜呼氣為『被動(肺彈性回縮)』;『用力吸氣』再加輔助肌(胸鎖乳突、斜角肌);『「用力呼氣」靠「內肋間肌(降肋縮胸)」與腹肌(增腹壓推橫膈上移)』。故內肋間肌參與『用力呼氣(D)』。故D正確。記憶:外肋間肌=吸氣;內肋間肌=用力呼氣;平靜呼氣被動。","options":{"A":"平靜吸氣靠橫膈與外肋間肌。","B":"平靜呼氣為被動。","C":"用力吸氣靠外肋間+輔助肌。","D":"內肋間肌參與用力呼氣—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_115020-62":{"quick":"某區肺小動脈阻塞(無灌流)→該區肺泡CO₂下降(無血流帶來CO₂)。","detail":{"background":"肺局部通氣-灌流調節:『某區「肺小動脈阻塞(灌流中斷)」→無血流把組織CO₂帶到該區肺泡→「該區肺泡內CO₂分壓「下降」(趨近吸入氣)、O₂分壓上升」』;隨後低CO₂使該區『支氣管收縮』以減少無效通氣。故D(該區肺泡CO₂下降)為答案。故D正確。記憶:無灌流區→肺泡氣趨近吸入空氣(低CO₂高O₂);無通氣區→肺泡氣趨近靜脈血(高CO₂低O₂)。","options":{"A":"肺泡CO₂應下降(非其他描述)。","B":"非上升。","C":"非不變。","D":"該區肺泡CO₂下降(灌流中斷)—正解。"},"sources":["Guyton & Hall《生理學》","West《Respiratory Physiology》","Costanzo《Physiology》"]}},"med1_106100-65":{"quick":"低蛋白飲食使尿素生成減少→髓質尿素梯度減弱→「降低」尿濃縮能力,故此敘述錯誤。","detail":{"background":"尿液濃縮依賴髓質滲透梯度,而『尿素』是重要溶質:A尿素在髓質間質濃度影響垂直滲透梯度(正確);B『ADH促進集尿管「尿素轉運蛋白(UT-A1/A3)」對尿素的再吸收』、增髓質尿素濃度(B、C正確)。『低蛋白飲食→尿素生成「減少」→髓質尿素梯度減弱→尿濃縮能力「下降」(非增加)』。故D「低蛋白飲食增加尿濃縮能力」錯誤,為正解。臨床:蛋白質代謝產尿素;尿素循環(內髓集尿管→上升細枝)強化髓質高滲。","options":{"A":"尿素影響髓質滲透梯度,正確。","B":"ADH促進尿素轉運蛋白再吸收,正確。","C":"UT-A1/A3促進尿濃縮,正確。","D":"稱低蛋白飲食增加尿濃縮—錯誤(應降低),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_106100-66":{"quick":"葡萄糖再吸收僅發生於「近端小管」(非遠端),故此敘述錯誤。","detail":{"background":"腎小管葡萄糖再吸收:『「幾乎全部在「近端小管」」由頂膜的鈉-葡萄糖共轉運(SGLT,「次級主動運輸」,靠Na梯度)再吸收、基底側由GLUT送回血』—遠端小管「不」再吸收葡萄糖。故A「發生於近端與遠端小管」錯誤,為正解。B(次級主動,正確);C/D『當濾過量超過「葡萄糖運輸最大值(Tm)」(血糖約>180–200 mg/dL的腎閾)即出現糖尿』(C說>300仍合理範圍、D Tm概念正確)。故A為正解。臨床:糖尿病高血糖超過腎閾→糖尿、滲透性利尿。","options":{"A":"稱近端與遠端皆再吸收葡萄糖—錯誤(僅近端),為正解。","B":"屬次級主動運輸,正確。","C":"血糖過高(超腎閾)可現糖尿,正確。","D":"超過Tm即出現糖尿,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_107100-66":{"quick":"基底外側膜不用Na-K-2Cl共轉運(那是亨利氏上升粗枝頂膜),故此敘述錯誤。","detail":{"background":"近端小管鈉再吸收:A『「頂膜」以「Na-葡萄糖、Na-磷酸、Na-胺基酸」等共轉運(及Na-H逆向)吸Na』(正確);C少量Na經緊密接合『細胞旁路被動』移動(正確);D近端小管再吸收約『65%(題稱60%約略)』的濾過Na(可接受)。B「基底外側膜利用「Na-K-2Cl共轉運」運送」『錯誤』—Na-K-2Cl共轉運子(NKCC2)在『亨利氏環上升粗枝的「頂膜」』(非近端基底側);近端小管基底側靠『Na-K-ATPase』把Na打回血。故B為正解。","options":{"A":"頂膜Na與葡萄糖/磷共轉運,正確。","B":"稱基底側用Na-K-2Cl—錯誤(NKCC2在上升粗枝頂膜),為正解。","C":"少量Na經細胞旁被動移動,正確。","D":"近端小管再吸收約60–65%Na,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_108030-65":{"quick":"水通道蛋白2(AQP2)轉位至集尿管頂膜受血管加壓素(ADH)調控。","detail":{"background":"水通道蛋白(aquaporin, AQP):『AQP2位於「集尿管主細胞」,其「轉位插入頂膜」受「血管加壓素(ADH/vasopressin)」經V2受體-cAMP調控』→ADH↑使AQP2上膜→水被動再吸收、尿濃縮。故A正確。比較錯誤:B AQP2在集尿管(非亨利氏下降枝;下降枝是AQP1);C水分子是順滲透梯度由『低張→高張(往高滲處)』移動(非高張向低張);D水是『被動(滲透)』移動(非主動運輸)。故A正確。臨床:ADH缺乏/V2受體缺陷→尿崩症(大量稀尿);SIADH則ADH過多致水滯留低血鈉。","options":{"A":"AQP2轉位上膜受ADH調控—正解。","B":"下降枝為AQP1(AQP2在集尿管)。","C":"水順滲透往高滲(高張)移動。","D":"水為被動滲透(非主動運輸)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_108030-66":{"quick":"丁酸根(C₃H₇COO⁻,有機酸陰離子)最不常作為腎小管管腔H⁺緩衝物。","detail":{"background":"腎小管管腔內中和分泌H⁺的『緩衝物質』:『HCO₃⁻(再吸收緩衝)』、『HPO₄²⁻(磷酸鹽，形成「可滴定酸」)』、『NH₃(與H⁺成NH₄⁺排出)』—皆為主要尿緩衝。而『丁酸根(C₃H₇COO⁻)等有機酸陰離子並非腎小管常用的尿緩衝系統』。故D最不常作為緩衝,為正解。記憶:腎排酸三緩衝=HCO₃⁻、磷酸鹽(可滴定酸)、氨(NH₃/NH₄⁺)。故D正確。","options":{"A":"HCO₃⁻為主要緩衝。","B":"HPO₄²⁻形成可滴定酸緩衝。","C":"NH₃結合H⁺成NH₄⁺排出。","D":"丁酸根最不常作尿緩衝—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_108030-67":{"quick":"近端小管頂膜以「第二型鈉依賴性葡萄糖轉運蛋白(SGLT2)」再吸收葡萄糖。","detail":{"background":"葡萄糖再吸收的轉運蛋白配置:『「近端小管「頂膜」」以「鈉依賴性SGLT(主要SGLT2於S1段、SGLT1於S3段)」次級主動吸葡萄糖(靠Na梯度)』;『「基底外側膜」以「GLUT(GLUT2)」促進擴散把葡萄糖送回血』。遠端小管不吸葡萄糖。故C「近端頂膜用SGLT2」正確;A/B(遠端用GLUT1/SGLT1—錯,遠端不吸糖)、D(基底側用GLUT1—近端基底側主要GLUT2)。故C正確。臨床:SGLT2抑制劑(gliflozin)阻斷近端糖再吸收→降血糖、利尿、心腎保護。","options":{"A":"遠端小管不再吸收葡萄糖(無SGLT/GLUT於此)。","B":"遠端小管不吸糖。","C":"近端頂膜用SGLT2(鈉依賴)—正解。","D":"近端基底側主要GLUT2(非GLUT1為主)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_108100-65":{"quick":"上升粗枝是把Na、Cl「再吸收(自管腔回血)」非「分泌至管腔」,故此敘述錯誤。","detail":{"background":"逆流機制:A目的是建立並維持髓質垂直滲透梯度(正確);B能量來自上升粗枝的Na-K-ATPase(正確);D直血管(vasa recta)以逆流交換維持梯度(正確)。C「亨氏管上升粗枝用Na-Cl共轉運把Na、Cl「分泌至管腔」」『錯誤』—上升粗枝以『Na-K-2Cl共轉運子(NKCC2)把Na、K、Cl「自管腔「再吸收」回間質」』(使間質高滲、管腔液變稀),非分泌入管腔;且該段不通透水。故C為正解。記憶:上升粗枝=「稀釋節段」,主動再吸收NaCl、不透水。","options":{"A":"逆流機制維持髓質滲透梯度,正確。","B":"能量來自上升粗枝Na-K-ATPase,正確。","C":"稱上升粗枝把Na/Cl分泌至管腔—錯誤(應為再吸收回間質),為正解。","D":"直血管逆流交換維持梯度,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_108100-66":{"quick":"上升「細枝」靠被動NaCl移動,非上皮鈉通道(ENaC),故此敘述錯誤。","detail":{"background":"各段Na再吸收的轉運子:A近端小管以Na-葡萄糖等共轉運(正確);B亨利氏環『上升「粗」枝』用Na-K-2Cl共轉運(正確);D遠曲小管用Na-Cl共轉運(NCC,thiazide作用點)(正確)。C「亨利氏環上升「細」枝用「上皮鈉通道(ENaC)」」『錯誤』—上升細枝對Na主要『被動再吸收(無主動轉運子)』;『ENaC在「集尿管主細胞」(受醛固酮調控、amiloride阻斷)』(非上升細枝)。故C為正解。記憶:ENaC在集尿管;上升細枝被動;上升粗枝NKCC2;遠曲NCC。","options":{"A":"近端用Na-葡萄糖共轉運,正確。","B":"上升粗枝用Na-K-2Cl,正確。","C":"稱上升細枝用ENaC—錯誤(ENaC在集尿管;細枝為被動),為正解。","D":"遠曲小管用Na-Cl共轉運,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_109020-66":{"quick":"GFR=(尿菊糖濃度×尿流量)/血漿菊糖濃度;依數據算得約126 mL/min。","detail":{"background":"菊糖(inulin)只被『自由濾過、不分泌不再吸收』,故其清除率=GFR。公式『GFR =(尿中菊糖濃度 U × 尿流量 V)/ 血漿菊糖濃度 P』。代入題給數值(U=35 mg/mL、相應V與P)計算得『約126 mL/min』(正常GFR約125)。故B正確。菊糖清除率是測GFR的金標準(臨床多以肌酸酐清除率估算)。故B正確。","options":{"A":"9.7數量級不符。","B":"約126 mL/min(≈正常GFR)—正解。","C":"0.09不合理。","D":"148與計算不符。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_109020-67":{"quick":"全身動靜脈氧差「最大」者並非腎臟(而是「心臟」),故此敘述錯誤。","detail":{"background":"腎臟血流與氧:A『單位重量腎血流以「皮質最大」』(皮質含腎絲球、血流豐富)(正確);C『髓質PO₂比皮質低』(血流少、且逆流使氧分流)(正確);D『髓質腎小管(上升粗枝)主動吸鈉耗氧大』(正確)。B「全身各器官「動靜脈氧差以腎臟最高」」『錯誤』—腎臟血流量巨大(約佔心輸出20–25%)但耗氧相對不那麼高,故其『動靜脈氧差「小」』;『動靜脈氧差「最大」的是「心臟(冠狀循環)」』(攝氧率高達70–80%)。故B為正解。記憶:心肌a-v氧差最大、腎臟血流多但a-v氧差小。","options":{"A":"單位重量腎血流以皮質最大,正確。","B":"稱全身a-v氧差以腎臟最高—錯誤(心臟最高),為正解。","C":"髓質PO₂比皮質低,正確。","D":"髓質吸鈉耗氧大,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_109100-65":{"quick":"亨利氏彎管「細下降枝」對水通透性最大(富含AQP1)。","detail":{"background":"亨利氏環各段水通透性:『「細下降枝(thin descending limb)」對水「高度通透」(富AQP1)、對溶質低通透→水被髓質高滲吸出、管液濃縮』;『「上升枝(細、粗)」對水「不通透」、主動/被動再吸收NaCl→管液變稀(稀釋節段)』;集尿管的水通透性受ADH調控(無ADH時低)。故水通透性最大者為『細下降枝(A)』。故A正確。此即逆流倍增中下降枝濃縮、上升枝稀釋的基礎。","options":{"A":"細下降枝對水通透性最大(AQP1)—正解。","B":"細上升枝對水不通透。","C":"粗上升枝對水不通透。","D":"集尿管水通透受ADH調控(基礎低)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_109100-66":{"quick":"高鉀攝取→血漿醛固酮濃度上升(促進腎排鉀)。","detail":{"background":"鉀攝取倍增(65→130 mmol/day)的恆定反應:『血鉀略升直接刺激腎上腺『「醛固酮(aldosterone)分泌增加」』→作用於集尿管主細胞增加ENaC與鉀通道→「促進排鉀」』使血鉀維持穩定。故C「血漿醛固酮上升」正確。比較錯誤:A血鉀因排鉀代償只『小幅』上升(非>1 mmol/L大幅);B鈉排出非主要改變;D鉀分泌主要在『遠端/集尿管(非近端)』。故C正確。臨床:醛固酮是鉀平衡的關鍵;醛固酮過多→低血鉀,不足(Addison)→高血鉀。","options":{"A":"血鉀因代償僅小幅上升(非>1mmol/L)。","B":"鈉排出非主要改變。","C":"血漿醛固酮上升促排鉀—正解。","D":"鉀分泌在遠端/集尿管(非近端)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_110020-66":{"quick":"PAH清除率測腎血漿流量,再除以(1−Hct)得腎血流量,依數據約1400 mL/min。","detail":{"background":"對胺基馬尿酸(PAH)在低濃度時被腎『幾乎完全清除(濾過+分泌)』→其清除率≈『有效腎血漿流量(RPF)』。『腎血流量(RBF)= RPF /(1 − 血比容Hct)』。依題給數值計算RBF約『1400 mL/min』(正常RBF約1000–1200 mL/min、佔心輸出約20–25%)。故B正確。記憶:PAH清除率→RPF;再用(1−Hct)換算RBF;菊糖清除率→GFR。","options":{"A":"1134與計算不符。","B":"約1400 mL/min—正解。","C":"2268過高。","D":"2682過高。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_110020-67":{"quick":"管腔流速增加→緻密斑感測NaCl增→釋腺苷使入球小動脈收縮→GFR下降(負回饋)。","detail":{"background":"腎小管-腎絲球回饋(tubuloglomerular feedback, TGF):『緻密斑(macula densa)「感測遠端小管液的NaCl濃度(非僅水分)」』。當『管腔流速/NaCl增加→緻密斑釋放「腺苷(adenosine)」作用於入球小動脈受器→鈣釋放使「入球小動脈收縮」→GFR「下降」(負回饋,穩定GFR與遠端鈉負荷)』。故B正確。比較錯誤:A緻密斑感測「NaCl」(非無關鈉);C流速增時腎素分泌『減少』(非增);D最終GFR『下降』(非上升)。故B正確。","options":{"A":"緻密斑感測NaCl(非無關鈉)。","B":"釋腺苷使入球小動脈收縮(降GFR)—正解。","C":"流速增時腎素分泌減少(非增)。","D":"最終GFR下降(非上升)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_111020-67":{"quick":"醛固酮降低→遠端腎小管鉀分泌減少。","detail":{"background":"遠端小管/集尿管的鉀分泌受『醛固酮』主導:醛固酮作用於主細胞增加ENaC(增Na再吸收使管腔負電)與鉀通道→『促進排鉀』。故『「醛固酮降低」→鉀分泌「減少」』(C)。比較錯誤:A血漿總量減少→醛固酮升、且其他因素複雜,非直接減鉀分泌;B管腔Na增加→促進鉀分泌(增);D飲食鉀增加→促進鉀分泌(增)。故C正確。臨床:醛固酮不足(Addison、保鉀利尿劑)→高血鉀;醛固酮過多→低血鉀。","options":{"A":"血漿量減少傾向升醛固酮(非減鉀分泌)。","B":"管腔Na增加促進鉀分泌(增)。","C":"醛固酮降低→鉀分泌減少—正解。","D":"飲食鉀增加促進鉀分泌(增)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_111020-68":{"quick":"GFR=(尿菊糖×尿流量)/血漿菊糖,依數據算得約84 mL/min。","detail":{"background":"GFR=菊糖清除率=『(尿菊糖濃度 U × 尿流量 V)/ 血漿菊糖濃度 P』。代入P=0.25 mg/mL、V=0.6 mL/min、與題給尿菊糖濃度,計算得『約84 mL/min』。故A正確。(此值略低於正常125,可能代表腎功能輕度下降或題設數值。)菊糖清除率為GFR金標準。故A正確。","options":{"A":"約84 mL/min—正解。","B":"106與計算不符。","C":"116不符。","D":"126不符。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_111020-72":{"quick":"靜脈注射高張食鹽水會「增加」ADH分泌(非減少),故此敘述最不適當。","detail":{"background":"口渴與ADH調控:A口渴與『血漿滲透壓上升、細胞外液容積下降』有關(正確);C『細胞外液容積下降→腎素↑→血管張力素II↑→刺激口渴與ADH』(正確);D容積與滲透壓變化可不一致(正確)。B「注射高張食鹽水會使ADH「減少」並造成口渴」『錯誤』—高張食鹽水使『血漿滲透壓「上升」→刺激滲透壓感受器→「ADH「增加」(抗利尿、保水)」並引起口渴』(ADH應增非減)。故B為正解。記憶:高滲→ADH↑+口渴↑;低滲→ADH↓。","options":{"A":"口渴與滲透壓及容積變化有關,正確。","B":"稱高張鹽水使ADH減少—錯誤(應增加),為正解。","C":"容積下降→AngII↑刺激口渴,正確。","D":"容積與滲透壓變化不一定一致,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_111100-65":{"quick":"近端小管「再吸收HCO₃⁻」、遠端小管「分泌H⁺」。","detail":{"background":"腎臟酸鹼調節:『近端小管「再吸收約80–90%的濾過HCO₃⁻」(經Na-H逆向分泌H⁺、碳酸酐酶,把HCO₃⁻回收)』;『遠端小管與集尿管(間質細胞)「主動分泌H⁺」(經H⁺-ATPase、H⁺-K⁺-ATPase),並再生HCO₃⁻、排出可滴定酸與NH₄⁺』。故A「近端再吸收HCO₃⁻、遠端分泌H⁺」正確。故A正確。臨床:近端缺陷=第二型RTA(HCO₃⁻流失);遠端缺陷=第一型RTA(無法排H⁺)。","options":{"A":"近端再吸收HCO₃⁻、遠端分泌H⁺—正解。","B":"方向描述不正確。","C":"分泌H⁺亦重要(非僅再吸收)。","D":"近端主要再吸收HCO₃⁻(非僅分泌H⁺)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_111100-66":{"quick":"ADH增加→水再吸收增→尿濃縮→自由水清除率下降(可為負值)。","detail":{"background":"自由水清除率(C_H₂O)= 尿流量 V − 滲透清除率 C_osm,反映腎排出『純水(無溶質的水)』的能力:『正值=排稀尿(失自由水)、負值=濃縮尿(保留自由水)』。『「ADH增加」→集尿管水再吸收增→尿濃縮→自由水清除率「下降(趨負)」』。故C正確。比較:A大量飲純水→ADH↓→排稀尿→C_H₂O『上升』;B GFR增不直接決定;D C_osm減少使C_H₂O『上升』。故C正確。臨床:SIADH(ADH過多)→C_H₂O負、低血鈉;尿崩症→C_H₂O高、多尿。","options":{"A":"大量飲水使C_H₂O上升(非下降)。","B":"GFR增不直接使C_H₂O下降。","C":"ADH增加使自由水清除率下降—正解。","D":"C_osm減少使C_H₂O上升。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_112020-66":{"quick":"鉀經遠端腎小管「特定鉀離子通道」排出是其分泌排出的最主要途徑。","detail":{"background":"遠端小管/集尿管主細胞的鉀分泌:鉀經『基底側Na-K-ATPase泵入細胞、再經「頂膜的特定鉀通道(ROMK等)」分泌入管腔排出』—『此鉀通道是鉀分泌排出的最主要途徑』。故D正確。其他因素(管腔負電、流速、醛固酮、鈉送達)會『調節』鉀分泌速率,但『排出的「直接途徑」是頂膜鉀通道』。故D正確(以「決定排出之最主要因素=經鉀通道」為答案)。臨床:ROMK/醛固酮異常影響鉀平衡;利尿劑增遠端鈉送達與流速→促排鉀(低血鉀)。","options":{"A":"ADH非決定鉀排出主因。","B":"管腔正電會「抑制」鉀分泌(非促進);影響因素非最直接途徑。","C":"近端流速非主因。","D":"經特定鉀通道排出—正解(最主要途徑)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_112020-67":{"quick":"短時間喝下大量純水→血液滲透壓降低、尿液滲透壓也降低(排稀尿)。","detail":{"background":"快速喝下2000 mL純水:『血液被稀釋→「血漿滲透壓「降低」」→抑制ADH分泌→集尿管水再吸收減少→「排出大量稀尿→「尿液滲透壓「降低」」』(水利尿)。故D「血液與尿液滲透壓皆降低」正確。此為低滲負荷的正常代償(經滲透感受器-ADH反射)。故D正確。臨床:過量飲水/ADH不當分泌異常→水中毒、低血鈉。","options":{"A":"血液滲透壓應降低(非增加)。","B":"尿液滲透壓應降低(排稀尿,非增加)。","C":"兩者皆降低(非皆增加)。","D":"血液與尿液滲透壓皆降低—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_113020-66":{"quick":"亨利氏環上升粗枝頂膜以Na⁺-K⁺-2Cl⁻共轉運子再吸收。","detail":{"background":"亨利氏環『上升粗枝』的頂膜(管腔膜)主要轉運子為『「Na⁺-K⁺-2Cl⁻共轉運子(NKCC2)」』—把Na、K、2Cl一起自管腔再吸收(動力來自基底側Na-K-ATPase維持的Na梯度),使間質高滲、管液變稀。故A正確。比較:Na-葡萄糖、Na-磷在近端;Na-Cl(NCC)在遠曲小管。故A正確。臨床:『環利尿劑(furosemide)抑制NKCC2』→強力利尿、並破壞髓質梯度;Bartter症候群為NKCC2等缺陷。","options":{"A":"上升粗枝頂膜用Na-K-2Cl共轉運—正解。","B":"Na-glucose在近端小管。","C":"Na-phosphate在近端小管。","D":"Na-Cl(NCC)在遠曲小管。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_113090-47":{"quick":"鉀離子是「細胞「內」液」主要陽離子,稱其為細胞外液主要陽離子錯誤。","detail":{"background":"體液電解質分布:『細胞「外」液主要陽離子=「鈉(Na⁺)」、主要陰離子=「氯(Cl⁻)」與HCO₃⁻』;『細胞「內」液主要陽離子=「鉀(K⁺)」、主要陰離子=磷酸與蛋白質』。此內外差異由『Na⁺/K⁺-ATPase』維持(C正確)。一位70 kg男性體液約42 L(體重60%):細胞內約28 L、細胞外約14 L(D正確)。故B「鉀為細胞外液主要陽離子」『錯誤』(鉀是細胞「內」液主陽離子;細胞外是鈉)。故B為正解。","options":{"A":"氯為細胞外液主要陰離子,正確。","B":"稱鉀為細胞外液主要陽離子—錯誤(鉀在細胞內、外液為鈉),為正解。","C":"Na/K-ATPase維持內外陽離子分布,正確。","D":"70kg男性細胞外液約14L,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_113090-67":{"quick":"濾過分率(FF)=GFR/RPF;由RBF與Hct求RPF後計算,約20%。","detail":{"background":"此題給腎血流量(RBF=1250)與血比容(Hct),求『濾過分率(filtration fraction, FF)= GFR / 腎血漿流量(RPF)』。先由RBF×(1−Hct)得RPF,再以GFR/RPF算FF,結果『約20%』(正常FF約0.16–0.20,即約20%的腎血漿被濾過成濾液)。故A正確。FF反映腎絲球過濾的效率;FF上升(如入球擴張/出球收縮、AngII)。故A正確。","options":{"A":"濾過分率約20%—正解。","B":"40%過高。","C":"60%不合理。","D":"80%不合理。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_114020-66":{"quick":"物質可被濾過,但整日排出量「少於」濾過量→必有再吸收(reabsorption)。","detail":{"background":"判斷腎小管處理:比較『排出量(尿濃度×尿量)』與『濾過量(GFR×血漿濃度)』。若『排出量「<」濾過量→該物質有「淨再吸收(reabsorption)」』(部分被腎小管回收);若排出>濾過→有「淨分泌(secretion)」。題給某物質可濾過、整日排出量算得『少於濾過量』→『淨再吸收』。故A正確。(filtration only指排出=濾過;anabolism非腎處理機制。)此即清除率<GFR代表再吸收、>GFR代表分泌的原理。","options":{"A":"排出<濾過→淨再吸收—正解。","B":"分泌會使排出>濾過。","C":"純濾過會使排出=濾過。","D":"合成代謝非腎小管處理機制。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_114020-67":{"quick":"皮質腎元「缺乏(或極短)亨利氏上升細小管」(髓質深入淺),與近髓質腎元相比此段不發達。","detail":{"background":"兩類腎元:『近髓質腎元(juxtamedullary)』有『長亨利氏環深入內髓、含明顯的「細上升枝/細下降枝」、伴直血管→主司「尿濃縮」』;『皮質腎元(cortical)』數量多但『亨利氏環短、僅淺入外髓、「亨利氏「上升細小管(thin ascending limb)」很短或幾乎沒有」』。故與近髓質腎元相比,皮質腎元『缺乏/不發達的是「亨利氏上升細小管」(C)』。故C正確。近曲、近直、遠曲小管兩類腎元皆有。故C正確。","options":{"A":"兩類腎元皆有近曲小管。","B":"皆有近直小管。","C":"皮質腎元缺乏/極短的亨利氏上升細小管—正解。","D":"皆有遠曲小管。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_114090-66":{"quick":"尿濃縮稀釋範圍可高達約1200、低至約50 mOsm/L。","detail":{"background":"腎滲透壓調節:D『正常尿液可濃縮至約「1200 mOsm/L」(脫水、ADH高)、稀釋至約「50 mOsm/L」(水負荷、ADH低)』—最適當。比較錯誤:A『血漿滲透壓「>」約280–290 mOsm/L(上升)』才刺激ADH(非<280);B『刺激口渴的閾值「高於」刺激ADH的閾值』(即ADH先反應、滲透壓更高才口渴,本選項說反);C ADH作用於『集尿管(與遠端)』使水再吸收(非近端;近端水再吸收為等滲、不受ADH)。故D正確。記憶:ADH閾值約280、口渴閾值較高(約290–295)。","options":{"A":"血漿滲透壓「上升(>280)」才刺激ADH(非<280)。","B":"口渴閾值高於ADH閾值(本選項說反)。","C":"ADH作用於集尿管(非近端)。","D":"尿濃縮約1200、稀釋約50 mOsm/L—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_114090-67":{"quick":"上升粗枝對水「不通透」靠Na-Cl(NKCC2)再吸收的是溶質、非水;稱其「對水通透」錯誤。","detail":{"background":"腎小管水再吸收:A『下降枝富AQP1對水高通透』(正確);C『上升粗枝基底側Na-K-ATPase供能』(正確);D『離開上升粗枝的管液呈「低張(稀釋)」』(因再吸收NaCl不帶水)(正確)。B「上升粗枝因有Na-Cl共轉運而「對水高通透」」『錯誤』—上升粗枝『「對水「不通透」」』,它用NKCC2再吸收『溶質(NaCl)而非水』(故為稀釋節段)。故B為正解。記憶:上升粗枝=不透水、主動吸鹽=稀釋管液、建立髓質梯度。","options":{"A":"下降枝AQP1對水高通透,正確。","B":"稱上升粗枝對水通透—錯誤(上升粗枝不透水、只吸鹽),為正解。","C":"上升粗枝基底側Na-K-ATPase供能,正確。","D":"離開上升粗枝管液呈低張,正確。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_115020-65":{"quick":"高蛋白飲食使GFR上升(入球小動脈擴張),故「入球小動脈收縮GFR下降」最不可能。","detail":{"background":"高蛋白飲食對腎的影響:增加胺基酸與尿素負荷→『近端小管再吸收Na與胺基酸增加→送到緻密斑的「NaCl濃度「降低」(B正確)」→經腎小管腎絲球回饋使「入球小動脈「擴張」、腎素分泌增加(A正確)、前列腺素增加(D正確)→「GFR「上升」(腎絲球高過濾)」』。故C「入球小動脈收縮、GFR下降」『最不可能』(實為入球擴張、GFR上升)。故C為正解。臨床:長期高蛋白的腎絲球高過濾被認為加速慢性腎病進展。","options":{"A":"高蛋白使腎素分泌增加,會發生。","B":"緻密斑NaCl濃度降低,會發生。","C":"稱入球小動脈收縮GFR下降—最不可能(實為入球擴張GFR上升),為正解。","D":"前列腺素分泌增加,會發生。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_115020-66":{"quick":"尿素再吸收是「促進擴散(經尿素轉運蛋白)」、非初級主動運輸,故此敘述最不適當。","detail":{"background":"氨/尿素排泄:A『肝把氨轉成尿素或麩醯胺酸,由腎排出』(正確);B『ADH(vasopressin)促進內髓集尿管尿素轉運蛋白→尿素「再吸收」入髓質→尿中尿素排出「下降」』(正確);C『代謝性酸中毒使腎『麩醯胺酸代謝增加→產NH₄⁺排酸增』』(正確)。D「尿素的再吸收是「初級主動運輸通道」表現上升促成」『最不適當』—尿素再吸收是經『「尿素轉運蛋白(UT-A)」的「促進擴散(被動,順濃度梯度)」』(受ADH調控其表現),『非「初級主動運輸」』。故D為正解。","options":{"A":"肝把氨轉尿素/麩醯胺酸由腎排,正確。","B":"ADH促尿素再吸收使尿中排出下降,正確。","C":"代謝性酸中毒增麩醯胺酸代謝產NH₄⁺,正確。","D":"稱尿素再吸收為初級主動運輸—最不適當(實為促進擴散),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Renal Physiology》"]}},"med1_106100-49":{"quick":"唾液腺分泌「交感與副交感興奮皆可促進」。","detail":{"background":"唾液腺(salivary gland)受『雙重自主支配且「兩者皆促進分泌」(此為少數交感副交感作用「不拮抗」的腺體)』:『副交感(主)→分泌「大量稀薄漿液」』;『交感→分泌「少量黏稠富酶/黏液」』。故交感或副交感興奮皆增加唾液分泌(A)。比較:腎上腺髓質(B)由交感節前支配、胃腺(C)/胰腺泡(D)分泌主要由副交感與激素促進(交感多抑制)。故A正確。臨床:緊張(交感)時口乾是因唾液變黏稠少量(主觀乾)。","options":{"A":"唾液腺交感副交感皆促進分泌—正解。","B":"腎上腺髓質由交感節前支配。","C":"胃腺分泌交感多抑制。","D":"胰腺泡分泌主要靠副交感/激素。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_106100-63":{"quick":"進入十二指腸的「高脂食物」抑制胃排空與蠕動最強(腸抑胃反射/CCK)。","detail":{"background":"胃排空受十二指腸回饋抑制(腸抑胃反射與激素):『十二指腸內出現「脂肪(尤其長鏈脂肪酸)」最強烈刺激「膽囊收縮素(CCK)」釋放→抑制胃蠕動與排空』(讓脂肪有充足時間消化);酸、高張、胺基酸亦抑制但以脂肪最強。故C正確。比較:A單純碳水化合物排空快;B胃壁擴張反而「促進」胃排空與蠕動;D胃泌素促進胃酸與運動(非主要抑制排空)。故C正確。臨床:高脂餐使胃排空延遲、易飽脹。","options":{"A":"碳水化合物胃排空較快。","B":"胃壁擴張促進排空(非抑制)。","C":"十二指腸高脂食物抑制排空最強(CCK)—正解。","D":"胃泌素促進胃運動。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_106100-64":{"quick":"消化道分泌的血清素約佔全身產量90%(腸嗜鉻細胞)。","detail":{"background":"血清素(serotonin, 5-HT):『全身約「90%由消化道的腸嗜鉻細胞(enterochromaffin cell)」產生』(調節腸蠕動與分泌)、約8%在血小板、僅約2%在中樞。故B正確。比較錯誤:A大腦與腸道用『相同』5-HT(只是受體亞型多);C由『色胺酸(tryptophan)』合成(非胱胺酸);D由腸嗜鉻細胞分泌(非胃壁細胞)。故B正確。臨床:類癌(carcinoid)分泌過量5-HT致潮紅腹瀉;5-HT3拮抗劑止吐、SSRI調中樞5-HT。","options":{"A":"大腦與腸道用相同5-HT(受體亞型多)。","B":"消化道分泌約佔全身90%—正解。","C":"由色胺酸合成(非胱胺酸)。","D":"由腸嗜鉻細胞分泌(非壁細胞)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_107100-63":{"quick":"結狀神經節(nodose ganglion)屬迷走神經的「外在」感覺節,非腸道內在神經系統。","detail":{"background":"消化道『內在(腸)神經系統(enteric nervous system)』包括:『肌間神經叢(myenteric/Auerbach plexus,管蠕動)、黏膜下神經叢(submucosal/Meissner plexus,管分泌血流)、及「卡氏間質細胞(ICC,節律起搏)」』。而『「結狀神經節(nodose ganglion)」是「迷走神經(CN X)的下感覺神經節」,屬「外在(中樞)神經系統」』(傳遞內臟感覺至腦幹),非腸道內在系統。故C不屬內在神經系統,為正解。故C正確。","options":{"A":"ICC屬腸內在系統(節律起搏)。","B":"肌間神經叢屬內在系統。","C":"結狀神經節為迷走神經外在感覺節—不屬內在系統,為正解。","D":"黏膜下神經叢屬內在系統。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_107100-64":{"quick":"膽固醇比例「過高」、膽鹽/卵磷脂相對不足時最易形成膽結石。","detail":{"background":"膽汁中『膽鹽與卵磷脂可乳化溶解膽固醇成微膠粒』。當『「膽固醇相對過高、而膽鹽與卵磷脂相對不足」→膽固醇過飽和析出結晶→膽固醇結石』。比較各選項膽固醇比例:A(10%)、B(5%)、C(10%)、『D膽固醇15%最高、且膽鹽60%卵磷脂25%相對溶解力較弱』→D最易結石。故D正確。臨床:肥胖、女性、雌激素、快速減重增膽固醇飽和度;膽汁鬱積、膽鹽流失(迴腸切除)亦促結石。","options":{"A":"膽固醇10%、溶解力足。","B":"膽固醇僅5%。","C":"膽固醇10%。","D":"膽固醇15%最高、最易結石—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-62":{"quick":"胃泌素(gastrin)最能刺激胃黏膜增生(營養性作用)。","detail":{"background":"胃泌素(gastrin,G細胞分泌):除促進胃酸分泌外,具『「營養性(trophic)」作用—「刺激胃黏膜(尤其泌酸腺區)的增生與生長」』,維持胃黏膜質量。故B正確。比較:CCK(膽囊收縮、胰酶)、motilin(MMC)、secretin(胰碳酸氫鹽、抑胃酸)無此營養性作用。故B正確。臨床:高胃泌素血症(如Zollinger-Ellison胃泌素瘤、長期PPI)→胃黏膜/腸嗜鉻樣細胞增生。","options":{"A":"CCK促膽囊收縮與胰酶(非黏膜增生)。","B":"胃泌素刺激胃黏膜增生—正解。","C":"motilin促MMC。","D":"secretin促胰碳酸氫鹽、抑胃酸。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-63":{"quick":"食道遲緩不能症(achalasia)源於食道肌間神經叢缺損。","detail":{"background":"食道遲緩不能症(achalasia):『食道下端「肌間神經叢(myenteric plexus)的抑制性神經元(分泌NO與VIP)退化缺損」→下食道括約肌「無法鬆弛」、食道蠕動消失→吞嚥困難、食物滯留』。故B正確。比較錯誤:A NO與VIP分泌「過多」會使括約肌過度鬆弛(與achalasia相反);C會厭功能缺陷致誤吸(非achalasia);D幽門狹窄在胃出口(非食道)。故B正確。臨床:鋇劑見「鳥嘴狀」狹窄、食道擴張;治療氣球擴張/肉毒桿菌/肌肉切開。","options":{"A":"NO/VIP過多會使括約肌過鬆(與achalasia相反)。","B":"食道肌間神經叢缺損→achalasia—正解。","C":"會厭缺陷致誤吸(非achalasia)。","D":"幽門狹窄在胃出口。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108030-64":{"quick":"不分泌唾液下,醣類、脂肪、蛋白質「皆仍可被消化」(123)。","detail":{"background":"唾液含唾液澱粉酶(消化少量澱粉)與舌脂酶,但其作用『非必要』:即使無唾液,『「醣類」可由胰澱粉酶+腸刷狀緣雙醣酶消化;「脂肪」可由胃脂酶與「胰脂酶(+膽鹽)」消化;「蛋白質」可由胃蛋白酶、胰蛋白酶/糜蛋白酶等消化』。故三者皆仍可被消化(123,D)。故D正確。唾液主要作用是潤滑、初步澱粉分解與口腔保護,缺乏不致營養消化不良。故D正確。","options":{"A":"12不完整(蛋白質亦可消化)。","B":"23不完整(醣類亦可消化)。","C":"13不完整(脂肪亦可消化)。","D":"醣/脂/蛋白皆可消化(123)—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108100-63":{"quick":"排便反射:內肛括約肌受副交感(乙醯膽鹼)刺激而「鬆弛」,參與排便。","detail":{"background":"排便反射:糞便使『直腸壓力感受器→經副交感(薦髓S2-4,釋乙醯膽鹼)→「使內肛門括約肌「鬆弛」、直腸收縮」』促進排便;外肛門括約肌(骨骼肌、陰部神經)則為隨意控制。題給D「內肛括約肌受副交感ACh刺激(致鬆弛)」參與排便—相對最切合排便反射的自主成分。故D正確。比較錯誤:A傳達至『肌間/脊髓』非黏膜下;B非腰椎交感腎上腺素刺激;C括約肌調控非「一起受NO刺激」如此描述。故D正確(以副交感ACh參與排便反射為答案)。","options":{"A":"壓力感受傳至脊髓/肌間(非黏膜下神經叢主導)。","B":"非腰椎交感腎上腺素刺激。","C":"內外括約肌調控不同(非一起受NO)。","D":"內肛括約肌受副交感ACh參與排便反射—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_108100-64":{"quick":"胰蛋白酶不參與「去氧核糖核酸酶(DNase)」的活化。","detail":{"background":"胰蛋白酶(trypsin,由腸激酶活化trypsinogen後)是『胰臟蛋白酶原與其他酶原的「共同活化者」』:活化『chymotrypsinogen→chymotrypsin、procarboxypeptidase→carboxypeptidase、proelastase→elastase、procolipase→colipase、prophospholipase』等。但『「去氧核糖核酸酶(DNase)」是「已活性」分泌、不需trypsin活化』。故D「DNase」不被trypsin活化,為正解。故D正確。臨床:腸激酶缺乏→蛋白消化不良;胰蛋白酶提早活化→急性胰臟炎(自我消化)。","options":{"A":"colipase由trypsin活化。","B":"carboxypeptidase B由trypsin活化。","C":"elastase由trypsin活化。","D":"DNase不需trypsin活化—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109020-64":{"quick":"胃部分切除後易「傾食症候群」:餐後虛弱、暈眩、盜汗。","detail":{"background":"胃部分切除後『傾食症候群(dumping syndrome)』:失去胃幽門的調控,『高滲食糜「快速」傾入小腸→大量體液移入腸腔(滲透)使血容量驟降、腸擴張、釋放血管活性物質→餐後「虛弱、暈眩、心悸、盜汗、腹瀉」(早期傾食)』;後期(餐後1–3小時)可因『快速糖吸收→胰島素過度分泌→反應性低血糖』。故B正確。比較錯誤:A餐後易『低血糖』(非高血糖);C血壓『下降』(非上升);D『甜食(高糖高滲)會「加重」』傾食(應避免)。故B正確。","options":{"A":"餐後易反應性低血糖(非高血糖)。","B":"餐後虛弱暈眩盜汗(傾食症候群)—正解。","C":"血壓下降(非上升)。","D":"甜食加重傾食(應避免)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109020-65":{"quick":"血管活性腸多肽(VIP)促進腸上皮分泌電解質與水。","detail":{"background":"腸胃道胜肽配對:A『VIP→刺激腸上皮分泌電解質與水、鬆弛平滑肌、舒張血管』(正確)。比較錯誤:B『胃抑肽(GIP)→刺激胰島素分泌(腸促胰島素作用)』(非抑制迷走);C『motilin→誘發「移行性運動複合波(MMC)」(空腹清掃)』(非促進分節運動);D『somatostatin→「抑制」多種激素分泌(廣泛抑制)』(非增加somatomedin)。故A正確。臨床:VIP瘤(VIPoma)分泌過量VIP→大量水樣腹瀉、低血鉀(WDHA症候群)。","options":{"A":"VIP促進腸上皮分泌電解質—正解。","B":"GIP刺激胰島素(非抑迷走)。","C":"motilin誘發MMC(非分節運動)。","D":"somatostatin廣泛抑制分泌(非增somatomedin)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109100-63":{"quick":"motilin促進MMC(空腹的移行性運動複合波)。","detail":{"background":"移行性運動複合波(MMC):是『「空腹/兩餐之間」』由近端向遠端週期性掃過腸道的強力收縮波,『清除殘渣與細菌(腸道清道夫)』;『「motilin」激素促進MMC』。故A正確。比較錯誤:B進食(食物入腸)會『「中止」MMC、轉為餐後消化型運動』(非食物排空時MMC停);C進食後是『分節與蠕動』取代MMC(非「大部分吸收後」);D MMC功能是「清掃」而非混合食糜(混合是分節運動)。故A正確。臨床:MMC異常與小腸細菌過度生長有關;紅黴素(motilin受體致效)促胃腸動力。","options":{"A":"motilin促進MMC—正解。","B":"進食中止MMC(非排空時停)。","C":"進食(非吸收後)以分節取代MMC。","D":"MMC功能為清掃(混合是分節運動)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_109100-64":{"quick":"膽囊收縮素(CCK)是直接刺激胰臟分泌消化酵素最主要的激素。","detail":{"background":"胰液分泌調控:『「膽囊收縮素(CCK)」(十二指腸I細胞,受脂肪/胺基酸刺激)→直接作用於胰「腺泡細胞」→分泌「富含消化酵素」的胰液』,並促膽囊收縮、Oddi括約肌鬆弛。故A正確。比較:secretin(受酸刺激)→促胰「管細胞」分泌「富碳酸氫鹽」的水樣胰液(中和酸,非主要為酶);gastrin促胃酸;somatostatin抑制。故A正確。記憶:CCK→酶(腺泡);secretin→HCO₃⁻(管細胞)。","options":{"A":"CCK直接刺激胰臟分泌消化酵素—正解。","B":"gastrin促胃酸。","C":"secretin促胰碳酸氫鹽(非主要為酶)。","D":"somatostatin抑制分泌。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-63":{"quick":"迴腸切除→維生素B12與膽鹽吸收障礙→最易導致貧血。","detail":{"background":"迴腸(ileum)是『「維生素B12(與內在因子複合物)」與「膽鹽(腸肝循環回收)」的「專一吸收部位」』。迴腸切除→『B12吸收不良→「巨球性貧血」』(故B「貧血」正確);亦致膽鹽流失→脂肪吸收不良、脂溶性維生素缺乏、膽鹽性腹瀉、膽固醇結石風險。故B正確。比較:黃疸非主因;消化道潰瘍與胃酸相關;血糖過高非此。故B正確。臨床:克隆氏病常侵迴腸末端→B12缺乏需補充。","options":{"A":"黃疸非迴腸切除主要後果。","B":"B12/膽鹽吸收障礙→貧血—正解。","C":"潰瘍與胃酸相關(非此)。","D":"血糖過高非此機制。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-64":{"quick":"膽酸主要藉「乳化作用」幫助脂肪消化吸收。","detail":{"background":"膽酸/膽鹽是兩性分子:『以「乳化作用(emulsification)」把大脂肪滴分散成小油滴、增加表面積供胰脂酶作用,並形成「微膠粒(micelle)」運送脂肪消化產物到腸黏膜吸收』。故C「乳化作用」正確。膽酸本身『不「分解(水解)」脂肪』(那是脂酶)、非還原/氧化作用。故C正確。記憶:膽鹽乳化+微膠粒運送;胰脂酶+colipase水解三酸甘油酯。","options":{"A":"非還原作用。","B":"水解脂肪是脂酶(非膽酸)。","C":"乳化作用幫助脂肪消化吸收—正解。","D":"非氧化作用。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_110020-65":{"quick":"膽囊收縮素(CCK)刺激胰臟分泌富含酵素的胰液。","detail":{"background":"膽囊收縮素(CCK):由十二指腸I細胞分泌(受脂肪、胺基酸刺激),作用:『刺激胰「腺泡」分泌「富含消化酵素」的胰液(B正確)、促膽囊收縮排膽汁、Oddi括約肌鬆弛、「「抑制」胃排空」(增飽足)』。故B正確。比較錯誤:A CCK『抑制(非促進)』胃排空;C CCK亦在中樞作為神經胜肽(非只在腸道);D血中半衰期僅數分鐘(非3小時)。故B正確。","options":{"A":"CCK抑制胃排空(非促進)。","B":"CCK刺激胰臟分泌富酵素胰液—正解。","C":"CCK亦在中樞(非只腸道)。","D":"半衰期僅數分鐘(非3小時)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111020-65":{"quick":"刺激「D細胞(分泌體抑素抑制胃酸)」對「促進」胃酸生成效果最低。","detail":{"background":"胃酸分泌的促進者:『G細胞→胃泌素(gastrin)』、『ECL細胞→組織胺(histamine,經H2受體最強)』、『迷走神經→乙醯膽鹼』—皆「促進」壁細胞泌酸。而『「D細胞」分泌「體抑素(somatostatin)」是「「抑制」胃酸分泌」』。故刺激D細胞對「促進」胃酸的效果『最低(反而抑制)』。故A正確。臨床:胃酸分泌的三大刺激=gastrin、histamine、ACh(故H2阻斷劑、抗膽鹼、PPI皆可抑酸);somatostatin/體抑素類似物抑制。","options":{"A":"D細胞分泌體抑素抑制胃酸、促酸效果最低—正解。","B":"ECL細胞釋組織胺強烈促酸。","C":"G細胞釋胃泌素促酸。","D":"迷走神經釋ACh促酸。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111020-66":{"quick":"分節運動(segmentation)的功能是混合腸內容物(與消化液)。","detail":{"background":"小腸運動:『「分節運動(segmentation)」=腸壁環肌「非推進性」的交替收縮分段,把食糜「來回混合」與消化液充分接觸、並增進與黏膜接觸吸收』(主要功能是「混合」非推進)。故A正確。比較:推進靠『蠕動(peristalsis)』;胃結腸反射是進食引發結腸活動(非分節前趨);分節不抑制胃排空。故A正確。記憶:分節=混合;蠕動=推進;MMC=空腹清掃。","options":{"A":"分節運動混合腸內容物—正解。","B":"非胃結腸反射前趨。","C":"快速推進靠蠕動(非分節)。","D":"分節不抑制胃排空。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111100-50":{"quick":"腸神經系統中與消化道「運動控制」較相關者為肌間(myenteric)神經叢。","detail":{"background":"腸神經系統(ENS)兩大神經叢:『「肌間神經叢(myenteric/Auerbach plexus)」位於環肌與縱肌之間→主要「調控消化道「運動(蠕動、張力)」」』;『「黏膜下神經叢(submucosal/Meissner plexus)」→主要調控「分泌與局部血流」」』。故與運動控制較相關者為肌間神經叢(D)。脈絡叢(腦室產CSF)、臂神經叢(上肢)與此無關。故D正確。","options":{"A":"脈絡叢產腦脊髓液(無關)。","B":"黏膜下神經叢主管分泌/血流。","C":"臂神經叢支配上肢。","D":"肌間神經叢主管消化道運動—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111100-63":{"quick":"胃泌素作用於壁細胞上的CCK-B受體促進胃酸分泌。","detail":{"background":"胃泌素(gastrin):『主要由「胃竇G細胞」分泌(非小腸)』、『作用於「壁細胞與ECL細胞上的「膽囊收縮素B型(CCK-B/CCK2)受體」」→「促進」胃酸分泌(直接+經ECL釋組織胺間接)』。故D正確。比較錯誤:A主要由「胃竇」製造(非小腸);B/C胃泌素是「促進」胃酸(非抑制)、作用於壁細胞CCK-B(非主細胞)。故D正確。臨床:胃泌素瘤(Zollinger-Ellison)→大量胃酸、頑固潰瘍。","options":{"A":"主要由胃竇G細胞製造(非小腸)。","B":"胃泌素促進(非抑制)胃酸。","C":"作用於壁細胞CCK-B(非主細胞抑酸)。","D":"作用CCK-B受體促胃酸分泌—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_111100-64":{"quick":"麥芽糖由「麥芽糖酶」水解;選項中「蔗糖酶(sucrase)複合體」具麥芽糖酶活性可水解之。","detail":{"background":"雙醣的刷狀緣消化:『麥芽糖(maltose,兩個葡萄糖)→由「麥芽糖酶(maltase)」水解成葡萄糖』;而『腸黏膜的「蔗糖酶-異麥芽糖酶複合體(sucrase-isomaltase)」「兼具麥芽糖酶活性」、可水解麥芽糖』。故選項中『蔗糖酶(sucrase)』可幫助麥芽糖水解成葡萄糖(A)。比較:乳糖酶(乳糖)、海藻糖酶(海藻糖)、澱粉酶(把澱粉切成麥芽糖等寡醣、非把麥芽糖切成葡萄糖)。故A正確(以sucrase複合體具maltase活性為答案)。","options":{"A":"蔗糖酶複合體具麥芽糖酶活性、水解麥芽糖—正解。","B":"乳糖酶水解乳糖。","C":"海藻糖酶水解海藻糖。","D":"澱粉酶把澱粉切成麥芽糖(非把麥芽糖切成葡萄糖)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_112020-64":{"quick":"腸道蛋白質吸收的共同運輸蛋白多為「鈉或氫依賴型」。","detail":{"background":"蛋白質消化吸收:蛋白質經胃蛋白酶、胰蛋白酶/糜蛋白酶(內切)與羧肽酶(外切)分解成『胺基酸與「小胜肽(雙肽、三肽)」』;腸刷狀緣『以「鈉依賴型胺基酸共轉運蛋白」吸收胺基酸、以「氫離子依賴型的PepT1」吸收雙/三肽』。故D「共同運輸蛋白多為Na⁺或H⁺依賴型」正確。比較錯誤:A可吸收『胺基酸「與」小胜肽』(非僅單一胺基酸);B分解酶來自『胃與胰』(非肝);C糜蛋白酶是『內切酶(endopeptidase)』(非外切)。故D正確。","options":{"A":"可吸收胺基酸與小胜肽(非僅單一胺基酸)。","B":"蛋白酶來自胃與胰(非肝)。","C":"chymotrypsin為內切酶(非外切)。","D":"共轉運蛋白多為Na/H依賴型—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113020-64":{"quick":"胰泌素作用於胰臟「管細胞」分泌碳酸氫鹽,協助中和胃酸。","detail":{"background":"胰泌素(secretin,十二指腸S細胞,受「酸」刺激分泌):『作用於胰臟「管(導管)細胞」→分泌「富含碳酸氫鹽(HCO₃⁻)的水樣胰液」→中和進入十二指腸的胃酸(調節腸內pH)』,並抑制胃酸與胃泌素。故A正確。比較錯誤:B由腸(非胰)製造、且「抑制(非促進)」胃酸;C經Gs-cAMP(非抑Gq);D作用於管細胞分泌HCO₃⁻(非直接Cl通道)。故A正確。記憶:secretin→酸刺激→管細胞→HCO₃⁻(中和);CCK→脂肪/胺基酸→腺泡→酵素。","options":{"A":"胰泌素作用胰管細胞分泌HCO₃⁻中和酸—正解。","B":"由十二指腸S細胞製造、抑制胃酸。","C":"經Gs-cAMP(非抑Gq促胃酸)。","D":"作用管細胞分泌HCO₃⁻(非直接Cl通道)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113020-65":{"quick":"半乳糖經鈉依賴型SGLT1與葡萄糖一起吸收。","detail":{"background":"腸細胞醣類吸收:『「葡萄糖與半乳糖」經頂膜「鈉依賴型共轉運蛋白「SGLT1」」次級主動吸收』(靠Na梯度);『「果糖(fructose)」經「GLUT5」促進擴散吸收(非SGLT、非GLUT4)』;吸收後三者皆經基底側『GLUT2』送入血。故C「半乳糖經SGLT1」正確(注意是SGLT「1」非SGLT2;SGLT2在腎)。比較錯誤:A葡萄糖經SGLT「1」(非SGLT-2,SGLT2在腎);B果糖經GLUT5(非GLUT4);D乳糖須先被乳糖酶分解(非直接GLUT5吸收)。故C正確。","options":{"A":"葡萄糖經SGLT1(非SGLT2,後者在腎)。","B":"果糖經GLUT5(非GLUT4)。","C":"半乳糖經SGLT1與葡萄糖共吸收—正解。","D":"乳糖須先分解(非直接吸收)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113090-64":{"quick":"胰泌素促進胰碳酸氫鹽釋放、並抑制胃酸(H⁺)分泌。","detail":{"background":"腸內分泌激素功能:C『胰泌素(secretin)→受腸「酸(pH下降)」刺激→促進胰臟「碳酸氫鹽(HCO₃⁻)」釋放(中和酸)、並「抑制胃H⁺分泌」』(正確)。比較錯誤:A CCK『「抑制」胃排空』(非促進);B CCK受「脂肪/胺基酸」刺激(非酸)、使Oddi括約肌「鬆弛」(非促進其收縮);D secretin受「酸(pH「下降」)」刺激(非上升)、促胰「碳酸氫鹽」(非主要為酵素)。故C正確。記憶:secretin=酸刺激→HCO₃⁻+抑胃酸;CCK=脂肪/胺基酸→胰酶+膽囊收縮。","options":{"A":"CCK抑制胃排空(非促進)。","B":"CCK受脂肪/胺基酸刺激、鬆弛Oddi括約肌。","C":"胰泌素促HCO₃⁻、抑胃H⁺—正解。","D":"secretin受酸(pH下降)刺激、促HCO₃⁻(非酵素)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_113090-65":{"quick":"腸道慢波由卡氏間質細胞(ICC)起源,本身「很少」直接引起收縮(需達閾值產生spike才收縮)。","detail":{"background":"腸道平滑肌的『「慢波(slow waves)」由「卡氏間質細胞(ICC,腸道節律起搏細胞)」產生』,是基礎電節律(BER)、使膜電位週期性起伏。『慢波本身「不帶spike potential時「很少」直接造成收縮」—只有當慢波去極化「達閾值產生「峰電位(spike)」」時才觸發鈣內流與收縮』。故C「ICC起源、很少導致收縮」正確。比較:潘氏細胞(Paneth,小腸隱窩抗菌)與此無關。故C正確。記憶:ICC=節律(慢波);收縮需spike(慢波+刺激達閾)。","options":{"A":"慢波(無spike)很少直接致收縮(非常導致)。","B":"潘氏細胞與慢波無關。","C":"ICC起源、很少導致收縮—正解。","D":"潘氏細胞無關、且敘述錯。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114020-64":{"quick":"胰脂酶(pancreatic lipase)需膽汁(膽鹽乳化)幫助消化脂肪。","detail":{"background":"脂肪消化的脂酶:『「胰脂酶(pancreatic lipase)」是脂肪消化的主力,但脂肪須先被「膽鹽乳化」成小油滴、形成微膠粒,胰脂酶(配合colipase對抗膽鹽抑制)才能在油水界面作用』→故胰脂酶『需膽汁(膽鹽)幫助』。故B正確。比較:舌脂酶與胃脂酶在酸性環境作用、『不需膽鹽』;colipase是輔助胰脂酶錨定的蛋白(本身非脂酶、需膽鹽存在)。題以「需膽汁幫助消化」的脂酶為胰脂酶(B)。故B正確。","options":{"A":"胃脂酶在酸性作用、不需膽鹽。","B":"胰脂酶需膽汁(膽鹽)幫助—正解。","C":"colipase為輔助蛋白(非主脂酶)。","D":"舌脂酶不需膽鹽。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114020-65":{"quick":"分泌素(secretin)最主要刺激胰臟分泌碳酸氫根離子。","detail":{"background":"分泌素(secretin):由十二指腸S細胞受『酸』刺激分泌,『最主要作用=刺激胰臟「管細胞」分泌「碳酸氫根(HCO₃⁻)」』中和進入小腸的胃酸;並抑制胃酸/胃泌素。故D正確。比較:刺激胰島素(GIP/GLP-1)、刺激膽囊收縮與胰酶(CCK)非secretin主作用。故D正確。記憶:secretin=胰HCO₃⁻(中和酸);CCK=胰酶+膽囊。","options":{"A":"非刺激肝凝血因子。","B":"刺激胰島素為GIP/GLP-1(非secretin主作用)。","C":"非刺激免疫細胞。","D":"刺激胰臟分泌碳酸氫根—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-64":{"quick":"游離膽固醇在小腸上皮主要經「擴散(及NPC1L1轉運)」吸收。","detail":{"background":"脂質吸收:脂肪消化產物(游離脂肪酸、單酸甘油酯、『游離膽固醇』)由膽鹽微膠粒運送到腸黏膜表面,『「游離膽固醇」主要以「擴散」(順濃度,並經頂膜膽固醇轉運蛋白NPC1L1促進)進入腸上皮細胞』(非主動運輸、非內吞)。故C「擴散作用」正確。進入後膽固醇再酯化、併入乳糜微粒經淋巴運送。故C正確。臨床:ezetimibe抑制NPC1L1→減少膽固醇吸收、降血脂。","options":{"A":"非初級主動運輸。","B":"非次級主動運輸。","C":"游離膽固醇經擴散吸收—正解。","D":"非內吞作用(乳糜微粒是輸出方式)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_114090-65":{"quick":"胰泌素直接作用=刺激胰碳酸氫鹽分泌、並抑制胃腺分泌胃泌素。","detail":{"background":"胰泌素(secretin)的直接作用:C『「刺激胰臟分泌碳酸氫根(中和酸)」、並「抑制胃腺分泌胃泌素(與胃酸)」』(正確)。比較錯誤:A刺激膽囊收縮與胰島素是CCK/GIP(非secretin);B刺激膽汁分泌與膽囊收縮分屬secretin(促肝膽汁HCO₃⁻)與CCK,但「促膽囊收縮」是CCK(非secretin);D secretin抑制(非促進)胃HCl。故C最符合secretin直接作用。故C正確。","options":{"A":"膽囊收縮與胰島素分泌為CCK/GIP。","B":"促膽囊收縮為CCK(非secretin)。","C":"促胰HCO₃⁻、抑胃泌素—正解。","D":"secretin抑制(非促進)胃HCl。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_115020-63":{"quick":"胃壁細胞的陰離子交換子(Cl⁻/HCO₃⁻)位於基底側面,把HCO₃⁻送回血(鹼潮)。","detail":{"background":"胃壁細胞泌酸的轉運配置:頂膜(管腔側)有『H⁺-K⁺-ATPase(質子幫浦,泌H⁺)』與『Cl⁻通道(CFTR等,泌Cl⁻)』;『基底外側(底側)膜有「陰離子交換子(Cl⁻/HCO₃⁻交換,把碳酸酐酶產生的HCO₃⁻送回血、換入Cl⁻)」』—此即餐後『「鹼潮(alkaline tide)」』來源。故B「陰離子交換子位於底側面」正確。比較:H⁺-K⁺-ATPase在頂膜(非底側);PepT1在小腸(非胃壁細胞)。故B正確。","options":{"A":"H⁺-K⁺-ATPase在頂膜(非底側)。","B":"陰離子交換子(Cl⁻/HCO₃⁻)在底側面—正解。","C":"CFTR/Cl通道在頂膜。","D":"PepT1在小腸吸收胜肽(非胃壁細胞)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_115020-64":{"quick":"膽酸兼具親水與親脂性,促進脂肪乳糜化與微膠粒作用、並經腸肝循環回收。","detail":{"background":"膽酸/膽鹽是『兩性分子(同時有親水與親脂端)』:D『「促進脂肪乳糜化(乳化)與形成「微膠粒(micelle)」運送脂肪消化產物」』—正確,是其核心功能。比較錯誤:A膽酸『兼有親水「與」親脂』(非無親水性);B腸肝循環的膽鹽回收主要在『「迴腸末端」(主動吸收)』(非結腸);C膽酸是『「溶解」膽固醇/卵磷脂成微膠粒、防結晶』(非幫助結晶)。故D正確。記憶:膽鹽=兩性→乳化+微膠粒→脂肪吸收;迴腸回收→腸肝循環。","options":{"A":"膽酸兼有親水與親脂(非無親水)。","B":"膽鹽主要在迴腸末端回收(非結腸)。","C":"膽酸溶解防結晶(非幫助結晶)。","D":"兩性、促乳糜化與微膠粒作用—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Costanzo《Physiology》"]}},"med1_106100-48":{"quick":"膽囊炎致右肩疼痛是轉移痛(referred pain)的典型例。","detail":{"background":"轉移痛(referred pain):內臟痛覺被『感知到「體表的特定部位」』,因『內臟與體表的傳入纖維「在「脊髓「同一節段」會合(convergence)」』,大腦誤判來源。經典例:『膽囊/膽道(經膈神經C3-5)發炎→「右肩部」轉移痛』(C正確)。比較錯誤:A會合處在『脊髓』(非延腦);B胃/胰發炎『常「轉移到背部」』(非不會);D轉移痛是『同側內臟→體表』模式,『非左右拇指對應』。故C正確。臨床:心肌缺血→左臂/下顎;闌尾炎→臍周轉移右下腹。","options":{"A":"會合處在脊髓(非延腦)。","B":"胃/胰發炎常轉移到背部。","C":"膽囊炎右肩痛為轉移痛—正解。","D":"非左右拇指對應。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_109020-74":{"quick":"含色胺酸(Trp)的胜肽能吸收280 nm的光。","detail":{"background":"蛋白質/胜肽在280 nm的吸收源自「芳香族胺基酸的芳香環」—『色胺酸(Trp,吸收最強)』、酪胺酸(Tyr),少量苯丙胺酸。選項中只有B「Ala-Ala-「Trp(色胺酸)」」含芳香環胺基酸→能吸收280 nm。其餘(離胺酸、組胺酸雖含側鏈但不在280nm主吸收;絲胺酸、甘胺酸、纈胺酸、脯胺酸、白胺酸皆無芳香環)。故B正確。應用:280 nm吸光估蛋白質濃度(Beer-Lambert);260/280比評估純度。","options":{"A":"無Trp/Tyr芳香環(組胺酸非280nm主吸收)。","B":"含色胺酸(Trp)、吸收280nm—正解。","C":"無芳香環胺基酸。","D":"無芳香環胺基酸。"},"sources":["Lehninger生物化學","Guyton & Hall《生理學》"]}},"med1_111020-51":{"quick":"內側中隔區的多巴胺神經元最不可能是上行網狀活化(意識喚起)系統成員。","detail":{"background":"上行網狀活化系統(ARAS)維持意識喚起,由腦幹多種神經調節系統組成:『橋腦網狀結構的膽鹼性(ACh)神經元(A)、藍斑的正腎上腺素神經元(B)、背側縫核的血清素神經元(D)』及下視丘組織胺/orexin、中腦多巴胺等廣泛投射皮質。而『「內側中隔區(medial septal area)」主要與「海馬的θ節律、記憶」相關、其神經元多為「膽鹼性/GABA性」(非「多巴胺性」),且非ARAS核心』。故C「內側中隔區多巴胺神經元」最不可能是ARAS成員,為正解。故C正確。","options":{"A":"橋腦網狀ACh神經元屬ARAS。","B":"藍斑NE神經元屬ARAS。","C":"內側中隔多巴胺神經元非ARAS核心—最不可能,為正解。","D":"背側縫核血清素神經元屬ARAS。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_111020-55":{"quick":"甘胺酸是脊髓與腦幹最主要的抑制性神經傳遞物質。","detail":{"background":"甘胺酸(glycine):是『「脊髓與腦幹」最主要的「抑制性」神經傳遞物質』(GABA則為腦較高處主要抑制傳導物);其受體是『「氯離子通道」,開啟使Cl⁻內流→過極化(抑制)』(非鉀外流)。故A正確。比較錯誤:B受體開啟讓『Cl⁻內流』(非鉀外流);C『番木鼈鹼(strychnine)拮抗甘胺酸受體→解除抑制→肌肉「過度收縮、痙攣強直」(非抑制收縮)』;D甘胺酸是NMDA受體的『輔同效劑(co-agonist)』(非作用於菸鹼ACh通道)。故A正確。","options":{"A":"甘胺酸為脊髓腦幹主要抑制性傳遞物—正解。","B":"受體開啟為Cl⁻內流(非鉀外流)。","C":"strychnine拮抗致痙攣(非抑制收縮)。","D":"甘胺酸為NMDA輔效劑(非菸鹼ACh通道)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_111100-54":{"quick":"單胺氧化酶抑制劑(MAOI)增加正腎上腺素(及多巴胺、血清素等單胺)。","detail":{"background":"單胺氧化酶(MAO)分解『單胺類神經傳遞物—正腎上腺素、多巴胺、血清素』。『MAO抑制劑(MAOI)→減少這些單胺降解→突觸內單胺(含「正腎上腺素」)濃度上升』。故D正確。乙醯膽鹼(被膽鹼酯酶分解)、麩胺酸、甘胺酸非單胺、不受MAO影響。故D正確。臨床:MAOI為抗憂鬱/抗帕金森藥;與含酪胺食物(乳酪)併用→「乳酪效應」高血壓危象;與SSRI併用→血清素症候群。","options":{"A":"乙醯膽鹼被膽鹼酯酶分解(非MAO)。","B":"麩胺酸非單胺。","C":"甘胺酸非單胺。","D":"MAOI增加正腎上腺素(單胺)—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_112020-47":{"quick":"紡錘絲(有絲分裂)由微管(microtubule)組成。","detail":{"background":"細胞分裂時『由中心體(微管組織中心)發出的「紡錘絲(spindle fiber)」由「微管(microtubule, αβ-tubulin)」組成』—負責染色體的排列與分離(動粒微管牽引)。故D正確。微管亦構成纖毛/鞭毛軸絲、軸突運輸軌道。比較:actin/myosin為肌肉收縮與細胞運動、中間絲提供機械支撐。故D正確。臨床:紡錘體毒(秋水仙素colchicine、長春鹼vincristine解聚微管;紫杉醇taxane穩定微管)阻斷有絲分裂→抗癌/抗痛風。","options":{"A":"肌動蛋白絲為actin(細胞運動)。","B":"肌凝蛋白絲為收縮。","C":"中間絲提供機械支撐。","D":"紡錘絲由微管組成—正解。"},"sources":["Lehninger生物化學","Guyton & Hall《生理學》"]}},"med1_112020-58":{"quick":"增加感壓受器放電→反射性心搏徐緩(bradycardia)。","detail":{"background":"動脈感壓受器(baroreceptor)放電增加(代表血壓上升)→啟動『降壓反射:抑制血管運動中樞交感、興奮迷走(副交感)』→『「心率減慢(bradycardia)」、心收縮力降、血管舒張、血壓下降』。故A正確。比較錯誤:B心搏量會『下降』(非增加);C/D反射『同時調節交感「與」副交感』(交感↓且副交感↑,非只影響一方)。故A正確。記憶:感壓受器放電↑(壓升)→交感↓+副交感↑→心率慢、血壓降。","options":{"A":"感壓受器放電增→心搏徐緩—正解。","B":"心搏量下降(非增加)。","C":"交感副交感皆受調節(非只交感)。","D":"交感副交感皆受調節(非只副交感)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_112020-65":{"quick":"腸上皮細胞「外」的鈉離子濃度,最影響小腸對葡萄糖與胺基酸的吸收(SGLT/Na共轉運)。","detail":{"background":"小腸吸收葡萄糖、半乳糖與胺基酸靠『頂膜的「鈉依賴性共轉運蛋白(SGLT1、Na-胺基酸共轉運)」次級主動運輸』—『依賴管腔側(腸上皮細胞「外」)的「鈉離子濃度梯度」作為驅動力』。故『腸上皮細胞外Na⁺濃度變化最影響此吸收』(C)。比較:血中胰島素(不直接調腸吸收)、鉀、鈣非主要驅動。故C正確。臨床:口服補液鹽(ORS)即利用Na-葡萄糖共轉運促進腸吸收水分(治腹瀉脫水)。","options":{"A":"胰島素不直接調腸糖吸收。","B":"鉀非驅動力。","C":"腸上皮外鈉濃度驅動SGLT吸收—正解。","D":"鈣非主要驅動。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_113020-50":{"quick":"唾液分泌是交感與副交感作用「較一致(皆促進)」的少數例外。","detail":{"background":"多數器官交感與副交感作用『拮抗』,但『唾液腺是少數「兩者皆促進分泌」的例外』(副交感→大量稀薄漿液;交感→少量黏稠)。故A「增加唾液分泌量」是兩者較一致者。比較:B心率(交感增、副交感減,拮抗)、C胃腸蠕動(副交感增、交感減,拮抗)、D膀胱(副交感使逼尿肌收縮+內括約肌鬆弛排尿;交感相反)皆為拮抗。故A正確。","options":{"A":"唾液分泌交感副交感皆促進—正解。","B":"心率為拮抗(交感增/副交感減)。","C":"胃腸蠕動為拮抗。","D":"膀胱控制為拮抗。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_113090-74":{"quick":"親和力層析法(affinity chromatography)專一性最好。","detail":{"background":"蛋白質純化方法的『專一性』:『「親和力層析(affinity chromatography)」最佳—利用「目標蛋白與「特異性配體(抗體、受質、抗原)」的專一結合」純化,選擇性極高』。其餘:離子交換層析(依電荷)、膠體過濾/分子篩(依大小)、鹽析(依溶解度)專一性較低。故A正確。臨床/研究:常用His-tag與鎳柱、抗體親和管柱(免疫沉澱)等高純度純化。故A正確。","options":{"A":"親和力層析專一性最好—正解。","B":"離子交換依電荷(專一性較低)。","C":"膠體過濾依大小。","D":"鹽析依溶解度(專一性最低)。"},"sources":["Lehninger生物化學","Guyton & Hall《生理學》"]}},"med1_114020-52":{"quick":"腹腔神經節(celiac ganglion)交感節後不支配唾液腺(由頭部交感支配)。","detail":{"background":"『腹腔神經節(celiac ganglion)』是腹部的椎前交感神經節,其節後纖維支配『上腹部臟器—胃、肝、胰、脾、小腸近段、腎上腺等』。而『「唾液腺」的交感支配來自「頸上神經節(superior cervical ganglion)」(頭頸部交感)』,『非腹腔神經節』。故腹腔神經節節後最不可能影響唾液腺(D)。故D正確。記憶:椎前神經節(腹腔/腸繫膜上下)管腹腔內臟;頸上神經節管頭頸(含唾液腺、瞳孔放射肌)。","options":{"A":"腹腔神經節支配胃。","B":"支配胰臟。","C":"支配肝臟。","D":"唾液腺由頸上神經節支配、非腹腔神經節—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_114090-47":{"quick":"紅血球置於「NaCl+尿素」液最易脹大(尿素可透膜、無有效滲透力)。","detail":{"background":"細胞脹縮取決於『「有效滲透濃度(僅「不可透膜」的溶質才產生有效滲透力)」』。各液:100 mM NaCl(≈200 mOsm有效,因Na/Cl不可自由透膜)為基礎。『「尿素(urea)可「自由透過」細胞膜→「無有效滲透力」』→B液有效滲透濃度僅來自NaCl(≈200,低於血漿285)→『相對低張→水進入細胞→紅血球「脹大」(甚至溶血)』。而葡萄糖、KCl相對不易透膜、提供額外有效滲透力使液體較等/高張→不脹大。故B最易脹大。故B正確。記憶:可透膜溶質(尿素、甘油)不貢獻有效滲透壓。","options":{"A":"KCl不易透膜、提供有效滲透力(不脹)。","B":"NaCl+尿素(尿素可透膜無有效滲透力)→脹大—正解。","C":"葡萄糖提供有效滲透力(不脹)。","D":"葡萄糖提供有效滲透力。"},"sources":["Lehninger生物化學","Guyton & Hall《生理學》"]}},"med1_115020-50":{"quick":"副交感活化使虹膜括約肌收縮(縮瞳)。","detail":{"background":"副交感神經活化(休息消化)的效應:『虹膜「括約肌」收縮→「縮瞳(miosis)」』(C正確)、睫狀肌收縮(近距離調視)、『「氣管平滑肌「收縮」」(非舒張)』、『「膽囊「收縮」」(排膽汁,非舒張)』、促進腸蠕動與分泌、心率減慢;『豎毛肌由交感支配(副交感不致其收縮)』。故C「虹膜括約肌收縮」正確;A(氣管應收縮)、B(膽囊應收縮)、D(豎毛肌為交感)皆錯。故C正確。","options":{"A":"副交感使氣管平滑肌收縮(非舒張)。","B":"副交感使膽囊收縮(非舒張)。","C":"虹膜括約肌收縮(縮瞳)—正解。","D":"豎毛肌由交感支配。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_115020-54":{"quick":"沙林(sarin)抑制乙醯膽鹼酯酶,使乙醯膽鹼堆積(膽鹼性危象)。","detail":{"background":"沙林(sarin)是『有機磷神經毒劑—「不可逆抑制「乙醯膽鹼酯酶(acetylcholinesterase)」」→乙醯膽鹼在突觸與神經肌肉接合「堆積」→過度膽鹼性刺激』:蕈毒鹼效應(瞳孔縮小、流涎流淚、支氣管收縮分泌、腹瀉、心搏徐緩)+菸鹼效應(肌肉顫動無力麻痺),嚴重者呼吸衰竭死亡。故D正確。治療:『阿托品(阻斷蕈毒鹼)+解磷定pralidoxime(再活化乙醯膽鹼酯酶)』。故D正確。","options":{"A":"非競爭性抑制菸鹼受體(那是箭毒類)。","B":"非非競爭性抑制菸鹼受體。","C":"非抑制乙醯膽鹼釋放(那是肉毒桿菌)。","D":"沙林抑制乙醯膽鹼酯酶→ACh堆積—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Kandel《Neural Science》"]}},"med1_107100-71":{"quick":"原發甲狀腺低下→TRH升高,TRH刺激泌乳素分泌→高泌乳素致無月經與泌乳。","detail":{"background":"此病人甲狀腺激素低(原發性甲狀腺低下)→負回饋使下視丘『TRH(甲狀腺釋素)升高』,而『「TRH除刺激TSH外,也「刺激腦下垂體分泌泌乳素(prolactin)」」→高泌乳素血症→泌乳(galactorrhea)+抑制GnRH致「無月經(amenorrhea)」』。故C正確。比較:多巴胺是『「抑制」泌乳素』(非刺激);GnRH刺激LH/FSH(與泌乳素無關)。故C正確。臨床:原發甲狀腺低下可致高泌乳素與月經異常,補甲狀腺素可改善。","options":{"A":"多巴胺抑制泌乳素(非刺激)。","B":"GnRH刺激LH(與此泌乳無關)。","C":"TRH刺激泌乳素分泌→無月經/泌乳—正解。","D":"多巴胺不刺激LH。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_107100-72":{"quick":"雌激素在排卵前約24小時達高峰,以正回饋觸發LH潮放(surge)。","detail":{"background":"月經週期雌激素動態:濾泡發育使雌激素漸升,『「排卵前約24–36小時」雌激素達「高峰」』,當其『高且持續→對下視丘-腦下垂體轉為「「正回饋」→觸發「LH潮放(LH surge)」→誘發排卵」』。故B正確。比較:濾泡期雌激素促濾泡生長(但非最高峰);黃體期雌激素有第二較小高峰、與黃體酮一起使內膜分泌期變化;經期雌激素低。故B正確。記憶:雌激素高峰(排卵前)→LH surge→排卵。","options":{"A":"濾泡期雌激素漸升但非最高峰。","B":"排卵前約24小時雌激素高峰、觸發LH surge—正解。","C":"黃體期為第二較小高峰。","D":"經期雌激素低。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_107100-73":{"quick":"FSH主要受Sertoli細胞分泌的「抑制素(inhibin)」負回饋調控。","detail":{"background":"男性HPG軸:腦下垂體FSH作用於睪丸『Sertoli細胞』促進生精;『Sertoli細胞分泌「抑制素(inhibin B)」「選擇性負回饋抑制腦下垂體FSH」』。故FSH受inhibin調控(A)。比較:睪固酮(Leydig分泌)主要負回饋抑制『LH(與GnRH)』;雌激素、黃體酮非男性FSH主調控。故A正確。記憶:inhibin→抑FSH;testosterone→抑LH。臨床:inhibin B為睪丸生精功能的指標。","options":{"A":"抑制素(inhibin)負回饋抑FSH—正解。","B":"雌激素非男性FSH主調控。","C":"睪固酮主要抑LH(非FSH)。","D":"黃體酮非此調控。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108030-72":{"quick":"血睪屏障保護單倍體的「初級精母細胞」等生精細胞(免於免疫攻擊)。","detail":{"background":"血睪屏障(blood-testis barrier)由相鄰『Sertoli細胞間的「緊密接合」』構成,把生精上皮分為基底室與近腔室:『「保護減數分裂中與其後的「初級精母細胞、次級精母細胞、精細胞」等「單倍體生精細胞」」』—因這些細胞帶有減數後的新抗原,屏障使其『與血液和免疫系統隔離,避免「自體免疫攻擊」』,並維持生精微環境。故D(初級精母細胞)正確。比較:Leydig細胞、類肌細胞、纖維母細胞在屏障外、非其保護對象。故D正確。臨床:屏障破壞(外傷、感染)可致抗精子抗體與不孕。","options":{"A":"Leydig細胞在屏障外。","B":"類肌細胞在屏障外。","C":"纖維母細胞非保護對象。","D":"血睪屏障保護初級精母細胞等生精細胞—正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_108100-72":{"quick":"Klinefelter症候群的LH與FSH「升高」(原發性睪丸衰竭),故「分泌量較低」錯誤。","detail":{"background":"Klinefelter症候群(克氏症):核型多『47,XXY』(A正確)、睪丸小、『精蟲稀少/無精→不孕(B正確)』、Leydig細胞功能差使『睪固酮「偏低」(C正確)』→因睪固酮與抑制素低、負回饋減弱→『「LH與FSH「升高」(原發性「高促性腺激素」性腺低下)」』。故D「LH及FSH分泌量較低」錯誤,為正解。臨床:身材高、四肢長、男性女乳、青春期發育不全;睪固酮補充治療。","options":{"A":"核型47,XXY,正確。","B":"精蟲稀少,正確。","C":"睪固酮偏低,正確。","D":"稱LH/FSH較低—錯誤(原發睪丸衰竭使其升高),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109020-53":{"quick":"GnRH由「下視丘」分泌(非腦下垂體前葉),故此敘述錯誤。","detail":{"background":"男性生殖內分泌:A『睪固酮由Leydig細胞分泌』(正確);B『FSH由腦下垂體前葉分泌』(正確);C『FSH作用於Sertoli細胞促進生精(含精細胞成熟)』(正確)。D「GnRH由「腦下垂體前葉」分泌」『錯誤』—『GnRH(性釋素)由「下視丘」分泌』,以脈衝方式經垂體門脈刺激腦下垂體前葉分泌LH與FSH。故D為正解。記憶:下視丘GnRH→垂體LH/FSH→睪丸(Leydig睪固酮、Sertoli生精)。","options":{"A":"睪固酮由Leydig細胞分泌,正確。","B":"FSH由腦下垂體前葉分泌,正確。","C":"FSH促精細胞成熟,正確。","D":"稱GnRH由腦下垂體前葉分泌—錯誤(應為下視丘),為正解。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"med1_109020-73":{"quick":"Sertoli細胞分泌的Müllerian抑制物質使副中腎管(Müllerian duct)退化。","detail":{"background":"胚胎性別分化:有Y染色體SRY→睪丸分化:『「Sertoli細胞分泌「Müllerian抑制物質(MIS/AMH)」→使「副中腎管(Müllerian duct)退化」」』(C正確);『Leydig細胞分泌「睪固酮」→使「中腎管(Wolffian duct)」發育為副睪/輸精管/精囊」』;『睪固酮經5α還原酶轉「二氫睪固酮(DHT)」→分化「男性「外」生殖器」』。故C正確。比較錯誤:A男性外生殖器分化靠『DHT』(非睪固酮直接);B男性附屬管(Wolffian)由睪固酮發育(C說的MIS抑制Müllerian才對);D睪丸生成由SRY決定(非睪固酮)。故C正確。","options":{"A":"男性外生殖器靠DHT分化(非睪固酮直接)。","B":"Wolffian管由睪固酮發育(此項與C重點不同)。","C":"MIS使Müllerian duct退化—正解。","D":"睪丸生成由SRY決定(非睪固酮)。"},"sources":["Guyton & Hall《生理學》","Boron & Boulpaep《Medical Physiology》","Williams Textbook of Endocrinology"]}},"me
