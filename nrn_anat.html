},"img":""},{"id":"111030-N1-2","code":"111030","roc":"111","cat":"N1","catname":"基礎醫學","num":2,"stem":"低血鈣主要會刺激那一個內分泌腺體的激素分泌,以增加血鈣濃度?","opts":{"A":"下視丘","B":"副甲狀腺","C":"腦下垂體前葉","D":"腦下垂體後葉"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"disc":"anat","topic":"A11內分泌","q_num":2,"roc_year":"111","exam_code":"111030","src":"民國111年","options":{"A":"下視丘","B":"副甲狀腺","C":"腦下垂體前葉","D":"腦下垂體後葉"},"img":""},{"id":"111110-N1-6","code":"111110","roc":"111","cat":"N1","catname":"基礎醫學","num":6,"stem":"手術時不小心移除下列何者,最可能直接造成血鈣濃度下降?","opts":{"A":"胸腺","B":"腎上腺皮質","C":"胰島","D":"副甲狀腺"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"disc":"anat","topic":"A11內分泌","q_num":6,"roc_year":"111","exam_code":"111110","src":"民國111年","options":{"A":"胸腺","B":"腎上腺皮質","C":"胰島","D":"副甲狀腺"},"img":""},{"id":"114030-N1-12","code":"114030","roc":"114","cat":"N1","catname":"基礎醫學","num":12,"stem":"關於腦下垂體(pituitary gland)的描述,下列何者錯誤?","opts":{"A":"與下視丘(hypothalamus)相連","B":"位於蝶鞍的腦下垂體窩","C":"腦下垂體中間部分泌黑色素細胞刺激素(melanocyte-stimulating hormone)","D":"腦下垂體中間部分泌褪黑素(melatonin)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"disc":"anat","topic":"A11內分泌","q_num":12,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"與下視丘(hypothalamus)相連","B":"位於蝶鞍的腦下垂體窩","C":"腦下垂體中間部分泌黑色素細胞刺激素(melanocyte-stimulating hormone)","D":"腦下垂體中間部分泌褪黑素(melatonin)"},"img":""},{"id":"115030-N1-11","code":"115030","roc":"115","cat":"N1","catname":"基礎醫學","num":11,"stem":"下列那兩種內分泌器官,其主體是由神經組織以及腺體組織共同發育組合形成?","opts":{"A":"腦下腺(pituitary gland)與甲狀腺(thyroid gland)","B":"甲狀腺(thyroid gland)與胰臟(pancreas)","C":"胰臟(pancreas)與腎上腺(adrenal gland)","D":"腎上腺(adrenal gland)與腦下腺(pituitary gland)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"disc":"anat","topic":"A11內分泌","q_num":11,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"腦下腺(pituitary gland)與甲狀腺(thyroid gland)","B":"甲狀腺(thyroid gland)與胰臟(pancreas)","C":"胰臟(pancreas)與腎上腺(adrenal gland)","D":"腎上腺(adrenal gland)與腦下腺(pituitary gland)"},"img":""}],E={"101030-N1-3":{"quick":"正解(A)。皮脂腺屬「全泌腺(holocrine)」，整個細胞解體連同皮脂一起排出，分泌物經導管排入毛囊→沿毛幹到體表。","detail":{"background":"皮脂腺(sebaceous gland)是與毛囊相連的「全泌腺(holocrine gland)」：腺體基底細胞不斷增生、向腔面推進，細胞內逐漸充滿脂質(皮脂)，最後整個細胞死亡、解體，連同細胞碎片與脂質一起成為分泌物(皮脂 sebum)，經短導管排入毛囊頸部，再沿毛幹到達皮膚表面，可潤滑毛髮與皮膚、抑菌。分泌方式三分類務必分清：①全泌腺(holocrine)＝細胞整個解體＝皮脂腺；②頂泌/離泌腺(apocrine)＝細胞頂端連同部分胞質脫落＝大汗腺、乳腺；③局泌/外泌腺(merocrine/eccrine)＝胞吐方式分泌、細胞不受損＝小汗腺、唾液腺、胰外分泌。皮脂腺多開口於毛囊，但少數特化型(如瞼板腺Meibomian gland)直接開口於體表而與毛囊無關。耵聹腺(ceruminous gland，外耳道)與瞼板腺的歸屬是常考陷阱：耵聹腺是「特化的頂泌汗腺(大汗腺)」而非皮脂腺；瞼板腺才是「特化的皮脂腺」。","options":{"A":"正確。皮脂腺分泌物(皮脂)經導管排入毛囊，再沿毛幹到體表，故大多數開口於毛囊。","B":"錯誤。「細胞分泌時本身並不損失」是局泌腺(merocrine)的特性；皮脂腺反而是「全泌腺(holocrine)」，整個細胞解體損失。","C":"錯誤。皮脂腺的分泌部(腺泡)位於真皮層內(常在毛囊旁)，不在表皮；表皮無腺體與血管。","D":"錯誤。瞼板腺是特化的皮脂腺沒錯，但耵聹腺是特化的「大(頂泌)汗腺」，並非皮脂腺，故本敘述把兩者都算皮脂腺是錯的。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"103100-N1-1":{"quick":"正解(A為「錯誤」者)。真皮屬「緻密(不規則)結締組織」，不是疏鬆結締組織，故(A)敘述錯誤。","detail":{"background":"真皮(dermis)位於表皮深面，主要由「緻密不規則結締組織(dense irregular connective tissue)」構成，富含膠原纖維與彈性纖維，提供皮膚強度與彈性。真皮分兩層：①乳頭層(papillary layer)＝較淺、為疏鬆結締組織，形成真皮乳頭(dermal papillae)向上嵌入表皮，內含微血管叢(供應無血管的表皮營養)與觸覺受器(Meissner小體)；指紋/掌紋即真皮乳頭規則排列的外在表現。②網狀層(reticular layer)＝較深、較厚、為緻密不規則結締組織，含大量膠原與彈性纖維，並有毛囊、皮脂腺、汗腺、Pacinian壓覺小體等。臨床：燒燙傷分度——一度傷只及表皮；二度傷(淺二度起水疱)已傷及真皮(真皮內含血管，受傷滲出形成水疱)；三度傷則全層(含皮下)壞死。本題問「錯誤」者，(A)把真皮整體說成疏鬆結締組織是錯的(整體應為緻密不規則，僅乳頭層為疏鬆)。","options":{"A":"錯誤(即為答案)。真皮主體(網狀層)是「緻密不規則結締組織」，不是疏鬆結締組織；僅最淺的乳頭層才是疏鬆結締組織。","B":"正確。指紋(指嵴)是真皮乳頭規則排列、推擠表皮形成的，與真皮乳頭分布有關。","C":"正確。真皮含觸覺(Meissner)、壓覺(Pacinian)、痛覺等多種感覺受器。","D":"正確。出現水疱代表傷及含血管的真皮層(淺二度燒傷)，組織液滲出聚積成疱。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"105030-N1-1":{"quick":"正解(D)。頂泌(大)汗腺的導管開口於毛囊(而非皮膚表面)，這是與小汗腺最大的不同。","detail":{"background":"皮膚附屬構造重點：①真皮網狀層＝緻密(不規則)結締組織(非疏鬆)；②皮脂腺位於真皮(常與毛囊相連)，不在皮下層；③黑色素細胞(melanocyte)數目在不同人種間幾乎相同，曬太陽使膚色變深是「黑色素生成量增加並轉移到角質細胞」，而非黑色素細胞「數目」大量增加。汗腺兩型務必分清：小汗腺(eccrine/merocrine sweat gland)＝遍布全身、導管「直接開口於皮膚表面」、以胞吐分泌、調節體溫；大汗腺(apocrine sweat gland)＝分布於腋窩、乳暈、肛門生殖器周圍、青春期才活躍、導管「開口於毛囊」、分泌物經細菌分解產生體味。故(D)正確。","options":{"A":"錯誤。真皮網狀層是「緻密不規則結締組織」，不是疏鬆結締組織。","B":"錯誤。皮脂腺位於真皮(與毛囊相連)，不在皮下層。","C":"錯誤。曬紫外線主要刺激既有黑色素細胞「增加黑色素生成」並移轉至角質細胞，使膚色變深；黑色素細胞「數目」並不會因此大量增加。","D":"正確。頂泌(大)汗腺的排泄管開口於毛囊；小汗腺才直接開口於皮膚表面。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"106030-N1-1":{"quick":"正解(C)。表皮最底層(基底層)細胞具增生(有絲分裂)能力，不斷向上分化補充角質細胞。","detail":{"background":"表皮(epidermis)是「角質化複層鱗狀上皮」，無血管(營養靠真皮乳頭層微血管擴散供應)。由深至淺五層(厚皮膚，如手掌腳掌)：基底層(stratum basale，又稱生發層)→棘狀層(spinosum)→顆粒層(granulosum)→透明層(lucidum，僅厚皮膚有)→角質層(corneum)；薄皮膚缺透明層僅四層。基底層為單層柱狀/立方幹細胞，行有絲分裂(增生)持續產生新角質細胞向上推移，約30天完成角化脫落；故傷口表皮再生靠基底層。黑色素細胞與梅克爾細胞也位於基底層，蘭氏細胞(免疫)位於棘狀層。表皮主要細胞為角質細胞(keratinocyte)，各層皆屬此細胞家族的不同分化階段。","options":{"A":"錯誤。表皮「無血管」，營養靠下方真皮乳頭層的微血管擴散供應。","B":"錯誤。表皮是「複層鱗狀(扁平)上皮」並角質化，不是複層柱狀上皮。","C":"正確。基底層細胞具增生(有絲分裂)能力，是表皮更新與傷口癒合的來源。","D":"錯誤。角質細胞(keratinocyte)是表皮各層的主要細胞，從基底層到角質層都屬角質細胞家族的不同分化階段，並非僅底層有。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"106110-N1-1":{"quick":"正解(C)。雞皮疙瘩是豎毛肌收縮、受「交感神經」興奮所致，與副交感神經無關，故(C)「較無關係」。","detail":{"background":"豎毛肌(arrector pili muscle)是連於毛囊與真皮乳頭層的平滑肌。寒冷或情緒緊張時，「交感神經」興奮使豎毛肌收縮，毛髮豎立、毛囊口周圍皮膚隆起＝雞皮疙瘩(goose bumps)，在多毛動物可豎毛保暖/示威，人類為退化反應。重點：皮膚的豎毛肌、汗腺、血管平滑肌等皆「只受交感神經支配」(屬交感單一支配，無副交感)；副交感神經一般不分布到體表皮膚附屬器。故與副交感神經興奮「最無關」。","options":{"A":"有關。豎毛肌收縮是雞皮疙瘩的直接原因。","B":"有關。交感神經興奮(寒冷、緊張)驅動豎毛肌收縮。","C":"最無關(即為答案)。皮膚豎毛肌與汗腺受交感神經支配，副交感神經不參與，故與雞皮疙瘩無關。","D":"有關。天氣寒冷透過交感反射引發豎毛肌收縮而起雞皮疙瘩。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"107030-N1-1":{"quick":"正解(A)。表皮最淺層(角質層)細胞已完全角質化、無核死細胞；愈往底層細胞愈幼嫩具核。","detail":{"background":"表皮角化過程：基底層幼稚角質細胞(有核、可分裂)→向上分化、合成角蛋白→到顆粒層形成角質顆粒、細胞核與胞器開始崩解→到最表層的角質層時，細胞已「完全角質化」成無核、扁平、充滿角蛋白的死細胞(角質鱗片)，最終脫落。黑色素細胞位於「基底層(深層)」而非淺層。厚皮膚(手掌腳掌)表皮有五層(多一透明層)，薄皮膚四層，不會只有兩層。","options":{"A":"正確。最淺層(角質層)細胞已完全角質化、為無核死細胞。","B":"錯誤。最底層(基底層)細胞最幼嫩、具核且能增生，並未角質化。","C":"錯誤。黑色素細胞位於表皮「基底層(深層)」，不在淺層。","D":"錯誤。厚皮膚表皮五層、薄皮膚四層，薄皮膚並非僅兩層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"107110-N1-1":{"quick":"正解(A)。蘭氏細胞(Langerhans cell)是表皮內的抗原呈現(免疫)細胞，能吞噬並呈現抗原。","detail":{"background":"表皮內除角質細胞外有三種「樹突狀」非角質細胞：①黑色素細胞(melanocyte)＝基底層、製造黑色素抗紫外線；②蘭氏細胞(Langerhans cell)＝多在棘狀層、源自骨髓的樹突狀抗原呈現細胞(屬單核-巨噬系統)，能吞噬、處理並把抗原呈現給T細胞，是皮膚免疫的第一線、過敏性接觸性皮膚炎的關鍵；③梅克爾細胞(Merkel cell)＝基底層、與觸覺神經末梢形成觸覺受器。故蘭氏細胞主功能＝免疫及吞噬(抗原呈現)。","options":{"A":"正確。蘭氏細胞為表皮抗原呈現細胞，具吞噬與免疫(呈現抗原給T細胞)功能。","B":"錯誤。吸收紫外線/製造黑色素是黑色素細胞的功能。","C":"錯誤。接受觸覺是梅克爾細胞(與神經末梢)的功能。","D":"錯誤。儲存能量是脂肪細胞的功能，與蘭氏細胞無關。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"108110-N1-2":{"quick":"正解(C為「錯誤」者)。表皮內不應出現成纖維母細胞(fibroblast)；纖維母細胞是「真皮(結締組織)」的細胞。","detail":{"background":"表皮是上皮組織(角質化複層鱗狀上皮)，其細胞為角質細胞，加上黑色素細胞、蘭氏細胞、梅克爾細胞；表皮「無血管、無纖維母細胞」。纖維母細胞(fibroblast)是結締組織的主要細胞，負責合成膠原與基質，存在於「真皮」而非表皮。本題問「錯誤」敘述：(C)說表皮可見許多纖維母細胞→錯。其餘(A表皮為角質化複層鱗狀上皮)、(B黑色素細胞位基底層)、(D表皮無血管)皆正確。","options":{"A":"正確。表皮由角質化複層鱗狀上皮構成。","B":"正確。黑色素細胞主要位於表皮基底層。","C":"錯誤(即為答案)。纖維母細胞屬真皮(結締組織)細胞，表皮內不應有纖維母細胞。","D":"正確。表皮無血管分布，營養靠真皮微血管擴散供應。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"109030-N1-1":{"quick":"正解(D)。(小)汗腺導管穿越表皮、直接開口於皮膚表面，這是小汗腺的特徵。","detail":{"background":"本題敘述多指「小汗腺(eccrine sweat gland)」：①分布廣，遍布全身(尤以手掌、腳掌、額頭多)，並非只在腋窩乳暈肛門(那是大汗腺)；②汗腺受「交感神經」支配(交感單一支配，無副交感)；③小汗腺以胞吐(merocrine)方式分泌、細胞不解體(細胞解體排出是全泌腺皮脂腺的特徵，非汗腺)；④小汗腺導管螺旋穿越表皮、「直接開口於皮膚表面」(汗孔)。大汗腺則開口於毛囊。故(D)正確。","options":{"A":"錯誤。只分布於腋窩、乳暈、肛門生殖器周圍的是「大(頂泌)汗腺」；小汗腺遍布全身。","B":"錯誤。汗腺受交感神經支配，不受副交感調控。","C":"錯誤。分泌時細胞解體排出是「全泌腺(皮脂腺)」特性；汗腺為胞吐分泌、細胞不解體。","D":"正確。小汗腺導管穿越表皮，直接開口於皮膚表面(汗孔)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"110110-N1-9":{"quick":"正解(D)。網狀層(reticular layer)屬「真皮」的一層，不是表皮的細胞層。","detail":{"background":"表皮(由深至淺)的細胞層為：基底層(stratum basale)→棘狀層(stratum spinosum)→顆粒層(stratum granulosum)→(透明層 stratum lucidum，僅厚皮膚)→角質層(stratum corneum)。而「乳頭層(papillary)」與「網狀層(reticular)」是「真皮」的兩層，不屬表皮。本題問「不是表皮細胞層」者＝(D)網狀層。","options":{"A":"是表皮層。基底層為表皮最深層。","B":"是表皮層。棘狀層位於基底層之上。","C":"是表皮層。顆粒層位於棘狀層之上。","D":"不是表皮層(即為答案)。網狀層屬「真皮」，並非表皮的細胞層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"114170-N1-2":{"quick":"正解(C)。皮脂腺導管大多直接開口於毛囊，皮脂沿毛幹到體表。","detail":{"background":"皮脂腺(sebaceous gland)重點：①為「全泌腺(holocrine)」——細胞整個解體連脂質排出，而非局泌腺(merocrine，後者細胞不受損)；②導管「大多開口於毛囊」，皮脂沿毛幹到皮膚表面(少數特化型如瞼板腺直接開口於體表)；③分泌部(腺泡)位於「真皮」，不在皮下組織；④耵聹腺(外耳道)是特化的「大(頂泌)汗腺」，不是皮脂腺(常考陷阱)。故(C)正確。","options":{"A":"錯誤。皮脂腺是「全泌腺(holocrine)」，不是局部分泌腺(merocrine)。","B":"錯誤。耵聹腺是特化的「頂泌汗腺(大汗腺)」，不是特化皮脂腺；特化皮脂腺是瞼板腺。","C":"正確。皮脂腺導管大多直接開口於毛囊。","D":"錯誤。皮脂腺分泌部位於真皮(常與毛囊相連)，不在皮下組織。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.5 The Integumentary System","Junqueira《Basic Histology》16e, Ch.18 Skin","實用人體解剖學（華杏）皮膚系統章"]}},"101030-N1-1":{"quick":"正解(B)。溶小體(lysosome)內含大量水解酵素(酸性水解酶)，負責胞內消化。","detail":{"background":"溶小體(lysosome)由高爾基體出芽形成，內含逾40種酸性水解酶(蛋白酶、脂酶、核酸酶、醣苷酶等)，最適pH約4.5–5(膜上質子幫浦維持酸性)，負責分解吞噬進來的物質、老舊胞器(自噬autophagy)與細胞外吞噬物(異噬heterophagy)，是細胞的「消化系統」。比較其他胞器的功能：核糖體＝蛋白質合成；細胞核＝遺傳訊息儲存與轉錄；粒線體＝產生ATP(內有少量酶但非分解酵素的主場)。溶小體酶缺陷會造成「溶小體儲積病(如Tay-Sachs、Gaucher、Pompe)」。","options":{"A":"錯誤。核糖體負責蛋白質合成，不含水解酵素。","B":"正確。溶小體富含酸性水解酶，行胞內消化。","C":"錯誤。細胞核儲存DNA、為轉錄場所，非分解酵素所在。","D":"錯誤。粒線體主司氧化磷酸化產能。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"101110-N1-3":{"quick":"正解(C)。胰臟腺泡細胞大量分泌消化酶(蛋白質)，故具發達的粗糙內質網(rER)。","detail":{"background":"粗糙內質網(rough ER)表面附著核糖體，是「外輸性蛋白質(分泌蛋白)」合成、摺疊與初步修飾的場所。凡須大量分泌蛋白質的細胞——胰臟外分泌腺泡細胞(分泌消化酶)、漿細胞(分泌抗體)、纖維母細胞(分泌膠原)——其rER與高爾基體都特別發達。對照：紅血球成熟後無核且幾乎無胞器(以攜氧為主)；硬骨骨細胞(osteocyte)為維持性細胞，分泌量低；皮膚角質層細胞為已死、角質化的無核細胞。故rER最發達者為胰臟腺泡細胞。","options":{"A":"錯誤。成熟紅血球無核、幾無胞器。","B":"錯誤。骨細胞屬維持性細胞，rER不發達。","C":"正確。腺泡細胞大量合成分泌消化酶，rER極發達。","D":"錯誤。角質層為已死角質化細胞，無此構造。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"102030-N1-1":{"quick":"正解(B為「錯誤」者)。胸腔內壁並非「皆」貼附胸膜——胸膜只包覆肺與胸腔的肺所在部分，縱膈區並無胸膜內襯，故(B)錯。","detail":{"background":"漿膜腔與其內襯：①顱腔內壁貼硬腦膜(腦膜最外層緊貼顱骨內面)；②腹腔內壁貼壁層腹膜；③骨盆腔上部亦由腹膜延伸覆蓋。胸腔的胸膜(pleura)只圍成「兩個肺所在的胸膜腔」，分臟層(貼肺)與壁層(貼胸壁、橫膈與縱膈面)；但兩肺之間的「縱膈(mediastinum)」內含心臟(外有心包)、大血管、食道、氣管等，其內壁並非由胸膜貼附——故「胸腔內壁皆貼附胸膜」之敘述不正確。此為漿膜分布的常考陷阱。","options":{"A":"正確。硬腦膜緊貼顱腔內壁。","B":"錯誤(即為答案)。胸膜僅圍兩側胸膜腔(包肺)，縱膈內壁不貼胸膜。","C":"正確。壁層腹膜貼附腹腔內壁。","D":"正確。腹膜向下延伸覆蓋骨盆腔(部分)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.4 The Tissue Level of Organization","Junqueira《Basic Histology》16e, Epithelial & Connective Tissue"]}},"102030-N1-3":{"quick":"正解(B)。骨骼肌儲存Ca²⁺的主要構造是肌漿(質)網(sarcoplasmic reticulum, SR)。","detail":{"background":"肌漿網(SR)是骨骼肌特化的滑面內質網，包繞每條肌原纖維，末端膨大為終池(terminal cisternae)，是Ca²⁺的主要儲存庫。興奮-收縮偶聯：動作電位經肌膜傳入橫小管(T-tubule)→活化終池上的ryanodine receptor→SR釋出Ca²⁺→Ca²⁺與旋轉素(troponin)結合→啟動橫橋循環使肌肉收縮；放鬆時SR膜上的Ca²⁺-ATPase(SERCA)再把Ca²⁺幫回SR。橫小管(A)只負責把電訊號傳入細胞深部，非儲鈣；粒線體可少量緩衝鈣但非主場；高基氏體與鈣儲存無關。","options":{"A":"錯誤。橫小管傳遞動作電位入細胞深部，不儲鈣。","B":"正確。肌漿網(SR終池)是骨骼肌主要鈣儲庫。","C":"錯誤。粒線體僅少量緩衝鈣，非主要儲存。","D":"錯誤。高基氏體司蛋白質包裝運送，與儲鈣無關。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"102110-N1-3":{"quick":"正解(C)。橫小管(T-tubule)是肌膜內凹形成的傳訊構造，不屬細胞骨架。","detail":{"background":"細胞骨架(cytoskeleton)由三種蛋白絲組成：①微絲(microfilament，肌動蛋白actin，直徑約7nm)＝細胞運動、變形、收縮、微絨毛支撐；②中間絲(intermediate filament，約10nm)＝提供機械強度(如角蛋白、結蛋白desmin、神經絲)；③微小管(microtubule，由tubulin組成，約25nm，三者中最粗)＝胞內運輸軌道、紡錘絲、纖毛/鞭毛軸絲、維持細胞形狀。橫小管(T-tubule)是肌纖維細胞膜向內凹陷形成的管道，功能是把動作電位傳入細胞深部，屬「膜系統」而非細胞骨架。","options":{"A":"是骨架。微絲(actin)。","B":"是骨架。中間絲。","C":"不是骨架(即為答案)。橫小管屬肌膜內陷的膜系統。","D":"是骨架。微小管(tubulin)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"103030-N1-14":{"quick":"正解(C)。口咽(oropharynx)為食物與空氣共同通道、易受摩擦，內襯「複層扁平(鱗狀)上皮」以耐磨。","detail":{"background":"上皮依功能分布與摩擦強度而異：①承受摩擦的部位(口腔、咽、食道、肛管、陰道、皮膚表皮)＝複層扁平(鱗狀)上皮，耐磨保護；②吸收/分泌部位(胃到大腸、膽囊)＝單層柱狀；③濾過/擴散部位(肺泡、血管內皮、腎絲球)＝單層扁平；④腺體導管常為單/複層立方。咽分三段：鼻咽(呼吸道、偽複層纖毛柱狀)、口咽與喉咽(消化呼吸共用、摩擦大→複層扁平鱗狀)。故口咽內襯為複層扁平上皮。","options":{"A":"錯誤。單層立方多見於腺體導管、腎小管。","B":"錯誤。單層柱狀見於胃腸吸收分泌部。","C":"正確。口咽耐摩擦，為複層扁平(鱗狀)上皮。","D":"錯誤。複層立方少見，主要在大腺體導管。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.4 The Tissue Level of Organization","Junqueira《Basic Histology》16e, Epithelial & Connective Tissue"]}},"103030-N1-3":{"quick":"正解(B)。硬腦膜為緻密結締組織，富含高比例膠原纖維，最為堅韌。","detail":{"background":"膠原纖維(collagen fiber)提供抗拉強度。富含膠原、屬「緻密結締組織」者：肌腱、韌帶、硬腦膜、真皮網狀層等，其中硬腦膜(dura mater)由緻密膠原纖維構成、極堅韌。對照：淋巴結以網狀纖維(reticular fiber)為支架、富含淋巴球；主動脈壁富含「彈性纖維(elastic fiber)」(屬彈性動脈，可緩衝血壓搏動)而非以膠原為主；氣管黏膜為偽複層纖毛柱狀上皮加疏鬆結締組織與軟骨。故膠原比例最高者為硬腦膜。","options":{"A":"錯誤。淋巴結以網狀纖維為主。","B":"正確。硬腦膜為緻密膠原結締組織。","C":"錯誤。主動脈壁以彈性纖維為主(彈性動脈)。","D":"錯誤。氣管黏膜以上皮+疏鬆結締+軟骨為主。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.4 The Tissue Level of Organization","Junqueira《Basic Histology》16e, Epithelial & Connective Tissue"]}},"104030-N1-1":{"quick":"正解(C)。指甲是「表皮角質化」的衍生物(上皮)，不屬結締組織。","detail":{"background":"結締組織(connective tissue)的共同特徵＝細胞少、細胞間質(基質+纖維)多，源自中胚層間葉。其家族包括：固有結締組織(疏鬆、緻密、脂肪、網狀)、支持性結締組織(軟骨、硬骨)，以及液態結締組織(血液、淋巴)。故硬骨、軟骨、血液皆屬結締組織。指甲(以及毛髮、表皮)是「角質化的複層鱗狀上皮(表皮)衍生物」，屬上皮組織，不是結締組織。","options":{"A":"屬結締組織。硬骨為支持性結締組織。","B":"屬結締組織。軟骨為支持性結締組織。","C":"不屬結締組織(即為答案)。指甲是表皮角質化衍生物，屬上皮。","D":"屬結締組織。血液為液態結締組織。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.4 The Tissue Level of Organization","Junqueira《Basic Histology》16e, Epithelial & Connective Tissue"]}},"104100-N1-1":{"quick":"正解(C為「錯誤」者)。骨骼表面並非包覆上皮，而是包覆「骨膜(緻密結締組織)」，故(C)錯。","detail":{"background":"上皮組織(epithelium)覆蓋體表、內襯體腔與管腔、構成腺體。正確分布：①漿膜(心包腔、胸膜腔、腹膜腔)的內襯為單層扁平上皮(間皮)；②體表覆蓋表皮(複層鱗狀上皮)；③整條消化道(口到肛)內襯上皮。錯誤者(C)：骨骼表面包覆的是「骨膜(periosteum)」，屬緻密結締組織(內含成骨細胞)，並非上皮。此題考上皮 vs 結締組織覆蓋面的辨別。","options":{"A":"正確。心包腔內襯間皮(單層扁平上皮)。","B":"正確。體表覆蓋表皮(上皮)。","C":"錯誤(即為答案)。骨表面包覆骨膜(結締組織)，非上皮。","D":"正確。整條消化道內襯上皮。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.4 The Tissue Level of Organization","Junqueira《Basic Histology》16e, Epithelial & Connective Tissue"]}},"105090-N1-3":{"quick":"正解(D)。細胞(cell)是生物體結構與功能的最基本單位。","detail":{"background":"人體結構層級由小到大：化學層(原子、分子，如DNA、蛋白質)→細胞層(cell)→組織層(tissue)→器官層(organ)→系統層(system)→個體(organism)。其中「細胞」是能獨立表現生命現象(代謝、生長、繁殖、反應)的最小結構與功能單位。細胞核、細胞質、細胞膜只是細胞的「組成部分」，本身不能算獨立的生命基本單位。","options":{"A":"錯誤。細胞核是細胞的一部分。","B":"錯誤。細胞質是細胞的一部分。","C":"錯誤。細胞膜是細胞的邊界構造。","D":"正確。細胞是生命結構與功能的最基本單位。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"106111-N1-1":{"quick":"正解(C)。腦下腺後葉(神經垂體)源自「神經外胚層(間腦下伸)」，由神經組織構成，非上皮衍生。","detail":{"background":"內分泌腺多由上皮內陷/增生衍生(屬上皮性腺體)：甲狀腺源自咽底內胚層上皮、胰臟腺泡源自前腸內胚層上皮、腎上腺皮質源自中胚層體腔上皮。唯獨「腦下腺後葉(神經垂體, neurohypophysis)」是間腦(下視丘)向下延伸的「神經外胚層」構造，由神經膠細胞樣的垂體細胞與下視丘神經元軸突末梢組成，儲存並釋放ADH與催產素——並非上皮衍生。腦下腺前葉(腺垂體)才源自口凹外胚層上皮(Rathke囊)。","options":{"A":"是上皮衍生。甲狀腺源自咽底內胚層上皮。","B":"是上皮衍生。胰腺泡源自前腸內胚層上皮。","C":"不是上皮衍生(即為答案)。後葉源自神經外胚層(下視丘延伸)。","D":"是上皮衍生。腎上腺皮質源自中胚層體腔上皮。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"107030-N1-16":{"quick":"正解(B)。神經元受傷後，胞質內的「尼氏體(Nissl body)」會溶解消失，稱染色質溶解(chromatolysis)。","detail":{"background":"尼氏體(Nissl body)是神經元胞體與樹突內成堆的粗糙內質網與游離核糖體，是神經元旺盛合成蛋白質的表徵。當軸突受傷(如切斷)，神經元啟動修復反應，胞體腫脹、細胞核偏移到周邊，尼氏體分散、溶解消失，稱為「染色質(尼氏體)溶解 chromatolysis」——是神經損傷的經典病理徵象，代表細胞由「合成神經傳遞物」轉為「合成修復軸突所需蛋白」。高基氏體、粒線體、核糖體在此情境不以「溶解」為特徵。","options":{"A":"錯誤。高基氏體非chromatolysis的標的。","B":"正確。尼氏體溶解(chromatolysis)為神經損傷經典表現。","C":"錯誤。粒線體非此現象主角。","D":"錯誤。核糖體雖為尼氏體成分，但描述此現象的專名是尼氏體溶解。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"107030-N1-8":{"quick":"正解(B)。有絲分裂中期(metaphase)染色體排列於赤道板(中期板)。","detail":{"background":"有絲分裂(mitosis)分四期：前期(prophase)染色質濃縮成染色體、核膜消失、紡錘體形成；中期(metaphase)染色體(各含兩姊妹染色分體)藉著絲點與紡錘絲連結，排列在細胞中央的「赤道板(metaphase plate)」上，是觀察染色體型(karyotype)的最佳時機；後期(anaphase)姊妹染色分體分離、被拉向兩極；末期(telophase)核膜重建、染色體解旋、接著胞質分裂。故排列於赤道板者為中期。","options":{"A":"錯誤。前期為染色體濃縮、核膜消失。","B":"正確。中期染色體排列於赤道板。","C":"錯誤。後期姊妹染色分體分向兩極。","D":"錯誤。末期核膜重建、分裂完成。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"107110-N1-3":{"quick":"正解(B)。肌肉(尤其骨骼肌)收縮時代謝旺盛，是人體產熱(體溫維持)的主要來源。","detail":{"background":"人體在安靜時由肝、腦、心等代謝產熱；而在活動或寒冷顫抖時，「骨骼肌」收縮(包括不自主的顫抖thermogenesis)成為產熱最大宗，可使代謝產熱增加數倍，是維持體溫的主要機制。骨骼僅為支持、神經主訊息傳遞、循環負責「散布/運送」熱量(把核心熱帶到體表)而非主要產熱。新生兒另有棕色脂肪行非顫抖性產熱。本題以「組織/系統」層次比較，產大量熱者為肌肉。","options":{"A":"錯誤。骨骼主支持與保護。","B":"正確。肌肉收縮是主要產熱來源。","C":"錯誤。循環負責運送/重分布熱量，非主要產熱。","D":"錯誤。神經主訊息傳導。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"108020-N1-1":{"quick":"正解(D)。主支氣管內襯偽複層纖毛柱狀上皮，具纖毛(黏液纖毛清除)。","detail":{"background":"纖毛(cilia)見於需要「定向推送黏液或物質」的上皮：呼吸道(鼻、氣管、主支氣管)的偽複層纖毛柱狀上皮以纖毛擺動把黏液與灰塵向咽部推送(黏液纖毛梯mucociliary escalator)；輸卵管纖毛把卵子推向子宮。對照：尿道為複層/移行上皮無纖毛；輸精管內襯具「靜纖毛(stereocilia，是長微絨毛非真纖毛，不會擺動)」；十二指腸為單層柱狀加「微絨毛(brush border)」非纖毛。故具真纖毛者為主支氣管。","options":{"A":"錯誤。尿道無纖毛。","B":"錯誤。輸精管有「靜纖毛」(微絨毛)非真纖毛。","C":"錯誤。十二指腸有微絨毛(刷狀緣)非纖毛。","D":"正確。主支氣管為偽複層纖毛柱狀上皮，具纖毛。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"108110-N1-1":{"quick":"正解(A)。去氧核糖核酸(DNA)是分子，屬「化學」層級。","detail":{"background":"人體結構層級：化學層(chemical level)＝原子與分子(水、蛋白質、醣、脂質、核酸DNA/RNA)→細胞層→組織層→器官層→系統層→個體。DNA是由核苷酸聚合而成的「大分子」，屬最基礎的化學層級，不是細胞、組織或器官。","options":{"A":"正確。DNA是分子，屬化學層級。","B":"錯誤。細胞層是由分子組成的更高層級。","C":"錯誤。組織由細胞群構成。","D":"錯誤。器官由多種組織構成。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"108110-N1-13":{"quick":"正解(C為「錯誤」者)。膽囊內襯為「單層柱狀上皮」(利於吸收水分濃縮膽汁)，非複層鱗狀上皮。","detail":{"background":"各器官上皮配對：食道＝複層鱗狀(耐摩擦)；胃到大腸＝單層柱狀(吸收分泌)；膽囊＝單層柱狀(具微絨毛，吸收水分濃縮膽汁)；升結腸＝單層柱狀(含杯狀細胞)。本題問「錯誤」配對：(C)膽囊寫成複層鱗狀上皮是錯的，應為單層柱狀。其餘(A)食道複層鱗狀、(B)胃單層柱狀、(D)升結腸單層柱狀皆正確。","options":{"A":"正確。食道為複層鱗狀上皮。","B":"正確。胃為單層柱狀上皮。","C":"錯誤(即為答案)。膽囊為單層柱狀上皮，非複層鱗狀。","D":"正確。升結腸為單層柱狀上皮。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.4 The Tissue Level of Organization","Junqueira《Basic Histology》16e, Epithelial & Connective Tissue"]}},"109030-N1-2":{"quick":"正解(D)。粒線體(mitochondria)行氧化磷酸化，是製造ATP的主要場所(細胞發電廠)。","detail":{"background":"粒線體具雙層膜，內膜向內摺成嵴(cristae)以增大表面積，是電子傳遞鏈與ATP合成酶所在；基質含克氏循環酶與自身環狀DNA。葡萄糖經糖解(細胞質)→丙酮酸進入粒線體行克氏循環與氧化磷酸化，產生絕大多數ATP，故粒線體被稱細胞「發電廠」。核糖體合成蛋白質、溶小體行消化、高爾基體行包裝運送，皆非主要產能胞器。","options":{"A":"錯誤。核糖體合成蛋白質。","B":"錯誤。溶小體行胞內消化。","C":"錯誤。高爾基體司包裝運送。","D":"正確。粒線體是ATP主要製造場所。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"110110-N1-1":{"quick":"正解(D為「錯誤」者)。細胞膜主要成分為磷脂質、蛋白質與碳水化合物(醣脂/醣蛋白)，「不含核酸」。","detail":{"background":"細胞膜為流體鑲嵌模型(fluid mosaic model)：基本骨架是磷脂雙層(phospholipid bilayer，親水頭朝外、疏水尾朝內)，鑲嵌膜蛋白(運輸、受體、酶、辨識)，外側並有與脂質/蛋白結合的碳水化合物(醣脂、醣蛋白)構成醣萼(glycocalyx)，膽固醇調節流動性。核酸(DNA/RNA)存在於細胞核、粒線體與核糖體，「不是細胞膜的成分」。故(D)核酸為錯誤選項。","options":{"A":"是成分。碳水化合物(醣脂/醣蛋白)位於膜外側。","B":"是成分。膜蛋白執行運輸/受體/酶功能。","C":"是成分。磷脂質為膜的基本骨架。","D":"不是成分(即為答案)。核酸不存在於細胞膜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"111030-N1-1":{"quick":"正解(B)。內質網(ER)是由膜構成的管網系統，屬膜性胞器。","detail":{"background":"依是否有膜可分：①膜性胞器＝內質網、高爾基體、溶小體、粒線體、過氧化體、核膜等，由磷脂膜圍成；②非膜性胞器＝核糖體(蛋白質+rRNA)、核仁(rRNA合成處)、中心粒/中心體(微小管)、細胞骨架。本題問「主要由膜構成」者：內質網(B)是連續的膜管/膜囊網。核仁、核糖體、中心粒皆無膜。","options":{"A":"錯誤。核仁無膜(rRNA合成處)。","B":"正確。內質網由膜構成。","C":"錯誤。核糖體無膜。","D":"錯誤。中心粒由微小管構成、無膜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"111110-N1-19":{"quick":"正解(B)。超女性症(XXX)有三條X染色體，去活化兩條，故巴氏體可達2個(>1)。","detail":{"background":"巴氏體(Barr body)是體細胞中「去活化(失去活性)的X染色體」濃縮形成的染色質塊。巴氏體數目＝X染色體數－1。正常女性XX→1個；正常男性XY→0個；透納氏症(Turner, 45,X)→0個；柯林菲特氏症(Klinefelter, 47,XXY)→1個；超女性症(super female, 47,XXX)→2個。故唯一「超過一個」者為超女性症。","options":{"A":"錯誤。正常女性XX→1個。","B":"正確。超女性XXX→2個(>1)。","C":"錯誤。透納氏症45,X→0個。","D":"錯誤。柯林菲特47,XXY→1個。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"112180-N1-2":{"quick":"正解(D)。高爾基體(Golgi)負責修飾、分類、包裝並運送蛋白質與脂質。","detail":{"background":"高爾基體(Golgi complex)是一疊扁平膜囊，有順面(cis，接收rER來的運輸囊泡)與反面(trans，出貨面)。功能：把內質網合成的蛋白質與脂質進一步「醣基化等修飾→分類→包裝成分泌囊泡或溶小體→運送」到目的地(分泌外送、送到膜上、形成溶小體)，是細胞的「郵局/包裝中心」。粒線體產能、過氧化體分解過氧化氫與長鏈脂肪酸、溶小體消化，皆非包裝運送的主角。","options":{"A":"錯誤。粒線體產能。","B":"錯誤。過氧化體分解H₂O₂與脂肪酸。","C":"錯誤。溶小體行胞內消化。","D":"正確。高爾基體修飾、分類、包裝並運送蛋白質與脂質。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"113030-N1-1":{"quick":"正解(A)。粒線體具「雙層膜(內外兩層)」，是雙層膜胞器。","detail":{"background":"雙層膜胞器：粒線體(外膜+內摺成嵴的內膜)、細胞核(雙層核膜)、葉綠體(植物)。單層膜胞器：內質網、高爾基體、溶小體、過氧化體、囊泡。無膜：核糖體、中心粒。本題選項中只有粒線體為雙層膜；溶酶體、過氧化體為單層膜；核糖體無膜。","options":{"A":"正確。粒線體為雙層膜。","B":"錯誤。溶酶體為單層膜。","C":"錯誤。過氧化體為單層膜。","D":"錯誤。核糖體無膜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"113030-N1-6":{"quick":"正解(B)。柯林菲特氏症為47,XXY，X染色體2條，巴氏體＝X數－1＝1個。","detail":{"background":"巴氏體數目＝X染色體數－1。柯林菲特氏症(Klinefelter syndrome)核型為47,XXY，有2條X，故白血球核旁可見1個巴氏體(正常男性XY則0個)，這也是其細胞遺傳學鑑定的特徵。對照：正常女性XX→1、超女性XXX→2、透納45,X→0。","options":{"A":"錯誤。0個為正常男性或透納氏症(45,X)。","B":"正確。XXY→2條X→巴氏體1個。","C":"錯誤。2個見於超女性(XXX)。","D":"錯誤。3個需4條X(48,XXXX)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"113100-N1-11":{"quick":"正解(A)。骨骼肌收縮所需Ca²⁺主要由肌漿(質)網(SR)釋出。","detail":{"background":"興奮-收縮偶聯：動作電位沿肌膜傳到橫小管→觸發肌漿網(SR)終池上的ryanodine receptor開放→SR釋放儲存的Ca²⁺到肌漿→Ca²⁺結合旋轉素(troponin C)、使旋轉肌球素(tropomyosin)移位、露出肌動蛋白上的結合位→橫橋循環產生收縮；放鬆時SERCA幫浦把Ca²⁺回收進SR。故鈣的主要來源為肌漿質網，而非細胞核、溶小體或高基氏體。","options":{"A":"正確。肌漿質網(SR)為骨骼肌收縮鈣的主要來源。","B":"錯誤。細胞核與供鈣無關。","C":"錯誤。溶小體行消化。","D":"錯誤。高基氏體司包裝運送。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"113180-N1-4":{"quick":"正解(D)。DNA中腺嘌呤(A)與胸腺嘧啶(T)互補配對(A=T，兩個氫鍵)。","detail":{"background":"DNA雙股螺旋的鹼基互補配對(Chargaff法則)：腺嘌呤(A)–胸腺嘧啶(T)以「兩個氫鍵」配對；鳥糞嘌呤(G)–胞嘧啶(C)以「三個氫鍵」配對(G-C較穩定)。嘌呤(A、G，雙環)永遠配嘧啶(T、C，單環)以維持螺旋寬度一致。RNA中則以尿嘧啶(U)取代T與A配對。故腺嘌呤的互補對象為胸腺嘧啶。","options":{"A":"錯誤。A不與A配(嘌呤配嘌呤不成立)。","B":"錯誤。G與C配對。","C":"錯誤。C與G配對。","D":"正確。A與T(胸腺嘧啶)配對。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"114100-N1-2":{"quick":"正解(D)。肌原纖維(myofibril)由眾多肌絲集合而成，直徑遠大於單一細胞骨架絲。","detail":{"background":"比較直徑：微絲(microfilament，actin)約7nm < 中間絲(intermediate filament)約10nm < 微小管(microtubule)約25nm；而「肌原纖維(myofibril)」是由成千上萬條粗(肌球蛋白)、細(肌動蛋白)肌絲規則排列集合成的「肌原纖維束」，直徑約1–2μm(微米)，比三種細胞骨架絲(奈米級)大上百倍，故直徑最大。此題在比較「單一蛋白絲」與「肌絲集合體」的尺度差異。","options":{"A":"錯誤。微絲約7nm，最細。","B":"錯誤。微小管約25nm。","C":"錯誤。中間絲約10nm。","D":"正確。肌原纖維為肌絲集合體，直徑(μm級)最大。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"114170-N1-1":{"quick":"正解(D)。粒線體具雙層膜(外膜+內膜)，為雙層膜胞器。","detail":{"background":"雙層膜胞器＝粒線體與細胞核。核糖體無膜(蛋白質+rRNA)；高爾基氏體與溶小體為單層膜。故四選項中具雙層膜者為粒線體。粒線體內膜向內摺成嵴以增大表面積，承載電子傳遞鏈與ATP合成酶，是細胞主要產能場所。","options":{"A":"錯誤。核糖體無膜。","B":"錯誤。高爾基體為單層膜。","C":"錯誤。溶小體為單層膜。","D":"正確。粒線體為雙層膜胞器。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.3 The Cellular Level of Organization","Junqueira《Basic Histology》16e","實用人體解剖學（華杏）細胞與組織章"]}},"101030-N1-4":{"quick":"正解(C)。鼻中隔由「篩骨垂直板」與「犁骨」(加上前方鼻中隔軟骨)構成。","detail":{"background":"鼻中隔(nasal septum)把鼻腔分為左右。骨性鼻中隔由兩塊骨組成：上後方的「篩骨垂直板(perpendicular plate of ethmoid)」與下後方的「犁骨(vomer)」，前方則由鼻中隔軟骨補成。枕骨、蝶骨體、顳骨皆不參與鼻中隔。臨床上鼻中隔彎曲多發生在骨與軟骨交界。","options":{"A":"錯誤。枕骨位於後顱，與鼻中隔無關。","B":"錯誤。蝶骨位於顱底中央，不構成鼻中隔。","C":"正確。篩骨垂直板是鼻中隔的一部分。","D":"錯誤。顳骨在顱側，含內耳，不構成鼻中隔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"101030-N1-5":{"quick":"正解(A)。股骨長度遠大於寬度，屬「長骨(long bone)」。","detail":{"background":"骨依形狀分五類：①長骨(long bone)＝長度>寬度，有骨幹(diaphysis)與兩端骨骺(epiphysis)，如股骨、肱骨、脛骨、指(趾)骨；②短骨(short bone)＝長寬相近的立方形，如腕骨、跗骨；③扁平骨(flat bone)＝保護內臟，如顱蓋骨、肋骨、胸骨、肩胛骨；④不規則骨＝形狀複雜，如椎骨、顏面骨；⑤種子骨(sesamoid)＝埋於肌腱內，如髕骨。股骨是人體最長最強的長骨。","options":{"A":"正確。股骨為長骨。","B":"錯誤。短骨為腕骨、跗骨之類。","C":"錯誤。扁平骨如顱骨、肋骨。","D":"錯誤。種子骨如髕骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"101110-N1-1":{"quick":"正解(C)。髕韌帶屬緻密結締組織，主要由膠原纖維構成，抗拉強度高。","detail":{"background":"韌帶(ligament)與肌腱(tendon)同為「緻密規則結締組織」，主成分是平行排列的「膠原纖維(第一型膠原)」，提供高抗拉強度，連結骨與骨(韌帶)或肌與骨(肌腱)。髕韌帶(patellar ligament)是股四頭肌肌腱越過髕骨後延續到脛骨粗隆的部分，承受強大張力，富含膠原纖維。彈性纖維為主者見於「彈性韌帶(如黃韌帶)」與彈性動脈，非髕韌帶。","options":{"A":"錯誤。弓狀纖維非組織學分類名稱。","B":"錯誤。網狀纖維為淋巴器官支架。","C":"正確。髕韌帶以膠原纖維為主。","D":"錯誤。彈性纖維為主者如黃韌帶。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"101110-N1-5":{"quick":"正解(B)。距骨(talus)位於足弓頂端，承接脛骨傳來的體重並向前後分散。","detail":{"background":"足弓(arch of foot)包括內側縱弓、外側縱弓與橫弓，可吸震與分散體重。內側縱弓由跟骨、距骨、舟狀骨、三塊楔骨與第1–3蹠骨組成；其中「距骨(talus)」位於弓的最高點(楔石位置)，上方與脛、腓骨形成踝關節接收體重，再經距骨頭把力分散到前足與後足跟骨。骰骨、舟狀骨位置較低，跟骨為後足著地點。","options":{"A":"錯誤。跟骨為後足著地點，位置低。","B":"正確。距骨位於足弓最高點。","C":"錯誤。骰骨在外側縱弓，位置不高。","D":"錯誤。舟狀骨在內側，但非最高。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"102030-N1-5":{"quick":"正解(D)。足踝過度「外翻」最易拉傷內側的足踝內韌帶(三角韌帶 deltoid ligament)。","detail":{"background":"踝關節扭傷的方向決定受損韌帶：①過度「內翻(inversion)」(最常見)＝拉傷「外側韌帶(尤其前距腓韌帶)」；②過度「外翻(eversion)」＝拉傷「內側的三角韌帶(deltoid/medial ligament)」，因三角韌帶強韌，外翻暴力常合併內踝撕脫骨折。前十字韌帶、脛/腓側副韌帶屬膝關節。本題外翻→足踝內(三角)韌帶受損。","options":{"A":"錯誤。前十字韌帶屬膝關節。","B":"錯誤。脛骨側副韌帶屬膝關節。","C":"錯誤。腓骨側(膝外側)韌帶屬膝關節。","D":"正確。外翻拉傷足踝內(三角)韌帶。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"102030-N1-6":{"quick":"正解(D)。蝶骨形狀複雜，屬「不規則骨」。","detail":{"background":"蝶骨(sphenoid bone)位於顱底中央，外形似展翅蝴蝶，含蝶骨體、大翼、小翼與翼突，形狀複雜，歸「不規則骨」。同類不規則骨還有椎骨、顏面骨(篩骨、顴骨等)、薦骨。它不是長骨(無骨幹兩骺)、不是短骨(非立方)、也非單純扁平骨。","options":{"A":"錯誤。長骨如股骨。","B":"錯誤。短骨如腕骨。","C":"錯誤。扁平骨如顱蓋骨。","D":"正確。蝶骨為不規則骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"102110-N1-2":{"quick":"正解(D)。腹部九分區的下水平線「通過左右髂骨結節(髂結節間線)」，劃分臍區與腹下(恥)區。","detail":{"background":"腹部九分區由兩條垂直線(左右鎖骨中線/腹直肌外緣)與兩條水平線界定：上水平線＝「肋下線(subcostal line，通過第10肋軟骨/L3)」分上腹與中段；下水平線＝「髂結節間線(intertubercular/transtubercular line，通過左右髂骨結節，約L5)」分中段(臍區與左右腰區)與下段(腹下/恥區與左右髂窩區)。故劃分臍區與腹下區的是通過左右髂骨結節的水平線。","options":{"A":"錯誤。髂前上棘連線(髂前上棘間線)是另一種四分法用線。","B":"錯誤。通過肚臍的垂直線非九分區用線。","C":"錯誤。肋骨下緣水平線是上水平線(分上腹與中段)。","D":"正確。髂骨結節間水平線分臍區與腹下區。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"102110-N1-4":{"quick":"正解(C)。人體最大的囟門為前囟(額囟)，介於額骨與頂骨(冠狀縫與矢狀縫交會處)。","detail":{"background":"囟門(fontanelle)是新生兒顱骨間尚未骨化的膜性區，方便產道塑形與腦部生長。前囟(anterior fontanelle，又稱額囟)位於兩額骨與兩頂骨之間(冠狀縫、矢狀縫、額縫交點)，呈菱形、最大，約12–18個月閉合，是臨床評估脫水(凹陷)或顱內壓升高(膨出)的窗口。後囟(枕骨與頂骨之間)較小、約2個月閉合。","options":{"A":"錯誤。顳骨與頂骨間為前外側囟(蝶囟)，較小。","B":"錯誤。枕骨與頂骨間為後囟，較小。","C":"正確。額骨與頂骨間為前囟，最大。","D":"錯誤。蝶骨與頂骨間為蝶囟，小。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"102110-N1-5":{"quick":"正解(C)。橈神經溝(radial groove)位於肱骨後面，橈神經沿此溝走行。","detail":{"background":"橈神經溝(radial/spiral groove)是肱骨體後面一道斜溝，橈神經與肱深動脈沿其走行。臨床重點：肱骨體中段骨折常傷及此處的橈神經，造成「垂腕(wrist drop)」與手背橈側感覺異常。此溝在肱骨而非橈骨、尺骨或肩胛骨——名稱易誤導(「橈神經」溝在「肱骨」上)。","options":{"A":"錯誤。橈骨上無此溝。","B":"錯誤。尺骨上無此溝。","C":"正確。橈神經溝在肱骨後面。","D":"錯誤。肩胛骨非此溝所在。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"102110-N1-6":{"quick":"正解(B)。踝關節由脛骨、腓骨下端與「距骨(talus)」滑車構成。","detail":{"background":"踝(距小腿)關節是脛骨下端與內踝、腓骨外踝形成的「榫眼(mortise)」夾住「距骨滑車」所成的屈戍(鉸鏈)關節，可背屈/蹠屈。組成骨＝脛骨+腓骨+距骨。跟骨、骰骨、舟狀骨參與的是其下方的距下關節與跗骨間關節，不直接構成踝關節。","options":{"A":"錯誤。跟骨參與距下關節。","B":"正確。距骨與脛、腓骨構成踝關節。","C":"錯誤。骰骨屬跗骨間關節。","D":"錯誤。舟狀骨屬跗骨間關節。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"103030-N1-5":{"quick":"正解(C)。顳骨內含內耳(與中耳)，故「內耳所在處」正確。","detail":{"background":"顳骨(temporal bone)位於顱側下方，其岩部(petrous part)內藏「內耳(耳蝸、前庭、半規管)與中耳」，並有外耳道、乳突、莖突、頸動脈管、頸靜脈孔等構造，與下頜骨形成顳顎關節。它不參與前顱窩(由額骨、篩骨、蝶骨小翼組成)；顳骨與頂骨間為鱗狀縫(與額骨無直接骨縫相鄰一般說法是與頂、枕、蝶骨相接)；顳骨「不含」副鼻竇(副鼻竇在額、篩、蝶、上頜骨)。故正確敘述為內耳所在處。","options":{"A":"錯誤。前顱窩由額骨、篩骨、蝶骨小翼組成，非顳骨。","B":"錯誤。顳骨主要與頂、枕、蝶骨相接，非與額骨形成主要骨縫。","C":"正確。顳骨岩部內含內耳。","D":"錯誤。顳骨不含副鼻竇。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"103100-N1-4":{"quick":"正解(B為「不圍成」者)。薦岬(sacral promontory)是骨盆「入口」的界標，不圍成骨盆「出口」。","detail":{"background":"骨盆出口(pelvic outlet)的邊界由後方「尾骨」、兩側「坐骨粗隆與薦結節韌帶」、前方「恥骨聯合下緣與恥骨弓」圍成，是分娩時胎兒娩出的下口。「薦岬(sacral promontory，第1薦椎前上緣)」是骨盆「入口(界線/分界線)」的後界標，並非骨盆出口的組成。故問「不圍成骨盆出口」者為薦岬。","options":{"A":"圍成出口。尾骨為出口後界。","B":"不圍成出口(即為答案)。薦岬屬骨盆入口界標。","C":"圍成出口。坐骨粗隆為出口側界。","D":"圍成出口。恥骨聯合下緣為出口前界。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"103100-N1-5":{"quick":"正解(D)。網球肘的壓痛點在「肱骨外上髁」——前臂後側伸肌群的共同起點。","detail":{"background":"網球肘(lateral epicondylitis)＝前臂伸腕肌群(尤其橈側腕短伸肌)共同起點處的肌腱病變/發炎，這些淺層伸肌共同起於「肱骨外上髁(lateral epicondyle)」，故壓痛與疼痛集中於外上髁。相對地，高爾夫球肘(內上髁炎)在內上髁(屈肌總起點)。鷹嘴、橈骨頭、尺骨粗隆皆非伸肌總起點。","options":{"A":"錯誤。鷹嘴為尺骨近端後突。","B":"錯誤。橈骨頭參與肘關節旋轉。","C":"錯誤。尺骨粗隆為肱肌附著處。","D":"正確。肱骨外上髁為前臂伸肌總起點，網球肘壓痛點。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"104030-N1-4":{"quick":"正解(B)。第2肋軟骨在「胸骨角(sternal angle)」與胸骨形成關節。","detail":{"background":"胸骨角(sternal angle, angle of Louis)是胸骨柄與胸骨體交界處的橫向隆起，臨床上是重要體表標誌：①第2肋軟骨在此與胸骨相接(故用以從前胸數肋骨);②約對應第4–5胸椎間;③為氣管分叉、主動脈弓起止、上下縱膈分界的水平。第1肋軟骨接胸骨柄，第3肋以下接胸骨體。","options":{"A":"錯誤。胸骨柄接第1肋軟骨。","B":"正確。胸骨角接第2肋軟骨。","C":"錯誤。胸骨體接第3肋以下。","D":"錯誤。胸骨上切迹為頸靜脈切迹，不接肋軟骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"104100-N1-14":{"quick":"正解(A)。成人脊髓末端(脊髓圓錐)約止於第1、2腰椎之間(L1–L2)。","detail":{"background":"胚胎早期脊髓與脊柱等長，但出生後脊柱生長較快，脊髓「相對上移」，成人脊髓末端(脊髓圓錐conus medullaris)約止於L1–L2椎間，其下為馬尾(cauda equina)。臨床意義：腰椎穿刺選在L3–L4或L4–L5(髂嵴最高點連線約過L4)進針，可避開脊髓、只穿過馬尾(神經根可被推開)，較安全。新生兒脊髓末端較低(約L3)。","options":{"A":"正確。成人脊髓末端約在L1–L2之間。","B":"錯誤。L2–L3已為馬尾區。","C":"錯誤。L3–L4為腰椎穿刺部位。","D":"錯誤。L4–L5亦為穿刺部位。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"104100-N1-4":{"quick":"正解(A)。跟骨(calcaneus)同時參與內側縱弓與外側縱弓的形成。","detail":{"background":"足部內側縱弓(較高)由跟骨—距骨—舟狀骨—三楔骨—第1~3蹠骨組成；外側縱弓(較低)由跟骨—骰骨—第4、5蹠骨組成。「跟骨」是兩弓共同的後足基石，同時參與內、外側縱弓。距骨、舟狀骨、楔骨主要在內側弓；骰骨在外側弓。","options":{"A":"正確。跟骨同時參與內、外側縱弓。","B":"錯誤。距骨主要在內側弓。","C":"錯誤。骰骨在外側弓。","D":"錯誤。楔骨在內側弓。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"104100-N1-5":{"quick":"正解(B)。蝶骨(大翼小翼及體部)同時參與前顱窩與中顱窩的形成。","detail":{"background":"顱底分三窩：前顱窩(額葉所在)由額骨眶板、篩骨篩板、「蝶骨小翼」組成；中顱窩(顳葉所在)由「蝶骨大翼與蝶骨體(含腦下垂體窩)」及顳骨岩部組成；後顱窩由枕骨與顳骨岩部組成。蝶骨小翼界於前、中顱窩之間，蝶骨同時參與前顱窩(小翼)與中顱窩(大翼、體)。篩骨只在前顱窩、額骨只在前顱窩、顳骨只在中後顱窩。","options":{"A":"錯誤。篩骨只在前顱窩。","B":"正確。蝶骨參與前顱窩(小翼)與中顱窩(大翼、體)。","C":"錯誤。額骨只在前顱窩。","D":"錯誤。顳骨在中、後顱窩。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"105030-N1-3":{"quick":"正解(D為「錯誤」者)。蝶骨不與第一頸椎(寰椎)形成關節；與寰椎相接的是枕骨(枕骨髁)。","detail":{"background":"蝶骨特徵：①含蝶竇(屬副鼻竇)；②上面中央有蝶鞍，其凹為「腦下垂體窩(垂體窩)」容納腦下垂體；③有視神經管、眶上裂等與「眼眶」相通；④它位於顱底中央但不參與寰枕關節。寰枕關節(可點頭)由「枕骨髁」與寰椎(C1)上關節面構成，與蝶骨無關。故(D)錯誤。","options":{"A":"正確。蝶骨含蝶竇(副鼻竇)。","B":"正確。蝶骨形成腦下垂體窩。","C":"正確。蝶骨有管道(視神經管/眶上裂)與眼眶相通。","D":"錯誤(即為答案)。與寰椎形成關節的是枕骨髁，非蝶骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"105030-N1-4":{"quick":"正解(C為「錯誤」者)。滑液關節「並非都有關節盤」；關節盤(如膝半月板、顳顎關節盤)只見於部分滑液關節。","detail":{"background":"滑液(膜)關節(synovial joint)為可動關節，共同構造：①關節腔(joint cavity)；②關節囊(外纖維層+內滑液膜)；③滑液(關節液)潤滑；④關節軟骨(透明軟骨)覆蓋骨端；部分有滑液囊(bursae)減少摩擦。但「關節盤/半月板(articular disc/meniscus)」只存在於少數需要分散應力或增進吻合的滑液關節(如膝關節半月板、顳顎關節、胸鎖關節)，並非每個滑液關節都有。故(C)「都有關節盤」為錯誤。","options":{"A":"正確。多數滑液關節有滑液囊輔助。","B":"正確。滑液關節都有關節腔。","C":"錯誤(即為答案)。並非所有滑液關節都有關節盤。","D":"正確。滑液關節骨端都覆蓋關節(透明)軟骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"105090-N1-4":{"quick":"正解(D)。骨髓抽取常選「髂嵴(髂骨後上嵴)」，因表淺、骨髓豐富、安全。","detail":{"background":"成人造血(紅)骨髓主要在中軸骨與長骨近端。骨髓穿刺/切片臨床最常選「後上髂嵴(posterior iliac crest)」，因其位置表淺、易觸及、紅骨髓量多、無重要血管神經，安全；胸骨(僅做抽吸)為次選。恥骨肌線、恥骨弓、坐骨棘皆非適合的取髓處。","options":{"A":"錯誤。恥骨肌線非取髓處。","B":"錯誤。恥骨弓非取髓處。","C":"錯誤。坐骨棘深在，非取髓處。","D":"正確。髂嵴是骨髓抽取首選部位。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"106030-N1-3":{"quick":"正解(B)。顴弓由「顴骨的顳突」與「顳骨的顴突」共同組成。","detail":{"background":"顴弓(zygomatic arch)是臉頰外側的橫向骨橋，由前方「顴骨(zygomatic bone)的顳突」與後方「顳骨(temporal bone)的顴突」相接而成，下方有咬肌附著、深面有顳肌肌腱通過。額骨、蝶骨、上頜骨雖與顴骨相鄰，但不構成顴弓本體。","options":{"A":"錯誤。額骨與顴骨在眶外側相接，不組成顴弓。","B":"正確。顴弓由顴骨顳突與顳骨顴突組成。","C":"錯誤。蝶骨不參與顴弓。","D":"錯誤。上頜骨與顴骨相鄰但不構成顴弓。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"106030-N1-4":{"quick":"正解(C)。距骨(talus)與脛、腓骨構成踝關節。","detail":{"background":"踝關節由脛骨下端+內踝、腓骨外踝夾住「距骨滑車」而成。故參與踝關節者為距骨。蹠骨、趾骨在前足，跟骨在距骨下方參與距下關節，皆不直接構成踝關節。(同主題重複考點，務必記牢「脛+腓+距=踝」)深化：踝關節由脛、腓骨與『距骨』構成(口訣「脛+腓+距=踝」),只能背屈蹠屈;跟骨在距骨下方參與距下關節(司內翻外翻)。距骨無肌肉附著、血供差,故距骨頸骨折易缺血壞死。","options":{"A":"錯誤。蹠骨在前足。","B":"錯誤。趾骨在足趾。","C":"正確。距骨參與踝關節。","D":"錯誤。跟骨參與距下關節。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"106110-N1-4":{"quick":"正解(A)。枕骨(枕骨髁)與第一頸椎(寰椎)形成寰枕關節。","detail":{"background":"枕骨(occipital bone)下面的「枕骨髁(occipital condyle)」位於枕骨大孔兩側，與寰椎(C1)的上關節凹形成「寰枕關節」，可做點頭(屈伸)動作。顳骨、蝶骨、篩骨皆不與頸椎相接。寰樞關節(搖頭)則在寰椎與樞椎(C2齒突)之間。","options":{"A":"正確。枕骨髁與寰椎形成寰枕關節。","B":"錯誤。顳骨不與頸椎相接。","C":"錯誤。蝶骨在顱底中央。","D":"錯誤。篩骨在前顱窩。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"106110-N1-5":{"quick":"正解(D)。男性骨盆「真骨盆較深」(男大於女)；其餘入口寬度、恥骨弓角度、出口寬度皆女大於男。","detail":{"background":"兩性骨盆差異(因女性需分娩)：女性骨盆較寬而淺——骨盆入口較寬呈橫橢圓、恥骨弓夾角較大(>90°)、骨盆出口較寬、坐骨棘間距大、髖臼間距大；男性骨盆較窄而深——真骨盆「深度」較大、入口呈心形、恥骨弓角小(<90°)、出口窄。故「男性大於女性」者為真骨盆深度。","options":{"A":"錯誤。骨盆入口寬度女性較大。","B":"錯誤。恥骨弓夾角女性較大。","C":"錯誤。骨盆出口寬度女性較大。","D":"正確。真骨盆深度男性較大。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"106111-N1-4":{"quick":"正解(A)。海綿(鬆質)骨由「骨小樑(trabecula)」構成。","detail":{"background":"骨組織分緻密骨與海綿骨：①緻密(密)骨由「骨單位(osteon/Haversian系統)」構成，中央有「中央管(Haversian canal)」走血管神經，並以「穿通管(Volkmann/perforating canal)」橫向連通；②海綿(鬆質)骨則由交織的「骨小樑(trabeculae)」構成，小樑間為紅骨髓腔，無典型骨單位，沿力線排列以輕量承重。故海綿骨的結構成分為骨小樑。","options":{"A":"正確。骨小樑為海綿骨結構單位。","B":"錯誤。骨單位是緻密骨的結構。","C":"錯誤。中央管屬骨單位(緻密骨)。","D":"錯誤。穿通管屬緻密骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"106111-N1-5":{"quick":"正解(B)。半月板(meniscus)位於膝關節腔內(脛骨平台上)。","detail":{"background":"膝關節內部構造：「半月板(內、外側)」為纖維軟骨，位於關節腔內、墊於股骨髁與脛骨平台之間，增進吻合與吸震；「十字韌帶(前、後)」雖在關節囊內但位於滑膜外(故習慣說十字韌帶在關節腔內、滑膜外)；脛側副韌帶、髕韌帶則在關節囊外。本題以「關節腔內」最典型者＝半月板。","options":{"A":"錯誤。脛側副韌帶在關節囊外側。","B":"正確。半月板位於膝關節腔內。","C":"十字韌帶在關節囊內但屬滑膜外，較非典型「腔內」答案。","D":"錯誤。髕韌帶在關節囊前外。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"107030-N1-4":{"quick":"正解(A為「不參與」者)。上頜骨參與眼眶、鼻腔、口腔(硬腭)的形成，但「不參與顱腔」。","detail":{"background":"上頜骨(maxilla)是顏面骨，參與構成：眼眶底、鼻腔外側壁與底、口腔頂(硬腭前2/3)、含上頜竇與上排牙槽。顱腔(容納腦)由額、頂、枕、顳、蝶、篩骨構成，上頜骨屬顏面骨不參與顱腔。故問「不參與」者為顱腔。","options":{"A":"不參與(即為答案)。顱腔由腦顱骨構成，上頜骨屬顏面骨。","B":"參與。上頜骨構成眼眶底。","C":"參與。上頜骨構成鼻腔外側壁與底。","D":"參與。上頜骨構成硬腭(口腔頂)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"107030-N1-5":{"quick":"正解(A)。九分區最下方的水平線是髂結節間線，通過「髂嵴(髂骨結節)」。","detail":{"background":"腹部九分區的下水平線為「髂結節間線(transtubercular line)」，通過左右髂骨結節(髂嵴前部)，約對應第5腰椎。本題選項以「髂嵴」最接近此線位置。恥骨聯合上/下緣更低(屬骨盆),L1–L2交界更高(屬上水平線附近)。故最下方水平線通過髂嵴。","options":{"A":"正確。最下水平線(髂結節間線)通過髂嵴。","B":"錯誤。恥骨聯合上緣更低。","C":"錯誤。恥骨聯合下緣更低。","D":"錯誤。L1–L2交界對應上水平線附近。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"107110-N1-10":{"quick":"正解(D)。氣管的血液部分來自支氣管動脈(供應下段氣管與支氣管樹)。","detail":{"background":"氣管(trachea)組織學與供血：①上皮為「偽複層纖毛柱狀上皮(含杯狀細胞)」，非單層柱狀；②支撐軟骨是「C形透明軟骨(hyaline)」(非彈性軟骨)，開口朝後；③C形軟骨缺口後方由「氣管肌(trachealis，平滑肌)」連結(非骨骼肌);④血液供應上段來自甲狀腺下動脈、下段來自「支氣管動脈」。故(D)正確。","options":{"A":"錯誤。氣管上皮為偽複層纖毛柱狀，非單層柱狀。","B":"錯誤。氣管軟骨為C形「透明」軟骨，非彈性軟骨。","C":"錯誤。氣管肌為「平滑肌」，非骨骼肌。","D":"正確。氣管下段血供部分來自支氣管動脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"107110-N1-5":{"quick":"正解(A)。鷹嘴(olecranon)是尺骨近端後方的表面標記(肘尖)。","detail":{"background":"尺骨(ulna)近端標記：「鷹嘴(olecranon)」為後上方大突起(肘尖，三頭肌附著)，前方有冠突，兩者間為滑車切迹與肱骨滑車形成肘關節。「滑車(trochlea)、小頭(capitulum)」是肱骨遠端的標記；「結節(tubercle)」泛稱多骨可見。故尺骨表面標記為鷹嘴。","options":{"A":"正確。鷹嘴為尺骨近端標記。","B":"錯誤。滑車為肱骨遠端內側標記。","C":"錯誤。小頭為肱骨遠端外側標記。","D":"錯誤。結節非尺骨特有標記。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"108020-N1-3":{"quick":"正解(C)。枕骨大孔(foramen magnum)連接顱腔與椎管，延髓由此續為脊髓。","detail":{"background":"枕骨大孔(foramen magnum)位於枕骨，是顱腔最大的孔，「連接顱腔與椎管」，延髓在此續接脊髓，並有脊髓副神經、椎動脈通過。卵圓孔(蝶骨,過下頜神經)、頸動脈管(顳骨,過內頸動脈)、頸靜脈孔(過內頸靜脈與IX/X/XI腦神經)皆為顱底其他孔道，不連接椎管。","options":{"A":"錯誤。卵圓孔過下頜神經。","B":"錯誤。頸動脈管過內頸動脈。","C":"正確。枕骨大孔連接顱腔與椎管。","D":"錯誤。頸靜脈孔過內頸靜脈與腦神經。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"108110-N1-3":{"quick":"正解(D)。眶上裂(superior orbital fissure)介於蝶骨小翼與大翼之間。","detail":{"background":"蝶骨上的孔裂：①「眶上裂(superior orbital fissure)」位於「小翼與大翼之間」，通往眼眶，過III、IV、V₁、VI腦神經與眼上靜脈；②圓孔(過V₂上頜神經)、卵圓孔(過V₃下頜神經)、棘孔(過腦膜中動脈)皆在大翼上。故介於小翼與大翼之間者為眶上裂。","options":{"A":"錯誤。棘孔在大翼，過腦膜中動脈。","B":"錯誤。圓孔在大翼，過上頜神經。","C":"錯誤。卵圓孔在大翼，過下頜神經。","D":"正確。眶上裂介於蝶骨小翼與大翼之間。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"108110-N1-4":{"quick":"正解(C)。橈側腕屈肌起於肱骨「內上髁」(屈肌總起點)。","detail":{"background":"肱骨內上髁(medial epicondyle)是前臂「屈肌-旋前肌群」的共同起點，包括旋前圓肌、橈側腕屈肌、掌長肌、尺側腕屈肌、屈指淺肌等(由尺神經/正中神經支配)。外上髁則為伸肌總起點(橈側腕長伸肌等)。旋後肌、旋前方肌不起於內上髁。故附著於內上髁者為橈側腕屈肌。","options":{"A":"錯誤。旋後肌起自外上髁與尺骨。","B":"錯誤。旋前方肌在前臂遠端尺、橈骨間。","C":"正確。橈側腕屈肌起於肱骨內上髁。","D":"錯誤。橈側腕長伸肌起於外上髁(伸肌群)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"109030-N1-7":{"quick":"正解(B)。下頷骨不含副鼻竇；副鼻竇位於上頷骨、額骨、篩骨、蝶骨。","detail":{"background":"副鼻竇(paranasal sinuses)是與鼻腔相通、含氣、減輕顱重並助發聲共鳴的腔，共四對，分別位於「上頷骨(上頷竇,最大)、額骨(額竇)、篩骨(篩竇)、蝶骨(蝶竇)」。「下頷骨」是顏面活動骨(下顎)，不含副鼻竇。故問「不具副鼻竇」者為下頷骨。","options":{"A":"有副鼻竇。上頷竇。","B":"無副鼻竇(即為答案)。下頷骨不含竇。","C":"有副鼻竇。篩竇。","D":"有副鼻竇。蝶竇。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"109110-N1-2":{"quick":"正解(C為「錯誤」者)。並非「每個椎孔皆有脊髓通過」——脊髓只到L1–L2，下方椎孔內為馬尾而非脊髓。","detail":{"background":"椎骨敘述辨析：①頸椎與胸椎(及所有椎骨)皆有橫突——正確(頸椎橫突另有橫突孔過椎動脈)；②椎間盤位於相鄰椎體之間——正確；③「每個椎孔(vertebral foramen)疊成椎管，但脊髓只延伸到L1–L2」，故下腰薦段椎孔內是「馬尾」而非脊髓，說「每個椎孔皆有脊髓通過」是錯的；④每個椎間孔(intervertebral foramen)有脊神經穿出——正確。故錯誤者為(C)。","options":{"A":"正確。頸椎與胸椎皆有橫突。","B":"正確。椎間盤在椎體之間。","C":"錯誤(即為答案)。脊髓僅到L1–L2，下方椎孔內為馬尾。","D":"正確。椎間孔有脊神經通過。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"110030-N1-1":{"quick":"正解(C)。長骨「縱向(長度)生長」靠骨骺板(epiphyseal plate)軟骨增生與骨化。","detail":{"background":"長骨生長：①「縱向(增長)」靠骨幹與骨骺之間的「骨骺板(生長板, epiphyseal plate)」——透明軟骨持續增生再骨化，使骨變長，青春期受生長激素、性激素調控，骨齡成熟後骨骺板骨化成「骨骺線(epiphyseal line)」即停止增長;②「橫向(增粗)」靠骨外膜(periosteum)的成骨細胞作膜內骨化(appositional growth)。骨骺「線」是已癒合的痕跡，不再生長。故縱向生長關鍵為骨骺板。","options":{"A":"錯誤。骨外膜負責骨的增粗(橫向)。","B":"錯誤。骨內膜參與骨內面塑形。","C":"正確。骨骺板負責長骨縱向生長。","D":"錯誤。骨骺線是骺板癒合後痕跡，不再生長。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"110030-N1-2":{"quick":"正解(B)。胸椎棘突細長且明顯向下傾斜，在四選項中第5胸椎棘突最長。","detail":{"background":"各段椎骨棘突特徵：頸椎棘突短且多分叉(C7棘突長,稱隆椎)；「胸椎棘突細長、明顯向下斜疊(如屋瓦)」，是各段中最長、最往下傾者；腰椎棘突寬扁呈板狀、水平後伸；薦椎棘突退化融合成薦正中嵴。比較選項，第5胸椎棘突最長且下傾。","options":{"A":"錯誤。第5頸椎棘突短小。","B":"正確。第5胸椎棘突細長下傾，最長。","C":"錯誤。腰椎棘突寬扁水平，非最長。","D":"錯誤。薦椎棘突融合退化。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"110030-N1-3":{"quick":"正解(C)。股三角的外側界為「縫匠肌(sartorius)內側緣」。","detail":{"background":"股三角(femoral triangle)位於大腿前上方，邊界：上界＝腹股溝韌帶；外側界＝「縫匠肌(sartorius)」內側緣；內側界＝內收長肌(adductor longus)內側緣。三角內由外而內為股神經、股動脈、股靜脈、股管(NAVL)。股內、外側肌屬股四頭肌但非股三角邊界；恥骨肌構成三角的底而非邊界。故圍成股三角者為縫匠肌。","options":{"A":"錯誤。股內側肌非股三角邊界。","B":"錯誤。股外側肌非股三角邊界。","C":"正確。縫匠肌為股三角外側界。","D":"恥骨肌構成三角底，非選項所指外側邊界。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"110110-N1-2":{"quick":"正解(A)。脛骨細長、有骨幹與兩端骨骺，屬「長骨」。","detail":{"background":"脛骨(tibia)是小腿內側、負重的主要長骨，長度遠大於寬度，具骨幹與近、遠端骨骺，故屬長骨(同股骨、肱骨、腓骨、指趾骨)。非短骨(立方,如跗骨)、非扁平骨、非種子骨。深化：長骨(femur/tibia/humerus/指趾骨)的特徵是有骨幹(diaphysis)、兩端骨骺(epiphysis)與其間生長板;脛骨是小腿主要負重骨,其前嵴(脛骨前緣)皮下表淺,故開放性骨折常見且易感染。","options":{"A":"正確。脛骨為長骨。","B":"錯誤。短骨如跗骨。","C":"錯誤。扁平骨如肩胛骨。","D":"錯誤。種子骨如髕骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"111110-N1-7":{"quick":"正解(D)。腭骨參與鼻腔、眼眶與硬腭(上腭)的組成，但「不參與顱腔」。","detail":{"background":"腭骨(palatine bone)是成對的顏面骨，呈L形，其水平板構成「硬腭(上腭)後1/3」與鼻腔底後部，垂直板構成鼻腔外側壁後部，並參與眼眶底後內側。它不參與「顱腔(腦顱)」的構成。故問「不參與」者為顱腔。","options":{"A":"參與。腭骨垂直板構成鼻腔外側壁。","B":"參與。腭骨眶突參與眼眶。","C":"參與。腭骨水平板構成硬腭後部。","D":"不參與(即為答案)。腭骨屬顏面骨，不構成顱腔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"112030-N1-2":{"quick":"正解(C)。腰段脊柱呈「前凸(lordosis，往前拱)」曲線。","detail":{"background":"成人脊柱側面觀有四個生理彎曲：頸曲(前凸)、胸曲(後凸)、腰曲(前凸)、薦曲(後凸)。胸曲與薦曲是出生即有的「原發彎曲(後凸)」；頸曲(抬頭)與腰曲(站立行走)是後天形成的「次發彎曲(前凸)」。故腰段＝前凸曲線。頸段為前凸(非後凸)、胸段為後凸(非直線)、薦段為後凸(非直線)。","options":{"A":"錯誤。頸段為前凸，非後凸。","B":"錯誤。胸段為後凸曲線，非直線。","C":"正確。腰段為前凸曲線。","D":"錯誤。薦段為後凸曲線，非直線。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"112030-N1-7":{"quick":"正解(B)。橈動脈在手腕「外側(橈側/拇指側)」最易觸得脈搏。","detail":{"background":"測量脈搏最常用「橈動脈(radial artery)」，位於前臂遠端外側(橈側/拇指側)、橈骨遠端與橈側腕屈肌腱之間，表淺易觸。尺動脈在腕內側(小指側)、位置較深不易觸。腕掌/腕背動脈非主要觸脈處。故手腕外側觸得者為橈動脈。","options":{"A":"錯誤。尺動脈在腕內側(小指側)。","B":"正確。橈動脈在腕外側(橈側)易觸。","C":"錯誤。腕掌動脈非主要觸脈處。","D":"錯誤。腕背動脈非主要觸脈處。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"112180-N1-1":{"quick":"正解(D)。肱三頭肌(triceps brachii)收縮可「伸展」肘關節。","detail":{"background":"肘關節屈伸的主動肌：①屈肘＝肱二頭肌、肱肌、肱橈肌；②「伸肘＝肱三頭肌(triceps brachii)」(由橈神經支配)。喙肱肌作用於肩(屈曲內收上臂)。故伸展肘關節者為肱三頭肌。深化：肘關節伸直靠肱三頭肌(橈神經支配),屈曲靠肱二頭肌、肱肌、肱橈肌。喙肱肌作用於肩關節(屈內收上臂)。橈神經損傷(肱骨骨幹骨折)除垂腕外,也會使肱三頭肌無力而伸肘困難。","options":{"A":"錯誤。肱橈肌屈肘。","B":"錯誤。喙肱肌作用於肩關節。","C":"錯誤。肱二頭肌屈肘並旋後。","D":"正確。肱三頭肌伸肘。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"113030-N1-12":{"quick":"正解(D)。踝關節由脛、腓骨與「距骨(talus)」構成。","detail":{"background":"踝關節＝脛骨下端+內踝、腓骨外踝形成榫眼，夾住「距骨滑車」。故除脛、腓骨外，組成骨為距骨。跟骨在距骨下(距下關節)、骰骨在外側跗骨間、蹠骨在前足，皆不直接構成踝關節。深化：踝關節=脛骨下端+內踝、腓骨外踝形成「榫眼(mortise)」夾住距骨滑車,只能背屈/蹠屈(屈戍關節)。背屈時較寬的距骨前部卡入榫眼最穩定,故蹠屈(墊腳)時關節較鬆、易發生內翻扭傷。","options":{"A":"錯誤。跟骨屬距下關節。","B":"錯誤。蹠骨在前足。","C":"錯誤。骰骨屬跗骨間關節。","D":"正確。距骨與脛、腓骨構成踝關節。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"113030-N1-13":{"quick":"正解(B)。三角肌前束屈曲、後束伸展肩關節，故兼具屈、伸功能。","detail":{"background":"三角肌(deltoid)覆蓋肩部，分前、中、後三束：前束＝屈曲與內旋肩關節；中束＝外展肩(主要外展肌)；後束＝伸展與外旋肩。因此三角肌「兼具屈曲(前束)與伸展(後束)」肩關節的功能。胸大肌主屈曲、內收、內旋(非伸展);斜方肌動肩胛;棘上肌起始外展(15°內)。故答案為三角肌。","options":{"A":"錯誤。胸大肌主屈曲內收內旋，非兼伸展。","B":"正確。三角肌前束屈、後束伸，兼具屈伸。","C":"錯誤。斜方肌作用於肩胛骨。","D":"錯誤。棘上肌主肩外展起始。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"113180-N1-1":{"quick":"正解(D)。大轉子(greater trochanter)位於股骨近端外上方。","detail":{"background":"大轉子(greater trochanter)與小轉子是「股骨(femur)」近端的兩個骨突，為臀中肌、臀小肌、梨狀肌等的附著處，大轉子在外上方、體表可觸(臀部外側硬突)。髖骨(由髂、坐、恥骨融合)有髂嵴、坐骨棘、坐骨粗隆等，但「轉子」是股骨特有標記。故大轉子在股骨。","options":{"A":"錯誤。髖骨無轉子。","B":"錯誤。坐骨有坐骨粗隆/棘，非轉子。","C":"錯誤。髂骨有髂嵴。","D":"正確。大轉子在股骨近端。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"113180-N1-5":{"quick":"正解(B為「錯誤」者)。第7肋是「真肋」(直接以自己的肋軟骨連胸骨)，把它說成假肋是錯的。","detail":{"background":"肋骨分類：第1–7對為「真肋(true ribs)」，各以自己的肋軟骨「直接」連到胸骨；第8–12對為「假肋(false ribs)」——其中第8–10對的肋軟骨「間接」附著於上一肋軟骨(第8肋軟骨附於第7肋軟骨)，第11–12對為「浮肋(floating ribs)」前端游離。第7肋是真肋(也是典型肋骨)。故(B)說第7肋是假肋為錯誤;(D)第8肋軟骨附於第7肋軟骨正確。","options":{"A":"正確。第7肋為真肋。","B":"錯誤(即為答案)。第7肋是真肋，不是假肋。","C":"正確。第7肋為典型肋骨。","D":"正確。第8肋軟骨附著於第7肋軟骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"114030-N1-13":{"quick":"正解(C)。腰椎曲(腰曲)是往前拱起的「前凸」彎曲。","detail":{"background":"腰椎特徵辨析：①腰椎棘突「寬扁呈板狀、水平後伸」，非細長朝下(那是胸椎)；②「具孔洞供血管通行的橫突孔是頸椎特徵」，腰椎橫突無孔;③腰椎曲(lumbar curvature)為「前凸(lordosis)」——正確;④腰椎穿刺一般在「L3–L4或L4–L5」進行(避開止於L1–L2的脊髓)，非L1–L2。故正確者為(C)。","options":{"A":"錯誤。腰椎棘突寬扁水平，非細長朝下。","B":"錯誤。橫突孔是頸椎特徵，腰椎無。","C":"正確。腰曲為前凸彎曲。","D":"錯誤。腰椎穿刺在L3–L4/L4–L5，非L1–L2。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"114170-N1-3":{"quick":"正解(D)。髕骨埋於股四頭肌肌腱內，是人體最大的「種子骨(sesamoid bone)」。","detail":{"background":"種子骨(sesamoid bone)是發育於肌腱內、跨過關節以增加肌腱力臂並減少摩擦的小骨，髕骨(patella)是人體最大的種子骨，位於股四頭肌肌腱內、越過膝關節前方，可保護關節並提升伸膝效率。它不是長骨、短骨或扁平骨。","options":{"A":"錯誤。長骨如股骨。","B":"錯誤。短骨如腕骨。","C":"錯誤。扁平骨如肩胛骨。","D":"正確。髕骨為種子骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.6-9 骨骼與關節系統","實用人體解剖學（華杏）骨骼與關節章","Moore《Clinically Oriented Anatomy》8e"]}},"101030-N1-6":{"quick":"正解(D)。橈側伸腕短肌(extensor carpi radialis brevis)屬前臂伸肌群，可伸展手腕。","detail":{"background":"前臂肌依功能分屈、伸兩群：屈肌群(起於肱骨內上髁，由正中/尺神經支配)＝掌長肌、橈/尺側腕屈肌、屈指淺肌、屈指深肌等，作用為屈腕屈指；伸肌群(起於肱骨外上髁，由橈神經支配)＝橈側伸腕長/短肌、尺側伸腕肌、伸指肌等，作用為伸腕伸指。故能「伸展手腕」者為橈側伸腕短肌。掌長肌與屈指淺/深肌皆為屈肌。","options":{"A":"錯誤。掌長肌為屈腕肌(並繃緊掌腱膜)。","B":"錯誤。屈指深肌屈遠端指間關節。","C":"錯誤。屈指淺肌屈近端指間關節。","D":"正確。橈側伸腕短肌伸腕。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"101110-N1-4":{"quick":"正解(B)。豎脊肌(erector spinae)是維持脊柱直立、伸展背部最主要的肌肉。","detail":{"background":"豎脊肌(erector spinae，又稱骶棘肌)是沿脊柱兩側縱走的大肌群(分髂肋肌、最長肌、棘肌三柱)，兩側同時收縮使脊柱「伸展(挺直背部)」並維持直立姿勢，單側收縮使脊柱側彎，是背部最重要的伸肌。背闊肌主動上臂內收內旋;腰方肌使腰椎側屈、固定第12肋;髂腰肌是屈髖肌。","options":{"A":"錯誤。背闊肌作用於上臂(內收內旋伸展肩)。","B":"正確。豎脊肌伸展並維持脊柱直立。","C":"錯誤。腰方肌主腰椎側屈。","D":"錯誤。髂腰肌為屈髖肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"101110-N1-6":{"quick":"正解(C)。翼外側肌(lateral pterygoid)收縮使下頜骨向前滑動(前突)並協助張口。","detail":{"background":"咀嚼肌(由三叉神經下頜支支配)四塊：嚼肌、顳肌、翼內側肌主「閉口(上提下頜)」；「翼外側肌(lateral pterygoid)」則使下頜骨「向前滑動(前突)並下拉、協助張口」，兩側交替收縮可使下頜左右研磨。故能前滑下頜以張口者為翼外側肌。","options":{"A":"錯誤。嚼肌上提下頜(閉口)。","B":"錯誤。顳肌上提並後拉下頜(閉口)。","C":"正確。翼外側肌前滑下頜、協助張口。","D":"錯誤。翼內側肌上提下頜(閉口)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"102030-N1-4":{"quick":"正解(C)。棘上肌(supraspinatus)肌腱與肩關節囊融合，屬旋轉肌袖。","detail":{"background":"旋轉肌袖(rotator cuff)由棘上肌、棘下肌、小圓肌、肩胛下肌(SITS)組成，其肌腱「與肩關節囊融合」加強並穩定盂肱關節。其中棘上肌肌腱通過肩峰下方，最易受夾擠或撕裂。三角肌、大圓肌、提肩胛肌不屬旋轉肌袖，肌腱不與關節囊融合。","options":{"A":"錯誤。三角肌不屬旋轉肌袖。","B":"錯誤。大圓肌不屬旋轉肌袖。","C":"正確。棘上肌肌腱與肩關節囊融合(旋轉肌袖)。","D":"錯誤。提肩胛肌動肩胛骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"103030-N1-6":{"quick":"正解(B)。脛骨前肌(tibialis anterior)使足背屈(dorsiflexion)。","detail":{"background":"小腿肌依間隔分群：前間隔(脛骨前肌、伸趾長肌、伸拇長肌)＝足「背屈(dorsiflexion)」並伸趾，由深腓神經支配；後間隔(腓腸肌、比目魚肌、脛骨後肌、屈趾長肌)＝足「蹠屈(plantarflexion)」並屈趾。故將足背上抬者為脛骨前肌。腓腸肌反而蹠屈;脛骨後肌蹠屈並內翻;屈趾長肌屈趾蹠屈。","options":{"A":"錯誤。腓腸肌使足蹠屈。","B":"正確。脛骨前肌使足背屈。","C":"錯誤。脛骨後肌蹠屈並內翻。","D":"錯誤。屈趾長肌屈趾、蹠屈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"104030-N1-6":{"quick":"正解(A)。股三角的內側邊界為「內收長肌(adductor longus)」內側緣。","detail":{"background":"股三角(femoral triangle)邊界：上＝腹股溝韌帶；外側＝縫匠肌內緣；內側＝「內收長肌(adductor longus)」內緣。內含股神經、股動脈、股靜脈、股管。內收大肌、股內側肌、股直肌不構成其內側邊界。","options":{"A":"正確。內收長肌為股三角內側界。","B":"錯誤。內收大肌位置較深，非邊界。","C":"錯誤。股內側肌屬股四頭肌。","D":"錯誤。股直肌屬股四頭肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"104100-N1-3":{"quick":"正解(B)。髂脛束是闊筋膜張肌與「臀大肌」的共同肌腱(腱膜)延伸。","detail":{"background":"髂脛束(iliotibial tract/band)是大腿外側闊筋膜增厚形成的縱行腱膜帶，上方接受「闊筋膜張肌(前)與臀大肌(後)」的肌腱止入，下止於脛骨外側(Gerdy結節)，可穩定膝外側、協助伸膝與外展髖。跑者過度使用易致髂脛束摩擦症候群。故與闊筋膜張肌共同形成髂脛束者為臀大肌。","options":{"A":"錯誤。髂肌屬屈髖肌(髂腰肌)。","B":"正確。臀大肌與闊筋膜張肌共構髂脛束。","C":"錯誤。脛前肌在小腿前。","D":"錯誤。大內收肌屬內收肌群。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"105030-N1-5":{"quick":"正解(B)。翼外肌(lateral pterygoid)收縮可下拉下頜骨、張嘴。","detail":{"background":"張口(下拉下頜)的主動肌為「翼外側肌(lateral pterygoid)」(前滑並下拉下頜)及舌骨上肌群(二腹肌等)輔助；閉口由嚼肌、顳肌、翼內肌負責。頰肌(吹口哨、把食物推回臼齒)、降下唇肌(降下唇,表情肌)非張口主肌。故答案為翼外肌。","options":{"A":"錯誤。頰肌是表情/咀嚼輔助肌。","B":"正確。翼外肌下拉下頜、張嘴。","C":"錯誤。降下唇肌為表情肌。","D":"錯誤。嚼肌上提下頜(閉口)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"105090-N1-1":{"quick":"正解(B)。逼尿肌(detrusor，膀胱壁)由平滑肌構成。","detail":{"background":"肌肉三型：①骨骼肌(橫紋、隨意)＝橫膈、咽縮肌、肛門外括約肌等；②心肌(橫紋、不隨意)＝心臟；③平滑肌(無橫紋、不隨意)＝內臟與血管壁，如膀胱逼尿肌、胃腸壁、子宮肌層。故由平滑肌組成者為「逼尿肌」。橫膈、上咽縮肌、肛門外括約肌皆為骨骼肌(隨意控制)。","options":{"A":"錯誤。橫膈為骨骼肌(隨意)。","B":"正確。逼尿肌為平滑肌。","C":"錯誤。咽縮肌為骨骼肌。","D":"錯誤。肛門外括約肌為骨骼肌(隨意控制排便)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"105090-N1-2":{"quick":"正解(D)。胸大肌肌束由廣闊起點會聚到單一止點(肱骨)，屬「會聚式(convergent)」排列。","detail":{"background":"骨骼肌依肌束排列分類：①平行(parallel)＝肌束與長軸平行(如縫匠肌、腹直肌)；②梭形(fusiform)＝中央膨大；③羽狀(pennate)＝肌束斜附於中央腱(如股直肌)，力量大；④會聚(convergent)＝起點寬廣、肌束向單一止點集中呈扇形(如胸大肌)；⑤環狀(circular)＝括約肌(如口輪匝肌)。胸大肌起自鎖骨、胸骨、肋軟骨等廣闊區，會聚止於肱骨大結節嵴，屬會聚式。","options":{"A":"錯誤。環狀為括約肌(如口輪匝肌)。","B":"錯誤。平行如縫匠肌。","C":"錯誤。羽狀如股直肌。","D":"正確。胸大肌為會聚(扇形)排列。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"105090-N1-5":{"quick":"正解(A)。凱格爾運動鍛鍊「提肛肌(levator ani)」，強化骨盆底支撐。","detail":{"background":"骨盆底(骨盆膈)主要由「提肛肌(levator ani)」與尾骨肌構成，支撐膀胱、子宮、直腸並控制排尿排便。產科常教孕產婦做「凱格爾(Kegel)運動」收縮提肛肌，以強化骨盆底、預防產後尿失禁與骨盆器官脫垂。恥骨肌是內收屈髖肌、坐骨海綿體肌屬會陰淺肌、子宮肌層為平滑肌(非隨意鍛鍊對象)。","options":{"A":"正確。提肛肌為骨盆底主肌，凱格爾運動鍛鍊對象。","B":"錯誤。恥骨肌為大腿內收屈髖肌。","C":"錯誤。子宮肌層為平滑肌，非隨意訓練。","D":"錯誤。坐骨海綿體肌屬會陰淺肌(性功能相關)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"105090-N1-6":{"quick":"正解(B)。翼外肌受損會使「下頜無法前滑下拉」而張不開嘴。","detail":{"background":"張口動作主要靠「翼外側肌(lateral pterygoid)」使下頜前突並下拉(配合舌骨上肌)。臉頰穿刺傷若傷及翼外肌(或其神經),會造成下頜無法前滑、張口困難而無法進食。頰肌(把食物推回臼齒)、降下唇肌、口輪匝肌(閉唇)受損不會直接造成「張不開嘴」。故答案為翼外肌。","options":{"A":"錯誤。頰肌助咀嚼把食物推回，非張口主肌。","B":"正確。翼外肌受損致張口困難。","C":"錯誤。降下唇肌為表情肌。","D":"錯誤。口輪匝肌主閉唇。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"106030-N1-5":{"quick":"正解(C)。豎脊肌(erector spinae)是維持背部直立最重要的肌肉。","detail":{"background":"維持脊柱直立、對抗重力使軀幹挺直的主肌為「豎脊肌(erector spinae)」，兩側收縮伸展脊柱。背闊肌作用於上臂、腰大肌屈髖、後鋸肌為呼吸輔助肌，皆非維持背部直立的主肌。深化：豎脊肌(髂肋肌、最長肌、棘肌三柱)兩側收縮伸直脊柱、維持直立姿勢,單側收縮使脊柱側彎;久坐姿勢不良易致豎脊肌慢性勞損下背痛。對照:背闊肌動上臂、腰方肌側屈腰、髂腰肌屈髖。","options":{"A":"錯誤。背闊肌動上臂。","B":"錯誤。腰大肌屈髖。","C":"正確。豎脊肌維持背部直立。","D":"錯誤。後鋸肌為呼吸輔助肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"106110-N1-9":{"quick":"正解(A為「無關」者)。用力吸氣靠橫膈、外肋間肌、斜角肌等收縮；「腹肌」是用力『呼氣』的肌肉，與吸氣無關。","detail":{"background":"呼吸肌：①平靜吸氣＝橫膈(主)與外肋間肌收縮使胸腔擴大;②用力吸氣另徵召斜角肌、胸鎖乳突肌、胸小肌等輔助吸氣肌;③平靜呼氣為被動(彈性回縮);④用力呼氣才動用「腹肌(腹直肌等)與內肋間肌」壓縮胸腹腔。故與「用力吸氣(增大胸腔容積)」無關者為腹肌(它屬用力呼氣肌)。","options":{"A":"無關(即為答案)。腹肌是用力呼氣肌，與吸氣擴胸無關。","B":"有關。橫膈是主要吸氣肌。","C":"有關。外肋間肌提肋擴胸助吸氣。","D":"有關。斜角肌為輔助吸氣肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"106111-N1-3":{"quick":"正解(C)。股三角的外側邊界為「縫匠肌(sartorius)」內側緣。","detail":{"background":"股三角邊界(再次強調)：上界＝腹股溝韌帶；外側界＝「縫匠肌」內緣；內側界＝內收長肌內緣。半膜肌、半腱肌屬大腿後側膕旁肌(屈膝伸髖)；股外側肌屬股四頭肌；皆非股三角外側界。故答案為縫匠肌。深化：股三角邊界口訣「上(腹股溝韌帶)、外(縫匠肌)、內(內收長肌)」,底為髂腰肌與恥骨肌,內含股神經、股動脈、股靜脈、股管(由外而內NAVL)。股動脈在此表淺,是穿刺與摸脈處;股疝氣經股管(在股靜脈內側)突出。","options":{"A":"錯誤。半膜肌屬膕旁肌。","B":"錯誤。半腱肌屬膕旁肌。","C":"正確。縫匠肌為股三角外側界。","D":"錯誤。股外側肌屬股四頭肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"107030-N1-3":{"quick":"正解(C為「不附著」者)。胸大肌起於鎖骨、胸骨、肋軟骨，止於肱骨，不附著於肩胛骨。","detail":{"background":"與肩胛骨相關的肌肉：斜方肌(止於肩胛棘、肩峰)、前鋸肌(止於肩胛骨內緣)、肱二頭肌(長頭起於盂上結節、短頭起於喙突，皆在肩胛骨)、提肩胛肌、菱形肌、旋轉肌袖等皆附著肩胛骨。「胸大肌」起自鎖骨內側、胸骨、上六肋軟骨，止於肱骨大結節嵴，「不附著於肩胛骨」。故答案為胸大肌。","options":{"A":"附著。斜方肌止於肩胛棘/肩峰。","B":"附著。前鋸肌止於肩胛骨內緣。","C":"不附著(即為答案)。胸大肌起於胸壁、止於肱骨。","D":"附著。肱二頭肌兩頭起於肩胛骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"107110-N1-4":{"quick":"正解(A)。股直肌(rectus femoris)跨髖膝兩關節，可屈曲大腿(屈髖)兼伸小腿。","detail":{"background":"股四頭肌中只有「股直肌(rectus femoris)」起於髂前下棘(跨越髖關節),故除了伸膝外，還能「屈曲髖關節(屈大腿)」;股內側肌、股外側肌、股中間肌只起於股骨、單純伸膝。閉孔外肌為髖外旋肌。故與屈髖最相關者為股直肌。","options":{"A":"正確。股直肌跨髖膝，可屈髖(屈大腿)。","B":"錯誤。閉孔外肌主髖外旋。","C":"錯誤。股內側肌僅伸膝。","D":"錯誤。股外側肌僅伸膝。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"109030-N1-4":{"quick":"正解(A)。棘下肌(infraspinatus)屬旋轉肌袖(SITS)。","detail":{"background":"旋轉肌袖(rotator cuff, SITS)＝棘上肌(Supraspinatus)、棘下肌(Infraspinatus)、小圓肌(Teres minor)、肩胛下肌(Subscapularis)，其肌腱與關節囊融合穩定盂肱關節並協助旋轉(棘下肌、小圓肌外旋;肩胛下肌內旋;棘上肌起始外展)。三角肌、大圓肌、喙肱肌不屬旋轉肌袖。故答案為棘下肌。","options":{"A":"正確。棘下肌屬旋轉肌袖。","B":"錯誤。三角肌為主要外展肌，不屬肌袖。","C":"錯誤。大圓肌不屬旋轉肌袖。","D":"錯誤。喙肱肌屈內收上臂。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"109110-N1-3":{"quick":"正解(D)。提肛肌(levator ani)是骨盆膈主肌，支撐子宮等盆腔器官。","detail":{"background":"骨盆膈(pelvic diaphragm)由「提肛肌(levator ani，含恥骨直腸肌、恥尾肌、髂尾肌)」與尾骨肌構成，封閉骨盆下口、支撐膀胱子宮直腸並維持自禁。球海綿體肌、會陰深橫肌屬會陰肌(非骨盆膈);恥骨肌為大腿內收肌。故支撐子宮的骨盆膈主肌為提肛肌。","options":{"A":"錯誤。球海綿體肌屬會陰淺肌。","B":"錯誤。會陰深橫肌屬泌尿生殖膈。","C":"錯誤。恥骨肌為內收屈髖肌。","D":"正確。提肛肌為骨盆膈主肌，支撐子宮。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"110110-N1-3":{"quick":"正解(D)。腓腸肌經跟腱(阿基里斯腱)附著於跟骨。","detail":{"background":"小腿後側淺層的「腓腸肌(gastrocnemius)」與比目魚肌合成小腿三頭肌，共同以「跟腱(Achilles tendon)」止於跟骨後面，收縮使足蹠屈(墊腳、推進)。脛前肌(背屈)、脛後肌(經內踝後方止於足底,蹠屈內翻)、腓長肌(經外踝後止於足底,外翻)皆不經跟腱。故答案為腓腸肌。","options":{"A":"錯誤。脛前肌止於內側楔骨(背屈)。","B":"錯誤。脛後肌經內踝止於足底。","C":"錯誤。腓長肌經外踝止於足底。","D":"正確。腓腸肌經跟腱附著跟骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"111110-N1-3":{"quick":"正解(D)。胸大肌收縮使上臂「內收及內旋」(並可屈曲)。","detail":{"background":"胸大肌(pectoralis major)起於鎖骨內側、胸骨、上肋軟骨，止於肱骨大結節嵴，作用為使上臂「內收、內旋」並屈曲(由前臂上舉時下拉)；攀爬、投擲時強力作用。背闊肌也使上臂內收內旋但兼伸展。故胸大肌＝內收及內旋。","options":{"A":"錯誤。外展外旋非胸大肌作用。","B":"錯誤。胸大肌不外展。","C":"錯誤。胸大肌為內旋非外旋。","D":"正確。胸大肌使上臂內收及內旋。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"112030-N1-3":{"quick":"正解(A)。頸闊肌(platysma)屬顏面表情肌(由顏面神經支配)。","detail":{"background":"表情肌(facial muscles of expression)由「顏面神經(VII)」支配，附著於皮膚、收縮時牽動表情，如口輪匝肌、頰肌、顴大肌、額肌、眼輪匝肌、「頸闊肌(platysma，覆頸前、下拉口角)」等。頦舌肌(舌外在肌,舌下神經)、顳肌與咬肌(咀嚼肌,三叉神經)皆非表情肌。故答案為頸闊肌。","options":{"A":"正確。頸闊肌為表情肌(顏面神經支配)。","B":"錯誤。頦舌肌為舌肌(舌下神經)。","C":"錯誤。顳肌為咀嚼肌(三叉神經)。","D":"錯誤。咬肌為咀嚼肌(三叉神經)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"112110-N1-4":{"quick":"正解(C為「無法閉口」者)。翼外肌負責張口(前滑下拉下頜)，無法執行閉口。","detail":{"background":"咀嚼肌中，嚼肌、顳肌、翼內肌負責「閉口(上提下頜)」;唯獨「翼外側肌(lateral pterygoid)」負責張口(前滑並下拉下頜)。故「無法執行閉口動作」者為翼外肌。深化：咀嚼肌四塊由三叉神經下頜支(V3)支配——嚼肌、顳肌、翼內肌主『閉口(上提下頜)』,翼外肌主『張口(前滑下拉)』。故翼外肌無法閉口。兩側翼外肌交替收縮可使下頜左右研磨食物。","options":{"A":"可閉口。嚼肌上提下頜。","B":"可閉口。顳肌上提下頜。","C":"無法閉口(即為答案)。翼外肌負責張口。","D":"可閉口。翼內肌上提下頜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"113030-N1-2":{"quick":"正解(D)。肌節(sarcomere)定義為「相鄰兩條Z線(Z-disc)之間」的距離，是肌肉收縮的基本功能單位。","detail":{"background":"肌節(sarcomere)是骨骼肌/心肌橫紋的重複收縮單位，範圍＝「相鄰兩Z線之間」。內部結構：Z線錨定細肌絲(actin);中央A帶含粗肌絲(myosin)且與細肌絲重疊;A帶中央較淺的H帶只有粗肌絲;Z線兩側只有細肌絲處為I帶。收縮(肌絲滑動學說)時，細肌絲向中央滑入，Z線靠近、I帶與H帶縮短、A帶長度不變、肌節變短。故肌節＝相鄰Z線間距離。","options":{"A":"錯誤。粗肌絲長度總和不等於肌節。","B":"錯誤。細肌絲總和非肌節定義。","C":"錯誤。粗+細肌絲長度總和非定義。","D":"正確。肌節＝相鄰Z線之間的距離。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"114100-N1-3":{"quick":"正解(D為「不同者」)。股薄肌主「內收大腿」;股二頭肌、半腱肌、半膜肌(膕旁肌)主「屈膝/伸髖」，故股薄肌作用與其他三者不同。","detail":{"background":"大腿後群「膕旁肌(hamstrings)」＝股二頭肌、半腱肌、半膜肌，作用為「屈膝、伸髖」(坐骨神經支配)。而「股薄肌(gracilis)」屬大腿內側「內收肌群」(閉孔神經支配)，主要作用是「內收大腿」(兼屈膝內旋)。本題比較作用，股薄肌(內收)與三條膕旁肌(屈膝伸髖)不同。","options":{"A":"同。股二頭肌為膕旁肌(屈膝伸髖)。","B":"同。半腱肌為膕旁肌。","C":"同。半膜肌為膕旁肌。","D":"不同(即為答案)。股薄肌為內收肌(內收大腿)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"115030-N1-13":{"quick":"正解(D為「錯誤」者)。股三角的「內側」邊界是內收長肌，不是股四頭肌的內側部(股內側肌)。","detail":{"background":"股四頭肌(quadriceps femoris)＝股直肌+股內側肌+股外側肌+股中間肌，共同以髕韌帶止於脛骨粗隆。正確敘述：①收縮「伸直小腿(伸膝)」;②其中股直肌跨髖可「屈曲大腿(屈髖)」;③外側部(股外側肌)是肌肉注射常用部位(大腿外側中段)。錯誤者(D)：股三角的內側邊界是「內收長肌」，而非股四頭肌(股內側肌)。","options":{"A":"正確。股四頭肌伸膝(伸直小腿)。","B":"正確。股直肌可屈髖(屈大腿)。","C":"正確。股外側肌為肌肉注射部位。","D":"錯誤(即為答案)。股三角內側界為內收長肌，非股內側肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.10-11 肌肉組織與骨骼肌系統","實用人體解剖學（華杏）肌肉系統章","Moore《Clinically Oriented Anatomy》8e"]}},"101110-N1-11":{"quick":"正解(D)。鼻淚管(nasolacrimal duct)開口於下鼻道。","detail":{"background":"鼻道與其開口：①下鼻道(下鼻甲下方)＝「鼻淚管」開口於此(故哭泣或鼻炎時流淚會流到鼻腔);②中鼻道＝額竇、上頜竇、前及中篩竇開口;③上鼻道＝後篩竇開口;④蝶篩隱窩(上鼻甲後上方)＝蝶竇開口。故下鼻道為鼻淚管開口處。","options":{"A":"錯誤。下鼻道在下鼻甲「下方」，非介於下、中鼻甲之間。","B":"錯誤。蝶竇開口於蝶篩隱窩。","C":"錯誤。上頜竇開口於中鼻道。","D":"正確。鼻淚管開口於下鼻道。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"101110-N1-7":{"quick":"正解(B)。支氣管動脈源自胸主動脈，供應肺組織本身的營養血。","detail":{"background":"肺有雙重血液供應：①「肺循環(功能性)」＝肺動脈(來自右心室)送缺氧血到肺泡行氣體交換，肺靜脈帶含氧血回左心房;②「支氣管循環(營養性)」＝「支氣管動脈」直接源自「胸主動脈」(或上肋間動脈)，供應支氣管樹與肺結締組織本身的氧與養分。故支氣管動脈是胸主動脈的分枝(屬體循環)。","options":{"A":"錯誤。胸內(乳內)動脈供應前胸壁。","B":"正確。支氣管動脈源自胸主動脈。","C":"錯誤。胸外側動脈供應胸壁外側、乳房。","D":"錯誤。肺動脈是功能性循環，非營養支氣管動脈來源。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"102030-N1-12":{"quick":"正解(D)。聲帶張於甲狀軟骨(前)與杓狀軟骨(後)之間。","detail":{"background":"真聲帶(vocal fold)是張於喉部「甲狀軟骨(前方,內角)」與「杓狀軟骨(arytenoid,後方,聲帶突)」之間的黏膜皺襞，內含聲帶韌帶與聲帶肌。杓狀軟骨可旋轉/滑動以開合聲門、調整聲帶。會厭軟骨蓋住喉口防嗆;環狀軟骨在喉最下、為完整環;小角軟骨位於杓狀軟骨頂端。故聲帶後端連於杓狀軟骨。","options":{"A":"錯誤。會厭軟骨蓋喉口。","B":"錯誤。小角軟骨在杓狀軟骨頂端，非聲帶附著。","C":"錯誤。環狀軟骨在喉最下端。","D":"正確。聲帶後端附於杓狀軟骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"102110-N1-12":{"quick":"正解(C)。右肺原3葉切除中葉剩2葉;左肺本就2葉。故左2、右2。","detail":{"background":"肺葉：右肺有「上、中、下」三葉(由水平裂與斜裂分隔);左肺因心臟偏左只有「上、下」二葉(另有心切迹與舌葉)。本題右肺切除「右中葉」後剩上、下二葉(=2葉);左肺未動仍為2葉。故術後左肺2葉、右肺2葉。","options":{"A":"錯誤。","B":"錯誤。","C":"正確。左肺2葉、右肺切中葉後剩2葉。","D":"錯誤。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"103030-N1-12":{"quick":"正解(A)。細支氣管(bronchiole)管壁已無軟骨支撐，改以平滑肌維持。","detail":{"background":"支氣管樹管壁軟骨的變化：氣管與主支氣管有C形/不規則軟骨環;進入肺後的次級(葉)、三級(節)支氣管軟骨變為不規則軟骨片;到「細支氣管(bronchiole，直徑<1mm)」時「軟骨完全消失」，管壁主要靠「平滑肌」維持，故易受自主神經與藥物(支氣管擴張劑/氣喘收縮)影響管徑。故無軟骨者為細支氣管。","options":{"A":"正確。細支氣管無軟骨，以平滑肌為主。","B":"錯誤。三級(節)支氣管仍有軟骨片。","C":"錯誤。次級(葉)支氣管有軟骨。","D":"錯誤。主支氣管有C形軟骨環。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"103100-N1-12":{"quick":"正解(C)。蝶竇開口於「蝶篩隱窩」，不開口於中鼻道。","detail":{"background":"副鼻竇開口：額竇、上頜竇、前及中篩竇→「中鼻道」;後篩竇→上鼻道;「蝶竇→蝶篩隱窩(上鼻甲後上方)」。故「不開口於中鼻道」者為蝶竇。深化：開口於中鼻道者口訣可記「額、上頜、前中篩→中鼻道」;後篩竇→上鼻道;蝶竇→蝶篩隱窩。臨床上鼻竇炎以上頜竇最常見,因其開口位置偏高、引流不易而易蓄膿。","options":{"A":"開口中鼻道。額竇。","B":"前中篩竇開口中鼻道。","C":"不開口中鼻道(即為答案)。蝶竇開口蝶篩隱窩。","D":"開口中鼻道。上頜竇。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"103100-N1-2":{"quick":"正解(D)。胸縱膈底部由橫膈與腹腔分隔。","detail":{"background":"縱膈(mediastinum)是兩側胸膜腔之間的區域，內含心臟(及心包)、大血管(主動脈、上下腔靜脈、肺動靜脈)、氣管與主支氣管、食道、胸腺、神經(迷走、膈神經)與淋巴等，「但不含肺臟」(肺在兩側胸膜腔)。它「不是密閉體腔」(是器官填充的間隙);主動脈確實經過縱膈;其底部由「橫膈」與下方腹腔分隔。故正確者為(D)。","options":{"A":"錯誤。縱膈含心臟但「不含肺臟」(肺在胸膜腔)。","B":"錯誤。縱膈非密閉體腔，是充填器官的區域。","C":"錯誤。主動脈(弓、胸主動脈)經過縱膈。","D":"正確。縱膈底由橫膈與腹腔分隔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"104030-N1-10":{"quick":"正解(B)。真聲帶黏膜皺襞附著於甲狀軟骨(前)與杓狀軟骨(後)之間。","detail":{"background":"真聲帶(vocal fold)前端附於甲狀軟骨內角、後端附於「杓狀軟骨」聲帶突，中含聲帶韌帶。發聲時杓狀軟骨內收使聲門閉合、氣流振動聲帶。故附著於甲狀軟骨與杓狀軟骨之間(與102030-12同概念)。","options":{"A":"錯誤。甲狀軟骨與環狀軟骨間有環甲膜(非聲帶)。","B":"正確。甲狀軟骨與杓狀軟骨之間。","C":"錯誤。會厭軟骨與聲帶附著無關。","D":"錯誤。會厭與杓狀軟骨間為杓會厭襞。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"104030-N1-2":{"quick":"正解(C)。縱膈腔內含氣管與食道(及心臟、大血管等)。","detail":{"background":"縱膈(mediastinum)位於「腹側體腔」的胸部，是兩肺(胸膜腔)之間的區域，內含心臟、大血管、「氣管、食道」、胸腺、神經與淋巴。它不覆蓋肺表面(那是胸膜)、也非體內最大的體腔(最大為腹腔)、屬腹側(非背側)體腔。故正確敘述為「腔內含氣管與食道」。","options":{"A":"錯誤。縱膈屬腹側(非背側)體腔。","B":"錯誤。覆蓋肺表面的是胸膜。","C":"正確。縱膈含氣管與食道。","D":"錯誤。最大體腔是腹腔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"104030-N1-5":{"quick":"正解(A)。上頜骨(腭突)構成鼻腔底板(硬腭前部)。","detail":{"background":"鼻腔構造辨析：①底板(鼻腔底)由上頜骨腭突與腭骨水平板構成(即硬腭)——正確;②鼻腔的骨「不全是顏面骨」，頂與後部含篩骨、蝶骨(屬腦顱骨);③並非每塊圍鼻腔的骨都含副鼻竇(如犁骨、下鼻甲無竇);④位置最高的副鼻竇是額竇/篩竇位置偏高，但「最高」非篩竇的標準描述(蝶竇最深、額竇最高靠前)。故正確者為(A)。","options":{"A":"正確。上頜骨構成鼻腔底板(硬腭前)。","B":"錯誤。鼻腔骨含篩骨、蝶骨(屬腦顱骨)。","C":"錯誤。並非圍鼻腔的骨都含副鼻竇。","D":"錯誤。篩竇非「位置最高」的標準說法。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"104100-N1-11":{"quick":"正解(D)。肺小葉內主要的呼吸管道為「細支氣管(bronchiole)」。","detail":{"background":"肺小葉(pulmonary lobule)是被結締組織包圍的肺功能單位，每個小葉由一條「細支氣管(bronchiole)」進入，再分為終末細支氣管→呼吸性細支氣管→肺泡管→肺泡。主、次、三級支氣管位於小葉之外的傳導通道。故肺小葉內主要呼吸管道是細支氣管。","options":{"A":"錯誤。主支氣管在肺門外。","B":"錯誤。次級(葉)支氣管供應肺葉。","C":"錯誤。三級(節)支氣管供應肺節。","D":"正確。細支氣管是肺小葉內主要通道。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"104100-N1-13":{"quick":"正解(D為「非其功能」者)。吞噬灰塵是「肺泡巨噬細胞(塵細胞)」的功能，不是第一型肺泡細胞。","detail":{"background":"肺泡上皮細胞兩型：①第一型肺泡細胞(type I)＝扁平的單層鱗狀上皮，覆蓋約95%肺泡表面，與微血管內皮共構「呼吸膜」，是氣體擴散的場所;②第二型肺泡細胞(type II)＝立方狀，分泌「表面張力劑(surfactant)」降低表面張力防塌陷，並為肺泡修復幹細胞。「吞噬灰塵與微生物」則是「肺泡巨噬細胞(dust cell)」的工作。故(D)不是第一型肺泡細胞的功能。","options":{"A":"是其功能。第一型細胞構成呼吸膜。","B":"是其功能。容許氣體擴散。","C":"是其功能。第一型細胞為單層鱗狀上皮。","D":"不是(即為答案)。吞噬灰塵是肺泡巨噬細胞的功能。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"105030-N1-11":{"quick":"正解(B)。呼吸性細支氣管(respiratory bronchiole)最接近肺泡囊，已開始有氣體交換。","detail":{"background":"下呼吸道由傳導區進入呼吸區：終末細支氣管(傳導區末端,純導氣)→「呼吸性細支氣管(respiratory bronchiole)」(管壁開始出現少數肺泡,已能少量交換氣體)→肺泡管→肺泡囊→肺泡。選項中「最接近肺泡囊」且已屬呼吸區者為呼吸性細支氣管(其後即接肺泡管、肺泡囊)。肺葉/肺節支氣管與終末細支氣管離肺泡囊較遠。","options":{"A":"錯誤。肺葉支氣管離肺泡囊遠。","B":"正確。呼吸性細支氣管最接近肺泡囊。","C":"錯誤。肺節支氣管離肺泡囊遠。","D":"錯誤。終末細支氣管在呼吸性細支氣管之前。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"106030-N1-10":{"quick":"正解(B)。細支氣管(bronchiole)無軟骨結構，以平滑肌維持管徑。","detail":{"background":"支氣管樹軟骨遞減：主支氣管(C形軟骨)→葉、節支氣管(不規則軟骨片)→「細支氣管」軟骨完全消失，改由平滑肌支撐。故無軟骨者為細支氣管(與103030-12同概念)。深化：支氣管樹軟骨「由多到無」——主支氣管C形軟骨環→葉/節支氣管不規則軟骨片→細支氣管『無軟骨、靠平滑肌』。故氣喘發作時細支氣管平滑肌痙攣收縮造成喘鳴,支氣管擴張劑(β2致效劑)即作用於此處平滑肌。","options":{"A":"錯誤。肺葉支氣管有軟骨片。","B":"正確。細支氣管無軟骨。","C":"錯誤。肺節支氣管有軟骨片。","D":"錯誤。主支氣管有C形軟骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"106030-N1-9":{"quick":"正解(D)。杓狀軟骨位於環狀軟骨上方，可旋轉/滑動以調節聲帶緊張度。","detail":{"background":"喉軟骨：甲狀軟骨(喉結,前壁)、環狀軟骨(最下完整環)、會厭軟骨(蓋喉口);成對的杓狀軟骨(arytenoid)坐落於「環狀軟骨後上方」，其聲帶突連接聲帶後端、肌突供喉肌附著，藉旋轉與滑動可開合聲門並「調節聲帶緊張度(音調)」。故位於環狀軟骨上方、調節聲帶者為杓狀軟骨。","options":{"A":"錯誤。甲狀軟骨形成喉結與喉前壁。","B":"錯誤。小角軟骨在杓狀軟骨頂端。","C":"錯誤。楔狀軟骨在杓會厭襞內。","D":"正確。杓狀軟骨調節聲帶緊張度。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"106111-N1-11":{"quick":"正解(D)。氣管內襯為「偽複層纖毛柱狀上皮」(含杯狀細胞)。","detail":{"background":"氣管(trachea)辨析：①位於食道「前方」(非後方);②約在「胸骨角(約T4–T5)」高度分為左右主支氣管(非T2);③軟骨環為「C形『透明』軟骨」(非彈性軟骨);④內襯為「偽複層纖毛柱狀上皮+杯狀細胞」，以黏液纖毛梯把異物推向咽部。故正確者為(D)。","options":{"A":"錯誤。氣管在食道前方。","B":"錯誤。約在胸骨角(T4–5)分叉，非T2。","C":"錯誤。為C形「透明」軟骨，非彈性軟骨。","D":"正確。氣管內襯偽複層纖毛柱狀上皮。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"108020-N1-13":{"quick":"正解(C)。第二型肺泡細胞分泌表面張力劑(surfactant)。","detail":{"background":"第二型肺泡細胞(type II pneumocyte)為立方形，胞質含板層體，分泌「表面張力劑(surfactant，主成分為磷脂dipalmitoylphosphatidylcholine)」，降低肺泡表面張力、防止呼氣末肺泡塌陷並維持肺順應性。早產兒surfactant不足→新生兒呼吸窘迫症候群(RDS)。第一型細胞司氣體交換、巨噬細胞司吞噬、內皮細胞構成微血管壁。故分泌surfactant者為第二型肺泡細胞。","options":{"A":"錯誤。內皮細胞構成微血管壁。","B":"錯誤。第一型細胞主氣體交換。","C":"正確。第二型肺泡細胞分泌surfactant。","D":"錯誤。巨噬細胞主吞噬。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"108020-N1-5":{"quick":"正解(D)。額骨含額竇(屬副鼻竇)。","detail":{"background":"含副鼻竇的骨為「額骨(額竇)、上頜骨(上頜竇)、篩骨(篩竇)、蝶骨(蝶竇)」。鼻骨、顴骨、腭骨不含副鼻竇。故選項中含副鼻竇者為額骨。深化：四對副鼻竇=額竇、上頜竇(最大)、篩竇、蝶竇,皆與鼻腔相通、內襯偽複層纖毛柱狀上皮、可減輕顱骨重量並作發聲共鳴腔;下頷骨、鼻骨、顴骨、腭骨皆不含竇。新生兒上頜竇與篩竇已有、額竇與蝶竇出生後才逐漸發育。","options":{"A":"錯誤。鼻骨不含竇。","B":"錯誤。顴骨不含竇。","C":"錯誤。腭骨不含竇。","D":"正確。額骨含額竇。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"108020-N1-7":{"quick":"正解(D為「錯誤」者)。胸膜並非包覆「所有」胸腔臟器——心臟由心包包覆、縱膈器官不被胸膜直接包覆。","detail":{"background":"胸膜與腹膜同為「漿膜(serosa)」，皆有壁層與臟層、內襯單層扁平上皮(間皮)、分泌漿液減少摩擦。但(D)錯：胸膜只包覆「肺」(臟層胸膜)與胸壁/縱膈面(壁層胸膜)，心臟由「心包」包覆、縱膈內器官並非都被胸膜包覆;同理腹膜也並非包覆「所有」腹腔臟器(腹膜後器官如腎、胰、十二指腸大部只被前面覆蓋)。故(D)為錯誤敘述。","options":{"A":"正確。胸膜與腹膜皆屬漿膜。","B":"正確。皆有壁層與臟層。","C":"正確。漿膜內襯單層扁平上皮(間皮)。","D":"錯誤(即為答案)。並非包覆所有胸/腹腔臟器(如心臟由心包覆、腹膜後器官)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"108110-N1-6":{"quick":"正解(C)。右主支氣管較短、寬且垂直，異物較易掉入右側。","detail":{"background":"肺與支氣管辨析：①右肺由「斜裂與水平裂」分成上、中、下三葉(斜裂分上下、水平裂另分出中葉);②左肺只由「斜裂」分上、下二葉(無水平裂);③「右主支氣管較左側短、寬、垂直」，故吸入異物較易進入右主支氣管與右下葉;④肺門位於肺的「縱膈面(內側面)」而非肋面，是支氣管、肺血管、神經出入處。故正確者為(C)。","options":{"A":"錯誤。斜裂分右肺上下，水平裂另分中葉(右肺三葉)。","B":"錯誤。左肺無水平裂(僅斜裂分上下二葉)。","C":"正確。右主支氣管短寬垂直，異物易入右側。","D":"錯誤。肺門位於肺的縱膈面，非肋面。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"109110-N1-5":{"quick":"正解(C為「錯誤」者)。臟層胸膜襯在「肺」表面，不是襯在氣管壁上。","detail":{"background":"胸膜(pleura)為雙層漿膜：「壁層胸膜」貼胸壁內面、橫膈上面與縱膈側面;「臟層胸膜」緊貼「肺」表面並深入肺裂;兩層之間為胸膜腔，內有少量漿液潤滑、維持負壓使肺貼著胸壁。氣管壁不被臟層胸膜包覆。故錯誤者為(C)。","options":{"A":"正確。胸膜為雙層漿膜。","B":"正確。胸膜腔內有潤滑液。","C":"錯誤(即為答案)。臟層胸膜貼於肺表面，非氣管壁。","D":"正確。壁層胸膜襯胸腔內壁。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"110030-N1-12":{"quick":"正解(C)。終末細支氣管(terminal bronchiole)只導氣、無肺泡，不行氣體交換。","detail":{"background":"呼吸道分「傳導區」與「呼吸區」：傳導區(鼻到終末細支氣管)只負責導氣、無氣體交換(構成解剖無效腔);呼吸區從「呼吸性細支氣管」起，管壁出現肺泡開始交換，續以肺泡管、肺泡囊、肺泡。故「只傳送氣體、不交換」者為終末細支氣管(傳導區末端)。肺泡囊、肺泡管、呼吸性細支氣管皆屬呼吸區、可交換氣體。","options":{"A":"錯誤。肺泡囊行氣體交換。","B":"錯誤。肺泡管行氣體交換。","C":"正確。終末細支氣管只導氣、不交換。","D":"錯誤。呼吸性細支氣管已可少量交換。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"110110-N1-5":{"quick":"正解(A為「不通過」者)。胸管(淋巴)不經肺門;肺門通過支氣管、肺動脈、肺靜脈、支氣管血管、神經與淋巴。","detail":{"background":"肺門(hilum)是肺縱膈面的凹陷，為「主支氣管、肺動脈、肺靜脈、支氣管動靜脈、自主神經、淋巴管/結」出入肺的門戶(合稱肺根)。「胸管(thoracic duct)」是收集下半身與左上半身淋巴、上行注入左靜脈角的大淋巴管，走行於後縱膈、「不經過肺門」。故不通過肺門者為胸管。","options":{"A":"不通過(即為答案)。胸管走後縱膈，不經肺門。","B":"通過。肺動脈經肺門。","C":"通過。肺靜脈經肺門。","D":"通過。主支氣管經肺門。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"111030-N1-14":{"quick":"正解(C)。供應肺實質營養的支氣管動脈源自胸主動脈。","detail":{"background":"營養肺組織本身的「支氣管動脈」直接由「胸主動脈」(降主動脈胸段)發出(右側有時來自上肋間動脈)，屬體循環、攜含氧血。肺動脈屬功能性肺循環(攜缺氧血去交換);肺靜脈帶含氧血回心;胸內動脈供前胸壁。故發出支氣管動脈者為胸主動脈(與101110-7同概念)。","options":{"A":"錯誤。肺動脈屬功能性循環。","B":"錯誤。肺靜脈回流含氧血。","C":"正確。支氣管動脈源自胸主動脈。","D":"錯誤。胸內動脈供前胸壁。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"111030-N1-4":{"quick":"正解(B)。呼吸膜由第一型肺泡細胞與微血管內皮細胞(及其融合的基底膜)構成。","detail":{"background":"呼吸膜(respiratory/blood-air barrier)是氣體擴散的屏障，由內而外為：①肺泡上皮的「第一型肺泡細胞(type I)」與其基底膜;②融合的基底膜(間質);③「微血管內皮細胞」與其基底膜。氧與二氧化碳即經此薄膜(約0.5μm)擴散。第二型細胞分泌surfactant、巨噬細胞吞噬，皆「不」構成呼吸膜。故呼吸膜＝第一型肺泡細胞＋微血管內皮細胞＋結締組織。","options":{"A":"錯誤。第二型細胞不構成呼吸膜。","B":"正確。第一型肺泡細胞＋微血管內皮細胞構成呼吸膜。","C":"錯誤。第二型細胞非呼吸膜成分。","D":"錯誤。巨噬細胞非呼吸膜成分。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"111030-N1-6":{"quick":"正解(D)。呼吸性細支氣管(respiratory bronchiole)管壁已有肺泡，可行氣體交換。","detail":{"background":"氣體交換始於「呼吸性細支氣管」(管壁開始出現少量肺泡)，再經肺泡管、肺泡囊、肺泡完成大量交換。葉支氣管、節支氣管、終末細支氣管皆屬「傳導區」只導氣不交換。故具氣體交換功能者為呼吸性細支氣管。深化：呼吸道分傳導區(到終末細支氣管,只導氣)與呼吸區(從呼吸性細支氣管起,管壁出現肺泡可交換氣體);故氣體交換始於呼吸性細支氣管,再經肺泡管、肺泡囊、肺泡。傳導區構成解剖無效腔(約150mL)。","options":{"A":"錯誤。葉支氣管只導氣。","B":"錯誤。節支氣管只導氣。","C":"錯誤。終末細支氣管只導氣。","D":"正確。呼吸性細支氣管開始有氣體交換。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"112180-N1-4":{"quick":"正解(B)。喉結由「甲狀軟骨」前角構成。","detail":{"background":"喉結(laryngeal prominence, Adam's apple)是「甲狀軟骨(thyroid cartilage)」左右兩板在前正中線會合形成的隆起，男性因青春期睪固酮使甲狀軟骨增大而較明顯。會厭軟骨蓋喉口、杓狀軟骨調聲帶、環狀軟骨在喉下端，皆不形成喉結。","options":{"A":"錯誤。會厭軟骨蓋喉口。","B":"正確。喉結由甲狀軟骨構成。","C":"錯誤。杓狀軟骨調節聲帶。","D":"錯誤。環狀軟骨在喉最下端。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"113100-N1-3":{"quick":"正解(B)。環甲肌(cricothyroid)收縮使甲狀軟骨前傾、拉長並「繃緊」聲帶，提高音調。","detail":{"background":"喉內肌調節聲帶：①「環甲肌(cricothyroid)」(唯一由喉上神經支配)收縮使甲狀軟骨前傾，拉長並繃緊聲帶→提高音調(緊張肌);②甲杓肌/聲帶肌使聲帶鬆弛縮短;③「後環杓肌(posterior cricoarytenoid)」是唯一「外展聲帶(開聲門)」的肌;④「外側環杓肌與杓肌」內收聲帶(閉聲門)。故繃緊聲帶者為環甲肌。","options":{"A":"錯誤。杓肌內收聲帶(閉聲門)。","B":"正確。環甲肌繃緊聲帶。","C":"錯誤。後環杓肌外展聲帶(唯一開聲門肌)。","D":"錯誤。外側環杓肌內收聲帶。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"113180-N1-7":{"quick":"正解(C)。聲帶前端附甲狀軟骨、後端附「杓狀軟骨」。","detail":{"background":"真聲帶張於甲狀軟骨(前,內角)與杓狀軟骨(後,聲帶突)之間。杓狀軟骨旋轉/滑動可開合聲門、調節聲帶長度與張力。故後端連結者為杓狀軟骨(與102030-12、104030-10同概念)。深化：真聲帶張於甲狀軟骨(前,內角)與杓狀軟骨(後,聲帶突)之間,杓狀軟骨旋轉滑動可開合聲門、調聲帶張力;喉內肌除環甲肌(喉上神經)外皆由喉返神經(迷走分支)支配,甲狀腺手術易傷喉返神經致聲帶麻痺、聲嘶。","options":{"A":"錯誤。會厭軟骨蓋喉口。","B":"錯誤。環狀軟骨在喉下端。","C":"正確。聲帶後端連於杓狀軟骨。","D":"錯誤。楔狀軟骨在杓會厭襞內。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"114030-N1-11":{"quick":"正解(D)。腹腔與骨盆腔之間無實質構造區隔，相互連通，積水可互通。","detail":{"background":"體腔分隔：胸腔與腹腔之間有「橫膈」完全分隔;胸腔內縱膈腔、左右胸膜腔、心包腔彼此皆有膜壁分隔;唯獨「腹腔(abdominal cavity)」與「骨盆腔(pelvic cavity)」之間「沒有實質構造分隔」，兩者實為連續的腹骨盆腔(abdominopelvic cavity)，故腹腔內積水(如腹水、出血)可自由流到骨盆腔(臨床上女性可積於直腸子宮陷凹/道格拉斯窩)。故答案為(D)。","options":{"A":"錯誤。縱膈與胸膜腔有膜壁分隔。","B":"錯誤。胸膜腔與心包腔各自獨立。","C":"錯誤。心包腔與腹腔被橫膈分隔。","D":"正確。腹腔與骨盆腔連通、無實質分隔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"115030-N1-16":{"quick":"正解(D為「錯誤」者)。右肺斜裂是「上/中葉合稱」與下葉的分界，並非「只分中、下葉而與上葉無涉」。","detail":{"background":"右肺兩裂分三葉：①「水平裂(horizontal fissure)」分隔「上葉與中葉」(與下葉無關)——故(A)(C)正確;②「斜裂(oblique fissure)」分隔「下葉」與「上葉+中葉」，即斜裂的上段分隔上葉與下葉、下段分隔中葉與下葉——故斜裂「同時與上葉、中葉、下葉相關」。(B)說中、下葉間只有斜裂正確;但(D)說「斜裂只作為中、下葉分界、與上葉無涉」是錯的(斜裂上段也分隔上葉與下葉)。故錯誤者為(D)。","options":{"A":"正確。上、中葉之間只有水平裂。","B":"正確。中、下葉之間只有斜裂。","C":"正確。水平裂只分上、中葉，與下葉無涉。","D":"錯誤(即為答案)。斜裂上段也分隔上葉與下葉，並非與上葉無涉。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.23 The Respiratory System","實用人體解剖學（華杏）呼吸系統章","Moore《Clinically Oriented Anatomy》8e 胸部"]}},"101030-N1-9":{"quick":"正解(C為「不構成」者)。近腎絲球細胞屬於分泌腎素的旁絲球器，不是過濾膜的一部分。","detail":{"background":"腎絲球過濾膜(filtration membrane)由三層構成：①腎絲球微血管的「有孔(fenestrated)內皮細胞」;②融合的「基底膜(GBM)」(帶負電,阻擋大分子與帶負電蛋白);③足細胞(podocyte)足突間的「過濾間隙(filtration slit)與裂孔膜」。三者合力讓水與小分子濾過、阻留血球與大蛋白。「近腎絲球(JG)細胞」是入球小動脈管壁特化的平滑肌細胞，分泌腎素(renin)調節血壓，屬「旁腎絲球器」而非過濾膜。故不構成過濾膜者為近腎絲球細胞。","options":{"A":"構成。基底膜是過濾膜中層。","B":"構成。足突間過濾間隙(裂孔膜)。","C":"不構成(即為答案)。JG細胞屬旁絲球器、分泌腎素。","D":"構成。有孔微血管內皮為過濾膜內層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"101110-N1-10":{"quick":"正解(A)。相鄰兩腎錐體之間、由皮質伸入髓質的構造稱「腎柱(renal column)」。","detail":{"background":"腎臟內部：外層為腎皮質(含腎絲球與曲小管)，內層髓質由數個三角形的「腎錐體(renal pyramid)」組成，錐體尖端為腎乳頭、開口於小腎盞。皮質組織伸入兩相鄰錐體之間的部分稱「腎柱(renal column/Bertin柱)」，內走葉間血管。腎竇是腎門內的腔(容納腎盂、腎盞、血管脂肪);腎盂、腎盞屬集尿排尿系統。故錐體間構造為腎柱。","options":{"A":"正確。腎柱位於相鄰腎錐體之間。","B":"錯誤。腎竇是腎門內的腔。","C":"錯誤。腎盂是漏斗狀集尿腔。","D":"錯誤。腎盞接收腎乳頭排出的尿。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"103030-N1-10":{"quick":"正解(C為「錯誤」者)。皮質腎元數量遠多於近髓質腎元(約7:1)，故說近髓質腎元為皮質的7倍是反了。","detail":{"background":"腎元(nephron)是製尿的基本構造與功能單位，由腎小體(腎絲球+鮑氏囊)與腎小管組成。依位置分：①「皮質腎元(cortical nephron)」約佔85%，亨利氏環短;②「近髓質腎元(juxtamedullary nephron)」約佔15%，亨利氏環深入髓質、伴直血管，「濃縮尿液能力較強(逆流機制)」。故皮質腎元約為近髓質腎元的5–7倍(反過來)。(C)把比例說反，為錯誤。(A)(B)(D)皆正確。","options":{"A":"正確。腎元由腎小體與腎小管組成。","B":"正確。腎元是製尿的基本單位。","C":"錯誤(即為答案)。應是皮質腎元約為近髓質腎元的7倍，非相反。","D":"正確。近髓質腎元濃縮尿液功能較強。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"103100-N1-10":{"quick":"正解(C)。尿道內括約肌位於膀胱頸、為平滑肌(不隨意);尿道外括約肌位於膜部尿道、為骨骼肌(隨意)。","detail":{"background":"排尿控制有兩道括約肌：①「內括約肌(internal urethral sphincter)」位於「膀胱頸/尿道起始」，由「平滑肌」構成、受自主神經控制(不隨意);②「外括約肌(external urethral sphincter)」位於「膜部尿道(穿過泌尿生殖膈處)」，由「骨骼肌」構成、受陰部神經控制(隨意，可憋尿)。故正確配對為(C)：內括約肌在膀胱頸、屬不隨意肌。","options":{"A":"錯誤。外括約肌在膜部尿道但屬「隨意肌」。","B":"錯誤。外括約肌不在膀胱頸。
