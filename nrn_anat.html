Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"102110-N1-7":{"quick":"正解(C為「不是」者)。肝總動脈是「腹腔動脈幹」的分支，不是腹主動脈的直接分枝。","detail":{"background":"腹主動脈的直接分枝包括：膈下動脈、腹腔動脈幹、腸繫膜上/下動脈、腎動脈、腎上腺中動脈、性腺(睪丸/卵巢)動脈、腰動脈、髂總動脈等。而「肝總動脈(common hepatic artery)」是『腹腔動脈幹』的三大分支之一(另為脾動脈、胃左動脈)，屬腹主動脈的『間接』分支。故不是腹主動脈直接分枝者為肝總動脈。","options":{"A":"是直接分枝。睪丸動脈(性腺動脈)。","B":"是直接分枝。膈下動脈。","C":"不是(即為答案)。肝總動脈是腹腔動脈幹的分支。","D":"是直接分枝。腎動脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"102110-N1-8":{"quick":"正解(D)。邊緣動脈(右冠狀動脈分支)把含氧血送到右心室壁。","detail":{"background":"冠狀循環辨析：(A)冠狀動脈源自「升主動脈(主動脈竇)」而非主動脈弓;(B)冠狀動脈供應「心臟本身」而非腦;(C)心臟靜脈血大多回冠狀竇再注入「右心房」(非左心房);(D)「右邊緣動脈(marginal artery)」是右冠狀動脈的分支，供應右心室壁——正確。故正確者為(D)。","options":{"A":"錯誤。冠狀動脈源自升主動脈，非主動脈弓。","B":"錯誤。冠狀動脈供應心臟，非腦。","C":"錯誤。心靜脈血回冠狀竇再入右心房，非左心房。","D":"正確。邊緣動脈供應右心室壁。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"103030-N1-7":{"quick":"正解(B)。靜脈導管連接臍靜脈與下腔靜脈，使含氧血繞過肝臟。","detail":{"background":"胎兒循環三個分流：①「靜脈導管(ductus venosus)」連接「臍靜脈與下腔靜脈」，使來自胎盤的含氧血大部分繞過肝臟直接回下腔靜脈;②卵圓孔(foramen ovale)連左右心房，使血繞過肺;③動脈導管(ductus arteriosus)連肺動脈幹與主動脈弓。出生後靜脈導管閉鎖成靜脈韌帶。故靜脈導管連臍靜脈與下腔靜脈。","options":{"A":"錯誤。非連肝靜脈。","B":"正確。靜脈導管連臍靜脈與下腔靜脈。","C":"錯誤。非連下腔與肝靜脈。","D":"錯誤。非連肝門靜脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"103030-N1-9":{"quick":"正解(C)。肥大細胞(mast cell)在過敏反應時釋出組織胺。","detail":{"background":"「肥大細胞(mast cell)」與血液中的「嗜鹼性球(basophil)」胞質含組織胺與肝素顆粒，在第一型過敏反應(IgE媒介)時去顆粒釋放「組織胺」，造成血管擴張、通透性增加、平滑肌收縮(過敏症狀)。嗜中性球主吞噬細菌;嗜酸性球抗寄生蟲與調節過敏;B淋巴球製造抗體。故釋出組織胺者為肥大細胞。","options":{"A":"錯誤。嗜中性球主吞噬細菌。","B":"錯誤。嗜酸性球抗寄生蟲、調節過敏。","C":"正確。肥大細胞釋出組織胺引發過敏。","D":"錯誤。B淋巴球製造抗體。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"103100-N1-6":{"quick":"正解(A)。測血壓聽診的動脈為「肱動脈」(肘窩處)。","detail":{"background":"量血壓時，壓脈帶綁上臂、聽診器置於肘窩內側的「肱動脈(brachial artery)」上方，聽柯氏音(Korotkoff sounds)判讀收縮/舒張壓。橈動脈在腕部多用於觸脈;股動脈在腹股溝。故血壓聽診動脈為肱動脈。","options":{"A":"正確。肱動脈為血壓聽診部位。","B":"錯誤。橈動脈用於觸脈。","C":"錯誤。尺動脈在腕內側。","D":"錯誤。股動脈在腹股溝。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"103100-N1-8":{"quick":"正解(B為「錯誤」者)。脾臟內破壞老化紅血球的是「脾巨噬細胞」;「庫佛氏細胞(Kupffer cell)」是『肝臟』的巨噬細胞，不在脾臟。","detail":{"background":"紅血球破壞：老化紅血球(約120天)被脾、肝、骨髓的巨噬細胞吞噬。其中「肝臟」的常駐巨噬細胞稱「庫佛氏細胞(Kupffer cell)」(位於肝竇);脾臟的吞噬細胞稱脾巨噬細胞(脾紅髓)。本題(B)把「脾臟中的庫佛氏細胞」連在一起是錯的(庫佛氏細胞在肝不在脾)。(A)成熟紅血球無核無法增生、(C)壽命120天、(D)可運送CO₂皆正確。","options":{"A":"正確。成熟紅血球無核無法增生。","B":"錯誤(即為答案)。庫佛氏細胞在肝臟，非脾臟。","C":"正確。紅血球壽命約120天。","D":"正確。紅血球可運送二氧化碳。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"104030-N1-8":{"quick":"正解(A)。肋下動脈源自胸主動脈。","detail":{"background":"胸主動脈(降主動脈胸段)的分支：臟支(支氣管動脈、食道動脈、心包支)與壁支(後肋間動脈第3–11對、「肋下動脈(subcostal artery，第12肋下方)」、膈上動脈)。胸內(乳內)動脈與胸外側動脈源自鎖骨下動脈/腋動脈;膈下動脈源自腹主動脈。故源自胸主動脈者為肋下動脈。","options":{"A":"正確。肋下動脈源自胸主動脈。","B":"錯誤。胸內動脈源自鎖骨下動脈。","C":"錯誤。膈下動脈源自腹主動脈。","D":"錯誤。胸外側動脈源自腋動脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"104030-N1-9":{"quick":"正解(A)。γ-球蛋白(免疫球蛋白/抗體)存在於血清中。","detail":{"background":"血漿蛋白三大類：①白蛋白(albumin)＝最多，維持血漿膠體滲透壓;②球蛋白(α、β、「γ」)＝γ-球蛋白即「免疫球蛋白(抗體)」由漿細胞分泌、負責體液免疫;③纖維蛋白原(fibrinogen)＝參與凝血。血清(serum)＝血漿去除纖維蛋白原後的液體，仍含γ-球蛋白(抗體)。故(A)正確;(B)最多的是白蛋白非γ-球蛋白;(C)凝血由纖維蛋白原等;(D)膠體滲透壓主成分是白蛋白。","options":{"A":"正確。γ-球蛋白(抗體)存在血清中。","B":"錯誤。最多的血漿蛋白是白蛋白。","C":"錯誤。凝血主要靠纖維蛋白原等凝血因子。","D":"錯誤。膠體滲透壓主成分是白蛋白。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"104100-N1-10":{"quick":"正解(C)。脾臟內有紅髓與白髓，具儲血與免疫功能。","detail":{"background":"脾臟(spleen)：①位於「左」季肋區、胃的左後方(非右側);②「不是消化器官」(不分泌消化液)，屬淋巴/免疫器官;③內部「紅髓(濾血、儲血、破壞老化紅血球)」與「白髓(淋巴組織、免疫)」——故(C)正確;④脾靜脈匯入「肝門靜脈系統」(與腸繫膜上靜脈合成肝門靜脈)，不入腎靜脈。故正確者為(C)。","options":{"A":"錯誤。脾臟在左側季肋區，非右側。","B":"錯誤。脾臟非消化器官、不分泌消化液。","C":"正確。脾有紅髓白髓，司儲血與免疫。","D":"錯誤。脾靜脈匯入肝門靜脈，非腎靜脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"104100-N1-6":{"quick":"正解(C)。小動脈管壁有平滑肌，可調控血管阻力(阻力血管)。","detail":{"background":"血管辨析：(A)橈動脈屬「肌肉型(分配型)動脈」非彈性型(彈性型是主動脈等大動脈);(B)動脈管腔內「無瓣膜」(瓣膜在靜脈與淋巴管，防逆流);(C)「小動脈(arteriole)管壁富含平滑肌，藉收縮舒張調節周邊阻力與血壓」——正確，是主要阻力血管;(D)靜脈回流靠「骨骼肌幫浦、呼吸幫浦與靜脈瓣」而非重力(重力反而阻礙下肢回流)。故正確者為(C)。","options":{"A":"錯誤。橈動脈為肌肉型動脈。","B":"錯誤。動脈無瓣膜(瓣膜在靜脈)。","C":"正確。小動脈平滑肌調控血管阻力。","D":"錯誤。靜脈回流靠肌肉/呼吸幫浦與瓣膜，非重力。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"105030-N1-7":{"quick":"正解(A為「不是右心室構造」者)。梳狀肌(pectinate muscle)位於心房(尤其右心房)內壁，不是右心室構造。","detail":{"background":"右心室內壁構造：「肉柱(trabeculae carneae，心肉柱)」、「乳頭狀肌(papillary muscle)」、「腱索(chordae tendineae，連乳頭肌與三尖瓣)」、節制索等。而「梳狀肌(pectinate muscle)」位於『心房(右心房前壁與心耳)』內壁。故「不是右心室構造」者為梳狀肌(屬心房)。","options":{"A":"不是(即為答案)。梳狀肌在心房內壁。","B":"是右心室構造。乳頭狀肌。","C":"是右心室構造。腱索。","D":"是右心室構造。心肉柱(肉柱)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"105030-N1-8":{"quick":"正解(B)。靜脈導管位於肝臟後側，出生後閉鎖成靜脈韌帶。","detail":{"background":"胎兒「靜脈導管(ductus venosus)」位於肝臟後面(臟面)，連接臍靜脈與下腔靜脈，讓含氧血繞過肝;出生後臍帶結紮、血流停止，靜脈導管閉鎖成「靜脈韌帶(ligamentum venosum)」。動脈導管閉鎖成動脈韌帶;卵圓孔閉鎖成卵圓窩;臍動脈閉鎖成臍內側韌帶。故位於肝後側、出生後閉鎖者為靜脈導管。","options":{"A":"錯誤。動脈導管連肺動脈與主動脈弓。","B":"正確。靜脈導管在肝後側、出生後閉鎖。","C":"錯誤。卵圓孔在心房間隔。","D":"錯誤。臍動脈在臍帶與膀胱旁。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"105090-N1-8":{"quick":"正解(D)。心壁大部分缺氧靜脈血先匯入冠狀竇，再注入右心房。","detail":{"background":"心臟自身的靜脈血(供應心肌後的缺氧血)大部分先匯集到心後面冠狀溝的「冠狀竇(coronary sinus)」，再注入「右心房」。上、下腔靜脈是收集全身(非心壁)的血;肺靜脈帶含氧血回左心房。故心壁缺氧血先收集處為冠狀竇(與101030-10、105090-8呼應)。","options":{"A":"錯誤。上腔靜脈收集上半身血。","B":"錯誤。下腔靜脈收集下半身血。","C":"錯誤。肺靜脈帶含氧血回左心房。","D":"正確。心壁缺氧血先匯入冠狀竇再入右心房。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"105090-N1-9":{"quick":"正解(C為「錯誤」者)。釋放組織胺引發過敏的是「嗜鹼性球/肥大細胞」，不是嗜酸性球。","detail":{"background":"血球功能：(A)紅血球運送氧——正確;(B)嗜中性球與單核球(巨噬細胞)吞噬微生物——正確;(C)「釋放組織胺引發過敏」的是『嗜鹼性球(basophil)與肥大細胞』，『嗜酸性球(eosinophil)』主要對抗寄生蟲並調節(抑制)過敏反應，故(C)錯;(D)淋巴球(B細胞/漿細胞)製造抗體——正確。故錯誤者為(C)。","options":{"A":"正確。紅血球運送氧氣。","B":"正確。嗜中性球與單核球吞噬微生物。","C":"錯誤(即為答案)。釋放組織胺的是嗜鹼性球/肥大細胞，非嗜酸性球。","D":"正確。淋巴球能製造抗體。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"106030-N1-6":{"quick":"正解(B)。貴要靜脈(basilic vein)行前臂內側，與上臂深層靜脈會合成腋靜脈。","detail":{"background":"上肢淺靜脈：「頭靜脈(cephalic vein)」走前臂外側(橈側)上行，注入腋靜脈;「貴要靜脈(basilic vein)」走前臂內側(尺側)上行，在上臂中段與「肱靜脈(深靜脈)」會合成『腋靜脈』;肘正中靜脈連接頭靜脈與貴要靜脈(常用採血)。故行內側並會合成腋靜脈者為貴要靜脈。","options":{"A":"錯誤。頭靜脈走外側、注入腋靜脈但非會合成腋靜脈主幹。","B":"正確。貴要靜脈與肱靜脈會合成腋靜脈。","C":"錯誤。肘正中靜脈連頭與貴要靜脈。","D":"錯誤。前臂正中靜脈引流前臂掌側。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"106030-N1-7":{"quick":"正解(D)。迴旋動脈(circumflex artery)走在心臟左側的冠狀溝中。","detail":{"background":"冠狀動脈走行：①左冠狀動脈分為「前室間(降)動脈(LAD，走前室間溝)」與「迴旋動脈(circumflex，走『左側冠狀溝』繞到心後)」;②右冠狀動脈走右側冠狀溝，分出右邊緣動脈與後室間動脈。冠狀溝(房室溝)是心房與心室的界線。故走在左側冠狀溝者為迴旋動脈。","options":{"A":"錯誤。前室間動脈走前室間溝(非冠狀溝)。","B":"錯誤。後室間動脈走後室間溝。","C":"錯誤。邊緣動脈走右心室下緣。","D":"正確。迴旋動脈走左側冠狀溝。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"106110-N1-6":{"quick":"正解(B)。白血球中數量最多者為嗜中性球，直徑最大者為單核球。","detail":{"background":"白血球比例(數量)由多到少口訣「Never Let Monkeys Eat Bananas」：嗜中性球(Neutrophil，約60–70%，最多)>淋巴球(Lymphocyte)>單核球(Monocyte)>嗜酸性球(Eosinophil)>嗜鹼性球(Basophil)。而「體積(直徑)」最大的是「單核球(monocyte)」。故數量最多＝嗜中性球、直徑最大＝單核球。","options":{"A":"錯誤。最大非嗜酸性球。","B":"正確。最多嗜中性球、最大單核球。","C":"錯誤。最多非淋巴球。","D":"錯誤。最多非淋巴球。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"106110-N1-7":{"quick":"正解(A)。冠狀動脈直接由升主動脈(主動脈竇)分出。","detail":{"background":"「冠狀動脈(coronary artery)」是升主動脈起始處「主動脈竇(aortic sinus，主動脈瓣上方)」直接發出的第一對分支(左、右冠狀動脈)，供應心肌。支氣管動脈、食道動脈源自胸主動脈;前肋間動脈源自胸內動脈。故直接由升主動脈分出者為冠狀動脈(與109030-9同概念)。","options":{"A":"正確。冠狀動脈源自升主動脈。","B":"錯誤。支氣管動脈源自胸主動脈。","C":"錯誤。食道動脈源自胸主動脈。","D":"錯誤。前肋間動脈源自胸內動脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"106111-N1-6":{"quick":"正解(C為「錯誤」者)。奇靜脈匯入「上腔靜脈」，不是下腔靜脈。","detail":{"background":"靜脈路徑辨析：(A)左睪丸(性腺)靜脈匯入左腎靜脈(右側直接入下腔靜脈)——正確;(B)椎靜脈匯入頭臂靜脈——正確;(C)「奇靜脈(azygos vein)收集胸壁與後縱膈血，在T4高度弓形匯入『上腔靜脈』」，故說匯入下腔靜脈為錯;(D)小隱靜脈匯入膕靜脈——正確。故錯誤者為(C)。","options":{"A":"正確。左睪丸靜脈匯入左腎靜脈。","B":"正確。椎靜脈匯入頭臂靜脈。","C":"錯誤(即為答案)。奇靜脈匯入上腔靜脈，非下腔靜脈。","D":"正確。小隱靜脈匯入膕靜脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"106111-N1-7":{"quick":"正解(B)。心包腔位於漿膜性心包膜的壁層與臟層之間。","detail":{"background":"心包(pericardium)由外而內：①纖維性心包膜(緻密結締組織);②漿膜性心包膜，分「壁層(貼纖維性心包內面)」與「臟層(epicardium，緊貼心肌表面)」。「心包腔(pericardial cavity)」是漿膜性心包『壁層與臟層之間』的潛在腔，內含少量漿液潤滑、減少心跳摩擦。心包積液/填塞即積在此腔。故心包腔位於壁層與臟層之間。","options":{"A":"錯誤。纖維性與漿膜性壁層緊貼，非心包腔。","B":"正確。心包腔在漿膜性心包壁層與臟層之間。","C":"錯誤。臟層即心外膜，緊貼心肌、其間非心包腔。","D":"錯誤。臟層與心內膜之間為心肌層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"106111-N1-8":{"quick":"正解(D)。肱靜脈(深靜脈)與肱動脈同名伴行。","detail":{"background":"與同名動脈伴行者多為「深靜脈(deep veins)」，如肱靜脈伴肱動脈、股靜脈伴股動脈。「頭靜脈、大隱靜脈」是『淺靜脈』、單獨走皮下、無同名動脈伴行;「奇靜脈」是收集胸壁的特殊靜脈、無同名動脈。故與同名動脈伴行者為肱靜脈。","options":{"A":"錯誤。頭靜脈為淺靜脈，無同名動脈。","B":"錯誤。大隱靜脈為淺靜脈。","C":"錯誤。奇靜脈無同名動脈。","D":"正確。肱靜脈(深靜脈)與肱動脈伴行。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"107030-N1-6":{"quick":"正解(D)。微血管管壁僅單層內皮細胞與基底膜，「無平滑肌」。","detail":{"background":"血管壁三層(內膜、中膜、外膜)中「中膜含平滑肌」。大動脈(彈性纖維+平滑肌)、大靜脈、小動脈皆有平滑肌(小動脈平滑肌最多、調阻力)。唯獨「微血管(capillary)」管壁只有『單層內皮細胞與基底膜』(及周圍周細胞)，「無平滑肌」，以利物質交換。故管壁不具平滑肌者為微血管。","options":{"A":"有平滑肌。大動脈中膜。","B":"有平滑肌。大靜脈中膜。","C":"有平滑肌。小動脈(最多)。","D":"正確。微血管僅內皮+基底膜，無平滑肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"107030-N1-7":{"quick":"正解(A為「錯誤」者)。淋巴結內富含巨噬細胞(過濾並吞噬淋巴中的病原)，說沒有巨噬細胞是錯的。","detail":{"background":"淋巴結(lymph node)：①竇內富含「巨噬細胞」過濾淋巴、吞噬病原與異物——故(A)「沒有巨噬細胞」為錯;②「輸入淋巴管(多條)從凸面進、輸出淋巴管(少，常一條)從門部出」——故輸出比輸入少，正確;③皮質的「生發中心(germinal center)」是B細胞增生製造淋巴球處——正確;④構造分皮質與髓質——正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。淋巴結內富含巨噬細胞。","B":"正確。輸出淋巴管比輸入少。","C":"正確。生發中心可增生淋巴球。","D":"正確。淋巴結分皮質與髓質。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"107110-N1-6":{"quick":"正解(B)。房室結(AV node)位於心房中隔下部、靠近冠狀竇開口處。","detail":{"background":"心臟傳導系統：①竇房結(SA node)＝右心房上腔靜脈開口處，為節律點;②「房室結(AV node)＝位於『心房中隔下部、三尖瓣與冠狀竇開口附近』」，延遲傳導讓心房先收縮;③希氏束→左右束支→蒲金氏纖維傳到心室肌。故位於冠狀竇開口處者為房室結。","options":{"A":"錯誤。竇房結在右心房上腔靜脈開口處。","B":"正確。房室結在心房中隔下部、近冠狀竇開口。","C":"錯誤。希氏束在室間隔。","D":"錯誤。蒲金氏纖維在心室壁。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"107110-N1-8":{"quick":"正解(D)。單核球(monocyte)離開血液進入組織後轉變成巨噬細胞。","detail":{"background":"「單核球(monocyte)」是血液中最大的白血球，循環1–3天後遊走進入組織，分化為「巨噬細胞(macrophage)」(如肝庫佛氏細胞、肺泡巨噬、骨破骨細胞等)，行吞噬與抗原呈現。巨核細胞產生血小板;肥大(肥胖)細胞釋組織胺;B淋巴球變漿細胞產抗體。故轉變成巨噬細胞者為單核球(與114100-5同概念)。","options":{"A":"錯誤。巨核細胞產生血小板。","B":"錯誤。肥大細胞釋組織胺。","C":"錯誤。B淋巴球變漿細胞產抗體。","D":"正確。單核球進組織變巨噬細胞。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"108020-N1-4":{"quick":"正解(B)。肱動脈脈搏在肱二頭肌「內側」(肘窩內上方)可觸得。","detail":{"background":"肱動脈(brachial artery)沿上臂內側、肱二頭肌『內側溝』下行到肘窩，於「肱二頭肌肌腱內側」可觸得搏動，是量血壓聽診與觸脈處。故肱動脈位於肱二頭肌內側。深化：肱動脈沿肱二頭肌內側溝下行到肘窩,是量血壓聽診(肘窩)與CPR嬰兒摸脈的部位;其上游為腋動脈、下游在肘窩分為橈動脈與尺動脈。肱動脈在上臂中段可作為止血壓迫點。","options":{"A":"錯誤。外側為頭靜脈與肌間隔。","B":"正確。肱動脈在肱二頭肌內側。","C":"錯誤。肱三頭肌在上臂後側。","D":"錯誤。位置不符。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"108020-N1-9":{"quick":"正解(A)。胎兒卵圓孔連通左、右心房。","detail":{"background":"胎兒「卵圓孔(foramen ovale)」是心房中隔上的開口，連通「右心房與左心房」，使來自下腔靜脈的含氧血直接由右心房分流到左心房(繞過尚未工作的肺)。出生後左心房壓升高使卵圓孔功能性關閉、後成卵圓窩。故卵圓孔連通左右心房。","options":{"A":"正確。卵圓孔連通左、右心房。","B":"錯誤。非左右心室。","C":"錯誤。非左心房與左心室。","D":"錯誤。非右心房與右心室。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"108110-N1-10":{"quick":"正解(A)。二尖瓣(左房室瓣)防止血液逆流回左心房。","detail":{"background":"瓣膜防逆流方向：①「二尖瓣(mitral/左房室瓣)」位於左心房與左心室之間，心室收縮時關閉，防止血液逆流回「左心房」;②三尖瓣防回右心房;③主動脈瓣防回左心室、肺動脈瓣防回右心室。故二尖瓣防逆流回左心房。","options":{"A":"正確。二尖瓣防血逆流回左心房。","B":"錯誤。防回左心室是主動脈瓣。","C":"錯誤。防回右心房是三尖瓣。","D":"錯誤。防回右心室是肺動脈瓣。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"108110-N1-5":{"quick":"正解(D)。脾臟的血液(脾動脈)源自腹腔動脈幹。","detail":{"background":"「腹腔動脈幹(celiac trunk)」三大分支：胃左動脈、「脾動脈(splenic artery)」、肝總動脈，分別供應胃、脾(及部分胰)、肝膽。故脾臟血液主要來自腹腔動脈幹(經脾動脈)。膈下動脈供橫膈;腸繫膜上/下動脈供腸道。故答案為腹腔動脈幹。","options":{"A":"錯誤。膈下動脈供橫膈。","B":"錯誤。腸繫膜上動脈供中腸。","C":"錯誤。腸繫膜下動脈供後腸。","D":"正確。脾動脈源自腹腔動脈幹。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"108110-N1-9":{"quick":"正解(B)。T淋巴球在「胸腺」成熟，不是在骨髓。","detail":{"background":"血球生成與成熟：紅血球、嗜中性球、嗜鹼性球、單核球、血小板及B淋巴球皆在「紅骨髓」生成並成熟;唯獨「T淋巴球(T cell)」雖源自骨髓淋巴幹細胞，但必須「遷移到『胸腺(thymus)』成熟」(經陽性與陰性選擇)後才成為功能性T細胞。故最終成熟不在骨髓者為T淋巴球。","options":{"A":"錯誤。紅血球在骨髓成熟。","B":"正確。T淋巴球在胸腺成熟。","C":"錯誤。嗜中性球在骨髓成熟。","D":"錯誤。嗜鹼性球在骨髓成熟。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"109030-N1-10":{"quick":"正解(A為「不是淺靜脈」者)。肱靜脈是上肢「深」靜脈，不是淺靜脈。","detail":{"background":"上肢「淺靜脈(走皮下)」：頭靜脈(外側)、貴要靜脈(內側)、肘正中靜脈、前臂正中靜脈。「肱靜脈(brachial vein)」是與肱動脈伴行的「深靜脈」，不屬淺靜脈。故不是上肢淺靜脈者為肱靜脈。深化：上肢淺靜脈(走皮下、採血用)=頭靜脈(外側)、貴要靜脈(內側)、肘正中靜脈、前臂正中靜脈;肱靜脈是與肱動脈伴行的『深靜脈』。貴要靜脈在上臂中段匯入肱靜脈成腋靜脈;頭靜脈於三角胸肌溝上行入腋靜脈。","options":{"A":"不是(即為答案)。肱靜脈為深靜脈。","B":"是淺靜脈。頭靜脈。","C":"是淺靜脈。貴要靜脈。","D":"是淺靜脈。肘正中靜脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"109030-N1-9":{"quick":"正解(C)。冠狀動脈直接源自升主動脈。","detail":{"background":"冠狀動脈(coronary artery)由升主動脈起始的主動脈竇直接發出(左、右冠狀動脈)，供應心肌。主動脈弓發出頭臂幹、左頸總、左鎖骨下動脈;胸主動脈(降主動脈)發出支氣管、食道動脈等。故冠狀動脈源自升主動脈(與106110-7同概念)。","options":{"A":"錯誤。主動脈弓發出頭頸上肢動脈。","B":"錯誤。胸主動脈供胸壁臟器。","C":"正確。冠狀動脈源自升主動脈。","D":"錯誤。降主動脈即胸/腹主動脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"109110-N1-1":{"quick":"正解(D)。左季肋區肋骨刺入最易傷及脾臟而大出血。","detail":{"background":"「脾臟(spleen)」位於「左季肋區」(第9–11肋深面)，質地脆、血供豐富，是腹部鈍/穿刺傷時最常受傷而「大出血」的器官(左下位肋骨骨折易刺破脾臟)。左肺在更上方胸腔;心臟偏中線;胰臟在腹後壁中央。故左季肋區肋骨刺入最易傷脾臟。","options":{"A":"錯誤。左肺在胸腔上方。","B":"錯誤。心臟在中縱膈。","C":"錯誤。胰臟在腹後壁中央(上腹)。","D":"正確。脾臟位左季肋區、易受傷出血。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"109110-N1-10":{"quick":"正解(B)。房室結位於「心房中隔」下部。","detail":{"background":"房室結(AV node)位於「心房中隔(interatrial septum)下部」、近冠狀竇開口與三尖瓣隔瓣之間，延遲傳導讓心房先完成收縮再傳到心室。希氏束才在心室中隔。故房室結位於心房中隔(與107110-6呼應)。","options":{"A":"錯誤。心室中隔是希氏束/束支所在。","B":"正確。房室結在心房中隔下部。","C":"錯誤。右房室瓣即三尖瓣。","D":"錯誤。左房室瓣即二尖瓣。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"109110-N1-11":{"quick":"正解(D)。左側頸總動脈直接源自主動脈弓。","detail":{"background":"主動脈弓的三大分支(由右至左)：①頭臂動脈幹(brachiocephalic trunk，再分右頸總與右鎖骨下動脈);②「左頸總動脈(left common carotid)」直接由主動脈弓發出;③左鎖骨下動脈。故『左』頸總動脈直接源自主動脈弓(而『右』頸總源自頭臂幹)。","options":{"A":"錯誤。頭臂幹發出的是右頸總動脈。","B":"錯誤。甲狀頸幹源自鎖骨下動脈。","C":"錯誤。升主動脈只發冠狀動脈。","D":"正確。左頸總動脈源自主動脈弓。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"110030-N1-4":{"quick":"正解(C為「錯誤」者)。腱索連接乳頭肌與房室瓣的『瓣膜尖』，不是連到心房。","detail":{"background":"心腔構造辨析：(A)梳狀肌位於心房內壁——正確;(B)卵圓窩(卵圓孔遺跡)位於心房間隔——正確;(C)「房室瓣下方由『腱索(chordae tendineae)』連到『乳頭肌』」，腱索固定瓣膜尖防止心室收縮時瓣膜翻入心房，故腱索是連『乳頭肌與瓣膜』、不是連『心房』，(C)錯;(D)冠狀溝(房室溝)在心房與心室界線上——正確。故錯誤者為(C)。","options":{"A":"正確。梳狀肌在心房內壁。","B":"正確。卵圓窩在心房間隔。","C":"錯誤(即為答案)。腱索連乳頭肌與瓣膜尖，非連心房。","D":"正確。冠狀溝位於心房心室界線。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"110030-N1-5":{"quick":"正解(C)。血紅素含鐵原子，可與氧或二氧化碳結合。","detail":{"background":"紅血球辨析：(A)雙凹圓盤狀沒錯，但直徑約7~8「微米(μm)」非奈米(nm)，故敘述有誤;(B)成熟紅血球「無核」(無多葉核;多葉核是嗜中性球);(C)「血紅素含鐵(Fe)原子，可與氧結合(氧合血紅素)、也可與二氧化碳結合(攜帶部分CO₂)」——正確;(D)O型指紅血球表面「無A、無B抗原」，「O型」不是一種抗原。故正確者為(C)。","options":{"A":"錯誤。紅血球直徑約7~8微米(μm)，非奈米。","B":"錯誤。成熟紅血球無核。","C":"正確。血紅素含鐵，可結合O₂與CO₂。","D":"錯誤。O型指無A無B抗原，無「O抗原」。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"110030-N1-9":{"quick":"正解(B)。間盤(intercalated disc)是心肌細胞間的特殊連接構造。","detail":{"background":"「間盤(閏盤, intercalated disc)」是『心肌(cardiac muscle)』細胞之間特有的階梯狀連接，含「胞橋小體(desmosome)抗拉」與「裂隙結合(gap junction)讓動作電位快速傳遞」，使心肌成為機能性合胞體、同步收縮。骨骼肌、平滑肌無間盤;「橫紋肌」泛指骨骼肌與心肌、不夠專一。故間盤為心肌特殊結構。","options":{"A":"錯誤。骨骼肌無間盤。","B":"正確。間盤為心肌特殊連接。","C":"錯誤。平滑肌無間盤。","D":"錯誤。橫紋肌涵蓋骨骼肌與心肌，不夠專一(專指心肌)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"110110-N1-10":{"quick":"正解(B)。心尖約在左鎖骨中線與第5肋間交會處。","detail":{"background":"心尖(apex of heart)由左心室構成，位置約在「左鎖骨中線與第5肋間隙」交會處，是聽診二尖瓣與觸診心尖搏動(point of maximal impulse, PMI)的部位。心臟肥大時心尖會外移。故心尖在左鎖骨中線第5肋間。","options":{"A":"錯誤。第3肋間偏高。","B":"正確。心尖在左鎖骨中線第5肋間。","C":"錯誤。第7肋間偏低。","D":"錯誤。第9肋間過低。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"110110-N1-11":{"quick":"正解(A)。紅血球壽命約120天，是血球中最長者。","detail":{"background":"血球壽命：紅血球約「120天」(最長);血小板約7–10天;嗜中性球僅數小時至數天(在組織內);多數白血球壽命短(淋巴球部分可記憶數年為例外)。題目選項中最長者為紅血球。深化：血球壽命——紅血球約120天(最長,以脾肝巨噬細胞回收鐵再利用)、血小板7–10天、嗜中性球僅數小時至數天。臨床評估紅血球更新可看『網狀紅血球』比例;脾切除後紅血球壽命延長、可見Howell-Jolly小體。","options":{"A":"正確。紅血球壽命約120天最長。","B":"錯誤。血小板約7–10天。","C":"錯誤。嗜中性球僅數小時至數天。","D":"錯誤。嗜鹼性球壽命短。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"111030-N1-7":{"quick":"正解(B為「不是淋巴組織」者)。腮腺是「唾液腺(外分泌腺)」，不是淋巴組織。","detail":{"background":"淋巴(免疫)器官/組織：扁桃體、淋巴結、胸腺、脾臟、淋巴小結(如腸道Peyer's patches)等，由淋巴組織構成、參與免疫。「腮腺(parotid gland)」是分泌唾液的『外分泌腺(唾液腺)』，不是淋巴組織。故不是淋巴組織者為腮腺。","options":{"A":"是淋巴組織。扁桃體。","B":"不是(即為答案)。腮腺是唾液腺。","C":"是淋巴組織。淋巴結。","D":"是淋巴組織。胸腺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"111030-N1-8":{"quick":"正解(A)。肺靜脈開口於左心房，不開口於右心房。","detail":{"background":"開口於右心房者：上腔靜脈、下腔靜脈、冠狀竇。「肺靜脈(4條)」帶含氧血開口於『左心房』。故不開口於右心房者為肺靜脈(與102030-8同概念)。深化：開口右心房者口訣「上下冠」=上腔靜脈、下腔靜脈、冠狀竇;肺靜脈(4條)入左心房。臨床放中心靜脈導管(經上腔靜脈)末端應位於上腔靜脈與右心房交界,不可進右心房太深以免心律不整。","options":{"A":"不開口右心房(即為答案)。肺靜脈開口左心房。","B":"開口右心房。冠狀竇。","C":"開口右心房。上腔靜脈。","D":"開口右心房。下腔靜脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"112030-N1-6":{"quick":"正解(B)。導管由頸內靜脈進、到上腔靜脈，須經過「頭臂(無名)靜脈」。","detail":{"background":"上半身靜脈回流路徑：頸內靜脈+鎖骨下靜脈→在胸鎖關節後方匯合成「頭臂(無名)靜脈(brachiocephalic vein)」→左右頭臂靜脈再合成「上腔靜脈」→右心房。故導管從頸內靜脈放到上腔靜脈，途中必經「頭臂靜脈」。腋靜脈、頸外靜脈在更外周;鎖骨下靜脈是另一支(非頸內靜脈下游的必經單一路徑)。故答案為頭臂靜脈。","options":{"A":"錯誤。鎖骨下靜脈是另一支匯入頭臂靜脈。","B":"正確。頸內靜脈→頭臂靜脈→上腔靜脈。","C":"錯誤。腋靜脈在上肢近端。","D":"錯誤。頸外靜脈引流頭皮淺層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"112110-N1-3":{"quick":"正解(A)。成熟紅血球無細胞核(以利攜氧並增加變形能力)。","detail":{"background":"人類成熟「紅血球(RBC)」是唯一「無細胞核、無胞器」的血球(成熟過程中排出細胞核)，呈雙凹圓盤狀，全身充滿血紅素以最大化攜氧、並增加變形性以通過微血管。白血球、巨噬細胞、神經元皆有細胞核。故無細胞核者為紅血球。","options":{"A":"正確。成熟紅血球無細胞核。","B":"錯誤。白血球有核。","C":"錯誤。巨噬細胞有核。","D":"錯誤。神經元有核。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"112110-N1-5":{"quick":"正解(A)。腎動脈是腹主動脈的直接分支。","detail":{"background":"腎動脈(renal artery)於約L1–L2高度由「腹主動脈」兩側直接發出(成對臟支)，供應腎臟。腹腔動脈幹、腸繫膜上/下動脈是供應消化道的不成對臟支，不發出腎動脈。故腎動脈源自腹主動脈(與102030-11同概念)。","options":{"A":"正確。腎動脈源自腹主動脈。","B":"錯誤。腹腔動脈幹供肝胃脾。","C":"錯誤。腸繫膜上動脈供中腸。","D":"錯誤。腸繫膜下動脈供後腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"112110-N1-6":{"quick":"正解(C)。腎臟的血供來自腹主動脈的腎動脈，不源自腹腔動脈幹。","detail":{"background":"「腹腔動脈幹(celiac trunk)」供應前腸衍生器官：肝、膽、胃、脾、胰大部、十二指腸上段(經肝總、脾、胃左動脈)。而「腎臟(kidney)」的血供來自『腹主動脈直接發出的腎動脈』，不來自腹腔動脈幹。故不源自腹腔動脈幹者為腎。","options":{"A":"源自腹腔動脈幹。肝(肝總動脈)。","B":"源自腹腔動脈幹。胰(部分)。","C":"不源自(即為答案)。腎由腎動脈(腹主動脈)供血。","D":"源自腹腔動脈幹。脾(脾動脈)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"112180-N1-5":{"quick":"正解(A)。肝靜脈直接匯入下腔靜脈。","detail":{"background":"「肝靜脈(hepatic veins，2–3條)」收集肝臟血(含經肝門靜脈與肝動脈來的血)後，在肝臟上後方「直接匯入下腔靜脈」回右心房。脾靜脈、腸繫膜上/下靜脈則匯入「肝門靜脈系統」(把消化道血先帶到肝)，不直接接下腔靜脈。故與下腔靜脈直接相連者為肝靜脈。","options":{"A":"正確。肝靜脈直接匯入下腔靜脈。","B":"錯誤。脾靜脈匯入肝門靜脈。","C":"錯誤。腸繫膜上靜脈匯入肝門靜脈。","D":"錯誤。腸繫膜下靜脈匯入脾/肝門靜脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"113030-N1-14":{"quick":"正解(D)。右心室的腱索固著於三尖瓣(右房室瓣)。","detail":{"background":"右心室內，「腱索(chordae tendineae)」連接乳頭肌與「三尖瓣(右房室瓣，三個瓣尖)」的瓣膜尖，於心室收縮時拉住瓣膜防止翻入右心房;左心室的腱索則固著於二尖瓣。肺動脈瓣、主動脈瓣是半月瓣、無腱索。故右心室腱索固著於三尖瓣。","options":{"A":"錯誤。肺動脈瓣為半月瓣、無腱索。","B":"錯誤。主動脈瓣為半月瓣、無腱索。","C":"錯誤。二尖瓣腱索在左心室。","D":"正確。右心室腱索固著三尖瓣。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"113100-N1-4":{"quick":"正解(B)。右心房與右心室之間為三尖瓣(右房室瓣)。","detail":{"background":"房室瓣：右心房與右心室之間為「三尖瓣(tricuspid valve，三個瓣尖)」;左心房與左心室之間為「二尖瓣(mitral，兩瓣尖)」。肺動脈瓣在右心室與肺動脈幹之間;心房中膈是分隔左右心房的壁、非瓣膜。故隔開右心房與右心室者為三尖瓣。","options":{"A":"錯誤。肺動脈瓣在右心室出口。","B":"正確。三尖瓣分隔右心房與右心室。","C":"錯誤。二尖瓣分隔左心房與左心室。","D":"錯誤。心房中膈分隔左右心房。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"113180-N1-6":{"quick":"正解(A)。淋巴最終在「左、右靜脈角(頸內靜脈與鎖骨下靜脈交會處)」匯入靜脈。","detail":{"background":"淋巴回流終點：①「胸管(thoracic duct)」收集下半身與左上半身淋巴，注入「左靜脈角(左頸內靜脈與左鎖骨下靜脈交會處)」;②「右淋巴管(right lymphatic duct)」收集右上半身淋巴，注入「右靜脈角」。故淋巴匯入靜脈處＝頸內靜脈與鎖骨下靜脈交會處(靜脈角)。","options":{"A":"正確。淋巴在頸內靜脈與鎖骨下靜脈交會處(靜脈角)匯入。","B":"錯誤。頭靜脈與腋靜脈交會非淋巴匯入處。","C":"錯誤。左右頭臂靜脈交會成上腔靜脈、非淋巴匯入處。","D":"錯誤。肋間靜脈非淋巴匯入處。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"114030-N1-14":{"quick":"正解(D)。主動脈是典型的「彈性(傳導)動脈」。","detail":{"background":"動脈依中膜成分分：①「彈性(傳導)動脈」＝中膜富含彈性纖維，如主動脈、肺動脈幹、頭臂幹、頸總動脈等大動脈，可在心室收縮時擴張儲能、舒張時回彈推血(Windkessel效應，使血流平順);②「肌肉(分配)動脈」＝中膜以平滑肌為主，如腎、脾、股、橈等中等動脈。故屬彈性動脈者為主動脈。","options":{"A":"錯誤。腎動脈為肌肉型動脈。","B":"錯誤。脾動脈為肌肉型動脈。","C":"錯誤。股動脈為肌肉型動脈。","D":"正確。主動脈為彈性動脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"114030-N1-7":{"quick":"正解(C)。胎兒時經卵圓孔，右心房可與「左心房」直接相通。","detail":{"background":"胎兒「卵圓孔(foramen ovale)」位於心房中隔，使「右心房」的含氧血(來自下腔靜脈)可直接分流到「左心房」，繞過尚未充氣的肺。故胎兒時與右心房直接相通者為左心房。動脈導管連肺動脈幹與主動脈弓;肺動脈幹接右心室;左心室在左心房下游。故答案為左心房。","options":{"A":"錯誤。動脈導管連肺動脈幹與主動脈弓。","B":"錯誤。肺動脈幹接右心室。","C":"正確。經卵圓孔右心房與左心房相通。","D":"錯誤。左心室在左心房下游。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"114100-N1-4":{"quick":"正解(B)。左冠狀動脈主要分為前室間(降)動脈(LAD)與迴旋動脈。","detail":{"background":"「左冠狀動脈(LCA)」由左主幹分為兩大支：①「前室間(降)動脈(LAD)」沿前室間溝下行，供應前壁與大部分室間隔;②「迴旋動脈(circumflex)」沿左冠狀溝繞向心後，供應左心房與左心室側後壁。後室間動脈與右邊緣動脈通常屬「右」冠狀動脈。故左冠狀動脈分為前室間動脈與迴旋動脈。","options":{"A":"錯誤。邊緣動脈屬右冠狀動脈。","B":"正確。LAD與迴旋動脈為左冠狀動脈主支。","C":"錯誤。後室間與邊緣動脈多屬右冠狀。","D":"錯誤。後室間動脈多屬右冠狀。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"114100-N1-5":{"quick":"正解(C)。巨噬細胞由單核球分化而成。","detail":{"background":"血液中的「單核球(monocyte)」遊走進入組織後分化為「巨噬細胞(macrophage)」，行吞噬與抗原呈現。嗜酸性球抗寄生蟲;嗜鹼性球釋組織胺;淋巴球司專一性免疫。故巨噬細胞由單核球分化(與107110-8同概念)。","options":{"A":"錯誤。嗜酸性球抗寄生蟲。","B":"錯誤。嗜鹼性球釋組織胺。","C":"正確。巨噬細胞由單核球分化。","D":"錯誤。淋巴球司專一免疫。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"114170-N1-4":{"quick":"正解(C)。心包腔位於漿膜性心包膜的壁層與臟層之間。","detail":{"background":"心包腔(pericardial cavity)是「漿膜性心包膜的『壁層』與『臟層(心外膜)』之間」的潛在腔，內含少量漿液潤滑減少心跳摩擦。纖維性心包膜在最外、與漿膜性壁層緊貼;臟層緊貼心肌。故心包腔在壁層與臟層之間(與106111-7同概念)。","options":{"A":"錯誤。纖維性與漿膜性壁層緊貼，非心包腔。","B":"錯誤。與胸膜無關。","C":"正確。心包腔在漿膜性心包壁層與臟層之間。","D":"錯誤。纖維性心包與胸壁間非心包腔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"114170-N1-5":{"quick":"正解(A)。松果腺是內分泌腺，不屬淋巴器官、不製造免疫細胞。","detail":{"background":"淋巴(免疫)器官：胸腺(T細胞成熟)、脾臟(濾血免疫)、扁桃腺、淋巴結等，能製造或成熟免疫細胞。「松果腺(pineal gland)」是『內分泌腺』，分泌褪黑激素、調節生理時鐘，「不屬淋巴器官、不製造免疫細胞」。故答案為松果腺。","options":{"A":"正確(即為答案)。松果腺為內分泌腺，非淋巴器官。","B":"錯誤。胸腺為淋巴器官(T細胞成熟)。","C":"錯誤。脾臟為淋巴器官。","D":"錯誤。扁桃腺為淋巴組織。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"114170-N1-8":{"quick":"正解(A)。主動脈瓣聽診區在「胸骨右側第二肋間」。","detail":{"background":"心臟瓣膜聽診區：①「主動脈瓣＝胸骨『右』緣第2肋間」;②肺動脈瓣＝胸骨『左』緣第2肋間;③三尖瓣＝胸骨左緣第4–5肋間;④二尖瓣(心尖)＝左鎖骨中線第5肋間。故聽主動脈瓣關閉(第二心音主動脈成分)最佳處為胸骨右側第二肋間。","options":{"A":"正確。主動脈瓣聽診區在胸骨右側第二肋間。","B":"錯誤。胸骨左側第二肋間是肺動脈瓣區。","C":"錯誤。胸骨右側第五肋間非主動脈瓣區。","D":"錯誤。胸骨左側第五肋間近三尖瓣區。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"115030-N1-14":{"quick":"正解(D)。第一心音(S1)由房室瓣(二尖瓣與三尖瓣)關閉產生。","detail":{"background":"心音：①「第一心音(S1, \"lub\")＝心室收縮開始時『房室瓣(二尖瓣+三尖瓣)』關閉」所產生;②第二心音(S2, \"dub\")＝心室舒張開始時『半月瓣(主動脈瓣+肺動脈瓣)』關閉所產生。選項中屬房室瓣者為「二尖瓣」，故第一心音由二尖瓣(及三尖瓣)關閉產生。","options":{"A":"錯誤。肺動脈瓣關閉產生第二心音。","B":"錯誤。下腔靜脈無瓣膜參與心音。","C":"錯誤。主動脈瓣關閉產生第二心音。","D":"正確。二尖瓣(房室瓣)關閉產生第一心音。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"115030-N1-15":{"quick":"正解(A)。下肢養分主要由「髂外動脈」供應(延續為股動脈)。","detail":{"background":"髂總動脈分為髂內與髂外動脈：①「髂外動脈(external iliac)」經腹股溝韌帶下延續為「股動脈(femoral artery)」，是『下肢(大腿、小腿、足)』的主要供血動脈;②髂內動脈供應骨盆腔器官、會陰與臀部。故供應下肢養分的最主要血管為髂外動脈。","options":{"A":"正確。髂外動脈(→股動脈)供應下肢。","B":"錯誤。髂內動脈供骨盆與臀。","C":"錯誤。旋髂淺動脈僅供腹股溝淺層。","D":"錯誤。旋髂深動脈供髂嵴附近，非下肢主血管。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"101030-N1-13":{"quick":"正解(B)。消化道管壁由內向外＝黏膜層→黏膜下層→肌肉層→漿膜層，即②①③④。","detail":{"background":"消化道管壁四層(由內腔向外)：①「黏膜層(mucosa)」＝上皮+固有層+黏膜肌層;②「黏膜下層(submucosa)」＝結締組織含血管與梅氏神經叢;③「肌肉層(muscularis externa)」＝內環外縱平滑肌含奧氏神經叢;④「漿膜層(serosa)或纖維膜(adventitia)」。題目代號1=黏膜下層、2=黏膜層、3=肌肉層、4=漿膜層，由內往外即2→1→3→4(②①③④)。","options":{"A":"錯誤。1234＝黏膜下層在最內，不符。","B":"正確。2134＝黏膜→黏膜下→肌肉→漿膜。","C":"錯誤。1243不符。","D":"錯誤。2314不符。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"101030-N1-14":{"quick":"正解(C)。膽囊位於肝右葉與方葉之間(膽囊窩)。","detail":{"background":"肝臟臟面以「H形溝」分四葉：右葉、左葉、上方的方葉(quadrate lobe)、後方的尾葉(caudate lobe)。「膽囊(gallbladder)」位於肝臟臟面的膽囊窩，介於「右葉與方葉之間」。膽囊窩前緣可定位膽囊底。故膽囊在肝右葉與方葉之間。","options":{"A":"錯誤。左葉與方葉間為肝圓韌帶裂。","B":"錯誤。位置不符。","C":"正確。膽囊在肝右葉與方葉之間。","D":"錯誤。右葉與尾葉間為下腔靜脈溝。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"101030-N1-2":{"quick":"正解(D)。右季肋區器官破裂大出血最可能是肝臟受損。","detail":{"background":"「肝臟(liver)」是腹腔最大實質器官，主要位於「右季肋區」(及上腹部)，質脆血供豐富，是右下肋骨骨折或右上腹鈍傷時最易破裂大出血的器官。右肺在胸腔;胰臟在腹後壁中央;脾臟在左季肋區。故右季肋區受損出血者為肝臟(對照左季肋區→脾臟)。","options":{"A":"錯誤。右肺在胸腔。","B":"錯誤。胰臟在中上腹後壁。","C":"錯誤。脾臟在左季肋區。","D":"正確。肝臟在右季肋區，最易受損。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"101030-N1-8":{"quick":"正解(D)。空腸由腸繫膜上動脈供血，不由腹腔動脈幹供應。","detail":{"background":"腹腔動脈幹(celiac trunk)供應「前腸衍生器官」：胃、肝、膽囊、脾、胰大部、十二指腸上段(經肝總、脾、胃左動脈)。而「空腸(jejunum)」屬中腸，由「腸繫膜上動脈(SMA)」供血。故不由腹腔動脈幹供應者為空腸。","options":{"A":"由腹腔動脈幹供。膽囊(經膽囊動脈)。","B":"由腹腔動脈幹供。胰臟大部。","C":"由腹腔動脈幹供。脾臟(脾動脈)。","D":"不由(即為答案)。空腸由腸繫膜上動脈供血。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"101110-N1-12":{"quick":"正解(C)。腎臟是腹膜後器官(retroperitoneal)。","detail":{"background":"腹膜後(retroperitoneal)器官口訣「SAD PUCKER」：腎上腺、「腎(kidney)」、輸尿管、胰大部、十二指腸2–4段、升結腸、降結腸、主動脈與下腔靜脈等，只有前面被腹膜覆蓋。胃、肝、脾、空迴腸、橫結腸、乙狀結腸是「腹膜內(intraperitoneal)」器官(有腸繫膜)。故腹膜後器官為腎臟。","options":{"A":"錯誤。胃為腹膜內器官。","B":"錯誤。肝為腹膜內(有冠狀韌帶)。","C":"正確。腎臟為腹膜後器官。","D":"錯誤。脾為腹膜內器官。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"101110-N1-13":{"quick":"正解(C為「錯誤」者)。腮腺導管(Stensen管)是「橫越(越過)」嚼肌表面後穿頰肌入口腔，不是「貫穿嚼肌」。","detail":{"background":"腮腺(parotid gland，耳下腺)：①又稱耳下腺——正確;②是最大的唾液腺——正確;③其導管(Stensen/腮腺管)「橫越嚼肌『外側表面』，再轉而穿過『頰肌』」進入口腔——故說「貫穿嚼肌」是錯的(它穿的是頰肌);④開口於「上頜第二大臼齒」對側的頰黏膜——正確。故錯誤者為(C)。","options":{"A":"正確。腮腺又稱耳下腺。","B":"正確。腮腺是最大的唾液腺。","C":"錯誤(即為答案)。腮腺管越過嚼肌表面、穿過頰肌，非貫穿嚼肌。","D":"正確。開口於上頜第二大臼齒處。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"102030-N1-13":{"quick":"正解(A為「錯誤」者)。食道內襯為「複層鱗狀上皮」(耐摩擦)，不是單層柱狀上皮。","detail":{"background":"食道(esophagus)：①內襯「複層(非角質化)鱗狀上皮」耐摩擦，故(A)說單層柱狀為錯;②大部分外層為「纖維(外)膜」無漿膜覆蓋(僅腹段有漿膜)——正確;③肌肉層「上1/3為骨骼肌、中1/3骨骼肌與平滑肌混合、下1/3為平滑肌」——正確;④食道裂孔約在「第10胸椎(T10)」高度穿橫膈——正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。食道為複層鱗狀上皮，非單層柱狀。","B":"正確。食道外層多為纖維膜、無漿膜。","C":"正確。中1/3含橫紋肌與平滑肌。","D":"正確。食道裂孔約在T10高度。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"102030-N1-14":{"quick":"正解(D)。肝小葉由肝細胞輻射狀排列組成，肝具再生能力。","detail":{"background":"肝小葉(hepatic lobule)是肝的構造功能單位，呈六角形，「中央為中央靜脈，肝細胞索以中央靜脈為中心『輻射狀』排列」，六角周邊為「門脈三合體(portal triad，含肝動脈分支、肝門靜脈分支、膽小管)」。塵細胞(庫佛氏細胞)位於『竇狀隙(肝血竇)』非中央/肝靜脈竇。肝細胞再生能力強。故(D)正確;(A)塵細胞在竇狀隙;(B)中央是中央靜脈非門脈三合體;(C)門脈三合體含肝動脈、肝門靜脈與膽管(非中央靜脈)。","options":{"A":"錯誤。塵細胞(庫佛氏細胞)位於竇狀隙。","B":"錯誤。肝小葉中央是中央靜脈，門脈三合體在周邊。","C":"錯誤。門脈三合體含肝動脈、肝門靜脈、膽管(非中央靜脈)。","D":"正確。肝細胞輻射狀排列、具再生能力。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"102030-N1-7":{"quick":"正解(A)。升結腸由腸繫膜上動脈(SMA)供血。","detail":{"background":"腸道動脈供應依胚胎來源：中腸(十二指腸下段到橫結腸近2/3)由「腸繫膜上動脈(SMA)」供應，包括空腸、迴腸、盲腸、闌尾、「升結腸」與橫結腸右2/3;後腸(橫結腸左1/3到直腸上段)由腸繫膜下動脈(IMA)供應。故升結腸由腸繫膜上動脈供血。","options":{"A":"正確。升結腸由腸繫膜上動脈供血。","B":"錯誤。腸繫膜下動脈供降結腸以下。","C":"錯誤。腹腔動脈幹供前腸。","D":"錯誤。髂內動脈供骨盆器官。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"102110-N1-13":{"quick":"正解(D)。布魯納氏腺(Brunner gland)只存在於十二指腸。","detail":{"background":"「布魯納氏腺(Brunner gland)」是位於『十二指腸黏膜下層』的分泌「鹼性黏液」的腺體(中和胃酸、保護腸黏膜)，是十二指腸的「獨有特徵」。巴內特氏細胞(Paneth cell)見於小腸隱窩各段;乳糜管(lacteal)在所有小腸絨毛中心;環形皺襞(plica circularis)見於整段小腸(空腸最明顯)。故只存在於十二指腸者為布魯納氏腺。","options":{"A":"錯誤。Paneth細胞見於小腸各段隱窩。","B":"錯誤。乳糜管在所有小腸絨毛。","C":"錯誤。環形皺襞見於整段小腸。","D":"正確。布魯納氏腺只在十二指腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"102110-N1-14":{"quick":"正解(B為「錯誤」者)。絲狀乳頭「大多不含味蕾」(主司觸覺與摩擦)，說大多含味蕾是錯的。","detail":{"background":"舌乳頭：①「絲狀乳頭(filiform)」＝數目最多、體積最小、分布舌前2/3、角質化、『不含味蕾』(司觸覺與摩擦食物);②蕈狀乳頭(fungiform，舌尖多)、葉狀乳頭、輪廓乳頭含味蕾。本題(B)說絲狀乳頭「大多含味蕾」為錯(它大多無味蕾);(A)分布舌前2/3、(C)數目最多、(D)體積最小皆正確。故錯誤者為(B)。","options":{"A":"正確。絲狀乳頭分布舌前2/3。","B":"錯誤(即為答案)。絲狀乳頭大多不含味蕾。","C":"正確。絲狀乳頭數目最多。","D":"正確。絲狀乳頭體積最小。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"103030-N1-13":{"quick":"正解(B為「錯誤」者)。結腸帶是「縱向(縱走)」的帶狀構造，不是環向。","detail":{"background":"結腸帶(taenia coli)：①由大腸「外縱肌集中成三條縱帶」、屬平滑肌——故是『縱向』非環向，(B)錯;②比腸管短，使腸壁皺縮形成「結腸袋(haustra)」;③升、橫、降、乙狀結腸都有;④「直腸」處縱帶散開成完整外縱肌、故無結腸帶。故錯誤者為(B)。","options":{"A":"正確。結腸帶由平滑肌(外縱肌)構成。","B":"錯誤(即為答案)。結腸帶是縱向帶狀構造，非環向。","C":"正確。橫結腸有結腸帶。","D":"正確。直腸無結腸帶。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"103030-N1-4":{"quick":"正解(D)。麥氏點位於肚臍與「右髂前上棘」連線的外1/3處。","detail":{"background":"麥氏點(McBurney point)是闌尾根部的體表投影，位於「肚臍與『右髂前上棘(right ASIS)』連線的外側1/3與內側2/3交界處」，急性闌尾炎時此處有壓痛與反彈痛。故連線端點為右髂前上棘。","options":{"A":"錯誤。左側且非ASIS。","B":"錯誤。麥氏點在右側。","C":"錯誤。是髂前上棘非下棘。","D":"正確。肚臍與右髂前上棘連線外1/3。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"103100-N1-13":{"quick":"正解(D)。前臼齒(前磨牙)不是乳齒;乳齒無前臼齒。","detail":{"background":"乳齒(deciduous teeth)共20顆，每側上下各：門齒2(中、外側門齒)、犬齒1、「乳臼齒2(第一、第二乳臼齒)」，「沒有前臼齒(前磨牙)」。恆齒(32顆)才有前臼齒(前磨牙)。故不是乳齒者為前臼齒。","options":{"A":"是乳齒。外側門齒。","B":"是乳齒。第一(乳)臼齒。","C":"是乳齒。第二(乳)臼齒。","D":"不是(即為答案)。前臼齒(前磨牙)為恆齒，乳齒無。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"103100-N1-14":{"quick":"正解(A)。食道上皮(複層鱗狀)無杯狀細胞。","detail":{"background":"杯狀細胞(goblet cell，分泌黏液)分布於「胃以下到大腸的單層柱狀上皮」(十二指腸、迴腸、闌尾、大腸含豐富杯狀細胞);胃幽門部黏膜雖以黏液細胞為主但也屬柱狀上皮含黏液細胞。而「食道」是『複層鱗狀上皮』，「不含杯狀細胞」。故無杯狀細胞者為食道。","options":{"A":"正確。食道為複層鱗狀上皮，無杯狀細胞。","B":"錯誤。胃幽門有黏液分泌細胞。","C":"錯誤。十二指腸含杯狀細胞。","D":"錯誤。闌尾含杯狀細胞。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"103100-N1-15":{"quick":"正解(A)。下腔靜脈介於肝臟尾葉與右葉之間(下腔靜脈溝)。","detail":{"background":"肝臟後面有「下腔靜脈溝」，「下腔靜脈(IVC)」嵌於肝臟尾葉(caudate lobe)與右葉之間的溝中，肝靜脈在此注入IVC。膽囊在右葉與方葉間;肝圓韌帶在左葉與方葉間(臍裂);靜脈韌帶在左葉與尾葉間(靜脈韌帶裂)。故介於尾葉與右葉之間者為下腔靜脈。","options":{"A":"正確。下腔靜脈在肝尾葉與右葉之間。","B":"錯誤。膽囊在右葉與方葉間。","C":"錯誤。肝圓韌帶在左葉與方葉間。","D":"錯誤。靜脈韌帶在左葉與尾葉間。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"104030-N1-13":{"quick":"正解(C)。靜脈韌帶位於肝左葉與尾狀葉之間(靜脈韌帶裂)。","detail":{"background":"「靜脈韌帶(ligamentum venosum)」是胎兒靜脈導管閉鎖後的纖維索，位於肝臟臟面「左葉與尾狀葉之間的靜脈韌帶裂」。膽囊在右葉與方葉間;下腔靜脈在尾葉與右葉間;肝鐮韌帶在肝膈面連到前腹壁。故介於左葉與尾狀葉間者為靜脈韌帶。","options":{"A":"錯誤。膽囊在右葉與方葉間。","B":"錯誤。下腔靜脈在尾葉與右葉間。","C":"正確。靜脈韌帶在左葉與尾狀葉之間。","D":"錯誤。肝鐮韌帶在膈面。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"104030-N1-14":{"quick":"正解(B)。胃蛋白酶原(pepsinogen)由胃腺「主細胞(chief cell)」分泌。","detail":{"background":"胃腺細胞：①「主細胞(chief cell)」＝分泌『胃蛋白酶原(pepsinogen)』(遇胃酸活化成胃蛋白酶)與少量胃脂酶;②壁(泌酸)細胞＝分泌『鹽酸(HCl)與內在因子』;③黏液頸細胞＝分泌黏液;④腸內分泌(G)細胞＝分泌胃泌素。故分泌胃蛋白酶原者為主細胞。","options":{"A":"錯誤。壁細胞分泌鹽酸與內在因子。","B":"正確。主細胞分泌胃蛋白酶原。","C":"錯誤。黏液頸細胞分泌黏液。","D":"錯誤。腸內分泌細胞分泌胃泌素等激素。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"104100-N1-12":{"quick":"正解(B)。膽囊位於肝右葉與方形葉之間。","detail":{"background":"膽囊(gallbladder)位於肝臟臟面的膽囊窩，介於「肝右葉與方形葉之間」(與101030-14同概念)。故答案為右葉與方形葉之間。深化：肝臟臟面「H形溝」分四葉——膽囊窩(右葉與方葉間)容膽囊、下腔靜脈溝(右葉與尾葉間)容IVC、臍裂(左葉與方葉間)走肝圓韌帶、靜脈韌帶裂(左葉與尾葉間)走靜脈韌帶。記住「膽囊在右葉與方葉之間」可一併推出其餘三溝。","options":{"A":"錯誤。右葉與尾葉間為下腔靜脈溝。","B":"正確。膽囊在右葉與方形葉之間。","C":"錯誤。左葉與尾葉間為靜脈韌帶。","D":"錯誤。左葉與方葉間為肝圓韌帶。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"105030-N1-12":{"quick":"正解(A為「不是三合體構造」者)。中央靜脈位於肝小葉中央，不屬周邊的門脈三合體。","detail":{"background":"肝小葉「門脈三合體(portal triad)」位於六角形小葉的「周邊角」，含三個構造：①肝動脈分支;②肝門靜脈分支;③膽小管(膽管)。而「中央靜脈(central vein)」位於小葉『中央』、收集肝竇血回肝靜脈，「不屬門脈三合體」。故不是三合體構造者為中央靜脈。","options":{"A":"不是(即為答案)。中央靜脈在小葉中央，非門脈三合體。","B":"是三合體。肝動脈分支。","C":"是三合體。肝門靜脈分支。","D":"是三合體。膽管。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"105030-N1-13":{"quick":"正解(A)。食道內襯複層扁平(鱗狀)上皮。","detail":{"background":"內襯「複層扁平(鱗狀)上皮」者為承受摩擦的部位：口腔、咽、「食道」、肛管。胃、十二指腸、直腸皆為「單層柱狀上皮」(吸收分泌)。故內襯複層扁平上皮者為食道(與105030-13同概念)。深化：複層扁平(鱗狀)上皮見於『摩擦區』——口腔、咽、食道、肛管、陰道、皮膚表皮;單層柱狀上皮見於胃到大腸(吸收分泌);單層扁平見於肺泡、血管內皮、腎絲球(擴散濾過)。食道為複層鱗狀以耐食團摩擦。","options":{"A":"正確。食道為複層扁平上皮。","B":"錯誤。胃為單層柱狀。","C":"錯誤。十二指腸為單層柱狀。","D":"錯誤。直腸為單層柱狀。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"105090-N1-12":{"quick":"正解(D為「不是十二指腸特有」者)。乳糜管(lacteal)存在於『所有小腸絨毛』中，非十二指腸特有。","detail":{"background":"十二指腸的特有構造：①「肝胰壺腹(Vater壺腹)的開口」(主胰管與總膽管會合處，在大十二指腸乳頭);②「副胰管的開口(小十二指腸乳頭)」;③「布魯納氏腺(Brunner gland)」(黏膜下層、分泌鹼性黏液)。而「乳糜管(lacteal)」是每條小腸絨毛中央的『淋巴管』(吸收脂肪)，遍布整段小腸、非十二指腸特有。故不是特有者為乳糜管。","options":{"A":"是特有。肝胰壺腹開口。","B":"是特有。副胰管開口。","C":"是特有。布魯納氏腺。","D":"不是(即為答案)。乳糜管遍布所有小腸絨毛。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"105090-N1-13":{"quick":"正解(D為「錯誤」者)。舌下神經支配「所有舌『內在』肌」(及大部分外在肌)，說它不支配所有舌內在肌是錯的。","detail":{"background":"舌的神經支配：①「舌下神經(hypoglossal, CN XII)」支配『所有舌內在肌』與『大部分舌外在肌(頦舌肌、舌骨舌肌、莖突舌肌)』，唯「腭舌肌」由迷走神經(咽叢)支配;②味蕾也存在於舌以外(軟腭、會厭、咽)——正確;③舌乳頭未必皆有味蕾(絲狀無味蕾)——正確。故(C)「不支配所有舌外在肌」對(腭舌肌例外);(D)「不支配所有舌內在肌」錯(它支配全部內在肌)。故錯誤者為(D)。","options":{"A":"正確。味蕾也在軟腭、會厭、咽。","B":"正確。絲狀乳頭無味蕾，故未必皆有。","C":"正確。腭舌肌由迷走神經支配，故舌下神經不支配「所有」外在肌。","D":"錯誤(即為答案)。舌下神經支配所有舌內在肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"105090-N1-14":{"quick":"正解(B為「無關」者)。腸脂垂(腹膜脂肪小袋)與小腸吸收面積無關。","detail":{"background":"增加小腸吸收面積的三級放大構造：①「環形皺襞(plica circularis)」(黏膜與黏膜下層摺疊);②「絨毛(villi)」(黏膜指狀突起);③「微絨毛(microvilli，刷狀緣)」(上皮細胞游離面)——三者合計使吸收面積放大約600倍。而「腸脂垂(epiploic appendage)」是大腸表面的脂肪小袋，與小腸吸收面積無關。故無關者為腸脂垂。","options":{"A":"有關。環形皺襞增加面積。","B":"無關(即為答案)。腸脂垂為大腸表面脂肪袋。","C":"有關。微絨毛(刷狀緣)增加面積。","D":"有關。絨毛增加吸收面積。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"106030-N1-11":{"quick":"正解(B)。結腸帶(taenia coli)由縱走平滑肌束構成。","detail":{"background":"「結腸帶(taenia coli)」是大腸『外縱肌集中成的三條縱走平滑肌帶』，因比腸管短而使腸壁皺縮成「結腸袋(haustra)」。腸脂垂是脂肪袋;肛柱是肛管內縱皺襞。故由縱走平滑肌束構成者為結腸帶。","options":{"A":"錯誤。結腸袋是腸壁囊袋。","B":"正確。結腸帶由縱走平滑肌構成。","C":"錯誤。腸脂垂為脂肪袋。","D":"錯誤。肛柱是肛管縱皺襞。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"106030-N1-12":{"quick":"正解(B)。蕈狀乳頭(fungiform papilla)分布廣(尤舌尖)且含味蕾。","detail":{"background":"舌乳頭含味蕾情形：①絲狀乳頭數目最多但「無味蕾」;②「蕈狀乳頭(fungiform)」散布舌背(尤舌尖)、紅色蘑菇狀、『含味蕾』;③輪廓乳頭(8–12個排成V形於舌後)含大量味蕾;④葉狀乳頭在舌側後含味蕾。本題問「分布廣泛且具味蕾」者為蕈狀乳頭。","options":{"A":"錯誤。絲狀乳頭無味蕾。","B":"正確。蕈狀乳頭分布廣且含味蕾。","C":"錯誤。輪廓乳頭僅8–12個排V形。","D":"錯誤。葉狀乳頭在舌側後緣。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"106030-N1-13":{"quick":"正解(D)。庫佛氏細胞(Kupffer cell)位於肝竇狀隙(肝血竇)內。","detail":{"background":"「庫佛氏細胞(Kupffer cell)」是肝臟的常駐巨噬細胞(塵細胞)，位於「肝竇狀隙(肝血竇, sinusoid)」的內皮上，吞噬血中的老化紅血球、細菌與異物。中央靜脈收集肝竇血;肝動脈、肝門靜脈在門脈三合體。故庫佛氏細胞位於竇狀隙。","options":{"A":"錯誤。中央靜脈收集肝竇血。","B":"錯誤。肝動脈在門脈三合體。","C":"錯誤。肝門靜脈在門脈三合體。","D":"正確。庫佛氏細胞位於竇狀隙。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"106110-N1-11":{"quick":"正解(C為「不是單層柱狀」者)。食道內襯為複層鱗狀上皮，不是單層柱狀。","detail":{"background":"胃、十二指腸、降結腸內襯皆為「單層柱狀上皮」(吸收分泌)。唯「食道」為『複層鱗狀上皮』(耐摩擦)。故內襯非單層柱狀者為食道。深化：消化道上皮的「摩擦區=複層鱗狀(口腔、咽、食道、肛管),吸收分泌區=單層柱狀(胃到大腸)」。食道與胃的交界(賁門)是鱗狀→柱狀的急轉處,長期胃食道逆流會使下食道鱗狀上皮『腸化生』為柱狀(巴瑞特食道),是食道腺癌的前驅病變。","options":{"A":"是單層柱狀。胃。","B":"是單層柱狀。十二指腸。","C":"不是(即為答案)。食道為複層鱗狀上皮。","D":"是單層柱狀。降結腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"106110-N1-12":{"quick":"正解(C)。胃的「賁門部」接食道、「幽門部」接十二指腸。","detail":{"background":"胃分四部：①「賁門部(cardia)」＝與『食道』相接(賁門括約肌);②胃底部(fundus)＝賁門左上方圓頂;③胃體部(body)＝中段;④「幽門部(pylorus)」＝與『十二指腸』相接(幽門括約肌)。故分別與食道、十二指腸相接者為賁門部與幽門部。","options":{"A":"錯誤。胃體與胃底非接食道與十二指腸的端點。","B":"錯誤。胃底不接食道(賁門才接)。","C":"正確。賁門部接食道、幽門部接十二指腸。","D":"錯誤。組合不符。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"106110-N1-13":{"quick":"正解(B)。胰臟與升結腸皆為腹膜後器官。","detail":{"background":"腹膜後器官：腎、腎上腺、輸尿管、胰大部、十二指腸2–4段、「升結腸」、「降結腸」、主動脈與下腔靜脈。脾、肝為腹膜內;橫結腸、乙狀結腸有腸繫膜屬腹膜內;盲腸多為腹膜內。本題兩者皆腹膜後者為「胰臟與升結腸」。(注意升結腸、降結腸為次發性腹膜後)","options":{"A":"錯誤。脾、肝皆腹膜內。","B":"正確。胰臟與升結腸皆腹膜後。","C":"錯誤。橫結腸為腹膜內(有橫結腸繫膜)。","D":"錯誤。盲腸、乙狀結腸多為腹膜內。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"106111-N1-12":{"quick":"正解(B)。胃小彎的血液由腹腔動脈幹分支(胃左動脈+肝固有動脈的胃右動脈)供應。","detail":{"background":"胃的血供皆源自「腹腔動脈幹(celiac trunk)」：胃小彎由「胃左動脈(腹腔幹直接分支)」與「胃右動脈(肝固有動脈分支)」吻合供應;胃大彎由胃網膜左/右動脈供應;胃底由胃短動脈(脾動脈分支)。源頭都是腹腔動脈幹。故胃小彎血供源自腹腔動脈幹。","options":{"A":"錯誤。下膈動脈供橫膈。","B":"正確。胃小彎血供源自腹腔動脈幹(胃左/右動脈)。","C":"錯誤。腸繫膜上動脈供中腸。","D":"錯誤。腸繫膜下動脈供後腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"106111-N1-13":{"quick":"正解(A)。食道上1/3的肌肉層含骨骼肌。","detail":{"background":"消化道肌肉層多為平滑肌，但兩端例外含「骨骼肌(隨意)」：①「食道上1/3為骨骼肌(中1/3混合、下1/3平滑肌)」;②咽部與口腔肌為骨骼肌;③肛門外括約肌為骨骼肌。胃、十二指腸、直腸的肌肉層為平滑肌。故肌肉層含骨骼肌者(本題選項)為食道。","options":{"A":"正確。食道上1/3含骨骼肌。","B":"錯誤。胃肌層為平滑肌。","C":"錯誤。十二指腸為平滑肌。","D":"錯誤。直腸壁為平滑肌(肛門外括約肌才是骨骼肌)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"107030-N1-12":{"quick":"正解(B)。闌尾由腸繫膜上動脈(經迴結腸動脈→闌尾動脈)供血。","detail":{"background":"闌尾(appendix)屬中腸，其血供來自「腸繫膜上動脈(SMA)」的迴結腸動脈分出的「闌尾動脈」。腹腔動脈幹供前腸;腸繫膜下動脈供後腸;髂內動脈供骨盆。故供應闌尾者為腸繫膜上動脈。深化：闌尾屬中腸,由腸繫膜上動脈→迴結腸動脈→闌尾動脈供血;闌尾動脈是『無側枝吻合的終動脈』,故闌尾炎時血流受阻易缺血壞死穿孔。麥氏點(臍與右髂前上棘連線外1/3)是其體表投影。","options":{"A":"錯誤。腹腔動脈幹供前腸。","B":"正確。闌尾由腸繫膜上動脈供血。","C":"錯誤。腸繫膜下動脈供後腸。","D":"錯誤。髂內動脈供骨盆器官。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"107030-N1-13":{"quick":"正解(A)。肝臟血液來自肝動脈(含氧血)與肝門靜脈(富養分血)。","detail":{"background":"肝臟有雙重血液輸入：①「肝動脈(hepatic artery)」(約25%血流)＝攜含氧血供應肝細胞氧;②「肝門靜脈(hepatic portal vein)」(約75%血流)＝攜消化道吸收的富養分(但缺氧)血到肝代謝。兩者在肝竇匯合，最後經中央靜脈→肝靜脈→下腔靜脈離開。故肝血來自肝動脈與肝門靜脈。","options":{"A":"正確。肝血來自肝動脈與肝門靜脈。","B":"錯誤。肝靜脈是出肝血流。","C":"錯誤。組合不符。","D":"錯誤。腸繫膜上動脈不直接入肝。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"107030-N1-14":{"quick":"正解(C為「錯誤」者)。肝圓韌帶由胚胎期「臍『靜脈』」閉鎖而成，不是臍動脈。","detail":{"background":"肝圓韌帶(round ligament of liver, ligamentum teres hepatis)：①位於肝鐮韌帶游離下緣內;②一端連到前腹壁的肚臍;③「由胚胎期『臍靜脈(umbilical vein)』閉鎖而成」(臍靜脈帶胎盤含氧血回胎兒)，故(C)說由臍動脈閉鎖為錯;④走在肝左葉與方形葉之間(臍裂)。故錯誤者為(C)。","options":{"A":"正確。肝圓韌帶在肝鐮韌帶下緣。","B":"正確。一端連肚臍。","C":"錯誤(即為答案)。由臍『靜脈』閉鎖而成，非臍動脈。","D":"正確。介於肝左葉與方形葉之間。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"107110-N1-12":{"quick":"正解(B為「錯誤」者)。絨毛中央的乳糜管只吸收「脂肪(乳糜微粒)」並送入淋巴，不是吸收所有營養送入血液;醣與胺基酸由絨毛內微血管吸收入血。","detail":{"background":"小腸絨毛(villus)：①為黏膜上皮形成的指狀突起，增加吸收面積;②絨毛中央有「乳糜管(中央乳糜管, lacteal，屬淋巴管)」吸收『脂肪(乳糜微粒)』送入『淋巴系統』，另有微血管網吸收醣類與胺基酸入『血液』——故(B)說乳糜管吸收所有營養並送入血液是錯的;③在十二指腸即可見絨毛。故錯誤者為(B)。","options":{"A":"正確。絨毛為小腸上皮的指狀突起。","B":"錯誤(即為答案)。乳糜管只吸收脂肪入淋巴;醣與胺基酸由微血管入血。","C":"正確。絨毛增加吸收面積。","D":"正確。十二指腸可見絨毛。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"107110-N1-13":{"quick":"正解(A)。絲狀乳頭會角質化，過度時形成舌苔。","detail":{"background":"「絲狀乳頭(filiform papilla)」表面『角質化』、無味蕾、數目最多，主司觸覺與摩擦食物;當口腔衛生不良、發燒、脫水時角質與殘屑堆積，即形成「舌苔」。蕈狀、輪廓、葉狀乳頭含味蕾、不角質化。故會角質化形成舌苔者為絲狀乳頭。","options":{"A":"正確。絲狀乳頭角質化、形成舌苔。","B":"錯誤。蕈狀乳頭含味蕾不角質化。","C":"錯誤。輪廓乳頭含大量味蕾。","D":"錯誤。葉狀乳頭含味蕾。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"107110-N1-14":{"quick":"正解(B為「錯誤」者)。乳齒「有犬齒」(每側上下各1)，說乳齒沒有犬齒是錯的。","detail":{"background":"牙齒：①乳齒20顆(每側上下各：門齒2、犬齒1、乳臼齒2)、恆齒32顆(每側上下各：門齒2、犬齒1、前臼齒2、臼齒3)——正確;②「乳齒『有』犬齒」，故(B)說沒有犬齒為錯;③第二前臼齒(前磨牙)是恆齒(乳齒無前臼齒)——正確;④牙齒以牙周韌帶固定於上下頷骨牙槽——正確。故錯誤者為(B)。","options":{"A":"正確。乳齒20顆、恆齒32顆。","B":"錯誤(即為答案)。乳齒有犬齒。","C":"正確。第二前臼齒為恆齒。","D":"正確。牙齒固定於上下頷骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"107110-N1-7":{"quick":"正解(D)。乙狀結腸由腸繫膜下動脈(IMA)供血。","detail":{"background":"腸繫膜下動脈(IMA)供應「後腸」：橫結腸左1/3、降結腸、「乙狀結腸」、直腸上段(經左結腸、乙狀結腸、上直腸動脈)。迴腸、盲腸、升結腸屬中腸由腸繫膜上動脈供血。故接受IMA供血者為乙狀結腸。深化：腸繫膜下動脈(IMA)供後腸=橫結腸左1/3、降結腸、乙狀結腸、直腸上段(分支:左結腸、乙狀結腸、上直腸動脈);中腸由SMA供血。橫結腸左1/3與降結腸交界的脾曲是兩動脈供血交界(分水嶺),缺血性結腸炎好發於此。","options":{"A":"錯誤。迴腸由腸繫膜上動脈供血。","B":"錯誤。盲腸由腸繫膜上動脈供血。","C":"錯誤。升結腸由腸繫膜上動脈供血。","D":"正確。乙狀結腸由腸繫膜下動脈供血。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"108020-N1-10":{"quick":"正解(C)。眼球的血供來自『眼動脈(內頸動脈分支)』，不是頸外動脈。","detail":{"background":"頸總動脈分為頸內、頸外動脈：①「頸外動脈(external carotid)」供應「頭頸部『顱外』構造」——臉部肌群(面動脈)、舌(舌動脈)、牙齒與顎(上頜動脈)、頭皮、甲狀腺上部等;②「頸內動脈(internal carotid)」供應「腦與『眼球(經眼動脈)』」。故不源自頸外動脈者為眼球(由頸內動脈的眼動脈供血)。","options":{"A":"源自頸外動脈。臉部肌群(面動脈)。","B":"源自頸外動脈。舌(舌動脈)。","C":"不源自(即為答案)。眼球由頸內動脈(眼動脈)供血。","D":"源自頸外動脈。牙齒(上頜動脈)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"108020-N1-12":{"quick":"正解(C)。食道以「蠕動(peristalsis)」把食物向下推送。","detail":{"background":"食道(esophagus)：①位於氣管『後方』(非前方);②食道『上段為骨骼肌』(非平滑肌)、下段平滑肌;③以「蠕動(peristaltic contraction，環肌依序收縮)」把食團向下推送入胃——正確;④「分節運動(segmentation，混合食糜)」主要在『小腸』，非食道。故正確者為(C)。","options":{"A":"錯誤。食道在氣管後方。","B":"錯誤。食道上段為骨骼肌。","C":"正確。食道以蠕動推送食物。","D":"錯誤。分節運動在小腸混合食糜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"108020-N1-8":{"quick":"正解(C)。頸段食道的靜脈血不經肝門靜脈(回上腔靜脈系統)。","detail":{"background":"肝門靜脈系統(hepatic portal system)收集「腹腔消化道(食道腹段到直腸上段)、胰、脾、膽囊」的靜脈血先送到肝。但「頸段食道」屬胸/頸部，其靜脈血經食道靜脈→奇靜脈→『上腔靜脈』回心，「不經肝門靜脈」。胰、闌尾、直腸(上段)的靜脈血都入肝門靜脈。故不經肝門靜脈者為頸段食道。(註：食道下段有門脈-體循環吻合，肝硬化時形成食道靜脈曲張)","options":{"A":"經肝門靜脈。胰臟。","B":"經肝門靜脈。闌尾(經腸繫膜上靜脈)。","C":"不經(即為答案)。頸段食道血回上腔靜脈系統。","D":"直腸上段經肝門靜脈(下段經體循環)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"108110-N1-14":{"quick":"正解(D)。大網膜附著於胃大彎與橫結腸。","detail":{"background":"網膜(omentum)：①「大網膜(greater omentum)」＝由『胃大彎』下垂如圍裙覆蓋腸道，再向上附著於『橫結腸』，含脂肪與免疫細胞(腹腔警察、局限感染);②「小網膜(lesser omentum)」＝連『胃小彎與肝臟』。故大網膜附著於胃大彎與橫結腸。","options":{"A":"錯誤。胃小彎與肝是小網膜。","B":"錯誤。胃小彎屬小網膜。","C":"錯誤。胃大彎對但連橫結腸非肝。","D":"正確。大網膜附著胃大彎與橫結腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"108110-N1-7":{"quick":"正解(A為「錯誤」者)。竇狀隙(肝血竇)管壁由「有孔內皮細胞與庫佛氏細胞」構成，不是由肝細胞構成。","detail":{"background":"肝竇狀隙(sinusoid)：①管壁由「不連續(有孔)的內皮細胞」與其上的「庫佛氏細胞」構成(內皮與肝細胞間為Disse腔)，故(A)說由肝細胞構成為錯;②肝竇血流向中央靜脈、與之連通——正確;③同時接收門脈三合體來的『肝門靜脈血(富養分)』與『肝動脈血(含氧)』——(C)(D)正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。竇狀隙壁為有孔內皮+庫佛氏細胞，非肝細胞。","B":"正確。肝竇與中央靜脈連通。","C":"正確。肝竇接收肝門靜脈血。","D":"正確。肝竇接收肝動脈血。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"109030-N1-12":{"quick":"正解(A)。膽囊黏膜由單層柱狀上皮組成。","detail":{"background":"膽囊(gallbladder)：①黏膜為「單層柱狀上皮(具微絨毛)」，吸收水分『濃縮』膽汁——(A)正確;②位於肝臟方形葉『右側』(膽囊窩),(B)說左側為錯;③膽汁由『肝臟製造』，膽囊只『儲存與濃縮』(C)說膽囊製造膽汁為錯;④「膽囊收縮素(CCK)」由『小腸(十二指腸I細胞)』分泌(非胃)，刺激膽囊收縮排空,(D)說胃分泌為錯。故正確者為(A)。","options":{"A":"正確。膽囊黏膜為單層柱狀上皮。","B":"錯誤。膽囊在方形葉右側(膽囊窩)。","C":"錯誤。膽汁由肝臟製造，膽囊只儲存濃縮。","D":"錯誤。CCK由小腸分泌，非胃。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"109030-N1-13":{"quick":"正解(D為「錯誤」者)。主胰管與膽總管會合開口於『十二指腸』(肝胰壺腹)，不是注入空腸。","detail":{"background":"胰臟(pancreas)：①胰液偏弱鹼性(含碳酸氫鹽中和胃酸)——正確;②位於胃後方、腹膜後——正確;③約99%為外分泌『腺泡細胞』(分泌消化酶)，1%為胰島(內分泌)——正確;④「主胰管與總膽管會合成肝胰壺腹、開口於『十二指腸』大乳頭;副胰管開口於十二指腸小乳頭」，故(D)說注入『空腸』為錯。故錯誤者為(D)。","options":{"A":"正確。胰液偏弱鹼性。","B":"正確。胰臟位於胃後方。","C":"正確。約九成為腺泡細胞。","D":"錯誤(即為答案)。胰管與副胰管注入十二指腸，非空腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"109030-N1-8":{"quick":"正解(D)。肛門(肛管下段)內襯複層扁平(鱗狀)上皮。","detail":{"background":"消化道下端的「肛管(anal canal)」下段(齒狀線以下)內襯「複層扁平(鱗狀)上皮」(承受摩擦，與外皮膚移行)。胃幽門、十二指腸、闌尾皆為單層柱狀上皮。故具複層扁平上皮者為肛門。深化：肛管下段(齒狀線以下)為複層扁平上皮(與外皮膚移行、含體感覺神經故痔瘡疼痛),齒狀線以上為單層柱狀(內臟神經、痔瘡不痛)。此上皮與神經分界是內痔、外痔症狀差異與手術的解剖基礎。","options":{"A":"錯誤。胃幽門為單層柱狀。","B":"錯誤。十二指腸為單層柱狀。","C":"錯誤。闌尾為單層柱狀。","D":"正確。肛門(肛管下段)為複層扁平上皮。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"109110-N1-13":{"quick":"正解(A)。膽汁由肝臟製造，經總膽管注入十二指腸。","detail":{"background":"膽汁(bile)由「肝細胞製造」，經肝管→總膽管(與主胰管會合成肝胰壺腹)→開口於「十二指腸」大乳頭，幫助乳化脂肪。膽囊只『儲存與濃縮』膽汁(不製造)。故膽汁由肝臟製造、注入十二指腸。深化：膽汁由肝細胞製造(乳化脂肪),經肝管→總膽管(與主胰管會合成肝胰壺腹)開口於十二指腸大乳頭;膽囊只儲存與『濃縮』膽汁(不製造)。進食脂肪→小腸分泌CCK→膽囊收縮、Oddi括約肌鬆弛排膽汁。","options":{"A":"正確。肝臟製造膽汁，注入十二指腸。","B":"錯誤。注入十二指腸非空腸。","C":"錯誤。膽囊不製造膽汁(只儲存濃縮)。","D":"錯誤。製造與注入位置皆不符。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"109110-N1-14":{"quick":"正解(A為「錯誤」者)。腮腺主要位於嚼肌的『外側(淺面)』，不是內側。","detail":{"background":"腮腺(parotid gland)：①位於耳前下方、嚼肌『外側(淺面)』與下頜支後方——故(A)說「嚼肌之內側」為錯;②是最大的唾液腺——正確;③其導管(Stensen管)橫越嚼肌表面後『穿過頰肌』開口於上頜第二臼齒對側頰黏膜——(C)正確;④分泌液含『唾液澱粉酶(ptyalin)』——正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。腮腺位於嚼肌外側(淺面)，非內側。","B":"正確。腮腺為最大的唾液腺。","C":"正確。導管穿過頰肌開口於口腔。","D":"正確。腮腺分泌液含唾液澱粉酶。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"109110-N1-6":{"quick":"正解(B)。梅氏神經叢(Meissner plexus)位於消化道的「黏膜下層」。","detail":{"background":"消化道的腸神經系統(內在神經叢)有兩處：①「梅氏(黏膜下)神經叢(Meissner/submucosal plexus)」位於『黏膜下層』，調節腺體分泌與局部血流;②「奧氏(肌間)神經叢(Auerbach/myenteric plexus)」位於『肌肉層(內環與外縱之間)』，調節腸道蠕動。故梅氏神經叢在黏膜下層。","options":{"A":"錯誤。黏膜層無此神經叢主體。","B":"正確。梅氏神經叢在黏膜下層。","C":"錯誤。肌肉層為奧氏神經叢。","D":"錯誤。漿膜層為最外層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"109110-N1-7":{"quick":"正解(C為「不源自腹腔動脈幹」者)。迴腸由腸繫膜上動脈供血，不源自腹腔動脈幹。","detail":{"background":"腹腔動脈幹(celiac trunk)供應前腸器官：胃、肝、膽、脾、胰大部、「十二指腸上段」。而「迴腸(ileum)」屬中腸，由『腸繫膜上動脈(SMA)』供血。故不源自腹腔動脈幹者為迴腸。深化：腹腔動脈幹(celiac trunk)供前腸=胃、肝、膽、脾、胰大部、十二指腸上段(三分支:胃左、脾、肝總動脈);迴腸屬中腸由腸繫膜上動脈供血。記「腹腔幹=前腸、SMA=中腸、IMA=後腸」即可快速判斷。","options":{"A":"源自腹腔動脈幹。胃。","B":"源自腹腔動脈幹。十二指腸(上段)。","C":"不源自(即為答案)。迴腸由腸繫膜上動脈供血。","D":"源自腹腔動脈幹。胰臟大部。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"110030-N1-10":{"quick":"正解(C)。肝胰壺腹開口於十二指腸(大乳頭)。","detail":{"background":"總膽管與主胰管會合成「肝胰壺腹(Vater壺腹)」，開口於「十二指腸降部後內側的『大十二指腸乳頭』」，由Oddi括約肌控制膽汁與胰液排入。故肝胰壺腹開口於十二指腸(與113030-19、109030-13呼應)。","options":{"A":"錯誤。幽門部接胃與十二指腸。","B":"錯誤。賁門部接食道。","C":"正確。肝胰壺腹開口於十二指腸。","D":"錯誤。非空腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"110030-N1-14":{"quick":"正解(C)。大腸最前端(起始)為盲腸(caecum)。","detail":{"background":"大腸由近(前)到遠(後)依序：「盲腸(caecum，含闌尾)→升結腸→橫結腸→降結腸→乙狀結腸→直腸→肛管」。迴腸經迴盲瓣接到盲腸(迴腸屬小腸)。故大腸最前端(起始段)為盲腸。深化：大腸順序「盲腸→升結腸→橫結腸→降結腸→乙狀結腸→直腸→肛管」;盲腸是起點(含闌尾),迴腸經迴盲瓣接盲腸。大腸特徵三寶=結腸帶、結腸袋、腸脂垂;闌尾根部三條結腸帶匯聚,是手術尋找闌尾的標誌。","options":{"A":"錯誤。升結腸在盲腸之後。","B":"錯誤。降結腸在後段。","C":"正確。盲腸是大腸起始段(最前端)。","D":"錯誤。迴腸屬小腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"110030-N1-15":{"quick":"正解(C為「不是腹膜衍生」者)。肝圓韌帶是胚胎臍靜脈閉鎖的纖維索，不是腹膜衍生構造。","detail":{"background":"由「腹膜(腹膜皺褶)衍生」的構造：大網膜、小網膜、腸繫膜、各種腹膜韌帶(如肝鐮韌帶、闊韌帶)等。而「肝圓韌帶(round ligament of liver)」是胚胎期『臍靜脈閉鎖』形成的纖維索(走在肝鐮韌帶游離緣內)，本身是血管殘餘、非腹膜衍生。故不是腹膜衍生者為肝圓韌帶。","options":{"A":"是腹膜衍生。大網膜。","B":"是腹膜衍生。小網膜。","C":"不是(即為答案)。肝圓韌帶為臍靜脈閉鎖殘餘。","D":"是腹膜衍生。腸繫膜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"110030-N1-6":{"quick":"正解(B)。壁細胞(parietal cell)產生鹽酸與內在因子。","detail":{"background":"胃腺「壁(泌酸)細胞(parietal cell)」分泌「鹽酸(HCl，殺菌、活化胃蛋白酶原)」與「內在因子(intrinsic factor，幫助迴腸吸收維生素B12)」。主細胞分泌胃蛋白酶原;黏液頸細胞分泌黏液;腸內分泌細胞分泌胃泌素等。故產生鹽酸與內在因子者為壁細胞。臨床：自體免疫破壞壁細胞→內在因子缺乏→惡性貧血。","options":{"A":"錯誤。黏液頸細胞分泌黏液。","B":"正確。壁細胞產生鹽酸與內在因子。","C":"錯誤。主細胞分泌胃蛋白酶原。","D":"錯誤。腸內分泌細胞分泌激素。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"110110-N1-14":{"quick":"正解(C)。奧氏神經叢(Auerbach plexus)位於肌肉層(內環與外縱肌之間)。","detail":{"background":"「奧氏(肌間)神經叢(Auerbach/myenteric plexus)」位於消化道『肌肉層的內環肌與外縱肌之間』，主要調節腸道『蠕動(運動)』;梅氏(黏膜下)神經叢在黏膜下層調節分泌。故奧氏神經叢在肌肉層(與109110-6對照)。","options":{"A":"錯誤。黏膜層無此叢主體。","B":"錯誤。黏膜下層為梅氏神經叢。","C":"正確。奧氏神經叢在肌肉層(內環外縱之間)。","D":"錯誤。漿膜層為最外層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"110110-N1-15":{"quick":"正解(D為「不具有」者)。小網膜連胃小彎與肝，不是橫結腸的構造;橫結腸具有腸脂垂、結腸帶、結腸袋。","detail":{"background":"大腸(含橫結腸)的特徵構造：「腸脂垂(脂肪袋)、結腸帶(三條縱走肌帶)、結腸袋(haustra)」。而「小網膜(lesser omentum)」是連接『胃小彎與肝臟』的腹膜，與橫結腸無關。故橫結腸不具有的是小網膜。","options":{"A":"具有。橫結腸有腸脂垂。","B":"具有。縱走肌帶即結腸帶。","C":"具有。結腸袋。","D":"不具有(即為答案)。小網膜連胃小彎與肝，非橫結腸構造。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"110110-N1-4":{"quick":"正解(C)。上腸繫膜動脈(SMA)同時供應小腸與部分大腸。","detail":{"background":"「腸繫膜上(上腸繫膜)動脈(SMA)」供應中腸：「小腸(空腸、迴腸)」與「大腸的盲腸、升結腸、橫結腸右2/3」——故同時供應小腸與(部分)大腸。肝總動脈、左胃動脈屬腹腔動脈幹供胃肝脾;下腸繫膜動脈只供後段大腸(降、乙狀結腸、直腸上段)。故同時供小腸與大腸者為上腸繫膜動脈。","options":{"A":"錯誤。肝總動脈供肝胃。","B":"錯誤。左胃動脈供胃小彎。","C":"正確。上腸繫膜動脈供小腸與部分大腸。","D":"錯誤。下腸繫膜動脈只供後段大腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"110110-N1-6":{"quick":"正解(C)。咽部肌肉主要由骨骼肌構成(吞嚥隨意起始)。","detail":{"background":"消化道肌肉層辨析：(A)除口腔、咽外，『食道上段也含骨骼肌』，故說其餘皆平滑肌不夠精確、為錯;(B)胃的肌肉層是『內斜、中環、外縱』三層(非只內環外縱)，故錯;(C)「咽部主要由骨骼肌構成」(吞嚥起始為隨意)——正確;(D)硬腭是『骨頭(上頜骨與腭骨)』非骨骼肌、軟腭含骨骼肌，故(D)錯。故正確者為(C)。","options":{"A":"錯誤。食道上段也含骨骼肌。","B":"錯誤。胃肌層為內斜中環外縱三層。","C":"正確。咽部主要由骨骼肌構成。","D":"錯誤。硬腭是骨，軟腭才含骨骼肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"111030-N1-11":{"quick":"正解(C為「不屬小腸」者)。盲腸屬大腸，不是小腸的一部分。","detail":{"background":"小腸(small intestine)三段：「十二指腸→空腸→迴腸」。而「盲腸(caecum)」是『大腸』的起始段(含闌尾)，不屬小腸。故不屬於小腸者為盲腸。深化：小腸三段「十二指腸→空腸→迴腸」,口訣記「十(二指腸)空迴」;盲腸是大腸起點。長度上迴腸最長(約3.5m)、十二指腸最短(約25cm,C形圍胰頭);空腸環狀皺襞與絨毛最發達、吸收最旺盛。","options":{"A":"屬小腸。十二指腸。","B":"屬小腸。迴腸。","C":"不屬(即為答案)。盲腸屬大腸。","D":"屬小腸。空腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"111030-N1-12":{"quick":"正解(D)。下腔靜脈位於肝臟尾葉的右側(下腔靜脈溝)。","detail":{"background":"肝臟尾葉(caudate lobe)位於肝臟臟面後上方，其「右側為下腔靜脈(嵌於下腔靜脈溝)」，左側為靜脈韌帶裂，前下方為肝門(porta hepatis)。膽囊在右葉與方葉間、小網膜連肝門到胃小彎。故位於尾葉右側者為下腔靜脈。","options":{"A":"錯誤。膽囊在右葉與方葉間。","B":"錯誤。肝門在尾葉前下方。","C":"錯誤。小網膜連肝門與胃小彎。","D":"正確。下腔靜脈在肝尾葉右側。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"111030-N1-13":{"quick":"正解(A)。迴腸(腹膜內器官)最外層為漿膜層。","detail":{"background":"消化道管壁最外層：腹膜內器官(如空腸、迴腸、胃)最外為「漿膜層(serosa，即臟層腹膜)」;腹膜後器官(如部分食道、十二指腸2-4段、升降結腸後面)最外為纖維膜(adventitia)。迴腸為腹膜內器官、有腸繫膜，故最外層為漿膜層。","options":{"A":"正確。迴腸最外層為漿膜層。","B":"錯誤。黏膜層在最內。","C":"錯誤。黏膜下層在黏膜與肌肉層之間。","D":"錯誤。肌肉層在黏膜下層外、漿膜內。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"111110-N1-1":{"quick":"正解(A)。黏液頸細胞分泌黏液，與大腸杯狀細胞分泌物(黏液)相似。","detail":{"background":"胃腺「黏液頸細胞(mucous neck cell)」分泌『黏液(黏蛋白)』保護胃黏膜，其分泌物與大腸『杯狀細胞(goblet cell)分泌的黏液』性質相似。壁細胞分泌鹽酸與內在因子;主細胞分泌胃蛋白酶原;腸內分泌細胞分泌激素。故與杯狀細胞分泌相似者為黏液頸細胞。","options":{"A":"正確。黏液頸細胞分泌黏液，與杯狀細胞相似。","B":"錯誤。壁細胞分泌鹽酸與內在因子。","C":"錯誤。主細胞分泌胃蛋白酶原。","D":"錯誤。腸內分泌細胞分泌激素。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"111110-N1-10":{"quick":"正解(C)。輪廓乳頭分布於舌後半部(V形排列)且含味蕾。","detail":{"background":"舌乳頭辨析：(A)絲狀乳頭數目最多但『無味蕾』(非含許多味蕾)，故錯;(B)蕈狀乳頭多分布舌尖『且含味蕾』(非不含),故錯;(C)「輪廓(界溝)乳頭8–12個排成V形於舌後半部、含大量味蕾」——正確;(D)味覺由顏面神經(舌前2/3)、舌咽神經(舌後1/3)、迷走神經(會厭)共同傳遞，非僅顏面神經，故錯。故正確者為(C)。","options":{"A":"錯誤。絲狀乳頭無味蕾。","B":"錯誤。蕈狀乳頭含味蕾。","C":"正確。輪廓乳頭在舌後半部、含味蕾。","D":"錯誤。味覺由VII、IX、X共同傳遞。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"111110-N1-4":{"quick":"正解(B為「不是完全由腹膜反摺構成」者)。肝圓韌帶是臍靜脈閉鎖的纖維索，不是腹膜反摺。","detail":{"background":"由「腹膜反摺(雙層腹膜)」構成者：肝鐮韌帶、小網膜、腸繫膜、大網膜等。而「肝圓韌帶(round ligament of liver)」是胚胎『臍靜脈閉鎖』成的纖維索(走在肝鐮韌帶游離緣內)，本身非腹膜反摺。故不是完全由腹膜反摺構成者為肝圓韌帶(與110030-15同概念)。","options":{"A":"是腹膜反摺。肝鐮韌帶。","B":"不是(即為答案)。肝圓韌帶為臍靜脈閉鎖殘餘。","C":"是腹膜反摺。小網膜。","D":"是腹膜反摺。腸繫膜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"112030-N1-10":{"quick":"正解(B)。總膽管由總肝管與膽囊管會合而成。","detail":{"background":"膽道：肝左、右管→合成「總肝管(common hepatic duct)」;膽囊的「膽囊管(cystic duct)」與「總肝管」會合成「總膽管(common bile duct)」;總膽管下行與主胰管會合成肝胰壺腹開口於十二指腸。故總膽管由總肝管與膽囊管會合而成。","options":{"A":"錯誤。膽管與總肝管表述不清。","B":"正確。總膽管＝總肝管+膽囊管。","C":"錯誤。膽囊管與胰管不會合成總膽管。","D":"錯誤。總肝管與胰管不會合成總膽管。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"112110-N1-1":{"quick":"正解(D)。總膽管由總肝管與膽囊管匯聚形成。","detail":{"background":"總膽管(common bile duct)＝「總肝管(common hepatic duct)」與「膽囊管(cystic duct)」匯合而成(與112030-10同概念)。左、右肝管先合成總肝管;總膽管再與主胰管會合成肝胰壺腹。故由總肝管與膽囊管匯聚形成。","options":{"A":"錯誤。左右肝管合成總肝管。","B":"錯誤。總肝管與胰管不合成總膽管。","C":"錯誤。膽囊管與胰管不合成總膽管。","D":"正確。總膽管＝總肝管+膽囊管。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"112110-N1-8":{"quick":"正解(B)。布氏腺(Brunner gland)位於十二指腸黏膜下層。","detail":{"background":"「布魯納氏腺(Brunner gland)」是十二指腸獨有的腺體，位於『黏膜下層』，分泌『鹼性黏液』中和進入十二指腸的胃酸、保護腸黏膜。是十二指腸的組織學標誌(與102110-13、105090-12呼應)。故位於十二指腸黏膜下層。","options":{"A":"錯誤。胃黏膜層無布氏腺。","B":"正確。布氏腺在十二指腸黏膜下層。","C":"錯誤。迴腸無布氏腺。","D":"錯誤。布氏腺在十二指腸非胰臟。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"112110-N1-9":{"quick":"正解(C)。肝門靜脈把消化道吸收的富養分血帶入肝臟。","detail":{"background":"「肝門靜脈(hepatic portal vein)」由腸繫膜上靜脈與脾靜脈匯合而成，收集『胃腸道吸收的富含養分(但缺氧)的血液』送入肝臟代謝儲存，是肝門循環的核心。肝固有動脈帶含氧血;上腸繫膜動脈是供血給腸的動脈;肝靜脈是出肝血流。故帶富養分血入肝者為肝門靜脈。","options":{"A":"錯誤。肝固有動脈帶含氧血供肝。","B":"錯誤。上腸繫膜動脈供血給腸。","C":"正確。肝門靜脈帶富養分血入肝。","D":"錯誤。肝靜脈是出肝血流。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"112180-N1-7":{"quick":"正解(D為「不通過」者)。下腔靜脈不通過肝門;肝門通過肝動脈、肝門靜脈與肝管。","detail":{"background":"肝門(porta hepatis)是肝臟臟面的橫溝，為「肝固有動脈(進)、肝門靜脈(進)、肝(總)管(出膽汁)、淋巴與神經」出入肝臟的門戶(肝蒂)。而「下腔靜脈(IVC)」嵌在肝後面的下腔靜脈溝、接受肝靜脈，「不經過肝門」。故不通過肝門者為下腔靜脈。","options":{"A":"通過肝門。肝動脈。","B":"通過肝門。肝門靜脈。","C":"通過肝門。肝管。","D":"不通過(即為答案)。下腔靜脈在肝後溝，不經肝門。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"112180-N1-8":{"quick":"正解(C)。胃壁肌肉層由內而外為內斜、中環、外縱三層。","detail":{"background":"胃壁肌肉層較其他消化道『多一層斜肌』，由內而外為「內斜肌、中環肌、外縱肌」三層，使胃能強力研磨混合食物。其他消化道一般只有「內環、外縱」兩層平滑肌。故胃壁肌肉層排列為內斜、中環、外縱。深化：胃壁肌肉層比其他消化道多一層斜肌,由內而外=內斜、中環、外縱,以強力研磨混合食糜;其他消化道一般只有內環、外縱兩層。幽門處中環肌增厚成幽門括約肌,先天肥厚會致嬰兒幽門狹窄、噴射狀嘔吐。","options":{"A":"錯誤。內環外縱是一般消化道(非胃)。","B":"錯誤。順序不符。","C":"正確。胃壁為內斜、中環、外縱三層。","D":"錯誤。順序不符。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"113030-N1-15":{"quick":"正解(B)。供應肝臟充氧血的是肝動脈，源自腹腔動脈幹。","detail":{"background":"肝臟的「含氧(充氧)血」由「肝固有動脈」供應，其源頭為『腹腔動脈幹→肝總動脈→肝固有動脈』。肝門靜脈帶的是富養分但『缺氧』的血;肝靜脈是出肝血流;腸繫膜上動脈供腸。故供應肝臟充氧血的血管源自腹腔動脈幹(肝動脈)。","options":{"A":"錯誤。腸繫膜上動脈供腸。","B":"正確。肝動脈源自腹腔動脈幹，供肝充氧血。","C":"錯誤。肝門靜脈帶缺氧富養分血。","D":"錯誤。肝靜脈為出肝血流。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"113030-N1-19":{"quick":"正解(C)。肝胰壺腹由總膽管與主胰管會合而成。","detail":{"background":"「肝胰壺腹(Vater壺腹, hepatopancreatic ampulla)」是「總膽管(common bile duct)」與「主胰管(main pancreatic duct)」在十二指腸壁內會合膨大形成，開口於大十二指腸乳頭、由Oddi括約肌控制。副胰管則單獨開口於小乳頭。故肝胰壺腹＝總膽管+主胰管。","options":{"A":"錯誤。肝管與胰管不直接成壺腹。","B":"錯誤。副胰管單獨開口小乳頭。","C":"正確。肝胰壺腹＝總膽管+主胰管。","D":"錯誤。組合不符。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"113100-N1-7":{"quick":"正解(A)。鐮狀韌帶(falciform ligament)把肝臟連到前腹壁與橫膈。","detail":{"background":"「肝鐮(鐮狀)韌帶(falciform ligament)」是雙層腹膜皺褶，把肝臟的膈面連接到『前腹壁與橫膈』，並把肝分為左右葉(表面分界)，其游離下緣內含肝圓韌帶。冠狀韌帶連肝與橫膈後面;靜脈韌帶是胚胎靜脈導管殘餘。故連肝到前腹壁與橫膈者為鐮狀韌帶。","options":{"A":"正確。鐮狀韌帶連肝到前腹壁與橫膈。","B":"錯誤。冠狀韌帶連肝與橫膈後面。","C":"錯誤。靜脈韌帶為胚胎殘餘。","D":"錯誤。十字韌帶屬膝關節。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"113100-N1-8":{"quick":"正解(B)。胰臟為腹膜後器官，只前表面被腹膜覆蓋。","detail":{"background":"「腹膜後(retroperitoneal)器官」只有『前表面』被腹膜覆蓋，包括腎、腎上腺、輸尿管、「胰臟(大部)」、十二指腸2-4段、升降結腸後面、大血管等。胃、肝、子宮為腹膜內器官(大部被腹膜包覆)。故只被腹膜覆蓋前表面者為胰臟。","options":{"A":"錯誤。胃為腹膜內器官。","B":"正確。胰臟為腹膜後器官，僅前表面被腹膜覆蓋。","C":"錯誤。子宮大部被腹膜覆蓋。","D":"錯誤。肝為腹膜內(裸區外大部覆蓋)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"113180-N1-10":{"quick":"正解(C)。空腸具有明顯的環狀皺襞(circular folds)。","detail":{"background":"「環狀皺襞(circular folds/plica circularis)」是小腸黏膜與黏膜下層形成的環形皺褶，以「空腸(jejunum)」最發達(密而高)，迴腸漸減、遠端幾乎消失;十二指腸亦有。食道、胃(胃有縱皺襞rugae非環狀皺襞)、直腸無環狀皺襞。故環狀皺襞明顯者為空腸。","options":{"A":"錯誤。食道為複層鱗狀、無環狀皺襞。","B":"錯誤。胃為縱皺襞(rugae)非環狀皺襞。","C":"正確。空腸環狀皺襞最明顯。","D":"錯誤。直腸無環狀皺襞。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"113180-N1-8":{"quick":"正解(B為「錯誤」者)。肝小葉以「中央靜脈」為中心輻射狀排列，不是以肝動脈為中心。","detail":{"background":"肝小葉(hepatic lobule)：①為肝的構造功能單位——正確;②「肝細胞索以『中央靜脈』為中心呈輻射狀排列」，故(B)說以肝動脈為中心是錯;③略呈六角形——正確;④六角周邊有門脈三合體(肝動脈、肝門靜脈、膽管)——正確。故錯誤者為(B)。","options":{"A":"正確。肝小葉為肝的構造功能單位。","B":"錯誤(即為答案)。以中央靜脈為中心輻射排列，非肝動脈。","C":"正確。肝小葉約呈六角形。","D":"正確。周邊有門脈三合體。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"114030-N1-18":{"quick":"正解(B)。腮腺(耳下腺)導管開口於上列第二臼齒對側的頰黏膜。","detail":{"background":"腮腺導管(Stensen/parotid duct)橫越嚼肌表面、穿過頰肌，「開口於『上頜(上列)第二大臼齒』對側的頰黏膜」(腮腺乳頭)。故開口處對應上列第二臼齒。深化：三大唾液腺與導管開口——腮腺(Stensen管→上頜第二臼齒對側頰黏膜)、頷下腺(Wharton管→舌繫帶旁舌下肉阜)、舌下腺(多條小管→口腔底)。流行性腮腺炎(腮腺腫)會使腮腺管口紅腫,進食酸物時疼痛加劇。","options":{"A":"錯誤。非第一臼齒。","B":"正確。腮腺導管開口於上列第二臼齒處。","C":"錯誤。非第三臼齒。","D":"錯誤。是上列非下列。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"114100-N1-8":{"quick":"正解(B)。牙齒的主體結構是牙質(dentin，象牙質)。","detail":{"background":"牙齒結構：①「牙質(dentin，象牙質)」＝構成牙齒的『主體』(冠、根都是)，硬度次於琺瑯質;②琺瑯質(enamel)＝覆蓋牙冠表面、人體最硬;③白堊質(cementum)＝覆蓋牙根表面、供牙周韌帶附著;④齒髓(pulp)＝牙齒中央含血管神經的軟組織。故牙齒主體為牙質。","options":{"A":"錯誤。琺瑯質只覆蓋牙冠表面。","B":"正確。牙質(象牙質)為牙齒主體。","C":"錯誤。白堊質覆蓋牙根表面。","D":"錯誤。齒髓為中央軟組織。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"114100-N1-9":{"quick":"正解(A)。肝圓韌帶內含退化的臍靜脈。","detail":{"background":"「肝圓韌帶(round ligament of liver, ligamentum teres hepatis)」是胚胎期『臍靜脈閉鎖』後的纖維索，走在肝鐮韌帶游離下緣內，連肝到肚臍。鐮狀韌帶是雙層腹膜;大網膜、小網膜是腹膜皺褶。故內含退化臍靜脈者為肝圓韌帶(與107030-14呼應)。","options":{"A":"正確。肝圓韌帶內含退化的臍靜脈。","B":"錯誤。鐮狀韌帶為腹膜皺褶(內含肝圓韌帶)。","C":"錯誤。大網膜為腹膜皺褶。","D":"錯誤。小網膜連胃小彎與肝。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"114170-N1-9":{"quick":"正解(D)。橫結腸同時接受腸繫膜上動脈(右2/3)與腸繫膜下動脈(左1/3)的供應。","detail":{"background":"「橫結腸(transverse colon)」橫跨中腸與後腸交界：其『右2/3由腸繫膜上動脈(中結腸動脈)』供應、『左1/3由腸繫膜下動脈(左結腸動脈)』供應，兩者經邊緣動脈(marginal artery of Drummond)吻合。故同時接受SMA與IMA供應者為橫結腸。升、降、乙狀結腸各由單一來源供應。","options":{"A":"錯誤。乙狀結腸由腸繫膜下動脈供血。","B":"錯誤。升結腸由腸繫膜上動脈供血。","C":"錯誤。降結腸由腸繫膜下動脈供血。","D":"正確。橫結腸同時接受SMA與IMA供血。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"115030-N1-10":{"quick":"正解(C)。消化道運動功能主要由「外肌肉層(muscularis externa)」負責。","detail":{"background":"消化道的「運動(蠕動、分節)」由『外肌肉層(muscularis externa，內環外縱平滑肌)』收縮達成，其間有奧氏神經叢調控。黏膜肌層(muscularis mucosae)只造成黏膜局部微動;黏膜層司吸收分泌;漿膜層為外被。故負責消化道運動的主要結構層為外肌肉層。","options":{"A":"錯誤。黏膜層主吸收分泌。","B":"錯誤。黏膜肌層只造成黏膜微動。","C":"正確。外肌肉層負責消化道運動。","D":"錯誤。漿膜層為外被。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"115030-N1-12":{"quick":"正解(A)。肌腱由緻密結締組織構成，不具上皮組織。","detail":{"background":"上皮組織覆蓋體表、內襯管腔、構成腺體。子宮腺(腺體上皮)、小腸絨毛(柱狀上皮)、血管內皮(單層扁平上皮)皆含上皮。而「肌腱(tendon)」是『緻密規則結締組織(膠原纖維+纖維母細胞)』，連肌肉與骨，「不含上皮組織」。故不具上皮者為肌腱。","options":{"A":"正確(即為答案)。肌腱為結締組織，無上皮。","B":"有上皮。子宮腺為腺上皮。","C":"有上皮。小腸絨毛為柱狀上皮。","D":"有上皮。血管內皮為單層扁平上皮。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"115030-N1-18":{"quick":"正解(A)。微絨毛(microvilli)增加小腸上皮細胞表面積、提高吸收效率。","detail":{"background":"小腸增加吸收面積的構造：環形皺襞、絨毛(villi)、與上皮細胞游離面的「微絨毛(microvilli，刷狀緣)」。本題選項中能增加『吸收表面積』者為「微絨毛」。平滑肌負責運動;纖毛負責推送(小腸無真纖毛);杯狀細胞分泌黏液。故增加吸收面積者為微絨毛。","options":{"A":"正確。微絨毛增加吸收表面積。","B":"錯誤。平滑肌負責腸蠕動。","C":"錯誤。纖毛司推送(且小腸無真纖毛)。","D":"錯誤。杯狀細胞分泌黏液。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}},"115030-N1-19":{"quick":"正解(A)。絲狀舌乳頭不具味蕾。","detail":{"background":"舌乳頭含味蕾者：蕈狀、葉狀、輪廓乳頭。唯「絲狀乳頭(filiform)」角質化、司觸覺與摩擦、『不含味蕾』。故不具味蕾者為絲狀乳頭(與102110-14、115030-19呼應)。深化：舌乳頭含味蕾者=蕈狀(舌尖)、葉狀(舌側後)、輪廓(舌後V形8–12個);唯絲狀乳頭角質化、司觸覺與摩擦、『無味蕾』,數目最多體積最小,過度角化堆積即舌苔。味覺由VII(舌前2/3)、IX(舌後1/3)、X(會厭)傳遞。","options":{"A":"正確。絲狀乳頭不具味蕾。","B":"錯誤。蕈狀乳頭含味蕾。","C":"錯誤。葉狀乳頭含味蕾。","D":"錯誤。輪廓乳頭含大量味蕾。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.24 The Digestive System","實用人體解剖學（華杏）消化系統章","Junqueira《Basic Histology》Digestive Tract & Glands"]}}},TO=["A1細胞與組織學", "A2皮膚系統", "A3骨骼與關節", "A4肌肉系統", "A5神經與感覺器官", "A6循環與淋巴系統", "A7呼吸系統", "A8消化系統", "A9泌尿系統", "A10生殖系統", "A11內分泌"],LEC={"A1細胞與組織學":{"title":"A1 細胞與組織學 複習講義","html":"<h3>一、胞器與功能</h3>\n<p>細胞是生命結構與功能的最基本單位。重要胞器分「有膜」與「無膜」：</p>\n<ul>\n<li><b>雙層膜</b>：粒線體(產ATP，內膜摺成嵴)、細胞核。</li>\n<li><b>單層膜</b>：內質網(粗面rER附核糖體→合成分泌蛋白；滑面sER→脂質/解毒)、高爾基體(修飾包裝運送)、溶小體(酸性水解酶→胞內消化)、過氧化體。</li>\n<li><b>無膜</b>：核糖體(蛋白質合成)、核仁(rRNA)、中心粒(微小管)。</li>\n</ul>\n<p>分泌旺盛細胞(胰腺泡、漿細胞)rER與高爾基體發達；溶小體酶缺陷→儲積病。</p>\n<h3>二、細胞骨架與細胞膜</h3>\n<p>三種骨架由細到粗：微絲(actin,7nm)＜中間絲(10nm)＜微小管(25nm)。橫小管是肌膜內陷的「膜系統」非骨架。細胞膜＝磷脂雙層＋蛋白＋醣類(醣萼)，<b>不含核酸</b>(流體鑲嵌模型)。</p>\n<h3>三、細胞分裂與遺傳</h3>\n<p>有絲分裂前→中(染色體排赤道板,看核型最佳)→後(姊妹染色分體分離)→末期。DNA鹼基配對A=T(2氫鍵)、G≡C(3氫鍵)。巴氏體數=X染色體數−1(正常女1、男0、Turner 0、Klinefelter XXY 1、超女XXX 2)。</p>\n<h3>四、四大組織與上皮分布</h3>\n<p>結締組織特徵＝細胞少、間質多(含血液、軟骨、硬骨)；指甲/毛髮/表皮是上皮衍生(非結締)。上皮分布：摩擦區=複層鱗狀(口腔咽食道肛管)、吸收分泌=單層柱狀(胃到大腸、膽囊)、擴散濾過=單層扁平(肺泡、血管內皮、腎絲球)、呼吸道=偽複層纖毛柱狀。</p>"},"A2皮膚系統":{"title":"A2 皮膚系統 複習講義","html":"<h3>一、表皮(由深到淺五層)</h3>\n<p>基底層→棘狀層→顆粒層→(透明層,僅厚皮)→角質層。表皮為<b>角質化複層鱗狀上皮、無血管</b>(營養靠真皮微血管擴散)。<b>基底層</b>細胞能增生(傷口再生來源)；愈淺愈角質化，角質層為無核死細胞。</p>\n<p>表皮非角質細胞：<b>黑色素細胞</b>(基底層,抗UV;曬黑是黑色素生成↑非數目↑)、<b>蘭氏細胞</b>(棘狀層,免疫/抗原呈現)、<b>梅克爾細胞</b>(基底層,觸覺)。</p>\n<h3>二、真皮</h3>\n<p>主體為<b>緻密不規則結締組織</b>(非疏鬆)。乳頭層(疏鬆,含Meissner觸覺小體與微血管,形成指紋)＋網狀層(緻密,含毛囊腺體、Pacinian壓覺小體)。燒燙傷起水疱=已傷及含血管的真皮。</p>\n<h3>三、皮膚腺體與附屬器</h3>\n<ul>\n<li><b>皮脂腺</b>：全泌腺(holocrine,細胞整個解體)，開口於毛囊，分泌部在真皮；瞼板腺=特化皮脂腺。</li>\n<li><b>小汗腺(eccrine)</b>：胞吐分泌、全身分布、導管直接開口皮膚表面、調體溫；<b>大汗腺(apocrine)</b>：開口毛囊、腋窩乳暈肛門周圍、青春期活躍；耵聹腺=特化大汗腺。</li>\n<li>汗腺與豎毛肌只受<b>交感神經</b>支配(雞皮疙瘩=交感→豎毛肌收縮,與副交感無關)。</li>\n</ul>"},"A3骨骼與關節":{"title":"A3 骨骼與關節 複習講義","html":"<h3>一、骨的分類與生長</h3>\n<p>形狀分：長骨(股骨脛骨肱骨指趾骨)、短骨(腕跗骨)、扁平骨(顱蓋肋胸骨肩胛)、不規則骨(椎骨蝶骨)、種子骨(髕骨,最大)。長骨<b>縱向</b>生長靠骨骺板(青春期)、骨骺線=癒合痕；<b>橫向</b>增粗靠骨外膜。密質骨=骨單位(中央管/穿通管)；海綿骨=骨小樑。</p>\n<h3>二、顱骨重點</h3>\n<p>鼻中隔=篩骨垂直板＋犁骨。含副鼻竇=額、上頜、篩、蝶骨。蝶骨(不規則骨)含蝶竇、腦下垂體窩、眶上裂(小翼大翼間)。顳骨含內耳/聽小骨。枕骨大孔連顱腔與椎管、枕骨髁與寰椎成寰枕關節。前囟(額骨與頂骨間)最大。上頜骨參與眼眶/鼻腔/硬腭(不參與顱腔)。</p>\n<h3>三、四肢與軀幹標記</h3>\n<p>橈神經溝在<b>肱骨</b>(骨幹骨折傷橈神經→垂腕)；尺骨近端=鷹嘴；肱骨內上髁=屈肌總起點、外上髁=伸肌總起點(網球肘)。踝關節=脛+腓+<b>距骨</b>。足弓最高=距骨。脊柱四彎曲：頸前凸、胸後凸、腰前凸、薦後凸。第1–7肋=真肋、8–12=假肋(11–12浮肋)；第2肋軟骨接胸骨角。成人脊髓末端約L1–L2(腰椎穿刺選L3–4/L4–5)。</p>\n<h3>四、關節</h3>\n<p>滑液關節共有關節腔、關節囊、滑液、關節軟骨；但「關節盤/半月板」只部分關節有(膝、顳顎)。膝關節腔內=半月板與十字韌帶。踝外翻傷三角(內)韌帶、內翻傷外側韌帶。</p>"},"A4肌肉系統":{"title":"A4 肌肉系統 複習講義","html":"<h3>一、肌肉組織三型</h3>\n<p>骨骼肌(橫紋、隨意,如橫膈、咽縮肌、肛門外括約肌)、心肌(橫紋、不隨意、有間盤)、平滑肌(無橫紋、不隨意,如逼尿肌、胃腸壁、子宮)。肌束排列：平行、羽狀、會聚(胸大肌,扇形)、環狀(括約肌)。肌節=相鄰兩Z線之間。</p>\n<h3>二、頭頸肌</h3>\n<p>咀嚼肌(三叉神經V3)：嚼肌、顳肌、翼內肌主<b>閉口</b>；翼外肌主<b>張口</b>(前滑下拉)。表情肌(顏面神經VII)：口輪匝肌、頰肌、頸闊肌等。</p>\n<h3>三、四肢主要動作肌</h3>\n<ul>\n<li>伸腕=橈側伸腕肌(橈神經)；屈腕=掌長肌、屈指肌(內上髁)。伸肘=肱三頭肌；屈肘=肱二頭肌、肱肌、肱橈肌。</li>\n<li>旋轉肌袖(SITS)=棘上、棘下、小圓、肩胛下肌(肌腱與關節囊融合穩定肩)。三角肌前束屈、後束伸肩。</li>\n<li>足背屈=脛骨前肌(前間隔,深腓神經)；蹠屈=腓腸肌/比目魚肌(經跟腱止跟骨)。</li>\n<li>膕旁肌(股二頭、半腱、半膜)=屈膝伸髖(坐骨神經)；股四頭肌=伸膝,股直肌另可屈髖。</li>\n</ul>\n<h3>四、區域與骨盆底</h3>\n<p>股三角邊界：上=腹股溝韌帶、外=縫匠肌、內=內收長肌。骨盆膈主肌=提肛肌(凱格爾運動鍛鍊,支撐子宮膀胱直腸)。豎脊肌維持背部直立。</p>"},"A5神經與感覺器官":{"title":"A5 神經與感覺器官 複習講義","html":"<h3>一、神經膠細胞</h3>\n<p>中樞：星狀膠(血腦障壁、調鉀)、寡突膠(中樞髓鞘,抑制再生)、微膠(源自骨髓、免疫吞噬)、室管膜(襯腦室)。周邊：許旺氏細胞(周邊髓鞘、引導再生)、衛星細胞。形成髓鞘=寡突膠(中樞)＋許旺氏細胞(周邊)。</p>\n<h3>二、腦與脊髓</h3>\n<p>大腦葉：額(運動/Broca)、頂(體感覺,痛觸覺)、枕(視覺,距狀裂)、顳(聽覺/Wernicke)。失語=Broca或Wernicke。胼胝體連左右半球。海馬屬邊緣系統。腦幹：中腦(四疊體、紅核、黑質)、橋腦(發出V、VI、VII、VIII)、延腦(錐體=皮質脊髓徑,後索核)。下視丘視上核合成ADH;視叉上核(SCN)為生理時鐘調褪黑素。</p>\n<p>脊髓灰質前角=軀體運動神經元(支配骨骼肌)、後角=感覺、外側角=交感節前。頸膨大C5–T1(臂神經叢,上肢)、腰薦膨大(下肢)。脊髓末端L1–L2,以終絲固定尾骨。腦室CSF:側腦室→室間孔→第三腦室→大腦導水管→第四腦室→蛛網膜下腔。腰椎穿刺抽蛛網膜下腔CSF。</p>\n<h3>三、腦神經與自主神經</h3>\n<p>嗅覺(I)不經視丘;其餘感覺先經視丘中繼。化學/壓力受器:頸動脈竇與體→舌咽神經(IX)、主動脈→迷走(X)。唾液腺副交感:腮腺→IX(耳神經節)、頷下舌下→VII;淚腺→VII(翼腭神經節);瞳孔→III(睫狀神經節)。膈神經C3–5支配橫膈。交感節前在脊髓T1–L2(白交通枝);副交感在腦幹III/VII/IX/X與薦髓。</p>\n<h3>四、感覺器官</h3>\n<p>眼:虹膜黑色素決定眼色、睫狀突分泌房水、初級視覺在枕葉。眼外肌:外直肌(VI)、上斜肌(IV,向下內看)、其餘(III)。耳:聽小骨在顳骨;耳咽管連鼻咽與中耳;半規管壺腹嵴=動態平衡、橢圓囊球囊位砂斑=靜態平衡。皮膚受器:Merkel(觸)、Meissner(觸,乳頭層)、Pacinian(壓/振動,網狀層)。</p>"},"A6循環與淋巴系統":{"title":"A6 循環與淋巴系統 複習講義","html":"<h3>一、血液與血球</h3>\n<p>血漿約55%、血球約45%。紅血球:無核無胞器、雙凹盤、紅骨髓生成、壽命120天(脾肝巨噬回收)。白血球數量「嗜中性>淋巴>單核>嗜酸>嗜鹼」,體積最大=單核球(進組織變巨噬細胞)。組織胺由肥大細胞/嗜鹼性球釋放(過敏);抗體由漿細胞(B淋巴球)製造;T細胞在胸腺成熟。血小板源自巨核細胞、壽命7–10天。血漿蛋白:白蛋白最多(膠體滲透壓)、γ-球蛋白=抗體、纖維蛋白原(凝血)。</p>\n<h3>二、心臟構造</h3>\n<p>右心房接上下腔靜脈與冠狀竇;肺靜脈入左心房。瓣膜:右房室=三尖瓣、左房室=二尖瓣(腱索連乳頭肌與瓣膜);主動脈瓣與肺動脈瓣=半月瓣。第一心音=房室瓣關、第二心音=半月瓣關。傳導:竇房結→房室結(心房中隔近冠狀竇)→希氏束→蒲金氏纖維。心房內壁=梳狀肌;心室=肉柱、乳頭肌。心包腔在漿膜性心包壁層與臟層之間。心尖=左鎖骨中線第5肋間。瓣膜聽診:主動脈(胸骨右第2肋間)、肺動脈(左第2)、三尖瓣(左第4–5)、二尖瓣(心尖)。</p>\n<h3>三、血管與分支</h3>\n<p>血管壁中膜含平滑肌;微血管僅內皮無平滑肌。彈性動脈=主動脈等大動脈;小動脈=阻力血管。冠狀動脈源自升主動脈(左:LAD+迴旋;右:後室間+右緣)。主動脈弓分支:頭臂幹、左頸總、左鎖骨下。腹主動脈成對臟支=腎、腎上腺中、性腺動脈;不成對=腹腔幹、腸繫膜上/下動脈。深靜脈與同名動脈伴行;淺靜脈(頭、貴要、肘正中)無同名動脈。</p>\n<h3>四、胎兒循環與淋巴</h3>\n<p>三分流:靜脈導管(臍靜脈→下腔靜脈,繞肝)、卵圓孔(右房→左房,繞肺)、動脈導管(肺動脈→主動脈弓)。淋巴器官:胸腺(T細胞成熟)、脾(紅髓濾血/白髓免疫,左季肋區易破)、淋巴結(富巨噬細胞、生發中心)、扁桃體。淋巴匯入靜脈處=頸內靜脈與鎖骨下靜脈交會(靜脈角):胸管→左、右淋巴管→右。</p>"},"A7呼吸系統":{"title":"A7 呼吸系統 複習講義","html":"<h3>一、上呼吸道與鼻竇</h3>\n<p>鼻道開口:下鼻道=鼻淚管;中鼻道=額、上頜、前中篩竇;上鼻道=後篩竇;蝶篩隱窩=蝶竇。喉軟骨:甲狀軟骨(喉結)、環狀軟骨(完整環)、會厭、杓狀軟骨(調聲帶緊張)。真聲帶張於甲狀軟骨與杓狀軟骨之間;環甲肌繃緊聲帶;喉內肌由迷走神經(喉返/喉上)支配。</p>\n<h3>二、氣管與支氣管樹</h3>\n<p>氣管:偽複層纖毛柱狀上皮、C形透明軟骨、後方氣管肌(平滑肌)、約胸骨角(T4–5)分叉、下段血供來自支氣管動脈(源自胸主動脈)。軟骨遞減:主支氣管(C形)→葉/節支氣管(軟骨片)→<b>細支氣管無軟骨(平滑肌為主)</b>。右主支氣管短寬垂直→異物易入右側。</p>\n<h3>三、肺與氣體交換</h3>\n<p>右肺三葉(斜裂+水平裂)、左肺二葉(僅斜裂)。傳導區(到終末細支氣管,只導氣,構成無效腔)→呼吸區(呼吸性細支氣管起,有肺泡可交換)。肺泡:第一型細胞(構成呼吸膜、氣體擴散)、第二型(分泌表面張力劑surfactant防塌陷,早產兒不足→RDS)、巨噬細胞(吞塵)。呼吸膜=第一型肺泡細胞+微血管內皮+融合基底膜。</p>\n<h3>四、胸膜與縱膈</h3>\n<p>胸膜(漿膜)分臟層(貼肺)與壁層(貼胸壁/縱膈),胸膜腔含潤滑液維持負壓。縱膈含心、大血管、氣管、食道、胸腺(不含肺)、主動脈弓只在縱膈。肺門在肺縱膈面,通過支氣管、肺動靜脈、神經淋巴(胸管不經肺門)。腹腔與骨盆腔連通、積水可互通。</p>"},"A8消化系統":{"title":"A8 消化系統 複習講義","html":"<h3>一、消化道管壁四層與神經叢</h3>\n<p>由內向外:黏膜層→黏膜下層(梅氏神經叢,調分泌)→肌肉層(內環外縱,奧氏神經叢,調蠕動)→漿膜/纖維膜。咽與食道上1/3、肛門外括約肌為骨骼肌(隨意);其餘多平滑肌。食道=複層鱗狀上皮(無杯狀細胞)、以蠕動推送、約T10穿橫膈。</p>\n<h3>二、胃與小腸</h3>\n<p>胃分賁門(接食道)、底、體、幽門(接十二指腸);肌肉層三層(內斜中環外縱)。胃腺:壁細胞(鹽酸+內在因子)、主細胞(胃蛋白酶原)、黏液頸細胞(黏液)、G細胞(胃泌素)。小腸三段「十二指腸→空腸→迴腸」。增加吸收面積三級:環狀皺襞(空腸最發達)>絨毛(中央乳糜管吸脂入淋巴、微血管吸醣胺基酸入血)>微絨毛。十二指腸特有:肝胰壺腹/副胰管開口、布魯納氏腺(黏膜下層、鹼性黏液)。</p>\n<h3>三、大腸與肝膽胰</h3>\n<p>大腸「盲腸→升→橫→降→乙狀→直腸→肛管」;三特徵=結腸帶(縱走平滑肌)、結腸袋、腸脂垂;肛管下段=複層鱗狀。肝小葉六角形、肝細胞以中央靜脈為中心輻射排列、周邊門脈三合體(肝動脈+肝門靜脈+膽管);庫佛氏細胞在竇狀隙。肝雙重血供:肝動脈(含氧)+肝門靜脈(富養分)。膽汁肝臟製造、膽囊儲存濃縮、注入十二指腸。膽道:肝管+膽囊管→總膽管;總膽管+主胰管→肝胰壺腹→十二指腸大乳頭。胰約99%腺泡細胞(外分泌)、胰管注入十二指腸。</p>\n<h3>四、腹膜與血供</h3>\n<p>腹膜後器官(僅前面被腹膜覆蓋):腎、腎上腺、輸尿管、胰、十二指腸2–4段、升/降結腸。腹膜衍生:大網膜(胃大彎↔橫結腸)、小網膜(胃小彎↔肝)、腸繫膜、肝鐮韌帶;肝圓韌帶=臍靜脈閉鎖殘餘(非腹膜)。動脈分區:腹腔幹=前腸(胃肝膽脾胰、十二指腸上段)、腸繫膜上動脈=中腸(空迴腸、盲腸闌尾、升結腸、橫結腸右2/3)、腸繫膜下動脈=後腸(橫結腸左1/3、降乙狀結腸、直腸上段);橫結腸同受SMA與IMA供血。</p>"},"A9泌尿系統":{"title":"A9 泌尿系統 複習講義","html":"<h3>一、腎臟結構</h3>\n<p>外皮質(含腎絲球與曲小管)、內髓質(腎錐體);相鄰錐體間=腎柱;錐體尖=腎乳頭→小腎盞→大腎盞→腎盂(最靠腎門、續輸尿管)。左右腎皆腹膜後器官、上有腎上腺、背受第11–12肋保護;右腎較左腎低(受肝壓)。</p>\n<h3>二、腎元與過濾膜</h3>\n<p>腎元=腎小體(腎絲球+鮑氏囊)+腎小管,是製尿基本單位。皮質腎元約85%、近髓質腎元約15%(亨利氏環長、濃縮尿能力強)。過濾膜三層:腎絲球<b>有孔(孔狀)微血管內皮</b>+基底膜+鮑氏囊臟層(足細胞裂孔);鮑氏囊壁層只圍囊腔不過濾。腎絲球位於皮質。</p>\n<h3>三、腎小管與旁腎絲球器</h3>\n<p>近曲小管(立方、刷狀緣、重吸收旺盛)→亨利氏環(細段單層扁平、管壁最薄)→遠曲小管→集尿管(經腎乳頭排入小腎盞)。旁腎絲球器:近腎絲球(JG)細胞(入球小動脈平滑肌特化、分泌腎素調血壓)+緻密斑(遠曲小管上皮特化、偵測NaCl)。</p>\n<h3>四、輸尿管與排尿</h3>\n<p>輸尿管三狹窄(結石易卡):腎盂輸尿管交接(UPJ)、跨髂血管(骨盆緣)、入膀胱處(最窄);沿腰大肌前面下行(非狹窄處)。括約肌:內括約肌(膀胱頸、平滑肌、不隨意)、外括約肌(泌尿生殖膈/膜部尿道、骨骼肌、隨意)。男性尿道三段:前列腺部→膜部(最短、外括約肌、易外傷斷)→海綿體(陰莖)部(最長);尿道球腺開口於陰莖部尿道。</p>"},"A10生殖系統":{"title":"A10 生殖系統 複習講義","html":"<h3>一、男性生殖</h3>\n<p>精子路徑:曲細精管(產精,內有Sertoli細胞+生殖細胞)→直小管→睪丸網→輸出小管→副睪(靜纖毛、儲存成熟精子)→輸精管→射精管(輸精管+精囊管,穿前列腺)→尿道。<b>Leydig(間質)細胞</b>在曲細精管之間、受LH分泌睪固酮;Sertoli細胞受FSH、形成血睪障壁。精液:精囊約60%(果糖)、前列腺20–30%、副睪睪丸提供精子。陰囊含肉膜肌(平滑肌)調溫。陰莖勃起血供來自髂內動脈(副交感)。男童曲細精管內為精原細胞(青春期才開始精子發生)。</p>\n<h3>二、女性生殖</h3>\n<p>卵子減數分裂:胎兒期停第一次減數分裂前期(到青春期)→排卵時停第二次減數分裂中期→受精才完成。卵巢動脈源自腹主動脈(非髂內)。濾泡發育:原始→初級→次級(有濾泡腔)→葛氏(成熟)。排卵隨次級卵母細胞排出者:透明帶、第一極體、放射冠(內鞘細胞留卵巢成黃體)。輸卵管:漏斗(繖,拾卵)→<b>壺腹(受精)</b>→峽部→子宮部。子宮:前傾前屈、肌層為平滑肌、血供來自髂內(子宮動脈)。子宮頸突入陰道可窺鏡檢查/抹片。</p>\n<h3>三、子宮韌帶與內膜週期</h3>\n<p>闊韌帶(腹膜皺褶)、圓韌帶(經鼠蹊管止大陰唇、維持前傾)、主韌帶(支撐子宮頸)、卵巢懸韌帶(固定卵巢、走卵巢血管、不支撐子宮)。子宮內膜:功能層(月經剝落)+基底層(保留再生)。週期:月經期(剝功能層)→增生期(雌激素、增厚、螺旋動脈)→分泌期(助孕酮、腺體分泌肝醣、最厚)。</p>\n<h3>四、外生殖器</h3>\n<p>女陰由前到後:陰阜→陰蒂(勃起組織、與陰莖同源)→外尿道口→陰道口。小陰唇前端包覆陰蒂成包皮;前庭球=勃起組織(陰道口兩側腺體
