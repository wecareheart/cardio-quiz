","C":"正確。內括約肌位膀胱頸、屬不隨意(平滑)肌。","D":"錯誤。內括約肌在膀胱頸、非膜部，且為不隨意肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"103100-N1-11":{"quick":"正解(A)。緻密斑(macula densa)由「遠曲小管」靠近腎小體處的上皮細胞特化而成。","detail":{"background":"旁腎絲球器(juxtaglomerular apparatus, JGA)由三部分組成：①「緻密斑(macula densa)」＝「遠曲小管」初段(回到自身腎小體血管極處)的上皮細胞特化而成，偵測遠端小管液的鈉氯濃度;②近腎絲球(JG)細胞＝入球小動脈平滑肌特化、分泌腎素;③腎小球外系膜細胞。緻密斑偵測到NaCl變化→經管球回饋調節入球小動脈口徑與腎素分泌。故緻密斑來自遠曲小管上皮。","options":{"A":"正確。緻密斑由遠曲小管上皮細胞特化。","B":"錯誤。近曲小管主重吸收，非緻密斑來源。","C":"錯誤。入球小動脈平滑肌特化成JG細胞(分泌腎素)。","D":"錯誤。出球小動脈非緻密斑來源。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"104030-N1-11":{"quick":"正解(C)。集尿管(集尿小管)把腎元產生的尿經腎乳頭送入小腎盞。","detail":{"background":"尿液流向：腎絲球濾過→近曲小管→亨利氏環→遠曲小管→「集尿管(collecting duct)」→於腎乳頭尖端開口排入「小腎盞」→大腎盞→腎盂→輸尿管→膀胱→尿道。故「輸送尿液至小腎盞」者為集尿管(經腎乳頭)。腎盂、大腎盞在小腎盞之後;遠曲小管在集尿管之前。","options":{"A":"錯誤。腎盂在大腎盞之後。","B":"錯誤。大腎盞接收小腎盞的尿。","C":"正確。集尿管經腎乳頭把尿送入小腎盞。","D":"錯誤。遠曲小管在集尿管之前。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"105030-N1-10":{"quick":"正解(C為「不包括」者)。鮑氏囊「壁層」不參與過濾屏障;參與的是內皮、基底膜與鮑氏囊「臟層(足細胞)」。","detail":{"background":"腎絲球過濾屏障(三層)＝①腎絲球微血管有孔內皮;②基底膜;③「鮑氏囊臟層(visceral layer)＝足細胞」的足突與裂孔膜。鮑氏囊「壁層(parietal layer)」是單層扁平上皮，只圍成囊腔接收濾液，「不參與過濾」。故不包括在過濾屏障者為鮑氏囊壁層。","options":{"A":"包括。腎絲球微血管內皮。","B":"包括。鮑氏囊臟層即足細胞。","C":"不包括(即為答案)。鮑氏囊壁層只圍囊腔，不過濾。","D":"包括。基底膜為過濾屏障中層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"105090-N1-10":{"quick":"正解(D)。男性尿道由近端(膀胱)到遠端的順序為：前列腺段→膜段→陰莖(海綿體)段，即③②①。","detail":{"background":"男性尿道分三段(由近至遠)：①「前列腺部(prostatic urethra)」＝穿過前列腺，接受射精管與前列腺導管開口;②「膜部(membranous urethra)」＝最短、穿過泌尿生殖膈，外括約肌(骨骼肌)所在、最固定也最易在會陰外傷時斷裂;③「海綿體部/陰莖部(spongy/penile urethra)」＝最長，貫穿尿道海綿體到尿道外口。題目代號1=陰莖段、2=膜段、3=前列腺段，故由近至遠＝3→2→1(③②①)。","options":{"A":"錯誤。①②③為陰莖→膜→前列腺，方向相反。","B":"錯誤。②③①順序不符。","C":"錯誤。③①②順序不符。","D":"正確。③②①＝前列腺段→膜段→陰莖段。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"105090-N1-11":{"quick":"正解(B)。腎絲球微血管屬「有孔(孔狀, fenestrated)微血管」，利於大量濾過。","detail":{"background":"微血管依內皮分三型：①連續性(continuous)＝內皮緊密，見於肌肉、皮膚、肺、腦(血腦障壁);②「有孔(fenestrated)＝內皮有小孔，通透性高」，見於「腎絲球、腸黏膜、內分泌腺」;③竇狀/不連續(sinusoidal)＝孔大且基底膜不完整，見於肝、脾、骨髓。腎絲球為了大量濾過血漿，採「有孔微血管」(且高壓)。故答案為孔狀微血管。","options":{"A":"錯誤。竇狀微血管見於肝、脾。","B":"正確。腎絲球為有孔(孔狀)微血管。","C":"錯誤。連續性微血管見於肌肉、腦。","D":"錯誤。不連續(竇狀)見於肝脾骨髓。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"107030-N1-10":{"quick":"正解(A)。由尿道口(遠端)往近端，男性尿道海綿體→泌尿生殖橫膈(膜部)→前列腺，順序為①②③。","detail":{"background":"本題以「尿道口為近端」往內排序(實即由遠到近)：尿道外口→「尿道海綿體(陰莖部)①」→穿過「泌尿生殖橫膈(膜部)②」→「前列腺(前列腺部)③」→膀胱。故順序為①②③。(與105090-10是同一解剖、只是起算端不同：那題從膀胱起算為前列腺→膜→陰莖。)","options":{"A":"正確。①②③＝海綿體→泌尿生殖膈→前列腺。","B":"錯誤。②①③順序不符。","C":"錯誤。①③②順序不符。","D":"錯誤。③②①為由膀胱起算的方向。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"107110-N1-11":{"quick":"正解(A)。腎絲球位於「腎皮質」內。","detail":{"background":"腎臟分皮質與髓質：「腎皮質(renal cortex)」含腎小體(腎絲球+鮑氏囊)、近曲與遠曲小管，是「腎絲球(glomerulus)所在處」;髓質的腎錐體則主要由亨利氏環、集尿管與直血管組成。小腎盞、腎乳頭屬排尿系統。故腎絲球位於腎皮質。","options":{"A":"正確。腎絲球位於腎皮質。","B":"錯誤。小腎盞接收尿液，無腎絲球。","C":"錯誤。腎錐體(髓質)含集尿管、無腎絲球。","D":"錯誤。腎乳頭為錐體尖端排尿口。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"108110-N1-12":{"quick":"正解(B)。亨利氏環(尤其降支與細段)管壁細胞最為扁平(單層扁平上皮)。","detail":{"background":"腎小管上皮厚薄：①近曲小管＝單層立方、具高密度微絨毛(刷狀緣)，胞質厚、重吸收旺盛;②「亨利氏環細段(尤其降支)＝單層扁平上皮，管壁最薄」，利於水或離子的被動通透;③遠曲小管＝單層立方、微絨毛少;④集尿管＝單層立方到柱狀。故管壁細胞最扁平者為亨利氏環(細段)。","options":{"A":"錯誤。近曲小管為立方上皮、有刷狀緣。","B":"正確。亨利氏環細段為單層扁平、管壁最薄。","C":"錯誤。遠曲小管為立方上皮。","D":"錯誤。集尿管為立方到柱狀。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"109030-N1-11":{"quick":"正解(B)。近腎絲球(JG)細胞由入球小動脈平滑肌特化、分泌腎素調節血壓。","detail":{"background":"旁腎絲球器：①「近腎絲球(juxtaglomerular, JG)細胞」＝「入球小動脈」管壁平滑肌特化而成，胞內含腎素顆粒，於血壓/血量下降或交感興奮時分泌「腎素(renin)」啟動RAAS升血壓;②緻密斑＝遠曲小管上皮特化、偵測NaCl;③系膜細胞＝支持與收縮調節濾過;④足細胞＝構成過濾裂孔。故分泌腎素者為近腎絲球細胞。","options":{"A":"錯誤。緻密斑偵測小管液NaCl。","B":"正確。JG細胞分泌腎素調節血壓。","C":"錯誤。系膜細胞主支持與調節濾過。","D":"錯誤。足細胞構成過濾裂孔膜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"110030-N1-13":{"quick":"正解(A)。腎臟負責尿液的「形成」(過濾、重吸收、分泌)。","detail":{"background":"泌尿系統分工：「腎臟(kidney)」是製造尿液的器官——透過腎絲球過濾、腎小管重吸收與分泌生成尿液並調節體液電解質;輸尿管「運送」尿液到膀胱;膀胱「儲存」尿液;尿道「排出」尿液。故負責尿液形成者為腎臟。","options":{"A":"正確。腎臟形成尿液。","B":"錯誤。輸尿管運送尿液。","C":"錯誤。膀胱儲存尿液。","D":"錯誤。尿道排出尿液。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"110110-N1-13":{"quick":"正解(C為「不含」者)。過濾膜不含鮑氏囊「壁層」;含內皮、基底膜與鮑氏囊「臟層(足細胞)」。","detail":{"background":"腎小體過濾膜三層＝腎絲球有孔內皮+基底膜+鮑氏囊「臟層(足細胞)」。鮑氏囊「壁層(parietal layer)」為單層扁平上皮，只圍成囊腔承接濾液，不參與過濾。故不含的構造為鮑氏囊壁層(與105030-10同概念)。","options":{"A":"含。腎絲球內皮為過濾膜內層。","B":"含。基底膜為過濾膜中層。","C":"不含(即為答案)。鮑氏囊壁層只圍囊腔。","D":"含。鮑氏囊臟層(足細胞)構成過濾裂孔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"113030-N1-16":{"quick":"正解(B)。腎盂(renal pelvis)是漏斗狀集尿腔，位於腎竇內、最靠近腎門、續接輸尿管。","detail":{"background":"集尿排出路徑由內(近腎門)向外：「腎盂(renal pelvis)」漏斗狀大腔位於腎竇、最靠近腎門，向下續為輸尿管;腎盂由2–3個大腎盞匯成，大腎盞再由數個小腎盞匯成，小腎盞接收腎乳頭(錐體尖)排出的尿。腎柱、腎錐體位於腎實質深處，離腎門較遠。故最靠近腎門者為腎盂。","options":{"A":"錯誤。腎柱在腎實質內(錐體間)。","B":"正確。腎盂最靠近腎門、續接輸尿管。","C":"錯誤。腎盞在腎盂之前(更靠錐體)。","D":"錯誤。腎錐體在髓質深處。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"113100-N1-5":{"quick":"正解(B)。尿道外括約肌(骨骼肌)位於泌尿生殖膈(穿過膜部尿道處)。","detail":{"background":"尿道外括約肌(external urethral sphincter)是「骨骼肌」，位於「泌尿生殖膈(urogenital diaphragm)」內、環繞膜部尿道，受陰部神經(隨意)控制，可主動憋尿;尿道內括約肌(平滑肌)則位於膀胱頸(不隨意)。骨盆膈由提肛肌構成、支撐盆腔器官但非外括約肌所在。故尿道外括約肌位於泌尿生殖膈。","options":{"A":"錯誤。骨盆膈(提肛肌)支撐盆腔器官，非外括約肌。","B":"正確。外括約肌位於泌尿生殖膈。","C":"錯誤。膀胱底非括約肌所在。","D":"錯誤。膀胱頸為內括約肌(平滑肌)所在。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"114030-N1-15":{"quick":"正解(B為「不是狹窄處」者)。輸尿管三個生理狹窄處為腎盂輸尿管交接、跨過髂血管(骨盆緣)、進入膀胱處;「腰大肌表面」是行經處而非狹窄處。","detail":{"background":"輸尿管(ureter)沿腰大肌前面下行，有三個「生理性狹窄(結石最易卡住處)」：①腎盂與輸尿管交接處(UPJ);②跨過骨盆入口、髂總動脈分叉(髂血管)處;③穿入膀胱壁處(膀胱輸尿管接合, 最窄)。輸尿管「行經腰大肌表面」是其走行路徑、管徑正常，「非狹窄處」。故答案為(B)。","options":{"A":"是狹窄處。腎盂輸尿管交接處(UPJ)。","B":"不是狹窄處(即為答案)。腰大肌表面為行經處。","C":"是狹窄處。跨髂血管(骨盆緣)處。","D":"是狹窄處。穿入膀胱處最窄。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"114100-N1-7":{"quick":"正解(A為「錯誤」者)。左、右腎水平位置「不等高」——右腎因上方有肝臟壓迫而較左腎低約半個椎體。","detail":{"background":"左右腎臟比較：①二者皆為「腹膜後器官(retroperitoneal)」;②上方皆有腎上腺;③背面皆受第11–12肋保護;但「右腎位置較左腎低(約低半個椎體)」，因右上方有體積大的肝臟。故(A)「二者水平位置等高」為錯誤。","options":{"A":"錯誤(即為答案)。右腎較左腎低(受肝壓迫)，並非等高。","B":"正確。兩腎皆為腹膜後器官。","C":"正確。兩腎上方皆有腎上腺。","D":"正確。兩腎背面受第12肋(及11肋)保護。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.26 The Urinary System","實用人體解剖學（華杏）泌尿系統章","Junqueira《Basic Histology》Urinary System"]}},"102110-N1-1":{"quick":"正解(C)。甲狀腺由許多「濾泡(follicle)」組成，腔內充滿膠體儲存甲狀腺球蛋白。","detail":{"background":"甲狀腺(thyroid)的組織學特徵是由無數「甲狀腺濾泡(follicle)」構成：濾泡壁為單層立方的濾泡細胞、腔內充滿「膠體(colloid，含甲狀腺球蛋白thyroglobulin)」作為甲狀腺素的儲存形式;濾泡旁細胞(C細胞)分泌降鈣素。胰島(蘭氏小島)是散在胰臟內的細胞團(α、β、δ細胞)、無濾泡;松果腺由松果細胞構成;腎上腺皮質呈帶狀排列。故含濾泡者為甲狀腺。","options":{"A":"錯誤。胰島為細胞團，無濾泡。","B":"錯誤。松果腺由松果細胞構成。","C":"正確。甲狀腺由濾泡(含膠體)構成。","D":"錯誤。腎上腺皮質呈三帶排列。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"103100-N1-7":{"quick":"正解(C為「不供應」者)。腎上腺由上(膈下動脈)、中(主動脈直接發出的腎上腺中動脈)、下(腎動脈)三組動脈供血;生殖腺動脈不供應腎上腺。","detail":{"background":"腎上腺(adrenal gland)血液豐富，由三組動脈供應：①上腎上腺動脈(來自膈下動脈);②中腎上腺動脈(直接來自腹主動脈);③下腎上腺動脈(來自腎動脈)。「生殖腺(卵巢/睪丸)動脈」供應性腺，與腎上腺血供無關。故不供應腎上腺者為生殖腺動脈。","options":{"A":"供應。腎動脈發出下腎上腺動脈。","B":"供應。腎上腺(中)動脈直接源自主動脈。","C":"不供應(即為答案)。生殖腺動脈供應性腺。","D":"供應。膈下動脈發出上腎上腺動脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"104030-N1-3":{"quick":"正解(C)。腎上腺皮質最內層「網狀帶(zona reticularis)」分泌雄性激素(及少量糖皮質激素)。","detail":{"background":"腎上腺皮質三帶(由外到內)與分泌物：①「絲球帶(zona glomerulosa)」＝礦物皮質激素(醛固酮aldosterone，調節鈉鉀);②「束狀帶(zona fasciculata，最厚)」＝糖皮質激素(皮質醇cortisol);③「網狀帶(zona reticularis)」＝性激素(雄性激素DHEA等)。髓質的嗜鉻細胞則分泌腎上腺素/正腎上腺素。口訣「鹽糖性(GFR對應醛固酮、皮質醇、性激素)」。故分泌雄性激素者為網狀帶。","options":{"A":"錯誤。絲球帶分泌醛固酮(礦物皮質激素)。","B":"錯誤。束狀帶分泌皮質醇(糖皮質激素)。","C":"正確。網狀帶分泌雄性激素。","D":"錯誤。嗜鉻細胞在髓質、分泌兒茶酚胺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"106030-N1-2":{"quick":"正解(B)。腎上腺「皮質」依組織學分絲球帶、束狀帶、網狀帶三層。","detail":{"background":"腎上腺(adrenal)分皮質與髓質：「皮質(cortex)」源自中胚層，依細胞排列分三帶——絲球帶(球狀排列)、束狀帶(柱狀排列、最厚)、網狀帶(網狀排列)，分別分泌醛固酮、皮質醇、性激素;「髓質(medulla)」源自神經嵴，由嗜鉻細胞構成、分泌兒茶酚胺。故可分三帶者為腎上腺皮質。","options":{"A":"錯誤。胰臟有外分泌腺泡與內分泌胰島，非三帶。","B":"正確。腎上腺皮質分絲球、束狀、網狀三帶。","C":"錯誤。腎上腺髓質為嗜鉻細胞團。","D":"錯誤。腎臟分皮質髓質但非此三帶。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"106110-N1-2":{"quick":"正解(C)。甲狀腺濾泡腔內含「膠體(colloid)」。","detail":{"background":"「膠體(colloid)」是甲狀腺濾泡腔內充填的膠狀物質，主成分為甲狀腺球蛋白(thyroglobulin)，是甲狀腺素(T3/T4)的儲存與合成基質——這是甲狀腺的標誌性組織學特徵。松果腺、腎上腺、副甲狀腺皆無濾泡與膠體。故具膠體構造者為甲狀腺。","options":{"A":"錯誤。松果腺無濾泡膠體。","B":"錯誤。腎上腺無濾泡膠體。","C":"正確。甲狀腺濾泡腔含膠體。","D":"錯誤。副甲狀腺由主細胞與嗜酸細胞構成、無膠體。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"107030-N1-2":{"quick":"正解(B)。松果體(pineal gland)分泌褪黑激素(melatonin)。","detail":{"background":"松果體(pineal gland，位於間腦第三腦室頂部後方)由松果細胞構成，依光照(經視交叉上核調控)分泌「褪黑激素(melatonin)」，夜間分泌增加，調節生理時鐘(晝夜節律)與睡眠。腦下腺前葉分泌多種促激素;甲狀腺分泌甲狀腺素;腎上腺分泌皮質與髓質激素。故分泌褪黑激素者為松果體。","options":{"A":"錯誤。前葉分泌促激素(GH/ACTH/TSH等)。","B":"正確。松果體分泌褪黑激素。","C":"錯誤。甲狀腺分泌T3/T4。","D":"錯誤。腎上腺分泌皮質醇/醛固酮/兒茶酚胺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"108020-N1-2":{"quick":"正解(B)。腦下腺前葉分泌濾泡刺激素(FSH)。","detail":{"background":"內分泌敘述辨析：(A)女性腎上腺網狀帶與卵巢仍分泌少量雄性素，故「女性不分泌雄性素」是錯的;(B)腦下腺前葉分泌FSH、LH、TSH、ACTH、GH、PRL——「分泌濾泡刺激素(FSH)」正確;(C)前葉激素並非只作用於內分泌腺(如GH作用全身、PRL作用乳腺、MSH等)，故錯;(D)催產素(oxytocin)作用是「促乳汁『射出(排出)』」與子宮收縮，「製造乳汁」是泌乳素(PRL)的作用，故錯。故正確者為(B)。","options":{"A":"錯誤。女性仍分泌少量雄性素(腎上腺/卵巢)。","B":"正確。前葉分泌FSH。","C":"錯誤。前葉激素不只作用於內分泌腺(如GH、PRL)。","D":"錯誤。催產素促乳汁射出;製造乳汁是泌乳素。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"108110-N1-15":{"quick":"正解(B)。松果腺位於第三腦室「頂部(後方)」。","detail":{"background":"松果腺(pineal gland)是間腦上視丘(epithalamus)的一部分，位於「第三腦室頂部後方」、中腦上丘之上，分泌褪黑激素。它不在第四腦室。臨床上松果體鈣化可作為頭顱X光中線標記，腫瘤可壓迫中腦頂蓋造成上視麻痺(Parinaud症候群)。故位置為第三腦室頂部。","options":{"A":"錯誤。第三腦室底為下視丘。","B":"正確。松果腺在第三腦室頂部(後方)。","C":"錯誤。第四腦室底為腦橋延髓。","D":"錯誤。第四腦室頂為小腦/髓帆。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"108110-N1-8":{"quick":"正解(A)。胎兒/嬰幼兒期甲狀腺素分泌不足會導致呆小症(克汀病, cretinism)。","detail":{"background":"「呆小症(cretinism，先天性甲狀腺低能症)」是胎兒或嬰幼兒期「甲狀腺素(thyroxine)」分泌不足所致，因甲狀腺素是腦發育與骨骼生長的關鍵，缺乏會造成智能障礙、生長遲滯、矮小、特殊面容——故新生兒篩檢甲狀腺功能以早期治療。生長激素不足致「侏儒症(垂體性,智能正常)」;胰島素不足致糖尿病;FSH不足致性腺功能低下。故導致呆小症者為甲狀腺素不足。","options":{"A":"正確。甲狀腺素不足→呆小症(克汀病)。","B":"錯誤。生長激素不足→侏儒症(智能正常)。","C":"錯誤。胰島素不足→糖尿病。","D":"錯誤。FSH不足→性腺功能低下。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"109030-N1-16":{"quick":"正解(C)。脾臟是淋巴(免疫/濾血)器官，不分泌內分泌激素。","detail":{"background":"許多非典型器官也兼分泌激素：心臟(心房分泌ANP心房利鈉肽)、腎臟(分泌腎素、紅血球生成素EPO、活化維生素D)、胃腸道(分泌胃泌素、膽囊收縮素等)、肝、脂肪(瘦素)等。「脾臟(spleen)」屬淋巴器官，負責濾血、儲血與免疫(清除老化紅血球、製造淋巴球與抗體)，「不分泌內分泌激素」。故答案為脾臟。","options":{"A":"錯誤。心臟分泌ANP。","B":"錯誤。腎臟分泌腎素、EPO並活化維生素D。","C":"正確。脾臟為淋巴器官，不分泌激素。","D":"錯誤。胃分泌胃泌素等。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"109110-N1-9":{"quick":"正解(B)。嗜鉻細胞(chromaffin cells)位於腎上腺髓質，分泌腎上腺素/正腎上腺素。","detail":{"background":"腎上腺「髓質(medulla)」源自神經嵴，由「嗜鉻細胞(chromaffin cells)」構成(相當於交感節後神經元)，受交感節前纖維直接支配，分泌「腎上腺素(epinephrine)與正腎上腺素(norepinephrine)」，是「戰或逃」反應的內分泌部分。嗜鉻細胞瘤(pheochromocytoma)即源自此、造成陣發性高血壓。皮質、甲狀腺、松果腺無嗜鉻細胞。故答案為腎上腺髓質。","options":{"A":"錯誤。皮質分泌類固醇激素，非嗜鉻細胞。","B":"正確。嗜鉻細胞位於腎上腺髓質。","C":"錯誤。甲狀腺由濾泡構成。","D":"錯誤。松果腺由松果細胞構成。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"110030-N1-8":{"quick":"正解(D為「錯誤」者)。絲球帶分泌的是「礦物皮質激素(醛固酮)」，不是糖皮質激素。","detail":{"background":"內分泌細胞與分泌物配對：(A)松果腺細胞→褪黑素✓;(B)胰島α細胞→升糖素✓(β細胞→胰島素、δ細胞→體抑素);(C)副甲狀腺主細胞→副甲狀腺素(PTH)✓;(D)「腎上腺皮質『絲球帶』細胞→醛固酮(礦物皮質激素)」，分泌糖皮質激素(皮質醇)的是「束狀帶」，故(D)把絲球帶說成分泌糖皮質激素是錯的。","options":{"A":"正確。松果腺分泌褪黑素。","B":"正確。胰島α細胞分泌升糖素。","C":"正確。副甲狀腺主細胞分泌PTH。","D":"錯誤(即為答案)。絲球帶分泌醛固酮(礦物皮質激素)，非糖皮質激素。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"110110-N1-8":{"quick":"正解(A為「錯誤」者)。嗜酸性細胞分泌的是生長激素(GH)與泌乳素(PRL)，不是ACTH;ACTH由嗜鹼性細胞分泌。","detail":{"background":"腦下垂體前葉細胞依HE染色分三類：①「嗜酸性細胞(acidophils)」→生長激素(GH)、泌乳素(PRL);②「嗜鹼性細胞(basophils)」→促甲狀腺素(TSH)、促性腺素(FSH、LH)、促腎上腺皮質素(ACTH);③無顆粒難染細胞(chromophobes)→脫顆粒或幹細胞。本題(A)說嗜酸性細胞分泌ACTH是錯的(ACTH屬嗜鹼性細胞)。(C)(D)嗜鹼性分泌TSH、FSH正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。嗜酸性細胞分泌GH與PRL，ACTH屬嗜鹼性細胞。","B":"(此選項依教材分類，難染細胞為脫顆粒/儲備細胞)非主要分泌ACTH，惟題目標準答案以(A)為最明確錯誤。","C":"正確。嗜鹼性細胞分泌TSH。","D":"正確。嗜鹼性細胞分泌FSH。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"111030-N1-2":{"quick":"正解(B)。低血鈣刺激副甲狀腺分泌PTH以升高血鈣。","detail":{"background":"血鈣調節：當「血鈣下降」時，「副甲狀腺(parathyroid gland)」的主細胞分泌「副甲狀腺素(PTH)」，作用是①促進骨吸收釋出鈣;②增加腎遠端小管再吸收鈣、排磷;③活化維生素D(1,25-(OH)₂D₃)以增加腸道鈣吸收——三管齊下升高血鈣。降鈣素(甲狀腺C細胞)則在高血鈣時降鈣。下視丘、腦下垂體前後葉不直接調節血鈣。故答案為副甲狀腺。","options":{"A":"錯誤。下視丘不直接調血鈣。","B":"正確。副甲狀腺分泌PTH升血鈣。","C":"錯誤。前葉不調血鈣。","D":"錯誤。後葉分泌ADH與催產素。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"111110-N1-6":{"quick":"正解(D)。誤切除副甲狀腺會使PTH不足→血鈣下降(低血鈣抽搐)。","detail":{"background":"副甲狀腺(parathyroid gland)有四枚，貼於甲狀腺後面，分泌PTH維持血鈣。甲狀腺手術時若不慎一併「移除或損傷副甲狀腺」，PTH驟降→血鈣下降→出現低血鈣症狀(手足抽搐、口周麻木、Chvostek/Trousseau徵象、喉痙攣)，是甲狀腺術後的重要併發症。胸腺、腎上腺皮質、胰島與血鈣調節無直接關係。故答案為副甲狀腺。","options":{"A":"錯誤。胸腺與血鈣無關。","B":"錯誤。腎上腺皮質調鈉鉀糖。","C":"錯誤。胰島調血糖。","D":"正確。切除副甲狀腺→PTH不足→血鈣下降。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"114030-N1-12":{"quick":"正解(D為「錯誤」者)。腦下垂體中間部分泌的是「黑色素細胞刺激素(MSH)」，不是褪黑素(melatonin，褪黑素由松果腺分泌)。","detail":{"background":"腦下垂體(pituitary/hypophysis)：①藉漏斗柄與下視丘相連;②位於蝶骨蝶鞍的「腦下垂體窩」;③分前葉(腺垂體)、中間部、後葉(神經垂體)，其中「中間部分泌黑色素細胞刺激素(MSH)」(人類退化);④「褪黑素(melatonin)」是『松果腺』分泌的，不是腦下垂體中間部。故(D)錯誤。注意MSH(melanocyte-stimulating hormone)與melatonin名稱相近、易混淆。","options":{"A":"正確。腦下垂體經漏斗柄與下視丘相連。","B":"正確。位於蝶鞍腦下垂體窩。","C":"正確。中間部分泌MSH。","D":"錯誤(即為答案)。褪黑素由松果腺分泌，非腦下垂體中間部。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"115030-N1-11":{"quick":"正解(D)。腎上腺與腦下腺(垂體)的主體都由「神經組織＋腺體組織」兩種來源共同發育組合而成。","detail":{"background":"發育來源具「神經+腺體雙重組成」的內分泌器官：①「腦下垂體(pituitary)」＝前葉(腺垂體)源自口凹外胚層上皮(Rathke囊,腺體組織)+後葉(神經垂體)源自間腦下伸的神經外胚層(神經組織);②「腎上腺(adrenal)」＝皮質源自中胚層體腔上皮(腺體組織)+髓質源自神經嵴(神經組織,嗜鉻細胞)。故兩者皆由神經與腺體組織共同組成。甲狀腺、胰臟主要源自內胚層上皮(單一腺體來源)。故答案為腎上腺與腦下腺。","options":{"A":"錯誤。甲狀腺為單一內胚層上皮來源。","B":"錯誤。甲狀腺、胰臟皆內胚層腺體來源。","C":"錯誤。胰臟為內胚層上皮來源(非神經+腺體)。","D":"正確。腎上腺與腦下腺皆由神經組織+腺體組織共構。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.18 The Endocrine System","實用人體解剖學（華杏）內分泌系統章","Junqueira《Basic Histology》Endocrine Glands"]}},"101030-N1-11":{"quick":"正解(A為「錯誤」者)。萊狄氏細胞(間質細胞)位於曲細精管「之間的間質」，不是在管壁內。","detail":{"background":"萊狄氏細胞(Leydig cell，又稱間質細胞)位於睪丸「曲細精管『之間』的結締組織間質」(非管壁內)，受腦下垂體LH調控，分泌「睪固酮(testosterone)」。曲細精管「管壁內」是支持細胞(Sertoli cell)與各級生殖細胞。故(A)「位於曲細精管管壁內」為錯誤;(B)間質細胞、(C)分泌睪固酮、(D)受腦下垂體(LH)調控皆正確。","options":{"A":"錯誤(即為答案)。Leydig細胞位於曲細精管之間的間質，非管壁內。","B":"正確。又稱間質細胞。","C":"正確。分泌睪固酮。","D":"正確。受腦下垂體LH調控。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"101110-N1-16":{"quick":"正解(A)。青春期前卵子發生停滯於「第一次減數分裂前期」。","detail":{"background":"卵子發生(oogenesis)有兩次停滯：①胎兒期卵原細胞分裂為初級卵母細胞後，即停滯在「第一次減數分裂前期(prophase I)」，一直維持到青春期(故青春期前皆停在此期);②青春期後每月一個濾泡成熟，排卵時完成第一次減數分裂、進入第二次減數分裂並「停在第二次減數分裂中期(metaphase II)」，直到「受精」才完成第二次減數分裂。故青春期前停留在第一次減數分裂前期。","options":{"A":"正確。青春期前停滯於第一次減數分裂前期。","B":"錯誤。中期I非停滯點。","C":"錯誤。第二次減數分裂前期非停滯點。","D":"錯誤。排卵後才停在第二次減數分裂中期。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"101110-N1-9":{"quick":"正解(C)。精子輸送順序：副睪管(2)→輸精管(1)→射精管(3)，即②①③＝213。","detail":{"background":"男性精液輸送路徑：曲細精管→直小管→睪丸網→輸出小管→「副睪管(2,儲存與成熟)→輸精管(1,輸送)→射精管(3,接受精囊分泌後穿過前列腺)」→尿道。本題代號1=輸精管、2=副睪管、3=射精管，依輸送方向為2→1→3(②①③＝213)。","options":{"A":"錯誤。123為輸精→副睪→射精，順序不符。","B":"錯誤。132不符。","C":"正確。213＝副睪管→輸精管→射精管。","D":"錯誤。231不符。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"102030-N1-10":{"quick":"正解(C為「錯誤」者)。受精通常發生在輸卵管「壺腹部(ampulla)」，不是峽部。","detail":{"background":"輸卵管(uterine/fallopian tube)由外向內分四段：①「漏斗部(infundibulum)」末端有繖(纖毛)、開口於骨盆腔近卵巢;②「壺腹部(ampulla)」最長最寬，是「精卵受精的部位」;③「峽部(isthmus)」狹窄;④「子宮部(間質部)」穿入子宮壁、開口於子宮腔。故(C)說峽部是受精部位為錯誤(應為壺腹部)。","options":{"A":"正確。漏斗部開口於骨盆腔。","B":"正確。壺腹部是最長部分。","C":"錯誤(即為答案)。受精部位是壺腹部，非峽部。","D":"正確。子宮部開口於子宮腔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"102110-N1-10":{"quick":"正解(C為「錯誤」者)。月經剝落的是子宮內膜「功能層」，基底層保留不脫落(供再生)。","detail":{"background":"子宮辨析：①正常子宮姿勢為「前傾(anteversion)＋前屈(anteflexion)」;②「直腸子宮陷凹(道格拉斯窩)」是站立或仰臥時骨盆腔最低點，積液/積血常聚此;③子宮內膜分功能層與基底層，「月經時只剝落『功能層』，基底層保留以再生內膜」，故(C)說基底層脫落為錯誤;④子宮圓韌帶起於子宮上外側角、經鼠蹊管止於大陰唇。故錯誤者為(C)。","options":{"A":"正確。子宮正常為前傾前屈。","B":"正確。直腸子宮陷凹為骨盆腔最低點。","C":"錯誤(即為答案)。月經剝落功能層，基底層保留。","D":"正確。子宮圓韌帶終止於大陰唇。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"102110-N1-11":{"quick":"正解(B為「錯誤」者)。精囊主要功能是「分泌精液成分(含果糖)」，不是儲存精子(儲存精子是副睪)。","detail":{"background":"精囊(seminal vesicle)：左右各一、位於膀胱後面、輸精管壺腹外側，分泌富含「果糖(供精子能量)、前列腺素、凝固蛋白」的鹼性黏液，佔精液體積約60%。它「不儲存精子」——儲存精子的是「副睪」。故(B)「主要功能為儲存精子」為錯誤。","options":{"A":"正確。精囊左右各一。","B":"錯誤(即為答案)。精囊主分泌精液成分，儲存精子是副睪。","C":"正確。精囊位於膀胱後面。","D":"正確。位於輸精管壺腹外側。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"103030-N1-11":{"quick":"正解(A)。闊韌帶(broad ligament)是由腹膜皺褶構成、包覆子宮與附屬器。","detail":{"background":"子宮韌帶：①「闊韌帶(broad ligament)」＝雙層「腹膜皺褶」，從子宮兩側延伸到骨盆壁，包覆輸卵管、卵巢、血管神經;②圓韌帶＝纖維肌束，經鼠蹊管止大陰唇、維持前傾;③卵巢韌帶＝連卵巢與子宮;④主韌帶(cardinal)＝子宮頸旁緻密結締組織，主要支撐固定子宮頸。其中「由腹膜構成」者為闊韌帶。","options":{"A":"正確。闊韌帶由腹膜皺褶構成。","B":"錯誤。圓韌帶為纖維肌束。","C":"錯誤。卵巢韌帶為纖維索。","D":"錯誤。主韌帶為緻密結締組織。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"103100-N1-9":{"quick":"正解(B)。精囊分泌物佔精液體積最高(約60%)。","detail":{"background":"精液(semen)組成比例：①「精囊(seminal vesicle)」分泌約60%(含果糖、前列腺素，鹼性);②「前列腺(prostate)」分泌約20–30%(含檸檬酸、PSA、鋅，乳白稀薄);③副睪與睪丸提供精子(約5%);④尿道球腺(Cowper腺)分泌少量潤滑黏液。故占比最高者為精囊。","options":{"A":"錯誤。副睪主儲精，分泌量少。","B":"正確。精囊分泌占精液約60%。","C":"錯誤。前列腺約占20–30%。","D":"錯誤。尿道球腺僅少量潤滑液。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"104030-N1-12":{"quick":"正解(A)。青春期前(男童)曲細精管內生殖細胞主要為「精原細胞(spermatogonia)」。","detail":{"background":"精子發生(spermatogenesis)從青春期才開始(受睪固酮、FSH啟動)。青春期前的男童，曲細精管尚未活躍，管內生殖細胞停留在最幼稚的「精原細胞(spermatogonia，二倍體幹細胞)」階段，尚未進行減數分裂產生初級/次級精母細胞或精子。故男童曲細精管內主要為精原細胞。","options":{"A":"正確。青春期前主要為精原細胞。","B":"錯誤。初級精母細胞青春期後才大量出現。","C":"錯誤。次級精母細胞為減數分裂產物。","D":"錯誤。精細胞為更後期產物。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"104100-N1-8":{"quick":"正解(D)。尿道球腺(Cowper腺)的導管開口於「陰莖部(海綿體部)尿道」。","detail":{"background":"尿道球腺(bulbourethral/Cowper gland)位於膜部尿道兩側(泌尿生殖膈內)，但其「導管向下開口於『陰莖部(海綿體部)尿道』」，性興奮時分泌鹼性黏液潤滑並中和尿道殘餘酸性。注意：腺體位置在膜部、但開口在海綿體部。故開口處為陰莖部尿道。","options":{"A":"錯誤。膜部是腺體所在，非開口處。","B":"錯誤。球部尿道屬海綿體部起始，但標準答案指陰莖部尿道。","C":"錯誤。前列腺尿道接受射精管與前列腺導管。","D":"正確。尿道球腺開口於陰莖部(海綿體部)尿道。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"104100-N1-9":{"quick":"正解(D)。射精管由輸精管與精囊管會合而成，穿過前列腺、開口於前列腺部尿道。","detail":{"background":"射精管(ejaculatory duct)由「輸精管壺腹」與「精囊的排泄管」會合而成，左右各一，「穿過前列腺」後開口於「前列腺部尿道」的精阜(精丘)。故(D)「穿過前列腺」正確;(A)是輸精管+精囊管(非副睪管);(B)(C)開口於前列腺部尿道(非陰莖部或膜部)。","options":{"A":"錯誤。由輸精管與精囊管會合，非副睪管。","B":"錯誤。開口於前列腺部尿道，非陰莖尿道。","C":"錯誤。非膜部尿道。","D":"正確。射精管穿過前列腺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"105090-N1-7":{"quick":"正解(A)。卵巢動脈直接由「腹主動脈」發出(約L2高度)。","detail":{"background":"性腺動脈(卵巢/睪丸動脈)因性腺胚胎時在腹後壁高位發育、後下降，故「直接源自腹主動脈」(約第2腰椎高度)，是腹主動脈成對臟支。子宮動脈(來自髂內動脈)供應子宮並與卵巢動脈吻合;但卵巢動脈本身源自腹主動脈。故答案為腹主動脈。","options":{"A":"正確。卵巢動脈直接源自腹主動脈。","B":"錯誤。髂內動脈發出子宮動脈等。","C":"錯誤。子宮動脈與卵巢動脈吻合，但非其來源。","D":"錯誤。腸繫膜下動脈供應後段腸道。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"106030-N1-8":{"quick":"正解(D)。次級卵母細胞在「受精」時才完成第二次減數分裂。","detail":{"background":"卵子減數分裂時序：排卵時排出的是「次級卵母細胞」，它停滯在「第二次減數分裂中期」;只有當「受精(精子穿入)」發生時，才被激活完成第二次減數分裂，產生成熟卵與第二極體。若未受精，次級卵母細胞退化、不完成減數分裂。故完成第二次減數分裂的時機為受精。","options":{"A":"錯誤。出生時停在第一次減數分裂前期。","B":"錯誤。青春期啟動週期但未完成減數II。","C":"錯誤。排卵時停在第二次減數分裂中期。","D":"正確。受精時才完成第二次減數分裂。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"106110-N1-10":{"quick":"正解(C)。子宮圓韌帶經鼠蹊管止於大陰唇，幫助維持子宮「前傾」。","detail":{"background":"子宮辨析：(A)子宮肌層(myometrium)是「平滑肌」非骨骼肌;(B)子宮血液主要來自「髂內動脈」分枝的子宮動脈(非髂外);(C)「子宮圓韌帶」由子宮上外側角經鼠蹊管止大陰唇，牽拉維持子宮「前傾(anteversion)」——正確;(D)月經剝落的是內膜「功能層」，基底層保留。故正確者為(C)。","options":{"A":"錯誤。子宮肌層為平滑肌。","B":"錯誤。子宮血供來自髂內動脈(子宮動脈)。","C":"正確。圓韌帶維持子宮前傾。","D":"錯誤。月經剝落功能層，非基底層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"106110-N1-8":{"quick":"正解(B為「錯誤」者)。儲存並使精子成熟的是「副睪」，不是精囊。","detail":{"background":"男性生殖器辨析：(A)曲細精管產生精子——正確;(B)「精囊」分泌精液成分(果糖)，「儲存與促精子成熟」是『副睪』的功能，故錯;(C)輸精管隨精索穿過腹股溝(鼠蹊)管進入骨盆腔——正確;(D)前列腺位於恥骨聯合後方、膀胱下方、包繞尿道起始——正確。故錯誤者為(B)。","options":{"A":"正確。曲細精管產生精子。","B":"錯誤(即為答案)。儲存與成熟精子是副睪，非精囊。","C":"正確。輸精管經鼠蹊管入骨盆。","D":"正確。前列腺在膀胱下方、恥骨聯合後方。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"106111-N1-10":{"quick":"正解(D為「錯誤」者)。Leydig細胞位於曲細精管「之間的間質」，曲細精管「內」不含Leydig細胞。","detail":{"background":"男女生殖辨析：(A)FSH促濾泡成熟——正確;(B)LH高峰促排卵——正確;(C)Sertoli細胞(支持細胞)以緊密連接形成「血-睪丸障壁」保護生殖細胞——正確;(D)「曲細精管『內』」是Sertoli細胞與生殖細胞，「Leydig(間質)細胞在曲細精管『之間』的間質」，故說曲細精管內可見許多Leydig細胞為錯誤。","options":{"A":"正確。FSH促卵巢濾泡成熟。","B":"正確。LH促排卵。","C":"正確。Sertoli細胞形成血睪障壁。","D":"錯誤(即為答案)。Leydig細胞在曲細精管間質，非管內。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"106111-N1-9":{"quick":"正解(B為「不開口前列腺部」者)。球尿道腺(尿道球腺)的導管開口於「陰莖部(海綿體部)尿道」，不開口於前列腺部。","detail":{"background":"開口於「前列腺部尿道」的構造：射精管(開口於精阜)、前列腺各小葉的導管、前列腺小囊(prostatic utricle，米勒管退化遺跡)。而「球尿道腺(尿道球腺/Cowper腺)的導管」開口於『陰莖部(海綿體部)尿道』，不在前列腺部。故不開口於前列腺部尿道者為球尿道腺導管。","options":{"A":"開口前列腺部。射精管。","B":"不開口(即為答案)。尿道球腺導管開口於陰莖部尿道。","C":"開口前列腺部。前列腺小囊。","D":"開口前列腺部。前列腺導管。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"107030-N1-11":{"quick":"正解(C)。初級精母細胞是「雙套(diploid, 2n)」染色體。","detail":{"background":"精子發生的染色體套數：精原細胞(2n)→「初級精母細胞(primary spermatocyte, 2n，雙套)」→第一次減數分裂→次級精母細胞(n, 單套)→第二次減數分裂→精細胞(n)→精子(n)。故仍為「雙套(diploid)」者是初級精母細胞(及精原細胞);次級精母細胞、精細胞、精子皆為單套(haploid)。","options":{"A":"錯誤。精子為單套(n)。","B":"錯誤。精細胞為單套。","C":"正確。初級精母細胞為雙套(2n)。","D":"錯誤。次級精母細胞為單套。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"107110-N1-9":{"quick":"正解(C)。間質細胞(Leydig cell)分泌雄性激素(睪固酮)。","detail":{"background":"睪丸細胞分工：①「間質細胞(Leydig cell)」在曲細精管間質，受LH刺激分泌「睪固酮(雄性激素)」;②支持細胞(Sertoli cell)在管壁內，受FSH刺激，支持營養生殖細胞、形成血睪障壁、分泌抑制素與雄性素結合蛋白(ABP);③精原細胞、精細胞為生殖細胞各階段。故分泌雄性激素者為Leydig細胞。","options":{"A":"錯誤。精原母細胞為生殖幹細胞。","B":"錯誤。Sertoli細胞支持營養、形成血睪障壁。","C":"正確。Leydig(間質)細胞分泌睪固酮。","D":"錯誤。精細胞為生殖細胞。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"108020-N1-11":{"quick":"正解(D)。內鞘細胞(theca interna)留在卵巢內形成黃體，不隨卵母細胞排出。","detail":{"background":"排卵時隨「次級卵母細胞」一起排出的構造：①透明帶(zona pellucida);②第一極體;③外圍的放射冠(corona radiata，顆粒細胞);這些組成排出的卵丘複合體。而「內鞘細胞(theca interna)」留在卵巢內、排卵後與顆粒細胞一起黃體化形成黃體(分泌助孕酮)，「不隨卵排出」。故不會隨卵母細胞排出者為內鞘細胞。","options":{"A":"會排出。透明帶包覆卵。","B":"會排出。第一極體。","C":"會排出。放射冠細胞。","D":"不排出(即為答案)。內鞘細胞留卵巢形成黃體。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"108020-N1-6":{"quick":"正解(B)。輸精管(vas deferens)直接與副睪(尾)相連。","detail":{"background":"精子路徑中與副睪相連者：上游的「輸出小管」匯入副睪頭→副睪管(在副睪內盤繞)→副睪尾延續為「輸精管(vas deferens)」。故「直接與副睪相連(向下游)」者為輸精管。睪丸網、直小管在副睪之前(睪丸內);射精管在輸精管之後。本題問與副睪直接相連，最典型為輸精管(承接副睪尾)。","options":{"A":"錯誤。睪丸網在睪丸內、副睪之前。","B":"正確。輸精管承接副睪尾。","C":"錯誤。射精管在輸精管之後。","D":"錯誤。直小管在睪丸內。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"108110-N1-11":{"quick":"正解(B)。肉膜肌(dartos muscle)位於陰囊壁內(平滑肌)。","detail":{"background":"「肉膜肌(dartos muscle)」是位於「陰囊(scrotum)」皮下的平滑肌層，受寒冷收縮使陰囊皮膚起皺、提高睪丸溫度;溫熱時鬆弛使陰囊下垂散熱——與提睪肌(骨骼肌)共同調節睪丸溫度以利精子生成。陰莖、副睪、精索不含肉膜肌。故含肉膜肌者為陰囊。","options":{"A":"錯誤。陰莖無肉膜肌。","B":"正確。陰囊壁含肉膜肌(平滑肌)。","C":"錯誤。副睪無肉膜肌。","D":"錯誤。精索含提睪肌(骨骼肌)，非肉膜肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"109030-N1-5":{"quick":"正解(C)。陰莖勃起的血液來自「髂內動脈」分枝(陰部內動脈→陰莖深/背動脈)。","detail":{"background":"男性陰莖的血液供應來自「髂內動脈(internal iliac artery)」→陰部內動脈→陰莖深動脈(供海綿體)與陰莖背動脈。性興奮時副交感神經(骨盆內臟神經)使海綿體小動脈擴張、海綿竇充血而勃起(NO/cGMP機制)。生殖腺動脈供睪丸、髂外動脈供下肢，皆非陰莖勃起血供來源。故答案為髂內動脈。","options":{"A":"錯誤。生殖腺動脈供睪丸。","B":"錯誤。閉孔動脈供大腿內側。","C":"正確。髂內動脈分枝供陰莖海綿體。","D":"錯誤。髂外動脈延續為股動脈供下肢。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"109030-N1-6":{"quick":"正解(D)。次級濾泡(secondary follicle)由數層顆粒細胞與已出現濾泡腔(液體)組成，內含初級卵母細胞。","detail":{"background":"卵巢濾泡發育：①原始濾泡(primordial)＝初級卵母細胞外圍單層扁平濾泡細胞;②初級濾泡(primary)＝單層→多層立方顆粒細胞，尚無腔;③「次級濾泡(secondary/antral)＝多層顆粒細胞且出現含液的『濾泡腔(antrum)』」，內仍為初級卵母細胞;④成熟(葛氏)濾泡(Graafian)＝大濾泡腔、即將排卵。故「數層濾泡細胞＋有液濾泡腔＋含初級卵母細胞」者為次級濾泡。","options":{"A":"錯誤。原始濾泡為單層扁平、無腔。","B":"錯誤。葛氏濾泡為成熟大濾泡(即將排卵)。","C":"錯誤。初級濾泡尚無濾泡腔。","D":"正確。次級濾泡有數層顆粒細胞與濾泡腔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"109110-N1-4":{"quick":"正解(A)。女陰由前往後為：陰蒂(1)→外尿道口(2)→陰道口(3)，即①②③＝123。","detail":{"background":"女性外陰(會陰)構造由前(腹側)向後(背側)排列：陰阜→陰蒂→外尿道口→陰道口→會陰體→肛門。本題三構造代號1=陰蒂、2=外尿道口、3=陰道口，由前往後即1→2→3(①②③＝123)。深化：女性外陰由前到後=陰阜→陰蒂→外尿道口→陰道口→會陰體→肛門;會陰體(陰道口與肛門之間)是骨盆底肌的纖維交會處,分娩時可能撕裂或行會陰切開以保護。陰蒂與男性陰莖同源、由勃起組織構成。","options":{"A":"正確。123＝陰蒂→外尿道口→陰道口。","B":"錯誤。132不符前後順序。","C":"錯誤。213不符。","D":"錯誤。231不符。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"110030-N1-11":{"quick":"正解(B)。副睪(epididymis)內襯具靜纖毛的偽複層柱狀上皮，並儲存使精子成熟。","detail":{"background":"副睪(epididymis)管腔內襯「偽複層柱狀上皮，游離面有『靜纖毛(stereocilia，是長微絨毛、無運動性)』」以增加吸收面積;功能為「儲存精子並使其成熟(獲得運動與受精能力)」。睪丸產生精子、精囊分泌精液、前列腺分泌乳白液，皆非靜纖毛+儲精的構造。故答案為副睪。","options":{"A":"錯誤。睪丸產生精子。","B":"正確。副睪具靜纖毛、儲存並成熟精子。","C":"錯誤。精囊分泌精液成分。","D":"錯誤。前列腺分泌乳白稀液。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"110030-N1-16":{"quick":"正解(C)。小陰唇(labia minora)前端分叉包覆陰蒂，形成陰蒂包皮與繫帶。","detail":{"background":"女性外陰：兩側「小陰唇(labia minora)」向前延伸，其上方皺褶覆蓋陰蒂形成「陰蒂包皮(prepuce of clitoris)」，下方形成陰蒂繫帶。大陰唇(同男性陰囊同源)在外側;陰阜在恥骨聯合前;陰道前庭為兩小陰唇間的區域。故形成陰蒂包皮者為小陰唇。","options":{"A":"錯誤。陰阜在恥骨前。","B":"錯誤。大陰唇在外側。","C":"正確。小陰唇前端包覆陰蒂成包皮。","D":"錯誤。陰道前庭為小陰唇間區域。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"110110-N1-12":{"quick":"正解(D)。曲細精管(seminiferous tubule)是睪丸內產生精子的場所。","detail":{"background":"睪丸內精子路徑：「曲細精管(seminiferous tubule)」是『產生精子』的場所(內有Sertoli細胞與各級生殖細胞)→直小管(straight tubule)→睪丸網(rete testis)→輸出小管(efferent ductule)→副睪。後三者只是輸送通道，不產生精子。故產生精子者為曲細精管。","options":{"A":"錯誤。睪丸網為輸送通道。","B":"錯誤。直小管為輸送通道。","C":"錯誤。輸出小管連睪丸網與副睪。","D":"正確。曲細精管產生精子。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"111030-N1-10":{"quick":"正解(C)。排卵時卵母細胞停滯在「第二次減數分裂中期(metaphase II)」。","detail":{"background":"排卵(ovulation)時排出的是「次級卵母細胞」，它已完成第一次減數分裂、進入第二次減數分裂但「停滯在第二次減數分裂『中期(metaphase II)』」，等待受精;受精發生才完成第二次減數分裂。故排卵時停留期為第二次減數分裂中期(與101110-16、106030-8相互呼應)。","options":{"A":"錯誤。第一次減數分裂中期為更早。","B":"錯誤。末期I非停滯點。","C":"正確。排卵停在第二次減數分裂中期。","D":"錯誤。受精後才完成第二次減數分裂(末期II)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"111030-N1-5":{"quick":"正解(C為「錯誤」者)。前列腺位於直腸「前方」，故肛門指診可摸到;說它在直腸後方是錯的。","detail":{"background":"前列腺(prostate)位置：①在膀胱「下方」、包繞尿道起始(前列腺部尿道);②在泌尿生殖膈「上方」;③在恥骨聯合「後方」、直腸「前方」(故臨床可經直腸指診觸診前列腺);④在精囊「下方」。故(C)「位於直腸後方」為錯誤(應在直腸前方)。","options":{"A":"正確。前列腺在膀胱下方。","B":"正確。在泌尿生殖膈上方。","C":"錯誤(即為答案)。前列腺在直腸前方(可經直腸觸診)，非後方。","D":"正確。在精囊下方。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"111030-N1-9":{"quick":"正解(A為「不來自髂內動脈」者)。卵巢的血供來自「腹主動脈(卵巢動脈)」，非髂內動脈。","detail":{"background":"髂內動脈(internal iliac artery)供應骨盆腔大部分器官：子宮(子宮動脈)、陰道、膀胱、直腸下段、會陰等。但「卵巢」的血供來自「腹主動脈直接發出的卵巢動脈」(因胚胎高位起源)，「不來自髂內動脈」。故答案為卵巢。","options":{"A":"不來自髂內動脈(即為答案)。卵巢由腹主動脈供血。","B":"來自髂內動脈。子宮動脈。","C":"來自髂內動脈。陰道動脈。","D":"來自髂內動脈。膀胱動脈。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"111110-N1-8":{"quick":"正解(C)。鼠蹊疝氣的腸子在鼠蹊管內壓迫「精索」，影響其內睪丸血管而致睪丸缺血。","detail":{"background":"鼠蹊(腹股溝)管內通過的是「精索(spermatic cord)」，內含輸精管、睪丸動脈、蔓狀靜脈叢、淋巴、神經與提睪肌。間接性鼠蹊疝氣時腸袢經深環進入鼠蹊管，可「壓迫精索」，使其中的睪丸動脈/靜脈受阻→睪丸血液循環障礙(嚴重時缺血壞死)。睪丸、副睪在陰囊內;儲精囊在骨盆。故被壓迫者為精索。","options":{"A":"錯誤。睪丸在陰囊內，非鼠蹊管內受壓主體。","B":"錯誤。副睪在陰囊內。","C":"正確。精索在鼠蹊管內，受壓致睪丸血供受阻。","D":"錯誤。儲精囊(精囊)在膀胱後方骨盆內。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"111110-N1-9":{"quick":"正解(B)。陰蒂(clitoris)由勃起組織構成，與陰莖同源，受刺激會充血勃起。","detail":{"background":"女性「陰蒂(clitoris)」與男性陰莖同源(胚胎生殖結節分化而來)，由「勃起組織(海綿體)」構成，富含感覺神經末梢，性興奮時充血勃起。陰阜為脂肪墊;大、小陰唇為皮膚皺褶(大陰唇與陰囊同源)。故由勃起組織構成、可勃起者為陰蒂。","options":{"A":"錯誤。陰阜為脂肪墊。","B":"正確。陰蒂由勃起組織構成、與陰莖同源。","C":"錯誤。大陰唇與陰囊同源(非勃起組織為主)。","D":"錯誤。小陰唇為皮膚皺褶。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"112030-N1-8":{"quick":"正解(B)。受精通常發生在輸卵管「壺腹部(ampulla)」。","detail":{"background":"排卵後卵被繖部掃入輸卵管，精子上游至「壺腹部(ampulla)」與卵相遇受精(輸卵管最長最寬段，環境最適合);受精卵再經峽部運送、約受精後6–7天著床於子宮內膜。漏斗部/繖部負責拾卵;峽部狹窄。故受精部位為壺腹部(與102030-10呼應)。","options":{"A":"錯誤。漏斗部負責拾卵。","B":"正確。壺腹部為受精部位。","C":"錯誤。峽部狹窄、運送受精卵。","D":"錯誤。繖部掃卵入管。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"112110-N1-7":{"quick":"正解(C)。子宮頸(cervix)下端突入陰道，可經陰道窺鏡直接觀察。","detail":{"background":"子宮分底(fundus)、體(body)、峽(isthmus)、頸(cervix)。「子宮頸(cervix)」下半部突入陰道上端(子宮頸陰道部)，與陰道相接，臨床可用陰道窺鏡(擴張器)直接觀察並做子宮頸抹片(Pap smear)篩檢。子宮體、底位於骨盆腔深處，無法經陰道直接看到。故與陰道相接、可直接觀察者為子宮頸。","options":{"A":"錯誤。子宮體在骨盆腔內。","B":"錯誤。子宮底在最上方。","C":"正確。子宮頸與陰道相接，可經窺鏡觀察。","D":"錯誤。子宮峽部在體與頸之間。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"112180-N1-6":{"quick":"正解(C)。子宮圓韌帶經鼠蹊管連到大陰唇。","detail":{"background":"子宮韌帶中，「圓韌帶(round ligament)」由子宮上外側角(輸卵管下方)向前外側走，穿過「鼠蹊(腹股溝)管」止於「大陰唇」皮下，牽拉維持子宮前傾(與男性睪丸引帶同源)。闊韌帶為腹膜皺褶;主韌帶、子宮薦韌帶固定子宮頸但不經鼠蹊管。故經鼠蹊管到大陰唇者為圓韌帶。","options":{"A":"錯誤。闊韌帶為腹膜皺褶，不經鼠蹊管。","B":"錯誤。主韌帶固定子宮頸。","C":"正確。圓韌帶經鼠蹊管止大陰唇。","D":"錯誤。子宮薦韌帶連子宮頸與薦骨。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"113030-N1-17":{"quick":"正解(C為「錯誤」者)。成熟濾泡內是停在第二次減數分裂中期的「次級卵母細胞」，並非已含23條染色體的「卵子(ovum)」;卵子要受精後才形成。","detail":{"background":"成熟(葛氏)濾泡敘述：(A)內鞘膜(theca interna)細胞在LH作用下合成雄性素(androgen)——正確;(B)顆粒細胞(granulosa)將雄性素芳香化為雌激素(estrogen)——正確(兩細胞合作理論);(D)成熟濾泡有單一大濾泡腔(antrum)——正確;(C)成熟濾泡內含的是「次級卵母細胞(停在減數分裂II中期)」，尚未完成第二次減數分裂、嚴格說還不是『卵子(ovum)』(受精後才成卵)，故「含23條染色體的卵子」敘述不精確、為錯誤選項。","options":{"A":"正確。內鞘膜細胞合成雄性素。","B":"正確。顆粒細胞參與雌激素合成。","C":"錯誤(即為答案)。濾泡內為次級卵母細胞(未成卵子)，受精後才成含23染色體的卵。","D":"正確。成熟濾泡含單一大濾泡腔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"113100-N1-6":{"quick":"正解(A為「錯誤」者)。前庭球(bulb of vestibule)是「勃起組織(海綿體)」，不是腺體;陰道口兩側的『腺體』是前庭大腺(Bartholin腺)。","detail":{"background":"女陰前庭構造：(A)「前庭球(bulb of vestibule)」是位於陰道口兩側的「勃起組織(與陰莖球同源)」，不是腺體(陰道口兩側的腺體是前庭大腺/巴氏腺)，故(A)錯誤;(B)外尿道口介於陰蒂與陰道口之間——正確;(C)陰蒂包皮由兩側小陰唇前端皮膚皺褶形成——正確;(D)陰道前庭是兩側小陰唇間的區域(內有尿道口與陰道口)——正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。前庭球是勃起組織，非腺體(腺體為前庭大腺)。","B":"正確。尿道口在陰蒂與陰道口之間。","C":"正確。陰蒂包皮由小陰唇皺褶形成。","D":"正確。陰道前庭介於兩小陰唇之間。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"114030-N1-16":{"quick":"正解(B為「不支撐子宮」者)。懸韌帶(卵巢懸韌帶)固定的是卵巢、內走卵巢血管，不支撐子宮。","detail":{"background":"支撐固定子宮的構造：①主韌帶(cardinal ligament)＝子宮頸旁緻密結締組織，主要支撐;②子宮薦韌帶、圓韌帶輔助維持位置;③「骨盆膈(提肛肌)與泌尿生殖膈」從下方托住盆腔器官(含子宮)。而「(卵巢)懸韌帶(suspensory ligament of ovary)」是固定『卵巢』於骨盆壁、內含卵巢血管的腹膜皺褶，「不支撐子宮」。故不具支撐子宮功能者為懸韌帶。","options":{"A":"支撐。主韌帶主要支撐子宮頸。","B":"不支撐(即為答案)。懸韌帶固定卵巢，非子宮。","C":"支撐。骨盆膈托住盆腔器官。","D":"支撐。泌尿生殖膈輔助支撐。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"114100-N1-6":{"quick":"正解(A)。陰莖球(bulb of penis)與龜頭同由「尿道海綿體(corpus spongiosum)」構成。","detail":{"background":"陰莖勃起組織：①「尿道海綿體(corpus spongiosum)」＝包繞尿道，其後端膨大為「陰莖球(bulb)」、前端膨大為「龜頭(glans)」——故陰莖球與龜頭同屬尿道海綿體;②「陰莖海綿體(corpora cavernosa)」一對，其後端分為兩「陰莖腳(crura)」附著於恥骨弓，是勃起主體。故與龜頭同由尿道海綿體構成者為陰莖球。","options":{"A":"正確。陰莖球與龜頭同由尿道海綿體構成。","B":"錯誤。陰莖腳屬陰莖海綿體。","C":"錯誤。包皮為皮膚皺褶。","D":"錯誤。尿道球腺為腺體。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"114170-N1-7":{"quick":"正解(C)。月經剝落的是子宮內膜的「功能層(functional layer)」。","detail":{"background":"子宮內膜(endometrium)分兩層：①「功能層(functional/stratum functionalis)」＝靠近子宮腔、隨月經週期增厚與剝落，月經時崩解出血排出;②「基底層(basal/stratum basale)」＝深層、緊貼肌層，「月經時保留不剝落」，作為下一週期再生功能層的來源。子宮外膜(漿膜)、肌膜(平滑肌)不剝落。故月經剝落者為內膜功能層。","options":{"A":"錯誤。子宮外膜為漿膜，不剝落。","B":"錯誤。肌膜為平滑肌，不剝落。","C":"正確。月經剝落子宮內膜功能層。","D":"錯誤。基底層保留以再生內膜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"115030-N1-17":{"quick":"正解(D)。分泌期(secretory phase)子宮內膜腺體彎曲、分泌富含肝醣的液體，準備供應胚胎。","detail":{"background":"子宮內膜週期：①月經期＝功能層崩解出血(基底層保留，並非「整個」內膜崩解)，故(A)錯;②增生期(proliferative，雌激素主導)＝功能層增厚、腺體與「螺旋動脈」開始增生(並非無血管)，故(B)錯;③排卵時內膜厚度尚在增加、未達極致(分泌期才最厚)，故(C)錯;④「分泌期(secretory，黃體助孕酮主導)＝腺體彎曲擴張、分泌富含『肝醣(glycogen)』的液體」供胚胎著床所需，內膜最厚，故(D)正確。","options":{"A":"錯誤。月經期只崩解功能層，非整個內膜。","B":"錯誤。增生期已開始分布螺旋血管。","C":"錯誤。內膜最厚在分泌期，非排卵時。","D":"正確。分泌期內膜腺分泌富含肝醣的液體。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.28 The Reproductive Systems","實用人體解剖學（華杏）生殖系統章","Junqueira《Basic Histology》Male/Female Reproductive System"]}},"101030-N1-12":{"quick":"正解(C)。頸動脈體(化學受器)的訊息經「舌咽神經(IX)」送至延髓。","detail":{"background":"頸動脈體(carotid body)位於頸總動脈分叉處，是偵測血氧(PO₂)、二氧化碳與pH的「周邊化學受器」，其傳入訊息經「舌咽神經(CN IX)的竇神經分支」送到延髓呼吸中樞調節呼吸;主動脈體(aortic body)的化學訊息則經迷走神經(X)。注意區分：頸動脈「竇」(壓力受器)與頸動脈「體」(化學受器)的傳入都走舌咽神經。故O₂訊息經舌咽神經送延髓。","options":{"A":"錯誤。三叉神經主顏面感覺與咀嚼。","B":"錯誤。舌下神經支配舌肌運動。","C":"正確。頸動脈體化學受器經舌咽神經傳入延髓。","D":"錯誤。副神經支配胸鎖乳突肌與斜方肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"101030-N1-15":{"quick":"正解(C)。腰椎穿刺由「蛛網膜下腔」抽取腦脊髓液。","detail":{"background":"腦脊髓液(CSF)位於「蛛網膜下腔(subarachnoid space，在蛛網膜與軟腦膜之間)」。腰椎穿刺於L3–L4或L4–L5椎間進針，依序穿過皮膚、棘上/棘間韌帶、黃韌帶、硬膜外腔、硬膜與蛛網膜，進入「蛛網膜下腔」抽取CSF(此處只有馬尾、無脊髓，較安全)。硬膜上腔(硬膜外腔)用於硬脊膜外麻醉;脊髓中央管在脊髓內、不抽取。故抽CSF處為蛛網膜下腔。","options":{"A":"錯誤。硬膜上(外)腔用於硬脊膜外麻醉。","B":"錯誤。硬膜下腔為潛在腔。","C":"正確。蛛網膜下腔含CSF，為腰椎穿刺抽取處。","D":"錯誤。脊髓中央管在脊髓內。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"101030-N1-16":{"quick":"正解(B)。許旺氏細胞(Schwann cell)引導周邊神經再生並形成髓鞘。","detail":{"background":"周邊神經膠細胞：①「許旺氏細胞(Schwann cell)」＝在周邊神經形成髓鞘，並在軸突受損後增生排成「Büngner帶」引導軸突再生(故周邊神經可再生);②衛星細胞(satellite cell)＝包圍神經節細胞體、支持調節。中樞的寡樹突膠細胞形成中樞髓鞘但「抑制再生」(故中樞神經難再生);星狀膠細胞構成血腦障壁。故引導周邊神經再生者為許旺氏細胞。","options":{"A":"錯誤。衛星細胞包圍節細胞體。","B":"正確。許旺氏細胞引導周邊神經再生。","C":"錯誤。星狀膠細胞構成血腦障壁。","D":"錯誤。寡樹突膠細胞形成中樞髓鞘、抑制再生。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"101110-N1-14":{"quick":"正解(D)。嗅覺不經視丘中繼，直接投射到大腦(嗅皮質)。","detail":{"background":"絕大多數感覺(視、聽、觸、痛、溫、味、本體覺)都先經「視丘(丘腦)」中繼，再投射到大腦皮質;唯獨「嗅覺(olfaction)」是例外——嗅球的訊息「不經視丘」即直接傳到大腦嗅皮質(梨狀皮質)與邊緣系統，這也是嗅覺與情緒、記憶連結強烈的原因。故不需經視丘者為嗅覺。","options":{"A":"錯誤。視覺經外側膝狀體(視丘)中繼。","B":"錯誤。聽覺經內側膝狀體(視丘)中繼。","C":"錯誤。觸覺經視丘腹後外側核中繼。","D":"正確。嗅覺不經視丘，直達嗅皮質。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"101110-N1-15":{"quick":"正解(A)。腕隧道症候群壓迫「正中神經」。","detail":{"background":"腕隧道(carpal tunnel)由腕骨與屈肌支持帶(橫腕韌帶)圍成，內有屈指肌腱與「正中神經(median nerve)」通過。當隧道內壓增高(如反覆使用、懷孕、甲狀腺低能)壓迫正中神經，造成「腕隧道症候群」——大拇指、食指、中指及無名指橈側半的麻木刺痛，嚴重時大魚際肌萎縮、對掌無力。故受壓神經為正中神經。","options":{"A":"正確。腕隧道症候群壓迫正中神經。","B":"錯誤。橈神經損傷致垂腕。","C":"錯誤。尺神經受壓在肘管或Guyon管。","D":"錯誤。肌皮神經支配前臂屈肌與前臂外側皮膚。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"102030-N1-15":{"quick":"正解(A)。橈神經損傷導致「垂腕(wrist drop)」。","detail":{"background":"橈神經(radial nerve)支配前臂「伸肌群(伸腕、伸指)」與肱三頭肌。肱骨體中段骨折或腋下長期壓迫(如拐杖)損傷橈神經時，伸腕伸指無力→手腕下垂無法背伸＝「垂腕(wrist drop)」，並有手背橈側感覺異常。正中神經傷致「猿手」、尺神經傷致「爪形手」、肌皮神經傷致屈肘無力。故致垂腕者為橈神經。","options":{"A":"正確。橈神經損傷致垂腕。","B":"錯誤。正中神經損傷致猿手。","C":"錯誤。肌皮神經傷致屈肘無力。","D":"錯誤。尺神經傷致爪形手。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"102030-N1-16":{"quick":"正解(A)。控制軀體肌肉的(下)運動神經元細胞體位於脊髓灰質「前角」。","detail":{"background":"脊髓灰質：「前角(anterior/ventral horn)」含支配骨骼肌的下運動神經元細胞體(其軸突經前根出脊髓);「後角(posterior horn)」處理感覺傳入;「外側角(lateral horn，僅T1–L2與S2–4)」含自主神經節前神經元。故軀體運動神經元位於前角。","options":{"A":"正確。前角含軀體運動神經元。","B":"錯誤。後角處理感覺。","C":"錯誤。外側角含自主神經節前元。","D":"錯誤。灰質連合連接兩側灰質。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"102110-N1-15":{"quick":"正解(A)。嗅神經(嗅覺)的訊息不經視丘轉送。","detail":{"background":"感覺中繼的例外是「嗅覺(嗅神經 CN I)」——不經視丘直達嗅皮質;其餘視神經(外側膝狀體)、平衡聽神經(內側膝狀體/前庭核)、三叉神經(腹後內側核)等都先經視丘中繼。故不經視丘者為嗅神經(與101110-14同概念)。","options":{"A":"正確。嗅神經(嗅覺)不經視丘。","B":"錯誤。視神經經外側膝狀體中繼。","C":"錯誤。三叉神經感覺經視丘中繼。","D":"錯誤。聽覺經內側膝狀體中繼。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"102110-N1-16":{"quick":"正解(C)。背根神經節的感覺神經元屬「偽單極神經元(pseudounipolar)」。","detail":{"background":"神經元依突起數分類：①多極(multipolar)＝一軸突多樹突，最常見(運動神經元、CNS神經元);②雙極(bipolar)＝一軸突一樹突，見於視網膜、嗅上皮、內耳;③「偽單極(pseudounipolar)＝胞體只伸出一個突起再分兩支(一支到周邊、一支入脊髓)」，是「背根神經節(脊神經節)」的感覺神經元類型;④無軸突(anaxonic)＝視網膜無長突細胞。故背根神經元屬偽單極。","options":{"A":"錯誤。多極為運動神經元等。","B":"錯誤。雙極見於視網膜、嗅、內耳。","C":"正確。背根神經節為偽單極神經元。","D":"錯誤。無軸突神經元見於視網膜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"103030-N1-1":{"quick":"正解(D)。迷走神經(X)同時分布於頸部、胸縱膈與腹腔。","detail":{"background":"「迷走神經(vagus nerve, CN X)」是行程最長、分布最廣的腦神經，由延髓發出後經頸部(支配咽喉)、進入胸縱膈(支配心、肺、食道)，再穿橫膈到腹腔(支配胃腸到結腸左曲)，提供副交感神經支配。食道與胸主動脈雖也跨頸/胸/腹但題目以「神經」最切;氣管只在頸與胸。故同時分布三區者為迷走神經。","options":{"A":"錯誤。食道走頸胸腹，但題意指神經。","B":"錯誤。氣管僅在頸與胸。","C":"錯誤。胸主動脈主要在胸腔。","D":"正確。迷走神經分布頸、胸縱膈與腹腔。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"103030-N1-15":{"quick":"正解(A為「錯誤」者)。頸膨大由C5–T1組成(臂神經叢來源)，不是C3–T1。","detail":{"background":"脊髓有兩處膨大(因支配四肢、運動神經元多)：①「頸膨大(cervical enlargement)」＝C5–T1脊髓節段，發出『臂神經叢』支配上肢;②腰薦膨大＝L1–S3，發出腰薦神經叢支配下肢。本題(A)說頸膨大為C3–T1是錯的(應為C5–T1);(B)運動細胞多、(C)組成臂神經叢、(D)支配上肢皆正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。頸膨大為C5–T1，非C3–T1。","B":"正確。該段運動神經細胞較多。","C":"正確。其脊神經組成臂神經叢。","D":"正確。支配上肢運動與感覺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"103100-N1-16":{"quick":"正解(B)。皮膚痛/觸覺由大腦「頂葉」的初級體感覺皮質掌管。","detail":{"background":"大腦各葉功能：額葉＝運動、執行、Broca語言;「頂葉(parietal lobe)＝中央後迴的初級體感覺皮質，處理觸、壓、痛、溫與本體覺」;枕葉＝視覺;顳葉＝聽覺、Wernicke語言、記憶。故手被刺傷的痛覺由頂葉掌管。","options":{"A":"錯誤。額葉主運動與執行。","B":"正確。頂葉體感覺皮質處理痛觸覺。","C":"錯誤。枕葉主視覺。","D":"錯誤。顳葉主聽覺與記憶。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"104030-N1-15":{"quick":"正解(C)。膝反射(髕腱反射)經「腰神經叢」相關的股神經(L2–L4)傳導。","detail":{"background":"膝反射(膝跳反射, patellar reflex)是牽張反射，感覺與運動纖維走「股神經(femoral nerve)」、反射中樞在L2–L4脊髓節，股神經源自「腰神經叢(lumbar plexus, L1–L4)」。故膝反射經腰神經叢(股神經)傳導。頸/臂神經叢支配上肢、薦神經叢含坐骨神經支配下肢後側。","options":{"A":"錯誤。頸神經叢支配頸部與膈神經。","B":"錯誤。臂神經叢支配上肢。","C":"正確。膝反射經腰神經叢(股神經L2–4)。","D":"錯誤。薦神經叢含坐骨神經。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"104030-N1-16":{"quick":"正解(A)。上矢狀竇(硬腦膜靜脈竇)位於硬腦膜兩層之間。","detail":{"background":"硬腦膜靜脈竇(dural venous sinuses)是位於「硬腦膜兩層(骨膜層與腦膜層)之間」的靜脈通道，收集腦的靜脈血與蛛網膜下腔回流的CSF(經蛛網膜顆粒)。「上矢狀竇(superior sagittal sinus)」沿大腦鐮上緣走行，是最大的靜脈竇。故上矢狀竇位於硬腦膜內(兩層之間)。","options":{"A":"正確。上矢狀竇位於硬腦膜(兩層之間)。","B":"錯誤。蜘蛛膜為中層腦膜。","C":"錯誤。蛛網膜下腔含CSF，非靜脈竇所在。","D":"錯誤。軟腦膜緊貼腦表面。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"104100-N1-15":{"quick":"正解(D)。嗅覺以外的感覺先經「丘腦(視丘)」中繼再進入大腦皮質。","detail":{"background":"視丘(丘腦, thalamus)是感覺的「中繼站」：除嗅覺外，視、聽、觸、痛、溫、味、本體覺都先在視丘相應核團換神經元，再投射到大腦皮質相應感覺區。故感覺進皮質前的中繼處為丘腦(與101110-14、102110-15互補)。","options":{"A":"錯誤。延腦含生命中樞、感覺徑通過但非中繼皮質前站。","B":"錯誤。橋腦為傳導與核團。","C":"錯誤。中腦含視聽反射中樞但非感覺皮質中繼。","D":"正確。丘腦為感覺進皮質前的中繼。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"104100-N1-16":{"quick":"正解(C)。眼睛顏色由「虹膜(iris)」內黑色素的量決定。","detail":{"background":"「虹膜(iris)」是位於角膜後、晶狀體前的有色環狀膜，中央為瞳孔;其基質內「黑色素的含量與分布」決定眼睛顏色(黑色素多→棕/黑色，少→藍/綠色)，並藉瞳孔括約肌與擴大肌調節進光量。脈絡膜供應血液與遮光;視網膜含感光細胞;結膜覆蓋眼白與眼瞼內面。故決定眼色者為虹膜。","options":{"A":"錯誤。脈絡膜供血並遮光。","B":"錯誤。視網膜含感光細胞。","C":"正確。虹膜黑色素量決定眼睛顏色。","D":"錯誤。結膜為透明黏膜。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"105030-N1-14":{"quick":"正解(B)。交感神經節前神經元細胞體位於「脊髓(胸腰段外側角)」。","detail":{"background":"自主神經節前神經元位置：①「交感神經」節前元在「脊髓胸腰段(T1–L2)外側角」(故稱胸腰系統);②副交感神經節前元在「腦幹(III、VII、IX、X相關核)與薦髓(S2–4)」(故稱腦薦系統)。背根神經節是感覺神經元;交感神經鏈是節後元所在。故交感節前元細胞體位於脊髓。","options":{"A":"錯誤。腦幹含副交感(III/VII/IX/X)節前元。","B":"正確。交感節前元在脊髓胸腰段外側角。","C":"錯誤。背根神經節含感覺神經元。","D":"錯誤。交感鏈含節後神經元。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"105030-N1-15":{"quick":"正解(C)。胼胝體(corpus callosum)連結左右大腦半球。","detail":{"background":"「胼胝體(corpus callosum)」是連接左右大腦半球的最大「連合纖維(commissural fibers)」束，使兩半球訊息交流整合;切斷後成「裂腦」。紋狀體屬基底核(運動調節);海馬體屬邊緣系統(記憶);乳頭體屬下視丘(記憶迴路)。故連結兩半球者為胼胝體。","options":{"A":"錯誤。紋狀體屬基底核。","B":"錯誤。海馬體主記憶。","C":"正確。胼胝體連結左右大腦半球。","D":"錯誤。乳頭體屬下視丘。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"105030-N1-16":{"quick":"正解(D)。動態平衡受器「壺腹嵴(crista ampullaris)」位於半規管(壺腹)內。","detail":{"background":"內耳前庭器：①「半規管(semicircular canals)」三個互相垂直，其壺腹內的「壺腹嵴(crista ampullaris)」偵測「旋轉(角)加速度」＝動態平衡;②橢圓囊與球囊內的「位砂斑(macula)」偵測「直線加速度與頭部位置」＝靜態平衡;③耳蝸管司聽覺。故動態平衡的「嵴」位於半規管。","options":{"A":"錯誤。球囊含位砂斑(靜態平衡)。","B":"錯誤。橢圓囊含位砂斑(靜態平衡)。","C":"錯誤。耳蝸管司聽覺。","D":"正確。壺腹嵴位於半規管，司動態平衡。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"105030-N1-9":{"quick":"正解(B)。耳咽管連通「鼻咽」與「中耳」，平衡鼓膜內外氣壓。","detail":{"background":"耳咽管(Eustachian/auditory tube)連通「鼻咽(nasopharynx)」與「中耳鼓室」，平時關閉，吞嚥或打呵欠時開放讓空氣進出中耳，平衡鼓膜內外氣壓(如飛機升降耳悶吞口水緩解)。小兒耳咽管短平，鼻咽感染易經此上行致中耳炎。故連通鼻咽與中耳。","options":{"A":"錯誤。連的是中耳非內耳。","B":"正確。耳咽管連通鼻咽與中耳。","C":"錯誤。連的是鼻咽非口咽。","D":"錯誤。連的是中耳，且咽端為鼻咽。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"105090-N1-15":{"quick":"正解(D)。右眼無法外展(外側移動)+複視→外展神經(VI)損傷(支配外直肌)。","detail":{"background":"眼球運動神經：①動眼神經(III)支配上、下、內直肌與下斜肌(及提上瞼肌、瞳孔括約肌);②滑車神經(IV)支配上斜肌;③「外展神經(abducens, VI)支配『外直肌』，使眼球外展(往外側看)」。右眼「無法向外側移動並複視」＝右外直肌麻痺＝外展神經損傷。故答案為外展神經。","options":{"A":"錯誤。視神經損傷致視力喪失，非眼動障礙。","B":"錯誤。動眼神經麻痺致眼外下斜、上瞼下垂、瞳孔散大。","C":"錯誤。三叉神經主顏面感覺與咀嚼。","D":"正確。外展神經麻痺致外直肌無力、不能外展。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"105090-N1-16":{"quick":"正解(D)。胼胝體是連結左右大腦半球的主要構造。","detail":{"background":"「胼胝體(corpus callosum)」是聯絡兩大腦半球的最大連合纖維束。內囊(internal capsule)是投射纖維(連大腦皮質與下方);穹窿(fornix)連海馬與乳頭體;大腦腳(crus cerebri)是中腦下行運動纖維。故連結左右半球者為胼胝體(與105030-15同概念)。","options":{"A":"錯誤。內囊為投射纖維。","B":"錯誤。穹窿連海馬與乳頭體。","C":"錯誤。大腦腳為中腦下行纖維。","D":"正確。胼胝體連結左右大腦半球。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106030-N1-14":{"quick":"正解(A)。顏面神經穿行於耳下腺(腮腺)內，腮腺腫瘤常壓迫顏面神經。","detail":{"background":"「顏面神經(facial nerve, VII)」出顱後穿入「耳下腺(腮腺, parotid gland)」實質，在腺內分為五大分支(顳、顴、頰、下頜緣、頸支)支配表情肌。故腮腺腫瘤或手術易壓迫/傷及顏面神經，造成同側表情肌癱瘓。頷下腺、舌下腺、腭扁桃腺與顏面神經主幹關係較小。故答案為耳下腺(腮腺)。","options":{"A":"正確。顏面神經穿行腮腺，腫瘤易壓迫。","B":"錯誤。頷下腺與顏面神經主幹關係較小。","C":"錯誤。舌下腺非顏面神經主幹穿行處。","D":"錯誤。腭扁桃腺與舌咽神經較相關。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106030-N1-15":{"quick":"正解(B)。室間孔(Monro孔)連通側腦室與第三腦室。","detail":{"background":"腦室系統與CSF流向：左右「側腦室」→經「室間孔(interventricular foramen/Monro孔)」→「第三腦室」→經「大腦導水管(中腦導水管)」→「第四腦室」→經正中孔與外側孔→蛛網膜下腔。故室間孔連通側腦室與第三腦室。","options":{"A":"錯誤。左右側腦室間無直接孔(各自經室間孔通第三腦室)。","B":"正確。室間孔連側腦室與第三腦室。","C":"錯誤。第三與第四腦室間為大腦導水管。","D":"錯誤。第四腦室與中央管相通(及正中/外側孔)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106030-N1-16":{"quick":"正解(B)。三叉神經由「橋腦(腦橋)」外側表面鑽出。","detail":{"background":"腦神經出腦位置：嗅(端腦)、視(間腦);中腦發出III、IV;「橋腦(pons)發出V(三叉，腦橋外側)、VI、VII、VIII」;延腦發出IX、X、XI、XII。三叉神經(trigeminal, V)是最大的腦神經，由腦橋外側鑽出。故答案為橋腦。","options":{"A":"錯誤。延腦發出IX–XII。","B":"正確。三叉神經由腦橋外側鑽出。","C":"錯誤。中腦發出III、IV。","D":"錯誤。丘腦不發出腦神經。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106110-N1-14":{"quick":"正解(D)。支配骨骼肌的(下)運動神經元細胞體位於脊髓灰質「前角」。","detail":{"background":"脊髓「灰質前角(anterior/ventral gray horn)」含支配骨骼肌的下運動神經元(α運動神經元)細胞體，軸突經前根離開脊髓。注意題目用詞：是「灰質前角(grey ventral horn)」而非白質。白質是上下行纖維束;外側角(灰質)含自主節前元。故答案為灰質前角(與102030-16同概念)。","options":{"A":"錯誤。白質為傳導纖維束。","B":"錯誤。白質前柱為上下行纖維。","C":"錯誤。灰質外側角含自主神經節前元。","D":"正確。灰質前角含骨骼肌運動神經元。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106110-N1-15":{"quick":"正解(C)。動眼神經(III)的副交感纖維調節睫狀肌→改變晶狀體曲度(調節焦距)。","detail":{"background":"看近物時的「調節反射」：動眼神經(CN III)的副交感纖維(經睫狀神經節)使「睫狀肌收縮→懸韌帶鬆弛→晶狀體變厚(曲度增加)」以聚焦近物，同時瞳孔縮小、雙眼會聚。故調節晶狀體曲度的神經是動眼神經。視神經是感覺(視覺);眼神經(三叉V₁)是感覺;滑車神經支配上斜肌。","options":{"A":"錯誤。視神經傳視覺(感覺)。","B":"錯誤。眼神經(V₁)為感覺。","C":"正確。動眼神經副交感調節晶狀體曲度。","D":"錯誤。滑車神經支配上斜肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106110-N1-16":{"quick":"正解(A)。海馬(hippocampus)屬邊緣系統。","detail":{"background":"邊緣系統(limbic system)與情緒、記憶、動機有關，主要構造包括「海馬(hippocampus，記憶)、杏仁核(情緒)、扣帶迴、乳頭體、穹窿」等。黑質(substantia nigra)屬中腦(多巴胺、運動);松果腺屬上視丘(內分泌);基底核(basal ganglia)屬運動調節(雖與邊緣有連結但典型歸運動系統)。故屬邊緣系統者為海馬。","options":{"A":"正確。海馬屬邊緣系統(記憶)。","B":"錯誤。黑質屬中腦運動。","C":"錯誤。松果腺屬內分泌。","D":"錯誤。基底核屬運動調節系統。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106110-N1-3":{"quick":"正解(C)。上斜肌(superior oblique)使眼球「向下、向內(往鼻側下方)看並內旋」。","detail":{"background":"眼外肌作用：上直肌(上+內轉)、下直肌(下+外轉)、內直肌(內收)、外直肌(外展)、「上斜肌(superior oblique)→使眼球『下轉、外展、內旋』，臨床上讓眼球『向下內側(看鼻尖下方/下樓梯)』」、下斜肌(上轉、外展、外旋)。上斜肌由滑車神經支配，受損下樓梯複視。故使眼球向下內側看並內旋者為上斜肌。","options":{"A":"錯誤。上直肌使眼上轉。","B":"錯誤。下直肌使眼下轉外旋。","C":"正確。上斜肌使眼下轉、內旋(向下內看)。","D":"錯誤。下斜肌使眼上轉外旋。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106111-N1-14":{"quick":"正解(D)。多極神經元(如脊髓前角運動神經元)的軸突末梢與骨骼肌形成神經-肌連接點。","detail":{"background":"與骨骼肌形成「神經-肌連接點(神經肌肉接合, NMJ)」的是「下運動神經元(α運動神經元)」，屬「多極神經元(multipolar)」(一軸突多樹突)。其軸突末梢釋放乙醯膽鹼活化終板。偽單極為感覺神經元(背根節);雙極見於特殊感覺;單極/無軸突非運動神經元。故答案為多極神經元。","options":{"A":"錯誤。單極(無樹突)非運動神經元。","B":"錯誤。偽單極為感覺神經元。","C":"錯誤。雙極見於視網膜、嗅、內耳。","D":"正確。多極神經元(運動神經元)形成神經肌連接點。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106111-N1-15":{"quick":"正解(D)。初級視覺區位於「枕葉」(距狀裂周圍)。","detail":{"background":"初級感覺皮質定位：初級「視覺區」在「枕葉(occipital lobe)距狀裂周圍(Brodmann 17區)」;初級聽覺區在顳葉(顳橫迴);初級體感覺區在頂葉(中央後迴);初級運動區在額葉(中央前迴)。故初級視覺區在枕葉。","options":{"A":"錯誤。額葉主運動。","B":"錯誤。頂葉主體感覺。","C":"錯誤。顳葉主聽覺。","D":"正確。枕葉為初級視覺區。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"106111-N1-16":{"quick":"正解(C)。延髓「錐體(pyramid)」內含下行的皮質脊髓徑(corticospinal tract)。","detail":{"background":"延髓腹側的「錐體(pyramids)」是「皮質脊髓徑(corticospinal tract)」下行運動纖維的所在，其大部分纖維在延髓下端「錐體交叉(decussation)」越到對側，故一側大腦運動皮質控制對側肢體。薄束、楔狀束是上行的本體/精細觸覺感覺徑(走後索);脊髓丘腦徑傳痛溫覺。故錐體內含皮質脊髓徑(與108020-15同概念)。","options":{"A":"錯誤。薄束為上行感覺徑(後索)。","B":"錯誤。楔狀束為上行感覺徑(後索)。","C":"正確。錐體含皮質脊髓徑(下行運動)。","D":"錯誤。脊髓丘腦徑傳痛溫覺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"107030-N1-15":{"quick":"正解(A)。耳下腺(腮腺)的分泌由「耳神經節(otic ganglion)」的副交感纖維(源自舌咽神經IX)支配。","detail":{"background":"唾液腺的副交感支配與其神經節：①「耳下腺(腮腺)→舌咽神經(IX)→耳神經節(otic ganglion)」;②頷下腺與舌下腺→顏面神經(VII)鼓索→下頜下神經節;③淚腺與鼻腺→顏面神經→翼腭神經節;④眼睫狀肌瞳孔→動眼神經(III)→睫狀神經節。故支配腮腺分泌者為耳神經節(IX)。","options":{"A":"正確。耳神經節(IX)支配腮腺分泌。","B":"錯誤。翼腭神經節支配淚腺、鼻腺。","C":"錯誤。睫狀神經節支配瞳孔睫狀肌。","D":"錯誤。下頜下神經節支配頷下腺、舌下腺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"107030-N1-9":{"quick":"正解(B)。主動脈體(化學受器)的訊息經「迷走神經(X)」傳遞。","detail":{"background":"主動脈體(aortic body)位於主動脈弓，是偵測血氧/CO₂/pH的周邊化學受器，其訊息經「迷走神經(CN X)」傳入延髓;對照頸動脈體經舌咽神經(IX)。故主動脈體O₂訊息走迷走神經(與101030-12對照記憶)。","options":{"A":"錯誤。三叉神經主顏面感覺。","B":"正確。主動脈體經迷走神經傳入。","C":"錯誤。舌咽神經傳頸動脈體訊息。","D":"錯誤。副神經支配胸鎖乳突肌、斜方肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"107110-N1-15":{"quick":"正解(A)。星形膠細胞(astrocyte)的足突包圍腦微血管，參與形成血腦障壁。","detail":{"background":"「星形膠細胞(astrocyte)」是中樞最多的神經膠細胞，功能多：①以足突包圍腦微血管，誘導內皮細胞形成緊密連接、「參與血腦障壁(BBB)」;②調節細胞外鉀離子與神經傳遞物濃度;③支持與修復(膠質瘢痕);④參與腦發育。寡突膠細胞形成中樞髓鞘、許旺氏細胞形成周邊髓鞘、室管膜細胞襯腦室。故參與血腦障壁者為星形膠細胞。","options":{"A":"正確。星形膠細胞參與形成血腦障壁。","B":"錯誤。寡突膠細胞形成中樞髓鞘。","C":"錯誤。許旺氏細胞形成周邊髓鞘。","D":"錯誤。室管膜細胞襯腦室、產生CSF。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"107110-N1-16":{"quick":"正解(A)。白交通枝(white ramus)內含「交感節前(有髓)纖維」。","detail":{"background":"交感神經與交感鏈的交通枝：①「白交通枝(white ramus communicans)」含「交感『節前』有髓纖維(故色白)」，由脊神經(T1–L2)進入交感鏈;②「灰交通枝(gray ramus communicans)」含「交感『節後』無髓纖維(故色灰)」，由交感鏈返回脊神經分布到血管汗腺豎毛肌。副交感不經交感鏈交通枝。故白交通枝含交感節前纖維。","options":{"A":"正確。白交通枝含交感節前纖維。","B":"錯誤。節後纖維走灰交通枝。","C":"錯誤。副交感不經交通枝。","D":"錯誤。副交感不經交通枝。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"108020-N1-14":{"quick":"正解(C)。距狀裂(禽距裂, calcarine fissure)上下兩側皮質為初級視覺區，與「視覺」最有關。","detail":{"background":"枕葉內側面的「距狀裂(calcarine fissure)」上下兩側皮質即「初級視覺皮質(V1, Brodmann 17區)」，接收來自外側膝狀體的視覺投射;距狀裂上方對應下半視野、下方對應上半視野。故與此區最相關的感覺是視覺。","options":{"A":"錯誤。味覺在頂葉島蓋/島葉。","B":"錯誤。聽覺在顳橫迴。","C":"正確。距狀裂周圍為初級視覺皮質。","D":"錯誤。本體覺在頂葉體感覺區。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"108020-N1-15":{"quick":"正解(B)。延腦錐體內為皮質脊髓徑(corticospinal tract)。","detail":{"background":"延腦腹側「錐體(pyramids)」內走的是下行運動的「皮質脊髓徑」，並在此交叉(錐體交叉)。紅核脊髓徑、四疊體(頂蓋)脊髓徑、前庭脊髓徑屬其他運動調節徑、不在錐體。故錐體內為皮質脊髓徑(與106111-16同概念)。","options":{"A":"錯誤。紅核脊髓徑源自中腦紅核。","B":"正確。錐體內為皮質脊髓徑。","C":"錯誤。四疊體脊髓徑源自中腦頂蓋。","D":"錯誤。前庭脊髓徑源自前庭核。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"108020-N1-16":{"quick":"正解(B)。眼房水(aqueous humor)由「睫狀突(ciliary processes)」分泌。","detail":{"background":"房水(aqueous humor)由「睫狀體的睫狀突(ciliary processes)」上皮分泌到後房→經瞳孔到前房→由前房角的小樑網與許萊姆氏管(Schlemm canal)回收。房水供應無血管的角膜與晶狀體養分並維持眼壓;回流受阻則眼壓升高(青光眼)。故分泌房水者為睫狀突。","options":{"A":"錯誤。角膜為透明無血管屈光介質。","B":"正確。睫狀突分泌房水。","C":"錯誤。晶狀體為屈光介質。","D":"錯誤。視網膜為感光層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"108110-N1-16":{"quick":"正解(B為「錯誤」者)。滑車神經支配「上斜肌」，不是外直肌(外直肌由外展神經支配)。","detail":{"background":"滑車神經(trochlear nerve, CN IV)辨析：(A)主含運動纖維——正確;(B)「支配『上斜肌(superior oblique)』」，外直肌是『外展神經(VI)』所支配，故(B)錯誤;(C)經眶上裂入眼眶——正確;(D)單側受損致上斜肌麻痺、下視複視與代償性頭傾——正確。滑車神經是唯一從腦幹背側發出、且支配對側眼肌的腦神經。故錯誤者為(B)。","options":{"A":"正確。滑車神經主含運動纖維。","B":"錯誤(即為答案)。滑車神經支配上斜肌，非外直肌。","C":"正確。經眶上裂入眼眶。","D":"正確。單側受損致複視斜視。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"109030-N1-14":{"quick":"正解(D)。胰島素是內分泌激素，不是神經傳導物質。","detail":{"background":"常見神經傳導物質：乙醯膽鹼、單胺類(多巴胺dopamine、正腎上腺素、血清素serotonin)、胺基酸類(麩胺酸glutamate興奮性、GABA與甘胺酸glycine抑制性)、神經胜肽(腦內啡等)。「胰島素(insulin)」是胰島β細胞分泌、調節血糖的『內分泌激素』，「不是神經傳導物質」。故答案為胰島素。","options":{"A":"是傳導物質。多巴胺。","B":"是傳導物質。甘胺酸(抑制性)。","C":"是傳導物質。血清素。","D":"不是(即為答案)。胰島素為內分泌激素。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"109030-N1-15":{"quick":"正解(B)。翼腭神經節(pterygopalatine ganglion)是副交感神經節。","detail":{"background":"頭部四對副交感神經節：①睫狀神經節(III,瞳孔睫狀肌);②「翼腭神經節(pterygopalatine ganglion, VII,淚腺鼻腺)」;③下頜下神經節(VII,頷下舌下腺);④耳神經節(IX,腮腺)。上頸神經節是『交感』神經節;前庭神經節、背根神經節是『感覺』神經節。故副交感神經節者為翼腭神經節。","options":{"A":"錯誤。上頸神經節為交感神經節。","B":"正確。翼腭神經節為副交感神經節。","C":"錯誤。前庭神經節為感覺(平衡)。","D":"錯誤。背根神經節為感覺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"109030-N1-3":{"quick":"正解(A為「非其功能」者)。吞噬外來或壞死組織是「微膠細胞(microglia)」的功能，不是星狀細胞。","detail":{"background":"星狀細胞(astrocyte)功能：形成血腦障壁、調節細胞外鉀離子與神經傳遞物、支持與引導神經發育、形成膠質瘢痕。而「吞噬外來物或壞死組織(中樞的巨噬細胞角色)」是『微膠細胞(microglia)』的工作。故(A)非星狀細胞功能。","options":{"A":"非其功能(即為答案)。吞噬是微膠細胞的功能。","B":"是其功能。形成血腦障壁。","C":"是其功能。參與腦發育。","D":"是其功能。調節鉀離子濃度。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"109110-N1-15":{"quick":"正解(B)。終絲(filum terminale)由脊髓圓錐向下延伸、連結尾骨以固定脊髓。","detail":{"background":"脊髓末端(脊髓圓錐, conus medullaris，約L1–L2)向下延續為一條無神經組織的「終絲(filum terminale)」(由軟脊膜延伸)，下行穿過硬膜囊末端，附著於尾骨(尾椎)，作用是「固定(錨定)脊髓」防止其上下移動。馬尾是L2以下的神經根束;脊髓根、神經束膜非錨定構造。故連結尾骨固定脊髓者為終絲。","options":{"A":"錯誤。馬尾是腰薦神經根束。","B":"正確。終絲連尾骨、固定脊髓。","C":"錯誤。脊髓根為神經根。","D":"錯誤。神經束膜包覆神經束。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"109110-N1-16":{"quick":"正解(B)。大內臟神經的節前纖維來自「胸段脊髓(T5–T9/T10)」。","detail":{"background":"內臟神經(splanchnic nerves)是交感神經，其節前纖維來自胸腰段脊髓外側角：「大內臟神經(greater splanchnic nerve)」節前纖維來自「胸段脊髓(約T5–T9)」，下行至腹腔神經節換元，支配上腹部臟器(胃、肝、脾、小腸等)。交感系統節前元只在T1–L2(胸腰)，故來源是胸段脊髓。","options":{"A":"錯誤。頸段無交感節前元(交感起於T1–L2)。","B":"正確。大內臟神經節前纖維來自胸段脊髓。","C":"錯誤。腰段為較低內臟神經。","D":"錯誤。薦段為副交感來源。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"109110-N1-8":{"quick":"正解(A)。拔牙局部麻醉阻斷「三叉神經」(下齒槽神經，屬下頜支V₃)。","detail":{"background":"牙齒與口腔的感覺由「三叉神經(trigeminal, CN V)」傳遞：上排牙＝上頜支(V₂)的上齒槽神經;下排牙＝下頜支(V₃)的下齒槽神經。故拔牙時局部麻醉(如下齒槽神經阻斷)是阻斷『三叉神經』的傳導以止痛。顏面神經主表情肌運動、舌咽神經主咽與舌後感覺、舌下神經主舌肌運動，皆非牙齒痛覺。故答案為三叉神經。","options":{"A":"正確。牙齒痛覺由三叉神經傳遞，麻醉阻斷之。","B":"錯誤。顏面神經主表情肌運動。","C":"錯誤。舌咽神經主咽與舌後1/3感覺。","D":"錯誤。舌下神經主舌肌運動。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"110030-N1-7":{"quick":"正解(C)。錐體(pyramid)位於延髓(腹側)。","detail":{"background":"腦幹各部標誌：延髓(medulla)＝腹側「錐體(pyramid，皮質脊髓徑)」與橄欖核;橋腦＝腹側膨大;中腦＝背側「四疊體(corpora quadrigemina，上下丘)」與腹側大腦腳、紅核、黑質;乳頭體屬下視丘;松果體屬上視丘。故位於延髓者為錐體。","options":{"A":"錯誤。乳頭體屬下視丘。","B":"錯誤。四疊體在中腦背側。","C":"正確。錐體位於延髓腹側。","D":"錯誤。松果體屬上視丘。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"110110-N1-16":{"quick":"正解(B)。股神經損傷→股四頭肌無力→「膝反射消失」、伸膝困難。","detail":{"background":"股神經(femoral nerve, L2–L4)支配「股四頭肌(伸膝)」與大腿前面、小腿內側皮膚感覺，並負責膝反射(髕腱反射)。受損→伸膝無力(上樓困難)、「膝反射消失」、大腿前/小腿內側感覺異常。大腿內收靠閉孔神經;陰莖皮膚感覺靠陰部神經;足外翻靠腓淺神經。故股神經受損最可能膝反射消失。","options":{"A":"錯誤。大腿內收靠閉孔神經。","B":"正確。股神經傷致股四頭肌無力、膝反射消失。","C":"錯誤。陰莖皮膚感覺靠陰部神經。","D":"錯誤。足外翻靠腓淺神經。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"110110-N1-7":{"quick":"正解(A)。齒狀韌帶由「軟脊膜(pia mater)」衍生而成。","detail":{"background":"「齒狀韌帶(denticulate ligament)」是「軟脊膜(pia mater)」在脊髓兩側外伸、呈鋸齒狀附著到硬脊膜的縱行三角形韌帶，作用是把脊髓懸吊固定於硬膜囊中央、防止左右晃動。它源自軟脊膜(非蛛網膜或硬膜)。故衍生來源為軟脊膜。","options":{"A":"正確。齒狀韌帶由軟脊膜衍生。","B":"錯誤。蛛網膜為中層腦膜。","C":"錯誤。硬脊膜為最外層。","D":"錯誤。絨毛膜為胎膜，與此無關。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"111030-N1-15":{"quick":"正解(A為「不具有」者)。薄核(gracile nucleus)位於延髓(後索核)，不在中腦。","detail":{"background":"中腦(midbrain)內含：紅核(red nucleus，運動協調)、黑質(substantia nigra，多巴胺)、網狀結構、內側蹄系(medial lemniscus，上行感覺徑通過)、大腦腳、四疊體、動眼/滑車神經核。而「薄核(gracile nucleus)與楔狀核」是『延髓』的後索核(接收薄束、楔狀束的本體/精細觸覺)。故中腦「不具有」薄核。","options":{"A":"不具有(即為答案)。薄核在延髓(後索核)，非中腦。","B":"具有。紅核在中腦。","C":"具有。網狀結構貫穿腦幹含中腦。","D":"具有。內側蹄系通過中腦。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"111030-N1-16":{"quick":"正解(D)。背根神經節(dorsal root ganglion)傳遞一般體表感覺。","detail":{"background":"「背根神經節(脊神經節, dorsal root ganglion)」含偽單極感覺神經元，傳遞軀幹四肢的「一般體表感覺(觸、痛、溫、本體覺)」進入脊髓後角。翼腭神經節、睫狀神經節是副交感神經節;螺旋神經節傳「聽覺」(特殊感覺)。故傳一般體表感覺者為背根神經節。","options":{"A":"錯誤。翼腭神經節為副交感(淚腺鼻腺)。","B":"錯誤。睫狀神經節為副交感(瞳孔)。","C":"錯誤。螺旋神經節傳聽覺。","D":"正確。背根神經節傳一般體表感覺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"111030-N1-3":{"quick":"正解(B)。內側蹄系(medial lemniscus)傳遞本體覺(及精細觸覺、振動覺)。","detail":{"background":"「內側蹄系(medial lemniscus)」是「後索-內側蹄系徑(背柱系統)」的一部分：傳遞「精細觸覺、本體覺(位置覺)、振動覺、辨別覺」。路徑：周邊→後索(薄束/楔狀束)→延髓後索核換元並交叉→形成內側蹄系上行→視丘→體感覺皮質。痛溫覺則走脊髓丘腦徑(前外側系統)。故內側蹄系與本體覺(背柱系統)有關。","options":{"A":"錯誤。視覺走視徑。","B":"正確。內側蹄系傳本體覺(背柱系統)。","C":"錯誤。痛覺走脊髓丘腦徑。","D":"錯誤。聽覺走外側蹄系。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"111110-N1-5":{"quick":"正解(B)。頸動脈竇壓力受器的訊息經「舌咽神經(IX)」傳送。","detail":{"background":"頸動脈竇(carotid sinus，頸總動脈分叉處膨大)是「壓力(壓覺)受器」，偵測血壓變化，其傳入訊息經「舌咽神經(CN IX)的竇神經(Hering神經)」送到延髓心血管中樞，啟動壓力反射調節血壓;主動脈弓壓力受器則經迷走神經(X)。故頸動脈竇訊息走舌咽神經(與頸動脈體同經IX)。","options":{"A":"錯誤。三叉神經主顏面感覺。","B":"正確。頸動脈竇壓力受器經舌咽神經傳入。","C":"錯誤。顏面神經主表情與部分味覺。","D":"錯誤。副神經支配胸鎖乳突肌與斜方肌。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"112030-N1-1":{"quick":"正解(C)。腦下垂體腫瘤向上壓迫「視交叉(optic chiasm)」，造成雙顳側偏盲。","detail":{"background":"腦下垂體位於蝶鞍、其正上方為「視交叉(optic chiasm)」。垂體腫瘤(如泌乳素瘤)向上生長最易壓迫視交叉中央交叉的「鼻側視網膜纖維」，造成典型的「雙顳側偏盲(bitemporal hemianopia，隧道視野)」。故受壓處為視交叉。","options":{"A":"錯誤。視丘在更上方深處。","B":"錯誤。眼神經(視神經)受壓較少見。","C":"正確。垂體瘤向上壓迫視交叉→雙顳側偏盲。","D":"錯誤。初級視覺皮質在枕葉，不受垂體瘤壓迫。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"112030-N1-4":{"quick":"正解(B)。支配上肢的脊髓區段為C5–T1(臂神經叢來源)。","detail":{"background":"臂神經叢(brachial plexus)由「C5–T1」脊神經前枝組成，支配上肢的運動與感覺(對應頸膨大C5–T1)。C1–C4組成頸神經叢(支配頸部與膈神經C3–5);T2–T12為胸神經(肋間)。故支配上肢者為C5–T1(與103030-15呼應)。","options":{"A":"錯誤。C1–C4為頸神經叢。","B":"正確。C5–T1組成臂神經叢支配上肢。","C":"錯誤。T2–T6為胸段肋間神經。","D":"錯誤。T7–T12為下胸段肋間神經。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"112030-N1-5":{"quick":"正解(D)。巴齊尼小體(Pacinian corpuscle，壓覺/振動覺)主要分布於真皮深層的「網狀層」(及皮下)。","detail":{"background":"皮膚感覺受器分布：①Meissner小體(觸覺)在真皮乳頭層;②Merkel盤(輕觸覺)在表皮基底層;③「Pacinian(環層)小體＝偵測深壓覺與振動，位於真皮『網狀層』深部與皮下組織」;④游離神經末梢(痛溫)遍布表皮真皮。故壓覺的巴齊尼小體主要在網狀層(深部)。本題雖屬皮膚感覺受器，歸於神經與感覺器官主題。","options":{"A":"錯誤。基底層為表皮深層(Merkel盤所在)。","B":"錯誤。棘狀層為表皮中層。","C":"錯誤。顆粒層為表皮淺層。","D":"正確。巴齊尼小體在真皮網狀層(深部)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"112030-N1-9":{"quick":"正解(B)。耳咽管連通「鼻咽」與「中耳」。","detail":{"background":"耳咽管(auditory tube)連通「鼻咽(nasopharynx)」與「中耳(middle ear)鼓室」，平衡鼓膜內外壓力(與105030-9同概念)。故連通鼻咽與中耳。深化：耳咽管(Eustachian管)連鼻咽與中耳,平時關閉、吞嚥打呵欠時開放以平衡鼓膜內外壓(故飛機升降耳悶可吞口水緩解)。小兒耳咽管短、平、寬,鼻咽感染易上行致中耳炎,是兒童中耳炎好發的解剖原因。","options":{"A":"錯誤。連中耳非內耳。","B":"正確。耳咽管連鼻咽與中耳。","C":"錯誤。咽端為鼻咽非口咽。","D":"錯誤。連中耳但咽端為鼻咽。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"112110-N1-10":{"quick":"正解(C)。軟脊膜外伸附著硬脊膜的鋸齒狀韌帶為「齒狀韌帶」。","detail":{"background":"「齒狀韌帶(denticulate ligament)」是由軟脊膜(pia mater)在脊髓兩側外伸、呈齒狀附著於硬脊膜，固定懸吊脊髓(與110110-7同概念)。項韌帶、黃韌帶屬脊柱韌帶;翼韌帶連齒突與枕骨髁。故此韌帶為齒狀韌帶。","options":{"A":"錯誤。項韌帶在頸後棘突間。","B":"錯誤。黃韌帶連椎弓板。","C":"正確。齒狀韌帶由軟脊膜外伸附著硬脊膜。","D":"錯誤。翼韌帶連齒突與枕骨髁。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"112180-N1-10":{"quick":"正解(A)。橫膈由「膈神經」支配，膈神經源自「頸神經叢(C3–C5)」。","detail":{"background":"橫膈(diaphragm)的運動由「膈神經(phrenic nerve)」支配，膈神經源自「頸神經叢的C3、C4、C5前枝(口訣 C3,4,5 keep the diaphragm alive)」。故支配橫膈的神經主要源自頸神經叢。臨床：高位頸髓(C3以上)損傷會癱瘓橫膈而呼吸衰竭。","options":{"A":"正確。膈神經源自頸神經叢(C3–5)。","B":"錯誤。臂神經叢(C5–T1)支配上肢。","C":"錯誤。腰神經叢支配下肢前內側。","D":"錯誤。薦神經叢支配下肢後側與會陰。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"112180-N1-3":{"quick":"正解(A)。三塊聽小骨位於「顳骨(temporal bone)」岩部的中耳腔內。","detail":{"background":"中耳的三塊聽小骨(錘骨、砧骨、鐙骨)位於「顳骨(temporal bone)岩部」內的中耳鼓室，把鼓膜的振動放大傳到內耳卵圓窗。顳骨岩部同時容納內耳與中耳。故聽小骨在顳骨內。深化：三塊聽小骨(錘骨→砧骨→鐙骨)位於顳骨岩部的中耳腔,把鼓膜振動依槓桿原理放大約20倍傳到內耳卵圓窗。鐙骨是人體最小的骨;耳硬化症使鐙骨固定於卵圓窗→傳導性聽損。","options":{"A":"正確。聽小骨位於顳骨(中耳腔)。","B":"錯誤。篩骨含篩竇。","C":"錯誤。蝶骨在顱底中央。","D":"錯誤。上頷骨含上頜竇。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"112180-N1-9":{"quick":"正解(C)。大腦導水管(cerebral aqueduct)連接第三與第四腦室。","detail":{"background":"CSF通路：側腦室→室間孔→第三腦室→「大腦導水管(中腦導水管, cerebral aqueduct of Sylvius)」→第四腦室。大腦導水管位於中腦、最狹窄，阻塞易致阻塞性水腦。室間孔連側腦室與第三腦室;正中孔讓第四腦室通蛛網膜下腔;中央管在脊髓。故連接第三與第四腦室者為大腦導水管(與106030-15互補)。","options":{"A":"錯誤。室間孔連側腦室與第三腦室。","B":"錯誤。正中孔通蛛網膜下腔。","C":"正確。大腦導水管連第三與第四腦室。","D":"錯誤。中央管在脊髓內。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"113100-N1-1":{"quick":"正解(B)。牟克耳氏細胞(Merkel cell)與神經末梢構成觸覺受器，傳遞表皮觸覺。","detail":{"background":"表皮內傳遞「觸覺」的是「牟克耳氏細胞(Merkel cell)」——位於表皮基底層，與感覺神經末梢形成「Merkel盤」偵測輕觸與壓力(精細觸覺、紋理)。蘭氏細胞主免疫(抗原呈現);巴齊尼小體在真皮深層偵測深壓振動(非表皮);角質細胞為結構細胞。故傳遞表皮觸覺者為Merkel細胞。","options":{"A":"錯誤。蘭氏細胞主免疫(抗原呈現)。","B":"正確。Merkel細胞傳表皮觸覺。","C":"錯誤。巴齊尼小體在真皮深層偵測深壓振動。","D":"錯誤。角質細胞為結構細胞。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"113100-N1-10":{"quick":"正解(B)。電性突觸(electrical synapse)是「裂隙結合(gap junction)」。","detail":{"background":"細胞連接：①緊密結合(tight junction)＝封閉細胞間隙(如血腦障壁、上皮);②「裂隙結合(gap junction)＝由連接子(connexon)形成的孔道，讓離子與小分子直接通過，是『電性突觸』與心肌/平滑肌間盤的快速傳導基礎」;③胞橋小體(desmosome)＝鈕扣狀連接抗拉(如表皮、心肌);④黏著帶＝連續帶狀黏附。故電性突觸即裂隙結合。","options":{"A":"錯誤。緊密結合封閉間隙。","B":"正確。電性突觸為裂隙結合(gap junction)。","C":"錯誤。胞橋小體抗機械拉力。","D":"錯誤。黏著帶為帶狀黏附。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"113100-N1-9":{"quick":"正解(A)。膈神經(phrenic nerve)源自「頸神經叢(C3–C5)」。","detail":{"background":"膈神經(phrenic nerve)由頸神經叢的C3–C5前枝組成，下行經縱膈支配橫膈的運動(及部分感覺)。故膈神經來自頸神經叢(與112180-10同概念，口訣 C3,4,5 keep the diaphragm alive)。","options":{"A":"正確。膈神經源自頸神經叢(C3–5)。","B":"錯誤。肋間神經支配肋間肌。","C":"錯誤。心臟神經叢為自主神經。","D":"錯誤。肺臟神經叢為自主神經。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"113180-N1-18":{"quick":"正解(A)。抗利尿激素(ADH)由下視丘「視上核(supraoptic nucleus)」合成。","detail":{"background":"下視丘的「視上核(supraoptic nucleus)」與「室旁核(paraventricular nucleus)」合成「抗利尿激素(ADH/血管加壓素)」與催產素，沿神經軸突運送到腦下垂體後葉(神經垂體)儲存與釋放。其中ADH主要由視上核合成。視丘前核、基底核、黑質與ADH合成無關。故ADH合成於下視丘視上核。","options":{"A":"正確。ADH由下視丘視上核合成。","B":"錯誤。視丘前核屬邊緣迴路。","C":"錯誤。基底核主運動調節。","D":"錯誤。黑質主多巴胺與運動。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"113180-N1-2":{"quick":"正解(B)。股二頭肌(膕旁肌)由坐骨神經支配。","detail":{"background":"坐骨神經(sciatic nerve, L4–S3)支配大腿後側「膕旁肌(股二頭肌、半腱肌、半膜肌)」與全部小腿、足部肌肉(經脛神經與腓總神經)。故受坐骨神經支配者為股二頭肌。股四頭肌由股神經支配;臀大肌由臀下神經;臀中肌由臀上神經。故答案為股二頭肌。","options":{"A":"錯誤。股四頭肌由股神經支配。","B":"正確。股二頭肌(膕旁肌)由坐骨神經支配。","C":"錯誤。臀大肌由臀下神經支配。","D":"錯誤。臀中肌由臀上神經支配。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"113180-N1-3":{"quick":"正解(A)。聲帶肌群由「迷走神經(X)」的分支(喉返神經、喉上神經)支配。","detail":{"background":"喉部肌肉(含聲帶肌群)由「迷走神經(vagus, CN X)」支配：除環甲肌由喉上神經外側支外，其餘喉內肌皆由「喉返神經(recurrent laryngeal nerve，迷走分支)」支配。故支配聲帶肌群的神經是迷走神經。臨床：甲狀腺手術易傷喉返神經致聲帶麻痺、聲音嘶啞。","options":{"A":"正確。聲帶肌群由迷走神經(喉返/喉上神經)支配。","B":"錯誤。舌咽神經主咽感覺與莖突咽肌。","C":"錯誤。舌下神經主舌肌。","D":"錯誤。頸橫神經為頸叢皮支(感覺)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"114030-N1-19":{"quick":"正解(D)。肱骨骨幹骨折最易傷及沿橈神經溝走行的「橈神經」。","detail":{"background":"肱骨體(骨幹)中段後面有「橈神經溝(radial groove)」，橈神經與肱深動脈沿此走行，故「肱骨體中段骨折」最易直接傷及橈神經→垂腕、手背橈側感覺異常。肱骨外科頸骨折易傷腋神經;肱骨內上髁傷尺神經;遠端髁上骨折可傷正中神經。故肱骨骨幹骨折傷橈神經(與102110-5、102030-15呼應)。","options":{"A":"錯誤。肌皮神經在前臂屈肌間。","B":"錯誤。正中神經傷見於髁上骨折。","C":"錯誤。尺神經傷見於內上髁/肘部。","D":"正確。肱骨骨幹骨折傷橈神經(橈神經溝)。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"114030-N1-20":{"quick":"正解(C)。微膠細胞(microglia)源自骨髓(單核-巨噬系統)，遷移入中樞神經系統。","detail":{"background":"大多數神經膠細胞源自神經外胚層(神經管/神經嵴)，唯獨「微膠細胞(microglia)」源自「骨髓的單核-巨噬細胞系(中胚層)」，在胚胎期遷移進入中樞神經系統，擔任中樞的「常駐巨噬細胞」——監測環境、吞噬病原與壞死碎片、參與免疫。星狀細胞、寡突膠細胞、室管膜細胞皆源自神經外胚層。故源自骨髓遷入CNS者為微膠細胞。","options":{"A":"錯誤。星狀細胞源自神經外胚層。","B":"錯誤。寡突膠細胞源自神經外胚層。","C":"正確。微膠細胞源自骨髓、遷入CNS。","D":"錯誤。室管膜細胞源自神經外胚層。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"114100-N1-10":{"quick":"正解(B)。舌咽神經(IX)攜帶副交感纖維刺激耳下腺(腮腺)分泌。","detail":{"background":"唾液腺分泌的副交感支配：腮腺(耳下腺)＝「舌咽神經(IX)」(經耳神經節);頷下腺與舌下腺＝顏面神經(VII)(經下頜下神經節)。故刺激腮腺分泌的神經是舌咽神經(與107030-15同概念)。深化：唾液腺副交感支配——腮腺(IX舌咽神經→耳神經節)、頷下腺與舌下腺(VII顏面神經→下頜下神經節)。故刺激腮腺分泌的是舌咽神經。乾燥症(Sjögren)或放療傷及唾液腺會口乾、增加齲齒風險。","options":{"A":"錯誤。顏面神經支配頷下、舌下腺。","B":"正確。舌咽神經刺激腮腺(耳下腺)分泌。","C":"錯誤。動眼神經支配瞳孔睫狀肌。","D":"錯誤。迷走神經支配胸腹內臟。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"114100-N1-15":{"quick":"正解(C)。視叉上核(suprachiasmatic nucleus, SCN)是生理時鐘，主要調控褪黑素分泌。","detail":{"background":"下視丘的「視叉上核(suprachiasmatic nucleus, SCN)」是人體的「主生理時鐘」，接收視網膜的光照訊息，調節晝夜節律，並透過交感路徑控制松果腺「褪黑素(melatonin)」的分泌(夜暗時增加)。視上核、室旁核合成ADH/催產素;外側膝狀核中繼視覺。故調控褪黑素分泌的腦區為視叉上核。","options":{"A":"錯誤。視上核合成ADH。","B":"錯誤。室旁核合成催產素/ADH。","C":"正確。視叉上核(SCN)為生理時鐘，調控褪黑素。","D":"錯誤。外側膝狀核中繼視覺。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"114100-N1-19":{"quick":"正解(C)。失語症與「維尼克氏(Wernicke)腦區」(顳葉)或Broca區受損相關。","detail":{"background":"語言中樞(多在左半球)：①Broca區(額葉下回)＝運動性語言區，受損致「表達性失語(說話不流暢、理解尚可)」;②「維尼克(Wernicke)區＝顳葉上回後部，感覺性(理解性)語言區，受損致『接受性失語(說話流暢但語意混亂、理解差)』」。故失語症與Wernicke區(或Broca區)受損最相關。視丘、海馬迴、前運動皮質與典型失語關聯較小。故答案為Wernicke腦區。","options":{"A":"錯誤。視丘為中繼，非典型語言中樞。","B":"錯誤。海馬迴主記憶。","C":"正確。Wernicke區受損致失語症。","D":"錯誤。前運動皮質主運動計畫。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"114170-N1-10":{"quick":"正解(A)。顏面神經(VII)攜帶副交感纖維支配淚腺與下頷下腺。","detail":{"background":"顏面神經(facial, CN VII)的副交感纖維分兩路：①經「翼腭神經節」支配『淚腺』與鼻腭黏膜腺;②經鼓索與「下頜下神經節」支配『下頜下腺與舌下腺』。故同時支配淚腺與下頷下腺的副交感纖維由顏面神經攜帶。舌咽神經(IX)支配腮腺;動眼神經支配瞳孔;舌下神經主舌肌運動。故答案為顏面神經。","options":{"A":"正確。顏面神經副交感支配淚腺與下頷下腺。","B":"錯誤。舌咽神經支配腮腺。","C":"錯誤。動眼神經支配瞳孔睫狀肌。","D":"錯誤。舌下神經主舌肌運動。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"115030-N1-20":{"quick":"正解(C)。形成髓鞘的是寡突膠細胞(中樞)與許旺氏細胞(周邊)。","detail":{"background":"形成髓鞘(myelin sheath)的神經膠細胞：①「寡突膠細胞(oligodendrocyte)」＝在『中樞神經系統』形成髓鞘(一個可包繞多條軸突);②「許旺氏細胞(Schwann cell)」＝在『周邊神經系統』形成髓鞘(一個只包一段軸突)並助再生。星狀膠細胞(血腦障壁)、微膠細胞(免疫吞噬)、衛星細胞(包圍節細胞體)不形成髓鞘。故形成髓鞘者為寡突膠細胞與許旺氏細胞。","options":{"A":"錯誤。星狀與微膠細胞不形成髓鞘。","B":"錯誤。星狀細胞不形成髓鞘。","C":"正確。寡突膠細胞(中樞)與許旺氏細胞(周邊)形成髓鞘。","D":"錯誤。衛星細胞不形成髓鞘。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.12-17 神經系統與感覺器官","實用人體解剖學（華杏）神經系統章","Moore《Clinically Oriented Anatomy》8e 頭頸與神經"]}},"101030-N1-10":{"quick":"正解(D)。心前靜脈直接注入右心房，不經冠狀竇。","detail":{"background":"心臟靜脈回流：大多數心壁靜脈血先匯入心臟後面冠狀溝的「冠狀竇(coronary sinus)」，再注入右心房。匯入冠狀竇者有心大靜脈、心中靜脈、心小靜脈、左心室後靜脈等。但「心前靜脈(anterior cardiac veins)」收集右心室前壁血，「直接開口於右心房」、不經冠狀竇;另有極小的心最小靜脈(Thebesian)直接入各腔。故不直接注入冠狀竇者為心前靜脈。","options":{"A":"錯誤。心大靜脈注入冠狀竇。","B":"錯誤。心中靜脈注入冠狀竇。","C":"錯誤。心小靜脈注入冠狀竇。","D":"正確。心前靜脈直接注入右心房。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"101030-N1-7":{"quick":"正解(B為「錯誤」者)。成人紅血球由「紅骨髓」生成，不是黃骨髓(黃骨髓主含脂肪)。","detail":{"background":"紅血球(RBC)：①血紅素(含鐵血基質)使血液呈紅色——正確;②「成人紅血球由『紅骨髓(red bone marrow)』生成」(主要在中軸骨)，黃骨髓是脂肪化、不造血，故(B)錯;③成熟紅血球無核、無胞器(以攜氧為主、靠無氧糖解供能)——正確;④老化紅血球(約120天)被脾、肝的巨噬細胞吞噬分解——正確。故錯誤者為(B)。","options":{"A":"正確。血紅素使血液呈紅色。","B":"錯誤(即為答案)。紅血球由紅骨髓生成，非黃骨髓。","C":"正確。成熟紅血球無核無胞器。","D":"正確。老化紅血球由脾、肝巨噬細胞破壞。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"101110-N1-2":{"quick":"正解(B)。主動脈弓只位於胸縱膈內。","detail":{"background":"本題問「只位於胸縱膈中」者：「主動脈弓(aortic arch)」全段位於上縱膈，是縱膈內專屬構造。氣管由頸部延伸入胸(不只在縱膈);迷走神經、交感神經鏈走行範圍跨頸胸腹、非只在縱膈。故僅位於胸縱膈者為主動脈弓。","options":{"A":"錯誤。氣管由頸延伸入胸，不只在縱膈。","B":"正確。主動脈弓只位於胸縱膈。","C":"錯誤。迷走神經跨頸胸腹。","D":"錯誤。交感神經鏈縱貫全身。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"101110-N1-8":{"quick":"正解(C)。血漿約占血液容積55%。","detail":{"background":"全血離心後分層：①「血漿(plasma)約占55%」(上層淡黃，含水、蛋白、電解質);②白血球與血小板形成的「血毛層(buffy coat)」<1%(中層);③紅血球約占45%＝「血比容(hematocrit)」(下層)。故血漿約占血液容積55%。","options":{"A":"錯誤。30%過低。","B":"錯誤。40%偏低。","C":"正確。血漿約占55%。","D":"錯誤。65%過高。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"102030-N1-11":{"quick":"正解(A)。腎動脈是腹主動脈的成對臟支(約L1–L2)。","detail":{"background":"腹主動脈的分支：不成對臟支(腹腔動脈幹、腸繫膜上動脈、腸繫膜下動脈)供應消化道;「成對臟支(腎動脈、腎上腺中動脈、性腺動脈)」供應泌尿生殖器。「腎動脈(renal artery)」於約L1–L2高度由腹主動脈兩側直接發出。故腎動脈是腹主動脈分支。","options":{"A":"正確。腎動脈源自腹主動脈。","B":"錯誤。腹腔動脈幹供肝胃脾。","C":"錯誤。腸繫膜上動脈供中腸。","D":"錯誤。腸繫膜下動脈供後腸。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"102030-N1-8":{"quick":"正解(A)。肺靜脈注入「左心房」，不注入右心房。","detail":{"background":"注入右心房者：上腔靜脈(收集上半身)、下腔靜脈(收集下半身)、冠狀竇(收集心壁靜脈血)。「肺靜脈(pulmonary veins)」帶含氧血回「左心房」，不入右心房。故不直接注入右心房者為肺靜脈。深化：注入右心房=上腔靜脈(上半身)、下腔靜脈(下半身)、冠狀竇(心壁血);肺靜脈(4條,帶含氧血)注入左心房。胎兒時另有卵圓孔讓右心房血分流左心房、繞過肺。","options":{"A":"正確(即為答案)。肺靜脈注入左心房，非右心房。","B":"錯誤。冠狀竇注入右心房。","C":"錯誤。上腔靜脈注入右心房。","D":"錯誤。下腔靜脈注入右心房。"},"sources":["Tortora & Derrickson《Principles of Anatomy and Physiology》15e, Ch.19-22 血液、心臟、血管與淋巴系統","實用人體解剖學（華杏）循環與淋巴系統章","Moore《Clinically Oriented Anatomy》8e 胸部與心臟"]}},"102030-N1-9":{"quick":"正解(D為「錯誤」者)。血小板壽命約7–10天，不是120天(120天是紅血球)。","detail":{"background":"血小板(platelet)：①源自骨髓「巨核細胞(megakaryocyte)」胞質碎裂而成——正確;②有細胞膜但「無細胞核」——選項僅問有膜，正確;③正常數量約15–40萬/μL——正確(題給25–40萬可接受);④「壽命約7–10天」，而非120天(120天是紅血球壽命)，故(D)錯。故錯誤者為(D)。","options":{"A":"正確。血小板源自巨核細胞。","B":"正確。血小板有細胞膜(但無核)。","C":"正確。正常約15–40萬/μL。","D":"錯誤(即為答案)。血小板壽命約7–10天，非120天。"},"sources":["
