r)","B":"上內側邊界是頭上斜肌(obliquus capitis superior)","C":"枕大神經(greater occipital nerve)從此三角的下緣穿出","D":"枕動脈(occipital artery)位於其內"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med1_113090-17","q_num":17,"roc_year":"113","exam_code":"113090","src":"民國113年","topic":"AN8背部脊柱與體壁總論","stem":"下列那一關節最不可能參與呼吸時胸廓的運動?","options":{"A":"劍突胸骨關節(xiphisternal joint)","B":"肋橫關節(costotransverse joint)","C":"柄胸關節(manubriosternal joint)","D":"胸肋關節(sternocostal joint)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_113090-30","q_num":30,"roc_year":"113","exam_code":"113090","src":"民國113年","topic":"AN8背部脊柱與體壁總論","stem":"下列那一條神經出現在枕下三角內(suboccipital triangle)?","options":{"A":"枕下神經(suboccipital nerve)","B":"枕大神經(greater occipital nerve)","C":"枕小神經(lesser occipital nerve)","D":"第三枕神經(3rd occipital nerve)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_114020-31","q_num":31,"roc_year":"114","exam_code":"114020","src":"民國114年","topic":"AN8背部脊柱與體壁總論","stem":"下列何者位於枕下三角(suboccipital triangle)內,並且支配枕下三角的肌肉群?","options":{"A":"第一頸神經的前支(anterior ramus of C1)","B":"第一頸神經的後支(posterior ramus of C1)","C":"枕大神經(greater occipital nerve)","D":"枕小神經(lesser occipital nerve)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_114090-15","q_num":15,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"AN8背部脊柱與體壁總論","stem":"關於肋骨與胸廓(thoracic cage)的連接方式,下列敘述何者最恰當?","options":{"A":"第一肋骨一般與第一胸椎(thoracic vertebra)以及第七頸椎(cervical vertebra)相接","B":"第九肋骨和胸骨(sternum),通常直接相連接","C":"第六肋骨與第六胸椎的下肋關節面(inferior costal facet)相連接","D":"第十一胸椎通常不含橫肋關節面(transverse costal facet),因此第十一肋骨只有其頭端(head of rib)和第十一胸椎相接"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_115020-04","q_num":4,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"AN8背部脊柱與體壁總論","stem":"杏仁核(amygdala)以何構造與隔區(septal area)相連結?","options":{"A":"終紋(stria terminalis)","B":"穹窿(fornix)","C":"前腦內側束(medial forebrain bundle)","D":"內側縱束(medial longitudinal fasciculus)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_115020-18","q_num":18,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"AN8背部脊柱與體壁總論","stem":"典型腰椎下關節突(inferior articular process)的關節面朝向:","options":{"A":"上方","B":"內側","C":"下方","D":"外側"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""}],E={"med1_106100-01":{"quick":"小腦齒狀核(dentate nucleus)是小腦深部核、屬運動協調系統,並非邊緣系統。","detail":{"background":"邊緣系統(limbic system)為環繞間腦與胼胝體的一圈古老皮質與皮質下構造,核心成員包括海馬結構(海馬本體、齒狀迴、下托)、杏仁核、扣帶迴、海馬旁迴、隔區(septal area)、乳頭體、視丘前核與穹窿(fornix),主司情緒、動機、學習與記憶、嗅覺及自律神經調節;其中海馬→穹窿→乳頭體→視丘前核→扣帶迴→海馬旁迴→海馬構成著名的Papez環路。下視丘雖屬間腦,功能上是邊緣系統與內分泌/自律輸出的樞紐故納入。小腦齒狀核則是小腦三對深部核(頂核、栓狀核+球狀核、齒狀核)中最大者,經上小腦腳投射至對側紅核與視丘腹外側核,屬運動協調迴路,與邊緣系統無關。","options":{"A":"杏仁體屬邊緣系統,主司恐懼與情緒記憶。","B":"小腦齒狀核為小腦深核,負責運動協調,不屬邊緣系統—正解。","C":"海馬回是邊緣系統記憶中樞。","D":"下視丘為邊緣系統的自律與內分泌輸出樞紐。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_106100-02":{"quick":"藍斑核(locus coeruleus)是中樞神經最大的正腎上腺素(norepinephrine)能核團。","detail":{"background":"藍斑核位於橋腦背側、第四腦室底的界溝外側,是腦內合成正腎上腺素(NE)的主要核團,其神經元軸突瀰漫投射至大腦皮質、海馬、杏仁核、小腦、腦幹與脊髓,調控警醒、注意力、睡眠-清醒週期、壓力反應與情緒。對照其他單胺/膽鹼核團有助記憶:中縫核(raphe nuclei)釋放血清張力素(serotonin);黑質緻密部與腹側被蓋區釋放多巴胺(dopamine);基底前腦Meynert基底核與腦幹腳橋核釋放乙醯膽鹼(acetylcholine)。NE系統功能低下與憂鬱、注意力缺失相關,過度活化與焦慮、戒斷症狀相關。","options":{"A":"血清張力素由中縫核釋放。","B":"乙醯膽鹼由基底前腦Meynert核與腦幹膽鹼核釋放。","C":"正腎上腺素正是藍斑核的主要傳導物質—正解。","D":"腎上腺素主要由腎上腺髓質與延腦少量C1-C3群釋放,非藍斑核主產物。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_106100-13":{"quick":"黑質(substantia nigra)位於中腦,不屬於紋狀體;紋狀體=尾核+豆狀核(殼+蒼白球)。","detail":{"background":"基底核(basal ganglia)為一群調控動作的皮質下核團。解剖名詞需分清:紋狀體(corpus striatum)= 尾狀核 + 豆狀核(lentiform nucleus,含殼putamen與蒼白球globus pallidus);新紋狀體(neostriatum/striatum)= 尾核 + 殼;舊紋狀體(paleostriatum)= 蒼白球。黑質與視丘下核(subthalamic nucleus)雖在功能迴路上與基底核密切相連(分別提供多巴胺輸入與間接路徑調控),但解剖位置上黑質位於中腦被蓋、視丘下核位於間腦,皆不屬於紋狀體。臨床上黑質緻密部退化導致帕金森氏症。","options":{"A":"尾狀核屬新紋狀體。","B":"殼部屬新紋狀體與豆狀核。","C":"黑質位於中腦,不屬紋狀體—正解。","D":"蒼白球屬豆狀核/舊紋狀體。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_106100-14":{"quick":"初級聽覺皮質的傳入主要來自視丘的內側膝狀體(medial geniculate body, MGB)。","detail":{"background":"聽覺傳導路徑:耳蝸毛細胞→螺旋神經節→耳蝸神經核(背、腹)→(部分交叉至對側)上橄欖核→外側蹄系(lateral lemniscus)→下丘(inferior colliculus)→內側膝狀體(MGB,屬視丘後部metathalamus)→經聽輻射(acoustic radiation,內囊後肢)→初級聽覺皮質(A1,顳葉Heschl橫迴, Brodmann 41/42)。可與視覺路徑對照記憶:視網膜→外側膝狀體(LGB)→V1。聽覺在腦幹層次有多次交叉,故為雙側代表,單側病灶不致全聾。","options":{"A":"內側膝狀體是A1的直接視丘中繼站—正解。","B":"上丘主司視覺定向反射,非聽覺主路。","C":"斜方體是聽覺早期交叉纖維,非皮質直接來源。","D":"丘腦枕(pulvinar)屬視覺/多模聯合,非聽覺中繼。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_106100-15":{"quick":"內側膝狀體屬視丘後部(metathalamus),不位於中腦。","detail":{"background":"中腦(midbrain)以大腦導水管為界分為頂蓋(tectum)、被蓋(tegmentum)與大腦腳。重要構造:頂蓋的上丘(視覺反射)與下丘(聽覺中繼);被蓋的紅核、黑質、動眼神經核(CN III)與滑車神經核(CN IV)、上小腦腳交叉(decussation of superior cerebellar peduncle);腹側的大腦腳含皮質脊髓/皮質橋腦纖維。內側膝狀體(聽覺)與外側膝狀體(視覺)合稱metathalamus,屬間腦視丘的後下方,並非中腦結構—此為常見混淆考點。","options":{"A":"上小腦腳交叉位於中腦下段被蓋。","B":"黑質為中腦被蓋構造。","C":"內側膝狀體屬視丘(metathalamus),不在中腦—正解。","D":"下丘為中腦頂蓋構造。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_107100-01":{"quick":"腹側脊髓小腦徑(ventral spinocerebellar tract)經上小腦腳入小腦,其餘三者經下小腦腳。","detail":{"background":"小腦三對腳的纖維歸屬是高頻考點。下小腦腳(inferior peduncle,繩狀體)主要為傳入:背側脊髓小腦徑、楔小腦徑(cuneocerebellar)、橄欖小腦徑、前庭小腦徑,並含傳出至前庭核。中小腦腳(middle peduncle)幾乎全為傳入,來自對側橋腦核的橋腦小腦纖維(pontocerebellar)。上小腦腳(superior peduncle)以傳出為主(齒狀核→對側紅核、視丘腹外側核),但也含一條重要傳入—腹側脊髓小腦徑。腹側脊髓小腦徑在脊髓交叉、上行至小腦再交叉回(雙交叉),傳遞下肢動作的整體性本體訊息。","options":{"A":"前庭小腦徑經下小腦腳。","B":"橄欖核小腦徑經下小腦腳。","C":"背側脊髓小腦徑經下小腦腳。","D":"腹側脊髓小腦徑經上小腦腳—正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_107100-02":{"quick":"三叉神經運動屬特殊內臟運動(鰓弓運動, SVE),不含一般體運動傳出(GSE)纖維。","detail":{"background":"三叉神經(CN V)為最大的腦神經,屬混合神經。感覺成分(一般體感覺GSA)經三個感覺核:中腦核(本體感覺,如咀嚼肌肌梭、牙周)、主感覺核(觸壓辨識)、脊髓核(痛溫覺,延伸至上頸髓);這些核分布於中腦、橋腦與延腦。運動成分由橋腦的三叉運動核發出,屬特殊內臟運動(SVE/branchiomotor),支配第一鰓弓衍生肌:咀嚼肌、二腹肌前腹、下頜舌骨肌、鼓膜張肌與腭帆張肌。一般體運動(GSE)是支配肌節衍生肌的動眼、滑車、外展與舌下神經才有,三叉神經並無。三叉的分支(V2、V3)常藉行(piggyback)其他腦神經的副交感節後纖維至腺體(如lingual帶chorda tympani、auriculotemporal帶耳神經節纖維)。","options":{"A":"三叉運動為SVE鰓弓運動,並非一般體運動傳出GSE—敘述錯誤,為正解。","B":"其分支確實攜帶(藉行)副交感纖維至腺體,正確。","C":"含本體感覺纖維,中腦核司之,正確。","D":"三叉神經核分布延腦、橋腦、中腦,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_107100-13":{"quick":"背側脊髓小腦徑位於脊髓的外側索(lateral funiculus),不在背側索。","detail":{"background":"背側(後)脊髓小腦徑由Clarke核(nucleus dorsalis/thoracicus,位於脊髓C8–L2/3後角基部)發出,纖維不交叉,於同側脊髓外側索的背外側緣上行,經下小腦腳進入同側小腦,傳遞下肢與軀幹的無意識本體感覺。背側索(dorsal funiculus)走的是另一系統—薄束與楔束(意識性本體與精細觸覺,上行至延腦薄/楔核再交叉)。考點在於辨明同一本體感覺訊息分流為「意識(背側索-內側蹄系)」與「無意識(脊髓小腦徑)」兩路,且脊髓小腦徑走外側索而非背側索。","options":{"A":"經下小腦腳入小腦,正確。","B":"傳入脊髓小腦(spinocerebellum),正確。","C":"位於背側索—錯誤,應為外側索,為正解。","D":"不交叉,傳入同側小腦,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_107100-14":{"quick":"內側膝狀體投射至「同側」初級聽覺皮質,並非雙側。","detail":{"background":"聽覺路徑的雙側性發生在腦幹層次:耳蝸核之後,纖維經斜方體與外側蹄系多次交叉,使上橄欖核、下丘、內側膝狀體皆同時含左右兩耳訊息,因此一側聽覺中樞受損不致造成單耳全聾(臨床定位意義)。然而最末段—內側膝狀體至初級聽覺皮質(經聽輻射)—為同側投射;故「左側MGB的訊息可傳入左右兩側A1」的敘述錯誤。上橄欖核參與聲源定位(時間差/強度差),屬聽覺路徑一環。","options":{"A":"A1位於顳葉(Heschl橫迴),正確。","B":"上橄欖核參與聽覺(聲源定位),正確。","C":"右內耳訊息因低位交叉可達雙側MGB,正確。","D":"MGB→A1為同側投射,非雙側—敘述錯誤,為正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_107100-16":{"quick":"海馬結構的主要傳出纖維匯集形成穹窿(fornix)。","detail":{"background":"海馬結構(hippocampal formation,含齒狀迴、海馬本體CA1–CA4、下托subiculum)的主要傳出由下托與海馬發出,軸突匯集為傘(fimbria)→腳(crus)→穹窿體→穹窿柱,終止於乳頭體(再經乳頭丘腦束至視丘前核)與隔區、視丘前核;此即Papez環路(海馬→穹窿→乳頭體→視丘前核→扣帶迴→海馬旁迴→海馬),與情節記憶形成密切相關,雙側穹窿或乳頭體受損(如Wernicke-Korsakoff)導致順向失憶。","options":{"A":"穹窿是海馬主要傳出—正解。","B":"胼胝體連結兩大腦半球新皮質,非海馬傳出。","C":"終紋是杏仁核的主要傳出。","D":"丘腦髓紋承載隔區→韁核(habenula)的纖維。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108030-01":{"quick":"背側脊髓小腦徑不交叉(uncrossed),由下小腦腳進入「同側」小腦。","detail":{"background":"背側脊髓小腦徑起自Clarke核,纖維於同側外側索上行,不交叉,經下小腦腳入同側小腦—故「左右交叉後進入」的敘述錯誤。相對地,腹側脊髓小腦徑在脊髓先交叉、入小腦前再交叉回(雙交叉,淨效應仍傳遞同側肢體訊息),且經上小腦腳。小腦腳纖維歸屬:下腳=多數脊髓/前庭/橄欖傳入;中腳=對側橋腦核纖維;上腳=齒狀核傳出+腹側脊髓小腦徑傳入。","options":{"A":"DSCT起自Clarke核(nucleus dorsalis),正確。","B":"稱其左右交叉後入小腦—錯誤,DSCT不交叉、入同側小腦,為正解。","C":"上小腦腳含進出小腦纖維,正確。","D":"中小腦腳含對側橋腦核發出的纖維,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108030-12":{"quick":"齒狀迴、穹窿、乳頭體同屬海馬-Papez記憶環路;杏仁核主司情緒,與此記憶環路最不相關。","detail":{"background":"本題在比較四構造與邊緣系統(特指海馬記憶環路/Papez環路)的關聯。齒狀迴是海馬結構的一部分、穹窿是海馬主要傳出、乳頭體是穹窿的終點並續接視丘前核,三者皆為Papez記憶環路的直接組成。杏仁核雖然也屬廣義邊緣系統,但其核心功能在情緒(尤其恐懼)、情緒記憶調節與自律反應,並非Papez記憶環路的構成環節,主要傳出為終紋與腹側杏仁傳出路徑而非穹窿;故在此比較中與(記憶性)邊緣環路最不相關。","options":{"A":"齒狀迴為海馬結構一部分,屬記憶環路。","B":"穹窿為海馬主要傳出,屬Papez環路。","C":"乳頭體為Papez環路節點(接視丘前核)。","D":"杏仁核主司情緒、不在Papez記憶環路—為正解(最不相關)。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108030-13":{"quick":"視覺聯合皮質位於枕葉(及顳、頂葉),不在額葉。","detail":{"background":"視覺路徑終於枕葉:初級視覺皮質(V1, Brodmann 17,距狀溝周圍)接受同側外側膝狀體(LGB)經視放射傳入;其周圍的視覺聯合皮質(BA18=V2、BA19=V3/V4/V5)負責顏色(V4)、形狀與動態(V5/MT)的高階分析,並分為背側流(枕→頂,空間/動作where)與腹側流(枕→顳,物體辨識what)。視覺聯合皮質位於枕葉並延伸至頂、顳葉,絕不在額葉;額葉的視覺相關區為額葉眼動區(FEF, BA8)主司隨意眼動,屬運動非視覺辨識。","options":{"A":"視覺聯合皮質位於額葉—錯誤,應在枕(顳頂)葉,為正解。","B":"初級視覺皮質位於枕葉,正確。","C":"視覺聯合皮質(V4)參與顏色辨別,正確。","D":"V1接受外側膝狀體傳入,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108030-15":{"quick":"前庭神經核主要聯繫小腦的絨球小結葉/頂核(前庭小腦),而非齒狀核。","detail":{"background":"前庭神經核(上、外、內、下四核)位於橋腦-延腦交界第四腦室底,功能在維持平衡與凝視穩定。其聯繫:發出前庭脊髓徑(外側核→同側伸肌張力抗重力)、纖維併入內側縱束(MLF)以協調前庭眼球反射(VOR),並與小腦的絨球小結葉(flocculonodular lobe,即前庭小腦archicerebellum)及頂核往返。齒狀核屬新小腦(neocerebellum),處理隨意動作的計畫與協調,主要與大腦皮質經橋腦核往返,並非前庭核的主要聯繫對象—此為錯誤敘述。","options":{"A":"發出前庭脊髓徑,正確。","B":"部分纖維併入內側縱束(司VOR),正確。","C":"稱主要與齒狀核相連—錯誤,應為絨球小結葉/頂核,為正解。","D":"參與前庭眼球反射,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108030-16":{"quick":"海馬最主要的傳入來自內鼻皮質(entorhinal cortex),經穿質路徑(perforant path)。","detail":{"background":"海馬迴路的訊息入口在內鼻皮質(entorhinal cortex, BA28):大量聯合皮質訊息先匯入內鼻皮質,再經穿質路徑(perforant path)投射至齒狀迴顆粒細胞→苔狀纖維至CA3→Schaffer側支至CA1→下托→經穹窿傳出,並回送內鼻皮質,構成記憶處理的三突觸迴路。故內鼻皮質是海馬最主要的傳入來源。扣帶迴、杏仁核雖與海馬有聯繫,但非最主要傳入;韁核屬上視丘的邊緣-中腦中繼,與海馬無直接主要傳入關係。","options":{"A":"內鼻皮質經穿質路徑為海馬主要傳入—正解。","B":"扣帶迴屬Papez環路下游,非主要傳入。","C":"杏仁核與海馬有聯繫但非最主要傳入。","D":"韁核與海馬無直接主要傳入。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108030-31":{"quick":"脊髓前動脈與前交通動脈皆為單一不成對的構造。","detail":{"background":"腦與脊髓血管的成對/單一須分清。脊髓供應:脊髓前動脈為「單一」(由兩側椎動脈分支於延腦前匯合成一條,走前正中裂);脊髓後動脈為「成對」(左右各一,走後外側溝)。大腦動脈環(Willis環):前交通動脈為「單一」(連接左右大腦前動脈);後交通動脈為「成對」(左右各一,連接頸內動脈與大腦後動脈)。故同屬單一者為脊髓前動脈與前交通動脈。臨床上前交通動脈是腦動脈瘤好發處。","options":{"A":"脊髓前動脈(單一)+前交通動脈(單一)—皆不成對,正解。","B":"脊髓後動脈與後交通動脈皆為成對。","C":"後交通動脈為成對,組合錯誤。","D":"脊髓後動脈為成對,組合錯誤。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108100-01":{"quick":"前庭神經核屬前庭小腦聯繫,與新小腦(橋腦小腦)皮質無直接聯繫。","detail":{"background":"依種系發生小腦分三部:前庭小腦(archicerebellum,絨球小結葉)與前庭核往返;脊髓小腦(paleocerebellum,蚓部與旁蚓)接受脊髓本體訊息;新小腦(neocerebellum/pontocerebellum,外側半球)主司隨意動作的協調與計畫。新小腦皮質的主要聯繫:傳入來自對側橋腦核(由大腦皮質→橋腦核→中小腦腳,即苔狀纖維)與下橄欖核(攀緣纖維);傳出經齒狀核→上小腦腳→對側紅核/視丘→大腦運動皮質。前庭神經核屬前庭小腦系統,不與新小腦皮質直接聯繫。","options":{"A":"橋腦核經中小腦腳投射至新小腦,有聯繫。","B":"齒狀核是新小腦的傳出深核,有聯繫。","C":"下橄欖核發攀緣纖維至小腦,有聯繫。","D":"前庭神經核屬前庭小腦,與新小腦皮質無直接聯繫—正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108100-11":{"quick":"齒狀核-紅核-丘腦徑經由上小腦腳(superior cerebellar peduncle)離開小腦。","detail":{"background":"新小腦的傳出路徑:小腦皮質→齒狀核→上小腦腳(superior cerebellar peduncle)→於中腦下段交叉→終於對側紅核(部分)與視丘腹外側核(VL),再投射至大腦初級運動皮質,形成齒狀-紅核-丘腦徑(dento-rubro-thalamic tract),負責隨意動作的協調與時序。上小腦腳是小腦最主要的傳出通道。中小腦腳(全為橋腦核傳入)、下小腦腳/繩狀體(脊髓、前庭、橄欖傳入為主)皆非此傳出徑路。","options":{"A":"上小腦腳是此傳出徑的通道—正解。","B":"中小腦腳載對側橋腦核傳入纖維。","C":"下小腦腳以傳入為主。","D":"繩狀體即下小腦腳,非此傳出路。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108100-12":{"quick":"外側皮質脊髓徑走於脊髓外側索(lateral funiculus)。","detail":{"background":"脊髓白質依位置分背側索、外側索、前側索三部,各含特定徑路。外側索(lateral funiculus)含:外側皮質脊髓徑(隨意運動,延腦錐體交叉後下行)、外側脊髓視丘徑(痛溫)、背側與腹側脊髓小腦徑、紅核脊髓徑。背柱-內側蹄系系統(精細觸覺/本體)走背側索(薄束、楔束)。前庭脊髓徑與四疊體脊髓徑走前側索。故外側索內的是外側皮質脊髓徑。臨床:外側索病灶(如脊髓半切)造成同側錐體束徵與對側痛溫喪失。","options":{"A":"背柱內側蹄系走背側索,非外側索。","B":"外側皮質脊髓徑走外側索—正解。","C":"前庭脊髓徑走前側索。","D":"四疊體脊髓徑走前側索。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108100-13":{"quick":"精細觸覺與本體感覺由背柱-內側蹄系系統傳導。","detail":{"background":"軀體感覺兩大上行系統須分清:背柱-內側蹄系系統傳遞精細(辨識性)觸覺、振動覺與意識性本體感覺—一級神經元軸突上行同側背側索(下肢薄束、上肢楔束)→延腦薄/楔核換元→內弓狀纖維交叉成內側蹄系→視丘VPL→中央後迴。前外側系統(脊髓視丘徑)傳遞痛、溫與粗略觸覺,在脊髓即交叉。脊髓小腦徑傳無意識本體至小腦;脊髓網狀徑與疼痛/警醒相關。故精細觸覺=背柱-內側蹄系。","options":{"A":"脊髓網狀徑與警醒/疼痛調節相關,非精細觸覺。","B":"背側脊髓小腦徑傳無意識本體至小腦。","C":"背柱-內側蹄系傳精細觸覺—正解。","D":"前外側系統傳痛溫與粗觸。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108100-15":{"quick":"Brodmann area 4(初級運動皮質)位於「前」中央迴(precentral gyrus),非後中央迴。","detail":{"background":"Brodmann area 4 為初級運動皮質,位於額葉的前中央迴(precentral gyrus),沿中央溝前緣;特徵為含巨大的貝茲細胞(Betz cell,第V層錐體細胞),是皮質脊髓徑(錐體束)的主要起源之一,並接受視丘腹外側核(VL,中繼小腦與基底核訊息)與腹後核的傳入,構成運動指令輸出。後中央迴(postcentral gyrus, BA 3-1-2)是初級體感覺皮質,接受VPL/VPM傳入,與BA4在功能與位置上相對。","options":{"A":"發出皮質脊髓徑,正確。","B":"含貝茲細胞,正確。","C":"接受視丘VL核傳入,正確。","D":"稱位於後中央迴—錯誤,BA4在前中央迴,為正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_108100-18":{"quick":"乙狀竇(sigmoid sinus)的血液經頸靜脈孔直接注入內頸靜脈。","detail":{"background":"硬腦膜靜脈竇的引流終點:上矢狀竇與直竇於竇匯(confluence of sinuses)匯合→左右橫竇→乙狀竇(呈S形下行至顳骨岩部後方)→經頸靜脈孔出顱,直接續為內頸靜脈上球。故直接注入內頸靜脈者為乙狀竇。上岩竇引流海綿竇至橫竇/乙狀竇交界;枕竇引流至竇匯;橫竇引流至乙狀竇(間接)。記憶順序:矢狀/直竇→竇匯→橫竇→乙狀竇→內頸靜脈。","options":{"A":"乙狀竇經頸靜脈孔直接注入內頸靜脈—正解。","B":"上岩竇引流海綿竇至橫竇/乙狀竇交界,非直接入IJV。","C":"橫竇先注入乙狀竇,非直接入IJV。","D":"枕竇引流至竇匯。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_109020-01":{"quick":"內囊後支主要由前脈絡叢動脈(anterior choroidal artery)供應。","detail":{"background":"內囊血供是定位中風的重要考點。前脈絡叢動脈(頸內動脈分支)供應內囊後支(posterior limb)、膝部下段、視放射起始與蒼白球內側,故其阻塞造成對側偏癱、偏身感覺喪失與同向偏盲(三偏)。內囊前支與膝部上段多由內側豆紋動脈(MCA/ACA近端)供應;後支上部也接受外側豆紋動脈(lenticulostriate)。選項中專責後支者為前脈絡叢動脈。","options":{"A":"前大腦動脈主供內側面與內囊前上部。","B":"後交通動脈供視丘與部分腦幹,非內囊後支主供。","C":"丘腦穿通動脈供視丘。","D":"前脈絡叢動脈供內囊後支—正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_109020-02":{"quick":"內側縱束(MLF)連接前庭神經核與支配眼球運動的腦神經核。","detail":{"background":"內側縱束(medial longitudinal fasciculus, MLF)是腦幹背側近中線的一條重要聯絡束,連接前庭神經核與動眼(III)、滑車(IV)、外展(VI)神經核以及頸髓,是前庭眼球反射(VOR)與雙眼共軛凝視(尤其水平凝視:外展核旁PPRF→經MLF至對側動眼核內直肌部)的解剖基礎。MLF病灶造成核間性眼肌麻痺(INO,患側內收受限、對側外展眼震),常見於多發性硬化。中央被蓋徑與味覺/紅核-下橄欖相關;內側前腦束屬邊緣-下視丘。","options":{"A":"前庭小腦纖維連前庭核與小腦,非眼動核。","B":"中央被蓋徑連紅核與下橄欖核。","C":"內側縱束連前庭核與眼動神經核—正解。","D":"內側前腦束屬邊緣系統-下視丘路徑。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_109020-14":{"quick":"間接迴路同樣受黑質多巴胺調控(D2受體抑制間接路徑),故「不受調控」為錯誤。","detail":{"background":"基底核運動迴路有直接與間接兩路,皆受黑質緻密部(SNc)多巴胺調控但方向相反:直接路徑(紋狀體→蒼白球內節/黑質網狀部→視丘)經D1受體被多巴胺「興奮」,淨效果去抑制視丘、促進動作;間接路徑(紋狀體→蒼白球外節→視丘下核→GPi)經D2受體被多巴胺「抑制」,同樣淨效果促進動作。視丘腹前核(VA)與腹外側核是兩路共同的視丘中繼。帕金森氏症因SNc退化、多巴胺不足,使直接路徑減弱、間接路徑過強→運動遲緩。故稱間接路徑不受黑質調控為錯誤。","options":{"A":"黑質(SNc)多巴胺投射至殼部,正確。","B":"視丘腹前核參與兩路的視丘中繼,正確。","C":"黑質經D1興奮直接路徑,正確。","D":"稱間接路徑不受黑質調控—錯誤(D2受抑制),為正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_109020-17":{"quick":"直接迴路不經過丘腦下核(視丘下核);視丘下核只在間接迴路。","detail":{"background":"基底核運動迴路:皮質→紋狀體→(直接或間接)→輸出核GPi/SNr→視丘(VA/VL)→回皮質運動區。直接路徑:紋狀體經D1直接抑制GPi/SNr,去抑制視丘→促進動作,途中不經視丘下核。間接路徑:紋狀體→蒼白球外節(GPe)→視丘下核(subthalamic nucleus)→GPi,經此額外迴路抑制視丘→抑制動作。故視丘下核專屬間接路徑;直接路徑會經過運動皮質(起訖)、紋狀體、蒼白球(GPi)、視丘,但不經視丘下核。視丘下核病灶造成對側偏側投擲症(hemiballismus)。","options":{"A":"直接路徑經視丘(VA/VL)中繼,有經過。","B":"視丘下核僅屬間接路徑—直接路徑不經過,為正解。","C":"運動皮質為迴路起訖,有經過。","D":"蒼白球(GPi)為直接路徑輸出核,有經過。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_109100-01":{"quick":"人類紅核脊髓徑為退化路徑,主要影響「上肢」屈肌張力,稱支配上下肢屈肌為錯誤。","detail":{"background":"脊髓下行運動徑各有分工:外側系統(外側皮質脊髓徑、紅核脊髓徑)控制遠端肢體精細動作;內側系統(前庭脊髓徑、網狀脊髓徑、四疊體脊髓徑、腹側皮質脊髓徑)控制軸向與近端肌、姿勢平衡。前庭脊髓徑(外側核)興奮同側抗重力伸肌。網狀脊髓徑接受廣泛傳入、調控自主姿勢與運動起始。紅核脊髓徑在四足動物促進屈肌張力,但在人類已高度退化、纖維稀少且主要影響上肢屈肌,故稱其「支配上下肢屈肌」並不正確。腹側皮質脊髓徑(未交叉,於前索)主控軸向/軀幹肌。","options":{"A":"前庭脊髓徑興奮伸肌(抗重力),正確。","B":"網狀脊髓徑調控運動,正確。","C":"稱紅核脊髓徑支配上下肢屈肌—錯誤,人類退化且主要影響上肢,為正解。","D":"腹側皮質脊髓徑主控軀幹肌,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_109100-14":{"quick":"胼胝體主要由大腦前動脈的胼周動脈(pericallosal artery)供應。","detail":{"background":"胼胝體是連結兩大腦半球的最大白質連合,其血供主要來自大腦前動脈(ACA)系統:ACA發出胼周動脈(pericallosal a.)沿胼胝體上方走行、並發胼緣動脈,供應胼胝體大部(體、膝、嘴);胼胝體壓部(splenium)另接受大腦後動脈分支。臨床:ACA阻塞造成對側下肢為主的偏癱與胼胝體失連結症狀。大腦中動脈主供外側面,前脈絡叢與豆紋動脈供深部基底核/內囊,皆非胼胝體主供。","options":{"A":"大腦前動脈(胼周動脈)為胼胝體主供—正解。","B":"大腦中動脈供大腦外側面。","C":"前脈絡叢動脈供內囊後支等深部。","D":"豆紋動脈供基底核與內囊。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_109100-15":{"quick":"脊髓視丘徑的二級神經元軸突在腹側白質聯合(ventral white commissure)交叉。","detail":{"background":"痛溫覺(前外側系統/脊髓視丘徑)路徑:背根神經節一級神經元入背角換元(於後角邊緣區與膠狀質),二級神經元軸突上行1–2節後經腹側白質聯合(ventral white commissure)交叉至對側,於前外側索上行形成脊髓視丘徑→視丘VPL→中央後迴。此「上升後才交叉、且在腹側白質聯合交叉」是脊髓半切(Brown-Séquard)時痛溫喪失在「對側、且病灶下1–2節以下」的解剖基礎。背側脊髓小腦徑不交叉;網狀脊髓徑、紅核脊髓徑為下行運動徑、不經此聯合交叉。","options":{"A":"脊髓視丘徑經腹側白質聯合交叉—正解。","B":"背側脊髓小腦徑不交叉。","C":"網狀脊髓徑為下行運動徑。","D":"紅核脊髓徑為下行運動徑。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_109100-17":{"quick":"孤立束核是「感覺」核(味覺+一般內臟感覺),不含副交感節前神經元。","detail":{"background":"孤立束核(nucleus of the solitary tract, NTS)位於延腦,是內臟感覺的主要中繼核:其吻側部接受味覺(經CN VII、IX、X),尾側部接受一般內臟感覺(來自心血管、呼吸、消化道的壓力/化學/牽張訊息,經IX、X),參與味覺傳遞與心血管/呼吸反射(如壓力反射、化學反射)。它是純感覺核,並不含副交感節前神經元;延腦中含副交感節前神經元的是迷走神經背運動核(dorsal motor nucleus of vagus)與上/下涎核(salivatory nuclei)。","options":{"A":"接受味覺感覺訊息,正確。","B":"接受一般內臟感覺,正確。","C":"稱含副交感節前神經元—錯誤,那是迷走背運動核/涎核,孤立束核為感覺核,為正解。","D":"位於延腦,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_109100-18":{"quick":"初級視覺皮質(距狀溝)由大腦後動脈(posterior cerebral artery)供應。","detail":{"background":"初級視覺皮質(V1)位於枕葉內側距狀溝(calcarine sulcus)兩側,其血供主要來自大腦後動脈(PCA)的距狀動脈;故PCA阻塞造成對側同向偏盲,常伴黃斑迴避(macular sparing,因枕極可有大腦中動脈側支供應)。大腦前動脈供內側面前部與胼胝體,大腦中動脈供外側面(含視放射部分),後交通動脈連接前後循環、供視丘下部等,皆非V1主供。","options":{"A":"大腦後動脈供初級視覺皮質—正解。","B":"大腦前動脈供額頂內側面。","C":"大腦中動脈供大腦外側面。","D":"後交通動脈連接前後循環,非V1主供。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_110020-01":{"quick":"內側延腦症候群:對側肢體無力(錐體)+同側舌肌無力(CN XII)+對側本體覺喪失(內側蹄系)。","detail":{"background":"內側延腦症候群(medial medullary syndrome,常因脊髓前動脈或椎動脈分支阻塞)損及延腦內側三構造:錐體(corticospinal,交叉於下方)→對側肢體上運動神經元無力;內側蹄系→對側精細觸覺與本體覺喪失;舌下神經(CN XII)核或纖維→同側舌肌下運動神經元無力(伸舌偏向患側)。故右側病灶→左側(對側)肢體無力+右側(同側)舌肌無力。對照外側延腦症候群(Wallenberg)則為同側面/對側身痛溫、吞嚥困難、Horner、眩暈等,不影響錐體。","options":{"A":"稱左側舌頭無力—錯,舌肌無力應在同側(右),不符。","B":"意向性震顫屬小腦病變,非內側延腦症候群。","C":"雙眼無法看向一側屬橋腦凝視中樞病變,不符。","D":"對側肢體無力+同側舌肌無力—正解,典型內側延腦症候群。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_110020-02":{"quick":"齒狀韌帶位於脊髓背根與腹根之間,由軟膜形成,共21對。","detail":{"background":"齒狀韌帶(denticulate ligament)是軟脊膜(pia mater)向兩側延伸、穿過蛛網膜下腔附著於硬脊膜的一系列齒狀突起,左右各約21對(對應頸髓至L1附近),位於脊神經背根與腹根之間,功能在將脊髓懸吊固定於硬膜囊中央、限制其移動,臨床上是脊髓手術定位前後根的標誌。其由軟膜(非硬膜)形成;脊髓末端的固定構造是終絲(filum terminale)附著於尾骨。","options":{"A":"稱由硬腦膜形成—錯,應為軟膜。","B":"附著尾骨者為終絲,非齒狀韌帶。","C":"位於背根與腹根之間—正解。","D":"約21對而非32對。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_110020-14":{"quick":"視交叉上核(suprachiasmatic nucleus, SCN)接受光線訊息、為晝夜節律的主時鐘。","detail":{"background":"視交叉上核(SCN)位於下視丘前部、視交叉正上方,是哺乳類晝夜節律的中樞起搏器(master clock)。視網膜的內在感光神經節細胞(含黑視素melanopsin)經視網膜-下視丘徑(retinohypothalamic tract)將光照訊息直接傳入SCN,使內生約24小時節律與外界明暗同步;SCN再經多突觸路徑調控松果體褪黑激素分泌(光抑制)、體溫、皮質醇與睡眠-清醒週期。其餘選項:視丘下核屬運動,藍斑核司警醒(NE),丘腦枕屬視覺聯合,皆非晝夜節律感光中樞。","options":{"A":"視丘下核屬基底核運動迴路。","B":"視交叉上核接受光線、調節晝夜節律—正解。","C":"藍斑核司警醒(正腎上腺素)。","D":"丘腦枕屬視覺聯合。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_110020-15":{"quick":"背柱(薄束/楔束)由背根神經節一級神經元軸突直接形成,非背角神經元。","detail":{"background":"脊髓灰質與徑路對應:腹角含下運動神經元(LMN)胞體;Clarke核(後角基部C8–L2)發出背側脊髓小腦徑;後角(尤其膠狀質、邊緣區)含痛覺調控的中間神經元並為脊髓視丘徑二級神經元起點。背柱(dorsal column,薄束gracilis/楔束cuneatus)是背根神經節一級感覺神經元的中樞突直接上行至延腦薄/楔核換元,並非由後角感覺神經元發出;後角投射神經元的軸突交叉後形成的是脊髓視丘徑。故D敘述錯誤。","options":{"A":"下運動神經元胞體在腹角,正確。","B":"Clarke核發出脊髓小腦徑,正確。","C":"後角中間神經元參與痛覺調控,正確。","D":"稱背角神經元發出形成背柱—錯誤,背柱為一級神經元軸突,為正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_110020-16":{"quick":"導水管周圍灰質(PAG)是內生性疼痛下行調控的關鍵中樞。","detail":{"background":"導水管周圍灰質(periaqueductal gray, PAG)圍繞中腦大腦導水管,是疼痛下行抑制系統的核心:接受前額葉、下視丘、杏仁核傳入,投射至延腦頭端腹內側區(rostral ventromedial medulla,含中縫大核)與藍斑,再經下行(血清張力素能、正腎上腺素能)纖維於脊髓後角抑制痛覺傳遞,並促進腦啡肽/腦內啡釋放;這是嗎啡類鎮痛與「壓力性鎮痛」的解剖基礎。內側縱束司眼動/前庭,PPRF司水平凝視,下橄欖核發攀緣纖維至小腦,皆與痛覺調控無關。","options":{"A":"導水管周圍灰質為痛覺下行調控中樞—正解。","B":"內側縱束司眼球協同運動。","C":"橋腦旁正中網狀結構(PPRF)司水平凝視。","D":"下橄欖核發攀緣纖維至小腦。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_111020-02":{"quick":"苔狀纖維與小腦顆粒層的顆粒細胞(於小腦小球)形成突觸。","detail":{"background":"小腦皮質三層由外而內為分子層、蒲金氏細胞層、顆粒層;兩種傳入纖維路徑不同:苔狀纖維(mossy fiber,來自橋腦核、脊髓、前庭等)終於顆粒層,與顆粒細胞樹突在「小腦小球(glomerulus)」形成突觸;顆粒細胞軸突上行至分子層分叉為平行纖維(parallel fiber),再與蒲金氏細胞樹突形成突觸(興奮)。攀緣纖維(climbing fiber,來自下橄欖核)則直接纏繞蒲金氏細胞樹突(強烈興奮)。蒲金氏細胞是小腦皮質唯一傳出,投射至深部核(抑制性, GABA)。","options":{"A":"分子層是平行纖維與蒲金氏樹突所在,非苔狀纖維終點。","B":"蒲金氏細胞層是輸出細胞胞體層。","C":"苔狀纖維與顆粒層顆粒細胞形成突觸—正解。","D":"並非分子層與蒲金氏層。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_111020-03":{"quick":"控制兩眼水平(外側)注視的皮質為額葉眼動區(frontal eye field, BA8)。","detail":{"background":"隨意性水平凝視由額葉眼動區(frontal eye field, FEF, Brodmann 8,位於額中迴後部、前中央迴前方)發動:一側FEF興奮使雙眼共軛轉向「對側」;其下行投射經橋腦旁正中網狀結構(PPRF)→同側外展核(支配同側外直肌)並經內側縱束至對側動眼核內直肌部,完成共軛水平眼動。臨床:一側FEF破壞性病灶(如中風)使雙眼偏向「病灶側」(凝視麻痺)。主要視覺區司視覺、運動輔助區與運動準備有關、主要運動區司對側肢體隨意動作,皆非隨意水平凝視中樞。","options":{"A":"主要運動區司對側肢體隨意動作。","B":"主要視覺區司視覺處理。","C":"運動輔助區與動作準備/序列有關。","D":"額葉眼動區控制隨意水平凝視—正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_111020-04":{"quick":"外側前庭脊髓徑興奮同側抗重力的伸肌、抑制屈肌。","detail":{"background":"外側前庭脊髓徑(lateral vestibulospinal tract)起自外側前庭核(Deiters核),不交叉、於同側前索全長下行,興奮性投射至同側軀幹與肢體的伸肌(抗重力肌)運動神經元並抑制屈肌,維持站立姿勢與平衡;當前庭受刺激或去大腦(中腦上下丘間橫斷)時此徑去抑制而活躍,形成去大腦僵直(伸肌張力過高)。網狀脊髓徑調控姿勢與運動起始(橋腦促伸肌、延腦抑伸肌);紅核脊髓徑(人類退化)偏促上肢屈肌;外側皮質脊髓徑司對側遠端隨意精細動作。","options":{"A":"外側前庭脊髓徑促同側伸肌、抑屈肌—正解。","B":"網狀脊髓徑作用較廣,非專一促伸抑屈。","C":"紅核脊髓徑偏促屈肌。","D":"外側皮質脊髓徑司隨意精細動作。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_111020-05":{"quick":"本體感覺由「粗」纖維傳遞,經背根「內側」部進入脊髓走背柱。","detail":{"background":"背根入脊髓時依纖維粗細分流:粗的有髓纖維(本體感覺Ia/Ib/II、辨識性觸覺)走背根「內側部(medial division)」,進入後直接上行背柱(薄束/楔束)或入後角;細的有髓Aδ與無髓C纖維(痛、溫、粗觸)走背根「外側部(lateral division)」,進入Lissauer束後終於後角邊緣與膠狀質,再經脊髓視丘徑交叉上行。故傳遞本體感覺者為粗纖維、經內側部進入,對應背柱-內側蹄系系統。","options":{"A":"粗纖維、經背根內側部進入—正解。","B":"粗纖維但稱外側部—錯,粗纖維走內側部。","C":"本體感覺非細纖維。","D":"方向與粗細皆不符。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_111020-06":{"quick":"豆狀核屬端腦(telencephalon)的基底核,不是間腦構造。","detail":{"background":"間腦(diencephalon)圍繞第三腦室,由四部組成:視丘(thalamus,感覺中繼)、下視丘(hypothalamus,自律與內分泌)、上視丘(epithalamus,含松果體與韁核)、底丘腦/視丘下部(subthalamus,含視丘下核)。豆狀核(lentiform nucleus,= 殼 + 蒼白球)屬端腦的基底核,經內囊與尾核相鄰但發生與位置上屬端腦,並非間腦。","options":{"A":"視丘屬間腦。","B":"松果體屬上視丘(間腦)。","C":"豆狀核屬端腦基底核,非間腦—正解。","D":"下視丘屬間腦。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_111100-01":{"quick":"延腦薄/楔核的二級纖維以內弓狀纖維交叉至對側,匯聚成內側蹄系。","detail":{"background":"背柱-內側蹄系系統的交叉點在延腦:一級神經元軸突上行背柱(薄束gracilis傳下肢、楔束cuneatus傳上肢)→延腦薄核/楔核換元→二級神經元軸突向腹內側彎行為「內弓狀纖維(internal arcuate fibers)」並於中線交叉(感覺交叉),交叉後在對側匯聚上行形成「內側蹄系(medial lemniscus)」,續經橋腦、中腦終於視丘VPL→中央後迴。脊髓蹄系=脊髓視丘徑於腦幹的延續;外側蹄系屬聽覺;錐體交叉為運動(皮質脊髓徑)交叉。","options":{"A":"內弓狀纖維交叉後形成內側蹄系—正解。","B":"脊髓蹄系源自脊髓視丘徑,非內弓狀纖維。","C":"外側蹄系屬聽覺路徑。","D":"錐體交叉屬運動徑交叉。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_111100-02":{"quick":"弓狀束(arcuate fasciculus)連結布羅卡氏區與沃尼克氏區。","detail":{"background":"語言區由弓狀束(arcuate fasciculus,屬上縱束的一部分)連結:沃尼克氏區(Wernicke area,顳上迴後部, BA22,語言理解)經弓狀束將訊息傳至布羅卡氏區(Broca area,額下迴後部, BA44/45,語言產生/構音計畫)。此弓狀束受損造成傳導性失語(conduction aphasia):理解與自發語言尚可,但複誦(repetition)明顯受損。內側縱束司眼動,背側縱束連下視丘與腦幹自律核,內側前腦束屬邊緣-下視丘,皆非語言連合。","options":{"A":"弓狀束連結布羅卡與沃尼克區—正解。","B":"內側縱束司眼球協同運動。","C":"背側縱束連下視丘與腦幹自律核。","D":"內側前腦束屬邊緣-下視丘路徑。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_111100-03":{"quick":"乳頭丘腦束主要投射至視丘的前核(anterior nuclei)。","detail":{"background":"乳頭體經乳頭丘腦束(mammillothalamic tract)投射至視丘前核(anterior nuclei),前核再投射至扣帶迴,構成Papez環路(海馬→穹窿→乳頭體→視丘前核→扣帶迴→海馬旁迴→海馬),與情節記憶相關。對照其他視丘核功能:腹前核(VA)/腹外核(VL)中繼基底核與小腦至運動皮質;腹後外側核(VPL)中繼身體的本體與痛溫觸;腹後內側核(VPM)中繼頭面感覺與味覺。","options":{"A":"腹前核中繼運動(基底核)訊息。","B":"視丘前核接受乳頭丘腦束—正解。","C":"腹後外側核中繼身體軀體感覺。","D":"腹後內側核中繼頭面感覺與味覺。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_111100-04":{"quick":"嗅覺是唯一不經視丘中繼、可直接傳入邊緣系統與嗅皮質的感覺。","detail":{"background":"絕大多數感覺(視、聽、味、軀體)都先經視丘特定核中繼再上行至大腦皮質;唯獨嗅覺例外:嗅球的僧帽細胞經嗅徑直接投射至梨狀皮質(初級嗅皮質)、杏仁核、內鼻皮質等邊緣構造,不先經視丘(雖之後可再經視丘背內側核至眶額皮質做進一步處理)。這種解剖特性也解釋嗅覺與情緒、記憶(邊緣系統)的緊密連結。視覺經外側膝狀體、聽覺經內側膝狀體、味覺經腹後內側核,皆需視丘中繼。","options":{"A":"嗅覺不經視丘、直接傳入邊緣系統—正解。","B":"視覺經外側膝狀體中繼。","C":"聽覺經內側膝狀體中繼。","D":"味覺經視丘腹後內側核中繼。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_112020-01":{"quick":"蓋膜中央徑(central tegmental tract)主要連結紅核與下橄欖核。","detail":{"background":"蓋膜中央徑(central tegmental tract)是腦幹被蓋區一條複合纖維束,其下行成分主要由紅核(尤其小細胞部)投射至同側下橄欖核(red nucleus→inferior olivary nucleus),下橄欖核再發攀緣纖維經下小腦腳至對側小腦皮質,構成「紅核-橄欖-小腦」運動學習迴路(Guillain-Mollaret三角的一臂);此徑亦含上行味覺纖維(孤立束核→視丘VPM)。三角受損可致顎肌陣攣(palatal myoclonus)。內側縱束連前庭與眼動核,與此不同。","options":{"A":"紅核與下橄欖核—正解。","B":"紅核與齒狀核間為齒狀-紅核-丘腦徑(經上小腦腳),非中央被蓋徑主成分。","C":"前庭與動眼核間為內側縱束。","D":"前庭與外旋核間為內側縱束。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_112020-03":{"quick":"源自前庭神經核、協調眼動與平衡的纖維束是內側縱束(MLF)。","detail":{"background":"前庭神經核發出多條纖維:前庭脊髓徑(平衡姿勢)與併入內側縱束(MLF)的纖維。內側縱束連結前庭核與動眼(III)、滑車(IV)、外展(VI)神經核及頸髓,是前庭眼球反射(VOR)與水平共軛凝視的解剖基礎,使頭部轉動時雙眼能反向協同移動以穩定凝視。背側縱束連下視丘與腦幹自律核;內側前腦束屬邊緣-下視丘;中央被蓋徑連紅核與下橄欖核,皆與前庭-眼動協調無關。","options":{"A":"內側縱束源自前庭核、協調眼動與平衡—正解。","B":"背側縱束連下視丘與自律核。","C":"內側前腦束屬邊緣-下視丘。","D":"中央被蓋徑連紅核與下橄欖核。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_112020-04":{"quick":"穹窿自海馬至乳頭體依序為:繖部→腳部→體部→柱部(2-4-1-3)。","detail":{"background":"穹窿(fornix)是海馬結構的主要傳出纖維束,從海馬向乳頭體依次為:繖部(fimbria,貼附海馬表面的纖維)→腳部(crura,左右各一,向後上彎曲,中段有海馬連合)→體部(body,左右合併沿第三腦室頂前行)→柱部(columns,向下轉折)→終於乳頭體(部分纖維至隔區與視丘前核)。故由海馬至乳頭體的順序為繖部(2)、腳部(4)、體部(1)、柱部(3)= 2413。","options":{"A":"2134順序不符。","B":"4123順序不符。","C":"2413(繖→腳→體→柱)—正解。","D":"4132順序不符。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_112020-06":{"quick":"內耳膜迷路由迷路動脈(labyrinthine artery)供應。","detail":{"background":"內耳膜迷路(含耳蝸與前庭器)的血供來自迷路動脈(labyrinthine/internal auditory artery),多為小腦前下動脈(AICA)的分支(少數直接來自基底動脈),經內聽道供應耳蝸與前庭;此動脈為終末動脈、無側支,阻塞造成突發性聽損與眩暈。枕動脈、中腦膜動脈屬頸外動脈系統供應頭皮/硬膜,後大腦動脈供枕葉,皆不供內耳膜迷路。","options":{"A":"枕動脈供頭皮後部。","B":"中腦膜動脈供硬腦膜。","C":"後大腦動脈供枕葉視覺皮質。","D":"迷路動脈供內耳膜迷路—正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_112020-29":{"quick":"齒狀韌帶由軟膜(pia mater)形成。","detail":{"background":"脊髓三層腦膜:硬膜(最外,堅韌)、蛛網膜(中層,下為蛛網膜下腔含腦脊髓液)、軟膜(緊貼脊髓表面)。齒狀韌帶(denticulate ligament)是軟膜在脊髓兩側、背根與腹根之間向外延伸的三角形齒狀突起,尖端穿過蛛網膜下腔附著於硬膜,左右各約21對,將脊髓懸吊固定於硬膜囊中央。其本質為軟膜,而非脊髓本體、硬膜或蛛網膜。","options":{"A":"非脊髓本體所形成。","B":"非硬膜。","C":"非蛛網膜。","D":"軟膜形成齒狀韌帶—正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113020-02":{"quick":"距狀溝(calcarine sulcus)位於大腦半球內側面,其兩側為初級視覺皮質。","detail":{"background":"初級視覺皮質(V1, BA17)位於枕葉內側面,沿距狀溝(calcarine sulcus)上下唇分布(故又稱距狀皮質),接受外側膝狀體經視放射的傳入,並具視網膜定位排列(上方視野對應下唇、黃斑對應枕極)。頂枕溝是距狀溝前上方、區分頂葉與枕葉的界溝。中央溝分隔額頂葉(前後為運動/感覺皮質),側腦溝(外側裂)分隔顳葉與額頂葉,皆非視覺皮質所在。","options":{"A":"中央溝分隔額頂葉(運動/感覺區)。","B":"側腦溝分隔顳葉。","C":"距狀溝位於內側面、兩側為初級視覺皮質—正解。","D":"頂枕溝為頂枕分界,非視覺皮質中心。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113020-03":{"quick":"(本題送分,一律給分)基底核傳出經視丘後,傳統觀念主要至運動輔助區/運動前區/扣帶運動區與前額葉,較少直接至主要運動區。","detail":{"background":"基底核運動迴路的傳出由GPi/SNr→視丘(VA/VL)→大腦皮質。傳統教科書認為其主要回饋至運動輔助區(SMA)、運動前區(premotor)、扣帶運動區與前額葉,以參與動作的選擇、起始與計畫;主要運動區(M1)較多接受小腦(經VL)的傳入。然而近代研究顯示基底核-視丘投射亦可達M1,故此題官方判定「送分、一律給分」。學習重點仍在:基底核迴路偏動作計畫/選擇,小腦迴路偏動作執行/協調,二者經視丘不同區回饋運動相關皮質。","options":{"A":"傳統認為較少直接至主要運動區(故為原訂答案);但近代有爭議—本題送分。","B":"扣帶運動區為基底核傳出標的之一。","C":"運動輔助區為基底核傳出主要標的。","D":"運動前區為基底核傳出標的之一。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113020-04":{"quick":"室旁核與視上核的神經纖維下行至腦下腺後葉釋放激素(催產素、抗利尿激素)。","detail":{"background":"下視丘與腦下腺後葉(神經垂體)為「神經分泌」關係:室旁核(paraventricular nucleus)與視上核(supraoptic nucleus)的大細胞神經元合成催產素(oxytocin)與抗利尿激素(ADH/vasopressin),其軸突經下視丘-垂體徑(視上-垂體徑)下行直接終止於後葉,激素由軸突末梢釋入血流。視交叉上核司晝夜節律、後核司體溫,皆非後葉激素來源。前葉(腺垂體)則由下視丘經門脈系統的釋放激素調控,屬不同機制。","options":{"A":"室旁核與視上核—正解,投射至後葉。","B":"視交叉上核司晝夜節律,非後葉激素來源。","C":"視交叉上核不投射至後葉。","D":"後核司體溫調節。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113020-05":{"quick":"Clarke背核位於後角「基部/中間帶內側」(胸髓-上腰髓),稱其位於背角處最不恰當。","detail":{"background":"脊髓灰質各核團定位:膠狀質(substantia gelatinosa, Rexed II層)位後角,參與痛覺閘門調控;前角含大型α運動神經元支配骨骼肌;中間外側柱(中間帶, T1–L2)含交感節前神經元。Clarke背核(nucleus dorsalis/thoracicus)位於後角「基部」靠近中間帶內側、僅見於C8–L2/3節段,發出背側脊髓小腦徑—其「與小腦脊髓路徑有關」正確,但「位於背角處」並不精確(應為後角基部/中間帶內側),故為最不恰當。","options":{"A":"膠狀質位後角、與痛覺有關,正確。","B":"稱Clarke背核位於背角處—最不恰當(實為後角基部/中間帶內側),為正解。","C":"大型運動神經元在前角支配骨骼肌,正確。","D":"交感節前神經元胞體在中間帶,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113020-13":{"quick":"翼點外傷後硬腦膜外血腫,典型為腦膜中動脈(middle meningeal artery)破裂。","detail":{"background":"翼點(pterion)是額、頂、顳、蝶四骨交會處,顱骨最薄,其內面正有腦膜中動脈前支通過。此處外傷骨折易撕裂腦膜中動脈,血液積在硬膜與顱骨之間形成硬腦膜外血腫(epidural hematoma),CT呈雙凸透鏡狀、不越骨縫;臨床典型有「清醒期(lucid interval)」後迅速惡化,屬神經外科急症。硬腦膜靜脈竇或橋靜脈撕裂多造成硬腦膜下血腫(新月形、越骨縫);前/後大腦動脈破裂多為蛛網膜下腔或腦實質出血。","options":{"A":"硬腦膜靜脈竇撕裂多致硬膜下出血。","B":"腦膜中動脈破裂致硬腦膜外血腫—正解。","C":"前大腦動脈出血多在前縱裂/腦實質。","D":"後大腦動脈出血多在枕部。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113090-01":{"quick":"水平(外側)凝視的啟動中樞為中線旁橋腦網狀結構(PPRF)。","detail":{"background":"水平共軛凝視迴路:中線旁橋腦網狀結構(PPRF)為水平凝視的「啟動中樞」,興奮同側外展神經核;外展核同時(1)支配同側外直肌使該眼外展,(2)經內側縱束(MLF)將訊號送至對側動眼神經核內直肌部使對側眼內收,達成雙眼共軛同向。故向右看時:右側PPRF→右外展核→右眼外直肌收縮+(經MLF)左眼內直肌收縮。動眼核僅司內直肌等;E-W核司瞳孔對光與調節(副交感),皆非水平凝視啟動中樞。","options":{"A":"動眼神經核支配內直肌等,非啟動中樞。","B":"外旋神經核是中繼/執行(含MLF轉送),啟動者為PPRF。","C":"中線旁橋腦網狀結構(PPRF)啟動水平凝視—正解。","D":"E-W核司瞳孔副交感。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113090-02":{"quick":"尾核與殼核神經組織相似,合稱紋狀體(striatum/neostriatum)。","detail":{"background":"基底核名詞:尾核(caudate)與殼核(putamen)發生同源、組織學相似(含中型多棘神經元、為主要傳入接收核),合稱新紋狀體(neostriatum)或一般所稱的紋狀體;兩者間以內囊纖維相隔但藉細胞橋相連。蒼白球(globus pallidus)組織不同(蒼白、為主要傳出核),與殼核合稱豆狀核(lentiform nucleus),屬舊紋狀體(paleostriatum)。故組織相似、同屬紋狀體者為尾核與殼核。","options":{"A":"尾核與殼核同屬紋狀體—正解。","B":"蒼白球屬舊紋狀體,與尾核組織不同。","C":"蒼白球與殼核合為豆狀核但組織不同。","D":"豆狀核含蒼白球,組織與紋狀體不同。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113090-03":{"quick":"小腦傳出經視丘(VL)後主要投射至主要運動區(primary motor area)。","detail":{"background":"小腦運動迴路:小腦皮質→齒狀核→上小腦腳交叉→對側視丘腹外側核(VL)→主要運動皮質(M1),回饋以協調隨意動作的力量、方向與時序(校正運動誤差)。此與基底核迴路(偏SMA/premotor,主動作計畫選擇)分工互補。小腦病變造成同側肢體協調不良(辨距不良、意向性震顫、輪替運動障礙)。扣帶運動區、運動輔助區、運動前區較屬基底核/前額葉迴路標的。","options":{"A":"小腦傳出經VL主要至主要運動區—正解。","B":"扣帶運動區偏基底核/邊緣迴路。","C":"運動輔助區偏基底核迴路。","D":"運動前區偏基底核迴路。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113090-04":{"quick":"杏仁核經終紋(stria terminalis)傳至下視丘。","detail":{"background":"杏仁核有兩條主要傳出至下視丘與隔區:終紋(stria terminalis,沿尾核弧形走行,與尾核伴行)與腹側杏仁傳出路徑(ventral amygdalofugal pathway)。終紋是最著名的杏仁核傳出束,投射至下視丘(尤其腹內側核)、隔區與終紋床核,參與情緒(恐懼/攻擊)、自律與內分泌反應的整合。穹窿是海馬傳出;內側前腦束貫穿下視丘外側連結前腦與腦幹;內側縱束司眼動,皆非杏仁核至下視丘的主要傳出。","options":{"A":"終紋是杏仁核至下視丘的主要傳出—正解。","B":"穹窿為海馬傳出。","C":"內側前腦束連前腦與腦幹(下視丘外側)。","D":"內側縱束司眼球協同運動。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113090-05":{"quick":"視丘前核與「邊緣系統/記憶」(Papez環路)有關,而非嗅覺。","detail":{"background":"視丘各核功能對應:外側膝狀體(LGB)中繼視覺、內側膝狀體(MGB)中繼聽覺、腹後外側核(VPL)中繼身體軀體感覺、腹後內側核(VPM)中繼頭面感覺與味覺、腹外側核(VL)/腹前核(VA)中繼小腦與基底核(錐體外系統)至運動皮質、視丘前核(anterior nucleus)接受乳頭丘腦束、投射扣帶迴屬Papez記憶環路。嗅覺則不經視丘中繼(直接入嗅皮質/邊緣)。故「前核與嗅覺有關」為錯誤。","options":{"A":"外膝狀體與視覺有關,正確。","B":"稱前核與嗅覺有關—錯誤,前核屬邊緣/記憶環路,為正解。","C":"腹外側核與錐體外運動系統有關,正確。","D":"腹後外側核與體感覺有關,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_113090-06":{"quick":"外側延腦症候群(Wallenberg)不影響錐體,故不會出現對側肢體無力。","detail":{"background":"後下小腦動脈(PICA)或椎動脈阻塞造成外側延腦症候群(Wallenberg syndrome),損及延腦外側構造:下小腦腳→同側小腦性共濟失調;脊髓三叉束/核→同側面部痛溫喪失;脊髓視丘徑→對側軀幹肢體痛溫喪失(交叉性感覺障礙);疑核(IX、X)→吞嚥困難、聲音嘶啞;前庭核→眩暈眼震;下行交感纖維→同側Horner症候群。因錐體位於延腦「內側」未受累,故「不會」出現肢體無力—此為與內側延腦症候群最大區別。","options":{"A":"小腦功能異常(同側共濟失調)會出現。","B":"對側肢體痛溫覺異常(脊髓視丘徑)會出現。","C":"吞嚥困難(疑核)會出現。","D":"對側肢體無力—不會出現(錐體在內側未受累),為正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_114020-03":{"quick":"殼核主要由大腦中動脈的豆紋動脈供應,並非前脈絡叢動脈。","detail":{"background":"前脈絡叢動脈(anterior choroidal artery)多由內頸動脈在後交通動脈遠端發出,供應範圍包括側腦室脈絡叢、內囊後支(及膝部、視放射起始)、視束、外側膝狀體、蒼白球內側與海馬等;其阻塞造成對側偏癱、偏身感覺喪失與同向偏盲(三偏)。殼核(putamen)則主要由大腦中動脈發出的外側豆紋動脈(lateral lenticulostriate)供應,而非前脈絡叢動脈—故D敘述錯誤。","options":{"A":"供應側腦室脈絡叢,正確。","B":"供應內囊後支,正確。","C":"多由內頸動脈分支,正確。","D":"稱殼核主要由前脈絡叢動脈供給—錯誤(實為豆紋動脈),為正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_114020-04":{"quick":"巴金森氏病的病變主要在黑質「緻密部(pars compacta)」的多巴胺神經元,非網狀部。","detail":{"background":"巴金森氏病(Parkinson disease)是神經退化性疾病,核心病變在中腦黑質「緻密部(substantia nigra pars compacta)」的多巴胺神經元退化(伴路易體Lewy body與α-synuclein沉積),導致紋狀體多巴胺不足。多巴胺不足使直接路徑(D1興奮)減弱、間接路徑(D2抑制)去抑制而過強,淨效果過度抑制視丘→運動遲緩、僵直、靜止性震顫。黑質網狀部(pars reticulata)是基底核「輸出」核(GABA能),非巴金森的主要退化部位—故A錯誤。","options":{"A":"稱病變主要在黑質網狀部—錯誤,應為緻密部,為正解。","B":"與多巴胺分泌不足有關,正確。","C":"為神經退化性疾病,正確。","D":"同時影響直接與間接路徑,正確。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_114090-01":{"quick":"前庭神經核與小腦(前庭小腦)有直接且大量的雙向纖維連結。","detail":{"background":"前庭神經核位於橋腦-延腦交界,與小腦的前庭小腦(絨球小結葉)及頂核有直接、大量的往返纖維:小腦絨球小結接受前庭核(及第一級前庭傳入)的訊息,並經頂核/直接回送前庭核以調節平衡、姿勢與前庭眼球反射。這是腦幹核團中與小腦連結最直接而大量者。動眼神經核司眼外肌、三叉脊髓核司頭面痛溫、三叉橋腦(主感覺)核司觸覺,皆與小腦無大量直接連結。","options":{"A":"動眼神經核司眼外肌,與小腦無大量直接連結。","B":"三叉脊髓核司頭面痛溫覺。","C":"三叉橋腦主感覺核司頭面觸覺。","D":"前庭神經核與小腦有直接大量連結—正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_114090-02":{"quick":"初級視覺皮質由大腦後動脈(posterior cerebral artery)供應。","detail":{"background":"初級視覺皮質(V1)位於枕葉內側距狀溝周圍,血供來自大腦後動脈(PCA)的距狀動脈;PCA阻塞造成對側同向偏盲常伴黃斑迴避(枕極可由大腦中動脈側支供應)。上小腦動脈供小腦上面與部分中腦,大腦前動脈供額頂內側面與胼胝體,大腦中動脈供大腦外側面(含部分視放射但非V1),皆非V1主供。","options":{"A":"上小腦動脈供小腦上面。","B":"大腦前動脈供額頂內側面。","C":"大腦中動脈供大腦外側面。","D":"大腦後動脈供初級視覺皮質—正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_114090-03":{"quick":"基底核傳出經視丘的腹前核(VA)中繼回運動相關皮質。","detail":{"background":"基底核輸出核(蒼白球內節GPi、黑質網狀部SNr)的GABA能纖維主要投射至視丘腹前核(ventral anterior, VA)與腹外側核(VL)前部,再回饋至運動輔助區、運動前區與前額葉,參與動作的選擇與起始;小腦輸出則經VL後部至主要運動區。視丘前核屬Papez記憶環路;腹後外側核(VPL)/腹後內側核(VPM)分別中繼身體與頭面的軀體感覺,皆非基底核傳出標的。","options":{"A":"腹前核接受基底核傳出—正解。","B":"前核屬邊緣記憶環路。","C":"腹後外側核中繼身體軀體感覺。","D":"腹後內側核中繼頭面感覺。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_114090-04":{"quick":"皮質脊髓徑經內囊「後肢」下行,不經前肢。","detail":{"background":"皮質脊髓徑(錐體束)的下行路徑:大腦運動皮質→放射冠→內囊後肢(posterior limb,與皮質紅核/皮質網狀纖維伴行;皮質延髓束在膝部)→中腦大腦腳(基底腳中3/5)→橋腦基部(被橋腦核與橫向纖維打散成束)→延腦錐體→約85–90%於錐體交叉至對側形成外側皮質脊髓徑。內囊前肢走的是額橋纖維與視丘前輻射,非皮質脊髓徑;故不通過內囊前肢。","options":{"A":"通過延腦錐體,正確。","B":"通過中腦大腦腳基底部,正確。","C":"通過橋腦基部,正確。","D":"稱通過內囊前肢—錯誤,應為後肢,為正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_114090-05":{"quick":"高基氏肌腱受器的傳入纖維為group Ib(粗有髓纖維)。","detail":{"background":"本體感覺受器與傳入纖維分類:肌梭(muscle spindle)的初級環旋末梢傳入為group Ia(最粗最快)、次級末梢為group II;高基氏肌腱受器(Golgi tendon organ,位於肌腱-肌肉接合處,偵測肌張力)傳入為group Ib。Ib纖維入脊髓經抑制性中間神經元抑制同名肌α運動神經元(自源性抑制/反牽張反射),保護肌肉避免過度張力。Aδ與C纖維屬痛溫覺傳入,與肌腱受器無關。","options":{"A":"group Ia來自肌梭初級末梢。","B":"group Ib來自高基氏肌腱受器—正解。","C":"Aδ屬痛/溫覺傳入。","D":"C纖維屬痛/溫/癢的無髓傳入。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_114090-06":{"quick":"布羅卡氏區(Broca area)位於額葉(額下迴後部)。","detail":{"background":"大腦各葉代表性構造:額葉含初級運動區(前中央迴)、運動前區、額葉眼動區與布羅卡氏區(Broca area, 額下迴後部BA44/45,語言產生);頂葉含角迴(angular gyrus, BA39,與閱讀/語意整合)與緣上迴;顳葉含Heschl橫迴(初級聽覺皮質)與Wernicke區;枕葉含楔葉(cuneus)與距狀皮質(視覺)。故位於額葉者為布羅卡氏區。","options":{"A":"角迴位於頂葉。","B":"布羅卡氏區位於額葉—正解。","C":"Heschl橫迴位於顳葉(聽覺)。","D":"楔葉位於枕葉(視覺)。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_115020-02":{"quick":"中小腦腳幾乎全為傳入纖維(對側橋腦核→小腦),不含傳出。","detail":{"background":"小腦三腳的纖維性質:中小腦腳(middle cerebellar peduncle)幾乎完全是傳入—由對側橋腦核發出的橋腦小腦纖維(pontocerebellar),將大腦皮質經橋腦核中繼的訊息送入小腦,不含小腦傳出纖維。下小腦腳以傳入為主(脊髓、前庭、橄欖)但也含至前庭核的傳出。上小腦腳以傳出為主(齒狀核→紅核/視丘)兼少量傳入(腹側脊髓小腦徑)。故純粹只含傳入者為中小腦腳。","options":{"A":"上小腦腳以傳出為主兼少量傳入。","B":"中小腦腳只含傳入(橋腦小腦纖維)—正解。","C":"下小腦腳含傳入與至前庭核的傳出。","D":"上小腦腳交叉屬傳出纖維交叉。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_115020-03":{"quick":"下肢本體感覺經內側蹄系傳至視丘腹後外側核(VPL)。","detail":{"background":"背柱-內側蹄系系統的視丘中繼為腹後外側核(VPL):身體(軀幹四肢)的精細觸覺與意識性本體感覺,一級神經元經背柱(下肢薄束)→延腦薄核→內弓狀纖維交叉成內側蹄系→視丘VPL→中央後迴下肢區。頭面部對應的是腹後內側核(VPM,中繼三叉與味覺)。腹前核(VA)/腹外側核(VL)屬運動中繼(基底核/小腦),非感覺。故下肢本體感覺終於VPL。","options":{"A":"腹前核屬運動(基底核)中繼。","B":"腹外側核屬運動(小腦/基底核)中繼。","C":"腹後外側核中繼身體本體與觸覺—正解。","D":"腹後內側核中繼頭面感覺與味覺。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_115020-05":{"quick":"伸張(牽張)反射為「單突觸」反射,非多突觸。","detail":{"background":"伸張反射(stretch reflex,如膝反射)是最簡單的單突觸反射:肌肉被牽張→肌梭興奮→Ia傳入纖維(大型有髓、傳導快)入脊髓→直接與同名肌α運動神經元形成「單一突觸」→該肌收縮抵抗牽張;同時經抑制性中間神經元抑制拮抗肌(交互抑制)。下運動神經元(α運動神經元或其軸突)受損會使反射弧的傳出端中斷→反射消失(下運動神經元病灶特徵之一)。故「多突觸反射」的敘述錯誤。","options":{"A":"傳入主要來自肌梭,正確。","B":"傳入為大型有髓Ia纖維,正確。","C":"下運動神經元損傷致反射消失,正確。","D":"稱為多突觸反射—錯誤,牽張反射為單突觸,為正解。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_115020-06":{"quick":"上丘屬視覺反射中樞,不在「視網膜→大腦皮質」的主要視覺傳導路徑上。","detail":{"background":"主要視覺傳導路徑:視網膜神經節細胞→視神經(optic nerve)→視交叉(鼻側交叉)→視徑(optic tract)→外側膝狀體(LGB,視丘)→視放射(經內囊後肢、Meyer環)→初級視覺皮質(V1, BA17)。上丘(superior colliculus)接受部分視網膜與皮質傳入,負責視覺定向反射、眼球掃視與頭眼協調,屬「視覺反射」旁路,並不在通往大腦皮質的主要影像傳導路徑上。故不在此路徑者為上丘。","options":{"A":"外側膝狀體是主路徑的視丘中繼。","B":"視徑屬主路徑。","C":"上丘屬視覺反射旁路,不在通往皮質的主路徑—正解。","D":"視神經屬主路徑起始。"},"sources":["Snell《臨床神經解剖學》","Vanderah & Gould《Nolte人腦解剖》","Gray解剖學"]}},"med1_106100-03":{"quick":"咽部縱走肌(莖突咽肌、腭咽肌、咽鼓管咽肌)收縮使咽與喉「上提」,助吞嚥。","detail":{"background":"咽部肌肉分兩群:外層環走的咽縮肌(上、中、下咽縮肌,由咽叢CN X支配,收縮使管腔縮窄、依序蠕動推送食團);內層縱走肌(莖突咽肌stylopharyngeus由CN IX支配、腭咽肌與咽鼓管咽肌由咽叢支配),其收縮使咽與喉向上提、縮短咽腔,於吞嚥時上提喉部、會厭蓋住喉口以保護氣道。故縱走肌作用為「上提」咽喉。","options":{"A":"鬆弛非縱走肌收縮的作用。","B":"縱走肌收縮使咽喉上提—正解。","C":"下壓與縱走肌作用相反。","D":"內收非咽縱走肌主要作用。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_106100-04":{"quick":"舌內在橫肌收縮使舌「變窄並伸長」。","detail":{"background":"舌肌分外在肌(改變舌位置:頦舌肌伸舌、舌骨舌肌降舌、莖突舌肌縮舌上抬、腭舌肌上抬舌後)與內在肌(改變舌形狀:上、下縱肌使舌縮短/捲;橫肌使舌變窄並伸長;垂直肌使舌變扁平並變寬)。全部舌肌(除腭舌肌由咽叢)皆由舌下神經(CN XII)支配。故使舌變窄者為橫肌(transverse),變寬變扁者為垂直肌(vertical)。","options":{"A":"橫肌收縮使舌變窄並伸長—正解。","B":"垂直肌使舌變扁平、變寬。","C":"頦舌肌為外在肌、主司伸舌。","D":"舌骨舌肌為外在肌、降舌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_106100-05":{"quick":"翼管神經由岩大神經(副交感)+岩深神經(交感)組成,不含岩小神經纖維。","detail":{"background":"翼管神經(nerve of pterygoid canal/Vidian nerve)由兩成分匯合:岩大神經(greater petrosal nerve,來自顏面神經的副交感「節前」纖維)+岩深神經(deep petrosal nerve,來自頸內動脈交感叢的交感「節後」纖維)。它走入翼管至翼腭神經節(pterygopalatine ganglion),副交感於此節換元後支配淚腺與鼻腭黏膜腺體,交感纖維則穿過不換元。岩小神經(lesser petrosal)是CN IX的副交感纖維、前往耳神經節支配腮腺,與翼管神經無關—故C不屬翼管神經。","options":{"A":"含交感節後纖維(來自岩深神經),屬翼管神經。","B":"含副交感節前纖維(來自岩大神經),屬翼管神經。","C":"岩小神經屬CN IX(至耳神經節),不在翼管神經內—正解。","D":"岩深神經為翼管神經組成。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_106100-16":{"quick":"滑車神經(CN IV)是唯一由腦幹「背側」發出的腦神經。","detail":{"background":"十二對腦神經中,滑車神經(trochlear, CN IV)獨特之處有三:(1)是唯一從腦幹背側(中腦下丘下方)發出的腦神經;(2)其纖維在發出前於上髓帆完全交叉,故支配「對側」上斜肌;(3)是顱內走行最長、最細、最易受外傷的腦神經。動眼(III)由中腦腹側腳間窩、外旋(VI)由橋延溝、副神經(XI)由延腦及上頸髓外側發出,皆非背側。","options":{"A":"動眼神經由中腦腹側發出。","B":"外旋神經由橋延溝腹側發出。","C":"滑車神經由腦幹背側發出—正解。","D":"副神經由延腦/上頸髓外側發出。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_106100-17":{"quick":"甲狀舌骨肌由C1纖維(隨舌下神經)直接支配,非頸襻分支。","detail":{"background":"舌骨下肌群(帶狀肌)的神經支配:胸骨舌骨肌、肩胛舌骨肌、胸骨甲狀肌由頸襻(ansa cervicalis, C1–C3)支配;但甲狀舌骨肌(thyrohyoid)與頦舌骨肌(geniohyoid)是由C1纖維「藉行」舌下神經後單獨分出支配,並非經頸襻。考點即在區分「頸襻支配三條(胸骨舌骨、肩胛舌骨、胸骨甲狀)」與「C1隨舌下神經支配兩條(甲狀舌骨、頦舌骨)」。","options":{"A":"胸骨舌骨肌由頸襻支配。","B":"肩胛舌骨肌由頸襻支配。","C":"胸骨甲狀肌由頸襻支配。","D":"甲狀舌骨肌由C1隨舌下神經支配,非頸襻—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_106100-19":{"quick":"顏面神經穿莖乳孔(stylomastoid foramen)出顱。","detail":{"background":"顱底孔道與神經/血管對應為高頻考點:顏面神經(CN VII)經內聽道入顳骨、走顏面神經管,最後由莖乳孔(stylomastoid foramen)出顱支配表情肌。其餘選項皆錯:眼動脈與視神經一同穿「視神經管」(非眶上裂,眶上裂走的是III、IV、V1、VI與上眼靜脈);三叉上頜支V2穿「圓孔(foramen rotundum)」(下頜支V3才穿卵圓孔);前庭耳蝸神經(VIII)走「內聽道」(頸靜脈孔走的是IX、X、XI與乙狀竇/IJV)。","options":{"A":"眼動脈隨視神經穿視神經管,非眶上裂—錯。","B":"顏面神經穿莖乳孔—正確,為正解。","C":"V2穿圓孔(非卵圓孔)—錯。","D":"前庭耳蝸神經穿內聽道(非頸靜脈孔)—錯。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_107100-03":{"quick":"舌咽神經(CN IX)司口咽黏膜與舌後1/3的一般感覺,受損致該處感覺缺失。","detail":{"background":"舌咽神經(glossopharyngeal, CN IX)的一般感覺分布為口咽(oropharynx)黏膜、扁桃體、咽鼓管、中耳與舌後1/3(同時司舌後1/3味覺),是咽反射(gag reflex)的傳入支(傳出為CN X)。故其受損造成口咽黏膜一般感覺缺失與同側咽反射消失。迷走神經司喉咽與聲門下感覺及咽喉運動;頸襻司舌骨下肌運動;喉返神經司聲帶運動與聲門下感覺,皆非口咽黏膜一般感覺主司。","options":{"A":"迷走神經司喉咽/聲門下,非口咽黏膜主司。","B":"舌咽神經司口咽黏膜一般感覺—正解。","C":"頸襻為運動(舌骨下肌)。","D":"喉返神經司聲帶運動與聲門下感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_107100-04":{"quick":"(本題多重答案,答A或D均給分)內翼肌收縮使下頜「上提(閉口)」,與張口最無關。","detail":{"background":"張口(下頜下降)由外翼肌(lateral pterygoid)與舌骨上肌群(下頜舌骨肌、頦舌骨肌、二腹肌)在舌骨固定下共同完成;閉口(下頜上提)由咬肌、顳肌與內翼肌(medial pterygoid)負責。故內翼肌(A)收縮是閉口、與張口最無關。本題官方公告為多重答案、A與D均給分(D選項標示為頦舌肌/geniohyoid,中英文名稱不一致—若視為頦舌骨肌則助張口、若視為頦舌肌則與張口無關,因而一併給分)。","options":{"A":"內翼肌使下頜上提(閉口),與張口無關—給分。","B":"外翼肌啟動張口。","C":"下頜舌骨肌(舌骨上肌)助下頜下降張口。","D":"標示矛盾(頦舌肌/geniohyoid)—官方一併給分。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_107100-05":{"quick":"鼓膜張肌由三叉神經第三支(下頜神經, V3)支配。","detail":{"background":"中耳兩條小肌肉的神經支配易混:鼓膜張肌(tensor tympani,牽張鼓膜、減低高頻傳音)由三叉神經下頜支(V3,經內翼肌神經)支配—與另一條同由V3支配的腭帆張肌(tensor veli palatini)一致(皆第一鰓弓衍生);鐙骨肌(stapedius,抑制鐙骨振動)則由顏面神經(CN VII)支配(第二鰓弓)。聽覺反射時兩肌收縮以保護內耳。故鼓膜張肌=CN V第三支。","options":{"A":"第五顱神經第三支(下頜神經)支配鼓膜張肌—正解。","B":"副神經顱根併入迷走支配咽喉肌,非鼓膜張肌。","C":"第八顱神經為前庭耳蝸感覺神經。","D":"第七顱神經支配的是鐙骨肌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_107100-15":{"quick":"面神經傳遞「表情肌」的本體感覺,不傳遞「咀嚼肌」本體感覺(後者屬三叉神經)。","detail":{"background":"面神經(CN VII)為混合神經:特殊內臟運動(SVE)支配表情肌(第二鰓弓);副交感(至淚腺、頜下/舌下腺);特殊感覺(舌前2/3味覺,經鼓索);一般感覺(外耳道小區)。其運動核(面神經核)位於橋腦被蓋,屬下運動神經元;下運動神經元(核或周邊神經)損傷會造成「同側全臉」表情肌麻痺(上下臉皆癱,如Bell麻痺),這與上運動神經元損傷只癱對側下臉不同。咀嚼肌的本體感覺由三叉神經中腦核傳遞,與面神經無關—故D錯誤。","options":{"A":"面神經核位於橋腦,正確。","B":"右面神經核(下運動神經元)損傷致右側全臉麻痺,正確。","C":"面神經核神經元屬下運動神經元,正確。","D":"稱面神經傳咀嚼肌本體感覺—錯誤(屬三叉神經),為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_107100-18":{"quick":"二腹肌後腹由顏面神經支配(第二鰓弓衍生)。","detail":{"background":"舌骨上肌群的神經支配依鰓弓來源:二腹肌「前腹」與下頜舌骨肌(第一鰓弓)由三叉下頜支V3(下頜舌骨肌神經)支配;二腹肌「後腹」與莖突舌骨肌(第二鰓弓)由顏面神經(CN VII)支配;頦舌骨肌由C1隨舌下神經支配。故正確者為「二腹肌後腹由顏面神經支配」。記憶法:同屬第二鰓弓的後腹與莖突舌骨肌→CN VII;第一鰓弓的前腹與下頜舌骨肌→V3。","options":{"A":"二腹肌後腹由顏面神經支配—正解。","B":"前腹由V3(下頜舌骨肌神經)支配,非舌下神經。","C":"下頜舌骨肌由V3支配,非舌下神經。","D":"莖突舌骨肌由顏面神經支配,非下頜神經。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_107100-19":{"quick":"顏面靜脈經上眼靜脈與海綿竇相通,感染可逆行擴散(危險三角)。","detail":{"background":"顏面靜脈通常無瓣膜,於內眥處經內眥靜脈→上眼靜脈(superior ophthalmic vein)與顱內海綿竇相通,亦可經深面靜脈→翼靜脈叢→海綿竇。故鼻根至上唇的「危險三角」區感染(如擠壓癤腫)可逆行經上眼靜脈進入海綿竇,引發海綿竇血栓性靜脈炎(出現眼球突出、眼肌麻痺、視力受損等)。下頜後靜脈、舌靜脈、上頜靜脈雖為頭頸靜脈引流,但與海綿竇的直接、最常見通路為上眼靜脈。","options":{"A":"下頜後靜脈引流至頸外/頸內靜脈,非直接入海綿竇主路。","B":"上眼靜脈直通海綿竇—正解(危險三角)。","C":"舌靜脈引流至頸內靜脈。","D":"上頜靜脈匯入翼靜脈叢/下頜後靜脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108030-02":{"quick":"喉外神經支配環甲肌(cricothyroid),受損使聲帶張力與高音受影響。","detail":{"background":"喉的神經支配:喉上神經分喉內神經(感覺,聲門上黏膜)與喉外神經(external laryngeal nerve,運動,支配「環甲肌」);喉返神經(recurrent laryngeal)支配除環甲肌外的所有喉內肌並司聲門下感覺。環甲肌收縮使甲狀軟骨前傾、拉長並緊張聲帶,負責提高音調。甲狀腺手術時喉外神經(伴行甲狀腺上動脈)易受傷,導致環甲肌麻痺→聲帶鬆弛、發高音困難、聲音易疲勞。後環杓肌(唯一外展聲帶)、外側環杓肌與甲杓肌皆由喉返神經支配。","options":{"A":"環甲肌由喉外神經支配,受損致其麻痺—正解。","B":"甲杓肌由喉返神經支配。","C":"後環杓肌由喉返神經支配(唯一外展聲帶)。","D":"外側環杓肌由喉返神經支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108030-04":{"quick":"雙眼同時上看由動眼神經(CN III)作用(上直肌+下斜肌)。","detail":{"background":"眼外肌與神經支配(LR6-SO4-其餘3):外直肌由外展神經(CN VI)、上斜肌由滑車神經(CN IV)、其餘四條(上直、下直、內直、下斜)與提上眼瞼肌由動眼神經(CN III)。向「正上方」注視主要由上直肌(CN III)與下斜肌(CN III)協同完成,皆屬動眼神經支配;故雙眼上看為動眼神經作用。臨床上動眼神經麻痺呈眼球向下外偏、上瞼下垂與瞳孔散大。","options":{"A":"眼神經(V1)為感覺,不司眼球運動。","B":"滑車神經司上斜肌(使眼下內轉)。","C":"動眼神經司上直肌與下斜肌、主導上看—正解。","D":"外展神經司外直肌(外展)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108030-14":{"quick":"瞳孔光反射的傳入是視神經(CN II)、傳出是動眼神經(CN III),不涉及三叉/眼神經。","detail":{"background":"瞳孔光反射弧:光→視網膜→視神經(CN II,傳入)→經視束至中腦頂蓋前區(pretectal area)→雙側經後聯合(posterior commissure)投射至兩側E-W核(Edinger-Westphal nucleus)→動眼神經(CN III)副交感節前→睫狀神經節換元→節後支配瞳孔括約肌→雙眼瞳孔收縮(直接+間接/共識反應)。頂蓋前區與後聯合的雙側連結是「照一眼、雙眼同縮」的解剖基礎。三叉神經眼支(V1)司角膜感覺(角膜反射),與瞳孔光反射無關—故D錯誤。","options":{"A":"此為瞳孔光反射,正確。","B":"頂蓋前區參與,正確。","C":"後聯合參與雙側共識反應,正確。","D":"稱三叉眼神經參與—錯誤,傳入為CN II、傳出為CN III,為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108030-17":{"quick":"淚腺的副交感節後纖維源自翼腭神經節(pterygopalatine ganglion)。","detail":{"background":"淚腺分泌的副交感路徑:起自橋腦上涎核→面神經→岩大神經→(併入翼管神經)→翼腭神經節(pterygopalatine ganglion)換元→節後纖維藉行顴神經、再經淚神經交通支抵達淚腺。故節後纖維源自翼腭神經節。對照其他副交感神經節:睫狀神經節(CN III,瞳孔括約肌/睫狀肌)、耳神經節(CN IX,腮腺)、頜下神經節(CN VII鼓索,頜下/舌下腺);膝神經節是面神經的「感覺」神經節(味覺),非副交感換元站。","options":{"A":"睫狀神經節支配瞳孔括約肌與睫狀肌。","B":"膝神經節為面神經感覺節(味覺),非副交感節。","C":"翼腭神經節為淚腺副交感節後來源—正解。","D":"耳神經節支配腮腺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108030-18":{"quick":"氣管前筋膜(pretracheal layer)位於舌骨下肌後方、包覆甲狀腺與氣管。","detail":{"background":"頸部深筋膜分層:包圍層(investing layer,包覆整個頸部、斜方肌與胸鎖乳突肌);氣管前層(pretracheal layer,位於舌骨下肌深面,包覆甲狀腺、氣管、食道前面,其後外側與頰咽筋膜相續);椎前層(prevertebral layer,包覆脊柱與椎前/後肌群);頸動脈鞘(carotid sheath,包頸總/內動脈、頸內靜脈與迷走神經,由三層融合而成)。故覆於甲狀腺表面、位於舌骨下肌後方者為氣管前層。","options":{"A":"包圍層位於最淺層、包整個頸部。","B":"頸動脈鞘包大血管與迷走神經。","C":"氣管前層覆蓋甲狀腺、位舌骨下肌後方—正解。","D":"椎前層覆蓋脊柱與椎旁肌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108030-19":{"quick":"前、中顱窩硬腦膜與小腦天幕由三叉神經(CN V)的腦膜支支配。","detail":{"background":"顱底硬腦膜的感覺神經分區:前顱窩與中顱窩硬腦膜及小腦天幕主要由三叉神經分支支配(V1的天幕神經/tentorial nerve支配天幕與大腦鐮,V2、V3的腦膜支支配中顱窩);後顱窩硬腦膜則由上頸神經(C2、C3)與迷走、舌下神經的腦膜支支配。這是「天幕上頭痛多牽涉至三叉分布(額/眼)」的解剖基礎。故支配前中顱窩與天幕者為三叉神經。","options":{"A":"舌咽神經不主司此區硬腦膜。","B":"三叉神經支配前中顱窩硬腦膜與天幕—正解。","C":"迷走神經參與後顱窩硬腦膜。","D":"舌下神經腦膜支參與後顱窩。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108100-02":{"quick":"額神經、淚神經、滑車神經(1、4、5)經眶上裂但在總腱環「外」進出眼眶。","detail":{"background":"眼眶經眶上裂進出的神經依與總腱環(common tendinous ring/Zinn環)的關係分兩群:環「內」者—動眼神經上下支(3)、鼻睫神經(2)、外旋神經(6)(再加交感纖維);環「外(上方)」者—淚神經(4)、額神經(1)、滑車神經(5)(記憶法LFT)。眼動脈與視神經則走視神經管。故不經總腱環內者為1、4、5。","options":{"A":"135含3(動眼,在環內),不符。","B":"236皆在環內,反而是經環內者。","C":"246含2、6(在環內),不符。","D":"145(額、淚、滑車)皆在環外—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108100-03":{"quick":"翼腭窩後上方經圓孔通往中顱窩。","detail":{"background":"翼腭窩(pterygopalatine fossa)是位於上頜骨後方的小空間,為神經血管轉運樞紐,其交通:後上方經「圓孔(foramen rotundum)」通中顱窩(三叉V2通過)、經翼管通破裂孔/頸動脈管(翼管神經);內側經蝶腭孔通鼻腔;外側經翼上頜裂通顳下窩;前方經眶下裂通眼眶;下方經腭大/小管通口腔。故後上方通往中顱窩。","options":{"A":"鼻腔由內側經蝶腭孔相通。","B":"顳下窩由外側經翼上頜裂相通。","C":"後上方經圓孔通中顱窩—正解。","D":"口腔由下方經腭大小管相通。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108100-14":{"quick":"動眼神經(CN III)由中腦腹側的腳間窩(interpeduncular fossa)發出。","detail":{"background":"腳間窩(interpeduncular fossa)是中腦腹側兩大腦腳之間的凹陷,其內有動眼神經(CN III)自此發出、後穿孔質與供應深部結構的穿通動脈。臨床上後交通動脈瘤可壓迫此處的CN III造成動眼神經麻痺(瞳孔散大、眼瞼下垂、眼球下外偏)。滑車神經由中腦背側發出;基底動脈走橋腦腹側基底溝;腦下垂體位於蝶鞍,皆不在腳間窩。","options":{"A":"滑車神經由中腦背側發出。","B":"動眼神經由腳間窩發出—正解。","C":"基底動脈走橋腦腹側基底溝。","D":"腦下垂體位於蝶鞍內。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108100-16":{"quick":"腭帆張肌由三叉神經下頜支(V3)支配;V3受損影響其收縮。","detail":{"background":"軟腭五肌的神經支配:腭帆「張」肌(tensor veli palatini)由三叉下頜支(V3,經內翼肌神經)支配—與第一鰓弓來源一致;其餘四肌(腭帆提肌levator veli palatini、腭咽肌、腭舌肌、懸雍垂肌)皆由咽叢(迷走CN X的特殊內臟運動成分,部分經副神經顱根)支配。故V3受損僅影響腭帆張肌;腭帆張肌亦負責張開咽鼓管,受損可致中耳積液。","options":{"A":"腭帆張肌由V3支配,受損受影響—正解。","B":"腭帆提肌由咽叢(CN X)支配。","C":"腭咽肌由咽叢支配。","D":"腭舌肌由咽叢支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_108100-17":{"quick":"喉外神經支配環甲肌(cricothyroid)。","detail":{"background":"喉內肌的神經支配:除環甲肌外,所有喉內肌(含後環杓肌、外側環杓肌、甲杓肌、橫/斜杓肌)皆由喉返神經(recurrent laryngeal n.)支配;唯獨環甲肌(cricothyroid)由喉上神經的喉外支(external laryngeal n.)支配。環甲肌使聲帶緊張、提高音調。後環杓肌是唯一能「外展」聲帶(打開聲門)的肌肉,雙側喉返神經麻痺時聲帶內收致呼吸困難。","options":{"A":"後環杓肌由喉返神經支配。","B":"外側環杓肌由喉返神經支配。","C":"環甲肌由喉外神經支配—正解。","D":"甲杓肌由喉返神經支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109020-03":{"quick":"第一咽弓衍生肌由三叉神經運動核(經V3)支配。","detail":{"background":"咽弓(鰓弓)與其運動神經對應:第一咽弓→三叉神經(運動核,V3)支配咀嚼肌等;第二咽弓→面神經(面神經核)支配表情肌;第三咽弓→舌咽神經(疑核)支配莖突咽肌;第四、六咽弓→迷走神經(疑核)支配咽喉肌。故第一咽弓衍生構造由三叉神經運動核支配。動眼核司眼外肌(非鰓弓)、上橄欖核屬聽覺,皆非鰓弓運動核。","options":{"A":"三叉神經運動核支配第一咽弓衍生肌—正解。","B":"面神經核支配第二咽弓(表情肌)。","C":"動眼神經核司眼外肌,非鰓弓。","D":"上橄欖核屬聽覺路徑。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109020-04":{"quick":"上岩竇(superior petrosal sinus)連接海綿竇與橫竇(乙狀竇交界)。","detail":{"background":"硬腦膜靜脈竇的連通:海綿竇向後有兩條引流—上岩竇(superior petrosal sinus,沿顳骨岩部上緣後行,注入橫竇與乙狀竇交界處)與下岩竇(inferior petrosal sinus,沿岩枕裂下行,注入頸內靜脈)。故連接海綿竇與橫竇者為上岩竇;連接海綿竇與頸內靜脈者為下岩竇。乙狀竇是橫竇續行至頸內靜脈;直竇引流大腦大靜脈與下矢狀竇至竇匯。","options":{"A":"乙狀竇是橫竇至頸內靜脈的續行。","B":"上岩竇連海綿竇與橫竇—正解。","C":"下岩竇連海綿竇與頸內靜脈。","D":"直竇引流至竇匯。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109020-05":{"quick":"蝶骨大翼與小翼之間的構造為眶上裂(superior orbital fissure)。","detail":{"background":"蝶骨的孔裂定位:眶上裂(superior orbital fissure)位於蝶骨大翼與小翼之間,通連中顱窩與眼眶,內有CN III、IV、V1、VI與上眼靜脈通過;視神經管(optic canal)位於小翼根部(內有視神經與眼動脈);圓孔(V2)與卵圓孔(V3)、棘孔(腦膜中動脈)位於大翼;眶下裂位於大翼與上頜骨之間(通翼腭窩/顳下窩,內有V2分支與眶下血管)。故大翼與小翼間者為眶上裂。","options":{"A":"視神經孔位於小翼根部。","B":"眶上裂位於大翼與小翼之間—正解。","C":"圓孔位於大翼。","D":"眶下裂位於大翼與上頜骨之間。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109020-06":{"quick":"腮腺管開口處(對上頜第二大臼齒)的頰黏膜痛覺由頰神經(buccal nerve, V3感覺支)傳導。","detail":{"background":"須區分同名的兩條「頰」神經:三叉下頜支(V3)的頰神經(buccal nerve)是「感覺」神經,司頰部皮膚與頰黏膜(含腮腺管開口處)的一般感覺;面神經的頰支(buccal branch)是「運動」神經,支配頰肌與口周表情肌。腮腺管(Stensen管)開口於對著上頜第二大臼齒的頰黏膜,該處黏膜痛覺由V3的頰神經傳導。舌神經司舌前2/3一般感覺;顴面神經司顴部皮膚,皆非頰黏膜。","options":{"A":"舌神經司舌前2/3一般感覺。","B":"頰神經(V3感覺支)司頰黏膜痛覺—正解。","C":"顴面神經司顴部皮膚。","D":"面神經頰支為運動神經(支配頰肌),非感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109020-15":{"quick":"內側膝狀體投射至顳橫迴(Heschl迴)的初級聽覺皮質。","detail":{"background":"內側膝狀體(MGB)是聽覺路徑的視丘中繼,經聽輻射(acoustic radiation,走內囊後肢的亞豆狀部)投射至顳葉的顳橫迴(transverse temporal gyrus of Heschl, Brodmann 41/42),即初級聽覺皮質。外側枕顳迴屬視覺/物體辨識腹側流;島閾屬島葉;角迴(BA39)屬頂葉語意整合,皆非聽覺初級皮質。對照:外側膝狀體→距狀皮質(視覺)。","options":{"A":"顳橫迴(Heschl)為初級聽覺皮質、MGB投射標的—正解。","B":"外側枕顳迴屬視覺腹側流。","C":"島閾屬島葉,非聽覺皮質。","D":"角迴屬頂葉語意整合。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109020-16":{"quick":"雙顳側偏盲的病灶在視交叉(optic chiasma)。","detail":{"background":"視野缺損的定位:視交叉(optic chiasma)中央交叉的是來自兩眼「鼻側」視網膜的纖維(對應「顳側」視野),故視交叉中央受壓(典型如腦下垂體腺瘤由下方往上頂、或顱咽管瘤)會造成雙眼「顳側」偏盲(bitemporal hemianopia)。對照:單側視神經病灶→該眼全盲;視束以後病灶→對側同向偏盲;視放射部分病灶→象限盲。故雙顳側偏盲定位於視交叉。","options":{"A":"視神經病灶造成單眼視力喪失。","B":"眼窩病灶多為單眼問題。","C":"視神經管病灶影響單側視神經。","D":"視交叉中央受壓致雙顳側偏盲—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109020-18":{"quick":"耳顳神經(auriculotemporal nerve)攜帶至腮腺的副交感纖維,且鄰近顳頜關節易受損。","detail":{"background":"腮腺分泌的副交感路徑:下涎核→舌咽神經(CN IX)→鼓室神經→岩小神經→耳神經節(otic ganglion)換元→節後纖維「藉行」三叉下頜支的耳顳神經(auriculotemporal nerve)抵達腮腺。耳顳神經繞下頜頸、緊鄰顳頜關節走行,故顳頜關節手術易傷及它,導致腮腺分泌減少(及顳區感覺異常、Frey症候群)。顏面神經穿行腮腺但只是運動表情肌(不司其分泌);舌神經與下齒槽神經屬V3其他分支。","options":{"A":"顏面神經穿腮腺但司表情肌運動,非腮腺分泌。","B":"耳顳神經攜腮腺副交感、鄰近顳頜關節—正解。","C":"舌神經司舌前2/3感覺與頜下腺副交感。","D":"下齒槽神經司下排牙齒與下唇感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109020-19":{"quick":"睫狀肌的副交感節前纖維經動眼神經「下分支」進入睫狀神經節。","detail":{"background":"瞳孔括約肌與睫狀肌的副交感路徑:E-W核→副交感節前纖維併入動眼神經→隨動眼神經「下分支(inferior branch)」(此支同時支配下直肌、內直肌、下斜肌)→至睫狀神經節(ciliary ganglion)換元→節後纖維經短睫狀神經支配瞳孔括約肌(縮瞳)與睫狀肌(調節近視力)。鼻睫神經(V1)只是「穿過」睫狀神經節的感覺纖維與交感纖維(不換元),非副交感來源。","options":{"A":"動眼神經上分支支配上直肌與提上瞼肌,不帶此副交感。","B":"副交感節前纖維隨動眼神經下分支入睫狀神經節—正解。","C":"鼻睫神經為感覺,僅穿過神經節不換元。","D":"外旋神經司外直肌,無副交感。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109020-24":{"quick":"肺癌(尤其左肺門/縱膈)易壓迫喉返神經,造成聲帶麻痺與聲音嘶啞。","detail":{"background":"喉返神經(recurrent laryngeal nerve)支配除環甲肌外所有喉內肌,司聲帶運動。其走行特殊:左喉返神經繞主動脈弓(動脈韌帶下方)上行、右喉返神經繞右鎖骨下動脈,故路徑長、行經縱膈與氣管食道溝。左肺門/縱膈腫瘤、主動脈瘤、縱膈淋巴結轉移等易壓迫(尤其左側)喉返神經,造成同側聲帶麻痺、聲音嘶啞—是肺癌的重要間接徵象。膈神經受損致橫膈麻痺,交感幹受損致Horner症候群,皆非聲帶麻痺。","options":{"A":"膈神經受損致橫膈麻痺。","B":"喉返神經受壓致聲帶麻痺—正解。","C":"交感神經幹受損致Horner症候群。","D":"肋間神經與聲帶無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109100-03":{"quick":"內頸動脈經頸動脈管入顱、跨越破裂孔上方後「向前」轉入海綿竇,非於破裂孔轉向後方進入顱腔。","detail":{"background":"內頸動脈(ICA)由總頸動脈在約C4分出,頸段走於頸動脈鞘內、位於頸內靜脈內側且無分支;經顳骨頸動脈管入顱底,跨越破裂孔(foramen lacerum)的「上方」後轉向前內進入海綿竇(海綿竇段),再穿出至前床突旁分出眼動脈等。常見誤解是「ICA穿過破裂孔」—實際它是跨越其上方而非穿過,且在海綿竇內轉向前方而非後方。在海綿竇內,外旋神經(VI)緊貼ICA外側同行。故C敘述錯誤。","options":{"A":"起源於總頸動脈,正確。","B":"頸部走於頸內靜脈內側,正確。","C":"稱於破裂孔轉向後方進入顱腔—錯誤(跨破裂孔上方、轉向前入海綿竇),為正解。","D":"與外旋神經共穿海綿竇,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109100-16":{"quick":"前隔區(septal area)屬「內側」嗅覺區,不屬外側嗅覺區。","detail":{"background":"嗅覺皮質區分內側與外側:外側嗅覺區(lateral olfactory area)接受嗅徑外側紋的纖維,包含梨狀皮質、鉤迴(uncus)、內鼻皮質前部與杏仁周區(及部分杏仁核),是主要的初級嗅皮質;內側嗅覺區(medial olfactory area)位於胼胝體下、含隔區(septal area)等,與情緒/自律的嗅覺反射有關。故前隔區屬內側嗅覺區,不在外側嗅覺區。","options":{"A":"前隔區屬內側嗅覺區—不屬外側,為正解。","B":"鉤迴屬外側嗅覺區。","C":"內鼻皮質屬外側嗅覺區。","D":"杏仁核(周區)屬外側嗅覺區。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109100-19":{"quick":"腭扁桃腺主要由顏面動脈的扁桃腺支供應。","detail":{"background":"腭扁桃腺(palatine tonsil)血供豐富、來源多重,但「主要」來自顏面動脈(facial artery)的扁桃腺支(tonsillar branch);另有舌動脈背舌支、咽升動脈、上頜動脈的腭降支與面動脈的升腭支等次要供應。臨床上扁桃腺切除術後出血常與顏面動脈扁桃腺支有關;其外側深面緊鄰舌咽神經與莖突舌肌。故主要供應者為顏面動脈。","options":{"A":"顏面動脈扁桃腺支為主要供應—正解。","B":"下齒槽動脈供下頜牙齒。","C":"舌動脈僅次要供應(背舌支)。","D":"上頜動脈僅次要供應(腭降支)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109100-20":{"quick":"梨狀窩外側以杓狀會厭皺襞與喉入口相隔。","detail":{"background":"梨狀窩(piriform fossa/recess)是喉咽(laryngopharynx)內、喉入口兩側的黏膜凹窩,位於甲狀軟骨板與杓狀會厭皺襞之間;其與喉入口(laryngeal inlet)之間隔著「杓狀會厭皺襞(aryepiglottic fold)」。喉內神經(internal laryngeal nerve,非喉外神經)走於其黏膜深面,故卡在梨狀窩的魚刺常傷及此神經。舌基部與會厭之間的凹窩是會厭谷(vallecula),非梨狀窩。故D正確。","options":{"A":"梨狀窩位於喉咽(laryngopharynx),非口咽。","B":"舌基與會厭間者為會厭谷,非梨狀窩。","C":"其黏膜深面走的是喉內神經,非喉外神經。","D":"梨狀窩與喉入口間隔以杓狀會厭皺襞—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_109100-21":{"quick":"橫顏面動脈是淺顳動脈(superficial temporal artery)的分支。","detail":{"background":"淺顳動脈是頸外動脈的兩終支之一(另一為上頜動脈),在腮腺內、外耳道前方上行,於顴弓上方發出橫顏面動脈(transverse facial artery)橫越咬肌表面、伴行腮腺管供應腮腺、咬肌與面側皮膚。淺顳動脈本身續行供應顳區頭皮。顏面動脈、上頜動脈、頰動脈皆非橫顏面動脈的來源。","options":{"A":"顏面動脈走面前部,非橫顏面動脈來源。","B":"上頜動脈走顳下窩深部。","C":"頰動脈是上頜動脈分支。","D":"橫顏面動脈為淺顳動脈分支—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_110020-05":{"quick":"角膜一般感覺由鼻睫神經(nasociliary nerve, V1)經睫狀長/短神經傳遞。","detail":{"background":"角膜的一般感覺由三叉神經眼支(V1)的鼻睫神經(nasociliary nerve)分出的睫狀長神經(及經睫狀神經節穿過的睫狀短神經)傳遞,構成角膜反射的傳入支(傳出為CN VII支配眼輪匝肌使閉眼)。額神經與其分支眶上神經司前額與頭皮感覺(非角膜);動眼神經為運動,不司角膜感覺。故角膜感覺=鼻睫神經。","options":{"A":"鼻睫神經傳遞角膜感覺—正解。","B":"額神經司前額頭皮感覺。","C":"眶上神經(額神經分支)司前額頭皮。","D":"動眼神經為眼外肌運動,非感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_110020-06":{"quick":"眼眶靜脈經眼上/下靜脈引流至「海綿竇」,最不可能進入上矢狀竇。","detail":{"background":"上矢狀竇(superior sagittal sinus)收集大腦上外側面的皮質靜脈,並經導靜脈(emissary veins)與顱外靜脈相通,亦可接收額竇、鼻腔(經盲孔導靜脈)與顱骨膜(板障/導靜脈)的部分血流。眼眶的靜脈引流主要經眼上靜脈與眼下靜脈匯入「海綿竇」(及翼靜脈叢),而非上矢狀竇。故最不可能進入上矢狀竇者為眼眶。","options":{"A":"眼眶靜脈引流至海綿竇,最不可能入上矢狀竇—正解。","B":"額竇可經導靜脈與上矢狀竇相通。","C":"鼻腔可經盲孔導靜脈與上矢狀竇相通。","D":"顱骨膜可經導靜脈與上矢狀竇相通。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_110020-17":{"quick":"E-W核司瞳孔括約肌與睫狀肌(光反射/調節),「不」支配淚腺分泌。","detail":{"background":"Edinger-Westphal核(E-W核)位於中腦動眼神經核複合體背側,含「副交感節前」神經元,其纖維併入動眼神經→睫狀神經節換元→支配瞳孔括約肌(縮瞳、參與光反射)與睫狀肌(調節近物對焦)。淚腺的副交感分泌則由橋腦「上涎核」經面神經→翼腭神經節控制,與E-W核無關。故「E-W核支配淚腺分泌」為錯誤敘述。","options":{"A":"其纖維併入動眼神經,正確。","B":"含副交感節前神經元,正確。","C":"參與光反射(縮瞳),正確。","D":"稱支配淚腺分泌—錯誤(屬上涎核/面神經),為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_110020-18":{"quick":"布洛卡區位於額下迴(BA44/45),非顳上迴;顳上迴後部是沃尼克區。","detail":{"background":"語言區定位:布洛卡區(Broca area)位於「額下迴」後部(蓋部與三角部, Brodmann 44/45),屬運動性語言區,損傷造成運動型(表達型)失語—理解尚可但說話不流暢、構音費力;多數人位於左側(優勢)半球。顳上迴(superior temporal gyrus)後部是沃尼克區(Wernicke area, BA22),損傷造成感覺型(接受型)失語。故「布洛卡區位於顳上迴」錯誤。","options":{"A":"位於BA44、45,正確。","B":"損傷產生運動型失語症,正確。","C":"稱位於顳上迴—錯誤(應為額下迴),為正解。","D":"多數人位於左側半球,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_110020-19":{"quick":"前篩動脈源自眼動脈,而眼動脈是內頸動脈分支,故間接源自內頸動脈。","detail":{"background":"鼻腔血供雙重來源:多數來自頸外動脈系統—上頜動脈的蝶腭動脈(供鼻腔後/下大部)、腭降動脈的大腭動脈、顏面動脈的外側鼻動脈(供鼻翼);少數來自頸內動脈系統—眼動脈(內頸動脈分支)發出前、後篩動脈,供鼻腔上部與篩竇。Kiesselbach叢(Little區,鼻中隔前下,鼻出血好發處)即由這兩系統吻合而成。故間接源自內頸動脈者為前篩動脈。","options":{"A":"蝶腭動脈源自上頜動脈(頸外系統)。","B":"大腭動脈源自上頜動脈(頸外系統)。","C":"外側鼻動脈源自顏面動脈(頸外系統)。","D":"前篩動脈源自眼動脈→內頸動脈—正解(間接源自ICA)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_110020-20":{"quick":"二腹肌(舌骨上肌群)收縮使下頜骨下壓(張口)。","detail":{"background":"下頜運動的肌肉:上提(閉口)由咬肌、顳肌、內翼肌;下壓(張口)主要由外翼肌啟動,並由舌骨上肌群(二腹肌、下頜舌骨肌、頦舌骨肌)在舌骨被舌骨下肌群固定下,將下頜往下後拉。二腹肌前後腹經中間腱滑車繫於舌骨,收縮可下壓下頜(或上提舌骨)。故助下頜下壓者為二腹肌。顳肌、內翼肌、咬肌皆為閉口肌。","options":{"A":"顳肌使下頜上提(閉口),後束亦後退下頜。","B":"翼內肌使下頜上提(閉口)。","C":"咬肌使下頜上提(閉口)。","D":"二腹肌助下頜下壓(張口)—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-01":{"quick":"滑車神經核發出的纖維在腦幹(上髓帆)內交叉到對側才離開。","detail":{"background":"十二對腦神經中,滑車神經(CN IV)最特別:其運動核發出的纖維於離開腦幹「之前」在上髓帆(superior medullary velum)完全交叉至對側,再由中腦「背側」離開,因此一側滑車核支配「對側」的上斜肌。這也是唯一在發出後於腦幹內交叉、且唯一從背側發出的腦神經。動眼、外旋、舌下神經核發出的纖維皆同側離開(不在腦幹內交叉)。","options":{"A":"動眼神經核纖維同側離開。","B":"滑車神經核纖維於腦幹內交叉後離開—正解。","C":"外旋神經核纖維同側離開。","D":"舌下神經核纖維同側離開。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-07":{"quick":"眼神經(V1)是「一般體感覺」神經,非特殊感覺。","detail":{"background":"三叉神經眼支(ophthalmic nerve, V1)屬一般體感覺(general somatic afferent)神經,經眶上裂入眼眶,分淚神經、額神經、鼻睫神經,接收眼眶結構(角膜、結膜、淚腺區)、前額頭皮、上眼瞼、鼻背與鼻腔前上部等的一般感覺(觸、痛、溫),並參與角膜反射傳入。它不傳遞特殊感覺(視覺由CN II、嗅覺由CN I)。故「屬於特殊感覺神經」最不恰當。","options":{"A":"稱屬特殊感覺神經—最不恰當,V1為一般體感覺,為正解。","B":"屬體感覺神經,正確。","C":"接收眼眶結構感覺,正確。","D":"接收部分顏面(前額、鼻背、上瞼)感覺,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-08":{"quick":"鼻淚管開口於「下鼻道(inferior meatus)」。","detail":{"background":"鼻腔外側壁的開口對應:額竇、前篩竇、上頜竇開口於「中鼻道」(經半月裂孔/篩漏斗);後篩竇開口於「上鼻道」;蝶竇開口於「蝶篩隱窩(最上方)」;鼻淚管(nasolacrimal duct)則開口於「下鼻道」。記憶:淚水經淚點→淚小管→淚囊→鼻淚管→下鼻道排入鼻腔,故感冒/哭泣時鼻水增多。","options":{"A":"最上鼻道(蝶篩隱窩)為蝶竇開口。","B":"上鼻道為後篩竇開口。","C":"中鼻道為額竇/前中篩竇/上頜竇開口。","D":"鼻淚管開口於下鼻道—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-09":{"quick":"鼓索神經經岩鼓裂(petrotympanic fissure)離開中耳進入顳下窩。","detail":{"background":"鼓索神經(chorda tympani)是面神經在顏面神經管內、莖乳孔上方分出的分支,攜帶舌前2/3味覺(特殊感覺)與至頜下/舌下腺的副交感節前纖維。它進入鼓室(中耳),橫過鼓膜內面與聽小骨之間,再經「岩鼓裂(petrotympanic fissure)」離開中耳進入顳下窩,於該處併入三叉下頜支的舌神經而被攜往舌與頜下神經節。故其出中耳的孔道為岩鼓裂。","options":{"A":"鼓索神經經岩鼓裂出中耳入顳下窩—正解。","B":"莖乳孔是面神經主幹出顱處。","C":"乳突孔走導靜脈與枕動脈腦膜支。","D":"咽鼓管連通鼓室與鼻咽,非鼓索通路。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-10":{"quick":"舌咽神經(CN IX)不包覆於頸動脈鞘內。","detail":{"background":"頸動脈鞘(carotid sheath)由頸部三層深筋膜融合而成,內含:頸總動脈/內頸動脈(內側)、頸內靜脈(外側)、迷走神經(CN X,位兩者後方之間)與深頸淋巴結,頸襻多貼附於鞘表面。舌咽神經(IX)、副神經(XI)、舌下神經(XII)雖在頸上部行經鞘附近、與之交錯,但並不「包覆」於鞘內。故不在鞘內者為舌咽神經。","options":{"A":"頸總動脈在鞘內。","B":"舌咽神經不在頸動脈鞘內—正解。","C":"內頸動脈在鞘內。","D":"迷走神經在鞘內。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-11":{"quick":"上頜骨同時參與眼眶(底)、鼻腔(外側壁/底)與口腔(腭/牙槽)的形成。","detail":{"background":"上頜骨(maxilla)是面中部的核心骨,參與多個腔室:其眶面構成眼眶「底」的大部;鼻面構成鼻腔外側壁下部與鼻腔底;腭突構成硬腭前2/3(口腔頂)與牙槽突(承載上排牙齒,屬口腔)。故上頜骨同時參與眼眶、鼻腔與口腔三者。篩骨參與眼眶內側壁與鼻腔(不參與口腔);淚骨、顴骨僅參與眼眶/面部,不參與口腔。","options":{"A":"篩骨參與眼眶與鼻腔,不參與口腔。","B":"淚骨僅參與眼眶內側壁與鼻腔。","C":"顴骨參與眼眶外側壁與顴弓,不參與鼻/口腔。","D":"上頜骨同時參與眼眶、鼻腔、口腔—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-12":{"quick":"口腔底近會厭處黏膜由內喉神經(internal laryngeal nerve, CN X)支配。","detail":{"background":"舌與口腔底黏膜的一般感覺分區:舌前2/3一般感覺由舌神經(V3)、味覺由鼓索(VII);舌後1/3一般感覺與味覺由舌咽神經(IX);而最後方近會厭、會厭谷與喉口上方的黏膜則由迷走神經的內喉神經(internal laryngeal nerve)支配(故此處異物刺激可引發咳嗽/喉反射)。題目所指「口腔底部近會厭」的黏膜屬最後方,由內喉神經支配。","options":{"A":"舌神經司舌前2/3一般感覺。","B":"舌咽神經司舌後1/3。","C":"鼓索司舌前2/3味覺。","D":"近會厭黏膜由內喉神經支配—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-13":{"quick":"蝶骨棘最靠近棘孔(foramen spinosum)。","detail":{"background":"蝶骨棘(spine of sphenoid)位於蝶骨大翼後角下方、卵圓孔與棘孔的後外側;其前內側緊鄰「棘孔(foramen spinosum)」—腦膜中動脈即由棘孔入顱,故名「棘」孔。蝶骨棘亦是蝶下頜韌帶與腭帆張肌的附著處,且耳顳神經繞其內側。盲孔在前顱窩(篩骨前)、腭大孔在硬腭後外、莖乳孔在顳骨,皆遠離蝶骨棘。","options":{"A":"盲孔位於前顱窩篩骨前。","B":"腭大孔位於硬腭後外側。","C":"棘孔緊鄰蝶骨棘—正解。","D":"莖乳孔位於顳骨(面神經出口)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-14":{"quick":"口腔內頰(頰黏膜)的一般感覺由CN V3的頰神經負責。","detail":{"background":"三叉神經三分支的皮節/黏膜分區:V1(眼支)司前額、上眼瞼、鼻背、角膜;V2(上頜支)司下眼瞼、上唇、上頜牙齒、硬顎、鼻腔大部、上頜竇;V3(下頜支)司下唇、下頜牙齒、舌前2/3一般感覺、下頜區皮膚與「口腔內頰黏膜」(經頰神經)。故口腔內頰由V3負責;硬顎與鼻腔內由V2、下眼瞼亦由V2。","options":{"A":"硬顎由V2(腭大神經)支配。","B":"鼻腔內主要由V1/V2支配。","C":"下眼瞼由V2支配。","D":"口腔內頰黏膜由V3(頰神經)支配—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111020-15":{"quick":"心肌缺血的痛覺(內臟痛)主要隨交感神經傳入(T1–T4),產生轉移痛。","detail":{"background":"心臟的內臟痛覺纖維伴隨「交感神經」走行:由心臟→心叢→經心交感神經→交感神經幹→經白交通枝入T1–T4(尤T1–T4)脊神經背根→脊髓。由於這些脊髓節段同時接收左胸、左上臂內側皮膚的體感覺傳入,中樞無法區分來源而產生「轉移痛(referred pain)」—心絞痛典型為胸骨後、放射至左肩臂內側、下頜。迷走神經攜帶的是心臟反射(壓力/化學)傳入,與痛覺定位無關。故心肌缺血痛覺主經交感系統。","options":{"A":"膈神經司橫膈與心包部分感覺,非心肌缺血痛主路。","B":"迷走神經攜心血管反射傳入,非痛覺定位。","C":"心肌缺血痛覺隨交感神經傳入(T1–T4)—正解。","D":"左喉返神經司喉肌,與心痛無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111100-05":{"quick":"下斜肌使眼球向「上、外」看(上舉+外展+外旋),非向下。","detail":{"background":"眼外肌作用:下斜肌(inferior oblique)起自眶底前內側(上頜骨眶面淚溝外側),斜向後外上方,終於眼球後外側赤道後方;其作用為「上舉、外展、外旋」眼球—主要上舉作用在眼球內收時最明顯(臨床檢查下斜肌:令眼內收後上看)。由動眼神經支配。故「讓瞳孔朝下朝外」錯誤(應為朝上朝外)。對照上斜肌(滑車神經)使眼向下外。","options":{"A":"由動眼神經支配,正確。","B":"稱使瞳孔朝下朝外—錯誤,下斜肌使眼朝上外,為正解。","C":"起點位於上頜骨眶面,正確。","D":"終點附著於眼球後半部(赤道後外),正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111100-06":{"quick":"外旋神經(CN VI)與內頸動脈一起穿入海綿竇,再經眶上裂入眼眶。","detail":{"background":"海綿竇內的結構排列:外側壁由上而下有動眼神經(III)、滑車神經(IV)、三叉眼支(V1)、上頜支(V2);而「竇腔內」則有內頸動脈(海綿竇段)與緊貼其外下方同行的外旋神經(VI)。故VI是唯一與ICA一起行於海綿竇腔內的腦神經,之後經眶上裂(在總腱環內)入眼眶支配外直肌。此解剖使海綿竇病變(如血栓、瘻管)早期即影響VI。視神經不經海綿竇(走視神經管);III、IV、V1走海綿竇「外側壁」非與ICA同行於竇腔。","options":{"A":"視神經經視神經管,不入海綿竇。","B":"外旋神經與內頸動脈同行於海綿竇腔內—正解。","C":"三叉神經V1/V2走海綿竇外側壁。","D":"滑車神經走海綿竇外側壁。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111100-07":{"quick":"淚腺位於眼眶外上部(額骨淚腺窩)。","detail":{"background":"眼瞼與淚器要點:淚腺(lacrimal gland)位於眼眶「外上方」的額骨淚腺窩,分泌漿液性淚液,經多條排泄管入結膜上穹窿。瞼板腺(tarsal/Meibomian gland)分泌「油脂」性物質形成淚膜外層、減少蒸發(非水樣);淚液靠瞬目掃向內側,匯於「內眥」的淚湖(lacrimal lake,非外下部),再經淚點引流。提上眼瞼肌(動眼神經)負責「張開」眼瞼;閉合由眼輪匝肌(面神經)。故D正確。","options":{"A":"瞼板腺分泌油脂(非水樣)。","B":"淚湖位於內眥(非外下部)。","C":"提上眼瞼肌負責張開眼瞼(非關閉)。","D":"淚腺位於眼眶外上部—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111100-09":{"quick":"岩小神經屬舌咽神經(CN IX),不是顏面神經在顳骨的分支。","detail":{"background":"顏面神經(CN VII)在顳骨顏面神經管內依序發出三分支:岩大神經(greater petrosal n.,副交感至翼腭神經節,司淚腺/鼻腭腺)、鐙骨肌神經(nerve to stapedius)、鼓索(chorda tympani,舌前2/3味覺+至頜下舌下腺副交感),最後由莖乳孔出顱。岩小神經(lesser petrosal n.)則是舌咽神經(CN IX)鼓室神經的延續、攜副交感至耳神經節(支配腮腺),與顏面神經無關。故B不屬顏面神經分支。","options":{"A":"岩大神經為顏面神經分支。","B":"岩小神經屬舌咽神經(CN IX),非顏面神經分支—正解。","C":"鼓索為顏面神經分支。","D":"鐙骨肌神經為顏面神經分支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111100-10":{"quick":"上頜臼齒牙根與上頜竇僅薄骨相隔,折斷碎片最易進入上頜竇。","detail":{"background":"上頜竇(maxillary sinus)是最大的副鼻竇,位於上頜骨體內,其底(下壁)與上頜後牙(尤其第一、二大臼齒與前磨牙)牙根僅以薄骨板相隔,部分人牙根甚至突入竇腔。故拔上頜臼齒時若折斷牙根,碎片最易進入上頜竇(亦可能造成口腔-上頜竇瘻管);上頜牙源性感染也易蔓延至上頜竇。蝶竇、篩竇、額竇位於面中上部,與臼齒牙根無鄰接關係。","options":{"A":"蝶竇位於蝶骨體,遠離臼齒。","B":"篩竇位於兩眼眶之間,與臼齒無關。","C":"額竇位於額骨,與臼齒無關。","D":"上頜竇底鄰接上頜臼齒牙根—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111100-11":{"quick":"嘴唇淋巴並非只引流到頦下淋巴結;下唇外側與上唇引流至頜下淋巴結。","detail":{"background":"嘴唇結構:核心為口輪匝肌(orbicularis oris,面神經支配,司閉唇);血供來自顏面動脈分出的上、下唇動脈;上下唇黏膜面各有唇繫帶(labial frenula)連於牙齦。淋巴引流並非單一:下唇「中央」引流至頦下淋巴結(submental),下唇「外側」與上唇則引流至頜下淋巴結(submandibular),故下唇癌可能雙側轉移。「只引流至頦下淋巴結」的敘述以偏概全,為錯誤。","options":{"A":"核心肌為口輪匝肌,正確。","B":"稱淋巴只引流至頦下淋巴結—錯誤(下唇外側/上唇至頜下淋巴結),為正解。","C":"上下唇均有唇繫帶,正確。","D":"血供來自顏面動脈的上下唇動脈,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111100-12":{"quick":"中耳鼓室黏膜的一般感覺由舌咽神經(CN IX)的鼓室神經支配。","detail":{"background":"中耳鼓室(tympanic cavity)內壁黏膜的一般感覺由舌咽神經(CN IX)分出的「鼓室神經(tympanic nerve/Jacobson神經)」支配,該神經在鼓室內叢分布,並續為岩小神經攜副交感至耳神經節(腮腺)。對照:外耳道與鼓膜「外」面由三叉V3耳顳神經與迷走耳支;鼓膜「內」面則由舌咽神經。故鼓室黏膜一般感覺=CN IX。","options":{"A":"CN V司外耳道/鼓膜外面感覺。","B":"CN VII無鼓室黏膜一般感覺主責。","C":"CN IX(鼓室神經)司鼓室黏膜一般感覺—正解。","D":"CN X僅司部分外耳/鼓膜外面。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_111100-33":{"quick":"舌骨大角衍生自第三咽弓。","detail":{"background":"咽弓軟骨衍生物:第一咽弓(Meckel軟骨)→錘骨、砧骨、下頜骨模板;第二咽弓(Reichert軟骨)→鐙骨、莖突、莖突舌骨韌帶、舌骨「小角」與舌骨體上部;第三咽弓→舌骨「大角」與舌骨體下部;第四、六咽弓→喉軟骨(甲狀、環狀、杓狀等)。故衍生自第三咽弓者為舌骨大角。莖突舌骨韌帶與小角屬第二弓,甲狀軟骨屬第四弓。","options":{"A":"莖突舌骨韌帶衍生自第二咽弓。","B":"舌骨小角衍生自第二咽弓。","C":"舌骨大角衍生自第三咽弓—正解。","D":"甲狀軟骨衍生自第四咽弓。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_112020-02":{"quick":"右側視野缺損(右側同向偏盲)定位於左側視徑(及其後路徑)。","detail":{"background":"視野與視覺路徑的對應:視交叉「之後」的病灶(視束、外側膝狀體、視放射、視覺皮質)造成「對側同向偏盲」。患者「右側視野」缺損=右側同向偏盲,代表左側半視覺系統受損,故定位於「左視徑(left optic tract)」(或左視放射/左枕葉)。若為單側視神經病灶則造成「該眼全盲」(單眼),非單側視野的同向缺損;視交叉中央病灶造成雙顳側偏盲。故最符合者為左視徑。","options":{"A":"右視神經病灶致右眼全盲(單眼),非右側視野同向缺損。","B":"右視徑病灶致「左側」視野同向偏盲。","C":"左視神經病灶致左眼全盲。","D":"左視徑病灶致右側同向偏盲—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_112020-08":{"quick":"視神經(CN II)經視神經管,不通過眶上裂。","detail":{"background":"眶上裂(superior orbital fissure)位於蝶骨大翼與小翼之間,通過者有:動眼神經(III)、滑車神經(IV)、三叉眼支(V1的淚、額、鼻睫神經)、外旋神經(VI)與上眼靜脈、交感纖維。視神經(CN II)與眼動脈則一同經「視神經管(optic canal)」進出眼眶,不走眶上裂。故不通過眶上裂者為CN II。","options":{"A":"視神經(CN II)經視神經管—不通過眶上裂,為正解。","B":"動眼神經經眶上裂。","C":"滑車神經經眶上裂。","D":"外旋神經經眶上裂。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_112020-12":{"quick":"舌咽神經(CN IX)的運動成分支配莖突咽肌(stylopharyngeus)。","detail":{"background":"舌咽神經(CN IX)成分多元:特殊內臟運動(疑核)僅支配一條肌肉—莖突咽肌(stylopharyngeus,助上提咽喉);一般感覺司口咽、扁桃、舌後1/3、中耳鼓室;味覺司舌後1/3;副交感(下涎核經岩小神經→耳神經節)至腮腺;並接收頸動脈竇/體的壓力與化學感受。舌後1/3「肌肉」運動其實由舌下神經(CN XII)支配(舌肌皆XII);耳廓一般感覺主由V3耳顳與迷走耳支;腭帆張肌由V3。故CN IX負責者為莖突咽肌收縮。","options":{"A":"舌肌運動(含舌後)由舌下神經CN XII支配。","B":"耳廓一般感覺主由V3/迷走耳支。","C":"腭帆張肌由三叉V3支配。","D":"莖突咽肌由舌咽神經CN IX支配—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_112020-13":{"quick":"舌下神經(CN XII)走在舌骨舌肌外表面,向前入下頜舌骨肌深層支配舌肌。","detail":{"background":"舌下三角區的層次關係是高頻考點:舌動脈(lingual artery)走在舌骨舌肌(hyoglossus)的「深面(內側)」;而舌下神經(CN XII)與舌神經(V3)則走在舌骨舌肌的「淺面(外表面)」,舌下神經向前進入下頜舌骨肌深層,支配除腭舌肌外的所有舌肌(內在肌與外在肌)。手術結紮舌動脈或處理舌下區須辨明此深淺關係。上喉神經行於喉部,不在此處。","options":{"A":"舌動脈走舌骨舌肌深面(內側),非外表面。","B":"舌咽神經走更後上方(至舌後1/3)。","C":"舌下神經走舌骨舌肌外表面、前入下頜舌骨肌深層—正解。","D":"上喉神經行於喉部上方。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113020-01":{"quick":"角膜反射:傳入經三叉脊髓核(V1),傳出經顏面運動核(眼輪匝肌)使閉眼。","detail":{"background":"角膜反射(corneal/blink reflex)弧:刺激角膜→三叉神經眼支(V1,鼻睫神經)傳入→腦幹三叉神經脊髓核(spinal trigeminal nucleus)→中間神經元雙側投射至兩側顏面運動核(facial motor nucleus)→顏面神經支配眼輪匝肌→雙眼閉合(直接+共識性瞬目)。故主要參與的核為三叉脊髓核(傳入)與顏面運動核(傳出)。E-W核與動眼核參與的是「瞳孔光反射」而非角膜反射。臨床:V1或VII病灶會改變角膜反射的傳入或傳出。","options":{"A":"動眼核屬光反射,非角膜反射傳出。","B":"三叉脊髓核(傳入)+顏面運動核(傳出)—正解。","C":"E-W核屬光反射。","D":"E-W核與動眼核皆屬光反射。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113020-06":{"quick":"鼓膜體感覺由三叉(V)、顏面(VII)、舌咽(IX)、迷走(V)四神經參與,即1、2、4、5。","detail":{"background":"鼓膜(tympanic membrane)的感覺神經分布複雜、雙面不同:外側(外耳道側)主由三叉下頜支的耳顳神經(V3,即1)與迷走神經耳支(Arnold神經,5),並有顏面神經(VII,2)參與;內側(鼓室側)由舌咽神經鼓室神經(IX,4)支配。前庭耳蝸神經(VIII,3)是「特殊感覺(聽/平衡)」,不傳遞鼓膜的「體(一般)感覺」。故參與鼓膜體感覺者為1、2、4、5(三叉、顏面、舌咽、迷走),不含3。臨床:刺激外耳道(迷走耳支)可引發咳嗽或暈厥。","options":{"A":"123含3(CN VIII特殊感覺),不符。","B":"1234漏掉迷走(5)且含3,不符。","C":"2345含3、漏1,不符。","D":"1245(三叉、顏面、舌咽、迷走)—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113020-08":{"quick":"頭皮動脈走於「皮下緻密結締組織層」,不在腱膜與顱骨膜之間(那是疏鬆層)。","detail":{"background":"頭皮(SCALP)五層由外而內:皮膚(Skin)、皮下緻密結締組織(Connective tissue,富含血管神經)、顱頂腱膜(Aponeurosis,帽狀腱膜)、疏鬆結締組織(Loose areolar tissue,「危險層」,可讓頭皮自由移動、感染可經導靜脈入顱)、顱骨膜(Pericranium)。頭皮的動脈與神經走在第二層(皮下緻密結締組織)內,且因纖維隔包繞,撕裂傷時血管不易回縮而出血洶湧;並非走在腱膜與顱骨膜之間(該疏鬆層)。故B錯誤。","options":{"A":"頭頂頭皮內無淋巴結(引流至周邊),正確。","B":"稱動脈走於腱膜與顱骨膜之間—錯誤(應在皮下緻密層),為正解。","C":"疏鬆層使頭皮可自由移動,正確。","D":"枕小神經參與耳後頭皮感覺,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113020-09":{"quick":"下鼻甲是獨立的顏面骨,不由篩骨組成。","detail":{"background":"篩骨(ethmoid bone)構成多個鼻腔結構:篩板(嗅神經通過)、垂直板(構成鼻中隔上部)、兩側篩骨迷路含篩竇,並向內突出形成「上鼻甲」與「中鼻甲」。但「下鼻甲(inferior nasal concha)」是一塊「獨立的顏面骨」,並非篩骨的一部分。鼻中隔由篩骨垂直板(上後)、犁骨(下後)與鼻中隔軟骨(前)構成。故不由篩骨組成者為下鼻甲。","options":{"A":"上鼻甲為篩骨突起。","B":"中鼻甲為篩骨突起。","C":"下鼻甲是獨立顏面骨,非篩骨—正解。","D":"鼻中隔上部由篩骨垂直板構成。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113020-10":{"quick":"乙狀竇溝(groove for sigmoid sinus)位於後顱窩。","detail":{"background":"顱窩分區與標誌:前顱窩有盲孔(foramen cecum,額骨與篩骨間)、篩板、雞冠;中顱窩有蝶鞍、前/後床突、視神經管、眶上裂、圓孔、卵圓孔、棘孔、弓狀隆起(arcuate eminence,顳骨岩部上面、標示前半規管);後顱窩有枕骨大孔、內聽道、頸靜脈孔、舌下神經管、橫竇溝與「乙狀竇溝(groove for sigmoid sinus)」。故位於後顱窩者為乙狀竇溝。","options":{"A":"盲孔位於前顱窩。","B":"弓狀隆起位於中顱窩(顳骨岩部)。","C":"乙狀竇溝位於後顱窩—正解。","D":"後床突屬中顱窩(蝶鞍後界)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113020-11":{"quick":"鐙骨肌(stapedius)由第七對腦神經(顏面神經)支配。","detail":{"background":"中耳兩條小肌肉與其神經(鰓弓來源):鐙骨肌(stapedius,源自第二鰓弓)由顏面神經(CN VII)支配,收縮可抑制鐙骨振動、保護內耳(聽覺反射);鼓膜張肌(tensor tympani,源自第一鰓弓)則由三叉下頜支(V3)支配。咬肌與內翼肌屬咀嚼肌,皆由V3支配。故由CN VII支配者為鐙骨肌;面神經麻痺時鐙骨肌癱瘓會出現「聽覺過敏(hyperacusis)」。","options":{"A":"咬肌由三叉V3支配。","B":"內翼肌由三叉V3支配。","C":"鐙骨肌由顏面神經CN VII支配—正解。","D":"鼓膜張肌由三叉V3支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113020-12":{"quick":"顳頷韌帶(外側韌帶)是防止顳頷關節向後脫位最重要的構造。","detail":{"background":"顳頷關節(TMJ)的韌帶:顳頷韌帶(temporomandibular/lateral ligament)是關節囊外側增厚部,由顴弓斜向後下附於下頜頸,主要限制下頜過度後退與後方/下方脫位,是防止「後方脫位」最重要的構造,並保護外耳道。莖突下頜韌帶與蝶下頜韌帶為「副韌帶」、作用次要。外翼肌反而是把關節盤與髁突向前拉(張口)的肌肉,過度收縮與「前脫位」有關;內翼肌為閉口肌。","options":{"A":"顳頷韌帶防止後方脫位—正解。","B":"內翼肌為閉口肌,非防後脫位主構造。","C":"莖突下頜韌帶為作用次要的副韌帶。","D":"外翼肌前拉髁突(與張口/前脫位相關)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113090-07":{"quick":"內頸動脈走於顳骨頸動脈管,不出現在中耳鼓室腔內。","detail":{"background":"中耳(鼓室)腔內的構造:三塊聽小骨(錘、砧、鐙)、兩條肌肉(鼓膜張肌、鐙骨肌)、鼓索神經(橫過鼓室)、鼓室神經叢(舌咽神經,並續為岩小神經)。內頸動脈(ICA)雖在顳骨內、其頸動脈管前壁與中耳僅薄骨相隔(故ICA異常時可聞搏動性耳鳴),但ICA本身走在「頸動脈管」內,並不位於中耳鼓室腔內。故不出現在中耳者為內頸動脈。","options":{"A":"鼓索神經橫過中耳鼓室。","B":"內頸動脈走頸動脈管,不在中耳腔內—正解。","C":"鐙骨肌位於中耳。","D":"岩小神經(源自鼓室神經叢)在中耳。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113090-09":{"quick":"視神經管連通眼眶與中顱窩。","detail":{"background":"視神經管(optic canal)位於蝶骨小翼根部,連通「眼眶」與「中顱窩(middle cranial fossa)」,內有視神經(CN II)與眼動脈通過。翼腭窩經圓孔通中顱窩、經蝶腭孔通鼻腔;顳下窩與顳窩屬顱外咀嚼肌間隙,與視神經管不相通。故視神經管相通者為中顱窩。","options":{"A":"翼腭窩經其他孔道相通,非視神經管。","B":"視神經管通中顱窩—正解。","C":"顳下窩屬顱外間隙。","D":"顳窩屬顱外間隙。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113090-10":{"quick":"棘孔通過的是腦膜中動脈—血管名與孔洞名(棘孔)不同。","detail":{"background":"多數顱面孔洞所通過的血管與孔洞「同名」:眶下孔→眶下動脈、腭大孔→腭大動脈、前篩孔→前篩動脈,皆同名好記。唯「棘孔(foramen spinosum)」通過的是「腦膜中動脈(middle meningeal artery)」(及腦膜中靜脈、三叉腦膜支),血管名與孔洞名不同—棘孔得名於其後外的蝶骨棘。故名稱不同者為棘孔。","options":{"A":"棘孔通過腦膜中動脈(名稱不同)—正解。","B":"眶下孔通過眶下動脈(同名)。","C":"腭大孔通過腭大動脈(同名)。","D":"前篩孔通過前篩動脈(同名)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113090-11":{"quick":"臉部汗腺分泌由「交感神經」支配,與顏面神經(CN VII)無關。","detail":{"background":"顏面神經(CN VII)的功能涵蓋:特殊內臟運動支配表情肌(含頰肌buccinator);副交感(經岩大神經→翼腭神經節)司淚腺與鼻黏膜腺分泌、(經鼓索→頜下神經節)司頜下/舌下腺唾液分泌;特殊感覺司舌前2/3味覺。臉部汗腺(與血管、立毛肌)則由「交感神經」節後纖維(經頸上神經節、隨外頸動脈叢分布)支配,屬交感系統,與顏面神經無關。故與CN VII無關者為臉部汗腺分泌。","options":{"A":"唾液(頜下/舌下腺)分泌由CN VII副交感支配,有關。","B":"鼻黏膜腺分泌由CN VII(岩大神經)支配,有關。","C":"臉部汗腺分泌由交感神經支配—與CN VII無關,為正解。","D":"頰肌由CN VII支配,有關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113090-12":{"quick":"迷走神經(經咽叢)同時支配上、中、下三條咽縮肌。","detail":{"background":"咽縮肌(上、中、下咽縮肌)的運動由咽叢(pharyngeal plexus)的「迷走神經(CN X)」特殊內臟運動成分支配(部分纖維源自副神經顱根併入迷走);咽叢的「感覺」則主由舌咽神經(CN IX)。莖突咽肌例外、由CN IX運動支配。三叉神經支配咀嚼肌,舌下神經支配舌肌,皆不支配咽縮肌。故同時支配三條咽縮肌者為迷走神經。","options":{"A":"舌咽神經僅運動支配莖突咽肌(及咽叢感覺)。","B":"三叉神經支配咀嚼肌。","C":"迷走神經(咽叢)支配三條咽縮肌—正解。","D":"舌下神經支配舌肌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_113090-13":{"quick":"張腭帆肌與鼓室張肌同由三叉下頜支(V3)支配(皆第一鰓弓來源)。","detail":{"background":"神經支配的「鰓弓邏輯」:腭帆張肌(tensor veli palatini)與鼓膜張肌(tensor tympani)皆源自第一鰓弓,故同由三叉神經下頜支(V3)支配(常合稱「兩個tensor都歸V3」)。腭咽肌與莖突咽肌由咽叢/舌咽(CN IX、X)支配;頸闊肌(platysma)為表情肌、由顏面神經(CN VII)支配。故與張腭帆肌同來源神經者為鼓室張肌。","options":{"A":"腭咽肌由咽叢(CN X)支配。","B":"頸闊肌由顏面神經支配。","C":"鼓室張肌與張腭帆肌同由V3支配—正解。","D":"莖突咽肌由舌咽神經支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-01":{"quick":"耳蝸神經核傳至下丘的纖維走外側蹄系(lateral lemniscus)。","detail":{"background":"聽覺路徑在腦幹的上行束為「外側蹄系(lateral lemniscus)」:耳蝸神經核→(部分經斜方體交叉)上橄欖核→外側蹄系→下丘(inferior colliculus)→內側膝狀體→初級聽覺皮質。故傳遞耳蝸核至下丘者為外側蹄系。內側蹄系傳精細觸覺/本體;脊髓蹄系(脊髓視丘徑延續)傳痛溫;三叉蹄系傳頭面感覺,皆非聽覺。","options":{"A":"內側蹄系傳精細觸覺與本體感覺。","B":"脊髓蹄系傳痛溫覺。","C":"外側蹄系傳聽覺(耳蝸核→下丘)—正解。","D":"三叉蹄系傳頭面感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-05":{"quick":"額葉眼區(FEF)司隨意掃視眼動,最不直接參與看近物的調適-輻輳反應。","detail":{"background":"看近物的「近反射(調適-輻輳反應)」三成分:(1)兩眼內聚(雙側內直肌收縮,CN III)、(2)睫狀肌收縮使水晶體變凸增屈光力(調適,經E-W核副交感→睫狀神經節→睫狀肌)、(3)瞳孔縮小(增景深)。三者皆由動眼神經(CN III)的體運動與副交感成分執行。額葉眼區(frontal eye field)負責「隨意性掃視(saccade)」與水平凝視,屬隨意眼動指令,並不直接參與近反射的自動調適-輻輳。故最不可能直接參與者為FEF。","options":{"A":"雙眼內直肌收縮(內聚)為近反射成分。","B":"動眼神經執行內聚、調適與縮瞳。","C":"額葉眼區司隨意掃視—最不直接參與近反射,為正解。","D":"睫狀肌收縮為調適成分。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-06":{"quick":"內耳血液由迷路動脈(labyrinthine artery)供應。","detail":{"background":"內耳(耳蝸與前庭)血供來自迷路動脈(labyrinthine/internal auditory artery),多為小腦前下動脈(AICA)分支(少數直接自基底動脈),經內聽道入內耳;此為終末動脈、無有效側支,阻塞造成突發性聽損與眩暈。副腦膜動脈、後腦膜動脈供硬腦膜;咽升動脈供咽部與部分腦膜,皆非內耳供應。","options":{"A":"副腦膜動脈供硬腦膜。","B":"後腦膜動脈供後顱窩硬腦膜。","C":"迷路動脈供內耳—正解。","D":"咽升動脈供咽部與腦膜。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-07":{"quick":"舌咽神經(CN IX)不參與外聽道與鼓膜「外面」的一般感覺(它司鼓膜內面/中耳)。","detail":{"background":"外耳道(external acoustic meatus)與鼓膜「外側面」的一般感覺由三條神經共同分布:三叉下頜支的耳顳神經(V3)、顏面神經(CN VII,小區)與迷走神經耳支(Arnold神經,CN X);故清耳道(刺激迷走耳支)可引發咳嗽/嘔吐反射。舌咽神經(CN IX)的鼓室神經司的是「鼓膜內側面與中耳鼓室」黏膜,並不參與外聽道與鼓膜外面的感覺。故不參與者為舌咽神經。","options":{"A":"三叉神經(耳顳神經)參與外聽道/鼓膜外面感覺。","B":"顏面神經參與外耳/鼓膜外面小區感覺。","C":"舌咽神經司鼓膜內面/中耳,不參與外聽道與鼓膜外面—正解。","D":"迷走神經(耳支)參與外聽道/鼓膜外面感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-08":{"quick":"基底膜(basilar membrane)隔開耳蝸管(scala media)與鼓室階(scala tympani)。","detail":{"background":"耳蝸橫切三腔:前庭階(scala vestibuli,外淋巴)、中階/耳蝸管(scala media,內淋巴)、鼓室階(scala tympani,外淋巴)。前庭膜(Reissner膜/vestibular membrane)隔開前庭階與中階;「基底膜(basilar membrane)」隔開中階(耳蝸管)與鼓室階,其上承載柯蒂氏器(螺旋器,聽覺感受器)。螺旋韌帶是中階外側壁;鼓膜在中耳,與耳蝸內分隔無關。故隔開耳蝸管與鼓室階者為基底膜。","options":{"A":"前庭膜隔開前庭階與耳蝸管。","B":"基底膜隔開耳蝸管與鼓室階—正解。","C":"鼓膜在中耳,非耳蝸內分隔。","D":"螺旋韌帶為中階外側壁構造。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-10":{"quick":"眼輪匝肌與鐙骨肌同由顏面神經(CN VII)支配。","detail":{"background":"依鰓弓來源判神經:鐙骨肌(第二鰓弓)由顏面神經(CN VII)支配;眼輪匝肌屬表情肌(第二鰓弓)同由CN VII支配,故兩者神經支配相同。鼓膜張肌與腭帆張肌(第一鰓弓)由三叉V3支配;腭帆提肌由咽叢(CN X)支配。故與鐙骨肌同神經者為眼輪匝肌。","options":{"A":"鼓膜張肌由三叉V3支配。","B":"眼輪匝肌與鐙骨肌同由顏面神經支配—正解。","C":"腭帆提肌由咽叢(CN X)支配。","D":"腭帆張肌由三叉V3支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-11":{"quick":"前囟門處頭皮主要由眶上動脈(supraorbital artery)供應。","detail":{"background":"頭皮血供來自頸內、頸外兩系統,於前額前髮際線分區:眶上動脈(supraorbital a.)與滑車上動脈(來自眼動脈→頸內動脈)供應前額正中至頭頂前部(含前囟門anterior fontanelle所在的頂前區);顳淺動脈供顳側、耳後動脈供耳後、枕動脈供枕後。故前囟門處頭皮主要由眶上動脈供應。升咽動脈供咽部與腦膜,不供頭皮表面。","options":{"A":"眶上動脈供前額至前囟門區頭皮—正解。","B":"升咽動脈供咽部/腦膜,非頭皮表面。","C":"耳後動脈供耳後頭皮。","D":"枕動脈供枕後頭皮。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-12":{"quick":"鼻尖痛覺由眼神經(V1)分支—鼻外神經傳遞。","detail":{"background":"鼻部皮膚感覺分區(三叉神經):鼻背上部、鼻尖由眼支(V1)鼻睫神經的「鼻外神經(external nasal nerve)」傳遞;鼻翼外側、鼻孔下緣由上頜支(V2)的眶下神經傳遞。臨床上帶狀皰疹若侵犯鼻睫神經,鼻尖出現水皰(Hutchinson徵象)預示眼球可能受累。故擠壓鼻尖的痛覺經眼神經(V1)分支傳遞。","options":{"A":"眼神經分支(鼻外神經)傳遞鼻尖痛覺—正解。","B":"上頜神經司鼻翼外側/下緣。","C":"下頜神經不分布鼻部。","D":"顏面神經為運動(表情肌),非鼻部感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-13":{"quick":"正確配對為CN VII—翼腭神經節(及頜下神經節)。","detail":{"background":"四對副交感神經節與其腦神經來源:睫狀神經節(ciliary)—動眼神經CN III(瞳孔括約肌、睫狀肌);翼腭神經節(pterygopalatine)與頜下神經節(submandibular)—顏面神經CN VII(分別司淚腺/鼻腭腺、頜下/舌下腺);耳神經節(otic)—舌咽神經CN IX(腮腺)。故正確者為「CN VII—翼腭神經節」。其餘三項皆配錯(III應配睫狀、IX應配耳、X的副交感換元在器官壁旁神經節)。","options":{"A":"CN III應配睫狀神經節(非耳神經節)。","B":"CN VII配翼腭神經節—正解。","C":"CN IX應配耳神經節(非睫狀)。","D":"CN X換元於器官壁旁節(非頜下神經節)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114020-15":{"quick":"主動脈弓動脈瘤壓迫繞行其下的左喉返神經,造成聲音沙啞。","detail":{"background":"左喉返神經(left recurrent laryngeal nerve)自迷走神經在主動脈弓前分出後,繞「主動脈弓」下方(動脈韌帶後)再上行回喉,故主動脈弓動脈瘤或其周圍病變可壓迫此神經→左聲帶麻痺、聲音沙啞(Ortner症候群)。右喉返神經則繞右鎖骨下動脈,位置較高,不受主動脈弓影響。交感神經幹受損致Horner症候群(非聲沙)。故聲音沙啞最可能因左喉返神經間接受損。","options":{"A":"右迷走/右喉返繞右鎖骨下動脈,不受主動脈弓影響。","B":"右交感幹受損致Horner症候群。","C":"左交感幹受損致Horner症候群。","D":"左喉返神經繞主動脈弓,受壓致聲沙—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114090-07":{"quick":"鼓室階(scala tympani)含外淋巴液,不含內淋巴液。","detail":{"background":"內耳膜迷路(含內淋巴endolymph,高鉀)包括:耳蝸管(scala media)、球囊(saccule)、橢圓囊(utricle)、三半規管與內淋巴囊。骨迷路與膜迷路之間的腔(含外淋巴perilymph,高鈉)包括:前庭階(scala vestibuli)與「鼓室階(scala tympani)」。故鼓室階含外淋巴、不含內淋巴。內淋巴由血管紋分泌、經內淋巴囊吸收,失衡與梅尼爾氏病相關。","options":{"A":"球囊含內淋巴。","B":"橢圓囊含內淋巴。","C":"耳蝸管含內淋巴。","D":"鼓室階含外淋巴、不含內淋巴—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114090-08":{"quick":"動眼神經不支配外直肌(外直肌由外旋神經支配)。","detail":{"background":"眼外肌神經支配口訣LR6 SO4 其餘CN III:外直肌(lateral rectus)由外旋神經(CN VI)、上斜肌(superior oblique)由滑車神經(CN IV)、其餘四條(上直、下直、內直、下斜)與提上眼瞼肌由動眼神經(CN III)。故「動眼神經支配外直肌」錯誤—外直肌應由CN VI支配。臨床上外旋神經麻痺呈患眼內斜、外展受限。","options":{"A":"滑車神經支配上斜肌,正確。","B":"動眼神經支配下斜肌,正確。","C":"稱動眼神經支配外直肌—錯誤(應為外旋神經CN VI),為正解。","D":"動眼神經支配提上眼瞼肌,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114090-10":{"quick":"骨傳導耳機經顱骨直接振動耳蝸,省去「外聽道」(空氣傳導)這段。","detail":{"background":"聽覺的兩種傳導:空氣傳導(正常路徑)—聲波經外聽道→鼓膜→聽小骨→卵圓窗→耳蝸外淋巴→柯蒂氏器→耳蝸神經;骨傳導—振動經顱骨直接傳至耳蝸的內/外淋巴而刺激柯蒂氏器,「繞過」外聽道、鼓膜與聽小骨(即中耳傳音裝置)。骨傳導耳機即利用此原理,省去外聽道(及鼓膜/中耳)。但耳蝸、柯蒂氏器與前庭耳蝸神經(感音與傳入)仍不可或缺。故省去者為外聽道。","options":{"A":"前庭耳蝸神經仍負責傳入,不可省。","B":"柯蒂氏器仍是感受器,不可省。","C":"耳蝸仍是感音器官,不可省。","D":"外聽道(空氣傳導段)被骨傳導省去—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114090-11":{"quick":"輪廓狀乳突位於舌後界,一般感覺由舌咽神經(CN IX)司,不受舌神經(V3)受損影響。","detail":{"background":"舌的神經分區以界溝(sulcus terminalis)為界:界溝「前」(舌前2/3,含絲狀、蕈狀、葉狀乳突大部)一般感覺由舌神經(lingual nerve, V3)、味覺由鼓索(VII);界溝「上及其後」的「輪廓狀乳突(vallate papillae)」與舌後1/3一般感覺與味覺皆由舌咽神經(CN IX)。故舌神經於顳下窩受損時,輪廓狀乳突(屬CN IX分布)的一般感覺最不可能受影響。","options":{"A":"輪廓狀乳突由CN IX支配,不受舌神經受損影響—正解。","B":"葉狀乳突(前部)一般感覺受舌神經影響。","C":"絲狀乳突由舌神經司一般感覺,會受影響。","D":"蕈狀乳突由舌神經司一般感覺,會受影響。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114090-12":{"quick":"下頜角皮膚感覺由「耳大神經(great auricular nerve, C2、C3)」司,非三叉神經。","detail":{"background":"面部下緣的一個重要例外:下頜「角」與下頜支後下方、腮腺表面的皮膚感覺,並非由三叉神經支配,而是由頸叢的「耳大神經(great auricular nerve, C2、C3)」司。故此處皮膚痛覺喪失提示耳大神經受損(臨床上腮腺手術常見此區麻木)。頰神經(V3)司頰部、頦神經(V3)司下唇/頦部、枕小神經(C2)司耳後上方頭皮,皆非下頜角。","options":{"A":"頰神經(V3)司頰部皮膚與黏膜。","B":"耳大神經(C2、C3)司下頜角皮膚—正解。","C":"枕小神經司耳後上方頭皮。","D":"頦神經司下唇與頦部皮膚。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114090-13":{"quick":"顳骨不參與翼腭窩的構成。","detail":{"background":"翼腭窩(pterygopalatine fossa)的骨性界線:前壁為上頜骨(maxilla)後面、後壁為蝶骨翼突與大翼(sphenoid)、內側壁為腭骨(palatine bone)垂直板、上方通眼眶(經眶下裂);其外側經翼上頜裂通顳下窩。構成者為上頜骨、蝶骨、腭骨(三骨),顳骨並不參與。故不參與者為顳骨。","options":{"A":"蝶骨(翼突/大翼)構成後壁。","B":"顳骨不參與翼腭窩—正解。","C":"腭骨垂直板構成內側壁。","D":"上頜骨後面構成前壁。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_114090-16":{"quick":"迷走神經將主動脈弓壓力/化學感受訊息傳入中樞,參與心臟反射。","detail":{"background":"心血管反射的壓力與化學感受器傳入:頸動脈竇與頸動脈體經舌咽神經(CN IX,竇神經)傳入;主動脈弓壓力感受器與主動脈體化學感受器則經「迷走神經(CN X)」傳入,皆終於延腦孤立束核,再整合調節心率、血管張力(壓力反射)與呼吸(化學反射)。故將血壓與血液化學變化訊息傳入中樞參與心臟反射者為迷走神經(感覺傳入)。交感神經為傳出(增心率/收縮)與內臟痛傳入,非壓力/化學反射的主要傳入。","options":{"A":"迷走神經傳入主動脈弓壓力/化學訊息,參與心臟反射—正解。","B":"頸交感為傳出,非壓力反射傳入。","C":"胸交感為傳出與內臟痛傳入。","D":"胸內臟神經屬交感,非心臟壓力反射傳入。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_115020-01":{"quick":"顏面神經感覺根將一般感覺傳入三叉脊髓核、味覺傳入孤立核。","detail":{"background":"顏面神經的感覺根(中間神經nervus intermedius)攜兩類感覺:(1)舌前2/3「味覺」(經鼓索)與軟腭味覺(經岩大神經),其一級神經元胞體在膝神經節,中樞突傳入延腦的「孤立核(solitary nucleus)」吻側味覺部;(2)外耳道與耳廓小區的「一般感覺」,傳入「三叉神經脊髓核(spinal trigeminal nucleus)」。故感覺根主要傳入三叉脊髓核與孤立核。顏面運動核屬運動(表情肌);疑核屬IX/X鰓弓運動;涎核屬副交感。","options":{"A":"三叉脊髓核(一般感覺)與孤立核(味覺)—正解。","B":"顏面運動核屬運動,非感覺傳入。","C":"疑核屬鰓弓運動。","D":"疑核與涎核皆非感覺核。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_115020-07":{"quick":"鼓索神經行經「錘骨柄與砧骨長支」之間,非砧骨長支與鐙骨之間。","detail":{"background":"中耳鼓索神經(chorda tympani)橫越鼓室時,走在「鼓膜內面、錘骨柄(manubrium of malleus)與砧骨長支(long process of incus)之間」,於聽小骨內側通過,故慢性中耳炎或手術易傷及之(致舌前2/3味覺異常)。聽小骨關係:錘骨外側突附著鼓膜、砧骨主體位於鼓室上隱窩(epitympanic recess)、鐙骨基板嵌入卵圓窗。故B「行經砧骨長支與鐙骨之間」錯誤(應為錘骨柄與砧骨長支之間)。","options":{"A":"錘骨外側突附著鼓膜,正確。","B":"稱鼓索行經砧骨長支與鐙骨之間—錯誤(應為錘骨柄與砧骨長支之間),為正解。","C":"砧骨主體位於鼓室上隱窩,正確。","D":"鐙骨基部連卵圓窗,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_115020-08":{"quick":"淚腺窩位於眼眶「外上方」(額骨顴突),不在內側壁;內側壁的是淚囊窩。","detail":{"background":"眼眶骨性標誌須區分:淚「腺」窩(fossa for lacrimal gland)位於眼眶外上角、額骨顴突處(容淚腺);淚「囊」窩(fossa for lacrimal sac)才位於眼眶「內側壁」(由淚骨與上頜額突構成,向下續為鼻淚管)。滑車小窩(trochlear fovea,上斜肌滑車附著處)位於額骨內上方;眶上孔/切跡位於額骨眶上緣;視神經管位於蝶骨小翼。故「淚腺窩位於內側壁」最不恰當(應在外上方)。","options":{"A":"滑車小窩位於額骨,正確。","B":"稱淚腺窩位於內側壁—最不恰當(應在外上方;內側壁為淚囊窩),為正解。","C":"眶上孔位於額骨,正確。","D":"視神經管位於蝶骨,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_115020-09":{"quick":"外頸動脈於舌骨體水平分出舌動脈,描述最恰當。","detail":{"background":"外頸動脈(ECA)約在「甲狀軟骨上緣(C3/C4)」由總頸動脈分出(非下緣),走於頸動脈三角,初期位於內頸動脈前內側、深於(非淺於)胸鎖乳突肌;其分支由下而上有:甲狀腺上動脈(甲狀軟骨上緣)、舌動脈(約舌骨體/大角水平)、顏面動脈、枕動脈、耳後動脈、咽升動脈,終支為上頜動脈與顳淺動脈。甲狀腺「下」動脈來自甲狀頸幹(鎖骨下動脈),不是ECA分支。故最恰當者為「近舌骨體水平分出舌動脈」。","options":{"A":"ECA由總頸動脈分出在甲狀軟骨「上」緣,非下緣。","B":"甲狀下動脈來自甲狀頸幹(鎖骨下動脈),非ECA。","C":"ECA位於胸鎖乳突肌深面,非其上(淺面)。","D":"舌動脈於舌骨體水平由ECA分出—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_115020-10":{"quick":"瞳孔擴張由交感神經(瞳孔擴大肌)執行,不經動眼神經。","detail":{"background":"動眼神經(CN III)的功能:體運動支配上直、下直、內直、下斜肌與提上眼瞼肌(司眼球上下內轉與睜眼);副交感(經E-
