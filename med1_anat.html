W核→睫狀神經節)支配瞳孔括約肌(縮瞳)與睫狀肌(調適)。瞳孔「擴張」則由「交感神經」節後纖維(頸上神經節→沿頸內動脈叢→睫狀長神經)支配瞳孔擴大肌(dilator pupillae),與動眼神經無關;交感受損即Horner症候群(縮瞳)。故不經動眼神經者為瞳孔擴張。","options":{"A":"睫狀體收縮(調適)由動眼神經副交感執行。","B":"瞳孔收縮由動眼神經副交感執行。","C":"眼球內側注視由動眼神經(內直肌)執行。","D":"瞳孔擴張由交感神經執行,不經動眼神經—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_115020-11":{"quick":"內翼肌屬咀嚼肌,由三叉下頜支(V3)支配,非顏面神經。","detail":{"background":"顏面神經(CN VII)支配第二鰓弓衍生的肌肉:所有表情肌(含頰肌buccinator)、頸闊肌(platysma)、鐙骨肌、莖突舌骨肌與二腹肌「後腹」。內翼肌(medial pterygoid)屬咀嚼肌(第一鰓弓),由三叉神經下頜支(V3)支配,與顏面神經無關。故不由顏面神經支配者為內翼肌。","options":{"A":"頰肌由顏面神經支配。","B":"內翼肌由三叉V3支配,非顏面神經—正解。","C":"闊頸肌由顏面神經支配。","D":"二腹肌後腹由顏面神經支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_115020-12":{"quick":"圓孔(foramen rotundum)位於眶上裂後側尾端、靠近蝶竇外壁。","detail":{"background":"蝶骨的孔道排列:眶上裂後內下端的延續處即「圓孔(foramen rotundum)」,位於蝶骨大翼根部、緊鄰蝶竇外側壁,內有三叉上頜支(V2)通過,連通中顱窩與翼腭窩。視神經管位於小翼根部(眶上裂內上方);後篩孔位於眼眶內側壁;乳突孔在顳骨乳突。故位於眶上裂後側尾端、近蝶竇外壁者為圓孔。","options":{"A":"後篩孔位於眼眶內側壁。","B":"圓孔位於眶上裂後尾端、近蝶竇外壁—正解。","C":"乳突孔位於顳骨乳突。","D":"視神經管位於蝶骨小翼根部、眶上裂內上方。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_115020-13":{"quick":"會厭軟骨上的味覺由迷走神經(CN X)傳遞。","detail":{"background":"迷走神經(CN X)司範圍廣:咽喉肌運動(經咽叢與喉神經)、咽喉與胸腹內臟感覺、胸腹臟器副交感,以及「會厭(epiglottis)區域的味覺」(經內喉神經傳入孤立核)。唾液腺分泌屬VII/IX副交感;耳咽管(咽鼓管)痛覺屬舌咽神經(IX);胸鎖乳突肌收縮屬副神經(XI)。故屬CN X支配者為會厭上的味覺。","options":{"A":"唾液腺分泌屬CN VII/IX副交感。","B":"耳咽管痛覺屬舌咽神經CN IX。","C":"會厭上味覺由迷走神經CN X傳遞—正解。","D":"胸鎖乳突肌收縮由副神經CN XI支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_115020-14":{"quick":"中咽縮肌起自舌骨(大角與小角),附著於舌骨。","detail":{"background":"咽縮肌的起點:上咽縮肌起自翼鉤、翼下頜縫與下頜骨;「中咽縮肌(middle pharyngeal constrictor)」起自舌骨大角、小角與莖突舌骨韌帶下端,故附著於舌骨;下咽縮肌起自甲狀軟骨與環狀軟骨。莖突咽肌起自顳骨莖突。故附著於舌骨者為中咽縮肌。","options":{"A":"上咽縮肌起自翼鉤/翼下頜縫/下頜骨。","B":"中咽縮肌起自舌骨—正解。","C":"下咽縮肌起自甲狀與環狀軟骨。","D":"莖突咽肌起自顳骨莖突。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Snell《臨床解剖學》"]}},"med1_106100-06":{"quick":"肋骨緣由第7–10肋的肋軟骨構成。","detail":{"background":"肋骨依與胸骨連接分類:第1–7肋為「真肋」(肋軟骨直接接胸骨);第8–10肋為「假肋」(肋軟骨依附上一肋軟骨間接接胸骨);第11–12肋為「浮肋」(前端游離)。第7–10對肋軟骨依序相連上行,在前正中下緣形成左右兩道斜行的「肋骨緣(costal margin)」,兩側於劍突下方會合成胸骨下角(infrasternal angle)。故肋骨緣由第7–10肋(肋軟骨)構成。","options":{"A":"3~4肋屬上胸真肋,非肋骨緣。","B":"5~6肋仍為真肋上部。","C":"第7~10肋肋軟骨構成肋骨緣—正解。","D":"11~12肋為浮肋,前端游離。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-20":{"quick":"心包橫竇前方為主動脈與肺動脈幹(兩條動脈流出道)。","detail":{"background":"心包橫竇(transverse pericardial sinus)是心包腔的一個通道,位於「動脈流出道後方、靜脈流入道前方」。以食指穿入橫竇時:指「前方(腹側)」為主動脈升部與肺動脈幹(兩條由心室發出的大動脈);指「後方」為上腔靜脈與左心房。心臟手術時外科醫師可經橫竇繞過大動脈以放置阻斷帶。故位於食指前方者為主動脈與肺動脈。","options":{"A":"肺動脈在前但下腔靜脈不在橫竇前。","B":"主動脈在前但上腔靜脈在橫竇後。","C":"主動脈與肺動脈皆在橫竇前—正解。","D":"肺靜脈與上腔靜脈位於橫竇後方。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-21":{"quick":"左肺門中,肺動脈位置最高。","detail":{"background":"肺門(肺根)內構造的排列左右略異:左肺門由上而下為「肺動脈→主支氣管→肺靜脈」,故左肺門最高者為肺動脈;右肺門則因有上葉支氣管(eparterial bronchus)位於肺動脈上方,最高者為支氣管。肺韌帶是肺根下方的兩層肋膜皺襞、位於最下方。記憶:左PA最高、右Bronchus最高。","options":{"A":"左肺門肺動脈位置最高—正解。","B":"肺靜脈位於肺門較下方。","C":"左主支氣管位於肺動脈下方。","D":"肺韌帶位於肺根下方,最低。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-22":{"quick":"頭臂動脈幹不發出肋間動脈。","detail":{"background":"肋間動脈的來源:上2對後肋間動脈來自肋頸幹(最上肋間動脈,源自鎖骨下動脈),其餘後肋間動脈(第3–11)來自胸主動脈;前肋間動脈來自內胸動脈(上6對)與其延續的肌膈動脈(下方)。頭臂動脈幹(brachiocephalic trunk)僅分出右總頸動脈與右鎖骨下動脈,不直接發出肋間動脈。故不發出肋間動脈者為頭臂動脈幹。","options":{"A":"頭臂動脈幹不發出肋間動脈—正解。","B":"內胸動脈發出上6對前肋間動脈。","C":"肌膈動脈發出下部前肋間動脈。","D":"胸主動脈發出第3–11後肋間動脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-23":{"quick":"右膈神經行於上腔靜脈與縱膈肋膜之間。","detail":{"background":"上縱隔內神經走向:右膈神經(right phrenic n.)沿右頭臂靜脈、上腔靜脈「外側」下行,夾在上腔靜脈與縱膈肋膜之間,續沿心包右側至橫膈—故C正確。其餘錯誤:右喉返神經繞「右鎖骨下動脈」(非右頭臂靜脈);左喉返神經繞「主動脈弓」(動脈韌帶處,非左鎖骨下動脈);左膈神經跨主動脈弓左前方、沿心包左側(左心室)下行,而非沿降主動脈。","options":{"A":"右喉返神經繞右鎖骨下動脈,非右頭臂靜脈—錯。","B":"左喉返神經繞主動脈弓,非左鎖骨下動脈—錯。","C":"右膈神經位於上腔靜脈與縱膈肋膜間—正確,為正解。","D":"左膈神經沿心包左側下行,非降主動脈—錯。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-24":{"quick":"肺動脈瓣的體表投影約在左側第三肋軟骨/第三肋間(胸骨左緣)。","detail":{"background":"心臟瓣膜的體表投影(聽診區與解剖投影不同):肺動脈瓣位於「左側第三肋軟骨」胸骨緣處(約左第三肋間),為四瓣中最高最左;主動脈瓣在胸骨左緣第三肋間稍下、後方;二尖瓣在左第四肋軟骨胸骨緣;三尖瓣在胸骨後正中下段。聽診區則順血流投射至下游(肺動脈瓣聽診在左第二肋間)。故肺動脈瓣解剖投影最接近左側第三肋間。","options":{"A":"左側第三肋間(胸骨左緣)—肺動脈瓣投影,正解。","B":"左第五肋間接近二尖瓣聽診區。","C":"右第四肋間非肺動脈瓣投影。","D":"右第六肋間過低且偏右。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-06":{"quick":"肺韌帶位於肺「根部(肺門)」下方。","detail":{"background":"肺韌帶(pulmonary ligament)是包繞肺根的臟層與壁層肋膜在肺門「下方」相互延續、向下懸垂形成的雙層肋膜皺襞,連於縱膈與肺內側面之間,其下緣游離。它提供肺根下方的空間讓肺靜脈在呼吸時得以擴張移動,並非位於肺尖、基底或肋骨面。故肺韌帶位於肺根部(肺門)下方。","options":{"A":"肺尖為肺上端,非肺韌帶位置。","B":"基底面為肺下面(對橫膈)。","C":"肋骨面為肺外側面。","D":"肺韌帶位於肺根部下方—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-20":{"quick":"冠狀動脈血流主要在心室舒張、主動脈瓣關閉時灌注。","detail":{"background":"冠狀動脈灌注的時相特性:左冠狀動脈供應的心肌在「收縮期」因心室壁內壓力擠壓血管,血流受阻;到「舒張期」心室鬆弛、主動脈瓣關閉後主動脈根部壓力仍高(舒張壓),血液乃經主動脈竇灌入冠狀動脈—故左冠狀血流主要在舒張期(主動脈瓣關閉時)。這也是為何心搏過速(縮短舒張期)與舒張壓過低會減少冠狀灌注、誘發心肌缺血。","options":{"A":"肺動脈瓣開啟屬右心室收縮射血,非冠狀灌注主時相。","B":"左心室收縮時冠狀血流反而受擠壓減少。","C":"主動脈瓣關閉(舒張期)時冠狀灌注最多—正解。","D":"右心房舒張與冠狀灌注時相無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-21":{"quick":"咳嗽反射最敏感處在氣管分叉的隆凸(carina)黏膜。","detail":{"background":"呼吸道受器敏感度分布:氣管下端分叉處的「隆凸(carina)」黏膜對機械與化學刺激最敏感,是引發咳嗽反射最強烈的部位(故插管或抽痰碰到隆凸易劇烈嗆咳);其傳入經迷走神經至延腦咳嗽中樞。愈往下游(主支氣管、節支氣管)咳嗽受器密度與敏感度遞減,細支氣管以下幾乎無咳嗽受器。故最敏感處為隆凸。","options":{"A":"隆凸(carina)黏膜咳嗽反射最敏感—正解。","B":"氣管敏感度次於隆凸。","C":"主支氣管敏感度較低。","D":"節支氣管已較不敏感。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-22":{"quick":"右頭臂靜脈匯入上腔靜脈處約在胸骨柄右緣(右第一肋軟骨後方)。","detail":{"background":"上腔靜脈由左、右頭臂靜脈匯合而成,匯合點約在「右第一肋軟骨與胸骨柄交界(胸骨柄右緣)」後方;上腔靜脈再沿胸骨右緣下行,於右第三肋軟骨高度注入右心房。故右頭臂靜脈匯入上腔靜脈處對應體表為胸骨柄右緣,此為中央靜脈導管尖端定位(導管末端宜位於上腔靜脈與右心房交界處)的重要參考。上腔靜脈收集頭頸、上肢與胸壁(經奇靜脈)的血液回右心房,管壁薄、壓力低,縱膈腫瘤壓迫可致上腔靜脈症候群(臉頸腫脹、頸靜脈怒張)。","options":{"A":"胸骨柄右緣(右第一肋軟骨後)—上腔靜脈形成處,正解。","B":"胸骨柄左緣對應主動脈弓起始區。","C":"胸骨體正下方為劍突,過低。","D":"右第三肋間為上腔靜脈入右心房處,非頭臂靜脈匯合處。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-23":{"quick":"內胸動脈是鎖骨下動脈的分支,不是主動脈的直接分支。","detail":{"background":"胸主動脈(降主動脈胸段)的直接臟支與壁支包括:支氣管動脈、食道動脈、心包動脈、縱膈動脈,以及後肋間動脈、肋下動脈與上膈動脈(壁支)。內胸動脈(internal thoracic a.)則是「鎖骨下動脈」的分支(沿胸骨旁下行,供前胸壁、發前肋間動脈,終為腹壁上動脈與肌膈動脈),並非主動脈直接分支。故不是主動脈直接分支者為內胸動脈。","options":{"A":"食道動脈為胸主動脈直接分支。","B":"後肋間動脈為胸主動脈直接分支。","C":"支氣管動脈為胸主動脈直接分支。","D":"內胸動脈為鎖骨下動脈分支,非主動脈直接分支—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-24":{"quick":"房室束(His束)主要由左前降支的中隔支供應,最不可能由右冠狀動脈供應。","detail":{"background":"冠狀動脈與傳導系統供應:右冠狀動脈(RCA)供應右心房、右心室大部、竇房結(約60%)、房室結(約90%,經房室結支)與節制帶(經前中隔支/第一中隔穿通支區);房室束(bundle of His)及其束支則主要由「左前降支(LAD)」的前中隔穿通支供應(雙重供應但以LAD為主)。故最不可能由RCA供應者為房室束。臨床:前壁心梗(LAD)易致束支傳導阻滯。","options":{"A":"右心房由RCA供應。","B":"房室結約90%由RCA供應。","C":"節制帶由前中隔支供應(含RCA優勢區),較可能。","D":"房室束(His束)主由LAD中隔支供應,最不可能RCA—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-05":{"quick":"胸骨柄正中穿刺最可能傷及其後方的主動脈弓。","detail":{"background":"胸骨柄(manubrium)後方為上縱隔,緊鄰的大血管由前而後/由右而左有:頭臂靜脈與上腔靜脈(偏右)、主動脈弓及其三大分支(頭臂幹、左總頸、左鎖骨下動脈)橫越於胸骨柄後方。胸骨柄「正中」深部正對主動脈弓,故正中穿刺傷最可能傷及主動脈弓。左心室與肺動脈幹位置較低(對應胸骨體/左側),上腔靜脈偏右。故答案為主動脈弓。","options":{"A":"主動脈弓位於胸骨柄正後方—正解。","B":"左心室位置較低、偏左下。","C":"肺動脈幹位於胸骨體上段左側,較低。","D":"上腔靜脈偏右,非正中。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-06":{"quick":"臍靜脈閉鎖後成為肝圓韌帶(ligamentum teres hepatis)。","detail":{"background":"胎兒循環構造出生後的退化殘跡:臍靜脈(umbilical vein,出生前帶含氧血由胎盤回胎兒)閉鎖成「肝圓韌帶(ligamentum teres)」,走於肝鐮韌帶游離緣內;靜脈導管→靜脈韌帶;臍動脈→臍內側韌帶與膀胱上動脈近段;卵圓孔→卵圓窩;動脈導管→動脈韌帶;臍尿管(urachus)→正中臍韌帶。肝鐮韌帶只是「容納」肝圓韌帶的腹膜皺襞、本身非臍靜脈殘跡。故臍靜脈殘跡為肝圓韌帶。","options":{"A":"肝鐮韌帶是容納肝圓韌帶的腹膜皺襞,非臍靜脈本身殘跡。","B":"肝圓韌帶為臍靜脈殘跡—正解。","C":"冠狀韌帶為肝的腹膜反折,與臍靜脈無關。","D":"正中臍韌帶為臍尿管(urachus)殘跡。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-20":{"quick":"卵圓孔溝通右心房與左心房,使胎兒血繞過肺循環。","detail":{"background":"胎兒循環的右至左分流有兩處:卵圓孔(foramen ovale)位於房中隔,讓含氧較高的血由「右心房」直接流入「左心房」(繞過尚未通氣的肺);動脈導管(ductus arteriosus)連接肺動脈幹與主動脈弓,讓右心室射出的血繞過肺。出生後肺循環阻力下降、左心房壓上升,卵圓孔的瓣膜被壓閉合成卵圓窩;若未閉合即卵圓孔未閉(PFO)。故卵圓孔溝通右心房與左心房。","options":{"A":"主動脈與肺動脈間溝通者為動脈導管。","B":"右心房與右心室間為三尖瓣。","C":"卵圓孔溝通右心房與左心房—正解。","D":"右心室與左心室間為室中隔(室間隔缺損才相通)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-21":{"quick":"縱膈與橫膈中央的壁層胸膜由膈神經支配,其痛覺轉移至頸/肩(C3–5)。","detail":{"background":"壁層胸膜的神經支配與轉移痛:肋胸膜與橫膈「周邊」由肋間神經支配(痛覺定位於局部胸壁);縱膈胸膜與橫膈「中央」則由「膈神經(phrenic nerve, C3–C5)」支配。由於膈神經源自C3–5,與頸肩部皮節同源,故刺激此區壁層胸膜的痛覺會「轉移」至頸部與肩部(C3–5皮節)。故下肺葉病灶刺激縱膈/橫膈中央胸膜引起的頸痛由膈神經引發。","options":{"A":"肋間神經司胸壁周邊胸膜,痛覺定位於局部胸壁。","B":"迷走神經為內臟感覺,不司壁層胸膜體痛。","C":"膈神經司縱膈/橫膈中央胸膜,轉移至頸肩—正解。","D":"交感幹傳內臟痛,非壁層胸膜體感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-22":{"quick":"肋下動脈不供應乳腺;乳腺由內胸動脈、外胸動脈與肋間動脈供應。","detail":{"background":"乳房(乳腺)的血供來源:(1)內胸動脈的穿通支(供內側大部,最主要);(2)外胸動脈與胸肩峰動脈(來自腋動脈,供外上部);(3)第2–4後肋間動脈的外側穿通支(供外側)。肋下動脈(subcostal artery)是胸主動脈在第12肋下方發出的壁支,供腹後壁,並不供應乳腺。故不負責乳腺血供者為肋下動脈。","options":{"A":"肋間動脈穿通支供乳腺外側。","B":"內胸動脈穿通支供乳腺內側(最主要)。","C":"外胸動脈供乳腺外上部。","D":"肋下動脈供腹後壁,不供乳腺—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-23":{"quick":"劍突與左肋下緣交點(劍突下徑路)穿刺可避開肋膜腔。","detail":{"background":"心包膜穿刺術(pericardiocentesis)的安全徑路為「劍突下(subxiphoid)」:於劍突與左肋弓交角處進針,針尖朝向左肩,沿胸骨後方向上進入心包腔下緣,可避開兩側肋膜腔(肺)與內胸動脈,降低氣胸與血管損傷風險,也最接近積液最低處。經肋間(如胸骨旁第5肋間)徑路雖可,但較易傷及肋膜或內胸動脈。故減低刺破肋膜腔機會者為劍突與左肋下緣交點。","options":{"A":"右側第六肋間易傷肋膜/肝。","B":"胸骨左側第三肋間近內胸動脈/肋膜。","C":"劍突與左肋下緣交點(劍突下徑路)避開肋膜—正解。","D":"右側第四肋間近肋膜腔。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-04":{"quick":"咳血的血多來自體循環高壓的支氣管動脈。","detail":{"background":"肺有雙重血供:肺動脈(低壓,攜缺氧血進行氣體交換)與支氣管動脈(來自胸主動脈/上肋間動脈,屬「體循環高壓」,供應支氣管壁與肺結締組織營養)。臨床上大量咳血(hemoptysis)多源自「支氣管動脈」(高壓系統,如支氣管擴張症、結核空洞、腫瘤侵蝕),故治療大咳血常用支氣管動脈栓塞。肺動脈出血壓力較低、較少造成大咳血(肺栓塞/動靜脈畸形例外)。故咳血血液最可能來自支氣管動脈。","options":{"A":"肺動脈為低壓系統,較少大量咳血。","B":"肺靜脈攜含氧血回左心,非典型咳血來源。","C":"支氣管動脈(體循環高壓)為大咳血主要來源—正解。","D":"支氣管靜脈為引流靜脈,非主要出血源。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-05":{"quick":"迷走神經隨食道經食道裂孔(esophageal hiatus, T10)進入腹腔。","detail":{"background":"橫膈三大孔道與通過構造:腔靜脈孔(caval opening, T8,中心腱)—下腔靜脈與右膈神經;食道裂孔(esophageal hiatus, T10,右膈腳肌纖維圍繞)—食道與「前、後迷走神經幹」;主動脈裂孔(aortic hiatus, T12,膈後方)—主動脈、胸管與奇靜脈。記憶「I ate ten eggs at noon」(IVC T8、esophagus T10、aorta T12)。故迷走神經經食道裂孔入腹。","options":{"A":"迷走神經隨食道經食道裂孔入腹—正解。","B":"主動脈孔通過主動脈、胸管、奇靜脈。","C":"腔靜脈孔通過下腔靜脈與右膈神經。","D":"正中弓狀韌帶為主動脈裂孔上緣,非迷走通路。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-20":{"quick":"房室結位於Koch三角內,最靠近冠狀竇開口。","detail":{"background":"房室結(AV node)位於右心房中隔壁的「Koch三角」內,此三角由三尖瓣中隔瓣附著線、Todaro腱與「冠狀竇開口」圍成;故房室結最靠近冠狀竇開口(其前上方)。節制帶位於右心室(攜右束支);下腔靜脈-右心房交界與界脊屬竇房結附近(竇房結位於上腔靜脈-右心房交界、界脊上端)。心臟電生理手術定位房室結即以Koch三角與冠狀竇口為標誌。","options":{"A":"節制帶位於右心室,非房室結處。","B":"下腔靜脈-右心房交界近Koch三角下界但非最靠近標誌。","C":"冠狀竇開口為Koch三角一界、最靠近房室結—正解。","D":"界脊上端近竇房結,非房室結。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-21":{"quick":"左下肺葉淋巴匯入下氣管支氣管(隆凸下)淋巴結。","detail":{"background":"肺淋巴引流:肺內淋巴沿「支氣管(非肺動脈)」走行,經肺淋巴結→支氣管肺(肺門)淋巴結→上、下氣管支氣管淋巴結(下者即隆凸下/carinal nodes)→氣管旁淋巴結→支氣管縱膈淋巴幹。左下肺葉淋巴匯入「下氣管支氣管(隆凸下)淋巴結」後多偏向右側引流(故左肺癌可轉移至右側縱膈)。隆凸下淋巴結並非「主動脈弓淋巴結」;右上肺葉淋巴引流入右淋巴幹/支氣管縱膈幹(非胸管)。故D正確。","options":{"A":"氣管分叉下淋巴結為下氣管支氣管(隆凸下)淋巴結,非主動脈弓淋巴結。","B":"右上肺葉淋巴引流至右側淋巴幹,非胸管。","C":"肺淋巴管主要與支氣管伴行,非肺動脈。","D":"左下肺葉淋巴匯入下氣管支氣管淋巴結—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-22":{"quick":"左側第一肋間靜脈通常匯入左頭臂靜脈,不入奇靜脈系統。","detail":{"background":"胸壁靜脈引流:右側後肋間靜脈匯入「奇靜脈(azygos)」;左側中下後肋間靜脈匯入「半奇靜脈/副半奇靜脈」再越中線注入奇靜脈;但「左側第一肋間靜脈」常單獨上行匯入「左頭臂靜脈」(或經左上肋間靜脈),不屬奇靜脈系統。故通常不匯入奇靜脈系統者為左側第一肋間靜脈。奇靜脈系統最終注入上腔靜脈,是上下腔靜脈間重要側支。","options":{"A":"左側第八肋間靜脈經半奇靜脈入奇靜脈系統。","B":"左側第一肋間靜脈匯入左頭臂靜脈,不入奇靜脈—正解。","C":"右側第三肋間靜脈入奇靜脈。","D":"右側第十肋間靜脈入奇靜脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-23":{"quick":"劍胸關節(xiphisternal joint)水平面對應T9椎骨。","detail":{"background":"胸部重要體表-椎骨對應:頸靜脈切跡約對T2/T3上緣;胸骨角(sternal angle, Louis角,對第2肋軟骨)對「T4/T5椎間盤」—是上下縱膈分界、主動脈弓起止、氣管分叉、奇靜脈匯入處的重要標誌;劍胸關節對「T9」;男性乳頭約在「第4肋間」。故正確配對為劍胸關節對T9。","options":{"A":"頸靜脈切跡約對T2/3,非C7。","B":"胸骨角對T4/5,非T2。","C":"劍胸關節對T9—正解。","D":"男性乳頭約在第4肋間,非第6。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-24":{"quick":"心外膜(臟層心包)由冠狀動脈供應血流。","detail":{"background":"心臟壁三層的血供:心肌(myocardium)與「心外膜(epicardium,即臟層漿膜心包)」由冠狀動脈分支供應;心內膜(endocardium)外層由冠狀動脈供應、但最內薄層部分靠心腔血液擴散營養;壁層心包(parietal pericardium)由心包膈動脈(來自內胸動脈)供應、非冠狀動脈;心瓣膜大致無血管、靠表面血液擴散營養。故四選項中明確由冠狀動脈供應者為心外膜。","options":{"A":"心內膜內薄層部分靠心腔血擴散,非全由冠狀動脈。","B":"壁層心包由心包膈動脈(內胸動脈)供應。","C":"心外膜由冠狀動脈供應—正解。","D":"心瓣膜無血管、靠擴散營養。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-07":{"quick":"心包橫竇將動脈群(升主動脈、肺動脈幹)與靜脈群(肺靜脈、上腔靜脈)分隔。","detail":{"background":"心包橫竇(transverse pericardial sinus)是漿膜心包在大血管周圍反折所形成的通道,位於「動脈流出道(升主動脈、肺動脈幹)後方」與「靜脈流入道(上腔靜脈、肺靜脈、左心房)前方」之間,等於把心臟上方的動脈群與靜脈群隔開。心包斜竇(oblique sinus)則是左心房後方、被肺靜脈與下腔靜脈圍成的盲囊。冠狀竇是心臟靜脈回流的總匯(入右心房)。故分隔動脈群與靜脈群者為橫竇。","options":{"A":"心包橫竇分隔動脈群與靜脈群—正解。","B":"心包斜竇為左心房後方盲囊。","C":"冠狀竇是心臟靜脈總匯。","D":"心包腔胸骨面非此分隔構造。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-20":{"quick":"動脈韌帶連於主動脈弓與左肺動脈之間(動脈導管殘跡)。","detail":{"background":"動脈韌帶(ligamentum arteriosum)是胎兒「動脈導管(ductus arteriosus)」出生後閉鎖的纖維殘跡,連接「主動脈弓下緣(左鎖骨下動脈起點遠端)」與「左肺動脈」之間。其重要臨床/解剖關係:左喉返神經繞行於動脈韌帶下方;此處也是減速性胸部外傷時主動脈最易斷裂的部位(因被韌帶固定)。故動脈韌帶位於主動脈與肺動脈之間。","options":{"A":"動脈韌帶位於主動脈(弓)與肺動脈之間—正解。","B":"肺動脈與上腔靜脈間無動脈韌帶。","C":"主動脈與上腔靜脈間無此韌帶。","D":"主動脈與肺靜脈間無此韌帶。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-21":{"quick":"抑制第二型肺泡上皮細胞分泌(表面張力素)與迷走神經無關。","detail":{"background":"迷走神經(副交感)在呼吸道的作用:傳入—咳嗽反射、肺擴張的Hering-Breuer反射(肺牽張受器經迷走抑制吸氣)、化學/刺激受器;傳出(副交感節後ACh經M3受體)—使支氣管平滑肌收縮、黏液腺分泌增加。第二型肺泡上皮(type II pneumocyte)分泌表面張力素(surfactant)主要受牽張、類固醇、β受體與發育因子調控,並非由迷走神經抑制其分泌。故與迷走神經無關者為「抑制type II肺泡上皮分泌」。","options":{"A":"咳嗽反射由迷走神經傳入,有關。","B":"Hering-Breuer肺擴張反射經迷走神經,有關。","C":"抑制type II肺泡細胞分泌與迷走神經無關—正解。","D":"迷走副交感使支氣管平滑肌收縮,有關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-23":{"quick":"胸腺主要位於上縱隔(並向下延伸至前縱隔)。","detail":{"background":"縱隔分區:以胸骨角(T4/5)平面分上、下縱隔;下縱隔再以心包分前、中、後。胸腺(thymus)主要位於「上縱隔」前部,並常向下延伸入「前縱隔」(胸骨後、心包前)。胸腺在青春期最大、之後退化為脂肪。前縱隔腫瘤的「4T」(thymoma胸腺瘤、teratoma畸胎瘤、thyroid胸骨後甲狀腺、terrible lymphoma淋巴瘤)即與此區有關。故胸腺主要位於上縱隔。","options":{"A":"胸腺主要位於上縱隔—正解。","B":"前下縱隔僅為胸腺向下延伸部分,非主要位置。","C":"中縱隔為心包與心臟所在。","D":"後縱隔為食道、降主動脈、奇靜脈所在。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-04":{"quick":"(本題多重答案)奇靜脈於右肺上葉內側造成壓跡(弓過右肺根上方)。","detail":{"background":"奇靜脈(azygos vein)沿胸椎右前方上行,至約T4高度向前弓越「右肺根上方」注入上腔靜脈,此弓在右肺內側面上部留下壓跡;少數人奇靜脈位置異常會在右肺上葉切出「奇靜脈葉(azygos lobe)」。故壓跡位於右肺上葉。本題官方公告為多重答案,主要正解為右肺上葉(若採奇靜脈葉/相關區域之延伸答案亦給分)。左肺側為主動脈弓與降主動脈造成的壓跡,非奇靜脈。","options":{"A":"奇靜脈弓於右肺上葉內側造成壓跡—正解。","B":"左肺上葉壓跡來自主動脈弓。","C":"右肺下葉非奇靜脈弓壓跡處。","D":"左肺下葉壓跡來自降主動脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-22":{"quick":"心臟纖維骨架不負責劃分冠狀動脈供血區域。","detail":{"background":"心臟纖維骨架(fibrous skeleton)由四個瓣環、左右纖維三角與膜性中隔等緻密結締組織構成,功能包括:(1)提供四個心瓣膜與心房心肌、心室心肌的附著支架;(2)電氣絕緣—阻隔心房與心室心肌的直接電傳導,使房室不同時收縮、迫使衝動只能經房室結/His束下傳(故心房先收縮、心室後收縮);(3)維持瓣口形狀、防止瓣環隨血流量過度擴張。它與「冠狀動脈供血區域的分界」無關(供血分界取決於冠狀動脈分支走向)。故最不相關者為C。","options":{"A":"提供瓣膜附著處,為其功能。","B":"電氣絕緣使心房心室不同時收縮,為其功能。","C":"劃分冠狀動脈供血區—與纖維骨架無關,為正解。","D":"維持瓣口、防止過度擴張,為其功能。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-23":{"quick":"肺栓塞通常造成肺梗塞而非肺塌陷(atelectasis)。","detail":{"background":"肺塌陷(atelectasis,肺泡萎陷)的機轉:(1)阻塞性—支氣管阻塞(痰栓、異物、腫瘤)使遠端肺泡氣體被吸收而塌陷;(2)壓迫性—氣胸、肋膜積液或腫塊壓迫使肺被動萎陷;(3)表面張力素不足(如新生兒RDS)。肺栓塞(pulmonary thrombosis/embolism)阻斷的是「肺動脈血流」,造成肺梗塞、通氣-灌流不匹配,但肺泡仍可通氣、通常不直接導致肺塌陷。故不會導致肺塌陷者為肺栓塞。","options":{"A":"氣胸壓迫致肺塌陷。","B":"肋膜積液壓迫致肺塌陷。","C":"肺栓塞阻斷血流(致梗塞),通常不致肺塌陷—正解。","D":"支氣管阻塞致吸收性肺塌陷。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-24":{"quick":"內胸動脈走在胸橫肌與肋軟骨(胸壁)之間。","detail":{"background":"內胸動脈(internal thoracic a.)為鎖骨下動脈分支,沿胸骨外側約1.25 cm垂直下行,行於上6肋軟骨的「後面」;其深面(後方)為胸橫肌(transversus thoracis)與壁層肋膜,淺面(前方)為肋軟骨與內肋間肌。換言之它走在「胸橫肌與肋軟骨之間」(胸橫肌之前、肋軟骨之後)。沿途發出前肋間動脈、心包膈動脈與穿通支(供乳腺),於第6肋間分為腹壁上動脈與肌膈動脈。冠狀動脈繞道手術常取內胸動脈作橋。","options":{"A":"壁層肋膜在內胸動脈深面,非其內側貼著。","B":"胸橫肌與壁層肋膜之間並非內胸動脈走行處。","C":"胸橫肌與肋軟骨之間—正解。","D":"內胸動脈在胸骨外側約1.25cm,非正下方。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-26":{"quick":"共有11個肋間隙;肋間隙以其上方肋骨命名。","detail":{"background":"肋間隙(intercostal space):12對肋骨之間共有「11」個肋間隙,每個肋間隙以其「上方」的肋骨命名(如第5肋間隙位於第5與第6肋骨之間)。肋間神經與血管走在肋溝內、位於「內肋間肌與最內肋間肌之間」,排列順序由上而下為靜脈-動脈-神經(VAN);故胸腔穿刺應在肋骨「上緣」進針以避開神經血管束。長胸神經支配前鋸肌、走於胸壁外側表面,不穿入肋間。故正確者為「共11個肋間隙」。","options":{"A":"第5肋間是第5與第6肋骨間(以上方肋命名),非第4與第5之間。","B":"共有11個肋間隙—正解。","C":"長胸神經支配前鋸肌、不穿入肋間。","D":"肋間神經走於內肋間肌與最內肋間肌之間,非外/內肋間肌之間。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-03":{"quick":"下甲狀腺靜脈通常回流至頭臂靜脈(brachiocephalic vein)。","detail":{"background":"甲狀腺靜脈引流:上、中甲狀腺靜脈匯入「內頸靜脈」;下甲狀腺靜脈(inferior thyroid vein)則由甲狀腺下極下行、於氣管前形成靜脈叢,通常匯入「左頭臂靜脈(brachiocephalic vein)」(亦可注入右頭臂)。氣管切開術於下甲狀腺靜脈叢處須注意止血。故下甲狀腺靜脈回流至頭臂靜脈。","options":{"A":"上、中甲狀腺靜脈匯入內頸靜脈,非下甲狀腺靜脈。","B":"外頸靜脈引流頭皮淺層,非甲狀腺。","C":"下甲狀腺靜脈回流至頭臂靜脈—正解。","D":"鎖骨下靜脈引流上肢,非下甲狀腺靜脈主回流。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-07":{"quick":"右肺水平裂前方約在第4肋(第4肋軟骨)。","detail":{"background":"右肺有斜裂與水平裂(左肺僅斜裂)。表面投影:斜裂約沿第6肋(腋中線第5肋、後方T2棘突附近);右肺「水平裂(horizontal fissure)」由斜裂分出,水平向前約沿「第4肋/第4肋軟骨」走至胸骨,分隔右上葉與右中葉。聽診右中葉即在右前胸第4肋下方。故水平裂前方約在第4肋。","options":{"A":"第2肋過高。","B":"水平裂前方約在第4肋—正解。","C":"第6肋約為斜裂下端前方。","D":"第8肋過低(近肺下緣)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-21":{"quick":"肋間神經與心包膜的神經支配較無關聯。","detail":{"background":"心包膜的神經支配:纖維心包與壁層漿膜心包的「軀體感覺(痛覺)」由膈神經(phrenic n., C3–5)支配,故心包炎痛常轉移至頸肩;臟層漿膜心包與心臟則由迷走神經(內臟感覺/副交感)與交感神經幹(交感,傳心臟內臟痛、調節心率)支配。肋間神經支配胸壁,與心包膜支配較無關聯。故最無關者為肋間神經。","options":{"A":"迷走神經參與心臟/臟層心包支配。","B":"膈神經司纖維/壁層心包痛覺。","C":"交感神經幹支配心臟、傳心痛。","D":"肋間神經支配胸壁,與心包支配較無關—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-22":{"quick":"胸膜腔向上延伸到頸部(頸胸膜頂超出第一肋上方)。","detail":{"background":"胸膜腔(pleural cavity)是臟層與壁層胸膜之間的潛在腔隙、內含少量漿液(非空氣),左右「各自獨立、不相通」;肺被臟層胸膜包覆並內陷入腔,故肺位於胸膜腔「外」(被胸膜包著),胸膜腔本身為潛在腔。胸膜頂(頸胸膜/cupola)向上延伸超過第一肋頸約2–3 cm至頸根部,故頸部穿刺或鎖骨上手術可能傷及肺尖造成氣胸。故正確者為「向上延伸到頸部」。","options":{"A":"左右胸膜腔各自獨立、不相通。","B":"胸膜腔(胸膜頂)向上延伸到頸部—正解。","C":"胸膜腔為潛在腔、含少量漿液,非新鮮空氣。","D":"肺被臟層胸膜包覆、位於胸膜腔外(內陷其中)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-23":{"quick":"右側肋間靜脈血「直接」匯入奇靜脈,而非透過半奇靜脈;半奇靜脈在左側。","detail":{"background":"奇靜脈系統:奇靜脈(azygos)位於脊柱右前方,接收「右側」後肋間靜脈(直接匯入)、右上肋間靜脈、支氣管與食道靜脈,並接收左側經半奇靜脈/副半奇靜脈越中線而來的血,最後弓越右肺根注入上腔靜脈,是上下腔靜脈間重要側支(下肢/腰靜脈血可經升腰靜脈→奇靜脈回流)。半奇靜脈(hemiazygos)位於「左側」。故「右側肋間靜脈血透過半奇靜脈匯入奇靜脈」錯誤(右側為直接匯入)。","options":{"A":"奇靜脈匯入上腔靜脈,正確。","B":"腰靜脈經升腰靜脈可匯入奇靜脈,正確。","C":"稱右側肋間靜脈血透過半奇靜脈匯入—錯誤(右側直接入奇靜脈;半奇靜脈在左),為正解。","D":"左上肋間靜脈匯入左頭臂靜脈,不入奇靜脈,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-25":{"quick":"心臟靜脈主要匯流至冠狀竇(coronary sinus),再注入右心房。","detail":{"background":"心臟靜脈回流三系統:(1)大部分經「冠狀竇(coronary sinus)」—位於房室溝後方,收集心大、心中、心小靜脈與左心室後靜脈,注入右心房;(2)前心靜脈直接注入右心房;(3)最小心靜脈(Thebesian veins)直接開口於各心腔。故心臟靜脈主要匯流至冠狀竇。冠狀竇開口位於Koch三角,鄰近房室結。","options":{"A":"心臟靜脈主要匯入冠狀竇—正解。","B":"左心房接受肺靜脈,非心臟靜脈主匯。","C":"右心室非心臟靜脈總匯。","D":"上腔靜脈收集上半身體靜脈,非心臟靜脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-16":{"quick":"上五個胸交感神經節發出節後纖維,支配胸腔內器官(心、肺、食道)。","detail":{"background":"胸交感神經幹有約11–12個節,以白交通支(節前)與灰交通支(節後)和胸脊神經相連。其節後纖維去向:上5個胸神經節發出的節後纖維組成心、肺、食道神經叢,支配「胸腔內器官」(心臟加速、支氣管擴張等);下方胸神經節(約T5–T12)的「節前」纖維則不在此換元,而是組成內臟大、小神經(splanchnic),下行至腹腔的椎前神經節(腹腔節、上腸繫膜節)換元後才支配腹腔臟器。故最恰當者為C(上五節後纖維支配胸腔器官)。","options":{"A":"交感節亦經灰交通支支配體壁(血管、汗腺、立毛肌),非只臟器。","B":"以白交通支(節前)與灰交通支(節後)兩者相連,非僅灰交通支。","C":"上五胸節節後纖維支配胸腔器官—正解。","D":"下方胸節是發出內臟神經(節前)至腹腔椎前節換元,非直接節後支配腹腔。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-17":{"quick":"左側優勢冠狀動脈指後室間支(後降支)由左冠狀動脈(迴旋支)發出。","detail":{"background":"冠狀動脈優勢(dominance)以「後室間支(posterior interventricular/posterior descending artery, PDA)」的來源判定:約70%人由右冠狀動脈發出PDA→「右優勢」;約10%由左迴旋支發出PDA→「左優勢(left dominant)」;約20%兩者共同供應→「均衡型」。PDA供應後室間隔與後下壁,並常供房室結。前室間支(LAD)恆由左冠狀動脈發出,與優勢判定無關。故左優勢指後室間支來自左冠狀動脈。","options":{"A":"前室間支恆來自左冠狀動脈,與優勢判定無關。","B":"前室間支不來自右冠狀動脈。","C":"後室間支來自左冠狀動脈=左優勢—正解。","D":"後室間支來自右冠狀動脈為右優勢。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-18":{"quick":"咳血最常源自體循環高壓的支氣管動脈系統。","detail":{"background":"肺雙重血供中,支氣管動脈(來自胸主動脈或上肋間動脈)屬體循環、壓力高,供應支氣管壁與肺結締組織營養;肺動脈壓力低、負責氣體交換。大量咳血(hemoptysis)約90%源自「支氣管動脈系統」(如支氣管擴張症、結核、慢性發炎或腫瘤侵蝕高壓血管),故介入治療常採支氣管動脈栓塞。肺動脈系統壓力低,較少造成大咳血。故最常發生於支氣管動脈系統。","options":{"A":"肺動脈系統低壓,較少大咳血。","B":"肺靜脈攜含氧血回左心,非主因。","C":"支氣管動脈系統(體循環高壓)為咳血最常來源—正解。","D":"支氣管靜脈為引流靜脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-19":{"quick":"胸管經主動脈裂孔(aortic hiatus, T12)穿通胸腹腔。","detail":{"background":"橫膈主動脈裂孔(aortic hiatus,位於T12、兩膈腳與正中弓狀韌帶之間,屬「膈後方」非真正穿膈肌)通過三構造:主動脈、胸管(thoracic duct)與奇靜脈(及半奇靜脈)。記憶「主動脈裂孔有AAT」(Aorta、Azygos、Thoracic duct)。食道經食道裂孔(T10);下腔靜脈經腔靜脈孔(T8);內胸動脈走前胸壁、其延續肌膈與腹壁上動脈穿膈前部,皆非主動脈裂孔。故經主動脈裂孔者為胸管。","options":{"A":"胸管經主動脈裂孔—正解。","B":"食道經食道裂孔(T10)。","C":"內胸動脈走前胸壁,不經主動脈裂孔。","D":"下膈靜脈不經主動脈裂孔。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-14":{"quick":"右後胸壁血液主要回流至奇靜脈(azygos vein)。","detail":{"background":"胸壁靜脈引流:右側後肋間靜脈直接匯入位於脊柱右前方的「奇靜脈(azygos)」;左側中下後肋間靜脈匯入半奇靜脈/副半奇靜脈,再越中線注入奇靜脈;內胸靜脈引流前胸壁。故右後胸壁(右後肋間靜脈)主要回流至奇靜脈,奇靜脈再弓越右肺根注入上腔靜脈。","options":{"A":"內胸靜脈引流前胸壁。","B":"半奇靜脈引流左下後胸壁。","C":"副半奇靜脈引流左上後胸壁。","D":"右後胸壁主要回流至奇靜脈—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-15":{"quick":"壁層漿膜心包的痛覺由膈神經(phrenic nerve)傳遞。","detail":{"background":"心包的感覺:纖維心包與壁層漿膜心包(parietal serous pericardium)的軀體痛覺由「膈神經(phrenic nerve, C3–5)」傳遞,故心包炎的疼痛常為尖銳、隨呼吸/姿勢變化,並轉移至頸肩(C3–5皮節);臟層漿膜心包(覆於心臟表面)則由自律神經(迷走、交感)支配、痛覺不明顯。肋間神經支配胸壁,非心包。故壁層漿膜心包痛覺由膈神經傳遞。","options":{"A":"肋間神經司胸壁,非壁層心包。","B":"迷走神經屬內臟感覺,非壁層心包體痛。","C":"交感神經幹傳心臟內臟痛。","D":"膈神經傳壁層漿膜心包痛覺—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-16":{"quick":"單一支氣管肺節段有獨立的節段支氣管與血管,可被手術單獨切除而不影響鄰段。","detail":{"background":"支氣管肺節段(bronchopulmonary segment)是肺的解剖與外科功能單位,特徵:每段由一條「節段(三級)支氣管」與一條節段「肺動脈」供應(兩者同行於段中央);肺靜脈則走在「段與段之間(intersegmental)」作為界線。因各段有獨立的支氣管與動脈,故可施行「肺節段切除術(segmentectomy)」移除單一段而不影響鄰段。左右肺典型各10段(左肺部分相鄰段常合併成8–9段)。故D最恰當。","options":{"A":"每段由「節段支氣管(三級支氣管)」供應,非細支氣管。","B":"相鄰段合併者主要是「左」肺(成8–9段),非右肺。","C":"肺「靜脈」走段間;肺動脈走段「內」中央。","D":"單一節段可獨立手術切除—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-32":{"quick":"胸心包膜形成纖維心包與漿膜心包「壁層」,不形成臟層。","detail":{"background":"胚胎發育中,胸心包膜(pleuropericardial membrane,內含總主靜脈與膈神經)由體壁向中線生長、左右會合,將心包腔與胸膜腔分隔開,並發育成「纖維心包」與漿膜心包的「壁層(parietal layer)」。漿膜心包的「臟層(visceral layer/epicardium)」則來自心臟外面的臟壁中胚層(由心臟發育而來),並非胸心包膜形成。故「形成漿膜心包臟層」錯誤。","options":{"A":"稱形成漿膜心包臟層—錯誤(胸心包膜形成壁層/纖維心包,臟層由心外膜來),為正解。","B":"膜內含總主靜脈,正確。","C":"膜內含膈神經,正確。","D":"此膜分隔胸膜腔與心包腔,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-14":{"quick":"隔緣肉柱(節制帶)連接室間隔與右心室前乳頭肌,內含右束支。","detail":{"background":"隔緣肉柱(septomarginal trabecula),即「節制帶(moderator band)」,是右心室內由室間隔下部橫跨至「右心室前乳頭肌」基部的肌肉橋,其內含右束支(right bundle branch)的傳導纖維,可使衝動快速傳至前乳頭肌、協調三尖瓣關閉;它也限制右心室過度擴張(故名moderator)。左心室乳頭肌與右心室「後」乳頭肌皆非其連接對象。","options":{"A":"左心室前乳頭肌非其連接對象。","B":"左心室後乳頭肌非其連接對象。","C":"右心室後乳頭肌非節制帶連接者。","D":"節制帶連室間隔與右心室前乳頭肌—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-15":{"quick":"心中靜脈(middle cardiac vein)伴行後室間支動脈走後室間溝。","detail":{"background":"冠狀循環的動靜脈伴行:前室間溝—前室間支動脈(LAD)與心大靜脈(great cardiac vein);後室間溝—後室間支動脈(PDA)與「心中靜脈(middle cardiac vein)」;冠狀溝右側—右冠狀動脈與心小靜脈。心大、心中、心小靜脈最後皆匯入冠狀竇入右心房。故伴行後室間支走後室間溝者為心中靜脈。","options":{"A":"心大靜脈伴行前室間支走前室間溝。","B":"心中靜脈伴行後室間支走後室間溝—正解。","C":"心小靜脈走右冠狀溝。","D":"心後靜脈走左心室後面,非後室間溝。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-16":{"quick":"右主支氣管較粗短且走向較垂直,異物較易進入。","detail":{"background":"氣管約在「胸骨角(T4/T5)」高度分為左右主支氣管。右主支氣管較「短、粗且走向較垂直」,故吸入異物(及插管過深)較易進入右側(尤其右下葉),這是臨床重要考點。左主支氣管較細長水平、需跨越主動脈弓與食道前。主支氣管「進入肺門後」才分為葉支氣管;細支氣管(bronchiole)管壁「不含軟骨」(靠平滑肌與彈性纖維維持),這也是細支氣管易在氣喘時塌陷的原因。故B最恰當。","options":{"A":"氣管約在T4/5(胸骨角)分支,非T2。","B":"右主支氣管較垂直、異物易入—正解。","C":"葉支氣管多在進入肺門後才分出。","D":"細支氣管管壁不含軟骨。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-17":{"quick":"假肋(第8–10肋)與胸椎橫突有肋橫突關節。","detail":{"background":"肋骨分類:真肋(第1–7對,肋軟骨直接接胸骨);假肋(第8–12對);其中第8–10對肋軟骨「間接」附著於上一肋軟骨,第11–12對前端游離稱浮肋。後端關節:第1–10肋的肋結節與胸椎橫突形成「肋橫突關節(costotransverse joint)」,故假肋中的第8–10肋有此關節;浮肋(11、12)則無肋橫突關節。各肋下緣皆有肋溝(走神經血管)。故正確者為「有肋橫突關節附著點」。","options":{"A":"假肋為第8–12對(第7為真肋),非7~12。","B":"假肋不直接附著胸骨(8–10間接、11–12游離)。","C":"假肋(8–10)有肋橫突關節—正解。","D":"肋骨下緣有肋溝,非沒有。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-14":{"quick":"肋骨部壁層胸膜的感覺由肋間神經傳遞。","detail":{"background":"壁層胸膜的神經支配與痛覺定位:肋骨部(costal)與橫膈周邊部壁層胸膜由「肋間神經」支配,痛覺定位準確、投射於相應胸壁皮節(故肋膜炎胸痛隨呼吸劇增、定位於局部胸壁);縱膈與橫膈中央部壁層胸膜由膈神經(C3–5)支配,痛覺轉移至頸肩。臟層胸膜由自律神經支配、無體痛覺。故肋骨部壁層胸膜感覺由肋間神經傳遞。","options":{"A":"肋間神經傳肋骨部壁層胸膜感覺—正解。","B":"迷走神經屬內臟感覺,非壁層胸膜體痛。","C":"交感神經幹傳內臟痛。","D":"膈神經司縱膈/橫膈中央部胸膜。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-15":{"quick":"房室結約90%由右冠狀動脈(經房室結支)供應。","detail":{"background":"冠狀動脈與心臟傳導:竇房結約60%由右冠狀動脈、40%由左迴旋支供應;房室結約「90%由右冠狀動脈」(其在後室間溝起點附近發出房室結支)供應、10%由左迴旋支;房室束與束支則主要由前室間支(LAD)的中隔穿通支供應。故下壁心梗(右冠狀動脈)易併房室結缺血而出現房室傳導阻滯與心搏過緩。故供應房室結者主要為右冠狀動脈。","options":{"A":"前室間支主供房室束/束支,非房室結。","B":"左邊緣動脈供左心室側壁。","C":"右冠狀動脈供應房室結(約90%)—正解。","D":"左冠狀動脈(迴旋支)僅約10%供房室結。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-16":{"quick":"支氣管動脈右側主幹常源自「第三」後肋間動脈(或上左支氣管動脈),非左側第二肋間動脈。","detail":{"background":"支氣管動脈(bronchial artery)為肺的營養性血供:左側通常有2條,直接由胸主動脈發出;右側通常1條,常源自「第三」右後肋間動脈(或自上方的左支氣管動脈共幹),非「左側第二肋間動脈」。它供應支氣管壁、肺結締組織、臟層胸膜與部分食道。故A敘述錯誤(右主幹來源描述不正確)。","options":{"A":"稱主幹由左側第二肋間動脈分出—錯誤(右支氣管動脈常源自第三後肋間動脈),為正解。","B":"供應部分肺組織與支氣管本身,正確。","C":"供應部分食道,正確。","D":"供應部分胸膜,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-14":{"quick":"上甲狀腺靜脈通常注入內頸靜脈。","detail":{"background":"甲狀腺靜脈引流:上甲狀腺靜脈(superior thyroid vein,伴上甲狀腺動脈)與中甲狀腺靜脈匯入「內頸靜脈」;下甲狀腺靜脈則經氣管前靜脈叢匯入左頭臂靜脈。故上甲狀腺靜脈通常注入內頸靜脈。外頸靜脈引流頭皮淺層;前頸靜脈引流頸前淺層,皆非上甲狀腺靜脈主回流。","options":{"A":"外頸靜脈引流頭皮淺層。","B":"上甲狀腺靜脈注入內頸靜脈—正解。","C":"頭臂靜脈接受下甲狀腺靜脈。","D":"前頸靜脈引流頸前淺層。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-15":{"quick":"左心房正後方(心臟基部後方)緊鄰食道。","detail":{"background":"心臟基部(base)主要由左心房構成、朝向後方;其正後方緊鄰「食道」(及其後的降主動脈與脊椎)。故左心房擴大(如二尖瓣狹窄)可壓迫食道,在鋇劑食道攝影呈後壓痕,亦可經食道超音波(TEE)清楚觀察左心房與二尖瓣。氣管在更上方分叉;右主支氣管偏右上;降主動脈在食道後方偏左。故左心房正後方器官為食道。","options":{"A":"氣管位於上縱隔較上方。","B":"降主動脈位於食道後方偏左。","C":"食道緊鄰左心房正後方—正解。","D":"右主支氣管位於肺門偏右上。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-16":{"quick":"肺動脈幹約在T4/T5(胸骨角)高度分為左右肺動脈。","detail":{"background":"肺動脈幹由右心室漏斗部發出,於心包內上行,約在「第4/第5胸椎(胸骨角平面)」高度、主動脈弓凹側下方分為左、右肺動脈;左肺動脈經動脈韌帶連於主動脈弓、入左肺門上部,右肺動脈較長、橫過中線經升主動脈與上腔靜脈後方入右肺門。此分叉高度與氣管分叉、主動脈弓同屬胸骨角(T4/5)平面的重要標誌。","options":{"A":"第4/5胸椎(胸骨角)高度—正解。","B":"T6/7過低。","C":"T1/2過高(近胸廓入口)。","D":"T2/3仍偏高。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-18":{"quick":"胸管在後縱隔走於食道與脊椎之間(奇靜脈與降主動脈之間)。","detail":{"background":"胸管(thoracic duct)為全身最大淋巴管,起自乳糜池(L1/L2),經主動脈裂孔入胸,於後縱隔沿脊柱前方上行,位置在「食道後方、脊椎前方」之間,並介於右側奇靜脈與左側降主動脈之間;上行至頸部注入左鎖骨下靜脈與左內頸靜脈交角。故其在縱隔的位置為食道與脊椎之間。胸部食道手術易傷胸管致乳糜胸。","options":{"A":"胸管在食道與脊椎之間—正解。","B":"氣管與食道之間為氣管食道溝(走喉返神經),非胸管。","C":"胸主動脈與脊椎之間非胸管主走行(胸管偏右)。","D":"奇靜脈與交感幹之間非胸管。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-19":{"quick":"迷走神經幹隨食道經食道裂孔(T10)入腹。","detail":{"background":"橫膈三孔:腔靜脈孔(T8)過下腔靜脈與右膈神經;食道裂孔(T10)過食道與「前、後迷走神經幹」;主動脈裂孔(T12)過主動脈、胸管、奇靜脈。故經食道裂孔由胸入腹者為迷走神經幹(隨食道)。迷走神經在食道下段形成食道叢,再聚成前、後迷走幹隨食道穿食道裂孔,於腹腔支配胃腸至橫結腸前2/3。","options":{"A":"胸管經主動脈裂孔。","B":"主動脈經主動脈裂孔。","C":"迷走神經幹經食道裂孔入腹—正解。","D":"下腔靜脈經腔靜脈孔。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-14":{"quick":"右心房前半部(右心耳)有最發達的梳狀肌。","detail":{"background":"梳狀肌(pectinate muscle)是心房內壁平行排列的肌脊,主要分布於「右心房前半部與右心耳」,以界脊(crista terminalis)與後半部光滑壁(源自靜脈竇)為界—界脊前為粗糙的原始心房(梳狀肌發達),界脊後光滑。左心耳內也有梳狀肌但較少。心室內為肉柱(trabeculae carneae)而非梳狀肌。故最發達梳狀肌在右心房前半部。","options":{"A":"左心房後半部源自肺靜脈、壁光滑。","B":"右心房前半部(右心耳)梳狀肌最發達—正解。","C":"左心室內為肉柱,非梳狀肌。","D":"右心室內為肉柱,非梳狀肌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-16":{"quick":"縱膈部壁層胸膜由膈神經(C3–5)支配,轉位痛出現在頸外側與鎖骨上方。","detail":{"background":"縱膈部(與橫膈中央部)壁層胸膜由膈神經(phrenic nerve, C3–C5)支配;因C3–5也供應頸根與肩部皮膚(鎖骨上神經),故此處胸膜發炎的痛覺會「轉移」至同側頸部外側與鎖骨上方(C3–5皮節),而非局部胸壁。對比:肋骨部壁層胸膜由肋間神經支配,痛覺定位於相應胸壁。故縱膈胸膜炎轉位痛在頸部外側與鎖骨上方。","options":{"A":"頸外側與鎖骨上方(C3–5皮節)—正解。","B":"前胸第四肋間屬肋間神經(肋骨部胸膜)定位。","C":"手臂內側腋下屬T1/T2皮節,非膈神經。","D":"背部肩胛下方非膈神經轉位區。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-17":{"quick":"左、右主支氣管的分叉(隆突下)夾角約60–70度,非150度。","detail":{"background":"氣管於胸骨角(T4/5)平面分為左右主支氣管,分叉處內面有隆突(carina)。左右主支氣管之間的「隆突下夾角」正常約60–70度(非150度);右主支氣管較寬、短且垂直(異物易入),左主支氣管較細長水平。氣管軟骨為16–20個C型(馬蹄形)軟骨環、後方缺口由氣管肌與膜封閉,僅隆突處軟骨形態特殊。故C(夾角約150度)錯誤。","options":{"A":"氣管在胸骨角平面分叉,正確。","B":"右支氣管較寬且垂直,正確。","C":"稱左右支氣管夾角約150度—錯誤(約60–70度),為正解。","D":"氣管軟骨多為C型(隆突除外),正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-14":{"quick":"外頸動脈位於頸動脈三角內,不在肌三角內。","detail":{"background":"頸前三角再分四個小三角:肌三角(muscular triangle,由舌骨、胸鎖乳突肌前緣與肩胛舌骨肌上腹圍成)內含舌骨下肌群(胸骨舌骨、胸骨甲狀、甲狀舌骨肌)、甲狀腺、副甲狀腺、氣管與食道;頸動脈三角(carotid triangle)內才有頸總/內/外動脈、內頸靜脈與CN X、XII等。故外頸動脈不在肌三角內(在頸動脈三角)。","options":{"A":"胸骨甲狀肌在肌三角內。","B":"甲狀腺在肌三角內。","C":"氣管在肌三角內。","D":"外頸動脈在頸動脈三角,不在肌三角—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-17":{"quick":"心包橫竇位於上腔靜脈(及左心房)的前方、動脈流出道的後方。","detail":{"background":"心包橫竇(transverse pericardial sinus)是漿膜心包反折形成的橫向通道,夾在「前方的動脈流出道(升主動脈、肺動脈幹)」與「後方的靜脈流入道(上腔靜脈、左心房)」之間。故相對於上腔靜脈而言,橫竇位於其「前方」;相對於升主動脈/肺動脈幹則位於其後方。它不在肺靜脈後方、左心房下方,也不是夾在肺動脈幹與主動脈「之間」(此兩動脈並列、橫竇在其共同後方)。故最恰當為「位在上腔靜脈前方」。","options":{"A":"橫竇位於上腔靜脈前方—正解。","B":"橫竇在肺靜脈前上方,非其後方。","C":"橫竇不在左心房下方(斜竇才在左心房後)。","D":"橫竇在主動脈與肺動脈幹「共同後方」,非夾在兩者之間。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-18":{"quick":"右邊緣支供應右心室,栓塞最不會造成左心房/左心室前側壁/心尖/室間隔缺氧。","detail":{"background":"冠狀供血分區:前室間支(LAD)供左心室前壁、心尖與室間隔前2/3;左迴旋支供左心房與左心室側壁/後壁;後室間支(PDA)供室間隔後1/3與後下壁;右邊緣支(right marginal)則供「右心室」前外側壁。題目所列受累區(左心房、左心室前壁與側壁、心尖、室間隔)分別屬LAD與迴旋支供應範圍,與「右邊緣支」無關。故右邊緣支栓塞最不會造成這些區域缺氧。","options":{"A":"前室間支供左心室前壁/心尖/室間隔,栓塞會致該區缺氧。","B":"後室間支供室間隔後部,相關。","C":"右邊緣支供右心室,最不致上述左側區缺氧—正解。","D":"左迴旋支供左心房與左心室側壁,相關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-15":{"quick":"心臟前面絕大部分由右心室占據。","detail":{"background":"心臟各面構成:前面(胸肋面)絕大部分由「右心室」構成(加少許右心房與左心室);下面(橫膈面)主要由左心室與部分右心室;後面(基部)主要由左心房;右緣由右心房、左緣由左心室與左心耳。故心臟前面以右心室為主—這也是胸前心臟穿刺傷或心包穿刺最易接觸右心室的解剖基礎。","options":{"A":"左心房構成心臟基部(後面)。","B":"左心室主要構成左緣與下面。","C":"右心房構成右緣。","D":"右心室占心臟前面絕大部分—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-16":{"quick":"於肋軟骨內面,肋間神經走在肋間內肌與胸內筋膜/胸橫肌之間。","detail":{"background":"肋間神經血管束在肋間隙的層次因部位而異:於肋角至胸壁中段,神經血管走在「肋間內肌與最內肋間肌之間」的肋溝內(VAN由上而下);但在「前胸肋軟骨內面」處,最內肋間肌被「胸橫肌(transversus thoracis)」取代,故此處肋間神經走在「肋間內肌與胸內筋膜/胸橫肌之間」。故肋軟骨內面的肋間神經位置為選項A所述。","options":{"A":"肋軟骨內面:肋間神經在肋間內肌與胸內筋膜/胸橫肌之間—正解。","B":"外肋間肌與內肋間肌之間非神經主走行層。","C":"肋間內肌與最內肋間肌之間為「肋角至中段」的位置,非肋軟骨內面。","D":"最內肋間肌與胸內筋膜之間非此處描述(前胸最內肌已由胸橫肌取代)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-17":{"quick":"右肺動脈走在升主動脈(及上腔靜脈)的後方。","detail":{"background":"肺動脈幹解剖關係:其開口(肺動脈瓣)位於升主動脈基部的「前左方」(非右後方),且肺動脈幹被心包包覆(在橫竇前方)。肺動脈幹於T4/5分叉:右肺動脈較長、橫向右行,經「升主動脈與上腔靜脈的後方」入右肺門;左肺動脈經主動脈弓下方、降主動脈「前方」(以動脈韌帶相連)入左肺門。故最恰當者為「右肺動脈位於升主動脈後方」。","options":{"A":"肺動脈幹開口位於升主動脈基部前左方,非右後方。","B":"右肺動脈位於升主動脈後方—正解。","C":"左肺動脈在降主動脈前方(非後方)。","D":"肺動脈幹被心包包覆。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-07":{"quick":"胰頭靜脈血直接匯入腸繫膜上靜脈/肝門靜脈,並非先入脾靜脈。","detail":{"background":"肝門靜脈系統收集腹部消化道的靜脈血至肝。肝門靜脈由「腸繫膜上靜脈(SMV)+脾靜脈」於胰頸後方匯合而成;腸繫膜下靜脈(IMV)通常先匯入脾靜脈(或SMV)。胃小彎的左、右胃靜脈直接注入肝門靜脈;胰頭與十二指腸的胰十二指腸靜脈則注入「腸繫膜上靜脈或肝門靜脈本幹」,而非先進入脾靜脈—故D敘述錯誤。胰頸與胰體尾靜脈才較多注入脾靜脈。","options":{"A":"胃小彎左/右胃靜脈直接入肝門靜脈,正確。","B":"SMV+脾靜脈匯成肝門靜脈,正確。","C":"腸繫膜下靜脈血匯入脾靜脈,正確。","D":"稱胰頭靜脈先入脾靜脈再入肝門靜脈—錯誤(應直接入SMV/肝門靜脈),為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-08":{"quick":"鼠蹊韌帶外端附著於髂前「上」棘(ASIS),非髂前下棘。","detail":{"background":"鼠蹊(腹股溝)韌帶(inguinal ligament)是腹外斜肌腱膜的下緣捲曲增厚而成,外端附著於「髂前上棘(anterior superior iliac spine, ASIS)」,內端附著於恥骨結節(pubic tubercle);其內側部纖維向後下延為腔隙韌帶(lacunar ligament)。淺鼠蹊環(superficial inguinal ring)是腹外斜肌腱膜在其上方的三角形裂孔。故「外端附著於髂前下棘」錯誤(應為髂前上棘)。","options":{"A":"稱外端附著髂前下棘—錯誤(應為髂前上棘ASIS),為正解。","B":"內端附著恥骨結節,正確。","C":"由腹外斜肌腱膜形成,正確。","D":"淺鼠蹊環位於其上方,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-25":{"quick":"胰體腫瘤壓迫下腸繫膜靜脈近脾靜脈處,使左結腸靜脈回流受阻而膨大。","detail":{"background":"下腸繫膜靜脈(IMV)收集左結腸靜脈、乙狀結腸靜脈與上直腸靜脈,通常上行於胰體後方注入脾靜脈(或SMV)。若胰體腫瘤壓迫IMV接近脾靜脈匯入處,則其上游屬支(尤其「左結腸靜脈」,引流降結腸)回流受阻而膨大、易形成側支循環。左胃靜脈與左胃網膜靜脈屬胃的引流(經脾靜脈/門脈),左腎靜脈屬腎,非IMV屬支。故最可能膨大者為左結腸靜脈。","options":{"A":"左胃靜脈引流胃小彎、入門脈,非IMV屬支。","B":"左結腸靜脈為IMV屬支、受阻膨大—正解。","C":"左胃網膜靜脈引流胃大彎,非IMV屬支。","D":"左腎靜脈屬腎引流,與IMV無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-26":{"quick":"聯合腱由腹內斜肌與腹橫肌的下緣腱膜共同形成。","detail":{"background":"腹股溝管後壁的「聯合腱(conjoint tendon/inguinal falx)」由「腹內斜肌」與腹橫肌的下緣腱纖維共同向下內彎、附著於恥骨梳與恥骨嵴而成,加固淺鼠蹊環後方、抵抗直接型疝氣。腹內斜肌也衍生提睪肌與精索的提睪筋膜。腹股溝深環由腹橫筋膜形成;精索內筋膜亦來自腹橫筋膜;腔隙韌帶來自腹外斜肌腱膜(鼠蹊韌帶內側延伸)。故與腹內斜肌最相關者為聯合腱。","options":{"A":"深環由腹橫筋膜形成。","B":"精索內筋膜來自腹橫筋膜。","C":"腔隙韌帶來自腹外斜肌腱膜。","D":"聯合腱由腹內斜肌(與腹橫肌)形成—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-07":{"quick":"主胰管與膽總管共同開口於十二指腸「下行(第二)段」的大乳頭。","detail":{"background":"十二指腸分四段:上段(第一段,有十二指腸球)、下行段(第二段,垂直向下)、下段/水平段(第三段)、上行段(第四段,接十二指腸空腸曲)。主胰管(Wirsung管)與膽總管在十二指腸「下行段」後內側壁會合成肝胰壺腹(Vater壺腹),經Oddi括約肌開口於「大十二指腸乳頭(major duodenal papilla)」;副胰管則開口於其上方的小乳頭。故共同開口在下行段。","options":{"A":"上段有十二指腸球,非膽胰管開口處。","B":"下行段(第二段)為大乳頭/膽胰管開口處—正解。","C":"下段(水平段)為腸繫膜上血管橫越處。","D":"上行段接十二指腸空腸曲。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-08":{"quick":"橫膈右腳的肌纖維圍繞食道,構成食道裂孔。","detail":{"background":"橫膈的右腳(right crus)起自上3個腰椎,其肌纖維向上延伸並分叉,「圍繞食道」形成食道裂孔(esophageal hiatus, T10),具括約作用協助防止胃食道逆流;食道裂孔疝氣即與此處鬆弛有關。主動脈經主動脈裂孔(T12,在兩膈腳與正中弓狀韌帶之間、屬膈後方);下腔靜脈經中心腱的腔靜脈孔(T8);肝門靜脈不穿橫膈。故右腳圍繞者為食道。","options":{"A":"主動脈經主動脈裂孔(膈後方),非右腳圍繞。","B":"下腔靜脈經中心腱腔靜脈孔。","C":"橫膈右腳圍繞食道(食道裂孔)—正解。","D":"肝門靜脈不穿橫膈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-07":{"quick":"下腔靜脈穿過橫膈中央腱的腔靜脈孔(T8)。","detail":{"background":"橫膈三孔的位置與性質:腔靜脈孔(caval opening, T8)位於「中央腱(central tendon)」內,通過下腔靜脈與右膈神經終支—因在腱性部,吸氣橫膈收縮時孔被撐開反而助靜脈回流;食道裂孔(T10)在右膈腳肌纖維中;主動脈裂孔(T12)在膈後方(兩膈腳與正中弓狀韌帶之間)。肝門靜脈不穿橫膈。故穿過中央腱者為下腔靜脈。","options":{"A":"主動脈經主動脈裂孔(膈後方),非中央腱。","B":"下腔靜脈穿中央腱腔靜脈孔—正解。","C":"食道經食道裂孔(膈腳肌纖維)。","D":"肝門靜脈不穿橫膈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-25":{"quick":"胰脾淋巴結引流至腹腔淋巴結,最不可能引流至上腸繫膜淋巴結。","detail":{"background":"上腸繫膜淋巴結(superior mesenteric nodes)引流「中腸」衍生的腸管:空腸、迴腸(經腸管旁與腸繫膜淋巴結)、盲腸、闌尾、升結腸與橫結腸近端(經回結腸、右結腸、中結腸淋巴結),最後匯入腸繫膜上動脈根部淋巴結→腸幹。胰脾淋巴結(pancreaticosplenic node)沿脾動脈分布、引流胰體尾與脾,其淋巴匯入「腹腔淋巴結(celiac nodes)」而非上腸繫膜淋巴結。故最不可能引流至上腸繫膜淋巴結者為胰脾淋巴結。","options":{"A":"胰脾淋巴結引流至腹腔淋巴結,非上腸繫膜—正解。","B":"腸繫膜淋巴結引流空迴腸至上腸繫膜。","C":"中結腸淋巴結引流橫結腸至上腸繫膜。","D":"腸管旁淋巴結引流腸管至上腸繫膜。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-25":{"quick":"十二指腸近幽門(後壁)潰瘍出血源自胃十二指腸動脈,可結紮其來源肝總動脈以止血。","detail":{"background":"十二指腸第一段(球部)「後壁」潰瘍最易侵蝕其後方的「胃十二指腸動脈(gastroduodenal artery)」造成大出血。胃十二指腸動脈是「肝總動脈(common hepatic artery)」的分支(肝總動脈分出胃十二指腸動脈與固有肝動脈);臨床止血可結紮胃十二指腸動脈或其近端來源—四選項中為肝總動脈。下胰十二指腸動脈來自腸繫膜上動脈、左胃動脈供胃小彎、左胃網膜動脈供胃大彎,皆非此潰瘍主要出血源。","options":{"A":"肝總動脈為胃十二指腸動脈來源,可結紮止血—正解。","B":"下胰十二指腸動脈來自腸繫膜上動脈,非主要出血源。","C":"左胃動脈供胃小彎。","D":"左胃網膜動脈供胃大彎。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-08":{"quick":"膈下動脈直接源自腹主動脈(上端)。","detail":{"background":"膈下動脈(inferior phrenic artery)是腹主動脈穿過主動脈裂孔後最先發出的成對臟壁支(常於腹腔動脈幹起點上方/附近直接由腹主動脈發出),供應橫膈下面、並發出上腎上腺動脈(superior suprarenal a.)。其與胸腔內供橫膈上面的膈上動脈/心包膈動脈(來自內胸動脈)不同。故膈下動脈源自腹主動脈。","options":{"A":"胸內動脈供橫膈上面(膈上/心包膈動脈)。","B":"膈下動脈緊鄰但非源自腹腔動脈幹(直接由腹主動脈發出)。","C":"膈下動脈源自腹主動脈—正解。","D":"腎動脈供腎,非膈下動脈來源。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-25":{"quick":"脾門不在幽門平面上(脾位置較高,約第9–11肋)。","detail":{"background":"幽門平面(transpyloric plane,約L1椎體高度、胸骨頸靜脈切跡與恥骨聯合中點)通過的重要構造:幽門、十二指腸空腸曲、胰頸、膽囊底、兩側腎門連線、腸繫膜上動脈起點、脊髓圓錐末端(L1)與L1椎體。脾臟位置較高(約第9–11肋、左上腹深部),其「脾門」不在幽門平面上。故不在幽門平面者為脾門。","options":{"A":"十二指腸空腸曲在幽門平面上。","B":"兩腎門連線約在幽門平面。","C":"L1椎體在幽門平面。","D":"脾門位置較高、不在幽門平面—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-02":{"quick":"外淋巴存於「骨性迷路」(膜迷路之外),而非膜性迷路內;膜迷路內為內淋巴。","detail":{"background":"內耳兩種淋巴:外淋巴(perilymph,高鈉、似細胞外液)存於「骨性迷路與膜性迷路之間」,即耳蝸的前庭階與鼓室階、半規管骨腔等,並經耳蝸小管(cochlear aqueduct)與蛛網膜下腔的腦脊髓液相通;聲波經卵圓窗→外淋巴(前庭階)傳遞、由圓窗釋壓。內淋巴(endolymph,高鉀)則存於「膜性迷路內」(耳蝸管、球囊、橢圓囊、半規管)。故「外淋巴存於膜性迷路內」錯誤(膜迷路內是內淋巴)。","options":{"A":"外淋巴在連接圓窗與卵圓窗的管道(前庭/鼓室階),正確。","B":"外淋巴存於前庭階,正確。","C":"外淋巴經耳蝸小管與蛛網膜下腔相通,正確。","D":"稱外淋巴存於膜性迷路內—錯誤(膜迷路內為內淋巴),為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-05":{"quick":"胃黏膜具縱走皺摺(胃皺襞rugae)。","detail":{"background":"消化道各段的黏膜皺摺特徵:食道黏膜在收縮時呈縱走皺摺(空腔時),但題意指各器官「特徵性」皺摺—「胃」具明顯的縱走「胃皺襞(rugae)」尤在胃小彎與空腹時(進食擴張可變平);小腸(空腸、迴腸)為環狀皺襞(plicae circulares/Kerckring皺襞,空腸最發達)並有絨毛;大腸(橫結腸)為半月皺襞與結腸袋。故有「縱走」皺摺的代表為胃。","options":{"A":"食道平滑、收縮時雖有縱褶但非特徵性縱走皺襞。","B":"胃具縱走胃皺襞(rugae)—正解。","C":"空腸為環狀皺襞(最發達),非縱走。","D":"橫結腸為半月皺襞與結腸袋。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-06":{"quick":"提睪肌由生殖股神經的生殖支(genital branch)支配。","detail":{"background":"提睪肌(cremaster muscle)源自腹內斜肌,由「生殖股神經(genitofemoral nerve, L1–L2)」的「生殖支」支配;其反射(提睪反射:輕劃大腿內側上部皮膚→同側睪丸上提)傳入為股支(及髂腹股溝神經),傳出為生殖支。髂腹下與髂腹股溝神經主要司下腹/腹股溝區皮膚感覺(髂腹股溝神經亦含部分提睪);閉孔神經司大腿內收肌群。故支配提睪肌者為生殖股神經。","options":{"A":"髂腹下神經司下腹/臀外側皮膚。","B":"髂腹股溝神經主司腹股溝/陰囊前皮膚感覺。","C":"生殖股神經(生殖支)支配提睪肌—正解。","D":"閉孔神經司大腿內收肌群。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-08":{"quick":"梳狀線下方的肛管淋巴直接引流至腹股溝淺淋巴結。","detail":{"background":"肛管以「梳狀線(齒狀線, pectinate line)」為胚胎內外胚層分界,上下構造截然不同:線「上」(內胚層)—內臟感覺、由上直腸動脈(IMA)供應、靜脈經門脈系統、淋巴引流至腸繫膜下/髂內淋巴結;線「下」(外胚層)—軀體痛覺(陰部神經,故痛)、由下直腸動脈供應、靜脈入體循環、淋巴引流至「腹股溝淺淋巴結」。故梳狀線下方淋巴最常直接匯入腹股溝淺淋巴結—這也是肛門下部癌易轉移至腹股溝的解剖基礎。","options":{"A":"髂內淋巴結引流梳狀線上方/中段。","B":"髂外淋巴結非肛管下部直接引流處。","C":"梳狀線下方引流至腹股溝淺淋巴結—正解。","D":"腰淋巴結為更上游的總匯。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-27":{"quick":"肋下神經(T12)經外側弓狀韌帶下方後支配前外側腹壁皮膚。","detail":{"background":"橫膈後方有三條弓狀韌帶:正中弓狀韌帶(跨主動脈)、內側弓狀韌帶(跨腰大肌)、外側弓狀韌帶(跨腰方肌)。第12胸神經前支即「肋下神經(subcostal nerve)」,通過外側弓狀韌帶「下方」進入腹後壁,行於腹橫肌與腹內斜肌之間,支配前外側腹壁(臍下區)的肌肉與皮膚。髂腹股溝、髂腹下神經來自L1(經腰大肌外緣出);閉孔、股神經屬腰叢、支配下肢。故經外側弓狀韌帶下方者為肋下神經。","options":{"A":"肋下神經(T12)經外側弓狀韌帶下方、支配前外側腹壁皮膚—正解。","B":"髂腹股溝神經(L1)非經外側弓狀韌帶。","C":"閉孔神經支配大腿內收肌。","D":"股神經支配大腿前群肌與皮膚。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-04":{"quick":"內直肌僅使眼球內收,與眼球旋轉(扭轉)無關。","detail":{"background":"眼外肌的旋轉(扭轉)作用:上斜肌(內旋/intorsion)、下斜肌(外旋/extorsion)、上直肌(內旋為其次要作用)、下直肌(外旋為其次要作用)皆參與眼球的扭轉。內直肌(medial rectus)的作用單純為「內收(adduction)」,其作用軸與視軸一致、無垂直或扭轉分量,故與眼球旋轉無關。外直肌(外展)同理無旋轉。故與旋轉無關者為內直肌。","options":{"A":"上直肌參與內旋(次要作用)。","B":"上斜肌主司內旋。","C":"內直肌僅內收、與旋轉無關—正解。","D":"下斜肌主司外旋。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-26":{"quick":"主動脈通過正中(median)弓狀韌帶下方的主動脈裂孔,非內側(medial)弓狀韌帶。","detail":{"background":"橫膈孔道與弓狀韌帶:腔靜脈孔(T8,中央腱)過下腔靜脈;食道裂孔(T10)由右膈腳肌纖維圍成;主動脈裂孔(T12)位於「正中弓狀韌帶(median arcuate ligament)」下方(跨主動脈、胸管、奇靜脈)。內側弓狀韌帶(medial arcuate ligament)跨「腰大肌」、外側弓狀韌帶跨腰方肌,皆與主動脈無關。胸肋三角(Morgagni孔)有腹壁上血管通過。故C「主動脈通過內側弓」錯誤(應為正中弓/主動脈裂孔)。","options":{"A":"下腔靜脈通過腔靜脈孔,正確。","B":"右膈腳形成食道裂孔,正確。","C":"稱主動脈通過內側弓—錯誤(應為正中弓下的主動脈裂孔),為正解。","D":"腹壁上血管通過胸肋三角,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-20":{"quick":"左性腺靜脈直接匯入左腎靜脈。","detail":{"background":"性腺靜脈(睪丸/卵巢靜脈)引流不對稱:右性腺靜脈以銳角直接注入下腔靜脈;「左性腺靜脈」則以直角注入「左腎靜脈」,再經左腎靜脈入下腔靜脈。此解剖差異使「左側」精索靜脈曲張(varicocele)較常見(左性腺靜脈較長、垂直入左腎靜脈、易受壓回流不良);左腎靜脈本身也可能在主動脈與腸繫膜上動脈間受夾(胡桃鉗現象)。故左性腺靜脈直接匯入左腎靜脈。","options":{"A":"右性腺靜脈才直接入下腔靜脈。","B":"左性腺靜脈直接匯入左腎靜脈—正解。","C":"左總髂靜脈引流下肢/骨盆,非性腺靜脈。","D":"下腸繫膜靜脈屬門脈系統,與性腺靜脈無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-22":{"quick":"總膽管位於網膜孔的「前方」(肝十二指腸韌帶內),非後方;後方為下腔靜脈。","detail":{"background":"網膜孔(omental foramen/Winslow孔)是小網膜囊與大腹膜腔相通的開口,其四界:前方=肝十二指腸韌帶(內含門脈三體—肝門靜脈在後、肝固有動脈在左前、總膽管在右前);後方=下腔靜脈;上方=肝尾葉;下方=十二指腸第一段。故總膽管(及肝動脈、肝門靜脈)位於網膜孔「前方」,而非後方—後方是下腔靜脈。臨床上肝門出血可於前方韌帶處夾住(Pringle手法)止血。故A位置敘述不正確。","options":{"A":"稱總膽管在網膜孔後方—不正確(總膽管在前方韌帶內;後方為下腔靜脈),為正解。","B":"肝門靜脈在前方韌帶內,正確。","C":"肝尾葉在其上方,正確。","D":"十二指腸第一段在其下方,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-23":{"quick":"提肛肌與肛尾韌帶協助維持直腸與鄰近構造的位置關係。","detail":{"background":"直腸要點:黏膜有三個「直腸橫襞(Houston瓣)」與縱走直腸柱,非平滑無褶;腹膜覆蓋直腸上1/3的前面與兩側、中1/3僅前面、下1/3無腹膜覆蓋(故並非只覆蓋乙狀結腸);肛管直腸彎曲(anorectal flexure)約「90度」,主要由「恥骨直腸肌(puborectalis)」的U形吊帶造成(維持排便控制),非尾骨肌。提肛肌(含恥骨直腸肌)與肛尾韌帶構成骨盆膈、支撐並固定直腸位置。故B正確。","options":{"A":"直腸黏膜有橫襞與直腸柱,非平滑無褶。","B":"提肛肌與肛尾韌帶維持直腸位置—正解。","C":"腹膜覆蓋直腸上中段(前/側),非只到乙狀結腸。","D":"肛直腸彎約90度、由恥骨直腸肌造成,非尾骨肌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-19":{"quick":"胰臟為(次發性)腹膜後器官。","detail":{"background":"腹膜後器官分原發與次發:原發性腹膜後(發生即在後)含腎、腎上腺、輸尿管、腹主動脈、下腔靜脈、直腸下段;次發性腹膜後(原懸於腸繫膜、後貼附後壁)含「胰臟(除胰尾)」、十二指腸大部(第2–4段)、升結腸與降結腸。記憶口訣SAD PUCKER。肝、胃、空腸皆為腹膜內器官(有腸繫膜/被腹膜廣泛包覆)。故腹膜後器官為胰臟。","options":{"A":"肝臟為腹膜內器官(有裸區除外)。","B":"胃為腹膜內器官。","C":"空腸為腹膜內器官(有腸繫膜)。","D":"胰臟為次發性腹膜後器官—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-20":{"quick":"肝圓韌帶是臍靜脈(umbilical vein)閉鎖後的遺跡。","detail":{"background":"胎兒循環殘跡:臍靜脈→「肝圓韌帶(round ligament of liver/ligamentum teres)」(走於肝鐮韌帶游離緣);靜脈導管→靜脈韌帶(ligamentum venosum);臍動脈→臍內側韌帶;臍尿管→正中臍韌帶;動脈導管→動脈韌帶;卵圓孔→卵圓窩。門脈高壓時臍靜脈可再通,使臍周靜脈曲張(海蛇頭caput medusae)。故肝圓韌帶為臍靜脈遺跡。","options":{"A":"靜脈導管遺跡為靜脈韌帶。","B":"臍靜脈遺跡為肝圓韌帶—正解。","C":"臍動脈遺跡為臍內側韌帶。","D":"臍尿管遺跡為正中臍韌帶。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-07":{"quick":"老花眼(presbyopia)源自水晶體彈性下降與睫狀肌調適力減退,看近物模糊。","detail":{"background":"看近物需「調適(accommodation)」:睫狀肌收縮→睫狀小帶鬆弛→水晶體因本身彈性而變凸、屈光力增加,使近物聚焦於視網膜。隨年齡(40歲後),水晶體硬化失去彈性、睫狀肌調適力下降,看近物時無法充分增加屈光力,故「遠物正常、近物模糊」即老花眼(presbyopia),需老花眼鏡(凸透鏡)矯正。題述60歲長者遠視力正常但閱讀模糊,即水晶體與睫狀肌(調適系統)的問題。","options":{"A":"玻璃體與虹膜問題不致典型老花表現。","B":"角膜與網膜問題會同時影響遠近視力。","C":"黃斑部病變多致中央視力(遠近皆)下降與變形。","D":"水晶體彈性與睫狀肌調適退化致老花—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-19":{"quick":"精索內筋膜衍生自腹橫筋膜(transversalis fascia)。","detail":{"background":"精索三層筋膜由前腹壁三層延續而來(由內而外):精索「內筋膜(internal spermatic fascia)」來自「腹橫筋膜(transversalis fascia)」(於深鼠蹊環處延續);提睪肌與提睪筋膜(cremasteric fascia)來自腹內斜肌(及腹橫肌);精索「外筋膜(external spermatic fascia)」來自腹外斜肌腱膜(於淺鼠蹊環處)。故精索內筋膜源自腹橫筋膜。","options":{"A":"腹外斜肌腱膜衍生精索外筋膜。","B":"腹內斜肌衍生提睪肌/提睪筋膜。","C":"精索內筋膜衍生自腹橫筋膜—正解。","D":"腹橫肌腱膜參與聯合腱,非精索內筋膜。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-20":{"quick":"肝門三體不含膽囊管;含膽總管、肝固有動脈與肝門靜脈。","detail":{"background":"肝門三體(portal triad,位於肝十二指腸韌帶內)由三構造組成:膽總管(common bile duct,前外)、肝固有動脈(hepatic artery proper,前內)與肝門靜脈(hepatic portal vein,後方)。在肝小葉層級,門管區(portal triad)亦含小膽管、肝動脈分支與門靜脈分支(加淋巴管)。膽囊管(cystic duct)是膽囊與膽總管之間的連接管(與肝總管圍成Calot三角),並非門脈三體成員。故不包含者為膽囊管。","options":{"A":"膽管(膽總管)為門脈三體成員。","B":"肝動脈為門脈三體成員。","C":"肝門靜脈為門脈三體成員。","D":"膽囊管非門脈三體成員—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-21":{"quick":"闌尾最不可能位於「盲腸前(prececal)」;最常見為盲腸後位。","detail":{"background":"闌尾基部恆位於三條結腸帶匯聚於盲腸後內側處(麥氏點McBurney點為其體表投影),但尖端位置變異大,常見依頻率:盲腸後位(retrocecal,最常見)、骨盆位(pelvic)、盲腸下位(subcecal)、迴腸前/後位(pre-/post-ileal)。盲腸「前位(prececal)」相對少見。故闌尾最不可能出現在盲腸前。不同位置影響闌尾炎的臨床表現(如盲腸後位腰大肌徵陽性、骨盆位閉孔肌徵陽性)。","options":{"A":"盲腸前位(prececal)最少見—正解。","B":"迴腸後位為常見變異之一。","C":"骨盆緣(骨盆位)為常見變異。","D":"盲腸後位為最常見位置。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-18":{"quick":"主胰管與膽管共同開口於十二指腸下降(第二)段的大乳頭。","detail":{"background":"主胰管(Wirsung管)與膽總管在十二指腸「下降段(第二段)」後內側壁會合成肝胰壺腹(Vater壺腹),經Oddi括約肌開口於大十二指腸乳頭;副胰管(Santorini管)則開口於上方的小乳頭。膽結石嵌頓於壺腹或Oddi括約肌可同時阻塞膽汁與胰液,引發膽源性胰臟炎。故共同開口在下降段。","options":{"A":"上段為十二指腸球,非膽胰管開口。","B":"下降段(第二段)為膽胰管共同開口處—正解。","C":"水平段為腸繫膜上血管橫越處。","D":"上升段接十二指腸空腸曲。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-19":{"quick":"腹股溝深環是腹橫筋膜上的開口。","detail":{"background":"腹股溝管兩端開口:深環(deep/internal inguinal ring)是「腹橫筋膜(transversalis fascia)」的卵圓形開口,位於腹股溝韌帶中點上方、腹壁下動脈外側;精索(或圓韌帶)在此處將腹橫筋膜向外推成精索內筋膜。淺環(superficial ring)則是腹外斜肌腱膜的三角形裂孔。腹壁下動脈與深環的內外關係是區分間接型(外側)與直接型(內側)疝氣的標誌。故深環位於腹橫筋膜。","options":{"A":"腹股溝深環位於腹橫筋膜—正解。","B":"腹內斜肌衍生提睪肌、構成管前/上壁。","C":"腹外斜肌腱膜上是淺環。","D":"腹橫肌腱膜參與聯合腱(後壁)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-20":{"quick":"下胰十二指腸動脈是上腸繫膜動脈的分支。","detail":{"background":"上腸繫膜動脈(SMA,約L1由腹主動脈發出)供應「中腸」:分支有下胰十二指腸動脈(inferior pancreaticoduodenal a.,與來自腹腔幹的上胰十二指腸動脈形成胰十二指腸動脈弓—前腸後腸交界吻合)、空腸與迴腸動脈、回結腸動脈、右結腸動脈、中結腸動脈。前/後「上」胰十二指腸動脈來自胃十二指腸動脈(腹腔幹系);左結腸動脈來自下腸繫膜動脈(IMA)。故SMA分支為下胰十二指腸動脈。","options":{"A":"前上胰十二指腸動脈來自胃十二指腸動脈(腹腔幹系)。","B":"後上胰十二指腸動脈來自胃十二指腸動脈。","C":"左結腸動脈來自下腸繫膜動脈。","D":"下胰十二指腸動脈為上腸繫膜動脈分支—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-21":{"quick":"闌尾(中腸)的內臟痛由內臟小神經(T10–T11)傳導,初期轉移至臍周。","detail":{"background":"闌尾屬中腸衍生,其內臟感覺(痛覺)纖維伴交感神經走行,經「內臟小神經(lesser splanchnic nerve, T10–T11)」傳入相應脊髓節段。因T10皮節對應臍周,故闌尾炎「初期」疼痛常為臍周模糊的內臟痛;待發炎波及壁層腹膜(由體神經支配)後,痛覺才「轉移並定位」至右下腹麥氏點(體痛)。內臟大神經(T5–9)傳前腸痛、內臟最小神經(T12)傳腎/上輸尿管,迷走傳反射非痛覺定位。故闌尾痛主由內臟小神經傳導。","options":{"A":"內臟大神經(T5–9)傳前腸(胃/肝膽)痛。","B":"內臟小神經(T10–11)傳中腸(含闌尾)痛—正解。","C":"內臟最小神經(T12)傳腎與上輸尿管痛。","D":"迷走神經傳內臟反射,非痛覺定位。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-08":{"quick":"上直肌的次要作用為內收,與眼球向外看(外展)最不相關。","detail":{"background":"眼球外展(向外看)由外直肌(主要)加上兩條斜肌的次要外展作用(上斜肌、下斜肌的作用軸使其有外展分量)共同達成;而上直肌與下直肌的次要水平作用為「內收(adduction)」,方向與外展相反。故與眼球向外看最不相關者為上直肌(其作用偏上舉與內收/內旋)。","options":{"A":"外直肌為主要外展肌。","B":"上斜肌有外展(與下壓)作用。","C":"下斜肌有外展(與上舉)作用。","D":"上直肌次要作用為內收,與外展最不相關—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-20":{"quick":"上腸繫膜靜脈(與動脈)位於十二指腸水平段(第三段)的前方,橫越之。","detail":{"background":"十二指腸與周邊關係:上段(第一段)前上方接膽囊;下降段(第二段)「內側」凹抱胰頭、後內側壁有膽胰管開口;水平段(第三段)橫越脊柱前方,其「前方」被腸繫膜上動脈與靜脈(SMA、SMV)橫過、後方為下腔靜脈與主動脈—SMA與SMV在此夾住十二指腸第三段,過度夾角可致「腸繫膜上動脈症候群(SMA syndrome)」。故D正確(SMV在水平段前方)。","options":{"A":"膽囊位於十二指腸上段前上方,非後方。","B":"下腔靜脈位於水平段後方,非前方。","C":"胰頭位於下降段內側(凹抱),非外側。","D":"上腸繫膜靜脈位於十二指腸水平段前方—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-21":{"quick":"提睪肌由腹內斜肌向下延伸形成。","detail":{"background":"提睪肌(cremaster muscle)是「腹內斜肌(及部分腹橫肌)」的下緣肌纖維,隨精索通過腹股溝管向下延伸至陰囊形成的肌層,連同其筋膜(提睪筋膜)包繞精索;由生殖股神經生殖支支配,收縮可上提睪丸(提睪反射、調節溫度)。精索內筋膜來自腹橫筋膜、精索外筋膜來自腹外斜肌腱膜。故提睪肌源自腹內斜肌。","options":{"A":"腹橫肌僅少量參與。","B":"提睪肌由腹內斜肌向下形成—正解。","C":"腹外斜肌腱膜衍生精索外筋膜。","D":"腹直肌與精索被膜無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-22":{"quick":"右胃動脈通常起自肝固有動脈,不直接源自腹腔動脈幹。","detail":{"background":"腹腔動脈幹(celiac trunk,約T12發出)的三大一級分支為:左胃動脈、肝總動脈、脾動脈。右胃動脈(right gastric a.)通常由「肝固有動脈(或肝總動脈)」發出,沿胃小彎與左胃動脈吻合,並非腹腔幹直接分支。胃十二指腸動脈亦來自肝總動脈(非腹腔幹一級分支)。故不直接源自腹腔幹者為右胃動脈。","options":{"A":"左胃動脈為腹腔幹一級分支。","B":"右胃動脈源自肝固有動脈,非腹腔幹直接分支—正解。","C":"肝總動脈為腹腔幹一級分支。","D":"脾動脈為腹腔幹一級分支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-09":{"quick":"下斜肌起自眶底(上頜骨),不以共同腱環為起點。","detail":{"background":"眼外肌起點:四條直肌(上、下、內、外直肌)皆起自眶尖的「共同腱環(common tendinous ring/Zinn環)」;上斜肌起自蝶骨體(視神經管旁、環外),其腱經滑車轉折;「下斜肌(inferior oblique)」則獨特地起自「眶底前內側(上頜骨眶面淚溝外側)」,並非起於總腱環。故不以總腱環為起點者為下斜肌。","options":{"A":"上直肌起自共同腱環。","B":"下直肌起自共同腱環。","C":"外直肌起自共同腱環。","D":"下斜肌起自眶底(上頜骨),非總腱環—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-18":{"quick":"迴腸為腹膜內器官(有腸繫膜)。","detail":{"background":"腹膜內器官(intraperitoneal,被腹膜廣泛包覆、多有腸繫膜可移動)包括:胃、空腸、迴腸、橫結腸、乙狀結腸、闌尾、脾、肝(大部)等。腹膜後器官(retroperitoneal)則有胰臟(除尾)、十二指腸第2–4段、升/降結腸、腎、腎上腺、輸尿管、腹主動脈、下腔靜脈等。故四選項中腹膜內器官為迴腸。","options":{"A":"胰臟為次發性腹膜後器官。","B":"腎臟為原發性腹膜後器官。","C":"十二指腸(第2–4段)為腹膜後。","D":"迴腸為腹膜內器官(有腸繫膜)—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-19":{"quick":"三條結腸帶在盲腸匯聚於闌尾基部,可循之快速找到闌尾。","detail":{"background":"大腸表面有三條縱走的「結腸帶(taenia coli)」,自盲腸一路上行至乙狀結腸;三條結腸帶在「盲腸」尖端匯聚於闌尾的基部。手術中若一時找不到闌尾,可沿盲腸的結腸帶向其匯聚點追蹤,即可定位闌尾根部(此為可靠標誌,因闌尾基部位置固定而尖端多變)。腸脂垂、回結腸/右結腸動脈雖供血但非直接定位標誌。故循結腸帶找闌尾。","options":{"A":"腸脂垂為結腸表面脂肪小垂,非定位標誌。","B":"右結腸動脈供升結腸,非闌尾定位標誌。","C":"循盲腸結腸帶匯聚點快速找到闌尾—正解。","D":"回結腸動脈供闌尾血但非直接定位標誌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-20":{"quick":"淺鼠蹊環是腹外斜肌腱膜上的開口。","detail":{"background":"腹股溝管的開口:「淺環(superficial inguinal ring)」是「腹外斜肌腱膜」在恥骨結節外上方的三角形裂孔,構成管的外口;「深環」則是腹橫筋膜的開口(管的內口)。精索(或子宮圓韌帶)經深環進入、淺環穿出。故淺環位於腹外斜肌腱膜。","options":{"A":"淺鼠蹊環位於腹外斜肌腱膜—正解。","B":"腹直肌腱膜構成腹直肌鞘,非淺環。","C":"腹內斜肌腱膜參與聯合腱。","D":"腹橫肌腱膜參與聯合腱;深環在腹橫筋膜。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-21":{"quick":"胃十二指腸動脈是肝總動脈的分支,非腹腔幹一級分支。","detail":{"background":"腹腔幹(celiac trunk)三條一級分支:左胃動脈、肝總動脈(common hepatic a.)、脾動脈。肝總動脈再分出胃十二指腸動脈(gastroduodenal a.)與固有肝動脈;胃十二指腸動脈續分出右胃網膜動脈與上胰十二指腸動脈。故胃十二指腸動脈屬「二級」分支,非腹腔幹一級分支。記憶腹腔幹一級分支可用「左胃、肝總、脾」三支。","options":{"A":"總肝動脈為腹腔幹一級分支。","B":"左胃動脈為腹腔幹一級分支。","C":"胃十二指腸動脈為肝總動脈分支(二級),非腹腔幹一級—正解。","D":"脾動脈為腹腔幹一級分支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-09":{"quick":"口輪匝肌與頰肌同由顏面神經(CN VII)支配。","detail":{"background":"頰肌(buccinator)雖參與咀嚼時將食物推回牙列之間,但它屬「表情肌」(第二鰓弓衍生),由「顏面神經(CN VII)」支配(非三叉神經)。口輪匝肌(orbicularis oris)同為表情肌、亦由CN VII支配,故與頰肌神經相同。上直肌與外直肌屬眼外肌(CN III、VI)、上斜肌(CN IV),皆非CN VII。故與頰肌同神經者為口輪匝肌。","options":{"A":"上直肌由動眼神經(CN III)支配。","B":"上斜肌由滑車神經(CN IV)支配。","C":"外直肌由外旋神經(CN VI)支配。","D":"口輪匝肌與頰肌同由顏面神經支配—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-19":{"quick":"十二指腸下降段為腹膜後、無腸繫膜;闌尾、乙狀結腸、橫結腸皆有腸繫膜。","detail":{"background":"有「腸繫膜(mesentery)」者為腹膜內器官,可活動:空迴腸(小腸繫膜)、闌尾(闌尾繫膜mesoappendix)、橫結腸(橫結腸繫膜)、乙狀結腸(乙狀結腸繫膜)。十二指腸除第一段近端外,第2–4段屬「次發性腹膜後」、貼附後壁、無腸繫膜。故不具腸繫膜者為十二指腸下降段。","options":{"A":"十二指腸下降段為腹膜後、無腸繫膜—正解。","B":"闌尾有闌尾繫膜。","C":"乙狀結腸有乙狀結腸繫膜。","D":"橫結腸有橫結腸繫膜。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-20":{"quick":"左胃網膜動脈源自脾動脈。","detail":{"background":"胃的動脈供應構成兩道沿彎弓的吻合:胃小彎—左胃動脈(腹腔幹)與右胃動脈(肝固有動脈)吻合;胃大彎—「左胃網膜動脈(來自脾動脈)」與右胃網膜動脈(來自胃十二指腸動脈)吻合。另有胃短動脈與後胃動脈(來自脾動脈)供胃底。故供胃大彎的左胃網膜動脈源自脾動脈。","options":{"A":"總肝動脈經胃十二指腸動脈發出右胃網膜動脈(供胃大彎右側)。","B":"左胃動脈供胃小彎上部。","C":"後胃動脈供胃底後壁(亦源自脾動脈,但非左胃網膜動脈來源)。","D":"左胃網膜動脈源自脾動脈—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-21":{"quick":"臍內側韌帶是腹膜包覆閉鎖的臍動脈(臍內側韌帶)所形成的皺襞。","detail":{"background":"前腹壁內面臍下有五條腹膜皺襞:正中1條「臍正中皺襞(median umbilical fold)」覆蓋臍尿管殘跡(正中臍韌帶);兩側「臍內側皺襞(medial umbilical fold)」覆蓋閉鎖的「臍動脈(臍內側韌帶medial umbilical ligament)」;最外兩條「臍外側皺襞(lateral umbilical fold)」覆蓋下腹壁(下腹)動脈與靜脈。故臍內側皺襞由腹膜包覆臍動脈(殘跡)形成。","options":{"A":"輸精管在腹股溝深環內側繞行,非臍內側皺襞內容。","B":"臍內側皺襞包覆閉鎖的臍動脈—正解。","C":"上腹壁動脈走腹直肌鞘內,非此皺襞。","D":"肝靜脈在肝後注入下腔靜脈,與此無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-22":{"quick":"前下腹壁皮下脂肪主要在Camper筋膜(淺脂肪層)。","detail":{"background":"前下腹壁的淺筋膜在臍下分兩層:淺層「Camper筋膜(Camper fascia)」為富含脂肪的脂肪層(皮下脂肪主要在此);深層「Scarpa筋膜(Scarpa fascia)」為膜性層,向下延續至會陰的Colles筋膜與陰莖/陰囊淺筋膜(Dartos)。故前下腹壁皮下脂肪主要存於Camper筋膜。腹橫筋膜是腹壁肌肉深面的內襯筋膜;闊筋膜(fascia lata)是大腿的深筋膜,皆非皮下脂肪層。","options":{"A":"Camper筋膜為皮下脂肪層—正解。","B":"Scarpa筋膜為膜性層(脂肪少)。","C":"腹橫筋膜為腹壁肌深面內襯。","D":"闊筋膜為大腿深筋膜。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-19":{"quick":"主胰管與膽管經肝胰壺腹開口於大十二指腸乳頭。","detail":{"background":"主胰管(Wirsung管)與膽總管在十二指腸下降段後內側壁會合成肝胰壺腹(Vater壺腹),經Oddi括約肌開口於「大十二指腸乳頭(major duodenal papilla)」;副胰管則開口於上方的小乳頭。故共同開口的結構為大十二指腸乳頭。肝管與膽囊管是膽道上游構造、非十二指腸開口結構。","options":{"A":"肝管屬膽道上游(肝總管),非十二指腸開口。","B":"大十二指腸乳頭為膽胰管共同開口—正解。","C":"小十二指腸乳頭為副胰管開口。","D":"膽囊管連接膽囊與膽總管,非十二指腸開口。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-20":{"quick":"臍外側皺襞由腹膜包覆下腹壁(下腹)動脈所形成。","detail":{"background":"前腹壁內面臍下五皺襞:臍正中皺襞(臍尿管/正中臍韌帶)、兩側臍內側皺襞(閉鎖臍動脈)、最外兩側「臍外側皺襞(lateral umbilical fold)」覆蓋「下腹壁動脈(inferior epigastric artery)」與其伴行靜脈。下腹壁動脈是區分腹股溝間接疝(其外側)與直接疝(其內側,經Hesselbach三角)的重要標誌。故臍外側皺襞包覆下腹壁動脈。","options":{"A":"臍靜脈閉鎖為肝圓韌帶,走鐮韌帶游離緣,非臍外側皺襞。","B":"輸尿管在腹膜後下行,不形成此皺襞。","C":"臍外側皺襞包覆下腹壁動脈—正解。","D":"內髂動脈在骨盆內,非此皺襞。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-09":{"quick":"骨盆入口(骨盆緣)骨折最易傷及構成其一部分的恥骨梳(pecten pubis)。","detail":{"background":"骨盆入口(pelvic inlet)由「骨盆緣(pelvic brim)」圍成,其界線由後往前為:岬(sacral promontory)→弓狀線(arcuate line)→恥骨梳(pecten pubis,即恥骨上支的銳緣)→恥骨嵴→恥骨聯合上緣。故骨盆入口骨折最易傷及構成其前部的「恥骨梳」。髂骨嵴、髂前下棘、坐骨棘皆不在骨盆入口的界線上(髂嵴在上外、坐骨棘在骨盆腔中段標誌)。","options":{"A":"髂骨嵴位於骨盆上外緣,非骨盆入口界線。","B":"恥骨梳構成骨盆入口前部、骨折易傷—正解。","C":"髂前下棘在髂骨前緣,非入口界線。","D":"坐骨棘為骨盆中段標誌,非入口界線。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-27":{"quick":"排便/排尿時骨盆膈(提肛肌)反而「鬆弛」以利排出,非收縮。","detail":{"background":"骨盆膈(pelvic diaphragm)由提肛肌(含恥骨直腸肌、恥骨尾骨肌、髂骨尾骨肌)與尾骨肌及其筋膜構成,呈漏斗狀,構成骨盆腔底/會陰頂,支托骨盆臟器並維持排便排尿控制(恥骨直腸肌的吊帶使肛直腸彎約90度)。「排便時」骨盆膈(尤恥骨直腸肌)與肛門括約肌「鬆弛」、肛直腸角變鈍,糞便始能排出;平時則持續張力維持控制。故D「排便時收縮幫助排便」錯誤。","options":{"A":"外形呈漏斗狀,正確。","B":"位於會陰頂部,正確。","C":"由提肛肌、尾骨肌及其筋膜組成,正確。","D":"稱排便時收縮助排便—錯誤(應為鬆弛),為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-28":{"quick":"會陰淺凹的上界為會陰膜(perineal membrane)。","detail":{"background":"會陰(尿生殖三角)的筋膜間隙:會陰淺凹(superficial perineal pouch)介於下方的「淺會陰筋膜(Colles筋膜)」與上方的「會陰膜(perineal membrane)」之間,內含勃起組織(陰莖腳/前庭球)、球海綿體肌、坐骨海綿體肌、淺橫會陰肌與相關血管神經(及男性尿道球部、女性大前庭腺)。會陰膜之上為會陰深凹。故會陰淺凹的「上界」為會陰膜;其「下界」為淺會陰筋膜。","options":{"A":"提肛肌筋膜屬骨盆膈,非會陰淺凹上界。","B":"會陰膜為會陰淺凹上界—正解。","C":"淺會陰筋膜(Colles)為其下界。","D":"坐骨海綿體肌筋膜為其內容物筋膜,非上界。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-09":{"quick":"排空後的膀胱上方最常緊貼子宮(女性)。","detail":{"background":"女性骨盆腔器官的毗鄰:膀胱位於前方、子宮居中(前傾前屈)、直腸在後。當膀胱排空時,子宮體(前傾)會向前下倒、其體部緊貼於膀胱的上(後)面;膀胱充盈時子宮則被頂起較直立。故排空膀胱上方最可能緊貼子宮。直腸在膀胱後方(隔以子宮/直腸子宮陷凹)、陰道在膀胱下後、輸卵管在子宮上外,皆非緊貼膀胱上方者。","options":{"A":"直腸在膀胱後方。","B":"排空膀胱上方緊貼子宮—正解。","C":"陰道在膀胱下後方。","D":"輸卵管在子宮上外側。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-25":{"quick":"左腎上腺靜脈先匯入左腎靜脈,不直接入下腔靜脈。","detail":{"background":"下腔靜脈(IVC)的屬支不對稱:右側的腎上腺靜脈、性腺靜脈直接注入IVC;但「左側」的腎上腺靜脈與性腺靜脈先注入「左腎靜脈」,再經左腎靜脈入IVC。直接匯入IVC者包括:腎靜脈(雙側)、肝靜脈、腰靜脈(部分,L3/4腰靜脈直接入IVC)、右腎上腺/性腺靜脈與膈下靜脈等。故不直接匯入IVC者為左腎上腺靜脈。","options":{"A":"左腎靜脈直接匯入下腔靜脈。","B":"左肝靜脈直接匯入下腔靜脈。","C":"左腎上腺靜脈先入左腎靜脈,不直接入IVC—正解。","D":"左L3、4腰靜脈直接匯入下腔靜脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-26":{"quick":"髂腹下神經不在精索內(它行於前腹壁、不入精索)。","detail":{"background":"精索(spermatic cord)內容物可記為「3條動脈、3條神經、3個其他」:動脈—睪丸動脈、提睪肌動脈、輸精管動脈;神經—生殖股神經生殖支、輸精管交感叢、提睪肌神經(亦屬生殖支);其他—輸精管、蔓狀靜脈叢(pampiniform plexus)、淋巴管、鞘突遺跡。髂腹股溝神經僅「貼附」於精索表面(不在被膜內);髂腹下神經則行於前腹壁、支配恥骨上區,根本不入精索。故不在精索內者為髂腹下神經。","options":{"A":"髂腹下神經行於前腹壁,不在精索內—正解。","B":"輸精管為精索內容物。","C":"提睪肌動脈為精索內容物。","D":"鞘突遺跡為精索內容物。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-27":{"quick":"(本題多重答案)前列腺的女性同源構造是尿道旁腺,而非前庭大腺;Cowper腺才對應前庭大腺。","detail":{"background":"男女生殖器同源(由相同胚胎原基分化):陰莖頭↔陰蒂頭(生殖結節);陰莖海綿球/尿道海綿體↔前庭球(尿生殖褶);陰囊↔大陰唇(陰唇陰囊隆起);睪丸↔卵巢(性腺);「前列腺↔尿道旁腺(Skene腺)」;球尿道腺(Cowper腺)↔大前庭腺(Bartholin腺)。故「前列腺-前庭腺」配對不正確(前列腺對應尿道旁腺;前庭大腺對應Cowper腺)。本題官方為多重答案,主要正解為D。","options":{"A":"陰莖頭與陰蒂頭同源(生殖結節),配對正確。","B":"陰莖海綿球與前庭球同源,配對正確。","C":"陰囊與大陰唇同源,配對正確。","D":"前列腺對應尿道旁腺而非前庭腺—配對不正確,為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-28":{"quick":"陰莖深動脈穿陰莖腳走入海綿體,供應勃起組織。","detail":{"background":"陰莖的動脈皆來自陰部內動脈(internal pudendal a.)的終支—陰莖總動脈,分為三支:「陰莖深動脈(deep artery of penis)」穿入陰莖腳、走於陰莖海綿體(corpus cavernosum)中央,其螺旋動脈(helicine arteries)充血是勃起的主要血管基礎;「陰莖球動脈」供尿道海綿體與球部;「陰莖背動脈」走背側供龜頭、海綿體白膜與皮膚。故支配勃起組織(海綿體)者為陰莖深動脈。","options":{"A":"陰莖球動脈供尿道海綿體球部。","B":"陰莖深動脈走入海綿體、司勃起—正解。","C":"陰莖背動脈走背側供龜頭與皮膚。","D":"陰部外動脈供陰莖根部皮膚(來自股動脈)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-08":{"quick":"陰部神經與陰部內血管位於坐骨肛門窩的外側壁(陰部管/Alcock管)。","detail":{"background":"坐骨肛門窩(ischioanal/ischiorectal fossa)是肛管兩側的楔形脂肪間隙。其「外側壁」由閉孔內肌及其筋膜構成,筋膜在外側壁形成「陰部管(pudendal/Alcock canal)」,內有陰部神經(pudendal n.)與陰部內動靜脈通過;它們在此發出下直腸神經/血管橫過窩底至肛門。故陰部神經位於坐骨肛門窩的外側壁(陰部管內)。坐骨肛門窩感染可沿此擴散。","options":{"A":"內側壁由提肛肌與肛管構成。","B":"陰部神經位於外側壁(陰部管)—正解。","C":"上側壁為提肛肌(骨盆膈)。","D":"後側壁與薦結節韌帶/臀大肌相關,非陰部神經主走。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-27":{"quick":"主韌帶(cardinal ligament)連接「子宮頸」與骨盆側壁,不連於子宮體兩側。","detail":{"background":"子宮的韌帶:卵巢韌帶(連子宮體與卵巢)、子宮圓韌帶(connect子宮體上外角經腹股溝管至大陰唇)與闊韌帶(腹膜皺襞,包覆子宮體兩側並含輸卵管、卵巢等)皆連於「子宮體」兩側。「主韌帶(cardinal/Mackenrodt韌帶)」與子宮薦韌帶則連於「子宮頸(及陰道上部)」與骨盆側壁/薦骨,是維持子宮頸位置、防止子宮脫垂的主要支撐,並非連於子宮體。故不連於子宮體者為主韌帶。","options":{"A":"卵巢韌帶連子宮體與卵巢。","B":"子宮圓韌帶連子宮體上外角。","C":"闊韌帶包覆子宮體兩側。","D":"主韌帶連子宮頸與骨盆側壁,不連子宮體—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-28":{"quick":"前陰囊神經來自髂腹股溝神經,不是陰部神經分支。","detail":{"background":"陰部神經(pudendal n., S2–4)的分支:下直腸神經(inferior rectal n.,司外肛門括約肌與肛周皮膚)、會陰神經(perineal n.,其分支含「後陰囊/後陰唇神經」與會陰肌支)、陰莖/陰蒂背神經(dorsal n. of penis/clitoris)。陰囊「前」部皮膚則由「髂腹股溝神經(ilioinguinal n., L1)」的前陰囊神經支配,並非陰部神經。故不是陰部神經分支者為前陰囊神經。","options":{"A":"陰莖背神經為陰部神經分支。","B":"下直腸神經為陰部神經分支。","C":"前陰囊神經來自髂腹股溝神經(L1),非陰部神經—正解。","D":"後陰囊神經為陰部神經(會陰神經)分支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-06":{"quick":"卵巢動脈經卵巢懸韌帶(suspensory ligament)進入卵巢。","detail":{"background":"卵巢動脈(ovarian artery)約於L2由「腹主動脈」直接發出(與睪丸動脈同源),沿腹後壁下行,於骨盆緣處跨越髂外血管「前方」入骨盆,走於「卵巢懸韌帶(suspensory ligament of ovary/infundibulopelvic ligament)」內到達卵巢與輸卵管。卵巢韌帶(連卵巢與子宮)內走的是子宮動脈的卵巢支(吻合),非卵巢動脈本身進入處。故卵巢動脈經懸韌帶進入卵巢。","options":{"A":"卵巢動脈源自腹主動脈,非髂內動脈。","B":"卵巢動脈經懸韌帶(非卵巢韌帶)進入。","C":"卵巢動脈跨髂外血管「前方」入骨盆,非後方。","D":"卵巢動脈經卵巢懸韌帶進入卵巢—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-26":{"quick":"腹橫筋膜圍成腹股溝管深環(其位於腹橫筋膜上)。","detail":{"background":"腹股溝管要點逐一檢視:管內男性通過「精索」、女性通過「子宮圓韌帶(round ligament of uterus)」(非卵巢韌帶);鞘突(processus vaginalis)在男女皆會發生(女性者稱Nuck管);發生於管「內」、經深環下行的疝氣為「間接型(indirect)」(直接型則經Hesselbach三角穿後壁);深環(deep ring)是「腹橫筋膜」的開口。故D正確—深環由腹橫筋膜圍成。","options":{"A":"女性通過子宮圓韌帶(非卵巢韌帶)。","B":"鞘突男女皆有(女性稱Nuck管),非只男性。","C":"經深環/管內下行者為間接型疝氣,非直接型。","D":"腹橫筋膜圍成深環—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-27":{"quick":"射精時外尿道括約肌「鬆弛」讓精液排出,不會收縮(收縮的是內尿道括約肌)。","detail":{"background":"男性射精分兩相:(1)泄精相(emission)—交感(L1–2)使輸精管、精囊、前列腺平滑肌收縮,將精液送入後尿道,同時「膀胱頸(內尿道括約肌)收縮」防止逆行射精;球尿道腺(Cowper腺)於性興奮時先分泌黏液潤滑。(2)射精相(ejaculation)—體神經(陰部神經)使球海綿體肌節律收縮,且「外尿道括約肌鬆弛」讓精液經尿道射出。故「外尿道括約肌收縮」不會發生(它反而鬆弛)。","options":{"A":"外尿道括約肌應鬆弛(非收縮),為正解(不會發生收縮)。","B":"前列腺收縮(泄精相)會發生。","C":"輸精管收縮(泄精相)會發生。","D":"球尿道腺分泌(性興奮時)會發生。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-28":{"quick":"坐骨海綿體肌與尿道外括約肌不附著於會陰體,受傷後作用最不受影響(4、5)。","detail":{"background":"會陰體(perineal body)是會陰中央的纖維肌性結點,是多條肌肉的共同附著處:球海綿體肌、會陰淺橫肌、會陰深橫肌、肛門外括約肌、提肛肌(部分)與尿道外括約肌部分纖維皆附於此,故會陰體受損(如生產撕裂)會影響這些肌肉與骨盆底支托。但「坐骨海綿體肌(4)」附著於坐骨支與陰莖/陰蒂腳(非會陰體),「尿道外括約肌(5)」主要環繞膜性尿道、相對獨立—兩者作用最不受會陰體受傷影響。故為4、5。","options":{"A":"13(球海綿體肌、會陰淺橫肌)皆附會陰體,會受影響。","B":"24含會陰深橫肌(附會陰體),會受影響。","C":"15含球海綿體肌(附會陰體)。","D":"45(坐骨海綿體肌、尿道外括約肌)最不受影響—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-09":{"quick":"精索內含有淋巴管(引流睪丸至腰淋巴結),稱無淋巴管為錯誤。","detail":{"background":"精索外被三層筋膜(外:精索外筋膜←腹外斜肌腱膜;中:提睪肌與提睪筋膜←腹內斜肌;內:精索內筋膜←腹橫筋膜);內含睪丸動脈、提睪肌動脈、輸精管動脈、蔓狀靜脈叢、輸精管、生殖股神經生殖支、交感神經叢、鞘突遺跡與「淋巴管」。睪丸淋巴沿精索上行引流至「腰(主動脈旁)淋巴結」(因睪丸源於腹腔),這是睪丸癌轉移的路徑(非腹股溝)。故「精索內無淋巴管」錯誤。","options":{"A":"外包三層筋膜,正確。","B":"內有睪丸動脈與輸精管,正確。","C":"內有蔓狀靜脈叢,正確。","D":"稱精索內無淋巴管—錯誤(含淋巴管,引流至腰淋巴結),為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-10":{"quick":"女性前庭球的男性同源構造是尿道海綿體(含陰莖球)。","detail":{"background":"男女生殖勃起組織同源:女性「前庭球(bulb of vestibule)」對應男性的「尿道海綿體/陰莖球(corpus spongiosum/bulb of penis)」(皆來自尿生殖褶的勃起組織);女性陰蒂海綿體↔男性陰莖海綿體;女性陰蒂腳↔男性陰莖腳。尿道球腺(Cowper腺)的女性同源是大前庭腺(Bartholin腺)。故前庭球的男性同源為尿道海綿體。","options":{"A":"尿道球腺對應大前庭腺。","B":"陰莖海綿體對應陰蒂海綿體。","C":"尿道海綿體(陰莖球)為前庭球的男性同源—正解。","D":"陰莖腳對應陰蒂腳。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-26":{"quick":"腎上腺髓質由交感「節前」纖維(經內臟小神經)直接進入、與嗜鉻細胞形成突觸。","detail":{"background":"腎上腺髓質是特化的交感神經節:其嗜鉻細胞(chromaffin cell)等同於「變形的節後交感神經元」,直接接受交感「節前」纖維的突觸,受刺激即分泌腎上腺素/正腎上腺素入血。這些節前纖維來自胸髓(T5–T11),經內臟大、小神經(greater/lesser splanchnic n.)「不在腹腔節換元」而直接穿過、進入腎上腺髓質。故進入髓質與嗜鉻細胞形成突觸者為「經內臟小神經來的節前纖維」。其餘選項(節後纖維、下腹下叢)皆不正確。","options":{"A":"經內臟小神經來的節前纖維直接與嗜鉻細胞形成突觸—正解。","B":"腹腔節節後纖維不直接突觸髓質。","C":"主動脈腎節節後纖維非髓質突觸來源。","D":"下腹下叢屬骨盆自律,與腎上腺無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-27":{"quick":"肛直腸彎曲主要由恥骨直腸肌(puborectalis)的U形吊帶牽引形成。","detail":{"background":"肛直腸彎曲(anorectal flexure,約80–90度)由提肛肌中的「恥骨直腸肌(puborectalis)」纖維自恥骨後面繞過肛直腸交界後方形成U形吊帶,將肛直腸交界向前上牽引而成,此角度是維持「排便控制」的關鍵—解便時恥骨直腸肌鬆弛、角度變鈍以利排出。恥尾肌構成骨盆膈主體但非此彎曲主因;會陰深橫肌屬尿生殖膈;肛門外括約肌維持隨意控制但不形成此彎曲。故主要由恥骨直腸肌牽引。","options":{"A":"恥骨直腸肌U形吊帶形成肛直腸彎曲—正解。","B":"恥尾肌構成骨盆膈,非此彎曲主因。","C":"會陰深橫肌屬尿生殖膈。","D":"肛門外括約肌司隨意控制,不形成此彎曲。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-28":{"quick":"會陰淺凹內含陰莖根、大前庭腺與坐骨海綿體肌(1、3、4)。","detail":{"background":"會陰淺凹(superficial perineal pouch,介於Colles筋膜與會陰膜之間)的內容:勃起組織(陰莖腳/陰蒂腳與尿道海綿體球/前庭球→構成「陰莖根(1)」)、覆蓋它們的坐骨海綿體肌與球海綿體肌(含坐骨海綿體肌4)、會陰淺橫肌,女性的「大前庭腺(Bartholin腺, 3)」也在此。而男性的「球尿道腺(Cowper腺, 2)」與「尿道外括約肌(5)」位於「會陰深凹(deep pouch)」。故位於淺凹者為1、3、4。","options":{"A":"123含2(球尿道腺,屬深凹)。","B":"134(陰莖根、大前庭腺、坐骨海綿體肌)皆在淺凹—正解。","C":"235含2、5(皆深凹)。","D":"245含2、5(皆深凹)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-07":{"quick":"直腸由直腸上/中/下動脈供應,膀胱下動脈阻塞最不影響直腸。","detail":{"background":"膀胱下動脈(inferior vesical artery,髂內動脈分支)在男性供應膀胱底、前列腺、儲精囊與輸精管末段(女性對應陰道動脈)。直腸則由上直腸動脈(IMA)、中直腸動脈(髂內)、下直腸動脈(陰部內)三重供應,與膀胱下動脈關係小。故膀胱下動脈阻塞時最不可能受影響者為直腸。","options":{"A":"膀胱由膀胱下動脈供應,會受影響。","B":"直腸由直腸上/中/下動脈供應,最不受影響—正解。","C":"儲精囊由膀胱下動脈供應,會受影響。","D":"輸精管末段由膀胱下動脈供應,會受影響。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-10":{"quick":"白膜(tunica albuginea)是緻密結締組織被膜,非腹膜衍生物。","detail":{"background":"腹膜衍生的構造:睪丸鞘膜(tunica vaginalis,由鞘突殘留的腹膜形成)、子宮闊韌帶(腹膜雙層皺襞)、卵巢懸韌帶等腹膜皺襞與繫膜皆來自腹膜。而「白膜(tunica albuginea)」是包繞睪丸(或卵巢、陰莖海綿體)的緻密纖維結締組織被膜,屬器官本身的纖維囊,並非腹膜衍生。故不是腹膜衍生物者為白膜。","options":{"A":"白膜為緻密結締組織被膜,非腹膜衍生—正解。","B":"鞘膜由腹膜(鞘突)衍生。","C":"闊韌帶為腹膜皺襞。","D":"懸韌帶為腹膜皺襞。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-11":{"quick":"卵巢韌帶直接連接子宮(角)與卵巢。","detail":{"background":"卵巢的支持構造:「卵巢韌帶(ovarian/proper ligament)」連接子宮體外側角與卵巢(其內走子宮動脈卵巢支),是「直接連接子宮與卵巢」者;卵巢懸韌帶連卵巢與骨盆壁(內走卵巢動靜脈);卵巢繫膜(mesovarium)是闊韌帶後葉懸吊卵巢的腹膜皺襞;子宮圓韌帶連子宮角至大陰唇;輸卵管繫膜懸吊輸卵管。故直接連子宮與卵巢者為卵巢韌帶。","options":{"A":"卵巢繫膜是懸吊卵巢的腹膜皺襞。","B":"卵巢韌帶直接連子宮與卵巢—正解。","C":"子宮圓韌帶連子宮角至大陰唇。","D":"輸卵管繫膜懸吊輸卵管。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-28":{"quick":"女性骨盆腔最低處為直腸子宮陷凹(Douglas陷凹)。","detail":{"background":"女性骨盆腔的腹膜陷凹:膀胱與子宮之間為「子宮膀胱陷凹(uterovesical pouch)」;子宮(直腸)與直腸之間為「直腸子宮陷凹(rectouterine pouch/Douglas陷凹)」—此為直立或仰臥時女性腹膜腔的「最低點」,故腹腔積液、積膿、出血或腫瘤種植常最先積於此,可經後穹窿穿刺(culdocentesis)診斷。男性對應的最低處為直腸膀胱陷凹。故女性最低處為直腸子宮陷凹。","options":{"A":"腹壁膀胱陷凹非腹膜最低點。","B":"直腸膀胱陷凹為男性最低處。","C":"直腸子宮陷凹(Douglas)為女性骨盆腔最低處—正解。","D":"子宮膀胱陷凹位置較高(子宮前方)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-09":{"quick":"提肛肌構成坐骨肛門窩的「內上壁」,不位於其外側。","detail":{"background":"坐骨肛門窩(ischioanal fossa)的界線:「外側壁」由閉孔內肌及其筋膜構成,筋膜內含陰部管(Alcock canal)、陰部神經與陰部內血管;「內側(上)壁」由提肛肌(骨盆膈,呈斜頂)與肛管/肛門外括約肌構成。故不位於外側者為提肛肌(它在內上壁)。","options":{"A":"提肛肌位於內上壁,不在外側—正解。","B":"陰部管位於外側壁(閉孔內肌筋膜內)。","C":"陰部神經走外側壁陰部管內。","D":"閉孔內肌構成外側壁。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-11":{"quick":"男性可經直腸指診觸診前列腺(其位於直腸前方)。","detail":{"background":"前列腺(prostate)位於膀胱頸下方、直腸前方、恥骨聯合後方,其後面緊鄰直腸前壁,僅隔直腸膀胱筋膜(Denonvilliers筋膜)。故臨床上以「直腸指診(DRE)」可隔直腸前壁觸診前列腺的大小、質地與中央溝(評估良性肥大或攝護腺癌)。膀胱、輸尿管位置較深/高,輸精管在精索內,皆非直腸指診常觸診對象。故經直腸觸診者為前列腺。","options":{"A":"膀胱位置較高,非直腸指診主要對象。","B":"前列腺位於直腸前方、可經直腸觸診—正解。","C":"輸尿管走腹膜後深部,無法直腸觸診。","D":"輸精管在精索內,非直腸觸診對象。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-27":{"quick":"前列腺切除應避免傷及骨盆內臟神經(副交感),以保留勃起功能。","detail":{"background":"陰莖勃起由「副交感」神經主導(point):骨盆內臟神經(pelvic splanchnic nerve, S2–4副交感)經下腹下叢發出「海綿狀神經(cavernous nerves)」,沿前列腺後外側(神經血管束)走行至陰莖,促使海綿體小動脈擴張充血而勃起。前列腺根除術若傷及此前列腺旁的神經血管束,術後易出現勃起功能障礙,故須行「保留神經(nerve-sparing)」手術。陰部神經與陰莖背神經主司會陰體感覺與射精時的體運動(squeeze),腹下神經為交感(司射精emission/膀胱頸)。故應避免傷及骨盆內臟神經。","options":{"A":"陰部神經司會陰體感覺/運動,非勃起主導。","B":"陰莖背神經為感覺,非勃起血管控制。","C":"腹下神經為交感(司射精/膀胱頸)。","D":"骨盆內臟神經(副交感)主導勃起,須保留—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-28":{"quick":"胚胎引帶在女性退化形成卵巢韌帶與子宮圓韌帶(本題答子宮圓韌帶)。","detail":{"background":"引帶(gubernaculum)是引導性腺下降的索狀構造。在男性,引帶引導睪丸經腹股溝管降入陰囊、最後退化為睪丸引帶殘跡(連睪丸下極與陰囊)。在女性,卵巢下降受限,引帶上段成為「卵巢韌帶(連卵巢與子宮)」、下段穿過腹股溝管成為「子宮圓韌帶(round ligament of uterus,連子宮角經腹股溝管至大陰唇)」。本題選項中對應者為子宮圓韌帶。卵巢懸韌帶、主韌帶與引帶無關。","options":{"A":"卵巢懸韌帶與引帶無關(由腹膜皺襞形成)。","B":"引帶在女性形成子宮圓韌帶(與卵巢韌帶)—正解。","C":"內側臍韌帶為臍動脈殘跡。","D":"主韌帶為骨盆筋膜增厚,與引帶無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-21":{"quick":"髂腹股溝神經僅貼附於精索表面,不在精索被膜內。","detail":{"background":"精索內容物含3條動脈(睪丸、提睪肌、輸精管動脈)、蔓狀靜脈叢、輸精管、生殖股神經生殖支、交感叢、淋巴管與鞘突遺跡。髂腹股溝神經(ilioinguinal n., L1)則「貼附」於精索的外表面、穿出淺鼠蹊環後支配陰囊(陰唇)前部與大腿內側上方皮膚,但它不在精索的筋膜被膜「之內」。故不在精索內者為髂腹股溝神經。","options":{"A":"髂腹股溝神經貼附精索表面、不在其內—正解。","B":"生殖股神經生殖支在精索內(支配提睪肌)。","C":"輸精管為精索內容物。","D":"蔓狀靜脈叢為精索內容物。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-24":{"quick":"坐骨海綿體肌覆蓋陰莖腳(crus)。","detail":{"background":"會陰淺凹的勃起組織與覆蓋肌:陰莖「腳(crus)」由坐骨海綿體肌(ischiocavernosus)覆蓋,收縮可壓迫陰莖腳、阻止靜脈回流以維持勃起;陰莖「球(bulb)/尿道海綿體」由球海綿體肌(bulbospongiosus)覆蓋,收縮助排空尿道與射精。會陰淺/深橫肌則穩定會陰體。故覆蓋陰莖腳者為坐骨海綿體肌。","options":{"A":"坐骨海綿體肌覆蓋陰莖腳—正解。","B":"球海綿體肌覆蓋陰莖球/尿道海綿體。","C":"會陰淺橫肌穩定會陰體。","D":"會陰深橫肌位於會陰深凹。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-25":{"quick":"陰道上部與子宮頸的痛覺隨骨盆內臟神經(副交感, S2–4)傳入。","detail":{"background":"骨盆臟器痛覺以「骨盆痛覺線(pelvic pain line)」為界:位於腹膜「下」的構造(子宮頸、陰道上部、膀胱三角、直腸下段等)其痛覺纖維「伴副交感的骨盆內臟神經(pelvic splanchnic n., S2–4)」回傳至S2–4;位於腹膜「上」的構造(子宮體、卵巢、輸卵管等)其痛覺則伴交感神經(經下腹叢、腰內臟神經)回傳至T11–L2。故陰道上部與子宮頸痛覺由骨盆內臟神經傳遞—此為無痛分娩(硬膜外S2–4阻斷)的解剖基礎。","options":{"A":"陰部神經司會陰(陰道下部/外陰)體感覺,非上部。","B":"下腹神經傳子宮體等腹膜上構造痛覺(交感)。","C":"骨盆內臟神經傳陰道上部與子宮頸痛覺—正解。","D":"腰內臟神經屬交感,傳腹膜上構造痛。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-26":{"quick":"前庭球位於會陰「淺」凹,不是深凹內容物。","detail":{"background":"女性會陰深凹(deep perineal pouch,位於會陰膜之上)內容:外尿道括約肌、會陰深橫肌、「部分尿道」與「部分陰道」、相關血管神經(及女性無Cowper腺—其同源大前庭腺在淺凹)。「前庭球(bulb of vestibule)」是勃起組織,位於「會陰淺凹」(由球海綿體肌覆蓋),不屬深凹。故不是深凹內容物者為前庭球。","options":{"A":"前庭球位於會陰淺凹,非深凹—正解。","B":"部分陰道在會陰深凹內。","C":"部分尿道在會陰深凹內。","D":"外尿道括約肌在會陰深凹內。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-18":{"quick":"下膈動脈是腹主動脈(上端)的成對分支。","detail":{"background":"下膈動脈(inferior phrenic artery)是腹主動脈穿主動脈裂孔後最先發出的成對臟壁支,供應橫膈下面,並發出「上腎上腺動脈(superior suprarenal artery)」供腎上腺。它非來自腎上腺動脈(反而是其來源)、非內胸動脈(那供橫膈上面)、非胸主動脈。故下膈動脈源自腹主動脈。","options":{"A":"下膈動脈源自腹主動脈—正解。","B":"下膈動脈反而是上腎上腺動脈的來源。","C":"內胸動脈供橫膈上面(膈上/心包膈動脈)。","D":"胸主動脈供橫膈上面與後縱膈,非下膈動脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-22":{"quick":"前庭球由勃起組織構成。","detail":{"background":"女性外陰要點逐一辨正:尿道旁腺(paraurethral/Skene腺)是「前列腺」的同源、開口於尿道口旁,「巴多林氏腺(Bartholin腺)」其實是「大前庭腺(greater vestibular gland)」、為球尿道腺同源、開口於陰道口後外側—故A把兩者混淆而錯;大前庭腺位於前庭球的「後端」(非前方)—故B錯;女性陰蒂「也有」懸韌帶—故C錯;「前庭球(bulb of vestibule)」由勃起組織構成(陰莖球/尿道海綿體的同源)—D正確。","options":{"A":"尿道旁腺(Skene)非巴多林氏腺;混淆,錯誤。","B":"大前庭腺位於前庭球後端,非前方,錯誤。","C":"女性陰蒂也有懸韌帶,錯誤。","D":"前庭球由勃起組織構成—正確,為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-23":{"quick":"下直腸動脈分布於會陰(坐骨肛門窩),不進入骨盆腔。","detail":{"background":"進入骨盆腔的構造:輸尿管(沿骨盆緣下行入膀胱)、薦正中動脈(主動脈分叉處發出,沿薦骨前下行)、卵巢動脈(經懸韌帶入骨盆供卵巢)皆進入骨盆腔。下直腸動脈(inferior rectal artery)則是陰部內動脈在「會陰」坐骨肛門窩內發出的分支,橫過窩底供應肛管下部與肛門外括約肌,屬「會陰」而非進入骨盆腔。故不進入骨盆腔者為下直腸動脈。","options":{"A":"輸尿管進入骨盆腔。","B":"薦正中動脈沿薦骨前進入骨盆。","C":"下直腸動脈分布會陰(坐骨肛門窩),不入骨盆腔—正解。","D":"卵巢動脈經懸韌帶入骨盆腔。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-25":{"quick":"骨盆內臟神經(副交感)受損對肛管/直腸管壁平滑肌收縮影響最大。","detail":{"background":"排便相關的神經:直腸與肛管「管壁的平滑肌」(及內肛門括約肌的調節)由自律神經支配—「骨盆內臟神經(pelvic splanchnic n., S2–4副交感)」是腸壁平滑肌的主要運動(促進收縮/蠕動、放鬆內括約肌以排便);腰/薦交感則抑制蠕動、維持內括約肌張力。肛門外括約肌(隨意肌)由陰部神經的下直腸支(會陰神經非其主支)支配。故對「管壁肌肉收縮」影響最大者為骨盆內臟神經。","options":{"A":"腰內臟神經(交感)抑制蠕動,非主要促收縮。","B":"骨盆內臟神經(副交感)主導管壁平滑肌收縮—正解。","C":"薦交感維持內括約肌張力,非促管壁收縮。","D":"會陰神經主司會陰肌/感覺,非肛管壁平滑肌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-18":{"quick":"左腎上腺靜脈直接匯入左腎靜脈。","detail":{"background":"腎上腺靜脈引流不對稱:右腎上腺靜脈短、直接注入下腔靜脈;「左腎上腺靜脈」較長、向下注入「左腎靜脈」(常與左膈下靜脈共幹),再經左腎靜脈入下腔靜脈。此為腎上腺靜脈取樣(診斷原發性醛固酮症)時左右插管難度不同的解剖基礎。故左腎上腺靜脈直接匯入左腎靜脈。","options":{"A":"左腎上腺靜脈直接匯入左腎靜脈—正解。","B":"右腎上腺靜脈才直接入下腔靜脈。","C":"左性腺靜脈亦入左腎靜脈,但非腎上腺靜脈匯入處。","D":"腰靜脈引流腹後壁,非腎上腺靜脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-22":{"quick":"子宮頸外口位於子宮頸管與陰道腔之間。","detail":{"background":"子宮的通道:子宮腔(uterine cavity)向下經「子宮頸內口(internal os)」進入子宮頸管(cervical canal),子宮頸管再經「子宮頸外口(external os)」開口於陰道(陰道穹窿)。故子宮頸外口位於子宮頸管與陰道腔之間。未產婦外口呈圓形、經產婦呈橫裂。子宮頸抹片即在外口鱗柱上皮交界(轉化區)取樣。","options":{"A":"子宮頸管與子宮腔之間是子宮頸內口。","B":"子宮底與子宮體之間無外口。","C":"子宮底與子宮腔之間為子宮腔上部。","D":"子宮頸外口位於子宮頸管與陰道腔之間—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-23":{"quick":"支配骨盆臟器的交感纖維「並非全」由薦交感幹發出,主要來自上腹下叢(腰內臟神經/主動脈叢)。","detail":{"background":"骨盆自律神經:上腹下叢(superior hypogastric plexus,主要含交感,來自腰內臟神經與主動脈叢)在岬下分為左、右下腹神經(hypogastric n.);下腹下叢(inferior hypogastric plexus/骨盆叢)則由下腹神經(交感)加「骨盆內臟神經(S2–4副交感)」與薦交感幹的灰交通支共同組成,含交感與副交感纖維。故支配骨盆臟器的「交感」纖維主要由上腹下叢(腰內臟神經)而來,而非「全部」由薦交感幹發出—D敘述錯誤。","options":{"A":"上腹下叢下行分為左右下腹神經,正確。","B":"下腹下叢含交感與副交感纖維,正確。","C":"骨盆內臟神經源自S2–4、含副交感,正確。","D":"稱骨盆臟器交感全由薦交感幹發出—錯誤(主要來自上腹下叢/腰內臟神經),為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-24":{"quick":"薦正中動脈源自腹主動脈分叉處,不是髂內動脈分支。","detail":{"background":"髂內動脈(internal iliac a.)分前、後幹,分支供應骨盆臟器、會陰、臀部與骨盆壁,包括:閉孔動脈、薦外側動脈、子宮動脈(女)、膀胱上/下動脈、中直腸動脈、陰部內動脈、臀上/下動脈、髂腰動脈等。「薦正中動脈(median sacral artery)」則是腹主動脈在分叉(約L4)處發出的單一細小分支,沿薦骨前正中下行—非髂內動脈分支。故最不可能為髂內動脈分支者為薦正中動脈。","options":{"A":"閉孔動脈為髂內動脈分支。","B":"薦側(外側)動脈為髂內動脈分支。","C":"薦正中動脈源自腹主動脈分叉,非髂內動脈—正解。","D":"子宮動脈為髂內動脈分支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-25":{"quick":"陰部管是坐骨肛門窩外側壁的筋膜通道,並非穿過骨盆壁的開口。","detail":{"background":"骨盆壁上「穿出」的開口:閉孔管(obturator canal,閉孔上方,過閉孔神經血管)、坐骨大孔(greater sciatic foramen,被梨狀肌分上下,過臀上/下血管神經、坐骨神經、陰部神經出骨盆)、坐骨小孔(lesser sciatic foramen,陰部神經血管與閉孔內肌腱再入會陰)。「陰部管(pudendal/Alcock canal)」則是閉孔內肌筋膜在坐骨肛門窩外側壁形成的「筋膜通道」,容陰部神經血管走行,並非穿越骨盆壁的孔。故不是穿過骨盆壁的構造者為陰部管。","options":{"A":"閉孔管為穿骨盆壁的開口。","B":"坐骨大孔為穿骨盆壁的開口。","C":"坐骨小孔為穿骨盆壁的開口。","D":"陰部管是坐骨肛門窩外壁的筋膜通道,非穿骨盆壁—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-30":{"quick":"薦棘韌帶處外傷最易傷及繞行其後的陰部神經。","detail":{"background":"陰部神經(pudendal n., S2–4)離開骨盆的路徑:經坐骨大孔出骨盆→繞過坐骨棘與「薦棘韌帶(sacrospinous ligament)」的後方(介於薦棘與薦結節韌帶之間)→再經坐骨小孔入會陰的陰部管。故坐骨棘/薦棘韌帶處的外傷或產科陰部神經阻斷(以坐骨棘為標誌)最易影響陰部神經。臀上/下神經經坐骨大孔但位置不同;閉孔神經經閉孔管,皆非薦棘韌帶處。故最可能受傷者為陰部神經。","options":{"A":"臀上神經經坐骨大孔梨狀肌上孔,非薦棘韌帶處。","B":"臀下神經經梨狀肌下孔,非薦棘韌帶處。","C":"陰部神經繞薦棘韌帶後方、最易受傷—正解。","D":"閉孔神經經閉孔管,與薦棘韌帶無關。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-22":{"quick":"閉孔外肌不參與坐骨肛門窩邊界;外側壁由閉孔內肌與坐骨粗隆構成。","detail":{"background":"坐骨肛門窩(ischioanal fossa)邊界:外側壁=閉孔內肌及其筋膜(含陰部管)與坐骨粗隆;內側(上)壁=提肛肌(骨盆膈)斜頂與肛管/肛門外括約肌;後界=臀大肌與薦結節(粗隆)韌帶;前界=會陰膜後緣。閉孔「外」肌(obturator externus)位於骨盆外面、屬大腿內收旋外肌群,不參與坐骨肛門窩邊界。故不參與者為閉孔外肌(易與閉孔內肌混淆)。","options":{"A":"閉孔外肌不參與坐骨肛門窩邊界—正解。","B":"坐骨粗隆構成外側下界。","C":"臀大肌構成後界。","D":"薦結節韌帶構成後界。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-23":{"quick":"中直腸動脈是髂內動脈的另一獨立分支,並非陰部內動脈分支。","detail":{"background":"陰部內動脈(internal pudendal a.)是髂內動脈前幹分支,經坐骨大孔(梨狀肌下孔)出骨盆、繞坐骨棘、再經坐骨小孔入坐骨肛門窩的陰部管,沿途發出「下直腸動脈、會陰動脈、陰莖/陰蒂動脈(球、深、背動脈)」供應會陰。中直腸動脈(middle rectal a.)則是髂內動脈「另一條獨立分支」,供直腸中段與前列腺,非陰部內動脈分支。故D最不恰當。","options":{"A":"陰部內動脈為髂內動脈分支,正確。","B":"經坐骨大孔離開骨盆,正確。","C":"經坐骨小孔入坐骨肛門窩,正確。","D":"稱中直腸動脈為陰部內動脈分支—錯誤(中直腸為髂內動脈獨立分支),為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-24":{"quick":"輸精管跨過髂外血管後進入骨盆腔(並跨於輸尿管上方)。","detail":{"background":"輸精管(ductus deferens)從附睪尾上行入精索、經腹股溝管深環處「跨過髂外動靜脈」進入骨盆腔,沿骨盆側壁向後內走,「跨越輸尿管的上方(前方)」—即所謂「water(輸尿管) under the bridge(輸精管)」,再轉至膀胱底後方膨大為「輸精管壺腹(ampulla)」與精囊管會合成射精管。輸精管在骨盆段為腹膜下(被腹膜覆蓋)。故A正確;B(無腹膜覆蓋)、C(穿輸尿管下方)、D(壺腹在與附睪交接處)皆錯。","options":{"A":"跨過髂外血管進入骨盆腔—正解。","B":"骨盆段被腹膜覆蓋(腹膜下),非無腹膜。","C":"輸精管跨於輸尿管「上方」,非下方。","D":"壺腹位於輸精管末段(近精囊),非與附睪交接處。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-25":{"quick":"卵巢淋巴引流至腰(主動脈旁)淋巴結,與其他三者(引流至腹股溝淺淋巴結)不同。","detail":{"background":"會陰與外生殖器淋巴多引流至「腹股溝淺淋巴結」:陰囊、陰道前庭(及外陰、陰蒂下部)、大前庭腺皆引流至腹股溝淺淋巴結。而「卵巢」因胚胎源於腹後壁、沿卵巢血管下降,其淋巴沿卵巢血管上行引流至「腰(主動脈旁/para-aortic)淋巴結」,與前三者不同。故淋巴回流途徑不同者為卵巢—這也是卵巢癌轉移先到腹主動脈旁淋巴結而非腹股溝的原因。","options":{"A":"陰囊引流至腹股溝淺淋巴結。","B":"陰道前庭引流至腹股溝淺淋巴結。","C":"卵巢引流至腰(主動脈旁)淋巴結,與其他不同—正解。","D":"大前庭腺引流至腹股溝淺淋巴結。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-23":{"quick":"尿道球腺與外尿道括約肌同位於會陰深隙(deep perineal pouch)。","detail":{"background":"尿道球腺(bulbourethral/Cowper腺,約豌豆大小~1 cm,非5 cm)位於「會陰深隙」內、外尿道括約肌兩側,與外尿道括約肌同處深隙;其導管「穿過會陰膜」向下開口於「海綿體(球部)尿道」(非膜部尿道),性興奮時先分泌黏液潤滑。故B正確;A(5公分)、C(導管不穿會陰膜)、D(開口於膜部尿道)皆錯。","options":{"A":"尿道球腺約豌豆大小(~1cm),非5公分。","B":"尿道球腺與外尿道括約肌同在會陰深隙—正解。","C":"其導管會穿過會陰膜(非不穿)。","D":"導管開口於海綿體(球部)尿道,非膜部尿道。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-24":{"quick":"陰蒂深動脈供應陰蒂腳(勃起組織)。","detail":{"background":"女性會陰動脈(皆來自陰部內動脈)與男性同源對應:陰蒂「深動脈(deep artery of clitoris)」穿入陰蒂腳、供陰蒂海綿體(勃起);陰蒂背動脈供陰蒂背側與龜頭;前庭球動脈供前庭球與陰道前庭;橫會陰動脈供會陰淺橫肌區。故供陰蒂腳者為陰蒂深動脈(對應男性陰莖深動脈)。","options":{"A":"前庭球動脈供前庭球。","B":"陰蒂深動脈供陰蒂腳—正解。","C":"陰蒂背動脈供陰蒂背側與龜頭。","D":"橫會陰動脈供會陰淺橫肌區。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-25":{"quick":"膀胱下動脈阻塞對直腸影響最小(直腸另有三重動脈供應)。","detail":{"background":"膀胱下動脈(inferior vesical a.,髂內動脈分支)供膀胱底、前列腺、儲精囊與輸精管末段。直腸則由直腸上動脈(IMA)、直腸中動脈(髂內)、直腸下動脈(陰部內)三重供應,與膀胱下動脈關係小。故其阻塞時影響最小者為直腸。臨床上此解剖關係是診斷與手術定位的重要基礎,須與鄰近構造仔細區辨以避免誤判。","options":{"A":"直腸有三重動脈供應,受膀胱下動脈影響最小—正解。","B":"膀胱由膀胱下動脈供應,受影響。","C":"儲精囊由膀胱下動脈供應,受影響。","D":"前列腺由膀胱下動脈供應,受影響。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-26":{"quick":"海綿體尿道破裂的尿液不會滲入會陰「深」隙(它位於淺隙之上)。","detail":{"background":"尿道破裂的尿外滲路徑取決於部位:海綿體(球部)尿道位於「會陰淺隙」內,其破裂使尿液滲入淺隙,因淺隙的Colles筋膜向前與腹壁Scarpa筋膜相續、向陰莖陰囊延伸,故尿液可擴散至「陰囊、陰莖皮下與前下腹壁淺筋膜層」,但被會陰膜阻擋而「不會」進入其上的「會陰深隙」。故尿液最不可能滲至會陰深隙。(膜部尿道破裂才滲入深隙/骨盆。)","options":{"A":"尿液可滲至陰囊皮下(經淺隙Colles筋膜)。","B":"尿液可滲至陰莖皮下。","C":"尿液被會陰膜阻擋、不滲入會陰深隙—正解。","D":"尿液可滲至前下腹壁淺筋膜(Scarpa層)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-22":{"quick":"子宮動脈先供應子宮頸、再沿子宮側緣上行供子宮體與底,非先進子宮底。","detail":{"background":"子宮動脈(uterine a.,髂內動脈分支)沿闊韌帶基部內行,在子宮頸外側約2 cm處「跨於輸尿管上方(water under the bridge)」—子宮切除時須小心勿傷輸尿管;之後分為下行的陰道支(供子宮頸與陰道上部)與上行支,沿子宮側緣迂迴上行供子宮體、底,並於子宮角與卵巢動脈吻合。故「先進入子宮底再供子宮頸」錯誤(應為先供子宮頸、再上行)。","options":{"A":"子宮動脈為髂內動脈分支,正確。","B":"子宮動脈跨於輸尿管上方,正確。","C":"稱先進子宮底再供子宮頸—錯誤(先供子宮頸、再上行供體底),為正解。","D":"與卵巢動脈吻合,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-23":{"quick":"陰莖懸韌帶附著於恥骨聯合。","detail":{"background":"陰莖根部的兩條韌帶:「懸韌帶(suspensory ligament of penis)」呈三角形,自「恥骨聯合」前面連至陰莖白膜,固定陰莖根;「襻狀韌帶(fundiform ligament)」則由腹白線下端與Scarpa筋膜延續、呈吊帶狀繞過陰莖背側分叉至陰囊中隔。故附著於恥骨聯合者為懸韌帶。會陰體與會陰淺橫肌位於會陰中央,非恥骨聯合。","options":{"A":"陰莖懸韌帶附著於恥骨聯合—正解。","B":"襻狀韌帶來自腹白線/Scarpa筋膜,非恥骨聯合。","C":"會陰體位於會陰中央。","D":"會陰淺橫肌附於坐骨支與會陰體。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-24":{"quick":"閉孔神經屬腰神經叢(L2–L4),不是薦神經叢分支。","detail":{"background":"薦神經叢(sacral plexus, L4–S4)的分支包括:坐骨神經(脛+腓總)、臀上神經(L4–S1)、臀下神經(L5–S2)、陰部神經(S2–4)、股後皮神經、閉孔內肌神經、梨狀肌神經、股方肌神經等。「閉孔神經(obturator n., L2–L4)」則來自「腰神經叢」,支配大腿內收肌群與內側皮膚,並非薦神經叢分支。故不是薦神經叢分支者為閉孔神經。","options":{"A":"臀上神經為薦神經叢分支。","B":"閉孔內肌神經為薦神經叢分支。","C":"陰部神經為薦神經叢分支。","D":"閉孔神經屬腰神經叢,非薦神經叢—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-25":{"quick":"尿道球腺的導管開口於海綿體(球部)尿道。","detail":{"background":"男性尿道分三段及其開口:前列腺部尿道—前列腺各小管與「射精管」開口於精阜(精囊與輸精管壺腹的精液經此入);膜部尿道—被外尿道括約肌環繞,無腺體開口;「海綿體(球/陰莖)部尿道」—「尿道球腺(Cowper腺)的導管」開口於球部,另有尿道旁腺(Littré腺)開口。故開口於海綿體尿道者為尿道球腺。前列腺、精囊、射精管皆開口於前列腺部尿道。","options":{"A":"前列腺小管開口於前列腺部尿道。","B":"精囊經射精管開口於前列腺部尿道。","C":"射精管開口於前列腺部尿道精阜。","D":"尿道球腺導管開口於海綿體(球部)尿道—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-23":{"quick":"前列腺血供最主要來自下膀胱動脈(及中直腸動脈),非上膀胱動脈。","detail":{"background":"前列腺(prostate)含腺體組織與纖維肌肉基質(故名「纖維肌性腺」),後表面緊鄰直腸前壁(可直腸指診);其血供主要來自「下膀胱動脈(inferior vesical a.)」(及中直腸動脈)的前列腺支,非上膀胱動脈(後者供膀胱上部與輸精管)。前列腺靜脈叢與膀胱靜脈叢相通、並經椎靜脈叢(Batson叢)與椎體相連—這是前列腺癌易轉移至脊椎的途徑。故C(主要來自上膀胱動脈)錯誤。","options":{"A":"含腺體與纖維肌肉組織,正確。","B":"後表面靠近直腸,正確。","C":"稱血供主要來自上膀胱動脈—錯誤(應為下膀胱動脈),為正解。","D":"前列腺靜脈叢與膀胱靜脈叢相通,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-24":{"quick":"陰莖深背靜脈進入骨盆腔後注入前列腺靜脈叢。","detail":{"background":"陰莖的靜脈分淺、深:「淺背靜脈(superficial dorsal vein)」走於Buck筋膜「淺面」,收集陰莖皮膚血液、注入陰部外靜脈;「深背靜脈(deep dorsal vein)」單一條,走於Buck筋膜「深面」、兩條陰莖背動脈之間,收集龜頭與海綿體血液,經恥骨聯合下方(穿過懸韌帶與恥骨弓狀韌帶之間的縫隙)進入骨盆腔,注入「前列腺靜脈叢(prostatic venous plexus)」。故D正確;A(收集皮膚血)、B(在Buck筋膜淺層)、C(穿襻狀韌帶)皆為淺背靜脈或錯誤描述。","options":{"A":"收集陰莖皮膚血液者為淺背靜脈。","B":"深背靜脈走於Buck筋膜「深」面,非淺層。","C":"深背靜脈經恥骨聯合下方入骨盆,非穿襻狀韌帶。","D":"深背靜脈入骨盆後注入前列腺靜脈叢—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-25":{"quick":"球海綿體肌收縮可排空尿道內殘留尿液(與射精)。","detail":{"background":"男性會陰淺隙肌肉:球海綿體肌(bulbospongiosus)覆蓋陰莖球與尿道海綿體,收縮可壓迫尿道球部,於「排尿後期」將尿道內殘餘尿液擠出、並參與射精;坐骨海綿體肌(ischiocavernosus)覆蓋並壓迫陰莖「腳(crus/海綿體)」而非陰莖球,阻靜脈回流以維持勃起,且附著於坐骨支(非會陰體);會陰淺橫肌附於坐骨粗隆與會陰體(非坐骨棘)。故正確者為B。","options":{"A":"坐骨海綿體肌壓迫的是陰莖腳(crus),非陰莖球。","B":"球海綿體肌收縮助排空尿道殘尿—正解。","C":"坐骨海綿體肌附於坐骨支,非會陰體。","D":"會陰淺橫肌附於坐骨粗隆與會陰體,非坐骨棘。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-26":{"quick":"薦內臟神經(sacral splanchnic n.)含「交感」纖維;膀胱的副交感來自骨盆內臟神經。","detail":{"background":"膀胱的自律神經支配:交感(來自L1–L2,經下腹神經/薦內臟神經至膀胱叢)使逼尿肌鬆弛、尿道內括約肌(膀胱頸)收縮→「儲尿」;副交感(來自S2–4的「骨盆內臟神經pelvic splanchnic n.」)使逼尿肌收縮、內括約肌鬆弛→「排尿」。「薦內臟神經(sacral splanchnic n.)」是由薦交感幹發出的「交感」纖維,並非副交感。故B「薦內臟神經含支配膀胱的副交感纖維」錯誤(副交感應為骨盆內臟神經)。","options":{"A":"下腹神經含支配膀胱的交感纖維,正確。","B":"稱薦內臟神經含副交感—錯誤(薦內臟為交感;副交感是骨盆內臟神經),為正解。","C":"交感刺激尿道內括約肌收縮(儲尿),正確。","D":"副交感刺激逼尿肌收縮(排尿),正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-21":{"quick":"大內臟神經攜帶交感「節前」纖維。","detail":{"background":"交感纖維的節前/節後辨別:交感「節前」纖維由T1–L2側角發出,經白交通支與交感幹相連,有些不在交感幹換元而組成「內臟神經(splanchnic nerves)」下行—大內臟神經(greater splanchnic n., T5–9)即為「節前」纖維,至腹腔節換元。頸內動脈神經與心神經是頸上神經節發出的「節後」交感纖維。骨盆內臟神經(pelvic splanchnic)則是「副交感」節前纖維(S2–4)。故攜交感節前纖維者為大內臟神經。","options":{"A":"頸內動脈神經為交感節後纖維。","B":"心神經為交感節後纖維。","C":"大內臟神經攜交感節前纖維—正解。","D":"骨盆內臟神經為副交感節前纖維。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-22":{"quick":"睪丸動脈不供應腎上腺;腎上腺由膈下、腹主動脈與腎動脈三來源供應。","detail":{"background":"腎上腺(suprarenal gland)血供豐富、來自三條動脈:上腎上腺動脈(來自「膈下動脈」)、中腎上腺動脈(直接來自「腹主動脈」)、下腎上腺動脈(來自「腎動脈」)。睪丸動脈(約L2由腹主動脈發出)則下行供睪丸,不供腎上腺。故不發出分支供腎上腺者為睪丸動脈。","options":{"A":"膈下動脈發出上腎上腺動脈。","B":"腹主動脈發出中腎上腺動脈。","C":"睪丸動脈供睪丸,不供腎上腺—正解。","D":"腎動脈發出下腎上腺動脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-23":{"quick":"交感神經纖維刺激肛門內括約肌收縮(維持控便張力)。","detail":{"background":"肛管(anal canal)約4 cm長(非10–15 cm)。肛門內括約肌(internal anal sphincter)由「平滑肌」構成,環繞肛管「上2/3」(非下端肛門周圍),受自律神經支配—「交感」使其收縮(維持靜息控便張力)、副交感使其鬆弛(排便)。肛門外括約肌(external anal sphincter,隨意橫紋肌,由陰部神經下直腸支支配)則環繞肛管全長(尤下段)。故正確者為C(交感刺激內括約肌收縮)。","options":{"A":"肛管約4 cm,非10–15 cm。","B":"內括約肌環繞肛管上2/3,非下端肛門周圍。","C":"交感纖維刺激肛門內括約肌收縮—正解。","D":"外括約肌環繞肛管全長(含下段),非只上段。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-24":{"quick":"陰部神經經「坐骨大孔」離開骨盆腔(非坐骨小孔);坐骨小孔是其再入會陰處。","detail":{"background":"陰部神經(pudendal n., S2–4)的走行:起自薦神經叢,經「坐骨大孔(greater sciatic foramen)」的梨狀肌下孔「離開骨盆腔」→繞坐骨棘與薦棘韌帶後方→經「坐骨小孔(lesser sciatic foramen)」再進入會陰(坐骨肛門窩的陰部管),沿途發出下直腸神經、會陰神經與陰莖/陰蒂背神經。故B「經坐骨小孔離開骨盆腔」錯誤(離開骨盆是經坐骨大孔;坐骨小孔是再入會陰)。","options":{"A":"起始於薦神經叢,正確。","B":"稱經坐骨小孔離開骨盆腔—錯誤(離開骨盆是坐骨大孔),為正解。","C":"經坐骨小孔進入會陰,正確。","D":"下直腸神經為陰部神經分支,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-25":{"quick":"膀胱「底(fundus/base)」是後下表面,並非上表面;被腹膜覆蓋的是上表面。","detail":{"background":"膀胱的方位:膀胱「尖(apex)」朝向前上(恥骨聯合方向,連臍正中韌帶);「底/基部(fundus/base)」是「後下表面」(三角區所在,後接精囊/陰道);「頸(neck)」在最下方、接尿道(男性靠前列腺),尿道內括約肌即位於膀胱頸。「上表面(superior surface)」才是被腹膜覆蓋的部分。故A「膀胱底位於上表面、被腹膜覆蓋」錯誤(膀胱底是後下面;上面才被腹膜覆蓋)。","options":{"A":"稱膀胱底位於上表面—錯誤(膀胱底為後下面;上面被腹膜覆蓋),為正解。","B":"膀胱尖朝向恥骨聯合(前上),正確。","C":"膀胱頸在下部、靠近前列腺,正確。","D":"尿道內括約肌位於膀胱頸,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-26":{"quick":"臀上動脈走在腰薦神經幹與第一薦神經(S1)之間,經梨狀肌上孔出骨盆。","detail":{"background":"臀上動脈(superior gluteal a.,髂內動脈後幹最大分支)在骨盆內常走於「腰薦神經幹(lumbosacral trunk, L4–L5)與第一薦神經(S1)前支之間」,再經坐骨大孔的「梨狀肌上孔」出骨盆至臀部,供臀中/小肌與闊筋膜張肌。臀下動脈則多走於S1–S2(或S2–S3)之間、經梨狀肌下孔出骨盆。故走於腰薦幹與S1之間者為臀上動脈。","options":{"A":"髂腰動脈供腰大肌/髂肌區,非此處。","B":"臀上動脈走於腰薦神經幹與S1之間—正解。","C":"臀下動脈走於S1–S2(或更下)之間。","D":"陰部內動脈經梨狀肌下孔,非此處。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-11":{"quick":"胸背神經(thoracodorsal nerve)由後索發出,支配闊背肌。","detail":{"background":"臂神經叢後索(posterior cord, C5–T1)的分支可記為「ULTRA」:Upper subscapular(上肩胛下神經→肩胛下肌)、Lower subscapular(下肩胛下神經→肩胛下肌下部與大圓肌)、Thoracodorsal(胸背神經→闊背肌)、Radial(橈神經)、Axillary(腋神經)。故支配闊背肌者為「胸背神經(thoracodorsal n., C6–8)」,它沿後腋壁與胸背血管伴行(乳房手術腋下廓清時須保留)。肩胛背神經、長胸神經則源自神經根、非後索。","options":{"A":"肩胛背神經源自C5神經根,支配菱形肌/肩胛提肌。","B":"下肩胛下神經支配肩胛下肌下部與大圓肌。","C":"長胸神經源自C5–7神經根,支配前鋸肌。","D":"胸背神經(後索)支配闊背肌—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-18":{"quick":"肩胛背神經起自C5、常穿中斜角肌,支配肩胛提肌與菱形肌。","detail":{"background":"肩胛背神經(dorsal scapular nerve)起自第五頸神經根(C5),在頸部「穿過中斜角肌」後,沿肩胛骨內側緣下行,支配「肩胛提肌(部分)與大、小菱形肌」(使肩胛骨後縮與下旋)。其受損致肩胛骨輕度外移。長胸神經(C5–7)亦穿中斜角肌但支配前鋸肌;肩胛上神經(C5–6,源自上幹)支配棘上/下肌;鎖骨下肌神經支配鎖骨下肌。故符合者為肩胛背神經。","options":{"A":"肩胛上神經支配棘上/下肌(源自上幹)。","B":"長胸神經支配前鋸肌。","C":"背肩胛神經(C5)穿中斜角肌、支配肩胛提肌與菱形肌—正解。","D":"鎖骨下肌神經支配鎖骨下肌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-30":{"quick":"橈骨粗隆是肱二頭肌止端、尺骨粗隆是肱肌止端。","detail":{"background":"肘部屈肌的止端:肱二頭肌(biceps brachii)經二頭肌腱止於「橈骨粗隆(radial tuberosity)」,並以二頭肌腱膜連於前臂筋膜,主司前臂旋後與屈肘;肱肌(brachialis)止於「尺骨粗隆(ulnar tuberosity)與冠突」,是純屈肘的主力。肱三頭肌止於尺骨鷹嘴(伸肘)。故橈骨粗隆=肱二頭肌、尺骨粗隆=肱肌。","options":{"A":"橈骨粗隆=肱二頭肌、尺骨粗隆=肱肌—正解。","B":"肱三頭肌止於鷹嘴,非尺骨粗隆。","C":"肱二頭肌止橈骨粗隆,非肱肌。","D":"屈腕肌止於腕掌部,非此二粗隆。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-11":{"quick":"拇指感覺屬C6皮節,右手拇指感覺喪失提示右側C6神經受損。","detail":{"background":"上肢皮節定位口訣:C5—上臂外側(三角肌區)、C6—前臂外側與「拇指」、C7—中指、C8—小指與前臂內側下部、T1—上臂內側。故「拇指」感覺對應C6皮節;右手拇指感覺喪失而餘指正常,最可能為右側「C6」神經根(或其皮神經)受損。臨床上C6也對應屈肘(肱二頭肌)與肱橈反射。","options":{"A":"C5對應上臂外側(三角肌區)。","B":"C6對應前臂外側與拇指—正解。","C":"C7對應中指。","D":"C8對應小指與前臂內側下部。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-30":{"quick":"翼狀肩胛骨最常見於長胸神經受損致前鋸肌麻痺。","detail":{"background":"前鋸肌(serratus anterior)由「長胸神經(long thoracic n., C5–7)」支配,作用為使肩胛骨緊貼胸壁並上旋(舉手過頭)。長胸神經位置表淺、走於腋中線,易因外傷、腋淋巴廓清或背包壓迫而受損,導致前鋸肌麻痺、肩胛骨內側緣翹起遠離胸壁=「翼狀肩胛(winged scapula)」,且患側手臂無法完全上舉過頭。腋神經/三角肌損傷致肩外展無力但非翼狀肩胛。故最常見原因為長胸
