神經與前鋸肌。","options":{"A":"腋神經/三角肌損傷致肩外展無力,非翼狀肩胛。","B":"長胸神經與前鋸肌受損致翼狀肩胛—正解。","C":"肩胛上神經/棘上肌損傷致外展起始無力。","D":"下肩胛下神經/大圓肌損傷不致翼狀肩胛。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-31":{"quick":"肌皮神經末端延續為前臂外側皮神經。","detail":{"background":"肌皮神經(musculocutaneous n., C5–7,外側索分支)穿喙肱肌、支配臂前群屈肌(喙肱肌、肱二頭肌、肱肌)後,其感覺末端在肘部外側淺出,延續為「前臂外側皮神經(lateral cutaneous nerve of forearm)」,司前臂外側(橈側)皮膚感覺。前臂內側皮神經來自內側索;前臂後側皮神經來自橈神經。故肌皮神經末端形成前臂外側皮神經。","options":{"A":"上臂內側皮神經來自內側索。","B":"前臂內側皮神經來自內側索。","C":"肌皮神經末端形成前臂外側皮神經—正解。","D":"前臂後側皮神經來自橈神經。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-03":{"quick":"蝶竇開口於蝶篩隱窩,分泌物不流經半月裂孔。","detail":{"background":"鼻腔外側壁中鼻道的「半月裂孔(hiatus semilunaris)」是篩漏斗的開口,接收「額竇、前篩竇與上頜竇」的引流(額竇與上頜竇經此入中鼻道)。「蝶竇(sphenoid sinus)」則開口於上鼻甲後上方的「蝶篩隱窩(sphenoethmoidal recess)」,後篩竇開口於上鼻道,皆不經半月裂孔。故分泌物最不可能流經半月裂孔者為蝶竇。","options":{"A":"額竇經半月裂孔引流入中鼻道。","B":"前篩竇開口於半月裂孔。","C":"上頜竇經半月裂孔引流。","D":"蝶竇開口於蝶篩隱窩、不經半月裂孔—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-10":{"quick":"肱骨外科頸骨折最易傷及繞行其後的腋神經。","detail":{"background":"肱骨「外科頸(surgical neck)」位於大、小結節下方、外科常見骨折處;腋神經(axillary n., C5–6)與旋肱後動脈一同繞行外科頸後外側,故此處骨折或肩關節前下脫位易傷及腋神經,造成三角肌麻痺(肩外展無力,尤15–90度)與三角肌表面(肩外側「軍徽區」)皮膚感覺喪失。正中、尺、肌皮神經走行位置不同,較不受外科頸骨折直接影響。故為腋神經。","options":{"A":"肌皮神經穿喙肱肌,不繞外科頸。","B":"正中神經走臂內側,非外科頸。","C":"尺神經走臂內側後方,非外科頸。","D":"腋神經繞外科頸、最易受傷—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-24":{"quick":"心尖體表投影約在左側第五肋間、鎖骨中線內側。","detail":{"background":"心尖(apex)由左心室構成,指向左前下方;其體表投影(也是心尖搏動/PMI觸診處)約在「左側第五肋間、鎖骨中線內側約1–2 cm(鎖骨中線稍內)」。心臟擴大時心尖搏動向左下外移位。左側乳頭(約第4肋間)或前腋線外側皆非標準心尖投影。故心尖投影在左第五肋間鎖骨中線內側。","options":{"A":"第四肋間鎖骨中線外側非心尖投影。","B":"左乳頭約第4肋間,非心尖標準位置。","C":"第六肋間前腋線外側過低過外。","D":"左第五肋間鎖骨中線內側—心尖投影,正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-30":{"quick":"肩胛上神經受損直接影響棘上肌與棘下肌。","detail":{"background":"肩胛上神經(suprascapular n., C5–6)經肩胛上切迹(在肩胛橫韌帶下)進入棘上窩、再繞肩胛棘外緣(棘盂切迹)至棘下窩,支配「棘上肌(supraspinatus,啟始肩外展0–15度)與棘下肌(infraspinatus,肩外旋)」。故肩胛上切迹處卡壓會同時影響此二肌(外展啟始與外旋無力)。三角肌由腋神經、小圓肌由腋神經、肩胛下肌由肩胛下神經支配,皆非肩胛上神經。故受影響者為棘上肌與棘下肌。","options":{"A":"小圓肌由腋神經支配,非肩胛上神經。","B":"三角肌由腋神經支配。","C":"棘上肌與棘下肌由肩胛上神經支配—正解。","D":"肩胛下肌由肩胛下神經支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-09":{"quick":"尺神經走在肱骨內上髁的後方(尺神經溝)。","detail":{"background":"尺神經(ulnar n., C8–T1)在上臂後內側下行,於肘部「經肱骨內上髁(medial epicondyle)後方的尺神經溝」通過(此即俗稱「麻筋bone/funny bone」處,撞擊時小指與環指發麻),再穿尺側屈腕肌兩頭入前臂。故走於內上髁後方者為尺神經;此處骨折或長期壓迫致「肘隧道症候群」。正中神經走肘前(肱動脈內側)、橈神經走外側、肌皮神經穿喙肱肌。","options":{"A":"肌皮神經穿喙肱肌,走臂前外。","B":"正中神經走肘窩(肱動脈內側)。","C":"尺神經走肱骨內上髁後方(尺神經溝)—正解。","D":"橈神經走肘外側(肱橈肌深面)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-10":{"quick":"腋神經受損致三角肌無力(肩外展障礙)。","detail":{"background":"腋神經(axillary n., C5–6)支配「三角肌(deltoid,肩外展15–90度主力)與小圓肌(外旋)」,並司肩外側皮膚感覺。其受損(肱骨外科頸骨折或肩脫位)造成三角肌麻痺、肩外展無力與肩外側麻木。喙肱肌與肱二頭肌由肌皮神經、肱三頭肌由橈神經支配,皆非腋神經。故腋神經受損致三角肌無力。","options":{"A":"三角肌由腋神經支配,受損無力—正解。","B":"喙肱肌由肌皮神經支配。","C":"肱二頭肌由肌皮神經支配。","D":"肱三頭肌由橈神經支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-19":{"quick":"深頸動脈來自肋頸幹,不是甲狀頸幹的分支。","detail":{"background":"甲狀頸幹(thyrocervical trunk,鎖骨下動脈第一段分支)的分支可記為「STT」:Suprascapular(肩胛上動脈)、Transverse cervical(頸橫動脈)、inferior Thyroid(甲狀腺下動脈,最大)。深頸動脈(deep cervical a.)與最上肋間動脈則來自「肋頸幹(costocervical trunk)」,非甲狀頸幹。故不是甲狀頸幹分支者為深頸動脈。","options":{"A":"深頸動脈來自肋頸幹,非甲狀頸幹—正解。","B":"肩胛上動脈為甲狀頸幹分支。","C":"頸橫動脈為甲狀頸幹分支。","D":"甲狀腺下動脈為甲狀頸幹分支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-30":{"quick":"腕隧道症候群會壓迫通過腕隧道的屈拇長肌肌腱(與正中神經)。","detail":{"background":"腕隧道(carpal tunnel)由腕骨溝與屈肌支持帶(腕橫韌帶)圍成,內通過「正中神經」與9條屈肌肌腱:屈指淺肌4條、屈指深肌4條與「屈拇長肌(flexor pollicis longus)」1條。腕隧道症候群(正中神經受壓)時,管內這些肌腱(含屈拇長肌)與正中神經受影響,典型為拇、食、中指與環指橈側半的麻木與大魚際肌無力。伸拇長肌、外展拇長肌走背側、內收拇肌不經腕隧道。故受影響者為屈拇長肌。","options":{"A":"伸拇長肌走腕背側,不經腕隧道。","B":"屈拇長肌經腕隧道、受影響—正解。","C":"外展拇長肌走腕背橈側(第一伸肌間室)。","D":"內收拇肌位於手掌、不經腕隧道。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-22":{"quick":"根除性乳房切除常清除腋淋巴結,破壞上肢淋巴回流而致患側上肢水腫。","detail":{"background":"乳房的淋巴約75%引流至「腋淋巴結(axillary nodes)」,其餘至胸骨旁(內乳)淋巴結等。根除性乳房切除術為廓清腋淋巴結(含其中通過的上肢淋巴),會破壞同側上肢的淋巴回流路徑,導致術後「患側上肢淋巴水腫」;手術也須注意保留長胸神經(前鋸肌)與胸背神經(闊背肌)以免翼狀肩胛與肌力喪失。故造成上肢水腫者為清除腋淋巴結。","options":{"A":"鎖骨上淋巴結非乳癌手術主要廓清處。","B":"下深頸淋巴結屬頭頸引流。","C":"胸骨旁淋巴結引流乳房內側,清除不致上肢水腫。","D":"清除腋淋巴結破壞上肢淋巴回流致水腫—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-30":{"quick":"肱橈肌由橈神經支配,肌皮神經受損不影響它。","detail":{"background":"肌皮神經(musculocutaneous n., C5–7)支配臂前群屈肌:喙肱肌、肱二頭肌、肱肌,受損致屈肘與前臂旋後無力、前臂外側皮膚麻木。肱橈肌(brachioradialis)雖也屈肘,但它由「橈神經(radial n.)」支配(是橈神經支配的少數屈肌),故肌皮神經受損時肱橈肌不受影響(仍能部分屈肘)。故最不受影響者為肱橈肌。","options":{"A":"肱肌由肌皮神經支配,受影響。","B":"肱二頭肌由肌皮神經支配,受影響。","C":"喙肱肌由肌皮神經支配,受影響。","D":"肱橈肌由橈神經支配,不受肌皮神經損傷影響—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-31":{"quick":"舟狀骨與月狀骨直接與橈骨遠端相關節(橈腕關節)。","detail":{"background":"腕骨近側列由橈側至尺側為舟狀骨、月狀骨、三角骨、豆狀骨。橈腕關節(wrist joint)由「橈骨遠端與關節盤」近側,和「舟狀骨(scaphoid)、月狀骨(lunate)」(及部分三角骨)遠側相關節—即直接與橈骨關節者為舟狀骨與月狀骨。臨床上跌倒手撐地最常骨折者為舟狀骨(且因血供由遠端進入,近端易缺血壞死)。豆狀骨是籽骨(嵌於尺側屈腕肌腱),不直接與橈骨關節。","options":{"A":"大、小多角骨屬遠側列(與掌骨關節)。","B":"頭狀骨、鉤狀骨屬遠側列。","C":"舟狀骨與月狀骨直接與橈骨遠端關節—正解。","D":"三角骨部分參與,豆狀骨為籽骨不與橈骨關節。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-12":{"quick":"尺側屈腕肌附著於豆狀骨。","detail":{"background":"尺側屈腕肌(flexor carpi ulnaris)止於「豆狀骨(pisiform)」,並經豆鉤韌帶/豆掌韌帶續至鉤骨鉤與第五掌骨基部;豆狀骨即是嵌於此肌腱內的籽骨。其作用為屈腕並尺側偏,由尺神經支配。旋前圓肌止於橈骨外側、橈側屈腕肌止於第二(三)掌骨基部、掌長肌止於掌腱膜,皆不附豆狀骨。故附著豆狀骨者為尺側屈腕肌。","options":{"A":"旋前圓肌止於橈骨外側面。","B":"橈側屈腕肌止於第2、3掌骨基部。","C":"掌長肌止於掌腱膜。","D":"尺側屈腕肌附著於豆狀骨—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-29":{"quick":"股二頭肌「短頭」起自股骨粗線,不附著於坐骨粗隆。","detail":{"background":"大腿後群(膕旁肌/hamstrings)多起自「坐骨粗隆(ischial tuberosity)」:半腱肌、半膜肌與「股二頭肌長頭」皆起自坐骨粗隆(由坐骨神經的脛側部支配)。唯「股二頭肌短頭(short head of biceps femoris)」起自「股骨粗線(linea aspera)」、由坐骨神經的腓總部支配,不附著坐骨粗隆。故不附坐骨粗隆者為股二頭肌短頭。","options":{"A":"半腱肌起自坐骨粗隆。","B":"半膜肌起自坐骨粗隆。","C":"股二頭肌長頭起自坐骨粗隆。","D":"股二頭肌短頭起自股骨粗線,不附坐骨粗隆—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-30":{"quick":"網球肘痛在外上髁(伸肌總腱)、高爾夫球肘痛在內上髁(屈肌總腱)。","detail":{"background":"兩種肘部肌腱病:「網球肘(tennis elbow/外上髁炎)」是前臂「伸腕肌總腱(尤橈側伸腕短肌)」起點—「外上髁(lateral epicondyle)」的過度使用性發炎,反覆用力伸腕/握拍誘發,痛在外上髁;「高爾夫球肘(golfer elbow/內上髁炎)」是前臂「屈腕肌總腱」起點—「內上髁(medial epicondyle)」的發炎,反覆用力屈腕誘發,痛在內上髁。故網球肘=外上髁、高爾夫球肘=內上髁。","options":{"A":"冠狀窩/鷹嘴窩為肱骨遠端凹窩,非肌腱病痛點。","B":"鷹嘴窩(olecranon fossa)是肱骨後遠端容納尺骨鷹嘴的凹窩,非肌腱炎痛點。","C":"前後顛倒(網球肘應在外上髁)。","D":"網球肘在外上髁、高爾夫球肘在內上髁—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-13":{"quick":"棘下肌由肩胛上神經支配。","detail":{"background":"旋轉肌袖(rotator cuff)四肌的神經:棘上肌與「棘下肌(infraspinatus)」由「肩胛上神經(suprascapular n., C5–6)」支配;肩胛下肌由上、下肩胛下神經支配;小圓肌由腋神經支配。棘下肌主司肩外旋。故支配棘下肌者為肩胛上神經。","options":{"A":"肩胛上神經支配棘下肌(與棘上肌)—正解。","B":"上肩胛下神經支配肩胛下肌上部。","C":"下肩胛下神經支配肩胛下肌下部與大圓肌。","D":"肩胛背神經支配菱形肌/肩胛提肌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-24":{"quick":"胸廓具相當活動度與彈性(呼吸時擴張),非活動度低不易變形。","detail":{"background":"胸廓(thoracic cage)功能:保護心肺等重要臟器;提供上肢帶與軀幹許多肌肉(胸大小肌、前鋸肌、背肌等)的附著點;以肋骨-肋軟骨的彈性與肋椎關節活動,於呼吸時擴張縮小、並抵抗吸氣時胸腔負壓造成的塌陷。故胸廓是「有相當活動度與彈性」的結構(肋軟骨提供彈性緩衝外力),「活動度低、不易變形」的敘述錯誤—胸廓若僵硬反而影響呼吸。","options":{"A":"保護重要臟器,正確。","B":"提供上肢肌肉附著點,正確。","C":"抵抗呼吸時肺部負壓(維持形狀),正確。","D":"稱活動度低、不易變形—錯誤(胸廓具彈性與活動度),為正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-30":{"quick":"肱二頭肌長頭腱連於盂上結節與關節盂唇。","detail":{"background":"肱二頭肌「長頭(long head)」起自肩胛骨的「盂上結節(supraglenoid tubercle)」並與「關節盂唇(glenoid labrum)」上部相連,其腱穿過盂肱關節囊內、沿結節間溝下行—故與關節盂唇連結者為肱二頭肌長頭。SLAP損傷(上盂唇前後撕裂)即與此處有關。肱二頭肌短頭起自喙突;肱三頭肌長頭起自盂下結節(非盂唇)。故為肱二頭肌長頭。","options":{"A":"肱二頭肌長頭腱連於盂上結節與關節盂唇—正解。","B":"肱二頭肌短頭起自喙突。","C":"肱三頭肌長頭起自盂下結節(非盂唇)。","D":"肱三頭肌外側頭起自肱骨後面。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-27":{"quick":"棘上肌協助三角肌外展上臂(尤起始0–15度)。","detail":{"background":"肩外展由棘上肌與三角肌協同:棘上肌(supraspinatus,旋轉肌袖之一,肩胛上神經支配)負責外展「起始0–15度」並穩定肱骨頭於關節盂;「三角肌」中部纖維(腋神經)主司15–90度外展;90度以上需肩胛骨旋轉(前鋸肌、斜方肌)。故協助三角肌外展者為棘上肌。棘下肌、小圓肌司外旋,大圓肌司內收內旋。","options":{"A":"棘上肌協助外展(起始)—正解。","B":"棘下肌主司外旋。","C":"大圓肌司內收與內旋。","D":"小圓肌主司外旋。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-29":{"quick":"圖示黑色區域(手掌尺側、小指與環指尺側半)為尺神經的皮膚分布。","detail":{"background":"手部皮膚的神經分布:正中神經司手掌橈側3個半指(拇、食、中與環指橈側半)的掌面與其末節背面;橈神經(淺支)司手背橈側2個半指近節背面與虎口;「尺神經」司手掌與手背的「尺側1個半指(小指與環指尺側半)」及小魚際區。題圖黑色區位於手掌/手背尺側(小指側),正符合尺神經的皮膚分布。故為尺神經。臨床上肘部尺神經損傷會造成此區麻木與爪形手。","options":{"A":"手部尺側1個半指(小指側)感覺由尺神經支配—正解。","B":"橈神經司手背橈側與虎口。","C":"正中神經司手掌橈側3個半指。","D":"肌皮神經司前臂外側皮膚,非手部。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-30":{"quick":"前(胸肌)淋巴結主要直接收集乳房(尤外上側)的淋巴回流。","detail":{"background":"腋淋巴結分五群:前群(anterior/pectoral nodes,沿胸小肌下緣,「主要收集乳房尤其外上象限」與前胸壁淋巴)、後群(posterior/subscapular,收集後胸壁與肩部)、外側群(lateral/humeral,收集上肢)、中央群(central,收集前後外三群)、尖群(apical,收集中央群再入鎖骨下幹)。故主要直接收集乳房外上側淋巴者為前(胸肌)淋巴結—這也是乳癌最常先轉移的腋淋巴結群。","options":{"A":"中央淋巴結收集其他三群,非直接收乳房。","B":"前(胸肌)淋巴結直接收集乳房外上側—正解。","C":"外(肱)淋巴結收集上肢。","D":"後(肩胛下)淋巴結收集後胸壁與肩部。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-08":{"quick":"肩胛上神經屬臂神經叢(非頸神經叢)。","detail":{"background":"頸神經叢(cervical plexus, C1–C4)的皮支有「枕小神經、耳大神經、頸橫神經、鎖骨上神經」(司頭頸與上胸皮膚感覺),肌支有膈神經(C3–5)、頸襻等。肩胛上神經(suprascapular n., C5–6)則源自「臂神經叢(上幹)」、支配棘上/下肌,並非頸神經叢分支。故不是頸神經叢分支者為肩胛上神經。","options":{"A":"枕小神經為頸神經叢皮支。","B":"耳大神經為頸神經叢皮支。","C":"肩胛上神經屬臂神經叢,非頸神經叢—正解。","D":"鎖骨上神經為頸神經叢皮支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-27":{"quick":"肌皮神經支配臂前群屈肌,可同時屈上臂(肩)與屈前臂(肘)。","detail":{"background":"肌皮神經(musculocutaneous n.)支配臂前群三肌:喙肱肌(屈與內收「上臂」於肩關節)、肱二頭肌(屈肘並旋後前臂,長頭亦助屈肩)、肱肌(屈「前臂」於肘)。故此一神經支配的肌群「同時具有屈上臂與屈前臂」作用。腋神經司肩外展、胸背神經司闊背肌(伸/內收/內旋肩)、上肩胛下神經司肩胛下肌,皆非同時屈肩與屈肘。故為肌皮神經。","options":{"A":"腋神經司肩外展(三角肌),非屈肘。","B":"胸背神經司闊背肌(伸內收內旋肩)。","C":"肌皮神經支配臂前群、同時屈上臂與前臂—正解。","D":"上肩胛下神經司肩胛下肌(內旋肩)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-31":{"quick":"蚓狀肌起自屈指深肌的肌腱。","detail":{"background":"手部蚓狀肌(lumbrical muscles,共4條)獨特地「起自屈指深肌(flexor digitorum profundus)的肌腱」橈側,繞掌指關節橈側、止於伸肌擴張部(背側腱膜),作用為「屈掌指關節、伸近端與遠端指間關節」(寫字握筆姿勢)。第1、2蚓狀肌由正中神經、第3、4由尺神經支配。骨間肌起自掌骨、掌短肌起自掌腱膜,皆非起自FDP腱。故起自FDP腱者為蚓狀肌。","options":{"A":"掌短肌起自掌腱膜與屈肌支持帶。","B":"骨間背側肌起自掌骨相鄰面。","C":"骨間掌側肌起自掌骨。","D":"蚓狀肌起自屈指深肌肌腱—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-05":{"quick":"後索(背柱)損傷致同側本體感覺與震動覺喪失,痛溫覺保留。","detail":{"background":"脊髓白質徑路與症狀對應:後索(posterior funiculus,薄束/楔束)傳「精細觸覺、本體感覺與震動覺」(同側上行至延腦再交叉),受損致受傷「同側、受傷平面以下」的本體與震動覺喪失,但痛溫覺(走前外側的脊髓視丘徑、已交叉)仍保留。故病人本體/震動覺喪失而痛溫保留,定位於後索(如脊髓癆、亞急性聯合退化、後索壓迫)。前/側索病灶會影響運動或痛溫;前角病灶致下運動神經元無力。","options":{"A":"後索損傷致本體/震動覺喪失、痛溫保留—正解。","B":"前索含運動徑,損傷影響運動。","C":"側索含皮質脊髓徑與脊髓視丘徑,損傷影響運動或痛溫。","D":"前角損傷致下運動神經元無力,非感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-09":{"quick":"肩胛舌骨肌(omohyoid)起自肩胛骨上緣。","detail":{"background":"肩胛舌骨肌(omohyoid muscle)屬舌骨下肌群,分上、下兩腹,以中間腱(由筋膜吊帶固定於鎖骨)相連;其「下腹起自肩胛骨上緣(superior border of scapula)」近肩胛上切迹處,上腹止於舌骨體。它將頸後三角分為枕三角與鎖骨下(肩胛舌骨肌)三角,由頸襻(C1–3)支配。故起點在肩胛骨。","options":{"A":"肩胛舌骨肌起自肩胛骨上緣—正解。","B":"第一肋骨為前/中斜角肌等附著處。","C":"胸骨柄為胸骨舌骨肌起點。","D":"鎖骨為胸鎖乳突肌/三角肌等附著處。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-10":{"quick":"篩泡是中篩竇向中鼻道的隆起延伸。","detail":{"background":"鼻腔外側壁中鼻道的兩個重要隆起:「篩泡(ethmoidal bulla)」是「中篩竇(middle ethmoidal sinus/中組篩竇)」向中鼻道膨出的圓形隆起,中篩竇即開口於其表面;其下方的弧形裂隙為「半月裂孔」,接收額竇、前篩竇與上頜竇的引流。故篩泡由中篩竇延伸形成。額竇/上頜竇開口於半月裂孔,後篩竇開口於上鼻道。","options":{"A":"額竇經半月裂孔引流,非形成篩泡。","B":"前篩竇開口於半月裂孔附近,非形成篩泡。","C":"篩泡由中篩竇延伸形成—正解。","D":"上頜竇經半月裂孔引流。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-26":{"quick":"髕骨位於股四頭肌肌腱內(最大的籽骨)。","detail":{"background":"髕骨(patella)是人體最大的「籽骨(sesamoid bone)」,嵌於「股四頭肌(quadriceps femoris)」的肌腱內,其下方續為髕韌帶止於脛骨粗隆。髕骨的功能在增加股四頭肌伸膝的力臂與機械效益,並保護膝關節前面。股四頭肌(股直肌與三條股肌)由股神經支配。故髕骨位於股四頭肌肌腱內。","options":{"A":"內收大肌屬大腿內收肌群,與髕骨無關。","B":"股二頭肌屬大腿後群,止於腓骨頭。","C":"髕骨位於股四頭肌肌腱內—正解。","D":"半腱肌屬大腿後群,止於脛骨內側。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-27":{"quick":"外展拇長肌由橈神經(後骨間神經)支配。","detail":{"background":"橈神經(radial n., C5–T1)支配上臂後群伸肌(肱三頭肌、肘肌)、肱橈肌、伸腕肌,並經其深支「後骨間神經」支配前臂後群伸肌與外展拇肌:伸指總肌、尺側伸腕肌、旋後肌、「外展拇長肌(abductor pollicis longus)」、伸拇長/短肌、伸食指肌等。旋前圓肌與第1、2蚓狀肌由正中神經、掌側骨間肌由尺神經支配。故由橈神經支配者為外展拇長肌。","options":{"A":"旋前圓肌由正中神經支配。","B":"掌側骨間肌由尺神經支配。","C":"第二蚓狀肌由正中神經支配。","D":"外展拇長肌由橈神經(後骨間神經)支配—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-07":{"quick":"鎖骨上神經(頸神經叢C3–4分支)支配肩膀與上胸的皮膚。","detail":{"background":"鎖骨上神經(supraclavicular nerve)是「頸神經叢(cervical plexus, C3–C4)」的皮支,自胸鎖乳突肌後緣穿出後分內、中、外側支,越過鎖骨支配「肩部、鎖骨區與上胸壁(至第2肋)」的皮膚感覺。故C正確。它源自頸神經叢(非臂神經叢)、為感覺神經(不支配頸闊肌運動—頸闊肌由顏面神經支配)、不司喉部皮膚。","options":{"A":"源於頸神經叢(非臂神經叢)。","B":"喉前皮膚由頸橫神經等支配,非鎖骨上神經主責。","C":"鎖骨上神經支配肩膀皮膚—正解。","D":"頸闊肌由顏面神經支配(運動),非鎖骨上神經。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-26":{"quick":"橈骨頭與肱骨小頭(capitulum)相關節。","detail":{"background":"肘關節由三個關節組成於同一關節囊內:肱尺關節(肱骨「滑車trochlea」與尺骨「滑車切迹」,主司屈伸)、肱橈關節(肱骨「小頭capitulum」與「橈骨頭head of radius」相接,參與屈伸與旋轉)、上橈尺關節(橈骨頭與尺骨橈切迹,司前臂旋前旋後)。故與肱骨小頭接觸成關節者為橈骨頭。","options":{"A":"尺骨頭在遠端(腕部),與肱骨小頭無關。","B":"橈骨頭與肱骨小頭相關節—正解。","C":"尺骨滑車切迹與肱骨滑車相關節。","D":"肩胛骨關節盂與肱骨頭構成肩關節。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-29":{"quick":"後骨間神經是橈神經的(深支)分支。","detail":{"background":"橈神經(radial n.)在肘前分為淺支(感覺,司手背橈側皮膚)與深支;深支穿旋後肌(經Frohse弓)後延續為「後骨間神經(posterior interosseous nerve)」,純運動,支配前臂後群伸肌(伸指、伸拇、外展拇長肌、尺側伸腕肌等)。其受壓致「後骨間神經症候群」—垂指(掌指關節無法伸)但腕背伸尚可、無感覺缺失。故後骨間神經為橈神經分支。","options":{"A":"尺神經分支為深支(手肌)與背支等,非後骨間神經。","B":"後骨間神經是橈神經深支的延續—正解。","C":"正中神經前臂分支為前骨間神經(非後)。","D":"肌皮神經末端為前臂外側皮神經。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-27":{"quick":"肌皮神經走在肱二頭肌與肱肌之間。","detail":{"background":"肌皮神經(musculocutaneous n.)穿過喙肱肌後,於上臂前群「肱二頭肌與肱肌之間」下行,沿途發支支配此三屈肌,最後在肘部外側穿出深筋膜成為前臂外側皮神經。故走於肱肌與肱二頭肌之間者為肌皮神經。正中神經走臂內側(肱動脈旁)、尺神經走臂後內(至內上髁後)、橈神經走臂後(橈神經溝)再轉外側。","options":{"A":"尺神經走臂後內側(至內上髁後方)。","B":"橈神經走肱骨橈神經溝再至臂外側。","C":"正中神經走臂內側(伴肱動脈)。","D":"肌皮神經走肱二頭肌與肱肌之間—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-02":{"quick":"本體/震動覺保留代表後索未損;後索最不可能受損。","detail":{"background":"本題病人為「運動無力+痛溫覺喪失、但本體/震動覺保留」。後索(posterior funiculus)司本體與震動覺—既然這兩覺「保留」,代表後索「未受損」,故後索最不可能受損。運動無力可由前角(下運動神經元)或側索(皮質脊髓徑)損傷造成;痛溫覺喪失由前/側索的脊髓視丘徑損傷造成。對照前一題(後索損傷)為其互補。故最不可能受損者為後索。","options":{"A":"後索司本體/震動覺,既保留則最不可能受損—正解。","B":"前索損傷可影響運動/部分感覺。","C":"側索含皮質脊髓徑與脊髓視丘徑,可致無力與痛溫喪失。","D":"前角損傷致下運動神經元無力。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-26":{"quick":"背闊肌由胸背神經支配,與其餘三者(肩胛背神經)完全不同。","detail":{"background":"神經支配比較:大菱形肌、小菱形肌與「肩胛提肌」皆由「肩胛背神經(dorsal scapular n., C5)」支配(其中肩胛提肌亦受C3–4頸神經直接支配);而「背闊肌(latissimus dorsi)」由「胸背神經(thoracodorsal n., C6–8,後索分支)」支配。故支配神經與其他三者完全不同者為背闊肌。","options":{"A":"背闊肌由胸背神經支配,與其他三者(肩胛背神經)不同—正解。","B":"大菱形肌由肩胛背神經支配。","C":"小菱形肌由肩胛背神經支配。","D":"肩胛提肌由肩胛背神經(與C3–4)支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-27":{"quick":"尺神經支配骨間肌,受損則食指的外展與內收皆障礙。","detail":{"background":"手指的外展與內收由骨間肌負責:骨間「背側肌(dorsal interossei, DAB)」外展手指、骨間「掌側肌(palmar interossei, PAD)」內收手指,兩者皆由「尺神經(深支)」支配。食指要能外展(離開中指)與內收(靠近中指)需第一骨間背側肌與第一骨間掌側肌,皆屬尺神經。故尺神經受損會使食指外展、內收皆障礙(尺神經麻痺亦致爪形手、Froment徵)。","options":{"A":"腋神經司三角肌/小圓肌,與手指無關。","B":"橈神經司伸肌,不司骨間肌。","C":"尺神經支配骨間肌、司手指內收外展—正解。","D":"正中神經司大魚際與第1、2蚓狀肌,非全部骨間肌。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-30":{"quick":"臂神經叢的三條神經索(cords)包圍腋動脈第二段。","detail":{"background":"臂神經叢與腋動脈的關係依胸小肌分三段:腋動脈第一段(胸小肌上緣近側)旁為神經叢的「索(cords)」尚未形成(為fasciculi);「第二段(胸小肌後方)」被三條「神經索(外側索、內側索、後索)」包圍,且索即依其相對腋動脈的位置命名(lateral/medial/posterior);第三段(胸小肌下緣遠側)旁神經索已分出終支(正中、尺、橈、腋、肌皮神經)。故包圍第二段者為神經索(cords)。","options":{"A":"神經根位於斜角肌間,遠在腋動脈近端之前。","B":"神經幹位於頸後三角(鎖骨上)。","C":"神經分部位於鎖骨後方。","D":"神經索包圍腋動脈第二段—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-27":{"quick":"內胸動脈是鎖骨下動脈的直接分支。","detail":{"background":"鎖骨下動脈(subclavian a.)的主要分支:椎動脈、內胸動脈(internal thoracic a.)、甲狀頸幹、肋頸幹、(及部分人的肩背動脈)。上胸動脈、外胸動脈、胸肩峰動脈則皆是「腋動脈(axillary a.)」的分支(腋動脈為鎖骨下動脈越第一肋外緣後的延續)。故鎖骨下動脈直接分支為內胸動脈。","options":{"A":"上胸動脈為腋動脈第一段分支。","B":"外胸動脈為腋動脈第二段分支。","C":"內胸動脈為鎖骨下動脈直接分支—正解。","D":"胸肩峰動脈為腋動脈第二段分支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-29":{"quick":"見附圖:此為「手掌(palmar)」圖、陰影位於掌面;本題官方標準答案為橈神經(C)。","detail":{"background":"附圖標示「手掌(palmar surface)」,黑色陰影為某皮膚感覺神經的分布區。本題「官方標準答案為「橈神經(radial nerve)」(C)」。各神經的手部皮膚感覺分布供對照:①「正中神經」司「手掌「橈側3個半指(拇/食/中/環橈半)」掌面」及對應指尖背面;②「尺神經」司「手部「尺側1個半指(小指+環指尺半)」的掌面與背面、及尺側手掌(小魚際)」;③「橈神經(淺支)」司「「手背「橈側」2個半指近節與第一指蹼(虎口)/解剖鼻煙盒」附近的背側皮膚」(橈神經一般「不」支配手掌掌面);④「肌皮神經」延續為「前臂外側皮神經」、司前臂外側(非手部)。判讀掌面陰影時須辨明手之左右與掌背:依官方答案,本題判為橈神經分布區。","options":{"A":"正中神經司手掌橈側3個半指掌面與大魚際—非本題官方答案。","B":"肌皮神經延續為前臂外側皮神經、司前臂外側皮膚(非手部)。","C":"橈神經(司手背橈側及第一指蹼附近皮膚)—本題官方標準答案。","D":"尺神經司尺側1個半指及小魚際掌面—非本題官方答案。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-27":{"quick":"胸背神經支配的背闊肌具內收上臂作用。","detail":{"background":"內收上臂(將上臂拉向軀幹)的主要肌肉有背闊肌、大圓肌與胸大肌。「背闊肌(latissimus dorsi)」由「胸背神經(thoracodorsal n., C6–8)」支配,作用為使肱骨「內收、伸直與內旋」(如游泳划水、引體向上)。故支配具內收上臂作用肌肉者為胸背神經。肩胛背神經司菱形肌(後縮肩胛)、肩胛上神經司棘上下肌、長胸神經司前鋸肌,皆非主司上臂內收。","options":{"A":"肩胛背神經司菱形肌(肩胛後縮)。","B":"肩胛上神經司棘上/下肌(外展啟始/外旋)。","C":"胸背神經司背闊肌、內收上臂—正解。","D":"長胸神經司前鋸肌(肩胛前突上旋)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-29":{"quick":"肘窩內(由內至外)含正中神經、肱動脈、肱二頭肌腱與橈神經。","detail":{"background":"肘窩(cubital fossa)為肘前三角凹陷:上界為兩上髁連線,內側界為旋前圓肌、外側界為肱橈肌,底由肱肌與旋後肌構成,頂為肱二頭肌腱膜與深筋膜。其內容物由內側至外側為:「正中神經、肱動脈(及其分叉橈/尺動脈)、肱二頭肌腱、橈神經(在肱橈肌深面)」。尺神經「不」在肘窩內(它走內上髁後方)。故肘窩內含正中神經(D正確);A(旋前圓肌在內側非上外)、B(肱橈肌為外界非底)、C(尺神經不在肘窩)皆錯。","options":{"A":"旋前圓肌為肘窩「內側界」,非上外側。","B":"肱橈肌為肘窩「外側界」,非底部。","C":"尺神經走內上髁後方,不在肘窩內。","D":"肘窩內含正中神經—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-10":{"quick":"闊筋膜張肌與臀大肌(部分)止於髂脛束(iliotibial tract)。","detail":{"background":"髂脛束(iliotibial tract/band)是大腿外側闊筋膜增厚的縱行帶,上端有「闊筋膜張肌(tensor fasciae latae,前)」與「臀大肌(gluteus maximus,後)的部分纖維」附著(兩肌借髂脛束協同穩定膝、伸髖外展),下端止於脛骨外側的Gerdy結節。故止於髂脛束者為闊筋膜張肌與臀大肌。長跑者此束摩擦股骨外上髁可致髂脛束症候群。","options":{"A":"髂肌與腰大肌止於股骨小轉子。","B":"闊筋膜張肌與臀大肌止於髂脛束—正解。","C":"半膜肌、半腱肌止於脛骨內側(膕旁肌)。","D":"股二頭肌止於腓骨頭、股四頭肌止於髕骨/脛骨粗隆。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-12":{"quick":"脛側副韌帶(內側副韌帶)與內側半月板相連,常一併受損。","detail":{"background":"膝關節內側副韌帶(tibial/medial collateral ligament, MCL)與「內側半月板(medial meniscus)」緊密相連(附著),故MCL撕裂常同時傷及內側半月板;若再合併前十字韌帶(ACL)斷裂即為「不幸三聯傷(unhappy triad)」(常見於膝外翻扭傷)。外側副韌帶則與外側半月板「不」直接相連(中隔膕肌腱),故外側較不易連動受傷。故與脛側副韌帶同時受損者為內側半月板。","options":{"A":"髕骨不與脛側副韌帶直接相連。","B":"腓骨與腓側(外)副韌帶相關。","C":"內側半月板與脛側副韌帶相連、易一併受損—正解。","D":"外側半月板與外側副韌帶不直接相連。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-29":{"quick":"(本題多重答案)足底深弓主要由足底外側動脈(與足背動脈深足底支)構成。","detail":{"background":"足底動脈弓(plantar arch/deep plantar arch)主要由「足底外側動脈(lateral plantar a.,脛後動脈終支)」向內側彎行,與「足背動脈的深足底支(deep plantar artery)」吻合而成,再發出蹠側蹠骨動脈與趾動脈。故構成足底深弓的主幹為足底外側動脈;深足底支(來自足背動脈)完成此弓的內側端。本題官方為多重答案(足底外側動脈與足背動脈來源皆給分)。","options":{"A":"弓狀動脈為足背的背側弓,非足底深弓。","B":"足背動脈的深足底支完成弓的內側端(亦給分)。","C":"足底內側動脈較細,非足底深弓主幹。","D":"足底外側動脈為足底深弓主幹—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-10":{"quick":"腓腸神經伴行小隱靜脈,司小腿後外側與小趾外側皮膚感覺。","detail":{"background":"腓腸神經(sural nerve)由脛神經的內側腓腸皮神經與腓總神經的交通支合成,沿小腿後面下行、「伴行小隱靜脈(small saphenous vein)」,繞外踝後下方,司「小腿後外側下部、足外側緣與小趾」的皮膚感覺。因其位置表淺恆定且為純感覺神經,臨床常取作神經移植或神經切片。故伴小隱靜脈者為腓腸神經。隱神經(saphenous n.)則伴「大」隱靜脈、司小腿內側。","options":{"A":"隱神經伴大隱靜脈、司小腿內側。","B":"腓腸神經伴小隱靜脈、司小腿後外側與小趾—正解。","C":"腓深神經為運動兼第1-2趾間背側感覺。","D":"腓淺神經司小腿外側下部與足背大部皮膚(非伴小隱靜脈)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-12":{"quick":"足底外側動脈出血可於跗骨隧道(內踝後方脛後動脈處)加壓止血。","detail":{"background":"足底的血供來自脛後動脈,其在「跗骨隧道(tarsal tunnel,內踝後下方、屈肌支持帶深面)」內分為足底內側與外側動脈(及伴行的脛神經)。故足底外側動脈出血時,於其近端來源—跗骨隧道(內踝後方,可觸脛後動脈搏動)加壓,可有效阻斷血流止血。股三角、膕窩位置過近端(影響整條下肢),足背壓的是足背動脈(不同來源)。故最適當按壓處為跗骨隧道。","options":{"A":"股三角壓股動脈,過於近端。","B":"膕窩壓膕動脈,過於近端。","C":"跗骨隧道(內踝後脛後動脈)加壓最適當—正解。","D":"足背壓的是足背動脈,非足底外側動脈來源。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-29":{"quick":"(本題多重答案)下肢內收肌群主要由閉孔神經支配,血供來自閉孔動脈與深股動脈。","detail":{"background":"大腿內收肌群(內收長/短/大肌、股薄肌、恥骨肌)主要由「閉孔神經(obturator n., L2–4)」支配(內收大肌的坐骨部另由坐骨神經),血供來自「閉孔動脈與深股動脈(profunda femoris,經其穿動脈)」。故神經為閉孔神經,血管含深股動脈與閉孔動脈—本題官方為多重答案(選項A閉孔動脈+閉孔神經、C深股動脈+閉孔神經皆給分)。重點是內收肌群=閉孔神經支配。","options":{"A":"閉孔動脈+閉孔神經(亦給分)。","B":"股神經支配的是大腿前群(伸膝),非內收肌群。","C":"深股動脈+閉孔神經—正解(內收肌群神經為閉孔神經)。","D":"股神經非內收肌群支配神經。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-09":{"quick":"大隱靜脈走在下肢的內側。","detail":{"background":"下肢淺靜脈兩大主幹:「大隱靜脈(great saphenous vein)」起自足背靜脈弓內側,經「內踝前方」沿小腿與大腿「內側」上行,於股三角的隱靜脈裂孔注入股靜脈—走內側、是全身最長靜脈,常用於靜脈導管與冠脈繞道取材;「小隱靜脈」則走小腿「後面」、注入膕靜脈。膕靜脈與股靜脈為深靜脈。故走內側者為大隱靜脈。","options":{"A":"大隱靜脈走下肢內側—正解。","B":"小隱靜脈走小腿後面。","C":"膕靜脈為膝後深靜脈。","D":"股靜脈為大腿深靜脈。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-11":{"quick":"跗骨隧道內的肌腱皆為屈肌腱,受損則腳趾屈曲動作受影響。","detail":{"background":"跗骨隧道(tarsal tunnel,內踝後下方、屈肌支持帶深面)內由前而後通過(Tom-Dick-And-Very-Nervous-Harry):脛後肌腱(Tibialis posterior)、屈趾長肌腱(flexor Digitorum longus)、脛後動脈與脛神經(Artery、Nerve)、屈拇長肌腱(flexor Hallucis longus)。這些肌腱皆為「屈」肌(屈趾、屈拇與足內翻蹠屈),故全數受損時腳趾的「屈曲」動作最受影響。伸趾肌腱走足背、不經跗骨隧道。故受影響者為屈曲。","options":{"A":"跗骨隧道內為屈肌腱,受損影響腳趾屈曲—正解。","B":"伸趾肌腱走足背,不經跗骨隧道。","C":"內收由骨間肌(足底),非跗骨隧道肌腱主司。","D":"外展由骨間肌,非跗骨隧道肌腱。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-29":{"quick":"內、外側迴旋股動脈皆為深股動脈(profunda femoris)的直接分支。","detail":{"background":"股動脈於股三角發出「深股動脈(deep femoral a./profunda femoris)」,後者再發出「內側迴旋股動脈(medial circumflex femoral a.)」與「外側迴旋股動脈(lateral circumflex femoral a.)」及數條穿動脈。其中「內側迴旋股動脈」是成人股骨頭的主要血供(經其後支),股骨頸骨折易傷此動脈致股骨頭缺血壞死。故兩條迴旋股動脈皆為深股動脈直接分支(少數變異直接來自股動脈)。","options":{"A":"股動脈分出深股動脈,迴旋股動脈為深股動脈分支(非直接股動脈)。","B":"兩條迴旋股動脈皆為深股動脈直接分支—正解。","C":"非一條股動脈一條深股動脈。","D":"非顛倒來源。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-07":{"quick":"臀上動脈(與臀上神經)經梨狀肌「上方」(梨狀肌上孔)進入臀部。","detail":{"background":"坐骨大孔被梨狀肌分為上、下兩孔:「梨狀肌上孔」通過臀上動脈與臀上神經;「梨狀肌下孔」通過臀下動脈、臀下神經、坐骨神經、股後皮神經、陰部神經與陰部內血管(後三者再經坐骨小孔入會陰)。故由梨狀肌上方進入臀部者為臀上動脈(與臀上神經)。其餘(臀下動脈、坐骨神經、陰部神經)皆經梨狀肌下方。","options":{"A":"臀上動脈經梨狀肌上孔進入臀部—正解。","B":"臀下動脈經梨狀肌下孔。","C":"坐骨神經經梨狀肌下孔。","D":"陰部神經經梨狀肌下孔(再入會陰)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-08":{"quick":"腓深神經受損致脛前肌等前群肌無力,造成垂足。","detail":{"background":"腓總神經分腓淺、腓深兩支:「腓深神經(deep fibular n.)」支配小腿「前群」肌—脛前肌(tibialis anterior,足背屈與內翻)、伸趾長肌、伸拇長肌、第三腓骨肌與足背的伸趾短肌,並司第1-2趾間背側小區皮膚。其受損(或腓總神經於腓骨頸受壓)致足背屈無力→「垂足(foot drop)」、跨閾步態。腓「淺」神經才支配腓長/短肌(外翻);脛後肌由脛神經(後群)支配。故腓深神經受損致脛前肌無力。","options":{"A":"腓長肌由腓淺神經支配。","B":"腓短肌由腓淺神經支配。","C":"脛前肌由腓深神經支配、受損無力—正解。","D":"脛後肌由脛神經支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-29":{"quick":"股薄肌與內收長肌同由閉孔神經支配。","detail":{"background":"大腿內收肌群由閉孔神經支配:內收長肌、內收短肌、內收大肌(內收部)、「股薄肌(gracilis)」與部分恥骨肌皆由「閉孔神經(obturator n., L2–4)」支配,故股薄肌與內收長肌神經相同。恥骨肌「主要」由股神經(部分閉孔)支配;股方肌與閉孔內肌由薦神經叢分支(股方肌神經、閉孔內肌神經)支配。故與內收長肌同神經者為股薄肌。","options":{"A":"股薄肌與內收長肌同由閉孔神經支配—正解。","B":"股方肌由股方肌神經(薦叢)支配。","C":"恥骨肌主要由股神經支配。","D":"閉孔內肌由閉孔內肌神經(薦叢)支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-11":{"quick":"膝反射(膝跳反射)測試股神經(L2–L4,股四頭肌)的反射弧。","detail":{"background":"膝反射(knee jerk/patellar reflex)是敲擊髕韌帶牽張股四頭肌肌梭引發的單突觸牽張反射,其反射弧傳入與傳出皆經「股神經(femoral n.)」、脊髓節段為「L2–L4(主要L4)」。故膝反射主要測試股神經(L2–4)的完整性,反射減弱提示L2–4或股神經病變。對照:踝反射測脛神經(S1)、肱二頭肌反射測肌皮神經(C5–6)。故為股神經。","options":{"A":"膝反射測股神經(L2–4)—正解。","B":"閉孔神經司內收肌,非膝反射。","C":"坐骨神經司大腿後群與小腿,非膝反射。","D":"脛神經(S1)司踝反射。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-13":{"quick":"跗骨隧道(內踝後方)可觸及脛後動脈搏動。","detail":{"background":"脛後動脈(posterior tibial a.)沿小腿後深部下行,於「內踝後下方、跗骨隧道(屈肌支持帶深面)」處表淺,可在此觸及搏動(臨床評估下肢周邊循環的重要脈點之一)。其於跗骨隧道內分為足底內、外側動脈。脛前動脈則在足背續為足背動脈(於足背可觸)。故跗骨隧道處觸及者為脛後動脈。","options":{"A":"脛前動脈在足背續為足背動脈,於足背可觸。","B":"脛後動脈於跗骨隧道(內踝後)可觸—正解。","C":"足底內側動脈為脛後動脈遠端分支(較深)。","D":"足底外側動脈為脛後動脈遠端分支(較深)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-29":{"quick":"大腿後肌群(膕旁肌)由坐骨神經支配。","detail":{"background":"大腿後群肌(hamstrings:半腱肌、半膜肌、股二頭肌)由「坐骨神經(sciatic n., L4–S3)」支配—其中半腱肌、半膜肌與股二頭肌長頭由坐骨神經的「脛側部」、股二頭肌短頭由「腓總部」支配,作用為伸髖屈膝。股神經司大腿前群(伸膝)、閉孔神經司內收肌群。故大腿後群由坐骨神經支配。","options":{"A":"脛神經是坐骨神經的分支(於膕窩分出),但大腿後群由坐骨神經本幹支配。","B":"股神經司大腿前群(伸膝)。","C":"閉孔神經司內收肌群。","D":"大腿後群由坐骨神經支配—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-09":{"quick":"臀上神經支配臀中肌、臀小肌與闊筋膜張肌,發炎時闊筋膜張肌同受影響。","detail":{"background":"臀中肌(gluteus medius)由「臀上神經(superior gluteal n., L4–S1)」支配,該神經同時支配「臀小肌(gluteus minimus)與闊筋膜張肌(tensor fasciae latae)」—三者協同外展髖並穩定骨盆(單腳站立時防對側骨盆下墜,故臀上神經損傷出現Trendelenburg徵)。臀大肌由臀下神經、梨狀肌與上孖肌由薦叢其他分支支配。故同受影響者為闊筋膜張肌。","options":{"A":"臀大肌由臀下神經支配。","B":"梨狀肌由梨狀肌神經(薦叢)支配。","C":"上孖肌由閉孔內肌神經支配。","D":"闊筋膜張肌與臀中肌同由臀上神經支配—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-10":{"quick":"閉孔內肌神經同時支配上孖肌,故損傷時上孖肌功能受影響。","detail":{"background":"坐骨神經以外、薦神經叢的「閉孔內肌神經(nerve to obturator internus, L5–S2)」支配閉孔內肌與「上孖肌(superior gemellus)」;另有「股方肌神經」支配股方肌與「下孖肌(inferior gemellus)」。故閉孔內肌神經損傷會同時影響上孖肌(兩者皆司髖外旋)。內收長肌由閉孔神經、提肛肌由薦神經(S3-4)直接支配,皆非閉孔內肌神經。故同受影響者為上孖肌。","options":{"A":"內收長肌由閉孔神經支配。","B":"提肛肌由薦神經(S3–4)直接支配。","C":"下孖肌由股方肌神經支配。","D":"上孖肌與閉孔內肌同由閉孔內肌神經支配—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-12":{"quick":"股動脈穿內收大肌的內收肌裂孔後續為膕動脈。","detail":{"background":"股動脈於大腿前內側下行於「內收肌管(Hunter管)」內,至大腿下1/3穿過「內收大肌(adductor magnus)」的「內收肌裂孔(adductor hiatus)」進入膕窩,改名為「膕動脈(popliteal a.)」。故股動脈穿內收大肌後成膕動脈。內收肌裂孔是內收大肌肌腱(止於收肌結節)與股骨之間的開口。","options":{"A":"閉孔外肌非股動脈通路。","B":"股四頭肌為大腿前群,非股動脈穿越處。","C":"內收長肌非內收肌裂孔所在。","D":"股動脈穿內收大肌(內收肌裂孔)成膕動脈—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-29":{"quick":"腰大肌與髂肌合腱(髂腰肌)止於股骨小轉子。","detail":{"background":"髂腰肌(iliopsoas)由「腰大肌(psoas major,起自T12–L5椎體與橫突)」與「髂肌(iliacus,起自髂窩)」於腹股溝韌帶深面合併、共腱止於「股骨小轉子(lesser trochanter)」,是最強的屈髖肌(亦助外旋)。故其止點為小轉子。粗線、恥骨線為內收/股骨後面肌附著,大轉子為臀中小肌與旋外肌群附著。","options":{"A":"粗線為內收肌等附著。","B":"恥骨線為恥骨肌附著。","C":"髂腰肌止於股骨小轉子—正解。","D":"大轉子為臀中/小肌與旋外肌附著。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-28":{"quick":"薦棘韌帶與大腿闊筋膜的附著無關。","detail":{"background":"大腿闊筋膜(fascia lata)向上、周邊的附著:上方附於「腹股溝韌帶、髂嵴、薦骨與尾骨、坐骨粗隆、坐骨恥骨支與恥骨聯合」等骨性與韌帶標誌,外側增厚為髂脛束。薦棘韌帶(sacrospinous ligament)是連接薦骨與坐骨棘的骨盆韌帶(與薦結節韌帶共圍坐骨大小孔),與闊筋膜附著無關。故與闊筋膜附著無關者為薦棘韌帶。","options":{"A":"闊筋膜上方附於腹股溝韌帶。","B":"薦棘韌帶與闊筋膜附著無關—正解。","C":"闊筋膜附於髂嵴。","D":"闊筋膜附於坐骨粗隆。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111020-31":{"quick":"大隱靜脈直接注入股靜脈、不經膕靜脈,故膕靜脈血栓時其血流最不受影響。","detail":{"background":"下肢靜脈回流:小隱靜脈→膕靜脈;脛前/脛後靜脈→膕靜脈;膕靜脈→股靜脈→髂外靜脈。膕靜脈血栓會使其上游(小隱、脛後等)回流受阻、下游(股靜脈)血流也受影響。但「大隱靜脈(great saphenous vein)」是淺靜脈,沿大腿內側上行「直接注入股靜脈(於隱靜脈裂孔)」,並不經過膕靜脈,故膕靜脈血栓時其血流最不可能減少(反而可能成為側支代償通路)。故為大隱靜脈。","options":{"A":"大隱靜脈直接注入股靜脈、不經膕靜脈,血流最不受影響—正解。","B":"小隱靜脈注入膕靜脈,受影響。","C":"脛後靜脈匯入膕靜脈,受影響。","D":"股靜脈接受膕靜脈血,受影響。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-13":{"quick":"見附圖:兩眼皆「右半視野缺損」=右側同向偏盲,定位於左視徑(left optic tract)。","detail":{"background":"視野缺損定位(對照附圖):附圖兩眼視野皆「右半黑色(缺損)」→「右側同向偏盲(right homonymous hemianopia)」=兩眼「同一側(右側)」視野缺損→屬「視交叉「之後」的左側視覺路徑」受損,定位於「左視徑(left optic tract)」(或左視放射、左枕葉視皮質)。判讀法則:①視神經(視交叉前)病灶→「該眼單眼全盲」;②視交叉「中央」病灶(垂體瘤壓迫)→「雙顳側偏盲(bitemporal hemianopia)」;③視交叉「後」(視徑/外膝核/視放射/枕葉)病灶→「對側「同向偏盲」」(左側病灶→右側同向偏盲)。故右側同向偏盲=左視徑。","options":{"A":"左視徑病灶→對側(右側)同向偏盲,符合附圖—正解。","B":"視交叉中央病灶→雙顳側偏盲(非單側同向偏盲)。","C":"右視神經病灶→右眼單眼全盲(非雙眼右半)。","D":"右外膝狀核病灶→左側同向偏盲(與附圖右側缺損相反)。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-21":{"quick":"腰大肌由腰神經前支(L1–L3)直接支配,非股神經。","detail":{"background":"結構與神經配對檢視:橫膈—膈神經(C3–5),正確;腹外斜肌—下位胸神經(T7–T11,及肋下神經),正確;髂肌—股神經(L2–4),正確;但「腰大肌(psoas major)」是由「腰叢神經根的前支(L1–L3 ventral rami)」直接的肌支支配,並非股神經。故配對錯誤者為「腰大肌:股神經」。注意髂肌與腰大肌雖合為髂腰肌,但神經支配來源不同(髂肌=股神經、腰大肌=L1–3前支)。","options":{"A":"橫膈由膈神經支配,正確。","B":"稱腰大肌由股神經支配—錯誤(應為L1–3前支),為正解。","C":"腹外斜肌由T7–T11胸神經支配,正確。","D":"髂肌由股神經支配,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-24":{"quick":"深髂迴旋動脈是髂外動脈的分支,不是髂內動脈分支。","detail":{"background":"髂內動脈(internal iliac a.)分支供應骨盆臟器、會陰、臀部與骨盆壁,包括髂腰動脈、薦外側動脈、臀上動脈、臀下動脈、閉孔動脈、臍動脈/膀胱上動脈、膀胱下/子宮動脈、中直腸動脈、陰部內動脈。「深髂迴旋動脈(deep circumflex iliac a.)」與腹壁下動脈則是「髂外動脈(external iliac a.)」近腹股溝韌帶處的分支,供下腹壁與髂嵴區。故不是髂內動脈分支者為深髂迴旋動脈。","options":{"A":"深髂迴旋動脈為髂外動脈分支,非髂內—正解。","B":"髂腰動脈為髂內動脈分支。","C":"臀上動脈為髂內動脈分支。","D":"臀下動脈為髂內動脈分支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-26":{"quick":"大隱靜脈經內踝「前方」上行,非後方。","detail":{"background":"大隱靜脈(great saphenous vein)起自足背靜脈弓內側端,經「內踝『前方』」上行(此恆定位置是緊急靜脈切開/輸液的標誌),沿小腿與大腿內側上行,沿途與小隱靜脈及深靜脈有交通支吻合,最終於股三角的隱靜脈裂孔注入股靜脈;其瓣膜功能不良致下肢靜脈曲張。故B「於內踝後側上行」錯誤(應為內踝前方)。","options":{"A":"起源於足背靜脈弓,正確。","B":"稱於內踝後側上行—錯誤(應為內踝前方),為正解。","C":"與小隱靜脈有交通吻合,正確。","D":"最終匯入股靜脈,正確。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-28":{"quick":"屈拇長肌肌腱繞過載距突下方的溝槽進入足底。","detail":{"background":"踝內側後方有三條屈肌腱經跗骨隧道入足底,其中「屈拇長肌(flexor hallucis longus)」的肌腱特別繞過跟骨「載距突(sustentaculum tali)」下方的溝槽,再斜向前內至大拇趾遠節—載距突像滑車支撐此腱。屈趾長肌腱則跨於其上方(兩腱於足底交叉處稱Henry結)。故繞載距突下方溝槽者為屈拇長肌。","options":{"A":"屈拇長肌腱繞載距突下方溝槽—正解。","B":"屈趾長肌腱跨於載距突上方。","C":"屈拇短肌位於足底,不經載距突。","D":"屈趾短肌位於足底,不經載距突。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-30":{"quick":"臀大肌主要止於髂脛束與臀肌粗隆,大轉子碎裂對其功能影響最小。","detail":{"background":"股骨大轉子(greater trochanter)是多條髖外旋與外展肌的止點:臀中肌、臀小肌(外展)、梨狀肌、閉孔內肌與上下孖肌、閉孔外肌(外旋)皆止於此。而「臀大肌(gluteus maximus)」大部分纖維止於「髂脛束」、只有深部少量纖維止於股骨臀肌粗隆(非大轉子),故大轉子碎裂對臀大肌(主司伸髖)功能影響最小。故為臀大肌。","options":{"A":"臀大肌主要止髂脛束,大轉子碎裂影響最小—正解。","B":"臀小肌止於大轉子,受影響。","C":"梨狀肌止於大轉子,受影響。","D":"閉孔內肌止於大轉子,受影響。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-28":{"quick":"屈拇長肌肌腱跨過距骨體後方進入足底。","detail":{"background":"小腿後深群中,「屈拇長肌(flexor hallucis longus)」起自腓骨後面,其肌腱繞「距骨體後方」(在距骨後突兩結節間的溝)與載距突下方,斜向前內進入足底至大拇趾。此走行使其在芭蕾舞者過度蹠屈時易於距骨後方夾擊(posterior ankle impingement)。脛後肌與屈趾長肌腱走更內側(內踝後方)、腓骨長肌走外踝後方。故跨距骨體後方者為屈拇長肌。","options":{"A":"脛後肌腱走內踝後方(最內)。","B":"屈趾長肌腱走內踝後方,非距骨體後正中。","C":"屈拇長肌腱跨距骨體後方入足底—正解。","D":"腓骨長肌腱走外踝後方。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-31":{"quick":"內側半月板與脛側副韌帶相連,受傷常一併損傷。","detail":{"background":"膝關節「內側半月板(medial meniscus)」周緣與「脛側副韌帶(tibial/medial collateral ligament)」緊密附著,故內側半月板撕裂常合併脛側副韌帶損傷;若再加前十字韌帶斷裂即「不幸三聯傷」。外側半月板則與外側副韌帶「不」相連(中隔膕肌腱),活動度較大、較不易連動。故同時受損者為脛側副韌帶。","options":{"A":"髂脛束為外側支持結構,與內側半月板無直接相連。","B":"膕肌腱隔開外側半月板與外側副韌帶。","C":"脛側副韌帶與內側半月板相連、易一併損傷—正解。","D":"腓側副韌帶與外側半月板不直接相連。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-27":{"quick":"足背第一趾蹼(大趾外側與第二趾內側間)感覺由深腓神經支配。","detail":{"background":"腓總神經分支的皮膚感覺:「深腓神經(deep fibular n.)」除支配小腿前群肌外,其感覺末端只司「足背第一趾蹼區(大拇趾外側緣與第二趾內側緣之間)」的一小塊皮膚;「淺腓神經(superficial fibular n.)」司足背其餘大部分皮膚。隱神經司小腿與足內側,內蹠神經司足底內側。故第一趾蹼區感覺異常提示深腓神經受損。","options":{"A":"深腓神經司足背第一趾蹼區—正解。","B":"淺腓神經司足背其餘大部皮膚。","C":"隱神經司小腿/足內側。","D":"內蹠神經司足底內側。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-30":{"quick":"上臀動脈屬轉子吻合,不參與大腿上部的十字吻合,最不受影響。","detail":{"background":"大腿上部的「十字吻合(cruciate anastomosis)」由四條動脈構成:內側迴旋股動脈、外側迴旋股動脈、「下臀動脈(inferior gluteal a.)」與第一穿動脈,提供臀部與下肢間的側支循環。「上臀動脈(superior gluteal a.)」則主要參與「轉子吻合(trochanteric anastomosis)」(與兩條迴旋股動脈),並非十字吻合的成員。故結紮十字吻合諸動脈後,最不受影響者為上臀動脈。","options":{"A":"內側迴旋股動脈為十字吻合成員。","B":"外側迴旋股動脈為十字吻合成員。","C":"上臀動脈屬轉子吻合、非十字吻合,最不受影響—正解。","D":"下臀動脈為十字吻合成員。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-31":{"quick":"踝關節由脛骨、腓骨與距骨共同構成。","detail":{"background":"踝關節(距小腿關節, ankle/talocrural joint)是屈戌(滑車)關節,由「脛骨下端(內踝與脛骨下關節面)、腓骨下端(外踝)構成的榫眼(mortise)」與「距骨滑車(talus)」相關節,負責足的背屈與蹠屈。跟骨參與的是其下方的距下關節(subtalar joint)。股骨在膝關節。故踝關節三骨為脛骨、腓骨、距骨。","options":{"A":"股骨在膝關節,不參與踝關節。","B":"跟骨參與距下關節,非踝關節。","C":"脛骨、腓骨與距骨構成踝關節—正解。","D":"缺腓骨,且跟骨屬距下關節。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-28":{"quick":"腓骨頭頸骨折最易傷及鄰近的脛前動脈(及繞行腓骨頸的腓總神經)。","detail":{"background":"腓骨頸是常見骨折/受壓處:繞行腓骨頸的「腓總神經」最易受傷(致垂足),其鄰近的血管中,「脛前動脈(anterior tibial a.)」自膕動脈分出後,於小腿近端穿骨間膜上緣、貼近腓骨頸前方下行至小腿前群,故腓骨頭頸骨折亦可能傷及脛前動脈。腓動脈、脛後動脈走小腿後深部、膕動脈在膝後深部,較不受腓骨頸骨折直接影響。故為脛前動脈。","options":{"A":"腓動脈走小腿後深部(貼腓骨後內),非腓骨頸前。","B":"脛前動脈貼近腓骨頸前方、最易受傷—正解。","C":"脛後動脈走小腿後深部。","D":"膕動脈在膝後深部。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-29":{"quick":"距骨沒有任何肌肉或肌腱附著。","detail":{"background":"距骨(talus)是足部唯一「沒有肌肉或肌腱附著」的跗骨—它上承脛腓骨、下接跟骨、前接舟狀骨,全靠關節面與韌帶連結傳遞體重,表面約60%為關節軟骨;也因無肌肉附著、血供主要靠周邊韌帶進入,距骨頸骨折易致缺血壞死。跟骨(跟腱、足底肌)、舟狀骨(脛後肌)、骰骨(腓骨長肌腱溝)皆有肌腱附著或經過。故無肌腱附著者為距骨。","options":{"A":"跟骨有跟腱與足底肌附著。","B":"舟狀骨有脛後肌腱附著(舟狀骨粗隆)。","C":"骰骨有腓骨長肌腱經其溝。","D":"距骨無任何肌肉/肌腱附著—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-31":{"quick":"坐骨神經由坐骨大孔(梨狀肌下孔)進入臀區時位置最靠外側。","detail":{"background":"經梨狀肌下孔出坐骨大孔的構造,由外側至內側排列為:「坐骨神經(sciatic n.,最外側)」、股後皮神經、臀下神經與臀下血管、陰部內血管與陰部神經、閉孔內肌神經(最內側)。故進入臀區時位置最外側者為坐骨神經—這也是臀部肌肉注射須選「外上象限」以避開坐骨神經的解剖依據。","options":{"A":"閉孔內肌神經位置最內側。","B":"陰部神經偏內側(近坐骨棘)。","C":"股後皮神經位於坐骨神經內側。","D":"坐骨神經位置最外側—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-28":{"quick":"距骨夾在內踝與外踝之間(踝榫眼內)。","detail":{"background":"踝關節的榫眼(mortise)由脛骨內踝、脛骨下關節面與腓骨外踝構成,其中夾住「距骨(talus)」的滑車。故位於內踝與外踝之間者為距骨。跟骨在距骨下方(距下關節)、舟狀骨在距骨前方、骰骨在跟骨前方,皆不在兩踝之間。距骨滑車前寬後窄,故背屈時較穩定、蹠屈時較鬆(易扭傷)。","options":{"A":"跟骨位於距骨下方。","B":"距骨夾在內外踝之間—正解。","C":"舟狀骨在距骨前方。","D":"骰骨在跟骨前方。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-29":{"quick":"內收長肌不構成鵝足;鵝足由縫匠肌、股薄肌、半腱肌組成。","detail":{"background":"「鵝足(pes anserinus)」是三條肌肉的腱於脛骨近端內側面的共同止點,因形似鵝掌得名,由前上至後下為:縫匠肌(sartorius,股神經)、股薄肌(gracilis,閉孔神經)、半腱肌(semitendinosus,坐骨神經)—來自三個不同神經叢卻共同止此,可協同屈膝與穩定膝內側。內收長肌止於股骨粗線,不參與鵝足。故不構成鵝足者為內收長肌。","options":{"A":"股薄肌構成鵝足。","B":"縫匠肌構成鵝足。","C":"半腱肌構成鵝足。","D":"內收長肌止於股骨粗線、不構成鵝足—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-28":{"quick":"伸直髖關節(伸髖)是大腿「後」群與臀部肌肉的作用,非前群。","detail":{"background":"大腿前群肌(股神經支配)的作用:屈髖(髂腰肌、縫匠肌、股直肌)、伸膝(股四頭肌),縫匠肌另可使大腿屈曲外展「外旋」(盤腿動作)。「伸直髖關節(extend hip)」則由大腿「後群(膕旁肌)」與臀大肌負責,屬伸髖肌而非前群。故不是大腿前群作用者為伸髖。","options":{"A":"屈髖為前群(髂腰肌/股直肌)作用。","B":"外旋大腿為前群縫匠肌作用之一。","C":"伸膝為前群股四頭肌作用。","D":"伸髖為後群/臀大肌作用,非前群—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-30":{"quick":"內收結節位於股骨內上髁的上方。","detail":{"background":"股骨遠端內側有「內上髁(medial epicondyle)」,其上方的小突起即「內收結節(adductor tubercle)」,是內收大肌「腱性部(坐骨部)」的止點。臨床上內收結節是觸診股骨遠端與膝部手術的標誌,也對應內收肌裂孔(收肌腱與股骨間,股動脈穿此入膕窩)。故內收結節位於內上髁上方。","options":{"A":"大轉子內側為轉子窩(旋外肌止點)。","B":"內收結節位於內上髁上方—正解。","C":"外上髁下方為腓側副韌帶起點區。","D":"小轉子外方為轉子間區。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-31":{"quick":"降膝動脈是股動脈的分支,不是膕動脈分支。","detail":{"background":"膕動脈(popliteal a.)在膕窩發出供應膝關節的「膝動脈群(genicular arteries)」:上外/上內膝動脈、中膝動脈(供十字韌帶)、下外/下內膝動脈,並終分為脛前動脈與脛後動脈。「降膝動脈(descending genicular a.)」則是「股動脈」在內收肌管內、穿內收肌裂孔前發出的分支(供膝內側與股內側肌),參與膝關節吻合但非膕動脈分支。故不是膕動脈分支者為降膝動脈。","options":{"A":"降膝動脈為股動脈分支,非膕動脈—正解。","B":"上膝動脈為膕動脈分支。","C":"中膝動脈為膕動脈分支(供十字韌帶)。","D":"下膝動脈為膕動脈分支。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-28":{"quick":"外展拇短肌由正中神經支配,其餘三者由尺神經支配。","detail":{"background":"手內在肌神經支配:尺神經(深支)支配「全部骨間肌、內收拇肌、第3、4蚓狀肌、小魚際肌」與掌短肌;正中神經(返支)支配「大魚際肌(外展拇短肌、屈拇短肌淺頭、對掌拇肌)與第1、2蚓狀肌」。故掌側骨間肌、內收拇肌、第四蚓狀肌皆為尺神經;唯「外展拇短肌(abductor pollicis brevis)」由正中神經支配,與其他三者不同。","options":{"A":"掌側骨間肌由尺神經支配。","B":"內收拇肌由尺神經支配。","C":"外展拇短肌由正中神經支配,與其他不同—正解。","D":"第四蚓狀肌由尺神經支配。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-30":{"quick":"臀大肌主要止於髂脛束,大轉子骨折對其功能影響最小。","detail":{"background":"股骨大轉子是臀中肌、臀小肌(外展)與梨狀肌、閉孔內肌、上下孖肌(外旋)的止點;大轉子骨折會影響這些肌肉。「臀大肌(gluteus maximus)」大部分止於髂脛束、僅深部少量止臀肌粗隆,故大轉子骨折對其(伸髖)功能影響最小。故為臀大肌。此構造的正確辨識與鄰近關係,是臨床診斷、影像判讀與手術定位避免誤傷的重要解剖基礎,須與相似構造仔細區辨。","options":{"A":"上孖肌止於大轉子,受影響。","B":"閉孔內肌止於大轉子,受影響。","C":"臀大肌主止髂脛束、受大轉子骨折影響最小—正解。","D":"梨狀肌止於大轉子,受影響。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-31":{"quick":"脛前肌肌腱走足背(經伸肌支持帶),不經跗骨隧道。","detail":{"background":"跗骨隧道(tarsal tunnel,內踝後下方屈肌支持帶深面)內由前而後通過:脛後肌腱、屈趾長肌腱、脛後動脈與脛神經、屈拇長肌腱(皆為「屈/內翻」肌腱)。「脛前肌(tibialis anterior)」屬小腿前群、其肌腱走「足背」(經伸肌支持帶下),負責足背屈與內翻,不經跗骨隧道。故不通過跗骨隧道者為脛前肌。","options":{"A":"脛前肌腱走足背,不經跗骨隧道—正解。","B":"脛後肌腱經跗骨隧道。","C":"屈拇長肌腱經跗骨隧道。","D":"屈趾長肌腱經跗骨隧道。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_106100-31":{"quick":"肩胛骨內側緣與棘突間的出血最可能傷及頸橫動脈(其深支/背肩胛動脈)。","detail":{"background":"肩胛骨內側緣與脊椎棘突之間(菱形肌深面)的血供主要來自「頸橫動脈(transverse cervical a.,甲狀頸幹分支)」的「深支(背肩胛動脈/dorsal scapular a.)」,它沿肩胛骨內側緣下行供菱形肌與該區。故此處外傷出血最可能傷及頸橫動脈的分支。肩胛上動脈走肩胛上切迹(供棘上下肌),肩胛下動脈在腋區,頸深動脈在項部更上方深層,皆非此區主供。","options":{"A":"肩胛上動脈供棘上/下窩(肩胛上切迹處)。","B":"肩胛下動脈在腋區。","C":"頸深動脈在項部上方深層。","D":"頸橫動脈(背肩胛支)供肩胛內側緣區—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_107100-17":{"quick":"上頸神經節約位於第一、二頸椎高度。","detail":{"background":"交感神經幹頸部有三個神經節:「上頸神經節(superior cervical ganglion)」最大,約位於「第一、二頸椎(C1–C2)」橫突前方;中頸神經節約C6;星狀(頸胸)神經節約C7–T1。上頸神經節發出節後纖維沿頸內/外動脈叢分布至頭面(瞳孔擴大肌、上瞼平滑肌、汗腺、血管),其損傷致Horner症候群。故上頸神經節在C1–C2高度。","options":{"A":"上頸神經節約在C1–C2高度—正解。","B":"C4非交感神經節標準位置。","C":"C6約為中頸神經節。","D":"T1約為星狀神經節。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108030-26":{"quick":"肉膜肌(dartos)為平滑肌、由交感神經支配,不受腰神經叢損傷影響。","detail":{"background":"腰神經叢(lumbar plexus, L1–L4)分支支配:髂腹下、髂腹股溝神經(支配腹壁肌含腹橫肌部分)、生殖股神經(生殖支→提睪肌)、股神經、閉孔神經(→閉孔外肌等)。而陰囊的「肉膜肌(dartos muscle)」是「平滑肌」,由「交感神經」支配(調節陰囊皮膚張力),屬自律神經、不受腰神經叢(體神經)損傷影響。故不受影響者為肉膜肌。","options":{"A":"腹橫肌部分由髂腹下/股神經區段支配,受腰叢影響。","B":"提睪肌由生殖股神經(腰叢)支配,受影響。","C":"肉膜肌為平滑肌、交感支配,不受腰叢影響—正解。","D":"閉孔外肌由閉孔神經(腰叢)支配,受影響。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_108100-31":{"quick":"枕下肌的大後頭直肌位於背部肌肉最深層。","detail":{"background":"背部肌肉分淺、中、深層:淺層(連上肢)如斜方肌、闊背肌;中層如夾肌(splenius);深層為豎脊肌(髂肋肌、最長肌、棘肌)與更深的橫突棘肌群(半棘肌、多裂肌、迴旋肌);最深層為枕下三角的「枕下肌(suboccipital muscles)」—大、小後頭直肌與上、下頭斜肌。故四選項中位於最深層者為「大後頭直肌(rectus capitis posterior major)」(枕下肌)。頭夾肌、頭最長肌、頭半棘肌皆較淺。","options":{"A":"頭夾肌屬中層。","B":"頭最長肌屬深層(豎脊肌)但較枕下肌淺。","C":"頭半棘肌屬深層(橫突棘肌)但較枕下肌淺。","D":"大後頭直肌(枕下肌)位於最深層—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109020-12":{"quick":"背根絲(dorsal rootlet)只含感覺(傳入)神經纖維。","detail":{"background":"脊神經的組成:「背根(dorsal root,含背根絲dorsal rootlets)」由背根神經節的假單極感覺神經元中樞突組成,「只含感覺(傳入)纖維」;「腹根(ventral root,含腹根絲)」由前角運動神經元軸突組成,含運動(傳出)纖維。背根與腹根在椎間孔處合成「脊神經」(混合),再分為背側支與腹側支(皆為混合,含感覺與運動)。故只含感覺纖維者為背根絲。","options":{"A":"背側支為混合(感覺+運動)。","B":"腹側支為混合(感覺+運動)。","C":"背根絲只含感覺纖維—正解。","D":"腹根絲只含運動纖維。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-13":{"quick":"齒突主要與寰椎前弓(前結節)的後表面形成關節(正中寰樞關節)。","detail":{"background":"寰樞椎要點:「寰枕關節(atlanto-occipital joint)」主司頭部「前後點頭(屈伸)」(說yes);「寰樞關節(atlanto-axial joint)」主司頭部「左右轉動」(說no)。樞椎(C2)的齒突(dens)向上,「前面與寰椎前弓(前結節)的後表面」形成正中寰樞關節、後面與寰椎橫韌帶相接;翼韌帶(alar ligament)連結齒突與「枕骨髁」(非寰椎)以限制過度旋轉。頸椎橫突有「橫突孔」(過椎動脈)而非肋關節面(肋關節面為胸椎特徵)。故C正確。","options":{"A":"寰枕關節主司屈伸(點頭),非左右轉動。","B":"翼韌帶連齒突與枕骨髁,非寰椎。","C":"齒突與寰椎前弓(前結節)後面形成關節—正解。","D":"頸椎橫突有橫突孔,無肋關節面。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-25":{"quick":"胸鎖關節屬滑液關節。","detail":{"background":"關節分類檢視:椎體間的椎間關節(椎間盤)屬「軟骨關節(纖維軟骨聯合symphysis)」,非滑液關節;第1胸肋關節屬「軟骨關節(原發性軟骨聯合synchondrosis)」;第2–7胸肋關節屬「滑液關節」(非軟骨關節);「胸鎖關節(sternoclavicular joint)」屬「滑液關節」(鞍狀,含關節盤)。故正確者為胸鎖關節屬滑液關節。","options":{"A":"椎間關節(椎間盤)屬軟骨關節,非滑液。","B":"第1胸肋關節屬軟骨關節(synchondrosis)。","C":"第2–7胸肋關節屬滑液關節,非軟骨。","D":"胸鎖關節屬滑液關節—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_109100-31":{"quick":"小後頭直肌附著於寰椎(C1)後結節,不附第二頸椎棘突。","detail":{"background":"附著於第二頸椎(樞椎, C2)棘突者:頸半棘肌、下頭斜肌(起自C2棘突至C1橫突)、「大後頭直肌(rectus capitis posterior major,起自C2棘突)」。而「小後頭直肌(rectus capitis posterior minor)」起自「寰椎(C1)的後結節」(C1無真正棘突、為後結節),止於枕骨,不附C2棘突。故不附C2棘突者為小後頭直肌。","options":{"A":"頸半棘肌附C2棘突。","B":"下頭斜肌起自C2棘突。","C":"大後頭直肌起自C2棘突。","D":"小後頭直肌起自C1後結節,不附C2棘突—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-08":{"quick":"乳糜池約位於第二腰椎(L1–L2)高度。","detail":{"background":"乳糜池(cisterna chyli)是胸管下端的囊狀膨大,約位於「第一至第二腰椎(L1–L2)前方、腹主動脈右後方」,收集兩條腰淋巴幹與腸淋巴幹的淋巴,向上經主動脈裂孔(T12)入胸成為胸管。故乳糜池約在L2高度。此構造的正確辨識與鄰近關係,是臨床診斷、影像判讀與手術定位避免誤傷的重要解剖基礎,須與相似構造仔細區辨。","options":{"A":"T12為主動脈裂孔(胸管入胸處),乳糜池略低。","B":"乳糜池約在L1–L2高度—正解。","C":"L5過低(近主動脈分叉)。","D":"S1為骶骨,過低。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_110020-31":{"quick":"髂肋肌(豎脊肌最外側柱)不向上附著到頭骨。","detail":{"background":"豎脊肌(erector spinae)由外而內分三柱:髂肋肌(iliocostalis,最外,止於肋角,最高僅達頸椎橫突,「不達頭骨」)、最長肌(longissimus,中,其「頭最長肌capitis」附於顳骨乳突→達頭骨)、棘肌(spinalis,最內)。夾肌(splenius capitis)與半棘肌(semispinalis capitis)亦附於枕骨/乳突達頭骨。故不附頭骨者為髂肋肌。","options":{"A":"夾肌(頭夾肌)附於枕骨/乳突,達頭骨。","B":"半棘肌(頭半棘肌)附於枕骨,達頭骨。","C":"髂肋肌最高僅達頸椎橫突,不附頭骨—正解。","D":"最長肌(頭最長肌)附於乳突,達頭骨。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-17":{"quick":"胸骨角水平對應第四與第五胸椎之間。","detail":{"background":"胸骨角(sternal angle/Louis角)是「胸骨柄與胸骨體」交界處的橫向隆起,「兩側連接第二肋軟骨」(計數肋骨的起點),水平面對應「T4/T5椎間盤」—此平面標誌氣管分叉、主動脈弓起止、奇靜脈匯入上腔靜脈、上下縱膈分界。柄胸關節(manubriosternal joint)屬「軟骨關節(symphysis)」,老年可骨化但非滑液關節。故B正確。","options":{"A":"兩側連接第二肋(非第一肋)。","B":"胸骨角對應T4/T5之間—正解。","C":"胸骨體與劍突交界為劍胸關節,非胸骨角。","D":"柄胸關節屬軟骨關節(symphysis),非滑液關節。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_111100-29":{"quick":"(本題為椎骨辨識圖題)依圖中椎骨特徵,由頭端至尾端排列為丙→甲→乙。","detail":{"background":"脊柱椎骨由頭端(頸)至尾端(腰)可依特徵辨識:頸椎—椎體小、有「橫突孔(transverse foramen)」、棘突常分叉;胸椎—椎體心形、有「肋關節面(costal facet)」於椎體與橫突、棘突長而下斜;腰椎—椎體最大、無橫突孔與肋關節面、棘突方而水平。依各圖椎骨的橫突孔/肋關節面/椎體大小判定其所屬節段,即可排出由頭至尾的順序;本題正解為丙→甲→乙。判讀重點:見橫突孔→頸椎(最頭端);見肋關節面→胸椎;椎體最大無上述特徵→腰椎(最尾端)。","options":{"A":"甲→乙→丙順序與圖示特徵不符。","B":"丙→乙→甲順序不符。","C":"乙→甲→丙順序不符。","D":"丙→甲→乙(依橫突孔/肋面/椎體大小判定)—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-11":{"quick":"提上眼瞼肌負責「上提」上眼瞼,不參與下拉眉毛內角。","detail":{"background":"「下拉眉毛內側角(皺眉表情)」由數條表情肌(顏面神經支配)協同:眼輪匝肌(眶部纖維可下壓眉毛)、降眉間肌(procerus,使眉間橫紋、下拉眉內角)、皺眉肌(corrugator supercilii,使眉內收下移、產生眉間縱紋)。而「提上眼瞼肌(levator palpebrae superioris)」由動眼神經支配、作用為「上提上眼瞼(睜眼)」,與下拉眉毛無關。故不參與者為提上眼瞼肌。","options":{"A":"眼輪匝肌眶部可下壓眉毛。","B":"降眉間肌下拉眉內角。","C":"提上眼瞼肌上提眼瞼,不參與下拉眉毛—正解。","D":"皺眉肌使眉內收下移。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_112020-32":{"quick":"頭側(吻側)神經孔比尾側神經孔提早約2–3天關閉。","detail":{"background":"神經管的閉合由中段往兩端進行:「頭側(吻側)神經孔(rostral/anterior neuropore)」約在受精後第25天(第18–20體節期)關閉,「尾側神經孔(caudal/posterior neuropore)」約在第27–28天關閉—故頭側神經孔比尾側「提早約2–3天」關閉。頭側神經孔未閉→無腦症(anencephaly);尾側神經孔未閉→脊柱裂(spina bifida)。葉酸補充可降低神經管缺損風險。故A正確。","options":{"A":"頭側神經孔提早約2–3天關閉—正解。","B":"方向相反(頭側較早,非尾側)。","C":"差距非7–9天。","D":"差距非7–9天且方向相反。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-17":{"quick":"高位胸髓損傷使肋間肌癱瘓,初期肺活量大幅下降。","detail":{"background":"呼吸肌的脊髓節段:橫膈由膈神經(C3–5)、肋間肌由胸神經(T1–T11)、腹肌由下胸/腰神經支配。「高位胸椎(如上胸段T1–T6)脊髓損傷」時,膈神經(C3–5)以上完好,橫膈仍可收縮(故能維持基本呼吸),但「肋間肌(T1以下)癱瘓」使胸廓擴張受限、輔助吸氣與用力呼氣能力喪失,加上脊髓休克期,故初期肺活量大幅下降。若為頸髓(C3以上)損傷則橫膈也癱瘓、危及生命。故主因為肋間肌癱瘓。","options":{"A":"橫膈由C3–5支配,高位胸髓損傷時仍完好。","B":"肋間肌(T1–11)癱瘓致肺活量下降—正解。","C":"頸部肌肉非主要呼吸肌且其神經較高。","D":"腹肌主司用力呼氣,非肺活量下降主因。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113020-28":{"quick":"枕大神經(C2後支)從枕下三角的下緣(下頭斜肌下方)穿出。","detail":{"background":"枕下三角(suboccipital triangle)邊界:上內側為「頭後大直肌(rectus capitis posterior major)」、上外側為「頭上斜肌(obliquus capitis superior)」、下外側為「頭下斜肌(obliquus capitis inferior)」;三角「底」為寰枕後膜與寰椎後弓,內有「椎動脈(第三段)與枕下神經(C1後支)」。「枕大神經(greater occipital nerve, C2後支)」則繞頭下斜肌下緣、從三角下方穿出,再穿斜方肌至枕部頭皮。故C正確(枕大神經從三角下緣穿出);A、B把上內/上外側界顛倒,D枕動脈不在三角內(椎動脈才在)。","options":{"A":"上外側界為頭上斜肌(非頭後大直肌)。","B":"上內側界為頭後大直肌(非頭上斜肌)。","C":"枕大神經(C2後支)從三角下緣穿出—正解。","D":"三角內為椎動脈,枕動脈不在其內。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-17":{"quick":"劍突胸骨關節在呼吸時胸廓運動中參與最少。","detail":{"background":"呼吸時胸廓的運動靠肋椎關節(肋頭關節與肋橫關節,使肋骨做「幫浦柄」與「水桶柄」運動)、胸肋關節與柄胸關節(胸骨上抬)協同。「劍突胸骨關節(xiphisternal joint)」位於胸骨最下端、為軟骨聯合且活動度極小,對呼吸時胸廓擴張的貢獻最少。故最不可能參與呼吸運動者為劍突胸骨關節。","options":{"A":"劍突胸骨關節活動度小、參與呼吸最少—正解。","B":"肋橫關節參與肋骨呼吸運動。","C":"柄胸關節隨呼吸使胸骨上抬。","D":"胸肋關節參與呼吸時胸廓運動。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_113090-30":{"quick":"枕下神經(C1後支)出現在枕下三角內。","detail":{"background":"枕下三角內的構造為「椎動脈(第三段,V3,行於寰椎後弓上面的椎動脈溝)」與「枕下神經(suboccipital nerve, C1的後支)」—後者支配枕下三角的四條枕下肌(頭後大/小直肌、頭上/下斜肌)。枕大神經(C2後支)從三角下緣穿出後至枕部;枕小神經(C2、C3前支,屬頸叢)與第三枕神經(C3後支)皆不在三角內。故出現在枕下三角內者為枕下神經。","options":{"A":"枕下神經(C1後支)在枕下三角內—正解。","B":"枕大神經從三角下緣穿出(非三角內主構造)。","C":"枕小神經屬頸叢、不在三角內。","D":"第三枕神經(C3後支)不在三角內。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114020-31":{"quick":"第一頸神經的後支(即枕下神經)位於枕下三角內並支配枕下肌群。","detail":{"background":"第一頸神經(C1)的「後支(posterior/dorsal ramus)」即「枕下神經(suboccipital nerve)」,行於枕下三角內(椎動脈下方),支配構成此三角的枕下肌群(頭後大/小直肌、頭上/下斜肌),為純運動(C1後支通常無皮支)。C1的「前支」參與頸叢與舌下神經(司頸前肌);枕大神經(C2後支)與枕小神經(頸叢)司枕部皮膚感覺,皆非枕下三角的運動支配。故為C1後支。","options":{"A":"C1前支參與頸叢/隨舌下神經,非枕下三角運動支配。","B":"C1後支(枕下神經)在三角內、支配枕下肌—正解。","C":"枕大神經司枕部皮膚感覺。","D":"枕小神經司耳後頭皮感覺。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_114090-15":{"quick":"第十一胸椎通常無橫突肋關節面,故第十一肋只以肋頭與T11相接。","detail":{"background":"肋椎關節有二:肋頭關節(肋頭與椎體肋關節面)與肋橫關節(肋結節與「橫突肋關節面」)。典型肋骨(2–9)的肋頭跨接「上一椎體下半關節面+同數椎體上半關節面」,並以肋結節接同數椎的橫突肋關節面。但第11、12(及第1、10常)為「非典型肋」:第11、12胸椎「無橫突肋關節面」,故第11、12肋「只以肋頭」與同數椎體相接、無肋橫關節、且為浮肋。故D最恰當。","options":{"A":"第一肋頭只與T1相接,非與C7;敘述不當。","B":"第九肋為假肋,不直接連胸骨。","C":"典型肋頭跨接上下兩椎體,非僅第六胸椎下肋面。","D":"T11無橫突肋面、第11肋僅肋頭與T11相接—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}},"med1_115020-04":{"quick":"杏仁核經終紋(stria terminalis)與隔區及下視丘相連。","detail":{"background":"杏仁核(amygdala)的主要傳出束為「終紋(stria terminalis)」—它沿尾核弧形走行,投射至隔區(septal area)、下視丘(尤腹內側核)與終紋床核,參與情緒、自律與內分泌反應;另有腹側杏仁傳出路徑。穹窿是海馬傳出;內側前腦束貫穿下視丘外側連結前腦與腦幹;內側縱束司眼動。故杏仁核與隔區相連者為終紋。","options":{"A":"終紋連結杏仁核與隔區/下視丘—正解。","B":"穹窿為海馬主要傳出。","C":"前腦內側束連前腦與腦幹(下視丘外側)。","D":"內側縱束司眼球協同運動。"},"sources":["Snell《臨床神經解剖學》","Gray解剖學","Vanderah《Nolte人腦解剖》"]}},"med1_115020-18":{"quick":"腰椎下關節突的關節面朝向外側(與前方)。","detail":{"background":"腰椎椎間關節(zygapophyseal/facet joint)的關節面方位近矢狀面:「上關節突」的關節面朝向「後內側」、「下關節突」的關節面朝向「前外側(主要朝外側)」,上位椎的下關節突由外側「抱住」下位椎的上關節突。此方位允許腰椎屈伸、限制旋轉。故腰椎下關節突關節面朝向外側。(對比胸椎面近冠狀面利旋轉、頸椎面約45度。)","options":{"A":"上方非腰椎下關節突面的朝向。","B":"內側為「上」關節突面的朝向。","C":"下方非其關節面朝向。","D":"腰椎下關節突關節面朝向外側(前外)—正解。"},"sources":["Moore《臨床導向解剖學》","Gray解剖學","Netter解剖學圖譜"]}}},TO=["AN1中樞神經解剖", "AN2頭頸部與腦神經", "AN3胸部", "AN4腹部", "AN5骨盆會陰與泌尿生殖", "AN6上肢", "AN7下肢", "AN8背部脊柱與體壁總論"],LEC={"AN1中樞神經解剖":{"title":"中樞神經解剖","html":"\n<h4>一、神經系統分區與腦幹</h4>\n<ul>\n<li><b>大腦半球</b>分額(運動/Broca/前額)、頂(體感覺/角迴)、顳(聽覺Heschl/Wernicke/海馬)、枕(視覺距狀溝)四葉。初級運動區=前中央迴(BA4,含Betz細胞);初級體感覺=後中央迴(BA3-1-2)。</li>\n<li><b>腦幹</b>:中腦(上丘視覺/下丘聽覺/紅核/黑質/動眼IV核;唯一背側發出=滑車IV、唯一腦幹內交叉)、橋腦(三叉/外旋/顏面/前庭核、PPRF)、延腦(錐體交叉、薄/楔核、孤立核、疑核、舌下核)。</li>\n</ul>\n<h4>二、傳導路徑(必考)</h4>\n<ul>\n<li><b>背柱-內側蹄系</b>:精細觸覺/本體/震動→同側背柱(下肢薄束/上肢楔束)→延腦薄楔核→內弓狀纖維交叉成內側蹄系→視丘VPL→中央後迴。</li>\n<li><b>前外側系統(脊髓視丘徑)</b>:痛溫→後角換元→腹側白質聯合交叉→對側前外側索上行。脊髓半切(Brown-Séquard):同側錐體束+本體覺、對側痛溫。</li>\n<li><b>聽覺</b>:耳蝸核→上橄欖→外側蹄系→下丘→內側膝狀體(MGB)→顳橫迴。<b>視覺</b>:視網膜→視神經→視交叉→視束→外側膝狀體(LGB)→距狀皮質。</li>\n<li>小腦三腳:下腳(傳入為主+至前庭核傳出)、中腳(純傳入=對側橋腦核)、上腳(傳出齒狀核→紅核/視丘+傳入腹側脊髓小腦徑)。</li>\n</ul>\n<h4>三、基底核與邊緣系統</h4>\n<ul>\n<li><b>紋狀體</b>=尾核+豆狀核(殼+蒼白球);新紋狀體=尾核+殼。直接路徑(D1興奮促動作)、間接路徑(經視丘下核;D2抑制);兩路皆受黑質緻密部多巴胺調控。巴金森=黑質緻密部退化。</li>\n<li><b>邊緣系統/Papez環路</b>:海馬→穹窿→乳頭體→視丘前核→扣帶迴→海馬旁迴→海馬。海馬主要傳入=內鼻皮質(穿質路徑);杏仁核傳出=終紋(至下視丘/隔區)。</li>\n</ul>\n<h4>四、腦血管與臨床</h4>\n<ul>\n<li>內側延腦症候群:對側肢體無力(錐體)+同側舌肌無力(XII)+對側本體覺喪失。外側延腦(Wallenberg/PICA):同側面/對側身痛溫、吞嚥困難、Horner、眩暈,<b>不影響錐體(無肢體無力)</b>。</li>\n<li>內囊後支=前脈絡叢動脈;胼胝體=大腦前動脈(胼周);初級視覺皮質=大腦後動脈;翼點外傷硬腦膜外血腫=腦膜中動脈。</li>\n</ul>"},"AN2頭頸部與腦神經":{"title":"頭頸部與腦神經","html":"\n<h4>一、腦神經與鰓弓</h4>\n<ul>\n<li><b>鰓弓對應</b>:第1弓→三叉V3(咀嚼肌、二腹肌前腹、下頜舌骨肌、兩個tensor);第2弓→顏面VII(表情肌、鐙骨肌、二腹肌後腹、莖突舌骨肌);第3弓→舌咽IX(莖突咽肌);第4/6弓→迷走X(咽喉肌)。</li>\n<li><b>四對副交感神經節</b>:睫狀節(III→瞳孔括約肌/睫狀肌)、翼腭節(VII岩大神經→淚腺/鼻腭腺)、頜下節(VII鼓索→頜下舌下腺)、耳神經節(IX岩小神經→腮腺)。</li>\n</ul>\n<h4>二、反射弧</h4>\n<ul>\n<li><b>瞳孔光反射</b>:視網膜→II→頂蓋前區→後聯合(雙側)→兩側E-W核→III→睫狀節→瞳孔括約肌(直接+共識)。</li>\n<li><b>角膜反射</b>:V1(鼻睫神經)→三叉脊髓核→雙側顏面運動核→VII→眼輪匝肌閉眼。</li>\n</ul>\n<h4>三、顱底孔裂與血管神經</h4>\n<ul>\n<li>視神經管=II+眼動脈;眶上裂=III/IV/V1/VI+上眼靜脈;圓孔=V2;卵圓孔=V3;棘孔=腦膜中動脈;莖乳孔=VII出顱;內聽道=VII+VIII;頸靜脈孔=IX/X/XI+乙狀竇/IJV;舌下神經管=XII。</li>\n<li>海綿竇:外側壁(III、IV、V1、V2);竇腔內(內頸動脈+緊貼其外的VI)。顏面靜脈經上眼靜脈通海綿竇(危險三角)。硬腦膜竇引流:矢狀/直竇→竇匯→橫竇→乙狀竇→內頸靜脈。</li>\n</ul>\n<h4>四、咽喉、頸部、鼻竇與耳</h4>\n<ul>\n<li>喉:環甲肌=喉外神經(喉上神經支);其餘喉內肌=喉返神經(後環杓肌唯一外展聲帶)。咽縮肌=迷走(咽叢);莖突咽肌=IX。</li>\n<li>頸動脈鞘:頸總/內動脈、頸內靜脈、迷走神經。頸部筋膜:氣管前層包甲狀腺。</li>\n<li>鼻竇開口:中鼻道(額竇/前中篩竇/上頜竇,經半月裂孔)、上鼻道(後篩竇)、蝶篩隱窩(蝶竇)、下鼻道(鼻淚管)。</li>\n<li>內耳:迷路動脈(AICA)供應;膜迷路含內淋巴、骨迷路間含外淋巴;基底膜隔耳蝸管與鼓室階。</li>\n</ul>"},"AN3胸部":{"title":"胸部","html":"\n<h4>一、縱隔與心包</h4>\n<ul>\n<li>胸骨角(T4/5)分上下縱隔,標誌氣管分叉、主動脈弓、奇靜脈匯入、肺動脈幹分叉。胸腺位上(前)縱隔(前縱隔4T)。</li>\n<li>心包橫竇:動脈群(升主動脈、肺動脈幹)後方、靜脈群(上腔靜脈、左心房)前方之間。心包斜竇=左心房後盲囊。</li>\n</ul>\n<h4>二、心臟結構與冠狀循環</h4>\n<ul>\n<li>心臟前面=右心室;基部(後)=左心房(後鄰食道);心尖=左第五肋間鎖骨中線內。傳導:竇房結(上腔-右房交界)、房室結(Koch三角,近冠狀竇口)、節制帶含右束支。</li>\n<li>冠狀優勢以後室間支(PDA)來源定:右優勢70%。房室結90%由右冠狀動脈;房室束/束支由LAD中隔支;竇房結60%右冠。冠狀灌注主要在舒張期(主動脈瓣關閉)。</li>\n<li>心臟靜脈→冠狀竇→右心房。動脈韌帶連主動脈弓與左肺動脈(左喉返繞其下)。</li>\n</ul>\n<h4>三、肺與胸壁</h4>\n<ul>\n<li>肺門排列:左(上而下)肺動脈→支氣管→肺靜脈;右最高=支氣管(eparterial)。右主支氣管短粗垂直(異物易入)。支氣管肺節段:各有節段支氣管+動脈(段中央)、靜脈走段間,可單獨切除。</li>\n<li>咳血多源支氣管動脈(體循環高壓)。肋間神經血管VAN走肋溝(穿刺於肋骨上緣)。內胸動脈走胸橫肌與肋軟骨間。橫膈三孔:腔靜脈孔T8(中央腱)、食道裂孔T10(右膈腳/迷走)、主動脈裂孔T12(主動脈/胸管/奇靜脈)。</li>\n<li>奇靜脈系統:右後肋間靜脈直接入奇靜脈;左經半奇/副半奇越中線。胸管走食道與脊椎間、乳糜池L2。</li>\n</ul>"},"AN4腹部":{"title":"腹部","html":"\n<h4>一、消化器官與腹膜</h4>\n<ul>\n<li>腹膜內(有腸繫膜):胃、空迴腸、橫結腸、乙狀結腸、闌尾、脾、肝。腹膜後(SAD PUCKER):胰(除尾)、十二指腸2-4段、升降結腸、腎、腎上腺、輸尿管、主動脈、下腔靜脈。</li>\n<li>十二指腸下降段=膽胰管共同開口(大乳頭/Vater壺腹);水平段前方有SMA/SMV橫越(SMA症候群)。網膜孔前界=肝十二指腸韌帶(門脈三體:膽總管前外、肝動脈前內、肝門靜脈後),後界=下腔靜脈。</li>\n</ul>\n<h4>二、血管與肝門系統</h4>\n<ul>\n<li>腹腔幹三分支:左胃、肝總、脾動脈(右胃動脈來自肝固有、胃十二指腸來自肝總)。SMA分支:下胰十二指腸、空迴腸、回/右/中結腸動脈。膈下動脈、性腺動脈、腎/腎上腺(中)由腹主動脈直接發。</li>\n<li>肝門靜脈=SMV+脾靜脈(IMV多入脾靜脈)。臍靜脈→肝圓韌帶;靜脈導管→靜脈韌帶;臍動脈→臍內側韌帶;臍尿管→正中臍韌帶。腹壁皺襞:正中(臍尿管)、內側(臍動脈)、外側(下腹壁動脈)。</li>\n<li>左性腺/左腎上腺靜脈→左腎靜脈;右側直接入下腔靜脈。</li>\n</ul>\n<h4>三、腹股溝與腹壁</h4>\n<ul>\n<li>鼠蹊韌帶=腹外斜肌腱膜下緣(外端ASIS、內端恥骨結節)。深環=腹橫筋膜、淺環=腹外斜肌腱膜;聯合腱=腹內斜+腹橫肌。精索被膜:外筋膜(腹外斜)、提睪肌(腹內斜)、內筋膜(腹橫筋膜)。</li>\n<li>幽門平面L1:幽門、十二指腸空腸曲、胰頸、膽囊底、腎門、SMA起點、脊髓圓錐。皮下脂肪=Camper筋膜、膜性=Scarpa筋膜。</li>\n</ul>"},"AN5骨盆會陰與泌尿生殖":{"title":"骨盆會陰與泌尿生殖","html":"\n<h4>一、骨盆底與會陰間隙</h4>\n<ul>\n<li>骨盆膈=提肛肌(含恥骨直腸肌,形成肛直腸90度彎)+尾骨肌;排便排尿時鬆弛。會陰淺凹(Colles筋膜與會陰膜間):陰莖根、坐骨/球海綿體肌、女大前庭腺;會陰深凹(會陰膜上):外尿道括約肌、會陰深橫肌、男尿道球腺、部分尿道/陰道。</li>\n<li>坐骨肛門窩外側壁=閉孔內肌(陰部管/Alcock管含陰部神經血管)。會陰體=多肌共同附著點。</li>\n</ul>\n<h4>二、神經與血管</h4>\n<ul>\n<li>陰部神經(S2-4):經坐骨大孔(梨狀肌下孔)出骨盆→繞坐骨棘/薦棘韌帶→坐骨小孔入會陰;分下直腸、會陰(後陰囊)、陰莖/陰蒂背神經。前陰囊神經來自髂腹股溝神經(非陰部)。</li>\n<li>勃起=副交感(骨盆內臟神經S2-4,海綿狀神經沿前列腺後外側;前列腺術須保留);射精=交感(emission)+體神經(球海綿體肌)、外尿道括約肌鬆弛。陰莖深動脈供海綿體(勃起);深背靜脈→前列腺靜脈叢。</li>\n<li>骨盆痛覺線:線下(子宮頸/陰道上/膀胱三角/直腸下)伴骨盆內臟神經(副交感)至S2-4;線上(子宮體/卵巢)伴交感至T11-L2。</li>\n</ul>\n<h4>三、泌尿生殖器官</h4>\n<ul>\n<li>子宮韌帶:卵巢韌帶/圓韌帶/闊韌帶連子宮體;主韌帶連子宮頸與骨盆側壁。卵巢動脈(腹主動脈)經懸韌帶入卵巢;子宮動脈跨輸尿管上方(water under bridge)。直腸子宮陷凹(Douglas)=女骨盆腔最低點。</li>\n<li>男性:輸精管跨輸尿管上方;前列腺後鄰直腸(可指診)、血供下膀胱動脈;膀胱底=後下面、上面被腹膜。同源:陰莖頭↔陰蒂頭、尿道海綿體↔前庭球、陰囊↔大陰唇、前列腺↔尿道旁腺、Cowper腺↔大前庭腺。</li>\n</ul>"},"AN6上肢":{"title":"上肢","html":"\n<h4>一、臂神經叢</h4>\n<ul>\n<li>根(C5-T1)→幹(上中下)→分部→索(外/內/後)→終支。索包圍腋動脈第二段。後索(ULTRA):上/下肩胛下、胸背(闊背肌)、橈、腋神經。根分支:肩胛背(C5,穿中斜角肌→菱形肌/肩胛提肌)、長胸(C5-7→前鋸肌)。</li>\n<li>翼狀肩胛=長胸神經/前鋸肌。旋轉肌袖:棘上/棘下=肩胛上神經;肩胛下=肩胛下神經;小圓=腋神經。</li>\n</ul>\n<h4>二、上肢神經損傷定位</h4>\n<ul>\n<li>腋神經(外科頸骨折/肩脫位)→三角肌無力、肩外側麻木。橈神經→垂腕、後骨間神經→垂指;肌皮神經→屈肘無力(走肱二頭與肱肌間)、末端為前臂外側皮神經。</li>\n<li>正中神經→腕隧道(屈拇長肌等9腱+正中神經;大魚際/橈側3個半指);尺神經→走內上髁後方(尺神經溝)、支配骨間肌(食指內收外展)、爪形手。手皮膚:正中(掌橈3個半指)、尺(尺側1個半指)、橈(手背橈側)。</li>\n</ul>\n<h4>三、骨與關節</h4>\n<ul>\n<li>肘:肱尺(滑車-滑車切迹)、肱橈(小頭-橈骨頭)、上橈尺關節。橈骨遠端與舟狀骨+月狀骨關節(舟狀骨最易骨折/缺血壞死)。網球肘=外上髁(伸肌總腱);高爾夫球肘=內上髁(屈肌總腱)。</li>\n<li>肱二頭肌長頭腱連盂上結節與關節盂唇。皮節:C5上臂外、C6拇指、C7中指、C8小指、T1上臂內。膝/肘反射節段(肱二頭C5-6、肱三頭C7-8)。</li>\n<li>鎖骨下動脈分支:椎、內胸、甲狀頸幹(STT:肩胛上、頸橫、甲狀腺下)、肋頸幹(深頸、最上肋間)。腋動脈分支才有胸肩峰、外胸、上胸動脈。</li>\n</ul>"},"AN7下肢":{"title":"下肢","html":"\n<h4>一、神經與肌群</h4>\n<ul>\n<li>腰叢(L1-4):股神經(大腿前群伸膝、髂肌)、閉孔神經(內收肌群+閉孔外肌)。腰大肌由L1-3前支直接支配。薦叢(L4-S4):坐骨神經(大腿後群+小腿)、臀上神經(臀中小肌+闊筋膜張肌,損傷Trendelenburg)、臀下神經(臀大肌)。</li>\n<li>腓總神經繞腓骨頸(易傷):腓深(前群、脛前肌→足背屈,損傷垂足、第一趾蹼感覺)、腓淺(外側群腓骨肌→外翻、足背皮膚)。脛神經:小腿後群+足底。膝反射=股神經L2-4;踝反射=脛神經S1。</li>\n</ul>\n<h4>二、血管</h4>\n<ul>\n<li>股動脈→深股動脈(發內/外側迴旋股動脈;內側迴旋股供成人股骨頭)→穿內收大肌裂孔成膕動脈→分脛前(過骨間膜)、脛後(經跗骨隧道分足底內外側動脈)。十字吻合:內外迴旋股+下臀+第一穿動脈(上臀屬轉子吻合)。</li>\n<li>淺靜脈:大隱(內踝前方、入股靜脈)、小隱(小腿後、入膕靜脈)。膕靜脈血栓不影響大隱(直接入股靜脈)。腓腸神經伴小隱靜脈(小腿後外/小趾);隱神經伴大隱(小腿內側)。</li>\n</ul>\n<h4>三、骨關節與重要構造</h4>\n<ul>\n<li>髂腰肌止小轉子;髂脛束=闊筋膜張肌+臀大肌(止Gerdy結節)。鵝足=縫匠+股薄+半腱肌(三神經)。內側副韌帶連內側半月板(不幸三聯傷)。踝關節=脛+腓+距骨(距骨無肌腱附著、易缺血壞死)。</li>\n<li>跗骨隧道(內踝後):脛後肌腱、屈趾長肌腱、脛後動脈/脛神經、屈拇長肌腱(皆屈肌;脛前肌走足背不經此)。屈拇長肌繞載距突下方。坐骨大孔梨狀肌下孔外側=坐骨神經(臀注射避外上)。</li>\n</ul>"},"AN8背部脊柱與體壁總論":{"title":"背部脊柱與體壁總論","html":"\n<h4>一、脊柱與椎骨特徵</h4>\n<ul>\n<li>頸椎:橫突孔(過椎動脈)、棘突分叉。胸椎:肋關節面(椎體+橫突)、棘突長下斜。腰椎:椎體最大、無橫突孔/肋面、關節面近矢狀(下關節突朝外前、上關節突朝後內,限旋轉)。第11/12胸椎無橫突肋面→第11/12肋僅肋頭相接(浮肋)。</li>\n<li>寰枕關節主屈伸(點頭);寰樞關節主旋轉(搖頭)。齒突前面與寰椎前弓後面成關節;翼韌帶連齒突與枕骨髁。胸骨角對T4/5、連第二肋;胸鎖關節=滑液關節、椎間關節/第1胸肋=軟骨關節。</li>\n</ul>\n<h4>二、背部肌肉與枕下三角</h4>\n<ul>\n<li>背肌分層:淺(連上肢:斜方/闊背)、中(夾肌)、深(豎脊肌=髂肋/最長/棘肌;橫突棘肌=半棘/多裂/迴旋);最深=枕下肌。髂肋肌不達頭骨;最長肌(頭最長肌)、夾肌、半棘肌附頭骨。</li>\n<li>枕下三角:上內=頭後大直肌、上外=頭上斜肌、下外=頭下斜肌;內含椎動脈(V3)與枕下神經(C1後支,支配枕下肌)。枕大神經(C2後支)從下緣穿出。</li>\n</ul>\n<h4>三、脊神經、自律神經與胚胎</h4>\n<ul>\n<li>背根絲=純感覺、腹根絲=純運動;合成脊神經(混合)後分背側支/腹側支(皆混合)。上頸神經節約C1-2(損傷Horner)。交感節前(T1-L2)經白交通支;上5胸節後纖維至胸腔器官,下胸節組成內臟神經(節前)至腹腔椎前節換元。</li>\n<li>神經管:頭側神經孔約第25天關閉(早尾側2-3天),未閉→無腦症;尾側未閉→脊柱裂。乳糜池L2、胸管走食道與脊椎間。</li>\n</ul>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^AN(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='med1_anat_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
