{"A":"Gentamycin不可靜脈推注。","B":"抽1.5 mL=60 mg,非1.6 mL。","C":"正確(本題答案)。以輸液稀釋滴注約60分鐘。","D":"滴完不可暫停整個點滴。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"106030-N2-28":{"quick":"Half Saline 500mL、20gtt/mL、4小時→500×20÷240≈42滴/分。","detail":{"background":"滴速=總量×滴系數÷時間(分)。500 mL×20 gtt/mL÷(4×60=240分)=10000÷240≈41.7≈42滴/分(D正確)。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"72滴過快。","B":"62滴過快。","C":"52滴過快。","D":"正確(本題答案)。500×20÷240≈42滴/分。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"106110-N2-15":{"quick":"用藥劑量「一般與體重成正比」。","detail":{"background":"影響用藥劑量:藥物劑量一般與「體重」成正比(體重越重劑量越高,B正確);80歲以上老人劑量約成人的「1/2~3/4」(非1/4,A錯);10歲兒童「不可」直接服成人劑量(C錯,須依體重/體表面積);以「體表面積」計算兒童用藥「最準確」(非最不準確,D錯)。故正確為劑量與體重成正比(B)。","options":{"A":"老人劑量約成人1/2~3/4,非1/4。","B":"正確(本題答案)。劑量一般與體重成正比。","C":"10歲兒童不可直接服成人劑量。","D":"體表面積計算兒童劑量最準確,非最不準。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"106110-N2-29":{"quick":"Gentamycin 4mL+NS 96mL=100mL,1小時、精密(60gtt/mL)→100 gtt/min。","detail":{"background":"總量=Gentamycin 4 mL+NS 96 mL=100 mL;1小時(60分);精密輸液套管60 gtt/mL:100×60÷60=100滴/分(D正確)。記:精密套管下gtt/min=mL/hr。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"70滴計算錯誤。","B":"80滴計算錯誤。","C":"90滴計算錯誤。","D":"正確(本題答案)。100×60÷60=100滴/分。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"106111-N2-21":{"quick":"克拉克氏法則:15kg×成人300mg→300×(15×2.2/150)=66 mg。","detail":{"background":"克拉克氏法則:小兒劑量=成人劑量×(體重磅÷150)=成人×(kg×2.2÷150)。15 kg×2.2=33磅;300×33÷150=66 mg(C正確)。克拉克氏法則:小兒劑量=成人劑量×(體重磅÷150)=成人×(體重kg×2.2÷150)≈成人×kg/68;另有體表面積法(最準確)、Fried法(嬰兒)、Young法(兒童按年齡)。","options":{"A":"33計算錯誤。","B":"43計算錯誤。","C":"正確(本題答案)。300×(15×2.2÷150)=66 mg。","D":"76計算錯誤。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"107110-N2-15":{"quick":"KCl 40 mEq/20 c.c.,需15 mEq→15÷40×20=7.5 c.c.。","detail":{"background":"抽藥量=需要劑量÷濃度×安瓿容量。KCl 1 amp=20 c.c.含40 mEq(=2 mEq/c.c.),需15 mEq:15÷2=7.5 c.c.(B正確)。KCl須加入N/S稀釋滴注,不可直接推注。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"5 c.c.=10 mEq,不足。","B":"正確(本題答案)。15÷40×20=7.5 c.c.。","C":"10 c.c.=20 mEq,過量。","D":"15 c.c.=30 mEq,過量。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"107110-N2-19":{"quick":"vancomycin安全量40mg/kg/day,18kg→上限720mg/day;醫囑240mg q6h=960mg/day超量→提出疑問。","detail":{"background":"郭小妹18 kg,vancomycin安全量40 mg/kg/day→上限18×40=720 mg/day。醫囑「240 mg q6h(一天4次)」=240×4=960 mg/day,超過安全上限720 mg,護理師應「對給藥劑量提出疑問」並與醫師確認(A正確),不可逕自給藥。給藥前發現劑量超量須質疑,確保用藥安全。","options":{"A":"正確(本題答案)。960 mg/day超過720安全上限,應質疑劑量。","B":"途徑無誤(IVF)。","C":"劑量超量,不可逕自給藥。","D":"劑量超量,不可逕自給藥。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"108020-N2-17":{"quick":"克拉克氏法則:6kg×成人500mg→500×(6×2.2/150)=44 mg。","detail":{"background":"克拉克氏法則:小兒劑量=成人×(kg×2.2÷150)。6 kg×2.2=13.2磅;500×13.2÷150=44 mg(C正確)。克拉克氏法則:小兒劑量=成人劑量×(體重磅÷150)=成人×(體重kg×2.2÷150)≈成人×kg/68;另有體表面積法(最準確)、Fried法(嬰兒)、Young法(兒童按年齡)。","options":{"A":"64 mg計算錯誤。","B":"54 mg計算錯誤。","C":"正確(本題答案)。500×(6×2.2÷150)=44 mg。","D":"34 mg計算錯誤。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"108020-N2-19":{"quick":"Demerol 50mg/mL,40mg q6h→單次0.8mL、一天最多4次。本題答案C。","detail":{"background":"Demerol 50 mg/1 mL/Amp,單次40 mg→抽40÷50=0.8 mL;q6h p.r.n.=每6小時可給一次,一天最多4次(24÷6=4)(C正確)。p.r.n.是「視需要」非每6小時必給(A錯);一天最多4次×40=160 mg(非240 mg,B錯);單次0.8 mL(D錯誤稱0.6 mL)。故正確為一天最多給藥4次(C)。","options":{"A":"p.r.n.視需要,非每6小時必給。","B":"一天最多160 mg(4×40),非240 mg。","C":"正確(本題答案)。每日至多給藥4次。","D":"單次0.8 mL,非0.6 mL。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"108020-N2-24":{"quick":"5% G/W 80 c.c./hr、小兒精密套管(60gtt/mL)→80 gtt/min。","detail":{"background":"小兒精密輸液套管=60 gtt/mL。5% G/W 80 c.c./hr:用精密套管時gtt/min=mL/hr=80滴/分(D正確)。原理:80×60÷60=80。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"10 gtt/min計算錯誤。","B":"20 gtt/min計算錯誤。","C":"40 gtt/min計算錯誤。","D":"正確(本題答案)。80 c.c./hr(精密)=80滴/分。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"108020-N2-27":{"quick":"病人對藥物的「期待心理」可能增強藥效、降低用量也達預期效果(安慰劑效應)。","detail":{"background":"影響用藥劑量因素:以「體表面積」計算兒童劑量是「最精準」的(A錯,稱最不精準);70歲老人用藥約成人1/2~3/4(B「二分之一」概念接近但敘述為通則);病人對藥物的「期待心理(安慰劑效應)」可能使藥效更顯著、有時降低用量也達預期(C正確);心肝腎衰竭病人代謝排泄差,劑量應「較少」(非較多,D錯)。故正確為期待心理影響藥效(C)。","options":{"A":"體表面積計算兒童劑量最精準,非最不精準。","B":"老人劑量約成人1/2~3/4,非固定1/2。","C":"正確(本題答案)。期待心理(安慰劑)可增強藥效。","D":"心肝腎衰竭劑量應較少,非較多。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"109030-N2-28":{"quick":"0.45% NaCl 100 mL/hr、macrodrip(15gtt/mL)→100×15÷60=25滴/分。","detail":{"background":"滴速=總量×滴系數÷時間(分)。100 mL×15 gtt/mL÷60分=25滴/分(B正確)。普通(macro)套管15 gtt/mL時,100 mL/hr→25滴/分。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"15滴計算錯誤。","B":"正確(本題答案)。100×15÷60=25滴/分。","C":"50滴計算錯誤。","D":"100滴(誤用60gtt/mL)。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"109110-N2-24":{"quick":"2歲A.D.耳藥:右耳廓向下往後拉。","detail":{"background":"A.D.(auris dextra)=右耳;3歲以下幼兒滴耳藥時「將耳廓(耳翼)向下往後拉」使外耳道變直(D正確)。成人才向上往後拉。「Ofloxacin 5 gtts q.12h. A.D.」=右耳每12小時滴5滴。故為右耳廓向下往後拉(D)。","options":{"A":"A.D.是右耳,非左耳。","B":"A.D.是右耳;且2歲應向下往後。","C":"2歲應向下往後拉,非向上。","D":"正確(本題答案)。右耳廓向下往後拉。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"109110-N2-29":{"quick":"剩300 mL、4小時、精密(60gtt/mL)→300×60÷240=75滴/分。","detail":{"background":"滴速=總量×滴系數÷時間(分)。剩300 mL×60 gtt/mL÷(4×60=240分)=18000÷240=75滴/分(B正確)。精密套管下:300÷4=75 mL/hr→75滴/分。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"50滴計算錯誤。","B":"正確(本題答案)。300×60÷240=75滴/分。","C":"100滴過快。","D":"125滴過快。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"110110-N2-22":{"quick":"Coumadin stat&qd×3天then 0.5# qd:第1~4天1#、第5天起0.5#→第5天0.5#。","detail":{"background":"醫囑「Coumadin 1# p.o. stat & q.d.×3 days then 0.5# p.o. q.d.」:第1天stat給1#並開始qd;第1、2、3、4天為1#(stat當天+q.d.×3天=連續4天1#),第5天起改0.5#。故第5天給0.5#(A正確)。","options":{"A":"正確(本題答案)。第5天起改0.5#。","B":"1#是第1~4天。","C":"1.5#非此醫囑劑量。","D":"2#非此醫囑劑量。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"110110-N2-29":{"quick":"Amolin 30mg/kg、10kg→300mg q12h;25mg/mL→300÷25=12 mL。","detail":{"background":"單次劑量=30 mg/kg×10 kg=300 mg(q12h一次)。藥瓶25 mg/mL:300÷25=12 mL(C正確)。故單次給藥12 mL。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"5 mL=125 mg,不足。","B":"10 mL=250 mg,不足。","C":"正確(本題答案)。300÷25=12 mL。","D":"24 mL=600 mg,過量。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"111030-N2-21":{"quick":"Digoxin 125 mcg,錠劑0.25 mg/顆(=250 mcg)→125÷250=半顆。","detail":{"background":"抽/發藥量=需要劑量÷每顆劑量。Digoxin需125 mcg=0.125 mg;每顆0.25 mg(=250 mcg):0.125÷0.25=0.5顆(半顆)(A正確)。注意mcg與mg換算(1 mg=1000 mcg)。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"正確(本題答案)。125 mcg÷250 mcg=半顆。","B":"1顆=0.25 mg=250 mcg,過量。","C":"2顆過量。","D":"5顆過量。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"111030-N2-22":{"quick":"D5W 80mL/hr、精密(60gtt/mL):下次換500mL約在9點+6.25hr≈3:15PM。本題答案B。","detail":{"background":"D5W 80 mL/hr、精密套管60 gtt/mL→流速80 gtt/min(非60,A錯)。一瓶500 mL以80 mL/hr輸完需500÷80=6.25小時=6小時15分;9:00 AM更換→下次更換約3:15 PM(B正確)。一天輸液量=80×24=1920 mL(非1440,C錯);1 PM(4小時後)已輸80×4=320 mL,剩500−320=180 mL(非250,D錯)。故正確為下次約3:15 PM(B)。","options":{"A":"精密套管流速應80 gtt/min,非60。","B":"正確(本題答案)。500÷80=6.25hr,下次約3:15 PM。","C":"一天輸液80×24=1920 mL,非1440。","D":"1 PM剩約180 mL,非250。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"111110-N2-16":{"quick":"Unasyn 2gm稀釋成4cc(500mg/cc),需750mg→750÷500=1.5 cc。","detail":{"background":"Unasyn 2 gm/vial=2000 mg,以蒸餾水稀釋成總量4 c.c.→濃度2000÷4=500 mg/c.c.。需750 mg:750÷500=1.5 c.c.(C正確)。記憶:口服給藥——輕瀉劑應「增加」水分;止吐劑「飯前」服(進食時已發揮作用);鹽類緩瀉劑可配冬瓜茶等增適口性;咳嗽糖漿服後避免喝水(維持咽喉作用)。","options":{"A":"1 c.c.=500 mg,不足。","B":"1.25 c.c.=625 mg,不足。","C":"正確(本題答案)。750÷500=1.5 c.c.。","D":"2 c.c.=1000 mg,過量。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"112030-N2-22":{"quick":"D5W 50 mL/hr、微滴套管(60gtt/mL)→50 gtt/min。","detail":{"background":"微滴(精密)套管=60 gtt/mL時,滴速(gtt/min)=每小時量(mL/hr)。D5W 50 mL/hr→50滴/分(B正確)。原理:50×60÷60=50。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"40滴計算錯誤。","B":"正確(本題答案)。50 mL/hr(微滴)=50滴/分。","C":"60滴計算錯誤。","D":"70滴計算錯誤。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"113030-N2-10":{"quick":"克拉克氏法則:9kg×成人500mg→500×(9×2.2/150)=66 mg。","detail":{"background":"克拉克氏法則:小兒劑量=成人×(kg×2.2÷150)。9 kg×2.2=19.8磅;500×19.8÷150=66 mg(C正確)。克拉克氏法則:小兒劑量=成人劑量×(體重磅÷150)=成人×(體重kg×2.2÷150)≈成人×kg/68;另有體表面積法(最準確)、Fried法(嬰兒)、Young法(兒童按年齡)。","options":{"A":"46 mg計算錯誤。","B":"56 mg計算錯誤。","C":"正確(本題答案)。500×(9×2.2÷150)=66 mg。","D":"76 mg計算錯誤。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"113180-N2-14":{"quick":"Gentamycin 30mg in 30cc NS、30分鐘、微滴(60gtt/mL)→30×60÷30=60滴/分。","detail":{"background":"滴速=總量×滴系數÷時間(分)。總量30 c.c.×60 gtt/mL÷30分=60滴/分(C正確)。微滴套管60 gtt/mL,30 c.c.於30分鐘輸完=60 gtt/min。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"40滴計算錯誤。","B":"50滴計算錯誤。","C":"正確(本題答案)。30×60÷30=60滴/分。","D":"70滴計算錯誤。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"114030-N2-13":{"quick":"oxacillin 1 gm、250 mg/vial→1000÷250=4瓶。","detail":{"background":"需要瓶數=需要劑量÷每瓶劑量。oxacillin需1 gm=1000 mg,每瓶250 mg:1000÷250=4瓶(C正確)。每次給藥抽4瓶(各250 mg)稀釋後合計1000 mg。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"1瓶=250 mg,不足。","B":"2.5瓶=625 mg,不足。","C":"正確(本題答案)。1000÷250=4瓶。","D":"6瓶=1500 mg,過量。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"114100-N2-14":{"quick":"2.5% Glucose Water 170 mL/day、輸液幫浦→170÷24≈7 mL/hr。","detail":{"background":"輸液幫浦速率(mL/hr)=每日總量÷24小時。170 mL/day÷24=7.08≈7 mL/hr(C正確)。幫浦以mL/hr設定,故設約7 mL/hr。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"10 mL/hr過快(=240 mL/day)。","B":"8.5 mL/hr偏快。","C":"正確(本題答案)。170÷24≈7 mL/hr。","D":"6 mL/hr偏慢。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"115030-N2-11":{"quick":"Gentamycin 40 mg/mL,需100 mg→100÷40=2.5 c.c.。","detail":{"background":"抽藥量=需要劑量÷濃度。Gentamycin每1 mL含40 mg,需100 mg:100÷40=2.5 c.c.(D正確)。公式:抽藥量=需要劑量÷藥液濃度;滴速(gtt/min)=總量×滴系數÷時間(分),精密(micro)套管60 gtt/mL、普通(macro)15~20 gtt/mL,用精密套管時gtt/min=mL/hr。","options":{"A":"1.0 c.c.=40 mg,不足。","B":"1.5 c.c.=60 mg,不足。","C":"2.0 c.c.=80 mg,不足。","D":"正確(本題答案)。100÷40=2.5 c.c.。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"115030-N2-18":{"quick":"G5W 1000+G5S 500=1500 mL含5%葡萄糖,5%×1500=75g×4 kcal/g=300 Kcal。","detail":{"background":"靜脈輸液熱量:5%葡萄糖=每100 mL含5 g葡萄糖。G5W 1000 mL+G5S 500 mL=1500 mL,皆5%葡萄糖→5%×1500=75 g葡萄糖;葡萄糖每克約4 Kcal:75×4=300 Kcal(C正確)。故一天約300大卡。","options":{"A":"100 Kcal計算錯誤。","B":"200 Kcal計算錯誤。","C":"正確(本題答案)。75 g×4=300 Kcal。","D":"400 Kcal計算錯誤。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"101110-N2-27":{"quick":"靜脈注射合併症中「空氣栓塞」有立即致命危險。","detail":{"background":"靜脈注射合併症:浸潤(infiltration,藥液漏入皮下)、血腫、穿刺部位感染、靜脈炎、循環負荷過量、「空氣栓塞(air embolism)」。其中空氣栓塞——大量空氣進入靜脈、阻塞肺動脈,可立即危及生命(C正確)。浸潤、血腫、局部感染相對非立即致命。故立即致命者為空氣栓塞(C)。","options":{"A":"浸潤是藥液漏皮下,非立即致命。","B":"血腫非立即致命。","C":"正確(本題答案)。空氣栓塞有立即致命危險。","D":"穿刺部位感染非立即致命。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"101110-N2-29":{"quick":"浸潤現象:注射部位腫、冰冷、有壓痛感(藥液漏入皮下)。","detail":{"background":"靜脈注射「浸潤(infiltration)」=針頭滑出或穿破靜脈,藥液漏入「皮下組織」,表現為注射部位「腫脹、皮膚冰冷蒼白、有壓痛感、回血不良、滴速變慢」(D正確)。A點滴瓶低於針頭回血快(正常時的回血現象);B滴速變快不規則非浸潤;C呼吸淺快靜脈怒張是循環負荷過量。故浸潤為腫、冰冷、壓痛(D)。","options":{"A":"回血快是正常回血,非浸潤表現。","B":"浸潤滴速「變慢」,非變快。","C":"呼吸淺快靜脈怒張是循環負荷過量。","D":"正確(本題答案)。浸潤=腫、冰冷、壓痛。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"102110-N2-16":{"quick":"「ceftizoxime 1 vial I.V. drip q.6.h.」=每隔6小時加入IV bag中滴注。","detail":{"background":"I.V. drip=靜脈「滴注」(加入點滴瓶/IV bag中緩慢滴入,非直接推注);q.6.h.=每隔6小時一次。「ceftizoxime 1 vial(500 mg)I.V. drip q.6.h.」=每隔6小時將藥加入IV bag中滴注(B正確)。非「每天四次」的籠統說法(q6h是每6小時等距)、非直接靜脈注射(drip)。故為每隔6小時加IV bag滴注(B)。","options":{"A":"q6h是每隔6小時,「每天四次」時間不同。","B":"正確(本題答案)。每隔6小時加IV bag滴注。","C":"drip是滴注,非直接靜脈注射。","D":"drip是滴注,非直接注射。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"103030-N2-10":{"quick":"「CBC st.」抽血:試管內須有抗凝劑、血液注入後輕搖混勻。","detail":{"background":"CBC(全血球計數)抽血:止血帶應綁於抽血部位上方約7.5~10公分(非1~2公分,A錯);抽血時請病人「握拳」(非鬆開,B錯);CBC「不需」禁食(C錯,血脂血糖才需禁食);試管內含抗凝劑(如EDTA),血液注入後須「輕輕上下顛倒混勻」防凝固(D正確)。故正確為含抗凝劑、輕搖混勻(D)。","options":{"A":"止血帶綁上方約7.5~10公分,非1~2公分。","B":"抽血時請病人握拳,非鬆開。","C":"CBC不需禁食6~8小時。","D":"正確(本題答案)。試管含抗凝劑、輕搖混勻。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"103030-N2-30":{"quick":"注射部位紅腫熱痛、有分泌物、體溫上升=「感染」。","detail":{"background":"靜脈注射部位「局部紅、腫、熱、痛+有分泌物(膿)+體溫上升(全身發燒)」=穿刺部位「感染(infection)」(A正確)。靜脈炎是沿靜脈紅腫熱痛變硬(通常無膿性分泌物與發燒);浸潤是腫冰冷壓痛(無紅熱);發熱反應是輸液污染引起的全身發冷發燒(無局部分泌物)。故有分泌物+發燒=感染(A)。","options":{"A":"正確(本題答案)。紅腫熱痛+分泌物+發燒=感染。","B":"靜脈炎沿靜脈變硬,通常無膿與發燒。","C":"浸潤是腫冰冷壓痛,無紅熱分泌物。","D":"發熱反應是全身性,無局部分泌物。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"105090-N2-30":{"quick":"注射部位紅腫、溫度高、壓痛(沿靜脈)=「靜脈炎(phlebitis)」。","detail":{"background":"靜脈注射「靜脈炎(phlebitis)」=沿靜脈走向出現紅、腫、溫度升高、壓痛、靜脈變硬如索狀(B正確),因針頭/藥物刺激或留置過久引起。浸潤是腫脹冰冷(溫度低);過敏反應是全身癢疹;循環負荷過量是呼吸喘水腫。本題「腫脹疼痛、紅腫、溫度較高、壓痛」=靜脈炎(B)。","options":{"A":"浸潤是腫脹「冰冷」,溫度低。","B":"正確(本題答案)。紅腫、溫度高、壓痛=靜脈炎。","C":"過敏反應是全身癢疹。","D":"循環負荷過量是呼吸喘、水腫。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"106030-N2-18":{"quick":"藥物由郭護理師抽取，依「親自抽藥親自給藥」原則，王護理師不應代為注射他人備好的藥；應接手B病人點滴，讓郭護理師親自為A病人完成術前給藥，故選C。","detail":{"background":"本題官方答案A。郭護理師已將A病人的術前藥抽好在針筒,接到「須立即送A病人至手術室」通知——應「先為A病人執行已備好的術前給藥肌肉注射」(A),完成術前給藥再送開刀房(術前藥須在送手術室前給予)。B病人點滴不滴非立即危及生命,可稍後處理。故先給A病人術前藥(A)。","options":{"A":"不應執行他人(郭護理師)抽好的藥(違反親自抽藥親自給藥原則)。","B":"藥已備妥且須立即送開刀，重抽延誤，非最適當。","C":"正解：王護理師接手處理B病人點滴，讓郭護理師親自完成A病人術前給藥。","D":"不需延遲送達，應協調人力即時完成。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"106110-N2-24":{"quick":"血栓靜脈炎「不可按摩」注射部位(防血栓脫落);稱給予按摩為錯誤。","detail":{"background":"血栓性靜脈炎(thrombophlebitis):沿靜脈注射部位變硬、發紅(A對);注射部位常見紅腫熱痛(D對);可「冷敷」減輕急性發炎(C對)。選項B「注射部位給予按摩」錯誤——血栓性靜脈炎「絕不可按摩」(按摩可能使血栓脫落造成栓塞),故B為錯誤敘述。","options":{"A":"正確。沿靜脈變硬發紅。","B":"錯誤(本題答案)。血栓靜脈炎不可按摩(防血栓脫落)。","C":"正確。可冷敷減輕急性發炎。","D":"正確。常見紅腫熱痛。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"107030-N2-22":{"quick":"點滴時慢時停:「調整點滴架至距注射部位至少45~60公分」非處理滴速不順的措施;本題答案D為錯誤。","detail":{"background":"本題問「錯誤」者。點滴滴速時慢時停的處理:評估注射部位是否腫脹(浸潤,A對)、檢查管路是否扭曲受壓(B對)、檢查導氣針是否阻塞(C對)。選項D「調整點滴架高度,滴定室液面距注射部位至少45~60公分」——點滴瓶/滴定室應「高於」注射部位約60~90公分以利重力滴注,「45~60公分」偏低且非處理「時慢時停」的正確措施,故D為錯誤敘述。","options":{"A":"正確。評估注射部位是否腫脹。","B":"正確。檢查管路扭曲受壓。","C":"正確。檢查導氣針阻塞。","D":"錯誤(本題答案)。點滴瓶應高於注射部位約60~90公分,此敘述不當。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"107110-N2-27":{"quick":"浸潤(infiltration)=針頭穿破靜脈、灌注液溢出至皮下組織。","detail":{"background":"靜脈注射「浸潤(infiltration)」的原因/機轉是「針頭不小心穿破靜脈或滑出血管,使輸注液溢出至『皮下組織』」(A正確),導致注射部位腫脹冰冷壓痛、滴速變慢。B微生物侵入=感染;C肢體高過心臟=滴速變慢但非浸潤定義;D針頭藥物刺激靜脈發炎=靜脈炎。故浸潤是液體溢出皮下(A)。","options":{"A":"正確(本題答案)。針頭穿破靜脈、液體溢出皮下=浸潤。","B":"微生物侵入是感染。","C":"肢體高過心臟影響滴速,非浸潤定義。","D":"針頭藥物刺激發炎是靜脈炎。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"110030-N2-32":{"quick":"需長期靜脈抗生素應選「平滑柔軟有彈性的血管」(3)、避開患肢以健側右手為佳(4)→「34」，故選B。","detail":{"background":"本題官方答案C(13)。左手蜂窩組織炎需長期靜脈抗生素:1應優先選「近心側」的小靜脈(由遠端往近端使用、保留近心血管)——惟臨床原則是「先用遠心端、保留近心端」,本題以官方組合;3應選「平滑柔軟」的靜脈(易穿刺、不易破)。錯誤項:2「應選患肢(發炎側)靜脈」錯(發炎側血流受影響且增感染風險,應選『健側』)。依官方答案「13」。核心:避開患肢、選平滑柔軟靜脈。","options":{"A":"含2(患肢側)錯。","B":"正解(34)：選平滑柔軟有彈性的血管、健側右手為最佳部位。","C":"應由遠心端開始選擇、保留近心端，1敘述不妥。","D":"含2(患肢側給藥)錯。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"112030-N2-23":{"quick":"點滴停止滴注的處理:評估腫脹(2)、檢查回血(3)、檢查套管扭曲(4)→「234」。","detail":{"background":"靜脈點滴停止滴注的立即處理:2評估注射部位是否腫脹(浸潤)、3檢查是否有回血現象(確認針頭在血管內)、4檢查靜脈輸液套管是否扭曲受壓——皆正確排查步驟。1「立即拔除針頭重新注射」不當(應先排查原因,非立即拔針)。故正確處理為「234」。排查口訣:點滴停止滴注先「評估注射部位是否腫脹(浸潤)、檢查回血、檢查管路是否扭曲受壓、檢查導氣針」,確認原因後再處理;不可立即拔針重打。","options":{"A":"含1(立即拔針)不當。","B":"含1不當。","C":"含1不當。","D":"正確(本題答案)。2評估腫脹、3檢查回血、4檢查套管扭曲。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"113100-N2-18":{"quick":"浸潤的處理是「停止注射、抬高患肢、『冰冷敷』非標準」?本題答案B為錯誤。","detail":{"background":"本題問預防/處理浸潤的「錯誤」者。浸潤(infiltration)表現:局部腫脹、壓痛(A對)、點滴速度變慢(C對);處理:停止注射、另覓部位重新注射(D對)。選項B「給予局部濕冷敷」——浸潤(藥液漏皮下)的處理一般是「抬高患肢、依藥物性質冷敷或熱敷(刺激性/發疱藥需特殊處理)」,但本題將「局部濕冷敷」列為錯誤(命題認為一般浸潤宜抬高患肢、未必濕冷敷,或應依藥物選溫敷促吸收),依官方答案B。核心:浸潤停止注射、另覓部位、抬高患肢。","options":{"A":"正確。浸潤局部腫脹壓痛。","B":"錯誤(本題答案)。浸潤處理依藥物與情況,非一律局部濕冷敷。","C":"正確。浸潤點滴速度變慢。","D":"正確。停止注射另覓部位。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"114100-N2-7":{"quick":"Dopamine 200mg/5mL×4amp=800mg(非1000mg);稱準備1000mg為錯誤。","detail":{"background":"醫囑「Dopamine(200 mg/5 mL/amp)4 amp in NS 500 c.c.」:4安瓿×200 mg=800 mg(非1000 mg,A錯誤);應以點滴幫浦(pump)持續精準滴注(B對,Dopamine是高警訊強心升壓藥);若醫囑劑量/速率不完整應與醫師確認(C對);給藥後須密切監測血壓(D對)。故錯誤者為「準備Dopamine 1000 mg」(A,應為800 mg)。","options":{"A":"錯誤(本題答案)。4 amp×200 mg=800 mg,非1000 mg。","B":"正確。Dopamine須以幫浦持續滴注。","C":"正確。劑量/速率不全應與醫師確認。","D":"正確。給藥後密切監測血壓。"},"sources":["新文京《基本護理學》靜脈輸液與合併症","華杏《最新基本護理學》靜脈注射"]}},"103030-N2-6":{"quick":"提升用藥安全:病人正確服藥後若有不良反應,應通報「藥物不良事件」。","detail":{"background":"提升用藥安全:A多給1顆軟便劑即使無不適仍應通報為「給藥錯誤/不良事件」(A錯,稱不需通報);B「15% KCl 5 ml inj.」高濃度KCl直接注射可致命,護理師「不可遵從、應質疑」(B錯);C藥局將heparin給成insulin、護理師及時更正——屬「跡近錯失(near miss)」仍是異常事件須通報(C錯,稱不屬異常);D病人正確服藥後若出現不良反應,應通報「藥物不良事件(ADR)」(D正確)。故正確為D。","options":{"A":"多給藥即使無不適仍應通報。","B":"高濃度KCl直接注射致命,應質疑不可遵從。","C":"near miss仍是異常事件須通報。","D":"正確(本題答案)。正確服藥後不良反應應通報ADR。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"103100-N2-12":{"quick":"口服藥劑型吸收最快=「溶液(solution)」。","detail":{"background":"口服藥劑型吸收速度:溶液(液體,已溶解、無需崩解)最快>懸浮液>膠囊>錠劑(需崩解溶解)>腸衣錠/緩釋劑最慢。故吸收最快為溶液(C正確)。劑型崩解溶解越快,吸收越快。記憶:口服藥劑型吸收速度=溶液>懸浮液>膠囊>錠劑>腸衣錠/緩釋劑(最慢);劑型崩解溶解越快、吸收越快。液體劑型已溶解,吸收最快。","options":{"A":"錠劑需崩解,吸收較慢。","B":"懸浮液吸收快但慢於溶液。","C":"正確(本題答案)。溶液吸收最快。","D":"膠囊需崩解,較慢。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"103100-N2-13":{"quick":"疫苗一般應保存於2~8°C冰箱。","detail":{"background":"藥物管理:急救藥品仍須定期檢查有效日期(A錯,稱無須檢查);稀釋後抗生素標明時間劑量、冰箱保存、效期一般「24小時或依說明」(非一週,B錯);疫苗一般保存於2~8°C冷藏冰箱(C正確);管制藥品應「雙重上鎖、鑰匙專人保管、交班清點」(非鑰匙放固定地方,D錯)。故正確為疫苗2~8°C(C)。","options":{"A":"急救藥品仍須檢查有效日期。","B":"稀釋抗生素效期一般24小時,非一週。","C":"正確(本題答案)。疫苗保存2~8°C冰箱。","D":"管制藥鑰匙須專人保管,非放固定地方。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"104030-N2-11":{"quick":"「Morphine 5 mg IV st.」=立即靜脈注射一次、不可重複給。","detail":{"background":"st.(stat)=立即給予「一次」、不可重複(無p.r.n.)。「Morphine 5 mg IV st.」=立即給予Morphine 5 mg靜脈注射一次,不可重複給(C正確)。若要重複須另有p.r.n.或頻次。故為立即一次、不可重複(C)。","options":{"A":"st.是立即,非如有需要。","B":"st.立即一次不可重複,非可重複。","C":"正確(本題答案)。立即靜脈注射一次、不可重複。","D":"st.是立即,非如有需要。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"104030-N2-21":{"quick":"Metformin(Glucophage)機轉=抑制腸道吸收葡萄糖、降低肝糖質新生、增加胰島素敏感性。","detail":{"background":"Metformin(Glucophage,雙胍類)「1# with meal P.O. TID」=隨餐服用、一天三次(減少腸胃不適)。機轉:抑制肝臟糖質新生、增加周邊組織對胰島素敏感性、「抑制腸道吸收葡萄糖」(D正確);它「不」刺激胰島素分泌(B錯,磺醯尿素類才刺激)、「不」促進糖質新生(C錯,反而抑制);隨餐服用非「餐後1小時」(A錯)。故機轉為抑制腸道吸收葡萄糖(D)。","options":{"A":"隨餐(with meal)服用,非餐後1小時。","B":"Metformin不刺激胰島素分泌。","C":"Metformin抑制(非促進)糖質新生。","D":"正確(本題答案)。抑制腸道吸收葡萄糖。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"104030-N2-22":{"quick":"Gentamycin常見副作用=「血清creatinine升高(腎毒性)」。","detail":{"background":"Gentamycin(胺基糖苷類抗生素)常見副作用為「腎毒性與耳毒性」。腎毒性表現為血清creatinine升高、肌酸酐廓清率「下降」(C正確)。A creatinine clearance升高(方向相反)、B prothrombin time延長(凝血,非Gentamycin)、D血鉀降低(非典型)皆非。故為血清creatinine升高(C),用藥期間須監測腎功能與血中藥物濃度。","options":{"A":"肌酸酐廓清率應下降,非升高。","B":"PT延長是抗凝/肝功能,非Gentamycin。","C":"正確(本題答案)。血清creatinine升高(腎毒性)。","D":"血鉀降低非Gentamycin典型副作用。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"105030-N2-20":{"quick":"抗生素「未開封前不需」放冰箱;稱未開封須冷藏為錯誤(口服抗生素未開封常溫即可)。","detail":{"background":"藥物儲存:Dulcolax栓劑(supp)須冷藏(遇熱軟化,A對);肝素開封後須冷藏(B對);疫苗須冷藏2~8°C(C對)。選項D「抗生素未開封前須置於冰箱」不適當——多數口服抗生素「未開封」時常溫保存即可,僅「稀釋後(沖泡後)」的抗生素懸浮液才需冷藏並限期使用,故D為不適當敘述(本題答案)。","options":{"A":"適當。栓劑須冷藏(遇熱軟化)。","B":"適當。肝素開封後冷藏。","C":"適當。疫苗冷藏2~8°C。","D":"不適當(本題答案)。口服抗生素未開封常溫即可,非須冷藏。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"105030-N2-21":{"quick":"長期服Morphine、藥效時間縮短:評估疼痛並與醫師討論調整止痛處方。","detail":{"background":"癌症骨轉移病人長期服Morphine、此次5小時(<q6h)就疼痛難耐——可能是「疼痛加劇或耐受性使藥效不足」,正確處置是「進一步評估疼痛並與醫師討論止痛藥物處方的調整(增量或縮短間隔)」(B正確)。A只解釋耐受性不處理、C要病人忍耐、D強調成癮要少用——皆未適當控制癌症疼痛(癌痛應充分止痛)。故B最適當。","options":{"A":"只解釋耐受性未處理疼痛。","B":"正確(本題答案)。評估疼痛並與醫師討論調整處方。","C":"要病人忍耐,癌痛應充分控制。","D":"過度顧慮成癮而少用,延誤癌痛控制。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"106030-N2-12":{"quick":"「Gentamycin oint.」依醫囑為眼用(雙眼)?本題答案C給予雙眼。","detail":{"background":"本題承上題情境,Gentamycin oint.(藥膏)依該病人醫囑為眼用、雙眼(O.U.)使用,故「給予雙眼」(C正確)。給藥前須核對醫囑指定的部位(右眼O.D./左眼O.S./雙眼O.U.)。本題依情境醫囑為雙眼。Gentamycin有眼用與耳用劑型,須依醫囑部位給藥。","options":{"A":"依醫囑非僅右眼。","B":"依醫囑非僅左眼。","C":"正確(本題答案)。依醫囑給予雙眼。","D":"此為眼用藥膏,非耳用。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"106111-N2-20":{"quick":"適合皮下注射者:麻疹疫苗(2)、肝素(3)→「23」。","detail":{"background":"適合「皮下注射」的藥物/製劑:麻疹疫苗(2,活性減毒疫苗多皮下)、肝素(3,皮下注射預防/治療血栓)、胰島素。鐵劑(1)刺激性強、會染色,須「Z型『肌肉』注射」(非皮下);抗生素(4)多肌肉或靜脈。故適合皮下注射者為「23」。記憶:皮下注射適用——胰島素、肝素、麻疹/MMR等活性減毒疫苗;鐵劑須「Z型肌肉注射」(刺激性、會染色);多數抗生素肌肉或靜脈注射。","options":{"A":"含1(鐵劑Z型肌注)不符。","B":"含1不符。","C":"正確(本題答案)。2麻疹疫苗、3肝素適合皮下注射。","D":"含4(抗生素)不符。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"108110-N2-36":{"quick":"「KCl 20 mEq IV push(直接靜脈推注)」是必須強烈質疑的醫囑(KCl不可推注)。","detail":{"background":"高警訊藥物給藥安全:選項B「KCl(40 mEq/Amp)20 mEq IV push(直接靜脈推注)」必須「強烈質疑」——氯化鉀(KCl)「絕不可直接靜脈推注」(會造成致命性高血鉀心律不整、心跳停止),必須「稀釋後緩慢靜脈滴注」(B正確,須質疑)。A林格氏液80mL/hr、C Gentamycin稀釋滴注30分、D D5W 100mL/hr皆為正常醫囑。故須質疑者為KCl IV push(B)。","options":{"A":"林格氏液滴注屬正常醫囑。","B":"正確(本題答案)。KCl不可IV push,須強烈質疑。","C":"Gentamycin稀釋滴注30分屬正常。","D":"D5W滴注屬正常醫囑。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"109030-N2-9":{"quick":"Acetaminophen用藥前應先了解病人有否「肝臟病史」(肝毒性)。","detail":{"background":"Acetaminophen(普拿疼)成人安全劑量≦3~4 gm/天。「500 mg 1# QID」=一天4次×500=2000 mg/day,未超量(A錯,稱已超出)。Acetaminophen過量或長期使用有「肝毒性」,用藥前應了解病人「肝臟病史」(B正確);其目的是退燒止痛(非預防感染,C錯);非每次用前都須測體溫(D錯,視醫囑)。故用藥前須了解肝臟病史(B)。","options":{"A":"一天2000 mg未超過安全劑量(≦3~4 gm)。","B":"正確(本題答案)。Acetaminophen有肝毒性,須了解肝臟病史。","C":"目的是退燒止痛,非預防感染。","D":"非每次用前都須測體溫。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"110030-N2-21":{"quick":"Digoxin(毛地黃)繼續給藥的最重要依據=心率(如64次/分,≧60可給)。","detail":{"background":"Digoxin(毛地黃)會減慢心率,給藥前須測「心尖脈(心率)」,若「<60次/分」應暫停給藥並通報醫師。選項A「心率64次/分(≧60)」是可繼續給藥的依據(A正確);C心率52次/分<60應停藥;血壓、呼吸非毛地黃給藥的主要依據。故繼續給藥最重要依據是心率64(≧60)(A)。","options":{"A":"正確(本題答案)。心率64≧60,可繼續給Digoxin。","B":"血壓非毛地黃給藥主要依據。","C":"心率52<60應停藥,不可給。","D":"呼吸非毛地黃給藥依據。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"111110-N2-17":{"quick":"未開封的胰島素應「冷藏(2~8°C)」保存,非室溫;稱可置室溫為錯誤。","detail":{"background":"藥物管理:Pethidine(Demerol)管制針劑須置上鎖櫃(A對);稀釋後Penicillin G置2~8°C冰箱(C對);流感疫苗置2~8°C專用冰箱(D對)。選項B「未開封的胰島素可置於室溫中保存」錯誤——「未開封」的胰島素應「冷藏(2~8°C)」保存至有效期;「開封後」才可置室溫(約28天內用完),故B為錯誤敘述。","options":{"A":"正確。管制針劑上鎖保管。","B":"錯誤(本題答案)。未開封胰島素須冷藏,開封後才可室溫。","C":"正確。稀釋Penicillin G冰箱保存。","D":"正確。疫苗2~8°C冰箱。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"111110-N2-18":{"quick":"「15% KCl 20 mL IV drip」濃度過高、KCl相關醫囑須質疑。本題答案... 重判官方C。","detail":{"background":"本題官方答案C。高警訊藥物須質疑者:選項C「15% KCl(10 mEq/5 mL/Amp)20 mL q.d. I.V. drip」——KCl為高危險藥,需確認「稀釋濃度與滴注速度」(KCl須充分稀釋、緩慢滴注,濃度/速率不當會致命性高血鉀),給藥前須提出質疑確認(C)。A Cefazolin、B Acetaminophen p.r.n.、D NTG舌下皆為常規可執行醫囑。故須質疑者為KCl醫囑(C)。","options":{"A":"Cefazolin屬常規醫囑。","B":"Acetaminophen p.r.n.屬常規。","C":"正確(本題答案)。KCl須確認稀釋與速率,應質疑。","D":"NTG舌下屬常規急救用藥。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"113030-N2-11":{"quick":"口服藥劑型吸收最慢=「軟膠囊」(需崩解溶出)。本題答案C。","detail":{"background":"本題官方答案C。口服藥劑型吸收速度:溶液>懸浮劑>發泡錠(遇水即崩解)>...>膠囊(需崩解外殼再溶出)。在本題選項中「軟膠囊(soft capsule)」需先崩解膠囊外殼、釋出內容物再溶解吸收,相對最慢(C);懸浮劑與發泡錠已部分分散/崩解較快;粉劑表面積大溶解快。故吸收最慢為軟膠囊(C)。","options":{"A":"懸浮劑已分散,吸收較快。","B":"發泡錠遇水崩解快。","C":"正確(本題答案)。軟膠囊需崩解溶出,吸收最慢。","D":"粉劑表面積大,溶解快。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"114030-N2-12":{"quick":"口服藥吸收最快=brown mixture syrup(糖漿/溶液劑型)。","detail":{"background":"口服藥劑型吸收速度:液體(糖漿syrup/溶液solution,已溶解無需崩解)最快。選項中「brown mixture syrup(止咳糖漿,液體)」吸收最快(C正確);錠劑(tablet)、膠囊(capsule)、粉劑(powders)需崩解溶解較慢。故吸收最快為糖漿(C)。","options":{"A":"粉劑需溶解,慢於液體。","B":"錠劑需崩解,較慢。","C":"正確(本題答案)。糖漿(液體)吸收最快。","D":"膠囊需崩解,較慢。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"114030-N2-16":{"quick":"Gentamycin精密輸液套管加藥:阻斷夾操作順序應「先關後加」,本題答案A為錯誤。","detail":{"background":"本題問「錯誤」者。精密輸液套管(burette/IV bag)加藥步驟:B擠壓所需溶液量後關閉阻斷夾(對)、C酒精消毒加藥口注入藥物(對)、D藥滴完後打開阻斷夾使溶液流入沖洗管路(對)。選項A「打開輸液瓶與精密袋間阻斷夾,以手擠壓精密袋到所需量,『關閉』阻斷夾」——操作順序/描述與標準不符(應先放適量溶液入精密袋再關夾、加藥),命題判A為錯誤步驟。核心:精密套管先放適量溶液、關夾、消毒加藥口注藥、滴完開夾沖洗。","options":{"A":"錯誤(本題答案)。此加藥步驟順序敘述不當。","B":"正確。放所需量後關閉阻斷夾。","C":"正確。消毒加藥口注入藥物。","D":"正確。滴完後開夾使溶液沖洗管路。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"114170-N2-11":{"quick":"「Digoxin 0.5# PO QOD」=每兩天(每隔一天)給藥一次。","detail":{"background":"QOD(q.o.d.)=每隔一天(每兩天)一次;PO=口服。「Digoxin 0.5# PO QOD」=每兩天口服Digoxin半顆一次(D正確)。每次劑量是「半顆(0.5#)」非0.5 mg(A錯,需看每顆mg數);PO是口服非舌下(B錯);QOD非「早晚各一次」(C錯)。故為兩天給藥一次(D)。","options":{"A":"0.5#是半顆,非0.5 mg。","B":"PO是口服,非舌下。","C":"QOD是每隔一天,非早晚各一次。","D":"正確(本題答案)。每兩天給藥一次。"},"sources":["新文京《基本護理學》藥物管理與劑型","華杏《最新基本護理學》藥理基礎"]}},"104030-N2-9":{"quick":"「Valium 1# h.s. p.r.n.」=睡前需要時給予。","detail":{"background":"h.s.(hora somni)=睡前;p.r.n.=視需要。「Valium 1# h.s. p.r.n.」=睡前若病人有需要(失眠)時給予一顆(B正確)。非「即刻給」(無st)、非「12小時內」(那是S.O.S.)、非單純「需要時」(須在睡前時段)。故為睡前需要時給予(B)。","options":{"A":"即刻給是st,非h.s. p.r.n.。","B":"正確(本題答案)。睡前需要時給予。","C":"12小時內是S.O.S.特性。","D":"須在睡前時段給,非任何需要時。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}},"108110-N2-21":{"quick":"電子病歷護理紀錄須在「24小時內」完成IC卡簽章,非48小時;稱48小時為錯誤。","detail":{"background":"本題問「錯誤」者。臨床護理紀錄原則:紙本書寫錯誤劃線註error並簽名(B對);灌腸11AM執行、紀錄時間欄記「執行/事件時間」(C對);紀錄應據實客觀、排除主觀判定(D對)。選項A「電子病歷護理師完成紀錄後需在『48小時內』使用醫事人員憑證IC卡完成簽章」錯誤——電子病歷簽章應於規定時限(一般「24小時內」)完成,48小時過久,故A為錯誤敘述。","options":{"A":"錯誤(本題答案)。電子病歷簽章應於24小時內,非48小時。","B":"正確。紙本錯誤劃線註error簽名。","C":"正確。時間欄記執行時間。","D":"正確。據實客觀排除主觀判定。"},"sources":["新文京《基本護理學》給藥安全(三讀五對)","病人安全給藥指引"]}},"108110-N2-22":{"quick":"對醫囑(zolpidem)有疑問:最適當是「與開立醫囑醫師確認」。","detail":{"background":"護理師對醫囑(如zolpidem stilnox劑量/頻次)有疑問時,最適當的處理是「直接與開立醫囑的醫師確認澄清」(D正確),不可有疑問仍按時給藥(A,違反用藥安全)、不可只詢問病人藥物史(B,無法確認醫囑正確性)、與資深護理師討論(C)無法確認醫囑本身。故有疑問應與開立醫師確認(D)。","options":{"A":"有疑問不可仍按時給藥。","B":"問病人藥物史無法確認醫囑正確性。","C":"與資深護理師討論無法確認醫囑本身。","D":"正確(本題答案)。與開立醫囑醫師確認。"},"sources":["新文京《基本護理學》給藥安全(三讀五對)","病人安全給藥指引"]}},"109110-N2-22":{"quick":"空針給藥:刻度對準針心前端「黑色橡皮圈上緣」。本題答案D。","detail":{"background":"本題官方答案D。10公斤幼兒Cough Mixture 0.25 c.c./kg=2.5 c.c.,以「空針(注射筒)」量取小劑量較精準。讀取刻度時應「對準針心(活塞)前端黑色橡皮圈的上緣(靠藥液側)」(D正確);小藥杯讀刻度則對準液體「凹面(彎月面)最低處」平視。故空針刻度對準黑色圈上緣(D)。","options":{"A":"小藥杯讀凹面最低處,非兩側緣。","B":"小藥杯讀凹面(彎月面)最低處,非凸面。","C":"空針讀黑色圈「上緣」,非下緣。","D":"正確(本題答案)。空針刻度對準黑色橡皮圈上緣。"},"sources":["新文京《基本護理學》給藥劑量計算","華杏《最新基本護理學》點滴滴速與劑量"]}}},TO=["1醫囑類型縮寫與口頭醫囑", "2給藥安全三讀五對與護理職責", "3口服給藥服藥順序與藥物交互作用", "4注射技術與胰島素", "5眼耳塞劑吸入劑等特殊給藥途徑", "6劑量計算與點滴滴速", "7靜脈輸液與注射合併症", "8特定藥物用藥知識與藥物儲存劑型"],LEC={"1醫囑類型縮寫與口頭醫囑":{"html":"\n<p><b>醫囑類型:</b><b>stat(St.)</b>立即給一次;<b>single order</b>指定時機給一次(如術前給藥);<b>S.O.S.</b>如有需要給「一次」、有效12小時、執行即失效;<b>p.r.n.</b>視需要、屬「長期」醫囑可「重複」給(有間隔);<b>長期(常規)醫囑</b>開立當日生效、持續至停止(D.C.)。<b>order renew(醫囑重整)</b>=之前長期醫囑視同停止,以重整後為準。</p>\n<p><b>時間縮寫:</b>q.d.一次、b.i.d.兩次、t.i.d.三次、q.i.d.四次、<b>q.o.d.每隔一天</b>、a.c.飯前、p.c.飯後、<b>h.s.睡前</b>、M.N.午夜;q6h=每6小時等距(6-12-6-12)、q.i.d.=隨餐(9-1-5-9),兩者時間不同。</p>\n<p><b>部位/途徑:</b><b>A.D.右耳、A.S.左耳、A.U.雙耳;O.D.右眼、O.S.左眼、O.U.雙眼</b>;P.O.口服、S.C.皮下、I.M.肌肉、I.V.靜脈、S.L.舌下、supp栓劑。<b>A.A.D.自動出院、M.B.D.許可出院、D.O.A.到院前死亡。</b></p>\n<p><b>口頭/電話醫囑:</b>緊急時可接受——<b>寫下→覆誦(read back)與醫師確認→才執行</b>,最好二人在場,事後請醫師儘速補簽。</p>\n"},"2給藥安全三讀五對與護理職責":{"html":"\n<p><b>三讀(對藥三次):</b>取藥(從藥車取藥袋/藥瓶)、配藥(取出藥物/抽藥前)、給藥(給病人前/丟棄空瓶前)各核對一次。<b>五對:</b>病人對、藥物對、劑量對、途徑對、時間對(「作用對」非五對)。</p>\n<p><b>給藥原則:</b>護理師自備藥自己發、不讓病人傳遞;<b>確認病人服下才離開</b>;病人不在/拒服→了解原因、註記、稍後再給或報告,不可留床旁桌。<b>不可捏鼻灌小兒藥</b>(易嗆)。床邊電子化:刷病人手圈→藥物視窗→刷藥品條碼→確認相符→給藥→儲存;<u>電子化不能取代三讀五對</u>。</p>\n<p><b>質疑醫囑:</b>劑量超量、KCl直接推注、途徑不明、高警訊藥物——給藥前須與「開立醫師確認」,不可逕自給藥。</p>\n<p><b>護理功能:</b>獨立性(自主衛教/姿位/評估)、依賴性/非獨立性(依醫囑給藥注射)、合作性(與他專業協同)。<b>緊急優先</b>:危及生命(胸悶疑ACS、呼吸窘迫、意識下降)最優先。</p>\n"},"3口服給藥服藥順序與藥物交互作用":{"html":"\n<p><b>多藥同服順序:</b>錠劑(配水)→胃乳(制酸保護胃黏膜)→<b>咳嗽藥劑(最後</b>,服後不喝水以維持咽喉局部止咳作用)。</p>\n<p><b>特殊口服:</b>油類藥(蓖麻油)冰冷後服;<b>鐵劑用吸管</b>(防染牙)、勿與茶併服(鞣酸);<b>腸衣錠/緩釋劑整顆吞</b>不可磨粉咬碎;Rifampicin空腹服;止吐劑飯前服。</p>\n<p><b>藥物-食物交互作用:</b><b>warfarin↔維生素K</b>(深綠蔬菜降藥效,須穩定攝取);<b>四環黴素/含鈣鐵藥↔牛奶</b>(螯合降吸收);<b>葡萄柚汁</b>抑制肝臟CYP3A4使藥物濃度升高;勿與酒精併服。</p>\n<p><b>口腔含漱藥:</b>念珠菌→<b>Nystatin(Mycostatin)</b>抗黴菌;口腔疼痛→<b>Xylocaine</b>局部麻醉(飯前漱口利進食);類固醇吸入後須漱口防念珠菌。劑型吸收:溶液>懸浮>膠囊>錠劑>腸衣錠。</p>\n"},"4注射技術與胰島素":{"html":"\n<p><b>注射四途徑:</b><b>皮內(ID)</b>=PST/PPD,注真皮、斜面向上、形成皮丘、「不反抽」、部位前臂內側;<b>皮下(SC)</b>=胰島素/肝素,15~90度、瘦者捏皮45度、「不按摩」;<b>肌肉(IM)</b>=90度、消毒由內向外3吋、「反抽」(回血即拔)、注射量2~5 c.c.;<b>靜脈(IV)</b>。</p>\n<p><b>肌注部位:</b>首選<b>腹臀肌(腹側臀肌)</b>(安全、無大血管神經、可較大量);幼兒/2歲以下首選<b>股外側肌</b>;三角肌量少(≦1~2 c.c.);背臀肌近坐骨神經風險高;背臀肌四分法上界約髂骨嵴。</p>\n<p><b>胰島素:</b>皮下注射、<b>輪換部位</b>、注射前確認進食(RI飯前30分)、注射後不按摩;短效RI澄清、中效NPH混濁(用前輕滾);混合<b>先抽RI(清)再抽NPH(濁)</b>;腹部注射避開臍周一拳。</p>\n<p><b>不可按摩:</b>PST、胰島素、肝素;<b>可按摩:</b>一般肌注(Demerol)。PST/PPD皮內不反抽;緊急epinephrine IM不反抽、不按摩。</p>\n"},"5眼耳塞劑吸入劑等特殊給藥途徑":{"html":"\n<p><b>眼藥:</b>頭後仰、眼球往上看、滴於<b>下結膜囊</b>(非角膜);擦分泌物<b>由內眥往外眥</b>;滴後壓內眥(鼻淚管)防入鼻、閉眼轉眼球使擴散;併用<b>先水(藥水)後油(藥膏)</b>、間隔3~5分。</p>\n<p><b>耳藥:</b>加溫至接近體溫、順耳壁流入(勿滴耳膜);<b>成人耳廓向上往後拉、3歲以下向下往後拉</b>。</p>\n<p><b>栓劑(supp):</b>採<b>左側臥</b>、塗少量潤滑、塞越過肛門內括約肌貼直腸黏膜(成人約2吋/6~7.5cm、小兒約1吋)、留置15~30分;遇體溫由直腸黏膜吸收;栓劑冰箱保存。陰道栓劑推入約8~10公分。</p>\n<p><b>吸入劑(MDI):</b>使用前搖勻、按壓與深吸氣協調、閉氣約10秒;<b>類固醇吸入後須漱口</b>防念珠菌。<b>Fentanyl貼片:</b>貼平坦少毛處、手掌緊壓30秒、換不同部位、避免泡熱水澡(熱加速釋放)。NTG舌下含1顆、無效隔5分再含、最多3顆。</p>\n"},"6劑量計算與點滴滴速":{"html":"\n<p><b>抽藥量</b>=需要劑量÷藥液濃度。例:Gentamycin 40 mg/mL需100 mg→100÷40=2.5 mL。</p>\n<p><b>滴速(gtt/min)</b>=總量(mL)×滴系數(gtt/mL)÷時間(分)。<b>精密(micro)套管=60 gtt/mL</b>、普通(macro)=15~20 gtt/mL。<u>用精密套管時 gtt/min = mL/hr</u>(因60÷60=1)。例:100 mL/hr精密→100滴/分。</p>\n<p><b>克拉克氏法則(Clark’s rule):</b>小兒劑量=成人劑量×(體重磅÷150)=成人×(體重kg×2.2÷150)≈成人×kg/68。例:9 kg、成人500 mg→500×(9×2.2÷150)=66 mg。另:體表面積法最準確、Fried法(嬰兒)、Young法(按年齡)。</p>\n<p><b>輸液幫浦速率(mL/hr)</b>=每日總量÷24。<b>熱量:</b>5%葡萄糖=每100 mL含5 g葡萄糖、每克葡萄糖約4 Kcal。例:1500 mL×5%=75 g×4=300 Kcal。單位:1 gm=1000 mg=10⁶ mcg。</p>\n"},"7靜脈輸液與注射合併症":{"html":"\n<p><b>浸潤(infiltration):</b>針頭穿破/滑出靜脈,藥液漏入<b>皮下組織</b>→注射部位<b>腫脹、冰冷蒼白、壓痛、回血不良、滴速變慢</b>;處理:停止注射、另覓部位、抬高患肢。</p>\n<p><b>靜脈炎(phlebitis):</b>沿靜脈走向<b>紅、腫、溫度升高、壓痛、變硬如索狀</b>(藥物/針頭刺激或留置過久);血栓性靜脈炎<b>不可按摩</b>(防血栓脫落)、可冷敷。</p>\n<p><b>感染:</b>局部紅腫熱痛+<b>膿性分泌物+發燒</b>。<b>發熱反應:</b>輸液污染致全身發冷發燒。<b>空氣栓塞:</b>大量空氣入靜脈阻塞肺動脈,<b>立即致命</b>。<b>循環負荷過量:</b>輸液過快過多→水腫、呼吸喘、頸靜脈怒張、血壓上升。</p>\n<p><b>點滴停止滴注排查:</b>評估注射部位腫脹、檢查回血、檢查管路扭曲受壓、檢查導氣針——確認原因再處理,不可立即拔針重打;點滴瓶應高於注射部位約60~90公分。</p>\n"},"8特定藥物用藥知識與藥物儲存劑型":{"html":"\n<p><b>高警訊藥物:</b><b>KCl(氯化鉀)絕不可直接靜脈推注</b>(致命性高血鉀),須稀釋緩慢滴注;胰島素、肝素、Dopamine等須謹慎、雙重核對。</p>\n<p><b>特定藥物:</b><b>Digoxin(毛地黃)</b>給藥前測心尖脈,<b>&lt;60次/分停藥</b>通報;<b>Morphine</b>癌痛應充分止痛、藥效不足與醫師討論調整;<b>Gentamycin</b>有腎毒性(creatinine升高)與耳毒性,須稀釋滴注、監測;<b>Acetaminophen</b>有肝毒性(≦3~4 gm/天),用前了解肝病史;<b>Metformin</b>隨餐服、抑制肝糖質新生與腸道吸收葡萄糖。</p>\n<p><b>藥物儲存:</b><b>須冷藏(2~8°C)</b>=疫苗、未開封胰島素、栓劑(遇熱軟化)、稀釋後抗生素、肝素;<b>開封後胰島素可室溫</b>(28天內);<b>管制藥</b>雙重上鎖、專人保管鑰匙、交班清點;急救藥仍須查有效期。</p>\n<p><b>劑型吸收:</b>溶液>懸浮>膠囊>錠劑>腸衣錠/緩釋劑;緩釋/腸溶劑整顆吞、不可磨碎。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_b4_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
