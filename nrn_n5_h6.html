是「「教學「過程中」」進行，以「即時修正」」);C『「診斷性」評價是在「教學「過程中」」測量』錯誤(診斷性評價是「「教學「之前」」，了解「起點/先備能力」」);D『「總結性」評價是在結束後測量「造成學習「困難的原因」」』錯誤(總結性評價是「教學「結束後」」評估「「學習「成果」」」，非「找困難原因」)。故 A 正確。標準參照評價看是否達預設標準。","options":{"A":"正確。標準參照評價著重學習成就是否達預先設定的標準。","B":"形成性評價是教學「過程中」進行，非教學之前。","C":"診斷性評價是教學「之前」(了解先備能力)，非過程中。","D":"總結性評價是評估學習成果，非找學習困難的原因。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"110110-N5-58":{"quick":"「想運動但找不到時間」(意圖期)，最適當的方法＝自我再評價。","detail":{"background":"王女士「「想運動、但找不到時間」(屬「「意圖期」」，有意圖、權衡利弊、尚未行動)」——依跨理論模式，此階段最適當的方法是(A)『「自我再評價(self-reevaluation;引導其「「重新「審視/評估」「不改變」與「改變後」的「自我形象與價值」」，「強化「改變的動機」」，幫助其「從「意圖期」邁向「準備期」」)』。情境替代、增強管理、刺激控制是「「行動期/維持期」」(已開始行動後)的策略。「意圖期」宜用自我再評價(強化動機)。故 A 正確。意圖期宜用自我再評價以強化改變動機。","options":{"A":"正確。意圖期宜用自我再評價(強化改變動機)。","B":"情境替代(反制約)是行動期之後的策略。","C":"增強管理(獎勵)是行動期之後的策略。","D":"刺激控制是行動期之後的策略。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"110110-N5-59":{"quick":"目前健康體適能的測量指標＝肌力與肌耐力、心肺耐力、柔軟度、身體組成。","detail":{"background":"目前「健康體適能」的測量指標是(A)『「「肌力與肌耐力、心肺耐力、柔軟度、身體組成」(健康體適能的四大要素)」』。其他選項摻入「腰圍、心率變異、體重、體脂肪」等「單一/非標準」項目。故 A 正確。健康體適能四大要素:肌力與肌耐力、心肺耐力、柔軟度、身體組成。","options":{"A":"正確。肌力與肌耐力、心肺耐力、柔軟度、身體組成(健康體適能四要素)。","B":"含「腰圍」，非標準的四要素。","C":"含「心率變異、體重」，非標準的四要素。","D":"含「體脂肪」(屬身體組成的一部分，但表述不完整)，非標準四要素。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"110110-N5-67":{"quick":"更年期婦女骨質疏鬆防治「最不適當」者＝鼓勵使用傳統荷爾蒙替代療法。","detail":{"background":"更年期婦女骨質疏鬆防治措施，「最不適當」者為(B)『「「鼓勵」使用「(傳統)荷爾蒙替代療法(HRT)」』——錯誤，「荷爾蒙替代療法「有「乳癌、心血管、血栓」等「風險」，「「不應「常規「鼓勵」」使用」(應由醫師「個別評估利弊」後決定，非預防骨鬆的首選)。其他適當:A 建立正確的預防骨質疏鬆知識、C 鼓勵充分日曬及負重運動、D 鼓勵多攝取深綠色蔬菜(補鈣)。故本題選最不適當者為 B。HRT 有風險，不應常規鼓勵使用。","options":{"A":"建立正確的預防骨鬆知識，適當。","B":"正確(本題選最不適當者)。HRT 有風險，不應常規鼓勵使用。","C":"鼓勵充分日曬及負重運動，適當。","D":"鼓勵多攝取深綠色蔬菜(補鈣)，適當。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"110110-N5-68":{"quick":"回教新住民產婦拒吃麻油豬肝：護理措施「最適當」者＝協助家人尊重宗教文化差異。","detail":{"background":"回教(伊斯蘭教)信仰的新住民產婦「「拒吃「麻油豬肝(豬肉)」」(因「「宗教禁忌(回教不食豬肉)」」)」，引起婆婆不悅——最適當的護理措施是(D)『「「協助「家人「尊重「宗教文化差異」」」(「文化照護」的核心是「「尊重、理解」其「宗教與文化」」，協調婆媳「彼此尊重」)』。其他不當:A『鼓勵新住民「應積極融入在地文化」』(不應要求其放棄宗教信仰);B『學習印尼語』、C『請通譯做衛教』偏離「核心問題(宗教飲食禁忌)」。故 D 正確。對宗教飲食禁忌，應協助家人尊重其宗教文化差異。","options":{"A":"不應要求新住民放棄宗教信仰去融入。","B":"學習印尼語偏離核心問題(宗教禁忌)。","C":"請通譯衛教偏離核心(非語言不通，是宗教禁忌)。","D":"正確。協助家人尊重宗教文化差異。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"110110-N5-70":{"quick":"學校衛生法的敘述「錯誤」者＝專科以上學校應定期檢測學生的健康體適能。","detail":{"background":"學校衛生法的敘述，「錯誤」者為(A)『「「專科以上」學校應「定期檢測學生的健康體適能」』——錯誤，「「健康體適能的「定期檢測」」主要規範於「「高級中等「以下」」學校」(每學年辦理);「「專科以上」並非法定「應「定期檢測」體適能」。其他正確:B 高級中等以下學校班級數未達40班者，應置護理人員1人;C 對患有心臟病、癲癇、糖尿病等重大傷病或身心障礙學生，應加強輔導與照顧、必要時調整課業及活動;D 高級中等以下學校應全面禁菸。故本題選錯誤者為 A。體適能定期檢測規範於高級中等以下，非專科以上。","options":{"A":"正確(本題選錯誤者)。體適能檢測規範於高級中等以下，非專科以上。","B":"未達40班者應置護理人員1人，正確。","C":"對重大傷病/身心障礙學生加強輔導照顧，正確。","D":"高級中等以下學校應全面禁菸，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"110110-N5-78":{"quick":"「不屬於」糖尿病併發症篩檢項目者＝胎兒甲型蛋白(AFP)檢查。","detail":{"background":"糖尿病病人定期進行併發症篩檢，「不屬於」其篩檢項目者為(C)『「「胎兒甲型蛋白(α-fetoprotein, AFP)」檢查」』——「AFP 是「「肝癌」的腫瘤標記、「胎兒「神經管缺損」的產前篩檢」」，「與「糖尿病併發症」「無關」」。其他屬於糖尿病併發症的篩檢:A 視網膜檢查(糖尿病視網膜病變)、B 尿蛋白檢查(糖尿病腎病變)、D 足踝神經檢查(糖尿病神經病變/糖尿病足)。故本題選不屬於者為 C。AFP 與糖尿病併發症無關。","options":{"A":"視網膜檢查(糖尿病視網膜病變)，是併發症篩檢。","B":"尿蛋白檢查(糖尿病腎病變)，是併發症篩檢。","C":"正確(本題選不屬於者)。AFP 是肝癌/胎兒篩檢，與糖尿病併發症無關。","D":"足踝神經檢查(糖尿病神經病變)，是併發症篩檢。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"111030-N5-41":{"quick":"「健康融入所有政策(HiAP)」的概念「正確」者＝所有公共政策皆應將健康效益納入考量。","detail":{"background":"「健康融入所有政策(Health in All Policies, HiAP)」的概念，正確的是(C)『「「「所有」公共政策(交通、教育、經濟、環境等)」皆應將「健康效益」「納入考量」(健康「不只是「健康部門」」的責任，「「各部門」的政策」都應「考量對健康的影響」)』。其他錯誤:A、B、D 都「侷限於「健康部門」」(HiAP 強調的是「「跨部門」、「所有」政策」都納入健康考量，非僅健康部門的責任)。故 C 正確。HiAP 強調所有部門的公共政策都應納入健康效益考量。","options":{"A":"HiAP 強調跨部門，非僅健康部門的責任。","B":"HiAP 非僅健康部門制訂健康政策的責任。","C":"正確。所有公共政策皆應將健康效益納入考量。","D":"HiAP 非僅由健康部門制訂政策。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"111030-N5-55":{"quick":"透過各類媒體進行大腸癌防治宣導＝健康傳銷法。","detail":{"background":"國民健康署「透過「各類「媒體」」進行大腸癌防治「宣導」，鼓勵民眾篩檢」——屬(D)『「健康傳銷(社會行銷)法(運用「媒體、廣告、宣傳」「大範圍」向「大眾」推廣健康觀念與行為)」』。價值澄清法、團體動力法、示範法是「小團體/個別」的方法。「媒體大眾宣導」屬健康傳銷。故 D 正確。透過媒體大眾宣導屬健康傳銷法。","options":{"A":"價值澄清法是引導釐清價值的小團體方法。","B":"團體動力法是運用團體互動的方法。","C":"示範法是示範技能的方法。","D":"正確。透過各類媒體宣導，屬健康傳銷法。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"111030-N5-56":{"quick":"推動健康識能(health literacy)的敘述「錯誤」者＝民眾健康識能越低，對預防保健服務利用率較高。","detail":{"background":"推動健康識能(health literacy)的敘述，「錯誤」者為(D)『「通常民眾健康識能程度「「越低」」，對預防保健服務的「利用率「「較高」」』——錯誤，「健康識能「「越「低」」者」，「「「越「不會「正確利用」健康資訊與服務」」(利用率「「較「低」」、就醫行為較差)。其他正確:A 鼓勵健康照護機構讓民眾易於獲取與應用健康資訊與服務、B 善用 eHealth、新媒體傳播、C 透過社區、學校、職場、醫院等場域傳播。故本題選錯誤者為 D。健康識能越低，預防保健的利用率越低，非越高。","options":{"A":"讓民眾易於獲取與應用健康資訊與服務，正確。","B":"善用 eHealth、新媒體傳播健康資訊，正確。","C":"透過社區、學校、職場、醫院等場域傳播，正確。","D":"正確(本題選錯誤者)。健康識能越低，利用率越低，非越高。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"111030-N5-57":{"quick":"體適能的敘述「錯誤」者＝從事3週任何身體活動即可降低大腸癌的發生率。","detail":{"background":"體適能的敘述，「錯誤」者為(D)『「從事「「3週」」任何身體活動「即可「降低大腸癌的發生率」」』——錯誤，「降低慢性病/癌症的發生率，需要「「「長期、規律」」的身體活動」，「「不是「短短「3週」」」就能達成。其他正確:A 心肺適能為評估健康體能項目之一、B 體適能分為健康體能及競技體能、C 任何運動都算身體活動，但並非所有身體活動都算運動。故本題選錯誤者為 D。降低大腸癌需長期規律運動，非3週。","options":{"A":"心肺適能為健康體能的評估項目，正確。","B":"體適能分為健康體能及競技體能，正確。","C":"運動是身體活動，但非所有身體活動都是運動，正確。","D":"正確(本題選錯誤者)。降低大腸癌需長期規律運動，非3週。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"111030-N5-68":{"quick":"一般勞工健康檢查「不是」必要項目者＝癌症篩檢。","detail":{"background":"依勞工健康保護規則，一般勞工健康檢查「不是」必要項目者為(C)『「「癌症篩檢」』——「癌症篩檢「不在「一般勞工「健檢」」的「必要項目」中(屬「另外的「癌症篩檢」服務」)。一般勞工健檢的必要項目:A 胸部X光檢查、B 生活習慣調查、D 尿液檢查，以及身高體重血壓、血液生化等。故本題選不是者為 C。癌症篩檢非一般勞工健檢的必要項目。","options":{"A":"胸部X光檢查是一般勞工健檢的必要項目。","B":"生活習慣調查是必要項目。","C":"正確(本題選不是者)。癌症篩檢非一般勞工健檢的必要項目。","D":"尿液檢查是必要項目。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"111030-N5-70":{"quick":"國中學生健康檢查事項「正確」者＝胸腹及泌尿生殖系統需家長及學生同意在校檢查，不同意則自費檢查並交回報告。","detail":{"background":"國中學生健康檢查，正確的是(B)『「檢查項目中「胸、腹部及「泌尿生殖系統」」需「家長及學生「同意」」在校檢查;若「家長不同意」在校檢查，則需「自行帶學生至醫療院所「自費」檢查，並將「報告交回學校」」(尊重隱私與意願)』。其他錯誤:A『3個月一次常規性檢查』非規定的頻率;C『「每學期」由「護理人員」檢查身高體重口腔』敘述不符(身高體重多由導師/協助測量、頻率不同);D『視力不良、肥胖、氣喘需「缺點矯治」』錯誤(這些是「健康問題的「追蹤/矯治/管理」」，「氣喘」屬「疾病管理」而非「體格「缺點矯治」」)。故 B 正確。涉隱私的檢查須家長學生同意，不同意則自費並交回報告。","options":{"A":"3個月一次的常規檢查非規定的頻率。","B":"正確。涉隱私的檢查須家長學生同意，不同意則自費並交回報告。","C":"「每學期由護理人員檢查身高體重口腔」敘述不符。","D":"視力/肥胖/氣喘屬追蹤管理，非單純「缺點矯治」。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"111030-N5-71":{"quick":"職場健康促進的歷程＝推廣體適能戒菸戒檳榔降體脂②→結合資源推行模式③→強化計畫①→健康職場認證④。","detail":{"background":"衛福部推動職場健康促進的歷程依序為(B)『「(2)推廣職場「健康體適能、戒菸、戒檳榔、降低體脂肪」(初期的「單項健康促進」) →(3)「結合各種資源」推行職場健康促進「模式」(整合) →(1)「強化」職場健康促進計畫(深化) →(4)「健康職場「認證」」(制度化)」(2314)』。故正確順序為2314(選 B)。職場健康促進由單項推廣→整合模式→強化計畫→認證制度化。","options":{"A":"1234：順序錯誤(推廣應在最前)。","B":"正確。推廣②→結合資源③→強化計畫①→認證④。","C":"3421：順序錯誤。","D":"4132：認證應在最後，非最前。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"111030-N5-76":{"quick":"骨質疏鬆症防治的衛教「最適當」者＝多攝取乳品、豆製品及深綠色蔬菜以儲存骨本。","detail":{"background":"骨質疏鬆症防治的衛教，最適當的是(A)『「多攝取「乳品、豆製品及深綠色蔬菜」(良好的「鈣」來源)以「儲存骨本」』。其他不當:B『「上午10點至下午2點」間「塗防曬乳」進行日曬』錯誤(這時段「紫外線過強」，應「避開」;且「塗防曬乳「會「阻礙」維生素D 的合成」，曬太陽不應塗防曬);C『「儘可能「減輕」體重」』錯誤(體重「過輕」反而是骨鬆危險因子);D『多做「水中有氧」運動』錯誤(水中運動「非「負重」」，對增加骨密度效果有限，應做「負重運動」)。故 A 正確。多攝取乳品、豆製品、深綠色蔬菜補鈣以儲存骨本。","options":{"A":"正確。多攝取乳品、豆製品、深綠色蔬菜補鈣以儲存骨本。","B":"該時段紫外線過強應避開，且防曬乳阻礙維生素D合成。","C":"體重過輕反是骨鬆危險因子，不應儘量減輕。","D":"水中運動非負重，對增加骨密度效果有限。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"111030-N5-78":{"quick":"戒菸的護理指導「正確」者＝戒菸會有戒斷症候群，是體內尼古丁減少的正常反應。","detail":{"background":"戒菸的護理指導，正確的是(A)『「戒菸會有「戒斷症候群(如焦躁、注意力不集中、渴菸)」，是「體內「尼古丁「減少」」的「正常反應」(會「逐漸緩解」，可用藥物/支持協助度過)』。其他錯誤:B『「減少吸菸量」就可以成功戒菸』錯誤(應「「完全戒除」」，僅減量難成功);C『使用「電子菸」替代有助戒菸』錯誤(電子菸「並非「有效安全」的戒菸方式」，仍有尼古丁與危害);D『「所有」吸菸者都是戒菸治療服務對象』錯誤(戒菸治療的對象是「「「有意願」戒菸」者」)。故 A 正確。戒斷症候群是尼古丁減少的正常反應，會逐漸緩解。","options":{"A":"正確。戒斷症候群是體內尼古丁減少的正常反應。","B":"應完全戒除，僅減量難成功戒菸。","C":"電子菸非有效安全的戒菸方式，仍有危害。","D":"戒菸治療對象是有意願戒菸者，非所有吸菸者。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"111030-N5-79":{"quick":"以腰圍作為代謝症候群指標，是因腹部肥胖可推估「內臟脂肪」的多寡。","detail":{"background":"以「腰圍」作為代謝症候群指標之一，是因為「「腹部肥胖」」可以推估(B)『「「內臟脂肪」的多寡(「「內臟脂肪」堆積」與「「胰島素阻抗、代謝異常、心血管風險」」密切相關;腰圍反映「腹部「內臟脂肪」」)』。皮下脂肪、蛋白質、肌肉非腰圍主要推估的對象。「腰圍→腹部內臟脂肪」是代謝症候群的核心。故 B 正確。腰圍反映腹部內臟脂肪(與代謝異常相關)。","options":{"A":"皮下脂肪非腰圍主要推估的代謝危險指標。","B":"正確。腰圍反映腹部內臟脂肪(與代謝異常相關)。","C":"蛋白質非腰圍推估的對象。","D":"肌肉非腰圍推估的對象。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"111030-N5-80":{"quick":"整合性篩檢(中老年防治)「正確」者＝糖尿病、高血壓與高血脂是慢性病防治重點③、業務隸屬國民健康署④。","detail":{"background":"整合性篩檢(中老年防治計畫)，正確的是:(3)「「糖尿病、高血壓、高血脂(三高)」是慢性病防治的「重點」」;(4)「此業務「隸屬「衛生福利部「國民健康署」」」。而(1)『「肺癌、肝癌」、乳、口腔、子宮頸是「五癌」』錯誤(四癌是「子宮頸、乳、大腸、口腔」，「不含「肺、肝」」);(2)『慢性病「病因「單純」」』錯誤(慢性病的病因「「錯綜複雜、多因子」」)。故正確為③④(選 D)。","options":{"A":"12：①五癌錯(無肺肝)、②病因複雜非單純，皆錯。","B":"14：含①(五癌，錯誤)。","C":"23：含②(病因單純，錯誤)。","D":"正確。三高是慢性病防治重點③、業務隸屬國民健康署④。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"111110-N5-57":{"quick":"記錄每次活動的參與人數＝過程評價。","detail":{"background":"社區護理師推動健康飲食計畫，「記錄「每次活動的「參與人數」」」——屬(A)『「過程(process)評價(評估「計畫「執行的「過程」」(如活動辦理情形、「參與人數」、進度)」)』。效益評價是成本效益;成果評價是最終的健康成果;發展評價是計畫發展中的修正。「參與人數(執行過程)」屬過程評價。故 A 正確。記錄參與人數(執行過程)屬過程評價(與前述同類題一致)。","options":{"A":"正確。記錄每次活動的參與人數(執行過程)，屬過程評價。","B":"效益評價是評估成本與效益。","C":"成果評價是評估最終的健康成果。","D":"發展評價是計畫發展中的修正。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"111110-N5-58":{"quick":"健康促進介入措施描述「最不適當」者＝透過法律制定酒駕罰則增進社區賦權。","detail":{"background":"健康促進介入措施描述，「最不適當」者為(C)『「透過「法律制定酒駕罰則」「增進「社區賦權」」』——錯誤，「「立法(制定酒駕罰則)」屬「「社會改變(政策手段)」」，「「不是「社區「賦權」」」(社區賦權是「增進社區「自主、參與、掌控」的能力」)。其他適當:A 提供健康知識教育民眾做正確決定、B 透過正向或負向增強法促使行為改變、D 透過社區賦權使民眾獲得更多控制權。故本題選最不適當者為 C。立法屬社會改變，非社區賦權。","options":{"A":"提供知識教育民眾做正確決定，適當。","B":"透過正負增強促使行為改變，適當。","C":"正確(本題選最不適當者)。立法(罰則)屬社會改變，非社區賦權。","D":"透過社區賦權使民眾獲得控制權，適當。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"111110-N5-59":{"quick":"「無法」促進情意層面改變的策略＝列舉三項有益健康的運動。","detail":{"background":"為社區民眾護理指導時，「無法」促進「「情意(態度/情感)」」層面改變的策略是(D)『「「列舉」三項有益健康的運動」』——「「列舉(回憶/說出)」是「「認知(知識)」」層面，「不是「情意(態度)」」。其他能促進情意(態度/情感):A 認同運動有益健康(認同/態度)、B 說出對運動的喜愛(情感)、C 願意安排可以運動的時間(意願/態度)。故本題選無法者為 D。列舉(知識)屬認知，非情意層面。","options":{"A":"認同運動有益健康(態度)，屬情意層面。","B":"說出對運動的喜愛(情感)，屬情意層面。","C":"願意安排運動時間(意願)，屬情意層面。","D":"正確(本題選無法者)。列舉運動(知識)屬認知，非情意。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"111110-N5-64":{"quick":"45歲山地原住民女性可使用的公費篩檢＝成人預防保健①、子宮頸癌②、B、C型肝炎④、乳癌⑤。","detail":{"background":"王女士(45歲、山地原住民女性、無菸酒)可使用的公費篩檢:(1)「成人預防保健服務(原住民「「40歲以上」」即可，且原住民放寬;一般人40~64歲每3年1次)」;(2)「子宮頸癌篩檢(「30歲以上」女性)」;(4)「B、C型肝炎篩檢(「45歲以上」終身1次;她45歲符合)」;(5)「乳癌篩檢(「45~69歲」;她45歲符合)」。而(3)『大腸癌篩檢』(「50~74歲」，45歲未達);(6)『口腔癌篩檢』(須「嚼檳榔/吸菸」，她無)。故正確為①②④⑤(選 A)。","options":{"A":"正確。成人預防保健①、子宮頸癌②、B/C型肝炎④、乳癌⑤。","B":"1256：含⑥(口腔癌，她無菸檳)，錯誤。","C":"1356：含③⑥，皆不符。","D":"2346：含③⑥、缺①⑤，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"111110-N5-67":{"quick":"對更年期婦女的護理指導「最不適當」者＝鼓勵使用賀爾蒙替代療法減輕不適症狀。","detail":{"background":"對更年期婦女的護理指導，「最不適當」者為(C)『「「鼓勵」使用「賀(荷)爾蒙替代療法(HRT)」減輕不適症狀」』——錯誤，「HRT「有「乳癌、血栓、心血管」等「風險」，「不應「常規「鼓勵」」使用」(須由醫師「個別評估利弊」後決定)。其他適當:A 結合社區活動促進婦女彼此分享經驗、B 提供相關保健資訊與協助、D 鼓勵以正向態度面對。故本題選最不適當者為 C。HRT 有風險，不應常規鼓勵使用(與前述同類題一致)。","options":{"A":"結合社區活動促進婦女分享經驗，適當。","B":"提供相關保健資訊與協助，適當。","C":"正確(本題選最不適當者)。HRT 有風險，不應常規鼓勵使用。","D":"鼓勵以正向態度面對，適當。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"111110-N5-77":{"quick":"67歲歐陽先生(TG218、LDL196、血壓158/110、空腹血糖99)「不是」心血管危險因子者＝高血糖。","detail":{"background":"歐陽先生(67歲)健檢:三酸甘油脂218(高)、低密度膽固醇196(高)、血壓158/110(高)、「空腹血糖99(「<100，「正常」)」。「不是」心血管危險因子者為(D)『「「高血糖」』——「空腹血糖99屬「「正常」(<100)」，「「沒有「高血糖」」。其他「是」危險因子:A 高血壓(158/110)、B 大於60歲(67歲，年齡是危險因子)、C 高血脂(TG 218、LDL 196 皆偏高)。故本題選不是者為 D。空腹血糖99正常，無高血糖。","options":{"A":"高血壓(158/110)是心血管危險因子。","B":"大於60歲(67歲)，年齡是危險因子。","C":"高血脂(TG 218、LDL 196)是危險因子。","D":"正確(本題選不是者)。空腹血糖99正常，無高血糖。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"111110-N5-79":{"quick":"慢性腎臟病初期飲食指導「最不適當」者＝麵筋、麵腸等高蛋白質食物可以多食用。","detail":{"background":"慢性腎臟病初期飲食指導，「最不適當」者為(B)『「「麵筋、麵腸」等「高蛋白質食物「可以「多食用」」』——錯誤，「「麵筋、麵腸」是「「「低生物價(植物性)」蛋白質」，「「品質較差、含磷高」，慢性腎臟病應「「限制」」(且 CKD 應「「適量」攝取「「「高「生物價(優質)」」蛋白(如蛋、奶、魚、肉)」)。其他適當:A 建議攝取高品質(高生物價)蛋白質為原則、C 減少攝取磷含量高的食物、D 多食蔬菜且儘量減少湯汁攝取(限鉀/限水)。故本題選最不適當者為 B。麵筋麵腸是低生物價蛋白，CKD 應限制，非多食。","options":{"A":"攝取高品質(高生物價)蛋白質為原則，正確。","B":"正確(本題選最不適當者)。麵筋麵腸是低生物價蛋白，CKD 應限制。","C":"減少攝取磷含量高的食物，正確。","D":"多食蔬菜、減少湯汁(限鉀/限水)，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112030-N5-31":{"quick":"老年人睡眠問題的護理指導「錯誤」者＝前一天失眠，白天需要多臥床休息。","detail":{"background":"老年人睡眠問題的護理指導，「錯誤」者為(A)『「前一天失眠，白天需要「「多臥床休息」」』——錯誤，「「白天「多臥床/補眠」會「打亂日夜節律、減少夜間睡眠驅力」，使「夜間更難入睡」」(應「「白天保持活動、減少日間小睡」」)。其他正確:B 可以考慮以藥物輔助睡眠(必要時)、C 只要自覺白天精神還不錯、偶爾失眠不需過度擔心、D 有計畫地安排白天的活動。故本題選錯誤者為 A。前一天失眠白天不宜多臥床(會更難入睡)。","options":{"A":"正確(本題選錯誤者)。白天多臥床會打亂節律、更難入睡。","B":"必要時可考慮藥物輔助睡眠，正確。","C":"偶爾失眠、白天精神好不需過度擔心，正確。","D":"有計畫地安排白天活動，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112030-N5-54":{"quick":"參與者健康飲食習慣的比率「增加」＝衝擊(impact)評價。","detail":{"background":"社區護理師推動「社區營養推廣中心」後，「發現參與者「健康飲食習慣的「比率「增加」」(「「行為/習慣」的「改變」)」——屬(D)『「衝擊(impact)評價(評估介入對「「行為、生活型態、危險因子」」等「「中期」的「改變」」)』。效率是成本;過程是執行過程;合適性是是否符合需求。「健康飲食習慣比率增加(行為改變)」屬衝擊評價。故 D 正確。行為/習慣的改變屬衝擊評價(與前述同類題一致)。","options":{"A":"效率評價是評估成本與資源。","B":"過程評價是評估執行過程。","C":"合適性評價是評估是否符合需求。","D":"正確。健康飲食習慣比率增加(行為改變)，屬衝擊評價。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"112030-N5-57":{"quick":"職場母乳哺餵的護理指導「最不適宜」者＝哺乳時間視為非工作時間。","detail":{"background":"依性別工作平等法和勞動基準法，職場母乳哺餵的護理指導，「最不適宜」者為(B)『「哺乳時間視為「「非」工作時間」』——錯誤，「「哺(集)乳時間「「視為「「工作時間」」」(雇主「不可「扣薪、扣時」」)。其他適宜:A 僱用100人以上的雇主應提供哺(集)乳室、C 除休息時間外、雇主每日應給哺乳時間2次、D 除休息時間外、雇主每日應給哺乳時間60分鐘(對未滿2歲子女)。故本題選最不適宜者為 B。哺乳時間視為工作時間，非「非」工作時間。","options":{"A":"僱用100人以上應提供哺(集)乳室，適宜。","B":"正確(本題選最不適宜者)。哺乳時間視為工作時間，非「非」工作時間。","C":"每日應給哺乳時間2次，適宜。","D":"每日應給哺乳時間60分鐘(未滿2歲)，適宜。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"112030-N5-58":{"quick":"BMI>27者的護理指導「最不符合」第一段預防策略者＝建議接受口服葡萄糖耐受試驗。","detail":{"background":"某社區60%受檢者 BMI>27(肥胖)，護理指導內容「最不符合「「第一段預防(健康促進/特殊保護)」」」者為(A)『「建議接受「「口服葡萄糖耐受試驗(OGTT)」」』——「OGTT 是「「診斷「檢查(篩檢)」」」，屬「「第二段(早期診斷)」」，「不是「第一段(疾病發生前的健康促進)」」。其他符合第一段(健康促進):B 避免攝取高升糖指數的食物、C 維持理想體重的方法、D 避免久坐與靜態生活。故本題選最不符合者為 A。OGTT 是診斷篩檢(第二段)，非第一段預防。","options":{"A":"正確(本題選最不符合者)。OGTT 是診斷篩檢(第二段)，非第一段預防。","B":"避免高升糖指數食物(健康促進)，屬第一段。","C":"維持理想體重的方法(健康促進)，屬第一段。","D":"避免久坐與靜態生活(健康促進)，屬第一段。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112030-N5-59":{"quick":"中風後「擔心再次中風會坐輪椅或需人照顧」＝健康信念模式的「疾病嚴重性認知」。","detail":{"background":"陳先生(中風後)「「擔心「再次中風」會「坐輪椅或需人照顧(嚴重的後果)」」——依健康信念模式，屬(D)『「疾病「嚴重性(severity)」認知(對「疾病「後果的「嚴重程度」(失能、需人照顧)」」的認知)」』。自我效能認知是對自己能力的信心;利益認知是行動的好處;障礙認知是行動的阻礙。「擔心坐輪椅/需照顧(後果嚴重)」屬嚴重性認知。故 D 正確。「擔心嚴重後果(坐輪椅/需照顧)」屬疾病嚴重性認知。","options":{"A":"自我效能認知是對自己能力的信心。","B":"行為的利益認知是對行動好處的認知。","C":"行為的障礙認知是對行動阻礙的認知。","D":"正確。「擔心坐輪椅/需照顧」(後果嚴重)，屬疾病嚴重性認知。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112030-N5-61":{"quick":"膽固醇報告(總膽固醇190、LDL135、HDL44)的護理指導「錯誤」者＝壞膽固醇數值偏低。","detail":{"background":"陳先生血液報告:總膽固醇190(「<200，正常」)、低密度膽固醇(LDL，壞膽固醇)135(「「≥130，「偏「高」」」)、高密度膽固醇(HDL，好膽固醇)44(「男>40，正常」)。護理指導「錯誤」者為(C)『「「壞膽固醇」數值「「偏「低」」』——錯誤，「LDL 135「「≥130，屬「偏「高」」」，「不是「偏低」」。其他正確:A 總膽固醇數值是正常(190<200)、B 好膽固醇數值是正常(HDL 44>40)、D 建議飲食要清淡、少油炸。故本題選錯誤者為 C。LDL 135偏高，非偏低。","options":{"A":"總膽固醇190<200，正常，正確。","B":"好膽固醇(HDL)44>40，正常，正確。","C":"正確(本題選錯誤者)。LDL 135偏高，非偏低。","D":"建議飲食清淡、少油炸，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112030-N5-67":{"quick":"優生保健護理指導「最適宜」者＝提醒定期產檢並說明補助內容①、34歲以上高齡孕婦建議羊膜穿刺診斷唐氏症③。","detail":{"background":"優生保健護理指導，最適宜的是:(1)「提醒應「定期產檢」，並說明目前「補助的產前檢查內容」」;(3)「「34歲以上「高齡孕婦」」建議接受「羊膜穿刺」檢查以「診斷胎兒是否有唐氏症」(高齡孕婦染色體異常風險高)」。而(2)『孕期「第3個月前」應完成「德國麻疹疫苗接種」』錯誤(「「孕期「不可」接種「活疫苗(德國麻疹/MMR)」」，應「「孕前」」接種);(4)『孕期「第3個月前」接受「甲(乙)型鏈球菌篩檢」』錯誤(乙型鏈球菌(GBS)篩檢在「「妊娠第三期(35~37週)」」)。故正確為①③(選 B)。","options":{"A":"14：含④(GBS 篩檢應在妊娠第三期，非第3月)，錯誤。","B":"正確。定期產檢說明補助①、高齡孕婦羊膜穿刺③。","C":"含②(孕期不可接種德國麻疹活疫苗)，錯誤。","D":"含②④，皆錯。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"112030-N5-71":{"quick":"學生健康體能四大要素中「最重要」者＝心肺耐力。","detail":{"background":"學生健康體能四大要素(心肺耐力、肌力與肌耐力、柔軟度、身體組成)中，「最重要」者為(A)『「「心肺耐力」(反映「心臟、肺臟、循環系統」「長時間持續運動的能力」，是「整體健康與體能」的「核心指標」，與心血管健康最相關)」』。故 A 正確。健康體能四要素中以心肺耐力最重要(最能反映整體健康)。","options":{"A":"正確。心肺耐力是健康體能四要素中最重要的一項。","B":"肌力與肌耐力是要素之一，但非最重要。","C":"柔軟度是要素之一，但非最重要。","D":"身體組成是要素之一，但非最重要。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"112030-N5-78":{"quick":"糖尿病的控制標準「較不適宜」者＝糖化血色素<9%。","detail":{"background":"依糖尿病照護指引，糖尿病的控制標準，「較不適宜」者為(B)『「糖化血色素(HbA1c)「「<9%」」』——錯誤，糖化血色素的控制目標一般是「「<7%」」(<9%「過於寬鬆」)。其他適宜:A 飯前血糖80~130 mg/dL、C 血壓<140/90 mmHg、D 三酸甘油酯<150 mg/dL。故本題選較不適宜者為 B。糖化血色素應控制<7%，非<9%(過寬)。","options":{"A":"飯前血糖80~130 mg/dL，適宜。","B":"正確(本題選較不適宜者)。糖化血色素應<7%，非<9%(過寬)。","C":"血壓<140/90 mmHg，適宜。","D":"三酸甘油酯<150 mg/dL，適宜。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112110-N5-56":{"quick":"均衡飲食的護理指導「正確」者＝每日攝取1.5~2杯乳品類，每杯240 mL。","detail":{"background":"均衡飲食的護理指導，正確的是(B)『「每日攝取「1.5~2杯「乳品類」」，每杯「240 mL」(乳品類提供鈣質)』。其他錯誤:A『堅果類「5份」』錯誤(油脂與堅果種子類每日約「「1份」堅果」);C『蔬菜類「每餐」至少3份』錯誤(蔬菜類「「每日」至少3份」);D『水果類「每餐」至少2份』錯誤(水果類「「每日」2~4份」)。故 B 正確。每日乳品類1.5~2杯(每杯240 mL);蔬菜每日3份、水果每日2份。","options":{"A":"堅果種子類每日約1份，非5份。","B":"正確。每日攝取1.5~2杯乳品類，每杯240 mL。","C":"蔬菜類是「每日」至少3份，非每餐。","D":"水果類是「每日」2~4份，非每餐2份。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112110-N5-58":{"quick":"提升員工正確攝取每日鈉含量的護理指導＝利用鹽分計示範測量①、講述法說明各種食物含鈉量③。","detail":{"background":"護理師為提升職場員工「正確攝取「每日鈉含量」」，最適當的護理指導:(1)「利用「鹽分計「示範測量」食物的鈉含量」(實作、具體);(3)「以「講述法「說明「各種食物的「含鈉量」」」(知識傳遞)。而(2)『角色扮演「廚師與顧客」』、(4)『團體討論「食物「熱量」」』偏離主題(「熱量」非「鈉」;角色扮演廚師顧客與「鈉含量」無直接關係)。故正確為①③(選 A)。","options":{"A":"正確。鹽分計示範測量①、講述法說明含鈉量③。","B":"14：含④(討論熱量，非鈉)，錯誤。","C":"23：含②(角色扮演，偏離)、缺①，錯誤。","D":"24：含②④，皆偏離主題。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"112110-N5-59":{"quick":"失智預防衛教的執行過程順序＝確認需求②→擬訂目標①→規劃內容③→執行計畫④→評價成效⑤。","detail":{"background":"護理師進行失智預防衛生教育計畫，執行過程的順序為(B)『「(2)「確認需求」 →(1)「擬訂目標」 →(3)「規劃內容」 →(4)「執行計畫」 →(5)「評價成效」」(21345)』——遵循「「評估(需求)→計畫(目標、內容)→執行→評價」」的護理過程。故正確順序為21345(選 B)。衛教計畫:先確認需求，再擬目標、規劃內容、執行、評價。","options":{"A":"12534：順序錯誤(評價不應在執行之前)。","B":"正確。確認需求②→擬訂目標①→規劃內容③→執行計畫④→評價成效⑤。","C":"34215：順序錯誤(應先確認需求)。","D":"52134：評價不應在最前。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"112110-N5-65":{"quick":"兒童肥胖的護理指導「最不適當」者＝兒童身體質量指數之建議值皆為18~24 kg/m²。","detail":{"background":"兒童肥胖的護理指導，「最不適當」者為(A)『「兒童身體質量指數(BMI)之建議值「「皆為18~24」」kg/m²」』——錯誤，「「兒童/青少年的「BMI 標準「「隨「年齡、性別」」而「不同」」(須對照「「兒童「生長曲線(百分位)」」」)，「「不是「固定的18~24」」」(18~24是「成人」的標準)。其他適當:B 協助孩童接納自身體型和維持良好身體心像、C 建議家長以身作則建立良好生活習慣、D 避免以食物當成獎賞內容。故本題選最不適當者為 A。兒童 BMI 標準隨年齡性別而異，非固定18~24。","options":{"A":"正確(本題選最不適當者)。兒童 BMI 標準隨年齡性別而異，非固定18~24。","B":"協助接納體型、維持良好身體心像，適當。","C":"建議家長以身作則，適當。","D":"避免以食物當成獎賞，適當。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"112110-N5-67":{"quick":"兒童視力保健衛教「錯誤」者＝12歲前是斜、弱視治療的黃金時期。","detail":{"background":"兒童視力保健衛教，「錯誤」者為(C)『「「12歲」前是斜、弱視治療的黃金時期」』——錯誤，「斜視、弱視治療的「黃金時期」是「「「6歲(學齡前)」以前」」(視覺發育在6歲前可塑性最高，「越早治療效果越好」);「12歲後」療效大減。其他正確:A 近視是臺灣國小學童最嚴重的視力障礙、B 看電視距離保持在電視對角線的6~8倍以上、D 每學期應接受一次視力檢查。故本題選錯誤者為 C。斜弱視治療黃金期是6歲前(學齡前)，非12歲前。","options":{"A":"近視是國小學童最嚴重的視力障礙，正確。","B":"看電視距離保持對角線6~8倍以上，正確。","C":"正確(本題選錯誤者)。斜弱視治療黃金期是6歲前，非12歲前。","D":"每學期接受一次視力檢查，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"112110-N5-78":{"quick":"BMI=26、腰圍88、無運動習慣者的減重運動指導「正確」者＝以有氧運動最佳①、每週至少150分鐘以上中強度活動②。","detail":{"background":"周女士(BMI=26過重、腰圍88、無運動習慣)想運動減重，正確的指導:(1)「以「有氧運動」最佳(如健走、游泳，有效燃脂)」;(2)「每週至少進行「150分鐘以上「中強度」身體活動」。而(3)『「必須「高強度」」才能減重』錯誤(「中等強度、持續」即可，「無運動習慣者「不宜「一開始就高強度」」);(4)『騎一般速度腳踏車比跑步消耗「更多」熱量』錯誤(「跑步」消耗的熱量「「通常「高於」「一般速度騎腳踏車」)。故正確為①②(選 A)。減重:有氧運動最佳、每週≥150分鐘中強度、循序漸進。","options":{"A":"正確。以有氧運動最佳①、每週≥150分鐘中強度活動②。","B":"14：含④(騎車比跑步消耗多，錯誤)。","C":"23：含③(必須高強度，錯誤)。","D":"34：含③④，皆錯。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112110-N5-79":{"quick":"65歲高血壓、高血脂者的護理指導「最不適當」者＝血壓正常後應暫停服藥觀察。","detail":{"background":"65歲陳女士有高血壓及高血脂，護理指導「最不適當」者為(B)『「血壓「正常後」應「「暫停服藥」觀察」』——錯誤，「高血壓「不可「自行「停藥」」」(血壓「正常是「藥物控制」的結果」，「停藥血壓會「再度上升」」;須「持續服藥、規律追蹤」，是否調藥由醫師決定)。其他適當:A 高密度膽固醇(HDL)高於50 mg/dL(好膽固醇高是好的)、C 控制收縮壓/舒張壓低於140/90 mmHg、D 可攝取大麥、燕麥及堅果等高纖食物。故本題選最不適當者為 B。高血壓不可自行停藥(血壓會再上升)。","options":{"A":"高密度膽固醇高於50 mg/dL(好膽固醇高)，適當。","B":"正確(本題選最不適當者)。高血壓不可自行停藥(血壓會再上升)。","C":"控制血壓低於140/90 mmHg，適當。","D":"攝取大麥、燕麥、堅果等高纖食物，適當。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112180-N5-34":{"quick":"最能提升民眾對腦中風「嚴重性」認知的教學內容＝說明腦中風的後遺症。","detail":{"background":"最能提升民眾對腦中風「「疾病嚴重性」」認知的教學內容是(D)『「說明腦中風的「「後遺症(失能、偏癱、失語、長期照顧)」」(讓民眾了解「中風「後果的「嚴重(失能、影響生活)」」」，提高其對「嚴重性」的認知)』。說明治療、預防方法、高危險因子分別對應「治療、行動、易感性」的認知，非「嚴重性」。「後遺症(嚴重後果)」最能提升嚴重性認知。故 D 正確。說明後遺症(嚴重後果)最能提升疾病嚴重性的認知。","options":{"A":"說明治療類型對應治療認知，非嚴重性。","B":"說明預防方法對應行動，非嚴重性。","C":"說明高危險因子對應易感性，非嚴重性。","D":"正確。說明後遺症(嚴重後果)，最能提升疾病嚴重性認知。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"112180-N5-36":{"quick":"菸害防制法的規定「錯誤」者＝菸害防制法規範之菸品不包括雪茄。","detail":{"background":"菸害防制法的規定，「錯誤」者為(A)『「菸害防制法規範之菸品「「不包括」雪茄」』——錯誤，「菸害防制法所稱的「菸品」「「包括「紙菸、雪茄、菸絲、電子煙(類菸品)」」等」(雪茄「「屬「菸品」」，受規範)。其他正確:B 即使是家人也不得供應菸品予未滿(20/法定年齡)者、C 於孕婦或未滿3歲兒童在場之室內場所應禁止吸菸、D 對在禁菸場所吸菸者在場人士有權勸阻。故本題選錯誤者為 A。菸害防制法的菸品包括雪茄。","options":{"A":"正確(本題選錯誤者)。菸害防制法的菸品包括雪茄。","B":"家人也不得供應菸品予未成年者，正確。","C":"孕婦或未滿3歲兒童在場的室內場所應禁菸，正確。","D":"對禁菸場所吸菸者，在場人士有權勸阻，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"112180-N5-37":{"quick":"鼓勵醫療院所提供戒菸門診以提升戒菸比率＝渥太華憲章的「調整健康服務」。","detail":{"background":"為提升成人戒菸比率，「鼓勵「醫療院所「提供「戒菸門診(服務)」」」——最符合渥太華憲章的(D)『「調整(重整)健康服務(reorient health services;將健康服務「「從「治療」「轉向」「預防與健康促進」」，如「提供戒菸門診」等「促進健康」的服務)」』。建立健康公共政策是立法;強化社區行動力是社區參與;發展個人技能是衛教。「醫療院所提供戒菸服務(調整服務取向)」屬調整健康服務。故 D 正確。提供戒菸門診(調整服務取向)屬調整健康服務。","options":{"A":"建立健康公共政策是立法/政策手段。","B":"強化社區行動力是促進社區參與。","C":"發展個人技能是衛教與技能培養。","D":"正確。鼓勵醫療院所提供戒菸門診，屬調整健康服務。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"112180-N5-42":{"quick":"我國母乳哺餵政策「最不適當」者＝雇主提供之哺乳時間，視為休息時間。","detail":{"background":"我國母乳哺餵政策，「最不適當」者為(B)『「雇主提供之哺乳時間，視為「「休息時間」」』——錯誤，「哺(集)乳時間「「視為「「工作時間」」」(雇主「不可扣薪、扣時」)，「「不是「休息時間」」。其他適當:A 依勞基法雇主應每日另給哺乳時間2次、每次30分鐘、C 符合哺乳婦女資格為子女未滿1歲需親自哺乳者、D 依性別平等工作法雇用100人以上需提供哺(集)乳室設施。故本題選最不適當者為 B。哺乳時間視為工作時間，非休息時間。","options":{"A":"雇主每日另給哺乳時間2次、每次30分鐘，正確。","B":"正確(本題選最不適當者)。哺乳時間視為工作時間，非休息時間。","C":"符合資格為子女未滿1歲需親自哺乳者，正確。","D":"雇用100人以上需提供哺(集)乳室，正確。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"112180-N5-43":{"quick":"婦女更年期生理變化「錯誤」者＝低血壓。","detail":{"background":"婦女更年期生理變化，「錯誤」者為(C)『「「低血壓」』——錯誤，「更年期(雌激素下降)後，「「高血壓、心血管疾病」的風險「「增加」」(因「雌激素的保護作用消失」)，「「不是「低血壓」」。其他是更年期的生理變化:A 熱潮紅、B 盜汗、D 骨質疏鬆(雌激素下降致骨質流失)。故本題選錯誤者為 C。更年期後高血壓風險增加，非低血壓。","options":{"A":"熱潮紅是更年期的生理變化。","B":"盜汗是更年期的生理變化。","C":"正確(本題選錯誤者)。更年期後高血壓風險增加，非低血壓。","D":"骨質疏鬆(雌激素下降)是更年期的變化。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"112180-N5-44":{"quick":"維持兒童與青少年健康體位的護理指導「最適當」者＝每天應達到60分鐘以上中度身體活動。","detail":{"background":"維持兒童與青少年健康體位的護理指導，最適當的是(D)『「每天應達到「「60分鐘」以上「中度身體活動」」(WHO 建議兒童及青少年「每日至少60分鐘中等到費力的身體活動」)』。其他錯誤:A『觀看螢幕時間每日應少於「4小時」』錯誤(應「「<2小時」」);B『飲食應採「精緻穀類」為原則』錯誤(應採「「全穀(未精製)」」為原則);C『「肥胖兒童」較「肥胖青少年」成為肥胖成人的機率「「高」」』錯誤(「「年齡越大(青少年)」肥胖，成為「肥胖成人」的機率「「越高」」)。故 D 正確。兒童青少年每天應達60分鐘以上中度身體活動。","options":{"A":"觀看螢幕時間應<2小時，非<4小時。","B":"飲食應採全穀(未精製)為原則，非精緻穀類。","C":"青少年肥胖比兒童肥胖更易成為肥胖成人。","D":"正確。每天應達60分鐘以上中度身體活動。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"112180-N5-50":{"quick":"「不是」慢性腎臟病危險因子者＝高密度脂蛋白膽固醇高。","detail":{"background":"慢性腎臟病的危險因子，「不是」者為(C)『「高密度脂蛋白膽固醇(HDL)「「高」」』——「HDL(「好」膽固醇)「「越高越好」」，「「不是」危險因子(反而是「保護」因子)。其他是危險因子:A 血糖高(糖尿病腎病變)、B 尿酸高(尿酸腎病變)、D 血壓高(高血壓腎硬化)。故本題選不是者為 C。HDL 高是保護因子，非慢性腎臟病的危險因子。","options":{"A":"血糖高(糖尿病)是慢性腎臟病的危險因子。","B":"尿酸高(痛風)是危險因子。","C":"正確(本題選不是者)。HDL 高是保護因子，非危險因子。","D":"血壓高(高血壓)是危險因子。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"113030-N5-34":{"quick":"健康促進與疾病預防概念「正確」者＝健康促進對象為全體民眾①、疾病預防對象為高危險群②、健康促進使個人潛能發揮至最佳⑤。","detail":{"background":"健康促進與疾病預防概念，正確的是:(1)「「健康促進」對象為「全體民眾」(積極增進「所有人」的健康)」;(2)「「疾病預防」的對象為「疾病高危險群」(針對「特定危險群」預防疾病)」;(5)「「健康促進」能使「個人潛能「發揮至最佳狀態」」(積極面)」。而(3)『「健康促進」是要「避免某行為「發生」』錯誤(「避免行為發生」較偏向「「疾病預防/特殊保護」」);(4)『「疾病預防」是「積極「拓展健康潛能」』錯誤(「拓展健康潛能」是「「健康「促進」」」的特性)。故正確為①②⑤(選 C)。健康促進=積極(全民、發揮潛能);疾病預防=針對危險群、避免疾病。","options":{"A":"123：含③(健康促進避免行為發生，錯誤)。","B":"124：含③④，皆錯。","C":"正確。健康促進對象全體①、疾病預防對象高危群②、健康促進使潛能最佳⑤。","D":"235：含③、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"113030-N5-35":{"quick":"高血壓護理指導後的「衝擊評價」指標＝控制高血壓的態度③、高血壓的就醫行為④。","detail":{"background":"高血壓護理指導後的「「衝擊(impact)評價」」指標(評估「「中期」的「態度、行為、危險因子」改變」)是:(3)「控制高血壓的「態度」(態度改變)」;(4)「高血壓的「就醫行為」(行為改變)」。而(1)時間的安排、(2)計畫的經費屬「「過程(投入)」」評價;(5)高血壓的「罹病率」屬「「結果(outcome)」」評價(最終的健康狀態)。故正確為③④(選 C)。衝擊評價看中期的態度/行為改變;結果評價才看罹病率。","options":{"A":"12：①②屬過程(投入)評價，非衝擊。","B":"13：含①(時間安排，過程)，錯誤。","C":"正確。控制高血壓的態度③、就醫行為④(中期改變)，屬衝擊評價。","D":"45：含⑤(罹病率，屬結果評價)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"113030-N5-42":{"quick":"兒童口腔保健的護理指導「最不適當」者＝乳牙長滿6顆後才適合做餐後刷牙。","detail":{"background":"兒童口腔保健的護理指導，「最不適當」者為(D)『「乳牙「長滿6顆「後」」才適合做餐後刷牙」』——錯誤，「「「出生後/長出「第一顆乳牙」」就應「開始清潔牙齒」」，「「不需「等長滿6顆」」(越早建立口腔清潔習慣越好)。其他適當:A 氟化物是安全、有效的齲齒防治方式、B 出生後就應該做口腔清潔工作、C 避免含奶瓶睡覺(防奶瓶性齲齒)。故本題選最不適當者為 D。長第一顆乳牙就應清潔，不需等長滿6顆。","options":{"A":"氟化物是安全有效的齲齒防治方式，正確。","B":"出生後就應做口腔清潔工作，正確。","C":"避免含奶瓶睡覺(防奶瓶性齲齒)，正確。","D":"正確(本題選最不適當者)。長第一顆乳牙就應清潔，不需等長滿6顆。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"113030-N5-44":{"quick":"評值「減少體重過重學生」計畫成果的指標＝學生體重過重的盛行率。","detail":{"background":"某校推動營養午餐計畫、期望「減少全校「體重過重學生人數」」，最適合做為評值「「成果(結果)」」的指標是(D)『「學生「體重過重的「盛行率」」(直接反映「「目標(減少過重學生)」是否達成」的「健康結果」指標)』。其他是別的評價:A 滿意度(過程/反應)、B 成本(效率/投入)、C 面臨的困難(過程)。「體重過重盛行率(目標健康結果)」是成果指標。故 D 正確。體重過重盛行率直接反映計畫目標的達成(成果指標)。","options":{"A":"滿意度是過程/反應評價。","B":"成本是效率/投入評價。","C":"面臨的困難是過程評價。","D":"正確。學生體重過重的盛行率，是評值計畫成果的指標。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"113030-N5-50":{"quick":"60歲、戒菸20年的邱先生可接受的免費篩檢＝口腔癌篩檢①、大腸癌篩檢②。","detail":{"background":"邱先生(60歲、「「曾吸菸(已戒20年)」」)可接受的全民健保免費篩檢:(1)「口腔癌篩檢(對象為「30歲以上「有吸菸(含「已戒菸」)或嚼檳榔」」者;邱先生曾吸菸，符合)」;(2)「大腸癌篩檢(「50~74歲」每2年1次;邱先生60歲，符合)」。而(3)『攝護腺癌篩檢』「非「公費(健保免費)」篩檢項目;(4)『低劑量電腦斷層(LDCT)肺癌篩檢』的對象是「「重度吸菸(且「現在吸菸或「戒菸未滿15年」」)」」，邱先生「已戒菸「20年」」，「不符」。故正確為①②(選 A)。","options":{"A":"正確。口腔癌篩檢①(曾吸菸)、大腸癌篩檢②(50~74歲)。","B":"13：含③(攝護腺癌，非公費篩檢)，錯誤。","C":"24：含④(LDCT，戒菸20年不符)，錯誤。","D":"34：含③④，皆不符。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"113100-N5-36":{"quick":"老人肌少症護理指導的「行為目標」「最適當」者＝老人每日能執行雙側下肢肌力運動至少30次。","detail":{"background":"擬定老人肌少症護理指導的「「行為」目標」，最適當的是(B)『「老人「每日能「執行」雙側下肢肌力運動「至少30次」(「「具體、可觀察、可測量」的「行為(動作)」」，符合行為目標的要件)』。其他屬別的領域:A『家屬能「認同」』、C『家屬能「鼓勵」』是「家屬的態度/支持」;D『老人能「說出」益處』屬「「認知(知識)」」。故 B 正確。「能執行(具體可測量的動作)」是行為目標;說出/認同屬認知/情意。","options":{"A":"家屬能「認同」屬態度(情意)，且對象是家屬。","B":"正確。老人能執行下肢肌力運動30次(具體可測量的行為)。","C":"家屬能「鼓勵」屬家屬的支持。","D":"老人能「說出」益處屬認知目標。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"113100-N5-43":{"quick":"兒童事故傷害的敘述「最不適當」者＝嬰兒的安全座椅應採前向式安裝。","detail":{"background":"兒童事故傷害的敘述，「最不適當」者為(A)『「嬰兒的安全座椅擺放位置應採「「前向式」」安裝」』——錯誤，「「嬰幼兒(2歲以下)」的安全座椅應採「「「後向式(面向後)」」安裝」(後向式在「撞擊時對「頭頸部」的保護較佳」)。其他正確:B 兒童燒燙傷的主要發生地點為家庭、C 1歲以下嬰兒以溺水、窒息、異物吸入之事故傷害最多、D 事故傷害是兒童及青少年首要死因。故本題選最不適當者為 A。嬰幼兒安全座椅應採後向式，非前向式。","options":{"A":"正確(本題選最不適當者)。嬰幼兒安全座椅應採後向式，非前向式。","B":"兒童燒燙傷主要發生於家庭，正確。","C":"1歲以下以溺水、窒息、異物吸入最多，正確。","D":"事故傷害是兒童及青少年首要死因，正確。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"113100-N5-49":{"quick":"糖尿病足部照護的衛教「錯誤」者＝足趾間最好塗點乳液避免皮膚乾燥裂開。","detail":{"background":"糖尿病足部照護的衛教，「錯誤」者為(A)『「「足趾「間」」最好「塗點乳液」避免皮膚乾燥裂開」』——錯誤，「乳液「「不可塗在「趾「縫(間)」」」(趾縫「塗乳液會「潮濕」，「易「滋生黴菌、感染」」);乳液應「塗在「足背、足底」的乾燥處」、「「避開趾縫」」。其他正確:B 足部若無傷口、流汗時可於拭乾後擦爽身粉、C 趾甲不可剪得太短(平剪、防嵌甲)、D 外出應穿著包鞋(保護)。故本題選錯誤者為 A。乳液不可塗趾縫(易潮濕感染)。","options":{"A":"正確(本題選錯誤者)。乳液不可塗趾縫(易潮濕滋生黴菌)。","B":"無傷口時流汗拭乾後可擦爽身粉，正確。","C":"趾甲不可剪太短(防嵌甲)，正確。","D":"外出應穿包鞋(保護)，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"113180-N5-31":{"quick":"代謝症候群防治計畫「最符合目標(objective)訂定原則」者＝社區民眾每週運動3次以上者達40%。","detail":{"background":"代謝症候群防治計畫中，「最符合「目標(objective)」訂定原則(具體、可測量、可達成)」者為(C)『「社區民眾「每週運動3次以上者「達40%」」(「「明確、可量化、可測量」的「具體目標」，符合 SMART 原則)』。其他較抽象:A『提升「健康識能」』、B『能「瞭解」方法』、D『能「認同」重要性』——「提升、瞭解、認同」都「抽象、不易量化」，較像「總目標/方向」，非「具體、可測量」的目標。故 C 正確。具體、可量化(達40%)的目標最符合 objective 訂定原則。","options":{"A":"「提升健康識能」抽象，不易量化。","B":"「瞭解方法」抽象，不易測量。","C":"正確。每週運動3次以上者達40%(具體可量化)，符合目標訂定原則。","D":"「認同重要性」抽象，不易量化。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"113180-N5-33":{"quick":"排定社區衛生問題優先順序時，應「優先處理」者＝有登革熱陽性個案。","detail":{"background":"排定社區衛生問題優先順序時，應「優先處理」者為(D)『「有「「登革熱陽性個案」」(「「傳染病(登革熱)」，具「急迫性、傳播風險」，須「立即「疫調、防治、噴藥、防止擴散」」)』。其他(A 四癌篩檢率低、B 戒菸門診資源不足、C 未設失智共照中心)是「「慢性的、可規劃」的問題」，不具「傳染病的急迫性」。故 D 正確。傳染病(登革熱陽性個案)具急迫性，應優先處理。","options":{"A":"四癌篩檢率低是慢性問題，可規劃，非急迫。","B":"戒菸門診資源不足是可規劃的問題。","C":"未設失智共照中心是可規劃的問題。","D":"正確。登革熱陽性個案(傳染病)具急迫性，應優先處理。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學"]}},"113180-N5-34":{"quick":"講述法的特性「最不適當」者＝儘量不要穿插問題提問。","detail":{"background":"護理指導採用講述法的特性，「最不適當」者為(D)『「儘量「「不要」穿插「問題提問」」』——錯誤，講述時應「「適時「穿插「提問、互動」」」(以「維持學習者的注意力、確認理解、增進參與」);「不穿插提問」會使講述「單調、互動差」。其他正確:A 講授可在有限時間傳授大量知識、B 講述時間需考量學習者的年齡、C 講述法較難考量個人需求。故本題選最不適當者為 D。講述應適時穿插提問(增進互動)，非不提問。","options":{"A":"講授可在有限時間傳授大量知識，正確。","B":"講述時間需考量學習者的年齡，正確。","C":"講述法較難考量個人需求，正確。","D":"正確(本題選最不適當者)。講述應適時穿插提問，非不提問。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"113180-N5-35":{"quick":"設計符合健康識能的體重控制指導課程＝渥太華憲章的「發展個人技能」。","detail":{"background":"依渥太華健康促進憲章，「「設計「符合民眾健康識能」的「體重控制「指導課程(教育)」」」——符合(A)『「發展個人技能(develop personal skills;透過「教育、課程」「增進個人「健康的知識與技能」」)」』。重整健康服務體系是服務面;建立健康公共政策是立法;強化社區行動力是社區參與。「指導課程(教育、增進技能)」屬發展個人技能。故 A 正確。設計教育課程(增進技能)屬發展個人技能。","options":{"A":"正確。設計體重控制指導課程(教育)，屬發展個人技能。","B":"重整健康服務體系是服務面的調整。","C":"建立健康的公共政策是立法/政策手段。","D":"強化社區行動力是促進社區參與。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"113180-N5-37":{"quick":"熱傷害的高危險族群＝體重過重者①、2歲的幼童②、65歲獨居長者③、運動員④(皆是)。","detail":{"background":"熱傷害的高危險族群是(D)『「①②③④「都是」』:(1)「體重過重者(散熱較差)」;(2)「2歲的幼童(體溫調節未成熟)」;(3)「65歲獨居長者(體溫調節差、易脫水、獨居無人照應)」;(4)「運動員(「「高溫下劇烈運動」」，產熱多、易脫水)」。故①②③④皆是(選 D)。熱傷害高危族群:嬰幼兒、老人、肥胖者、慢性病人、戶外工作者、運動員等。","options":{"A":"僅23：缺①④，不完整。","B":"僅234：缺①，不完整。","C":"僅123：缺④(運動員)，不完整。","D":"正確。體重過重①、幼童②、獨居長者③、運動員④皆是高危族群。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"113180-N5-39":{"quick":"骨質疏鬆的警訊＝身高變矮①、下背痛③、體重減輕④。","detail":{"background":"慕容爺爺的身體變化中，最可能是「骨質疏鬆警訊」者:(1)「身高變矮(脊椎椎體「壓迫性骨折/變形」，使身高變矮)」;(3)「下背痛(脊椎壓迫、骨折引起)」;(4)「體重減輕(常伴隨「營養不良、肌少、整體退化」，與骨質流失相關)」。而(2)『「睡眠習慣改變」』與「骨質疏鬆」「無直接關係」。故正確為①③④(選 C)。骨鬆警訊:身高變矮、駝背、下背痛、易骨折等。","options":{"A":"僅13：缺④，不完整。","B":"僅14：缺③，不完整。","C":"正確。身高變矮①、下背痛③、體重減輕④。","D":"1234：含②(睡眠習慣改變，與骨鬆無直接關係)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"113180-N5-41":{"quick":"增進原住民健康識能「最不適當」者＝由醫療人員直接提供健康決策以解決健康問題。","detail":{"background":"為增進原住民的健康識能，「最不適當」者為(C)『「由醫療人員「「直接提供」健康「決策」」以解決健康問題」』——錯誤，「「健康識能」的核心是「「增進「民眾「自主」「獲取、理解、應用」健康資訊」」、並「「自己「做健康決策」」」，而「「不是「由醫療人員「替他們「決策」」」(那會「剝奪其自主、無法增進健康識能」)。其他適當:A 以其所能理解的語言傳遞健康知識、B 提供適當的技巧與知識以增進使用健康訊息的能力、D 增進掌控自己健康及健康決定因子的能力。故本題選最不適當者為 C。健康識能是增進民眾自主決策，非醫療人員代為決策。","options":{"A":"以其理解的語言傳遞健康知識，適當。","B":"提供技巧與知識以增進使用健康訊息的能力，適當。","C":"正確(本題選最不適當者)。應增進民眾自主決策，非醫療人員代為決策。","D":"增進掌控自己健康的能力，適當。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"113180-N5-42":{"quick":"幼兒及兒童齲齒衛教「最不適當」者＝出生後就應執行口腔清潔，並建議1歲以後開始刷牙。","detail":{"background":"幼兒及兒童齲齒衛教，「最不適當」者為(B)『「出生後就應執行口腔清潔工作，並建議「「1歲以後」」開始刷牙」』——錯誤，應「「在「第一顆乳牙「萌出(約6個月)」」時就「開始「刷牙(以小牙刷/紗布清潔)」」」，「「不需「等「1歲以後」」」。其他適當:A 餵奶時應避免嬰幼兒一邊吃一邊睡(防奶瓶性齲齒)、C 第一次牙齒口腔檢查可在第一顆牙長出後6個月內進行、D 窩溝封填可降低食物殘留、減少蛀牙。故本題選最不適當者為 B。長第一顆乳牙(約6個月)就應刷牙，非1歲以後。","options":{"A":"避免嬰幼兒邊吃邊睡(防奶瓶性齲齒)，適當。","B":"正確(本題選最不適當者)。長第一顆乳牙(約6個月)就應刷牙，非1歲以後。","C":"第一次口腔檢查在第一顆牙長出後6個月內，適當。","D":"窩溝封填降低食物殘留、減少蛀牙，適當。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"113180-N5-43":{"quick":"婦女更年期健康議題「最不適當」者＝有氧運動最能增進骨密度。","detail":{"background":"婦女更年期健康議題，「最不適當」者為(B)『「「有氧」運動最能「增進骨密度」』——錯誤，「「「負重(承重)運動(如健走、慢跑、重訓)」」「最能「增進骨密度」」(對骨骼有機械刺激);「「(一般)「有氧」運動(如游泳)」」的承重刺激較少，「增進骨密度的效果有限」。其他適當:A 最易發生骨質疏鬆的部位為脊椎骨、C 鼓勵定期接受骨密度檢查、D 荷爾蒙替代療法可能會增加乳癌和中風等風險。故本題選最不適當者為 B。負重運動最能增進骨密度，非有氧運動。","options":{"A":"最易發生骨鬆的部位為脊椎骨，正確。","B":"正確(本題選最不適當者)。負重運動最能增進骨密度，非有氧運動。","C":"鼓勵定期接受骨密度檢查，正確。","D":"荷爾蒙替代療法可能增加乳癌、中風風險，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"113180-N5-44":{"quick":"青少年體適能的敘述「最適當」者＝包括身體組成、心肺適能、肌力與肌耐力、柔軟度四要素。","detail":{"background":"青少年體適能的敘述，最適當的是(A)『「包括「身體組成、心肺適能、肌力與肌耐力、柔軟度」四要素(健康體適能的四大要素)」』。其他錯誤:B『檢測項目含「體脂肪、腰圍」…四要項』錯誤(學生體適能檢測項目是「BMI、坐姿體前彎、仰臥起坐、心肺耐力(跑走)、立定跳遠」等);C『高中職女生跑「800公尺」、男生跑「1200公尺」』數值不符(心肺耐力跑走測驗的距離,男1600/女800公尺等,依規定);D『立定跳遠主要評估「心肺功能」』錯誤(立定跳遠評估「「瞬發力(爆發力)」」)。故 A 正確。健康體適能四要素:身體組成、心肺適能、肌力與肌耐力、柔軟度。","options":{"A":"正確。包括身體組成、心肺適能、肌力與肌耐力、柔軟度四要素。","B":"檢測項目的四要項敘述不符。","C":"心肺耐力跑走的距離敘述不符規定。","D":"立定跳遠評估瞬發力(爆發力)，非心肺功能。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"113180-N5-45":{"quick":"有代謝症候群者＝李先生(血壓135/86、腰圍92、HDL 35，符合3項)。","detail":{"background":"代謝症候群須符合5項中3項以上(腰圍男≥90女≥80、血壓≥130/85、空腹血糖≥100、TG≥150、HDL男<40女<50)。(D)『李先生:血壓135/86(≥130/85✓)、腰圍92(男≥90✓)、HDL 35(男<40✓)——「符合3項」，有代謝症候群』。其他不足3項:A 張先生(血糖95正常、腰圍85男<90、HDL34男<40✓)僅1項;B 陳小姐(總膽固醇非指標、腰圍75女<80、血壓134/88≥130/85✓)僅1項;C 黃小姐(TG140<150、腰圍85女≥80✓、HDL78正常)僅1項。故 D 正確。","options":{"A":"張先生僅 HDL 34(1項)，腰圍/血糖未達，不足3項。","B":"陳小姐僅血壓1項(總膽固醇非指標)，不足3項。","C":"黃小姐僅腰圍1項(TG140、HDL78正常)，不足3項。","D":"正確。李先生血壓、腰圍、HDL 共3項，有代謝症候群。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"114030-N5-26":{"quick":"增進社區民眾健康識能的敘述「最不適當」者＝社經弱勢等群體暫緩列入提升健康識能的對象。","detail":{"background":"增進社區民眾健康識能的敘述，「最不適當」者為(D)『「「社經弱勢」等群體「「暫緩」列入」提升健康識能的對象」』——錯誤，「「社經弱勢」群體「「健康識能「往往「較低」」、健康不平等較嚴重」，「「更應「「優先」」列入」提升健康識能的對象」(而非「暫緩」)。其他適當:A 推動持續性與整合性的照護及增進健康識能、B 提供具實證基礎、非商業目的且攸關社區健康議題的健康資訊、C 對需要複雜照護的病人應有清楚且容易執行的出院照護計畫。故本題選最不適當者為 D。弱勢群體應優先提升健康識能，非暫緩。","options":{"A":"推動持續整合的照護及增進健康識能，適當。","B":"提供實證、非商業目的的健康資訊，適當。","C":"複雜照護病人應有清楚易執行的出院計畫，適當。","D":"正確(本題選最不適當者)。弱勢群體應優先，非暫緩。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"114030-N5-36":{"quick":"王先生(嘴破1月、怕得口腔癌、妻鼓勵)採取預防行為的因素＝罹患性認知①、嚴重性認知②、行動線索③。","detail":{"background":"王先生參加口腔癌篩檢，依健康信念模式，影響其採取預防行為的因素:(1)「「罹患性」認知(「「嘴破未癒「一個月」」，覺得「自己「可能罹患」口腔癌」)」;(2)「「嚴重性」認知(看「同事因口腔癌「飽受身心之苦」」，覺得「後果嚴重」)」;(3)「「行動線索(「妻子的「鼓勵」」促使他行動)」。而(4)利益性認知、(5)自我效能「未在敘述中明顯提及」。故正確為①②③(選 A)。","options":{"A":"正確。罹患性①(嘴破1月)、嚴重性②(同事受苦)、行動線索③(妻鼓勵)。","B":"125：含⑤(自我效能，未提及)，錯誤。","C":"234：缺①，錯誤。","D":"345：含④⑤(未明顯提及)、缺①②，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"114030-N5-42":{"quick":"姐姐罹乳癌的42歲王太太的護理指導「最適當」者＝建議多運動、少進食高脂肪食物、放鬆減壓③。","detail":{"background":"42歲王太太(姐姐罹乳癌)的護理指導，最適當的是(A)『「僅(3)「建議多運動、少進食高脂肪食物、心情放鬆和減低壓力(可改變的「健康生活型態」，有助預防)』。其他錯誤:(1)『乳癌危險因子包括「「初經「較晚」、停經「較早」」」』錯誤(乳癌危險因子是「「初經「早」、停經「晚」」」(雌激素暴露久);敘述顛倒);(2)『「40歲以上至未滿45歲」具家族史「每年一次」免費乳房X光』錯誤(40~44歲且「二親等內血親患乳癌」者為「「每「2」年1次」」)。故 A 正確。僅③(健康生活型態)正確;①危險因子顛倒、②頻率錯誤。","options":{"A":"正確。僅③(多運動、少高脂、放鬆減壓)正確。","B":"123：含①(危險因子顛倒)②(頻率錯)，錯誤。","C":"僅13：含①(危險因子顛倒)，錯誤。","D":"僅23：含②(每年錯，應每2年)、缺③，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"114030-N5-43":{"quick":"骨質疏鬆的危險因子＝缺乏運動③、飲酒過量④、甲狀腺機能亢進⑤。","detail":{"background":"骨質疏鬆的危險因子:(3)「缺乏運動(缺乏負重刺激)」;(4)「飲酒過量(影響骨代謝)」;(5)「甲狀腺機能亢進(加速骨質流失)」。而(1)『體重「過重」』錯誤(體重「過輕」才是危險因子;過重對骨質有保護);(2)『飲食含鹽量「過少」』錯誤(「「高鹽(鈉)」」才會「增加鈣流失」;「鹽過少」非危險因子)。故正確為③④⑤(選 D)。骨鬆危險因子:缺乏運動、飲酒過量、甲亢、高齡、停經、體重過輕、家族史等。","options":{"A":"145：含①(體重過重)②(含鹽過少)，皆非危險因子。","B":"234：含②、缺⑤，錯誤。","C":"235：含②(含鹽過少)，錯誤。","D":"正確。缺乏運動③、飲酒過量④、甲狀腺機能亢進⑤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"114030-N5-45":{"quick":"「下班太累，無法參加運動」＝Pender 模式的「自覺行動障礙」。","detail":{"background":"健康促進醫院推動院內運動計畫，護理人員反應「「下班太累，無法參加」(感覺到「執行運動的「阻礙(累、沒時間/精力)」」)」——依 Pender 健康促進模式，屬(C)『「自覺「行動障礙(perceived barriers to action;個人對「執行健康行為的「阻礙、困難、代價」」的認知)」』。自覺自我效能是對自己能力的信心;個人因素是個人背景;情境的影響是環境情境。「下班太累、無法參加(感覺到障礙)」屬自覺行動障礙。故 C 正確。「太累、無法參加」(對行動阻礙的認知)屬自覺行動障礙。","options":{"A":"自覺自我效能是對自己能力的信心。","B":"個人因素是個人的生物/心理/社會背景。","C":"正確。「下班太累、無法參加」(對行動阻礙的認知)，屬自覺行動障礙。","D":"情境的影響是環境/情境的因素。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"114030-N5-49":{"quick":"高血脂(總膽固醇245、TG230)、肥胖、便秘者的衛教重點＝衛教選擇高纖維飲食並減少高油脂的食物攝取。","detail":{"background":"林先生(BMI≈29.4肥胖、愛吃滷五花肉、便秘、總膽固醇245(高)、三酸甘油酯230(高))，衛教重點最適當的是(C)『「衛教選擇「「高纖維飲食」並「減少「高油脂」的食物攝取」(高纖可「降膽固醇、改善便秘」;減少高油脂可「降血脂」，兼顧其「高血脂＋便秘」)』。其他不當:A『「優先「服藥」」』錯誤(初次發現應「「先以飲食/生活型態介入」」，無效再考慮藥物);B『以「快炒或油煎」取代滷五花肉』錯誤(快炒、油煎「仍是「高油」」;應改「水煮、清蒸」);D『「運動30分鐘」』雖好，但「非「血脂/飲食」的「最」重點」(且 BMI 29.4是「肥胖」非「過重」)。故 C 正確。高血脂+便秘者衛教高纖、減少高油脂飲食。","options":{"A":"初次發現應先以飲食介入，非優先服藥。","B":"快炒、油煎仍是高油，應改水煮、清蒸。","C":"正確。衛教高纖維飲食、減少高油脂食物(兼顧高血脂與便秘)。","D":"運動雖好，但非血脂/飲食的最重點(且 BMI 29.4是肥胖)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"114030-N5-50":{"quick":"氣喘的護理指導「最不適當」者＝進行高強度運動，以增加肺活量。","detail":{"background":"氣喘的護理指導，「最不適當」者為(C)『「進行「「高強度」運動」，以增加肺活量」』——錯誤，「「高強度/劇烈運動」「易「誘發「運動性氣喘」發作」」;氣喘病人應「「選擇「和緩、適度」的運動(如游泳)」、運動前「暖身、必要時先用藥」」，「「避免「高強度」運動」。其他適當:A 以百葉窗替代布窗簾(減少塵蟎)、B 避免情緒起伏太大(情緒可誘發)、D 遵從醫囑按時用藥、不可自行停藥。故本題選最不適當者為 C。氣喘不宜高強度運動(易誘發發作)。","options":{"A":"以百葉窗替代布窗簾(減少塵蟎)，適當。","B":"避免情緒起伏太大(可誘發發作)，適當。","C":"正確(本題選最不適當者)。氣喘不宜高強度運動(易誘發發作)。","D":"按時用藥、不可自行停藥，適當。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"114100-N5-23":{"quick":"對遭霸凌學生的危機處置「不適宜」的技巧＝忽略。","detail":{"background":"美美(8年級、遭同學「集體圍剿、言語霸凌」)的危機處置中，「不適宜」的技巧為(D)『「「忽略」』——錯誤，遭霸凌的學生「需要「「積極的「介入、支持、處理」」」，「「「忽略」」會「使其「更受傷、問題惡化」」。其他適宜的危機處置技巧:A 宣洩(讓其表達情緒)、B 澄清(釐清事件與感受)、C 再保證(給予支持與安全感)。故本題選不適宜者為 D。對霸凌應積極處理，忽略不適宜。","options":{"A":"宣洩(讓其表達情緒)，是適宜的技巧。","B":"澄清(釐清事件與感受)，是適宜的技巧。","C":"再保證(給予支持與安全感)，是適宜的技巧。","D":"正確(本題選不適宜者)。對霸凌應積極處理，忽略不適宜。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"114100-N5-35":{"quick":"健康體適能的要素「不正確」者＝骨質密度。","detail":{"background":"健康體適能(physical fitness)的要素，「不正確」者為(D)『「「骨質密度」』——「骨質密度「不是「「健康體適能」」的「四大要素」」。健康體適能四要素:A 身體組成、B 柔軟度、C 肌力與肌耐力，以及「心肺耐力」。故本題選不正確者為 D。健康體適能四要素:身體組成、柔軟度、肌力與肌耐力、心肺耐力(不含骨質密度)。","options":{"A":"身體組成是健康體適能的要素。","B":"柔軟度是健康體適能的要素。","C":"肌力與肌耐力是健康體適能的要素。","D":"正確(本題選不正確者)。骨質密度非健康體適能的要素。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"114100-N5-40":{"quick":"因「不確定疫苗是否能有效預防」而未施打＝健康信念模式的「自覺利益(perceived benefits)」。","detail":{"background":"民眾「「不確定」帶狀疱疹疫苗「是否「能有效「預防」染病」」，故未施打——此敘述屬健康信念模式的(C)『「自覺「利益(perceived benefits;個人對「採取健康行為(打疫苗)「能帶來的「好處/效益」」的認知;「「懷疑「效益」」會「降低「行動意願」」)」』。自覺嚴重性是疾病後果嚴重;自覺罹患性是得病機率;自覺障礙是行動的阻礙。「懷疑疫苗的「預防效益」」屬自覺利益(的認知)。故 C 正確。「懷疑疫苗是否有效(效益)」屬自覺利益。","options":{"A":"自覺嚴重性是對疾病後果嚴重程度的認知。","B":"自覺罹患性是對得病機率的認知。","C":"正確。「懷疑疫苗是否能有效預防」(效益)，屬自覺利益。","D":"自覺障礙是對行動阻礙(如費用、副作用)的認知。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"114100-N5-45":{"quick":"學校應加強預防及矯治的常見體格缺點或疾病＝視力不良①、脊椎彎曲③、肥胖④、運動傷害⑥。","detail":{"background":"依學校衛生法，學校對學童「常見的「體格缺點」」應加強預防及矯治者:(1)「視力不良」、(3)「脊椎彎曲」、(4)「肥胖」、(6)「運動傷害」(以及齲齒等「常見的體格缺點」)。而(2)糖尿病、(5)氣喘屬「「特定「疾病」」」(屬「重大傷病/慢性病的「照顧」」，非「常見「體格缺點」的「矯治」」範疇)。故正確為①③④⑥(選 B)。學校常見體格缺點:視力不良、脊椎彎曲、肥胖、齲齒、運動傷害等。","options":{"A":"1245：含②⑤(糖尿病、氣喘，屬疾病)，錯誤。","B":"正確。視力不良①、脊椎彎曲③、肥胖④、運動傷害⑥。","C":"2345：含②⑤、缺①⑥，錯誤。","D":"2346：含②⑤、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"114100-N5-49":{"quick":"中老年族群健康生活型態的護理指導「最適當」者＝每週至少3次、每次20~30分鐘的全身性運動。","detail":{"background":"中老年族群健康生活型態的護理指導，最適當的是(D)『「每週至少3次、每次「20~30分鐘」的「全身性運動」(規律運動，維持心肺、肌力與健康)』。其他錯誤:A『多攝取高纖維「「低「鈣」」」的均衡飲食』錯誤(中老年應「「補充「鈣」(高鈣)」」以防骨鬆，非「低鈣」);B『維持 BMI 於「16.5~24」』錯誤(正常 BMI 是「「18.5~24」」;16.5偏低);C『每日照射陽光10~15分鐘以促進產生「維生素C」』錯誤(曬太陽促進的是「「維生素D」」，非維生素C)。故 D 正確。中老年應規律運動(每週≥3次、每次20~30分鐘)。","options":{"A":"中老年應補充鈣(高鈣)以防骨鬆，非低鈣。","B":"正常 BMI 是18.5~24，16.5偏低。","C":"曬太陽促進維生素D，非維生素C。","D":"正確。每週至少3次、每次20~30分鐘的全身性運動。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"114170-N5-35":{"quick":"邀請知名運動員擔任拒菸大使、呼籲「我拒菸，我驕傲」＝健康信念模式的「行動線索」。","detail":{"background":"國民健康署「邀請「知名運動員」擔任「拒菸大使」，呼籲「我拒菸，我驕傲」」——是運用健康信念模式的(C)『「「行動線索(cues to action;「名人代言、口號、宣傳」等「外在的「提醒、觸發」」，促使民眾「採取行動(拒菸)」)」』。疾病罹患性是得病機率;自覺行動利益是行動的好處;自我效能是對自己的信心。「名人代言、口號(觸發行動)」屬行動線索。故 C 正確。名人代言/宣傳口號(觸發行動)屬行動線索(與前述同類題一致)。","options":{"A":"疾病罹患性是對得病機率的認知。","B":"自覺行動利益是對行動好處的認知。","C":"正確。運動員代言、拒菸口號(觸發行動)，屬行動線索。","D":"自我效能是對自己能力的信心。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"114170-N5-36":{"quick":"培訓社區戒菸種子、強化校園周遭商店不販菸給未成年的宣導＝渥太華憲章的「強化社區行動力」。","detail":{"background":"護理師「「培訓「社區當地的「戒菸種子」」」，以「強化「校園周遭商店不販賣菸品予未滿18歲青少年」的「宣導」」——符合渥太華憲章的(C)『「強化社區行動力(strengthen community action;「「動員、培力「社區「在地」的人力與資源」」，「由社區「共同行動」」推動健康)」』。發展個人技能是個人衛教;調整健康服務方向是服務面;建立健康公共政策是立法。「培訓社區種子、社區共同推動」屬強化社區行動力。故 C 正確。培訓社區在地人力、社區共同行動屬強化社區行動力。","options":{"A":"發展個人技能是針對個人的衛教/技能培養。","B":"調整健康服務方向是服務面的調整。","C":"正確。培訓社區戒菸種子、社區共同推動，屬強化社區行動力。","D":"建立健康的公共政策是立法/政策手段。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"114170-N5-41":{"quick":"促進原鄉健康平等的措施「最不適當」者＝原住民族癌篩重點為肝癌和胰臟癌篩檢。","detail":{"background":"促進原鄉健康平等的措施，「最不適當」者為(D)『「原住民族癌篩「重點為「「肝癌和胰臟癌」」篩檢」』——錯誤，「「胰臟癌「「無「公費篩檢」」(無有效的篩檢工具)；原住民族癌篩的重點應為「「四癌(子宮頸、乳、大腸、「口腔」)」」(原住民「嚼檳榔、吸菸盛行」，「「口腔癌」」尤為重點)。其他適當:A 確保原住民享有平等的生育保健、健康促進、篩檢和追蹤、B 建構利於原住民健康老化及尊重原民文化的照顧資源、C 提升結核病主動篩檢涵蓋率及用藥護理指導。故本題選最不適當者為 D。原住民癌篩重點是四癌(尤其口腔癌)，非肝癌、胰臟癌。","options":{"A":"確保原住民享有平等的生育保健、篩檢與追蹤，適當。","B":"建構健康老化及尊重原民文化的照顧資源，適當。","C":"提升結核病主動篩檢及用藥指導，適當。","D":"正確(本題選最不適當者)。原住民癌篩重點是四癌(尤其口腔癌)，非肝癌、胰臟癌。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"114170-N5-49":{"quick":"「不符合」代謝症候群判定標準者＝陳爺爺(腰圍94、血糖93、HDL50、血壓111/81、TG138，僅1項)。","detail":{"background":"代謝症候群須符合5項中3項以上(腰圍男≥90女≥80、血壓≥130/85、空腹血糖≥100、TG≥150、HDL男<40女<50)。「不符合」者為(D)『「陳爺爺:腰圍94(男≥90✓)、血糖93(<100)、HDL50(≥40正常)、血壓111/81(<130/85)、TG138(<150)——「僅「1項(腰圍)」」，「不符合」(<3項)』。其他符合(≥3項):A 王奶奶(腰圍90、血糖132、TG168=3項)、B 李爺爺(腰圍91、血壓142/91、TG201、HDL38=4項)、C 吳奶奶(腰圍84、血糖140、TG158=3項)。故 D 正確(僅1項，不符合)。","options":{"A":"王奶奶腰圍90、血糖132、TG168(3項)，符合。","B":"李爺爺腰圍91、血壓142/91、TG201、HDL38(4項)，符合。","C":"吳奶奶腰圍84、血糖140、TG158(3項)，符合。","D":"正確(本題選不符合者)。陳爺爺僅腰圍1項，不符合(<3項)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"114170-N5-50":{"quick":"「最需持續管理」的慢性病個案＝血糖不穩又不遵從服藥的糖尿病病人。","detail":{"background":"最需「持續(密集)管理」的慢性病個案為(C)『「「血糖「不穩」又「不遵從服藥」」的糖尿病病人(「「病情控制差、遵從性差、風險高」」，「最需要「持續、密集」的「管理、追蹤、衛教」」)』。其他較不需密集管理:A 血糖連續三次訪視皆正常(控制良好)、B 家屬都能監督服藥與測量血壓(管理良好)、D 已完成治療的乳癌病人(進入追蹤)。故 C 正確。控制差、遵從性差者最需持續密集管理。","options":{"A":"血糖連續三次正常(控制良好)，較不需密集管理。","B":"家屬都能監督服藥血壓(管理良好)，較不需密集。","C":"正確。血糖不穩又不遵從服藥者，最需持續管理。","D":"已完成治療的乳癌病人進入追蹤，較不需密集管理。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"115030-N5-33":{"quick":"總目標(goal)與具體目標(objective)的敘述「正確」者＝具體目標為量化及可測量②、具體目標須含人、時間、達成什麼及程度④。","detail":{"background":"社區活動評值的「總目標(goal)」與「具體目標(objective)」:(2)「「具體目標(objective)」為「「量化及可測量」」(具體、明確)」;(4)「「具體目標」須包含「人、時間、達成什麼及程度(標準)」」。而(1)『總目標為量化及可測量』錯誤(「「總目標(goal)」是「「方向性、概括性」」的「「「不一定「量化」」」);(3)『總目標須包含人、時間、達成什麼及程度』錯誤(那是「「具體目標(objective)」」的要件，非總目標)。故正確為②④(選 C)。總目標概括/方向性;具體目標量化、可測量、含人時間程度。","options":{"A":"12：含①(總目標量化，錯誤)。","B":"13：①③皆是描述總目標卻套用具體目標的特性，錯誤。","C":"正確。具體目標為量化可測量②、具體目標含人時間達成什麼及程度④。","D":"34：含③(總目標含人時間程度，錯誤)。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"115030-N5-35":{"quick":"沙塵暴季節對氣喘病人的護理指導「較不適當」者＝打開門窗，維持空氣流通。","detail":{"background":"沙塵暴季節對氣喘病人的護理指導，「較不適當」者為(C)『「「打開門窗」，維持空氣流通」』——錯誤，「「沙塵暴」時「「空氣中「懸浮微粒(PM)」「大量增加」」，會「誘發氣喘」;應「「「緊閉門窗」」(必要時用空氣清淨機)」，「「不可「打開門窗」」。其他適當:A 儘量避免出門、若出門必須配戴口罩、B 維持正常作息、D 切勿擅自停止氣喘用藥。故本題選較不適當者為 C。沙塵暴時應緊閉門窗，非打開。","options":{"A":"儘量避免出門、出門戴口罩，適當。","B":"維持正常作息，適當。","C":"正確(本題選較不適當者)。沙塵暴時應緊閉門窗，非打開。","D":"切勿擅自停止氣喘用藥，適當。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"115030-N5-36":{"quick":"身高154公分、體重66公斤的成人 BMI≈27.8，體位屬於「肥胖」。","detail":{"background":"BMI＝體重(公斤)÷身高(公尺)的平方＝66 ÷ (1.54 × 1.54)＝66 ÷ 2.37≈「「27.8」」。依我國成人體位標準(正常18.5~24、過重24~27、「肥胖「≥27」」)，BMI 27.8「≥27」，屬(A)『「肥胖」』。故 A 正確。BMI≈27.8≥27，屬肥胖。","options":{"A":"正確。BMI≈27.8(≥27)，屬肥胖。","B":"正常是18.5~24，27.8超過。","C":"過輕是<18.5，不符。","D":"過重是24~27，27.8已達肥胖(≥27)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"115030-N5-42":{"quick":"協助肥胖家庭維持正常體位「最不適當」者＝建議大明母親產後三個月起停止母乳哺餵，以免導致嬰兒體重過重。","detail":{"background":"協助肥胖家庭(大明國小肥胖、母親懷孕8個月)維持正常體位，「最不適當」者為(C)『「建議大明母親「產後三個月起「停止母乳哺餵」」，以免導致「嬰兒體重過重」』——錯誤，「「母乳哺餵「不會「導致「嬰兒「肥胖」」」(母乳反而「有助「預防」兒童肥胖」);應「「鼓勵「持續哺餵母乳」」。其他適當:A 鼓勵大明的父母修正全家的生活型態、以體重控制為主要目標、B 鼓勵大明漸進式減重、每個月0.5公斤為限、D 衛教父母須留意大明的身體心像。故本題選最不適當者為 C。母乳不會致嬰兒肥胖，應鼓勵持續哺餵。","options":{"A":"鼓勵父母修正全家生活型態、以體重控制為目標，適當。","B":"鼓勵漸進式減重、每月0.5公斤為限，適當。","C":"正確(本題選最不適當者)。母乳不會致嬰兒肥胖，應鼓勵持續哺餵。","D":"衛教父母須留意大明的身體心像，適當。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"115030-N5-43":{"quick":"G-6-PD缺乏症的護理指導「錯誤」者＝感染時以磺胺類藥物治療為首選。","detail":{"background":"G-6-PD(葡萄糖-6-磷酸鹽去氫酶)缺乏症的護理指導，「錯誤」者為(D)『「感染時以「「磺胺類藥物」」治療為首選」』——錯誤，「「磺胺類藥物(sulfonamides)」是「「氧化性藥物」，是 G-6-PD 缺乏者的「「禁忌(會誘發「溶血」)」」，「「不可「使用」」。其他正確:A 為X染色體性聯遺傳疾病、B 避免使用萘丸(樟腦丸)、C 避免食用蠶豆及其製品。故本題選錯誤者為 D。磺胺類藥物是 G-6-PD 禁忌(會溶血)，非首選。","options":{"A":"為 X 染色體性聯遺傳疾病，正確。","B":"避免使用萘丸(樟腦丸)，正確。","C":"避免食用蠶豆及其製品，正確。","D":"正確(本題選錯誤者)。磺胺類藥物是 G-6-PD 禁忌(會溶血)，非首選。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"115030-N5-49":{"quick":"糖尿病足部護理應避免的習慣＝穿拖鞋外出①、睡覺時用電毯或熱水袋保暖足部③。","detail":{"background":"糖尿病的足部護理，應「避免」的習慣:(1)「「穿拖鞋外出」(露趾、保護不足，「易受傷」)」;(3)「睡覺時用「「電毯或熱水袋」」保暖足部(因「「神經病變「感覺遲鈍」」，「「易「燙傷」而不自知」)」。而(2)每日用「溫水」泡腳10分鐘(可，但須「先測水溫、時間勿過長」)、(4)使用中性肥皂清洗足部(溫和清潔，可)是「適當」的。故應避免①③(選 C)。糖尿病足應避免穿拖鞋外出、用電毯/熱水袋(防受傷、燙傷)。","options":{"A":"12：含②(溫水泡腳，可接受)，錯誤。","B":"23：含②、缺①，錯誤。","C":"正確。應避免穿拖鞋外出①、用電毯或熱水袋③。","D":"24：②④皆是適當的，非應避免。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"115030-N5-50":{"quick":"代謝症候群及其健康照護「最適當」者＝是一群容易導致心血管代謝疾病的危險因子之總稱。","detail":{"background":"代謝症候群及其健康照護，最適當的是(B)『「是「一群「容易導致「心血管「代謝疾病」」的「危險因子」之「「總稱」」(包含腹部肥胖、血壓、血糖、血脂異常等「群聚」的危險因子)』。其他錯誤:A『最主要原因是「遺傳」』錯誤(最主要是「「「生活型態」」);C『「三低」健康飲食是指「低油、低糖、「「低纖」」」』錯誤(應是「「「「高」纖(高纖維)」」;「低纖」錯誤);D『罹患糖尿病者「藥物控制良好，即「不屬」(代謝症候群)」』錯誤(只要符合判定的「危險因子組合」即屬，「控制良好「仍屬」)。故 B 正確。代謝症候群是一群易致心血管代謝疾病的危險因子總稱。","options":{"A":"最主要的原因是生活型態，非遺傳。","B":"正確。是一群容易導致心血管代謝疾病的危險因子之總稱。","C":"健康飲食應「高纖」，非「低纖」。","D":"符合危險因子組合即屬，藥物控制良好仍屬。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}}},TO=["健康促進與慢性病防治"],LEC={"健康促進與慢性病防治":{"title":"健康促進與慢性病防治　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「健康促進與慢性病防治」的歷屆考題共 272 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_h6_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
