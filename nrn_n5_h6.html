康促進④。","D":"3241：順序錯誤(預防醫學應在健康促進之前)。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"101030-N5-58":{"quick":"我國19歲以上女性肥胖的標準＝身體質量指數≥27②、腰圍≥80公分④。","detail":{"background":"我國19歲以上成人「肥胖」的標準:(2)「身體質量指數(BMI)「≥27」(BMI 24~27為過重、「≥27為肥胖」)」;(4)「女性「腰圍「≥80公分」」(腹部肥胖;男性≥90公分、女性≥80公分)」。而(1)BMI≥24是「過重」非肥胖、(3)腰圍≥70非標準。故正確為②④(選 D)。成人肥胖:BMI≥27;腹部肥胖:男腰圍≥90、女≥80公分。","options":{"A":"14：含①(BMI≥24是過重)③(腰圍70非標準)，錯誤。","B":"23：含①(BMI≥24)，錯誤。","C":"13：BMI≥24是過重、腰圍70非標準，皆錯。","D":"正確。BMI≥27②、女性腰圍≥80公分④。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"101030-N5-62":{"quick":"核子事故警報時的自我防護「錯誤」者＝立即服用碘片。","detail":{"background":"核子事故警報時的自我防護措施，「錯誤」者為(B)『「「立即」服用碘片」』——錯誤，「碘片(碘化鉀)須「「依「主管機關的指示/通知」」才服用」，「不可「自行「立即」服用」」(過早或不當服用碘片有副作用，且須在「正確時機」服用才有保護甲狀腺的效果)。其他正確:A 關緊門窗進入室內掩蔽;C 淋浴以去除放射線塵粒;D 避免飲用曝露於外的食物及飲水。故本題選錯誤者為 B。碘片須依指示服用，非立即自行服用。","options":{"A":"關緊門窗進入室內掩蔽，正確。","B":"正確(本題選錯誤者)。碘片須依指示服用，非立即自行服用。","C":"淋浴以去除放射線塵粒，正確。","D":"避免飲用曝露於外的食物及飲水，正確。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"101030-N5-71":{"quick":"保護兒童眼睛健康：3~4歲即可做視力篩檢①、作息規律健康飲食戶外活動②。","detail":{"background":"保護兒童眼睛健康，較適當的是:(1)「幼兒「3~4歲」即可做「視力篩檢」(及早發現弱視、近視)」;(2)「作息規律、健康飲食、「多戶外活動」(戶外活動可預防近視)」。而(3)『一天看電視或電腦時間「可達90分鐘」』錯誤(用眼時間「不宜過長」，每30分鐘應休息);(4)『閱讀書籍宜保持「20公分」的距離』錯誤(閱讀距離應「「30公分以上」」，太近傷眼)。故正確為①②(選 A)。護眼:及早篩檢、多戶外活動、限制近距離用眼、閱讀距離30公分以上。","options":{"A":"正確。3~4歲做視力篩檢①、作息規律健康飲食戶外活動②。","B":"23：含③(看電視90分鐘太久)，錯誤。","C":"24：含④(閱讀20公分太近)，錯誤。","D":"34：含③④，皆錯。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"101030-N5-72":{"quick":"酒精燈燙傷的處理步驟＝冷水沖洗①→脫去衣物③→泡冷水⑤→緊急送醫②→通知家長④。","detail":{"background":"燙傷(燒燙傷)的處理口訣是「「沖、脫、泡、蓋、送」」。小華被酒精燈燙傷(發紅及水泡，屬二度燙傷)，正確的步驟順序是(B)『「(1)以「冷水沖洗」→(3)「脫去」傷口部位的衣物 →(5)將患部「泡於冷水」中 →(2)「緊急送醫」→(4)「通知家長」」(13524)』。故正確順序為13524(選 B)。燙傷處理:沖(冷水沖)→脫(去衣物)→泡(冷水泡)→蓋(覆蓋)→送(送醫)。","options":{"A":"12354：順序錯誤(送醫不應在脫泡之前)。","B":"正確。冷水沖①→脫衣物③→泡冷水⑤→送醫②→通知家長④。","C":"31452：順序錯誤(應先沖再脫)。","D":"41523：順序錯誤(通知家長不應在最前)。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"101030-N5-77":{"quick":"糖尿病高危險群＝前期糖尿病①、曾罹患妊娠性糖尿病②、肥胖④(腎臟病患者③非)。","detail":{"background":"糖尿病的高危險群:(1)「前期糖尿病(空腹血糖偏高/糖化血色素偏高)」;(2)「曾罹患「妊娠性糖尿病」者」;(4)「肥胖者(尤其腹部肥胖)」。而(3)『腎臟病患者』「不是」糖尿病的「高危險群」(腎臟病可能是糖尿病的「「併發症」」，而非糖尿病的「危險因子」)。故正確為①②④(選 B)。糖尿病高危險群:前期糖尿病、妊娠糖尿病史、肥胖、家族史、年齡≥45歲等。","options":{"A":"123：含③(腎臟病，非糖尿病高危群)，錯誤。","B":"正確。前期糖尿病①、妊娠糖尿病史②、肥胖④。","C":"134：含③，錯誤。","D":"234：含③、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"101030-N5-78":{"quick":"中老年慢性疾病的發生，與「個人健康行為」關係最密切。","detail":{"background":"中老年慢性疾病(如高血壓、糖尿病、心血管疾病、癌症)的發生，與(B)『「個人「健康行為」(生活型態:飲食、運動、菸酒、壓力等)」』關係「最密切」——慢性病的主要危險因子是「不良的生活型態(健康行為)」，這也是 Lalonde 報告中「生活型態」佔最大比例的呼應。個人遺傳、物質環境、預防保健雖有影響，但「個人健康行為」是最密切的因素。故 B 正確。慢性病與個人健康行為(生活型態)關係最密切。","options":{"A":"個人遺傳因子有影響，但非最密切。","B":"正確。中老年慢性病與個人健康行為(生活型態)關係最密切。","C":"有害的物質環境有影響，但非最密切。","D":"預防保健不周全有影響，但非最密切。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"101110-N5-51":{"quick":"學校在校內提供3劑疫苗注射＝減少對預防性健康行為的「障礙」。","detail":{"background":"依健康信念模式，「學校「在校內」提供3劑疫苗注射」——主要是(C)『「「減少」對預防性健康行為的「障礙(barriers;就近、方便接種，「降低「不便、距離」等執行的障礙」)」』。增加行動線索是「提醒/觸發」;增加嚴重性認知是「讓人覺得疾病嚴重」;利益的認知是「行動的好處」。「在校內就近提供(降低不便障礙)」屬減少障礙。故 C 正確。在校內就近提供疫苗是減少執行的障礙。","options":{"A":"增加行動的線索是提醒/觸發行動。","B":"增加疾病嚴重性認知是讓人覺得疾病嚴重。","C":"正確。在校內就近提供(降低不便)，是減少行動的障礙。","D":"是「減少障礙」、非減少「利益的認知」。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"101110-N5-52":{"quick":"學校提供預防注射的日期及地點＝健康信念模式的「行動的線索」。","detail":{"background":"依健康信念模式，「學校提供「預防注射的日期及地點」」——此措施是(A)『「「行動的線索(cues to action;「提醒、訊息、通知」等「觸發/促使」個人採取行動的線索)」』。疾病嚴重性認知、障礙認知、利益認知是「個人的認知」面向。「提供日期地點(提醒/促發行動)」屬行動的線索。故 A 正確。提供注射日期地點(提醒、促發行動)是行動的線索。","options":{"A":"正確。提供注射日期及地點(提醒、促發行動)，是行動的線索。","B":"疾病嚴重性認知是個人對疾病嚴重度的認知。","C":"障礙認知是個人對行動阻礙的認知。","D":"利益認知是個人對行動好處的認知。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"101110-N5-53":{"quick":"直接影響注射可能性的因素＝感受到該疾病的威脅③、利益-障礙的認知④。","detail":{"background":"依健康信念模式，「直接」影響採取行動(注射疫苗)可能性的因素是:(3)「「感受到該疾病的威脅(知覺威脅;由「易感性＋嚴重性」綜合而成)」;(4)「對預防性健康行為的「利益認知「-」障礙認知」(權衡「好處」與「阻礙」)」。而(1)易感性認知、(2)嚴重性認知是「形成「威脅感受(③)」」的「前置」因素;(5)行動的線索是「觸發」因素。「直接」影響行動的是「威脅感受＋利益障礙的權衡」。故正確為③④(選 D)。","options":{"A":"14：①易感性是前置因素(經由威脅感受間接影響)。","B":"23：含②(嚴重性是前置因素)，非直接。","C":"25：含②⑤，非直接影響。","D":"正確。感受到威脅③、利益-障礙的認知④，直接影響行動。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"101110-N5-54":{"quick":"預防高血壓，每日鈉攝取量應在2400毫克以下。","detail":{"background":"為了預防高血壓，國人「每日「鈉」攝取量」應在(A)『「2400毫克」以下(約等於「「6公克鹽」」;鈉攝取過多會升高血壓)』。故 A 正確。預防高血壓:每日鈉<2400毫克(約6公克鹽)。(註:鈉2400毫克 ≈ 鹽6公克。)","options":{"A":"正確。每日鈉攝取量應在2400毫克(約6公克鹽)以下。","B":"3400毫克過高。","C":"4400毫克過高。","D":"5400毫克過高。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"101110-N5-60":{"quick":"二手菸的描述「錯誤」者＝懷孕婦女吸入二手菸不會經由胎盤將有害物質傳給胎兒。","detail":{"background":"二手菸的描述，「錯誤」者為(D)『「懷孕婦女吸入二手菸「「不會」經由胎盤」將有害物質傳給胎兒」』——錯誤，「孕婦吸入二手菸的「有害物質「會」經由「胎盤」傳給胎兒」」，影響胎兒(低出生體重、早產等)。其他正確:A 吸入二手菸會增加氣喘的罹病率;B 暴露於二手菸會增加心血管疾病罹病率;C 吸入二手菸易吸入致癌物質。故本題選錯誤者為 D。孕婦吸二手菸的有害物質會經胎盤傳給胎兒。","options":{"A":"吸入二手菸會增加氣喘的罹病率，正確。","B":"暴露於二手菸會增加心血管疾病罹病率，正確。","C":"吸入二手菸易吸入致癌物質，正確。","D":"正確(本題選錯誤者)。孕婦吸二手菸的有害物質會經胎盤傳給胎兒。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"101110-N5-62":{"quick":"PRECEDE-PROCEED 模式的「促成因素(Enabling factors)」＝校園內有可以潔牙的場所。","detail":{"background":"依格林(Green)的 PRECEDE-PROCEED 模式，屬「促成因素(Enabling factors;使行為「能夠「執行/發生」」的「「資源、技能、可近性」」)」的是(B)『「校園內有「可以潔牙的「場所(設施/資源)」」(提供潔牙的「環境與資源」，使潔牙行為「能夠執行」)』。其他屬「傾向因素(Predisposing;知識、態度、信念)」:A 學童對口腔衛生的「知識」、D 學童對口腔衛生的「看法」;C 父母的態度屬「增強因素(Reinforcing)」。「潔牙場所(資源/可近性)」屬促成因素。故 B 正確。促成因素是使行為能執行的資源、技能、可近性(如潔牙場所)。","options":{"A":"學童的「知識」屬傾向因素(predisposing)。","B":"正確。校園有潔牙場所(資源/可近性)，屬促成因素。","C":"父母的態度屬增強因素(reinforcing)。","D":"學童的「看法」屬傾向因素(predisposing)。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論","PRECEDE-PROCEED"]}},"101110-N5-68":{"quick":"弱勢族群成人預防保健服務對象＝55歲以上原住民，每年可檢查1次。","detail":{"background":"弱勢族群成人預防保健服務的對象，正確的是(A)『「「55歲以上「原住民」」，每年可檢查1次(原住民因平均餘命較短，放寬至55歲;一般人65歲以上每年1次、40~64歲每3年1次)』。其他錯誤:B『罹患小兒麻痺且「55歲」以上、每年1次』、D『罹患小兒麻痺且「35歲」以上、每2年1次』的條件不符(小兒麻痺者放寬的年齡是「「35歲以上、每年1次」」);C『「45歲」以上原住民』錯誤(是55歲)。故 A 正確。原住民55歲以上、每年1次;小兒麻痺者35歲以上、每年1次。","options":{"A":"正確。55歲以上原住民，每年可檢查1次。","B":"小兒麻痺者放寬的年齡是35歲以上，非55歲。","C":"原住民放寬至55歲，非45歲。","D":"小兒麻痺者35歲以上是「每年」1次，非每2年。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"101110-N5-70":{"quick":"工廠護理師應扮演的角色「錯誤」者＝參與刺激工廠經濟發展之事務。","detail":{"background":"依勞工健康保護規則，工廠護理師應扮演的角色，「錯誤」者為(A)『「參與「刺激工廠「經濟發展」」之事務」』——「促進工廠的「經濟發展」「不是」「護理師(職業衛生)」的角色」(護理師的角色是「「勞工的健康促進、健康管理、職業病防治」」)。其他正確的角色:B 參與廠區健康政策之制定;C 與廠區員工形成夥伴關係;D 推動健康促進活動。故本題選錯誤者為 A。工廠護理師的角色是勞工健康，非刺激經濟發展。","options":{"A":"正確(本題選錯誤者)。刺激工廠經濟發展非職業衛生護理師的角色。","B":"參與廠區健康政策之制定，是其角色。","C":"與廠區員工形成夥伴關係，是其角色。","D":"推動健康促進活動，是其角色。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"101110-N5-71":{"quick":"代謝症候群員工的健康指導＝養成每日運動30分鐘的習慣①、養成每日五蔬果的概念③。","detail":{"background":"對代謝症候群員工的健康指導，正確的是:(1)「養成「每日運動30分鐘」的習慣(增進代謝、減重)」;(3)「養成「每日五蔬果」的概念(均衡飲食、增加纖維)」。而(2)『運動可以「降低高密度脂蛋白(HDL)」』錯誤(運動是「「升高」HDL(好膽固醇)」，HDL 越高越好);(4)『每日攝取鹽分在「10毫克」以下』錯誤(鹽的建議是「每日「<6公克(鈉<2400毫克)」」;「10毫克」極不合理)。故正確為①③(選 B)。代謝症候群:每日運動30分鐘、五蔬果、限鹽(<6公克)、運動升高 HDL。","options":{"A":"12：含②(運動降低 HDL，錯誤)。","B":"正確。每日運動30分鐘①、每日五蔬果③。","C":"24：含②④，皆錯。","D":"34：含④(鹽10毫克，數值錯誤)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"101110-N5-72":{"quick":"教導幼稚園小朋友洗手，最好的教學方法＝示範與演練法。","detail":{"background":"教導「幼稚園小朋友」如何「洗手(技能)」，最好的教學方法是(C)『「示範與演練法(demonstration & practice;「示範正確的洗手步驟，再讓小朋友「親自演練(實作)」」;對「幼兒」教「技能」，「示範＋實作」最有效、最符合其學習方式)』。圖片展覽、演講法、播放錄影帶偏向「被動的視聽」，對幼兒學「技能」的效果較差。故 C 正確。教幼兒洗手(技能)宜用示範與演練法。","options":{"A":"圖片展覽法偏向被動視覺，對技能學習效果差。","B":"演講法對幼兒學技能效果差。","C":"正確。教幼兒洗手(技能)，最好用示範與演練法。","D":"播放錄影帶偏向被動視聽，對技能學習效果差。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"101110-N5-73":{"quick":"幼兒口腔保健：長出第1顆乳牙就可開始刷牙①、1歲後養成餐後刷牙習慣②。","detail":{"background":"幼兒口腔保健，正確的是:(1)「幼兒「長出第1顆乳牙」就可開始「刷牙(清潔牙齒)」;(2)「「1歲以後」即可進行「餐後刷牙」習慣的養成」。而(3)『乳牙全部長出「前不需」進行牙齒檢查』錯誤(應「「及早(長牙後/1歲前後)」開始定期口腔檢查」);(4)『建議幼兒「夜間使用奶瓶喝奶」以增加安全感』錯誤(「夜間含奶瓶睡覺易造成「「奶瓶性齲齒」」」，應避免)。故正確為①②(選 A)。幼兒長第一顆乳牙即可清潔、1歲後養成餐後刷牙、及早檢查、避免夜間含奶瓶。","options":{"A":"正確。長第1顆乳牙就可刷牙①、1歲後養成餐後刷牙②。","B":"13：含③(乳牙全長前不需檢查，錯誤)。","C":"23：含③，錯誤。","D":"34：含③④(夜間奶瓶易齲齒)，皆錯。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"101110-N5-77":{"quick":"糖尿病高危險族群＝BMI=27的女性①、年齡50歲的男性②、糖尿病家族遺傳的33歲男性③(產下3500公克嬰兒的母親④非)。","detail":{"background":"糖尿病高危險族群:(1)「BMI=27的女性(「肥胖」)」;(2)「年齡50歲的男性(「≥45歲」)」;(3)「有糖尿病「家族遺傳」的33歲男性(「家族史」)」。而(4)『曾產下體重「3500公克」嬰兒的母親』「不是」高危險群(「「巨嬰(≥4000公克)」」的母親才是糖尿病高危險群;3500公克未達巨嬰)。故正確為①②③(選 A)。糖尿病高危:肥胖、≥45歲、家族史、巨嬰(≥4000g)生產史、妊娠糖尿病史等。","options":{"A":"正確。BMI=27女性①、50歲男性②、家族遺傳的33歲男性③。","B":"124：含④(產下3500g嬰兒，未達巨嬰)，錯誤。","C":"(對照)非正確組合。","D":"(對照)非正確組合。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102030-N5-56":{"quick":"評價消耗的物力、人力及經費與成果的關係＝效率評價。","detail":{"background":"社區護理師在慢性病防治計畫執行後，「評價「消耗的物力、人力及經費(投入的資源)」與「成果」的「關係」」——屬(B)『「效率評價(efficiency;評估「投入的「成本/資源」」與「產出/成果」的「比值/關係」)」』。效果評價是是否達成目標;合適性評價是是否符合需求;過程評價是執行過程。「投入(成本)與成果的關係」屬效率評價。故 B 正確(與前述同類題一致)。","options":{"A":"效果評價是評估是否達成目標。","B":"正確。投入(物力人力經費)與成果的關係，是效率評價。","C":"合適性評價是評估是否符合需求。","D":"過程評價是評估執行過程。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"102030-N5-57":{"quick":"「我和我父親一樣有高血壓」＝Pender 模式的「個人因素(生物的)」。","detail":{"background":"依 Pender 健康促進模式，王先生說「我和我父親一樣有高血壓(「遺傳/家族」的因素)」——反應(A)『「個人因素:生物的、心理的與社會文化的(「生物因素」含年齡、性別、「遺傳/家族史」、BMI 等)」』。人際間影響是他人的規範/模範;自覺自我效能是對自己能力的信心;行動承諾是承諾採取行動。「遺傳(家族史)」屬個人的生物因素。故 A 正確。「家族史/遺傳」屬 Pender 的個人因素(生物的)。","options":{"A":"正確。「和父親一樣有高血壓(家族史)」屬個人因素(生物的)。","B":"人際間的影響是他人的規範、模範。","C":"自覺自我效能是對自己能力的信心。","D":"個人採取行動的承諾是承諾採取行動。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"102030-N5-58":{"quick":"「我知道我可以做到，並達成計畫的目標」＝Pender 模式的「自覺自我效能」。","detail":{"background":"依 Pender 健康促進模式，王先生說「我「知道我可以做到」，並達成計畫的目標」——反應(C)『「自覺自我效能(perceived self-efficacy;對「自己「有能力「執行/達成」」健康行為」的「信心/把握」)」』。個人因素是個人的生物/心理/社會背景;人際間影響是他人的規範;行動承諾是承諾。「我知道我可以做到(對自己能力的信心)」屬自我效能。故 C 正確。「相信自己能做到」屬 Pender 的自覺自我效能。","options":{"A":"個人因素是個人的生物/心理/社會背景。","B":"人際間的影響是他人的規範、模範。","C":"正確。「我可以做到」(對自己能力的信心)，屬自覺自我效能。","D":"個人採取行動的承諾是承諾採取行動。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"102030-N5-59":{"quick":"「在太太的鼓勵下，這個月我減少了3公斤」＝Pender 模式的「人際間的影響」。","detail":{"background":"依 Pender 健康促進模式，王先生說「在「太太的「鼓勵」下」，這個月減了3公斤」——反應(B)『「人際間的影響(interpersonal influences;「他人(家人、同儕)的「規範、支持、模範、鼓勵」」對健康行為的影響)」』。個人因素是個人背景;自我效能是對自己的信心;行動承諾是承諾。「太太的鼓勵(他人的影響)」屬人際間影響。故 B 正確。「他人的鼓勵/支持」屬 Pender 的人際間影響。","options":{"A":"個人因素是個人的生物/心理/社會背景。","B":"正確。「太太的鼓勵」(他人的影響)，屬人際間的影響。","C":"自覺自我效能是對自己能力的信心。","D":"個人採取行動的承諾是承諾採取行動。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"102030-N5-70":{"quick":"舉辦衛生教育講座的第一步＝評估學生的需要。","detail":{"background":"張護理師想舉辦衛生教育講座，「第一步」工作是(C)『「評估「學生的需要(needs assessment;先「了解對象的「需求、問題、現況」」，才能據以設定目標、選擇方法、設計內容)」』。設定教學目標、選擇教育方法、依政府主題推動都是「評估需求「之後」」的步驟。衛教的第一步是「評估需求」。故 C 正確。衛生教育的第一步是評估對象的需要(與護理過程的「評估」對應)。","options":{"A":"設定教學目標是評估需求後的步驟。","B":"選擇合適的教育方法是後續步驟。","C":"正確。第一步是評估學生的需要。","D":"依政府主題推動非「以對象需求」為先的做法。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"102030-N5-72":{"quick":"每天跑步15分鐘以維持適當體位＝第一段第一級(健康促進)的預防。","detail":{"background":"學校要求學生「每天跑步15分鐘，以維持適當體位(運動、維持健康體位)」——從預防的概念而言，屬(A)『「第一段(第一級)的「健康促進」(以「運動」等「一般性的健康增進」措施，維持健康、預防疾病發生)』。第二級是特殊保護(疫苗);第三級是早期診斷;第四級是限制殘障。「運動維持體位(健康促進)」屬第一段第一級。故 A 正確。運動維持健康體位屬第一段第一級(健康促進)。","options":{"A":"正確。運動維持適當體位(健康促進)屬第一段第一級。","B":"第一段第二級是特殊保護(如疫苗)。","C":"第二段第三級是早期診斷早期治療。","D":"第三段第四級是限制殘障。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102030-N5-74":{"quick":"員工血壓偏高但無不適：護理師最恰當的處理＝請其先坐下休息5分鐘後測量血壓。","detail":{"background":"員工王先生「一週前體檢說血壓偏高、但無不適」來到健康中心——護理師最恰當的處理是(D)『「請王先生「先坐下休息5分鐘後「測量其血壓」」(先「重新測量、確認」當下的血壓「實際數值」，才能評估與後續處置)』。其他不當/言之過早:A『直接請到診所診斷』未先評估;B『衛教合併症』、C『告知按時服藥控制』都是「在「尚未確認血壓、尚未診斷」前」就跳到衛教/用藥，不恰當。故 D 正確。先重新測量血壓(休息5分鐘後)以確認現況，再做後續處置。","options":{"A":"未先評估(測量)就請去診所，不恰當。","B":"尚未確認血壓就衛教合併症，言之過早。","C":"尚未診斷就告知按時服藥，不恰當。","D":"正確。請其先休息5分鐘後測量血壓(確認現況)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102030-N5-78":{"quick":"林太太「具備的代謝症候群高危因子」「錯誤」者＝經常外食。","detail":{"background":"林太太(身高150、體重72(BMI≈32，肥胖)、妊娠糖尿病史、血壓132/90偏高)，其「「具備的「代謝症候群高危因子」」」，「錯誤」者為(D)『「經常外食」』——「「經常外食」是「「不良的「飲食「行為/習慣」」」，「不是「代謝症候群」的「組成因子/診斷指標」」(代謝症候群的因子是「腰圍、血壓、血糖、三酸甘油脂、HDL」)。其他是其具備的高危因子:A 身高150、體重72(肥胖);B 曾罹患妊娠糖尿病;C 血壓偏高。故本題選錯誤者為 D。經常外食是行為，非代謝症候群的組成因子。","options":{"A":"身高150、體重72(肥胖)，是高危因子。","B":"曾罹患妊娠糖尿病，是高危因子。","C":"血壓偏高(132/90)，是高危因子。","D":"正確(本題選錯誤者)。經常外食是行為，非代謝症候群的組成因子。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102030-N5-79":{"quick":"對代謝症候群高危的林太太的衛教＝定期量測血壓②、選擇少鹽少油飲食③、控制體重④、增加運動⑤(增加蛋白質①非)。","detail":{"background":"對代謝症候群高危的林太太，社區護理師應給予的衛教:(2)「定期量測血壓」;(3)「選擇「少鹽少油」飲食」;(4)「控制體重(減重)」;(5)「增加運動」。而(1)『「「增加」蛋白質攝取量』錯誤——應「「均衡」飲食」，而非「「增加」蛋白質」(且過多蛋白質對腎臟有負擔)。故正確為②③④⑤(選 D)。代謝症候群衛教:量血壓、少鹽少油、控制體重、增加運動、均衡飲食。","options":{"A":"1234：含①(增加蛋白質，應均衡非增加)，錯誤。","B":"1245：含①，錯誤。","C":"1345：含①，錯誤。","D":"正確。定期量血壓②、少鹽少油③、控制體重④、增加運動⑤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102030-N5-80":{"quick":"「老人健康促進計畫」八大策略＝促進健康體能①、促進健康飲食②、加強菸害防制③、加強心理健康⑤(發展老人專科醫療④非)。","detail":{"background":"國民健康局「老人健康促進計畫」的八大策略包括:(1)促進健康體能、(2)促進健康飲食、(3)加強菸害防制、(5)加強心理健康，以及事故傷害防制、口腔保健、社會參與、預防保健等。而(4)『發展老人「專科「醫療」」』「不是「健康「促進」」的策略(屬「醫療」範疇，非「促進」)。故正確為①②③⑤(選 B)。老人健康促進著重健康體能、飲食、菸害防制、心理健康等，非發展專科醫療。","options":{"A":"1234：含④(發展老人專科醫療)，非健康促進策略。","B":"正確。促進健康體能①、健康飲食②、菸害防制③、心理健康⑤。","C":"1245：含④，錯誤。","D":"2345：含④、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102110-N5-53":{"quick":"「因遺傳傾向，將來我會和父親一樣罹患糖尿病」＝健康信念模式的「疾病的易感性認知」。","detail":{"background":"依健康信念模式，某男性指出「因為「遺傳傾向」，「將來我「會」和父親一樣「罹患」糖尿病」」——是(B)『「疾病的「易感性(susceptibility)」認知(個人對「自己「可能罹患」某疾病的「機率/風險」」的主觀認知)」』。行動的線索是觸發行動的提醒;嚴重性認知是疾病的後果嚴重;障礙認知是行動的阻礙。「我「會」罹患(對自己得病風險的認知)」屬易感性認知。故 B 正確。「覺得自己可能會得病」屬易感性認知。","options":{"A":"行動的線索是觸發行動的提醒。","B":"正確。「我會罹患糖尿病」(對自己得病風險的認知)，屬易感性認知。","C":"嚴重性認知是對疾病後果嚴重程度的認知。","D":"障礙認知是對行動阻礙的認知。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"102110-N5-54":{"quick":"教導戒菸方法＋實施公共場所禁菸政策＝渥太華憲章的「建立公共政策①、發展個人技巧③」。","detail":{"background":"「教導個案「戒菸的「方法(技巧)」」＋實施「公共場所「禁菸的「政策」」」——應用渥太華憲章的:(1)「建立(健康的)「公共政策」(立法禁菸是政策手段)」;(3)「發展「個人技巧」(教導戒菸方法是增進個人技能)」。而(2)強化社區行動、(4)重新定位健康服務非此兩措施對應的綱領。故正確為①③(選 C)。立法禁菸＝建立公共政策;教導戒菸方法＝發展個人技巧。","options":{"A":"12：含②(強化社區行動)，非此兩措施對應。","B":"23：含②、缺①，錯誤。","C":"正確。建立公共政策①(禁菸政策)、發展個人技巧③(教戒菸方法)。","D":"24：含②④，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"102110-N5-61":{"quick":"評估學生體適能的描述「錯誤」者＝定期量血壓測量學生的血流動力學。","detail":{"background":"評估學生體適能的描述，「錯誤」者為(C)『「定期量「血壓」測量學生的「血流動力學」』——「血壓「不是「「體適能」」的評估項目」(體適能評估的是「心肺耐力、肌力肌耐力、柔軟度、身體組成」)。其他正確的體適能評估:A 跑800公尺測量心肺耐力;B 仰臥起坐測量肌耐力;D 坐姿體前彎測量柔軟度。故本題選錯誤者為 C。血壓非體適能的評估項目。","options":{"A":"跑800公尺測量心肺耐力，正確。","B":"仰臥起坐測量肌耐力，正確。","C":"正確(本題選錯誤者)。血壓非體適能的評估項目。","D":"坐姿體前彎測量柔軟度，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"102110-N5-62":{"quick":"在工作場所設立抹片站(行動醫療車)＝減少員工對子宮頸抹片檢查的障礙。","detail":{"background":"護理師為「輪班、近三年未做抹片的女員工」，聯絡衛生單位「在工作場所「設立抹片站(就近、方便)」」——依健康信念模式，此措施的目的是(A)『「「減少」員工對子宮頸抹片檢查的「障礙(barriers;克服「時間、不便、距離」等執行的阻礙，讓員工容易接受篩檢)」』。增進可能性認知、認同、嚴重性認知是「改變認知」的措施。「就近設站(降低不便障礙)」屬減少障礙。故 A 正確。就近設抹片站是減少員工受檢的障礙。","options":{"A":"正確。就近設立抹片站(降低不便)，是減少受檢的障礙。","B":"增進罹癌可能性認知是改變認知，非此措施的目的。","C":"增進對抹片的認同是改變態度。","D":"提升嚴重性認知是改變認知。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"102110-N5-63":{"quick":"罹患代謝症候群者＝曾女士(三酸甘油脂160、血壓140/90、腰圍85，符合3項)。","detail":{"background":"代謝症候群的診斷:「符合「以下5項中「3項(含)以上」」:①腹部肥胖(腰圍男≥90、「女≥80」)、②血壓≥130/85、③空腹血糖≥100、④三酸甘油脂≥150、⑤HDL(男<40、女<50)」。(D)『曾女士:三酸甘油脂160(≥150✓)、血壓140/90(≥130/85✓)、腰圍85(女≥80✓)——「符合3項」，罹患代謝症候群』。其他:A 林先生符合血壓、TG(BMI 非腰圍，項數不足明確3項);B 王先生血糖110(✓)，血壓120/85、腰圍85(男<90)，不足3項;C 張女士血糖110(✓)、腰圍81(✓)、HDL55(女≥50正常)，僅2項。故 D 正確。","options":{"A":"林先生提供 BMI(非腰圍)，明確符合的項數不足3項。","B":"王先生僅血糖達標，血壓/腰圍未達(男腰圍標準90)，不足3項。","C":"張女士僅血糖、腰圍2項(HDL 55女正常)，不足3項。","D":"正確。曾女士 TG160、血壓140/90、腰圍85，符合3項，是代謝症候群。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102110-N5-64":{"quick":"血脂異常的處理原則＝優先選擇3~6個月飲食治療①、減重運動戒菸是非藥物治療③、增加個案對血脂異常的認識④(定期檢查心臟超音波②非)。","detail":{"background":"血脂異常的處理原則:(1)「應「優先選擇「3~6個月的「飲食治療」」(先以「生活型態(飲食)」介入，無效再考慮藥物)」;(3)「「減重、運動與戒菸」是其他的「非藥物」治療方式」;(4)「增加個案對血脂異常的「認識(衛教)」」。而(2)『定期檢查「心臟超音波」』「不是」血脂異常的常規處理(血脂異常監測的是「血脂數值」，非心臟超音波)。故正確為①③④(選 C)。血脂異常先以飲食、運動、減重、戒菸等生活型態介入。","options":{"A":"123：含②(心臟超音波，非常規)，錯誤。","B":"124：含②，錯誤。","C":"正確。優先飲食治療①、非藥物治療(減重運動戒菸)③、增加認識④。","D":"234：含②、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102110-N5-65":{"quick":"慢性病的特色＝潛伏期長須終生控制②、初期無明顯症狀③、常殘留殘障或機能不全④(需要密集醫療照護①非)。","detail":{"background":"慢性病的特色:(2)「潛伏期長、須「終生控制」(無法治癒，需長期管理)」;(3)「「初期無明顯症狀」(常被忽略)」;(4)「常「殘留殘障或機能不全」(造成失能)」。而(1)『需要「密集」的醫療照護』錯誤——「慢性病多在「社區/居家「長期(非「密集」)」照護」(「密集醫療」是「急性病」的特性)。故正確為②③④(選 D)。慢性病:潛伏期長、終生控制、初期無症狀、易致失能;非密集醫療。","options":{"A":"123：含①(需密集醫療，那是急性病特性)，錯誤。","B":"124：含①，錯誤。","C":"134：含①，錯誤。","D":"正確。潛伏期長須終生控制②、初期無症狀③、常殘留殘障④。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102110-N5-68":{"quick":"我國中老年保健的重點工作「錯誤」者＝整合性老人癌症治療。","detail":{"background":"2009年起我國中老年保健的重點工作，「錯誤」者為(C)『「整合性老人癌症「「治療」」』——中老年保健的重點是「「預防、篩檢、健康促進」」，而非「「治療(癌症治療屬「醫療」範疇)」」。其他正確:A 整合性篩檢服務;B 成人預防保健服務;D 老人健康促進。故本題選錯誤者為 C。中老年保健重點是篩檢、預防保健、健康促進，非癌症治療。","options":{"A":"整合性篩檢服務，是中老年保健的重點。","B":"成人預防保健服務，是重點。","C":"正確(本題選錯誤者)。重點是篩檢、預防、健康促進，非癌症治療。","D":"老人健康促進，是重點。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102110-N5-72":{"quick":"制定酒醉駕車罰則以維護交通安全＝健康促進介入中的「社會改變」。","detail":{"background":"政府「制定「酒醉駕車罰則」(立法、政策)」以維護交通安全——屬健康促進介入措施中的(B)『「社會改變(social change;透過「立法、政策、制度」的手段，「改變「社會環境/結構」」，促進全民的健康與安全)」』。教育是衛教;賦權是增進個人/社區的能力;行為改變是改變個人行為。「立法(政策/制度改變)」屬社會改變。故 B 正確。立法(政策手段)屬社會改變的健康促進介入。","options":{"A":"教育是衛生教育的介入。","B":"正確。制定罰則(立法/政策)，屬社會改變的介入。","C":"賦權是增進個人/社區的能力。","D":"行為改變是改變個人行為。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"102110-N5-76":{"quick":"30歲以上婦女的子宮頸癌衛教＋抹片篩檢＝促進健康①、早期診斷③。","detail":{"background":"為30歲以上婦女「舉辦子宮頸癌防治「衛生教育」＋提供「子宮頸抹片「篩檢」」」——屬三段五級的:(1)「「促進健康」(衛生教育，屬第一級健康促進)」;(3)「「早期診斷」(抹片「篩檢」，屬第三級早期診斷)」。而(2)特殊保護(如疫苗)、(4)早期治療非此活動。故正確為①③(選 C)。衛教＝促進健康(第一級);抹片篩檢＝早期診斷(第三級)。","options":{"A":"12：含②(特殊保護)，本活動無疫苗。","B":"23：含②、缺①，錯誤。","C":"正確。衛教＝促進健康①、抹片篩檢＝早期診斷③。","D":"34：含④(早期治療)，本活動是篩檢非治療。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"102110-N5-77":{"quick":"小英身高150公分、體重45公斤的 BMI＝45÷(1.5×1.5)＝20.0。","detail":{"background":"BMI(身體質量指數)＝「體重(公斤)÷身高(公尺)的平方」。小英身高150公分(＝1.5公尺)、體重45公斤。BMI＝45 ÷ (1.5 × 1.5) ＝45 ÷ 2.25 ＝20.0。故 B 正確。BMI＝45/(1.5²)＝20.0(屬正常範圍18.5~24)。","options":{"A":"13.5非正確計算。","B":"正確。45÷(1.5×1.5)＝20.0。","C":"22.5非正確計算。","D":"30.0非正確計算。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"102110-N5-78":{"quick":"小英 BMI 20.0(正常)、擔心體型：護理師最適合回答「妳覺得妳的體型有什麼問題？」","detail":{"background":"小英 BMI 20.0(屬「「正常」範圍」)、但「擔心自己的體型」——護理師最適合的回答是(A)『「「妳覺得妳的體型有什麼問題？」(以「開放式問句」先「了解其「擔憂的內容與想法」」，再給予適切的回應;青少女的體型焦慮可能涉及身體心像，須先傾聽了解)』。其他不當:B『BMI偏高、要多運動』、D『BMI偏高、減少脂肪』錯誤(BMI 20是「正常」非偏高);C『建議「維持」現在體型』雖數值正確，但「未先了解其擔憂」，可能忽略其心理需求。故 A 正確。對體型焦慮的青少女，先以開放式問句了解其擔憂。","options":{"A":"正確。先以開放式問句了解其擔憂(BMI 正常，須關注其心理)。","B":"BMI 20是正常，非偏高。","C":"數值雖正常，但未先了解其擔憂，忽略心理需求。","D":"BMI 20是正常，非偏高。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"103030-N5-44":{"quick":"了解推動走路對民眾健康體能的「影響」＝前瞻性世代追蹤法。","detail":{"background":"要了解「在社區中「推動走路(暴露/介入)」對「民眾健康體能」的「影響(因果)」」——最適當的是(C)『「前瞻性世代追蹤法(cohort study;依「有無走路習慣」分組，「前瞻追蹤」其健康體能的變化，可推論「走路→健康體能」的影響)」』。橫斷性調查無法看「影響(時序)」;回溯性個案對照是找病因;個案研究是深入個案。「看介入/暴露對結果的影響(前瞻)」用世代追蹤法。故 C 正確。","options":{"A":"橫斷性調查是同時測量，無法看影響的時序。","B":"回溯性個案對照是找疾病的危險因子。","C":"正確。前瞻性世代追蹤法可了解走路對健康體能的影響。","D":"個案研究法是深入探討個案。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"103030-N5-71":{"quick":"糖尿病失明獨居老太太、安排門診、入住安養機構＝發現個案①、追蹤檢查治療③、監護性照護④。","detail":{"background":"社區護理師「篩檢「發現」糖尿病失明的獨居老太太→「安排門診(追蹤治療)」→協助「入住安養機構(監護性照護)」」——運用慢性病防治的策略:(1)「發現個案(篩檢發現)」;(3)「追蹤檢查治療(安排門診)」;(4)「監護性照護(入住安養機構，提供持續的監護照顧)」。而(2)『復健』與此情境不符(未提及復健)。故正確為①③④(選 C)。發現個案＋追蹤治療＋監護性照護(機構)。","options":{"A":"123：含②(復健，未提及)，錯誤。","B":"124：含②、缺③，錯誤。","C":"正確。發現個案①、追蹤檢查治療③、監護性照護④。","D":"234：含②、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"103030-N5-75":{"quick":"預防性健康服務的內容「錯誤」者＝職業安全與衛生。","detail":{"background":"預防性健康服務的內容，「錯誤(不屬於)」者為(C)『「職業安全與衛生」』——「職業安全與衛生」屬「「職業衛生(勞工安全衛生)」」的範疇，「不在「(一般的)「預防性健康服務」」的標準內容」中。其他屬於預防性健康服務:A 預防接種、B 家庭計畫、D 性病防治(以及健康檢查、衛生教育等)。故本題選錯誤者為 C。職業安全與衛生屬職業衛生範疇，非一般預防性健康服務的內容。","options":{"A":"預防接種是預防性健康服務的內容。","B":"家庭計畫是預防性健康服務的內容。","C":"正確(本題選錯誤者)。職業安全與衛生屬職業衛生範疇。","D":"性病防治是預防性健康服務的內容。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"103030-N5-76":{"quick":"骨質密度篩檢敏感度87%＝87%的骨質疏鬆個案，篩檢結果為陽性。","detail":{"background":"敏感度(sensitivity)＝「「實際「有病(骨質疏鬆)」者」中，被「正確篩檢為「陽性」」的比率」。故敏感度87%代表(B)『「87%的「骨質疏鬆個案」，篩檢結果為「陽性」」』。其他錯誤:A『「陽性個案中87%有骨鬆」』是「「陽性預測值」」;C『骨鬆個案篩檢為「陰性」』是「偽陰性」;D『陰性個案中87%沒骨鬆』是「「陰性預測值」」。故 B 正確。敏感度＝有病者中被正確檢出陽性的比率。","options":{"A":"「陽性個案中87%有骨鬆」是陽性預測值。","B":"正確。87%的骨質疏鬆個案，篩檢結果為陽性。","C":"「骨鬆個案篩檢為陰性」是偽陰性。","D":"「陰性個案中87%沒骨鬆」是陰性預測值。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"103030-N5-77":{"quick":"社區肥胖防治的第一個步驟＝評估社區民眾減重的需求。","detail":{"background":"社區護理師進行肥胖防治，「第一個步驟」是(A)『「「評估社區民眾「減重的需求」」(先「了解對象的需求、現況」，才能據以設計課程、安排場所、邀請師資)』。設計課程、討論場所、邀請老師都是「評估需求「之後」」的步驟。健康計畫的第一步是「評估需求」。故 A 正確。社區健康計畫的第一步是評估對象的需求(與護理過程的評估對應)。","options":{"A":"正確。第一步是評估社區民眾減重的需求。","B":"設計課程是評估需求後的步驟。","C":"討論場所是後續步驟。","D":"邀請師資是後續步驟。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"103030-N5-78":{"quick":"講授法對成人衛教，聽眾持續注意力的時間最長約20~30分鐘。","detail":{"background":"以「講授(演講)法」對成年人進行衛生教育時，一般而言聽眾能「持續注意力」的時間「最長約(B)20~30分鐘」。超過此時間，注意力會明顯下降，故衛教講授宜「控制在20~30分鐘」並穿插互動。故 B 正確。成人講授的注意力時間約20~30分鐘，宜穿插互動以維持效果。","options":{"A":"10~15分鐘偏短，成人可維持較久。","B":"正確。成人聽講授的注意力時間最長約20~30分鐘。","C":"40~50分鐘過長，注意力已下降。","D":"60分鐘過長，注意力難以維持。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"103030-N5-79":{"quick":"衛生教育評價的資料收集方法「錯誤」者＝焦點團體適合用於異質性團體。","detail":{"background":"衛生教育評價的資料收集方法，「錯誤」者為(D)『「焦點團體適合用於「「異質性」團體」』——錯誤，「焦點團體(focus group)較適合用於「「「同質性」團體」」(成員背景相近，較能深入、聚焦地討論;異質性團體易意見分散、難聚焦)。其他正確:A 問卷較易獲得多數人資料，但需考量抽樣代表性;B 深度訪談收集深入的資料，但較無法推論至多數人;C 個案研究可全盤評估計畫的輸入、過程及結果。故本題選錯誤者為 D。焦點團體適合同質性團體，非異質性。","options":{"A":"問卷易獲多數人資料、需考量抽樣代表性，正確。","B":"深度訪談資料深入、較無法推論多數人，正確。","C":"個案研究可全盤評估輸入、過程及結果，正確。","D":"正確(本題選錯誤者)。焦點團體適合同質性團體，非異質性。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"103100-N5-44":{"quick":"PRECEDE 診斷的順序＝社會學診斷③→流行病學診斷④→行為和環境診斷②→教育與組織診斷①→行政與政策診斷⑤。","detail":{"background":"依 Green 的 PRECEDE 模式，確立健康需要的診斷順序是(B)『「社會學診斷③ → 流行病學診斷④ → 行為和環境診斷② → 教育與組織診斷① → 行政與政策診斷⑤」(34215)』——先了解「生活品質/社會問題(社會學)」，再找出相關的「健康問題(流行病學)」，再分析「行為與環境因素」，再分析「傾向/促成/增強因素(教育與組織)」，最後評估「行政與政策」。故正確順序為34215(選 B)。","options":{"A":"15324：順序錯誤。","B":"正確。社會學③→流行病學④→行為環境②→教育組織①→行政政策⑤。","C":"43152：順序錯誤(社會學應在最前)。","D":"21345：順序錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論","PRECEDE-PROCEED"]}},"103100-N5-57":{"quick":"健康促進概念的描述「錯誤」者＝著重於使人民沒有疾病或虛弱。","detail":{"background":"健康促進概念的描述，「錯誤」者為(C)『「著重於使人民「沒有疾病或虛弱」』——錯誤，「健康促進是「「積極地「增進健康、提升安適(wellbeing)、發揮潛能」」」，而「「不只是「消極地「沒有疾病或虛弱」」」(那是健康的「狹義」定義)。其他正確:A 疾病治療是治標，健康促進是治本;B 強調使人民能掌握健康的決定因素以增進健康;D 屬於三段五級的初段預防。故本題選錯誤者為 C。健康促進是積極增進健康，非只消極地沒有疾病。","options":{"A":"疾病治療是治標、健康促進是治本，正確。","B":"強調使人民掌握健康的決定因素以增進健康，正確。","C":"正確(本題選錯誤者)。健康促進是積極增進健康，非只沒有疾病。","D":"屬於三段五級的初段預防，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"103100-N5-59":{"quick":"「無法」加強心肺耐力者＝100公尺短跑。","detail":{"background":"依國民健康署建議，「無法」達到加強「心肺耐力」目的的活動是(C)『「100公尺「短跑」』——「短跑是「「無氧」運動(爆發力、速度)」，「無法「持續、有氧」地訓練「心肺耐力」」。其他可加強心肺耐力(屬「有氧、持續」運動):A 健走5公里、B 有氧舞蹈、D 水中大跨步走路15分鐘。故本題選無法者為 C。短跑是無氧運動，無法訓練心肺耐力;有氧持續運動才能。","options":{"A":"健走5公里是有氧運動，可加強心肺耐力。","B":"有氧舞蹈可加強心肺耐力。","C":"正確(本題選無法者)。100公尺短跑是無氧運動，無法加強心肺耐力。","D":"水中大跨步走路是有氧運動，可加強心肺耐力。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"103100-N5-60":{"quick":"教導青少年與同儕的溝通技巧，最適當的教學法＝角色扮演。","detail":{"background":"欲教導青少年「學習與同儕的「溝通技巧(人際互動、態度、技能)」」，最適當的教學法是(D)『「角色扮演(role play;讓青少年「實際「扮演情境中的角色」」，在「演練、體驗」中學習「溝通技巧、同理、態度」)』。講述法、個別指導、問答法偏向「知識的傳遞」，對「溝通技巧(人際互動)」的學習效果較差。「溝通技巧(情境互動)」適合角色扮演。故 D 正確。教溝通技巧(人際互動)宜用角色扮演。","options":{"A":"講述法偏向知識傳遞，對溝通技巧效果差。","B":"個別指導較難演練人際互動。","C":"問答法偏向知識的問答。","D":"正確。教青少年同儕溝通技巧，最適合角色扮演。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"103100-N5-69":{"quick":"停經後婦女骨質疏鬆的危險因子「錯誤」者＝體重過重。","detail":{"background":"停經後婦女骨質疏鬆的危險因子，「錯誤」者為(B)『「體重「過重」』——錯誤，「「體重「過重」」反而對骨質有「「保護」作用(較大的機械負荷刺激骨質)」;「「體重「過「輕」」」才是骨質疏鬆的危險因子。其他是危險因子:A 老化(停經後雌激素下降)、C 甲狀腺功能亢進(加速骨質流失)、D 缺乏運動(缺乏負重刺激)。故本題選錯誤者為 B。體重過輕才是骨鬆危險因子，體重過重反而保護骨質。","options":{"A":"老化(停經後雌激素下降)是危險因子。","B":"正確(本題選錯誤者)。體重過重保護骨質;體重過輕才是危險因子。","C":"甲狀腺功能亢進加速骨質流失，是危險因子。","D":"缺乏運動(缺乏負重刺激)，是危險因子。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"103100-N5-71":{"quick":"學生在學校氣喘發作的處置「錯誤」者＝關起門窗，避免吸入冷空氣。","detail":{"background":"學生在學校氣喘發作時的處置，「錯誤」者為(B)『「「關起門窗」，避免吸入冷空氣」』——錯誤，氣喘發作時應「保持「環境通風、空氣流通」、讓患者「採舒適坐姿、放鬆」」;「關起門窗(空氣不流通)」並非正確處置。其他正確:A 鼓勵學生補充水分(稀釋痰液);C 協助學生進行腹式呼吸(放鬆、改善呼吸);D 使用學生自備的支氣管擴張劑(緩解支氣管收縮)。故本題選錯誤者為 B。氣喘發作應保持通風、放鬆，非關門窗。","options":{"A":"鼓勵學生補充水分，正確。","B":"正確(本題選錯誤者)。應保持通風、放鬆，非關起門窗。","C":"協助學生進行腹式呼吸，正確。","D":"使用學生自備的支氣管擴張劑，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"103100-N5-72":{"quick":"健康促進學校的敘述「錯誤」者＝強調經由學校衛生政策的制定，達到由上而下的業務推動。","detail":{"background":"健康促進學校的敘述，「錯誤」者為(A)『「強調經由學校衛生政策的制定，達到「由「上而下」」的業務推動」』——錯誤，健康促進學校強調「「全校參與、「由「下而上」」、跨領域整合」」，而非「由上而下」的推動。其他正確:B 重視家長及社區的共同參與;C 強調學校環境的營造以增強課堂教學效果;D 強調健康促進計畫需整合於學校教育計畫中。故本題選錯誤者為 A。健康促進學校強調全員參與、由下而上，非由上而下。","options":{"A":"正確(本題選錯誤者)。健康促進學校強調全員參與、由下而上，非由上而下。","B":"重視家長及社區的共同參與，正確。","C":"強調學校環境的營造，正確。","D":"強調健康促進計畫整合於學校教育計畫中，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"103100-N5-76":{"quick":"糖尿病飲食代換「錯誤」者＝1顆蛋=1根香蕉。","detail":{"background":"糖尿病飲食的「食物代換(同類食物等量代換)」，「錯誤」者為(A)『「1顆「蛋」=1根「香蕉」」』——錯誤，「「蛋」屬「「豆魚蛋肉類(蛋白質)」」，「香蕉」屬「「水果類(醣類)」」，「「不同類」食物「不可代換」」。其他正確(同類代換):B 1個小蘋果=1個橘子(皆水果類);C 2碗熟麵條=1碗飯(皆主食/全穀雜糧類);D 1碗稀飯=半碗飯(皆主食類)。故本題選錯誤者為 A。蛋(蛋白質類)與香蕉(水果類)不同類，不可代換。","options":{"A":"正確(本題選錯誤者)。蛋(蛋白質類)與香蕉(水果類)不同類，不可代換。","B":"蘋果=橘子(皆水果類)，可代換。","C":"2碗麵=1碗飯(皆主食類)，可代換。","D":"1碗稀飯=半碗飯(皆主食類)，可代換。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"103100-N5-77":{"quick":"成人 BMI 大於27 即屬於肥胖。","detail":{"background":"依衛福部定義，成人「身體質量指數(BMI)「大於(≥)27」」即屬於(B)『「肥胖」』。對照:BMI 18.5~24為「正常」、24~27為「過重」、「≥27為「肥胖」」。故 B 正確。成人 BMI:正常18.5~24、過重24~27、肥胖≥27(與前述同類題一致)。","options":{"A":"BMI≥24是「過重」的下限，非肥胖。","B":"正確。成人 BMI≥27 屬於肥胖。","C":"30非我國成人肥胖的定義門檻。","D":"35非我國肥胖的定義門檻。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"103100-N5-78":{"quick":"測量腰圍的方法「錯誤」者＝在吸氣時量取腰圍。","detail":{"background":"測量腰圍的方法，「錯誤」者為(D)『「在「「吸氣」」時量取腰圍」』——錯誤，腰圍應在「「呼(吐)氣「結束」時(自然呼氣末)」」量取(吸氣時腹部擴張，會高估腰圍)。其他正確:A 除去腰部衣物後再測量;B 將皮尺置於兩側「骨盆上緣至肋骨下緣的中間點」測量;C 測量時皮尺緊貼、不擠壓皮膚。故本題選錯誤者為 D。腰圍應在呼氣末量取，非吸氣時。","options":{"A":"除去腰部衣物後再測量，正確。","B":"皮尺置於骨盆上緣至肋骨下緣的中間點，正確。","C":"皮尺緊貼、不擠壓皮膚，正確。","D":"正確(本題選錯誤者)。應在呼氣末量取，非吸氣時。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"103100-N5-79":{"quick":"6個月嬰兒添加副食品後腹瀉：建議暫停副食品的補充。","detail":{"background":"陳小弟(6個月、哺餵母乳)「添加副食品「後」開始腹瀉」——應建議媽媽(B)『「「暫停副食品」的補充(可能是對「新添加的副食品「不適應/過敏」」;先暫停，待腹瀉改善後再「「少量、單一、逐漸」嘗試」)』。其他不當:A『改配方奶』不需(母乳很好，且問題是副食品);C『減少餵奶量』不需(奶量無問題);D『服整腸藥』言之過早(應先找原因、暫停副食品)。故 B 正確。副食品後腹瀉，先暫停副食品(可能不適應)。","options":{"A":"問題是副食品，不需改配方奶(母乳很好)。","B":"正確。暫停副食品的補充(可能不適應/過敏)。","C":"奶量無問題，不需減少餵奶量。","D":"應先找原因、暫停副食品，非急著服藥。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"103100-N5-80":{"quick":"糖尿病民眾足部自我照顧「正確」者＝避免穿露趾鞋。","detail":{"background":"教導糖尿病民眾足部自我照顧，正確的是(A)『「「避免穿「露趾鞋」」(露趾鞋保護不足、易受傷;糖尿病人因神經與血管病變，足部受傷不易癒合，須穿「包覆、保護」的鞋)』。其他錯誤:B『冬天用「熱水袋」保暖雙腳』錯誤(神經病變「感覺遲鈍」，易「燙傷」);C『腳趾甲修剪成「弧形」』錯誤(應「「平剪」」，弧形易致「嵌甲、感染」);D『選鞋宜在「早上」試穿』錯誤(應在「「下午/傍晚(腳較腫脹時)」」試穿，較準確)。故 A 正確。糖尿病人應穿包覆式的鞋、避免露趾、避免熱水袋、平剪趾甲、下午選鞋。","options":{"A":"正確。避免穿露趾鞋(保護足部)。","B":"神經病變感覺遲鈍，熱水袋易燙傷。","C":"腳趾甲應平剪，弧形易致嵌甲感染。","D":"應在下午/傍晚(腳較腫)試穿鞋，非早上。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"104030-N5-57":{"quick":"渥太華宣言「健康促進」原則「不屬於」者＝發展高科技醫療設備。","detail":{"background":"渥太華宣言「健康促進」的原則(五大行動綱領)，「不屬於」者為(C)『「發展「高科技醫療設備」』——「發展高科技醫療設備」屬「「醫療」範疇」，「不是」健康促進的綱領。健康促進的綱領:A 創造有益健康的環境、B 發展個人技術及能力、D 強化社區行動能力(以及建立健康公共政策、調整健康服務取向)。故本題選不屬於者為 C。健康促進的綱領不含發展高科技醫療設備(與前述同類題一致)。","options":{"A":"創造有益健康的環境，是健康促進的原則。","B":"發展個人技術及能力，是健康促進的原則。","C":"正確(本題選不屬於者)。發展高科技醫療設備屬醫療，非健康促進原則。","D":"強化社區行動能力，是健康促進的原則。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"104030-N5-59":{"quick":"以「角色扮演」進行衛教，「不易達成」者＝可學習操作性技能。","detail":{"background":"以「角色扮演」進行衛生教育，「不易達成」者為(D)『「可學習「操作性技能」』——「角色扮演適合「「態度、價值、情境體驗、人際互動」」的學習，「「不易」用來學習「「操作性(動作)技能」」(操作技能應用「「示範與演練」」)。其他是角色扮演的優點:A 有助學員於特定情境中學習;B 有助價值判斷及態度培養;C 可激發學員的創造能力。故本題選不易達成者為 D。角色扮演適合態度/情境，操作技能宜用示範演練。","options":{"A":"有助學員於特定情境中學習，是角色扮演的優點。","B":"有助價值判斷及態度培養，是優點。","C":"可激發學員的創造能力，是優點。","D":"正確(本題選不易達成者)。操作性技能應用示範演練，非角色扮演。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"104030-N5-66":{"quick":"原住民成人預防保健方案＝55歲以上原住民每年補助1次。","detail":{"background":"依民國101年衛福部公告，原住民成人預防保健方案，正確的是(A)『「「55歲」以上原住民，「每年」補助1次(原住民因平均餘命較短，將成人預防保健的年齡放寬至55歲、每年1次;一般人是65歲以上每年1次、40~64歲每3年1次)』。故 A 正確。原住民55歲以上、每年補助1次成人預防保健(與前述同類題一致)。","options":{"A":"正確。55歲以上原住民，每年補助1次。","B":"原住民放寬至55歲、且為每年(非每半年)。","C":"原住民放寬至55歲，非45歲。","D":"是每年(非每半年)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"104030-N5-68":{"quick":"集乳哺乳權益「違背規定」者＝以集乳方式非親自哺乳，故不包含性別工作平等法的保障。","detail":{"background":"依「性別工作平等法」，保障哺育母乳權益，「違背規定」者為(C)『「以「集乳」方式、非親自哺乳，故「「不包含」」性別工作平等法的保障範圍」』——錯誤，「「「集乳(擠乳儲存)」也「受保障」」(哺(集)乳時間的保障「不限「親自哺乳」」，「集乳」亦在保障範圍)。其他正確:A 寶寶未滿1歲前，除休息時間外，雇主應每日另給「集乳時間2次、每次30分鐘」(現行延長為2歲前、每次60分鐘等，依修法);B 集乳時間視為工作時間、不可扣薪扣時;D 父親(配偶)亦可依規定申請(育嬰/相關)時間。故本題選違背者為 C。集乳亦受性別工作平等法保障。","options":{"A":"寶寶未滿1歲前另給集乳時間，是保障規定。","B":"集乳時間視為工作時間、不可扣薪，是保障規定。","C":"正確(本題選違背者)。集乳亦受保障，「不包含」是違背規定。","D":"(依規定)配偶亦可申請相關時間。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生","性別工作平等法"]}},"104030-N5-70":{"quick":"高血壓無症狀仍須規律服降血壓藥＝限制殘障(第三段預防)的概念。","detail":{"background":"員工張先生「已診斷高血壓、需服藥、但「目前無症狀」」，護理師表示「需繼續規律服用」——其依據的概念是(D)『「限制殘障(disability limitation;對「已患病者」，「持續治療、控制病情」，以「「預防併發症、減少失能(殘障)」」)」屬「第三段預防」』。早期預防、特殊保護是第一段;早期復健偏向復健。「對已患病的高血壓持續服藥控制、防併發症」屬限制殘障(第三段)。故 D 正確。對已診斷的慢性病持續治療、防併發症，屬限制殘障(第三段)。","options":{"A":"早期預防是第一段預防(疾病發生前)。","B":"早期復健是復健的範疇。","C":"特殊保護是第一段預防(如疫苗)。","D":"正確。持續服藥控制、防併發症，屬限制殘障(第三段預防)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"104030-N5-72":{"quick":"學校護理師最需優先處理＝學童發燒人數逐日增加。","detail":{"background":"學校護理師最需「優先處理」的是(A)『「學童「發燒人數「逐日增加」」(疑似「傳染病群聚」，「具急迫性、傳播風險」，須立即處理、防止擴散)』。其他(B 近視人數增加、C 肥胖比率高、D 齲齒比率高)是「慢性的健康問題」，不具「發燒群聚」的急迫性與傳播風險。故 A 正確。傳染病群聚(發燒人數增加)的急迫性使其優先處理(與前述同類題一致)。","options":{"A":"正確。學童發燒人數逐日增加(疑似傳染病群聚)，應優先處理。","B":"近視人數增加是慢性問題，非急迫。","C":"肥胖比率高是慢性問題，非急迫。","D":"齲齒比率高是慢性問題，非急迫。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"104030-N5-73":{"quick":"幼稚園兒童偏食的健康飲食課程內容＝均衡飲食。","detail":{"background":"幼稚園兒童「午餐「偏食」」，安排健康飲食課程，最適當的內容是(B)『「均衡飲食(教導「攝取「各類食物、不偏食」」，符合「成長中幼兒「均衡營養」的需求)』。低油低鹽、低熱量高纖維、符合身高體重熱量是針對「特定族群/目的(如減重、慢性病)」，「對「成長中的幼兒(偏食)」應強調「「均衡飲食(不偏食、各類都吃)」」。故 B 正確。對偏食的幼兒，健康飲食課程應強調均衡飲食。","options":{"A":"低油低鹽是針對慢性病/特定族群。","B":"正確。對偏食的幼兒，應強調均衡飲食(不偏食)。","C":"低熱量高纖維是針對減重。","D":"符合身高體重熱量偏向個別化的熱量控制，非針對偏食的核心。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"104030-N5-74":{"quick":"預防骨質疏鬆「正確」者＝負重運動比有氧運動更有助預防骨質疏鬆。","detail":{"background":"預防骨質疏鬆，正確的是(D)『「「負重(承重)運動」比有氧運動「更有助」預防骨質疏鬆(「負重運動(如健走、慢跑、重訓)」對骨骼有「機械刺激」，能「促進骨質生成」;一般「有氧(如游泳)」的承重刺激較少)』。其他錯誤:A『更年期婦女骨鬆「重點在「預防」」』不夠精確(更年期已是高風險，重點是「「預防「並」積極處理(含治療)」」);B『體重與骨鬆「無關」』錯誤(體重過輕是危險因子);C『「大量」攝取「動物蛋白」助鈣吸收』錯誤(過多動物蛋白反而「增加鈣流失」)。故 D 正確。負重運動比有氧運動更有助於預防骨質疏鬆。","options":{"A":"更年期已是高風險，重點是預防並積極處理。","B":"體重與骨鬆有關(體重過輕是危險因子)。","C":"過多動物蛋白反而增加鈣流失，非大量攝取。","D":"正確。負重運動比有氧運動更有助預防骨質疏鬆。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"104030-N5-79":{"quick":"使用贈品提高糖尿病防治計畫的參與執行率＝誘因活動。","detail":{"background":"推動糖尿病防治計畫，「使用「贈品」提高參與者的執行率」——是運用(C)『「誘因(incentive)活動(以「獎勵、贈品、好處」等「誘因」，提高民眾「參與、執行」健康行為的「動機」)』。環境改變活動是改善環境;組織文化活動是改變組織文化;社區支持活動是建立社區支持。「以贈品(獎勵)提高執行率」屬誘因活動。故 C 正確。以贈品/獎勵提高執行率屬誘因活動。","options":{"A":"環境改變活動是改善環境設施。","B":"組織文化活動是改變組織的文化。","C":"正確。以贈品(獎勵)提高執行率，是誘因活動。","D":"社區支持活動是建立社區的支持。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"104100-N5-56":{"quick":"健康促進介入措施的敘述「錯誤」者＝個案以被動參與解決健康問題。","detail":{"background":"健康促進介入措施的敘述，「錯誤」者為(A)『「個案以「「被動」參與」解決健康問題」』——錯誤，健康促進強調「個案「「「主動」參與、增能(empowerment)、掌握自己的健康」」，而非「被動參與」。其他正確:B 提供知識、協助個案做出健康照護的合理選擇;C 協助個案發展能力和技巧以達到生活環境改變;D 為個案爭取較佳且能控制的環境以促進健康和安適。故本題選錯誤者為 A。健康促進強調個案的主動參與與增能，非被動參與。","options":{"A":"正確(本題選錯誤者)。健康促進強調主動參與與增能，非被動參與。","B":"提供知識、協助做合理選擇，正確。","C":"協助發展能力和技巧以改變環境，正確。","D":"為個案爭取較佳的環境，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"104100-N5-57":{"quick":"健康促進未來方向「錯誤」者＝減少政治參與，以達社會平等。","detail":{"background":"依歷年全球健康促進大會，健康促進的未來方向，「錯誤」者為(B)『「「「減少」政治參與」，以達社會平等」』——錯誤，健康促進強調「「「增加」政治承諾與參與(political commitment)」」、推動政策與立法，以促進健康公平，而非「減少政治參與」。其他正確:A 發展健康促進的實證科學基礎;C 增強社區的行動能力;D 推動相關法案的修訂。故本題選錯誤者為 B。健康促進應增加政治承諾與參與，非減少。","options":{"A":"發展健康促進的實證科學基礎，是未來方向。","B":"正確(本題選錯誤者)。應增加政治承諾與參與，非減少政治參與。","C":"增強社區的行動能力，是未來方向。","D":"推動相關法案的修訂，是未來方向。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"104100-N5-58":{"quick":"「太太提醒我執行糖尿病飲食及足部照顧」＝健康信念模式的「行動的線索」。","detail":{"background":"依健康信念模式，糖尿病男性說「「太太「提醒」我執行糖尿病飲食及足部照顧」」——屬(A)『「行動的線索(cues to action;「他人的「提醒、建議」」是「觸發/促使」個人採取健康行為的「線索」)」』。易感性認知是覺得自己會得病;嚴重性認知是覺得後果嚴重;障礙認知是行動的阻礙。「太太的提醒(促發行動)」屬行動的線索。故 A 正確。「他人的提醒」屬健康信念模式的行動的線索。","options":{"A":"正確。「太太的提醒」(促發行動)，屬行動的線索。","B":"易感性認知是覺得自己可能得病。","C":"嚴重性認知是覺得疾病後果嚴重。","D":"障礙認知是對行動阻礙的認知。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"104100-N5-59":{"quick":"「怕控制不好會導致截肢或死亡」＝健康信念模式的「疾病嚴重性認知」。","detail":{"background":"依健康信念模式，病人說「我「怕」糖尿病控制不好會「導致截肢或死亡(嚴重的後果)」」——屬(C)『「疾病「嚴重性(severity)」認知(個人對「疾病「後果的「嚴重程度」(併發症、失能、死亡)」」的主觀認知)」』。行動的線索是提醒;易感性認知是得病機率;障礙認知是行動阻礙。「怕導致截肢/死亡(後果嚴重)」屬嚴重性認知。故 C 正確。「覺得疾病後果嚴重(截肢/死亡)」屬嚴重性認知。","options":{"A":"行動的線索是觸發行動的提醒。","B":"易感性認知是對得病機率的認知。","C":"正確。「怕導致截肢或死亡」(後果嚴重)，屬疾病嚴重性認知。","D":"障礙認知是對行動阻礙的認知。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"104100-N5-70":{"quick":"PRECEDE-PROCEED 的「增強(reinforcing)因素」＝媽媽提醒學童餐後刷牙①、餐後老師帶領學童一起潔牙④。","detail":{"background":"依 PRECEDE-PROCEED 模式，屬「增強(reinforcing)因素(行為「發生「後」」，「「他人(家長、老師、同儕)的「回饋、鼓勵、獎勵、榜樣」」」使行為「「持續/強化」」)」的是:(1)「「媽媽提醒」學童餐後刷牙(家長的提醒/支持)」;(4)「餐後「老師帶領」學童一起潔牙(老師的帶領/榜樣)」。而(2)教導潔牙方法是「「促成因素(技能)」」;(3)張貼口腔衛生海報是「「傾向因素(提供知識/態度)」」。故正確為①④(選 B)。增強因素是他人(家長/老師)的回饋、鼓勵、榜樣。","options":{"A":"12：含②(教導方法，屬促成因素)，錯誤。","B":"正確。媽媽提醒①、老師帶領④(他人的回饋/榜樣)，屬增強因素。","C":"23：②促成、③傾向，皆非增強因素。","D":"34：含③(海報，屬傾向因素)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生","PRECEDE-PROCEED"]}},"104100-N5-71":{"quick":"嚴格規範師生騎乘機車戴安全帽以減少事故傷害＝特殊保護(第二級)。","detail":{"background":"縣府「嚴格規範要求師生「騎或乘坐機車「戴安全帽」」，以「減少事故傷害」」——屬預防概念中的(C)『「特殊保護(specific protection;對「特定的危害(車禍)」採取「「特定的防護措施(戴安全帽)」」，「預防傷害的「發生」」，屬「第一段「第二級」」)』。限制殘障是第三段;健康促進是第一段第一級(一般性);早期診斷治療是第二段。「戴安全帽(特定防護)」屬特殊保護。故 C 正確。戴安全帽(特定防護、預防傷害)屬特殊保護(第二級)。","options":{"A":"限制殘障是第三段預防(對已患病者)。","B":"健康促進是第一段第一級(一般性增進健康)。","C":"正確。戴安全帽(特定防護)屬特殊保護(第二級)。","D":"早期診斷早期治療是第二段預防。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"104100-N5-73":{"quick":"渥太華憲章「發展個人技巧」的策略＝教導社區婦女學習乳房自我檢查。","detail":{"background":"渥太華憲章五大行動綱領中「發展個人技巧(develop personal skills;透過「教育、技能訓練」，「增進個人「健康相關的「知識與技能」」」)」的策略是(B)『「教導社區婦女「學習「乳房自我檢查(技能)」」』。其他屬別的綱領:A 職場規定健檢、C 學校設健康網頁是「環境/服務」面;D 社區設健康飲食餐廳是「創造支持性環境」。「教導技能(乳房自檢)」屬發展個人技巧。故 B 正確。教導個人技能(乳房自檢)屬發展個人技巧。","options":{"A":"職場規定健檢偏向制度/服務面。","B":"正確。教導婦女乳房自我檢查(技能)，屬發展個人技巧。","C":"學校設健康網頁偏向資訊/服務面。","D":"社區設健康飲食餐廳屬創造支持性環境。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"105030-N5-53":{"quick":"取締酒駕以降低意外＝渥太華憲章的「建立健康的公共政策」。","detail":{"background":"政府「「取締酒駕(立法、執法)」」以降低意外——屬渥太華憲章的(A)『「建立健康的「公共政策」(透過「立法、政策、執法」等手段，營造有利健康/安全的環境)」』。創造支持性環境是改善硬體環境;強化社區行動是社區參與;發展個人技巧是衛教。「立法/執法(取締酒駕)」屬建立健康公共政策。故 A 正確。取締酒駕(立法執法)屬建立健康的公共政策。","options":{"A":"正確。取締酒駕(立法執法)，屬建立健康的公共政策。","B":"創造支持性環境是改善硬體環境。","C":"強化社區行動是促進社區參與。","D":"發展個人技巧是衛教與技能培養。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"105030-N5-57":{"quick":"Ross & Mico 衛教計畫目標的要項＝人、行為、結果、情境、標準。","detail":{"background":"依 Ross & Mico 衛生教育計畫模式，一個完整的「計畫目標」應包含(A)『「「人(對象)、行為、結果、情境、標準」五要項」』(例:「家屬(人)在家中(情境)為中風個案做兩次完整(標準)的手部復健運動(行為)，以維持關節活動度(結果)」)。故 A 正確。計畫目標的五要項:人、行為、結果、情境、標準。","options":{"A":"正確。計畫目標包含人、行為、結果、情境、標準。","B":"含「時間、意願」，非標準的五要項。","C":"含「工具、動機」，非標準的五要項。","D":"含「信念、態度」，非標準的五要項。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"105030-N5-58":{"quick":"跨理論模式的描述「錯誤」者＝處於行動期的個案不可能再回復到意圖期。","detail":{"background":"跨理論模式(改變階段:無意圖期→意圖期→準備期→行動期→維持期)的描述，「錯誤」者為(D)『「處於「行動期」的個案「「不可能」再回復」到意圖期」』——錯誤，「行為改變「「不是「直線」前進」，個案「「可能「「復發(relapse)」」、退回「先前的階段」」(改變是「「螺旋式」」的)。其他正確:A 「意識覺醒」有助於無意圖期個案的改變;B 意圖期的個案已認同有行為改變的需要;C 對準備期的個案應提供必要的資源。故本題選錯誤者為 D。改變可能復發、退回先前階段，非不可能回復。","options":{"A":"「意識覺醒」有助無意圖期個案的改變，正確。","B":"意圖期的個案已認同有改變的需要，正確。","C":"對準備期的個案應提供必要資源，正確。","D":"正確(本題選錯誤者)。改變可能復發、退回先前階段，非不可能回復。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"105030-N5-71":{"quick":"對膽固醇異常大專生的指導「錯誤」者＝建議不吃早餐以減輕體重。","detail":{"background":"學校護理師對膽固醇異常的大專生指導，「錯誤」者為(A)『「建議「不吃早餐」以減輕體重」』——錯誤，「「不吃早餐」是「不健康的減重方式」(易影響代謝、暴食);應「「均衡飲食、規律三餐、健康減重」」。其他正確:B 避免抽菸;C 養成規律運動習慣;D 攝取均衡飲食。故本題選錯誤者為 A。不吃早餐是不健康的做法，應均衡飲食、規律三餐。","options":{"A":"正確(本題選錯誤者)。不吃早餐不健康，應均衡飲食、規律三餐。","B":"避免抽菸，正確。","C":"養成規律運動習慣，正確。","D":"攝取均衡飲食，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"105030-N5-72":{"quick":"青春期學生的健康飲食建議「不適當」者＝乳品類宜選擇全脂乳製品。","detail":{"background":"青春期學生的健康飲食建議，「不適當」者為(B)『「乳品類宜選擇「全脂」乳製品」』——錯誤，應建議選擇「「低脂或脫脂」乳製品」(減少飽和脂肪的攝取);但須注意攝取足夠的「鈣質」(青春期骨骼發育需要)。其他適當:A 宜選擇未精製的全穀類;C 蔬菜類每日至少3份;D 水果類每日至少2份。故本題選不適當者為 B。乳品宜選低脂/脫脂，非全脂。","options":{"A":"宜選擇未精製的全穀類，適當。","B":"正確(本題選不適當者)。乳品宜選低脂/脫脂，非全脂。","C":"蔬菜類每日至少3份，適當。","D":"水果類每日至少2份，適當。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"105030-N5-73":{"quick":"青少年第2型糖尿病的促成因素「錯誤」者＝過敏體質。","detail":{"background":"青少年第2型糖尿病的促成(危險)因素，「錯誤」者為(D)『「「過敏體質」』——「過敏體質「與「第2型糖尿病」「無關」」，「不是」其危險因子。其他是危險因子:A 糖尿病家族史、B 身體活動量過少、C 體重過重(肥胖)。故本題選錯誤者為 D。過敏體質與第2型糖尿病無關，非危險因子。","options":{"A":"糖尿病家族史是危險因子。","B":"身體活動量過少是危險因子。","C":"體重過重(肥胖)是危險因子。","D":"正確(本題選錯誤者)。過敏體質與第2型糖尿病無關。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"105030-N5-77":{"quick":"臺灣心臟病和糖尿病防治工作困難的原因「錯誤」者＝區域性醫療院所普遍不足。","detail":{"background":"臺灣心臟病和糖尿病防治工作困難的原因，「錯誤」者為(D)『「「區域性醫療院所「普遍「不足」」」』——錯誤，「臺灣的「醫療院所「相當「普及、充足」」(可近性高)，「不是」防治困難的原因。其他是真正的困難:A 民眾認知不足、無法建立健康的生活型態;B 疾病本身錯綜複雜、彼此影響;C 醫療院所對保健(預防)工作參與度不夠。故本題選錯誤者為 D。臺灣醫療院所充足，非防治困難的原因。","options":{"A":"民眾認知不足、無法建立健康生活型態，是困難。","B":"疾病錯綜複雜、彼此影響，是困難。","C":"醫療院所對保健工作參與度不夠，是困難。","D":"正確(本題選錯誤者)。臺灣醫療院所充足，非防治困難的原因。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"105030-N5-78":{"quick":"成人代謝症候群診斷標準之一：空腹血糖值至少超過100 mg/dL。","detail":{"background":"成人「代謝症候群」的診斷標準之一是「「空腹血糖「≥100 mg/dL」」(空腹血糖偏高)」。故 B 正確。(代謝症候群5項:腹部肥胖(腰圍男≥90、女≥80)、血壓≥130/85、「空腹血糖≥100」、三酸甘油脂≥150、HDL(男<40、女<50);符合3項以上即診斷。)","options":{"A":"95 mg/dL非代謝症候群的血糖標準。","B":"正確。空腹血糖≥100 mg/dL是代謝症候群的標準之一。","C":"105 mg/dL非標準值。","D":"110 mg/dL高於100的標準(空腹血糖≥126才是糖尿病)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"105030-N5-79":{"quick":"骨質密度 T 值「≥-1」時表示骨質正常。","detail":{"background":"成年人骨質密度(T-score)的判讀:「「T值「≥-1」」為「「正常」」;-1 ~ -2.5 為「骨質「缺乏(osteopenia)」」;「≤-2.5」為「骨質「疏鬆(osteoporosis)」」。故當 T 值「≥(C)-1」時表示骨質正常。故 C 正確。T值≥-1正常;-1~-2.5骨質缺乏;≤-2.5骨質疏鬆。","options":{"A":"1非判讀的分界值。","B":"0雖>-1但分界值是-1。","C":"正確。T值≥-1時骨質正常。","D":"-2.5(含以下)是骨質疏鬆的分界。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"105090-N5-45":{"quick":"以「家庭戶訪視」了解65歲以上居民骨鬆盛行率，可能造成「選樣偏差」。","detail":{"background":"以「「家庭戶訪視」」的方式了解「65歲以上居民骨質疏鬆盛行率」——可能造成(C)『「選樣(選擇)偏差(selection bias;「家訪「只能訪到「在家的人」」，「常「外出、上班、住院、機構」的居民「被遺漏」，使「樣本「不具代表性」」)」』。訊息偏差是資料測量的誤差;診斷偏差是診斷標準的誤差;干擾偏差是干擾因子。「家訪遺漏不在家者(樣本不具代表性)」屬選樣偏差。故 C 正確。家訪只訪到在家者，造成選樣偏差(樣本不具代表性)。","options":{"A":"訊息偏差是資料測量/記憶的誤差。","B":"診斷偏差是診斷標準/方法的誤差。","C":"正確。家訪只訪到在家者(樣本不具代表性)，屬選樣偏差。","D":"干擾偏差是干擾因子造成的誤差。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學"]}},"105090-N5-57":{"quick":"利用媒體將健康資訊傳達給社會大眾＝健康傳銷(社會行銷)。","detail":{"background":"衛生教育過程中，「利用「媒體」將健康資訊「傳達給「社會大眾」」」——是(C)『「健康(社會)行銷/傳銷(health/social marketing;運用「行銷、媒體傳播」的手法，「向「大眾」推廣健康觀念與行為」)」』。示範教學法、展覽法、價值澄清法是「小團體/個別」的教學方法，非針對「社會大眾的媒體傳播」。「媒體向大眾傳播健康資訊」屬健康傳銷。故 C 正確。利用媒體向大眾傳播健康資訊屬健康(社會)行銷。","options":{"A":"示範教學法是小團體/個別的技能教學。","B":"展覽法是定點的視覺展示。","C":"正確。利用媒體向社會大眾傳達健康資訊，屬健康傳銷(社會行銷)。","D":"價值澄清法是引導釐清價值的方法。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"105090-N5-65":{"quick":"應避免接觸紫藥水及樟腦丸的新生兒疾病＝葡萄糖-6-磷酸鹽去氫酶缺乏症(G-6-PD)。","detail":{"background":"(D)『「葡萄糖-6-磷酸鹽去氫酶缺乏症(G-6-PD 缺乏，俗稱「蠶豆症」)」的新生兒，應「避免接觸「紫藥水(龍膽紫)、樟腦丸(萘丸)、蠶豆」等「氧化性物質」」(這些會誘發「「溶血」)』。其他(A 苯酮尿症、B 高胱胺酸尿症、C 半乳糖血症)是「胺基酸/醣類代謝異常」，須「飲食控制」，與「避免氧化性物質」無關。故 D 正確。G-6-PD 缺乏(蠶豆症)須避免紫藥水、樟腦丸、蠶豆等氧化性物質(防溶血)。","options":{"A":"苯酮尿症(PKU)須限制苯丙胺酸飲食，非避免氧化物。","B":"高胱胺酸尿症須飲食控制，非避免氧化物。","C":"半乳糖血症須避免乳糖/半乳糖，非避免氧化物。","D":"正確。G-6-PD 缺乏(蠶豆症)須避免紫藥水、樟腦丸等氧化性物質。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"105090-N5-71":{"quick":"校園糖尿病學童照護的描述「錯誤」者＝以胰島素治療的學生應避免上體育課。","detail":{"background":"校園糖尿病學童照護，「錯誤」者為(C)『「以胰島素治療的學生「應「避免」上體育課」』——錯誤，「糖尿病學童「「可以(應)」「適度「運動(上體育課)」」(運動有助血糖控制)，「不需「避免」」;但須「注意運動前後的血糖、預防低血糖(備妥升糖食物)」。其他正確:A 宜在學童及家長同意後向同班同學衛教糖尿病;B 校園低血糖好發於餐前及運動後;D 在校內懷疑有低血糖應先測量血糖。故本題選錯誤者為 C。糖尿病學童可運動，非避免體育課(須防低血糖)。","options":{"A":"經同意後向同班同學衛教糖尿病，正確。","B":"校園低血糖好發於餐前及運動後，正確。","C":"正確(本題選錯誤者)。糖尿病學童可運動，非避免體育課(須防低血糖)。","D":"懷疑低血糖應先測量血糖，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"105090-N5-76":{"quick":"慢性腎臟病的高危險群「錯誤」者＝體重過輕者。","detail":{"background":"慢性腎臟病的高危險群，「錯誤」者為(C)『「「體重「過輕」」者』——錯誤，「「「肥胖」」才是慢性腎臟病的危險因子，「「體重「過輕」」「不是」。其他是高危險群:A 糖尿病患者(糖尿病腎病變)、B 痛風患者(尿酸腎病變)、D 高血壓患者(高血壓腎硬化)。故本題選錯誤者為 C。肥胖才是慢性腎臟病危險因子，體重過輕非。","options":{"A":"糖尿病患者(糖尿病腎病變)，是高危險群。","B":"痛風患者(尿酸腎病變)，是高危險群。","C":"正確(本題選錯誤者)。肥胖才是危險因子，體重過輕非高危險群。","D":"高血壓患者(高血壓腎硬化)，是高危險群。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"105090-N5-77":{"quick":"腎臟保健「三少」「錯誤」者＝少熱量(三少為少鹽、少糖、少油)。","detail":{"background":"國民健康署腎臟保健的「三少」是「「少鹽、少糖、少油」」。「錯誤」者為(A)『「「少熱量」』——「少熱量」不在「三少」之列。其他正確(屬三少):B 少鹽、C 少糖、D 少油。故本題選錯誤者為 A。腎臟保健三少:少鹽、少糖、少油(不含少熱量)。","options":{"A":"正確(本題選錯誤者)。三少是少鹽、少糖、少油，不含少熱量。","B":"少鹽是三少之一。","C":"少糖是三少之一。","D":"少油是三少之一。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"105090-N5-78":{"quick":"糖尿病的診斷依據之一：空腹8小時以上血糖值≥126 mg/dL。","detail":{"background":"糖尿病的診斷依據之一是「「空腹(8小時以上)血糖「≥126 mg/dL」」」。故 C 正確。(糖尿病診斷:空腹血糖≥126、或飯後2小時/口服葡萄糖耐受≥200、或糖化血色素 HbA1c≥6.5%、或典型症狀+隨機血糖≥200;空腹100~125為「前期糖尿病」。)","options":{"A":"100 mg/dl是前期糖尿病的下限。","B":"110 mg/dl屬前期糖尿病範圍。","C":"正確。空腹血糖≥126 mg/dl是糖尿病的診斷依據之一。","D":"140 mg/dl高於126(且是飯後2小時的偏高值參考)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"105090-N5-79":{"quick":"預防骨質疏鬆的方法「正確」者＝多攝取豆類及深綠色蔬菜以補充鈣質。","detail":{"background":"教導中年婦女預防骨質疏鬆，正確的是(C)『「「多攝取「豆類及深綠色蔬菜」以補充「鈣質」」(豆製品、深綠色蔬菜、乳製品、小魚乾是良好的「鈣」來源;鈣有助骨質)』。其他錯誤:A『「減少運動量」以降低膝蓋負重』錯誤(應「「增加「負重運動」」以刺激骨質);B『穿「束腹」避免骨骼受傷』錯誤(束腹無法預防骨鬆，反而影響活動);D『服用鈣片可「有效」預防骨質流失』不夠精確(鈣片只是補充之一，須「「均衡飲食＋負重運動＋維生素D＋日照」」綜合預防，且過量補充無益)。故 C 正確。多攝取豆類、深綠色蔬菜補鈣，並配合負重運動。","options":{"A":"應增加負重運動以刺激骨質，非減少運動量。","B":"束腹無法預防骨鬆，反影響活動。","C":"正確。多攝取豆類及深綠色蔬菜補充鈣質。","D":"鈣片只是補充之一，須配合運動、維生素D等綜合預防。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"105090-N5-80":{"quick":"中老年慢性病預防的內容「錯誤」者＝每日膽固醇攝取量不宜超過400毫克。","detail":{"background":"教導中老年慢性病預防的內容，「錯誤」者為(A)『「每日「膽固醇」攝取量不宜超過「400毫克」』——錯誤，每日膽固醇攝取量建議「「<300毫克」」(非400毫克)。其他正確:B 每週至少累計150分鐘的中度身體運動;C 每日食鹽攝取量不宜超過6公克(鈉<2400毫克);D 每週累計75分鐘的費力身體運動。故本題選錯誤者為 A。每日膽固醇宜<300毫克，非400毫克。","options":{"A":"正確(本題選錯誤者)。每日膽固醇宜<300毫克，非400毫克。","B":"每週至少150分鐘中度運動，正確。","C":"每日食鹽不宜超過6公克，正確。","D":"每週累計75分鐘費力運動，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106030-N5-50":{"quick":"社區健康計畫目標中「最容易被評值」者＝國小學童能說出三種預防流感的方法。","detail":{"background":"訂定社區健康計畫目標時，「最容易被「評值」」者為(D)『「國小學童能「說出三種」預防流感的方法」(目標「「具體、可觀察、可測量」(數出「三種」方法)」，符合 SMART 原則，最容易評值)』。其他較難評值:A『問題解決能力「提升」』、B『「踴躍」參與』、C『「認同」重要性』——「能力、踴躍、認同」都較「抽象、主觀」，不易客觀測量。故 D 正確。可測量、具體的目標(說出三種方法)最容易評值。","options":{"A":"「問題解決能力提升」抽象，不易客觀評值。","B":"「踴躍參與」主觀，不易測量。","C":"「認同重要性」抽象，不易測量。","D":"正確。「能說出三種方法」具體可測量，最容易評值。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"106030-N5-56":{"quick":"四大非傳染性疾病的共同危險因素＝吸菸、不當飲酒、缺乏運動、不健康飲食。","detail":{"background":"四大非傳染性疾病(癌症、糖尿病、心血管疾病、慢性呼吸道疾病)的「共同「危險因素(可改變的「行為」)」是(A)『「「吸菸、不當飲酒、缺乏運動(身體活動不足)、不健康飲食」(WHO 指出的四大「共同行為危險因子」)」』。其他選項摻入「睡眠、憂鬱、體適能、空氣污染」等，雖有影響但非 WHO 公認的「四大共同行為危險因子」。故 A 正確。四大非傳染病的共同危險因子:吸菸、不當飲酒、缺乏運動、不健康飲食。","options":{"A":"正確。吸菸、不當飲酒、缺乏運動、不健康飲食(WHO 四大共同行為危險因子)。","B":"含睡眠、憂鬱，非 WHO 公認的四大共同因子。","C":"含憂鬱、體適能，非標準的四大共同因子。","D":"含空氣污染(環境因子)，非四大「行為」共同因子。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106030-N5-57":{"quick":"PRECEDE 模式中「流行病學診斷」的主要目的＝確定健康問題。","detail":{"background":"Green 的 PRECEDE 模式中，「「流行病學診斷」」的主要目的是(B)『「「確定「健康問題」(找出「影響生活品質的「主要健康問題」」，並以「流行病學資料(發生率、死亡率)」量化)」』。評估生活品質是「社會學診斷」;分析問題行為的影響因素是「教育與組織診斷」;設計教育介入是後續的執行。「確定健康問題」是流行病學診斷的目的。故 B 正確。流行病學診斷是確定(量化)主要的健康問題。","options":{"A":"評估生活品質是社會學診斷的目的。","B":"正確。流行病學診斷的目的是確定(量化)健康問題。","C":"分析問題行為的影響因素是教育與組織診斷。","D":"設計教育介入是後續的執行步驟。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論","PRECEDE-PROCEED"]}},"106030-N5-70":{"quick":"學童倒下的急救處置「錯誤」者＝第三步驟以15:1比例進行心臟按壓與吹氣。","detail":{"background":"學童在校內倒下的急救處置，「錯誤」者為(D)『「第三步驟以「15:1」比例進行心臟按壓與吹氣」』——錯誤，成人/兒童「單人」CPR 的「按壓與吹氣比例」是「「30:2」」(非15:1;「15:2」是「「兒童「雙人」」施救」的比例)。其他正確:A 用「叫叫CAB」原則執行急救;B 第一步驟為確認意識反應及脈搏;C 第二步驟為求救、指定現場某人打119。故本題選錯誤者為 D。單人 CPR 按壓吹氣比例為30:2，非15:1。","options":{"A":"用「叫叫CAB」原則執行急救，正確。","B":"第一步確認意識反應及脈搏，正確。","C":"第二步求救、指定人打119，正確。","D":"正確(本題選錯誤者)。單人 CPR 比例為30:2，非15:1。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生","CPR"]}},"106030-N5-77":{"quick":"造成代謝症候群最主要的因素＝生活型態。","detail":{"background":"造成代謝症候群「最主要」的因素是(C)『「「生活型態(lifestyle;「不健康的飲食、缺乏運動、肥胖、菸酒、壓力」等「可改變的「生活習慣」」)」』——代謝症候群主要源於「不良的生活型態(尤其腹部肥胖)」，這也是「可介入、可預防」的關鍵。遺傳、環境、經濟因素雖有影響，但「生活型態」是最主要的因素。故 C 正確。代謝症候群最主要的因素是生活型態(可改變)。","options":{"A":"遺傳因素有影響，但非最主要。","B":"環境因素有影響，但非最主要。","C":"正確。代謝症候群最主要的因素是生活型態。","D":"經濟因素非最主要。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106030-N5-78":{"quick":"可能使高血壓病人血壓突然上升者＝體表溫差過大①、用力排便②。","detail":{"background":"可能使高血壓病人「血壓「突然上升」」的情況:(1)「「體表溫差過大」(如「驟然接觸冷空氣」會使血管收縮、血壓上升)」;(2)「「用力排便」(「閉氣用力(Valsalva)」會使血壓「驟升」，是高血壓/心血管病人的危險動作)」。而(3)夜間上廁所(本身不會驟升血壓，但須注意姿勢性變化)、(4)抬腿運動(屬緩和運動)不會使血壓「突然」上升。故正確為①②(選 A)。溫差大、用力排便會使血壓驟升。","options":{"A":"正確。體表溫差過大①、用力排便②，會使血壓突然上升。","B":"①③：③夜間上廁所不會使血壓驟升。","C":"②③：含③，錯誤。","D":"②④：含④(抬腿運動，緩和)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106030-N5-79":{"quick":"對糖尿病民眾的運動指導「正確」者＝以有氧運動最佳①、晨起運動者宜先進食部分食物④。","detail":{"background":"對糖尿病民眾的運動指導，正確的是:(1)「以「有氧運動」最佳(如健走、游泳，有助血糖控制)」;(4)「「晨起」運動者，宜「先進食部分食物」(預防「空腹運動」造成「低血糖」)」。而(2)『減重需每星期「120分鐘」』錯誤(減重建議「每週「150分鐘以上」」);(3)『「必須高強度」才能減重』錯誤(「中等強度、持續」即可，糖尿病人「不宜過度高強度」)。故正確為①④(選 B)。糖尿病運動:有氧最佳、晨運先進食(防低血糖)、每週≥150分鐘、中等強度。","options":{"A":"①②：②每週120分鐘不足(減重建議≥150分鐘)。","B":"正確。有氧運動最佳①、晨運宜先進食④。","C":"②③：②③皆錯(120分鐘不足、不需高強度)。","D":"③④：含③(必須高強度，錯誤)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106030-N5-80":{"quick":"讓兒童反覆練習胰島素注射技巧＝熟練原則。","detail":{"background":"教導兒童學習胰島素注射、「讓其「「反覆練習」」注射技巧」——屬(C)『「熟練原則(透過「「反覆練習」」，使「技能「熟練、精熟」」)」』。準備原則是引發學習動機/準備;類化原則是將所學「應用到類似情境」;自動原則是引發學習者主動學習。「反覆練習以熟練技能」屬熟練原則。故 C 正確。反覆練習以精熟技能屬熟練原則。","options":{"A":"準備原則是引發學習動機與準備。","B":"類化原則是將所學應用到類似情境。","C":"正確。反覆練習以精熟技能，屬熟練原則。","D":"自動原則是引發學習者主動學習。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"106110-N5-43":{"quick":"針對「物理環境」健康決定因子，「不是」適當健康狀況指標者＝自殺率。","detail":{"background":"當介入針對「物理(physical)環境」的健康決定因子時，「不是」適當的健康狀況指標者為(C)『「「自殺率」』——「自殺率」反映的是「「心理/社會」」面向，「不是「「物理環境」」的指標」。其他屬於物理環境的指標:A 空氣品質、B 水的品質、D 住家(居住環境)。故本題選不是者為 C。自殺率反映心理社會面向，非物理環境指標。","options":{"A":"空氣品質是物理環境的指標。","B":"水的品質是物理環境的指標。","C":"正確(本題選不是者)。自殺率反映心理社會面向，非物理環境指標。","D":"住家(居住環境)是物理環境的指標。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"106110-N5-57":{"quick":"兒童期肥胖的處置「錯誤」者＝鼓勵節食。","detail":{"background":"兒童期肥胖的處置，「錯誤」者為(B)『「鼓勵「節食」』——錯誤，「「成長中的兒童「不宜「節食(嚴格限制熱量)」」(會影響生長發育);應「「均衡飲食、控制「高熱量/高脂/含糖」食物、增加活動」」，「健康地」控制體重。其他正確:A 多攝取高纖飲食、C 減少攝取高脂食物、D 指導適當活動。故本題選錯誤者為 B。兒童肥胖不宜節食(影響發育)，應均衡飲食、增加活動。","options":{"A":"多攝取高纖飲食，正確。","B":"正確(本題選錯誤者)。兒童不宜節食(影響發育)，應均衡飲食、增加活動。","C":"減少攝取高脂食物，正確。","D":"指導適當活動，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"106110-N5-60":{"quick":"慢性病的特性「錯誤」者＝通常不會造成殘障與機能不全。","detail":{"background":"慢性病的特性，「錯誤」者為(D)『「通常「「不會」」造成殘障與機能不全」』——錯誤，「慢性病「常「造成「殘障、機能不全(失能)」」(如中風致偏癱、糖尿病致截肢/失明)。其他正確:A 早期發現可避免疾病惡化、B 須終生控制、無法根治、C 初期通常沒有明顯症狀。故本題選錯誤者為 D。慢性病常造成殘障與機能不全。","options":{"A":"早期發現可避免疾病惡化，正確。","B":"須終生控制、無法根治，正確。","C":"初期通常沒有明顯症狀，正確。","D":"正確(本題選錯誤者)。慢性病常造成殘障與機能不全。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106110-N5-61":{"quick":"骨質疏鬆症的危險因子「錯誤」者＝身材和體格特別高大。","detail":{"background":"骨質疏鬆症的危險因子，「錯誤」者為(B)『「身材和體格「特別「高大」」』——錯誤，「「身材「瘦小、體重過輕」」才是骨鬆的危險因子;「體格高大、體重較重」反而對骨質有「保護」作用。其他是危險因子:A 高齡、C 飲酒過量、D 家庭成員有人罹患骨質疏鬆症(家族史)。故本題選錯誤者為 B。身材瘦小才是骨鬆危險因子，高大非。","options":{"A":"高齡是骨鬆的危險因子。","B":"正確(本題選錯誤者)。身材瘦小才是危險因子，高大非。","C":"飲酒過量是危險因子。","D":"家族史是危險因子。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106110-N5-71":{"quick":"學生大隊接力後冒冷汗、手發抖(疑低血糖)：應攜帶血壓計②、血糖機④、葡萄糖片⑤。","detail":{"background":"某生大隊接力後「「冒冷汗、手發抖」(疑似「「低血糖」」)」，護理師應攜帶:(2)「血壓計(評估生命徵象)」;(4)「血糖機(「測量血糖」，確認是否低血糖)」;(5)「葡萄糖片(若「低血糖」可「立即補充糖分」)」。而(1)冰敷袋、(3)彈性繃帶是處理「運動傷害(扭傷、出血)」的用品，與「低血糖」的情境不符。故正確為②④⑤(選 D)。疑低血糖應帶血壓計、血糖機、葡萄糖片。","options":{"A":"123：含①③(冰敷、彈繃，處理運動傷害)，非低血糖所需。","B":"134：含①③，錯誤。","C":"234：含③、缺⑤，錯誤。","D":"正確。血壓計②、血糖機④、葡萄糖片⑤(疑低血糖)。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"106110-N5-78":{"quick":"教導糖尿病個案用鏡子觀察腳底，讓其回去自行觀察＝示範教學法與回示教。","detail":{"background":"教導糖尿病個案「如何「使用鏡子觀察腳底(技能)」」，讓其能「回去「自行」觀察」——最適合(D)『「示範教學法「與「回示教(return demonstration)」(護理師「示範」操作，再讓個案「親自「回示(實作)」」，確認其「學會技能」)』。講述法、小組討論、價值澄清法偏向「知識/態度」，對「技能(自行操作)」的學習效果較差。「技能教學(自行操作)」用示範＋回示教。故 D 正確。技能教學(自行觀察腳底)用示範教學法與回示教。","options":{"A":"講述法偏向知識傳遞，對技能效果差。","B":"小組討論偏向討論，非技能演練。","C":"價值澄清法是釐清價值，非技能教學。","D":"正確。示範教學法與回示教，適合技能教學(自行觀察腳底)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106110-N5-79":{"quick":"邀請名人/藝人代言以促進民眾篩檢意願＝健康信念模式的「行動線索」。","detail":{"background":"「邀請「名人或藝人」擔任「代言人」，促進民眾「篩檢意願」」——依健康信念模式，屬(B)『「行動線索(cues to action;「名人代言、宣傳、媒體訊息」等「外在的「提醒、觸發」」，促使民眾「採取行動(篩檢)」)」』。知識經驗結構因素是個人背景;預防行為利益性是行動的好處;疾病罹患性是得病機率。「名人代言(觸發/提醒行動)」屬行動線索。故 B 正確。名人代言(觸發行動)屬健康信念模式的行動線索。","options":{"A":"知識經驗的結構因素是個人的背景因素。","B":"正確。名人代言(觸發/提醒行動)，屬行動線索。","C":"預防行為利益性是行動的好處。","D":"疾病罹患性是對得病機率的認知。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"106110-N5-80":{"quick":"瑜珈班需協調開班時間、地點等問題＝比提(Beattie)模式的「社區組織發展」。","detail":{"background":"在關懷據點開設健康瑜珈班，過程中需「「協調開班的「時間與地點」」等問題」——依比提(Beattie)的健康促進模式，較適合使用(D)『「社區組織發展(community development;「動員、組織社區「資源、人員」」，「協調、整合」以推動健康活動)」』。健康政策與支持性環境是政策/立法面;健康說服是說服個人;個人諮詢是一對一諮詢。「協調社區的時間、地點、資源」屬社區組織發展。故 D 正確。協調社區資源(時間地點)以推動活動屬社區組織發展。","options":{"A":"健康政策與支持性環境是政策/立法面。","B":"健康說服是說服個人改變。","C":"個人諮詢是一對一的諮詢。","D":"正確。協調社區資源(時間地點)，屬社區組織發展。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"106111-N5-46":{"quick":"對國小程度的老年糖尿病個案教胰島素注射技能，最適合的教學法＝個別指導法。","detail":{"background":"護理師對「「國小教育程度的「老年」糖尿病個案」教「胰島素注射的「自我照顧知識與技能」」——最適合(C)『「個別指導法(one-on-one;針對「教育程度較低、年長」的個案，「「一對一」「依其程度「逐步、反覆」示範與指導」，並「即時確認其理解與操作」，最能確保學會「自我注射技能」)』。講述法、問答法、價值澄清法對「年長、低教育程度者學「技能」」的效果較差。「年長低教育者學技能」用個別指導法。故 C 正確。對年長、低教育程度者教技能，個別指導法最適合。","options":{"A":"講述法對年長、低教育者學技能效果差。","B":"問答法偏向知識的問答。","C":"正確。對年長、低教育程度者教胰島素注射技能，個別指導法最適合。","D":"價值澄清法是釐清價值，非技能教學。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106111-N5-47":{"quick":"登階運動主要能加強「心肺耐力」。","detail":{"background":"登階運動(反覆上下階梯)主要能加強(B)『「「心肺耐力」(屬「「有氧、持續」」的運動，提升「心肺(循環、呼吸)」的耐力)」』。肌力與肌耐力靠重量訓練;柔軟度靠伸展;平衡力靠平衡訓練。「登階(有氧持續)」主要加強心肺耐力。故 B 正確。登階運動是有氧運動，主要加強心肺耐力。","options":{"A":"肌力與肌耐力靠重量/阻力訓練。","B":"正確。登階運動(有氧)主要加強心肺耐力。","C":"柔軟度靠伸展運動。","D":"平衡力靠平衡訓練。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"106111-N5-51":{"quick":"我國學童常見健康問題「錯誤」者＝B型肝炎帶原。","detail":{"background":"我國學童常見的健康問題，「錯誤」者為(D)『「B型肝炎「帶原」』——「自「全面新生兒「B肝疫苗」接種」後，「學童的「B肝帶原率「大幅下降」」，「「不再是」學童常見的健康問題」。其他是學童常見的健康問題:A 近視、B 過重與肥胖、C 齲齒。故本題選錯誤者為 D。因疫苗接種，B肝帶原已非學童常見健康問題。","options":{"A":"近視是學童常見健康問題。","B":"過重與肥胖是學童常見健康問題。","C":"齲齒是學童常見健康問題。","D":"正確(本題選錯誤者)。因疫苗接種，B肝帶原已非學童常見問題。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"106111-N5-52":{"quick":"具代謝症候群危險因子者＝白女士腰圍82 cm(女性≥80)。","detail":{"background":"具有代謝症候群「危險因子」者為(A)『「白女士「腰圍82 cm」(「女性腰圍「≥80」cm」屬腹部肥胖，符合代謝症候群的因子)」』。其他「未達」標準:B 張先生血壓「128/83」(未達「≥130/85」);C 李先生 HDL「60」(「女<50、男<40」才異常，60屬「正常」);D 陳女士三酸甘油酯「144」(未達「≥150」)。故 A 正確。代謝症候群因子:腰圍(女≥80、男≥90)、血壓≥130/85、空腹血糖≥100、TG≥150、HDL(男<40女<50)。","options":{"A":"正確。白女士腰圍82 cm(女性≥80)，符合代謝症候群的因子。","B":"張先生血壓128/83，未達≥130/85。","C":"李先生 HDL 60，屬正常(未達異常標準)。","D":"陳女士 TG 144，未達≥150。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106111-N5-53":{"quick":"三段五級的概念「錯誤」者＝教導民眾認識公共場所逃生路徑為次段預防。","detail":{"background":"三段五級的概念，「錯誤」者為(A)『「教導民眾認識公共場所的「逃生路徑」為「「次段」」預防」』——錯誤，「「認識逃生路徑(預防傷害「發生」前的「特定防護」)」屬「「初段(第二級「特殊保護」)」」，「不是「次段」」。其他正確:B 健康飲食指導為初段預防;C 教導增加老人下肢肌力運動為初段預防;D 教導高血壓老人按時服藥為次段(第三級早期治療/限制殘障)預防。故本題選錯誤者為 A。認識逃生路徑屬初段(特殊保護)，非次段。","options":{"A":"正確(本題選錯誤者)。認識逃生路徑(特殊保護)屬初段，非次段。","B":"健康飲食指導為初段預防，正確。","C":"增加老人下肢肌力運動為初段預防，正確。","D":"高血壓老人按時服藥為次段預防，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"106111-N5-65":{"quick":"「罹患子宮頸癌會影響家庭工作、也可能死，所以要檢查」＝健康信念模式的「疾病嚴重性」。","detail":{"background":"王太太說「我若罹患子宮頸癌，「不僅家庭工作受到影響，也可能會「死」(嚴重的後果)」，所以應該檢查」——依健康信念模式，屬(C)『「疾病「嚴重性(severity)」(個人對「疾病「後果的「嚴重程度」(影響生活、致死)」」的認知)」』。預防行為障礙性是行動的阻礙;利益性是行動的好處;罹患性是得病機率。「影響家庭工作、可能死(後果嚴重)」屬嚴重性。故 C 正確。「覺得疾病後果嚴重(影響生活、致死)」屬疾病嚴重性。","options":{"A":"預防行為障礙性是對行動阻礙的認知。","B":"預防行為利益性是對行動好處的認知。","C":"正確。「影響家庭工作、可能死」(後果嚴重)，屬疾病嚴重性。","D":"疾病罹患性是對得病機率的認知。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"106111-N5-71":{"quick":"原住民族地區及偏遠離島的未滿6歲兒童，可每3個月執行一次牙齒塗氟。","detail":{"background":"原住民族地區及偏遠離島地區「未滿6歲」兒童，「牙齒塗氟」的處置可「「每3個月」執行一次」(較一般地區的「每半年(6個月)1次」「「更頻繁」」，因偏鄉齲齒率較高、資源較少，故放寬補助頻率)。故 C 正確。偏鄉/原民地區未滿6歲兒童牙齒塗氟每3個月1次(一般地區每6個月1次)。","options":{"A":"每1個月過於頻繁，非規定。","B":"每2個月非規定的頻率。","C":"正確。原民/偏遠地區未滿6歲兒童每3個月塗氟1次。","D":"每6個月是一般地區的頻率(偏鄉放寬至3個月)。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"106111-N5-73":{"quick":"推動健康促進學校的行動綱要「錯誤」者＝加強藥物濫用管理。","detail":{"background":"推動健康促進學校的「行動綱要(六大範疇)」，「錯誤」者為(C)『「加強「藥物濫用管理」』——「「藥物濫用管理」「不是「健康促進學校」的「六大範疇」之一」(它是「特定的「議題」」)。健康促進學校的六大範疇:A 制定學校健康政策、B 創造學校支持性物質環境、D 提供健康服務，以及「社會環境、社區關係、個人健康技能」。故本題選錯誤者為 C。藥物濫用管理是特定議題，非健康促進學校的六大範疇之一。","options":{"A":"制定學校健康政策，是六大範疇之一。","B":"創造學校支持性物質環境，是六大範疇之一。","C":"正確(本題選錯誤者)。藥物濫用管理是特定議題，非六大範疇之一。","D":"提供健康服務，是六大範疇之一。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"106111-N5-79":{"quick":"「不包含」在四癌防治計畫篩檢中的項目＝肺癌篩檢。","detail":{"background":"我國「四癌防治計畫」的篩檢項目是「「子宮頸癌、乳癌、大腸癌、口腔癌」」。「不包含」者為(D)『「「肺癌」篩檢」』(肺癌雖為國人主要癌症死因，但「「不在」「四「癌」篩檢」之列;後續政策才將肺癌(低劑量電腦斷層 LDCT)納入特定高風險族群)。其他屬於四癌篩檢:A 乳癌、B 口腔癌、C 子宮頸癌。故本題選不包含者為 D。四癌:子宮頸癌、乳癌、大腸癌、口腔癌(不含肺癌)。","options":{"A":"乳癌篩檢是四癌之一。","B":"口腔癌篩檢是四癌之一。","C":"子宮頸癌篩檢是四癌之一。","D":"正確(本題選不包含者)。四癌不含肺癌(子宮頸、乳、大腸、口腔)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"107030-N5-46":{"quick":"發展遲緩兒童早期療育服務「錯誤」者＝發現疑似個案需通報當地醫院。","detail":{"background":"社區護理師提供發展遲緩兒童的早期療育服務，「錯誤」者為(C)『「發現疑似個案需「通報「當地「醫院」」」』——錯誤，發現疑似發展遲緩兒童應「「通報「當地「社政主管機關(直轄市/縣市政府)」的「通報轉介中心」」」(而非「醫院」)，再由「通報轉介中心」協調「評估、療育」。其他正確:A 協助早期發現發展遲緩兒童;B 對發展遲緩兒童應列冊管理;D 安排轉介安置。故本題選錯誤者為 C。疑似個案應通報社政的通報轉介中心，非醫院。","options":{"A":"協助早期發現發展遲緩兒童，正確。","B":"對發展遲緩兒童列冊管理，正確。","C":"正確(本題選錯誤者)。應通報社政的通報轉介中心，非醫院。","D":"安排轉介安置，正確。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"107030-N5-49":{"quick":"規律運動對糖尿病的益處「錯誤」者＝增加低密度脂蛋白膽固醇。","detail":{"background":"規律且正確的運動對糖尿病個案的益處，「錯誤」者為(D)『「「「增加」「低密度脂蛋白(LDL)」膽固醇」』——錯誤，「運動是「「降低」LDL(壞膽固醇)」、「「升高」HDL(好膽固醇)」(改善血脂)。其他是運動的益處:A 增強心肺耐力、B 增進胰島素功能(改善胰島素敏感性、有助血糖控制)、C 降低血中三酸甘油酯。故本題選錯誤者為 D。運動降低 LDL，非增加。","options":{"A":"增強心肺耐力，是運動的益處。","B":"增進胰島素功能(改善血糖)，是益處。","C":"降低血中三酸甘油酯，是益處。","D":"正確(本題選錯誤者)。運動降低 LDL，非增加。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"107030-N5-50":{"quick":"骨質疏鬆的危險因子「錯誤」者＝男性高於女性。","detail":{"background":"骨質疏鬆的危險因子，「錯誤」者為(D)『「「男性」高於「女性」』——錯誤，「「「女性」「高於」男性」(女性「停經後雌激素下降」，骨質流失快，故女性的骨鬆風險「高於」男性)。其他是危險因子:A 骨質疏鬆症家族史、B 飲酒過量、C 更年期或停經。故本題選錯誤者為 D。女性(尤其停經後)的骨鬆風險高於男性。","options":{"A":"骨質疏鬆症家族史是危險因子。","B":"飲酒過量是危險因子。","C":"更年期或停經是危險因子。","D":"正確(本題選錯誤者)。女性(停經後)的骨鬆風險高於男性。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"107030-N5-52":{"quick":"健康促進的推動「錯誤」者＝透過教育來改變認知是最有效的方法。","detail":{"background":"健康促進的推動，「錯誤」者為(A)『「「透過「教育」來「改變認知」是「「最有效」」的方法」』——錯誤，「「單靠「教育(改變認知)」「不是「最有效」」的方法」(認知改變「不一定」帶來行為改變;健康促進須「「多元策略(政策、環境、社區、教育)「並進」」)。其他正確:B 需要整合各項相關的資源、C 需要正向的支持環境、D 以健康為目的，個人生活型態及環境改變為策略。故本題選錯誤者為 A。單靠教育改變認知非最有效，須多元策略並進。","options":{"A":"正確(本題選錯誤者)。單靠教育改變認知非最有效，須多元策略並進。","B":"需要整合各項相關的資源，正確。","C":"需要正向的支持環境，正確。","D":"以健康為目的、生活型態及環境改變為策略，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"107030-N5-64":{"quick":"WHO 2025年前要降低死亡率25%的非傳染病＝癌症①、心血管疾病②、糖尿病③、慢性阻塞性肺疾病④(憂鬱症⑤非)。","detail":{"background":"世界衛生組織訂出「2025年前」要將「四大「非傳染病(NCDs)」」所造成的「過早死亡率「降低25%」(「25 by 25」)」，這四大非傳染病是:(1)癌症、(2)心血管疾病、(3)糖尿病、(4)慢性呼吸道疾病(慢性阻塞性肺疾病)。而(5)『憂鬱症』屬「精神疾患」，「不在「這四大「非傳染病」」之列。故正確為①②③④(選 A)。WHO「25×25」目標針對癌症、心血管、糖尿病、慢性呼吸道疾病。","options":{"A":"正確。癌症①、心血管②、糖尿病③、COPD④。","B":"1235：含⑤(憂鬱症)，非四大 NCDs。","C":"1345：含⑤、缺②，錯誤。","D":"2345：含⑤、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"107030-N5-65":{"quick":"小組討論法的敘述「正確」者＝教學者應在結束後將結果綜合整理說明。","detail":{"background":"小組討論法的敘述，「正確」者為(D)『「教學者應在「結束後，將「結果「綜合整理說明」」，讓學習者有較清楚的解答(主持人/教學者「最後「歸納總結」」，使學習有清楚的結論)』。其他錯誤:A『是團體衛教「「最常用」」的教學法』錯誤(「「講述(演講)法」」才是最常用);B『成員以「20~30人」為宜』錯誤(小組討論宜「「6~12人」」，人太多難討論);C『主持人「儘可能採「封閉」結構式問句」』錯誤(應多用「「開放式」問句」鼓勵發言)。故 D 正確。小組討論最後應由教學者綜合整理、歸納總結。","options":{"A":"最常用的是講述(演講)法，非小組討論。","B":"小組討論成員宜6~12人，非20~30人。","C":"應多用開放式問句鼓勵發言，非封閉式。","D":"正確。教學者應在結束後綜合整理、歸納說明。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"107030-N5-75":{"quick":"健康促進活動「前」的準備工作「較不恰當」者＝評值健康促進活動成效與目標達成情形。","detail":{"background":"學校護理師進行健康促進活動「前」的準備工作，「較不恰當」者為(C)『「「評值」健康促進活動「成效與目標達成情形」』——錯誤，「「評值成效」是活動「「執行「後」」」的步驟，「不是「活動「前」的「準備」」。其他屬於活動前的準備:A 統計健康檢查結果、界定健康促進需求(評估);B 設定健康促進活動的總目標與具體目標(計畫);D 調查人力、物力、財力等內外部資源(資源評估)。故本題選較不恰當者為 C。評值成效是活動後的步驟，非事前準備。","options":{"A":"統計健檢、界定需求(評估)，是事前準備。","B":"設定目標(計畫)，是事前準備。","C":"正確(本題選較不恰當者)。評值成效是活動後的步驟，非事前準備。","D":"調查人力物力財力資源，是事前準備。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"107030-N5-76":{"quick":"哺乳女性勞工的母性健康保護「較不恰當」者＝安排輪夜班。","detail":{"background":"依女性勞工母性健康保護實施辦法，對「產假後返職、「繼續哺餵母乳」」的辜小姐，「較不恰當」者為(A)『「安排辜小姐「「輪夜班」」』——錯誤，「「哺乳期」的女性勞工「「應「避免「夜班/輪班」」」(夜班影響哺乳、健康與親職)，雇主應「依其狀況「調整」工作」。其他恰當:B 職業衛生護理師提供產後諮詢;C 辜小姐於上班時間使用哺集乳室;D 評估身體狀況、適當調整工作內容。故本題選較不恰當者為 A。哺乳期不宜安排輪夜班。","options":{"A":"正確(本題選較不恰當者)。哺乳期不宜安排輪夜班。","B":"提供產後諮詢，恰當。","C":"上班時間使用哺集乳室，恰當。","D":"評估身體狀況、適當調整工作，恰當。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"107030-N5-77":{"quick":"青少女生出的新生兒易發生的健康問題＝低出生體重②、早產③。","detail":{"background":"「青少女(未成年懷孕)」生出的新生兒，易發生的健康問題:(2)「「低出生體重」(青少女身體未成熟、營養與產檢不足)」;(3)「「早產」」。而(1)『體重「過重」』、(4)『畸型』不是青少女新生兒「最常見/特有」的問題(體重過重多與「妊娠糖尿病/巨嬰」有關;畸型與染色體/致畸因素有關)。故正確為②③(選 C)。青少女新生兒易低出生體重、早產。","options":{"A":"12：含①(體重過重，非青少女新生兒的常見問題)。","B":"13：含①，錯誤。","C":"正確。低出生體重②、早產③。","D":"34：含④(畸型，非特有問題)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"107030-N5-79":{"quick":"王先生符合代謝症候群判定標準者＝腰圍90公分③、空腹血糖130 mg/dL④。","detail":{"background":"王先生(男性)的篩檢結果，符合代謝症候群判定標準的是:(3)「腰圍90公分(「男性腰圍「≥90」」，符合腹部肥胖)」;(4)「空腹血糖130 mg/dL(「≥100」，符合)」。而(1)身高體重(BMI)「不是」代謝症候群的「組成指標」;(2)血壓128/80(未達「≥130/85」);(5)HDL-C 43(「「男性<40」才異常」，43屬「正常」)。故正確為③④(選 B)。代謝症候群:腰圍(男≥90女≥80)、血壓≥130/85、空腹血糖≥100、TG≥150、HDL(男<40女<50)。","options":{"A":"15：①BMI非組成指標、⑤HDL43男性正常，皆不符。","B":"正確。腰圍90公分③、空腹血糖130④。","C":"45：含⑤(HDL43男性正常)，不符。","D":"24：②血壓128/80未達標準，不符。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"107110-N5-47":{"quick":"對血脂過高高中生的護理措施「不適當」者＝建議以降膽固醇的飲料代替飲水。","detail":{"background":"對血脂過高的高中生的護理措施，「不適當」者為(A)『「建議以「「降膽固醇的「飲料」」代替「飲水」」』——錯誤，「不應「以「飲料(含糖/添加物)」「代替「白開水」」(白開水才是最佳的飲品;「降膽固醇飲料」非必要且可能含糖)。其他適當:B 教導如何看食品營養標示、C 鼓勵增加運動量、D 協助學生了解血脂過高的危害。故本題選不適當者為 A。應喝白開水，不以飲料代替水。","options":{"A":"正確(本題選不適當者)。應喝白開水，不以飲料代替水。","B":"教導如何看食品營養標示，適當。","C":"鼓勵增加運動量，適當。","D":"協助了解血脂過高的危害，適當。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"107110-N5-61":{"quick":"有效改變學習者「態度」的教學方法＝討論法②、角色扮演③、價值澄清法④。","detail":{"background":"為有效改變學習者的「「態度(情意)」」，較適當的教學方法是:(2)「討論法(透過討論「交流、反思」，影響態度)」;(3)「角色扮演(在「情境體驗」中改變態度)」;(4)「價值澄清法(引導「釐清、反思自己的價值與態度」)」。而(1)專家報告、(5)辯論偏向「「知識的傳遞/論證」」，對「態度的改變」較不直接(辯論偏重知識與口語論證)。故正確為②③④(選 C)。改變態度宜用討論、角色扮演、價值澄清法。","options":{"A":"①③④：含①(專家報告，偏知識傳遞)，非改態度最佳。","B":"①④⑤：含①⑤(專家報告、辯論)，偏知識。","C":"正確。討論法②、角色扮演③、價值澄清法④。","D":"②③⑤：含⑤(辯論，偏知識論證)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"107110-N5-62":{"quick":"「我知道我可以做到每天健走30分鐘、一週後減0.5公斤」＝Pender 的自覺自我效能。","detail":{"background":"依 Pender 健康促進模式，王先生說「我「知道我「可以做到」每天健走30分鐘」，且可達減重目標」——屬(B)『「自覺自我效能(perceived self-efficacy;對「自己「有能力執行」健康行為」的「信心」)」』。先前的相關經驗是過去的經驗;行動相關感受是執行時的情緒感受;人際間的影響是他人的影響。「我可以做到(對自己的信心)」屬自我效能。故 B 正確。「相信自己能做到」屬 Pender 的自覺自我效能(與前述同類題一致)。","options":{"A":"先前的相關經驗是過去的相關經歷。","B":"正確。「我可以做到」(對自己的信心)，屬自覺自我效能。","C":"行動相關感受是執行行為時的情緒感受。","D":"人際間的影響是他人的影響。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"107110-N5-63":{"quick":"針對控糖班設計六週課程、編列20,000元預算＝PRECEDE-PROCEED 的「行政與政策診斷」。","detail":{"background":"針對糖尿病友辦理控糖班，「「設計課程、編列「預算經費」、安排資源」」——依 PRECEDE-PROCEED 模式，屬(D)『「行政與政策診斷(administrative & policy diagnosis;評估「執行計畫所需的「資源、預算、人力、政策、組織」」，以利方案「實施」)」』。流行病學診斷是確定健康問題;行為診斷是分析行為因素;教育與組織診斷是分析傾向/促成/增強因素。「預算、資源、課程安排」屬行政與政策診斷。故 D 正確。安排預算、資源、執行屬行政與政策診斷。","options":{"A":"流行病學診斷是確定健康問題。","B":"行為診斷是分析行為與環境因素。","C":"教育與組織診斷是分析傾向/促成/增強因素。","D":"正確。設計課程、編列預算、安排資源，屬行政與政策診斷。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論","PRECEDE-PROCEED"]}},"107110-N5-64":{"quick":"自我導向學習的敘述「正確」者＝學習者可依自己的需求擬定學習目標與策略。","detail":{"background":"自我導向學習(self-directed learning)的敘述，「正確」者為(C)『「學習者可以「依據自己的「需求」，「擬定「學習目標與策略」」(以「「學習者」為中心」，由其「主動「規劃、執行、評值」自己的學習)』。其他錯誤:A『是適用於「兒童」的策略』錯誤(自我導向學習較適用於「「成人(成人學習特性)」」);B『以「教學者」為中心』錯誤(是以「「學習者」為中心」);D『提供「制式的格式」』錯誤(自我導向學習「「彈性、個別化」」，非制式)。故 C 正確。自我導向學習以學習者為中心，由其擬定目標與策略。","options":{"A":"自我導向學習較適用於成人，非兒童。","B":"是以學習者為中心，非教學者。","C":"正確。學習者可依自己的需求擬定學習目標與策略。","D":"自我導向學習彈性、個別化，非制式格式。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"107110-N5-71":{"quick":"20歲平地原住民、有抽菸嚼檳榔飲酒習慣：可參加「口腔癌篩檢」。","detail":{"background":"李大明(20歲、平地原住民男性、有「「抽菸、嚼檳榔」」習慣)，可參加(C)『「「口腔癌篩檢」(口腔癌篩檢的對象是「「30歲以上」有「嚼檳榔(含已戒)或吸菸」者，「「18歲以上」「嚼檳榔(含已戒)」的「原住民」」;李大明20歲、原住民、嚼檳榔，符合資格)』。其他不符:A 成人預防保健(原住民放寬至「55歲」)、B 大腸癌篩檢(50~74歲)、D 乳癌篩檢(女性，他是男性)。故 C 正確。18歲以上嚼檳榔的原住民可做口腔癌篩檢。","options":{"A":"成人預防保健的原住民資格是55歲以上。","B":"大腸癌篩檢對象是50~74歲。","C":"正確。18歲以上嚼檳榔的原住民可做口腔癌篩檢。","D":"乳癌篩檢對象是女性，他是男性。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"107110-N5-72":{"quick":"免費乳癌篩檢的資格與頻率＝40~44歲二親等內血親曾患乳癌之女性或45~69歲者，每2年1次乳房X光攝影。","detail":{"background":"國內免費乳癌篩檢的資格與頻率，正確的是(A)『「「40~44歲「二親等內血親曾患乳癌」的女性」「或「45~69歲」者，「「每2年1次「乳房X光攝影」」」(政府補助的乳癌篩檢工具是「「乳房X光攝影(mammography)」」，非超音波)』。其他錯誤:B 的頻率/年齡敘述不符;C、D『乳房「超音波」』錯誤(補助的是「乳房X光攝影」非超音波)。故 A 正確。乳癌篩檢:45~69歲(或40~44歲且二親等內血親患乳癌)每2年1次乳房X光攝影。","options":{"A":"正確。40~44歲(二親等血親患乳癌)或45~69歲，每2年1次乳房X光攝影。","B":"頻率/年齡的敘述不符規定。","C":"補助的是乳房X光攝影，非超音波。","D":"補助的是乳房X光攝影，非超音波。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"107110-N5-79":{"quick":"中老年人罹患高血壓的危險因子「錯誤」者＝BMI=24。","detail":{"background":"中老年人罹患高血壓的危險因子，「錯誤」者為(D)『「「BMI=24」』——錯誤，「BMI=24屬「「正常」範圍(18.5~24)」，「不是」高血壓的危險因子(「「肥胖(BMI≥27)」」才是)。其他是危險因子:A 懷孕時曾發生妊娠毒血症(子癇前症)、B 從事需久坐的工作、C 工作壓力大、經常熬夜。故本題選錯誤者為 D。BMI=24屬正常，非高血壓危險因子(肥胖才是)。","options":{"A":"懷孕時曾發生妊娠毒血症，是高血壓危險因子。","B":"從事需久坐的工作，是危險因子。","C":"工作壓力大、經常熬夜，是危險因子。","D":"正確(本題選錯誤者)。BMI=24屬正常，非危險因子(肥胖才是)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"107110-N5-80":{"quick":"促進社區民眾參與「健康100腰動動」計畫，最適當的策略＝策略須考量中老年人的特性，提供適當且有效的活動。","detail":{"background":"促進社區民眾參與中老年人的健康促進計畫，最適當的策略是(D)『「策略須「考量「中老年人的「特性」」」，提供其「「適當且有效」」的活動(以「對象的需求、特性」為中心，量身設計，才能促進參與)』。其他不當:A『只組織「對計畫友善的人」、授權其喜愛的策略』偏頗(忽略多數需求);B『以「行政單位成員」為推動主力』錯誤(應「「全民/社區」參與」);C『「修改計畫」策略』太模糊。故 D 正確。以對象(中老年人)的特性與需求為中心設計活動，最能促進參與。","options":{"A":"只組織友善者、授權其喜愛策略偏頗，忽略多數需求。","B":"應全民/社區參與，非以行政成員為主力。","C":"「修改計畫」太模糊，非具體適當的策略。","D":"正確。策略須考量中老年人的特性，提供適當有效的活動。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"108110-N5-47":{"quick":"公園內設置健康步道以鼓勵運動＝渥太華憲章的「創造支持性環境」。","detail":{"background":"社區「在公園內「設置健康步道」以鼓勵民眾運動」——屬渥太華憲章的(B)『「創造支持性的環境(create supportive environments;「改善「硬體環境/設施(步道)」」，使「健康的選擇(運動)「更容易、更可近」」)」』。建立健康公共政策是立法;強化社區行動是社區參與;調整衛生服務方向是服務取向。「設健康步道(改善環境設施)」屬創造支持性環境。故 B 正確。設健康步道(改善環境)屬創造支持性環境。","options":{"A":"建立健康公共政策是立法/政策手段。","B":"正確。設置健康步道(改善環境)，屬創造支持性環境。","C":"強化社區行動力是促進社區參與。","D":"調整衛生服務方向是服務取向的調整。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"108110-N5-54":{"quick":"學校護理師執行的「非例行性」教學＝學生因經痛求助時，說明青春期生理變化。","detail":{"background":"學校護理師執行的「非例行(機會)性」教學是(B)『「學生「因經痛「求助」時」，說明青春期生理變化(「「臨機、因應個別學生「當下的需求」」進行的「機會教育」)』——屬「非例行性」。其他屬「例行性(預先規劃)」:A 在朝會時說明肥胖(預先安排)、C 與健教老師共同講解腸病毒(課程安排)、D 邀請家長參與健康講座(規劃的活動)。故 B 正確。因應學生當下需求的機會教育屬非例行性教學。","options":{"A":"朝會說明肥胖是預先安排的例行性教學。","B":"正確。因應學生當下需求(經痛)的機會教育，屬非例行性教學。","C":"與健教老師共同講解是課程安排的例行性教學。","D":"邀請家長參與講座是規劃的例行性活動。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"108110-N5-57":{"quick":"成人空腹8小時以上，血清三酸甘油酯高於200 mg/dL即屬高血脂。","detail":{"background":"成人空腹8小時以上，「血清「三酸甘油酯(TG)「>200 mg/dL」」即屬「高血脂(高三酸甘油酯血症)」(D)200。(對照:TG 150~199為「邊際偏高」、「≥200為「高」」。)故 D 正確。三酸甘油酯≥200 mg/dL屬高血脂。","options":{"A":"150 mg/dL是邊際偏高的下限，未達「高」。","B":"160 mg/dL屬邊際偏高範圍。","C":"180 mg/dL屬邊際偏高範圍。","D":"正確。三酸甘油酯>200 mg/dL屬高血脂。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"108110-N5-66":{"quick":"以「賦權」概念營造健康支持性環境的敘述「錯誤」者＝政府主動提供居民健康與安全的環境。","detail":{"background":"以「賦權(empowerment)」概念營造健康支持性環境，「錯誤」者為(A)『「「政府「「主動」提供」」居民健康與安全的環境」』——錯誤，「賦權」強調「「「激發「居民「自主、參與、共同營造」」」，「「不是「政府「(由上而下)「主動「給予/提供」」」(那是「被動接受」，非賦權)。其他符合賦權:B 健康專業人員激發居民自主性的能力、C 居民主動尋求建置安全環境的資訊、D 居民共同營造健康的社區環境。故本題選錯誤者為 A。賦權是激發居民自主參與，非政府主動提供。","options":{"A":"正確(本題選錯誤者)。賦權是激發居民自主，非政府主動提供。","B":"激發居民自主性的能力，符合賦權。","C":"居民主動尋求資訊，符合賦權。","D":"居民共同營造社區環境，符合賦權。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"108110-N5-67":{"quick":"整合性篩檢服務考慮民眾接受服務的「可近性」＝PRECEDE-PROCEED 的「促成因素」。","detail":{"background":"依 PRECEDE-PROCEED 模式，整合性篩檢服務考慮民眾接受服務的「「可近性(資源、設施、可及性)」」——屬(B)『「促成因素(enabling factors;使行為「能夠執行」的「「資源、技能、可近性、服務的可及性」」)」』。素質(傾向)因素是知識/態度/信念;增強因素是他人的回饋;政策因素非標準分類。「可近性(資源/可及性)」屬促成因素。故 B 正確。服務的可近性(資源)屬促成因素(與前述同類題一致)。","options":{"A":"素質(傾向)因素是知識、態度、信念。","B":"正確。服務的可近性(資源/可及性)，屬促成因素。","C":"增強因素是他人的回饋、獎勵。","D":"政策因素非 PRECEDE 的標準三因素分類。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論","PRECEDE-PROCEED"]}},"108110-N5-68":{"quick":"Pender 健康促進模式影響預防性健康行為的因素＝個人特質與經驗①、行為特異性的認知與情感②、行為結果③(政策與法規④非)。","detail":{"background":"依 Pender 健康促進模式，影響個體「預防性健康行為」的主要因素:(1)「個人特質與經驗(過去的行為、個人因素)」;(2)「行為特異性的「認知與情感」(自我效能、利益、障礙、活動相關情感、人際與情境影響)」;(3)「行為結果(行動承諾、健康促進行為)」。而(4)『政策與法規』「不是」Pender 模式的「核心構成」。故正確為①②③(選 A)。Pender 模式:個人特質經驗→行為特異認知情感→行為結果。","options":{"A":"正確。個人特質與經驗①、行為特異性的認知與情感②、行為結果③。","B":"124：含④(政策法規，非 Pender 核心)，錯誤。","C":"134：含④、缺②，錯誤。","D":"234：含④、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"108110-N5-73":{"quick":"勞基法為哺乳，雇主應每日另給哺乳2次、每次30分鐘。","detail":{"background":"我國勞動基準法為保障在職婦女持續哺餵母乳，除規定的休息時間外，雇主應每日「另給「哺乳「2次」、「每次30分鐘」」」(B)。(註:後依「性別工作平等法」修正，對未滿2歲子女、每日另給哺(集)乳時間「2次、每次「60」分鐘」;本題依「勞基法」之「2次、每次30分鐘」。)故 B 正確。勞基法:每日另給哺乳2次、每次30分鐘。","options":{"A":"1次、20~30分鐘不符勞基法的規定。","B":"正確。每日另給哺乳2次、每次30分鐘。","C":"3次、每次20分鐘不符規定。","D":"3次、每次30分鐘不符規定。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"108110-N5-79":{"quick":"高血壓個案至社區藥局接受免費用藥指導與領藥＝第四級限制殘障。","detail":{"background":"高血壓個案(已患病)「至社區藥局接受「免費用藥指導與處方箋領藥」」——依三段五級，屬(D)『「第四級「限制殘障(disability limitation;對「已患病者」「持續治療、用藥控制」，「預防併發症、減少失能」)」』。第一級健康促進、第二級特殊保護是「疾病發生前」;第三級早期診斷治療是「篩檢/早治」。「對已診斷的高血壓持續用藥控制」屬限制殘障(第四級)。故 D 正確。對已患病者持續用藥控制、防併發症屬第四級限制殘障。","options":{"A":"第一級健康促進是疾病發生前的一般增進。","B":"第二級特殊保護是疾病發生前的特定防護。","C":"第三級早期診斷與治療是篩檢/早期治療。","D":"正確。對已患病者持續用藥控制，屬第四級限制殘障。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"109030-N5-53":{"quick":"社區均衡飲食計畫的「行為目標」效果評價＝能依據飲食指南選擇六大類食物共200人。","detail":{"background":"社區均衡飲食計畫中，屬「「行為」目標的「「效果」評價」」者為(C)『「「能「依據飲食指南「選擇六大類食物」」共200人(評估「「行為「改變的「成果」」」——民眾「實際「會」選擇均衡食物」)』。其他是「過程(投入/參與)評價」:A 辦理8場講座(產出)、B 參與講座500人次(參與)、D 園遊會5000人(參與)。「行為改變的成果(會選擇均衡食物)」屬行為目標的效果評價。故 C 正確。行為目標的效果評價看「行為是否改變(會選六大類食物)」。","options":{"A":"辦理8場講座是過程(產出)評價。","B":"參與500人次是過程(參與)評價。","C":"正確。能依飲食指南選擇六大類食物，是行為目標的效果評價。","D":"園遊會5000人是過程(參與)評價。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"109030-N5-57":{"quick":"學童口腔衛生教學的「情意目標」＝學童願意定期接受口腔檢查。","detail":{"background":"學童口腔衛生教學活動的「「情意(態度)」目標」，正確的是(D)『「學童「「願意」」定期接受口腔檢查(「「願意/態度/價值」」屬「「情意」領域」)』。其他屬別的領域:A『能正確「執行刷牙方法」』屬「「技能(動作)」目標」;B『能「說出」一項預防方法』、C『能「明白」刷牙的好處』屬「「認知」目標」。故 D 正確。「願意(態度)」屬情意目標;說出/明白屬認知;執行屬技能。","options":{"A":"「執行刷牙方法」屬技能目標。","B":"「說出方法」屬認知目標。","C":"「明白好處」屬認知目標。","D":"正確。「願意定期接受口腔檢查」(態度)，屬情意目標。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"109030-N5-58":{"quick":"傳染病防治法明訂主管機關應配合協助辦理防治＝渥太華憲章的「建立健康公共政策」。","detail":{"background":"「「傳染病防治「法」」明訂相關主管機關應配合及協助辦理傳染病防治事項」——屬渥太華憲章的(A)『「建立健康(的)公共政策(以「「立法、政策」」明訂各機關的責任，推動健康事務)」』。創造支持性環境是改善環境;強化社區行動力是社區參與;調整健康服務取向是服務面。「立法(傳染病防治法)」屬建立健康公共政策。故 A 正確。立法(傳染病防治法)屬建立健康公共政策。","options":{"A":"正確。傳染病防治法(立法)，屬建立健康公共政策。","B":"創造支持性環境是改善環境設施。","C":"強化社區行動力是促進社區參與。","D":"調整健康服務取向是服務面的調整。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"109030-N5-60":{"quick":"引導審思久坐的價值、設定目標、提升信心、記錄好處＝自我再評估①、設定改變的目標②、提升自我效能④、強化改變的效益⑤。","detail":{"background":"護理師運用的行為改變策略:(1)「「自我再評估」(引導李小姐「審思「維持久坐」的價值」，產生改變的想法)」;(2)「「設定改變的目標」(設定「可達成但具挑戰性」的目標)」;(4)「「提升自我效能」(由「成功的經驗、正向回饋」「增強信心」)」;(5)「「強化改變的效益」(記錄「運動/少坐」與「帶來的好處」的關聯，「強化改變的好處」)」。而(3)處理障礙因子、(6)訂定契約「未在敘述中提及」。故正確為①②④⑤(選 A)。","options":{"A":"正確。自我再評估①、設定目標②、提升自我效能④、強化效益⑤。","B":"1256：含⑥(訂定契約，未提及)，錯誤。","C":"2345：含③(處理障礙，未提及)、缺①，錯誤。","D":"2346：含③⑥(未提及)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"109030-N5-68":{"quick":"「我想要運動，但就是找不到時間…如果能每週運動三天會比較好」＝跨理論模式的「意圖期」。","detail":{"background":"依跨理論模式，王女士說「我「「想要」運動」，但「就是「找不到時間」」(「有「意圖」、但「尚未「準備/行動」」)」——屬(B)『「意圖期(contemplation;「「意識到問題、「有改變的「想法/意圖」」，但「「尚未「下定決心或開始準備」」，常「權衡利弊、感到矛盾」)」』。無意圖期是「沒有改變的打算」;準備期是「「已下定決心、即將行動(近期內)」」;行動期是「「已開始」改變」。「想做但還沒做(有意圖)」屬意圖期。故 B 正確。「有意圖但尚未行動」屬意圖期。","options":{"A":"無意圖期是沒有改變的打算。","B":"正確。「想運動但找不到時間」(有意圖、未行動)，屬意圖期。","C":"準備期是已下定決心、即將(近期)行動。","D":"行動期是已開始改變行為。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"109030-N5-70":{"quick":"全民健保免費產前檢查項目「正確」者＝妊娠第一期2次、第二期2次、第三期6次。","detail":{"background":"全民健保提供的免費產前檢查，正確的是(C)『「免費產前檢查時間為「妊娠第一期2次、第二期2次、第三期6次」(共「10次」;後續政策已「增加至14次」)』。其他錯誤:A『德國麻疹抗體陰性「孕婦」免費「注射疫苗」』錯誤(「「孕婦「不可」接種「活疫苗(MMR)」」，應「產後」接種);B『每胎「2次」免費超音波』錯誤(原為「1次」，後增加);D『「第二期」補助乙型鏈球菌(GBS)篩檢』錯誤(GBS 篩檢在「「妊娠第三期(35~37週)」」)。故 C 正確。健保產檢:第一期2次、第二期2次、第三期6次(共10次)。","options":{"A":"孕婦不可接種活疫苗(MMR)，應產後接種。","B":"免費超音波原為1次(後增加)，非2次。","C":"正確。妊娠第一期2次、第二期2次、第三期6次。","D":"GBS 篩檢在妊娠第三期(35~37週)，非第二期。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"109030-N5-71":{"quick":"初任職護理師推動代謝症候群防治，最好先以「問卷調查法」進行健康評估。","detail":{"background":"初任職的職業衛生護理師(對員工尚不熟悉)，要推動代謝症候群防治，「最好先」以(A)『「問卷調查法(以「「問卷「大範圍、有效率」」地「收集「全體員工」的「健康狀況、危險因子、需求」」資料，建立「基礎、整體」的了解)」』進行健康評估。焦點團體、面對面訪談較「費時、樣本少」;健康指標法是用「既有的統計指標」。「初任、要快速全面了解」宜用問卷調查。故 A 正確。初任要全面收集員工資料，宜先用問卷調查法。","options":{"A":"正確。問卷調查法可大範圍、有效率地收集員工資料。","B":"焦點團體法樣本少、費時，非優先。","C":"健康指標法是用既有的統計指標。","D":"面對面訪談法費時、樣本少，非優先。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"109030-N5-73":{"quick":"「不是」收集學生視力不良資料的主要目的者＝作為校園安全教育之用。","detail":{"background":"收集學生視力不良資料的目的，「不是」其主要目的者為(D)『「作為「校園「安全教育」」之用」』——「校園安全教育」與「視力不良資料」「無直接關係」，「不是」收集視力資料的主要目的。其他是主要目的:A 了解各年級視力不良的盛行率(流行病學)、B 提供班級老師進行座位調整(處置)、C 作為視力不良學生的個案管理(追蹤)。故本題選不是者為 D。視力資料用於盛行率、座位調整、個案管理，非校園安全教育。","options":{"A":"了解各年級視力不良盛行率，是主要目的。","B":"提供老師座位調整，是主要目的。","C":"作為視力不良學生的個案管理，是主要目的。","D":"正確(本題選不是者)。校園安全教育非收集視力資料的主要目的。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"109030-N5-77":{"quick":"「代謝症候群」判定標準「錯誤」者＝HDL 男性>40、女性>50 mg/dL。","detail":{"background":"代謝症候群的判定標準，「錯誤」者為(C)『「高密度脂蛋白膽固醇(HDL):男性「「>40」」、女性「「>50」」mg/dL』——錯誤，HDL 的「異常標準」是「「男性「<40」、女性「<50」」(HDL「「過「低」」才是危險);敘述寫成「>」是錯誤。其他正確:A 三酸甘油酯≥150、B 血壓收縮≥130/舒張≥85、D 空腹血糖≥100。故本題選錯誤者為 C。HDL 異常是男性<40、女性<50(過低才異常)。","options":{"A":"三酸甘油酯≥150 mg/dL，正確。","B":"血壓≥130/85 mmHg，正確。","C":"正確(本題選錯誤者)。HDL 異常是男性<40、女性<50(過低才異常)。","D":"空腹血糖≥100 mg/dL，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"109030-N5-78":{"quick":"骨質疏鬆症的敘述「錯誤」者＝游泳可以改善骨質疏鬆。","detail":{"background":"骨質疏鬆症的敘述，「錯誤」者為(C)『「「游泳」可以「改善」骨質疏鬆」』——錯誤，「「游泳」是「「非「負重(承重)」」運動」(身體在水中，骨骼承受的「機械負荷小」)，「對「增進骨密度」的「效果有限」」;應做「「負重運動(健走、慢跑、重訓)」」。其他正確:A 女性罹患率較男性高、B 髖部或脊椎的 DEXA 是診斷依據、D 骨密度 T 值小於-2.5(屬骨鬆)。故本題選錯誤者為 C。游泳是非負重運動，改善骨鬆效果有限。","options":{"A":"女性罹患率較男性高，正確。","B":"DEXA(雙能量X光骨密度)是診斷依據，正確。","C":"正確(本題選錯誤者)。游泳是非負重運動，改善骨鬆效果有限。","D":"骨密度 T 值<-2.5屬骨質疏鬆，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"109030-N5-79":{"quick":"82歲糖尿病「我已活夠了、死了就算了」：應加強「嚴重性認知」。","detail":{"background":"李老先生(82歲、血糖控制不好、不願就醫)說「我已活夠了、「現在都沒不舒服」、死了就算了、無須就醫吃藥」——他「「低估了「不就醫的「嚴重後果」」(覺得「沒不舒服、無所謂」)」。依健康信念模式，社區護理師應加強(A)『「「嚴重性認知」(讓他「了解「血糖控制不好「可能導致的「嚴重併發症(失明、洗腎、截肢、中風)」」」，提高其對「疾病後果嚴重性」的認知)』。故 A 正確。對「覺得無所謂」者，加強疾病嚴重性認知(了解併發症的嚴重後果)。","options":{"A":"正確。對「覺得無所謂」者，加強嚴重性認知(了解併發症後果)。","B":"罹患性認知是得病機率(他已患病，重點是後果)。","C":"障礙性認知是行動的阻礙。","D":"利益性認知是治療的好處(但他先低估了嚴重性)。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"109030-N5-80":{"quick":"高纖維飲食的益處「錯誤」者＝降低蛋白質吸收。","detail":{"background":"高纖維飲食的益處，「錯誤」者為(B)『「「降低「蛋白質」吸收」』——錯誤，「高纖維飲食「「不會「降低「蛋白質」的吸收」」(纖維主要影響「醣類、膽固醇」的吸收速度，與蛋白質吸收無直接關係)。其他是高纖的益處:A 促進膽固醇排泄(降血脂)、C 延長糖分吸收時間(穩定血糖)、D 促進腸胃道蠕動(預防便秘)。故本題選錯誤者為 B。高纖不會降低蛋白質吸收。","options":{"A":"促進膽固醇排泄(降血脂)，是高纖的益處。","B":"正確(本題選錯誤者)。高纖不會降低蛋白質吸收。","C":"延長糖分吸收時間(穩定血糖)，是益處。","D":"促進腸胃道蠕動(預防便秘)，是益處。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"109110-N5-53":{"quick":"「不是」渥太華憲章健康促進五大行動綱領者＝發展高科技精準醫療。","detail":{"background":"「不是」渥太華憲章健康促進五大行動綱領者為(A)『「「發展高科技「精準醫療」」』——「高科技精準醫療」屬「「醫療」範疇」，「不是」健康促進的綱領。五大綱領:B 建立健康的公共政策、C 發展個人技能、D 重整(調整)健康服務體系，以及「創造支持性環境、強化社區行動」。故本題選不是者為 A。健康促進綱領不含發展高科技醫療(與前述同類題一致)。","options":{"A":"正確(本題選不是者)。發展高科技精準醫療屬醫療，非健康促進綱領。","B":"建立健康的公共政策，是五大綱領之一。","C":"發展個人技能，是五大綱領之一。","D":"重整(調整)健康服務體系，是五大綱領之一。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"109110-N5-54":{"quick":"推動酒駕罰則以降低事故＝健康促進介入的「社會改變」。","detail":{"background":"「推動「酒駕「罰則(立法)」」以降低酒後駕車事故發生率」——屬(A)『「社會改變(social change;透過「立法、政策、制度」「改變社會環境/結構」，促進健康與安全)」』。社區賦能是增進社區的能力;行為改變是改變個人行為;衛生教育是衛教。「立法(酒駕罰則)」屬社會改變。故 A 正確。立法(酒駕罰則)屬社會改變(與前述同類題一致)。","options":{"A":"正確。推動酒駕罰則(立法)，屬社會改變。","B":"社區賦能是增進社區的能力。","C":"行為改變是改變個人的行為。","D":"衛生教育是衛教介入。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"109110-N5-56":{"quick":"講述法的敘述「正確」者＝具組織性，可在短時間內傳達大量知識。","detail":{"background":"講述法的敘述，「正確」者為(C)『「「具組織性」，可在「短時間內「提供/傳達「大量「知識」」(講述法的優點是「有系統、有效率地「傳遞大量「知識」」)』。其他錯誤:A『教材應儘量「抽象化」』錯誤(教材應「「具體、淺顯」」);B『對成人最適合「40~50分鐘」』錯誤(成人注意力約「「20~30分鐘」」);D『是「「問題導向」式」學習』錯誤(講述法是「「教師「單向」講授」」，非問題導向)。故 C 正確。講述法的優點是有組織、可短時間傳達大量知識。","options":{"A":"教材應具體淺顯，非抽象化。","B":"成人注意力約20~30分鐘，非40~50分鐘。","C":"正確。具組織性，可短時間傳達大量知識。","D":"講述法是教師單向講授，非問題導向。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"109110-N5-64":{"quick":"更年期婦女骨質疏鬆危險因子「較不適當」者＝體位過重。","detail":{"background":"更年期婦女骨質疏鬆危險因子，「較不適當」者為(C)『「「體位「過重」」』——錯誤，「「「體重「過輕(體位過輕)」」才是骨鬆的危險因子;「體位「過重」」反而對骨質有「保護」作用。其他是危險因子:A 過度防曬(缺乏日照→維生素D不足→鈣吸收差)、B 動情激素(雌激素)濃度低(停經後)、D 缺乏運動。故本題選較不適當者為 C。體位過輕才是骨鬆危險因子，過重非。","options":{"A":"過度防曬(維生素D不足)，是危險因子。","B":"動情激素(雌激素)濃度低，是危險因子。","C":"正確(本題選較不適當者)。體位過輕才是危險因子，過重非。","D":"缺乏運動，是危險因子。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"109110-N5-65":{"quick":"口服避孕藥的敘述「正確」者＝在月經來潮第5天開始服用。","detail":{"background":"口服避孕藥的敘述，「正確」者為(B)『「在「月經來潮的「第5天」」開始服用(自月經週期的第5天起，連續服用)』。其他錯誤:A『通常為1個月份「30粒」裝』錯誤(常見為「「21粒(服21天、停7天)」」或28粒裝);C『計劃懷孕時應「停藥「1個月」後再懷孕」』錯誤(停藥後「「可恢復排卵、即可準備懷孕」」，不需特別等1個月);D『原理是「促進子宮內膜「增生」」』錯誤(口服避孕藥的原理是「「「抑制「排卵」」」)。故 B 正確。口服避孕藥於月經來潮第5天開始服用，原理是抑制排卵。","options":{"A":"常見為21粒(或28粒)裝，非30粒。","B":"正確。在月經來潮第5天開始服用。","C":"停藥後可恢復排卵，不需特別等1個月。","D":"原理是抑制排卵，非促進子宮內膜增生。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"109110-N5-66":{"quick":"兒童視力保健「最適當」者＝每看電視30分鐘眼睛要休息10分鐘。","detail":{"background":"兒童視力保健，最適當的是(C)『「每看電視「30分鐘」眼睛要「休息10分鐘」(用眼「每30分鐘休息10分鐘」，避免長時間近距離用眼，預防近視)』。其他錯誤:A『閱讀時書與眼睛距離「20公分」』錯誤(應「「30公分以上」」);B『距離電視「對角線的2~3倍」』錯誤(看電視距離應為「螢幕對角線的「「6~8倍」」」);D『電視畫面高度「高於」眼睛正面視線15度』錯誤(電視畫面應「「略「低於」」眼睛水平視線」)。故 C 正確。用眼每30分鐘休息10分鐘。","options":{"A":"閱讀距離應30公分以上，非20公分。","B":"看電視距離應為螢幕對角線的6~8倍，非2~3倍。","C":"正確。每看電視30分鐘休息10分鐘。","D":"電視畫面應略低於眼睛水平視線，非高於15度。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"109110-N5-68":{"quick":"糖尿病學童血糖55 mg/dL(低血糖)：給予果汁，待10~15分鐘後再測血糖。","detail":{"background":"糖尿病學童「手抖、冒冷汗、血糖55 mg/dL(「<70，「低血糖」)」——最適當的處置是(B)『「給予「果汁(「「快速吸收」的「糖分」)」，待「10~15分鐘後「再測一次血糖」」(確認是否回升;低血糖處置遵循「「15規則」:給15公克快速糖、15分鐘後復測)』。其他不當:A『吃「雜糧麵包」』錯誤(全穀「吸收慢」，不適合「急救」低血糖);C『送急診』言之過早(意識清醒者先給糖);D『不予處理』錯誤(55已是低血糖)。故 B 正確。低血糖先給快速糖分(果汁)，15分鐘後復測。","options":{"A":"雜糧麵包吸收慢，不適合急救低血糖。","B":"正確。給予果汁(快速糖分)，10~15分鐘後再測血糖。","C":"意識清醒者先給糖，非急著送急診。","D":"55 mg/dL已是低血糖，須處理。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"109110-N5-69":{"quick":"改善教職員飲食型態的衛生教育目的「最不適切」者＝改善學校廚房設備。","detail":{"background":"改善教職員不適當飲食型態的「衛生教育」目的，「最不適切」者為(D)『「「改善學校「廚房設備」」』——「改善廚房「設備」是「「硬體/環境」的改善」，「不是「「衛生「教育」」的「目的」」(衛教的目的是「改變「知識、態度、行為」」)。其他適切(屬衛教目的):A 增加教職員健康飲食的知能(認知)、B 培養責任感(情意)、C 改變態度(情意)。故本題選最不適切者為 D。改善廚房設備是硬體，非衛生教育的目的。","options":{"A":"增加健康飲食的知能(認知)，是衛教目的。","B":"培養健康飲食的責任感(情意)，是衛教目的。","C":"改變對健康飲食的態度(情意)，是衛教目的。","D":"正確(本題選最不適切者)。改善廚房設備是硬體，非衛教目的。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"109110-N5-76":{"quick":"痛風衛教「錯誤」者＝多攝取豆苗、蘑菇等新鮮蔬菜。","detail":{"background":"周先生痛風頻繁發作，社區護理師衛教，「錯誤」者為(A)『「多攝取「「豆苗、蘑菇」」等新鮮蔬菜」』——錯誤，「「豆苗(豆類芽菜)、蘑菇(菇類)、蘆筍、紫菜」等是「「「高普林」」食物」，痛風病人「「應「避免/限制」」(普林代謝會增加尿酸)。其他正確:B 避免飲用啤酒(酒精尤其啤酒會升尿酸)、C 每日飲水2000 mL以上(促進尿酸排泄)、D 定期檢查腎功能(尿酸腎病變)。故本題選錯誤者為 A。豆苗、蘑菇屬高普林，痛風應避免。","options":{"A":"正確(本題選錯誤者)。豆苗、蘑菇屬高普林，痛風應避免。","B":"避免飲用啤酒(升尿酸)，正確。","C":"每日飲水2000 mL以上(促尿酸排泄)，正確。","D":"定期檢查腎功能，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"109110-N5-78":{"quick":"教導測量血壓「錯誤」者＝第一次左右手皆測，爾後以數值較低的手為準。","detail":{"background":"教導民眾測量血壓，「錯誤」者為(D)『「第一次測量需左、右手皆測，爾後以「數值「較「低」」」的手為準」』——錯誤，第一次兩手都測後，應「「以數值「較「高」」的手為準」」(較高側反映較真實的血壓，後續固定量該側)。其他正確:A 在沐浴、飲酒、飯後半小時內不要測量;B 每日固定時間測量;C 建議穿著寬鬆衣服、衣袖不可太緊。故本題選錯誤者為 D。應以數值較高的手為準，非較低。","options":{"A":"沐浴、飲酒、飯後半小時內不測量，正確。","B":"每日固定時間測量，正確。","C":"穿寬鬆衣服、衣袖不可太緊，正確。","D":"正確(本題選錯誤者)。應以數值較高的手為準，非較低。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"109110-N5-79":{"quick":"反映糖尿病長期血糖控制的血液檢查＝糖化血色素(HbA1c)。","detail":{"background":"可反映糖尿病病人「「長期(約2~3個月)」」血糖控制是否良好的血液檢查是(C)『「糖化血色素(HbA1c;反映「「近2~3個月」的「平均血糖」」，是長期血糖控制的指標;目標一般<7%)」』。酮體反映急性代謝(DKA);血糖只反映「當下」的血糖;紅血球生成素與貧血有關。「長期血糖控制」看糖化血色素。故 C 正確。糖化血色素(HbA1c)反映近2~3個月的平均血糖。","options":{"A":"酮體反映急性代謝(如 DKA)。","B":"血糖只反映當下的血糖值。","C":"正確。糖化血色素(HbA1c)反映長期(2~3個月)血糖控制。","D":"紅血球生成素與貧血/紅血球生成有關。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"109110-N5-80":{"quick":"中度失智、常尿濕褲子：護理指導「最適當」者＝定時帶個案如廁。","detail":{"background":"張老太太(中度失智、常尿濕褲子)，社區護理師護理指導，最適當的是(C)『「「定時帶個案如廁」(「「定時(如每2~3小時)「提醒、帶領「如廁」」，協助「建立「規律的排尿習慣」」，減少尿失禁)』。其他不當:A『包成人尿布』非「首選」(易致皮膚問題、增加依賴，應先嘗試定時如廁);B『限制液體攝取(<1500 mL)』錯誤(限水易致脫水、泌尿道感染);D『使用束腹帶』與尿失禁無關(且束縛不當)。故 C 正確。對失智者尿失禁，優先定時帶如廁(建立規律)。","options":{"A":"包成人尿布非首選(易皮膚問題、增依賴)。","B":"限制液體攝取易致脫水、泌尿道感染。","C":"正確。定時帶個案如廁(建立規律排尿)。","D":"束腹帶與尿失禁無關，且束縛不當。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"110030-N5-43":{"quick":"49歲、無菸檳榔史的王太太可接受的篩檢＝成人預防保健①、子宮頸癌②、乳癌③。","detail":{"background":"王太太(49歲、無抽菸與嚼檳榔史)，依全民健保預防保健範圍，可接受:(1)「成人預防保健「健康加值方案」(「40歲以上」適用)」;(2)「子宮頸癌篩檢(「30歲以上」女性)」;(3)「乳癌篩檢(「45~69歲」，王太太49歲符合)」。而(4)『大腸癌篩檢』(「50~74歲」，王太太49歲「未達」);(5)『口腔癌篩檢』(須「嚼檳榔/吸菸」，王太太「無」此習慣)。故正確為①②③(選 A)。","options":{"A":"正確。成人預防保健①、子宮頸癌②、乳癌③(49歲符合45~69)。","B":"125：含⑤(口腔癌，她無菸檳習慣)，錯誤。","C":"234：含④(大腸癌，49歲未達50)，錯誤。","D":"345：含④⑤，皆不符。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"110030-N5-54":{"quick":"預防三高的護理指導「錯誤」者＝多攝取低纖維食物，有助於延長膽固醇的吸收時間。","detail":{"background":"預防三高(高血壓、高血糖、高血脂)的護理指導，「錯誤」者為(C)『「多攝取「「低」纖維」食物，有助於延長膽固醇的吸收時間」』——錯誤，應「「多攝取「「「高」纖維」」食物」(高纖可「促進膽固醇排泄、穩定血糖、預防便秘」);敘述寫「低纖維」是錯誤。其他正確:A 每週至少累計150分鐘的中度運動、B 慎選烹調方式、避免油煎或油炸、D 建議降低高膽固醇食物的攝取量。故本題選錯誤者為 C。應多攝取高纖維，非低纖維。","options":{"A":"每週至少150分鐘中度運動，正確。","B":"避免油煎或油炸食物，正確。","C":"正確(本題選錯誤者)。應多攝取高纖維，非低纖維。","D":"降低高膽固醇食物的攝取量，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"110030-N5-56":{"quick":"舉辦健康飲食講座以提升蔬果攝取＝渥太華憲章的「發展個人技能」。","detail":{"background":"針對不同年齡層「舉辦「健康飲食「講座(教育)」」，以提升蔬果攝取量」——屬渥太華憲章的(C)『「發展個人技能(develop personal skills;透過「教育、講座」，「增進個人的「健康知識與技能」」)」』。創造支持性環境是改善硬體;強化社區行動力是社區參與;調整健康服務取向是服務面。「講座(教育、增進知能)」屬發展個人技能。故 C 正確。健康講座(教育)屬發展個人技能。","options":{"A":"創造支持性環境是改善硬體環境。","B":"強化社區行動力是促進社區參與。","C":"正確。健康飲食講座(教育)，屬發展個人技能。","D":"調整健康服務取向是服務面的調整。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"110030-N5-57":{"quick":"評估民眾的「參與程度」＝過程評價。","detail":{"background":"執行衛生教育計畫時，「評估民眾的「參與程度」」——屬(B)『「過程(process)評價(評估「計畫「執行的「過程」」(活動是否如期辦理、「參與情形」、滿意度等)」)』。發展(形成)期評價是計畫發展中的修正;結果評價是最終的健康成果;衝擊評價是中期的行為/危險因子改變。「參與程度(執行過程)」屬過程評價。故 B 正確。評估參與程度(執行過程)屬過程評價。","options":{"A":"發展(形成)期評價是計畫發展中進行的修正。","B":"正確。評估民眾的參與程度(執行過程)，屬過程評價。","C":"結果評價是評估最終的健康成果。","D":"衝擊評價是評估中期的行為/危險因子改變。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"110030-N5-59":{"quick":"最能「快速」讓民眾了解流感預防知識的衛教方法＝健康傳銷法。","detail":{"background":"最能「「快速、大範圍」」讓民眾了解流感預防知識的衛生教育方法是(D)『「健康傳銷(社會行銷)法(運用「媒體、廣告、宣傳」，「「快速、廣泛」地向「大眾」傳播健康訊息」)」』。講述法、團體討論法、電腦輔助教學是「小團體/個別」的方法，「無法「快速、大範圍」」觸及大眾。「快速讓大眾了解」用健康傳銷。故 D 正確。健康傳銷(媒體傳播)能快速、大範圍傳達健康知識。","options":{"A":"講述法是小團體的面對面教學。","B":"團體討論法是小團體的討論。","C":"電腦輔助教學法是個別/小組的學習。","D":"正確。健康傳銷法(媒體傳播)能快速、大範圍傳達知識。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"110030-N5-71":{"quick":"學校需「優先處理」的學生健康問題＝全校當日腸病毒請假人數10人。","detail":{"background":"學校護理師需「優先處理」的是(C)『「全校「當日「腸病毒」請假人數10人」(疑似「「傳染病(腸病毒)「群聚」」，具「急迫性、傳播風險」，須立即「疫調、防治、停課評估」)』。其他(A 過重12%、B 視力不良63%、D 齲齒率20%)是「慢性的健康問題」，不具「傳染病群聚」的急迫性。故 C 正確。傳染病群聚(腸病毒請假)具急迫性，應優先處理(與前述同類題一致)。","options":{"A":"過重體位超過12%是慢性問題，非急迫。","B":"視力不良63%是慢性問題，非急迫。","C":"正確。當日腸病毒請假10人(傳染病群聚)，應優先處理。","D":"齲齒率超過20%是慢性問題，非急迫。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"110030-N5-72":{"quick":"視力保健的護理指導「較適當」者＝書本與眼睛的距離應保持30~40公分。","detail":{"background":"視力保健的護理指導，「較適當」者為(B)『「書本與眼睛的距離應保持「「30~40公分」」(適當的閱讀距離，避免太近傷眼)』。其他錯誤:A『桌面照度「600米燭光、「越亮越好」」』錯誤(照度應「「適中(約350~500米燭光)」」，「過亮、過暗」都不好);C『書桌光線最好由「左前方」來』不夠精確(慣用右手者，光線應由「「左方/左上方」」來，以免「右手陰影」遮住;但須避免直射);D『看電視每「「一小時」」休息10分鐘』錯誤(應「「每30分鐘」休息10分鐘」)。故 B 正確。閱讀距離應保持30~40公分。","options":{"A":"照度應適中，非「越亮越好」。","B":"正確。書本與眼睛距離應保持30~40公分。","C":"光線應由左方(避右手陰影)，「左前方」敘述不夠精確。","D":"看電視應每30分鐘休息，非每一小時。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"110030-N5-77":{"quick":"高血壓個案應避免的休閒活動＝洗三溫暖①、舉重訓練③。","detail":{"background":"高血壓個案應「避免」的休閒活動:(1)「「洗三溫暖」(冷熱「溫差過大」會使血管「驟然收縮/擴張」，血壓波動大，有危險)」;(3)「「舉重訓練」(「「閉氣用力(Valsalva)」」會使血壓「驟升」，危險)」。而(2)打太極拳、(4)游泳是「「和緩、有氧」」的運動，「適合」高血壓病人。故應避免①③(選 B)。高血壓應避免三溫暖(溫差大)、舉重(閉氣用力升血壓)。","options":{"A":"12：②打太極拳適合，非避免。","B":"正確。應避免洗三溫暖①、舉重訓練③。","C":"24：②④皆適合，非避免。","D":"34：含④(游泳，適合)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"110030-N5-78":{"quick":"低升糖指數(GI)食物的辨識(本題送分)。","detail":{"background":"本題詢問低升糖指數(GI)食物——經評定為「送分(各選項均給分)」。理解重點:「低 GI 食物」血糖上升較「緩和」(如未精製的「全穀、糙米、燕麥、山藥」等);「高 GI 食物」血糖上升快(如白飯、白麵包、地瓜、南瓜等較高)。本題因「地瓜、南瓜、山藥」等根莖類的 GI 分類有爭議而送分。本題送分。","options":{"A":"本題送分(各選項均給分)。","B":"本題送分。","C":"本題送分。","D":"本題送分。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署","送分題"]}},"110030-N5-79":{"quick":"減低肥胖的健康飲食建議「錯誤」者＝多攝取不完全氫化油(hydrogenated oils)。","detail":{"background":"衛福部減低肥胖的健康飲食建議，「錯誤」者為(D)『「「多攝取「不完全氫化油(hydrogenated oils)」」』——錯誤，「「(部分/不完全)氫化油「含「反式脂肪」」，「「有害健康(增加心血管疾病)」，應「「「避免/減少」」攝取」，而非「多攝取」。其他正確:A 減少攝取游離糖、B 以白肉代替紅肉、C 多攝取膳食纖維。故本題選錯誤者為 D。氫化油含反式脂肪，應減少，非多攝取。","options":{"A":"減少攝取游離糖，正確。","B":"以白肉代替紅肉，正確。","C":"多攝取膳食纖維，正確。","D":"正確(本題選錯誤者)。氫化油含反式脂肪，應減少，非多攝取。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治","國民健康署"]}},"110110-N5-56":{"quick":"健康促進的概念「正確」者＝強調增進民眾掌控其健康的影響因素及改善其健康。","detail":{"background":"健康促進的概念，「正確」者為(B)『「強調「增進民眾「掌控(掌握)」其「健康的「影響因素」」及「改善其健康」(WHO 渥太華憲章對健康促進的定義:使人們能「增加對自身健康的「掌控」並「促進健康」」的「過程」)』。其他錯誤:A『健康促進是一種「狀態」、而非「過程」』錯誤(健康促進是「「過程」」);C『「只」強調「環境」』錯誤(不只環境，是「多面向」);D『屬三段五級的「第二級」預防』錯誤(健康促進屬「「第一段「第一級」」)。故 B 正確。健康促進是使人們掌控並改善自身健康的「過程」。","options":{"A":"健康促進是「過程」，非狀態。","B":"正確。強調增進民眾掌控健康的影響因素及改善健康。","C":"不只強調環境，是多面向的。","D":"健康促進屬第一段第一級，非第二級。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"110110-N5-57":{"quick":"衛生教育評價「正確」者＝標準參照評價著重了解學習成就是否達預先設定的標準。","detail":{"background":"衛生教育的評價，「正確」者為(A)『「標準參照評價(criterion-referenced)著重「了解學習者的「學習成就是否「達「預先設定的「標準」」」(與「絕對的標準」比較，而非與他人比較)」』。其他錯誤:B『「形成性」評價是在「教學「之前」」測量』錯誤(形成性評價
