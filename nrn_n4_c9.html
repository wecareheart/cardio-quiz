童需隔4 週後才能接種疫苗","D":"活性疫苗可接種於後天免疫缺乏症候群兒童"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"10預防接種與孕期感染借題","topic_num":"小兒感染與免疫風濕","topic_code":"C9","q_num":47,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"兒癌病童化療期間不宜接種水痘疫苗","B":"體重2,000 公克以上之新生兒,可接種卡介苗","C":"靜脈注射免疫球蛋白的兒童需隔4 週後才能接種疫苗","D":"活性疫苗可接種於後天免疫缺乏症候群兒童"},"img":""},{"id":"113180-N4-4","code":"113180","roc":"113","cat":"N4","catname":"產兒科護理學","num":4,"stem":"王女士,懷孕16 週,有關產檢報告結果,下列何者需最優先給予衛教?","opts":{"A":"尿糖陰性","B":"尿蛋白微量","C":"德國麻疹IgG 陰性","D":"B 型肝炎HBsAg 陰性"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"10預防接種與孕期感染借題","topic_num":"小兒感染與免疫風濕","topic_code":"C9","q_num":4,"roc_year":"113","exam_code":"113180","src":"民國113年","options":{"A":"尿糖陰性","B":"尿蛋白微量","C":"德國麻疹IgG 陰性","D":"B 型肝炎HBsAg 陰性"},"img":""},{"id":"114170-N4-23","code":"114170","roc":"114","cat":"N4","catname":"產兒科護理學","num":23,"stem":"產婦產後立即性大出血,必須嚴密監測下列何項情況的發生?","opts":{"A":"瀰漫性血管內凝血(DIC)","B":"後天免疫缺乏症候群(AIDS)","C":"妊娠誘發性高血壓(PIH)","D":"子宮內胎兒生長遲緩(IUGR)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"10預防接種與孕期感染借題","topic_num":"小兒感染與免疫風濕","topic_code":"C9","q_num":23,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"瀰漫性血管內凝血(DIC)","B":"後天免疫缺乏症候群(AIDS)","C":"妊娠誘發性高血壓(PIH)","D":"子宮內胎兒生長遲緩(IUGR)"},"img":""}],E={"104030-N4-57":{"quick":"德國麻疹感染與預防正確的是「婦女於懷孕初期注射免疫球蛋白,可對德國麻疹產生被動免疫」(C)。","detail":{"background":"德國麻疹(rubella)由飛沫傳染,潛伏期約14~21天,紅疹出現前後數天皆有傳染力。孕婦因MMR是活減毒疫苗而禁打,若懷孕初期暴露又無抗體,可注射免疫球蛋白取得暫時的被動免疫以降低胎兒受感染風險;孕婦最佳預防仍是孕前先接種疫苗並避孕至少1個月。德國麻疹感染後可獲終身主動免疫,不需再補MMR。孕婦初期(器官形成期)感染易致先天性德國麻疹症候群(先心、耳聾、白內障)。","options":{"A":"錯。紅疹出現前後仍具傳染力,非「出現後傳染力消失」。","B":"錯。自然感染德國麻疹後即終身免疫,不需再注射MMR。","C":"正確。懷孕初期注射免疫球蛋白可獲被動免疫,暫時保護(孕婦不可打活疫苗)。","D":"錯。致胎兒缺陷的是懷孕初期感染(器官形成期),非末期。"},"sources":["Nelson《兒科學》德國麻疹","被動免疫"]}},"105030-N4-57":{"quick":"麻疹與德國麻疹比較錯誤的是「麻疹恢復期皮膚不會脫屑」(A)。","detail":{"background":"麻疹(measles)病程:前驅期有3C(咳嗽、結膜炎、鼻炎)與發燒、口腔柯氏斑點;發疹由上而下,恢復期紅疹消退後會留下脫屑與棕色色素沉著。德國麻疹則疹退後不留色素、無脫屑,且耳後/枕後淋巴結腫大為其特徵。兩者區別常考:麻疹有3C與柯氏斑、疹久且脫屑色素沉著;德國麻疹三日疹、淋巴結腫、不留痕。","options":{"A":"錯誤(本題答案)。麻疹恢復期會脫屑並留棕色色素沉著(非不脫屑)。","B":"正確。德國麻疹疹退後不留色素沉著。","C":"正確。麻疹前驅期有結膜炎、鼻炎(3C之二)。","D":"正確。德國麻疹會出現耳後/枕後淋巴結腫大。"},"sources":["Nelson《兒科學》麻疹","脫屑"]}},"105090-N4-56":{"quick":"兒童麻疹臨床表徵護理評估錯誤的是「前驅期時兒童會有咳嗽、結膜炎及鼻炎等症狀,此時體溫通常維持正常範圍」(A)。","detail":{"background":"麻疹前驅期(卡他期)即出現3C(咳嗽、結膜炎、鼻炎)時就已伴隨發燒,並非體溫正常;此期下頷黏膜可見柯氏斑點(中心藍白、周圍紅斑),為麻疹特異徵象。柯氏斑出現後1~2天、發燒到最高峰時才開始出疹,發疹順序由上而下(前額→臉→頸→軀幹→四肢)。","options":{"A":"錯誤(本題答案)。前驅期出現3C時即已發燒,非體溫正常。","B":"正確。下頷黏膜柯氏斑點(中心藍白、周圍紅斑)是麻疹特異徵象。","C":"正確。柯氏斑後1~2天、發燒最高峰時開始出疹。","D":"正確。發疹由上而下(前額臉頸軀幹四肢)。"},"sources":["Nelson《兒科學》麻疹","發燒"]}},"107110-N4-67":{"quick":"德國麻疹(German measles)護理指導正確的是「第一孕期婦女應與德國麻疹隔離」(D)。","detail":{"background":"德國麻疹經飛沫傳染,出疹前後皆具傳染力;對胎兒最大威脅在懷孕第一孕期(器官形成期),孕婦若無抗體應避免接觸感染者,以防先天性德國麻疹症候群。德國麻疹症狀在年紀愈大者愈明顯(成人較重),粉紅斑丘疹由臉部開始往下蔓延。","options":{"A":"錯。症狀年紀愈大愈明顯(成人較重),非愈小愈明顯。","B":"錯。粉紅斑丘疹由臉部開始往下(非由四肢)。","C":"錯。出疹後仍具傳染力,須持續接觸防護。","D":"正確。第一孕期婦女應與德國麻疹隔離,防胎兒先天缺陷。"},"sources":["Nelson《兒科學》德國麻疹","隔離"]}},"109030-N4-63":{"quick":"新生兒暴露於巨細胞病毒、德國麻疹等感染源後,濃度會升高的抗體是「IgM」(D)。","detail":{"background":"IgM分子量大,無法通過胎盤,故新生兒血中若IgM升高,代表胎兒/新生兒自身對感染原(如CMV、德國麻疹)產生免疫反應,可作為先天/新生兒感染的指標。相對地,IgG可經胎盤由母體傳給胎兒,新生兒血中的IgG多來自母親而非自身感染。","options":{"A":"γ球蛋白為治療用免疫球蛋白製劑,非感染指標。","B":"IgG可經母體胎盤傳給胎兒,升高未必代表新生兒自身感染。","C":"IgA非此情境的感染指標。","D":"正確。IgM不過胎盤,升高代表新生兒自身受感染。"},"sources":["Nelson《兒科學》新生兒抗體","IgM"]}},"109110-N4-57":{"quick":"麻疹(measles)症狀正確的是「紅疹出現前3~5天至出現紅疹後4天,為傳染期」(C)。","detail":{"background":"麻疹由飛沫與空氣傳染,傳染力極高,須採空氣(呼吸道)隔離;其傳染期為紅疹出現前約3~5天至出疹後4天。疹子最早出現在臉部/髮際(上半身)再往下蔓延;發燒退燒一律用acetaminophen,禁用aspirin以免引發雷氏症候群。","options":{"A":"錯。麻疹經空氣/飛沫傳染,須空氣(呼吸道)隔離,非腸胃道隔離。","B":"錯。疹子最早在臉/上半身再往下(非由軀幹先)。","C":"正確。紅疹前3~5天至後4天為傳染期。","D":"錯。發燒禁用aspirin(防雷氏症候群),用acetaminophen。"},"sources":["Nelson《兒科學》麻疹","傳染期"]}},"110030-N4-60":{"quick":"麻疹卡他期(catarrhal stage)3C症狀不適當的是「抽搐(convulsion)」(D)。","detail":{"background":"麻疹卡他期(前驅期)的典型「3C」指咳嗽(Cough)、結膜炎(Conjunctivitis)、鼻炎(Coryza),三者皆C開頭、為麻疹早期呼吸道與眼部黏膜症狀;此期亦可見柯氏斑與發燒。抽搐(convulsion)並非麻疹卡他期的3C內容。","options":{"A":"是3C。結膜炎(conjunctivitis)。","B":"是3C。鼻炎(coryza)。","C":"是3C。咳嗽(cough)。","D":"本題答案(非3C)。抽搐(convulsion)非麻疹卡他期3C。"},"sources":["Nelson《兒科學》麻疹","3C"]}},"110110-N4-33":{"quick":"德國麻疹與懷孕關係錯誤的是「孕婦應接種疫苗以避免感染」(C)。","detail":{"background":"德國麻疹疫苗(MMR)是活的減毒疫苗,孕婦為禁忌對象(理論上減毒活病毒可能感染胎兒),正確作法是孕前先接種並避孕一段時間,孕期則靠避免接觸感染源來預防。德國麻疹藉空氣飛沫傳染,妊娠初期感染會造成胎兒嚴重缺陷。","options":{"A":"正確。德國麻疹藉空氣及飛沫傳染。","B":"正確。德國麻疹疫苗是活的減毒疫苗。","C":"錯誤(本題答案)。孕婦禁打活減毒疫苗,應孕前接種、孕期避免接觸。","D":"正確。妊娠初期感染會造成胎兒嚴重缺陷。"},"sources":["Nelson《兒科學》德國麻疹","孕婦禁忌"]}},"110110-N4-59":{"quick":"麻疹與德國麻疹臨床表徵比較正確的是「麻疹會在口腔出現科氏斑點(Koplik spots)」(A)。","detail":{"background":"柯氏斑點(Koplik spots)是麻疹特有的早期徵象,出現於口腔下頷黏膜(中心藍白、周圍紅斑),德國麻疹則無。德國麻疹的特徵是耳後/枕後淋巴結腫大、疹退不留色素;3C(咳嗽結膜炎鼻炎)是麻疹而非德國麻疹的症狀。","options":{"A":"正確。麻疹口腔出現柯氏斑點(Koplik spots)。","B":"錯。德國麻疹疹退後不留色素沉著(非棕色沉著)。","C":"錯。咳嗽結膜炎鼻炎是麻疹的3C(非德國麻疹)。","D":"錯。淋巴結腫大是德國麻疹特徵,且麻疹疹子非出現在淋巴腫之後。"},"sources":["Nelson《兒科學》麻疹","Koplik"]}},"112030-N4-64":{"quick":"母親懷孕早期感染易導致新生兒先天性心臟病的是「德國麻疹」(A)。","detail":{"background":"孕婦於懷孕早期(器官形成期)感染德國麻疹(rubella),病毒可經胎盤致先天性德國麻疹症候群,典型三聯徵為先天性心臟病(如開放性動脈導管)、感音性耳聾、白內障。鏈球菌、風濕性關節炎、急性支氣管炎並非經孕期感染致此類胎兒先天畸形。","options":{"A":"正確。德國麻疹致先天性心臟病、耳聾、白內障。","B":"鏈球菌感染非致胎兒先天心臟畸形。","C":"風濕性關節炎非孕期致畸感染。","D":"急性支氣管炎非致胎兒先天缺陷。"},"sources":["Nelson《兒科學》德國麻疹","先心"]}},"101030-N4-58":{"quick":"水痘皮疹的特徵是「在同一時間可在不同部位看到不同階段的發疹變化」(C)。","detail":{"background":"水痘(varicella)由水痘帶狀疱疹病毒引起,皮疹呈向心性分布(軀幹多、四肢少),最大特徵是「同一時間、不同部位可同時見到紅斑、丘疹、水疱、膿疱、結痂等不同階段」;水疱未結痂乾燥前都具傳染力,痂皮脫落後則無。","options":{"A":"錯。軀幹散佈玫瑰紅斑點是嬰兒玫瑰疹的特徵(非水痘)。","B":"錯。三日疹是德國麻疹(非水痘)。","C":"正確。同一時間不同部位可見不同階段的發疹。","D":"錯。已脫落的痂皮不具傳染性(水疱未結痂前才有)。"},"sources":["Nelson《兒科學》水痘","不同階段"]}},"101110-N4-15":{"quick":"水痘(Chickenpox; Varicella)敘述正確的是「病童在急性期應臥床休息與嚴密隔離措施」(C)。","detail":{"background":"水痘傳染力極高,經空氣、飛沫及接觸水疱液傳染,急性期應臥床休息並嚴密隔離至所有水疱結痂乾燥。皮疹呈向心性(軀幹多);退燒禁用水楊酸(aspirin)以免雷氏症候群,改用acetaminophen;痂皮乾燥後即無傳染力。","options":{"A":"錯。水痘呈向心性分布(軀幹多),非由四肢開始的離心性。","B":"錯。應避免水楊酸(防雷氏症候群),改用acetaminophen。","C":"正確。急性期臥床休息並嚴密隔離。","D":"錯。痂皮乾燥後不具傳染力(水疱未乾前才有)。"},"sources":["Nelson《兒科學》水痘","隔離"]}},"102030-N4-56":{"quick":"水痘敘述正確的是「同一時間內可在不同部位看到不同階段的發疹變化」(C)。","detail":{"background":"水痘經空氣、飛沫及接觸傳染(非主要血液傳染),皮疹特徵為同一時間不同部位可見紅斑、水疱、膿疱、結痂等不同階段並存,呈向心性。退燒禁用aspirin以防雷氏症候群。　補充：水痘(varicella)皮疹「分批出現、向心性分布」，同一時間可見斑、丘疹、水疱、結痂「不同階段並存」；具高傳染力，水疱結痂前皆有傳染性。","options":{"A":"錯。水痘主要經空氣/飛沫/接觸傳染,非血液傳染。","B":"疹可先見於臉/頭皮,但水痘為向心性(軀幹多);本題以C為正解。","C":"正確。同一時間不同部位見不同階段發疹。","D":"錯。應避免aspirin(防雷氏症候群)。"},"sources":["Nelson《兒科學》水痘","不同階段"]}},"102030-N4-58":{"quick":"照顧傳染性疾病病童不需要戴口罩的是「破傷風」(D)。","detail":{"background":"戴口罩是為阻斷飛沫/空氣傳染。水痘、麻疹經空氣傳染,腮腺炎經飛沫傳染,照護時均須戴口罩。破傷風是破傷風桿菌經傷口侵入、其毒素致病,不會經飛沫或空氣人傳人,故照護破傷風病童不需戴口罩防飛沫。　補充：破傷風由土壤中破傷風桿菌經傷口侵入、產毒素致肌肉痙攣，「非人傳人、不經飛沫」，照顧時不需戴口罩(採傷口照護與隔離防護即可)。","options":{"A":"水痘經空氣傳染,須戴口罩。","B":"麻疹經空氣傳染,須戴口罩。","C":"腮腺炎經飛沫傳染,須戴口罩。","D":"本題答案。破傷風經傷口感染、不人傳人,不需戴口罩。"},"sources":["Nelson《兒科學》隔離","破傷風"]}},"105030-N4-58":{"quick":"水痘(Chickenpox; Varicella)的臨床表徵是「在同一個時間內可以觀察到紅斑、水疱及膿疱疹」(A)。","detail":{"background":"水痘皮疹的標誌是同一時間可同時觀察到紅斑、水疱、膿疱、結痂等不同階段;分布為向心性(軀幹多、四肢少),發燒與出疹大致同時出現,恢復後一般不留色素沉著。　補充：水痘(varicella)皮疹「分批、向心性出現」，同一時間可同時觀察到「紅斑、丘疹、水疱與結痂」不同階段並存；屬高傳染性、空氣與接觸傳染。","options":{"A":"正確。同一時間可見紅斑、水疱及膿疱(不同階段並存)。","B":"錯。水痘為向心性(軀幹多),非手腳集中的離心性。","C":"錯。水痘發燒與出疹約同時(退燒後才出疹是玫瑰疹)。","D":"錯。水痘恢復後一般不留色素沉著。"},"sources":["Nelson《兒科學》水痘","不同階段"]}},"106110-N4-57":{"quick":"小一學生罹患水痘返校上課適當的建議是「疹子結疤乾燥後7~8天」(C)。","detail":{"background":"水痘須等到所有水疱都結痂乾燥、無新水疱冒出(約出疹後7~8天)才不具傳染力,方可返校,以免傳染同學。出疹後5~6天或化膿後多半仍有未結痂的水疱具傳染力;水痘是病毒感染,抗生素無效。　補充：水痘具高傳染力，傳染期至「所有水疱結痂乾燥」為止；返校建議為「疹子完全結痂乾燥後(約發疹後7天)」才可返校上課，以免傳染同學。","options":{"A":"出疹後5~6天多仍有未結痂水疱、具傳染力。","B":"化膿後5~6天仍可能傳染。","C":"正確。疹子結痂乾燥後7~8天(無傳染力)可返校。","D":"水痘是病毒,抗生素無效。"},"sources":["Nelson《兒科學》水痘","返校"]}},"106111-N4-58":{"quick":"口腔內會出現柯氏斑點(Koplik spot)的傳染性疾病是「麻疹」(A)。","detail":{"background":"柯氏斑點(Koplik spots)是麻疹特有的早期徵象,於口腔下頷黏膜出現中心藍白、周圍紅斑的小點,常在出疹前1~2天出現,有助於麻疹早期診斷。嬰兒玫瑰疹、德國麻疹、水痘均無柯氏斑點。　補充：麻疹(measles)前驅期口腔頰黏膜出現「柯氏斑點(Koplik spot，紅底白色斑點)」為其特異性早期徵象，先於皮疹出現；MMR疫苗可預防。","options":{"A":"正確。柯氏斑點是麻疹的特異性早期表現。","B":"嬰兒玫瑰疹無柯氏斑點。","C":"德國麻疹無柯氏斑點。","D":"水痘無柯氏斑點。"},"sources":["Nelson《兒科學》麻疹","Koplik"]}},"107110-N4-68":{"quick":"嬰兒玫瑰疹(roseola infantum)錯誤的是「需要呼吸道隔離至出疹後四天」(C)。","detail":{"background":"嬰兒玫瑰疹由人類疱疹病毒第六型(HHV-6)引起,好發6個月~2歲,特徵為突發高燒3~5天、退燒後才開始由軀幹出疹擴散四肢;熱性痙攣是常見合併症,感染後可終身免疫。其傳染力低,且出疹時多已退燒、傳染力下降,不需嚴格呼吸道隔離至出疹後四天。","options":{"A":"正確。熱痙攣是玫瑰疹常見合併症。","B":"正確。退燒後才開始發疹,由軀幹擴散至四肢。","C":"錯誤(本題答案)。玫瑰疹傳染力低,不需呼吸道隔離至出疹後四天。","D":"正確。感染後可獲終身免疫。"},"sources":["Nelson《兒科學》玫瑰疹","隔離"]}},"109030-N4-47":{"quick":"不是腮腺炎臨床典型症狀的是「皮疹」(D)。","detail":{"background":"流行性腮腺炎(mumps)由飛沫傳染,以腮腺腫大脹痛為核心表現,伴發燒、食慾不振、耳朵痛(腮腺腫脹壓迫所致);併發症含睪丸炎、腦膜炎。腮腺炎並無皮疹,皮疹是麻疹、德國麻疹、水痘、玫瑰疹等出疹性傳染病的表現。","options":{"A":"是。發燒。","B":"是。食慾不振。","C":"是。耳朵痛(腮腺腫脹壓迫)。","D":"本題答案(非)。腮腺炎以腮腺腫脹為主、無皮疹。"},"sources":["Nelson《兒科學》腮腺炎","無皮疹"]}},"109110-N4-58":{"quick":"嬰兒玫瑰疹敘述正確的是「當高燒消退後,開始出現疹子」(B)。","detail":{"background":"嬰兒玫瑰疹由HHV-6引起,好發6個月~2歲,典型為突發高燒3~5天、退燒後才出現玫瑰紅斑點(先軀幹再四肢/臉);熱性痙攣是其最常見合併症。其特殊的「燒退疹出」時序為與其他出疹病的鑑別重點。　補充：嬰兒玫瑰疹(roseola，HHV-6)特徵為「先高燒3~5天，燒退後才出現玫瑰色斑丘疹」(熱退疹出)，疹由軀幹擴散、數天消退；高燒期易併熱性痙攣。","options":{"A":"錯。玫瑰疹好發6個月~2歲(非2~5歲)。","B":"正確。高燒消退後才開始出疹。","C":"錯。最常合併症是熱性痙攣(非中耳炎)。","D":"錯。病原是HHV-6(非第二型疱疹病毒)。"},"sources":["Nelson《兒科學》玫瑰疹","退燒出疹"]}},"112110-N4-59":{"quick":"玫瑰疹(Roseola Infantum)敘述正確的是「常見合併症為熱性痙攣」(D)。","detail":{"background":"嬰兒玫瑰疹由人類疱疹病毒第六型(HHV-6)引起,好發6個月~2歲嬰幼兒,突發高燒3~5天後退燒、再由軀幹開始出玫瑰紅斑點;因高燒易誘發熱性痙攣,為其常見合併症。　補充：玫瑰疹(Roseola Infantum，HHV-6)好發6~24個月嬰幼兒，特徵「高燒3~5天、熱退疹出」，疹由軀幹擴散；「常見合併症為熱性痙攣」(高燒期)。","options":{"A":"錯。玫瑰疹由HHV-6(第六型),非第1型人類疱疹。","B":"錯。好發6個月~2歲嬰幼兒(非學齡前)。","C":"錯。燒退後先由軀幹再擴散四肢/臉(非先臉)。","D":"正確。常見合併症為熱性痙攣(高燒誘發)。"},"sources":["Nelson《兒科學》玫瑰疹","熱痙攣"]}},"112180-N4-37":{"quick":"腮腺炎照護措施錯誤的是「若張口困難則建議以吸管飲用檸檬汁」(B)。","detail":{"background":"腮腺炎照護以舒適與止痛為主:可冷敷或溫敷腫脹處、給acetaminophen緩解脹痛與高燒、自腮腺腫大起採呼吸道隔離約9天。應避免酸性食物與飲料,因檸檬、柑橘等會刺激唾液分泌而加重腮腺脹痛。　補充：腮腺炎照護：清淡軟質飲食、多休息、冰敷腫脹腮腺減痛、避免「酸性食物(如檸檬汁)」(刺激唾液分泌加重疼痛)；「以吸管飲用檸檬汁」會加重腮腺疼痛、為錯誤。","options":{"A":"正確。冷敷或溫敷頸部腫脹處增加舒適。","B":"錯誤(本題答案)。檸檬汁等酸性飲料刺激唾液分泌、加重腮腺脹痛,應避免。","C":"正確。Acetaminophen緩解脹痛與高燒。","D":"正確。自腮腺腫大採呼吸道隔離約9天。"},"sources":["Nelson《兒科學》腮腺炎","避酸"]}},"113180-N4-37":{"quick":"嬰兒玫瑰疹(roseola)評估錯誤的是「發疹期間大約會持續1週以上才消退」(D)。","detail":{"background":"嬰兒玫瑰疹特徵為突發高燒持續3~5天、枕下/耳後淋巴結可腫大,退燒後由軀幹開始出散發性玫瑰紅斑點;疹子通常1~2天即快速消退、不癢不留色素。發疹期短是其與麻疹(疹久脫屑)的區別。　補充：嬰兒玫瑰疹(roseola)特徵為「高燒3~5天、熱退後出疹、疹子數天(約1~3天)即消退」；「發疹期持續1週以上才消退」之敘述錯誤(玫瑰疹疹子消退快)。","options":{"A":"正確。突然高燒持續3~5天。","B":"正確。枕下/耳後淋巴結可能腫大。","C":"正確。軀幹先出現散發性玫瑰紅斑點。","D":"錯誤(本題答案)。疹子約1~2天快速消退(非1週以上)。"},"sources":["Nelson《兒科學》玫瑰疹","消退"]}},"114030-N4-37":{"quick":"6個月嬰兒臉部粉紅斑丘疹漫延至軀幹下肢、疹3天消除、耳後後頸淋巴結腫,最可能是「德國麻疹(rubella)」(B)。","detail":{"background":"本例耳後/後頸淋巴結腫大、粉紅斑丘疹由臉部往下蔓延、疹子約3天即消除(三日疹),為德國麻疹的典型表現。麻疹有柯氏斑、3C且疹久脫屑;嬰兒玫瑰疹是退燒後才出疹;感染型紅斑(第五病)以臉頰巴掌紅為特徵。　補充：德國麻疹(rubella)：輕微發燒、淡粉紅斑丘疹由臉部擴散至軀幹四肢、約3天消退(三日麻疹)、「耳後與枕後頸部淋巴結腫大」為特徵；孕婦感染致胎兒畸形。","options":{"A":"麻疹有柯氏斑、3C、疹久脫屑(非三日疹)。","B":"正確。耳後淋巴腫+臉往下粉紅疹+3天消除=德國麻疹。","C":"嬰兒玫瑰疹是退燒後出疹。","D":"感染型紅斑以臉頰巴掌紅為特徵。"},"sources":["Nelson《兒科學》德國麻疹","三日疹"]}},"114170-N4-36":{"quick":"嬰兒玫瑰疹(roseola infantum)在發疹期正確的是「疹子從軀幹開始擴散至頸、臉及四肢」(C)。","detail":{"background":"嬰兒玫瑰疹的特殊時序為突發高燒3~5天、退燒後才出疹,疹子由軀幹開始擴散至頸、臉及四肢,通常1~2天快速消退、不癢且不留色素沉著。　補充：嬰兒玫瑰疹(roseola)發疹期特徵為「熱退後出現玫瑰色斑丘疹，由『軀幹』開始擴散至頸、臉及四肢」、數天消退；高燒期易併熱性痙攣。","options":{"A":"錯。玫瑰疹是退燒後才發疹(非發燒時一起)。","B":"錯。發疹期約1~2天消退(非7天)。","C":"正確。疹子從軀幹開始擴散至頸、臉及四肢。","D":"錯。疹子不癢、不留色素沉著。"},"sources":["Nelson《兒科學》玫瑰疹","軀幹"]}},"101030-N4-56":{"quick":"猩紅熱敘述正確的是「出現針點狀紅疹,受壓時變白,質地粗糙如沙紙般」(C)。","detail":{"background":"猩紅熱由A群β型溶血性鏈球菌(產紅疹外毒素)引起,好發學齡兒童,以突發高燒、咽炎與全身針點狀紅疹為特徵;紅疹受壓變白、摸起來粗糙如砂紙(砂紙疹),舌頭由白草莓舌轉為紅草莓舌,後期脫屑。診斷靠喉頭培養與狄克氏試驗,盤尼西林治療24小時內可退燒。","options":{"A":"錯。為A群β型溶血性鏈球菌(非B群α型)。","B":"錯。好發學齡兒童且高燒(非1~3歲輕微發燒)。","C":"正確。針點狀紅疹受壓變白、質地粗糙如砂紙。","D":"錯。舌面由白草莓舌轉紅草莓舌(非紅轉白)。"},"sources":["Nelson《兒科學》猩紅熱","砂紙疹"]}},"104100-N4-59":{"quick":"猩紅熱(Scarlet fever)診斷檢查錯誤的是「錫克氏試驗(Schick’s test)呈陽性反應」(B)。","detail":{"background":"猩紅熱由A群β型溶血性鏈球菌引起,診斷可靠喉頭培養出該菌、狄克氏試驗(Dick test)檢測對紅疹毒素的感受性、以及2週內血清抗鏈球菌溶血素(ASLO)抗體效價升高。錫克氏試驗(Schick test)是檢測對「白喉」毒素的感受性,與猩紅熱無關。","options":{"A":"正確。喉頭培養出A群β型溶血性鏈球菌。","B":"錯誤(本題答案)。錫克氏試驗是白喉感受性試驗(非猩紅熱)。","C":"正確。狄克氏試驗(Dick test)呈陽性。","D":"正確。2週內ASLO抗體效價>166單位。"},"sources":["Nelson《兒科學》猩紅熱","Dick"]}},"105030-N4-28":{"quick":"新生兒尿布疹護理措施錯誤的是「距離臀部約25~30公分使用烤燈」(C)。","detail":{"background":"尿布疹是尿液糞便長時間刺激所致的接觸性皮膚炎,護理重點為勤換尿布、排便後溫水清洗臀部、擦氧化鋅藥膏隔離刺激並保持乾燥、適度暴露於空氣。烤燈因有燙傷風險(嬰兒皮膚嬌嫩),現已不建議常規使用於尿布疹。　補充：尿布疹護理：勤換尿布、溫水清潔、塗護膚膏、暴露乾燥；若用烤燈須「距臀部約30公分以上、時間勿過長並專人監看」；「距離25~30公分」偏近、需注意燙傷。","options":{"A":"正確。勤檢查尿布,潮濕應立即更換。","B":"正確。排便後以清水清洗臀部。","C":"錯誤(本題答案)。烤燈有燙傷風險,不建議使用。","D":"正確。擦氧化鋅藥膏減少滲液、保持乾燥。"},"sources":["Nelson《兒科學》尿布疹","烤燈"]}},"107110-N4-64":{"quick":"6個月膿皰病(腋下鼠蹊頸膿皰結痂脫屑)處置不適當的是「因膿皰病具高度傳染力,避免清洗患部及引流膿皰」(A)。","detail":{"background":"膿皰病(impetigo)由金黃葡萄球菌或鏈球菌感染表皮所致,好發皺褶處,高傳染力。護理應清洗患部、輕柔去除痂皮與分泌物(去菌利於藥物吸收與癒合)、局部塗抗生素藥膏、剪短指甲防抓破、適當隔離維持清潔。避免清洗反而使痂皮與細菌堆積、不利癒合。","options":{"A":"不適當(本題答案)。應清洗患部去痂(非避免清洗)。","B":"適當。依醫囑局部塗新黴素抗生素藥膏。","C":"適當。剪短指甲保護患處不被抓破。","D":"適當。適當隔離、維持清潔、預防感染。"},"sources":["Nelson《兒科學》膿皰病","清洗去痂"]}},"108020-N4-29":{"quick":"新生兒皮膚敘述錯誤的是「毛細血管瘤為永久性不會消失」(A)。","detail":{"background":"新生兒常見良性皮膚變化多會自行消退:毒性紅斑於出生1~3週內消失、蒙古斑約1~5歲漸退、粟粒疹2~4週消失、草莓狀毛細血管瘤多在數年內自行消退,並非永久性。　補充：新生兒常見皮膚現象多為良性暫時：蒙古斑、粟粒疹、毒性紅斑、橘紅色斑(鸛咬痕)；「毛細血管瘤(草莓狀血管瘤)」多於幼兒期增大後「自行消退」，非永久不消失。","options":{"A":"錯誤(本題答案)。草莓狀毛細血管瘤多會自行消退(非永久)。","B":"正確。毒性紅斑1~3週會消失。","C":"正確。蒙古斑約1~5歲漸消退。","D":"正確。粟粒疹2~4週會消失。"},"sources":["Nelson《兒科學》新生兒皮膚","血管瘤"]}},"109030-N4-30":{"quick":"新生兒毒性紅斑與膿疱敘述正確的是「毒性紅斑通常在出生後最初的4天內發生」(B)。","detail":{"background":"新生兒毒性紅斑是良性、自限的紅斑伴小膿疱,通常於出生後最初數天(約4天內)出現,1~3週內自行消退,不需治療;其膿疱內為嗜酸性球而非細菌感染。新生兒膿痂/膿皰若為細菌(如金黃葡萄球菌)感染則具傳染性、需處理。","options":{"A":"錯。毒性紅斑良性自限、不需治療(1~3週自消)。","B":"正確。毒性紅斑通常出生後最初4天內發生。","C":"感染性膿疱具傳染性(此項敘述不周延)。","D":"錯。新生兒膿皰病多金黃葡萄球菌(非大腸桿菌)。"},"sources":["Nelson《兒科學》毒性紅斑","4天"]}},"112030-N4-59":{"quick":"猩紅熱臨床表徵正確的是「突發性高燒,盤尼西林治療24小時內體溫降至正常」(A)。","detail":{"background":"猩紅熱以突發高燒、咽炎、砂紙樣針點紅疹與草莓舌為表現;因病原為A群β型溶血性鏈球菌,對盤尼西林敏感,治療24小時內多可退燒。舌頭變化為先白草莓舌再轉紅草莓舌,皮疹受壓會變白。　補充：猩紅熱(A群鏈球菌)表現「突發高燒、草莓舌、砂紙樣紅疹、口周蒼白圈」；對盤尼西林敏感，「治療24~48小時內退燒」；須完成療程預防風濕熱與腎炎。","options":{"A":"正確。突發高燒,盤尼西林治療24小時內退燒。","B":"錯。舌頭最初白草莓舌後轉紅草莓舌(非紅轉白)。","C":"皮疹最早出現於頸、腋、腹股溝皺褶處(敘述不符)。","D":"錯。針點狀紅疹受壓變白(非更明顯)。"},"sources":["Nelson《兒科學》猩紅熱","盤尼西林"]}},"114030-N4-17":{"quick":"預防尿布疹的措施最適當的是「大小便後以溫水清洗再用清潔的布拭乾」(C)。","detail":{"background":"預防尿布疹的核心是保持臀部清潔乾燥、減少尿便刺激:大小便後以溫水清洗、用清潔布輕拭乾、勤換尿布、適度暴露空氣、擦氧化鋅。應避免痱子粉(遇潮結塊刺激且有吸入風險)、酒精(刺激嬌嫩皮膚)。　補充：預防尿布疹最適當措施為「勤換尿布、大小便後以溫水清洗會陰並用清潔布輕拍拭乾、保持乾爽、塗護膚膏」；避免使用刺激性濕巾與密不透氣包覆。","options":{"A":"錯。勿用痱子粉(結塊刺激、吸入風險)。","B":"錯。勿用酒精消毒(刺激嬌嫩皮膚)。","C":"正確。大小便後溫水清洗再用清潔布拭乾。","D":"錯。改配方奶與尿布疹預防無關。"},"sources":["Nelson《兒科學》尿布疹","溫水"]}},"101030-N4-64":{"quick":"3歲川崎氏病臨床表徵非診斷指標的是「關節痛及多發性關節炎」(C)。","detail":{"background":"川崎氏症診斷需發燒≥5天加上五大主要特徵中四項:雙眼結膜充血、口唇乾裂草莓舌、四肢末梢紅腫脫皮、軀幹多形皮疹、頸部淋巴結腫。多發性關節炎並非川崎氏症的診斷指標,而是急性風濕熱(Jones準則)的表現,故為本題答案。","options":{"A":"是。軀幹皮膚可能出現皮疹。","B":"是。手掌、腳底可能泛紅腫脹(末梢變化)。","C":"本題答案(非川崎指標)。多發性關節炎是風濕熱指標。","D":"是。口唇乾燥泛紅、草莓舌。"},"sources":["Nelson《兒科學》川崎氏症","診斷"]}},"106030-N4-62":{"quick":"2歲川崎氏症(發燒5天+草莓舌)不屬於重要症狀觀察項目的是「呼吸喘促」(B)。","detail":{"background":"川崎氏症是全身性血管炎,診斷重點與觀察項目環繞五大特徵:雙眼結膜充血、口唇乾裂草莓舌、四肢末梢紅腫脫皮(含肛門周圍脫皮)、軀幹多形皮疹、頸部淋巴結腫;最須長期追蹤的是冠狀動脈瘤。呼吸喘促並非川崎氏症的典型主要觀察項目。","options":{"A":"是。肛門周圍皮膚脫皮(末梢脫皮)。","B":"本題答案(非)。呼吸喘促非川崎氏症典型主要觀察項目。","C":"是。眼結膜充血。","D":"是。四肢末梢紅腫。"},"sources":["Nelson《兒科學》川崎氏症","觀察"]}},"108020-N4-45":{"quick":"川崎氏症(Kawasaki Disease)敘述錯誤的是「當症狀獲得控制後,仍須長期追蹤其中樞神經系統病變」(D)。","detail":{"background":"川崎氏症急性期持續發燒5天以上、草莓舌,給高劑量阿斯匹靈抗發炎並抑制血小板凝集(配合IVIG降低冠狀動脈瘤);亞急性期手指、腳趾、肛門脫皮。其最重要的長期追蹤對象是「心臟冠狀動脈」病變(動脈瘤),而非中樞神經系統。","options":{"A":"正確。急性期持續發燒5天以上、草莓狀舌。","B":"正確。急性期高劑量Aspirin抗發炎、抑制血小板凝集。","C":"正確。亞急性期手指腳趾肛門脫皮。","D":"錯誤(本題答案)。須長期追蹤心臟冠狀動脈病變(非中樞神經)。"},"sources":["Nelson《兒科學》川崎氏症","冠狀動脈"]}},"102030-N4-57":{"quick":"腸病毒(enterovirus)敘述錯誤的是「糞便中的病毒可存留6個月」(D)。","detail":{"background":"腸病毒經腸胃道、呼吸道與接觸傳染,發病前數天的喉嚨與糞便即帶有傳染力;呼吸道口沫中病毒約存留1~3週,而腸道(糞便)排出病毒的時間可長達2~3個月,並非6個月。此「糞便長期排毒」是腸病毒不易完全防堵的原因。","options":{"A":"正確。傳染途徑含腸胃道、呼吸道及接觸。","B":"正確。發病前數天喉嚨與糞便已有傳染力。","C":"正確。呼吸道口沫病毒可存留1~3週。","D":"錯誤(本題答案)。糞便病毒約存留2~3個月(非6個月)。"},"sources":["Nelson《兒科學》腸病毒","糞便排毒"]}},"102110-N4-55":{"quick":"腸病毒居家護理指導錯誤的是「提醒家長5~7歲的兒童有較高比率會得到腦炎、類小兒麻痺症候群等症狀」(A)。","detail":{"background":"腸病毒重症(腦炎、類小兒麻痺、心肺衰竭)好發於5歲以下、尤其3歲以下嬰幼兒,年紀愈小風險愈高,並非5~7歲。居家護理重點:小心處理口鼻分泌物與排泄物、肥皂加強洗手、請假在家避免共用餐具、給軟質高熱量冰涼食物減輕口腔疼痛。","options":{"A":"錯誤(本題答案)。重症好發5歲以下嬰幼兒(非5~7歲)。","B":"正確。小心處理分泌物排泄物、肥皂洗手。","C":"正確。請假在家、避免共用餐具防交互傳染。","D":"正確。給布丁冰淇淋果凍等軟質高熱量食物。"},"sources":["Nelson《兒科學》腸病毒","5歲以下"]}},"103100-N4-61":{"quick":"4歲腸病毒(發燒、口腔水泡、手掌腳掌紅疹)護理措施不適當的是「鼓勵讀幼幼班的弟弟前來探視」(D)。","detail":{"background":"腸病毒(手足口病)傳染力高,經飛沫、接觸與糞口傳染。護理可給軟質流質飲食減口腔痛、發燒給解熱劑、加強洗手。但應避免讓家中其他幼兒(尤5歲以下)接觸病童,以免被傳染並可能演變重症,故不應鼓勵幼幼班弟弟前來探視。","options":{"A":"適當。建議軟質或流質飲食減口腔疼痛。","B":"適當。發燒時給予解熱劑。","C":"適當。加強患童與家屬正確洗手。","D":"不適當(本題答案)。應避免幼兒接觸病童(非鼓勵弟弟探視)。"},"sources":["Nelson《兒科學》腸病毒","避免接觸"]}},"105030-N4-70":{"quick":"腸病毒群感染敘述正確的是「散播途徑主要是飛沫及接觸傳染」(B)。","detail":{"background":"腸病毒主要經飛沫、接觸與糞口途徑散播;手足口病主要侵犯5歲以下幼兒(非5歲以上);傳染高峰在夏季與初秋(非冬末春初);病毒對酸與一般環境耐受,須50°C以上高溫或含氯漂白水才能使其失活(40°C尚不足)。","options":{"A":"錯。手足口病主要侵犯5歲以下(非5歲以上)。","B":"正確。散播途徑主要飛沫及接觸傳染。","C":"錯。傳染高峰在夏季初秋(非冬末春初)。","D":"病毒須50°C以上才失活(非40°C)。"},"sources":["Nelson《兒科學》腸病毒","飛沫接觸"]}},"106030-N4-56":{"quick":"最容易引起神經系統併發症的腸病毒致病原是「腸病毒71型」(D)。","detail":{"background":"腸病毒型別中以腸病毒71型(EV71)最容易引起嚴重的神經系統併發症,如腦炎、腦幹腦炎、類小兒麻痺,重症與死亡風險高,常見於5歲以下幼兒。克沙奇A群多致手足口/疱疹性咽峽炎,腸病毒70型則與急性出血性結膜炎相關。","options":{"A":"克沙奇A9型非最易神經併發症。","B":"克沙奇B5型非最易。","C":"腸病毒70型致急性出血性結膜炎。","D":"正確。腸病毒71型最易引起神經系統併發症。"},"sources":["Nelson《兒科學》腸病毒","71型"]}},"108020-N4-44":{"quick":"腸病毒傳染途徑錯誤的是「發病前數天在喉嚨及糞便都有病毒存在,但不具傳染力」(A)。","detail":{"background":"腸病毒在發病前數天,喉嚨與糞便就已存在病毒且具傳染力,這是其防疫困難之處;發病後一週是傳染力高峰,呼吸道口沫病毒可存留1~3週,腸道排毒可達2~3個月。　補充：腸病毒「發病前數天到病後數週，喉嚨與糞便都帶病毒且具傳染力」(尤發病後1週傳染力最強)；「不具傳染力」之敘述錯誤；經糞口、飛沫、接觸傳染。","options":{"A":"錯誤(本題答案)。發病前數天即具傳染力(非不具)。","B":"正確。發病後1週是傳染力高峰。","C":"正確。呼吸道口沫病毒存留約1~3週。","D":"正確。腸道排出病毒可達2~3個月。"},"sources":["Nelson《兒科學》腸病毒","傳染力"]}},"110110-N4-60":{"quick":"腸病毒5天內須密切注意嚴重合併症狀,除外「腸骨疼痛」(D)。","detail":{"background":"腸病毒感染後5天內須警覺重症前兆,包括嗜睡、意識不清、活力不佳、手腳無力(神經侵犯)、無故驚嚇或肌躍型抽搐、呼吸急促或心跳加快(心肺衰竭)。腸骨疼痛並非腸病毒重症的前兆症狀。　補充：腸病毒感染後5天內須警覺重症前兆：嗜睡、意識不清、活力差、手腳無力、肌躍型抽搐、持續嘔吐、呼吸急促心跳快；「腸骨疼痛」非腸病毒重症徵象、為除外項。","options":{"A":"是前兆。嗜睡、意識不清、活力不佳、手腳無力。","B":"是前兆。無故驚嚇或肌躍型抽搐。","C":"是前兆。呼吸急促或心跳加快。","D":"本題答案(除外)。腸骨疼痛非腸病毒重症前兆。"},"sources":["Nelson《兒科學》腸病毒","重症前兆"]}},"111110-N4-60":{"quick":"18個月腸病毒上吐下瀉(體重14→12kg、脈搏淺快、尿少、皮膚黏膜乾)脫水程度是「重度脫水」(C)。","detail":{"background":"小兒脫水以體重流失百分比評估:輕度(嬰兒<5%)、中度(5~10%)、重度(>10%,出現哭無淚、無尿、嗜睡、脈搏快而弱、血壓降)。本例流失(14−12)÷14≈14.3%已>10%,加上脈搏淺快、尿少、皮膚黏膜乾,屬重度脫水,須靜脈輸液矯正。","options":{"A":"輕度脫水<5%。","B":"中度脫水5~10%。","C":"正確。流失約14%(>10%)、脈搏淺快尿少=重度脫水。","D":"流失14%非正常體液流失。"},"sources":["Nelson《兒科學》脫水","重度"]}},"114100-N4-37":{"quick":"4歲腸病毒出院居家照護不適當的是「糞便要馬上沖入馬桶,避免污染環境」(B)。","detail":{"background":"腸病毒糞便含大量病毒且排毒可達2~3個月,處理時應先以含氯漂白水妥善消毒再處理,若未消毒就直接沖入馬桶,可能因水花/氣溶膠污染環境而增加傳播風險。其餘如暫不上學、家中幼兒避免接觸、準備柔軟食物皆適當。","options":{"A":"適當。暫不上學避免互相感染。","B":"不適當(本題答案)。糞便應先含氯消毒再處理(非馬上沖馬桶,防污染)。","C":"適當。家中幼兒避免與病童接觸。","D":"適當。準備柔軟、口感佳的食物。"},"sources":["Nelson《兒科學》腸病毒","糞便處理"]}},"115030-N4-37":{"quick":"腸病毒(enteroviruses infection)護理指導最適當的是「與家人吃飯時應避免共餐以預防交互傳染」(A)。","detail":{"background":"腸病毒經飛沫、接觸與糞口傳染,與家人共餐易交互感染,故應避免共餐、不共用餐具並勤洗手。目前無有效疫苗可預防;返校後仍須持續勤洗手;酒精對腸病毒無效,須以含氯漂白水消毒。　補充：腸病毒護理衛教：勤洗手、注意飲食與環境衛生、「與家人應避免共餐(分餐具)」、消毒玩具與環境(漂白水，酒精無效)、患童居家休息避免傳染、警覺重症前兆。","options":{"A":"正確。與家人避免共餐以預防交互傳染。","B":"錯。目前無有效疫苗(非施打疫苗最有效)。","C":"錯。返校後仍須持續勤洗手(非不需)。","D":"錯。酒精對腸病毒無效,須含氯漂白水。"},"sources":["Nelson《兒科學》腸病毒","避免共餐"]}},"101030-N4-66":{"quick":"HIV兒童在家中及社區照護正確的是「處理兒童的切割傷或抓傷的傷口時,應戴手套」(D)。","detail":{"background":"HIV經血液與體液傳染,日常接觸(同桌、擁抱、共用物品、游泳)不會傳染,故HIV兒童可正常上學、游泳,不需消毒其接觸過的一般物品。照護重點在於接觸血液/體液時的標準防護,因此處理切割傷或抓傷的傷口時應戴手套。","options":{"A":"錯。HIV兒童可正常上學(日常接觸不傳染)。","B":"錯。不需消毒其接觸過的一般物品。","C":"錯。可游泳(不經池水傳染)。","D":"正確。處理切割/抓傷傷口時應戴手套(血液防護)。"},"sources":["Nelson《兒科學》HIV","標準防護"]}},"102030-N4-36":{"quick":"感染後空窗期及潛伏期最長的傳染病是「愛滋病」(D)。","detail":{"background":"愛滋病(HIV)感染後的空窗期(感染至可驗出抗體)與潛伏期(感染至發病為AIDS)在常見性病中最長,潛伏期可達數年至十餘年,期間外觀可無症狀卻具傳染力。淋病、梅毒、疱疹的潛伏期相對短得多。　補充：各傳染病中「愛滋病(HIV)」的空窗期(感染後抗體產生前)與潛伏期(無症狀帶原至發病)最長，可達數年，期間具傳染力，故須以核酸或抗原檢測縮短空窗期偵測。","options":{"A":"淋病潛伏期短。","B":"梅毒潛伏期相對短。","C":"疱疹潛伏期短。","D":"正確。愛滋病空窗期及潛伏期最長。"},"sources":["疾管署 HIV","潛伏期"]}},"103030-N4-58":{"quick":"AIDS嬰兒最常見死亡原因是「卡氏肺囊蟲肺炎(pneumocystis carinii pneumonia)」(D)。","detail":{"background":"AIDS嬰兒/兒童因細胞免疫缺損,易發生伺機性感染,其中卡氏肺囊蟲肺炎(PCP)是最常見的死亡原因,故臨床會用Bactrim預防PCP。卡波西斯瘤多見於成人,營養不良與惡病質非嬰兒最主要死因。　補充：AIDS嬰兒因細胞免疫崩解，最常見死亡原因為伺機性感染「卡氏肺囊蟲肺炎(PCP/Pneumocystis)」；故須預防性投藥(Bactrim)並監測CD4。","options":{"A":"卡波西斯瘤多見於成人。","B":"營養不良非最主要死因。","C":"惡病質非最主要死因。","D":"正確。卡氏肺囊蟲肺炎(PCP)是AIDS嬰兒最常見死因。"},"sources":["Nelson《兒科學》HIV","PCP"]}},"103100-N4-49":{"quick":"不是HIV垂直傳染途徑的是「產後因ABO血型不合溶血接受換血治療」(C)。","detail":{"background":"HIV垂直傳染包括產前經胎盤、生產時經產道接觸母血、產後經哺乳三種。ABO血型不合溶血所做的換血使用的是經篩檢的血品,與母嬰HIV垂直傳染無關,故非垂直傳染途徑。　補充：HIV垂直(母嬰)傳染途徑為懷孕(經胎盤)、生產(產道血液體液)、哺餵母乳；「產後因ABO血型不合溶血接受換血治療」非HIV垂直傳染途徑。","options":{"A":"是。產前病毒經胎盤。","B":"是。生產過程經產道接觸母血。","C":"本題答案(非)。ABO溶血換血用篩檢血品,與垂直傳染無關。","D":"是。產後經哺餵母乳。"},"sources":["Nelson《兒科學》HIV","垂直傳染"]}},"104030-N4-65":{"quick":"HIV帶原兒童照護適當的是「沾染病童血液的用物,可以0.05%漂白水擦拭」(D)。","detail":{"background":"HIV兒童可正常上學(日常接觸不傳染),不需因隱私而被通報學校,亦不需將其大小便先加石灰再排。照護重點是血液/體液防護,沾染病童血液的用物以0.05%(約1:100)含氯漂白水擦拭消毒即可。　補充：HIV帶原兒童照護採標準防護，沾染病童血液的用物以稀釋漂白水擦拭消毒(常用1:10/0.5%)；重點為以漂白水消毒血液污染物、戴手套、針具利器盒。","options":{"A":"錯。HIV兒童可上學(非一律居家義務教育)。","B":"大小便不需先加石灰消毒。","C":"錯。HIV不需通知學校(保護隱私)。","D":"正確。沾染血液用物以0.05%漂白水擦拭。"},"sources":["Nelson《兒科學》HIV","漂白水"]}},"105030-N4-67":{"quick":"垂直感染AIDS之嬰兒不可接種的疫苗是「沙賓口服小兒麻痺疫苗」(C)。","detail":{"background":"AIDS嬰兒免疫低下,禁打活減毒疫苗;口服沙賓(OPV)小兒麻痺是活減毒疫苗,故不可接種,應改用注射型沙克(IPV,不活化)。B肝疫苗、白喉百日咳破傷風(不活化/類毒素)、Hib(不活化)皆可接種。　補充：垂直感染AIDS之嬰兒「禁接種活性減毒疫苗」，故不可接種「沙賓口服小兒麻痺活疫苗(OPV)」，應改用沙克不活化注射疫苗(IPV)。","options":{"A":"B肝疫苗(不活化)可接種。","B":"白喉百日咳破傷風(不活化/類毒素)可接種。","C":"正確。沙賓口服小兒麻痺(活減毒)不可接種。","D":"Hib(不活化)可接種。"},"sources":["Nelson《兒科學》HIV疫苗","沙賓禁"]}},"106030-N4-67":{"quick":"兒童感染HIV的症狀錯誤的是「慢性便秘(Chronic constipation)」(C)。","detail":{"background":"兒童HIV常見表現為淋巴間質性肺炎(LIP)、肝脾腫大、口腔念珠菌病、生長遲滯與反覆感染;因腸道感染/吸收不良,多表現為慢性腹瀉而非慢性便秘。　補充：兒童HIV感染症狀包括反覆感染、生長遲滯、慢性腹瀉、淋巴結與肝脾腫大、口腔念珠菌；「慢性便秘」非HIV典型(多為慢性腹瀉)、為錯誤。","options":{"A":"正確。淋巴間質性肺炎(LIP)。","B":"正確。肝脾腫大。","C":"錯誤(本題答案)。HIV兒童多慢性腹瀉(非便秘)。","D":"正確。口腔念珠菌病。"},"sources":["Nelson《兒科學》HIV","腹瀉"]}},"106110-N4-68":{"quick":"兒童感染HIV的途徑錯誤的是「經由HIV帶原者親吻兒童的臉頰」(C)。","detail":{"background":"HIV經血液與體液傳染,兒童感染途徑包括產道接觸母血分泌物、產後哺乳、輸入受感染血品/凝血因子。唾液中病毒量極低,親吻臉頰等日常接觸不會傳染HIV。　補充：HIV經血液、體液、性接觸與母嬰傳染，日常接觸不傳染；「經由帶原者親吻臉頰」不會傳染HIV(唾液非有效傳染途徑)、故此敘述錯誤。","options":{"A":"是。由產道接觸帶原母親血液分泌物。","B":"是。產後經帶原母親哺乳。","C":"錯誤(本題答案)。親吻臉頰/唾液不傳染HIV。","D":"是。輸入被HIV感染的凝血因子。"},"sources":["Nelson《兒科學》HIV","日常不傳染"]}},"106111-N4-39":{"quick":"確診愛滋病2週、發燒全身疼痛腹瀉淋巴腺腫大,處於「急性血清轉換期」(B)。","detail":{"background":"HIV感染初期(約感染後2~4週)會出現發燒、全身痠痛、腹瀉、淋巴腺腫大等類流感症狀,稱為急性血清轉換期(此時體內病毒大量複製、抗體開始產生)。之後進入無症狀期,晚期才進入主要伺機性感染期(AIDS)。","options":{"A":"主要伺機性感染期是AIDS晚期。","B":"正確。感染初期類流感症狀=急性血清轉換期。","C":"緩解期非HIV分期用語。","D":"臨終期非此。"},"sources":["疾管署 HIV","血清轉換期"]}},"107110-N4-38":{"quick":"常導致愛滋病患肺部感染的病原體是「肺囊蟲」(D)。","detail":{"background":"愛滋病患因細胞免疫缺損,最典型的肺部伺機性感染是肺囊蟲肺炎(Pneumocystis,PCP),也是AIDS常見死因,臨床以Bactrim預防與治療。肺炎鏈球菌、黴漿菌、結核桿菌雖也可致肺部感染,但PCP是最具代表性的AIDS伺機感染。","options":{"A":"肺炎鏈球菌非AIDS最典型肺部伺機感染。","B":"黴漿菌非此。","C":"結核桿菌可感染但非最典型。","D":"正確。肺囊蟲(PCP)是愛滋病患最常見肺部感染病原。"},"sources":["Nelson《兒科學》HIV","PCP"]}},"108020-N4-38":{"quick":"最常導致愛滋病患神經系統感染的病原體是「新形囊球菌」(A)。","detail":{"background":"愛滋病患的中樞神經系統伺機性感染以新型隱球菌(Cryptococcus neoformans,新形囊球菌)所致的隱球菌腦膜炎最常見,可用墨汁染色或抗原檢測診斷。金黃葡萄球菌、大腸桿菌非AIDS神經系統最常病原,肺囊蟲則是肺部感染。","options":{"A":"正確。新型隱球菌致隱球菌腦膜炎,是AIDS神經系統最常感染。","B":"金黃葡萄球菌非AIDS神經最常。","C":"大腸桿菌非此。","D":"肺囊蟲是肺部感染(非神經)。"},"sources":["Nelson《兒科學》HIV","隱球菌"]}},"108110-N4-72":{"quick":"照顧AIDS產婦及新生兒正確的是「新生兒出生24小時內通報」(B)。","detail":{"background":"依愛滋防治原則:產婦於分娩過程應持續抗病毒藥治療以降低垂直傳染、新生兒應於出生後盡早(數小時內)開始預防性抗病毒藥、新生兒出生24小時內通報、且應以配方奶取代母乳(HIV可經母乳傳染)。　補充：依愛滋病防治手冊，照顧AIDS產婦及新生兒：孕期抗病毒、評估剖腹產、新生兒投藥、改配方奶；HIV為法定傳染病，「新生兒出生24小時內通報」。","options":{"A":"錯。分娩過程應繼續抗病毒藥(非停藥)。","B":"正確。新生兒出生24小時內通報。","C":"錯。新生兒應盡早(數小時內)開始抗病毒藥(非一週後)。","D":"錯。應以配方奶取代母乳(勿哺乳)。"},"sources":["疾管署 愛滋防治","通報"]}},"109030-N4-64":{"quick":"2個月AIDS嬰兒預防接種錯誤的是「終生不可接種b型流行性感冒嗜血桿菌疫苗」(B)。","detail":{"background":"AIDS嬰兒免疫低下,禁打活減毒疫苗(口服沙賓、卡介苗、水痘、MMR),但可接種不活化疫苗。b型嗜血桿菌(Hib)疫苗是不活化疫苗,AIDS嬰兒可以且應接種以預防侵襲性感染,並非終生不可接種。　補充：2個月AIDS嬰兒「禁活性減毒疫苗(OPV、卡介苗、MMR、水痘)」，但「可接種不活化疫苗(如b型流感嗜血桿菌Hib、肺炎鏈球菌、IPV)」；「終生不可接種Hib」之敘述錯誤(Hib為不活化、可接種且重要)。","options":{"A":"正確。小兒麻痺不可口服沙賓疫苗(活減毒)。","B":"錯誤(本題答案)。Hib是不活化疫苗,AIDS嬰兒可接種(非終生不可)。","C":"正確。B肝、肺炎雙球菌可按時接種(不活化)。","D":"正確。免疫低下不予水痘疫苗(活減毒)。"},"sources":["Nelson《兒科學》HIV疫苗","Hib可"]}},"109110-N4-37":{"quick":"不屬於AIDS伺機性感染的是「淋巴腺腫大」(B)。","detail":{"background":"伺機性感染指趁免疫低下入侵的其他病原感染,如口腔念珠菌、肺囊蟲肺炎、隱球菌腦膜炎。淋巴腺腫大是HIV感染本身(全身淋巴增生)的表現,並非另一病原造成的伺機性感染。　補充：AIDS伺機性感染包括卡氏肺囊蟲肺炎、念珠菌食道炎、巨細胞病毒、弓漿蟲、隱球菌等；「淋巴腺腫大」為HIV本身的表現/反應、非「伺機性感染」。","options":{"A":"是伺機感染。口腔念珠球菌感染。","B":"本題答案(非)。淋巴腺腫大是HIV本身表現(非伺機感染)。","C":"是伺機感染。肺囊蟲肺炎。","D":"是伺機感染。隱球菌腦脊髓膜炎。"},"sources":["Nelson《兒科學》HIV","伺機感染"]}},"109110-N4-53":{"quick":"垂直感染AIDS的王小弟正確的是「卡氏肺囊蟲肺炎為最常見的死因」(A)。","detail":{"background":"AIDS兒童最常見死因是卡氏肺囊蟲肺炎(PCP)。HIV不經大小便等日常接觸傳染;B肝疫苗(不活化)可接種;卡介苗(BCG)為活減毒疫苗,免疫低下兒童禁忌接種(恐播散性BCG感染)。　補充：垂直感染AIDS之兒童因細胞免疫崩解，最常見死因為伺機性感染「卡氏肺囊蟲肺炎(PCP)」；故須預防性投藥(Bactrim)、監測CD4、避免活疫苗。","options":{"A":"正確。卡氏肺囊蟲肺炎(PCP)是最常見死因。","B":"錯。大小便不傳染病毒。","C":"錯。可接種B肝疫苗(不活化)。","D":"錯。不可接種卡介苗(BCG活減毒,免疫低下禁)。"},"sources":["Nelson《兒科學》HIV","PCP"]}},"110110-N4-58":{"quick":"新生兒垂直感染AIDS護理措施錯誤的是「鼓勵哺餵母乳以提升新生兒免疫能力」(B)。","detail":{"background":"HIV可經母乳垂直傳染,故AIDS母親應以配方奶取代母乳、勿哺乳。其餘護理正確:侵入性治療採標準防護、可按時接種B肝疫苗(不活化)、HIV不透過唾液或碰觸帶原者接觸的物體傳染。　補充：垂直感染AIDS之新生兒護理應「以配方奶取代母乳」(母乳含病毒會傳染)；「鼓勵哺餵母乳以提升免疫」錯誤——HIV母親哺乳會增加垂直感染風險。","options":{"A":"正確。侵入性治療採標準(全面性)防護。","B":"錯誤(本題答案)。HIV經母乳傳染,應勿哺乳(改配方奶)。","C":"正確。可按時接種B肝疫苗(不活化)。","D":"正確。不透過唾液及碰觸帶原者物體感染。"},"sources":["Nelson《兒科學》HIV","勿哺乳"]}},"111110-N4-35":{"quick":"我國AIDS母嬰照護錯誤的是「②新生兒出生7天後即給予預防性投藥+④應鼓勵餵母奶」(C,即24)。","detail":{"background":"AIDS母嬰照護:①產婦排泄物以漂白水浸泡1小時再沖(正確)、③可採親子同室(正確)。②新生兒應盡早(數小時內)給預防性抗病毒藥而非7天後;④應以配方奶取代母乳、勿鼓勵哺乳(HIV經母乳傳染)。故②④為錯誤。","options":{"A":"12皆正確(非錯誤項)。","B":"23皆正確。","C":"正確(錯誤項)。②7天後投藥(應盡早)+④鼓勵母奶(應勿哺乳)。","D":"34含③(③正確)。"},"sources":["疾管署 愛滋防治","母嬰"]}},"111110-N4-59":{"quick":"兒童罹患AIDS不適當的是「兒童感染愛滋病毒的潛伏期較成人長」(C)。","detail":{"background":"兒童(尤嬰兒)免疫系統未成熟,感染HIV後病程進展較快、潛伏期較成人「短」;病毒侵犯輔助T細胞致免疫缺乏,間質性肺炎是兒童最常見表現,且多在生產時經產道接觸母血分泌物而致病。　補充：兒童AIDS因免疫系統未成熟，「潛伏期較成人『短』、病程進展較快」；「兒童感染愛滋病毒的潛伏期較成人長」之敘述錯誤(兒童進展通常較快)。","options":{"A":"正確。病毒侵犯輔助T細胞致免疫缺乏。","B":"正確。間質性肺炎是愛滋病兒童最常見臨床症狀。","C":"不適當(本題答案)。兒童潛伏期較成人短(進展快),非長。","D":"正確。多在生產時經產道接觸母血分泌物致病。"},"sources":["Nelson《兒科學》HIV","潛伏期短"]}},"112030-N4-57":{"quick":"HIV帶原青少年護理指導錯誤的是「指導絕對不可以發生性行為,以免傳染給他人」(A)。","detail":{"background":"HIV帶原青少年仍可有安全性行為(正確使用保險套、規律服藥使病毒量測不到,U=U測不到即不傳播),衛教重點是安全性行為與規律服藥,而非一味禁止。其餘護理正確:處理傷口戴手套、不捐血、環境污染以0.05%漂白水擦拭。","options":{"A":"錯誤(本題答案)。應衛教安全性行為與規律服藥(非絕對禁止性行為)。","B":"正確。家人處理切割傷口應戴手套。","C":"正確。感染HIV者不要捐血。","D":"正確。環境污染以0.05%漂白水擦拭。"},"sources":["疾管署 HIV","安全性行為"]}},"112110-N4-57":{"quick":"足月兒確診AIDS接種疫苗錯誤的是「出生滿5個月可接種卡介苗(BCG)」(C)。","detail":{"background":"AIDS嬰兒免疫低下,卡介苗(BCG)為活減毒疫苗,禁忌接種(恐播散性BCG感染)。其餘正確:出生24小時內可接種B肝疫苗(不活化)、滿2個月接種Hib(不活化)、滿6個月接種流感疫苗(不活化)。　補充：垂直感染AIDS之新生兒「禁活性減毒疫苗」，卡介苗(BCG)為活疫苗、「不可接種」；故「出生滿5個月可接種卡介苗」之敘述錯誤(AIDS嬰兒禁卡介苗)。","options":{"A":"正確。出生24小時內可接種B肝疫苗(不活化)。","B":"正確。滿2個月可接種Hib(不活化)。","C":"錯誤(本題答案)。卡介苗(BCG活減毒)AIDS禁忌接種。","D":"正確。滿6個月可接種流感疫苗(不活化)。"},"sources":["Nelson《兒科學》HIV疫苗","BCG禁"]}},"103100-N4-63":{"quick":"兒童單純性疱疹(Herpes Simplex)錯誤的是「病毒最多見潛伏於運動神經,如三叉神經或第七對顏面神經」(C)。","detail":{"background":"單純疱疹病毒(HSV)第1型多侵犯口唇周圍(成叢水泡),初次感染後病毒潛伏於「感覺神經節」(如三叉神經節),日後反覆復發;治療以acyclovir(局部或口服)減輕疼痛、加速癒合。HSV潛伏的是感覺神經節而非運動神經。","options":{"A":"正確。嘴唇或周圍呈現聚集成叢的水泡。","B":"正確。第1型疱疹病毒反覆侵犯、潛伏感染。","C":"錯誤(本題答案)。HSV潛伏於感覺神經節(非運動神經)。","D":"正確。可局部或口服acyclovir減潰瘍疼痛、加速癒合。"},"sources":["Nelson《兒科學》HSV","感覺神經"]}},"104100-N4-56":{"quick":"疱疹性口齦炎(herpetic gingivostomatitis)護理處置適當的是「協助病童服用Acyclovir,以減輕症狀及增加癒合速度」(B)。","detail":{"background":"疱疹性齦口炎是單純疱疹病毒初次侵犯兒童最常見型態,表現高燒、口腔多發潰瘍與牙齦紅腫;處置以acyclovir抗病毒減輕症狀、加速癒合,並給流質冰涼食物、局部止痛。應避免酸性飲料(柳橙汁)刺激潰瘍;目前無疫苗預防。","options":{"A":"錯。柳橙汁等酸性飲料會刺激口腔潰瘍。","B":"正確。服用Acyclovir減輕症狀、加速癒合。","C":"錯。疱疹無疫苗預防(非接種抗毒素疫苗)。","D":"錯。可有全身症狀、新生兒可嚴重(非局限口腔不需擔心)。"},"sources":["Nelson《兒科學》疱疹性齦口炎","acyclovir"]}},"105090-N4-58":{"quick":"3歲疱疹性口齦炎護理措施不適當的是「協助使用含類固醇的口內膏來減輕炎症反應」(A)。","detail":{"background":"疱疹性齦口炎為單純疱疹病毒感染,類固醇會抑制免疫,使病毒擴散加重,故疱疹感染時禁用局部類固醇。正確護理為給流質冰涼食物、口服acyclovir減痛改善症狀,並衛教目前無疫苗可預防。　補充：疱疹性口齦炎(單純疱疹)護理：口腔清潔、止痛、補水防脫水、軟質冰涼飲食；「使用含類固醇口內膏」會抑制免疫、助長病毒擴散、不適當。","options":{"A":"不適當(本題答案)。類固醇免疫抑制會使疱疹擴散加重(禁用)。","B":"適當。以流質及冰涼食物餵食。","C":"適當。口服acyclovir減輕疼痛、改善症狀。","D":"適當。目前尚無疫苗可預防此病毒感染。"},"sources":["Nelson《兒科學》疱疹","禁類固醇"]}},"106110-N4-38":{"quick":"生殖器疱疹敘述正確的是「可以哺餵母奶」(B)。","detail":{"background":"生殖器疱疹多由第2型單純疱疹病毒(HSV-2)引起,主要威脅是新生兒經產道感染,故有活動性病灶時應採剖腹生產;HSV不經母乳傳染,故乳房無病灶時可哺餵母奶。此病無法根治、會反覆復發。　補充：生殖器疱疹(HSV)母親可「哺餵母乳」(除非乳房有疱疹病灶)；惟生產時活動性病灶有經產道感染新生兒風險，需評估剖腹產與抗病毒治療。","options":{"A":"錯。生殖器疱疹多為第2型(非第一型)。","B":"正確。乳房無病灶時可哺餵母奶(HSV不經母乳傳染)。","C":"生殖器疱疹主要為新生兒產道感染(非致畸胎為主)。","D":"錯。有活動病灶時應剖腹產(非陰道生產)。"},"sources":["Nelson《兒科學》生殖器疱疹","哺乳"]}},"106111-N4-37":{"quick":"頭痛喉嚨痛關節痛掉髮、手掌腳底丘疹、陰唇周圍不痛濕疣、梅毒陽性,處於梅毒「第二期」(C)。","detail":{"background":"梅毒第一期為硬性下疳;第二期為全身性表現,出現發燒、頭痛、喉嚨痛、關節痛、掉髮,以及含手掌腳底的全身性丘疹(掌蹠疹)與不痛的扁平濕疣(condyloma lata),此期傳染力高;第三期則為心血管與神經梅毒。本例符合第二期。","options":{"A":"潛伏期無明顯症狀。","B":"第一期是硬性下疳。","C":"正確。全身症狀+掌蹠疹+扁平濕疣=第二期梅毒。","D":"第三期是心血管/神經梅毒。"},"sources":["Nelson《兒科學》梅毒","第二期"]}},"107030-N4-35":{"quick":"容易造成女性骨盆腔感染(PID)的生殖道感染是「①披衣菌感染+②淋病」(B,即12)。","detail":{"background":"女性骨盆腔發炎(PID)最常由披衣菌(Chlamydia)與淋病雙球菌(Neisseria gonorrhoeae)上行感染引起,兩者可致輸卵管炎、不孕與子宮外孕。梅毒為全身性感染、生殖器疱疹為病毒性,皆非PID的主要病原。","options":{"A":"13含③梅毒(非PID主因)。","B":"正確。①披衣菌+②淋病是PID主因。","C":"23含③梅毒。","D":"24含④生殖器疱疹(非PID主因)。"},"sources":["Nelson《兒科學》PID","披衣菌淋病"]}},"107110-N4-63":{"quick":"先天性梅毒嬰兒皮膚丘疹脫屑護理不適當的是「鼓勵家人探視,但避免觸摸或擁抱」(B)。","detail":{"background":"先天性梅毒嬰兒的皮膚病灶具傳染力,接觸時須穿隔離衣、戴手套;皮膚丘疹脫屑可塗嬰兒油保濕。但嬰兒仍需要親子依附與撫觸,在適當防護下家人可擁抱安撫,不應一味禁止觸摸擁抱。　補充：先天性梅毒嬰兒皮膚丘疹脫屑「具傳染性(早期病灶含螺旋體)」，照護應戴手套、標準防護，並在防護下給予擁抱與情感支持；「鼓勵探視但避免觸摸擁抱」過度剝奪親情、不適當。","options":{"A":"適當。接觸個案須穿隔離衣、戴手套。","B":"不適當(本題答案)。嬰兒需親子依附撫觸,適當防護下可擁抱(非避免觸摸)。","C":"適當。皮膚丘疹脫屑部位以嬰兒油塗敷。","D":"適當。評估皮膚丘疹造成的不適或乾燥。"},"sources":["Nelson《兒科學》先天性梅毒","依附"]}},"108020-N4-37":{"quick":"生殖器疱疹敘述正確的是「新生兒會經由陰道感染」(A)。","detail":{"background":"生殖器疱疹多由HSV-2引起,對胎兒/新生兒最大威脅是經產道(陰道)接觸病灶而感染,故母親有活動性病灶時應採剖腹產。此病臨床可伴發燒,且無法根治、會反覆復發。　補充：生殖器疱疹(HSV)母親若生產時有活動性病灶，「新生兒可經陰道(產道)感染」致新生兒疱疹(嚴重可腦炎、播散性感染)，故活動性病灶建議剖腹產。","options":{"A":"正確。新生兒會經由陰道(產道)接觸病灶感染。","B":"錯。生殖器疱疹多為第2型(非第一型)。","C":"臨床可有發燒(非少有)。","D":"錯。無法根治、會反覆復發(非服藥可根治)。"},"sources":["Nelson《兒科學》生殖器疱疹","產道"]}},"112030-N4-60":{"quick":"疱疹病毒感染錯誤的是「疱疹性齦口炎的口腔潰瘍常見口腔的後半部,咽喉與咽喉上方」(D)。","detail":{"background":"單純疱疹第1型多在口唇周圍成叢水泡;疱疹性齦口炎是其初次侵犯兒童最常見型態,潰瘍主要在口腔「前半部」(牙齦、舌、頰、唇),以acyclovir治療。口腔後半部與咽喉的潰瘍多是腸病毒(克沙奇)引起的疱疹性咽峽炎,而非疱疹性齦口炎。","options":{"A":"正確。口唇周圍成叢水泡,常見第1型疱疹。","B":"正確。疱疹性齦口炎是單純疱疹初次侵犯兒童最常見型態。","C":"正確。Acyclovir可治療疱疹病毒感染。","D":"錯誤(本題答案)。疱疹性齦口炎潰瘍多在口腔前半部(後半部/咽喉是疱疹性咽峽炎)。"},"sources":["Nelson《兒科學》疱疹性齦口炎","前半部"]}},"103030-N4-51":{"quick":"16歲SLE此慢性疾病現階段造成最大影響是「身體外觀會因為藥物的副作用而改變,進而影響自我心像」(B)。","detail":{"background":"全身性紅斑狼瘡(SLE)以類固醇與免疫抑制劑治療,藥物副作用(月亮臉、體重增加、痤瘡、多毛)會明顯改變外觀;對正值青春期、最在意外貌的青少年而言,這種外觀改變對自我心像/身體心像的衝擊最大。　補充：青少年(16歲)SLE現階段最大影響為「藥物副作用(類固醇致滿月臉、體重增加、痤瘡)與疾病(蝶形紅斑)改變外觀，衝擊自我心像與社交」；護理應重視身體形象與心理支持。","options":{"A":"不能上體育課的自卑非最大影響。","B":"正確。藥物副作用改變外觀,影響自我心像(青春期最在意)。","C":"請假影響學業非最大影響。","D":"擔心生育能力非青春期最大困擾。"},"sources":["Nelson《兒科學》SLE","自我心像"]}},"106030-N4-64":{"quick":"不是兒童急性風濕熱會出現的臨床表徵是「四肢末梢脫皮」(C)。","detail":{"background":"急性風濕熱依Jones準則表現為心臟炎、皮下結節、游走性多發關節炎、舞蹈症、環形紅斑。四肢末梢(手指腳趾)脫皮是川崎氏症與猩紅熱的特徵,並非風濕熱的表現。　補充：急性風濕熱(Jones準則)表現心臟炎、多發性遊走關節炎、舞蹈症、皮下結節、邊緣性紅斑；「四肢末梢脫皮」屬川崎氏症表現、非風濕熱、為非典型。","options":{"A":"是。心臟炎。","B":"是。皮下結節。","C":"本題答案(非)。四肢末梢脫皮是川崎/猩紅熱(非風濕熱)。","D":"是。多發性關節炎。"},"sources":["Nelson《兒科學》風濕熱","脫皮"]}},"107110-N4-52":{"quick":"幼年型類風濕性關節炎兒童護理措施正確的是「清晨易有關節僵硬疼痛,可以熱敷及止痛藥減輕不適」(B)。","detail":{"background":"幼年型類風濕性關節炎(JRA/JIA)以晨間關節僵硬疼痛(晨僵)為特徵,熱敷與止痛藥可緩解;應鼓勵適度活動與關節運動以防攣縮,而非多臥床;治療多以NSAID/DMARD為主,類固醇非首選的長期用藥。　補充：幼年型類風濕性關節炎(JIA)晨間關節僵硬疼痛，可「溫熱敷、溫水浴、適度關節運動與止痛藥」減輕不適；急性發炎期休息、緩解期運動維持功能。","options":{"A":"錯。JRA評估關節腫痛發炎(非異常出血點/關節冰冷蒼白)。","B":"正確。清晨關節僵硬可以熱敷及止痛藥減輕不適。","C":"錯。應鼓勵適度活動防關節攣縮(非多臥床)。","D":"首選NSAID/DMARD,類固醇非最常的長期治療藥物。"},"sources":["Nelson《兒科學》JRA","熱敷"]}},"108110-N4-78":{"quick":"皮肌炎(dermatomyositis)兒童護理評估錯誤的是「觸診肌肉時會感到鬆軟無力」(C)。","detail":{"background":"幼年型皮肌炎是自體免疫的肌肉與皮膚發炎,臉部可見眼周紫紅色斑(heliotrope)、關節伸側對稱性紅斑(Gottron),近端肌肉發炎致無力;急性發炎期觸診肌肉常有壓痛或腫脹偏硬,而非單純鬆軟無力,故C為錯誤。","options":{"A":"正確。臉部紅斑結節性皮膚疹(heliotrope)。","B":"正確。關節部對稱性紅斑(Gottron疹)。","C":"錯誤(本題答案)。發炎期肌肉可壓痛/偏硬(非單純鬆軟)。","D":"肌腱反射可減低(相對正確)。"},"sources":["Nelson《兒科學》皮肌炎","肌肉"]}},"114030-N4-31":{"quick":"14歲SLE脈衝治療(pulse therapy)照護措施不適當的是「告知疾病和治療對身體外觀影響不大,以減輕其不安」(B)。","detail":{"background":"SLE的類固醇脈衝治療確實會造成明顯外觀改變(月亮臉等),不應淡化或否認以「安撫」,這反而失真且不利信任;應誠實說明並協助病童調適身體心像。其餘照護(與同儕保持聯繫、確實評估疼痛、傾聽支持不評論)皆適當。","options":{"A":"適當。鼓勵與同儕保持聯繫。","B":"不適當(本題答案)。不應淡化外觀影響(應誠實並協助調適身體心像)。","C":"適當。確實評估疼痛、避免因隱瞞而疏忽處理。","D":"適當。注意傾聽並提供支持、避免評論。"},"sources":["Nelson《兒科學》SLE","身體心像"]}},"101030-N4-61":{"quick":"黴漿菌性肺炎(mycoplasma pneumonia)敘述正確的是「具有高度的傳染性,主要侵犯肺下葉及支氣管周圍」(B)。","detail":{"background":"黴漿菌肺炎好發學齡兒童與年輕成人,傳染力高、易在家庭與群聚間飛沫傳染;病程較緩,以乾咳、輕微發燒、間質性浸潤(主要在肺下葉與支氣管周圍)為表現。因黴漿菌無細胞壁,青黴素無效,須用紅黴素/巨環類(如azithromycin),預後一般良好。","options":{"A":"錯。病程較緩、聽診多囉音(非快速、濁音)。","B":"正確。具高度傳染性,主要侵犯肺下葉及支氣管周圍。","C":"錯。好發學齡兒/年輕成人、多輕微發燒(非嬰幼兒高燒)。","D":"錯。青黴素無效須用紅黴素/巨環類,預後佳(非預後差)。"},"sources":["Nelson《兒科學》黴漿菌肺炎","下葉"]}},"101030-N4-76":{"quick":"以膠帶黏拭肛門處收集蟲卵主要是檢查「蟯蟲」感染(A)。","detail":{"background":"蟯蟲(pinworm)雌蟲於夜間或清晨移行至肛門周圍產卵,故以透明膠帶黏拭肛門處採集蟲卵(scotch tape test)是其標準檢查法,且應在清晨尚未起床、排便或清洗前採集。鈎蟲、蛔蟲、梨形鞭毛蟲以糞便檢查蟲卵/囊體,非膠帶肛門法。","options":{"A":"正確。膠帶黏拭肛門收集蟲卵是蟯蟲檢查法。","B":"鈎蟲以糞便檢查(且經皮膚鑽入)。","C":"蛔蟲以糞便蟲卵檢查。","D":"梨形鞭毛蟲以糞便檢查。"},"sources":["Nelson《兒科學》蟯蟲","膠帶"]}},"109110-N4-59":{"quick":"4歲疑蟯蟲感染進行透明膠帶試驗,最合適的蟲卵採集時間是「清晨尚未起床時」(A)。","detail":{"background":"蟯蟲雌蟲在夜間至清晨爬到肛門周圍皮膚產卵,因此透明膠帶試驗應於清晨尚未起床、尚未排便與清洗前採集,此時肛門周圍蟲卵最多、陽性率最高;若已活動、排便或清洗則蟲卵被去除而易偽陰性。　補充：蟯蟲於夜間至清晨在肛門周圍產卵，故透明膠帶肛圍試驗最佳採集時間為「清晨尚未起床、未排便前」黏取肛周蟲卵；衛教全家治療、勤洗手剪指甲。","options":{"A":"正確。清晨尚未起床(排便/清洗前)採集陽性率最高。","B":"中午進餐後蟲卵已被清除,不適合。","C":"傍晚進餐前非最佳時間。","D":"睡覺前蟲卵尚未充分產出,不如清晨。"},"sources":["Nelson《兒科學》蟯蟲","清晨"]}},"111110-N4-63":{"quick":"兒童黴漿菌性肺炎照護措施最適當的是「以Azithromycin治療,療程短且副作用較少」(D)。","detail":{"background":"黴漿菌肺炎傳染力高、會家庭傳染;多為乾咳與輕微發燒(常<39°C)、間質性浸潤,病程較緩。因黴漿菌無細胞壁,治療用巨環類抗生素,其中azithromycin療程短(約3~5天)且腸胃副作用較紅黴素少,為常用選擇。","options":{"A":"錯。黴漿菌肺炎傳染力高、會家人傳染(非低)。","B":"錯。多輕微發燒、痰不多(非高燒痰多)。","C":"錯。主要侵犯間質、病程較緩(非突發快速)。","D":"正確。以Azithromycin治療,療程短、副作用較少。"},"sources":["Nelson《兒科學》黴漿菌肺炎","azithromycin"]}},"112030-N4-62":{"quick":"3歲疑似流行性感冒臨床表徵最不適當的是「紅疹和皮膚搔癢」(D)。","detail":{"background":"流行性感冒以全身性與呼吸道症狀為主:發燒發冷、喉嚨痛、黏膜乾燥、畏光、肌肉痠痛、咳嗽、倦怠。流感本身不會出現紅疹與皮膚搔癢,後者是出疹性傳染病或過敏的表現,故為最不適當的描述。　補充：流行性感冒臨床為突發高燒、頭痛、肌肉痠痛、倦怠、咳嗽喉嚨痛、流鼻水；「紅疹與皮膚搔癢」非流感典型表徵、為最不適當之敘述。","options":{"A":"適當。發燒和發冷。","B":"適當。喉嚨痛和黏膜乾燥。","C":"適當。畏光和肌肉痠痛。","D":"最不適當(本題答案)。流感無紅疹/皮膚搔癢。"},"sources":["Nelson《兒科學》流感","無紅疹"]}},"112030-N4-73":{"quick":"4歲身體瘦弱貧血、喜歡赤腳到田裡玩泥巴,最可能感染的寄生蟲是「鉤蟲」(C)。","detail":{"background":"鉤蟲(hookworm)的幼蟲存在於泥土中,經赤腳皮膚鑽入人體,移行至腸道吸血寄生,造成慢性失血而貧血;故「赤腳玩泥巴+貧血」最符合鉤蟲。蛔蟲、蟯蟲經糞口/手口途徑,廣東住血吸蟲與生食螺類有關。　補充：鉤蟲經皮膚(赤腳接觸污染土壤)鑽入感染，幼蟲移行至腸道吸血，致「缺鐵性貧血、營養不良」；衛教穿鞋、勿赤腳接觸糞肥污染土壤、環境衛生。","options":{"A":"蛔蟲經糞口/誤食蟲卵感染。","B":"蟯蟲經肛門/手口途徑。","C":"正確。鉤蟲經赤腳接觸泥土鑽入皮膚、致慢性失血貧血。","D":"廣東住血吸蟲與生食螺類有關。"},"sources":["Nelson《兒科學》鉤蟲","赤腳"]}},"114170-N4-38":{"quick":"黴漿菌肺炎(mycoplasma pneumonia)最適當的是「輕微發燒,通常<39°C」(B)。","detail":{"background":"黴漿菌肺炎好發學齡兒童與年輕成人(非1~3歲嬰幼兒),傳染力高會家人傳染;臨床多為乾咳、輕微發燒(通常<39°C)、間質性浸潤,病程較緩。治療用巨環類(如azithromycin約3~5天),紅黴素則約10~14天。","options":{"A":"錯。好發學齡兒/年輕成人(非1~3歲)。","B":"正確。輕微發燒,通常<39°C。","C":"錯。傳染性高、會家人傳染(非低)。","D":"Azithromycin約3~5天(10~14天是紅黴素)。"},"sources":["Nelson《兒科學》黴漿菌肺炎","輕燒"]}},"101030-N4-15":{"quick":"妊娠期感染TORCH症候群正確的是「孕期18週內,胎盤內滋養層細胞對胎兒有保護作用,故感染梅毒螺旋體不會影響胎兒健康」(A)。","detail":{"background":"TORCH是孕期可致胎兒畸形的感染群(弓形蟲、其他如梅毒、德國麻疹、巨細胞病毒、單純疱疹)。梅毒螺旋體多在懷孕約18~20週後、胎盤滋養層屏障變薄時才較易通過胎盤感染胎兒,故官方視「18週內滋養層有保護、梅毒較不影響」為正確。德國麻疹疫苗接種後須避孕約1個月;避免貓糞是防弓形蟲;HSV-II多經產道而非胎盤。","options":{"A":"正確(官方)。18週內胎盤滋養層有保護,梅毒較不易影響胎兒。","B":"德國麻疹疫苗接種後須避孕約1個月(非2週)。","C":"避免貓糞是防弓形蟲(非巨細胞病毒)。","D":"錯。HSV-II多經產道(非胎盤)傳染。"},"sources":["新文京《產科護理學》TORCH","梅毒"]}},"101110-N4-16":{"quick":"4個月依時程接種,今天接受的疫苗是「白喉、破傷風、非細胞性百日咳、b型嗜血桿菌及不活化小兒麻痺,五合一疫苗」(B)。","detail":{"background":"我國嬰兒常規接種時程中,滿2、4、6個月各接種一劑「五合一疫苗(DTaP-Hib-IPV)」並搭配肺炎鏈球菌疫苗,故4個月應接種五合一。B肝在出生/1/6個月、日本腦炎滿15個月起、MMR滿1歲才接種,皆非4個月。","options":{"A":"B肝在出生/1/6個月(非4個月主項)。","B":"正確。4個月接種五合一疫苗(DTaP-Hib-IPV)。","C":"日本腦炎滿15個月起。","D":"MMR滿1歲才接種。"},"sources":["疾管署 接種時程","五合一"]}},"101110-N4-72":{"quick":"婦女孕期感染病毒處置正確的是「孕婦若感染疱疹病毒(HSV-II),應採剖腹生產方式生產,以避免傳染給胎兒」(B)。","detail":{"background":"生殖器疱疹(HSV-II)對新生兒最大威脅是經產道接觸病灶感染,故有活動性病灶時應採剖腹產以避免傳染。B肝帶原孕婦的新生兒須注射B肝免疫球蛋白加疫苗;CMV可經胎盤、產道與乳汁傳染;欲知胎兒是否感染德國麻疹應驗臍帶血IgM(IgM不過胎盤)而非IgG。","options":{"A":"B肝帶原新生兒須注射免疫球蛋白加疫苗(敘述不周延)。","B":"正確。HSV-II有活動病灶應剖腹產避免產道傳染。","C":"CMV可經胎盤/產道/乳汁傳染(非不經乳汁)。","D":"查胎兒感染應驗臍帶血IgM(非IgG)。"},"sources":["新文京《產科護理學》孕期感染","剖腹產"]}},"102030-N4-67":{"quick":"不是兒童疑似癌症九大警訊之一的是「蕁麻疹或皮膚紅疹」(C)。","detail":{"background":"兒童癌症九大警訊包括不明原因疼痛(尤骨痛)、不明腫塊、持續不明發燒、紫斑或出血傾向、臉色蒼白貧血、不明體重減輕、淋巴結腫大、嘔吐或走路不穩(中樞)、視力改變或白瞳。蕁麻疹或皮膚紅疹多為過敏或感染,並非癌症警訊。","options":{"A":"是。不明原因的疼痛。","B":"是。紫斑或出血傾向。","C":"本題答案(非)。蕁麻疹/皮膚紅疹多為過敏感染(非癌症警訊)。","D":"是。嘔吐或走路不穩(中樞)。"},"sources":["Nelson《兒科學》癌症警訊","九大"]}},"102030-N4-68":{"quick":"化學治療癌症病童接受預防注射正確的是「可接受注射型小兒麻痺沙克疫苗」(A)。","detail":{"background":"化療病童免疫低下,可接種不活化疫苗(如注射型沙克IPV小兒麻痺),禁活減毒疫苗。接觸水痘病童應盡早注射水痘免疫球蛋白(VZIG);接觸麻疹應給免疫球蛋白被動保護(不可打活麻疹疫苗);受傷時可接受破傷風類毒素(類毒素非活疫苗)。","options":{"A":"正確。可接受注射型沙克(IPV不活化)小兒麻痺疫苗。","B":"接觸水痘應盡早給水痘免疫球蛋白(VZIG)。","C":"錯。接觸麻疹應給免疫球蛋白(非打活麻疹疫苗)。","D":"錯。受傷可接受破傷風類毒素(非活疫苗)。"},"sources":["Nelson《兒科學》化療疫苗","IPV"]}},"102110-N4-56":{"quick":"癌症病童治療階段中可以接種的疫苗是「流行性感冒疫苗」(B)。","detail":{"background":"癌症化療使免疫低下,只能接種不活化疫苗。流行性感冒疫苗(注射型為不活化)可接種;水痘疫苗、口服沙賓小兒麻痺、MMR皆為活減毒疫苗,免疫低下禁忌接種。　補充：癌症化療(免疫低下)期間「禁活性減毒疫苗(MMR、水痘、卡介苗、口服小兒麻痺)」，但可接種「不活化疫苗如流感疫苗」以降低感染；家人接種以包覆保護。","options":{"A":"水痘疫苗是活減毒,禁忌。","B":"正確。流行性感冒疫苗(不活化)可接種。","C":"口服沙賓小兒麻痺是活減毒,禁忌。","D":"MMR是活減毒,禁忌。"},"sources":["Nelson《兒科學》化療疫苗","流感"]}},"103030-N4-24":{"quick":"母親仍可哺餵母乳的情況是「C型肝炎帶原」(A)。","detail":{"background":"哺乳禁忌包括具傳染力的結核病、愛滋病(AIDS,HIV經母乳傳染)、使用抗癌等藥物。C型肝炎帶原一般仍可哺乳(C肝不經正常哺乳傳染,除非乳頭破損出血),故為可哺乳者。　補充：母親「C型肝炎帶原」仍可哺餵母乳(母乳傳染風險極低，除非乳頭破損出血)；HIV、未治療結核、化療或某些藥物則為哺乳禁忌。","options":{"A":"正確。C型肝炎帶原仍可哺乳。","B":"具傳染力結核病不可哺乳。","C":"愛滋病(AIDS)不可哺乳(HIV經母乳傳染)。","D":"使用抗癌藥物不可哺乳。"},"sources":["新文京《產科護理學》哺乳禁忌","C肝可"]}},"104030-N4-56":{"quick":"TORCHS複合體檢查不屬於可發現的孕期感染的是「猩紅熱(Scarlet fever)」(D)。","detail":{"background":"TORCHS涵蓋弓形蟲(Toxoplasma)、其他(Other,含梅毒、HIV等)、德國麻疹(Rubella)、巨細胞病毒(CMV)、單純疱疹(HSV)。猩紅熱是A群鏈球菌感染,並非TORCHS所涵蓋的孕期致畸感染項目。","options":{"A":"屬於。HIV(歸在Other)。","B":"屬於。弓形蟲病(Toxoplasmosis)。","C":"屬於。德國麻疹(Rubella)。","D":"本題答案(不屬於)。猩紅熱非TORCHS項目。"},"sources":["新文京《產科護理學》TORCHS","猩紅熱"]}},"105030-N4-30":{"quick":"不是所有嬰兒都需要接種的是「B型肝炎免疫球蛋白」(B)。","detail":{"background":"卡介苗、B肝疫苗、白喉百日咳破傷風、小兒麻痺等是所有嬰兒的常規接種。但B型肝炎「免疫球蛋白(HBIG)」只給母親為B肝帶原(尤e抗原陽性)者的新生兒做被動免疫,並非所有嬰兒都需要。　補充：B型肝炎「免疫球蛋白(HBIG)」非所有嬰兒常規接種，僅用於「HBsAg陽性(尤e抗原陽性)母親之新生兒」做被動免疫；B肝「疫苗」才是所有嬰兒常規接種。","options":{"A":"卡介苗是常規接種。","B":"本題答案(非全部)。HBIG只給B肝帶原母親的新生兒。","C":"白喉百日咳破傷風是常規接種。","D":"小兒麻痺口服疫苗是常規接種。"},"sources":["疾管署 接種","HBIG"]}},"105090-N4-68":{"quick":"癌症病童化療期間感染預防措施錯誤的是「縮短住院時間以防院內感染」(C)。","detail":{"background":"化療致嗜中性球低下,感染預防靠保護性隔離、低微生物環境、避免接觸感染源(避接觸水痘麻疹病童)、避免活病毒疫苗、食物加熱處理。住院長短應依治療需要決定,以「縮短住院」作為感染預防手段並不恰當。　補充：癌症化療免疫低下期感染預防：保護性隔離、手部衛生、避免生食與人多場所、避免活疫苗；「縮短住院時間以防院內感染」並非標準感染預防原則(住院長短依病情)、為錯誤敘述。","options":{"A":"正確。避免接種活性病毒疫苗。","B":"正確。避免接觸水痘或麻疹病童。","C":"錯誤(本題答案)。感染預防靠保護性隔離(非以縮短住院為手段)。","D":"正確。食物需經微波(加熱)處理。"},"sources":["Nelson《兒科學》化療","保護隔離"]}},"106030-N4-31":{"quick":"妊娠早期感染易致胎兒先天性心臟病、耳聾、白內障的是「德國麻疹(rubella)」(D)。","detail":{"background":"孕婦於懷孕早期(器官形成期)感染德國麻疹,病毒經胎盤致先天性德國麻疹症候群,典型三聯徵為先天性心臟病(開放性動脈導管)、感音性耳聾、白內障。梅毒、傷寒與風濕性心臟病皆非致此三聯徵。　補充：妊娠早期(器官形成期)感染「德國麻疹(rubella)」可致先天性德國麻疹症候群——先天性心臟病(PDA)、耳聾、白內障、智能障礙；故孕前應確認抗體或接種。","options":{"A":"梅毒致先天性梅毒(非此三聯徵)。","B":"風濕性心臟病非孕期致畸感染。","C":"傷寒非此。","D":"正確。德國麻疹致先心、耳聾、白內障。"},"sources":["新文京《產科護理學》德國麻疹","先心"]}},"106110-N4-59":{"quick":"接種MMR疫苗的禁忌者是「預備3個月內懷孕的婦女」(D)。","detail":{"background":"MMR是活減毒疫苗,禁忌對象包括孕婦、預計近期(約1~3個月內)懷孕者、免疫低下者、以及近期輸血或注射高劑量免疫球蛋白者(須間隔數月以免影響疫苗效果)。1年前輸血、IVIG 11個月以上、4個月前肌注B肝免疫球蛋白皆已過間隔期,可接種。","options":{"A":"1年前輸血已過間隔,可接種。","B":"IVIG 11個月以上已過間隔。","C":"4個月前肌注B肝免疫球蛋白已過間隔。","D":"正確。預備3個月內懷孕是MMR(活減毒)禁忌。"},"sources":["疾管署 MMR","禁忌"]}},"108020-N4-69":{"quick":"5個月健兒門診適合接種的疫苗是「卡介苗」(C)。","detail":{"background":"我國卡介苗(BCG)接種時程已調整為出生滿5~8個月接種,故5個月嬰兒適合接種卡介苗。日本腦炎滿15個月起、水痘與麻疹/MMR滿1歲才接種,皆非5個月。　補充：卡介苗(BCG)建議於出生滿5~8個月接種；5個月健兒門診適合接種「卡介苗」；卡介苗為活性減毒、採皮內注射，預防嬰幼兒結核重症。","options":{"A":"日本腦炎滿15個月起。","B":"水痘疫苗滿1歲。","C":"正確。卡介苗於出生滿5~8個月接種。","D":"麻疹疫苗滿1歲(MMR)。"},"sources":["疾管署 接種時程","卡介苗"]}},"108110-N4-66":{"quick":"5歲半長期類固醇治療腎病症候群病童,適用的疫苗是「流行性感冒病毒(influenza)」(C)。","detail":{"background":"長期使用類固醇致免疫低下,只能接種不活化疫苗:流感疫苗(注射型不活化)適用且建議每年接種;水痘、麻疹、MMR皆為活減毒疫苗,屬禁忌。　補充：長期類固醇治療的腎病症候群病童免疫抑制，「禁活疫苗」，但「可接種不活化疫苗如流感疫苗」以降低感染；家人亦宜接種以包覆保護。","options":{"A":"水痘疫苗是活減毒,禁忌。","B":"麻疹疫苗是活減毒,禁忌。","C":"正確。流感疫苗(不活化)適用。","D":"MMR是活減毒,禁忌。"},"sources":["Nelson《兒科學》免疫低下疫苗","流感"]}},"109110-N4-33":{"quick":"懷孕期TORCH感染項目錯誤的是「麻疹」(B)。","detail":{"background":"TORCH中的「R」指德國麻疹(Rubella),而非麻疹(measles)。TORCH涵蓋弓形蟲、其他(梅毒等)、德國麻疹、巨細胞病毒、單純疱疹病毒;麻疹不在TORCH項目內。　補充：懷孕期TORCH感染指弓漿蟲(Toxoplasma)、其他(梅毒、B肝等)、德國麻疹(Rubella)、巨細胞病毒(CMV)、單純疱疹(HSV)；「麻疹(measles)」不屬TORCH、為錯誤。","options":{"A":"正確。弓形蟲病(Toxoplasma)。","B":"錯誤(本題答案)。TORCH的R是德國麻疹(Rubella),非麻疹。","C":"正確。單純疱疹病毒(HSV)。","D":"正確。巨細胞病毒(CMV)。"},"sources":["新文京《產科護理學》TORCH","德國麻疹"]}},"109110-N4-71":{"quick":"癌症病童治療期間疫苗接種最不適當的是「可以口服小兒沙賓疫苗」(B)。","detail":{"background":"癌症化療免疫低下,口服沙賓(OPV)小兒麻痺是活減毒疫苗,屬禁忌,應改用注射型沙克(IPV)。其餘正確:可接種流感疫苗(不活化)、不可接觸水痘與麻疹病人(避免感染)。　補充：癌症治療期免疫低下「禁活性減毒疫苗」，故「不可口服沙賓(OPV)活疫苗」；應改不活化疫苗(如IPV、流感)；「可口服沙賓疫苗」之敘述最不適當。","options":{"A":"適當。可接種流感疫苗(不活化)。","B":"最不適當(本題答案)。沙賓口服(活減毒)免疫低下禁忌。","C":"適當。不可接觸水痘病人。","D":"適當。不可接觸麻疹病人。"},"sources":["Nelson《兒科學》化療疫苗","沙賓禁"]}},"110110-N4-52":{"quick":"母乳可提供新生兒對抗水痘、單純疱疹與流感的抗體是「IgA」(A)。","detail":{"background":"母乳(尤其初乳)富含分泌型IgA,作用於腸道與呼吸道黏膜表面,協助新生兒對抗病毒與細菌(含水痘、單純疱疹、流感)。IgG主要是經胎盤由母體傳給胎兒,而非母乳提供的主要保護抗體。　補充：母乳中「分泌型IgA」可在新生兒腸道黏膜提供被動免疫，協助對抗水痘、單純疱疹、流感與腸道病原；初乳含量最高，是母乳保護力的重要來源。","options":{"A":"正確。母乳提供分泌型IgA,黏膜保護。","B":"IgD非母乳保護抗體。","C":"IgE與過敏相關。","D":"IgG主要經胎盤(非母乳)。"},"sources":["新文京《產科護理學》母乳","IgA"]}},"111030-N4-3":{"quick":"不是全民健保第一妊娠期提供的實驗室檢驗項目的是「乙型鏈球菌篩檢」(A)。","detail":{"background":"第一妊娠期(初次產檢)檢驗包括B肝HBsAg、德國麻疹抗體、HIV(愛滋)血清抗體、梅毒VDRL、血型Rh、CBC等。乙型鏈球菌(GBS)篩檢是在妊娠35~37週(第三妊娠期)進行,以預防新生兒GBS感染,故非第一妊娠期項目。","options":{"A":"本題答案(非)。GBS篩檢於35~37週(第三妊娠期)。","B":"是。B型肝炎檢查。","C":"是。德國麻疹抗體檢驗。","D":"是。愛滋血清抗體檢驗。"},"sources":["新文京《產科護理學》產檢","GBS"]}},"111030-N4-5":{"quick":"懷孕13週赴茲卡疫區擔心胎兒,適當回應是「返家後2週內密切觀察是否有紅疹、發燒、關節痛等症狀」(B)。","detail":{"background":"茲卡病毒可致胎兒小頭症。對疫區暴露的孕婦,適當衛教是返家後約2週內密切觀察是否出現紅疹、發燒、關節痛等茲卡感染症狀。13週胎兒腦部仍在發育(非已發育完全);無症狀者不需立即做羊水檢驗或通報,應先觀察、必要時驗血。","options":{"A":"錯。13週胎兒腦部仍在發育(非已發育完全)。","B":"正確。返家後2週內觀察紅疹/發燒/關節痛等症狀。","C":"無症狀不立即做羊水檢驗。","D":"無症狀不需立即通報。"},"sources":["新文京《產科護理學》茲卡","觀察"]}},"113030-N4-2":{"quick":"妊娠期血液檢查正確的是「首次產檢需要篩檢人類免疫缺乏病毒」(A)。","detail":{"background":"首次產檢即須篩檢HIV(人類免疫缺乏病毒),以利早期介入降低垂直傳染。葡萄糖耐受試驗(OGTT)於24~28週、B群鏈球菌(GBS)於35~37週、德國麻疹抗體於第一妊娠期(初次產檢)進行,故B、C、D的時序皆錯。","options":{"A":"正確。首次產檢需篩檢HIV。","B":"錯。OGTT於24~28週(非第一妊娠期)。","C":"錯。GBS於35~37週(非第二妊娠期)。","D":"錯。德國麻疹抗體於第一妊娠期(非第三)。"},"sources":["新文京《產科護理學》產檢","HIV"]}},"113030-N4-42":{"quick":"6個月兒童癌症化療須治療半年以上,可以接種的疫苗是「四合一疫苗(Tdap-IPV)」(A)。","detail":{"background":"化療免疫低下只能接種不活化疫苗。四合一疫苗(Tdap-IPV,含白喉破傷風百日咳與不活化小兒麻痺,皆不活化或類毒素)可接種;水痘、輪狀病毒(口服活)、MMR皆為活疫苗,屬禁忌。　補充：化療(免疫低下、療程半年以上)期間「禁活疫苗」，可接種「不活化疫苗如四合一(白喉破傷風百日咳+不活化小兒麻痺Tdap-IPV)、流感」以維持基礎保護。","options":{"A":"正確。四合一疫苗(Tdap-IPV,不活化)可接種。","B":"水痘疫苗是活減毒,禁忌。","C":"輪狀病毒疫苗是口服活疫苗,禁忌。","D":"MMR是活減毒,禁忌。"},"sources":["Nelson《兒科學》化療疫苗","不活化"]}},"113100-N4-47":{"quick":"疫苗接種對象最適當的是「兒癌病童化療期間不宜接種水痘疫苗」(A)。","detail":{"background":"兒癌化療期間免疫低下,水痘疫苗是活減毒疫苗,不宜接種。卡介苗須體重2500公克以上(非2000);注射免疫球蛋白後接種活疫苗須間隔數月(非僅4週);活性疫苗不可接種於AIDS等免疫低下兒童。　補充：疫苗接種對象：免疫低下者(如兒癌化療)「禁活性減毒疫苗」，故「化療期間不宜接種水痘疫苗(活疫苗)」最適當；不活化疫苗則可依評估接種。","options":{"A":"正確。兒癌化療期間不宜接種水痘疫苗(活減毒)。","B":"卡介苗須體重2500公克以上(非2000)。","C":"免疫球蛋白後接種活疫苗須間隔數月(非僅4週)。","D":"錯。活疫苗不可接種於AIDS兒童(免疫低下)。"},"sources":["Nelson《兒科學》疫苗對象","水痘禁"]}},"113180-N4-4":{"quick":"懷孕16週產檢報告需最優先衛教的是「德國麻疹IgG陰性」(C)。","detail":{"background":"德國麻疹IgG陰性代表孕婦無德國麻疹免疫力,孕期又不能補打活疫苗(MMR禁孕),故須最優先衛教:孕期避免接觸德國麻疹病人、產後再補接種,以防孕期感染致胎兒先天畸形。尿糖陰性、B肝HBsAg陰性均為正常,尿蛋白微量可觀察。","options":{"A":"尿糖陰性是正常。","B":"尿蛋白微量可觀察。","C":"正確。德國麻疹IgG陰性=無免疫力,須最優先衛教避免接觸、產後補接種。","D":"B肝HBsAg陰性是正常(未帶原)。"},"sources":["新文京《產科護理學》產檢","德國麻疹IgG"]}},"114170-N4-23":{"quick":"產婦產後立即性大出血必須嚴密監測的是「瀰漫性血管內凝血(DIC)」(A)。","detail":{"background":"產後立即性大出血會大量失血並消耗凝血因子與血小板,可能併發瀰漫性血管內凝血(DIC),出現廣泛微血栓與難以止血的出血,故須嚴密監測。AIDS、妊娠誘發性高血壓、子宮內胎兒生長遲緩皆非產後大出血的立即監測重點。","options":{"A":"正確。產後大出血須監測DIC(凝血因子消耗)。","B":"AIDS非產後大出血監測重點。","C":"PIH非產後大出血立即監測。","D":"IUGR是胎兒問題(非產後出血)。"},"sources":["新文京《產科護理學》產後出血","DIC"]}},"102030-N4-62":{"quick":"13歲扁桃腺發炎、初步診斷風濕熱,敘述錯誤的是「風濕熱本身會進行1週」(B)。","detail":{"background":"急性風濕熱是A群β型溶血性鏈球菌咽炎後的自體免疫反應,Jones準則含心臟炎(最常侵犯心肌與瓣膜,可遺留瓣膜損害)、游走性多發關節炎(好發膝、肘等大關節)、舞蹈症(侵犯中樞神經)、皮下結節、環形紅斑;急性病程多持續數週(約6~8週),且心臟後遺症可長期存在,並非僅1週。","options":{"A":"正確。最常侵犯心肌及瓣膜。","B":"錯誤(本題答案)。急性病程多持續數週(非僅1週),心臟損害可長期遺留。","C":"正確。游走性多發關節炎好發膝、肘等大關節。","D":"正確。侵犯中樞神經可造成舞蹈症。"},"sources":["Nelson《兒科學》風濕熱","病程"]}}},TO=["1麻疹德國麻疹", "2水痘腮腺炎玫瑰疹", "3猩紅熱與細菌皮膚感染", "4川崎氏症與風濕熱", "5腸病毒", "6HIV愛滋", "7疱疹與性傳染病", "8自體免疫風濕", "9寄生蟲與黴漿菌等其他感染", "10預防接種與孕期感染借題"],LEC={"1麻疹德國麻疹":{"html":"<p><b>麻疹(measles)</b>:飛沫/空氣傳染、前驅期<b>3C(咳嗽/結膜炎/鼻炎)+發燒</b>、口腔<b>柯氏斑點(Koplik spots)</b>、發燒最高峰出疹、<b>由上而下</b>、紅疹前3~5天至後4天傳染期、恢復期脫屑+色素沉著、空氣隔離、勿aspirin。</p><p><b>德國麻疹(rubella)</b>:粉紅斑丘疹由臉往下、3天消退(三日疹)、不留色素、耳後/枕後淋巴結腫;<b>孕婦初期感染致先天性德國麻疹症候群(先心/耳聾/白內障)</b>、活減毒疫苗<u>孕婦禁打</u>。新生兒感染源後<b>IgM升</b>(IgM不過胎盤)。</p>"},"2水痘腮腺炎玫瑰疹":{"html":"<p><b>水痘(varicella)</b>:高傳染、向心性(軀幹多)、<b>同一時間不同部位見不同階段(紅斑/水疱/膿疱/結痂)</b>、痂皮乾燥前有傳染力、<b>結痂乾燥後約1週可返校</b>、退燒用acetaminophen(<u>勿aspirin</u>)。</p><p><b>腮腺炎(mumps)</b>:飛沫傳染、腮腺腫脹(無皮疹)、呼吸道隔離約9天、<u>避酸性食物</u>。<b>嬰兒玫瑰疹(HHV-6)</b>:6個月~2歲、<b>突發高燒3~5天退燒後出疹</b>(軀幹先)、<b>熱性痙攣常見合併症</b>、疹1~2天快速消退不留色素。</p>"},"3猩紅熱與細菌皮膚感染":{"html":"<p><b>猩紅熱</b>:<b>A群β型溶血性鏈球菌</b>、針點狀紅疹受壓變白<b>砂紙感</b>、草莓舌(白→紅)、盤尼西林24小時內退燒、狄克氏試驗(非錫克氏=白喉)。<b>膿皰病</b>:金黃葡萄球菌/鏈球菌、高傳染、<b>清洗去痂+抗生素藥膏</b>、剪短指甲。</p><p><b>新生兒皮膚</b>:毒性紅斑(出生1~4天、1~3週自消、不需治療)、蒙古斑(1~5歲消)、粟粒疹(2~4週消)、毛細血管瘤(草莓狀多自消)。<b>尿布疹</b>:勤換尿布、溫水清洗拭乾、氧化鋅藥膏、<u>勿痱子粉/酒精/烤燈</u>。</p>"},"4川崎氏症與風濕熱":{"html":"<p><b>川崎氏症</b>:發燒≥5天+五特徵中四項(<b>雙眼結膜充血/口唇乾裂草莓舌/四肢末梢紅腫脫皮/軀幹皮疹/頸淋巴結腫</b>)、<b>最嚴重併發症冠狀動脈瘤</b>、治療<b>IVIG+高劑量aspirin</b>、長期追蹤心臟。</p><p><b>風濕熱</b>:A群鏈球菌咽炎後自體免疫、Jones準則(<b>心臟炎最常侵犯心肌瓣膜</b>、游走性多發關節炎、舞蹈症、皮下結節、環形紅斑)、病程數週、須長期預防性抗生素。<u>四肢末梢脫皮是川崎/猩紅熱(非風濕熱)</u>。</p>"},"5腸病毒":{"html":"<p><b>腸病毒</b>:腸胃道/呼吸道/接觸傳染、<b>發病前數天已有傳染力</b>(發病後1週高峰)、呼吸道1~3週/糞便2~3個月、<b>手足口病+疱疹性咽峽炎</b>、<b>腸病毒71型最易神經併發症</b>。</p><p><b>重症前兆(5天內注意)</b>:嗜睡/活力差/手腳無力、<b>肌躍型抽搐(無故驚嚇)</b>、呼吸心跳加快。護理:軟質冰涼飲食、<b>肥皂洗手、含氯漂白水(酒精無效)</b>、避免共餐、好發5歲以下、目前無疫苗。</p>"},"6HIV愛滋":{"html":"<p><b>HIV/AIDS</b>:侵犯CD4輔助T細胞;傳染血液體液+<b>垂直傳染(胎盤/產道/哺乳)</b>,<u>日常接觸/親吻臉頰/唾液不傳染</u>。兒童HIV:經產道最常見、潛伏期較成人<b>短</b>、淋巴間質性肺炎最常見、<b>最常死因卡氏肺囊蟲肺炎(PCP)</b>、神經感染最常隱球菌。</p><p>母嬰:抗病毒藥(分娩勿停)、<b>新生兒24小時內通報、勿哺乳(改配方奶)</b>、排泄物漂白水浸泡。疫苗:<b>免疫低下禁活減毒疫苗(口服沙賓/卡介苗/水痘/MMR)</b>、可打不活化(B肝/Hib/肺炎/流感)。空窗期潛伏期最長;感染初期類流感=急性血清轉換期。安全性行為(非絕對禁止)。</p>"},"7疱疹與性傳染病":{"html":"<p><b>單純疱疹(HSV)</b>:第1型口唇、第2型生殖器、潛伏<b>感覺神經節</b>(非運動)、acyclovir治療。<b>疱疹性齦口炎</b>(初次侵犯兒童最常):高燒口腔潰瘍(<b>前半部</b>)、流質冰涼食物(<u>避酸/勿類固醇</u>)、acyclovir。</p><p><b>生殖器疱疹</b>:新生兒經產道感染(<b>活動病灶剖腹產</b>)、無病灶可哺乳、無法根治。<b>梅毒第二期</b>:全身皮疹含<b>手掌腳底丘疹</b>+扁平濕疣+掉髮。<b>骨盆腔感染(PID)</b>:常由披衣菌+淋病上行感染。先天性梅毒:隔離衣手套、嬰兒油塗敷。</p>"},"8自體免疫風濕":{"html":"<p><b>SLE(全身性紅斑狼瘡)</b>:自體免疫多系統、青少年女性多、類固醇/免疫抑制(脈衝治療)、<b>藥物副作用(月亮臉等)影響自我心像</b>(青春期最大困擾,須誠實協助調適)。蝴蝶斑、光敏感、腎炎。</p><p><b>幼年型類風濕性關節炎(JRA)</b>:<b>晨間關節僵硬</b>、<b>熱敷+止痛</b>、鼓勵適度活動防攣縮(非臥床)、NSAID/DMARD。<b>皮肌炎</b>:臉部紅斑(heliotrope)、Gottron疹、近端肌無力(發炎可壓痛)。急性風濕熱:心臟炎/皮下結節/多發關節炎/舞蹈症/環形紅斑。</p>"},"9寄生蟲與黴漿菌等其他感染":{"html":"<p><b>黴漿菌肺炎</b>:好發<b>學齡兒/年輕成人</b>(非1~4歲)、<b>高傳染會群聚</b>、乾咳+<b>輕微發燒(<39°C)</b>+間質性浸潤、<b>紅黴素/azithromycin</b>(青黴素無效)。</p><p><b>寄生蟲</b>:<b>蟯蟲</b>(透明膠帶黏肛門、<b>清晨未起床採集</b>)、<b>鉤蟲</b>(<b>赤腳接觸泥土經皮膚鑽入、致貧血</b>)、蛔蟲(糞口)。<b>流感</b>:發燒發冷/喉嚨痛/畏光/肌肉痠痛(<u>無紅疹皮膚搔癢</u>)。</p>"},"10預防接種與孕期感染借題":{"html":"<p><b>疫苗</b>:活減毒(口服沙賓/卡介苗/水痘/MMR/輪狀)→<b>免疫低下/化療/孕婦禁</b>;不活化(B肝/五合一/沙克IPV/肺炎/流感)→可打。時程:出生24h內B肝、卡介苗滿5~8個月、2/4/6個月五合一、滿1歲MMR+水痘。MMR禁忌:孕婦/3個月內擬懷孕/免疫低下/近期輸血。化療病童可打流感、避接觸水痘麻疹。</p><p><b>孕期</b>:<b>TORCH(弓形蟲/其他梅毒/德國麻疹/CMV/HSV)</b>致胎兒畸形;德國麻疹IgG陰性=無免疫力須衛教;第一妊娠期驗HIV/梅毒/B肝/德國麻疹抗體,<b>GBS於35~37週、OGTT於24~28週</b>;母乳提供<b>IgA</b>;C肝可哺乳;茲卡致小頭症;產後大出血監測<b>DIC</b>。兒童癌症九大警訊(蕁麻疹非其一)。</p>"}};

function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);

 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}

function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
