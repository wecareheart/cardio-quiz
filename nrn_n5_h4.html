"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"家庭護理居家護理與個案管理","topic_num":"家庭護理居家護理與個案管理","q_num":48,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"與林女士共同訂定計畫,使其能恢復獨立自主的生活","B":"聯繫藥師提供藥物整合服務,指導林女士正確用藥","C":"親自到府執行復健,並提供日常生活功能服務","D":"定期電話訪視,替林女士安排就醫回診的交通接送"},"img":""},{"id":"114100-N5-36","code":"114100","roc":"114","cat":"N5","catname":"精神科與社區衛生護理學","num":36,"stem":"護理師在社區篩檢發現疑似大腸癌個案,通知個案,並進行轉介及後續處理,所扮演角色,下列何者最適當?","opts":{"A":"研究應用者","B":"增能促進者","C":"照護協調者","D":"倡議者"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"家庭護理居家護理與個案管理","topic_num":"家庭護理居家護理與個案管理","q_num":36,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"研究應用者","B":"增能促進者","C":"照護協調者","D":"倡議者"},"img":""},{"id":"114170-N5-21","code":"114170","roc":"114","cat":"N5","catname":"精神科與社區衛生護理學","num":21,"stem":"有關家庭暴力,下列敘述何者最適當?","opts":{"A":"受暴者不會發生在男性","B":"可能發生在任何具有家庭關係者之間","C":"身體虐待不屬於家庭暴力種類","D":"家庭暴力形成原因多為單一因素造成"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"家庭護理居家護理與個案管理","topic_num":"家庭護理居家護理與個案管理","q_num":21,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"受暴者不會發生在男性","B":"可能發生在任何具有家庭關係者之間","C":"身體虐待不屬於家庭暴力種類","D":"家庭暴力形成原因多為單一因素造成"},"img":""},{"id":"114170-N5-40","code":"114170","roc":"114","cat":"N5","catname":"精神科與社區衛生護理學","num":40,"stem":"蘇小弟的爸媽皆在學校任教,爸爸因照顧年邁雙親留職停薪,由剛升職為校長的媽媽支撐全家開銷,媽媽因此成為家中事務的主要決策者,此家庭的權力關係最符合下列何種類型?","opts":{"A":"傳統權威型","B":"情況權威型","C":"分享權威型","D":"讓步妥協型"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"家庭護理居家護理與個案管理","topic_num":"家庭護理居家護理與個案管理","q_num":40,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"傳統權威型","B":"情況權威型","C":"分享權威型","D":"讓步妥協型"},"img":""},{"id":"115030-N5-8","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":8,"stem":"有關家庭結構評估,下列何者屬於內在結構?","opts":{"A":"文化","B":"次系統","C":"社經地位","D":"宗教"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"家庭護理居家護理與個案管理","topic_num":"家庭護理居家護理與個案管理","q_num":8,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"文化","B":"次系統","C":"社經地位","D":"宗教"},"img":""},{"id":"115030-N5-40","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":40,"stem":"有關家庭的成長性和情境性危機敘述,下列何者正確?1成長性危機通常是可預測的 2情境性危機是專指負向事件 3中頭彩可能造成家庭的情境性危機 4外派進修屬成長性危機","opts":{"A":"12","B":"13","C":"23","D":"24"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"家庭護理居家護理與個案管理","topic_num":"家庭護理居家護理與個案管理","q_num":40,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"12","B":"13","C":"23","D":"24"},"img":""}],E={"101030-N5-30":{"quick":"學齡前兒童目睹家暴的影響＝身體症狀及退化行為①、明顯分離焦慮③、覺得世界不安全④(智力受損②非)。","detail":{"background":"學齡前期兒童若經常「目睹家庭暴力」，所導致的影響:(1)呈現「身體症狀及退化行為(如尿床、吸吮手指)」;(3)出現「明顯的分離焦慮」;(4)覺得「世界不安全(失去安全感、信任感)」。而(2)『「智力受損」』「不是」目睹家暴的「直接、必然」影響(家暴影響的是「情緒、行為、安全感」，而非直接造成智力受損)。故正確為①③④(選 C)。目睹家暴影響兒童的情緒、行為與安全感。","options":{"A":"123：含②(智力受損)，非目睹家暴的直接影響。","B":"124：含②，錯誤。","C":"正確。身體症狀退化①、分離焦慮③、覺得世界不安全④。","D":"234：含②、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"101030-N5-64":{"quick":"Friedman 的「家庭內在結構」四個基本要素＝角色結構、溝通型態、權力結構、價值體系。","detail":{"background":"Friedman 指出「家庭「內在結構」」的四個基本要素為(C)『「角色結構、溝通型態、權力結構、價值體系(及信念)」』。這四者描述家庭「內部如何運作」:成員扮演的角色、彼此溝通的方式、權力與決策的分配、共同的價值與信念。其他選項的組合非 Friedman 的家庭內在結構四要素。故 C 正確。","options":{"A":"非 Friedman 的家庭內在結構四要素。","B":"文化、社會階層等偏向家庭的脈絡背景，非內在結構四要素。","C":"正確。角色結構、溝通型態、權力結構、價值體系。","D":"非 Friedman 的家庭內在結構四要素。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"101030-N5-65":{"quick":"低收入、精神病、質疑訪視的家庭：護理師應「優先」設法與李家建立信任關係。","detail":{"background":"李家(低收入、母親精神疾病、子女發展遲緩、夫婦質疑且不歡迎訪視)，社區護理人員應「優先」採取(A)『「設法與李家「建立信任關係」(在家庭排斥的情況下，「先建立關係、取得信任」，才能進一步提供協助)』。其他(B 強制精神治療、C 轉介早療、D 介紹避孕)都是「後續」要做的，但若「未先建立信任、強行介入」，會被家庭排斥而無法推動。故 A 正確。對排斥的家庭，先建立信任關係是優先。","options":{"A":"正確。對質疑、排斥的家庭，優先設法建立信任關係。","B":"強制精神治療不當，且未先建立關係難以推動。","C":"轉介早療是後續，須先建立信任。","D":"介紹避孕是後續，須先建立信任。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"101030-N5-74":{"quick":"個案管理流程中「不需考量」者＝個案管理師之喜好。","detail":{"background":"個案管理流程(篩選、評估需求、擬訂計畫、連結資源、監測、評價)中，「不需考量」的是(D)『「「個案管理師」之喜好」』——個案管理應「以「案主/案家」的需求、喜好、能力為中心」，而非「以「個案管理師(個人)的喜好」為依據」。其他應考量:A 案主或案家的喜好(preference);B 案主或案家的經濟能力;C 與服務資源間的溝通協調。故本題選不需考量者為 D。個案管理以案主為中心，非個案管理師的喜好。","options":{"A":"案主或案家的喜好，是應考量的。","B":"案主或案家的經濟能力，是應考量的。","C":"與服務資源間的溝通協調，是應考量的。","D":"正確(本題選不需考量者)。個案管理以案主為中心，非個案管理師的喜好。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"101030-N5-79":{"quick":"中老年病個案管理原則「錯誤」者＝以治癒個案疾病為管理重點。","detail":{"background":"中老年病(多為「慢性病」)個案管理原則的「錯誤」者為(C)『「以「「治癒」個案疾病」為管理重點」』——錯誤，「慢性病「多無法「治癒」」，個案管理的重點是「「控制病情、維持功能、提升生活品質、預防併發症」」，而非「治癒」。其他正確:A 以問題解決法為策略;B 鼓勵家屬積極參與;D 協調轉介資源的利用。故本題選錯誤者為 C。慢性病個案管理以控制與維持功能為重點，非治癒。","options":{"A":"以問題解決法為策略，正確。","B":"鼓勵家屬積極參與，正確。","C":"正確(本題選錯誤者)。慢性病以控制、維持功能為重點，非治癒。","D":"協調轉介資源的利用，正確。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"101110-N5-64":{"quick":"家庭面對壓力的「內部」因應策略「錯誤」者＝住家附近醫療資源充足。","detail":{"background":"家庭面對壓力時所採用的「「內部」因應策略或資源」，「錯誤」者為(B)『「住家附近「醫療資源充足」」』——「住家附近的醫療資源」是「「外部(社區)資源」」，而非家庭的「「內部」資源」。其他屬於家庭的內部資源:A 家庭對壓力事件賦予(正向)意義;C 家庭成員互相信賴;D 家庭成員具有醫護處理能力。故本題選錯誤者為 B。「醫療資源充足」是外部資源，非家庭內部因應。","options":{"A":"家庭對壓力事件賦予意義，是內部因應。","B":"正確(本題選錯誤者)。醫療資源充足是外部資源，非內部。","C":"家庭成員互相信賴，是內部資源。","D":"家庭成員具有醫護處理能力，是內部資源。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"101110-N5-67":{"quick":"提升新住民健康照護品質「較無相關」者＝舉辦各國傳統服裝表演。","detail":{"background":"提升女性新住民及其子女使用健康照護服務品質的策略，「較無相關」者為(D)『「舉辦各國「傳統服裝表演」」』——「服裝表演」是「文化交流活動」，「與「提升健康照護服務的品質」無直接關係」。其他有助益:A 開辦新住民生活成長營(增進適應);B 培訓通譯員(克服語言障礙);C 製作多語化衛生保健教材(克服語言障礙)。故本題選較無相關者為 D。服裝表演與提升健康照護品質無直接關係(與前述同類題一致)。","options":{"A":"開辦生活成長營增進適應，有助益。","B":"培訓通譯員克服語言障礙，有助益。","C":"多語化衛生保健教材克服語言障礙，有助益。","D":"正確(本題選較無相關者)。傳統服裝表演與提升健康照護品質無直接關係。"},"sources":["社區衛生護理學(新文京/華杏)·新住民照護"]}},"102030-N5-51":{"quick":"了解社區民眾的教育程度，最主要是為了＝了解民眾對知識的接受度。","detail":{"background":"社區健康評估時，了解社區民眾的「教育程度」，最主要是為了(D)『「了解社區民眾對於「知識的接受度」(教育程度影響其「理解、吸收健康資訊的能力」，據以「調整衛教的方式與內容」)」』。經濟負擔、社會福利、疾病分布不是「教育程度」最主要的評估目的。教育程度主要反映「對知識的接受度」。故 D 正確。了解教育程度是為了了解民眾對知識的接受度(以調整衛教)。","options":{"A":"經濟負擔由「收入」評估，非教育程度。","B":"社會福利需求由「弱勢狀況」評估。","C":"疾病分布由「流行病學」評估。","D":"正確。了解教育程度是為了了解民眾對知識的接受度。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"102030-N5-64":{"quick":"了解家庭運用「社會資源」的情形＝家庭生態圖(Eco-Map)。","detail":{"background":"要了解「家庭「運用社會資源」的情形」，可利用(A)『「家庭生態圖(Eco-Map;以圖呈現「家庭與「外部系統(學校、醫療、社福、親友等)」的「連結與資源往來」關係」)」』。家族圖譜(genogram)呈現「家庭的「世代結構與健康史」」;家庭發展史是發展階段;APGAR 評估家庭功能。「家庭與外部資源的連結」用生態圖。故 A 正確。生態圖呈現家庭與外部資源系統的連結。","options":{"A":"正確。家庭生態圖(Eco-Map)呈現家庭運用社會資源的情形。","B":"家族圖譜(genogram)呈現家庭的世代結構與健康史。","C":"家庭發展史是家庭的發展階段。","D":"APGAR 是家庭功能評估表。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"102030-N5-65":{"quick":"家庭功能混亂、與外界疏離：社區護理師應「優先」與家庭建立信任關係。","detail":{"background":"若個案家庭「功能混亂、與外界關係疏離」，社區護理師應「優先」採取(B)『「與家庭「建立信任關係」(對「混亂、疏離、不信任外界」的家庭，「先建立關係與信任」，才能進一步介入)』。其他(A 討論預期問題、C 指導特殊技巧、D 教導認識問題)是「建立關係之後」的後續工作。對混亂疏離的家庭，先建立信任是優先。故 B 正確(與前述同類題一致)。","options":{"A":"討論預期問題是建立關係後的後續工作。","B":"正確。對混亂、疏離的家庭，優先建立信任關係。","C":"指導特殊技巧是後續工作。","D":"教導認識問題是後續工作。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"103030-N5-23":{"quick":"文化敏感度：護理師進入個案的原生社區，應避免使用自身文化價值去挑戰個案的決定。","detail":{"background":"文化敏感度議題的正確敘述是(C)『「護理師進入李女士的原生社區，應「避免使用「自身的文化價值」去「挑戰」李女士的決定」(尊重個案的文化、信念與選擇)」』。其他錯誤:A『拒絕治療的行為「不可能」受文化價值影響』錯誤(文化「會」影響健康行為與決定);B『不願入住永久屋「與文化經驗無關」』錯誤(可能與文化經驗有關);D『護理師「無法」考慮文化問題去滿足每位個案』過於消極(應「盡力提供文化適切的照護」)。故 C 正確。文化敏感度要尊重個案的文化，不以自身價值挑戰其決定。","options":{"A":"文化價值會影響健康行為與決定，非不可能。","B":"不願入住永久屋可能與文化經驗有關，非無關。","C":"正確。應避免以自身文化價值挑戰個案的決定。","D":"應盡力提供文化適切的照護，非無法考慮文化。"},"sources":["社區衛生護理學(新文京/華杏)·文化照護"]}},"103030-N5-58":{"quick":"了解家庭的「健康史」＝家族圖譜(genogram)。","detail":{"background":"實施家庭評估時，要了解「家庭的「健康史」」，可利用(B)『「家族圖譜(genogram;以圖呈現「家庭「三代以上」的「世代結構、成員關係、疾病/健康史(遺傳、家族病史)」」)」』。家庭生態圖呈現與外部資源的連結;家庭發展史是發展階段;APGAR 評估家庭功能。「家庭的世代結構與健康史」用家族圖譜。故 B 正確。家族圖譜(genogram)呈現家庭的世代結構與健康史。","options":{"A":"家庭生態圖呈現與外部資源的連結。","B":"正確。家族圖譜(genogram)了解家庭的健康史。","C":"家庭發展史是家庭的發展階段。","D":"APGAR 是家庭功能評估表。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"103030-N5-59":{"quick":"Otto 家庭長處評估標準「不在其中」者＝家庭成員的角色固定不變。","detail":{"background":"依 Otto(1963)的家庭「長處(優點)」評估標準，「不在其評估項目中」的是(D)『「家庭成員的角色「固定不變」」』——「角色「固定不變、僵化」「不是」家庭的「長處」」;反而「「角色「彈性、可調整」」才是健康家庭的特徵」。其他屬於家庭長處:A 家庭成員間能有效溝通;B 家庭願接受外界必要的協助;C 家庭能與社區維持建設性互動。故本題選不在其中者為 D。「角色固定不變(僵化)」非家庭長處;角色彈性才是。","options":{"A":"家庭成員間能有效溝通，是家庭長處。","B":"家庭願接受外界必要的協助，是家庭長處。","C":"家庭能與社區維持建設性互動，是家庭長處。","D":"正確(本題選不在其中者)。角色固定不變(僵化)非家庭長處。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"103030-N5-65":{"quick":"協助氣喘學童：經多管道發現個案①、電話或家庭訪視並提供保健指導③(告訴全班②、通報教育局④非)。","detail":{"background":"學校護理師協助氣喘學童的措施:(1)經由多管道(健康檢查、導師、家長等)來「發現個案」;(3)進行「電話或家庭訪視，並提供家庭保健指導」。而(2)『「告訴全班同學」有氣喘的學童、請大家監測』錯誤(「侵犯個案隱私、可能造成標籤化」);(4)『「通報教育局」』非必要(氣喘是個別的慢性病照護，非須通報的事件)。故正確為①③(選 A)。協助氣喘學童以發現個案、家訪保健指導為主，不可洩漏隱私。","options":{"A":"正確。多管道發現個案①、電話/家庭訪視並提供保健指導③。","B":"24：含②(告訴全班，侵犯隱私)④(通報教育局)，皆不當。","C":"12：含②(侵犯隱私)，錯誤。","D":"34：含④(通報教育局，非必要)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"103030-N5-66":{"quick":"能反映家庭「價值觀」的回答＝「不要跟我講這個，不吉利」。","detail":{"background":"家訪詢問「發生意外狀況時如何處理」，能反映家庭「價值觀(信念、態度)」的回答是(B)『「「不要跟我講這個，不吉利」(反映家庭對「死亡/意外」的「信念、忌諱、價值觀」)」』。其他選項反映的是別的面向:A「要問我哥哥」反映「權力結構/決策」;C「每個人想的都不一樣」反映「溝通/共識」;D「沒有經驗、不知道」反映「知識/經驗不足」。「不吉利(忌諱)」屬價值觀/信念。故 B 正確。「不吉利」反映家庭的價值觀與信念。","options":{"A":"「要問我哥哥」反映權力結構/決策。","B":"正確。「不吉利」反映家庭的價值觀與信念。","C":"「每個人想的都不一樣」反映溝通/共識。","D":"「沒有經驗」反映知識/經驗不足。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"103030-N5-72":{"quick":"學生疑似遭家暴：最適合通知校長及通報主管機關。","detail":{"background":"學校護理師發現學生「疑似遭到家暴」，最適合的行動是(A)『「通知校長及「通報主管機關」(家暴/兒少保護是「責任通報」，須於24小時內通報主管機關，並依校內程序通知)」』。其他不適當:B『建議學生打113』未盡通報責任(護理師本身是責任通報人);C『勸告父母不應體罰』可能打草驚蛇、危及學生;D『請好朋友幫忙』不專業、無法保護學生。故 A 正確。疑似家暴/兒虐是責任通報，應通報主管機關。","options":{"A":"正確。通知校長及通報主管機關(責任通報)。","B":"護理師本身是責任通報人，應自行通報，非建議學生打113。","C":"勸告父母可能打草驚蛇、危及學生。","D":"請好朋友幫忙不專業、無法保護學生。"},"sources":["社區衛生護理學(新文京/華杏)·家庭暴力"]}},"103030-N5-80":{"quick":"高風險家庭的敘述「錯誤」者＝有學齡期子女的家庭。","detail":{"background":"高風險家庭的敘述，「錯誤」者為(C)『「有「學齡期子女」的家庭」』——「「單純有學齡期子女」「不是」高風險家庭」(那是「一般家庭的正常發展階段」)。其他屬於高風險家庭:A 未成年且未婚懷孕的家庭;B 主要家計者罹患重大疾病的家庭;D 有暴力傾向的家庭。故本題選錯誤者為 C。有學齡期子女是一般家庭，非高風險。(高風險家庭指有經濟、疾病、暴力、照顧失能等危機者。)","options":{"A":"未成年且未婚懷孕的家庭，是高風險家庭。","B":"主要家計者罹患重大疾病的家庭，是高風險家庭。","C":"正確(本題選錯誤者)。有學齡期子女是一般家庭，非高風險。","D":"有暴力傾向的家庭，是高風險家庭。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"103100-N5-64":{"quick":"家庭壓力：家庭資源越豐富，越能減輕家庭壓力。","detail":{"background":"家庭壓力的正確敘述是(B)『「家庭「資源越豐富」，越能「減輕」家庭壓力(豐富的內外部資源能緩衝壓力的衝擊)」』。其他錯誤:A『生活改變單位值越「低」，產生危機機率越高』錯誤(生活改變單位值「越「高」」，壓力越大、危機機率越高);C『重大意外傷害是「成長性(maturational)」危機』錯誤(意外傷害是「「情境性(situational)」危機」;成長性危機是「發展階段轉換」的危機);D『家庭壓力源「都是負向」的生活事件』錯誤(「「正向」事件(如結婚、生子、升遷)「也會」造成壓力」)。故 B 正確。家庭資源越豐富越能減輕壓力。","options":{"A":"生活改變單位值越「高」，危機機率越高，方向相反。","B":"正確。家庭資源越豐富，越能減輕家庭壓力。","C":"重大意外傷害是情境性危機，非成長性危機。","D":"正向事件也會造成壓力，非都是負向事件。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"103100-N5-65":{"quick":"青少年期家庭(子女16/13/10歲)的發展任務＝強化夫妻婚姻關係①、維持開放親子溝通③、使孩子在自由與責任間平衡④(調適收入減少②非)。","detail":{"background":"劉家(父54、母48、子女16/13/10歲，屬「「青少年期家庭」」)的發展任務:(1)「強化夫妻間的「婚姻關係」(避免因子女而忽略夫妻關係)」;(3)「維持「開放的親子溝通」(青少年期溝通尤其重要)」;(4)「使孩子在「自由和責任間取得平衡」(放手又把關)」。而(2)『「調適收入的減少」』錯誤(那是「「退休/老年期」家庭」的任務;此家庭夫妻工作穩定)。故正確為①③④(選 C)。","options":{"A":"123：含②(調適收入減少，屬退休期)，錯誤。","B":"234：含②、缺①，錯誤。","C":"正確。強化夫妻婚姻①、維持開放親子溝通③、孩子自由與責任平衡④。","D":"124：含②，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"103100-N5-66":{"quick":"劉家(父母+子女同住)的家庭類型＝核心家庭。","detail":{"background":"劉家由「父母與其(未婚)子女」組成、同住——屬(B)『「核心家庭(nuclear family;由「一對夫妻及其未婚子女」組成的「兩代」家庭)」』。夫妻家庭是只有夫妻(無子女);折衷(主幹)家庭是含「祖父母-父母-子女」三代;混合家庭是含其他親屬/再婚家庭。「父母＋子女」是核心家庭。故 B 正確。父母與其未婚子女組成核心家庭。","options":{"A":"夫妻家庭是只有夫妻、無子女。","B":"正確。父母與其未婚子女組成核心家庭。","C":"折衷(主幹)家庭含祖父母-父母-子女三代。","D":"混合家庭含其他親屬/再婚組合。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"104030-N5-42":{"quick":"「不是」家庭訪視技巧者＝由專業性會談逐漸轉為一般性會談。","detail":{"background":"家庭訪視過程中的技巧，「不是」其技巧者為(D)『「由「專業性會談」逐漸轉為「一般性會談」」』——錯誤，家訪會談應「由「「一般性(寒暄、建立關係)」會談」「逐漸轉為「專業性(健康評估、指導)」會談」」(順序相反);先建立關係再進入專業主題。其他是家訪技巧:A 護理契約的運用;B 訪視內容重點提醒與整理;C 以清楚的評估架構收集資料。故本題選不是者為 D。家訪應由一般性會談轉為專業性，D 的順序相反。","options":{"A":"護理契約的運用，是家訪技巧。","B":"訪視內容重點提醒與整理，是家訪技巧。","C":"以清楚的評估架構收集資料，是家訪技巧。","D":"正確(本題選不是者)。應由一般性轉為專業性會談，D 順序相反。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"104030-N5-64":{"quick":"家系圖中 A 與 B 以「虛線」相連＝同居。","detail":{"background":"依家系圖(genogram)的符號:A(方形＝男)與 B(圓形＝女)之間以「「虛線(點線)」」相連——「虛線」在家系圖中代表(A)『「同居(cohabitation;未婚而同住)」』。對照:「「實線」＝結婚」;「「實線上「一條斜線」」＝分居」;「「實線上「兩條斜線」」＝離婚」。圖中 A、B 以虛線相連，故為「同居」。故 A 正確。","options":{"A":"正確。家系圖中虛線相連代表同居。","B":"離婚是實線上有兩條斜線。","C":"分居是實線上有一條斜線。","D":"結婚是實線相連，非虛線。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"104030-N5-65":{"quick":"A 與 B 的子女：第一個小孩為男性②、第二個小孩是領養的③。","detail":{"background":"承上題的家系圖:(2)「第一個小孩(a)是「「方形」＝「男性」」(以「實線」連接父母，為「親生」)」;(3)「第二個小孩(b)以「「虛線」」連接父母——「虛線到子女」代表「「領養(adopted)」」」。而(1)第一個小孩為女性、(4)第二個小孩是親生的，皆與圖不符。故正確為②③(選 B)。家系圖:方形＝男、圓形＝女;實線連子女＝親生、虛線連子女＝領養。","options":{"A":"13：第一個是男性(非女性①)、第二個是領養(非親生)，錯誤。","B":"正確。第一個小孩為男性②、第二個小孩是領養的③。","C":"24：含④(第二個親生，但圖示虛線為領養)，錯誤。","D":"14：含①(第一個女性)④(第二個親生)，皆與圖不符。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"104030-N5-69":{"quick":"弱勢群體服務策略「最不適當」者＝發展緊急醫療。","detail":{"background":"弱勢群體的健康受社會、環境、生活型態等多重因素影響，社區護理師提供服務的策略，「最不適當」者為(D)『「發展「緊急醫療」」』——「緊急醫療」是「急重症的醫療」，「與「弱勢群體的「多重社會決定因素」健康照護」較無關」(弱勢群體需要的是「資源連結、個案管理、主動關懷」)。其他適當:A 與社會福利機構保持密切聯繫;B 採個案管理模式;C 主動發現個案。故本題選最不適當者為 D。弱勢群體服務以連結資源、個案管理、主動發現為主，非發展緊急醫療。","options":{"A":"與社會福利機構保持密切聯繫，適當。","B":"採個案管理模式，適當。","C":"主動發現個案，適當。","D":"正確(本題選最不適當者)。緊急醫療與弱勢群體的多重社會因素照護較無關。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"104030-N5-71":{"quick":"幼稚園給家長的健康講座應優先選擇＝如何預防事故傷害。","detail":{"background":"張護理師為幼稚園規劃給家長的健康講座，依「幼兒的健康需求」應優先選擇(B)『「如何「預防事故傷害」(「事故傷害」是「兒童(1~14歲)的首要死因」，最切合幼兒的健康需求與家長的衛教需要)」』。兒童癌症、兒童性別認同的議題較非「優先、普遍」的需求;家庭暴力雖重要但非「幼兒安全」最優先的衛教。故 B 正確。事故傷害是兒童首要死因，預防事故傷害是家長衛教的優先。","options":{"A":"兒童癌症非普遍、優先的衛教需求。","B":"正確。事故傷害是兒童首要死因，預防事故傷害應優先。","C":"家庭暴力雖重要，但非幼兒安全最優先的衛教。","D":"兒童性別認同非優先、普遍的衛教需求。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"104100-N5-32":{"quick":"Duvall & Hill 家庭發展理論：每個階段都有其重要的發展工作。","detail":{"background":"Duvall & Hill 家庭發展理論的正確敘述是(B)『「「每個階段都有其「重要的發展工作(任務)」」(各階段須完成特定的發展任務)』。其他錯誤:A『分為「四」個階段』錯誤(Duvall 將家庭發展分為「「八」個階段」);C『青少年的家庭指家中最大的孩子約「10~12歲」』錯誤(青少年期家庭指最大的孩子約「「13~20歲」」);D『老年期的家庭是指「空巢期至退休」』錯誤(老年期家庭是指「「退休至死亡」」;空巢期是另一階段)。故 B 正確。Duvall 家庭發展分八階段、各有發展任務。","options":{"A":"Duvall 將家庭發展分為八個階段，非四個。","B":"正確。每個階段都有其重要的發展工作。","C":"青少年期家庭指最大孩子約13~20歲，非10~12歲。","D":"老年期家庭指退休至死亡，非空巢至退休。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"104100-N5-36":{"quick":"社區個案管理模式的護理措施＝評估個案功能程度，以利復健活動的安排。","detail":{"background":"社區中採個案管理模式時，護理師提供的護理措施是(A)『「「評估個案的功能程度」，以利「復健活動的安排」(依個案的功能狀況，量身規劃合適的照護與復健)」』。其他錯誤:B『「減少」用藥次數以增加遵從度』不一定(用藥須依醫囑，非單純減少次數);C『「多給予建議」以便其遵守』偏向指令式(應與個案「共同」決定);D『為預防復發「避免討論」過去的急性住院經驗』錯誤(了解過去的住院經驗有助評估與預防)。故 A 正確。個案管理先評估個案功能，據以安排照護與復健。","options":{"A":"正確。評估個案功能程度，以利復健活動的安排。","B":"用藥須依醫囑，非單純減少次數。","C":"應與個案共同決定，非單向多給建議。","D":"了解過去住院經驗有助評估，非避免討論。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"104100-N5-39":{"quick":"6個月嬰兒、營養不良、菸頭燙傷、多處瘀青、顱內出血＝身體虐待。","detail":{"background":"6個月大嬰兒、明顯營養不良、「頭部外傷疑似顱內出血」、身上「多處新舊菸頭燙傷痕跡」、「多處手部內側及臀部瘀青」——這些「外力造成的傷害(燙傷、瘀青、頭部外傷)」，屬(C)『「身體虐待(physical abuse;對兒童施以「肢體暴力，造成身體傷害」)」』。醫療疏忽、保護疏忽是「疏於照顧」;情緒/心理虐待是「言語/精神」的傷害。本案有明顯的「外力身體傷害(燙傷、瘀青、外傷)」，屬身體虐待。故 C 正確。菸頭燙傷、多處瘀青、外傷是身體虐待的特徵。","options":{"A":"醫療疏忽是疏於提供醫療，本案有明顯外力傷害。","B":"情緒/心理虐待是言語/精神的傷害。","C":"正確。菸頭燙傷、多處瘀青、外傷，是身體虐待。","D":"保護疏忽是疏於照顧/保護，本案有主動施加的傷害。"},"sources":["社區衛生護理學(新文京/華杏)·兒少保護"]}},"104100-N5-62":{"quick":"了解家庭成員的親疏關係與權力大小＝家庭圈(Family circle)。","detail":{"background":"要了解「家庭成員的「親疏關係與權力大小」」，可利用(C)『「家庭圈(Family circle;由個案「主觀」繪製，以「圓圈的「大小」代表成員的「權力/重要性」、圓圈的「距離/重疊」代表「親疏關係」」)」』。家庭生態圖呈現與外部資源的連結;家族圖譜呈現世代結構與健康史;家庭發展史是發展階段。「成員的親疏與權力」用家庭圈。故 C 正確。家庭圈以圓的大小代表權力、距離/重疊代表親疏。","options":{"A":"家庭生態圖呈現家庭與外部資源的連結。","B":"家族圖譜呈現世代結構與健康史。","C":"正確。家庭圈了解家庭成員的親疏關係與權力大小。","D":"家庭發展史是家庭的發展階段。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"104100-N5-65":{"quick":"評估家庭訪視「需求性」的指標＝對案家的幫助性②、案家的需要性③。","detail":{"background":"適合作為評估「家庭訪視「需求性」」的指標是:(2)「對案家的「幫助性(訪視對案家有無幫助)」」;(3)「案家的「需要性(案家是否「需要」此訪視)」」。而(1)『已訪視次數』、(4)『案家經濟狀況』不是評估「訪視需求」的直接指標。故正確為②③(選 B)。評估訪視需求看「對案家的幫助性與需要性」。","options":{"A":"12：含①(已訪視次數)，非需求性的直接指標。","B":"正確。對案家的幫助性②、案家的需要性③。","C":"34：含④(經濟狀況)，非需求性的直接指標。","D":"14：含①④，皆非直接指標。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"105030-N5-62":{"quick":"家庭有效溝通的表現「錯誤」者＝傳遞訊息時儘量以「你」為開始。","detail":{"background":"家庭有效溝通的表現，「錯誤」者為(B)『「傳遞訊息時儘量以「「你」」為開始」』——錯誤，有效溝通宜「以「「我」訊息(I-message)」」表達(如「「我」覺得…」，表達自己的感受而不指責對方);「以「你」開始(如「「你」總是…」)」是「「指責、易引發防衛」」的溝通。其他正確:A 言行一致;C 溝通訊息明確具體;D 給家人適切的回饋。故本題選錯誤者為 B。有效溝通宜用「我訊息」，非以「你」開始(指責)。","options":{"A":"言行一致，是有效溝通。","B":"正確(本題選錯誤者)。宜用「我訊息」，以「你」開始易指責、引發防衛。","C":"溝通訊息明確具體，是有效溝通。","D":"給家人適切的回饋，是有效溝通。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"105030-N5-63":{"quick":"評估家庭長處的主要目的「錯誤」者＝協助護理師完成評估報告。","detail":{"background":"評估家庭「長處(優點)」的主要目的，「錯誤」者為(D)『「協助「護理師完成評估報告」」』——「完成評估報告」是護理師的「行政工作」，「不是」評估家庭長處的「目的」。評估家庭長處的目的是「「協助案家、賦權案家」」:A 協助案家發現自己的潛能;B 協助護理師了解案家具備的能力;C 協助案家提升自信心。故本題選錯誤者為 D。評估家庭長處是為了協助案家(發現潛能、提升自信)，非完成報告。","options":{"A":"協助案家發現自己的潛能，是評估長處的目的。","B":"協助護理師了解案家的能力，是目的。","C":"協助案家提升自信心，是目的。","D":"正確(本題選錯誤者)。完成評估報告是行政工作，非評估長處的目的。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"105030-N5-65":{"quick":"家庭護理設立目標需優先考量的項目「錯誤」者＝護理師感受的重要性。","detail":{"background":"家庭護理過程中設立目標需優先考量的項目，「錯誤」者為(B)『「「護理師」感受的重要性」』——設立目標應「以「「家庭(案家)」的需求、感受、資源」為中心」，而非「以「護理師(個人)的感受」為依據」。其他應優先考量:A 家庭的內外在資源;C 家庭感受的緊急程度;D 家庭感受治療的效果。故本題選錯誤者為 B。設立目標以案家為中心，非護理師的感受(與前述同類題一致)。","options":{"A":"家庭的內外在資源，是設立目標應考量的。","B":"正確(本題選錯誤者)。應以案家為中心，非護理師的感受。","C":"家庭感受的緊急程度，是應考量的。","D":"家庭感受治療的效果，是應考量的。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"105030-N5-66":{"quick":"我國家庭計畫服務內容「錯誤」者＝鼓勵節育。","detail":{"background":"目前我國「家庭計畫」服務的內容，「錯誤」者為(D)『「鼓勵「節育」」』——錯誤，因應「少子化」，現代家庭計畫「「不再「鼓勵節育」」，而是「「鼓勵「適齡、優質生育」、提供不孕協助」」。其他正確的服務內容:A 鼓勵優質優生之生育;B 不孕症諮詢與轉介;C 身心障礙者生育指導。故本題選錯誤者為 D。現代家庭計畫鼓勵優質生育、協助不孕，不再鼓勵節育。","options":{"A":"鼓勵優質優生之生育，是現代家庭計畫的內容。","B":"不孕症諮詢與轉介，是現代家庭計畫的內容。","C":"身心障礙者生育指導，是家庭計畫的內容。","D":"正確(本題選錯誤者)。因少子化，現代家庭計畫不再鼓勵節育。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"105090-N5-11":{"quick":"收集家族史的家庭樹(家庭圖譜)(本題送分)。","detail":{"background":"收集家族史常用的「家庭樹(家庭圖譜/genogram)」——本題經評定為「送分(各選項均給分)」。理解重點(genogram 的符號慣例):以「方形＝男、圓形＝女」;「實線連婚姻、虛線連同居」;「斜線＝分居(一條)/離婚(兩條)」;「以「個案」為中心、至少畫「三代」」;呈現「世代結構、關係與健康/疾病史」。本題送分。","options":{"A":"本題送分，各選項均給分。","B":"本題送分。家庭圖譜以個案為主、至少畫三代為宜。","C":"本題送分，各選項均給分。","D":"本題送分，各選項均給分。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學","送分題"]}},"105090-N5-42":{"quick":"以科學技術控制環境中的危險因子＝懷特(White)的「工程(Engineering)」。","detail":{"background":"懷特(White, 1982)提出的社區護理實務措施中，「應用科學技術的方法「控制環境中的危險因子」，以免除大眾受害」——屬(B)『「工程(Engineering;以「工程/科技手段(如改善設施、防護裝置、環境改造)」控制危險因子)」』。教育(Education)是衛教;強制(Enforcement)是立法強制;個案管理是個案的服務協調。「以科技控制環境危險因子」屬工程。故 B 正確。(三E:教育、工程、強制。)","options":{"A":"教育(Education)是衛生教育。","B":"正確。以科學技術控制環境危險因子，是工程(Engineering)。","C":"強制(Enforcement)是立法強制執行。","D":"個案管理是個案的服務協調。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進"]}},"105090-N5-61":{"quick":"Duvall 家庭發展理論：不同家庭週期，家庭成員會有不同的角色及發展任務。","detail":{"background":"Duvall 家庭發展理論的正確敘述是(D)『「「不同的家庭週期(階段)」，家庭成員會有「不同的角色及發展任務」」』。其他錯誤:A『每個家庭都會「依循同樣的」發展週期』錯誤(不同家庭(如單親、無子女)「未必依循「相同」的週期」);B『分類是以「最小」子女的年齡為依據』錯誤(Duvall 的分期是以「「最大(第一個)」子女的年齡/發展」為依據);C『生育期的家庭是指子女「3~6歲」』錯誤(生育期是指「第一個孩子「出生至30個月」」;3~6歲是「學齡前期家庭」)。故 D 正確。","options":{"A":"不同家庭未必依循相同的發展週期。","B":"Duvall 的分期以最大(第一個)子女為依據，非最小。","C":"生育期是第一個孩子出生至30個月，非3~6歲。","D":"正確。不同家庭週期，成員有不同的角色及發展任務。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"105090-N5-64":{"quick":"遊民個案管理策略「錯誤」者＝強制送至遊民收容所。","detail":{"background":"遊民個案管理策略的「錯誤」者為(C)『「「強制」送至遊民收容所」』——錯誤，「不可「強制」」(應「尊重遊民的「自主與意願」，以「關懷、連結資源、協助自立」的方式提供服務)。其他正確:A 與其他專業人員協調合作;B 聯繫地區民意代表協助;D 評估可用之資源。故本題選錯誤者為 C。遊民服務應尊重其自主意願，不可強制收容(與前述同類題一致)。","options":{"A":"與其他專業人員協調合作，正確。","B":"聯繫地區民意代表協助，正確。","C":"正確(本題選錯誤者)。不可強制送收容所，應尊重其自主意願。","D":"評估可用之資源，正確。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"105090-N5-66":{"quick":"孕32週、下肢浮腫、劇烈頭痛、視力模糊(子癇前症)：最優先＝幫新妮量血壓並迅速安排產檢。","detail":{"background":"家訪發現新妮(懷孕32週、尚未產檢)有「「下肢浮腫、劇烈頭痛、視力模糊」」——這是「「子癇前症(妊娠高血壓)」的「危險徵象」」，可能進展為子癇症(抽搐)，危及母嬰。最優先處理(A)『「幫新妮「量血壓」並「迅速安排產檢(就醫)」(評估血壓、確認子癇前症、緊急處置)』。配偶的糖尿病、老大補打預防針、產前衛教雖重要，但「孕婦的子癇前症徵象「最危急、最優先」」。故 A 正確。子癇前症的危險徵象須最優先處理(量血壓、迅速就醫)。","options":{"A":"正確。孕婦有子癇前症危險徵象，最優先量血壓並迅速安排產檢。","B":"配偶的糖尿病非此情境最危急的問題。","C":"產前衛教非當下最優先(應先處理危險徵象)。","D":"老大補打預防針非當下最優先。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"105090-N5-67":{"quick":"新住民坐月子吐麻油豬肝、婆媳緊張：協助雙方溝通坐月子的方式。","detail":{"background":"印尼籍新住民坐月子時「將婆婆煮的麻油豬肝吐出」、婆媳緊張——最適當的護理處置是(D)『「協助「雙方溝通」坐月子的方式(在「尊重雙方文化(臺灣婆婆的傳統 vs 新住民的飲食習慣)」下，「協調出彼此能接受的方式」)』。其他不當:A『請婆婆忍耐』未解決問題;B『請婦女接受婆婆的好意』忽略其飲食習慣/不適;C『請婆婆煮清淡一點』只片面要求一方。對跨文化的婆媳衝突，協助雙方溝通、找出共識最適當。故 D 正確。","options":{"A":"請婆婆忍耐未解決問題。","B":"請婦女接受好意忽略其飲食習慣與不適。","C":"請婆婆煮清淡只片面要求一方。","D":"正確。協助雙方溝通坐月子的方式，找出共識。"},"sources":["社區衛生護理學(新文京/華杏)·文化照護"]}},"106030-N5-62":{"quick":"了解家庭遺傳性疾病及世代間的關係＝家系圖(genogram)。","detail":{"background":"要了解「家庭的「遺傳性疾病」及「世代間的關係」」，可用(A)『「家系圖(genogram;以圖呈現「家庭三代以上的「世代結構、成員關係、遺傳/家族疾病史」」)」』。生態圖呈現與外部資源的連結;家庭圈呈現成員的親疏與權力;APGAR 評估家庭功能。「遺傳疾病與世代關係」用家系圖。故 A 正確(與前述同類題一致)。","options":{"A":"正確。家系圖(genogram)了解家庭遺傳性疾病及世代間的關係。","B":"生態圖呈現家庭與外部資源的連結。","C":"家庭圈呈現成員的親疏與權力。","D":"APGAR 是家庭功能評估。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"106030-N5-63":{"quick":"家庭護理的最終目標＝改善案家的健康問題。","detail":{"background":"家庭護理的「最終目標」是(B)『「「改善案家的健康問題」(透過家庭護理過程，協助案家解決健康問題、提升健康與功能)」』。發現案家護理需求、進行完整家庭評估是「過程/手段」;提供照護資源是「方法」。家庭護理的「最終目標」是「改善案家的健康」。故 B 正確。家庭護理的最終目標是改善案家的健康問題。","options":{"A":"發現案家護理需求是過程，非最終目標。","B":"正確。家庭護理的最終目標是改善案家的健康問題。","C":"提供照護資源是方法/手段。","D":"進行完整家庭評估是過程/手段。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"106030-N5-64":{"quick":"屬「第一段預防」的家庭護理措施＝指導老人接受流感預防注射①、清除居家易積水容器②。","detail":{"background":"屬「第一段(初段)預防」的家庭護理措施:(1)「指導老人接受「流感預防注射」(疫苗＝特殊保護)」;(2)「清除居家易積水容器(「控制病媒孳生源」＝控制環境危險因子，特殊保護)」。而(3)『鼓勵中年婦女接受「乳房攝影」』是「「早期診斷(第二段)」」;(4)『指導中風病人做「復健」』是「「復健(第三段)」」。故第一段預防為①②(選 A)。第一段預防＝健康促進/特殊保護(疫苗、清除孳生源)。","options":{"A":"正確。流感預防注射①、清除積水容器②，屬第一段預防。","B":"23：含③(乳房攝影，早期診斷=第二段)，錯誤。","C":"34：乳房攝影=第二段、復健=第三段，皆非第一段。","D":"13：含③(乳房攝影，第二段)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"106030-N5-65":{"quick":"時間有限僅能訪視一個案家，應選擇＝肺結核個案。","detail":{"background":"若當天時間有限、僅能訪視一個案家，應選擇(C)『「肺結核個案」』——肺結核是「「具傳染性的傳染病」，「具急迫性、傳播風險」」，須優先訪視(評估服藥、防止傳播、追蹤接觸者)。其他(A 乳癌、B 子宮頸抹片異常、D 糞便潛血陽性)是「慢性病/篩檢異常」，不具肺結核的「急迫性與傳播風險」。故 C 正確。傳染病(肺結核)的急迫性與傳播風險使其優先訪視。","options":{"A":"乳癌個案是慢性病，非急迫。","B":"子宮頸抹片異常須追蹤，但非急迫的傳播風險。","C":"正確。肺結核具傳染性、急迫性，應優先訪視。","D":"糞便潛血陽性須追蹤，但非急迫的傳播風險。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"106030-N5-66":{"quick":"新移民婦女自我健康管理的弱勢，主要與「文化隔閡」有關。","detail":{"background":"臺灣新移民婦女在「自我健康管理」上的弱勢，主要與(C)『「文化隔閡(語言、文化、習俗的差異，造成「資訊取得、就醫溝通、融入適應」的障礙)」』有關。生物遺傳、性別因素、種族因素不是新移民健康管理弱勢的「主要」原因(主要是「文化與語言的隔閡」)。故 C 正確。新移民健康管理的弱勢主要源於文化與語言的隔閡。","options":{"A":"生物遺傳非新移民健康管理弱勢的主要原因。","B":"性別因素非主要原因。","C":"正確。新移民自我健康管理的弱勢主要與文化隔閡有關。","D":"種族因素非主要原因(主要是文化語言隔閡)。"},"sources":["社區衛生護理學(新文京/華杏)·新住民照護"]}},"106030-N5-68":{"quick":"協助弱勢爭取健康服務、傳達需求、促成政策擬定＝倡議者(advocate)。","detail":{"background":"社區護理師「協助弱勢族群「爭取應有的健康服務」、在適當時機「傳達其需求」、進而「促成健康政策的擬定」」——此角色為(A)『「倡議者/代言者(advocate;為弱勢發聲、爭取權益、影響政策)」』。個案管理者是協調個案的服務;協調者是協調各方;照護提供者是直接提供照護。本題核心是「為弱勢爭取權益、促成政策」，故為倡議者。故 A 正確。為弱勢爭取權益、促成政策是倡議者(代言者)的角色。","options":{"A":"正確。為弱勢爭取健康服務、促成政策，是倡議者(代言者)。","B":"個案管理者是協調個案的服務。","C":"協調者是協調各方。","D":"照護提供者是直接提供照護。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"106030-N5-69":{"quick":"在遊民庇護所及貧民區促成醫療診所設置＝提高健康照護的可近性。","detail":{"background":"社區護理師「在遊民庇護所及貧民住宅區「促成醫療診所的設置」」——是(D)『「提高健康照護的「可近性(accessibility;在弱勢者「居住/聚集處「就近」設置醫療服務」，使其「容易取得」照護)」』的個案管理策略。可負擔性是費用;自我網絡是社會支持;社會互助是相互幫助。「就近設置診所(方便取得)」屬提高可近性。故 D 正確。在弱勢者聚集處就近設診所是提高健康照護的可近性。","options":{"A":"提高可負擔性是降低費用負擔。","B":"發展自我網絡是建立社會支持。","C":"提供社會互助是相互幫助。","D":"正確。就近設置診所提高健康照護的可近性。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"106030-N5-73":{"quick":"易感性群體形成中，屬「個人生物(biological)」因子者＝基因缺陷。","detail":{"background":"易感性群體的形成是多因子交互作用的結果，其中屬「個人「生物(biological)」因子」的是(A)『「基因缺陷(遺傳、生理上的脆弱性)」』。單親家庭、社會支持是「「社會」因子」;貧窮是「「社經」因子」。「基因缺陷」屬個人的生物(生理)因子。故 A 正確。基因缺陷是個人生物因子;單親、社會支持、貧窮是社會/社經因子。","options":{"A":"正確。基因缺陷屬個人生物(biological)因子。","B":"單親家庭是社會因子。","C":"社會支持是社會因子。","D":"貧窮是社經因子。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"106110-N5-48":{"quick":"造成家庭暴力的「社會」因素＝工作壓力①、家庭管教方式②、媒體學習③(醫療制度④非)。","detail":{"background":"造成家庭暴力與虐待的「社會」因素包括:(1)工作壓力(社會經濟壓力)、(2)家庭管教方式(暴力管教的代間傳遞)、(3)媒體學習(暴力行為的觀察學習/模仿)。而(4)『醫療制度』「不是」造成家暴的社會因素。故正確為①②③(選 A)。家暴的社會因素含壓力、管教方式、暴力的學習與傳遞。","options":{"A":"正確。工作壓力①、家庭管教方式②、媒體學習③。","B":"124：含④(醫療制度)，非家暴的社會因素。","C":"134：含④，錯誤。","D":"234：含④、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"106110-N5-53":{"quick":"確認照顧者執行胃造口換藥的能力＝請吳太太實際操作換藥過程(回覆示教)。","detail":{"background":"要「確認吳太太「執行胃造口換藥的「能力」」」，最能確認的方式是(D)『「請吳太太「實際操作」換藥過程(回覆示教 return demonstration;直接觀察其操作，才能確認其「是否真的會、做得正確」)」』。其他無法確認其「操作能力」:A 詢問每日換藥次數(只問頻率);B 觀察吳先生傷口情形(看結果，非看操作);C 評估敷料儲存數量(看物資)。確認「技能」須請其「實際操作」。故 D 正確。確認照顧技能須請照顧者實際操作(回覆示教)。","options":{"A":"詢問換藥次數只問頻率，無法確認操作能力。","B":"觀察傷口是看結果，非看操作。","C":"評估敷料數量是看物資，非看操作。","D":"正確。請吳太太實際操作換藥(回覆示教)，最能確認其能力。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"106110-N5-54":{"quick":"家庭護理過程的順序＝資料收集②→確認問題③→決定優先順序⑥→共同設目標④→動員資源解決問題①→評估成效⑤。","detail":{"background":"家庭護理過程步驟的正確順序是(B)『「資料收集② → 確認家庭及個人健康問題③ → 決定優先順序⑥ → 與家庭共同設立照護目標④ → 動員資源解決問題① → 評估執行成效⑤」(234615)』——這對應護理過程:評估(收集資料)→診斷(確認問題、排優先序)→計畫(設目標)→執行(動員資源解決)→評值(評估成效)。故正確順序為234615(選 B)。","options":{"A":"123465：順序錯誤。","B":"正確。資料收集②→確認問題③→決定優先序⑥→設目標④→動員資源①→評估成效⑤。","C":"324165：順序錯誤(資料收集應在最前)。","D":"412365：順序錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"106110-N5-75":{"quick":"慢性病危險群個案管理「最優先且重要」者＝運用篩檢與檢查發現個案。","detail":{"background":"慢性病危險群的個案管理中，「最優先且重要」的是(C)『「運用「篩檢與檢查「發現個案」」(「先「找出」高危險群/個案」，才能進行後續的管理、追蹤、治療)」』。追蹤治療、提升認知、早期治療都是「「發現個案「之後」」的工作。個案管理的第一步是「發現個案」。故 C 正確。個案管理最優先是先發現個案(篩檢、檢查)。","options":{"A":"追蹤檢查與治療是發現個案後的工作。","B":"提升疾病認知是發現個案後的衛教。","C":"正確。運用篩檢與檢查發現個案，是最優先且重要的。","D":"早期治療是發現個案後的工作。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"106110-N5-76":{"quick":"為弱勢爭取服務、促成立法＝倡議代言者。","detail":{"background":"社區護理師「為弱勢個案族群「爭取所需服務」、「促成相關政策之立法」」——屬(A)『「倡議代言者(advocate;為弱勢發聲、爭取權益、影響政策立法)」』的角色。溝通協調者是協調各方;個案管理者是協調個案的服務;策略發展者是發展策略。本題核心是「爭取權益、促成立法」，故為倡議代言者。故 A 正確(與前述同類題一致)。","options":{"A":"正確。為弱勢爭取服務、促成立法，是倡議代言者。","B":"溝通協調者是協調各方。","C":"個案管理者是協調個案的服務。","D":"策略發展者是發展策略。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"106111-N5-7":{"quick":"家庭生態圖(ecomap)最主要提供＝了解次系統與家庭問題及功能的關係。","detail":{"background":"護理師進行家庭評估時，家庭生態圖(ecomap)最主要為提供(D)『「了解「(外部)次系統」與家庭問題及功能的「關係」(生態圖呈現「家庭與「外部系統(學校、醫療、社福、親友、工作)」的「連結、資源往來、關係品質」」，了解外部系統如何影響家庭的問題與功能)」』。家庭發展模式、解決問題的影響因素、家人健康狀況非生態圖的主要訊息。生態圖呈現家庭與外部次系統的關係。故 D 正確。生態圖了解家庭與外部次系統的連結及對家庭功能的影響。","options":{"A":"家庭發展模式由家庭發展史了解。","B":"解決問題的影響因素非生態圖的主要訊息。","C":"家人健康狀況由家系圖了解。","D":"正確。生態圖了解次系統與家庭問題及功能的關係。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"106111-N5-34":{"quick":"復健病房個案管理的核心工作＝需正確評值個案接受治療或住院的必要性。","detail":{"background":"護理師於復健病房擔任個案管理，正確的是(D)『「需「正確評值個案接受治療或住院的「必要性」」(個案管理者須評估治療/住院是否「必要、適當、符合成本效益」，以「合理運用資源」)』。其他錯誤:A『透過轉介即可、「不需主動發現個案」』錯誤(個案管理「應主動發現個案」);B『個案的居住安全與權利保護「不是個管師的工作」』錯誤(維護個案的安全與權益「是」個管的工作);C『成本效益評估「不在個管的服務範圍」』錯誤(成本效益評估「是」個管的重要範圍)。故 D 正確。個案管理須評值治療/住院的必要性、合理運用資源。","options":{"A":"個案管理應主動發現個案，非僅靠轉介。","B":"維護個案的居住安全與權利是個管的工作。","C":"成本效益評估是個管的重要範圍。","D":"正確。需正確評值個案接受治療或住院的必要性。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"106111-N5-39":{"quick":"家庭暴力：大多受害者雖是女性，但男性也會受害。","detail":{"background":"家庭暴力的正確敘述是(A)『「家庭暴力大多受害者雖是「女性」，但「男性也會受害」(家暴的受害者「不限性別」)」』。其他錯誤:B『成因「皆為單一因素」』錯誤(家暴是「「多因子(個人、家庭、社會)」交互作用」);C『施暴者「沒有能力改變或控制」暴力行為』錯誤(施暴者「「可以」透過治療/輔導「改變」);D『施暴者「多為精神病人」』錯誤(施暴者「「不一定」是精神病人」;這是污名化的迷思)。故 A 正確。家暴受害者不限性別，男性也會受害。","options":{"A":"正確。家暴大多受害者是女性，但男性也會受害。","B":"家暴的成因是多因子，非單一因素。","C":"施暴者可透過治療/輔導改變，非沒有能力改變。","D":"施暴者不一定是精神病人(污名化迷思)。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"106111-N5-70":{"quick":"Friedman(1981)「家庭」的廣義定義＝由兩個或更多的人組成，情緒互相影響。","detail":{"background":"依 Friedman(1981)的「家庭」「廣義」定義，正確的是(B)『「由「兩個或更多的人」所組成，「情緒互相影響(彼此有情感連結與互動)」」』——廣義的家庭「「不限於婚姻、血緣、法律關係」」，只要「彼此認定為家人、情緒互相影響、相互支持」即可(如同居、自組的家庭)。其他(A 經婚姻血緣認養、C 一起生活、D 依社會角色互動)是較「狹義/傳統」的定義要素。故 B 正確。Friedman 的廣義家庭定義不限血緣婚姻，重在情感連結與互相影響。","options":{"A":"「經婚姻、血緣或認養」是較狹義的定義。","B":"正確。由兩個或更多的人組成、情緒互相影響(廣義)。","C":"「一起生活」是較傳統的定義要素。","D":"「依社會角色互動」是較傳統的定義要素。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"107030-N5-36":{"quick":"協助連結社區相關資源＝個案管理者。","detail":{"background":"護理師「協助陳小姐「連結社區相關資源」」——最主要發揮(D)『「個案管理者(case manager;評估個案需求、「連結、協調各項資源與服務」，提供整合性照護)」』角色。直接照顧者是親自提供照護;疾病預防者是預防疾病;教育諮詢者是衛教諮詢。本題核心是「連結社區資源」，故為個案管理者。故 D 正確。連結、協調資源是個案管理者的角色。","options":{"A":"直接照顧者是親自提供照護。","B":"疾病預防者是預防疾病。","C":"教育諮詢者是提供衛教諮詢。","D":"正確。協助連結社區資源，是個案管理者。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"107030-N5-69":{"quick":"蔡家(10位成員)的家庭關係複雜數＝n(n−1)÷2＝10×9÷2＝45。","detail":{"background":"家庭關係複雜數(成員間兩兩關係的總數)＝「n(n−1)÷2」(n＝家庭成員數)。蔡家成員:蔡太太、先生、先生的父母(2)、阿公與阿嬤(2)、兩對雙胞胎(4)——共「2＋2＋2＋4＝10」人。關係複雜數＝10×(10−1)÷2 ＝10×9÷2 ＝45。故 C 正確。家庭關係複雜數＝n(n−1)/2;10人→45。","options":{"A":"28是8人的關係數(8×7/2)，本題10人。","B":"36是9人的關係數，本題10人。","C":"正確。10人→10×9÷2＝45。","D":"56非正確計算。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"107030-N5-70":{"quick":"APGAR 的「適應度(adaptation)」＝家庭面臨困難時對內外資源的運用情形。","detail":{"background":"APGAR 家庭功能評估表中，「家庭在發生問題或面臨困難時，家庭成員對於「內在資源或外在資源的「運用」」情形」——是了解(A)『「適應度(Adaptation;家庭運用資源「因應、解決」問題的能力)」』。合作度(Partnership)是共同決策與分擔;融洽度(Resolve)是相處時間與情感分享。(APGAR＝Adaptation、Partnership、Growth、Affection、Resolve。)「運用資源因應困難」屬適應度。故 A 正確。","options":{"A":"正確。面臨困難時運用內外資源的情形，是適應度(Adaptation)。","B":"合作度(Partnership)是共同決策與分擔問題。","C":"融洽度(Resolve)是相處時間與情感分享。","D":"「領域度」非 APGAR 的項目。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"107030-N5-73":{"quick":"擬訂家庭護理目標順序的主要依據＝家庭本身感受問題的緊急性。","detail":{"background":"社區護理師擬訂家庭護理目標的順序時，「主要依據」是(B)『「「家庭本身」感受問題的「緊急性」(以「案家「自己」認為「最緊急、最需要」的問題」優先處理，符合以案家為中心、賦權的原則)」』。政府福利政策、社區資源可近性、家庭本身的資源是「考量因素」，但「排序的主要依據」是「家庭自己感受的緊急性」。故 B 正確。家庭護理目標排序以家庭自身感受的緊急性為主要依據。","options":{"A":"政府福利政策是考量因素，非主要依據。","B":"正確。以家庭本身感受問題的緊急性為主要依據。","C":"社區資源可近性是考量因素。","D":"家庭本身的資源是考量因素。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"107030-N5-78":{"quick":"適合列為個案管理對象者＝高醫療費用病人①、重複住院病人③、換肝手術病人⑤。","detail":{"background":"適合列為「個案管理」對象的是:(1)「高醫療費用病人(資源耗用大、須管理)」;(3)「重複住院病人(反覆住院、須協調預防再住院)」;(5)「換肝手術病人(「複雜、高風險、長期照護需求」)」。而(2)自然產產婦、(4)子宮肌瘤手術病人是「「單純、可預期、短期」的照護」，不需個案管理。故正確為①③⑤(選 D)。個案管理對象是「複雜、高費用、高風險、反覆住院」者。","options":{"A":"123：含②(自然產產婦，單純)，非個管對象。","B":"234：含②④(單純照護)，錯誤。","C":"345：含④(子宮肌瘤手術，單純)，錯誤。","D":"正確。高醫療費用①、重複住院③、換肝手術⑤(複雜高風險)。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"107110-N5-55":{"quick":"「不是」家庭增能(family empowerment)的表現者＝家庭能遵從護理師的指引。","detail":{"background":"家庭增能(family empowerment)的表現，「不是」者為(D)『「家庭能「遵從」護理師的指引」』——「「遵從(被動服從)」與增能(自主、有能力)的方向「相反」」(增能是「家庭「自主、有能力」處理問題」，而非「被動遵從專業人員」)。其他屬於增能的表現:A 家庭可獲得所需要的資源;B 家庭解決健康問題的能力增加;C 家庭對未來懷抱希望。故本題選不是者為 D。增能是家庭自主，而非被動遵從(與前述同類題一致)。","options":{"A":"家庭可獲得所需資源，是增能的表現。","B":"家庭解決健康問題的能力增加，是增能的表現。","C":"家庭對未來懷抱希望，是增能的表現。","D":"正確(本題選不是者)。「遵從指引」是被動，與增能(自主)的方向相反。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"107110-N5-67":{"quick":"社區護理師的代言人(advocate)角色＝於適當時機傳達案家的健康需求。","detail":{"background":"社區護理師扮演「代言人(advocate)」角色，最適當的是(A)『「於適當時機「傳達案家的健康需求」(為案家「發聲」、向相關單位反映其需求、爭取權益)」』。其他選項是別的角色:B 與團隊合作解決問題(協調者);C 依個別需要給予護理指導(教育者);D 進入案家促使其改變(改變促成者)。本題核心是「為案家傳達需求(發聲)」，故為代言人。故 A 正確。代言人是為案家發聲、傳達其需求。","options":{"A":"正確。於適當時機傳達案家的健康需求，是代言人角色。","B":"與團隊合作解決問題是協調者角色。","C":"依個別需要給予護理指導是教育者角色。","D":"促使案家改變是改變促成者角色。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"107110-N5-68":{"quick":"家族網(kin network)的特徵＝核心家庭或未婚者居住於附近，彼此交流物資及服務。","detail":{"background":"符合「家族網(kin network)」特徵的是(A)『「「核心家庭或未婚者「居住於附近」」，「彼此交流物資及服務(互相支援)」(家族成員雖各自獨立成戶，但「住在附近、緊密往來、相互幫助」)」』。其他是別的家庭型態:B 是「重組(繼親)家庭」;C 是「共親職(共同監護)家庭」;D 是「同居家庭」。「住附近、互通有無的家族」是家族網。故 A 正確。家族網是住在附近、彼此交流支援的家族成員網絡。","options":{"A":"正確。核心家庭或未婚者住附近、彼此交流物資服務，是家族網。","B":"再婚帶子女組成的是重組(繼親)家庭。","C":"共同監護權、孩子屬兩個核心家庭的是共親職家庭。","D":"未婚夫婦和孩子同住、無婚姻契約的是同居家庭。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"107110-N5-69":{"quick":"家庭圈(family circle)最適合呈現家庭成員的「權力」關係。","detail":{"background":"家庭圈(family circle)最適合呈現家庭成員的(D)『「「權力」(及親疏)關係(以「圓圈的「大小」代表成員的「權力/重要性」」、圓圈的「距離/重疊」代表親疏)」』。社會、資源、調適非家庭圈呈現的主要關係。家庭圈以圓的大小呈現權力。故 D 正確(與前述同類題一致)。家庭圈以圓圈大小呈現成員的權力。","options":{"A":"社會關係非家庭圈呈現的主要內容。","B":"資源連結由生態圖呈現。","C":"調適非家庭圈呈現的主要關係。","D":"正確。家庭圈最適合呈現家庭成員的權力(及親疏)關係。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"107110-N5-70":{"quick":"APGAR 詢問是否滿意家人「討論事情及分擔問題」的方式＝合作度(Partnership)。","detail":{"background":"利用 APGAR 評估表，詢問個案「是否滿意於「家人和其「討論事情及分擔問題」」的方式」——主要是了解(B)『「P/合作度(Partnership;家庭成員「共同溝通、決策、分擔」問題的程度)」』。適應度是運用資源因應;成長度是支持彼此的成長;融洽度是相處時間與情感。「討論事情、分擔問題」屬合作度。故 B 正確。APGAR 的合作度是共同討論、決策、分擔問題。","options":{"A":"適應度(A)是運用資源因應困難。","B":"正確。討論事情、分擔問題的方式，是合作度(Partnership)。","C":"成長度(G)是支持彼此的成長與成熟。","D":"融洽度(R)是相處時間與情感分享。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"108110-N5-33":{"quick":"社區復健的個案管理措施＝個別化且持續性的照顧計畫。","detail":{"background":"安排病人參與社區復健活動，護理師執行的個案管理措施，正確的是(B)『「「個別化」且「持續性」的照顧計畫(依個案的「個別需求」量身規劃，並「持續追蹤、調整」)』。其他錯誤:A『「每位病人皆應」回歸社區』太絕對(須依個案狀況評估);C『協助家屬「終其一生」照顧病人』錯誤(應「增進個案自主、減輕家屬負擔」，非要家屬終生照顧);D『「靈性照顧並不在」復健計畫範圍』錯誤(復健是「全人(含身心靈)照顧」)。故 B 正確。個案管理提供個別化、持續性的照顧計畫。","options":{"A":"須依個案狀況評估，非「每位皆應」回歸社區。","B":"正確。個別化且持續性的照顧計畫。","C":"應增進個案自主、減輕家屬負擔，非要家屬終生照顧。","D":"復健是全人照顧，含靈性照顧。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"108110-N5-39":{"quick":"家庭暴力的治療性措施：當懷疑病人受暴時，護理師首要應確定病人的安全及隱私。","detail":{"background":"針對家庭暴力，護理師的治療性措施，正確的是(C)『「當懷疑病人受暴時，護理師「首要應「確定病人的安全及隱私」」(在「安全、私密」的環境下評估、會談，保護受害者)』。其他錯誤:A『「長期」治療目標是「警覺和治療被傷害的病人」』不精確(警覺與治療是「即時」的處置，長期目標是「預防再受暴、協助復原」);B『護理師「只需執行特別評估」、保護證據是「法警」的任務』錯誤(護理師「也須協助保全證據、完整紀錄」);D『「並無明確法律規定」健康照護者須報告受暴事件』錯誤(「家暴/兒少保護是「「法定責任通報」」」)。故 C 正確。懷疑受暴時，首要確保病人的安全及隱私。","options":{"A":"長期目標是預防再受暴、協助復原，非僅警覺與治療。","B":"護理師也須協助保全證據、完整紀錄。","C":"正確。懷疑受暴時，首要確定病人的安全及隱私。","D":"家暴/兒少保護是法定責任通報，非無法律規定。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"108110-N5-51":{"quick":"王先生與張女士同居、領養男孩的家系圖＝圖B(虛線連同居+虛線連領養子女)。","detail":{"background":"王先生與張女士「「同居」三年、「領養」一個三歲小男孩」——符合的家系圖是(B)『「圖B」：王先生(方)與張女士(圓)以「「虛線」相連(代表「同居」)」，並以「「虛線」連接小男孩(代表「領養」)」』。對照其他圖:有「實線(婚姻)」或「斜線(離婚)」或「實線連子女(親生)」者皆不符。圖B 以「虛線同居＋虛線領養」最符合此情境。故 B 正確。家系圖:虛線＝同居/領養;實線＝婚姻/親生。","options":{"A":"圖A 的符號不符(非虛線同居+虛線領養)。","B":"正確。圖B：虛線連同居、虛線連領養子女，符合情境。","C":"圖C 含斜線(離婚)或實線(親生)，不符。","D":"圖D 的結構不符同居+領養的情境。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"108110-N5-56":{"quick":"代謝症候群防治的「初段預防」＝控制體重。","detail":{"background":"代謝症候群防治策略中，屬「初段(第一段)預防」的是(A)『「控制體重(透過飲食、運動「控制體重、改善生活型態」，在「疾病發生前」預防代謝症候群＝健康促進/特殊保護)」』。疾病篩檢是「早期診斷(第二段)」;個案管理追蹤、轉介就醫是「對「已發病者」的處置(第二/三段)」。「控制體重(健康促進)」屬初段預防。故 A 正確。控制體重(改善生活型態)屬初段預防。","options":{"A":"正確。控制體重(改善生活型態)屬初段預防。","B":"疾病篩檢屬早期診斷(第二段)。","C":"個案管理追蹤是對已發病者的處置。","D":"轉介就醫是對已發病者的處置。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"108110-N5-71":{"quick":"家庭成員「擴散期」的敘述「錯誤」者＝孩子各自成家立業的階段。","detail":{"background":"家庭成員「擴散(擴展)期」的敘述，「錯誤」者為(A)『「孩子「各自成家立業」的階段」』——「孩子各自成家立業、離家」是「「收縮(緊縮)期」」，而非「擴散(擴展)期」。「擴散期」是「家庭「成員增加、子女成長(學齡、青少年)」」的階段。其他正確(屬擴散期):B 父母須建立自己的興趣和事業;C 包含有學齡兒童及青少年的家庭;D 家庭要開始關心(逐漸衰退的)祖父母。故本題選錯誤者為 A。孩子各自成家立業是收縮期，非擴散期。","options":{"A":"正確(本題選錯誤者)。孩子各自成家立業是收縮期，非擴散期。","B":"父母建立自己的興趣和事業，屬擴散期。","C":"包含學齡兒童及青少年的家庭，屬擴散期。","D":"家庭開始關心衰退的祖父母，屬擴散期。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"108110-N5-74":{"quick":"2025衛福政策白皮書「健全社會安全及弱勢照顧」做法「錯誤」者＝強化國際交流服務。","detail":{"background":"2025衛生福利政策白皮書中，「健全社會安全及綿密弱勢照顧體系」的做法，「錯誤」者為(D)『「強化「國際交流服務」」』——「國際交流」與「「弱勢照顧體系」無直接關係」(屬國際參與的面向，非弱勢照顧)。其他屬於弱勢照顧的做法:A 發展積極性社會救助;B 建構社區互助網絡;C 完備急難救助機制。故本題選錯誤者為 D。弱勢照顧著重社會救助、社區互助、急難救助，非國際交流。","options":{"A":"發展積極性社會救助，是弱勢照顧的做法。","B":"建構社區互助網絡，是弱勢照顧的做法。","C":"完備急難救助機制，是弱勢照顧的做法。","D":"正確(本題選錯誤者)。國際交流與弱勢照顧體系無直接關係。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"109030-N5-66":{"quick":"飯後兩小時血糖210 mg/dL：應解釋「血糖過高、需就醫進一步檢查」。","detail":{"background":"張先生飯後兩小時血糖「210 mg/dL」(「過高」;正常飯後兩小時應<140，糖尿病診斷標準飯後兩小時≧200)——王護理師最合宜的解釋是(C)『「目前血糖「過高」，「需就醫進一步檢查(確診糖尿病、評估治療)」』。其他錯誤:A、B『血糖控制在「正常範圍」』錯誤(210 是過高，非正常);D『「只要少吃甜食即可」』過於簡化(血糖過高須就醫確診與完整處置，非僅少吃甜食)。故 C 正確。飯後血糖210過高，應就醫進一步檢查。","options":{"A":"210是過高，非正常範圍。","B":"210是過高，非正常範圍。","C":"正確。血糖過高，需就醫進一步檢查。","D":"血糖過高須就醫完整處置，非僅少吃甜食。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"109030-N5-67":{"quick":"了解張太太子宮頸癌追蹤情形：另外找時間當面或電話了解張太太「本人」的結果。","detail":{"background":"王護理師要了解張太太(子宮頸癌篩檢陽性)的追蹤檢查情形，最合宜的處置是(A)『「另外找時間「當面或用電話「了解張太太「本人」」」的追蹤檢查結果(尊重「隱私」、由「本人」提供其健康資訊)』。其他不當:B『詢問「張先生」張太太的結果』、D『請張先生「轉達」、請張太太回報』——「透過配偶轉達/詢問，「侵犯張太太的隱私」(健康資訊應向本人了解);C『了解張先生是否給予心理支持』偏離(本題是要了解張太太的追蹤結果)。故 A 正確。應向張太太本人了解其追蹤結果(尊重隱私)。","options":{"A":"正確。另找時間當面或電話了解張太太本人的追蹤結果。","B":"詢問張先生侵犯張太太的隱私。","C":"了解張先生是否支持偏離了「追蹤結果」的目的。","D":"透過張先生轉達侵犯隱私，應向本人了解。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"109030-N5-72":{"quick":"學校糖尿病個案管理＝了解用藥①、(經同意)向同學進行疾病教育②、指導高低血糖處理④、備妥緊急用品⑤(減少體育課時數③非，糖尿病學生應正常運動)。","detail":{"background":"學校護理師對糖尿病學生進行個案管理的重點:(1)了解學生的用藥資料;(3)協調體育(活動)的安排(留意運動中的低血糖);(4)指導高、低血糖的處理方法;(5)經醫囑備妥緊急用品(如升糖食物、升糖素)。而(2)『「針對班上同學進行疾病教育」』不當——「向「全班」公開個案的疾病「侵犯其隱私、易標籤化」」。故正確為①③④⑤(選 D)。糖尿病學生的照護以了解用藥、處理高低血糖、備緊急用品為主，不可洩漏隱私。","options":{"A":"1234：含③(減少體育課時數，錯誤;糖尿病學生應維持規律運動)。","B":"1235：含③，錯誤。","C":"正確。了解用藥①、向同學疾病教育②、指導高低血糖處理④、備妥緊急用品⑤。","D":"1345：含③(減少體育課，錯誤)，且缺②。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"109110-N5-33":{"quick":"促進慢性病人與家屬的溝通：護理師應教導家屬如何照顧社區生活的病人。","detail":{"background":"為促進社區慢性病人與家屬的溝通，護理師應扮演(C)『「教導家屬「如何照顧」社區生活的病人(提供知識與技巧，促進家屬的理解與照顧能力，改善病人與家屬的關係)」』角色。其他不當:A『組織病人自助團體「與家屬抗衡」』錯誤(製造對立);B『「指責家屬」』錯誤(指責無助溝通);D『「通報警察」』偏離(非家暴等須通報的情況)。故 C 正確。促進病人與家屬溝通，宜教導家屬照顧知能。","options":{"A":"組織自助團體「與家屬抗衡」是製造對立。","B":"指責家屬無助於溝通。","C":"正確。教導家屬如何照顧社區生活的病人。","D":"通報警察偏離(非家暴等須通報的情況)。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"109110-N5-35":{"quick":"協助病人返家居住的家庭評估＝需評估此家庭對個案的態度。","detail":{"background":"林護理師協助病人返家居住，進行家庭評估，最適當的是(A)『「需「評估此家庭對個案的「態度」」(家庭是否「接納、願意、有能力」照顧返家的病人，是返家成功的關鍵)」』。其他錯誤:B『「不需」了解家庭成員的健康狀態』錯誤(須了解，以評估照顧能力);C『需「滿足」此家庭的「經濟需求」』過度(護理師協助連結資源，非「滿足」其經濟需求);D『讓「每位」家屬皆能接受病人返家』過於理想(難以要求每位都接受;尊重評估)。故 A 正確。協助病人返家須評估家庭對個案的態度與照顧能力。","options":{"A":"正確。需評估此家庭對個案的態度。","B":"須了解家庭成員的健康狀態以評估照顧能力。","C":"護理師協助連結資源，非「滿足」其經濟需求。","D":"難以要求每位家屬皆接受，過於理想。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"109110-N5-52":{"quick":"Friedman 家庭內在結構的基本要素＝溝通過程③、價值系統④(發展結構①、功能結構②非)。","detail":{"background":"依 Friedman，「家庭「內在結構」」的基本要素是:(3)「溝通過程(溝通型態)」、(4)「價值系統(價值體系)」，以及「角色結構、權力結構」。而(1)『發展結構』、(2)『功能結構』「不是「內在結構」的要素」(發展是「家庭發展階段」;功能是「家庭功能」，與「內在結構」不同)。故正確為③④(選 D)。Friedman 家庭內在結構＝角色、溝通、權力、價值(與前述同類題一致)。","options":{"A":"12：①②非內在結構的要素。","B":"14：含①(發展結構)，錯誤。","C":"23：含②(功能結構)，錯誤。","D":"正確。溝通過程③、價值系統④(屬內在結構)。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"109110-N5-61":{"quick":"收案建卡、擬訂護理計畫、提供服務和指導＝個案管理者(case manager)。","detail":{"background":"社區護理師「將有健康問題的家庭「收案並建卡」，依擬訂的護理計畫「提供護理服務和指導」」——這是(D)『「個案管理者(case manager;對個案/家庭進行「收案、評估、擬計畫、提供與協調服務、追蹤」的整合性管理)」』角色。代言人是為個案發聲;諮商者是提供諮詢;監督者是監督。「收案、擬計畫、提供服務」屬個案管理者。故 D 正確。收案、擬計畫、提供服務是個案管理者的角色。","options":{"A":"代言人是為個案發聲、爭取權益。","B":"諮商者是提供諮詢。","C":"監督者是進行監督。","D":"正確。收案建卡、擬計畫、提供服務，是個案管理者。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"109110-N5-62":{"quick":"卡加立家庭評估模式的「家庭內在結構」評估項目「錯誤」者＝家庭發展階段。","detail":{"background":"卡加立家庭評估模式(Calgary family assessment model)中，「家庭「內在結構」」的評估項目，「錯誤」者為(D)『「家庭「發展階段」」』——「發展階段」屬「「發展(developmental)」結構」，「不是「「內在」結構」」。內在結構的評估項目:A 家庭界限、B 家庭組成、C 家庭次系統(以及性別、權力、排行等)。故本題選錯誤者為 D。家庭發展階段屬發展面向，非內在結構。","options":{"A":"家庭界限是內在結構的評估項目。","B":"家庭組成是內在結構的評估項目。","C":"家庭次系統是內在結構的評估項目。","D":"正確(本題選錯誤者)。家庭發展階段屬發展結構，非內在結構。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"110030-N5-63":{"quick":"成年子女住附近、彼此採買送湯、相互支援＝家族網(kin network)。","detail":{"background":"王家夫婦的子女(長子已婚育子、次子未婚)「住在附近」，「彼此採買、送湯、相互幫助」——屬(D)『「家族網(kin network;核心家庭/未婚成員「各自獨立成戶、住在附近」，「彼此緊密往來、交流物資與服務」)」』。三代家庭是「三代同住一戶」;重組核心家庭是再婚家庭;公社家庭是非親屬共居。「各自成戶、住附近、相互支援」是家族網。故 D 正確(與前述同類題一致)。","options":{"A":"三代家庭是三代同住一戶。","B":"重組核心家庭是再婚組成的家庭。","C":"公社家庭是非親屬共居。","D":"正確。子女住附近、相互支援，是家族網。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"110030-N5-64":{"quick":"護理契約：使家庭正式參與護理過程①、可隨案家情況重新談判③、與能負責的適當成員簽訂④(由護理師訂目標分派任務②錯)。","detail":{"background":"家庭訪視訂定護理契約的正確敘述:(1)「目的主要是「使家庭「正式參與」護理過程」(增進其投入與責任)」;(3)「護理契約是「持續進行、可隨案家情況「重新談判」的工作協議」(具彈性)」;(4)「須與家庭中「能負責和適當的成員」簽訂契約」。而(2)『達成協議後，社區護理師「(自行)為個案和案家訂定目標和分派任務」』錯誤——目標與任務應「「由護理師「與」案家「共同」訂定」」，而非「護理師「自行」訂定、分派」。故正確為①③④(選 C)。","options":{"A":"123：含②(護理師自行訂目標，應為共同訂定)，錯誤。","B":"124：含②，錯誤。","C":"正確。使家庭正式參與①、可重新談判③、與適當成員簽訂④。","D":"234：含②、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"110030-N5-65":{"quick":"家庭護理措施的原則「不適當」者＝為家庭規劃所有照護計畫。","detail":{"background":"家庭護理措施的原則，「不適當」者為(C)『「「為」家庭「規劃「所有」照護計畫」』——錯誤，照護計畫應「「與「家庭「共同」規劃」(賦權、尊重家庭的參與與自主)」，而非「「替」家庭規劃「所有」計畫」(會造成依賴、不符賦權)。其他適當:A 運用護理過程提供服務;B 提升家庭對於社區的參與;D 運用及開發家庭內外資源。故本題選不適當者為 C。照護計畫應與家庭共同規劃，而非替家庭全規劃(與前述同類題一致)。","options":{"A":"運用護理過程提供服務，適當。","B":"提升家庭對社區的參與，適當。","C":"正確(本題選不適當者)。應與家庭共同規劃，非替家庭規劃所有計畫。","D":"運用及開發家庭內外資源，適當。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"110110-N5-51":{"quick":"評估社區民眾教育程度的主要理由＝可做為社區民眾健康指導的依據。","detail":{"background":"社區健康評估時，評估民眾「教育程度」的主要理由是(A)『「可做為「社區民眾「健康指導(衛教)」的依據」(教育程度影響其「理解、吸收健康資訊的能力」，據以「調整衛教的內容、方式與難易)」』。社會福利補助、疾病發生、醫療設備不是「教育程度」最主要的評估理由。教育程度主要供「調整健康指導」之用。故 A 正確(與前述同類題一致)。","options":{"A":"正確。評估教育程度是為了做為健康指導(衛教)的依據。","B":"社會福利補助由弱勢狀況評估。","C":"疾病發生由流行病學評估。","D":"醫療設備由社區資源評估。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"110110-N5-62":{"quick":"家庭內在資源的「軟體結構支持」＝太太出國、先生在國內身兼母職處理家務及照顧子女。","detail":{"background":"家庭內在資源中的「軟體(structure)支持」是指「家庭成員「角色功能的「調整、替代」」(以「人」的角色彈性來支持家庭)」——(B)『「太太出國工作，先生在國內「身兼母職」、處理家務和照顧子女(成員「角色彈性調整」以維持家庭功能)」』。其他:A 裝設扶手、緊急鈴是「「硬體」(物理設施)」;C 社福機構提供物質設備、D 衛生所家訪是「「外部」資源」(非家庭「內在」資源)。故 B 正確。軟體結構支持是家庭成員角色功能的彈性調整。","options":{"A":"裝設扶手、緊急鈴是硬體(物理設施)支持。","B":"正確。先生身兼母職(角色彈性調整)，是軟體結構支持。","C":"社福機構提供物質設備是外部資源。","D":"衛生所家訪是外部資源。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"110110-N5-63":{"quick":"護理師順利執行家庭護理的「最重要」基本原則＝建立信賴關係。","detail":{"background":"社區護理師能順利執行家庭護理措施，「最重要」的基本原則是(A)『「「建立信賴關係」(取得家庭的「信任」，是後續一切評估、介入、合作的「基礎」;沒有信任，家庭不會配合)」』。提升改變動機、了解家庭資源、運用適切的護理措施都「須建立在「信任關係」之上」。故 A 正確。建立信賴關係是執行家庭護理的最重要基礎。","options":{"A":"正確。建立信賴關係是執行家庭護理的最重要基礎。","B":"提升改變動機須建立在信任關係之上。","C":"了解家庭資源須先建立信任。","D":"運用適切的護理措施須先建立信任。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"110110-N5-64":{"quick":"依 Duvall 家庭發展階段進行家庭評估的主要目的＝了解家庭現階段的保健事項及發展任務。","detail":{"background":"依 Duvall 的家庭發展階段理論進行家庭評估，主要目的是(A)『「了解家庭「現階段的「保健事項及發展任務」」(每個發展階段有其特定的「發展任務與健康需求」，據以提供「切合該階段」的保健指導)」』。健康公共設施資源、事業發展狀況、對疾病發展的評價非 Duvall 理論評估的主要目的。Duvall 的理論用於了解各階段的發展任務與保健重點。故 A 正確。","options":{"A":"正確。了解家庭現階段的保健事項及發展任務。","B":"公共設施資源非 Duvall 理論評估的目的。","C":"事業發展狀況非家庭發展理論的評估目的。","D":"對疾病發展的評價非此理論的目的。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"111030-N5-34":{"quick":"5歲幼兒被父母獨自留在家3天＝疏忽(neglect)。","detail":{"background":"5歲的小欣被「愛上網咖的父母「獨自留在家裡3天」」、只放一瓶水和零食——這是「「疏於提供「適當的照顧、保護、監督」」」，屬(B)『「疏忽(neglect;「未提供兒童「基本的生活照顧、安全、保護」」，如獨留、缺乏照顧)」』。身體虐待是「主動施加的身體傷害」;心理虐待是「言語/精神的傷害」;管教不當是「不當的管教方式」。「獨留無人照顧」屬疏忽。故 B 正確。獨留幼兒、疏於照顧屬疏忽(neglect)。","options":{"A":"身體虐待是主動施加的身體傷害。","B":"正確。獨留幼兒、疏於照顧，屬疏忽(neglect)。","C":"心理虐待是言語/精神的傷害。","D":"管教不當是不當的管教方式。"},"sources":["社區衛生護理學(新文京/華杏)·兒少保護"]}},"111030-N5-42":{"quick":"社區衛生護理的特性＝較高的自主與獨立性①、個案管理時間較長②、服務層面較廣④(限制殘障與復健③非)。","detail":{"background":"社區衛生護理的特性:(1)「有「較高的自主與獨立性」(常獨立家訪、獨立判斷)」;(2)「個案管理的時間「較長」(慢性、長期追蹤)」;(4)「服務層面「較廣」(涵蓋個人、家庭、群體)」。而(3)『工作目標是「限制殘障與復健」』錯誤——社區護理以「「健康促進與疾病預防」」為主要目標，「限制殘障與復健」是「第三段預防(臨床醫療)」的重點，非社區護理的「主要」目標。故正確為①②④(選 B)。","options":{"A":"123：含③(限制殘障與復健，非社區護理的主要目標)，錯誤。","B":"正確。較高自主獨立①、個案管理時間長②、服務層面廣④。","C":"134：含③，錯誤。","D":"234：含③、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"111030-N5-62":{"quick":"父母憂心仍支持孩子成為無國界醫療人員＝APGAR 的「成長度(growth)」。","detail":{"background":"何小明欲成為無國界醫療人員，「父母雖憂心「仍支持」他(支持其追求成長、發展、自我實現)」——屬 APGAR 家庭功能的(B)『「成長度(Growth;家庭成員「相互支持彼此「成長、成熟、追求發展」」的程度)」』。適應度是運用資源因應困難;情感度是情感的表達與回應;融洽度是相處時間。「支持孩子追求成長/發展」屬成長度。故 B 正確。父母支持孩子追求發展屬 APGAR 的成長度。","options":{"A":"適應度是運用資源因應困難。","B":"正確。父母支持孩子追求發展，是成長度(Growth)。","C":"情感度是情感的表達與回應。","D":"融洽度是相處時間與情感分享。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"111030-N5-64":{"quick":"Duvall 家庭發展階段「正確」者＝最後一個孩子離家至夫妻一人退休＝中年期家庭。","detail":{"background":"依 Duvall 家庭發展階段理論(「以「「第一個(最大)」孩子」的年齡為分期依據;但「中年期」是看「最後一個孩子」離家)」，正確的是(D)『「「最後一個孩子獨立離開家」至「夫妻中有一人退休」，為「中年期家庭(middle-aged family;空巢期)」」』。其他錯誤:A、B、C 的分期應以「「第一個(最大)」孩子」的年齡為依據(如生育期＝「第一個」孩子0~30個月;學齡前＝「第一個」孩子2.5~6歲;青少年＝「第一個」孩子13~20歲)，而非「最後一個」孩子。故 D 正確。Duvall 前段以第一個孩子分期;中年期是最後一個孩子離家至退休(空巢期)。","options":{"A":"生育期應以「第一個」孩子0~30個月為依據，非最後一個。","B":"學齡前期應以「第一個」孩子2.5~6歲為依據。","C":"青少年期應以「第一個」孩子13~20歲為依據。","D":"正確。最後一個孩子離家至夫妻一人退休，為中年期家庭(空巢期)。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"111110-N5-63":{"quick":"APGAR 家庭功能評估「錯誤」者＝成長度是指相處所衍生壓力的調適情形。","detail":{"background":"Smilkstein 的 APGAR 家庭功能評估，「錯誤」者為(C)『「成長度(Growth)是指家庭成員對於彼此相處「所衍生壓力的「調適」情形」」』——錯誤，「成長度」是指「家庭成員「相互「支持彼此的成長、成熟與發展」」」;「「壓力的調適/運用資源因應」是「「適應度(Adaptation)」」」。其他正確:A 融洽度(Resolve)是共享資源(時間/情感)的滿意;B 情感度(Affection)是互相關愛;D 適應度(Adaptation)是運用內外資源因應困難。故本題選錯誤者為 C。成長度是支持彼此成長;壓力調適是適應度。","options":{"A":"融洽度是共享各種資源的滿意情形，正確。","B":"情感度是互相關愛的情形，正確。","C":"正確(本題選錯誤者)。成長度是支持彼此成長;壓力調適是適應度。","D":"適應度是運用內外資源因應困難，正確。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"111110-N5-65":{"quick":"林先生與父親、太太、二女兒同住＝折衷(主幹)家庭。","detail":{"background":"林先生與「父親(上一代)、太太、二位女兒(下一代)」同住——是「「三代同堂」」，屬(C)『「折衷(主幹)家庭(stem family;由「祖父母-父母-子女」「三代」同住，但「每代只有一個核心」)」』。公社家庭是非親屬共居;大(擴展)家庭是含多個旁系親屬;核心家庭是「兩代(父母+子女)」。「祖父母+父母+子女三代」是折衷家庭。故 C 正確。三代同堂(祖父母-父母-子女)是折衷(主幹)家庭。","options":{"A":"公社家庭是非親屬共居。","B":"大(擴展)家庭含多個旁系親屬。","C":"正確。三代同堂(祖父母-父母-子女)是折衷(主幹)家庭。","D":"核心家庭是兩代(父母+子女)。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"111110-N5-80":{"quick":"中老年慢性病個案管理目標「最不適當」者＝定期監測疾病，以利早日痊癒。","detail":{"background":"中老年慢性病個案管理目標的「最不適當」者為(B)『「定期監測疾病，以利「早日「痊癒」」』——錯誤，「慢性病「多無法「痊癒」」，個案管理的目標是「「控制病情、預防併發症、維持功能、提升生活品質、增進自我照顧」」，而非「痊癒」。其他適當:A 個案學習自我照顧是最終目標;C 控制疾病、預防合併症;D 個案能利用資源、接受保健諮詢。故本題選最不適當者為 B。慢性病以控制、預防併發症為目標，非痊癒(與前述同類題一致)。","options":{"A":"個案學習自我照顧是最終目標，適當。","B":"正確(本題選最不適當者)。慢性病以控制為目標，非痊癒。","C":"控制疾病、預防合併症，適當。","D":"個案能利用資源、接受保健諮詢，適當。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"112030-N5-55":{"quick":"家庭「情境性」危機＝失業①、事故傷害②、中頭彩③(空巢期④是成長性)。","detail":{"background":"家庭的「情境(情況)性危機(situational crisis;「突發、不可預期」的事件)」包括:(1)失業、(2)事故傷害、(3)中頭彩(突發的「「正向」事件也會造成壓力/危機)。而(4)『空巢期』是「「成長(發展)性危機(maturational crisis;隨「家庭發展階段「可預期」轉換」而來)」」，非情境性。故情境性危機為①②③(選 C)。情境性危機是突發不可預期(含正向如中頭彩);成長性危機是可預期的發展階段轉換。","options":{"A":"僅12：缺③(中頭彩，亦為情境性)，不完整。","B":"僅34：含④(空巢期，成長性)，錯誤。","C":"正確。失業①、事故傷害②、中頭彩③，是情境性危機。","D":"僅124：含④(空巢期，成長性)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"112030-N5-63":{"quick":"家庭資源：太太出國先生身兼母職(良好結構支持)②、防滑磁磚扶手緊急鈴(硬體結構支持)③(經濟教育環境皆內在資源①錯)。","detail":{"background":"家庭資源的正確敘述:(2)「太太出國、先生身兼母職處理家務與照顧子女，顯示家庭具有「良好的「(軟體)結構支持」(成員角色的彈性調整)」;(3)「防滑磁磚、扶手、緊急鈴等「硬體」因中風家人需要而裝設，顯示「(硬體)結構支持」佳」。而(1)『經濟、教育、「環境」資源皆是重要的家庭「內在」資源』錯誤(「「環境」資源屬「「外在」資源」，並非全是「內在」資源)。故正確為②③(選 D)。","options":{"A":"僅3：缺②(亦為結構支持)，不完整。","B":"12：含①(環境資源屬外在，非全是內在)，錯誤。","C":"13：含①，錯誤。","D":"正確。軟體結構支持②、硬體結構支持③。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"112030-N5-64":{"quick":"育有一位5歲女孩的家庭＝成員增加(擴展)期。","detail":{"background":"依 Duvall 家庭發展理論，王先生夫婦育有「一位「5歲」小女孩」——屬(C)『「成員增加(擴展)期(family expanding;家庭自「第一個孩子出生」起，歷經嬰幼兒、學齡前、學齡、青少年等「子女成長」的擴展階段;5歲屬「學齡前」，在擴展期內)」』。結婚期是「尚無子女」;生育期是「第一個孩子0~30個月」;成員擴散(收縮)期是「子女陸續離家」。5歲孩子屬「成員增加(擴展)期」。故 C 正確。","options":{"A":"結婚期是尚無子女的階段。","B":"生育期是第一個孩子0~30個月。","C":"正確。育有5歲女孩(學齡前)，屬成員增加(擴展)期。","D":"成員擴散(收縮)期是子女陸續離家的階段。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"112110-N5-63":{"quick":"家庭圈(圖示)：家庭圈會隨時間變動②、個案與妻子關係最親近④、次子權力小於長子⑤。","detail":{"background":"依圖示的家庭圈，較適當的敘述:(2)「家庭圈「會隨時間變動」(反映個案「當下主觀」的認知，會隨關係改變)」;(4)「圖中「個案與案妻的圓「重疊」」，表示「兩人「關係最親近」」」;(5)「圖中「次子的圓「小於」長子的圓」，表示「次子在家中的「權力(重要性)「小於」長子」」(圓圈大小代表權力)。而(1)『家庭圈「必須」是和家人「商議後」的結果』錯誤(家庭圈是「個案「主觀」繪製」，反映其「個人」認知，「不需」與家人商議);(3)『圓圈大小代表「付出最多」』錯誤(圓圈大小代表「「權力/重要性」」，而非「付出」)。故正確為②④⑤(選 C)。","options":{"A":"123：含①(須商議，錯誤)③(圓大小代表權力非付出)，錯誤。","B":"134：含①③，錯誤。","C":"正確。家庭圈隨時間變動②、個案與妻關係最親近④、次子權力小於長子⑤。","D":"345：含③(付出，錯誤)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"112180-N5-41":{"quick":"評估獨居老人的「外在連結和資源」＝生態圖(eco-map)。","detail":{"background":"最適合用來評估「獨居老人的「外在連結和資源」」的家庭評估工具是(D)『「生態圖(eco-map;呈現「個人/家庭與「外部系統(醫療、社福、鄰里、宗教、親友等)」的「連結、資源往來與關係」」，適合評估「對外的支持網絡與資源」)」』。家系圖呈現世代結構與健康史;家庭圈呈現成員親疏與權力;「家庭互動定律」非評估工具。「外在連結與資源」用生態圖。故 D 正確。生態圖呈現與外部系統的連結與資源，適合評估獨居老人的支持網絡。","options":{"A":"家系圖呈現家庭的世代結構與健康史。","B":"「家庭互動定律」非標準的家庭評估工具。","C":"家庭圈呈現家庭成員的親疏與權力。","D":"正確。生態圖最適合評估獨居老人的外在連結和資源。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"113030-N5-40":{"quick":"夫病、由妻子支撐全家並成為主要經濟決策者＝情況(情境)權威型權力。","detail":{"background":"顧先生原為一家之主、因病辭職，「現由「妻子」支撐全家開銷並成為「主要經濟決策者」」——其家庭權力類型最符合(B)『「情況(情境)權威型(situational authority;權力的歸屬「隨「情境/狀況(誰掌握資源、誰能負擔)」而「轉移」」;因丈夫生病、妻子成為經濟支柱，權力轉移到妻子)」』。傳統權威型是依「傳統性別/輩分」固定;分享權威型是共同分擔;讓步妥協型是協商讓步。「因情境改變而權力轉移」屬情況權威型。故 B 正確。權力因情境(誰掌握資源)而轉移，是情況權威型。","options":{"A":"傳統權威型是依傳統性別/輩分固定權力。","B":"正確。權力因情境(誰掌握資源)轉移，是情況權威型。","C":"分享權威型是夫妻共同分擔決策。","D":"讓步妥協型是經協商讓步決定。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"113030-N5-41":{"quick":"顧太太身兼數角色、自覺難以扮演好＝角色力竭(role overload)。","detail":{"background":"顧太太「身兼數種角色(經濟支柱、母親、妻子、照顧者)，「自覺「難以扮演好」各個角色」」——此現象顯示(B)『「角色力竭/角色過度負荷(role overload;承擔「過多的角色」、「能力/時間/精力「無法負荷」」，感到力不從心、耗竭)」』。角色相稱是角色與能力相符;角色不一致是不同角色的期待衝突;角色不互補是角色間無法相互配合。「身兼多角色、難以勝任」屬角色力竭。故 B 正確。身兼多角色、難以負荷是角色力竭。","options":{"A":"角色相稱是角色與能力相符(無此問題)。","B":"正確。身兼數角色、難以扮演好，是角色力竭(過度負荷)。","C":"角色不一致是不同角色的期待衝突。","D":"角色不互補是角色間無法相互配合。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"113100-N5-1":{"quick":"遭家暴、頭部受創血流不止：最優先＝尋找適當空間，確保安全與隱私。","detail":{"background":"蕭女士遭酗酒先生「酒後毆打、頭部受創、血流不止」，由警察社工護送至急診——最優先的護理措施是(D)『「「尋找適當空間，確保(病人的)「安全與隱私」」(在「安全、私密」的環境下，處理傷口、評估、會談，保護受害者「免於再受傷害」並維護其尊嚴)』。其他(A 申請醫療補助、B 提出告訴、C 申請保護令、聘律師)都是「後續」的協助，但「當下「最優先」是「確保病人的安全與隱私」」(且須先處理「頭部出血」的緊急醫療)。故 D 正確。對受暴者，首要確保其安全與隱私(與前述同類題一致)。","options":{"A":"申請醫療補助是後續的經濟協助。","B":"提出告訴是後續的法律協助。","C":"申請保護令、聘律師是後續的法律協助。","D":"正確。最優先尋找適當空間，確保安全與隱私。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"113100-N5-41":{"quick":"孫家面對困境、主動尋求協助、運用資源＝APGAR 的適應度(adaptation)。","detail":{"background":"孫先生中風偏癱、家庭陷入困境，「獨子「主動尋求里長和社區護理師的協助」(運用「外在資源」因應困難)」——孫家符合 APGAR 的(A)『「適應度(Adaptation;家庭在「面臨困難」時，「「運用內外資源「因應、解決」問題」」的能力)」』。成長度是支持彼此成長;情感度是互相關愛;融洽度是相處時間。「面臨困境、主動尋求並運用資源」屬適應度。故 A 正確。面臨困境、運用資源因應屬 APGAR 的適應度。","options":{"A":"正確。面臨困境、主動運用資源因應，是適應度(Adaptation)。","B":"成長度是支持彼此成長。","C":"情感度是互相關愛。","D":"融洽度是相處時間與情感分享。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"113180-N5-40":{"quick":"生育期家庭的發展任務「最不適當」者＝建立夫妻間認同關係。","detail":{"background":"依 Duvall & Miller，「生育期家庭(early childbearing family;第一個孩子出生至約30個月)」的發展任務，「最不適當」者為(A)『「建立「夫妻間「認同」關係」』——「建立夫妻間的認同/承諾關係」是「「新婚期(尚無子女)」」的任務，「不是「生育期」的任務」。生育期的任務:B 維持穩定的婚姻關係;C 適應成為父母親的新角色;D 統合適應嬰兒成為家庭的一員。故本題選最不適當者為 A。「建立夫妻認同」是新婚期任務;生育期是適應為人父母。","options":{"A":"正確(本題選最不適當者)。「建立夫妻認同」是新婚期的任務，非生育期。","B":"維持穩定的婚姻關係，是生育期的任務。","C":"適應成為父母親的新角色，是生育期的任務。","D":"統合適應嬰兒成為家庭的一員，是生育期的任務。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"114030-N5-40":{"quick":"骨關節炎行動不便、配偶三高控制良好的家庭：最優先個案管理目標＝提供居家安全評估、減少跌倒。","detail":{"background":"李奶奶「退化性骨關節炎、「行動不便」」、李爺爺三高「已規律控制良好」——此家庭「最優先」的個案管理目標是(C)『「提供「居家安全評估」，「減少「跌倒」和其他意外」(行動不便者「跌倒風險高」，跌倒會造成嚴重傷害，故「居家安全/防跌」是「最優先、最切合」的目標)』。其他較不優先:A『鼓勵關節置換術』非當下首要(且須評估);B『監測李爺爺服藥遵從』——李爺爺已控制良好;D『安排社交活動』非最優先。故 C 正確。對行動不便的長者，居家安全評估、防跌是最優先。","options":{"A":"鼓勵關節置換術非當下首要(須評估)。","B":"李爺爺三高已規律控制良好，非最優先。","C":"正確。提供居家安全評估、減少跌倒(防跌)，是最優先目標。","D":"安排社交活動非最優先。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"114030-N5-48":{"quick":"個案管理師的職責「最不適當」者＝親自到府執行復健，並提供日常生活功能服務。","detail":{"background":"林女士(76歲獨居、多重慢性病、骨折出院)的個案管理師職責，「最不適當」者為(C)『「「親自到府「執行復健」」，並提供日常生活功能服務」』——錯誤，「個案管理師的角色是「「評估、規劃、「協調、連結」資源與服務」」，「「親自執行」復健、日常生活照顧」是「「復健治療師、照服員」」的工作，「不是個管師「親自做」」(個管師是「協調安排」這些服務)。其他適當:A 與林女士共同訂計畫、恢復獨立自主;B 聯繫藥師提供藥物整合、指導用藥;D 定期電話訪視、安排就醫交通接送。故本題選最不適當者為 C。個管師是協調連結服務，非親自執行復健。","options":{"A":"與林女士共同訂計畫、恢復自主，適當。","B":"聯繫藥師提供藥物整合服務，適當。","C":"正確(本題選最不適當者)。個管師是協調連結，非親自執行復健。","D":"定期電話訪視、安排就醫交通，適當。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"114100-N5-36":{"quick":"篩檢發現疑似大腸癌、通知並轉介及後續處理＝照護協調者。","detail":{"background":"護理師「社區篩檢發現疑似大腸癌、「通知個案、進行轉介及後續處理」」——所扮演的角色是(C)『「照護協調者(care coordinator;「協調、連結」個案後續的「轉介、就醫、追蹤」等服務，確保照護的連續性)」』。研究應用者是運用研究;增能促進者是賦權;倡議者是為弱勢發聲。本題核心是「轉介、協調後續處理」，故為照護協調者。故 C 正確。通知、轉介、協調後續是照護協調者的角色。","options":{"A":"研究應用者是將研究證據應用於實務。","B":"增能促進者是賦權、增進個案的能力。","C":"正確。通知、轉介、協調後續處理，是照護協調者。","D":"倡議者是為弱勢發聲、爭取權益。"},"sources":["社區衛生護理學(新文京/華杏)·個案管理與居家護理"]}},"114170-N5-21":{"quick":"家庭暴力「最適當」者＝可能發生在任何具有家庭關係者之間。","detail":{"background":"家庭暴力的敘述，「最適當」者為(B)『「可能發生在「任何具有家庭關係者之間」(配偶、親子、手足、同居、姻親等，不限身分、性別、年齡)」』。其他錯誤:A『受暴者「不會發生在男性」』錯誤(男性「也會」是受暴者);C『身體虐待「不屬於」家庭暴力』錯誤(身體虐待「是」家暴的主要類型);D『家暴形成原因「多為單一因素」』錯誤(家暴是「多因子(個人、家庭、社會)」造成)。故 B 正確。家暴可能發生在任何具家庭關係者之間。","options":{"A":"男性也會是受暴者，非不會發生在男性。","B":"正確。家暴可能發生在任何具有家庭關係者之間。","C":"身體虐待是家暴的主要類型，非不屬於。","D":"家暴是多因子造成，非單一因素。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"114170-N5-40":{"quick":"媽媽升校長、支撐全家、成為主要決策者＝情況(情境)權威型。","detail":{"background":"蘇小弟家中「爸爸留職停薪照顧雙親、由「升職校長的媽媽支撐全家開銷」、媽媽成為「主要決策者」」——此家庭權力關係最符合(B)『「情況(情境)權威型(權力的歸屬「隨「情境(誰掌握經濟資源)」而轉移」;因媽媽成為經濟支柱，權力轉移到媽媽)」』。傳統權威型是依傳統性別/輩分固定;分享權威型是共同分擔;讓步妥協型是協商讓步。「因情境(誰掌握資源)而權力歸屬」屬情況權威型。故 B 正確(與前述同類題一致)。","options":{"A":"傳統權威型是依傳統性別/輩分固定權力。","B":"正確。權力因情境(誰掌握經濟資源)而歸屬，是情況權威型。","C":"分享權威型是共同分擔決策。","D":"讓步妥協型是經協商讓步決定。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"115030-N5-8":{"quick":"家庭結構評估中屬「內在結構」者＝次系統。","detail":{"background":"家庭結構評估中，屬於「內在結構」的是(B)『「(家庭)「次系統(subsystem;如夫妻次系統、親子次系統、手足次系統，是家庭「內部」的組成與互動結構)」』。文化(A)、社經地位(C)、宗教(D)屬於「「外在結構(脈絡;家庭所處的社會文化背景)」」。「家庭次系統」是內在結構。故 B 正確。次系統屬家庭的內在結構;文化、社經、宗教屬外在(脈絡)結構。","options":{"A":"文化屬外在(脈絡)結構。","B":"正確。次系統屬家庭的內在結構。","C":"社經地位屬外在(脈絡)結構。","D":"宗教屬外在(脈絡)結構。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}},"115030-N5-40":{"quick":"家庭危機：成長性危機通常可預測①、中頭彩可能造成情境性危機③(情境性專指負向②、外派進修屬成長性④皆錯)。","detail":{"background":"家庭的成長性與情境性危機，正確的是:(1)「「成長(發展)性危機」通常是「可預測」的(隨「家庭發展階段」可預期地發生，如生子、空巢)」;(3)「中頭彩可能造成家庭的「情境性危機」(突發、不可預期的「正向」事件也會造成壓力/危機)」。而(2)『「情境性危機「專指「負向」事件」』錯誤(情境性危機「不限負向」，「正向」突發事件也算);(4)『外派進修「屬「成長性」危機」』錯誤(外派進修是「突發、特定」的事件，屬「「情境性」危機」)。故正確為①③(選 B)。","options":{"A":"12：含②(情境性專指負向，錯誤)。","B":"正確。成長性危機可預測①、中頭彩可能造成情境性危機③。","C":"23：含②(情境性專指負向，錯誤)。","D":"24：含②④，皆錯。"},"sources":["社區衛生護理學(新文京/華杏)·家庭護理","Friedman 家庭護理學"]}}},TO=["家庭護理居家護理與個案管理"],LEC={"家庭護理居家護理與個案管理":{"title":"家庭護理居家護理與個案管理　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「家庭護理居家護理與個案管理」的歷屆考題共 112 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_h4_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
