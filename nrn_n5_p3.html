期成長經驗對家庭婚姻的影響』屬精神分析/家庭治療;D『探討創傷的失落與挫折』屬精神動力/心理治療。故 B 正確。行為治療著重「此時此地」的具體行為改變。","options":{"A":"急性正性症狀主要靠藥物治療。","B":"正確。破壞病房安寧的行為適用行為治療(行為改變技術)。","C":"探討早期成長經驗屬精神分析/家庭治療。","D":"探討創傷失落屬精神動力/心理治療。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","行為治療"]}},"113180-N5-9":{"quick":"思覺失調症＝思考、知覺及行為障礙的疾病。","detail":{"background":"思覺失調症的正確敘述:(A)『是思考(妄想、思考形式障礙)、知覺(幻覺)及行為(怪異行為)障礙的疾病』。其他錯誤:B『常有記憶力減退、無法照顧自己』較像失智症的描述(思覺失調以思考知覺障礙為主，記憶力相對保留);C『很少會有幻覺干擾』錯誤(幻聽是常見、核心的正性症狀);D 前驅期以『負性症狀(退縮、功能下降)』為主，非正性症狀。故 A 正確。","options":{"A":"正確。思覺失調是思考、知覺及行為障礙的疾病。","B":"記憶力減退、無法照顧自己較像失智症。","C":"幻覺(尤其幻聽)是常見、核心的正性症狀。","D":"前驅期以負性症狀為主，非正性症狀。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"113180-N5-10":{"quick":"正性症狀＝持續出現幻聽(拒接觸、不上學、自我照顧差是負性)。","detail":{"background":"陳小華的症狀中，『持續出現幻聽(C)』屬『正性症狀』(正常功能的扭曲/增加，如幻覺、妄想)。而『拒絕與人接觸(A)、不願意上學(B)、自我照顧變差(D)』都屬『負性症狀』(社交退縮、動機缺乏、功能退化)。覺得別人議論他、別人知道他在想什麼(關係妄想、思考廣播)也是正性症狀，但選項中只有「持續出現幻聽」屬正性。故 C 正確。","options":{"A":"拒絕與人接觸屬負性症狀(社交退縮)。","B":"不願意上學屬負性症狀(動機/功能退化)。","C":"正確。持續出現幻聽屬正性症狀。","D":"自我照顧變差屬負性症狀(功能退化)。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","正負性症狀"]}},"114030-N5-3":{"quick":"DSM-5：強迫症會出現強迫思考、強迫行為。","detail":{"background":"DSM-5 各診斷的正確配對:(D)『強迫症會出現強迫思考(反覆侵入的念頭)、強迫行為(反覆的儀式行為)』。其他錯誤:A 妄想症病人『無明顯奇特怪異的行為』(妄想多為非怪異、功能保留);B 重鬱症最常出現的是『情緒低落、無價值/罪惡感、思考遲緩』，思緒飛躍是『躁症』的症狀;C 思覺失調症最常出現『被害妄想、關係妄想』，罪惡妄想較常見於『憂鬱症』。故 D 正確。","options":{"A":"妄想症病人無明顯奇特怪異的行為。","B":"思緒飛躍是躁症的症狀，非重鬱症。","C":"罪惡妄想較常見於憂鬱症，思覺失調最常被害妄想。","D":"正確。強迫症會出現強迫思考、強迫行為。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5"]}},"114030-N5-10":{"quick":"情感思覺失調症：在無情緒障礙發作時，有二週以上的妄想或幻覺。","detail":{"background":"DSM-5 情感思覺失調症(schizoaffective disorder)的正確敘述:(B)『在「沒有」重大情緒(情感)障礙發作的期間，仍有「至少二週」以上的妄想或幻覺』——這是區別情感思覺失調症與情緒障礙合併精神病性症狀的關鍵。其他錯誤:A 臨床症狀『同時包含思覺失調與情感症狀』，非「以情感障礙為主」;C 思考障礙與情緒障礙『會同時發作(且有重疊期)』;D『會出現妄想、幻覺』(這正是其特徵之一)。故 B 正確。","options":{"A":"同時含思覺失調與情感症狀，非以情感障礙為主。","B":"正確。無情緒障礙發作時，仍有二週以上的妄想或幻覺。","C":"思考障礙與情緒障礙會同時發作、有重疊期。","D":"情感思覺失調症會出現妄想、幻覺。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","情感思覺失調症"]}},"114100-N5-6":{"quick":"思覺失調病因：中樞多巴胺活動量過高是病因之一。","detail":{"background":"思覺失調症病因學的正確敘述:(C)『中樞神經傳導物質多巴胺活動量過高(尤其邊緣路徑)是病因之一』。其他錯誤:A 與『家族病史有關』(遺傳是重要危險因子，非無關);B 與『高度情緒表達(高EE)的家庭互動有關』(高EE 與復發有關，非無關);D 腦部結構呈現『腦室擴大、額葉代謝下降(hypofrontality)』，而非「腦室縮小、額葉代謝上升」。故 C 正確。","options":{"A":"與家族病史有關，遺傳是重要危險因子。","B":"與高度情緒表達的家庭互動有關。","C":"正確。中樞多巴胺活動量過高是病因之一。","D":"應為腦室擴大、額葉代謝下降，非縮小/上升。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","病因"]}},"114100-N5-10":{"quick":"妄想症：具有系統、有組織的想法，但與事實不符。","detail":{"background":"妄想症(delusional disorder)的正確敘述:(C)『具有系統、有組織的想法，但與事實不符(非怪異、有系統的妄想)』。其他錯誤:A 妄想症『無明顯的情緒症狀(如憂鬱)』(若以情緒為主則為情感性疾患);B『無明顯的功能受損及怪異行為』(功能多大致保留);D 妄想症主要使用『投射(projection)』防衛機轉(把內在不接受的衝動投射到外界)，而非「內射(introjection)」。故 C 正確。","options":{"A":"妄想症無明顯情緒症狀(如憂鬱)。","B":"妄想症無明顯功能受損及怪異行為。","C":"正確。具有系統、有組織的想法，但與事實不符。","D":"妄想症主要使用投射防衛，非內射。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症"]}},"114100-N5-13":{"quick":"思覺失調的正性症狀＝幻覺。","detail":{"background":"思覺失調症的正性症狀(positive symptoms)是正常功能的扭曲或增加:幻覺、妄想、失序言語、怪異/混亂行為。故『幻覺(A)』屬正性症狀。而情感平淡(B)、思考貧乏(C)、對活動缺乏興趣/無動機(D)都屬『負性症狀』(正常功能的減少)。故 A 正確。","options":{"A":"正確。幻覺屬正性症狀。","B":"情感平淡屬負性症狀。","C":"思考貧乏屬負性症狀。","D":"對活動缺乏興趣(無動機)屬負性症狀。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","正負性症狀"]}},"114100-N5-14":{"quick":"「聽到媽媽在廁所說話、吵死了」(幻聽)：以同理回應「聽到這些聲音讓你很困擾」。","detail":{"background":"病人幻聽「聽到媽媽在廁所說話、吵死了」。最適當回應是『同理其困擾感受』:「聽到這些聲音讓你很困擾」——接納其經驗與情緒、不否定也不附和。A「你說的聲音我也聽到了」是附和、強化幻覺;B「你媽媽並沒有在這裡、怎麼會聽到?」是質疑、爭辯;C「你亂說、廁所沒有任何聲音」是否定、指責。故 D 正確。對幻聽宜同理其困擾、不附和也不否定。","options":{"A":"「我也聽到了」是附和、強化幻覺。","B":"「怎麼會聽到」是質疑、爭辯。","C":"「你亂說、沒有聲音」是否定、指責。","D":"正確。同理其困擾「聽到這些聲音讓你很困擾」。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺護理"]}},"114100-N5-24":{"quick":"焚物送醫、敵視拍窗踢門威脅砸玻璃(立即暴力)：最優先＝尋求支援人力、使用身體處理技巧。","detail":{"background":"朱先生強制送醫後『目光敵視、肌肉緊繃、用力拍窗、踢門、威脅砸玻璃』——已是『立即、迫切的暴力行為與威脅』。此時暴力介入的最優先處置是『尋求足夠支援人力、使用身體處理技巧(必要時約束)以確保安全』。暴力的處置雖一般循「言語安撫→設限→藥物→身體約束」漸進，但當病人『已出現迫切的攻擊/破壞行為』時，安全管控(人力支援、身體介入)是優先，言語技巧與情緒支持在迫切暴力下已不足。故 C 正確。","options":{"A":"病人已迫切暴力，單靠言語技巧不足以確保安全。","B":"設限在迫切的破壞威脅下已不足。","C":"正確。迫切暴力下，尋求支援人力、使用身體處理技巧確保安全為最優先。","D":"治療性關切與情緒支持在迫切暴力下不足以控制。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","暴力危機介入"]}},"114170-N5-22":{"quick":"妄想症：對人信任感不足、較多疑。","detail":{"background":"妄想症(delusional disorder)的正確敘述:(A)『對人信任感不足、較多疑』(猜疑型人格特質是危險因子，病人傾向不信任他人)。其他錯誤:B『一定會出現幻覺』錯誤——妄想症以妄想為主，若有幻覺也不顯著(顯著持續的幻覺反而要考慮思覺失調);C 妄想症主要使用『投射(projection)』機轉，非內射;D 妄想症病人『生活功能大致保留、不顯著退化』(僅與妄想直接相關處受影響)。故 A 正確。","options":{"A":"正確。妄想症病人對人信任感不足、較多疑。","B":"妄想症不一定出現幻覺，幻覺若有也不顯著。","C":"妄想症主要使用投射機轉，非內射。","D":"妄想症生活功能大致保留，不顯著退化。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症"]}},"114170-N5-23":{"quick":"自稱木星王子、女病友是嬪妃(誇大妄想)：傾聽但不與病人爭辯妄想的真實性。","detail":{"background":"李先生誇大妄想(自稱木星王子、女病友是嬪妃)、頻找女病友。最適當是『傾聽但不與病人爭辯其妄想的真實性』——接納、了解、建立關係，同時(另)留意保護女病友的界限。A『面質提醒木星沒有人類』是爭辯;B『安排男性護理師以免情感轉移』不是處理妄想的重點、且因噎廢食;D『提醒勿犯重婚罪』是進入妄想邏輯的荒謬回應。故 C 正確。對妄想宜傾聽、不爭辯真實性。","options":{"A":"面質「木星沒有人類」是爭辯妄想。","B":"安排男性護理師非處理妄想的重點，因噎廢食。","C":"正確。傾聽但不與病人爭辯其妄想的真實性。","D":"「提醒勿犯重婚罪」是進入妄想邏輯的荒謬回應。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","誇大妄想"]}},"114170-N5-24":{"quick":"剛住進康復之家的慢性思覺失調病人：復健目標＝培養在社區獨立生活的技能。","detail":{"background":"張先生慢性思覺失調、剛住進康復之家。最適當的復健目標是『培養在社區獨立生活的技能(生活自理、社交、自我管理)』——康復之家的核心目標。B『減少藥物劑量』須依醫囑、非復健目標;C『規劃外出工作』是後續(職業復健)目標;D『可自由不夜宿』不符康復之家的規範(剛入住、須循序，且夜宿管理有其安全考量)。故 A 正確。康復之家的首要復健目標是培養社區獨立生活能力。","options":{"A":"正確。培養在社區獨立生活的技能，是康復之家的復健目標。","B":"減少藥物劑量須依醫囑，非復健目標。","C":"規劃外出工作是後續的職業復健目標。","D":"剛入住、須循序，「自由不夜宿」不符規範。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","康復之家"]}},"115030-N5-3":{"quick":"擔心出院返家：陪伴安撫黃小姐不安的情緒。","detail":{"background":"黃小姐思覺失調、擔心一週後出院返家(出院焦慮)。最適切是『陪伴並安撫其不安的情緒』——先接納、同理其焦慮，提供情緒支持，再協助處理出院的擔憂。A『加強情緒穩定劑劑量』須依醫囑、且非首要(其焦慮是對出院的正常反應);B『要她安心等待』是空泛安撫、未處理情緒;D『建議延後出院』是迴避、不利其復元(出院焦慮應協助因應而非延後)。故 C 正確。對出院焦慮宜先陪伴、同理情緒。","options":{"A":"加強藥物劑量須依醫囑、且非首要。","B":"「要她安心等待」是空泛安撫、未處理情緒。","C":"正確。陪伴安撫黃小姐不安的情緒。","D":"建議延後出院是迴避，不利其復元。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"115030-N5-9":{"quick":"思覺失調病因：高情緒表達互動僵化②、遺傳③、自我功能異常④(負性症狀與多巴胺過高①錯)。","detail":{"background":"思覺失調症病因的正確描述:(2)父母為『高情緒表達(高EE)且互動僵化』(與復發有關);(3)發病與『遺傳因素』有相關(一等親風險增高);(4)病人的『自我(ego)功能異常』(精神分析觀點，自我界限與現實檢驗受損)。而(1)錯誤——『負性症狀』與多巴胺活動量『過低(中皮質路徑)』有關，而非過高(過高與正性症狀有關)。故正確為②③④(選 D)。","options":{"A":"123：含敘述1(負性與多巴胺過高)，錯誤。","B":"124：含敘述1，錯誤。","C":"134：含敘述1，錯誤。","D":"正確。高EE互動僵化②、遺傳③、自我功能異常④。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","病因"]}},"115030-N5-12":{"quick":"被害妄想護理：採被動、友善的方式接近病人。","detail":{"background":"被害妄想的護理措施，最適切是『採被動、友善的方式接近病人』——多疑、被害的病人對主動靠近會增加被害感與防衛，故宜保持適度距離、態度友善、循序漸進地建立信任。A『積極與病人互動』對多疑者過度;B『頻繁評估其妄想內容』會強化妄想、引起防衛;D『做護理技術時不需額外解釋』錯誤——對被害妄想者，每項技術都應『事先清楚解釋』以減少其疑慮與恐懼。故 C 正確。對被害妄想宜被動友善、保持適度距離、充分解釋。","options":{"A":"積極與病人互動對多疑者過度，增加被害感。","B":"頻繁評估妄想內容會強化妄想、引起防衛。","C":"正確。採被動、友善的方式接近病人。","D":"對被害妄想者，每項技術都應事先清楚解釋，非不需解釋。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","被害妄想護理"]}},"115030-N5-14":{"quick":"被害妄想嚴重、拒服藥、貼牛皮紙：與居家治療團隊討論處置。","detail":{"background":"吳先生被害妄想嚴重、拒服藥、把窗戶貼牛皮紙(症狀惡化但未達傷人傷己之虞)。最適切的居家護理處置是『與居家治療團隊討論處置』——透過團隊評估、調整居家治療計畫(加強訪視、給藥、評估是否需進一步介入)。A『通知警察強制送醫』未達強制住院要件(無傷害自己或他人之虞);C『建議搬家』是配合妄想;D『教導鄰居自我防護』偏離病人照護。故 B 正確。對症狀惡化但未達強制要件者，與居家治療團隊討論調整處置。","options":{"A":"未達強制住院要件(無傷害自己或他人之虞)。","B":"正確。與居家治療團隊討論處置、調整計畫。","C":"建議搬家是配合妄想。","D":"教導鄰居自我防護偏離病人照護。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神居家治療"]}},"115030-N5-20":{"quick":"70歲思覺失調入院照護：當病人出現妄想時，可協助分散注意力。","detail":{"background":"陳女士70歲思覺失調、明顯精神症狀入院。最適切的照護是(C)『當病人出現妄想時，可協助分散注意力(轉移到現實活動)』——是處理妄想的適當技巧(不爭辯內容、引導至現實)。其他錯誤:A『安排「不同」照護人員』錯誤——應安排『固定』照護者以增加對人的定向感與信任;B『出現暴力就「直接」隔離約束』錯誤——應先以言語安撫、設限等較少限制方式，約束是最後手段;D『出現幻覺應「先協助區別現實與幻覺的不同」』不當——對幻覺直接「指正/區別」易被當成否定其經驗，宜先同理、了解內容。故 C 正確。","options":{"A":"應安排固定照護者增加定向感，非不同人員。","B":"暴力應先用較少限制方式，約束是最後手段，非直接隔離約束。","C":"正確。出現妄想時可協助分散注意力(引導至現實)。","D":"對幻覺直接「區別現實」易被當成否定，宜先同理了解。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"115030-N5-25":{"quick":"慢性精神病照顧：減少機構化負面影響②、環境重視安全舒適定向③、生活規劃減輕負性症狀④(正性症狀為主①錯)。","detail":{"background":"慢性精神病人的特性與照顧原則:(2)醫療照顧應『減少機構化的負面影響』(避免被動依賴);(3)居住環境應重視『安全、舒適與定向感的刺激』;(4)藉由病人的『生活規劃(規律作息、活動)』有助『減輕負性症狀』。而(1)錯誤——慢性精神病人多『以負性症狀(退縮、淡漠、功能退化)為主』，而非「正性症狀較多且嚴重」。故正確為②③④(選 C)。","options":{"A":"僅12：含敘述1(正性症狀為主)，錯誤。","B":"僅23：缺④，不完整。","C":"正確。減少機構化②、環境安全舒適定向③、生活規劃減輕負性症狀④。","D":"1234：含敘述1(正性症狀為主)，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","慢性精神病照顧"]}}},TO=["思覺失調症與精神病性疾患"],LEC={"思覺失調症與精神病性疾患":{"title":"思覺失調症　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「思覺失調症與精神病性疾患」的歷屆考題共 184 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_p3_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
