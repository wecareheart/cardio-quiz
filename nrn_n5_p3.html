_code":"115030","src":"民國115年","options":{"A":"123","B":"124","C":"134","D":"234"},"img":""},{"id":"115030-N5-12","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":12,"stem":"有關被害妄想的護理措施,下列何者最適切?","opts":{"A":"積極與病人互動","B":"頻繁評估其妄想內容","C":"採被動友善方式接近病人","D":"做任何護理技術時不需要額外解釋"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"思覺失調症與精神病性疾患","topic_num":"思覺失調症與精神病性疾患","q_num":12,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"積極與病人互動","B":"頻繁評估其妄想內容","C":"採被動友善方式接近病人","D":"做任何護理技術時不需要額外解釋"},"img":""},{"id":"115030-N5-14","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":14,"stem":"吳先生,診斷為思覺失調症,近期被害妄想嚴重,拒絕服藥,因擔心鄰居窺看,將所有窗戶都貼上牛皮紙。下列何項居家護理處置最適切?","opts":{"A":"通知警察強制送醫","B":"與居家治療團隊討論處置","C":"建議病人搬家","D":"教導鄰居自我安全防護"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"思覺失調症與精神病性疾患","topic_num":"思覺失調症與精神病性疾患","q_num":14,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"通知警察強制送醫","B":"與居家治療團隊討論處置","C":"建議病人搬家","D":"教導鄰居自我安全防護"},"img":""},{"id":"115030-N5-20","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":20,"stem":"陳女士,70歲,診斷為思覺失調症,因出現明顯精神症狀而入院治療。下列何項入院護理照護最適切?","opts":{"A":"安排不同的照護人員,以增加對人的定向感","B":"若病人出現暴力行為,直接採取隔離與約束處置","C":"當病人出現妄想時,可協助分散注意力","D":"當病人出現幻覺時,應先協助區別現實與幻覺的不同"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"思覺失調症與精神病性疾患","topic_num":"思覺失調症與精神病性疾患","q_num":20,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"安排不同的照護人員,以增加對人的定向感","B":"若病人出現暴力行為,直接採取隔離與約束處置","C":"當病人出現妄想時,可協助分散注意力","D":"當病人出現幻覺時,應先協助區別現實與幻覺的不同"},"img":""},{"id":"115030-N5-25","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":25,"stem":"有關慢性精神病人的特性與照顧原則,下列說明何者正確?1病人正性症狀較多,且症狀嚴重 2 醫療照顧應減少機構化之負面影響 3居住環境應重視安全、舒適和定向感的刺激 4藉由病人的生活規劃,有助減輕負性症狀","opts":{"A":"僅12","B":"僅23","C":"僅234","D":"1234"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"思覺失調症與精神病性疾患","topic_num":"思覺失調症與精神病性疾患","q_num":25,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"僅12","B":"僅23","C":"僅234","D":"1234"},"img":""}],E={"101030-N5-2":{"quick":"嚴重暴力需強制約束時：主動尋求協助、人力足夠時由現場資深人員指揮一同約束/施打針劑。","detail":{"background":"處理被害妄想欲暴力攻擊的病人，約束/隔離的原則:(B)『嚴重暴力需強制約束時，須主動尋求足夠人力支援，由現場資深人員統一指揮，眾人一同進行約束或依醫囑施打針劑』，以確保病人與工作人員的安全。其他錯誤:A 約束的目的是『保護安全』而非「懲罰」(約束絕不可作為懲罰);C 暴力處置紀錄應『完整客觀記錄』(經過、處置、反應)，非僅重點且加入家屬看法;D 約束方式依評估而定，未必一律採四點約束。故 B 正確。","options":{"A":"約束目的是保護安全，絕不可作為懲罰。","B":"正確。需強制約束時主動尋求協助、由資深人員指揮一同進行。","C":"紀錄應完整客觀，非僅重點且加入家屬看法。","D":"約束方式依評估而定，未必一律四點約束。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","暴力處置·約束"]}},"101030-N5-18":{"quick":"退縮、不敢目視的病人：邀請參加活動並承諾陪伴。","detail":{"background":"朱先生思覺失調、退縮、不參與活動、不敢目視工作人員(社交退縮、負性症狀)。最適切是『邀請其參加病房活動，並承諾會陪伴他一起參與』——以低壓力、有支持的方式漸進促進其社交，建立安全感。A 強制參加卡拉OK 比賽壓力過大;C 用行為治療「建立目視禮儀」不當(目視困難是症狀，非禮儀問題);D 訂行為約定減少待房過於要求。故 B 正確。對退縮病人宜溫和邀請、陪伴支持。","options":{"A":"強制參加卡拉OK比賽壓力過大，不適切。","B":"正確。邀請參加活動並承諾陪伴，以低壓力支持促進社交。","C":"目視困難是症狀非禮儀問題，不宜用行為治療矯正。","D":"訂行為約定減少待房對退縮病人過於要求。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101030-N5-19":{"quick":"對性議題糾纏(去抑制)：以反映回應「你好像對這議題很有興趣喔?」","detail":{"background":"李先生自動停藥再發病、出現觸摸異性、反覆詢問性議題(性方面的去抑制行為)。較適切的護理是『以反映、不評判也不忽視的方式回應』:「你好像對這議題很有興趣喔?」，溫和地點出並可進一步重新導向。A『告訴他這是不禮貌的行為』帶評判;B『充耳不聞』忽視且未設限;D『訂行為約定修正討論』過於要求且非當下回應。故 C 正確。對去抑制行為宜不評判、溫和設限與重新導向。","options":{"A":"「這是不禮貌的行為」帶評判，易引起對立。","B":"充耳不聞忽視病人、也未設限。","C":"正確。以反映回應「你好像對這議題很有興趣」，不評判並可重新導向。","D":"訂行為約定過於要求，非當下適切回應。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101030-N5-24":{"quick":"精神分裂(思覺失調)病因＝多巴胺濃度過高或過度被活化(多巴胺假說)。","detail":{"background":"思覺失調症的主要生物病因是『多巴胺假說(dopamine hypothesis)』:中腦邊緣路徑的『多巴胺(dopamine)濃度過高或過度被活化』，與幻覺、妄想等正性症狀有關，故抗精神病藥以阻斷多巴胺 D2 受體為主。乙醯膽鹼過高與其他病理(如帕金森用藥)有關;乙醛脫氫酶與酒精代謝有關;血清素失調與其他症狀(負性、情緒)相關但正性症狀的核心是多巴胺。故 A 正確。","options":{"A":"正確。思覺失調症與多巴胺濃度過高或過度被活化有關(多巴胺假說)。","B":"乙醯膽鹼過高與思覺失調正性症狀無直接關係。","C":"乙醛脫氫酶與酒精代謝有關，非思覺失調病因。","D":"血清素與負性/情緒相關，正性症狀核心是多巴胺。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","多巴胺假說"]}},"101030-N5-26":{"quick":"失智公公的居家衛教＝提供安全環境(規律、不更動)。","detail":{"background":"李太太的公公(失智)居家生活安排的衛教:(A)『提供安全的環境』(移除危險物、防跌防走失)，是首要。其他錯誤:B『經常更動環境擺設增加新鮮感』錯誤——失智者需『規律、固定、熟悉』的環境，更動會增加混亂與不安;C『彈性安排生活作息』錯誤——應『規律固定』的作息;D『經常指出其妄想行為』錯誤——不應爭辯或指出妄想，宜不爭辯、轉移注意。故 A 正確。","options":{"A":"正確。提供安全環境(移除危險、防跌走失)是失智居家衛教首要。","B":"失智者需固定熟悉環境，更動會增加混亂。","C":"失智者需規律固定作息，非彈性安排。","D":"不應經常指出其妄想，宜不爭辯、轉移注意。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","失智症照護"]}},"101030-N5-39":{"quick":"對「沒人能了解我」的病人：以同理回應「您覺得沒人能瞭解您的問題嗎?」","detail":{"background":"伍先生(疑躁症/思覺失調)說「來這裡浪費時間、不想和任何人說話」。較適切回應是『以同理反映其感受』:「您覺得沒人能瞭解您的問題嗎?」——接納其孤立感、開啟對話。A「您能力很強可以拯救地球」附和其誇大妄想;B「沒有人告訴您為什麼住院嗎?」帶質問;C「凡事想開一點都會好轉」是說教與空泛保證。故 D 正確。對退縮/抗拒的病人，先同理其感受以建立關係。","options":{"A":"「您能力很強可以拯救地球」附和其誇大妄想。","B":"「沒人告訴您為何住院嗎」帶質問。","C":"「凡事想開一點」是說教與空泛保證。","D":"正確。以同理回應「您覺得沒人能瞭解您的問題嗎?」接納其孤立感。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-1":{"quick":"思覺失調五症候群(除正負性外)：認知缺損①、情緒障礙③、社會職業功能障礙④。","detail":{"background":"思覺失調症的五大症候群(症狀向度)除正性症狀、負性症狀外，還包括:(1)認知缺損(注意力、記憶、執行功能受損);(3)情緒障礙(情感平淡或不適切);(4)社會和職業功能障礙(功能退化)。而(2)『人格違常』是另一類疾患(人格障礙)，非思覺失調症的核心症候群。故正確為①③④(選 D)。","options":{"A":"①②③：含敘述2(人格違常)，非思覺失調核心症候群。","B":"②③④：含敘述2，錯誤。","C":"①②④：含敘述2，錯誤。","D":"正確。認知缺損①、情緒障礙③、社會職業功能障礙④。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-14":{"quick":"居無定所的思覺失調遊民：先與其建立信賴關係，再協助就醫診治。","detail":{"background":"陳小姐思覺失調、居無定所、乞食為生。社區精神衛生護理師的處置應『先與其建立信賴關係，再協助就醫診斷與治療』——精神病人多疑退縮，唯有先建立信任才能引導其接受醫療。直接轉介遊民中心收容未處理其精神疾病;非有立即危險而逕行協同警方強制住院不符要件;僅募款改善窮困未解決核心的精神疾病。故 B 正確。先信任、再就醫是社區精神照護的原則。","options":{"A":"轉介遊民中心收容未處理其精神疾病。","B":"正確。先與其建立信賴關係，再協助就醫診斷與治療。","C":"無立即危險時不宜逕行強制住院。","D":"僅募款改善窮困未解決核心的精神疾病。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神衛生"]}},"101110-N5-16":{"quick":"病情穩定、可自我照顧但家人不願帶回＝康復之家。","detail":{"background":"陳小姐病情穩定、可自我照顧並遵醫囑服藥，但家人不願接其回家(無家可歸)。最適合的社區精神醫療服務是『康復之家(half-way house)』——提供症狀穩定、有自我照顧能力但暫無家可回的精神病人『居住型』的過渡安置與生活復健。社區復健中心、日間留院是『白天到院、晚上回家』(需有家);居家護理是到宅服務(需有住所)。陳小姐需要的是『有居住功能』的安置，故為康復之家。","options":{"A":"社區復健中心是白天活動、晚上回家，需有住所。","B":"正確。穩定、可自理但無家可回，最適合康復之家(居住型過渡安置)。","C":"居家護理是到宅服務，需病人有住所。","D":"日間留院是白天到院、晚上回家，需有家。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神復健"]}},"101110-N5-19":{"quick":"斥責父母吐口水又立刻磕頭求原諒＝矛盾情感(ambivalence)。","detail":{"background":"張小姐對父母『突然大聲斥責、吐口水(敵意)，之後又立即哭著磕頭請求原諒(依附)』——對同一對象『同時或快速交替出現相反的情感(愛與恨)』，是『矛盾情感(ambivalence)』，為思覺失調症的特徵之一(Bleuler 4A)。思考聯想障礙是思考鬆散;自閉是退縮到內在世界;作態行為是無目的的怪異姿勢。本題核心是『對父母愛恨交替』，故為矛盾情感。","options":{"A":"思考聯想障礙是思考鬆散、不連貫。","B":"自閉是退縮到自我內在世界。","C":"正確。對父母敵意與依附快速交替，是矛盾情感(ambivalence)。","D":"作態行為是無目的的怪異姿勢或動作。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思覺失調·Bleuler 4A"]}},"101110-N5-28":{"quick":"自語自笑(幻覺)的病人：主動關懷其需要並提供協助。","detail":{"background":"薛太太思覺失調、站窗邊自語自笑(受幻覺影響)。正確護理是『主動關懷其需要並提供協助』，以真誠陪伴、增加現實接觸。其他錯誤:A『安排私人空間以免幻覺影響病友』錯誤——幻覺是病人內在經驗、不會「傳染」，孤立反而使其更沉浸幻覺;B『會談時儘量不討論幻覺以免加重』錯誤——可適度了解幻覺內容(評估安全)，並非禁談;C『每天更換護理師增加刺激』錯誤——應『固定』照護者建立信任。故 D 正確。","options":{"A":"幻覺是內在經驗不會影響他人，孤立反使其更沉浸幻覺。","B":"可適度了解幻覺內容以評估安全，非一律禁談。","C":"應固定照護者建立信任，非每天更換。","D":"正確。主動關懷其需要並提供協助，以真誠陪伴增加現實接觸。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺護理"]}},"101110-N5-32":{"quick":"怕被竊聽、焦慮的病人：以平穩音調說明所在地點與安全受到保障。","detail":{"background":"賴先生思覺失調、極焦慮、東張西望、怕被竊聽(被害意念)。最適當反應是『以平穩、清楚的音調向病人說明他現在所處的地點，並說明在這裡他的安全受到保障』——提供現實感與安全感、穩定情緒。A『和病人一樣壓低聲音』會強化其被害妄想的真實感;B『當下以紙筆記錄並說會交班』顯得疏離且像在「蒐證」;D『終止會談』迴避未提供安全感。故 C 正確。對焦慮多疑者，宜以平穩態度提供現實與安全感。","options":{"A":"跟著壓低聲音會強化其被害妄想的真實感。","B":"當下紙筆記錄、說交班顯疏離、像在蒐證。","C":"正確。以平穩音調說明所在地點與安全受到保障，提供現實與安全感。","D":"終止會談是迴避，未提供安全感。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-38":{"quick":"思覺失調：男女發病率大致無差別。","detail":{"background":"思覺失調症的正確敘述:(D)男女『發病率大致無差別』(盛行率約1%，男性發病略早)。其他錯誤:A 幻覺以『聽幻覺(幻聽)』最常見，非視幻覺;B 疾病的『烙印(汙名)現象會影響社區適應』(造成歧視、退縮);C MRI 常發現『腦室擴大(縮小的是腦組織)』，非腦室縮小。故 D 正確。","options":{"A":"思覺失調幻覺以聽幻覺(幻聽)最常見，非視幻覺。","B":"疾病烙印(汙名)會影響社區適應。","C":"MRI 常見腦室擴大，非腦室縮小。","D":"正確。思覺失調症男女發病率大致無差別。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102030-N5-6":{"quick":"幻覺與錯覺皆是知覺障礙。","detail":{"background":"知覺障礙的正確概念:(A)『幻覺(hallucination，無外在刺激而產生的知覺)與錯覺(illusion，對真實外在刺激的錯誤解讀)都是「知覺障礙」』。其他錯誤:B 思覺失調症最常出現『聽幻覺(幻聽)』，非觸幻覺;C 譫妄病人最常出現『視幻覺』，非聽幻覺;D『幻覺不一定合併妄想』(可單獨出現)。故 A 正確。","options":{"A":"正確。幻覺與錯覺皆屬知覺障礙。","B":"思覺失調症最常出現聽幻覺，非觸幻覺。","C":"譫妄最常出現視幻覺，非聽幻覺。","D":"幻覺不一定合併妄想，可單獨出現。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","知覺障礙"]}},"102030-N5-13":{"quick":"「被植入晶片功力超強」(誇大妄想)：以反映回應「你好像期待自己能力要很強」。","detail":{"background":"病人說「被植入晶片、功力超強、能侵入電腦」是誇大妄想。較適切回應是『不爭辯妄想內容，反映其背後的需求/情緒』:「你好像期待你自己的能力要很強」——同理其想變強的渴望。A「我不相信你這麼厲害」、B「人怎麼可能被植入晶片」、D「不可能、我沒聽過」都是『直接否定/爭辯妄想』，會升高其防衛。故 C 正確。對妄想宜不爭辯、反映背後的情緒需求。","options":{"A":"「我不相信你這麼厲害」直接否定，與妄想爭辯。","B":"「人怎麼可能被植入晶片」爭辯妄想內容。","C":"正確。反映其背後想變強的需求「你好像期待自己能力要很強」。","D":"「不可能、我沒聽過」否定病人經驗。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102030-N5-15":{"quick":"被害拒食的病人：讓其自己動手處理餐點。","detail":{"background":"吳太太慢性思覺失調、被害妄想、怕食物被下毒而拒食。正確措施是『讓吳太太自己動手處理(打開/選擇)自己的餐點』——由病人自行掌控可減少被下毒的疑慮、提高進食意願(也可提供包裝完整或共餐的食物)。A『拍打肩膀做安全保證』對多疑病人是侵犯且可能激怒;C『放心啦沒人會毒你』是與妄想爭辯;D『安排在大廳進食』未解決其被害疑慮。故 B 正確。","options":{"A":"拍打肩膀對多疑病人是侵犯，可能激怒。","B":"正確。讓其自己處理餐點，由病人掌控以減少被下毒疑慮。","C":"「沒人會毒你」是與妄想爭辯。","D":"安排在大廳進食未解決其被害疑慮。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","被害妄想·拒食"]}},"102110-N5-12":{"quick":"自行停藥的藥物衛教：解釋藥物作用①、日誌記用藥感受③、視線範圍內確認服下④(不忽視不適②)。","detail":{"background":"王先生因自行停藥、覺得服藥不舒服而再發病。藥物衛教:(1)向個案解釋藥物治療的作用(增進服藥動機);(3)建議以日誌記下用藥的感受、想法與行為(自我監測、利於溝通);(4)在視線範圍內確認個案服下藥物(確保服藥、防藏藥)。而(2)『轉移注意力、不適症狀會漸漸緩解』錯誤——不應忽視病人對副作用的不適，應正視並處理(評估、衛教、與醫師討論調藥)。故正確為①③④(選 B)。","options":{"A":"①②③：含敘述2(忽視不適)，錯誤。","B":"正確。解釋藥物作用①、日誌記感受③、視線內確認服下④。","C":"②③④：含敘述2，錯誤。","D":"①②④：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","抗精神病藥·服藥順從"]}},"102110-N5-14":{"quick":"家庭理論：混淆不清的世代界線易造成子女成為思覺失調患者。","detail":{"background":"依家庭理論對思覺失調症的觀點:(C)『混淆不清的世代界線(generation boundary，親子角色混亂、過度糾結)易造成子女成為思覺失調患者』。其他錯誤:A『高情緒表達(high EE)』的家屬(過度批評、敵意、情感過度涉入)才易出現排斥拒絕並使復發增加，非「低情緒表達」;B 個案非「最受寵」而失去適應力;D 思覺失調的精神分析觀點是自我(ego)『較弱』、現實感受損，非「自我較強原我較弱」。故 C 正確。","options":{"A":"高情緒表達家屬才易排斥拒絕個案，非低情緒表達。","B":"個案並非最受寵的孩子而失去適應力。","C":"正確。混淆不清的世代界線易造成子女成為思覺失調患者。","D":"思覺失調的自我(ego)較弱，非較強。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","家庭理論·高情緒表達"]}},"102110-N5-30":{"quick":"激動踱步、踢椅的病人：談話維持至少一個手臂長的距離。","detail":{"background":"張先生思覺失調、強制入院、阻抗、來回踱步、踢椅(激動、暴力前兆)。較適當的護理是『與其談話時至少維持一個手臂長的距離』，確保安全與其個人空間。A『從身後接近』會驚嚇、激發暴力;C『進房間關門獨處』把自己置於危險、出口受阻;D『拍肩』對激動病人是刺激、可能引發攻擊。故 B 正確。面對激動病人，保持安全距離、不驚嚇、留出口。","options":{"A":"從身後接近會驚嚇病人、激發暴力。","B":"正確。談話維持至少一個手臂長的距離，確保安全與個人空間。","C":"進房間關門獨處把自己置於危險、出口受阻。","D":"拍肩對激動病人是刺激，可能引發攻擊。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","暴力前兆·安全距離"]}},"102110-N5-31":{"quick":"社會對精神病患的觀點(汙名)＝家屬因病恥感而求神問卜、不就醫。","detail":{"background":"小晴覺得自己是家人的恥辱、鄰居指指點點，反映社會對精神病患的『汙名(stigma)/烙印』。最能呈現此觀點的是『家屬因病恥感而求神問卜、不就醫(延誤就醫)』。A『疾病標籤使病患提早就醫』錯誤(汙名反而延誤就醫);B『家屬覺得是祖先作孽、與自己無關』不符「恥辱感」的描述;C『民眾並未有偏差看法』與汙名現象相反。故 D 正確。汙名造成病恥感、延誤就醫與社會排斥。","options":{"A":"汙名標籤反而使病患延誤就醫，非提早。","B":"「祖先作孽、與己無關」不符題幹的恥辱感描述。","C":"「民眾並未有偏差看法」與汙名現象相反。","D":"正確。因病恥感而求神問卜、不就醫，呈現社會對精神病的汙名。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","汙名(stigma)"]}},"102110-N5-34":{"quick":"增進慢性精神病人維護健康的能力＝提供具體化的指導措施。","detail":{"background":"照顧慢性精神病人時，為增進其維護健康的能力(自我管理)，應『提供具體化、明確、可執行的指導措施』(分解步驟、清楚示範)，因其認知與執行功能可能受限。其他錯誤:B『多用「是或否」的問句』會限制病人表達(宜開放式引導);C『多用強制策略』違反治療性原則;D『多使用批判方式』會傷害自尊、破壞關係。故 A 正確。對慢性病人宜具體、明確、正向地指導。","options":{"A":"正確。提供具體化的指導措施，利於慢性病人執行與自我管理。","B":"多用是非問句會限制病人表達。","C":"多用強制策略違反治療性原則。","D":"多用批判方式傷害自尊、破壞關係。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"103030-N5-13":{"quick":"自我照顧退化的病人盥洗發呆：採分解動作、一步一步指導協助完成。","detail":{"background":"薛先生慢性思覺失調、自我照顧退化(拿臉盆久久沒動作、動機/執行缺損)。正確措施是『採分解動作、一步一步指導(如「先裝水」「再拿毛巾」)以協助其完成洗澡』，維持其殘存功能。A『主動幫他洗澡』會加速其失能(剝奪自理機會);C『讓其自己完成』超出其當前能力、徒增挫敗;D『要求病友幫洗』不適當。故 B 正確。對退化病人宜分解步驟、適當協助以維持功能。","options":{"A":"主動代洗會加速失能、剝奪自理機會。","B":"正確。採分解動作、一步一步指導協助完成盥洗。","C":"讓其自己完成超出當前能力，徒增挫敗。","D":"要求病友幫洗不適當。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","負性症狀·自我照顧"]}},"103030-N5-14":{"quick":"非思覺失調預後指標＝家中排行。","detail":{"background":"思覺失調症的預後指標包括:發病年齡(A，發病越早預後越差)、發病速度(C，急性發作較緩慢隱襲預後好)、臨床症狀(D，正性症狀為主較負性為主預後好)、病前功能、有無誘發事件、家族史等。而『家中排行(B)』不是思覺失調症的預後指標。故 B 為非預後指標者。","options":{"A":"發病年齡是預後指標(越早預後越差)。","B":"正確(本題選非指標者)。家中排行不是思覺失調的預後指標。","C":"發病速度是預後指標(急性發作預後較好)。","D":"臨床症狀是預後指標(正性為主預後較好)。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思覺失調·預後"]}},"103030-N5-15":{"quick":"risperidone(非典型抗精神病藥)：阻斷多巴胺改善正性、作用於血清胺改善負性。","detail":{"background":"risperidone(理思必妥)是『非典型(第二代)抗精神病藥』，作用機轉是『阻斷多巴胺(D2)受體以改善正性症狀，同時拮抗血清素(5-HT2)受體以改善負性症狀』，且錐體外副作用較第一代少。它非作用於 GABA、非抑制乙醯膽鹼酶(那是失智用藥)、非調節鈉鉀離子流(那是局麻/抗癲癇)。故 D 正確。非典型抗精神病藥兼顧正、負性症狀是其特點。","options":{"A":"與 GABA 結合非 risperidone 的作用機轉。","B":"抑制乙醯膽鹼酶是失智用藥(donepezil)的機轉。","C":"調節鈉鉀離子流是局麻/抗癲癇藥的機轉。","D":"正確。阻斷多巴胺改善正性、作用於血清胺改善負性。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","非典型抗精神病藥"]}},"103030-N5-19":{"quick":"思覺失調正性症狀的生化＝多巴胺濃度過高。","detail":{"background":"思覺失調症『正性症狀(幻覺、妄想)』的生物化學因素核心是『多巴胺(dopamine)濃度過高/過度活化(中腦邊緣路徑)』，這是多巴胺假說的基礎，也是抗精神病藥阻斷 D2 受體的依據。正腎上腺素過低、皮質醇過度分泌、血清素失調與其他症狀或疾病相關，但正性症狀的生化核心是多巴胺過高。故 C 正確。","options":{"A":"正腎上腺素濃度過低非正性症狀的核心生化因素。","B":"皮質醇過度分泌與壓力相關，非正性症狀核心。","C":"正確。思覺失調正性症狀與多巴胺濃度過高有關。","D":"血清素失調與負性/情緒相關，正性核心是多巴胺。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","多巴胺假說"]}},"103030-N5-25":{"quick":"增強社區適應、避免機構化＝協助個案自行決定參加活動的項目(促進自主)。","detail":{"background":"機構化(institutionalization)現象是病人在長期被動、規律化的機構生活中喪失自主與決策能力。要『增強社區適應、避免機構化』，應『促進病人的自主與選擇』:協助個案『自行決定參加活動的項目』，培養自我決定能力。固定時間參加職能、定時排隊吃藥、集體帶領郊遊雖有結構，但都是『被動、團體一致』的安排，反而強化機構化。故 A 正確。促進自主與選擇是去機構化的關鍵。","options":{"A":"正確。協助個案自行決定參加活動項目，促進自主、避免機構化。","B":"固定時間參加職能是被動安排，易強化機構化。","C":"定時排隊吃藥是被動規律化，強化機構化。","D":"集體帶領郊遊是團體一致安排，未促進自主。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","去機構化"]}},"103030-N5-26":{"quick":"慢性精神病持續社區生活最優先＝強化規則服藥的行為(預防復發)。","detail":{"background":"要促使慢性精神病患能『持續在社區生活』，最優先的護理是『強化規則服藥的行為』——規則服藥是預防復發、維持症狀穩定的根本，是社區生活的基礎。提供工作、參加活動雖有益，但若不規則服藥而復發，一切將難以維持;找尋長期收容單位與「持續社區生活」的目標相反。故 A 正確。規則服藥是社區精神病人維持穩定的首要。","options":{"A":"正確。強化規則服藥的行為是預防復發、持續社區生活的首要。","B":"提供工作有益但非最優先(復發則難維持)。","C":"找長期收容單位與「持續社區生活」目標相反。","D":"積極參加活動有益但非最優先。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥順從·復發預防"]}},"103030-N5-36":{"quick":"個案管理協助恢復功能：就業訓練①、教導搭乘大眾運輸②、強化個人衛生③(尋找伴侶④非)。","detail":{"background":"社區個案管理者協助慢性精神病患『恢復功能』的護理措施:(1)提供就業/工作能力的訓練(職業復健);(2)教導使用大眾運輸工具(獨立生活技能);(3)強化個人衛生維護能力(自我照顧)。而(4)『尋找伴侶過正常人生活』並非個案管理協助恢復功能的措施(個人選擇，非護理目標)。故正確為①②③(選 C)。","options":{"A":"①③④：含敘述4(尋找伴侶)，非護理目標。","B":"①②④：含敘述4，錯誤。","C":"正確。就業訓練①、教導大眾運輸②、強化個人衛生③。","D":"②③④：含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神復健"]}},"103100-N5-7":{"quick":"精神分析學派認為潛意識是重要的精神疾病病因。","detail":{"background":"精神疾病病因觀:(B)精神分析學派(Freud)認為『潛意識(早期未解決的衝突)是重要的精神疾病病因』，正確。其他錯誤:A『習得的無助(learned helplessness)』是『認知-行為』學派對憂鬱的解釋(Seligman)，非動力學派;C 家族風險研究『無法清楚區辨遺傳與環境』(遺傳與共享環境混雜，須用雙生子/領養研究);D 思覺失調症腦中『多巴胺過高(非過低)』。故 B 正確。","options":{"A":"習得無助是認知-行為學派的解釋，非動力學派。","B":"正確。精神分析學派認為潛意識是重要的病因。","C":"家族研究無法清楚區辨遺傳與環境。","D":"思覺失調症多巴胺過高，非過低。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神疾病病因學"]}},"103100-N5-10":{"quick":"病識感評估問句：為何就醫②、最近症狀③、對處方藥看法④(學經歷①非病識感)。","detail":{"background":"病識感(insight)是病人對自己『罹病、需要治療』的認識。評估病識感的問句:(2)你為什麼決定來就醫?(對住院/求助的理解);(3)你最近經歷哪些不舒服的症狀?(對症狀的覺察);(4)你對醫師處方藥的看法?(對治療的認識)。而(1)『你的學經歷背景如何?』是評估一般背景資料，非病識感。故正確為②③④(選 A)。","options":{"A":"正確。為何就醫②、最近症狀③、對處方藥看法④是評估病識感。","B":"①②③：含敘述1(學經歷)，非病識感。","C":"①③④：含敘述1，錯誤。","D":"①②④：含敘述1，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","病識感評估"]}},"103100-N5-11":{"quick":"DSM-IV-TR 多軸：智能不足不論程度都屬第二軸。","detail":{"background":"DSM-IV-TR 五軸診斷:第一軸(臨床疾患，如思覺失調症、躁鬱症、焦慮症);第二軸(人格疾患與智能不足);第三軸(一般醫學狀況);第四軸(心理社會與環境問題);第五軸(整體功能評估 GAF)。(B)『智能不足不論程度，都屬於第二軸評估』正確。其他錯誤:A 躁鬱症屬第一軸(邊緣性人格才是第二軸);C 思覺失調症屬第一軸(非第三軸);D 心理社會與環境因素屬第四軸(非第五軸)。故 B 正確。","options":{"A":"躁鬱症屬第一軸，邊緣性人格才是第二軸。","B":"正確。智能不足不論程度都屬第二軸評估。","C":"思覺失調症屬第一軸，非第三軸。","D":"心理社會與環境因素屬第四軸，非第五軸。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM 多軸診斷"]}},"103100-N5-12":{"quick":"自稱「內政部部長」發表治安意見＝誇大(grandeur)妄想。","detail":{"background":"妄想類型的正確配對:(B)病人自稱『內政部部長、發表改善治安意見』，是誇大自己的身分地位，屬『誇大(grandeur)妄想』。其他錯誤:A『病友對她笑就是愛上自己』是『情愛(erotomanic)妄想』，非忌妒;C『病友哼歌就是傳訊息排擠他』是『關係/被害妄想』，非控制妄想;D『病友受黑道指使要殺他』是『被害(persecutory)妄想』，非虛無妄想(虛無妄想是認為自己/世界不存在)。故 B 正確。","options":{"A":"對方笑就愛上自己是情愛妄想，非忌妒妄想。","B":"正確。自稱內政部長、發表治安意見是誇大妄想。","C":"哼歌傳訊息排擠是關係/被害妄想，非控制妄想。","D":"病友受指使殺害是被害妄想，非虛無妄想。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想類型"]}},"103100-N5-13":{"quick":"思覺失調症「預後差」的因子＝早年發病。","detail":{"background":"思覺失調症預後『差』的影響因子:早年(年輕)發病(D)、緩慢隱襲發病(非突然)、發病前無明顯誘因、病前功能差、以負性症狀為主、藥物反應不佳等。而 A『突然發病』、B『藥物治療後明顯改善』、C『發病前有顯著導因』都是預後『好』的因子。故 D(早年發病)是預後差的因子。","options":{"A":"突然(急性)發病是預後好的因子。","B":"藥物治療後明顯改善是預後好的因子。","C":"發病前有顯著導因是預後好的因子。","D":"正確。早年發病是預後差的影響因子。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思覺失調·預後"]}},"103100-N5-15":{"quick":"認為電視正轉播自己的故事(脫離現實)＝思考障礙。","detail":{"background":"陳先生認為『電視正在轉播自己的故事(關係妄想)』，明顯脫離或扭曲事實——這是『思考障礙(thought disorder)』中的思考內容障礙(妄想)。情緒障礙是情感的異常;行為障礙是外顯行為的異常;人格障礙是長期的人格適應問題。本題核心是『脫離現實的錯誤信念(妄想)』，屬思考障礙。故 C 正確。","options":{"A":"情緒障礙是情感的異常。","B":"行為障礙是外顯行為的異常。","C":"正確。脫離現實的妄想是思考(內容)障礙。","D":"人格障礙是長期的人格適應問題。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思考障礙"]}},"103100-N5-16":{"quick":"李小姐呈現兩項正性症狀(妄想＋幻聽；無興趣參與是負性)。","detail":{"background":"思覺失調症正性症狀包括:妄想、幻覺、語無倫次、怪異行為。李小姐的症狀:『深信有人陷害她(被害妄想)』=一項正性;『聽到有人告訴她今晚有行動(幻聽)』=一項正性;而『對病房活動皆無興趣參與(動機缺乏/退縮)』屬『負性症狀』。故正性症狀共『兩項』(妄想＋幻聽)。故 B 正確。","options":{"A":"三項過多，無興趣參與屬負性症狀。","B":"正確。被害妄想＋幻聽＝兩項正性症狀(無興趣參與是負性)。","C":"四項過多。","D":"一項過少，妄想與幻聽各為一項。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","正負性症狀"]}},"103100-N5-17":{"quick":"能自理、無聯想鬆弛、單一具體妄想(現金被私吞)＝妄想型疾患(delusional disorder)。","detail":{"background":"洪爺爺『能自我照顧、無聯想鬆弛或不適切情感(無思覺失調的其他症狀)，但深信現金被某行員私吞、且能具體說出緣由』——呈現『單一、系統化、非怪異(可能發生)的妄想』，而整體功能與其他心智功能大致保留，最符合『妄想型疾患(delusional disorder，妄想症)』。思覺失調症會有更廣泛的症狀(幻覺、思考解組、負性症狀、功能退化);情感性疾患以情緒為主。故 C 正確。","options":{"A":"思覺失調症錯亂型有明顯解組，洪爺爺無此。","B":"思覺失調妄想型會伴其他思覺失調症狀，洪爺爺功能保留。","C":"正確。單一系統化妄想、功能保留，最符合妄想型疾患(妄想症)。","D":"情感性疾患以情緒障礙為主，非單一妄想。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症"]}},"103100-N5-18":{"quick":"家屬「沒干擾就不給藥」：護理師應強調規則服藥的重要性。","detail":{"background":"吳先生出院後由母親協助給藥，但母親『因擔心副作用、當病人沒干擾行為時就不給藥』——這是錯誤的服藥觀念(自行間斷服藥易復發)。護理師最適當的措施是『向家屬強調規則服藥的重要性』(思覺失調需長期維持治療，不可依症狀有無自行停藥)，並衛教副作用的處理。建議強制社區治療、改長效針劑、轉介康復之家都非『此情境』的首要(核心問題是家屬的服藥觀念)。故 C 正確。","options":{"A":"建議強制社區治療非此情境首要(病人願配合服藥)。","B":"改長效針劑可考慮，但核心是衛教家屬規則服藥觀念。","C":"正確。強調規則服藥的重要性，糾正家屬「沒干擾就不給藥」的觀念。","D":"轉介康復之家非此情境的首要措施。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥順從"]}},"103100-N5-21":{"quick":"護生第一次照顧妄想型且被拒：不積極接觸，於大廳活動時在一旁觀察。","detail":{"background":"妄想型個案多疑、拒絕護生接觸。護生宜『不積極(逼近)接觸，在病患於大廳活動時，可在一旁觀察、保持適度距離』，讓病人逐漸感到安全與可預期，再慢慢建立關係。B『持續安排會談重新澄清角色』對拒絕者是逼迫;C『伸手握手』對多疑病人是侵犯個人空間;D『會談時採面質技巧澄清妄想真實性』會與妄想爭辯、升高防衛。故 A 正確。對多疑妄想者宜緩、保持距離、不爭辯。","options":{"A":"正確。不積極接觸、在大廳活動時一旁觀察，逐步建立安全感。","B":"持續安排會談對拒絕者是逼迫。","C":"伸手握手對多疑病人是侵犯個人空間。","D":"會談採面質澄清妄想真實性會與妄想爭辯。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症護理"]}},"103100-N5-23":{"quick":"母親跟前跟後、替女兒做所有事、搶答＝高度情感表露(高 EE)。","detail":{"background":"張太太對思覺失調的女兒『跟前跟後、替她做所有事、會談時搶著替女兒回答』——是對病人『情感過度涉入(emotional over-involvement)』，屬『高度情感表露(high expressed emotion, high EE)』家屬。高 EE(過度批評、敵意或情感過度涉入)會增加思覺失調症的復發率。高度照顧者負荷是照顧壓力;雙重束縛是矛盾溝通;代罪羔羊是被歸咎的成員。本題是情感過度涉入，故為高度情感表露。","options":{"A":"高度照顧者負荷指照顧帶來的壓力，非此處的過度涉入。","B":"雙重束縛是矛盾、無論怎麼做都錯的溝通。","C":"正確。情感過度涉入、替病人做所有事，是高度情感表露(高 EE)。","D":"代罪羔羊是家庭中被歸咎的成員。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","高情感表露(EE)"]}},"103100-N5-36":{"quick":"慢性精神病的社區治療模式：康復之家②、日間留院③、社區心理衛生中心④(慢性病房①是住院)。","detail":{"background":"慢性精神病患的『社區』治療模式包括:(2)康復之家、(3)日間留院、(4)社區心理衛生中心，這些都是『以社區為基礎』的照護。而(1)『慢性病房』是『機構住院』治療，不屬於社區治療模式。故正確為②③④(選 D)。","options":{"A":"①②③：含敘述1(慢性病房)，屬機構住院。","B":"①③④：含敘述1，錯誤。","C":"①②④：含敘述1，錯誤。","D":"正確。康復之家②、日間留院③、社區心理衛生中心④是社區治療模式。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神復健"]}},"103100-N5-40":{"quick":"遭強暴後跳海獲救的病人：最重要護理＝保護病患、避免進一步傷害行為。","detail":{"background":"溫小姐遭強暴(重大創傷)後失神、跳海自殺被救回。最重要的護理措施是『保護病患安全、避免其做出更進一步的傷害行為(自殺)』——對剛自殺獲救者，安全(防再自殺)是第一優先。B『每小時觀察、完全避免獨處』方向對但「每小時」不夠密(高風險者需更密切/持續觀察);C『無需與家庭溝通』錯誤(需評估並動員家庭支持);D『自殺行為不易引發自覺、無法掌控』是消極的錯誤觀念。故 A 正確。對自殺獲救者，保護安全、防再自傷是首要。","options":{"A":"正確。保護病患、避免進一步傷害行為(自殺)是最重要的護理。","B":"方向對，但「每小時」對高風險者不夠密切。","C":"應評估並動員家庭支持，非無需與家庭溝通。","D":"「自殺不易引發自覺、無法掌控」是消極錯誤觀念。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","自殺防治"]}},"104030-N5-10":{"quick":"「要去接受十大傑出青年表揚」＝誇大妄想。","detail":{"background":"病人表示『今天要去接受行政院十大傑出青年表揚』，誇大自己的成就與身分，屬『誇大(grandeur)妄想』。色情/情愛妄想是認為某人愛上自己;迫害/被害妄想是認為被加害;嫉妒妄想是認為配偶不忠。本題誇大自己的身分成就，故為誇大妄想。","options":{"A":"色情(情愛)妄想是認為某人愛上自己。","B":"正確。誇大自己的成就身分，是誇大妄想。","C":"迫害(被害)妄想是認為自己被加害。","D":"嫉妒妄想是認為配偶不忠。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想類型"]}},"104030-N5-11":{"quick":"失真感(derealization)＝主觀覺得四週環境不真實、像在演戲。","detail":{"background":"知覺障礙的正確敘述:(D)『失真感(derealization)是主觀的感受，覺得四週環境不真實、像在演戲(或如夢境)』。其他錯誤:A『對現實環境做錯誤推論且深信不疑』是『妄想(思考障礙)』，非知覺障礙;B『無外界刺激卻有知覺』是『幻覺(hallucination)』，非錯覺(錯覺是對真實刺激的錯誤解讀);C 器質性腦症候群(譫妄)的知覺障礙最常是『視幻覺』，非聽幻覺。故 D 正確。","options":{"A":"對環境錯誤推論深信不疑是妄想，非知覺障礙。","B":"無外界刺激卻有知覺是幻覺，非錯覺。","C":"器質性腦症候群最常見視幻覺，非聽幻覺。","D":"正確。失真感是覺得環境不真實、像在演戲。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","知覺障礙"]}},"104030-N5-16":{"quick":"思覺失調：情感平淡、退縮(負性)與正腎上腺素/多巴胺活性減少有關。","detail":{"background":"思覺失調症的正確描述:(B)『情感平淡、退縮(負性症狀)與正腎上腺素(及前額葉多巴胺)活性減少有關』。其他錯誤:A 男女發生率『大致相當』，非男性明顯高於女性;C 思覺失調症『與遺傳因素有關』(家族遺傳易感性高);D 正性症狀與『多巴胺過高』有關，非血清素過高。故 B 正確。","options":{"A":"男女發生率大致相當，非男性明顯高於女性。","B":"正確。情感平淡退縮(負性)與正腎上腺素/多巴胺活性減少有關。","C":"思覺失調症與遺傳因素有關。","D":"正性症狀與多巴胺過高有關，非血清素過高。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"104030-N5-17":{"quick":"王先生符合 Bleuler 4A 中 3 項(聯想障礙、情感障礙、自閉；幻覺非 4A)。","detail":{"background":"布洛伊勒(Bleuler)提出思覺失調症的原發性症狀『4A』:聯想障礙(Association，思考鬆散、語無倫次)、情感障礙(Affect，情感平淡或不適切)、自閉(Autism，退縮到內在世界、行為怪異)、矛盾情感(Ambivalence)。王先生:語無倫次/答非所問=聯想障礙✓、情感表露減少=情感障礙✓、行為怪異=自閉✓;而『聽幻覺』是 Bleuler 的『附屬症狀』，非 4A。故符合 3 項(選 B)。","options":{"A":"2項過少，王先生符合聯想障礙、情感障礙、自閉三項。","B":"正確。符合聯想障礙、情感障礙、自閉共3項(幻覺非4A)。","C":"4項過多，聽幻覺屬附屬症狀非4A。","D":"(1項)過少。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","Bleuler 4A"]}},"104030-N5-18":{"quick":"無人在旁卻側身傾聽、自語揮舞＝知覺感受改變(幻聽)。","detail":{"background":"王小姐『無人在旁時，側身傾聽、自言自語並揮舞雙手』——這是受『幻聽(聽幻覺)』影響的典型行為表現，屬『知覺(感受)改變/障礙』(幻覺是知覺障礙)。思考內容變異是妄想;情感表現平淡是負性情感症狀;社會互動退縮是負性社交症狀。本題是受幻聽影響的行為，故為知覺感受改變。","options":{"A":"正確。側身傾聽、自語揮舞是受幻聽影響，屬知覺感受改變。","B":"思考內容變異是妄想，非幻覺行為。","C":"情感表現平淡是負性情感症狀。","D":"社會互動退縮是負性社交症狀。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺"]}},"104030-N5-34":{"quick":"社區復健計畫的目的『不』包括＝增加藥物的成效。","detail":{"background":"精神社區復健計畫的目的:促進個人的復原(recovery)(A)、提升生活品質(B)、提升參與治療(復健)的能力(C)，著重『功能恢復與生活適應』。而 D『增加藥物的成效』不是社區復健計畫的目的——藥物成效是藥物治療的範疇，復健著重的是『心理社會功能的復原』，非提升藥效。故 D 為錯誤者(本題選非目的)。","options":{"A":"促進個人的復原是社區復健的目的。","B":"提升生活品質是社區復健的目的。","C":"提升參與治療(復健)的能力是社區復健的目的。","D":"正確(本題選非目的者)。增加藥物成效屬藥物治療，非社區復健的目的。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神復健"]}},"104030-N5-35":{"quick":"社區復健原則＝促使個案主動參與照顧計畫。","detail":{"background":"精神社區復健的正確原則:(C)『促使個案主動參與自己的照顧計畫(以個案為中心、賦權、合作)』。其他錯誤:A『僅有少數個案具改變潛力』錯誤(復元理念相信每位病人都有復原潛能);B『照顧核心是減輕症狀』錯誤(復健核心是『功能恢復與生活適應』，非僅減症狀);D『就業能力是復健焦點』過於狹隘(復健是『全人』的功能復原，職業只是一面)。故 C 正確。","options":{"A":"復元理念相信每位病人都有復原潛能，非僅少數。","B":"復健核心是功能恢復與生活適應，非僅減輕症狀。","C":"正確。促使個案主動參與照顧計畫，以個案為中心。","D":"就業能力只是一面向，復健是全人功能復原。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神復健·復元"]}},"104100-N5-15":{"quick":"問判斷/定向/記憶/抽象等＝評估認知功能 JOMAC。","detail":{"background":"護理師問『東西不見怎麼辦(判斷力 Judgment)、知道這是哪裡嗎(定向 Orientation)、早餐吃什麼(記憶 Memory)、香蕉與蘋果的不同(抽象 Abstraction)』，這一系列問題在評估『認知功能 JOMAC』(Judgment 判斷、Orientation 定向、Memory 記憶、Abstraction 抽象、Calculation 計算)。病識感評估的是對疾病的認識;思考內容評估妄想;智力評估需標準化測驗。故 B 正確。","options":{"A":"病識感評估的是對疾病與治療的認識。","B":"正確。問判斷/定向/記憶/抽象，是評估認知功能 JOMAC。","C":"思考內容評估的是妄想等思考內容。","D":"智力評估需標準化智力測驗。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","JOMAC 認知評估"]}},"104100-N5-16":{"quick":"初診斷思覺失調、服藥穩定後的護理目標＝認識精神疾病及症狀處置。","detail":{"background":"小玲初診斷思覺失調、第一次住院、服藥後症狀漸穩定。此時最符合需求的護理目標是『協助其認識精神疾病及症狀的處置(病識感與自我管理)』——在症狀穩定後，協助病人理解疾病、辨識復發前兆、學習因應，是預防復發、邁向復原的關鍵。認知心理治療、建立自我照顧、強化家庭支持都重要，但對『初診斷、剛穩定』者，首要是建立對疾病的認識與症狀處置能力。故 C 正確。","options":{"A":"認知心理治療非剛穩定初診斷者的首要目標。","B":"建立自我照顧重要，但本題首要是認識疾病。","C":"正確。協助認識精神疾病及症狀處置，是初穩定期的護理目標。","D":"強化家庭支持重要，但非此時最符需求的首要目標。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思覺失調·病識感"]}},"104100-N5-17":{"quick":"「飯菜被敵營下藥」(被害妄想)：以反映回應「你很擔心這飯菜有毒而不敢吃?」","detail":{"background":"郭先生說「飯菜被敵營下藥、不能吃」是被害妄想。最適當回應是『不爭辯妄想內容，反映其背後的擔心/恐懼』:「你很擔心這飯菜有毒而不敢吃?」——同理其情緒、建立信任。A「你多慮了、不會有毒」是直接否定、爭辯;C「擔心就暫時不吃」雖尊重但可能助長拒食、未處理情緒;D「你有聽到誰說有毒?」帶質問、追問妄想細節。故 B 正確。對妄想宜反映情緒、不爭辯內容。","options":{"A":"「你多慮了、不會有毒」直接否定、與妄想爭辯。","B":"正確。反映其擔心「你很擔心飯菜有毒而不敢吃?」，同理情緒。","C":"「擔心就暫時不吃」可能助長拒食、未處理情緒。","D":"「你有聽到誰說有毒?」帶質問、追問妄想細節。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"104100-N5-23":{"quick":"懷疑家人偷存款簿、在飲食中下毒(脫離現實的錯誤信念)＝妄想。","detail":{"background":"蔣先生『愈來愈多疑，懷疑家人偷他的存款簿、在飲食中下毒』——是脫離現實、與事實不符卻堅信不移的錯誤信念，屬『妄想(delusion，被害型)』。意念飛躍是思考快速跳躍(躁症);似曾相識感(déjà vu)是覺得新經驗很熟悉;錯認(misidentification)是把人事物認錯。本題核心是『被害的錯誤信念』，故為妄想。","options":{"A":"意念飛躍是思考快速跳躍，常見於躁症。","B":"正確。懷疑被偷、被下毒的錯誤信念，是妄想(被害型)。","C":"似曾相識感是覺得新經驗很熟悉。","D":"錯認現象是把人事物認錯。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想"]}},"104100-N5-27":{"quick":"思覺失調主要症狀群：認知症狀②、正/負性症狀③、社會職業功能失調④(飲食障礙①非)。","detail":{"background":"思覺失調症的主要症狀群:(2)認知症狀(注意力、記憶、執行功能缺損);(3)正性症狀(幻覺妄想)與負性症狀(情感平淡、退縮);(4)社會/職業功能失調(功能退化)。而(1)『飲食障礙』不是思覺失調症的主要症狀群(那是飲食疾患)。故正確為②③④(選 B)。","options":{"A":"①②③：含敘述1(飲食障礙)，非思覺失調主要症狀群。","B":"正確。認知症狀②、正/負性症狀③、社會職業功能失調④。","C":"①②④：含敘述1，錯誤。","D":"①③④：含敘述1，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"104100-N5-33":{"quick":"慢性思覺失調、工作學習能力不足、保障就業＝庇護性工作。","detail":{"background":"王先生慢性思覺失調、有工作意願但工作學習能力不足。為保障其就業權利，最適合『庇護性工作(庇護工場，sheltered employment)』——在有支持、要求較低、有督導的環境中工作，並提供合理薪資，適合工作能力較弱者。無償工作、志工服務無薪資保障(不符「保障就業權利」);競爭性工作對能力不足者壓力過大、難以勝任。故 C 正確。","options":{"A":"無償工作無薪資保障，不符保障就業權利。","B":"志工服務無薪資，非就業權利的保障。","C":"正確。庇護性工作提供支持環境與合理薪資，適合工作能力不足者。","D":"競爭性工作對能力不足者壓力過大、難勝任。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","職業復健"]}},"105030-N5-5":{"quick":"「想法被放入」＝思考插入②；「別人知道我在想什麼」＝思考廣播③。","detail":{"background":"王先生的症狀:『有時感覺到有些想法不是自己的，而是別人硬放入給他的』=『思考插入(thought insertion)』(②);『別人都可以知道他在想什麼、知道他所有秘密』=『思考廣播(thought broadcasting)』(③)。連結鬆弛是思考不連貫(①，非本題);思考中斷是思考突然停止(④，非本題)。故正確為②③(選 B)。思考插入與思考廣播都是思覺失調症的『思考自我界限(ego boundary)』障礙。","options":{"A":"①②：含①連結鬆弛，本題無思考不連貫。","B":"正確。想法被放入=思考插入②、別人知道我想什麼=思考廣播③。","C":"③④：含④思考中斷，本題無思考突然停止。","D":"①④：皆非本題症狀。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思考自我界限障礙"]}},"105030-N5-8":{"quick":"思覺失調：多巴胺接受體在邊緣系統與基底核處都有增加。","detail":{"background":"思覺失調症的病因:(B)『多巴胺(D2)接受體在邊緣系統與基底核處都有增加(多巴胺活性過高)』，是多巴胺假說的神經病理證據。其他錯誤:A 思覺失調病人前額葉代謝『降低(hypofrontality)』，非增加;C 移民者往往社經階層『較低』、壓力大，思覺失調罹病率『較高』，非較低;D 人際關係理論認為思覺失調與『童年早期(非成年早期)』痛苦親子關係有關。故 B 正確。","options":{"A":"思覺失調病人前額葉代謝降低(hypofrontality)，非增加。","B":"正確。多巴胺接受體在邊緣系統與基底核處增加。","C":"移民者社經多較低、壓力大，罹病率較高，非較低。","D":"人際理論強調童年早期親子關係，非成年早期。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","多巴胺假說"]}},"105030-N5-13":{"quick":"評估幻聽妄想致暴力＝智能(認知/思考)層面的評估。","detail":{"background":"護理師評估彭小姐『可能受幻聽干擾或妄想，而出現潛在危險性暴力』——幻聽與妄想屬『思考與知覺』的異常，這是『智能(認知/精神狀態)層面』的評估(評估其思考內容、知覺、判斷力如何影響行為)。身體層面評估生理;情緒層面評估情感;社會層面評估人際與功能。本題評估的是幻聽妄想(認知/思考)導致暴力風險，故為智能層面。","options":{"A":"身體層面評估生理狀況。","B":"情緒層面評估情感狀態。","C":"正確。幻聽妄想屬思考/認知異常，是智能層面的評估。","D":"社會層面評估人際與社會功能。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神狀態評估"]}},"105030-N5-14":{"quick":"深信病友想偷地契(脫離現實的錯誤信念)＝思考內容變異問題。","detail":{"background":"魏小姐『深信隔壁病友想謀取她的房產、偷她的地契』——這是脫離現實、堅信不移的錯誤信念(被害妄想)，屬『思考內容變異(altered thought content)問題』。雖然她神情焦慮、想換房間(衍生出社交與情緒反應)，但其『最根本的健康問題』是妄想(思考內容變異)。感覺知覺變異是幻覺;病識感問題是對疾病的認識。故 C 正確。","options":{"A":"社交互動問題是衍生的反應，非根本問題。","B":"感覺知覺變異是幻覺，本題是妄想。","C":"正確。深信被偷地契的妄想，是思考內容變異問題。","D":"病識感問題是對疾病的認識，非本題核心。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思考內容障礙"]}},"105030-N5-29":{"quick":"社區精神第一級預防＝高危險群的教育。","detail":{"background":"社區精神醫學三級預防:第一級(初級)針對一般大眾與『高危險群』預防發生，如『高危險群的衛生教育』(A);第二級(次級)早期發現早期治療(門診心理治療);第三級(三級)復健(日間留院、創傷後心理復健)。故第一級預防為高危險群的教育。","options":{"A":"正確。高危險群的教育屬第一級(初級)預防。","B":"門診心理治療屬第二級(早期治療)。","C":"日間留院屬第三級(復健)。","D":"創傷後的心理復健屬第三級(復健)。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","三段五級預防"]}},"105030-N5-30":{"quick":"慢性精神病社區照護『不適當』＝停用藥物的準備。","detail":{"background":"林小姐慢性精神病、症狀持續干擾功能。適當的社區照護:增加治療的合作度(A)、協助發展社交技巧(B)、評估其需要與潛能(C)。而 D『停用藥物的準備』不適當——慢性精神病(尤其症狀仍干擾)需『持續、規則服藥』以維持穩定、預防復發，不應準備停藥。故 D 為不適當者。","options":{"A":"增加治療的合作度是適當的社區照護。","B":"協助發展社交技巧是適當的社區照護。","C":"評估其需要與潛能是適當的社區照護。","D":"正確(本題選不適當者)。症狀仍干擾的慢性病人需持續服藥，不應準備停藥。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥順從"]}},"105030-N5-31":{"quick":"症狀穩定、可自理、住康復之家的首要復健目標＝強化社區獨立生活的能力。","detail":{"background":"康復之家(half-way house)是症狀穩定、可自我照顧的精神病人由醫院過渡到社區的中途住所，其『首要復健目標』是『強化病人在社區中獨立生活的能力(生活技能、社交、自我管理)』。減少藥物劑量非復健目標(且須依醫囑);提升回家的成功機會、職場競爭力是後續或進一步目標。康復之家的核心是培養社區獨立生活能力。故 A 正確。","options":{"A":"正確。強化社區獨立生活的能力，是康復之家的首要復健目標。","B":"減少藥物劑量非復健目標，且須依醫囑。","C":"提升回家成功機會是後續目標，非首要。","D":"提升職場競爭力是進一步的目標，非首要。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","康復之家"]}},"105030-N5-32":{"quick":"精神護理之家的照顧＝第三級預防概念。","detail":{"background":"精神護理之家提供慢性、穩定但需長期照護的精神病人機構式照護，目的在維持功能、減少失能與復發，屬『第三級預防(復健)』——針對已患病者進行復健性照護。第一級是對大眾預防發生;第二級是早期發現早期治療。故為第三級預防。","options":{"A":"第一級是對大眾預防發生。","B":"第二級是早期發現早期治療。","C":"正確。精神護理之家提供復健性照護，屬第三級預防。","D":"三段五級無第四級。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","三段五級預防"]}},"105030-N5-34":{"quick":"認定配偶不忠而跟蹤調查＝嫉妒妄想型(jealous type)。","detail":{"background":"邱先生妄想症、『認定太太對自己不忠(紅杏出牆)而私下跟蹤調查』——這是對配偶不忠的妄想信念，屬妄想症的『嫉妒妄想型(jealous type，又稱 Othello syndrome)』。愛戀(情愛)妄想型是認為某人愛上自己;誇大妄想型是誇大身分能力;身體妄想型是認為身體有病變/異常。本題核心是『認定配偶不忠』，故為嫉妒妄想型。","options":{"A":"愛戀(情愛)妄想型是認為某人愛上自己。","B":"誇大妄想型是誇大自己的身分能力。","C":"正確。認定配偶不忠而跟蹤調查，是嫉妒妄想型。","D":"身體妄想型是認為身體有病變或異常。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症類型"]}},"105090-N5-6":{"quick":"「神明叫我解救世人、你們不信我」：以同理回應「你感覺很挫折沒人相信你」。","detail":{"background":"病人說「我聽到神明叫我解救世人，你們為什麼不相信我?」(宗教性幻聽/妄想，並感到不被相信而挫折)。最適當回應是『不爭辯內容，同理其挫折感受』:「你感覺很挫折，沒人相信你」——接納其情緒、建立信任。A「這是幻聽、不要相信它」直接否定;B「我完全同意你有聽到聲音」附和強化幻覺;C「好好休息明天就好了」是空泛保證、迴避。故 D 正確。對幻覺妄想宜同理情緒、不爭辯也不附和。","options":{"A":"「這是幻聽、不要相信它」直接否定其經驗。","B":"「我完全同意你有聽到聲音」附和、強化幻覺。","C":"「好好休息明天就好」是空泛保證、迴避。","D":"正確。同理其挫折「你感覺很挫折、沒人相信你」。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"105090-N5-7":{"quick":"感知外太空電波影響自己思想＝被控制妄想。","detail":{"background":"妄想描述的正確配對:(A)『感知外太空有電波/無線電波影響、控制自己的思想』，是『被控制妄想(delusion of control，被外力操控)』。其他錯誤:B『同事講笑話、喝飲料都和自己有關』是『關係妄想(delusion of reference)』，非誇大;C『認為伙食被下毒』是『被害妄想』，非虛無;D『收音機正在傳播自己剛想到的想法』是『思考廣播(thought broadcasting)』，非被害妄想。故 A 正確。","options":{"A":"正確。外太空電波影響/控制自己思想，是被控制妄想。","B":"凡事與自己有關是關係妄想，非誇大妄想。","C":"認為伙食被下毒是被害妄想，非虛無妄想。","D":"收音機傳播自己的想法是思考廣播，非被害妄想。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想類型"]}},"105090-N5-16":{"quick":"淡漠躺床、衣著髒亂有惡臭：最優先健康問題＝自我照顧問題。","detail":{"background":"趙先生慢性思覺失調、表情淡漠、躺床、少互動(負性症狀)、有傾聽自笑(幻聽但尚不影響他人)、『衣著髒亂、有惡臭(自我照顧嚴重缺失)』。依需求優先順序，最優先的健康問題是『自我照顧問題』——衣著髒亂、惡臭影響其基本衛生、健康與尊嚴，且幻聽尚不影響他人(非立即危險)。故 D 正確。對自我照顧嚴重缺失者，自我照顧(基本生理需求)優先處理。","options":{"A":"人際互動問題非最優先(無立即危害)。","B":"正性症狀(幻聽)尚不影響他人，非最優先。","C":"感覺知覺變異(幻聽)尚不影響他人，非最優先。","D":"正確。衣著髒亂、有惡臭，自我照顧問題最優先。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","負性症狀·自我照顧"]}},"105090-N5-18":{"quick":"對自語、側身傾聽(幻聽)的病人：鼓勵其表達幻聽經驗。","detail":{"background":"病人出現自言自語、側身傾聽(受幻聽影響)。護理師最合宜的措施是『鼓勵病人表達其幻聽經驗』——了解幻聽的內容(尤其有無命令性幻聽、傷人傷己內容)以評估安全，並讓病人感到被理解。A『尊重不詢問』會錯失評估安全的機會;C『給予保護隔離』過度(尚無危險);D『衛教妄想症狀自我處置』不符(這是幻覺非妄想，且時機不對)。故 B 正確。","options":{"A":"不詢問會錯失評估幻聽內容與安全的機會。","B":"正確。鼓勵病人表達幻聽經驗，以了解內容、評估安全。","C":"給予保護隔離過度，病人尚無危險。","D":"衛教妄想自我處置不符(此為幻覺、且時機不對)。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺護理"]}},"105090-N5-24":{"quick":"對立違拗(要他站他坐)的病人服藥：以堅定態度告知一定要服藥。","detail":{"background":"楊先生『要他站起來他就坐下、要他往前他往後(對立違拗 negativism)』。為使其順利服藥，最適宜是『以堅定、清楚、一致(matter-of-fact)的態度，告訴他一定要服藥』——對違拗病人，模糊或商量反而給其對抗空間，堅定明確的指示較有效。A『約定服藥給獎品』像賄賂、且違拗者未必配合;B『暫緩等他想吃』過於被動、易延誤;D『通知醫師處理』非護理師當下應採的第一措施。故 C 正確。","options":{"A":"約定給獎品像賄賂，違拗者未必配合。","B":"暫緩等他想吃過於被動，易延誤服藥。","C":"正確。對違拗病人以堅定、清楚、一致的態度告知一定要服藥。","D":"通知醫師非護理師當下的第一措施。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","違拗·服藥"]}},"105090-N5-34":{"quick":"中皮質(mesocortical)多巴胺分泌異常(偏低)＝情感平淡(負性症狀)。","detail":{"background":"多巴胺路徑與症狀:中腦『邊緣(mesolimbic)』路徑多巴胺『過高』→正性症狀(幻覺、妄想);中腦『皮質(mesocortical)』路徑多巴胺『過低』→負性症狀(情感平淡、動機缺乏、認知缺損)。故中皮質路徑多巴胺異常(偏低)時，較易出現『情感平淡』等負性症狀。幻覺、妄想、混亂行為屬正性症狀(與邊緣路徑多巴胺過高有關)。故 A 正確。","options":{"A":"正確。中皮質路徑多巴胺低，較易出現情感平淡(負性症狀)。","B":"幻覺屬正性症狀，與邊緣路徑多巴胺過高有關。","C":"妄想屬正性症狀，與邊緣路徑多巴胺過高有關。","D":"混亂行為屬正性症狀，與邊緣路徑多巴胺過高有關。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","多巴胺路徑"]}},"105090-N5-36":{"quick":"杯弓蛇影＝對外界刺激的錯誤知覺/解釋(錯覺 illusion)。","detail":{"background":"精神臨床表徵的正確配對:(B)『杯弓蛇影是病人對「真實的外界刺激(弓影)」產生錯誤的知覺或解釋(看成蛇)』，屬『錯覺(illusion)』。其他錯誤:A『談話一段段、欠缺關聯連貫』是『聯想鬆弛(loosening of association)』，非思考遲緩(思考遲緩是思考速度變慢);C『答非所問、語無倫次』最常見於『思覺失調症』，非情感障礙;D『談話到一半突然停下、無法接續』是『思考中斷(thought blocking)』，非答非所問。故 B 正確。","options":{"A":"一段段欠連貫是聯想鬆弛，非思考遲緩。","B":"正確。杯弓蛇影是對真實刺激的錯誤知覺，是錯覺(illusion)。","C":"答非所問、語無倫次最常見於思覺失調，非情感障礙。","D":"談話突然停下無法接續是思考中斷，非答非所問。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神症狀學"]}},"106030-N5-5":{"quick":"對病人的情感轉移(吵鬧依賴討好)：護理最不適宜＝用面質指責此行為影響治療關係。","detail":{"background":"謝先生對許護理師出現『吵鬧、依賴、討好』等行為，許護理師了解這是病人對她的『情感轉移』。對轉移的處理應『接納、理解並運用治療性方式處理』:支持性心理治療關懷紓解情緒(A)、安排環境治療鼓勵參與活動(B)、運用再教育性心理治療訓練其獨立自主(C)。而 D『運用面質指出此行為嚴重影響治療性關係』最不適宜——對轉移行為以面質指責會傷害關係、讓病人感到被否定，應以理解與引導處理。故 D 為最不適宜者。","options":{"A":"支持性心理治療關懷紓解情緒，適宜。","B":"安排環境治療鼓勵參與活動，適宜。","C":"運用再教育性心理治療訓練獨立自主，適宜。","D":"正確(本題選最不適宜者)。以面質指責轉移行為會傷害關係。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","轉移處理"]}},"106030-N5-9":{"quick":"精神評估：有志者事竟成=抽象①、今天發生的事=近期記憶②、台灣過年習俗=一般常識④(男女不同非判斷力③)。","detail":{"background":"精神護理評估問句的正確配對:(1)問「有志者事竟成的含義」=評估『抽象能力』;(2)問「今天一天中發生的事情」=評估『近期記憶』;(4)問「台灣過年時大家都會做什麼事」=評估『一般常識』。而(3)問「男人與女人有何不同」評估的是『抽象/相似性思考』，而非『判斷力』(判斷力應問面對情境如何處理)，故敘述3錯誤。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(男女不同屬抽象而非判斷力)，錯誤。","B":"正確。有志者事竟成=抽象①、今天的事=近期記憶②、過年習俗=一般常識④。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神狀態評估"]}},"106030-N5-15":{"quick":"散漫、不願參加活動：與病人討論安排日常作息、參與活動。","detail":{"background":"陳先生慢性思覺失調、散漫、不願參加活動(負性症狀)。最適合的護理是『與病人討論、共同安排日常生活作息，循序參與病房活動』——以協商、漸進、賦權的方式提升其參與。A『隨時陪在身邊督促』過度介入、像監督;C『接受這已是最好預後、不作為』是消極放棄;D『解釋規則活動的重要性以提升動機』方向對但較單向(共同討論安排比單向解釋更佳)。故 B 正確。對負性症狀宜協商、漸進、賦權。","options":{"A":"隨時督促過度介入，像監督，效果有限。","B":"正確。與病人討論安排日常作息、循序參與活動。","C":"「接受已是最好預後」是消極放棄，不當。","D":"單向解釋重要性不如共同討論安排來得適切。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","負性症狀護理"]}},"106030-N5-16":{"quick":"改善睡眠：安排參與病室活動、減少白天躺床時間。","detail":{"background":"王先生白天躺床、晚上睡不好(因白天睡太多、作息紊亂)。改善睡眠最適合『安排其參與病室活動、減少白天躺床時間』——增加日間活動量、建立規律作息，自然改善夜眠(睡眠衛生)。A『睡前吃點心』不利睡眠;B『不想睡也躺床』錯誤(躺床睡不著反增焦慮，睡眠衛生強調睏了才上床);C『晚餐後喝茶』含咖啡因，會影響睡眠。故 D 正確。改善睡眠的根本是規律作息、減少日間臥床。","options":{"A":"睡前吃點心不利於睡眠。","B":"不想睡也躺床會增加挫敗與焦慮，違反睡眠衛生。","C":"晚餐後喝茶含咖啡因，會影響睡眠。","D":"正確。安排參與活動、減少白天躺床，以規律作息改善睡眠。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","睡眠衛生"]}},"106030-N5-36":{"quick":"同意嘗試新藥計畫以控制症狀＝醫療(復元)模式。","detail":{"background":"王先生『同意接受醫師的新藥計畫、嘗試新型抗精神病藥來控制幻聽、且配合服藥』——以『藥物治療控制症狀』為核心的復元取向，屬『醫療模式(medical model)』。復健模式著重功能恢復與社會適應;賦權模式著重病人的自主與優勢;居家模式是照護場域。本題核心是『以新藥控制症狀』，故為醫療模式。","options":{"A":"正確。以新藥計畫控制症狀，屬醫療模式。","B":"復健模式著重功能恢復與社會適應。","C":"賦權模式著重病人的自主與優勢。","D":"居家模式是照護場域，非本題的治療取向。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","復元模式"]}},"106030-N5-39":{"quick":"被害妄想者持刀欲傷人：尋求人力支援、立即取走手上的水果刀。","detail":{"background":"李先生受被害妄想影響、持預藏水果刀要傷害「對他不利的人」(立即的傷人危險)。最適切處置是『尋求足夠人力支援，立即(安全地)取走個案手上的水果刀』——移除致命武器、確保安全是第一優先。B『請病人、家屬協助處置』錯誤(家屬可能受傷);C『口頭斥喝要放下刀子』會激怒、升高暴力;D『告知沒有人要對他不利、請他交出刀』是與妄想爭辯，且等待其交出有風險。故 A 正確。對持武器的暴力危機，安全移除武器、人力支援是首要。","options":{"A":"正確。尋求人力支援、立即安全取走水果刀，移除武器確保安全。","B":"請病人、家屬協助處置會使他人受傷。","C":"口頭斥喝會激怒、升高暴力。","D":"與妄想爭辯且等其交出刀有風險。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","暴力危機·武器"]}},"106110-N5-20":{"quick":"自稱幹員被下降頭(妄想)：傾聽黃先生的陳述。","detail":{"background":"黃先生妄想自己是調查局幹員、被下降頭。護理師最適當的反應是『傾聽其陳述』——不爭辯妄想內容、先了解並建立關係。A「並沒有下降頭這件事」雖同理害怕但仍否定其信念;B「調查局有南機組嗎?」是質疑、爭辯妄想細節;C「政治新聞對你影響很大」帶評判與引導。故 D 正確。對妄想宜先傾聽、不爭辯，建立信任後再處理。","options":{"A":"「並沒有下降頭」仍否定其信念，易引起防衛。","B":"質疑「調查局有南機組嗎」是爭辯妄想細節。","C":"「政治新聞對你影響很大」帶評判與引導。","D":"正確。先傾聽黃先生的陳述，不爭辯、建立關係。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"106110-N5-25":{"quick":"「女生聲音罵我好痛苦」：以同理回應「我可以感受你現在的痛苦」。","detail":{"background":"王先生有辱罵性幻聽、感到痛苦。最適當回應是『同理其痛苦感受』:「我可以感受你現在的痛苦」——接納情緒、建立信任。B「這個聲音是幻聽」直接貼標籤、否定其經驗;C「別理它就好了」輕忽、給無效建議;D「罵回去就不痛苦」是錯誤且強化與幻聽互動的建議。故 A 正確。對幻聽宜先同理痛苦、不否定也不附和。","options":{"A":"正確。同理其痛苦「我可以感受你現在的痛苦」，接納情緒。","B":"「這是幻聽」直接貼標籤、否定其經驗。","C":"「別理它就好」輕忽、給無效建議。","D":"「罵回去」是錯誤建議，強化與幻聽互動。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺護理"]}},"106111-N5-6":{"quick":"對牆自語、聽到女人聲音(幻聽)：以「這聲音對你有什麼影響」評估幻聽。","detail":{"background":"王先生受幻聽干擾、對牆喃喃自語、表示聽到女人的聲音。護理師正確的反應是『評估幻聽的內容與影響』:「這聲音對你有什麼影響?」——了解幻聽內容(尤其有無命令性、傷己傷人)以評估安全與護理需求。A『不予理會』錯失評估機會;B「這些聲音不存在」否定其經驗;D「嗯我知道了」敷衍、未進一步了解。故 C 正確。對幻聽宜評估其內容與影響，以掌握安全。","options":{"A":"不予理會錯失評估幻聽內容與安全的機會。","B":"「這些聲音不存在」否定病人的經驗。","C":"正確。以「這聲音對你有什麼影響」評估幻聽的內容與影響。","D":"「嗯我知道了」敷衍、未進一步了解。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺評估"]}},"106111-N5-10":{"quick":"DSM-5：亞斯伯格症不再是獨立診斷(併入自閉症類群障礙)。","detail":{"background":"精神疾病診斷分類的正確敘述:(B)『DSM-5 中亞斯伯格症(Asperger disorder)不再是一個獨立的診斷』，已併入「自閉症類群障礙症(ASD)」。其他錯誤:A 五軸診斷是『DSM-IV』的特色，DSM-5 已『取消多軸診斷』(非 DSM-5);C DSM-IV 的整體功能評估(GAF)中，『有傷害自己或他人的危險』評為『1~20 分』，非51~60分;D 思覺失調症『可以同時有』邊緣性人格障礙等共病診斷(非一定不會)。故 B 正確。","options":{"A":"五軸診斷是 DSM-IV 的特色，DSM-5 已取消多軸。","B":"正確。DSM-5 中亞斯伯格症不再是獨立診斷(併入 ASD)。","C":"有傷害自己他人危險的 GAF 評為1~20分，非51~60分。","D":"思覺失調可同時有邊緣性人格障礙共病。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5"]}},"106111-N5-13":{"quick":"言詞以相似讀音串聯、欠邏輯＝音韻連結(clang association)。","detail":{"background":"精神病理症狀的正確描述:(D)『言詞間以相似讀音(押韻)串聯、欠缺適當邏輯』稱『音韻連結(clang association)』。其他錯誤:A『跪地膜拜、不聽勸阻、與上帝對話』是『作態/僵直行為(或妄想)』，非阻抗(negativism 是抗拒指令);B『談話片段、關聯差、不連貫』是『聯想鬆弛』，非意念飛躍(意念飛躍是思考快速跳躍但仍有連結);C『細節過分詳盡、難說重點、耗時』是『贅述(circumstantiality)』，非語無倫次。故 D 正確。","options":{"A":"膜拜、與上帝對話是作態/妄想，非阻抗(negativism)。","B":"談話不連貫是聯想鬆弛，非意念飛躍。","C":"細節過分詳盡難說重點是贅述(circumstantiality)，非語無倫次。","D":"正確。以相似讀音串聯、欠邏輯，是音韻連結(clang association)。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思考形式障礙"]}},"106111-N5-18":{"quick":"正向症狀：自語自笑①、認為是羅志祥女友(妄想)③、膜拜行為④(多躺床②是負性)。","detail":{"background":"思覺失調症正向(正性)症狀是正常功能的扭曲或增加:(1)自言自語及自笑(受幻覺影響);(3)認為自己是某明星的女朋友(妄想);(4)出現膜拜行為(怪異行為)。而(2)『平日多躺床』屬負性症狀(動機缺乏、退縮)。故正向症狀為①③④(選 C)。","options":{"A":"①②③：含敘述2(多躺床)，屬負性症狀。","B":"②③④：含敘述2，錯誤。","C":"正確。自語自笑①、妄想③、膜拜行為④是正向症狀。","D":"①②④：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","正負性症狀"]}},"106111-N5-19":{"quick":"「腦子被裝雷達控制想法」(妄想)會談：傾聽並了解病人的想法。","detail":{"background":"林先生入院第1天、妄想「腦子被裝雷達控制想法」(被控制妄想)。會談時的正確護理是『傾聽並了解病人的想法』——先建立關係、了解其經驗，不爭辯妄想內容。A『指出現實與妄想之差別』是爭辯;C『以時間軸討論妄想內容及確認引發因子』在關係未建立前過早深掘妄想;D『增強驗證事實的能力』也是試圖糾正妄想、易引起防衛。故 B 正確。初期對妄想宜傾聽、了解、建立信任。","options":{"A":"指出現實與妄想差別是爭辯，易引起防衛。","B":"正確。傾聽並了解病人的想法，建立關係。","C":"會談初期以時間軸深掘妄想內容過早。","D":"增強驗證事實是試圖糾正妄想，易引起防衛。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症護理"]}},"107030-N5-6":{"quick":"Risperidone Consta(長效針劑)：油性緩釋①、注射後不可按摩③、限臀部深層肌肉注射④(推藥速度宜「慢」，②錯)。","detail":{"background":"長效針劑(如 Risperidone Consta，緩釋微球懸浮)的注射原則:(1)為緩釋(油性/微球)劑型;(2)推藥速度宜『快』，避免微球沉積堵塞針頭;(3)注射後『不可按摩』，以免加速吸收、影響緩釋效果。而(4)『限臀部深層肌肉注射』錯誤——長效針劑可注射於臀部或三角肌等深層肌肉，不限臀部。故正確為①②③(選 A)，並採 Z 字注射法。","options":{"A":"123：含敘述2(推藥宜快，錯誤;長效油性懸液應緩慢推注)，且缺敘述4。","B":"124：含敘述2(推藥宜快，錯誤)。","C":"正確。①油性緩釋、③注射後不可按摩、④限臀部深層肌肉注射皆對。","D":"234：含敘述2(推藥宜快，錯誤)。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","長效針劑"]}},"107030-N5-8":{"quick":"強迫症與血清素(serotonin)活性高低失調有關。","detail":{"background":"神經傳導物質與精神疾病的正確配對:(C)『強迫症(OCD)與血清素(serotonin)活性的失調有關』，故 SSRI 為其主要藥物。其他錯誤:A 阿茲海默症與『乙醯膽鹼(ACh)功能過低』最有關(非 GABA);B 思覺失調症與『多巴胺功能過高』有關(非乙醯膽鹼過低);D 焦慮症與『GABA 功能不足/血清素失調』有關(非多巴胺活性過高)。故 C 正確。","options":{"A":"阿茲海默症與乙醯膽鹼過低最有關，非 GABA。","B":"思覺失調症與多巴胺過高有關，非乙醯膽鹼過低。","C":"正確。強迫症與血清素活性高低失調有關。","D":"焦慮症與 GABA/血清素有關，非多巴胺過高。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","神經傳導物質"]}},"107030-N5-10":{"quick":"可自理、洗澡需催促的病人：請其準備洗澡用物去洗澡(引導自理)。","detail":{"background":"邱先生思覺失調、自我照顧大致可自理，惟洗澡需催促才能完成。最適宜是『請邱先生準備洗澡用物去洗澡』——以引導、督促的方式維持其『殘存的自理能力』，而非代勞。A『請家屬直接帶去洗』是代勞;C『請病友表達聞到異味以激勵』會羞辱病人、不當;D『尊重習慣、不強迫、待治療後改善』太消極、放任。故 B 正確。對能自理者，引導、督促以維持功能。","options":{"A":"請家屬帶去洗是代勞，未維持其自理能力。","B":"正確。請其準備洗澡用物去洗澡，引導維持自理能力。","C":"請病友表達異味會羞辱病人，不當。","D":"尊重習慣、不強迫太消極、放任。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","自我照顧"]}},"107030-N5-12":{"quick":"精神復健計畫主要項目：心理復健①、職能復健②、社會功能復健③(物理治療④非)。","detail":{"background":"思覺失調症的精神復健治療計畫主要項目:(1)心理復健;(2)職能復健(工作能力訓練);(3)社會功能復健(社交技巧、社區適應)。而(4)『物理治療復健』不是精神復健計畫的主要項目(物理治療屬肢體功能復健)。故正確為①②③(選 A)。精神復健著重心理、職能、社會功能的全面恢復。","options":{"A":"正確。心理復健①、職能復健②、社會功能復健③。","B":"①②④：含敘述4(物理治療)，非精神復健主項目。","C":"①③④：含敘述4，錯誤。","D":"②③④：含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神復健"]}},"107030-N5-13":{"quick":"監測精神病人劇渴大量飲水(水中毒)：估晝間體重增加%①、測尿比重②、抽血鈉③(血鉀④非主要)。","detail":{"background":"思覺失調症病人出現『劇渴、大量飲水(原發性煩渴/水中毒風險)』時的監測:(1)估計『晝間體重增加的百分比』(飲水過量會使體重上升，>7% 為危險);(2)測量『尿比重』(過度飲水會使尿比重降低);(3)抽驗『血鈉值』(水中毒會造成低血鈉)。而(4)『血鉀』非水中毒監測的主要項目(水中毒的核心是稀釋性低血鈉)。故正確為①②③(選 A)。","options":{"A":"正確。估晝間體重增加%①、測尿比重②、抽血鈉③。","B":"①②④：含敘述4(血鉀)，非水中毒主要監測。","C":"①③④：含敘述4，錯誤。","D":"②③④：含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","水中毒(原發性煩渴)"]}},"107030-N5-19":{"quick":"自稱孫悟空、打鬥、進食差、需提醒自理：最適切護理＝維持身體基本需求。","detail":{"background":"陳先生急性思覺失調、誇大妄想(自稱齊天大聖)、幻覺(看到觀世音)、活動量大打鬥、『無法安靜用餐、進食量差、需提醒才完成自我照顧』。依需求優先順序，最適切的護理目標是『維持身體基本需求(進食、營養、自我照顧、安全)』——急性期、進食差、自理需提醒，生理基本需求的維持是優先。區辨現實與幻覺、建立人際、增強自我肯定都須在生理需求穩定、症狀緩解後。故 C 正確。","options":{"A":"區辨現實與幻覺須在急性症狀緩解後。","B":"建立人際互動非急性期、進食差時的優先。","C":"正確。進食差、需提醒自理，維持身體基本需求最優先。","D":"增強自我肯定非急性期的優先目標。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"107030-N5-21":{"quick":"退縮、被欺負而不知如何求助：教導並示範到護理站如何尋求協助。","detail":{"background":"簡先生退縮、自信低、表達能力差、被病友欺負(打他搶食)卻不知如何向護理師說。最適切回應是『教導病人並示範到護理站時如何尋求協助』——以具體、可操作的方式增進其求助與自我保護的能力。B『要求施暴病友道歉』、C『安排兩人當面說明』可能讓退縮膽怯的病人更受壓、且未培養其能力;D『要有基本防禦能力』空泛且可能助長對抗。故 A 正確。對退縮、能力不足者，教導並示範具體技能最有幫助。","options":{"A":"正確。教導並示範到護理站如何尋求協助，培養其求助能力。","B":"要求施暴者道歉未培養病人的能力。","C":"安排當面說明可能讓退縮病人更受壓。","D":"「要有基本防禦能力」空泛、可能助長對抗。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"107030-N5-24":{"quick":"症狀穩定、參加社區工作坊的病人：加強個人衛生與建立生活作息。","detail":{"background":"陳女士症狀穩定、居家、參加社區工作坊與自我照顧技能訓練。最適宜的護理是『加強其個人衛生與建立規律生活作息』——這是社區復健中維持功能、培養獨立生活能力的核心。提供用藥監測雖重要但非此情境最相關;協助申請『競爭性』工作對其能力可能過高(宜循序);轉介護理之家(適應老年)不符其穩定參與社區復健的狀態。故 B 正確。","options":{"A":"用藥監測重要，但非社區復健此情境最相關的措施。","B":"正確。加強個人衛生與建立生活作息，維持功能與獨立生活能力。","C":"競爭性工作對其能力可能過高，宜循序漸進。","D":"轉介護理之家不符其穩定參與社區復健的狀態。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神復健"]}},"107030-N5-33":{"quick":"症狀穩定、可獨立生活訓練、但無法返家＝康復之家。","detail":{"background":"陳小姐症狀穩定、參加社區復健、可接受獨立生活能力訓練，但『無法返回自己家裡居住』(無家可回)。最適合的服務模式是『康復之家(half-way house)』——提供症狀穩定、有自我照顧能力但暫無家可回者『居住型』的過渡安置與獨立生活訓練。日間留院、社區復健中心是白天到院、晚上回家(需有住所);精神護理之家是給功能退化、需長期照護者。陳小姐需要『有居住功能且可做獨立生活訓練』，故為康復之家。","options":{"A":"日間留院是白天到院、晚上回家，需有住所。","B":"社區復健中心是白天活動、晚上回家，需有住所。","C":"精神護理之家給功能退化、需長期照護者，陳小姐功能尚可。","D":"正確。穩定、可獨立生活訓練但無家可回，最適合康復之家。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","康復之家"]}},"107030-N5-35":{"quick":"精神復健照顧慢性病患原則＝相信個案有成長改變的潛力、關注「希望」。","detail":{"background":"精神復健病房照顧慢性病患的正確原則:(D)『相信個案具有成長與改變的潛力，關注「希望」是基本要素』(復元理念)。其他錯誤:A『為避免反轉移而保持遠距離』錯誤(應建立治療性關係，反轉移靠自我覺察處理，非疏遠);B『照顧計畫由護理師主導規劃』錯誤(應與個案合作、以個案為中心);C『焦點在控制個案的疾病角色』錯誤(復健著重功能恢復與賦權，非控制疾病角色)。故 D 正確。","options":{"A":"應建立治療性關係，反轉移靠自我覺察處理，非保持遠距離。","B":"照顧計畫應與個案合作、以個案為中心，非護理師主導。","C":"復健著重功能恢復與賦權，非控制疾病角色。","D":"正確。相信個案有成長改變的潛力、關注希望，是基本要素。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","復元·精神復健"]}},"107110-N5-1":{"quick":"被害妄想對他人的敵意＝投射(projection)。","detail":{"background":"思覺失調症病人以『被害妄想』顯示對他人的敵意——把自己內在無法接受的『敵意/攻擊衝動』投射到他人身上、認為是「他人要害我」，這是『投射(projection)』，為妄想形成的核心防衛機轉。抵消是以行為抵消念頭;隔離是把情緒與事件分開;壓抑是有意識壓下念頭。本題核心是『把內在敵意投射成外在迫害』，故為投射。","options":{"A":"抵消是以行為象徵性抵消念頭。","B":"隔離是把情緒與事件記憶分開。","C":"壓抑是有意識地把念頭壓下。","D":"正確。把內在敵意投射成他人要害自己，是投射(projection)。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想·投射"]}},"107110-N5-3":{"quick":"去機構化後社區精神病人最適合安排＝社區復健機構。","detail":{"background":"去機構化使社區中需復健的精神病人增加，最適合的安排是『社區復健機構(社區復健中心、康復之家、庇護工場等)』——提供症狀穩定病人在社區中的復健與生活支持。社區型急性精神病房是處理急性發作;社區心理衛生中心是社區服務據點(非長期復健安置);自殺防治中心是針對自殺危機。對需『復健』的穩定社區精神病人，社區復健機構最適合。故 A 正確。","options":{"A":"正確。社區復健機構最適合需復健的社區精神病人。","B":"社區型急性精神病房是處理急性發作。","C":"社區心理衛生中心是服務據點，非長期復健安置。","D":"自殺防治中心針對自殺危機，非復健安置。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神復健"]}},"107110-N5-16":{"quick":"家人代為洗澡(過度涉入)：首要＝了解家屬感受，鼓勵讓病人自行沐浴。","detail":{"background":"伍先生功能尚可(外觀整齊、生活可自理)，但『每天下午四點等家人協助洗澡』——家人因愧疚而過度照顧(過度涉入)，反而阻礙病人發揮自理能力。照顧的首要任務是『了解家屬對個案發病的感受(愧疚)，並鼓勵家屬讓病人自行沐浴』——同理家屬、同時促進病人自理。B『讚賞家屬用心、支持透過照顧增進親子關係』反而強化過度照顧;C『增加探視』無助於自理;D『鼓勵個案向家屬表達謝意』偏離問題核心。故 A 正確。","options":{"A":"正確。了解家屬的愧疚感受，並鼓勵讓病人自行沐浴。","B":"讚賞、支持透過照顧增進關係反而強化過度照顧。","C":"增加探視無助於病人自理。","D":"鼓勵表達謝意偏離「促進自理」的問題核心。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","高情感表露·過度涉入"]}},"107110-N5-19":{"quick":"警戒心高、對陌生環境緊張的新入院病人：主動介紹自己並協助環境介紹。","detail":{"background":"王同學攻擊行為後被送入院、對陌生環境警戒心高、神情嚴肅、回應簡短。最適當護理是『護理師主動向病人介紹自己，並協助其環境介紹』——降低陌生與不安、提供現實感與安全感、建立初步信任。A『建議進保護室』過度(僅警戒緊張、無立即危險);C『引導到大廳活動』對警戒心高者過早、刺激過多;D『避免討論需求、儘量安排活動』忽視病人的需求與感受。故 B 正確。對緊張陌生的新病人，主動介紹、協助熟悉環境最適當。","options":{"A":"僅警戒緊張、無立即危險，建議進保護室過度。","B":"正確。主動介紹自己並協助環境介紹，降低陌生與不安。","C":"引導到大廳活動對警戒心高者過早、刺激過多。","D":"避免討論需求、儘量安排活動忽視病人感受。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"107110-N5-21":{"quick":"退化、來不及如廁而尿濕：每2小時帶病人如廁(定時如廁訓練)。","detail":{"background":"蔡女士思覺失調30年、自我照顧明顯退化、日間常來不及如廁而尿濕。最適當護理是『每2小時帶病人如廁(定時如廁訓練 scheduled toileting)』——主動定時提醒與帶領如廁，維持其膀胱控制與尊嚴。B『配戴尿布』是消極、易致皮膚問題與依賴;C『減少飲水量』錯誤(可能脫水);D『教導憋尿運動增加骨盆底肌』對認知退化者難以執行且非此問題的解法。故 A 正確。對退化致失禁者，定時如廁訓練是首選。","options":{"A":"正確。每2小時帶病人如廁(定時如廁訓練)，維持膀胱控制與尊嚴。","B":"配戴尿布消極、易致皮膚問題與依賴。","C":"減少飲水量可能造成脫水，不當。","D":"教導憋尿運動對認知退化者難執行，非此問題解法。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"107110-N5-32":{"quick":"出院藥物衛教：說明規律服藥的重要性與藥物可能的副作用。","detail":{"background":"施小姐初診斷思覺失調、即將出院，家屬藥物衛教最適當的是『說明規律服藥的重要性與藥物可能出現的副作用』——強調持續規則服藥以防復發，並讓家屬認識副作用以利及早因應(而非因副作用自行停藥)。A『功能退化需「立即」回診調藥』敘述不當;B『症狀穩定後可逐漸減藥』錯誤(需依醫囑、多需長期維持);C『拒藥時先停一兩餐再說服』錯誤(間斷服藥不利)。故 D 正確。","options":{"A":"「功能退化需立即回診調藥」敘述不當。","B":"症狀穩定後不可自行減藥，需依醫囑長期維持。","C":"拒藥時先停一兩餐再說服，間斷服藥不利。","D":"正確。說明規律服藥的重要性與藥物可能的副作用。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥衛教"]}},"107110-N5-36":{"quick":"住宿型精神復健機構(康復之家)：可提供獨立生活訓練與異常事件處理。","detail":{"background":"住宿型精神復健機構(康復之家)的正確敘述:(D)『可提供獨立生活訓練，並處理異常事件』，協助病人過渡到社區獨立生活。其他錯誤:A『別名為社區復健中心』錯誤(社區復健中心是日間型，住宿型是康復之家);B『「必定」會參與職前工作訓練』過於絕對(依個別需求);C『較多限制的住宅環境』錯誤——康復之家是『較少限制(less restrictive)』、接近一般家庭的環境。故 D 正確。","options":{"A":"住宿型是康復之家，社區復健中心是日間型，名稱不同。","B":"「必定參與職前訓練」過於絕對，依個別需求。","C":"康復之家是較少限制的住宅環境，非較多限制。","D":"正確。可提供獨立生活訓練與異常事件的處理。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","康復之家"]}},"108110-N5-7":{"quick":"「身體裡沒有消化器官」而不進食＝虛無(nihilistic)妄想。","detail":{"background":"病人堅信『自己身體裡已經沒有消化器官』(否定身體器官存在)而不進食，屬『虛無妄想(nihilistic delusion)』——認為自己、身體的某部分、或世界不存在/已毀滅。誇大妄想是誇大身分能力;身體妄想是認為身體有病變/異常(器官「有」問題，非「不存在」);關係妄想是凡事與自己有關。本題核心是『否定器官存在』，故為虛無妄想。","options":{"A":"誇大妄想是誇大自己的身分或能力。","B":"正確。堅信身體沒有消化器官(否定器官存在)，是虛無妄想。","C":"身體妄想是認為身體有病變/異常，而非器官「不存在」。","D":"關係妄想是凡事與自己有關。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想類型"]}},"108110-N5-15":{"quick":"病人取藥未服下就離開：要確認病人確實服下藥物。","detail":{"background":"執行給藥時發現病人取藥後未服下、轉身離開——精神科病人可能藏藥(cheeking)。最適當的護理措施是『確認病人確實服下藥物』(可請其張口檢查、給予口服液或必要時改劑型)，確保藥物確實服用。通知醫師改針劑、磨粉、提供衛教都是後續或非當下首要;當務之急是『確認服下』，防藏藥導致治療中斷或囤積。故 D 正確。","options":{"A":"通知醫師改針劑是後續考量，非當下首要。","B":"磨粉是方法之一，但當下首要是確認服下。","C":"提供衛教非此刻當務之急。","D":"正確。要確認病人確實服下藥物，防藏藥。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥安全"]}},"108110-N5-16":{"quick":"自笑自語、衣服異味、躺床少互動：精神復健目標優先＝改善日常生活功能。","detail":{"background":"林小姐在精神復健病房、有自笑自語(殘餘症狀)、『衣服有異味、病床凌亂、常躺床少互動(自我照顧與功能缺損)』。精神復健階段的目標優先是『改善日常生活功能(自我照顧、作息、環境整理)』——這是復健病房的核心。積極/改善「急性」精神症狀屬急性期治療(病人已在復健病房);增進人際互動技巧是後續。對復健期、自我照顧缺損的病人，改善日常生活功能優先。故 B 正確。","options":{"A":"積極治療精神症狀屬急性期，病人已在復健病房。","B":"正確。改善日常生活功能(自我照顧、作息)是精神復健的優先目標。","C":"增進人際互動技巧是後續目標。","D":"改善急性精神症狀屬急性期治療，非復健優先。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神復健"]}},"108110-N5-23":{"quick":"思覺失調的生物成因＝主要與多巴胺不平衡有關。","detail":{"background":"思覺失調症的生物成因『主要與多巴胺(dopamine)不平衡有關』(邊緣路徑過高致正性症狀、皮質路徑過低致負性症狀)。其他錯誤:B 思覺失調病人『側腦室擴大(非萎縮)』，腦組織體積減少;C 與『GABA 過多』無直接關係;D 負性症狀主要與『前額葉(皮質)功能低下』有關，而非「邊緣系統異常」(邊緣系統多巴胺過高與正性症狀有關)。故 A 正確。","options":{"A":"正確。思覺失調的生物成因主要與多巴胺不平衡有關。","B":"思覺失調病人側腦室擴大，非萎縮。","C":"與 GABA 過多無直接關係。","D":"負性症狀與前額葉功能低下有關，非邊緣系統。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","多巴胺假說"]}},"108110-N5-24":{"quick":"幻聽改善、準備出院的病人：與病人討論處理幻聽的方法。","detail":{"background":"呂小姐幻聽改善、即將出院、仍偶有殘餘幻聽。最適切是『與病人討論處理幻聽的方法(因應策略)』——協助其在出院後能自我管理殘餘症狀、辨識惡化前兆，是預防復發的重要準備。A『澄清這裡只有我跟你、沒聽到聲音』否定其經驗;B『隨時詢問幻聽內容』過度關注;D『那不是真實的』貼標籤、否定。故 C 正確。對症狀改善準備出院者，重點是教導因應與自我管理。","options":{"A":"「沒聽到聲音」否定病人的經驗。","B":"隨時詢問幻聽內容過度關注、不利出院準備。","C":"正確。與病人討論處理幻聽的方法，協助自我管理。","D":"「那不是真實的」貼標籤、否定其經驗。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺·因應"]}},"109030-N5-2":{"quick":"社區復健中心收案：符合精神科診斷①、症狀穩定②、有復健動機潛能③、可主動服藥規律門診⑥。","detail":{"background":"社區復健中心(日間型復健)的收案條件:(1)符合精神科診斷;(2)精神症狀穩定;(3)具有復健動機與潛能;(6)可主動服藥及規律門診追蹤。而(4)『需安排中途之家者』與(5)『需有家屬接送者』不是收案條件(中途之家是另一種安置;能否來院不以「需家屬接送」為條件)。故正確為①②③⑥(選 C)。","options":{"A":"1234：含④(需中途之家)，非收案條件。","B":"1235：含⑤(需家屬接送)，非收案條件。","C":"正確。符合診斷①、症狀穩定②、有復健動機潛能③、可主動服藥規律門診⑥。","D":"2356：缺①(符合精神科診斷)，且含⑤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神復健"]}},"109030-N5-5":{"quick":"「別人都知道我在想什麼、知道我的秘密」＝思考廣播(thought broadcasting)。","detail":{"background":"林先生說『我都沒跟別人說話，但別人都可以知道我在想什麼、知道我所有秘密』——認為自己的思想會『向外播送、被他人知悉』，屬『思考廣播(thought broadcasting)』，為思覺失調症的思考自我界限障礙。思考插入是覺得想法被放入;思考中斷是思考突然停止;思考抽離是覺得想法被抽走。本題核心是『思想被他人知悉』，故為思考廣播。","options":{"A":"思考插入是覺得想法被別人放入。","B":"思考中斷是思考突然停止、無法接續。","C":"思考抽離是覺得自己的想法被抽走。","D":"正確。認為別人都知道自己在想什麼，是思考廣播。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思考自我界限障礙"]}},"109030-N5-6":{"quick":"問「獨處時是否聽到有人對她說話」(評估幻聽)＝智能層面的評估。","detail":{"background":"護理師問王小姐『是不是在獨處時會聽到有人對她說話』，是在評估『幻聽(知覺障礙)』，屬整體性護理評估的『智能(認知/精神狀態)層面』(評估思考、知覺、認知功能)。情緒層面評估情感;靈性層面評估信仰與生命意義;社交層面評估人際與功能。本題評估的是幻聽(知覺/認知)，故為智能層面。","options":{"A":"情緒層面評估情感狀態。","B":"正確。評估幻聽屬知覺/認知，是智能層面的評估。","C":"靈性層面評估信仰與生命意義。","D":"社交層面評估人際與社會功能。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神狀態評估"]}},"109030-N5-16":{"quick":"妄想、拒參加活動只願留房：安排固定護理師每日持續陪伴並給予關心。","detail":{"background":"張先生妄想「病房內的人都要害他」而拒絕活動、只願留房(多疑退縮)。最適宜是『安排固定的護理師，每日持續陪伴並給予關心』——以固定、可預期、不具威脅的方式建立信任。A『先不理他、只用監視器』是放棄關係建立;C『訂契約「參加活動就出院」』是不實承諾、條件交換;D『請病友邀請、工作人員先不接觸』把責任丟給病友、未由專業建立關係。故 B 正確。對多疑退縮者，固定照護者持續陪伴是建立信任的關鍵。","options":{"A":"只用監視器、先不理他是放棄關係建立。","B":"正確。安排固定護理師每日持續陪伴並給予關心，建立信任。","C":"「參加活動就出院」是不實承諾、條件交換。","D":"請病友邀請、工作人員不接觸，未由專業建立關係。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症護理"]}},"109030-N5-20":{"quick":"自行中斷服藥的藥物指導：家人完整衛教②、確定病人知道治療③、記下用藥感受④(代勞備藥①非)。","detail":{"background":"周先生因自行中斷服藥重複住院。藥物護理指導:(2)提供家人完整的衛教(協助監督與支持);(3)確定病人知道自己所接受的治療(增進病識感與服藥動機);(4)建議病人記下用藥後的感受(自我監測、利於溝通)。而(1)『幫病人備好藥物』錯誤——應培養病人『自我管理服藥』的能力(自行備藥、按時服用)，代勞反而使其依賴、不利長期。故正確為②③④(選 D)。","options":{"A":"①②③：含敘述1(幫病人備藥/代勞)，不利自我管理。","B":"①②④：含敘述1，錯誤。","C":"①③④：含敘述1，錯誤。","D":"正確。家人完整衛教②、確定病人知道治療③、記下用藥感受④。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥順從"]}},"109030-N5-22":{"quick":"思覺失調的負性症狀＝表情淡漠(情感平淡)。","detail":{"background":"思覺失調症的負性症狀是正常功能的『減少或缺失』:情感平淡(表情淡漠)、動機缺乏、社交退縮、思考貧乏、無快感。故『表情淡漠』屬負性症狀。而被害妄想、聽幻覺、思考被廣播都是『正性症狀』(正常功能的扭曲或增加)。故 C 正確。","options":{"A":"被害妄想屬正性症狀。","B":"聽幻覺屬正性症狀。","C":"正確。表情淡漠(情感平淡)是負性症狀。","D":"思考被廣播屬正性症狀。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","正負性症狀"]}},"109030-N5-34":{"quick":"三級預防的工作目的強調復健。","detail":{"background":"社區精神心理衛生三段預防:(A)三級(段)預防的工作目的『強調復健』(對已患病者進行復健、減少失能、防止復發)，正確。其他錯誤:B『及早治療、減輕痛苦、恢復功能』是『次級』預防的重點，非初級(初級是預防發生);C『協助培養生活技能、及早回社區』偏向『三級復健』，非次級;D『庇護工廠、日間留院』屬『三級(復健)』機構，非二級。故 A 正確。","options":{"A":"正確。三級預防的工作目的強調復健。","B":"及早治療、恢復功能是次級預防的重點，非初級。","C":"培養生活技能、回社區偏三級復健，非次級。","D":"庇護工廠、日間留院屬三級復健機構，非二級。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","三段五級預防"]}},"109030-N5-38":{"quick":"「思覺失調病人早年經歷痛苦親子關係」＝沙利文(Sullivan)人際關係理論。","detail":{"background":"人際關係理論探討思覺失調症的病因，指出『思覺失調症病人早年大多經歷過痛苦的親子(人際)關係』，這是『沙利文(Sullivan)』人際關係理論的觀點(強調早期人際關係對人格與精神病理的影響)。佛洛伊德是精神分析(潛意識);李茲(Lidz)提出家庭婚姻偏斜/分裂;克雷佩林是描述性精神醫學分類。故 B 正確。","options":{"A":"佛洛伊德是精神分析(潛意識衝突)。","B":"正確。早年痛苦親子關係致病是沙利文(Sullivan)人際關係理論。","C":"李茲提出家庭婚姻偏斜/分裂理論。","D":"克雷佩林是描述性精神醫學分類之父。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","Sullivan 人際理論"]}},"109110-N5-14":{"quick":"電視/收音機/報紙的內容與自己有關＝關係妄想(delusion of reference)。","detail":{"background":"精神病理症狀的正確描述:(A)『認為電視、收音機、報紙所載內容與自己有關』是『關係妄想(delusion of reference)』。其他錯誤:B『思想與感受隨時被他人知悉』是『思考廣播』，非被控妄想;C『變強大是因腦被植入晶片、心臟被放節律器』是『被控制妄想』，非虛無妄想;D『護理師微笑就是愛上他、想交往』是『情愛(erotomanic)妄想』，非誇大妄想。故 A 正確。","options":{"A":"正確。電視收音機報紙的內容與自己有關，是關係妄想。","B":"思想被他人知悉是思考廣播，非被控妄想。","C":"腦植晶片、心臟節律器是被控制妄想，非虛無妄想。","D":"微笑就愛上他是情愛妄想，非誇大妄想。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想類型"]}},"109110-N5-20":{"quick":"懷疑飯菜被下毒拒食：依個案要求購買罐裝(包裝完整)食物。","detail":{"background":"許太太被害妄想、懷疑飯菜被下毒而拒食，告知未下毒仍不願進食。最適合的措施是『依個案要求，購買罐裝(包裝完整、未開封)食物』——由病人確認包裝完整可減少被下毒的疑慮、提高進食意願。B『工作人員坐旁邊確保安全感』未必對多疑者有效、可能更疑;C『戴手套口罩拿餐點』反而像在「處理有毒物」、強化疑慮;D『帶外出到餐廳』不切實際且仍可能疑。故 A 正確。對被害拒食者，提供包裝完整、由病人掌控的食物。","options":{"A":"正確。購買罐裝(包裝完整)食物，由病人確認以減少被下毒疑慮。","B":"坐旁邊未必有效，多疑者可能更疑。","C":"戴手套口罩反而像在處理有毒物、強化疑慮。","D":"帶外出到餐廳不切實際，仍可能疑。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","被害妄想·拒食"]}},"109110-N5-21":{"quick":"幻聽罵「醜女人」而痛苦：同理並探討「妳似乎很在意別人對外表的批評?」","detail":{"background":"蔡小姐幻聽「有人罵自己醜女人」而痛苦。最適切回應是『同理其感受並引導探討』:「妳似乎很在意別人對妳外表的批評?願意談談妳對自己外表的看法嗎?」——接納情緒、進一步了解其自我概念與內在困擾。A『直接說那是幻聽、請轉移注意力』貼標籤、給無效建議;C『妳認為自己很醜嗎?』太直接、可能傷自尊;D『進保護室減少刺激』過度(無危險)。故 B 正確。對受幻聽困擾者，先同理再探討內在感受。","options":{"A":"直接說「那是幻聽」貼標籤、給無效建議。","B":"正確。同理並探討「妳似乎很在意外表的批評?願意談談妳對自己外表的看法?」","C":"「妳認為自己很醜嗎」太直接、可能傷自尊。","D":"進保護室過度，病人無危險。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺·同理"]}},"109110-N5-22":{"quick":"幻聽(觀音菩薩跟她說話)：以「那個聲音在跟妳說什麼?」回應。","detail":{"background":"方小姐幻聽、表示『觀音菩薩正在跟她說話』。護理師較適當的回應是『那個聲音在跟妳說什麼?』——用『中性的「聲音」』來指稱(不附和「觀音菩薩/神明」以免強化妄想，也不直接說「幻聽」以免否定其經驗)，並了解幻聽內容(評估安全)。A「觀音菩薩要妳做什麼?」與 C「神明在指示妳什麼?」附和了其神明信念;D「那個幻聽在跟妳說什麼?」直接貼標籤。故 B 正確。對幻聽宜以中性「聲音」指稱、了解內容。","options":{"A":"「觀音菩薩要妳做什麼」附和其神明信念。","B":"正確。以中性「那個聲音在跟妳說什麼?」了解幻聽內容，不附和也不否定。","C":"「神明在指示妳什麼」附和其神明信念。","D":"「那個幻聽」直接貼標籤、否定其經驗。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺·溝通"]}},"109110-N5-25":{"quick":"部分自我照顧能力不足：逐步引導陳女士準備洗澡用物。","detail":{"background":"陳女士思覺失調、無明顯急性症狀、『部分自我照顧能力不足』。最適合的護理是『逐步引導陳女士準備洗澡用物(分解步驟、引導其執行)』——以引導而非代勞的方式，維持並提升其殘存的自理能力。A『餵她吃飯』、C『請家屬幫洗澡』、D『付費請病友幫洗衣』都是『代勞』，會加速失能、剝奪其自理機會。故 B 正確。對部分自理不足者，引導、協助以維持功能。","options":{"A":"餵她吃飯是代勞，會加速失能。","B":"正確。逐步引導陳女士準備洗澡用物，維持並提升自理能力。","C":"請家屬幫洗澡是代勞，剝奪自理機會。","D":"付費請病友幫洗衣是代勞，且不當。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","自我照顧"]}},"109110-N5-28":{"quick":"妄想、會談中哭泣：陪伴並傾聽病人的表達及感受。","detail":{"background":"王同學妄想(同學忌妒中傷、老師被挑撥針對他)、會談中哭泣(情緒外露)。此時護理師最適切的措施是『陪伴並傾聽病人的表達及感受』——接納其情緒、提供支持、建立關係(不爭辯妄想)。A『探討妄想症狀的原因』是分析、深掘;B『分享自己失敗經驗、保證絕對可以走過』把焦點轉到護理師、且空泛保證;C『為何大家都針對你而不針對別人?』是質疑、引導其面質妄想，會升高防衛。故 D 正確。對情緒外露的妄想病人，先陪伴傾聽、接納情緒。","options":{"A":"探討妄想原因是分析深掘，非當下適切。","B":"分享自己失敗經驗、空泛保證，把焦點轉到護理師。","C":"「為何大家都針對你」是質疑、面質妄想，升高防衛。","D":"正確。陪伴並傾聽病人的表達及感受，接納情緒。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"109110-N5-36":{"quick":"透過協助了解問題、激發改變動機、享有自決＝賦能模式。","detail":{"background":"王小姐參與社區俱樂部，『透過工作人員協助了解自己的問題、激發想改變的動機、並享有自決的能力』——這種強調病人『自主、自決、賦權、優勢』的復元取向，屬『賦能(empowerment)模式』。醫療模式著重藥物控制症狀;復健模式著重功能訓練;機構模式是機構式照護。本題核心是『自決與賦權』，故為賦能模式。","options":{"A":"醫療模式著重藥物控制症狀。","B":"復健模式著重功能訓練與社會適應。","C":"正確。透過協助激發動機、享有自決，是賦能(empowerment)模式。","D":"機構模式是機構式照護，非本題取向。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","賦能模式"]}},"109110-N5-40":{"quick":"不洗澡有異味、房間堆滿雜物：最需要的照護＝生活自我管理。","detail":{"background":"張先生參與日間留院、『不常洗澡有異味、房間堆滿雜物(自我照顧與生活管理缺損)』。最需要的照護是『生活自我管理(自我照顧、環境整理、作息)』——這是其當前最明顯的功能缺損。安排社會參與、轉介庇護性工作是後續的社會/職業復健;進行危機處置不符(無危機)。對生活自理缺損者，生活自我管理是首要照護。故 A 正確。","options":{"A":"正確。不洗澡、房間堆雜物，最需要生活自我管理的照護。","B":"安排社會參與是後續的社會復健。","C":"轉介庇護性工作是後續的職業復健。","D":"無危機情境，不需危機處置。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","生活自我管理"]}},"110030-N5-3":{"quick":"認為鄰居在 LINE 群組說他壞話而作勢攻擊＝關係妄想(delusion of reference)。","detail":{"background":"黃先生思覺失調、案母過世後失去服藥提醒(可能停藥復發)、『認為鄰居透過社區 LINE 群組說他的壞話』而作勢攻擊——把『與自己無關的事(群組訊息)解讀為針對自己』，屬『關係妄想(delusion of reference)』。誇大妄想是誇大身分能力;虛無妄想是否定存在;嫉妒妄想是認為配偶不忠。本題核心是『把外界事物解讀為針對自己』，故為關係妄想。","options":{"A":"正確。認為群組訊息在說他壞話(把無關事解讀為針對自己)，是關係妄想。","B":"誇大妄想是誇大身分能力。","C":"虛無妄想是否定自己/世界存在。","D":"嫉妒妄想是認為配偶不忠。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想類型"]}},"110030-N5-6":{"quick":"對幻聽、被害妄想病人溝通：呈現現實「這裡除了我和你，並沒有其他人在說話」。","detail":{"background":"對有幻聽、被害妄想的病人溝通，較適當的是『呈現客觀現實，但不否定其感受』:「這裡除了我和你，並沒有其他人在說話」——溫和地呈現現實、不爭辯、不附和。其他錯誤:B「其實這是你的想像」、C「你還活得好好的」都是『爭辯、否定妄想』，會升高防衛;D「你這是幻聽、妄想的精神症狀」是直接貼標籤、否定其經驗。故 A 正確。對幻覺妄想宜溫和呈現現實、不爭辯也不貼標籤。","options":{"A":"正確。溫和呈現現實「這裡除了我和你，沒有其他人在說話」，不爭辯不附和。","B":"「這是你的想像」是爭辯、否定妄想。","C":"「你還活得好好的」是爭辯妄想。","D":"「你這是幻聽妄想精神症狀」直接貼標籤、否定。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"110030-N5-10":{"quick":"病人不斷敘述妄想內容：引導其談與妄想內容有關的情緒與感受。","detail":{"background":"當思覺失調病人『不斷敘述妄想內容』時，較適當的護理是『引導病人談與妄想內容有關的「情緒與感受」』——把焦點從妄想的「內容」轉到其背後的「情緒(害怕、焦慮)」，既不爭辯內容也不強化妄想。B『告訴他不要胡思亂想』是否定、命令;C『強烈質疑妄想內容讓他自我矛盾』是攻擊性的面質，會升高防衛;D『儘量不討論以免加重』是迴避、忽視病人。故 A 正確。對妄想宜聚焦情緒、不爭辯內容。","options":{"A":"正確。引導病人談與妄想有關的情緒與感受，聚焦情緒不爭辯內容。","B":"「不要胡思亂想」是否定、命令。","C":"強烈質疑妄想內容是攻擊性面質，升高防衛。","D":"儘量不討論是迴避、忽視病人。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症護理"]}},"110030-N5-13":{"quick":"被害妄想、不敢睡的病人照護：同理接受感受①、評估妄想干擾程度③、不爭辯真實性④(過度主動接觸②不宜)。","detail":{"background":"王先生被害妄想(覺得有人要害他、跟蹤他)、不敢睡。適當照護:(1)同理並接受病人的感受(不否定其情緒);(3)評估妄想對病人生活干擾的程度(以了解護理需求);(4)不要與病人爭辯妄想的真實性。而(2)『主動積極接觸關懷病人』對多疑、被害的病人較不宜——過度主動、靠近會增加其被害感與防衛，應『漸進、保持適度距離』。故正確為①③④(選 C)。","options":{"A":"①②③：含敘述2(主動積極接觸)，對多疑者過度。","B":"①②④：含敘述2，錯誤。","C":"正確。同理接受感受①、評估妄想干擾程度③、不爭辯真實性④。","D":"②③④：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","被害妄想護理"]}},"110030-N5-14":{"quick":"妄想症：人格異常是其危險因子之一。","detail":{"background":"妄想症(delusional disorder)的正確敘述:(B)『人格異常(如妄想型/猜疑型人格)是妄想症的危險因子之一』。其他錯誤:A 妄想症的妄想須『持續至少1個月』，非兩週;C『導因於物質使用或身體病況的生理效應』是『排除條件』(若由物質/疾病引起則不診斷為妄想症，而是其他診斷)，非妄想症的特徵;D 妄想症病人的行為與功能『大致正常、不明顯奇特或怪異』(僅妄想本身脫離現實)，與思覺失調的怪異行為不同。故 B 正確。","options":{"A":"妄想症的妄想須持續至少1個月，非兩週。","B":"正確。人格異常是妄想症的危險因子之一。","C":"由物質/疾病引起是排除條件，非妄想症特徵。","D":"妄想症病人行為大致正常，不明顯奇特怪異。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症"]}},"110030-N5-16":{"quick":"妄想症伙食被下毒拒食：安排固定護理師照顧、培養信任感。","detail":{"background":"王小姐妄想症、認為伙食被下毒而拒食。最適切是『安排固定的護理師照顧，培養信任感』——以一致、可預期的照護者建立治療性信任關係，是處理被害妄想拒食的根本。B『扶著手餵食』侵犯、強迫;C『保證沒毒、請病人不必多想』是爭辯、否定;D『護理師直接食用以證明沒毒』是進入妄想邏輯、且仍無法說服。故 A 正確。對妄想拒食宜先建立信任，再循序引導。","options":{"A":"正確。安排固定護理師照顧、培養信任感，是處理妄想拒食的根本。","B":"扶手餵食是侵犯、強迫。","C":"保證沒毒、請病人不必多想是爭辯、否定。","D":"直接食用證明沒毒是進入妄想邏輯，仍難說服。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","被害妄想"]}},"110030-N5-37":{"quick":"穩定慢性思覺失調至社區復健中心持續照護＝三級預防。","detail":{"background":"提供症狀穩定的慢性思覺失調病人到社區復健中心持續復健，是對『已患病者進行復健、減少失能、防止復發』，屬『三級預防』。初級預防是預防發生(高危險群教育);次級預防是早期發現早期治療;危機處置是處理急性危機。社區復健中心的持續復健屬三級預防。故 C 正確。","options":{"A":"初級預防是預防疾病發生。","B":"次級預防是早期發現早期治療。","C":"正確。社區復健中心的持續復健，屬三級預防。","D":"危機處置是處理急性危機，非本題。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","三段五級預防"]}},"110030-N5-39":{"quick":"被害妄想、激躁拍門威脅病友：勿單獨前去，召來足夠支援人力。","detail":{"background":"張先生被害妄想、強制住院後激躁不安、拍門、對病友口出威脅(暴力風險高)。應立即採取的措施是『醫護人員勿單獨前去處理，召來足夠支援人力』——確保人員與病友安全是首要(足夠人力可降低衝突、安全管控)。B『請家屬安撫』家屬可能受傷或無法控制;C『站在病人後面、儘量靠近』危險(背後接近、過近會激化、且不利防衛);D『儘量滿足所有要求』錯誤(不應無原則退讓)。故 A 正確。對暴力危機，足夠人力支援、確保安全為第一。","options":{"A":"正確。勿單獨前去、召來足夠支援人力，確保安全。","B":"請家屬安撫，家屬可能受傷或無法控制。","C":"站背後、過近會激化且不利防衛，危險。","D":"儘量滿足所有要求是無原則退讓，不當。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","暴力危機"]}},"110110-N5-2":{"quick":"症狀穩定、剛轉入康復之家：首要復健目標＝協助提升社區生活的能力。","detail":{"background":"症狀穩定、生活可自理、剛轉入康復之家的病人，首要復健目標是『協助個案提升社區生活的能力(生活技能、社交、自我管理)』——康復之家的核心是培養社區獨立生活能力。減少藥物劑量須依醫囑、非復健目標;提升及早返家機會、職場工作適應是後續或進一步目標。故 A 正確。","options":{"A":"正確。協助提升社區生活的能力，是康復之家的首要復健目標。","B":"減少藥物劑量須依醫囑，非復健目標。","C":"及早返家是後續目標，非首要。","D":"職場工作適應是進一步的目標，非首要。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","康復之家"]}},"110110-N5-4":{"quick":"看到不存在的蟑螂並堅信＝幻覺(視幻覺，hallucination)。","detail":{"background":"吳女士『看到桌上有許多蟑螂(實際沒有)、並堅持看到』——在『沒有真實外界刺激下產生的知覺』，屬『幻覺(hallucination，本題為視幻覺)』。妄想是錯誤的「信念/思考」(非知覺);自我感消失是覺得自己不真實;失真感是覺得周遭環境不真實。本題核心是『無刺激而看到東西(知覺異常)』，故為幻覺。","options":{"A":"妄想是錯誤的信念/思考，非知覺異常。","B":"自我感消失是覺得自己不真實。","C":"正確。無真實刺激而看到蟑螂，是幻覺(視幻覺)。","D":"失真感是覺得周遭環境不真實。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺"]}},"110110-N5-13":{"quick":"被害妄想不願用餐：讓病人協助準備食物或自備食物。","detail":{"background":"李先生被害妄想、擔心伙食被下毒而不願用餐。最適當是『讓病人協助準備食物，或自備(包裝完整的)食物』——讓病人掌控食物來源，可減少被下毒的疑慮、提高進食意願。A『警告不吃就鼻胃管灌食』是威脅;C『等餓了自然就吃』消極、可能延誤營養;D『請其他病人保證沒毒』無效(病人仍可能不信)。故 B 正確。對被害拒食者，讓其掌控食物來源最有效。","options":{"A":"警告不吃就鼻胃管灌食是威脅。","B":"正確。讓病人協助準備或自備食物，掌控來源以減少疑慮。","C":"等餓了自然就吃消極、可能延誤營養。","D":"請其他病人保證沒毒無效。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","被害妄想·拒食"]}},"110110-N5-14":{"quick":"缺乏病識感、拒服藥：了解拒服藥原因、觀察是否有藏藥行為。","detail":{"background":"對缺乏病識感、拒絕服藥的思覺失調病人，較適當的處理是『了解病人拒服藥的原因(副作用?妄想?)，並觀察其是否有藏藥(cheeking)行為』——找出拒藥原因才能對症處理，並確保未藏藥。A『謊稱是維他命、沒有副作用』是欺騙、破壞信任;C『警告不服藥就不能出院』是威脅;D『鼻胃管灌藥』是強制、過度。故 B 正確。對拒藥宜先了解原因、確認服下，而非欺騙或威脅。","options":{"A":"謊稱是維他命是欺騙、破壞信任。","B":"正確。了解拒服藥原因、觀察是否藏藥。","C":"警告不服藥就不能出院是威脅。","D":"鼻胃管灌藥是強制、過度。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥·病識感"]}},"110110-N5-22":{"quick":"自我照顧功能退化、無法清潔：教導劉先生洗澡(引導非代勞)。","detail":{"background":"劉先生自我照顧功能退化、有異味、無法自行清潔。正確的護理是『教導劉先生洗澡(分解步驟、引導、督促)』——以教導、引導的方式維持並提升其殘存的自理能力，而非代勞。A『尋求人力支援』不符(非暴力或安全情境);B『幫劉先生洗澡』是代勞，會加速失能;D『尊重意願、不處理』放任、忽視其衛生需求。故 C 正確。對自理退化者，教導、引導以維持功能。","options":{"A":"尋求人力支援用於暴力/安全情境，非此題。","B":"幫他洗澡是代勞，會加速失能。","C":"正確。教導劉先生洗澡，引導以維持自理能力。","D":"尊重意願不處理是放任、忽視衛生需求。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","自我照顧"]}},"111030-N5-14":{"quick":"功能退化病人家屬指導：漸進式訓練②、耐性接納訓練③、配合獎賞引發動機④(代勞①非)。","detail":{"background":"指導家屬照顧功能退化的慢性思覺失調病人:(2)宜採『漸進式訓練』(循序漸進);(3)需要『耐性、接納與訓練』;(4)『配合獎賞引發學習動機』(正增強)。而(1)『直接幫病人做日常照顧，又快又好』錯誤——代勞會剝奪病人練習與維持功能的機會、加速失能，應引導病人自己做。故正確為②③④(選 D)。對功能退化者，漸進、接納、正增強地訓練自理，而非代勞。","options":{"A":"123：含敘述1(代勞)，會加速失能。","B":"124：含敘述1，錯誤。","C":"134：含敘述1，錯誤。","D":"正確。漸進式訓練②、耐性接納訓練③、獎賞引發動機④。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","功能退化·家屬指導"]}},"111030-N5-17":{"quick":"被踩腳而認為「對方故意」(關係妄想)：同理病人並討論對應方法。","detail":{"background":"黃先生規則服藥、在社區復健，被踩到腳卻認為「對方故意」(關係妄想殘留)。最適當是『同理病人並討論對應方法』——接納其感受、並引導其思考如何因應(增進現實檢驗與社會技巧)，不直接爭辯妄想。A『有被害妄想、建議調藥』過度(規則服藥、僅輕微關係意念);C『解釋那位女性不是故意』是爭辯妄想;D『提醒走路要注意』偏離問題、未處理其想法。故 B 正確。對殘留的關係意念，同理並討論因應較佳。","options":{"A":"規則服藥、僅輕微關係意念，建議調藥過度。","B":"正確。同理病人並討論對應方法。","C":"解釋對方不是故意是爭辯妄想。","D":"提醒走路注意偏離問題，未處理其想法。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","關係妄想"]}},"111030-N5-18":{"quick":"思覺失調病程：發病期的發作一般與心理社會壓力事件有關。","detail":{"background":"思覺失調症病程描述:(B)『發病(急性)期的發作一般與心理社會壓力事件有關』(壓力可誘發急性發作)，正確。其他錯誤:A 前驅期以『負性症狀與功能衰退』為主(社交退縮、功能下降)，非以正性症狀為主;C 前驅期常見的是『退縮、怪異、功能下降』，暴力或自傷行為非前驅期常見表現;D 殘留期通常發生在『急性發病之後(成年)』，非青少年階段(思覺失調好發於青少年晚期至成年早期，但「殘留期」是病程後段)。故 B 正確。","options":{"A":"前驅期以負性症狀與功能衰退為主，非正性症狀。","B":"正確。發病期的發作一般與心理社會壓力事件有關。","C":"前驅期常見退縮、功能下降，暴力自傷非典型。","D":"殘留期在急性發病之後，非青少年階段。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","病程"]}},"111030-N5-19":{"quick":"工作中懷疑組長以咳嗽暗示她辭職(關係妄想)：最主要護理問題＝症狀困擾問題。","detail":{"background":"小君規則服藥、在賣場工作自覺勝任，但『懷疑組長挑剔她、以咳嗽暗示要她辭職』——這是『關係妄想(精神症狀)』影響其工作與人際。目前最主要的護理問題是『症狀困擾問題』(殘餘精神症狀干擾)。服藥問題(她可規則服藥)、社區歧視(是她的妄想解讀、非真實歧視)、家庭問題都非核心。本題核心是『關係妄想症狀困擾』，故 D 正確。","options":{"A":"她可規則服藥，服藥非主要問題。","B":"是她的妄想解讀、非真實的社區歧視。","C":"本題未涉及家庭問題。","D":"正確。關係妄想干擾工作人際，是症狀困擾問題。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"111110-N5-2":{"quick":"強制社區治療的工作項目：藥物治療①、血液檢驗③、尿液濃度檢驗④、酒精篩檢⑤。","detail":{"background":"精神復健機構協助病人接受『強制社區治療(强制門診/社區治療)』的工作項目包括:(1)藥物治療(給藥、確認服藥);(3)藥物的血液檢驗(監測血中濃度/副作用);(4)藥物的尿液濃度檢驗(監測服藥順從);(5)酒精篩檢(評估物質使用)。而(2)『藥物依賴性評估』、(6)『放射性藥物檢驗』非強制社區治療的常規工作項目。故正確為①③④⑤(選 C)。","options":{"A":"1234：含②(依賴性評估)、缺⑤，錯誤。","B":"2345：含②、缺①(藥物治療)，錯誤。","C":"正確。藥物治療①、血液檢驗③、尿液濃度檢驗④、酒精篩檢⑤。","D":"1346：含⑥(放射性藥物檢驗)，非常規項目。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","強制社區治療"]}},"111110-N5-10":{"quick":"思覺失調病因：男女發生率相當。","detail":{"background":"思覺失調症病因的正確敘述:(D)『男女發生率相當(約1:1)』，但男性發病較早、預後較差。其他錯誤:A 終生盛行率約『1%(0.3~0.7%)』，非5%;B 好發年齡是『青少年晚期至成年早期(男約15~25歲、女約25~35歲)』，非中老年期;C 發病與『神經生物、心理社會、遺傳』等多重因素『有關』，非無關。故 D 正確。","options":{"A":"終生盛行率約1%，非5%。","B":"好發於青少年晚期至成年早期，非中老年期。","C":"發病與神經心理因素有關，非無關。","D":"正確。男女發生率相當(男性發病較早)。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","流行病學"]}},"111110-N5-18":{"quick":"父母詢問電氣痙攣療法(ECT)：先詢問父母對 ECT 的期望。","detail":{"background":"小菲有規則服藥但幻聽時好時壞，父母詢問電氣痙攣療法(ECT)的意見。護理師最適當的回答是『先詢問父母對電氣痙攣療法的期望(了解其想法、擔憂與期待)』——以開放、了解需求為先，再據以提供正確衛教與醫療團隊討論。A『須完全聽從醫師指示』壓抑其參與;B『指出效果不好』、C『年紀太小不適合』都是未經評估的片面斷言。故 D 正確。對家屬的詢問，先了解期望與想法，再衛教。","options":{"A":"「完全聽從醫師指示」壓抑家屬的參與。","B":"「效果不好」是未經評估的片面斷言。","C":"「年紀太小不適合」是片面斷言。","D":"正確。先詢問父母對電氣痙攣療法的期望，再衛教。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","ECT·衛教"]}},"111110-N5-19":{"quick":"被跟蹤感、聽到聲音、害怕無法外出、持續≥1個月＝思覺失調症(DSM-5)。","detail":{"background":"王小姐分手後出現『被跟蹤的感覺(妄想)、聽到有人說話(幻聽)、害怕到無法外出工作(功能受損)、症狀持續1個月以上』——符合 DSM-5 思覺失調症的活躍期症狀(妄想、幻覺等持續≥1個月、功能下降)。重度憂鬱症以情緒低落為核心;創傷後壓力症以創傷再經驗、逃避、過度警覺為核心;強迫症以強迫思考/行為為核心。本題有妄想、幻覺、功能下降且≥1個月，最可能為思覺失調症。故 C 正確。","options":{"A":"重度憂鬱症以情緒低落為核心，本題以幻覺妄想為主。","B":"創傷後壓力症以創傷再經驗、逃避、過度警覺為核心。","C":"正確。妄想、幻覺、功能下降且≥1個月，最可能思覺失調症。","D":"強迫症以強迫思考/行為為核心。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 診斷"]}},"111110-N5-20":{"quick":"15歲、與母親男友爭執後出現幻聽：居家護理最適當＝安排家庭治療。","detail":{"background":"林小姐15歲、思覺失調、『多次因和母親的男朋友有爭執而出現幻聽』——家庭互動衝突是症狀惡化的誘因。居家護理最適當的是『安排家庭治療』——處理家庭互動衝突、改善家庭溝通與支持，有助於症狀穩定。A『教導病人接受母親男友』把責任放在病人;B『建議獨居』不切實際(15歲)且逃避問題;C『強制住院』過度(未達強制住院要件)。故 D 正確。對家庭衝突誘發症狀者，家庭治療是適當的介入。","options":{"A":"教導病人接受母親男友把責任放在病人身上。","B":"建議15歲獨居不切實際且逃避問題。","C":"強制住院過度，未達要件。","D":"正確。安排家庭治療，處理家庭衝突、改善支持。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","家庭治療"]}},"111110-N5-33":{"quick":"社區復健中心(工作技能訓練)＝三級預防。","detail":{"background":"慢性思覺失調病人急性出院後轉介社區復健中心接受工作技能訓練，是對『已患病者進行復健、減少失能』，屬『三級預防』。初級預防是預防發生;次級預防是早期發現早期治療;危機處置是處理急性危機。社區復健中心的工作技能訓練屬三級(復健)預防。故 C 正確。","options":{"A":"初級預防是預防疾病發生。","B":"次級預防是早期發現早期治療。","C":"正確。社區復健中心的工作技能訓練，屬三級預防。","D":"危機處置是處理急性危機，非本題。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","三段五級預防"]}},"112030-N5-5":{"quick":"躁症發作與兒茶酚胺(catecholamine)過度分泌有關。","detail":{"background":"精神疾病與神經傳導物質假說的正確敘述:(B)『躁症發作與兒茶酚胺(正腎上腺素/多巴胺)過度分泌有關』。其他錯誤:A 思覺失調症『負性症狀』與多巴胺『過低(中皮質路徑)』有關，非過高(正性症狀才與多巴胺過高有關);C 憂鬱症與血清素『分泌過低/不足』有關，非過高;D 焦慮症與 GABA『分泌不足』有關，非過多(GABA 是抑制性、不足才焦慮)。故 B 正確。","options":{"A":"負性症狀與多巴胺過低有關，非過高。","B":"正確。躁症發作與兒茶酚胺過度分泌有關。","C":"憂鬱症與血清素不足有關，非過高。","D":"焦慮症與 GABA 不足有關，非過多。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","神經傳導物質"]}},"112030-N5-10":{"quick":"思覺失調 DSM-5：社會/職業功能顯著比發病前降低。","detail":{"background":"DSM-5 思覺失調症診斷標準的正確描述:(C)『社會/職業功能顯著比發病前降低』(功能下降是診斷要件)。其他錯誤:A 至少一項症狀須為『妄想、幻覺或胡言亂語(失序言語)』中之一(非「必須為負性症狀」);B 持續性的困擾徵象至少『6個月』、其中活躍期症狀至少『1個月』(非「活躍3個月」);D『物質濫用/身體疾病所致則須排除(非主要因素)』，思覺失調須排除物質與身體病因。故 C 正確。","options":{"A":"至少一項須為妄想/幻覺/失序言語，非「必須為負性症狀」。","B":"活躍期症狀至少1個月、整體至少6個月，非「活躍3個月」。","C":"正確。社會/職業功能顯著比發病前降低。","D":"物質濫用所致須排除，非主要因素。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 診斷"]}},"112030-N5-15":{"quick":"幻聽(時讚時責)致情緒起伏、躺床對話：傾聽病人描述並比較幻聽內容與改變。","detail":{"background":"陳先生嚴重幻聽(時而稱讚、時而指責)、情緒起伏、躺床與幻聽對話。最適宜是『傾聽病人描述、並比較幻聽的內容與改變』——了解幻聽內容(評估安全)、追蹤其變化(評估病情與治療效果)、同時建立關係。A『提供耳塞』無法消除幻聽(幻聽源自腦內);C『每天更換護理師』破壞關係連續性;D『提供單人房』隔離、無助於處理幻聽。故 B 正確。對幻聽宜傾聽、了解內容並追蹤變化。","options":{"A":"耳塞無法消除腦內產生的幻聽。","B":"正確。傾聽病人描述、比較幻聽的內容與改變。","C":"每天更換護理師破壞關係連續性。","D":"單人房是隔離，無助於處理幻聽。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺護理"]}},"112030-N5-18":{"quick":"思覺失調的負性症狀＝動作遲緩。","detail":{"background":"思覺失調症的負性症狀是正常功能的減少:情感平淡、動機缺乏、社交退縮、思考貧乏、無快感、『動作/反應遲緩(精神運動遲滯)』。故『動作遲緩』屬負性症狀。而幻覺、妄想、怪異行為都是『正性症狀』。故 B 正確。","options":{"A":"幻覺屬正性症狀。","B":"正確。動作遲緩(精神運動遲滯)屬負性症狀。","C":"妄想屬正性症狀。","D":"怪異行為屬正性症狀。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","正負性症狀"]}},"112030-N5-21":{"quick":"思覺失調：1個月內至少出現妄想、幻覺或胡言亂語。","detail":{"background":"思覺失調症的正確敘述:(C)『1個月內至少出現妄想、幻覺或胡言亂語(失序言語)等活躍期症狀』(DSM-5 活躍期症狀≥1個月)。其他錯誤:A『起因於物質使用或身體病況的生理效應』是『排除條件』(若如此則不診斷為思覺失調);B 整體持續性徵象須至少『6個月』(非4個月)，活躍期至少1個月;D 思覺失調的診斷『不是以負性症狀為主軸』，至少需有一項正性症狀(妄想/幻覺/失序言語)。故 C 正確。","options":{"A":"起因於物質/身體疾病是排除條件，非診斷依據。","B":"整體須持續至少6個月，非4個月。","C":"正確。1個月內至少出現妄想、幻覺或胡言亂語。","D":"診斷需有正性症狀，非以負性症狀為主軸。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 診斷"]}},"112030-N5-38":{"quick":"慢性精神病人代謝症候群監測「不」包括＝高尿酸。","detail":{"background":"慢性精神病人(尤其使用第二代抗精神病藥)易罹患『代謝症候群』，需監測:腰圍(腹部肥胖)、高血壓(B)、高血糖/空腹血糖(C)、高三酸甘油酯/高血脂(D)、低 HDL。而『高尿酸(A)』不是代謝症候群的診斷指標(高尿酸與痛風相關，非代謝症候群五項之一)。故本題「不包括」者為高尿酸(選 A)。","options":{"A":"正確(本題選不包括者)。高尿酸不是代謝症候群的監測指標。","B":"高血壓是代謝症候群的監測項目。","C":"高血糖是代謝症候群的監測項目。","D":"高血脂(高三酸甘油酯/低HDL)是代謝症候群的監測項目。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","代謝症候群·抗精神病藥"]}},"112030-N5-39":{"quick":"避免病人機構化：提供多樣化的生活功能訓練、強化適應能力。","detail":{"background":"避免慢性精神病人『機構化(institutionalization：被動、依賴、喪失自主與功能)』，最適宜是『提供多樣化的生活功能訓練、強化病人適應能力』——鼓勵自主、多元刺激、培養功能。其他選項反而促進機構化:A『活動規律化、減少改變』使病人僵化、缺乏應變;B『外出一定集體行動』剝奪個別性;C『定時排隊吃藥』機械化、被動。故 D 正確。避免機構化的核心是促進自主、多元與功能。","options":{"A":"活動規律化、減少改變使病人僵化，反促進機構化。","B":"外出一定集體行動剝奪個別性。","C":"定時排隊吃藥機械化、被動，促進機構化。","D":"正確。提供多樣化生活功能訓練、強化適應能力。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","機構化"]}},"112110-N5-7":{"quick":"以相似讀音串聯(善莫大焉→醃肉)、欠邏輯＝音韻連結(clang association)。","detail":{"background":"吳先生回答休閒活動時，言詞『以相似讀音串聯、欠缺邏輯』(游泳→勇於認錯→善莫大焉→醃肉…字句靠諧音/慣用語牽連，無實質邏輯)，屬『音韻連結(clang association)』。言語迂迴(circumstantiality)是繞圈但最終會回到主題;答非所問是回答與問題無關但句子本身通順;語無倫次(incoherence)是字句完全破碎無法理解。本題核心是『靠相似讀音牽連』，故為音韻連結。","options":{"A":"言語迂迴是繞圈但最終回到主題。","B":"答非所問是回答與問題無關，但句子本身通順。","C":"語無倫次是字句完全破碎、無法理解。","D":"正確。以相似讀音串聯、欠邏輯，是音韻連結(clang association)。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思考形式障礙"]}},"112110-N5-12":{"quick":"妄想致頻繁投訴謾罵：同理其妄想所導致的內心感受。","detail":{"background":"張小姐妄想症(懷疑同事告狀阻礙升遷)、頻繁投訴與謾罵。最適切是『同理其妄想所導致的內心感受(委屈、憤怒、被害感)』——接納情緒、建立關係，不爭辯妄想內容。B『協助聯絡教育部』是進入並配合妄想;C『面質妄想內容、告知非事實』會升高防衛;D『聯絡學校同事釐清事實』是進入妄想邏輯的查證。故 A 正確。對妄想宜同理情緒、不爭辯也不配合查證。","options":{"A":"正確。同理其妄想所導致的內心感受，建立關係。","B":"協助聯絡教育部是配合並強化妄想。","C":"面質妄想內容、告知非事實會升高防衛。","D":"聯絡同事釐清事實是進入妄想邏輯的查證。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症護理"]}},"112110-N5-17":{"quick":"妄想症：出現與現實生活有關(非怪異)的妄想。","detail":{"background":"劉先生妄想症、堅信家人鄰居要下毒害他。妄想症的正確敘述:(A)『出現與現實生活有關(可能發生)的妄想』——妄想症的妄想多為『非怪異(non-bizarre)』、有系統、與現實生活情境有關(如被害、嫉妒、被愛)。其他錯誤:B 妄想症『無明顯的怪異行為』，功能多大致保留;C 與『腦部功能/神經傳導』有關(非無關);D 與『人格特質』有關(如猜疑型人格是危險因子，非無關)。故 A 正確。","options":{"A":"正確。妄想症出現與現實生活有關(非怪異)的妄想。","B":"妄想症無明顯怪異行為，功能多保留。","C":"與腦部功能有關，非無關。","D":"與人格特質有關，非無關。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","妄想症"]}},"112110-N5-21":{"quick":"父母擔心服藥影響考試成績：引導家屬了解服藥的重要性。","detail":{"background":"陳同學18歲思覺失調、父母擔心服藥影響學科考試成績。最適切是『引導家屬了解服藥的重要性(規則服藥以控制症狀、預防復發，症狀穩定反而有助學習)』——糾正錯誤觀念、增進家屬支持服藥的態度。A『考前暫時停藥』、C『症狀出現再服藥』都會導致間斷服藥、易復發;D『用轉移注意力代替藥物』錯誤(無法取代藥物)。故 B 正確。對家屬的服藥疑慮，應引導其了解規則服藥的重要性。","options":{"A":"考前暫時停藥會導致間斷服藥、易復發。","B":"正確。引導家屬了解服藥的重要性。","C":"症狀出現再服藥會間斷服藥、易復發。","D":"轉移注意力無法取代藥物。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥衛教"]}},"112110-N5-34":{"quick":"干擾社區但不傷人、不配合服藥返診＝居家治療。","detail":{"background":"江先生出院返家後常干擾社區居民、但不至於傷害他人(未達強制住院要件)、不願配合服藥與規律返診、照顧困難。最適合的精神醫療服務是『居家治療(精神居家照護)』——由醫療團隊到宅提供評估、給藥、衛教與支持，協助不願就醫者維持治療。強制住院須達「有傷害自己或他人之虞」(本題不至於傷人);精神護理之家、康復之家是機構安置(病人在家、家屬願照顧)。故 B 正確。對不願就醫、未達強制住院要件者，居家治療是適當服務。","options":{"A":"不至於傷害他人，未達強制住院要件。","B":"正確。居家治療由團隊到宅提供照護，適合不願就醫者。","C":"精神護理之家是機構安置，病人在家、家屬願照顧。","D":"康復之家是機構安置，非此情境。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神居家治療"]}},"112110-N5-38":{"quick":"社區精神復健中心收案：症狀穩定、可主動服藥及規律門診追蹤者。","detail":{"background":"社區(精神)復健中心的收案條件:(A)『符合精神疾病診斷、症狀穩定、可主動服藥及規律門診追蹤者』——日間型復健，要求病人能自我管理服藥、規律就醫。其他錯誤:B『症狀慢性化、需生活照顧者』適合的是『精神護理之家』而非復健中心;C『一定要有家屬接送』不是收案條件;D『任何有職業訓練需求皆可收』錯誤(須符合診斷、症狀穩定等條件)。故 A 正確。","options":{"A":"正確。症狀穩定、可主動服藥及規律門診追蹤者。","B":"症狀慢性化、需生活照顧者適合精神護理之家。","C":"「一定要家屬接送」不是收案條件。","D":"須符合診斷、症狀穩定等條件，非任何人皆可收。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神復健"]}},"113030-N5-11":{"quick":"被害妄想不肯進食：最優先＝協助病人自行採購包裝完整的食物。","detail":{"background":"王小姐被害妄想(擔心家人在食物中下毒)、不肯進食。最優先的護理措施是『協助病人自行採購包裝完整的食物』——讓病人掌控食物來源、確認包裝完整(未被下毒)，可有效提高進食意願、維持營養。A『立即插鼻胃管灌食』是侵入、強制(非優先);B『再不進食要進保護室』是威脅;C『請家屬準備伙食』——但病人懷疑的正是家人下毒，不適合。故 D 正確。對被害拒食者，讓病人掌控、確認包裝完整的食物最有效。","options":{"A":"立即插鼻胃管灌食是侵入、強制，非優先。","B":"「再不進食要進保護室」是威脅。","C":"病人懷疑的正是家人下毒，請家屬準備不適合。","D":"正確。協助病人自行採購包裝完整的食物。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","被害妄想·拒食"]}},"113030-N5-12":{"quick":"不規則服藥的出院藥物護理「最不適切」＝返家後藥物可供家人自行選擇。","detail":{"background":"思覺失調病人常不規則服藥，出院藥物護理:評估家庭主要照顧者(A)、了解不服藥的原因(B)、提供藥物相關資訊(C)都是適切的。而 D『返家後的藥物，可供家人自行選擇』最不適切——藥物的種類、劑量須『遵照醫囑』，不可由家人自行選擇或調整(自行調藥會導致治療失敗、復發)。故本題「最不適切」者為 D。","options":{"A":"評估家庭主要照顧者是適切的。","B":"了解不服藥的原因是適切的。","C":"提供藥物相關資訊是適切的。","D":"正確(本題選最不適切者)。藥物須遵醫囑，不可由家人自行選擇。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥衛教"]}},"113030-N5-24":{"quick":"精神護理之家收置：症狀穩定慢性化①、不需急性住院但需生活照顧②、無家可歸的慢性病人④(需急性住院③非)。","detail":{"background":"精神護理之家提供慢性、穩定但需長期生活照顧者的機構式照護，收置條件:(1)精神症狀穩定且慢性化者;(2)不需急性住院治療但需生活照顧者;(4)無家可歸的慢性精神病人。而(3)『需「急性住院」治療之年邁者、失智者』不符——需急性住院者應住急性病房，非護理之家(護理之家收的是穩定、不需急性治療者)。故正確為①②④(選 C)。","options":{"A":"僅34：含③(需急性住院)，且缺①②，錯誤。","B":"僅123：含③(需急性住院)，錯誤。","C":"正確。症狀穩定慢性化①、需生活照顧②、無家可歸慢性病人④。","D":"1234：含③(需急性住院)，錯誤。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神護理之家"]}},"113100-N5-2":{"quick":"社區精神復健照護重點「最不適切」＝主動給予病人藥物服用。","detail":{"background":"社區精神復健的照護重點:促進病人復元(A)、提升生活品質(B)、提升參與治療計畫的能力(D)都是適切的(強調自主、賦權、復元)。而 C『主動給予病人藥物服用』最不適切——社區復健階段應培養病人『自我管理服藥』的能力(自行按時服藥)，而非由護理師被動給藥(那是急性住院的做法)。故本題「最不適切」者為 C。","options":{"A":"促進病人的復元是社區精神復健的重點。","B":"提升病人的生活品質是適切的。","C":"正確(本題選最不適切者)。社區復健應培養自我管理服藥，非主動給藥。","D":"提升參與治療計畫的能力是適切的。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神復健"]}},"113100-N5-3":{"quick":"告知出院後面有難色、靜坐：同理李小姐對出院的想法或感受。","detail":{"background":"李小姐被告知下週出院後『面有難色、靜坐大廳半小時』(對出院有疑慮/焦慮)。最適切是『同理李小姐對出院的想法或感受』——先了解、接納其對出院的擔憂(如擔心復發、家庭、適應)，再協助處理。A『轉介做人格測驗』偏離當下情緒問題;C『教導辦理出院手續』忽視其感受、跳到流程;D『保證有困難可再入院』是空泛保證、且暗示出院會失敗。故 B 正確。對出院有疑慮者，先同理感受、了解擔憂。","options":{"A":"轉介做人格測驗偏離當下的情緒問題。","B":"正確。同理李小姐對出院的想法或感受。","C":"教導辦理出院手續忽視其感受、跳到流程。","D":"保證可再入院是空泛保證、且暗示出院會失敗。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"113100-N5-6":{"quick":"「知道有病、知道吃藥有用，但就是不想吃」＝理智性病識感(intellectual insight)。","detail":{"background":"吳先生說「我知道我有精神病、知道吃藥可以改善，但就是不想吃那麼多藥」——『理智上知道自己有病、知道治療有效，但情感上未真正接受、行為上未配合改變』，屬『理智性病識感(intellectual insight)』。無病識感是完全否認有病;部分病識感是承認有病但歸因不全/時好時壞;情感性(真正)病識感是不僅理智知道、且情感接受並『改變行為(配合治療)』。本題「知道卻不願改變行為」，故為理智性病識感。","options":{"A":"無病識感是完全否認有病。","B":"正確。理智上知道有病、知道治療有效，但未改變行為，是理智性病識感。","C":"部分病識感是承認有病但歸因不全/時好時壞。","D":"情感性(真正)病識感是情感接受且改變行為。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","病識感"]}},"113100-N5-10":{"quick":"在病床存放大量零食：與病人會談以理解存放零食的原因。","detail":{"background":"楊小姐思覺失調、在病床存有大量零食。最適切是『與病人會談以理解存放零食的原因』——可能與妄想(怕食物被下毒而囤積)、安全感、習慣有關，先了解原因才能對症處理並維護其自主與尊嚴。A『趁不注意收走』是未經同意、破壞信任;B『鼓勵分送他人』未處理根本;D『暫停伙食待零食食用完』不當(影響營養)。故 C 正確。對病人的行為宜先了解原因，再處理。","options":{"A":"趁不注意收走是未經同意、破壞信任。","B":"鼓勵分送他人未處理根本原因。","C":"正確。與病人會談以理解存放零食的原因。","D":"暫停伙食待零食食用完影響營養，不當。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"113100-N5-13":{"quick":"思覺失調致病原因「最不適切」＝多巴胺受體濃度過低。","detail":{"background":"思覺失調症的致病原因:額葉(前額葉)功能缺損(B)、父母高度情緒表達(高EE，C)、父母雙重束縛型溝通(D，溝通理論)都與思覺失調有關。而 A『多巴胺受體濃度過「低」』最不適切——思覺失調症與多巴胺『過「高」(尤其邊緣路徑、D2受體活性增加)』有關，故抗精神病藥是 D2 受體拮抗劑。故本題「最不適切」者為 A。","options":{"A":"正確(本題選最不適切者)。思覺失調與多巴胺過「高」有關，非過低。","B":"額葉功能缺損與思覺失調有關。","C":"父母高度情緒表達(高EE)與復發有關。","D":"父母雙重束縛型溝通是溝通理論的病因觀點。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","多巴胺假說"]}},"113100-N5-19":{"quick":"行為治療的應用情境＝住院病人破壞病房安寧的行為。","detail":{"background":"行為治療(behavior therapy)透過增強、消弱、代幣制度等改變『特定的外顯行為』，最適用的情境是(B)『住院病人破壞病房安寧的行為』(以行為改變技術矯正特定不當行為)。A『思覺失調的急性正性症狀』主要靠藥物;C『探討早
