圖解藥理學"]}},"109110-N1-51":{"quick":"雙胍類（biguanides）最常見副作用是腸胃不適，故選B。","detail":{"background":"口服降血糖第一線「雙胍類(biguanides,如metformin)」最常見的副作用是「『腸胃不適』(噁心、腹瀉、腹脹,B)」(隨餐服用、緩慢加量可減輕);它「不致低血糖(A,單用)、不增加(甚至略減)體重(C)」;罕見但嚴重的是乳酸中毒(腎功能不全者)。故最常見副作用為腸胃不適(B)。故選B。","options":{"A":"metformin單用不致低血糖。","B":"正確:雙胍類最常見副作用是腸胃不適。","C":"metformin不增加體重。","D":"非心臟毒性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-57":{"quick":"Lorcaserin刺激5-HT2C受體抑制食慾減重，故選C。","detail":{"background":"「Lorcaserin(C)」是減重藥,機轉是「選擇性刺激下視丘的『血清素5-HT2C受體』」——活化pro-opiomelanocortin(POMC)神經元、抑制食慾,達減重效果(選擇性5-HT2C避開5-HT2B的心瓣膜副作用)。故刺激5-HT2C受體者為lorcaserin(C)。(註:lorcaserin後因致癌疑慮下市,但考點是5-HT2C。)故選C。","options":{"A":"非5-HT1A。","B":"非5-HT1D。","C":"正確:lorcaserin刺激5-HT2C受體抑制食慾。","D":"非5-HT4。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-62":{"quick":"腦下垂體後葉分泌、治尿崩症的是Vasopressin，故選A。","detail":{"background":"「Vasopressin(抗利尿激素ADH,A)」是「腦下垂體『後葉』釋放的激素」,「治療(中樞性)尿崩症」——補充ADH促集尿管水再吸收、減少尿量。故後葉激素治尿崩症者為vasopressin(A)。Corticotropin(ACTH,前葉)、Gonadotropin(前葉)、Prolactin(前葉)皆前葉激素。故選A。","options":{"A":"正確:vasopressin(ADH)是後葉激素,治尿崩症。","B":"Corticotropin(ACTH)是前葉激素。","C":"Gonadotropin是前葉激素。","D":"Prolactin是前葉激素。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-61":{"quick":"corticosteroid臨床用途錯誤為C：不治療「白內障」（反而致白內障），故選C。","detail":{"background":"糖皮質類固醇用途:診斷庫欣症候群(A)、治療腎上腺皮質機能不全(B,替代)、緩解異位性皮膚炎(D,外用抗發炎)。而「治療白內障(C)」錯——長期使用類固醇「反而『造成』白內障(後囊下白內障)與青光眼」,「不治療白內障」。故錯誤用途為C。","options":{"A":"診斷庫欣症候群是類固醇用途。","B":"治療腎上腺機能不全是替代治療。","C":"正確(為錯誤):類固醇反致白內障,不治療白內障。","D":"緩解異位性皮膚炎是類固醇用途。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-62":{"quick":"治療肢端肥大症的是Octreotide，故選A。","detail":{"background":"「Octreotide(體抑素somatostatin類似物,A)」治療「肢端肥大症(acromegaly,GH過多)」——抑制生長激素(GH)分泌。故治肢端肥大症者為octreotide(A)。Somatropin(重組GH,反而是補GH,加重)、Methimazole(抗甲狀腺)、Leuprolide(GnRH類似物,治攝護腺癌/子宮內膜異位)不符。故選A。","options":{"A":"正確:octreotide(體抑素)抑制GH,治肢端肥大症。","B":"Somatropin是重組GH(反加重肢端肥大)。","C":"Methimazole是抗甲狀腺藥。","D":"Leuprolide是GnRH類似物。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-51":{"quick":"刺激β細胞釋放胰島素的是Glyburide，故選A。","detail":{"background":"「Glyburide(磺醯尿素類,A)」的主要作用是「刺激胰臟β細胞釋放胰島素」——關閉β細胞的ATP敏感性鉀通道、去極化、促胰島素分泌。故刺激β細胞分泌胰島素者為glyburide(A)。Metformin(減肝糖質新生)、Acarbose(減糖吸收)、Dapagliflozin(SGLT2,尿排糖)機轉不同。故選A。","options":{"A":"正確:glyburide(磺醯尿素)刺激β細胞釋放胰島素。","B":"Metformin減少肝糖質新生。","C":"Acarbose減少糖吸收。","D":"Dapagliflozin是SGLT2抑制劑(尿排糖)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-52":{"quick":"動情素治攝護腺癌是因「拮抗雄性素作用」，故選C。","detail":{"background":"動情素(雌激素estrogen)治療「攝護腺癌」是因「具有『拮抗雄性素(抗雄性素)』的作用」(C)——雌激素經負回饋抑制下視丘-垂體,「減少LH分泌→減少睪丸睪固酮製造」,降低雄性素(攝護腺癌依賴雄性素生長)。故為拮抗雄性素作用(C)。非增加腎素、非直接結合癌細胞雌激素受體(攝護腺癌主要是雄性素依賴)、非腎臟代謝物抑制。故選C。","options":{"A":"非增加腎素分泌。","B":"攝護腺癌主要雄性素依賴,非雌激素受體調控。","C":"正確:雌激素拮抗雄性素(降睪固酮)治攝護腺癌。","D":"非腎臟代謝物抑制。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-62":{"quick":"Lorcaserin錯誤敘述為A：它是「5-HT2C致效劑」非血清素回收抑制劑，故選A。","detail":{"background":"減重藥Lorcaserin:A「是serotonin reuptake的抑制劑」錯——lorcaserin是「血清素『5-HT2C受體致效劑』」(非回收抑制劑);B「刺激POMC神經元」(正確,抑食慾);C「主要由肝臟代謝」(正確);D「代謝物經尿液排除」(正確)。故錯誤為A(它是5-HT2C致效劑,非回收抑制劑)。故選A。","options":{"A":"正確(為錯誤敘述):lorcaserin是5-HT2C致效劑,非回收抑制劑。","B":"刺激POMC神經元抑食慾,正確。","C":"主要由肝臟代謝,正確。","D":"代謝物經尿液排除,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-52":{"quick":"不適用於肢端肥大症的是Corticotropin，故選C。","detail":{"background":"肢端肥大症(GH過多)的治療:Octreotide(A,體抑素類似物,抑GH)、Bromocriptine(B,多巴胺致效劑,弔詭抑GH)、Pegvisomant(D,GH受體拮抗劑)。而「Corticotropin(ACTH,C)」是「促腎上腺皮質激素」,「與肢端肥大症無關、不適用」。故不適用者為corticotropin(C)。故選C。","options":{"A":"Octreotide抑GH,治肢端肥大症。","B":"Bromocriptine可抑GH。","C":"正確:corticotropin(ACTH)不適用於肢端肥大症。","D":"Pegvisomant(GH受體拮抗)治肢端肥大症。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-62":{"quick":"礦物皮質類固醇錯誤敘述為C：促進鉀離子「排泄」（非再吸收），故選C。","detail":{"background":"礦物皮質類固醇(mineralocorticoid,醛固酮)的作用:促進遠端腎小管「鈉離子再吸收(A)、氯離子再吸收(B,伴隨鈉)、水再吸收(D)」,以及「『鉀離子『排泄』(分泌)』」與氫離子排泄。題問「錯誤」者——C「促進鉀離子『再吸收』」錯(醛固酮是促鉀『排泄』而非再吸收,故致低血鉀)。故錯誤為C。","options":{"A":"促進鈉離子再吸收,正確。","B":"促進氯離子再吸收(伴隨鈉),正確。","C":"正確(為錯誤敘述):醛固酮促鉀「排泄」非再吸收。","D":"促進水再吸收,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-38":{"quick":"PTU錯誤敘述為C：對已儲存的甲狀腺素「無」抑制作用，故選C。","detail":{"background":"Propylthiouracil(PTU)治療甲亢:A「屬thionamides類,抑制周邊T4轉T3」(正確,PTU特有);B「抑制甲狀腺素合成的碘化反應(甲狀腺過氧化酶)」(正確);C「對已儲存在腺體中的甲狀腺素仍有抑制作用」錯——PTU「只抑制『新』甲狀腺素的『合成』,對『已合成儲存』的甲狀腺素『無』抑制作用」(故起效需數週,待儲存的甲狀腺素耗盡);D「Methimazole較PTU(作用強/半衰期長)」(正確)。故錯誤為C。","options":{"A":"PTU抑制周邊T4轉T3,正確。","B":"抑制碘化反應,正確。","C":"正確(為錯誤敘述):PTU對已儲存的甲狀腺素無抑制作用。","D":"methimazole作用較強,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-39":{"quick":"prolactin錯誤敘述為B：屬腦下垂體「前葉」分泌（非後葉），故選B。","detail":{"background":"泌乳激素(prolactin):A「刺激女性乳房產生乳汁」(正確);B「屬腦下垂體『後葉』分泌」錯——prolactin是「『前葉(腺垂體)』」分泌的激素;C「可抑制排卵或月經週期、減低生殖功能(高泌乳素抑制GnRH)」(正確);D「分泌受多巴胺調控(多巴胺抑制泌乳素)」(正確)。故錯誤為B(prolactin是前葉激素)。故選B。","options":{"A":"刺激乳房產乳汁,正確。","B":"正確(為錯誤敘述):prolactin是前葉激素,非後葉。","C":"可抑制排卵減低生殖功能,正確。","D":"受多巴胺調控,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-37":{"quick":"長效無抗發炎、不能急救的氣喘藥是salmeterol，故選B。","detail":{"background":"「Salmeterol(B)」是「長效型β2致效劑(LABA)」——作用持續約12小時,「『不具抗發炎作用』、起效慢、『無法快速緩解急性氣喘發作』」,用於『長期維持控制』(須與吸入類固醇併用)。故符合者為salmeterol(B)。albuterol(短效β2,可急救)、cromolyn(肥大細胞穩定,抗發炎/預防)、corticosteroids(抗發炎)不符。故選B。","options":{"A":"albuterol是短效β2(可急救)。","B":"正確:salmeterol長效、無抗發炎、不能急救。","C":"cromolyn有抗發炎(預防)作用。","D":"corticosteroids有抗發炎作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-38":{"quick":">35歲抽菸女性最適合的避孕是肌肉注射medroxyprogesterone（純黃體素），故選D。","detail":{"background":"年齡>35歲且抽菸的女性「『不適合含雌激素(ethinyl estradiol)的避孕法』」(避孕貼片A、口服複方B、陰道環C皆含雌激素)——因「雌激素＋抽菸＋高齡」會大幅增加『血栓栓塞與心血管事件』風險。最適合「『純黃體素』製劑——肌肉注射medroxyprogesterone acetate(DMPA,D)」(無雌激素,血栓風險低)。故最適合者為D。故選D。","options":{"A":"避孕貼片含雌激素,>35歲抽菸者不適合。","B":"口服複方含雌激素,不適合。","C":"陰道環含雌激素,不適合。","D":"正確:純黃體素肌注(DMPA)適合>35歲抽菸女性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-33":{"quick":"初診斷無併發症的第二型糖尿病首選Metformin，故選D。","detail":{"background":"初診斷、尚無併發症的第二型糖尿病,「『第一線首選』是『Metformin(雙胍類,D)』」——減少肝糖質新生、改善胰島素敏感度、不致低血糖、不增體重、有心血管益處、價廉。故首選為metformin(D)。Alogliptin(DPP-4)、Empagliflozin(SGLT2)、Insulin glulisine(速效胰島素)為後續或特定情況用藥。故選D。","options":{"A":"Alogliptin(DPP-4)非第一線首選。","B":"Empagliflozin(SGLT2)非初診斷首選。","C":"Insulin glulisine是速效胰島素(非初診斷無併發症首選)。","D":"正確:metformin是第二型糖尿病第一線首選。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-34":{"quick":"Propranolol錯誤敘述為C：會使血糖「下降/掩蓋低血糖」（非上升），故選C。","detail":{"background":"Propranolol(非選擇性β阻斷劑):A「可通過血腦障壁(脂溶性)」(正確,故有中樞副作用);B「治療急性甲狀腺功能亢進(控制心搏過速)」(正確);C「可引起血糖『上升』」錯——β阻斷劑會「抑制肝糖分解、『掩蓋低血糖症狀』、可能致低血糖(尤其糖尿病用胰島素者)」,「非升血糖」;D「抑制腎素分泌(經β1)」(正確)。故錯誤為C。","options":{"A":"propranolol可通過血腦障壁,正確。","B":"治療急性甲亢,正確。","C":"正確(為錯誤敘述):propranolol掩蓋低血糖/可致低血糖,非升血糖。","D":"抑制腎素分泌,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-38":{"quick":"使Levothyroxine吸收降低的是Aluminum hydroxide，故選B。","detail":{"background":"口服Levothyroxine(甲狀腺素)的吸收會被「含鋁、鈣、鐵的制酸劑/補充劑『干擾(降低吸收)』」——「Aluminum hydroxide(氫氧化鋁制酸劑,B)」會「結合levothyroxine、降低其吸收」,故應間隔數小時服用。故降低吸收者為aluminum hydroxide(B)。Vitamin D、Phenobarbital(誘導代謝但非降吸收)、Pravastatin不直接降levothyroxine吸收。故選B。","options":{"A":"Vitamin D不降levothyroxine吸收。","B":"正確:aluminum hydroxide(含鋁)降低levothyroxine吸收。","C":"Phenobarbital誘導代謝(非降吸收)。","D":"Pravastatin不降levothyroxine吸收。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-38":{"quick":"canagliflozin機轉是增加葡萄糖從尿液排除（SGLT2抑制），故選D。","detail":{"background":"「Canagliflozin(D)」是「鈉-葡萄糖共輸送體2(SGLT2)抑制劑」——抑制腎近曲小管的SGLT2,「減少葡萄糖再吸收、增加葡萄糖從尿液排除」,降血糖(並降體重、降血壓、有心腎益處)。故機轉為增加尿糖排除(D)。它非刺激胰島素、非減肝糖、非減腸吸收。故選D。","options":{"A":"刺激胰島素是磺醯尿素類。","B":"減少肝臟生成葡萄糖是metformin。","C":"減少腸道糖吸收是acarbose。","D":"正確:canagliflozin(SGLT2)增加尿糖排除。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-38":{"quick":"長期口服prednisone最常出現骨質疏鬆，故選C。","detail":{"background":"長期口服prednisone(糖皮質類固醇)最常出現的副作用之一是「骨質疏鬆(C)」——類固醇抑制成骨細胞、增加骨吸收、減少腸鈣吸收,致骨質流失與骨折。其他:高血糖(『非』低血糖,D錯)、高血壓、庫欣外觀、感染、消化性潰瘍、『低』血鉀(『非』高血鉀,A錯)、『體重增加』(『非』降低,B錯)。故最常出現者為骨質疏鬆(C)。故選C。","options":{"A":"類固醇致低血鉀,非高血鉀。","B":"類固醇致體重增加,非降低。","C":"正確:長期prednisone致骨質疏鬆。","D":"類固醇致高血糖,非低血糖。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-38":{"quick":"促進卵巢濾泡成熟治不孕的是follitropin（FSH），故選C。","detail":{"background":"女性不孕治療中,「Follitropin(重組『FSH』,C)」「促進卵巢濾泡成熟」——FSH刺激卵泡發育成熟,用於排卵誘導與人工生殖。故促濾泡成熟者為follitropin(C)。bromocriptine(降泌乳素)、leuprolide(GnRH類似物,抑制)、cetrorelix(GnRH拮抗劑,抑制過早排卵)機轉不同。故選C。","options":{"A":"bromocriptine降泌乳素(治高泌乳素不孕)。","B":"leuprolide是GnRH類似物(抑制)。","C":"正確:follitropin(FSH)促卵巢濾泡成熟。","D":"cetrorelix是GnRH拮抗劑(防過早排卵)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-38":{"quick":"治變形性骨炎（Paget disease）最適合zoledronic acid，故選A。","detail":{"background":"變形性骨炎(Paget disease of bone,骨重塑失調、蝕骨活性增加)的治療首選是「雙磷酸鹽(bisphosphonate)——『Zoledronic acid(唑來膦酸,A)』」(靜脈,強力抑制蝕骨細胞、降低骨轉換)。故治Paget disease最適合者為zoledronic acid(A)。denosumab(抗RANKL,治骨鬆/骨轉移)、teriparatide(PTH,促骨形成,Paget禁用)、romosozumab(抗硬骨素)非Paget首選。故選A。","options":{"A":"正確:zoledronic acid(雙磷酸鹽)是Paget disease首選。","B":"denosumab主要治骨鬆/骨轉移。","C":"teriparatide促骨形成,Paget禁用。","D":"romosozumab治骨鬆。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-38":{"quick":"單用最易致低血糖的糖尿病藥是Glyburide，故選A。","detail":{"background":"「Glyburide(磺醯尿素類,A)」單獨使用「最易造成低血糖(hypoglycemia)」——它「促進胰島素分泌(不依賴血糖高低)」,故過量或進食不足時易低血糖(老年、腎功能不全者風險高)。故單用最易低血糖者為glyburide(A)。Metformin、Pioglitazone、Acarbose單用『不易』低血糖(不直接促胰島素分泌)。故選A。","options":{"A":"正確:glyburide(磺醯尿素)單用最易低血糖。","B":"Metformin單用不易低血糖。","C":"Pioglitazone單用不易低血糖。","D":"Acarbose單用不易低血糖。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-39":{"quick":"Corticosteroids「不」致低血壓（反而高血壓），故選B。","detail":{"background":"糖皮質類固醇(corticosteroids)的副作用:骨質疏鬆(A)、增加感染危險(C,免疫抑制)、周邊水腫(D,鈉水滯留)、「『高』血壓(鈉水滯留)」、高血糖、庫欣外觀。題問「不是」常見副作用者——「『低』血壓(B)」與類固醇相反(它因鈉水滯留致『高』血壓)。故不是者為低血壓(B)。故選B。","options":{"A":"骨質疏鬆是類固醇副作用。","B":"正確(為非副作用):類固醇致高血壓非低血壓。","C":"增加感染危險是類固醇副作用。","D":"周邊水腫是類固醇副作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-35":{"quick":"秋水仙素錯誤敘述為D：懷孕婦女「不宜」使用，故選D。","detail":{"background":"秋水仙素(colchicine):A「可治療急性痛風」(正確);B「可口服給予」(正確);C「具抗發炎作用(抑制微管、嗜中性球趨化)」(正確);D「懷孕婦女可使用」錯——colchicine「孕婦『慎用/不宜』(可能影響細胞分裂、有致畸顧慮)」。故錯誤為D。","options":{"A":"治療急性痛風,正確。","B":"可口服給予,正確。","C":"具抗發炎作用,正確。","D":"正確(為錯誤敘述):秋水仙素孕婦不宜使用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-39":{"quick":"尿崩症的治療藥是vasopressin，故選A。","detail":{"background":"「Vasopressin(抗利尿激素ADH,A)」(及其類似物desmopressin)是「尿崩症(diabetes insipidus)的治療藥」——補充ADH促集尿管水再吸收、減少大量稀釋尿。故治尿崩症者為vasopressin(A)。somatotropin(生長激素)、urofollitropin(FSH)、triiodothyronine(T3甲狀腺素)不治尿崩症。故選A。","options":{"A":"正確:vasopressin(ADH)治尿崩症。","B":"somatotropin是生長激素。","C":"urofollitropin是FSH(不孕)。","D":"triiodothyronine是甲狀腺素。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-39":{"quick":"內分泌藥物錯誤敘述為D：spironolactone競爭「醛固酮」受體（非糖皮質素），故選D。","detail":{"background":"影響內分泌的藥:A「metyrapone(抑11-β羥化酶)治庫欣症候群」(正確);B「aminoglutethimide抑制類固醇合成、可降雄性素」(正確);C「mifepristone(RU-486)可作為糖皮質素『受體拮抗劑』」(正確,也抗黃體素);D「spironolactone競爭『糖皮質素』受體」錯——spironolactone是「『醛固酮(礦物皮質素)』受體拮抗劑」(保鉀利尿、抗雄性素),「非糖皮質素受體」。故錯誤為D。","options":{"A":"metyrapone治庫欣症候群,正確。","B":"aminoglutethimide降雄性素,正確。","C":"mifepristone是糖皮質素受體拮抗劑,正確。","D":"正確(為錯誤敘述):spironolactone競爭醛固酮受體,非糖皮質素。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-63":{"quick":"不抑制reverse transcriptase的抗愛滋藥是Saquinavir（蛋白酶抑制劑），故選A。","detail":{"background":"抗愛滋(HIV)藥:Zidovudine(B,AZT)、Didanosine(C)是「核苷反轉錄酶抑制劑(NRTI)」,Nevirapine(D)是「非核苷反轉錄酶抑制劑(NNRTI)」——皆抑制reverse transcriptase。而「Saquinavir(A)」是「『蛋白酶(protease)抑制劑』」,抑制HIV蛋白酶(病毒成熟所需),「不抑制reverse transcriptase」。故不抑制反轉錄酶者為saquinavir(A)。故選A。","options":{"A":"正確:saquinavir是蛋白酶抑制劑,不抑制反轉錄酶。","B":"zidovudine是NRTI(抑反轉錄酶)。","C":"didanosine是NRTI。","D":"nevirapine是NNRTI(抑反轉錄酶)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-63":{"quick":"治療巨細胞病毒（CMV）的是ganciclovir，故選B。","detail":{"background":"「Ganciclovir(B)」是「抗巨細胞病毒(CMV)」的首選藥——抑制CMV的DNA聚合酶,用於CMV視網膜炎、肺炎(免疫低下者)。故治CMV者為ganciclovir(B)。abacavir、zidovudine(抗HIV的NRTI)、ribavirin(抗RSV/C肝)用途不同。故選B。","options":{"A":"abacavir是抗HIV藥。","B":"正確:ganciclovir治CMV感染。","C":"ribavirin抗RSV/C肝。","D":"zidovudine抗HIV。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-63":{"quick":"vancomycin錯誤敘述為D：它「正是用於」MRSA（非錯），但題問錯誤敘述...實為其它。","detail":{"background":"Vancomycin:A「主要治療革蘭氏陽性(G+)菌感染」(正確);B「抗菌機轉是抑制細菌『細胞壁』生成(結合D-Ala-D-Ala)」(正確);C「口服無法吸收(故口服只用於腸道感染如C.difficile,全身感染須靜脈)」(正確);D「用於對methicillin產生抗藥性的金黃葡萄球菌(MRSA)」——vancomycin『正是MRSA的首選』,此敘述『正確』。本題官方答案D為「錯誤」選項,推測題幹原意有版本差異;依vancomycin藥理,A、B、C皆正確,D描述MRSA用途亦正確。考生應掌握:vancomycin抑制細胞壁、治G+菌與MRSA、口服不吸收。","options":{"A":"治G+菌感染,正確。","B":"抑制細胞壁生成,正確。","C":"口服無法吸收,正確。","D":"vancomycin用於MRSA(此為正確用途);依官方標示為答案。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-63":{"quick":"抑制DNA gyrase殺菌的是ciprofloxacin，故選A。","detail":{"background":"「Ciprofloxacin(氟喹諾酮fluoroquinolone,A)」抑制細菌的「DNA迴旋酶(DNA gyrase)與拓樸異構酶IV」,阻斷DNA複製而殺菌。故抑制DNA gyrase者為ciprofloxacin(A)。isoniazid(抗結核,抑制分枝菌酸)、oxacillin(青黴素,抑細胞壁)、clarithromycin(巨環,抑核糖體)機轉不同。故選A。","options":{"A":"正確:ciprofloxacin抑制DNA gyrase。","B":"isoniazid抑制分枝菌酸合成。","C":"oxacillin抑制細胞壁。","D":"clarithromycin抑制核糖體(蛋白質合成)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-64":{"quick":"對綠膿桿菌抑菌最強的氟喹諾酮是ciprofloxacin，故選A。","detail":{"background":"氟喹諾酮類中,「Ciprofloxacin(A)」對「綠膿桿菌(Pseudomonas aeruginosa)」的抑菌作用「最強」(是抗綠膿桿菌的口服首選之一)。故對綠膿桿菌最強者為ciprofloxacin(A)。moxifloxacin(對綠膿桿菌弱、對厭氧/肺炎鏈球菌強)、trovafloxacin、norfloxacin對綠膿桿菌作用不及ciprofloxacin。故選A。","options":{"A":"正確:ciprofloxacin對綠膿桿菌抑菌最強。","B":"moxifloxacin對綠膿桿菌弱。","C":"trovafloxacin非抗綠膿桿菌首選。","D":"norfloxacin對綠膿桿菌作用較弱。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-64":{"quick":"aminoglycosides正確敘述為D：與furosemide併用易增耳毒性，故選D。","detail":{"background":"胺醣類(aminoglycosides,如gentamicin):A「口服吸收佳」錯(口服『不吸收』,須注射);B「主要由肝臟代謝失效」錯(主要『由腎臟原形排泄』,非肝代謝);C「治療革蘭氏陽性菌首選」錯(主要對『革蘭氏陰性菌』);D「與環利尿劑furosemide併用易產生耳毒性」正確(兩者皆有耳毒性,合用加成)。故正確為D。(胺醣類也有腎毒性。)故選D。","options":{"A":"胺醣類口服不吸收,須注射。","B":"主要由腎臟排泄,非肝代謝。","C":"主要對革蘭氏陰性菌,非陽性菌首選。","D":"正確:與furosemide併用易增耳毒性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-60":{"quick":"最易致C. difficile結腸炎的是clindamycin，故選C。","detail":{"background":"「Clindamycin(C)」是「最易引起『困難梭狀桿菌(C. difficile)感染與偽膜性結腸炎』」的抗生素——它破壞腸道正常菌叢,使C. difficile過度增生產生毒素。故最易致C. difficile結腸炎者為clindamycin(C)。(廣效抗生素如fluoroquinolone、cephalosporin也會,但clindamycin最經典。)vancomycin反而是『治療』C. difficile的藥。故選C。","options":{"A":"vancomycin是治療C. difficile的藥。","B":"ampicillin也可致,但clindamycin最經典。","C":"正確:clindamycin最易致C. difficile結腸炎。","D":"gentamicin較少致C. difficile。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-64":{"quick":"vancomycin正確敘述為D：與aminoglycosides併用可增強殺菌，故選D。","detail":{"background":"Vancomycin:A「主要治療G(-)菌」錯(主要治『革蘭氏陽性(G+)』菌);B「抑制細菌核糖體功能」錯(抑制『細胞壁』生成,結合D-Ala-D-Ala);C「口服吸收佳」錯(口服『不吸收』);D「與aminoglycosides併用可增強殺菌作用(但增加腎毒性/耳毒性風險)」正確(vancomycin破壞細胞壁有助胺醣類進入細菌、協同殺菌)。故正確為D。故選D。","options":{"A":"主要治G(+)菌,非G(-)。","B":"抑制細胞壁,非核糖體。","C":"口服不吸收。","D":"正確:與aminoglycosides併用增強殺菌。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-63":{"quick":"腎毒性太大僅表面塗抹的胺醣類是Neomycin，故選B。","detail":{"background":"胺醣類中,「Neomycin(新黴素,B)」「腎毒性與耳毒性太大,『不可全身使用』,僅用於『表面塗抹(皮膚感染)或口服(腸道滅菌、肝昏迷降腸道產氨)』」(口服不吸收故全身毒性低)。故僅表面塗抹者為neomycin(B)。Streptomycin、Amikacin、Tobramycin可全身(注射)使用。故選B。","options":{"A":"Streptomycin可注射(抗結核等)。","B":"正確:neomycin腎毒性大,僅表面塗抹/口服。","C":"Amikacin可注射使用。","D":"Tobramycin可注射使用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-62":{"quick":"cephalosporins錯誤敘述為D：第三代對革蘭氏陰性菌作用比第一代「強」（非弱），故選D。","detail":{"background":"頭孢菌素(cephalosporins)世代演進:A「Cefazolin(第一代)半衰期長,用於外科手術預防感染」(正確);B「第二代(cefoxitin)對厭氧菌Bacteroides fragilis有效」(正確);C「第三代(ceftazidime)可用於綠膿桿菌」(正確);D「第三代對革蘭氏陰性球菌作用比第一代『弱』」錯——「世代越高,對『革蘭氏陰性菌』作用越『強』(第三代>第一代)」(第一代主要對G+,第三代對G-強)。故錯誤為D。","options":{"A":"cefazolin(第一代)用於術前預防,正確。","B":"第二代對Bacteroides有效,正確。","C":"第三代可用於綠膿桿菌,正確。","D":"正確(為錯誤敘述):第三代對G-作用比第一代「強」非弱。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-63":{"quick":"主要由肝臟代謝、肝功能異常不宜的抗生素是Erythromycin，故選D。","detail":{"background":"「Erythromycin(紅黴素,巨環類,D)」「主要由肝臟代謝(經膽汁排泄)」,「肝功能異常者不宜使用(血中濃度上升、肝毒性)」。故肝代謝者為erythromycin(D)。Gentamicin(胺醣,腎排泄)、Ciprofloxacin、Amoxicillin(主要腎排泄)較不依賴肝代謝。故選D。","options":{"A":"Gentamicin主要腎排泄。","B":"Ciprofloxacin部分腎排泄。","C":"Amoxicillin主要腎排泄。","D":"正確:erythromycin主要肝代謝,肝功能異常不宜。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-64":{"quick":"oseltamivir/zanamivir抑制neuraminidase，故選B。","detail":{"background":"流感治療藥「Oseltamivir(克流感)與Zanamivir」是「神經胺酸酶(neuraminidase)抑制劑」——抑制流感病毒的神經胺酸酶,使「新病毒無法從宿主細胞釋放與擴散」,縮短病程。故抑制neuraminidase(B)。thymidine kinase、reverse transcriptase、adenosine kinase非其標的。故選B。","options":{"A":"thymidine kinase是aciclovir活化相關。","B":"正確:oseltamivir/zanamivir抑制神經胺酸酶。","C":"reverse transcriptase是抗HIV標的。","D":"adenosine kinase非其標的。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-59":{"quick":"增加胺醣類耳毒性的是Furosemide，故選C。","detail":{"background":"「Furosemide(環利尿劑,C)」本身有耳毒性,「與胺醣類抗生素(gentamicin)併用會『加成增加耳毒性』」(兩者皆損傷內耳)。故增加胺醣類耳毒性者為furosemide(C)。Acetazolamide、Spironolactone、Triamterene無此明顯加成耳毒性。故選C。","options":{"A":"Acetazolamide無明顯耳毒性加成。","B":"Spironolactone無此加成。","C":"正確:furosemide(環利尿劑)增加胺醣類耳毒性。","D":"Triamterene無此加成。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-61":{"quick":"gentamicin與cefazolin協同：cefazolin使gentamicin易進入細菌，故選C。","detail":{"background":"胺醣類(gentamicin)與β-內醯胺類(cefazolin)併用產生「抗菌協同作用」的機轉:「Cefazolin(破壞細菌『細胞壁』)使gentamicin更容易『進入細菌』內」(C)——細胞壁被破壞後,胺醣類更易穿透到核糖體作用,增強殺菌。故為cefazolin使gentamicin易進入細菌(C)。故選C。","options":{"A":"非使cefazolin不被分解。","B":"非使cefazolin進入細菌(方向反了)。","C":"正確:cefazolin破壞細胞壁,使gentamicin易進入細菌。","D":"非減少gentamicin腎排泄。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-64":{"quick":"肝功能異常致血中濃度上升的抗生素是erythromycin，故選D。","detail":{"background":"「Erythromycin(紅黴素,巨環類,D)」「主要由肝臟代謝」,肝功能異常者「無法有效代謝→血中濃度上升、毒性增加」。故肝代謝、肝功能異常需注意者為erythromycin(D)。gentamicin、ciprofloxacin、amoxicillin主要經腎排泄。故選D。","options":{"A":"gentamicin主要腎排泄。","B":"ciprofloxacin部分腎排泄。","C":"amoxicillin主要腎排泄。","D":"正確:erythromycin肝代謝,肝功能異常致濃度上升。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-63":{"quick":"不易被penicillinase分解的青黴素是Cloxacillin，故選C。","detail":{"background":"「Cloxacillin(C)」(及oxacillin、methicillin、nafcillin)是「『抗葡萄球菌青黴素酶(penicillinase-resistant)』的青黴素」——其化學結構不易被葡萄球菌產生的penicillinase(β-內醯胺酶)分解,用於治療產penicillinase的金黃葡萄球菌。故不易被penicillinase分解者為cloxacillin(C)。Ampicillin、Carbenicillin、Penicillin G易被penicillinase分解。故選C。","options":{"A":"Ampicillin易被penicillinase分解。","B":"Carbenicillin易被分解。","C":"正確:cloxacillin抗penicillinase。","D":"Penicillin G易被penicillinase分解。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-62":{"quick":"幽門桿菌三合一療法「不」含erythromycin，故選C。","detail":{"background":"幽門桿菌三合一療法＝「質子幫浦抑制劑(omeprazole,A)＋兩種抗生素(clarithromycin B＋amoxicillin D)」。而「Erythromycin(C)」雖也是巨環類抗生素,但「不是」三合一療法的標準成分(標準用clarithromycin)。故不包含者為erythromycin(C)。故選C。","options":{"A":"omeprazole是三合一成分(PPI)。","B":"clarithromycin是三合一抗生素。","C":"正確:erythromycin不在三合一療法(用clarithromycin)。","D":"amoxicillin是三合一抗生素。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-63":{"quick":"quinolones的作用機轉是抑制DNA gyrase，故選D。","detail":{"background":"喹諾酮類(quinolones,如ciprofloxacin)的作用機轉是「抑制細菌的『DNA迴旋酶(DNA gyrase)』與拓樸異構酶IV」——阻斷DNA的超螺旋與複製,殺菌。故為抑制DNA gyrase(D)。抑制細胞壁(β-內醯胺/vancomycin)、抑制蛋白質(胺醣/巨環/四環)、抑制葉酸(磺胺/trimethoprim)是其他機轉。故選D。","options":{"A":"抑制細胞壁是β-內醯胺類。","B":"抑制蛋白質是胺醣/巨環類。","C":"抑制葉酸是磺胺類。","D":"正確:quinolones抑制DNA gyrase。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-59":{"quick":"對瘧疾紅血球外（肝）期有效的是Primaquine，故選C。","detail":{"background":"抗瘧藥中,「Primaquine(C)」對瘧疾的「『紅血球外組織期(肝臟的潛伏休眠子hypnozoite)』」有效——可根除間日瘧/卵形瘧潛伏在肝的休眠子,防止復發。故對肝期有效者為primaquine(C)。Chloroquine、Quinine主要對紅血球內期;Pyrimethamine對紅血球內期/組織期(配合)。故選C。(primaquine在G6PD缺乏者致溶血,須先檢測。)故選C。","options":{"A":"Chloroquine對紅血球內期。","B":"Pyrimethamine(配合磺胺)主要對紅血球內期。","C":"正確:primaquine對紅血球外(肝)期有效。","D":"Quinine對紅血球內期。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-64":{"quick":"明顯腎毒性、須監測血中濃度的抗生素是Gentamicin，故選A。","detail":{"background":"「Gentamicin(胺醣類,A)」會「產生明顯的腎臟毒性(與耳毒性)」,治療指數窄,「使用時須監測血中濃度(治療藥物監測TDM)」以避免毒性。故須監測者為gentamicin(A)。Chloramphenicol(灰嬰症候群、再生不良性貧血)、Clarithromycin、Cefazolin的腎毒性與監測需求不及胺醣類。故選A。","options":{"A":"正確:gentamicin腎毒性明顯,須監測血中濃度。","B":"Chloramphenicol主要血液毒性。","C":"Clarithromycin腎毒性不明顯。","D":"Cefazolin腎毒性低。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-62":{"quick":"藥物併用錯誤為D：amoxicillin不常與carbapenem併用，故選D。","detail":{"background":"藥物併用:A「胺醣類與loop利尿劑併用(增加耳腎毒性,須注意)」(正確的注意事項);B「抗生素與口服避孕藥併用可能降低避孕效果(影響腸肝循環/腸道菌)」(正確);C「penicillins與aminoglycosides併用協同殺菌」(正確);D「臨床常併用amoxicillin與carbapenem」錯——「兩者皆β-內醯胺類、機轉相同(抑細胞壁),併用無協同意義且可能拮抗,『臨床不常併用』」。故錯誤(不當)為D。","options":{"A":"胺醣類與loop利尿劑併用增毒性(注意),正確。","B":"抗生素降低口服避孕藥效果,正確。","C":"penicillins與胺醣類協同殺菌,正確。","D":"正確(為錯誤敘述):amoxicillin與carbapenem(同類)不常併用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-64":{"quick":"治B型肝炎、阻斷病毒複製又增強免疫的是干擾素α，故選B。","detail":{"background":"「干擾素α(interferon-α, B)」用於治療「B型肝炎(及C型肝炎)」——具「抗病毒(阻斷病毒複製)」與「免疫調節(增強宿主免疫)」雙重作用。故治B肝者為干擾素α(B)。高單位免疫球蛋白(被動免疫)、干擾素β(治多發性硬化症)、干擾素γ(治慢性肉芽腫病)用途不同。故選B。","options":{"A":"高單位免疫球蛋白是被動免疫。","B":"正確:干擾素α治B型肝炎(抗病毒+免疫調節)。","C":"干擾素β治多發性硬化症。","D":"干擾素γ治慢性肉芽腫病。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-64":{"quick":"不適用於HIV的反轉錄酶抑制劑是Adefovir，故選A。","detail":{"background":"反轉錄酶抑制劑中,「Adefovir(A)」主要用於「B型肝炎(HBV)」治療,「不適用於人類免疫不全病毒(HIV)」(雖機轉類似但對HIV劑量毒性問題)。而Lamivudine(B,3TC)、Tenofovir(C)、Zidovudine(D)用於HIV(部分也用於B肝)。故不適用於HIV者為adefovir(A)。故選A。","options":{"A":"正確:adefovir主要治B肝,不適用於HIV。","B":"lamivudine用於HIV(及B肝)。","C":"tenofovir用於HIV(及B肝)。","D":"zidovudine用於HIV。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-56":{"quick":"isoniazid錯誤敘述為A：它抑制「分枝菌酸合成」非蛋白質合成，故選A。","detail":{"background":"抗結核藥Isoniazid(INH):A「干擾分枝桿菌『蛋白質』生合成」錯——INH抑制的是「『分枝菌酸(mycolic acid,結核菌細胞壁成分)』的合成」,非蛋白質;B「副作用為肝毒性與周邊神經病變(維生素B6缺乏,須補B6)」(正確);C「主要藉肝臟代謝(乙醯化)」(正確);D「是第一線肺結核四藥(INH+RIF+PZA+EMB)之一」(正確)。故錯誤為A。","options":{"A":"正確(為錯誤敘述):isoniazid抑制分枝菌酸合成,非蛋白質。","B":"副作用肝毒性與周邊神經病變,正確。","C":"主要肝代謝(乙醯化),正確。","D":"第一線四藥之一,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-64":{"quick":"須注意視力異常的抗結核藥是ethambutol，故選A。","detail":{"background":"「Ethambutol(乙胺丁醇,A)」是抗結核藥,其特徵副作用是「『視神經炎(視力模糊、色覺異常、視野缺損)』」,故使用時須「監測視力(視覺)」。故須注意視力者為ethambutol(A)。gentamicin(耳腎毒性)、itraconazole(肝)、vancomycin(耳腎)無此典型視力副作用。故選A。","options":{"A":"正確:ethambutol致視神經炎,須監測視力。","B":"gentamicin致耳腎毒性。","C":"itraconazole致肝毒性。","D":"vancomycin致耳腎毒性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-55":{"quick":"最易致潛在結核復發的是Infliximab（抗TNF），故選A。","detail":{"background":"「Infliximab(A)」是「抗腫瘤壞死因子(TNF-α)的生物製劑」——TNF-α對「圍堵結核菌(維持肉芽腫)」很重要,抑制TNF-α會「使潛在結核(latent TB)再活化(復發)」,故用藥前須篩檢結核。故最易致結核復發者為infliximab(A)。Rituximab(抗CD20)、Tocilizumab(抗IL-6)、Leflunomide結核再活化風險較低。故選A。","options":{"A":"正確:infliximab(抗TNF)最易致潛在結核復發。","B":"Rituximab(抗CD20)結核風險較低。","C":"Tocilizumab(抗IL-6)風險較低。","D":"Leflunomide風險較低。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-59":{"quick":"amoxicillin錯誤敘述為B：常與β-內醯胺酶抑制劑「併用」（非禁止），故選B。","detail":{"background":"Amoxicillin:A「屬β-lactam結構,具殺菌作用」(正確);B「禁止與β-lactamase抑制劑(clavulanic acid)併用」錯——amoxicillin『常與』clavulanic acid『併用』(Augmentin),clavulanic acid抑制β-內醯胺酶、保護amoxicillin不被分解;C「常見副作用為腹瀉」(正確);D「干擾細菌細胞壁生合成」(正確)。故錯誤為B。","options":{"A":"是β-lactam、殺菌,正確。","B":"正確(為錯誤敘述):amoxicillin常與clavulanic acid「併用」非禁止。","C":"常見副作用腹瀉,正確。","D":"干擾細胞壁生合成,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-63":{"quick":"Caspofungin的機轉是抑制細胞壁生成，故選D。","detail":{"background":"「Caspofungin(棘白菌素echinocandin類,D)」抗黴菌的機轉是「抑制黴菌『細胞壁』的β-1,3-葡聚糖(glucan)合成」——破壞細胞壁完整性。故抑制細胞壁生成(D)。抑制核酸(flucytosine)、改變細胞膜滲透性(amphotericin B結合麥角固醇)、抑制麥角固醇合成(azole類)是其他抗黴菌機轉。故選D。","options":{"A":"抑制核酸是flucytosine。","B":"改變細胞膜滲透性是amphotericin B。","C":"抑制麥角固醇合成是azole類。","D":"正確:caspofungin抑制黴菌細胞壁(β-葡聚糖)生成。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-64":{"quick":"四環素最不宜以「牛奶」服用，故選C。","detail":{"background":"口服四環素類(tetracyclines)「最不宜以『牛奶(含鈣)』服用」——四環素會與「鈣、鎂、鐵、鋁等多價金屬離子『螯合(chelation)』」,形成不溶性複合物、「大幅降低吸收」。牛奶、制酸劑、含鐵製劑都應避免同服。故最不宜者為牛奶(C)。故選C。","options":{"A":"以開水服用可。","B":"茶水影響較牛奶小。","C":"正確:牛奶(含鈣)螯合四環素、降低吸收,最不宜。","D":"果汁影響較牛奶小。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-54":{"quick":"腎功能不良高齡者用vancomycin要注意耳毒性，故選A。","detail":{"background":"腎功能不良的高齡病人使用「vancomycin」治療嚴重感染,因藥物經腎排泄,腎功能差易蓄積,要特別注意「『耳毒性(ototoxicity)』與腎毒性」——須監測血中濃度與腎功能、調整劑量。故要注意者為耳毒性(A)。癲癇、腹瀉、白內障非vancomycin蓄積的主要毒性。故選A。","options":{"A":"正確:vancomycin蓄積要注意耳毒性(與腎毒性)。","B":"癲癇非vancomycin主要毒性。","C":"腹瀉非vancomycin蓄積主要毒性。","D":"白內障與vancomycin無關。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-64":{"quick":"與磺胺藥併用治弓形蟲的是Pyrimethamine，故選C。","detail":{"background":"治療弓形蟲(Toxoplasma gondii)感染,常用「Pyrimethamine(C)＋磺胺藥(sulfadiazine/sulfadoxine)」——兩者『序列阻斷葉酸合成途徑』(磺胺抑二氫蝶酸合成酶、pyrimethamine抑二氫葉酸還原酶),協同抑制弓形蟲。故與磺胺併用治弓形蟲者為pyrimethamine(C)。Ciprofloxacin、Metronidazole、Trimethoprim非弓形蟲標準併用。故選C。(須補葉酸減少骨髓抑制。)故選C。","options":{"A":"Ciprofloxacin非弓形蟲治療。","B":"Metronidazole治阿米巴/厭氧菌。","C":"正確:pyrimethamine與磺胺併用治弓形蟲。","D":"Trimethoprim與磺胺併用治一般細菌(非弓形蟲標準)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-63":{"quick":"治CMV視網膜炎且對aciclovir抗藥者用Foscarnet，故選C。","detail":{"background":"免疫不全病人CMV視網膜炎,且對aciclovir/ganciclovir有抗藥性(病毒缺乏胸苷激酶或DNA聚合酶突變)時,可用「Foscarnet(膦甲酸,C)」——「直接抑制病毒DNA聚合酶(不需病毒激酶活化)」,故對aciclovir/ganciclovir抗藥株仍有效。故選C。Cidofovir、Fomivirsen、Ganciclovir也治CMV,但題指「對aciclovir無反應/抗藥」最對應foscarnet(不需激酶活化)。故選C。","options":{"A":"Cidofovir也治CMV但題指foscarnet。","B":"Fomivirsen是反義寡核苷酸(局部)。","C":"正確:foscarnet不需病毒激酶,治aciclovir抗藥的CMV。","D":"Ganciclovir需病毒激酶活化(抗藥株無效)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-53":{"quick":"不作用在細菌核糖體的是Vancomycin，故選A。","detail":{"background":"作用在細菌「核糖體(抑制蛋白質合成)」的抗生素:Gentamicin(B,30S)、Erythromycin(C,50S)、Clindamycin(D,50S)。而「Vancomycin(A)」是「抑制細菌『細胞壁』生成(結合D-Ala-D-Ala)」,「不作用在核糖體」。故不作用核糖體者為vancomycin(A)。故選A。","options":{"A":"正確:vancomycin抑制細胞壁,不作用核糖體。","B":"gentamicin作用30S核糖體。","C":"erythromycin作用50S核糖體。","D":"clindamycin作用50S核糖體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-64":{"quick":"chloroquine抗藥區瘧疾旅行預防用Mefloquine，故選B。","detail":{"background":"前往「chloroquine抗藥性瘧疾疫區」旅行,預防用藥可選「Mefloquine(美爾奎寧,B)」(或atovaquone-proguanil、doxycycline)——對chloroquine抗藥株有效。故選B。Artemisinin(治療用,非預防首選單用)、Primaquine(根除肝期/特定預防)、Pyrimethamine(配合磺胺)非chloroquine抗藥區的標準旅行預防首選。故選B。","options":{"A":"Artemisinin主要用於治療(複方)。","B":"正確:mefloquine用於chloroquine抗藥區的瘧疾預防。","C":"Primaquine用於根除肝期/特定預防。","D":"Pyrimethamine(配合磺胺)非標準預防。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-39":{"quick":"治MRSA肺炎「不」適用Daptomycin（被肺界面活性劑抑制），故選A。","detail":{"background":"Methicillin抗藥性金黃葡萄球菌(MRSA)『肺炎』的治療:「Daptomycin(A)」雖對MRSA有效,但「『不適用於肺部感染』——daptomycin會『被肺界面活性劑(surfactant)抑制』而失效」。Quinupristin/Dalfopristin、Teicoplanin、Telavancin可用於MRSA(含肺炎,或其他組織)。故治MRSA肺炎不適用者為daptomycin(A)。(MRSA肺炎首選vancomycin或linezolid。)故選A。","options":{"A":"正確:daptomycin被肺界面活性劑抑制,不適用於肺炎。","B":"Quinupristin/Dalfopristin可用於MRSA。","C":"Teicoplanin可用於MRSA。","D":"Telavancin可用於MRSA。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-33":{"quick":"clarithromycin（巨環類）干擾細菌蛋白質生合成，故選D。","detail":{"background":"黴漿菌(Mycoplasma)肺炎用「Clarithromycin(巨環類macrolide,D)」治療,機轉是「干擾細菌『蛋白質』生合成(結合50S核糖體)」。故為干擾蛋白質生合成(D)。黴漿菌「無細胞壁」,故β-內醯胺類(抑細胞壁)無效;巨環類、四環素、氟喹諾酮有效。A錯(非penicillin類)、B錯(非葉酸)、C錯(非細胞壁)。故選D。","options":{"A":"非penicillin類(那抑細胞壁,對無壁的黴漿菌無效)。","B":"非干擾葉酸(那是磺胺)。","C":"非干擾細胞壁(黴漿菌無細胞壁)。","D":"正確:clarithromycin(巨環)干擾蛋白質生合成。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-40":{"quick":"治綠膿桿菌的青黴素是piperacillin，故選D。","detail":{"background":"「Piperacillin(D)」是「抗綠膿桿菌青黴素(antipseudomonal penicillin)」——對綠膿桿菌(Pseudomonas aeruginosa)有效(常與β-內醯胺酶抑制劑tazobactam併用)。故治綠膿桿菌者為piperacillin(D)。amoxicillin、ampicillin(廣效但對綠膿桿菌無效)、oxacillin(抗葡萄球菌)不抗綠膿桿菌。故選D。","options":{"A":"amoxicillin對綠膿桿菌無效。","B":"oxacillin是抗葡萄球菌青黴素。","C":"ampicillin對綠膿桿菌無效。","D":"正確:piperacillin抗綠膿桿菌。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-39":{"quick":"降低HIV蛋白酶抑制劑藥效的抗結核藥是rifampin，故選D。","detail":{"background":"「Rifampin(利福平,D)」是強力「肝臟細胞色素P450『酵素誘導劑』」——會「加速HIV『蛋白酶抑制劑』的代謝、降低其血中濃度與藥效」(故HIV合併結核者須調整,改用rifabutin)。故降低蛋白酶抑制劑藥效者為rifampin(D)。ethambutol、isoniazid、pyrazinamide無此強烈酵素誘導。故選D。","options":{"A":"ethambutol無酵素誘導。","B":"isoniazid是酵素抑制(非誘導)。","C":"pyrazinamide無此強誘導。","D":"正確:rifampin誘導P450,降低蛋白酶抑制劑藥效。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-40":{"quick":"治新生兒感染副作用最小的是penicillin G，故選B。","detail":{"background":"治療新生兒感染,考量副作用「Penicillin G(B)」最安全。而:Chloramphenicol(A)在新生兒因肝代謝未成熟→「灰嬰症候群(grey baby syndrome,致命)」;Sulfamethoxazole(C,磺胺)→置換膽紅素致「核黃疸(kernicterus)」;Tetracycline(D)→「牙齒染色與骨骼發育影響」。故新生兒最佳選擇為penicillin G(B)。故選B。","options":{"A":"chloramphenicol致灰嬰症候群。","B":"正確:penicillin G副作用最小,新生兒可用。","C":"sulfamethoxazole致核黃疸。","D":"tetracycline致牙齒染色。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-31":{"quick":"巨環類抗生素最不易引起癲癇，故選D。","detail":{"background":"巨環類抗生素(macrolides,如erythromycin)的副作用:腸胃不適(A,最常見,刺激腸蠕動)、黃疸/肝毒性(B,膽汁鬱積性肝炎)、耳毒性(C,高劑量可逆性聽損)、QT延長。而「癲癇(D)」不是巨環類的典型副作用。故最不易引起者為癲癇(D)。(致癲癇的抗生素是高劑量β-內醯胺/碳青黴烯、氟喹諾酮。)故選D。","options":{"A":"腸胃不適是巨環類常見副作用。","B":"黃疸(肝毒性)是巨環類副作用。","C":"耳毒性是巨環類高劑量副作用。","D":"正確:巨環類最不易引起癲癇。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-37":{"quick":"頻繁高劑量易致耳毒性的利尿劑是Loop diuretics，故選B。","detail":{"background":"「環利尿劑(Loop diuretics,如furosemide,B)」在「頻繁及高劑量使用下易產生『耳毒性(ototoxicity,聽力損失、耳鳴)』」——尤其與胺醣類抗生素併用時加成。故易致耳毒性者為環利尿劑(B)。Thiazide、醛固酮拮抗劑、碳酸酐酶抑制劑無此明顯耳毒性。故選B。","options":{"A":"Thiazide無明顯耳毒性。","B":"正確:環利尿劑高劑量易致耳毒性。","C":"醛固酮拮抗劑無耳毒性。","D":"碳酸酐酶抑制劑無明顯耳毒性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-32":{"quick":"抗生素最不適當敘述為B：胺醣類胃腸「不吸收」（非吸收佳），故選B。","detail":{"background":"抗生素敘述:A「penicillins與aminoglycosides併用協同殺菌」(正確);B「aminoglycosides類胃腸吸收效果佳,可口服全身治療」錯——胺醣類「胃腸『不吸收』,須『注射』才能全身治療」(口服只用於腸道局部);C「amoxicillin與clavulanic acid併用(clavulanic acid抑制β-內醯胺酶)」(正確);D「ampicillin屬廣效性抗生素」(正確)。故最不適當為B。","options":{"A":"penicillins與胺醣類協同殺菌,正確。","B":"正確(為最不適當):胺醣類胃腸不吸收,須注射。","C":"amoxicillin與clavulanic acid併用,正確。","D":"ampicillin是廣效抗生素,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-40":{"quick":"抑制DNA依賴型RNA聚合酶的是rifampin，故選D。","detail":{"background":"「Rifampin(利福平,D)」抑制細菌的「DNA依賴型RNA聚合酶(DNA-dependent RNA polymerase)」——阻斷細菌RNA轉錄(mRNA合成),用於結核與其他感染。故抑制RNA聚合酶者為rifampin(D)。clindamycin、cephalosporin(抑細胞壁)、daptomycin(破壞細胞膜)機轉不同。故選D。(rifampin使體液變橘紅色。)故選D。","options":{"A":"clindamycin抑制核糖體(蛋白質)。","B":"cephalosporin抑制細胞壁。","C":"daptomycin破壞細胞膜。","D":"正確:rifampin抑制DNA依賴型RNA聚合酶。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-64":{"quick":"MOPP中的「O」是Oncovin（Vincristine），故選B。","detail":{"background":"MOPP是治療何杰金氏淋巴瘤的化療組合:M(mechlorethamine,氮芥)、O(Oncovin＝『Vincristine』,長春新鹼)、P(procarbazine)、P(prednisone)。故「O」指Vincristine(B,商品名Oncovin)。Vinblastine、Doxorubicin、Ondansetron非MOPP的O。故選B。","options":{"A":"Vinblastine非MOPP的O。","B":"正確:MOPP的O是Vincristine(Oncovin)。","C":"Doxorubicin是ABVD成分。","D":"Ondansetron是止吐劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-64":{"quick":"S期專一的抗代謝藥是5-fluorouracil，故選D。","detail":{"background":"「5-Fluorouracil(5-FU,D)」是「抗代謝藥(antimetabolite)」——干擾嘧啶(thymidylate)合成,「對細胞週期『S期(DNA合成期)』具專一性」。故S期專一的抗代謝藥為5-FU(D)。cyclophosphamide(烷化劑,非週期專一)、bleomycin(G2/M)、vincristine(M期)機轉/週期不同。故選D。","options":{"A":"cyclophosphamide是烷化劑(非週期專一)。","B":"bleomycin作用於G2/M期。","C":"vincristine作用於M期。","D":"正確:5-FU是抗代謝藥,S期專一。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-64":{"quick":"topotecan錯誤敘述為A：它抑制topoisomerase I（非葉酸合成），故選A。","detail":{"background":"抗癌藥Topotecan:A「主要作用為抑制葉酸的合成」錯——topotecan是「拓樸異構酶I(topoisomerase I)抑制劑」(camptothecin類),非抑制葉酸;B「用於轉移性卵巢癌」(正確);C「可與cisplatin、paclitaxel併用」(正確);D「副作用包括腹瀉、噁心、嘔吐(及骨髓抑制)」(正確)。故錯誤為A。","options":{"A":"正確(為錯誤敘述):topotecan抑制拓樸異構酶I,非葉酸合成。","B":"用於轉移性卵巢癌,正確。","C":"可與cisplatin、paclitaxel併用,正確。","D":"副作用含腹瀉噁心嘔吐,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-61":{"quick":"tamoxifen正確敘述為C：乳癌患者建議使用不超過5年（傳統），故選C。","detail":{"background":"Tamoxifen(選擇性雌激素受體調節劑SERM):A「不具estrogenic活性」錯(它在乳房抗雌激素,但在『子宮、骨骼有部分雌激素樣活性』,故增加子宮內膜癌風險);B「不與estrogen競爭受體」錯(它『競爭性結合』雌激素受體);C「建議乳癌患者使用不超過5年」(傳統建議約5年,此為題目正解;近年也有延長至10年的研究);D「作用與細胞週期有關」錯(tamoxifen是荷爾蒙治療、阻斷雌激素受體,『非』細胞週期專一的化療)。故正確(依題)為C。","options":{"A":"tamoxifen在子宮骨骼有部分雌激素活性。","B":"tamoxifen競爭性結合雌激素受體。","C":"正確(依題):乳癌患者建議使用不超過5年。","D":"tamoxifen是荷爾蒙治療,非細胞週期專一。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-63":{"quick":"抑制topoisomerase II、作用於late S-G2的是etoposide，故選D。","detail":{"background":"「Etoposide(VP-16,D)」是「拓樸異構酶II(topoisomerase II)抑制劑」——使DNA斷裂、阻斷細胞週期於「晚S期至G2期」。故抑制topoisomerase II者為etoposide(D)。cyclophosphamide(烷化劑)、vinblastine(微管/M期)、gefitinib(EGFR標靶)機轉不同。故選D。","options":{"A":"cyclophosphamide是烷化劑。","B":"vinblastine作用於微管(M期)。","C":"gefitinib是EGFR酪胺酸激酶抑制劑。","D":"正確:etoposide抑制topoisomerase II(late S-G2)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-64":{"quick":"可抗癌的抗生素是Doxorubicin，故選B。","detail":{"background":"「Doxorubicin(小紅莓,B)」是「『抗腫瘤抗生素(anthracycline)』」——嵌入DNA、抑制topoisomerase II、產生自由基,具抗癌作用(治多種癌症),但有『劑量依賴性心臟毒性』。故抗癌的抗生素為doxorubicin(B)。Methicillin、Streptomycin、Ciprofloxacin是治感染的抗生素(無抗癌作用)。故選B。","options":{"A":"Methicillin是抗菌的青黴素。","B":"正確:doxorubicin是抗腫瘤抗生素(anthracycline)。","C":"Streptomycin是抗菌胺醣類。","D":"Ciprofloxacin是抗菌氟喹諾酮。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-59":{"quick":"屬多巴胺受體拮抗劑的止吐劑是Metoclopramide，故選D。","detail":{"background":"化療止吐劑中「多巴胺(D2)受體拮抗劑」是「Metoclopramide(D,胃復安)」——阻斷CTZ的D2受體止吐(高劑量也阻5-HT3)。故多巴胺受體拮抗劑為metoclopramide(D)。Dronabinol(大麻素)、Ondansetron(5-HT3拮抗)、Aprepitant(NK1拮抗)機轉不同。故選D。","options":{"A":"Dronabinol是大麻素類止吐。","B":"Ondansetron是5-HT3拮抗劑。","C":"Aprepitant是NK1受體拮抗劑。","D":"正確:metoclopramide是多巴胺D2拮抗劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-63":{"quick":"paclitaxel與tubulin結合阻礙細胞分裂，故選B。","detail":{"background":"「Paclitaxel(紫杉醇,B)」的機轉是「與腫瘤細胞內『微管蛋白(tubulin)』結合、『穩定微管(使其無法解聚)』」——阻礙有絲分裂紡錘體功能、停止細胞分裂於M期。故與tubulin結合阻礙分裂者為paclitaxel(B)。topoisomerase I抑制(A,topotecan)、asparagine(C,L-asparaginase)、葉酸(D,methotrexate)機轉不同。故選B。","options":{"A":"抑制topoisomerase I是topotecan/irinotecan。","B":"正確:paclitaxel與tubulin結合穩定微管,阻礙分裂。","C":"干擾asparagine是L-asparaginase。","D":"干擾葉酸是methotrexate。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-64":{"quick":"gefitinib抑制EGF受體的tyrosine kinase，故選A。","detail":{"background":"「Gefitinib(艾瑞莎,A)」是「表皮生長因子受體(EGFR)的酪胺酸激酶抑制劑(TKI)」——用於有EGFR突變的「非小細胞肺癌」標靶治療。故抑制EGFR酪胺酸激酶者為gefitinib(A)。VEGFR(bevacizumab/sorafenib)、PDGFR、IL-2受體mTOR機轉不同。故選A。","options":{"A":"正確:gefitinib抑制EGFR的酪胺酸激酶。","B":"VEGFR是bevacizumab/sorafenib標的。","C":"PDGFR是其他標靶。","D":"mTOR是sirolimus標的。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-63":{"quick":"與cyclophilin結合抑制T細胞的是cyclosporine，故選D。","detail":{"background":"「Cyclosporine(環孢素,D)」免疫抑制劑——「與細胞內蛋白『cyclophilin』結合」,形成複合體「抑制calcineurin」,進而抑制NFAT與IL-2轉錄、「抑制T細胞活化」,用於器官移植抗排斥。故與cyclophilin結合者為cyclosporine(D)。azathioprine、mycophenolate(抑purine合成)、prednisone(類固醇)機轉不同。(tacrolimus則結合FKBP。)故選D。","options":{"A":"azathioprine抑制purine合成。","B":"mycophenolate mofetil抑制purine合成。","C":"prednisone是糖皮質類固醇。","D":"正確:cyclosporine與cyclophilin結合抑制calcineurin/T細胞。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-61":{"quick":"Ondansetron的適應症是化療引起的嘔吐，故選C。","detail":{"background":"「Ondansetron(C的適應)」是「5-HT3血清素受體拮抗劑」,適應症是「化學療法(及放療、術後)引起的『噁心嘔吐』」。故適應症為化療引起的嘔吐(C)。細菌性下痢、腹瀉型腸躁症、胃食道逆流非ondansetron適應症。故選C。","options":{"A":"細菌性下痢非ondansetron適應症。","B":"腹瀉型腸躁症非其適應症。","C":"正確:ondansetron治化療引起的嘔吐。","D":"胃食道逆流用PPI/H2拮抗。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-60":{"quick":"paclitaxel錯誤敘述為D：它不是烷化劑（是微管穩定劑），故選D。","detail":{"background":"Paclitaxel(紫杉醇):A「治療卵巢癌與乳癌」(正確);B「肝功能不全者應調整劑量(經肝代謝)」(正確);C「副作用包括嗜中性球低下(neutropenia)與過敏反應」(正確,過敏與溶劑Cremophor相關);D「主要屬烷化劑、使DNA交聯」錯——paclitaxel是「『微管穩定劑(taxane)』,與tubulin結合阻礙分裂」,『非烷化劑』、不使DNA交聯。故錯誤為D。","options":{"A":"治療卵巢癌與乳癌,正確。","B":"肝功能不全調整劑量,正確。","C":"副作用含嗜中性球低下與過敏,正確。","D":"正確(為錯誤敘述):paclitaxel是微管穩定劑,非烷化劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-64":{"quick":"sirolimus抑制mTOR影響細胞週期，故選C。","detail":{"background":"「Sirolimus(rapamycin/rapamune,C)」免疫抑制劑——與FKBP結合後「抑制『mTOR』」,阻斷IL-2訊號下游、「影響淋巴細胞的細胞週期(G1→S阻斷)」,抑制T細胞增生。故抑制mTOR者為sirolimus(C)。降低calcineurin(cyclosporine/tacrolimus)、減少IL-2產生(calcineurin抑制劑)、抑制purine(mycophenolate)機轉不同。故選C。","options":{"A":"降低calcineurin是cyclosporine/tacrolimus。","B":"減少IL-2產生是calcineurin抑制劑。","C":"正確:sirolimus抑制mTOR,影響細胞週期。","D":"抑制purine是mycophenolate。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-56":{"quick":"M期專一的抗癌藥是vincristine，故選C。","detail":{"background":"「Vincristine(長春新鹼,C)」是「長春花生物鹼(vinca alkaloid)」——「與微管蛋白結合、『抑制微管聚合』,阻斷有絲分裂紡錘體」,「對細胞週期『M期(有絲分裂期)』具專一性」。故M期專一者為vincristine(C)。cyclophosphamide(烷化劑)、bleomycin(G2/M)、5-FU(S期)機轉/週期不同。故選C。","options":{"A":"cyclophosphamide是烷化劑(非週期專一)。","B":"bleomycin作用於G2/M。","C":"正確:vincristine抑制微管聚合,M期專一。","D":"5-FU作用於S期。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-64":{"quick":"cyclosporine抗排斥是降低IL-2產生，故選A。","detail":{"background":"「Cyclosporine(環孢素)」緩解器官移植急性排斥的機轉是「降低淋巴激素『IL-2』的產生」——它與cyclophilin結合、抑制calcineurin,阻斷NFAT轉錄因子、減少IL-2的轉錄,抑制T細胞活化與增生。故降低IL-2產生(A)。它非降IL-10、非抑purine合成、非螯合DNA。故選A。","options":{"A":"正確:cyclosporine降低IL-2產生(抑制T細胞)。","B":"非降IL-10。","C":"抑制purine是mycophenolate/azathioprine。","D":"螯合DNA是烷化劑/cisplatin。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-63":{"quick":"omalizumab結合免疫球蛋白IgE，故選A。","detail":{"background":"「Omalizumab(A)」是治療過敏性氣喘的「抗IgE單株抗體」——「結合游離的免疫球蛋白『IgE』」,使IgE無法結合肥大細胞,減少過敏介質釋放,用於嚴重過敏性氣喘。故結合IgE者為omalizumab(A)。故選A。","options":{"A":"正確:omalizumab結合IgE。","B":"非結合IgG。","C":"非結合IL-2。","D":"結合TNF-α是infliximab/etanercept。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-54":{"quick":"抗癌藥錯誤敘述為C：Cisplatin不與DHFR結合（是與DNA交聯），故選C。","detail":{"background":"抗癌藥:A「烴化劑(alkylating agents)直接破壞DNA(烷化交聯)」(正確);B「護理人員處理Doxorubicin滲漏可能傷害(組織壞死,是發泡劑vesicant)」(正確);C「Cisplatin與二氫葉酸還原酶(DHFR)結合」錯——cisplatin是「『鉑類,與DNA『交聯』』」抑制複製,『非』與DHFR結合(與DHFR結合的是methotrexate);D「Doxorubicin產生自由基、有心臟毒性」(正確)。故錯誤為C。","options":{"A":"烴化劑破壞DNA,正確。","B":"doxorubicin滲漏傷組織,正確。","C":"正確(為錯誤敘述):cisplatin與DNA交聯,非結合DHFR。","D":"doxorubicin產生自由基、心臟毒性,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-55":{"quick":"Etanercept結合TNF-α治類風濕，故選B。","detail":{"background":"「Etanercept(恩博,B)」是治療類風濕性關節炎的生物製劑——是「『腫瘤壞死因子(TNF-α)』的受體融合蛋白」,「結合並中和TNF-α」,減少發炎。故結合TNF-α者為etanercept(B)。它非結合IL-2、IFN-α、PGs。故選B。(用前須篩檢結核。)故選B。","options":{"A":"非結合IL-2。","B":"正確:etanercept結合TNF-α。","C":"非結合IFN-α。","D":"非結合前列腺素。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-62":{"quick":"leucovorin與methotrexate併用減副作用，故選C。","detail":{"background":"「Leucovorin(亞葉酸,folinic acid)」與「Methotrexate(MTX,C)」併用——MTX抑制二氫葉酸還原酶(DHFR)阻斷葉酸活化,leucovorin提供「已還原的活性葉酸(繞過被抑制的DHFR)」,「『救援(leucovorin rescue)』正常細胞、減少MTX的骨髓與黏膜毒性」。故與MTX併用者為leucovorin(C)。故選C。","options":{"A":"azacitidine非leucovorin救援對象。","B":"5-FU則用leucovorin『增效』(非減副作用,機轉不同)。","C":"正確:leucovorin救援methotrexate、減其副作用。","D":"6-MP非leucovorin救援對象。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-52":{"quick":"抑制tumor tyrosine kinase治CML的是Imatinib，故選D。","detail":{"background":"「Imatinib(基利克,D)」是「酪胺酸激酶抑制劑」——抑制「BCR-ABL酪胺酸激酶(慢性骨髓性白血病CML的致病融合蛋白)」,用於CML標靶治療(也抑c-KIT治GIST)。故抑制腫瘤酪胺酸激酶治CML者為imatinib(D)。Irinotecan(topo I)、Etoposide(topo II)、Paclitaxel(微管)是傳統化療,非酪胺酸激酶抑制劑。故選D。","options":{"A":"Irinotecan抑制topoisomerase I。","B":"Etoposide抑制topoisomerase II。","C":"Paclitaxel作用於微管。","D":"正確:imatinib抑制BCR-ABL酪胺酸激酶治CML。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-54":{"quick":"omalizumab正確敘述為C：減少肥大細胞釋放發炎介質，故選C。","detail":{"background":"Omalizumab(抗IgE單株抗體):A「治療痛風性關節炎」錯(它治『嚴重過敏性氣喘』);B「抑制免疫球蛋白G(IgG)」錯(它結合『IgE』非IgG);C「可有效減低肥大細胞釋放發炎介質」正確——結合游離IgE使其無法活化肥大細胞,減少組織胺等釋放;D「方便大量製造、價格便宜、第一線用藥」錯(單株抗體『昂貴』,用於『難治型』非第一線)。故正確為C。","options":{"A":"omalizumab治過敏性氣喘,非痛風。","B":"它結合IgE非IgG。","C":"正確:omalizumab減少肥大細胞釋放發炎介質。","D":"單株抗體昂貴,非第一線用藥。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-52":{"quick":"對細胞週期具專一性的抗癌藥是Etoposide，故選A。","detail":{"background":"「Etoposide(VP-16,A)」是「細胞週期『專一性(cell cycle-specific)』」抗癌藥——抑制topoisomerase II,作用於「S晚期至G2期」。故細胞週期專一者為etoposide(A)。Cisplatin、Carmustine、Cyclophosphamide是「烷化(類)劑」,屬「細胞週期『非專一性』」(對各期細胞皆作用)。故選A。","options":{"A":"正確:etoposide是細胞週期專一性(topo II,S-G2)。","B":"Cisplatin是週期非專一性。","C":"Carmustine(烷化劑)是週期非專一性。","D":"Cyclophosphamide(烷化劑)是週期非專一性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-60":{"quick":"抑制多巴胺受體止吐的是Prochlorperazine，故選D。","detail":{"background":"「Prochlorperazine(D)」是「phenothiazine類抗精神病藥」,止吐機轉是「抑制(阻斷)CTZ的『多巴胺(D2)受體』」。故經抑制多巴胺受體止吐者為prochlorperazine(D)。Aprepitant(NK1拮抗)、Dexamethasone(類固醇)、Ondansetron(5-HT3拮抗)機轉不同。故選D。","options":{"A":"Aprepitant是NK1受體拮抗劑。","B":"Dexamethasone是類固醇(機轉不明)。","C":"Ondansetron是5-HT3拮抗劑。","D":"正確:prochlorperazine抑制多巴胺受體止吐。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-63":{"quick":"抑制微管聚合且骨髓抑制較低的是Vincristine，故選D。","detail":{"background":"「Vincristine(長春新鹼,D)」抑制「微管(microtubule)聚合」,且「『骨髓抑制較低』(其劑量限制毒性是『周邊神經病變』而非骨髓抑制)」。故抑制微管聚合且骨髓抑制低者為vincristine(D)。Colchicine(非抗癌)、Docetaxel(微管穩定,骨髓抑制明顯)、Vinblastine(抑微管但骨髓抑制較明顯)不符「骨髓抑制低」。故選D。","options":{"A":"Colchicine是治痛風(非抗癌)。","B":"Docetaxel是微管穩定劑,骨髓抑制明顯。","C":"Vinblastine抑微管但骨髓抑制較明顯。","D":"正確:vincristine抑微管聚合,骨髓抑制低(神經毒性為主)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-53":{"quick":"mycophenolate mofetil抑制purine生合成，故選A。","detail":{"background":"「Mycophenolate mofetil(MMF,A)」免疫抑制劑(用於腎移植)——抑制「肌苷單磷酸脫氫酶(IMPDH)」、「抑制『嘌呤(purine)的『重新合成』」,而淋巴球高度依賴purine重新合成,故選擇性抑制T、B淋巴球增生。故抑制purine生合成者為MMF(A)。抑制calcineurin(cyclosporine)、螯合DNA(烷化劑)、抑制NFAT(calcineurin抑制劑)機轉不同。故選A。","options":{"A":"正確:mycophenolate mofetil抑制purine生合成。","B":"抑制calcineurin是cyclosporine/tacrolimus。","C":"螯合DNA是烷化劑。","D":"抑制NFAT是calcineurin抑制劑下游。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-64":{"quick":"有明顯周邊神經毒性與肝毒性的是Oxaliplatin，故選D。","detail":{"background":"「Oxaliplatin(鉑類,D)」的特徵毒性是「『周邊神經毒性(尤其遇冷誘發的感覺異常)』」(也有肝毒性);相對地cisplatin以『腎毒性與耳毒性』為主。故有明顯周邊神經毒性者為oxaliplatin(D)。Busulfan(肺纖維化)、Doxorubicin(心臟毒性)毒性不同。故選D。","options":{"A":"Busulfan致肺纖維化。","B":"Cisplatin以腎毒性耳毒性為主。","C":"Doxorubicin致心臟毒性。","D":"正確:oxaliplatin有明顯周邊神經毒性(及肝毒性)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-63":{"quick":"中和IL-1的是Anakinra，故選A。","detail":{"background":"「Anakinra(A)」是「介白素-1(IL-1)受體拮抗劑」——「阻斷IL-1受體活化」,減少IL-1介導的關節發炎(用於類風濕關節炎、自體發炎疾病)。故中和/阻斷IL-1者為anakinra(A)。Infliximab(抗TNF)、Rituximab(抗CD20)、Tofacitinib(JAK抑制劑)機轉不同。故選A。","options":{"A":"正確:anakinra阻斷IL-1受體。","B":"Infliximab抗TNF-α。","C":"Rituximab抗CD20(B細胞)。","D":"Tofacitinib是JAK抑制劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-40":{"quick":"Imatinib治CML是抑制BCR-ABL，故選A。","detail":{"background":"「Imatinib(基利克)」治療慢性骨髓性白血病(CML)的標靶機轉是「抑制『BCR-ABL』酪胺酸激酶」——BCR-ABL是費城染色體t(9;22)產生的恆定活化激酶,驅動CML;imatinib抑制之而控制白血病(也抑c-KIT治GIST)。故治CML是抑制BCR-ABL(A)。EGFR(gefitinib)、HER2(trastuzumab)、c-KIT(治GIST)非CML標的。故選A。","options":{"A":"正確:imatinib治CML是抑制BCR-ABL。","B":"EGFR是gefitinib標的。","C":"HER2是trastuzumab標的。","D":"c-KIT是imatinib治GIST的標的(但CML是BCR-ABL)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-35":{"quick":"咖啡因抑制磷酸雙酯酶（phosphodiesterase），故選A。","detail":{"background":"咖啡因(caffeine,甲基黃嘌呤)的作用:主要「拮抗腺苷酸受體」,以及「抑制『磷酸雙酯酶(phosphodiesterase, PDE)』」——抑制PDE使細胞內cAMP不被分解、濃度上升(產生中樞興奮、支氣管擴張等)。故被咖啡因抑制的酶為磷酸雙酯酶(A)。磷脂質脂解酶、鹼性磷酸酶、酪胺酸激酶非咖啡因標的。故選A。","options":{"A":"正確:咖啡因抑制磷酸雙酯酶(PDE)。","B":"非磷脂質脂解酶。","C":"非鹼性磷酸酶。","D":"非酪胺酸激酶。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-39":{"quick":"Leucovorin降低methotrexate副作用，故選D。","detail":{"background":"「Leucovorin(亞葉酸)」常用於降低「Methotrexate(MTX,D)」的副作用——MTX抑制DHFR阻斷葉酸活化,leucovorin提供活性葉酸「救援(rescue)」正常細胞,減少MTX的骨髓與黏膜毒性。故降低其副作用者為methotrexate(D)。cladribine、cytarabine、fludarabine非leucovorin救援對象。故選D。","options":{"A":"cladribine非leucovorin救援對象。","B":"cytarabine非leucovorin救援對象。","C":"fludarabine非leucovorin救援對象。","D":"正確:leucovorin降低methotrexate副作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-39":{"quick":"主要治療腦瘤的化療藥是Carmustine，故選C。","detail":{"background":"「Carmustine(BCNU,C)」是「亞硝基脲(nitrosourea)類烷化劑」——「脂溶性高、可通過血腦障壁」,故「主要用於『腦瘤(惡性膠質瘤)』治療」(也用於淋巴瘤)。故治腦瘤者為carmustine(C)。Ifosfamide、Cisplatin、Dacarbazine較不易過血腦障壁。故選C。","options":{"A":"Ifosfamide不易過血腦障壁。","B":"Cisplatin不易過血腦障壁。","C":"正確:carmustine(可過血腦障壁)治腦瘤。","D":"Dacarbazine用於黑色素瘤等。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-40":{"quick":"長期cyclosporine的副作用是腎毒性與高血壓，故選B。","detail":{"background":"長期使用免疫抑制劑「Cyclosporine(環孢素)」的主要副作用是「『腎毒性與高血壓』(B)」——cyclosporine收縮腎入球小動脈、致腎功能損害與高血壓(也有牙齦增生、多毛、神經毒性)。故副作用為腎毒性與高血壓(B)。骨髓損害(azathioprine)、白內障(類固醇)、偏頭痛非cyclosporine典型。故選B。","options":{"A":"骨髓損害是azathioprine副作用。","B":"正確:cyclosporine致腎毒性與高血壓。","C":"白內障是類固醇副作用。","D":"偏頭痛非cyclosporine典型。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-39":{"quick":"最易產生腎毒性的抗癌藥是cisplatin，故選B。","detail":{"background":"「Cisplatin(順鉑,鉑類烷化類,B)」「最易產生『腎毒性(nephrotoxicity)』」(及耳毒性、嚴重噁心嘔吐)——須大量水化(hydration)與利尿來保護腎臟。故最易腎毒性者為cisplatin(B)。raloxifene(SERM,骨鬆)、rituximab(抗CD20)、trastuzumab(抗HER2,心臟毒性)無明顯腎毒性。故選B。","options":{"A":"raloxifene是SERM(骨鬆),無腎毒性。","B":"正確:cisplatin最易產生腎毒性。","C":"rituximab(抗CD20)無明顯腎毒性。","D":"trastuzumab有心臟毒性,非腎毒性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-40":{"quick":"Crohn病的TNF-α抑制劑是adalimumab，故選A。","detail":{"background":"克隆氏症(Crohn disease)的生物製劑中,「Adalimumab(復邁,A)」是「抗腫瘤壞死因子(TNF-α)的單株抗體」(與infliximab同類)。故TNF-α抑制劑為adalimumab(A)。vedolizumab(抗整合素α4β7)、ustekinumab(抗IL-12/23)、tofacitinib(JAK抑制劑)機轉不同。故選A。","options":{"A":"正確:adalimumab是抗TNF-α單株抗體。","B":"vedolizumab抗整合素α4β7。","C":"ustekinumab抗IL-12/23。","D":"tofacitinib是JAK抑制劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-37":{"quick":"心臟病史的cisplatin嘔吐病人用palonosetron最佳，故選B。","detail":{"background":"cisplatin致吐性強,有「心臟病史」者選止吐劑要避免QT延長/心臟風險。「Palonosetron(B)」是「第二代5-HT3拮抗劑」——強效、長效、止吐效果佳且心臟安全性較好,適合此病人。故最佳者為palonosetron(B)。scopolamine(抗膽鹼)、prochlorperazine(D2拮抗,QT延長/錐體外)、meclizine(抗組織胺,動暈症)非化療止吐首選。故選B。","options":{"A":"scopolamine用於動暈症,非化療止吐首選。","B":"正確:palonosetron(5-HT3拮抗)強效且心臟安全。","C":"prochlorperazine有QT延長/錐體外風險。","D":"meclizine用於動暈症。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-39":{"quick":"不屬於烷化劑的是methotrexate，故選B。","detail":{"background":"烷化劑(alkylating agents):cyclophosphamide(A)、lomustine(C,亞硝基脲)、temozolomide(D)皆是烷化(類)劑(使DNA烷化交聯)。而「Methotrexate(MTX,B)」是「『抗代謝藥(葉酸拮抗劑,抑制DHFR)』」,「『非』烷化劑」。故不屬烷化劑者為methotrexate(B)。故選B。","options":{"A":"cyclophosphamide是烷化劑。","B":"正確:methotrexate是抗代謝藥(葉酸拮抗),非烷化劑。","C":"lomustine是亞硝基脲烷化劑。","D":"temozolomide是烷化劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-40":{"quick":"topoisomerase I抑制劑是irinotecan，故選C。","detail":{"background":"「Irinotecan(C)」是「拓樸異構酶I(topoisomerase I)抑制劑」(camptothecin類)——使DNA單股斷裂無法修復,用於大腸直腸癌等。故topoisomerase I抑制劑為irinotecan(C,topotecan亦同)。vinblastine(微管)、paclitaxel(微管)、azacitidine(去甲基化/抗代謝)機轉不同。故選C。","options":{"A":"vinblastine作用於微管。","B":"paclitaxel作用於微管。","C":"正確:irinotecan是topoisomerase I抑制劑。","D":"azacitidine是去甲基化劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-39":{"quick":"doxorubicin錯誤敘述為D：它抑制topoisomerase「II」（非I），故選D。","detail":{"background":"Doxorubicin(小紅莓,anthracycline):A「治療急性淋巴球性白血病」(正確);B「治療肉瘤」(正確);C「劑量依賴性心臟毒性(累積劑量相關的心肌病變)」(正確);D「抑制topoisomerase I活性」錯——doxorubicin是「『嵌入DNA並抑制topoisomerase『II』』、產生自由基」,非topoisomerase I。故錯誤為D。","options":{"A":"治療急性淋巴球性白血病,正確。","B":"治療肉瘤,正確。","C":"劑量依賴性心臟毒性,正確。","D":"正確(為錯誤敘述):doxorubicin抑制topoisomerase II,非I。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-40":{"quick":"amifostine的作用是保護正常細胞，故選A。","detail":{"background":"「Amifostine(A)」是「細胞保護劑(cytoprotective agent)」——在化療(cisplatin)或放療時「『選擇性保護正常細胞組織、避免細胞損傷(如cisplatin的腎毒性、放療的口乾)』」(其活性代謝物清除自由基,選擇性保護正常組織而非腫瘤)。故作用為保護正常細胞(A)。它非增強穿透血腦障壁、非減asparagine、非增強免疫。故選A。","options":{"A":"正確:amifostine保護正常細胞組織,避免損傷。","B":"非增強穿透血腦障壁。","C":"減asparagine是L-asparaginase。","D":"非增強免疫系統。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-40":{"quick":"乳癌化療致嚴重心臟毒性最可能是Doxorubicin，故選B。","detail":{"background":"乳癌化療後「嚴重心臟毒性」最可能是「Doxorubicin(小紅莓,anthracycline,B)」——其「劑量依賴性、累積性的心肌病變(心臟毒性)」是特徵副作用(產生自由基損傷心肌)。故致心臟毒性者為doxorubicin(B)。Bleomycin(肺纖維化)、Cyclophosphamide(出血性膀胱炎)、Vinblastine(骨髓抑制)毒性不同。故選B。(trastuzumab也致心臟毒性,但題給選項中doxorubicin最典型。)故選B。","options":{"A":"Bleomycin致肺纖維化。","B":"正確:doxorubicin致劑量依賴性心臟毒性。","C":"Cyclophosphamide致出血性膀胱炎。","D":"Vinblastine致骨髓抑制。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-40":{"quick":"人源化單株抗體是alemtuzumab，故選A。","detail":{"background":"「Alemtuzumab(A)」是「人源化單株抗體(humanized monoclonal antibody,結尾-zumab表humanized)」——抗CD52,用於慢性淋巴球白血病、多發性硬化症。故人源化單株抗體為alemtuzumab(A)。methylprednisolone(類固醇)、cyclosporine(小分子免疫抑制劑)非單株抗體;rituximab(C,結尾-ximab是『嵌合chimeric』單株抗體,非humanized)。故依「humanized」選alemtuzumab(A)。(單株抗體命名:-momab鼠源、-ximab嵌合、-zumab人源化、-umab全人源。)故選A。","options":{"A":"正確:alemtuzumab(-zumab)是人源化單株抗體。","B":"methylprednisolone是類固醇。","C":"rituximab(-ximab)是嵌合單株抗體,非人源化。","D":"cyclosporine是小分子免疫抑制劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-51":{"quick":"Diazepam增加「氯離子」傳導使細胞膜穩定，故選B。","detail":{"background":"Diazepam(苯二氮平類)與GABA-A受體結合後,增強GABA作用,「使『氯離子(Cl⁻)』通道開啟頻率增加、Cl⁻流入細胞造成過極化、穩定細胞膜」,降低神經興奮性,產生抗焦慮、鎮靜、安眠、抗痙攣作用。故增加氯離子傳導(B)。故選B。","options":{"A":"非鈣離子。","B":"正確:diazepam增加氯離子傳導(過極化)。","C":"非鉀離子。","D":"非鈉離子。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-52":{"quick":"恐慌症首選用藥是Alprazolam，故選A。","detail":{"background":"恐慌症(panic disorder)的治療:急性/短期可用「苯二氮平類『Alprazolam(A)』」(快速緩解焦慮恐慌),長期則以SSRI為主。題問首選用藥,選Alprazolam(A)。Buspirone(廣泛性焦慮、起效慢)、Flumazenil(苯二氮平拮抗劑/解毒)、Thiopental(麻醉誘導)非恐慌症首選。故選A。","options":{"A":"正確:alprazolam(苯二氮平)是恐慌症首選之一。","B":"Buspirone用於廣泛性焦慮(起效慢)。","C":"Flumazenil是苯二氮平拮抗劑(解毒)。","D":"Thiopental是麻醉誘導劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-53":{"quick":"Buspirone作用於血清素5-HT受體，故選D。","detail":{"background":"「Buspirone」治療廣泛性焦慮症(GAD)的慢性治療,主要作用於「血清素『5-HT1A受體(部分致效)』」——不作用於GABA(故無鎮靜、肌鬆、成癮、戒斷,與苯二氮平不同),起效慢(數週),適合長期慢性焦慮。故作用於血清素(5-HT)受體(D)。故選D。","options":{"A":"非乙醯膽鹼受體。","B":"非α腎上腺素受體。","C":"非GABA(那是苯二氮平)。","D":"正確:buspirone作用於血清素5-HT1A受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}}},TO=["D1藥動學與藥效學總論", "D2自律神經藥物", "D3中樞神經藥物", "D4心血管與血液藥物", "D5呼吸過敏與自泌素藥物", "D6腸胃道藥物", "D7內分泌與代謝藥物", "D8抗微生物藥物", "D9抗癌與免疫藥物"],LEC={"D1藥動學與藥效學總論":{"title":"D1 藥物動力學與藥效學總論 複習講義","html":"<h3>一、藥物動力學（PK）：ADME</h3>\n<p>藥動學研究「身體對藥物的處置」：吸收(A)、分布(D)、代謝(M)、排泄(E)。<b>生體可用率(bioavailability)</b>＝進入全身循環的比例,靜脈注射＝100%(最佳),口服受首渡效應(first-pass)與吸收影響。<b>生體相等性(bioequivalence)</b>＝兩藥AUC相當。維持輸注速率＝清除率×目標血漿濃度。達穩定濃度約需4-5個半衰期。</p>\n<h3>二、藥物代謝</h3>\n<p><b>第一相(phase I)</b>：氧化、還原、水解(P450酵素系統)。<b>第二相(phase II)</b>：結合作用(與葡萄糖醛酸等結合→增水溶性、促排泄)。<b>酵素誘導劑</b>(phenobarbital、rifampin,加速代謝降藥效) vs <b>抑制劑</b>(cimetidine、ketoconazole、erythromycin,增藥濃度)。</p>\n<h3>三、藥效學（PD）</h3>\n<p><b>效能(efficacy/Emax)</b>＝最大反應;<b>效價(potency)</b>＝ED50(越小效價越高)。<b>治療指數(TI)</b>＝TD50/ED50,越大越安全(TI窄如warfarin、digoxin、lithium需監測)。</p>\n<h3>四、受體類型</h3>\n<p>水溶性激素→膜受體(GPCR如腎上腺素;酵素連結受體如胰島素;離子通道型如GABA-A);脂溶性(類固醇、甲狀腺素)→<b>細胞內核受體</b>(調控基因,作用最慢)。Gs→腺苷酸環化酶↑cAMP;Gq→PLC-IP3-Ca。</p>"},"D2自律神經藥物":{"title":"D2 自律神經藥物 複習講義","html":"<h3>一、膽鹼性藥物</h3>\n<p><b>直接致效劑</b>：bethanechol(膀胱腸道)、pilocarpine/carbachol(青光眼縮瞳)。<b>乙醯膽鹼酯酶抑制劑</b>：neostigmine/pyridostigmine(重症肌無力,周邊)、physostigmine(可過血腦障壁)、donepezil/rivastigmine(失智,中樞)。<b>抗膽鹼(抗蕈毒鹼)</b>：atropine(散瞳、解有機磷中毒)、scopolamine(動暈症)、ipratropium(支氣管);青光眼禁用。</p>\n<h3>二、有機磷中毒</h3>\n<p>有機磷(parathion、sarin)不可逆抑制乙醯膽鹼酯酶→乙醯膽鹼堆積(縮瞳、流涎、分泌、心搏慢、肌束顫動)。解毒：<b>atropine(阻蕈毒鹼)＋pralidoxime(2-PAM,再活化酵素)</b>。</p>\n<h3>三、腎上腺素性藥物</h3>\n<p>epinephrine(過敏性休克首選)、phenylephrine(α1散瞳/鼻充血解除)、clonidine(中樞α2降壓)、β2致效劑(albuterol/terbutaline治氣喘)、dobutamine(β1強心)。</p>\n<h3>四、神經肌肉阻斷劑</h3>\n<p><b>去極化型</b>：succinylcholine(先肌束顫動,致惡性高熱與高血鉀)。<b>非去極化型(競爭性)</b>：tubocurarine、pancuronium(-curium/-curonium),可被neostigmine逆轉。<b>dantrolene</b>(作用肌漿網、減鈣釋放,治惡性高熱)。</p>"},"D3中樞神經藥物":{"title":"D3 中樞神經藥物 複習講義","html":"<h3>一、鎮靜安眠抗焦慮</h3>\n<p><b>苯二氮平(BZD)</b>：增強GABA-A、Cl⁻內流過極化(抗焦慮/鎮靜/抗癲癇/肌鬆);短效(triazolam)戒斷重、長效(diazepam/flurazepam)易宿醉;拮抗劑flumazenil。<b>巴比妥</b>：作用GABA受體(延長Cl通道開啟,安全範圍窄)。<b>Z-drug</b>(zolpidem)、<b>ramelteon</b>(褪黑激素受體,不列管)、<b>buspirone</b>(5-HT1A,治GAD不成癮)。</p>\n<h3>二、抗精神病/抗憂鬱/情緒穩定</h3>\n<p>典型抗精神病(haloperidol)阻斷D2→錐體外症狀(EPS);非典型(clozapine,D2親和力低、EPS少但顆粒球缺乏)。<b>SSRI(fluoxetine)</b>抑血清素回收;<b>TCA</b>抑NE與血清素回收(抗膽鹼副作用);<b>MAO抑制劑</b>＋酪胺食物→高血壓危象。情緒穩定劑：lithium(致甲狀腺低下)、carbamazepine、valproate。</p>\n<h3>三、抗癲癇與帕金森</h3>\n<p>抗癲癇：phenytoin/carbamazepine(鈉通道,牙齦增生)、ethosuximide(T型鈣,失神)、gabapentin(類GABA、神經痛)、levetiracetam(SV2A)。<b>帕金森</b>：levodopa(多巴胺前驅物)＋carbidopa(抑周邊脫羧酶);D2致效劑;MAO-B/COMT抑制劑;抗膽鹼。重建dopamine與acetylcholine平衡。</p>\n<h3>四、麻醉、鴉片與成癮</h3>\n<p>吸入麻醉MAC越小效價越強(halothane易心律不整);thiopental靠再分布甦醒;ketamine(NMDA拮抗,幻覺);propofol(GABA,止吐)。<b>嗎啡</b>(μ受體,縮瞳/便祕/呼吸抑制);止咳(dextromethorphan中樞、benzonatate周邊)。成癮：methadone(鴉片替代)、disulfiram(抑乙醛脫氫酶戒酒)、naltrexone/acamprosate、bupropion/varenicline戒菸。</p>"},"D4心血管與血液藥物":{"title":"D4 心血管與血液藥物 複習講義","html":"<h3>一、抗高血壓</h3>\n<p><b>ACE抑制劑(-pril)</b>：減血管收縮素II、緩激肽累積(乾咳、血管性水腫、高血鉀),保護糖尿病腎,孕婦禁用。<b>ARB(-sartan)</b>：阻AT1受體(無乾咳)。<b>鈣通道阻斷</b>(amlodipine)。<b>利尿劑</b>。<b>α1阻斷(prazosin)</b>首劑姿勢性低血壓、治BPH。<b>β阻斷</b>(氣喘禁用)。<b>clonidine</b>(中樞α2)。<b>aliskiren</b>(腎素抑制)。</p>\n<h3>二、利尿劑</h3>\n<p><b>環利尿劑(furosemide)</b>最強、治高血鈣、耳毒性。<b>Thiazide</b>：hyperGLUC(高血糖/脂/尿酸/鈣、低血鉀)、減尿鈣(防結石骨鬆)。<b>保鉀</b>(spironolactone醛固酮拮抗,高血鉀、男性女乳;eplerenone選擇性無此)。</p>\n<h3>三、抗心律不整與心衰/心絞痛</h3>\n<p>Class I(鈉,quinidine金雞納/procainamide狼瘡);II(β阻斷);III(amiodarone甲狀腺肺角膜、sotalol兼β);IV(鈣)。<b>adenosine</b>PSVT首選。<b>digoxin</b>抑Na-K pump強心(治療窗窄)。<b>硝酸鹽</b>(降前負荷治心絞痛,舌下避首渡)。ACE抑制劑改善心衰預後。</p>\n<h3>四、降血脂與抗栓</h3>\n<p><b>statin</b>主降LDL;<b>fibrate</b>降三酸甘油脂;<b>niacin</b>升HDL最強;膽酸樹脂(colestipol)阻脂溶性維生素吸收。<b>抗血小板</b>：aspirin(抑COX-1/TXA2)、clopidogrel(P2Y12,前驅藥)、abciximab(GPIIb/IIIa)、dipyridamole(PDE)。<b>抗凝</b>：warfarin(維生素K,給維生素K逆轉)、heparin、rivaroxaban(Xa)、argatroban(直接凝血酶)。<b>溶栓</b>：alteplase(活化纖維蛋白結合的胞漿素原)。</p>"},"D5呼吸過敏與自泌素藥物":{"title":"D5 呼吸、過敏與自泌素藥物 複習講義","html":"<h3>一、氣喘與COPD</h3>\n<p><b>急救(緩解)</b>：短效β2(albuterol吸入)、epinephrine(急性發作/過敏性休克)。<b>維持(控制)</b>：長效β2(salmeterol,無抗發炎不可急救)、吸入類固醇(抗發炎,致口咽念珠菌、聲沙)、白三烯拮抗(montelukast)、肥大細胞穩定(cromolyn,預防)、抗膽鹼(ipratropium,COPD減黏液)、theophylline、omalizumab(抗IgE)。</p>\n<h3>二、抗組織胺</h3>\n<p><b>第一代</b>(diphenhydramine、chlorpheniramine)：過血腦障壁→鎮靜、抗膽鹼(口乾、尿滯留),用於過敏、動暈症、失眠。<b>第二代</b>(loratadine、fexofenadine、cetirizine)：不過血腦障壁、不鎮靜。胃潰瘍用H2拮抗劑(非H1)。</p>\n<h3>三、自泌素與NSAID</h3>\n<p><b>前列腺素</b>：misoprostol(PGE1,胃保護/引產)、alprostadil(PGE1,陽痿/維持動脈導管)、latanoprost(青光眼)。<b>NSAID/aspirin</b>：抑COX減前列腺素(止痛/抗發炎/退燒);aspirin抗血小板(低劑量抑TXA2);celecoxib(COX-2選擇性,出血最低);水楊酸中毒(耳鳴、代謝性酸中毒);ibuprofen削弱aspirin抗栓。</p>\n<h3>四、偏頭痛與止咳</h3>\n<p>偏頭痛：sumatriptan(5-HT1致效)、ergotamine(致子宮痙攣孕婦禁)、CGRP拮抗(atogepant)、propranolol(預防)。止咳：dextromethorphan(中樞,非成癮)、codeine(中樞)、benzonatate(周邊)。</p>"},"D6腸胃道藥物":{"title":"D6 腸胃道藥物 複習講義","html":"<h3>一、消化性潰瘍與制酸</h3>\n<p><b>抑酸由強到弱</b>：質子幫浦抑制劑(PPI,-prazole,抑酸最強,飯前服,長期減鈣吸收)＞H2拮抗劑(cimetidine抑P450)＞制酸劑。<b>misoprostol</b>(PGE1,預防NSAID潰瘍)。<b>sucralfate</b>(酸性環境活化、黏膜保護)。<b>幽門桿菌三合一</b>：PPI＋clarithromycin＋amoxicillin。制酸劑：鎂鹽腹瀉、鋁/鈣便祕、碳酸氫鈉升血壓。</p>\n<h3>二、止吐</h3>\n<p><b>5-HT3拮抗(ondansetron/palonosetron)</b>：化療止吐最有效。<b>D2拮抗(metoclopramide/domperidone/prochlorperazine)</b>：作用CTZ。<b>NK1拮抗(aprepitant)、dexamethasone</b>合併增效。抗組織胺/scopolamine治動暈症。</p>\n<h3>三、瀉劑與止瀉</h3>\n<p><b>瀉劑</b>：膨脹性(methylcellulose)、滲透性(lactulose)、刺激性(senna、bisacodyl、castor oil水解成ricinoleic acid)、軟便(docusate)、氯通道活化(lubiprostone)。<b>止瀉</b>：loperamide(類鴉片,抑腸蠕動,不過血腦障壁)、bismuth subsalicylate(旅行腹瀉,抗分泌抗菌)。</p>\n<h3>四、腸胃動力與IBD</h3>\n<p>促動力：metoclopramide/domperidone(D2拮抗)、erythromycin(motilin)。IBD輕度第一線：mesalamine(5-ASA);中重度：類固醇、抗TNF(infliximab/adalimumab)、vedolizumab。</p>"},"D7內分泌與代謝藥物":{"title":"D7 內分泌與代謝藥物 複習講義","html":"<h3>一、糖皮質類固醇</h3>\n<p>作用：抗發炎免疫抑制、升血糖(糖質新生)、促蛋白質與脂肪分解、增白血球、抗壓力。副作用：庫欣外觀、骨質疏鬆、高血壓(鈉水滯留)、高血糖、感染、消化性潰瘍、白內障、傷口癒合差、食慾增加。<b>不能治庫欣症候群(本身皮質醇過多)</b>。betamethasone促胎兒肺成熟。抑皮質醇合成：metyrapone、ketoconazole;受體拮抗：mifepristone。</p>\n<h3>二、糖尿病用藥</h3>\n<p>第一線<b>metformin(雙胍,減肝糖質新生,腸胃不適,不致低血糖)</b>。促胰島素分泌：磺醯尿素(glyburide,易低血糖、增重)、meglitinide。增敏：TZD(pioglitazone,治阻抗)。減糖吸收：acarbose/miglitol(α-葡萄糖苷酶)。腸泌素：GLP-1類似物(exenatide)、DPP-4抑制(sitagliptin)。<b>SGLT2抑制(-gliflozin,尿排糖)</b>。低血糖路倒給glucagon。</p>\n<h3>三、甲狀腺與性激素</h3>\n<p>甲亢：thionamide(PTU孕婦可用、抑周邊T4轉T3;methimazole)、碘(抑釋放)、propranolol(甲狀腺風暴首選控心悸)、放射碘(孕婦禁)。甲低補levothyroxine(含鋁制酸降吸收)。SERM：tamoxifen(乳癌)、clomiphene(促排卵)、raloxifene(骨鬆)。finasteride(5-α還原酶,治禿/BPH)。>35歲抽菸女避孕用純黃體素。</p>\n<h3>四、腦垂體激素、痛風與骨鬆</h3>\n<p>GH治侏儒/短腸(肢端肥大症禁,用octreotide/pegvisomant抑GH)。多巴胺致效劑(bromocriptine)降泌乳素。尿崩症用desmopressin/vasopressin(後葉ADH)。痛風：急性用colchicine(抑微管,孕婦禁)/NSAID;慢性用allopurinol(抑黃嘌呤氧化酶)/probenecid(促排尿酸)。骨鬆：bisphosphonate(zoledronic acid治Paget)、calcitonin、teriparatide。</p>"},"D8抗微生物藥物":{"title":"D8 抗微生物藥物 複習講義","html":"<h3>一、抗生素機轉分類</h3>\n<p><b>抑細胞壁</b>：β-內醯胺(penicillin/cephalosporin/carbapenem)、vancomycin。<b>抑蛋白質(核糖體)</b>：胺醣類(30S)、四環素(30S)、巨環(50S)、clindamycin(50S)。<b>抑DNA</b>：氟喹諾酮(DNA gyrase)。<b>抑RNA</b>：rifampin(RNA聚合酶)。<b>抑葉酸</b>：磺胺、trimethoprim。</p>\n<h3>二、各類重點與毒性</h3>\n<p><b>青黴素</b>：cloxacillin抗penicillinase、piperacillin抗綠膿桿菌;amoxicillin＋clavulanic acid。<b>頭孢</b>：世代越高對G-越強。<b>胺醣類</b>(gentamicin)口服不吸收、腎/耳毒性(與環利尿劑加成)、須監測。<b>vancomycin</b>治MRSA/G+、口服不吸收(治C.difficile)。<b>四環素</b>勿與牛奶(鈣螯合)。<b>巨環</b>肝代謝、QT延長。<b>clindamycin</b>易致C.difficile結腸炎。<b>氟喹諾酮</b>抗綠膿(ciprofloxacin)。</p>\n<h3>三、抗結核與抗病毒</h3>\n<p>抗結核四藥(INH抑分枝菌酸+肝毒性周邊神經病變、RIF誘導P450體液變紅、PZA、EMB視神經炎)。抗病毒：NRTI/NNRTI/蛋白酶抑制(HIV);ganciclovir/foscarnet(CMV);oseltamivir(神經胺酸酶,流感);干擾素α(B/C肝)。</p>\n<h3>四、抗黴菌與抗瘧</h3>\n<p>抗黴菌：amphotericin B(結合麥角固醇/腎毒)、azole(抑麥角固醇合成)、caspofungin(抑細胞壁β-葡聚糖)。抗瘧：chloroquine(紅血球內期)、primaquine(肝期/G6PD缺乏溶血)、mefloquine(抗藥區)、pyrimethamine＋磺胺(弓形蟲)。</p>"},"D9抗癌與免疫藥物":{"title":"D9 抗癌與免疫藥物 複習講義","html":"<h3>一、化療藥分類（依機轉/週期）</h3>\n<p><b>烷化劑</b>(cyclophosphamide、cisplatin、carmustine過血腦障壁治腦瘤,週期非專一)。<b>抗代謝(S期)</b>：methotrexate(抑DHFR,leucovorin救援)、5-FU、6-MP。<b>微管</b>：vincristine(抑聚合,M期,神經毒性)、paclitaxel(穩定微管)。<b>topo抑制</b>：irinotecan/topotecan(I)、etoposide(II)。<b>抗腫瘤抗生素</b>：doxorubicin(抑topo II、自由基、劑量依賴心臟毒性)、bleomycin(肺纖維化)。</p>\n<h3>二、特徵性毒性</h3>\n<p>cisplatin(腎毒性、耳毒性,須水化)、oxaliplatin(周邊神經毒性)、doxorubicin(心臟毒性)、bleomycin(肺纖維化)、vincristine(神經毒性)、cyclophosphamide(出血性膀胱炎)。amifostine保護正常細胞;leucovorin救援MTX。</p>\n<h3>三、標靶與荷爾蒙</h3>\n<p><b>酪胺酸激酶抑制</b>：imatinib(BCR-ABL治CML、c-KIT治GIST)、gefitinib(EGFR治肺癌)。荷爾蒙：tamoxifen(SERM乳癌)、雌激素(拮抗雄性素治攝護腺癌)。單株抗體命名：-ximab嵌合、-zumab人源化、-umab全人源。</p>\n<h3>四、免疫抑制與生物製劑</h3>\n<p><b>cyclosporine</b>(結合cyclophilin→抑calcineurin→降IL-2;腎毒性高血壓)、<b>tacrolimus</b>(FKBP)、<b>sirolimus</b>(抑mTOR)、<b>mycophenolate</b>(抑purine合成)、<b>azathioprine</b>。生物製劑：infliximab/adalimumab/etanercept(抗TNF,致結核再活化)、anakinra(IL-1)、rituximab(CD20)、omalizumab(IgE,氣喘)。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^D(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='nrn_pharm_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
