rase I 活性"},"img":""},{"id":"114030-N1-40","code":"114030","roc":"114","cat":"N1","catname":"基礎醫學","num":40,"stem":"使用化學治療藥於癌症病患,有時會給與amifostine,試問amifostine有何藥理作用?","opts":{"A":"保護正常細胞組織,避免細胞損傷","B":"增強抗癌藥穿透血腦障壁,進入中樞神經系統","C":"減少腫瘤組織周邊血液的asparagine含量","D":"增強病人的免疫系統功能"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"disc":"pharm","topic":"D9抗癌與免疫藥物","q_num":40,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"保護正常細胞組織,避免細胞損傷","B":"增強抗癌藥穿透血腦障壁,進入中樞神經系統","C":"減少腫瘤組織周邊血液的asparagine含量","D":"增強病人的免疫系統功能"},"img":""},{"id":"114100-N1-40","code":"114100","roc":"114","cat":"N1","catname":"基礎醫學","num":40,"stem":"一位乳癌患者經化療藥物治療後,產生嚴重心臟毒性,最可能是使用下列何種抗癌藥物?","opts":{"A":"Bleomycin","B":"Doxorubicin","C":"Cyclophosphamide","D":"Vinblastine"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"disc":"pharm","topic":"D9抗癌與免疫藥物","q_num":40,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"Bleomycin","B":"Doxorubicin","C":"Cyclophosphamide","D":"Vinblastine"},"img":""},{"id":"114170-N1-40","code":"114170","roc":"114","cat":"N1","catname":"基礎醫學","num":40,"stem":"下列何者為人源性單株抗體(humanized monoclonal antibody),用於免疫抑制誘導治療(induction immunosuppressant therapy)?","opts":{"A":"alemtuzumab","B":"methylprednisolone","C":"rituximab","D":"cyclosporine"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"disc":"pharm","topic":"D9抗癌與免疫藥物","q_num":40,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"alemtuzumab","B":"methylprednisolone","C":"rituximab","D":"cyclosporine"},"img":""}],E={"101110-N1-49":{"quick":"藥物與葡萄糖醛酸（glucuronic acid）結合（第二相代謝）會增加水溶性、促進排泄，故選C。","detail":{"background":"藥物代謝的第二相反應「結合作用（conjugation）」——把藥物與內生性極性分子（葡萄糖醛酸glucuronic acid、硫酸、甘胺酸、麩胱甘肽等）結合，使藥物「水溶性增加、脂溶性降低、藥理活性多降低」，便於經腎臟（尿）或膽汁「排泄」。葡萄糖醛酸化（glucuronidation）是最重要的第二相反應。故與glucuronic acid結合會增加藥物排泄（C）。","options":{"A":"是降低脂溶性，非增加。","B":"是增加水溶性，非降低。","C":"正確：增加水溶性、促進排泄。","D":"非增加分布（是促排泄）。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-49":{"quick":"脂溶性高的藥物「分布廣、易吸收」（1、2），故選A。","detail":{"background":"脂溶性（lipid-soluble）高的藥物特性：①「易吸收」（易穿過細胞膜的脂質雙層,口服吸收佳）；②「分布廣」（易進入組織、可過血腦障壁、儲存於脂肪);但③「不易排泄」（腎臟排泄需水溶性,脂溶性藥物易被腎小管再吸收,須先經肝代謝成水溶性才能排出);④「半衰期長」（代謝排泄慢）。故脂溶性高=分布廣（1）+易吸收（2),選A。3易排泄、4半衰期短皆相反。","options":{"A":"正確：脂溶性高→分布廣、易吸收（1、2）。","B":"含3易排泄錯（脂溶性不易排泄）。","C":"含3、4皆錯。","D":"含4半衰期短錯（脂溶性半衰期長）。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-49":{"quick":"Emax相同但A藥ED50（10）>B藥ED50（5），表示B藥效價（potency）較高、A藥效價較低，故選D。","detail":{"background":"藥效學兩參數：①「效能（efficacy/Emax）」——藥物能產生的最大反應（A、B藥Emax相同→效能相同）；②「效價（potency）」——產生特定效應所需的劑量（以ED50表示,ED50越小效價越高）。本題A藥ED50=10、B藥ED50=5,「ED50越小效價越高」,故B藥效價>A藥（即「potency: A藥<B藥」,選D）。效能相同表示A、B非選項A/B所述。故選D。","options":{"A":"效能（efficacy）由Emax決定,兩者相同,非A>B。","B":"效能相同,非A<B。","C":"ED50小者效價高,B藥ED50小,故B效價高,非A>B。","D":"正確：potency A藥<B藥（A藥ED50較大、效價較低）。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-49":{"quick":"腎小管分泌主要發生於「近端小管」，故選B。","detail":{"background":"腎臟清除藥物三過程:腎絲球過濾、腎小管分泌、腎小管再吸收。「腎小管分泌(tubular secretion)」主要發生於「近端小管(proximal tubule)」,是「主動運輸(需載體、可飽和、可競爭)」,把藥物從血液主動分泌入管腔(B正確)。A錯(過濾與分泌是獨立過程,不需先分泌才過濾);C錯(是主動運輸非被動);D錯(Probenecid「抑制」近端小管的有機酸分泌載體,反而「減少」其他酸性藥物如penicillin的分泌、延長其作用)。故選B。","options":{"A":"過濾與分泌獨立,不需先分泌才過濾。","B":"正確:腎小管分泌主要在近端小管。","C":"是主動運輸,非被動。","D":"Probenecid抑制分泌(減少而非促進)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-49":{"quick":"維持劑量速率＝清除率×目標血漿濃度＝48×15＝720 μg/min，故選D。","detail":{"background":"穩定狀態下「維持輸注速率(maintenance dose rate)＝清除率(clearance)×目標血漿濃度(target plasma concentration)」。本題清除率48 mL/min、目標濃度15 μg/mL → 速率＝48 mL/min × 15 μg/mL ＝720 μg/min(D)。此公式是靜脈持續輸注達穩定濃度的基礎。","options":{"A":"235非48×15。","B":"340非48×15。","C":"550非48×15。","D":"正確:48×15＝720 μg/min。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-51":{"quick":"Lidocaine抑制「鈉離子通道」，故選A。","detail":{"background":"Lidocaine(利多卡因)是「局部麻醉劑」也是「Class IB抗心律不整藥」,作用機轉是阻斷「電壓閘控『鈉離子(Na⁺)通道』」——抑制神經與心肌的去極化(動作電位上升支),阻斷神經傳導(局部麻醉)、抑制心室異位節律(抗心律不整)。故抑制鈉通道(A)。","options":{"A":"正確:Lidocaine阻斷鈉離子通道。","B":"非阻斷鉀通道(那是Class III如amiodarone)。","C":"非阻斷鈣通道(那是Class IV如verapamil)。","D":"非氯通道。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-49":{"quick":"生體可用率「不受」藥物作用方式影響，故選A。","detail":{"background":"生體可用率(bioavailability)＝藥物進入「全身循環」的比例。影響因子:①藥物溶解度與崩散(C)、②安定性(D,胃酸破壞)、③「肝臟首渡效應(first-pass metabolism)」(B,口服經肝代謝損失)、④給藥途徑(靜脈注射=100%)。而「藥物的作用方式(機轉)」是「藥效學」範疇,「不影響」藥物進入循環的比例(生體可用率)。故不受影響者為A。","options":{"A":"正確:藥物作用方式(機轉)不影響生體可用率。","B":"首渡效應影響生體可用率。","C":"溶解度影響吸收與生體可用率。","D":"安定性影響生體可用率。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-62":{"quick":"不會增加體重的降血糖藥是Metformin，故選D。","detail":{"background":"口服降血糖藥對體重的影響:磺醯尿素類(Glyburide,A)、meglitinide(Repaglinide,B)促胰島素分泌→可能「增加體重」;thiazolidinedione(Pioglitazone,C)→「增加體重」(水腫、脂肪)。而「Metformin(雙胍類,D)」是第二型糖尿病第一線用藥,作用減少肝糖質新生、增加胰島素敏感度,「不增加(甚至略減)體重」,且不易低血糖。故不增加體重者為Metformin(D)。","options":{"A":"Glyburide(磺醯尿素)可能增加體重。","B":"Repaglinide可能增加體重。","C":"Pioglitazone增加體重。","D":"正確:Metformin不增加體重。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-49":{"quick":"治療指數（therapeutic index）高表示「藥物安全性高」，故選C。","detail":{"background":"治療指數(therapeutic index, TI)＝TD50/ED50(或LD50/ED50)——反映藥物「有效劑量」與「中毒/致死劑量」的距離。TI「越大(高)」表示有效劑量與中毒劑量差距越大、「安全範圍越寬、安全性越高」(C)。TI低(窄)的藥(如warfarin、digoxin、lithium)需監測血中濃度。故高TI=安全性高(C),與療效高低、吸收快慢無關。","options":{"A":"TI反映安全性,非療效高低。","B":"非療效低。","C":"正確:治療指數高=安全性高。","D":"與吸收速度無關。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-49":{"quick":"正確敘述為C：細胞色素P450參與第一相代謝反應，故選C。","detail":{"background":"藥物代謝兩相:①第一相(phase I)——氧化、還原、水解,引入或暴露極性官能基,主要由「細胞色素P450(cytochrome P450)」酵素系統執行(C正確);②第二相(phase II)——結合作用(conjugation,如葡萄糖醛酸化、硫酸化),增加水溶性。逐項:A錯(藥物不一定都經兩相;有些直接排出);B錯(不一定先I再II;有些直接走II相);D錯(水解屬第一相,結合屬第二相,故「結合作用屬第一相」錯)。故正確為C。","options":{"A":"藥物不一定都經第一、二相。","B":"不一定先I再II。","C":"正確:P450參與第一相代謝。","D":"結合作用屬第二相,非第一相。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-53":{"quick":"生體可用率最佳的給藥途徑是「靜脈注射」，故選D。","detail":{"background":"生體可用率(進入全身循環的比例):「靜脈注射(IV)」直接進入血液循環,生體可用率＝100%(最佳,D)。口服(A)有首渡效應與吸收問題、生體可用率較低且變異大;皮下注射(B)、舌下(C,避開首渡但量有限)介於中間。故生體可用率最佳為靜脈注射(D)。","options":{"A":"口服有首渡效應,生體可用率較低。","B":"皮下注射生體可用率不及IV。","C":"舌下避開首渡但不及IV。","D":"正確:靜脈注射生體可用率100%(最佳)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-49":{"quick":"AUC相同表示兩藥具「生體相等性（bioequivalence）」，故選D。","detail":{"background":"「生體相等性(bioequivalence)」指兩種藥品(如學名藥vs原廠藥)在相同條件下,「血中濃度-時間曲線下面積(AUC)」與尖峰濃度(Cmax)等藥動參數相當(無顯著差異),表示兩者進入循環的「量與速率」相當、療效可互換。題述「AUC相同」即表示生體相等性(D)。生體可用率(A)是單一藥物進入循環的比例(雖AUC反映之,但「兩藥比較相等」用bioequivalence更精確)。故選D。","options":{"A":"生體可用率是單藥進入循環比例,兩藥「相等」用bioequivalence。","B":"首渡效應非此題比較概念。","C":"代謝速率非AUC比較直接表示。","D":"正確:AUC相同表示生體相等性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-54":{"quick":"半衰期10小時，達穩定濃度約需4-5個半衰期＝約40小時，故選D。","detail":{"background":"靜脈持續輸注藥物達「穩定狀態濃度(steady state)」所需時間,約為「4-5個半衰期(half-life)」(每經一個半衰期達穩態的50%→75%→87.5%→93.75%→96.875%,約4-5個半衰期達95%以上)。本題半衰期10小時 → 約4個半衰期＝40小時(D)。同理停藥後也約4-5個半衰期才清除。故選D。","options":{"A":"5小時不足一個半衰期。","B":"10小時僅一個半衰期(50%)。","C":"20小時(2個半衰期,75%)未達穩態。","D":"正確:約4個半衰期＝40小時達穩定濃度。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-54":{"quick":"第一相反應「不包括」結合作用（conjugation），故選C。","detail":{"background":"藥物肝臟代謝第一相(phase I)反應:「氧化(oxidation,A)、還原、水解(hydrolysis,B)、羥化(hydroxylation,D)」,引入或暴露極性官能基(P450酵素)。而「結合作用(conjugation,C)」屬「第二相(phase II)」反應(與葡萄糖醛酸等結合增加水溶性)。故不包括於第一相者為結合作用(C)。","options":{"A":"氧化屬第一相。","B":"水解屬第一相。","C":"正確:結合作用屬第二相,非第一相。","D":"羥化屬第一相。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-34":{"quick":"三藥作用相同受體，正確敘述為D：乙藥藥理作用強度比甲藥小，故選D。","detail":{"background":"濃度-反應曲線判讀(同一受體):①「效能(Emax,最大反應)」由曲線高度決定;②「效價(potency)」由曲線位置(左/右)決定,越左(ED50越小)效價越高。題給標準答案D「乙藥藥理作用強度(Emax/效能)比甲藥小」——表示乙藥曲線高度(最大反應)低於甲藥。其餘:A「丙最安全」、B「甲結合受體最少」、C「丙親和力最高」依圖判定為錯。故依官方答案選D。","options":{"A":"最安全需看治療指數,非單由此曲線斷定。","B":"結合受體數需看曲線,非甲最少。","C":"親和力由ED50位置定,非丙最高。","D":"正確(依官方答案):乙藥藥理作用強度比甲藥小。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-31":{"quick":"Gs蛋白主要作用在「腺苷酸環化酶（adenylyl cyclase）」，故選C。","detail":{"background":"G蛋白偶聯受體(GPCR)的G蛋白類型與標的酵素:①「Gs(刺激型)」→活化「腺苷酸環化酶(adenylyl cyclase)」→cAMP↑(如β腎上腺素受體);②Gi(抑制型)→抑制腺苷酸環化酶→cAMP↓;③Gq→活化磷脂酶C(phospholipase C)→IP3/DAG/Ca²⁺(如α1、M1/M3受體)。題問Gs作用的酵素=腺苷酸環化酶(C)。tyrosine kinase(胰島素受體,非GPCR)、guanylyl cyclase(NO/心房利鈉肽)非Gs標的。故選C。","options":{"A":"tyrosine kinase是胰島素等受體,非GPCR的Gs標的。","B":"phospholipase C是Gq標的。","C":"正確:Gs作用於腺苷酸環化酶(adenylyl cyclase)。","D":"guanylyl cyclase是NO/ANP標的。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-32":{"quick":"清除半衰期最長的β阻斷劑是nadolol，故選B。","detail":{"background":"β腎上腺素受體阻斷劑的半衰期差異大:「nadolol(B)」半衰期「最長(約20-24小時)」,故可一天一次給藥;timolol(約4小時)、pindolol(約3-4小時)中等;「esmolol(D)」半衰期「最短(約9分鐘)」,因被血漿酯酶快速水解,用於急性靜脈控制心率。故半衰期最長者為nadolol(B)。","options":{"A":"timolol半衰期約4小時。","B":"正確:nadolol半衰期最長(約20-24小時)。","C":"pindolol半衰期短。","D":"esmolol半衰期最短(約9分鐘)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-33":{"quick":"藥物動力學「不包括」藥物的作用機制，故選A。","detail":{"background":"「藥物動力學(pharmacokinetics, PK)」研究「身體對藥物的處置」——即藥物的「吸收(Absorption)、分布(Distribution,C)、代謝(Metabolism,D)、排泄(Excretion,B)」(ADME),探討藥物濃度隨時間的變化。而「藥物的作用機制(機轉、受體作用)」屬「藥效學(pharmacodynamics, PD)」(藥物對身體的作用),不屬藥動學。故不包括者為A。","options":{"A":"正確:藥物作用機制屬藥效學,非藥動學。","B":"排泄屬藥動學。","C":"分布屬藥動學。","D":"代謝屬藥動學。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-50":{"quick":"治療重症肌無力的首選藥是Neostigmine，故選A。","detail":{"background":"重症肌無力(自體免疫破壞神經肌肉接合處乙醯膽鹼受體)的治療首選是「乙醯膽鹼酯酶抑制劑」——「Neostigmine(新斯狄明,A)」或pyridostigmine,抑制乙醯膽鹼分解、增加接合處乙醯膽鹼濃度,改善肌肉收縮。Neostigmine、pyridostigmine是季銨化合物(不過血腦障壁,作用於周邊),適合重症肌無力。Bethanechol(膀胱腸道)、Donepezil(中樞,失智)、Physostigmine(可過血腦障壁,抗膽鹼中毒)用途不同。故首選Neostigmine(A)。","options":{"A":"正確:Neostigmine是重症肌無力首選。","B":"Bethanechol作用於膀胱腸道,非重症肌無力。","C":"Donepezil用於阿茲海默(中樞)。","D":"Physostigmine過血腦障壁,非重症肌無力首選。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-51":{"quick":"對尼古丁與蕈毒鹼受體皆有作用、用於眼睛的是Carbachol，故選B。","detail":{"background":"「Carbachol(B)」是直接型膽鹼性致效劑,「對蕈毒鹼(muscarinic)與尼古丁(nicotinic)受體皆有作用」,且「抗乙醯膽鹼酯酶分解(作用較持久)」,臨床「局部用於眼睛」治療青光眼(縮瞳、降眼壓)。Atropine是抗蕈毒鹼(散瞳);Acetylcholine作用廣但快速被分解(臨床少用);Bethanechol選擇性蕈毒鹼(膀胱腸道)。故對兩受體皆作用、用於眼者為Carbachol(B)。","options":{"A":"Atropine是抗蕈毒鹼(散瞳),非致效。","B":"正確:Carbachol對蕈毒鹼與尼古丁受體皆作用,用於眼。","C":"乙醯膽鹼快速被分解,臨床少局部用。","D":"Bethanechol選擇性蕈毒鹼,作用膀胱腸道。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-51":{"quick":"不適用於青光眼的是Atropine，故選D。","detail":{"background":"青光眼治療(降眼壓)藥物:pilocarpine(A,膽鹼致效劑,縮瞳開放隅角促房水排出)、timolol(B,β阻斷劑,減少房水生成)、acetazolamide(C,碳酸酐酶抑制劑,減少房水生成)。而「Atropine(D,抗蕈毒鹼)」會「散瞳、使虹膜根部堆積阻塞隅角→眼壓『升高』」,「禁用於青光眼(尤其閉鎖隅角型)」。故不適用者為Atropine(D)。","options":{"A":"pilocarpine縮瞳降眼壓,治青光眼。","B":"timolol減房水生成,治青光眼。","C":"acetazolamide減房水生成,治青光眼。","D":"正確:Atropine散瞳升眼壓,禁用於青光眼。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-50":{"quick":"作用於骨骼肌、減少肌漿網釋鈣的肌鬆劑是dantrolene，故選B。","detail":{"background":"「Dantrolene(丹曲林,B)」是「直接作用於骨骼肌」的肌肉鬆弛劑——抑制肌漿網(sarcoplasmic reticulum)的ryanodine受體、「減少鈣離子釋放」,使肌肉無法收縮。臨床用於「惡性高熱(malignant hyperthermia)」與痙攣。Diazepam(中樞GABA)、succinylcholine(去極化神經肌肉阻斷)、atracurium(非去極化阻斷)作用於不同部位。故作用於骨骼肌減少肌漿網釋鈣者為dantrolene(B)。","options":{"A":"diazepam作用於中樞(GABA)。","B":"正確:dantrolene減少肌漿網釋鈣。","C":"succinylcholine是去極化神經肌肉阻斷劑(終板)。","D":"atracurium是非去極化阻斷劑(終板)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-51":{"quick":"不用於治療重症肌無力的副交感藥是bethanechol，故選B。","detail":{"background":"重症肌無力用「乙醯膽鹼酯酶抑制劑」:neostigmine(A)、pyridostigmine(C)、ambenonium(D)——增加神經肌肉接合處乙醯膽鹼。而「bethanechol(B)」是「直接型蕈毒鹼致效劑」,選擇性作用於「膀胱與腸道平滑肌」(治術後尿滯留、腸無力),「不作用於骨骼肌神經肌肉接合處(尼古丁受體)」,故「不用於重症肌無力」。故選B。","options":{"A":"neostigmine治重症肌無力。","B":"正確:bethanechol作用膀胱腸道,不治重症肌無力。","C":"pyridostigmine治重症肌無力。","D":"ambenonium治重症肌無力。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-50":{"quick":"乙醯膽鹼作用劑錯誤敘述為D：應「刺激睫狀肌收縮」而非舒張，故選D。","detail":{"background":"乙醯膽鹼(膽鹼性致效劑)的蕈毒鹼效應(副交感「休息消化」):①刺激腸胃道分泌與蠕動(A);②增加支氣管分泌與收縮(B);③增加膀胱逼尿肌張力促排尿(C);④「使睫狀肌『收縮』(看近)、瞳孔括約肌收縮(縮瞳)」——D說「刺激睫狀肌『舒張』」錯(應為收縮)。故錯誤為D。","options":{"A":"刺激腸胃道分泌,正確。","B":"增加支氣管分泌,正確。","C":"增加逼尿肌張力,正確。","D":"正確(為錯誤敘述):應使睫狀肌「收縮」非舒張。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-51":{"quick":"骨骼肌僵硬高熱（惡性高熱）的解藥是dantrolene，故選C。","detail":{"background":"「惡性高熱(malignant hyperthermia)」是吸入性麻醉劑或succinylcholine誘發的骨骼肌持續收縮、產熱、高熱、僵直(基因易感者),解藥是「dantrolene(丹曲林,C)」——抑制肌漿網ryanodine受體、減少鈣釋放、停止肌肉持續收縮。故骨骼肌僵硬高熱解藥為dantrolene(C)。succinylcholine(誘發者)、tubocurarine、diazepam非解藥。故選C。","options":{"A":"succinylcholine是誘發惡性高熱者,非解藥。","B":"tubocurarine非惡性高熱解藥。","C":"正確:dantrolene是惡性高熱解藥。","D":"diazepam非惡性高熱解藥。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-50":{"quick":"抗蕈毒鹼藥（antimuscarinic）正確作用是散瞳，故選B。","detail":{"background":"抗蕈毒鹼藥(antimuscarinic,如atropine)阻斷副交感蕈毒鹼效應:①「散瞳(mydriasis)、睫狀肌麻痺」(B正確,瞳孔放大);②「抑制」腸胃道蠕動(非促進,A錯);③「禁用於青光眼」(散瞳堆積虹膜阻塞隅角升眼壓,C錯說治青光眼);④「抑制」排尿(尿滯留,非促進,D錯)。故正確為B(散瞳)。抗蕈毒鹼還致口乾、心跳加速、視力模糊。","options":{"A":"抗蕈毒鹼抑制腸胃蠕動,非促進。","B":"正確:抗蕈毒鹼藥散瞳。","C":"抗蕈毒鹼禁用於青光眼(升眼壓)。","D":"抗蕈毒鹼抑制排尿(尿滯留),非促進。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-51":{"quick":"會先產生短暫肌束顫動的肌鬆劑是succinylcholine，故選B。","detail":{"background":"「Succinylcholine(琥珀膽鹼,B)」是「去極化型(depolarizing)神經肌肉阻斷劑」——先使終板「持續去極化」造成「短暫肌束顫動(fasciculation)」,接著進入持續去極化阻斷(肌肉鬆弛)。故會先肌束顫動者為succinylcholine(B)。tubocurarine、atracurium是「非去極化型(競爭性)」不致肌束顫動;dantrolene、diazepam作用不同。故選B。","options":{"A":"tubocurarine是非去極化型,不致肌束顫動。","B":"正確:succinylcholine(去極化)先致肌束顫動。","C":"dantrolene作用於肌漿網,非終板。","D":"diazepam作用於中樞。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-51":{"quick":"Tubocurarine的肌鬆作用可被Neostigmine減弱，故選B。","detail":{"background":"Tubocurarine是「非去極化型(競爭性)神經肌肉阻斷劑」——與乙醯膽鹼「競爭」終板尼古丁受體。其作用可被「乙醯膽鹼酯酶抑制劑『Neostigmine』(B)」逆轉/減弱——neostigmine抑制乙醯膽鹼分解、增加終板乙醯膽鹼濃度,競爭性把tubocurarine擠開,恢復肌肉收縮(臨床用於麻醉後逆轉肌鬆)。故減弱tubocurarine者為neostigmine(B)。propranolol、atropine、prazosin機轉不符。故選B。","options":{"A":"propranolol是β阻斷劑,不逆轉肌鬆。","B":"正確:neostigmine增加乙醯膽鹼,逆轉非去極化肌鬆。","C":"atropine是抗蕈毒鹼,不逆轉骨骼肌阻斷。","D":"prazosin是α1阻斷劑,不相關。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-51":{"quick":"治療青光眼較適用的膽鹼致效劑是Pilocarpine，故選B。","detail":{"background":"「Pilocarpine(B)」是「直接型蕈毒鹼致效劑」,「局部點眼」用於青光眼——使「瞳孔括約肌收縮(縮瞳)、睫狀肌收縮」,拉開隅角、促進房水經Schlemm管排出,降低眼壓(尤其急性閉鎖隅角青光眼)。故治青光眼較適用者為pilocarpine(B)。Bethanechol(膀胱腸道)、neostigmine與pyridostigmine(重症肌無力)非眼用首選。故選B。","options":{"A":"Bethanechol作用膀胱腸道,非眼用。","B":"正確:pilocarpine點眼治青光眼(縮瞳降眼壓)。","C":"neostigmine用於重症肌無力。","D":"pyridostigmine用於重症肌無力。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-49":{"quick":"有機磷農藥（巴拉松）中毒應注射pralidoxime及atropine，故選C。","detail":{"background":"有機磷農藥(巴拉松parathion)中毒=「不可逆抑制乙醯膽鹼酯酶」→乙醯膽鹼大量堆積,出現「蕈毒鹼效應(瞳孔縮小、流涎、流淚、支氣管分泌、腹瀉、心跳慢)＋尼古丁效應(肌束顫動、抽搐)」。解毒:①「atropine(阻斷蕈毒鹼效應,減少分泌)」＋②「pralidoxime(2-PAM,乙醯膽鹼酯酶『再活化劑』,使酵素復原)」。故應注射pralidoxime及atropine(C)。epinephrine、tubocurarine皆錯。故選C。","options":{"A":"已危急應立即解毒,不應等血液生化。","B":"epinephrine非有機磷中毒解藥。","C":"正確:有機磷中毒注射pralidoxime+atropine。","D":"tubocurarine會加重肌肉問題,非解藥。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-50":{"quick":"腎上腺素正確敘述為C：是治療第一型過敏反應的首選藥，故選C。","detail":{"background":"腎上腺素(epinephrine):A錯——是「兒茶酚胺(胺類小分子)」非蛋白質(由腎上腺髓質分泌正確,但非蛋白質);B錯——「高劑量」呈α效應(血管收縮升壓),「低劑量」反而β2效應(血管舒張);C「是第一型過敏反應(過敏性休克anaphylaxis)的首選用藥」正確——腎上腺素收縮血管升壓、舒張支氣管、抑制肥大細胞,救治過敏性休克;D錯——活化肝臟β2受體「促進」肝醣分解(升血糖),非α2減少。故正確為C。","options":{"A":"腎上腺素是兒茶酚胺,非蛋白質。","B":"低劑量呈β2效應,高劑量呈α效應(非低劑量α)。","C":"正確:腎上腺素是過敏性休克(第一型)首選用藥。","D":"活化β2促肝醣分解升血糖,非α2減少。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-59":{"quick":"Mannitol錯誤敘述為A：不用於治療顱內「出血」，故選A。","detail":{"background":"Mannitol(甘露醇)是「滲透性利尿劑」——靜脈給予後在血管內提高滲透壓,把組織(腦、眼)水分拉入血管再經腎排出:用於「降顱內壓(手術引起的腦水腫,B)、降眼壓(青光眼,C)、加速毒物排泄(D)」。但「顱內『出血』(A)」時,mannitol可能因脫水使出血處壓力變化、且無法止血,「不用於治療顱內出血」(且活動性出血為相對禁忌)。故錯誤為A。(此題Mannitol實為利尿劑,分類落D2僅因關聯,內容以利尿/降壓理解。)","options":{"A":"正確(為錯誤敘述):mannitol不用於治療顱內出血。","B":"治手術引起顱內壓上升(腦水腫),正確。","C":"降眼壓(青光眼),正確。","D":"加強腎排毒物,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-51":{"quick":"不具β2選擇性的擬交感藥是dobutamine，故選D。","detail":{"background":"β2選擇性擬交感藥(支氣管擴張、治氣喘):terbutaline(A)、fenoterol(B)、salbutamol/albuterol(C)——選擇性活化β2受體舒張支氣管。而「dobutamine(D)」是「β1選擇性」致效劑(增加心肌收縮力,用於急性心衰),「不具β2選擇性」。故不具β2選擇性者為dobutamine(D)。","options":{"A":"terbutaline是β2選擇性。","B":"fenoterol是β2選擇性。","C":"salbutamol是β2選擇性。","D":"正確:dobutamine是β1選擇性,不具β2選擇性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-56":{"quick":"Pilocarpine的拮抗劑是Atropine，故選A。","detail":{"background":"Pilocarpine是「蕈毒鹼(muscarinic)致效劑」,其拮抗劑是「抗蕈毒鹼藥『Atropine』(A)」——競爭性阻斷蕈毒鹼受體,逆轉pilocarpine的縮瞳、分泌等效應。故pilocarpine拮抗劑為atropine(A)。Terazosin(α1阻斷)、Butoxamine(β2阻斷)、d-Tubocurarine(尼古丁/神經肌肉阻斷)作用於不同受體。故選A。","options":{"A":"正確:atropine(抗蕈毒鹼)是pilocarpine的拮抗劑。","B":"Terazosin是α1阻斷劑。","C":"Butoxamine是β2阻斷劑。","D":"d-Tubocurarine是尼古丁/神經肌肉阻斷劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-54":{"quick":"用於眼底檢查散瞳的擬交感藥是Phenylephrine，故選A。","detail":{"background":"「Phenylephrine(A)」是「α1腎上腺素受體選擇性致效劑」,點眼可「收縮瞳孔擴大肌→散瞳(mydriasis)」,用於「眼底檢查」(且不麻痺睫狀肌、不影響調節)。故散瞳用於眼底檢查者為phenylephrine(A)。Clonidine(α2中樞降壓)、Albuterol(β2支氣管)、Fenoldopam(D1降壓)作用不符。故選A。","options":{"A":"正確:phenylephrine(α1)散瞳,用於眼底檢查。","B":"Clonidine是α2致效劑(中樞降壓)。","C":"Albuterol是β2致效劑(支氣管)。","D":"Fenoldopam是D1致效劑(降壓)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-55":{"quick":"physostigmine的作用「不」包括瞳孔放大，故選B。","detail":{"background":"Physostigmine是「乙醯膽鹼酯酶抑制劑」(可過血腦障壁),增加乙醯膽鹼、呈現副交感(蕈毒鹼)效應:①膀胱逼尿肌收縮(A);②「瞳孔『縮小』(miosis,縮瞳)」——B說「瞳孔放大」錯(應為縮小);③血壓下降(C,血管舒張/心率慢);④心跳減速(D)。故不是其作用者為B(瞳孔放大;實際是縮小)。","options":{"A":"膀胱逼尿肌收縮是其作用。","B":"正確(為非其作用):physostigmine使瞳孔「縮小」非放大。","C":"血壓下降是其作用。","D":"心跳減速是其作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-49":{"quick":"直接作用於膽鹼性受體降眼壓的是Pilocarpine，故選C。","detail":{"background":"治療青光眼降眼壓:「直接作用於『膽鹼性(蕈毒鹼)受體』」者為「Pilocarpine(C)」——縮瞳、睫狀肌收縮、拉開隅角促房水排出。Atropine(抗膽鹼,升眼壓禁用)、Echothiophate(乙醯膽鹼酯酶抑制劑,間接膽鹼性)、Timolol(β阻斷劑,減房水生成,非膽鹼受體)。題問「直接作用膽鹼受體」故為pilocarpine(C)。","options":{"A":"Atropine是抗膽鹼,升眼壓禁用。","B":"Echothiophate是間接(抑制酯酶),非直接作用受體。","C":"正確:pilocarpine直接作用膽鹼受體降眼壓。","D":"Timolol是β阻斷劑,非膽鹼受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-33":{"quick":"沙林（神經毒氣）中毒「不會」心跳加速，故選A。","detail":{"background":"沙林(sarin)是「有機磷神經毒劑」——不可逆抑制乙醯膽鹼酯酶,乙醯膽鹼大量堆積呈副交感(蕈毒鹼)過度興奮:「瞳孔縮小(B)、頻尿(C)、唾液增加(D)、流淚、支氣管分泌與收縮、腹瀉、『心跳『減慢』(bradycardia)』」。故「心跳『加速』(A)」與沙林中毒相反(應為心跳減慢),不是其症狀。故選A。(東京地鐵沙林事件1995。)","options":{"A":"正確(為非症狀):沙林中毒心跳「減慢」非加速。","B":"瞳孔縮小是沙林中毒症狀。","C":"頻尿是沙林中毒症狀。","D":"唾液增加是沙林中毒症狀。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-31":{"quick":"去極化型神經肌肉阻斷劑是Succinylcholine，故選D。","detail":{"background":"神經肌肉阻斷劑分:①「去極化型(depolarizing)」——「Succinylcholine(D)」,持續活化終板尼古丁受體使持續去極化(先肌束顫動後鬆弛);②「非去極化型(競爭性non-depolarizing)」——Mivacurium(A)、Pancuronium(B)、Tubocurarine(C)等「-curium/-curonium」,競爭性阻斷終板受體(可被neostigmine逆轉)。故去極化型為succinylcholine(D)。","options":{"A":"Mivacurium是非去極化型。","B":"Pancuronium是非去極化型。","C":"Tubocurarine是非去極化型。","D":"正確:Succinylcholine是去極化型。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-31":{"quick":"不適合治療青光眼的是Cyclopentolate，故選A。","detail":{"background":"青光眼治療(降眼壓):Physostigmine(B,膽鹼酯酶抑制劑,縮瞳)、Carbachol(C,膽鹼致效劑,縮瞳)、Timolol(D,β阻斷劑,減房水)。而「Cyclopentolate(A)」是「抗蕈毒鹼藥(散瞳劑/睫狀肌麻痺劑)」,會「散瞳升眼壓」,「禁用/不適合於青光眼」。故不適合者為cyclopentolate(A)。","options":{"A":"正確:cyclopentolate是散瞳劑,升眼壓,不適合青光眼。","B":"Physostigmine縮瞳治青光眼。","C":"Carbachol縮瞳治青光眼。","D":"Timolol減房水治青光眼。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-31":{"quick":"不能抑制乙醯膽鹼酯酶的是bethanechol，故選D。","detail":{"background":"乙醯膽鹼酯酶抑制劑(增加乙醯膽鹼):physostigmine(A)、sarin(B,有機磷不可逆抑制)、edrophonium(C,短效,用於診斷重症肌無力)。而「bethanechol(D)」是「直接型蕈毒鹼『致效劑』」(直接活化受體,作用於膀胱腸道),「不抑制乙醯膽鹼酯酶」(機轉是直接興奮受體,非抑制分解酵素)。故不能抑制酯酶者為bethanechol(D)。","options":{"A":"physostigmine抑制乙醯膽鹼酯酶。","B":"sarin不可逆抑制乙醯膽鹼酯酶。","C":"edrophonium抑制乙醯膽鹼酯酶(診斷重症肌無力)。","D":"正確:bethanechol是直接致效劑,不抑制酯酶。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-52":{"quick":"Carbidopa抑制「周邊」decarboxylase，故選A。","detail":{"background":"帕金森氏症用levodopa(多巴胺前驅物,可過血腦障壁)補充腦內多巴胺。但levodopa在「周邊組織」會被「脫羧酶(DOPA decarboxylase)」轉成多巴胺(無法過血腦障壁、引起周邊副作用如噁心低血壓)。「Carbidopa(A)」抑制「周邊」脫羧酶(本身不過血腦障壁),使更多levodopa進入腦、減少周邊副作用、降低levodopa所需劑量。故carbidopa抑制周邊decarboxylase(A)。","options":{"A":"正確:carbidopa抑制周邊脫羧酶。","B":"carbidopa不過血腦障壁(過的是levodopa)。","C":"非抗自由基。","D":"非抑制多巴胺回收。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-53":{"quick":"治大發作癲癇、三叉神經痛、躁鬱症的是Carbamazepine，故選C。","detail":{"background":"「Carbamazepine(卡馬西平,C)」阻斷鈉離子通道,用途廣:①大發作(全身強直陣攣)與部分性癲癇;②三叉神經痛(神經痛首選);③躁鬱症(情緒穩定劑)。Ethosuximide(失神性癲癇)、Trimethadione(舊失神藥)、Phenobarbital(巴比妥,鎮靜抗癲癇)用途不符這組合。故選C。","options":{"A":"Ethosuximide用於失神性癲癇。","B":"Trimethadione是舊失神性癲癇藥。","C":"正確:Carbamazepine治大發作癲癇+三叉神經痛+躁鬱症。","D":"Phenobarbital是巴比妥類鎮靜抗癲癇。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-54":{"quick":"麻醉誘導要避免病人停留在「第二期（Stage II，興奮期）」，故選B。","detail":{"background":"全身麻醉分四期:Stage I(止痛期)、「Stage II(興奮/譫妄期,excitement)」——表現躁動、不規則呼吸、肌張力增加、嘔吐、可能喉痙攣,是「危險期」、Stage III(外科麻醉期,理想手術深度)、Stage IV(延腦麻痺,過深致呼吸循環衰竭)。麻醉誘導(induction)的目的是「快速通過興奮的第二期」直接進入Stage III,避免病人停留在危險的第二期。故避免Stage II(B)。","options":{"A":"Stage I是止痛期。","B":"正確:要快速通過危險的第二期(興奮期)。","C":"Stage III是理想手術麻醉期。","D":"Stage IV是過深致命期。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-52":{"quick":"長期服用lithium最易導致甲狀腺功能過低，故選B。","detail":{"background":"鋰鹽(lithium,情緒穩定劑,治躁鬱症)的長期副作用:「甲狀腺功能低下(hypothyroidism)與甲狀腺腫」(B,鋰抑制甲狀腺素釋放,最常見內分泌副作用,需監測甲狀腺功能)、腎性尿崩症(多尿)、震顫、體重增加。鋰治療指數窄,需監測血中濃度。故最易導致甲狀腺功能過低(B)。","options":{"A":"男性巨乳症非lithium典型。","B":"正確:lithium長期致甲狀腺功能過低。","C":"非典型致高血糖。","D":"非便秘為主(可能多尿)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-54":{"quick":"錯誤敘述為B：MAC值愈大、麻醉強度愈「弱」，故選B。","detail":{"background":"最低肺泡濃度(MAC,minimal alveolar concentration)是吸入麻醉劑的「效價(potency)指標」(A對)——MAC是使50%病人對手術刺激無體動反應所需的肺泡濃度。「MAC越小→效價越強(越少量就有效)」;「MAC越大→效價越弱」(B說MAC大強度強,錯)。脂溶性越高的麻醉劑MAC越小(效價越強,D對,Meyer-Overton)。halothane(MAC約0.75%)的MAC比笑氣(N2O,MAC>100%)小,故halothane效價較強(C對)。故錯誤為B。","options":{"A":"MAC是吸入麻醉劑強度指標,正確。","B":"正確(為錯誤敘述):MAC越大強度越「弱」非強。","C":"halothane MAC比笑氣小,正確。","D":"脂溶性越高MAC越小,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-52":{"quick":"haloperidol致假性帕金森是阻斷「外錐體系統」多巴胺，故選B。","detail":{"background":"抗精神病藥haloperidol阻斷多巴胺D2受體,在「黑質紋狀體(nigrostriatal)路徑——即外錐體系統(extrapyramidal system)」阻斷D2,造成多巴胺不足、乙醯膽鹼相對過多,產生「錐體外症候群」如假性帕金森氏症(僵直、震顫、運動遲緩)、急性肌張力不全、靜坐不能、遲發性運動障礙。故為外錐體系統(B)。","options":{"A":"邊緣系統與抗精神病療效相關,非運動障礙。","B":"正確:外錐體系統(黑質紋狀體)D2阻斷致假性帕金森。","C":"非小腦萎縮。","D":"非大腦運動皮質。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-53":{"quick":"減少levodopa周邊副作用的是carbidopa，故選A。","detail":{"background":"「Carbidopa(A)」抑制周邊DOPA脫羧酶,減少levodopa在周邊轉成多巴胺(減少噁心、嘔吐、姿勢性低血壓等周邊副作用),並使更多levodopa進腦。Amantadine、bromocriptine、ropinirole是其他抗帕金森藥(機轉不同),非減少levodopa周邊副作用者。故選A。","options":{"A":"正確:carbidopa減少levodopa周邊副作用。","B":"amantadine是抗帕金森藥(促多巴胺釋放)。","C":"bromocriptine是多巴胺受體致效劑。","D":"ropinirole是多巴胺受體致效劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-54":{"quick":"治療鴉片成癮的取代性藥物是methadone，故選A。","detail":{"background":"「Methadone(美沙冬,A)」是長效口服「μ鴉片受體致效劑」,用於鴉片(海洛因)成癮的「替代(取代)療法」——以長效口服methadone取代短效注射海洛因,減少戒斷症狀與渴求、降低注射傳染病風險。故鴉片成癮取代藥為methadone(A)。fentanyl(強效止痛)、pentazocine(混合致效拮抗)、naloxone(拮抗劑,解鴉片中毒)非替代療法藥。故選A。","options":{"A":"正確:methadone是鴉片成癮替代療法藥。","B":"fentanyl是強效止痛劑。","C":"pentazocine是混合致效拮抗劑。","D":"naloxone是鴉片拮抗劑(解中毒)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-52":{"quick":"chlorpromazine不宜用於癲癇因「降低癲癇閾值」，故選B。","detail":{"background":"抗精神病藥chlorpromazine(及多數抗精神病藥)會「降低癲癇發作閾值(threshold)」——使癲癇更易誘發,故癲癇病人使用須小心(可能增加發作)。故不宜用於癲癇的原因是降低癲癇閾值(B)。非電解質不平衡、非增麩胺酸、非抑制GABA(其機轉是降閾值)。故選B。","options":{"A":"非引起電解質不平衡為主因。","B":"正確:chlorpromazine降低癲癇閾值。","C":"非增強麩胺酸釋放。","D":"非抑制GABA活性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-53":{"quick":"突然停藥出現靜坐不能是「戒斷症狀」，故選C。","detail":{"background":"長期使用苯二氮平類(flurazepam,長效抗焦慮安眠)後「突然停藥」,出現焦慮、靜坐不能(restlessness)、失眠、震顫、甚至抽搐——是「戒斷症狀(withdrawal syndrome)」(身體依賴後突然停藥所致)。故為戒斷症狀(C)。耐藥性(同劑量效果遞減)、致敏化、中毒是不同概念。苯二氮平宜逐漸減量停藥。故選C。","options":{"A":"耐藥性是效果遞減,非停藥症狀。","B":"致敏化是反應增強,非此。","C":"正確:突然停藥出現靜坐不能是戒斷症狀。","D":"中毒是過量,非停藥症狀。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-54":{"quick":"Ketamine麻醉的主要副作用是易產生幻覺，故選C。","detail":{"background":"Ketamine(K他命)是「解離性麻醉劑」(NMDA受體拮抗劑),特點是止痛強、維持呼吸與心血管(甚至升血壓心率)、支氣管擴張,但「主要副作用是甦醒期『幻覺、惡夢、譫妄(emergence reaction)』」(C),故須在安靜環境並可併用苯二氮平減輕。故主要副作用為易產生幻覺(C)。非癲癇、非姿勢性低血壓(反而升壓)、非憂鬱(近年低劑量反用於抗憂鬱)。故選C。","options":{"A":"非致癲癇為主。","B":"ketamine反而升血壓,非姿勢性低血壓。","C":"正確:ketamine甦醒期易產生幻覺。","D":"非致憂鬱(低劑量反抗憂鬱)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-52":{"quick":"donepezil的適應症是阿茲海默症，故選D。","detail":{"background":"「Donepezil(D)」是「乙醯膽鹼酯酶抑制劑」,用於「阿茲海默症(失智)」——增加腦內乙醯膽鹼,改善認知症狀(Alzheimer的病理是膽鹼性神經元退化)。故donepezil治阿茲海默症(D)。威爾遜氏症(銅螯合)、亨丁頓舞蹈症、帕金森氏症機轉不符。故選D。","options":{"A":"威爾遜氏症用銅螯合劑。","B":"舞蹈症非donepezil適應症。","C":"帕金森氏症用levodopa等。","D":"正確:donepezil治阿茲海默症。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-52":{"quick":"Disulfiram抑制「乙醛脫氫酶」，故選B。","detail":{"background":"「Disulfiram(戒酒硫,B)」治療酒癮的機轉是「抑制乙醛脫氫酶(aldehyde dehydrogenase)」——飲酒後乙醇代謝產生的「乙醛(acetaldehyde)」無法被進一步代謝而堆積,造成噁心、嘔吐、潮紅、頭痛、心悸等難受的「乙醛中毒反應」,使病人厭惡飲酒(嫌惡療法)。故disulfiram抑制乙醛脫氫酶(B)。","options":{"A":"非增加酒精代謝(是抑制乙醛代謝)。","B":"正確:disulfiram抑制乙醛脫氫酶。","C":"非抑制單胺氧化酶。","D":"非與酒精競爭P450。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-54":{"quick":"Benzodiazepine活化GABA-A受體使氯離子內流、細胞過極化，故選A。","detail":{"background":"苯二氮平類(benzodiazepine)的機轉是「活化GABA-A受體」——與GABA-A受體上的BZD結合位結合,「增強GABA使氯離子(Cl⁻)通道開啟頻率增加、Cl⁻流入細胞造成過極化(hyperpolarization)」,降低神經興奮性,產生抗焦慮、鎮靜、安眠、抗痙攣、肌肉鬆弛作用。故為活化GABA-A、Cl⁻內流過極化(A)。","options":{"A":"正確:BZD活化GABA-A,Cl⁻內流過極化。","B":"非GABA-B(那是baclofen)。","C":"非活化麩胺酸(是抑制性GABA)。","D":"非阻斷鈣通道。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-52":{"quick":"L-dopa是合成多巴胺的前驅物，故選C。","detail":{"background":"L-dopa(levodopa)治療帕金森氏症的機轉是「作為合成多巴胺的『前驅物(precursor)』」——多巴胺本身無法過血腦障壁,但levodopa可以,進入腦後經脫羧酶轉成多巴胺,補充黑質紋狀體不足的多巴胺。故L-dopa是多巴胺前驅物(C)。非阻斷或抑制多巴胺、非作用正腎上腺素。故選C。","options":{"A":"非阻斷多巴胺受體。","B":"非抑制多巴胺活性(是補充)。","C":"正確:L-dopa是合成多巴胺的前驅物。","D":"非增強正腎上腺素。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-53":{"quick":"百憂解（Fluoxetine）抑制血清素回收，故選C。","detail":{"background":"百憂解(Fluoxetine)是「選擇性血清素回收抑制劑(SSRI)」——抑制突觸前膜對「血清素(serotonin/5-HT)」的回收(reuptake),增加突觸間隙血清素濃度,改善憂鬱。故fluoxetine抑制血清素回收(C)。SSRI對多巴胺、正腎上腺素回收影響小,是第一線抗憂鬱藥(副作用較三環少)。故選C。","options":{"A":"SSRI對多巴胺回收影響小。","B":"非主要抑制正腎上腺素回收(那是SNRI/TCA)。","C":"正確:fluoxetine抑制血清素回收。","D":"非抑制GABA回收。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-55":{"quick":"最易產生幻覺的是LSD（麥角酸二乙胺），故選A。","detail":{"background":"「Lysergic acid diethylamide(LSD,麥角酸二乙胺,A)」是強效「迷幻劑」,作用於腦內「血清素(5-HT2A)受體」,產生強烈的視聽幻覺、感知扭曲。故最易產生幻覺者為LSD(A)。Ergotamine(治偏頭痛,血管收縮)、Ketanserin(5-HT2拮抗,降壓)、Sumatriptan(5-HT1致效,治偏頭痛)非致幻劑。故選A。","options":{"A":"正確:LSD是強效迷幻劑,產生幻覺。","B":"Ergotamine治偏頭痛(血管收縮)。","C":"Ketanserin是5-HT2拮抗劑。","D":"Sumatriptan治偏頭痛。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-51":{"quick":"肉毒桿菌素抑制運動神經末梢釋放乙醯膽鹼，故選D。","detail":{"background":"肉毒桿菌素(botulinum toxin)的機轉是「抑制運動神經末梢釋放乙醯膽鹼」——分解SNARE蛋白(SNAP-25),阻止突觸囊泡釋放乙醯膽鹼,造成肌肉「鬆弛性麻痺」。注射於表情肌可使其暫時麻痺、撫平動態皺紋;也治眼瞼痙攣、斜頸、多汗等。故為抑制乙醯膽鹼釋放(D)。","options":{"A":"非使細胞骨架收縮。","B":"非加速代謝清除脂肪。","C":"非阻斷氧化磷酸化。","D":"正確:肉毒桿菌素抑制運動神經末梢釋放乙醯膽鹼。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-52":{"quick":"Disulfiram作用於乙醛脫氫酶治療酒精成癮，故選C。","detail":{"background":"Disulfiram(戒酒硫)抑制「乙醛脫氫酶(aldehyde dehydrogenase,C)」——飲酒後乙醇→乙醛,乙醛無法被進一步代謝而堆積,造成潮紅、噁心、嘔吐、心悸等不適,使病人嫌惡飲酒。故disulfiram作用於乙醛脫氫酶(C)。","options":{"A":"非乙醯膽鹼酶。","B":"非腺苷酸環化酶。","C":"正確:disulfiram抑制乙醛脫氫酶。","D":"非單胺氧化酶。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-56":{"quick":"易產生牙齦增生的抗癲癇藥是Phenytoin，故選C。","detail":{"background":"「Phenytoin(苯妥英,C)」是阻斷鈉通道的抗癲癇藥(治部分性與全身強直陣攣發作),其特徵性副作用是「牙齦增生(gingival hyperplasia)」、多毛、複視、眼球震顫、巨母紅血球性貧血(干擾葉酸)、Steven-Johnson症候群。故易致牙齦增生者為phenytoin(C)。Gabapentin、Phenobarbital、Valproic acid無此典型牙齦增生。故選C。","options":{"A":"非Gabapentin。","B":"Phenobarbital無牙齦增生特徵。","C":"正確:phenytoin易致牙齦增生。","D":"Valproic acid致體重增加、肝毒性,非牙齦增生。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-50":{"quick":"thiopental正確敘述為C：注射後會「再分布」至骨骼肌與脂肪而藥效消退，故選C。","detail":{"background":"Thiopental(硫噴妥鈉)是「超短效巴比妥」,用於麻醉「誘導」:①「脂溶性高」,靜脈注射後迅速進入腦(起始快);②藥效短暫消退「不是靠代謝,而是靠『再分布(redistribution)』」——藥物快速從腦再分布到「骨骼肌與脂肪」等組織,使腦中濃度下降、病人甦醒(C正確)。A錯(單次靜脈推注即可,非須持續輸注);B錯(脂溶性高而非水溶性高致起始快);D錯(再分布使藥效『短暫』而非維持24小時)。故選C。","options":{"A":"單次靜脈推注即可,非須持續輸注。","B":"是脂溶性高致起始快,非水溶性高。","C":"正確:再分布至骨骼肌脂肪使藥效消退。","D":"再分布使藥效短暫,非維持24小時。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-51":{"quick":"對中樞乙醯膽鹼酯酶影響最小的是neostigmine，故選A。","detail":{"background":"乙醯膽鹼酯酶抑制劑中:「Neostigmine(A)」是「季銨化合物(帶電荷)」,「不易過血腦障壁」,主要作用於「周邊」(用於重症肌無力、逆轉肌鬆),對「中樞乙醯膽鹼酯酶影響最小」。而physostigmine、rivastigmine、galantamine可過血腦障壁、作用於中樞(治失智)。故對中樞影響最小者為neostigmine(A)。","options":{"A":"正確:neostigmine(季銨)不過血腦障壁,對中樞影響最小。","B":"physostigmine可過血腦障壁。","C":"rivastigmine作用中樞(治失智)。","D":"galantamine作用中樞(治失智)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-52":{"quick":"不用於帕金森氏症的是Galantamine，故選C。","detail":{"background":"帕金森氏症用藥:Amantadine(A,促多巴胺釋放)、Carbidopa(B,配levodopa)、Selegiline(D,MAO-B抑制劑)。而「Galantamine(C)」是「乙醯膽鹼酯酶抑制劑」,用於「阿茲海默症(失智)」,「不用於帕金森氏症」(且抗膽鹼酯酶會增加乙醯膽鹼,反不利帕金森)。故不用於帕金森者為galantamine(C)。","options":{"A":"Amantadine用於帕金森。","B":"Carbidopa配levodopa治帕金森。","C":"正確:Galantamine治阿茲海默,不用於帕金森。","D":"Selegiline(MAO-B)治帕金森。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-53":{"quick":"三環抗憂鬱藥的視力模糊口乾便祕是阻斷「毒蕈鹼受體」，故選C。","detail":{"background":"三環抗憂鬱藥(TCA)的常見副作用「視力模糊、口乾、便祕、尿滯留、心搏過速」是其「抗膽鹼(阻斷『毒蕈鹼muscarinic受體』)」作用所致(C)。TCA還阻斷α受體(姿勢性低血壓)、抑制鈉通道(過量致心臟毒性、心律不整)。故視力模糊口乾便祕是抗毒蕈鹼作用(C)。","options":{"A":"α受體阻斷致姿勢性低血壓,非口乾便祕。","B":"非β受體。","C":"正確:阻斷毒蕈鹼受體致口乾、視力模糊、便祕。","D":"非菸鹼受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-50":{"quick":"咖啡因的主要作用標的是Adenosine受體，故選D。","detail":{"background":"咖啡因(caffeine)是「腺苷酸(adenosine)受體拮抗劑」——阻斷腺苷酸受體(腺苷酸本是促進睡眠、抑制神經的物質),解除其抑制,產生提神、興奮、減少睡意的效果。故咖啡因主要作用標的為腺苷酸受體(D)。(高劑量也抑制磷酸雙酯酶,但主要是腺苷酸受體拮抗。)故選D。","options":{"A":"非多巴胺受體。","B":"非麩胺酸受體。","C":"非單胺氧化酶。","D":"正確:咖啡因是腺苷酸(adenosine)受體拮抗劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-62":{"quick":"不適用於帕金森氏症的是抗精神病藥，故選B。","detail":{"background":"帕金森氏症用藥(增加多巴胺或減少乙醯膽鹼):抗蕈毒鹼藥(A,減少相對過多的乙醯膽鹼)、MAO-B抑制劑(C,selegiline,減少多巴胺代謝)、COMT抑制劑(D,entacapone,延長levodopa作用)、levodopa、多巴胺致效劑。而「抗精神病藥(B,如haloperidol)」是「阻斷多巴胺D2受體」,會「加重」帕金森症狀(甚至致藥物性帕金森),「不適用」於帕金森。故選B。","options":{"A":"抗蕈毒鹼藥用於帕金森。","B":"正確:抗精神病藥阻斷多巴胺,加重帕金森,不適用。","C":"MAO-B抑制劑用於帕金森。","D":"COMT抑制劑用於帕金森。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-52":{"quick":"局部麻醉劑在發炎組織藥效降低因「pH下降使脂溶性降低」，故選A。","detail":{"background":"局部麻醉劑是弱鹼,須以「非離子化(脂溶)」形式穿過神經膜才能作用。發炎組織因酸性代謝產物使「局部pH『下降』(變酸)」,使弱鹼性局麻劑更多以「離子化(水溶)」形式存在、「脂溶性(非離子化比例)降低」,不易穿過神經膜、藥效降低(A)。故發炎組織局麻效果差因pH下降致脂溶性降低(A)。故選A。","options":{"A":"正確:發炎致pH下降,離子化增加、脂溶性降低,藥效差。","B":"是pH下降非上升。","C":"非發炎因子直接干擾。","D":"非抗藥性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-53":{"quick":"長期用Haloperidol最易造成錐體外症候群，故選A。","detail":{"background":"Haloperidol是強效「典型抗精神病藥」,強烈阻斷多巴胺D2受體,在黑質紋狀體路徑造成「錐體外症候群(extrapyramidal syndrome, EPS)」——急性肌張力不全、假性帕金森、靜坐不能、遲發性運動障礙(長期),是其最主要副作用。故最易造成錐體外症候群(A)。故選A。","options":{"A":"正確:haloperidol最易致錐體外症候群(EPS)。","B":"非致躁鬱症。","C":"非致阿茲海默。","D":"妥瑞氏症反而是用haloperidol治療的。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-64":{"quick":"帕金森氏症治療在重建Dopamine與Acetylcholine的平衡，故選C。","detail":{"background":"帕金森氏症的神經傳遞物質失衡:黑質多巴胺神經元退化使「多巴胺(dopamine)不足」,造成紋狀體內「多巴胺與乙醯膽鹼(acetylcholine)的平衡被打破(多巴胺↓、乙醯膽鹼相對過多)」。治療目標即「重建dopamine與acetylcholine的正常平衡」(補多巴胺levodopa,或用抗膽鹼藥減少乙醯膽鹼)。故為dopamine與acetylcholine(C)。","options":{"A":"非麩胺酸。","B":"非血清素與麩胺酸。","C":"正確:重建dopamine與acetylcholine平衡。","D":"非血清素。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-51":{"quick":"MAC數值越小、麻醉劑強度越大，故選A。","detail":{"background":"最低肺泡濃度(MAC)是吸入麻醉劑效價(potency)的指標:「MAC越小→越少量就能達到麻醉效果→效價(強度)越大」(A正確)。MAC與效價成「反比」。脂溶性越高的麻醉劑MAC越小、效價越強(Meyer-Overton)。故MAC越小強度越大(A)。","options":{"A":"正確:MAC越小麻醉強度越大。","B":"方向相反。","C":"MAC與溶解度關係非如此直接。","D":"非吸收率差。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-52":{"quick":"適用於阿茲海默症的是galantamine，故選C。","detail":{"background":"「Galantamine(C)」是「乙醯膽鹼酯酶抑制劑」(也調節菸鹼受體),用於「阿茲海默症(失智)」,增加腦內乙醯膽鹼改善認知。故治阿茲海默者為galantamine(C)。apomorphine、bromocriptine、rotigotine皆是「多巴胺受體致效劑」用於「帕金森氏症」。故選C。","options":{"A":"apomorphine是多巴胺致效劑(帕金森)。","B":"bromocriptine是多巴胺致效劑。","C":"正確:galantamine治阿茲海默症。","D":"rotigotine是多巴胺致效劑(帕金森)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-53":{"quick":"Carbidopa抑制DOPA脫羧酶（DOPA decarboxylase），故選B。","detail":{"background":"Carbidopa與levodopa併用,carbidopa抑制「周邊的DOPA脫羧酶(DOPA decarboxylase,B)」——減少levodopa在周邊轉成多巴胺,使更多levodopa進入腦、降低周邊副作用(噁心、低血壓)、減少levodopa所需劑量。故carbidopa抑制DOPA脫羧酶(B)。","options":{"A":"非乙醯膽鹼酯酶。","B":"正確:carbidopa抑制DOPA脫羧酶(周邊)。","C":"非多巴胺β羥化酶。","D":"非單胺氧化酶。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-54":{"quick":"明顯縮短入睡時間但易產生宿醉的長效安眠藥是flurazepam，故選C。","detail":{"background":"用於睡眠障礙的苯二氮平類中,「Flurazepam(C)」是「長效」安眠藥(及其活性代謝物半衰期長),能縮短入睡時間、減少夜醒,但因半衰期長,易造成「白天嗜睡、宿醉(daytime hangover)效應」。題述「明顯縮短入睡時間及減少夜醒但會造成(宿醉)」符合flurazepam(C)。故選C。","options":{"A":"clonazepam用於癲癇/恐慌。","B":"diazepam長效但題指flurazepam。","C":"正確:flurazepam長效安眠,易宿醉。","D":"temazepam是中效。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-51":{"quick":"Rivastigmine最適用於治療老年癡呆症（阿茲海默），故選A。","detail":{"background":"「Rivastigmine(A)」是「乙醯膽鹼酯酶(及丁醯膽鹼酯酶)抑制劑」,用於「老年癡呆症(阿茲海默症失智)」——增加腦內乙醯膽鹼改善認知(也用於帕金森失智)。故rivastigmine治老年癡呆(A)。重症肌無力(neostigmine/pyridostigmine)、青光眼(pilocarpine)、帕金森氏症(levodopa)非其主要適應。故選A。","options":{"A":"正確:rivastigmine治老年癡呆(阿茲海默)。","B":"重症肌無力用neostigmine等。","C":"青光眼用pilocarpine等。","D":"帕金森氏症用levodopa等。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-52":{"quick":"三環抗憂鬱藥抑制血清素和正腎上腺素的回收，故選B。","detail":{"background":"三環抗憂鬱藥(TCA,如imipramine、amitriptyline)的機轉是「抑制突觸前膜對『血清素(5-HT)與正腎上腺素(NE)』的回收」(B),增加兩者在突觸間隙的濃度而抗憂鬱。TCA也阻斷膽鹼、α、組織胺受體(致副作用)。故TCA抑制血清素與正腎上腺素回收(B)。","options":{"A":"TCA非拮抗血清素受體(是抑制回收)。","B":"正確:TCA抑制血清素與正腎上腺素回收。","C":"非增進多巴胺活性。","D":"非抑制GABA合成。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-53":{"quick":"嗎啡急性中毒「不會」產生散瞳（呈針狀瞳孔），題問不會的症狀，選D。","detail":{"background":"嗎啡(morphine)急性中毒三聯徵:「針狀瞳孔(pinpoint pupil,縮瞳)、昏迷、呼吸抑制(致命)」(A、B、C皆會)。題目選項D為「(其他不會的症狀)」——嗎啡致「縮瞳」非「散瞳」,故「散瞳」不會發生(嗎啡中毒是縮瞳)。依官方答案D為不會產生的症狀。解毒用naloxone。故選D。","options":{"A":"針狀瞳孔(縮瞳)是嗎啡中毒症狀。","B":"昏迷是嗎啡中毒症狀。","C":"呼吸抑制是嗎啡中毒致命症狀。","D":"正確(為不會的症狀):嗎啡致縮瞳非散瞳。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-54":{"quick":"phencyclidine（PCP）的機轉類似ketamine（NMDA拮抗），故選依官方。","detail":{"background":"Phencyclidine(PCP,天使塵)是濫用藥物,其機轉「類似ketamine」——皆為「NMDA麩胺酸受體拮抗劑(解離性)」,產生解離、幻覺、暴力行為、痛覺消失。故PCP藥理機轉類似ketamine(NMDA拮抗劑)。依官方答案選對應ketamine/NMDA拮抗的選項。","options":{"A":"依官方答案判定。","B":"依官方答案判定。","C":"依官方答案判定。","D":"PCP機轉類似ketamine(NMDA受體拮抗劑)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-55":{"quick":"治偏頭痛但易致子宮痙攣的是Ergotamine，故選B。","detail":{"background":"「Ergotamine(麥角胺,B)」治療偏頭痛(收縮腦血管),但也「收縮子宮平滑肌→子宮痙攣」,故「孕婦禁用」。故治偏頭痛但易致子宮痙攣者為ergotamine(B)。Sumatriptan(A,triptan,較選擇性、子宮作用小)、Buspirone(抗焦慮)、Cisapride(促胃腸動力)不符。故選B。","options":{"A":"Sumatriptan較選擇性,子宮作用小。","B":"正確:ergotamine治偏頭痛但易致子宮痙攣。","C":"Buspirone是抗焦慮藥。","D":"Cisapride是促胃腸動力藥。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-56":{"quick":"長期使用產生類紅斑性狼瘡的抗心律不整藥是Procainamide，故選D。","detail":{"background":"「Procainamide(Class IA,D)」長期使用會誘發「藥物性紅斑性狼瘡(drug-induced lupus,出現抗組蛋白抗體、關節炎、漿膜炎)」(hydralazine、isoniazid也會)。故致類狼瘡者為procainamide(D)。Tocainide、Lidocaine、Mexiletine(IB)無此典型。故選D。","options":{"A":"Tocainide無此典型。","B":"Lidocaine無此典型。","C":"Mexiletine無此典型。","D":"正確:procainamide長期致藥物性紅斑性狼瘡。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-57":{"quick":"使aspirin抗血栓藥效變差的是Ibuprofen，故選C。","detail":{"background":"Aspirin經「不可逆」乙醯化血小板COX-1抗血栓。若併用「Ibuprofen(其他NSAID,C)」,它「可逆地佔據COX-1活性位」,阻擋aspirin不可逆乙醯化COX-1,使aspirin的抗血小板藥效變差。故使aspirin抗血栓變差者為ibuprofen(C)。Heparin、Tirofiban、Clopidogrel是其他抗栓藥(不干擾aspirin機轉)。故選C。","options":{"A":"Heparin是抗凝劑,不干擾aspirin。","B":"Tirofiban是GPIIb/IIIa抑制劑。","C":"正確:ibuprofen競爭COX-1,使aspirin抗血栓變差。","D":"Clopidogrel是P2Y12拮抗劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-50":{"quick":"Clozapine錐體外副作用少因「對D2受體親和力低」，故選D。","detail":{"background":"Clozapine是「非典型抗精神病藥」,其錐體外症狀(EPS)少的原因是「對多巴胺D2受體親和力『低』」(D)——它對D2阻斷弱(故EPS少),反而對血清素5-HT2A、D4、其他受體作用較強。Clozapine療效佳(難治型思覺失調)但有「顆粒性白血球缺乏(agranulocytosis)」風險須監測血球。故EPS少因D2親和力低(D)。","options":{"A":"非抑制NMDA下游。","B":"非對D1高親和力。","C":"雖調節血清素正腎上腺素,但EPS少主因是D2親和力低。","D":"正確:對D2受體親和力低,故錐體外副作用少。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-52":{"quick":"作用於突觸小泡蛋白SV2A的抗癲癇藥是levetiracetam，故選B。","detail":{"background":"「Levetiracetam(左乙拉西坦,B)」是新型抗癲癇藥,機轉是「結合突觸小泡蛋白(synaptic vesicle protein 2A, SV2A)」,調節神經傳遞物質釋放而抗癲癇(用於部分性與全身性發作,副作用少、不經肝代謝)。故作用於SV2A者為levetiracetam(B)。oxcarbazepine、phenytoin(鈉通道)、felbamate機轉不同。故選B。","options":{"A":"oxcarbazepine阻斷鈉通道。","B":"正確:levetiracetam結合SV2A。","C":"phenytoin阻斷鈉通道。","D":"felbamate機轉不同。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-53":{"quick":"最易導致QT延長的抗精神病藥是thioridazine，故選A。","detail":{"background":"「Thioridazine(A)」是典型抗精神病藥(phenothiazine類),「最易導致心電圖QT間期延長」(心臟毒性、致命性心律不整torsades de pointes風險高),故已少用。haloperidol、aripiprazole、olanzapine的QT延長風險相對較低。故最易致QT延長者為thioridazine(A)。","options":{"A":"正確:thioridazine最易致QT延長。","B":"haloperidol QT延長風險較低。","C":"aripiprazole QT風險低。","D":"olanzapine QT風險較低。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-50":{"quick":"結構類似GABA的抗癲癇藥是Gabapentin，故選B。","detail":{"background":"「Gabapentin(B)」的結構「類似GABA(γ-胺基丁酸)」(設計之初模仿GABA),但其抗癲癇與止神經痛機轉實為「結合電壓閘控鈣通道的α2δ次單元」減少興奮性神經傳遞物釋放,用於部分性癲癇與神經痛(帶狀疱疹後神經痛)。故結構類似GABA者為gabapentin(B)。Carbamazepine、Phenytoin(鈉通道)、Valproic acid機轉不同。故選B。","options":{"A":"Carbamazepine阻斷鈉通道。","B":"正確:Gabapentin結構類似GABA。","C":"Phenytoin阻斷鈉通道。","D":"Valproic acid多重機轉。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-57":{"quick":"錐體外症狀副作用最強的抗精神病藥是Haloperidol，故選D。","detail":{"background":"抗精神病藥的錐體外症狀(EPS)強度與「D2受體阻斷強度」成正比。「Haloperidol(D)」是強效「典型」抗精神病藥,強烈阻斷D2,「EPS副作用最強」。而Thioridazine(典型但抗膽鹼強、EPS較少)、Olanzapine與Clozapine(非典型,EPS少)。故EPS最強者為haloperidol(D)。","options":{"A":"Thioridazine EPS較少(抗膽鹼強)。","B":"Olanzapine是非典型,EPS少。","C":"Clozapine是非典型,EPS最少。","D":"正確:Haloperidol EPS副作用最強。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-58":{"quick":"最易引起嚴重戒斷症狀的苯二氮平是Triazolam，故選B。","detail":{"background":"苯二氮平類的戒斷症狀嚴重度與「半衰期」相關:「短效」者(如Triazolam,B,超短效安眠藥)突然停藥時,血中濃度驟降,「戒斷症狀(反彈性失眠、焦慮)較嚴重且快速」。長效者(diazepam、clorazepate)因緩慢代謝,戒斷較輕。故最易嚴重戒斷者為短效的triazolam(B)。故選B。","options":{"A":"Clorazepate長效,戒斷較輕。","B":"正確:Triazolam短效,戒斷症狀嚴重。","C":"Diazepam長效,戒斷較輕。","D":"Lorazepam中效。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-51":{"quick":"不具抗痙攣肌鬆、長期較不易耐受的安眠藥是zolpidem，故選D。","detail":{"background":"「Zolpidem(D)」是「非苯二氮平類(Z-drug)」安眠藥,選擇性作用於GABA-A受體的α1次單元,「主要產生安眠作用,『較不具』抗痙攣或肌肉鬆弛特性」(那是苯二氮平的α2/α3作用),且「長期使用較不易產生耐受性與依賴」。故符合者為zolpidem(D)。eszopiclone(Z-drug類似)、ramelteon(褪黑激素致效)、hydroxyzine(抗組織胺)特性不同。依官方答案選D。","options":{"A":"eszopiclone是Z-drug但題指zolpidem。","B":"ramelteon是褪黑激素受體致效劑。","C":"hydroxyzine是抗組織胺(鎮靜)。","D":"正確:zolpidem選擇性安眠、較不具肌鬆抗痙攣、較不易耐受。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-55":{"quick":"無法幫助戒酒癮的是methadone，故選B。","detail":{"background":"戒酒癮藥物:disulfiram(A,抑制乙醛脫氫酶,嫌惡療法)、naltrexone(C,鴉片拮抗劑,減少飲酒的愉悅與渴求)、acamprosate(D,調節麩胺酸/GABA,減少渴求)。而「Methadone(B)」是治療「鴉片(海洛因)成癮」的替代藥,「不用於戒『酒』癮」。故無法戒酒癮者為methadone(B)。","options":{"A":"disulfiram戒酒癮(嫌惡療法)。","B":"正確:methadone戒鴉片癮,非戒酒癮。","C":"naltrexone戒酒癮(減渴求)。","D":"acamprosate戒酒癮(減渴求)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-51":{"quick":"LSD主要影響血清素神經系統，故選D。","detail":{"background":"迷幻藥LSD(麥角酸二乙胺)主要作用於腦內「血清素(serotonin)神經系統」——是5-HT2A受體的部分致效劑,產生視聽幻覺、感知扭曲、情緒改變。故LSD影響血清素神經系統(D)。故選D。","options":{"A":"非主要麩胺酸系統(那是PCP/ketamine)。","B":"非GABA系統。","C":"非膽鹼系統。","D":"正確:LSD主要影響血清素神經系統。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-57":{"quick":"類鴉片藥物「不」常見腹瀉（反而便祕），故選D。","detail":{"background":"類鴉片(opioid)藥物常見副作用:低血壓(A,組織胺釋放/血管擴張)、尿滯留(B)、噁心嘔吐(C)、「便祕(constipation,腸蠕動減少,耐受性最不易產生)」、呼吸抑制、縮瞳、鎮靜。題問「不是」其副作用者——「腹瀉(D)」與鴉片相反(鴉片致『便祕』,甚至用loperamide止瀉)。故不是其副作用者為腹瀉(D)。","options":{"A":"低血壓是類鴉片副作用。","B":"尿滯留是類鴉片副作用。","C":"噁心是類鴉片副作用。","D":"正確(為非副作用):類鴉片致便祕非腹瀉。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-60":{"quick":"對κ受體作用較強的類鴉片是Pentazocine，故選A。","detail":{"background":"「Pentazocine(A)」是「混合型致效-拮抗劑」——對「κ(kappa)受體是『致效劑』(作用較強)」,對μ受體則為部分致效/拮抗。故對κ受體作用較強者為pentazocine(A)。Morphine、Meperidine、Fentanyl主要是「μ受體」強效致效劑。故選A。","options":{"A":"正確:pentazocine對κ受體致效作用較強。","B":"Morphine主要作用μ受體。","C":"Meperidine主要作用μ受體。","D":"Fentanyl是強效μ受體致效劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-61":{"quick":"唯一可用於治療ALS的藥物是Riluzole，故選A。","detail":{"background":"「Riluzole(A)」是目前(早期)「唯一」核准用於治療「肌萎縮性側索硬化症(ALS)」的藥物——抑制麩胺酸釋放(減少興奮性毒性),可略延緩疾病進展。故ALS用藥為riluzole(A)。Selegiline、Pramipexole、Apomorphine是抗帕金森藥。(註:近年另有edaravone等,但傳統考點為riluzole。)故選A。","options":{"A":"正確:riluzole是ALS的藥物。","B":"Selegiline治帕金森(MAO-B)。","C":"Pramipexole治帕金森(多巴胺致效)。","D":"Apomorphine治帕金森(多巴胺致效)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-49":{"quick":"大麻THC主要結合Cannabinoid CB1受體，故選A。","detail":{"background":"大麻的主要精神活性成分「THC(四氫大麻酚)」在腦部主要結合「大麻素CB1受體(cannabinoid CB1 receptor,A)」——CB1廣泛分布於中樞神經(影響記憶、認知、情緒、食慾、痛覺),產生欣快、感知改變、食慾增加等效應。CB2主要在免疫細胞。故THC結合CB1受體(A)。","options":{"A":"正確:THC主要結合CB1受體。","B":"非多巴胺D2受體。","C":"非血清素5-HT3。","D":"非麩胺酸AMPA受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-55":{"quick":"也用於帶狀疱疹後神經痛的抗癲癇藥是Gabapentin，故選C。","detail":{"background":"「Gabapentin(C)」(及pregabalin)是抗癲癇藥,結合鈣通道α2δ次單元,「也廣泛用於治療『神經病變性疼痛』如『帶狀疱疹後神經痛(postherpetic neuralgia)』、糖尿病神經痛」。故也治帶狀疱疹後神經痛者為gabapentin(C)。Felbamate、Lamotrigine、Topiramate雖為抗癲癇藥但非帶狀疱疹後神經痛首選。故選C。","options":{"A":"Felbamate非神經痛首選。","B":"Lamotrigine用於癲癇/躁鬱。","C":"正確:gabapentin也治帶狀疱疹後神經痛。","D":"Topiramate用於癲癇/偏頭痛預防。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-56":{"quick":"不用於帕金森氏症的是乙醯膽鹼酯酶抑制劑，故選D。","detail":{"background":"帕金森氏症用藥:多巴胺受體致效劑(A)、levodopa(B,多巴胺前驅物)、抗毒蕈鹼藥(C,減少相對過多的乙醯膽鹼)。而「乙醯膽鹼酯酶抑制劑(D)」會「增加」乙醯膽鹼,「加重」帕金森(多巴胺/乙醯膽鹼失衡更嚴重),「不用於帕金森」(反而用於阿茲海默)。故不用於帕金森者為乙醯膽鹼酯酶抑制劑(D)。","options":{"A":"多巴胺致效劑用於帕金森。","B":"levodopa用於帕金森。","C":"抗毒蕈鹼藥用於帕金森。","D":"正確:乙醯膽鹼酯酶抑制劑增加乙醯膽鹼,加重帕金森,不用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-50":{"quick":"不是抗癲癇藥機轉的是「阻斷正腎上腺素受體」，故選D。","detail":{"background":"抗癲癇藥的機轉:①影響離子通道通透性(阻斷『鈉』或『鈣』通道,如phenytoin、carbamazepine、ethosuximide,A);②「阻斷興奮性麩胺酸(glutamate)受體/減少麩胺酸,B」;③「增強抑制性GABA作用」(C,如benzodiazepine、barbiturate)。而「阻斷正腎上腺素受體(D)」「不是」抗癲癇機轉。故不是者為D。","options":{"A":"影響離子通道是抗癲癇機轉。","B":"阻斷麩胺酸是抗癲癇機轉。","C":"活化GABA是抗癲癇機轉。","D":"正確:阻斷正腎上腺素受體不是抗癲癇機轉。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-56":{"quick":"phenytoin「不」致體重增加，故選D。","detail":{"background":"Phenytoin(苯妥英)的副作用:牙齦增生(A)、複視/眼球震顫(B,劑量相關)、Steven-Johnson症候群(C,嚴重皮膚反應)、多毛、巨母紅血球性貧血(干擾葉酸)、骨質疏鬆。而「體重增加(D)」不是phenytoin的典型副作用(致體重增加的抗癲癇藥是valproate、gabapentin)。故不是phenytoin副作用者為D。","options":{"A":"牙齦增生是phenytoin副作用。","B":"複視是phenytoin副作用。","C":"Steven-Johnson是phenytoin副作用。","D":"正確(為非副作用):phenytoin不致體重增加。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-57":{"quick":"濫用可能性低、未列管制的安眠藥是Ramelteon，故選D。","detail":{"background":"「Ramelteon(D)」是「褪黑激素(melatonin)受體致效劑」安眠藥——作用於MT1/MT2受體調節生理時鐘助眠,「無GABA作用、無成癮性、濫用可能性低,『未』列為管制藥品」。而Zolpidem、Zaleplon、Eszopiclone(Z-drugs)雖較安全但仍有依賴風險、列管。故未列管制者為ramelteon(D)。","options":{"A":"Zolpidem有依賴風險、列管。","B":"Zaleplon列管。","C":"Eszopiclone列管。","D":"正確:Ramelteon(褪黑激素致效)無成癮、未列管制。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-50":{"quick":"Carbamazepine主要作用於「鈉」離子通道，故選D。","detail":{"background":"Carbamazepine(卡馬西平)用於部分性(partial)癲癇,機轉是「阻斷電壓閘控『鈉(Na⁺)離子通道』」——使去活化的鈉通道恢復變慢,穩定神經膜、減少反覆放電。故作用於鈉通道(D)。也用於三叉神經痛、躁鬱症。故選D。","options":{"A":"非鈣通道(那是ethosuximide T型鈣)。","B":"非氯通道。","C":"非鉀通道。","D":"正確:Carbamazepine阻斷鈉離子通道。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-55":{"quick":"可降低菸癮的非典型抗憂鬱藥是Bupropion，故選C。","detail":{"background":"「Bupropion(安非他酮,C)」是「非典型抗憂鬱藥」(抑制多巴胺與正腎上腺素回收),也「核准用於戒菸——降低尼古丁渴求與戒斷症狀」(商品名Zyban)。故降低菸癮者為bupropion(C)。Nefazodone、Mirtazapine、Vortioxetine是其他抗憂鬱藥但非戒菸用。故選C。","options":{"A":"Nefazodone非戒菸用。","B":"Mirtazapine非戒菸用。","C":"正確:bupropion降低菸癮(戒菸)。","D":"Vortioxetine非戒菸用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-56":{"quick":"身體依賴性相對較高的是安非他命，故選D。","detail":{"background":"成癮物質的身體依賴性(生理戒斷)程度:鴉片類、酒精、巴比妥、苯二氮平、「安非他命/古柯鹼等興奮劑(D,強烈的心理依賴與生理戒斷如嗜睡憂鬱)」較高。咖啡因(A,輕度)、LSD(B,迷幻劑,身體依賴低)、大麻(C,身體依賴相對低)較低。故選項中身體依賴性相對較高者為安非他命(D)。故選D。","options":{"A":"咖啡因身體依賴輕度。","B":"LSD身體依賴低。","C":"大麻身體依賴相對低。","D":"正確:安非他命身體依賴性相對較高。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-55":{"quick":"Buspirone治泛焦慮症透過5-HT1A受體，故選D。","detail":{"background":"「Buspirone(D)」治療「廣泛性焦慮症(GAD)」的機轉是「血清素5-HT1A受體『部分致效劑』」——不作用於GABA(故無鎮靜、肌鬆、成癮、戒斷,與苯二氮平不同),起效慢(數週),適合長期慢性焦慮。故buspirone透過5-HT1A受體(D)。故選D。","options":{"A":"非D1受體。","B":"非5-HT3。","C":"非GABA-A(那是苯二氮平)。","D":"正確:buspirone是5-HT1A部分致效劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-56":{"quick":"levodopa「不」會產生心搏過慢，故選B。","detail":{"background":"Levodopa治帕金森的副作用:厭食、噁心(A,多巴胺刺激嘔吐中樞)、姿勢性低血壓(D,血壓降低)、精神症狀(C,幻覺、混亂)、運動異常(dyskinesia)、「『心搏過『速』(tachycardia)』(多巴胺/正腎上腺素效應)」。題問「不會」產生者——「心搏過『慢』(B)」與levodopa相反(應是心搏過速)。故不會者為心搏過慢(B)。","options":{"A":"厭食是levodopa副作用。","B":"正確(為不會):levodopa致心搏過「速」非過慢。","C":"精神疾患是levodopa副作用。","D":"血壓降低(姿勢性低血壓)是levodopa副作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-34":{"quick":"Ethosuximide抑制「T型鈣離子通道」治失神性癲癇，故選C。","detail":{"background":"「Ethosuximide(C)」治療「失神性癲癇(absence seizure)」的機轉是「抑制視丘神經元的『T型(T-type)鈣離子通道』」——T型鈣電流是失神性癲癇3Hz棘慢波的關鍵,抑制之可控制失神發作。故ethosuximide抑制T型鈣通道(C)。失神性癲癇首選ethosuximide(或valproate)。故選C。","options":{"A":"非L型鈣通道。","B":"非P型鈣通道。","C":"正確:ethosuximide抑制T型鈣通道。","D":"非N型鈣通道。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-32":{"quick":"不是短效鎮靜安眠的巴比妥是Phenobarbital，故選C。","detail":{"background":"巴比妥類依作用時間:超短效(thiopental,麻醉誘導)、短至中效(Amobarbital、Pentobarbital、Secobarbital,鎮靜安眠)、「長效(Phenobarbital,C)」——phenobarbital是「長效」巴比妥,用於『抗癲癇』(非短效鎮靜安眠)。故不是短效鎮靜安眠者為phenobarbital(C,長效)。故選C。","options":{"A":"Amobarbital是中短效鎮靜安眠。","B":"Pentobarbital是短效鎮靜安眠。","C":"正確:Phenobarbital是長效(抗癲癇),非短效。","D":"Secobarbital是短效鎮靜安眠。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-40":{"quick":"透過血清素受體產生幻覺的成癮物質是LSD，故選C。","detail":{"background":"「麥角酸二乙胺(LSD,C)」透過「血清素(5-HT2A)受體」產生強烈幻覺(迷幻劑)。古柯鹼、安非他命(A、B)是「興奮劑」(增加多巴胺/正腎上腺素,致欣快、警覺,非血清素致幻為主)、大麻(D)作用於CB1受體。故透過血清素受體致幻者為LSD(C)。故選C。","options":{"A":"古柯鹼是興奮劑(多巴胺)。","B":"安非他命是興奮劑(多巴胺/正腎上腺素)。","C":"正確:LSD透過血清素受體產生幻覺。","D":"大麻作用於CB1受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-33":{"quick":"局麻併用epinephrine的目的是延長藥物作用時間，故選D。","detail":{"background":"局部麻醉劑常併用「腎上腺素(epinephrine)」——epinephrine「收縮局部血管」,減少局麻劑被血流帶走,使其「停留於局部更久→延長麻醉作用時間」,同時減少局麻劑全身吸收(降低全身毒性)、減少術區出血。故併用epinephrine目的是延長藥物作用時間(D)。(末端肢體如手指腳趾、陰莖禁用,以免缺血壞死。)故選D。","options":{"A":"是收縮血管減少循環,非促進循環。","B":"非加快代謝。","C":"是減少全身吸收,非增強。","D":"正確:延長局麻藥作用時間(血管收縮)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-34":{"quick":"Bupropion除抗憂鬱外可治菸癮，故選D。","detail":{"background":"「Bupropion(安非他酮,D)」除作為抗憂鬱藥(抑制多巴胺/正腎上腺素回收)外,還「抑制個體對尼古丁的渴求,用於戒菸(治菸癮)」(商品名Zyban)。故bupropion尚可治菸癮(D)。它不治阿茲海默、非情緒穩定劑配lithium、無抗流感作用。故選D。","options":{"A":"非抑制乙醯膽鹼代謝(非治阿茲海默)。","B":"非與lithium合用治躁鬱。","C":"無抗流感功效。","D":"正確:bupropion抑制尼古丁渴求,治菸癮。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-33":{"quick":"搖頭丸（MDMA）最不適當敘述為D：英文簡稱不是NMDA，故選D。","detail":{"background":"搖頭丸(MDMA,亞甲基雙氧甲基安非他命):A「抑制血清素再回收(並促血清素釋放)」(正確);B「結構類似安非他命」(正確);C「可能引起高熱症(致命性高體溫)」(正確);D「英文簡稱NMDA」錯——搖頭丸簡稱「MDMA」(不是NMDA,NMDA是麩胺酸受體)。故最不適當為D。","options":{"A":"抑制血清素再回收,正確。","B":"結構類似安非他命,正確。","C":"可能引起高熱症,正確。","D":"正確(為最不適當):搖頭丸簡稱MDMA非NMDA。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-34":{"quick":"不屬於類鴉片戒斷症候群的是「體溫過低」，故選A。","detail":{"background":"類鴉片(opioid)戒斷症候群:噁心嘔吐(B)、顫抖(C)、流鼻涕流淚(D)、立毛(雞皮疙瘩)、瞳孔放大、腹瀉、肌肉骨骼痛、焦慮、「發燒/體溫『升高』」。題問「不屬於」者——「體溫『過低』(A)」與戒斷相反(戒斷是體溫升高、自律過度興奮)。故不屬於者為體溫過低(A)。","options":{"A":"正確(為非戒斷症狀):戒斷是體溫升高非過低。","B":"噁心嘔吐是戒斷症狀。","C":"顫抖是戒斷症狀。","D":"流鼻涕是戒斷症狀。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-33":{"quick":"無法改善幼兒ADHD的是theophylline，故選D。","detail":{"background":"注意力不足過動症(ADHD)用藥:methylphenidate(C,利他能,中樞興奮劑)、dextroamphetamine(B,安非他命類興奮劑)、atomoxetine(A,選擇性正腎上腺素回收抑制劑,非興奮劑)。而「Theophylline(D)」是「茶鹼(支氣管擴張劑,治氣喘)」,「不用於ADHD」。故無法改善ADHD者為theophylline(D)。","options":{"A":"atomoxetine治ADHD。","B":"dextroamphetamine治ADHD。","C":"methylphenidate治ADHD。","D":"正確:theophylline是氣喘藥,不治ADHD。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-32":{"quick":"活化褪黑激素受體的安眠藥是ramelteon，故選D。","detail":{"background":"「Ramelteon(D)」是「褪黑激素(melatonin)受體致效劑」——活化MT1/MT2褪黑激素受體調節晝夜節律助眠,無成癮性。故活化褪黑激素受體者為ramelteon(D)。zolpidem(Z-drug,GABA-A)、suvorexant(orexin拮抗劑)、temazepam(苯二氮平)機轉不同。故選D。","options":{"A":"zolpidem作用GABA-A受體。","B":"suvorexant是orexin受體拮抗劑。","C":"temazepam是苯二氮平(GABA-A)。","D":"正確:ramelteon活化褪黑激素受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-33":{"quick":"不作為躁鬱症治療的是loratadine，故選C。","detail":{"background":"躁鬱症(雙極性情緒障礙)的情緒穩定劑:lithium(B,鋰鹽,經典)、carbamazepine(A,抗癲癇兼情緒穩定)、valproic acid(D,丙戊酸,情緒穩定)。而「Loratadine(C)」是「第二代抗組織胺(治過敏)」,「不用於躁鬱症」。故不作躁鬱症治療者為loratadine(C)。","options":{"A":"carbamazepine是情緒穩定劑(躁鬱)。","B":"lithium是躁鬱症經典用藥。","C":"正確:loratadine是抗組織胺,不治躁鬱症。","D":"valproic acid是情緒穩定劑(躁鬱)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-32":{"quick":"對酒精成癮治療沒幫助的是acetaminophen，故選C。","detail":{"background":"戒酒癮藥物:naltrexone(A,鴉片拮抗,減渴求)、acamprosate(B,調節麩胺酸/GABA,減渴求)、disulfiram(D,抑制乙醛脫氫酶,嫌惡療法)。而「Acetaminophen(C,普拿疼/乙醯胺酚)」是「解熱鎮痛藥」,「對戒酒癮沒有幫助」(且酒精+acetaminophen增加肝毒性)。故沒幫助者為acetaminophen(C)。","options":{"A":"naltrexone戒酒癮。","B":"acamprosate戒酒癮。","C":"正確:acetaminophen是解熱鎮痛藥,對戒酒癮無幫助。","D":"disulfiram戒酒癮(嫌惡療法)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-33":{"quick":"局麻併用腎上腺素目的是使局部血管收縮，故選A。","detail":{"background":"局部麻醉劑併用「腎上腺素」的目的是「使局部血管收縮(A)」——減少局麻劑被血流帶走,延長麻醉作用時間、減少全身吸收與毒性、減少術區出血。故目的為局部血管收縮(A)。(末端肢體禁用。)故選A。","options":{"A":"正確:局麻併用腎上腺素使局部血管收縮(延長作用)。","B":"是減少吸收非增加。","C":"非中樞止痛機轉。","D":"非減少過敏。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-32":{"quick":"不屬於毒蕈鹼拮抗劑適應症的是青光眼，故選C。","detail":{"background":"毒蕈鹼(muscarinic)拮抗劑(抗膽鹼藥,如atropine、oxybutynin、benztropine)的臨床適應:膀胱痙攣/過動(A,oxybutynin)、帕金森氏症(B,benztropine減少相對過多的乙醯膽鹼)、消化道痙攣(D,解痙)、散瞳檢查、術前減少分泌。而「青光眼(C)」是抗膽鹼藥的「禁忌」(散瞳升眼壓),「不是」其適應症。故不屬於適應症者為青光眼(C)。","options":{"A":"膀胱痙攣是抗膽鹼藥適應症。","B":"帕金森氏症是抗膽鹼藥適應症。","C":"正確:青光眼是抗膽鹼藥禁忌,非適應症。","D":"消化道痙攣是抗膽鹼藥適應症。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-33":{"quick":"嗎啡止痛主要活化μ-opioid受體，故選A。","detail":{"background":"嗎啡(morphine)的止痛作用主要是活化「μ(mu)-opioid受體」(A)——μ受體介導止痛、欣快、呼吸抑制、縮瞳、便祕、依賴。κ、δ受體也參與止痛但嗎啡主要作用於μ。故嗎啡止痛主要活化μ受體(A)。NMDA是麩胺酸受體(非鴉片)。故選A。","options":{"A":"正確:嗎啡止痛主要活化μ-opioid受體。","B":"δ受體非嗎啡主要作用。","C":"κ受體非嗎啡主要作用(那是pentazocine)。","D":"NMDA是麩胺酸受體,非鴉片受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-34":{"quick":"治帕金森藥中最不易進入腦的是carbidopa，故選B。","detail":{"background":"治帕金森藥中,「Carbidopa(B)」「不易進入腦(不過血腦障壁)」——這正是它的設計目的:carbidopa只在「周邊」抑制DOPA脫羧酶,使levodopa更多進入腦,而carbidopa本身留在周邊。pramipexole、benztropine、amantadine皆可進入中樞作用。故最不易進入腦者為carbidopa(B)。","options":{"A":"pramipexole進入中樞(多巴胺致效)。","B":"正確:carbidopa不過血腦障壁,最不易進入腦。","C":"benztropine進入中樞(抗膽鹼)。","D":"amantadine進入中樞。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-36":{"quick":"MAC錯誤敘述為C：效價與MAC成「反比」非正比，故選C。","detail":{"background":"最低肺泡濃度(MAC):A「量化吸入麻醉劑的效價(potency)」(正確);B「以混合氣體中達某作用所需的氣體百分比表示」(正確);C「效價與MAC成『正比』」錯——效價與MAC成「『反比』」(MAC越小效價越強);D「酒精成癮者MAC較高」(正確,耐受性使所需濃度增加)。故錯誤為C。","options":{"A":"MAC量化效價,正確。","B":"以氣體百分比表示,正確。","C":"正確(為錯誤敘述):效價與MAC成「反比」非正比。","D":"酒精成癮者MAC較高(耐受),正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-56":{"quick":"Clonidine活化中樞「α2」受體降血壓，故選B。","detail":{"background":"Clonidine降血壓是「活化中樞神經的α2腎上腺素受體」——刺激腦幹血管運動中樞的α2受體,「減少交感神經輸出」,使周邊血管阻力與心輸出降低、血壓下降。故為中樞α2受體(B)。突然停藥會反彈性高血壓。methyldopa機轉類似(α2)。故選B。","options":{"A":"α1興奮反而升壓(周邊血管收縮)。","B":"正確:clonidine活化中樞α2受體降血壓。","C":"非β1。","D":"非β2。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-57":{"quick":"Clopidogrel阻斷血小板表面的「ADP受體」，故選B。","detail":{"background":"Clopidogrel是抗血小板藥,機轉是「不可逆阻斷血小板表面的ADP受體(P2Y12)」——ADP無法活化血小板、抑制GPIIb/IIIa活化與聚集,預防動脈血栓(冠心病、中風)。故阻斷ADP受體(B)。aspirin抑制COX-1(thromboxane);abciximab阻斷GPIIb/IIIa。故選B。","options":{"A":"非阻斷凝血酶受體。","B":"正確:clopidogrel阻斷血小板ADP受體(P2Y12)。","C":"GPIIb/IIIa抑制是abciximab。","D":"非阻斷膠原蛋白受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-58":{"quick":"易產生視力模糊耳鳴頭痛昏眩（金雞納中毒）的抗心律不整藥是Quinidine，故選D。","detail":{"background":"「Quinidine(奎尼丁,Class IA)」的特徵副作用是「金雞納中毒(cinchonism)」——視力模糊、耳鳴、頭痛、昏眩、噁心,以及QT延長、torsades de pointes。故產生此組副作用者為quinidine(D)。Amiodarone(甲狀腺/肺/角膜)、Metoprolol(β阻斷)、Adenosine(短暫潮紅胸悶)副作用不同。故選D。","options":{"A":"Amiodarone致甲狀腺/肺/角膜副作用。","B":"Metoprolol是β阻斷劑。","C":"Adenosine短暫潮紅胸悶。","D":"正確:Quinidine致金雞納中毒(視力模糊耳鳴頭痛昏眩)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-53":{"quick":"Benzodiazepine不適合用於「抗利尿」，故選D。","detail":{"background":"苯二氮平類(benzodiazepine)透過增強GABA作用,用於:抗焦慮(A)、鎮靜安眠(B)、抗癲癇(C,如diazepam、lorazepam止癲癇重積)、肌肉鬆弛、酒精戒斷。而「抗利尿(D)」不是其作用(抗利尿是ADH/desmopressin)。故不適合的用途為抗利尿(D)。","options":{"A":"抗焦慮是BZD用途。","B":"鎮靜安眠是BZD用途。","C":"抗癲癇是BZD用途。","D":"正確:抗利尿不是BZD用途。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-57":{"quick":"不會產生低血鉀的利尿劑是spironolactone（保鉀），故選B。","detail":{"background":"「Spironolactone(B)」是「保鉀利尿劑(醛固酮拮抗劑)」——抑制遠曲小管/集尿管的醛固酮作用,「保留鉀(不致低血鉀,甚至高血鉀)」。而hydrochlorothiazide(A,thiazide)、furosemide(C,環利尿劑)、acetazolamide(D,碳酸酐酶抑制)皆會「排鉀致低血鉀」。故不致低血鉀者為spironolactone(B)。","options":{"A":"thiazide排鉀致低血鉀。","B":"正確:spironolactone是保鉀利尿劑,不致低血鉀。","C":"furosemide排鉀致低血鉀。","D":"acetazolamide排鉀致低血鉀。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-58":{"quick":"外用可促進毛髮生長的降血壓藥是minoxidil，故選D。","detail":{"background":"「Minoxidil(D)」是強力血管擴張降血壓藥(開鉀通道),其副作用之一是「多毛(hypertrichosis)」,故被開發成「外用生髮劑(治雄性禿)」。故外用促毛髮生長者為minoxidil(D)。hydralazine、clonidine、lisinopril無此生髮作用。故選D。","options":{"A":"hydralazine是血管擴張劑但無生髮。","B":"clonidine是中樞α2致效劑。","C":"lisinopril是ACE抑制劑。","D":"正確:minoxidil外用促毛髮生長。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-51":{"quick":"作用於交感末梢促使norepinephrine排空的是reserpine，故選A。","detail":{"background":"「Reserpine(蛇根鹼,A)」作用於「中樞與周邊交感神經末梢」——「抑制囊泡單胺運輸體(VMAT)」,使正腎上腺素(及多巴胺、血清素)無法儲存於囊泡而被代謝耗竭(「排空depletion」),降低交感活性而降血壓(副作用憂鬱)。故促使NE排空者為reserpine(A)。phentolamine(α阻斷)、methyldopa與clonidine(中樞α2)機轉不同。故選A。","options":{"A":"正確:reserpine耗竭(排空)交感末梢的正腎上腺素。","B":"phentolamine是α受體阻斷劑。","C":"methyldopa是中樞α2致效劑(假性傳導物質)。","D":"clonidine是中樞α2致效劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-56":{"quick":"血管收縮素II受體阻斷劑是losartan，故選D。","detail":{"background":"「Losartan(D)」是「血管收縮素II(angiotensin II)受體阻斷劑(ARB)」——阻斷AT1受體,使血管收縮素II無法收縮血管、無法刺激醛固酮,降血壓(且不致ACE抑制劑的乾咳)。故為ARB者為losartan(D)。nifedipine(鈣通道阻斷)、aliskiren(腎素抑制)、propranolol(β阻斷)機轉不同。故選D。","options":{"A":"nifedipine是鈣通道阻斷劑。","B":"aliskiren是腎素抑制劑。","C":"propranolol是β阻斷劑。","D":"正確:losartan是ARB(血管收縮素II受體阻斷劑)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-57":{"quick":"主要降血漿LDL的降血脂藥是statins，故選D。","detail":{"background":"「Statins(他汀類,D)」是「HMG-CoA還原酶抑制劑」——抑制肝臟膽固醇合成、上調LDL受體,「最主要降低血漿LDL(壞膽固醇)濃度」(也略降三酸甘油脂、略升HDL),是降LDL與心血管預防的第一線藥。故主要降LDL者為statins(D)。fibrates(主降三酸甘油脂)、niacin(主升HDL)、膽固醇吸收抑制劑(ezetimibe,輔助)。故選D。","options":{"A":"fibrates主要降三酸甘油脂。","B":"niacin主要升HDL。","C":"膽固醇吸收抑制劑(ezetimibe)是輔助。","D":"正確:statins主要降低LDL。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-58":{"quick":"硝化甘油的最主要用途是緩解心絞痛，故選B。","detail":{"background":"硝化甘油(nitroglycerin,有機硝酸鹽)經釋放NO使血管平滑肌舒張,「最主要臨床用途是緩解(與預防)『心絞痛(angina)』」——主要擴張靜脈(減少前負荷、降低心肌耗氧),舌下給藥快速緩解急性心絞痛。故主要用途為緩解心絞痛(B)。故選B。","options":{"A":"非緩解頭痛(反而可能致頭痛副作用)。","B":"正確:硝化甘油主要緩解心絞痛。","C":"非緩解情緒。","D":"非緩解骨骼肌痙攣。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-61":{"quick":"錯誤敘述為C：高濃度碘液「抑制」甲狀腺亢進而非加劇，故選C。","detail":{"background":"甲狀腺藥:A「thioamide類(PTU、methimazole)治甲亢」(正確);B「propylthiouracil(PTU)防止T4周邊轉T3」(正確);C「高濃度碘液會加劇甲亢」錯——「高濃度碘(Lugol液)反而『抑制』甲狀腺素釋放(Wolff-Chaikoff效應)」,用於甲狀腺風暴或術前準備;D「propranolol拮抗甲狀腺素過高引起的心律不整/心搏過速」(正確)。故錯誤為C。","options":{"A":"thioamide治甲亢,正確。","B":"PTU防T4轉T3,正確。","C":"正確(為錯誤敘述):高濃度碘「抑制」甲亢非加劇。","D":"propranolol控制甲亢心律不整,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-56":{"quick":"預防心肌梗塞後突發性心律不整最適宜的是propranolol，故選B。","detail":{"background":"心肌梗塞後使用「β腎上腺素受體阻斷劑(propranolol/metoprolol,B)」可「降低交感過度刺激,減少突發性心律不整(心室顫動)與猝死,並降低再梗塞率與死亡率」(MI後標準用藥)。故預防MI後心律不整最適宜者為propranolol(B)。amiodarone、dofetilide(Class III)、verapamil(Class IV)非MI後一線預防。故選B。","options":{"A":"amiodarone用於危及生命的心律不整,非MI後一線預防。","B":"正確:β阻斷劑(propranolol)預防MI後心律不整、降死亡率。","C":"dofetilide是Class III。","D":"verapamil是鈣通道阻斷劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-57":{"quick":"化學結構類似性激素、致男性女乳症的利尿劑是spironolactone，故選D。","detail":{"background":"「Spironolactone(D)」是「醛固酮拮抗劑(保鉀利尿劑)」,化學結構「類似類固醇(性激素)」,長期使用會干擾性激素受體,引起「男性女乳症(gynecomastia)、性功能障礙、月經不規則」。故致男性女乳症者為spironolactone(D)。eplerenone(選擇性醛固酮拮抗)無此副作用。故選D。","options":{"A":"chlorthalidone是thiazide類。","B":"mannitol是滲透性利尿劑。","C":"furosemide是環利尿劑。","D":"正確:spironolactone結構類性激素,致男性女乳症。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-53":{"quick":"MAO抑制劑併用高tyramine食物致「高血壓」，故選D。","detail":{"background":"單胺氧化酶(MAO)抑制劑(抗憂鬱藥)若併用「含高酪胺(tyramine)的食物」(陳年起司、紅酒、醃製品)——酪胺平時被腸道MAO代謝,MAO被抑制後酪胺大量吸收,促使儲存的正腎上腺素大量釋放,引起「高血壓危象(hypertensive crisis)」(劇烈頭痛、高血壓、出血)。故為高血壓(D),稱「起司效應(cheese reaction)」。故選D。","options":{"A":"非低血糖。","B":"非甲狀腺功能高。","C":"非帕金森氏症。","D":"正確:MAO抑制劑+高酪胺食物致高血壓危象。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-54":{"quick":"巴比妥類的主要作用標的是GABA受體，故選C。","detail":{"background":"巴比妥類(barbiturates)鎮靜安眠藥的主要作用標的是「GABA-A受體」——增強GABA使氯離子通道開啟「時間延長」(與苯二氮平增加開啟「頻率」不同),抑制神經興奮,產生鎮靜、安眠、抗癲癇、麻醉。高劑量可直接開啟氯通道(故安全範圍窄、過量致命)。故作用標的為GABA受體(C)。故選C。","options":{"A":"非腺苷酸受體(那是咖啡因)。","B":"非多巴胺受體。","C":"正確:巴比妥類作用於GABA受體。","D":"非鈉離子通道。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-56":{"quick":"乾咳是ACE抑制劑的常見副作用，故選D。","detail":{"background":"「乾咳(dry cough)」是「血管張力素轉化酶抑制劑(ACE inhibitor,如captopril、lisinopril,D)」的常見副作用——ACE抑制劑使「緩激肽(bradykinin)累積」(ACE也代謝緩激肽),緩激肽刺激氣道致乾咳(及血管性水腫)。改用ARB(losartan)可避免乾咳。故乾咳是ACE抑制劑副作用(D)。故選D。","options":{"A":"利尿劑致電解質異常,非乾咳。","B":"α1阻斷劑致姿勢性低血壓。","C":"鈣通道阻斷劑致水腫、潮紅。","D":"正確:ACE抑制劑致乾咳(緩激肽累積)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-57":{"quick":"阻礙脂溶性維生素吸收的降血脂藥是colestipol（膽酸結合樹脂），故選B。","detail":{"background":"「Colestipol(B)」是「膽酸結合樹脂(bile acid sequestrant)」降血脂藥——在腸道結合膽酸促其排泄、降LDL,但會「阻礙脂溶性維生素(A、D、E、K)與其他藥物的吸收」(及致便祕、腹脹)。故阻礙脂溶性維生素吸收者為colestipol(B)。lovastatin(statin)、niacin、gemfibrozil機轉不同。故選B。","options":{"A":"lovastatin是statin類。","B":"正確:colestipol(膽酸結合樹脂)阻礙脂溶性維生素吸收。","C":"niacin是菸鹼酸。","D":"gemfibrozil是fibrate類。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-53":{"quick":"錯誤敘述為C：維生素B6會「降低」levodopa藥效（非增強），故選C。","detail":{"background":"Levodopa藥物交互作用:A「與Phenelzine(MAO抑制劑)併用易致高血壓危象」(正確);B「Selegiline(MAO-B抑制劑)可降低levodopa劑量」(正確,減少多巴胺代謝);C「維生素B6可增強levodopa藥效」錯——「維生素B6(pyridoxine)是周邊脫羧酶的輔因子,反而『加速』levodopa在周邊轉成多巴胺、『降低』進入腦的量、削弱藥效」(故服levodopa者應避免大量B6,除非已合用carbidopa);D「Entacapone(COMT抑制劑)增加levodopa進腦量」(正確)。故錯誤為C。","options":{"A":"與MAO抑制劑併用致高血壓危象,正確。","B":"Selegiline可降低levodopa劑量,正確。","C":"正確(為錯誤敘述):B6「降低」levodopa藥效非增強。","D":"Entacapone增加進腦量,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-56":{"quick":"血管收縮素第一型（AT1）受體競爭性拮抗劑是Losartan，故選C。","detail":{"background":"「Losartan(C)」是「血管收縮素II第一型(AT1)受體的競爭性拮抗劑(ARB)」——阻斷AT1受體降血壓。Captopril(ACE抑制劑,抑制血管收縮素II生成)、Dobutamine(β1致效)、Milrinone(磷酸雙酯酶III抑制劑)機轉不同。故AT1受體拮抗劑為losartan(C)。故選C。","options":{"A":"Captopril是ACE抑制劑(抑制生成,非阻斷受體)。","B":"Dobutamine是β1致效劑。","C":"正確:Losartan是AT1受體競爭性拮抗劑。","D":"Milrinone是磷酸雙酯酶III抑制劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-57":{"quick":"提升HDL藥效最強的降血脂藥是Niacin，故選C。","detail":{"background":"「Niacin(菸鹼酸,維生素B3,C)」是「提升血漿HDL(好膽固醇)藥效最強」的降血脂藥(也降三酸甘油脂與LDL),但副作用潮紅(prostaglandin介導,可先服aspirin減輕)、高尿酸、高血糖。故升HDL最強者為niacin(C)。statin(fluvastatin)、fibrate(gemfibrozil)、ezetimibe升HDL效果不及niacin。故選C。","options":{"A":"Fluvastatin(statin)主降LDL。","B":"Gemfibrozil(fibrate)主降三酸甘油脂。","C":"正確:Niacin升HDL藥效最強。","D":"Ezetimibe是膽固醇吸收抑制劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-63":{"quick":"毛地黃錯誤敘述為C：毛地黃「抑制」Na-K pump而非興奮，故選C。","detail":{"background":"毛地黃(digitalis/digoxin):A「增加心肌收縮力,治心衰竭」(正確);B「治療範圍狹窄(治療指數窄,需監測血中濃度)」(正確);C「興奮心肌Na⁺-K⁺ pump達強心」錯——毛地黃是「『抑制』Na⁺-K⁺-ATPase(幫浦)」,使細胞內Na⁺升高、經Na-Ca交換使細胞內Ca²⁺增加,增強收縮力;D「中毒致心律不整可給lidocaine改善」(正確)。故錯誤為C(是抑制而非興奮Na-K pump)。","options":{"A":"增加心肌收縮力治心衰,正確。","B":"治療範圍狹窄,正確。","C":"正確(為錯誤敘述):毛地黃「抑制」Na-K pump非興奮。","D":"中毒心律不整可給lidocaine,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-50":{"quick":"治攝護腺肥大且對血壓影響小的是tamsulosin（依官方為α1A選擇性），故選D。","detail":{"background":"良性攝護腺肥大(BPH)用「α1腎上腺素受體阻斷劑」鬆弛攝護腺與膀胱頸平滑肌、改善排尿。「Tamsulosin(D,選擇性α1A受體阻斷)」對攝護腺選擇性高、「對血壓影響較小」(非選擇性α1阻斷如prazosin、terazosin會明顯降血壓、姿勢性低血壓)。故對血壓影響小者為tamsulosin(D)。(此題官方選D。)Phenylephrine(α致效)、Phentolamine與Phenoxybenzamine(非選擇性α阻斷)不符。故選D。","options":{"A":"Phenylephrine是α致效劑(收縮,不治BPH)。","B":"Phentolamine是非選擇性α阻斷。","C":"Phenoxybenzamine是非選擇性不可逆α阻斷。","D":"正確:tamsulosin(α1A選擇性)治BPH且對血壓影響小。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-54":{"quick":"lidocaine的臨床用途是抗心律不整，故選C。","detail":{"background":"Lidocaine(利多卡因)除局部麻醉外,也是「Class IB『抗心律不整』藥」——阻斷鈉通道,用於「心室心律不整(尤其急性心肌梗塞後的室性心律不整)」。故lidocaine用途為抗心律不整(C,及局部麻醉)。它非全身麻醉、非抗癲癇、非抗心絞痛。故選C。","options":{"A":"lidocaine是局部麻醉非全身麻醉。","B":"非抗癲癇。","C":"正確:lidocaine抗心律不整(Class IB)。","D":"非抗心絞痛。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-56":{"quick":"血脂尿酸血鈣上升、血鉀下降的利尿劑是Hydrochlorothiazide，故選A。","detail":{"background":"「Hydrochlorothiazide(thiazide類,A)」的代謝副作用記憶「hyperGLUC」:高血糖(Glycemia)、高血脂(Lipid)、高尿酸(Uric acid)、高血鈣(Calcium),以及低血鉀、低血鈉。題述「血脂↑、尿酸↑、血鈣↑、血鉀↓」典型符合thiazide(A)。furosemide(環利尿劑)反而「降血鈣」、spironolactone保鉀、acetazolamide致代謝性酸中毒。故選A。","options":{"A":"正確:thiazide致血脂尿酸血鈣上升、血鉀下降。","B":"furosemide降血鈣。","C":"spironolactone保鉀(高血鉀)。","D":"acetazolamide致代謝性酸中毒。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-57":{"quick":"Warfarin影響「維生素K」的功能，故選D。","detail":{"background":"口服抗凝血藥「Warfarin」抑制「維生素K環氧化還原酶」,干擾「維生素K」的循環再生,使「維生素K依賴的凝血因子II、VII、IX、X(及蛋白C、S)」無法羧化活化,達到抗凝血。故影響維生素K(D)。中毒出血時給維生素K逆轉。故選D。","options":{"A":"非維生素A。","B":"非維生素D。","C":"非維生素E。","D":"正確:warfarin影響維生素K(凝血因子II、VII、IX、X)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-58":{"quick":"心衰竭輕微運動呼吸困難但無體液過量，最佳選擇是ACE抑制劑，故選D。","detail":{"background":"鬱血性心衰竭治療,「血管收縮素轉換酶抑制劑(ACE inhibitor,D)」是「改善預後、降低死亡率」的基石用藥(減少後負荷與前負荷、抑制心室重塑),適用於各期心衰竭(包括無明顯體液過量者)。利尿劑(B)主要用於有「體液過量(水腫/鬱血)」症狀者(本題無體液過量,故非利尿劑);毛地黃(A)增強收縮力但不降死亡率;β阻斷劑(C)用於穩定期。故最佳選擇為ACE抑制劑(D)。","options":{"A":"毛地黃增強收縮力但不降死亡率。","B":"利尿劑用於有體液過量者(本題無)。","C":"β阻斷劑用於穩定期。","D":"正確:ACE抑制劑改善心衰竭預後,適用無體液過量者。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-55":{"quick":"Thiazide利尿劑副作用「不」包括血鉀上升，故選A。","detail":{"background":"Thiazide利尿劑副作用(hyperGLUC):血中尿酸上升(B)、血中膽固醇/血脂上升(C)、血糖上升(D)、血鈣上升。電解質方面致「低血鉀(hypokalemia,血鉀『下降』)」。題問「不包括上升」者——「血鉀(A)」是「下降」而非上升。故不包括上升者為血鉀(A)。","options":{"A":"正確(為非上升):thiazide致血鉀「下降」非上升。","B":"血中尿酸上升是thiazide副作用。","C":"血中膽固醇上升是thiazide副作用。","D":"血糖上升是thiazide副作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-57":{"quick":"急性上心室心律不整首選藥是Adenosine，故選B。","detail":{"background":"「Adenosine(腺苷,B)」是「陣發性上心室心搏過速(PSVT)的首選藥」——靜脈快速推注,活化A1受體抑制房室結傳導,終止折返性心律不整;半衰期極短(數秒)。故急性上心室心律不整首選為adenosine(B)。Diltiazem、Amiodarone、Quinidine非首選。故選B。","options":{"A":"Diltiazem是次選(鈣通道阻斷)。","B":"正確:adenosine是PSVT首選藥。","C":"Amiodarone非PSVT首選。","D":"Quinidine非PSVT首選。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-57":{"quick":"Darbepoetin錯誤敘述為A：它是「蛋白質生物製劑」而非化學合成小分子，故選A。","detail":{"background":"Darbepoetin是治療貧血(如腎性貧血)的藥:A「是化學合成的小分子藥物」錯——它是「紅血球生成素(EPO)的『長效蛋白質(生物製劑)類似物』」(非小分子);B「起效比EPO慢」(因刺激紅血球生成需時)正確;C「半衰期比EPO『長』」正確(故可較少次數給藥);D「副作用包括高血壓」正確。故錯誤為A(它是蛋白質生物製劑非小分子)。","options":{"A":"正確(為錯誤敘述):Darbepoetin是蛋白質生物製劑,非化學合成小分子。","B":"起效比EPO慢,正確。","C":"半衰期比EPO長,正確。","D":"副作用含高血壓,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-58":{"quick":"治CHF首選但有心室纖維顫動副作用的是Digoxin，故選A。","detail":{"background":"「Digoxin(毛地黃,A)」用於鬱血性心臟衰竭(CHF,增加收縮力)與心房顫動控制心率,但「治療範圍窄,中毒時可引發各種心律不整(包括心室顫動)」。故CHF用藥但有心室顫動副作用者為digoxin(A)。Dobutamine、Dopamine(急性)、Quinidine(抗心律不整)不符題意組合。故選A。","options":{"A":"正確:digoxin治CHF但中毒可致心室顫動。","B":"dobutamine用於急性心衰(β1)。","C":"dopamine用於急性低血壓/心衰。","D":"quinidine是抗心律不整藥。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-55":{"quick":"陣發性心室上心搏過速（PSVT）首選藥是Adenosine，故選A。","detail":{"background":"「Adenosine(A)」是「陣發性上心室心搏過速(PSVT)」的首選藥——靜脈快速推注,經A1受體抑制房室結傳導終止折返,半衰期數秒。故PSVT首選為adenosine(A)。Lidocaine、Mexiletine、Flecainide作用於心室,非PSVT首選。故選A。","options":{"A":"正確:adenosine是PSVT首選藥。","B":"Lidocaine用於室性心律不整。","C":"Mexiletine用於室性心律不整。","D":"Flecainide用於室性心律不整(致心律不整風險)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-57":{"quick":"活化中樞α2減少交感的降血壓藥是Clonidine，故選A。","detail":{"background":"「Clonidine(A)」降血壓機轉是「活化中樞神經α2腎上腺素受體」——抑制延腦交感輸出、減少交感活性,使血管阻力與心輸出下降。故為clonidine(A)。Prazosin(α1阻斷)、Propranolol(β阻斷)、Nifedipine(鈣通道阻斷)機轉不同。故選A。","options":{"A":"正確:clonidine活化中樞α2減少交感降血壓。","B":"Prazosin是α1阻斷劑。","C":"Propranolol是β阻斷劑。","D":"Nifedipine是鈣通道阻斷劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-50":{"quick":"急性心衰增加心輸出量的交感藥是Dobutamine，故選B。","detail":{"background":"「Dobutamine(B)」是「β1腎上腺素受體選擇性致效劑」——增加心肌收縮力與心輸出量,用於「急性鬱血性心衰竭(代償失調)」短期支持。故增加心輸出量者為dobutamine(B)。Metaproterenol(β2,支氣管)、Carvedilol(α/β阻斷)、Prazosin(α1阻斷)不符。故選B。","options":{"A":"Metaproterenol是β2致效劑(支氣管)。","B":"正確:dobutamine(β1致效)增加心輸出量治急性心衰。","C":"Carvedilol是α/β阻斷劑。","D":"Prazosin是α1阻斷劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-54":{"quick":"Benzodiazepine活化GABA-A受體造成過極化，故選C。","detail":{"background":"苯二氮平類(benzodiazepine)機轉是「活化GABA-A受體」——增強GABA使氯離子通道開啟頻率增加、Cl⁻內流造成細胞「過極化(hyperpolarization)」,降低神經興奮性(抗焦慮、鎮靜、安眠、抗痙攣)。故為活化GABA-A受體過極化(C)。故選C。","options":{"A":"非抑制多巴胺。","B":"非阻斷鉀通道。","C":"正確:BZD活化GABA-A受體造成過極化。","D":"非抑制腺苷。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-56":{"quick":"減少尿路結石及骨質疏鬆的利尿劑是Hydrochlorothiazide，故選C。","detail":{"background":"「Hydrochlorothiazide(thiazide類,C)」會「增加遠曲小管鈣再吸收→『減少尿鈣排泄』」,故可「減少含鈣尿路結石的復發」,且因增加血鈣與鈣保留,長期可能「減少骨質疏鬆/骨折」。故減少尿路結石與骨鬆者為thiazide(C)。furosemide(環利尿劑)反而增加尿鈣(致結石)。故選C。","options":{"A":"Acetazolamide可能增加結石風險。","B":"Spironolactone是保鉀利尿劑。","C":"正確:thiazide減少尿鈣、降低結石與骨鬆。","D":"Furosemide增加尿鈣排泄。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-57":{"quick":"Argatroban正確敘述為A：經注射給藥（直接凝血酶抑制劑），故選A。","detail":{"background":"「Argatroban(A)」是「直接凝血酶(thrombin/IIa)抑制劑」——A「經由注射(靜脈)給藥」正確;B錯(它抑制「凝血酶IIa」而非第十因子Xa);C錯(它「直接」抑制凝血酶,「不需」antithrombin III,與肝素不同);D錯(argatroban主要「經肝臟代謝」,適用腎功能不全者,而非腎排除)。故正確為A。","options":{"A":"正確:argatroban經注射給藥。","B":"是抑制凝血酶IIa,非第十因子Xa。","C":"直接抑制凝血酶,不需antithrombin III。","D":"主要經肝臟代謝,非腎排除。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-58":{"quick":"緊急降血壓中作用持續時間最短的是Nitroprusside，故選C。","detail":{"background":"「Nitroprusside(硝普鈉,C)」是強效靜脈血管擴張劑(釋放NO),「起效快、作用持續時間最短(數分鐘)」,須持續輸注並嚴密監測血壓,用於高血壓急症。故作用最短者為nitroprusside(C)。Nicardipine、Fenoldopam、Labetalol作用較長。(nitroprusside長期可致氰化物中毒。)故選C。","options":{"A":"Nicardipine作用較長。","B":"Fenoldopam作用較長。","C":"正確:nitroprusside作用持續時間最短。","D":"Labetalol作用較長。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-57":{"quick":"降低第四期去極化、減少竇房結自主性的是propranolol，故選D。","detail":{"background":"「Propranolol(β阻斷劑,Class II,D)」抑制交感對竇房結的刺激,「降低動作電位第4期的舒張期去極化(自動去極化)斜率」,「減少竇房結的自主性(自律性)與心率」。故降低第4期去極化者為propranolol(D)。quinidine(IA)、sotalol(III)、amiodarone(III)主要影響動作電位時程/鉀通道。故選D。","options":{"A":"quinidine是IA(鈉鉀通道)。","B":"sotalol是III(兼β阻斷,但題指降第4期者)。","C":"amiodarone是III(多通道)。","D":"正確:propranolol(β阻斷)降第4期去極化、減少竇房結自主性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-58":{"quick":"有血管擴張作用且可用於BPH的降血壓藥是prazosin，故選A。","detail":{"background":"「Prazosin(A)」是「α1腎上腺素受體阻斷劑」——阻斷血管α1致血管擴張降血壓,同時鬆弛攝護腺與膀胱頸平滑肌,「可用於良性前列腺肥大(BPH)改善排尿」。故兼具血管擴張與治BPH者為prazosin(A)。nadolol(β阻斷)、verapamil(鈣通道)、diazoxide(開鉀通道)不符。故選A。","options":{"A":"正確:prazosin(α1阻斷)血管擴張且治BPH。","B":"nadolol是β阻斷劑。","C":"verapamil是鈣通道阻斷劑。","D":"diazoxide是開鉀通道血管擴張劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-50":{"quick":"同時阻斷β與α1受體的是Carvedilol，故選A。","detail":{"background":"「Carvedilol(A)」是「同時阻斷β(非選擇性)與α1受體」的藥——β阻斷減少心率與收縮力、α1阻斷使血管擴張,用於高血壓與心衰竭。故同時阻斷α1與β者為carvedilol(A,labetalol亦同)。Propranolol(純β)、Acebutolol(β1)、Metaproterenol(β2致效)不符。故選A。","options":{"A":"正確:carvedilol同時阻斷β與α1受體。","B":"Propranolol是純β阻斷劑。","C":"Acebutolol是β1選擇性阻斷劑。","D":"Metaproterenol是β2致效劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-58":{"quick":"同時阻斷α與β腎上腺素受體的降血壓藥是Labetalol，故選D。","detail":{"background":"「Labetalol(D)」「同時阻斷α1與β腎上腺素受體」——α1阻斷血管擴張、β阻斷減少心率收縮力,用於高血壓(含妊娠高血壓、高血壓急症)。故同時阻斷α與β者為labetalol(D,carvedilol亦同)。Metoprolol、Atenolol(β1選擇性)、Propranolol(非選擇性β)皆純β阻斷。故選D。","options":{"A":"Metoprolol是β1選擇性。","B":"Atenolol是β1選擇性。","C":"Propranolol是非選擇性β阻斷。","D":"正確:labetalol同時阻斷α與β受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-57":{"quick":"Class III兼具β阻斷作用的是Sotalol，故選B。","detail":{"background":"「Sotalol(B)」是「Class III抗心律不整藥(阻斷鉀通道延長動作電位)」,「同時兼具β腎上腺素受體阻斷(Class II)作用」。故Class III兼β阻斷者為sotalol(B)。Metoprolol(純Class II β阻斷)、Verapamil(Class IV鈣通道)、Digoxin(毛地黃)不符。故選B。","options":{"A":"Metoprolol是Class II(純β阻斷)。","B":"正確:sotalol是Class III兼β阻斷。","C":"Verapamil是Class IV。","D":"Digoxin是毛地黃。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-58":{"quick":"利尿劑錯誤敘述為C：Spironolactone是保鉀（致「高」血鉀非低血鉀），故選C。","detail":{"background":"利尿劑:A「Acetazolamide(碳酸酐酶抑制)會產生代謝性酸中毒(排HCO3⁻)」(正確);B「Triamterene(保鉀)可產生代謝性酸中毒」(正確,保鉀利尿劑致高血鉀與代謝性酸中毒);C「Spironolactone會產生低血鉀」錯——spironolactone是「保鉀利尿劑(醛固酮拮抗)」,致「高血鉀(hyperkalemia)」而非低血鉀;D「Furosemide(環利尿)可能產生低血鉀」(正確)。故錯誤為C。","options":{"A":"Acetazolamide致代謝性酸中毒,正確。","B":"Triamterene(保鉀)可致代謝性酸中毒,正確。","C":"正確(為錯誤敘述):spironolactone致高血鉀非低血鉀。","D":"Furosemide可致低血鉀,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-55":{"quick":"ACE抑制劑錯誤敘述為D：losartan是「ARB」不屬ACE抑制劑，故選D。","detail":{"background":"ACE抑制劑:A「減少緩激肽(bradykinin)代謝(致緩激肽累積、乾咳)」(正確);B「抑制醛固酮分泌而增加血中K⁺(致高血鉀)」(正確);C「降低全身與肺血管阻力」(正確);D「losartan屬於此類代表藥物」錯——losartan是「血管收縮素II受體阻斷劑(ARB)」,「不屬於ACE抑制劑」(ACE抑制劑代表是captopril、enalapril、lisinopril)。故錯誤為D。","options":{"A":"ACE抑制劑減少緩激肽代謝,正確。","B":"抑制醛固酮增加K⁺,正確。","C":"降低全身與肺血管阻力,正確。","D":"正確(為錯誤敘述):losartan是ARB,非ACE抑制劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-56":{"quick":"Flecainide致命心律不整因「過度抑制鈉通道致心傳導過慢」，故選C。","detail":{"background":"「Flecainide(Class IC)」強力阻斷鈉通道,「過度抑制鈉通道使心臟傳導過慢(QRS增寬)」,易誘發「致命性的折返性心律不整(致心律不整proarrhythmia)」,尤其在有結構性心臟病/心肌梗塞者(CAST試驗顯示增加死亡)。故主因是過度抑制鈉通道致傳導過慢(C)。故選C。","options":{"A":"非抑制鈣通道。","B":"非抑制鉀通道。","C":"正確:flecainide過度抑制鈉通道致傳導過慢、致心律不整。","D":"非抑制鈉鈣交換。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-60":{"quick":"降血壓但不抑制睪固酮的醛固酮拮抗劑是eplerenone，故選B。","detail":{"background":"「Eplerenone(B)」是「選擇性醛固酮受體拮抗劑」——降血壓與治心衰,且「對性激素受體選擇性低、『不抑制睪固酮』、不致男性女乳症」(與spironolactone不同,後者非選擇性、致男性女乳症)。故不抑制睪固酮者為eplerenone(B)。drospirenone(避孕藥成分,有抗礦物皮質素)、fludrocortisone(礦物皮質素致效)不符。故選B。","options":{"A":"spironolactone抑制睪固酮、致男性女乳症。","B":"正確:eplerenone選擇性,不抑制睪固酮。","C":"drospirenone是避孕藥成分。","D":"fludrocortisone是礦物皮質素致效劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-51":{"quick":"毛地黃中毒引發心室顫動的首選藥是Phenytoin，故選A。","detail":{"background":"毛地黃(digitalis)中毒引發的心律不整(包括心室顫動/室性心律不整),「Phenytoin(A)」與lidocaine是治療選擇——它們抑制毛地黃誘發的延遲後去極化、改善傳導,且不過度抑制房室結。故毛地黃中毒心室顫動首選為phenytoin(A)。Nitroglycerin、Hydralazine、Nifedipine不適用於此心律不整。故選A。","options":{"A":"正確:phenytoin治毛地黃中毒引發的心室顫動。","B":"Nitroglycerin是抗心絞痛。","C":"Hydralazine是血管擴張降壓。","D":"Nifedipine是鈣通道阻斷降壓。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-60":{"quick":"β阻斷劑治心律不整是「減慢房室傳導、抑制自主興奮性」，故選A。","detail":{"background":"β腎上腺素受體拮抗劑(Class II)治療心律不整的機轉是「減慢房室結傳導速度、抑制竇房結與異位節律的自主興奮性(自律性)」——藉由阻斷交感對心臟的刺激,降低第4期去極化斜率與房室傳導,控制心率與某些心律不整。故為A。故選A。","options":{"A":"正確:β阻斷劑減慢房室傳導、抑制自主興奮性。","B":"非延長動作電位(那是Class III)。","C":"非抑制竇房結鈉通道。","D":"非活化鉀通道為主機轉。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-61":{"quick":"ACE抑制劑機轉是「減少醛固酮分泌、利尿、降前負荷」，故選D。","detail":{"background":"ACE抑制劑(angiotensin converting enzyme inhibitor):D「減少醛固酮分泌→排鈉利尿→降低心臟『前負荷』,並降低血管阻力(後負荷)」正確。逐項:A錯(它抑制ACE使血管收縮素I無法轉成II,非減少angiotensinogen代謝);B錯(它不直接抑制AT1受體,那是ARB);C錯(它「抑制」血管收縮素II生成但使緩激肽『累積』,非抑制緩激肽代謝→應是減少其代謝使之累積,故C敘述有誤)。故正確為D。","options":{"A":"非減少angiotensinogen代謝。","B":"直接抑制AT1受體是ARB,非ACE抑制劑。","C":"ACE抑制劑使緩激肽累積(減少其代謝),C敘述方向有誤。","D":"正確:減少醛固酮分泌、利尿、降前負荷。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-49":{"quick":"最常用治療BPH的是tamsulosin，故選D。","detail":{"background":"良性前列腺肥大(BPH)最常用「α1腎上腺素受體阻斷劑」鬆弛攝護腺平滑肌改善排尿,「Tamsulosin(D,選擇性α1A)」是常用藥(對攝護腺選擇性高、對血壓影響小)。故治BPH者為tamsulosin(D)。phenylephrine(α致效,反收縮)、phentolamine(非選擇性α阻斷)、dobutamine(β1致效)不符。故選D。","options":{"A":"phenylephrine是α致效劑(收縮)。","B":"phentolamine是非選擇性α阻斷。","C":"dobutamine是β1致效劑(心臟)。","D":"正確:tamsulosin是BPH常用α1阻斷劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-50":{"quick":"嗎啡類「不」常見高血壓（反而低血壓），故選B。","detail":{"background":"嗎啡類(opioids)常見副作用:便祕(A)、呼吸抑制(C)、縮瞳(D,針狀瞳孔)、噁心嘔吐、鎮靜、尿滯留、「低血壓(組織胺釋放、血管擴張)」。題問「不是」常見副作用者——「高血壓(B)」與嗎啡相反(嗎啡致『低』血壓)。故不是者為高血壓(B)。","options":{"A":"便秘是嗎啡常見副作用。","B":"正確(為非副作用):嗎啡致低血壓非高血壓。","C":"呼吸抑制是嗎啡副作用。","D":"縮瞳是嗎啡副作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-57":{"quick":"重複給予不致β受體去敏感的是propranolol（拮抗劑），故選A。","detail":{"background":"受體「去敏感(desensitization/down-regulation)」通常因「『致效劑(agonist)』長期刺激」而發生。terbutaline、norepinephrine、isoproterenol是β受體「致效劑」,重複給予會使β受體去敏感(下調)。而「Propranolol(A)」是β受體「『拮抗劑(阻斷劑)』」,長期阻斷反而使β受體「『上調(up-regulation)』、更敏感」(故突然停藥會反彈),「不會」致去敏感。故不致去敏感者為propranolol(A)。","options":{"A":"正確:propranolol是拮抗劑,不致β受體去敏感(反而上調)。","B":"terbutaline(β2致效)重複給予致去敏感。","C":"norepinephrine(致效)致去敏感。","D":"isoproterenol(β致效)致去敏感。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-59":{"quick":"adenosine機轉是「活化A1受體、抑制鈣通道、活化鉀通道」，故選A。","detail":{"background":"Adenosine(腺苷)治療PSVT的機轉是「活化心臟A1受體」——經Gi抑制腺苷酸環化酶,「抑制鈣離子通道(Ca²⁺內流減少)」並「活化鉀離子通道(K⁺外流增加致過極化)」,使房室結傳導減慢、終止折返性心律不整。故為活化A1受體、抑制鈣通道、活化鉀通道(A)。故選A。","options":{"A":"正確:adenosine活化A1受體、抑制鈣通道、活化鉀通道。","B":"非抑制A1受體。","C":"非活化A2/鈣通道。","D":"非抑制A2受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-60":{"quick":"禁用於孕婦的降血壓藥是captopril（ACE抑制劑），故選A。","detail":{"background":"「Captopril(ACE抑制劑,A)」(及ARB)「禁用於孕婦」——會造成胎兒腎臟發育異常、羊水過少、胎兒畸形與死亡(尤其中後期),屬妊娠禁忌。故禁用於孕婦者為captopril(A)。clonidine、nifedipine、hyd
