ralazine、labetalol、methyldopa相對較可用於妊娠高血壓。故選A。","options":{"A":"正確:captopril(ACE抑制劑)禁用於孕婦(致胎兒傷害)。","B":"clonidine可用於妊娠。","C":"nifedipine可用於妊娠高血壓。","D":"hydralazine可用於妊娠高血壓。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-50":{"quick":"糖尿病高血壓患者較適合用Captopril，故選A。","detail":{"background":"糖尿病合併高血壓患者首選「ACE抑制劑(Captopril,A)」或ARB——它們「保護腎臟(減少糖尿病腎病變的蛋白尿、延緩腎功能惡化)」、不影響血糖血脂。故較適合者為captopril(A)。propranolol(β阻斷)會「掩蓋低血糖症狀、影響血脂血糖」;phentolamine(α阻斷)、aliskiren(腎素抑制)非首選。故選A。","options":{"A":"正確:ACE抑制劑(captopril)保護糖尿病腎、適合糖尿病高血壓。","B":"propranolol掩蓋低血糖、影響血糖血脂。","C":"phentolamine非糖尿病高血壓首選。","D":"aliskiren非首選(且ACEI/ARB更佳)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-56":{"quick":"β阻斷劑治心絞痛「不」包括「不適合變異性心絞痛但縮短舒張灌流」的矛盾敘述，故選D。","detail":{"background":"β阻斷劑治療心絞痛的作用:A「降低心肌收縮力與心跳速率,減少心肌氧氣需求」(正確);B「不適合『變異性(冠狀動脈痙攣)心絞痛』,可能因β阻斷致α作用相對增強而加重痙攣」(正確);C「減慢心率延長舒張灌流時間,增加心內膜下缺血區供氧」(正確);D「縮短心臟射血時間,減少心肌耗氧」錯——β阻斷劑使心率減慢、射血時間相對「延長」(非縮短),題述D與機轉不符。故不包括(錯誤)者為D。","options":{"A":"降低收縮力與心率減少耗氧,正確。","B":"不適合變異性心絞痛,正確。","C":"延長舒張灌流增加供氧,正確。","D":"正確(為不包括/錯誤):β阻斷劑非縮短射血時間。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-50":{"quick":"延長動作電位、甲狀腺異常需小心的抗心律不整藥是Amiodarone，故選A。","detail":{"background":"「Amiodarone(Class III,A)」阻斷鉀通道「延長動作電位時程與不應期」,治多種心律不整。其分子含碘,長期副作用多:「甲狀腺功能異常(亢進或低下,故甲狀腺異常者需小心)」、肺纖維化、角膜沉積、皮膚色素沉著、肝毒性。故延長動作電位且甲狀腺異常需小心者為amiodarone(A)。故選A。","options":{"A":"正確:amiodarone延長動作電位,含碘致甲狀腺異常需小心。","B":"Verapamil是鈣通道阻斷。","C":"Propranolol是β阻斷。","D":"Quinidine是IA(延長QT但非含碘甲狀腺問題)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-58":{"quick":"amiodarone長期副作用「不」包括腹瀉，故選C。","detail":{"background":"Amiodarone長期使用的副作用:甲狀腺功能異常(A)、皮膚色素(藍灰)沉積(B)、角膜黃棕色沉積(D)、肺纖維化、肝毒性、周邊神經病變。而「腹瀉(C)」不是amiodarone的典型長期副作用(它反而可能便祕)。故不是者為腹瀉(C)。","options":{"A":"甲狀腺功能異常是amiodarone副作用。","B":"皮膚色素沉積是amiodarone副作用。","C":"正確(為非副作用):腹瀉非amiodarone典型副作用。","D":"角膜黃棕色沉積是amiodarone副作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-59":{"quick":"常見副作用為咳嗽的降血壓藥是Captopril，故選A。","detail":{"background":"「Captopril(ACE抑制劑,A)」的常見副作用是「乾咳」——因抑制ACE使「緩激肽累積」刺激氣道。故致咳嗽者為captopril(A)。Furosemide(利尿劑)、Prazosin(α1阻斷)、Carvedilol(α/β阻斷)無乾咳副作用。改用ARB可避免。故選A。","options":{"A":"正確:captopril(ACE抑制劑)常見乾咳。","B":"Furosemide致電解質異常,非咳嗽。","C":"Prazosin致姿勢性低血壓。","D":"Carvedilol無乾咳。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-52":{"quick":"Furosemide屬於「亨利氏環利尿劑」，故選C。","detail":{"background":"「Furosemide(呋洛塞邁,C)」是「亨利氏環(loop)利尿劑」——抑制亨利氏環上行支的Na-K-2Cl共輸送體,強力利尿(排鈉鉀鈣),用於水腫、心衰竭、肺水腫、高血鈣。故furosemide屬環利尿劑(C)。保鉀利尿劑(spironolactone)、滲透性(mannitol)、碳酸酐酶抑制劑(acetazolamide)不同。故選C。","options":{"A":"保鉀利尿劑是spironolactone等。","B":"滲透性利尿劑是mannitol。","C":"正確:furosemide是亨利氏環利尿劑。","D":"碳酸酐酶抑制劑是acetazolamide。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-58":{"quick":"Alteplase機轉是「活化纖維蛋白結合的胞漿素原」，故選C。","detail":{"background":"「Alteplase(rt-PA,組織型胞漿素原活化劑)」是「血栓溶解劑」——「活化已與血栓(纖維蛋白)結合的胞漿素原(plasminogen)轉成胞漿素(plasmin)」,溶解纖維蛋白血栓,用於急性缺血性中風、心肌梗塞、肺栓塞。故為活化纖維蛋白結合的胞漿素原(C)。A(凝血酶抑制)、B(Xa抑制)、D(維生素K)是抗凝劑機轉非溶栓。故選C。","options":{"A":"不可逆抑制凝血酶是直接凝血酶抑制劑。","B":"抑制Xa是rivaroxaban等。","C":"正確:alteplase活化纖維蛋白結合的胞漿素原(溶栓)。","D":"抑制維生素K環氧還原酶是warfarin。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-59":{"quick":"NTG舌下/經皮給藥是為了避開肝臟首渡效應，故選C。","detail":{"background":"硝化甘油(NTG)「舌下或經皮(貼劑)給藥」的目的是「避開肝臟代謝的首渡效應(first-pass effect)」——NTG口服會被肝臟大量代謝(生體可用率極低),改舌下(經口腔黏膜直接入血)或經皮吸收可繞過肝首渡、快速達有效濃度。故目的為避開首渡效應(C)。故選C。","options":{"A":"非為併用其他藥。","B":"非減少低血壓副作用。","C":"正確:舌下/經皮避開肝臟首渡效應。","D":"非減少反射性心搏過速。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-59":{"quick":"Aliskiren的機轉是「直接抑制腎素活性」，故選B。","detail":{"background":"「Aliskiren(B)」是「直接腎素(renin)抑制劑」——抑制腎素活性,阻斷RAAS的第一步(血管收縮素原→血管收縮素I),減少血管收縮素II生成而降血壓。故為直接抑制腎素活性(B)。它與ACE抑制劑、ARB作用於RAAS的不同環節。故選B。","options":{"A":"非抑制內皮受體。","B":"正確:aliskiren直接抑制腎素活性。","C":"非抑制ANP代謝(那是sacubitril)。","D":"非抑制血管緊縮素受體(那是ARB)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-49":{"quick":"Dobutamine作用於β1腎上腺素受體增加心輸出，故選A。","detail":{"background":"「Dobutamine(A)」是「β1腎上腺素受體選擇性致效劑」——增加心肌收縮力與心輸出量,用於急性鬱血性心衰竭短期支持。故作用於β1受體者為dobutamine(A)。故選A。","options":{"A":"正確:dobutamine作用於β1受體增加心輸出。","B":"非主要β2。","C":"非D1。","D":"非D2。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-50":{"quick":"最易致心律不整的吸入性麻醉劑是Halothane，故選B。","detail":{"background":"「Halothane(B)」吸入性麻醉劑「最易引起心律不整」——它使心肌「對兒茶酚胺敏感化(sensitization)」,易在交感刺激下發生心律不整(尤其併用腎上腺素時),也可致惡性高熱、肝毒性。故最易致心律不整者為halothane(B)。Desflurane、Isoflurane、Sevoflurane致心律不整風險較低。故選B。","options":{"A":"Desflurane致心律不整風險較低。","B":"正確:halothane最易致心律不整(兒茶酚胺敏感化)。","C":"Isoflurane風險較低。","D":"Sevoflurane風險較低。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-51":{"quick":"配對錯誤為A：Procainamide主要阻斷「鈉」通道（非鉀），故選A。","detail":{"background":"抗心律不整藥配對:A「Procainamide:阻斷鉀離子通道」錯——procainamide(Class IA)「主要阻斷『鈉』通道」(也部分阻鉀延長QT);B「Bretylium:阻斷鉀離子通道」(Class III,正確);C「Propranolol:阻斷腎上腺素β受體」(Class II,正確);D「Quinidine:阻斷鈉離子通道」(Class IA,正確)。故錯誤配對為A(procainamide主要阻鈉通道,非鉀)。故選A。","options":{"A":"正確(為錯誤配對):procainamide主要阻斷鈉通道,非鉀。","B":"Bretylium阻鉀通道(Class III),正確。","C":"Propranolol阻β受體,正確。","D":"Quinidine阻鈉通道,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-58":{"quick":"ACE抑制劑治CHF機轉是「減少周邊血管阻抗、促利尿降後負荷」，故選依官方C。","detail":{"background":"ACE抑制劑治充血性心衰竭(CHF)的機轉:減少血管收縮素II→「減少周邊血管阻抗(降後負荷)」、「減少醛固酮→排鈉利尿(降前負荷)」、抑制心室重塑(纖維化),改善預後降死亡率。題目官方答案C「減少周邊血管阻抗,促進利尿來降低心臟後負荷」——綜合降前後負荷。故依官方選C。(D減少醛固酮降前負荷亦正確,但官方取C。)","options":{"A":"非不影響心臟纖維化(ACEI減少纖維化)。","B":"ACEI使腎素活性「上升」(負回饋),非減少。","C":"正確(依官方):減少周邊血管阻抗、促利尿降後負荷。","D":"減少醛固酮降前負荷亦對,但官方取C。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-59":{"quick":"不致心搏過速的抗高血壓藥是Atenolol（β阻斷），故選B。","detail":{"background":"抗高血壓藥的反射性心搏過速:血管擴張劑(Amlodipine鈣通道、Prazosin α1阻斷、Hydralazine)會因血壓下降引起「反射性心搏過速」。而「Atenolol(β1阻斷劑,B)」本身「減慢心率」,「不會致心搏過速」(反而心搏過緩)。故不致心搏過速者為atenolol(B)。故選B。","options":{"A":"Amlodipine(鈣通道)可致反射性心搏過速。","B":"正確:atenolol(β阻斷)減慢心率,不致心搏過速。","C":"Prazosin(α1阻斷)致反射性心搏過速。","D":"Hydralazine(血管擴張)致反射性心搏過速。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-31":{"quick":"Amantadine副作用「不」包括高血壓，故選B。","detail":{"background":"Amantadine(抗帕金森、抗流感A型)的副作用屬「抗膽鹼樣」:口乾(A)、尿液滯留(D)、視力模糊、便祕,以及周邊水腫(C,網狀青斑livedo reticularis)、中樞興奮(失眠幻覺)。而「高血壓(B)」不是其典型副作用。故不是者為高血壓(B)。","options":{"A":"口乾是amantadine抗膽鹼副作用。","B":"正確(為非副作用):amantadine不致高血壓。","C":"周邊水腫(網狀青斑)是amantadine副作用。","D":"尿液滯留是amantadine抗膽鹼副作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-32":{"quick":"初次服用致姿勢性低血壓、宜睡前少量起始的是Prazosin，故選D。","detail":{"background":"「Prazosin(α1阻斷劑,D)」初次服用易產生「『首劑現象(first-dose phenomenon)』——明顯姿勢性低血壓、暈厥」,故建議「起始劑量小、睡前服用」以減輕。故符合者為prazosin(D)。Propranolol、Minoxidil、Furosemide無此典型首劑姿勢性低血壓。故選D。","options":{"A":"Propranolol無典型首劑現象。","B":"Minoxidil是血管擴張(多毛)。","C":"Furosemide是利尿劑。","D":"正確:prazosin初次服用致姿勢性低血壓,宜睡前少量起始。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-35":{"quick":"Losartan是血管收縮素II受體拮抗劑，故選B。","detail":{"background":"「Losartan(B)」是「血管收縮素II受體(AT1)拮抗劑(ARB)」——阻斷AT1受體降血壓(不致ACE抑制劑的乾咳)。故為血管收縮素II受體拮抗劑(B)。注意是阻斷「II型受體(AT1)」非「I型受體」(選項C「血管收縮素I受體」是干擾,正確說法是阻斷angiotensin II作用的AT1受體)。故選B。","options":{"A":"ACE抑制劑是captopril等,非losartan。","B":"正確:losartan是血管收縮素II受體(AT1)拮抗劑。","C":"非阻斷「血管收縮素I受體」(用詞干擾)。","D":"非β阻斷劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-36":{"quick":"不適合治療PSVT的是Atropine，故選B。","detail":{"background":"陣發性上心室心律不整(PSVT)治療:Verapamil(A,鈣通道阻斷,減慢房室傳導)、Adenosine(C,首選)、Propranolol(D,β阻斷)皆可減慢房室傳導終止PSVT。而「Atropine(B,抗膽鹼藥)」會「『加速』心率(阻斷迷走)」,「不適合」治療PSVT(反而用於心搏過緩)。故不適合者為atropine(B)。故選B。","options":{"A":"Verapamil治PSVT(減慢房室傳導)。","B":"正確:atropine加速心率,不適合治PSVT。","C":"Adenosine是PSVT首選。","D":"Propranolol治PSVT。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-36":{"quick":"有機硝酸鹽併用減少反射性心搏過速的是β阻斷劑，故選D。","detail":{"background":"有機硝酸鹽(治心絞痛)大劑量使周邊血管擴張、血壓下降,引起「反射性心搏過速(代償)」,反而增加心肌耗氧。臨床上併用「β腎上腺素受體拮抗劑(β阻斷劑,D)」可「抵消反射性心搏過速」(減慢心率),兩者協同減少心肌耗氧、改善心絞痛。故併用者為β阻斷劑(D)。故選D。","options":{"A":"非α阻斷劑(反而加重低血壓)。","B":"非鈣通道阻斷劑為此目的。","C":"非鈉通道阻斷劑。","D":"正確:併用β阻斷劑抵消硝酸鹽的反射性心搏過速。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-37":{"quick":"同時降膽固醇與三酸甘油酯最佳的是Niacin，故選D。","detail":{"background":"「Nicotinic acid(Niacin菸鹼酸,D)」能「同時降低膽固醇(LDL)與三酸甘油酯,並升高HDL(升HDL最強)」,是廣效降血脂藥。故同時降膽固醇與三酸甘油酯者為niacin(D)。Atorvastatin(statin主降LDL)、Cholestyramine與Colestipol(膽酸結合樹脂主降LDL,反而可能升三酸甘油酯)。故選D。","options":{"A":"Atorvastatin(statin)主降LDL。","B":"Cholestyramine主降LDL,可能升三酸甘油酯。","C":"Colestipol主降LDL,可能升三酸甘油酯。","D":"正確:Niacin同時降膽固醇與三酸甘油酯。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-36":{"quick":"使脂蛋白脂解酶活性增加的降血脂藥是fenofibrate，故選A。","detail":{"background":"「Fenofibrate(fibrate類,A)」透過活化PPARα,「增加『脂蛋白脂解酶(lipoprotein lipase, LPL)』的活性」,加速三酸甘油酯(VLDL)的分解清除,「主要降低三酸甘油酯」(並略升HDL)。故使LPL活性增加者為fenofibrate(A)。ezetimibe(吸收抑制)、colestipol(膽酸樹脂)、rosuvastatin(statin)機轉不同。故選A。","options":{"A":"正確:fenofibrate(fibrate)增加脂蛋白脂解酶活性,降三酸甘油酯。","B":"ezetimibe是膽固醇吸收抑制劑。","C":"colestipol是膽酸結合樹脂。","D":"rosuvastatin是statin(抑HMG-CoA還原酶)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-36":{"quick":"拮抗AT1受體的是Irbesartan（ARB），故選D。","detail":{"background":"「Irbesartan(D)」是「血管收縮素II第一型(AT1)受體拮抗劑(ARB)」——阻斷AT1受體使小動脈與靜脈舒張、降血壓。故拮抗AT1受體者為irbesartan(D)。Captopril(ACE抑制)、Felodipine(鈣通道)、Aliskiren(腎素抑制)機轉不同。故選D。","options":{"A":"Captopril是ACE抑制劑。","B":"Felodipine是鈣通道阻斷劑。","C":"Aliskiren是腎素抑制劑。","D":"正確:Irbesartan是AT1受體拮抗劑(ARB)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-37":{"quick":"人體內生性、靜脈高劑量治PSVT的是adenosine，故選B。","detail":{"background":"「Adenosine(腺苷,B)」是「人體內生性物質」(普林核苷),靜脈快速推注(高劑量)可有效治療「陣發性上心室心搏過速(PSVT)」——活化A1受體抑制房室結傳導,半衰期極短(數秒)。故內生性、靜脈治PSVT者為adenosine(B)。dronedarone、sotalol、lidocaine非內生性。故選B。","options":{"A":"dronedarone是合成抗心律不整藥。","B":"正確:adenosine是內生性物質,靜脈治PSVT。","C":"sotalol是合成Class III。","D":"lidocaine是合成局麻/抗心律不整。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-36":{"quick":"Warfarin中毒出血應給予維生素K，故選A。","detail":{"background":"口服抗凝血劑「Warfarin」中毒出血時,應「給予維生素K(肌肉或靜脈注射)」逆轉——warfarin抑制維生素K循環、使凝血因子II、VII、IX、X無法活化,補充維生素K可恢復凝血因子合成(嚴重出血另給新鮮冷凍血漿或凝血酶原複合體快速逆轉)。故給維生素K(A)。故選A。","options":{"A":"正確:warfarin中毒出血給維生素K。","B":"維生素B12非warfarin解毒。","C":"類固醇非warfarin解毒。","D":"tranexamic acid是抗纖溶,非warfarin的專一逆轉劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-37":{"quick":"Milrinone是「第三型磷酸雙酯酶（PDE3）抑制劑」，故選C。","detail":{"background":"「Milrinone(C)」是「第三型磷酸雙酯酶(phosphodiesterase 3, PDE3)抑制劑」——抑制PDE3使心肌與血管平滑肌內cAMP增加,產生「強心(增加收縮力)與血管擴張(inodilator)」,用於急性心衰竭短期支持,長期使用增加心律不整與死亡。故為PDE3抑制劑(C)。(PDE5抑制劑是sildenafil。)故選C。","options":{"A":"非PDE1抑制劑。","B":"非PDE2抑制劑。","C":"正確:milrinone是PDE3抑制劑(強心擴張血管)。","D":"PDE5抑制劑是sildenafil(治勃起障礙/肺高壓)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-35":{"quick":"排尿效果最顯著、治高血鈣的利尿劑是furosemide，故選B。","detail":{"background":"「Furosemide(亨利氏環利尿劑,B)」是「排尿(利尿)效果最強」的利尿劑(抑制Na-K-2Cl共輸送體),除治水腫、心衰、肺水腫外,因「增加尿鈣排泄」也可「治療『高血鈣症(hypercalcemia)』」(配合輸液)。故排尿最強且治高血鈣者為furosemide(B)。thiazide反而減少尿鈣(留鈣)。故選B。","options":{"A":"chlorothiazide減少尿鈣(留鈣),不治高血鈣。","B":"正確:furosemide排尿最強,增尿鈣治高血鈣。","C":"eplerenone是保鉀利尿劑。","D":"acetazolamide利尿弱。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-36":{"quick":"Clopidogrel不可逆抑制P2Y12 ADP受體，故選C。","detail":{"background":"「Clopidogrel(C)」抑制血小板凝集的機制是「不可逆性地抑制血小板表面的『P2Y12 ADP受體』」——ADP無法活化血小板、抑制GPIIb/IIIa活化與聚集,預防動脈血栓。故為不可逆抑制P2Y12 ADP受體(C)。aspirin抑制COX-1、Xa抑制劑是rivaroxaban、TXA2受體拮抗非clopidogrel。故選C。","options":{"A":"不可逆抑制COX-1是aspirin。","B":"抑制Xa是rivaroxaban等。","C":"正確:clopidogrel不可逆抑制P2Y12 ADP受體。","D":"抑制TXA2受體非clopidogrel機轉。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-31":{"quick":"活化突觸前α2受體的降血壓藥是clonidine，故選C。","detail":{"background":"「Clonidine(C)」「活化交感神經突觸前(及中樞)的α2腎上腺素受體」——突觸前α2自體受體活化會「回饋抑制正腎上腺素釋放」、中樞α2減少交感輸出,降低血壓。故活化α2受體者為clonidine(C)。prazosin(α1阻斷)、acebutolol(β1阻斷)、yohimbine(α2『拮抗』)不符。故選C。","options":{"A":"prazosin是α1阻斷劑。","B":"acebutolol是β1阻斷劑。","C":"正確:clonidine活化突觸前/中樞α2受體降血壓。","D":"yohimbine是α2拮抗劑(相反)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-35":{"quick":"減少angiotensin II生成且使bradykinin累積的是lisinopril，故選A。","detail":{"background":"「Lisinopril(ACE抑制劑,A)」抑制血管收縮素轉換酶,「減少血管收縮素II生成」並「使緩激肽(bradykinin)無法被ACE代謝而『累積』」(緩激肽累積致血管擴張降壓,也致乾咳)。故為lisinopril(A)。amlodipine(鈣通道)、methyldopa(中樞α2)、losartan(ARB,阻斷受體但不影響緩激肽)機轉不同。故選A。","options":{"A":"正確:lisinopril(ACE抑制劑)減少血管收縮素II、使緩激肽累積。","B":"amlodipine是鈣通道阻斷劑。","C":"methyldopa是中樞α2致效劑。","D":"losartan是ARB(不致緩激肽累積)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-35":{"quick":"毛地黃中毒心跳過慢的安全治療是「低血鉀補鉀、atropine治房室阻斷」，故選B。","detail":{"background":"毛地黃中毒處理:B「血鉀過低時宜補充鉀(低血鉀會加重毛地黃毒性與心律不整),並以atropine治療毛地黃引起的房室阻斷(心搏過緩)」正確。逐項:A錯(鎂是用於毛地黃中毒室性心律不整,但「高劑量鎂與毛地黃競爭」敘述不當);C「用amiodarone」不恰當(毛地黃中毒室性心律不整用lidocaine/phenytoin);D錯(嚴重毛地黃中毒『應』給毛地黃抗體(Digibind)而非不給)。故正確安全策略為B。","options":{"A":"鎂的敘述(競爭結合位)不當。","B":"正確:低血鉀補鉀、atropine治房室阻斷。","C":"amiodarone非毛地黃中毒首選(用lidocaine/phenytoin)。","D":"嚴重中毒應給毛地黃抗體,非不給。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-36":{"quick":"Abciximab是GP IIb/IIIa抑制劑，故選B。","detail":{"background":"「Abciximab(B)」是「血小板GP IIb/IIIa受體抑制劑(單株抗體)」——阻斷血小板聚集的最終共同途徑(纖維蛋白原無法交聯血小板),用於不穩定型心絞痛與經皮冠狀動脈介入(PCI)時的強力抗血小板。故Abciximab是GP IIb/IIIa抑制劑(B)。PDE抑制(cilostazol)、COX-1抑制(aspirin)、P2Y12拮抗(clopidogrel)機轉不同。故選B。","options":{"A":"PDE抑制是cilostazol/dipyridamole。","B":"正確:abciximab是GP IIb/IIIa抑制劑。","C":"COX-1抑制是aspirin。","D":"P2Y12拮抗是clopidogrel。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-33":{"quick":"腎素抑制劑是Aliskiren，故選B。","detail":{"background":"「Aliskiren(B)」是「直接腎素(renin)抑制劑」——抑制腎素活性,阻斷RAAS第一步(血管收縮素原→I),降血壓。故腎素抑制劑為aliskiren(B)。Azilsartan(ARB)、Amiloride(保鉀利尿)、Acebutolol(β1阻斷)機轉不同。故選B。","options":{"A":"Azilsartan是ARB。","B":"正確:Aliskiren是腎素抑制劑。","C":"Amiloride是保鉀利尿劑。","D":"Acebutolol是β1阻斷劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-36":{"quick":"ACE抑制劑「不」減少bradykinin濃度（反而使其累積），故選D。","detail":{"background":"ACE抑制劑(ACEI)作用:抑制交感活性(A,間接)、減少血管阻力(B,降後負荷)、減少醛固酮→減少鈉水滯留(C)。而「減少bradykinin濃度(D)」錯——ACE也負責代謝緩激肽,抑制ACE反而使「緩激肽『累積(增加)』」(致血管擴張與乾咳),「非減少」。故不是其作用者為D(實際是使緩激肽增加)。故選D。","options":{"A":"ACEI間接降交感活性。","B":"ACEI減少血管阻力。","C":"ACEI減少鈉水滯留。","D":"正確(為非作用):ACEI使緩激肽「累積」非減少。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-36":{"quick":"醛固酮受體拮抗劑是eplerenone，故選C。","detail":{"background":"「Eplerenone(C)」是「醛固酮(aldosterone)受體拮抗劑(選擇性保鉀利尿劑)」——阻斷遠端腎小管的醛固酮受體,保鉀排鈉利尿、降血壓、治心衰,且不致男性女乳症(較spironolactone選擇性)。故醛固酮受體拮抗劑為eplerenone(C)。chlorothiazide(thiazide)、furosemide(環利尿)、tolvaptan(ADH拮抗)機轉不同。故選C。","options":{"A":"chlorothiazide是thiazide類。","B":"furosemide是環利尿劑。","C":"正確:eplerenone是醛固酮受體拮抗劑。","D":"tolvaptan是血管加壓素(ADH)拮抗劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-37":{"quick":"活化中樞α2減少交感降血壓的是clonidine，故選A。","detail":{"background":"「Clonidine(A)」「活化中樞神經α2腎上腺素受體」——減少交感神經輸出而降血壓。故為clonidine(A)。hydralazine(直接血管擴張)、propranolol(β阻斷)、losartan(ARB)機轉不同。故選A。","options":{"A":"正確:clonidine活化中樞α2減少交感降血壓。","B":"hydralazine是直接血管擴張劑。","C":"propranolol是β阻斷劑。","D":"losartan是ARB。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-38":{"quick":"有機硝酸鹽治心絞痛主要是「減少前負荷、降心肌需氧」，故選B。","detail":{"background":"有機硝酸鹽(如nitroglycerin)治療典型(穩定型)心絞痛的主要機轉是「釋放NO使血管平滑肌舒張,『主要擴張靜脈→減少回心血量(前負荷)→降低心室壁張力與心輸出→降低心肌需氧量』」(B)。較高劑量也擴張動脈(降後負荷)與冠狀動脈,但主要是降前負荷減少耗氧。故主要機轉為減少前負荷降需氧(B)。故選B。","options":{"A":"非主要抗血小板。","B":"正確:有機硝酸鹽主要減少前負荷、降心肌需氧。","C":"擴張動脈降後負荷是次要(較高劑量)。","D":"非主要增加cAMP擴張冠脈。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-59":{"quick":"急性氣喘發作療效最佳的是Epinephrine（或短效β2致效劑），故選B。","detail":{"background":"急性氣喘發作(支氣管痙攣)需「快速支氣管擴張」——「Epinephrine(腎上腺素,B)」(及短效β2致效劑albuterol)能迅速舒張支氣管,是急性發作首選。Salmeterol(A,長效β2,起效慢、用於『維持』非急救)、Montelukast(C,白三烯拮抗,預防)、Loratadine(D,抗組織胺,不治氣喘)皆非急救。故急性發作最佳為epinephrine(B)。","options":{"A":"Salmeterol是長效β2,起效慢,用於維持非急救。","B":"正確:epinephrine快速舒張支氣管,急性發作最佳。","C":"Montelukast是預防用藥。","D":"Loratadine是抗組織胺,不治氣喘。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-50":{"quick":"propranolol「不」用於前列腺肥大，故選C。","detail":{"background":"Propranolol(非選擇性β阻斷劑)的用途:偏頭痛預防(A)、甲狀腺功能亢進(B,控制心悸震顫)、心絞痛(D)、高血壓、心律不整、原發性顫抖、表現焦慮。而「前列腺肥大(C)」是用「α1阻斷劑(tamsulosin)」治療,「非propranolol」(β阻斷對攝護腺無作用)。故不是其用途者為前列腺肥大(C)。","options":{"A":"偏頭痛預防是propranolol用途。","B":"甲狀腺亢進控制心悸是propranolol用途。","C":"正確:前列腺肥大用α1阻斷劑,非propranolol。","D":"心絞痛是propranolol用途。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-55":{"quick":"ACE抑制劑「不」致低血鉀（反而高血鉀），故選D。","detail":{"background":"ACE抑制劑的副作用:腎功能不足(A,尤其雙側腎動脈狹窄者)、持續性乾咳(B,緩激肽累積)、血管性水腫(C,緩激肽,罕見但危險)、「『高』血鉀(因減少醛固酮、保鉀)」。題問「不是」副作用者——「低血鉀(D)」與ACE抑制劑相反(它致『高』血鉀)。故不是者為低血鉀(D)。","options":{"A":"腎功能不足是ACE抑制劑副作用。","B":"持續性乾咳是ACE抑制劑副作用。","C":"血管性水腫是ACE抑制劑副作用。","D":"正確(為非副作用):ACE抑制劑致高血鉀非低血鉀。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-59":{"quick":"作用標的在「細胞質」的是zileuton（5-脂氧化酶抑制劑），故選C。","detail":{"background":"藥物作用標的位置:famotidine(A,H2受體,細胞膜)、montelukast(B,白三烯受體,細胞膜)、omeprazole(D,質子幫浦H-K-ATPase,細胞膜/分泌小管)。而「Zileuton(C)」抑制「5-脂氧化酶(5-lipoxygenase, LOX)」——這是「細胞質」內的酵素(催化花生四烯酸→白三烯),故其作用標的在細胞質。故選C。","options":{"A":"famotidine作用於細胞膜H2受體。","B":"montelukast作用於細胞膜白三烯受體。","C":"正確:zileuton抑制細胞質的5-脂氧化酶。","D":"omeprazole作用於質子幫浦(膜)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-50":{"quick":"過敏性休克首選藥是epinephrine，故選A。","detail":{"background":"「過敏性休克(anaphylactic shock,第一型過敏)」的首選急救藥是「Epinephrine(腎上腺素,A)」——α1收縮血管升血壓、β2舒張支氣管、β1強心、並抑制肥大細胞釋放介質,迅速逆轉過敏性休克的低血壓與支氣管痙攣。故首選為epinephrine(A)。isoproterenol、dobutamine、sotalol不適用。故選A。","options":{"A":"正確:epinephrine是過敏性休克首選藥。","B":"isoproterenol(β致效)不收縮血管,非首選。","C":"dobutamine(β1)用於心衰。","D":"sotalol是抗心律不整藥。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-60":{"quick":"服用後引起氣喘發作的降血壓藥是β阻斷劑，故選A。","detail":{"background":"「β腎上腺素受體阻斷劑(β blockers,A)」尤其非選擇性者(propranolol)會「阻斷支氣管β2受體→支氣管收縮」,「誘發氣喘病人的氣喘發作」,故氣喘/COPD病人禁用或慎用。故服用後引起氣喘者為β阻斷劑(A)。ARB、鈣通道阻斷劑、鉀通道阻斷劑不致氣喘。故選A。","options":{"A":"正確:β阻斷劑阻斷支氣管β2致氣喘發作。","B":"ARB不致氣喘。","C":"鈣通道阻斷劑不致氣喘。","D":"鉀通道阻斷劑不致氣喘。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-55":{"quick":"支氣管收縮＋小支氣管發炎（氣喘）最適合白三烯受體拮抗劑，故選C。","detail":{"background":"氣喘的支氣管收縮與發炎可用「白三烯(leukotriene)受體拮抗劑(montelukast,C)」——白三烯是引起支氣管收縮、發炎、黏液的重要介質,拮抗其受體可治氣喘(尤其過敏與運動誘發)。故最適合者為leukotriene受體拮抗劑(C)。COX-1/COX-2抑制劑(NSAID)、PGI2不治氣喘(NSAID甚至可能誘發阿斯匹靈型氣喘)。故選C。","options":{"A":"COX-1抑制劑(NSAID)可能誘發氣喘。","B":"COX-2抑制劑不治氣喘。","C":"正確:白三烯受體拮抗劑治氣喘的支氣管收縮與發炎。","D":"PGI2(前列環素)不治氣喘。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-58":{"quick":"預防高山症的是碳酸酐酶抑制劑（acetazolamide），故選B。","detail":{"background":"「碳酸酐酶抑制劑(acetazolamide,B)」可「預防與治療高山症(acute mountain sickness)」——它促進腎臟排出碳酸氫根、造成代謝性酸中毒,刺激呼吸(代償性過度換氣)、改善高海拔低氧的呼吸性鹼中毒,加速適應。故預防高山症者為碳酸酐酶抑制劑(B)。硝基甘油、乙醯膽鹼酶抑制劑、warfarin不治高山症。故選B。","options":{"A":"硝基甘油是抗心絞痛。","B":"正確:碳酸酐酶抑制劑(acetazolamide)預防高山症。","C":"乙醯膽鹼酶抑制劑不治高山症。","D":"warfarin是抗凝血劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-55":{"quick":"diflunisal錯誤敘述為D：它「不具」明顯解熱作用，故選D。","detail":{"background":"Diflunisal是水楊酸(salicylate)衍生物的NSAID:A「具抗發炎作用」(正確);B「不會造成salicylate中毒(代謝不產生水楊酸)」(正確);C「止痛作用強度是aspirin的3-4倍」(正確);D「具解熱作用」錯——diflunisal「『缺乏』明顯的解熱(退燒)作用」(主要用於止痛抗發炎,如骨關節炎、輕中度疼痛)。故錯誤為D。","options":{"A":"具抗發炎作用,正確。","B":"不造成salicylate中毒,正確。","C":"止痛強度是aspirin的3-4倍,正確。","D":"正確(為錯誤敘述):diflunisal缺乏明顯解熱作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-59":{"quick":"不適合預防/治療過敏性鼻炎的是terazosin，故選D。","detail":{"background":"過敏性鼻炎的預防/治療:fluticasone(A,鼻內類固醇,抗發炎)、loratadine(B,第二代抗組織胺)、cromolyn(C,肥大細胞穩定劑,預防)。而「Terazosin(D)」是「α1腎上腺素受體阻斷劑」(治高血壓、前列腺肥大),「不用於過敏性鼻炎」。故不適合者為terazosin(D)。","options":{"A":"fluticasone(鼻內類固醇)治過敏性鼻炎。","B":"loratadine(抗組織胺)治過敏性鼻炎。","C":"cromolyn(肥大細胞穩定劑)預防過敏性鼻炎。","D":"正確:terazosin是α1阻斷劑,不治過敏性鼻炎。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-50":{"quick":"propranolol的禁忌症是慢性阻塞性肺病，故選C。","detail":{"background":"Propranolol(非選擇性β阻斷劑)的禁忌症是「慢性阻塞性肺病(COPD)與氣喘」——阻斷支氣管β2受體致支氣管收縮、加重呼吸困難。故禁忌症為COPD(C)。偏頭痛、高血壓、甲狀腺亢進反而是propranolol的「適應症」。故選C。","options":{"A":"偏頭痛是propranolol適應症。","B":"高血壓是propranolol適應症。","C":"正確:慢性阻塞性肺病是propranolol禁忌症。","D":"甲狀腺亢進是propranolol適應症。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-53":{"quick":"fexofenadine治蕁麻疹是拮抗組織胺受體，故選B。","detail":{"background":"過敏性蕁麻疹是第一型過敏反應,肥大細胞釋放「組織胺(histamine)」作用於H1受體致血管擴張、通透性增加、搔癢。「Fexofenadine(第二代抗組織胺)」是「H1組織胺受體拮抗劑」,阻斷組織胺作用緩解蕁麻疹。故治蕁麻疹是拮抗組織胺受體(B)。故選B。","options":{"A":"非拮抗血清素。","B":"正確:fexofenadine拮抗組織胺(H1)受體治蕁麻疹。","C":"非拮抗前列腺素。","D":"非拮抗緩激肽。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-54":{"quick":"最適合緩解咳嗽的是Dextromethorphan，故選A。","detail":{"background":"「Dextromethorphan(右美沙芬,A)」是「中樞性止咳藥」——抑制延腦咳嗽中樞,「無成癮性、無止痛作用」,是常用的非麻醉性鎮咳劑,適合緩解乾咳。故緩解咳嗽最適合者為dextromethorphan(A)。Meperidine、Morphine、Oxycodone是強效鴉片止痛劑(雖codeine可止咳,但這三者主要止痛、成癮性高,不適合單純止咳)。故選A。","options":{"A":"正確:dextromethorphan是非成癮性中樞鎮咳劑。","B":"Meperidine是鴉片止痛劑。","C":"Morphine是強效鴉片止痛劑。","D":"Oxycodone是強效鴉片止痛劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-56":{"quick":"白三烯受體拮抗劑montelukast用於過敏性氣喘，故選A。","detail":{"background":"「Montelukast(白三烯受體拮抗劑)」用於「過敏性氣喘(及運動誘發氣喘、過敏性鼻炎)的『預防與長期控制』」——拮抗白三烯受體,減少支氣管收縮、發炎與黏液。故用於過敏性氣喘(A)。它不治高血壓、心律不整、蕁麻疹。故選A。","options":{"A":"正確:montelukast用於過敏性氣喘。","B":"非治高血壓。","C":"非治心律不整。","D":"非治蕁麻疹(那是抗組織胺)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-53":{"quick":"改善男性陽痿最有效的前列腺素衍生物是Alprostadil，故選B。","detail":{"background":"「Alprostadil(前列腺素E1, PGE1衍生物,B)」用於「男性勃起功能障礙(陽痿impotence)」——海綿體內注射或尿道塞劑,舒張海綿體平滑肌與血管,促進勃起。故改善陽痿者為alprostadil(B)。Epoprostenol(PGI2,肺高壓)、Dinoprostone(PGE2,催產/引產)、Latanoprost(PGF2α類似物,青光眼)用途不同。故選B。","options":{"A":"Epoprostenol(PGI2)治肺高壓。","B":"正確:alprostadil(PGE1)改善男性陽痿。","C":"Dinoprostone(PGE2)用於催產引產。","D":"Latanoprost治青光眼。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-54":{"quick":"H1受體拮抗劑「不」用於心絞痛，故選D。","detail":{"background":"H1組織胺受體拮抗劑(抗組織胺)的用途:動暈症(A,第一代如diphenhydramine、meclizine)、失眠症(B,第一代鎮靜作用)、季節性過敏性鼻炎(C)、過敏、蕁麻疹、止吐。而「心絞痛(D)」用硝酸鹽、β阻斷劑、鈣通道阻斷劑,「非抗組織胺」。故不是其用途者為心絞痛(D)。","options":{"A":"動暈症是抗組織胺用途。","B":"失眠症是第一代抗組織胺用途。","C":"季節性鼻炎是抗組織胺用途。","D":"正確:心絞痛非抗組織胺用途。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-56":{"quick":"氣喘患者不適用的降血壓藥是Propranolol，故選D。","detail":{"background":"氣喘患者「不適用『非選擇性β阻斷劑Propranolol』(D)」——阻斷支氣管β2受體致支氣管收縮、誘發氣喘。Methyldopa(中樞α2)、Prazosin(α1阻斷)、Nifedipine(鈣通道)對氣喘安全。故氣喘不適用者為propranolol(D)。故選D。","options":{"A":"Methyldopa對氣喘安全。","B":"Prazosin對氣喘安全。","C":"Nifedipine對氣喘安全。","D":"正確:propranolol(非選擇性β阻斷)致支氣管收縮,氣喘不適用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-55":{"quick":"thromboxane A2的作用是促進血管收縮（與血小板聚集），故選D。","detail":{"background":"血栓素A2(thromboxane A2, TXA2)由血小板COX產生,作用:「促進血小板聚集」與「血管『收縮』(D)」、支氣管收縮、子宮收縮(促進)。題問其作用——「促進血管收縮(D)」正確。A(抑制血小板聚集)、B(促支氣管舒張)、C(抑制子宮收縮)皆與TXA2相反(那較像前列環素PGI2)。故選D。","options":{"A":"TXA2促進(非抑制)血小板聚集。","B":"TXA2致支氣管收縮(非舒張)。","C":"TXA2促進(非抑制)子宮收縮。","D":"正確:TXA2促進血管收縮。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-59":{"quick":"Dextromethorphan的用途是緩解咳嗽，故選B。","detail":{"background":"「Dextromethorphan(右美沙芬,B)」是「中樞性鎮咳劑」——抑制延腦咳嗽中樞,無成癮性、無止痛,用於「緩解咳嗽(乾咳)」。故用途為緩解咳嗽(B)。它非術後止痛、非治痛風、非預防暈車。故選B。","options":{"A":"非術後止痛(那是鴉片)。","B":"正確:dextromethorphan緩解咳嗽。","C":"非緩解痛風。","D":"非預防暈車(那是抗組織胺/scopolamine)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-55":{"quick":"salicylates「不」引起代謝性鹼中毒（而是代謝性酸中毒），故選C。","detail":{"background":"水楊酸(salicylates,如aspirin)中毒/副作用:嘔吐(A,胃刺激)、耳鳴(D,水楊酸毒性特徵)、過度換氣、幻覺(B,中樞)、發燒。酸鹼方面:早期刺激呼吸中樞致「呼吸性鹼中毒」,但隨後因干擾代謝(解偶聯、乳酸/酮酸堆積)造成「『代謝性酸中毒』(metabolic acidosis)」。題問「不是」副作用者——「『代謝性鹼中毒』(C)」(水楊酸是致代謝性『酸』中毒,非鹼中毒)。故不是者為代謝性鹼中毒(C)。","options":{"A":"嘔吐是水楊酸副作用。","B":"幻覺是水楊酸中樞毒性。","C":"正確(為非副作用):水楊酸致代謝性「酸」中毒,非鹼中毒。","D":"耳鳴是水楊酸毒性特徵。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-56":{"quick":"sumatriptan治偏頭痛作用於血清素受體，故選C。","detail":{"background":"「Sumatriptan(triptan類)」治療偏頭痛,作用於「血清素(serotonin, 5-HT1B/1D)受體」——選擇性致效5-HT1B/1D,收縮腦膜擴張的血管、抑制三叉神經血管發炎與疼痛傳遞。故sumatriptan作用於血清素受體(C)。故選C。","options":{"A":"非前列腺素。","B":"非組織胺。","C":"正確:sumatriptan作用於血清素(5-HT1B/1D)受體。","D":"非緩激肽。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-60":{"quick":"cromolyn正確敘述為C：預防氣喘發作，故選C。","detail":{"background":"Cromolyn(色甘酸鈉):A「可經腸胃道完全吸收」錯(口服吸收差,須吸入給藥);B「藥效迅速持久」錯(無支氣管擴張作用,起效不快、用於『預防』);C「預防氣喘發作」正確——是「肥大細胞穩定劑」,抑制肥大細胞去顆粒、減少介質釋放,『預防』(非急救)氣喘與過敏;D「不具預防過敏性鼻炎療效」錯(cromolyn也可預防過敏性鼻炎)。故正確為C。","options":{"A":"cromolyn口服吸收差,須吸入。","B":"cromolyn無支氣管擴張、起效不快(預防用)。","C":"正確:cromolyn預防氣喘發作(肥大細胞穩定劑)。","D":"cromolyn也可預防過敏性鼻炎。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-50":{"quick":"succinylcholine的副作用是呼吸暫停（apnea），故選B。","detail":{"background":"Succinylcholine(去極化神經肌肉阻斷劑)的副作用:「呼吸暫停(apnea,B,因骨骼肌包括呼吸肌麻痺;非典型膽鹼酯酶缺乏者作用延長更明顯)」、「『高』血鉀(C相反,致高血鉀,燒傷/創傷者危險)」、肌束顫動後肌肉痛、惡性高熱(『高』溫,A相反)、心律不整。題問其副作用——「呼吸暫停(B)」正確。故選B。","options":{"A":"是惡性高熱(體溫過「高」),非過低。","B":"正確:succinylcholine致呼吸暫停(肌肉麻痺)。","C":"是「高」血鉀非低血鉀。","D":"非偏頭痛。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-54":{"quick":"Zileuton主要抑制lipoxygenase（LOX），故選C。","detail":{"background":"「Zileuton(C)」治療過敏性鼻炎與氣喘,機轉是「抑制『脂氧化酶(lipoxygenase, LOX，5-LOX)』」——阻斷花生四烯酸轉成白三烯,減少白三烯介導的支氣管收縮與發炎。故zileuton抑制LOX(C)。(montelukast則是白三烯受體拮抗。)COX、ACE、腺苷酸環化酶非其標的。故選C。","options":{"A":"COX是NSAID標的。","B":"ACE是ACE抑制劑標的。","C":"正確:zileuton抑制脂氧化酶(LOX)。","D":"腺苷酸環化酶非其標的。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-55":{"quick":"第一代H1抗組織胺「不」致高血壓，故選D。","detail":{"background":"第一代H1抗組織胺(Chlorpheniramine、Diphenhydramine)因可過血腦障壁與抗膽鹼作用,副作用:口乾舌燥(A,抗膽鹼)、嗜睡/鎮靜(B,中樞)、排尿不順/尿滯留(C,抗膽鹼)、視力模糊、便祕。而「高血壓(D)」不是其典型副作用。故不是者為高血壓(D)。","options":{"A":"口乾舌燥是第一代抗組織胺副作用(抗膽鹼)。","B":"嗜睡是第一代抗組織胺副作用(中樞)。","C":"排尿不順是第一代抗組織胺副作用(抗膽鹼)。","D":"正確(為非副作用):第一代抗組織胺不致高血壓。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-54":{"quick":"aspirin「不」具止血作用（反而抗凝血/抗血小板），故選C。","detail":{"background":"Aspirin(乙醯水楊酸)的藥理作用:止痛(A)、抗發炎(B)、解熱(D)——這些是抑制COX減少前列腺素;以及「抗血小板(抗凝血)」(低劑量不可逆抑制血小板COX-1減少TXA2)。題問「不是」其作用者——「『止血』(anti-coagulation,C)」用詞矛盾(aspirin是『抗』凝血/抗血小板,『不』止血,反而增加出血)。故不是止血(C,aspirin是抗血小板非止血)。故選C。","options":{"A":"止痛是aspirin作用。","B":"抗發炎是aspirin作用。","C":"正確(為非作用):aspirin是抗血小板(抗凝),非止血。","D":"解熱是aspirin作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-57":{"quick":"抑制磷酸雙酯酶的抗血小板藥是dipyridamole，故選D。","detail":{"background":"「Dipyridamole(D)」抑制血小板凝集的機制是「抑制磷酸雙酯酶(phosphodiesterase)」——使血小板內cAMP增加(也抑制腺苷再攝取),抑制血小板聚集(常與aspirin併用預防中風)。故抑制磷酸雙酯酶者為dipyridamole(D)。aspirin(COX-1)、ticlopidine與clopidogrel(P2Y12 ADP受體)機轉不同。故選D。","options":{"A":"aspirin抑制COX-1。","B":"ticlopidine拮抗P2Y12 ADP受體。","C":"clopidogrel拮抗P2Y12 ADP受體。","D":"正確:dipyridamole抑制磷酸雙酯酶。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-49":{"quick":"組織胺致支氣管痙攣、腎上腺素舒張支氣管，兩者是「生理性」拮抗，故選B。","detail":{"background":"組織胺作用於支氣管H1受體致「支氣管痙攣(收縮)」;腎上腺素作用於支氣管β2受體致「支氣管舒張」。兩者「作用於『不同受體』但產生『相反的生理效應』」,稱為「生理性拮抗(physiological/functional antagonism)」(B)。(藥理性拮抗是作用於同一受體的競爭。)故為生理性拮抗(B)。故選B。","options":{"A":"藥理性拮抗是同一受體競爭,非此。","B":"正確:不同受體相反效應是生理性拮抗。","C":"非化學性。","D":"非物理性。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-59":{"quick":"出血機會最低的NSAID是Celecoxib（選擇性COX-2），故選A。","detail":{"background":"「Celecoxib(A)」是「選擇性COX-2抑制劑」——主要抑制發炎部位的COX-2(抗發炎止痛),「較不抑制胃黏膜保護性的COX-1與血小板的TXA2」,故「胃腸道出血與抗血小板(出血)風險最低」。故出血機會最低者為celecoxib(A)。Ibuprofen、Indomethacin、Diclofenac是非選擇性NSAID(抑制COX-1,出血風險較高)。故選A。","options":{"A":"正確:celecoxib(選擇性COX-2)出血機會最低。","B":"Ibuprofen是非選擇性NSAID。","C":"Indomethacin是非選擇性NSAID。","D":"Diclofenac是非選擇性NSAID。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-52":{"quick":"H1抗組織胺「不」用於器官排斥，故選C。","detail":{"background":"H1抗組織胺的用途:過敏性疾病(A,鼻炎、蕁麻疹)、動暈症(B,第一代)、失眠症(D,第一代鎮靜)、止吐。而「器官排斥作用(C)」是用「免疫抑制劑(cyclosporine、tacrolimus等)」治療,「非抗組織胺」。故不是其用途者為器官排斥(C)。","options":{"A":"過敏性疾病是抗組織胺用途。","B":"動暈症是抗組織胺用途。","C":"正確:器官排斥用免疫抑制劑,非抗組織胺。","D":"失眠症是第一代抗組織胺用途。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-53":{"quick":"低劑量aspirin抗血栓是抑制thromboxane A2，故選A。","detail":{"background":"每天低劑量(80-120mg)aspirin抗動脈血栓的機轉是「不可逆抑制血小板的COX-1→減少『血栓素A2(thromboxane A2, TXA2)』生成」——TXA2促進血小板聚集與血管收縮,抑制之即抑制血小板聚集、預防動脈血栓。低劑量選擇性影響血小板TXA2(血小板無核無法再合成COX),較少影響血管內皮的前列環素。故抑制TXA2(A)。故選A。","options":{"A":"正確:低劑量aspirin抑制血小板TXA2,抗血栓。","B":"前列環素(prostacyclin)是血管內皮抗凝產物(高劑量才明顯抑制)。","C":"白三烯非aspirin抗血栓標的。","D":"血管收縮素II非aspirin標的。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-49":{"quick":"抗高血壓錯誤敘述為B：氣喘病人「不可」用propranolol，故選B。","detail":{"background":"抗高血壓:A「Prazosin(α1阻斷)用於嗜鉻細胞瘤引起的高血壓」(正確,阻斷兒茶酚胺的α作用);B「氣喘病人可用propranolol治高血壓」錯——propranolol(非選擇性β阻斷)會誘發氣喘,氣喘病人「禁用」;C「長期minoxidil副作用為多毛症」(正確);D「注射diazoxide治高血壓危象」(正確,開鉀通道血管擴張)。故錯誤為B。","options":{"A":"prazosin用於嗜鉻細胞瘤高血壓,正確。","B":"正確(為錯誤敘述):氣喘病人禁用propranolol。","C":"minoxidil致多毛症,正確。","D":"diazoxide治高血壓危象,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-53":{"quick":"預防暈車暈船的是Scopolamine，故選A。","detail":{"background":"「Scopolamine(東莨菪鹼,A)」是「抗膽鹼(抗蕈毒鹼)藥」,「預防與改善動暈症(暈車暈船motion sickness)」——抑制前庭與嘔吐中樞的膽鹼性傳遞,常用經皮貼片。故預防暈車暈船者為scopolamine(A)。Clonidine(α2降壓)、Succinylcholine(肌鬆)、Atenolol(β1阻斷)不治動暈症。故選A。","options":{"A":"正確:scopolamine(抗膽鹼)預防暈車暈船。","B":"Clonidine是降壓藥。","C":"Succinylcholine是肌肉鬆弛劑。","D":"Atenolol是β1阻斷劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-58":{"quick":"celecoxib阻斷前列腺素（透過COX-2），故選B。","detail":{"background":"「Celecoxib(選擇性COX-2抑制劑)」治療關節炎發炎,機轉是「抑制COX-2→阻斷『前列腺素(prostaglandin)』生成」(前列腺素是發炎、疼痛、發燒的介質)。因選擇性COX-2、較不抑制胃黏膜的COX-1,故「較少引發胃腸道出血」。故阻斷前列腺素(B)。故選B。","options":{"A":"非阻斷緩激肽。","B":"正確:celecoxib抑制COX-2阻斷前列腺素。","C":"非阻斷白三烯。","D":"非阻斷組織胺。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-62":{"quick":"具抗發炎作用的氣喘用藥是Cromolyn，故選B。","detail":{"background":"氣喘用藥分:「支氣管擴張劑(albuterol、formoterol、levalbuterol等β2致效劑,A、C、D)」與「抗發炎控制藥(吸入類固醇、白三烯拮抗、『肥大細胞穩定劑cromolyn』)」。「Cromolyn(B)」是「肥大細胞穩定劑」,抑制介質釋放、具『抗發炎(預防)』作用。故具抗發炎作用者為cromolyn(B)。Albuterol、Formoterol、Levalbuterol是支氣管擴張劑(無抗發炎)。故選B。","options":{"A":"Albuterol是β2致效支氣管擴張劑(無抗發炎)。","B":"正確:cromolyn是肥大細胞穩定劑,具抗發炎作用。","C":"Formoterol是長效β2擴張劑。","D":"Levalbuterol是β2擴張劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-51":{"quick":"與aspirin併用增加血中濃度危險性的是Warfarin，故選B。","detail":{"background":"Aspirin與「Warfarin(B)」併用會增加出血危險——aspirin抑制血小板(抗血小板)、且可置換warfarin的血漿蛋白結合使游離warfarin增加、並刺激胃黏膜,綜合「增加warfarin的抗凝效果與出血風險」。故併用增加危險者為warfarin(B)。(題意指增加warfarin作用/出血。)Antacids(降aspirin吸收)、Heparin、Probenecid作用不同。故選B。","options":{"A":"制酸劑降低aspirin吸收。","B":"正確:warfarin與aspirin併用增加出血危險。","C":"Heparin雖抗凝但非此題答案。","D":"Probenecid與aspirin競爭腎排泄(降尿酸作用相互干擾)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110030-N1-53":{"quick":"codeine錯誤敘述為D：不易出現腹瀉（反而便祕），故選D。","detail":{"background":"可待因(codeine,弱鴉片):A「具成癮性」(正確);B「具止咳作用」(正確,鎮咳常用);C「止咳劑量低於止痛劑量」(正確);D「容易出現腹瀉副作用」錯——鴉片類(含codeine)致「『便祕』(constipation)」而非腹瀉(鴉片止瀉)。故錯誤為D。","options":{"A":"codeine具成癮性,正確。","B":"codeine具止咳作用,正確。","C":"止咳劑量低於止痛劑量,正確。","D":"正確(為錯誤敘述):codeine致便祕非腹瀉。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-58":{"quick":"propranolol治甲亢震顫心悸，但「氣喘」病人不宜，故選C。","detail":{"background":"Propranolol(非選擇性β阻斷)可控制甲狀腺亢進的震顫與心悸(阻斷β受體),但「氣喘(C)病人不宜使用」——阻斷支氣管β2受體致支氣管收縮、誘發氣喘。故不宜使用者為氣喘(C)。高血壓、心搏過速、偏頭痛反而是propranolol適應症。故選C。","options":{"A":"高血壓是propranolol適應症。","B":"心搏過速是propranolol適應症。","C":"正確:氣喘病人不宜用propranolol。","D":"偏頭痛是propranolol適應症。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-57":{"quick":"aspirin需要劑量最高的作用是抗發炎，故選A。","detail":{"background":"Aspirin不同作用所需劑量:「抗血小板(抗凝血)」最低(80-100mg);「止痛、退燒」中等劑量;「抗發炎(anti-inflammatory)」需「最高劑量」(高劑量才足以抑制發炎部位的前列腺素,如治風濕性關節炎)。故需劑量最高者為抗發炎(A)。故選A。","options":{"A":"正確:抗發炎需aspirin劑量最高。","B":"止痛劑量中等。","C":"抗凝血劑量最低。","D":"退燒劑量中等。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-61":{"quick":"屬抗膽鹼性拮抗劑的氣喘藥是Ipratropium，故選C。","detail":{"background":"「Ipratropium(C)」是「抗膽鹼(抗蕈毒鹼)藥」——阻斷支氣管的蕈毒鹼受體,舒張支氣管、減少黏液分泌,用於氣喘與COPD(尤其COPD)。故抗膽鹼性拮抗劑的氣喘藥為ipratropium(C)。Cromolyn(肥大細胞穩定劑)、Omalizumab(抗IgE)、Theophylline(磷酸雙酯酶抑制/腺苷拮抗)機轉不同。故選C。","options":{"A":"Cromolyn是肥大細胞穩定劑。","B":"Omalizumab是抗IgE單株抗體。","C":"正確:ipratropium是抗膽鹼支氣管擴張劑。","D":"Theophylline是甲基黃嘌呤。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111110-N1-37":{"quick":"藉周邊作用抑制咳嗽的是Benzonatate，故選D。","detail":{"background":"止咳藥依作用部位:「中樞性」(codeine、dextromethorphan,抑制延腦咳嗽中樞)、「周邊性」——「Benzonatate(D)」麻痺呼吸道的『牽張感受器(周邊)』,抑制咳嗽反射。故藉周邊作用抑制咳嗽者為benzonatate(D)。Codeine、Dextromethorphan是中樞性;Guaifenacin是化痰劑(非止咳)。故選D。","options":{"A":"Codeine是中樞性止咳。","B":"Dextromethorphan是中樞性止咳。","C":"Guaifenesin是化痰劑。","D":"正確:benzonatate藉周邊作用(麻痺牽張感受器)止咳。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112030-N1-38":{"quick":"降低腸道水分分泌治旅行腹瀉的是Bismuth subsalicylate，故選A。","detail":{"background":"「Bismuth subsalicylate(次水楊酸鉍,A)」用於「旅行者腹瀉」——具抗發炎(水楊酸)、抗分泌(降低腸道水分分泌)、抗菌與保護黏膜作用。故降低腸道水分分泌者為bismuth subsalicylate(A)。Methylcellulose(膨脹性瀉劑)、Bisacodyl(刺激性瀉劑)、Castor oil(瀉劑)反而是『瀉劑』(治便祕)。故選A。","options":{"A":"正確:bismuth subsalicylate降腸道水分分泌,治旅行腹瀉。","B":"Methylcellulose是膨脹性瀉劑。","C":"Bisacodyl是刺激性瀉劑。","D":"Castor oil是瀉劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112110-N1-35":{"quick":"改善蕁麻疹又預防暈車的第一代抗組織胺是diphenhydramine，故選A。","detail":{"background":"「Diphenhydramine(第一代抗組織胺,A)」可「改善蕁麻疹(H1拮抗)」,並因「可過血腦障壁與抗膽鹼作用」而「預防暈車暈船(動暈症)、助眠」。故兼治蕁麻疹與預防暈車者為diphenhydramine(A)。Loratadine、Fexofenadine、Cetirizine是第二代(不過血腦障壁、不鎮靜、不用於動暈症)。故選A。","options":{"A":"正確:diphenhydramine(第一代)治蕁麻疹且預防暈車。","B":"Loratadine是第二代(不鎮靜、不治動暈症)。","C":"Fexofenadine是第二代。","D":"Cetirizine是第二代。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-32":{"quick":"治COPD抗發炎的是Corticosteroids，故選C。","detail":{"background":"慢性阻塞性肺病(COPD)用藥:支氣管擴張劑(Salmeterol長效β2、Ipratropium抗膽鹼、Terbutaline β2)＋抗發炎的「皮質類固醇(Corticosteroids,C)」(吸入型,減少氣道發炎)。題問「抗發炎」者為corticosteroids(C)。Salmeterol、Ipratropium、Terbutaline是支氣管擴張劑(無抗發炎)。故選C。","options":{"A":"Salmeterol是長效β2擴張劑。","B":"Ipratropium是抗膽鹼擴張劑。","C":"正確:corticosteroids是COPD的抗發炎用藥。","D":"Terbutaline是β2擴張劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"112180-N1-35":{"quick":"NSAIDs抑制cyclooxygenase減少前列腺素，故選A。","detail":{"background":"非類固醇抗發炎藥(NSAIDs)的機轉是「抑制『環氧化酶(cyclooxygenase, COX)』」——阻斷花生四烯酸轉成前列腺素,減少前列腺素介導的發炎、疼痛、發燒,產生抗發炎、止痛、解熱作用。故NSAIDs抑制COX(A)。ACE、HMG-CoA還原酶、黃嘌呤氧化酶非NSAID標的。故選A。","options":{"A":"正確:NSAIDs抑制環氧化酶(COX)減少前列腺素。","B":"ACE是ACE抑制劑標的。","C":"HMG-CoA還原酶是statin標的。","D":"黃嘌呤氧化酶是allopurinol標的(降尿酸)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-31":{"quick":"抑制ACh受體減少黏液的COPD藥是ipratropium，故選B。","detail":{"background":"「Ipratropium(B)」是「抗膽鹼(抗蕈毒鹼)藥」——「抑制(阻斷)支氣管平滑肌與腺體的乙醯膽鹼(ACh)受體」,舒張支氣管並「減少黏液分泌」,用於COPD。故抑制ACh受體減少黏液者為ipratropium(B)。cromolyn(肥大細胞穩定)、beclomethasone(吸入類固醇)、terbutaline(β2擴張)機轉不同。故選B。","options":{"A":"cromolyn是肥大細胞穩定劑。","B":"正確:ipratropium抑制ACh受體、減少黏液。","C":"beclomethasone是吸入類固醇。","D":"terbutaline是β2擴張劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-32":{"quick":"緊急治療過敏性休克最常用epinephrine，故選D。","detail":{"background":"「Epinephrine(腎上腺素,D)」是「過敏性休克(anaphylactic shock)」緊急治療最常用、首選——α1收縮血管升壓、β2舒張支氣管、β1強心,迅速逆轉低血壓與支氣管痙攣。故首選為epinephrine(D)。terbutaline(β2)、isoproterenol(β致效)、ephedrine(間接擬交感)非過敏性休克首選。故選D。","options":{"A":"terbutaline是β2致效劑(支氣管)。","B":"isoproterenol(β致效)不收縮血管。","C":"ephedrine作用較弱。","D":"正確:epinephrine是過敏性休克緊急首選。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113030-N1-35":{"quick":"Fexofenadine不鎮靜因「較難通過血腦障壁」，故選A。","detail":{"background":"「Fexofenadine(第二代抗組織胺)」較不具鎮靜安眠作用,原因是「較難通過血腦障壁(不易進入中樞)」——第二代抗組織胺極性較高、是P-gp受質,中樞穿透少,故較不嗜睡。故原因為較難過血腦障壁(A)。(第一代如diphenhydramine易過血腦障壁致嗜睡。)故選A。","options":{"A":"正確:fexofenadine較難過血腦障壁,故不鎮靜。","B":"非因對H1選擇性增加。","C":"非抑制中樞GABA。","D":"非因半衰期短。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-31":{"quick":"麥角生物鹼錯誤敘述為D：它「治療」偏頭痛而非「產生」偏頭痛，故選D。","detail":{"background":"麥角生物鹼(ergot alkaloids,如ergotamine):A「產生血管收縮」(正確);B「產生幻覺(如LSD是麥角衍生物)」(正確,某些麥角生物鹼);C「促進子宮收縮(ergometrine用於產後止血)」(正確);D「產生偏頭痛」錯——麥角生物鹼是「『治療』偏頭痛(收縮擴張的腦血管)」,而非「產生」偏頭痛。故錯誤為D。","options":{"A":"產生血管收縮,正確。","B":"某些麥角生物鹼產生幻覺,正確。","C":"促進子宮收縮,正確。","D":"正確(為錯誤敘述):麥角生物鹼「治療」偏頭痛,非產生。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-34":{"quick":"CGRP受體拮抗劑（gepant）是atogepant，故選D。","detail":{"background":"「Atogepant(D)」是新型偏頭痛預防藥,屬「CGRP(降鈣素基因相關胜肽)受體拮抗劑(gepant類)」——阻斷CGRP(偏頭痛發作的關鍵血管活性胜肽)的受體。故CGRP受體拮抗劑為atogepant(D)。propranolol(β阻斷預防)、sumatriptan(triptan,5-HT1致效)、dihydroergotamine(麥角)機轉不同。故選D。","options":{"A":"propranolol是β阻斷劑(偏頭痛預防)。","B":"sumatriptan是triptan(5-HT1致效)。","C":"dihydroergotamine是麥角生物鹼。","D":"正確:atogepant是CGRP受體拮抗劑(gepant)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113180-N1-36":{"quick":"預防深層靜脈栓塞的抗凝血劑是rivaroxaban，故選D。","detail":{"background":"「Rivaroxaban(D)」是「口服直接Xa因子抑制劑(抗凝血劑)」——抑制第十凝血因子(Xa),用於「預防與治療深層靜脈栓塞(DVT)、肺栓塞、心房顫動中風預防」。故抗凝血劑為rivaroxaban(D)。clopidogrel(P2Y12抗血小板)、tirofiban(GPIIb/IIIa抗血小板)、aspirin(COX-1抗血小板)是「抗血小板」非抗凝血。故選D。","options":{"A":"clopidogrel是抗血小板劑。","B":"tirofiban是抗血小板劑(GPIIb/IIIa)。","C":"aspirin是抗血小板劑。","D":"正確:rivaroxaban是抗凝血劑(Xa抑制),預防DVT。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-37":{"quick":"吸入緩解急性氣喘的是albuterol，故選A。","detail":{"background":"「Albuterol(沙丁胺醇,A)」是「短效β2腎上腺素受體致效劑(SABA)」——「吸入」後快速舒張支氣管,是「緩解急性氣喘發作」的首選急救藥。故吸入緩解急性氣喘者為albuterol(A)。Salmeterol(長效β2,維持非急救)、Beclomethasone與Mometasone(吸入類固醇,抗發炎控制非急救)。故選A。","options":{"A":"正確:albuterol(短效β2)吸入緩解急性氣喘。","B":"salmeterol是長效β2(維持非急救)。","C":"beclomethasone是吸入類固醇(控制)。","D":"mometasone是吸入類固醇(控制)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-34":{"quick":"長效型β2受體致效劑是Salmeterol，故選A。","detail":{"background":"「Salmeterol(A)」是「長效型β2腎上腺素受體致效劑(LABA)」——作用持續約12小時,用於氣喘與COPD的「長期維持控制」(須與吸入類固醇併用,不單用、非急救)。故長效β2致效劑為salmeterol(A)。Albuterol(短效β2,急救)、Naphazoline(α致效鼻充血解除)、Dobutamine(β1)不符。故選A。","options":{"A":"正確:salmeterol是長效β2致效劑(LABA)。","B":"Albuterol是短效β2(急救)。","C":"Naphazoline是α致效(鼻充血解除)。","D":"Dobutamine是β1致效(心臟)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114100-N1-35":{"quick":"Diphenhydramine錯誤敘述為C：它「有」中樞神經抑制作用，故選C。","detail":{"background":"Diphenhydramine(第一代H1抗組織胺):A「改善過敏症狀(H1拮抗)」(正確);B「口服吸收良好」(正確);C「無中樞神經抑制作用」錯——它「可過血腦障壁、『有』中樞神經抑制(鎮靜、嗜睡)作用」(故也用於助眠、動暈症);D「為H1受體拮抗劑」(正確)。故錯誤為C。","options":{"A":"改善過敏症狀,正確。","B":"口服吸收良好,正確。","C":"正確(為錯誤敘述):diphenhydramine「有」中樞抑制(鎮靜)作用。","D":"是H1受體拮抗劑,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-31":{"quick":"需體內代謝活化的前驅藥（clopidogrel）受基因影響，故選B。","detail":{"background":"「Clopidogrel(B)」是「前驅藥物(prodrug)」——須經肝臟「細胞色素P450(CYP2C19)」代謝活化才產生抗血小板活性。「CYP2C19基因多型性(慢代謝者)」會使部分人活化不足、藥效降低(治療失敗風險)。故前驅藥且受基因影響者為clopidogrel(B)。phenobarbital、rifampin(酵素誘導劑)、celecoxib非此典型前驅藥情境。故選B。","options":{"A":"phenobarbital是酵素誘導劑,非此前驅藥。","B":"正確:clopidogrel是前驅藥,CYP2C19基因影響活化。","C":"rifampin是酵素誘導劑。","D":"celecoxib非前驅藥。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-32":{"quick":"氣喘病人最易誘發發作的降血壓藥是propranolol，故選C。","detail":{"background":"氣喘病人服用「Propranolol(非選擇性β阻斷劑,C)」最易誘發氣喘——阻斷支氣管β2受體致支氣管收縮。故最易誘發氣喘者為propranolol(C)。amlodipine(鈣通道)、prazosin(α1阻斷)、clonidine(中樞α2)對氣喘安全。故選C。","options":{"A":"amlodipine(鈣通道)對氣喘安全。","B":"prazosin(α1阻斷)對氣喘安全。","C":"正確:propranolol(非選擇性β阻斷)最易誘發氣喘。","D":"clonidine對氣喘安全。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-34":{"quick":"緩解支氣管痙攣最佳的是ipratropium（吸入抗膽鹼），故選A。","detail":{"background":"「Ipratropium(A)」是「吸入型抗膽鹼(抗蕈毒鹼)藥」——舒張支氣管平滑肌、緩解支氣管痙攣(尤其COPD,也用於氣喘),「局部吸入、全身副作用少」。故緩解支氣管痙攣最佳者為ipratropium(A)。phentolamine(α阻斷)、physostigmine(膽鹼酯酶抑制,反而支氣管收縮)、atropine(全身抗膽鹼,副作用多)不及吸入型ipratropium。故選A。","options":{"A":"正確:ipratropium(吸入抗膽鹼)緩解支氣管痙攣最佳。","B":"phentolamine是α阻斷劑。","C":"physostigmine增加乙醯膽鹼,反致支氣管收縮。","D":"atropine全身抗膽鹼副作用多,不及吸入型。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-35":{"quick":"不是三環抗憂鬱藥機制的是「抑制單胺氧化酶」，故選B。","detail":{"background":"三環抗憂鬱藥(TCA)的作用機制:抑制正腎上腺素與血清素再回收(A,主要抗憂鬱機轉)、阻斷毒蕈鹼受體(C,致口乾便祕視力模糊)、阻斷組織胺受體(D,致鎮靜)、阻斷α受體(姿勢性低血壓)。而「抑制單胺氧化酶(MAO,B)」是「MAO抑制劑」的機制,「非TCA」。故不是TCA機制者為B。故選B。","options":{"A":"抑制NE與血清素再回收是TCA機制。","B":"正確(為非TCA機制):抑制MAO是MAO抑制劑機制,非TCA。","C":"阻斷毒蕈鹼受體是TCA機制(副作用)。","D":"阻斷組織胺受體是TCA機制(鎮靜)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-37":{"quick":"較不易昏睡的抗組織胺是loratadine（第二代），故選A。","detail":{"background":"「Loratadine(第二代抗組織胺,A)」「較不易有昏睡(鎮靜)副作用」——第二代抗組織胺極性高、不易過血腦障壁,中樞抑制少。故較不昏睡者為loratadine(A)。bromopheniramine、diphenhydramine、clemastine是第一代(可過血腦障壁、致嗜睡)。故選A。","options":{"A":"正確:loratadine(第二代)較不易昏睡。","B":"bromopheniramine是第一代(嗜睡)。","C":"diphenhydramine是第一代(嗜睡)。","D":"clemastine是第一代(嗜睡)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-55":{"quick":"Diphenhydramine（第一代）有較強鎮靜作用，故選C。","detail":{"background":"Diphenhydramine是第一代H1抗組織胺,與第二代差別:第一代「可過血腦障壁→有較強的『鎮靜(嗜睡)』作用」(C),且有明顯抗膽鹼(anticholinergic)作用、局部麻醉作用。第二代(loratadine)較不過血腦障壁、不鎮靜。故差別在第一代有較強鎮靜作用(C)。A錯(對H1非H2)、B錯(有抗膽鹼作用)、D錯(具局部麻醉作用)。故選C。","options":{"A":"是對H1非H2受體。","B":"第一代「有」抗膽鹼作用。","C":"正確:第一代有較強鎮靜作用。","D":"第一代具局部麻醉作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-60":{"quick":"castor oil水解產生ricinoleic acid而瀉，故選C。","detail":{"background":"蓖麻油(castor oil)是「刺激性瀉劑」——在小腸被脂解酶水解產生「蓖麻油酸(ricinoleic acid,C)」,刺激腸黏膜、增加腸蠕動與分泌而瀉。故水解產物為ricinoleic acid(C)。anthraquinone(番瀉葉senna的成分)、bisacodyl、danthron是其他刺激性瀉劑(非castor oil水解產物)。故選C。","options":{"A":"anthraquinone是番瀉葉成分。","B":"bisacodyl是另一刺激性瀉劑。","C":"正確:castor oil水解產生ricinoleic acid。","D":"danthron是另一蒽醌類瀉劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-56":{"quick":"維持新生兒動脈導管開放的是alprostadil（PGE1），故選D。","detail":{"background":"「Alprostadil(前列腺素E1, PGE1,D)」用於「維持新生兒(先天性心臟病等待手術者)的動脈導管開放(patent ductus arteriosus)」——PGE1舒張動脈導管平滑肌、防止其閉合,維持依賴導管的循環。故維持動脈導管開放者為alprostadil(D)。dinoprostone(PGE2,引產)、latanoprost(青光眼)、misoprostol(PGE1但用於潰瘍/引產)用途不同。(關閉動脈導管則用indomethacin抑制前列腺素。)故選D。","options":{"A":"dinoprostone(PGE2)用於引產。","B":"latanoprost治青光眼。","C":"misoprostol用於潰瘍預防/引產。","D":"正確:alprostadil(PGE1)維持動脈導管開放。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-59":{"quick":"口服生體可用率>90%的H2阻斷劑是nizatidine，故選A。","detail":{"background":"H2受體阻斷劑中,「Nizatidine(A)」的口服生體可用率「大於90%」(幾乎完全吸收,無明顯首渡效應)。famotidine、ranitidine、cimetidine的生體可用率較低(約40-60%,有首渡效應)。故生體可用率>90%者為nizatidine(A)。故選A。","options":{"A":"正確:nizatidine口服生體可用率>90%。","B":"famotidine生體可用率約40-50%。","C":"ranitidine生體可用率約50%。","D":"cimetidine生體可用率約60%。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-60":{"quick":"消化性潰瘍三合一療法用clarithromycin，故選C。","detail":{"background":"幽門桿菌相關消化性潰瘍的「三合一療法(triple therapy)」＝「質子幫浦抑制劑(PPI)＋兩種抗生素(常為clarithromycin＋amoxicillin或metronidazole)」。「Clarithromycin(C)」是其中的抗生素。故三合一療法用藥為clarithromycin(C)。misoprostol(前列腺素)、dicyclomine(抗膽鹼解痙)、sodium bicarbonate(制酸)非三合一療法成分。故選C。","options":{"A":"misoprostol是前列腺素(非三合一抗生素)。","B":"dicyclomine是抗膽鹼解痙劑。","C":"正確:clarithromycin是三合一療法的抗生素。","D":"sodium bicarbonate是制酸劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-55":{"quick":"misoprostol正確敘述為C：屬prostaglandin E1同類物，故選C。","detail":{"background":"Misoprostol:A「無法抑制胃酸分泌」錯(它『抑制』胃酸分泌、促黏液保護);B「懷孕婦女可使用」錯(它『收縮子宮』,孕婦『禁用』,可致流產);C「屬prostaglandin E1的同類物(PGE1類似物)」正確;D「不可與mifepristone(RU-486)同時服用」錯(misoprostol常『與』mifepristone『併用』於藥物流產)。故正確為C。","options":{"A":"misoprostol抑制胃酸分泌。","B":"孕婦禁用(收縮子宮致流產)。","C":"正確:misoprostol是PGE1同類物。","D":"可與mifepristone併用於藥物流產。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-60":{"quick":"misoprostol正確敘述為B：可活化前列腺素E（受體），故選B。","detail":{"background":"Misoprostol是「前列腺素E1(PGE1)類似物」:B「可以活化前列腺素E受體」正確(作用於壁細胞的EP受體,抑制胃酸、促黏液與碳酸氫根);A錯(它是PGE「1」非PGE2結構相似物);C錯(它經EP受體降低胞內cAMP抑制胃酸,非增加cGMP);D錯(它對消化性潰瘍療效『不優於』質子幫浦抑制劑,PPI抑酸更強)。故正確為B。","options":{"A":"是PGE1類似物,非PGE2。","B":"正確:misoprostol活化前列腺素E受體。","C":"非增加cGMP(經EP受體降cAMP抑酸)。","D":"療效不優於質子幫浦抑制劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-49":{"quick":"加強verapamil代謝降低藥效的是phenobarbital（酵素誘導），故選A。","detail":{"background":"「Phenobarbital(巴比妥,A)」是強力「肝臟細胞色素P450『酵素誘導劑』」——誘導P450使verapamil代謝加速、血中濃度下降、藥效降低。故加強verapamil代謝者為phenobarbital(A)。erythromycin、cimetidine、ketoconazole反而是P450「抑制劑」(會『增加』verapamil濃度)。故選A。","options":{"A":"正確:phenobarbital誘導P450,加速verapamil代謝。","B":"erythromycin抑制P450(增加濃度)。","C":"cimetidine抑制P450(增加濃度)。","D":"ketoconazole抑制P450(增加濃度)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-55":{"quick":"治NSAID引起消化性潰瘍的前列腺素藥是misoprostol，故選A。","detail":{"background":"「Misoprostol(PGE1類似物,A)」用於「預防/治療NSAID引起的消化性潰瘍」——NSAID抑制前列腺素使胃黏膜保護減弱致潰瘍,misoprostol補充前列腺素作用(抑酸、促黏液與碳酸氫根、增黏膜血流)保護胃黏膜。故治NSAID潰瘍者為misoprostol(A)。latanoprost(青光眼)、dinoprostone(引產)、prostacyclin(PGI2)用途不同。故選A。","options":{"A":"正確:misoprostol(PGE1)治NSAID引起的消化性潰瘍。","B":"latanoprost治青光眼。","C":"dinoprostone用於引產。","D":"prostacyclin(PGI2)用於肺高壓。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-59":{"quick":"Ondansetron止吐機轉是serotonin拮抗劑（5-HT3），故選D。","detail":{"background":"「Ondansetron(D)」止吐機轉是「血清素(serotonin)5-HT3受體拮抗劑」——阻斷腸道與中樞化學感應區(CTZ)的5-HT3受體,「最有效治療化療/放療/術後引起的噁心嘔吐」。故為serotonin拮抗劑(D)。多巴胺拮抗(metoclopramide)、膽鹼拮抗(scopolamine)、組織胺拮抗(抗組織胺)是其他止吐機轉。故選D。","options":{"A":"多巴胺拮抗是metoclopramide。","B":"膽鹼拮抗是scopolamine。","C":"組織胺拮抗是抗組織胺。","D":"正確:ondansetron是serotonin(5-HT3)拮抗劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-59":{"quick":"misoprostol機轉是prostaglandin E1合成化合物，故選C。","detail":{"background":"抗胃潰瘍藥「Misoprostol」的機轉是「『前列腺素E1(PGE1)的合成類似物』」——補充前列腺素作用:抑制胃酸分泌、促進黏液與碳酸氫根分泌、增加黏膜血流,保護胃黏膜(尤其NSAID引起的潰瘍)。故為PGE1合成化合物(C)。它非抑制質子幫浦(A,那是PPI)、非H2拮抗(B)、非制酸中和(D)。故選C。","options":{"A":"抑制H-K-ATPase是PPI。","B":"H2拮抗是cimetidine等。","C":"正確:misoprostol是PGE1合成類似物。","D":"酸鹼中和是制酸劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-60":{"quick":"最可能使高血壓患者血壓升高的制酸劑是碳酸氫鈉，故選D。","detail":{"background":"「碳酸氫鈉(NaHCO3, sodium bicarbonate,D)」是含「鈉」的制酸劑——大量使用會增加鈉負荷與水分滯留,可能「使高血壓患者血壓升高」(及代謝性鹼中毒、鈉滯留)。故使血壓升高者為碳酸氫鈉(D)。氫氧化鋁、氫氧化鎂、碳酸鈣不含大量鈉。故選D。","options":{"A":"氫氧化鋁不含鈉,致便祕。","B":"氫氧化鎂不含鈉,致腹瀉。","C":"碳酸鈣不含鈉。","D":"正確:碳酸氫鈉含鈉,可能升高血壓。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-58":{"quick":"cimetidine正確敘述為D：可治胃酸逆流的心灼熱，故選D。","detail":{"background":"Cimetidine是「H2組織胺受體拮抗劑」:D「用於治療胃酸逆流的心灼熱(heartburn)」正確(抑制胃酸分泌);A、B錯(它阻斷H2受體→『降低』壁細胞cAMP→抑制胃酸,非促進cAMP/cGMP);C錯(它是「H2」受體拮抗劑非H1)。故正確為D。(cimetidine也抑制P450,有藥物交互作用。)故選D。","options":{"A":"cimetidine阻斷H2降低cAMP,非促進。","B":"非促進cGMP。","C":"是H2受體拮抗劑,非H1。","D":"正確:cimetidine治胃酸逆流的心灼熱。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-60":{"quick":"容易產生腹瀉的制酸劑是氫氧化鎂Mg(OH)2，故選A。","detail":{"background":"制酸劑的腸道副作用:「氫氧化鎂(Mg(OH)2,A)」——鎂鹽「易致腹瀉(滲透性)」;而「氫氧化鋁(Al(OH)3)」與碳酸鈣易致「便祕」。故易腹瀉者為氫氧化鎂(A)。(臨床常將鋁鹽與鎂鹽併用以平衡便祕與腹瀉。)故選A。","options":{"A":"正確:氫氧化鎂(鎂鹽)易致腹瀉。","B":"氯化鈣非典型制酸劑。","C":"碳酸氫鈉致鈉滯留。","D":"氫氧化鋁致便祕。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-54":{"quick":"misoprostol誘發子宮收縮是刺激前列腺素E1受體，故選C。","detail":{"background":"Misoprostol是「前列腺素E1(PGE1)類似物」,「刺激前列腺素E(EP)受體」——在子宮平滑肌的EP受體致「子宮強烈收縮」(故用於引產、產後止血、藥物流產;孕婦禁用於潰瘍預防)。故誘發子宮收縮是刺激PGE1(EP)受體(C)。故選C。","options":{"A":"非阻斷TXA2合成。","B":"非阻斷PGI2合成。","C":"正確:misoprostol刺激前列腺素E1(EP)受體致子宮收縮。","D":"非刺激PGF2受體。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-58":{"quick":"對胃酸分泌抑制能力最好的是質子幫浦抑制劑（PPI），故選A。","detail":{"background":"治療消化性潰瘍的藥物中,「氫離子幫浦抑制劑(proton pump inhibitor, PPI,如omeprazole,A)」對胃酸分泌的「抑制能力最強」——不可逆抑制壁細胞的H-K-ATPase(胃酸分泌最終共同步驟),抑酸效果優於H2拮抗劑、制酸劑、sucralfate。故抑酸最佳者為PPI(A)。故選A。","options":{"A":"正確:質子幫浦抑制劑(PPI)抑酸能力最強。","B":"sucralfate是黏膜保護劑,不抑酸。","C":"H2拮抗劑抑酸不及PPI。","D":"制酸劑只中和已分泌的酸。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-55":{"quick":"H1抗組織劑「不」用於胃潰瘍，故選B。","detail":{"background":"H1組織胺受體拮抗劑(抗組織胺)的用途:過敏反應(A)、暈車暈船(C,第一代)、噁心嘔吐(D,第一代止吐)、失眠。而「胃潰瘍(B)」是用「『H2』受體拮抗劑(cimetidine)」或PPI治療,「非H1拮抗劑」(胃酸分泌由H2受體介導)。故不是H1用途者為胃潰瘍(B)。故選B。","options":{"A":"過敏反應是H1拮抗劑用途。","B":"正確:胃潰瘍用H2拮抗劑,非H1。","C":"暈車暈船是第一代H1用途。","D":"噁心嘔吐是第一代H1用途。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-60":{"quick":"神經損傷長期臥床者較適合刺激型輕瀉劑，故選A。","detail":{"background":"神經損傷長期臥床病人(腸蠕動減弱、無法配合膨脹性瀉劑需多喝水)較適合「刺激型輕瀉劑(stimulant laxatives,如senna、bisacodyl,A)」——直接刺激腸壁神經叢增加蠕動,效果確實。膨脹性瀉劑(C)需大量水分與活動配合(臥床者不適);滲透性(B)亦可但刺激型較常用於臥床者;鴉片受體拮抗劑(D)用於鴉片引起的便祕。故較適合者為刺激型輕瀉劑(A)。故選A。","options":{"A":"正確:刺激型輕瀉劑適合長期臥床者。","B":"滲透性瀉劑亦可但非最適。","C":"膨脹性瀉劑需大量水分與活動,臥床者不適。","D":"鴉片受體拮抗劑用於鴉片引起便祕。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-61":{"quick":"治療輕度結腸炎第一線是Mesalamine，故選D。","detail":{"background":"發炎性腸道疾病(IBD)中,「Mesalamine(5-胺基水楊酸, 5-ASA,D)」是「輕度至中度潰瘍性結腸炎的第一線用藥」——局部抗發炎作用於腸黏膜。故輕度結腸炎第一線為mesalamine(D)。Natalizumab、Infliximab(抗TNF生物製劑)、Methotrexate用於中重度/難治型(非輕度第一線)。故選D。","options":{"A":"Natalizumab用於中重度/難治。","B":"Infliximab(抗TNF)用於中重度。","C":"Methotrexate用於中重度。","D":"正確:mesalamine是輕度結腸炎第一線用藥。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-52":{"quick":"抗精神病藥止吐因作用於腦幹化學感應區（CTZ），故選C。","detail":{"background":"大部分抗精神病藥(如phenothiazine、haloperidol)具止吐功能,原因是「阻斷腦幹『化學感應區(chemoreceptor trigger zone, CTZ)』的多巴胺D2受體」——CTZ的D2受體被活化會引發嘔吐,抗精神病藥阻斷之而止吐。故作用於CTZ(C)。非活化周邊5-HT3(那是致吐)、非抑制迷走神經、非抑制小腦平衡。故選C。","options":{"A":"活化5-HT3反而致吐(止吐是拮抗)。","B":"非抑制迷走神經。","C":"正確:抗精神病藥阻斷CTZ的D2受體而止吐。","D":"非抑制小腦平衡。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-58":{"quick":"loperamide正確敘述為B：直接抑制大腸平滑肌蠕動，故選B。","detail":{"background":"鴉片類止瀉藥「Loperamide」:B「作用機轉為直接抑制大腸平滑肌蠕動,並減少乙醯膽鹼釋放(經腸道鴉片受體)」正確;A錯(loperamide「不易過血腦障壁、不影響中樞」,故無成癮性);C錯(「中毒性/感染性腹瀉(發燒血便)不適合用」,以免延長病原停留);D錯(吸著氣體細菌的是kaolin/pectin、活性碳,非loperamide)。故正確為B。","options":{"A":"loperamide不過血腦障壁、不影響中樞。","B":"正確:loperamide直接抑制大腸蠕動、減少乙醯膽鹼。","C":"中毒性/感染性腹瀉不適合用loperamide。","D":"吸著氣體細菌是kaolin/pectin。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106030-N1-60":{"quick":"抑制P450的抗胃潰瘍藥是Cimetidine，故選B。","detail":{"background":"「Cimetidine(H2拮抗劑,B)」有「抑制肝臟細胞色素P450」的作用——會減慢多種藥物(warfarin、phenytoin、theophylline等)的代謝、增加其血中濃度(藥物交互作用)。故抑制P450者為cimetidine(B)。Ondansetron(止吐)、Nizatidine與Ranitidine(其他H2拮抗劑,對P450影響較小)。故選B。","options":{"A":"Ondansetron是止吐劑。","B":"正確:cimetidine抑制P450。","C":"Nizatidine對P450影響小。","D":"Ranitidine對P450影響小。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-59":{"quick":"屬於治療氣喘的藥是terbutaline，故選A。","detail":{"background":"「Terbutaline(A)」是「β2腎上腺素受體致效劑」,「舒張支氣管,治療氣喘」。故氣喘用藥為terbutaline(A)。cimetidine(H2拮抗,治潰瘍)、dextromethorphan(止咳)、propranolol(β阻斷,反而誘發氣喘)非氣喘用藥。故選A。","options":{"A":"正確:terbutaline(β2致效)治氣喘。","B":"cimetidine治潰瘍。","C":"dextromethorphan止咳。","D":"propranolol誘發氣喘(禁用)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-49":{"quick":"最能產生肝臟酵素誘導的是phenobarbital，故選A。","detail":{"background":"「Phenobarbital(巴比妥,A)」是典型強力「肝臟細胞色素P450『酵素誘導劑』」——增加P450活性,加速自身與其他藥物(warfarin、口服避孕藥等)的代謝(致藥效降低)。故最能酵素誘導者為phenobarbital(A)。cimetidine、ketoconazole、erythromycin反而是P450「抑制劑」。故選A。","options":{"A":"正確:phenobarbital是強力肝酵素誘導劑。","B":"cimetidine是P450抑制劑。","C":"ketoconazole是P450抑制劑。","D":"erythromycin是P450抑制劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-61":{"quick":"增加腸道分節收縮的類鴉片止瀉劑是Loperamide，故選B。","detail":{"background":"「Loperamide(B)」是「類鴉片止瀉藥」——作用於腸道鴉片受體,「增加腸道分節性收縮(減少推進性蠕動)、延長腸內容物停留、增加水分吸收」而止瀉,且不過血腦障壁(無成癮)。故類鴉片止瀉劑為loperamide(B)。Bismuth(抗分泌)、Pectin(吸附)、Dicyclomine(抗膽鹼解痙)機轉不同。故選B。","options":{"A":"Bismuth是抗分泌/保護劑。","B":"正確:loperamide是類鴉片止瀉劑。","C":"Pectin是吸附劑。","D":"Dicyclomine是抗膽鹼解痙劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-58":{"quick":"止痛劑引起的胃潰瘍最有效改善的是misoprostol，故選D。","detail":{"background":"NSAID(止痛劑)引起的胃潰瘍是因「抑制前列腺素」使胃黏膜保護減弱。「Misoprostol(PGE1類似物,D)」「補充前列腺素作用」(抑酸、促黏液與碳酸氫根),「最對症」改善/預防NSAID引起的潰瘍。故最有效者為misoprostol(D)。sucralfate(黏膜保護)、bismuth、gelusil(制酸)效果不及misoprostol針對NSAID機轉。故選D。","options":{"A":"sucralfate是黏膜保護劑(非針對NSAID機轉)。","B":"bismuth subsalicylate是保護/抗分泌劑。","C":"gelusil是制酸劑。","D":"正確:misoprostol補充前列腺素,最改善NSAID引起的潰瘍。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-59":{"quick":"制酸劑中容易腹瀉的是magnesium hydroxide，故選D。","detail":{"background":"制酸劑的腸道副作用:「氫氧化鎂(magnesium hydroxide,D)」——鎂鹽「致腹瀉(滲透性)」;氫氧化鋁(aluminum hydroxide)、碳酸鈣致便祕。故致腹瀉者為magnesium hydroxide(D)。bismuth subsalicylate非典型致腹瀉。故選D。","options":{"A":"aluminum hydroxide致便祕。","B":"bismuth subsalicylate非致腹瀉。","C":"calcium carbonate致便祕。","D":"正確:magnesium hydroxide(鎂鹽)致腹瀉。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-52":{"quick":"拮抗多巴胺D2受體促胃腸蠕動的是Domperidone，故選D。","detail":{"background":"「Domperidone(D)」(及metoclopramide)是「促胃腸動力藥」,機轉是「拮抗多巴胺D2受體」——多巴胺抑制胃腸蠕動,拮抗D2受體即增加胃排空與腸蠕動(也阻斷CTZ的D2而止吐)。domperidone不過血腦障壁(較少錐體外副作用)。故拮抗D2促蠕動者為domperidone(D)。Bethanechol、Neostigmine(膽鹼性)、Erythromycin(motilin受體致效)機轉不同。故選D。","options":{"A":"Bethanechol是膽鹼致效劑。","B":"Neostigmine是膽鹼酯酶抑制劑。","C":"Erythromycin經motilin受體促蠕動。","D":"正確:domperidone拮抗多巴胺D2受體促蠕動。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-62":{"quick":"活化氯離子通道增加腸液治慢性便祕的是Lubiprostone，故選C。","detail":{"background":"「Lubiprostone(C)」治療慢性便祕的機轉是「活化腸上皮的『氯離子通道(ClC-2)』」——增加腸腔氯離子與水分分泌,軟化糞便、促進排便。故活化氯通道增加腸液者為lubiprostone(C)。Glycerin suppositories(甘油塞劑,潤滑/滲透)、Mineral oil(潤滑)、Aluminum hydroxide(制酸,反致便祕)機轉不同。故選C。","options":{"A":"Glycerin suppositories是潤滑/滲透塞劑。","B":"Mineral oil是潤滑性瀉劑。","C":"正確:lubiprostone活化氯通道增加腸液。","D":"Aluminum hydroxide是制酸劑(致便祕)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-58":{"quick":"屬腸刺激/興奮劑的瀉劑是castor oil，故選B。","detail":{"background":"「Castor oil(蓖麻油,B)」是「腸刺激(興奮)型瀉劑」——水解產生蓖麻油酸刺激腸黏膜增加蠕動與分泌。故腸刺激型瀉劑為castor oil(B)。mineral oil(潤滑性)、docusate sodium(軟便/界面活性)、glycerin suppositories(滲透/潤滑塞劑)是其他類型。故選B。","options":{"A":"mineral oil是潤滑性瀉劑。","B":"正確:castor oil是腸刺激型瀉劑。","C":"docusate sodium是軟便劑(界面活性)。","D":"glycerin suppositories是滲透/潤滑塞劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-61":{"quick":"使鼻黏膜小動脈收縮的鼻充血解除劑是α1致效劑，故選B。","detail":{"background":"鼻充血腫脹解除劑(decongestant)是「α1腎上腺素受體致效劑(α1 adrenergic agonists,B,如phenylephrine、oxymetazoline)」——「收縮鼻黏膜小動脈、減少充血腫脹」,改善鼻塞。故為α1致效劑(B)。H2抗組織胺(胃酸)、theophylline(支氣管)、cromolyn(肥大細胞穩定)不是鼻充血解除劑。故選B。","options":{"A":"H2抗組織胺治胃酸,非鼻充血。","B":"正確:α1致效劑收縮鼻黏膜血管,解除鼻充血。","C":"theophylline是支氣管擴張劑。","D":"cromolyn是肥大細胞穩定劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-60":{"quick":"Cimetidine抑制胃酸是拮抗H2 histamine受體，故選B。","detail":{"background":"「Cimetidine(B)」抑制胃酸分泌的機轉是「拮抗壁細胞的H2組織胺受體」——組織胺經H2受體刺激壁細胞分泌胃酸,拮抗H2即減少胃酸分泌(治潰瘍、胃酸逆流)。故為拮抗H2受體(B)。它非活化前列腺素受體、非拮抗膽鹼受體、非抑制質子幫浦(那是PPI)。故選B。","options":{"A":"非活化前列腺素受體(那是misoprostol)。","B":"正確:cimetidine拮抗H2組織胺受體抑酸。","C":"非拮抗膽鹼受體。","D":"抑制質子幫浦是PPI。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109110-N1-61":{"quick":"常與docusate合用治鴉片便祕的腸刺激劑是Senna，故選A。","detail":{"background":"「Senna(番瀉葉,A)」是「腸刺激(興奮)型瀉劑」(蒽醌類,刺激腸壁神經叢增蠕動),「常與軟便劑docusate合用」治療鴉片類藥物引起的便祕(鴉片致腸蠕動減慢)。故腸刺激劑為senna(A)。Magnesium citrate(滲透性)、Bismuth subsalicylate(抗分泌)、Diphenoxylate(止瀉,非瀉劑)機轉不同。故選A。","options":{"A":"正確:senna是腸刺激型瀉劑,治鴉片便祕。","B":"Magnesium citrate是滲透性瀉劑。","C":"Bismuth subsalicylate是抗分泌劑。","D":"Diphenoxylate是止瀉藥(相反)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-57":{"quick":"具強力止吐作用的是Ondansetron，故選D。","detail":{"background":"「Ondansetron(D)」是「5-HT3血清素受體拮抗劑」,「具強力止吐作用」——尤其有效治療化療、放療、術後引起的嚴重噁心嘔吐。故強力止吐者為ondansetron(D)。Sibutramine(減重)、Tegaserod(5-HT4致效,腸動力)、Buspirone(抗焦慮)非止吐劑。故選D。","options":{"A":"Sibutramine是減重藥。","B":"Tegaserod是5-HT4致效劑(腸動力)。","C":"Buspirone是抗焦慮藥。","D":"正確:ondansetron(5-HT3拮抗)具強力止吐作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-60":{"quick":"Sucralfate錯誤敘述為B：需「酸性（低pH）」環境活化，故選B。","detail":{"background":"Sucralfate(黏膜保護劑):A「與黏膜上(潰瘍處)帶正電的蛋白質結合形成保護層」(正確);B「需在高pH環境活化」錯——sucralfate需在「『酸性(低pH)』環境下活化」聚合成黏稠保護層(故『不宜與』抑酸劑如PPI/H2拮抗併用,會降低其活化,C正確);C(不宜與omeprazole併用)正確;D「無法預防aspirin造成的消化性潰瘍」(此為題目選項,sucralfate主要是保護已有潰瘍,預防NSAID潰瘍效果有限)。故錯誤為B(應為低pH/酸性活化)。","options":{"A":"與潰瘍處帶正電蛋白結合,正確。","B":"正確(為錯誤敘述):sucralfate需「酸性(低pH)」活化,非高pH。","C":"不宜與omeprazole併用(抑酸降低活化),正確。","D":"此為題給選項(預防NSAID潰瘍效果有限)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"110110-N1-61":{"quick":"預防aspirin引起消化性潰瘍的是Misoprostol，故選C。","detail":{"background":"「Misoprostol(PGE1類似物,C)」可「預防或減輕aspirin/NSAID引起的消化性潰瘍」——補充前列腺素的胃黏膜保護作用(抑酸、促黏液與碳酸氫根)。故預防NSAID潰瘍者為misoprostol(C)。Bisacodyl、Lactulose、Sorbitol是瀉劑(不保護胃)。故選C。","options":{"A":"Bisacodyl是刺激性瀉劑。","B":"Lactulose是滲透性瀉劑。","C":"正確:misoprostol預防aspirin/NSAID引起的潰瘍。","D":"Sorbitol是滲透性瀉劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"111030-N1-60":{"quick":"常合併metoclopramide增強止吐的是Dexamethasone，故選B。","detail":{"background":"「Dexamethasone(地塞米松,類固醇,B)」具「止吐作用」,「常與metoclopramide或5-HT3拮抗劑合併」以增強化療引起噁心嘔吐的止吐效果(類固醇的止吐機轉未完全明,可能抗發炎與中樞作用)。故合併metoclopramide增強止吐者為dexamethasone(B)。Loperamide(止瀉)、Lubiprostone(瀉劑)、Methylcellulose(膨脹瀉劑)非止吐劑。故選B。","options":{"A":"Loperamide是止瀉藥。","B":"正確:dexamethasone具止吐作用,合併metoclopramide增效。","C":"Lubiprostone是瀉劑。","D":"Methylcellulose是膨脹性瀉劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-32":{"quick":"propofol正確敘述為B：具良好止吐效果，故選B。","detail":{"background":"全身麻醉劑Propofol:B「具有良好的止吐效果」正確(是其優點,甦醒平順少噁心);A錯(propofol「只能靜脈注射」,不能吸入);C錯(它主要「增強GABA-A受體」作用而麻醉,非抑制麩胺酸受體);D錯(propofol「脂溶性高、水溶性差」,製成乳劑給藥)。故正確為B。(propofol起效快、甦醒快,用於麻醉誘導與維持、加護鎮靜。)故選B。","options":{"A":"propofol只能靜脈注射,不能吸入。","B":"正確:propofol具良好止吐效果。","C":"主要增強GABA-A,非抑制麩胺酸。","D":"propofol脂溶性高、水溶性差(乳劑)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-34":{"quick":"降胃酸促胃黏液的前列腺素致效劑是misoprostol，故選A。","detail":{"background":"「Misoprostol(前列腺素E1致效劑,A)」——「降低胃酸釋出、促進胃黏液(與碳酸氫根)產生」,保護胃黏膜(預防NSAID引起的潰瘍)。故前列腺素致效劑為misoprostol(A)。mifepristone(抗黃體素)、naratriptan(triptan偏頭痛)、famotidine(H2拮抗)機轉不同。故選A。","options":{"A":"正確:misoprostol是前列腺素致效劑,降胃酸促黏液。","B":"mifepristone是抗黃體素(流產)。","C":"naratriptan是triptan(偏頭痛)。","D":"famotidine是H2拮抗劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"113100-N1-37":{"quick":"抑制腸胃蠕動治嚴重腹瀉的是loperamide，故選D。","detail":{"background":"「Loperamide(D)」是「抗腸蠕動劑(antimotility agent)」——作用於腸道鴉片受體抑制腸蠕動、延長停留、增加水分吸收,治療「嚴重(非感染性)腹瀉」。故抗腸蠕動劑為loperamide(D)。metoclopramide、domperidone、prucalopride反而是「促」腸動力藥(治便祕/胃輕癱)。故選D。","options":{"A":"metoclopramide是促動力藥。","B":"domperidone是促動力藥。","C":"prucalopride是促動力藥(5-HT4致效)。","D":"正確:loperamide抑制腸蠕動治嚴重腹瀉。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114030-N1-34":{"quick":"調節血清素達抗憂鬱的是fluoxetine，故選B。","detail":{"background":"「Fluoxetine(百憂解,B)」是「選擇性血清素回收抑制劑(SSRI)」——抑制血清素回收、增加突觸血清素,達「抗憂鬱」效果。故調節血清素抗憂鬱者為fluoxetine(B)。ergonovine(麥角,子宮收縮)、ondansetron(5-HT3拮抗止吐)、sumatriptan(5-HT1致效偏頭痛)雖也作用於血清素系統但非抗憂鬱。故選B。","options":{"A":"ergonovine是麥角生物鹼(子宮收縮)。","B":"正確:fluoxetine(SSRI)調節血清素抗憂鬱。","C":"ondansetron是5-HT3拮抗止吐劑。","D":"sumatriptan是5-HT1致效偏頭痛藥。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"114170-N1-38":{"quick":"PPI正確敘述為D：可能減少鈣吸收、增加骨折風險，故選D。","detail":{"background":"質子幫浦抑制劑(PPI):A「會明顯減少clopidogrel抗血小板活性」——某些PPI(omeprazole)抑制CYP2C19、可能降低clopidogrel活化,但臨床意義有爭議,題以D為正解;B「不能用於aspirin造成的消化性潰瘍」錯(PPI『可』用於NSAID/aspirin引起的潰瘍與預防);C「應飯前30-60分鐘服用」正確(PPI需在進食刺激質子幫浦活化前達血中濃度);D「可能減少鈣的吸收,增加骨折風險」正確(長期PPI抑酸減少鈣吸收、增加骨質疏鬆骨折風險)。故正確敘述為D。","options":{"A":"PPI對clopidogrel影響臨床意義有爭議。","B":"PPI可用於aspirin/NSAID引起的潰瘍。","C":"PPI應飯前服用(正確,但題取D)。","D":"正確:PPI長期可能減少鈣吸收、增加骨折風險。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"115030-N1-31":{"quick":"治腹瀉、有腸道抗菌、預防旅行腹瀉的是bismuth subsalicylate，故選B。","detail":{"background":"「Bismuth subsalicylate(次水楊酸鉍,B)」可「治療腹瀉、具腸道抗菌(抗幽門桿菌與某些腸道菌)效果,並『預防旅行者腹瀉(traveler diarrhea)』」——抗分泌、抗發炎(水楊酸)、保護黏膜與抗菌。故符合者為bismuth subsalicylate(B)。sucralfate(黏膜保護)、cimetidine(抑酸)、cholestyramine(膽酸結合)不符。故選B。","options":{"A":"sucralfate是黏膜保護劑。","B":"正確:bismuth subsalicylate治腹瀉、抗菌、預防旅行腹瀉。","C":"cimetidine是H2拮抗劑(抑酸)。","D":"cholestyramine是膽酸結合樹脂。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-49":{"quick":"糖皮質酮與類固醇受體結合屬「細胞內受體」，故選D。","detail":{"background":"糖皮質酮(glucocorticoids,類固醇)是脂溶性,可穿過細胞膜,與「細胞內(細胞質/核)受體(intracellular receptor)」結合,形成複合體進入細胞核調控基因轉錄(影響蛋白質合成),作用較慢但持久。故為細胞內受體(D)。GPCR、酵素連結受體、離子通道型受體是水溶性激素的膜受體。故選D。","options":{"A":"GPCR是水溶性激素膜受體。","B":"酵素連結受體(如胰島素)是膜受體。","C":"離子通道型是膜受體。","D":"正確:類固醇與細胞內受體結合。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-61":{"quick":"升糖激素「不」用於診斷第二型糖尿病，故選C。","detail":{"background":"升糖激素(glucagon)的臨床用途:治療嚴重低血糖(A,昏迷無法口服糖時注射)、β受體阻斷劑/鈣通道阻斷劑中毒的解毒劑(B,繞過β受體增加心肌cAMP)、腸道放射診斷時鬆弛腸道(D)。而「診斷第二型糖尿病(C)」不是glucagon的用途(糖尿病診斷用血糖、HbA1c、OGTT)。故不是其用途者為C。","options":{"A":"治療嚴重低血糖是glucagon用途。","B":"β阻斷劑中毒解毒是glucagon用途。","C":"正確:診斷第二型糖尿病非glucagon用途。","D":"腸道放射診斷是glucagon用途。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101030-N1-62":{"quick":"「促進蛋白質合成」不是糖皮質類固醇的作用（反而促分解），故選B...實為A。","detail":{"background":"糖皮質類固醇(glucocorticoid)的藥理作用:增加白血球(嗜中性球)數目(B,使其自邊緣池釋出)、促進脂肪分解與重新分布(C)、增進抗壓力能力(D)、升血糖(糖質新生)、抗發炎免疫抑制、「『促進蛋白質『分解』』(負氮平衡,非合成)」。題問「不是」其作用者——「促進蛋白質『合成』(A)」與糖皮質素相反(它促蛋白質『分解』)。故不是者為A(促進蛋白質合成)。","options":{"A":"正確(為非作用):糖皮質素促蛋白質「分解」非合成。","B":"增加白血球數目是糖皮質素作用。","C":"促進脂肪分解是糖皮質素作用。","D":"增進抗壓力是糖皮質素作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-61":{"quick":"男性過量用androgen「不」會精蟲製造增加（反而減少），故選B。","detail":{"background":"男性過量使用雄性素(androgen,同化類固醇)會經負回饋抑制下視丘-垂體,造成:男性性功能障礙(A,睪丸萎縮、勃起障礙)、「精蟲製造『減少』(因抑制FSH/LH與睪丸萎縮)」、男性女乳症(C,過多雄性素芳香化為雌激素)、增強肌肉(D)。題問「不是」者——「精蟲製造『增加』(B)」與事實相反(應為減少)。故不是者為B。","options":{"A":"性功能障礙是過量androgen症狀。","B":"正確(為非症狀):精蟲製造「減少」非增加。","C":"男性女乳症是過量androgen症狀。","D":"增強肌肉是androgen作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"101110-N1-62":{"quick":"女運動員稱治不孕的禁藥是clomiphene（促排卵），故選B。","detail":{"background":"「Clomiphene(克羅米芬,B)」是「選擇性雌激素受體調節劑(SERM)」,用於「治療女性不孕(促排卵)」——阻斷下視丘雌激素負回饋、增加FSH/LH促濾泡發育排卵。它因可能被濫用增加性腺激素而列運動禁藥。故女運動員稱治不孕的藥為clomiphene(B)。mifepristone(抗黃體素)、tamoxifen(乳癌)、raloxifene(骨鬆/乳癌預防)不符促排卵。故選B。","options":{"A":"mifepristone是抗黃體素(流產)。","B":"正確:clomiphene促排卵治不孕。","C":"tamoxifen治乳癌。","D":"raloxifene治骨鬆/預防乳癌。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-49":{"quick":"受體位在細胞內的是steroid（類固醇），故選A。","detail":{"background":"藥物受體位置:類固醇(steroid,A)脂溶性→「細胞內(核)受體」。insulin(酵素連結受體)、diazepam(GABA-A離子通道型受體)、epinephrine(GPCR)皆是「細胞膜」受體。故受體在細胞內者為steroid(A)。故選A。","options":{"A":"正確:steroid的受體在細胞內。","B":"insulin受體是膜上酵素連結受體。","C":"diazepam作用於膜上GABA-A受體。","D":"epinephrine作用於膜上GPCR。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102030-N1-62":{"quick":"胰島素阻抗最適用的口服降血糖藥是thiazolidinediones，故選A。","detail":{"background":"「Thiazolidinediones(TZD,如pioglitazone,A)」透過活化PPARγ「增加組織對胰島素的敏感度(改善胰島素阻抗)」,最適用於「胰島素阻抗」的第二型糖尿病。故胰島素阻抗最適用者為TZD(A)。repaglinide、sulfonylureas、nateglinide是「促胰島素分泌」藥(對阻抗本身改善有限)。(metformin也改善阻抗,但選項中TZD最對應「阻抗」。)故選A。","options":{"A":"正確:TZD(pioglitazone)增加胰島素敏感度,適用阻抗。","B":"repaglinide促胰島素分泌。","C":"sulfonylureas促胰島素分泌。","D":"nateglinide促胰島素分泌。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-58":{"quick":"糖尿病高血壓患者應避免β阻斷劑，故選A。","detail":{"background":"糖尿病的高血壓患者應「避免(慎用)β腎上腺素受體阻斷劑(A)」——β阻斷劑會「掩蓋低血糖的警示症狀(心悸、顫抖)」、延緩低血糖恢復、並可能影響血糖血脂。故應避免者為β阻斷劑(A)。硝酸鹽、鈣通道阻斷劑對糖尿病安全(ACE抑制劑/ARB甚至有腎保護而為首選)。故選A。","options":{"A":"正確:糖尿病高血壓應避免β阻斷劑(掩蓋低血糖)。","B":"長效硝酸鹽治心絞痛,對糖尿病安全。","C":"硝基甘油貼布對糖尿病安全。","D":"鈣通道阻斷劑對糖尿病安全。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"102110-N1-62":{"quick":"不能用生長激素治療的是肢端肥大症，故選A。","detail":{"background":"生長激素(growth hormone, GH)的用途:兒童侏儒症(C,GH缺乏)、短腸症(B,促腸黏膜)、慢性腎衰竭兒童(D,促生長)、Turner症候群等。而「肢端肥大症(acromegaly,A)」是「GH『過多』」造成的疾病,「不能用GH治療」(反而用『抑制GH』的octreotide、pegvisomant)。故不能用GH治療者為肢端肥大症(A)。故選A。","options":{"A":"正確:肢端肥大症是GH過多,不能用GH治療。","B":"短腸症可用GH治療。","C":"侏儒症(GH缺乏)用GH治療。","D":"慢性腎衰竭兒童可用GH。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-61":{"quick":"不促進胰島素分泌的降血糖藥是pioglitazone，故選A。","detail":{"background":"「Pioglitazone(TZD,A)」的機轉是「增加胰島素敏感度(改善阻抗)」,「不直接促進胰島素分泌」。而tolbutamide、glyburide、glipizide(磺醯尿素類)皆「促進胰島β細胞分泌胰島素」。故不促進胰島素分泌者為pioglitazone(A)。故選A。","options":{"A":"正確:pioglitazone增加胰島素敏感度,不促分泌。","B":"tolbutamide(磺醯尿素)促胰島素分泌。","C":"glyburide促胰島素分泌。","D":"glipizide促胰島素分泌。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103030-N1-62":{"quick":"抑制DPP-4的口服降血糖藥是sitagliptin，故選A。","detail":{"background":"「Sitagliptin(A)」是「二肽基肽酶-4(dipeptidyl peptidase IV, DPP-4)抑制劑」——抑制DPP-4使內生性腸泌素(GLP-1)不被分解、延長作用,增加葡萄糖依賴的胰島素分泌、抑制升糖素。故抑制DPP-4者為sitagliptin(A)。acarbose(α-葡萄糖苷酶抑制)、exenatide(GLP-1類似物注射)、metformin(雙胍)機轉不同。故選A。","options":{"A":"正確:sitagliptin抑制DPP-4。","B":"acarbose抑制α-葡萄糖苷酶(減糖吸收)。","C":"exenatide是GLP-1類似物(注射)。","D":"metformin是雙胍類。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-61":{"quick":"泌乳素錯誤敘述為D：Dopamine「抑制」prolactin分泌（非促進），故選D。","detail":{"background":"泌乳素(prolactin):A「由腦下垂體前葉分泌」(正確);B「懷孕末期刺激乳汁生成」(正確);C「分泌過量會抑制男性性功能與生育力(高泌乳素血症抑制GnRH)」(正確);D「Dopamine會『促進』prolactin分泌」錯——多巴胺(dopamine)是泌乳素的「抑制因子(PIF)」,「『抑制』prolactin分泌」(故多巴胺致效劑bromocriptine用於高泌乳素血症)。故錯誤為D。","options":{"A":"泌乳素由前葉分泌,正確。","B":"懷孕末期刺激乳汁生成,正確。","C":"過量抑制男性性功能與生育力,正確。","D":"正確(為錯誤敘述):多巴胺「抑制」prolactin非促進。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"103100-N1-62":{"quick":"不是腎上腺皮質激素治療作用的是「促進鈉鹽再吸收」，故選D。","detail":{"background":"腎上腺皮質激素(『糖皮質素』為主的治療):診斷Cushing症候群(A,地塞米松抑制試驗)、治療過敏症(B,抗發炎免疫抑制)、治療腎上腺皮質激素分泌不足(C,替代治療如Addison)。而「促進鈉鹽再吸收(D)」是「『礦物皮質素(醛固酮)』」的作用,「非『糖皮質素』的『治療』作用」(糖皮質素雖有些微礦物皮質素活性,但促鈉再吸收非其治療目的)。故不是者為D。","options":{"A":"診斷Cushing症候群是糖皮質素用途。","B":"治療過敏症是糖皮質素用途。","C":"治療皮質激素分泌不足是替代治療。","D":"正確(為非治療作用):促進鈉鹽再吸收是礦物皮質素作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-49":{"quick":"胰島素受體屬「酵素連結受體」（受體酪胺酸激酶），故選C。","detail":{"background":"胰島素受體(insulin receptor)屬「酵素連結受體(enzyme-linked receptor)」——具有「受體酪胺酸激酶(receptor tyrosine kinase)」活性,胰島素結合後使受體自我磷酸化、啟動下游訊號(PI3K-Akt等),促進葡萄糖攝取與代謝。故為酵素連結受體(C)。離子通道型、GPCR、細胞內受體是其他受體家族。故選C。","options":{"A":"非離子通道型受體。","B":"非G蛋白偶聯受體。","C":"正確:胰島素受體是酵素連結受體(受體酪胺酸激酶)。","D":"非細胞內受體(那是類固醇)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-59":{"quick":"吸入性皮質類固醇敘述錯誤為A／正解D：長期使用可致聲音沙啞，故選D。","detail":{"background":"吸入性皮質類固醇(治氣喘):D「長期使用可能因藥物局部影響引起聲帶發音沙啞(hoarseness)」正確(及口咽念珠菌感染)。逐項:A「因副作用多只限嚴重持續性氣喘」錯——吸入類固醇全身副作用少,是『各級持續性氣喘的第一線抗發炎控制藥』(非只限嚴重);B「同時直接鬆弛氣管平滑肌與抑制發炎」錯——類固醇『抗發炎』但『不直接鬆弛氣管平滑肌』(那是β2致效劑);C乾粉吸入器投藥(正確)。題目正解D(正確敘述)。故選D。","options":{"A":"吸入類固醇是各級持續性氣喘第一線,非只限嚴重。","B":"類固醇不直接鬆弛氣管平滑肌(那是β2致效劑)。","C":"可用乾粉吸入器投藥(正確)。","D":"正確:長期使用可致聲音沙啞。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-61":{"quick":"預防早產兒呼吸窘迫給Betamethasone，故選C。","detail":{"background":"預防早產(34週前)新生兒呼吸窘迫症候群(RDS),產前給母親「Betamethasone(或dexamethasone,糖皮質類固醇,C)」——類固醇可「加速胎兒肺臟成熟、促進肺表面活性物質(surfactant)生成」,降低RDS發生。故為betamethasone(C)。Mifepristone(抗黃體素)、Aldosterone(礦物皮質素)、Angiotensin II不符。故選C。","options":{"A":"Mifepristone是抗黃體素(流產)。","B":"Aldosterone是礦物皮質素。","C":"正確:betamethasone促胎兒肺成熟,預防RDS。","D":"Angiotensin II是血管收縮素。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104030-N1-62":{"quick":"無法抑制腎上腺皮質素生合成的是Mifepristone，故選A。","detail":{"background":"抑制腎上腺皮質素(皮質醇)『生合成』的藥:Metyrapone(B,抑制11-β羥化酶)、Ketoconazole(C,抑制多步類固醇合成酶)、Aminoglutethimide(D,抑制膽固醇碳鏈裂解酶)。而「Mifepristone(A,RU-486)」是「糖皮質素『『受體』拮抗劑』(也抗黃體素)」——「阻斷受體」而「『非抑制合成』」。故無法抑制合成者為mifepristone(A)。故選A。","options":{"A":"正確:mifepristone是受體拮抗劑,不抑制合成。","B":"Metyrapone抑制11-β羥化酶(合成)。","C":"Ketoconazole抑制類固醇合成酶。","D":"Aminoglutethimide抑制碳鏈裂解酶(合成)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-60":{"quick":"多巴胺D2致效劑「不」適用於低泌乳血症，故選A。","detail":{"background":"多巴胺D2受體致效劑(bromocriptine、cabergoline)的用途:退奶(B,抑制泌乳素)、肢端肥大症(C,弔詭地抑制GH)、帕金森氏症(D,補多巴胺)、『高』泌乳素血症(降泌乳素)。而「低泌乳血症(hypoprolactinemia,A)」是泌乳素『過低』,「不適用」多巴胺D2致效劑(它『降低』泌乳素,會加重低泌乳)。故不適用者為低泌乳血症(A)。故選A。","options":{"A":"正確:D2致效劑降泌乳素,不適用於低泌乳血症。","B":"退奶是D2致效劑用途(抑泌乳素)。","C":"肢端肥大症可用D2致效劑。","D":"帕金森氏症用D2致效劑。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"104100-N1-61":{"quick":"短腸症補充的荷爾蒙是生長激素，故選B。","detail":{"background":"成人「短腸症(short bowel syndrome)」可用「生長激素(growth hormone, B)」(及GLP-2類似物teduglutide)——促進腸黏膜增生、改善營養吸收。故補充生長激素(B)。甲狀腺素、腎上腺皮質激素、泌乳素不用於短腸症。故選B。","options":{"A":"甲狀腺素不用於短腸症。","B":"正確:短腸症可用生長激素促腸黏膜。","C":"腎上腺皮質激素不用於短腸症。","D":"泌乳素不用於短腸症。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-49":{"quick":"作用最慢的是steroid hormone（類固醇，基因調控），故選A。","detail":{"background":"藥物起效快慢與受體機轉:類固醇激素(steroid hormone,A)作用於「細胞內核受體調控『基因轉錄與蛋白質合成』」,需數小時才見效,「作用最慢」。insulin(酵素連結)、diazepam(離子通道)、epinephrine(GPCR)作用於膜受體,起效快(秒到分鐘)。故作用最慢者為steroid hormone(A)。故選A。","options":{"A":"正確:類固醇經基因調控,作用最慢。","B":"insulin(膜受體)起效較快。","C":"diazepam(離子通道)起效快。","D":"epinephrine(GPCR)起效快。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105030-N1-62":{"quick":"低血糖路倒病人急診應補充Glucagon，故選D。","detail":{"background":"低血糖昏迷(路倒)病人若「無法口服糖」,急救可「注射『Glucagon(升糖激素,D)』」——刺激肝糖分解快速升血糖(或靜脈注射葡萄糖)。故補充glucagon(D)。Metformin、Pioglitazone是降血糖藥(會加重低血糖)、Insulin更會降血糖(禁用)。故選D。","options":{"A":"Metformin是降血糖藥(加重)。","B":"Pioglitazone是降血糖藥。","C":"Insulin會降血糖(禁用於低血糖)。","D":"正確:glucagon升血糖,救低血糖。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-59":{"quick":"不能抑制甲狀腺素生合成的是levothyroxine，故選D。","detail":{"background":"抑制甲狀腺素『生合成』的藥:propylthiouracil(PTU,A)、methimazole(B)——thionamide類抑制甲狀腺過氧化酶(碘化與耦合);高劑量碘化物(C,Wolff-Chaikoff效應抑制釋放)。而「Levothyroxine(D)」是「『合成的甲狀腺素(T4)』」,用於「補充」甲狀腺低下,「不抑制(反而是補充)甲狀腺素」。故不能抑制者為levothyroxine(D)。故選D。","options":{"A":"PTU抑制甲狀腺素合成。","B":"methimazole抑制甲狀腺素合成。","C":"高劑量碘化物抑制甲狀腺素釋放。","D":"正確:levothyroxine是補充的甲狀腺素,不抑制合成。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"105090-N1-60":{"quick":"治療急性痛風的是colchicine，故選C。","detail":{"background":"「Colchicine(秋水仙素,C)」用於「急性痛風發作」——抑制微管聚合、抑制嗜中性球趨化與發炎,緩解急性痛風關節炎。故治急性痛風者為colchicine(C,及NSAID、類固醇)。allopurinol(A,抑黃體素氧化酶降尿酸)、probenecid(B)、sulfinpyrazone(D)是「降尿酸藥(用於『慢性』預防,急性期不啟用,會誘發發作)」。故選C。","options":{"A":"allopurinol降尿酸,用於慢性預防。","B":"probenecid促尿酸排泄,慢性預防。","C":"正確:colchicine治急性痛風。","D":"sulfinpyrazone促尿酸排泄,慢性預防。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106110-N1-61":{"quick":"甲狀腺風暴首選藥是propranolol，故選A。","detail":{"background":"「甲狀腺風暴(thyroid storm,甲亢危象)」的首選急救藥是「Propranolol(β阻斷劑,A)」——快速控制過量甲狀腺素引起的心搏過速、心律不整、高代謝症狀,並抑制周邊T4轉T3。故首選為propranolol(A)。levothyroxine(補甲狀腺素,反而加重)、prostaglandin、hydrocortisone(類固醇是輔助,非首選控制症狀)。故選A。","options":{"A":"正確:propranolol是甲狀腺風暴首選(控制心搏過速)。","B":"levothyroxine補甲狀腺素,加重病情。","C":"prostaglandin不治甲狀腺風暴。","D":"hydrocortisone是輔助治療,非首選。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-61":{"quick":"吸入皮質類固醇口咽最易感染念珠菌，故選A。","detail":{"background":"長期吸入性皮質類固醇治療氣喘,口咽部最易受「念珠菌(Candida)感染(口咽念珠菌症/鵝口瘡)」——類固醇局部免疫抑制使念珠菌增生。故最易感染者為念珠菌(A)。預防:吸藥後漱口、使用吸藥輔助器。故選A。","options":{"A":"正確:吸入類固醇口咽最易念珠菌感染。","B":"鏈球菌非吸入類固醇典型口咽感染。","C":"葡萄球菌非典型。","D":"肺炎雙球菌非口咽局部感染。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-62":{"quick":"懷孕/哺乳婦女甲亢可用Propylthiouracil，故選D。","detail":{"background":"治療甲狀腺亢進的藥中,「Propylthiouracil(PTU,D)」較適合「懷孕(尤其第一孕期)或哺乳婦女」——PTU蛋白結合率高、較少通過胎盤與乳汁(methimazole在第一孕期有致畸風險)。故孕婦/哺乳可用者為PTU(D)。Iodides(致胎兒甲狀腺腫)、Radioactive iodine(131I,孕婦『絕對禁忌』,破壞胎兒甲狀腺)不可用。故選D。","options":{"A":"Iodides孕期致胎兒甲狀腺腫。","B":"Methimazole第一孕期有致畸風險。","C":"放射碘孕婦絕對禁忌(破壞胎兒甲狀腺)。","D":"正確:PTU較適合孕婦/哺乳婦女。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"106111-N1-63":{"quick":"治療禿頭的是Finasteride，故選C。","detail":{"background":"「Finasteride(C)」是「5-α還原酶抑制劑」——抑制睪固酮轉成DHT(二氫睪固酮),用於「治療雄性禿(男性禿頭)」與良性前列腺肥大。故治禿頭者為finasteride(C)。Flutamide(抗雄性素,治攝護腺癌)、Cyproterone(抗雄性素)、Spironolactone(抗醛固酮/抗雄性素)非治禿頭首選(minoxidil外用也治禿)。故選C。","options":{"A":"Flutamide是抗雄性素(治攝護腺癌)。","B":"Cyproterone是抗雄性素。","C":"正確:finasteride(5-α還原酶抑制)治禿頭。","D":"Spironolactone是抗醛固酮(有抗雄性素作用)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-60":{"quick":"不適用於鼻炎治療的是β-adrenergic agonists，故選A。","detail":{"background":"過敏性鼻炎用藥:鼻內類固醇(corticosteroids,B)、抗組織胺(antihistamines,C)、肥大細胞穩定劑(cromolyn,D)、α腎上腺素致效劑(鼻充血解除)。而「β-adrenergic agonists(β致效劑,A)」是「支氣管擴張劑(治氣喘)」,「不用於鼻炎」(鼻充血解除用『α』致效劑非β)。故不適用者為β-adrenergic agonists(A)。故選A。","options":{"A":"正確:β致效劑治氣喘,不用於鼻炎。","B":"corticosteroids(鼻內)治鼻炎。","C":"antihistamines治鼻炎。","D":"cromolyn預防鼻炎。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-62":{"quick":"gonadotropins錯誤敘述為C：由「腦下垂體」分泌（非下視丘），故選C。","detail":{"background":"促性腺激素(gonadotropins):A「是糖蛋白(glycoprotein)」(正確);B「hCG是人類絨毛膜促性腺激素」(正確,胎盤分泌);C「gonadotropins由下視丘分泌」錯——FSH、LH由「『腦下垂體前葉』」分泌(下視丘分泌的是GnRH);D「FSH可治療不孕症(促濾泡發育)」(正確)。故錯誤為C。","options":{"A":"gonadotropins是糖蛋白,正確。","B":"hCG是人類絨毛膜促性腺激素,正確。","C":"正確(為錯誤敘述):FSH/LH由腦下垂體分泌,非下視丘。","D":"FSH治不孕症,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107030-N1-63":{"quick":"治療尿崩症首選藥是Desmopressin，故選A。","detail":{"background":"「Desmopressin(DDAVP,A)」是「抗利尿激素(ADH/vasopressin)的合成類似物」,是「中樞性尿崩症(diabetes insipidus)的首選治療」——補充ADH,促集尿管水再吸收、減少尿量。故尿崩症首選為desmopressin(A)。Oxytocin(催產)、Octreotide(體抑素類似物)、Prolactin不治尿崩症。故選A。","options":{"A":"正確:desmopressin治尿崩症(ADH類似物)。","B":"oxytocin是催產素。","C":"octreotide是體抑素類似物。","D":"prolactin是泌乳素。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"107110-N1-61":{"quick":"oxytocin錯誤敘述為C：屬腦下垂體「後葉」分泌（非前葉），故選C。","detail":{"background":"催產素(oxytocin):A「鼻噴霧可刺激乳汁分泌(射乳)」(正確);B「靜脈注射可刺激子宮收縮(催產/引產)」(正確);C「屬腦下垂體『前葉』分泌的激素」錯——oxytocin是「『後葉(神經垂體)』」釋放的激素(下視丘合成);D「抗利尿效果比vasopressin低」(正確,oxytocin僅微弱抗利尿)。故錯誤為C。","options":{"A":"鼻噴霧刺激乳汁分泌(射乳),正確。","B":"靜脈注射刺激子宮收縮,正確。","C":"正確(為錯誤敘述):oxytocin是後葉激素,非前葉。","D":"抗利尿效果比vasopressin低,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-53":{"quick":"不是治療骨質疏鬆的藥是Betamethasone，故選A。","detail":{"background":"治療骨質疏鬆的藥:Calcitonin(B,降鈣素,抑蝕骨)、Bisphosphonates(C,雙磷酸鹽,抑蝕骨)、Teriparatide(D,PTH類似物,促骨形成)。而「Betamethasone(A,糖皮質類固醇)」「長期使用反而『造成』骨質疏鬆(類固醇性骨鬆)」,「不是治療骨鬆的藥」。故不是者為betamethasone(A)。故選A。","options":{"A":"正確:betamethasone(類固醇)反而致骨鬆,非治療藥。","B":"Calcitonin治骨鬆。","C":"Bisphosphonates治骨鬆。","D":"Teriparatide治骨鬆(促骨形成)。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108020-N1-63":{"quick":"腸泌素類似物錯誤敘述為D：不是增加葡萄糖從尿液排除（那是SGLT2抑制劑），故選D。","detail":{"background":"腸泌素類似物(incretin mimetics, GLP-1類似物如exenatide):A「增加『葡萄糖依賴的』胰島素分泌」(正確);B「減少升糖素(glucagon)釋放」(正確);C「減緩胃排空(增加飽足感、減重)」(正確);D「增加葡萄糖從尿液排除」錯——「從尿液排糖」是「『SGLT2抑制劑(canagliflozin等)』」的機轉,『非』腸泌素類似物。故錯誤為D。","options":{"A":"增加葡萄糖依賴的胰島素分泌,正確。","B":"減少升糖素釋放,正確。","C":"減緩胃排空,正確。","D":"正確(為錯誤敘述):尿液排糖是SGLT2抑制劑,非腸泌素類似物。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-54":{"quick":"減少糖分吸收的是miglitol，故選A。","detail":{"background":"「Miglitol(A)」(及acarbose)是「α-葡萄糖苷酶抑制劑」——抑制腸道α-葡萄糖苷酶,「延緩/減少碳水化合物(糖分)的分解與吸收」,降低餐後血糖。故減少糖分吸收者為miglitol(A)。metformin(雙胍)、repaglinide(促分泌)、rosiglitazone(TZD)機轉不同。故選A。","options":{"A":"正確:miglitol(α-葡萄糖苷酶抑制)減少糖吸收。","B":"metformin減少肝糖質新生。","C":"repaglinide促胰島素分泌。","D":"rosiglitazone(TZD)增加胰島素敏感度。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"108110-N1-63":{"quick":"corticosteroid臨床用途錯誤為A：不治療「庫欣氏症候群」（庫欣是皮質醇過多），故選A。","detail":{"background":"糖皮質類固醇(corticosteroid)的用途:治療類風濕性關節炎(B,抗發炎)、預防器官移植排斥(C,免疫抑制)、加速胎兒肺成熟(D)、治療氣喘、過敏、自體免疫。而「治療庫欣氏症候群(A)」錯——庫欣氏症候群是「皮質醇『過多』」,「不能用(更多)類固醇治療」(反而用抑制皮質醇合成的藥或手術)。故錯誤用途為A。","options":{"A":"正確(為錯誤):庫欣氏症候群是皮質醇過多,不用類固醇治療。","B":"治療類風濕性關節炎是類固醇用途。","C":"預防器官移植排斥是類固醇用途。","D":"加速胎兒肺成熟是類固醇用途。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-63":{"quick":"長期類固醇副作用「不」包括食慾減退（反而增加），故選B。","detail":{"background":"長期使用糖皮質類固醇的副作用:骨質疏鬆(A)、傷口癒合困難(C,抑制膠原)、血糖上升(D,糖質新生)、庫欣氏外觀(中央肥胖月亮臉)、「『食慾『增加』』、體重增加」、高血壓、免疫抑制感染、消化性潰瘍。題問「錯誤(非副作用)」者——「食慾『減退』(B)」與類固醇相反(它『增加』食慾)。故錯誤(非副作用)者為B。","options":{"A":"骨質疏鬆是類固醇副作用。","B":"正確(為非副作用):類固醇『增加』食慾非減退。","C":"傷口癒合困難是類固醇副作用。","D":"血糖上升是類固醇副作用。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott 圖解藥理學"]}},"109030-N1-64":{"quick":"停經後雌激素替代「不」增加熱潮紅（反而減少），故選A。","detail":{"background":"停經後雌激素替代治療(HRT)的作用:減少骨質被再吸收(B,但對骨形成影響小)、減少睡眠障礙(C)、改善泌尿生殖道萎縮(D)、「『減少』熱潮紅(hot flashes)」(雌激素緩解血管舒縮症狀)。題問「錯誤」者——A「『增加』熱潮紅」錯(HRT是『減少』熱潮紅,熱潮紅是雌激素『不足』的症狀)。故錯誤者為A。","options":{"A":"正確(為錯誤敘述):HRT「減少」熱潮紅非增加。","B":"減少骨質再吸收,正確。","C":"減少睡眠障礙,正確。","D":"改善泌尿生殖道萎縮,正確。"},"sources":["Katzung Basic & Clinical Pharmacology 15e","實用藥理學","Lippincott
