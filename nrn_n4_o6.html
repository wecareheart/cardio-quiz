減少。","C":"正確。確定餵奶姿勢及寶寶含乳姿勢。","D":"錯。縮短餵奶時間不利泌乳。"},"sources":["新文京《產科護理學》含乳","母乳哺育"]}},"102030-N4-23":{"quick":"協助初產婦成功哺餵母乳,「每日提供8小時母嬰同室即可」為最不合適。","detail":{"background":"促進成功哺餵母乳:不提供安撫奶嘴(避免乳頭混淆)、產後儘早讓新生兒吸吮、教導正確餵奶姿勢與含乳、「實施24小時母嬰同室、依需求哺餵」。「只提供8小時母嬰同室」不符母嬰親善「24小時親子同室」原則、不利依需求哺餵與泌乳建立,最不合適。本題最不合適為「每日提供8小時母嬰同室即可」(D)。","options":{"A":"合適。不提供安撫奶嘴(避免乳頭混淆)。","B":"合適。產後儘早讓新生兒吸母乳。","C":"合適。教導正確餵奶姿勢。","D":"最不合適(本題答案)。應24小時母嬰同室,非僅8小時。"},"sources":["新文京《產科護理學》母嬰同室","母乳哺育"]}},"102030-N4-25":{"quick":"哺餵母乳敘述中「出生後逐漸增加每次吸奶時間以促進乳汁分泌」為錯誤。","detail":{"background":"母乳哺育:出生半小時內即可哺餵、依需求哺餵(不限制時間次數)、哺乳可降低母親乳癌與卵巢癌機率、以「嬰兒體重增加與尿量」監測攝取是否足夠。促進泌乳的關鍵是「吸吮頻率(次數)與乳汁移出量」(供需原理),「不是逐漸增加每次吸奶時間」(每次哺乳長度依嬰兒需求自然調節,刻意拉長單次時間並非促泌乳之法,且過久含乳易致乳頭破皮)。本題「錯誤」者為B。","options":{"A":"正確。出生半小時內即可哺餵。","B":"錯誤(本題答案)。促泌乳靠吸吮頻率,非逐漸增加單次吸奶時間。","C":"正確。哺乳降低乳癌卵巢癌機率。","D":"正確。以體重與尿量監測哺餵是否足夠。"},"sources":["新文京《產科護理學》泌乳供需","母乳哺育"]}},"102110-N4-18":{"quick":"教導哺餵母奶技巧中「以手指輕壓乳暈上方避免塞住嬰兒鼻子」為錯誤。","detail":{"background":"哺乳技巧:正確含乳時嬰兒鼻子自然不會被塞住(下巴貼乳房、鼻子留有空隙);「以手指下壓乳暈(剪刀式夾)會壓迫乳腺管、影響乳汁流出且改變乳頭形狀使含乳更困難」,故「以手指壓乳暈上方避免塞鼻」為錯誤做法。若擔心鼻子,應改善抱姿(將嬰兒臀部靠近母體、頭略後仰)。嬰兒吸吮發「嘖嘖聲」提示含乳不正確、以體重尿量監測攝取、變換姿勢改變乳頭受壓皆正確。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。壓乳暈會壓迫乳腺管,不應以手指壓乳暈避免塞鼻。","B":"正確。嘖嘖聲表示可能含乳不正確。","C":"正確。以體重尿量監測哺餵是否足夠。","D":"正確。變換姿勢改變乳頭受壓。"},"sources":["新文京《產科護理學》哺乳技巧","含乳"]}},"102110-N4-23":{"quick":"乳頭破皮想改吸奶器瓶餵,護理建議中「以肥皂清洗乳頭以避免感染」為錯誤。","detail":{"background":"乳頭破皮護理:(1)「乳頭不可用肥皂或酒精清洗」——會去除乳暈腺(蒙哥馬利腺)的天然油脂保護、使乳頭更乾裂,僅以清水清潔即可,故此項錯誤;(2)調整正確餵奶姿勢、使乳頭與乳暈含入口中減輕乳頭壓力;(3)先餵較不痛的一側、增加餵奶次數(避免脹奶);(4)哺餵後擠少許乳汁塗乳頭並保持乾燥促癒合。本題「錯誤」者為「以肥皂清洗乳頭」(A)。","options":{"A":"錯誤(本題答案)。乳頭不可用肥皂清洗(去除天然油脂、加重乾裂)。","B":"正確。正確含乳含住乳頭與乳暈減輕壓力。","C":"正確。先餵較不痛側並增加餵奶次數。","D":"正確。哺餵後塗乳汁並保持乾燥促癒合。"},"sources":["新文京《產科護理學》乳頭破皮","哺乳護理"]}},"103030-N4-23":{"quick":"協助哺乳成功,「晚上可用配方奶補充餵食新生兒」為不恰當。","detail":{"background":"促進哺乳成功:儘早開始哺餵、不限制餵奶時間與次數、指導正確哺乳技巧、依需求哺餵(含夜間)。「夜間以配方奶補充」會減少夜間吸吮(夜間泌乳素分泌較多、夜間哺乳對建立泌乳量重要)、易致乳頭混淆與泌乳不足,故不恰當。本題「不恰當」者為D。","options":{"A":"恰當。儘早開始哺餵母乳。","B":"恰當。不限制餵奶時間及次數。","C":"恰當。指導正確哺乳技巧。","D":"不恰當(本題答案)。夜間以配方奶補充會減少夜間吸吮、不利泌乳。"},"sources":["新文京《產科護理學》母乳哺育","夜間哺乳"]}},"104100-N4-22":{"quick":"協助順利哺餵母乳,「母親舒適會影響泌乳,建議夜晚不哺餵」為錯誤。","detail":{"background":"順利哺餵:儘早哺餵、教導舒適哺乳姿勢(以枕頭支撐手臂與懸空處)、奶水建立後依嬰兒需求哺餵。「夜晚不哺餵錯誤」——夜間泌乳素分泌較高、夜間哺乳有助建立與維持泌乳量,且長時間不哺餵會脹奶、泌乳減少。此外「每次儘量一側吸吮10分鐘以上」讓嬰兒吃到富含脂肪的後奶亦合理。本題「錯誤」者為「建議夜晚不哺餵」(D)。","options":{"A":"正確。鼓勵儘早哺餵讓母嬰習慣過程。","B":"正確。以毛毯枕頭支撐懸空處。","C":"正確。每次一側吸吮10分鐘以上吃到後奶。","D":"錯誤(本題答案)。夜間哺乳有助泌乳,不應夜晚不哺餵。"},"sources":["新文京《產科護理學》母乳哺育","夜間哺乳"]}},"105090-N4-18":{"quick":"寶寶吃奶動作是否正確的回答中「含住乳頭發出嘖嘖聲表示正確含乳」為錯誤。","detail":{"background":"正確含乳表徵:嘴巴張大、含住乳頭與大部分乳暈、下唇外翻、兩頰飽滿(無凹陷)、下巴貼乳房、節律性深吸吮並聽到「吞嚥聲」。「發出嘖嘖聲(咂嘴聲)反而表示含乳不正確(含太淺、漏氣)」,非正確含乳。本題「錯誤」者為「含住乳頭發出嘖嘖聲表示正確含乳」(C)。","options":{"A":"正確。嘴張大、下唇外翻為正確含乳。","B":"正確。含乳正確時兩頰無凹陷(飽滿)。","C":"錯誤(本題答案)。發出嘖嘖聲表示含乳不正確。","D":"正確含乳時口腔形成有效密合(吸吮負壓)。"},"sources":["新文京《產科護理學》含乳表徵","母乳哺育"]}},"105090-N4-24":{"quick":"母乳哺餵敘述中「乳頭扁平使伸展性不佳、無法順利分泌乳汁」為錯誤。","detail":{"background":"母乳哺育:(1)乳腺炎時可繼續餵患側(乳汁不會使嬰兒感染,反而引流有助康復)——正確;(2)「乳頭扁平/凹陷影響的是含乳難易,不影響乳汁分泌(泌乳靠泌乳素與吸吮),且嬰兒是含乳房非含乳頭,評估乳頭伸展性、正確含乳多可哺餵」,故「乳頭扁平無法順利分泌乳汁」錯誤;(3)乳汁多少與乳房大小無關;(4)不限制哺乳時間次數可改善泌乳不足。本題「錯誤」者為B。","options":{"A":"正確。乳腺炎可繼續餵患側,不會使嬰兒感染。","B":"錯誤(本題答案)。乳頭扁平影響含乳,不影響乳汁分泌。","C":"正確。乳汁多少與乳房大小無關。","D":"正確。不限制哺乳時間次數可改善泌乳不足。"},"sources":["新文京《產科護理學》乳頭扁平","泌乳"]}},"106110-N4-20":{"quick":"母乳哺育指導中「成熟乳的後奶較前奶含較多脂肪」為正確。","detail":{"background":"母乳成分:(1)「後奶(hindmilk)較前奶(foremilk)含較多脂肪、熱量高、色較白」——正確(故哺乳應讓嬰兒一側吃完再換邊,以吃到後奶);(2)「生理性黃疸不是哺乳禁忌」(反而應增加哺乳促膽紅素排出);(3)「初乳脂肪較少、富含蛋白質與免疫球蛋白(IgA)」(熱量非很高);(4)「母乳的乳清蛋白:酪蛋白比例高於牛乳(母乳以乳清蛋白為主、易消化)」,故「酪蛋白比例較牛乳高」錯。本題正確為「後奶較前奶含較多脂肪」(A)。","options":{"A":"正確。後奶較前奶含較多脂肪內容物。","B":"錯。生理性黃疸非哺乳禁忌。","C":"錯。初乳富含蛋白質與免疫球蛋白,脂肪少。","D":"錯。母乳乳清蛋白比例較牛乳高(酪蛋白較低)。"},"sources":["新文京《產科護理學》前奶後奶","母乳成分"]}},"109110-N4-25":{"quick":"母乳敘述中「後奶較白、富含脂肪、熱量較前奶高」為正確。","detail":{"background":"母乳前奶與後奶:「前奶(foremilk)清淡、水分多、富含乳糖與蛋白質(乳清蛋白);後奶(hindmilk)較白、富含脂肪、熱量較高」。故應讓嬰兒「一側乳房吃完(吃到後奶)再換邊」才能獲得足夠脂肪與熱量;「純母乳的嬰兒(6個月內)不需額外補充水分」(母乳含足夠水分)。本題正確為「後奶較白、富含脂肪、熱量較前奶高」(A)。","options":{"A":"正確。後奶較白、富含脂肪、熱量較前奶高。","B":"錯。前奶富含乳糖,非酪蛋白。","C":"錯。需吃到後奶才得足夠脂肪熱量,非只吃前奶。","D":"錯。純母乳6個月內不需額外補充水分。"},"sources":["新文京《產科護理學》前奶後奶","母乳成分"]}},"110110-N4-2":{"quick":"正確含乳注意事項中「以乳頭觸動嬰兒的嘴以利張口含乳」為正確。","detail":{"background":"正確含乳:(1)「以乳頭輕觸嬰兒嘴脣誘發尋乳反射使其張大嘴」再快速將乳房送入——正確;(2)「不需下壓乳暈(下壓會壓迫乳腺管;正確含乳鼻子自然有空隙)」;(3)含乳時「下乳暈露出比上乳暈少」(嬰兒下巴側含住較多乳房組織,呈不對稱含乳);(4)「發出嘖嘖聲表示含乳不正確」(非吸到乳汁的聲音,聽到的應是吞嚥聲)。本題正確為「以乳頭觸動嬰兒嘴以利張口含乳」(C)。","options":{"A":"錯。不需下壓乳暈(會壓迫乳腺管)。","B":"錯。應是下乳暈露出比上乳暈少(不對稱含乳)。","C":"正確。以乳頭觸動嬰兒嘴誘發尋乳反射、利張口含乳。","D":"錯。嘖嘖聲表示含乳不正確(吸到乳汁應有吞嚥聲)。"},"sources":["新文京《產科護理學》含乳","尋乳反射"]}},"112180-N4-14":{"quick":"乳頭扁平的初產婦想親餵,最適當指導是「寶寶是吸吮乳房不是乳頭,應先評估乳頭伸展性」。","detail":{"background":"乳頭扁平/凹陷與哺乳:「嬰兒是含住乳房(乳暈與其下乳腺組織)而非只含乳頭」,故「乳頭扁平仍可親餵,先評估乳頭伸展性、教導正確含乳(可先刺激乳頭、以手或工具協助乳頭突出),多能成功哺餵」。不應直接改瓶餵或叫她「等寶寶大些」(會錯失建立泌乳時機)。本題最適當為「寶寶是吸吮乳房不是乳頭,先評估乳頭伸展性」(B)。","options":{"A":"錯。不需直接改瓶餵(乳頭扁平仍可親餵)。","B":"正確。寶寶吸吮乳房非乳頭,先評估乳頭伸展性。","C":"錯。不應消極等待。","D":"錯。「等寶寶大些」會錯失建立泌乳時機。"},"sources":["新文京《產科護理學》乳頭扁平","含乳"]}},"113030-N4-13":{"quick":"剖腹產初產婦擔心奶水不足(產後2天未脹奶),不適當措施是「告知產程過長及剖腹生產都會延後脹奶,這是正常的」。","detail":{"background":"產後泌乳建立:產後2–3天才開始大量泌乳(脹奶),產程遲滯、剖腹、母嬰分離等可能略延後脹奶。處理擔心奶水不足:「評估新生兒排尿排便次數(攝取指標)、肯定母乳哺育決定、了解吃奶與含乳情況、討論增加手擠奶頻率刺激泌乳」。選項B雖部分為衛教,但「直接告知正常而未進一步評估與協助」相對不適當(且未必每例皆如此、應個別評估含乳與移出)——本題以B為要選出的「不適當」(僅給籠統解釋、未評估與協助)。本題「不適當」者為B。","options":{"A":"適當。評估新生兒兩天排尿排便情況(攝取指標)。","B":"不適當(本題答案)。僅籠統說「正常」而未評估與協助含乳/移出。","C":"適當。肯定決定並了解吃奶與含乳情況。","D":"適當。討論增加手擠奶頻率刺激泌乳。"},"sources":["新文京《產科護理學》泌乳建立","母乳哺育"]}},"113100-N4-19":{"quick":"正確含乳表徵中「吸吮與吞嚥頻率平穩維持1:1約一秒一次」為不適當(本題要選的)。","detail":{"background":"正確含乳(suckling)表徵:嬰兒「由下往上不對稱含住一大口乳房組織(下巴側含較多)」、「上下唇如魚嘴外翻(尤下唇)」、「嘴張大、兩頰飽滿」。至於「吸吮與吞嚥」並非固定「1:1、一秒一次」——哺乳初期(等待噴乳)為快而淺的吸吮、噴乳後轉為慢而深的吸吮並間歇吞嚥,節律會變化、非機械式1:1。本題「不適當(不正確描述)」者為「吸吮與吞嚥1:1約一秒一次」(D)。","options":{"A":"適當。由下往上不對稱含一大口乳房組織。","B":"適當。上下唇如魚嘴、下唇外翻。","C":"適當。嘴張大、兩頰飽滿。","D":"不適當(本題答案)。吸吮吞嚥節律會變化,非固定1:1一秒一次。"},"sources":["新文京《產科護理學》含乳表徵","吸吮"]}},"114170-N4-14":{"quick":"母乳哺育敘述中「每次哺乳兩側乳房都要餵以免大小奶」為不適當。","detail":{"background":"母乳哺育:應「一側乳房吃完(排空)再換另一側」,讓嬰兒吃到富含脂肪的後奶;「每次兩側都餵(各餵一半)」反而使嬰兒只吃到前奶、未吃到後奶,且兩側皆未排空,故「每次兩側都要餵以免大小奶」不適當(大小奶應以下次先餵上次後餵或未排空那側平衡)。母親奶水過多可能致嬰兒拒吸、嬰兒快吸幾口放開可刺激排乳反射、吃奶時間頻率有變化皆正確。本題「不適當」者為A。","options":{"A":"不適當(本題答案)。應一側吃完再換邊,非每次兩側都餵。","B":"正確。奶水過多也可能致嬰兒拒吸。","C":"正確。快吸幾口放開可刺激排乳反射。","D":"正確。吃奶時間頻率常有變化。"},"sources":["新文京《產科護理學》母乳哺育","後奶"]}},"115030-N4-16":{"quick":"產後第一天「沒有奶水可以餵奶嗎」,最適宜回應是「現在乳房會分泌初乳,正是寶寶所需要的」。","detail":{"background":"產後泌乳:產後最初分泌的是「初乳(colostrum)」——量少但濃稠、富含蛋白質與免疫球蛋白(IgA)、有助穩定血糖與排出胎便、減少黃疸,「正是新生兒所需」。應鼓勵產後即儘早讓寶寶吸吮(刺激泌乳、促子宮收縮)。不應說「擔心多餘」「沒奶硬餵否則失敗」「等三天奶來才餵」(會錯失初乳與建立泌乳時機)。本題最適宜為「現在分泌初乳,正是寶寶所需要的」(B)。","options":{"A":"敷衍未提供具體資訊。","B":"正確。產後分泌初乳,富含營養與免疫,正是寶寶所需。","C":"語氣不當(「不然會失敗」),且非僅為防失敗。","D":"錯。不應等三天才餵(錯失初乳)。"},"sources":["新文京《產科護理學》初乳","母乳哺育"]}},"103030-N4-8":{"quick":"協助母親成功哺餵母乳的措施為建立母乳支持團體(1)、教導維持泌乳(3)、依寶寶需求哺餵(5),即135。","detail":{"background":"成功哺餵母乳的措施(母嬰親善原則):「(1)建立母乳支持團體、(3)教導母親維持泌乳的方法、(5)依寶寶需求哺餵(不限時間次數)」。應避免:「(2)提供葡萄糖水、(7)安撫奶嘴」(致乳頭混淆、減少吸吮);「(4)12小時母嬰同室、(6)產後24小時後才哺餵」皆不符(應24小時母嬰同室、產後儘早(半小時內)哺餵)。本題正確組合為(1)(3)(5)即135(A)。","options":{"A":"正確。(1)支持團體+(3)維持泌乳+(5)依需求哺餵。","B":"含(2)葡萄糖水、(6)24小時後哺餵,錯誤。","C":"含(7)安撫奶嘴,錯誤。","D":"含(4)12小時同室、(6)24小時後哺餵,錯誤。"},"sources":["新文京《產科護理學》成功哺餵措施","母嬰親善"]}},"109110-N4-1":{"quick":"護理師以電話協助母親解決哺乳問題,屬於「諮詢者」角色。","detail":{"background":"護理師角色:「諮詢者(consultant)」——提供專業建議、衛教與問題解決(如電話衛教協助哺乳);「照顧者(caregiver)」——直接執行護理照護;「管理者」——協調資源與管理;「研究者」——進行研究。產後以電話遠距協助母親解決哺乳問題屬「提供諮詢與衛教」,為「諮詢者」角色。本題為「諮詢者」(D)。","options":{"A":"照顧者為直接執行護理照護。","B":"管理者為協調資源管理。","C":"研究者為進行研究。","D":"正確。電話提供哺乳衛教與建議為諮詢者角色。"},"sources":["新文京《護理學導論》護理角色","諮詢者"]}},"101030-N4-3":{"quick":"母奶保存方式中「冷藏4°C內不可超過24小時」為錯誤(冷藏可放更久)。","detail":{"background":"母乳保存(常用建議值):室溫(25°C以下)約6–8小時;冷藏(4°C)約「可放3–5天(約5天)」(故「不可超過24小時」錯誤,過於保守);冷凍(獨立冷凍庫)約3–6個月。解凍/加熱「不可用微波爐」(破壞免疫成分、受熱不均燙傷),以溫水回溫。本題「錯誤」者為「冷藏4°C內不可超過24小時」(C)。","options":{"A":"正確。成熟奶冷凍可放3–4個月。","B":"正確。室溫25°C以下可放6–8小時。","C":"錯誤(本題答案)。冷藏4°C可放約3–5天,非不可超過24小時。","D":"正確。冰過的奶水不可用微波爐加熱。"},"sources":["新文京《產科護理學》母乳保存","母乳哺育"]}},"101030-N4-6":{"quick":"母乳中「鐵、鈣濃度」較配方奶粉含量低。","detail":{"background":"母乳 vs 配方奶成分:母乳的「鐵、鈣等礦物質濃度較配方奶低」,但母乳中鐵的生物利用率(吸收率)高故仍足夠(6個月後才需補充鐵);母乳富含「乳糖、乳清蛋白、不飽和脂肪酸、免疫球蛋白IgA、乳鐵蛋白」等(這些較配方奶高或品質較佳)。本題母乳含量較低者為「鐵鈣濃度」(D)。","options":{"A":"母乳乳糖含量高(非低)。","B":"母乳乳清蛋白比例高(非低)。","C":"母乳不飽和脂肪酸豐富(非低)。","D":"正確。母乳鐵鈣濃度較配方奶低(但吸收率高)。"},"sources":["新文京《產科護理學》母乳成分","配方奶比較"]}},"101030-N4-71":{"quick":"苯酮尿症(PKU)患童應避免「含蛋白質高的食物(魚肉牛奶蛋豆類麵粉製品)」。","detail":{"background":"苯酮尿症(PKU):因苯丙胺酸羥化酶缺乏,無法代謝苯丙胺酸(phenylalanine,一種胺基酸),堆積致腦損傷智能障礙。飲食治療:「限制苯丙胺酸——即限制高蛋白食物(魚、肉、蛋、奶、豆類、麵粉製品)」,改用低苯丙胺酸特殊配方奶,並避免含阿斯巴甜(aspartame)的代糖。本題PKU應避免「高蛋白食物」(A)。","options":{"A":"正確。PKU須限制高蛋白(苯丙胺酸)食物。","B":"乳糖非PKU限制重點(限的是苯丙胺酸)。","C":"高鐵食物非PKU限制重點。","D":"高熱量飲食非PKU限制重點。"},"sources":["Nelson《兒科學》PKU","遺傳代謝飲食"]}},"101110-N4-2":{"quick":"3個月、7公斤、喝14%配方奶,一天約需1155 c.c.奶量。","detail":{"background":"嬰兒奶量計算:嬰兒每日熱量需求約「110–120 kcal/kg」(取約110–120);14%配方奶每100 c.c.約提供「14g奶粉×約4 kcal≈約67 kcal/100c.c.」(標準稀釋濃度)。需熱量=7kg×約110≈770 kcal(若以120則840);奶量=熱量÷每c.c.熱量。本題以官方計算答「1155 c.c.」(B)(對應約120kcal/kg、每c.c.約0.67–0.7kcal的設定;依考選部標準答案為B)。臨床應用以體重×每日約150 c.c./kg估算亦約1050 c.c.,本題取官方B。","options":{"A":"1365 c.c.計算偏高。","B":"正確(官方答案)。約1155 c.c.。","C":"945 c.c.計算偏低。","D":"770 c.c.為熱量數值非奶量。"},"sources":["Nelson《兒科學》嬰兒熱量","奶量計算"]}},"103030-N4-3":{"quick":"初乳大約在「懷孕5~6個月」開始分泌。","detail":{"background":"初乳(colostrum):懷孕中期(約「懷孕16週/5–6個月」起)乳房在泌乳素影響下即開始製造初乳(孕期因黃體素/雌激素高,大量泌乳被抑制);產後胎盤娩出、黃體素驟降,初乳即可大量分泌(產後最初2–3天為初乳,之後轉為過渡乳、成熟乳)。本題初乳開始分泌約「懷孕5~6個月」(B)。","options":{"A":"懷孕3個月過早。","B":"正確。約懷孕5~6個月開始分泌初乳。","C":"生產後立即分泌的是已製造好的初乳,但「開始製造」在孕中期。","D":"產後2–3天是轉為成熟乳,非初乳開始。"},"sources":["新文京《產科護理學》初乳","泌乳"]}},"103030-N4-26":{"quick":"母乳敘述中「母乳的維生素D比配方奶粉低」為錯誤(本題要選的)。","detail":{"background":"母乳特性:(1)初乳高蛋白有助穩定嬰兒血糖(優於餵糖水)——正確;(2)儘早常哺餵可促胎便排出、減少黃疸——正確;(3)「母乳維生素D含量確實偏低(這是事實),但題目把它列為錯誤敘述」——本題官方以C為要選出者,意指不應因此貶低母乳或就題組設計而言維生素D敘述為要挑出項;實務上母乳維生素D偏低、純母乳兒建議補充維生素D;(4)母乳乳清蛋白比配方奶/牛乳高——正確。依考選部答案,本題選C。","options":{"A":"正確。初乳高蛋白穩定血糖優於糖水。","B":"正確。儘早常哺餵可減少黃疸。","C":"本題答案(官方)。就本題組判定為要挑出之敘述。","D":"正確。母乳乳清蛋白比配方奶高。"},"sources":["新文京《產科護理學》母乳成分","維生素D"]}},"106111-N4-27":{"quick":"以比例而言,「乳清蛋白」母乳含量較牛奶多。","detail":{"background":"母乳 vs 牛奶蛋白比例:母乳的「乳清蛋白(whey):酪蛋白(casein)」比例約60:40(以乳清蛋白為主),牛奶則以酪蛋白為主(約20:80)。乳清蛋白形成的凝乳細軟、易消化吸收。故「乳清蛋白母乳含量(比例)較牛奶多」。葡萄糖、酪蛋白、維生素D皆非「母乳比牛奶多」。本題為「乳清蛋白」(C)。","options":{"A":"葡萄糖非母乳較牛奶多的成分。","B":"乳酪(酪)蛋白牛奶較多。","C":"正確。乳清蛋白母乳比例較牛奶多。","D":"維生素D母乳含量偏低。"},"sources":["新文京《產科護理學》乳清蛋白","母乳成分"]}},"107030-N4-18":{"quick":"母乳與配方奶差異,正確的是「母乳富含IgA,可增強嬰兒免疫力」。","detail":{"background":"母乳優勢:(1)「母乳富含分泌型免疫球蛋白IgA(sIgA)、乳鐵蛋白、溶菌酶、白血球等,增強嬰兒免疫、降低感染」——正確;(2)母乳乳糖含量高(非低,提供能量與助鈣吸收、益生菌);(3)母乳鐵濃度比配方奶低(但吸收率高);(4)母乳熱量與配方奶相近(約67kcal/100ml),非「較高使飽足」。本題正確為「母乳富含IgA增強免疫」(D)。","options":{"A":"錯。母乳乳糖含量高,非較低。","B":"錯。母乳鐵濃度較配方奶低(但吸收率高)。","C":"錯。母乳熱量與配方奶相近,非較高。","D":"正確。母乳富含IgA增強嬰兒免疫力。"},"sources":["新文京《產科護理學》母乳免疫","IgA"]}},"108020-N4-43":{"quick":"足月新生兒體重下降>10%、血糖33 mg/dL,處置中「建議每6~8小時監測一次血糖」為錯誤。","detail":{"background":"新生兒低血糖(<45 mg/dL):本例足月兒體重下降>10%、血糖33屬低血糖,處置——立即口服餵食(母乳/配方奶/葡萄糖水)、餵食不順則靜脈注射葡萄糖、目標維持血糖≥45 mg/dL。監測頻率應「密集(如每30分鐘至1小時、餵食前)追蹤」直到穩定,「每6–8小時監測一次」間隔過長、不及時。本題「錯誤」者為「每6~8小時監測一次血糖」(C)。","options":{"A":"正確。立即口服葡萄糖水/母乳/配方奶。","B":"正確。餵食不順則靜脈注射葡萄糖。","C":"錯誤(本題答案)。低血糖應密集監測,非每6~8小時一次。","D":"正確。維持血糖在45 mg/dL以上。"},"sources":["Nelson《兒科學》新生兒低血糖","血糖監測"]}},"109030-N4-24":{"quick":"胎盤娩出後,腦下垂體前葉分泌「泌乳素(prolactin)」使乳房開始分泌乳汁。","detail":{"background":"泌乳荷爾蒙:「腦下垂體前葉分泌泌乳素(prolactin)——促進乳腺製造乳汁」;胎盤娩出後黃體素/雌激素驟降,解除對泌乳素的抑制,乳房開始大量泌乳。「腦下垂體後葉分泌催產素(oxytocin)——引發排乳(let-down)與子宮收縮」。動情素(雌激素)、黃體素與乳腺發育有關。本題使乳房分泌乳汁者為「泌乳素」(B)。","options":{"A":"催產素引發排乳反射,非製造乳汁。","B":"正確。泌乳素(前葉)促乳腺製造乳汁。","C":"動情素與乳腺發育有關,非泌乳。","D":"黃體素與乳腺發育有關,非泌乳。"},"sources":["新文京《產科護理學》泌乳素","泌乳機轉"]}},"111110-N4-20":{"quick":"純母乳哺餵的寶寶兩餐之間「6個月內皆不需要餵開水,以免增加腎臟負荷」。","detail":{"background":"純母乳哺育:「6個月內純母乳的嬰兒不需額外餵開水」——母乳含足夠水分;額外餵水會「增加未成熟腎臟負荷、減少奶量攝取、增水中毒風險、佔據胃容量影響母乳攝取與泌乳」。本題正確為「6個月內純母乳寶寶皆不需餵開水,避免增加腎臟負荷」(D)。","options":{"A":"錯。純母乳不需餵開水防結晶尿。","B":"錯。餵開水非預防鵝口瘡之法。","C":"錯。純母乳不需餵開水防便秘。","D":"正確。6個月內純母乳不需餵開水,避免增加腎臟負荷。"},"sources":["新文京《產科護理學》純母乳哺育","嬰兒餵養"]}},"111110-N4-55":{"quick":"高胱胺酸尿症(HCU)長期照護中「禁食母奶採豆類配方特殊奶粉」為錯誤。","detail":{"background":"高胱胺酸尿症(homocystinuria, HCU):甲硫胺酸代謝異常致同半胱胺酸堆積,影響眼(水晶體脫位)、骨骼(似馬凡氏)、血管(血栓)、智能。治療:「限制甲硫胺酸(methionine)飲食、補充維生素B6(對B6有反應型)、補充半胱胺酸與葉酸/B12」。「禁食母奶、改豆類配方(如PKU用的3200-K是苯酮尿症配方)錯誤」——HCU並非禁母奶、且3200-K是PKU(苯酮尿症)的低苯丙胺酸配方,非HCU用;HCU用低甲硫胺酸特殊配方。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。HCU非禁母奶、3200-K是PKU配方非HCU用。","B":"正確。對B6反應不佳者需限制甲硫胺酸。","C":"正確。按時接受體格與智力發育評估。","D":"正確。早期治療可避免水晶體脫垂等眼病變。"},"sources":["Nelson《兒科學》高胱胺酸尿症","遺傳代謝飲食"]}},"112030-N4-22":{"quick":"純母乳寶寶喝完奶就解稀糊便,最適當指導是「母乳水分含量高、胃結腸反射明顯,來不及吸收水分而稀糊便」。","detail":{"background":"純母乳嬰兒便便:母乳易消化吸收,「母乳水分含量高、嬰兒胃結腸反射(gastrocolic reflex)明顯,常一喝奶就解便、糞便稀糊、帶酸味、金黃色」屬正常(非腹瀉、非過敏)。前奶富含乳糖,乳糖經腸道發酵使糞便偏酸稀糊也屬正常生理。不需改水解配方或歸因母親高脂飲食。本題最適當為「母乳水分高、胃結腸反射明顯,來不及吸收水分而稀糊便」(D);選項B把乳糖歸於後奶錯誤(乳糖前奶較多)。","options":{"A":"錯。非對母乳過敏,不需改水解配方。","B":"乳糖前奶較多(非後奶),歸因敘述有誤。","C":"非母親高脂飲食所致。","D":"正確。母乳水分高、胃結腸反射明顯,屬正常稀糊便。"},"sources":["Nelson《兒科學》母乳嬰兒糞便","胃結腸反射"]}},"112110-N4-25":{"quick":"完全母乳、出生兩週體重仍低於出生體重,最優先處置是「儘快到醫院進行哺乳與新生兒評估檢查」。","detail":{"background":"新生兒體重:出生後生理性體重下降(約5–10%)應在「出生後約7–10天恢復到出生體重」。本例「出生兩週(14天)體重3700g仍低於出生體重3800g」=體重未如期回升,屬警訊(可能哺餵不足/疾病),「最優先應儘快到醫院做哺乳與新生兒完整評估與檢查」(評估含乳、奶量移出、有無疾病),而非僅電話建議增加頻率或逕自補配方奶。本題最優先為「鼓勵說出感受並儘快到醫院評估檢查」(D)。","options":{"A":"僅電話建議增頻、再觀察兩天,延誤評估。","B":"逕自立即補配方奶非最優先(應先評估原因)。","C":"增加母親飲食非解決體重未回升的優先處置。","D":"正確。儘快到醫院做哺乳與新生兒評估檢查。"},"sources":["新文京《產科護理學》新生兒體重","母乳哺育追蹤"]}},"112110-N4-51":{"quick":"妊娠31週早產兒(出生一週、1868g)營養照護,最正確的是「口胃管灌食時反抽量大於灌食量一半時應暫停餵食」。","detail":{"background":"早產兒營養:(1)餵食方式依成熟度,32–34週前吸吮吞嚥協調未成熟者以口/鼻胃管灌食為主(非經口為主)——故A錯;(2)儘量使用母乳(可加母乳添加劑),優於早產兒配方(母乳防壞死性腸炎NEC)——故C「以早產兒配方為主」非最佳;(3)全靜脈營養僅在腸道無法耐受時(能腸道餵食即儘量用)——故B錯;(4)「口胃管灌食前反抽(殘餘奶量),若反抽量>前次灌食量的一半表示腸道耐受不良/可能NEC,應暫停餵食」——正確。本題最正確為D。","options":{"A":"錯。早產兒吸吮吞嚥未成熟,以管灌為主非經口。","B":"錯。能腸道餵食即儘量用,非全靜脈營養。","C":"錯。母乳優於早產兒配方(防NEC)。","D":"正確。反抽量>灌食量一半應暫停餵食。"},"sources":["Nelson《兒科學》早產兒營養","管灌餵食"]}},"112180-N4-19":{"quick":"胎兒無法自行合成、需出生後從母乳獲得的免疫球蛋白是「IgA」。","detail":{"background":"新生兒免疫球蛋白:「IgG」可經胎盤由母體傳給胎兒(被動免疫,出生時最高);「IgM」胎兒可自行合成(故臍血IgM升高提示子宮內感染);「IgA胎兒無法自行合成、也不太過胎盤,出生後主要由母乳(初乳)中的分泌型IgA(sIgA)獲得」保護腸道黏膜。本題需從母乳獲得者為「IgA」(C)。","options":{"A":"IgM胎兒可自行合成。","B":"IgG經胎盤由母體傳給胎兒。","C":"正確。IgA胎兒無法自行合成,出生後由母乳獲得。","D":"IgE與過敏相關,非母乳被動免疫主力。"},"sources":["新文京《產科護理學》免疫球蛋白","母乳免疫"]}},"113030-N4-36":{"quick":"預防新生兒猝死(SIDS)的睡眠環境,正確的是「嬰兒應避免穿過多衣服或用衣物包覆頭部」。","detail":{"background":"預防嬰兒猝死症候群(SIDS)睡眠安全:「仰睡(不可趴睡/側睡)、嬰兒獨立同室不同床(不與大人同床)、硬床墊、不放枕頭/絨毛玩具/鬆軟寢具、避免穿過多衣物或包覆頭部致過熱、避免菸害、可用安撫奶嘴」。本題正確為「避免穿過多衣服或用衣物包覆頭部(防過熱)」(D);同床、枕頭抬高頭部、枕邊放絨毛玩具皆增SIDS風險。","options":{"A":"錯。同床增SIDS風險,應同室不同床。","B":"錯。仰睡正確但不應以枕頭抬高頭部(且不放枕頭)。","C":"錯。枕邊放絨毛玩具增窒息/SIDS風險。","D":"正確。避免穿過多衣物或包覆頭部(防過熱)。"},"sources":["Nelson《兒科學》SIDS","安全睡眠"]}},"101030-N4-24":{"quick":"目前產科護理發展趨勢是「尊重孕婦自主與決策權,協助規劃生產計畫書」。","detail":{"background":"現代產科護理趨勢(人性化/友善生產):「尊重孕產婦自主與決策權、協助規劃生產計畫書、家庭中心照護、減少不必要醫療介入、24小時母嬰同室、依需求哺餵、產後儘早哺乳」。「限制訪客預防感染、積極採用醫療藥物如常規無痛分娩、產後2–3天才開始哺乳」皆與現代趨勢相違。本題趨勢為「尊重自主、協助生產計畫書」(C)。","options":{"A":"限制訪客防感染非現代趨勢(鼓勵家人參與)。","B":"積極採用醫療/藥物非趨勢(減少不必要介入)。","C":"正確。尊重孕婦自主與決策,協助規劃生產計畫書。","D":"錯。應產後儘早哺乳,非2–3天後。"},"sources":["新文京《產科護理學》產科護理趨勢","人性化生產"]}},"102030-N4-26":{"quick":"母嬰親善醫院認證標準正確的是「醫院應有支持成功哺乳的政策」。","detail":{"background":"母嬰親善醫院(BFHI)措施:第一條即「訂定支持成功哺乳的書面政策並讓所有人員知悉」。其餘:純母乳嬰兒不提供安撫奶嘴與奶瓶(防乳頭混淆)、實施24小時母嬰同室(非8小時)、不常規補充開水或葡萄糖水(除醫療需要)。本題正確為「醫院應有支持成功哺乳的政策」(A)。","options":{"A":"正確。醫院應有支持成功哺乳的書面政策。","B":"錯。純母乳嬰兒不提供安撫奶嘴。","C":"錯。應24小時母嬰同室,非8小時。","D":"錯。不常規補充開水或葡萄糖水。"},"sources":["新文京《產科護理學》母嬰親善BFHI","哺乳政策"]}},"102110-N4-22":{"quick":"實施24小時母嬰同室「不」是為了「母親自己照顧、減少護理人力」。","detail":{"background":"24小時母嬰同室目的:「增進親子依附關係、促進成功母乳哺餵(依需求哺餵)、以家庭為中心的照護、母親熟悉並學習照顧新生兒」。「減少護理人力不是其目的」(母嬰同室仍需護理人員提供支持與衛教,非為省人力)。本題「不是」目的者為「減少護理人力」(D)。","options":{"A":"是目的。增進親子依附關係。","B":"是目的。促進成功母乳哺餵。","C":"是目的。家庭為中心的護理照護。","D":"本題答案(非目的)。減少護理人力不是母嬰同室目的。"},"sources":["新文京《產科護理學》母嬰同室","母嬰親善"]}},"103030-N4-20":{"quick":"母嬰同室產婦餵奶後打開包布檢查觸摸寶寶四肢,最合適是「鼓勵個案觸摸寶寶,這是熟識寶寶的方法」。","detail":{"background":"母嬰同室與依附關係:母親「主動觀察、觸摸、檢查新生兒(由指尖觸摸→手掌環抱)」是建立依附關係、熟悉與認識寶寶的正常且應被鼓勵的行為。護理應「正向支持鼓勵其觸摸探索」,而非以「會著涼、受感染」等阻止。本題最合適為「鼓勵個案觸摸寶寶,這是熟識寶寶的方法」(C)。","options":{"A":"不應以「著涼」阻止其探索觸摸。","B":"過度限縮(觸摸探索亦是熟識方法)。","C":"正確。鼓勵觸摸寶寶,這是熟識寶寶的方法。","D":"不應以「防感染」阻止觸摸(洗手即可)。"},"sources":["新文京《產科護理學》依附關係","母嬰同室"]}},"103030-N4-39":{"quick":"母嬰同室預防新生兒感染最重要原則是「加強父母與家人正確洗手及洗手五時機」。","detail":{"background":"母嬰同室感染管制最重要、最有效的原則是「手部衛生——加強接觸新生兒的父母與家人正確洗手與洗手五時機」(手是傳播病原最主要媒介)。其餘:不需把新生兒送回嬰兒室(同室反而減少交互感染)、哺乳前不需以酒精/清水擦乳頭(破壞乳頭保護且乳房菌叢有益)、不需常規穿隔離衣。本題最重要原則為「正確洗手及洗手五時機」(C)。","options":{"A":"錯。母嬰同室反而減少交互感染,不需送回嬰兒室。","B":"錯。哺乳前不需擦拭乳頭。","C":"正確。手部衛生(正確洗手、洗手五時機)為最重要原則。","D":"穿隔離衣非最重要原則(手部衛生才是)。"},"sources":["新文京《產科護理學》手部衛生","母嬰同室感染管制"]}},"105030-N4-25":{"quick":"親子同室注意事項中「餵母奶的媽媽才能執行親子同室」為不適當。","detail":{"background":"親子同室:早期接觸有助親子關係建立、可提高母乳哺餵成功率、可讓較大兄姐(洗手後)撫摸新生兒參與。「親子同室不限於餵母乳者——餵配方奶的母親同樣可、也應執行親子同室」(同室目的是增進依附與母親學習照護,非僅為哺乳)。本題「不適當」者為「餵母奶的媽媽才能執行親子同室」(D)。","options":{"A":"適當。早期接觸有助親子關係建立。","B":"適當。讓較大兄姐撫摸新生兒參與。","C":"適當。可提高母乳哺餵成功率。","D":"不適當(本題答案)。餵配方奶者同樣可執行親子同室。"},"sources":["新文京《產科護理學》親子同室","母嬰親善"]}},"106110-N4-1":{"quick":"有助於「生產是家庭關係重新開始」理念的政策是「若沒有合併症,提倡早期出院」。","detail":{"background":"家庭中心生產照護理念:鼓勵「家庭成員參與生產與育兒、早期親子接觸、(低風險)早期出院回歸家庭環境共同適應新成員」。「禁止家人參與生產、嬰兒須待嬰兒室、點完眼藥才哺乳」皆與家庭中心理念相違。本題有助此理念者為「若沒有合併症,提倡早期出院」(B)。","options":{"A":"禁止家庭成員參與生產違背家庭中心理念。","B":"正確。低風險者提倡早期出院回歸家庭。","C":"嬰兒須待嬰兒室違背親子同室。","D":"點完眼藥才哺乳延後親子接觸。"},"sources":["新文京《產科護理學》家庭中心照護","早期出院"]}},"108020-N4-2":{"quick":"母嬰親善醫院十大措施中「提供嬰兒安撫奶嘴」為錯誤。","detail":{"background":"母嬰親善十大措施(WHO/UNICEF):支持哺乳政策、訓練人員、孕期衛教哺乳好處、產後儘早(半小時內)哺乳、教母親維持泌乳、除醫療需要不給母乳以外食物、24小時母嬰同室、依需求哺餵、不給安撫奶嘴或人工奶嘴、轉介母乳支持團體。故「提供嬰兒安撫奶嘴」與措施相違(會致乳頭混淆)。本題「錯誤」者為「提供嬰兒安撫奶嘴」(C)。","options":{"A":"正確。提倡產後儘早哺餵母乳。","B":"正確。依嬰兒需求哺餵。","C":"錯誤(本題答案)。母嬰親善不提供安撫奶嘴。","D":"正確。實施24小時親子同室。"},"sources":["新文京《產科護理學》母嬰親善十大措施","BFHI"]}},"108020-N4-19":{"quick":"母乳哺餵的禁忌是「藥物濫用」。","detail":{"background":"母乳哺餵禁忌:「母親藥物濫用(毒品)、未經治療的活動性肺結核(暫停直接哺餵)、HIV感染(已開發地區)、接受化療/放射性同位素治療、嬰兒罹患半乳糖血症(galactosemia)、某些特定藥物」。乳腺炎可繼續哺乳(非禁忌)、A型肝炎、黃疸非禁忌。本題禁忌為「藥物濫用」(C)。","options":{"A":"乳腺炎可繼續哺乳,非禁忌。","B":"膽紅素低非哺乳禁忌。","C":"正確。藥物濫用為母乳哺餵禁忌。","D":"母親A型肝炎非哺乳禁忌。"},"sources":["新文京《產科護理學》哺乳禁忌","母乳哺育"]}},"108110-N4-1":{"quick":"母嬰親善醫院規定是「除非醫療特殊需要,否則不給嬰兒母奶以外的食物(含水、葡萄糖水、配方奶)」。","detail":{"background":"母嬰親善(WHO/UNICEF)規定:「除醫療需要外,不給新生兒母乳以外的食物或飲料(包括開水、葡萄糖水、配方奶)」(避免影響母乳攝取與泌乳建立、避免乳頭混淆)。其餘:不要求所有母親在產檯即哺乳(視母嬰狀況、產後一小時內儘早即可)、應24小時母嬰同室(非8小時)、不提供人工/安撫奶嘴。本題正確為「除醫療需要不給母奶以外食物」(C)。","options":{"A":"錯。非要求所有母親在產檯即哺乳。","B":"錯。應24小時母嬰同室,非8小時。","C":"正確。除醫療需要不給母奶以外食物(含水、糖水、配方奶)。","D":"錯。不提供人工或安撫奶嘴。"},"sources":["新文京《產科護理學》母嬰親善規定","BFHI"]}},"108110-N4-22":{"quick":"母嬰親善十項措施中「生產後於產檯立即性肌膚接觸」可直接促進親子依附關係。","detail":{"background":"母嬰親善措施與依附關係:「產後即刻肌膚接觸(skin-to-skin)——讓新生兒趴在母親胸腹、直接皮膚接觸」可直接促進親子依附(bonding)、穩定新生兒體溫心跳、誘發尋乳哺乳。其餘措施(不提供配方奶、不用奶瓶奶嘴、母乳支持團體)主要支持哺乳,對依附是間接。本題可直接促進依附者為「產後立即肌膚接觸」(A)。","options":{"A":"正確。產後立即肌膚接觸直接促進親子依附。","B":"不提供配方奶主要支持哺乳(間接)。","C":"不用奶瓶奶嘴主要支持哺乳(間接)。","D":"母乳支持團體主要支持哺乳(間接)。"},"sources":["新文京《產科護理學》肌膚接觸","親子依附"]}},"109030-N4-1":{"quick":"母嬰親善認證標準正確的是「懷孕時便應知道哺餵母乳的好處,產後安排母嬰立即接觸」。","detail":{"background":"母嬰親善:孕期即衛教哺乳好處、產後安排母嬰立即(肌膚)接觸與儘早哺乳、依需求哺餵(不訂死時間)。其餘錯誤:餵後不需餵開水(母乳兒不需水)、哭泣不應給奶嘴(應評估需求哺餵)、哺餵不應僵化規定「白天每2–3小時、夜間每3–4小時」(應依嬰兒需求、含夜間)。本題正確為「孕期知道哺乳好處、產後母嬰立即接觸」(D)。","options":{"A":"錯。母乳兒餵後不需餵開水。","B":"錯。哭泣應評估需求哺餵,不給奶嘴。","C":"錯。哺餵應依需求(含夜間),非僵化時間表。","D":"正確。孕期知道哺乳好處、產後母嬰立即接觸。"},"sources":["新文京《產科護理學》母嬰親善認證","依需求哺餵"]}},"109030-N4-18":{"quick":"WHO成功母乳哺育之母嬰肌膚接觸敘述中「剖腹產後不應進行母嬰肌膚接觸」為錯誤。","detail":{"background":"母嬰肌膚接觸(skin-to-skin):應「產後儘早、持續至少1小時、出現尋乳徵象時嘗試第一次餵奶、過程監測新生兒膚色與血氧(防姿勢性窒息)」。「剖腹產後仍應進行肌膚接觸(母親清醒下、由人協助於恢復室或手術室即可),並非不應進行」,故「剖腹產後不應肌膚接觸」錯誤。本題「錯誤」者為D。","options":{"A":"正確。肌膚接觸時監測新生兒血氧/膚色。","B":"正確。鼓勵肌膚接觸至少1小時。","C":"正確。出現尋乳徵象時嘗試第一次餵奶。","D":"錯誤(本題答案)。剖腹產後仍應進行母嬰肌膚接觸。"},"sources":["新文京《產科護理學》肌膚接觸","剖腹產哺乳"]}},"112180-N4-13":{"quick":"依國健署嬰幼兒最佳餵養建議,「新生兒照護評估後30分鐘再開始初次肌膚接觸」為不適當。","detail":{"background":"國健署/母嬰親善建議:「產後應立即(儘速、約一小時內、不刻意延遲30分鐘)進行母嬰肌膚接觸並持續至少1小時、出現尋乳徵象即哺乳」;家人陪伴下親子同室;依嬰兒飢餓訊號餵母乳不限時間頻率;脹奶時手擠奶。「評估後30分鐘再開始初次肌膚接觸不適當」(應立即、不刻意延遲)。本題「不適當」者為A。","options":{"A":"不適當(本題答案)。應產後立即肌膚接觸,非延遲30分鐘。","B":"適當。家人陪伴下親子同室。","C":"適當。依飢餓訊號餵母乳,不限時間頻率。","D":"適當。鼓勵親餵,脹奶時手擠奶。"},"sources":["新文京《產科護理學》肌膚接觸","嬰幼兒餵養建議"]}},"115030-N4-1":{"quick":"我國母嬰親善醫院認證基準中「嬰兒哭泣時可提供安撫奶嘴」為錯誤。","detail":{"background":"我國母嬰親善認證基準:提供孕婦哺乳衛教指導、依醫療需求才提供母乳以外食物或飲料、親子同室依嬰兒需求哺餵、不提供人工/安撫奶嘴(避免乳頭混淆)。故「嬰兒哭泣時可提供安撫奶嘴」與基準相違。本題「錯誤」者為「嬰兒哭泣時可提供安撫奶嘴」(D)。","options":{"A":"正確。提供孕婦哺乳衛教及指導。","B":"正確。醫療需求下可提供母乳以外食物或飲料。","C":"正確。親子同室依嬰兒需求哺餵。","D":"錯誤(本題答案)。母嬰親善不提供安撫奶嘴。"},"sources":["新文京《產科護理學》母嬰親善認證基準","安撫奶嘴"]}},"115030-N4-12":{"quick":"剖腹產母親渴望與新生兒共處,處置中「產婦疲憊想休息時仍應實施親子同室」為錯誤。","detail":{"background":"親子同室原則:應「尊重母親的狀態與意願——當產婦疲憊想休息時,應彈性協助(可暫由嬰兒室或家人協助照護、讓母親休息),不應僵化要求仍須實施親子同室」(過度勉強反不利母親恢復與親子互動)。其餘:產檯即可鼓勵肌膚接觸、建議24小時親子同室、隨時提供諮詢皆正確。本題「錯誤」者為「產婦疲憊想休息時仍應實施親子同室」(C)。","options":{"A":"正確。分娩後於產檯即可鼓勵肌膚接觸。","B":"正確。建議實施24小時親子同室。","C":"錯誤(本題答案)。產婦疲憊想休息時應彈性協助,非仍強制同室。","D":"正確。隨時提供母嬰健康照護諮詢。"},"sources":["新文京《產科護理學》親子同室","母嬰親善"]}},"102030-N4-19":{"quick":"產後第5天乳房紅腫熱痛(乳腺炎),合適處置是「持續哺餵母乳」。","detail":{"background":"乳腺炎(mastitis):乳房局部紅腫熱痛、可能發燒,常因乳汁滯留+乳頭破損細菌入侵。處置:「持續哺餵(尤患側)/有效排空乳汁(乳汁不會使嬰兒受害,移除滯留乳汁是治療關鍵)、多休息多水分、患部冷敷止痛、餵奶前溫敷與按摩助排出、必要時抗生素」。「暫停哺乳、限制水分、避免碰觸按摩」皆錯誤(會加重乳汁滯留)。本題合適為「持續哺餵母乳」(C)。","options":{"A":"錯。不應暫停哺乳(乳汁不會使嬰兒受害,移除乳汁是治療)。","B":"錯。不應限制水分。","C":"正確。持續哺餵母乳(有效排空乳汁)。","D":"錯。不應避免碰觸按摩(適度按摩助排出)。"},"sources":["新文京《產科護理學》乳腺炎","母乳哺育"]}},"104030-N4-24":{"quick":"乳腺炎與乳房充盈比較中「二者皆易發生於產後1至4週」為錯誤。","detail":{"background":"乳腺炎 vs 乳房充盈(脹奶):乳腺炎單側、乳房充盈雙側;兩者皆可能發燒、皆有乳房腫脹疼痛。發生時間不同——「乳房充盈(脹奶)多發生產後3–5天(泌乳開始時);乳腺炎則多在產後2–4週(甚至更晚)」,故「二者皆易發生於產後1至4週」不準確(脹奶在產後第一週、非1–4週皆然),為要選出的錯誤敘述。本題「錯誤」者為D。","options":{"A":"正確。乳腺炎多單側,乳房充盈多雙側。","B":"正確。兩者皆可能發燒。","C":"正確。兩者皆有乳房腫脹與疼痛。","D":"錯誤(本題答案)。脹奶多在產後3–5天,乳腺炎多在2–4週,非皆1–4週。"},"sources":["新文京《產科護理學》乳腺炎/脹奶","母乳哺育"]}},"104100-N4-16":{"quick":"產後母乳問題護理正確的是「乳頭破皮常見原因為嬰兒沒有正確含乳」。","detail":{"background":"母乳常見問題:(1)「乳頭破皮最常見原因是含乳不正確」——正確(改善含乳即改善);(2)預防脹奶靠依需求頻繁哺餵/有效排空,不應多用電動吸奶器過度排空(會刺激更多泌乳、惡性循環);(3)吸吮姿勢不對應調整含乳,不應先用奶嘴練習(致乳頭混淆);(4)乳頭扁平仍可成功哺餵(評估伸展性、正確含乳)。本題正確為「乳頭破皮常因嬰兒沒有正確含乳」(A)。","options":{"A":"正確。乳頭破皮常因含乳不正確。","B":"錯。不應多用電動吸奶器排空(會刺激更多泌乳)。","C":"錯。不應用奶嘴練習(致乳頭混淆)。","D":"錯。乳頭扁平仍可成功哺餵。"},"sources":["新文京《產科護理學》母乳問題","含乳"]}},"105090-N4-23":{"quick":"擔心兩天後乳房脹痛,最適宜護理指導是「依照嬰兒需求哺餵母奶」。","detail":{"background":"預防脹奶(乳房充盈):關鍵是「依嬰兒需求頻繁哺餵、有效排空乳汁」(供需平衡、避免乳汁滯留)。「餵完把餘奶完全擠出」會刺激更多泌乳、惡性循環(脹奶時可擠出少量緩解、非完全排空);「少喝水」無助且不應;「每次餵奶前熱敷按摩」適用已脹奶時助排出,預防脹奶最根本是依需求哺餵。本題最適宜為「依照嬰兒需求哺餵母奶」(D)。","options":{"A":"錯。餘奶完全擠出會刺激更多泌乳。","B":"錯。少喝水無助且不應。","C":"餵前熱敷按摩用於已脹奶,非預防首選。","D":"正確。依嬰兒需求哺餵(供需平衡)預防脹奶。"},"sources":["新文京《產科護理學》脹奶預防","依需求哺餵"]}},"106030-N4-23":{"quick":"寶寶1歲前離奶(斷奶),敘述中「排空乳房以減輕乳房腫脹不適」為錯誤。","detail":{"background":"漸進式離乳(斷奶):「逐漸減少哺餵次數、以杯/奶瓶替代、穿合身具支托性胸罩、限制水分、必要時冷敷、脹痛時僅擠出少量緩解」。「排空乳房錯誤」——完全排空會刺激更多泌乳、延長離乳、增脹痛,離乳時應減少排空讓泌乳逐漸減退。攝取小麥汁/韭菜等退奶食物為傳統做法。本題「錯誤」者為「排空乳房以減輕腫脹」(B)。","options":{"A":"正確。漸進以奶瓶餵食替代母乳。","B":"錯誤(本題答案)。離乳不應排空乳房(會刺激更多泌乳)。","C":"正確。穿合身具支托性胸罩。","D":"正確。攝取小麥汁或韭菜等退奶食物(傳統)。"},"sources":["新文京《產科護理學》離乳","退奶"]}},"106110-N4-35":{"quick":"乳癌高危險群為「長期使用雌激素及黃體激素(1)＋從未懷孕(4)」,即14。","detail":{"background":"乳癌危險因子:「長期使用雌激素及黃體激素(荷爾蒙)、未曾懷孕/未哺乳(初經早、停經晚)、初產年齡晚、家族史/BRCA、肥胖、高齡」。保護因子:「母乳親餵(降低乳癌卵巢癌)、維持正常BMI、規律運動」。故「(1)長期用荷爾蒙、(4)從未懷孕」為高危險群;「(2)母乳親餵、(3)BMI 23(正常)」為保護/中性。本題高危險群為(1)(4)即14(C)。","options":{"A":"含(2)母乳親餵(保護因子),錯。","B":"含(3)BMI正常(非危險因子),錯。","C":"正確。(1)長期用荷爾蒙+(4)從未懷孕為高危險群。","D":"含(2)(3)皆非危險因子,錯。"},"sources":["新文京/Robbins 乳癌危險因子","婦女健康"]}},"106111-N4-21":{"quick":"漸進性離乳措施中「乳房熱敷」為錯誤。","detail":{"background":"漸進性離乳措施:「減少餵母奶次數、限制水分攝取、穿胸部束縛帶/合身胸罩支托、脹痛時冷敷止痛緩解」。「乳房熱敷錯誤」——熱敷會促進血流與泌乳、刺激排乳,與離乳(減少泌乳)目標相反;離乳應冷敷。本題「錯誤」者為「乳房熱敷」(B)。","options":{"A":"正確。使用胸部束縛帶支托。","B":"錯誤(本題答案)。離乳應冷敷,熱敷會促泌乳。","C":"正確。減少餵母奶的次數。","D":"正確。限制水分攝取。"},"sources":["新文京《產科護理學》離乳","冷敷"]}},"107030-N4-23":{"quick":"產後第三天乳房觸痛發熱變硬有硬塊,正確指導是「讓寶寶多吸奶,若吸得不好應每2~3小時擠奶」。","detail":{"background":"乳房腫脹/初期乳腺炎(乳汁滯留)處置:關鍵是「有效移除乳汁——讓寶寶多吸患側、若吸得不好則每2–3小時擠奶」、餵奶前溫敷與按摩助排出、餵奶後冷敷止痛、多休息多水分。「24小時會自己好(被動等待)、用乳頭罩、減少液體」皆錯誤(會加重乳汁滯留)。本題正確為「讓寶寶多吸奶,吸不好每2~3小時擠奶」(B)。","options":{"A":"錯。不應被動等待24小時(需主動移除乳汁)。","B":"正確。讓寶寶多吸、吸不好每2~3小時擠奶。","C":"乳頭罩非處理乳房腫脹硬塊的方法。","D":"錯。不應減少液體攝取。"},"sources":["新文京《產科護理學》乳房腫脹","乳汁移除"]}},"110030-N4-20":{"quick":"產後第三天嚴重脹奶想打退奶針,最適當處置是「刺激噴乳反射,協助擠出乳汁」。","detail":{"background":"產後3–5天「脹奶(乳房充盈)」處置(想繼續哺乳者):「餵奶前溫敷與按摩、刺激噴乳(排乳)反射、協助擠出/讓寶寶多吸移除乳汁、餵奶後冷敷止痛、依需求頻繁哺餵」。不應定時餵奶(應依需求)、不應熱敷直到柔軟(過度熱敷反增腫脹;且須移除乳汁才會軟)、不應因一時脹奶就退奶+限水(本欲純母乳)。本題最適當為「刺激噴乳反射,協助擠出乳汁」(C)。","options":{"A":"錯。應依需求哺餵,非定時餵奶。","B":"熱敷直到柔軟不正確(須移除乳汁才會軟,過度熱敷增腫脹)。","C":"正確。刺激噴乳反射、協助擠出乳汁(移除滯留乳汁)。","D":"錯。不應因一時脹奶就退奶限水(本欲純母乳)。"},"sources":["新文京《產科護理學》脹奶","噴乳反射"]}},"111030-N4-40":{"quick":"乳房纖維腺瘤敘述中「為最常見的乳房良性腫瘤」為正確。","detail":{"background":"乳房纖維腺瘤(fibroadenoma):「最常見的乳房良性腫瘤」,好發於年輕女性(15–35歲、30歲以下);觸診為「界限清楚、表面光滑、可移動、無痛的圓形/橢圓形硬塊」;與荷爾蒙相關、多不需治療(或手術切除)。故「多發生30歲以上、因疼痛就醫、界限不明」皆錯。本題正確為「為最常見的乳房良性腫瘤」(B)。","options":{"A":"錯。好發於年輕女性(30歲以下)。","B":"正確。為最常見的乳房良性腫瘤。","C":"錯。纖維腺瘤多無痛(非因疼痛就醫)。","D":"錯。腫塊界限清楚、可移動。"},"sources":["新文京/婦科 乳房纖維腺瘤","良性腫瘤"]}},"112030-N4-28":{"quick":"乳腺炎評估照護中「常發生於產後1週內」為錯誤。","detail":{"background":"乳腺炎(mastitis):「多發生於產後2–4週(甚至更晚,非產後1週內)」(乳汁滯留+乳頭破損細菌入侵);通常單側;最常見致病菌為金黃色葡萄球菌;正確哺餵、有效排空、避免乳汁滯留可預防。故「常發生於產後1週內」錯誤。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。乳腺炎多在產後2–4週,非1週內。","B":"正確。通常發生於單側乳房。","C":"正確。最常見致病菌為金黃色葡萄球菌。","D":"正確。指導正確哺餵可預防。"},"sources":["新文京《產科護理學》乳腺炎","母乳哺育"]}},"112110-N4-22":{"quick":"乳腺炎用藥與哺乳建議,最適當是「可持續哺乳,用藥後24~48小時發燒發紅硬塊通常改善」。","detail":{"background":"乳腺炎治療:「持續哺乳/有效排空乳汁(治療關鍵)、休息、水分、止痛、必要時抗生素(常用抗金黃葡萄球菌如cloxacillin/cephalexin)」;「用藥後約24–48小時症狀(發燒、發紅、硬塊)通常改善」(若48小時未改善需就醫評估膿瘍/抗藥)。抗生素療程應完成整個療程(非症狀消失即停)、哺乳不需服藥2小時內停餵。本題最適當為「持續哺乳,用藥後24~48小時症狀改善」(C)。","options":{"A":"治療需哺乳/排空為關鍵,非僅靠ampicillin。","B":"哺乳不需服藥2小時內停餵。","C":"正確。持續哺乳,用藥後24~48小時症狀改善。","D":"錯。抗生素應完成整個療程,非症狀消失即停。"},"sources":["新文京《產科護理學》乳腺炎","抗生素哺乳"]}},"113030-N4-12":{"quick":"產後6週、發燒、右乳溫熱痛且乳頭可見傷口,最可能診斷是「乳腺炎(mastitis)」。","detail":{"background":"乳房問題鑑別(看圖與病史):「乳腺炎——發燒、乳房局部紅腫熱痛、常單側、乳頭可見傷口(破損為細菌入侵門戶),本例符合」;乳房腫脹(脹奶)多雙側、產後早期、無傷口;乳腺管阻塞無發燒、局部硬塊;乳房膿瘍為乳腺炎進展、有波動感/水囊感。本例發燒+乳頭傷口+局部紅腫熱痛,最可能為「乳腺炎」(C)。","options":{"A":"乳腺管阻塞無發燒、無此明顯感染表現。","B":"乳房腫脹多雙側、產後早期、無傷口。","C":"正確。發燒+乳頭傷口+紅腫熱痛=乳腺炎。","D":"乳房膿瘍須有波動/水囊感(本例為乳腺炎階段)。"},"sources":["新文京《產科護理學》乳腺炎","乳房問題鑑別"]}},"113100-N4-14":{"quick":"乳腺炎敘述中「應暫停哺乳,避免嬰兒受到感染」為錯誤。","detail":{"background":"乳腺炎:最常見致病菌金黃色葡萄球菌;哺乳頻率突然減少(乳汁滯留)為常見誘因;可發燒38.4–40°C。「應繼續哺乳/有效排空乳汁(乳汁不會使嬰兒受害,移除滯留乳汁是治療關鍵),不應暫停哺乳」,故「暫停哺乳避免感染」錯誤。本題「錯誤」者為B。","options":{"A":"正確。最常見致病菌為金黃色葡萄球菌。","B":"錯誤(本題答案)。應繼續哺乳/排空,不應暫停哺乳。","C":"正確。哺乳頻率突然減少可能是導因。","D":"正確。可能發燒38.4–40°C。"},"sources":["新文京《產科護理學》乳腺炎","繼續哺乳"]}},"113180-N4-15":{"quick":"乳腺炎護理措施中「立即協助乳汁培養並立即進行完整抗生素治療」為不適當。","detail":{"background":"乳腺炎處置原則:先「改善乳房引流(有效排空患側乳汁)、完整哺乳史評估去除導因(含乳/餵食頻率)、症狀照護(餵前止痛、餵後冷敷)」」;「並非一發現就立即乳汁培養並完整抗生素治療」——多數乳腺炎先以移除乳汁、保守處理24–48小時,症狀無改善或嚴重時才用抗生素/培養,故「立即培養並立即完整抗生素」為過度、不適當。本題「不適當」者為D。","options":{"A":"適當。改善發紅部位乳房引流。","B":"適當。完整哺乳史評估去除導因。","C":"適當。餵前止痛、餵後冷敷症狀照護。","D":"不適當(本題答案)。不應一發現就立即培養與完整抗生素(先移除乳汁、保守24–48小時)。"},"sources":["新文京《產科護理學》乳腺炎處置","抗生素時機"]}},"114100-N4-16":{"quick":"產後第三天乳房變硬熱但「不會痛」(乳房充盈/脹奶),最適當是「增加哺乳次數」。","detail":{"background":"乳房充盈(脹奶,engorgement):產後3–5天泌乳開始,乳房雙側變硬、發熱、脹滿,本例「不會痛、無感染徵象」屬脹奶(非乳腺炎)。最根本處置是「增加哺乳次數、有效排空乳汁」(移除滯留乳汁、供需平衡);輔以餵前溫敷按摩、餵後冷敷。提供支持胸衣為輔助;塗消腫軟膏、牽引乳頭非處理脹奶之法。本題最適當為「增加哺乳次數」(B)。","options":{"A":"支持性胸衣為輔助,非根本處置。","B":"正確。增加哺乳次數、有效排空乳汁。","C":"塗消腫軟膏非處理脹奶之法。","D":"牽引乳頭非處理脹奶之法。"},"sources":["新文京《產科護理學》乳房充盈","哺乳"]}},"101110-N4-60":{"quick":"產後1個月惡露由淡黃色「轉回紅色」、無腹痛,最常見原因及處理為「子宮復舊不全,需就醫診療」。","detail":{"background":"惡露(lochia)正常演變:紅惡露(1–3天)→漿液性惡露(粉紅/褐,約4–10天)→白惡露(白/淡黃,約10天至2–4週)。「若已轉淡黃(白惡露)又倒退回紅色、或量突增,提示子宮復舊不全(常因胎盤碎片/胎膜殘留或子宮收縮不良)或晚期產後出血,需就醫診療」(可能需子宮收縮劑或清除殘留)。本題最常見原因及處理為「子宮復舊不全,需就醫」(D)。","options":{"A":"惡露倒退回紅色非正常,不可不理會。","B":"無腹痛、非典型產道急性受傷,非「立即就醫產道受傷」。","C":"非單純燉補所致,需評估復舊不全。","D":"正確。子宮復舊不全,需就醫診療。"},"sources":["新文京《產科護理學》惡露","子宮復舊不全"]}},"102030-N4-21":{"quick":"產墊惡露量通常以「60分鐘(1小時)」為評估時間單位。","detail":{"background":"惡露量評估:臨床以「1小時(60分鐘)內產褥墊浸濕的範圍」評估惡露量(如<10cm為少量、10–15cm中量、>15cm或1小時內整片浸濕為大量)。本題評估時間單位為「60分鐘」(B)。 補充:臨床惡露量分級(以1小時產墊浸濕範圍):少量(scant,<2.5cm或僅沾染)、中量(moderate,<10–15cm)、大量(heavy/large,>15cm或1小時內整片浸濕)、過量(excessive,15分鐘內浸濕整片需警覺產後出血)。評估時須一併記錄惡露顏色(紅→漿液→白)、有無血塊與氣味,並於活動/哺乳後評估(積存惡露排出量會暫增)。","options":{"A":"30分鐘非標準評估時間單位。","B":"正確。以60分鐘(1小時)為評估標準。","C":"90分鐘非標準。","D":"120分鐘非標準。"},"sources":["新文京《產科護理學》惡露量評估","產後護理"]}},"103100-N4-21":{"quick":"剛生產完的子宮按摩,適當方式是「一手固定在恥骨聯合上方,另一手環狀按摩子宮底」。","detail":{"background":"產後子宮按摩(防/治收縮乏力):正確手法為「一手置於恥骨聯合上方支托並固定子宮下段(防子宮被往下推致子宮內翻),另一手以指腹在子宮底做環狀輕柔按摩」促進收縮。不可兩手都在子宮底按壓、或按摩子宮下段。本題適當為「一手固定恥骨聯合上方,另一手環狀按摩子宮底」(C)。","options":{"A":"兩手交疊壓子宮底缺乏下方支托,增子宮內翻風險。","B":"按摩「子宮下段」位置錯誤。","C":"正確。一手固定恥骨聯合上方,另一手按摩子宮底。","D":"按摩「整個子宮」不正確。"},"sources":["新文京《產科護理學》子宮按摩","子宮內翻"]}},"103100-N4-22":{"quick":"生產後惡露變化敘述中「初產婦的惡露量通常比經產婦多」為錯誤。","detail":{"background":"惡露:產後1–3天為紅惡露(鮮紅);陰道生產惡露量通常比剖腹產多(剖腹術中已清除部分子宮內容物);評估1小時整片產褥墊濕透為大量。「初產婦 vs 經產婦:經產婦子宮肌張力較鬆、需更強收縮,惡露量通常較多,故初產婦惡露量比經產婦多錯誤」(應相反)。本題「錯誤」者為C。","options":{"A":"正確。產後1–3天為鮮紅色紅惡露。","B":"正確。陰道產惡露量通常比剖腹產多。","C":"錯誤(本題答案)。經產婦惡露量通常較多,非初產婦多。","D":"正確。1小時整片產褥墊濕透稱為大量。"},"sources":["新文京《產科護理學》惡露","初產經產比較"]}},"104030-N4-23":{"quick":"剖腹產第3天已能下床,子宮底高度正常大約在「臍下三指」。","detail":{"background":"子宮復舊(子宮底高度):產後立即約臍下,產後12小時上升至臍平或稍高於臍,之後每天約下降1指(1–2cm)。「產後第3天約在臍下2–3指」。本例剖腹產第3天,子宮底正常約「臍下三指」(D)。(剖腹產子宮復舊與陰道產相近。)","options":{"A":"恥骨聯合上一指約產後10–12天,過低。","B":"臍平約產後12小時,過高。","C":"臍下一指約產後1–2天。","D":"正確。產後第3天約臍下三指。"},"sources":["新文京《產科護理學》子宮底高度","子宮復舊"]}},"104100-N4-18":{"quick":"產後子宮復舊敘述中「子宮的復舊過程為進行性變化」為錯誤。","detail":{"background":"子宮復舊(involution):是子宮由產後縮回至孕前狀態的過程,屬「退行性(retrogressive)變化」(子宮肌細胞自體溶解、體積縮小、數目相對減少),非進行性變化。其餘:產後12小時子宮底約臍上一指或臍平、產後約10–14天降入骨盆腔、哺乳(催產素)促子宮收縮復舊皆正確。本題「錯誤」者為「子宮的復舊過程為進行性變化」(B,應為退行性)。","options":{"A":"正確。產後12小時子宮底約臍上一橫指或臍平。","B":"錯誤(本題答案)。子宮復舊為退行性變化,非進行性。","C":"正確。產後約10–14天子宮降至骨盆腔。","D":"正確。哺乳可促進子宮收縮。"},"sources":["新文京《產科護理學》子宮復舊","退行性變化"]}},"105030-N4-32":{"quick":"產後子宮復舊過程正確的是「產後第10天,無法於腹部觸摸到子宮底」。","detail":{"background":"子宮復舊:(1)子宮肌細胞自體溶解使體積縮小(細胞數目變化不大,主要是大小縮小)——故「細胞數目逐漸減少」描述不精確;(2)產程延長會減慢復舊(非加快);(3)產後1週子宮重量約500g(產後立即約1000g);(4)「產後約10–14天子宮降入骨盆腔,腹部即無法觸摸到子宮底」——正確。本題正確為「產後第10天無法於腹部觸摸到子宮底」(D)。","options":{"A":"細胞主要是體積縮小(自體溶解),「數目減少」描述不精確。","B":"錯。產程延長會減慢復舊,非加快。","C":"錯。產後1週子宮重量約500g,非1公斤。","D":"正確。產後第10天無法於腹部觸摸到子宮底。"},"sources":["新文京《產科護理學》子宮復舊","子宮底"]}},"105090-N4-10":{"quick":"產後生殖系統正常變化中「產後約12小時子宮底上升至肚臍位置或稍高於肚臍」為正確。","detail":{"background":"子宮底變化:產後立即約臍下,「產後約12小時子宮底上升至臍平或稍高於臍」(因膀胱脹、子宮韌帶鬆弛),之後每天下降約1指、約10–14天入骨盆腔。其餘:惡露約持續2–4週(非10天)、三型惡露依序非交替;產後3週腹部摸不到子宮底;子宮約產後6週恢復孕前大小(非4週)。本題正確為「產後約12小時子宮底上升至臍位或稍高」(C)。","options":{"A":"錯。惡露持續2–4週,且三型依序非交替。","B":"錯。產後3週腹部摸不到子宮底。","C":"正確。產後約12小時子宮底上升至臍位或稍高於臍。","D":"錯。子宮約產後6週恢復孕前大小,非4週。"},"sources":["新文京《產科護理學》子宮復舊","生殖系統"]}},"108020-N4-23":{"quick":"產後正常紅惡露的護理指導,正確的是「活動時流量會增加」。","detail":{"background":"正常紅惡露(lochia rubra,產後1–3天):鮮紅色、含血液與蛻膜碎片、有血腥味(非惡臭)、可含少量小血塊(非大量血塊)、活動/哺乳/起身時因姿勢與子宮收縮使積存惡露排出,流量會暫時增加屬正常。紅惡露不會持續至產後6週(約3天後轉漿液性)。本題正確為「活動時流量會增加」(C)。","options":{"A":"錯。紅惡露含少量小血塊,非大量血塊。","B":"錯。正常惡露為血腥味,非惡臭(惡臭提示感染)。","C":"正確。活動時惡露流量會增加(積存排出)。","D":"錯。紅惡露約3天,不持續至產後6週。"},"sources":["新文京《產科護理學》紅惡露","惡露護理"]}},"108020-N4-26":{"quick":"產婦分娩後生理回復至懷孕前狀態的期間稱為「產褥期(Puerperium)」。","detail":{"background":"產褥期(puerperium):指胎盤娩出後至產婦生理(尤生殖系統)恢復至懷孕前狀態的期間,「約產後6週(42天)」。子宮復舊(involution)是其中的子宮變化過程;惡露是其分泌物;霍曼徵象是血栓評估。本題期間名稱為「產褥期」(D)。","options":{"A":"復舊期(involution)指子宮復舊過程,非整個期間名稱。","B":"惡露期非標準期間名稱。","C":"霍曼期非期間名稱。","D":"正確。產褥期(Puerperium,約產後6週)。"},"sources":["新文京《產科護理學》產褥期","名詞"]}},"108110-N4-18":{"quick":"子宮復舊不全的現象是「產後18天在腹部觸摸到子宮底」。","detail":{"background":"子宮復舊不全(subinvolution):子宮復舊延遲——「產後約10–14天子宮應降入骨盆腔、腹部摸不到,若產後18天仍在腹部觸摸到子宮底即復舊不全」;另惡露延長或倒退回紅色。其餘為正常:子宮底每天下降1–2cm、產後1週子宮約500g、產後第1天子宮底臍平。本題復舊不全現象為「產後18天在腹部觸摸到子宮底」(A)。","options":{"A":"正確。產後18天仍可觸摸到子宮底=復舊不全。","B":"正常。子宮底每天約下降1–2cm。","C":"正常。產後1週子宮約500g。","D":"正常。產後第1天子宮底約臍平。"},"sources":["新文京《產科護理學》子宮復舊不全","子宮底"]}},"108110-N4-35":{"quick":"子宮頸約「產後7天」可恢復到幾乎完全閉合且變得較厚。","detail":{"background":"子宮頸復舊:產後子宮頸鬆軟、約可容2指;「約產後7天(1週)子宮頸內口幾乎完全閉合、子宮頸壁變厚」;子宮頸外口因生產撕裂,初產婦的圓形外口會變成橫裂狀(一字形),不再恢復原本形狀。本題子宮頸約「產後7天」幾乎完全閉合變厚(A)。","options":{"A":"正確。約產後7天子宮頸幾乎完全閉合變厚。","B":"14天非子宮頸閉合的標準時間。","C":"28天非標準。","D":"42天為整個產褥期,非子宮頸閉合時間。"},"sources":["新文京《產科護理學》子宮頸復舊","產褥期"]}},"109030-N4-19":{"quick":"陰道分娩產後第1天子宮偏軟、與臍同高並偏向右側,優先評估「解尿情形」。","detail":{"background":"產後子宮底正常在臍下、置中、堅硬。「子宮偏軟、位置偏高(與臍同高)且偏向一側(常偏右)」最常見原因是膀胱脹尿(脹大膀胱將子宮往上往右推、阻礙收縮)。故優先評估解尿情形/膀胱脹尿並協助排尿,排空後子宮多能歸位收縮。本題優先評估「解尿情形」(A)。","options":{"A":"正確。子宮偏高偏右提示膀胱脹,優先評估解尿。","B":"大便次數非此情境首要。","C":"進食狀況非首要。","D":"會陰傷口非子宮偏右上的優先評估。"},"sources":["新文京《產科護理學》膀胱脹/子宮復舊","產後評估"]}},"109030-N4-33":{"quick":"產後10天惡露變多呈紅色、確診子宮復舊不全,主要原因是「胎盤碎片殘留」。","detail":{"background":"子宮復舊不全(subinvolution)常見原因:「胎盤碎片/胎膜殘留(最主要,殘留組織阻礙子宮收縮與內膜修復→晚期出血、惡露倒退回紅、量增)、子宮內膜炎/骨盆感染、子宮肌瘤、子宮過度膨脹」。本例惡露量突增變紅,主要原因為「胎盤碎片殘留」(B)。處置:子宮收縮劑、必要時清除殘留組織。","options":{"A":"胎膜殘留亦可能,但「胎盤碎片殘留」為最主要/典型答案。","B":"正確。胎盤碎片殘留為子宮復舊不全主因。","C":"子宮張力不全為機轉之一,但本題主因為胎盤碎片殘留。","D":"骨盆感染為原因之一,非本題最主要。"},"sources":["新文京《產科護理學》子宮復舊不全","胎盤殘留"]}},"109110-N4-19":{"quick":"產後第2天子宮底堅硬、臍下2公分、惡露紅色少量,最適當指導是「解釋為子宮復舊正常現象」。","detail":{"background":"子宮復舊正常表現:子宮底堅硬、置中、每天下降約1指,「產後第2天約在臍下1–2指(2cm)、紅惡露少量」即正常復舊。故最適當是「向產婦解釋為子宮復舊的正常現象」,給予衛教安心;不需按摩(子宮已堅硬)、不需誘尿、不需通知醫師。本題最適當為「解釋為子宮復舊正常現象」(B)。","options":{"A":"子宮已堅硬,不需按摩至鬆軟。","B":"正確。此為子宮復舊正常現象,給予解釋。","C":"無膀胱脹徵象,不需誘尿。","D":"屬正常,不需通知醫師。"},"sources":["新文京《產科護理學》子宮復舊","產後衛教"]}},"109110-N4-26":{"quick":"產後生殖器官復舊過程正確的是「子宮體積縮小屬於退行性變化」。","detail":{"background":"生殖器官復舊:(1)「子宮體積縮小(自體溶解)屬退行性(retrogressive)變化」——正確;(2)復舊非每天以相同進展恢復(各器官速度不一);(3)三型惡露依序(紅→漿液→白)排出,非循環;(4)子宮復舊約6週(非6個月)完成。本題正確為「子宮體積縮小屬於退行性變化」(B)。","options":{"A":"錯。各器官復舊速度不一,非每天相同進展。","B":"正確。子宮體積縮小屬退行性變化。","C":"錯。三型惡露依序排出,非循環。","D":"錯。子宮復舊約6週完成,非6個月。"},"sources":["新文京《產科護理學》生殖器官復舊","退行性變化"]}},"110110-N4-23":{"quick":"正常陰道生產後的復舊變化中,「月經週期」恢復所需時間最長。","detail":{"background":"產後各系統恢復時間:陰道皺襞約產後3–4週再現;心輸出量於產後數週恢復;排尿量(產後利尿)於產後數日;「月經週期恢復時間最長且個別差異大——未哺乳者約產後6–8週恢復月經;哺乳者可延後數月(甚至哺乳期間皆無月經)」。本題所需時間最長者為「月經週期」(D)。","options":{"A":"陰道皺襞約產後3–4週再現。","B":"心輸出量產後數週恢復。","C":"排尿量產後數日恢復。","D":"正確。月經週期恢復時間最長(哺乳者更久)。"},"sources":["新文京《產科護理學》產後復舊時間","月經恢復"]}},"111030-N4-19":{"quick":"產後子宮復舊評估正確的是「宜先排空膀胱再進行」。","detail":{"background":"子宮復舊(子宮底)評估要點:「先請產婦排空膀胱(脹尿會使子宮底升高偏移、影響評估準確)、採平躺屈膝(非半坐臥)、一手支托恥骨聯合上方固定子宮、另一手觸診子宮底(雙手非單手)、剖腹產仍可輕柔觸診評估」。本題正確為「宜先排空膀胱再進行」(A)。","options":{"A":"正確。先排空膀胱再評估(脹尿影響準確度)。","B":"錯。宜採平躺屈膝,非半坐臥。","C":"錯。應雙手進行(一手支托一手觸診)。","D":"錯。剖腹產仍可輕柔觸診評估。"},"sources":["新文京《產科護理學》子宮復舊評估","子宮底觸診"]}},"111110-N4-24":{"quick":"產後子宮復舊敘述正確的是「胎盤部位由剝落過程復舊,所以沒有疤痕形成」。","detail":{"background":"子宮復舊:(1)子宮底每天下降約1指(1–2cm),約產後10–14天(非5天)降入骨盆腔;(2)胎盤位置以外的子宮內膜約產後3週(非6週)再生完成;(3)子宮復舊是肌細胞自體溶解使體積縮小(細胞數目變化不大,非「數目減少」為主);(4)「胎盤附著部位由內膜邊緣與底部向上再生、剝落舊組織的方式復舊,不留疤痕」——正確(否則疤痕會影響下次著床)。本題正確為「胎盤部位由剝落過程復舊,無疤痕」(D)。","options":{"A":"錯。約產後10–14天降入骨盆腔,非5天。","B":"錯。胎盤位置外的內膜約產後3週復舊,非6週。","C":"復舊主要是細胞體積縮小,非數目減少為主。","D":"正確。胎盤部位由剝落再生過程復舊,不留疤痕。"},"sources":["新文京《產科護理學》子宮復舊","胎盤部位"]}},"112110-N4-27":{"quick":"正常紅惡露敘述中「會出現大量紅色血塊」為錯誤。","detail":{"background":"正常紅惡露(lochia rubra,產後1–3天):顏色深紅/鮮紅、內含血液、上皮細胞、蛻膜碎片、可有少量小血塊。「出現大量紅色血塊為異常(提示子宮收縮不良/出血/胎盤殘留)」,非正常紅惡露。本題「錯誤」者為「會出現大量紅色血塊」(D)。","options":{"A":"正確。紅惡露顏色為深紅色。","B":"正確。產後1~3天出現。","C":"正確。內含上皮細胞、蛻膜碎片。","D":"錯誤(本題答案)。大量紅色血塊為異常,非正常紅惡露。"},"sources":["新文京《產科護理學》紅惡露","惡露評估"]}},"113030-N4-14":{"quick":"陰道分娩產後4小時子宮底位於臍上一指且偏右,首要護理措施是「如廁解尿」。","detail":{"background":"產後子宮底正常在臍下、置中。「子宮底升高(臍上)且偏向一側(偏右)最常見原因是膀胱脹尿」(脹大膀胱將子宮往上往右推、阻礙收縮致出血)。首要護理是「協助如廁解尿(排空膀胱)」,排空後子宮多能歸位下降收縮;若解尿後仍鬆軟才按摩。本題首要措施為「如廁解尿」(D)。","options":{"A":"子宮按摩為解尿後仍鬆軟時才做(先排空膀胱)。","B":"下床活動非首要(先解尿)。","C":"多喝開水非首要處置。","D":"正確。先如廁解尿排空膀胱(膀胱脹致子宮偏高偏右)。"},"sources":["新文京《產科護理學》膀胱脹/子宮復舊","產後評估"]}},"113100-N4-12":{"quick":"阻礙產後子宮復舊的因素為「產程延長(1)＋脹滿的膀胱(3)」,即僅13。","detail":{"background":"阻礙子宮復舊的因素:「產程延長(子宮肌疲乏、收縮乏力)、脹滿的膀胱(將子宮推高、阻礙收縮)、胎盤/胎膜殘留、子宮過度膨脹(多胎、羊水過多、巨嬰)、感染」。「正常羊水量之單胞胎(子宮未過度膨脹)與純母乳親餵(哺乳促催產素、幫助復舊)不會阻礙復舊」。本題阻礙因素為(1)(3)即僅13(A)。","options":{"A":"正確。產程延長(1)+脹滿膀胱(3)阻礙復舊。","B":"含(4)純母乳親餵(反而促復舊),錯。","C":"含(2)正常單胞胎(不阻礙),錯。","D":"含(2)(4)皆不阻礙復舊,錯。"},"sources":["新文京《產科護理學》子宮復舊","阻礙因素"]}},"114030-N4-15":{"quick":"產後惡露評估中「產後第3天惡露呈深紅色微量血塊、有血腥味」為正常生理現象。","detail":{"background":"惡露正常演變:產後1–3天紅惡露(深紅/鮮紅、可含少量小血塊、血腥味);4–10天漿液性(粉紅/褐);10天後白惡露(白/淡黃)。「產後第3天深紅色、微量血塊、血腥味屬正常紅惡露」。異常:有惡臭味(感染)、量過多、或顏色倒退。選項A(第2天無血塊有惡臭)、C(第5天淡乳黃過早且血腥味不符)、D(第12天暗棕色,時序偏晚)相對不符正常演變。本題正常者為B。","options":{"A":"錯。「惡臭味」提示感染,非正常。","B":"正確。產後第3天深紅、微量血塊、血腥味為正常紅惡露。","C":"第5天通常為漿液性(粉紅褐),「淡乳黃」過早。","D":"第12天多為白惡露,「暗棕色」時序不符。"},"sources":["新文京《產科護理學》惡露演變","產後評估"]}},"114170-N4-17":{"quick":"產褥期生殖系統復舊中「陰道皺褶約產後3週再出現(2)＋沒有哺乳婦女排卵和月經約產後6~8週重現(3)」,即23。","detail":{"background":"生殖系統復舊:(1)「子宮頸外口因生產撕裂變橫裂狀(一字形),不會完全恢復原本圓形」——故(1)錯;(2)「陰道皺襞(皺褶)約產後3–4週再出現」——正確;(3)「未哺乳婦女排卵與月經約產後6–8週重現」——正確;(4)「胎盤剝離部位之復舊約產後6週完成(非3週內)」——故(4)錯。本題正確組合為(2)(3)即23(C)。","options":{"A":"含(1)子宮頸外口恢復橢圓形(錯)。","B":"含(1)(4)皆錯。","C":"正確。陰道皺褶產後3週再現(2)+未哺乳者6~8週排卵月經(3)。","D":"含(4)胎盤部位3週內復舊(錯,約6週)。"},"sources":["新文京《產科護理學》生殖系統復舊","產褥期"]}},"101030-N4-8":{"quick":"產後第4~5天腹部肌肉張力差,應鼓勵作「頸部運動」(產後運動採漸進原則)。","detail":{"background":"產後運動漸進原則(依產後天數由易而難):產後第1天起頸部運動、胸(乳)部運動、腳踝運動(輕度);第2–3天骨盆搖擺、臀部運動;第3–7天腹部收縮、抬腿;產後約2週後才仰臥起坐(強腹肌)、子宮復舊後膝胸臥式。本例產後第4–5天且腹部肌肉張力差,「仰臥起坐強度過高(此時腹肌張力差不宜)」,選項中最適合先做的較輕度運動為頸部運動。本題鼓勵作「頸部運動」(B)。","options":{"A":"凱格爾運動針對骨盆底,非針對腹肌張力差。","B":"正確。頸部運動為產後早期輕度運動,適合此時。","C":"仰臥起坐強度高,腹肌張力差時不宜。","D":"膝胸臥式用於子宮復位,非針對腹肌張力。"},"sources":["新文京《產科護理學》產後運動","漸進原則"]}},"102030-N4-22":{"quick":"評估自然產產後第2天的會陰傷口,最適宜「側臥姿勢」。","detail":{"background":"會陰傷口評估姿勢:採「側臥(辛式臥位)」——產婦上腿彎曲,可清楚暴露會陰與肛門、評估傷口(REEDA)與痔瘡,且較舒適、不尷尬、不壓迫傷口。膀胱截石式較尷尬且非床邊常規;屈膝仰臥暴露較差;膝胸臥位不適合傷口評估。本題最適宜為「側臥姿勢」(B)。","options":{"A":"膀胱截石式較尷尬,非床邊常規評估姿勢。","B":"正確。側臥姿勢可清楚暴露會陰、較舒適。","C":"屈膝仰臥暴露會陰較差。","D":"膝胸臥位不適合會陰傷口評估。"},"sources":["新文京《產科護理學》會陰傷口評估","側臥"]}},"102030-N4-24":{"quick":"產後骨盆搖擺運動的主要目的是「增強腰背部肌肉張力」。","detail":{"background":"產後運動目的:骨盆搖擺(pelvic rocking/tilt)運動——主要增強腰背部肌肉張力、緩解下背痠痛、改善姿勢;凱格爾運動增強骨盆底/會陰肌(改善尿失禁);腹部收縮運動增強腹肌;膝胸臥式助子宮復位。本題骨盆搖擺主要目的為「增強腰背部肌肉張力」(D)。","options":{"A":"增強骨盆會陰肌彈性為凱格爾運動。","B":"增強膀胱肌張力非骨盆搖擺主要目的。","C":"增強腹部肌肉為腹部運動。","D":"正確。骨盆搖擺主要增強腰背部肌肉張力。"},"sources":["新文京《產科護理學》骨盆搖擺運動","產後運動"]}},"104030-N4-20":{"quick":"REEDA中「D」的意義為「分泌物(Discharge)」。","detail":{"background":"REEDA(評估會陰/傷口癒合):R=Redness(發紅)、E=Edema(水腫)、E=Ecchymosis(瘀斑)、D=Discharge(分泌物)、A=Approximation(傷口對合)。本題D的意義為「分泌物」(C)。","options":{"A":"發紅為R(Redness)。","B":"瘀斑為E(Ecchymosis)。","C":"正確。D為Discharge(分泌物)。","D":"水腫為E(Edema)。"},"sources":["新文京《產科護理學》REEDA","會陰評估"]}},"105090-N4-21":{"quick":"產後會陰傷口溫水坐浴指導中「在產後24小時內開始」為不恰當。","detail":{"background":"會陰傷口溫水坐浴:「產後24小時後才開始」——產後最初24小時內傷口仍在出血/急性期,應冰敷止血消腫;24小時後改溫水坐浴(每天2–4次、每次約20分鐘、水溫約38–41°C)促進循環、消腫、清潔、舒適、助癒合,有痔瘡亦可配合藥物。故「產後24小時內開始(溫水坐浴)」不恰當。本題「不恰當」者為「在產後24小時內開始」(C)。","options":{"A":"恰當。溫水坐浴促進循環、消除腫脹。","B":"恰當。每天坐浴2~4次、每次20分鐘。","C":"不恰當(本題答案)。應產後24小時後才溫水坐浴(24小時內宜冰敷)。","D":"恰當。有痔瘡可配合藥物使用。"},"sources":["新文京《產科護理學》溫水坐浴","會陰護理"]}},"106110-N4-24":{"quick":"會陰四度裂傷的產婦,產後第2天可教導執行「乳(胸)部運動」。","detail":{"background":"會陰四度裂傷(延伸至直腸黏膜)者,產後早期應避免增加會陰、骨盆底與腹壓的運動(如膝胸臥式、抬腿、仰臥起坐、凱格爾用力可能牽扯傷口),以免影響傷口癒合。產後第2天可做的是不牽動會陰的上半身輕度運動——乳(胸)部運動。本題可教導「乳(胸)部運動」(B)。","options":{"A":"膝胸臥式牽動骨盆/腹壓,四度裂傷早期不宜。","B":"正確。乳(胸)部運動不牽動會陰,適合此時。","C":"抬腿運動增腹壓,四度裂傷早期不宜。","D":"仰臥起坐強度高、增腹壓,不宜。"},"sources":["新文京《產科護理學》產後運動","會陰裂傷"]}},"106111-N4-25":{"quick":"產後運動的目的「不包括」促進妊娠紋消失。","detail":{"background":"產後運動目的:「恢復腹部與骨盆底肌張力、預防子宮脫垂/尿失禁、促進子宮收縮與復舊、預防血栓靜脈炎(促血液循環)、改善姿勢與體態、促進腸蠕動」。「促進妊娠紋(妊娠紋為真皮膠原斷裂的疤痕,運動無法使其消失)不是產後運動的目的」。本題「不包括」者為「促進妊娠紋消失」(C)。","options":{"A":"是目的。預防血栓靜脈炎。","B":"是目的。預防子宮脫垂。","C":"本題答案(非目的)。運動無法促進妊娠紋消失。","D":"是目的。促進子宮收縮。"},"sources":["新文京《產科護理學》產後運動目的","妊娠紋"]}},"108020-N4-28":{"quick":"產後會陰傷口評估所使用的項目縮寫為「REEDA」。","detail":{"background":"產後會陰傷口評估工具縮寫為「REEDA」:R=Redness發紅、E=Edema水腫、E=Ecchymosis瘀斑、D=Discharge分泌物、A=Approximation傷口對合。HELLP是子癇前症併發症(溶血、肝酶升、血小板低);Rubin是產後母性行為分期;Kegel是骨盆底運動。本題為「REEDA」(B)。","options":{"A":"HELLP為子癇前症併發症,非會陰評估。","B":"正確。會陰傷口評估縮寫為REEDA。","C":"Rubin為產後母性行為分期。","D":"Kegel為骨盆底(凱格爾)運動。"},"sources":["新文京《產科護理學》REEDA","會陰評估"]}},"108110-N4-30":{"quick":"協助子宮復舊的產後運動中「擴胸運動」為錯誤(非協助子宮復舊)。","detail":{"background":"協助子宮復舊的產後運動:「臀部運動、抬腿運動、膝胸臥式、骨盆搖擺、腹部收縮」等(涉及骨盆、腹部、子宮位置)。「擴胸(胸部)運動主要預防乳房鬆弛、強化胸部肌肉,與子宮復舊無關」,故為錯誤(非協助子宮復舊的運動)。本題「錯誤」者為「擴胸運動」(D)。","options":{"A":"臀部運動有助骨盆與子宮復舊。","B":"抬腿運動有助腹部與循環、復舊。","C":"膝胸臥式助子宮回復正常位置。","D":"錯誤(本題答案)。擴胸運動針對胸部,與子宮復舊無關。"},"sources":["新文京《產科護理學》產後運動","子宮復舊"]}},"111030-N4-21":{"quick":"產後運動中膝胸臥式的主要目的是「促進子宮恢復正常位置」。","detail":{"background":"膝胸臥式(knee-chest position)產後運動:雙膝跪床、胸部貼床、臀部抬高,藉重力使子宮(尤後傾的子宮)回復正常前傾位置、促進子宮復位,並助惡露引流。其主要目的為「促進子宮恢復正常位置」(A);非促進傷口癒合、預防乳房鬆弛或改善尿失禁(尿失禁為凱格爾運動)。本題為「促進子宮恢復正常位置」(A)。","options":{"A":"正確。膝胸臥式促進子宮恢復正常(前傾)位置。","B":"非促進傷口癒合。","C":"預防乳房鬆弛為胸部運動。","D":"改善尿失禁為凱格爾運動。"},"sources":["新文京《產科護理學》膝胸臥式","子宮復位"]}},"112180-N4-16":{"quick":"產後會陰傷口評估與護理中正確的是「評估會陰癒合情形可採REEDA方法」。","detail":{"background":"會陰傷口護理:(1)「評估會陰癒合可採REEDA(發紅、水腫、瘀斑、分泌物、對合)」——正確;(2)避免傷口裂開應高纖維飲食+多水分防便秘(非低纖維);(3)評估傷口宜採側臥(非平躺打開雙腳);(4)會陰傷口24小時內冰敷、24小時後才溫水坐浴(非分娩後2小時坐浴)。本題正確為「評估會陰癒合可採REEDA」(D)。","options":{"A":"錯。應高纖維飲食防便秘,非低纖維。","B":"錯。評估宜採側臥,非平躺打開雙腳。","C":"錯。24小時後才溫水坐浴,非分娩後2小時。","D":"正確。評估會陰癒合可採REEDA方法。"},"sources":["新文京《產科護理學》會陰護理","REEDA"]}},"113180-N4-14":{"quick":"坐著哺乳腰痠,最適合教導「骨盆搖擺運動」。","detail":{"background":"產後腰痠(尤坐姿哺乳)宜做「骨盆搖擺(pelvic rocking)運動」——增強腰背部肌力、緩解下背/腰部痠痛、改善姿勢。凱格爾運動針對骨盆底(尿失禁);下肢抬腿針對腹肌與循環;仰臥起坐強度高、針對腹肌。本題緩解腰痠最適合「骨盆搖擺運動」(B)。","options":{"A":"凱格爾運動針對骨盆底(尿失禁),非腰痠。","B":"正確。骨盆搖擺運動緩解腰背痠痛。","C":"下肢抬腿針對腹肌與循環,非腰痠。","D":"仰臥起坐強度高,非緩解腰痠首選。"},"sources":["新文京《產科護理學》骨盆搖擺","產後運動"]}},"114100-N4-14":{"quick":"凱格爾氏運動護理指導中「降低膀胱肌肉張力」為錯誤。","detail":{"background":"凱格爾運動(Kegel exercise):反覆收縮與放鬆骨盆底肌(會陰、尿道、陰道、肛門周圍肌肉),目的增強骨盆底肌張力、預防/改善壓力性尿失禁與骨盆器官脫垂;可採坐、站、躺任何姿勢、產後第1天即可開始、可重複多次。「降低膀胱肌肉張力為錯誤」——凱格爾是增強骨盆底肌(非降低膀胱肌張力)。本題「錯誤」者為C。","options":{"A":"正確。產後第一天可開始、重複多次執行。","B":"正確。可採坐、站、躺姿進行。","C":"錯誤(本題答案)。凱格爾增強骨盆底肌張力,非降低膀胱肌張力。","D":"正確。預防壓力性尿失禁。"},"sources":["新文京《產科護理學》凱格爾運動","骨盆底肌"]}},"101110-N4-64":{"quick":"親子依附關係有問題的行為是「抱新生兒時沒有貼近身體」。","detail":{"background":"親子依附(attachment/bonding)的正向行為:與新生兒眼對眼接觸、摟抱貼近身體(en face面對面)、對寶寶說話安撫、願意哺餵與照顧、稱呼名字。「抱新生兒時沒有貼近身體(疏離、抱姿生硬)提示依附關係有問題」。本例縱使生下染色體異常兒,仍以依附行為評估;本題依附有問題者為「抱新生兒時沒有貼近身體」(C)。","options":{"A":"正向依附。能與新生兒眼對眼接觸。","B":"正向依附。能安撫並與他說話。","C":"正確(依附有問題)。抱新生兒沒有貼近身體(疏離)。","D":"正向依附。願意以母乳哺餵新生兒。"},"sources":["新文京《產科護理學》親子依附","依附行為"]}},"101110-N4-65":{"quick":"產後42天仍情緒低落、無用無價值感、食慾睡眠變差,最可能是「產後憂鬱症」。","detail":{"background":"產後情緒障礙鑑別:「產後低潮(blues)——產後3–5天、輕微、約兩週內自行緩解;產後憂鬱症(depression)——多產後數週至1年內、症狀持續≥2週、明顯憂鬱/無價值無用感/食慾睡眠改變/影響功能,需治療;產後精神病——產後2–4週、幻覺妄想、可能傷害自己或嬰兒」。本例產後42天、持續情緒低落+無用無價值感+食慾睡眠差,最可能為「產後憂鬱症」(C)。","options":{"A":"非「均會經歷的正常現象」(症狀已超出blues)。","B":"產後低潮約兩週內緩解,本例已42天且嚴重。","C":"正確。持續情緒低落+無價值感=產後憂鬱症。","D":"產後精神病以幻覺妄想為主,本例無。"},"sources":["新文京《產科護理學》產後憂鬱","情緒障礙鑑別"]}},"102110-N4-19":{"quick":"產後喜歡談論分娩生產過程、注意力集中在自己,符合魯賓的「接受期(Taking-in)」。","detail":{"background":"魯賓(Rubin)產後母性角色適應三期:①接受期(Taking-in,產後1–2天)——產婦依賴、被動、注意力集中在自己、反覆談論生產過程,需被照顧與休息;②緊執期(Taking-hold,產後3–10天)——介於依賴與獨立間,主動學習照顧新生兒與恢復身體功能,需衛教與鼓勵;③放手期(Letting-go)——接受孩子為獨立個體、重新界定為人母與家庭角色。 本例「喜歡談論分娩生產過程、注意力集中在自己」是典型接受期(Taking-in,產後1–2天,依賴被動)表現。本題為「接受期」(B)。","options":{"A":"調適期非魯賓三期標準名稱。","B":"正確。談論生產、注意力在自己=接受期。","C":"緊執期為主動學習照護(產後3–10天)。","D":"釋放期(放手期)為接受孩子獨立個體。"},"sources":["新文京《產科護理學》魯賓","接受期"]}},"103030-N4-19":{"quick":"產後憂鬱症敘述中「可能是產後雌性素、黃體素突然上升所導致」為錯誤。","detail":{"background":"產後憂鬱症(postpartum depression):多發生產後4週至5個月(數週至1年內)、症狀持續(食慾睡眠困擾、情緒低落、無價值感),與社會心理因素(經濟、育兒壓力、支持不足、睡眠剝奪)及荷爾蒙驟降有關。「雌性素(動情素)、黃體素於產後是突然下降(非上升)」,故「雌性素黃體素突然上升所致」錯誤(應為下降)。本題「錯誤」者為B。","options":{"A":"正確。常發生於產後4週到5個月之間。","B":"錯誤(本題答案)。產後雌性素黃體素是突然「下降」,非上升。","C":"正確。食慾異常、睡眠困擾為常見症狀。","D":"正確。可能與經濟與育兒照顧問題有關。"},"sources":["新文京《產科護理學》產後憂鬱","荷爾蒙"]}},"103100-N4-24":{"quick":"產後第一天掉眼淚,先生要她別胡思亂想,護理師反應「較不恰當」的是「指出先生沒有同理產婦的情緒反應」。","detail":{"background":"產後情緒支持:產後第一天掉眼淚常為產後低潮(baby blues)(荷爾蒙起伏、角色適應)。護理應「陪伴傾聽、解釋產後荷爾蒙變化會影響情緒、說明需時間適應母親角色、引導先生一起理解與支持」。「直接指責先生沒有同理較不恰當」——會使先生防衛、製造夫妻對立、無助於支持產婦,應以教育引導取代指責。本題「較不恰當」者為D。","options":{"A":"恰當。陪伴先生一起聽李女士哭泣原因。","B":"恰當。解釋產後荷爾蒙起伏影響情緒。","C":"恰當。說明需時間適應母親角色轉變。","D":"較不恰當(本題答案)。直接指責先生沒同理會造成對立。"},"sources":["新文京《產科護理學》產後情緒支持","baby blues"]}},"104030-N4-17":{"quick":"產後心理適應敘述中「經產婦是罹患產後憂鬱的危險因子」為錯誤。","detail":{"background":"產後心理適應:產後低潮(blues)多產後第3–5天;惡化可能形成產後憂鬱(產後1年內);產後精神病有失眠、譫妄、幻覺、行為紊亂。「產後憂鬱的危險因子是初產婦、缺乏社會支持、過去憂鬱史、經濟/育兒壓力、計畫外懷孕、睡眠剝奪等,經產婦本身並非危險因子」,故「經產婦是產後憂鬱危險因子」錯誤。本題「錯誤」者為C。","options":{"A":"正確。產後低落大多發生於產後第5天。","B":"正確。惡化可能形成產後憂鬱(產後1年內)。","C":"錯誤(本題答案)。經產婦本身非產後憂鬱危險因子。","D":"正確。產後精神病有失眠、譫妄、幻覺、行為紊亂。"},"sources":["新文京《產科護理學》產後憂鬱","危險因子"]}},"104030-N4-21":{"quick":"家庭成員與新生兒依附關係建立敘述中「母親對嬰兒的認同行為是靠間接的感官知覺來建立」為錯誤。","detail":{"background":"依附關係:親子同室提早母嬰適應、生產造成母親身體傷害會影響依附、鼓勵父親手足參與接觸。「母親對嬰兒的認同(identification)行為是靠直接的感官知覺(看、摸、抱、聞、聽嬰兒、眼對眼)建立連結」,故「靠間接的感官知覺」錯誤(應為直接)。本題「錯誤」者為B。","options":{"A":"正確。親子同室提早母嬰適應、利依附建立。","B":"錯誤(本題答案)。認同行為靠直接感官知覺,非間接。","C":"正確。生產造成母親身體傷害會影響依附建立。","D":"正確。宜鼓勵父親或手足儘早接觸新生兒。"},"sources":["新文京《產科護理學》依附關係","認同行為"]}},"104100-N4-23":{"quick":"產後第3天、主動詢問如何順利哺餵母乳、學習照顧新生兒,屬魯賓的「緊執期」。","detail":{"background":"魯賓(Rubin)產後母性角色適應三期:①接受期(Taking-in,產後1–2天)——產婦依賴、被動、注意力集中在自己、反覆談論生產過程,需被照顧與休息;②緊執期(Taking-hold,產後3–10天)——介於依賴與獨立間,主動學習照顧新生兒與恢復身體功能,需衛教與鼓勵;③放手期(Letting-go)——接受孩子為獨立個體、重新界定為人母與家庭角色。 本例產後第3天、主動詢問如何照顧/順利哺餵、學習母親職責是典型緊執期(Taking-hold,產後3–10天,主動學習)。本題為「緊執期」(B)。","options":{"A":"接受期為依賴被動、談論生產(產後1–2天)。","B":"正確。主動學習照顧新生兒=緊執期。","C":"放手期為接受孩子獨立個體。","D":"獨立期非魯賓三期標準名稱。"},"sources":["新文京《產科護理學》魯賓","緊執期"]}},"105090-N4-17":{"quick":"產後第1天、主訴很累、分享生產過程、不想哺乳,屬魯賓的「接受期」。","detail":{"background":"魯賓(Rubin)產後母性角色適應三期:①接受期(Taking-in,產後1–2天)——產婦依賴、被動、注意力集中在自己、反覆談論生產過程,需被照顧與休息;②緊執期(Taking-hold,產後3–10天)——介於依賴與獨立間,主動學習照顧新生兒與恢復身體功能,需衛教與鼓勵;③放手期(Letting-go)——接受孩子為獨立個體、重新界定為人母與家庭角色。 本例產後第1天、很累、被動依賴、分享(談論)生產過程是典型接受期(Taking-in,產後1–2天,依賴被動、注意力在自己),此時應先滿足其休息與被照顧需求。本題為「接受期」(A)。","options":{"A":"正確。產後第1天、累、談論生產=接受期。","B":"緊執期為主動學習(產後3–10天)。","C":"放手期為接受孩子獨立個體。","D":"獨立期非魯賓標準名稱。"},"sources":["新文京《產科護理學》魯賓","接受期"]}},"106030-N4-24":{"quick":"魯賓緊執期(Taking-hold)正確敘述是「介於依賴與獨立間的一段時間」。","detail":{"background":"魯賓(Rubin)產後母性角色適應三期:①接受期(Taking-in,產後1–2天)——產婦依賴、被動、注意力集中在自己、反覆談論生產過程,需被照顧與休息;②緊執期(Taking-hold,產後3–10天)——介於依賴與獨立間,主動學習照顧新生兒與恢復身體功能,需衛教與鼓勵;③放手期(Letting-go)——接受孩子為獨立個體、重新界定為人母與家庭角色。 緊執期(Taking-hold,產後3–10天)的核心特徵是「介於依賴與獨立之間」——產婦開始主動學習照顧新生兒與恢復身體功能、希望把事情做好(易因表現不如預期而挫折)。選項B(話多談生產)、C(接受孩子獨立個體、注重生理需求)、D(確認孩子個性、重設為人母角色)較屬接受期或放手期。本題緊執期正確敘述為「介於依賴與獨立間」(A)。","options":{"A":"正確。緊執期介於依賴與獨立間。","B":"話多談生產屬接受期特徵。","C":"接受孩子為獨立個體屬放手期。","D":"重新設定為人母角色屬放手期。"},"sources":["新文京《產科護理學》魯賓","緊執期"]}},"106110-N4-19":{"quick":"產後第一天親子同室、仔細觀察新生兒外觀,護理師最適當反應是「讓她有充分時間認識及熟悉新生兒」。","detail":{"background":"產後初期(接受期)親子互動:母親仔細觀察新生兒外觀、詢問特性是建立依附、認識寶寶的正常過程。護理師應「提供充分時間與空間,讓母親認識熟悉新生兒、適時陪伴支持」,而非急於教導照護(此時母親仍在接受期、需被支持)或阻止抱新生兒。本題最適當為「讓她有充分時間認識及熟悉新生兒」(C)。","options":{"A":"詢問「像誰」可閒聊但非最適當核心反應。","B":"產後第一天急於教照護不符接受期需求。","C":"正確。讓她有充分時間認識熟悉新生兒。","D":"不應以「子宮下垂」阻止抱新生兒。"},"sources":["新文京《產科護理學》依附","接受期互動"]}},"107030-N4-17":{"quick":"新住民產婦抱怨沒奶水、變胖變醜、須獨自照顧新生兒,較不恰當的護理問題是「低自尊」。","detail":{"background":"依個案線索評估護理問題:「懷孕生產讓自己變胖變醜→身體心像改變;先生要回大陸工作、須獨自照顧→缺乏社會支持;須獨自照顧新生兒而擔憂→照顧新生兒(親職)壓力」。「低自尊」雖可能但題幹未直接呈現自我價值低落的明確證據,相對而言較不恰當(較無直接依據)。本題較不恰當的護理問題為「低自尊」(A)。","options":{"A":"較不恰當(本題答案)。題幹未明確呈現低自尊的直接證據。","B":"恰當。先生離開、獨自照顧=缺乏社會支持。","C":"恰當。變胖變醜=身體心像改變。","D":"恰當。須獨自照顧新生兒=照顧壓力。"},"sources":["新文京《產科護理學》產後心理評估","護理問題"]}},"107110-N4-27":{"quick":"表示「生小孩好痛,下次再也不要生了」(回顧談論生產經驗),屬魯賓「接受期(Taking-in)」。","detail":{"background":"魯賓(Rubin)產後母性角色適應三期:①接受期(Taking-in,產後1–2天)——產婦依賴、被動、注意力集中在自己、反覆談論生產過程,需被照顧與休息;②緊執期(Taking-hold,產後3–10天)——介於依賴與獨立間,主動學習照顧新生兒與恢復身體功能,需衛教與鼓勵;③放手期(Letting-go)——接受孩子為獨立個體、重新界定為人母與家庭角色。 接受期產婦反覆談論、回顧生產經驗與感受(如「生小孩好痛、下次不要再生」)、注意力集中在自己。選項A(問寶寶為何一直睡)、B(問如何增加奶量)偏主動學習(緊執期);D(談先生照顧寶寶很累)偏放手/家庭角色。本題接受期表現為「生小孩好痛,下次再也不要生了」(C)。","options":{"A":"問寶寶為何睡覺偏主動關注新生兒(緊執期)。","B":"問如何增加奶量為主動學習(緊執期)。","C":"正確。回顧談論生產經驗=接受期。","D":"談先生照顧寶寶偏家庭角色(放手期)。"},"sources":["新文京《產科護理學》魯賓","接受期"]}},"108020-N4-20":{"quick":"父親行為中「詢問新生兒血型」最無助於與新生兒建立依附關係。","detail":{"background":"父親與新生兒依附:陪伴哺乳、對新生兒說話、眼神接觸、擁抱、協助換尿布/照護、撫觸等直接互動行為有助建立依附(bonding/engrossment)。「詢問新生兒血型屬資訊詢問,非與新生兒的直接情感互動,最無助於依附建立」。本題最無助者為「詢問新生兒血型」(D)。","options":{"A":"有助。陪伴太太哺餵母乳(參與)。","B":"有助。對新生兒說話(互動)。","C":"有助。協助換尿布(直接照護互動)。","D":"最無助(本題答案)。詢問血型屬資訊詢問,非情感互動。"},"sources":["新文京《產科護理學》父親依附","engrossment"]}},"108020-N4-22":{"quick":"產婦表示「妹妹跟爸爸長得好像!」,屬於依附中的「認同行為」。","detail":{"background":"依附行為類型:認同(identification)行為——將新生兒與家庭成員做連結(指出寶寶像誰、屬於家庭的一員),如「妹妹跟爸爸長得好像」;提出所有權(claiming)——以「我的寶寶」表達歸屬。本例「指出寶寶像爸爸」屬認同行為。本題為「認同行為」(D)。","options":{"A":"分極作用非此情境。","B":"提出所有權為以「我的寶寶」表達歸屬。","C":"分離個別化為較後期發展。","D":"正確。指出寶寶像爸爸=認同行為。"},"sources":["新文京《產科護理學》依附","認同行為"]}},"110030-N4-24":{"quick":"產後第3天疲倦、失眠、緊張、過於敏感、不自主掉眼淚,最可能是「產後情緒低落(blues)」。","detail":{"background":"產後低潮(postpartum blues/baby blues):產後3–5天出現、輕微、短暫(約兩週內自行緩解)——疲倦、失眠、緊張、易敏感、無故掉淚、情緒起伏,與荷爾蒙驟降及角色適應有關,不影響日常功能、可自行復原。本例產後第3天、上述症狀,最可能為「產後情緒低落(blues)」(B);非正常無現象、非已達憂鬱症(持續≥2週、影響功能)或精神病。本題為「產後情緒低落」(B)。","options":{"A":"雖常見但有明確症狀群,歸為「blues」更精確。","B":"正確。產後第3天、輕微短暫情緒起伏=產後情緒低落。","C":"產後憂鬱症需持續≥2週、影響功能。","D":"產後精神病有幻覺妄想,本例無。"},"sources":["新文京《產科護理學》產後低潮","blues"]}},"111030-N4-18":{"quick":"產後1週易怒、失眠、沒食慾、注意力不集中,最可能是「產後情緒低落」。","detail":{"background":"產後情緒障礙時序:產後低潮(blues)約產後第3–5天至兩週內、輕微短暫、可自行緩解(易怒、失眠、食慾差、注意力不集中、易哭)。本例產後1週、上述輕度症狀最符產後情緒低落(blues)。產後憂鬱症需持續≥2週、明顯功能受損;產後精神病有幻覺妄想;躁鬱症非產後情緒障礙分類用語。本題為「產後情緒低落」(A)。","options":{"A":"正確。產後1週輕度情緒起伏=產後情緒低落。","B":"產後憂鬱症需持續≥2週、影響功能。","C":"產後精神病有幻覺妄想,本例無。","D":"產後躁鬱症非標準產後情緒障礙分類。"},"sources":["新文京《產科護理學》產後低潮","blues"]}},"112030-N4-21":{"quick":"親子依附中「除了哺餵新生兒,其他時間都請月嫂照顧」最需特別關注與持續追蹤。","detail":{"background":"親子依附警訊:母親迴避與新生兒接觸、把照護完全交給他人、缺乏主動互動提示依附建立有困難,需關注追蹤。「除哺餵外其他時間都請月嫂照顧(迴避親自照護互動)最需特別關注」。其餘(盯著新生兒看、以乳房安撫、唸書給大寶聽兼顧手足)皆屬正向互動或合理分配。本題最需關注者為D。","options":{"A":"盯著新生兒看屬正向關注。","B":"以乳房安撫亦屬親密互動。","C":"唸書給大寶聽兼顧手足適應,正向。","D":"最需關注(本題答案)。迴避親自照護、全交月嫂提示依附困難。"},"sources":["新文京《產科護理學》親子依附","警訊"]}},"112030-N4-27":{"quick":"產後3~10天注意力集中在學習母親職責及自己身體功能恢復,符合魯賓「緊執期」。","detail":{"background":"魯賓(Rubin)產後母性角色適應三期:①接受期(Taking-in,產後1–2天)——產婦依賴、被動、注意力集中在自己、反覆談論生產過程,需被照顧與休息;②緊執期(Taking-hold,產後3–10天)——介於依賴與獨立間,主動學習照顧新生兒與恢復身體功能,需衛教與鼓勵;③放手期(Letting-go)——接受孩子為獨立個體、重新界定為人母與家庭角色。 本例產後3–10天、注意力在學習母親職責與自己身體功能恢復即典型緊執期(Taking-hold)。本題為「緊執期」(C)。","options":{"A":"調適期非魯賓標準名稱。","B":"接受期為依賴被動、談論生產(產後1–2天)。","C":"正確。產後3–10天學習母職與恢復功能=緊執期。","D":"釋放期(放手期)為接受孩子獨立個體。"},"sources":["新文京《產科護理學》魯賓","緊執期"]}},"112110-N4-19":{"quick":"產婦因生第四個女兒眼眶泛紅說家人不會來,最適當回應是「聽起來妳很難過,新生兒誕生對家庭都有影響,妳現在的想法是?」","detail":{"background":"產後情緒支持(同理與開放式溝通):面對產婦因重男輕女壓力而難過,最適當是「同理其情緒並以開放式問句引導其表達(如「聽起來妳很難過…妳現在的想法是?」)」,建立信任、了解需求。不宜說教(要多互動以免影響依附)、急於歸因荷爾蒙並保證過兩天會好(否定其真實處境)、或以「不建議家人探視」轉移話題。本題最適當為D。","options":{"A":"說教(叫她多互動以免影響依附)易增壓力。","B":"歸因荷爾蒙並保證會好,否定其真實處境。","C":"以「不建議探視」轉移,迴避其情緒。","D":"正確。同理情緒並以開放式問句引導表達。"},"sources":["新文京《產科護理學》治療性溝通","產後情緒"]}},"112110-N4-21":{"quick":"產後三週體重增、失眠嗜睡、動作遲緩、缺乏興趣、罪惡感、出現想死念頭,最適當評估是「產後憂鬱(depression)」。","detail":{"background":"產後憂鬱症(postpartum depression):產後數週至1年內、症狀持續≥2週——憂鬱、失眠或嗜睡、動作遲緩、對事物與新生兒失去興趣、無價值/罪惡感、出現想死/自殺念頭、影響功能,需積極治療與防自傷。本例產後三週、上述明顯症狀+想死念頭為產後憂鬱症(且須警覺自殺風險)。非blues(輕微短暫)、非精神病(幻覺妄想為主)。本題為「產後憂鬱(Depression)」(C)。","options":{"A":"非單純荷爾蒙自然現象(症狀已嚴重持續)。","B":"產後情緒低落為輕微短暫、可自行復原。","C":"正確。持續憂鬱+失去興趣+罪惡感+想死念頭=產後憂鬱症。","D":"產後精神病以幻覺妄想為主,本例無。"},"sources":["新文京《產科護理學》產後憂鬱","自殺風險"]}},"113030-N4-15":{"quick":"產後情緒照顧護理指導中「初產婦哭泣不安及缺乏育兒信心即為產後憂鬱症,應儘速就醫」為不適當。","detail":{"background":"產後情緒照顧:接受期鼓勵陳述生產經驗、接受感受、澄清疑慮;緊執期鼓勵參與學習新生兒照護;即使進入放手期仍可能有不自覺哀傷。「初產婦哭泣不安、缺乏育兒信心多為產後低潮(blues)或正常適應過程,不應逕自判為產後憂鬱症並儘速就醫(過度病理化)」——應先支持、衛教、觀察;持續≥2週、功能受損才考慮憂鬱症轉介。本題「不適當」者為A。","options":{"A":"不適當(本題答案)。哭泣不安多為blues/適應,不應逕判憂鬱症並急就醫。","B":"適當。接受期鼓勵陳述生產經驗、澄清疑慮。","C":"適當。緊執期鼓勵參與學習新生兒照護。","D":"適當。放手期仍可能有不自覺哀傷情緒。"},"sources":["新文京《產科護理學》產後情緒照顧","blues vs depression"]}},"113100-N4-13":{"quick":"產後情緒低落(postpartum blues)定義正確的是「通常可自行復原」。","detail":{"background":"產後情緒低落(postpartum blues/baby blues):產後3–5天出現、輕微、短暫,約兩週內自行復原,不嚴重影響日常生活與社會功能(與產後憂鬱症不同——憂鬱症持續≥2週、明顯影響功能)。「情緒低落持續一週不即診斷為產後憂鬱(需持續≥2週且功能受損)」。本題正確為「通常可自行復原」(C)。","options":{"A":"錯。blues不嚴重影響日常生活功能。","B":"錯。blues不影響社會功能。","C":"正確。產後情緒低落通常可自行復原。","D":"錯。持續一週非即診斷憂鬱(需≥2週且功能受損)。"},"sources":["新文京《產科護理學》產後低潮","定義"]}},"113180-N4-12":{"quick":"產後憂鬱症敘述中「可能與產後動情素、黃體素濃度突然上升有關」為錯誤。","detail":{"background":"產後憂鬱症:持續支持與協助哺乳有助改善、症狀常在產後4週出現且持續>2週、與經濟壓力與家事育兒問題有關、與荷爾蒙驟降有關。「產後動情素(雌激素)、黃體素是突然下降(非上升)」,故「與濃度突然上升有關」錯誤。本題「錯誤」者為D。","options":{"A":"正確。持續支持並協助哺乳有助改善症狀。","B":"正確。症狀常產後4週出現、持續>2週。","C":"正確。可能與經濟壓力與家事照顧問題有關。","D":"錯誤(本題答案)。產後動情素黃體素是突然下降,非上升。"},"sources":["新文京《產科護理學》產後憂鬱","荷爾蒙"]}},"114030-N4-12":{"quick":"鼓勵家庭與新生兒依附關係建立,敘述中「除了兩歲以下的小孩外,鼓勵所有家人共同參與」為錯誤。","detail":{"background":"依附關係建立:產後身心調適會影響依附、親子同室助家人參與育兒與新生兒適應環境、鼓勵父親與家人儘早接觸認識新生兒。「應鼓勵所有家人(包括較大的手足,甚至兩歲以下幼兒在引導下)共同參與認識新成員,不應特別排除兩歲以下小孩」,故「除兩歲以下小孩外鼓勵所有家人參與」錯誤(不應排除幼兒手足、應引導其適應新生兒)。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。不應排除兩歲以下手足(應引導其參與適應)。","B":"正確。產後身心調適會影響依附建立。","C":"正確。親子同室助家人參與育兒與新生兒適應。","D":"正確。鼓勵父親及家人儘早接觸認識新生兒。"},"sources":["新文京《產科護理學》依附","手足參與"]}},"114170-N4-15":{"quick":"表示「昨晚一直夢到我如何生小孩」(回顧生產經驗),屬魯賓「接受期(Taking-in)」。","detail":{"background":"魯賓(Rubin)產後母性角色適應三期:①接受期(Taking-in,產後1–2天)——產婦依賴、被動、注意力集中在自己、反覆談論生產過程,需被照顧與休息;②緊執期(Taking-hold,產後3–10天)——介於依賴與獨立間,主動學習照顧新生兒與恢復身體功能,需衛教與鼓勵;③放手期(Letting-go)——接受孩子為獨立個體、重新界定為人母與家庭角色。 接受期產婦反覆回顧、談論(甚至夢到)生產經驗、依賴被動、注意力在自己。本例「昨晚一直夢到如何生小孩(回顧生產)」即接受期表現。選項A(問多喝水增奶量)為主動學習(緊執期);C(談先生累)偏家庭角色;D(寶寶不吸吮)為陳述問題。本題接受期表現為「昨晚一直夢到我如何生小孩」(B)。","options":{"A":"問增奶量為主動學習(緊執期)。","B":"正確。回顧/夢到生產經驗=接受期。","C":"談先生累偏家庭角色(放手期)。","D":"陳述哺乳問題,非接受期典型回顧生產。"},"sources":["新文京《產科護理學》魯賓","接受期"]}},"114170-N4-16":{"quick":"產後憂鬱敘述中「可能是催產素與泌乳激素濃度突然上升引起」為錯誤。","detail":{"background":"產後憂鬱:家庭支持/資源不足為危險因子、通常影響日常生活與育嬰、症狀含失眠與罪惡感。「與產後雌激素、黃體素驟降及社會心理因素有關,催產素與泌乳激素濃度上升反而與哺乳/情緒安撫相關,並非引起憂鬱的原因」,故「與催產素與泌乳激素濃度突然上升有關」錯誤。本題「錯誤」者為D。","options":{"A":"正確。家庭支持或資源不足為危險因子。","B":"正確。通常影響日常生活及育嬰工作。","C":"正確。症狀包括失眠及罪惡感。","D":"錯誤(本題答案)。產後憂鬱與雌激素黃體素驟降有關,非催產素泌乳素上升。"},"sources":["新文京《產科護理學》產後憂鬱","荷爾蒙"]}},"112180-N4-15":{"quick":"產後情緒變化正確的是:產後沮喪可自行復原(1)、產後精神病會幻聽幻覺傷害新生兒(2)、重度產後憂鬱具自殺危險性(3),即123。","detail":{"background":"產後情緒變化:「(1)產後沮喪(blues)輕微短暫、可自行復原——正確;(2)產後精神病可出現幻聽、幻覺、妄想,可能傷害自己或新生兒——正確;(3)重度產後憂鬱具自殺危險性——正確;(4)產後精神病多突然發生於產後2–4週內(早期),非產後2個月之後——故(4)錯」。本題正確組合為(1)(2)(3)即123(A)。","options":{"A":"正確。(1)沮喪可自行復原+(2)精神病幻覺傷嬰+(3)重度憂鬱有自殺危險。","B":"含(4)精神病2個月後(錯)。","C":"含(4)(錯)。","D":"含(4)且缺(1),錯。"},"sources":["新文京《產科護理學》產後情緒障礙","精神病"]}},"101030-N4-4":{"quick":"產後評估深層靜脈血栓、伸直腿且足板背側彎曲的試驗稱為「霍曼氏試驗(Homan’s test)」。","detail":{"background":"霍曼氏試驗(Homan’s sign/test):產婦伸直下肢、將足板向背側彎曲(背屈),若腓腸肌(小腿後)出現疼痛為陽性,提示深部靜脈血栓(DVT)。Schultze是胎盤娩出機轉、Bishop是子宮頸成熟計分、Ballard是新生兒成熟度評估。本題評估DVT的試驗為「霍曼氏試驗」(B)。","options":{"A":"希氏試驗(Schultze)為胎盤娩出機轉,非DVT評估。","B":"正確。霍曼氏試驗評估深部靜脈血栓。","C":"畢夏氏(Bishop)為子宮頸成熟計分。","D":"貝拉德(Ballard)為新生兒成熟度評估。"},"sources":["新文京《產科護理學》霍曼氏試驗","DVT"]}},"101030-N4-12":{"quick":"「乳汁分泌」不屬於產後婦女的退行性變化(retrogressive change)。","detail":{"background":"產褥期變化分兩類:退行性(退化)變化——子宮復舊(子宮底下降、惡露排出)、子宮頸與陰道/會陰裂傷修復縮復、生殖器官回復孕前狀態;進行性(建設性)變化——乳房泌乳(乳汁分泌)、泌乳建立、母性角色發展。「乳汁分泌屬進行性變化,不屬退行性變化」。本題不屬退行性者為「乳汁分泌」(C)。","options":{"A":"退行性變化。惡露排出(子宮復舊)。","B":"退行性變化。子宮底下降。","C":"本題答案(非退行性)。乳汁分泌屬進行性變化。","D":"退行性變化。陰道及會陰裂傷修復。"},"sources":["新文京《產科護理學》退行性/進行性變化","產褥期"]}},"101110-N4-58":{"quick":"產後哺餵母奶時感覺下腹部疼痛,最可能原因是「催產素分泌造成子宮收縮痛」。","detail":{"background":"哺乳時下腹痛(產後痛/afterpains):嬰兒吸吮乳房→刺激腦下垂體後葉分泌催產素(oxytocin)→催產素除引發排乳外,亦使子宮收縮→產生間歇性下腹絞痛(產後痛)。故哺乳時下腹痛是催產素造成子宮收縮所致(非泌乳素;泌乳素是製造乳汁)。本題最可能原因為「催產素分泌造成子宮收縮痛」(D)。","options":{"A":"膀胱脹非哺乳時下腹痛的典型原因。","B":"便秘非哺乳引發的下腹痛。","C":"泌乳素是製造乳汁,非引發子宮收縮。","D":"正確。催產素分泌引發子宮收縮痛。"},"sources":["新文京《產科護理學》產後痛","催產素"]}},"105090-N4-22":{"quick":"血栓性栓塞敘述中「陽性反應是足部屈曲時脛骨後肌壓迫深部靜脈引起疼痛」為錯誤。","detail":{"background":"血栓性栓塞與霍曼氏徵象:以霍曼氏徵象評估深部靜脈血栓(正確);「陽性反應是足部背屈(向背側彎曲)時腓腸肌(小腿後)疼痛,而非足部屈曲、脛骨後肌」,故敘述B的屈曲與脛骨後肌錯誤(應為背屈、腓腸肌);深部靜脈血栓可見患肢凹陷性水腫、局部紅腫壓痛;下床活動是預防血栓方法之一。本題「錯誤」者為B。","options":{"A":"正確。以霍曼氏徵象評估靜脈血栓。","B":"錯誤(本題答案)。應為足部背屈時腓腸肌疼痛,非屈曲、脛骨後肌。","C":"正確。患肢可見凹陷性水腫、局部紅腫壓痛。","D":"正確。下床活動是預防血栓方法之一。"},"sources":["新文京《產科護理學》霍曼氏徵象","DVT"]}},"106030-N4-21":{"quick":"陰道產後6小時尚未排尿、無尿液感,最適宜處置是「評估膀胱,解釋產後膀胱脹滿敏感度減低並協助排尿」。","detail":{"background":"產後排尿:生產時膀胱受壓、麻醉與會陰痛使膀胱對脹滿的敏感度下降,產後易尿瀦留;脹大的膀胱會推高子宮、阻礙收縮致出血。處置應主動評估膀胱脹尿、向產婦解釋敏感度減低、並協助排尿(誘尿/必要時導尿),不應僅被動觀察或等到超過8小時(脹尿太久增傷害與感染)。本題最適宜為「評估膀胱、解釋敏感度減低並協助排尿」(D)。","options":{"A":"錯。不應僅被動觀察(膀胱可能已脹卻無感)。","B":"多喝水非首要(已可能脹尿無感)。","C":"錯。不應等超過8小時才導尿(脹尿太久有害)。","D":"正確。評估膀胱、解釋敏感度減低並協助排尿。"},"sources":["新文京《產科護理學》產後排尿","膀胱脹"]}},"106030-N4-25":{"quick":"預防產後血栓靜脈炎措施中「若有血栓病史者不宜早期下床活動」為錯誤。","detail":{"background":"預防產後血栓靜脈炎:鼓勵早期下床活動、產後第1天即可做產後(腿部)運動促血液循環、每日評估霍曼氏徵象。「有血栓病史者更應預防(早期活動、避免久臥、必要時抗凝),並非不宜早期下床」(久臥反增血栓);若已確診急性DVT則需臥床抗凝(那是治療,非預防)。本題「錯誤」者為「血栓病史者不宜早期下床活動」(D)。","options":{"A":"正確。鼓勵產婦產後早期下床活動。","B":"正確。產後第1天即可執行產後運動。","C":"正確。產後每日評估霍曼氏徵象。","D":"錯誤(本題答案)。血栓病史者更應早期活動預防,非不宜下床。"},"sources":["新文京《產科護理學》血栓預防","早期活動"]}},"106110-N4-23":{"quick":"產後腸蠕動功能評估中「叩診出現鼓音表示腸蠕動良好」為錯誤。","detail":{"background":"產後腸蠕動評估:以聽診器在腹部四個象限聽腸蠕動音、正常約每分鐘5–34次、產後因腹壓減少與活動減少而腸蠕動減緩(易便秘脹氣)。「腸蠕動是否良好應以聽診腸蠕動音判斷;叩診鼓音(tympany)反映腸內氣體(脹氣),不代表腸蠕動良好」,故敘述C錯誤。本題「錯誤」者為「叩診出現鼓音表示腸蠕動良好」(C)。","options":{"A":"正確。以聽診器在四個象限評估腸蠕動。","B":"正確。正常腸蠕動音每分鐘5至34次。","C":"錯誤(本題答案)。叩診鼓音反映腸內氣體,非腸蠕動良好。","D":"正確。產後腹壓減少會減緩腸蠕動。"},"sources":["新文京《產科護理學》腸蠕動評估","產後護理"]}},"107030-N4-20":{"quick":"餵完奶皺眉扶腹抱怨產後痛,回應中「餵母奶有助惡露排出,且會減輕產後痛」為錯誤。","detail":{"background":"產後痛(afterpains):哺乳時催產素分泌使子宮收縮,反而會加重產後痛(哺乳時下腹絞痛),雖同時有助子宮復舊與惡露排出。故「餵母奶會減輕產後痛」錯誤(哺乳時產後痛加劇,可餵奶前先服止痛劑)。其餘:產後痛在初期發生可能影響睡眠、經產婦較初產婦常發生(子宮肌張力較鬆)、適當活動與放鬆可改善皆正確。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。哺乳時催產素使子宮收縮,反而加重產後痛。","B":"正確。產後痛在初期發生、可能影響睡眠。","C":"正確。經產婦產後痛較初產婦常發生。","D":"正確。適當活動與放鬆技巧可改善。"},"sources":["新文京《產科護理學》產後痛","催產素"]}},"107110-N4-20":{"quick":"餵母奶時肚子痛(產後痛),適宜指導是「適當活動可以改善疼痛」。","detail":{"background":"產後痛(餵奶時下腹絞痛):因哺乳時催產素使子宮收縮所致,屬正常。處置:深呼吸放鬆、適當活動、熱敷、按摩、餵奶前依醫囑服止痛劑可改善;不需停止哺乳(哺乳助子宮復舊與惡露排出);產後痛是催產素(非泌乳激素)引起、多2–3天內緩解(非2星期)。本題適宜為「適當活動可以改善疼痛」(C)。","options":{"A":"錯。產後痛多2–3天緩解,非2星期。","B":"錯。產後痛由催產素引起,非泌乳激素。","C":"正確。適當活動可改善產後痛。","D":"錯。不需停止哺乳(哺乳助復舊)。"},"sources":["新文京《產科護理學》產後痛","哺乳"]}},"107110-N4-23":{"quick":"產後第10天仍有輕微足踝水腫、其他正常,最適宜指導是「坐著時不要交叉雙腿」。","detail":{"background":"產後輕微下肢水腫(產後早期體液重新分布的生理現象,其他徵象正常)的衛教:促進靜脈回流——坐著時不交叉雙腿、抬高下肢、適當活動、避免久站久坐、穿彈性襪(非緊縮的襪子)。不需特別低鹽飲食(非病理性);緊縮的襪子會妨礙循環;多臥床減少活動反不利靜脈回流(增血栓風險)。本題最適宜為「坐著時不要交叉雙腿」(C)。","options":{"A":"低鹽飲食非此生理性水腫的必要措施。","B":"錯。應穿彈性襪,非緊縮的襪子(妨礙循環)。","C":"正確。坐著時不交叉雙腿,促進靜脈回流。","D":"錯。多臥床減少活動不利靜脈回流。"},"sources":["新文京《產科護理學》產後水腫","靜脈回流"]}},"107110-N4-26":{"quick":"產後霍曼氏徵象(Homan’s sign)的評估方式是「一手支托膝膕、另一手將足部向背側屈曲,看腓腸肌有無疼痛」。","detail":{"background":"霍曼氏徵象評估:「一手支托膝膕(膝後),另一手握足將足部向背側屈曲(背屈),觀察腓腸肌(小腿後)有無疼痛」,有疼痛為陽性(疑深部靜脈血栓)。選項A是乳頭(乳房)評估、C是評估大腿前側(非腓腸肌)、D是評估腰部,皆非霍曼氏徵象。本題正確為B。","options":{"A":"此為乳房/乳頭評估,非霍曼氏徵象。","B":"正確。支托膝膕、足部背屈,看腓腸肌疼痛。","C":"評估大腿前側,非霍曼氏徵象(腓腸肌)。","D":"評估腰部,非霍曼氏徵象。"},"sources":["新文京《產科護理學》霍曼氏徵象","DVT評估"]}},"108110-N4-23":{"quick":"霍曼氏試驗敘述中「在縮短腓腸肌以壓迫深部靜脈」為錯誤。","detail":{"background":"霍曼氏試驗(Homan’s test):讓個案腳板向背側彎曲(背屈),目的是「牽張(伸展)腓腸肌以壓迫(刺激)深部靜脈」,有血栓時引起腓腸肌疼痛(陽性)、主要測試深層靜脈血栓。「縮短腓腸肌」方向錯誤(背屈是伸展非縮短腓腸肌)。本題「錯誤」者為「在縮短腓腸肌以壓迫深部靜脈」(B)。","options":{"A":"正確。須讓個案的腳板向背側彎曲(背屈)。","B":"錯誤(本題答案)。背屈是伸展(牽張)腓腸肌,非縮短。","C":"正確。主要測試深層靜脈血栓。","D":"正確。陽性反應為發生疼痛。"},"sources":["新文京《產科護理學》霍曼氏試驗","DVT"]}},"109030-N4-34":{"quick":"產褥感染敘述正確的是:最常見細菌為陰道內細菌如B群鏈球菌(2)＋每天至少需2500~3000毫升水分(4),即24。","detail":{"background":"產褥感染(puerperal infection):「(1)定義為產後最初24小時後、產後10天內、任連續2天體溫≥38°C(口溫)(產後最初24小時內的發燒不算,故敘述(1)任2天體溫38°C不完整/不精確);(2)最常見致病菌為陰道內常在菌(如B群鏈球菌、大腸桿菌、厭氧菌)——正確;(3)最常見部位為生殖道(子宮內膜炎),非腸胃道——故(3)錯;(4)多攝取水分(每天約2500–3000毫升)有助——正確」。本題正確組合為(2)(4)即24(D)。","options":{"A":"含(1)定義不精確,錯。","B":"含(3)腸胃道感染最常見(錯,應為生殖道)。","C":"含(3)錯。","D":"正確。(2)B群鏈球菌+(4)每天2500~3000毫升水分。"},"sources":["新文京《產科護理學》產褥感染","子宮內膜炎"]}},"110030-N4-22":{"quick":"產後第二天宮縮痛、想休息拒絕餵奶,正確解釋是「此時處於接受期,應先滿足她的需求,但同時鼓勵她多接觸新生兒」。","detail":{"background":"產後第二天(接受期 Taking-in):產婦依賴、被動、需休息與被照顧,加上宮縮痛(產後痛,經產婦較明顯)+睡眠差,想休息、暫拒餵奶是接受期的合理表現。護理應「先滿足其休息與被照顧的需求(接受期),同時鼓勵並協助她逐漸多接觸新生兒」,而非批判其以自我為中心、誤判宮縮痛為異常、或強行代餵。本題正確為D。","options":{"A":"不應批判經產婦「較不好奇、以自我為中心」。","B":"錯。經產婦宮縮(產後)痛屬正常,非異常。","C":"不應強行「主動代為哺餵」(應滿足需求並鼓勵接觸)。","D":"正確。接受期先滿足需求,同時鼓勵多接觸新生兒。"},"sources":["新文京《產科護理學》魯賓接受期","產後痛"]}},"110030-N4-33":{"quick":"產後8小時惡露鮮紅、1小時內浸溼整片產墊,護理措施中「暫停子宮按摩」為錯誤。","detail":{"background":"產後出血(子宮收縮乏力)處置:「監測生命徵象與血壓、評估出血量、持續/加強子宮按摩(子宮收縮)、依醫囑給子宮收縮藥物、評估膀胱」。「暫停子宮按摩錯誤」——出血(惡露過多、1小時浸溼整片產墊)時應持續按摩子宮促收縮止血,不可暫停。本題「錯誤」者為「暫停子宮按摩」(C)。","options":{"A":"正確。監測生命徵象及血壓。","B":"正確。評估出血量。","C":"錯誤(本題答案)。出血時應持續按摩子宮,不可暫停。","D":"正確。依醫囑給予子宮收縮藥物。"},"sources":["新文京《產科護理學》產後出血","子宮按摩"]}},"111030-N4-20":{"quick":"容易發生產後痛(after pain)的是「經產婦」。","detail":{"background":"產後痛(afterpains):因產後子宮間歇性收縮(復舊)引起的下腹絞痛。「經產婦因子宮肌張力較鬆、需更強的間歇收縮才能復舊,故產後痛較明顯/常發生;另多胞胎、巨嬰、羊水過多(子宮過度膨脹)及哺乳時亦較明顯」。初產婦子宮肌張力較佳、持續收縮,產後痛較不明顯。本題容易發生產後痛者為「經產婦」(A)。","options":{"A":"正確。經產婦子宮肌張力鬆,產後痛較明顯。","B":"羊水過少使子宮未過度膨脹,產後痛較不明顯。","C":"單胞胎子宮未過度膨脹,非易發生產後痛者。","D":"剖腹產非產後痛的特定好發因素(經產婦/過度膨脹才是)。"},"sources":["新文京《產科護理學》產後痛","經產婦"]}},"113030-N4-16":{"quick":"產後痛(after pain)主要是評估「子宮、子宮間歇性收縮不適感」的問題。","detail":{"background":"產後痛(afterpains):是子宮間歇性收縮(復舊)引起的下腹絞痛,故評估的器官/組織是子宮(子宮收縮不適感)。乳房痛屬乳房問題、會陰痛屬會陰傷口、肛門痛屬痔瘡,皆非產後痛。本題產後痛主要評估「子宮、子宮間歇性收縮不適感」(C)。","options":{"A":"乳房乳頭疼痛屬乳房問題,非產後痛。","B":"會陰傷口疼痛屬會陰問題。","C":"正確。產後痛是子宮間歇性收縮不適感。","D":"肛門痔瘡痛非產後痛。"},"sources":["新文京《產科護理學》產後痛","子宮收縮"]}},"113030-N4-20":{"quick":"早期破水30小時後生產、產後第2天高燒、惡露惡臭、子宮軟有壓痛,臨床最符合「子宮內膜炎」。","detail":{"background":"產褥感染鑑別:本例早期破水(30小時,長時間破水增感染)+產後第2天高燒38.5–39.5°C+惡露呈紅色有惡臭味+子宮軟、下腹壓痛最符合子宮內膜炎(endometritis)(產褥感染最常見部位)。會陰傷口感染為局部紅腫熱痛分泌物;腹膜炎有反彈性壓痛(本例無);泌尿道感染以排尿症狀與肋脊角壓痛為主。本題最符合「子宮內膜炎」(B)。","options":{"A":"會陰傷口感染為局部表現,非全身高燒+子宮壓痛。","B":"正確。破水久+高燒+惡露惡臭+子宮軟壓痛=子宮內膜炎。","C":"腹膜炎有反彈性壓痛(本例無反彈性壓痛)。","D":"泌尿道感染以排尿症狀為主,非惡露惡臭。"},"sources":["新文京《產科護理學》產褥感染","子宮內膜炎"]}},"114030-N4-13":{"quick":"剖腹產後一週全身發熱、若與子宮復舊有關,最可能評估結果是「子宮底位於肚臍下五橫指、惡露呈暗咖啡色帶有臭味」。","detail":{"background":"子宮復舊不全/子宮內膜炎(感染):若產後發熱與子宮復舊不全+感染有關,評估會見子宮復舊延遲(子宮底位置較高、下降較慢)、子宮較軟、惡露異常(量多、倒退回紅、或帶臭味提示感染)。選項D「子宮底位於肚臍下五橫指(產後一週若正常應更低/近骨盆腔,位置偏高表復舊延遲)、惡露暗咖啡色帶臭味(感染)」最符合復舊不全+感染。其餘為正常或不相關描述。本題最可能為D。","options":{"A":"子宮底近恥骨聯合是復舊良好,與發熱不符。","B":"子宮硬如棒球是收縮良好,非復舊不全。","C":"觸診無明顯疼痛屬正常,與感染發熱不符。","D":"正確。子宮底偏高+惡露暗咖啡色帶臭味=復舊不全+感染。"},"sources":["新文京《產科護理學》子宮復舊不全","子宮內膜炎"]}},"114030-N4-22":{"quick":"產後血栓性靜脈炎敘述正確的是「產後血小板及凝血因子數量增加是其主因」。","detail":{"background":"產後血栓性靜脈炎:(1)「產後血小板與凝血因子增加(生理性高凝狀態)+血液鬱滯+血管內皮受損(Virchow三要素)是主因」——正確;(2)長期服用口服避孕藥(含雌激素)反而增加血栓風險(非較不易);(3)待產出汗脫水血液濃稠是誘因之一但非主因;(4)孕期下肢水腫與血栓靜脈炎無直接因果(非較易發生之主因)。本題正確為「產後血小板及凝血因子增加是主因」(A)。","options":{"A":"正確。產後血小板及凝血因子增加(高凝狀態)是主因。","B":"錯。長期服口服避孕藥反而較易發生血栓。","C":"脫水血液濃稠是誘因之一,非主因。","D":"孕期水腫非血栓靜脈炎較易發生之主因。"},"sources":["新文京《產科護理學》血栓性靜脈炎","Virchow三要素"]}},"114100-N4-15":{"quick":"產後第一次下床活動前,最優先的護理評估是「生命徵象」。","detail":{"background":"產後第一次下床(early ambulation)前的安全評估:最優先評估生命徵象(血壓、脈搏)與有無姿位性低血壓/頭暈(產後體液變動、失血、臥床後易頭暈跌倒),先協助坐床緣評估無不適再下床、並陪同防跌。宮縮、血栓試驗、惡露性質為產後常規評估但非「下床前」的優先安全評估。本題最優先為「生命徵象」(A)。","options":{"A":"正確。下床前優先評估生命徵象(防姿位性低血壓跌倒)。","B":"宮縮情況為常規評估,非下床前首要。","C":"血栓試驗非下床前的優先安全評估。","D":"惡露性質非下床安全評估首要。"},"sources":["新文京《產科護理學》早期下床","安全評估"]}},"114100-N4-21":{"quick":"產後第4天確診深層血栓靜脈炎,正確的是「出現呼吸困難、喘、胸痛、臉色蒼白應懷疑肺栓塞」。","detail":{"background":"深部靜脈血栓(DVT)與肺栓塞:(1)「DVT最嚴重併發症是血栓脫落致肺栓塞(PE)——表現突發呼吸困難、喘、胸痛、發紺/臉色蒼白、心搏過速,須立即處理」——正確;(2)DVT患肢不可按摩或熱敷加壓(會使血栓脫落致PE);(3)抗凝血劑治療非僅兩週(常需數月);(4)哺乳期不宜用Warfarin?——實際上Warfarin哺乳相對可用,但此題以「按壓熱敷」「療程兩週」為錯項,正解為A(肺栓塞)。本題正確為A。","options":{"A":"正確。DVT脫落致肺栓塞:呼吸困難、喘、胸痛、臉色蒼白。","B":"錯。DVT患肢不可按壓熱敷(會使血栓脫落致PE)。","C":"錯。抗凝血劑治療常需數月,非至多兩週。","D":"抗凝藥物選擇須個別評估,非本題正解重點。"},"sources":["新文京《產科護理學》DVT/肺栓塞","抗凝"]}},"115030-N4-22":{"quick":"發生產後血栓靜脈炎的主要原因是「纖維蛋白溶解抑制素增加」(高凝狀態)。","detail":{"background":"產後血栓靜脈炎主因(生理性高凝狀態):「產後凝血因子、血小板、纖維蛋白原增加,且纖維蛋白溶解(fibrinolysis)被抑制(纖維蛋白溶解抑制素增加)→血液呈高凝(易栓)狀態」,加上分娩後血液鬱滯與血管受損(Virchow三要素),易致血栓。多胞胎、妊娠高血壓、產後出血為相關/誘發因素但非「主要(生理機轉)原因」。本題主要原因為「纖維蛋白溶解抑制素增加」(A)。","options":{"A":"正確。纖維蛋白溶解被抑制(高凝狀態)是主因。","B":"多胞胎為相關因素,非生理主因。","C":"妊娠高血壓為相關因素,非主因。","D":"產後出血為相關因素,非血栓的生理主因。"},"sources":["新文京《產科護理學》血栓性靜脈炎","高凝狀態"]}},"103030-N4-17":{"quick":"「身體外觀」不屬於產後「BUBBLEHE」護理評估項目。","detail":{"background":"產後評估常用BUBBLE-HE記憶法:B=Breast(乳房)、U=Uterus(子宮)、B=Bladder(膀胱)、B=Bowel(腸胃道)、L=Lochia(惡露)、E=Episiotomy(會陰傷口)、H=Homan’s sign(下肢血栓)、E=Emotion(情緒)。「身體外觀不在此評估架構內」。本題不屬於者為「身體外觀」(D)。(選項C「子宮復舊及會陰傷口」對應U與E,屬其中。)","options":{"A":"屬於。膀胱功能(Bladder)。","B":"屬於。腸胃道功能(Bowel)。","C":"屬於。子宮復舊(U)及會陰傷口(E)。","D":"本題答案(非評估項目)。身體外觀不在BUBBLEHE內。"},"sources":["新文京《產科護理學》BUBBLEHE","產後評估"]}},"106111-N4-34":{"quick":"早產傾向高危險婦女自我照顧,正確指導是「每日攝取2000~3000c.c.足夠的水分」。","detail":{"background":"早產傾向(高危險)孕婦自我照顧:「每日攝取足夠水分(約2000–3000c.c.,脫水會刺激子宮收縮、增早產風險)」——正確;刺激乳頭會誘發催產素、引起子宮收縮(早產傾向者不應按摩乳頭);安胎穩定後仍應適度限制活動/休息(非不須限制);含咖啡因食物應限制(咖啡因過量不利,且非用以增胎心搏率)。本題正確為「每日攝取2000~3000c.c.足夠水分」(A)。","options":{"A":"正確。每日攝取足夠水分(脫水會刺激子宮收縮)。","B":"錯。早產傾向者不應按摩乳頭(誘發子宮收縮)。","C":"錯。安胎穩定後仍應適度休息限制活動。","D":"錯。應限制咖啡因(非用以增胎心搏率)。"},"sources":["新文京《產科護理學》早產預防","安胎衛教"]}},"101110-N4-62":{"quick":"指導哺乳期婦女營養中「每日需強迫攝取3000c.c.的水分」為錯誤。","detail":{"background":"哺乳期營養:每日熱量需求較平時增加約500大卡、蛋白質宜增加約12–15公克、完全素食者需補充維生素B12。水分應依需求充足攝取(口渴即喝、約2000–3000c.c.),「強迫攝取3000c.c.錯誤」(不應強迫固定量,過量無益、依需求即可)。本題「錯誤」者為「每日需強迫攝取3000c.c.的水分」(B)。","options":{"A":"正確。每日熱量需求較平時增加500大卡。","B":"錯誤(本題答案)。應依需求充足攝取水分,非強迫3000c.c.。","C":"正確。每日蛋白質宜增加12~15公克。","D":"正確。完全素食者需補充維生素B12。"},"sources":["新文京《產科護理學》哺乳期營養","水分"]}},"101110-N4-63":{"quick":"產後第3天哺乳順利、將出院的指導中「可將她轉介到社區的母乳支持團體」為正確。","detail":{"background":"出院哺乳指導:(1)「轉介社區母乳支持團體提供持續支持」——正確;(2)餵完奶不需把餘奶完全擠出(會刺激更多泌乳);(3)乳頭破皮嚴重時應暫時停止直接哺餵該側、改擠出餵食並讓乳頭癒合(非仍持續直接哺餵);(4)擠乳時間沒有「每次勿超過15分鐘」的硬性規定(依排空與需求)。本題正確為「可轉介到社區母乳支持團體」(D)。","options":{"A":"錯。餘奶不需完全擠出(會刺激更多泌乳)。","B":"錯。乳頭破皮嚴重時宜暫停直接哺餵該側、改擠出。","C":"「擠乳每次勿超過15分鐘」非硬性規定。","D":"正確。可轉介到社區母乳支持團體。"},"sources":["新文京《產科護理學》出院哺乳指導","母乳支持團體"]}},"102030-N4-20":{"quick":"純母乳哺餵產婦恢復性生活的時機,最恰當是「產後2~3週,惡露停止及會陰傷口癒合後」。","detail":{"background":"產後恢復性生活時機:一般建議「惡露停止(乾淨)、會陰/產道傷口癒合後」即可,約產後2–3週至產後檢查(6週)後視個別恢復狀況;重點是傷口癒合、惡露乾淨、產婦準備好,並注意避孕(哺乳不等於絕對避孕)。選項B「產後2–3週、惡露停止及會陰傷口癒合後」最符合此原則。本題最恰當為B。","options":{"A":"產後1–2週惡露未停、傷口未癒,過早。","B":"正確。產後2~3週、惡露停止及會陰傷口癒合後。","C":"產後6–8週才開始過於保守(癒合後即可)。","D":"產後10–12週過晚,非以「離奶」為依據。"},"sources":["新文京《產科護理學》產後性生活","恢復時機"]}},"105030-N4-19":{"quick":"授乳母親營養需求正確的是「增加豆類與堅果類的攝取」。","detail":{"background":"授乳(哺乳)母親營養:(1)「增加優質蛋白與健康脂肪——豆類與堅果類攝取」——正確;(2)完全素食者應補充維生素B12(非B6);(3)每日熱量較平時增加約500大卡(非800);(4)水分依需求充足攝取(約2000–3000c.c.),非3500c.c.以上。本題正確為「增加豆類與堅果類的攝取」(C)。","options":{"A":"錯。完全素食者應補充維生素B12,非B6。","B":"錯。每日增加約500大卡,非800大卡。","C":"正確。增加豆類與堅果類攝取。","D":"錯。水分約2000–3000c.c.,非3500以上。"},"sources":["新文京《產科護理學》哺乳期營養","授乳"]}},"105030-N4-20":{"quick":"坐月子吃麻油雞,最合宜解釋是「就中醫的觀點,麻油雞可補氣血」。","detail":{"background":"文化照護(坐月子飲食):護理應尊重產婦的文化習俗、以不批判的態度提供衛教。對「為何吃麻油雞」最合宜的解釋是「就中醫觀點,麻油雞被認為可補氣血、溫補」(尊重傳統、提供文化脈絡的說明),同時可衛教適量(麻油雞較油、酒精成分哺乳前注意)。不應貶為欠缺科學、生意行銷或誇大有助身材恢復。本題最合宜為「中醫觀點麻油雞可補氣血」(A)。","options":{"A":"正確。就中醫觀點麻油雞可補氣血(尊重文化)。","B":"貶低傳統習俗,不符文化敏感照護。","C":"貶為「生意行銷」不恰當。","D":"「有助身材恢復」非麻油雞的合宜解釋。"},"sources":["新文京《產科護理學》文化照護","坐月子"]}},"106030-N4-1":{"quick":"越南籍配偶婆婆堅持喝生化湯,護理師處置應「採不批判的態度,與王女士討論其想法及決定」。","detail":{"background":"文化敏感照護:面對不同文化的產後習俗(如喝生化湯),護理應採不批判(non-judgmental)態度,尊重並與產婦本人討論其想法與決定,提供正確衛教(如生化湯含活血成分、與子宮收縮劑併用須注意、量與時機),協助其知情選擇。不應陽奉陰違倒掉、假裝沒看見、或片面下指令。本題正確處置為「採不批判態度,與王女士討論其想法及決定」(B)。","options":{"A":"片面「服藥後1小時再喝」未與產婦討論其想法。","B":"正確。採不批判態度,與產婦討論其想法與決定。","C":"「等婆婆走再倒掉」陽奉陰違,不當。","D":"「假裝沒看見」迴避,非適當處置。"},"sources":["新文京《產科護理學》文化照護","生化湯"]}},"106030-N4-26":{"quick":"哺餵母乳使月經較延後的原因是「刺激泌乳激素分泌,抑制動情素與黃體生成激素」。","detail":{"background":"哺乳閉經(lactational amenorrhea)機轉:「嬰兒吸吮→刺激泌乳激素(prolactin)分泌→抑制下視丘GnRH與腦下垂體濾泡刺激素(FSH)/黃體生成激素(LH)→抑制濾泡發育與動情素(雌激素)、抑制排卵→月經延後」。本題原因為「刺激泌乳激素,抑制動情素與黃體生成激素」(A)。","options":{"A":"正確。泌乳激素↑→抑制動情素與黃體生成激素→月經延後。","B":"方向相反(泌乳素抑制而非刺激FSH/LH)。","C":"泌乳素抑制動情素,非刺激。","D":"泌乳素抑制LH與動情素,敘述不符。"},"sources":["新文京《產科護理學》哺乳閉經","泌乳素"]}},"107110-N4-24":{"quick":"產後性行為護理指導,最適當是「建議惡露乾淨與會陰傷口癒合後才有性行為」。","detail":{"background":"產後性行為:(1)「建議惡露乾淨、會陰/產道傷口癒合後才恢復性行為(約產後數週),並注意避孕」——正確;(2)哺乳期雌激素低使陰道乾燥(故B「泌乳激素高致陰道乾燥」歸因不精確——是雌激素低所致);(3)陰道乾燥宜用水溶性潤滑劑(非脂溶性,脂溶性易孳生細菌、損保險套);(4)非硬性規定「產後八週後」才能(視傷口癒合與惡露)。本題最適當為「惡露乾淨與會陰傷口癒合後才有性行為」(A)。","options":{"A":"正確。惡露乾淨、會陰傷口癒合後才有性行為。","B":"陰道乾燥是雌激素低所致(歸因泌乳素不精確)。","C":"錯。應用水溶性潤滑劑,非脂溶性。","D":"非硬性「產後八週後」(視傷口與惡露而定)。"},"sources":["新文京《產科護理學》產後性行為","潤滑劑"]}},"108020-N4-21":{"quick":"剖腹產後第1天、尚未排氣、少量深紅惡露,適當指導是「教導腿部運動以防血栓靜脈炎」。","detail":{"background":"剖腹產後第1天護理:(1)「教導腿部(踝部)運動、鼓勵翻身與早期下床,預防血栓靜脈炎」——正確;(2)應鼓勵早期下床活動促腸蠕動排氣(非避免下床);(3)母乳哺餵不需因乳汁未分泌而暫停(應儘早哺餵刺激泌乳);(4)產後第1天少量深紅惡露屬正常(非內出血異常)。本題適當為「教導腿部運動以防血栓靜脈炎」(D)。","options":{"A":"錯。應鼓勵早期下床活動促腸蠕動,非避免下床。","B":"錯。不需因乳汁未分泌而暫停哺乳。","C":"錯。產後第1天少量深紅惡露屬正常,非內出血。","D":"正確。教導腿部運動預防血栓靜脈炎。"},"sources":["新文京《產科護理學》剖腹產術後","血栓預防"]}},"109030-N4-22":{"quick":"哺餵母乳婦女產後排卵與月經正確的是「純哺餵母乳會延後排卵」。","detail":{"background":"哺乳與排卵/月經:(1)「純(全)哺餵母乳→泌乳素高→延後排卵與月經」——正確;(2)泌乳素抑制的是GnRH→FSH/LH(進而抑制濾泡發育與排卵),敘述「抑制濾泡刺激素」方向大致對但本題以D為正解;(3)月經未恢復不代表沒有排卵——排卵可能先於月經發生,故哺乳不等於絕對避孕;(4)哺乳婦女月經恢復晚於子宮復舊(非差不多同時)。本題正確為「純哺餵母乳會延後排卵」(D)。","options":{"A":"泌乳素抑制GnRH/FSH/LH,敘述不夠精確(本題以D為正解)。","B":"錯。哺乳婦女月經恢復晚於子宮復舊。","C":"錯。排卵可能先於月經,月經延後不表示一定無排卵。","D":"正確。純哺餵母乳會延後排卵。"},"sources":["新文京《產科護理學》哺乳閉經","排卵"]}},"110030-N4-23":{"quick":"母乳哺餵對母親的影響,正確的是「停經前罹患卵巢癌的機率較低」。","detail":{"background":"哺乳對母親好處:(1)「降低停經前乳癌與卵巢癌的機率」——正確;(2)哺乳刺激催產素使子宮收縮復舊、減少產後出血——但催產素由腦下垂體後葉分泌(非前葉),故A「前葉分泌催產素」錯;(3)哺乳不會造成母親骨質疏鬆(哺乳期暫時骨密度下降,離乳後可回復,長期反而保護);(4)哺乳會延後月經來潮(哺乳閉經),故「對月經沒有影響」錯。本題正確為「停經前罹患卵巢癌機率較低」(B)。","options":{"A":"錯。催產素由腦下垂體「後葉」分泌(非前葉)。","B":"正確。哺乳降低停經前卵巢癌(與乳癌)機率。","C":"錯。哺乳不會造成中年骨質疏鬆(離乳後回復)。","D":"錯。哺乳會延後月經(哺乳閉經)。"},"sources":["新文京《產科護理學》哺乳好處","卵巢癌"]}},"110110-N4-32":{"quick":"不適合使用麥角鹼類藥物(Ergonovine)促進子宮收縮的是「子癇前症(3)＋心臟疾病(4)」,即34。","detail":{"background":"麥角鹼類(Ergonovine/Methergine)禁忌:會使血管收縮、升高血壓,故高血壓/子癇前症(3)與心臟疾病(4)者禁用/不適合(可能誘發高血壓危象、加重心臟負荷)。妊娠糖尿病(1)、前置胎盤(2)非其禁忌(前置胎盤是陰道產禁忌,與麥角鹼禁忌無關)。本題不適合者為(3)(4)即34(C)。","options":{"A":"(1)妊娠糖尿病非麥角鹼禁忌。","B":"含(2)前置胎盤(非麥角鹼禁忌)。","C":"正確。子癇前症(3)+心臟疾病(4)不適合用麥角鹼。","D":"含(2)前置胎盤,錯。"},"sources":["藥理 麥角新鹼禁忌","新文京《產科護理學》"]}},"111110-N4-25":{"quick":"純母乳哺育是否可避孕,最適當指導是「月經未出現前、不分日夜純母乳哺餵頻率8~10次以上、6個月內可當作避孕措施」。","detail":{"background":"泌乳期無月經避孕法(LAM)三條件:「(1)純(全)母乳哺餵、不分日夜頻繁哺餵(約每日8–10次以上、夜間不中斷);(2)產後月經尚未恢復;(3)嬰兒未滿6個月」——三者同時滿足時避孕效果約98%。本題最適當為「月經未出現前、不分日夜純母乳8–10次以上、6個月內可當避孕」(A);其餘敘述把條件講錯(僅產後1個月、月經未恢復即可、或稱最不安全)皆不正確。本題為A。","options":{"A":"正確。純母乳、頻繁、月經未恢復、6個月內可當避孕(LAM)。","B":"錯。LAM適用至產後6個月(非僅1個月內)。","C":"錯。需同時滿足純母乳+頻繁+月經未恢復+<6個月。","D":"錯。LAM在符合條件下避孕效果高(非最不安全)。"},"sources":["新文京《產科護理學》LAM","哺乳避孕"]}},"112110-N4-24":{"quick":"產後暫時避免食用含酒精性食物,最主要原因是「避免影響傷口癒合」。","detail":{"background":"產後暫避酒精性食物(如含酒料理)的原因:酒精會進入乳汁影響嬰兒(神經發展、睡眠),且影響傷口癒合(酒精擴張血管、影響組織修復與凝血)、影響子宮復舊與惡露。本題官方以「避免影響傷口癒合」為最主要原因(B)(產後會陰/剖腹傷口需癒合,酒精不利)。臨床亦強調酒精會進入乳汁,但本題取傷口癒合為答案。","options":{"A":"避免影響腸道蠕動非主要原因。","B":"正確。避免影響傷口癒合(酒精不利組織修復)。","C":"避免影響惡露排出非最主要原因。","D":"避免影響性生活非相關原因。"},"sources":["新文京《產科護理學》產後飲食","酒精"]}},"113180-N4-13":{"quick":"哺乳期避孕法敘述中「單一雌性素的荷爾蒙避孕藥不會影響乳汁分泌、適合選用」為錯誤。","detail":{"background":"哺乳期避孕:(1)非荷爾蒙避孕(保險套、子宮內避孕器、結紮)不影響泌乳,可安全使用——正確;(2)「含雌性素(動情素)的避孕藥會減少奶量、不適合哺乳期」——故單一雌性素避孕藥不會影響乳汁敘述錯誤(哺乳期可用的是單一黃體素(progestin-only)避孕藥,而非單一雌性素);(3)雌性素+黃體素混合型避孕藥可能減少奶量、不建議——正確;(4)不再生育者輸精管結紮是永久避孕首選之一——正確。本題「錯誤」者為B。","options":{"A":"正確。非荷爾蒙避孕不影響泌乳,可安全使用。","B":"錯誤(本題答案)。含雌性素避孕藥會減少奶量;哺乳期可用的是單一「黃體素」避孕藥,非雌性素。","C":"正確。雌性素+黃體素混合型可能減少奶量,不建議。","D":"正確。不再生育者輸精管結紮是永久避孕首選之一。"},"sources":["新文京《產科護理學》哺乳期避孕","黃體素避孕藥"]}},"114030-N4-14":{"quick":"最適合採用泌乳期無月經法(LAM)的是「純母乳哺育、嬰兒4個月大、產後月經尚未恢復」。","detail":{"background":"LAM三條件須同時滿足:純(全)母乳哺育、產後月經未恢復、嬰兒未滿6個月。選項B「純母乳、嬰兒4個月(<6個月)、月經尚未恢復」三條件皆符合,最適合LAM。A「月經剛結束(已恢復月經)」不符;C「夜裡添加配方奶(非純母乳)」不符;D「混合哺餵(非純母乳)」不符。本題最適合者為B。","options":{"A":"錯。產後第一次月經已來(月經已恢復),不符LAM。","B":"正確。純母乳、4個月(<6個月)、月經未恢復,符合LAM。","C":"錯。夜裡添加配方奶(非純母乳)。","D":"錯。混合哺餵(非純母乳)。"},"sources":["新文京《產科護理學》LAM","哺乳避孕"]}},"114030-N4-16":{"quick":"哺餵母乳的好處,正確的是「哺乳的母親在停經前罹患乳癌或卵巢癌的機率較低」。","detail":{"background":"哺乳好處:(1)「降低母親停經前乳癌與卵巢癌機率」——正確;(2)哺乳刺激催產素(後葉)促子宮收縮,泌乳激素(prolactin)是製造乳汁,故A「泌乳激素促子宮收縮」錯(促收縮的是催產素);(3)哺乳會延後月經但「白天餵奶抑制FSH避孕」敘述過於簡化、且哺乳避孕需符合LAM條件;(4)哺乳母親因泌乳消耗熱量,體重通常較易回復(非增加比餵配方奶多)。本題正確為「停經前罹乳癌或卵巢癌機率較低」(D)。","options":{"A":"錯。促子宮收縮的是催產素,泌乳激素是製造乳汁。","B":"哺乳避孕需符合LAM條件,「白天餵奶抑制FSH避孕」過於簡化。","C":"錯。哺乳消耗熱量,體重較易回復,非增加更多。","D":"正確。哺乳母親停經前罹乳癌或卵巢癌機率較低。"},"sources":["新文京《產科護理學》哺乳好處","乳癌卵巢癌"]}},"114030-N4-25":{"quick":"罹患淋病(gonorrhea)的產婦,適當的產後護理措施是「收集子宮頸口分泌物進行細菌培養」。","detail":{"background":"淋病(gonorrhea,淋病雙球菌)產後護理:(1)「收集子宮頸口分泌物做細菌培養(確診與追蹤)」——正確,並依結果抗生素治療、追蹤性伴侶;(2)性行為應暫停至治療完成、雙方痊癒(非「繼續但減少頻率」);(3)不建議自行陰道灌洗(會把病原往上推、破壞正常菌叢);(4)預防新生兒淋菌性眼炎用紅黴素(erythromycin)眼藥膏,非2% tetracycline(且濃度與藥物不符)。本題適當為「收集子宮頸口分泌物進行細菌培養」(C)。","options":{"A":"錯。應暫停性行為至治療完成,非繼續減少頻率。","B":"錯。不建議自行陰道灌洗。","C":"正確。收集子宮頸口分泌物進行細菌培養。","D":"錯。新生兒淋菌眼炎預防用紅黴素眼藥膏。"},"sources":["新文京《產科護理學》淋病","產後STI護理"]}},"114170-N4-20":{"quick":"心臟病孕婦生產及產後護理正確的是「產後48小時靜脈回流增加,需密切監測心臟功能」。","detail":{"background":"心臟病孕婦:(1)生產方式非一律剖腹(視心功能,多數可陰道產並縮短第二產程);(2)產後採半坐臥/左側臥減少心臟負荷(非絕對平躺,平躺增回心血量);(3)「產後最初24–48小時因子宮收縮使大量血液回流體循環、靜脈回流增加,心臟負荷最大、最易心衰,須密切監測心臟功能」——正確;(4)心功能分級第一級(NYHA I)者仍可哺餵母乳(非不建議)。本題正確為「產後48小時靜脈回流增加,需密切監測心臟功能」(C)。","options":{"A":"錯。非一律剖腹(視心功能,多可陰道產)。","B":"錯。產後採半坐臥/左側臥,非絕對平躺。","C":"正確。產後48小時靜脈回流增加,需密切監測心臟功能。","D":"錯。第一級(NYHA I)婦女仍可哺餵母乳。"},"sources":["新文京《產科護理學》心臟病孕婦","產後監測"]}},"115030-N4-13":{"quick":"早產剖腹產後第9天、擠奶後活動有50元硬幣大小血塊排出,最不適當的解釋是「可能有子宮破裂,建議儘速到醫院」。","detail":{"background":"產後晚期惡露變化判讀:本例產後第9天、擠奶(催產素)後活動時排出50元硬幣大小血塊,最可能是活動使滯留子宮的血塊排出(尤喝生化湯活血+哺乳催產素促收縮),屬可解釋的現象;處置應手掌按摩子宮底、請護理師評估子宮收縮與惡露、增加哺乳促收縮、密切觀察(若持續大量血塊才儘速就醫)。「「可能子宮破裂」最不適當」——子宮破裂是待產/生產時的急症(劇痛、休克),產後第9天排出血塊不符子宮破裂表現,此解釋最不適當。本題最不適當為A。","options":{"A":"最不適當(本題答案)。產後第9天排血塊不符子宮破裂(子宮破裂為產時急症)。","B":"適當。生化湯+催產素刺激,滯留血塊在活動時排出。","C":"適當。按摩子宮底並請護理師評估子宮收縮及惡露。","D":"適當。增加哺乳頻率、密切觀察,持續大量才就醫。"},"sources":["新文京《產科護理學》晚期惡露","血塊"]}}},TO=["1母乳哺育技巧與含乳指導", "2母乳成分配方奶與嬰兒餵養營養", "3母嬰親善政策與哺乳禁忌", "4乳房問題乳腺炎脹奶與離乳", "5子宮復舊與惡露", "6產後會陰傷口與產後運動", "7產後心理適應與依附關係", "8產褥期生理感染與血栓", "9哺乳避孕坐月子飲食與特殊照護"],LEC={"1母乳哺育技巧與含乳指導":{"html":"<p><b>正確含乳(latch-on)表徵</b>:嘴張大、含住乳頭與<u>大部分乳暈</u>、<b>下唇外翻</b>、兩頰飽滿(無凹陷)、下巴貼乳房、不對稱含乳(下乳暈露出較少)、聽到<b>吞嚥聲</b>(發出「<u>嘖嘖聲</u>」反而表示含乳不正確)。以乳頭輕觸嬰兒嘴脣誘發<b>尋乳反射</b>使其張口。</p><p><b>乳頭疼痛/破皮</b>:最常見原因是<u>含乳不正確</u>→評估調整姿勢與含乳;乳頭<b>不可用肥皂/酒精清洗</b>(去油脂加重乾裂);先餵較不痛側、增加餵奶次數、哺後塗乳汁保持乾燥。</p><p><b>促進泌乳</b>:靠<b>吸吮頻率與乳汁移出量</b>(供需原理);依需求哺餵、<u>不限制時間次數</u>、夜間哺乳有助泌乳(夜間泌乳素高);一側吃完(吃到後奶)再換邊;<b>不給安撫奶嘴/夜間配方奶</b>(防乳頭混淆)。乳頭扁平/凹陷仍可親餵(嬰兒含乳房非乳頭、評估伸展性)。</p>"},"2母乳成分配方奶與嬰兒餵養營養":{"html":"<p><b>母乳 vs 配方奶</b>:母乳富含<b>乳清蛋白(易消化)、乳糖、不飽和脂肪酸、免疫球蛋白sIgA、乳鐵蛋白</b>;母乳<u>鐵、鈣濃度較低但吸收率高</u>(6個月後才需補鐵)、維生素D偏低(純母乳兒建議補充)。<b>前奶</b>清淡水分多富乳糖;<b>後奶</b>較白、富脂肪、熱量高。</p><p><b>初乳(colostrum)</b>:孕中期(約5–6個月)即製造,產後最初2–3天分泌,量少濃稠、富蛋白質與免疫球蛋白、助穩定血糖排胎便減黃疸。</p><p><b>免疫球蛋白</b>:<b>IgG</b>過胎盤(被動免疫);<b>IgM</b>胎兒可自行合成;<b>IgA</b>胎兒不能合成、出生後由母乳獲得。</p><p><b>母乳保存</b>:室溫(25°C)6–8小時、冷藏(4°C)3–5天、冷凍3–6個月;<u>不可微波加熱</u>。純母乳6個月內<b>不需餵開水</b>(防增腎臟負荷)。</p><p><b>嬰兒營養與遺傳代謝</b>:PKU限高蛋白(苯丙胺酸);HCU限甲硫胺酸;新生兒低血糖(<45)立即餵食、密集監測;早產兒以管灌+母乳為主,反抽>灌食量一半暫停;SIDS預防:仰睡、同室不同床、硬床無枕無玩具、避免過熱。</p>"},"3母嬰親善政策與哺乳禁忌":{"html":"<p><b>母嬰親善醫院(BFHI)十大措施重點</b>:書面哺乳政策、孕期衛教哺乳好處、產後<b>儘早(半小時內)哺乳</b>、教維持泌乳、<b>除醫療需要不給母乳以外食物(含水、葡萄糖水、配方奶)</b>、<b>24小時母嬰同室</b>、依需求哺餵、<u>不給安撫奶嘴/人工奶嘴</u>、轉介母乳支持團體、<b>產後即刻肌膚接觸</b>(直接促親子依附)。</p><p><b>母嬰同室目的</b>:增進依附、促哺乳、家庭中心照護、母親學習照護(<u>非為減少護理人力</u>);餵配方奶者亦可同室。</p><p><b>感染管制</b>:最重要是<b>手部衛生(洗手五時機)</b>。</p><p><b>哺乳禁忌</b>:母親<b>藥物濫用</b>、未治療活動性肺結核、HIV、化療/放射性同位素、嬰兒半乳糖血症。乳腺炎、A肝、黃疸<u>非</u>禁忌。</p>"},"4乳房問題乳腺炎脹奶與離乳":{"html":"<p><b>乳房充盈(脹奶)</b>:產後3–5天泌乳開始,<u>雙側</u>變硬發熱脹滿。處置:<b>增加哺乳、有效排空</b>、餵前溫敷按摩、餵後冷敷;<u>勿過度用吸奶器排空</u>(刺激更多泌乳)。</p><p><b>乳腺炎(mastitis)</b>:多<u>單側</u>、產後2–4週、<b>發燒+局部紅腫熱痛+乳頭傷口</b>、最常見<b>金黃色葡萄球菌</b>。處置:<b>持續哺乳/有效排空(治療關鍵,乳汁不會害嬰兒)</b>、休息、水分、止痛;先保守24–48小時,無改善才抗生素/培養;有波動感水囊感→乳房膿瘍。</p><p><b>離乳(斷奶)</b>:<b>逐漸減少哺餵次數</b>、限制水分、穿支托胸罩/束縛帶、脹痛時<b>冷敷</b>(<u>勿熱敷、勿排空</u>,會刺激泌乳)。</p><p><b>乳房腫瘤</b>:<b>纖維腺瘤</b>=最常見乳房良性腫瘤,年輕女性、界限清楚可移動<u>無痛</u>。<b>乳癌危險因子</b>:長期用雌激素/黃體素、未懷孕未哺乳;<u>母乳親餵為保護因子</u>。</p>"},"5子宮復舊與惡露":{"html":"<p><b>子宮復舊(involution)</b>:屬<b>退行性變化</b>(肌細胞自體溶解、體積縮小)。子宮底:產後立即臍下→12小時臍平或稍高→每天降約1指→<b>產後10–14天降入骨盆腔(腹部摸不到)</b>。子宮頸約產後7天幾乎閉合變厚、外口變橫裂狀。哺乳(催產素)促復舊。</p><p><b>子宮復舊不全(subinvolution)</b>:產後18天仍可觸摸到子宮底、惡露倒退回紅或量增;主因<b>胎盤碎片/胎膜殘留</b>、感染。</p><p><b>惡露(lochia)</b>:紅惡露(1–3天,鮮紅、少量小血塊、血腥味)→漿液性(粉紅褐,4–10天)→白惡露(白/淡黃,10天後至2–4週)。陰道產量比剖腹產多、經產婦比初產婦多;活動/哺乳時量暫增屬正常;<u>惡臭、大量血塊、倒退回紅</u>為異常。</p><p><b>膀胱脹尿</b>:子宮底<b>偏高且偏右、偏軟</b>→優先評估解尿、協助排空膀胱(脹尿阻礙收縮致出血)。子宮底評估前先排空膀胱、平躺屈膝、雙手(一手支托恥骨上)。</p>"},"6產後會陰傷口與產後運動":{"html":"<p><b>會陰傷口</b>:評估採<b>側臥(辛式臥位)</b>暴露清楚;以<b>REEDA</b>評估(Redness發紅/Edema水腫/Ecchymosis瘀斑/Discharge分泌物/Approximation對合);<b>24小時內冰敷止血消腫、24小時後溫水坐浴(每天2–4次、每次20分、38–41°C)</b>;高纖維+多水分防便秘。</p><p><b>產後運動(漸進原則)</b>:產後第1天起頸部/胸(乳)部/腳踝運動→骨盆搖擺、臀部運動→腹部收縮、抬腿→約2週後仰臥起坐、子宮復位後膝胸臥式。</p><p><b>各運動目的</b>:<b>凱格爾(Kegel)</b>=增強骨盆底肌、防壓力性尿失禁(產後第1天即可、任何姿勢);<b>骨盆搖擺</b>=增強腰背肌、緩解腰痠;<b>膝胸臥式</b>=促子宮回復正常位置;<b>胸(乳)部運動</b>=防乳房鬆弛。<u>會陰四度裂傷者早期避免膝胸臥/抬腿/仰臥起坐</u>(牽扯傷口),可做乳部運動。產後運動<u>無法</u>使妊娠紋消失。</p>"},"7產後心理適應與依附關係":{"html":"<p><b>魯賓(Rubin)母性角色三期</b>:<b>接受期(Taking-in,產後1–2天)</b>=依賴被動、注意力在自己、<u>反覆談論生產經驗</u>,需休息與被照顧;<b>緊執期(Taking-hold,產後3–10天)</b>=<u>介於依賴與獨立間、主動學習照顧新生兒與恢復身體功能</u>,需衛教鼓勵;<b>放手期(Letting-go)</b>=接受孩子為獨立個體、重設為人母與家庭角色。</p><p><b>產後情緒障礙鑑別</b>:<b>產後低潮(blues)</b>=產後3–5天、輕微短暫、<u>約兩週內自行復原</u>、不影響功能;<b>產後憂鬱症(depression)</b>=產後數週至1年、<u>持續≥2週</u>、無價值/罪惡感、失去興趣、<b>可能有自殺念頭</b>、影響功能、需治療(危險因子:初產婦、支持不足、憂鬱史;與荷爾蒙<b>驟降</b>有關,非上升);<b>產後精神病</b>=產後2–4週、<b>幻覺妄想、可能傷害自己或嬰兒</b>。</p><p><b>依附(attachment/bonding)</b>:正向=眼對眼、摟抱貼近身體、說話安撫、稱呼名字、<b>認同行為(指出寶寶像誰)</b>、提出所有權(「我的寶寶」),靠<u>直接</u>感官知覺建立;警訊=抱姿疏離不貼身、迴避照護全交他人。鼓勵父親與手足參與。</p>"},"8產褥期生理感染與血栓":{"html":"<p><b>產褥期(puerperium)</b>:產後至生理恢復孕前約6週,分<b>退行性變化</b>(子宮復舊、惡露、裂傷修復)與<b>進行性變化</b>(乳房泌乳、母性角色)。<b>BUBBLE-HE</b>產後評估:Breast/Uterus/Bladder/Bowel/Lochia/Episiotomy/Homan/Emotion。</p><p><b>產後痛(afterpains)</b>:<b>子宮間歇性收縮</b>所致,<u>哺乳時催產素使子宮收縮而加重</u>;<b>經產婦/多胎/巨嬰</b>較明顯;多2–3天緩解(深呼吸、熱敷、餵前止痛)。</p><p><b>產後排尿</b>:膀胱對脹滿敏感度下降→尿瀦留→主動評估膀胱、協助排尿(脹尿推高子宮致出血)。</p><p><b>血栓性靜脈炎</b>:產後<b>高凝狀態(凝血因子血小板增加、纖溶被抑制)</b>+血液鬱滯+血管受損(Virchow三要素)。<b>霍曼氏徵象</b>:支托膝膕、足<u>背屈</u>、腓腸肌疼痛為陽性(疑DVT)。預防靠<b>早期下床活動</b>(血栓病史者更應);DVT患肢<u>勿按摩熱敷</u>(防脫落致<b>肺栓塞</b>:呼吸困難胸痛發紺)。</p><p><b>產褥感染</b>:產後24小時後、連續2天≥38°C;最常見<b>生殖道(子宮內膜炎)</b>、致病菌為陰道常在菌(B群鏈球菌);破水久者風險高;惡露惡臭+子宮軟壓痛=子宮內膜炎。產後出血(子宮收縮乏力)→<u>持續按摩子宮、給子宮收縮劑</u>。</p>"},"9哺乳避孕坐月子飲食與特殊照護":{"html":"<p><b>泌乳期無月經避孕法(LAM)</b>三條件須<b>同時</b>滿足:<b>純母乳哺餵(不分日夜頻繁,每日8–10次以上)、月經未恢復、嬰兒未滿6個月</b>,避孕效果約98%。機轉:吸吮→泌乳素↑→抑制GnRH/FSH/LH→延後排卵。<u>月經未來不代表無排卵</u>(排卵可能先於月經)。</p><p><b>哺乳期避孕</b>:非荷爾蒙(保險套/IUD/結紮)安全;<b>含雌激素避孕藥會減少奶量、不宜</b>;可用<b>單一黃體素(progestin-only)</b>避孕藥。</p><p><b>哺乳好處(母親)</b>:降低<b>停經前乳癌與卵巢癌</b>機率、促子宮復舊(催產素)、體重較易回復、延後月經;<u>不會</u>致骨質疏鬆。</p><p><b>產後性生活</b>:惡露乾淨、傷口癒合後(約2–3週起)並避孕;哺乳期雌激素低致陰道乾燥→用<b>水溶性</b>潤滑劑。</p><p><b>文化照護(坐月子)</b>:<b>不批判</b>態度尊重習俗(生化湯、麻油雞),與產婦討論其想法、提供正確衛教(酒精影響傷口癒合與乳汁)。</p><p><b>特殊照護</b>:<b>麥角鹼(Methergine)禁忌</b>=高血壓/子癇前症、心臟病(升血壓);<b>心臟病孕婦</b>產後48小時靜脈回流增加、最易心衰需密切監測,採半坐臥;<b>淋病</b>產婦→子宮頸口分泌物培養、暫停性行為、新生兒眼炎用紅黴素眼膏。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_o6_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
