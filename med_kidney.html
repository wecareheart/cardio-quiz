者錯誤？","options":{"A":"類固醇（corticosteroid）：骨質疏鬆","B":"環孢靈（cyclosporine）：低尿酸血症","C":"普樂可復（tacrolimus）：移植後糖尿病","D":"斥消靈（sirolimus）：蛋白尿"},"answer":"B","corrected":false,"correction_note":"","images":[],"id":"113070-30","topic":"透析與腎移植","accepted_answers":["B"],"answer_status":"正常","q_num":30,"src":"民國113年第二次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":2,"stem":"35 歲男性於健檢時發現血尿（hematuria）。 門診再追蹤尿液檢查發現：蛋白排泄量（protein excretion） 1500 mg/day、10～20 RBCs/HPF、dysmorphic RBC (+)、RBC cast (+)。後續安排下列評估，何者最不適當？","options":{"A":"檢測免疫血清學檢查，例如complement levels（C3, C4）、cryoglobulins、anti-GBM antibody、ANCA、 ASLO、VDRL、HIV","B":"測B 型肝炎（hepatitis B）、C 型肝炎（hepatitis C）病毒血清學檢查","C":"靜脈腎盂造影（intravenous pyelography）或逆行性腎盂攝影（retrograde pyelography）","D":"腎臟超音波（renal ultrasonography），必要時考慮腎臟切片（renal biopsy）檢查"},"answer":"C","corrected":false,"correction_note":"","images":[],"id":"114020-02","topic":"腎絲球疾病(腎炎/腎病症候群)","accepted_answers":["C"],"answer_status":"正常","q_num":2,"src":"民國114年第一次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":24,"stem":"56 歲女性，末期腎病病人，接受連續性可攜式腹膜透析（CAPD）治療2 年，最近3 個月開始有下肢水腫、體 液堆積的現象。此病人接受腹膜平衡測驗（peritoneal equilibrium test）結果顯示其腹膜為高腹膜通透性 （high transporter） ，為解決其體液過多（fluid overload）現象，下列何種處置最不適當？","options":{"A":"增加透析藥水葡萄糖濃度","B":"採用不易吸收碳水化合物（icodextrin）透析藥水","C":"延長透析藥水的留滯時間","D":"改使用連續性循環式腹膜透析（CCPD）"},"answer":"C","corrected":false,"correction_note":"","images":[],"id":"114020-24","topic":"透析與腎移植","accepted_answers":["C"],"answer_status":"正常","q_num":24,"src":"民國114年第一次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":25,"stem":"49 歲男性腎移植病人，移植3 年後近期改變免疫抑制劑的處方，3 週後發生口腔潰爛、下肢水腫、尿中蛋白 ＞300 mg/dL（試紙），血中LDL 168 mg/dL，下列何種藥物最可能造成上述表現？","options":{"A":"cyclosporine","B":"tacrolimus","C":"mycophenolate mofetil","D":"sirolimus"},"answer":"D","corrected":false,"correction_note":"","images":[],"id":"114020-25","topic":"透析與腎移植","accepted_answers":["D"],"answer_status":"正常","q_num":25,"src":"民國114年第一次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":26,"stem":"有關Fabry disease 的敘述，何者錯誤？","options":{"A":"為一種罕見之遺傳性疾病，各人種都有。此病是因負責製造α-galactosidase A 酵素的基因缺陷引起","B":"屬性聯遺傳疾病，父親帶有此基因缺陷時，其所生的子女，女兒有一半的機會帶因，而兒子會發病","C":"臨床診斷要以家族病史、四肢疼痛、皮膚病變、特有的渦狀角膜濁斑，以及在尿道沉渣或組織檢體中發現充 滿脂質的細胞為基礎。再以白血球中α-galactosidase A 酵素的活性作最後確診。進一步也可做基因突變 的分析","D":"目前治療可分為症狀治療及酵素替代療法（enzyme replacement therapy）。神經痛可透過藥物來緩解，心 臟及腦血管併發症仍依一般治療原則，腎衰竭則需要透析治療"},"answer":"B","corrected":false,"correction_note":"","images":[],"id":"114020-26","topic":"囊性/遺傳性腎病","accepted_answers":["B"],"answer_status":"正常","q_num":26,"src":"民國114年第一次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":27,"stem":"有關血栓性微血管病（thrombotic microangiopathy, TMA），下列何者錯誤？","options":{"A":"診斷TMA，必須血小板低下加上microangiopathic hemolytic anemia（MAHA）兩個條件同時成立，而MAHA 就是檢驗數據上看到 LDH 上升、haptoglobin 下降，以及血液抹片上有schistocyte","B":"TMA 的臨床表現包括神經學症狀、腎臟侵犯及腸胃道症狀","C":"診斷TMA 後，如果ADAMTS13 酵素的活性＞15%，則可以診斷栓塞性血小板低下紫斑（TTP）","D":"栓塞性血小板低下紫斑（TTP）可使用plasma exchange 加上corticosteroid 治療"},"answer":"C","corrected":false,"correction_note":"","images":[],"id":"114020-27","topic":"腎絲球疾病(腎炎/腎病症候群)","accepted_answers":["C"],"answer_status":"正常","q_num":27,"src":"民國114年第一次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":28,"stem":"有關腎絲球過濾率（glomerular filtration rate）自我調節（autoregulation）的三個調控因素中，下列 敘述何者正確？","options":{"A":"作用於出球小動脈（efferent arteriole）的自主性肌源反射（autonomous myogenic reflex）","B":"腎小管–腎絲球回饋機轉（tubuloglomerular feedback）","C":"血管收縮素II（angiotensin II）作用於入球小動脈（afferent arteriole）的血管收縮","D":"前列腺素E1（prostaglandin E1）作用於出球小動脈（efferent arteriole）的血管擴張"},"answer":"B","corrected":false,"correction_note":"","images":[],"id":"114020-28","topic":"腎臟生理/藥理/腎毒性","accepted_answers":["B"],"answer_status":"正常","q_num":28,"src":"民國114年第一次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":29,"stem":"下列有關慢性腎臟病的敘述，何者最不適當？","options":{"A":"高血壓乃目前臺灣新發生長期透析（incident dialysis）病患最主要之原發病因","B":"慢性腎臟病患合併糖尿病，其血壓值應控制在130/80 mmHg 以下","C":"心血管疾病為最常造成慢性腎臟病患死亡的原因","D":"低蛋白飲食可以改善尿毒症狀，但可能會增加營養不良的風險"},"answer":"A","corrected":false,"correction_note":"","images":[],"id":"114020-29","topic":"慢性腎臟病/尿毒症","accepted_answers":["A"],"answer_status":"正常","q_num":29,"src":"民國114年第一次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":40,"stem":"關於腎細胞癌（renal cell carcinoma）的敘述，下列何者錯誤？","options":{"A":"腎細胞癌最常見的組織型是乳突（papillary tumor）型","B":"腎細胞癌合併高鈣血症，可能是骨骼轉移或是paraneoplastic 症候群","C":"對於第一期、第二期病人的標準治療是根除性（radical）或局部（partial）腎切除術（nephrectomy）","D":"對於第一期、第二期病人如果腎功能不佳或只有一顆腎臟，根據腎細胞癌的大小、位置，可以考慮腎元保留 （nephron-sparing）手術"},"answer":"A","corrected":false,"correction_note":"","images":[],"id":"114020-40","topic":"腎細胞癌/腫瘤","accepted_answers":["A"],"answer_status":"正常","q_num":40,"src":"民國114年第一次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":72,"stem":"陳醫師參與社區醫療群，執行全民健康保險初期慢性腎臟病醫療方案，有一個案58 歲古先生糖尿病病史12 年，常主訴肩頸痠痛，腎絲球過濾率（estimated glomerular filtration rate, eGFR）56 mL/min/1.73 2，白蛋白尿（urine albumin/creatinine ratio, UACR）380 mg/g，有關慢性腎臟病，下列敘述何者錯 m 誤？ 2且UACR 28 mg/g 的病人","options":{"A":"演進成為末期腎臟病的風險高於eGFR 40 mL/min/1.73 m","B":"屬於慢性腎臟病stage 3a","C":"長期服用非類固醇止痛消炎藥（nonsteroid anti-inflammatory drugs, NSAIDs）會惡化慢性腎臟病","D":"不應繼續使用metformin"},"answer":"D","corrected":false,"correction_note":"","images":[],"id":"114020-72","topic":"慢性腎臟病/尿毒症","accepted_answers":["D"],"answer_status":"正常","q_num":72,"src":"民國114年第一次"},{"exam_code":"114020","roc_year":114,"ad_year":2025,"exam_round":"第一次","num":74,"stem":"65 歲男性病人，主訴腎功能不良，常規腹部Ｘ光片（KUB）顯示如附圖。下列何者為最可能的診斷？","options":{"A":"腎水腫（renal hydronephrosis）","B":"腎膿瘍（renal abscess）","C":"晚期腎結核（renal tuberculosis, late stage）","D":"腎細胞癌（renal cell carcinoma）"},"answer":"C","corrected":false,"correction_note":"","id":"114020-74","topic":"感染/結石/阻塞","accepted_answers":["C"],"answer_status":"正常","img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRIN :"腎細胞癌/腫瘤","accepted_answers":["C"],"answer_status":"正常","q_num":67,"src":"民國114年第二次"},{"exam_code":"114070","roc_year":114,"ad_year":2025,"exam_round":"第二次","num":70,"stem":"依Weigert-Meyer rule，在單側雙套輸尿管（duplicated ureter）的病人，下列敘述何者正確？","options":{"A":"引流上端腎臟的輸尿管，其開口位於膀胱上端及外側","B":"引流上端腎臟的輸尿管，其開口位於膀胱下端及內側","C":"只有引流下端腎臟的輸尿管較易發生逆流","D":"單側三套輸尿管所有分型亦適用Weigert-Meyer rule"},"answer":"B","corrected":false,"correction_note":"","images":[],"id":"114070-70","topic":"囊性/遺傳性腎病","accepted_answers":["B"],"answer_status":"正常","q_num":70,"src":"民國114年第二次"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":7,"stem":"有關高血壓（hypertension）所造成的器官損傷，下列敘述何者錯誤？","options":{"A":"高血壓可以導致左心室肥大、心衰竭和心律失常，包括心房顫動（atrial fibrillation）","B":"高血壓是引發腦中風（stroke）的最強危險因子，大部分都是腦出血，其餘是腦梗塞","C":"高血壓與老年人口的認知功能障礙及失智症有關","D":"高血壓造成的腎臟損傷，與收縮壓的關係比舒張壓更密切"},"answer":"B","corrected":false,"correction_note":"","images":[],"id":"115020-07","topic":"高血壓/腎血管疾病","accepted_answers":["B"],"answer_status":"正常","q_num":7,"src":"民國115年第一次"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":12,"stem":"下列血液檢查項目中，何者與高血壓致病機轉的探索最無相關？","options":{"A":"肌酸酐","B":"鉀離子","C":"甲狀腺素","D":"尿酸"},"answer":"D","corrected":false,"correction_note":"","images":[],"id":"115020-12","topic":"高血壓/腎血管疾病","accepted_answers":["D"],"answer_status":"正常","q_num":12,"src":"民國115年第一次"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":18,"stem":"關於肝腎症候群（hepatorenal syndrome, HRS）的敘述，下列何者正確？","options":{"A":"HRS 是一種結構性腎臟損傷，腎臟切片可明顯發現病理改變","B":"HRS 的主要病理機轉為腎血管擴張導致腎血流增加","C":"HRS 治療首選為利尿劑及血管擴張劑合併使用","D":"肝移植是HRS 最有效的治療，且可恢復腎功能"},"answer":"D","corrected":false,"correction_note":"","images":[],"id":"115020-18","topic":"急性腎損傷(AKI)","accepted_answers":["D"],"answer_status":"正常","q_num":18,"src":"民國115年第一次"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":24,"stem":"下列何者是慢性腎臟疾病最不常見之障礙？","options":{"A":"高血鈉","B":"高血磷","C":"次發性副甲狀腺機能亢進","D":"貧血"},"answer":"A","corrected":false,"correction_note":"","images":[],"id":"115020-24","topic":"慢性腎臟病/尿毒症","accepted_answers":["A"],"answer_status":"正常","q_num":24,"src":"民國115年第一次"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":25,"stem":"下列何種感染，最容易發生在腎臟移植手術後的1 個月內？","options":{"A":"口腔念珠菌感染","B":"巨細胞病毒感染","C":"肺囊蟲肺炎","D":"人類多瘤性病毒（BK 病毒）感染"},"answer":"A","corrected":false,"correction_note":"","images":[],"id":"115020-25","topic":"透析與腎移植","accepted_answers":["A"],"answer_status":"正常","q_num":25,"src":"民國115年第一次"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":26,"stem":"關於感染後腎絲球腎炎（post-infectious glomerulonephritis）的臨床表現，下列敘述何者最適當？","options":{"A":"常出現肉眼可視血尿，唯少見血塊","B":"典型發生於葡萄球菌型咽喉炎或皮膚感染後10 天至3 週","C":"治療首重抗生素，以期逆轉或縮短急性腎炎病程","D":"通常伴隨C3 補體下降，可用於區分IgA 腎病變急性發作"},"answer":"D","corrected":false,"correction_note":"","images":[],"id":"115020-26","topic":"腎絲球疾病(腎炎/腎病症候群)","accepted_answers":["D"],"answer_status":"正常","q_num":26,"src":"民國115年第一次"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":29,"stem":"有關慢性腎臟病所併發之腎性貧血（renal anemia），下列何者錯誤？","options":{"A":"腎性貧血之紅血球型態常為正常血球大小（normocytic）與正常色素性（normochromic）","B":"腎性貧血常出現虛弱、運動耐受力不良（exercise intolerance）、心衰竭與認知功能異常等症狀","C":"造成腎性貧血最主要的原因為紅血球生成素（erythropoietin）不足","D":"為改善腎性貧血病患之死亡率，應將病患之血色素值矯正至正常人標準值（≧13 g/dL）"},"answer":"D","corrected":false,"correction_note":"","images":[],"id":"115020-29","topic":"慢性腎臟病/尿毒症","accepted_answers":["D"],"answer_status":"正常","q_num":29,"src":"民國115年第一次"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":30,"stem":"有關慢性腎臟病的治療，下列何者最適當？","options":{"A":"慢性腎臟病患者合併高血壓，其降血壓藥物首選為乙型腎上腺交感神經阻斷劑（beta blocker）","B":"糖尿病慢性腎臟病患者使用第2 型鈉–葡萄糖共同轉運蛋白抑制劑（SGLT2 inhibitor）可有效降低腎功能 衰退","C":"患有重度蛋白尿之糖尿病慢性腎臟病患者，最好合併使用血管張力素轉化酶抑制劑（ACEi）和血管張力素Ⅱ 型受體拮抗劑（ARB）來治療","D":"患有腎病症候群之慢性腎臟病患者，應採用高蛋白飲食療法以矯正低蛋白血症"},"answer":"B","corrected":false,"correction_note":"","images":[],"id":"115020-30","topic":"慢性腎臟病/尿毒症","accepted_answers":["B"],"answer_status":"正常","q_num":30,"src":"民國115年第一次"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":37,"stem":"一名骨肉瘤的年輕病人，手術後進行高劑量methotrexate 的輔助性化療，3 天後出現黏膜炎、輕度骨髓抑制 7 M）且腎功能惡化，尿液偏酸性。除持續監測血中methotrexate 濃 及血中methotrexate 濃度偏高（＞10⁻ 度外，下列處置何者最適合？","options":{"A":"立即停用leucovorin（N5-formyltetrahydrofolate），減少進一步干擾治療效果","B":"改為投與folic acid 取代leucovorin 2","C":"增加leucovorin 劑量至50～100 mg/m","D":"使用L-glutamine 以改善腎功能"},"answer":"C","corrected":false,"correction_note":"","images":[],"id":"115020-37","topic":"急性腎損傷(AKI)","accepted_answers":["C"],"answer_status":"正常","q_num":37,"src":"民國115年第一次"}],E={"101030-04":{"quick":"正解(A)：糖尿病合併蛋白尿/CKD之血壓目標為<130/80 mmHg。","detail":{"background":"糖尿病＋CKD(Cr 1.6)病人血壓目標：出題年(民國101=2012)依KDOQI/JNC7，糖尿病或蛋白尿性CKD目標<130/80 mmHg(近年KDIGO 2021甚至建議收縮壓<120)，以延緩腎病變與心血管風險。","options":{"A":"對：<130/80為糖尿病/蛋白尿CKD目標。","B":"150-160過高。","C":"<140/90為一般族群目標。","D":"<140/85非標準目標。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血壓/糖尿病腎病變）","Brenner & Rector’s The Kidney, 11e（CKD血壓目標）","KDOQI/JNC7；KDIGO 2021血壓指引"]}},"101030-19":{"quick":"正解(C)：Kayexalate治高血鉀，不能減緩慢性腎衰竭進展。","detail":{"background":"延緩CKD進展實證：ACEi/ARB控壓抗蛋白尿、嚴格控糖(HbA1c<7%)、低蛋白飲食。Kayexalate(sodium polystyrene sulfonate)為降血鉀樹脂，與延緩腎功能惡化無關。","options":{"A":"ACEi/ARB可延緩，有效。","B":"嚴格控糖可延緩，有效。","C":"對(即答案)：Kayexalate無延緩CKD效果。","D":"低蛋白飲食可延緩。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD進展防治）","Brenner & Rector’s The Kidney, 11e（CKD progression）"]}},"101030-21":{"quick":"正解(A為錯)：成人多囊腎(ADPKD)為「體染色體顯性」遺傳，非性聯遺傳。","detail":{"background":"成人型多囊腎(ADPKD)：體染色體「顯性」(autosomal dominant)，非性聯；常伴高血壓；約1/10合併顱內動脈瘤/蜘蛛膜下腔出血；囊腫亦見於肝、脾、胰等器官。","options":{"A":"錯誤(即答案)：為體染色體顯性，非性聯。","B":"常伴高血壓，正確。","C":"約1/10蜘蛛膜下腔出血，正確。","D":"肝脾胰等器官囊腫，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD）","Brenner & Rector’s The Kidney, 11e（autosomal dominant PKD）"]}},"101030-23":{"quick":"正解(D)：代謝性鹼中毒造成「低」血鉀(鉀移入細胞)，非高血鉀。","detail":{"background":"高血鉀成因：急/慢性腎衰竭(排鉀減少)、橫紋肌溶解(細胞釋鉀)、酸中毒(鉀移出)。代謝性「鹼中毒」使鉀移入細胞→低血鉀，故非高血鉀原因。","options":{"A":"急性腎衰竭→高鉀。","B":"慢性腎衰竭→高鉀。","C":"橫紋肌溶解→高鉀。","D":"對(即答案)：代謝性鹼中毒→低血鉀。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鉀代謝）","Brenner & Rector’s The Kidney, 11e（hyperkalemia）"]}},"101030-24":{"quick":"正解(C)：糖尿病腎病變首選ARB(RAAS阻斷)延緩腎衰竭。","detail":{"background":"糖尿病腎病變延緩腎衰竭最佳降壓藥為RAAS阻斷劑(ACEi/ARB)，可降低腎絲球內壓、抗蛋白尿(RENAAL/IDNT試驗證實ARB腎保護)。","options":{"A":"利尿劑無特別腎保護。","B":"α阻斷劑非首選。","C":"對：ARB腎保護首選。","D":"CCB抗蛋白尿不如RAAS。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變）","Brenner & Rector’s The Kidney, 11e（RAAS blockade）","RENAAL/IDNT"]}},"101030-29":{"quick":"正解(B)：anti-dsDNA與狼瘡腎炎最相關。","detail":{"background":"狼瘡腎炎活性與anti-dsDNA抗體及補體下降相關。anti-RNP(混合結締組織病)、anti-SS-A/Ro(乾燥症/新生兒狼瘡)、anti-ribosomal P(狼瘡精神症狀)。","options":{"A":"anti-RNP→MCTD。","B":"對：anti-dsDNA與狼瘡腎炎相關。","C":"anti-Ro→乾燥症。","D":"anti-ribosomal P→神經精神狼瘡。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎/自體抗體）","Brenner & Rector’s The Kidney, 11e（lupus nephritis）"]}},"101030-36":{"quick":"正解(B)：腎病症候群(微小變化)與何杰金氏淋巴瘤最相關。","detail":{"background":"副腫瘤性腎病症候群：微小變化腎病與何杰金氏淋巴瘤相關；膜性腎病則與實體癌(肺、大腸、乳)相關。本題問與腎病症候群「最」相關之癌→何杰金氏淋巴瘤(經典配對)。","options":{"A":"腎細胞癌非典型。","B":"對：何杰金氏淋巴瘤(微小變化)。","C":"大腸癌與膜性相關但非最經典。","D":"肺癌與膜性相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（副腫瘤腎病症候群）","Brenner & Rector’s The Kidney, 11e（paraneoplastic glomerular disease）"]}},"101030-48":{"quick":"正解(D)：肥胖症非顯影劑急性腎衰竭之危險因子。","detail":{"background":"顯影劑腎病變危險因子：既有CKD(尤其糖尿病腎病變)、脫水/有效容積不足、高劑量顯影劑、心衰竭、高齡。肥胖本身非獨立危險因子。","options":{"A":"脫水為危險因子。","B":"糖尿病腎病變為危險因子。","C":"高劑量顯影劑為危險因子。","D":"對(即答案)：肥胖非危險因子。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（顯影劑腎病變）","Brenner & Rector’s The Kidney, 11e（contrast nephropathy）"]}},"102030-05":{"quick":"正解(C)：DDAVP後尿滲透壓上升(60→500)→中樞性尿崩症。","detail":{"background":"多尿、高血鈉(158)、尿滲透壓極低(60)→尿崩症。給DDAVP後尿滲透壓「上升」至500(>50%反應)→中樞性尿崩(ADH不足)；腎因性尿崩對DDAVP無反應；原發性多喝水血鈉應低；滲透性利尿尿滲透壓不會這麼低。","options":{"A":"原發性多喝水血鈉偏低。","B":"腎因性對DDAVP無反應。","C":"對：中樞性尿崩(DDAVP有反應)。","D":"滲透性利尿尿中有大量溶質。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿崩症鑑別/DDAVP試驗）","Brenner & Rector’s The Kidney, 11e（diabetes insipidus）"]}},"102030-26":{"quick":"正解(C較不適當)：Cr 9.5、高血鉀之末期腎病，用ARB較不適當(無法延緩且增高鉀)。","detail":{"background":"十年腎病症候群進展至末期(Cr 9.5、K 5.8、Ca低P高)。此階段：EPO矯正貧血(A)、CaCO3控磷並處理次發性副甲狀腺亢進(B)、考慮開始透析(D)皆適當。在已末期且高血鉀時再給ARB(C)無法延緩腎衰竭且加重高血鉀，較不適當。","options":{"A":"EPO矯正腎性貧血，適當。","B":"CaCO3控磷，適當。","C":"對(即答案)：末期高鉀用ARB較不適當。","D":"考慮透析，適當。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（末期腎病處置）","Brenner & Rector’s The Kidney, 11e（advanced CKD management）"]}},"102030-27":{"quick":"正解(D)：EPO反應不佳最不需考慮「缺鈣」。","detail":{"background":"EPO反應不佳(EPO resistance)常見原因：缺鐵(最常見)、慢性失血(腸胃道出血)、透析不足、發炎/感染、次發性副甲狀腺亢進、鋁中毒。缺鈣與EPO反應不佳無關，最不需考慮。","options":{"A":"腸胃道出血→失血，需考慮。","B":"透析不良，需考慮。","C":"缺鐵，最常見需考慮。","D":"對(即答案)：缺鈣與EPO反應無關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（EPO反應不佳）","Brenner & Rector’s The Kidney, 11e（ESA hyporesponsiveness）"]}},"102030-30":{"quick":"正解(C)：thiazide利尿劑造成「高」血鈣，較不會導致低血鈣。","detail":{"background":"低血鈣成因：低血鎂(抑PTH)、副甲狀腺低下、慢性腎衰竭(低活性維生素D、高磷)。thiazide減少尿鈣排泄→「高」血鈣，故較不會導致低血鈣。","options":{"A":"低血鎂→低血鈣。","B":"副甲狀腺低下→低血鈣。","C":"對(即答案)：thiazide致高血鈣。","D":"慢性腎衰竭→低血鈣。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鈣代謝）","Brenner & Rector’s The Kidney, 11e（hypocalcemia）"]}},"102030-31":{"quick":"正解(C)：鏈球菌感染後最易造成急性腎絲球腎炎。","detail":{"background":"感染後急性腎絲球腎炎以「A群β溶血性鏈球菌」(咽炎/膿皮症後1–3週)最典型，補體C3下降。","options":{"A":"大腸桿菌非典型。","B":"葡萄球菌可致感染相關GN但非最典型。","C":"對：鏈球菌(post-strep GN)。","D":"綠膿桿菌非典型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（感染後腎絲球腎炎）","Brenner & Rector’s The Kidney, 11e（post-streptococcal GN）"]}},"102030-75":{"quick":"正解(C)：脊柱裂神經性膀胱、留置導尿、反覆發燒肋脊角痛血尿→急性腎盂腎炎。","detail":{"background":"脊柱裂之神經性膀胱＋長期留置導尿→反覆複雜性泌尿道感染。發燒40℃、兩側肋脊角敲痛、血尿→急性腎盂腎炎(上泌尿道感染)。","options":{"A":"出血性膀胱炎無肋脊角敲痛/高燒。","B":"急性腎絲球腎炎無發燒肋脊角痛。","C":"對：急性腎盂腎炎。","D":"IgA腎病為血尿、無發燒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（複雜性泌尿道感染/腎盂腎炎）","Brenner & Rector’s The Kidney, 11e（pyelonephritis）"]}},"102110-10":{"quick":"正解(D)：糖尿病＋蛋白尿＋高血壓首選ACEI。","detail":{"background":"糖尿病合併蛋白尿與高血壓：首選ACEI(或ARB)，可降腎絲球內壓、抗蛋白尿、延緩腎病變。","options":{"A":"β阻斷劑非首選。","B":"α阻斷劑非首選。","C":"利尿劑非首選(可輔助)。","D":"對：ACEI首選。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變）","Brenner & Rector’s The Kidney, 11e（RAAS blockade）"]}},"102110-25":{"quick":"正解(D=①④)：thiazide與amiloride用於腎因性尿崩之多尿。","detail":{"background":"先天性腎因性尿崩(集尿管對ADH無反應)：thiazide(造成輕度容積收縮、增近端鈉水再吸收、減少到達遠端的水)＋amiloride(尤其鋰引起者)可減少尿量；NSAID亦輔助。loop與acetazolamide不適用。","options":{"A":"含②loop不適用。","B":"含②③不適用。","C":"含②不適用。","D":"對：①thiazide+④amiloride。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎因性尿崩治療）","Brenner & Rector’s The Kidney, 11e（nephrogenic DI）"]}},"102110-26":{"quick":"正解(C)：高anion-gap代謝性酸中毒(AG≈23)→第一型糖尿病DKA(胰島素減量)。","detail":{"background":"pH 7.32、HCO₃⁻ 18、AG=138−97−18=23(高AG)→高AG代謝性酸中毒。第一型糖尿病血糖控制不佳、胰島素減量→糖尿病酮酸中毒(DKA)即高AG酸中毒。Mg sulfate腹瀉(非AG)、Sjögren遠端RTA(非AG)、膽道引流(非AG)皆為正常AG。","options":{"A":"腹瀉→非AG酸中毒。","B":"Sjögren遠端RTA→非AG。","C":"對：DKA→高AG酸中毒。","D":"膽汁引流→非AG酸中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高AG酸中毒/DKA）","Brenner & Rector’s The Kidney, 11e（anion gap acidosis）"]}},"102110-30":{"quick":"正解(A非適應症)：單純BUN 120、Cr 2.5(無症狀)非緊急透析適應症。","detail":{"background":"緊急透析適應症(AEIOU)：難治酸中毒、難治高血鉀(>7且Kayexalate無效)、容積過多/肺水腫、尿毒症狀(心包膜積水/腦病變)、毒物。單純BUN/Cr數值(無尿毒症狀)非緊急透析適應症。","options":{"A":"對(即答案)：單純BUN/Cr非緊急適應症。","B":"難治高血鉀→緊急透析。","C":"心包膜積水(尿毒)→緊急透析。","D":"肺水腫→緊急透析。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析適應症）","Brenner & Rector’s The Kidney, 11e（indications for dialysis）"]}},"102110-35":{"quick":"正解(A)：嚴重第四型狼瘡腎炎誘導以cyclophosphamide或mycophenolate mofetil。","detail":{"background":"重度增生型(第IV型)狼瘡腎炎誘導治療：高劑量類固醇＋cyclophosphamide或mycophenolate mofetil(MMF)(ALMS/Euro-Lupus試驗)。","options":{"A":"對：cyclophosphamide或MMF。","B":"cyclosporine非首選誘導。","C":"azathioprine/MTX非誘導首選。","D":"azathioprine為維持期。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎誘導）","Brenner & Rector’s The Kidney, 11e（lupus nephritis induction）","ACR；ALMS/Euro-Lupus"]}},"102110-52":{"quick":"正解(D)：尿酸結晶於腎小管/集尿管沉澱致阻塞→急性尿酸腎病變。","detail":{"background":"急性尿酸腎病變(uric acid nephropathy)：大量尿酸結晶於腎小管與集尿管沉澱、造成腎內阻塞(如腫瘤溶解症候群)。慢性「尿酸鹽腎病變(urate nephropathy)」則為間質尿酸鈉結晶沉積。痛風為關節炎、腎結石為集尿系統結石，皆不同。","options":{"A":"痛風為關節炎。","B":"腎結石在集尿系統。","C":"urate nephropathy為慢性間質沉積。","D":"對：急性尿酸腎病變(小管阻塞)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿酸腎病變/腫瘤溶解）","Brenner & Rector’s The Kidney, 11e（acute uric acid nephropathy）"]}},"103030-06":{"quick":"正解(A為錯)：此為ADPKD屬「體染色體顯性」，非自體隱性。","detail":{"background":"兩腎各15公分、多發大小不一囊泡、家族史→成人多囊腎(ADPKD)，體染色體「顯性」遺傳(A錯)。易腎結石；約1/10合併顱內動脈瘤(無症狀且無家族出血史者不需常規篩檢)；囊泡感染可用脂溶性ciprofloxacin。","options":{"A":"錯誤(即答案)：ADPKD為顯性非隱性。","B":"易腎結石，正確。","C":"顱內動脈瘤不需全篩，正確。","D":"ciprofloxacin治囊泡感染，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD）","Brenner & Rector’s The Kidney, 11e（autosomal dominant PKD）"]}},"103030-10":{"quick":"正解(D)：多發性骨髓瘤的溶骨病灶以「X光骨骼攝影」最方便有效(骨掃描會漏判)。","detail":{"background":"背痛、L2–L4壓迫性骨折、低IgG/IgA/IgM、骨髓漿細胞15%、Cr升高→多發性骨髓瘤(骨髓瘤腎)。骨髓瘤為「溶骨性」病灶、無成骨反應，故核醫骨掃描常「漏判」；評估全身骨骼破壞以plain film(骨骼攝影survey)或低劑量全身CT最有效。","options":{"A":"骨掃描漏判溶骨病灶。","B":"ALP在純溶骨多正常。","C":"骨掃描+ALP仍不敏感。","D":"對：X光骨骼攝影最方便有效。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（多發性骨髓瘤/骨病灶）","Brenner & Rector’s The Kidney, 11e（myeloma kidney）","IMWG骨骼評估"]}},"103030-35":{"quick":"正解(B)：血液透析最常見之急性併發症為低血壓(透析中低血壓)。","detail":{"background":"血液透析中最常見急性併發症為「透析中低血壓」(過度超過濾、自律神經反應、滲透壓變化)。抽筋、噁心嘔吐次之。","options":{"A":"高血壓非最常見。","B":"對：透析中低血壓。","C":"抽筋次之。","D":"嘔吐次之。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析中低血壓）","Brenner & Rector’s The Kidney, 11e（intradialytic hypotension）"]}},"103030-36":{"quick":"正解(A)：腎絲球過濾液之重碳酸離子大部分在「近端腎小管」回收。","detail":{"background":"過濾的HCO₃⁻約85–90%在近端腎小管經Na⁺/H⁺交換(NHE3)與碳酸酐酶回收，其餘於亨利氏環粗段與遠端少量回收。","options":{"A":"對：近端腎小管回收大部分HCO₃⁻。","B":"粗上升支少量。","C":"遠端少量。","D":"集尿管主要排H⁺。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎臟酸鹼生理）","Brenner & Rector’s The Kidney, 11e（bicarbonate reabsorption）"]}},"103030-37":{"quick":"正解(C)：第2型糖尿病腎病變最早期為腎絲球「超過濾」(GFR>120)。","detail":{"background":"糖尿病腎病變自然病程：最早為腎絲球超過濾(hyperfiltration, GFR升高)→微量白蛋白尿(>30 mg/天)→巨量白蛋白尿與GFR下降→腎功能惡化。","options":{"A":"微量白蛋白尿為第二階段。","B":"Cr上升為較晚期。","C":"對：超過濾(GFR>120)最早。","D":"高血壓非最早表現。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變自然史）","Brenner & Rector’s The Kidney, 11e（diabetic nephropathy stages）"]}},"103030-40":{"quick":"正解(B)：醛固酮(aldosterone)由「腎上腺」皮質製造，非腎臟。","detail":{"background":"腎臟製造的荷爾蒙：腎素(renin)、紅血球生成素(EPO)、活性維生素D₃(calcitriol，1α-hydroxylase)。醛固酮由腎上腺皮質球狀帶分泌，非腎臟製造。","options":{"A":"腎素由腎臟製造。","B":"對(即答案)：醛固酮由腎上腺製造。","C":"EPO由腎臟製造。","D":"calcitriol由腎臟活化。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎臟內分泌功能）","Brenner & Rector’s The Kidney, 11e（renal hormones）"]}},"103030-46":{"quick":"正解(B)：低血鈉(108)過快校正→滲透性大腦去髓鞘症候群(ODS)。","detail":{"background":"小細胞肺癌之異位ADH(SIADH)致低血鈉(108)、血漿滲透壓低、尿濃縮。慢性低血鈉「過快」校正最擔心滲透性脫髓鞘(ODS，橋腦中央髓鞘溶解)，故24小時血鈉上升宜限制(≤8–10 mmol/L)。","options":{"A":"反彈性高血糖非主要顧慮。","B":"對：過快校正→ODS。","C":"肺水腫非主要顧慮。","D":"腦水腫為「低鈉本身」(校正過慢)風險，非過快校正。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鈉/ODS）","Brenner & Rector’s The Kidney, 11e（osmotic demyelination）"]}},"103100-06":{"quick":"正解(C為錯)：馬兜鈴酸腎病之貧血「較嚴重」(與腎衰竭程度不成比例)，非較輕微。","detail":{"background":"馬兜鈴酸(中草藥)腎病：腎功能惡化快(較膜性腎病快)、病理為腎間質纖維化但細胞浸潤少、增加泌尿上皮癌風險。貧血「相對嚴重」(與腎功能程度不成比例)，故C「貧血較輕微」為錯。","options":{"A":"惡化較膜性腎病快，正確。","B":"間質纖維化、細胞浸潤少，正確。","C":"錯誤(即答案)：貧血相對嚴重非輕微。","D":"增加泌尿上皮癌，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（馬兜鈴酸腎病）","Brenner & Rector’s The Kidney, 11e（aristolochic acid nephropathy）"]}},"103100-07":{"quick":"正解(C為錯)：口服氧化鎂(MgO)不能治高血鉀，且CKD補鎂易高血鎂。","detail":{"background":"CKD急性高血鉀(K 7.2)併EKG變化(高尖T波、QRS增寬)：應給鈣穩定心肌、胰島素/葡萄糖與β2致效劑移鉀入細胞、碳酸氫鈉(B)、陽離子交換樹脂(A)、必要時緊急透析(D)。口服氧化鎂(C)無降鉀作用且CKD易高血鎂，為錯。","options":{"A":"鉀交換樹脂，正確。","B":"碳酸氫鈉，正確。","C":"錯誤(即答案)：MgO不降鉀、CKD易高鎂。","D":"緊急透析，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血鉀急救）","Brenner & Rector’s The Kidney, 11e（hyperkalemia treatment）"]}},"103100-37":{"quick":"正解(C為錯)：KCl加入含糖溶液會刺激胰島素使鉀移入細胞，升鉀效果「較差」。","detail":{"background":"低血鉀補充：RTA引起者補potassium citrate優於KCl(兼矯正酸中毒，A對)；周邊靜脈速度≤10–20 mmol/小時(B對)；中央靜脈可較高濃度(D對)。KCl加在「葡萄糖液」會刺激胰島素→鉀移入細胞，升鉀效果不如加在生理食鹽水，故C「效果一樣」為錯。","options":{"A":"RTA用citrate較佳，正確。","B":"周邊≤20 mmol/小時，正確。","C":"錯誤(即答案)：加葡萄糖液升鉀效果較差。","D":"中央靜脈可較高濃度，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鉀補充）","Brenner & Rector’s The Kidney, 11e（potassium replacement）"]}},"103100-39":{"quick":"正解(D)：低血壓非尿路阻塞性腎病之合併問題。","detail":{"background":"尿路阻塞合併：阻塞後急性腎衰竭、解除阻塞後利尿(post-obstructive diuresis)、易合併泌尿道感染、可致高血鉀型RTA。低血壓非其典型合併問題。","options":{"A":"急性腎衰竭，是。","B":"解除阻塞後利尿，是。","C":"尿道感染，是。","D":"對(即答案)：低血壓非合併問題。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（阻塞性腎病）","Brenner & Rector’s The Kidney, 11e（obstructive uropathy）"]}},"104030-06":{"quick":"正解(A為錯)：腹膜透析(CAPD)為「每日」多次交換，非每兩天一次。","detail":{"background":"腹膜透析：CAPD每日約4次交換(非每兩天一次，A錯)；單次注入約2公升透析液；以高濃度葡萄糖產生滲透壓脫水；每週肌酸酐廓清達標(約70 L)為足夠。","options":{"A":"錯誤(即答案)：應每日多次，非每兩天一次。","B":"單次2公升，正確。","C":"高糖提供滲透壓，正確。","D":"每週70 L廓清足夠，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腹膜透析）","Brenner & Rector’s The Kidney, 11e（peritoneal dialysis）"]}},"104030-07":{"quick":"正解(A)：糖尿病人用ACEi後血壓飆升、少尿、Cr由1.0升至3.5→立即停用ACEi。","detail":{"background":"用ACEi控壓良好後突然血壓飆升、少尿、水腫、Cr由1.0急升至3.5→ACEi誘發之急性腎損傷(疑雙側腎動脈狹窄或有效容積不足)。第一步應「立即停用ACEi」並評估，而非立即切片/動脈攝影/類固醇。","options":{"A":"對：立即停用ACEi。","B":"非首步即切片。","C":"動脈攝影非首步。","D":"非急性腎絲球腎炎,不需脈衝類固醇。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ACEi相關AKI）","Brenner & Rector’s The Kidney, 11e（ACEi/ARB & AKI）"]}},"104030-24":{"quick":"正解(A)：CKD病人呼吸困難、頸靜脈怒張、心音微弱、奇脈→心包膜填塞(尿毒性心包積液)。","detail":{"background":"慢性腎衰竭(尿毒)易心包炎/心包積液。低血壓、頸靜脈怒張、心音微弱(Beck三聯徵)＋奇脈(吸氣摸不到脈)→心包膜填塞。","options":{"A":"對：心包膜填塞。","B":"ACS無Beck三聯徵/奇脈。","C":"肺動脈高壓表現不同。","D":"CHF有肺囉音、非奇脈。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿毒性心包填塞）","Brenner & Rector’s The Kidney, 11e（uremic pericarditis）"]}},"104030-35":{"quick":"正解(C)：糖尿病腎病變預防微白蛋白尿，HbA1c應<7.0%。","detail":{"background":"嚴格控糖(HbA1c<7%)可減少糖尿病微白蛋白尿發生與進展(DCCT/UKPDS)；過低(<6%)增低血糖風險(ACCORD)。","options":{"A":"<5%過嚴。","B":"<6%增低血糖風險。","C":"對：<7.0%。","D":"<8%不夠嚴格。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病控糖目標）","Brenner & Rector’s The Kidney, 11e（glycemic control）","DCCT/UKPDS；ADA"]}},"104030-36":{"quick":"正解(C)：何杰金氏淋巴瘤＋大量蛋白尿(腎病症候群)→微小變化腎病。","detail":{"background":"何杰金氏淋巴瘤之副腫瘤性腎病症候群以「微小變化腎病」最典型(大量蛋白尿、低白蛋白、高膽固醇)。","options":{"A":"膜性與實體癌相關。","B":"FSGS非典型副腫瘤(何杰金)。","C":"對：微小變化腎病。","D":"IgA以血尿為主。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（副腫瘤腎病症候群）","Brenner & Rector’s The Kidney, 11e（minimal change & Hodgkin）"]}},"104030-38":{"quick":"正解(C)：發燒、水腫、ANA陽性、紅血球圓柱體→狼瘡腎炎，驗anti-dsDNA確診。","detail":{"background":"30歲女性發燒、下肢水腫、高血壓、Cr升高、蛋白尿+紅血球圓柱體、ANA陽性、ANCA陰性→疑狼瘡腎炎。驗anti-dsDNA(與狼瘡腎炎相關)有助確立診斷。","options":{"A":"類風濕因子非確診狼瘡。","B":"抗HCV用於冷凝球蛋白。","C":"對：anti-dsDNA確立狼瘡腎炎。","D":"冷凝球蛋白用於HCV相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎診斷）","Brenner & Rector’s The Kidney, 11e（lupus nephritis）"]}},"104030-39":{"quick":"正解(D)：高血鈣鑑別最無幫助者為「是否使用類固醇」。","detail":{"background":"此例游離鈣3.0 mmol/L(高血鈣)、CKD。高血鈣鑑別應問：是否用thiazide(致高鈣)、尿道結石史(原發性副甲狀腺亢進)、是否用維生素D(中毒)。類固醇造成「低血鈣」傾向、與高血鈣鑑別最無幫助。","options":{"A":"thiazide致高鈣，有幫助。","B":"結石史(副甲狀腺亢進)，有幫助。","C":"維生素D中毒，有幫助。","D":"對(即答案)：類固醇與高血鈣鑑別無幫助。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血鈣鑑別）","Brenner & Rector’s The Kidney, 11e（hypercalcemia workup）"]}},"104030-40":{"quick":"正解(B)：腎小管間質腎炎病人通常比腎絲球病變「較早」出現貧血。","detail":{"background":"CKD貧血主因為EPO生成不足(非紅血球壽命縮短)；多為「正色素正球性」貧血(非低色素小球)；矯正目標Hb約10–11 g/dL(非Hct 36–38)。腎小管間質腎炎(EPO製造細胞較早受損)比腎絲球病變「較早」出現貧血，故B正確。","options":{"A":"錯：主因EPO不足非壽命縮短。","B":"對：間質腎炎較早貧血。","C":"錯：多為正色素正球性。","D":"錯：目標Hb~10–11非Hct 36–38。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD貧血）","Brenner & Rector’s The Kidney, 11e（anemia of CKD）","KDIGO貧血指引"]}},"104030-41":{"quick":"正解(B為錯)：此為甲狀腺毒症週期性麻痺(鉀移入細胞)，非腎性失鉀，不需大量補鉀。","detail":{"background":"20歲男性突發四肢無力、低血鉀(2.4)、高血壓心搏快、酸鹼正常。TTKG=(尿K/血K)÷(尿滲/血滲)=(10.4/2.4)÷(600/290)≈2.1(低)→「非」腎性失鉀，為鉀跨細胞移入(甲狀腺毒症週期性麻痺)。故B「因尿排大量鉀需大量補鉀」為錯——大量補鉀會反彈性高血鉀。應查甲狀腺、補鉀加生理食鹽水(非葡萄糖)、密切監測避免反彈。","options":{"A":"查甲狀腺功能，正確。","B":"錯誤(即答案)：非腎性失鉀,不需大量補鉀。","C":"KCl加生理食鹽水較佳，正確。","D":"監測避免反彈性高鉀，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（甲狀腺毒症週期性麻痺/TTKG）","Brenner & Rector’s The Kidney, 11e（hypokalemia, transcellular shift）"]}},"104030-53":{"quick":"正解(B)：Mitomycin C與溶血性尿毒症候群(HUS/血栓性微血管病)有關。","detail":{"background":"Mitomycin C為化療相關血栓性微血管病(TMA)/溶血性尿毒症候群(HUS)之經典藥物(微血管病性溶血、血小板低、AKI)。hand-foot syndrome與capecitabine/5-FU相關。","options":{"A":"hand-foot syndrome與capecitabine相關。","B":"對：HUS(TMA)。","C":"高黏稠度症候群與骨髓瘤/巨球蛋白血症相關。","D":"capillary leak與IL-2等相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（化療相關TMA/HUS）","Brenner & Rector’s The Kidney, 11e（drug-induced HUS）"]}},"104090-07":{"quick":"正解(B)：兩腎縮小之末期腎病併尿毒症狀(瞻妄、容積過多、高鉀)→透析治療。","detail":{"background":"糖尿病高血壓、Cr由2→9.6、兩腎皆縮小(~9.6 cm，慢性)、低鈉高鉀、瞻妄、肺水腫→末期腎病併尿毒急症。最正確處置為「透析」。腎縮小做切片無益；末期高鉀不宜ACEi；非急性腎絲球腎炎不需脈衝類固醇。","options":{"A":"腎已縮小,切片無益。","B":"對：透析治療。","C":"末期高鉀不宜ACEi。","D":"非腎絲球腎炎,不需脈衝類固醇。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（末期腎病/尿毒急症）","Brenner & Rector’s The Kidney, 11e（uremic emergency）"]}},"104090-22":{"quick":"正解(B)：糖尿病＋蛋白尿＋高血壓起始藥首選ACEi/ARB。","detail":{"background":"糖尿病合併蛋白尿與高血壓：起始降壓首選ACEi或ARB(降腎絲球內壓、抗蛋白尿、延緩腎病變)。","options":{"A":"利尿劑非首選。","B":"對：ACEi/ARB。","C":"β阻斷劑非首選。","D":"methyldopa非首選。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變）","Brenner & Rector’s The Kidney, 11e（RAAS blockade）"]}},"104090-30":{"quick":"正解(D)：腹膜透析腹膜炎最常見為革蘭氏陽性菌。","detail":{"background":"腹膜透析腹膜炎以革蘭氏陽性菌(凝固酶陰性葡萄球菌、金黃色葡萄球菌)最常見(觸碰污染)。革蘭氏陰性次之；黴菌/病毒少見。","options":{"A":"病毒少見。","B":"黴菌少見。","C":"革蘭氏陰性次之。","D":"對：革蘭氏陽性最常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PD腹膜炎）","Brenner & Rector’s The Kidney, 11e（PD peritonitis）","ISPD指引"]}},"104090-31":{"quick":"正解(B)：尿毒出血傾向最重要機轉為「血小板凝集功能異常」。","detail":{"background":"尿毒症出血傾向之最重要機轉為「血小板功能(凝集/黏附)異常」(尿毒素、一氧化氮、von Willebrand作用受損)，血小板數目多正常。治療可用DDAVP、cryoprecipitate、矯正貧血、透析。","options":{"A":"血小板數目多正常。","B":"對：血小板凝集功能異常。","C":"凝血蛋白合成多正常。","D":"血管完整性非主因。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿毒性出血）","Brenner & Rector’s The Kidney, 11e（uremic platelet dysfunction）"]}},"104090-33":{"quick":"正解(D)：鹿角狀結石、尿pH 8.5、Proteus→struvite(磷酸銨鎂)結石最正確。","detail":{"background":"(D)反覆腎盂腎炎、雙側鹿角狀結石、鹼性尿(pH 8.5)、Proteus mirabilis(產尿素酶)→struvite(感染性)結石，正確。(A)年輕女性UTI以大腸桿菌(革蘭氏陰性)為主，非陽性；(B)孕婦無症狀菌尿「須」治療；(C)長期導尿之無症狀菌尿不需抗生素。","options":{"A":"錯：年輕女性UTI多大腸桿菌。","B":"錯：孕婦無症狀菌尿須治療。","C":"錯：留置導尿無症狀菌尿不治療。","D":"對：Proteus/struvite鹿角石。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（泌尿道感染/struvite結石）","Brenner & Rector’s The Kidney, 11e（infection stones）","IDSA無症狀菌尿指引"]}},"104090-74":{"quick":"正解(A)：發燒＋右腰痛＋CT如圖→急性腎盂腎炎。","detail":{"background":"發燒、右側腰痛、CT顯示腎實質楔形低密度/腫脹→急性腎盂腎炎(局部腎炎/可能合併膿瘍)。腎細胞癌為實質腫塊、血管平滑肌脂肪瘤含脂肪、水腎為集尿系統擴張，與此感染表現不同。","options":{"A":"對：急性腎盂腎炎。","B":"腎細胞癌為實質腫塊。","C":"血管平滑肌脂肪瘤含脂肪。","D":"水腎為集尿系統擴張。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（急性腎盂腎炎影像）","Brenner & Rector’s The Kidney, 11e（acute pyelonephritis）"]}},"105020-08":{"quick":"正解(A)：眼眶紫斑＋肝脾腫大＋多器官＋腎病範圍蛋白尿＋補體正常→類澱粉症。","detail":{"background":"眼眶周圍紫斑(raccoon eyes)、肝脾腫大、心臟擴大、腎病範圍蛋白尿、消化道出血、補體正常→系統性(AL)類澱粉沉積。冷凝球蛋白/狼瘡補體低；Wegener有ANCA與肺腎症候群但無眼眶紫斑/肝脾腫。","options":{"A":"對：類澱粉症。","B":"冷凝球蛋白補體低。","C":"Wegener為ANCA血管炎。","D":"SLE補體低、ANA陽性。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AL類澱粉症）","Brenner & Rector’s The Kidney, 11e（renal amyloidosis）"]}},"105020-34":{"quick":"正解(B)：腎炎症候群(紅血球圓柱體、蛋白尿、高血壓、AKI)切片後→免疫抑制治療。","detail":{"background":"一週內尿量減、高血壓、水腫、蛋白尿(3+)、紅血球與紅血球圓柱體→急性腎絲球腎炎/急進性腎炎。切片確診後以「免疫抑制治療」(類固醇±cyclophosphamide)。非感染(廣效抗生素)、非單純需透析、非缺白蛋白。","options":{"A":"非感染,不需廣效抗生素。","B":"對：免疫抑制治療。","C":"未必需緊急透析。","D":"非單純低白蛋白,補白蛋白無益。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（急進性腎絲球腎炎）","Brenner & Rector’s The Kidney, 11e（RPGN treatment）"]}},"105020-35":{"quick":"正解(C)：cisplatin主要為「直接腎小管毒性」，非腎血管影響(例外)。","detail":{"background":"藉「腎血管(血流動力學)」影響而致AKI者：NSAID(收縮入球)、ACEi/腎素抑制劑(擴張出球)。cisplatin為直接近端腎小管毒性(非血管機轉)，為例外。","options":{"A":"NSAID影響腎血管。","B":"ACEi影響腎血管。","C":"對(即答案)：cisplatin為直接小管毒性。","D":"腎素抑制劑影響腎血管。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（藥物性AKI機轉）","Brenner & Rector’s The Kidney, 11e（drug-induced AKI）"]}},"105020-36":{"quick":"正解(C為錯)：白蛋白流失「腹膜透析」較多,非血液透析。","detail":{"background":"PD vs HD：HD對超過濾控制較精準(A對)；PD因高糖負荷易高血脂(B對)、且每日「蛋白/白蛋白流失較多」(故C「血液透析較常白蛋白流失」為錯)；PD透析液不含鉀,較易低血鉀(D對)。","options":{"A":"HD超過濾控制較準,正確。","B":"PD易高血脂,正確。","C":"錯誤(即答案)：PD白蛋白流失較多。","D":"PD較易低血鉀,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PD vs HD）","Brenner & Rector’s The Kidney, 11e（dialysis modality）"]}},"105020-37":{"quick":"正解(C為錯)：ACEi會「降低」腎絲球過濾率(擴張出球小動脈、降內壓)。","detail":{"background":"ACEi腎保護：降血壓(A)、降蛋白尿(B)、擴張出球小動脈降腎絲球內壓(D)；因此短期內GFR會「下降」(非增加)，故C「增加GFR」為錯。起始後Cr輕度上升(<30%)屬可接受。","options":{"A":"降血壓,正確。","B":"降蛋白尿,正確。","C":"錯誤(即答案)：ACEi降GFR非增加。","D":"降出球小動脈壓,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ACEi腎保護機轉）","Brenner & Rector’s The Kidney, 11e（efferent arteriole）"]}},"105100-06":{"quick":"正解(D)：FeNa 2%(>1%)傾向腎因性(ATN)而非腎前性。","detail":{"background":"腎前性 vs 腎因性(ATN)：腎前性FeNa<1%、尿鈉<20、尿濃縮、僅透明管型；腎因性FeNa>2%、尿鈉高、棕色顆粒管型。本題FeNa 2%傾向腎因性。透明管型、低尿鈉(8)皆腎前性;BUN 48無鑑別力。","options":{"A":"透明管型→腎前性。","B":"BUN 48無鑑別。","C":"尿鈉8(低)→腎前性。","D":"對：FeNa 2%→腎因性。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI鑑別/FeNa）","Brenner & Rector’s The Kidney, 11e（prerenal vs ATN）"]}},"105100-07":{"quick":"正解(A為錯)：新診斷第二型糖尿病「可能」已有微量白蛋白尿(病程隱匿多年)。","detail":{"background":"第二型糖尿病因發病隱匿、診斷時可能已有微量/蛋白尿(故A「不會出現」為錯，應於診斷時即篩)。病理見腎絲球基底膜增厚與系膜擴張；以RAAS阻斷劑治療;台灣每年新透析病因以糖尿病腎病變第一位。","options":{"A":"錯誤(即答案)：新診斷T2DM可能已有(微)蛋白尿。","B":"GBM增厚、系膜擴張,正確。","C":"用RAAS阻斷劑,正確。","D":"台灣透析病因糖尿病第一,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變）","Brenner & Rector’s The Kidney, 11e（diabetic nephropathy）","ADA(診斷時即篩)"]}},"105100-18":{"quick":"正解(B)：心臟衰竭可造成細胞外液增加之低血鈉(稀釋性)。","detail":{"background":"(B)心衰竭有效循環量低→ADH分泌增加、水滯留→細胞外液增加之「稀釋性低血鈉」，正確。(A)高血糖為「高張(translocational)」低鈉,血漿滲透壓「不低」;(C)低容積低鈉且尿鈉<10代表腎臟「適當保鈉」(腎外失鈉),非鈉流失腎病;(D)SIADH為等容積、血漿滲透壓「低」。","options":{"A":"高血糖低鈉為高張,非低滲透壓。","B":"對：心衰竭→ECF增加之低鈉。","C":"尿鈉<10為腎外失鈉(適當保鈉)。","D":"SIADH等容積、低滲透壓。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鈉鑑別）","Brenner & Rector’s The Kidney, 11e（hyponatremia）"]}},"105100-32":{"quick":"正解(D；本題C、D均給分)：抑制腎小管腺苷→入球小動脈擴張。","detail":{"background":"GFR自主調控：(D)腺苷(adenosine)經管球回饋使入球小動脈「收縮」,抑制其產生→入球擴張,正確。(A)肌源性反射作用於「入球」非出球;(B)管球回饋(TGF)調控「入球」小動脈;(C)血管收縮素II使「出球」收縮、腎素本身不直接收縮入球。本題官方公告C、D均給分。","options":{"A":"肌源性反射作用於入球非出球。","B":"TGF調控入球小動脈。","C":"(亦給分)腎素-血管收縮素II主要收縮出球。","D":"對：抑制腺苷→入球擴張。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（GFR自主調控）","Brenner & Rector’s The Kidney, 11e（autoregulation/TGF）","考選部更正：C、D均給分"]}},"105100-43":{"quick":"正解(A)：透明細胞腎細胞癌與VHL基因突變/低表現相關。","detail":{"background":"透明細胞腎細胞癌(最常見、最易轉移)與von Hippel-Lindau(VHL)基因突變/失活相關(HIF累積、血管新生)。乳突狀與MET/染色體7,17;難染性與染色體缺失;類肉瘤為去分化型。","options":{"A":"對：透明細胞RCC與VHL相關。","B":"類肉瘤為去分化。","C":"難染性與染色體缺失。","D":"乳突狀與MET相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎細胞癌/VHL）","Brenner & Rector’s The Kidney, 11e（clear cell RCC）"]}},"105100-60":{"quick":"正解(C)：水災後發燒、黃疸、AKI→鉤端螺旋體病,用penicillin G。","detail":{"background":"淹水10天後高燒、肌痛、黃疸(膽紅素4.1)、肝指數升、AKI(Cr 3.2)→鉤端螺旋體病(Weil)。治療以crystalline penicillin G(或doxycycline/ceftriaxone)。","options":{"A":"amikacin非首選且腎毒。","B":"ciprofloxacin非首選。","C":"對：penicillin G。","D":"vancomycin針對革蘭氏陽性,非適應。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鉤端螺旋體病）","CDC leptospirosis；Mandell ID"]}},"105100-64":{"quick":"正解(B不符)：Sjögren腎鈣化(遠端RTA)為代謝性「酸」中毒,不符此代謝性鹼中毒。","detail":{"background":"pH 7.49、HCO₃⁻ 28、低鉀(3.0)、低氯(89)→代謝性鹼中毒。符合：(A)原發性醛固酮增多(高醛固酮)、(C)鼻胃管引流(失胃酸)、(D)thiazide。Sjögren腎鈣化為「遠端RTA」造成代謝性「酸」中毒,故(B)不符。","options":{"A":"醛固酮增多→鹼中毒,符合。","B":"對(即答案)：遠端RTA為酸中毒,不符。","C":"鼻胃引流→鹼中毒,符合。","D":"thiazide→鹼中毒,符合。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（代謝性鹼中毒鑑別）","Brenner & Rector’s The Kidney, 11e（metabolic alkalosis）"]}},"105100-69":{"quick":"正解(C)：早期發現糖尿病腎病變最適篩檢為「微量白蛋白尿」。","detail":{"background":"糖尿病腎病變早期篩檢以「微量白蛋白尿(尿白蛋白/肌酸酐比)」最敏感、最早期;肌酸酐、尿素氮、一般尿液常規偵測較晚。","options":{"A":"肌酸酐偵測較晚。","B":"尿素氮偵測較晚。","C":"對：微量白蛋白尿。","D":"尿液常規敏感度不足。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變篩檢）","Brenner & Rector’s The Kidney, 11e（microalbuminuria）","ADA篩檢建議"]}},"106020-06":{"quick":"正解(C為錯)：腎病症候群水腫者「有效血液容量減少」(非增加)。","detail":{"background":"腎病症候群低白蛋白、全身水腫：細胞外液(ECF)增加(A對);低血鈉(120)使水移入細胞、細胞內液增加(B對);但因白蛋白低、血管內滲透壓低→「有效血液容量減少」(underfilling)(D對)。故C「有效血液容量增加」為錯。嘔吐致代謝性鹼中毒、尿氯低(8)符合容積不足。","options":{"A":"ECF增加(水腫),正確。","B":"低鈉使ICF增加,正確。","C":"錯誤(即答案)：有效血液容量「減少」非增加。","D":"有效血液容量減少,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎病症候群體液）","Brenner & Rector’s The Kidney, 11e（nephrotic edema/underfill）"]}},"106020-10":{"quick":"正解(A)：蛋白尿+貧血+Bence-Jones蛋白+頭顱X光穿鑿樣病灶→多發性骨髓瘤。","detail":{"background":"蛋白尿、貧血(Hb 8.7)、Cr升高、尿Bence-Jones蛋白陽性、頭顱X光「穿鑿狀(punched-out)」溶骨病灶→多發性骨髓瘤(骨髓瘤腎)。","options":{"A":"對：多發性骨髓瘤。","B":"轉移癌多成骨/混合,無Bence-Jones。","C":"CKD貧血無Bence-Jones/溶骨。","D":"Paget氏病為成骨/混合性。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（多發性骨髓瘤）","Brenner & Rector’s The Kidney, 11e（myeloma kidney）"]}},"106020-14":{"quick":"正解(B)：低鉀(1.5)、CK升、TSH抑制、free T4高→甲狀腺毒性週期性麻痺。","detail":{"background":"年輕男性突發四肢無力、嚴重低血鉀(1.5)、CK輕升、TSH極低、free T4高→甲狀腺毒性週期性麻痺(鉀移入細胞)。補鉀宜謹慎(避免反彈高鉀)、治療甲狀腺亢進(β-blocker)。","options":{"A":"原發性醛固酮增多有高血壓。","B":"對：甲狀腺毒性週期性麻痺。","C":"利尿劑過量有容積/電解質線索。","D":"RTA有代謝性酸中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（甲狀腺毒性週期性麻痺）","Brenner & Rector’s The Kidney, 11e（hypokalemic paralysis）"]}},"106020-16":{"quick":"正解(C)：尿培養E. coli為真感染,血培養S. epidermidis單瓶為污染→治E. coli泌尿道感染。","detail":{"background":"發燒、頻尿、左腰痛、膿尿、尿培養E. coli>10⁵→泌尿道感染(腎盂腎炎)。血培養S. epidermidis僅單一需氧瓶長出→污染(非真菌血症)。應依尿培養治E. coli,不需處理污染菌或找心內膜炎。","options":{"A":"污染菌不需找心內膜炎。","B":"S. epidermidis單瓶為污染。","C":"對：治E. coli泌尿道感染。","D":"不需同時治污染菌。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（泌尿道感染/血培養污染判讀）","Brenner & Rector’s The Kidney, 11e（pyelonephritis）"]}},"106020-32":{"quick":"正解(D)：CKD合併高血壓首選ACEi/ARB。","detail":{"background":"CKD合併高血壓首選RAAS阻斷劑(ACEi/ARB)，兼降腎絲球內壓、抗蛋白尿、延緩腎病變;利尿劑/CCB/β-blocker為輔助。","options":{"A":"利尿劑為輔助。","B":"CCB為輔助。","C":"β-blocker非首選。","D":"對：ACEi/ARB首選。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD高血壓）","Brenner & Rector’s The Kidney, 11e（RAAS blockade）","KDIGO血壓指引"]}},"106020-34":{"quick":"正解(B)：年輕、大量蛋白尿、光鏡正常→微小變化腎病,補體通常正常。","detail":{"background":"20歲、白蛋白2.3、蛋白尿18 g/天、光鏡腎絲球正常→微小變化腎病(MCD)。補體正常(B對);電顯為足突消失「無」電子密集沉積(A錯);常復發(C錯);對類固醇反應「佳」(~90%緩解,非僅30%,D錯)。","options":{"A":"錯：EM為足突消失,無電子密集沉積。","B":"對：補體通常正常。","C":"錯：常復發。","D":"錯：類固醇反應佳(~90%)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（微小變化腎病）","Brenner & Rector’s The Kidney, 11e（minimal change disease）"]}},"106080-08":{"quick":"正解(D為錯)：anti-dsDNA「可」作為狼瘡腎炎活性指標。","detail":{"background":"SLE、血尿(RBC 50–75)、蛋白尿3.2、Cr 3個月內倍增→活動性狼瘡腎炎,病理多為瀰漫增生型(class IV)(A對),以脈衝類固醇＋cyclophosphamide誘導(B、C對)。anti-dsDNA與補體可監測活性(故D「不可當活性指標」為錯)。","options":{"A":"瀰漫增生型,正確。","B":"脈衝類固醇,正確。","C":"cyclophosphamide脈衝,正確。","D":"錯誤(即答案)：anti-dsDNA可作活性指標。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎）","Brenner & Rector’s The Kidney, 11e（lupus nephritis monitoring）"]}},"106080-09":{"quick":"正解(C為錯)：腎病症候群易「腎靜脈」栓塞,非腎動脈。","detail":{"background":"HCV、大量蛋白尿(5 g)、低白蛋白、補體下降→冷凝球蛋白血症/MPGN型腎病症候群(A、B、D對)。腎病症候群高凝易「腎靜脈」栓塞(尤其膜性),非腎動脈,故C錯。","options":{"A":"已達腎病症候群標準,正確。","B":"常有冷凝球蛋白,正確。","C":"錯誤(即答案)：易腎靜脈栓塞非腎動脈。","D":"病理多為MPGN,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（HCV相關腎炎/高凝）","Brenner & Rector’s The Kidney, 11e（cryoglobulinemic MPGN）"]}},"106080-16":{"quick":"正解(C)：ESBL大腸桿菌菌血症/泌尿道感染→靜脈carbapenem(ertapenem)。","detail":{"background":"產ESBL之大腸桿菌(對第三代頭孢與青黴素類抗藥)菌血症併泌尿道感染→首選靜脈carbapenem(ertapenem)。口服cephalexin/IV cefotaxime被ESBL水解無效;gentamicin於CKD腎毒。","options":{"A":"口服cephalexin對ESBL無效。","B":"cefotaxime被ESBL水解。","C":"對：靜脈ertapenem(carbapenem)。","D":"gentamicin腎毒、非首選。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ESBL感染治療）","IDSA抗藥性革蘭氏陰性菌指引"]}},"106080-18":{"quick":"正解(B)：單側下肢水腫常因靜脈或淋巴阻塞。","detail":{"background":"(B)單側下肢水腫多為局部「靜脈(深層靜脈栓塞)或淋巴」阻塞,正確。(A)肝硬化水腫(低白蛋白/容積不足)不伴頸靜脈怒張;(C)腎病症候群常見臉/眼皮水腫;(D)心衰竭水腫為「重力依賴(dependent)」部位。","options":{"A":"錯：肝硬化不伴頸靜脈怒張。","B":"對：單側下肢水腫為靜脈/淋巴阻塞。","C":"錯：腎病症候群常臉/眼皮水腫。","D":"錯：心衰竭水腫為dependent部位。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（水腫鑑別）","Brenner & Rector’s The Kidney, 11e（edema）"]}},"106080-31":{"quick":"正解(C)：末期腎病最佳治療為腎臟移植。","detail":{"background":"末期腎病之最佳腎臟替代療法為「腎臟移植」(存活率與生活品質優於透析)。","options":{"A":"血液透析非最佳。","B":"腹膜透析非最佳。","C":"對：腎臟移植。","D":"血液過濾透析非最佳。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎臟替代療法）","Brenner & Rector’s The Kidney, 11e（renal transplantation）"]}},"106080-32":{"quick":"正解(D)：高血壓+低鉀+代謝性鹼中毒+腎性失鉀→原發性醛固酮增多症。","detail":{"background":"夜尿、高血壓(150/94)、低血鉀(2.8)、代謝性鹼中毒(HCO₃⁻ 30、pH 7.45)、尿鉀排泄高(50,腎性失鉀)、腎功能正常→原發性醛固酮增多症。RTA為酸中毒;Bartter血壓正常;絨毛狀腺瘤經腸道失鉀(尿鉀應低)。","options":{"A":"RTA為酸中毒。","B":"Bartter血壓正常。","C":"絨毛狀腺瘤尿鉀低(腸道失鉀)。","D":"對：原發性醛固酮增多症。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（原發性醛固酮增多症）","Brenner & Rector’s The Kidney, 11e（mineralocorticoid excess）"]}},"106080-33":{"quick":"正解(C)：HCV相關腎病以急性間質性腎炎最少見。","detail":{"background":"HCV相關腎病以冷凝球蛋白腎絲球腎炎、第一型MPGN、膜性腎病為主。急性間質性腎炎與HCV關聯最少見。","options":{"A":"冷凝球蛋白GN常見。","B":"膜性腎病可見。","C":"對：急性間質性腎炎最少見。","D":"第一型MPGN常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（HCV相關腎病）","Brenner & Rector’s The Kidney, 11e（HCV-associated GN）"]}},"106080-34":{"quick":"正解(C)：以「尿液紅血球形態(變形紅血球)」判別血尿是否腎絲球來源。","detail":{"background":"無痛性巨觀血尿判別來源：尿中「變形紅血球(dysmorphic RBC)」與紅血球圓柱體→腎絲球性;形態正常紅血球→泌尿道(下尿路/腫瘤)。故以尿紅血球形態最能判別。","options":{"A":"肌酸酐不能判來源。","B":"C3不能判來源。","C":"對：尿紅血球形態。","D":"IVU看解剖非判腎絲球性。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（血尿來源判別）","Brenner & Rector’s The Kidney, 11e（dysmorphic RBC）"]}},"106080-37":{"quick":"正解(A最不適用)：狼瘡腎炎併腎功能不足者cyclosporine(鈣調磷酸酶抑制劑)腎毒,最不適用。","detail":{"background":"狼瘡腎炎併腎功能不足(Cr 2.0)：MMF、rituximab、(leflunomide偶用)可考量。cyclosporine為鈣調磷酸酶抑制劑、具腎血管收縮腎毒性,於腎功能不足者最不適用。","options":{"A":"對(即答案)：cyclosporine腎毒,最不適用。","B":"leflunomide可考量。","C":"rituximab可用於難治狼瘡腎。","D":"MMF為標準用藥。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎用藥）","Brenner & Rector’s The Kidney, 11e（calcineurin inhibitor nephrotoxicity）"]}},"107020-08":{"quick":"正解(A為錯)：單次透析尿素下降率(URR)達60%「不」足夠,應≥65–70%。","detail":{"background":"長期血液透析充分性：單次尿素下降率(URR)應≥65–70%(或Kt/V≥1.2),60%「不足」(A錯)。台灣多每週3次、每次4小時(B對);透析液用重碳酸鹽矯正酸中毒(C對);肌肉痙攣為常見併發症(D對)。","options":{"A":"錯誤(即答案)：URR 60%不足,應≥65–70%。","B":"每週3次4小時,正確。","C":"重碳酸鹽透析液,正確。","D":"肌肉痙攣常見,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析充分性）","Brenner & Rector’s The Kidney, 11e（dialysis adequacy/URR）","KDOQI血液透析充分性"]}},"107020-09":{"quick":"正解(B為錯)：顯影劑腎病變「常」出現FeNa<1%(血管收縮型,似腎前性)。","detail":{"background":"顯影劑腎病變機轉含腎小管阻塞與腎血流動力學改變(腎髓質血管收縮)(A對);因血管收縮,常「FeNa<1%」(類腎前性),故B「很少FeNa<1%」為錯。糖尿病為危險因子(C);高危者先水化(D)。","options":{"A":"機轉含小管阻塞/血流改變,正確。","B":"錯誤(即答案)：常FeNa<1%。","C":"糖尿病為危險因子,正確。","D":"高危者先水化,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（顯影劑腎病變）","Brenner & Rector’s The Kidney, 11e（contrast nephropathy）"]}},"107020-10":{"quick":"正解(B)：產後微血管病性溶血(破碎紅血球、haptoglobin低)+血小板低+AKI→溶血性尿毒症候群。","detail":{"background":"產後出血後出現微血管病性溶血性貧血(破碎紅血球、haptoglobin下降)、血小板低、AKI、無皮膚紫斑→產後溶血性尿毒症候群(HUS/TMA)。ATN無溶血;Goodpasture有肺出血/anti-GBM;冷凝球蛋白有紫斑。","options":{"A":"ATN無溶血/血小板低。","B":"對：溶血性尿毒症候群(TMA)。","C":"Goodpasture有肺出血/anti-GBM。","D":"冷凝球蛋白有紫斑/HCV。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（產後HUS/TMA）","Brenner & Rector’s The Kidney, 11e（thrombotic microangiopathy）"]}},"107020-13":{"quick":"正解(C)：HCV+可觸摸紫斑+周邊神經病變+蛋白尿→冷凝球蛋白(最具診斷價值)。","detail":{"background":"活動性C肝、兩下肢壓痛小紅疹(可觸摸紫斑)、四肢麻木疼痛(周邊神經病變)、蛋白尿→混合型冷凝球蛋白血症(血管炎)。檢查「冷凝球蛋白陽性」最具診斷價值(伴低補體、類風濕因子陽性)。","options":{"A":"RF常陽性但非最具診斷。","B":"ANA非此病主軸。","C":"對：冷凝球蛋白最具診斷價值。","D":"病毒量非診斷冷凝球蛋白。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（冷凝球蛋白血症）","Brenner & Rector’s The Kidney, 11e（cryoglobulinemic vasculitis）"]}},"107020-18":{"quick":"正解(D)：UCr/PCr>40代表腎前性氮血症(尿濃縮、保水)。","detail":{"background":"腎前性氮血症指標：BUN/PCr>20(非<10)、尿鈉<20、尿滲透壓>500(非<350)、FeNa<1%、UCr/PCr>40(尿濃縮)。故(D)UCr/PCr>40符合腎前性。","options":{"A":"BUN/Cr<10非腎前性(應>20)。","B":"尿鈉>40→ATN。","C":"尿滲透壓<350→ATN。","D":"對：UCr/PCr>40→腎前性。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎前性指標）","Brenner & Rector’s The Kidney, 11e（prerenal indices）"]}},"107020-33":{"quick":"正解(C為錯)：高磷血症「抑制」(非促進)活性維生素D生成。","detail":{"background":"CKD次發性副甲狀腺亢進機轉：腎衰竭→高磷血症(A);FGF-23抑制1α-hydroxylase降低活性維生素D(B);低鈣刺激PTH(D)。高磷血症與FGF-23「抑制」1,25-vitD生成(故C「促進」為錯)。","options":{"A":"腎衰竭→高磷,正確。","B":"FGF-23抑制1α-hydroxylase,正確。","C":"錯誤(即答案)：高磷抑制活性vitD生成。","D":"低鈣刺激PTH,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD機轉）","Brenner & Rector’s The Kidney, 11e（secondary hyperparathyroidism）"]}},"107020-35":{"quick":"正解(D)：高血鈣鑑別最無幫助者為「環狀利尿劑」。","detail":{"background":"游離鈣3.0(高血鈣)鑑別應問：維生素D使用、嚼檳榔(含石灰→鈣攝取)、長期制酸劑(milk-alkali)。環狀利尿劑造成「低血鈣」(促尿鈣排泄、用於治高鈣),與高血鈣鑑別最無幫助。","options":{"A":"維生素D,有幫助。","B":"檳榔石灰(鈣),有幫助。","C":"制酸劑(milk-alkali),有幫助。","D":"對(即答案)：環狀利尿劑致低鈣,無幫助。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血鈣鑑別）","Brenner & Rector’s The Kidney, 11e（hypercalcemia workup）"]}},"107020-36":{"quick":"正解(D)：禁水與DDAVP後尿滲透壓皆不上升→腎性尿崩症。","detail":{"background":"嚴重多尿,禁水後尿滲透壓不上升(無法濃縮)、給DDAVP後仍不上升(對ADH無反應)→腎因性尿崩症。中樞性對DDAVP有反應;精神性多尿禁水後可濃縮。","options":{"A":"正常者禁水可濃縮。","B":"精神性多尿禁水後可濃縮。","C":"中樞性對DDAVP有反應。","D":"對：腎性尿崩症(對DDAVP無反應)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿崩症鑑別）","Brenner & Rector’s The Kidney, 11e（nephrogenic DI）"]}},"107020-55":{"quick":"正解(A)：第一型糖尿病自然病程中以「視網膜病變」最早臨床出現。","detail":{"background":"第一型糖尿病微血管併發症中,視網膜病變通常為最早臨床可偵測者(發病數年後),其次腎臟(微量白蛋白尿)、神經病變,大血管(心血管)較晚。","options":{"A":"對：視網膜最早。","B":"神經病變稍晚。","C":"腎臟(微量白蛋白尿)稍晚。","D":"心血管最晚。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病併發症自然史）","ADA；Williams Endocrinology"]}},"107080-02":{"quick":"正解(C)：尿沉渣「變形性紅血球」支持腎絲球性血尿。","detail":{"background":"腎絲球性血尿的支持證據：變形性紅血球(dysmorphic RBC)、紅血球圓柱體、合併蛋白尿。顆粒管型、蛋白尿量、紅血球數目本身不能判定來源。","options":{"A":"顆粒管型見於小管損傷。","B":"蛋白尿量不判來源。","C":"對：變形紅血球→腎絲球性。","D":"紅血球數目不判來源。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（血尿來源）","Brenner & Rector’s The Kidney, 11e（dysmorphic RBC）"]}},"107080-05":{"quick":"正解(B例外)：合併CCB不增加ACEi致AKI風險。","detail":{"background":"ACEi較易致AKI之情境：雙側腎動脈狹窄(出球擴張致GFR驟降)、心衰竭大量利尿(容積不足)、合併NSAID(入球收縮)。合併鈣離子阻斷劑(CCB)不增加此風險,為例外。","options":{"A":"雙側腎動脈狹窄→高風險。","B":"對(即答案)：CCB不增加風險。","C":"大量利尿→高風險。","D":"合併NSAID→高風險。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ACEi相關AKI）","Brenner & Rector’s The Kidney, 11e（ACEi & AKI）"]}},"107080-06":{"quick":"正解(D)：正常陰離子間隙(高氯)代謝性酸中毒→腹瀉(失HCO₃⁻)。","detail":{"background":"pH 7.32、HCO₃⁻ 18、Cl 109(高)、AG=138−109−18=11(正常AG)→正常AG(高氯)代謝性酸中毒。69歲腹瀉3天(經腸道失重碳酸)符合。DKA為高AG;thiazide為鹼中毒;CKD第五期為高AG。","options":{"A":"DKA為高AG酸中毒。","B":"thiazide→代謝性鹼中毒。","C":"CKD第五期→高AG酸中毒。","D":"對：腹瀉→正常AG酸中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（酸鹼分類）","Brenner & Rector’s The Kidney, 11e（non-AG acidosis）"]}},"107080-37":{"quick":"正解(D)：腎細胞癌以透亮細胞型最常見。","detail":{"background":"腎細胞癌組織型以「透亮細胞型(clear cell)」最常見(~70–80%、與VHL相關、最易轉移),其次乳突型、難染細胞型;oncocytoma為良性。","options":{"A":"oncocytoma為良性。","B":"難染細胞型較少。","C":"乳突型次之。","D":"對：透亮細胞型最常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎細胞癌）","Brenner & Rector’s The Kidney, 11e（clear cell RCC）"]}},"107080-73":{"quick":"正解(A)：神經病變性疼痛(尖銳灼熱)→gabapentin。","detail":{"background":"轉移性腎細胞癌壓迫神經根之「神經病變性疼痛」(尖銳如刀刺、灼熱)→首選抗癲癇/神經痛藥gabapentin(或pregabalin、TCA)。meperidine代謝物normeperidine於腎功能不良易蓄積致癲癇,應避免。","options":{"A":"對：gabapentin治神經病變痛。","B":"codeine對神經痛效果有限。","C":"meperidine腎功能差禁用。","D":"NSAID對神經痛效果有限且腎毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（神經病變性疼痛/癌痛）","NCCN癌症疼痛指引"]}},"107080-76":{"quick":"正解(A最不優先)：K 7.0併EKG變化為急症,「等待腹膜透析」最不優先。","detail":{"background":"腹膜透析病人K 7.0、高尖T波(危急高血鉀)：應「立即」鈣穩定心肌、葡萄糖+胰島素/碳酸氫鈉/albuterol移鉀入細胞。腹膜透析清除鉀「慢」,等待腹膜透析最不優先(B、C、D皆為即時處置)。","options":{"A":"對(即答案)：等待PD太慢,最不優先。","B":"葡萄糖+胰島素,即時。","C":"碳酸氫鈉,即時。","D":"albuterol,即時。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血鉀急救）","Brenner & Rector’s The Kidney, 11e（hyperkalemia emergency）"]}},"108030-06":{"quick":"正解(C)：CKD病人心電圖示高尖T波等→高血鉀症。","detail":{"background":"慢性腎臟病(排鉀減少)疲倦無力＋心電圖高尖T波(進展可QRS增寬、P波消失)→高血鉀症。","options":{"A":"高血鈣為QT縮短。","B":"低血鈣為QT延長。","C":"對：高血鉀(高尖T波)。","D":"低血鉀為U波、ST下降。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血鉀心電圖）","Brenner & Rector’s The Kidney, 11e（hyperkalemia ECG）"]}},"108030-17":{"quick":"正解(C)：terlipressin(血管收縮素)可治療肝腎症候群。","detail":{"background":"肝腎症候群(HRS)：分第1型(快速惡化、預後差)與第2型(較緩、與難治腹水相關)(故A型別敘述顛倒);發生於「有腹水」之進展肝硬化(B錯);可用terlipressin+白蛋白(C對);肝臟移植可逆轉HRS(D錯)。","options":{"A":"錯：第1型快速、預後差(非穩定)。","B":"錯：HRS發生於有腹水者。","C":"對：terlipressin可治療。","D":"錯：肝移植可逆轉HRS。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（肝腎症候群）","Brenner & Rector’s The Kidney, 11e（hepatorenal syndrome）","AASLD/EASL"]}},"108030-22":{"quick":"正解(A最少發生)：CKD較少出現「高血鈉(148)」。","detail":{"background":"慢性腎衰竭(Cr 6.3)常見：高血鉀、高血磷、低血鈣、代謝性酸中毒。高血鈉(Na 148)最少發生(CKD多為等鈉或低鈉,水分滯留)。","options":{"A":"對(即答案)：高血鈉最少見。","B":"高血鉀常見。","C":"高血磷常見。","D":"低血鈣常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD電解質）","Brenner & Rector’s The Kidney, 11e（CKD electrolytes）"]}},"108030-23":{"quick":"正解(A)：透析病人高磷高鈣、PTH不高→用「磷結合劑」控磷。","detail":{"background":"血液透析病人高磷、高血鈣(10.8)、PTH 88(相對不高)：應以「(非鈣基)磷結合劑」控磷。維生素D/擬鈣劑會再降鈣或用於高PTH,此例不適;高鈣透析液會加重高鈣。","options":{"A":"對：磷結合劑控磷。","B":"維生素D會升鈣,不宜。","C":"擬鈣劑用於高PTH,此例PTH不高。","D":"高鈣透析液加重高鈣。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD處置）","Brenner & Rector’s The Kidney, 11e（phosphate binder）","KDIGO CKD-MBD"]}},"108030-24":{"quick":"正解(B)：tacrolimus最易引起移植後新發糖尿病(NODAT)。","detail":{"background":"腎移植後新發糖尿病(NODAT)：以鈣調磷酸酶抑制劑「tacrolimus」致糖尿病性最強(>cyclosporine);類固醇亦致高血糖。mycophenolate、sirolimus/everolimus致糖尿病性較弱。","options":{"A":"MMF致糖尿病性弱。","B":"對：tacrolimus(NODAT)。","C":"sirolimus致高血脂為主。","D":"everolimus致糖尿病性弱。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（移植後新發糖尿病）","Brenner & Rector’s The Kidney, 11e（NODAT）"]}},"108030-25":{"quick":"正解(C)：嘔吐(代謝性鹼中毒併碳酸氫鈉尿)時,以「氯排泄分率(FeCl)」鑑別最適合。","detail":{"background":"嘔吐致代謝性鹼中毒、碳酸氫鈉尿→鈉隨HCO₃⁻排出,即使容積不足尿鈉/FeNa仍可偏高、判讀失準。此時以「氯排泄分率(FeCl)」鑑別腎前性(FeCl低)較可靠。","options":{"A":"FeNa於鹼中毒/碳酸氫鈉尿失準。","B":"尿/血尿素比次之。","C":"對：FeCl最適合。","D":"尿滲透壓輔助但非最佳。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（嘔吐AKI鑑別/FeCl）","Brenner & Rector’s The Kidney, 11e（FeCl in vomiting）"]}},"108030-26":{"quick":"正解(A最少嗜伊紅)：顯微多血管炎(MPA)最少出現嗜伊紅血球增多。","detail":{"background":"血中嗜伊紅增多常見於：膽固醇栓塞(atheroembolic)、NSAID間質性腎炎、結節性多動脈炎(部分)、嗜伊紅肉芽腫血管炎。顯微多血管炎(MPA,MPO-ANCA)最少嗜伊紅增多。","options":{"A":"對(即答案)：MPA最少嗜伊紅。","B":"膽固醇栓塞常嗜伊紅。","C":"NSAID間質腎炎常嗜伊紅。","D":"PAN部分嗜伊紅。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（嗜伊紅與AKI）","Brenner & Rector’s The Kidney, 11e（eosinophilia）"]}},"108030-27":{"quick":"正解(B為錯)：KDIGO 2012之AKI為7天內Cr升≥1.5倍(50%),非「5天內≥25%」。","detail":{"background":"KDIGO 2012 AKI定義：48小時內Cr升≥0.3 mg/dL,或7天內Cr升至基礎≥1.5倍(≥50%),或尿量<0.5 mL/kg/小時持續≥6小時。故B「5天內≥25%」為錯(門檻與時間皆不符)。","options":{"A":"48小時內≥0.3 mg/dL,正確。","B":"錯誤(即答案)：應為7天內≥50%(1.5倍)。","C":"一週內≥50%,正確。","D":"尿量<0.5 mL/kg/h×6h,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI定義）","KDIGO AKI 2012"]}},"108030-61":{"quick":"正解(C)：馬拉松後昏迷、體溫40.8℃→中暑(heat stroke)。","detail":{"background":"劇烈運動後意識昏迷、體溫>40℃、中樞神經功能障礙(痙攣/昏迷)→中暑(heat stroke,核心體溫>40℃+CNS異常)。熱痙攣/熱衰竭/熱昏厥無此高體溫與昏迷。","options":{"A":"熱痙攣無高燒昏迷。","B":"熱衰竭體溫<40℃、意識清。","C":"對：中暑。","D":"熱昏厥為短暫暈厥。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（中暑/熱傷害）"]}},"108030-63":{"quick":"正解(A)：橫紋肌溶解(CK 42700、肌球蛋白尿)→積極輸液維持尿量200–300 mL/小時。","detail":{"background":"兩腿酸痛腫脹、茶色尿、CK 42700、尿潛血4+但鏡檢無紅血球→橫紋肌溶解之肌球蛋白尿。處置以「積極等張食鹽水」維持高尿量(~200–300 mL/小時)沖洗腎小管。每天僅2500 mL不足;尿液鹼化爭議;尿量未明顯減少尚不需透析。","options":{"A":"對：維持尿量200–300 mL/小時。","B":"尿液鹼化爭議。","C":"每天2500 mL不足。","D":"尚不需透析。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（橫紋肌溶解AKI）","Brenner & Rector’s The Kidney, 11e（rhabdomyolysis）"]}},"108030-77":{"quick":"正解(C不適當)：高血鉀急救快速灌注大量生理食鹽水「稀釋鉀」不適當(無效且致容積過多)。","detail":{"background":"糖尿病CKD、K 7.7、心搏40、休克、酸中毒之高血鉀急症：碳酸氫鈉(A)、葡萄糖+胰島素(B)移鉀入細胞、氯化鈣(D)穩定心肌皆適當。快速灌注1000 mL生理食鹽水「稀釋鉀」(C)無效降鉀且CKD易容積過多/肺水腫,不適當。","options":{"A":"碳酸氫鈉移鉀入細胞,適當。","B":"葡萄糖+胰島素,適當。","C":"錯誤(即答案)：稀釋鉀無效且致容積過多。","D":"氯化鈣穩定心肌,適當。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血鉀急救）","Brenner & Rector’s The Kidney, 11e（hyperkalemia treatment）"]}},"108080-22":{"quick":"正解(C)：高鉀、正常AG(高氯)代謝性酸中毒→低腎素低醛固酮血症(第四型RTA)。","detail":{"background":"糖尿病、Cr 2.0、K 5.8(高)、Cl 116(高)、HCO₃⁻ 18、AG=139−116−18=5(正常/低AG)→高血鉀型正常AG代謝性酸中毒=低腎素低醛固酮血症(第四型RTA)。第二型RTA為低鉀;metformin/DKA為高AG。","options":{"A":"第二型RTA為低血鉀。","B":"metformin為高AG乳酸中毒。","C":"對：低腎素低醛固酮(第四型RTA)。","D":"DKA為高AG酸中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（第四型RTA）","Brenner & Rector’s The Kidney, 11e（hyporeninemic hypoaldosteronism）"]}},"108080-23":{"quick":"正解(D)：低C3、上皮下電子密集沉積(駝峰)、GBM正常、新月體→感染後(鏈球菌)腎炎。","detail":{"background":"新月型腎炎、ANCA陰性、C3低C4正常、「上皮下(subepithelial)電子密集沉積(駝峰hump)」、GBM厚度正常→感染後(鏈球菌)腎絲球腎炎(可併新月體)。膜性為上皮下但GBM增厚、補體正常;MPGN II為緻密沉積病;狼瘡為full house、C3C4皆低。","options":{"A":"膜性GBM增厚、補體正常。","B":"MPGN II為緻密沉積病。","C":"狼瘡C3、C4皆低。","D":"對：感染後腎炎(上皮下駝峰、低C3)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（感染後腎絲球腎炎）","Brenner & Rector’s The Kidney, 11e（subepithelial humps）"]}},"108080-24":{"quick":"正解(C)：糖尿病CKD併蛋白尿→加上ARB(腎保護)。","detail":{"background":"糖尿病、eGFR 59、蛋白尿1.5 g/天→應加RAAS阻斷劑(ARB)抗蛋白尿、延緩腎病變。HbA1c 6.8%已達標不需加胰島素;EPO不能延緩腎惡化(且Hb 10.7尚可);低蛋白+胺基酸補充非首要策略。","options":{"A":"HbA1c達標不需加胰島素。","B":"EPO不延緩腎惡化。","C":"對：加ARB。","D":"非首要策略。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變治療）","Brenner & Rector’s The Kidney, 11e（RAAS blockade）","KDIGO糖尿病CKD"]}},"108080-25":{"quick":"正解(D)：顯影劑腎病機轉含外髓質缺氧、自由基小管傷害、暫時性小管阻塞。","detail":{"background":"(D)顯影劑腎病機轉：腎外髓質缺氧、小管細胞自由基傷害、暫時性小管阻塞,正確。(A)需透析者<1%(非>1%);(B)生理食鹽水應於顯影「前」即開始(非之後);(C)NAC效果統合分析「不一致」,不建議常規使用。","options":{"A":"錯：需透析者<1%。","B":"錯：食鹽水應於顯影前開始。","C":"錯：NAC效果不一致,非常規。","D":"對：機轉正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（顯影劑腎病機轉）","Brenner & Rector’s The Kidney, 11e（contrast nephropathy）"]}},"108080-26":{"quick":"正解(C為錯)：腎性貧血主因為EPO生成不足,非胃腸道出血。","detail":{"background":"腎性貧血：多為正球正色素(A對);可致虛弱、運動耐受差、心衰竭、認知異常(B對);矯正Hb至「正常(≥13)」反增心血管事件(D對,TREAT/CHOIR)。主因為「EPO生成不足」(非胃腸道出血),故C錯。","options":{"A":"正球正色素,正確。","B":"症狀正確。","C":"錯誤(即答案)：主因EPO不足非腸胃道出血。","D":"Hb≥13反增心血管事件,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎性貧血）","Brenner & Rector’s The Kidney, 11e（anemia of CKD）","TREAT/CHOIR"]}},"108080-27":{"quick":"正解(C為錯)：CKD最常見死因為「心血管疾病」,非敗血症。","detail":{"background":"CKD：台灣新透析病因以糖尿病第一(A對);糖尿病CKD血壓<130/80(B對);低蛋白飲食改善尿毒症狀(D對)。CKD最常見死因為「心血管疾病」(非敗血症),故C錯。","options":{"A":"糖尿病為新透析首因,正確。","B":"糖尿病CKD<130/80,正確。","C":"錯誤(即答案)：最常見死因為心血管疾病。","D":"低蛋白改善尿毒症狀,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD死因/照護）","Brenner & Rector’s The Kidney, 11e（CVD in CKD）"]}},"108080-32":{"quick":"正解(B)：狼瘡腎炎緩解期計畫懷孕→維持目前用藥(低劑量類固醇+hydroxychloroquine)不需改變。","detail":{"background":"狼瘡腎炎已緩解5年(蛋白尿<0.5、Cr 0.6),現用prednisolone 5 mg+hydroxychloroquine。計畫懷孕：hydroxychloroquine妊娠「安全且建議續用」(降復發),低劑量prednisolone可用→維持現狀。不應停HCQ(增復發)、不換dexamethasone(過胎盤)、不加azathioprine(目前緩解不需)。","options":{"A":"dexamethasone過胎盤,不宜。","B":"對：維持現用藥。","C":"不應停HCQ(妊娠安全且降復發)。","D":"緩解中不需加azathioprine。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（妊娠與狼瘡腎炎）","Brenner & Rector’s The Kidney, 11e（lupus nephritis & pregnancy）","ACR/EULAR妊娠用藥"]}},"109020-22":{"quick":"正解(A最不適當)：Hb 11.6已足夠,不需給紅血球生長素(EPO)。","detail":{"background":"CKD病人Hb 11.6 g/dL已達/超過目標(約10–11.5),不需EPO(過高反增心血管事件)。此例維生素B12(150,低)與葉酸(1.2,低)缺乏,應補B12與葉酸;鐵蛋白105可評估補鐵。故最不適當為EPO。","options":{"A":"對(即答案)：Hb已足,EPO不適當。","B":"鐵劑可評估補充。","C":"B12低,應補。","D":"葉酸低,應補。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD貧血/EPO目標）","Brenner & Rector’s The Kidney, 11e（anemia of CKD）"]}},"109020-23":{"quick":"正解(D)：血液透析之5年存活率最差(劣於各型腎移植)。","detail":{"background":"末期腎病腎臟替代療法存活率：腎臟移植(即使HLA不相符或ABO不相符,經減敏)優於透析;血液透析5年存活率最差。","options":{"A":"HLA相符移植存活最佳。","B":"HLA不相符移植仍優於透析。","C":"ABO不相符移植優於透析。","D":"對：血液透析存活最差。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎臟替代療法存活）","Brenner & Rector’s The Kidney, 11e（transplant vs dialysis survival）"]}},"109020-24":{"quick":"正解(D)：腹膜透析「黴菌(念珠菌)性腹膜炎」→拔除導管。","detail":{"background":"腹膜透析併念珠菌(黴菌)性腹膜炎：難以根除、死亡率高,標準處置為「立即拔除腹膜透析導管」並全身抗黴菌治療,不可僅靠腹腔/口服抗黴菌藥保留導管。","options":{"A":"口服抗黴菌無法根除。","B":"單靜脈注射不足。","C":"腹腔灌注不足。","D":"對：拔除PD導管。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（黴菌性腹膜炎）","Brenner & Rector’s The Kidney, 11e（fungal peritonitis）","ISPD指引"]}},"109020-26":{"quick":"正解(C)：高鐵蛋白/低TIBC、沉渣乾淨、緩慢進展、貧血不成比例→慢性小管間質病變。","detail":{"background":"28歲緩慢進展之腎功能惡化、貧血與腎功能程度「不成比例」(嚴重)、尿沉渣乾淨、無大量蛋白尿/血尿→慢性小管間質病變(如止痛藥/中草藥/重金屬)。RPGN/TMA為急性、有血尿/溶血;高血壓腎硬化有長期高血壓史。","options":{"A":"RPGN為急進性、有血尿/紅血球管型。","B":"TMA有溶血/血小板低。","C":"對：慢性小管間質病變。","D":"高血壓腎硬化有長期高血壓。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（慢性小管間質病變）","Brenner & Rector’s The Kidney, 11e（chronic tubulointerstitial）"]}},"109020-27":{"quick":"正解(D)：蛋白尿之第4期CKD應採低蛋白飲食。","detail":{"background":"(D)蛋白尿之第4期CKD採低蛋白飲食(~0.6–0.8 g/kg)減尿毒症狀,正確。(A)CKD高血壓首選ACEi/ARB(非β-blocker);(B)NSAID腎毒應避免;(C)不建議ACEi+ARB併用(ONTARGET增高鉀/AKI)。","options":{"A":"錯：CKD高血壓首選ACEi/ARB。","B":"錯：NSAID腎毒應避免。","C":"錯：不建議ACEi+ARB併用。","D":"對：低蛋白飲食。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD治療）","Brenner & Rector’s The Kidney, 11e（CKD management）","ONTARGET"]}},"109020-28":{"quick":"正解(C為錯)：FGF-23「抑制」副甲狀腺素生成,非刺激。","detail":{"background":"CKD-MBD：GFR下降→排磷減少→刺激PTH與FGF-23(A對);FGF-23抑制1α-hydroxylase降活性維生素D、促低血鈣(B對);高FGF-23與CKD死亡率正相關(D對)。FGF-23直接「抑制」副甲狀腺PTH分泌(經Klotho/FGFR),故C「刺激PTH」為錯。","options":{"A":"排磷減少刺激PTH/FGF-23,正確。","B":"FGF-23抑制活性vitD,正確。","C":"錯誤(即答案)：FGF-23抑制PTH非刺激。","D":"高FGF-23與死亡率正相關,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD/FGF-23）","Brenner & Rector’s The Kidney, 11e（FGF-23-PTH axis）"]}},"109080-01":{"quick":"正解(C)：低鉀低磷、尿鉀低(非腎性失鉀)→疑甲狀腺毒性週期性麻痺,需驗甲狀腺。","detail":{"background":"年輕男性突發下肢無力、低血鉀(2.0)併低血磷(細胞內移)、尿鉀低(10,非腎性失鉀)、酸鹼正常→甲狀腺毒性週期性麻痺,故(C)需加驗甲狀腺功能。TTKG=(10/2.0)/(580/290)=2.5(非2.0);非腎性失鉀(B錯);補鉀應加生理食鹽水非葡萄糖(D錯)。","options":{"A":"TTKG計算約2.5非2.0。","B":"非腎性失鉀(尿鉀低)。","C":"對：需驗甲狀腺功能。","D":"補鉀應加生理食鹽水非葡萄糖。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（甲狀腺毒性週期性麻痺）","Brenner & Rector’s The Kidney, 11e（hypokalemic paralysis）"]}},"109080-24":{"quick":"正解(D)：C4d沉積、內皮損傷→抗體媒介排斥,以血漿置換+免疫球蛋白治療。","detail":{"background":"移植腎切片C4d沉積、內皮細胞損傷→抗體媒介性排斥(AMR)。治療：血漿置換(去抗體)+靜脈免疫球蛋白(IVIG)±rituximab。增加tacrolimus/MMF或類固醇脈衝為T細胞排斥之處置,非AMR首選。","options":{"A":"增加CNI/MMF非AMR首選。","B":"類固醇脈衝針對T細胞排斥。","C":"降CNI加透析非治療AMR。","D":"對：血漿置換+IVIG。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（抗體媒介排斥）","Brenner & Rector’s The Kidney, 11e（antibody-mediated rejection, C4d）"]}},"109080-25":{"quick":"正解(B)：上呼吸道感染後血尿、系膜免疫球蛋白沉積→IgA腎病變。","detail":{"background":"感冒後數天內(synpharyngitic)血尿、系膜區免疫球蛋白(IgA)沉積→IgA腎病變(最常見原發性腎絲球腎炎)。","options":{"A":"微小變化無免疫沉積、以蛋白尿為主。","B":"對：IgA腎病變。","C":"FSGS為節段硬化。","D":"膜性為上皮下沉積、腎病症候群。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（IgA腎病）","Brenner & Rector’s The Kidney, 11e（IgA nephropathy）"]}},"109080-26":{"quick":"正解(D為錯)：Goodpasture抗體針對collagen IV之「α3」NC1功能區,非α5。","detail":{"background":"抗體-疾病配對：anti-PR3→肉芽腫性多血管炎(A對);抗鏈球菌酵素(如anti-hyaluronidase/ASO/anti-DNase B)→感染後腎炎(B對);anti-PLA2R→原發性膜性腎病(C對)。Goodpasture(anti-GBM)抗體針對collagen IV「α3」鏈NC1功能區(非α5),故D錯。","options":{"A":"anti-PR3+GPA,正確。","B":"抗鏈球菌酵素+感染後腎炎,正確。","C":"anti-PLA2R+原發性膜性,正確。","D":"錯誤(即答案)：Goodpasture為α3非α5。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（抗GBM/Goodpasture）","Brenner & Rector’s The Kidney, 11e（anti-GBM α3(IV)NC1）"]}},"109080-27":{"quick":"正解(C)：糖尿病人用metformin、嘔吐、AKI、高AG(≈32)、pH 7.0→乳酸酸血症(MALA)。","detail":{"background":"糖尿病人服metformin、近2週嘔吐致AKI(Cr 6.5)、pH 7.0、HCO₃⁻ 4、AG=139−103−4=32(高AG)→metformin相關乳酸酸血症(MALA,腎功能惡化致蓄積)。血糖僅216非DKA;無橫紋肌溶解線索;第四型RTA為「正常AG」。","options":{"A":"DKA血糖應更高、有酮體。","B":"橫紋肌溶解CK高、肌痛。","C":"對：乳酸酸血症(MALA)。","D":"第四型RTA為正常AG。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（MALA/高AG酸中毒）","Brenner & Rector’s The Kidney, 11e（metformin in CKD）"]}},"109080-28":{"quick":"正解(D為錯)：CKD病人FeNa>1%「不能」排除腎前性。","detail":{"background":"AKI：腎前性BUN/Cr常>20(A對);敗血症為腎因性常見原因(B對);腎後性阻塞以「解除阻塞」為首要(C對)。CKD病人基礎FeNa常偏高(利尿劑/腎元減少),故FeNa>1%「不能排除」腎前性(D錯)。","options":{"A":"腎前性BUN/Cr>20,正確。","B":"敗血症致腎因性,正確。","C":"解除阻塞為首要,正確。","D":"錯誤(即答案)：CKD之FeNa>1%不能排除腎前性。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI鑑別）","Brenner & Rector’s The Kidney, 11e（FeNa limitations）"]}},"109080-29":{"quick":"正解(D為錯)：sirolimus副作用為高血脂/蛋白尿,非高尿酸血症。","detail":{"background":"移植抗排斥藥副作用：類固醇→骨質疏鬆(A對);cyclosporine→腎毒性(B對);tacrolimus→移植後糖尿病(C對)。sirolimus(mTOR抑制劑)主要副作用為高血脂、蛋白尿、傷口癒合不良、口腔潰瘍,非高尿酸血症(D錯)。","options":{"A":"類固醇→骨鬆,正確。","B":"cyclosporine→腎毒,正確。","C":"tacrolimus→移植後糖尿病,正確。","D":"錯誤(即答案)：sirolimus為高血脂非高尿酸。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（移植藥副作用）","Brenner & Rector’s The Kidney, 11e（mTOR inhibitor）"]}},"109080-30":{"quick":"正解(D為錯)：尿毒性出血止血用「雌激素(estrogen)」,非androgen。","detail":{"background":"尿毒性出血：因血小板凝集功能不良(A對);輸血矯正貧血有助凝血(B對);可用desmopressin、cryoprecipitate(C對)、共軛雌激素(conjugated estrogen)。故D「androgen幫助止血」為錯(應為estrogen,且estrogen具血栓風險)。","options":{"A":"血小板功能不良,正確。","B":"輸血助凝血,正確。","C":"DDAVP/cryoprecipitate,正確。","D":"錯誤(即答案)：應為雌激素非androgen。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿毒性出血治療）","Brenner & Rector’s The Kidney, 11e（uremic bleeding）"]}},"109080-38":{"quick":"正解(B)：化學治療「非」第四期腎細胞癌之有效治療。","detail":{"background":"轉移性(第四期)腎細胞癌對傳統化療「抗性」(無效)。有效治療為免疫檢查點抑制劑、抗血管新生標靶(TKI/anti-VEGF)、mTOR抑制劑。","options":{"A":"檢查點抑制劑有效。","B":"對(即答案)：化療無效。","C":"抗血管新生標靶有效。","D":"mTOR抑制劑有效。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（轉移性腎細胞癌治療）","NCCN腎細胞癌"]}},"110020-05":{"quick":"正解(A)：腎移植後一個月內較常見Herpesvirus(HSV)感染。","detail":{"background":"移植後感染時序：第1個月以院內/手術相關與「單純疱疹病毒(HSV)再活化」為主;1–6個月為伺機性感染高峰(CMV、Aspergillus、Nocardia、Pneumocystis);6個月後為社區型/慢性病毒(HCV)。","options":{"A":"對：HSV於第1個月。","B":"Aspergillus於1–6個月。","C":"Nocardia於1–6個月。","D":"HCV較晚。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（移植後感染時序）","Brenner & Rector’s The Kidney, 11e（post-transplant infection timeline）"]}},"110020-24":{"quick":"正解(A)：以「尿陰離子隙」區分腹瀉與RTA之正常AG酸中毒。","detail":{"background":"正常陰離子間隙(高氯)代謝性酸中毒鑑別：尿陰離子間隙(UAG=尿Na+尿K−尿Cl)。UAG「負值」→腸道失HCO₃⁻(腹瀉,氨排泄正常);UAG「正值」→遠端RTA(氨排泄不足)。","options":{"A":"對：尿陰離子隙。","B":"血陰離子隙用於分高/正常AG。","C":"血鉀輔助但非最具診斷。","D":"血氯非鑑別關鍵。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿陰離子間隙）","Brenner & Rector’s The Kidney, 11e（urine anion gap）"]}},"110020-25":{"quick":"正解(C最不可能)：急性腹瀉為「正常AG」酸中毒,不符此高AG。","detail":{"background":"pH 7.20、HCO₃⁻ 10、AG=138−99−10=29(高AG)、Kussmaul深呼吸→高AG代謝性酸中毒。乳酸酸血症、酮酸血症、慢性腎衰竭皆高AG。急性腹瀉為「正常AG(高氯)」酸中毒,最不可能。","options":{"A":"乳酸酸血症高AG。","B":"酮酸血症高AG。","C":"對(即答案)：腹瀉為正常AG。","D":"慢性腎衰竭高AG。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高AG酸中毒鑑別）","Brenner & Rector’s The Kidney, 11e（anion gap）"]}},"110020-26":{"quick":"正解(C最不適合)：此例為肺炎敗血症併AKI/高鉀,血漿置換術無適應症。","detail":{"background":"糖尿病人肺炎敗血症併急性腎損傷(Cr 8.5)、高血鉀(6.5)、酸中毒：可用CVVH、間歇性血液透析、腹膜透析等腎臟替代。血漿置換術(plasmapheresis)無此適應症,最不適合。","options":{"A":"CVVH可用。","B":"間歇性血液透析可用。","C":"對(即答案)：血漿置換無適應症。","D":"腹膜透析可用。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI腎臟替代選擇）","Brenner & Rector’s The Kidney, 11e（RRT modality）"]}},"110020-28":{"quick":"正解(D為錯)：血液透析「可」清除釓(gadolinium)。","detail":{"background":"腎因性全身纖維化(NSF)：與含釓顯影劑有關、病灶類scleromyxedema(A對);CKD第3期可減量使用釓(B,相對);肝病為危險因子(C對)。血液透析「可」清除釓(透析病人暴露後建議盡速透析),故D「無法清除」為錯。","options":{"A":"與釓有關、類scleromyxedema,正確。","B":"CKD3可減量使用,相對正確。","C":"肝病為危險因子,正確。","D":"錯誤(即答案)：HD可清除釓。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（NSF/釓）","Brenner & Rector’s The Kidney, 11e（nephrogenic systemic fibrosis）"]}},"110020-29":{"quick":"正解(D為錯)：羥乙基澱粉(HES)「增加」AKI風險,不可用於低血容AKI。","detail":{"background":"AKI治療：以支持療法為主(A對);等張食鹽水預防顯影劑AKI(B對);AKI併高鉀應停ACEi/ARB(C對)。羥乙基澱粉(HES)會「增加」AKI與死亡風險(6S/CHEST試驗),不可用於低血容AKI,應用晶體液,故D錯。","options":{"A":"支持療法為主,正確。","B":"等張食鹽水預防CIN,正確。","C":"高鉀停ACEi/ARB,正確。","D":"錯誤(即答案)：HES增加AKI風險。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI輸液/HES）","Brenner & Rector’s The Kidney, 11e（hydroxyethyl starch）","6S/CHEST試驗"]}},"110020-30":{"quick":"正解(C)：尿試紙蛋白陰性但uPCR大量蛋白尿→疑輕鏈(骨髓瘤),驗免疫電泳。","detail":{"background":"長期NSAID、大量蛋白尿(uPCR 4.9 g/g)但「尿試紙蛋白陰性」→提示尿蛋白為「非白蛋白(輕鏈Bence-Jones)」(試紙只測白蛋白)。配合高球蛋白(3.9)、高尿酸、貧血→疑多發性骨髓瘤,應驗血清免疫電泳/游離輕鏈。NSAID致病(膜性/微小變化)為白蛋白尿、試紙會陽性。","options":{"A":"NSAID致白蛋白尿、試紙應陽性。","B":"PLA2R用於膜性(白蛋白尿)。","C":"對：免疫電泳查骨髓瘤。","D":"非首選ARB(病因為骨髓瘤)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（輕鏈/骨髓瘤腎病）","Brenner & Rector’s The Kidney, 11e（Bence-Jones proteinuria）"]}},"110020-52":{"quick":"正解(C)：限水尿滲透壓不變,給DDAVP後上升→中樞性尿崩症。","detail":{"background":"每日尿量5公升,限水後尿滲透壓不上升(無法濃縮),給desmopressin後尿滲透壓上升、尿量減少(對ADH有反應)→中樞性尿崩症。腎性尿崩對DDAVP無反應;原發性多飲限水後可濃縮。","options":{"A":"原發性多飲限水可濃縮。","B":"滲透性利尿尿含大量溶質。","C":"對：中樞性尿崩(DDAVP有反應)。","D":"腎性尿崩對DDAVP無反應。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿崩症鑑別）","Brenner & Rector’s The Kidney, 11e（central DI）"]}},"110020-59":{"quick":"正解(C)：metronidazole一般不需依腎功能調整劑量。","detail":{"background":"metronidazole主要經肝臟代謝,一般不需依腎功能調整劑量。cefazolin、levofloxacin、vancomycin皆主要經腎排泄,腎功能不良需減量。","options":{"A":"cefazolin需依腎功能調整。","B":"levofloxacin需依腎功能調整。","C":"對：metronidazole不需。","D":"vancomycin需依腎功能調整。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（抗生素腎功能調整）","Brenner & Rector’s The Kidney, 11e（renal dosing）"]}},"110080-01":{"quick":"正解(B最不需要)：意識改變初步評估腰椎穿刺非首要。","detail":{"background":"老人服藥後活動力下降、發燒、意識改變之初步評估：詳細病史(含用藥史)、含神經學之理學檢查、全血球/電解質/肝腎功能。腰椎穿刺非「初始」必要(無腦膜炎明確指徵前不需),為最不需要。","options":{"A":"病史含用藥史,需要。","B":"對(即答案)：腰椎穿刺非首要。","C":"含神經學檢查,需要。","D":"血液生化檢查,需要。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（意識改變評估）"]}},"110080-02":{"quick":"正解(B非禁忌)：低血鉀不是ACEi禁忌。","detail":{"background":"ACEi禁忌/慎用：腎功能持續惡化、懷孕(致畸)、雙側腎動脈狹窄、「高」血鉀、血管性水腫病史。低血鉀「非」ACEi禁忌(ACEi反會升鉀)。","options":{"A":"腎功能惡化為慎用/禁忌。","B":"對(即答案)：低血鉀非禁忌。","C":"懷孕為禁忌。","D":"雙側腎動脈狹窄為禁忌。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ACEi禁忌）","Brenner & Rector’s The Kidney, 11e（ACEi contraindications）"]}},"110080-06":{"quick":"正解(D)：α-阻斷劑最不可能造成心搏過緩。","detail":{"background":"76歲心房顫動、心搏32下(過緩)：β-blocker、digoxin、(非二氫吡啶類)CCB皆抑制房室傳導→可致心搏過緩。α-阻斷劑主要降周邊血管阻力、不抑制傳導,最不可能造成此症狀。","options":{"A":"β-blocker致心搏過緩。","B":"digoxin致心搏過緩/傳導阻滯。","C":"CCB(非DHP)致心搏過緩。","D":"對：α-blocker不致心搏過緩。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（藥物性心搏過緩）"]}},"110080-24":{"quick":"正解(B最不可能)：韋氏肉芽腫(GPA)補體「正常」,與此低補體腎炎不符。","detail":{"background":"喉嚨痛後、補體明顯下降、紅血球圓柱體、少尿水腫→低補體之急性腎炎:感染後腎炎、狼瘡腎炎、心內膜炎皆「低補體」。韋氏肉芽腫(GPA,ANCA、pauci-immune)補體「正常」,最不可能。","options":{"A":"感染後腎炎補體低,可能。","B":"對(即答案)：GPA補體正常,最不可能。","C":"狼瘡腎炎補體低,可能。","D":"心內膜炎補體低,可能。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低補體腎炎鑑別）","Brenner & Rector’s The Kidney, 11e（hypocomplementemic GN）"]}},"110080-25":{"quick":"正解(B)：巴特氏症候群缺陷在「亨利氏環粗上升支」(類loop利尿劑)。","detail":{"background":"巴特氏症候群為亨利氏環粗上升支之Na-K-2Cl共同運輸子(或相關通道)功能缺陷(類似loop利尿劑作用)→低血鉀代謝性鹼中毒、正常血壓。Gitelman則在遠曲小管(NCC,類thiazide)。","options":{"A":"近端為Fanconi。","B":"對：亨利氏環粗上升支。","C":"遠曲小管為Gitelman。","D":"集尿管為Liddle/RTA。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（Bartter症候群）","Brenner & Rector’s The Kidney, 11e（thick ascending limb）"]}},"110080-26":{"quick":"正解(C)：CKD併低鈣高PTH→優先給活性維生素D(calcitriol)。","detail":{"background":"CKD第4期(eGFR 20)、低血鈣(2.05)、次發性副甲狀腺亢進(iPTH 255)、磷尚可：最優先給「活性維生素D(calcitriol)」抑制PTH並升鈣。cholecalciferol/ergocalciferol補充營養型維生素D(25-OH低時可加),但抑PTH/升鈣以活性型直接;cinacalcet會更降鈣,此例低鈣不宜先用。","options":{"A":"cinacalcet會更降鈣,低鈣不宜先用。","B":"cholecalciferol為營養型,抑PTH較弱。","C":"對：calcitriol(活性維生素D)。","D":"ergocalciferol為營養型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD治療）","Brenner & Rector’s The Kidney, 11e（active vitamin D）","KDIGO CKD-MBD"]}},"110080-28":{"quick":"正解(D)：末期腎病長期存活與生活品質最佳為腎臟移植。","detail":{"background":"末期腎病(IgA進展)之腎臟替代療法中,腎臟移植長期(>1年)存活率與生活品質最佳(優於血液/腹膜透析);CVVH為急重症暫時性療法。","options":{"A":"血液透析次之。","B":"腹膜透析次之。","C":"CVVH為急性暫時。","D":"對：腎臟移植最佳。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎臟替代療法）","Brenner & Rector’s The Kidney, 11e（transplantation outcomes）"]}},"110080-50":{"quick":"正解(C)：低腎素、高醛固酮、ACTH正常、低鉀鹼中毒→原發性醛固酮增多症。","detail":{"background":"高血壓、低血鉀(2.6)、代謝性鹼中毒、腎素「極低」(0.04)、醛固酮「高」(39.2)、ACTH正常→原發性醛固酮增多症(醛固酮/腎素比高)。腎動脈狹窄為「高腎素」;Cushing有ACTH/皮質醇異常。","options":{"A":"腎動脈狹窄為高腎素。","B":"甲亢無此電解質型態。","C":"對：原發性醛固酮增多症。","D":"Cushing有皮質醇/ACTH異常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（原發性醛固酮增多症）","Brenner & Rector’s The Kidney, 11e（primary aldosteronism）","Endocrine Society指引"]}},"110080-80":{"quick":"正解(D)：成年有行為能力之病人,可以書面指定對特定人不予告知病情。","detail":{"background":"病情告知以「病人本人」為原則。本案病人已成年、具行為能力,得依其意願「以書面敘明對特定之人(未婚夫)不予告知」。醫師對關係人之告知須尊重病人意願,非無條件義務,亦非一律禁止對家屬說明。","options":{"A":"未必無告知必要,須尊重病人意願。","B":"錯：對關係人告知非無需病人同意之法定義務。","C":"過於絕對(經病人同意仍可對特定人說明)。","D":"對：病人可書面指定不予告知特定人。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（醫病溝通/病情告知）","醫療法/病人自主權利法"]}},"111020-24":{"quick":"正解(C最不適當)：anti-IL2受體單株抗體用於T細胞排斥之預防/誘導,非抗體媒介排斥治療。","detail":{"background":"C4d沉積、內皮損傷→抗體媒介性排斥(AMR)。治療:血漿置換(A)、IVIG(B)、anti-CD20(rituximab,D)。anti-IL2受體單株抗體(basiliximab)用於T細胞媒介排斥之誘導/預防,非AMR治療,最不適當。","options":{"A":"血漿置換,適當。","B":"IVIG,適當。","C":"對(即答案)：anti-IL2R用於T細胞排斥。","D":"rituximab,適當。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（抗體媒介排斥治療）","Brenner & Rector’s The Kidney, 11e（AMR therapy）"]}},"111020-25":{"quick":"正解(B)：此結晶(草酸鈣)之處置「不需」調整尿液酸鹼值。","detail":{"background":"尿路結石結晶判讀:若為草酸鈣結晶(信封狀/啞鈴狀),其溶解度與尿pH關係不大,故「不需調整尿pH」(B)。低鈣飲食「不」建議(反增草酸吸收,A錯);tiopronin/penicillamine用於胱胺酸石(C);高劑量維生素C增草酸(D錯)。","options":{"A":"低鈣飲食不建議(增草酸)。","B":"對：草酸鈣不需調尿pH。","C":"tiopronin用於胱胺酸石。","D":"高劑量維生素C增草酸石。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎結石/結晶判讀）","Brenner & Rector’s The Kidney, 11e（calcium oxalate stone）"]}},"111020-26":{"quick":"正解(C非常見)：PPI致「腎病範圍蛋白尿」非急性間質性腎炎之常見表現。","detail":{"background":"急性間質性腎炎(AIN)常見:輕度蛋白尿(<1 g)與血尿(A)、Cr上升併FeNa>1(B)、數日至數週發展(原發免疫反應動力學)(D)。AIN多為小量蛋白尿,「腎病範圍蛋白尿」非常見(僅NSAID型偶併微小變化),故C非常見表現。","options":{"A":"輕度蛋白尿+血尿,常見。","B":"FeNa>1,常見。","C":"對(即答案)：腎病範圍蛋白尿非常見。","D":"數日至數週發展,常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（急性間質性腎炎）","Brenner & Rector’s The Kidney, 11e（acute interstitial nephritis）"]}},"111020-27":{"quick":"正解(C為錯)：多囊腎之腦動脈瘤盛行率與「家族史/年齡」相關,非男性<30歲較高。","detail":{"background":"ADPKD為最常見遺傳性腎病(A對);致病基因PKD1(16p)、PKD2(4q)(B對);患者貧血機率較其他末期腎病小、可透析/移植(D對)。腦動脈瘤約3.2–10%,與「動脈瘤/出血家族史與年齡」相關,非「男性且<30歲」較高(C錯)。","options":{"A":"最常見遺傳性腎病,正確。","B":"PKD1/PKD2基因位置,正確。","C":"錯誤(即答案)：與家族史/年齡相關,非男性<30歲。","D":"貧血較少、可透析/移植,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD）","Brenner & Rector’s The Kidney, 11e（intracranial aneurysm in ADPKD）"]}},"111020-28":{"quick":"正解(C)：膜性腎病最易發生血栓併發症(腎靜脈栓塞/PE/DVT)。","detail":{"background":"原發性腎病症候群中以「膜性腎病(MN)」最易血栓(尿失antithrombin III、高凝),尤其腎靜脈栓塞。","options":{"A":"MPGN較少。","B":"FSGS較少。","C":"對：膜性腎病最易血栓。","D":"微小變化較少。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎病症候群高凝）","Brenner & Rector’s The Kidney, 11e（membranous & thrombosis）"]}},"111020-30":{"quick":"正解(B為錯)：重症AKI病人不應「低蛋白飲食」延緩透析,應給足夠蛋白。","detail":{"background":"AKI處置:非出血性休克用等張晶體(A對);體液足夠時呋洛西米壓力試驗可預測AKI惡化/需透析(C對);不建議低劑量多巴胺預防AKI(D對)。重症AKI(尤其CRRT)蛋白流失多,應給「足夠蛋白」(~1.0–1.7 g/kg),不應以低蛋白延緩透析(B錯)。","options":{"A":"等張晶體,正確。","B":"錯誤(即答案)：重症應給足夠蛋白,非低蛋白延緩透析。","C":"呋洛西米壓力試驗預測,正確。","D":"不用低劑量多巴胺,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI營養/處置）","Brenner & Rector’s The Kidney, 11e（AKI nutrition）","KDIGO AKI"]}},"111020-78":{"quick":"正解(C最不適當)：血液透析對嚴重高血鈣「有效」(可用低鈣透析液),非效果有限。","detail":{"background":"惡性腫瘤(鼻咽癌)高血鈣(16):校正鈣=16+0.8×(4−2.9)≈16.88(A對);心電圖QT縮短(B對);calcitonin起效比bisphosphonate快(D對)。對「難治/危急」高血鈣,血液透析(低鈣透析液)「有效」,故C「效果有限」最不適當。","options":{"A":"校正鈣16.88,正確。","B":"QT縮短,正確。","C":"對(即答案)：HD對嚴重高血鈣有效。","D":"calcitonin較bisphosphonate快,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血鈣治療）","Brenner & Rector’s The Kidney, 11e（hypercalcemia/dialysis）"]}},"111080-01":{"quick":"正解(A)：尿滲透壓450(高張)＋多尿→溶質性利尿。","detail":{"background":"多尿(3500 mL)且尿滲透壓450(>300高張)→溶質性(滲透性)利尿(高血糖、高尿素、輸鹽等)。水分利尿(尿崩/多飲)尿滲透壓應低(<150–300)。","options":{"A":"對：溶質性利尿(尿高張)。","B":"原發性多飲尿滲透壓低。","C":"中樞性尿崩尿滲透壓低。","D":"腎源性尿崩尿滲透壓低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（多尿鑑別）","Brenner & Rector’s The Kidney, 11e（solute diuresis）"]}},"111080-25":{"quick":"正解(A非特徵)：「明顯蛋白能量營養不良」非馬兜鈴酸腎病之臨床特徵。","detail":{"background":"馬兜鈴酸腎病臨床特徵:快速進展腎衰竭(B)、上泌尿道泌尿上皮癌(C)、貧血程度不成比例(嚴重)(D)。明顯蛋白能量營養不良(A)非其特徵。","options":{"A":"對(即答案)：營養不良非特徵。","B":"快速進展,是。","C":"上泌尿道泌尿上皮癌,是。","D":"貧血不成比例,是。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（馬兜鈴酸腎病）","Brenner & Rector’s The Kidney, 11e（aristolochic acid nephropathy）"]}},"111080-27":{"quick":"正解(D最不適合)：妊娠禁用ACEi(致畸/胎兒腎毒),不可用於降蛋白尿/預防子癇前症。","detail":{"background":"IgA腎病孕婦高血壓:methyldopa、長效CCB、labetalol皆安全。ACEi妊娠禁用(致畸、胎兒腎發育不良、羊水過少),不可用於「降蛋白尿/預防子癇前症」,最不適合。","options":{"A":"methyldopa安全。","B":"長效CCB安全。","C":"labetalol安全。","D":"對(即答案)：ACEi妊娠禁用。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（妊娠高血壓）","Brenner & Rector’s The Kidney, 11e（ACEi in pregnancy）"]}},"111080-28":{"quick":"正解(C為錯)：collapsing型FSGS預後「較差」,非較好。","detail":{"background":"FSGS:以血尿、高血壓、各程度蛋白尿與腎功能不全表現,腎功能不全/大量蛋白尿者預後差(A對);病灶在皮質髓質交界,切片過淺易誤為微小變化(B對);續發性FSGS治療針對根本原因、不需類固醇(D對)。「collapsing型」FSGS為侵襲性、預後「最差」(故C「較好預後」為錯)。","options":{"A":"腎功能不全/大量蛋白尿預後差,正確。","B":"切片過淺易誤為MCD,正確。","C":"錯誤(即答案)：collapsing型預後最差。","D":"續發性針對病因、不需類固醇,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（FSGS）","Brenner & Rector’s The Kidney, 11e（collapsing FSGS）"]}},"111080-29":{"quick":"正解(D；本題C、D均給分)：集尿管經ADH(vasopressin)增加對水的通透性。","detail":{"background":"抗利尿激素(ADH/vasopressin)作用於「集尿管」(及遠端後段)的V2受體→插入aquaporin-2水通道,增加水通透性、濃縮尿液。本題官方公告C(遠曲小管)、D(集尿管)均給分。近端與亨利氏環下行枝對水通透但非ADH調控。","options":{"A":"近端對水通透但非ADH調控。","B":"亨利氏環下行枝非ADH調控。","C":"(亦給分)遠曲小管後段亦有作用。","D":"對：集尿管(V2/aquaporin-2)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADH/水通道）","Brenner & Rector’s The Kidney, 11e（aquaporin-2/collecting duct）","考選部更正：C、D均給分"]}},"111080-30":{"quick":"正解(D)：multiple myeloma或既有腎臟病者較易發生顯影劑腎病變。","detail":{"background":"(D)多發性骨髓瘤或既有CKD者較易顯影劑腎病變,正確。(A)ROS主要傷害「腎小管」非腎絲球;(B)Cr於「3–5天」達高峰、7–10天恢復(非10–14天高峰);(C)顯影劑種類/劑量與損傷程度「相關」。","options":{"A":"錯：ROS傷害腎小管非腎絲球。","B":"錯：高峰3–5天、7–10天恢復。","C":"錯：種類/劑量與嚴重度相關。","D":"對：骨髓瘤/既有腎病較易發生。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（顯影劑腎病變）","Brenner & Rector’s The Kidney, 11e（contrast nephropathy risk）"]}},"112020-03":{"quick":"正解(C)：脫水、皮膚乾癟、頸靜脈低陷、高血鈉→低血容積性休克。","detail":{"background":"獨居老人多日未進食、皮膚乾癟、眼眶凹陷、頸靜脈低陷、高血鈉(155)、輕度氮血症→低血容積性休克(脫水)。心因性休克/填塞有頸靜脈「怒張」;過敏有暴露史/蕁麻疹。","options":{"A":"心因性休克頸靜脈怒張。","B":"過敏有暴露/蕁麻疹。","C":"對：低血容積性休克。","D":"心包填塞頸靜脈怒張。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（休克鑑別）","Brenner & Rector’s The Kidney, 11e（hypovolemia）"]}},"112020-25":{"quick":"正解(D)：N-acetylcysteine療效不一致,目前不例行推薦。","detail":{"background":"(D)NAC預防顯影劑腎病臨床常用但療效「不一致」,目前不例行推薦,正確。(A)需透析者<1%(非2–7%);(B)生理食鹽水應於顯影「前」開始;(C)碳酸氫鈉非僅前1小時即足。","options":{"A":"錯：需透析者<1%。","B":"錯：食鹽水應顯影前開始。","C":"錯：碳酸氫鈉非僅前1小時。","D":"對：NAC不例行推薦。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（顯影劑腎病預防）","Brenner & Rector’s The Kidney, 11e（contrast nephropathy）","PRESERVE試驗"]}},"112020-26":{"quick":"正解(A)：高血鈣(3.45 mmol/L≈13.8 mg/dL)致譫妄→生理食鹽水水化＋利尿劑。","detail":{"background":"頸部淋巴結、譫妄、高血鈣(Ca 3.45 mmol/L)→惡性腫瘤高血鈣危象。處置先「等張食鹽水大量水化」恢復容積、再加loop利尿劑促尿鈣排泄(必要時bisphosphonate/calcitonin)。非緊急透析(僅難治/腎衰時)、非給葡萄糖鎮靜、非補鈣。","options":{"A":"對：食鹽水水化+利尿劑。","B":"透析僅難治/腎衰時。","C":"葡萄糖+鎮靜無助且危險。","D":"補鈣會惡化高血鈣。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血鈣危象）","Brenner & Rector’s The Kidney, 11e（hypercalcemia treatment）"]}},"112020-27":{"quick":"正解(B)：台灣末期腎病最主要原發病為糖尿病腎病變。","detail":{"background":"台灣末期腎病(透析)最主要原發疾病為「糖尿病腎病變」,其次慢性腎絲球腎炎、高血壓腎病變。","options":{"A":"高血壓腎病變次之。","B":"對：糖尿病腎病變。","C":"慢性腎絲球腎炎次之。","D":"中草藥腎病非最主要。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（末期腎病流行病學）","台灣腎病年報"]}},"112020-28":{"quick":"正解(C)：MAHA+血小板低+AKI但ADAMTS13正常(>15%)→非典型HUS,用eculizumab。","detail":{"background":"感染後微血管病性溶血(MAHA)、血小板低、AKI,且ADAMTS13「正常(>15%)」→排除TTP,為補體媒介之非典型溶血性尿毒症候群(aHUS)。治療為補體C5抑制劑eculizumab。bortezomib(骨髓瘤)、rituximab/IVIG非aHUS首選。","options":{"A":"bortezomib用於骨髓瘤。","B":"rituximab非aHUS首選。","C":"對：eculizumab(aHUS)。","D":"IVIG非aHUS首選。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（非典型HUS）","Brenner & Rector’s The Kidney, 11e（complement-mediated TMA）","eculizumab"]}},"112020-29":{"quick":"正解(B為錯)：CKD貧血為鐵「缺乏/利用不良」,非鐵儲存過多。","detail":{"background":"CKD貧血原因:EPO相對缺乏(A)、合併出血傾向(C)、慢性發炎(hepcidin升高使鐵利用不良)(D)。體內鐵「儲存過多」非CKD貧血原因(反而常缺鐵/功能性缺鐵),故B錯。","options":{"A":"EPO相對缺乏,正確。","B":"錯誤(即答案)：應為鐵缺乏/利用不良。","C":"合併出血,正確。","D":"慢性發炎,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD貧血）","Brenner & Rector’s The Kidney, 11e（anemia of CKD）"]}},"112020-30":{"quick":"正解(D最不適當)：單純eGFR 6而無尿毒症狀,非緊急透析適應症。","detail":{"background":"緊急血液透析適應症:藥物無效之高血鉀、對利尿劑無反應之急性肺水腫、碳酸氫鈉無法矯正之酸中毒、尿毒症狀。單純eGFR 6「不論有無症狀」皆透析(D)最不適當——無症狀者不需緊急透析(IDEAL試驗)。","options":{"A":"難治高血鉀,適應症。","B":"難治急性肺水腫,適應症。","C":"難治酸中毒,適應症。","D":"對(即答案)：無症狀eGFR 6非緊急適應症。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析適應症）","Brenner & Rector’s The Kidney, 11e（dialysis indications）","IDEAL"]}},"112020-38":{"quick":"正解(B)：感冒藥後溶血、咬細胞、Coombs陰性、反覆發作→G6PD缺乏。","detail":{"background":"服藥(氧化壓力)後急性溶血:血球抹片「咬細胞(bite cells)/水泡細胞」、網狀紅血球升、間接膽紅素升、LDH升、Coombs陰性、幼時亦曾發作→G6PD缺乏(X-連鎖,氧化藥物/蠶豆誘發)。深茶色尿為血紅素尿(非腎絲球血尿,鏡檢無紅血球)。","options":{"A":"自體免疫溶血Coombs陽性。","B":"對：G6PD缺乏。","C":"急性腎絲球腎炎應有變形紅血球/管型。","D":"急性肝炎不致咬細胞/溶血。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（G6PD缺乏）","Williams Hematology"]}},"112020-77":{"quick":"正解(D最不適當)：甲狀腺亢進週期性癱瘓之尿Ca/P比應「>1.7」,非<1.6。","detail":{"background":"低血鉀:心電圖QTc延長、U波(A);嚴重可致心房顫動/torsades(B)。甲狀腺毒性週期性麻痺(鉀移入細胞)之輔助診斷為spot尿「鈣/磷比偏高(>1.7)」,故D「<1.6作為診斷佐證」為錯(方向相反)。(註:hyperaldosteronism為腎性失鉀、TTKG應「高」(>7),C敘述亦有疑義,但本題鍵選D。)","options":{"A":"QTc延長,正確。","B":"AF/torsades,正確。","C":"(敘述有疑義)hyperaldosteronism腎性失鉀TTKG應偏高。","D":"錯誤(即答案)：TPP尿Ca/P應>1.7非<1.6。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鉀/TPP）","Brenner & Rector’s The Kidney, 11e（hypokalemia）","Lin SH等TPP尿Ca/P研究"]}},"112080-01":{"quick":"正解(C最不適當)：低血鈣初步評估不以1,25(OH)₂D為優先。","detail":{"background":"低血鈣(2.05 mmol/L)初步評估應優先:校正白蛋白與磷(A)、PTH(B)、鎂(低鎂致低鈣)(D)。1,25(OH)₂D(C)非首要初步檢查,最不適當。","options":{"A":"白蛋白/磷,優先。","B":"PTH,優先。","C":"對(即答案)：1,25(OH)₂D非首要。","D":"鎂,優先。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鈣評估）","Brenner & Rector’s The Kidney, 11e（hypocalcemia workup）"]}},"112080-03":{"quick":"正解(D最不適當)：此為黃疸(尿色變深=膽紅素尿)評估,驗creatinine最不相關。","detail":{"background":"飲酒、疲倦、尿色變深→疑黃疸(膽紅素尿)。評估應驗總/直接膽紅素(A)、尿膽素原(B)、視診鞏膜/舌下黏膜黃染(C)。驗creatinine(D)與黃疸評估最不相關,最不適當。","options":{"A":"驗膽紅素,適當。","B":"尿膽素原,適當。","C":"視診黃疸,適當。","D":"對(即答案)：creatinine與黃疸無關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（黃疸評估）","Sleisenger肝膽"]}},"112080-05":{"quick":"正解(C最不恰當)：尿酸結石(X光不顯影)用probenecid(促尿酸排泄)會「惡化」結石。","detail":{"background":"兩側腎結石、X光「不顯影(radiolucent)」→尿酸結石。治療:allopurinol(降尿酸)、potassium citrate與sodium bicarbonate(鹼化尿液溶石)。probenecid為「促尿酸排泄」會增加尿中尿酸、惡化尿酸石,最不恰當。","options":{"A":"allopurinol降尿酸,恰當。","B":"potassium citrate鹼化尿液,恰當。","C":"對(即答案)：probenecid促尿酸排泄惡化結石。","D":"sodium bicarbonate鹼化尿液,恰當。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿酸結石治療）","Brenner & Rector’s The Kidney, 11e（uric acid stone）"]}},"112080-24":{"quick":"正解(C最沒助益)：無症狀eGFR 11即「開始透析」對存活率最沒助益。","detail":{"background":"eGFR 11但「無尿毒症狀」之CKD:維持Hb、持續控壓、轉介腎臟科皆有助。無症狀者「提早開始透析」未改善存活(IDEAL試驗),對日後存活率最沒助益。","options":{"A":"維持血色素,有助。","B":"控制血壓,有助。","C":"對(即答案)：無症狀即透析無助存活。","D":"轉介腎臟科,有助。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析時機）","Brenner & Rector’s The Kidney, 11e（dialysis initiation）","IDEAL"]}},"112080-25":{"quick":"正解(B)：tacrolimus最易致移植後高血糖(新發糖尿病)。","detail":{"background":"移植後新發糖尿病(NODAT)以鈣調磷酸酶抑制劑「tacrolimus」致糖尿病性最強(>cyclosporine)。","options":{"A":"cyclosporine致糖尿病性較弱。","B":"對：tacrolimus。","C":"sirolimus致高血脂為主。","D":"MMF致糖尿病性弱。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（NODAT）","Brenner & Rector’s The Kidney, 11e（tacrolimus）"]}},"112080-26":{"quick":"正解(A)：中美洲腎病(Mesoamerican nephropathy)致病機轉尚未證實與DNA損傷有關。","detail":{"background":"與DNA損傷相關之慢性小管間質病變:karyomegalic interstitial nephritis、中草藥(馬兜鈴酸)腎病、巴爾幹地方性腎病(皆與馬兜鈴酸/基因毒性相關)。中美洲腎病(CKDu,與熱壓力/脫水/重複AKI相關)機轉尚未證實與DNA損傷有關。","options":{"A":"對：中美洲腎病非DNA損傷機轉。","B":"karyomegalic IN與DNA損傷相關。","C":"中草藥(馬兜鈴酸)與DNA損傷相關。","D":"巴爾幹腎病與馬兜鈴酸相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（小管間質病變）","Brenner & Rector’s The Kidney, 11e（aristolochic acid/CKDu）"]}},"112080-27":{"quick":"正解(D為錯)：輸尿管結石統合分析未顯示體外震波為「首選」(輸尿管鏡常更佳)。","detail":{"background":"腎結石處置:肌注NSAID治腎絞痛療效可比擬甚至優於鴉片(A對);大量輸液/利尿劑「不」促排石(B對);內科排石療法(α-blocker)降輸尿管痙攣、增排石率(C對)。對輸尿管結石,輸尿管鏡常有較佳清石率,體外震波非一概首選(D錯)。","options":{"A":"NSAID治腎絞痛,正確。","B":"輸液/利尿不促排石,正確。","C":"內科排石療法增排石,正確。","D":"錯誤(即答案)：ESWL非一概首選。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎結石處置）","Brenner & Rector’s The Kidney, 11e（sto
