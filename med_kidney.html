ne management）","AUA/EAU結石指引"]}},"112080-28":{"quick":"正解(A無助)：ADPKD首選降壓應為ACEi/ARB,非鈣離子阻斷劑。","detail":{"background":"延緩ADPKD:囊泡感染用脂溶性抗生素(B)、tolvaptan(C)、低鹽(D)皆有助。降壓「首選ACEi/ARB」(非CCB),血壓目標<130/80(年輕者HALT-PKD更嚴格),故A「第一線用CCB、目標140/90」無助/不當。","options":{"A":"對(即答案)：首選應為ACEi/ARB非CCB。","B":"脂溶性抗生素治囊泡感染,有助。","C":"tolvaptan,有助。","D":"低鹽,有助。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD治療）","Brenner & Rector’s The Kidney, 11e（RAAS/tolvaptan）","HALT-PKD"]}},"112080-29":{"quick":"正解(B為錯)：約30–40%糖尿病人發生糖尿病腎病變,非僅20%。","detail":{"background":"糖尿病腎病變:台灣最常見CKD病因(A對);危險因子含RAAS基因多型性(C對);視網膜病變與Kimmelstiel-Wilson結節強相關(D對)。約30–40%糖尿病人會發生腎病變(B「20%」低估,為錯)。","options":{"A":"台灣最常見CKD病因,正確。","B":"錯誤(即答案)：約30–40%,非20%。","C":"RAAS基因多型性,正確。","D":"視網膜病變與KW結節相關,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變流行病學）","Brenner & Rector’s The Kidney, 11e（diabetic nephropathy）"]}},"112080-30":{"quick":"正解(A)：VEGF-A/Kdr未參與「前腎小管聚合期」(屬血管新生)。","detail":{"background":"腎絲球-腎小管發育之前腎小管聚合期(pretubular aggregation)由Wnt4、Emx2、Fgf8等基因調控(誘導間質-上皮轉換)。VEGF-A/Kdr屬「血管新生/腎絲球微血管」訊號,未參與前腎小管聚合期。","options":{"A":"對：VEGF-A/Kdr屬血管新生,未參與。","B":"Wnt4參與。","C":"Emx2參與。","D":"Fgf8參與。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎臟發育生物學）","Brenner & Rector’s The Kidney, 11e（nephrogenesis）"]}},"112080-40":{"quick":"正解(B)：第四期腎細胞癌全身藥物常用標靶axitinib(TKI)。","detail":{"background":"轉移性(第四期)腎細胞癌全身治療:抗血管新生酪胺酸激酶抑制劑(如axitinib、sunitinib)、免疫檢查點抑制劑、mTOR抑制劑。doxorubicin(化療)無效;trastuzumab為HER2乳癌;sipuleucel-T為攝護腺癌疫苗。","options":{"A":"doxorubicin化療無效。","B":"對：axitinib(TKI)。","C":"trastuzumab為HER2乳癌。","D":"sipuleucel-T為攝護腺癌。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（轉移性腎細胞癌）","NCCN腎細胞癌"]}},"112080-64":{"quick":"正解(D不宜)：MRSA對oxacillin(methicillin類)抗藥,不宜使用。","detail":{"background":"透析病人MRSA肺炎:可用vancomycin、teicoplanin、linezolid。oxacillin為抗葡萄球菌青黴素,MRSA(methicillin抗藥)對其抗藥,不宜使用。","options":{"A":"vancomycin可用。","B":"teicoplanin可用。","C":"linezolid可用。","D":"對(即答案)：MRSA對oxacillin抗藥。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（MRSA治療）","IDSA MRSA指引"]}},"113020-24":{"quick":"正解(A)：長期血液透析血管通路優先選擇「動靜脈瘻管(AVF)」。","detail":{"background":"血液透析血管通路優先順序:自體動靜脈瘻管(AVF)>人工血管(AVG)>隧道式導管>非隧道式導管(AVF感染/血栓率最低、長期通暢佳)。應提早建立AVF(需數週至數月成熟)。","options":{"A":"對：動靜脈瘻管(AVF)優先。","B":"人工血管次之。","C":"雙腔導管為暫時。","D":"隧道式導管為次選。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析血管通路）","KDOQI血管通路指引"]}},"113020-25":{"quick":"正解(D為錯)：類固醇對AIN「長期腎臟存活」之改善未明確證實。","detail":{"background":"急性間質性腎炎(AIN):發燒/紅疹/嗜伊紅三聯徵僅少數藥物過敏者出現(A對);尿見膿尿、白血球圓柱體、顯微血尿(B對);病史清楚常不需切片(C對)。類固醇「可能加速」腎功能恢復,但改善「長期腎臟存活」之證據不足(D「並改善長期腎臟存活」過度,為錯)。","options":{"A":"三聯徵僅少數,正確。","B":"膿尿/白血球圓柱體,正確。","C":"病史清楚常不需切片,正確。","D":"錯誤(即答案)：長期腎存活改善未明確證實。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（急性間質性腎炎）","Brenner & Rector’s The Kidney, 11e（AIN）"]}},"113020-26":{"quick":"正解(C非典型)：逆流性腎病變為「不對稱」疤痕萎縮,非對稱性萎縮。","detail":{"background":"成人逆流性腎病變:幼時常尿床/重複泌尿道感染(A);進展CKD後僅輕度蛋白尿、沉渣無異常(B);積極控壓延緩惡化(D)。影像為「不對稱、局部疤痕、輪廓不規則」之萎縮,故C「對稱性萎縮」非典型(為錯)。","options":{"A":"幼時尿床/重複UTI,典型。","B":"輕度蛋白尿、沉渣正常,典型。","C":"對(即答案)：應為不對稱疤痕非對稱萎縮。","D":"控壓延緩惡化,典型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（逆流性腎病變）","Brenner & Rector’s The Kidney, 11e（reflux nephropathy）"]}},"113020-27":{"quick":"正解(B最不須)：腎衰竭併「姿勢性低血壓」傾向容積不足(腎前性),最不須考慮雙側阻塞。","detail":{"background":"雙側尿路阻塞之線索:無尿之AKI(A)、氮血症併代謝性酸中毒與高血鉀(第四型RTA型,C)、後天性腎因性尿崩(D)。腎衰竭併「姿勢性低血壓」提示「容積不足(腎前性)」,最不須將雙側阻塞納入鑑別。","options":{"A":"無尿→考慮阻塞。","B":"對(即答案)：姿勢性低血壓→腎前性,最不須。","C":"酸中毒+高鉀→可阻塞。","D":"後天腎因性尿崩→可阻塞。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（阻塞性腎病）","Brenner & Rector’s The Kidney, 11e（obstruction differential）"]}},"113020-28":{"quick":"正解(B最不可能)：FSGS非狼瘡腎炎之病理分型。","detail":{"background":"狼瘡腎炎病理:瀰漫增生(class IV,內皮下沉積、新月體)、膜性(class V,上皮下沉積)等。局部節段性腎絲球硬化(FSGS)非狼瘡腎炎分型,最不可能出現。","options":{"A":"瀰漫增生(IV),可能。","B":"對(即答案)：FSGS非狼瘡分型。","C":"膜性(V),可能。","D":"內皮增生+新月體,可能。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎分型）","Brenner & Rector’s The Kidney, 11e（lupus nephritis classes）"]}},"113020-29":{"quick":"正解(D)：尿沉渣「顆粒性圓柱體」傾向內生性AKI(ATN)。","detail":{"background":"內生性AKI(ATN)指標:尿見「顆粒性圓柱體(泥棕色)」。FeNa<1%、尿滲透壓>500、BUN/Cr>20皆傾向腎前性。","options":{"A":"FeNa<1%→腎前性。","B":"尿滲透壓>500→腎前性。","C":"BUN/Cr>20→腎前性。","D":"對：顆粒性圓柱體→內生性(ATN)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI鑑別）","Brenner & Rector’s The Kidney, 11e（granular casts）"]}},"113020-30":{"quick":"正解(A為錯)：CKD貧血為EPO「不足」,非過多。","detail":{"background":"CKD貧血原因:EPO相對「缺乏」(非過多,A錯)、鐵利用不良(B)、出血傾向(C)、慢性發炎(D)。","options":{"A":"錯誤(即答案)：EPO不足非過多。","B":"鐵利用不良,正確。","C":"出血傾向,正確。","D":"慢性發炎,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD貧血）","Brenner & Rector’s The Kidney, 11e（anemia of CKD）"]}},"113020-35":{"quick":"正解(C最無幫助)：肺部電腦斷層對此SLE確診最無幫助。","detail":{"background":"22歲反覆發燒、多關節腫痛、下肢水腫、全血球減少(WBC 3200、Hb 10、plt 56000)、蛋白尿、雙側肋膜積水→疑全身性紅斑狼瘡(SLE)。確診應驗ANA(A)、抗磷脂抗體(B)、腎切片(D,評估狼瘡腎)。肺部電腦斷層(C)對SLE確診最無幫助。","options":{"A":"ANA,有幫助。","B":"抗磷脂抗體,有幫助。","C":"對(即答案)：肺部CT最無幫助。","D":"腎切片,有幫助。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（SLE診斷）","Brenner & Rector’s The Kidney, 11e（lupus diagnosis）","ACR/EULAR SLE準則"]}},"113070-04":{"quick":"正解(B)：頸部前彎引發髖膝自主屈曲為Brudzinski徵象(腦膜刺激)。","detail":{"background":"透析病人嗜睡疑腦膜炎/CNS感染:被動將頸部前彎時,髖與膝自主屈曲→Brudzinski徵象(腦膜刺激)。Kernig為屈髖伸膝引發疼痛阻力;Babinski為足底反射;Trendelenburg為髖外展肌無力。","options":{"A":"Babinski為足底反射。","B":"對：Brudzinski徵象。","C":"Kernig為伸膝阻力。","D":"Trendelenburg為髖外展肌測試。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腦膜刺激徵象）"]}},"113070-24":{"quick":"正解(C)：透析開始數分鐘之胸/背痛、續行漸消→透析器反應,更換透析器材質。","detail":{"background":"血液透析「開始數分鐘」出現胸/背痛、隨透析進行漸消、血壓穩定無發燒→透析器(首次使用/B型)反應。處置以「更換不同材質透析器」(改用生物相容性膜)最可能改善。","options":{"A":"無肝素針對出血風險。","B":"增加乾體重無關。","C":"對：更換透析器材質。","D":"鈉模式針對透析中低血壓/抽筋。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析器反應）","Brenner & Rector’s The Kidney, 11e（dialyzer reaction）"]}},"113070-25":{"quick":"正解(B最不適合)：benzbromarone為「促尿酸排泄」會增加尿尿酸、惡化尿酸石。","detail":{"background":"尿酸性結石治療:減少蛋白攝取、potassium citrate鹼化尿液、降尿酸(febuxostat/allopurinol)。benzbromarone為「促尿酸排泄(uricosuric)」會增加尿中尿酸、惡化尿酸石,最不適合。","options":{"A":"減蛋白飲食,適合。","B":"對(即答案)：benzbromarone促尿酸排泄惡化結石。","C":"potassium citrate鹼化,適合。","D":"febuxostat降尿酸,適合。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿酸結石）","Brenner & Rector’s The Kidney, 11e（uric acid stone）"]}},"113070-26":{"quick":"正解(D)：小腎、不成比例嚴重貧血、輕度蛋白尿、糖尿、小管間質病理→馬兜鈴酸腎病。","detail":{"background":"33歲、緩慢進展腎衰竭、貧血嚴重且不成比例(Hb 9→7)、兩腎縮小(~8.7/8.9 cm)、輕度蛋白尿(980 mg)、尿糖(近端小管受損)、沉渣乾淨、病理小管間質病變→馬兜鈴酸(中草藥)腎病。骨髓瘤有單株蛋白;過敏間質腎炎為急性;慢性尿酸腎病有痛風史。","options":{"A":"骨髓瘤有單株蛋白/Bence-Jones。","B":"過敏間質腎炎為急性、有藥物史。","C":"慢性尿酸腎病有痛風史。","D":"對：馬兜鈴酸腎病。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（馬兜鈴酸腎病）","Brenner & Rector’s The Kidney, 11e（aristolochic acid nephropathy）"]}},"113070-27":{"quick":"正解(B)：C肝＋蛋白尿＋低補體→膜增殖性腎絲球腎炎(MPGN,冷凝球蛋白型)。","detail":{"background":"C型肝炎帶原、蛋白尿2.5 g、水腫、補體C3/C4偏低→膜增殖性腎絲球腎炎(MPGN,常為冷凝球蛋白血症型)。膜性/FSGS/HSP補體多正常。","options":{"A":"膜性補體正常。","B":"對：MPGN(冷凝球蛋白)。","C":"FSGS補體正常。","D":"HSP補體正常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（HCV相關腎炎）","Brenner & Rector’s The Kidney, 11e（cryoglobulinemic MPGN）"]}},"113070-28":{"quick":"正解(B)：緻密斑(macula densa)在亨利氏環上行枝粗管,感應管腔NaCl濃度與流速。","detail":{"background":"腎小管腎絲球回饋(TGF):亨利氏環上行枝粗管之「緻密斑」感應管腔NaCl濃度/流速,經調控「入球」小動脈張力維持GFR。A(出球)、C(出球收縮)皆錯(應為入球);訊號分子為「腺苷(adenosine)」非ADP(D錯)。","options":{"A":"錯：TGF調控入球非出球。","B":"對：緻密斑於上行枝粗管感應NaCl。","C":"錯：高NaCl→入球收縮(非出球)。","D":"錯：訊號為adenosine非ADP。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（管球回饋）","Brenner & Rector’s The Kidney, 11e（tubuloglomerular feedback）"]}},"113070-29":{"quick":"正解(C最不適當)：鹼化尿液反「促進」磷酸鈣沉澱,不建議。","detail":{"background":"腫瘤溶解症候群:細胞釋放→高尿酸、高血鉀、高血磷(A);大量水化＋rasburicase降尿酸(B);寡尿/高鉀時透析(D)。「鹼化尿液」雖助尿酸溶解,但會「促進磷酸鈣沉澱」加重AKI,現已不建議常規鹼化(故C「鹼化能減少磷酸鈣沉澱」為錯)。","options":{"A":"高尿酸/鉀/磷,正確。","B":"水化+rasburicase,正確。","C":"對(即答案)：鹼化反促磷酸鈣沉澱。","D":"寡尿/高鉀可透析,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腫瘤溶解症候群）","Brenner & Rector’s The Kidney, 11e（TLS management）"]}},"113070-30":{"quick":"正解(B為錯)：cyclosporine造成「高」尿酸血症(非低)。","detail":{"background":"移植藥副作用:類固醇→骨鬆(A);tacrolimus→移植後糖尿病(C);sirolimus→蛋白尿/高血脂(D)。cyclosporine會造成「高尿酸血症」與痛風(減少尿酸排泄),故B「低尿酸血症」為錯。","options":{"A":"類固醇→骨鬆,正確。","B":"錯誤(即答案)：cyclosporine致高尿酸非低。","C":"tacrolimus→移植後糖尿病,正確。","D":"sirolimus→蛋白尿,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（移植藥副作用）","Brenner & Rector’s The Kidney, 11e（cyclosporine hyperuricemia）"]}},"114020-02":{"quick":"正解(C最不適當)：腎絲球性血尿不需IVP/逆行性腎盂攝影。","detail":{"background":"變形紅血球＋紅血球管型＋蛋白尿→腎絲球性血尿。應做血清學(補體、cryoglobulin、anti-GBM、ANCA、ASLO、VDRL、HIV)、肝炎血清學、腎超音波±腎切片。IVP/逆行性腎盂攝影為「泌尿道(下尿路/腫瘤)」影像,對腎絲球性血尿最不適當。","options":{"A":"血清學,適當。","B":"肝炎血清學,適當。","C":"對(即答案)：IVP/RP用於泌尿道。","D":"腎超音波±切片,適當。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎絲球性血尿評估）","Brenner & Rector’s The Kidney, 11e（glomerular hematuria）"]}},"114020-24":{"quick":"正解(C最不適當)：高通透性腹膜應用「短留滯」,延長留滯反而失超過濾、加重體液過多。","detail":{"background":"高腹膜通透性(high transporter)病人:葡萄糖快速被吸收→「長留滯」會喪失滲透梯度、超過濾下降。解決體液過多應「短留滯」(增加交換次數)、提高葡萄糖濃度(A)、用icodextrin(不易吸收,維持超過濾,B)、改CCPD(短留滯,D)。延長留滯時間(C)最不適當。","options":{"A":"提高葡萄糖濃度,適當。","B":"icodextrin維持超過濾,適當。","C":"對(即答案)：延長留滯失超過濾。","D":"CCPD短留滯,適當。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腹膜透析高通透性）","Brenner & Rector’s The Kidney, 11e（PET/high transporter）","ISPD"]}},"114020-25":{"quick":"正解(D)：口腔潰瘍＋蛋白尿＋高血脂→sirolimus(mTOR抑制劑)。","detail":{"background":"移植換藥3週後口腔潰爛、新發蛋白尿、高LDL→sirolimus(mTOR抑制劑)典型副作用(口腔潰瘍、蛋白尿、高血脂、傷口癒合差)。cyclosporine/tacrolimus為腎毒/糖尿病;MMF為腸胃/血液。","options":{"A":"cyclosporine為腎毒/高血壓。","B":"tacrolimus為糖尿病/神經毒。","C":"MMF為腸胃/骨髓抑制。","D":"對：sirolimus(口腔潰瘍/蛋白尿/高血脂)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（mTOR抑制劑副作用）","Brenner & Rector’s The Kidney, 11e（sirolimus）"]}},"114020-26":{"quick":"正解(B為錯)：Fabry為X-連鎖,「父親」帶因時兒子不會發病(兒子得Y),女兒全為帶因者。","detail":{"background":"Fabry病(α-galactosidase A缺乏,X-連鎖):各人種皆有(A);臨床以家族史、肢端疼痛、血管角質瘤、角膜渦狀混濁、尿/組織脂質細胞為基礎,確診以白血球酵素活性+基因(C);治療含症狀治療與酵素替代(D)。X-連鎖:「父親」患病→其X給女兒→女兒「全部帶因」、兒子得Y「不會發病」,故B「兒子會發病」為錯。","options":{"A":"各人種皆有、α-Gal A缺陷,正確。","B":"錯誤(即答案)：父親患病兒子不發病、女兒全帶因。","C":"診斷依酵素活性/基因,正確。","D":"症狀治療+酵素替代,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（Fabry病/X-連鎖遺傳）","Brenner & Rector’s The Kidney, 11e（Fabry disease）"]}},"114020-27":{"quick":"正解(C為錯)：TTP為ADAMTS13活性「<10%」,>15%不能診斷TTP。","detail":{"background":"血栓性微血管病(TMA):需血小板低＋MAHA(LDH升、haptoglobin降、抹片schistocyte)(A對);臨床有神經/腎/腸胃症狀(B對);TTP可用血漿置換+類固醇(D對)。TTP之ADAMTS13活性「嚴重缺乏(<10%)」,故C「>15%可診斷TTP」為錯(>15%反而排除TTP)。","options":{"A":"TMA診斷條件,正確。","B":"臨床表現,正確。","C":"錯誤(即答案)：TTP為ADAMTS13<10%。","D":"TTP用血漿置換+類固醇,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（TMA/TTP）","Brenner & Rector’s The Kidney, 11e（ADAMTS13）"]}},"114020-28":{"quick":"正解(B)：腎小管腎絲球回饋(TGF)為GFR自我調節機轉之一。","detail":{"background":"GFR自我調節三因素:肌源性反射(作用於「入球」小動脈)、腎小管腎絲球回饋(TGF)、(部分)腎神經/Ang II。(B)TGF正確。(A)肌源反射作用於入球非出球;(C)Ang II主要收縮「出球」非入球;(D)前列腺素擴張「入球」非出球。","options":{"A":"錯：肌源反射作用於入球。","B":"對：TGF。","C":"錯：Ang II收縮出球。","D":"錯：前列腺素擴張入球。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（GFR自我調節）","Brenner & Rector’s The Kidney, 11e（autoregulation）"]}},"114020-29":{"quick":"正解(A最不適當)：台灣新發透析最主要原發病為「糖尿病」,非高血壓。","detail":{"background":"(A)台灣新發長期透析最主要原發病為「糖尿病腎病變」(非高血壓),故最不適當。(B)糖尿病CKD血壓<130/80;(C)CKD最常見死因為心血管疾病;(D)低蛋白飲食改善尿毒症狀但增營養不良風險,皆正確。","options":{"A":"對(即答案)：應為糖尿病非高血壓。","B":"糖尿病CKD<130/80,正確。","C":"心血管為最常死因,正確。","D":"低蛋白改善尿毒但增營養不良,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD流行病學）","台灣腎病年報"]}},"114020-40":{"quick":"正解(A為錯)：腎細胞癌最常見組織型為「透明細胞型」,非乳突型。","detail":{"background":"腎細胞癌:最常見為「透明細胞型(clear cell)」(非乳突型,A錯);可因骨轉移或副腫瘤(PTHrP)致高血鈣(B對);第一/二期標準治療為根除性或部分腎切除(C對);腎功能不良/單腎者可考慮腎元保留手術(D對)。","options":{"A":"錯誤(即答案)：最常見為透明細胞型。","B":"骨轉移/副腫瘤致高血鈣,正確。","C":"第一/二期手術切除,正確。","D":"單腎/腎功能差可腎元保留,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎細胞癌）","Brenner & Rector’s The Kidney, 11e（renal cell carcinoma）"]}},"114020-72":{"quick":"正解(D為錯)：eGFR 56仍可使用metformin(eGFR<30才停)。","detail":{"background":"58歲糖尿病、eGFR 56、UACR 380→CKD第3a期、A2(B對);較eGFR 40/UACR 28者進展ESRD風險高(A對,白蛋白尿更高);NSAID惡化CKD(C對)。metformin於eGFR≥30仍可使用(eGFR 45–59可續用、<30才停),故D「不應繼續使用metformin」為錯。","options":{"A":"白蛋白尿較高風險較高,正確。","B":"CKD第3a期,正確。","C":"NSAID惡化CKD,正確。","D":"錯誤(即答案)：eGFR 56仍可用metformin。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD分期/metformin）","Brenner & Rector’s The Kidney, 11e（metformin in CKD）","KDIGO"]}},"114020-74":{"quick":"正解(C)：KUB顯示廣泛腎鈣化(putty kidney)→晚期腎結核。","detail":{"background":"腎功能不良、KUB顯示「廣泛斑塊狀/全腎鈣化(自截腎putty kidney)」→晚期腎結核(乾酪化鈣化)。水腎為集尿系統擴張、腎膿瘍為局部、腎細胞癌為實質腫塊,影像不同。","options":{"A":"水腎為集尿系統擴張。","B":"腎膿瘍為局部病灶。","C":"對：晚期腎結核(全腎鈣化)。","D":"腎細胞癌為實質腫塊。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎結核）","Brenner & Rector’s The Kidney, 11e（renal tuberculosis）"]}},"114070-67":{"quick":"正解(C為錯)：疑腎細胞癌「不」常規經皮穿刺切片(種植風險),多直接手術。","detail":{"background":"腎實質腫瘤:低回音、中心不均質→疑腎細胞癌(A);高回音含脂肪→血管平滑肌脂肪瘤(良性)(B);疑良性可追蹤(D)。疑腎細胞癌時「不」常規經皮穿刺切片(腫瘤種植風險、影像多可診斷),多直接手術切除,故C為錯。","options":{"A":"低回音不均質疑RCC,正確。","B":"高回音含脂肪為AML,正確。","C":"錯誤(即答案)：疑RCC不常規穿刺切片。","D":"疑良性可追蹤,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎腫瘤評估）","Brenner & Rector’s The Kidney, 11e（renal mass）"]}},"114070-70":{"quick":"正解(B)：Weigert-Meyer法則—引流「上端」腎臟之輸尿管開口於膀胱「下內側」。","detail":{"background":"雙套輸尿管Weigert-Meyer法則:引流「上極(upper pole)」之輸尿管開口位於膀胱「下方且內側(下內側)」(常異位、易阻塞/形成輸尿管囊腫);引流「下極」之輸尿管開口於上外側、易膀胱輸尿管逆流。","options":{"A":"錯：上極輸尿管開口為下內側非上外側。","B":"對：上極輸尿管開口下內側。","C":"下極輸尿管易逆流(非只有它,且方向相反)。","D":"三套輸尿管不一定皆適用。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（雙套輸尿管/Weigert-Meyer）","Brenner & Rector’s The Kidney, 11e（duplicated ureter）"]}},"115020-07":{"quick":"正解(B為錯)：高血壓相關腦中風「大部分為腦梗塞」,非腦出血。","detail":{"background":"高血壓器官損傷:致左心室肥大、心衰竭、心律不整(含心房顫動)(A);與老年認知障礙/失智相關(C);腎損傷與收縮壓關係較舒張壓密切(D)。高血壓為腦中風最強危險因子,但「大部分為缺血性(腦梗塞)」,僅少數為腦出血,故B「大部分腦出血」為錯。","options":{"A":"致LVH/心衰竭/AF,正確。","B":"錯誤(即答案)：大部分為腦梗塞非腦出血。","C":"與認知障礙相關,正確。","D":"腎損傷與收縮壓較密切,正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血壓器官損傷）","AHA/ASA中風指引"]}},"115020-12":{"quick":"正解(D)：尿酸與高血壓致病機轉探索「最無相關」。","detail":{"background":"高血壓致病機轉探索之血液檢查:肌酸酐(腎性高血壓)、鉀(原發性醛固酮增多)、甲狀腺素(甲亢致續發性高血壓)。尿酸與高血壓致病機轉之探索最無直接相關。","options":{"A":"肌酸酐(腎性)相關。","B":"鉀(醛固酮)相關。","C":"甲狀腺素(續發性)相關。","D":"對：尿酸最無相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（續發性高血壓評估）","Brenner & Rector’s The Kidney, 11e（secondary HTN workup）"]}},"115020-18":{"quick":"正解(D)：肝移植為肝腎症候群最有效治療,可恢復腎功能。","detail":{"background":"肝腎症候群(HRS):為「功能性」腎衰竭(腎切片無明顯結構病變,A錯);機轉為內臟血管擴張致有效循環不足、「腎血管收縮、腎血流下降」(B錯);治療用terlipressin+白蛋白(非利尿劑/血管擴張劑,C錯)。肝臟移植為最有效治療、可恢復腎功能(D對)。","options":{"A":"錯：HRS為功能性,切片無明顯病變。","B":"錯：為腎血管收縮、腎血流下降。","C":"錯：用terlipressin+白蛋白非利尿/血管擴張。","D":"對：肝移植最有效、可恢復腎功能。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（肝腎症候群）","Brenner & Rector’s The Kidney, 11e（hepatorenal syndrome）","AASLD/EASL"]}},"115020-24":{"quick":"正解(A最不常見)：慢性腎臟病最不常見「高血鈉」。","detail":{"background":"CKD常見:高血磷、次發性副甲狀腺亢進、貧血、高血鉀、低血鈣、代謝性酸中毒。高血鈉最不常見(CKD多水分滯留致等鈉/低鈉)。","options":{"A":"對(即答案)：高血鈉最不常見。","B":"高血磷常見。","C":"次發性副甲狀腺亢進常見。","D":"貧血常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD併發症）","Brenner & Rector’s The Kidney, 11e（CKD complications）"]}},"115020-25":{"quick":"正解(A)：腎移植後1個月內最易「口腔念珠菌感染」。","detail":{"background":"移植後感染時序:第1個月以院內感染、手術相關、黏膜皮膚念珠菌(口腔)、HSV為主;CMV、肺囊蟲(PCP)、BK病毒多在1–6個月之伺機性感染期。","options":{"A":"對：口腔念珠菌於第1個月。","B":"CMV於1–6個月。","C":"PCP於1–6個月。","D":"BK病毒於1–6個月。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（移植後感染時序）","Brenner & Rector’s The Kidney, 11e（post-transplant infection）"]}},"115020-26":{"quick":"正解(D)：感染後腎絲球腎炎常伴C3下降,可與IgA腎病(補體正常)區分。","detail":{"background":"感染後腎絲球腎炎:(D)常伴C3補體下降,可與IgA腎病(補體正常)之急性發作區分,正確。(A)肉眼血尿但無血塊敘述非重點;(B)典型為「鏈球菌」咽炎/皮膚感染後1–3週(非葡萄球菌咽炎);(C)抗生素「不能逆轉或縮短」已發生之腎炎病程(支持療法為主)。","options":{"A":"血塊敘述非鑑別重點。","B":"錯：典型為鏈球菌感染後1–3週。","C":"錯：抗生素不能逆轉腎炎病程。","D":"對：C3下降可與IgA腎病區分。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（感染後腎絲球腎炎）","Brenner & Rector’s The Kidney, 11e（post-infectious GN）"]}},"115020-29":{"quick":"正解(D為錯)：矯正Hb至「正常(≥13)」反增死亡/心血管事件,不改善死亡率。","detail":{"background":"腎性貧血:正球正色素(A);可致虛弱、運動耐受差、心衰竭、認知異常(B);主因EPO不足(C)。將Hb矯正至「正常(≥13)」反而「增加」死亡與心血管事件(TREAT/CHOIR/CREATE),故D錯,目標約10–11.5 g/dL。","options":{"A":"正球正色素,正確。","B":"症狀,正確。","C":"主因EPO不足,正確。","D":"錯誤(即答案)：Hb≥13反增死亡/心血管事件。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎性貧血/ESA目標）","Brenner & Rector’s The Kidney, 11e（anemia of CKD）","TREAT/CHOIR"]}},"115020-30":{"quick":"正解(B)：糖尿病CKD使用SGLT2抑制劑可有效延緩腎功能衰退。","detail":{"background":"(B)糖尿病CKD使用SGLT2抑制劑(canagliflozin/dapagliflozin)可延緩腎功能衰退(CREDENCE/DAPA-CKD),正確。(A)CKD高血壓首選ACEi/ARB(非β-blocker);(C)不建議ACEi+ARB併用(ONTARGET);(D)腎病症候群不宜高蛋白飲食(增腎絲球負荷),應適度限蛋白。","options":{"A":"錯：首選ACEi/ARB非β-blocker。","B":"對：SGLT2抑制劑延緩腎衰退。","C":"錯：不建議ACEi+ARB併用。","D":"錯：腎病症候群不宜高蛋白飲食。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD治療/SGLT2i）","Brenner & Rector’s The Kidney, 11e（SGLT2 inhibitors）","CREDENCE/DAPA-CKD"]}},"115020-37":{"quick":"正解(C)：高劑量methotrexate毒性(濃度高、AKI)→增加leucovorin劑量至50–100 mg/m²解救。","detail":{"background":"高劑量MTX後黏膜炎、骨髓抑制、MTX濃度偏高(>10⁻⁷ M)、AKI、酸性尿(MTX結晶)→延遲清除毒性。應「增加leucovorin(folinic acid)劑量(50–100 mg/m²)」加強解救,並水化、鹼化尿液、(必要時glucarpidase)。不可停leucovorin(A錯);folic acid無法解救(需folinic acid,B錯);glutamine非解救(D錯)。","options":{"A":"錯：不可停leucovorin。","B":"錯：folic acid無法解救,需folinic acid。","C":"對：增加leucovorin至50–100 mg/m²。","D":"錯：L-glutamine非MTX解救。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高劑量MTX毒性/leucovorin解救）","DeVita腫瘤學"]}}},TO=["腎絲球疾病(腎炎/腎病症候群)", "慢性腎臟病/尿毒症", "急性腎損傷(AKI)", "腎小管間質與RTA", "水電解質異常(鈉鉀鈣磷鎂/水)", "酸鹼平衡異常", "透析與腎移植", "高血壓/腎血管疾病", "感染/結石/阻塞", "囊性/遺傳性腎病", "腎細胞癌/腫瘤", "腎臟生理/藥理/腎毒性"],LEC={"腎絲球疾病(腎炎/腎病症候群)":{"title":"腎絲球疾病（腎炎症候群／腎病症候群）","html":"<h4>一、兩大症候群框架</h4>\n<p><b>腎病症候群（nephrotic）</b>：蛋白尿>3.5 g/day、低白蛋白、水腫、高血脂；尿沉渣乾淨。<b>腎炎症候群（nephritic）</b>：血尿（<b>變形性紅血球／紅血球圓柱體</b>）、蛋白尿較輕、高血壓、少尿、AKI。判斷血尿來源是否為腎絲球，看<b>尿沉渣紅血球形態（dysmorphic RBC）</b>，不需做 IVP/逆行性腎盂攝影。</p>\n<h4>二、腎病症候群常見病理與關鍵連結</h4>\n<ul>\n<li><b>微小變化腎病（MCD）</b>：年輕人、大量蛋白尿、光鏡正常、補體正常；與<b>何杰金氏淋巴瘤</b>最相關。</li>\n<li><b>膜性腎病（MN）</b>：成人原發腎病症候群、<b>最易血栓（腎靜脈栓塞／PE／DVT）</b>。腎病症候群血栓好發於<b>腎「靜脈」</b>。</li>\n<li><b>FSGS</b>：collapsing 型預後較差。</li>\n<li><b>糖尿病腎病變</b>：第2型最早期表現為腎絲球<b>超過濾（hyperfiltration，GFR>120）</b>，接著微量白蛋白尿（早期篩檢首選）；新診斷第2型可能已有微量白蛋白尿；約30–40%糖尿病人會發生。</li>\n</ul>\n<h4>三、腎炎症候群與系統性疾病</h4>\n<ul>\n<li><b>感染後腎絲球腎炎</b>：<b>鏈球菌</b>最常見；上呼吸道感染後1–2週、<b>低 C3</b>、上皮下駝峰狀沉積；GPA/IgA 腎病補體正常可資鑑別。</li>\n<li><b>IgA 腎病</b>：上呼吸道感染「同步」血尿、系膜 IgA 沉積、補體正常。</li>\n<li><b>狼瘡腎炎</b>：與 <b>anti-dsDNA</b> 最相關（也是活性指標）；嚴重第四型誘導治療用 <b>cyclophosphamide 或 mycophenolate（MMF）</b>，併腎功能不足者鈣調磷酸酶抑制劑（cyclosporine）腎毒最不適用；緩解期計畫懷孕維持低劑量類固醇＋hydroxychloroquine。</li>\n<li><b>C 型肝炎</b>：合併<b>膜增殖性腎絲球腎炎（MPGN，冷凝球蛋白型）</b>、低補體；可觸摸紫斑＋周邊神經病變＋蛋白尿→驗<b>冷凝球蛋白</b>。</li>\n<li><b>抗體機轉</b>：Goodpasture 抗體針對 collagen IV 的 <b>α3-NC1</b>。</li>\n</ul>\n<h4>四、血栓性微血管病（TMA）與其他</h4>\n<p>TTP 為 <b>ADAMTS13 活性 <10%</b>（>15% 不可診斷 TTP）；ADAMTS13 正常的 MAHA＋AKI 為非典型 HUS，用 <b>eculizumab</b>；Mitomycin C 可致 HUS。蛋白尿＋貧血＋Bence-Jones 蛋白＋頭顱穿鑿樣病灶＝<b>多發性骨髓瘤</b>（溶骨以 X 光骨骼攝影最佳，骨掃描會漏）。</p>\n<h4>★考點直擊</h4>\n<p>糖尿病＋蛋白尿＋高血壓<b>首選 ACEI/ARB</b>；但用 ACEi 後血壓飆、少尿、Cr 由 1.0→3.5 要<b>立即停藥</b>（疑腎動脈狹窄）。妊娠＋IgA 腎病高血壓<b>禁用 ACEi（致畸）</b>。糖尿病腎病變預防微白蛋白尿 HbA1c 應 <b><7.0%</b>。Cr 9.5＋高血鉀的末期腎病用 ARB 較不適當。</p>"},"慢性腎臟病/尿毒症":{"title":"慢性腎臟病（CKD）與尿毒症","html":"<h4>一、流行病學與血壓目標</h4>\n<p>台灣末期腎病（與新發透析）最主要原發病為<b>糖尿病腎病變</b>（非高血壓）。CKD 最常見死因為<b>心血管疾病</b>。糖尿病合併蛋白尿/CKD 血壓目標 <b><130/80 mmHg</b>，首選 <b>ACEi/ARB</b>（ACEi 擴張出球小動脈→暫時「降低」GFR、升 Cr，屬正常護腎現象）。糖尿病 CKD 用 <b>SGLT2 抑制劑</b>可延緩腎功能下降；eGFR 56 仍可用 metformin（<30 才停）。蛋白尿之第 4 期 CKD 採<b>低蛋白飲食</b>。</p>\n<h4>二、尿毒併發症</h4>\n<ul>\n<li><b>腎性貧血</b>：主因 <b>EPO 不足</b>＋鐵缺乏/利用不良（非鐵過多、非胃腸出血）；小管間質病變比腎絲球病變「較早」出現貧血。矯正 Hb 至正常（≥13）反增心血管事件/死亡，Hb 11.6 已足夠不需給 EPO。</li>\n<li><b>尿毒出血</b>：機轉為<b>血小板凝集功能異常</b>，止血用 <b>estrogen（雌激素）</b>、DDAVP。</li>\n<li><b>CKD-MBD</b>：高磷<b>抑制</b>活性維生素 D；FGF-23 <b>抑制</b> PTH；併低鈣高 PTH 優先給<b>活性維生素 D（calcitriol）</b>，高磷高鈣用<b>磷結合劑</b>。</li>\n<li><b>尿毒性心包積液</b>：呼吸困難＋頸靜脈怒張＋心音微弱＋奇脈→<b>心包膜填塞</b>。</li>\n</ul>\n<h4>三、腎臟替代療法</h4>\n<p>長期存活與生活品質最佳為<b>腎臟移植</b>；血液透析 5 年存活率最差。長期 HD 血管通路優先 <b>動靜脈瘻管（AVF）</b>。單次透析 <b>URR 應 ≥65–70%</b>（60% 不足）。無症狀 eGFR 11 即透析、無症狀 eGFR 6 無尿毒症狀，對存活率最沒助益（依症狀而非單純數字啟動透析）。</p>\n<h4>★考點直擊</h4>\n<p>減緩 CKD 進展<b>無效</b>者：Kayexalate（只降鉀）。CKD 不能用 MgO 降鉀（易高血鎂）。CKD 少見<b>高血鈉</b>。第四型 RTA（低腎素低醛固酮）＝高鉀＋正常 AG（高氯）酸中毒。眼眶紫斑＋肝脾腫大＋腎病範圍蛋白尿＋補體正常→<b>類澱粉症</b>；不成比例嚴重貧血＋小腎＋小管間質病理→<b>馬兜鈴酸腎病</b>。</p>"},"急性腎損傷(AKI)":{"title":"急性腎損傷（AKI）","html":"<h4>一、定義與分型</h4>\n<p><b>KDIGO 2012</b>：48 小時內 Cr 升 ≥0.3 mg/dL，或 7 天內 Cr 升 <b>≥1.5 倍</b>，或尿量 <0.5 mL/kg/hr×6h。三類：腎前性、腎因性（內生性）、腎後性。</p>\n<h4>二、腎前性 vs 內生性（ATN）鑑別</h4>\n<ul>\n<li><b>腎前性</b>：尿濃縮保水，<b>FeNa <1%</b>、<b>UCr/PCr >40</b>、尿沉渣乾淨。</li>\n<li><b>內生性 ATN</b>：<b>FeNa >1%</b>、尿<b>顆粒性圓柱體</b>。注意 CKD 病人 FeNa>1% 不能排除腎前性。</li>\n<li>嘔吐（代謝性鹼中毒、碳酸氫鈉尿使 FeNa 失準）→改用 <b>FeCl（氯排泄分率）</b>鑑別。</li>\n</ul>\n<h4>三、特定病因</h4>\n<ul>\n<li><b>橫紋肌溶解</b>：馬拉松/中暑後茶色尿、CK 大升→積極輸液維持尿量 <b>200–300 mL/hr</b>。</li>\n<li><b>顯影劑腎病</b>：危險因子＝既有腎病、糖尿病、骨髓瘤（肥胖<b>不是</b>）；機轉含外髓質缺氧、自由基、小管阻塞；常呈 FeNa<1%（血管收縮型）；NAC 療效不一致不例行推薦。</li>\n<li><b>腫瘤溶解症候群</b>：水化＋降尿酸；<b>鹼化尿液反促進磷酸鈣沉澱</b>不建議。</li>\n<li><b>高劑量 MTX 毒性</b>→增加 <b>leucovorin 50–100 mg/m²</b> 解救。</li>\n<li><b>肝腎症候群</b>：<b>terlipressin</b>（血管收縮素）治療，<b>肝移植</b>最有效。</li>\n<li>cisplatin＝直接<b>小管毒性</b>（非腎血管）。</li>\n</ul>\n<h4>★考點直擊</h4>\n<p>處置錯誤點：低血容 AKI 不可用 <b>HES（羥乙基澱粉，增 AKI）</b>；重症 AKI 不可低蛋白飲食、應給足夠蛋白；高血鉀急救「快速灌大量生理食鹽水稀釋」<b>無效</b>。產後溶血＋血小板低＋AKI→<b>HUS</b>；糖尿病人 metformin＋AKI＋高 AG pH 7.0→<b>乳酸酸血症（MALA）</b>。</p>"},"腎小管間質與RTA":{"title":"腎小管間質疾病與腎小管酸血症（RTA）","html":"<h4>一、急性間質性腎炎（AIN）</h4>\n<p>常見藥物（抗生素、NSAID、PPI）或感染引起；典型表現發燒、皮疹、嗜伊紅血球/尿，AKI。<b>PPI 引起者不會有腎病範圍蛋白尿</b>（非 AIN 常見表現）；類固醇對長期腎臟存活之效益未明確證實。</p>\n<h4>二、慢性小管間質病變</h4>\n<ul>\n<li><b>馬兜鈴酸腎病（中草藥減肥藥）</b>：貧血<b>嚴重且與腎衰竭程度不成比例</b>，與 DNA 加成物相關；「明顯蛋白能量營養不良」非其特徵。</li>\n<li><b>中美洲腎病</b>：致病機轉尚未證實與 DNA 損傷有關。</li>\n<li><b>逆流性腎病變</b>：<b>不對稱</b>疤痕萎縮（非對稱）。</li>\n<li><b>急性尿酸腎病</b>：尿酸結晶在腎小管/集尿管沉澱致阻塞。</li>\n</ul>\n<h4>三、腎小管功能缺陷與 RTA</h4>\n<p><b>巴特氏症候群（Bartter）</b>：缺陷在<b>亨利氏環粗上升支</b>（似 loop 利尿劑），低鉀代謝性鹼中毒。RTA 屬<b>正常陰離子間隙（高氯）代謝性酸中毒</b>；與腹瀉鑑別用<b>尿陰離子隙</b>（RTA 偏正、腹瀉偏負）。第四型 RTA＝低腎素低醛固酮、高鉀。</p>\n<h4>★考點直擊</h4>\n<p>本主題愛考「何者『不是』典型表現」：PPI→腎病範圍蛋白尿（非 AIN）、馬兜鈴酸→營養不良（非特徵）、逆流性腎病→對稱萎縮（應為不對稱）。記住馬兜鈴酸腎病「貧血嚴重不成比例」是高頻答案。</p>"},"水電解質異常(鈉鉀鈣磷鎂/水)":{"title":"水分與電解質異常（鈉鉀鈣磷鎂）","html":"<h4>一、鉀</h4>\n<ul>\n<li><b>高血鉀原因</b>：酸中毒、組織破壞、低醛固酮；代謝性<b>鹼</b>中毒造成<b>低</b>血鉀（鉀移入細胞），非高血鉀。</li>\n<li><b>甲狀腺毒性週期性麻痺</b>：突發四肢無力＋低鉀＋TSH 抑制／free T4 高；鉀為「移入細胞」非腎性流失，<b>不需大量補鉀</b>（過補恐反彈高鉀）；尿 Ca/P 比 >1.7。低鉀補充用<b>含糖溶液會刺激胰島素使鉀再移入、升鉀效果差</b>。</li>\n</ul>\n<h4>二、鈣</h4>\n<ul>\n<li>thiazide 造成<b>高</b>血鈣（較不會低血鈣）。</li>\n<li><b>嚴重高血鈣</b>（如惡性腫瘤、Ca 16）：<b>生理食鹽水水化＋利尿劑</b>；血液透析（低鈣透析液）對嚴重高血鈣<b>有效</b>。高血鈣鑑別「最無幫助」＝是否用類固醇／環狀利尿劑。低血鈣初步評估不以 1,25(OH)₂D 為優先。</li>\n</ul>\n<h4>三、鈉與水（尿崩 vs 溶質利尿）</h4>\n<ul>\n<li><b>中樞性尿崩</b>：禁水尿滲透壓不升，<b>給 DDAVP 後上升</b>（60→500）。</li>\n<li><b>腎性尿崩</b>：禁水與 DDAVP 後尿滲透壓<b>皆不升</b>；治療用 <b>thiazide＋amiloride</b>。</li>\n<li><b>溶質性利尿</b>：多尿但尿滲透壓偏高張（>300–450）。</li>\n<li>低血鈉過快校正→<b>滲透性大腦去髓鞘（ODS）</b>。心衰可致稀釋性（細胞外液增加）低血鈉。</li>\n</ul>\n<h4>★考點直擊</h4>\n<p>反覆出現的臨床劇本：年輕男性突發下肢無力＋低鉀＋甲狀腺亢進＝<b>甲狀腺毒性週期性麻痺</b>（先驗甲狀腺、勿狂補鉀）。長期多尿＋高血鈉＋DDAVP 後尿濃縮＝中樞尿崩。高血鈣致譫妄＝先 NS 水化。</p>"},"酸鹼平衡異常":{"title":"酸鹼平衡異常","html":"<h4>一、判讀步驟</h4>\n<p>先看 pH（酸/鹼）→PaCO2 與 HCO3 同向為代謝性、反向為呼吸性→代謝性酸中毒算 <b>anion gap（AG＝Na−Cl−HCO3）</b>。</p>\n<h4>二、高 AG vs 正常 AG 代謝性酸中毒</h4>\n<ul>\n<li><b>高 AG</b>：DKA（第一型糖尿病、AG≈23）、乳酸酸中毒、尿毒、中毒（MUDPILES）。</li>\n<li><b>正常 AG（高氯）</b>：腹瀉（失 HCO₃⁻）、RTA。兩者鑑別用<b>尿陰離子隙</b>（最具診斷價值）。</li>\n</ul>\n<h4>三、混合與校正併發症</h4>\n<p>嘔吐→代謝性<b>鹼</b>中毒；Sjögren 之遠端 RTA→代謝性<b>酸</b>中毒（不符鹼中毒題型）。低血鈉（108）過快校正→<b>ODS</b>。糖尿病人 metformin＋意識不清＋高 AG→乳酸酸血症。</p>\n<h4>★考點直擊</h4>\n<p>本主題以「ABG＋電解質配對情境」呈現：抓住 ①pH 方向 ②AG 高低 ③臨床線索（嘔吐＝鹼、腹瀉＝正常 AG 酸、DKA＝高 AG 酸）。鑑別腹瀉與 RTA 一律答<b>尿陰離子隙</b>。</p>"},"透析與腎移植":{"title":"透析與腎臟移植","html":"<h4>一、緊急透析適應症（AEIOU）</h4>\n<p>頑固<b>酸中毒、電解質（高鉀併 EKG 變化）、中毒、容積過多（肺水腫）、尿毒症狀（心包炎/腦病）</b>。單純 BUN 120/Cr 2.5 或 eGFR 6 而<b>無症狀</b>非緊急適應症。</p>\n<h4>二、血液透析（HD）</h4>\n<p>最常見急性併發症為<b>透析中低血壓</b>。透析開始數分鐘胸/背痛、續行漸消＝<b>透析器（dialyzer）反應</b>→更換透析器材質。</p>\n<h4>三、腹膜透析（PD）</h4>\n<ul>\n<li>CAPD 為<b>每日</b>多次交換；白蛋白流失<b>較 HD 多</b>。</li>\n<li>腹膜炎最常見<b>革蘭氏陽性菌</b>；<b>黴菌（念珠菌）性腹膜炎要拔導管</b>。</li>\n<li>高通透性腹膜應<b>短留滯</b>（延長留滯反失超過濾、加重水腫）。</li>\n</ul>\n<h4>四、腎移植</h4>\n<ul>\n<li>末期腎病<b>最佳治療</b>＝腎移植。</li>\n<li><b>抗排斥藥副作用</b>：tacrolimus→<b>移植後新發糖尿病（NODAT）</b>；cyclosporine→<b>高</b>尿酸血症；sirolimus（mTOR）→高血脂、蛋白尿、口腔潰瘍（非高尿酸）。</li>\n<li><b>排斥</b>：C4d 沉積、內皮損傷＝抗體媒介排斥→血漿置換＋IVIG（anti-IL2R 用於 T 細胞排斥預防/誘導，非抗體媒介）。</li>\n<li><b>伺機性感染時序</b>：移植後 1 個月內以 <b>HSV／口腔念珠菌</b>為主。</li>\n</ul>\n<h4>★考點直擊</h4>\n<p>藥物副作用配對是必考：tacrolimus＝高血糖、cyclosporine＝高尿酸、sirolimus＝蛋白尿/高血脂/口腔潰瘍。PD 腹膜炎＝G(+)菌、黴菌要拔管。高鉀併 EKG 變化是急症，「等待下次 PD」最不優先。</p>"},"高血壓/腎血管疾病":{"title":"高血壓與腎血管疾病","html":"<h4>一、CKD 與糖尿病腎病的降壓首選</h4>\n<p>CKD 合併高血壓、糖尿病腎病變延緩腎衰竭，首選<b>ACEi/ARB（RAAS 阻斷）</b>，兼具降蛋白尿護腎作用。</p>\n<h4>二、續發性高血壓——原發性醛固酮增多症</h4>\n<p>年輕／頑固高血壓＋<b>低鉀＋代謝性鹼中毒＋低腎素＋高醛固酮（ACTH 正常）</b>＝<b>原發性醛固酮增多症（Conn）</b>，本主題反覆出現的劇本。</p>\n<h4>三、高血壓器官損傷</h4>\n<p>高血壓相關腦中風<b>大多為腦梗塞</b>（非腦出血）。探討高血壓致病機轉時，<b>尿酸最無相關</b>。</p>\n<h4>★考點直擊</h4>\n<p>看到「低鉀＋鹼中毒＋高血壓」→醛固酮增多症；CKD/糖尿病降壓→ACEi/ARB；高血壓中風型態→以梗塞為主。</p>"},"感染/結石/阻塞":{"title":"泌尿道感染、結石與尿路阻塞","html":"<h4>一、泌尿道感染</h4>\n<ul>\n<li><b>急性腎盂腎炎</b>：發燒、肋脊角痛、膿尿；神經性膀胱/留置導尿者反覆發作。</li>\n<li>尿培養 <b>E. coli</b> 為真感染；血培養單瓶 <b>S. epidermidis</b> 多為污染→治 E. coli。</li>\n<li>養護機構、長期導尿、<b>ESBL 大腸桿菌</b>菌血症→靜脈 <b>carbapenem（ertapenem）</b>。</li>\n<li>水災後發燒、黃疸、AKI→<b>鉤端螺旋體病</b>，用 penicillin G。</li>\n</ul>\n<h4>二、結石</h4>\n<ul>\n<li><b>Struvite（磷酸銨鎂）</b>：鹿角狀結石、尿 pH 鹼（8.5）、<b>Proteus</b>（產尿素酶）。</li>\n<li><b>草酸鈣結石</b>：處置<b>不需</b>調整尿液酸鹼。</li>\n<li><b>尿酸結石（X 光不顯影）</b>：鹼化尿液溶石；<b>promoting 尿酸排泄藥（probenecid／benzbromarone）會惡化</b>結石，最不適合。</li>\n<li>輸尿管結石統合分析未顯示體外震波為「首選」（輸尿管鏡常更佳）。</li>\n</ul>\n<h4>三、尿路阻塞</h4>\n<p>合併問題不含<b>低血壓</b>；KUB 廣泛腎鈣化（putty kidney）→<b>晚期腎結核</b>；腎衰竭併<b>姿勢性低血壓</b>傾向容積不足（腎前性），最不須考慮雙側阻塞。</p>\n<h4>★考點直擊</h4>\n<p>結石成分→處置配對：struvite＝Proteus 鹼性尿；尿酸石＝鹼化尿、禁排尿酸藥；草酸鈣＝不調 pH。發燒＋肋脊角痛＝腎盂腎炎；水災＋黃疸 AKI＝鉤端螺旋體。</p>"},"囊性/遺傳性腎病":{"title":"囊性與遺傳性腎臟病","html":"<h4>一、成人型多囊腎（ADPKD）</h4>\n<p><b>體染色體顯性</b>遺傳（非性聯、非隱性）；雙腎多發大小不一囊泡、家族史。合併<b>腦動脈瘤</b>（盛行率與家族史/年齡相關）。延緩進展首選降壓為 <b>ACEi/ARB</b>（鈣離子阻斷劑無助）；tolvaptan 可用。</p>\n<h4>二、Fabry disease</h4>\n<p><b>X-連鎖</b>（α-galactosidase A 缺乏）；<b>父親帶因時兒子不發病</b>（兒子得 Y 染色體），女兒全為帶因者。</p>\n<h4>三、輸尿管發育異常</h4>\n<p><b>Weigert-Meyer 法則</b>：雙套輸尿管中，引流<b>上端</b>腎臟之輸尿管開口於膀胱<b>下內側</b>（易阻塞、易膨出）；下端腎引流者開口偏上外側（易逆流）。</p>\n<h4>★考點直擊</h4>\n<p>遺傳模式是必考：ADPKD＝體染色體顯性、Fabry＝X-連鎖。ADPKD 降壓選 ACEi/ARB、注意腦動脈瘤。Weigert-Meyer：上極輸尿管→下內側開口。</p>"},"腎細胞癌/腫瘤":{"title":"腎細胞癌與腎臟腫瘤","html":"<h4>一、組織型與基因</h4>\n<p>腎細胞癌最常見組織型為<b>透明（亮）細胞型</b>（非乳突型）；<b>透明細胞型與 VHL 基因</b>突變/低表現相關。</p>\n<h4>二、診斷與治療</h4>\n<ul>\n<li>疑腎細胞癌<b>不</b>常規經皮穿刺切片（種植風險），多直接手術。</li>\n<li>第四期：<b>化學治療無效</b>；全身治療以<b>標靶 TKI（如 axitinib）</b>、免疫治療為主。</li>\n<li>轉移癌之神經病變性疼痛（尖銳灼熱）→ <b>gabapentin</b>。</li>\n</ul>\n<h4>★考點直擊</h4>\n<p>記住三點：①最常見＝透明細胞型 ②與 VHL 相關 ③第四期化療無效、用標靶/免疫。疑診不穿刺、直接手術。</p>"},"腎臟生理/藥理/腎毒性":{"title":"腎臟生理、藥理與腎毒性","html":"<h4>一、生理重點</h4>\n<ul>\n<li>過濾液之<b>重碳酸（HCO₃⁻）大部分在近端腎小管</b>回收。</li>\n<li>腎臟分泌的荷爾蒙：EPO、活性維生素 D、renin；<b>aldosterone 由腎上腺皮質</b>製造（非腎臟）。</li>\n<li><b>GFR 自主調控</b>：抑制小管腺苷→入球小動脈擴張（管球回饋）。</li>\n</ul>\n<h4>二、水腫機轉</h4>\n<p>單側下肢水腫常因<b>靜脈或淋巴阻塞</b>；全身性水腫看血漿膠體滲透壓（低白蛋白）、鈉水滯留。</p>\n<h4>★考點直擊</h4>\n<p>「何者『不是』腎臟製造的荷爾蒙」常考 aldosterone（答案）。重碳酸回收主要在近端小管。GFR 自主調控靠管球回饋與肌源性反應。</p>"}};
const $=s=>document.querySelector(s);

yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';if(LEC[t]&&!kw){h+='<div class="lec"><details open><summary>📘 複習講義：'+esc(LEC[t].title)+'</summary>'+LEC[t].html+'</details></div>';}h+=tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));

const PKEY='med_kidney_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
