全(秩序)」屬社會控制。故 C 正確。(對照:守護社區安全=社會控制;鄰里互助照顧=相互支援。)","options":{"A":"生產-分配-消費是經濟功能。","B":"社會化是傳遞價值與規範。","C":"正確。守望相助、加強社區安全(維持秩序)，是社會控制。","D":"相互支援是相互扶持、提供協助。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"109030-N5-54":{"quick":"居民提升認知並願意改變(種檳榔)維生方式＝總結性評價(成果)。","detail":{"background":"經社區健康營造後，社區居民「提升口腔癌與檳榔使用的認知，也「願意改變」以種植檳榔維生的方式」——這是評價計畫「結束後的「成果(認知與行為改變)」」，屬(B)『「總結性評價(summative evaluation，在計畫「結束時」評估其「成果與成效」)」』。形成性評價、過程評價是「計畫進行「中」」的評價;結構評價是評估結構面。本題是「營造「之後」的成果」，故為總結性評價。故 B 正確。總結性評價是計畫結束時評估其成果。","options":{"A":"形成性評價是計畫進行中的評價。","B":"正確。營造之後的成果(認知與行為改變)，是總結性評價。","C":"結構評價是評估結構面(人力、設備、制度)。","D":"過程評價是計畫進行中的評價。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"109030-N5-55":{"quick":"了解居民與正式/非正式領導人物的互動＝政府與政治次系統。","detail":{"background":"依 Anderson & McFarlane 社區為夥伴模式，「了解居民與社區中「正式與非正式領導人物」的互動情形」——屬(C)『「政府與政治(government and politics)次系統(社區的權力結構、領導者、決策、政治參與等)」』。健康及社會服務是醫療福利;溝通是訊息傳播;教育是學校教育。「領導人物、權力互動」屬政府與政治次系統。故 C 正確。社區的領導者與權力互動屬政府與政治次系統。","options":{"A":"健康及社會服務次系統是醫療福利資源。","B":"溝通次系統是訊息傳播管道。","C":"正確。居民與領導人物的互動，屬政府與政治次系統。","D":"教育次系統是學校教育。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"109030-N5-56":{"quick":"社區健康評估的診斷期步驟＝歸納資料要點①、解釋與組織資料②、陳述社區健康問題③、設立優先順序④(確認目標⑤、訂策略⑥、確認預算⑦屬計畫期)。","detail":{"background":"社區健康評估的「診斷期」應包括:(1)歸納資料要點;(2)解釋與組織資料;(3)陳述社區健康問題(確認問題);(4)設立社區健康問題的優先順序。而(5)確認目標、(6)訂定達成目標的策略與行動、(7)確認預算與進度，屬於「「計畫期(planning)」」的步驟。故診斷期為①②③④(選 A)。診斷期:歸納分析資料→確認健康問題→排定優先順序;計畫期:訂目標、策略、預算。","options":{"A":"正確。歸納資料要點①、解釋組織資料②、陳述健康問題③、設立優先順序④。","B":"2345：含⑤(確認目標)，屬計畫期。","C":"3456：含⑤⑥，屬計畫期。","D":"4567：含⑤⑥⑦，屬計畫期。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"109030-N5-59":{"quick":"提升民眾健康識能的三項策略「錯誤」者＝擴大巡迴醫療服務、提升就醫可近性。","detail":{"background":"國民健康署提升民眾「健康識能(health literacy)」的三項策略，「錯誤」者為(A)『「擴大「巡迴醫療服務」、提升民眾「就醫」可近性」』——錯誤，「巡迴醫療、就醫可近性」是「「醫療「服務」的可近性」」，而非「提升「健康識能(獲取、理解、運用健康資訊的能力)」」的策略。其他正確的健康識能策略:B 評估訊息需求及傳播管道、提升健康「資訊」的可近性;C 發展健康識能評估工具、依區域及族群特性採取傳播策略;D 擴大預防保健服務、協助做健康決策。故本題選錯誤者為 A。健康識能著重健康「資訊與決策能力」，非醫療服務可近性。","options":{"A":"正確(本題選錯誤者)。巡迴醫療、就醫可近性是醫療服務的可近性，非健康識能策略。","B":"評估訊息需求、提升健康資訊可近性，是健康識能策略。","C":"發展健康識能評估工具、依族群採傳播策略，是健康識能策略。","D":"擴大預防保健、協助做健康決策，是健康識能策略。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","健康識能"]}},"109030-N5-61":{"quick":"群體醫療執業中心「錯誤」者＝該中心設於當地的私人診所內。","detail":{"background":"群體醫療執業中心(群醫中心)的敘述，「錯誤」者為(B)『該中心「設於當地的「私人診所」內」』——錯誤，群醫中心是「「設於當地的「衛生所」內(由公部門主導，整合醫療人力深入偏遠地區)」」，而非私人診所。其他正確:A 設立目的為提供山地、離島、偏遠地區民眾較好的醫療服務品質;C 該中心以門診業務為主;D 其設置標準為人口數在10萬人以下的鄉鎮。故本題選錯誤者為 B。群醫中心設於衛生所，非私人診所。","options":{"A":"設立目的為提供偏遠地區較好的醫療品質，正確。","B":"正確(本題選錯誤者)。群醫中心設於衛生所，非私人診所。","C":"以門診業務為主，正確。","D":"設置標準為人口10萬人以下的鄉鎮，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"109030-N5-69":{"quick":"提升懷孕新住民健康識能「較不適當」者＝舉辦各種國家傳統服飾表演。","detail":{"background":"社區護理師為提升懷孕新住民的「健康識能」，「較不適當」者為(D)『「舉辦各種國家傳統服飾表演」』——「服飾表演」是「文化交流活動」，「與「提升健康識能(獲取、理解、運用健康資訊的能力)」無直接關係」。其他較適當(有助健康識能):A 提供雙語的媽媽健康手冊(克服語言、獲取健康資訊);B 鼓勵參加國語班學習中文(增進語言、減少資訊障礙);C 鼓勵參加新住民媽媽教室(學習孕產育兒知識)。故本題選較不適當者為 D。傳統服飾表演與提升健康識能無直接關係。","options":{"A":"提供雙語媽媽健康手冊，有助健康識能。","B":"學習中文減少資訊障礙，有助健康識能。","C":"參加新住民媽媽教室學習孕產知識，有助健康識能。","D":"正確(本題選較不適當者)。傳統服飾表演與提升健康識能無直接關係。"},"sources":["社區衛生護理學(新文京/華杏)·新住民照護"]}},"109110-N5-41":{"quick":"政府對偏鄉醫療照護的措施＝建構偏鄉數位資訊醫療照護網絡及電子病歷。","detail":{"background":"政府對偏鄉醫療照護提供的措施，正確的是(B)『「建構偏鄉「數位資訊醫療照護網絡及電子病歷」(以「遠距醫療、資訊化」克服偏鄉醫療資源不足與就醫不便)」』。其他錯誤:A『朝「病人動、醫師不動」的方向』錯誤(偏鄉應「「醫師動(巡迴/到點)、減少病人舟車勞頓」」，而非要病人移動);C『「基層醫療院所」支援陸海空緊急醫療後送』不符(緊急後送由緊急醫療體系負責);D『積極新建「離島醫學中心」』不切實際(離島人口少，不需也難以維持醫學中心)。故 B 正確。偏鄉醫療以遠距資訊化、巡迴醫療等方式提供服務。","options":{"A":"偏鄉應「醫師動(巡迴)」、減少病人舟車勞頓，非「病人動」。","B":"正確。建構偏鄉數位資訊醫療照護網絡及電子病歷。","C":"緊急醫療後送由緊急醫療體系負責，非基層醫療院所。","D":"離島人口少，新建醫學中心不切實際。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"109110-N5-42":{"quick":"孕期婦女加強葉酸攝取＝三段五級的「第二級(特殊保護)」。","detail":{"background":"孕期婦女「加強葉酸攝取(以「預防胎兒「神經管缺損」」)」——屬三段五級的(B)『「第二級(特殊保護;針對特定疾病/危害，採取「特定的防護措施」，如補充營養素、疫苗)」』。第一級是健康促進(一般性);第三級是早期診斷;第四級是限制殘障。「補充葉酸以特定預防神經管缺損」屬特殊保護(第二級)。故 B 正確。孕期補充葉酸預防神經管缺損屬第二級(特殊保護)。","options":{"A":"第一級是健康促進(一般性的健康增進)。","B":"正確。加強葉酸以預防神經管缺損，屬第二級(特殊保護)。","C":"第三級是早期診斷早期治療。","D":"第四級是限制殘障。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"109110-N5-47":{"quick":"社區增能(empower)「錯誤」者＝是由上而下的決策行動過程。","detail":{"background":"社區增能(empowerment)的描述，「錯誤」者為(A)『是「由上而下」的決策行動過程』——錯誤，增能強調「「由「下而上」(社區/民眾自主、參與、發聲)」」的過程，而非「由上而下(專家/政府主導)」。其他正確:B 是一種平等的權力關係;C 是一種平等式的互動與對話;D 是民眾主動參與社區健康相關活動。故本題選錯誤者為 A。增能是由下而上、平等、民眾自主參與的過程。","options":{"A":"正確(本題選錯誤者)。增能是由下而上，非由上而下。","B":"是一種平等的權力關係，正確。","C":"是一種平等式的互動與對話，正確。","D":"是民眾主動參與社區健康相關活動，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","賦權增能"]}},"109110-N5-48":{"quick":"全民健保「錯誤」者＝未繳交保費者，健保卡即被鎖卡。","detail":{"background":"全民健保的敘述，「錯誤」者為(D)『「未繳交保費者，健保卡「即」被鎖卡」』——錯誤，欠費「並非「立即」鎖卡」;健保有「「寬限期、分期攤還、特定弱勢補助」」等保障措施，且依規定對「弱勢者不予鎖卡」、就醫權益受保障。其他正確:A 屬於強制性的社會保險制度;B 基本理念為危險共同分擔;C 採財務獨立制、自給自足。故本題選錯誤者為 D。欠費並非立即鎖卡，有寬限、分期、補助等保障。","options":{"A":"屬於強制性的社會保險制度，正確。","B":"基本理念為危險共同分擔，正確。","C":"採財務獨立制、自給自足，正確。","D":"正確(本題選錯誤者)。欠費並非立即鎖卡，有寬限、分期、補助等保障。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"109110-N5-49":{"quick":"社會資源運用的原則「不是優先考量」者＝民意代表的意見。","detail":{"background":"社會資源運用的原則中，「不是優先考量」的項目是(B)『「民意代表的意見」』——資源的運用應以「「社區/團體的「需要」、資源的「合理分配」、資源的「質量與持續性」」」為依據，而非「以「民意代表的意見」為優先(以政治考量左右資源分配，會違背公平與需求導向)」。其他是應優先考量的:A 社區或團體的需要;C 資源的質量與持續性;D 資源的合理分配。故本題選不是優先考量者為 B。資源運用應以需求、合理分配、質量持續性為依據，非民意代表的意見。","options":{"A":"社區或團體的需要，是優先考量。","B":"正確(本題選不是優先者)。不應以民意代表的意見為優先。","C":"資源的質量與持續性，是優先考量。","D":"資源的合理分配，是優先考量。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"109110-N5-50":{"quick":"蒐集居民對問題的了解及解決動機、有助排優先序＝民意團體過程。","detail":{"background":"要「蒐集社區居民「對社區問題的了解及解決的動機」，有助於排定執行的優先次序」——適合用(B)『「民意團體過程(召集居民，透過團體討論，了解其對問題的認知、解決意願，並凝聚優先順序的共識)」』。問卷調查是量化資料;擋風玻璃式調查是觀察環境;文獻查證是查文獻。「了解居民的認知與動機+排優先序(需團體互動與共識)」用民意團體過程。故 B 正確(與前述同類題一致)。","options":{"A":"問卷調查收集量化資料，較難了解動機與凝聚共識。","B":"正確。蒐集居民的了解與動機、排優先序，用民意團體過程。","C":"擋風玻璃式調查是觀察環境。","D":"文獻查證是查閱文獻。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"109110-N5-51":{"quick":"依 Freeman 預防效果優先處理＝登革熱。","detail":{"background":"某社區高血壓、腦中風、登革熱、心臟病的盛行/死亡率皆高。依弗里門(Freeman)「「預防效果」」決定優先次序，應優先處理(C)『「登革熱」』——登革熱是「「傳染病」，「可透過防治措施(疫調、孳生源清除、防蚊)有效預防、且具急迫的傳播風險」」，「預防效果」最顯著。高血壓、腦中風、心臟病是「慢性病」，預防/改善較緩、效果較慢。故 C 正確。傳染病(登革熱)的預防效果與急迫性使其優先處理。","options":{"A":"高血壓是慢性病，預防效果較緩。","B":"腦中風是慢性病的合併症，預防效果較緩。","C":"正確。登革熱(傳染病)可有效預防、有急迫性，預防效果最顯著。","D":"心臟病是慢性病，預防效果較緩。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"109110-N5-55":{"quick":"社區護理師在推動健康促進計畫的角色「最不適當」者＝主要擔任研究者，為民眾規劃、執行與評價。","detail":{"background":"社區護理師推動健康促進計畫的角色，「最不適當」者為(B)『「主要擔任「研究者」角色，「為」民眾「規劃、執行與評價」健康促進計畫」』——錯誤，健康促進強調「「與民眾「共同」規劃、賦權社區」」，護理師應是「「協助、夥伴」」，而非「以研究者角色「替」民眾規劃執行(由上而下、民眾被動)」。其他適當:A 進行社區健康評估、與民眾共同確認需求;C 運用實證為基礎的健康促進策略;D 善用機會參與健康政策制訂。故本題選最不適當者為 B。健康促進應與民眾共同規劃，而非替民眾規劃。","options":{"A":"進行評估、與民眾共同確認需求，適當。","B":"正確(本題選最不適當者)。應與民眾共同規劃，非以研究者角色替民眾規劃。","C":"運用實證為基礎的健康促進策略，適當。","D":"善用機會參與健康政策制訂，適當。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"110030-N5-47":{"quick":"愛滋病三段五級防治「錯誤」者＝把「鼓勵孕婦接受產前檢查」歸為初段預防(應為次段)。","detail":{"background":"愛滋病三段五級防治的敘述，「錯誤」者為(B)『「「初段」預防:鼓勵孕婦接受產前檢查(篩檢)」』——錯誤，「產前檢查/篩檢」是「「早期發現、早期診斷」」，屬「「次段(第二段)預防」」，而非初段預防。其他正確:A 初段預防:與愛滋病人討論家庭計畫或育兒計畫(預防母嬰垂直感染、特殊保護);C 次段預防:鼓勵伴侶接受檢驗(早期發現);D 三段預防:使用抗病毒藥物的雞尾酒療法(治療、限制殘障)。故本題選錯誤者為 B。產前檢查(篩檢)屬次段預防，非初段。","options":{"A":"初段預防:與愛滋病人討論家庭/育兒計畫(特殊保護)，正確。","B":"正確(本題選錯誤者)。產前檢查(篩檢)屬次段預防，非初段。","C":"次段預防:鼓勵伴侶接受檢驗(早期發現)，正確。","D":"三段預防:使用雞尾酒療法(治療)，正確。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"110030-N5-50":{"quick":"社區資源：有形資源-財力②、有形資源-物力④、無形資源-社區意識⑤(人力是有形①、凝聚力是無形③，配對錯)。","detail":{"background":"社區資源的正確配對:(2)「有形資源-財力(金錢、經費)」;(4)「有形資源-物力(設施、設備、物資)」;(5)「無形資源-社區意識(認同、價值、凝聚力等精神層面)」。而(1)『「無形資源-人力」』錯誤——「人力」是「「有形」資源」;(3)『「有形資源-社區凝聚力」』錯誤——「社區凝聚力」是「「無形」資源」。故正確配對為②④⑤(選 D)。有形資源:人力、財力、物力;無形資源:社區意識、凝聚力、文化規範。","options":{"A":"124：含①(無形-人力，人力是有形)，錯誤。","B":"135：含①③配對錯，錯誤。","C":"234：含③(有形-凝聚力，凝聚力是無形)，錯誤。","D":"正確。有形-財力②、有形-物力④、無形-社區意識⑤。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"110030-N5-51":{"quick":"排定社區健康問題優先序，應優先處理＝社區發現5位麻疹個案。","detail":{"background":"社區護理師排定優先序時，應「優先處理」的是(B)『「社區發現5位麻疹個案」』——麻疹是「「高傳染性的法定傳染病」，「具急迫性、易爆發群聚」」，須立即處理(疫調、接觸者追蹤、疫苗接種、防止擴散)。其他(A 用藥安全認知不足、C 抹片意願不高、D 體重控制資源不足)是慢性的健康教育/資源問題，「不具麻疹的急迫性與傳播風險」。故 B 正確。傳染病(麻疹群聚)的急迫性與傳播風險使其優先處理(與前述同類題一致)。","options":{"A":"用藥安全認知不足是慢性的健康教育問題，非急迫。","B":"正確。麻疹具高傳染性、易群聚，應優先處理。","C":"抹片意願不高是篩檢推廣問題，非急迫。","D":"體重控制資源不足是資源問題，非急迫。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"110030-N5-52":{"quick":"Anderson & McFarlane 社區評估「錯誤」配對＝「民眾對知識的接受度」應屬「教育」次系統，非「溝通」。","detail":{"background":"依 Anderson & McFarlane 社區為夥伴模式進行評估，「錯誤」者為(B)『「描述社區的「發展史」，是呈現「人口核心」的資料」』——錯誤，「社區的「發展史(歷史背景)」」屬於「「核心(core)」中的「歷史」面向(或社區的背景)」，但「「人口核心」」指的是「「人口的「組成特性」(年齡、性別、種族、教育等「人口統計」)」」，「發展史(歷史)」與「人口特性(統計)」不同。其他正確:A 人為環境與動植物分布是物理環境;C 居民對醫療服務的滿意度是健康及社會服務;D 民眾對知識的接受度是溝通。故本題選錯誤者為 B。","options":{"A":"人為環境與動植物分布是物理環境的資料，配對正確。","B":"描述社區發展史屬人口核心的歷史背景資料，配對正確。","C":"居民對醫療服務的滿意度是健康及社會服務的資料，配對正確。","D":"正確(本題選錯誤者)。民眾對知識的接受度應歸「教育」次系統，非「溝通」次系統。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"110030-N5-55":{"quick":"教導初診糖尿病人調整飲食習慣＝示範教學與回覆示教法。","detail":{"background":"社區護理師教導初診糖尿病人「學習調整日常飲食習慣(技能、行為的養成)」——較適當的教學方法是(C)『「示範教學與回覆示教法(demonstration + return demonstration:護理師示範(如食物代換、份量),病人回覆操作，確認其學會)」』。小組討論法、問答法偏向「知識/態度」的交流;價值澄清法用於「價值與態度」的探討。「飲食調整(具操作性的技能/行為)」適合示範+回覆示教。故 C 正確。教技能/行為養成宜用示範+回覆示教。","options":{"A":"小組討論法偏向知識/經驗的交流。","B":"問答法偏向知識的問答。","C":"正確。教飲食調整(技能/行為)，用示範教學與回覆示教法。","D":"價值澄清法用於價值與態度的探討。"},"sources":["社區衛生護理學(新文京/華杏)·衛生教育"]}},"110030-N5-66":{"quick":"「產前健康管理」工作重點「不適當」者＝產後減重計畫。","detail":{"background":"「「產前」健康管理」的工作重點，「不適當」者為(D)『「「產後」減重計畫」』——「產後減重」屬「「產後」健康管理」，「不是「產前」健康管理」的工作重點。其他屬於產前健康管理:A 產前遺傳診斷指導與服務;B 孕期營養指導;C 異常個案(如妊娠高血壓、糖尿病)的發現與追蹤。故本題選不適當者為 D。產前健康管理著重孕期的遺傳診斷、營養、異常追蹤，產後減重屬產後管理。","options":{"A":"產前遺傳診斷指導與服務，是產前健康管理的重點。","B":"孕期營養指導，是產前健康管理的重點。","C":"異常個案的發現與追蹤，是產前健康管理的重點。","D":"正確(本題選不適當者)。產後減重屬產後管理，非產前。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"110030-N5-67":{"quick":"懷孕32週(第三期)的孕期衛生指導：乳房護理④、新生兒用物準備⑤、腿部保暖及抬高⑥。","detail":{"background":"懷孕32週(妊娠第三期、接近生產)的孕期衛生指導，「適當」的是:(4)乳房護理(為哺乳做準備);(5)新生兒用物準備(為生產與育兒做準備);(6)腿部保暖及抬高(改善第三期常見的下肢水腫、靜脈曲張)。而(1)優生保健(屬孕前/孕早期)、(2)「每個月」產檢(32週後應「每兩週」一次，非每月)、(3)預防流產(屬「孕早期」,32週已是預防「早產」)較不適合此週數。故正確為④⑤⑥(選 D)。","options":{"A":"123：含①②③，皆不適合第三期。","B":"135：含①③，不適合。","C":"245：含②(每月產檢，32週應每兩週)，錯誤。","D":"正確。乳房護理④、新生兒用物準備⑤、腿部保暖抬高⑥。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"110030-N5-74":{"quick":"聯合國永續發展目標(SDGs)「錯誤」者＝將非傳染性疾病的過早死亡人數減少「三分之二」。","detail":{"background":"聯合國永續發展目標(SDGs)的敘述，「錯誤」者為(A)『透過預防與治療將「非傳染性疾病」的過早死亡人數減少「三分之二」』——錯誤，SDGs(目標3.4)是將非傳染性疾病的過早死亡人數減少「「三分之一」」，而非三分之二。其他正確:B 消除可預防的新生兒及5歲以下兒童死亡(目標3.2);C 產婦死亡率降至少於每十萬活產70人(目標3.1);D 應重視國際與國內的健康不平等。故本題選錯誤者為 A。SDGs 是將非傳染病的過早死亡減少三分之一。","options":{"A":"正確(本題選錯誤者)。SDGs 是將非傳染病過早死亡減少三分之一，非三分之二。","B":"消除可預防之新生兒及5歲以下兒童死亡，正確。","C":"產婦死亡率少於十萬分之70，正確。","D":"應重視國際與國內的健康不平等，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","SDGs"]}},"110030-N5-75":{"quick":"長照2.0 失智照顧服務「不適當」者＝強化失智初級預防、主要提供40歲以上「失智症個案」多元服務。","detail":{"background":"長照2.0 失智症照顧服務的敘述，「不適當」者為(B)『「強化失智症「初級預防」，主要提供40歲以上「失智症個案」多元服務」』——矛盾/錯誤，「「初級預防」是針對「「未失智」的「健康/高危險」族群」(預防失智發生)」，而非「針對「失智症個案」」;且若是「失智個案」就已是「次級/三級」介入，並非初級預防。其他正確:A 團體家屋目前是專屬失智症個案的照顧模式;C 瑞智學堂、瑞智互助家庭提供失智個案及家屬支持;D 提供社區失智個案管理是失智共同照護中心的功能之一。故本題選不適當者為 B。初級預防針對未失智者，非失智個案。","options":{"A":"團體家屋是專屬失智症個案的照顧模式，正確。","B":"正確(本題選不適當者)。初級預防針對未失智者，非「失智症個案」。","C":"瑞智學堂、瑞智互助家庭提供支持，正確。","D":"失智共同照護中心提供個案管理，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護"]}},"110110-N5-41":{"quick":"健全健康照護體系的目的「錯誤」者＝民眾可配合政府衛生政策的「可主動性(active)」。","detail":{"background":"健全健康照護體系的主要目的，「錯誤」者為(B)『「民眾可配合政府的衛生政策之「可主動性(active)」」』——錯誤，健康照護體系的目的(4A)是「「可用性(available)、可近性(accessible)、可接受性(acceptable)、可負擔性(affordable)」」，「「並無「可主動性(active)」」」這一項;且「配合政府政策」與「以民眾需求為中心」的精神不符。其他正確:A 可用性(available);C 可近性(accessible);D 可接受性(acceptable)。故本題選錯誤者為 B。健康照護體系的目的是4A(可用、可近、可接受、可負擔)，無「可主動性」。","options":{"A":"民眾可得到適當服務的可用性(available)，正確。","B":"正確(本題選錯誤者)。「可主動性(active)」不在4A目的中。","C":"容易取得服務的可近性(accessible)，正確。","D":"符合需求與型態的可接受性(acceptable)，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"110110-N5-42":{"quick":"現行衛福部組織：疾病管制署成立宗旨為建立現代化防疫體系、免除國人疫病威脅。","detail":{"background":"現行衛福部組織的正確敘述是(C)『「疾病管制署」成立的宗旨為「建立現代化的防疫體系，免除國人疫病的威脅(負責傳染病防治、防疫)」』。其他錯誤:A『「國民健康署」主要負責「長期照護、原住民離島健康」』錯誤(國健署負責健康促進、慢性病防治、婦幼健康等;長照由「長期照顧司」負責);B『「護理及健康照護司」負責「生育健康、婦幼、癌症、心血管等非傳染病防治」』錯誤(那是「「國民健康署」」的業務);D『「心理及口腔健康司」負責「網路成癮及齲齒防治」』——口腔/心理屬該司，但描述過於侷限(該司負責心理健康、精神、口腔健康等)。故 C 正確。","options":{"A":"長照由長期照顧司負責，國健署負責健康促進等，描述錯誤。","B":"生育健康、婦幼、慢性病防治是國民健康署的業務，非護理司。","C":"正確。疾病管制署的宗旨是建立現代化防疫體系、免除疫病威脅。","D":"心理及口腔健康司的業務描述過於侷限。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"110110-N5-44":{"quick":"未滿1歲6個月兒童的全民健保兒童預防保健服務次數＝4次。","detail":{"background":"全民健保的兒童預防保健服務(7歲前共7次)中，「未滿1歲6個月」的兒童提供(C)『「4次」』(出生至1歲6個月是嬰幼兒快速發展期，故安排較密集的4次檢查，含身體檢查、發展評估、衛教)。其後1歲6個月至7歲再安排3次。故 C 正確。兒童預防保健在未滿1歲6個月安排4次(密集),之後再3次,共7次。","options":{"A":"1次過少，不符規定。","B":"2次過少，不符規定。","C":"正確。未滿1歲6個月提供4次兒童預防保健服務。","D":"7次是7歲前的總次數，非未滿1歲6個月的次數。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"110110-N5-52":{"quick":"社區健康評估的目的「不適當」者＝可由學者參與以提升評估品質。","detail":{"background":"社區健康評估的目的，「不適當」者為(C)『「可由「學者」參與以提升評估品質」』——錯誤，社區健康評估強調「「「社區居民」的參與(賦權、夥伴)」」，「「由「學者」參與」並非社區健康評估的「目的」」(且過度依賴學者主導，與社區自主、參與的精神不符)。其他適當的目的:A 可作為社區衛生活動計畫的依據;B 可了解並排定社區健康需求及優先順序;D 可找出影響社區健康的危險因子。故本題選不適當者為 C。社區健康評估強調社區居民的參與，而非以學者參與為目的。","options":{"A":"可作為社區衛生活動計畫的依據，是評估的目的。","B":"可了解並排定社區健康需求及優先順序，是目的。","C":"正確(本題選不適當者)。評估強調社區居民參與，非以學者參與為目的。","D":"可找出影響社區健康的危險因子，是目的。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"110110-N5-53":{"quick":"護理師運用社區資源「不適當」者＝宜尊重社區組織並配合「對方的利益」。","detail":{"background":"護理師運用社區資源的敘述，「不適當」者為(D)『「宜尊重社區組織，並配合「對方的利益」」』——錯誤，運用社區資源應「「以「社區/民眾的健康需求」為依歸」」，而非「「配合「對方(資源提供者)的利益」」」(以對方利益為導向會偏離公正與健康目標)。其他適當:A 宜根據專長動用人力資源、善用其能力;B 宜把握經濟原則、不要浪費;C 宜依據預算執行、提供經費收支明細供監督。故本題選不適當者為 D。運用資源應以健康需求為依歸，而非配合資源提供者的利益。","options":{"A":"根據專長動用人力、善用其能力，適當。","B":"把握經濟原則、不浪費，適當。","C":"依預算執行、提供收支明細供監督，適當。","D":"正確(本題選不適當者)。應以健康需求為依歸，非配合對方的利益。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"110110-N5-54":{"quick":"以人群為導向的社區概念「不適當」者＝功能性社區通常以地理疆界為劃分依據。","detail":{"background":"以人群為導向的社區衛生護理師應具備的社區概念，「不適當」者為(A)『「「功能性」社區通常以「地理疆界」為劃分依據」』——錯誤，「「功能性」社區是以「共同的功能、目標、興趣」結合(「不受地理限制」)」;「以「地理疆界」劃分」的是「「地理性(結構性)社區」」。其他適當:B 社區是動態且具有高度彈性的;C 影響社區動力的重要因素包括社區溝通方式及領導與決策;D 地點、人、功能是社區定義的三大重要概念。故本題選不適當者為 A。功能性社區以共同功能結合，不以地理劃分。","options":{"A":"正確(本題選不適當者)。功能性社區以共同功能結合，非以地理疆界劃分。","B":"社區是動態且具高度彈性的，正確。","C":"影響社區動力的因素包括溝通、領導與決策，正確。","D":"地點、人、功能是社區定義的三大概念，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"110110-N5-55":{"quick":"與社區運動社團共同推動健康體能活動＝社區健康營造的「結合社區資源」步驟。","detail":{"background":"社區護理師「與社區「運動性社團」共同推動健康體能活動」——是依據社區健康營造的(B)『「結合社區資源(運用、結合社區既有的社團、組織、人力等資源來推動健康)」步驟』。成立健康營造推動小組是組織;激發民眾共同參與是動員;訂定社區健康議題是確認議題。「與社團(社區資源)合作推動」屬「結合社區資源」。故 B 正確。與社區既有社團合作推動健康活動，屬結合社區資源。","options":{"A":"成立健康營造推動小組是組織建立。","B":"正確。與運動社團合作推動，是結合社區資源。","C":"激發民眾共同參與是動員民眾。","D":"訂定社區健康議題是確認議題。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"110110-N5-65":{"quick":"新住民懷孕3個月、來臺4個月：首次訪視的優先措施＝協助申請產檢補助。","detail":{"background":"社區護理師首次訪視「剛來臺4個月、懷孕3個月」的新住民——優先措施是(D)『「協助申請「產檢補助」(讓孕婦能及早、定期接受產前檢查，保障母嬰健康;新住民「設籍/納健保前」有產檢補助)」』。介紹同鄉會、通譯翻譯、介紹識字班雖有助其適應，但「「懷孕中的孕婦，「及早定期產檢」是最優先、最直接關乎母嬰健康的需求」」。故 D 正確。對懷孕的新住民，協助申請產檢補助、確保及早產檢是優先。","options":{"A":"介紹同鄉會是社會支持，非最優先。","B":"通譯翻譯需求是協助溝通，非最優先。","C":"介紹識字班是長期適應，非最優先。","D":"正確。懷孕中，協助申請產檢補助、確保及早產檢是優先。"},"sources":["社區衛生護理學(新文京/華杏)·新住民照護"]}},"110110-N5-66":{"quick":"原住民族人口學健康政策「最不適當」者＝年齡未滿20歲及年滿55歲以上者，部分補助其自付保險費。","detail":{"background":"原住民族健康政策的敘述，「最不適當」者為(A)『「年齡未滿20歲「及」年滿55歲以上者，部分補助其自付保險費」』——敘述不符，無職業原住民的健保費補助主要針對「「55歲以上(及特定身分)」」，「「未滿20歲」並非此補助的對象」(此描述把補助範圍誤植)。其他適當的政策:B 居住偏遠地區原住民另可申請就醫交通費補助;C 55歲以上免費每年1次成人預防保健服務(放寬，一般為65歲);D 30歲以上婦女免費每年1次子宮頸抹片檢查。故本題選最不適當者為 A。","options":{"A":"正確(本題選最不適當者)。保費補助主要針對55歲以上，「未滿20歲」非補助對象。","B":"偏遠原住民可申請就醫交通費補助，適當。","C":"原住民55歲以上免費成人預防保健(放寬)，適當。","D":"30歲以上婦女免費子宮頸抹片，適當。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"111030-N5-43":{"quick":"50歲女性的健保預防保健：每3年一次成人健康檢查②、每2年一次乳房攝影④。","detail":{"background":"劉小姐50歲，可使用的健保預防保健服務:(2)「每3年一次的成人(預防保健)健康檢查」(40~64歲每3年一次);(4)「每2年一次的乳房攝影檢查」(45~69歲每2年一次)。而(1)「每年一次」的成人健檢、(3)「每2年」一次的子宮頸抹片(子宮頸抹片是「每年/每3年」、且為「抹片」非健檢)敘述不符。故正確為②④(選 D)。50歲女性:成人預防保健每3年一次、乳房攝影每2年一次、子宮頸抹片(30歲以上)。","options":{"A":"13：含①(每年成人健檢，應每3年)，錯誤。","B":"23：含③(每2年抹片，描述不符)，錯誤。","C":"14：含①，錯誤。","D":"正確。每3年一次成人健康檢查②、每2年一次乳房攝影④。"},"sources":["社區衛生護理學(新文京/華杏)·癌症篩檢"]}},"111030-N5-50":{"quick":"蒐集垃圾處理狀況＝評估社區的「物理環境系統」。","detail":{"background":"依 Anderson 的理論進行社區評估時，蒐集「垃圾處理狀況」——主要是評估社區的(C)『「物理環境系統(環境衛生、污染、廢棄物處理、空氣水質等)」』。教育系統是學校;安全與交通系統是治安運輸;健康與社會服務系統是醫療福利。「垃圾(廢棄物)處理」屬物理環境系統。故 C 正確。垃圾處理、環境衛生屬物理環境系統。","options":{"A":"教育系統是學校教育。","B":"安全與交通系統是治安與運輸。","C":"正確。垃圾處理狀況屬物理環境系統。","D":"健康與社會服務系統是醫療福利資源。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111030-N5-51":{"quick":"計畫執行完成後衡量價值的評價＝總結性評價(summative evaluation)。","detail":{"background":"「在計畫「執行完成後」，用以衡量該計畫的「價值/成果」」的評價是(D)『「總結性評價(summative evaluation，於計畫結束時評估其整體成效與價值)」』。形成性評價、過程評價是「計畫「進行中」」的評價;資產評價是評估資產/資源。「計畫完成後衡量價值」屬總結性評價。故 D 正確(與前述同類題一致)。總結性評價是計畫結束時評估其成效與價值。","options":{"A":"形成性評價是計畫進行中的評價。","B":"資產評價是評估資產/資源。","C":"過程評價是計畫進行中的評價。","D":"正確。計畫完成後衡量價值，是總結性評價。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111030-N5-52":{"quick":"永續經營社區健康營造中心「最不需考量」者＝是否由上而下的方式形成的行動。","detail":{"background":"永續經營社區健康營造中心，「最不需考量(或不應採)」的重點是(A)『「是否「由上而下」的方式形成的行動」』——社區健康營造強調「「由下而上、社區自決、民眾參與」」，「「由上而下」與其精神相反」，故「不需(不應)以此為考量」。其他是應考量的重點:B 是否能接受民眾自決與創意的組織文化;C 是否發展推動多元性健康生活的策略;D 是否歷經民眾自決健康需求的過程。故本題選最不需考量者為 A。永續經營應由下而上、社區自決，而非由上而下。","options":{"A":"正確(本題選最不需考量者)。「由上而下」與社區營造的精神相反。","B":"能接受民眾自決與創意的組織文化，是應考量的。","C":"發展推動多元性健康生活的策略，是應考量的。","D":"歷經民眾自決健康需求的過程，是應考量的。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111030-N5-53":{"quick":"社區資源盤點的功能「錯誤」者＝凝聚社區民眾共識。","detail":{"background":"社區資源盤點的功能，「錯誤」者為(B)『「凝聚社區民眾共識」』——「凝聚共識」是「社區動員/參與」的功能，而非「「資源盤點(清查、掌握資源)」」的直接功能。資源盤點的功能是:A 掌握社區資源所在;C 檢視重疊的服務項目(避免資源重疊浪費);D 衡量可提供的服務量。故本題選錯誤者為 B。資源盤點在掌握、檢視、衡量資源，而非凝聚共識。","options":{"A":"掌握社區資源所在，是資源盤點的功能。","B":"正確(本題選錯誤者)。凝聚共識是社區動員的功能，非資源盤點的功能。","C":"檢視重疊的服務項目，是資源盤點的功能。","D":"衡量可提供的服務量，是資源盤點的功能。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111030-N5-54":{"quick":"WHO 對社區的定義：社區成員共同創造社會規範、行使社會功能。","detail":{"background":"依 WHO 對社區的定義，正確的是(C)『「社區成員「共同創造社會規範、行使社會功能」(社區是一群人在共同的地域/連結下，共享規範、價值，並行使各種社會功能)」』。其他錯誤:A『社區「通常沒有一定的地理區域」』錯誤(社區「通常有」一定的地理區域/連結);B『各有「不同」的興趣和價值體系』不精確(社區成員通常「共享」某些價值與興趣);D『多數社會功能需與「其他社區」共同合作才能完成』錯誤(社區「在其內部」行使其社會功能)。故 C 正確。WHO 定義社區為共享規範、行使社會功能的群體。","options":{"A":"社區通常有一定的地理區域/連結。","B":"社區成員通常共享某些價值與興趣，非各有不同。","C":"正確。社區成員共同創造社會規範、行使社會功能。","D":"社區在其內部行使社會功能，非需與其他社區合作。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111030-N5-63":{"quick":"失智、隨地大小便、有誤食問題：基於安全應優先建議家屬「儘量將危險物品收起」。","detail":{"background":"張老先生失智、有「誤食」之問題。基於「安全考量」，社區護理師應優先建議家屬(B)『「儘量將「危險物品(藥物、清潔劑、尖銳/可誤食物品)」收起(移除環境中的危險，防止誤食、中毒、受傷)」』——這是針對「誤食(安全危險)」最直接、優先的防護。其他:A『送至專門照顧機構』非優先(應先做居家安全處置);C『包尿片』針對「大小便」非「誤食」;D『訓練按時如廁』對失智者效果有限、且非針對誤食。故 B 正確。對失智者誤食的安全問題，優先移除環境中的危險物品。","options":{"A":"送機構非優先，應先做居家安全處置。","B":"正確。儘量將危險物品收起，防止誤食(安全優先)。","C":"包尿片針對大小便，非誤食問題。","D":"訓練如廁對失智者效果有限，且非針對誤食。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護"]}},"111030-N5-69":{"quick":"社區健康營造達永續經營「最重要」的措施＝種子志工人才培訓。","detail":{"background":"社區健康營造計畫達到「永續經營」最重要的措施是(A)『「種子志工人才培訓(培育「社區內」的「種子志工/在地人才」，使社區能「自主、持續」地經營健康，不依賴外部)」』——永續經營的核心是「「社區「在地人才」的培育與「自主」」」，種子志工是社區永續的種子。領導者培訓、衛生專業人員培訓、衛生講座雖有助益，但「在地種子志工的培育」最能確保永續。故 A 正確。培育在地種子志工是社區健康營造永續經營的關鍵。","options":{"A":"正確。種子志工人才培訓，是永續經營最重要的措施。","B":"領導者培訓有助益，但非永續的關鍵。","C":"衛生專業人員培訓偏向專業人力，非在地永續的關鍵。","D":"加強衛生講座是活動，非永續經營的根本。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111030-N5-77":{"quick":"獨居氣喘長者的居家環境建議「最不適當」者＝建議飼養貓或狗等寵物陪伴。","detail":{"background":"獨居、反覆氣喘發作的張爺爺，居家訪視建議「最不適當」者為(D)『「建議飼養「貓或狗」等寵物陪伴」』——錯誤，貓狗的「「毛髮、皮屑」是常見的「過敏原」，會「誘發氣喘」」，故不應建議氣喘病人養貓狗。其他適當(減少過敏原):A 以攝氏55度以上熱水清洗寢具(殺塵蟎);B 以濕抹布打掃(避免揚塵);C 移除厚重窗簾、改用百葉窗或塑膠板(減少積塵與塵蟎)。故本題選最不適當者為 D。氣喘病人應避免養貓狗(毛髮皮屑是過敏原)。","options":{"A":"55度以上熱水洗寢具(殺塵蟎)，適當。","B":"以濕抹布打掃(避免揚塵)，適當。","C":"移除厚窗簾、改百葉窗(減少積塵)，適當。","D":"正確(本題選最不適當者)。貓狗毛髮皮屑是過敏原，會誘發氣喘。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"111110-N5-45":{"quick":"健保減低就醫負擔致民眾過度使用醫療＝道德危害(moral hazard)。","detail":{"background":"全民健保「大幅減低就醫的經濟負擔，造成民眾「可能隨意使用過多的醫療服務」」——此現象為(B)『「道德危害(moral hazard)」:當「個人不需承擔(或承擔較少)費用」時，「傾向過度使用(浪費)」資源/服務的現象』。經濟危害、社會危害、制度危害非此專有名詞。「因不需自付足額費用而過度就醫」即道德危害。故 B 正確。道德危害是保險使個人過度使用服務的現象(健保部分負擔即為抑制道德危害的設計)。","options":{"A":"「經濟危害」非此專有名詞。","B":"正確。減低負擔致過度使用醫療，是道德危害(moral hazard)。","C":"「社會危害」非此專有名詞。","D":"「制度危害」非此專有名詞。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系","道德危害"]}},"111110-N5-52":{"quick":"邀請奧運國手拍宣導短片引發社區動力＝社會行銷(social marketing)。","detail":{"background":"社區護理師「邀請「奧運國手」拍攝規律運動的宣導短片，引發社區動力(推廣規律運動的健康行為)」——這是運用(D)『「社會行銷(social marketing)」:借用「商業行銷」的概念與手法(如名人代言、廣告、訴求)，「推廣有益健康的行為/觀念」』。攀龍附貴、競賽法、自我導向學習非此情境。「以名人代言、宣導短片推廣健康行為」屬社會行銷。故 D 正確。社會行銷以行銷手法推廣健康行為(名人代言是常用策略)。","options":{"A":"「攀龍附貴法」非健康推廣的標準方法名稱。","B":"競賽法是以競賽激勵參與。","C":"自我導向學習法是學習者主導的學習。","D":"正確。邀名人拍宣導短片推廣健康行為，是社會行銷。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","社會行銷"]}},"111110-N5-53":{"quick":"評估社區民眾需求與互動方式，「較不適當」者＝德菲(Delphi)法。","detail":{"background":"評估「社區民眾的「需求與「互動方式」」」的資料，「較不適當」者為(C)『「德菲(Delphi)法」』——德菲法是「「匯集「專家」意見、透過多輪問卷達成共識」的方法」，「對象是「專家」」，「不適合用來評估「社區民眾」的需求與「互動方式」」。其他較適當:A 實地考察;B 參與式觀察;D 重要人物訪談(這些都能直接接觸、了解社區民眾與互動)。故本題選較不適當者為 C。德菲法匯集專家意見，不適合評估民眾的需求與互動方式。","options":{"A":"實地考察可了解社區民眾與環境，適當。","B":"參與式觀察可了解民眾的互動方式，適當。","C":"正確(本題選較不適當者)。德菲法匯集專家意見，不適合評估民眾需求與互動。","D":"重要人物訪談可了解社區，適當。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111110-N5-54":{"quick":"戶政系統「無法取得」的資料＝身心障礙人數。","detail":{"background":"進行社區評估收集資料時，「無法」從鄉鎮區公所「戶政系統」取得的是(D)『「身心障礙人數」』——身心障礙的資料屬「「社政(社會福利)系統」(身心障礙者鑑定與福利由社政管理)」，「不在「戶政」系統」。其他可從戶政系統取得:A 遷入遷出人數;B 出生死亡人數;C 外籍人口數。故本題選無法取得者為 D。戶政系統管人口登記(遷入出、出生死亡、外籍)，身心障礙資料屬社政系統。","options":{"A":"遷入遷出人數可從戶政系統取得。","B":"出生死亡人數可從戶政系統取得。","C":"外籍人口數可從戶政系統取得。","D":"正確(本題選無法取得者)。身心障礙人數屬社政系統，非戶政系統。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111110-N5-55":{"quick":"運用政府或相關機構的統計資料進行社區評估＝文獻考察法。","detail":{"background":"護理師進行社區評估，「運用「政府或相關機構的「統計資料(既有的二手資料)」」」——屬(B)『「文獻(資料)考察法(查閱、運用既有的文獻、統計、報告等「二手資料」)」』。參與式觀察是親自參與觀察;擋風玻璃式調查是實地巡視觀察;社會調查法是抽樣問卷(一手資料)。「運用既有的統計資料」屬文獻考察法。故 B 正確。運用既有的統計/文獻資料屬文獻考察法。","options":{"A":"參與式觀察法是親自參與觀察。","B":"正確。運用政府/機構的統計資料，屬文獻考察法。","C":"擋風玻璃式調查法是實地巡視觀察。","D":"社會調查法是抽樣問卷(一手資料)。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111110-N5-68":{"quick":"收集社區的價值觀、行為、風俗、文化、政治體系，最適合的資料＝社區發展史。","detail":{"background":"最適合用來收集社區民眾的「價值觀、行為特質、風俗習慣、文化特性以及政治體系」的資料是(B)『「社區發展史(社區的歷史背景、形成與演變，蘊含其文化、價值、風俗、權力結構等「質性、脈絡」資訊)」』。地理疆界、人口學組成、自然資源是「客觀/量化」的資料，難以反映「價值、文化、政治」等「質性、脈絡」面向。故 B 正確。社區發展史能反映社區的文化、價值、風俗與政治脈絡。","options":{"A":"地理疆界是客觀的空間資料。","B":"正確。社區發展史能反映價值觀、文化、風俗與政治體系。","C":"人口學組成是量化的人口資料。","D":"自然資源是客觀的環境資料。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"111110-N5-73":{"quick":"中風留置鼻胃管/尿管的居家護理指導「最不適當」者＝醫師可每月1次至家中診療(居家護理由護理師訪視，醫師不常規到宅;到宅看診屬「居家醫療」)。","detail":{"background":"陳先生中風、留置鼻胃管及導尿管、申請居家護理。對照顧者的指導，「最不適當」者為(B)『「照顧者需學習灌食及尿管照護，並「每日進行管路「清潔與「消毒」」」』——「居家管路照護是「清潔技術」，「不需「每日消毒」(消毒是針對更換時的無菌處置)」」，且「導尿管不需每日更換/消毒」，此敘述過度。其他適當:A 居家護理師可每月2次到家更換鼻胃管及尿管;C 醫師可每月1次到家診療;D 照顧者如發現管路滑脫可致電居家護理所處理。故本題選最不適當者為 B。居家管路照護是清潔技術，不需每日消毒。","options":{"A":"居家護理師可每月2次到家更換鼻胃管及尿管，適當。","B":"照顧者學習鼻胃管灌食、尿管照護並每日清潔，適當。","C":"正確(本題選最不適當者)。居家護理是護理師訪視，醫師不常規到宅診療(到宅看診屬居家醫療)。","D":"管路滑脫可致電居家護理所處理，適當。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系","居家護理"]}},"112030-N5-33":{"quick":"災難照護的資源保護理論：可分為物件、情境、個人特性、能量等四類資源。","detail":{"background":"災難照護中的「資源保護理論(Conservation of Resources, COR)」，最適宜的是(A)『資源可分為「「物件資源、情境資源、個人特性資源、能量資源」等四類」』。其他錯誤:B『持久的個人特性、性別、種族、性格「屬社會資源」』錯誤(這些屬「「個人特性資源」」);C『房子、車子等物件「屬能量資源」』錯誤(房子、車子屬「「物件資源」」);D『社會支持與正向家庭關係「屬內在心理的個人資源」』錯誤(社會支持、家庭關係屬「「情境資源」」)。故 A 正確。COR 理論的四類資源:物件、情境、個人特性、能量資源。","options":{"A":"正確。資源分為物件、情境、個人特性、能量等四類。","B":"個人特性、性別、種族、性格屬個人特性資源，非社會資源。","C":"房子、車子屬物件資源，非能量資源。","D":"社會支持、家庭關係屬情境資源，非內在心理的個人資源。"},"sources":["社區衛生護理學(新文京/華杏)·災難護理"]}},"112030-N5-41":{"quick":"現行全民健保的正確敘述：實質納保率99%以上②、強制性的社會保險③、公辦公營模式④。","detail":{"background":"現行全民健保的正確敘述:(2)實質納保率99%以上;(3)強制性的社會保險;(4)公辦公營模式(由政府辦理、單一保險人)。而(1)『「多元」保險人制度』錯誤——我國健保是「「單一保險人(健保署)」」制度;(5)『被保險對象分為「十大類」』錯誤——健保被保險人分為「「六類」」，非十大類。故正確為②③④(選 B)。我國健保是單一保險人、強制性、公辦公營、納保率99%以上、被保險人分六類。","options":{"A":"僅123：含①(多元保險人，應為單一保險人)，錯誤。","B":"正確。實質納保率99%以上②、強制性社會保險③、公辦公營④。","C":"僅345：含⑤(十大類，應為六類)，錯誤。","D":"12345：含①⑤，皆錯。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"112030-N5-45":{"quick":"辦理原住民族及離島地區部落社區健康營造補助＝護理及健康照護司的業務。","detail":{"background":"負責辦理「原住民族及離島地區之部落社區健康營造補助計畫」規劃及推動的，是衛福部(C)『「護理及健康照護司」的業務(該司負責社區健康照護、護理及健康照護體系、原住民及離島健康照護等)』。社會保險司負責健保等社會保險;保護服務司負責保護服務(如家暴、性侵防治);心理健康司負責心理健康。「部落社區健康營造」屬護理及健康照護司。故 C 正確。","options":{"A":"社會保險司負責健保等社會保險。","B":"保護服務司負責保護服務(家暴、性侵防治等)。","C":"正確。部落社區健康營造補助屬護理及健康照護司。","D":"心理健康司負責心理健康。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"112030-N5-51":{"quick":"想快速傳遞活動訊息給社區民眾，須深入評估＝溝通系統。","detail":{"background":"社區護理師想知道「如何能「快速將活動訊息傳遞」給社區民眾」——必須深入評估社區的(C)『「溝通系統(訊息傳播的管道、媒介，如廣播、報紙、網路、社群、布告欄、口耳相傳等)」』。宗教系統、物理環境系統、交通系統不是「訊息傳遞」的評估對象。「如何傳遞訊息」屬溝通系統。故 C 正確。要快速傳遞訊息，須評估社區的溝通系統(傳播管道)。","options":{"A":"宗教系統是信仰相關的評估。","B":"物理環境系統是環境衛生的評估。","C":"正確。要快速傳遞活動訊息，須評估溝通系統。","D":"交通系統是運輸相關的評估。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112030-N5-52":{"quick":"糖尿病病友團體依羅斯(Ross)社區分類＝互動性社區。","detail":{"background":"依羅斯(Ross)的社區種類，「糖尿病病友團體」屬(B)『「互動性社區(以成員間的「情感互動、相互支持」結合而成的社區，如病友團體、支持團體)」』。地理性社區是以地理區域;參與式、虛擬性非羅斯的標準分類。「病友團體」以情感互動、相互支持為核心，故為互動性社區。故 B 正確(與前述乳癌病友團體同類題一致)。","options":{"A":"地理性社區是以地理區域劃分。","B":"正確。糖尿病病友團體以情感互動、相互支持結合，是互動性社區。","C":"「參與式社區」非羅斯的標準分類。","D":"「虛擬性社區」非羅斯的標準分類。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112030-N5-53":{"quick":"社區健康營造的主要精神「較不適宜」者＝現今強調由上而下形成政策。","detail":{"background":"社區健康營造的主要精神，「較不適宜」者為(D)『「現今強調「由上而下」形成政策」』——錯誤，社區健康營造強調「「由「下而上」、社區自主、民眾參與」」，「「由上而下」與其精神相反」。其他適宜的精神:A 結合不同專業力量;B 激發社區民眾對自己健康的關心;C 營造自主、自發之社區參與。故本題選較不適宜者為 D。社區健康營造由下而上，而非由上而下(與前述同類題一致)。","options":{"A":"結合不同專業力量，是社區健康營造的精神。","B":"激發民眾對自己健康的關心，是其精神。","C":"營造自主、自發的社區參與，是其精神。","D":"正確(本題選較不適宜者)。應由下而上，非由上而下形成政策。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112030-N5-56":{"quick":"科技公司設運動教室供員工使用＝渥太華憲章的「創造支持性的環境」。","detail":{"background":"依渥太華憲章，「科技公司「設置運動教室」讓員工使用」——屬(B)『「創造支持性的環境(改善工作/生活的環境設施，使健康行為「容易做到」;提供運動教室讓員工方便運動)」』。訂定健康公共政策是立法;強化社區行動是社區參與;增進個人生活技能是衛教。「提供運動教室(環境設施)」屬創造支持性環境。故 B 正確。","options":{"A":"訂定健康公共政策是立法/政策手段。","B":"正確。設置運動教室(改善環境設施)，是創造支持性的環境。","C":"強化社區的行動是促進社區參與。","D":"增進個人的生活技能是衛教與技能培養。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","渥太華憲章"]}},"112030-N5-66":{"quick":"擬定原住民健康政策「最適宜」者＝人才訓練須融入文化敏感度。","detail":{"background":"擬定原住民健康政策，「最適宜」者為(D)『「人才訓練須「融入文化敏感度」(培育在地人才、尊重並結合原住民的文化與傳統，提供文化適切的照護)」』。其他錯誤:A『以「改善成人健康與工作能力」為主』太狹隘(應涵蓋全人、全年齡);B『「不需考量文化與傳統」』錯誤(原住民健康政策「須」尊重並結合其文化);C『「上小學後」再紮根健康意識』太晚(應「從小、及早」紮根)。故 D 正確。原住民健康政策應具文化敏感度、尊重文化傳統、及早紮根。","options":{"A":"以改善成人健康與工作能力為主太狹隘。","B":"原住民健康政策須尊重並結合文化與傳統。","C":"健康意識應從小及早紮根，非上小學後。","D":"正確。人才訓練須融入文化敏感度。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系","文化照護"]}},"112030-N5-68":{"quick":"設置免費注射器、回收盒及保險套供應箱＝初段第二級預防(特殊保護)。","detail":{"background":"設置「免費注射器與回收盒(減害、防共用針具傳播血液傳染病)及保險套供應箱(防性病/愛滋)」——這是針對「健康者」「預防特定疾病(愛滋、肝炎、性病)的「特殊保護」」，屬(B)『「初段(第一段)的「第二級(特殊保護)」預防」』。第一級是健康促進(一般性);第三級是早期診斷;第四級是限制殘障。「提供針具/保險套的減害措施」屬特殊保護(第二級)。故 B 正確。減害(清潔針具、保險套)屬初段第二級(特殊保護)。","options":{"A":"初段第一級是健康促進(一般性)。","B":"正確。提供針具/保險套(減害特殊保護)，屬初段第二級預防。","C":"次段第三級是早期診斷早期治療。","D":"三段五級的第四級是限制殘障(屬第三段)。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"112030-N5-69":{"quick":"社區的無形資源＝社區意識①、文化規範③、社區凝聚力④(人力②、物力⑤是有形資源)。","detail":{"background":"社區的「無形資源」是:(1)社區意識、(3)文化規範、(4)社區凝聚力(這些是社區的精神、文化、認同等無形力量)。而(2)人力資源、(5)物力資源是「「有形(具體)資源」」。故無形資源為①③④(選 A)。社區的無形資源包括社區意識、文化規範、凝聚力、價值觀等(與前述同類題一致)。","options":{"A":"正確。社區意識①、文化規範③、社區凝聚力④，是無形資源。","B":"僅1234：含②(人力)，那是有形資源。","C":"僅1345：含⑤(物力)，那是有形資源。","D":"12345：含②⑤，皆是有形資源。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112030-N5-70":{"quick":"社區健康評估的重要人物訪談：重要人物必須是非常了解社區的人。","detail":{"background":"社區健康評估中訪談重要人物，正確的是(B)『「重要人物必須是「非常了解社區(熟悉社區狀況、有代表性、能提供深入資訊)」的人」』。其他錯誤:A『重要人物「必須住在社區中」』不一定(熟悉社區即可，未必須居住其中);C『所得資料「較為客觀」』錯誤(重要人物的觀點帶有「主觀」、個人立場);D『「透過隨機取樣」選擇』錯誤(重要人物是「立意(目的)選取「關鍵、熟悉」的人」，非隨機)。故 B 正確。重要人物應是熟悉社區、有代表性的關鍵人物。","options":{"A":"熟悉社區即可，未必須居住其中。","B":"正確。重要人物必須是非常了解社區的人。","C":"重要人物的觀點帶有主觀，非較客觀。","D":"重要人物是立意選取的關鍵人物，非隨機取樣。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112030-N5-77":{"quick":"78歲、GFR 53 的衛教「最不適宜」者＝衛教個案腎功能約為正常成人的70%。","detail":{"background":"王老先生78歲、GFR 53(慢性腎臟病第3期)。衛教與評估「最不適宜」者為(A)『「衛教個案腎功能約為正常成人的「70%」」』——錯誤，正常 GFR 約「90~120 以上」，「GFR 53 約為正常的「「一半(約50%)」」」，並非70%(此數值衛教不正確)。其他適宜:B 老年人的 GFR 常會比年輕人低(隨年齡下降);C 評估個案是否有水腫和倦怠感(腎功能下降的症狀);D 建議個案少吃高蛋白食物(減少腎臟負擔)。故本題選最不適宜者為 A。GFR 53 約為正常的一半，非70%。","options":{"A":"正確(本題選最不適宜者)。GFR 53 約為正常的一半(約50%)，非70%。","B":"老年人 GFR 常比年輕人低，正確。","C":"評估是否有水腫和倦怠感，正確。","D":"建議少吃高蛋白食物以減少腎臟負擔，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"112030-N5-79":{"quick":"失智個案反覆問「你是誰」：對話過程多次做簡短自我介紹。","detail":{"background":"失智個案王老先生反覆問「你是誰、叫什麼名字」，護理師最適宜的應對是(B)『「對話過程中，「多次做簡短的自我介紹」(以耐心、簡短、重複的方式回應，協助其定向，不顯不耐)」』。其他錯誤:A『「不用正面回答」、說這是疾病特性』忽視個案、不尊重;C『請個案「背起來」、反問他』對失智者(記憶退化)是強人所難、且像考試;D『告知名字「不重要」、應先關注疾病』否定個案的提問、不尊重。故 B 正確。對失智者反覆的提問，宜耐心、簡短、重複地回應。","options":{"A":"不正面回答忽視個案、不尊重。","B":"正確。對話過程多次做簡短自我介紹(耐心、重複回應)。","C":"請失智者「背起來」是強人所難。","D":"否定個案的提問、不尊重。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護"]}},"112110-N5-36":{"quick":"災難護理「最不適切」者＝要求災民回到事故現場參與情境暴露法治療。","detail":{"background":"災難護理的敘述，「最不適切」者為(C)『「「要求」災民「回到事故現場」參與情境暴露法治療」』——錯誤，災後不應「「強迫」災民回到創傷現場」(可能造成「二度創傷、再度受傷害」);心理復原應循序漸進、尊重個人步調。其他適切:A 救難人員也是災難後照護關懷的對象(替代性創傷);B 「二度災難」是指為了申請各類補助而遭遇的各種困難(行政上的二度傷害);D 考慮災民的文化差異提供照護。故本題選最不適切者為 C。不應強迫災民回到創傷現場，以免二度創傷。","options":{"A":"救難人員也是災後關懷的對象，適切。","B":"「二度災難」指申請補助等遭遇的困難，正確。","C":"正確(本題選最不適切者)。不應強迫災民回到事故現場，以免二度創傷。","D":"考慮災民的文化差異提供照護，適切。"},"sources":["社區衛生護理學(新文京/華杏)·災難護理"]}},"112110-N5-41":{"quick":"消除可預防的新生兒及5歲以下兒童死亡率＝SDG「確保健康及促進各年齡層福祉」(目標3)。","detail":{"background":"聯合國2030永續發展目標(SDGs)中，「消除可預防的新生兒及5歲以下兒童死亡率」屬(D)『「確保「健康」及促進各年齡層的「福祉」(SDG 目標3:Good Health and Well-being)」』的範疇——母嬰與兒童健康、降低兒童死亡率是健康目標(SDG3)的核心。減少健康不平等(目標10)、性別平等(目標5)、永續消費生產(目標12)是其他目標。故 D 正確。降低新生兒與兒童死亡率屬 SDG3(健康與福祉)。","options":{"A":"減少健康不平等是 SDG 目標10。","B":"實現性別平等是 SDG 目標5。","C":"確保永續消費及生產是 SDG 目標12。","D":"正確。消除新生兒及5歲以下兒童死亡，屬 SDG3(健康及福祉)。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","SDGs"]}},"112110-N5-42":{"quick":"社區衛生護理的特性「最不適當」者＝社區護理強調醫療治療之成效。","detail":{"background":"社區衛生護理的特性，「最不適當」者為(C)『「社區護理強調「醫療治療」之成效」』——錯誤，社區護理以「「健康促進與疾病預防」」為主，而非「強調「醫療治療」的成效」。其他適當的特性:A 強調夥伴關係及跨領域合作;B 工作範疇較多元化;D 提供照護措施的自主性高。故本題選最不適當者為 C。社區護理以健康促進與預防為主，非強調醫療治療成效(與前述同類題一致)。","options":{"A":"強調夥伴關係及跨領域合作，是社區護理的特性。","B":"工作範疇較多元化，是社區護理的特性。","C":"正確(本題選最不適當者)。社區護理以健康促進與預防為主，非醫療治療成效。","D":"提供照護措施的自主性高，是社區護理的特性。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112110-N5-43":{"quick":"2025衛生福利政策白皮書：總目標、消除健康不平等、重塑體系與創新資訊科技、拓展國際參與皆正確。","detail":{"background":"2025衛生福利政策白皮書的正確敘述:(1)推動總目標為「共享生活幸福平等，全人全程安心健康」;(2)以「消除健康不平等」為努力的方向;(3)以「重塑健康服務體系及創新資訊科技」為推動策略;(4)致力於「拓展國際參與」。以上四項皆正確。故為①②③④(選 D)。2025衛福政策白皮書以「健康平等、全人全程、體系重塑與創新、國際參與」為核心。","options":{"A":"僅12：不完整。","B":"僅134：缺②，不完整。","C":"僅234：缺①，不完整。","D":"正確。總目標①、消除健康不平等②、重塑體系與創新③、拓展國際參與④皆正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"112110-N5-44":{"quick":"53歲、曾嚼檳榔(已戒)、無抽菸：可建議乳房攝影①、子宮頸抹片②、糞便潛血③、口腔黏膜④。","detail":{"background":"王太太53歲、檳榔已戒(曾嚼檳榔)、無抽菸，可建議的免費篩檢:(1)乳房X光攝影(45~69歲女性);(2)子宮頸抹片(30歲以上女性);(3)糞便潛血(50~74歲);(4)口腔黏膜檢查(30歲以上「有抽菸「或」嚼檳榔(「含已戒」)」者;王太太「曾嚼檳榔」故符合)。四項皆適用。故為①②③④(選 D)。口腔黏膜篩檢的對象包含「曾經」嚼檳榔者，故王太太符合。","options":{"A":"僅134：缺②，不完整。","B":"僅124：缺③，不完整。","C":"僅234：缺①，不完整。","D":"正確。乳房攝影①、子宮頸抹片②、糞便潛血③、口腔黏膜④皆適用。"},"sources":["社區衛生護理學(新文京/華杏)·癌症篩檢"]}},"112110-N5-45":{"quick":"全民健保給付項目「錯誤(非給付)」者＝義齒裝置。","detail":{"background":"全民健保給付項目，「錯誤(非給付)」者為(D)『「義齒裝置(假牙)」』——「假牙(義齒)「不在」健保給付範圍(屬自費)」。其他屬於健保給付:A 預防保健;B 安寧療護;C 慢性精神病。故本題選非給付者為 D。健保「不給付」假牙(義齒)、人工植牙、美容性醫療等。","options":{"A":"預防保健是健保給付項目。","B":"安寧療護是健保給付項目。","C":"慢性精神病是健保給付項目。","D":"正確(本題選非給付者)。義齒(假牙)不在健保給付範圍。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"112110-N5-52":{"quick":"Anderson & McFarlane 社區夥伴評估模式的特徵＝與社區平等互惠②、由下而上匯集民眾需求③、喚起社區意識⑤(專業主導①非)。","detail":{"background":"Anderson & McFarlane(2019)社區夥伴評估模式的特徵:(2)「與社區「平等互惠(夥伴關係)」」;(3)「「由下而上」匯集民眾需求」;(5)「「喚起社區意識(賦權、增能)」」。而(1)『「專業主導」』錯誤(此模式強調「平等夥伴」，非專業主導);(4)『需與政策配合』非其核心特徵。故正確為②③⑤(選 D)。此模式強調平等夥伴、由下而上、喚起社區意識(賦權)。","options":{"A":"125：含①(專業主導，與夥伴精神相反)，錯誤。","B":"134：含①④，錯誤。","C":"234：含④、缺⑤，不完整。","D":"正確。平等互惠②、由下而上匯集需求③、喚起社區意識⑤。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112110-N5-53":{"quick":"社區評估的重要人物訪談「最適當」者＝可訪談不同重要人物，收集各系統的資料。","detail":{"background":"社區評估的重要人物訪談，「最適當」者為(D)『「可「訪談不同的重要人物」，收集「各系統(各面向)」的資料(從不同領域、立場的關鍵人物獲取多元、全面的資訊)」』。其他錯誤:A『「隨機方式」選取較公正』錯誤(重要人物是「立意選取」熟悉、關鍵的人，非隨機);B『重要人物「都有代表性、不會有個人偏見」』錯誤(重要人物的觀點「會帶有個人立場/偏見」);C『「不要納入不同政黨」的重要人物』錯誤(應「廣納不同立場」以求全面、平衡)。故 D 正確。應訪談不同領域的重要人物以收集各系統的多元資料。","options":{"A":"重要人物是立意選取，非隨機;隨機反而可能漏掉關鍵人物。","B":"重要人物的觀點會帶有個人立場/偏見。","C":"應廣納不同立場以求全面平衡，非排除不同政黨。","D":"正確。可訪談不同重要人物，收集各系統的資料。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112110-N5-55":{"quick":"評價使用的人力、物力、經費與成果的關係＝效率(efficiency)評價。","detail":{"background":"社區護理師執行飲食計畫後，評價「使用的「人力、物力及經費(投入)」與「成果」的「關係」」——屬(B)『「效率(efficiency)評價」(評估「投入的資源(成本)」與「產出/成果」的「比值/關係」，即成本效益)』。效果評價是是否達成目標;合適性評價是是否符合需求;過程評價是執行過程。「投入(成本)與成果的關係」屬效率評價。故 B 正確。效率評價評估投入(成本)與成果(產出)的關係。","options":{"A":"效果評價是評估是否達成目標。","B":"正確。投入(人力物力經費)與成果的關係，是效率評價。","C":"合適性評價是評估是否符合需求。","D":"過程評價是評估執行過程。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112110-N5-68":{"quick":"健保婦女乳癌篩檢給付：40~44歲、二等親內罹患乳癌的婦女，每2年一次免費乳房攝影。","detail":{"background":"依健保乳癌篩檢給付，正確的是(D)『「40~44歲、「二等親內」(血親)罹患乳癌的婦女，每2年一次免費「乳房「攝影」」檢查」』。其他錯誤:A『45~69歲每2年免費乳房「超音波」』錯誤(是「乳房「攝影」」，非超音波);B『40~44歲「一等親」內罹乳癌、免費「超音波」』錯誤(是「二等親內」、「攝影」);C『40~69歲每2年免費乳房攝影』錯誤(一般是「45~69歲」)。故 D 正確。乳癌篩檢:45~69歲每2年攝影;40~44歲二等親內血親罹乳癌者亦給付攝影。","options":{"A":"45~69歲是免費乳房「攝影」，非超音波。","B":"40~44歲是「二等親」內、且為「攝影」，非一等親超音波。","C":"一般乳房攝影是45~69歲，非40~69歲。","D":"正確。40~44歲、二等親內罹乳癌的婦女，每2年免費乳房攝影。"},"sources":["社區衛生護理學(新文京/華杏)·癌症篩檢"]}},"112110-N5-80":{"quick":"糖尿病人足部自我照顧「最不適當」者＝每週自我修剪硬皮及雞眼。","detail":{"background":"教導糖尿病人足部自我照顧，「最不適當」者為(B)『「每週「自我修剪硬皮及雞眼」」』——錯誤，糖尿病人「「不應自行修剪硬皮、雞眼」」(因「周邊神經病變(感覺遲鈍)+血管病變(癒合差)」，自行修剪易「受傷、感染、形成潰瘍」)，應「由專業人員處理」。其他適當:A 每日自我檢視足部是否有傷口;C 穿包覆式的鞋子(保護足部);D 足部避免使用電熱毯(感覺遲鈍易燙傷)。故本題選最不適當者為 B。糖尿病人不應自行修剪硬皮/雞眼，應由專業人員處理。","options":{"A":"每日自我檢視足部傷口，適當。","B":"正確(本題選最不適當者)。不應自行修剪硬皮雞眼(易受傷、感染、潰瘍)。","C":"穿包覆式的鞋子保護足部，適當。","D":"避免使用電熱毯(防燙傷)，適當。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"112180-N5-26":{"quick":"全民健保：強制性社會保險①、主要收入來源為保險費②、眷屬數最多計3人③、採部分負擔制④皆正確。","detail":{"background":"全民健保的正確敘述:(1)屬「強制性社會保險」;(2)主要收入來源為「保險費」;(3)被保險人所負擔的「眷屬數「最多計算到3人」(超過3口以3口計)」;(4)除特殊對象外，採「部分負擔制」(就醫時自付部分費用，以抑制過度使用)。四項皆正確。故為①②③④(選 D)。健保是強制性、以保費為主要財源、眷屬上限3口、部分負擔。","options":{"A":"僅123：缺④，不完整。","B":"僅124：缺③，不完整。","C":"僅234：缺①，不完整。","D":"正確。強制性①、保險費②、眷屬最多3人③、部分負擔④皆正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"112180-N5-27":{"quick":"我國基層醫療保健的主要服務內容「最不適當」者＝治療罕見疾病。","detail":{"background":"我國基層醫療保健的主要服務內容，「最不適當」者為(A)『「治療「罕見疾病」」』——「罕見疾病的「治療」需要「醫學中心/專科」的高層級醫療」，「不是「基層醫療保健」的服務內容」。其他屬於基層保健:B 傳染病防治;C 推動四癌篩檢;D 執行疫苗接種。故本題選最不適當者為 A。基層保健以預防、篩檢、疫苗、傳染病防治等為主，罕病治療屬高層級醫療。","options":{"A":"正確(本題選最不適當者)。罕見疾病治療需高層級醫療，非基層保健的內容。","B":"傳染病防治是基層保健的內容。","C":"推動四癌篩檢是基層保健的內容。","D":"執行疫苗接種是基層保健的內容。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"112180-N5-31":{"quick":"透過網路社群邀請婦女參加風險調查＝社會調查。","detail":{"background":"社區護理師「透過網路社群「邀請里內更年期婦女參加心血管疾病風險「調查」」」——這是(B)『「社會調查(以調查/問卷的方式，向特定對象收集其健康風險等資料)」』。社會指標是用既有統計;參與式觀察是親自參與觀察;重要人物訪談是訪談關鍵人物。本題是「邀請民眾參加風險「調查」」，故為社會調查。故 B 正確。透過邀請民眾填答/參加調查收集資料，屬社會調查。","options":{"A":"社會指標是用既有的統計指標。","B":"正確。邀請婦女參加風險調查，是社會調查。","C":"參與式觀察是親自參與觀察。","D":"重要人物訪談是訪談關鍵人物。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112180-N5-32":{"quick":"健康社區評估三大面向「不包含」者＝社區醫療福利資源的開發。","detail":{"background":"推動社區健康營造前的健康社區評估，三大面向是:A 跨領域合作及社區結盟、B 提升社區參與及社區賦權、C 盤點社區資產及社區能力。而(D)『「社區醫療福利資源的「開發」」』「不包含」在這三大面向中(「資源的「開發」」是後續執行階段的工作，非「評估」的三大面向)。故本題選不包含者為 D。健康社區評估的三大面向:跨領域結盟、提升參與賦權、盤點資產能力。","options":{"A":"跨領域合作及社區結盟，是三大面向之一。","B":"提升社區參與及社區賦權，是三大面向之一。","C":"盤點社區資產及社區能力，是三大面向之一。","D":"正確(本題選不包含者)。資源的開發是後續執行，非評估的三大面向。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112180-N5-33":{"quick":"了解社區的動力，「最不適當」的資料＝人口特性資料。","detail":{"background":"護理師想了解「社區的「動力(社區成員如何溝通、領導、互動、運作)」」，「最不適當」的資料是(C)『「人口特性資料(年齡、性別、教育等「人口統計」)」』——人口特性是「靜態的人口統計」，「無法反映社區的「動力(互動、溝通、領導等動態運作)」」。較適當的(反映動力):A 居民間的溝通方式;B 里、鄰長的領導模式;D 社區團體間的互動。故本題選最不適當者為 C。社區動力靠溝通、領導、互動等資料，人口統計無法反映。","options":{"A":"居民間的溝通方式反映社區動力，適當。","B":"里鄰長的領導模式反映社區動力，適當。","C":"正確(本題選最不適當者)。人口特性是靜態統計，無法反映社區動力。","D":"社區團體間的互動反映社區動力，適當。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"112180-N5-48":{"quick":"76歲糖尿病、空腹血糖250的照護「最不適當」者＝建議禁止吃多醣類澱粉。","detail":{"background":"王女士76歲糖尿病、空腹血糖250(偏高)。照護措施「最不適當」者為(D)『「建議「禁止」吃多醣類澱粉」』——錯誤，糖尿病人應「「均衡飲食、適量「多醣類(複合澱粉，如全穀類)」(GI 較低、消化吸收較慢)」」，「「禁止」澱粉」不正確(會營養失衡，且多醣類是較好的醣類選擇)。其他適當:A 建議定期檢測血糖;B 評估藥物使用狀況;C 評估運動狀況。故本題選最不適當者為 D。糖尿病飲食應均衡、適量複合澱粉，而非禁止澱粉。","options":{"A":"建議定期檢測血糖，適當。","B":"評估藥物使用狀況，適當。","C":"評估運動狀況，適當。","D":"正確(本題選最不適當者)。應均衡、適量複合澱粉，非禁止澱粉。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"113030-N5-26":{"quick":"基層醫療保健的原則「最不適當(非)」者＝穩定性(stability)。","detail":{"background":"基層醫療保健的社區與醫療服務原則(4A)是:A 可近性(accessibility)、B 可接受性(acceptability)、C 可用性(availability)，以及可負擔性(affordability)。而(D)『「穩定性(stability)」』「不是」基層醫療保健的原則之一。故本題選非者為 D。基層醫療保健的原則是4A(可用、可近、可接受、可負擔)，無「穩定性」。","options":{"A":"可近性(accessibility)是基層保健的原則。","B":"可接受性(acceptability)是基層保健的原則。","C":"可用性(availability)是基層保健的原則。","D":"正確(本題選非者)。穩定性不是基層醫療保健的原則。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"113030-N5-27":{"quick":"青少年好漾館與 SDGs 最相關的議題＝良好健康與福祉(Good health and well-being)。","detail":{"background":"國民健康署成立「青少年「好漾館(提供青少年的「健康」服務、諮詢、衛教)」」——與 WHO 的 SDGs 中(B)『「良好健康與福祉(Good health and well-being，SDG 目標3)」』最相關。消弭貧窮(目標1)、優質教育(目標4)、永續城市與社區(目標11)是其他目標。「青少年的健康服務」對應 SDG3(健康與福祉)。故 B 正確。青少年好漾館提供健康服務，對應 SDG3(良好健康與福祉)。","options":{"A":"消弭貧窮是 SDG 目標1。","B":"正確。青少年好漾館的健康服務，對應良好健康與福祉(SDG3)。","C":"優質教育是 SDG 目標4。","D":"永續城市與社區是 SDG 目標11。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","SDGs"]}},"113030-N5-31":{"quick":"華倫(Warren)社區功能：社會控制-社區巡守隊①、社會參與-學校導護志工②、相互支援-慈善捐贈③(生產分配消費-讀書會④配對錯)。","detail":{"background":"華倫(Warren)社區功能的正確配對:(1)「「社會控制」-社區巡守隊(維持秩序、安全)」;(2)「「社會參與」-學校導護志工(參與社區事務)」;(3)「「相互支援」-慈善團體愛心捐贈(相互扶持、提供協助)」。而(4)『「生產-分配-消費」-社區讀書會』錯誤——「社區讀書會」屬「「社會化/社會參與」」，而非「「生產-分配-消費(經濟功能)」」。故正確為①②③(選 A)。","options":{"A":"正確。社會控制-巡守隊①、社會參與-導護志工②、相互支援-慈善捐贈③。","B":"124：含④(讀書會配生產分配消費，配對錯)，錯誤。","C":"134：含④，錯誤。","D":"234：含④、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"113030-N5-32":{"quick":"想了解社區對問題的了解與解決動機＝民意團體過程(nominal group process)。","detail":{"background":"社區護理師完成社區健康診斷後，想了解「社區對問題的「了解」與「解決問題的「動機」」」——最適合(D)『「民意團體過程(nominal group process，召集社區成員透過團體討論，了解其對問題的認知、解決意願，並凝聚共識)」』。德菲研究法是匯集專家意見;文獻考察是查資料;擋風玻璃式調查是觀察環境。「了解社區的認知與動機(需團體互動)」用民意團體過程。故 D 正確(與前述同類題一致)。","options":{"A":"德菲研究法是匯集專家意見。","B":"文獻考察是查閱既有資料。","C":"擋風玻璃式調查是觀察社區環境。","D":"正確。了解社區對問題的了解與解決動機，用民意團體過程。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"113030-N5-33":{"quick":"社區夥伴關係強調的原則「最不適當」者＝依照衛生所目標辦理活動。","detail":{"background":"社區夥伴關係(community partnership)強調的原則，「最不適當」者為(C)『「依照「衛生所目標」辦理活動」』——錯誤，社區夥伴關係強調「「以「社區民眾的需求」為依歸、社區自決、平等合作」」，而非「依「衛生所(機構)的目標」辦理」。其他適當:A 促進社區參與健康活動;B 由下而上匯集社區民眾意見與需求;D 專業人員與社區民眾共同討論決定社區活動。故本題選最不適當者為 C。社區夥伴關係以社區民眾的需求為依歸，非衛生所的目標。","options":{"A":"促進社區參與健康活動，是夥伴關係的原則。","B":"由下而上匯集民眾意見與需求，是夥伴關係的原則。","C":"正確(本題選最不適當者)。應以社區民眾需求為依歸，非衛生所目標。","D":"專業人員與社區民眾共同討論決定，是夥伴關係的原則。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"113030-N5-43":{"quick":"製作「遊民的一日」影片以提升大眾對弱勢健康的認知＝代言者(advocate)。","detail":{"background":"社區護理師「製作「遊民的一日」影片於媒體播放，以「提升大眾對「弱勢群體」健康的認知」」——這是「「為弱勢群體「發聲」、爭取社會的關注與權益」」，屬(B)『「代言者(advocate)」角色』。組織動員者是動員;需求評估者是評估需求;協調者是協調各方。本題核心是「為弱勢發聲、提升社會認知」，故為代言者。故 B 正確。為弱勢群體發聲、提升社會認知，是代言者的角色。","options":{"A":"組織動員者是動員社區力量。","B":"正確。為弱勢群體發聲、提升大眾認知，是代言者。","C":"需求評估者是評估需求。","D":"協調者是協調各方。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"113100-N5-25":{"quick":"災難防治觀點「最不適切」者＝災難無法避免，僅需強調災難後的處置。","detail":{"background":"災難防治觀點，「最不適切」者為(A)『「災難無法避免，「僅需」強調災難「後」的處置」』——錯誤，災難防治應「「涵蓋「災前(預防、減災、整備)、災中(應變)、災後(復原)」的「全程」」」，而非「僅強調災後處置」(災前的預防與整備同等重要)。其他適切:B 重建需針對災害型態進行改良工作;C 強調災難的不可預測性及影響;D 需進行修補性與關懷性的災難防制工作。故本題選最不適切者為 A。災難防治應涵蓋災前、災中、災後全程，非僅災後處置。","options":{"A":"正確(本題選最不適切者)。災難防治應涵蓋災前預防整備，非僅災後處置。","B":"重建需針對災害型態改良，適切。","C":"強調災難的不可預測性及影響，適切。","D":"需進行修補性與關懷性的防制工作，適切。"},"sources":["社區衛生護理學(新文京/華杏)·災難護理"]}},"113100-N5-31":{"quick":"排定社區健康問題優先順序，需優先處理＝社區出現疑似肺結核個案。","detail":{"background":"護理師排定社區健康問題優先順序，需「優先處理」的是(A)『「社區出現疑似肺結核個案」』——肺結核是「「具傳染性的法定傳染病」，「具急迫性、傳播風險」」，須立即處理(疫調、接觸者追蹤、防止擴散)。其他(B 乳房攝影率低、C 糖尿病資源不足、D 衰弱症盛行率高)是慢性的健康問題，不具肺結核的急迫性與傳播風險。故 A 正確。傳染病(疑似肺結核)的急迫性與傳播風險使其優先處理(與前述同類題一致)。","options":{"A":"正確。疑似肺結核具傳染性、急迫性，應優先處理。","B":"乳房攝影率低是篩檢推廣問題，非急迫。","C":"糖尿病資源不足是資源問題，非急迫。","D":"衰弱症盛行率高是慢性問題，非急迫。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"113100-N5-32":{"quick":"決定社區護理診斷排序的考量因素「最不適當」者＝護理人員的動機。","detail":{"background":"決定社區護理診斷(問題)排序的考量因素，「最不適當」者為(C)『「「護理人員」的動機」』——排序應以「「社區的需求、問題的嚴重性、可解決性、政策」」為依據，而非「以「護理人員(個人)的動機」為考量」(以護理人員的個人動機排序會偏離社區需求)。其他適當的考量:A 解決問題的有效性;B 對社區問題的了解;D 健康政策與目標。故本題選最不適當者為 C。排序應以社區需求為依據，非護理人員的個人動機。","options":{"A":"解決問題的有效性，是排序的考量。","B":"對社區問題的了解，是排序的考量。","C":"正確(本題選最不適當者)。應以社區需求為依據，非護理人員的個人動機。","D":"健康政策與目標，是排序的考量。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"113100-N5-33":{"quick":"擋風玻璃式調查(windshield survey)＝透過視、聽、嗅、味、觸等感官收集社區的生活型態、物理環境及居民互動。","detail":{"background":"擋風玻璃式調查(windshield survey)的正確敘述是(B)『「透過「視、聽、嗅、味、觸」等「感官」，(以步行或開車巡視)收集社區民眾的「生活型態、物理環境及居民互動」等資料」』。其他選項描述的是別的方法:A(參與社區活動觀察)是「參與式觀察」;C(訪談關鍵人物)是「重要人物訪談」;D(選取部分居民了解看法)是「社會調查」。擋風玻璃式調查是用感官實地巡視觀察社區的整體樣貌。故 B 正確。","options":{"A":"參與社區活動觀察是參與式觀察。","B":"正確。透過五官感官實地巡視收集社區資料，是擋風玻璃式調查。","C":"訪談關鍵人物是重要人物訪談。","D":"選取部分居民了解看法是社會調查。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"113100-N5-42":{"quick":"避免被保險人造成道德危害的措施＝部分負擔(copayment)。","detail":{"background":"全民健保中，為避免被保險人「醫療資源不當使用所導致的「道德危害(moral hazard，因不需自付足額而過度使用)」」，採用的措施是(C)『「部分負擔(copayment，「就醫時自付部分費用」，使民眾在使用醫療時有「成本意識」，抑制過度/浪費)」』。論量計酬、診斷關聯群(DRG)、總額支付制度是「「對醫療「提供者(醫院/醫師)」的「支付制度」」」，而非「抑制「被保險人(民眾)」道德危害」的措施。故 C 正確。部分負擔讓民眾分擔費用、抑制道德危害(過度就醫)。","options":{"A":"論量計酬是對醫療提供者的支付方式(易誘導過度醫療)。","B":"診斷關聯群(DRG)是對醫療提供者的支付制度。","C":"正確。部分負擔讓民眾分擔費用，抑制道德危害。","D":"總額支付制度是對醫療提供者的總額管控。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系","道德危害"]}},"113100-N5-50":{"quick":"居家血壓190/98、頭痛、視力模糊：建議立即就醫(高血壓急症)。","detail":{"background":"張先生居家測血壓「190/98(極高)」、且「頭痛、視力模糊(高血壓的「標的器官受損」症狀)」——這是「「高血壓急症/危象(hypertensive crisis)」」的徵象。最適當的處置是(B)『「建議張先生「立即就醫」(高血壓危象須立即醫療處置，防止腦中風、心衰、視網膜等器官損傷)」』。其他錯誤:A『泡熱水澡放鬆』錯誤(高血壓急症泡熱水澡危險);C『吃少油少鹽飲食』是長期飲食控制、非當下的緊急處置;D『外出散步』在血壓極高且有症狀時不安全。故 B 正確。血壓190/98併頭痛、視力模糊是高血壓急症，應立即就醫。","options":{"A":"高血壓急症泡熱水澡危險，不適當。","B":"正確。血壓190/98併頭痛、視力模糊(高血壓急症)，應立即就醫。","C":"少油少鹽是長期飲食控制，非當下緊急處置。","D":"血壓極高且有症狀時外出散步不安全。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"113180-N5-26":{"quick":"出國旅遊時生病在當地就醫：可申請核退自墊醫療費用。","detail":{"background":"王小姐出國旅遊時生病、在當地醫院就醫——依全民健保法，她可以(B)『「申請「核退自墊醫療費用」(在國外因「緊急傷病」自費就醫後，「檢具收據等文件向健保署申請「核退」部分費用」，核退金額有上限)」』。其他錯誤:A『需要全額自費』錯誤(可申請核退部分);C『保險可以「全額」給付』錯誤(核退有上限、非全額);D『保險無法給付』錯誤(可申請核退)。故 B 正確。國外緊急就醫可向健保署申請核退自墊醫療費用(有上限)。","options":{"A":"可申請核退部分費用，非全額自費。","B":"正確。可申請核退自墊醫療費用。","C":"核退有金額上限，非全額給付。","D":"可申請核退，非無法給付。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"113180-N5-27":{"quick":"健保醫療給付範圍＝血液透析治療①、針灸治療②(義齒③、輪椅④不給付)。","detail":{"background":"依現行健保給付項目，屬於「醫療給付範圍」的是:(1)血液透析治療(洗腎);(2)針灸治療(中醫的醫療服務)。而(3)義齒(假牙)、(4)輪椅(屬輔具，由身障/長照等其他管道補助)「「不在」健保的醫療給付範圍」。故正確為僅①②(選 B)。健保給付血液透析、針灸等醫療服務;假牙、輪椅(輔具)不給付。","options":{"A":"僅1：缺②(針灸)，不完整。","B":"正確。血液透析①、針灸②屬健保醫療給付。","C":"僅123：含③(義齒，不給付)，錯誤。","D":"1234：含③④(義齒、輪椅，不給付)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"114030-N5-27":{"quick":"全民健保「最不適當」者＝屬於可自由參加的商業保險。","detail":{"background":"全民健保的敘述，「最不適當」者為(C)『「屬於「可自由參加」的「商業」保險」』——錯誤，全民健保是「「強制性」的「社會」保險(非自由參加、非商業保險)」。其他正確:A 全民納保率已達95%以上(實為99%以上);B 保險費由保險對象、雇主及政府共同分擔;D 財務來源包含菸品健康福利捐。故本題選最不適當者為 C。健保是強制性的社會保險，非自由參加的商業保險。","options":{"A":"全民納保率已達95%以上(實為99%以上)，正確。","B":"保險費由保險對象、雇主及政府共同分擔，正確。","C":"正確(本題選最不適當者)。健保是強制性社會保險，非自由參加的商業保險。","D":"財務來源包含菸品健康福利捐，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"114030-N5-29":{"quick":"提供工廠作業員安全防護器具以減少傷害＝三段五級的「第二級(特殊保護)」。","detail":{"background":"「提供工廠作業員「安全防護器具」以減少傷害發生」——這是針對「特定的職業危害」採取「「特定的防護措施(防護具)」」，屬三段五級的(B)『「第二級(特殊保護)」(屬第一段預防;如防護具、疫苗、營養補充等針對特定危害的防護)』。第一級是健康促進(一般性);第三級是早期診斷;第四級是限制殘障。「提供防護器具」屬特殊保護(第二級)。故 B 正確。提供防護器具預防職業傷害屬第二級(特殊保護)。","options":{"A":"第一級是健康促進(一般性的健康增進)。","B":"正確。提供安全防護器具(特殊保護)，屬第二級。","C":"第三級是早期診斷早期治療。","D":"第四級是限制殘障。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"114030-N5-32":{"quick":"社區健康評估「最不適當」者＝隨機抽樣最常用來選擇重要人物進行訪談。","detail":{"background":"社區健康評估的敘述，「最不適當」者為(C)『「「隨機抽樣」最常用來選擇「重要人物」進行訪談」』——錯誤，「重要人物是「立意(目的)選取「熟悉社區、有代表性、關鍵」的人」」，「並非「隨機抽樣」」(隨機抽樣反而可能漏掉關鍵人物)。其他適當:A 使照護計畫能真正反應社區的需求;B 提升社區健康照護計畫之品質;D 民意團體過程法可用來形成排定優先順序的共識。故本題選最不適當者為 C。重要人物是立意選取，非隨機抽樣。","options":{"A":"使計畫真正反應社區需求，是社區健康評估的意義。","B":"提升照護計畫的品質，正確。","C":"正確(本題選最不適當者)。重要人物是立意選取，非隨機抽樣。","D":"民意團體過程可形成排優先順序的共識，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"114030-N5-41":{"quick":"「不屬於」107年度原鄉健康不平等改善策略者＝骨骼肌肉傷害。","detail":{"background":"衛福部107年度「原鄉健康不平等之改善策略行動計畫」的重點，「不屬於」者為(A)『「骨骼肌肉傷害」』——原鄉健康不平等的改善策略聚焦於原鄉「盛行率高、死亡率高」的健康問題:B 結核病、C 消化系癌症(如肝癌、口腔癌、食道癌)、D 三高防治(及事故傷害、酒癮等)。而「「骨骼肌肉傷害」「不是」原鄉健康不平等改善計畫的重點項目」。故本題選不屬於者為 A。原鄉改善策略聚焦結核、消化系癌、三高等，骨骼肌肉傷害非其重點。","options":{"A":"正確(本題選不屬於者)。骨骼肌肉傷害非原鄉健康不平等改善的重點。","B":"結核病是原鄉改善策略的重點。","C":"消化系癌症是原鄉改善策略的重點。","D":"三高防治是原鄉改善策略的重點。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"114030-N5-46":{"quick":"可接受安寧緩和照護的末期病人主要支付診斷「最不適當」者＝思覺失調症。","detail":{"background":"健保安寧緩和醫療照護的末期病人主要支付診斷，「最不適當」者為(D)『「思覺失調症」』——思覺失調症是「精神疾病」，「「不是」健保安寧緩和支付的「末期(預後不良、瀕死)」診斷」。其他屬於安寧支付的末期診斷:A 老年期及初老期器質性精神病態(如末期失智);B 慢性肝病及肝硬化(末期);C 急性腎衰竭(未明示者)。(健保安寧除癌症、漸凍人外，擴及八大類非癌末期疾病。)故本題選最不適當者為 D。思覺失調症非安寧緩和支付的末期診斷。","options":{"A":"老年期及初老期器質性精神病態(末期失智)，是安寧支付診斷。","B":"慢性肝病及肝硬化(末期)，是安寧支付診斷。","C":"急性腎衰竭(未明示者)，是安寧支付診斷。","D":"正確(本題選最不適當者)。思覺失調症非安寧緩和支付的末期診斷。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系","安寧緩和"]}},"114100-N5-26":{"quick":"全民健保「錯誤」者＝屬非強制性之社會保險。","detail":{"background":"全民健保的敘述，「錯誤」者為(B)『「屬「非強制性」之社會保險」』——錯誤，全民健保是「「「強制性」的社會保險(全民強制納保)」」。其他正確:A 菸品健康福利捐為收入來源之一;C 保險費由保險對象、雇主與政府共同分擔;D 實施總額支付制度。故本題選錯誤者為 B。健保是強制性的社會保險。","options":{"A":"菸品健康福利捐為收入來源之一，正確。","B":"正確(本題選錯誤者)。健保是強制性，非非強制性。","C":"保險費由保險對象、雇主與政府共同分擔，正確。","D":"實施總額支付制度，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"114100-N5-27":{"quick":"負責原住民健康平等及離島地區醫療照護品質提升＝護理及健康照護司。","detail":{"background":"負責「原住民健康平等以及離島地區醫療照護品質的提升」的衛福部單位是(A)『「護理及健康照護司」(負責社區健康照護、護理及健康照護體系、原住民及離島地區健康照護等)』。醫事司負責醫事人員與醫療機構管理;長期照顧司負責長照;保護服務司負責保護服務(家暴、性侵等)。「原住民及離島健康照護品質」屬護理及健康照護司。故 A 正確。","options":{"A":"正確。原住民健康平等及離島醫療品質提升，屬護理及健康照護司。","B":"醫事司負責醫事人員與醫療機構管理。","C":"長期照顧司負責長照業務。","D":"保護服務司負責保護服務(家暴、性侵防治等)。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"114100-N5-32":{"quick":"辦理社區文康活動＝華倫(Warren)社區功能的「社會參與」。","detail":{"background":"依華倫(Warren)社區功能理論，「辦理社區文康(文化康樂)活動」屬(D)『「社會參與(social participation，提供居民參與社區活動、休閒娛樂、相互交流的機會)」』。社會控制是維持秩序;社會化是傳遞價值規範;生產-分配-消費是經濟功能。「文康活動(讓居民參與、交流)」屬社會參與。故 D 正確。辦理文康活動讓居民參與，屬社會參與功能。","options":{"A":"社會控制是維持秩序、規範行為。","B":"社會化是傳遞價值與規範。","C":"生產、分配和消費是經濟功能。","D":"正確。辦理社區文康活動，屬社會參與功能。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"114100-N5-33":{"quick":"社區的「有形資源」＝志工①、活動中心②、電子公布欄④(歸屬感③、文化規範⑤是無形資源)。","detail":{"background":"社區的「有形資源」是「具體、可見的資源」:(1)志工(人力)、(2)活動中心(物力/設施)、(4)電子公布欄(物力/設施)。而(3)社區歸屬感、(5)社區文化規範是「「無形資源(精神、文化層面)」」。故有形資源為①②④(選 A)。有形資源:人力、物力、財力、設施;無形資源:社區意識、歸屬感、文化規範、凝聚力。","options":{"A":"正確。志工①、活動中心②、電子公布欄④，是有形資源。","B":"125：含⑤(文化規範，無形)，錯誤。","C":"234：含③(歸屬感，無形)，錯誤。","D":"235：含③⑤(歸屬感、文化規範，無形)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"114100-N5-34":{"quick":"普及物美價廉的素食餐廳＝渥太華憲章的「創造支持性環境」。","detail":{"background":"依渥太華五大行動綱領，社區推動素食減碳，「普及「物美價廉的素食餐廳」」屬(A)『「創造支持性環境(改善環境、使健康/友善的選擇「容易且可負擔」;普及平價素食餐廳讓民眾方便吃素)」』。其他偏向別的綱領:B 素食烹飪比賽(社區活動/參與);C 素食營養講座(發展個人技能);D 鼓勵一週一餐素(發展個人技能/個人行為)。「提供平價素食餐廳(改善環境設施)」屬創造支持性環境。故 A 正確。","options":{"A":"正確。普及物美價廉的素食餐廳(改善環境)，是創造支持性環境。","B":"素食烹飪比賽偏向社區活動/參與。","C":"素食營養講座是發展個人技能。","D":"鼓勵一週一餐素是發展個人技能/個人行為。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","渥太華憲章"]}},"114100-N5-50":{"quick":"校園健康問題優先處理＝學生因腸病毒請假人數高於正常期望值。","detail":{"background":"校園健康問題的優先順序，應「優先處理」的是(D)『「學生因「腸病毒」請假人數高於正常期望值」』——腸病毒是「「具傳染性、易在校園群聚爆發」」，具急迫性，須立即處理(疫調、停課標準、衛生防護)。其他(A 齲齒率增加、B 近視率增加、C 體重過重比率高)是慢性的健康問題，不具腸病毒群聚的急迫性與傳播風險。故 D 正確。校園傳染病(腸病毒群聚)的急迫性使其優先處理。","options":{"A":"齲齒率增加是慢性的健康問題，非急迫。","B":"近視率增加是慢性的健康問題，非急迫。","C":"體重過重比率高是慢性的健康問題，非急迫。","D":"正確。腸病毒群聚具傳染性、急迫性，應優先處理。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"114170-N5-29":{"quick":"流感期間以運動、均衡營養提升免疫力＝初段第一級(健康促進)。","detail":{"background":"流感流行期間，「透過「適度運動與均衡營養」以提升自身免疫力」——這是「一般性的健康增進(增強體質、抵抗力)」，屬三段五級的(A)『「初段(第一段)的「第一級(健康促進)」」(以營養、運動等一般性措施增進健康、提升抵抗力)』。初段第二級是特殊保護(如疫苗);次段是早期診斷。「運動、均衡營養提升免疫力」屬第一級健康促進。故 A 正確。一般性的運動、營養以提升免疫力屬第一級健康促進。","options":{"A":"正確。運動、均衡營養提升免疫力，屬初段第一級(健康促進)。","B":"初段第二級是特殊保護(如疫苗、防護具)。","C":"次段第二級(早期診斷)的層級配對不符。","D":"次段第三級是早期診斷早期治療。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"114170-N5-33":{"quick":"調查民眾「自費支付核酸檢驗的能力」＝評估服務資源的「可負擔性(affordable)」。","detail":{"background":"調查「社區民眾「自費支付」SARS-CoV-2 核酸檢驗的「能力」」——是評估服務資源的(B)『「可負擔性(affordable，民眾是否「負擔得起」該服務的「費用」)」』。可近性(accessible)是地理/管道上是否容易取得;可信任性(accountable)是責信;可接受性(acceptable)是是否符合需求與文化、能被接受。本題評估的是「「費用負擔能力」」，故為可負擔性。故 B 正確。能否負擔費用屬可負擔性(affordable)。","options":{"A":"可近性是地理/管道上是否容易取得。","B":"正確。能否自費支付(負擔費用)，是可負擔性(affordable)。","C":"可信任性(accountable)是責信。","D":"可接受性是是否符合需求與文化、能被接受。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"114170-N5-42":{"quick":"原住民族及離島部落社區健康營造的目的＝透過跨領域合作，協助建構「在地人服務在地人」的健康照護資源。","detail":{"background":"衛福部推動原住民族及離島地區「部落社區健康營造」計畫的目的，最適當的是(C)『「透過「跨領域合作」，協助建構「在地人服務在地人」的健康照護資源(培育在地人力、建立可近、可持續、文化適切的在地健康照護)」』。其他錯誤:A『建立公共學堂提升社區「教育」水準』偏離健康營造的目的;B『「減少」對健康照護服務利用涵蓋率』錯誤(應「提升」利用與涵蓋);D『協助在地人「出外」就業』與「在地化健康照護」的方向相反。故 C 正確。部落社區健康營造著重建構「在地人服務在地人」的健康照護資源。","options":{"A":"提升「教育」水準偏離健康營造的目的。","B":"應「提升」健康照護利用與涵蓋，非減少。","C":"正確。透過跨領域合作，建構在地人服務在地人的健康照護資源。","D":"協助「出外」就業與在地化健康照護的方向相反。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"115030-N5-26":{"quick":"發展及提升原住民族及離島地區健康照護品質的業務單位＝護理及健康照護司。","detail":{"background":"衛福部主責「發展及提升原住民族及離島地區健康照護品質」的業務單位是(D)『「護理及健康照護司」(負責社區健康照護、護理及健康照護體系、原住民及離島地區健康照護品質提升等)』。醫事司負責醫事人員/機構管理;長期照顧司負責長照;社會救助及社工司負責社會救助與社工。「原住民及離島健康照護品質」屬護理及健康照護司。故 D 正確(與前述同類題一致)。","options":{"A":"醫事司負責醫事人員與醫療機構管理。","B":"長期照顧司負責長照業務。","C":"社會救助及社工司負責社會救助與社工。","D":"正確。原住民及離島健康照護品質提升，屬護理及健康照護司。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"115030-N5-31":{"quick":"社區健康營造步驟：成立小組②→訂定健康議題③→結合社區資源①→激發民眾共同參與⑤→永續經營④。","detail":{"background":"推動社區健康營造的步驟與順序是(D)『「成立社區健康營造「小組」② → 「訂定」社區健康議題③ → 「結合」社區資源① → 「激發」民眾共同參與⑤ → 「永續」經營④」(23154)』——先組成推動小組、確認議題，再結合資源、動員民眾參與，最後追求永續經營。故正確順序為23154(選 D)。社區健康營造:組織→訂議題→結合資源→動員參與→永續經營。","options":{"A":"13245：順序錯誤。","B":"54312：順序錯誤(永續經營不應在前)。","C":"32154：順序錯誤(成立小組應在最前)。","D":"正確。成立小組②→訂議題③→結合資源①→激發參與⑤→永續經營④。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"115030-N5-34":{"quick":"屬於三段五級「第一級」的預防措施＝婚前健康諮詢。","detail":{"background":"依三段五級概念，屬於「第一級(健康促進)」的預防措施是(D)『「婚前健康諮詢(屬「一般性的健康促進/衛教」，協助做出健康的婚育決策)」』。其他屬於別的層級:A 為老人施打肺炎鏈球菌疫苗(「第二級「特殊保護」」);B 提供居家復能服務(「第三段(第五級)復健」);C 45歲以上定期糞便潛血檢查(「第三級「早期診斷」」、屬第二段)。故 D 正確。婚前健康諮詢屬第一級(健康促進)。","options":{"A":"施打疫苗是第二級(特殊保護)。","B":"居家復能服務是第三段(復健)。","C":"糞便潛血篩檢是第三級(早期診斷，屬第二段)。","D":"正確。婚前健康諮詢屬第一級(健康促進)。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"115030-N5-41":{"quick":"提升原住民慢性病健康照護政策「最不適當」者＝原住民族文化健康站服務「45歲」以上原住民。","detail":{"background":"提升原住民慢性病健康照護政策，「最不適當」者為(D)『「成立原住民族「文化健康站」，服務「45歲」以上健康、亞健康、衰弱、輕度失能原住民」』——數值不符，原住民族「「文化健康站」的服務對象是「「55歲」以上(原住民因平均餘命較短而放寬)」」，而非「45歲」。其他適當:A 運用三段五級概念避免及延緩失能、壓縮失能期間;B 運用部落社區特性進行社區健康營造;C 提供兼具文化傳承的健康飲食課程。故本題選最不適當者為 D。文化健康站的服務對象是55歲以上原住民，非45歲。","options":{"A":"運用三段五級延緩失能、壓縮失能期間，適當。","B":"運用部落社區特性進行健康營造，適當。","C":"提供兼具文化傳承的健康飲食課程，適當。","D":"正確(本題選最不適當者)。文化健康站服務55歲以上原住民，非45歲。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}}},TO=["社區衛生護理概論公共衛生政策與健康照護體系"],LEC={"社區衛生護理概論公共衛生政策與健康照護體系":{"title":"社區衛生護理概論與健康政策　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「社區衛生護理概論公共衛生政策與健康照護體系」的歷屆考題共 290 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_h1_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
