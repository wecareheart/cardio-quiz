(新文京/華杏)·流行病學"]}},"101030-N5-48":{"quick":"健康不平等「錯誤」者＝健康不平等通常發生在未開發國家。","detail":{"background":"健康不平等(health disparities)的敘述，「錯誤」者為(A)『健康不平等「通常發生在未開發國家」』——錯誤，健康不平等「「各國(含已開發國家)皆存在」」(因社經地位、種族、城鄉、教育等差異而有健康落差)，並非只發生在未開發國家。其他正確:B 平等主義認為每個人價值平等、應接受平等對待;C 醫療的平等強調過程的平等與實質的平等;D 不同國家常採用不同策略改善健康不平等。故本題選錯誤者為 A。健康不平等是普遍存在的全球性議題。","options":{"A":"正確(本題選錯誤者)。健康不平等各國皆存在，非只發生在未開發國家。","B":"平等主義認為每個人價值平等，正確。","C":"醫療的平等強調過程與實質的平等，正確。","D":"不同國家採用不同策略改善健康不平等，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"101030-N5-49":{"quick":"災難照護：社區衛生護理人員負責災難現場救護、到院前救護及災後社區照護。","detail":{"background":"社區衛生護理人員在災難照護的角色，正確的是(B)『負責「災難現場救護、到院前救護及災後社區照護(涵蓋災前準備、災中應變、災後復原的全程)」』。其他錯誤:A『範疇「不包括災難現場救護」』錯誤(社區護理涵蓋災難各階段的照護);C『「只能臨機應變」提供照護』錯誤(應有「平時的準備與演練、計畫」，非只臨機應變);D『「不參與空中救護」』錯誤(可參與含空中救護在內的各種救護)。故 B 正確。社區衛生護理涵蓋災難的災前、災中、災後全程照護。","options":{"A":"社區護理涵蓋災難各階段的照護，包括現場救護。","B":"正確。負責災難現場救護、到院前救護及災後社區照護。","C":"應有平時的準備與計畫，非只臨機應變。","D":"可參與含空中救護在內的各種救護。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101030-N5-51":{"quick":"統計公園分布、設施與民眾使用狀況＝了解社區的娛樂系統使用情形。","detail":{"background":"社區衛生護理人員「統計公園的分布、記錄設施種類數量、觀察民眾使用狀況」——主要目的是(C)『了解社區民眾的「娛樂(休閒)系統」使用情形(公園、運動設施屬休閒娛樂系統的一環)』。福利系統需求、經濟貧富、人口組成是其他評估面向。本題評估的是「公園與休閒設施」，故為娛樂(休閒)系統。故 C 正確。社區評估八大系統之一為「休閒娛樂系統」(公園、運動、康樂設施)。","options":{"A":"福利系統的需求是另一評估面向。","B":"經濟貧富差距是經濟系統的評估。","C":"正確。統計公園、設施與使用狀況，是了解娛樂(休閒)系統。","D":"人口組成特性是人口系統的評估。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101030-N5-52":{"quick":"健康城市特徵「錯誤」者＝須與外界社區締結城市互助的關係。","detail":{"background":"Hancock 及 Duhl(1986)的健康城市特徵，「錯誤」者為(A)『須「與外界的社區締結城市互助的關係」』——這不是健康城市的核心特徵(健康城市著重「「城市內部」的健康環境、需求滿足、社會支持與經濟活力」，而非以「對外締結互助關係」為特徵)。其他正確(屬健康城市特徵):B 乾淨、安全、高品質的生活環境;C 滿足居民的基本需求;D 多元化且具活力及創新的都市經濟活動。故本題選錯誤者為 A。健康城市著重城市內部的健康環境與居民需求。","options":{"A":"正確(本題選錯誤者)。「與外界締結城市互助」非健康城市的核心特徵。","B":"乾淨、安全、高品質的生活環境，是健康城市特徵。","C":"滿足居民的基本需求，是健康城市特徵。","D":"多元、活力、創新的都市經濟活動，是健康城市特徵。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101030-N5-53":{"quick":"社區成立媽媽教室、導護媽媽等社團＝行使社區的「社會參與」功能。","detail":{"background":"依華倫(Warren)的社區五大功能，社區「成立媽媽教室、導護媽媽等社團(居民共同參與社區事務)」，是行使(C)『「社會參與(social participation)」功能(提供居民參與社區活動、相互支持與歸屬的機會)』。社會化是傳遞價值與規範;社會控制是規範成員行為;社會分配(生產-分配-消費)是提供經濟商品與服務。本題是「居民組社團、參與活動」，故為社會參與。故 C 正確。","options":{"A":"社會化是傳遞價值與規範。","B":"社會控制是規範成員行為。","C":"正確。成立社團、居民共同參與，是社會參與功能。","D":"社會分配是提供經濟商品與服務。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101030-N5-54":{"quick":"Anderson & McFarlane 八大系統中，需收集里長、社區委員會、長青會負責人資料的系統＝政治與政府。","detail":{"background":"依 Anderson & McFarlane(1986)社區照護模式的八大系統，需收集「里長、社區委員會主委、長青會負責人」等資料的系統是(A)『「政治與政府(politics and government)」系統(了解社區的權力結構、組織、領導者、參與決策的管道)』。溝通系統是傳播媒介;健康與社會服務系統是醫療福利資源;經濟系統是就業與收入。本題收集的是「社區領導者、組織負責人」，屬政治與政府系統。故 A 正確。","options":{"A":"正確。里長、社區委員會、長青會負責人，屬政治與政府系統。","B":"溝通系統是傳播媒介、資訊管道。","C":"健康與社會服務系統是醫療福利資源。","D":"經濟系統是就業與收入。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101030-N5-56":{"quick":"給糖尿病人衛教以增進疾病認識與自我照顧能力＝渥太華憲章的「發展個人技能」。","detail":{"background":"提供衛教給糖尿病人「以加強對疾病的認識及自我照顧的能力」——對應渥太華憲章(1986)五大行動綱領的(D)『「發展個人技能(develop personal skills)」(透過健康教育、提供資訊與技能，使個人有能力做出健康的選擇與自我照顧)』。建立健康公共政策是制定政策;創造支持性環境是改善環境;強化社區行動是社區參與;調整健康服務取向是另一項。本題是「衛教、增進個人的自我照顧技能」，故為發展個人技能。故 D 正確。","options":{"A":"建立健康公共政策是制定有利健康的政策。","B":"創造支持性環境是改善生活與工作環境。","C":"強化社區組織(社區行動)是促進社區參與。","D":"正確。衛教、增進個人自我照顧技能，是發展個人技能。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","渥太華憲章"]}},"101030-N5-57":{"quick":"2020健康國民白皮書兩項總體目標＝延長國人健康平均餘命①、促進國人健康平等性②。","detail":{"background":"「2020 健康國民白皮書」的兩項重要總體目標是:(1)「延長國人「健康平均餘命(健康餘命)」」;(2)「促進國人「健康的平等性(縮小健康不平等)」」。而(3)減少醫療成本、(4)發展專科醫療「不是」其總體目標。故正確為①②(選 A)。2020健康國民白皮書以「延長健康餘命+促進健康平等」為兩大總體目標。","options":{"A":"正確。延長國人健康平均餘命①、促進國人健康平等性②。","B":"34：減少醫療成本、發展專科醫療，非總體目標。","C":"13：含③(減少醫療成本)，錯誤。","D":"24：含④(發展專科醫療)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"101030-N5-59":{"quick":"我國產前遺傳診斷服務的重點疾病＝唐氏症①、海洋性貧血③。","detail":{"background":"我國「產前遺傳診斷」服務的重點疾病包括:(1)唐氏症(染色體異常，如羊膜穿刺、母血篩檢);(3)海洋性貧血(地中海型貧血，遺傳性血液疾病)。而(2)G-6-PD 缺乏症、(4)先天性甲狀腺功能低下症是「「新生兒(出生後)篩檢」」的項目，而非「產前遺傳診斷」。故正確為①③(選 B)。產前遺傳診斷針對胎兒的染色體/遺傳疾病(如唐氏症、海洋性貧血)。","options":{"A":"12：含②(G-6-PD)，那是新生兒篩檢。","B":"正確。唐氏症①、海洋性貧血③(產前遺傳診斷)。","C":"24：是新生兒篩檢項目，非產前遺傳診斷。","D":"34：含④(甲狀腺低下)，那是新生兒篩檢。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"101030-N5-63":{"quick":"優先訪視血壓184/108的張先生＝考量「問題的嚴重性」。","detail":{"background":"社區護理人員在多位篩檢異常者中，「優先訪視血壓184/108 mmHg(高血壓危象等級、最危急)的張先生」——其考量依據是(A)『「問題的嚴重性(severity)」(血壓184/108 最嚴重、最具立即危險，故優先處理)』。其他篩檢值(飯前血糖115、腰圍92、膽固醇220)雖異常但較不危急。資源的有效性、名單順序、距離方便都不是此處的優先考量。故 A 正確。設定訪視優先順序時，以「問題的嚴重性/危急性」為首要考量。","options":{"A":"正確。血壓184/108最嚴重、最危急，依問題的嚴重性優先訪視。","B":"資源的有效性不是此處的優先考量。","C":"名單的順序性不是優先依據。","D":"距離的方便性不是優先依據。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101030-N5-66":{"quick":"新住民子女照護「錯誤」者＝出生後立即進行發展遲緩評估。","detail":{"background":"新住民子女照護的敘述，「錯誤」者為(A)『出生後「立即」進行發展遲緩評估』——錯誤，發展評估應「「定期、依發展里程碑」於不同年齡進行(如健兒門診的發展篩檢)」，而非「出生後「立即」評估發展遲緩」(新生兒尚無法評估多數發展指標)。其他正確:B 為公共衛生護理人員建卡收案的對象;C 介紹同鄉婦女、提升新住民女性的育兒知能;D 鼓勵參與健兒門診。故本題選錯誤者為 A。發展評估應定期依里程碑進行，非出生後立即。","options":{"A":"正確(本題選錯誤者)。發展遲緩評估應定期依里程碑進行，非出生後立即。","B":"為公共衛生護理人員建卡收案的對象，正確。","C":"介紹同鄉婦女、提升育兒知能，正確。","D":"鼓勵參與健兒門診，正確。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"101030-N5-67":{"quick":"未成年懷孕率高的青少年保健重點＝預防懷孕及性病①、加強親職性教育④。","detail":{"background":"某部落未成年懷孕率高，針對「青少年」保健服務的重點應包括:(1)預防懷孕及性病(性教育、避孕、性病防治);(4)加強親職與性教育。而(2)測量頭圍、(3)預防注射是「「嬰幼兒」」保健的項目，並非青少年保健的重點。故正確為①④(選 C)。對未成年懷孕率高的族群，青少年保健以「預防懷孕/性病+性教育」為重點。","options":{"A":"12：含②(測量頭圍)，那是嬰幼兒保健。","B":"13：含③(預防注射)，那是嬰幼兒保健。","C":"正確。預防懷孕及性病①、加強親職性教育④。","D":"24：是嬰幼兒保健項目，非青少年保健。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"101030-N5-69":{"quick":"免費產前檢查：例行產檢含問診本胎不適、胎心音、胎位、驗尿蛋白尿糖等。","detail":{"background":"全民健保提供的免費產前檢查，正確的是(A)『例行產檢內容包含「問診(本胎不適症狀)、胎心音、胎位等身體檢查，及驗尿蛋白、尿糖、量血壓、體重」等』。其他錯誤:B 免費產檢次數的分配描述不符(實際次數依規定，並非「第一期3次、第二期3次、第三期6次」);C『對德國麻疹抗體陰性的「孕婦」免費注射疫苗』錯誤——德國麻疹(MMR)是「活性減毒疫苗」，「「孕期不可接種」」(應在「產後」補種);D『每次產檢均提供免費超音波』錯誤(超音波於特定週數提供，非每次)。故 A 正確。","options":{"A":"正確。例行產檢含問診、胎心音、胎位、驗尿蛋白尿糖等。","B":"免費產檢次數的分配描述不符規定。","C":"德國麻疹是活疫苗，孕期不可接種，應產後補種。","D":"超音波於特定週數提供，非每次產檢免費。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"101030-N5-73":{"quick":"提升易感性群體的復原力(resilience)＝培養解決問題之能力。","detail":{"background":"服務易感性族群時，最能「提升其復原力(resilience，從逆境中恢復、適應的能力)」的措施是(B)『「培養解決問題之能力(增進個人的因應、調適與自我效能)」』——復原力強調「「個體的內在能力與資源」」，培養問題解決能力能根本地增進其面對逆境的韌性。去除環境生物危險因子、提供社會救助、提供就業服務是「外在的協助/資源」，雖有幫助但非「直接提升個人復原力」的核心。故 B 正確。提升復原力著重培養個人的因應與問題解決能力。","options":{"A":"去除環境生物危險因子是改善外在環境。","B":"正確。培養解決問題之能力，最能提升個人的復原力。","C":"提供社會救助是外在資源的協助。","D":"提供就業服務是外在資源的協助。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101030-N5-80":{"quick":"BMI 27、45歲、最大心跳80%：目標心跳約每分鐘140下。","detail":{"background":"陳太太45歲，運動目標心跳為「最大心跳速率的80%」。「最大心跳速率(MHR)= 220 − 年齡 = 220 − 45 = 175(下/分)」;目標心跳 = 175 × 80% = 140(下/分)。故目標心跳約為每分鐘140下(選 B)。(計算:最大心跳=220-年齡;再乘以目標強度百分比。)","options":{"A":"120是約68%強度，非80%。","B":"正確。最大心跳175×80%≈140下/分。","C":"160約為91%強度，過高。","D":"175是100%(最大心跳)，非80%。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進"]}},"101110-N5-42":{"quick":"衛生所公共衛生護理師執業範圍「錯誤」者＝食品衛生稽查與檢驗。","detail":{"background":"衛生所公共衛生護理師執業範圍的敘述，「錯誤」者為(D)『食品衛生稽查與檢驗』——「食品衛生稽查與檢驗」是「「食品藥物管理/衛生稽查人員」」的職責，「不是」公共衛生護理師的執業範圍。其他屬其執業範圍:A 預防接種與傳染病預防;B 慢性病個案管理;C 協助門診之衛生教育。故本題選錯誤者為 D。公共衛生護理師的範圍是預防接種、傳染病防治、慢性病管理、衛教、婦幼老人保健等，不含食品衛生稽查檢驗。","options":{"A":"預防接種與傳染病預防，是公衛護理師的範圍。","B":"慢性病個案管理，是公衛護理師的範圍。","C":"協助門診之衛生教育，是公衛護理師的範圍。","D":"正確(本題選錯誤者)。食品衛生稽查與檢驗是衛生稽查人員的職責，非護理師。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101110-N5-43":{"quick":"臺灣醫療衛生體系現況「錯誤」者＝垂直分級轉診功能完善。","detail":{"background":"臺灣醫療衛生體系現況的敘述，「錯誤」者為(B)『「垂直分級轉診功能完善」』——錯誤，臺灣的「「分級醫療與雙向轉診制度「仍不完善」」(民眾自由就醫、大醫院壅塞、基層與醫院的轉診銜接不足，是長期待改善的問題)。其他正確:A 有醫療網計畫;C 醫院評鑑是以病人安全為方向;D 以三段預防原則規劃照護體系。故本題選錯誤者為 B。臺灣的分級轉診功能尚未完善，是醫療體系待改進之處。","options":{"A":"有醫療網計畫，正確。","B":"正確(本題選錯誤者)。分級轉診功能尚未完善，非完善。","C":"醫院評鑑以病人安全為方向，正確。","D":"以三段預防原則規劃照護體系，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"101110-N5-46":{"quick":"為社區老人施打流感疫苗＝第一段預防的「特殊保護」。","detail":{"background":"公共衛生護理師「為社區老年民眾施打流行感冒疫苗」——對「健康者」施打疫苗以「特別預防特定疾病」，屬『第一段(初級)預防的「特殊保護(specific protection)」』(疫苗接種、補充營養、避免致病因子等)。第一段的「健康促進」是衛教、營養、運動等一般性的健康增進;第二段是早期診斷早期治療;第三段是限制殘障/復健。「疫苗接種」屬特殊保護。故 B 正確。","options":{"A":"健康促進是衛教、營養、運動等一般性的健康增進。","B":"正確。施打疫苗屬第一段預防的特殊保護。","C":"第二段預防是早期診斷早期治療。","D":"第三段預防是限制殘障/復健。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"101110-N5-49":{"quick":"喝某店泡沫紅茶「量越多、腹瀉越多」＝因果關係的「劑量效應(dose-response)」。","detail":{"background":"公衛護理師發現「喝 A 家店泡沫紅茶的「頻率與量越多、腹瀉的人越多」」——這是「「暴露的劑量(量)越高、疾病風險越高」」，符合因果關係判定條件中的『劑量效應(劑量反應 dose-response relationship)』。相關強度是關聯的大小;正確時序是因在果之前;相關特定性是特定暴露對應特定疾病。本題強調「量越多、腹瀉越多」的「劑量-反應」關係，故為劑量效應。故 C 正確。劑量效應(暴露越多、風險越高)是支持因果關係的重要條件。","options":{"A":"相關強度是關聯的大小(如相對危險性)。","B":"正確時序是因(暴露)在果(疾病)之前。","C":"正確。「量越多、腹瀉越多」是劑量效應(dose-response)。","D":"相關特定性是特定暴露對應特定疾病。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","因果關係判定"]}},"101110-N5-55":{"quick":"收集社區資料來源「錯誤」者＝社區耆老及鄉野口耳相傳的軼事不具公信力、不可採納。","detail":{"background":"收集社區資料來源的敘述，「錯誤」者為(C)『社區耆老及鄉野間口耳相傳的軼事「不具公信力、不可採納」』——錯誤，社區「耆老的口述歷史、地方傳說」是「「重要的「質性」社區資料來源」」(反映社區的發展、文化、價值與居民觀點)，「可以採納」(與量化資料相互補充)。其他正確:A 由圖書館/文化中心獲得鄉誌的社區發展史;B 由學術單位的調查報告獲得健康/疾病統計;D 由戶政單位獲得出生、死亡、人口資料。故本題選錯誤者為 C。耆老口述是有價值的質性資料來源。","options":{"A":"由圖書館/文化中心獲得鄉誌，正確。","B":"由學術調查報告獲得健康/疾病統計，正確。","C":"正確(本題選錯誤者)。耆老口述是有價值的質性資料來源，可採納。","D":"由戶政單位獲得人口特性資料，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101110-N5-56":{"quick":"評估郵局位置、郵筒數、郵務品質＝收集社區的「溝通系統」。","detail":{"background":"評估社區的「郵政體系(郵局位置、郵筒數、郵務品質)」——是為了收集社區的(A)『「溝通(通訊)系統」(郵政、電話、網路、媒體等資訊傳遞的管道與品質)』。經濟狀況、安全與運輸系統、福利系統是其他評估面向。「郵政」屬於「溝通/通訊系統」(訊息傳遞的管道)。故 A 正確。社區評估的溝通系統包括郵政、電話、廣播、報紙、網路等資訊傳播管道。","options":{"A":"正確。郵局、郵筒、郵務屬社區的溝通(通訊)系統。","B":"經濟狀況是經濟系統的評估。","C":"安全與運輸系統是交通、警消等。","D":"福利系統是社會福利資源。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101110-N5-57":{"quick":"評估社區宗教系統，因宗教信仰最主要影響＝居民的生活方式與價值觀。","detail":{"background":"評估社區住民的「宗教系統」，是因為宗教信仰最主要影響社區居民的(C)『「生活方式與價值觀(信仰會形塑居民的價值觀、行為規範、生活習慣、對健康與疾病的態度等)」』。對宗教團體奉獻金錢的能力、尋求發展創新的能力、資源分配的平均性都不是宗教信仰「最主要」的影響面向。故 C 正確。宗教信仰最主要影響居民的價值觀與生活方式(也影響其健康行為與態度)。","options":{"A":"奉獻金錢的能力不是宗教信仰最主要的影響面向。","B":"尋求發展創新的能力不是宗教信仰的主要影響。","C":"正確。宗教信仰最主要影響居民的生活方式與價值觀。","D":"資源分配的平均性不是宗教信仰的主要影響。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101110-N5-58":{"quick":"讓社區全體動起來最重要的決定因素＝社區民眾對目標與需求的共識。","detail":{"background":"要讓一個社區「全體動起來(全民參與、共同行動)」，最重要的決定因素是(B)『「社區民眾對目標與需求的「共識(consensus)」」(當居民對「要解決什麼問題、追求什麼目標」有共同的認知與認同時，才能凝聚力量、共同投入)』。社區健康評估的完整性、領導者的民主程度、現有資源的多寡雖有影響，但「居民的共識」是「動員全體」的根本。故 B 正確。社區動員的關鍵是凝聚居民對共同目標與需求的共識。","options":{"A":"社區健康評估的完整性是基礎，但非動員全體的最重要因素。","B":"正確。社區民眾對目標與需求的共識，是讓社區全體動起來的最重要因素。","C":"領導者的民主程度有影響，但非最根本。","D":"現有資源的多寡有影響，但非最根本。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101110-N5-59":{"quick":"選「新型流感」而非「兒童近視」優先處理＝依問題的嚴重性。","detail":{"background":"社區護理師選擇以「新型流感(傳染力強、可致死、影響廣、急迫)」而非「兒童近視」為優先處理議題，其依據是(D)『「問題的嚴重性(severity，新型流感的危害程度、急迫性、影響範圍都遠大於近視)」』。社區對問題的了解、可利用資源、預防效果雖是排序的考量因素，但本題的關鍵在「兩者「嚴重性」的差異」。故 D 正確。設定優先順序時，問題的嚴重性(危害程度與急迫性)是重要的判準。","options":{"A":"社區對問題的了解是考量之一，但非本題的關鍵。","B":"可利用資源是考量之一，但非本題的關鍵。","C":"預防的效果是考量之一，但非本題的關鍵。","D":"正確。新型流感的危害遠大於近視，依問題的嚴重性優先。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"101110-N5-69":{"quick":"跨國婚姻新住民女性照護「錯誤」者＝首要工作為避孕。","detail":{"background":"公共衛生護理師對跨國婚姻新住民女性的照護，「錯誤」者為(A)『「首要工作為避孕」』——錯誤，新住民女性的照護應以「「整體性的適應、健康、家庭與社會支持」」為主(尊重其生育自主)，「避孕」並非「首要」工作(且把避孕當首要，帶有對其生育的不當預設)。其他正確:B 鼓勵參與識字班、減少就醫障礙;C 評估其在家庭的溝通與適應能力;D 未納入全民健保前，補助產前檢查。故本題選錯誤者為 A。新住民照護應以整體適應與健康為主，非以避孕為首要。","options":{"A":"正確(本題選錯誤者)。新住民照護應以整體適應與健康為主，非以避孕為首要。","B":"鼓勵參與識字班、減少就醫障礙，正確。","C":"評估在家庭的溝通與適應能力，正確。","D":"未納健保前補助產前檢查，正確。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生","新住民照護"]}},"101110-N5-79":{"quick":"渥太華憲章五大行動綱領「錯誤」者＝發展遺傳生物科技。","detail":{"background":"世界衛生組織渥太華憲章的「五大行動綱領」是:訂定健康的公共政策(B)、創造支持性的環境、強化社區行動(社區組織)、發展個人(生活)技能(C)、調整健康服務取向(D)。而(A)『發展遺傳生物科技』「不是」渥太華憲章的行動綱領。故本題選錯誤者為 A。渥太華憲章五大綱領聚焦於政策、環境、社區、個人技能與服務取向，與生物科技無關。","options":{"A":"正確(本題選錯誤者)。「發展遺傳生物科技」不是渥太華憲章的行動綱領。","B":"訂定健康的公共政策，是五大綱領之一。","C":"發展個人生活技能，是五大綱領之一。","D":"調整健康服務取向，是五大綱領之一。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","渥太華憲章"]}},"102030-N5-42":{"quick":"國際衛生參與「錯誤」者＝獲得國際聲譽重於實質目的。","detail":{"background":"國際衛生參與的描述，「錯誤」者為(C)『「獲得國際聲譽「重於」實質目的」』——錯誤，國際衛生參與的「核心是「實質的疾病防治、資訊交流、合作互助」」，而非「以獲得聲譽為重」(聲譽是附帶結果，非主要目的)。其他正確:A 可取得國際衛生的即時資訊及援助;B 可促進疾病防治;D 合作議題包括災難防治及應變。故本題選錯誤者為 C。國際衛生參與以實質的防治與合作為目的，非以聲譽為重。","options":{"A":"可取得國際衛生的即時資訊及援助，正確。","B":"可促進疾病防治，正確。","C":"正確(本題選錯誤者)。應以實質目的為重，非獲得聲譽為重。","D":"合作議題包括災難防治及應變，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"102030-N5-43":{"quick":"社區衛生護理照護模式的轉變趨勢＝個體導向→家庭導向→群體導向。","detail":{"background":"社區衛生護理照護模式的轉變趨勢是(B)『「個體導向 → 家庭導向 → 群體(社區)導向」』——早期以「個人」的疾病照護為主，逐漸擴展到「家庭」為單位，再到以「群體/社區」為對象的健康促進與預防(著重族群健康、健康不平等、社區參與)。故 B 正確。社區護理由「個體→家庭→群體」逐步擴展照護的範圍與焦點。","options":{"A":"順序錯誤(家庭應在群體之前)。","B":"正確。個體導向→家庭導向→群體導向。","C":"順序錯誤(個體應在家庭之前)。","D":"順序完全相反。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102030-N5-47":{"quick":"採集工廠排放水檢驗水質淨化程度＝初段預防的特殊保護。","detail":{"background":"公衛護理師協同環保人員「採集工廠排放水、檢驗水質淨化程度」——這是「「控制環境中的致病/污染因子(特定的環境保護措施)」」，屬『初段(第一段)預防的「特殊保護(specific protection)」』(如環境衛生、職業安全、疫苗、營養補充等針對特定致病因子的防護)。初段的健康促進是一般性衛教;二段是早期發現早期治療;三段是限制殘障/復健。「檢驗水質、控制污染」屬特殊保護。故 B 正確。","options":{"A":"初段預防的健康促進是一般性的健康增進。","B":"正確。檢驗水質、控制環境污染因子，屬初段預防的特殊保護。","C":"二段預防是早期發現早期治療。","D":"三段預防是限制殘障/復健。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"102030-N5-50":{"quick":"向社區民眾報告評估結果並尋求回饋＝民意團體過程(community forum)。","detail":{"background":"社區護理師「向社區民眾報告評估結果、並尋求回饋」——適合採用『民意團體過程(community forum/社區論壇)』:召集社區民眾，公開報告、討論、徵詢意見與回饋(讓居民參與、表達看法、形成共識)。社會調查是問卷調查;重要人物訪談是訪談關鍵人物;參與性觀察是融入社區觀察。本題是「公開向民眾報告並尋求回饋」，故為民意團體過程。故 B 正確。","options":{"A":"社會調查是以問卷調查收集資料。","B":"正確。向民眾報告並尋求回饋，採民意團體過程(社區論壇)。","C":"重要人物訪談是訪談關鍵人物。","D":"參與性觀察是融入社區進行觀察。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102030-N5-52":{"quick":"最易測量達成情形的社區健康目標＝社區青少年能學會三種避孕方法。","detail":{"background":"擬訂社區健康計畫時，最易「測量其達成情形」的目標是(D)『「社區青少年能「學會三種避孕方法」」』——這是「「具體、可量化(可測得「會幾種」)、行為明確」」的目標，最容易評值是否達成。其他選項較抽象、難量化:A『培養自行解決問題的能力』;B『規律參與運動』(「規律」需明確定義);C『了解更年期保健知識』(「了解」較難客觀測量)。相較之下，「學會三種避孕方法」最具體可測。故 D 正確。可測量的目標應具體、量化、行為明確。","options":{"A":"「培養解決問題的能力」抽象、難量化。","B":"「規律參與運動」的「規律」需明確定義。","C":"「了解保健知識」的「了解」較難客觀測量。","D":"正確。「學會三種避孕方法」具體、可量化、最易測量。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102030-N5-53":{"quick":"社區重要決策者及守門員(gatekeeper)＝里長、社區發展協會理事長或民意代表。","detail":{"background":"社區的重要「決策者及守門員(gatekeeper，掌握資源、影響力、可協助進入社區的關鍵人物)」是(C)『「里長、社區發展協會理事長或民意代表」(他們有社區的影響力、人脈與決策權，是社區護理進入社區、推動工作的重要關鍵人物)』。大廈管理員、派出所警員、衛生局長雖各有角色，但「社區的決策者/守門員」最對應「里長、社區發展協會理事長、民意代表」。故 C 正確。守門員是進入社區、取得認同與資源的關鍵人物。","options":{"A":"大廈/大樓管理員是門禁管理，非社區的決策者守門員。","B":"派出所警員負責治安，非社區的決策守門員。","C":"正確。里長、社區發展協會理事長或民意代表，是社區的決策者及守門員。","D":"衛生局長/課長是行政主管，非社區層級的守門員。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102030-N5-54":{"quick":"社區營造中心與媒體建立溝通與合作關係＝運用「合作及聯盟」策略。","detail":{"background":"社區營造中心「與媒體建立良好的溝通管道與合作關係」——是運用(A)『「合作及聯盟(collaboration and coalition)」策略(與其他單位/組織結盟、合作，共同推動健康議題、擴大影響力)』。資源整合及交流著重資源的整合;籌募資源是募集經費/物資;建立公共政策是制定政策。本題是「與媒體「建立合作關係」」，故為合作及聯盟。故 A 正確。與媒體等單位建立合作關係屬「合作及聯盟」策略。","options":{"A":"正確。與媒體建立溝通與合作關係，是合作及聯盟策略。","B":"資源整合及交流著重資源的整合運用。","C":"籌募資源是募集經費/物資。","D":"建立公共政策是制定政策。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102030-N5-55":{"quick":"確定社區健康問題處理的優先順序＝民意團體過程法。","detail":{"background":"在社區健康問題確定後，最適合用於「確定問題處理的優先順序」的是(B)『「民意團體過程法(nominal group process/community forum)」(召集相關人員，透過團體討論、共同評定各問題的重要性與優先序，凝聚共識)』。社會調查法是收集資料;滾雪球法是透過人脈擴展樣本/資源;社會指標法是用既有的統計指標。本題是「排定優先順序(需團體共識)」，故為民意團體過程法。故 B 正確。確定優先順序常用民意團體過程(團體共識)。","options":{"A":"社會調查法是收集資料的方法。","B":"正確。確定問題處理的優先順序，用民意團體過程法。","C":"滾雪球法是透過人脈擴展樣本/資源。","D":"社會指標法是用既有的統計指標評估。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102030-N5-60":{"quick":"制訂並執行菸害防制法＝渥太華憲章的「建立健康公共政策」。","detail":{"background":"「制訂菸害防制法並執行」——對應渥太華憲章五大行動綱領的(A)『「建立健康公共政策(build healthy public policy)」(透過立法、規範、財稅等政策手段，創造有利於健康的環境)』。創造支持性環境是改善生活/工作環境;強化社區組織是社區參與;發展個人技能是衛教與技能培養。本題是「「立法(菸害防制法)」」，故為建立健康公共政策。故 A 正確。立法、政策手段屬「建立健康公共政策」。","options":{"A":"正確。制訂菸害防制法是建立健康公共政策。","B":"創造支持性環境是改善生活/工作環境。","C":"強化社區組織是促進社區參與。","D":"發展個人技能是衛教與技能培養。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","渥太華憲章"]}},"102030-N5-66":{"quick":"越南籍配偶懷孕、未產檢：首要提供「協助安排產檢及外籍配偶照顧輔導基金醫療補助申請」。","detail":{"background":"阮氏紅(越南籍、懷孕兩個月、未產檢、剛抵台)詢問相關問題，為「提高定期產前檢查意願」，公衛護理師首要提供的資源是(C)『「協助安排產檢，並提供「外籍配偶照顧輔導基金醫療補助」的申請(解決其「就醫管道與經濟」的障礙，使其能順利接受產檢)」』。介紹哺乳支持團體、生活成長營是後續;安排優生保健門診非「提高產檢意願」的首要。對未產檢的新住民孕婦，先協助安排產檢、解決就醫與費用障礙。故 C 正確。","options":{"A":"介紹哺乳支持團體是產後/後續的資源。","B":"安排優生保健門診非提高產檢意願的首要。","C":"正確。協助安排產檢及提供醫療補助申請，解決就醫與費用障礙。","D":"協助報名生活成長營是後續的支持。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生","新住民照護"]}},"102030-N5-67":{"quick":"新住民孕婦語言不通、需飲食衛教：請通譯員協助，對其進行飲食衛教。","detail":{"background":"阮氏紅僅能簡單溝通、不識字、產檢尿蛋白需飲食控制。公衛護理師最好轉介的資源是(C)『「請「通譯(翻譯)員」協助，對阮氏紅進行飲食衛教」(克服語言障礙，確保衛教內容能被正確理解與執行)』。其他錯誤:A『立刻參加媽媽教室』語言不通難以吸收;B『詳讀媽媽手冊的飲食衛教』她「不識字」、無效;D『教她國台語』緩不濟急(無法即時解決飲食控制的需求)。故 C 正確。對語言不通的新住民，以通譯員協助衛教最能克服語言障礙。","options":{"A":"語言不通，參加媽媽教室難以吸收。","B":"她不識字，詳讀手冊無效。","C":"正確。請通譯員協助，對其進行飲食衛教。","D":"教她國台語緩不濟急，無法即時解決飲食控制需求。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生","新住民照護"]}},"102030-N5-68":{"quick":"對越南坐月子「燻木炭」習俗立刻反對：護理師宜加強「文化敏感度」的能力。","detail":{"background":"阮氏紅打算依越南傳統「坐月子期間燻木炭」，公衛護理師「立刻表示反對」——此案例中護理師宜加強(C)『「文化敏感度(cultural sensitivity)」的能力(尊重、理解不同文化的習俗與信念，先了解其意義、再以同理的方式溝通可能的健康風險，而非立刻否定)』。直接反對會傷害關係、不尊重其文化。產後照護知識、優生保健知識、越南話能力雖有助益，但本題的核心問題是「對文化的尊重與敏感度不足」。故 C 正確。跨文化照護須具備文化敏感度，尊重並理解文化差異。","options":{"A":"產後照護知識有助益，但本題核心是文化敏感度不足。","B":"優生保健知識非本題的核心。","C":"正確。立刻反對其文化習俗，宜加強文化敏感度的能力。","D":"學習越南話有助溝通，但非本題的核心問題。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生","新住民照護","文化照護"]}},"102030-N5-69":{"quick":"外籍配偶設籍前產檢補助＝未納健保前每人每次600元、每胎最高5次。","detail":{"background":"依「外籍配偶照顧輔導基金醫療補助作業說明(民國100年修正)」，外籍配偶「設籍前(未納入健保前)」的「產前檢查費用」補助是(B)『「未納入健保前的產檢費，每人每次檢查補助新臺幣600元，每胎最高5次」』。其他選項的金額/次數/上限描述不符(非「所有費用」、非「無上限」、非「10次」)。故 B 正確。該補助是針對尚未納入健保的外籍配偶孕婦，補助產檢費(每次600元、每胎最高5次)。","options":{"A":"非補助「所有」產檢費用，有金額與次數限制。","B":"正確。每人每次600元、每胎最高5次。","C":"非「6次、金額無上限」。","D":"非「10次、每次600元」。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生","新住民照護"]}},"102030-N5-75":{"quick":"偏遠地區的居家護理服務＝鼓勵衛生所設立居家護理所，由衛生所居家護理師提供。","detail":{"background":"對國內偏遠地區民眾，政策上主要以(C)『「鼓勵衛生所設立居家護理所(站)，由衛生所的居家護理師提供服務」』——因偏遠地區醫療資源不足、民間機構不易設立，故由「公部門(衛生所)」承擔居家護理服務，確保偏遠民眾的可近性。委託醫院診所、鼓勵獨立型態機構、委託醫院附設居家護理所較適用於「資源充足」的地區。故 C 正確。偏遠地區的居家護理主要由衛生所承擔。","options":{"A":"委託醫院診所較適用於資源充足的地區。","B":"獨立型態機構不易在偏遠地區設立。","C":"正確。鼓勵衛生所設立居家護理所，由衛生所居家護理師提供。","D":"委託醫院附設居家護理所較適用於資源充足地區。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"102110-N5-45":{"quick":"建立分級醫療與轉診系統的目的＝使醫療資源分布較均勻、使用較合理。","detail":{"background":"醫療網規劃中，建立「分級醫療作業制度與轉診系統」的目的是(A)『「期使醫療資源分布「較均勻」、「使用較合理」(分級就醫、雙向轉診，避免資源集中、大醫院壅塞，使各層級的醫療資源獲得合理運用)」』。其他選項不符:B、C、D 的「避免健康醫療化、促進自由競爭、擴充需求」都不是分級醫療轉診的目的。故 A 正確。分級醫療與轉診旨在使醫療資源分布均勻、使用合理。","options":{"A":"正確。使醫療資源分布較均勻、使用較合理。","B":"「避免健康醫療化」非分級轉診的目的。","C":"「促進自由競爭」非分級轉診的目的。","D":"「擴充人民需求」非分級轉診的目的。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"102110-N5-46":{"quick":"社區夥伴關係(collaborative partnership)＝促進成員中的相互支持與互動。","detail":{"background":"社區夥伴關係(collaborative partnership)的正確描述是(D)『「促進成員中的「相互支持與互動」(夥伴間平等、合作、相互支持，共同投入社區健康)」』。其他錯誤:A『著重於「專家的指導」』錯誤(夥伴關係強調平等合作、社區參與，非專家主導);B『民眾參與「不是重要考量」』錯誤(民眾參與「正是」夥伴關係的核心);C『目標在「爭取更多的權力與代表性」』錯誤(目標是合作達成共同的健康目標，非爭權)。故 D 正確。社區夥伴關係強調平等、合作、民眾參與、相互支持。","options":{"A":"夥伴關係強調平等合作，非專家主導指導。","B":"民眾參與是夥伴關係的核心，非不重要。","C":"目標是合作達成共同的健康目標，非爭取權力。","D":"正確。促進成員中的相互支持與互動。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102110-N5-47":{"quick":"偏遠地區為達全民均健的重要健康保健策略＝基層醫療保健。","detail":{"background":"偏遠地區醫療資源不足，為達「全民均健」目標，重要的健康保健策略應為(D)『「基層醫療保健(primary health care)」——以可近、可負擔、適切的基層保健服務(預防、健康促進、基本醫療)，照顧偏遠地區民眾的基本健康需求(這也是 WHO 阿瑪阿塔宣言的核心)』。急重症醫療、醫院醫療、專科醫療都是「較高層級、資源密集」的醫療，不適合作為偏遠地區「全民均健」的「基礎」策略。故 D 正確。偏遠地區應強化基層醫療保健，以達全民均健。","options":{"A":"急重症醫療是高層級醫療，非偏遠地區的基礎策略。","B":"醫院醫療資源密集，非偏遠地區的基礎策略。","C":"專科醫療是高層級醫療，非基礎策略。","D":"正確。偏遠地區應強化基層醫療保健，以達全民均健。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"102110-N5-49":{"quick":"邀請社區領導人、民眾共同參與會議討論健康服務＝民意團體過程。","detail":{"background":"社區護理師「擔任主持人、邀請社區領導人、民眾與相關人員共同參與會議，討論社區所需的健康服務」——此方法為(C)『「民意團體過程(community forum/社區論壇)」(召集社區成員，公開討論、徵詢意見、凝聚對健康需求與服務的共識)』。參與性觀察是融入社區觀察;擋風玻璃式調查是開車繞社區觀察環境;個案調查是針對個案的調查。本題是「召集會議、共同討論」，故為民意團體過程。故 C 正確。","options":{"A":"參與性觀察是融入社區進行觀察。","B":"擋風玻璃式調查是開車繞社區觀察環境。","C":"正確。邀請相關人員共同參與會議討論，是民意團體過程。","D":"個案調查是針對個案的調查。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102110-N5-50":{"quick":"鄰里募款、輪流照顧車禍喪妻家庭＝華倫(Warren)社區五大功能的「互相支援」。","detail":{"background":"陳先生車禍又喪妻、家有老母與兩名孩童，「鄰里募款並輪流協助照顧其家中飲食」——這是社區成員「在困難時相互幫助、提供支持」，屬華倫(Warren)社區五大功能中的(A)『「互相支援(mutual support，社區成員間的相互扶持與協助)」』。社會參與是參與社區活動;社會控制是規範行為;生產-分配-消費是經濟功能。本題是「鄰里相互幫助」，故為互相支援。故 A 正確。","options":{"A":"正確。鄰里募款、輪流照顧，是社區的互相支援功能。","B":"社會參與是參與社區活動。","C":"社會控制是規範成員行為。","D":"生產-分配-消費是社區的經濟功能。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102110-N5-51":{"quick":"考量護理師能力與解決問題的快速性，應優先處理＝子宮頸篩檢比率偏低。","detail":{"background":"考量「護理師的能力」及「解決問題的快速性(可行性、見效快)」，應優先處理的社區健康問題是(D)『「子宮頸篩檢比率偏低」』——這是「「護理師有能力處理(衛教、推廣篩檢)、且可在較短時間內見效(提高篩檢率)」」的問題。火災預防、老人醫療保健缺乏、青少年性氾濫都是「較複雜、涉及多面向、難以由護理師快速解決」的問題。故 D 正確。在「能力與快速性」的考量下，選擇護理師可掌握、見效快的議題優先。","options":{"A":"火災預防涉及消防等多面向，非護理師可快速解決。","B":"老人醫療保健缺乏是複雜的系統性問題。","C":"青少年性氾濫涉及多面向，難以快速解決。","D":"正確。子宮頸篩檢比率偏低，護理師有能力且可快速見效。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102110-N5-52":{"quick":"培養社區獨立解決問題的能力＝充分賦權(empowerment)。","detail":{"background":"為培養「社區獨立解決問題的能力」，最適當的方式是(C)『「充分賦權(empowerment)」——使社區「獲得能力、資源與權力，自主地辨識問題、做決定、採取行動」，進而能獨立解決自己的問題(由「為民眾做」轉為「讓民眾自己能做」)』。分析社區檔案是資料分析;領導統御是領導;訂定績效指標是評值。本題核心是「培養社區「自主解決問題」的能力」，故為充分賦權。故 C 正確。賦權是培養社區自主、獨立解決問題能力的核心策略。","options":{"A":"分析社區檔案是資料分析的方法。","B":"領導統御是領導的方式。","C":"正確。培養社區獨立解決問題的能力，靠充分賦權。","D":"訂定績效指標是評值的方式。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","賦權"]}},"102110-N5-60":{"quick":"山地離島偏遠地區的健康照護政策「錯誤」者＝鼓勵都會區名醫前往服務、強化醫療品質。","detail":{"background":"強化山地離島偏遠地區健康照護的政策，「錯誤」者為(A)『鼓勵「都會區名醫前往服務」、強化醫療品質』——錯誤，這「不切實際、不可持續(名醫難以長期留任偏遠地區)」，且非政策重點。實際的政策是「「培育在地醫護人力、建構在地的可近服務」」。其他正確:B 補助硬體設施、巡迴醫療車、資訊醫療設備;C 推動偏遠部落醫療資訊化(遠距醫療);D 推動偏遠部落社區健康營造。故本題選錯誤者為 A。偏遠地區政策著重在地化、可近、可持續的服務。","options":{"A":"正確(本題選錯誤者)。「鼓勵都會名醫前往」不切實際、非可持續的政策。","B":"補助硬體、巡迴醫療車、資訊設備，正確。","C":"推動醫療資訊化(遠距醫療)，正確。","D":"推動社區健康營造，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"102110-N5-66":{"quick":"74歲糖尿病、飯前空腹運動後吃稀飯：建議飯後一小時再運動。","detail":{"background":"王媽媽74歲糖尿病、服飯後降血糖藥、「習慣「飯前(空腹)」運動(跳元極舞)再回家吃稀飯」。最適當的建議是(C)『「飯後一小時再運動」』——「空腹(飯前)運動+服降血糖藥」易發生「低血糖」，故宜改在「飯後一小時(血糖較穩定時)」運動，較安全。A『維持原習慣』有低血糖風險;B『飯後「立即」運動』不利消化、且時機不佳;D『稀飯有助血糖穩定』錯誤(稀飯「升糖指數高」、會使血糖快速上升，不利血糖控制)。故 C 正確。糖尿病人宜飯後一小時運動以避免低血糖。","options":{"A":"維持飯前空腹運動有低血糖風險。","B":"飯後立即運動不利消化、時機不佳。","C":"正確。飯後一小時再運動，較安全(避免空腹低血糖)。","D":"稀飯升糖指數高，不利血糖控制，非有助穩定。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"102110-N5-67":{"quick":"發展改善社區健康的執行策略時，「不需考慮」者＝重要人物的政治立場。","detail":{"background":"發展改善社區健康的執行策略時，需考慮的因素中，「錯誤(不需考慮)」者為(A)『「重要人物的政治立場」』——策略的制定應基於「健康需求、實證、可行性」，而非「政治立場」(以政治立場為依據會偏離專業與公正)。其他是應考慮的因素:B 執行策略時可能遭遇的障礙;C 未執行該策略之可能後果;D 策略行動之優先順序。故本題選錯誤者為 A。策略制定應以專業與健康需求為依據，非政治立場。","options":{"A":"正確(本題選錯誤者)。策略應基於健康需求與可行性，非政治立場。","B":"執行時可能遭遇的障礙，是應考慮的因素。","C":"未執行的可能後果，是應考慮的因素。","D":"策略行動的優先順序，是應考慮的因素。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102110-N5-74":{"quick":"社區健康營造「行銷籌備期」的目標＝使社區居民接納欲推動的計畫。","detail":{"background":"社區健康營造的實施期程中，「行銷籌備期」的目標是(C)『「使社區居民「接納」欲推動的計畫」(透過行銷、宣導，讓居民認識、認同、願意參與)』。成立功能性委員會、進行衛生計畫是「執行期」;進行評價與回饋是「評價期」。「行銷籌備期」的核心是「讓居民接納、願意參與計畫」。故 C 正確。社區健康營造的行銷籌備期重在讓居民接納、認同要推動的計畫。","options":{"A":"成立功能性委員會偏向組織/執行期。","B":"進行社區衛生計畫是執行期。","C":"正確。使社區居民接納欲推動的計畫，是行銷籌備期的目標。","D":"進行評價與回饋是評價期。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"102110-N5-75":{"quick":"收集社經狀態、貧戶比率、職業分布＝評估社區的「經濟系統」。","detail":{"background":"社區護理師收集「社經狀態、貧戶比率、職業分布」等資料——是評估社區的(B)『「經濟系統」(社區的就業、收入、貧富、產業等經濟狀況)』。福利系統是社會福利資源;政治系統是權力結構與組織;娛樂系統是休閒設施。本題收集的是「社經、貧戶、職業」，屬經濟系統。故 B 正確。社區評估的經濟系統包括就業、收入、貧富、職業分布等。","options":{"A":"福利系統是社會福利資源的評估。","B":"正確。社經狀態、貧戶比率、職業分布，屬經濟系統。","C":"政治系統是權力結構與組織。","D":"娛樂系統是休閒設施的評估。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103030-N5-46":{"quick":"社區衛生護理師參與決策：決策過程中護理師應充分表達自己的意見。","detail":{"background":"關於社區衛生護理師參與決策過程，正確的是(B)『決策過程中，護理師應「充分表達自己的意見(以專業觀點參與、貢獻、爭取病人與社區的權益)」』。其他錯誤:A『護理師是基層人員、「不需要參與」決策』錯誤(護理師應積極參與決策，發揮專業影響力);C『「意識形態」是參與決策的依據』錯誤(決策應基於「實證、專業、需求」，而非意識形態);D『決策過程「不需與其他專業磋商協調」』錯誤(決策應跨專業合作、磋商協調)。故 B 正確。護理師應積極參與決策、充分表達專業意見、跨專業合作。","options":{"A":"護理師應積極參與決策，非不需參與。","B":"正確。決策過程中護理師應充分表達自己的意見。","C":"決策應基於實證、專業、需求，非意識形態。","D":"決策應跨專業磋商協調，非不需。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103030-N5-49":{"quick":"社區健康問題確立後的優先步驟＝讓意見領袖/重要關係人熟悉問題、討論、建立信任。","detail":{"background":"社區健康評估確立問題後，社區衛生護理師「優先」進行的步驟是(B)『「讓社區的意見領袖或重要關係人「熟悉該健康問題、進行討論、引起興趣、建立信任與信賴」」(取得關鍵人物的認同與支持，是後續推動計畫的基礎)』。設立基金會募款(C)、行銷宣傳(C)、研發創新策略並大量推廣(D)都是「「後續」的執行階段」，必須先「建立關係、取得認同」才能推動。故 B 正確。確立問題後，先與意見領袖建立關係、取得認同，是優先步驟。","options":{"A":"設立基金會募款是後續的資源籌措。","B":"正確。讓意見領袖/重要關係人熟悉問題、討論、建立信任。","C":"強大的行銷宣傳是後續的執行階段。","D":"研發創新策略並大量推廣是後續的執行階段。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103030-N5-51":{"quick":"調查居民看哪些新聞、在哪討論議題＝評估社區的「溝通系統」。","detail":{"background":"調查「社區居民看哪些類型的新聞、多數聚集在哪裡討論議題」——主要是評估社區的(D)『「溝通系統(訊息傳播的管道、媒介、民眾獲取與交流資訊的方式)」』。娛樂系統是休閒設施;物理環境是地理、空間;教育系統是學校教育。本題是「新聞媒介、資訊討論的管道」，屬溝通系統。故 D 正確。社區的溝通系統包括正式(報紙、廣播、網路)與非正式(聚集討論)的資訊傳播管道。","options":{"A":"娛樂系統是休閒設施。","B":"物理環境是地理、空間。","C":"教育系統是學校教育。","D":"正確。看哪些新聞、在哪討論議題，屬溝通系統。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103030-N5-52":{"quick":"抽樣選取部分民眾、詢問對特定事項的看法＝社會調查。","detail":{"background":"社區健康評估時，「抽樣選取一部分社區民眾，詢問他們對特定事項的看法」——這是(C)『「社會調查(social survey，以抽樣+問卷/訪問，收集民眾的意見、態度、行為等量化資料)」』。重要人物訪談是訪談關鍵少數;參與性觀察是融入觀察;民意團體過程是召集團體討論。本題是「抽樣+詢問看法」，故為社會調查。故 C 正確。社會調查以抽樣與問卷/訪問收集民眾意見的量化資料。","options":{"A":"重要人物訪談是訪談關鍵少數人物。","B":"參與性觀察是融入社區進行觀察。","C":"正確。抽樣選取部分民眾、詢問看法，是社會調查。","D":"民意團體過程是召集團體討論。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103030-N5-53":{"quick":"以成本效益分析進行的評價(House 1980)＝系統分析模式。","detail":{"background":"依 House(1980)的評價模式，以「成本效益分析(cost-benefit analysis)」進行的評價，屬(D)『「系統分析模式(systems analysis model)」(著重「投入與產出、成本與效益的比較」，評估方案的效率與效益)』。決策模式著重提供決策資訊;行為目標模式著重是否達成預設的行為目標;非目標評價模式著重不預設目標、看實際的全面影響。「成本效益分析」屬系統分析模式。故 D 正確。","options":{"A":"決策模式著重提供決策所需的資訊。","B":"行為目標模式著重是否達成預設的目標。","C":"非目標評價模式不預設目標、看全面影響。","D":"正確。以成本效益分析進行評價，屬系統分析模式。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103030-N5-54":{"quick":"公共場所提供哺乳室以促進母乳哺餵＝渥太華憲章的「創造支持性環境」。","detail":{"background":"為促進哺餵母乳，「推動公共場所均提供哺乳室」——對應渥太華憲章的(B)『「創造一個有支持性的環境(create supportive environments)」(改善生活/工作/公共環境，使健康的選擇成為容易的選擇;提供哺乳室讓母親在外也能方便哺乳)』。建立健康公共政策是立法政策;強化社區行動是社區參與;發展個人技能是衛教。本題是「提供哺乳室(改善環境設施)」，故為創造支持性環境。故 B 正確。","options":{"A":"建立健康公共政策是立法/政策手段。","B":"正確。提供哺乳室(改善環境設施)，是創造支持性環境。","C":"強化社區組織是促進社區參與。","D":"發展個人技能是衛教與技能培養。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","渥太華憲章"]}},"103030-N5-60":{"quick":"小腦萎縮症家族：建議參與自助團體、志工定期關懷，主要在增進案家的「社會支持」。","detail":{"background":"張家有小腦萎縮症、長子發病，護理師建議「參與自助團體、志工定期關懷」——這些措施主要目的在增進案家的(D)『「社會支持(social support，透過自助團體的同儕支持、志工的關懷，提供情緒、訊息與實質的支持)」』。經濟收入、社會地位、預防疾病惡化都不是「自助團體+志工關懷」的主要目的(自助團體與關懷訪視提供的是「社會支持」)。故 D 正確。自助團體與志工關懷的核心是提供社會支持。","options":{"A":"增進經濟收入非自助團體/志工關懷的主要目的。","B":"增進社會地位非其主要目的。","C":"預防疾病惡化是醫療處置，非自助團體/關懷的主要目的。","D":"正確。參與自助團體、志工關懷，主要在增進社會支持。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103030-N5-61":{"quick":"山地離島基層保健的工作重點：辦理巡迴醫療①、培育醫護人力②、改善充實醫療器材設備③(興建各式醫療機構④非)。","detail":{"background":"為保障山地離島偏遠地區的基層保健醫療服務，政府的工作重點:(1)辦理「巡迴醫療(深入部落、定點服務)」;(2)培育「(在地)醫護人力」;(3)改善並充實「醫療器材與設備」。而(4)『「興建各式醫療機構」』非工作重點——偏遠地區人口少、資源有限，「不需興建「各式(各層級)」醫療機構」，而是以「巡迴、在地基層、遠距」的方式提供可近服務。故正確為①②③(選 A)。","options":{"A":"正確。辦理巡迴醫療①、培育醫護人力②、改善充實醫療器材設備③。","B":"124：含④(興建各式醫療機構)，非工作重點。","C":"134：含④，錯誤。","D":"234：含④、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"103030-N5-62":{"quick":"解決顏媽媽健保費問題的政府協助「錯誤」者＝轉介里長代為繳納健保費。","detail":{"background":"解決顏媽媽(弱勢、欠費鎖卡)的健保費問題，社區護理師可運用的政府協助措施中，「錯誤」者為(A)『轉介「里長代為繳納健保費」』——錯誤，「里長「沒有代為繳納健保費的義務或職責」」，這不是政府的協助措施。其他正確的政府協助:B 向區公所申請「特定弱勢者補助健保費」;C 向健保署辦理「分期攤繳保險費」;D 申辦「重大傷病卡」獲得免部分負擔優惠。故本題選錯誤者為 A。應運用正式的政府補助/分期/重大傷病等管道，而非要里長代繳。","options":{"A":"正確(本題選錯誤者)。里長無代繳健保費的義務，非政府協助措施。","B":"向區公所申請特定弱勢者補助健保費，正確。","C":"向健保署辦理分期攤繳保險費，正確。","D":"申辦重大傷病卡獲得免部分負擔優惠，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"103030-N5-70":{"quick":"56歲、BMI28、抽菸、血壓膽固醇偏高：建議食用高纖、清淡飲食、減少鈉和油脂。","detail":{"background":"周先生56歲、BMI 28(過重)、久坐、抽菸、血壓130~140/90~95(偏高)、膽固醇230(偏高)。最恰當也可行的建議是(B)『「食用高纖、清淡飲食，減少鈉(鹽)和油脂的攝取」(透過飲食改善體重、血壓、血脂，是可行的生活型態介入)』。其他錯誤:A『「優先使用藥物」控制』言之過早(應先生活型態介入);C『「多喝紅酒」預防冠心病』錯誤(不應鼓勵飲酒);D『運動心跳達「150次」』對其(過重、有風險因子)過高、不安全(應「適度」運動)。故 B 正確。對有多重風險因子者，先以飲食、運動等生活型態介入。","options":{"A":"應先生活型態介入，「優先用藥」言之過早。","B":"正確。食用高纖、清淡飲食，減少鈉和油脂的攝取。","C":"不應鼓勵「多喝紅酒」(不應鼓勵飲酒)。","D":"運動心跳達150對其過高、不安全。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"103030-N5-74":{"quick":"衛生所公衛護理師在社區健康管理最能發揮的獨特角色＝提供社區健康服務。","detail":{"background":"衛生所公共衛生護理師在社區健康管理中，「最能發揮的獨特角色」是(C)『「提供社區健康服務(直接到社區/家庭，提供預防接種、慢性病管理、婦幼老人保健、衛教、家訪等第一線的健康服務)」』——這是公衛護理師最直接、最獨特的角色。社區物理環境維護(環保)、流行病學研究(學術)、評價監測衛生政策成效(行政)都不是公衛護理師「最能發揮的獨特」角色。故 C 正確。公衛護理師的獨特角色是直接提供第一線的社區健康服務。","options":{"A":"社區物理環境維護屬環保人員的職責。","B":"社區流行病學研究偏向學術/研究。","C":"正確。提供社區健康服務，是公衛護理師最能發揮的獨特角色。","D":"評價與監測衛生政策成效偏向行政管理。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103100-N5-41":{"quick":"協調機構與服務者的聯繫、為個案爭取資源＝代言者(advocate)。","detail":{"background":"社區護理師「協調機構與提供服務者間的聯繫、「為個案爭取相關資源」」——其扮演的角色為(D)『「代言者(advocate)」(為個案發聲、維護其權益、爭取應有的資源與服務)』。協調者著重「協調各方」;評估者是評估;監督者是監督。本題的核心是「「為個案爭取資源、維護權益」」，故為代言者。故 D 正確。(註:此題情境含協調，但「為個案爭取資源」更突顯代言者角色。)","options":{"A":"協調者著重協調各方，本題突顯「為個案爭取」。","B":"評估者是進行評估。","C":"監督者是進行監督。","D":"正確。為個案爭取資源、維護權益，是代言者。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103100-N5-42":{"quick":"基層醫療保健的原則「錯誤(非)」者＝積極性(active)。","detail":{"background":"落實基層醫療保健，社區及醫療服務應符合的原則(4A)是:B 可用性(available)、C 可近性(accessible)、D 可接受性(acceptable)，以及「可負擔性(affordable)」。而(A)『「積極性(active)」』「不是」基層醫療保健的「4A」原則之一。故本題選錯誤(非)者為 A。基層醫療保健的原則是「可用、可近、可接受、可負擔(4A)」。","options":{"A":"正確(本題選錯誤者)。「積極性」不是基層醫療保健的4A原則。","B":"可用性(available)是基層保健的原則。","C":"可近性(accessible)是基層保健的原則。","D":"可接受性(acceptable)是基層保健的原則。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"103100-N5-43":{"quick":"綜合性社區衛生護理＝為地段管理、不分科的護理方式。","detail":{"background":"綜合性(generalized)社區衛生護理方式的正確敘述是(C)『「為地段管理、「不分科」的護理方式」(一位護理師「負責一個地段(地理區域)內所有家庭與居民的「全面性」健康照護」，不依疾病/科別分工)』。其他錯誤:A『依「疾病特性」分配工作』是「專科化(specialized)」的方式，非綜合性;B『需耗費「較多」護理人力』錯誤(綜合性較節省人力，一人負責一地段);D『強調由「特殊領域專家」提供服務』是專科化的方式。故 C 正確。綜合性社區護理是地段管理、不分科、全面性的照護。","options":{"A":"依疾病特性分配是專科化方式，非綜合性。","B":"綜合性較節省人力(一人負責一地段)，非耗費較多。","C":"正確。綜合性是地段管理、不分科的護理方式。","D":"由特殊領域專家提供是專科化方式。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103100-N5-50":{"quick":"30歲以上已婚婦女定期子宮頸抹片＝三段五級的「第三級(早期診斷早期治療)」。","detail":{"background":"衛生政策鼓勵婦女定期做「子宮頸抹片檢查(篩檢、早期發現異常)」——屬三段五級預防中的(C)『「第三級(早期診斷、早期治療)」(屬「第二段」預防;篩檢以早期發現、早期治療)』。第一級健康促進、第二級特殊保護(屬第一段);第四級限制殘障、第五級復健(屬第三段)。「抹片篩檢=早期診斷」屬第三級。故 C 正確。子宮頸抹片篩檢是早期診斷(第三級/第二段預防)。","options":{"A":"第一級是健康促進。","B":"第二級是特殊保護(如疫苗)。","C":"正確。子宮頸抹片篩檢屬第三級(早期診斷早期治療)。","D":"三段五級無第四級對應「早期診斷」(第四級是限制殘障)。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"103100-N5-51":{"quick":"了解社區民眾的互動方式＝舉辦社區座談會。","detail":{"background":"社區評估時要「了解社區民眾的「互動方式」」，最適當的方法是(C)『「舉辦社區座談會(community forum，在面對面的互動中觀察與了解居民如何溝通、互動、形成意見)」』。收集戶政資料(人口統計)、收集醫院就診資料(疾病統計)、瀏覽地方史誌(歷史背景)都是「次級資料」，無法直接觀察「民眾的互動方式」。座談會可直接觀察居民的互動。故 C 正確。要了解民眾的互動方式，宜用座談會等直接互動的方式。","options":{"A":"收集戶政資料是人口統計，無法了解互動方式。","B":"收集醫院就診資料是疾病統計。","C":"正確。舉辦社區座談會，可直接了解民眾的互動方式。","D":"瀏覽地方史誌是了解歷史背景。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103100-N5-52":{"quick":"提高社區參與率最重要的考慮因素＝民眾對健康相關活動目標與需求的共識。","detail":{"background":"某社區民眾對健康活動的參與率偏低，要提高社區參與，最重要的考慮因素是(D)『「民眾對健康相關活動「目標與需求的共識」」(當活動符合居民認同的需求、居民對目標有共識時，才會主動參與)』。里長支持、資源多寡、活動內容完整雖有影響，但「居民的需求與共識」是「提高參與」的根本。故 D 正確。提高社區參與的關鍵是活動符合居民的需求、取得共識(與前述同類題一致)。","options":{"A":"里長支持有助益，但非提高參與的根本。","B":"資源多寡有影響，但非根本。","C":"活動內容完整有助益，但非根本。","D":"正確。民眾對目標與需求的共識，是提高社區參與最重要的因素。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103100-N5-53":{"quick":"健康體能的「結果層面」評價＝共有200人達到每周三次的運動(行為改變)。","detail":{"background":"社區健康營造以「健康體能」為議題，最適合作為「結果(成果)層面」評價的是(C)『「共有200人「達到每周三次的運動(行為改變/成果)」」』——「結果評價」評估的是「「目標行為/健康狀態的改變(如養成規律運動的人數)」」。其他選項是「過程評價」:A 辦理10場運動講座(活動量)、B 講座參與1000人次(參與量)、D 健走大會5000人參與(參與量)——這些是「過程(投入、活動、參與)」，非「結果(行為改變)」。故 C 正確。結果評價看的是行為/健康的改變(如規律運動的人數)。","options":{"A":"辦理10場講座是過程評價(活動量)。","B":"講座參與1000人次是過程評價(參與量)。","C":"正確。200人達到每周三次運動(行為改變)，是結果層面評價。","D":"健走大會5000人參與是過程評價(參與量)。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103100-N5-54":{"quick":"老人20%、高血壓盛行率50%的長青里：最適合「針對高血壓進行介入、降低合併症」。","detail":{"background":"長青里老人20%、出生率低、年輕人外移、「高血壓盛行率達50%」。最適合的社區衛生護理計畫是(D)『「針對「高血壓」進行介入措施，降低高血壓合併症(這是該社區最明顯、護理可介入、可改善健康的問題)」』。其他錯誤:A『增加老年就業機會』、B『鼓勵年輕人多生育』、C『建議年輕人搬回里內』都是「人口/社經」層面、非護理可主導、且不切實際，也未針對該社區最突出的「高血壓」健康問題。故 D 正確。針對社區最突出的健康問題(高血壓)進行介入。","options":{"A":"增加老年就業非護理可主導，且未針對高血壓問題。","B":"鼓勵多生育不切實際，未針對健康問題。","C":"建議年輕人搬回不切實際，未針對健康問題。","D":"正確。針對高血壓進行介入措施，降低合併症。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103100-N5-55":{"quick":"「不屬於」對健康議題分析的任務＝定期更新社區檔案。","detail":{"background":"進行社區健康改善計畫時，「不屬於」對「健康議題分析」的任務是(A)『「定期更新社區檔案」』——這是「資料管理/維護」的工作，而非「對健康議題的「分析」」。屬於健康議題分析的:B 了解問題的導因與促成因子;C 了解社區的運作功能;D 分析有效達成解決的可能方案。故本題選不屬於者為 A。健康議題分析著重了解問題的成因、社區運作與解決方案，而非檔案維護。","options":{"A":"正確(本題選不屬於者)。定期更新社區檔案是資料維護，非健康議題分析。","B":"了解問題導因與促成因子，屬健康議題分析。","C":"了解社區運作功能，屬健康議題分析。","D":"分析有效解決的可能方案，屬健康議題分析。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103100-N5-56":{"quick":"國民健康署倡導「社區健康營造」的切入點＝健康議題。","detail":{"background":"國民健康署倡導的「社區健康營造」是以(C)『「健康議題」作為社區營造的切入點(從居民關心的健康問題著手，凝聚社區力量、共同營造健康的生活環境與型態)』。「社區健康營造」與一般的「社區總體營造」不同之處，就在於它「以「健康」為切入點與核心」。總體營造、環境保護、醫療服務都不是其切入點。故 C 正確。社區健康營造以健康議題為切入點。","options":{"A":"總體營造是社區營造的廣義概念，非健康營造的切入點。","B":"環境保護不是社區健康營造的切入點。","C":"正確。社區健康營造以健康議題為切入點。","D":"醫療服務不是社區健康營造的切入點。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"103100-N5-61":{"quick":"依人民健康狀況協助發展健康促進生活型態的技巧＝渥太華憲章的「發展個人技巧」。","detail":{"background":"渥太華憲章指出，「依照人民所需的健康狀況，協助其「發展健康促進生活型態的技巧」」——屬(C)『「發展個人技巧(Developing personal skills)」(透過健康教育，使個人有能力與技巧做出健康的選擇、自我管理健康)』。健康的公共政策是立法政策;創造支持性環境是改善環境;調整健康服務方向是服務取向的轉變。本題是「協助個人發展健康生活的技巧」，故為發展個人技巧。故 C 正確。","options":{"A":"健康的公共政策是立法/政策手段。","B":"創造支持性環境是改善生活/工作環境。","C":"正確。協助發展健康促進生活型態的技巧，是發展個人技巧。","D":"調整健康服務方向是服務取向的轉變。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","渥太華憲章"]}},"103100-N5-68":{"quick":"全民健保產前檢查＝共給付10次免費產前檢查(當時規定)。","detail":{"background":"全民健保給付的產前檢查服務，正確的是(A)『共給付「10次」免費產前檢查(當時的規定;後續已擴大為14次)』。其他錯誤:B 妊娠期的產檢次數分配描述不符;C 羊膜穿刺檢查是「特定週數(約16~20週)、針對高齡或高風險孕婦」，並非「常規於第20週給付」;D 例行產檢給付胎心音、胎位等，但「超音波於特定週數提供」，非「每次例行產檢」。故 A 正確。(本題依當時健保規定為10次;現行已擴大至14次。)","options":{"A":"正確。共給付10次免費產前檢查(當時規定)。","B":"妊娠期的產檢次數分配描述不符。","C":"羊膜穿刺針對高風險孕婦於特定週數，非常規第20週給付。","D":"超音波於特定週數提供，非每次例行產檢。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"104030-N5-43":{"quick":"實質提升基層醫療服務品質的作法＝偏遠地區設置群體醫療執業中心。","detail":{"background":"政府實質提升「基層」醫療服務品質的作法是(B)『「偏遠地區設置群體醫療執業中心(群醫中心)」——以群體執業的方式，將醫療資源引入偏遠/基層地區，提升基層的醫療可近性與品質』。其他錯誤:A『平均分布設置「區域醫院」』是「醫院層級」，非提升「基層」;C『建置醫師「專科化」制度』與提升基層保健的方向相反(基層需全科/家醫);D『規劃醫學中心購置精密儀器』是「醫學中心層級」，非基層。故 B 正確。群體醫療執業中心是提升基層(尤其偏遠)醫療的作法。","options":{"A":"設置區域醫院是醫院層級，非提升基層。","B":"正確。偏遠地區設置群體醫療執業中心，提升基層醫療。","C":"醫師專科化與提升基層保健的方向相反。","D":"醫學中心購置精密儀器是醫學中心層級，非基層。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"104030-N5-51":{"quick":"社區健康營造的推動步驟：分析現況②→組織民眾①→需求評估診斷③→計畫與執行⑤→評價修正④。","detail":{"background":"社區健康營造的推動步驟與順序是(B)『「分析社區的相關現況② → 組織民眾① → 社區需求評估與診斷③ → 計畫與執行⑤ → 計畫評價與修正④」(21354)』——先了解社區現況、組織居民，再評估診斷需求、訂定並執行計畫，最後評價與修正。故正確順序為21354(選 B)。社區健康營造遵循「了解現況→組織→評估診斷→計畫執行→評價修正」的循環。","options":{"A":"13245：順序錯誤。","B":"正確。分析現況②→組織民眾①→需求評估診斷③→計畫執行⑤→評價修正④。","C":"23415：順序錯誤。","D":"42315：順序錯誤(評價不應在最前)。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104030-N5-52":{"quick":"里長邀集多單位開會研商對策，護理師可從會議中得到＝社區溝通與訊息傳遞方式。","detail":{"background":"機車被破壞，里長「邀集警政、消防、車主與商家召開會議研商對策」——社區護理師最可以從這個「會議(各方如何溝通、傳遞訊息、協調)」中得到(B)『「社區的溝通與訊息傳遞方式(了解社區成員如何召集、溝通、協調、傳遞訊息)」』。人口組成統計、歷史文化背景、教育與家庭經濟狀況都無法從「這個會議」直接得知。故 B 正確。從社區會議可觀察、了解社區的溝通與訊息傳遞方式。","options":{"A":"人口組成統計無法從這個會議直接得知。","B":"正確。從會議可了解社區的溝通與訊息傳遞方式。","C":"歷史文化背景無法從這個會議得知。","D":"教育與家庭經濟狀況無法從這個會議得知。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104030-N5-53":{"quick":"巡守隊僅2名老人報名：社區護理師可採取的行動＝了解影響居民參與社區事務的因素。","detail":{"background":"社區巡守隊「僅2名老人報名(參與率低)」，里長再度召開會議尋求策略。社區護理師可採取的行動是(D)『「了解影響居民參與社區事務的因素(找出參與率低的原因，如時間、安全、誘因、認同等，才能對症提出策略)」』。其他錯誤:A『與健康無關、不主動參加』錯誤(社區安全、參與也與社區健康/賦權有關，且護理師應促進社區參與);B『主動爭取擔任主席、扮演指導者』錯誤(護理師宜「協助、引導」而非「主導指導」);C『利用機會做衛生所的政策宣導』偏離當下的議題。故 D 正確。要提高參與，先了解影響居民參與的因素。","options":{"A":"社區參與也與社區健康/賦權有關，護理師應促進參與。","B":"護理師宜協助引導，而非主導指導。","C":"利用機會做政策宣導偏離當下的議題。","D":"正確。了解影響居民參與社區事務的因素。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104030-N5-54":{"quick":"「臺灣社區護理學會」依羅斯(Ross)社區分類＝功能性社區。","detail":{"background":"依羅斯(M.G. Ross)對社區的分類，「臺灣社區護理學會」屬(C)『「功能性社區(functional community)」——「以「共同的功能、目標、興趣、專業」結合而成的社區(如學會、職業團體、宗教團體)，「不受地理位置限制」」』。地理性社區是以地理區域劃分;互動性社區是以人際互動結合。「學會」是以「共同的專業功能」結合，故為功能性社區。故 C 正確。羅斯將社區分為地理性、功能性(及互動性)社區。","options":{"A":"地理性社區是以地理區域劃分。","B":"互動性社區是以人際互動結合。","C":"正確。學會以共同的專業功能結合，是功能性社區。","D":"學會是一種社區(功能性)，非「不能算是社區」。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104030-N5-55":{"quick":"社區健康評估的主要意義：作為健康促進服務的依據①、使服務更符合民眾需求②、作為衛生計畫優先順序的參考④(區分專業性③、統計診所數⑤非主要意義)。","detail":{"background":"社區健康評估的主要意義:(1)可作為「社區為導向的健康促進服務」之依據;(2)讓健康服務內容更符合民眾的需求;(4)作為研擬衛生計畫「優先順序」的參考。而(3)『區分社區護理與公共衛生護理間的個別專業性』、(5)『統計社區內醫療診所之數目』「不是」社區健康評估的「主要意義」(統計診所數只是收集資料的一部分，非主要意義)。故正確為①②④(選 B)。社區健康評估的意義在提供健康服務、符合需求、訂定優先順序的依據。","options":{"A":"123：含③(區分專業性)，非主要意義。","B":"正確。健康促進服務的依據①、符合民眾需求②、衛生計畫優先順序的參考④。","C":"135：含③⑤，非主要意義。","D":"345：含③⑤，非主要意義。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104030-N5-56":{"quick":"拉利德(Lalonde, 1974)影響健康四大因素中占最大比例者＝生活型態。","detail":{"background":"1974年加拿大拉利德(Lalonde)報告指出，影響健康的四大因素(生活型態、環境、遺傳生物、醫療體制)中，占「最大比例」者為(C)『「生活型態(lifestyle，約佔43~50%，如飲食、運動、菸酒、壓力等個人行為)」』。其次是環境、遺傳，而「醫療體制」所佔的比例最小。故 C 正確。拉利德報告強調「生活型態」是影響健康最主要的因素，這奠定了健康促進的基礎。","options":{"A":"醫療體制所佔的比例最小。","B":"遺傳所佔的比例次於生活型態。","C":"正確。生活型態占影響健康因素的最大比例。","D":"環境所佔的比例次於生活型態。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","Lalonde"]}},"104030-N5-63":{"quick":"中風個案知道復健重要卻因「忘記、太累」不執行：與個案簽訂護理契約。","detail":{"background":"王先生中風、「知道」自我復健的重要性、也「能正確執行」，但「常因忘記或太累而不執行(知行不一、缺乏持續的動機與承諾)」。護理師宜運用(D)『「與個案簽訂「護理契約(行為契約)」」——透過雙方約定具體的復健目標、時間、自我監測與承諾，增進其「持續執行」的動機與責任感』。其他錯誤:A『轉介復健師』不符(他已會正確執行);B『請家人做被動運動』剝奪其自主復健;C『記憶訓練』不符(問題是「不執行」而非「記不住怎麼做」)。故 D 正確。對「知道卻不持續執行」者，護理契約可增進承諾與持續性。","options":{"A":"他已會正確執行，不需轉介復健師。","B":"請家人做被動運動剝奪其自主復健。","C":"問題是不執行而非記不住怎麼做，記憶訓練不符。","D":"正確。與個案簽訂護理契約，增進持續執行的承諾。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104030-N5-75":{"quick":"符合健保居家護理收案標準者＝臥床多年、肺炎穩定、臀部有6×4×3傷口的陳爺爺。","detail":{"background":"符合全民健保居家護理收案標準(病情穩定、「只能維持有限的自我照顧、無法自行外出就醫」、有「明確的護理需求(如傷口、管路)」)的是(D)『陳爺爺73歲、「臥床多年」、肺炎穩定後轉普通病房、「臀部有6×4×3的傷口(需傷口護理)」』——符合「居家失能、病情穩定、有明確護理需求」。其他不符:A 王先生「血壓未穩、仍需調藥」(病情未穩);B 胡太太「病情穩定但可活動、僅需抗生素」(非居家失能);C 高奶奶「剛術後6天、需復健」(非居家護理收案，且能就醫復健)。故 D 正確。居家護理收案須是居家失能、病情穩定、有護理需求者。","options":{"A":"血壓未穩、仍需調藥，病情未穩定，不符。","B":"病情穩定但可活動、僅需抗生素，非居家失能。","C":"剛術後6天、需復健，非居家護理收案。","D":"正確。臥床多年、肺炎穩定、有臀部傷口需護理，符合收案標準。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系","居家護理"]}},"104030-N5-80":{"quick":"以糖尿病人居家自我照顧「技能的執行情形」評價＝行為目標模式。","detail":{"background":"以「糖尿病患者居家自我照顧「技能的執行情形(行為是否達成)」」作為評價——屬(D)『「行為目標模式(behavioral objective model)」(依「預先設定的「行為目標」是否達成」來評價，如「能正確執行自我照顧技能」)』。系統分析模式是成本效益;專業評價模式是由專家評定;個案研究模式是深入個案。本題以「目標行為(技能執行)是否達成」評價，故為行為目標模式。故 D 正確。","options":{"A":"系統分析模式是成本效益分析。","B":"專業評價模式是由專家評定品質。","C":"個案研究模式是深入探討個案。","D":"正確。以行為目標(技能執行情形)是否達成評價，是行為目標模式。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104100-N5-41":{"quick":"臺灣基層醫療保健服務體系的主軸＝衛生所。","detail":{"background":"臺灣的「基層」醫療保健服務體系，是以(C)『「衛生所」為主軸運作——衛生所是社區基層公共衛生的第一線據點，提供預防接種、傳染病防治、慢性病管理、婦幼老人保健、衛教等服務』。衛生局是縣市的「行政主管機關」;區域醫院是醫院層級;診所是私人的基層醫療(偏重醫療)。臺灣的「基層公共衛生保健」以「衛生所」為核心。故 C 正確。衛生所是臺灣基層公共衛生保健的主軸。","options":{"A":"衛生局是縣市的行政主管機關。","B":"區域醫院是醫院層級。","C":"正確。臺灣基層醫療保健以衛生所為主軸。","D":"診所是私人基層醫療(偏重醫療)，非公共衛生主軸。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"104100-N5-42":{"quick":"「健康是您的權利、保健是您的義務」最符合的作法＝民眾共同參與衛生計畫。","detail":{"background":"「健康是您的權利、保健是您的義務」強調「民眾的「主動參與與自我責任」」，最符合此精神的作法是(B)『「民眾共同參與衛生計畫(讓民眾主動投入、參與健康促進，落實保健是自己的義務)」』。其他錯誤:A『地毯式家戶拜訪』是被動的、由護理師主導，未體現民眾的主動參與;C『推薦健康食品』偏離(且不應推薦特定產品);D『參與發展生物科技』偏離。故 B 正確。「保健是義務」強調民眾的主動參與。","options":{"A":"地毯式家戶拜訪是被動、由護理師主導，未體現民眾主動參與。","B":"正確。民眾共同參與衛生計畫，符合「保健是義務」的精神。","C":"推薦健康食品偏離，且不應推薦特定產品。","D":"參與發展生物科技偏離此精神。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104100-N5-43":{"quick":"收集社區的特性、人口特性及社區資源＝5W中的「What」。","detail":{"background":"社區護理人員收集「社區的特性、人口特性及社區資源」等資料——是收集「5W」中的(A)『「What(是「什麼」社區，包括社區的特性、人口、資源、健康狀況等基本內涵)」』。Who 是「誰」(對象/人物);When 是「何時\";Where 是「何地\"。本題是「社區「是什麼樣」的內涵資料」，故為 What。故 A 正確。5W 中的 What 是描述社區的特性、人口與資源等內涵。","options":{"A":"正確。社區的特性、人口特性、資源，屬 5W 中的 What。","B":"Who 是「誰」(對象/人物)。","C":"When 是「何時」(時間)。","D":"Where 是「何地」(地點)。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104100-N5-44":{"quick":"權力基礎的3個C「不包括」者＝脅迫(Coercion)。","detail":{"background":"依 3P 理論，權力(power)基礎的「3個C」是:A 協調(Co-ordination)、B 合作(Co-operation)、C 溝通(Communication)。而(D)『「脅迫(Coercion)」』「不包括」在權力基礎的3C之中——權力的正當基礎強調「協調、合作、溝通」，而非「脅迫(強制)」。故本題選不包括者為 D。權力基礎的3C是協調、合作、溝通(非脅迫)。","options":{"A":"協調(Co-ordination)是權力基礎的3C之一。","B":"合作(Co-operation)是權力基礎的3C之一。","C":"溝通(Communication)是權力基礎的3C之一。","D":"正確(本題選不包括者)。脅迫(Coercion)不在權力基礎的3C之中。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104100-N5-51":{"quick":"社區營造「組織期」的工作項目＝籌組各類委員會。","detail":{"background":"社區營造四期程(組織期、行銷籌備期、行動期、評價期)中，屬於「組織期」工作項目的是(C)『「籌組各類委員會(建立組織架構、凝聚核心人力)」』。其他屬於其他期:A 進行社區居民的需求調查(屬「評估/籌備」);B 進行過程評價(屬「行動期/評價期」);D 將評價結果回饋社區(屬「評價期」)。故 C 正確。組織期的核心工作是籌組委員會、建立組織。","options":{"A":"進行需求調查屬評估/籌備階段。","B":"進行過程評價屬行動/評價期。","C":"正確。籌組各類委員會，是組織期的工作。","D":"將評價結果回饋社區屬評價期。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104100-N5-52":{"quick":"收集社區人口數、人口密度、健康狀況＝社會指標法。","detail":{"background":"收集「社區的人口數、人口密度及人口的健康狀況」等資料，最適當的方法是(D)『「社會指標法(social indicators，利用既有的「統計資料/指標(如人口統計、生命統計、健康指標)」來了解社區狀況)」』。滾雪球法是透過人脈擴展;生態研究法是以群體為單位的相關研究;文獻資料收集是查閱文獻。「人口數、密度、健康狀況」是既有的統計指標，故用社會指標法。故 D 正確。社會指標法利用既有的統計指標了解社區。","options":{"A":"滾雪球法是透過人脈逐步擴展樣本/資源。","B":"生態研究法是以群體為單位的相關研究。","C":"文獻資料收集是查閱文獻。","D":"正確。人口數、密度、健康狀況用社會指標法收集。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104100-N5-53":{"quick":"收集各團體推動老人安全活動的「困難與對策」＝重要人物訪談。","detail":{"background":"收集「社區中各相關團體，對於推動社區老人安全活動「遇到的困難與解決對策」」之資料——最適當的方法是(C)『「重要人物訪談(key informant interview，訪談各團體中熟悉狀況的「關鍵人物」，深入了解其困難與對策)」』。擋風玻璃法是開車繞社區觀察環境;社會調查法是抽樣問卷;文獻查證法是查文獻。本題需「深入了解各團體的困難與對策(質性、深度資訊)」，故用重要人物訪談。故 C 正確。","options":{"A":"擋風玻璃法是開車繞社區觀察環境。","B":"社會調查法是抽樣問卷收集量化資料。","C":"正確。深入了解各團體的困難與對策，用重要人物訪談。","D":"文獻查證法是查閱文獻。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104100-N5-54":{"quick":"排定問題的優先順序＝社區衛生護理過程的「社區健康診斷」步驟。","detail":{"background":"為有效找出社區的健康問題、「排定問題的優先順序」——屬於社區衛生護理過程的(B)『「社區健康「診斷(diagnosis)」」步驟(在「評估(收集資料)」之後，「分析資料、確認健康問題、並排定優先順序」)』。社區健康評估是收集資料;社區健康計畫是訂定方案;社區健康評值是評價成效。「分析確認問題+排優先順序」屬「診斷」。故 B 正確。社區護理過程:評估→診斷(確認問題、排優先序)→計畫→執行→評值。","options":{"A":"社區健康評估是收集資料的階段。","B":"正確。確認問題、排定優先順序，屬社區健康診斷。","C":"社區健康計畫是訂定方案的階段。","D":"社區健康評值是評價成效的階段。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104100-N5-55":{"quick":"社區健康營造計畫(民國88年起)的最主要目的＝建立社區自主照護健康營造機制。","detail":{"background":"國民健康署自民國88年起推動「社區健康營造計畫」，其最主要的目的是(B)『「建立「社區自主照護(self-care)的健康營造機制」——培養社區「自主、自發、永續」地經營自己健康的能力與機制(賦權社區)」』。其他錯誤:A『強化護理人員的衛教功能』偏向護理人員;C『提升醫療診所設施』偏向醫療設施;D『完成子宮頸抹片目標數』是單一指標。社區健康營造的核心是「建立社區自主經營健康的機制」。故 B 正確。","options":{"A":"強化護理人員的衛教功能偏向護理人員，非社區自主。","B":"正確。建立社區自主照護健康營造機制(賦權社區)。","C":"提升醫療診所設施偏向醫療設施。","D":"完成子宮頸抹片目標數是單一指標，非主要目的。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"104100-N5-64":{"quick":"新住民女性協助輔導「錯誤」者＝社區護理師應採被動態度、等其到衛生所求助。","detail":{"background":"對新住民女性協助與輔導措施，「錯誤」者為(C)『為避免誤會，社區衛生護理師應採取「被動態度」、等新住民女性到衛生所尋求協助』——錯誤，社區護理師應「「主動」家訪、收案、提供協助(新住民常因語言、文化、資訊障礙而不會主動求助，被動等待會使其得不到服務)」。其他正確:A 為社區衛生護理師的收案對象;B 懷孕者之產前檢查予以補助;D 接受服務時提供通譯服務。故本題選錯誤者為 C。對新住民應主動關懷、提供服務，而非被動等待。","options":{"A":"為社區衛生護理師的收案對象，正確。","B":"懷孕者之產前檢查予以補助，正確。","C":"正確(本題選錯誤者)。應主動提供協助，非被動等待。","D":"接受服務時提供通譯服務，正確。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生","新住民照護"]}},"104100-N5-66":{"quick":"特定弱勢者健保費補助對象「錯誤」者＝55歲以下之無職業原住民。","detail":{"background":"政府對特定弱勢者補助健保費的對象，「錯誤」者為(C)『「55歲「以下」」之無職業原住民』——錯誤，無職業原住民的健保費補助對象是「「55歲「以上」」(及特定條件者)」，而非「55歲以下」。其他正確的補助對象:A 70歲以上中低收入老人;B 低收入戶;D 失業勞工及眷屬。故本題選錯誤者為 C。健保費補助的無職業原住民對象是55歲以上，非以下。","options":{"A":"70歲以上中低收入老人，是補助對象。","B":"低收入戶，是補助對象。","C":"正確(本題選錯誤者)。無職業原住民補助對象是55歲以上，非以下。","D":"失業勞工及眷屬，是補助對象。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"104100-N5-67":{"quick":"子宮頸抹片 ASC-H(無法排除重度病變)：轉介接受陰道鏡檢查並做切片以確定診斷。","detail":{"background":"潘女士子宮頸抹片結果為「ASC-H(非典型鱗狀上皮細胞，「無法排除「重度」上皮細胞病變」)」——這是「「高度可疑」的異常」。應建議(C)『「轉介至醫療院所接受「陰道鏡檢查並做切片」，以確定診斷(進一步確認是否為高度病變或癌前/癌)」』。A『再做一次抹片或 HPV』不足(ASC-H 須直接進一步檢查);B『一年後再抹片』延誤(高度可疑須及早處理);D『打 HPV 疫苗』錯誤(疫苗是預防，不能處理已有的異常)。故 C 正確。ASC-H 等高度可疑的抹片異常，應轉介陰道鏡+切片確診。","options":{"A":"ASC-H 須直接進一步檢查，再做抹片/HPV 不足。","B":"高度可疑須及早處理，一年後再抹片延誤。","C":"正確。轉介接受陰道鏡檢查並做切片以確定診斷。","D":"HPV 疫苗是預防，不能處理已有的異常。"},"sources":["社區衛生護理學(新文京/華杏)·癌症篩檢"]}},"104100-N5-77":{"quick":"45歲王太太每年常規篩檢「錯誤(不適用)」者＝大腸直腸癌篩檢。","detail":{"background":"社區護理師建議45歲王太太每年常規篩檢，「錯誤(不適用)」者為(D)『大腸直腸癌篩檢』——「國健署提供的大腸癌(糞便潛血)篩檢對象是「(當時)50~74歲」(45歲尚不在補助的常規篩檢年齡)」。其他適用:A 三高(血壓、血糖、血脂)篩檢;B 乳房理學檢查(乳房保健);C 子宮頸抹片檢查(30歲以上婦女)。故本題選不適用者為 D。(註:大腸癌篩檢年齡依政策調整，當時為50歲起;現已下修。)","options":{"A":"三高篩檢適用，正確。","B":"乳房理學檢查適用。","C":"子宮頸抹片(30歲以上婦女)適用。","D":"正確(本題選不適用者)。大腸癌篩檢當時為50~74歲，45歲不在常規。"},"sources":["社區衛生護理學(新文京/華杏)·癌症篩檢"]}},"104100-N5-78":{"quick":"中風、吞嚥困難、中斷復健者，優先評估項目「錯誤(非優先)」者＝個案宗教觀。","detail":{"background":"唐老先生中風、吞嚥困難、中斷復健。護理評估「優先」項目中，「錯誤(非優先)」者為(C)『個案的「宗教觀」』——宗教觀屬於「靈性層面」，雖是整體評估的一部分，但「不是」此情境(吞嚥困難、中斷復健)「優先」評估的項目。優先應評估:A 個案的自我照顧能力;B 個案的一般身體健康(尤其吞嚥、營養、誤吸風險);D 家屬的照顧能力(影響復健的持續)。故本題選非優先者為 C。對吞嚥困難、中斷復健者，優先評估生理健康、自理與照顧能力。","options":{"A":"個案的自我照顧能力是優先評估項目。","B":"個案一般身體健康(吞嚥、營養)是優先評估。","C":"正確(本題選非優先者)。宗教觀非此情境的優先評估項目。","D":"家屬的照顧能力是優先評估項目。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105030-N5-41":{"quick":"強調民眾在死亡前得到生命尊嚴的服務＝復健及後續性服務(含安寧療護)。","detail":{"background":"我國健康照護體系的服務中，強調「民眾在死亡前得到生命的尊嚴」的是(D)『「復健及後續性服務(含「安寧緩和療護」，提供末期病人「善終、生命尊嚴」的照護)」』。公共衛生及預防保健是預防;緊急救護是急救;急性醫療是治療急性病。「死亡前的生命尊嚴(善終)」屬於「後續性/長期照護/安寧」的範疇。故 D 正確。安寧緩和療護(屬後續性服務)強調末期病人的生命尊嚴與善終。","options":{"A":"公共衛生及預防保健是預防服務。","B":"緊急救護是急救服務。","C":"急性醫療是治療急性病。","D":"正確。復健及後續性服務(含安寧療護)強調死亡前的生命尊嚴。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"105030-N5-43":{"quick":"透過健康政策參與、爭取居家護理健保給付＝代言者(advocate)。","detail":{"background":"社區衛生護理師「透過健康政策的參與，爭取居家護理服務的健保給付」——其扮演的角色是(B)『「代言者(advocate)」(為服務對象/專業發聲，爭取應有的權益、資源與給付)』。協調者是協調各方;領導者是領導;照顧提供者是直接提供照護。本題核心是「爭取健保給付(為權益發聲)」，故為代言者。故 B 正確。透過政策參與爭取給付/權益，是代言者的角色。","options":{"A":"協調者是協調各方。","B":"正確。透過政策參與爭取居家護理健保給付，是代言者。","C":"領導者是領導團隊。","D":"照顧提供者是直接提供照護。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105030-N5-46":{"quick":"尚未納入健保的新移民婦女每胎產檢費用補助次數(本題送分)。","detail":{"background":"我國對尚未納入健保的新移民(外籍配偶)婦女，每胎產前檢查費用補助次數——本題經評定為「送分(各選項均給分)」。理解重點:外籍配偶「設籍/納健保前」的產檢補助是「每人每次補助一定金額(如600元)、每胎最高若干次(如5次)」，相關規定隨政策調整。本題送分。","options":{"A":"本題送分，各選項均給分。","B":"本題送分。最多5次是常見的補助上限規定。","C":"本題送分，各選項均給分。","D":"本題送分，各選項均給分。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生","新住民照護","送分題"]}},"105030-N5-47":{"quick":"焊接作業場所工人接受角膜檢查＝三段五級的「早期篩檢」。","detail":{"background":"焊接作業場所(電焊光易傷眼)的工人「接受角膜檢查」——這是對「已暴露於職業危害者」進行「早期發現異常」的檢查，屬三段五級的(C)『「早期篩檢(早期診斷)」(屬第二段預防、第三級)』。預防過敏原、環境改善、去除致癌因子屬「特殊保護(第一段預防)」。「對工人做角膜檢查(篩檢)」屬早期篩檢。故 C 正確。職業健康檢查(篩檢)屬早期診斷(第二段預防)。","options":{"A":"預防過敏原屬特殊保護(第一段預防)。","B":"環境改善屬特殊保護(第一段預防)。","C":"正確。對工人做角膜檢查(篩檢)，屬早期篩檢。","D":"去除致癌因子屬特殊保護(第一段預防)。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"105030-N5-50":{"quick":"收集社區空氣品質及水質狀況＝評估「物理環境系統」。","detail":{"background":"社區健康評估時，收集「社區的空氣品質及水質狀況」——主要是評估社區的(C)『「物理環境系統(自然與物理環境，如空氣、水質、地理、氣候、污染、住宅等)」』。教育系統是學校;安全與交通系統是治安與運輸;健康與社會服務系統是醫療福利。本題是「空氣、水質(物理環境)」，故為物理環境系統。故 C 正確。物理環境系統包括空氣、水質、地理、污染等。","options":{"A":"教育系統是學校教育。","B":"安全與交通系統是治安與運輸。","C":"正確。空氣品質及水質，屬物理環境系統。","D":"健康與社會服務系統是醫療福利資源。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105030-N5-51":{"quick":"調查社區內醫療院所的數目＝評估社區資源的「量及分布」。","detail":{"background":"社區護理師「調查社區內有多少家醫療院所」——主要是評估社區資源的(D)『「量及分布(資源的數量與地理分布)」』。可靠性、可負擔性、可接受性是評估資源的「品質/可及性」面向。「調查有多少家(數目)」屬「量及分布」。故 D 正確。評估社區資源時，數目(量)與地理分布是基本的面向。","options":{"A":"可靠性是資源的品質面向。","B":"可負擔性是資源的可及性面向。","C":"可接受性是資源的可及性面向。","D":"正確。調查醫療院所數目，屬資源的量及分布。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105030-N5-52":{"quick":"佛里門(Freeman)決定社區健康問題優先次序，應優先考慮＝健康問題的預防效果。","detail":{"background":"依佛里門(Ruth B. Freeman)決定社區健康問題優先次序的原則中，應「優先考慮」的是(A)『「健康問題的「預防效果」(該問題經由介入/預防，可達成的成效大小)」』——優先處理「可有效預防/改善」的問題，以發揮最大的健康效益。所需資源、影響人數、居民期待也是考量因素，但依佛里門的原則，「預防效果」是優先考慮的關鍵。故 A 正確。佛里門強調以「預防效果」作為排定優先序的重要原則。","options":{"A":"正確。健康問題的預防效果，是應優先考慮的原則。","B":"所需資源是考量因素之一，但非首要。","C":"影響人數是考量因素之一，但非首要。","D":"社區居民的期待是考量因素之一，但非首要。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105030-N5-54":{"quick":"推動社區健康營造時，社區護理師功能「錯誤」者＝決定社區健康營造議題。","detail":{"background":"推動社區健康營造時，社區衛生護理師的功能，「錯誤」者為(D)『「決定」社區健康營造議題』——錯誤，健康營造的議題應「「由社區居民共同討論、決定(社區自主、賦權)」」，護理師是「「協助、引導」」而非「替社區決定議題」。其他正確的功能:A 提供完整性的社區評估;B 提供醫療相關服務;C 提供符合社區的衛教服務。故本題選錯誤者為 D。社區健康營造的議題應由社區自主決定，護理師協助而非主導。","options":{"A":"提供完整性社區評估，是護理師的功能。","B":"提供醫療相關服務，是護理師的功能。","C":"提供符合社區的衛教服務，是護理師的功能。","D":"正確(本題選錯誤者)。議題應由社區自主決定，非護理師決定。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105030-N5-55":{"quick":"Lalonde 提出影響人類健康的因素＝健康照護系統、遺傳、環境、生活型態。","detail":{"background":"加拿大衛生部長 Lalonde(1974)提出影響人類健康的「四大因素」是(A)『「健康照護系統、遺傳(生物)、環境、生活型態」』(其中生活型態佔最大比例)。B(空氣、水、溫度、濕度)是物理環境因子;C(噪音、輻射、微生物、重金屬)是環境危害;D(生理、心理、社會、靈性)是整體健康的層面。Lalonde 的四大因素是「健康照護系統、遺傳、環境、生活型態」。故 A 正確。","options":{"A":"正確。Lalonde 的四大因素＝健康照護系統、遺傳、環境、生活型態。","B":"空氣、水、溫度、濕度是物理環境因子。","C":"噪音、輻射、微生物、重金屬是環境危害。","D":"生理、心理、社會、靈性是整體健康的層面。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","Lalonde"]}},"105030-N5-64":{"quick":"家庭增能(empowerment)的表現「錯誤」者＝家庭成員持續依賴社區護理師的照顧。","detail":{"background":"家庭增能(empowerment)的表現，「錯誤」者為(B)『家庭成員「持續依賴」社區衛生護理師的照顧』——錯誤，增能的目標是使家庭「「自主、有能力處理自己的問題」」，「持續依賴護理師」與增能的方向「相反」(增能是「減少依賴、增進自主」)。其他屬增能的表現:A 家庭成員主動尋求社區資源;C 家庭成員發現自己的家庭問題並設法處理;D 家庭成員與護理師成為夥伴關係。故本題選錯誤者為 B。增能是促進家庭自主，而非持續依賴。","options":{"A":"家庭成員主動尋求社區資源，是增能的表現。","B":"正確(本題選錯誤者)。持續依賴護理師與增能(自主)的方向相反。","C":"家庭成員發現問題並設法處理，是增能的表現。","D":"家庭成員與護理師成為夥伴關係，是增能的表現。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","賦權增能"]}},"105090-N5-41":{"quick":"社區衛生護理的特性「錯誤」者＝疾病管理為主要照護模式。","detail":{"background":"相較於其他護理領域，社區衛生護理的特性，「錯誤」者為(B)『「疾病管理」為主要照護模式』——錯誤，社區衛生護理以「「健康促進、疾病預防(以「健康」為焦點)」」為主要模式，而非「以「疾病管理」為主」。其他正確的特性:A 以人口群體(population-focused)為焦點;C 服務層面較廣(涵蓋個人、家庭、群體);D 運用管理與組織理論進行衛生計畫。故本題選錯誤者為 B。社區衛生護理以健康促進與預防為主，非疾病管理。","options":{"A":"以人口群體為焦點，是社區護理的特性。","B":"正確(本題選錯誤者)。社區護理以健康促進與預防為主，非疾病管理。","C":"服務層面較廣，是社區護理的特性。","D":"運用管理與組織理論進行衛生計畫，是社區護理的特性。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105090-N5-44":{"quick":"向立法委員溝通遊說法案以促進立法＝政策制定過程的「發展政策(policy formulation)」。","detail":{"background":"護理師「向立法委員溝通、遊說法案，促進立法」——屬政策制定過程的(B)『「發展政策(policy formulation，研擬、制定政策/法案的具體內容，並透過遊說、協商推動)」』。排定議程是讓問題進入政策議程;通過政策是政策/法案被正式採納(立法通過);執行政策是政策的執行。本題是「遊說、推動法案的形成」，故為發展政策。故 B 正確。(政策過程:議程設定→政策發展→政策採納→政策執行→政策評估。)","options":{"A":"排定議程是讓問題進入政策議程。","B":"正確。遊說、推動法案的形成，屬發展政策(policy formulation)。","C":"通過政策是政策/法案被正式採納。","D":"執行政策是政策的執行。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","政策過程"]}},"105090-N5-49":{"quick":"教導小朋友均衡飲食及充分睡眠以增進健康＝初段預防第一級(健康促進)。","detail":{"background":"托兒所護理師「教導全體小朋友均衡飲食及充分睡眠，以增進健康的重要」——這是對「「健康者」進行「一般性的健康增進(衛教、營養、作息)」」，屬(A)『「初段(第一段)預防的「第一級(健康促進)」」』。第二級是特殊保護(疫苗);第三級是早期診斷治療;第四級是限制殘障。「均衡飲食、充分睡眠的衛教」屬健康促進(第一級)。故 A 正確。一般性的健康衛教(營養、作息)屬第一級健康促進。","options":{"A":"正確。教導均衡飲食、充分睡眠以增進健康，屬初段預防第一級(健康促進)。","B":"第二級是特殊保護(如疫苗)。","C":"第三級是早期診斷早期治療。","D":"第四級是限制殘障。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"105090-N5-51":{"quick":"參加里內健走活動以了解居民互動＝參與式觀察法。","detail":{"background":"李護理師「參加里內舉辦的健走活動，了解社區居民的互動情況」——這是『「參與式觀察法(participant observation)」:研究者「親自參與」社區活動，在參與中「觀察」居民的互動、行為與關係』。文獻考察是查文獻;擋風玻璃式調查是開車繞社區「從車外觀察」環境;重要人物訪談是訪談關鍵人物。本題是「親自參加活動並觀察」，故為參與式觀察法。故 A 正確。","options":{"A":"正確。親自參加活動並觀察居民互動，是參與式觀察法。","B":"文獻考察是查閱文獻。","C":"擋風玻璃式調查是從車外觀察社區環境。","D":"重要人物訪談是訪談關鍵人物。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105090-N5-52":{"quick":"乳癌病友團體依羅斯(Ross)社區分類＝互動性社區。","detail":{"background":"依羅斯(M.G. Ross)的社區種類，「乳癌病友團體」屬(B)『「互動性社區(以「成員間的「情感互動、相互支持」」結合而成的社區，如病友團體、支持團體)」』。地理性社區是以地理區域;功能性社區是以共同功能/專業(如學會);結構性非其標準分類。「病友團體」以「情感互動、相互支持」為核心，故為互動性社區。故 B 正確。(對照:學會以共同專業功能結合，屬功能性社區。)","options":{"A":"地理性社區是以地理區域劃分。","B":"正確。乳癌病友團體以情感互動、相互支持結合，是互動性社區。","C":"功能性社區是以共同功能/專業結合(如學會)。","D":"結構性非羅斯的標準社區分類。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105090-N5-53":{"quick":"確立某社區糖尿病死亡率高是否為重要問題，「最不適合」比較的資料＝世界衛生組織的糖尿病死亡資料。","detail":{"background":"要確立「某社區的糖尿病死亡率高」是否為該社區的重要健康問題，「最不適合」作為比較的資料是(A)『「世界衛生組織(WHO)的糖尿病死亡資料」』——WHO 的資料「「過於宏觀(全球)、與該社區的人口結構、環境差異太大」」，不適合直接比較。較適合的比較對象是「「與該社區「相近、可類比」的資料」」:B 臺灣的、C 該社區所在縣市的、D 該社區「前幾年(歷年趨勢)」的資料。故本題選最不適合者為 A。比較時應選與該社區可類比、相近的參考資料。","options":{"A":"正確(本題選最不適合者)。WHO 全球資料過於宏觀、差異太大，不適合直接比較。","B":"臺灣的糖尿病死亡資料可作比較。","C":"該社區所在縣市的資料可作比較。","D":"該社區前幾年的資料(歷年趨勢)可作比較。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","流行病學比較"]}},"105090-N5-54":{"quick":"社區健康營造的第一步驟＝找出健康議題。","detail":{"background":"社區健康營造的「第一步驟」是(D)『「找出健康議題(從社區的健康需求中，確認要推動的健康議題作為切入點)」』——社區健康營造以「健康議題」為切入點，故第一步是「找出/確認健康議題」。喚起民眾興趣、尋求社區資源、追尋永續經營都是「找出健康議題之後」的後續步驟。故 D 正確。社區健康營造的第一步是找出(確認)健康議題。","options":{"A":"喚起民眾興趣是找出議題後的後續步驟。","B":"尋求社區資源是後續步驟。","C":"追尋永續經營是後期的目標。","D":"正確。找出健康議題，是社區健康營造的第一步驟。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"105090-N5-55":{"quick":"社區糞便潛血篩檢結果陽性：轉介醫院做大腸鏡檢查。","detail":{"background":"社區糞便潛血篩檢「結果為「陽性」」——應(C)『「轉介至醫院做「大腸鏡檢查」(進一步確認是否有大腸瘜肉、腫瘤或其他病變)」』。糞便潛血陽性「不等於」確診大腸癌，但須進一步以大腸鏡確認。其他錯誤:A『繼續觀察有無血便』延誤;B『告知正常、無需擔心』錯誤(陽性是異常);D『轉介腫瘤科進行切除』言之過早(尚未確診)。故 C 正確。糞便潛血陽性應轉介做大腸鏡進一步檢查。","options":{"A":"繼續觀察會延誤，陽性須進一步檢查。","B":"陽性是異常，「告知正常」錯誤。","C":"正確。轉介醫院做大腸鏡檢查。","D":"尚未確診，「轉介腫瘤科切除」言之過早。"},"sources":["社區衛生護理學(新文京/華杏)·癌症篩檢"]}},"105090-N5-56":{"quick":"社區賦權特性「錯誤」者＝無法有效提升個人對生活的掌控。","detail":{"background":"社區賦權(empowerment)特性的描述，「錯誤」者為(D)『「無法有效提升個人對生活的掌控」』——錯誤，賦權的核心正是「「提升個人/社區對自己生活與健康的「掌控感與能力」」」。其他正確:A 賦權包括過程與結果，可促進整體社區健康;B 可激發社區居民主動參與健康相關活動;C 強調人與環境因素及賦權程度的關聯性。故本題選錯誤者為 D。賦權能有效提升個人對生活的掌控，而非無法。","options":{"A":"賦權包括過程與結果、可促進社區健康，正確。","B":"可激發居民主動參與，正確。","C":"強調人與環境及賦權程度的關聯，正確。","D":"正確(本題選錯誤者)。賦權能提升個人對生活的掌控，非無法。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","賦權"]}},"106030-N5-41":{"quick":"社區衛生護理發展的最初模式＝地段護理。","detail":{"background":"歷史上社區衛生護理發展的「最初模式」是(A)『「地段(district)護理」——早期(如南丁格爾時代的訪視護理、Lillian Wald 的睦鄰之家)以「劃分地段、由護理師負責一個地段內的家庭訪視與照護」為起點』。安寧護理、公共衛生護理、社區衛生護理都是「後續」發展、範圍逐漸擴大的階段。故 A 正確。社區護理由「地段護理(家庭訪視)」起源，逐步發展為公共衛生護理、社區衛生護理。","options":{"A":"正確。地段護理(家庭訪視)是社區衛生護理的最初模式。","B":"安寧護理是後續發展的領域。","C":"公共衛生護理是後續擴大的階段。","D":"社區衛生護理是更後期、範圍更廣的階段。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106030-N5-42":{"quick":"「厝邊好醫師、社區好醫院」共同照護網絡「錯誤」者＝建立「每個家庭都有」家庭醫師制度。","detail":{"background":"「厝邊好醫師、社區好醫院」區域共同照護網絡(家庭醫師整合性照護計畫)的敘述，「錯誤」者為(C)『「建立「每個家庭都有」家庭醫師制度」』——敘述過於絕對，此計畫是「「鼓勵民眾選擇家庭醫師、建立家庭醫師「群(整合照護團隊)」」」，而非「每個家庭「都有」(強制人人)」家庭醫師。其他正確:A 加強衛生所社區健康評估功能、提升基層資源利用;B 建置在地化的社區醫療照護網絡、落實雙向轉診;D 鼓勵地區醫院與基層醫師合作、成立社區聯合執業團隊。故本題選錯誤者為 C。","options":{"A":"加強衛生所評估、提升基層資源利用，正確。","B":"建置在地化網絡、落實雙向轉診，正確。","C":"正確(本題選錯誤者)。是鼓勵選擇家庭醫師群，非「每個家庭都有」。","D":"鼓勵地區醫院與基層醫師合作、成立聯合執業團隊，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"106030-N5-43":{"quick":"培養個案獨立決定、但其無法判斷時可擔任＝顧問(counselor)。","detail":{"background":"社區護理師為培養個案「獨立做決定」的能力，但當民眾「無法獨立下判斷時」，可擔任(B)『「顧問(counselor)」角色——以「提供諮詢、分析利弊、引導思考」的方式協助個案做決定，「但仍尊重個案自主、不替其決定」(培養其自主決策能力)』。觸媒者是促發改變;教育者是提供知識;協調者是協調各方。本題在「不替個案決定、而是提供諮詢協助其判斷」，故為顧問。故 B 正確。顧問角色協助個案分析、引導決策，但尊重其自主。","options":{"A":"觸媒者是促發改變的催化角色。","B":"正確。提供諮詢、引導判斷但尊重自主，是顧問(counselor)。","C":"教育者是提供知識。","D":"協調者是協調各方。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106030-N5-51":{"quick":"社區有形資源中「最容易取得但最難掌控」者＝人力資源。","detail":{"background":"社區「有形資源」中，「最容易取得但最難掌控」者是(A)『「人力資源」——社區的人力(志工、居民)相對「容易取得(動員)」，但因人有自主意志、流動性、配合度差異，故「最難掌控(穩定運用)」』。物力、財力資源相對「可掌控但取得較難」;社區意識是「無形」資源。故 A 正確。人力資源是有形資源中最易取得但最難掌控者(人的變數大)。","options":{"A":"正確。人力資源最容易取得(動員)但最難掌控(人的變數大)。","B":"物力資源相對可掌控。","C":"財力資源取得較難但相對可掌控。","D":"社區意識是無形資源，非有形資源。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106030-N5-52":{"quick":"Hancock & Duhl 健康城市的品質「錯誤」者＝提供現代化、智慧化的生活環境。","detail":{"background":"Hancock & Duhl 提出的健康城市十一項品質，「錯誤」者為(C)『「提供「現代化、智慧化」的生活環境」』——「現代化、智慧化」並非健康城市的核心品質(健康城市著重「健康、安全、支持、需求滿足、參與、永續」，而非科技現代化)。其他正確的品質:A 提供居民有品質的衛生及醫療服務;B 提供乾淨、安全、高品質的生活環境;D 強而有力的支持性社區。故本題選錯誤者為 C。健康城市的品質著重健康、安全、支持與參與，非科技現代化。","options":{"A":"提供有品質的衛生及醫療服務，是健康城市的品質。","B":"提供乾淨、安全、高品質的生活環境，是健康城市的品質。","C":"正確(本題選錯誤者)。「現代化、智慧化」非健康城市的核心品質。","D":"強而有力的支持性社區，是健康城市的品質。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106030-N5-55":{"quick":"世界衛生組織(WHO)「錯誤」者＝臺灣在2012年再度成為正式會員國。","detail":{"background":"世界衛生組織(WHO)的描述，「錯誤」者為(B)『臺灣在2012年「再度成為正式會員國」』——錯誤，「臺灣「不是」WHO 的「正式會員國」」(臺灣曾以觀察員身分參與世界衛生大會 WHA，但非正式會員國)。其他正確:A 目前總部設於瑞士日內瓦;C 倡導促進人民衛生為政府之職責;D 主張享有健康是人類的基本權利。故本題選錯誤者為 B。臺灣非 WHO 的正式會員國。","options":{"A":"WHO 總部設於瑞士日內瓦，正確。","B":"正確(本題選錯誤者)。臺灣非 WHO 的正式會員國。","C":"倡導促進人民衛生為政府之職責，正確。","D":"主張享有健康是人類的基本權利，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106030-N5-67":{"quick":"外籍及大陸配偶生育健康管理「錯誤」者＝納入健保前無法享受免費產前檢查。","detail":{"background":"外籍及大陸配偶婦女生育健康管理的敘述，「錯誤」者為(D)『納入健保前「無法享受免費產前檢查」』——錯誤，外籍/大陸配偶「在納入健保「之前」，仍可透過「外籍配偶照顧輔導基金」等獲得「產前檢查費用的補助」」，並非完全無法享受。其他正確:A 鼓勵孕婦定期接受產前檢查;B 提供優生保健諮詢服務;C 提供育齡婦女生育健康資訊。故本題選錯誤者為 D。納入健保前仍有產檢費用補助。","options":{"A":"鼓勵孕婦定期產前檢查，正確。","B":"提供優生保健諮詢服務，正確。","C":"提供育齡婦女生育健康資訊，正確。","D":"正確(本題選錯誤者)。納入健保前仍有產檢費用補助，非無法享受。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"106030-N5-76":{"quick":"WHO「高齡友善城市」面向「錯誤(非)」者＝醫院數目。","detail":{"background":"WHO 倡導的「高齡友善城市」八大面向是:無障礙空間(B)、交通運輸(C)、住宅、社會參與、敬老與社會融入、社區及健康服務、通訊與資訊(D)、工作與志願服務。而(A)『「醫院數目」』「不是」高齡友善城市的面向(高齡友善著重「友善的環境、服務、參與」，而非「醫院的「數目」」)。故本題選非者為 A。高齡友善城市的面向著重環境、交通、住宅、參與、服務、資訊等，而非醫院數目。","options":{"A":"正確(本題選非者)。醫院數目不是高齡友善城市的面向。","B":"無障礙空間是高齡友善城市的面向。","C":"交通運輸是高齡友善城市的面向。","D":"通訊聯絡(資訊)是高齡友善城市的面向。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","高齡友善城市"]}},"106110-N5-41":{"quick":"公民透過何種團體力量對關鍵人物進行遊說與監督＝利益團體。","detail":{"background":"公民可透過(D)『「利益(壓力)團體」』的力量，對關鍵重要人物(stakeholders/決策者)進行「遊說與監督」——利益團體匯集有共同利益/理念的公民，透過遊說、倡議、監督，影響政策與決策。行政體系、立法機關、考試機關是「政府的部門」，而非「公民用以遊說監督的團體」。故 D 正確。公民透過利益(壓力)團體，對決策者進行遊說與監督。","options":{"A":"行政體系是政府的執行部門。","B":"立法機關是政府的立法部門。","C":"考試機關是政府的考試部門。","D":"正確。公民透過利益團體對關鍵人物進行遊說與監督。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106110-N5-44":{"quick":"糞便潛血篩檢大腸癌＝第二段②、第三級⑥(早期診斷)。","detail":{"background":"社區整合式篩檢中，以糞便潛血檢查「篩檢出可能罹患大腸癌者」——屬「「早期發現、早期診斷」」，在三段五級中屬(D)『「第二段(②)」預防、「第三級(⑥)」(早期診斷、早期治療)』。對照:第一段(①)含第一級(④健康促進)、第二級(⑤特殊保護);第二段(②)是第三級(⑥早期診斷早期治療);第三段(③)含第四級限制殘障、第五級復健。「篩檢=早期診斷」屬第二段第三級。故 D 正確。","options":{"A":"14(第一段第一級)是健康促進，非篩檢。","B":"25(第二段第二級)配對錯誤(第二段對應第三級)。","C":"36(第三段第三級)配對錯誤。","D":"正確。糞便潛血篩檢屬第二段②、第三級⑥(早期診斷)。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"106110-N5-51":{"quick":"中度失智(走失、健忘、重複問)的家屬建議「最不適當」者＝變動環境擺設與佈置、避免環境單調。","detail":{"background":"張先生中度失智(走失、健忘、重複問時間、焦慮)的家屬建議，「最不適當」者為(B)『「變動環境擺設與佈置、避免環境單調」』——錯誤，失智者宜「「維持固定、熟悉、一致」的環境」，「變動環境」反而會「增加混亂、焦慮、定向障礙」。其他適當:A 讓張先生戴有姓名及電話的手鍊(防走失);C 在大門加裝另一門栓或密碼鎖(防走失);D 將時鐘及日曆掛於醒目處(提供時間定向)。故本題選最不適當者為 B。失智者的環境宜固定熟悉，而非變動。","options":{"A":"戴有姓名電話的手鍊(防走失)，適當。","B":"正確(本題選最不適當者)。失智者宜固定熟悉的環境，非變動。","C":"大門加裝門栓/密碼鎖(防走失)，適當。","D":"時鐘日曆掛醒目處(時間定向)，適當。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護"]}},"106110-N5-52":{"quick":"全民健保的收入來源＝保險對象/雇主/政府共同分擔的保險費①、菸品健康福利捐②。","detail":{"background":"全民健康保險(社會保險、隨收隨付制)的收入來源主要是:(1)「保險對象、雇主及政府共同分擔的「保險費」(主要財源)」;(2)「菸品健康福利捐(部分挹注健保)」。而(3)「公益彩券盈餘分配的收入」、(4)「企業捐款」不是健保的主要法定收入來源。故正確為僅①②(選 C)。健保的主要財源是保險費(三方分擔)，並有菸品健康福利捐挹注。","options":{"A":"僅1：缺②(菸品健康福利捐)，不完整。","B":"(對照選項)非正確組合。","C":"正確。僅①(保險費)②(菸品健康福利捐)。","D":"含③④(公益彩券、企業捐款)，非健保的主要法定收入。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"106110-N5-55":{"quick":"全民健保對妊娠第三期(29週後)最多給付產檢次數＝6次(當時規定)。","detail":{"background":"全民健保(當時10次產檢的規定)對「妊娠第三期(29週後)」最多給付(C)『「6次」產前檢查』——因第三期接近生產、需較密集的產檢監測(如胎兒生長、胎位、血壓、子癇前症等)，故給付次數較多。對照:第一期(未滿17週)、第二期(17~29週)各給付較少次。故 C 正確。(本題依當時10次的規定;現行已擴大為14次，分配不同。)","options":{"A":"4次非第三期的給付次數。","B":"5次非第三期的給付次數。","C":"正確。妊娠第三期(29週後)最多給付6次(當時規定)。","D":"8次非第三期的給付次數。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"106110-N5-56":{"quick":"舉辦健康講座教導員工預防慢性病＝渥太華憲章的「發展個人保健技能」。","detail":{"background":"透過「舉辦健康講座、教導員工如何預防慢性病」——屬渥太華憲章的(C)『「發展個人(保健)技能(透過衛教、講座，使個人具備預防疾病、自我保健的知識與技能)」』。建立健康公共政策是立法;創造有益健康的環境是改善環境;強化社區組織是社區參與。本題是「衛教講座(增進個人保健技能)」，故為發展個人保健技能。故 C 正確。","options":{"A":"建立健康公共政策是立法/政策手段。","B":"創造有益健康的環境是改善環境。","C":"正確。健康講座教導預防慢性病，是發展個人保健技能。","D":"強化社區組織和功能是促進社區參與。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","渥太華憲章"]}},"106110-N5-64":{"quick":"社區的「無形資源」＝社區意識②、社區文化規範③、社區的凝聚力④(社區人力①、物力⑤是有形資源)。","detail":{"background":"社區的「無形資源」是指「「非物質、無形」但對社區有支持力量的資源」:(2)社區意識、(3)社區文化規範、(4)社區的凝聚力(這些是社區的精神、文化、認同等無形力量)。而(1)社區人力、(5)社區物力是「「有形(具體)資源」」。故無形資源為②③④(選 B)。社區的無形資源包括社區意識、文化規範、凝聚力、價值觀等。","options":{"A":"123：含①(社區人力)，那是有形資源。","B":"正確。社區意識②、文化規範③、凝聚力④，是無形資源。","C":"245：含⑤(社區物力)，那是有形資源。","D":"345：含⑤(社區物力)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106110-N5-65":{"quick":"Anderson & McFarlane 社區夥伴評估模式：強調評估過程中可使社區民眾增能(empower)。","detail":{"background":"Anderson & McFarlane(2008)「以社區為夥伴」的健康評估模式，正確的是(A)『強調「評估過程中可以使社區民眾「增能(empower)」(讓社區參與評估、共同診斷、增進其自主能力)」』。其他錯誤:B『由「護理師主導」、民眾是「主要學習者」』錯誤(此模式強調「夥伴、合作、社區參與」，非護理師主導);C『「較不重視與社區外的互動」』錯誤(此模式重視社區與外在環境的互動);D『評估後由「專業人員」分析並決定優先順序』錯誤(應「與社區「共同」分析、決定」)。故 A 正確。此模式強調社區參與、夥伴關係與賦權。","options":{"A":"正確。評估過程中可使社區民眾增能(empower)。","B":"此模式強調夥伴合作，非護理師主導、民眾是學習者。","C":"此模式重視社區與外在環境的互動，非較不重視。","D":"應與社區共同分析、決定優先順序，非專業人員獨自決定。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106110-N5-66":{"quick":"排定社區護理問題優先順序，應優先處理＝社區發現本土性登革熱疑似個案。","detail":{"background":"排定社區衛生護理問題的優先順序時，應「優先處理」的是(C)『「社區發現本土性登革熱疑似個案」』——傳染病(本土登革熱)「具「急迫性、傳播風險、會危害更多人」」，須立即處理(疫調、防治、防止擴散)。其他(A 失智了解不足、B 不願乳房攝影、D 戒菸資源不足)雖是健康問題，但「不具登革熱的急迫性與傳染擴散風險」。故 C 正確。傳染病的急迫性與傳播風險使其成為優先處理的問題。","options":{"A":"失智了解不足是慢性的健康教育問題，非急迫。","B":"不願乳房攝影是篩檢推廣問題，非急迫。","C":"正確。本土登革熱疑似個案具急迫性與傳播風險，應優先處理。","D":"戒菸資源不足是資源問題，非急迫。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106110-N5-67":{"quick":"群體(aggregates)的說明「錯誤」者＝以群體為基礎的社區健康服務，較不符合成本效益。","detail":{"background":"群體(aggregates)的說明，「錯誤」者為(D)『以群體為基礎的社區健康服務，「較不符合成本效益」』——錯誤，「「以群體為基礎」的健康服務「更符合成本效益」」(針對「具共同特質/風險的群體」提供服務，能以有限資源照顧更多人、發揮較大效益)。其他正確:A 社區是由許多群體所組成;B 社區內的成員通常屬於多樣群體;C 群體是一群人，且分享一個或更多的個人或環境特質。故本題選錯誤者為 D。以群體為基礎的服務更符合成本效益。","options":{"A":"社區由許多群體組成，正確。","B":"成員通常屬於多樣群體，正確。","C":"群體是分享共同特質的一群人，正確。","D":"正確(本題選錯誤者)。以群體為基礎的服務更符合成本效益，非較不符合。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106110-N5-69":{"quick":"改善山地離島醫療不足、定點/巡迴醫療＝IDS(全民健康保險山地離島地區醫療給付效益提升計畫)。","detail":{"background":"衛福部為改善山地離島地區醫療不足、就醫不便，規劃「有能力、有意願的醫療院所至山地離島提供定點或巡迴醫療服務」——此計畫名稱為(D)『「全民健康保險山地離島地區醫療(給付效益)提升計畫(Integrated Delivery System, IDS)」』。IDS 是整合醫療資源、深入偏遠地區提供在地化醫療服務的計畫。其他選項(養成醫事人員、原住民資源、部落健康營造)是不同的計畫。故 D 正確。IDS 計畫提供山地離島的定點/巡迴整合醫療服務。","options":{"A":"養成醫事人員培育及返鄉服務是人力培育計畫。","B":"原住民醫療或社會福利資源是不同的計畫。","C":"部落及社區健康營造是健康營造計畫。","D":"正確。山地離島的定點/巡迴醫療是 IDS 計畫。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"106110-N5-70":{"quick":"配合0~7歲疫苗接種時程，健保補助兒童預防保健門診次數＝7次。","detail":{"background":"配合0~7歲兒童的疫苗接種時程，我國全民健保(當時)規劃補助(B)『「7次」兒童預防保健門診』(於不同月齡進行身體檢查、發展評估、衛教等;後續已擴大次數)。故 B 正確。(本題依當時規定為7次;現行兒童預防保健已擴大為「7歲前7次→後增為更多次」，依政策調整。)兒童預防保健門診配合疫苗時程，提供定期的健康檢查與發展評估。","options":{"A":"5次非當時的補助次數。","B":"正確。配合疫苗時程，補助7次兒童預防保健門診(當時規定)。","C":"10次非當時的補助次數。","D":"14次非當時的補助次數。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"106111-N5-41":{"quick":"臺灣衛生所健康服務重點的變遷順序＝傳染病防治③→婦幼衛生及家庭計畫①→慢性病防治②→老人保健/長照④。","detail":{"background":"臺灣光復以來，衛生所健康服務重點的變遷順序大致為(C)『「傳染病防治③(早期以撲滅傳染病為主，如瘧疾、結核)→婦幼衛生及家庭計畫①(人口政策、孕產婦與兒童保健)→慢性病防治②(隨疾病型態轉變)→老人保健/長期照護④(因應高齡化)」』。這反映了臺灣疾病型態與人口結構的變遷(由傳染病→婦幼→慢性病→老人)。故 C 正確(③①②④)。","options":{"A":"①②③④順序錯誤(傳染病防治應在最前)。","B":"②③①④順序錯誤。","C":"正確。傳染病防治③→婦幼衛生家庭計畫①→慢性病防治②→老人保健④。","D":"③②①④順序錯誤(婦幼衛生應在慢性病之前)。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"106111-N5-44":{"quick":"社區健康營造「錯誤」者＝專家擔任社區領導者。","detail":{"background":"社區健康營造的敘述，「錯誤」者為(A)『「專家擔任社區領導者」』——錯誤，社區健康營造強調「「由下而上、社區「居民」自主、賦權」」，應「「由社區居民擔任主導/領導角色」」，專家是「協助、引導」而非「擔任社區領導者」。其他正確:B 由下而上的社區營造手法;C 社區民眾自發自覺地發現問題;D 目標為居民都能擁有健康。故本題選錯誤者為 A。社區健康營造由社區居民主導，專家從旁協助。","options":{"A":"正確(本題選錯誤者)。應由社區居民主導，專家協助，非專家擔任領導者。","B":"由下而上的社區營造手法，正確。","C":"社區民眾自發自覺地發現問題，正確。","D":"目標為居民都能擁有健康，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106111-N5-45":{"quick":"理想健康城市標準「錯誤」者＝全體居民都沒有疾病發生。","detail":{"background":"Hancock & Duhl 描述的理想健康城市標準，「錯誤」者為(A)『「全體居民都「沒有疾病」發生」』——錯誤，健康城市「「不是」追求「零疾病(不可能達成)」」，而是「持續「創造、改善」有利健康的「物理與社會環境」、擴大社區資源、使居民能發揮最大潛能」。健康是「過程」而非「沒有疾病的終點」。其他正確的標準:B 具高度參與的社區(及乾淨安全的環境、滿足基本需求等)。故本題選錯誤者為 A。健康城市不以「零疾病」為標準。","options":{"A":"正確(本題選錯誤者)。健康城市不追求「全體居民都沒有疾病」(不可能)。","B":"具高度參與的社區，是健康城市的標準。","C":"(對照)健康城市著重環境、參與、資源。","D":"(對照)健康城市著重持續改善有利健康的環境。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106111-N5-50":{"quick":"遊民群體健康照護「錯誤」者＝強制遊民接受愛滋病篩檢。","detail":{"background":"社區衛生護理師對遊民群體的健康照護，「錯誤」者為(C)『「強制」遊民接受愛滋病篩檢』——錯誤，篩檢(尤其愛滋)應「「尊重個人意願、知情同意、保密」」，「不可「強制」」(強制違反人權與醫療倫理)。其他正確:A 會同環保機關於遊民集散地進行清潔及消毒;B 結合醫療院所安排精障遊民治療;D 連結民間機構提供遊民民生必需品。故本題選錯誤者為 C。篩檢應尊重自願與知情同意，不可強制。","options":{"A":"會同環保機關清潔消毒，正確。","B":"結合醫療院所安排精障遊民治療，正確。","C":"正確(本題選錯誤者)。篩檢應尊重自願與知情同意，不可強制。","D":"連結民間機構提供民生必需品，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106111-N5-54":{"quick":"社區衛生護理特性「錯誤」者＝主要工作目標為疾病照護。","detail":{"background":"社區衛生護理的特性，「錯誤」者為(C)『「主要工作目標為「疾病照護」」』——錯誤，社區衛生護理以「「健康促進與疾病預防(以「健康」為主)」」為主要目標，而非「以「疾病照護」為主」。其他正確的特性:A 強調以人口群體為焦點;B 服務層面廣泛;D 以管理與組織為策略。故本題選錯誤者為 C。社區衛生護理以健康促進與預防為主，非疾病照護(與前述同類題一致)。","options":{"A":"強調以人口群體為焦點，是社區護理的特性。","B":"服務層面廣泛，是社區護理的特性。","C":"正確(本題選錯誤者)。主要目標為健康促進與預防，非疾病照護。","D":"以管理與組織為策略，是社區護理的特性。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106111-N5-61":{"quick":"社區健康診斷的原則「不包括」者＝以應用社區內資源為主。","detail":{"background":"社區護理師進行社區健康診斷的原則，「不包括」(C)『「以應用「社區「內」資源」為主」』——應「「結合社區「內、外」的資源」」(不應「侷限於社區內」資源)。其他屬於社區健康診斷的原則:A 邀請社區居民共同參與;B 以社區護理師所能解決的問題優先考量(可行性);D 考量目前的衛生政策走向。故本題選不包括者為 C。社區健康診斷應結合內外資源，而非侷限於社區內。","options":{"A":"邀請社區居民共同參與，是社區健康診斷的原則。","B":"以可解決的問題優先考量，是原則。","C":"正確(本題選不包括者)。應結合內外資源，非侷限社區內資源。","D":"考量衛生政策走向，是原則。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106111-N5-62":{"quick":"針對多個社區健康問題確認優先順序，較常用＝民意團體過程。","detail":{"background":"針對「多個社區健康問題」進行「優先順序之確認」，較常用的方式是(A)『「民意團體過程(nominal group process/社區論壇，召集相關人員，透過團體討論、評定，凝聚對各問題優先序的共識)」』。焦點團體會談是深入探討特定議題;參與式觀察是融入觀察;文獻查證是查文獻。「確認優先順序(需團體共識)」常用民意團體過程。故 A 正確(與前述同類題一致)。","options":{"A":"正確。確認多個問題的優先順序，常用民意團體過程。","B":"焦點團體會談是深入探討特定議題。","C":"參與式觀察是融入社區觀察。","D":"文獻查證是查閱文獻。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106111-N5-63":{"quick":"社區健康計畫的形成性評價(formative evaluation)「錯誤」者＝又稱結構評價、著重客觀具體的資料。","detail":{"background":"社區健康計畫「形成性評價(formative evaluation)」的敘述，「錯誤」者為(C)『「又稱「結構評價」、著重客觀具體的資料」』——錯誤，「形成性評價」是「「在計畫「發展與進行「中」」進行的評價(過程性)」」，而「結構評價」是另一種(Donabedian)的評價類型，兩者不同;且形成性評價不一定「著重客觀具體資料」。其他正確:A 強調在計畫發展與進行中的評價;B 可以改善計畫的經營和管理方式;D 內容可包括是否接觸到合適的標的人口、是否有足夠的參與人數等。故本題選錯誤者為 C。形成性評價是過程中的評價，非「結構評價」。","options":{"A":"強調在計畫發展與進行中的評價，正確。","B":"可改善計畫的經營和管理方式，正確。","C":"正確(本題選錯誤者)。形成性評價非「結構評價」。","D":"內容可包括是否接觸標的人口、參與人數等，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106111-N5-68":{"quick":"兼納護理師與案家應努力的職責與控制的訪視技巧＝訂合約(contracting)。","detail":{"background":"「可以兼納社區護理師與案家「應努力的職責與控制(雙方的責任與目標)」」的訪視技巧是(A)『「訂合約(contracting，與案家共同約定目標、雙方的職責、執行方式與期限，明確化彼此的責任)」』。代言是為個案發聲;諮商是提供諮詢;賦權是增進自主能力。「明訂雙方職責與控制」的技巧是「訂合約」。故 A 正確。訂合約(護理契約)能明確雙方的職責、目標與承諾。","options":{"A":"正確。兼納雙方職責與控制，是訂合約(contracting)。","B":"代言(advocacy)是為個案發聲。","C":"諮商(counseling)是提供諮詢。","D":"賦權(empower)是增進自主能力。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"106111-N5-69":{"quick":"教導低升糖指數(GI)食物「錯誤」者＝澱粉糊化後GI值越低。","detail":{"background":"教導糖尿病人攝取低升糖指數(GI)食物，「錯誤」者為(D)『「澱粉「糊化」後 GI 值越「低」」』——錯誤，澱粉「「糊化(煮得越爛、越糊)」後，「GI 值越「高」(越易消化吸收、血糖上升越快)」」，故糊化後 GI 值「升高」而非降低。其他正確:A 多醣類澱粉比單醣類 GI 值低;B 塊狀水果比果汁 GI 值低(纖維保留);C 纖維量越高的食物 GI 值越低。故本題選錯誤者為 D。澱粉糊化後 GI 值升高(易升血糖)。","options":{"A":"多醣類澱粉比單醣類 GI 值低，正確。","B":"塊狀水果比果汁 GI 值低(保留纖維)，正確。","C":"纖維量越高的食物 GI 值越低，正確。","D":"正確(本題選錯誤者)。澱粉糊化後 GI 值升高，非降低。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"106111-N5-80":{"quick":"社區護理師運用個案管理「錯誤」者＝積極協助問題解決、減少個案自我照顧。","detail":{"background":"社區護理師運用個案管理的敘述，「錯誤」者為(D)『「積極協助問題解決、「減少個案自我照顧」」』——錯誤，個案管理應「「促進、增進」個案的「自我照顧」與自主能力」，而非「減少個案的自我照顧(讓其依賴)」。其他正確:A 提供個案多重需求的照護;B 有效控制成本、配合個案環境協助發揮照護最大功能;C 必要時協助轉介或協調，以解決獨居長者的健康問題。故本題選錯誤者為 D。個案管理應增進個案的自我照顧，而非減少。","options":{"A":"提供個案多重需求的照護，正確。","B":"有效控制成本、發揮照護最大功能，正確。","C":"必要時協助轉介或協調，正確。","D":"正確(本題選錯誤者)。應增進個案的自我照顧，非減少。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107030-N5-17":{"quick":"地震後一個月(蜜月期)易被忽略的問題＝心理與行為問題。","detail":{"background":"大地震後一個月、救援物資仍源源不絕進入、災難反應進入「蜜月期(honeymoon phase，外界關注與資源湧入、災民暫時有希望感)」——此期護理師最應關注、易被忽略的是(D)『「心理與行為問題」(在物資與救援之下，災民的「創傷後心理反應(焦慮、憂鬱、PTSD、哀傷)」容易被忽略，且蜜月期後易進入幻滅期)』。物資分配、傷口感染、就業輔導在此期相對受關注或非此期重點。故 D 正確。災難蜜月期應特別關注易被忽略的心理與行為問題。","options":{"A":"物資分配在物資湧入的蜜月期相對受關注。","B":"傷口感染屬災後初期的醫療問題。","C":"就業輔導是後期(重建期)的問題。","D":"正確。蜜月期易被忽略的是心理與行為問題。"},"sources":["社區衛生護理學(新文京/華杏)·災難護理"]}},"107030-N5-41":{"quick":"進入社區四處觀察居民生活環境、型態及互動＝擋風玻璃式調查。","detail":{"background":"「進入社區四處觀察居民的生活環境、型態及互動」之資料收集方式是(C)『「擋風玻璃式調查(windshield survey，以「步行或開車」方式「實地巡視、觀察」社區的環境、設施、居民活動等)」』。社會指標調查是用統計指標;文獻考察是查文獻;重要人物訪談是訪談關鍵人物。本題是「四處實地觀察」，故為擋風玻璃式調查。故 C 正確。擋風玻璃式調查以實地巡視觀察社區的整體樣貌。","options":{"A":"社會指標調查是用既有的統計指標。","B":"文獻考察是查閱文獻。","C":"正確。四處實地觀察社區，是擋風玻璃式調查。","D":"重要人物訪談是訪談關鍵人物。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107030-N5-42":{"quick":"收集社區民眾的教育程度及婚姻狀況＝安德森(Anderson)模式的「人口特性」向度。","detail":{"background":"社區評估時，收集「社區民眾的「教育程度、婚姻狀況」」等資料——屬安德森(Anderson)社區健康評估模式的(A)『「人口特性(population/people，社區人口的組成特質，如年齡、性別、教育、婚姻、種族、職業等)」』向度。地理環境是空間;社會系統是各次系統;社區動力是互動與運作。「教育程度、婚姻狀況」是「人口的特性」，故為人口特性。故 A 正確。Anderson 模式以人口特性(核心)、社會系統(八大次系統)等評估社區。","options":{"A":"正確。教育程度、婚姻狀況，屬人口特性向度。","B":"地理環境是空間、地理的向度。","C":"社會系統是各次系統(經濟、政治、教育等)。","D":"社區動力是互動與運作。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107030-N5-43":{"quick":"社區夥伴關係「錯誤」者＝護理師居於領導的地位。","detail":{"background":"社區夥伴關係(collaborative partnership)的敘述，「錯誤」者為(C)『「護理師居於「領導」的地位」』——錯誤，社區夥伴關係強調「「平等、合作、社區參與」」，護理師是「「夥伴(平等合作)、協助者」」，而非「居於領導/主導地位」。其他正確:A 尊重社區文化;B 促進社區民眾主動參與;D 強調由下而上的彙整民眾需求。故本題選錯誤者為 C。社區夥伴關係中護理師是平等的夥伴，而非領導者。","options":{"A":"尊重社區文化，是夥伴關係的特性。","B":"促進社區民眾主動參與，是夥伴關係的特性。","C":"正確(本題選錯誤者)。護理師是平等的夥伴、協助者，非居於領導地位。","D":"強調由下而上彙整民眾需求，是夥伴關係的特性。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107030-N5-51":{"quick":"WHO 設定2025年6個月以下純母乳哺育率目標＝50%。","detail":{"background":"WHO 設定的「2025年「6個月以下嬰兒純母乳哺育率」」目標為(D)『「50%」』——WHO 的全球營養目標之一是「到2025年，將6個月以下嬰兒的純母乳哺育率「提升至至少50%」」。故 D 正確。純母乳哺育對母嬰健康有多重益處，WHO 訂定2025年達50%的目標。","options":{"A":"38%非 WHO 的2025年目標。","B":"42%非 WHO 的2025年目標。","C":"46%非 WHO 的2025年目標。","D":"正確。WHO 設定2025年6個月以下純母乳哺育率目標為50%。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"107030-N5-61":{"quick":"社區「健康及社會服務次系統」的資料：疾病種類罹病率①、醫療資源可近可用②、醫療社福機構分布類型③、使用醫療滿意度④(家庭收入⑤、貧戶比率⑥屬經濟系統)。","detail":{"background":"依 Anderson & McFarlane 社區為夥伴模式，社區的「健康及社會服務次系統」應包括:(1)社區居民的疾病種類與罹病率(健康狀況);(2)社區醫療資源的可近性與可用性;(3)醫療與社會福利機構的分布與類型;(4)社區居民使用醫療的滿意度。而(5)居民的家庭收入與社經狀態、(6)居民的貧戶比率屬「「經濟次系統」」，非健康及社會服務次系統。故正確為①②③④(選 A)。","options":{"A":"正確。疾病種類罹病率①、醫療資源可近可用②、機構分布類型③、使用醫療滿意度④。","B":"1245：含⑤(家庭收入)，屬經濟系統。","C":"2356：含⑤⑥，屬經濟系統。","D":"3456：含⑤⑥、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107030-N5-62":{"quick":"社區需求評估的第一個步驟＝進行文獻查證與二手資料收集。","detail":{"background":"進行社區需求評估時，「第一個步驟」通常是(A)『「進行「文獻查證與二手(既有)資料收集」(先收集既有的人口、健康、社會等統計資料，建立對社區的基本了解)」』——先利用「現成、二手」的資料快速建立社區概況，再進一步進行社會調查、訪談、焦點團體等「一手」資料收集。故 A 正確。社區需求評估通常先從文獻與二手資料著手，再做一手資料收集。","options":{"A":"正確。第一步通常是文獻查證與二手資料收集。","B":"社會調查是後續的一手資料收集。","C":"重要人物訪談是後續的一手資料收集。","D":"焦點團體討論是後續的一手資料收集。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107030-N5-63":{"quick":"胰島素注射教學情境：本次課程的「主學習」為學會胰島素注射法。","detail":{"background":"護理師教導糖尿病人「胰島素注射」，先介紹原因、隱私、位置、注意事項，最後教導注射方法。正確的是(A)『「本次課程的「主學習」為「學會胰島素注射法(主要的技能目標)」」』。其他錯誤:B『副學習為「病患隱私性的維護」』——隱私維護較屬「附學習(情境中附帶習得的態度)」，且本題主軸是注射技能;C『此主題較適合「講述法」』錯誤(教「注射技能」應以「「示範+回覆示範(demonstration)」」為主，而非講述);D『個案錯誤的反應會因「練習」而「增加」』錯誤(練習應使「錯誤「減少」、技能熟練」)。故 A 正確。教注射技能的主學習是學會注射法，宜用示範教學。","options":{"A":"正確。本次課程的主學習為學會胰島素注射法。","B":"隱私維護較屬附學習，且非本題主軸。","C":"教注射技能應用示範法，非講述法。","D":"練習應使錯誤減少、技能熟練，非增加。"},"sources":["社區衛生護理學(新文京/華杏)·衛生教育"]}},"107030-N5-68":{"quick":"腎臟疾病晚期的飲食指導「錯誤」者＝攝取新鮮蔬果、減少烹煮，尤以生菜或精力湯為佳。","detail":{"background":"張老先生腎臟疾病晚期(末期腎病)的飲食指導，「錯誤」者為(C)『「宜攝取新鮮蔬果、減少烹煮，「尤以生菜或精力湯為佳」」』——錯誤，末期腎病須「「限鉀」」，而「「生菜、精力湯、新鮮蔬果」「鉀含量高」」，且蔬菜「「應汆燙(去鉀)後再食用」」，「生菜/精力湯」反而會攝入過多鉀(致高血鉀、心律不整)。其他正確:A 避免使用含鉀的低鈉鹽(低鈉鹽以鉀取代鈉、含鉀高);B 避免使用肉汁或高湯拌飯(高磷、高鉀);D 宜攝取低氮澱粉類(如冬粉、米粉、米苔目，減少含氮廢物)。故本題選錯誤者為 C。末期腎病須限鉀，蔬菜應汆燙去鉀，忌生菜/精力湯。","options":{"A":"避免含鉀的低鈉鹽(低鈉鹽含鉀高)，正確。","B":"避免肉汁或高湯拌飯(高磷高鉀)，正確。","C":"正確(本題選錯誤者)。末期腎病須限鉀，生菜/精力湯鉀高，應汆燙去鉀。","D":"宜攝取低氮澱粉類(冬粉、米粉)，正確。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"107030-N5-71":{"quick":"遊民收容輔導三階段「不包括」者＝回歸服務(三階段為緊急、過渡、穩定服務)。","detail":{"background":"遊民收容輔導採「三階段式服務」:緊急服務(B，立即的食宿、保護)、過渡服務(C，協助安置、生活重建)、穩定服務(D，協助穩定生活、自立、回歸社會)。而(A)『「回歸服務」』「不在」此三階段的標準名稱中(「回歸社會」是「穩定服務」階段的目標，非獨立的一個階段)。故本題選不包括者為 A。遊民收容輔導的三階段是緊急、過渡、穩定服務。","options":{"A":"正確(本題選不包括者)。三階段為緊急、過渡、穩定服務，「回歸服務」非其中。","B":"緊急服務是三階段之一。","C":"過渡服務是三階段之一。","D":"穩定服務是三階段之一。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107030-N5-72":{"quick":"基於社會正義決定優先順序：弱勢族群的健康問題應優先處理。","detail":{"background":"某社區整體嬰兒死亡率低，但「某少數弱勢族群的嬰兒死亡率特別高」。基於「社會正義(social justice，重視「公平、照顧弱勢、縮小健康不平等」)」決定優先順序，正確的是(B)『「應確保社區中「弱勢族群」的健康問題「優先」於一般民眾，故該族群嬰兒死亡率的問題應「優先處理」」』。其他錯誤:A『以「多數民眾利益」為優先、弱勢排後』違反社會正義;C『歸因於弱勢的文化/行為、與資源無關、排後』是責怪受害者;D『因「複雜爭議」而排後』是迴避。故 B 正確。社會正義強調優先照顧弱勢、縮小健康不平等。","options":{"A":"以多數利益為優先、弱勢排後，違反社會正義。","B":"正確。基於社會正義，弱勢族群的健康問題應優先處理。","C":"歸因於弱勢的文化/行為、與資源無關，是責怪受害者。","D":"因複雜爭議而排後是迴避，違反社會正義。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學","社會正義"]}},"107030-N5-80":{"quick":"整合性篩檢正常者的衛教「最不恰當」者＝維持現有體重與生活型態。","detail":{"background":"承上題，王先生(假設篩檢結果或有需改善之處)的衛教，「最不恰當」者為(C)『「維持現有體重與生活型態」』——若王先生有體重過重或不良生活型態，「「維持現狀」」是不恰當的(應「鼓勵改善」生活型態以促進健康)。其他較恰當:A 明年可再接受整合性篩檢服務;B 安排進一步血糖檢測(若血糖偏高);D 運動宜在飯後一小時(避免空腹低血糖)。故本題選最不恰當者為 C。健康衛教應鼓勵改善不良的生活型態，而非維持現狀。","options":{"A":"明年可再接受整合性篩檢，恰當。","B":"安排進一步血糖檢測，恰當。","C":"正確(本題選最不恰當者)。應鼓勵改善生活型態，非維持現狀。","D":"運動宜在飯後一小時(避免空腹低血糖)，恰當。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"107110-N5-51":{"quick":"社區護理與醫院護理的差異：社區衛生護理的護理師具有較高的自主性。","detail":{"background":"社區衛生護理與醫院護理的差異，正確的是(C)『「社區衛生護理之護理師「具有較高的「自主性(獨立判斷、獨立執業)」」(因常獨立家訪、在資源較少的情境下獨立作業)」』。其他錯誤:A『社區護理之個案「較依賴醫療團隊」』錯誤(社區護理常獨立作業、個案多在家自我照顧);B『「醫院護理」較能觀察到個案與家庭的互動』錯誤(「社區護理(家訪)」才更能觀察家庭互動);D『「醫院護理」與社區機構有更多的聯繫』錯誤(「社區護理」與社區機構/資源的聯繫更多)。故 C 正確。社區護理的自主性較高。","options":{"A":"社區護理常獨立作業，非較依賴醫療團隊。","B":"社區護理(家訪)才更能觀察家庭互動。","C":"正確。社區衛生護理的護理師具有較高的自主性。","D":"社區護理與社區機構的聯繫更多，非醫院護理。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107110-N5-53":{"quick":"綜合性社區衛生護理「錯誤」者＝服務對象僅限於社區中的特殊族群。","detail":{"background":"綜合性(generalized)社區衛生護理的敘述，「錯誤」者為(C)『「服務對象「僅限於」社區中的「特殊族群」」』——錯誤，「「服務對象僅限於特殊族群」是「「專科化(specialized)」」的方式」;「綜合性」是「「不分科、負責一個地段內「所有」家庭與居民的全面性照護」」。其他正確的綜合性特性:A 容易與個案及家屬建立專業性人際關係;B 較能以家庭為中心、整體考量其健康需要;D 為地段管理、不分科的護理方式。故本題選錯誤者為 C。綜合性服務全體居民，僅限特殊族群是專科化。","options":{"A":"容易與個案及家屬建立關係，是綜合性的特性。","B":"較能以家庭為中心、整體考量，是綜合性的特性。","C":"正確(本題選錯誤者)。僅限特殊族群是專科化，非綜合性。","D":"為地段管理、不分科，是綜合性的特性。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107110-N5-57":{"quick":"了解社區的權力分配、溝通方式、決策過程＝參與式觀察。","detail":{"background":"社區護理師希望了解社區的「權力分配、溝通方式、問題解決辦法、決策過程」等「動態的互動與運作」資訊——較適當的評估方法是(D)『「參與式觀察(participant observation，「親自參與」社區的會議、活動，在參與中「觀察」其權力結構、溝通與決策的實際運作)」』。文獻查證、擋風玻璃式調查、重要人物訪談都較難直接觀察「動態的權力與決策運作」。故 D 正確。要了解社區的動態運作(權力、溝通、決策)，宜用參與式觀察。","options":{"A":"文獻查證是查閱既有文獻。","B":"擋風玻璃式調查是觀察社區的外在環境。","C":"重要人物訪談是訪談關鍵人物。","D":"正確。了解權力分配、溝通、決策過程，用參與式觀察。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107110-N5-58":{"quick":"評價計畫的價值性及執行所引發的問題＝成效(impact)評價。","detail":{"background":"完成社區健康計畫後，「評價計畫的「價值性」及「執行所引發的問題(影響、衝擊)」」——屬(D)『「成效/衝擊(impact)評價」(評估計畫所「造成的整體影響、價值與引發的問題」)』。效率評價是評估投入與產出的比;效果評價是評估是否達成預定目標;合適性評價是評估計畫是否符合需求。本題評價的是「計畫的整體價值與引發的問題(衝擊)」，故為成效(impact)評價。故 D 正確。","options":{"A":"效率評價是評估投入與產出的比(成本效益)。","B":"效果評價是評估是否達成預定目標。","C":"合適性評價是評估計畫是否符合需求。","D":"正確。評價計畫的價值性及引發的問題，是成效(impact)評價。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"107110-N5-59":{"quick":"社區健康營造：改善健康與生活品質①、透過社區發展讓民眾解決議題②、發揮自決自主自助力量③(最終目的改變社區環境④非)。","detail":{"background":"社區健康營造的正確敘述:(1)希望能「改善民眾的健康狀況與生活品質」;(2)希望透過「社區發展」的方式，讓民眾能「自己解決社區的健康議題」;(3)希望能「發揮民眾「自決、自主與自助」的力量(賦權)」。而(4)『「最終目的是改變社區環境」』錯誤——社區健康營造的最終目的是「「改善民眾的健康、賦權社區(讓社區自主經營健康)」」，「改變環境」是手段之一，而非「最終目的」。故正確為①②③(選 A)。","options":{"A":"正確。改善健康與生活品質①、透過社區發展解決議題②、發揮自決自主自助③。","B":"124：含④(最終目的改變環境)，錯誤。","C":"134：含④，錯誤。","D":"234：含④、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"108110-N5-44":{"quick":"社區資料來源「錯誤」者＝民眾對社區的認同感可透過戶政資料獲得。","detail":{"background":"社區資料來源的描述，「錯誤」者為(C)『「民眾對社區的「認同感」可透過「戶政資料」獲得」』——錯誤，「認同感(感受、態度)」是「「質性、主觀」的資料」，須透過「「訪談、座談、參與觀察」」等方式了解，「無法從「戶政資料(人口統計)」」獲得。其他正確:A 社區發展史可從圖書館或地方誌獲得;B 健康/疾病統計可從衛生所或醫療院所獲得;D 人口分布可從戶政事務所獲得。故本題選錯誤者為 C。認同感是質性資料，無法從戶政資料獲得。","options":{"A":"社區發展史可從圖書館或地方誌獲得，正確。","B":"健康/疾病統計可從衛生所獲得，正確。","C":"正確(本題選錯誤者)。認同感是質性資料，無法從戶政資料獲得。","D":"人口分布可從戶政事務所獲得，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"108110-N5-45":{"quick":"評價民眾在宣導計畫後知識與態度的改變＝衝擊(impact)評值。","detail":{"background":"社區護理師評價民眾在高血壓防治宣導計畫後，「對防治的「知識及態度」的改變」——屬(A)『「衝擊(impact)評值」(評估計畫對標的人口「立即/中期的改變，如知識、態度、信念、行為的改變」)』。合適性評值是評估是否符合需求;效率評值是成本效益;效果評值是是否達成「最終的目標(如疾病率下降)」。「知識與態度的改變」屬「衝擊(impact)」層次的成果。故 A 正確。(評值層次:過程→衝擊 impact(知識、態度、行為的改變)→結果 outcome(健康狀態的改變)。)","options":{"A":"正確。知識與態度的改變，屬衝擊(impact)評值。","B":"合適性評值是評估是否符合需求。","C":"效率評值是評估成本效益。","D":"效果評值是評估是否達成最終目標(如疾病率)。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"108110-N5-52":{"quick":"新移民多處新舊不同瘀青、稱跌落(疑家暴)：先與個案會談、評估可能原因。","detail":{"background":"印尼籍新移民王太太「左臉及手腳有「多處「新舊不同」的瘀青」、主訴跌落(瘀青分布與新舊不一，「疑似受暴/家暴」)」。最適切的處置是(D)『「先「與個案會談、評估可能的原因」(在私密、安全的情境下了解真相，建立信任，評估是否為家暴)」』——在懷疑家暴時，先以同理、不批判的方式會談評估，是第一步。A『驗血小板凝血功能』忽略家暴的可能;B『加強居家安全(樓梯扶手照明)』把它當成單純跌倒;C『趕快陪同去急診驗傷備案』在「未先評估、未取得個案意願」前過於急促。故 D 正確。對疑似家暴，先會談評估、建立信任、了解真相。","options":{"A":"驗凝血功能忽略了家暴的可能性。","B":"加強居家安全把它當成單純跌倒，忽略疑似家暴。","C":"未先評估、未取得意願就陪同驗傷備案過於急促。","D":"正確。先與個案會談、評估可能原因(疑似家暴)。"},"sources":["社區衛生護理學(新文京/華杏)·家庭暴力"]}},"108110-N5-53":{"quick":"青少女懷孕的第三級預防＝早期發現懷孕的青少女。","detail":{"background":"對青少女懷孕，屬三段五級「第三級(早期診斷、早期治療)」預防的措施是(C)『「早期發現懷孕的青少女(及早發現、及早提供協助與處置)」』。第三級預防(屬第二段)的核心是「早期發現、早期診斷」。其他:A 衛教母乳哺育、B 提供選擇諮詢、D 提供特殊營養都是「懷孕「之後」的照護/處置(屬限制殘障或其他層級)」，而非「早期發現」。故 C 正確。「早期發現懷孕青少女」屬第三級(早期診斷)預防。","options":{"A":"衛教母乳哺育是懷孕後的照護，非第三級(早期發現)。","B":"提供選擇諮詢是懷孕後的處置。","C":"正確。早期發現懷孕青少女，屬第三級預防(早期診斷)。","D":"提供特殊營養是懷孕後的照護。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"108110-N5-58":{"quick":"超高齡社會＝65歲以上老年人口占總人口的20%。","detail":{"background":"依世界衛生組織的定義，「超高齡社會(super-aged society)」是指該國「65歲以上老年人口佔總人口比率達(C)「20%」」。對照:高齡化社會(aging society)為7%;高齡社會(aged society)為14%;超高齡社會為20%。故 C 正確。(7%→14%→20% 分別為高齡化、高齡、超高齡社會。)臺灣已於2025年邁入超高齡社會。","options":{"A":"7%是「高齡化社會」。","B":"14%是「高齡社會」。","C":"正確。超高齡社會是65歲以上佔20%。","D":"25%非標準定義的門檻。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"108110-N5-59":{"quick":"二代健保(2015決議)「錯誤」者＝健保費率調降、補充保險費率調高。","detail":{"background":"二代健保(2015年決議)的描述，「錯誤」者為(A)『「健保費率「調降」、補充保險費率「調高」」』——錯誤，當時是「「健保費率「調降」、補充保險費率「也調降」」(因健保財務改善而雙雙調降)」，並非「補充保險費率調高」。其他正確:B 建置「健康存摺」系統;C 與長照保險無縫接軌;D 推動健康醫療雲。故本題選錯誤者為 A。(細節依當時的決議;補充保費率並非調高。)","options":{"A":"正確(本題選錯誤者)。當時是費率與補充保費率雙雙調降，非補充保費率調高。","B":"建置「健康存摺」系統，正確。","C":"與長照保險無縫接軌，正確。","D":"推動健康醫療雲，正確。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}},"108110-N5-60":{"quick":"社區衛生護理發展「錯誤」者＝由公共衛生護理發展至地段護理。","detail":{"background":"社區衛生護理發展的敘述，「錯誤」者為(C)『社區衛生護理發展階段是「由「公共衛生護理」發展至「地段護理」」』——錯誤，發展順序是「「地段護理 → 公共衛生護理 → 社區衛生護理」」(由最初的「地段(家庭訪視)護理」逐步擴展)，C 把順序「顛倒」了。其他正確:A 以社區整體為對象、鼓勵民眾自主自立;B 社區衛生護理涵蓋公衛、學校、職業、長照及醫療機構社區護理等;D 「社區衛生護理師認證」是為提昇社區健康照護能力。故本題選錯誤者為 C。發展順序是地段護理→公衛護理→社區護理。","options":{"A":"以社區整體為對象、鼓勵自主自立，正確。","B":"涵蓋公衛、學校、職業、長照等護理，正確。","C":"正確(本題選錯誤者)。順序是地段護理→公衛護理→社區護理，C 顛倒。","D":"社區衛生護理師認證提昇照護能力，正確。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"108110-N5-70":{"quick":"選開放性肺結核而非高血壓優先＝依問題的嚴重性。","detail":{"background":"社區護理師選擇以「社區正在流行的「開放性肺結核(具傳染性、急迫、危害大)」」而非「高血壓」為優先處理議題——其依據是(D)『「問題的嚴重性(開放性肺結核的傳染性、急迫性、危害程度都遠大於慢性的高血壓)」』。社區對問題的了解、可利用資源、解決動機雖是考量因素，但本題的關鍵是「兩者「嚴重性/急迫性」的差異」。故 D 正確。傳染性疾病(開放性肺結核)的嚴重性與急迫性使其優先處理。","options":{"A":"社區對問題的了解是考量之一，非本題關鍵。","B":"可利用資源是考量之一，非本題關鍵。","C":"社區解決問題的動機是考量之一，非本題關鍵。","D":"正確。開放性肺結核的嚴重性遠大於高血壓，依問題的嚴重性優先。"},"sources":["社區衛生護理學(新文京/華杏)·社區衛生護理概論","公共衛生學"]}},"108110-N5-80":{"quick":"預防慢性腎臟病的方法＝定期接受血壓、血糖、肌酸酐與蛋白尿的檢查。","detail":{"background":"教導民眾預防慢性腎臟病的方法，正確的是(C)『「定期接受「血壓、血糖、肌酸酐(腎功能)與蛋白尿」的檢查(及早發現、控制傷腎的危險因子如高血壓、糖尿病，並監測腎功能)」』。其他錯誤:A『「減少飲水量」以避免腎臟負荷』錯誤(一般人應「維持足夠水分」，過度限水反而傷腎);B『「儘量採低蛋白飲食」「預防」』錯誤(健康人「不需」刻意低蛋白;低蛋白是「已有腎病者」的飲食控制);D『「按時服藥改善腎功能」』錯誤(無「改善腎功能」的藥，重點是控制危險因子、定期監測)。故 C 正確。預防慢性腎病重在控制三高、定期監測腎功能與蛋白尿。","options":{"A":"一般人應維持足夠水分，過度限水反而傷腎。","B":"健康人不需刻意低蛋白(那是已有腎病者的飲食控制)。","C":"正確。定期接受血壓、血糖、肌酸酐與蛋白尿的檢查。","D":"無「改善腎功能」的藥，重點是控制危險因子、定期監測。"},"sources":["社區衛生護理學(新文京/華杏)·慢性病防治"]}},"109030-N5-42":{"quick":"兒童牙齒塗氟補助對象「錯誤」者＝7歲劉小妹(一般兒童補助為未滿6歲)。","detail":{"background":"全民健保兒童牙齒塗氟補助對象，「錯誤」者為(B)『「7歲劉小妹」』——「一般兒童」的牙齒塗氟補助是「「未滿6歲」(每半年一次)」，「7歲(已滿6歲)的一般兒童「不在」補助範圍」。其他正確(符合補助):A 5歲王小弟(一般兒童未滿6歲);C 10歲原住民張小弟、D 10歲身心障礙廖小妹(「原住民、身心障礙兒童」的塗氟補助「放寬至未滿12歲」)。故本題選錯誤者為 B。一般兒童塗氟補助為未滿6歲，原住民/身障放寬至12歲。","options":{"A":"5歲(一般兒童未滿6歲)符合補助。","B":"正確(本題選錯誤者)。7歲一般兒童已超過6歲，不在補助範圍。","C":"10歲原住民(放寬至12歲)符合補助。","D":"10歲身心障礙(放寬至12歲)符合補助。"},"sources":["社區衛生護理學(新文京/華杏)·口腔保健"]}},"109030-N5-43":{"quick":"在遊民集散地設置免費保險套裝置＝初段預防。","detail":{"background":"社區護理師在遊民集散地的公共廁所「設置免費保險套裝置」——這是「「預防性病/愛滋病的「特殊保護」」」，屬(A)『「初段(第一段)預防」(在「健康者」身上預防疾病的「發生」;提供保險套以預防性病/愛滋是特殊保護)』。次段預防是早期發現早期治療;「末段/三段」是限制殘障/復健;無「四段」。「提供保險套預防性病」屬初段預防。故 A 正確。提供保險套以預防性病/愛滋，屬初段預防(特殊保護)。","options":{"A":"正確。設置免費保險套以預防性病，屬初段預防(特殊保護)。","B":"次段預防是早期發現早期治療。","C":"末段(三段)預防是限制殘障/復健。","D":"三段五級無「四段預防」。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"109030-N5-45":{"quick":"注意營養、運動、定期健檢以預防糖尿病＝三段五級的「促進健康(第一級)」。","detail":{"background":"為預防罹患糖尿病，「注意營養攝取、建立運動習慣及定期健康檢查」——整體屬三段五級的(D)『「促進健康(第一級，屬第一段預防;以營養、運動等一般性的健康增進措施來預防疾病發生)」』。早期診斷、特殊保護、限制殘障是其他層級。本題以「營養、運動(一般性健康增進)」為主軸，屬第一級「促進健康」。故 D 正確。(註:題目以「健康促進」取向統括;定期健檢雖含早期診斷意涵，但本題歸為健康促進。)","options":{"A":"早期診斷是第三級(屬第二段預防)。","B":"特殊保護是第二級(如疫苗)。","C":"限制殘障是第四級。","D":"正確。注意營養、運動以預防糖尿病，屬第一級「促進健康」。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"109030-N5-49":{"quick":"成立守望相助隊加強社區安全＝華倫(Warren)社區功能的「社會控制」。","detail":{"background":"幸福里「成立守望相助隊、加強社區安全防護」——這是社區「「維持秩序、規範行為、保障安全」」，屬華倫(Warren)社區五大功能中的(C)『「社會控制(social control，維持社區的秩序、安全與規範)」』。生產-分配-消費是經濟功能;社會化是傳遞價值規範;相互支援是相互扶持。「守望相助、維護社區安
