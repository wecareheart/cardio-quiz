","exam_code":"112030","src":"民國112年","options":{"A":"泌乳激素(Prolactin)","B":"人類胎盤泌乳激素(human Placental Lactogen, hPL)","C":"人類絨毛膜促性腺激素(human Chorionic Gonadotropin, hCG)","D":"促腎上腺皮質素(Andrenocorticotropic hormone, ACTH)"},"img":""},{"id":"112180-N4-25","code":"112180","roc":"112","cat":"N4","catname":"產兒科護理學","num":25,"stem":"王女士懷孕12 週時產檢血清檢查確診梅毒感染,其掩面哭泣表示:「不知道為什麼自己會得到梅毒,是否 要告訴先生?」,下列護理指導,何者不適當?","opts":{"A":"詢問王女士性生活史以瞭解是否具多重性伴侶","B":"衛教梅毒主要傳染途徑為性行為,夫妻均需接受檢查與治療才能避免反覆交互感染","C":"衛教Penicillin 可以治療梅毒的感染,請王女士配合治療","D":"說明梅毒在懷孕初期不會傳染給胎兒,可等懷孕18 週再做產檢抽血確定"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"9妊娠合併症與孕期感染篩檢","topic_num":"正常妊娠生理與產前照護","topic_code":"O2-9","q_num":25,"roc_year":"112","exam_code":"112180","src":"民國112年","options":{"A":"詢問王女士性生活史以瞭解是否具多重性伴侶","B":"衛教梅毒主要傳染途徑為性行為,夫妻均需接受檢查與治療才能避免反覆交互感染","C":"衛教Penicillin 可以治療梅毒的感染,請王女士配合治療","D":"說明梅毒在懷孕初期不會傳染給胎兒,可等懷孕18 週再做產檢抽血確定"},"img":""}],E={"101030-N4-25":{"quick":"生產前填同意書、解說注意事項,是保障產婦的「知曉同意權(知情同意)」。","detail":{"background":"醫療倫理四原則:自主(autonomy)、行善、不傷害、正義。其中「知情同意(informed consent)」源自尊重自主原則——醫護需以病人能理解的方式說明處置目的、過程、風險、替代方案與預後,經其同意並簽署同意書,病人有「知曉並同意/拒絕」的權利。生產前簽手術/生產同意書並解說即在落實此「知曉同意權」。隱私權保護個資、正義關公平資源、不傷害是避免造成傷害,皆非本題情境。","options":{"A":"隱私權是保護個人資料與身體隱私,非簽同意書情境。","B":"正確。簽同意書並解說=知情同意(知曉同意權)。","C":"公平正義權關乎資源公平分配,非此情境。","D":"不傷害權指避免造成傷害,非此情境。"},"sources":["醫療倫理 知情同意","新文京《產科護理學》護理倫理"]}},"101110-N4-41":{"quick":"總生育率=每千位婦女自15歲依當年年齡別生育率,至滿50歲前合計生育的子女數。","detail":{"background":"總生育率(total fertility rate, TFR)是假設一群(每千位)婦女自15歲開始,按當年各年齡別生育率,到滿50歲(育齡結束)前,平均一生會生育的子女數,用以衡量人口生育水準與更替(更替水準約2.1)。台灣以TFR作為生育水準標準,近年偏低(少子化)。粗出生率=每千人口活產數;一般生育率=每千育齡婦女活產數;年齡別生育率=各年齡層每千婦女活產數。本題定義為選項A。","options":{"A":"正確。每千婦女15歲起依年齡別生育率至50歲前合計生育子女數。","B":"起訖年齡(16–48)錯誤。","C":"每萬位、18–51歲錯誤。","D":"每萬位、20–55歲錯誤。"},"sources":["人口統計 總生育率","國健署 生育統計"]}},"102030-N4-1":{"quick":"孕產婦死亡率以「懷孕期間或懷孕終止後42天內」之婦女死亡計算。","detail":{"background":"孕產婦死亡(maternal death)定義:婦女在懷孕期間或懷孕終止後「42天內」,因與懷孕或其處置有關(非意外)的原因死亡。孕產婦死亡率(MMR)=一年內每十萬名活產中的孕產婦死亡數。此42天的時限為WHO標準,用以涵蓋產褥期相關死亡。本題時限為42天(選項C)。","options":{"A":"20天錯誤。","B":"28天錯誤。","C":"正確。懷孕或懷孕終止後42天內。","D":"56天錯誤。"},"sources":["WHO 孕產婦死亡定義","國健署 婦幼統計"]}},"102110-N4-2":{"quick":"孕產婦死亡率(MMR)=一年內每十萬名活產中,懷孕期間或懷孕中止42天內之婦女死亡數。","detail":{"background":"MMR的分母為「活產數(以十萬為單位)」、分子為懷孕期間或懷孕中止「42天內」的孕產婦死亡數。此指標反映一國孕產照護品質與母嬰健康水準,愈低代表照護愈佳。本題正確定義為「一年內十萬名活產中,懷孕或中止42天內死亡數」(選項A)。其餘選項在分母單位(萬/千)或時限(30天)有誤。","options":{"A":"正確。十萬活產、42天內。","B":"一萬活產、30天錯誤。","C":"千名活產錯誤。","D":"30天錯誤。"},"sources":["WHO MMR 定義","國健署 婦幼統計"]}},"106111-N4-3":{"quick":"護理師「直接」協助無法下床的產婦如廁,扮演的是「照顧者」角色。","detail":{"background":"護理角色多元:照顧者(直接提供身體照護如協助如廁、沐浴、給藥)、教育者(衛教指導)、諮詢者(提供資訊與情緒支持協助決策)、協調/管理者(協調照護資源)、代言者(維護病人權益)、研究者。題目「直接協助無法下床的產婦如廁」屬「直接護理」,為照顧者角色。","options":{"A":"正確。直接協助如廁=照顧者(直接護理)。","B":"諮詢者提供資訊/情緒支持,非直接照護。","C":"教育者著重衛教指導。","D":"管理者著重協調資源。"},"sources":["新文京《護理學導論》護理角色","產科護理角色"]}},"107030-N4-56":{"quick":"降低法定結婚年齡無助於「提升出生率、降低嬰兒死亡率」。","detail":{"background":"提升出生率的措施:改善托育與育兒補助、提升孕產期醫療照護品質、友善職場與婚育政策;降低嬰兒死亡率則靠分析嬰兒死因與死亡率、加強周產期與新生兒照護、預防接種等。降低「法定結婚年齡」並不會提升生育意願或降低嬰兒死亡(影響生育的是經濟、托育、價值觀而非可結婚年齡下限),故為「無助」者。本題答案A。","options":{"A":"正確(無助)。降低法定結婚年齡無助提升出生率或降嬰兒死亡率。","B":"有助。分析嬰兒死因以降低死亡率。","C":"有助。提升孕產期照護品質。","D":"有助。優質托育與補助提升生育意願。"},"sources":["國健署 少子化對策","婦幼衛生政策"]}},"107110-N4-2":{"quick":"台灣家庭結構改變敘述中「雙薪增加而提升生育率」為錯誤——實際生育率反而下降。","detail":{"background":"台灣家庭結構變遷:晚婚晚育使高齡產婦增加;女性兼顧家庭與職場的衝突使適婚/生育年齡延後;離婚率上升使單親家庭增加,衝擊家庭結構與性別角色。雖然雙薪家庭增加、經濟提升,但因育兒成本、托育不足與價值觀改變,台灣生育率「不升反降」(少子化),故「雙薪家庭增加及經濟提升因而提升生育率」為錯誤敘述(選項C)。","options":{"A":"正確敘述。晚婚晚育致高齡產婦增加。","B":"正確敘述。家庭職場衝突延後適婚年齡。","C":"錯誤(本題答案)。雙薪與經濟提升並未提升台灣生育率,反而下降。","D":"正確敘述。離婚致單親家庭增加。"},"sources":["國健署 人口與家庭","人口統計趨勢"]}},"111110-N4-3":{"quick":"周產期死亡率=妊娠28週以上死胎數+出生1週內嬰兒死亡數,除以一年活產數×1000。","detail":{"background":"周產期死亡率(perinatal mortality rate)反映周產期照護品質:分子為「妊娠28週以上(含)的死胎數」加上「出生後1週(7天)內的早期新生兒死亡數」,分母為一年活產數,乘以1000。涵蓋產前後期至出生第一週,是評估孕產與新生兒照護的重要指標。本題正確定義為選項B(28週、含出生1週內嬰兒死亡)。","options":{"A":"起算20週錯誤(應28週)。","B":"正確。28週以上死胎+出生1週內嬰兒死亡÷活產×1000。","C":"僅算死胎、漏早期新生兒死亡。","D":"起算24週錯誤。"},"sources":["WHO 周產期死亡定義","國健署 婦幼統計"]}},"113030-N4-1":{"quick":"孕產婦死亡率=一年內每十萬名活產中,懷孕期間或懷孕終止後42天內之婦女死亡數。","detail":{"background":"再次確認MMR定義:分母十萬活產、時限「懷孕期間或懷孕終止後42天內」、因與懷孕或其處置相關原因死亡(排除意外傷害)。此為WHO標準。本題正確為選項A。其餘選項時限(7天、30天、24小時)或起算(第三孕期)皆誤。","options":{"A":"正確。十萬活產、懷孕或終止42天內。","B":"7天、第三孕期起算錯誤。","C":"30天錯誤。","D":"24小時錯誤。"},"sources":["WHO MMR","國健署 婦幼統計"]}},"114030-N4-1":{"quick":"婦嬰生命統計敘述中,「開發中國家粗出生率往往較低」為錯誤——開發中國家粗出生率較「高」。","detail":{"background":"婦嬰生命統計:粗出生率=一年內每千人口的活產數;總生育率=每位(以每千育齡婦女計)育齡婦女合計生育子女數,台灣以TFR為生育水準標準。開發中國家因經濟、教育、避孕普及度等因素,粗出生率與生育率「往往較高」,已開發國家則較低。故「開發中國家粗出生率往往較低」為錯誤敘述(選項D)。","options":{"A":"正確。粗出生率=每千人口平均活產數。","B":"正確。總生育率以育齡婦女合計生育子女數計。","C":"正確。台灣以總生育率衡量生育水準。","D":"錯誤(本題答案)。開發中國家粗出生率往往較「高」。"},"sources":["人口統計 指標","國健署"]}},"114100-N4-1":{"quick":"總生育率最能反映當代育齡婦女的平均生育力。","detail":{"background":"衡量生育水準的指標中,「總生育率(TFR)」綜合各年齡別生育率,代表一位育齡婦女一生平均生育子女數,最能反映「當代育齡婦女的平均生育力」與人口更替趨勢。粗出生率受人口年齡結構影響、未針對育齡婦女;周產期/孕產婦相關率是死亡指標,非生育力。本題答案為總生育率(B)。","options":{"A":"粗出生率受年齡結構影響,非最能反映育齡婦女生育力。","B":"正確。總生育率最能反映育齡婦女平均生育力。","C":"周產期相關為死亡指標,非生育力。","D":"孕產婦相關為死亡指標,非生育力。"},"sources":["人口統計 TFR","國健署"]}},"114170-N4-1":{"quick":"少子化政策中「育兒父母必須輪流申請育嬰留職停薪」最不適當(現制可由一方申請、亦可同時)。","detail":{"background":"因應少子化的友善生育政策:擴大不孕症(試管嬰兒)補助、提高產檢補助次數與項目、發放育兒津貼(如未滿2歲)、增設平價托育、彈性育嬰留職停薪等。育嬰留職停薪「並非必須由父母輪流申請」——可由父母其中一方申請,新制亦放寬可同時申請,規定「必須輪流」反而限制彈性、不利使用,故為最不適當(選項A)。","options":{"A":"最不適當(本題答案)。育嬰留停不必「必須輪流」,可一方申請或同時申請。","B":"適當。擴大試管嬰兒補助。","C":"適當。提高產檢補助次數與項目。","D":"適當。推動育兒津貼。"},"sources":["性別工作平等法 育嬰留停","國健署 少子化對策"]}},"114170-N4-2":{"quick":"照護新住民婦女應在不與產科照護原則衝突下,尊重其文化習俗。","detail":{"background":"文化照護(culturally competent care):照護新住民、不同族群孕產婦時,應以文化敏感度為原則——在「不違背醫療安全與產科照護原則」的前提下,尊重並融入其文化習俗、飲食與信仰,提供雙向溝通(必要時通譯),以個案為中心而非單以醫師醫囑、配偶意見或本國方式強加。本題最適當為選項B。","options":{"A":"不宜僅以醫囑為主、忽略文化與個案參與。","B":"正確。不衝突照護原則下尊重新住民文化習俗。","C":"不宜強加本國照護方式。","D":"不宜以配偶意見為主而忽略產婦本人。"},"sources":["跨文化護理","新文京《產科護理學》多元文化照護"]}},"101110-N4-70":{"quick":"IgG是唯一能通過胎盤、於妊娠第三期使胎兒獲得被動免疫的免疫球蛋白。","detail":{"background":"母體免疫球蛋白與胎兒:五類Ig中,僅「IgG」分子可主動運輸通過胎盤(尤妊娠第三期大量),提供胎兒出生後數月的被動免疫(對抗母親曾接觸的病原)。IgM分子大不過胎盤(臍血IgM升高提示子宮內感染);IgA經母乳(初乳)提供腸道黏膜保護;IgE與過敏相關。本題答案為IgG。","options":{"A":"IgA經母乳供黏膜免疫,不過胎盤。","B":"IgE與過敏相關,不過胎盤。","C":"正確。IgG可過胎盤提供胎兒被動免疫。","D":"IgM分子大,不過胎盤。"},"sources":["免疫學 母體抗體傳遞","新文京《產科護理學》胎兒免疫"]}},"102110-N4-4":{"quick":"受精後2~3週的早期胚胎主要由「卵黃囊」提供養分(胎盤循環約自妊娠後期才完整)。","detail":{"background":"胚胎早期營養來源:受精後最初數週,胎盤循環尚未建立,胚胎依賴「卵黃囊(yolk sac)」提供養分並進行早期造血;卵黃囊也是早期生殖細胞與血球來源。隨著絨毛膜絨毛與胎盤循環逐漸建立(約第3週起發展、約12週後胎盤功能成熟),養分供應轉由胎盤負責。本題受精後2~3週由卵黃囊供養分(選項D)。","options":{"A":"胎盤循環較晚才完整,非2–3週主要來源。","B":"尿囊非主要供養分構造。","C":"絨毛膜絨毛逐漸發展,但2–3週主要靠卵黃囊。","D":"正確。早期由卵黃囊提供養分與造血。"},"sources":["胚胎學 早期營養","新文京《產科護理學》胚胎發育"]}},"103100-N4-53":{"quick":"唯一可由母親製造、經胎盤傳給胎兒的抗體為IgG。","detail":{"background":"胎兒的被動免疫主要來自母體IgG經胎盤主動運輸(妊娠後期大量),於出生後提供數月保護,故新生兒對母親免疫過的疾病有暫時抵抗力。IgM分子大無法過胎盤(臍血IgM↑提示先天感染);IgA經初乳/母乳供腸道黏膜免疫;IgE與過敏有關。本題答案為IgG。","options":{"A":"IgA經母乳,不過胎盤。","B":"IgE與過敏相關,不過胎盤。","C":"正確。IgG可經胎盤傳給胎兒。","D":"IgM不過胎盤。"},"sources":["免疫學 母體抗體","新文京《產科護理學》"]}},"104100-N4-8":{"quick":"卵磷脂(lecithin/surfactant)是肺泡表面的「抗擴張不全(抗塌陷)」因子;L/S≧2才表示肺成熟。","detail":{"background":"胎兒呼吸系統發育:氣管支氣管始於約妊娠4–5週(非24週);肺泡與表面張力素(surfactant,主成分卵磷脂lecithin)約24週開始分泌、34–36週後趨成熟。表面張力素可降低肺泡表面張力、防止呼氣末肺泡塌陷,故為「抗擴張不全(抗肺泡塌陷)因子」,不足則發生新生兒呼吸窘迫症候群(RDS)。羊水「卵磷脂/抱合髓磷脂比值(L/S ratio)≧2」表示肺部成熟。最早發育的系統是心血管/神經系統,非呼吸系統。本題正確為B。","options":{"A":"錯。最早發育為心血管/神經系統,非呼吸系統。","B":"正確。卵磷脂為抗肺泡塌陷(抗擴張不全)因子。","C":"錯。L/S≧2(非≧1)才表示肺成熟。","D":"錯。氣管支氣管始於約4–5週,非24週。"},"sources":["胚胎學 肺發育/surfactant","新文京《產科護理學》"]}},"105030-N4-10":{"quick":"子宮內膜受雌激素與黃體素影響(1);懷孕後內膜發育為底蛻膜、包蛻膜及真蛻膜(2)。","detail":{"background":"子宮內膜與蛻膜:月經週期內膜受雌激素(增生期)與黃體素(分泌期)調控。受孕著床後,子宮內膜轉化為「蛻膜(decidua)」,依與胚囊關係分為:底蛻膜(decidua basalis,位胚胎著床下方,將形成胎盤母體面)、包蛻膜(decidua capsularis,包覆胚囊)、真/壁蛻膜(decidua vera/parietalis,其餘內膜)。受精卵著床於「功能層內膜(後成蛻膜)」,非「真蛻膜」;著床後的內膜稱蛻膜,非「絨毛膜」(絨毛膜來自滋養層)。故正確為(1)(2)組合(選項B)。","options":{"A":"含敘述3(著床於真蛻膜)錯誤。","B":"正確。(1)內膜受雌黃影響+(2)發育為底/包/真蛻膜。","C":"含敘述4(著床後內膜稱絨毛膜)錯誤。","D":"含敘述4錯誤。"},"sources":["胚胎學 蛻膜","新文京《產科護理學》著床"]}},"105090-N4-7":{"quick":"卵子形成始於胎兒期——女性在胎兒時期就已形成卵原細胞(oogonia)。","detail":{"background":"卵子形成(oogenesis):女性在「胎兒時期」卵原細胞(oogonia)即已大量增殖並進入第一次減數分裂,停滯於前期(初級卵母細胞),出生時數目固定且逐漸減少;青春期後每月一顆於排卵前完成第一次減數分裂(產生次級卵母細胞+第一極體),第二次減數分裂則在「受精時」才完成(產生卵+第二極體)。整個過程一個初級卵母細胞最終形成「一個卵+三個極體」。本題正確為「胎兒期即有卵原細胞形成」(A)。","options":{"A":"正確。女性胎兒時期已形成卵原細胞。","B":"錯。第一次減數分裂在排卵前完成,第二次在受精時。","C":"錯。減數分裂為兩次(非一次有絲+一次減數)。","D":"錯。最終為一個卵與三個極體。"},"sources":["生殖生理 卵子形成","新文京《產科護理學》"]}},"105090-N4-8":{"quick":"受精卵以「囊胚(blastocyst)」型態植入子宮內膜完成著床。","detail":{"background":"受精與著床:受精發生於輸卵管壺腹部,受精卵邊分裂邊往子宮移動,歷經桑椹胚(morula)→囊胚(blastocyst);受精後約第6–7天,「囊胚」以其滋養層附著並植入子宮內膜(著床,implantation),約第10–12天完成。胎盤循環於著床後逐漸建立(非第6週才開始才稱胎兒);胚胎於受精後第3週為三胚層(非雙板);4週胚胎約0.4–0.5公分(非3公分)。本題正確為「囊胚著床」(D)。","options":{"A":"錯。胎盤循環逐漸建立,胚胎期至第8週末才轉稱胎兒。","B":"錯。第3週為三胚層(外/中/內胚層)。","C":"錯。4週胚胎僅約數毫米,非3公分。","D":"正確。受精卵以囊胚型態著床。"},"sources":["胚胎學 著床","新文京《產科護理學》"]}},"106030-N4-8":{"quick":"胎兒呼吸系統:受孕約15~17週已有氣管及支氣管形成。","detail":{"background":"肺發育分期:胚胎期(約4–7週,喉氣管溝、主支氣管)、偽腺期(約5–17週,支氣管樹分支完成,氣管支氣管於此期形成)、小管期(約16–26週,呼吸性細支氣管與肺泡管、開始有表面張力素)、囊泡期/肺泡期(約24週後至出生後,肺泡形成成熟)。故「氣管及支氣管於受孕約15–17週前已形成」正確(A)。L/S<1表示未成熟(≧2才成熟);肺泡管發育約16週起(非第7個月);胎兒在子宮內肺臟充滿液體、不具呼吸功能(僅有呼吸樣運動)。","options":{"A":"正確。約15–17週氣管支氣管已形成。","B":"錯。肺泡管發育約16週起,非第7個月。","C":"錯。L/S<1表示未成熟。","D":"錯。胎兒肺充滿液體,出生前不具真正呼吸功能。"},"sources":["胚胎學 肺發育分期","新文京《產科護理學》"]}},"106110-N4-6":{"quick":"細胞分裂最繁忙快速、最易受畸胎原影響的時期是胚胎期(受精後約3~8週)。","detail":{"background":"發育關鍵期:胚胎期(受精後約3–8週)是各器官系統快速分化形成的時期,細胞分裂最旺盛,也是「最易受畸胎原(藥物、感染、輻射)影響而致先天畸形」的關鍵期(非12–16週);過了器官形成期(胎兒期)致畸風險下降。胎兒愈成熟皮下脂肪增多但「胎毛(lanugo)反而漸減」;吞嚥與胎便形成約在妊娠中期(約16週起)。本題正確為「細胞分裂最快為胚胎期」(A)。","options":{"A":"正確。胚胎期細胞分裂最快、器官形成。","B":"錯。最易致畸期為胚胎期(3–8週),非12–16週。","C":"錯。胎兒愈成熟胎毛漸減。","D":"錯。吞嚥/胎便約妊娠中期出現。"},"sources":["胚胎學 致畸關鍵期","新文京《產科護理學》"]}},"108020-N4-6":{"quick":"絨毛膜(chorion)由囊胚的滋養層(trophoblast)細胞發育而來。","detail":{"background":"胚胎附屬器:囊胚外層「滋養層(trophoblast)」發育為絨毛膜(chorion)並形成絨毛、胎盤胎兒面與分泌hCG;內細胞團發育為胚胎本體與羊膜。羊膜(amnion)是胚胎膜「最內層」(非最外層);羊水偏鹼(pH約7.0–7.5),含胎兒尿液、脫落細胞;羊水量隨週數增加,約34週達高峰後略減(非40週最高)。本題正確為「絨毛膜由囊胚滋養層發育」(A)。","options":{"A":"正確。絨毛膜由囊胚滋養層發育而來。","B":"錯。羊膜是胚胎膜最內層。","C":"錯。羊水偏鹼性,非弱酸。","D":"錯。羊水量約34週達高峰,非40週。"},"sources":["胚胎學 附屬器","新文京《產科護理學》"]}},"109030-N4-5":{"quick":"胎兒發育敘述中「16週眼睛可感受外界光線」錯誤——感光約在26~28週才出現。","detail":{"background":"胎兒發育里程碑:約第3–4週開始有心臟搏動;第8週末(胚胎期結束)所有主要器官原基已形成;眼睛對光線的感受約在「26–28週」(視網膜與視神經較成熟)才出現,非16週;約20週起有規律睡眠/活動週期、可聽到聲音。本題問「錯誤」者為「16週眼睛可感受光線」(C)。","options":{"A":"正確。約第4週開始有心跳。","B":"正確。第8週末所有主要器官已形成。","C":"錯誤(本題答案)。感光約26–28週,非16週。","D":"正確。約20週有規律睡眠與活動。"},"sources":["胚胎學 胎兒發育里程碑","新文京《產科護理學》"]}},"109110-N4-10":{"quick":"胎兒體重快速增加的時期為第三孕期。","detail":{"background":"胎兒生長:第一孕期以器官分化(器官形成)為主、體型小;第二孕期器官成熟與身長增加;「第三孕期(約28週後)」皮下脂肪堆積、體重快速增加(尤其最後數週),是體重增加最快的時期。故早產兒體重輕、皮下脂肪少、體溫調節差。本題答案為第三孕期(D)。","options":{"A":"胚胎前期以細胞分裂分化為主,體重小。","B":"第一孕期體重增加少。","C":"第二孕期身長增加,但體重快速增加在第三孕期。","D":"正確。第三孕期體重快速增加。"},"sources":["胚胎學 胎兒生長","新文京《產科護理學》"]}},"110030-N4-39":{"quick":"體外受精-胚胎植入(IVF-ET)通常於受精卵分裂至2~8個細胞(卵裂期)時植入子宮。","detail":{"background":"IVF-ET流程:誘導排卵→取卵→體外受精(IVF或ICSI)→胚胎培養→植入子宮。傳統於受精後第2–3天「卵裂期(約2–8個細胞)」植入;現多可培養至第5天「囊胚期(blastocyst)」再植入以提高著床率。本題以「2–8個細胞」為答案(A)。植入後給黃體素支持黃體期、約植入後10–14天驗孕。","options":{"A":"正確。2–8個細胞(卵裂期)可植入。","B":"10–16細胞非典型植入時點描述。","C":"18–32細胞過多。","D":"36–48細胞過多。"},"sources":["生殖醫學 IVF-ET","新文京《產科護理學》人工生殖"]}},"112030-N4-3":{"quick":"黃體退化後,由胎盤接替分泌雌激素與黃體素以維持妊娠。","detail":{"background":"妊娠荷爾蒙來源轉換:受孕後黃體(corpus luteum)分泌雌激素與黃體素維持早期妊娠;約妊娠8–11週後,胎盤逐漸發育成熟並「接替黃體」分泌雌激素、黃體素(及hPL等),黃體隨之退化。羊膜是胚胎膜最內層;著床部位通常在子宮體上部後壁(非子宮頸內口,著床於子宮頸口為前置胎盤/異常);受精後早期由卵黃囊供養分(非2–3週由胎盤)。本題正確為「黃體退化後胎盤分泌雌黃」(D)。","options":{"A":"錯。羊膜為最內層;與基底蛻膜形成胎盤的是絨毛膜絨毛。","B":"錯。正常著床於子宮體,非子宮頸內口。","C":"錯。受精後早期由卵黃囊供養分。","D":"正確。黃體退化後由胎盤分泌雌激素與黃體素。"},"sources":["胚胎學 胎盤內分泌","新文京《產科護理學》"]}},"112110-N4-38":{"quick":"人工授精(IUI/AIH)適應症「不」包括輸卵管阻塞——輸卵管阻塞須行試管嬰兒(IVF)。","detail":{"background":"人工授精(intrauterine insemination, IUI/AIH)是將處理後的精子直接注入子宮腔,適應症:輕度男性因素(精子稀少/活動力略差)、精子無法穿透子宮頸黏液(子宮頸因素)、不明原因不孕、需使用捐贈精子者;前提是「輸卵管須通暢」(精卵仍在輸卵管自然受精)。故「輸卵管阻塞」非IUI適應症——須改行IVF-ET(體外受精不需經輸卵管)。本題問「錯誤」者為輸卵管阻塞(D)。","options":{"A":"是適應症。精子無法穿透子宮黏液(子宮頸因素)。","B":"是適應症。精子稀少者。","C":"是適應症。需接受捐精者。","D":"錯誤(本題答案)。輸卵管阻塞須IVF,非人工授精適應症。"},"sources":["生殖醫學 IUI 適應症","新文京《產科護理學》"]}},"112180-N4-24":{"quick":"人工授精可使用新鮮精液,或將冷凍精液解凍後使用。","detail":{"background":"人工授精(IUI)操作:採集精液(手淫法、禁慾2–7天)後經洗滌處理,於排卵期將活動精子注入子宮腔;精液可為「新鮮」或「冷凍保存後解凍」使用(捐精多為冷凍檢疫後解凍)。注入後平躺約10–30分鐘即可(不需12小時);驗孕約於注入後約2週(月經過期/約14天)較準,非第7天;禁慾2–7天(非僅1天)。本題正確為「以新鮮或冷凍解凍精液使用」(B)。","options":{"A":"錯。禁慾約2–7天,非1天。","B":"正確。可用新鮮或冷凍解凍後的精液。","C":"錯。注入後平躺約10–30分鐘即可,非12小時。","D":"錯。驗孕約2週後較準,非第7天。"},"sources":["生殖醫學 IUI","新文京《產科護理學》"]}},"114100-N4-3":{"quick":"胎兒「第一個有功能的器官」是心臟。","detail":{"background":"胎兒器官功能發育:心臟是最早具功能的器官——約妊娠第3週末–第4週,原始心管開始搏動、建立血液循環,以供應快速生長的胚胎養分與氧氣(超音波約6週可見胎心搏動)。肺臟出生後才行氣體交換、腎臟與其他器官功能較晚成熟。本題答案為心臟(A)。","options":{"A":"正確。心臟是胎兒第一個有功能的器官(約第4週搏動)。","B":"肺臟出生後才有呼吸功能。","C":"腎臟功能較晚成熟。","D":"脾臟非最早具功能器官。"},"sources":["胚胎學 心臟發育","新文京《產科護理學》"]}},"114100-N4-5":{"quick":"胎兒約懷孕第12週外生殖器官可清楚分辨性別。","detail":{"background":"胎兒生長要點:外生殖器約在第12週(部分教材12–14週)分化完成、超音波可較清楚辨識性別。胎血循環的三個分流(靜脈導管ductus venosus、卵圓孔foramen ovale、動脈導管ductus arteriosus)使血液「避開肝臟與肺臟」(靜脈導管繞過肝、卵圓孔與動脈導管繞過肺),非避開腎臟;胎兒可自製的免疫球蛋白主要是IgM(子宮內感染時升高),但B選項為本題正解;表面張力素約24週起分泌(非34週才開始)。本題正確為「第12週可分辨性別」(B)。","options":{"A":"錯。三個分流使血液避開肝與肺,非腎臟。","B":"正確。約第12週外生殖器可分辨性別。","C":"IgM雖為胎兒主要自製Ig,但本題以B為正解(此選項非答案)。","D":"錯。表面張力素約24週起分泌,非34週才開始。"},"sources":["胚胎學 性別分化/胎血循環","新文京《產科護理學》"]}},"101030-N4-29":{"quick":"懷孕腎血流與腎絲球過濾率(GFR)增加,使藥物較易被排泄。","detail":{"background":"妊娠期母體生理影響藥物動力學:(1)腎臟——血流與GFR增加約40–50%,使經腎排泄的藥物清除加快、可能需調整劑量;(2)腸胃——黃體素使胃排空與腸蠕動「減慢」,藥物吸收延遲(非加速);(3)肝臟——某些代謝酵素活性「增加」,部分藥物代謝加快;(4)血漿白蛋白「降低」(血液稀釋),使蛋白結合型減少、游離型藥物增加。本題正確為「腎血流與GFR增加,藥物易被排泄」(B)。","options":{"A":"錯。胃排空與腸蠕動減慢,藥物吸收延遲而非率減緩的因果相反。","B":"正確。腎血流與GFR增加,藥物較易排泄。","C":"錯。部分肝代謝酵素活性增加。","D":"錯。血漿白蛋白降低,游離藥物增加。"},"sources":["新文京《產科護理學》妊娠生理","藥理 妊娠期藥物動力學"]}},"101110-N4-43":{"quick":"「監測到胎心率」屬懷孕的確實(陽性)徵候。","detail":{"background":"懷孕徵候分三類:推測徵候(主觀,如停經、噁心、頻尿、乳房脹)、可能徵候(客觀但非確診,如Hegar/Goodell/Chadwick徵象、妊娠試驗陽性、Braxton Hicks假性宮縮、腹部增大、妊娠紋褐斑)、確實/陽性徵候(可確診懷孕:聽/監測到胎心音、檢查者觸到胎動或胎兒外形、超音波見胎兒/胎心)。Braxton Hicks、妊娠紋褐斑屬可能徵候;孕婦自覺胎動屬推測。本題確實徵候為「監測到胎心率」(C)。","options":{"A":"Braxton Hicks為可能徵候。","B":"妊娠紋褐斑為可能徵候。","C":"正確。監測到胎心率為確實徵候。","D":"孕婦自覺胎動為推測徵候(他人觸到才屬確實)。"},"sources":["新文京《產科護理學》懷孕徵候","產科診斷"]}},"101110-N4-74":{"quick":"母體心臟負荷量最大的時間為「產後初期」——子宮收縮使大量回心血量增加。","detail":{"background":"妊娠至產後心血管負荷:孕期血容量增加約40–50%、心輸出量於妊娠中期(約20–32週)達高峰;但「心臟負荷最大」常在「產後即刻(產後初期)」——胎兒娩出後子宮迅速收縮、子宮胎盤循環的血液回流體循環,加上下腔靜脈受壓解除,使回心血量驟增、心輸出量短暫升高,故心臟病產婦在產後初期最易發生心衰竭/肺水腫,需密切監測。本題答案為產後初期(D)。","options":{"A":"懷孕初期周邊阻力下降但負荷尚未最大。","B":"妊娠20–32週心搏出量高峰,但非負荷最大時。","C":"妊娠36週子宮壓迫非負荷最大主因。","D":"正確。產後初期回心血量驟增,心臟負荷最大。"},"sources":["新文京《產科護理學》妊娠心血管變化","心臟病孕婦照護"]}},"102030-N4-3":{"quick":"孕期「腸胃脹氣」與黃體素(使腸蠕動變慢)有關,而非動情激素(雌激素)。","detail":{"background":"孕期不適與荷爾蒙:動情激素(雌激素)增加→鼻黏膜充血(流鼻血、鼻塞)、白帶增多、唾液分泌增加(流涎症ptyalism);黃體素(progesterone)→鬆弛平滑肌使腸蠕動變慢(脹氣、便秘)、胃賁門括約肌鬆弛(心灼熱)、輸尿管鬆弛。本題問「與動情激素增加無關」者為「腸胃脹氣」(屬黃體素作用)(B)。","options":{"A":"流鼻血與動情激素(鼻黏膜充血)有關。","B":"正確(無關動情激素)。脹氣為黃體素使腸蠕動變慢所致。","C":"白帶與動情激素有關。","D":"流涎症與動情激素有關。"},"sources":["新文京《產科護理學》孕期不適","妊娠生理"]}},"102030-N4-6":{"quick":"受孕後子宮頸變化為Goodell徵象(子宮頸軟化)與Chadwick徵象(藍紫色),即(3)(4)。","detail":{"background":"妊娠生殖道軟化/充血徵象:Goodell徵象(古德爾,子宮頸軟化,約6–8週)、Chadwick徵象(查德威克,陰道與子宮頸呈藍紫色,血管充血)屬「子宮頸」的可能徵候;Hegar徵象(海格爾,子宮峽部變軟)與Ladin徵象(拉頂,子宮體前壁中線變軟)則是「子宮體/峽部」的變化。本題問「子宮頸」變化,為Goodell(3)+Chadwick(4)組合(選項C)。","options":{"A":"(1)Ladin+(2)Hegar屬子宮體/峽部,非子宮頸。","B":"含Hegar(子宮峽部)。","C":"正確。Goodell(3)+Chadwick(4)為子宮頸變化。","D":"含Ladin(子宮體)。"},"sources":["新文京《產科護理學》妊娠徵象","產科診斷"]}},"103030-N4-25":{"quick":"黃體素最初由卵巢分泌、妊娠8週後由胎盤製造,可鬆弛平滑肌、防止子宮收縮引起的自發性流產。","detail":{"background":"黃體素(progesterone)在妊娠的關鍵作用:早期由卵巢黃體分泌,約8–11週後由胎盤接替製造;其作用是鬆弛子宮平滑肌、抑制宮縮以「維持妊娠、防止自發性流產」,並使內膜維持分泌(蛻膜)、乳腺發育、升高基礎體溫。雌激素促進子宮與乳腺生長、血管增生;hCG維持早期黃體;泌乳素促泌乳。本題符合「鬆弛平滑肌防自發流產」者為黃體素(B)。","options":{"A":"雌激素促子宮乳腺生長,非主要抑制宮縮。","B":"正確。黃體素鬆弛平滑肌、防自發性流產。","C":"泌乳素促泌乳,非抑制宮縮。","D":"hCG維持早期黃體,非直接鬆弛子宮。"},"sources":["新文京《產科護理學》妊娠荷爾蒙","生殖內分泌"]}},"103100-N4-6":{"quick":"陰道與子宮頸受雌激素影響呈藍紫色、黏膜變厚、骨盆腔充血,稱查德威克氏徵象(Chadwick sign)。","detail":{"background":"妊娠軟化/充血徵象辨識:Chadwick徵象(查德威克)——陰道、子宮頸因血管增生充血呈「藍紫色」、黏膜變厚;Goodell徵象(古德爾)——子宮頸「軟化」;Hegar徵象(海格爾)——子宮「峽部變軟」;Ladin徵象(拉頂)——子宮體前壁中線變軟。題述「藍紫色、黏膜變厚、骨盆腔充血」為Chadwick(B)。","options":{"A":"Goodell為子宮頸軟化。","B":"正確。藍紫色充血=Chadwick徵象。","C":"Hegar為子宮峽部變軟。","D":"Ladin為子宮體前壁變軟。"},"sources":["新文京《產科護理學》妊娠徵象","產科診斷"]}},"103100-N4-7":{"quick":"妊娠時子宮「厚度減少」——子宮肌纖維被動拉長變薄以容納胎兒。","detail":{"background":"妊娠子宮變化:子宮肌纖維因雌激素與機械牽張而「增長(變長)、增大(肥大)」,子宮體積與重量大增(由約60公克增至約1000公克),子宮壁(厚度)隨胎兒長大被「拉薄(厚度減少)」、子宮體變軟(非變硬)。本題正確為「厚度減少」(A)。其餘:子宮體變硬、肌纖維變短、重量不變皆錯誤。","options":{"A":"正確。子宮壁厚度減少(被拉薄)。","B":"錯。子宮體變軟,非變硬。","C":"錯。肌纖維變長,非變短。","D":"錯。子宮重量大增,非維持不變。"},"sources":["新文京《產科護理學》妊娠子宮變化","妊娠生理"]}},"106030-N4-4":{"quick":"懷孕「確實徵候」包括聽到胎心音、觸到胎兒四肢活動、超音波見妊娠囊、觸到胎兒外形輪廓。","detail":{"background":"確實(陽性)徵候——能客觀確認胎兒存在者:檢查者聽到/監測到胎心音、檢查者觸到胎動或胎兒肢體活動、觸到胎兒外形輪廓、超音波見妊娠囊/胎兒/胎心。月經未現屬推測徵候(主觀)。本題選項以「聽胎心音、觸胎兒四肢活動、超音波妊娠囊、觸胎兒外形」等確實徵候之組合為正解(B);月經未現非確實徵候。","options":{"A":"依組合判定;確實徵候不含主觀的月經未現。","B":"正確。聽胎心音/觸胎兒活動/超音波妊娠囊/觸胎兒外形皆為確實徵候。","C":"含月經未現(推測徵候),非全為確實徵候。","D":"含月經未現,錯誤。"},"sources":["新文京《產科護理學》懷孕徵候","產科診斷"]}},"106030-N4-5":{"quick":"妊娠腸胃平滑肌鬆弛使膽囊排空延遲、膽汁排出量減少(易膽汁鬱積、膽結石)。","detail":{"background":"妊娠黃體素使腸胃道平滑肌鬆弛的影響:胃排空延遲、賁門括約肌鬆弛(心灼熱)、腸蠕動變慢(脹氣、便秘);膽囊收縮減弱、排空延遲、膽汁鬱積,膽汁排出量減少、易形成膽固醇結石。胃酸分泌可能改變但非「減少」為主因;腸蠕動是「減慢」非加速;流涎症(唾液增多)與雌激素相關而非平滑肌鬆弛。本題正確為「膽汁排出量減少」(D)。","options":{"A":"胃酸變化非此題重點,且非單純減少。","B":"流涎與雌激素相關,非平滑肌鬆弛所致。","C":"錯。腸胃蠕動減慢,非加速。","D":"正確。膽囊排空延遲、膽汁排出減少。"},"sources":["新文京《產科護理學》妊娠腸胃變化","妊娠生理"]}},"106030-N4-6":{"quick":"妊娠時腎臟對葡萄糖的再吸收速率不變,但GFR增加致濾出葡萄糖增多,故易出現生理性糖尿。","detail":{"background":"妊娠泌尿系統:腎血漿流量與GFR增加約40–50%,使更多葡萄糖被濾入腎小管;但腎小管對葡萄糖的「再吸收速率(上限)維持不變」,當濾入量超過再吸收上限時,葡萄糖便出現於尿中(生理性糖尿glycosuria),故孕婦驗尿常見尿糖,須與妊娠糖尿病鑑別。BUN與肌酐因清除增加而「降低」(非升高)。本題正確為「腎對葡萄糖再吸收速率不變」(C)。","options":{"A":"錯。GFR增加使更多糖濾出,糖閾相對下降而非升高。","B":"錯。再吸收速率不變,非增加代償。","C":"正確。葡萄糖再吸收速率不變,GFR增致生理性糖尿。","D":"錯。GFR增加使BUN降低,非增加。"},"sources":["新文京《產科護理學》妊娠泌尿變化","妊娠生理"]}},"106030-N4-34":{"quick":"妊娠中期心灼熱感(heart burn)由黃體素鬆弛賁門(食道下)括約肌引起。","detail":{"background":"妊娠心灼熱(胃灼熱):黃體素鬆弛食道下端賁門括約肌,加上增大的子宮上推胃部,使胃酸逆流入食道而灼熱,妊娠中後期常見。處置:少量多餐、避免油膩辛辣與飯後平躺、餐後勿立即躺下、抬高床頭、必要時制酸劑。hCG與孕吐相關、hPL與母體胰島素阻抗/糖代謝相關、雌激素與鼻充血白帶相關。本題答案為黃體素(C)。","options":{"A":"hCG與孕吐相關,非心灼熱。","B":"hPL與糖代謝相關。","C":"正確。黃體素鬆弛賁門括約肌致心灼熱。","D":"雌激素與鼻充血/白帶相關。"},"sources":["新文京《產科護理學》孕期不適","妊娠生理"]}},"106110-N4-36":{"quick":"子宮移位敘述中「最常見為前傾」錯誤——子宮移位最常見的異常是「後傾(retroversion)」。","detail":{"background":"子宮位置與移位:正常子宮多呈「前傾前屈」。病理性「子宮移位」最常見為「後傾(retroversion)/後屈」,可因骨盆支持結構鬆弛、沾黏或先天造成;後傾子宮可能與受孕較困難、經痛、頻尿/便意相關,常鼓勵採「膝胸臥式」協助子宮回復前傾位。本題問「錯誤」者為「最常見為前傾」(A)——前傾是正常位置,移位最常見為後傾。","options":{"A":"錯誤(本題答案)。子宮移位最常見為後傾,前傾為正常位置。","B":"正確。可因骨盆支持結構無力所致。","C":"正確。鼓勵採膝胸臥式協助回位。","D":"正確。後傾子宮較不易受孕。"},"sources":["新文京《產科護理學》子宮移位","婦科"]}},"106111-N4-11":{"quick":"懷孕約11週後,分泌雌激素與黃體素的主要來源轉為胎盤。","detail":{"background":"妊娠荷爾蒙來源:早期由卵巢黃體分泌雌激素與黃體素;隨胎盤發育,約妊娠「8–11週後」胎盤成為主要來源(黃體-胎盤轉換),分泌雌激素、黃體素及hPL等以維持妊娠。本題答案為胎盤(A)。腦下垂體後葉分泌催產素/抗利尿素、腎上腺皮質分泌皮質醇/醛固酮,皆非孕期雌黃主要來源。","options":{"A":"正確。約11週後雌激素與黃體素主要由胎盤分泌。","B":"黃體為早期來源,後由胎盤接替。","C":"腦下垂體後葉分泌催產素/ADH,非雌黃。","D":"腎上腺皮質非雌黃主要來源。"},"sources":["新文京《產科護理學》胎盤內分泌","妊娠生理"]}},"107030-N4-4":{"quick":"孕期「陰道分泌物由白色轉為黃綠色」為異常(提示感染),其餘為正常生理變化。","detail":{"background":"孕期常見「正常」生理變化:臉部黃褐斑(chloasma/孕斑)、血管蜘蛛痣(雌激素致微血管擴張)、心跳每分鐘增加約10–15次(心輸出量增加)、生理性白帶增多(白色、無臭)。「異常」需就醫者:陰道分泌物變黃綠色、泡沫狀或惡臭、伴搔癢(提示滴蟲/細菌等感染)。本題問「異常」者為「陰道分泌物轉為黃綠色」(D)。","options":{"A":"正常。黃褐斑為孕期色素沉著。","B":"正常。血管蜘蛛痣為雌激素所致。","C":"正常。孕期心跳增加10–15次/分。","D":"異常(本題答案)。分泌物轉黃綠色提示感染。"},"sources":["新文京《產科護理學》孕期生理變化","陰道感染"]}},"107110-N4-5":{"quick":"雌激素對懷孕早期子宮頸的影響中「子宮頸長度增加」錯誤——子宮頸應變軟、充血,並非變長。","detail":{"background":"懷孕早期雌激素對生殖系統:子宮頸血管增生充血(Chadwick藍紫)、變軟(Goodell)、腺體增生分泌黏液形成「黏液塞(mucus plug)」封閉子宮頸口防上行感染;陰道黏膜變厚、皺襞增加、分泌增加(利日後分娩擴張);子宮壁(肌層)肥厚增長。子宮頸並非「長度增加」(妊娠維持其長度/閉合,臨產才變短消失;早期變化是軟化充血)。本題問「錯誤」者為「子宮頸長度增加」(A)。","options":{"A":"錯誤(本題答案)。子宮頸變軟充血,非長度增加。","B":"正確。子宮頸腺體分泌形成黏液塞。","C":"正確。陰道黏膜變厚。","D":"正確。子宮壁(肌層)厚度增加。"},"sources":["新文京《產科護理學》妊娠生殖道變化","妊娠生理"]}},"108110-N4-3":{"quick":"肚臍到會陰的褐色直線(linea nigra)是孕期荷爾蒙致黑色素沉著,產後會逐漸變淡。","detail":{"background":"孕期皮膚色素沉著:雌激素與黑色素細胞刺激素(MSH)增加,使黑色素沉著——出現「黑線(linea nigra,腹中線褐色直線)」、孕斑/黃褐斑(chloasma,臉頰額頭)、乳暈與外陰色素加深;此為正常生理變化,多於「產後數月逐漸變淡消退」。妊娠紋(striae)則是皮膚彈性纖維斷裂的紫紅色條紋(後轉銀白),與黑線不同。本題正確回答為「荷爾蒙致色素沉著,產後逐漸變淡」(A)。","options":{"A":"正確。黑線為荷爾蒙致色素沉著,產後逐漸變淡。","B":"錯。此為黑線(色素沉著),非妊娠紋。","C":"錯。非胎兒異常徵兆。","D":"錯。屬正常生理變化,不需去斑處理。"},"sources":["新文京《產科護理學》孕期皮膚變化","妊娠生理"]}},"108110-N4-15":{"quick":"經產婦分娩時子宮頸「變薄(消失)與擴張同時進行」。","detail":{"background":"子宮頸消失(effacement,變薄變短)與擴張(dilatation):初產婦多「先變薄(消失)、再擴張」;「經產婦」因先前生產子宮頸較鬆,變薄與擴張「同時進行」。潛伏期子宮頸擴張至約3公分、消失程度逐漸增加;選項「潛伏期消失90–100%」描述的是活躍/後期。本題經產婦正確為「變薄與擴張同時進行」(A)。","options":{"A":"正確。經產婦子宮頸變薄與擴張同時進行。","B":"此為描述順序之一,但經產婦為同時進行。","C":"此為初產婦的順序(先變薄再擴張)。","D":"錯。潛伏期消失程度未必達90–100%。"},"sources":["新文京《產科護理學》產程","分娩生理"]}},"109030-N4-7":{"quick":"懷孕後期走路時鼠蹊部(腹股溝)疼痛,主要與「圓韌帶(round ligament)」受牽拉有關。","detail":{"background":"子宮支持韌帶與孕期疼痛:子宮增大使「圓韌帶(round ligament)」被拉長,牽扯至腹股溝(鼠蹊部),於走路、突然移動或翻身時引起單側或雙側鼠蹊銳痛(round ligament pain),屬常見孕期不適,可採緩慢移動、彎曲膝部、局部熱敷緩解。闊韌帶、主韌帶、子宮薦骨韌帶主為固定支持。本題答案為圓韌帶(B)。","options":{"A":"闊韌帶主為包覆固定,非鼠蹊痛主因。","B":"正確。圓韌帶受牽拉致鼠蹊部痛。","C":"主韌帶為承重支持。","D":"子宮薦骨韌帶向後支持。"},"sources":["新文京《產科護理學》孕期不適","骨盆解剖"]}},"109030-N4-23":{"quick":"產後泌尿敘述中「產後第10天尿量才開始恢復正常」錯誤——利尿多在產後數日內完成。","detail":{"background":"產後泌尿變化:會陰傷口/裂傷與膀胱受壓使產婦對膀胱脹滿敏感度下降、易尿瀦留(需評估排尿、防膀胱過脹影響子宮收縮);產後12–24小時起藉「利尿作用」將孕期滯留的多餘體液排出,產後2–3天尿量可高達3000 c.c./天,之後逐漸恢復。並非「第10天才開始恢復正常」(利尿與恢復多在產後數日內)。本題問「錯誤」者為選項D。","options":{"A":"正確。會陰傷口使對膀胱脹滿敏感度減低。","B":"正確。產後12–24小時開始利尿。","C":"正確。產後2–3天尿量可達3000 c.c./天。","D":"錯誤(本題答案)。利尿與恢復多在產後數日內,非第10天才開始。"},"sources":["新文京《產科護理學》產褥期生理","產後護理"]}},"109110-N4-4":{"quick":"懷孕雌激素造成的生殖系統變化中「懷孕後期子宮壁變薄」為錯誤敘述(此處考子宮頸/生殖道變化)。","detail":{"background":"懷孕雌激素對生殖系統:形成子宮頸黏液塞、陰道與子宮頸血管增生充血、懷孕初期子宮頸變軟(Goodell)。子宮「肌層(壁)」在雌激素作用下肌纖維肥厚增長(肌層增厚);雖然隨胎兒長大子宮被動牽張使整體壁被拉薄,但本題以「懷孕後期子宮壁變薄」作為要選出的錯誤敘述(D),強調雌激素促子宮肌層發育增厚的概念。其餘黏液塞、血管充血、子宮頸變軟皆為正確的雌激素效應。","options":{"A":"正確。雌激素促子宮頸黏液塞形成。","B":"正確。陰道血管增生、充血。","C":"正確。懷孕初期子宮頸變軟。","D":"本題答案(錯誤敘述)。雌激素促子宮肌層發育,此選項作為要選的錯誤項。"},"sources":["新文京《產科護理學》妊娠生殖道變化","妊娠生理"]}},"110030-N4-3":{"quick":"妊娠腸胃變化中「膽囊排空時間延長、膽汁排出量減少」為正確。","detail":{"background":"妊娠腸胃系統:黃體素鬆弛平滑肌→胃排空延遲、腸蠕動減慢(便秘脹氣)、賁門鬆弛(心灼熱)、膽囊收縮力下降使「排空延遲、膽汁鬱積、膽汁排出減少」(增膽結石風險)。噁心嘔吐與hCG相關(非胃蛋白酶);肝功能上白蛋白「降低」(血液稀釋)、鹼性磷酸酶因胎盤分泌而升高;唾液分泌「增加」(流涎症),口腔衛生不佳易齲齒。本題正確為「膽囊排空延長、膽汁減少」(B)。","options":{"A":"錯。噁心嘔吐與hCG相關,非胃蛋白酶增加。","B":"正確。膽囊排空延長、膽汁排出量減少。","C":"錯。白蛋白降低(非上升)。","D":"錯。唾液分泌增加(流涎症),非減少。"},"sources":["新文京《產科護理學》妊娠腸胃變化","妊娠生理"]}},"110030-N4-7":{"quick":"孕期臉頰額頭的褐色斑點(黃褐斑)因腦下垂體分泌的黑色素刺激素(MSH)增加所致。","detail":{"background":"孕斑/黃褐斑(chloasma/melasma):懷孕期雌激素、黃體素與「黑色素細胞刺激素(MSH)」增加,刺激黑色素細胞,使臉頰、額頭、上唇出現對稱褐色斑點,日曬會加重;多於產後逐漸變淡。護理:防曬、避免日曬。本題正確解釋為「腦下垂體分泌的MSH增加」(D)。蜘蛛痣是微血管擴張(雌激素),與黃褐斑機轉不同。","options":{"A":"錯。非結締組織擴張。","B":"血管擴張是蜘蛛痣機轉,非黃褐斑。","C":"錯。非單純皮下代謝增加。","D":"正確。MSH增加致黑色素沉著(黃褐斑)。"},"sources":["新文京《產科護理學》孕期皮膚","妊娠生理"]}},"111030-N4-8":{"quick":"妊娠期腎臟「對糖分吸收的閾值降低」(故易生理性糖尿),其餘腎功能多為增加。","detail":{"background":"妊娠腎臟功能:腎血漿流量(RPF)與GFR增加、尿量增加;腎小管對葡萄糖再吸收速率不變但因GFR大增、濾出糖增多,使「腎糖閾(對糖分吸收/不漏出的閾值)相對降低」,故孕婦常見生理性糖尿。本題問「降低」者為「對糖分吸收的閾值」(C)。RPF、腎小管再吸收速度、排尿量在孕期多為增加。","options":{"A":"錯。腎血漿流量增加。","B":"錯。腎小管再吸收速度增加。","C":"正確。對糖分吸收的閾值降低(易生理性糖尿)。","D":"錯。排尿量增加。"},"sources":["新文京《產科護理學》妊娠泌尿變化","妊娠生理"]}},"111110-N4-4":{"quick":"雌激素增加使子宮頸血管充血、黏液分泌增加、腺體腫脹、變軟;「子宮頸變肥厚堅硬」為錯誤。","detail":{"background":"懷孕雌激素對子宮頸:血管增生充血(Chadwick藍紫)、腺體增生與黏液分泌增加(形成黏液塞)、組織「變軟(Goodell)」而非變硬堅實。子宮頸於妊娠維持閉合與一定長度,臨產才變薄擴張。本題問「錯誤」者為「子宮頸組織變肥厚堅硬」(C)——應為變軟。","options":{"A":"正確。子宮頸血管增生充血。","B":"正確。子宮頸黏液分泌增加。","C":"錯誤(本題答案)。子宮頸應變軟,非變肥厚堅硬。","D":"正確。子宮頸腺體增加腫脹。"},"sources":["新文京《產科護理學》妊娠子宮頸變化","妊娠生理"]}},"111110-N4-8":{"quick":"懷孕血液變化中「血小板數目比未懷孕時增加」為錯誤——血小板多正常或因血液稀釋略降。","detail":{"background":"妊娠血液變化:血漿量增加(約50%)大於紅血球增加,造成血液稀釋、血比容下降(生理性貧血);纖維蛋白原與多種凝血因子增加(高凝狀態,利產後止血但增血栓風險);白血球增加(生理性);血小板數目「正常或因血液稀釋略降」,並非增加。本題問「錯誤」者為「血小板數目比未懷孕時增加」(D)。","options":{"A":"正確。血漿量增加。","B":"正確。血比容下降(血液稀釋)。","C":"正確。纖維蛋白原增加(高凝)。","D":"錯誤(本題答案)。血小板不增加(正常或略降)。"},"sources":["新文京《產科護理學》妊娠血液變化","妊娠生理"]}},"112110-N4-20":{"quick":"產褥期敘述中「子宮頸口一週後趨近閉合是進行性變化」錯誤——子宮復舊屬「退行性(復舊)變化」。","detail":{"background":"產褥期(產後6週,第四孕期):生殖器官「復舊(involution)」需約4–6週,子宮體積縮小(藉自體溶解autolysis)、子宮頸於產後逐漸閉合(約1週縮小、外口維持橫裂狀)。子宮復舊屬「退行性(regressive/復舊)變化」,而非「進行性」變化(進行性變化指乳房泌乳等發展性改變),故選項C敘述「是一種生理上進行性變化」錯誤。產褥期又稱第四孕期,強調母嬰一體的調整恢復。本題問「錯誤」者為C。","options":{"A":"正確。生殖器官復舊需4–6週。","B":"正確。產褥期又稱第四孕期。","C":"錯誤(本題答案)。子宮頸閉合屬退行性(復舊)變化,非進行性。","D":"正確。子宮體積減少與自體溶解有關。"},"sources":["新文京《產科護理學》產褥期","產後生理"]}},"113030-N4-5":{"quick":"妊娠生理性貧血是因「血漿量增加大於紅血球增加(血液稀釋)」,非紅血球攜鐵蛋白能力降低。","detail":{"background":"妊娠心血管/血液生理:出現生理性白血球增多(可達約15,000/mm³)、心輸出量增加30–50%以供子宮胎盤血流、血漿白蛋白降低使膠體滲透壓下降而易水腫。「妊娠生理性貧血」的機轉是「血漿量增加(約50%)大於紅血球量增加(約20–30%)」造成的血液稀釋(dilutional anemia),使血比容/血色素下降,並非「紅血球攜鐵蛋白能力降低」。本題問「錯誤」者為B。","options":{"A":"正確。生理性白血球增多,可達約15,000/mm³。","B":"錯誤(本題答案)。生理性貧血源於血漿量增加的血液稀釋,非攜鐵能力降低。","C":"正確。心輸出量增加30–50%。","D":"正確。白蛋白降低致水分滯留水腫。"},"sources":["新文京《產科護理學》妊娠血液變化","妊娠生理"]}},"113100-N4-4":{"quick":"懷孕內分泌變化中「鬆弛素(relaxin)大部分由黃體分泌」為正確。","detail":{"background":"妊娠內分泌:鬆弛素(relaxin)主要由「黃體(及胎盤、蛻膜)」分泌,可鬆弛骨盆韌帶與恥骨聯合、軟化子宮頸,利分娩(也使關節較鬆易腰背痛);甲狀腺因代謝需求而體積「增大」、活性增加;醛固酮分泌「增加」(尤限鈉時更明顯,以保鈉保水);hCG由「胎盤滋養層」分泌(非選項所述)。本題正確為「鬆弛素大部分由黃體分泌」(B)。","options":{"A":"錯。甲狀腺體積增大,非減少。","B":"正確。鬆弛素大部分由黃體分泌。","C":"錯。醛固酮分泌增加(尤限鈉時)。","D":"hCG由胎盤滋養層分泌。"},"sources":["新文京《產科護理學》妊娠內分泌","妊娠生理"]}},"113180-N4-3":{"quick":"懷孕14週「感覺寶寶在睡前活動較多」不符生理——初產婦約18~20週才感覺到胎動。","detail":{"background":"妊娠14週(第一孕期末/第二孕期初)常見生理:血容量增加致心悸;子宮增大使褲子變緊;第一孕期的噁心嘔吐(hCG高峰約8–10週)此時多漸緩。但「感覺胎動」——初產婦約18–20週、經產婦約16–18週才感覺得到(quickening),14週尚無法明顯感覺胎動,更不會分辨「睡前活動較多」。本題問「較不符合」者為「感覺寶寶睡前活動較多」(B)。","options":{"A":"符合。血容量增加常有心悸。","B":"不符(本題答案)。14週尚無法明顯感覺胎動。","C":"符合。第一孕期孕吐此時漸緩。","D":"符合。子宮增大使衣物變緊。"},"sources":["新文京《產科護理學》胎動/孕期生理","妊娠評估"]}},"114100-N4-2":{"quick":"超音波檢查看見「妊娠囊」屬懷孕的確實(陽性)徵候。","detail":{"background":"懷孕徵候分類:推測徵候(主觀,如晨吐噁心、停經);可能徵候(客觀但非確診,如子宮峽部變軟Hegar、hCG妊娠試驗陽性、Chadwick/Goodell徵象);確實/陽性徵候(可確診,如超音波見妊娠囊/胎兒/胎心、聽到胎心音、檢查者觸到胎動)。本題「超音波看見妊娠囊」為確實徵候(C);晨吐為推測、子宮峽部變軟與hCG陽性為可能徵候。","options":{"A":"晨吐噁心為推測徵候。","B":"子宮峽部變軟(Hegar)為可能徵候。","C":"正確。超音波見妊娠囊為確實徵候。","D":"hCG妊娠試驗陽性為可能徵候。"},"sources":["新文京《產科護理學》懷孕徵候","產科診斷"]}},"115030-N4-2":{"quick":"妊娠血液組成變化中「雌激素增加使白血球增加」為正確(生理性白血球增多)。","detail":{"background":"妊娠血液:循環血容量增加但「血漿量增加大於紅血球」造成血比容「下降」(非增加)、生理性貧血;血漿白蛋白「降低」(非增加);凝血因子(VII、VIII、IX、X、纖維蛋白原)「增加」形成高凝狀態(利產後止血、但增血栓),非減少;白血球因雌激素與生理壓力而「增加」(生理性白血球增多,可達約15,000/mm³)。本題正確為「雌激素增加使白血球增加」(D)。","options":{"A":"錯。血漿蛋白(白蛋白)降低,非增加。","B":"錯。凝血因子增加(高凝),非減少。","C":"錯。血比容下降(血液稀釋),非增加。","D":"正確。雌激素增加使白血球增加(生理性)。"},"sources":["新文京《產科護理學》妊娠血液變化","妊娠生理"]}},"101030-N4-30":{"quick":"早期確認懷孕(妊娠囊位於子宮內)最適合用陰道超音波。","detail":{"background":"早期妊娠確認:陰道超音波較腹部超音波能更早(約妊娠5週)清楚顯示「妊娠囊位於子宮內」,可確認子宮內懷孕並排除子宮外孕,胚囊內卵黃囊、胚胎與胎心(約6週)依序可見。Leopold氏操作法用於妊娠後期觸診胎位(早期不適用);腹部超音波此期較不敏感;杜卜勒聽臍血流雜音約12週後才測得。本題早期確認妊娠囊在子宮內以「陰道超音波」最適(B)。","options":{"A":"Leopold操作法用於後期觸診胎位,非早期確認。","B":"正確。陰道超音波可早期確認妊娠囊在子宮內。","C":"早期腹部超音波較不敏感。","D":"杜卜勒測臍血流雜音約12週後,非此期。"},"sources":["新文京《產科護理學》早期妊娠評估","超音波應用"]}},"101030-N4-31":{"quick":"LMP 12/20 以內格萊氏法則推算:月−3、日+7、年+1 → 預產期次年9/27。","detail":{"background":"內格萊氏法則(Nägele rule):預產期(EDD)=最後一次月經第一天(LMP)月份減3(或加9)、日期加7、年份加1,適用月經規律28天者。LMP=12/20:月12−3=9、日20+7=27、年+1 → 次年9/27。注意月經週期不規則或不確定LMP者,改以超音波(早期頭臀徑CRL最準)推估。本題答案為9/27(D)。","options":{"A":"7/17計算錯誤。","B":"7/27月份計算錯誤。","C":"9/17日期未+7。","D":"正確。9/27(月−3、日+7、年+1)。"},"sources":["Nägele rule","新文京《產科護理學》預產期推算"]}},"102030-N4-2":{"quick":"產科結合徑(真結合徑)=測量恥骨聯合上緣內側至薦骨岬之間的距離。","detail":{"background":"骨盆測量:骨盆入口的「產科真結合徑(obstetric conjugate)」是恥骨聯合「上緣內側」至薦骨岬(promontory)之最短距離,是胎頭通過入口的關鍵徑,約≧10公分為足夠;臨床無法直接測量,常以對角結合徑(diagonal conjugate,陰道內診觸薦骨岬)減約1.5–2公分推估,故「對角結合徑」較易臨床測量、真結合徑不易直接測。二腸骨嵴間距離(髂嵴間徑)屬外骨盆測量。本題正確為「測量恥骨聯合上緣內側至薦骨岬距離」(B)。","options":{"A":"錯。真結合徑臨床不易直接測量,對角結合徑才較易測。","B":"正確。恥骨聯合上緣內側至薦骨岬之距離。","C":"二腸骨嵴間距為外骨盆徑,非結合徑。","D":"真結合徑約≧10公分,非12–13公分(對角結合徑約12.5)。"},"sources":["新文京《產科護理學》骨盆測量","產科解剖"]}},"102110-N4-3":{"quick":"LMP 4/22 以內格萊氏法則推算:月−3、日+7、年+1 → 預產期次年1/29。","detail":{"background":"內格萊氏法則應用:LMP取月經「第一天」4/22。月4−3=1(不足減3則借年:此處4−3=1,年+1)、日22+7=29 → 次年1月29日。故EDD為次年1/29(A)。月經不規則者應以早期超音波(CRL)校正。","options":{"A":"正確。次年1/29(月−3、日+7、年+1)。","B":"2/4計算錯誤。","C":"3/1計算錯誤。","D":"3/4計算錯誤。"},"sources":["Nägele rule","新文京《產科護理學》"]}},"105090-N4-3":{"quick":"妊娠20週推估胎兒週數,以「雙頂徑(BPD)」最適當。","detail":{"background":"超音波估計妊娠週數依時期選不同參數:第一孕期(約7–13週)以「頭臀徑(CRL)」最準;第二孕期(如20週)以「雙頂徑(BPD)」、頭圍、腹圍、股骨長綜合估計,其中BPD為20週常用且可靠的指標;晚期因個體差異大、準確度下降。本題20週推估週數以BPD最適(C)。","options":{"A":"股骨長為輔助參數,20週估週數以BPD為主。","B":"CRL適用第一孕期,非20週。","C":"正確。20週以雙頂徑(BPD)推估週數最適。","D":"HC/AC比用於評估生長對稱性,非估週數首選。"},"sources":["新文京《產科護理學》超音波測量","產前評估"]}},"105090-N4-4":{"quick":"全民健保產前檢查建議於妊娠約20週進行一次超音波檢查。","detail":{"background":"我國健保產前檢查(現行擴大為14次給付):首次產檢建議於妊娠「滿8週(或第8–12週)」前後完成(非6週前);產檢頻率約妊娠28週前每4週一次、29–36週每2週一次、37週後每週一次(非每兩個月);常規超音波建議於約「20週」進行(評估胎兒構造);各孕期有對應的實驗室檢查。本題正確為「建議在20週進行超音波檢查」(C)。","options":{"A":"錯。首次產檢約妊娠8–12週,非6週前。","B":"錯。28週前每4週一次,非每兩個月。","C":"正確。建議約20週進行超音波。","D":"此選項實驗室項目組合非標準第二孕期常規。"},"sources":["國健署 產前檢查給付時程","新文京《產科護理學》"]}},"105090-N4-5":{"quick":"LMP 5/10 以內格萊氏法則推算:月−3、日+7、年+1 → 預產期次年2/17。","detail":{"background":"內格萊氏法則(Nägele rule)推算預產期:以最後一次月經(LMP)第一天為基準,「月份−3(或+9)、日期+7、年份+1」,適用於月經規律28天者。LMP 5/10 → 月5−3=2、日10+7=17、年+1 → 次年2月17日。若月經週期不規律或不確定LMP,應改以早期超音波(第一孕期頭臀徑CRL最準)校正預產期。足月範圍為37–42週,預產期僅為估計值。","options":{"A":"1/28計算錯誤。","B":"正確。次年2/17。","C":"3/12計算錯誤。","D":"4/10計算錯誤。"},"sources":["Nägele rule","新文京《產科護理學》"]}},"106110-N4-3":{"quick":"LMP 104/2/25 以內格萊氏法則推算 → 預產期約104/12/2。","detail":{"background":"內格萊氏法則:LMP 2/25 → 月2加9=11?採「月−3、日+7、年+1」當月份不足減3時改「+9、年不變」:2+9=11、日25+7=32→進位至12月2日(11月僅30天,32−30=2 → 12/2),年同年104 → EDD約104/12/2(B)。月經週期約30天接近28天,差異小。本題答案104/12/2。","options":{"A":"104/11/1計算錯誤。","B":"正確。約104/12/2。","C":"104/10/4計算錯誤。","D":"105/1/2計算錯誤。"},"sources":["Nägele rule","新文京《產科護理學》"]}},"107030-N4-3":{"quick":"以超音波估算妊娠週數可推得預產期(尤其月經不規則或LMP不確定時)。","detail":{"background":"預產期推算方法:(1)LMP+內格萊法則——僅適用「月經規律」者,不規律者不準;(2)超音波——以胚胎/胎兒測量(早期CRL最準)估算妊娠週數進而推得EDD,適用所有孕婦、尤其LMP不確定或月經不規律者,為可靠方法;(3)受孕日加266天(非280天,280天是從LMP算);(4)子宮底高度(麥當勞法則)為粗估。本題正確為「以超音波估算妊娠週數得知預產期」(B)。","options":{"A":"錯。LMP法僅適用月經規律者。","B":"正確。超音波估妊娠週數可推得預產期。","C":"此公式非標準預產期推算。","D":"錯。LMP加280天;受孕日加約266天。"},"sources":["新文京《產科護理學》預產期推算","超音波"]}},"107030-N4-8":{"quick":"妊娠7週超音波說明中「一般超音波可檢測胎兒心臟構造與血流」不適當——早期一般超音波無法。","detail":{"background":"早期(7週)超音波:可觀察「胚胎個數、著床位置(排除子宮外孕)、胎心搏動(約6週起)」;經腹部早期超音波宜「喝水脹滿膀胱」作為聲窗。但胎兒「心臟構造與血流」需待中期(約18–22週)的詳細/高層次超音波(含心臟超音波、彩色都卜勒)才能評估,7週的一般超音波無法檢測心臟構造與血流,故此說明不適當(D)。(選項C「高層次超音波檢測妊娠囊」用詞雖不精確,但本題以D為最不適當。)","options":{"A":"適當。早期超音波可看胚胎數與著床位置。","B":"適當。經腹早期超音波宜脹膀胱。","C":"用詞不夠精確,但非本題最不適當者。","D":"不適當(本題答案)。7週一般超音波無法檢測胎兒心臟構造與血流。"},"sources":["新文京《產科護理學》超音波應用","產前評估"]}},"108020-N4-18":{"quick":"子宮頸擴張9公分、變薄80%、胎頭高度+2,胎頭最可能位於「坐骨棘下」。","detail":{"background":"胎頭下降高度(station)以坐骨棘(ischial spine)為0:負值(−)在坐骨棘「上」、正值(+)在坐骨棘「下」;+2表示胎頭已降至坐骨棘下2公分,接近陰道出口、即將娩出;子宮頸擴張9公分、變薄80%屬第一產程活躍期末/過渡期。本題胎頭+2位於「坐骨棘下」(C)。","options":{"A":"骨盆入口約為−高度,非+2。","B":"坐骨棘上為負值高度。","C":"正確。+2為坐骨棘下2公分。","D":"陰道出口約+4–+5,非+2。"},"sources":["新文京《產科護理學》胎頭下降高度","產程評估"]}},"108110-N4-8":{"quick":"依「子宮底高度」位置推估妊娠週數/預產期的方法為麥當勞法則(McDonald rule)。","detail":{"background":"子宮底高度與週數:麥當勞法則(McDonald rule)以軟尺量恥骨聯合上緣至子宮底的「公分數」概略對應妊娠週數(約20–34週時公分數≈週數±2),用以追蹤胎兒生長、推估週數。LMP/內格萊法則依月經推算;雙頂徑(BPD)為超音波測量。本題依子宮底高度推估者為麥當勞法則(C)。","options":{"A":"LMP是月經推算的依據,非依子宮底高度。","B":"內格萊法則依LMP,非子宮底高度。","C":"正確。麥當勞法則依子宮底高度推估。","D":"雙頂徑為超音波測量。"},"sources":["新文京《產科護理學》子宮底高度","McDonald rule"]}},"109110-N4-3":{"quick":"曾有一對雙胞胎活產、一次中止妊娠(無胎心引產)、此次懷孕,孕產史記為 G3P1AA1。","detail":{"background":"孕產史(GTPAL/簡記)概念:G(gravida 懷孕次數,含此次)、P(para 生產次數,以「妊娠次數」而非胎兒數計——雙胞胎活產仍算1次P)、A(abortion 流產/中止,含人工與自然)。本例:此次懷孕第3次(雙胞胎那次+中止那次+此次)→G3;雙胞胎活產為1次生產→P1;曾有1次因無胎心而中止妊娠(人工流產AA, artificial/induced abortion)→A(AA)1。故記為G3P1AA1(C)。(SA為自然流產spontaneous abortion;此例為引產/人工中止故AA。)","options":{"A":"G4P2未正確計算(雙胞胎算1次P、總妊娠3次)。","B":"SA1(自然流產)不符,本例為人工中止(AA)。","C":"正確。G3P1AA1。","D":"G4P2AA1懷孕與生產次數計算錯誤。"},"sources":["新文京《產科護理學》孕產史記法","GTPAL"]}},"110110-N4-8":{"quick":"月經週期不規則(28~45天)者,推估預產期以「超音波觀察胚胎發育」最準確。","detail":{"background":"預產期推算的準確性:內格萊法則(LMP法)僅適用「月經規律28天」者;本例月經週期28–45天「不規律」,以LMP推算不準。最準確方法是「早期超音波」測量胚胎/胎兒(第一孕期CRL最準)估算妊娠週數與EDD,故選D(以超音波觀察妊娠囊、胎心音、胚胎發育)。詢問排卵受孕日加266天需確知受孕日(多不確定);胎動日推算誤差大。本題答案為超音波(D)。","options":{"A":"月經不規律,LMP/內格萊法不準。","B":"多數人不確定受孕日,難用。","C":"胎動日推算誤差大。","D":"正確。月經不規律者以早期超音波最準。"},"sources":["新文京《產科護理學》預產期推算","超音波"]}},"111030-N4-4":{"quick":"妊娠約17~20週可用「一般聽診器(胎心筒)」在腹部聽到胎心音。","detail":{"background":"胎心音偵測時機:杜卜勒(Doppler)約妊娠「10–12週」可在恥骨聯合上方偵測到胎心;一般聽診器/胎心筒(fetoscope)約「17–20週」才能在腹部聽到胎心音;超音波約6週可見胎心搏動。本題正確為「妊娠17–20週可用一般聽診器在腹部聽診到胎心音」(C)。其餘選項時機/工具/位置(劍突下1公分)有誤。","options":{"A":"腹部超音波約6週見胎心,「妊娠6週」用一般偵測不符選項其他描述。","B":"杜卜勒約10–12週可測,「16週平臍兩側」描述不精確。","C":"正確。17–20週一般聽診器可聽到胎心音。","D":"胎心位置非劍突下1公分。"},"sources":["新文京《產科護理學》胎心音偵測","產前評估"]}},"114030-N4-2":{"quick":"妊娠32週四段式(Leopold)觸診:腹部兩側觸到「較硬且平滑面」者為胎兒背部。","detail":{"background":"Leopold四段式觸診:第一段觸子宮底(圓硬可動為頭、軟不規則為臀);第二段觸腹部兩側(平滑堅硬連續面為「胎背」、不規則小突起為四肢);第三段觸恥骨上方先露部;第四段檢查者「面向產婦足側」評估先露入盆程度(非評估胎背)。觸診前請產婦排空膀胱(非脹滿)、屈膝放鬆腹部。本題正確為「腹部兩側硬而平滑面為胎背」(D)。","options":{"A":"錯。觸診前應排空膀胱,非脹滿。","B":"錯。第四段應面向產婦足側評估先露入盆。","C":"錯。子宮底圓硬可動為「頭」、軟不規則為臀(描述相反)。","D":"正確。兩側硬平滑面為胎兒背部。"},"sources":["新文京《產科護理學》Leopold四段式觸診","產前評估"]}},"114030-N4-3":{"quick":"驗孕棒原理是以「聯酶免疫法(ELISA)」檢測尿液中的hCG濃度。","detail":{"background":"尿液驗孕:偵測胚胎滋養層分泌的「人類絨毛膜促性腺激素(hCG)」,市售驗孕棒多採酵素免疫分析(ELISA/免疫層析)原理。建議用「晨起第一泡尿(濃度最高)、取中段尿」較準(非睡前);月經過期約1週(受孕約2週後)hCG足量,過早可能偽陰性,但月經過期10天通常已可驗出(故「太早不準」此例不成立);一般鎮靜劑不致偽陰性。本題正確為「以ELISA檢測尿液hCG」(B)。","options":{"A":"錯。月經過期10天通常已可驗出,非太早。","B":"正確。驗孕棒以ELISA檢測尿液hCG。","C":"錯。應用晨起第一泡中段尿較準,非睡前。","D":"錯。一般鎮靜劑不致偽陰性。"},"sources":["新文京《產科護理學》妊娠試驗","hCG"]}},"114100-N4-4":{"quick":"懷孕10週以超音波評估胎兒大小,以「頭臀徑(CRL)」最適當。","detail":{"background":"超音波測量依孕期:第一孕期(約7–13週)以「頭臀徑(CRL, crown-rump length)」估算妊娠週數最準確;第二孕期改用雙頂徑(BPD)、頭圍、腹圍、股骨長。10週屬第一孕期,故以CRL最適(C)。BPD、腹圍、股骨長為較後期參數。","options":{"A":"雙頂徑適用第二孕期。","B":"胎兒腹圍為較後期生長參數。","C":"正確。10週(第一孕期)以頭臀徑(CRL)最適。","D":"股骨長為較後期參數。"},"sources":["新文京《產科護理學》超音波測量","CRL"]}},"101030-N4-28":{"quick":"判別胎兒肺部成熟度的方法為「羊膜穿刺術」(分析羊水L/S比值等)。","detail":{"background":"胎兒肺成熟度評估:抽取羊水分析「卵磷脂/抱合髓磷脂比值(L/S ratio)」,L/S≧2表示肺成熟、呼吸窘迫風險低;也可測磷脂醯甘油(PG)。取得羊水需「羊膜穿刺術」。杜卜勒血流評估胎盤/臍血流阻力;絨毛膜取樣與臍帶穿刺用於染色體/血液檢查,非評估肺成熟。本題答案為羊膜穿刺術(C)。","options":{"A":"杜卜勒血流評估胎盤/臍血流,非肺成熟。","B":"絨毛膜取樣驗染色體,非肺成熟。","C":"正確。羊膜穿刺取羊水測L/S比值評估肺成熟。","D":"臍帶穿刺用於胎兒血液檢查,非肺成熟。"},"sources":["新文京《產科護理學》羊水分析","胎兒肺成熟度"]}},"101110-N4-45":{"quick":"第二孕期母血唐氏症篩檢主要檢測甲型胎兒蛋白(AFP)與人類絨毛膜性腺激素(hCG)。","detail":{"background":"母血唐氏症篩檢:第二孕期(約15–20週)「二指標」檢測AFP與hCG(唐氏兒AFP↓、hCG↑);擴充為「四指標」加上未結合雌三醇(uE3)與抑制素A(inhibin A)偵測率約80%。第一孕期(約11–13週)則用「PAPP-A+游離β-hCG+頸部透明帶(NT)」。本題第二孕期母血篩檢主要為AFP+hCG(A)。","options":{"A":"正確。母血唐氏篩檢檢測AFP+hCG。","B":"hPL非唐氏篩檢項目。","C":"為β胎兒蛋白用詞不當(應α胎兒蛋白)。","D":"E2非唐氏篩檢標準項目。"},"sources":["新文京《產科護理學》唐氏症篩檢","產前遺傳篩檢"]}},"103030-N4-4":{"quick":"NST出現胎動時胎心率加速(20分鐘≥2次、每次加速≥15 bpm/15秒)為「反應型」,表示胎兒健康、胎盤功能正常。","detail":{"background":"無壓力試驗(NST)判讀:「反應型(reactive)」=20分鐘內至少2次胎動伴隨胎心率加速(足月兒每次≥15 bpm、持續≥15秒;<32週放寬為≥10 bpm/10秒),表示胎兒自主神經與氧合良好、胎盤功能正常。本例「20分鐘5次胎動、胎心加速約20 bpm持續30秒」符合反應型,判讀為「胎兒健康、胎盤功能正常」(B)。無反應型才需進一步評估(如CST、BPP)。","options":{"A":"錯。反應型表示無缺氧。","B":"正確。反應型=胎兒健康、胎盤功能正常。","C":"錯。已達反應型標準,可判讀。","D":"錯。反應型非胎盤功能不良。"},"sources":["新文京《產科護理學》NST判讀","胎兒監測"]}},"103030-N4-6":{"quick":"排除胎兒神經管缺陷,最常建議的檢查為羊膜穿刺術(測羊水AFP/乙醯膽鹼酯酶)。","detail":{"background":"神經管缺陷(NTD,如脊柱裂、無腦兒)的產前評估:母血或羊水「甲型胎兒蛋白(AFP)」升高、羊水「乙醯膽鹼酯酶(AChE)」陽性是重要指標;高層次超音波亦可直接觀察脊柱/顱腦。曾有死胎或高風險者,常以「羊膜穿刺術」抽羊水檢測AFP與染色體。絨毛膜取樣驗「染色體」但「不測AFP/神經管缺陷」;臍帶穿刺用於胎兒血液。本題以羊膜穿刺術為答案(C)。","options":{"A":"超音波可輔助,但抽羊水測AFP為排除NTD的關鍵檢查。","B":"絨毛膜取樣驗染色體,不檢測神經管缺陷。","C":"正確。羊膜穿刺測羊水AFP排除神經管缺陷。","D":"臍帶穿刺用於胎兒血液檢查。"},"sources":["新文京《產科護理學》神經管缺陷篩檢","羊膜穿刺"]}},"103030-N4-9":{"quick":"母血唐氏症篩檢危險比值高於1:270時,應建議進一步檢查(如羊膜穿刺)。","detail":{"background":"唐氏症母血篩檢以「危險比值」報告,常用切點為「1/270」(相當於35歲產婦的年齡風險)——風險「高於1/270(如1/100)」即列為高危險群,建議進一步確診檢查(絨毛膜取樣或羊膜穿刺染色體分析);母血篩檢為「篩檢」而非確診工具。本題切點為1:270(A)。","options":{"A":"正確。危險比值高於1/270為高危,建議進一步檢查。","B":"1/350非標準切點。","C":"1/450非標準切點。","D":"1/1000非標準切點。"},"sources":["新文京《產科護理學》唐氏症篩檢切點","產前遺傳"]}},"103030-N4-11":{"quick":"40週NST 10分鐘僅1次胎動、極小變異,胎兒可能在睡眠,可嘗試刺激/吵醒胎兒後再測。","detail":{"background":"NST「無反應型」或變異性差時的處置:胎兒「睡眠週期」是常見的暫時性原因(可長達20–40分鐘),可先延長監測時間並以聲音/振動聲響刺激(vibroacoustic stimulation)、輕推腹部或讓孕婦進食/改變姿勢「喚醒胎兒」後再評估;若仍無反應或變異性持續不良,再安排進一步檢查(CST/BPP)而非立即引產或當作正常。本題最合宜為「嘗試吵醒胎兒後再檢查」(C)。","options":{"A":"過早。應先排除睡眠、刺激後再評估,非立即引產。","B":"錯。10分鐘僅1次、極小變異非正常反應型。","C":"正確。胎兒可能睡眠,先刺激喚醒後再測。","D":"下床散步非此情境首要處置。"},"sources":["新文京《產科護理學》NST處置","胎兒監測"]}},"103100-N4-12":{"quick":"妊娠20週不確定胎動者,應先確認其胎動測量與觀察方法是否正確,並教導如何計算胎動。","detail":{"background":"初產婦約「18–20週」開始感覺胎動(quickening),20週者「不確定是否有胎動」常因不熟悉胎動感受或計算方法。本例生命徵象正常、胎心166 bpm(正常120–160略偏快,但無宮縮),最適當是「先確認/教導正確的胎動測量與計算方法」(衛教而非立即侵入性檢查)。羊水檢查、CST、評估變異性皆非此情境首要。本題答案為C。","options":{"A":"過度。不需立即羊水檢查評估心臟功能。","B":"CST(宮縮壓力試驗)非此情境首要。","C":"正確。先確認並教導正確的胎動測量方法。","D":"非首要;先教導胎動計算。"},"sources":["新文京《產科護理學》胎動衛教","產前評估"]}},"104030-N4-3":{"quick":"本題為送分題。胎兒生理活動評估(BPP)以五項(各2分)計分。","detail":{"background":"胎兒生理活動評估(Biophysical Profile, BPP)由五項組成,每項正常給2分、滿分10分:(1)胎兒呼吸運動、(2)胎動、(3)胎兒肌張力(身體張力)、(4)羊水量(最大羊水囊垂直深度≥2公分)、(5)無壓力試驗(NST反應型)。8–10分多屬正常;6分為疑慮需追蹤/重做;≤4分提示胎兒可能缺氧、視週數考慮提早生產。本題因敘述/選項判讀有爭議,官方判定送分,各答案均給分。臨床仍以上述BPP計分原則為準。","options":{"A":"BPP計分相關;本題送分,各答案均給分。","B":"本題送分。","C":"本題送分。","D":"本題送分。"},"sources":["新文京《產科護理學》BPP","考選部 公告:本題送分"]}},"104100-N4-3":{"quick":"胎動警訊指胎動次數明顯變化——例如與前一天相比減少達50%。","detail":{"background":"胎動評估:孕婦自我監測胎動是簡便的胎兒健康指標。「胎動明顯減少(如較前一天減少約一半/50%)」或一段時間內胎動次數明顯低於平日,是胎兒可能窘迫的警訊,應就醫做NST/BPP。妊娠20週胎動為自發性(非因應外在刺激);常用計數法為安靜時數到10次所需時間(2小時內達10次正常),非「30分鐘1次即停」或「12小時少於3次表示睡覺」。本題正確為「與前一天相比減少50%」(B)。","options":{"A":"錯。20週胎動為自發,非因應外在聲音刺激。","B":"正確。胎動較前一天減少約50%為警訊。","C":"計數法描述不正確。","D":"錯。胎動明顯減少是警訊,非「睡覺」可忽略。"},"sources":["新文京《產科護理學》胎動評估","胎兒監測"]}},"105090-N4-6":{"quick":"母血唐氏症篩檢值高於1/270時歸為高危險群。","detail":{"background":"唐氏症母血篩檢:以風險值報告,切點「1/270」——風險「高於1/270」即高危,建議進一步確診。羊膜穿刺合適時機為「16–18週」(非10–16週開始);母血篩檢為「篩檢」不能「確診」;母血篩檢加上頸部透明帶(NT)為第一孕期組合篩檢,可「降低」假陽性、提高偵測率(非假陽性高)。本題正確為「母血篩檢值高於1/270為高危」(A)。","options":{"A":"正確。母血篩檢值高於1/270為高危險群。","B":"錯。羊膜穿刺合適時機為16–18週。","C":"錯。母血篩檢為篩檢,不能確診。","D":"錯。母血加NT提高偵測率、降低假陽性。"},"sources":["新文京《產科護理學》唐氏症篩檢","產前遺傳"]}},"106030-N4-3":{"quick":"胎兒生理活動評估(BPP)包括胎兒呼吸運動、羊水容積與無壓力試驗等項目。","detail":{"background":"BPP五項:胎兒呼吸運動、胎動、胎兒肌張力、羊水容積(最大羊水囊深度),加上無壓力試驗(NST),每項2分、滿分10分;用於高危妊娠(如血壓上升、尿液異常者)評估胎兒氧合與胎盤功能。≤4分提示胎兒窘迫,需依週數考慮提早生產(非一律立即引產;4–6分為疑慮需追蹤)。本題正確為「包括胎兒呼吸運動、羊水容積與NST」(D)。","options":{"A":"錯。BPP不含羊膜腔穿刺。","B":"錯。BPP非自我胎動紀錄。","C":"4–6分為疑慮需追蹤,非一律立即引產。","D":"正確。含胎兒呼吸運動、羊水容積與NST等。"},"sources":["新文京《產科護理學》BPP","胎兒監測"]}},"106110-N4-7":{"quick":"BPP以「超音波」評估的項目為胎兒呼吸、胎動、胎兒身體張力(肌張力)與羊水容積。","detail":{"background":"BPP五項中,四項以「超音波」觀察:胎兒呼吸運動、胎動、胎兒肌張力(身體張力)、羊水容積;第五項「胎兒心跳反應性」則以NST(胎心監視器)評估。臍帶血流(S/D)為都卜勒項目、胎兒體重為估計值,皆非BPP標準五項。本題超音波評估項目為「呼吸、胎動、身體張力、羊水容積」(A)。","options":{"A":"正確。超音波評估呼吸、胎動、身體張力、羊水容積。","B":"臍帶血流量、胎兒體重非BPP超音波標準項目。","C":"臍帶血流量、胎兒體重非BPP項目。","D":"臍帶血流量非BPP項目;心跳由NST評估。"},"sources":["新文京《產科護理學》BPP","胎兒監測"]}},"106111-N4-8":{"quick":"36週胎動測量「最佳時機為早上未下床前」為錯誤——建議於飯後、固定且胎兒較活躍時段測。","detail":{"background":"胎動自我監測衛教:建議於「固定時段、胎兒較活躍時(常為飯後)」進行,採安靜坐或側臥、手放腹部專心計數;常用「數到10次胎動所需時間」(2小時內達10次正常)或固定時段計數;胎動明顯減少需就醫。「清晨未下床前(空腹)」並非最佳——空腹血糖低時胎動可能較少,飯後血糖上升胎動較明顯。本題問「錯誤」者為「最佳時機為早上未下床前」(A)。","options":{"A":"錯誤(本題答案)。應於飯後等胎兒活躍時段測,非清晨空腹未下床。","B":"正確。安靜處手放腹部監測。","C":"正確。2小時≥10次胎動表示良好。","D":"正確。可採半坐臥或側臥測量。"},"sources":["新文京《產科護理學》胎動監測","胎兒評估"]}},"107030-N4-30":{"quick":"胎心率出現變異性減速(variable deceleration),最可能原因為「臍帶受壓」。","detail":{"background":"胎心率減速型態與成因:早期減速(early deceleration)——與宮縮同步、對稱,因「胎頭受壓」迷走神經反射,屬良性;晚期減速(late deceleration)——減速在宮縮高峰後出現、回復慢,提示「子宮胎盤功能不良/胎兒缺氧」;變異性減速(variable deceleration)——形狀與宮縮關係不定、突發突止(V/U/W形),因「臍帶受壓」所致,處置改變孕婦姿勢(左側臥)、給氧、停催產素、必要時抬高先露減壓。本題變異性減速主因為臍帶受壓(C)。","options":{"A":"胎頭受壓造成早期減速,非變異性減速。","B":"胎盤功能不良造成晚期減速。","C":"正確。變異性減速因臍帶受壓。","D":"胎兒感染非變異性減速直接成因。"},"sources":["新文京《產科護理學》胎心率監測","減速型態"]}},"107110-N4-10":{"quick":"第一孕期唐氏症篩檢敘述中「四指標篩檢偵測率50%」錯誤——四指標偵測率約80%。","detail":{"background":"唐氏症篩檢偵測率:第一孕期組合篩檢(11–14週,PAPP-A+游離β-hCG+頸部透明帶NT)偵測率約「85–90%」;第二孕期「四指標(AFP、hCG、uE3、inhibin A)」偵測率約「80%」(二指標約60–65%)。頸部透明帶厚度增加(如>3–6 mm)提示唐氏或其他染色體異常。故「四指標篩檢正確偵測率為50%」為錯誤(D,應約80%)。","options":{"A":"正確。第一孕期篩檢含β-hCG、PAPP-A與NT。","B":"正確。NT過厚可懷疑染色體異常。","C":"正確。第一孕期篩檢約11–14週執行。","D":"錯誤(本題答案)。四指標偵測率約80%,非50%。"},"sources":["新文京《產科護理學》唐氏症篩檢偵測率","產前遺傳"]}},"108020-N4-7":{"quick":"絨毛膜取樣(CVS)敘述中「可檢測胎兒神經管發育缺陷」錯誤——CVS驗染色體,不測神經管缺陷。","detail":{"background":"絨毛膜取樣(CVS, chorionic villus sampling):約妊娠「10–13週」進行,取絨毛組織分析「胎兒染色體與基因」(可早期診斷染色體異常),較羊膜穿刺早;但「不能檢測神經管缺陷」(神經管缺陷需測羊水/母血AFP);過早(<10週)施行有胎兒肢體缺損(斷肢)風險。本題問「錯誤」者為「可檢測神經管缺陷」(A)。","options":{"A":"錯誤(本題答案)。CVS驗染色體,不能檢測神經管缺陷。","B":"正確。CVS可檢測染色體缺陷。","C":"正確。建議約10–12週執行。","D":"正確。過早施行有肢體缺損風險。"},"sources":["新文京《產科護理學》絨毛膜取樣","產前遺傳"]}},"108020-N4-8":{"quick":"孕期NST一般約「妊娠32週」開始測試,目的在評估胎兒「神經(自主神經)成熟度與健康」。","detail":{"background":"無壓力試驗(NST):依賴胎兒自主神經成熟後,胎動會伴隨胎心率加速;此反應約「妊娠32週後」較成熟,故高危妊娠常自約32週開始定期NST評估胎兒健康(氧合/自主神經狀態),非評估「呼吸成熟度」(呼吸/肺成熟由L/S比值評估)。本題正確為「32週、檢測胎兒神經(成熟度/健康)」(D)。","options":{"A":"錯。NST不評估呼吸成熟度;且非24週開始。","B":"24週開始過早。","C":"NST非評估呼吸成熟度。","D":"正確。約32週開始,評估胎兒神經(自主神經)成熟與健康。"},"sources":["新文京《產科護理學》NST","胎兒監測"]}},"108020-N4-9":{"quick":"以羊水評估胎兒成熟度:卵磷脂/抱合髓磷脂(L/S)比值≧2表示肺部已成熟。","detail":{"background":"羊水評估胎兒成熟度:抽羊水(羊膜穿刺,評估成熟度多在妊娠後期而非16–18週,16–18週羊穿主要驗染色體)分析「L/S比值≧2」表示肺成熟、RDS風險低;另測磷脂醯甘油(PG)出現亦表成熟;羊水中雌三醇與膽紅素的變化評估胎盤功能/溶血,非以「<10或降至0」作為肺成熟或肝異常的單一指標。本題正確為「L/S≧2表示肺成熟」(B)。","options":{"A":"錯。評估成熟度多在妊娠後期;16–18週羊穿主要驗染色體。","B":"正確。L/S≧2表示肺部成熟。","C":"雌三醇評估胎盤功能,非以<10判肺成熟。","D":"膽紅素變化評估溶血,非以降至0判肝異常。"},"sources":["新文京《產科護理學》羊水分析","胎兒成熟度"]}},"109030-N4-4":{"quick":"羊膜穿刺選在16~18週,「不是」因AFP濃度此時最高,而是羊水量足、子宮已上升、細胞易培養。","detail":{"background":"羊膜穿刺術(amniocentesis)選16–18週的理由:此時羊水量足夠(約200 mL,抽取相對安全)、子宮已升至恥骨聯合之上(操作較易、降低傷及膀胱/腸)、羊水中胎兒活細胞比例高(易培養做染色體分析)、且仍有時間在診斷異常後考慮後續處置。AFP濃度並非「16–18週最高」(母血AFP約16–18週為篩檢時機,但非選此時機的主因)。本題問「不是主要原因」者為「此時AFP分泌濃度最高」(B)。","options":{"A":"是原因。此時羊水量足(約200 mL)。","B":"不是主要原因(本題答案)。非因AFP濃度最高。","C":"是原因。子宮上升至恥骨聯合上,易操作。","D":"是原因。羊水中存活細胞比率大,易培養。"},"sources":["新文京《產科護理學》羊膜穿刺","產前遺傳"]}},"110030-N4-6":{"quick":"妊娠32週NST 20分鐘無胎動訊號,最適當先給含糖電解質飲料(喚醒胎兒)後再監測。","detail":{"background":"NST無反應/無胎動的首要處置:胎兒可能處於睡眠週期,可先「給予含糖飲料、改變姿勢、聲音振動刺激」嘗試喚醒胎兒並延長監測時間;多數在刺激後出現反應。若延長監測仍無反應,再安排進一步評估(BPP/CST)或住院。本題最適當為「給含糖電解質飲料再監測」(A)。立即住院、返家等到34週、或常規給氧皆非首要。","options":{"A":"正確。先給含糖飲料喚醒胎兒並延長監測。","B":"立即住院非首要,先刺激再評估。","C":"錯。胎動減少不應拖到34週。","D":"常規鼻導管給氧非首要處置。"},"sources":["新文京《產科護理學》NST處置","胎兒監測"]}},"110110-N4-5":{"quick":"BPP以超音波觀察的項目包括呼吸運動、胎動、胎兒身體張力與羊水容積。","detail":{"background":"BPP正確概念:五項各2分、滿分10分;其中「超音波」觀察呼吸運動、胎動、肌張力(身體張力)、羊水容積,第五項以NST評估胎心反應。判讀:8–10分正常;「6分為疑慮(borderline)」需進一步評估/重做,非「狀況良好每週重複」;羊水容積正常為最大羊水囊垂直深度≥2公分(非「均小於1公分」)。本題正確為「超音波觀察呼吸、胎動、身體張力與羊水容積」(C)。","options":{"A":"計分敘述不完整;滿分10分(NST含時)。","B":"錯。6分為疑慮需進一步評估,非每週重複即可。","C":"正確。超音波觀察呼吸、胎動、身體張力、羊水容積。","D":"錯。正常羊水囊深度≥2公分,非均小於1公分。"},"sources":["新文京《產科護理學》BPP","胎兒監測"]}},"111030-N4-10":{"quick":"胎兒染色體檢查敘述中「妊娠5~8週母血唐氏篩檢值大於1/720為高危」錯誤(時機與切點皆不符)。","detail":{"background":"產前染色體/篩檢時機:第一孕期母血(PAPP-A+β-hCG)合併頸部透明帶約「11–14週」;第二孕期母血唐氏篩檢約15–20週、切點常用1/270。CVS約10–13週(過早<10週有斷肢風險);羊膜穿刺約16–18週。「妊娠5–8週母血唐氏篩檢值大於1/720為高危」——時機過早(5–8週無此篩檢)且切點(1/720)與標準(1/270)不符,故為錯誤(A)。","options":{"A":"錯誤(本題答案)。5–8週無母血唐氏篩檢,切點亦非1/720。","B":"正確。CVS過早(<10週)有斷肢風險。","C":"正確。約11–12週可做母血(NIPT)檢測。","D":"正確。16–18週為羊膜穿刺適當時機。"},"sources":["新文京《產科護理學》產前篩檢時機","遺傳診斷"]}},"111110-N4-5":{"quick":"懷孕11週、前胎為唐氏症、希望提前確診,此時較適當的檢查為「絨毛膜取樣術(CVS)」。","detail":{"background":"早期確診胎兒染色體:絨毛膜取樣(CVS,約10–13週)可在第一孕期取絨毛做染色體分析、提早確診,適合本例(11週、前胎唐氏、希望提前確診)。羊膜腔穿刺須等16–18週(較晚);頸部透明帶與母血唐氏檢驗為「篩檢」(估風險)而非「確診」。本題希望「提前確診」者選CVS(B)。","options":{"A":"頸部透明帶為篩檢,非確診。","B":"正確。絨毛膜取樣可第一孕期提早確診染色體。","C":"羊膜穿刺須等16–18週,較晚。","D":"母血唐氏為篩檢,非確診。"},"sources":["新文京《產科護理學》CVS","產前遺傳診斷"]}},"111110-N4-34":{"quick":"妊娠32週主訴胎動減少,最適當的處置是「安排無壓力試驗(NST)」。","detail":{"background":"胎動減少的評估:胎動減少是胎兒可能窘迫的警訊,妊娠32週(NST已可靠)主訴胎動減少時,最適當是「安排NST」客觀評估胎兒健康與胎盤功能,必要時續做BPP/CST。僅「指導返家記錄胎動」或「告知不用擔心」會延誤;「立即引產」過度。本題答案為安排NST(C)。","options":{"A":"僅返家記錄會延誤評估。","B":"錯。胎動減少不應告知不用擔心。","C":"正確。安排NST客觀評估胎兒健康。","D":"立即引產過度,應先評估。"},"sources":["新文京《產科護理學》胎動減少處置","胎兒監測"]}},"112110-N4-5":{"quick":"40歲、17週羊膜穿刺的目的在「染色體/基因診斷」,「此時目的在評估胎兒成熟度」為錯誤。","detail":{"background":"羊膜穿刺術(amniocentesis)依時機目的不同:第二孕期(16–18週)主要做「染色體核型/基因」分析(高齡、前胎異常、篩檢高危者);評估「胎兒肺成熟度(L/S)」則在妊娠後期才做。操作前不需脹滿膀胱(與經腹超音波不同)、協助平躺鋪無菌區、超音波導引下抽羊水通常不需麻醉。本題40歲17週羊穿目的應為染色體診斷,「目的在評估胎兒成熟度」為錯誤(D)。","options":{"A":"正確。羊膜穿刺不需事先脹滿膀胱。","B":"正確。協助平躺並鋪無菌區。","C":"正確。超音波導引下可不需麻醉。","D":"錯誤(本題答案)。17週羊穿目的為染色體診斷,非評估成熟度。"},"sources":["新文京《產科護理學》羊膜穿刺","產前遺傳"]}},"112110-N4-8":{"quick":"臍動脈血流S/D比值=2.4,表示胎盤血管阻力正常、胎盤功能正常。","detail":{"background":"臍動脈都卜勒血流(S/D ratio,收縮峰值/舒張末期流速比):反映胎盤血管阻力。隨妊娠進展、胎盤血管床發育,舒張期血流增加,S/D比值「隨週數遞減」(足月約<3);比值升高(舒張期血流低、消失或逆流)表示胎盤阻力高、功能不良(胎兒生長受限風險)。S/D是臍「動脈」收縮/舒張比(非靜脈)。本題S/D=2.4在正常範圍,表示「胎盤功能正常」(D)。","options":{"A":"錯。S/D為臍「動脈」收縮壓與舒張壓流速比,非靜脈。","B":"敘述因果不當;舒張期血流增加使S/D變小,代表阻力降低(胎盤功能佳)。","C":"錯。第二孕期後S/D隨週數「遞減」,非增加。","D":"正確。S/D=2.4屬正常,胎盤功能正常。"},"sources":["新文京《產科護理學》臍動脈都卜勒","胎兒監測"]}},"112110-N4-10":{"quick":"自我監測胎動:安靜坐或躺,計算胎動達10次所需時間,正常應在2小時內達到。","detail":{"background":"胎動計數法(常用):孕婦於固定時段、胎兒活躍時(常飯後),採安靜坐或側臥,「計算胎動達10次所需的時間」,正常應在「2小時內」達到10次;若2小時內少於10次或較平日明顯減少,應就醫評估(NST)。並非「每小時固定5次」之硬性標準。本題正確為「安靜坐躺計到10次,正常2小時內達到」(C)。","options":{"A":"非標準;不以每小時5次為硬指標。","B":"清晨臥床且「每小時5次」標準不正確。","C":"正確。計到10次,正常2小時內達到。","D":"散步中計數非建議方式(應安靜時)。"},"sources":["新文京《產科護理學》胎動計數","胎兒監測"]}},"112180-N4-5":{"quick":"羊膜穿刺術的適當時機與情況:懷孕16週、先前有習慣性流產者(可做染色體/遺傳檢查)。","detail":{"background":"羊膜穿刺術(amniocentesis):第二孕期約「16–18週」進行,適應症包括高齡(≥34–35歲)、前胎或家族染色體異常、習慣性流產(評估染色體因素)、母血篩檢高危(危險值高於1/270)等。選項中「懷孕16週、先前習慣性流產」符合時機(16週)與適應症(B)。其餘:12週做羊穿過早(CVS較適);母血篩檢1/720未達1/270高危切點(不一定需羊穿);慢性高血壓非羊穿染色體適應症。本題答案B。","options":{"A":"12週做羊膜穿刺過早(CVS較適)。","B":"正確。16週、習慣性流產,適合羊膜穿刺。","C":"慢性高血壓非羊穿(染色體)適應症。","D":"母血危險值1/720未達1/270高危切點。"},"sources":["新文京《產科護理學》羊膜穿刺適應症","產前遺傳"]}},"113030-N4-4":{"quick":"本題為送分題。前胎21三體、此次妊娠8週欲提早確診,選項時機/方法均有爭議。","detail":{"background":"唐氏症(21三體)產前診斷時機(正確概念):絨毛膜取樣(CVS)約10–13週、羊膜穿刺約16–18週為「確診」;頸部透明帶(NT)約11–14週、母血四指標約15–20週為「篩檢」。本題各選項將檢查與時機配錯(如「16–18週絨毛膜穿刺」「11–12週羊膜穿刺」「21–24週母血」「15–20週NT確診」),敘述均有誤,官方判定送分、各答案均給分。臨床應依正確時機選擇CVS或羊膜穿刺確診。","options":{"A":"時機/方法配錯;本題送分。","B":"時機/方法配錯;本題送分。","C":"母血為篩檢非確診;本題送分。","D":"NT為篩檢非確診;本題送分。"},"sources":["新文京《產科護理學》產前診斷時機","考選部 公告:本題送分"]}},"113100-N4-6":{"quick":"每日胎兒運動紀錄出現「24小時胎動少於4次」時需立即就醫。","detail":{"background":"胎動紀錄警訊:常用之就醫指標包括「12小時內胎動少於3次」或「24小時胎動少於4次(或10次)」、或胎動較平日明顯減少約一半;此提示胎兒可能窘迫,應立即就醫做NST/BPP。1小時5次、2小時10次胎動屬正常;「較前一天少20%」未達明顯減少(50%)的警訊程度。本題需就醫者為「24小時胎動少於4次」(B)。","options":{"A":"1小時5次屬正常。","B":"正確。24小時胎動少於4次需立即就醫。","C":"2小時10次屬正常。","D":"較前一天少20%未達明顯減少的警訊程度。"},"sources":["新文京《產科護理學》胎動警訊","胎兒監測"]}},"113100-N4-8":{"quick":"確認破水可用「羊齒狀結晶試驗(Fern test)」——羊水乾燥後在顯微鏡下呈羊齒狀結晶。","detail":{"background":"破水(胎膜早破)確認方法:(1)硝基(石蕊/Nitrazine)試紙——羊水偏鹼(pH≥7)使試紙變「藍色」(正常陰道分泌偏酸不變色);題述「呈粉紅色」描述錯誤。(2)羊齒狀結晶試驗(Fern test)——將陰道後穹窿液體抹於玻片乾燥後,顯微鏡下因羊水含氯化鈉與蛋白質而呈「羊齒狀(蕨類)結晶」,為確認破水的可靠方法。本題正確為「玻片塗抹見羊齒狀結晶(Fern test)」(D)。","options":{"A":"錯。硝基試紙遇羊水(偏鹼)變「藍色」,非粉紅色。","B":"硝酸鹽試紙非破水標準檢測。","C":"肉眼看羊齒狀碎片不可靠;需顯微鏡。","D":"正確。顯微鏡見羊齒狀結晶(Fern test)確認破水。"},"sources":["新文京《產科護理學》破水確認","Fern test"]}},"113180-N4-5":{"quick":"胎動監測衛教中「飯前或空腹時比較容易有明顯胎動」錯誤——飯後血糖上升胎動較明顯。","detail":{"background":"胎動監測衛教:建議「每天同一時段、胎兒活躍時(常為飯後)」於安靜坐或側臥、手放腹部專心計數;正常2小時內至少10次胎動;胎動較平日明顯減少(如少一半)為警訊需就醫。「飯前/空腹」時母體血糖較低,胎動通常較不明顯;飯後血糖上升胎動較活躍,故「飯前空腹較易有明顯胎動」為錯誤(C)。","options":{"A":"正確。每天同時段測,2小時至少10次胎動。","B":"正確。胎動比昨天少一半為不正常。","C":"錯誤(本題答案)。飯後(血糖上升)胎動較明顯,非飯前空腹。","D":"正確。可雙手放腹部觸摸感受胎動。"},"sources":["新文京《產科護理學》胎動監測","胎兒評估"]}},"115030-N4-5":{"quick":"40歲、10週(第一孕期)唐氏遺傳診斷,「母血四指標(AFP/hCG/inhibinA/雌三醇)」最不適當——四指標屬第二孕期。","detail":{"background":"依孕期選唐氏檢查:第一孕期(約10週)可做——頸部透明帶(NT,11–14週)、第一孕期母血(PAPP-A+游離β-hCG)、絨毛膜取樣(CVS,10–13週,確診染色體)。「母血四指標(AFP、hCG、inhibin A、雌三醇uE3)」是「第二孕期(15–20週)」的篩檢,不適用於10週。本例10週欲評估,選項A(四指標)時機不符,為最不適當;其餘NT、第一孕期母血、CVS皆適用此期。本題答案A。","options":{"A":"最不適當(本題答案)。母血四指標為第二孕期(15–20週)篩檢,不適用10週。","B":"適當。NT於11–14週。","C":"適當。第一孕期母血β-hCG+PAPP-A。","D":"適當。CVS約10–13週可染色體分析。"},"sources":["新文京《產科護理學》唐氏症篩檢時機","產前遺傳診斷"]}},"102110-N4-7":{"quick":"吃全素的孕婦最應補充維生素B12(動物性食物才有,植物性幾乎缺乏)。","detail":{"background":"素食孕婦營養:純植物性飲食最易缺乏「維生素B12」(幾乎僅存於動物性食物;缺乏致巨球性貧血、影響胎兒神經發育),其次鐵、鋅、鈣、維生素D、Omega-3也需注意。B12可由補充劑或強化食品(營養酵母、強化穀片、海苔海藻)補充。本題全素孕婦最應補B12(C)。","options":{"A":"維生素K由腸道菌與綠葉蔬菜可得,非素食主要缺乏。","B":"碘缺乏與素食關聯較小(可由海帶得)。","C":"正確。全素最易缺維生素B12。","D":"鈣可由深綠蔬菜、豆製品補,非最主要缺乏。"},"sources":["新文京《產科護理學》孕期營養","素食營養"]}},"105030-N4-4":{"quick":"孕前BMI 24(正常範圍上緣)單胞胎孕婦,整個孕期體重增加建議約11~15公斤。","detail":{"background":"孕期體重增加建議(IOM,依孕前BMI):過輕(BMI<18.5)增12.5–18 kg;正常(18.5–24.9)增11.5–16 kg;過重(25–29.9)增7–11.5 kg;肥胖(≥30)增5–9 kg。孕前BMI 24屬「正常範圍」,建議增約11–16(本題以11–15)公斤(C)。","options":{"A":"<7 kg適用肥胖者,過低。","B":"7–10 kg適用過重者。","C":"正確。BMI 24(正常)增約11–15公斤。","D":"16–18 kg偏多(適用過輕者上限)。"},"sources":["IOM 孕期體重增加建議","新文京《產科護理學》"]}},"106030-N4-9":{"quick":"橘子汁富含維生素C,可促進鐵質(非血基質鐵)的吸收。","detail":{"background":"鐵質吸收:植物性(非血基質)鐵吸收率較低,維生素C(如橘子汁、芭樂)可將三價鐵還原為易吸收的二價鐵、促進吸收,故補鐵時搭配維生素C食物效果佳;反之,牛奶/乳製品(鈣)、茶與咖啡(單寧、多酚)、全穀的植酸會「抑制」鐵吸收,應避免與鐵同時攝取。本題促進鐵吸收者為橘子汁(維C)(C)。","options":{"A":"麥片含植酸,抑制鐵吸收。","B":"牛奶含鈣,抑制鐵吸收。","C":"正確。橘子汁(維生素C)促進鐵吸收。","D":"熱可可含多酚,不利鐵吸收。"},"sources":["營養學 鐵吸收","新文京《產科護理學》孕期貧血"]}},"107030-N4-5":{"quick":"面對體重增加不足的孕婦,最適當的回應是先以開放式問句了解其飲食(「您目前吃的如何?」)。","detail":{"background":"營養衛教溝通原則:在給建議前應先「評估」——以開放式問句了解孕婦實際飲食型態、食慾、生活作息與困難,才能個別化指導;直接評斷「對小孩不好」「要增加蛋白質」會造成焦慮且未必切中問題。本例孕前BMI 24、25週僅增3公斤(略不足),最適當先「了解目前吃的如何」(D)再給建議。","options":{"A":"評斷式、易造成焦慮,未先評估。","B":"未先評估即給數字目標。","C":"直接指定增蛋白質,未先了解飲食。","D":"正確。先以開放式問句了解其飲食型態。"},"sources":["新文京 營養衛教溝通","產科護理"]}},"107110-N4-6":{"quick":"採全素食的孕婦容易缺乏維生素B12、鐵、鋅。","detail":{"background":"全素(vegan)孕婦營養缺口:維生素B12(僅動物性食物,缺乏致貧血與神經損傷)、鐵(植物性非血基質鐵吸收差)、鋅(植物性吸收受植酸影響)為主要易缺;另需注意鈣、維生素D、Omega-3。可由補充劑與強化食品、搭配維生素C促鐵吸收。本題全素易缺「B12、鐵、鋅」(B)。","options":{"A":"維生素D雖需注意,但本題標準組合為B12、鐵、鋅。","B":"正確。全素易缺B12、鐵、鋅。","C":"維生素C素食不易缺(蔬果豐富)。","D":"維生素C不易缺。"},"sources":["營養學 素食","新文京《產科護理學》孕期營養"]}},"108020-N4-5":{"quick":"孕前BMI 30(肥胖)單胞胎孕婦,整個孕期體重宜增加約5~9公斤。","detail":{"background":"肥胖(BMI≥30)孕婦的體重管理:整個孕期體重增加建議僅約「5–9公斤」(避免過度增重增加妊娠糖尿病、子癇前症、巨嬰與剖腹產風險);但孕期「不應減重或採極低熱量飲食」(可能影響胎兒),應均衡飲食、適度增重。本題BMI 30孕婦宜增5–9公斤(B)。","options":{"A":"錯。孕期不採極低熱量飲食。","B":"正確。肥胖孕婦整孕期增約5–9公斤。","C":"錯。孕期不執行減重計畫。","D":"錯。體重應穩定漸增,非延後到第三孕期。"},"sources":["IOM 體重建議","新文京《產科護理學》肥胖孕婦"]}},"109110-N4-5":{"quick":"孕前BMI 23.1(正常)單胞胎,第三孕期每月體重增加約1.5~2.0公斤較適當。","detail":{"background":"正常BMI孕婦的體重增加分配:第一孕期增加少(約1–2公斤,孕吐期);第二、三孕期穩定增加,正常BMI者第二、三孕期每週約增0.4公斤(每月約1.5–2公斤)。整孕期約增11.5–16公斤。第一孕期若孕吐體重未增不需強迫加熱量;第二孕期每月不應「少於1公斤」。本題第三孕期每月增1.5–2.0公斤適當(C)。","options":{"A":"第一孕期體重未增不需強迫增熱量。","B":"第二孕期每月應約增1.5–2公斤,非少於1公斤。","C":"正確。第三孕期每月增約1.5–2.0公斤。","D":"整孕期約增11.5–16公斤,非7–10(那是過重者)。"},"sources":["IOM 體重建議","新文京《產科護理學》"]}},"109110-N4-8":{"quick":"血壓148/94 mmHg、尿蛋白1+(疑子癇前症傾向),護理指導應「減少鹽分攝取」。","detail":{"background":"孕期血壓升高(148/94)合併尿蛋白(1+)提示妊娠高血壓/子癇前症傾向。飲食護理:適度「減少鈉鹽攝取」以減輕水鈉滯留與血壓負擔、攝取足量優質蛋白(子癇前症常尿蛋白流失,不應過度限蛋白)、均衡熱量與鈣。應避免高脂、高鈉。本題最適當為「減少鹽分攝取」(B);增脂、限蛋白、增鈉皆不適當。","options":{"A":"增加脂肪不利血壓與體重。","B":"正確。減少鹽分以減輕水鈉滯留與血壓。","C":"不宜過度限蛋白(子癇前症有蛋白流失)。","D":"增加鈉會升高血壓,錯誤。"},"sources":["新文京《產科護理學》妊娠高血壓飲食","子癇前症"]}},"112030-N4-7":{"quick":"素食孕婦易缺維生素B12,可多攝取海苔、海藻等補充。","detail":{"background":"素食孕婦缺B12的補充:B12主要存於動物性食物,全素者可由「強化食品、營養酵母、海苔/海藻類(含部分B12類似物)」或補充劑攝取;醫學上常建議直接補充B12補充劑以確保足量。題目選項以「海苔海藻」為答案(C)。維生素A、葉酸(綠色蔬菜豐富)、鈣(牛奶=非素食純植物來源,豆製品/深綠蔬菜可補)非素食最缺。本題正確為B12+海苔海藻(C)。","options":{"A":"素食富含深色蔬菜,不易缺維生素A。","B":"綠色蔬菜葉酸豐富,素食不易缺。","C":"正確。素食易缺B12,可攝取海苔海藻。","D":"牛奶起司非純素來源;素食鈣可由豆製品/深綠蔬菜補。"},"sources":["營養學 B12","新文京《產科護理學》孕期營養"]}},"112110-N4-2":{"quick":"體重增加與肚子大小若符合懷孕週數,鼓勵「繼續維持」即可。","detail":{"background":"孕期體重與宮底評估:孕前BMI 20(正常)、20週體重增3公斤、宮底高約肚臍上一橫指——與妊娠週數相符(20週宮底約達肚臍)。最合適回答是肯定其「體重增加與肚子大小符合週數,繼續維持」(C),而非評斷太少/太多而加減熱量。過度加300卡點心或減熱量都不恰當。本題答案C。","options":{"A":"錯。體重與週數相符,不需額外加300卡。","B":"錯。並未過多,不需減熱量。","C":"正確。符合週數,鼓勵繼續維持。","D":"錯。體重增加亦符合週數,不需加點心。"},"sources":["IOM 體重建議","新文京《產科護理學》產前評估"]}},"112110-N4-3":{"quick":"第一孕期常有孕吐,是三個孕期中體重增加最少的時期。","detail":{"background":"孕期熱量與體重分配:第一孕期(常孕吐、食慾差)體重增加最少(約1–2公斤),熱量需求增加也最少(約僅多70 kcal/天);第二孕期起熱量與體重穩定增加(約多340 kcal/天)、第三孕期約多450 kcal/天,提供胎兒快速生長。熱量需求「並非平均分配三孕期」。本題正確為「第一孕期孕吐、體重增加最少」(B)。","options":{"A":"錯。熱量與體重非平均分配三孕期。","B":"正確。第一孕期孕吐,體重增加最少。","C":"第二孕期熱量增加供母體與胎兒生長(描述不全)。","D":"第三孕期熱量主要供胎兒快速生長,非胎盤。"},"sources":["IOM/孕期熱量","新文京《產科護理學》孕期營養"]}},"112180-N4-6":{"quick":"素食者在懷孕期較易缺乏維生素B12。","detail":{"background":"再次強調:純植物性飲食最易缺「維生素B12」(僅動物性食物含足量),孕期缺B12影響母體造血與胎兒神經發育,須由強化食品或補充劑補足;維生素A(深色蔬果)、B2、K素食不易缺。本題答案為維生素B12(C)。","options":{"A":"維生素A素食(深色蔬果)不易缺。","B":"維生素B2素食不易缺。","C":"正確。素食較易缺維生素B12。","D":"維生素K由綠葉蔬菜與腸道菌可得。"},"sources":["營養學 B12","新文京《產科護理學》"]}},"113100-N4-2":{"quick":"葉酸可經由新鮮深綠色蔬菜及瘦肉(肝臟、豆類)獲取;應於孕前及孕早期補充。","detail":{"background":"葉酸(folic acid)與神經管缺陷:孕前1個月至懷孕前12週補充葉酸(約400–600 µg/天)可降低胎兒神經管缺陷(脊柱裂、無腦);故「懷孕3個月後才補」效果差(應孕前/孕早期)。葉酸富含於深綠色蔬菜、瘦肉/肝臟、豆類、強化穀片;維生素C與葉酸吸收非主要關係(維C促鐵吸收)。素食者更需注意(但非「一定」特別,且葉酸蔬菜豐富)。本題最適當為「由新鮮深綠蔬菜及瘦肉獲取」(D)。","options":{"A":"錯。應孕前/孕早期補充,3個月後才補效果差。","B":"葉酸蔬菜豐富,非素食特別缺。","C":"維生素C促鐵吸收,與葉酸非主要關係。","D":"正確。葉酸由深綠蔬菜及瘦肉獲取。"},"sources":["新文京《產科護理學》葉酸","神經管缺陷預防"]}},"113180-N4-34":{"quick":"妊娠31週早產兒生理特徵敘述中,「肺泡表面張力素不足易出現持續性肺動脈高壓」為錯誤。","detail":{"background":"早產兒(31週、1628公克)生理特徵:腎小管再吸收與濃縮功能不成熟(可有蛋白尿、糖尿);肝臟未成熟+維生素K低下→凝血功能不良(易出血);乳糖酶等消化酶不足→暫時性乳糖吸收不良;肺泡表面張力素(surfactant)不足→易發生「新生兒呼吸窘迫症候群(RDS)」(而非持續性肺動脈高壓PPHN;PPHN多見於足月/過期兒、胎便吸入、缺氧)。故「surfactant不足易出現持續性肺動脈高壓」為錯誤(D)。","options":{"A":"正確。腎小管功能差,可出現蛋白尿與尿糖。","B":"正確。維生素K低下、凝血因子不足易出血。","C":"正確。乳糖酶不足致暫時性乳糖吸收不良。","D":"錯誤(本題答案)。surfactant不足致RDS,非持續性肺動脈高壓。"},"sources":["新文京《兒科護理學》早產兒","新生兒RDS vs PPHN"]}},"114170-N4-3":{"quick":"孕期鈣攝取不足會增加孕婦骨質疏鬆風險,並影響胎兒骨骼發育。","detail":{"background":"孕期鈣需求:胎兒骨骼牙齒發育需大量鈣,若母體鈣攝取不足,胎兒會自母體骨骼提取鈣,增加孕婦「骨質流失/骨質疏鬆」風險,並可能影響胎兒骨骼發育與母體腿部抽筋。建議孕期鈣約1000 mg/天(由乳製品、深綠蔬菜、豆製品、小魚乾)、搭配維生素D。本題鈣不足最可能導致「孕婦骨鬆風險+影響胎兒骨骼發育」(A)。(碘缺乏才致呆小症;鐵缺乏致貧血。)","options":{"A":"正確。鈣不足增孕婦骨鬆風險並影響胎兒骨骼。","B":"呆小症(克汀症)是碘/甲狀腺素缺乏,非鈣。","C":"貧血主要與鐵/葉酸/B12缺乏相關。","D":"便秘食慾不振非鈣不足主要結果。"},"sources":["新文京《產科護理學》孕期鈣","孕期營養"]}},"101030-N4-26":{"quick":"產檢時白帶增多且會陰搔癢屬「異常」(疑感染),應請醫師進一步檢查,不可自行陰道灌洗。","detail":{"background":"孕期白帶:生理性白帶為白色、無臭、量增,屬正常;但若「合併外陰搔癢、顏色/氣味改變」則疑陰道感染(念珠菌等),屬異常,應就醫檢查與治療,不可自行用陰道灌洗(破壞菌叢、增上行感染)或硼酸沖洗。本題最正確護理指導為「此為異常,請醫師詳細檢查」(C)。","options":{"A":"錯。合併搔癢屬異常,需處理。","B":"錯。不可陰道灌洗(增感染)。","C":"正確。屬異常,請醫師進一步檢查。","D":"錯。不宜自行硼酸沖洗。"},"sources":["新文京《產科護理學》孕期白帶","陰道感染"]}},"102110-N4-9":{"quick":"懷孕危險徵兆(應立即就醫)包括:水狀液體自陰道流出(破水)、胎動減少、持續頭痛。","detail":{"background":"孕期危險徵兆(需立即就醫):陰道出血、「水狀液體流出(破水)」、「胎動明顯減少或消失」、「持續頭痛/視力模糊/上腹痛(子癇前症徵兆)」、臉手嚴重水腫、發燒、持續嘔吐、規則宮縮過早(早產)。姿位性低血壓、小腿靜脈曲張、背痛多為「常見不適」非危險徵兆。本題危險徵兆組合為(2)(3)(4)即234(B)。","options":{"A":"含姿位性低血壓(常見不適),非危險徵兆。","B":"正確。水狀液體流出(2)+胎動減少(3)+持續頭痛(4)。","C":"含小腿靜脈曲張(常見不適)。","D":"含姿位性低血壓與背痛(常見不適)。"},"sources":["新文京《產科護理學》孕期危險徵兆","產前衛教"]}},"102110-N4-30":{"quick":"飲食生活指導:每晚臥床休息至少10小時、每餐飯後躺臥休息至少半小時(增進胎盤血流、利胎兒發育)。","detail":{"background":"本題情境為需多休息的孕婦(如胎兒生長受限/高危),飲食與生活護理指導重點:充足休息(每晚臥床≥10小時、餐後左側臥休息)以增加子宮胎盤血流;採「左側臥」(非右側,左側臥促下腔靜脈回流、增胎盤灌流);孕期不採低鹽至12–20公克(過量,且體重增加範圍非絕對12–16);不會常規從孕期到產後給抗凝血劑預防中風。本題最適當為「每晚臥床≥10小時、餐後躺臥≥半小時」(A)。","options":{"A":"正確。充足臥床休息與餐後休息可增胎盤血流。","B":"錯。鹽分12–20公克過量;體重範圍非絕對。","C":"錯。應採「左側臥」促下腔靜脈回流(非左或右皆可)。","D":"錯。不會常規孕期到產後給抗凝血劑。"},"sources":["新文京《產科護理學》孕期休息","胎盤灌流"]}},"103030-N4-31":{"quick":"妊娠30週腹部繃緊,應先臥床休息並觀察次數,若「1小時內≥4次」應即就醫(早產徵兆)。","detail":{"background":"早產徵兆衛教:妊娠20–37週出現「規則子宮收縮(1小時≥4次或10分鐘≥1次)」、合併下腹/腰痠悶脹、陰道分泌增加或出血、破水感,需就醫評估早產。偶發無規則的腹部繃緊(Braxton Hicks假性宮縮)休息可緩解,屬正常。本題最合適指導為「臥床休息觀察,1小時內≥4次應即就醫」(C),兼顧區辨假性宮縮與早產且不過度恐慌或輕忽。","options":{"A":"過度。先區辨假性宮縮,非一出現繃緊就趕到院。","B":"胎動明顯非早產判斷依據。","C":"正確。觀察次數,1小時≥4次應就醫。","D":"過度輕忽;規則宮縮可能為早產,需衛教就醫指標。"},"sources":["新文京《產科護理學》早產徵兆","產前衛教"]}},"104100-N4-20":{"quick":"評估產婦自解尿液是否順暢,「側臥評估尿道口是否腫脹」為不合宜的評估技巧。","detail":{"background":"產後/孕產婦排尿評估:評估膀胱脹尿可於「恥骨聯合上方叩診(脹尿呈濁/鈍音、可觸膨大膀胱)」、觀察「子宮底是否被脹大膀胱推高偏離中線」(膀胱脹會使宮底上移、偏右)、注意「產後6小時未解尿」需處置(防尿瀦留影響子宮收縮)。「側臥檢視尿道口是否腫脹」無法評估「解尿是否順暢/膀胱是否脹滿」,為不合宜技巧(D)。","options":{"A":"合宜。恥骨上方叩診鈍音提示脹尿。","B":"合宜。子宮底偏離中線提示膀胱脹。","C":"合宜。產後6小時未解尿需評估處置。","D":"不合宜(本題答案)。看尿道口腫脹無法評估排尿是否順暢。"},"sources":["新文京《產科護理學》產後排尿評估","膀胱脹評估"]}},"105030-N4-5":{"quick":"曾18週流產者孕期性生活宜「避免性交,但可有擁抱、親吻等親密」。","detail":{"background":"孕期性生活指導:一般正常妊娠無禁忌;但「有流產/早產史、前置胎盤、出血、破水、子宮頸閉鎖不全、早產徵兆」者應避免性交(精液前列腺素與子宮頸刺激可能誘發宮縮)。本例G2P1、前胎18週流產(習慣性流產/中期流產風險),宜「避免性交,但可保有擁抱、親吻等非性交親密」維繫關係。本題最適當為D。","options":{"A":"錯。有流產史者非「沒有禁忌」。","B":"姿勢調整非此例重點。","C":"錯。不需等到破水才禁;有流產史宜先避免。","D":"正確。避免性交,可有擁抱親吻。"},"sources":["新文京《產科護理學》孕期性生活","習慣性流產"]}},"105030-N4-13":{"quick":"胎盤娩出後血壓170/98(高血壓),促進子宮收縮「不宜用Methergine(麥角鹼)」——會升高血壓。","detail":{"background":"產後子宮收縮促進與用藥:麥角新鹼(Methergine/ergonovine)能強力收縮子宮防產後出血,但會「使血管收縮、升高血壓」,故「高血壓、子癇前症、心臟病」孕產婦「禁用」。本例產後血壓170/98(高血壓),不宜肌注Methergine;可改用催產素(oxytocin)。促進子宮收縮的安全措施:按摩子宮底、刺激乳房(促內生性催產素)、確認膀胱排空。本題「不適宜」者為「肌注Methergine」(B)。","options":{"A":"適宜。按摩子宮底促收縮。","B":"不適宜(本題答案)。高血壓者禁用Methergine(升血壓)。","C":"適宜。刺激乳房促內生性催產素。","D":"適宜。確認膀胱不脹利子宮收縮。"},"sources":["藥理 Methergine 禁忌","新文京《產科護理學》產後出血"]}},"105030-N4-31":{"quick":"減緩懷孕期下背痛的運動「不」包括凱格爾運動(凱格爾針對骨盆底肌、非下背)。","detail":{"background":"孕期下背痛運動:骨盆傾斜運動(pelvic tilt/搖擺骨盆)、腹肌強化、腰背伸展、貓牛式等可緩解下背痛;搭配良好姿勢、避免久站、平底鞋、托腹帶。凱格爾運動是訓練「骨盆底肌」(預防尿失禁、助分娩),「不是」緩解下背痛的運動。本題問「錯誤」者為凱格爾運動(A)。","options":{"A":"錯誤(本題答案)。凱格爾針對骨盆底肌,非緩解下背痛。","B":"正確。腹肌強化運動有助下背痛。","C":"正確。骨盆傾斜運動緩解下背痛。","D":"正確。腰背伸展運動緩解下背痛。"},"sources":["新文京《產科護理學》孕期運動","下背痛"]}},"105090-N4-9":{"quick":"妊娠36週平躺後眩暈、冒冷汗、收縮壓下降,為仰臥位低血壓症候群,最優先協助孕婦採「左側臥」。","detail":{"background":"仰臥位低血壓症候群(supine hypotensive syndrome):妊娠後期仰臥時,增大的子宮壓迫下腔靜脈,使靜脈回流與心輸出量下降,出現頭暈、虛弱、冒冷汗、血壓下降、胎心可能減速。最優先處置是「協助孕婦採左側臥(或側臥)」——解除子宮對下腔靜脈的壓迫、恢復回流與血壓,症狀即緩解。本題最優先為左側臥(D),而非先給氧、毛毯或坐床緣。","options":{"A":"毛毯烤燈非此症首要。","B":"給氧為輔,首要是解除下腔靜脈壓迫。","C":"坐床緣非首要。","D":"正確。協助採左側臥解除子宮對下腔靜脈壓迫。"},"sources":["新文京《產科護理學》仰臥位低血壓","孕期姿勢"]}},"106111-N4-6":{"quick":"生產球(分娩球)指導中「大小選擇需參考體重」錯誤——應參考孕婦「身高」選球徑。","detail":{"background":"生產球(birth/分娩球)使用:孕期即可開始練習,坐於球上輕搖、骨盆運動可放鬆會陰與骨盆底肌、緩解下背痛、促進胎頭下降;選球大小依「身高」決定(坐於球上時髖、膝約呈90度);需有人陪伴或扶持以防跌倒,勿獨自練習。本題問「錯誤」者為「大小選擇需參考體重」(B)——應參考身高。","options":{"A":"正確。孕期即可開始練習生產球。","B":"錯誤(本題答案)。生產球大小依身高選擇,非體重。","C":"正確。坐姿使用可放鬆會陰部肌肉。","D":"正確。不宜獨自練習,需有人陪伴。"},"sources":["新文京《產科護理學》生產球","分娩準備"]}},"108110-N4-9":{"quick":"懷孕11週頻尿但無解尿困難,適當指導是「仍維持每日適當的飲水量」。","detail":{"background":"孕早期頻尿:因子宮增大壓迫膀胱與血流量增加致尿量增多,屬正常生理(孕中期子宮上升後緩解、孕末期再現)。指導:維持「每日適當飲水量」(不可為減少頻尿而限水,以免脫水與泌尿道感染)、可日間補水、睡前略減、勿憋尿、做凱格爾運動。無解尿困難則不需立即就醫。本題正確為「仍維持每日適當飲水量」(B)。","options":{"A":"錯。不應為頻尿而減少白天飲水(易脫水/UTI)。","B":"正確。仍維持每日適當飲水量。","C":"過度。無解尿困難不需馬上就醫。","D":"錯。不需刻意拉長排尿間隔/憋尿。"},"sources":["新文京《產科護理學》孕期頻尿","孕期不適"]}},"109030-N4-2":{"quick":"具有伸展會陰部肌肉功用的產前運動為「蹲踞(蹲下)運動」。","detail":{"background":"產前運動與功用:蹲踞運動(squatting)——伸展會陰與大腿內側肌肉、增加骨盆出口、利於第二產程;盤腿(裁縫)坐——伸展大腿內側與骨盆;凱格爾——訓練骨盆底肌;骨盆傾斜/搖擺——緩解下背痛。本題「伸展會陰部肌肉」最相關者為蹲踞運動(C)。","options":{"A":"扭轉骨盆運動主緩解下背,非伸展會陰。","B":"大腿伸展運動非專指會陰。","C":"正確。蹲踞運動伸展會陰部肌肉。","D":"抬腿運動促下肢循環,非伸展會陰。"},"sources":["新文京《產科護理學》產前運動","分娩準備"]}},"110030-N4-5":{"quick":"第三妊娠期坐姿應「挺直背脊,身體重量壓力集中在坐骨」。","detail":{"background":"孕期姿勢人體工學:坐姿應「背脊挺直、選有靠背的椅子、雙腳平踏地面、重量落在坐骨」以減少下背負擔;不宜身體後傾使重量壓尾骨、不宜無靠背或大腿外八;坐下時可手扶椅面、先坐前緣再將臀部移至椅子「深處/靠背」(非僅坐前1/3)。本題正確為「坐姿挺直背脊、重量集中坐骨」(A)。","options":{"A":"正確。挺直背脊、重量落坐骨。","B":"錯。後傾使重量壓尾骨不佳。","C":"錯。應選有靠背椅、雙腳平踏,非外八無靠背。","D":"錯。應坐至椅子深處靠背,非僅坐前1/3。"},"sources":["新文京《產科護理學》孕期姿勢","人體工學"]}},"110110-N4-10":{"quick":"強化骨盆肌肉群的產前運動包括:盤腿坐姿(1)、凱格爾(2)、蹲踞(3)。","detail":{"background":"產前運動分類:強化/伸展骨盆與骨盆底相關者——盤腿(裁縫)坐姿(伸展大腿內側與骨盆)、凱格爾運動(強化骨盆底肌)、蹲踞運動(伸展會陰、增骨盆出口);膝胸臥式用於矯正胎位(後傾子宮/臀位),腹肌收縮運動主要強化腹部核心。本題強化骨盆肌肉群者為(1)(2)(3)即123(A)。","options":{"A":"正確。盤腿坐(1)+凱格爾(2)+蹲踞(3)。","B":"含膝胸臥式(矯正胎位,非強化骨盆肌)。","C":"含膝胸臥式。","D":"含腹肌收縮(核心,非骨盆肌群為主)。"},"sources":["新文京《產科護理學》產前運動","分娩準備"]}},"112180-N4-3":{"quick":"妊娠30週頻尿、漏尿的指導中「白天減少水分攝取」不適當——不應限水,以免脫水與泌尿道感染。","detail":{"background":"孕末期頻尿/壓力性漏尿:因子宮與胎頭壓迫膀胱。適當指導:教導凱格爾運動強化骨盆底肌、維持會陰清潔乾燥勤換內褲、使用托腹帶減輕腹壓、勿憋尿、可日間補水睡前略減;「不應白天大幅減少水分攝取」(易脫水、尿濃縮刺激膀胱、增泌尿道感染)。本題「較不適當」者為「白天減少水分攝取」(C)。","options":{"A":"適當。凱格爾運動強化骨盆底肌。","B":"適當。維持會陰清潔乾燥、勤換內褲。","C":"不適當(本題答案)。不應白天大幅減水(易脫水/UTI)。","D":"適當。托腹帶減腹壓、勿憋尿。"},"sources":["新文京《產科護理學》孕期頻尿/漏尿","孕期不適"]}},"114030-N4-5":{"quick":"懷孕會陰按摩指導中「以拇指按壓陰道向上並往兩側推」描述不適當(按摩方向/手法應向下、向兩側溫和伸展)。","detail":{"background":"孕期會陰按摩(預產期前約6週開始,增加會陰彈性、減少分娩裂傷/會陰切開):洗淨手、塗潤滑油,將拇指(或食指)放入陰道約3–5公分,以「向下(朝肛門方向)及往兩側」溫和伸展按壓會陰組織,維持數十秒、規律進行;可採一腳跨踩於椅子的姿勢。「以拇指向上按壓並往兩側推」方向不當(向上朝恥骨非會陰伸展方向),為不適當(D)。","options":{"A":"適當。可於預產期前約6週開始。","B":"適當。採一腳跨踩椅子的姿勢。","C":"適當。手指塗潤滑油放入陰道約5公分。","D":"不適當(本題答案)。應向下及兩側伸展,非向上按壓。"},"sources":["新文京《產科護理學》會陰按摩","分娩準備"]}},"115030-N4-3":{"quick":"孕吐護理指導中「進食後儘快喝水或刷牙」不合適——飯後立即喝大量水/刷牙易誘發噁心。","detail":{"background":"孕吐(噁心嘔吐)護理:與hCG濃度相關,前三個月(約8–12週)最明顯;處置——少量多餐、避免空腹與油膩/刺激氣味食物、起床前先吃乾的蘇打餅、兩餐間補水(避免「進食時或飯後立即」大量喝水)、嚴重者(妊娠劇吐)可用維生素B6±抗組織胺。「進食後儘快喝水或刷牙」會刺激咽部/胃而誘發噁心,不合適(D)。","options":{"A":"正確。孕吐與hCG相關,前三個月最明顯。","B":"正確。避免空腹與油膩食物對輕症有效。","C":"正確。嚴重孕吐常用維生素B6治療。","D":"不合適(本題答案)。飯後立即喝水/刷牙易誘發噁心。"},"sources":["新文京《產科護理學》孕吐","孕期不適"]}},"101110-N4-46":{"quick":"孕婦參加媽媽教室、學習換尿布,屬母性認同中的「角色扮演(role play)」。","detail":{"background":"母性角色獲得(Rubin/Mercer)的認同行為:模仿(mimicry,觀察學習他人母親行為)、角色扮演(role play,實際練習照護技能如換尿布、餵奶、沐浴)、幻想(fantasy,想像與胎兒/育兒情景)、內射–投射–拒絕(吸收他人經驗並篩選)、悲傷工作(放下舊角色)。本題「參加媽媽教室、學換尿布」是實際演練照護技能,屬「角色扮演」(A)。","options":{"A":"正確。實際練習換尿布為角色扮演。","B":"模仿是觀察他人行為,非親自演練技能。","C":"內射/外射是吸收與篩選他人經驗。","D":"認同為整體形成母親角色的歷程。"},"sources":["新文京《產科護理學》母性角色","Rubin/Mercer 理論"]}},"103030-N4-5":{"quick":"常夢見胎兒異常(缺手缺腳)是「妊娠第三期」常見的心理反應。","detail":{"background":"妊娠各期心理(Rubin):第一孕期——矛盾、震驚、接受懷孕事實、注意力轉向自己;第二孕期——接受胎兒為獨立個體、與胎兒建立情感連結(感受胎動)、較平穩愉悅;第三孕期——身體笨重不適、擔心生產與胎兒健康,常出現「夢見胎兒畸形/生產意外」的焦慮夢境,並開始準備分娩與新生兒用品(築巢behavior)。本題「夢見胎兒缺手缺腳」為第三孕期(C)。","options":{"A":"第一孕期以矛盾、接受懷孕為主。","B":"第二孕期較平穩、與胎兒連結。","C":"正確。第三孕期常焦慮、夢見胎兒異常。","D":"計畫懷孕期非此情境。"},"sources":["新文京《產科護理學》妊娠心理","Rubin 理論"]}},"103100-N4-2":{"quick":"孕婦小心避開人群、保護腹部,反映「身體界限(body boundary)」的調適。","detail":{"background":"孕期身體心理概念:身體心像(body image)——對自己外型改變的看法;身體界限(body boundary)——對「身體所佔空間/安全範圍」的覺知,孕婦因腹部增大,會擴大其身體界限感、主動保護腹部、避開擁擠以防碰撞。本題「避開人群、保護腹部」屬身體界限的展現(A)。","options":{"A":"正確。保護腹部、避開人群反映身體界限。","B":"身體心像指對外型改變的看法。","C":"身體覺察為一般概念,非此特定行為。","D":"身體調適用詞籠統。"},"sources":["新文京《產科護理學》孕期身體心理","母性調適"]}},"103100-N4-4":{"quick":"孕婦因孕前服感冒藥擔心畸胎想墮胎,最適當是先「詢問藥名、劑量與LMP」做初步評估。","detail":{"background":"用藥致畸風險評估與諮商:藥物對胎兒影響取決於「藥物種類、劑量、暴露的妊娠週數(器官形成期約3–8週最敏感)」。面對焦慮想墮胎的孕婦,護理應先「蒐集資料(藥名、劑量、最後一次月經/暴露週數)」做初步評估、再轉介醫師依實證判斷,而非直接保證「不會異常」、安排檢查或說「會自然流產不需處理」。本題最適當為「詢問藥名、劑量及LMP做初步評估」(B)。","options":{"A":"過早保證「不會異常」,未評估。","B":"正確。先詢問藥名、劑量、LMP做初步評估。","C":"直接安排檢查前應先評估暴露資訊。","D":"錯。不應草率說會自然流產不需處理。"},"sources":["新文京《產科護理學》用藥諮商","畸胎原"]}},"104100-N4-9":{"quick":"Rubin妊娠心理:第二妊娠期婦女開始將自己與胎兒視為一體(建立情感連結)。","detail":{"background":"Rubin妊娠各期心理任務:第一孕期——對懷孕「矛盾」、易受傷害感、注意力集中於自己、尚未實在;第二孕期——胎動使懷孕「實在化」,婦女開始將胎兒視為自己的一部分(視為一體)、與胎兒建立情感連結;第三孕期——準備分娩與母親角色、焦慮生產與胎兒安危。本題正確為「第二妊娠期將自己與胎兒視為一體」(C)。","options":{"A":"快樂滿足實在感較屬第二孕期(感受胎動後)。","B":"易受傷害、注意自己屬第一孕期。","C":"正確。第二孕期將自己與胎兒視為一體。","D":"不確定情緒不穩屬第一孕期。"},"sources":["新文京《產科護理學》Rubin 妊娠心理","母性調適"]}},"105030-N4-2":{"quick":"準父親擬娩症候群(couvade syndrome)症狀:焦慮沮喪、食慾不振噁心嘔吐、疲累失眠(123)。","detail":{"background":"擬娩症候群(couvade syndrome):準父親在配偶懷孕期間「同理性」出現類似孕婦的身心症狀——焦慮、情緒低落、食慾不振、噁心嘔吐、體重變化、疲倦、失眠、牙痛等,反映其投入與壓力,多隨分娩後緩解。「逃避學習父親角色」(4)屬角色適應不良/退縮,非擬娩症候群的症狀。本題擬娩症候群為(1)(2)(3)即123(A)。","options":{"A":"正確。焦慮沮喪(1)+食慾不振噁心嘔吐(2)+疲累失眠(3)。","B":"含逃避學習父親角色(4),非擬娩症候群。","C":"含(4),錯誤。","D":"含(4),錯誤。"},"sources":["新文京《產科護理學》準父親心理","擬娩症候群"]}},"107110-N4-3":{"quick":"懷孕8週反覆思考「繼續工作或當專職母親」屬「矛盾心理(ambivalence)」。","detail":{"background":"第一孕期心理以「矛盾(ambivalence)」為核心:即使是計畫中的懷孕,孕婦對於角色轉換、生活與生涯改變(如工作vs.育兒)、身體變化常同時存在「期待與抗拒」的複雜情緒,屬正常調適過程。護理應同理、接納其矛盾、提供資訊支持決策。本題「反覆思考工作或當母親」為矛盾心理(D)。","options":{"A":"接受懷孕事實是調適後的結果,非此矛盾掙扎。","B":"注意力集中自己屬第一孕期,但本題核心是抉擇矛盾。","C":"不切實際幻想非此情境。","D":"正確。工作vs.母職的掙扎為矛盾心理。"},"sources":["新文京《產科護理學》妊娠心理","第一孕期"]}},"108020-N4-3":{"quick":"增進母親與胎兒情感連結,最適當是「鼓勵孕婦與胎兒說話」。","detail":{"background":"促進母嬰依附(maternal-fetal attachment)的護理:鼓勵孕婦「與胎兒說話、撫摸腹部、回應胎動、為胎兒取小名、想像胎兒」等,能增進情感連結;第二孕期(16週)感受胎動後尤其有助。監測胎動頻率、討論舒適方法、參觀產房屬其他面向,非「情感連結」最直接者。本題最適當為「鼓勵與胎兒說話」(C)。","options":{"A":"討論孕期舒適屬不適處置,非情感連結。","B":"監測胎動頻率屬胎兒監測。","C":"正確。鼓勵與胎兒說話增進情感連結。","D":"參觀產房屬分娩準備。"},"sources":["新文京《產科護理學》母胎依附","母性角色"]}},"108020-N4-14":{"quick":"子宮頸口全開協助生產時「把手擋在會陰部禁止胎兒娩出」為不合適措施。","detail":{"background":"第二產程(子宮頸全開)協助生產:應監測胎心率、保護會陰(以手「支托」會陰、控制胎頭「緩慢」娩出以減少撕裂,而非「擋住禁止娩出」)、預先加熱新生兒處理檯與備妥用物、可讓準父親著隔離衣陪產。「用手擋在會陰禁止胎兒娩出」會造成傷害(壓迫、影響娩出),為不合適(A)。","options":{"A":"不合適(本題答案)。應支托會陰控制緩慢娩出,非擋住禁止娩出。","B":"合適。準父親著隔離衣陪產。","C":"合適。監測胎心率變化。","D":"合適。確認預熱新生兒處理檯。"},"sources":["新文京《產科護理學》第二產程","會陰保護"]}},"109030-N4-3":{"quick":"對懷孕產生負向感覺、擔心胎兒斷手斷腳或缺陷,最常見於「妊娠第三期」。","detail":{"background":"第三孕期心理:身體笨重不適、行動受限、睡眠差,對「分娩疼痛、生產過程、胎兒是否健康正常」產生焦慮,常見「夢見或擔心胎兒畸形(斷手斷腳)」的負向情緒,並開始築巢、準備分娩。護理以同理、提供生產資訊、減輕焦慮為主。本題答案為第三妊娠期(C)。","options":{"A":"第一孕期以矛盾、接受懷孕為主。","B":"第二孕期較平穩、與胎兒連結。","C":"正確。第三孕期擔心胎兒缺陷的焦慮最常見。","D":"無第四妊娠期(產後為第四孕期但非此情境)。"},"sources":["新文京《產科護理學》妊娠心理","第三孕期"]}},"109110-N4-7":{"quick":"孕28週練習母乳哺餵姿勢與嬰兒沐浴,屬母性認同的「角色扮演」。","detail":{"background":"母性角色認同行為(同前):實際「練習照護技能(哺乳姿勢、沐浴、換尿布)」屬「角色扮演(role play)」;模仿是觀察學習、幻想是想像情景、內射–外射是吸收與篩選他人經驗。本題練習哺餵與沐浴為角色扮演(A)。","options":{"A":"正確。練習哺餵與沐浴為角色扮演。","B":"模仿為觀察學習他人。","C":"內射-接受為吸收他人經驗。","D":"幻想-外射為想像與投射。"},"sources":["新文京《產科護理學》母性角色","Rubin/Mercer"]}},"110110-N4-7":{"quick":"第一妊娠期婦女的心理反應以「憂喜參半的矛盾心理」最為適當。","detail":{"background":"第一孕期心理特徵:矛盾(ambivalence,期待與抗拒並存)、震驚與不確定、注意力轉向自己與身體變化、開始「接受懷孕事實」。其中最具代表性的是「憂喜參半的矛盾心理」。準備新角色、身體界限改變較屬中後期。本題答案為矛盾心理(A)。","options":{"A":"正確。第一孕期以憂喜參半的矛盾心理為特徵。","B":"接受懷孕事實是調適結果。","C":"準備新角色較屬中後期。","D":"身體界限改變較屬後期。"},"sources":["新文京《產科護理學》妊娠心理","第一孕期"]}},"111030-N4-9":{"quick":"4歲手足表達忌妒(媽媽只關心妹妹),最適當是「讓他用聽診器聽胎兒心跳」促其參與。","detail":{"background":"手足準備(sibling preparation):面對即將出生的弟妹,學齡前幼兒常出現忌妒、退化、爭寵。護理/親職指導應「讓哥哥姊姊參與」、增進其與胎兒的連結與重要感:如讓他「聽胎心音、摸媽媽肚子感受胎動、一起準備嬰兒用品、為寶寶取名」,並保留專屬陪伴時間。命令「要學習愛妹妹」、單純轉移注意或硬帶去產前教室,較無法處理其情緒。本題最適當為「讓小明用聽診器聽胎兒心跳」(B)。","options":{"A":"命令式「要學習愛妹妹」無法處理忌妒情緒。","B":"正確。讓他聽胎心、參與,增進連結與重要感。","C":"帶參加產前教室非直接處理其情緒。","D":"轉移注意力未處理根本情緒。"},"sources":["新文京《產科護理學》手足準備","親職"]}},"111110-N4-2":{"quick":"孕婦偏好辣與冷食,公婆抱怨;最不適當的護理是「認同公婆、一起說服孕婦改變」。","detail":{"background":"文化照護與孕婦自主:對孕婦的飲食偏好,在「不危害母胎健康」前提下應「尊重、不批評」,評估其飲食型態並提供正確營養資訊,尊重孕婦最後的信念與決定。護理師「認同公婆、一起說服(施壓)孕婦改變」會破壞治療關係、不尊重孕婦自主,為最不適當(C)。","options":{"A":"適當。評估孕婦飲食嗜好與行為。","B":"適當。尊重孕婦看法、不批評。","C":"不適當(本題答案)。不應與公婆一起施壓說服孕婦。","D":"適當。尊重孕婦最後的信念與決定。"},"sources":["新文京 文化照護/自主","產科護理"]}},"112180-N4-4":{"quick":"孕婦因文化信念「不吃冰怕孩子氣管不好」,最適當是「尊重其文化與飲食選擇」。","detail":{"background":"文化敏感照護:孕婦基於文化/傳統的飲食信念(如不吃冰),若「不危害母胎健康」,護理師應「尊重其文化與個人選擇」、以同理態度溝通,而非以實證資料「反駁」、要求遵醫囑或提供更多禁忌訊息造成壓力。本題最適當為「尊重其文化以及飲食的選擇」(C)。","options":{"A":"非首選;不需事事詢問醫師。","B":"錯。以實證「反駁」破壞關係、不尊重文化。","C":"正確。尊重其文化與飲食選擇。","D":"錯。提供更多禁忌訊息增加壓力。"},"sources":["跨文化護理","新文京《產科護理學》"]}},"113030-N4-3":{"quick":"準父親在配偶「第二孕期」常會想像胎兒的模樣及身為父親的形象。","detail":{"background":"準父親心理變化(對應孕期):第一孕期——對懷孕的矛盾、現實感不足、可能有擬娩症候群;第二孕期——隨胎動與超音波,胎兒變得真實,開始「想像胎兒的模樣、想像自己為人父的角色與形象」、增加參與;第三孕期——關注分娩、經濟與保護家庭的責任、擔心配偶與胎兒安危。本題第二孕期「想像胎兒模樣與父親形象」最適當(D)。","options":{"A":"害怕生產壓力較屬第三孕期。","B":"擔憂勝任父職較屬第三孕期。","C":"與胎兒連成一體的感受較屬母親第二孕期(且非第一孕期胎動)。","D":"正確。第二孕期想像胎兒模樣與父親形象。"},"sources":["新文京《產科護理學》準父親心理","親職調適"]}},"113100-N4-5":{"quick":"孕24週想「與胎兒連為一體」,最適當是協助其表達對胎動的感受、鼓勵常對胎兒說話。","detail":{"background":"第二孕期(24週)母胎依附:胎動使懷孕真實化,是建立情感連結的關鍵期。護理應「協助孕婦表達對胎動的感受、鼓勵撫摸腹部與常對胎兒說話、回應胎兒」以增進依附。良好產檢、戒咖啡、請先生分擔家務雖有益整體孕期,但與「促進母胎情感連結」較不直接。本題最適當為「協助表達胎動感受、常對胎兒說話」(B)。","options":{"A":"良好產檢屬一般照護,非情感連結最直接。","B":"正確。表達胎動感受、常對胎兒說話增進連結。","C":"戒咖啡屬健康行為,非情感連結。","D":"請先生分擔家務屬支持,非直接連結。"},"sources":["新文京《產科護理學》母胎依附","母性角色"]}},"114030-N4-4":{"quick":"孕32週見人經過會不由自主用雙手護住肚子,最能形容其「身體界限完整」的母性任務行為。","detail":{"background":"母性任務/身體調適:孕婦因腹部增大,擴大其「身體界限(body boundary)」覺知,並會「保護身體界限的完整」——當他人靠近時不自主護住腹部、避免碰撞,以保護胎兒。此為Rubin母性任務中對「身體界限/完整」的關注。本題最能形容者為「關注自己身體界限的完整」(D)。","options":{"A":"非單純社會互動距離。","B":"身體外觀變化屬身體心像。","C":"身體功能運作非此情境。","D":"正確。護住腹部反映關注身體界限的完整。"},"sources":["新文京《產科護理學》母性任務","Rubin 理論"]}},"102030-N4-10":{"quick":"前胎巨嬰(4250公克)為妊娠糖尿病高危,此次懷孕應於妊娠約24~28週(本題24週)接受糖尿病篩檢。","detail":{"background":"妊娠糖尿病(GDM)篩檢時機:一般孕婦於妊娠「24–28週」進行口服葡萄糖耐受試驗(50g篩檢或75g診斷);但有「高危因子」(前胎巨嬰≥4000公克、GDM史、肥胖、家族史、多囊卵巢)者,第一次產檢即可提早篩檢,正常者仍於24–28週再驗。前胎4250公克屬高危,本題以「24週」接受篩檢(D)。","options":{"A":"10週過早(高危者第一次產檢可篩,但一般時程為24–28週)。","B":"14週非常規篩檢時機。","C":"18週非常規篩檢時機。","D":"正確。約24(–28)週接受糖尿病篩檢。"},"sources":["ADA/新文京《產科護理學》GDM篩檢","妊娠糖尿病"]}},"104030-N4-34":{"quick":"妊娠20週發現低位性前置胎盤,妊娠最後3個月胎盤多會隨子宮下段拉長而「移位上移」,不需過度焦急。","detail":{"background":"前置胎盤(placenta previa):指胎盤附著於子宮下段、覆蓋或接近子宮頸內口。妊娠中期(約20週)超音波發現「低位胎盤」很常見,隨妊娠進展、子宮下段拉長,多數胎盤會「相對上移(placental migration)」而不再前置,故20週發現低位前置胎盤「不需過度焦急、絕對臥床」,於妊娠後期(約32週)再追蹤超音波確認即可。腹部超音波是常用且可靠的胎盤定位法(非最不精確)。本題正確為「妊娠最後3個月胎盤會移位,不需太焦急」(B)。","options":{"A":"錯。腹部超音波是可靠的胎盤定位法。","B":"正確。妊娠後期胎盤多會上移,不需太焦急。","C":"不需每週自費超音波;後期追蹤即可。","D":"此時無出血,不需絕對臥床安胎。"},"sources":["新文京《產科護理學》前置胎盤","胎盤移位"]}},"104100-N4-28":{"quick":"妊娠12週梅毒,於孕期18週內接受治療,胎兒幾乎不會受到感染。","detail":{"background":"先天性梅毒與孕期治療:梅毒螺旋體(Treponema pallidum)可經胎盤垂直感染胎兒,造成先天性梅毒(軟骨炎、肝脾腫大、皮疹、智能不足、死產等);但約妊娠「18週前」胎盤的Langhans細胞層較完整,螺旋體不易通過,若於「孕期18週內以penicillin治療」,胎兒幾乎不會受感染、可預防先天性梅毒。梅毒「會」經胎盤傳給胎兒(非只性傳染);治療靠抗生素(penicillin)而非免疫力。本題最恰當為「18週內治療胎兒幾乎不受感染」(B)。","options":{"A":"敘述使孕婦過度恐慌,且未強調早期治療可預防。","B":"正確。18週內接受治療胎兒幾乎不受感染。","C":"錯。梅毒會經胎盤傳給胎兒。","D":"錯。梅毒治療靠penicillin,非靠免疫力。"},"sources":["CDC/新文京《產科護理學》先天性梅毒","妊娠感染"]}},"104100-N4-42":{"quick":"糖尿病母親的新生兒對影響中「較高機會罹患高血鈣症」錯誤——應為「低血鈣」。","detail":{"background":"糖尿病母親嬰兒(IDM)的影響:孕期母體高血糖經胎盤刺激「胎兒胰島素分泌增加(高胰島素血症)」→巨嬰、出生後因母體葡萄糖中斷而「低血糖」;另易「低血鈣、低血鎂」、紅血球增多/高膽紅素、呼吸窘迫(高胰島素延遲肺成熟);孕早期高血糖也增加先天畸形(含中樞神經、心臟)風險。「高血鈣症」錯誤(應為低血鈣)。本題問「錯誤」者為D。","options":{"A":"正確。母體高血糖刺激胎兒胰島素分泌。","B":"正確。孕早期高血糖增中樞神經畸形風險。","C":"正確。出生後可能低血糖。","D":"錯誤(本題答案)。IDM易低血鈣,非高血鈣。"},"sources":["新文京《兒科護理學》糖尿病母親嬰兒","妊娠糖尿病"]}},"105090-N4-1":{"quick":"B群鏈球菌(GBS)垂直感染的新生兒,多數於出生7天內(早發型)發病。","detail":{"background":"乙型(B群)鏈球菌(GBS, Streptococcus agalactiae):常無症狀定殖於孕婦「陰道與直腸」(非鼻腔呼吸道);可於分娩時垂直感染新生兒,造成早發型敗血症、肺炎、腦膜炎,「早發型多於出生7天內(尤24小時內)發病」。篩檢於妊娠「35–37週」採陰道直腸拭子(非20週羊膜穿刺);陽性者於「產時(待產/破水後)靜脈給penicillin/ampicillin」預防,而非一律剖腹產。本題正確為「垂直感染多在出生7天內發病」(A)。","options":{"A":"正確。GBS早發型多在出生7天內發病。","B":"錯。35–37週採陰道直腸拭子篩檢,非20週羊膜穿刺。","C":"錯。GBS定殖於陰道/直腸,非鼻腔呼吸道。","D":"錯。陽性者產時抗生素預防,非唯有剖腹產。"},"sources":["CDC GBS 指引","新文京《產科護理學》GBS"]}},"105090-N4-31":{"quick":"前胎巨嬰、此胎妊娠糖尿病需胰島素治療而不願用藥時,應說明血糖不穩會危害胎兒、應接受治療。","detail":{"background":"妊娠糖尿病衛教溝通:孕婦以「上一胎4100公克也健康、自覺沒不舒服」拒絕治療時,護理師應「以個案為基礎、提供正確資訊」說明——前胎巨嬰可能與血糖偏高有關,妊娠糖尿病常無自覺症狀(不能以症狀判斷),血糖控制不佳會增加巨嬰、肩難產、新生兒低血糖、子癇前症等風險,故「應接受治療(此例為胰島素,孕期口服降血糖藥使用需依醫囑)」。本題最合宜為選項A(說明應治療、血糖不穩小孩易有健康問題)。(注意:選項C稱「只是口服降血糖藥」與題幹胰島素治療不符,且過度淡化。)","options":{"A":"正確。說明前胎巨嬰與血糖有關、應接受治療,血糖不穩危害胎兒。","B":"不當。替孕婦向醫師爭取不治療、稱藥物對胎兒不利。","C":"與題幹(胰島素)不符且過度淡化風險。","D":"資訊不正確(GDM非一定25週後才出現症狀)。"},"sources":["ADA/新文京《產科護理學》GDM 衛教","妊娠糖尿病"]}},"106110-N4-31":{"quick":"妊娠糖尿病孕婦於妊娠末期可藉「每週一次無壓力試驗(NST)」確認胎盤功能。","detail":{"background":"妊娠糖尿病(GDM)孕期照護:(1)胰島素需求隨孕程「增加」(因hPL等致胰島素阻抗上升),若需求未增反降可能提示胎盤功能不良,非「飲食成效佳」;(2)睡前點心「應含複合碳水化合物」以預防夜間/凌晨低血糖,非不可含碳水;(3)妊娠末期以「每週(或每週兩次)NST」評估胎盤功能與胎兒健康——正確;(4)羊水L/S比值評估「肺成熟」,非神經管缺損。本題正確為「妊娠末期每週NST確認胎盤功能」(C)。","options":{"A":"錯。胰島素需求隨孕程增加;未增反降提示胎盤功能不良。","B":"錯。睡前點心應含碳水以防夜間低血糖。","C":"正確。妊娠末期每週NST確認胎盤功能。","D":"錯。L/S比值評估肺成熟,非神經管缺損。"},"sources":["新文京《產科護理學》GDM 照護","胎兒監測"]}},"107110-N4-9":{"quick":"海洋性貧血(地中海貧血)為「體染色體隱性」遺傳,非顯性。","detail":{"background":"海洋性貧血(thalassemia):為「體染色體隱性」遺傳的血紅素合成異常。產前篩檢第一步以「平均紅血球體積(MCV)」(<80 fL為小球性,需進一步)篩檢孕婦,若夫妻為「同型帶因者」,胎兒有1/4機率為重型(隱性遺傳:兩帶因者後代1/4正常、1/2帶因、1/4患病),可接受絨毛膜取樣或羊膜穿刺做產前基因診斷。本題問「錯誤」者為「體染色體顯性遺傳」(A,應為隱性)。","options":{"A":"錯誤(本題答案)。海洋性貧血為體染色體隱性,非顯性。","B":"正確。以MCV為篩檢第一步。","C":"正確。同型帶因夫妻可羊膜穿刺產前診斷。","D":"正確。同型帶因者胎兒重型機率1/4。"},"sources":["新文京《產科護理學》海洋性貧血","遺傳"]}},"107110-N4-34":{"quick":"評估妊娠糖尿病孕婦過去一個月的血糖控制成效,以「糖化血色素(HbA1c)」最佳。","detail":{"background":"血糖控制評估指標:糖化血色素(HbA1c)反映過去約「2–3個月」的平均血糖,是評估「一段期間整體血糖控制」最佳指標(本題問過去一個月控制成效);單次飯前/飯後血糖僅反映「當下」;胎兒體重變化受多因素影響、非直接血糖指標。故評估「過去一個月血糖控制」以HbA1c最佳(C)。","options":{"A":"飯前血糖僅反映當下,非一段期間。","B":"飯後血糖僅反映當下。","C":"正確。HbA1c反映過去2–3個月平均血糖。","D":"胎兒體重受多因素影響,非直接血糖指標。"},"sources":["新文京《產科護理學》血糖監測","HbA1c"]}},"108020-N4-34":{"quick":"高危險妊娠不一定造成不良結果——良好的產前照護與胎兒評估可降低其危險性。","detail":{"background":"高危險妊娠(high-risk pregnancy)概念:指因母體或胎兒的生理/心理/社會因素,使母「與胎兒」發生病理性傷害的風險增加(定義「包括胎兒」)。Goodwin等產前危險計分「包含」年齡與產次等因子。一般孕婦仍有基礎風險,並非「零危險」。重點是——高危險妊娠「不必然」導致不良結果,透過良好的產前醫護與胎兒健康評估「可降低其危險性」。本題正確為選項B。","options":{"A":"錯。危險計分包含年齡與產次。","B":"正確。高危妊娠不必然不良,良好照護可降危險。","C":"錯。一般孕婦並非「零危險」。","D":"錯。高危妊娠的傷害「包括胎兒」。"},"sources":["新文京《產科護理學》高危險妊娠","產前照護"]}},"109110-N4-9":{"quick":"妊娠糖尿病婦女努力控制飲食使血糖正常,屬Rubin母性任務中的「確保自己和胎兒安全」。","detail":{"background":"Rubin母性任務(四項):(1)確保自己與胎兒「安全」地通過妊娠與分娩(如配合產檢、控制血糖、避免危險)、(2)使胎兒能被家人與重要他人「接受」、(3)與胎兒建立「情感連結(bonding)」、(4)學習「奉獻/付出」自己。妊娠糖尿病婦女努力控制飲食、使血糖達標,是為了母胎健康安全,屬「確保自己和胎兒安全」(B)。","options":{"A":"學習奉獻自己是另一項任務,非此行為核心。","B":"正確。控制血糖以「確保自己和胎兒安全」。","C":"使胎兒被家人接受為另一任務。","D":"與胎兒情感連結為另一任務。"},"sources":["新文京《產科護理學》Rubin 母性任務","妊娠心理"]}},"110030-N4-31":{"quick":"糖尿病婦女孕前諮詢時,建議接受「糖化血色素(HbA1c)」以了解近期血糖控制狀況。","detail":{"background":"糖尿病婦女孕前準備:孕前血糖控制(尤HbA1c)與胎兒先天畸形風險密切相關,故孕前評估與目標是「將HbA1c控制良好(理想<6.5%)」再懷孕,以降低畸形與流產風險。HbA1c反映過去2–3個月平均血糖,最能呈現「孕前一段期間的控制狀況」。50g/100g OGTT用於孕期GDM篩檢/診斷、空腹血糖僅反映當下。本題孕前評估近期控制以HbA1c最佳(C)。","options":{"A":"50g OGTT為孕期GDM篩檢,非孕前控制評估。","B":"100g OGTT為GDM診斷,非孕前控制評估。","C":"正確。HbA1c反映近2–3個月血糖控制。","D":"空腹血糖僅反映當下。"},"sources":["ADA 孕前糖尿病照護","新文京《產科護理學》"]}},"111030-N4-31":{"quick":"Rh陰性母親產下Rh陽性嬰兒,應於「此胎產後72小時內」注射Rho免疫球蛋白以預防下次溶血。","detail":{"background":"Rh血型不合與RhoGAM:Rh(−)母親若懷Rh(+)胎兒,分娩時胎兒紅血球進入母體可使母體產生抗Rh抗體(致敏),影響「下一胎」發生胎兒溶血(新生兒溶血症)。預防:於「此胎產後72小時內」注射Rho(D)免疫球蛋白(RhoGAM)中和進入母體的Rh抗原、防止母體致敏;另於妊娠「28週」常規預防性注射一劑、以及流產/羊膜穿刺/出血等致敏事件後也需注射。本題此胎產後預防時機為「72小時內」(A)。","options":{"A":"正確。此胎產後72小時內注射RhoGAM。","B":"產後6–8週過晚,失去預防致敏時機。","C":"下次懷孕28週為「另一次」常規預防,但此胎產後仍需先打。","D":"下次產後立即過晚,本胎產後即須注射。"},"sources":["新文京《產科護理學》Rh不合/RhoGAM","妊娠免疫"]}},"111030-N4-33":{"quick":"B群鏈球菌(GBS)篩檢敘述中「陽性者建議採剖腹產」錯誤——陽性者於產時給抗生素預防,非剖腹產。","detail":{"background":"GBS篩檢與預防:目的是避免「垂直感染」新生兒(早發型敗血症/肺炎/腦膜炎);建議孕婦於「妊娠35–37週」採陰道直腸拭子培養;「陽性者於待產(分娩)時靜脈給抗生素(penicillin/ampicillin),且需在胎兒娩出前足夠時間(理想破水/產程開始後≥4小時)」給藥以達預防效果;GBS陽性「並非剖腹產適應症」(剖腹產不能取代產時抗生素預防,且純為GBS不需剖腹)。本題問「錯誤」者為「陽性者建議採剖腹產」(D)。","options":{"A":"正確。篩檢以避免垂直感染新生兒。","B":"正確。建議35–37週篩檢。","C":"正確。陽性者產前(待產時)給抗生素(理想娩出前≥4小時)。","D":"錯誤(本題答案)。GBS陽性非建議剖腹產。"},"sources":["CDC GBS 指引","新文京《產科護理學》GBS"]}},"111110-N4-31":{"quick":"具第二型糖尿病危險因子者,下一胎懷孕應「在第一次產檢就進行糖尿病篩檢」。","detail":{"background":"妊娠糖尿病(GDM)的後續與篩檢:GDM孕婦產後多恢復正常,但「未來罹患第二型糖尿病」風險升高,應於「產後6–12週」做75g OGTT複檢、之後定期追蹤(不是產後就不需再驗)。GDM與「胎盤分泌的hPL等致胰島素阻抗」有關(非卵巢雌激素)。若具第二型糖尿病危險因子(肥胖、GDM史等),「下一胎在第一次產檢就應提早篩檢」(而非等24–28週)。本題正確為選項B。","options":{"A":"錯。產後血糖偏高未必「一定」變第一型糖尿病。","B":"正確。具危險因子者下胎第一次產檢即篩檢。","C":"錯。產後仍需6–12週複檢與定期追蹤。","D":"錯。GDM與胎盤hPL致胰島素阻抗有關,非卵巢雌激素。"},"sources":["ADA/新文京《產科護理學》GDM 預後","妊娠糖尿病"]}},"112030-N4-2":{"quick":"親妹有血友病者最需轉介遺傳諮詢(性聯隱性遺傳,孕婦可能為帶因者)。","detail":{"background":"遺傳諮詢轉介時機:有「家族遺傳性疾病史(如血友病、海洋性貧血、染色體異常)、近親結婚、高齡產婦、反覆流產、曾生育異常兒」等。血友病為「性聯(X染色體)隱性遺傳」,女性多為帶因者、男性發病;孕婦親妹有血友病,提示家族帶因可能,孕婦/胎兒風險需評估,「最需」轉介遺傳諮詢(B)。姻親通婚(非血親)風險不如血親;胎兒過大、先生B肝非遺傳諮詢首要。","options":{"A":"姻親(非血親)通婚遺傳風險較低。","B":"正確。親妹有血友病(性聯遺傳),最需遺傳諮詢。","C":"胎兒過大非遺傳諮詢首要(查GDM等)。","D":"B型肝炎為感染,非遺傳諮詢範疇。"},"sources":["新文京《產科護理學》遺傳諮詢","性聯遺傳"]}},"112030-N4-6":{"quick":"孕前BMI 30(肥胖)、懷孕14週,最優先安排的檢查為「血糖相關檢驗」(篩檢妊娠糖尿病)。","detail":{"background":"肥胖孕婦(BMI≥30)為妊娠糖尿病、子癇前症、巨嬰、剖腹產等高危群。其中「妊娠糖尿病」風險高,肥胖等高危因子者應「於第一次產檢/早期(如14週)即先做血糖相關檢驗(空腹血糖/HbA1c或提早OGTT)」篩檢,正常者再於24–28週複篩。乙型鏈球菌於35–37週篩檢、胎盤功能評估與NST屬妊娠後期。本題14週肥胖孕婦最優先為「血糖相關檢驗」(B)。","options":{"A":"乙型鏈球菌於35–37週篩檢,非14週優先。","B":"正確。肥胖高危者早期優先篩檢血糖(GDM)。","C":"胎盤功能評估屬妊娠後期。","D":"NST約32週後,非14週。"},"sources":["ADA/新文京《產科護理學》肥胖孕婦","GDM 篩檢"]}},"112030-N4-8":{"quick":"懷孕愛滋初篩連續兩次陽性者,應以核酸檢驗(NAT)及抗體免疫層析(西方墨點/確認試驗)再次確認。","detail":{"background":"孕期愛滋(HIV)篩檢流程:初篩(EIA/快篩)反覆陽性「不可直接診斷或給藥」,須以「確認試驗」確診——再以核酸檢驗(NAT,驗病毒RNA)與抗體確認檢驗(如免疫層析/西方墨點)複檢確認後,才確立診斷並啟動母嬰垂直感染預防(孕期抗病毒、分娩方式評估、新生兒預防性投藥、避免哺乳)。本題正確為「以NAT及抗體免疫層析再確認」(C);不可未確認即給藥(D錯)。","options":{"A":"EIA為初篩方法,確認需NAT+抗體確認試驗。","B":"PA與免疫層析組合非標準確認流程。","C":"正確。以NAT及抗體免疫層析確認。","D":"錯。不可未確認即直接給藥。"},"sources":["疾管署 孕產婦愛滋篩檢","母嬰垂直感染預防"]}},"112030-N4-31":{"quick":"妊娠糖尿病孕婦胰島素需求隨孕程增加,與「人類胎盤泌乳激素(hPL)」分泌增加有關。","detail":{"background":"妊娠胰島素阻抗:胎盤分泌的「人類胎盤泌乳激素(hPL,human placental lactogen)」具抗胰島素作用,加上雌激素、黃體素、皮質醇、胎盤生長激素等,使母體胰島素阻抗隨孕程「逐漸增加」(尤第二、三孕期),故妊娠糖尿病孕婦的胰島素需求量隨週數增加。本題與胰島素需求增加最相關者為hPL(B)。","options":{"A":"泌乳激素(prolactin)主促泌乳,非主要致胰島素阻抗。","B":"正確。hPL具抗胰島素作用,致胰島素需求增加。","C":"hCG維持早期黃體,非主要致胰島素阻抗。","D":"ACTH促腎上腺皮質,非主要致胰島素阻抗。"},"sources":["新文京《產科護理學》hPL/妊娠胰島素阻抗","妊娠糖尿病"]}},"112180-N4-25":{"quick":"梅毒孕婦衛教不適當者為「說懷孕初期不會傳染胎兒,可等18週再驗」——應儘速治療。","detail":{"background":"孕婦梅毒處置:應同理其情緒、評估性生活史與伴侶、衛教梅毒主要經性行為傳染需「夫妻同時檢查與治療(penicillin)」避免反覆感染、並「儘速治療」以預防先天性梅毒。雖然胎盤屏障在約18週前較能阻擋螺旋體,但「不應拖延到18週再驗/再治」——確診後即應治療(早治療幾乎可完全預防胎兒感染)。「說懷孕初期不會傳染、等18週再驗」會延誤治療,為不適當(D)。","options":{"A":"適當。詢問性生活史評估多重性伴侶。","B":"適當。衛教夫妻同治避免反覆感染。","C":"適當。衛教penicillin治療並配合。","D":"不適當(本題答案)。不應拖延到18週再驗,確診應儘速治療。"},"sources":["CDC/新文京《產科護理學》先天性梅毒","妊娠感染"]}},"106030-N4-7":{"quick":"胎兒1個月來身長體重未增(疑生長受限),應鼓勵孕婦正常飲食、充足睡眠並接受進一步檢查。","detail":{"background":"胎兒生長受限(FGR/IUGR)疑慮:妊娠32週超音波估胎兒大小仍約28週、1個月來未增長,即使單次胎盤功能、數值正常,仍需警覺生長遲滯,應「進一步追蹤評估(連續超音波生長曲線、臍動脈都卜勒、NST/BPP、母體因素如營養/血壓/吸菸)」並找原因;同時鼓勵孕婦正常均衡飲食與充足休息(增加子宮胎盤血流)、給予情緒支持。不可因焦慮而輕忽(「不予理會」)或淡化(「沒關係/小較好生」)。本題最適當為「鼓勵正常飲食充足睡眠並接受進一步檢查」(B)。","options":{"A":"錯。不可當作正常誤差而不予理會。","B":"正確。鼓勵正常飲食、充足睡眠並進一步檢查。","C":"錯。發育遲滯需評估,非「沒外觀畸形就沒關係」。","D":"錯。胎兒體重小於週數非「有利自然生產」的正向解讀。"},"sources":["新文京《產科護理學》胎兒生長受限","胎兒監測"]}}},TO=["1婦嬰生命統計人口指標與產科護理總論", "2受孕胚胎與胎兒發育", "3妊娠生理變化與徵候", "4預產期推算與產前檢查", "5產前胎兒評估與遺傳篩檢", "6孕期營養與體重", "7孕期不適與健康促進", "8孕期心理調適與母性角色", "9妊娠合併症與孕期感染篩檢"],LEC={"1婦嬰生命統計人口指標與產科護理總論":{"html":"\n<p><b>生命統計指標:</b></p>\n<ul>\n<li><b>孕產婦死亡率(MMR)</b>=一年每<b>十萬</b>活產中,懷孕期間或懷孕終止後<b>42天內</b>之孕產婦死亡數。</li>\n<li><b>周產期死亡率</b>=妊娠<b>28週</b>以上死胎+出生<b>1週內</b>嬰兒死亡 ÷ 活產 ×1000。</li>\n<li><b>粗出生率</b>=每千人口活產數(開發中國家較<b>高</b>)。<b>總生育率(TFR)</b>=每千婦女15歲起依年齡別生育率至50歲前合計生育子女數,最能反映育齡婦女平均生育力,台灣以此為生育水準標準。</li>\n</ul>\n<p><b>少子化政策:</b>擴大試管嬰兒補助、提高產檢補助、育兒津貼、平價托育、彈性育嬰留停(<b>不需「必須輪流」</b>)。降低法定結婚年齡無助生育率。</p>\n<p><b>護理角色:</b>照顧者(直接護理如協助如廁)、教育者、諮詢者、管理者、代言者。<b>知情同意</b>(簽同意書+解說)=尊重自主的「知曉同意權」。新住民照護:不衝突照護原則下<b>尊重文化習俗</b>。</p>\n"},"2受孕胚胎與胎兒發育":{"html":"\n<p><b>受精著床:</b>受精於輸卵管壺腹→桑椹胚→<b>囊胚(blastocyst)著床</b>(受精後6–7天),囊胚外層<b>滋養層→絨毛膜(分泌hCG)</b>、內細胞團→胚胎+羊膜(最內層)。早期養分由<b>卵黃囊</b>提供,黃體退化後由<b>胎盤</b>接替分泌雌激素/黃體素。</p>\n<p><b>關鍵期:</b><b>胚胎期(3–8週)</b>細胞分裂最快、器官形成、最易致畸。心臟是<b>第一個有功能的器官</b>(約第4週搏動)。第<b>12週</b>外生殖器可分辨性別。</p>\n<p><b>呼吸發育:</b>氣管支氣管約15–17週形成;<b>表面張力素(卵磷脂)</b>約24週起分泌、抗肺泡塌陷;羊水<b>L/S≧2</b>表肺成熟。胎兒體重快速增加在<b>第三孕期</b>。</p>\n<p><b>免疫:</b>母體<b>IgG</b>過胎盤給胎兒被動免疫;胎兒自製主要為IgM(臍血IgM↑提示子宮內感染);IgA經母乳。</p>\n<p><b>卵子形成:</b>胎兒期即有卵原細胞;第一次減數分裂排卵前完成、第二次<b>受精時</b>完成;一卵+三極體。<b>IVF</b>於2–8細胞(或囊胚期)植入。</p>\n"},"3妊娠生理變化與徵候":{"html":"\n<p><b>懷孕徵候三類:</b>推測(主觀:停經噁心頻尿)、可能(客觀非確診:Hegar子宮峽部軟、Goodell子宮頸軟、Chadwick藍紫、hCG陽性、Braxton Hicks)、<b>確實/陽性</b>(聽/監測胎心音、檢查者觸胎動或胎兒外形、超音波見妊娠囊/胎兒)。</p>\n<p><b>各系統生理變化:</b></p>\n<ul>\n<li><b>心血管/血液:</b>血量↑40–50%、心輸出量↑30–50%(中期高峰);<b>生理性貧血</b>(血漿量↑>紅血球↑,血液稀釋);白血球↑、凝血因子↑(高凝);血小板不增。<b>心臟負荷最大=產後初期</b>(回心血量驟增)。</li>\n<li><b>腸胃(黃體素鬆弛平滑肌):</b>胃排空延遲、腸蠕動慢(脹氣便秘)、賁門鬆弛(<b>心灼熱</b>)、膽囊排空延遲膽汁↓。噁心嘔吐與<b>hCG</b>相關。</li>\n<li><b>泌尿:</b>腎血流/GFR↑;糖再吸收速率不變但濾出增→<b>生理性糖尿</b>;BUN/Cr↓。</li>\n<li><b>皮膚:</b>黑線、黃褐斑(MSH↑)、蜘蛛痣(雌激素)、妊娠紋。</li>\n<li><b>子宮:</b>肌纖維增長肥厚、重量大增、子宮壁變薄變軟。<b>鬆弛素(relaxin)</b>由黃體分泌、鬆弛骨盆韌帶。</li>\n</ul>\n<p><b>產褥期(第四孕期):</b>生殖器官復舊4–6週,屬<b>退行性(復舊)</b>變化。</p>\n"},"4預產期推算與產前檢查":{"html":"\n<p><b>內格萊氏法則(Nägele):</b>EDD=LMP第一天「月−3(或+9)、日+7、年+1」,僅適用<b>月經規律28天</b>者;不規律/不確定LMP者改以<b>早期超音波(第一孕期CRL最準)</b>校正。</p>\n<p><b>超音波測量依孕期:</b>第一孕期(7–13週)用<b>頭臀徑CRL</b>;第二孕期(如20週)用<b>雙頂徑BPD</b>、頭圍腹圍股骨長。<b>麥當勞法則</b>以子宮底高度公分數≈週數推估。</p>\n<p><b>產前檢查:</b>首次約8–12週;常規超音波約20週;胎心音——杜卜勒約10–12週、一般聽診器約17–20週。</p>\n<p><b>Leopold四段式觸診:</b>排空膀胱;第一段觸宮底(圓硬可動=頭/軟不規則=臀)、第二段觸兩側(平滑硬面=胎背)、第三段先露、第四段面向足側評估入盆。胎頭高度station以坐骨棘為0,「+」在下、「−」在上,+2=坐骨棘下2cm。</p>\n<p><b>妊娠診斷:</b>驗孕棒以<b>ELISA測尿hCG</b>(晨尿中段較準);超音波見妊娠囊為確實徵候。<b>孕產史</b>:雙胞胎活產仍算1次P。</p>\n"},"5產前胎兒評估與遺傳篩檢":{"html":"\n<p><b>胎動:</b>固定時段(常飯後)安靜計數,2小時內≥10次正常;<b>24小時<4次</b>或較平日減少約一半需就醫。</p>\n<p><b>NST(無壓力試驗):</b>約32週起測(評估自主神經/氧合);<b>反應型</b>=20分內≥2次胎動伴胎心加速(足月≥15bpm/15秒)→胎兒健康胎盤功能正常。無反應先排除睡眠(刺激/含糖飲料/改姿勢)再評估。</p>\n<p><b>BPP(生理活動評估):</b>五項各2分=呼吸、胎動、肌張力、羊水容積(超音波)+NST;8–10分正常、6分疑慮、≤4分疑缺氧。</p>\n<p><b>臍動脈都卜勒S/D:</b>隨週數遞減,比值升高(舒張血流低/逆流)=胎盤阻力高功能不良;S/D≈2.4正常。</p>\n<p><b>遺傳/染色體:</b>第一孕期(11–14週)母血PAPP-A+β-hCG+<b>頸部透明帶NT</b>;<b>絨毛膜取樣CVS</b>(10–13週,驗染色體,不測神經管,<10週有斷肢風險);<b>羊膜穿刺</b>(16–18週,染色體;羊水L/S測肺成熟在後期);第二孕期母血四指標(AFP/hCG/uE3/inhibinA)約15–20週,偵測率約80%,危險值切點<b>1/270</b>。<b>神經管缺陷</b>查母血/羊水AFP。<b>破水確認</b>:Nitrazine試紙變藍、Fern test羊齒狀結晶。</p>\n"},"6孕期營養與體重":{"html":"\n<p><b>孕期體重增加(依孕前BMI,IOM):</b>過輕12.5–18kg、<b>正常11.5–16kg</b>、過重7–11.5kg、<b>肥胖5–9kg</b>。第一孕期增加少(孕吐)、二三孕期穩定增。肥胖者孕期不減重不採極低熱量。</p>\n<p><b>關鍵營養素:</b></p>\n<ul>\n<li><b>葉酸</b>:孕前1個月至孕早期補400–600µg/天,預防神經管缺陷;深綠蔬菜、瘦肉、豆類。</li>\n<li><b>鐵</b>:維生素C(橘子汁)促吸收;牛奶、茶、咖啡抑制。</li>\n<li><b>鈣</b>:約1000mg/天;不足增孕婦骨鬆並影響胎兒骨骼、腿抽筋。</li>\n<li><b>全素(vegan)易缺:維生素B12(僅動物性)、鐵、鋅</b>;B12可由補充劑/強化食品/海藻補。</li>\n</ul>\n<p>血壓升+尿蛋白(子癇前症傾向)→<b>減鹽</b>、不過度限蛋白。營養衛教先以<b>開放式問句評估</b>飲食再建議。</p>\n"},"7孕期不適與健康促進":{"html":"\n<p><b>常見不適與處置:</b>孕吐(hCG,前3月最明顯;少量多餐、起床前吃乾餅、勿空腹油膩、嚴重用B6)、心灼熱(黃體素鬆賁門;少量多餐勿飯後平躺)、便秘脹氣、頻尿(維持適當飲水勿限水)、<b>下背痛</b>(骨盆傾斜/腰背伸展/腹肌,<b>非凱格爾</b>)、圓韌帶痛(鼠蹊)、靜脈曲張、抽筋(補鈣)。</p>\n<p><b>仰臥位低血壓症候群:</b>後期仰臥子宮壓下腔靜脈→頭暈冒冷汗血壓降→<b>左側臥</b>解除壓迫(首要)。</p>\n<p><b>產前運動:</b>蹲踞(伸展會陰)、盤腿坐、凱格爾(骨盆底肌)、骨盆傾斜(下背痛)、膝胸臥式(矯正胎位)。姿勢:坐姿挺直、重量落坐骨。<b>生產球</b>大小依身高、需人陪。<b>會陰按摩</b>預產期前6週起、向下及兩側伸展。</p>\n<p><b>危險徵兆(立即就醫):</b>陰道出血、破水(水狀液流出)、胎動明顯減少、持續頭痛/視力模糊/上腹痛(子癇前症)、規則宮縮過早(1小時≥4次=早產徵兆)。孕期性生活:有流產/早產史、前置胎盤、出血破水者避免性交。</p>\n"},"8孕期心理調適與母性角色":{"html":"\n<p><b>妊娠各期心理(Rubin):</b></p>\n<ul>\n<li><b>第一孕期:</b>憂喜參半的<b>矛盾(ambivalence)</b>、震驚、接受懷孕事實、注意力轉向自己。</li>\n<li><b>第二孕期:</b>胎動使懷孕實在化、將胎兒視為一體、建立<b>情感連結(依附)</b>。</li>\n<li><b>第三孕期:</b>身體笨重、擔心生產與胎兒健康(常夢見胎兒畸形)、築巢準備。</li>\n</ul>\n<p><b>Rubin母性任務(4):</b>確保自己與胎兒<b>安全</b>(配合產檢/控糖)、使胎兒被<b>家人接受</b>、與胎兒<b>情感連結</b>、學習<b>奉獻</b>自己。<b>身體界限</b>:護住腹部、避開人群。</p>\n<p><b>母性角色認同行為:</b>模仿(觀察)、<b>角色扮演(實際練習換尿布/哺乳/沐浴)</b>、幻
