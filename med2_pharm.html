& Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-63":{"quick":"sotalol治心律不整最主要的機制是抑制鉀離子通道(III類)。","detail":{"background":"「『sotalol』」是『『第III類抗心律不整藥』』(兼具非選擇性β阻斷):其『『最主要的『抗心律不整』機制是『『阻斷『鉀離子通道(延遲整流鉀電流)』』』』,『『『延長『動作電位時程與不反應期(延長QT)』』』(故有尖端扭轉風險)。並非抑制氯/鈉/鈣通道。故主要機制為抑制鉀離子通道。","options":{"A":"非抑制氯離子通道。","B":"非主要抑制鈉離子通道。","C":"sotalol主要抑制鉀離子通道(III類)—正解。","D":"非抑制鈣離子通道。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-64":{"quick":"nitroglycerin舒張靜脈以減少心臟前負荷(preload),C正確。","detail":{"background":"抗心絞痛/降壓藥機制:①「『ranolazine抑制『晚期『鈉』電流』(非鈣通道)」(故A錯誤);②「『nitroprusside是『NO供體』→『增加cGMP』(『非『抑制PDE』)」(故B錯誤);③「『『nitroglycerin』(硝化甘油)『主要『舒張『靜脈』』→『減少『靜脈回流』→『降低心臟『前負荷(preload)』』』(緩解心絞痛)」(C正確);④「『nicardipine是『鈣離子阻斷劑(抑制鈣內流)』(非增加鉀傳導)」(故D錯誤)。故C正確。","options":{"A":"ranolazine抑late Na電流(非鈣通道)—錯誤。","B":"nitroprusside為NO供體增cGMP(非抑PDE)—錯誤。","C":"nitroglycerin舒張靜脈減少前負荷—正解。","D":"nicardipine抑鈣內流(非增鉀傳導)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-68":{"quick":"ipratropium(吸入抗膽鹼)可解除氣管痙攣且較不易引發心律不整,適合心臟病人。","detail":{"background":"本題『心臟病+COPD偶發氣管痙攣的老人』,須選『緩解支氣管痙攣『且『較不致心律不整』』』的藥:「『ipratropium』(吸入型『抗膽鹼支氣管擴張劑』)」『『局部作用、心血管副作用少(較不致心律不整)』』,『適合『有心臟病的COPD病人』』。prednisone(類固醇,非急性擴張)、salmeterol(β2致效『可能致心悸/心律不整』)、zafirlukast(抗白三烯,非急性)較不適合。故為ipratropium。","options":{"A":"prednisone(類固醇)非支氣管擴張急救。","B":"salmeterol(β2致效)可能致心律不整。","C":"zafirlukast為維持用、非急性解痙。","D":"ipratropium(吸入抗膽鹼)解痙且較不致心律不整—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-58":{"quick":"evolocumab(抗PCSK9)使apoB-100下降(非上升),故C錯誤。","detail":{"background":"「『evolocumab』(抗『PCSK9』單株抗體)」:①「『抑制『PCSK9(其會促進LDL受體降解)』』」(A正確);②「『PCSK9被抑制→『LDL受體增加→『清除血中LDL』』,『使『LDL明顯『下降』』』」(B正確);③「『含apoB-100的脂蛋白(LDL)被清除→『apoB-100應『下降(而非上升)』』」——故C「『apoB-100明顯『上升』』」錯誤;④「『副作用可有『類流感症狀、注射部位反應』」(D正確)。故C錯誤。","options":{"A":"抑制PCSK9,正確。","B":"促使LDL明顯下降,正確。","C":"apoB-100應下降(非上升)—錯誤(正解)。","D":"有類流感症狀副作用,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-61":{"quick":"bumetanide屬於環利尿劑(loop diuretics)。","detail":{"background":"利尿劑分類:①「『loop(環)利尿劑』——『furosemide、『bumetanide』、torsemide、ethacrynic acid』(作用亨利氏環上行支)」;②「acetazolamide(碳酸酐酶抑制)」;③「indapamide(thiazide樣)」;④「tolvaptan(V2拮抗)」。本題屬loop利尿劑者為bumetanide。","options":{"A":"bumetanide為loop利尿劑—正解。","B":"acetazolamide為碳酸酐酶抑制劑。","C":"indapamide為thiazide樣利尿劑。","D":"tolvaptan為V2受體拮抗利尿劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-63":{"quick":"sacubitril會增加bradykinin累積、可能致血管水腫,「不會增加bradykinin」錯誤。","detail":{"background":"ARNI(sacubitril/valsartan)機轉:①「『sacubitril(neprilysin抑制)『抑制BNP、ANP的『代謝(降解)』』(升高利鈉肽)」(A正確);②「『neprilysin也降解血管收縮素,『抑制後『血管收縮素I/II『可能增加』,故須『併用valsartan(ARB)』拮抗AT1』」(B正確);③「『valsartan拮抗AT1→『有利AT2受體活化(血管擴張等)』」(C正確);④「『neprilysin也降解『緩激肽(bradykinin)』,『抑制neprilysin會『增加『bradykinin『累積』』→『『可能產生『血管水腫(angioedema)』』』(故『『不可與ACE抑制劑併用』』)」——故D「『不會增加bradykinin累積而產生血管水腫』」錯誤。故D錯誤。","options":{"A":"抑制BNP/ANP代謝,正確。","B":"增加血管收縮素、須與valsartan合用,正確。","C":"valsartan抑AT1有利AT2活化,正確。","D":"sacubitril會增加bradykinin、可能致血管水腫—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-65":{"quick":"bevacizumab與VEGF-A結合,抑制腫瘤血管新生而抗癌。","detail":{"background":"「『bevacizumab』」是『『抗『血管內皮生長因子-A(VEGF-A)』的單株抗體』』:『『與VEGF-A結合、中和其作用→『抑制腫瘤『血管新生(angiogenesis)』』→抑制腫瘤生長與轉移』,用於大腸癌、肺癌等。cetuximab、panitumumab(抗EGFR)、trastuzumab(抗HER-2)標的不同。故結合VEGF-A抗血管新生者為bevacizumab。","options":{"A":"bevacizumab結合VEGF-A、抑制血管新生—正解。","B":"cetuximab為抗EGFR。","C":"panitumumab為抗EGFR。","D":"trastuzumab為抗HER-2。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-67":{"quick":"甲狀腺術前服用碘化物(iodides)兩週可減少甲狀腺血管分布。","detail":{"background":"甲狀腺亢進/甲狀腺手術『術前準備』:給予『『碘化物(iodides,如『Lugol’s solution、飽和碘化鉀』)』』約『1-2週』,可『『抑制甲狀腺素釋放(Wolff-Chaikoff效應)、並使甲狀腺『縮小、『血管分布減少、變硬實』』』,『減少術中出血』。放射碘(破壞組織)、levothyroxine/liothyronine(甲狀腺素補充)非術前減少血管用。故為iodides。","options":{"A":"放射碘破壞甲狀腺組織(非術前減血管)。","B":"levothyroxine為甲狀腺素補充。","C":"碘化物術前減少甲狀腺血管分布—正解。","D":"liothyronine(T3)為甲狀腺素補充。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-51":{"quick":"leflunomide抑制dihydroorotate dehydrogenase(抑制嘧啶合成),用於類風濕性關節炎。","detail":{"background":"「『leflunomide』」是『『嘧啶(pyrimidine)合成抑制劑』』:『『抑制『二氫乳清酸去氫酶(dihydroorotate dehydrogenase)』』→『阻斷嘧啶從頭合成→抑制活化的T、B淋巴球增生』,用於『類風濕性關節炎(疾病修飾抗風濕藥DMARD)』。mycophenolic acid(抑IMPDH/嘌呤)、azathioprine(嘌呤抗代謝)、methotrexate(抑DHFR)機制不同。故抑dihydroorotate dehydrogenase者為leflunomide。","options":{"A":"leflunomide抑dihydroorotate dehydrogenase、治RA—正解。","B":"mycophenolic acid抑IMPDH(嘌呤)。","C":"azathioprine為嘌呤抗代謝藥。","D":"methotrexate抑制DHFR。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-63":{"quick":"paclitaxel穩定微管(tubulin)聚合不易散去,破壞有絲分裂(紡錘體毒)。","detail":{"background":"「『paclitaxel』(taxane類)」號稱『『紡錘體毒藥(mitotic spindle poison)』』:其機轉是『『與『微管蛋白(tubulin)』結合、『穩定微管(促進聚合、『不易解聚』)』』,『使『紡錘絲無法正常解離』→『細胞停滯於M期、有絲分裂受阻』』。busulfan(烷化)、cisplatin(交聯DNA)、6-mercaptopurine(嘌呤抗代謝)機制不同。故穩定微管的紡錘體毒為paclitaxel。","options":{"A":"busulfan為烷化劑。","B":"cisplatin交聯DNA。","C":"6-mercaptopurine為嘌呤抗代謝藥。","D":"paclitaxel穩定微管、為紡錘體毒—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-52":{"quick":"methotrexate與5-fluorouracil皆為抗代謝藥物(anti-metabolites)。","detail":{"background":"乳癌化療(CMF):①「『methotrexate(MTX)』——『『二氫葉酸還原酶抑制劑(抗葉酸)』』;『5-fluorouracil(5-FU)』——『『嘧啶類似物(抑thymidylate synthase)』』——『二者皆為『抗代謝藥物(anti-metabolites)』』」(C正確);②「cyclophosphamide是『烷化劑』」(故A、B、D的配對錯誤:MTX/5-FU非抑topo II、非直接抑有絲分裂、cyclophosphamide才是烷化劑但5-FU不是)。故C正確。","options":{"A":"MTX/cyclophosphamide非抑topoisomerase II—錯誤。","B":"MTX/5-FU為抗代謝(非直接抑有絲分裂)—錯誤。","C":"methotrexate與5-FU皆為抗代謝藥物—正解。","D":"5-FU非烷化劑(cyclophosphamide才是)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-65":{"quick":"肢端肥大症(腦下垂體腫瘤分泌GH)可用octreotide治療。","detail":{"background":"「肢端肥大症(acromegaly,腦下垂體GH瘤)」除手術外,藥物可用「『octreotide(體抑素somatostatin類似物)』」——『『抑制生長激素(GH)的分泌』』(亦可用多巴胺致效劑或GH受體拮抗劑pegvisomant)。desmopressin(治尿崩)、leuprolide(GnRH類似物)、somatropin(GH補充,反而加重)不適用。故治肢端肥大者為octreotide。","options":{"A":"desmopressin治尿崩症。","B":"octreotide抑GH、治肢端肥大—正解。","C":"leuprolide為GnRH類似物。","D":"somatropin為GH(反而加重)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-69":{"quick":"aprepitant經拮抗神經激肽NK1受體,預防化療/術後噁心嘔吐。","detail":{"background":"「『aprepitant』」是『『神經激肽-1(neurokinin-1, NK1)受體『拮抗劑』』』:『『阻斷『P物質(substance P)』對NK1受體的作用』』,『用於『預防『化療(尤其延遲性)』與術後的『噁心嘔吐』』』(常與5-HT3拮抗劑、類固醇併用)。riociguat(sGC刺激)、fasudil(Rho激酶)、bosentan(內皮素拮抗)機制不同。故NK1拮抗止吐者為aprepitant。","options":{"A":"riociguat為sGC刺激劑(肺高壓)。","B":"fasudil為Rho激酶抑制劑。","C":"bosentan為內皮素受體拮抗劑。","D":"aprepitant為NK1拮抗、止吐—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-52":{"quick":"sirolimus(rapamycin)用於冠狀動脈支架塗層,抑制細胞增生防再狹窄。","detail":{"background":"「『sirolimus(rapamycin)』」是『『mTOR抑制劑(免疫抑制劑)』』:除『器官移植抗排斥』外,『因其『強力抑制『平滑肌/內皮細胞『增生』』』,『被用於『『藥物塗層『冠狀動脈支架(drug-eluting stent)』』』,『『防止『支架術後『再狹窄(restenosis)』』』(亦用everolimus)。cyclosporine、tacrolimus(calcineurin抑制)、azathioprine(嘌呤抗代謝)非支架塗層用。故為sirolimus。","options":{"A":"cyclosporine為calcineurin抑制劑。","B":"tacrolimus為calcineurin抑制劑。","C":"sirolimus用於支架塗層防再狹窄—正解。","D":"azathioprine為嘌呤抗代謝免疫抑制劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-71":{"quick":"sunitinib抑制VEGF受體(VEGFR)的活化,抑制癌細胞生長與轉移。","detail":{"background":"「『sunitinib』」是『『多標的『酪胺酸激酶抑制劑(TKI)』』』:『『抑制『VEGF受體(VEGFR)、PDGFR、KIT』等『的活化』』』,『『抑制『腫瘤血管新生與生長/轉移』』,用於『腎細胞癌、胃腸道基質瘤(GIST)』等。cetuximab、panitumumab(抗EGFR單抗)、erlotinib(EGFR-TKI)主要標的EGFR(非VEGFR)。故抑VEGFR者為sunitinib。","options":{"A":"cetuximab為抗EGFR單抗。","B":"erlotinib為EGFR-TKI。","C":"sunitinib抑制VEGFR(及多標的)—正解。","D":"panitumumab為抗EGFR單抗。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-73":{"quick":"atezolizumab以單株抗體抑制PD-L1、干擾PD-1訊息,活化T細胞攻擊癌細胞。","detail":{"background":"「『atezolizumab』」是『『免疫檢查點抑制劑(抗『PD-L1』單株抗體)』』:『『腫瘤細胞表面的『PD-L1』與T細胞的『PD-1』結合會『抑制T細胞』;atezolizumab『阻斷PD-L1/PD-1的交互作用』』,『『解除T細胞的抑制→『活化T淋巴球、提升對癌細胞的監控與攻擊』』』。panitumumab(抗EGFR)、ramucirumab(抗VEGFR2)、rituximab(抗CD20)非PD-L1抑制劑。故為atezolizumab。","options":{"A":"atezolizumab抑PD-L1、活化T細胞抗癌—正解。","B":"panitumumab為抗EGFR。","C":"ramucirumab為抗VEGFR2。","D":"rituximab為抗CD20。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-64":{"quick":"6-mercaptopurine被xanthine oxidase代謝,與allopurinol併用會增加其毒性。","detail":{"background":"「『6-mercaptopurine(6-MP)』」(嘌呤抗代謝抗癌/免疫抑制藥)『部分由『黃嘌呤氧化酶(xanthine oxidase)』代謝去活化』;『若『同時服用『xanthine oxidase抑制劑『allopurinol』』』,『會『減慢6-MP代謝→『血中6-MP濃度升高、『毒性增加(骨髓抑制)』』』(故須『減量約75%』)。5-FU、methotrexate、6-thioguanine的代謝不依賴xanthine oxidase。故與allopurinol併用增毒者為6-mercaptopurine。","options":{"A":"5-fluorouracil代謝不依賴xanthine oxidase。","B":"6-mercaptopurine被xanthine oxidase代謝、併allopurinol增毒—正解。","C":"methotrexate代謝不依賴xanthine oxidase。","D":"6-thioguanine代謝路徑不同。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-65":{"quick":"cyclosporine抑制calcineurin磷酸酶,減少器官移植排斥。","detail":{"background":"「『cyclosporine』」(免疫抑制劑)的機轉是『『與『cyclophilin』結合形成複合體,『抑制『鈣調磷酸酶(calcineurin phosphatase)』』』,『『阻止『NF-AT去磷酸化進核→『抑制『IL-2等細胞激素轉錄』→『抑制T淋巴球活化』』』,用於『器官移植抗排斥』。basiliximab(抗IL-2受體)、methylprednisolone(類固醇)、OKT3(抗CD3)機制不同。故抑calcineurin者為cyclosporine。","options":{"A":"basiliximab為抗IL-2受體單抗。","B":"methylprednisolone為糖皮質激素。","C":"cyclosporine抑制calcineurin、抗排斥—正解。","D":"OKT3為抗CD3單抗。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-69":{"quick":"本題公告「一律給分」;ondansetron為5-HT3拮抗劑、預防化療/術後噁心嘔吐。","detail":{"background":"「『ondansetron』(與granisetron、palonosetron)」是『『血清素『5-HT3受體『拮抗劑』』』:『阻斷腸道與中樞(嘔吐中樞/CTZ)的5-HT3受體』,『預防『化療、放療與術後的噁心嘔吐』』。methysergide、ketanserin、cyproheptadine作用於其他血清素受體(非5-HT3止吐)。本題經評定後「一律給分(送分)」。","options":{"A":"methysergide為5-HT2拮抗(防偏頭痛)。","B":"ketanserin為5-HT2拮抗。","C":"cyproheptadine為H1/5-HT拮抗。","D":"ondansetron為5-HT3拮抗止吐(本題送分)—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-52":{"quick":"長期使用tenofovir目前尚無抗藥性,但對adefovir抗藥者效用較差,D正確。","detail":{"background":"B型肝炎(HBV)用藥:①「『干擾素(IFN-α)『禁用於『肝功能『失代償(decompensated)』』的肝炎(可能誘發肝衰竭)」(故A錯誤);②「adefovir的『HBeAg血清轉換率『低、抗病毒力弱』」(故B「可有效產生血清轉換」錯誤);③「『對『lamivudine抗藥』的HBV,『entecavir『效果『較差(易交叉抗藥,須高劑量)』』,『首選改用『tenofovir』』(故C不準確);④「『tenofovir『長期使用『目前尚無顯著抗藥性』』,『但對『adefovir抗藥(部分交叉)』者效用較差』」(D正確)。故D正確。","options":{"A":"IFN禁用於肝功能失代償者—錯誤。","B":"adefovir血清轉換率低、抗病毒力弱—錯誤。","C":"lamivudine抗藥者entecavir效果差(宜用tenofovir)—不準確。","D":"tenofovir尚無抗藥性、對adefovir抗藥者效用較差—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-53":{"quick":"cyclophosphamide須經肝臟CYP450代謝活化才能毒殺癌細胞,C正確。","detail":{"background":"化療藥:①「『carboplatin』(鉑類)『作用於DNA(交聯)』,屬『細胞週期『非』專一性』」(故A「細胞週期專一」錯誤);②「『5-FU』『阻斷『S期(抑制DNA合成)』』(『非M期』)」(故B錯誤);③「『cyclophosphamide『是『前驅藥』,『須經『肝臟CYP450』代謝『活化』才有『DNA烷化(毒殺)』作用』」(C正確);④「procarbazine雖有弱MAO抑制,但其抗癌主要靠烷化/甲基化(D敘述不準)」。故C正確。","options":{"A":"carboplatin為細胞週期非專一性—錯誤。","B":"5-FU阻斷S期(非M期)—錯誤。","C":"cyclophosphamide須CYP450代謝活化才毒殺—正解。","D":"procarbazine抗癌非靠抑MAO—不準確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-54":{"quick":"bevacizumab與血管內皮生長因子(VEGF)結合,抑制腫瘤發展。","detail":{"background":"「『bevacizumab』」是『『抗『血管內皮生長因子(VEGF)』的單株抗體』』:『『與VEGF結合、中和→抑制腫瘤『血管新生』』』而抑制腫瘤發展。並非結合表皮生長因子(EGF)、纖維母細胞生長因子(FGF)或血小板衍生生長因子(PDGF)。故結合VEGF者為bevacizumab。","options":{"A":"非結合表皮生長因子(EGF)。","B":"非結合纖維母細胞生長因子(FGF)。","C":"bevacizumab結合血管內皮生長因子(VEGF)—正解。","D":"非結合血小板衍生生長因子(PDGF)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-55":{"quick":"lapatinib可抑制HER-2受體活化,適合治療HER-2陽性乳癌。","detail":{"background":"「HER-2陽性乳癌」可用『抑制HER-2的藥』:「『lapatinib』」是『『口服『HER-2(及EGFR)『酪胺酸激酶抑制劑(TKI)』』』,『阻斷HER-2受體下游訊息』,用於HER-2陽性乳癌(常與capecitabine併用)。gefitinib、erlotinib(EGFR-TKI)、sorafenib(多標的TKI,VEGFR/RAF)主要非HER-2。故抑HER-2者為lapatinib。(註:trastuzumab/pertuzumab為抗HER-2單抗。)","options":{"A":"gefitinib為EGFR-TKI。","B":"erlotinib為EGFR-TKI。","C":"lapatinib抑HER-2(及EGFR)、治HER-2+乳癌—正解。","D":"sorafenib為多標的TKI(VEGFR/RAF)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-56":{"quick":"sirolimus可與cyclosporine併用,「不可與cyclosporine併用」錯誤。","detail":{"background":"免疫抑制劑「sirolimus(mTOR抑制劑)」:①「『具明顯『骨髓抑制(血小板/白血球低下)』」(A正確);②「『可能引起『高血脂症(高膽固醇/三酸甘油酯)』」(B正確);③「『『可『與cyclosporine『併用』(協同增效,但須注意cyclosporine會升高sirolimus濃度)』』」——故C「『不可與cyclosporine併用』」錯誤;④「『與tacrolimus併用可能引發『溶血性尿毒症候群(HUS)』」(D正確)。故C錯誤。","options":{"A":"具明顯骨髓抑制,正確。","B":"可能引起高血脂症,正確。","C":"sirolimus可與cyclosporine併用、非不可—錯誤(正解)。","D":"併用tacrolimus可能引發HUS,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-57":{"quick":"慢性肉芽腫病用IFN-γ(非IFN-β),故C錯誤。","detail":{"background":"干擾素(interferon):①「『IFN-α』可治『多種腫瘤(毛細胞白血病、卡波西肉瘤等)與『病毒性肝炎(B/C肝)』」(A正確);②「『IFN-β』可治『多發性硬化症(MS)』」(B正確);③「『『慢性肉芽腫病(chronic granulomatous disease)』『用『IFN-γ』(增強吞噬細胞殺菌)』,『『而『非『IFN-β』』』」——故C「IFN-β治慢性肉芽腫病」錯誤;④「『IFN-α與IFN-β『皆可抑制細胞增殖(抗病毒/抗腫瘤)』」(D正確)。故C錯誤。","options":{"A":"IFN-α治多種腫瘤及病毒性肝炎,正確。","B":"IFN-β治多發性硬化症,正確。","C":"慢性肉芽腫病用IFN-γ(非IFN-β)—錯誤(正解)。","D":"IFN-α與IFN-β皆抑制細胞增殖,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-70":{"quick":"腦下垂體泌乳素瘤(高泌乳素)以bromocriptine治療效果最佳。","detail":{"background":"「腦下垂體『泌乳素瘤(prolactinoma)』」分泌大量泌乳素,治療首選『『多巴胺D2受體致效劑(『bromocriptine』或cabergoline)』』:『『多巴胺『抑制泌乳素分泌』』』,『『不僅降泌乳素,『還能『縮小腫瘤』』』。ergonovine、methysergide、ketanserin作用於血清素/麥角受體,非治泌乳素瘤。故為bromocriptine。","options":{"A":"ergonovine為麥角生物鹼(產後止血)。","B":"bromocriptine(D2致效)治泌乳素瘤—正解。","C":"methysergide為5-HT2拮抗。","D":"ketanserin為5-HT2拮抗。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-53":{"quick":"catumaxomab可同時作用於腫瘤(EpCAM)與T細胞(CD3)而發揮療效,C正確。","detail":{"background":"腫瘤治療的單株抗體:①「『alemtuzumab(抗CD52)』『會『引起『淋巴球減少(lymphopenia)』』(故A「較無淋巴球減少疑慮」錯誤);②「『bevacizumab(抗VEGF)『會『影響傷口癒合』,『『不宜『手術後『即時』投藥』(須間隔數週)』」(故B錯誤);③「『catumaxomab是『『三功能『雙特異性抗體』』』,『『『同時結合『腫瘤抗原(EpCAM)』與『T細胞(CD3)』』(並招募免疫細胞)』」(C正確);④「『cetuximab(抗EGFR)與ramucirumab(抗『VEGFR2』)『機轉『不同』』(故D錯誤)。故C正確。","options":{"A":"alemtuzumab會引起淋巴球減少—錯誤。","B":"bevacizumab影響傷口癒合、不宜術後即時投藥—錯誤。","C":"catumaxomab同時作用腫瘤(EpCAM)與T細胞(CD3)—正解。","D":"cetuximab抗EGFR、ramucirumab抗VEGFR2(機轉不同)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-54":{"quick":"idarubicin(anthracycline)抑制topoisomerase II,致癌細胞DNA斷裂。","detail":{"background":"「『idarubicin』(anthracycline類,如doxorubicin、daunorubicin)」的抗癌機轉之一是『『抑制『拓樸異構酶II(topoisomerase II)』』』,『『使『DNA股斷裂無法修復』』,並嵌入DNA、產生自由基』(副作用心臟毒性)。busulfan(烷化)、cyclophosphamide(烷化)、methotrexate(抗葉酸)機制不同。故抑topo II者為idarubicin。","options":{"A":"busulfan為烷化劑。","B":"cyclophosphamide為烷化劑。","C":"idarubicin抑制topoisomerase II—正解。","D":"methotrexate抑制DHFR(抗葉酸)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-55":{"quick":"5-fluorouracil(CMF的F)為嘧啶類似物,其活性代謝物抑制thymidylate synthase。","detail":{"background":"「『5-fluorouracil(5-FU)』」(CMF乳癌化療的『F』):①是『『嘧啶(pyrimidine)類似物』』;②『其活性代謝物『FdUMP』『抑制『胸苷酸合成酶(thymidylate synthase)』』』,『『阻斷dTMP合成→『抑制DNA合成(S期)』』。cytarabine(嘧啶類但抑DNA聚合酶)、methotrexate(抗葉酸DHFR)、vincristine(抗微管)機制不同。故抑thymidylate synthase的嘧啶類似物為5-FU。","options":{"A":"5-FU為嘧啶類似物、抑thymidylate synthase—正解。","B":"cytarabine抑DNA聚合酶。","C":"methotrexate抑DHFR(抗葉酸)。","D":"vincristine為抗微管藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-53":{"quick":"etanercept的機轉非阻斷介白素(是阻斷TNF-α),故B為答案。","detail":{"background":"免疫調節/抗發炎生物製劑的標的:①「canakinumab——抗『IL-1β』」;②「tocilizumab——抗『IL-6受體』」;③「ustekinumab——抗『IL-12/IL-23』」(皆阻斷介白素);④「『etanercept』——『『TNF-α受體融合蛋白(誘捕TNF-α)』』,『『機轉是『阻斷『腫瘤壞死因子-α(TNF-α)』』,『『『非『阻斷介白素』』』」。故機轉非阻斷介白素者為etanercept。","options":{"A":"canakinumab阻斷IL-1β。","B":"etanercept阻斷TNF-α(非介白素)—正解。","C":"tocilizumab阻斷IL-6受體。","D":"ustekinumab阻斷IL-12/IL-23。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-55":{"quick":"busulfan用於慢性骨髓性白血病(非乳癌),故B錯誤。","detail":{"background":"化療藥「busulfan」(烷化劑):①「『作用於DNA(烷化、交聯)抑制癌細胞增生』」(A正確);②「『與cyclophosphamide同屬『烷化劑』,但『busulfan『主要用於『慢性骨髓性白血病(CML)』與骨髓移植前清髓』』,『『而『非『乳癌』』』」——故B「常用於治療乳癌」錯誤;③「『『穀胱甘肽S-轉移酶(GST)活性增加』時易產生『抗藥性』(加速解毒)」(C正確);④「『常見副作用噁心嘔吐(及肺纖維化、皮膚色素)』」(D正確)。故B錯誤。","options":{"A":"作用於DNA抑制癌細胞,正確。","B":"busulfan用於CML(非乳癌)—錯誤(正解)。","C":"GST活性增加易引起抗藥性,正確。","D":"常見副作用噁心嘔吐,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-56":{"quick":"trimethoprim對細菌的二氫葉酸還原酶具專一性的高親和力。","detail":{"background":"「二氫葉酸還原酶(DHFR)抑制劑」對不同物種的選擇性:①「『trimethoprim』」——『對『『細菌(bacterial)』的DHFR『專一性高親和力』』(對人類DHFR親和力低,故選擇性殺菌)」;②「pyrimethamine」——『對『原蟲(瘧原蟲/弓蟲)』的DHFR高親和」;③「methotrexate」——『對『人類(哺乳類)』的DHFR(抗癌/免疫抑制)」;④sulfamethoxazole——抑『二氫蝶酸合成酶』(非DHFR)。故對『細菌DHFR』專一者為trimethoprim。","options":{"A":"sulfamethoxazole抑dihydropteroate synthase(非DHFR)。","B":"trimethoprim對細菌DHFR專一高親和—正解。","C":"pyrimethamine對原蟲DHFR高親和。","D":"methotrexate對人類DHFR高親和。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-53":{"quick":"cabazitaxel(taxane類)為抗微小管藥物,抑制癌細胞分裂。","detail":{"background":"「抗微小管(anti-microtubule)藥物」分:①「『taxanes(如paclitaxel、docetaxel、『cabazitaxel』)』——『穩定微管』」;②「vinca生物鹼(vincristine等)——『抑制微管聚合』」——皆『干擾紡錘體、抑制有絲分裂』。本題「『cabazitaxel』(taxane,用於攝護腺癌)」為抗微小管藥。capecitabine(嘧啶抗代謝)、cladribine(嘌呤抗代謝)、chlorambucil(烷化)非抗微管。故為cabazitaxel。","options":{"A":"capecitabine為嘧啶抗代謝藥(5-FU前驅)。","B":"cabazitaxel為抗微小管(taxane)—正解。","C":"cladribine為嘌呤抗代謝藥。","D":"chlorambucil為烷化劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-54":{"quick":"pertuzumab與乳癌細胞的HER-2受體結合,抑制癌細胞生長。","detail":{"background":"「『pertuzumab』」是『『抗『HER-2』的單株抗體』』:『『與HER-2受體的『二聚化(dimerization)區域』結合』,『阻止HER-2與HER-3等二聚、抑制下游訊息』』,『用於『HER-2陽性乳癌』(常與trastuzumab併用)。anastrozole(芳香化酶抑制)、doxorubicin(anthracycline化療)、tamoxifen(SERM)非抗HER-2。故結合HER-2者為pertuzumab。","options":{"A":"anastrozole為芳香化酶抑制劑。","B":"doxorubicin為anthracycline化療藥。","C":"pertuzumab結合HER-2、抑癌—正解。","D":"tamoxifen為SERM(作用ER)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-55":{"quick":"CHOP中對M期專一的抗癌藥是vincristine(O)。","detail":{"background":"CHOP治療非何杰金氏淋巴瘤,組成為『C=cyclophosphamide(烷化)、H=doxorubicin(hydroxydaunorubicin,anthracycline)、O=『vincristine(Oncovin)』、P=prednisone(類固醇)』。其中『『vincristine(vinca生物鹼)』『抑制『微管聚合』』,『對『細胞週期『M期(有絲分裂)』『具專一性』』』。cyclophosphamide(非專一)、doxorubicin(非專一)、prednisone非M期專一。故M期專一者為vincristine。","options":{"A":"cyclophosphamide為細胞週期非專一。","B":"doxorubicin為細胞週期非專一。","C":"prednisone為類固醇。","D":"vincristine對M期專一(抗微管)—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-57":{"quick":"sirolimus複合體是抑制(非活化)mTOR,故B錯誤。","detail":{"background":"免疫抑制劑:①「mycophenolate mofetil(MMF)——『抑制『肌苷單磷酸去氫酶(IMPDH)』→『抑制嘌呤合成、抑制T/B淋巴球增生』」(A正確);②「『sirolimus』——『與『FKBP-12』結合的複合體『『抑制(而非『活化』)『mTOR』』』→『阻斷IL-2訊息、抑制T淋巴球增生』」——故B「『活化mTOR』」錯誤;③「daclizumab——『抑制『IL-2受體(CD25)』、減緩排斥」(C正確);④「azathioprine——『干擾核酸合成、抑淋巴球增生』」(D正確)。故B錯誤。","options":{"A":"MMF抑IMPDH、抑淋巴球增生,正確。","B":"sirolimus複合體抑制(非活化)mTOR—錯誤(正解)。","C":"daclizumab抑IL-2受體、減排斥,正確。","D":"azathioprine干擾核酸合成,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-69":{"quick":"cyproheptadine可改善冷誘發蕁麻疹與類癌瘤的平滑肌症狀。","detail":{"background":"「『cyproheptadine』」具『『H1抗組織胺『與『血清素(5-HT)拮抗』』作用』:①「改善『『冷誘發蕁麻疹(cold-induced urticaria)』』(抗組織胺)」;②「『拮抗『類癌瘤(carcinoid tumor)』分泌的『血清素』所致的『平滑肌症狀(腹瀉、支氣管痙攣)』」(亦可促食慾)。ketanserin、ritanserin(5-HT2拮抗)、(其他)的綜合作用不及。故為cyproheptadine。","options":{"A":"ketanserin為5-HT2拮抗(降壓)。","B":"ritanserin為5-HT2拮抗。","C":"cyproheptadine改善冷蕁麻疹與類癌平滑肌症狀—正解。","D":"(本題以cyproheptadine為解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-53":{"quick":"doxorubicin抑制topoisomerase II(非I),故B錯誤。","detail":{"background":"抗癌藥「doxorubicin」(anthracycline):①「『屬『天然(微生物來源)抗生素類』抗癌藥」(A正確);②「『其機轉是『嵌入DNA並『抑制『拓樸異構酶『II(topoisomerase II)』』』(『而『非『topoisomerase I』』)、產生自由基』」——故B「抑制topoisomerase I」錯誤;③「『在『心肌細胞』產生『自由基』→『心臟毒性(心肌病)』」(C正確);④「『對細胞週期『無專一性(non-specific)』」(D正確)。故B錯誤。","options":{"A":"屬天然抗生素類抗癌藥,正確。","B":"doxorubicin抑topoisomerase II(非I)—錯誤(正解)。","C":"在心肌產生自由基致心臟毒性,正確。","D":"對細胞週期無專一性,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-55":{"quick":"cyclophosphamide須經CYP450 oxidase代謝後才具DNA烷化作用,C正確。","detail":{"background":"抗癌藥:①「『6-mercaptopurine是『azathioprine的『代謝(活性)產物』,為『免疫『抑制』劑』(『非『增強』劑)」(故A錯誤);②「『CHOP的『C』是『cyclophosphamide』(『非『cisplatin』)」(故B錯誤);③「『cyclophosphamide『是『前驅藥』,『須經『肝臟CYP450 oxidase』代謝『活化』後,才具『DNA烷化(alkylating)』作用』」(C正確);④「『methotrexate抑『二氫葉酸還原酶(DHFR)』(『非『topoisomerase II』)」(故D錯誤)。故C正確。","options":{"A":"6-MP為azathioprine代謝物、屬免疫抑制(非增強)—錯誤。","B":"CHOP的C是cyclophosphamide(非cisplatin)—錯誤。","C":"cyclophosphamide須CYP450代謝才具烷化作用—正解。","D":"methotrexate抑DHFR(非topo II)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-56":{"quick":"cyclosporine主要減少IL-2產生(非IL-1),故C錯誤。","detail":{"background":"免疫抑制劑「cyclosporine」:①「『抑制『鈣調磷酸酶(calcineurin)』活性』」(A正確);②「『減少『NF-AT轉錄因子』作用(無法進核)」(B正確);③「『主要『抑制『T淋巴球『IL-2』的轉錄與分泌』』,『『而『非『減少『IL-1(由巨噬細胞產生)』』』」——故C「『減少IL-1產生』」錯誤;④「『可誘發『腎毒性、高血壓、齒齦增生、多毛』等副作用」(D正確)。故C錯誤。","options":{"A":"抑制calcineurin活性,正確。","B":"減少NF-AT轉錄因子作用,正確。","C":"cyclosporine主要減少IL-2(非IL-1)—錯誤(正解)。","D":"可誘發腎毒性或高血壓,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-57":{"quick":"abciximab作用點為GP IIb/IIIa(非「IIIb/IIa」),故B命名錯誤。","detail":{"background":"抗血小板藥「abciximab」:①「『屬『單株抗體』(Fab片段)」(A正確);②「『作用點在『血小板表面醣蛋白『GP IIb/IIIa』』』(『題目寫『IIIb/IIa』為『命名錯誤』)」——故B錯誤;③「『阻斷『纖維蛋白原(fibrinogen)』與GP IIb/IIIa結合→『抑制血小板『最終共同路徑的聚集』』」(C正確);④「『與『tirofiban、eptifibatide(亦GP IIb/IIIa拮抗)』作用機制類似」(D正確)。故B(命名錯誤)為答案。","options":{"A":"屬單株抗體藥物,正確。","B":"作用點為GP IIb/IIIa(非IIIb/IIa)—命名錯誤(正解)。","C":"抑制fibrinogen相關血小板凝集,正確。","D":"與tirofiban作用機制類似,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-61":{"quick":"腎上腺腫瘤致庫欣氏症候群可用ketoconazole(抑制類固醇合成)減輕症狀。","detail":{"background":"「庫欣氏症候群(Cushing’s syndrome,皮質醇過多)」若由腎上腺腫瘤致,『手術前/不能手術時可用『類固醇合成抑制劑』減輕症狀』:「『ketoconazole』」(高劑量)『抑制多種『腎上腺類固醇合成酶(P450)』』,『降低皮質醇』(及metyrapone、mitotane等)。triamcinolone、betamethasone(糖皮質激素,會加重)、fludrocortisone(礦皮質,加重)不適用。故為ketoconazole。","options":{"A":"triamcinolone為糖皮質激素(會加重)。","B":"betamethasone為糖皮質激素(會加重)。","C":"fludrocortisone為礦皮質固醇(會加重)。","D":"ketoconazole抑類固醇合成、減輕庫欣症狀—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-53":{"quick":"oxaliplatin與carboplatin/cisplatin無完全交叉抗藥,「會交叉抗藥」錯誤。","detail":{"background":"抗癌藥「oxaliplatin」(第三代鉑類):①「『與『carboplatin/cisplatin』『『無『完全交叉抗藥性(cross-resistance)』』』(因DNA加合物結構不同),『故可用於『對其他鉑類抗藥』的腫瘤』」——故A「『對carboplatin抗藥者對oxaliplatin也交叉抗藥』」錯誤;②「『為『FOLFOX(與5-FU、leucovorin)』合併用藥,治『轉移性大腸直腸癌』」(B正確);③「『主要『劑量限制毒性為『周邊神經毒性(冷誘發感覺異常)』』」(C正確);④「『用於『實質固態瘤』」(D正確)。故A錯誤。","options":{"A":"oxaliplatin與carboplatin無完全交叉抗藥(非會交叉抗藥)—錯誤(正解)。","B":"為FOLFOX用藥、治轉移性大腸直腸癌,正確。","C":"劑量限制毒性為神經毒性,正確。","D":"可治實質固態瘤,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-54":{"quick":"sunitinib抑制VEGFR的活性,配對D正確。","detail":{"background":"標靶抗癌藥配對:①「carfilzomib——『抑制『26S蛋白酶體(proteasome)』』(治多發性骨髓瘤)」(故A配Bcr-Abl錯誤);②「dasatinib——『抑制『Bcr-Abl酪胺酸激酶』』(治CML)」(故B配蛋白酶體錯誤);③「lapatinib——『抑制『HER-2/EGFR酪胺酸激酶』』(非PI3K)」(故C錯誤);④「『sunitinib』——『『抑制『VEGFR(及PDGFR、KIT)』的活性』』」(D正確)。故D正確。","options":{"A":"carfilzomib抑26S蛋白酶體(非Bcr-Abl)—錯誤。","B":"dasatinib抑Bcr-Abl(非蛋白酶體)—錯誤。","C":"lapatinib抑HER-2/EGFR(非PI3K)—錯誤。","D":"sunitinib抑制VEGFR的活性—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-56":{"quick":"basiliximab與活化T細胞表面的CD25結合、拮抗IL-2受體,預防腎移植排斥。","detail":{"background":"「『basiliximab』」是『『抗『CD25(IL-2受體α鏈)』的單株抗體』』:『『與『活化T淋巴球表面的『CD25』結合』,『『拮抗『IL-2受體』→『抑制IL-2驅動的T細胞增生』』,『用於『預防『腎臟移植』的『急性排斥』』(誘導治療)。canakinumab(抗IL-1β)、dupilumab(抗IL-4Rα)、omalizumab(抗IgE)標的不同。故結合CD25拮抗IL-2受體者為basiliximab。","options":{"A":"basiliximab結合CD25、拮抗IL-2受體、防腎移植排斥—正解。","B":"canakinumab為抗IL-1β。","C":"dupilumab為抗IL-4Rα。","D":"omalizumab為抗IgE。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-54":{"quick":"atezolizumab(抗PD-L1)作用於腫瘤細胞的PD-L1,不是作用在T細胞。","detail":{"background":"免疫檢查點抑制劑的作用標的:①「『pembrolizumab(抗『PD-1』)』、『ipilimumab(抗『CTLA-4』)』——『標的在『『T細胞』表面的受體(PD-1、CTLA-4)』」;②「『atezolizumab』——『抗『PD-L1』,『其標的『PD-L1』『主要表現在『腫瘤細胞(與抗原呈現細胞)』』』,『『『而『非『直接作用在『T細胞』』』』」——故為答案;③basiliximab(抗CD25)『不是檢查點抑制劑』(屬干擾項)。故不作用在T細胞者為atezolizumab。","options":{"A":"pembrolizumab(抗PD-1)作用T細胞。","B":"basiliximab非檢查點抑制劑(抗CD25)。","C":"atezolizumab(抗PD-L1)作用腫瘤細胞PD-L1、非T細胞—正解。","D":"ipilimumab(抗CTLA-4)作用T細胞。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-55":{"quick":"irinotecan抑制topoisomerase I,配對B正確。","detail":{"background":"抗癌藥與機轉配對:①「etoposide——『抑制『topoisomerase II』』(非thymidylate synthase)」(故A錯誤);②「『irinotecan』——『『抑制『topoisomerase I』』』(治大腸癌)」(B正確);③「pemetrexed——『抑制『thymidylate synthase/DHFR(抗葉酸)』』(非topo II)」(故C錯誤);④「vinorelbine——『抗微管(抑制微管聚合)』(非DHFR)」(故D錯誤)。故B正確。","options":{"A":"etoposide抑topoisomerase II(非thymidylate synthase)—錯誤。","B":"irinotecan抑制topoisomerase I—正解。","C":"pemetrexed抑thymidylate synthase/DHFR(非topo II)—錯誤。","D":"vinorelbine為抗微管藥(非抑DHFR)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-58":{"quick":"mycophenolate mofetil可能產生嗜中性白血球低下(neutropenia),D正確。","detail":{"background":"免疫抑制劑「mycophenolate mofetil(MMF)」:①「『其活性代謝物『mycophenolic acid』『抑制『肌苷單磷酸去氫酶(IMPDH)』』→『抑制『嘌呤(purine)』的『從頭合成』』(『『非『嘧啶』』)」(故A錯誤);②「『mycophenolic acid是『具活性』的代謝成分(MMF為其前驅藥)」(故B錯誤);③「『主要經『葡萄糖醛酸接合(glucuronidation)』代謝(『非CYP450 3A』)」(故C錯誤);④「『副作用含『骨髓抑制——『嗜中性白血球低下(neutropenia)』、貧血』與腸胃道症狀」(D正確)。故D正確。","options":{"A":"MMF抑嘌呤合成(非嘧啶)—錯誤。","B":"mycophenolic acid為活性成分(非無活性)—錯誤。","C":"MMF主要經glucuronidation(非CYP450 3A)—錯誤。","D":"可能產生嗜中性白血球低下—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-60":{"quick":"denosumab為抗RANKL單株抗體,可治療骨質疏鬆症。","detail":{"background":"「『denosumab』」是『『抗『RANK配體(RANKL)』的單株抗體』』:『『RANKL促進『破骨細胞(osteoclast)』的形成與活化;denosumab『與RANKL結合、阻斷其作用→『抑制破骨細胞、減少骨吸收』』』,用於『『骨質疏鬆症』與骨轉移』。adalimumab、infliximab(抗TNF-α)、romosozumab(抗硬骨素sclerostin,也治骨鬆但標的不同)。故抗RANKL者為denosumab。","options":{"A":"adalimumab為抗TNF-α。","B":"infliximab為抗TNF-α。","C":"romosozumab為抗硬骨素(sclerostin)。","D":"denosumab為抗RANKL、治骨質疏鬆—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-52":{"quick":"5-fluorouracil的抗癌機轉是抑制thymidylate synthase。","detail":{"background":"「『5-fluorouracil(5-FU)』」是『嘧啶類似物抗代謝藥』:其活性代謝物『FdUMP『抑制『胸苷酸合成酶(thymidylate synthase)』』』,『『阻斷『dTMP合成→抑制DNA合成』』(亦干擾RNA)。並非烷化、非抑topo II、非抑DHFR(那是methotrexate)。故機轉為抑制thymidylate synthase。","options":{"A":"非與DNA烷基化(那是烷化劑)。","B":"非抑制topoisomerase II。","C":"5-FU抑制thymidylate synthase—正解。","D":"抑DHFR為methotrexate機制。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-53":{"quick":"carboplatin(鉑類)在所列藥物中造成的腎毒性最強。","detail":{"background":"本題比較『carboplatin、dacarbazine、temozolomide、mechlorethamine』的腎毒性:『『鉑類藥物『腎毒性『顯著』(cisplatin最強;carboplatin雖較cisplatin低,但在『本題所列藥物中『腎毒性『最強』』)』』。dacarbazine、temozolomide(烷化/甲基化,主要骨髓抑制)、mechlorethamine(氮芥,起泡)的腎毒性相對不顯著。故腎毒性最強者為carboplatin。","options":{"A":"carboplatin(鉑類)腎毒性最強—正解。","B":"dacarbazine腎毒性不顯著。","C":"temozolomide主要骨髓抑制。","D":"mechlorethamine主要為起泡/骨髓毒性。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-56":{"quick":"tisagenlecleucel為anti-CD19 CAR-T產品,用於復發型大B細胞淋巴瘤。","detail":{"background":"「『tisagenlecleucel』」是『『抗『CD19』的『嵌合抗原受體T細胞(CAR-T)』『細胞療法產品』』』:『將病人T細胞改造表現『辨識B細胞CD19的CAR』,『回輸後攻擊CD19陽性的『B細胞淋巴瘤/白血病』』』,『用於『復發/難治型『大B細胞淋巴瘤』與兒童B-ALL』』。abatacept(CTLA-4-Ig)、siponimod(S1P調節,治MS)、teriflunomide(抑DHODH)非CAR-T。故為tisagenlecleucel。","options":{"A":"abatacept為CTLA-4-Ig(免疫抑制)。","B":"siponimod為S1P受體調節劑(治MS)。","C":"teriflunomide抑DHODH(治MS)。","D":"tisagenlecleucel為anti-CD19 CAR-T、治大B細胞淋巴瘤—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-58":{"quick":"hydroxyurea增加(非減少)胎兒血紅素HbF生成,故D錯誤。","detail":{"background":"鐮刀型紅血球疾病治療藥「hydroxyurea」:①「『抑制『核糖核苷酸還原酶(ribonucleotide reductase)』』(抗癌/抑DNA合成)」(A正確);②「『增加『胎兒血紅素(HbF, γ鏈)』』→『『減少『鐮刀血紅素(HbS)』的『聚合』』』」——故『『D『『減少『胎兒血紅素γ生成』』』錯誤(應為『『增加』HbF」)』』」;③「『減少『血管阻塞(veno-occlusive)發作』」(C正確)。B(減少HbS聚合)正確。故D錯誤。","options":{"A":"抑制核糖核苷酸還原酶,正確。","B":"減少HbS的聚合反應,正確。","C":"減低靜脈內栓塞現象,正確。","D":"hydroxyurea增加(非減少)胎兒血紅素HbF—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-71":{"quick":"化療前先給ondansetron(5-HT3拮抗)可有效緩解化療所致噁心嘔吐。","detail":{"background":"「化療所致『噁心嘔吐(CINV)』」的預防,首選『『5-HT3受體『拮抗劑(『ondansetron』、granisetron、palonosetron)』』』(常與類固醇dexamethasone、NK1拮抗aprepitant併用),『化療『開始前『預先給予』』效果最佳』。ketanserin、cyproheptadine、ritanserin(其他血清素受體)非化療止吐首選。故為ondansetron。","options":{"A":"ketanserin為5-HT2拮抗(降壓)。","B":"cyproheptadine為H1/5-HT拮抗。","C":"ritanserin為5-HT2拮抗。","D":"ondansetron(5-HT3拮抗)化療前止吐—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-52":{"quick":"vinorelbine與tubulin結合、阻斷其聚合成微管,抑制腫瘤生長。","detail":{"background":"「『vinorelbine』(vinca生物鹼類)」的機轉是『『與『微管蛋白(tubulin)』結合,『『阻斷『tubulin『聚合成微管』』』』,『『使紡錘體無法形成→『細胞停滯於M期、有絲分裂受阻』』。cisplatin(交聯DNA)、cytarabine(嘧啶抗代謝)、docetaxel(taxane,反而『穩定微管』)機制不同。故『阻斷tubulin聚合』者為vinorelbine。","options":{"A":"cisplatin交聯DNA。","B":"cytarabine為嘧啶抗代謝藥。","C":"vinorelbine阻斷tubulin聚合成微管—正解。","D":"docetaxel(taxane)穩定微管(非阻斷聚合)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-54":{"quick":"pertuzumab與乳癌細胞的HER2受體結合而抗癌。","detail":{"background":"「『pertuzumab』」是『『抗『HER-2』的單株抗體』』:『與HER-2受體的『二聚化區域』結合、阻止HER-2與HER-3二聚與下游訊息』,『用於『HER-2陽性乳癌』(常與trastuzumab併用)。bevacizumab(抗VEGF)、necitumumab、panitumumab(抗EGFR)標的不同。故結合HER-2者為pertuzumab。","options":{"A":"bevacizumab為抗VEGF。","B":"necitumumab為抗EGFR。","C":"panitumumab為抗EGFR。","D":"pertuzumab結合HER-2、抗癌—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-70":{"quick":"abatacept非直接抑制TNF-α(為CTLA-4-Ig抑制T細胞共刺激),故為答案。","detail":{"background":"類風濕性關節炎生物製劑:①「『infliximab、etanercept、adalimumab』——『皆『直接『抑制『腫瘤壞死因子-α(TNF-α)』』』」;②「『abatacept』——『是『CTLA-4-Ig融合蛋白』,『『阻斷『抗原呈現細胞的『B7(CD80/86)』與T細胞『CD28』』的『『共刺激(co-stimulation)』訊息』』,『『抑制T細胞活化』』,『『『非『直接抑制TNF-α』』』」。故非直接抑TNF-α者為abatacept。","options":{"A":"infliximab直接抑制TNF-α。","B":"etanercept直接抑制TNF-α。","C":"adalimumab直接抑制TNF-α。","D":"abatacept抑制T細胞共刺激(非直接抑TNF-α)—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-75":{"quick":"Echinacea(紫錐花)具提高T細胞活性的免疫調節作用,用於上呼吸道感染。","detail":{"background":"「『Echinacea(紫錐花/松果菊)』」是常見的『免疫調節『草藥』』:『據稱『提高『T細胞活性』與吞噬細胞功能』』,『民眾用於『預防/緩解『上呼吸道感染(感冒)』』』(實證效果有限但廣為使用)。St. John’s wort(聖約翰草,抗憂鬱)、Vinca alkaloids(抗癌)、Ginkgo(銀杏,改善循環/認知)用途不同。故免疫調節治上呼吸道感染者為Echinacea。","options":{"A":"St. John’s wort用於憂鬱(且強誘導CYP)。","B":"Echinacea提高T細胞活性、用於上呼吸道感染—正解。","C":"Vinca alkaloids為抗癌藥。","D":"Ginkgo(銀杏)用於改善循環/認知。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-53":{"quick":"vincristine的主要毒性是周邊神經病變(非肺纖維化),故C配對錯誤。","detail":{"background":"抗癌藥的特徵性毒性配對:①「doxorubicin(anthracycline)—『心臟毒性(心肌病)』」(A正確);②「oxaliplatin(鉑類)—『周邊『感覺神經病變(冷誘發)』』」(B正確);③「『vincristine(vinca生物鹼)—『其『劑量限制毒性是『『周邊神經病變(感覺運動、自律神經)』』』,『『而『非『肺纖維化』』(肺纖維化是『bleomycin、busulfan』的特徵毒性)』」——故C「vincristine-肺纖維化」配對錯誤;④「cyclophosphamide—『其代謝物acrolein致『出血性膀胱炎』(可用mesna預防)』」(D正確)。故C錯誤。","options":{"A":"doxorubicin-心臟毒性,正確。","B":"oxaliplatin-周邊感覺神經病變,正確。","C":"vincristine主要為周邊神經病變、非肺纖維化—錯誤(正解)。","D":"cyclophosphamide-出血性膀胱炎,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-54":{"quick":"pembrolizumab專一性結合PD-1(programmed death-1)受體。","detail":{"background":"「『pembrolizumab』(與nivolumab)」是『『免疫檢查點抑制劑(抗『PD-1』單株抗體)』』:『『專一性結合『T細胞表面的『計畫性死亡受體-1(PD-1)』』』,『『阻斷PD-1與其配體(PD-L1/PD-L2)的結合→『解除T細胞的抑制、活化T細胞攻擊癌細胞』』』。EGFR(cetuximab等標的)、PD-L1(atezolizumab標的)、CTLA-4(ipilimumab標的)非pembrolizumab的標的。故pembrolizumab結合PD-1。","options":{"A":"EGFR為cetuximab等的標的。","B":"pembrolizumab專一結合PD-1—正解。","C":"PD-L1為atezolizumab的標的。","D":"CTLA-4為ipilimumab的標的。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}}},TO=["D1藥理學總論(藥效學藥動學)", "D2自律神經系統藥物", "D3中樞神經系統藥物", "D4心血管與腎臟藥物", "D5血液凝血與造血藥物", "D6內分泌與代謝藥物", "D7抗微生物藥物", "D8抗癌與免疫調節藥物", "D9自泌素發炎呼吸與腸胃藥物"],LEC={"D1藥理學總論(藥效學藥動學)":{"title":"藥理學總論(藥效學‧藥動學)","html":"<p><b>藥效學</b>:效價(potency,劑量越小越強)與效能(efficacy)獨立;部分致效劑內在效能<完全致效劑;競爭性拮抗可被增高agonist克服(右移、最大效果不變)、非競爭性拮抗不可逆轉(最大效果降);化學拮抗(如protamine中和heparin)不需與受體結合。受體組織分布不同→不同療效/毒性。</p><p><b>藥動學</b>:生體可用率IV=100%最高;首渡效應(口服)降低F。代謝Phase I(氧化/還原/水解,CYP450)使官能基化;Phase II(接合:葡萄糖醛酸/硫酸/乙醯化/甘胺酸)使水溶易排。代謝目的=親脂→水溶。酸鹼:鹼性藥易由乳汁排;酸性藥中毒給NaHCO3鹼化尿液(離子捕捉)增排;鹼性藥用酸化尿液。臨床試驗:一期(健康志願者,最大耐受劑量)、二期(病人,療效與劑量範圍)、三期(1000-3000人大規模對照)、四期(上市後)。解毒:fomepizole(甲醇/ADH)、deferoxamine/deferasirox(鐵)、dimercaprol/succimer(汞鉛砷)。</p>"},"D2自律神經系統藥物":{"title":"自律神經系統藥物","html":"<p><b>膽鹼能</b>:直接致效(pilocarpine/cevimeline治口乾、bethanechol);間接(膽鹼酯酶抑制:neostigmine/pyridostigmine治MG[四級銨不過BBB]、physostigmine過BBB治抗膽鹼中毒)。抗膽鹼(atropine:散瞳/口乾/心搏加快/尿滯留/便秘;ipratropium/tiotropium治COPD;oxybutynin/darifenacin治膀胱過動;benztropine治帕金森EPS;青光眼禁用)。有機磷中毒→atropine+pralidoxime。</p><p><b>腎上腺素能</b>:α1致效(midodrine升壓、鼻充血)/α1阻斷(tamsulosin治BPH、IFIS虹膜鬆脫);α2致效(clonidine/methyldopa中樞降壓、突然停clonidine反彈高血壓);β受體(salbutamol短效救援/salmeterol長效;betaxolol降眼壓);αβ阻斷(labetalol/carvedilol)。神經肌肉阻斷:succinylcholine去極化最短效、惡性高溫用dantrolene;非去極化(vecuronium等)。肉毒桿菌毒素抑制乙醯膽鹼釋放。</p>"},"D3中樞神經系統藥物":{"title":"中樞神經系統藥物","html":"<p><b>鎮靜安眠/抗癲癇</b>:BZD作用GABAA(triazolam最短效、lorazepam無活性代謝物);非BZD zaleplon/zolpidem(flumazenil可拮抗、酒精不能);suvorexant拮抗orexin。抗癲癇:phenytoin/carbamazepine/lamotrigine阻鈉通道(phenytoin為肝酶誘導劑、carbamazepine致SJS);ethosuximide阻T型鈣(失神);levetiracetam結合SV2A(腎排);topiramate減重(+phentermine)。</p><p><b>其他CNS</b>:帕金森(levodopa+carbidopa[dopa脫羧抑制]、bromocriptine[D2致效]、selegiline[MAO-B]、benztropine[抗膽鹼]);失智(donepezil/rivastigmine/galantamine膽鹼酯酶抑制;memantine NMDA拮抗);抗憂鬱(SSRI fluoxetine/SNRI venlafaxine副作用少/TCA amitriptyline副作用多/trazodone安眠);抗精神病(haloperidol典型EPS多;clozapine/olanzapine非典型D2親和低EPS少);全麻(thiopental/propofol短效靠再分布、propofol無止痛;ketamine抑NMDA;N2O的MAC最大強度最弱);鴉片(fentanyl效價最高、naloxone拮抗、瞳孔縮小/便秘不耐受;methadone口服治成癮);disulfiram戒酒。</p>"},"D4心血管與腎臟藥物":{"title":"心血管與腎臟藥物","html":"<p><b>利尿與RAAS</b>:loop(furosemide/bumetanide,急性肺水腫/高血鈣)、thiazide(遠曲小管Na/Cl,致低鉀高鈣高糖高尿酸)、保鉀(amiloride/spironolactone/eplerenone醛固酮拮抗,高血鉀禁;治原發性高醛固酮/心衰)、acetazolamide(近曲/治青光眼)、tolvaptan(V2拮抗治低血鈉)。RAAS:aliskiren(腎素)、captopril(ACE)、losartan(ARB)。</p><p><b>抗心律不整/心衰/心絞痛/血脂</b>:Ia(procainamide致狼瘡)/Ib(lidocaine無抗交感)/Ic(flecainide,MI後增死亡);II β阻斷(MI後防猝死);III(amiodarone含碘抑T4→T3、sotalol抑鉀通道);adenosine(不抑鈉);ivabradine(If)、ranolazine(late Na)。心衰:ACEI減緩重塑、digoxin/dobutamine/milrinone(PDE3)強心、nesiritide(BNP)、sacubitril(neprilysin抑制+valsartan=ARNI,增bradykinin致血管水腫不與ACEI併用)。硝酸鹽(nitroglycerin舒張靜脈減前負荷、須留空檔防耐藥;nitroprusside氰化物毒)。血脂:statin(HMG-CoA還原酶)、ezetimibe(NPC1L1)、fibrate(PPAR-α)、cholestyramine(膽酸)、evolocumab(抗PCSK9)、lomitapide(MTP)、mipomersen(apoB-100)。</p>"},"D5血液凝血與造血藥物":{"title":"血液凝血與造血藥物","html":"<p><b>抗凝/抗血小板/溶栓</b>:heparin(抗凝、UFH抑IIa+Xa、LMWH主抗Xa)、warfarin(抑VKOR、受CYP2C9/VKORC1影響、amiodarone增出血)、fondaparinux(選擇性抗Xa)、rivaroxaban(Xa,andexanet解毒)。抗血小板:aspirin(COX)、ticlopidine/clopidogrel(ADP/P2Y12)、abciximab/tirofiban(GP IIb/IIIa)。溶栓:tenecteplase/t-PA(促plasminogen→plasmin,plasmin全身注射被α2-antiplasmin中和無效);抗纖溶tranexamic acid。</p><p><b>造血/止血</b>:鐵螯合(deferoxamine注射/deferasirox口服);EPO(JAK2-STAT5、副作用高血壓血栓);desmopressin(釋factor VIII/vWF治輕型A型血友病);idelvion(長效factor IX治B型血友病)。血小板低下:romiplostim/eltrombopag(TPO受體)、oprelvekin(IL-11);plerixafor(CXCR4動員幹細胞、非治血小板)。</p>"},"D6內分泌與代謝藥物":{"title":"內分泌與代謝藥物","html":"<p><b>甲狀腺/糖尿病</b>:抗甲狀腺(perchlorate阻碘攝取、thioamides[PTU/methimazole]抑TPO與有機化/PTU抑周邊脫碘、碘Lugol抑釋放術前減血管、碘-131孕婦哺乳禁用)。糖尿病:sulfonylurea/meglitinide促泌胰島素、metformin(AMPK,+酒精乳酸中毒)、TZD(PPAR-γ)、acarbose(α-葡萄糖苷酶)、DPP-4抑制、GLP-1致效(注射)、SGLT2抑制(canagliflozin);第一型用insulin。</p><p><b>類固醇/性荷爾蒙/骨</b>:糖皮質激素副作用(骨鬆/高血糖/潰瘍/肌病,抑成骨細胞,消化性潰瘍不適合);fludrocortisone(礦皮質治Addison鹽流失);ketoconazole/aminoglutethimide抑類固醇合成治庫欣。雌激素(單用增子宮內膜癌)、SERM(tamoxifen治乳癌/raloxifene治骨鬆/clomiphene誘排卵)、finasteride(5α還原酶非受體阻斷)、flutamide(抗雄激素治攝護腺癌)。前列腺素:misoprostol(PGE1墮胎/胃)、dinoprostone(PGE2引產)、alprostadil(PGE1勃起/PDA)、latanoprost(降眼壓)。維生素D升血鈣血磷;thiazide留鈣(治高鈣尿、非治高尿酸)。</p>"},"D7抗微生物藥物":{"title":"抗微生物藥物","html":"<p><b>抗細菌</b>:細胞壁(penicillin[benzathine長效、抗綠膿ticarcillin、耐酶dicloxacillin治β-lactamase+金葡]、cephalosporin[ceftriaxone治淋病第三代膽道排泄、ceftazidime抗綠膿]、vancomycin[D-Ala-D-Ala,VRE機轉D-Ala-D-Lac]、imipenem須併cilastatin);蛋白質合成(aminoglycoside[gentamicin腎排不過BBB、濃度依賴後抗生素效應、與β-lactam協同];tetracycline[8歲下牙齒骨骼]、macrolide);葉酸(TMP-SMZ:TMP抑DHFR[對細菌專一]、SMX抑合成酶、治PCP、副作用多來自SMX);rifampin(RNA聚合酶、誘導CYP);isoniazid(抑分枝菌酸、N-乙醯轉移酶代謝、併B6防神經病變)。</p><p><b>抗病毒/黴菌</b>:acyclovir(病毒TK磷酸化治疱疹)、zidovudine(抗HIV)、ganciclovir(CMV);azole(fluconazole抑黴菌CYP450/ergosterol)、amphotericin B(結合ergosterol)、terbinafine(squalene epoxidase治甲癬)。metronidazole(厭氧/原蟲,不治淋病)。基因型篩檢:abacavir(HLA-B*5701)、carbamazepine(B*1502)、allopurinol(B*5801)。</p>"},"D8抗癌與免疫調節藥物":{"title":"抗癌與免疫調節藥物","html":"<p><b>化療</b>:烷化(cyclophosphamide須CYP450活化、出血性膀胱炎用mesna;busulfan治CML;cisplatin/carboplatin腎毒/oxaliplatin神經毒無交叉抗藥);抗代謝(5-FU抑thymidylate synthase、methotrexate抑DHFR、6-MP被xanthine oxidase代謝+allopurinol增毒);抗微管(paclitaxel穩定微管、vincristine抑聚合M期專一/肺纖維化是bleomycin);topo抑制(doxorubicin抑topo II心臟毒、irinotecan抑topo I、etoposide topo II);hydroxyurea(抑核糖核苷酸還原酶、增HbF治鐮刀)。</p><p><b>標靶/免疫</b>:單抗(bevacizumab抗VEGF、cetuximab/panitumumab抗EGFR、trastuzumab/pertuzumab抗HER-2、rituximab抗CD20、denosumab抗RANKL);TKI(sunitinib抗VEGFR、dasatinib抗Bcr-Abl、lapatinib抗HER-2/EGFR);免疫檢查點(pembrolizumab抗PD-1、atezolizumab抗PD-L1[作用腫瘤]、ipilimumab抗CTLA-4);CAR-T(tisagenlecleucel抗CD19)。免疫抑制:cyclosporine/tacrolimus(抑calcineurin→IL-2↓)、sirolimus(抑mTOR、可與cyclosporine併用)、MMF(抑IMPDH嘌呤)、azathioprine(嘌呤)、leflunomide(DHODH嘧啶)、basiliximab/daclizumab(抗IL-2受體CD25);生物製劑(etanercept/infliximab抗TNF-α、abatacept抑共刺激、tocilizumab抗IL-6R、canakinumab抗IL-1)。</p>"},"D9自泌素發炎呼吸與腸胃藥物":{"title":"自泌素發炎‧呼吸‧腸胃藥物","html":"<p><b>氣喘/發炎</b>:β2致效(albuterol短效救援、salmeterol/formoterol長效維持)、吸入類固醇(誘導lipocortin抑PLA2)、抗白三烯(zafirlukast/montelukast受體拮抗、zileuton抑5-脂氧化酶)、肥大細胞穩定(cromolyn/nedocromil只預防)、theophylline(治療範圍窄須監測)、抗體(omalizumab抗IgE治氣喘/慢性蕁麻疹/花生過敏、reslizumab抗IL-5嗜酸性氣喘)。NSAID(抑COX減前列腺素;COX-2選擇性增心血管風險;早產兒PDA用ibuprofen關閉;Reye症候群避aspirin;ketorolac≤5天)。痛風:急性NSAID/colchicine,慢性allopurinol/febuxostat(抑xanthine oxidase;allopurinol避HLA-B*5801)。</p><p><b>腸胃/偏頭痛/抗組織胺</b>:制酸(PPI如pantoprazole治壓力性潰瘍;H2拮抗famotidine最強、nizatidine首渡最小、cimetidine抗雄激素致陽痿)。促動力/止瀉(metoclopramide治胃輕癱[副作用EPS]、loperamide/diphenoxylate止瀉不止痛);止吐(ondansetron 5-HT3拮抗、aprepitant NK1拮抗、Diclegis孕婦);IBS(alosetron 5-HT3治女性腹瀉型、lubiprostone/linaclotide治便秘型)。偏頭痛(sumatriptan 5-HT1B/1D致效直接血管收縮、CCD病人禁;lasmiditan 5-HT1F無血管收縮)。抗組織胺(第一代過BBB致嗜睡可助眠/緩解EPS;第二代不過BBB)。減重orlistat(脂肪酶);clonidine致便秘非腹瀉。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^D(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='med2_pharm_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
