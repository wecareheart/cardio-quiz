「『治『腎因性尿崩症(矛盾性減少尿量)』」(D正確);③「『會『減少尿酸排出』→『『升高血尿酸(誘發/加重『高尿酸血症』與痛風)』』,『『不能『治療』高尿酸血症(反而致之)』』」——故C「治高尿酸血症」錯誤。故C錯誤。","options":{"A":"可改善骨質疏鬆(留鈣),正確。","B":"可治高鈣尿症,正確。","C":"thiazide升高尿酸、不治高尿酸(反致之)—錯誤(正解)。","D":"可治腎因性尿崩症,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-66":{"quick":"tamsulosin(α1阻斷劑)最可能造成白內障手術中的虹膜鬆脫症候群(IFIS)。","detail":{"background":"「『虹膜鬆脫症候群(Intraoperative Floppy Iris Syndrome, IFIS)』」是白內障手術中虹膜鬆軟、波動、易脫垂的併發症,『最相關的藥物是『『α1腎上腺素受體『阻斷劑』』——尤其『『tamsulosin』(治『良性攝護腺肥大』)』』(阻斷虹膜擴張肌的α1受體)。atenolol(β阻斷)、sitagliptin(DPP-4)、ipratropium(抗膽鹼)非IFIS主因。故為tamsulosin。","options":{"A":"atenolol(β阻斷)非IFIS主因。","B":"sitagliptin非IFIS主因。","C":"ipratropium非IFIS主因。","D":"tamsulosin(α1阻斷)致虹膜鬆脫症候群—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-59":{"quick":"sulpiride不是促進胰島素分泌的藥物(為抗精神病/止吐藥)。","detail":{"background":"促進胰島素分泌的口服降血糖藥包括:①「磺醯尿素類『glimepiride』」;②「美格替耐類(meglitinides)『nateglinide、repaglinide』」(均作用於β細胞ATP敏感鉀通道、促泌胰島素)。而「『sulpiride』是『『多巴胺D2受體拮抗劑』的『抗精神病/止吐藥』』,『『與促進胰島素分泌『無關』』」。故不是促泌胰島素者為sulpiride。","options":{"A":"nateglinide(meglitinide)促胰島素分泌。","B":"glimepiride(磺醯尿素)促胰島素分泌。","C":"sulpiride為抗精神病/止吐藥、非促泌胰島素—正解。","D":"repaglinide(meglitinide)促胰島素分泌。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-60":{"quick":"糖皮質素致高血糖,「低血糖」錯誤。","detail":{"background":"糖皮質素(glucocorticoids)的副作用:①「『肌肉量與肌力下降(類固醇肌病變)』」(A正確);②「『『高血糖(類固醇糖尿病)』』——『促進糖質新生、拮抗胰島素』,『『而非『低血糖』』」——故B「低血糖」錯誤;③「『骨質疏鬆』」(C正確);④「『消化性潰瘍』」(D正確)。其他尚有庫欣樣外觀、免疫抑制、皮膚變薄等。故B錯誤。","options":{"A":"肌肉量與肌力下降,正確。","B":"糖皮質素致高血糖、非低血糖—錯誤(正解)。","C":"致骨質疏鬆,正確。","D":"致消化性潰瘍,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-62":{"quick":"睪固酮會降低HDL、升高LDL,「增HDL降LDL」錯誤。","detail":{"background":"testosterone cypionate(長效睪固酮酯):①「『可『肌肉注射』(緩釋)」(A正確);②「『可能有『肝毒性(膽汁鬱積性『黃疸』)』」(B正確);③「『雄激素『降低『HDL』、升高『LDL』』(『不利血脂』)』」——故C「『增HDL、降LDL』」錯誤(應相反);④「『部分睪固酮『芳香化成雌激素』→『男性『女乳症(乳房增大)』』」(D正確)。故C錯誤。","options":{"A":"可肌肉注射,正確。","B":"會有黃疸副作用,正確。","C":"睪固酮降HDL升LDL(非增HDL降LDL)—錯誤(正解)。","D":"會有男性乳房增大副作用,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-64":{"quick":"clevidipine半衰期最短、僅供靜脈使用,無法口服降血壓。","detail":{"background":"鈣離子阻斷劑(CCB)中,「『clevidipine』」是『『超短效『雙氫吡啶類』』』,『『血漿酯酶快速水解、半衰期極短(約1分鐘)』』,『『僅供『靜脈持續輸注』,用於『急性(術中/高血壓急症)血壓控制』,『無法『口服』』』。amlodipine(長效口服)、diltiazem、verapamil(可口服)半衰期長。故半衰期最短、不可口服者為clevidipine。","options":{"A":"amlodipine為長效口服CCB。","B":"diltiazem可口服。","C":"clevidipine超短效、僅靜脈、不可口服—正解。","D":"verapamil可口服。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-72":{"quick":"valproate會升高ethosuximide濃度,「合併valproate療效降低」錯誤。","detail":{"background":"抗癲癇藥「ethosuximide」(治『失神發作absence seizure』首選):①「『突然停藥可能『加重(誘發)失神發作』』(須漸減)」(A正確);②「『機轉是『抑制『丘腦皮質神經元的『T型鈣離子通道』』』(B正確);③「『與『valproate』併用時,『valproate會『抑制ethosuximide代謝→『『升高』其血中濃度(療效『增強』而非降低)』』』」——故C「『合併valproate時ethosuximide療效『降低』』」錯誤;④「最常見副作用為『胃腸不適(噁心)』」(D正確)。故C錯誤。","options":{"A":"突然停藥可能加重失神發作,正確。","B":"抑制丘腦T型鈣通道,正確。","C":"valproate升高ethosuximide濃度(非降低療效)—錯誤(正解)。","D":"最常見副作用為胃腸不適,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-58":{"quick":"cocaine與海洛因(鴉片)不產生交互依賴(類別不同),故B錯誤。","detail":{"background":"cocaine(中樞興奮劑):①「具『局部麻醉(抑制鈉通道)與『血管收縮』作用』」(A正確);②「『阻斷『多巴胺(及NE、5-HT)再回收』』→『增加突觸多巴胺』→欣快、成癮」(C正確);③「『降低食慾(交感興奮)』」(D正確);④「『cocaine(興奮劑)『與『海洛因(鴉片類)』作用機制不同』,『『不產生『交互依賴(cross dependence)』』(交互依賴只發生在『同類』藥物間,如各種鴉片類之間)』」——故B錯誤。故B錯誤。","options":{"A":"具局部麻醉與血管收縮作用,正確。","B":"cocaine與海洛因不同類、不產生交互依賴—錯誤(正解)。","C":"阻斷多巴胺再回收增腦中多巴胺,正確。","D":"具降低食慾作用,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-59":{"quick":"lorazepam無具活性的代謝產物(直接接合代謝)。","detail":{"background":"苯二氮平類(BZD)的代謝:①「『lorazepam(與oxazepam、temazepam)』」『直接經『葡萄糖醛酸接合(Phase II)』代謝,『『無『具生物活性的代謝產物』』』(故適用於肝功能差、老年人)」;②「『flurazepam、diazepam、chlordiazepoxide』」『經肝臟氧化代謝,『產生『長效的活性代謝物(如desmethyldiazepam)』』』。故不產生活性代謝物者為lorazepam。","options":{"A":"flurazepam有長效活性代謝物。","B":"diazepam有活性代謝物(desmethyldiazepam)。","C":"lorazepam直接接合、無活性代謝物—正解。","D":"chlordiazepoxide有活性代謝物。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-60":{"quick":"triazolam的半衰期最短。","detail":{"background":"苯二氮平類安眠藥的半衰期:「『triazolam』」是『『超短效(半衰期約2-4小時)』』,用於『入睡困難』(作用快、隔日宿醉少,但易反彈失眠)。alprazolam(短中效)、quazepam(長效)、diazepam(長效,半衰期數十小時)較長。故半衰期最短者為triazolam。","options":{"A":"alprazolam為短中效。","B":"triazolam半衰期最短—正解。","C":"quazepam為長效。","D":"diazepam為長效(半衰期長)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-71":{"quick":"輕中度偏頭痛第一線可用acetaminophen與NSAID(naproxen);本題A、D均給分。","detail":{"background":"偏頭痛急性治療:①『輕至中度』——『第一線用『普通鎮痛劑:『acetaminophen』、『NSAID(如『naproxen』、ibuprofen、aspirin)』』』;②『中重度或上述無效』——triptans、麥角類。allopurinol(治痛風)、celecoxib(COX-2,亦NSAID但非偏頭痛首選)。本題以『acetaminophen(A)與naproxen(D)』為第一線,公告「A、D均給分」。","options":{"A":"acetaminophen為輕中度偏頭痛第一線(本題給分)。","B":"allopurinol為痛風用藥、非偏頭痛。","C":"celecoxib(COX-2)非偏頭痛首選。","D":"naproxen(NSAID)為輕中度偏頭痛第一線—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-74":{"quick":"nitrous oxide的最小肺泡濃度(MAC)數值最大(麻醉強度最弱)。","detail":{"background":"「最小肺泡濃度(MAC)」是吸入麻醉劑的『效價(potency)指標』——『MAC『越小』、效價『越強』』。「『笑氣(nitrous oxide, N2O)』」的『MAC『>100%(數值『最大』)』』,代表『麻醉『效價最弱』(單獨無法達到外科麻醉,須與其他麻醉劑合用)』。sevoflurane、halothane、desflurane的MAC皆遠小於N2O。故MAC最大者為N2O。","options":{"A":"sevoflurane MAC約2%。","B":"nitrous oxide MAC>100%最大(強度最弱)—正解。","C":"halothane MAC約0.75%。","D":"desflurane MAC約6%。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-57":{"quick":"baclofen作用於GABAB受體。","detail":{"background":"「『baclofen』」是『『GABAB受體『致效劑』』』,『活化中樞GABAB受體→抑制脊髓單突觸與多突觸反射→『中樞性肌肉鬆弛』』,用於『痙攣(脊髓損傷、多發性硬化)』。diazepam(GABAA-BZD位)、tizanidine(α2致效)、dantrolene(直接抑制肌漿網鈣釋放)機制不同。故作用GABAB者為baclofen。","options":{"A":"baclofen作用GABAB受體—正解。","B":"diazepam作用GABAA(BZD結合位)。","C":"tizanidine為α2致效劑。","D":"dantrolene抑制肌漿網鈣釋放。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-58":{"quick":"naloxone可拮抗morphine引起的呼吸抑制(本題A、C均給分)。","detail":{"background":"「『naloxone』」是『『鴉片受體『拮抗劑』』』:①「『可『拮抗『鴉片類(如morphine)引起的『呼吸抑制』、鎮靜、欣快』』(用於鴉片過量急救)」(C正確);②「『『不能』拮抗『非鴉片類(如barbiturates)』引起的呼吸抑制』」(故D錯誤);③「本身『無提高疼痛閾值(無鎮痛)』作用」(B錯誤);④「『口服首渡效應大、效果差(常注射給予)』」(A判給分)。本題公告「A、C均給分」。","options":{"A":"naloxone口服首渡大、效果差(本題判給分)。","B":"naloxone無鎮痛(不提高疼痛閾值)。","C":"可拮抗morphine引起的呼吸抑制—正解。","D":"不能拮抗barbiturates的呼吸抑制。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-67":{"quick":"galantamine(膽鹼酯酶抑制劑)最適合用於治療阿茲海默症。","detail":{"background":"「『galantamine』(與donepezil、rivastigmine)」是『『膽鹼酯酶抑制劑』』,『提高腦中乙醯膽鹼』,用於『輕至中度『阿茲海默症(失智)』』(改善認知)。重症肌無力(用四級銨pyridostigmine)、帕金森(抗膽鹼/多巴胺)、青光眼(用其他降眼壓藥)非galantamine主要用途。故為阿茲海默症。","options":{"A":"重症肌無力用pyridostigmine等。","B":"帕金森用多巴胺類/抗膽鹼。","C":"青光眼用其他降眼壓藥。","D":"galantamine治阿茲海默症—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-70":{"quick":"theophylline治療氣喘氣管痙攣,過量易引發失眠與癲癇。","detail":{"background":"本題『過量致癲癇、曾口服某藥致『失眠』、用於『氣喘氣管痙攣』』——即「『theophylline(茶鹼)』」:『甲基黃嘌呤類支氣管擴張劑』,『治療範圍窄』,『過量致『中樞興奮(失眠、焦慮、『癲癇』)、心律不整、噁心』』。ipratropium(抗膽鹼)、cromolyn(肥大細胞穩定)、metaproterenol(β2致效)無此中樞興奮致癲癇。故為theophylline。","options":{"A":"ipratropium為吸入抗膽鹼。","B":"theophylline治氣管痙攣、過量致失眠癲癇—正解。","C":"cromolyn為肥大細胞穩定劑。","D":"metaproterenol為β2致效劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-73":{"quick":"memantine的作用機轉為抑制(拮抗)NMDA受體。","detail":{"background":"「『memantine』」用於『中重度『阿茲海默症』』,機轉是『『NMDA(N-甲基-D-天門冬胺酸)麩胺酸受體『拮抗劑(非競爭性低親和力)』』』:『阻斷過度的麩胺酸興奮毒性(excitotoxicity)』而保護神經、改善認知。並非抑制蕈毒鹼/多巴胺/GABAA受體。故機轉為抑制NMDA受體。","options":{"A":"非抑制蕈毒鹼受體。","B":"非抑制多巴胺受體。","C":"memantine抑制(拮抗)NMDA受體—正解。","D":"非抑制GABAA受體。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-74":{"quick":"levetiracetam的機轉(結合SV2A)與阻斷鈉離子通道最無關連。","detail":{"background":"抗癲癇藥機轉:①「『phenytoin、carbamazepine、lamotrigine』」——主要『『阻斷『電壓門控鈉離子通道』』(穩定不活化態)』;②「『levetiracetam』」——『結合『突觸囊泡蛋白『SV2A』』、『調節神經傳遞物質釋放』,『機轉『與鈉通道阻斷『最無關連』』』。故與阻斷鈉通道最無關者為levetiracetam。","options":{"A":"phenytoin阻斷鈉通道。","B":"carbamazepine阻斷鈉通道。","C":"lamotrigine阻斷鈉通道。","D":"levetiracetam結合SV2A、與鈉通道阻斷最無關—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-60":{"quick":"bromocriptine作用於多巴胺D2受體,用於治療帕金森氏症。","detail":{"background":"「『bromocriptine』」是『『麥角類『多巴胺D2受體『致效劑』』』』,『直接活化紋狀體D2受體』,用於『帕金森氏症(及高泌乳素血症、肢端肥大)』。pramipexole(非麥角D2/D3致效,亦治帕金森,但本題以bromocriptine為解)、flurazepam(BZD)、selegiline(MAO-B抑制)機制不同。故作用D2治帕金森者為bromocriptine。","options":{"A":"pramipexole亦為D2/D3致效(本題以bromocriptine為解)。","B":"bromocriptine作用D2受體、治帕金森—正解。","C":"flurazepam為苯二氮平。","D":"selegiline為MAO-B抑制劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-71":{"quick":"ketamine的主要作用機轉是抑制(拮抗)NMDA受體。","detail":{"background":"「『ketamine』」是『『靜脈/解離性麻醉劑』』,主要機轉為『『拮抗(抑制)『NMDA麩胺酸受體』』』,產生『解離性麻醉(意識與感覺分離)、鎮痛、遺忘』,且『維持呼吸與心血管(交感興奮)』,但可致幻覺。並非作用於GABAA受體。故機轉為抑制NMDA受體。","options":{"A":"非活化GABAA受體。","B":"非抑制GABAA受體。","C":"非活化NMDA(應為抑制)。","D":"ketamine抑制(拮抗)NMDA受體—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-72":{"quick":"levetiracetam主要經腎排除(非肝代謝),故D錯誤。","detail":{"background":"levetiracetam(治部分發作):①「可『口服』給藥」(A正確);②「機轉為『選擇性結合『突觸囊泡蛋白SV2A』』」(B正確);③「『調節神經傳遞物質(如glutamate、GABA)的釋放』」(C正確);④「『『主要經『腎臟』排除(原型,少經肝代謝)』』,『故藥物交互作用少』」——故D「『主要經『肝臟』代謝』」錯誤。故D錯誤。","options":{"A":"可口服給藥,正確。","B":"選擇性結合SV2A,正確。","C":"影響glutamate/GABA釋放,正確。","D":"主要經腎排除、非肝代謝—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-73":{"quick":"flumazenil不能拮抗酒精的中樞鎮靜作用(僅拮抗苯二氮平類)。","detail":{"background":"「『flumazenil』」是『『苯二氮平類(BZD)受體『拮抗劑』』』:可『拮抗『作用於GABAA-BZD結合位的藥物(BZD如『lorazepam、alprazolam』,以及非BZD的『zolpidem、zaleplon』)』』的中樞鎮靜。而「『酒精(alcohol/乙醇)』」雖也作用GABAA,但『作用位點『不同(非BZD結合位)』』,『『flumazenil『不能』拮抗『酒精』的鎮靜作用』」。故不能被拮抗者為alcohol。","options":{"A":"zolpidem(作用BZD位)可被flumazenil拮抗。","B":"lorazepam可被flumazenil拮抗。","C":"酒精作用位不同、flumazenil不能拮抗—錯誤(正解)。","D":"alprazolam可被flumazenil拮抗。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-57":{"quick":"肝臟對乙醇(酒精)引起的病變程度最為重要。","detail":{"background":"乙醇(酒精)的代謝主要在『『肝臟(經酒精去氫酶ADH、乙醛去氫酶ALDH、CYP2E1)』』。長期過量飲酒對『『肝臟』』的傷害最重要、最常見:『脂肪肝→酒精性肝炎→肝硬化』;雖也影響胰臟(胰臟炎)、心臟(心肌病)、中樞神經,但『以『肝臟』病變最為核心』。故為肝臟。","options":{"A":"胰臟可受影響(胰臟炎),但非最核心。","B":"心臟可受影響(心肌病),但非最核心。","C":"肺臟非乙醇主要病變器官。","D":"肝臟對乙醇病變最重要—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-67":{"quick":"rasagiline是B型單胺氧化酶(MAO-B)抑制劑,B正確。","detail":{"background":"抗帕金森藥:①「『carbidopa』是『『多巴脫羧酶(dopa decarboxylase)『抑制劑』』(『減少levodopa在『周邊』被代謝』),『非多巴胺前驅藥』」(故A錯誤);②「『rasagiline(與selegiline)』是『『MAO-B『抑制劑』』』(『減少多巴胺分解』)」(B正確);③「『pramipexole是『多巴胺受體『致效劑』』,『非抑制』」(故C錯誤);④「『benztropine是『中樞『抗膽鹼劑』』,『非促進多巴胺釋放』(那是amantadine)』」(故D錯誤)。故B正確。","options":{"A":"carbidopa為dopa decarboxylase抑制劑、非DA前驅藥—錯誤。","B":"rasagiline為MAO-B抑制劑—正解。","C":"pramipexole為多巴胺受體致效劑(非抑制)—錯誤。","D":"benztropine為抗膽鹼劑(非促DA釋放)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-69":{"quick":"「抗痙攣」不是鴉片類藥物的作用;鴉片致鎮咳、便秘、縮瞳。","detail":{"background":"鴉片類(opioids)的作用:①「『鎮痛』、『鎮咳(抑制咳嗽中樞,如codeine)』、『『便秘(抑制腸蠕動)』』、『『縮瞳(miosis,刺激動眼神經副交感)』』、鎮靜、呼吸抑制、欣快』。而「『抗痙攣(抗驚厥/肌肉痙攣)』『不是』鴉片類的作用(鴉片過量反而可能致肌陣攣/癲癇)」。故不是鴉片作用者為抗痙攣。","options":{"A":"抗痙攣不是鴉片類的作用—正解。","B":"抑制咳嗽為鴉片作用。","C":"便秘為鴉片作用。","D":"瞳孔縮小為鴉片作用。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-58":{"quick":"topiramate非阻斷glutamate轉運子(其機轉為阻鈉通道/增GABA/拮抗麩胺酸受體),故C錯誤。","detail":{"background":"抗癲癇藥機轉:①「ethosuximide阻斷『T型鈣通道』(治失神)」(A正確);②「tiagabine阻斷『GABA轉運子(GAT-1)』(增GABA)」(B正確);③「『topiramate』機轉為『阻斷『鈉通道』、『增強GABA』、『拮抗『AMPA/kainate麩胺酸受體』』與抑碳酸酐酶』,『『而非『阻斷『glutamate『轉運子』』』」(故C錯誤);④「valproic acid可『阻斷鈉通道』(亦增GABA、阻T型鈣)」(D正確)。故C錯誤。","options":{"A":"ethosuximide阻斷T型鈣通道,正確。","B":"tiagabine阻斷GABA轉運子,正確。","C":"topiramate非阻斷glutamate轉運子—錯誤(正解)。","D":"valproic acid可阻斷鈉通道,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-59":{"quick":"nalbuphine並非經活化μ受體止痛(為μ部分拮抗/κ致效)。","detail":{"background":"鴉片類止痛機制:①「morphine、methadone、fentanyl」——『『μ(mu)受體『完全致效劑』』』(經活化μ受體止痛);②「『nalbuphine』」——『『μ受體『部分拮抗(或弱致效)』、『κ受體致效』』,『止痛作用『主要經『κ受體』(非μ受體完全致效)』』(屬『混合型致效-拮抗劑』)」。故作用機制『不是經活化μ受體』者為nalbuphine。","options":{"A":"nalbuphine主要經κ受體(μ部分拮抗)、非μ致效—正解。","B":"morphine為μ受體致效劑。","C":"methadone為μ受體致效劑。","D":"fentanyl為μ受體致效劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-71":{"quick":"baclofen為GABAB受體致效劑,作用中樞、治肌肉疼痛與痙攣。","detail":{"background":"「『baclofen』」是『『GABAB受體『致效劑』』』,『主要作用於『中樞神經(脊髓)』』,『抑制單/多突觸反射→『中樞性肌肉鬆弛』』,用於『肌肉痙攣與疼痛(脊髓損傷、多發性硬化)』。dantrolene(直接抑肌漿網鈣)、rocuronium(神經肌肉阻斷)、tizanidine(α2致效)機制不同。故GABAB致效者為baclofen。","options":{"A":"dantrolene直接抑制肌漿網鈣釋放。","B":"baclofen為GABAB致效劑、治痙攣—正解。","C":"rocuronium為神經肌肉阻斷劑。","D":"tizanidine為α2致效劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-65":{"quick":"methylphenidate最適合用於治療注意力不足過動症(ADHD)。","detail":{"background":"「『methylphenidate』(與amphetamine類)」是『『中樞興奮劑』』,『增加突觸『多巴胺與正腎上腺素』』,『為『注意力不足過動症(ADHD)』的『第一線』治療』(改善專注、減少過動)。duloxetine、milnacipran(SNRI,治憂鬱/纖維肌痛)、sibutramine(減重,已下市)非ADHD首選。故為methylphenidate。","options":{"A":"duloxetine為SNRI(治憂鬱)。","B":"milnacipran為SNRI(治纖維肌痛)。","C":"sibutramine為(已下市)減重藥。","D":"methylphenidate治ADHD—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-69":{"quick":"pitolisant為inverse H3 agonist,可減低發作性睡病的睡意。","detail":{"background":"「『pitolisant』」是『『組織胺H3受體『反向致效劑(inverse agonist)/拮抗劑』』』:『阻斷H3自體受體→『增加腦中組織胺(及其他促醒神經傳遞)的釋放』→『提升清醒度、減少嗜睡』』,用於『『發作性睡病(narcolepsy)』』。triprolidine、cetirizine(H1拮抗,反而嗜睡)、tiotidine(H2拮抗)非此用途。故為pitolisant。","options":{"A":"triprolidine為H1拮抗(致嗜睡)。","B":"tiotidine為H2拮抗劑。","C":"pitolisant(inverse H3)治發作性睡病—正解。","D":"cetirizine為H1拮抗劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-72":{"quick":"baclofen在中樞活化GABAB受體而產生肌肉鬆弛。","detail":{"background":"「baclofen」(中樞性肌肉鬆弛劑)的中樞機制是『『活化『GABAB受體』』』:『開啟鉀通道、抑制鈣內流→『抑制脊髓單/多突觸反射、降低肌肉張力』』,用於痙攣。並非抑制GABAB、非作用α2受體。故機制為活化GABAB受體。補充:此藥的作用須對照其受體選擇性、藥效動力學(劑量-反應)與藥物動力學(吸收分布代謝排泄)綜合理解,並注意常見副作用與藥物交互作用以利臨床安全用藥。","options":{"A":"baclofen活化GABAB受體—正解。","B":"非抑制GABAB受體。","C":"活化α2為tizanidine/clonidine機制。","D":"非抑制α2受體。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-73":{"quick":"fentanyl的止痛強度(效價)最高。","detail":{"background":"鴉片類的止痛『效價(potency)』:「『fentanyl』」效價『最高(約為morphine的『100倍』)』,故劑量以微克計,用於麻醉與重度疼痛(貼片、靜脈)。morphine(基準)、methadone、meperidine(度冷丁,效價較morphine低)皆不及fentanyl。故止痛強度最高者為fentanyl。","options":{"A":"fentanyl止痛效價最高(約morphine 100倍)—正解。","B":"morphine為效價基準。","C":"methadone效價約等於morphine。","D":"meperidine效價低於morphine。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-74":{"quick":"nitrous oxide的MAC比halothane大(非較小),故A錯誤。","detail":{"background":"N2O vs halothane:①「『N2O的『MAC『>100%』,比halothane(MAC約0.75%)『大很多』』』」——故A「『N2O的MAC比halothane『小』』」錯誤;②「『MAC大→效價弱』,故『N2O麻醉『強度(potency)比halothane『弱』』」(B正確);③「『N2O的『血液/氣體分配係數『小』』(約0.47<halothane約2.3)』」(C正確);④「『分配係數小→『誘導與恢復『快』』』,故N2O誘導/恢復比halothane快」(D正確)。故A錯誤。","options":{"A":"N2O的MAC比halothane大(非較小)—錯誤(正解)。","B":"N2O麻醉強度比halothane弱,正確。","C":"N2O血氣分配係數較小,正確。","D":"N2O誘導與恢復較快,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-56":{"quick":"sumatriptan是5-HT1B/1D致效劑(非拮抗劑),故A錯誤。","detail":{"background":"偏頭痛藥「sumatriptan」(triptan類):①「『機制是『『5-HT1B/1D受體『致效劑(agonist)』』』(『收縮腦/腦膜血管、抑制三叉神經血管系統釋放發炎神經肽』)』」——故A「『『拮抗』5-HT1B/1D』」錯誤;②「『與SSRI/SNRI併用『可能致『血清素症候群』』」(B正確);③「『因致『血管收縮』,『冠狀動脈疾病者『禁用』』」(C正確);④「『可引起腦部血管收縮』」(D正確)。故A錯誤。","options":{"A":"sumatriptan為5-HT1B/1D致效劑(非拮抗)—錯誤(正解)。","B":"與SSRI併用可能致血清素症候群,正確。","C":"冠心病者禁用(致血管收縮),正確。","D":"可引起腦部血管收縮,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-72":{"quick":"haloperidol(典型抗精神病藥)的錐體外症候群副作用最顯著。","detail":{"background":"治療思覺失調症的藥物中,「『haloperidol』」是『『典型(第一代)抗精神病藥』』,『『強力阻斷『D2多巴胺受體』』』,『『錐體外症候群(EPS:急性肌張力不全、靜坐不能、類帕金森、遲發性運動障礙)『最顯著』』。clozapine、olanzapine、aripiprazole為『非典型(第二代)』,EPS較少。故EPS最顯著者為haloperidol。","options":{"A":"haloperidol(典型)EPS最顯著—正解。","B":"clozapine(非典型)EPS少。","C":"olanzapine(非典型)EPS少。","D":"aripiprazole(非典型)EPS少。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-73":{"quick":"naloxone(鴉片拮抗劑)不易造成精神(心理)依賴。","detail":{"background":"精神(心理)依賴性:①「cocaine(興奮劑)、psilocybin(迷幻蘑菇)、ketamine(解離劑)」——『皆會產生『欣快/愉悅』、『有『精神依賴性』』」;②「『naloxone』是『『鴉片受體『拮抗劑』』,『『無欣快作用』(反而會誘發鴉片成癮者『戒斷』)』,『『不易造成精神依賴』』」。故不易精神依賴者為naloxone。","options":{"A":"cocaine有強精神依賴性。","B":"psilocybin為迷幻劑、有精神依賴。","C":"ketamine有精神依賴性。","D":"naloxone為鴉片拮抗劑、不易精神依賴—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-51":{"quick":"thiopental為速效型(rapid onset)靜脈麻醉劑。","detail":{"background":"「『thiopental』(超短效barbiturate靜脈麻醉劑)」:①「『脂溶性『高』,『靜脈注射後『快速進入腦部』→『速效(rapid onset)誘導麻醉』』」(B正確);②「『作用『短暫』的主因是『『再分布(redistribution)』』(從腦再分布到肌肉/脂肪),『而非『長效』』」(故A錯誤);③「『脂溶性高(非低)』」(C錯誤);④「『經肝代謝『緩慢』,代謝『非』產生有效代謝物延長作用(其短效靠再分布)」(D錯誤)。故B正確。","options":{"A":"再分布使其短效(非長效)—錯誤。","B":"thiopental為速效型麻醉藥—正解。","C":"脂溶性高(非低)—錯誤。","D":"短效靠再分布、非代謝成有效代謝物延長—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-52":{"quick":"慢性巴拉刈(paraquat)暴露與帕金森氏症最相關。","detail":{"background":"「『巴拉刈(paraquat)』(除草劑)」與『農藥『rotenone』』的『慢性長期暴露』,『產生『氧化壓力、粒線體複合體I抑制』,『選擇性傷害『黑質多巴胺神經元』』,『與『帕金森氏症』的發生相關』(流行病學與動物模型支持)。與阿茲海默、肌萎縮側索硬化、亨丁頓舞蹈症關聯較小。故為帕金森氏症。","options":{"A":"巴拉刈暴露與帕金森氏症最相關—正解。","B":"與阿茲海默症關聯較小。","C":"與肌萎縮側索硬化關聯較小。","D":"與亨丁頓舞蹈症(遺傳病)無關。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-73":{"quick":"benztropine(抗膽鹼)不適合用於排尿不順的老年帕金森患者(致尿滯留)。","detail":{"background":"抗帕金森藥中,「『benztropine』(『中樞『抗膽鹼劑』』)」會『因『抗膽鹼作用』造成『尿液滯留、便秘、口乾、認知混亂』』,『『不適合『排尿不順(攝護腺肥大/膀胱無力)』的『老年』患者』』。ropinirole(D2致效)、selegiline(MAO-B)、levodopa較無此抗膽鹼性尿滯留問題。故不適合排尿不順老人者為benztropine。","options":{"A":"benztropine(抗膽鹼)致尿滯留、不適合排尿不順老人—正解。","B":"ropinirole為多巴胺致效劑。","C":"selegiline為MAO-B抑制劑。","D":"levodopa為多巴胺前驅藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-74":{"quick":"methadone可經由口服投與,用於鴉片類成癮的替代治療。","detail":{"background":"「『methadone』」:①「『可『口服』投與(口服生體可用率佳、作用持久)』,『用於『鴉片類成癮的『替代(維持)治療』』與慢性疼痛』」(A正確);②「『本身『仍有成癮性(屬μ鴉片致效劑)』』」(故B錯誤);③「『是『μ鴉片受體『致效劑』』(非拮抗劑)」(故C錯誤);④「『突然停用『仍會產生戒斷症狀』(但較緩和)』」(故D錯誤)。故A正確。","options":{"A":"methadone可口服投與(治鴉片成癮)—正解。","B":"methadone仍有成癮性—錯誤。","C":"methadone為μ受體致效劑(非拮抗)—錯誤。","D":"停用仍會戒斷—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-75":{"quick":"zaleplon作用迅速、半衰期最短,用於改善入睡困難。","detail":{"background":"非苯二氮平類安眠藥「『zaleplon』」:『作用於GABAA-BZD結合位,『起效快、『半衰期極短(約1小時)』』,『專門改善『入睡困難』(且隔日宿醉/殘餘鎮靜少)』。flurazepam(長效)、diazepam(長效)、chlordiazepoxide(長效)半衰期長。故作用快、半衰期最短者為zaleplon。","options":{"A":"zaleplon作用快、半衰期最短、改善入睡困難—正解。","B":"flurazepam為長效。","C":"diazepam為長效。","D":"chlordiazepoxide為長效。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-74":{"quick":"服用disulfiram後飲酒會出現潮紅、噁心、嘔吐、頭痛等戒酒硫反應。","detail":{"background":"「『disulfiram(戒酒硫)』」『抑制『乙醛去氫酶(ALDH)』』:飲酒後『乙醛『堆積』』,引發『『戒酒硫反應(disulfiram-ethanol reaction)』:皮膚『潮紅』、『噁心、嘔吐』、『劇烈頭痛』、心悸、低血壓』,『使病人對酒精產生嫌惡而戒酒』。acamprosate(調節麩胺酸)、naltrexone(鴉片拮抗,減少飲酒慾望)、lorazepam(BZD,治戒斷)無此反應。故為disulfiram。","options":{"A":"disulfiram抑ALDH、飲酒致戒酒硫反應—正解。","B":"acamprosate無此反應。","C":"naltrexone為鴉片拮抗(減飲酒慾)、無此反應。","D":"lorazepam為苯二氮平、無此反應。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-72":{"quick":"selegiline抑制單胺氧化酶B(MAO-B),增強levodopa的療效。","detail":{"background":"「『selegiline(與rasagiline)』」是『『B型單胺氧化酶(MAO-B)『抑制劑』』』:『MAO-B分解『多巴胺』,『抑制MAO-B→『減少多巴胺分解、延長其作用』』,『與levodopa併用『增強並延長療效』』。COMT抑制(entacapone)、dopa decarboxylase抑制(carbidopa)、促多巴胺釋放(amantadine)機制不同。故selegiline為MAO-B抑制劑。","options":{"A":"selegiline抑制MAO-B(增強levodopa)—正解。","B":"抑制COMT為entacapone機制。","C":"抑制dopa decarboxylase為carbidopa機制。","D":"促進多巴胺釋放為amantadine機制。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-73":{"quick":"topiramate長期使用常致體重下降,與phentermine作成複方治肥胖。","detail":{"background":"抗癲癇藥「『topiramate』」長期使用『常造成『體重『降低』』(抑制食慾)』,故『與『phentermine(擬交感食慾抑制劑)』作成『複方(phentermine/topiramate)』,『核准用於『肥胖治療(減重)』』。valproic acid(反而增重)、gabapentin(可能增重)、levetiracetam無顯著減重。故為topiramate。","options":{"A":"topiramate致體重下降、與phentermine複方治肥胖—正解。","B":"valproic acid反而增加體重。","C":"gabapentin可能增重。","D":"levetiracetam無顯著減重。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-74":{"quick":"propofol無鎮痛(止痛)效果,故A錯誤。","detail":{"background":"靜脈麻醉劑「propofol」:①「『『無『鎮痛(止痛)』效果』』(僅『鎮靜、安眠、遺忘』)」——故A「具有鎮痛效果」錯誤;②「『降低血壓(血管擴張+心抑制),『老年人更明顯』』」(B正確);③「『脂溶性高、『起效快』,用於『麻醉誘導與維持』』」(C正確);④「『具『止吐(antiemetic)』作用』」(D正確)。故A錯誤。","options":{"A":"propofol無鎮痛效果—錯誤(正解)。","B":"降血壓在老年人更明顯,正確。","C":"起效快、可用於誘導麻醉,正確。","D":"具止吐作用,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-46":{"quick":"反覆用藥須增加劑量才能達原效果,屬藥物成癮的「耐受性」。","detail":{"background":"藥物成癮特徵:①「『耐受性(tolerance)』」——『『反覆用藥後『藥效『減弱』』,『必須『增加劑量』才能達到原先的效果』』(如安非他命);②「戒斷現象(withdrawal)」——停藥後的不適;③「強化(reinforcement)」——獎賞驅動再用藥;④精神/生理依賴。本題『須增量才能達原效果』即『耐受性』。故為耐受性。","options":{"A":"「重覆性」非標準成癮特徵名詞。","B":"須增量達原效果=耐受性—正解。","C":"戒斷現象為停藥後不適。","D":"強化現象為獎賞驅動再用藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-68":{"quick":"alvimopan為周邊鴉片受體拮抗劑、可能有心血管毒性(限短期住院使用),A正確。","detail":{"background":"「『alvimopan』」用於『腹部手術後『腸阻塞(postoperative ileus)』』:①「『是『周邊作用的『鴉片受體『拮抗劑』』』,『『拮抗鴉片對『腸道』的抑制(促進腸蠕動恢復)』,『可能有『心血管毒性(心肌梗塞風險)』,故『限短期(住院)使用』』」(A正確);②「『因『不易進入中樞神經(周邊選擇性)』,『不拮抗鴉片的『中樞止痛』』」(故B、C錯誤);③「『可『口服』」(故D錯誤)。故A正確。","options":{"A":"周邊鴉片受體拮抗劑、可能心血管毒性—正解。","B":"不易進入中樞(周邊選擇性)—錯誤。","C":"可與鴉片併用(不拮抗中樞止痛)—錯誤。","D":"可口服(非只能注射)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-73":{"quick":"phenytoin是肝酶誘導劑(增加其他藥物代謝),故B錯誤。","detail":{"background":"抗癲癇藥「phenytoin」:①「『阻斷鈉通道、『延長其『不反應期(inactivated state)』』」(A正確);②「『是『肝臟微粒體酵素(CYP)『誘導劑』』,『『增加(加速)』其他藥物的代謝』(使併用藥效降低)』」——故B「『『抑制』肝酶、『減少』其他藥代謝』」錯誤(應為誘導/增加);③「『與『白蛋白(albumin)』高度結合』」(C正確);④「『水溶性差(『溶解度較其前驅藥fosphenytoin『差』』)」(D正確)。故B錯誤。","options":{"A":"延長鈉通道不反應期,正確。","B":"phenytoin為肝酶誘導劑(增其他藥代謝)、非抑制—錯誤(正解)。","C":"與albumin高度結合,正確。","D":"溶解度較fosphenytoin差,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-74":{"quick":"鴉片類的瞳孔縮小(miosis)最不容易產生耐受性。","detail":{"background":"鴉片類長期使用,多數作用(『鎮痛、欣快、鎮靜、呼吸抑制、咳嗽抑制』)會逐漸『產生耐受性(須增量)』;但有兩個作用『『幾乎『不』產生耐受性』』:『『瞳孔縮小(miosis)』與『便秘』』(故鴉片成癮者仍可見『針狀瞳孔』、長期便秘)。故最不易耐受者為瞳孔縮小。","options":{"A":"瞳孔縮小最不易產生耐受性—正解。","B":"鎮痛會產生耐受性。","C":"咳嗽抑制會產生耐受性。","D":"欣快感會產生耐受性。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-68":{"quick":"loperamide與diphenoxylate皆作用於腸道、不具中樞止痛作用,D正確。","detail":{"background":"止瀉的鴉片類:「『loperamide』與『diphenoxylate』」皆『作用於『腸道』μ受體(減慢腸蠕動止瀉)』:①「『loperamide『幾乎不過血腦屏障』(無中樞作用、『成癮性極低』);diphenoxylate高劑量才有中樞作用(常加atropine防濫用)」(故A、B、C不完全成立);②「『『兩者『皆『不具(全身性)『止痛(analgesia)』作用』』(主要作用於腸道)』」(D正確)。故D正確。","options":{"A":"loperamide幾乎不產生耐藥性(非皆有)。","B":"loperamide不易過血腦屏障(非皆可)。","C":"loperamide成癮性極低(非皆有)。","D":"兩者皆不具(中樞)止痛作用—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-72":{"quick":"bupivacaine抑制鈉通道(非興奮opioid受體),故B錯誤。","detail":{"background":"局部麻醉劑:①「『lidocaine』『抑制(阻斷)『鈉離子通道』』(阻斷神經傳導)」(A正確);②「『bupivacaine』也是『『阻斷鈉通道』』的『醯胺類局麻劑』,『『而『非『興奮鴉片受體』』』」——故B「『bupivacaine興奮opioid受體』」錯誤;③「『cocaine』除局麻外另『阻斷NE再回收→『血管收縮』』」(C正確);④「『benzocaine(酯類)』可致『變性血紅素血症(methemoglobinemia)』」(D正確)。故B錯誤。","options":{"A":"lidocaine抑制鈉通道,正確。","B":"bupivacaine抑制鈉通道、非興奮opioid受體—錯誤(正解)。","C":"cocaine會產生血管收縮,正確。","D":"benzocaine致變性血紅素血症,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-74":{"quick":"dextromethorphan為鴉片衍生物、有止咳作用且最不具成癮性。","detail":{"background":"「『dextromethorphan』」是『『鴉片(嗎啡喃)衍生物』,但『『作用於『止咳中樞』(無鎮痛、『成癮性極低』)』』,『為常見『非麻醉性『止咳藥』』』。methadone(μ致效、成癮)、codeine(止咳但有成癮性與便秘)、loperamide(止瀉)相比,『dextromethorphan『最不具成癮性』』。故為dextromethorphan。","options":{"A":"methadone為μ致效、有成癮性。","B":"dextromethorphan止咳、最不成癮—正解。","C":"codeine止咳但有成癮性。","D":"loperamide為止瀉藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-72":{"quick":"propofol藥效短的主因是「再分布」而非肝臟代謝快,故D錯誤。","detail":{"background":"全身麻醉劑:①「isoflurane、nitrous oxide為『吸入型』」(A正確);②「propofol、midazolam為『靜脈注射型』」(B正確);③「『etomidate具『安眠效果『但『無止痛』』(心血管穩定,但抑制腎上腺皮質)」(C正確);④「『propofol『藥效『短』』的『主要原因是『『再分布(redistribution,從腦再分布到周邊)』』,『『而非『肝臟代謝快』』(雖代謝也快,但短效主因是再分布)』」——故D錯誤。故D錯誤。","options":{"A":"isoflurane與N2O為吸入型麻醉藥,正確。","B":"propofol與midazolam為靜脈型,正確。","C":"etomidate有安眠效果但無止痛,正確。","D":"propofol短效主因為再分布、非肝代謝快—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-73":{"quick":"ropinirole(多巴胺致效劑)不是治療亨丁頓舞蹈症的藥物(反會加重)。","detail":{"background":"「亨丁頓舞蹈症(Huntington’s disease)」的舞蹈動作與『多巴胺『過度』活性』有關,治療以『『減少多巴胺作用』』:①「『tetrabenazine(抑制VMAT2,耗竭多巴胺)』」;②「『haloperidol、fluphenazine(D2受體『阻斷』的抗精神病藥)』」。而「『ropinirole』是『『多巴胺受體『致效劑』』(治帕金森),『『會『加重』亨丁頓舞蹈』,『非治療藥』」。故不是治Huntington者為ropinirole。","options":{"A":"tetrabenazine耗竭多巴胺、治Huntington。","B":"haloperidol阻斷D2、治Huntington舞蹈。","C":"fluphenazine阻斷D2、治Huntington。","D":"ropinirole為多巴胺致效劑、非治Huntington(反加重)—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-74":{"quick":"lamotrigine抑制鈉離子通道,亦可改善癲癇病人的憂鬱症。","detail":{"background":"抗癲癇藥「lamotrigine」:①『機轉為『『阻斷『電壓門控鈉離子通道』』』(穩定神經膜、減少麩胺酸釋放)』;②『另具『『情緒穩定(改善『憂鬱』)』』作用,『核准用於『雙相情緒障礙的『憂鬱』預防』』,故適合『合併憂鬱的癲癇病人』。tiagabine(GABA轉運子)、clonazepam(BZD/GABAA)、ethosuximide(T型鈣通道)機制不同。故抑鈉通道兼改善憂鬱者為lamotrigine。","options":{"A":"lamotrigine抑鈉通道、亦改善憂鬱—正解。","B":"tiagabine阻斷GABA轉運子。","C":"clonazepam作用GABAA(BZD)。","D":"ethosuximide阻斷T型鈣通道。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-72":{"quick":"phenytoin結合並穩定不活化態鈉通道、延長不反應期(非使其快速回resting),故A錯誤。","detail":{"background":"鈉通道阻斷型抗癲癇藥:①「『phenytoin』『結合於『不活化態(inactivated state)』的鈉通道』,『『穩定』其『不活化態、『延長『不反應期(refractory period)』』』』,『『而『非『使其『快速進入resting state』』』」——故A錯誤;②「『lamotrigine具『使用依賴性(use-dependent)阻斷』,對『高頻放電神經抑制較強』」(B正確);③「『oxcarbazepine(鈉通道阻斷)『會『加重『Dravet症候群』』(此症用鈉通道阻斷劑反惡化)」(C正確);④「『carbamazepine可能引發『史蒂芬強生症候群(SJS,尤HLA-B*1502者)』』」(D正確)。故A錯誤。","options":{"A":"phenytoin穩定不活化態、延長不反應期(非快速回resting)—錯誤(正解)。","B":"lamotrigine具use-dependent阻斷,正確。","C":"oxcarbazepine加重Dravet症候群,正確。","D":"carbamazepine可能引發SJS,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-73":{"quick":"bupivacaine為長效型醯胺類局麻劑,具較明顯的心臟毒性。","detail":{"background":"局部麻醉劑:「『bupivacaine』」是『『長效型『醯胺類(amide)』局麻劑』』,『脂溶性高、作用久(用於硬膜外、區域阻斷)』,但『『心臟毒性『明顯』(『與心肌鈉通道『解離慢』』,過量易致『難以復甦的心律不整、心搏停止』)』』。procaine(酯類短效)、lidocaine(醯胺中效,心毒較低)、cocaine(酯類)相比,bupivacaine心臟毒性最突出。故為bupivacaine。","options":{"A":"bupivacaine為長效醯胺類、心臟毒性明顯—正解。","B":"procaine為酯類短效。","C":"lidocaine為中效、心毒較低。","D":"cocaine為酯類(另有血管收縮)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-71":{"quick":"ketorolac(NSAID)可併opioid減術後痛,但不建議使用超過5天。","detail":{"background":"「『ketorolac』」是『『強效『NSAID(非類固醇消炎止痛劑)』』』,『常『與鴉片類併用以『減少術後疼痛(及鴉片用量)』』;但因『『腸胃道出血/潰瘍、腎毒性風險高』,『『使用『不建議超過5天』』』』。belimumab(抗BLyS單抗,治SLE)、tramadol(弱鴉片/SNRI,無此5天限制)、ibuprofen(一般NSAID)非此特定限制。故為ketorolac。","options":{"A":"belimumab為治SLE的單株抗體。","B":"tramadol為弱鴉片/SNRI止痛藥。","C":"ketorolac(NSAID)併opioid減術後痛、不建議>5天—正解。","D":"ibuprofen為一般NSAID。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-73":{"quick":"memantine的機制(NMDA拮抗)與其他三個膽鹼酯酶抑制劑不同。","detail":{"background":"阿茲海默症用藥分兩類機制:①「『膽鹼酯酶抑制劑』——『donepezil、rivastigmine、galantamine』(『提高乙醯膽鹼』,用於輕中度)」;②「『NMDA受體拮抗劑』——『『memantine』』(『阻斷麩胺酸興奮毒性』,用於中重度)」。故『機制與其他三者不同』者為『memantine(NMDA拮抗)』。","options":{"A":"memantine為NMDA受體拮抗劑(機制不同)—正解。","B":"donepezil為膽鹼酯酶抑制劑。","C":"rivastigmine為膽鹼酯酶抑制劑。","D":"galantamine為膽鹼酯酶抑制劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-70":{"quick":"salmeterol為長效型β2致效劑(LABA),不得用於急性氣喘發作。","detail":{"background":"β2腎上腺素受體致效劑分:①「『短效(SABA,如『salbutamol(albuterol)、terbutaline、metaproterenol』)』」——『起效快,用於『急性發作緩解(救援)』』;②「『長效(LABA,如『salmeterol、formoterol』)』」——『作用久(維持),『『salmeterol『起效慢』,『不可用於『急性發作』救援』(須與吸入類固醇併用作維持)』。故為長效、不用於急性發作者為salmeterol。","options":{"A":"salbutamol為短效(急性緩解)。","B":"salmeterol為長效(LABA)、不用於急性發作—正解。","C":"terbutaline為短效。","D":"metaproterenol為短效。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-69":{"quick":"metoclopramide為促動力(prokinetic)藥,可治療糖尿病性胃輕癱。","detail":{"background":"「糖尿病性『胃輕癱(gastroparesis)』」是『自律神經病變致胃排空延遲』。「『metoclopramide』」是『『多巴胺D2受體拮抗『促動力(prokinetic)』藥』』,『『促進胃排空、增加上消化道蠕動』』(並有中樞止吐作用),用於胃輕癱。alosetron(5-HT3拮抗,治腹瀉型腸躁)、loperamide(止瀉)、sucralfate(黏膜保護)非促動力藥。故為metoclopramide。","options":{"A":"alosetron為5-HT3拮抗(治腹瀉型腸躁)。","B":"metoclopramide為promotility藥、治胃輕癱—正解。","C":"loperamide為止瀉藥。","D":"sucralfate為黏膜保護劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-71":{"quick":"allopurinol抑制xanthine oxidase,最適合控制痛風病人的尿酸濃度。","detail":{"background":"痛風的『慢性降尿酸』治療:「『allopurinol』(與febuxostat)」是『『黃嘌呤氧化酶(xanthine oxidase)『抑制劑』』』,『『減少尿酸『生成』』,『控制血尿酸濃度、預防痛風發作與痛風石』』(急性發作期則用NSAID/秋水仙素/類固醇)。ibuprofen、indomethacin(NSAID,治急性發作止痛)、aspirin(低劑量反升尿酸)非降尿酸長期藥。故控制尿酸濃度者為allopurinol。","options":{"A":"ibuprofen為NSAID(治急性發作)。","B":"indomethacin為NSAID(治急性發作)。","C":"allopurinol抑xanthine oxidase、控制尿酸—正解。","D":"aspirin低劑量反升尿酸。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-68":{"quick":"偏頭痛伴噁心嘔吐時,sumatriptan(triptan)為最佳治療藥物。","detail":{"background":"偏頭痛伴『噁心、嘔吐』時:「『sumatriptan』(triptan類,5-HT1B/1D致效劑)」是『針對偏頭痛病理機制(腦膜血管擴張與三叉神經血管發炎)的『特異性治療』』,可『同時緩解頭痛與伴隨的噁心』(亦可合併止吐藥)。acetaminophen、sulindac(僅止痛/抗發炎)、allopurinol(痛風)非偏頭痛特異治療。故最佳為sumatriptan。","options":{"A":"acetaminophen為一般鎮痛(非特異)。","B":"allopurinol為痛風用藥。","C":"sumatriptan為偏頭痛特異治療—正解。","D":"sulindac為NSAID(非特異)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-70":{"quick":"orlistat作用於腸胃道,抑制脂肪酶以減少脂肪吸收。","detail":{"background":"「『orlistat』」是『『腸胃道『脂肪酶(lipase)『抑制劑』』』:『抑制胰脂肪酶與胃脂肪酶,『減少『膳食脂肪的吸收(約30%)』』』,用於『減重』(副作用油便、脂溶性維生素吸收減少)。phentermine(中樞食慾抑制)、topiramate、lorcaserin(中樞作用)機制不同。故腸胃道減脂肪吸收者為orlistat。","options":{"A":"phentermine為中樞食慾抑制劑。","B":"topiramate為中樞作用(抑食慾)。","C":"orlistat抑脂肪酶、減脂肪吸收—正解。","D":"lorcaserin為中樞5-HT2C致效劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-74":{"quick":"ziprasidone對5-HT2受體高親和、較少EPS但有QT延長(本題A、B均給分)。","detail":{"background":"非典型抗精神病藥『對5-HT2受體高親和、較少EPS』:①「『ziprasidone』」——『5-HT2親和高、EPS少,但『有『QT間期延長』風險』(須注意心律)」(A正確);②「clozapine」也對5-HT2高親和、EPS極少(B判給分,但clozapine的主要風險是顆粒球缺乏);③chlorpromazine、haloperidol為典型藥、EPS多。本題公告「A、B均給分」(以ziprasidone的QT延長特性為主)。","options":{"A":"ziprasidone對5-HT2高親和、少EPS、有QT延長—正解。","B":"clozapine對5-HT2高親和、EPS少(本題判給分)。","C":"chlorpromazine為典型藥。","D":"haloperidol為典型藥、EPS多。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-55":{"quick":"nedocromil(肥大細胞穩定劑)只能預防性給藥,氣喘已發作則無療效。","detail":{"background":"「『nedocromil(與cromolyn sodium)』」是『『肥大細胞穩定劑』』:『『抑制肥大細胞『去顆粒、預防發炎介質釋放』』,『『只適合『預防性(維持)』給藥』,『『對『已發作』的氣喘『無支氣管擴張療效(緩解無效)』』』。albuterol(SABA)、theophylline、salmeterol有支氣管擴張作用。故只適合預防、發作無效者為nedocromil。","options":{"A":"albuterol(SABA)可緩解急性發作。","B":"theophylline有支氣管擴張作用。","C":"salmeterol(LABA)有支氣管擴張作用。","D":"nedocromil只預防、發作無效—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-56":{"quick":"cimetidine長期使用易導致陽痿(具抗雄激素作用)。","detail":{"background":"H2受體拮抗劑中,「『cimetidine』」『具『抗雄激素(androgen)作用(阻斷雄激素受體、增加泌乳素)』』,『長期使用可致『男性『陽痿(性功能障礙)、女乳症』』』;此外cimetidine也『抑制CYP450(藥物交互作用多)』。omeprazole(PPI)、nizatidine、ranitidine(其他H2拮抗)無此明顯抗雄激素副作用。故易致陽痿者為cimetidine。","options":{"A":"omeprazole(PPI)無此副作用。","B":"cimetidine具抗雄激素、易致陽痿—正解。","C":"nizatidine無此明顯副作用。","D":"ranitidine無此明顯副作用。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-57":{"quick":"早產兒開放性動脈導管可用ibuprofen(NSAID)使其關閉。","detail":{"background":"「早產兒『開放性動脈導管(PDA)』」的關閉:動脈導管的開放靠『前列腺素(PGE2)』維持;『給予『NSAID(『ibuprofen』或indomethacin)』『抑制前列腺素合成→『促使動脈導管『收縮關閉』』』。rofecoxib(COX-2,已下市)、diclofenac、sulindac非新生兒PDA標準用藥。故為ibuprofen。(反之,維持PDA開放用PGE1=alprostadil。)","options":{"A":"diclofenac非新生兒PDA標準用藥。","B":"ibuprofen(NSAID)關閉早產兒PDA—正解。","C":"rofecoxib(COX-2)已下市、非此用。","D":"sulindac非此用藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-66":{"quick":"睫狀肌麻痺(cycloplegia)是抗膽鹼劑的用途,非擬交感神經作用劑的用途。","detail":{"background":"擬交感神經作用劑(sympathomimetics)的臨床用途:①「『過敏性休克(epinephrine急救)』」;②「『氣喘(β2致效支氣管擴張)』」;③「『抑制早產(β2致效ritodrine安胎)』」;④鼻充血、升壓、散瞳(α致效)。而「『睫狀肌麻痺(cycloplegia,麻痺睫狀肌使無法調節)』」是『『抗膽鹼劑(如atropine)』的作用』,『『非擬交感的用途』」。故不是擬交感用途者為睫狀肌麻痺。","options":{"A":"睫狀肌麻痺為抗膽鹼劑用途、非擬交感—正解。","B":"過敏性休克為擬交感(epinephrine)用途。","C":"氣喘為擬交感(β2致效)用途。","D":"抑制早產為擬交感(β2致效)用途。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-67":{"quick":"cromolyn sodium治氣喘的機制是抑制肥大細胞去顆粒化。","detail":{"background":"「『cromolyn sodium(色甘酸鈉)』」治氣喘的機制是『『穩定『肥大細胞(mast cell)』、『抑制其『去顆粒化(degranulation)』』』,『『阻止組織胺、白三烯等發炎介質的釋放』』,『故『只能『預防』(對已發作無效)』。並非降迷走神經、非活化adenylyl cyclase、非抑PDE。故機制為抑制肥大細胞去顆粒化。","options":{"A":"非降低迷走神經活性。","B":"活化adenylyl cyclase為β2致效機制。","C":"抑PDE為theophylline機制。","D":"cromolyn抑制肥大細胞去顆粒化—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-68":{"quick":"糖皮質激素誘導的抗發炎蛋白lipocortin可抑制phospholipase A2。","detail":{"background":"「糖皮質激素(glucocorticoids)」的抗發炎機制之一是『誘導『抗發炎蛋白『lipocortin(annexin-1)』』』的生成,『『lipocortin『抑制『磷脂酶A2(phospholipase A2)』』』,『減少『花生四烯酸(arachidonic acid)』釋放』,『進而『減少前列腺素與白三烯的合成』』。trypsin(蛋白酶)、leptin(瘦素)、leukotriene(白三烯,本身是發炎介質)非此抗發炎蛋白。故為lipocortin。","options":{"A":"trypsin為消化蛋白酶。","B":"leptin為瘦素(調控食慾)。","C":"lipocortin抑制phospholipase A2(類固醇誘導)—正解。","D":"leukotriene為發炎介質(非抗發炎蛋白)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-62":{"quick":"消化性潰瘍較不適合使用類固醇(糖皮質激素會加重潰瘍)。","detail":{"background":"糖皮質激素(類固醇)的適應與禁忌:①「愛迪生氏病(Addison’s,腎上腺皮質不全)」——『須補充類固醇(適合)』;②「發炎性腸道疾病(IBD)、氣喘」——『抗發炎/免疫抑制(適合)』;③「『消化性潰瘍(peptic ulcer)』」——『類固醇『增加胃酸、減少黏膜保護、抑制癒合』,『會『加重潰瘍/出血』,『『較不適合(相對禁忌)』』」。故較不適合者為消化性潰瘍。","options":{"A":"愛迪生氏病須補充類固醇(適合)。","B":"發炎性腸道疾病可用類固醇。","C":"消化性潰瘍不適合類固醇(會加重)—正解。","D":"氣喘可用類固醇(抗發炎)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-67":{"quick":"albuterol經定量吸入器使用主要作用肺臟、短效且幾乎無全身生體可用率。","detail":{"background":"「『albuterol(salbutamol)』」是『『短效β2致效劑(SABA)』』,『經『定量吸入器(MDI)』使用時,『藥物『主要直接作用於『肺臟(局部)』』,『『吞入部分經肝首渡代謝、『全身生體可用率極低』』』,『故全身副作用少』。montelukast(口服抗白三烯)、flunisolide(吸入類固醇)、tiotropium(長效抗膽鹼)性質不同。故為albuterol。","options":{"A":"albuterol吸入主要作用肺、短效、幾無全身生體可用率—正解。","B":"montelukast為口服抗白三烯。","C":"flunisolide為吸入類固醇。","D":"tiotropium為長效抗膽鹼。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-68":{"quick":"famotidine在H2受體拮抗劑中抑制胃酸的作用強度最強。","detail":{"background":"H2受體拮抗劑的『抑酸『效價(potency)』』差異可達數十倍:『『famotidine『最強』』 > nizatidine ≈ ranitidine > 『cimetidine『最弱』』』(相對效價約 famotidine 為 cimetidine 的數十倍)。故抑酸作用最強者為famotidine。(cimetidine另有抗雄激素與抑CYP的副作用。)","options":{"A":"cimetidine抑酸效價最弱。","B":"ranitidine效價中等。","C":"nizatidine效價中等。","D":"famotidine抑酸效價最強—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-69":{"quick":"tasimelteon為MT1與MT2褪黑激素受體致效劑,用於睡眠失調。","detail":{"background":"「『tasimelteon』(與ramelteon)」是『『褪黑激素『MT1與MT2受體『致效劑』』』:『模擬褪黑激素、調節『晝夜節律』』,用於『睡眠失調(尤『非24小時睡醒節律障礙』、失眠)』。sumatriptan(偏頭痛triptan)、repinotan(5-HT1A)、orlistat(減重)非褪黑激素受體致效劑。故MT1/MT2致效劑為tasimelteon。","options":{"A":"tasimelteon為MT1/MT2致效劑、治睡眠失調—正解。","B":"sumatriptan為偏頭痛triptan。","C":"repinotan為5-HT1A致效劑。","D":"orlistat為減重藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-71":{"quick":"febuxostat可有效治療痛風病人的慢性高尿酸血症(抑制xanthine oxidase)。","detail":{"background":"痛風『慢性高尿酸血症』的降尿酸藥:「『febuxostat』(與allopurinol)」是『『黃嘌呤氧化酶(xanthine oxidase)『抑制劑』』』,『『減少尿酸生成、長期控制血尿酸』』。tramadol(止痛)、rilonacept(IL-1拮抗,治發炎)、ketorolac(NSAID,治急性發作)非降尿酸長期藥。故治慢性高尿酸者為febuxostat。","options":{"A":"tramadol為止痛藥。","B":"rilonacept為IL-1拮抗(治發炎)。","C":"ketorolac為NSAID(治急性發作)。","D":"febuxostat抑xanthine oxidase、治慢性高尿酸—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-57":{"quick":"diphenhydramine為H1拮抗劑、具抗膽鹼性,可緩解藥物引起的錐體外症狀。","detail":{"background":"「『diphenhydramine』」是『『第一代H1抗組織胺』』,『因『具『抗膽鹼(antimuscarinic)』作用且『能過血腦屏障』』,『可『緩解『抗精神病藥引起的『急性肌張力不全/錐體外症狀(EPS)』』(平衡多巴胺-膽鹼)』』(與benztropine同理)。famotidine(H2拮抗)、haloperidol(致EPS)、cetirizine(第二代H1,不過BBB、無此用)不適用。故緩解EPS的H1拮抗劑為diphenhydramine。","options":{"A":"famotidine為H2拮抗劑。","B":"haloperidol反而引起EPS。","C":"diphenhydramine(H1拮抗、抗膽鹼)緩解EPS—正解。","D":"cetirizine(第二代)不過BBB、無此用。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-61":{"quick":"prednisolone(糖皮質激素)的受體位於細胞內(核受體),不在細胞膜。","detail":{"background":"受體位置:①「『prednisolone(糖皮質激素)』」——『脂溶性、『穿透細胞膜』,『『與『細胞內(核)受體』結合』,『調控基因轉錄』』」;②「erlotinib(作用膜上酪胺酸激酶受體)、metoclopramide(膜上D2受體)、diphenhydramine(膜上H1受體)」——『作用於『細胞膜』受體』。故主要受體在『細胞內部』者為prednisolone。","options":{"A":"erlotinib作用膜上酪胺酸激酶受體。","B":"metoclopramide作用膜上D2受體。","C":"prednisolone作用細胞內(核)受體—正解。","D":"diphenhydramine作用膜上H1受體。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-68":{"quick":"omalizumab與血中IgE形成複合體、由肝臟吞噬細胞清除。","detail":{"background":"「『omalizumab』」是『『抗IgE單株抗體』』:『『與血中『游離IgE』結合形成『複合體』』,『『降低游離IgE、阻止其與肥大細胞FcεRI結合』』,『複合體由『網狀內皮(肝臟吞噬細胞)清除』』,用於『中重度過敏性氣喘、慢性蕁麻疹』。mepolizumab(抗IL-5)、tocilizumab(抗IL-6R)、efalizumab(抗LFA-1)標的不同。故與IgE形成複合體者為omalizumab。","options":{"A":"mepolizumab為抗IL-5。","B":"tocilizumab為抗IL-6受體。","C":"omalizumab與IgE形成複合體、由肝清除—正解。","D":"efalizumab為抗LFA-1(已下市)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-70":{"quick":"Diclegis(doxylamine+B6)經拮抗H1受體止吐,最適合用於孕婦。","detail":{"background":"「『Diclegis(doxylamine + pyridoxine/B6)』」是『核准用於『孕婦『晨吐(噁心嘔吐)』』的藥物』:其中『doxylamine是『第一代H1抗組織胺』,『經『拮抗H1受體』止吐』,『安全性佳(孕婦first-line)』。ondansetron(5-HT3拮抗)、ranitidine(H2拮抗,治胃酸)、tiprolisant非孕婦止吐首選且機制不同。故經H1拮抗、適合孕婦止吐者為Diclegis。","options":{"A":"ondansetron為5-HT3拮抗止吐。","B":"ranitidine為H2拮抗(抑胃酸)。","C":"tiprolisant非孕婦止吐用。","D":"Diclegis(doxylamine,H1拮抗)適合孕婦止吐—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-72":{"quick":"rilonacept為IL-1拮抗劑,可治cryopyrin相關週期性症候群(CAPS)。","detail":{"background":"「『rilonacept』(及canakinumab、anakinra)」是『『介白素-1(IL-1)『拮抗/誘捕劑』』』:『阻斷IL-1的發炎作用』,用於『『冷凝集素相關週期性症候群(CAPS)』(自體發炎疾病,含『家族性冷自體發炎症候群』)』。ketorolac(NSAID)、secukinumab(抗IL-17)、tramadol(止痛)機制不同。故治CAPS者為rilonacept。","options":{"A":"ketorolac為NSAID。","B":"rilonacept為IL-1拮抗劑、治CAPS—正解。","C":"secukinumab為抗IL-17。","D":"tramadol為止痛藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-68":{"quick":"兒童急性氣喘發作以albuterol(短效β2致效劑)療效最佳也最快。","detail":{"background":"兒童(與成人)『急性氣喘發作』的『首選急救藥』是『『短效β2致效劑(SABA,如『albuterol/salbutamol』)』』——『吸入後『快速『擴張支氣管』、緩解呼吸困難』』。salmeterol(LABA,起效慢、不用於急性)、zafirlukast(抗白三烯,維持用)、ipratropium(抗膽鹼,輔助但不及SABA快)非急救首選。故最佳最快者為albuterol。","options":{"A":"salmeterol(LABA)起效慢、不用於急性。","B":"zafirlukast(抗白三烯)為維持用。","C":"albuterol(SABA)急性發作最快最佳—正解。","D":"ipratropium(抗膽鹼)為輔助、不及SABA快。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-71":{"quick":"第一代與第二代抗組織胺的主要區分是通過血腦屏障的能力。","detail":{"background":"H1抗組織胺分代的主要區別在於『『中樞(鎮靜)副作用』』,即『『通過『血腦屏障(BBB)』的能力』』:①「『第一代(如diphenhydramine、chlorpheniramine)』」——『脂溶性高、『易過BBB』→『嗜睡、抗膽鹼副作用』」;②「『第二代(如cetirizine、loratadine、fexofenadine)』」——『不易過BBB→『較少嗜睡』』。故主要區分依據為『通過血腦屏障的能力』。","options":{"A":"兩代對H1親和力非主要區分依據。","B":"通過血腦屏障的能力為主要區分—正解。","C":"抗腎上腺素活性非主要區分。","D":"與H3受體親和力非區分依據。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-67":{"quick":"metoclopramide的主要副作用是錐體外症狀(EPS)。","detail":{"background":"「『metoclopramide』」是『『多巴胺D2受體『拮抗』的促動力/止吐藥』』:因『『阻斷『中樞(黑質紋狀體)D2受體』』』,『主要副作用為『『錐體外症狀(EPS:急性肌張力不全、靜坐不能、類帕金森、遲發性運動障礙)』』』(尤其年輕人、長期/高劑量),亦致高泌乳素血症。它本身是『治療(非引起)胃食道逆流、嘔吐』的藥。故主要副作用為錐體外症狀。","options":{"A":"metoclopramide是治療(非引起)胃食道逆流。","B":"metoclopramide主要副作用為錐體外症狀—正解。","C":"嗜睡非其最主要副作用。","D":"metoclopramide是止吐(非致吐)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-69":{"quick":"本題公告「一律給分」;腸躁症合併便秘可用tegaserod(5-HT4致效)。","detail":{"background":"「『便秘型腸躁症(IBS-C)』」可用『『5-HT4受體『致效劑』』(『促進腸蠕動、增加分泌)』:「『tegaserod』(5-HT4部分致效劑)」曾用於女性IBS-C。cisapride(5-HT4致效,因QT延長下市)、fluoxetine(SSRI)、ritanserin(5-HT2拮抗)非IBS-C首選。本題選項判定有歧義、公告「一律給分(送分)」。","options":{"A":"tegaserod(5-HT4致效)用於便秘型腸躁(本題送分)。","B":"cisapride為5-HT4致效(已下市,本題送分)。","C":"fluoxetine為SSRI(本題送分)。","D":"ritanserin為5-HT2拮抗(本題送分)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-71":{"quick":"zafirlukast經抑制支氣管平滑肌的白三烯受體而治氣喘。","detail":{"background":"抗白三烯氣喘藥分兩類:①「『白三烯『受體拮抗劑』(如『zafirlukast、montelukast』)」——『『阻斷『支氣管平滑肌上的『白三烯(CysLT1)受體』』』,『減少支氣管收縮與發炎』』;②「『zileuton』」——『抑制『5-脂氧化酶』(減少白三烯『合成』)』。本題『抑制『白三烯『受體』』』者為zafirlukast。misoprostol(PGE1)、iloprost(前列環素)非抗白三烯。故為zafirlukast。","options":{"A":"zafirlukast抑制白三烯受體—正解。","B":"misoprostol為PGE1。","C":"zileuton抑制5-脂氧化酶(非受體)。","D":"iloprost為前列環素。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-67":{"quick":"zafirlukast治氣喘的機轉是抑制(拮抗)白三烯受體。","detail":{"background":"「『zafirlukast』(與montelukast)」是『『半胱胺醯白三烯『受體(CysLT1)『拮抗劑』』』:『阻斷白三烯對支氣管的『收縮與發炎』作用』,用於『氣喘的『維持(預防)』治療』(尤其運動誘發、阿斯匹靈過敏型氣喘)。並非拮抗adenosine受體、非減cAMP降解、非減組織胺釋放。故機轉為抑制白三烯受體。","options":{"A":"非拮抗adenosine受體(那是theophylline機制之一)。","B":"zafirlukast抑制白三烯受體—正解。","C":"減cAMP降解為PDE抑制劑機制。","D":"減組織胺釋放為cromolyn機制。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-69":{"quick":"本題公告「一律給分」;5-HT4致效劑可用於胃食道逆流(如cisapride)。","detail":{"background":"「『5-HT4受體『致效劑』』」可『促進上消化道蠕動、增加食道下括約肌張力』,用於『『胃食道逆流(GERD)』、胃輕癱、便秘型腸躁』:如『cisapride(5-HT4致效,因QT延長/心律不整下市)、tegaserod』。fluoxetine(SSRI)、ritanserin(5-HT2拮抗)非5-HT4致效。本題選項判定有歧義、公告「一律給分(送分)」。","options":{"A":"tegaserod為5-HT4致效(本題送分)。","B":"cisapride為5-HT4致效(已下市,本題送分)。","C":"fluoxetine為SSRI(本題送分)。","D":"ritanserin為5-HT2拮抗(本題送分)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-71":{"quick":"zileuton(抗白三烯)最適合用於輕度到中度氣喘的治療。","detail":{"background":"本題問『治療『氣喘』的藥物』:「『zileuton』」是『『5-脂氧化酶抑制劑(抗白三烯)』』,『減少白三烯合成、抑制支氣管收縮與發炎』,用於『『輕至中度氣喘』的『維持(控制)』治療』。misoprostol(PGE1,治潰瘍/墮胎)、ibuprofen/indomethacin(NSAID,『可能誘發阿斯匹靈型氣喘』)非氣喘治療藥。故治氣喘者為zileuton。","options":{"A":"misoprostol為PGE1(非氣喘藥)。","B":"ibuprofen(NSAID)可能誘發氣喘。","C":"zileuton(抗白三烯)治輕中度氣喘—正解。","D":"indomethacin(NSAID)非氣喘藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-69":{"quick":"sumatriptan治偏頭痛是經直接血管收縮並減少對痛覺神經末梢的刺激。","detail":{"background":"「sumatriptan」(triptan類,『5-HT1B/1D『致效劑』』)治偏頭痛的機制:①「『活化血管平滑肌的『5-HT1B受體』→『直接『血管收縮(收縮擴張的腦/腦膜血管)』』」;②「『活化三叉神經末梢的『5-HT1D受體』→『減少『血管活性神經肽(如CGRP)的釋放』、減少對『痛覺神經末梢』的刺激與神經性發炎』」。故機制為『直接血管收縮+減少對痛覺末梢的刺激』(D)。(triptan是『致效劑』非拮抗劑。)","options":{"A":"非阻斷鈣通道使血管舒張(反而收縮)。","B":"非抑制環氧酶(那是NSAID)。","C":"triptan為5-HT受體『致效』(非拮抗)。","D":"直接血管收縮並減少對痛覺末梢的刺激—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-71":{"quick":"NSAID抑制前列腺素、減少(非增強)發炎所致的血管舒張,故C錯誤。","detail":{"background":"非類固醇抗發炎藥(NSAIDs):①「『抑制前列腺素合成→『降低血管對『緩激肽、組織胺』的敏感性』(減少疼痛與發炎)」(A正確);②「重複給藥後可分布到『關節滑液』、治療關節炎」(B正確);③「『NSAID『抑制前列腺素(血管舒張介質)』→『『減少(而非增強)』發炎所致的『血管舒張』』』」——故C「『『增強』發炎所致血管舒張』」錯誤;④「『選擇性COX-2抑制劑(如rofecoxib)『增加水腫、高血壓與『心肌梗塞/血栓』風險』」(D正確)。故C錯誤。","options":{"A":"降低血管對緩激肽/組織胺的敏感性,正確。","B":"可出現於關節滑液治關節炎,正確。","C":"NSAID減少(非增強)發炎血管舒張—錯誤(正解)。","D":"COX-2抑制劑增加水腫/高血壓/心肌梗塞,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-67":{"quick":"nizatidine的肝臟首渡代謝最小(生體可用率近100%)。","detail":{"background":"H2受體拮抗劑的『肝臟首渡代謝(first-pass)』:「『nizatidine』」的『首渡代謝『最小』,『口服『生體可用率『最高(近100%)』』』。cimetidine、ranitidine、famotidine皆有較明顯的首渡代謝(生體可用率約50%)。故首渡代謝最小者為nizatidine。","options":{"A":"cimetidine有首渡代謝(生體可用率約60%)。","B":"nizatidine首渡代謝最小(生體可用率近100%)—正解。","C":"ranitidine有首渡代謝(約50%)。","D":"famotidine有首渡代謝(約40-45%)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-68":{"quick":"reslizumab的標的為IL-5,用於治療嚴重型嗜酸性球氣喘。","detail":{"background":"「『reslizumab』(與mepolizumab)」是『『抗『介白素-5(IL-5)』單株抗體』』:『IL-5促進『嗜酸性球(eosinophil)』的成熟與存活;『阻斷IL-5→『減少嗜酸性球』』,用於『『嚴重型『嗜酸性球性(eosinophilic)氣喘』』』。omalizumab(抗IgE)、dupilumab(抗IL-4Rα)、alemtuzumab(抗CD52)標的不同。故抗IL-5者為reslizumab。","options":{"A":"reslizumab為抗IL-5、治嗜酸性氣喘—正解。","B":"omalizumab為抗IgE。","C":"dupilumab為抗IL-4Rα。","D":"alemtuzumab為抗CD52。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-69":{"quick":"palonosetron(5-HT3拮抗止吐劑)最不適用於便秘的治療(反致便秘)。","detail":{"background":"便秘的治療藥:①「氧化鎂(MgO,滲透性瀉劑)」;②「lactulose(滲透性瀉劑)」;③「prucalopride(5-HT4致效,促動力)」。而「『palonosetron』是『『5-HT3受體『拮抗』的『止吐藥』』』,『其副作用『反而是『便秘』』(減慢腸蠕動)』,『『最不適用於『便秘』治療(會加重)』」。故最不適用者為palonosetron。","options":{"A":"氧化鎂為滲透性瀉劑(治便秘)。","B":"lactulose為滲透性瀉劑(治便秘)。","C":"prucalopride為5-HT4致效促動力(治便秘)。","D":"palonosetron(5-HT3拮抗止吐)致便秘、不適用於便秘—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-71":{"quick":"misoprostol(PGE1製劑)可與mifepristone併用作為早期人工流產藥物。","detail":{"background":"「『misoprostol』」是『『前列腺素E1(PGE1)『製劑』』』,『『使『子宮收縮』』,『與『mifepristone(抗黃體素)』『併用』作為『早期懷孕的『藥物(人工)流產』』』(亦用於產後出血、胃潰瘍預防)。latanoprost(前列腺素,降眼壓)、treprostinil(前列環素,肺高壓)、alprostadil(PGE1,但用於勃起/維持PDA)非流產併用藥。故與mifepristone併用流產者為misoprostol。","options":{"A":"latanoprost為前列腺素(降眼壓)。","B":"treprostinil為前列環素(治肺高壓)。","C":"misoprostol(PGE1)與mifepristone併用早期流產—正解。","D":"alprostadil(PGE1)用於勃起/維持PDA。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-67":{"quick":"alosetron(5-HT3拮抗)對女性腹瀉型腸躁症最有療效。","detail":{"background":"「『alosetron』」是『『5-HT3受體『拮抗劑』』』:『『減慢腸蠕動、降低內臟敏感』』,『核准用於『『女性』『腹瀉型『腸躁症(IBS-D)』』』(因有缺血性結腸炎風險而限制使用)。tegaserod、prucalopride(5-HT4致效,治『便秘型』)、granisetron(5-HT3拮抗,但用於化療止吐)非IBS-D首選。故女性腹瀉型腸躁最有療效者為alosetron。","options":{"A":"tegaserod(5-HT4致效)用於便秘型腸躁。","B":"alosetron(5-HT3拮抗)治女性腹瀉型腸躁—正解。","C":"prucalopride(5-HT4致效)用於便秘。","D":"granisetron(5-HT3拮抗)用於化療止吐。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-69":{"quick":"allopurinol應避免使用於HLA-B*5801基因變異的痛風病人(嚴重皮膚反應風險)。","detail":{"background":"「『allopurinol』」(降尿酸藥)在『帶有『HLA-B*5801』基因變異』(亞洲族群常見)的病人,『使用後發生『嚴重皮膚不良反應(SJS/TEN、DRESS,可致命)』的風險『大幅增加』』,『故『應『避免』使用(或先做基因篩檢)』』。colchicine、meclofenamate(NSAID)、febuxostat(雖也降尿酸,但與HLA-B*5801關聯較弱)非此特定禁忌。故應避免者為allopurinol。","options":{"A":"colchicine非HLA-B*5801相關禁忌。","B":"allopurinol於HLA-B*5801者應避免(SJS/TEN風險)—正解。","C":"meclofenamate為NSAID。","D":"febuxostat與HLA-B*5801關聯較弱。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-70":{"quick":"第一代H1受體拮抗劑(具鎮靜作用)可用於協助入眠,C最適當。","detail":{"background":"組織胺受體與用藥:①「『epinephrine』治過敏性休克是『『生理性』作用(α/β受體升壓、支氣管擴張)』,『『而非『拮抗H1受體』』」(故A錯誤);②「『H1拮抗劑『不是『氣喘』的治療藥』(氣喘以β2致效/類固醇為主)」(故B錯誤);③「『『第一代H1拮抗劑(如diphenhydramine)』『具『鎮靜(嗜睡)』作用,『可『協助入眠』』』」(C正確,故為OTC安眠成分);④「『H2拮抗劑用於『胃酸相關(潰瘍)』,『非『過敏性鼻炎』(鼻炎用H1拮抗)』」(故D錯誤)。故C最適當。","options":{"A":"epinephrine為生理性作用、非拮抗H1—錯誤。","B":"H1拮抗劑非氣喘治療藥—錯誤。","C":"第一代H1拮抗劑可協助入眠—正解。","D":"H2拮抗劑用於胃酸、非過敏性鼻炎—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-66":{"quick":"clonidine會致便秘(非腹瀉),故「嚴重腹瀉」最不容易出現。","detail":{"background":"「『clonidine』」是『『中樞α2腎上腺素受體『致效劑』』』(降壓藥):①「『降血壓(減少交感外流)』」(A);②「『口乾舌燥(常見副作用)』」(B);③「『『便秘(減少腸蠕動)』,『『而非『嚴重腹瀉』』』」——故C「嚴重腹瀉」最不容易出現;④「『可『減輕更年期『熱潮紅』』(調節血管運動)」(D)。故最不容易出現者為嚴重腹瀉。","options":{"A":"clonidine降低血壓(常見)。","B":"clonidine致口乾(常見)。","C":"clonidine致便秘、不會嚴重腹瀉—正解(最不容易)。","D":"clonidine可減輕更年期熱潮紅。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-67":{"quick":"omalizumab(抗IgE)亦可治療慢性復發蕁麻疹與花生過敏。","detail":{"background":"「『omalizumab』(抗IgE單株抗體)」除了用於『中重度過敏性『氣喘』』外,『也核准/應用於『『慢性『自發性(復發)蕁麻疹』』』,並在『『食物(花生)過敏』』的減敏輔助治療中應用(降低游離IgE、減少過敏反應)』。albuterol(SABA)、dupilumab(抗IL-4Rα,治異位性皮膚炎/氣喘)、roflumilast(PDE4,治COPD)非此用途。故為omalizumab。","options":{"A":"albuterol為短效β2致效劑。","B":"dupilumab為抗IL-4Rα(治異位性皮膚炎)。","C":"roflumilast為PDE4抑制劑(治COPD)。","D":"omalizumab(抗IgE)治慢性蕁麻疹與花生過敏—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-69":{"quick":"lubiprostone為PGE1衍生物,可治療便秘型腸躁症。","detail":{"background":"「『lubiprostone』」是『『前列腺素E1(PGE1)衍生物』』,『『活化腸道『氯離子通道(ClC-2)』』,『增加腸液分泌、軟化糞便、促進排便』』,用於『『便秘型腸躁症(IBS-C)』與慢性特發性便秘』。linaclotide(GC-C致效,亦治IBS-C但非PGE1)、prucalopride(5-HT4致效)、bimatoprost(前列腺素,降眼壓)機制不同。故PGE1衍生物治IBS-C者為lubiprostone。","options":{"A":"linaclotide為GC-C致效劑(非PGE1)。","B":"prucalopride為5-HT4致效劑。","C":"lubiprostone(PGE1衍生物)治便秘型腸躁—正解。","D":"bimatoprost為前列腺素(降眼壓)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-54":{"quick":"肝硬化水腫(續發高醛固酮)對醛固酮拮抗劑eplerenone反應最佳。","detail":{"background":"「肝硬化引起的『腹水/水腫』」常伴『續發性高醛固酮血症(肝臟對醛固酮代謝下降、有效循環量不足致RAAS活化)』。故對『『醛固酮拮抗劑(保鉀利尿劑,如『eplerenone、spironolactone』)』反應最佳』(spironolactone為肝硬化腹水首選)。mannitol(滲透性)、bumetanide(loop)、thiazide單用效果不及。故為eplerenone。","options":{"A":"mannitol為滲透性利尿劑。","B":"eplerenone(醛固酮拮抗)對肝硬化水腫反應最佳—正解。","C":"bumetanide為loop利尿劑(輔助)。","D":"thiazide單用效果不及。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-55":{"quick":"急性肺水腫最適用loop利尿劑(如ethacrynic acid)。","detail":{"background":"「『急性肺水腫』」須『快速、強力利尿與靜脈擴張以減輕前負荷』,最適用『『環利尿劑(loop diuretics,如furosemide、『ethacrynic acid』、bumetanide)』』(作用於亨利氏環上行支、利尿效力最強、靜脈給藥起效快)。thiazide(中效)、acetazolamide(弱)、spironolactone(慢、弱)不適用於急性肺水腫。故為ethacrynic acid。","options":{"A":"thiazide利尿效力中等、不適急性肺水腫。","B":"ethacrynic acid(loop)最適用急性肺水腫—正解。","C":"acetazolamide利尿弱。","D":"spironolactone起效慢、效力弱。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-62":{"quick":"鹼性藥物較易由乳汁排出(乳汁偏酸、離子捕捉)。","detail":{"background":"藥物的酸鹼與分布:①「『鹼性藥物』在『酸性的乳汁』中『離子化、被『捕捉(ion trapping)』』,『故『較酸性藥物『易由乳汁排出』』」(C正確);②「在『酸性的胃』中,『酸性藥較不離子化、較易吸收』(鹼性藥離子化、不易胃吸收)」(故A錯誤);③「『酸性藥較易與『白蛋白』結合』」(故B錯誤);④「『鹼性藥在『酸性尿』中離子化、不易再吸收(較易排出)』;『酸性藥在酸性尿較易再吸收』」(故D「鹼性藥較易腎小管再吸收」敘述不符)。故C正確。","options":{"A":"酸性藥較易由胃吸收(非鹼性藥)—錯誤。","B":"酸性藥較易與白蛋白結合—錯誤。","C":"鹼性藥較易由乳汁排出(離子捕捉)—正解。","D":"鹼性藥在酸性尿離子化、不易再吸收—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-69":{"quick":"ranolazine抗心絞痛的機轉是抑制晚期鈉電流(late Na current)。","detail":{"background":"「『ranolazine』」是新型抗心絞痛藥,機轉為『『抑制心肌的『晚期鈉電流(late component of Na⁺ current)』』』:『減少鈉內流→『間接減少『鈣超載』』→『改善心肌舒張、降低耗氧』』(不顯著影響心率與血壓)。並非活化鉀電流、非NO供體、非α1阻斷。故機轉為抑制late Na current。","options":{"A":"抑制晚期鈉電流(late Na current)—正解。","B":"非活化延遲整流鉀電流。","C":"非NO供體。","D":"非α1腎上腺素受體阻斷。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-55":{"quick":"nesiritide(BNP類似物)經BNP受體增加cGMP(非cAMP),故A錯誤。","detail":{"background":"「『nesiritide』」是『『重組『腦利鈉肽(BNP)』類似物』』,用於『急性失代償性心衰竭』:①『機轉是『活化『BNP受體(顆粒型鳥苷酸環化酶)』』,『『增加『cGMP』(『而非『cAMP』)』』』——故A「使cAMP增加」錯誤;②「使血管(動靜脈)放鬆、降低前後負荷」(C正確);③「產生『利尿、利鈉』作用」(D正確)。故A錯誤。","options":{"A":"nesiritide增加cGMP(非cAMP)—錯誤(正解)。","B":"活化BNP受體,正確。","C":"使血管放鬆,正確。","D":"產生利尿作用,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-59":{"quick":"thiopental靜脈注射作用短暫的主因是由腦再分布到脂肪等組織。","detail":{"background":"「『thiopental』(超短效靜脈麻醉劑)」:『脂溶性極高,靜脈注射後『迅速進入腦部(快速起效)』;但作用『短暫的『主因是『再分布(redistribution)』』——『藥物『由『血流豐富的腦』『再分布』到『肌肉、『脂肪』等周邊組織』,使腦中濃度迅速下降而甦醒』』(『非靠肝代謝或腎排出』,肝代謝其實緩慢)。故主因為再分布。","options":{"A":"非因腸胃道吸收緩慢(此為靜脈給藥)。","B":"非不經肝代謝直接腎排。","C":"由大腦再分布到脂肪組織—正解。","D":"肝代謝其實緩慢、非短效主因。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-65":{"quick":"ezetimibe抑制腸道NPC1L1膽固醇轉運蛋白,減少膽固醇吸收。","detail":{"background":"「『ezetimibe』」的降血脂機轉是『『抑制小腸刷狀緣的『NPC1L1(Niemann-Pick C1-Like 1)膽固醇轉運蛋白』』』,『『減少『膳食與膽汁膽固醇的吸收』』→『降低血中LDL』』(常與statin併用)。cholestyramine(膽酸結合)、gemfibrozil(fibrate,PPAR-α)、simvastatin(HMG-CoA還原酶抑制)機制不同。故抑NPC1L1者為ezetimibe。","options":{"A":"cholestyramine為膽酸結合樹脂。","B":"gemfibrozil為fibrate(活化PPAR-α)。","C":"ezetimibe抑制NPC1L1、減少膽固醇吸收—正解。","D":"simvastatin抑制HMG-CoA還原酶。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-66":{"quick":"ivabradine的機制是阻斷竇房結的funny current(If)而減慢心率。","detail":{"background":"「『ivabradine』」用於降低心率(穩定型心絞痛、心衰竭),機轉是『『選擇性阻斷『竇房結(SA node)』的『funny current(If,起搏電流)』』』,『『減慢『竇房結去極化速率→『降低心率』』』,『『『不影響』心肌收縮力、心室再極化與心內傳導』』。並非鈣通道阻斷或β阻斷。故機制為funny current(If)阻斷劑。","options":{"A":"ivabradine為funny current(If)阻斷劑—正解。","B":"非L型鈣通道阻斷。","C":"非T型鈣通道阻斷。","D":"非β阻斷劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-54":{"quick":"bromocriptine改善肢端肥大是直接抑制GH分泌,非經增加somatostatin,故C錯誤。","detail":{"background":"多巴胺受體致效劑「bromocriptine」(D2致效):①「『治『高泌乳素血症』(『抑制泌乳素分泌』)」(A正確);②「『改善『帕金森氏症』運動功能(活化紋狀體D2)」(B正確);③「『改善『肢端肥大症』是『『直接『抑制生長激素(GH)分泌』』(矛盾性,正常人促GH但肢端肥大患者反抑制),『『而『非『增加somatostatin分泌』』』」——故C錯誤;④「『抑制產後乳房腫脹與泌乳過量(抑泌乳素)』」(D正確)。故C錯誤。","options":{"A":"治高泌乳素血症(抑泌乳素),正確。","B":"用於帕金森氏症,正確。","C":"改善肢端肥大為直接抑GH、非增somatostatin—錯誤(正解)。","D":"抑制產後乳房腫脹/泌乳,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-55":{"quick":"vasopressin具抗利尿(保水)作用,「具利尿、造成水鈉流失」錯誤。","detail":{"background":"血管加壓素(vasopressin, ADH):①「『由『腦下垂體後葉』分泌,具『血管收縮(V1)』作用」(A正確);②「『胜肽、口服易被腸胃破壞(口服無效),須注射/鼻噴』」(B正確);③「『可治『垂體性(中樞性)尿崩症』(補充ADH)」(C正確);④「『其作用是『『抗利尿(antidiuretic)』——『經V2受體『增加腎集尿管『水分『再吸收』』、『保留水分(濃縮尿)』』,『『而『非『利尿、造成水鈉流失』』』」——故D錯誤。故D錯誤。","options":{"A":"由腦下垂體後葉分泌、具血管收縮作用,正確。","B":"口服易被腸胃破壞、無效,正確。","C":"可治垂體性尿崩症,正確。","D":"vasopressin為抗利尿(保水)、非利尿致水鈉流失—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-56":{"quick":"治療高血鈣最好用furosemide(loop利尿劑)合併生理食鹽水。","detail":{"background":"「『高血鈣症(hypercalcemia)』」的緊急處理是『先以『生理食鹽水『水化(擴容)』』,『再加『『環利尿劑(loop diuretic,如『furosemide』)』』』——『loop利尿劑『抑制亨利氏環的鈣再吸收→『增加『尿鈣排出』』』(注意:『thiazide『反而『減少』尿鈣『不可用』)。amiloride(保鉀)、conivaptan(V受體拮抗)非降鈣。故為furosemide。","options":{"A":"furosemide(loop)+生理食鹽水治高血鈣—正解。","B":"thiazide減少尿鈣、不可用於高血鈣。","C":"amiloride為保鉀利尿劑。","D":"conivaptan為血管加壓素受體拮抗劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-59":{"quick":"treprostinil為PGI2(前列環素)類似物,用於治療肺動脈高壓。","detail":{"background":"「『treprostinil』(與epoprostenol、iloprost、selexipag)」是『『前列環素(PGI2)類似物/受體致效劑』』:『『擴張肺動脈血管、抑制血小板與血管平滑肌增生』』,用於『『肺動脈高壓(pulmonary hypertension)』』。alprostadil(PGE1,勃起/PDA)、misoprostol(PGE1,胃/墮胎)、latanoprost(前列腺素,降眼壓)非PGI2致效劑。故治肺高壓的PGI2致效劑為treprostinil。","options":{"A":"treprostinil為PGI2類似物、治肺高壓—正解。","B":"alprostadil為PGE1。","C":"misoprostol為PGE1。","D":"latanoprost為前列腺素(降眼壓)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-66":{"quick":"clonidine長期高劑量突然停藥,會因交感反彈引發致命性高血壓。","detail":{"background":"「『clonidine』(中樞α2致效降壓藥)」:『長期高劑量使用後『若『突然停藥』,『會因『反彈性『交感神經活性『強烈增加』』』,『引發『反彈性(rebound)致命性高血壓危象』』』(故須漸減停藥)。nifedipine(CCB)、hydralazine(直接血管擴張)、captopril(ACEI)無此明顯反彈高血壓。故為clonidine。","options":{"A":"clonidine突然停藥致反彈高血壓—正解。","B":"nifedipine無此明顯反彈。","C":"hydralazine無此明顯反彈。","D":"captopril無此明顯反彈。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-54":{"quick":"thiazide抑制遠曲小管的Na⁺/Cl⁻共同轉運體而利尿。","detail":{"background":"利尿劑作用部位:①「acetazolamide(碳酸酐酶抑制)——近曲小管」;②「triamterene(保鉀)——集尿管」;③「『thiazide』——『遠曲小管(distal convoluted tubule)的『Na⁺/Cl⁻共同轉運體(NCC)』』」;④「bumetanide(loop)——亨利氏環上行支Na⁺/K⁺/2Cl⁻」。本題『抑制遠曲小管Na/Cl轉運體』者為thiazide。","options":{"A":"acetazolamide作用近曲小管(碳酸酐酶)。","B":"triamterene作用集尿管(保鉀)。","C":"thiazide抑制遠曲小管Na/Cl轉運體—正解。","D":"bumetanide作用亨利氏環(loop)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-68":{"quick":"乙醇治甲醇中毒的機制是抑制甲醇毒性代謝物的產生(競爭ADH)。","detail":{"background":"「甲醇中毒」的毒性來自『甲醇經『酒精去氫酶(ADH)』代謝成『甲醛→甲酸』(致失明、代謝性酸中毒)』。『給『乙醇(ethanol)』作為解毒劑的機制是『乙醇『與甲醇『競爭ADH(ADH對乙醇親和力高)』』』,『『抑制甲醇被代謝成『毒性代謝物』』』(讓甲醇以原型由腎/呼吸排出)。並非加速排除或代謝。故機制為抑制毒性代謝物產生。","options":{"A":"非加速甲醇從腎排除。","B":"乙醇競爭ADH、抑制甲醇毒性代謝物產生—正解。","C":"非加速甲醇代謝(反而抑制)。","D":"非加速呼吸道排除。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-74":{"quick":"mipomersen(反義寡核苷酸)抑制apoB-100之合成而降低LDL,故標的為apoB-100(選項C)。","detail":{"background":"「『mipomersen』」是『『反義寡核苷酸(antisense oligonucleotide)藥物』』,用於『同合子家族性高膽固醇血症』:『『與『apoB-100』的mRNA結合、『抑制『apoB-100』的轉譯』』,『減少含apoB-100的脂蛋白(VLDL、LDL)生成→降低血中LDL』』。PCSK9(evolocumab標的)、apoC-III、apoA-I非其標的。故抑制標的為apoB-100。","options":{"A":"PCSK9為evolocumab/alirocumab之標的。","B":"apoC-III為volanesorsen之標的。","C":"★正確(本題答案)。mipomersen抑制apoB-100 mRNA,降低LDL。","D":"apoA-I非其標的。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-75":{"quick":"ezetimibe的作用標的為腸道膽固醇轉運蛋白NPC1L1。","detail":{"background":"「『ezetimibe』」『抑制小腸吸收膽固醇』的『作用標的是『『NPC1L1(Niemann-Pick C1-Like 1)轉運蛋白』』』(腸上皮膽固醇吸收的關鍵),『減少膽固醇吸收→降低血中LDL』。HMG-CoA還原酶(statin標的)、apoB-100(mipomersen)、MTP(lomitapide)非其標的。故標的為NPC1L1。","options":{"A":"HMG-CoA還原酶為statin標的。","B":"apoB-100為mipomersen標的。","C":"ezetimibe作用標的為NPC1L1—正解。","D":"MTP為lomitapide標的。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-54":{"quick":"propranolol(β阻斷劑)最適用於治療心房心律不整並防止心肌梗塞復發與猝死。","detail":{"background":"「『propranolol』(β腎上腺素受體『阻斷劑』,第II類抗心律不整)」:①『治『心房性心律不整(減慢房室傳導、控制心室率)』』;②『『心肌梗塞後『次級預防』——『減少『再梗塞與猝死(心律不整性死亡)』』(β阻斷劑為MI後實證有益)』』。verapamil(CCB)、quinidine(Ia)、flecainide(Ic,MI後反增死亡)不如β阻斷劑的猝死預防實證。故為propranolol。","options":{"A":"verapamil為鈣通道阻斷劑。","B":"quinidine(Ia)有致心律不整風險。","C":"propranolol(β阻斷)治房性心律不整、防MI復發與猝死—正解。","D":"flecainide(Ic)在MI後反增死亡。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-61":{"quick":"酸性藥中毒給NaHCO3鹼化尿液,減少其在腎小管的再吸收(增排出)。","detail":{"background":"「酸性藥物(如水楊酸、苯巴比妥)中毒」時,給『『碳酸氫鈉(NaHCO3)『鹼化尿液』』:『酸性藥在『鹼性尿』中『更加『離子化』』,『『離子化的藥物『不易被『腎小管再吸收』』』→『『更多藥物隨尿排出(離子捕捉ion trapping)』』』,加速清除。並非加速肝代謝、非改變血中穩定度、非主要增加過濾。故主因為減少腎小管再吸收。","options":{"A":"非加速肝臟代謝。","B":"非改變血中穩定度。","C":"主要非增加過濾。","D":"鹼化尿液使酸性藥離子化、減少腎小管再吸收(增排出)—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-62":{"quick":"imipenem須併用cilastatin,以避免被腎臟dehydropeptidase水解破壞。","detail":{"background":"「『imipenem』(carbapenem類廣效抗生素)」會『被『腎近曲小管刷狀緣的『去氫胜肽酶(dehydropeptidase I)』水解失活』』,『故『須與『cilastatin(去氫胜肽酶抑制劑)』『併用』』,『『保護imipenem、提高其尿中濃度並減少腎毒性』』。minocycline、sulfamethoxazole、tobramycin無此需求。故須併cilastatin者為imipenem。","options":{"A":"imipenem須併cilastatin防腎dehydropeptidase水解—正解。","B":"minocycline無此需求。","C":"sulfamethoxazole無此需求。","D":"tobramycin(aminoglycoside)無此需求。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-47":{"quick":"缺乏運動意圖者(懵懂期)用「意識覺醒」較能促進健康行為。","detail":{"background":"依跨理論模式(改變階段)的『改變過程(processes of change)』:對『『懵懂期(無改變意圖,如本題完全沒想過運動)』』的人,『『認知/經驗層面的過程』』較有效——其中「『意識覺醒(consciousness raising,『提升對問題與益處的『覺察與資訊』』)』」最能『促使其開始考慮改變』。自我解放、反制約、刺激控制屬『較後期(行動/維持期)』的『行為過程』。故為意識覺醒。","options":{"A":"意識覺醒適用懵懂期、促進改變—正解。","B":"自我解放屬較後期過程。","C":"反制約屬行動期行為過程。","D":"刺激控制屬行動/維持期過程。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-51":{"quick":"藥物生物轉換(代謝)的最主要目的是使親脂性藥物轉為水溶性以利排出。","detail":{"background":"「藥物的『生物轉換(biotransformation, 代謝)』」的『最主要目的』是『『把『親脂性(lipophilic)』的藥物『轉變為『更『水溶性(hydrophilic)』』』』,『『以利『經腎(尿)或膽汁『排出體外』』』(Phase I官能基化 + Phase II接合反應)。並非促進過血腦屏障、非延長半衰期、非減少腎排泄(反而增加排泄)。故主要目的為使親脂藥變水溶。","options":{"A":"非促進通過血腦屏障。","B":"使親脂性藥物轉為水溶性(利排出)—正解。","C":"非延長半衰期(反而促清除)。","D":"非減少腎排泄(反而增加)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-62":{"quick":"nesiritide經活化BNP受體治療心臟衰竭。","detail":{"background":"「『nesiritide』」是『『重組『腦利鈉肽(BNP)』』』:『『活化『BNP(利鈉肽)受體』→『增加cGMP→血管擴張、利尿利鈉、降低前後負荷』』』,用於『急性失代償性心衰竭』。dobutamine(β1致效強心)、milrinone(PDE3抑制強心)、sacubitril(neprilysin抑制,減少BNP降解)機制不同(sacubitril非活化BNP受體)。故活化BNP受體者為nesiritide。","options":{"A":"dobutamine為β1致效強心劑。","B":"milrinone為PDE3抑制強心劑。","C":"nesiritide活化BNP受體、治心衰—正解。","D":"sacubitril為neprilysin抑制劑(非活化BNP受體)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-63":{"quick":"sacubitril不是經強心作用治心衰(為neprilysin抑制劑)。","detail":{"background":"治療心臟衰竭的藥中:①「digoxin(抑Na-K-ATPase,『正性肌力/強心』)」;②「dobutamine(β1致效,『強心』)」;③「milrinone(PDE3抑制,『強心+血管擴張』)」——『皆有『強心(正性肌力)』作用』。而「『sacubitril』是『『腦啡肽酶(neprilysin)抑制劑』』,『『減少利鈉肽(BNP/ANP)降解→『血管擴張、利尿』』,『『『非『經強心(正性肌力)』作用』』(與valsartan併用為ARNI)」。故不是經強心作用者為sacubitril。","options":{"A":"digoxin為強心(正性肌力)藥。","B":"dobutamine為強心(β1致效)藥。","C":"milrinone為強心(PDE3抑制)藥。","D":"sacubitril為neprilysin抑制、非經強心作用—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-64":{"quick":"molsidomine提供NO使cGMP上升(非cAMP),故C錯誤。","detail":{"background":"「『molsidomine』」(抗心絞痛血管擴張劑):①「『是『前驅藥(prodrug)』」(A正確);②「『代謝後『提供『一氧化氮(NO)』』」(B正確);③「『NO『活化『鳥苷酸環化酶』→『增加『cGMP』』(『而非『cAMP』)』→血管平滑肌鬆弛」——故C「『使『cAMP』濃度上升」錯誤;④「『用於『心絞痛』」(D正確)。故C錯誤。","options":{"A":"是前驅藥,正確。","B":"可提供NO,正確。","C":"使cGMP上升(非cAMP)—錯誤(正解)。","D":"可用於治療心絞痛,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-51":{"quick":"abacavir用藥前須檢測HLA-B*5701,以避免嚴重過敏(皮膚紅疹水疱)。","detail":{"background":"「『abacavir』(抗HIV的NRTI)」會在『帶有『HLA-B*5701』基因型』的病人引起『嚴重的『過敏反應(hypersensitivity,廣泛皮膚紅疹、水疱、發燒、多器官,可致命)』』,『故『用藥前『須先檢測HLA-B*5701』』,陽性者禁用。amoxicillin、carbamazepine(與HLA-B*1502相關SJS)、allopurinol(與HLA-B*5801相關)的相關基因不同。故須檢測HLA-B*5701者為abacavir。","options":{"A":"amoxicillin非HLA-B*5701相關。","B":"carbamazepine與HLA-B*1502相關。","C":"abacavir須檢測HLA-B*5701—正解。","D":"allopurinol與HLA-B*5801相關。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-64":{"quick":"acetazolamide(碳酸酐酶抑制劑)可用於治療青光眼,B正確。","detail":{"background":"「acetazolamide」(碳酸酐酶抑制劑利尿劑):①「『作用於『近曲小管』(抑制碳酸酐酶、減少HCO3再吸收)」(故A「遠曲小管」錯誤);②「『可『減少房水生成→『治療『青光眼』』』(及高山症、代謝性鹼中毒)」(B正確);③「『『無耳毒性』(耳毒是loop利尿劑)」(故C錯誤);④「『致『代謝性酸中毒與『低』血鉀』(非高血鉀)」(故D錯誤)。故B正確。","options":{"A":"作用於近曲小管(非遠曲)—錯誤。","B":"可用於治療青光眼—正解。","C":"無耳毒性(耳毒為loop利尿劑)—錯誤。","D":"引起低血鉀(非高血鉀)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-59":{"quick":"gemfibrozil(fibrate)活化PPAR-α,促進LPL與apoA表現,降低VLDL。","detail":{"background":"「『gemfibrozil』(『fibrate類』降血脂藥)」的機轉:『『活化『PPAR-α受體』』→『『增加『脂蛋白脂解酶(LPL)』與apoA-I表現』』、『提高脂肪酸在骨骼肌與肝臟的『氧化』』→『加速『VLDL(三酸甘油酯)清除』、『降低血中VLDL/三酸甘油酯』』。simvastatin(HMG-CoA還原酶)、colestipol(膽酸結合)、ezetimibe(NPC1L1)機制不同。故活化PPAR-α者為gemfibrozil。","options":{"A":"gemfibrozil活化PPAR-α、降VLDL—正解。","B":"simvastatin抑制HMG-CoA還原酶。","C":"colestipol為膽酸結合樹脂。","D":"ezetimibe抑制NPC1L1。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-63":{"quick":"chlorothiazide(thiazide)引起低血鉀(非高血鉀),故D錯誤。","detail":{"background":"chlorothiazide(thiazide類利尿劑):①「『抑制遠曲小管『Na⁺/Cl⁻再吸收』」(A正確);②「『『減少尿鈣』→治『原發性高鈣尿症(預防鈣結石)』」(B正確);③「『副作用含『高血糖、高尿酸、高血脂、高血鈣』與『『低血鉀、低血鈉』』」;④「『致『『低』血鉀(增加遠端鈉-鉀交換、排鉀)』』,『『而『非『高血鉀』』』」——故D「引起高血鉀」錯誤。故D錯誤。","options":{"A":"抑制鈉與氯再吸收,正確。","B":"可用於原發性高鈣尿(減尿鈣),正確。","C":"會引起高血糖,正確。","D":"thiazide引起低血鉀(非高血鉀)—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-64":{"quick":"adenosine不抑制鈉離子通道(作用於腺苷受體開鉀通道)。","detail":{"background":"抗心律不整藥:①「『amiodarone、flecainide、mexiletine』」——『皆『阻斷『鈉離子通道』』(amiodarone為多通道、flecainide為Ic、mexiletine為Ib)」;②「『adenosine』」——『作用於『腺苷A1受體』→『開啟『鉀通道、抑制鈣電流』』→『減慢『房室結傳導』』(用於陣發性室上性心搏過速),『『『不』抑制鈉離子通道』』」。故不抑制鈉通道者為adenosine。","options":{"A":"adenosine作用腺苷受體、不抑制鈉通道—正解。","B":"amiodarone阻斷鈉通道(及多通道)。","C":"flecainide(Ic)阻斷鈉通道。","D":"mexiletine(Ib)阻斷鈉通道。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-65":{"quick":"nicorandil是鉀通道開放劑與NO供體,「使鈉通道打開」錯誤。","detail":{"background":"「『nicorandil』」(抗心絞痛藥):①「『『釋放『一氧化氮(NO)』』→『擴張靜脈』」(A正確);②「『是『『ATP敏感性『鉀通道(KATP)『開放劑』』』』→『『使『鉀通道『打開』』(『而『非『鈉通道』』)』→『血管平滑肌鬆弛(動脈擴張)』』」——故B「『使『鈉通道』打開」錯誤;③「『降低細胞內鈣濃度→血管鬆弛」(C正確);④「『用於『心絞痛』」(D正確)。故B錯誤。","options":{"A":"可使NO釋放,正確。","B":"nicorandil打開鉀通道(非鈉通道)—錯誤(正解)。","C":"可降低細胞內鈣濃度,正確。","D":"可用於治療心絞痛,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-71":{"quick":"tolvaptan為選擇性V2受體拮抗劑,用於治療低血鈉症。","detail":{"background":"「『tolvaptan』」是『『選擇性『血管加壓素V2受體『拮抗劑(vaptan類)』』』:『『阻斷集尿管V2受體→『減少水分再吸收、『排出『游離水(aquaresis)』』』→『『升高血鈉』』,用於『『低血鈉症(尤SIADH、心衰/肝硬化相關)』』(口服)。selepressin/terlipressin(V受體致效升壓)、conivaptan(V1a/V2拮抗,靜脈)不同。故選擇性V2拮抗治低血鈉者為tolvaptan。","options":{"A":"selepressin為V1a致效升壓劑。","B":"terlipressin為V受體致效(治肝腎症候群/出血)。","C":"conivaptan為V1a/V2拮抗(靜脈)。","D":"tolvaptan為選擇性V2拮抗、治低血鈉—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-58":{"quick":"niacin的機制非活化PPAR-α(fibrate才是),故D錯誤。","detail":{"background":"降血脂藥機制:①「atorvastatin——抑制『HMG-CoA還原酶』」(A正確);②「fenofibrate——『活化PPAR-α、增加LPL活性』」(B正確);③「colestipol——『膽酸結合樹脂,減少膽酸(膽固醇)再吸收』」(C正確);④「『niacin(菸鹼酸)——『抑制脂肪組織脂解、減少肝臟VLDL合成、升高HDL』,『『機制『非『活化PPAR-α』』(那是『fibrate』)』」——故D「niacin活化PPAR-α」錯誤。故D錯誤。","options":{"A":"atorvastatin抑制HMG-CoA還原酶,正確。","B":"fenofibrate增加LPL活性,正確。","C":"colestipol減少膽酸再吸收,正確。","D":"niacin非活化PPAR-α(該為fibrate)—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-60":{"quick":"原發性高醛固酮症術前可用spironolactone(醛固酮拮抗劑)改善高血壓與低血鉀。","detail":{"background":"「『原發性高醛固酮症(primary aldosteronism,如腎上腺腺瘤)』」造成『『高血壓與『低血鉀(醛固酮促排鉀)』』』。『手術前可用『『醛固酮受體拮抗劑(『spironolactone』或eplerenone)』』』,『『阻斷醛固酮→『改善高血壓並『矯正低血鉀(保鉀)』』』。故術前改善症狀者為spironolactone(醛固酮拮抗劑)。","options":{"A":"(非醛固酮拮抗的選項)。","B":"spironolactone(醛固酮拮抗)改善原發性高醛固酮的高血壓與低血鉀—正解。","C":"(非醛固酮拮抗的選項)。","D":"(非醛固酮拮抗的選項)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-62":{"quick":"lidocaine(Ib類鈉通道阻斷)不具抑制交感神經作用。","detail":{"background":"抗心律不整藥中具『抑制交感神經(β阻斷)』作用者:①「『esmolol、sotalol』」——『含『β阻斷』作用(esmolol為II類β阻斷;sotalol兼β阻斷與III類)」;②「『amiodarone』——『多通道阻斷『含『弱β/α阻斷(抗交感)』』」。而「『lidocaine』是『『Ib類『鈉離子通道阻斷劑』』,『『『不』具『抑制交感神經』』的作用』」。故不具抗交感者為lidocaine。","options":{"A":"amiodarone具弱β/α阻斷(抗交感)。","B":"esmolol為β阻斷(抗交感)。","C":"lidocaine(Ib)不抑制交感神經—正解。","D":"sotalol兼β阻斷(抗交感)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-64":{"quick":"慢性心衰竭(無水腫/嚴重腎衰)用ACE抑制劑能有效減緩心室擴大(重塑)。","detail":{"background":"慢性心臟衰竭的『改善『心室重塑(remodeling)/減緩心室擴大(ventricular dilation)』與『改善預後』』的『實證基石』是『『血管收縮素轉化酶抑制劑(ACE inhibitors)』(及ARB、β阻斷、醛固酮拮抗、ARNI)』。natriuretic peptide(對症)、calcium channel blockers(對收縮性心衰無益甚至有害)、digitalis(對症緩解、不改善存活/重塑)非減緩心室擴大的首選。故為ACE抑制劑。","options":{"A":"ACE抑制劑減緩心室擴大(重塑)、改善預後—正解。","B":"利鈉肽為對症(急性)用藥。","C":"鈣通道阻斷劑對收縮性心衰無益。","D":"digitalis對症緩解、不改善重塑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-57":{"quick":"misoprostol是PGE1類似物(非PGF2α),故B錯誤。","detail":{"background":"刺激子宮收縮(oxytocic)的前列腺素:①「『PGE2與PGF2α皆具『強效子宮收縮』作用」(A正確);②「『dinoprostone是『PGE2』類似物」(C正確);③「『carboprost是『PGF2α』類似物(產後出血)」(D正確);④「『misoprostol是『『PGE1』類似物』』,『『而『非『PGF2α』』』」——故B「misoprostol具類似PGF2α之作用」錯誤。故B錯誤。","options":{"A":"PGE2與PGF2α具強效子宮收縮,正確。","B":"misoprostol為PGE1類似物(非PGF2α)—錯誤(正解)。","C":"dinoprostone為PGE2類似物,正確。","D":"carboprost為PGF2α類似物,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-58":{"quick":"simvastatin的機制是抑制HMG-CoA還原酶。","detail":{"background":"「『simvastatin』(statin類)」的主要機制是『『抑制『HMG-CoA還原酶(膽固醇合成的限速酶)』』』:『減少肝臟膽固醇合成→『上調LDL受體→『清除血中LDL』』,『並具『抗發炎、穩定斑塊(pleiotropic)』作用』。並非活化PPAR-α(fibrate)、非抑NPC1L1(ezetimibe)、非結合膽酸(樹脂)。故機制為抑制HMG-CoA還原酶。","options":{"A":"活化PPAR-α為fibrate機制。","B":"simvastatin抑制HMG-CoA還原酶—正解。","C":"抑NPC1L1為ezetimibe機制。","D":"與膽酸結合為樹脂機制。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-61":{"quick":"aminoglutethimide抑制膽固醇轉換成孕烯醇酮(側鏈裂解酶),阻斷皮質醇合成。","detail":{"background":"腎上腺皮質類固醇合成抑制劑:「『aminoglutethimide』」『抑制『膽固醇側鏈裂解酶(P450scc)』』,『『阻斷『膽固醇『轉換成『孕烯醇酮(pregnenolone)』』』』(類固醇合成的第一步),『減少皮質醇與醛固酮等的生合成』(用於庫欣症)。metyrapone(抑11β-羥化酶)、mifepristone(拮抗糖皮質激素受體)、trilostane(抑3β-HSD)作用步驟不同。故抑膽固醇→孕烯醇酮者為aminoglutethimide。","options":{"A":"aminoglutethimide抑制膽固醇→孕烯醇酮(側鏈裂解酶)—正解。","B":"metyrapone抑制11β-羥化酶。","C":"mifepristone拮抗糖皮質激素受體。","D":"trilostane抑制3β-HSD。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-63":{"quick":"diazoxide活化ATP敏感鉀通道擴張動脈,但會抑制胰島素釋放(致高血糖)。","detail":{"background":"「『diazoxide』」是『『ATP敏感性『鉀通道(KATP)『活化(開放)劑』』』:①『在『血管平滑肌』開啟KATP→『動脈血管擴張、降血壓』(用於高血壓急症)』;②『在『胰島β細胞』開啟KATP→『『抑制胰島素釋放』→『升高血糖』』(故亦用於『高胰島素性低血糖』)。fenoldopam(D1致效)、captopril(ACEI)、minoxidil(亦KATP開放但不抑胰島素)不符。故為diazoxide。","options":{"A":"fenoldopam為D1致效降壓劑。","B":"captopril為ACE抑制劑。","C":"diazoxide活化KATP擴張動脈、抑制胰島素釋放—正解。","D":"minoxidil亦開KATP但不抑胰島素分泌。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-64":{"quick":"sacubitril是neprilysin抑制劑(非活化BNP受體),故A錯誤。","detail":{"background":"「『sacubitril』」(與valsartan組成ARNI):①『機轉是『『腦啡肽酶(neprilysin)『抑制劑』』』,『『『減少『利鈉肽(BNP/ANP)的『降解』』』(『使利鈉肽濃度升高』),『『而『非『活化BNP受體』』』」——故A錯誤;②「『與valsartan(ARB)『合併使用』(ARNI)」(B正確);③「『可『引起血管擴張』」(C正確);④「『用於『慢性心臟衰竭』(改善預後)」(D正確)。故A錯誤。","options":{"A":"sacubitril為neprilysin抑制劑、非活化BNP受體—錯誤(正解)。","B":"可與valsartan合併使用,正確。","C":"可引起血管擴張,正確。","D":"用於治療慢性心衰竭,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-70":{"quick":"alprostadil(PGE1)最適合用於治療男性勃起障礙。","detail":{"background":"「『alprostadil』(『前列腺素E1, PGE1』)」可『『擴張陰莖海綿體血管、增加血流』』,『用於『男性『勃起障礙(erectile dysfunction)』』』(海綿體注射或尿道塞劑;另PGE1亦用於維持新生兒PDA開放)。epoprostenol、treprostinil(前列環素,治肺高壓)、misoprostol(PGE1但用於胃/墮胎)非勃起障礙用藥。故治勃起障礙者為alprostadil。","options":{"A":"epoprostenol為前列環素(治肺高壓)。","B":"treprostinil為前列環素(治肺高壓)。","C":"misoprostol為PGE1(治胃潰瘍/墮胎)。","D":"alprostadil(PGE1)治勃起障礙—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-75":{"quick":"digoxin過量採用血液透析解毒效果最差(分布體積大、組織結合)。","detail":{"background":"血液透析能有效移除的藥物須『分子小、水溶、『分布體積小』、蛋白結合低』。①「lithium、theophylline、carbamazepine(『分布體積較小』)」——『透析『可有效移除』」;②「『digoxin』」——『『分布體積極大(大量結合於『組織(心肌等)』)、血中濃度低』』,『『『血液透析『移除效果『最差』』』(中毒應用『digoxin抗體片段(Digibind)』解毒)』。故透析解毒效果最差者為digoxin。","options":{"A":"digoxin分布體積大、透析效果最差—正解。","B":"lithium可有效透析移除。","C":"theophylline可透析移除。","D":"carbamazepine可透析移除。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-62":{"quick":"aliskiren經抑制腎素(renin)的作用治療高血壓。","detail":{"background":"「『aliskiren』」是『『直接『腎素(renin)『抑制劑』』』:『『抑制腎素→『減少血管收縮素原轉成血管收縮素I→降低整個RAAS活性』』』,用於『高血壓』。captopril(ACE抑制)、eplerenone(醛固酮拮抗)、losartan(ARB,AT1受體拮抗)作用於RAAS的不同位點(非腎素)。故抑制腎素者為aliskiren。","options":{"A":"aliskiren直接抑制腎素—正解。","B":"captopril抑制ACE。","C":"eplerenone拮抗醛固酮受體。","D":"losartan拮抗AT1受體(ARB)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-63":{"quick":"amiodarone會抑制T4轉變成T3(含碘、影響甲狀腺功能)。","detail":{"background":"「『amiodarone』(III類抗心律不整藥)」『分子含『碘』』,會影響甲狀腺:①『『抑制『周邊『T4→T3』的脫碘轉換』』(使T4略升、T3略降);②可致『甲狀腺『機能亢進或低下』(amiodarone-induced thyroid dysfunction)』。adenosine、lidocaine、dronedarone(amiodarone類似物但『不含碘』,較少甲狀腺影響)無此作用。故抑制T4→T3者為amiodarone。","options":{"A":"adenosine無此作用。","B":"amiodarone抑制T4轉T3(含碘)—正解。","C":"lidocaine無此作用。","D":"dronedarone不含碘、較少甲狀腺影響。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-64":{"quick":"tolvaptan為口服型血管加壓素(ADH)V2受體拮抗利尿劑。","detail":{"background":"「『tolvaptan』」是『『『口服』型『血管加壓素(ADH)『V2受體『拮抗劑(vaptan)』』』』:『阻斷集尿管V2受體→『排出游離水、升高血鈉』』,用於『低血鈉症、SIADH、多囊腎』。conivaptan(『靜脈』V1a/V2拮抗)、metolazone(thiazide樣)、triamterene(保鉀)非口服V2拮抗。故口服ADH(V2)拮抗劑為tolvaptan。","options":{"A":"conivaptan為靜脈型(V1a/V2)拮抗。","B":"metolazone為thiazide樣利尿劑。","C":"triamterene為保鉀利尿劑。","D":"tolvaptan為口服V2受體拮抗利尿劑—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-55":{"quick":"terbinafine抑制黴菌的squalene epoxidase,使squalene堆積而殺菌。","detail":{"background":"抗黴菌藥「『terbinafine』」的機轉是『『抑制黴菌的『角鯊烯環氧化酶(squalene epoxidase)』』』:『『阻斷『角鯊烯(squalene)→ergosterol』的合成』,『『使『角鯊烯『堆積(對黴菌有毒)』』、且ergosterol缺乏』→『殺黴菌』』,用於『皮癬菌(尤指甲癬)』。griseofulvin(干擾微管)、nystatin(結合ergosterol)、voriconazole(azole,抑CYP450)機制不同。故抑squalene epoxidase者為terbinafine。","options":{"A":"griseofulvin干擾微管。","B":"nystatin結合ergosterol形成孔洞。","C":"terbinafine抑制squalene epoxidase—正解。","D":"voriconazole(azole)抑制黴菌CYP450。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-58":{"quick":"lomitapide抑制MTP,阻斷肝臟生成與釋放VLDL。","detail":{"background":"「『lomitapide』」的降血脂機轉是『『抑制『微粒體三酸甘油酯轉運蛋白(microsomal triglyceride transfer protein, MTP)』』』:『MTP是『肝臟組裝『含apoB的VLDL』』所需,『抑制MTP→『阻斷肝臟『生成與釋放VLDL』→降低LDL』』(用於同合子家族性高膽固醇血症)。cholestyramine(膽酸結合)、fenofibrate(PPAR-α)、mipomersen(抑apoB-100 mRNA)機制不同。故抑MTP者為lomitapide。","options":{"A":"lomitapide抑制MTP、阻斷VLDL生成—正解。","B":"cholestyramine為膽酸結合樹脂。","C":"fenofibrate活化PPAR-α。","D":"mipomersen抑制apoB-100 mRNA。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-60":{"quick":"eplerenone為醛固酮拮抗劑,用於高血壓與心肌梗塞後心衰竭。","detail":{"background":"「『eplerenone』(與spironolactone)」是『『『醛固酮(礦物皮質固醇)受體『拮抗劑(保鉀利尿劑)』』』:『阻斷醛固酮→保鉀利尿、降血壓』,『用於『高血壓』與『『心肌梗塞後『心衰竭』』(實證改善預後)』(eplerenone選擇性高、較少男性女乳症)。etoposide(抗癌)、mestranol(雌激素)、oxandrolone(雄激素)非醛固酮拮抗劑。故為eplerenone。","options":{"A":"eplerenone為醛固酮拮抗劑、治高血壓與MI後心衰—正解。","B":"etoposide為抗癌藥。","C":"mestranol為合成雌激素。","D":"oxandrolone為合成雄激素。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-62":{"quick":"amiloride(保鉀利尿劑)高血鉀病患不宜使用。","detail":{"background":"「『amiloride』(與triamterene、spironolactone)」是『『保鉀利尿劑』』:『『減少集尿管排鉀→『易致『高血鉀』』』,『故『『高血鉀』病患『不宜使用(會加重)』』。metolazone(thiazide樣)、indapamide(thiazide樣)、bumetanide(loop)反而『排鉀(致低血鉀)』,高血鉀可用。故高血鉀不宜者為amiloride。","options":{"A":"amiloride(保鉀)致高血鉀、高血鉀病患不宜—正解。","B":"metolazone排鉀(可用)。","C":"indapamide排鉀(可用)。","D":"bumetanide(loop)排鉀(可用)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-63":{"quick":"milrinone為第3型磷酸二酯酶(PDE3)抑制劑,可用於治療心衰竭。","detail":{"background":"「『milrinone』」是『『第3型磷酸二酯酶(phosphodiesterase type 3, PDE3)『抑制劑』』』:『『抑制PDE3→『增加心肌與血管平滑肌的『cAMP』』』→『『正性肌力(強心)+血管擴張(inodilator)』』,『用於『急性失代償性心衰竭』(短期)』。empagliflozin(SGLT2)、tadalafil(PDE5)、riociguat(可溶性鳥苷酸環化酶刺激)機制不同。故PDE3抑制劑為milrinone。","options":{"A":"empagliflozin為SGLT2抑制劑。","B":"tadalafil為PDE5抑制劑。","C":"riociguat為sGC刺激劑(治肺高壓)。","D":"milrinone為PDE3抑制劑、治心衰—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-67":{"quick":"氣喘用theophylline最需監測血中濃度(治療範圍窄)。","detail":{"background":"治療氣喘的藥中,「『theophylline(茶鹼)』」『治療範圍『窄(治療濃度與中毒濃度接近)』』,『『最需『監測血中濃度』』』——『過量會產生『噁心、嘔吐、心律不整、癲癇』』(尤其與抑制其代謝的藥併用時)。ipratropium、corticosteroid、albuterol不需常規血中濃度監測。故最需監測者為theophylline。","options":{"A":"ipratropium不需監測血中濃度。","B":"吸入類固醇不需監測血中濃度。","C":"theophylline治療範圍窄、最需監測血中濃度—正解。","D":"albuterol不需監測血中濃度。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-62":{"quick":"sacubitril(neprilysin抑制劑)適合與valsartan併用治心衰,「不適合併用」錯誤。","detail":{"background":"neprilysin抑制劑(sacubitril):①「『減少『利鈉肽(BNP)』的『降解』(升高利鈉肽)」(A正確);②「『使血管擴張』」(B正確);③「『減少交感神經活性、利尿利鈉』」(C正確);④「『『臨床上『與『valsartan(ARB)『併用(組成ARNI:sacubitril/valsartan)』』』『治療慢性心衰竭(改善預後)』』」——故D「『『不』適合與valsartan併用』」錯誤。(註:不可與ACE抑制劑併用,因增血管水腫風險。)故D錯誤。","options":{"A":"減少BNP降解,正確。","B":"可使血管擴張,正確。","C":"減少交感神經活性,正確。","D":"sacubitril適合與valsartan併用(ARNI)、非不適合—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-63":{"quick":"nitroprusside不易產生耐藥性,「長時間使用易產生耐藥性」錯誤。","detail":{"background":"硝酸鹽類(nitrates):①「『青光眼/顱內壓高時不宜用nitrates(致血管擴張可能升高眼/顱內壓)』」(A大致正確);②「『長效nitroglycerin須『每日有『空檔(無藥期≥8-12小時)』』以『預防『耐藥性(tolerance)』』」(B正確);③「『『nitroprusside『不易產生耐藥性』』(其問題是『『氰化物/硫氰酸鹽『蓄積中毒』』)』」——故C「『長時間用nitroprusside『易產生耐藥性』」錯誤;④「『炸藥廠工人的『週一病(Monday disease)』消失,是因其『對nitrates產生『耐藥性』』(假日無暴露則耐藥消退、週一又發作)」(D大致正確)。故C錯誤。","options":{"A":"青光眼/顱內壓高時不宜用nitrates(大致正確)。","B":"長效nitroglycerin須留空檔防耐藥性,正確。","C":"nitroprusside不易產生耐藥性(問題為氰化物蓄積)—錯誤(正解)。","D":"工人週一病與對nitrates耐藥有關,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-64":{"quick":"fenoldopam作用於多巴胺D1受體、舒張周邊血管,靜脈用於嚴重高血壓。","detail":{"background":"「『fenoldopam』」是『『選擇性『多巴胺D1受體『致效劑』』』:『活化D1受體→『『周邊(尤腎、內臟)血管平滑肌『舒張』』→『降血壓並增加腎血流』』,『『靜脈注射用於『嚴重(高血壓急症)』』』。candesartan(ARB)、clonidine(α2致效)、minoxidil(KATP開放,口服)非D1致效。故作用D1治嚴重高血壓者為fenoldopam。","options":{"A":"candesartan為ARB。","B":"fenoldopam作用D1、靜脈治嚴重高血壓—正解。","C":"clonidine為α2致效劑。","D":"minoxidil為口服KATP開放血管擴張劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-54":{"quick":"terbinafine抑制squalene epoxidase,主要用於治療指甲癬(甲癬)。","detail":{"background":"「『terbinafine』」是『『角鯊烯環氧化酶(squalene epoxidase)『抑制劑』』』,『阻斷ergosterol合成、使squalene堆積殺黴菌』;『『口服『主要用於『皮癬菌(dermatophyte)感染,尤『指甲癬(onychomycosis,甲癬)』』』(療程數月)。nystatin(結合ergosterol)、voriconazole/itraconazole(azole,抑CYP450)機制不同。故抑squalene epoxidase治甲癬者為terbinafine。","options":{"A":"nystatin結合ergosterol(局部用)。","B":"terbinafine抑squalene epoxidase、治甲癬—正解。","C":"voriconazole為azole(抑CYP450)。","D":"itraconazole為azole(抑CYP450)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman
