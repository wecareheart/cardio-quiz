am_code":"115020","src":"民國115年","topic":"D9自泌素發炎呼吸與腸胃藥物","stem":"病人使用clonidine 時,最不容易出現下列何種效果?","options":{"A":"血壓降低","B":"口乾舌燥","C":"嚴重腹瀉","D":"更年期熱潮紅(menopausal hot flushes)減輕"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_115020-67","q_num":67,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"D9自泌素發炎呼吸與腸胃藥物","stem":"下列呼吸道治療藥物中,何者亦可治療慢性復發蕁麻疹(chronic recurrent urticaria)及花生過敏?","options":{"A":"albuterol","B":"dupilumab","C":"roflumilast","D":"omalizumab"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_115020-69","q_num":69,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"D9自泌素發炎呼吸與腸胃藥物","stem":"下列何者為PGE1衍生物,可用來治療便秘型腸躁症(irritable bowel syndrome with constipation)?","options":{"A":"linaclotide","B":"prucalopride","C":"lubiprostone","D":"bimatoprost"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""}],E={"med2_106100-61":{"quick":"同一受體的藥物會因受體在不同組織的分布而產生不同療效與毒性。","detail":{"background":"藥效學基本概念:①「『效價(potency)』與『效能(efficacy)』『獨立』」——『potency(達到效果所需劑量,劑量越小potency越大);efficacy(可達到的最大效果)』,『efficacy大者potency不一定大』(故A錯誤);②「『10mg藥A與100mg藥B作用相同→藥A『potency較大(劑量小)』』,『而非治療指數(TI=LD50/ED50)較大』」(故B錯誤);③「『同一受體的藥物,因『受體在不同『組織』的分布密度/偶聯不同』,可產生『不同的療效與毒性(選擇性)』』」(C正確);④「『備用受體(spare receptor)』使部分受體被佔據即達最大反應,『非毒性主因』」(故D錯誤)。故C正確。","options":{"A":"efficacy大者potency不一定大(兩者獨立)—錯誤。","B":"藥A劑量小→potency較大、非治療指數—錯誤。","C":"受體組織分布不同→不同療效與毒性—正解。","D":"備用受體非毒性主因—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-62":{"quick":"benzathine penicillin為長效肌注劑型,半衰期長(可達數天至數週)。","detail":{"background":"Penicillin類藥動學:①「『benzathine penicillin』為『肌肉注射『緩釋(depot)』』劑型,『半衰期長(緩慢釋放,作用可持續數天至數週,用於梅毒、預防風濕熱)』」(C正確);②「『ticarcillin『不耐胃酸』,『須『注射』給藥(不能口服)』」(故A錯誤);③「『probenecid『抑制penicillin的腎小管『分泌(secretion)』』(非過濾)』,延長其作用」(故B「抑制過濾」錯誤);④「amoxicillin口服吸收『佳、『不易受食物干擾』』」(故D錯誤)。故C正確。","options":{"A":"ticarcillin不耐酸、須注射(不可口服)—錯誤。","B":"probenecid抑制腎小管分泌、非過濾—錯誤。","C":"benzathine penicillin半衰期長(緩釋肌注)—正解。","D":"amoxicillin口服吸收不易受食物干擾—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-57":{"quick":"procainamide的主要臨床副作用為藥物誘發性紅斑性狼瘡。","detail":{"background":"「藥物誘發性紅斑性狼瘡(drug-induced lupus)」最典型的藥物為「『procainamide(普魯卡因醯胺,Ia類抗心律不整藥)』、『hydralazine』、isoniazid」等——長期使用可出現抗組蛋白抗體陽性、關節痛、漿膜炎等狼瘡樣症狀(停藥多可恢復)。sotalol(III/β)、disopyramide(Ia,抗膽鹼)、amiodarone(III,肺/甲狀腺毒)的主要副作用不同。故為procainamide。","options":{"A":"sotalol主要副作用為QT延長/心搏過緩。","B":"disopyramide主要為抗膽鹼副作用。","C":"amiodarone主要為肺纖維化/甲狀腺/角膜沉積。","D":"procainamide致藥物性紅斑性狼瘡—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-50":{"quick":"臨床試驗受試者1000~3000名屬第三期(phase 3)。","detail":{"background":"新藥臨床試驗分期:①「『第一期(phase 1)』」——少數(20-100名)『健康志願者』,測『安全性、藥動學、最大耐受劑量』;②「『第二期(phase 2)』」——數百名『病人』,測『療效與治療『劑量範圍』』;③「『第三期(phase 3)』」——『大量(『1000-3000名』)病人』、『多中心隨機對照,確認療效與安全(常與標準療法比較),作為上市依據』;④「第四期(phase 4)」——『上市後』監測。本題1000-3000名屬第三期。","options":{"A":"第四期為上市後監測。","B":"1000-3000名為第三期—正解。","C":"第二期為數百名病人測療效/劑量。","D":"第一期為少數健康志願者。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-58":{"quick":"部分致效劑(partial agonist)對受體的內在效能(intrinsic efficacy)小於完全致效劑。","detail":{"background":"部分致效劑(partial agonist):①「對受體的『內在效能(intrinsic efficacy / activity)『小於』完全致效劑(full agonist)』」——即使佔滿所有受體,『最大反應仍低於full agonist』(B正確);②「『binding affinity(親和力)『不一定』小於full agonist』」(故A錯誤);③「與full agonist『併用』時,因『競爭同一受體』,『partial agonist會『降低』full agonist的效果(扮演部分拮抗)』,『非相加』」(故C錯誤);④partial agonist本身佔據受體,可作為拮抗劑。故B正確。","options":{"A":"親和力不一定小於full agonist—錯誤。","B":"內在效能小於full agonist—正解。","C":"與full agonist併用會競爭、降效非相加—錯誤。","D":"partial agonist本身可作部分拮抗。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-70":{"quick":"「D-dimethylcysteine」不是無機汞中毒的解毒劑(其餘三者為金屬螯合劑)。","detail":{"background":"無機汞鹽急性中毒的解毒以「『金屬螯合劑(chelator)』」治療:「『dimercaprol(BAL)』、『succimer(DMSA)』、『unithiol(DMPS)』」皆可螯合汞而促排出。「『D-dimethylcysteine』」並非標準的汞中毒解毒劑(penicillamine雖為dimethylcysteine衍生物,但此選項命名非汞中毒首選螯合劑),故為錯誤者。故不用於汞中毒者為D。","options":{"A":"unithiol為汞中毒螯合劑。","B":"dimercaprol(BAL)為汞/砷中毒螯合劑。","C":"succimer(DMSA)為汞/鉛中毒螯合劑。","D":"D-dimethylcysteine非標準汞中毒解毒劑—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-60":{"quick":"isoproterenol作用β受體增加cAMP,不增加cGMP;其餘三者增加cGMP。","detail":{"background":"cyclic GMP(cGMP)上升的藥物:①「『硝普鈉(sodium nitroprusside)』、『硝酸鹽』」——釋放NO→活化『鳥苷酸環化酶(guanylyl cyclase)→cGMP↑』致血管擴張;②「『心房利鈉肽(ANP)』」——活化『顆粒型鳥苷酸環化酶→cGMP↑』;③「『sildenafil』」——抑制『PDE5』使cGMP分解減少→cGMP↑。而「『isoproterenol』」是『β腎上腺素受體致效劑→『增加cAMP』(非cGMP)』。故不增加cGMP者為isoproterenol。","options":{"A":"isoproterenol增加cAMP、非cGMP—正解。","B":"硝普鈉經NO增加cGMP。","C":"sildenafil抑PDE5增加cGMP。","D":"ANP增加cGMP。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-51":{"quick":"非競爭性拮抗劑無法被增高的致效劑濃度逆轉其效能。","detail":{"background":"拮抗類型:①「『競爭性拮抗劑(competitive antagonist)』」——與agonist競爭『同一結合位』,『可被『增高agonist濃度『克服(逆轉)』』(使劑量反應曲線右移、最大效果不變)』;②「『非競爭性拮抗劑(noncompetitive antagonist)』」——『不可逆結合或結合別構位,『無法被增高的agonist濃度逆轉』(最大效果『下降』)』(B正確);③inverse agonist(反向致效)、partial agonist作用機制不同。故無法被增高agonist逆轉者為非競爭性拮抗劑。","options":{"A":"競爭性拮抗可被增高agonist克服。","B":"非競爭性拮抗無法被增高agonist逆轉—正解。","C":"反向致效劑機制不同。","D":"部分致效劑本身有內在活性。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-59":{"quick":"somatotropin(生長激素)作用於JAK-STAT受體,非G蛋白偶聯受體(GPCR)。","detail":{"background":"G蛋白偶聯受體(GPCR)的藥物:①「『bromocriptine』(多巴胺D2受體,GPCR)」;②「『desmopressin』(血管加壓素V2受體,GPCR)」;③「『leuprolide』(GnRH受體,GPCR)」。而「『somatotropin(生長激素GH)』」作用於『『生長激素受體』——屬『細胞激素受體家族,經『JAK2-STAT』訊息』(非GPCR)』。故不作用於GPCR者為somatotropin。","options":{"A":"somatotropin作用JAK-STAT受體、非GPCR—正解。","B":"bromocriptine作用D2(GPCR)。","C":"desmopressin作用V2(GPCR)。","D":"leuprolide作用GnRH受體(GPCR)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-51":{"quick":"靜脈注射的生體可用率最高(100%)。","detail":{"background":"「生體可用率(bioavailability, F)」指藥物進入『全身循環』的比例:①「『靜脈注射(IV)』」——藥物『直接進入血流』,『F=100%(最高)』,作為基準;②口服(oral)受『吸收不全與『肝臟首渡效應(first-pass)』』影響,F通常較低;③直腸給藥部分避開首渡(F中等);④吸入F視藥物而定。故F最高者為靜脈注射。","options":{"A":"口服受吸收與首渡影響、F較低。","B":"直腸給藥F中等。","C":"吸入給藥F視藥物而定。","D":"靜脈注射F=100%最高—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-51":{"quick":"二期試驗評估療效與劑量、常需與對照比較,「不需與現行藥比較」錯誤。","detail":{"background":"新藥臨床試驗:①「『一期』一般『不納入病人(用健康志願者)』,測『最大耐受安全劑量與藥動學』」(A正確);②「『二期』納入『病人』,評估『療效與劑量範圍』,『且常須設『對照組(安慰劑或現有有效藥)』以證實療效』」——故B「『不需與現行有效藥比較』」錯誤;③「三期納入大量病人,常採『確定的單一(治療)劑量』、與標準療法對照」(C大致正確);④「四期在『上市後』進行」(D正確)。故B錯誤。","options":{"A":"一期用健康志願者測最大耐受劑量,正確。","B":"二期評療效與劑量、常需對照比較、非不需—錯誤(正解)。","C":"三期納入較多病人、採確定劑量,正確。","D":"四期在上市後進行,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-75":{"quick":"fomepizole抑制alcohol dehydrogenase,用於甲醇/乙二醇中毒。","detail":{"background":"「『fomepizole』」是『『酒精去氫酶(alcohol dehydrogenase, ADH)抑制劑』』:甲醇、乙二醇本身毒性低,但經ADH代謝成『毒性代謝物(甲醛/甲酸→失明、酸中毒;草酸→腎衰)』;fomepizole(或乙醇競爭)『抑制ADH』可『阻止毒性代謝物生成』,為甲醇/乙二醇中毒的解毒劑。flumazenil(BZD拮抗)、pralidoxime(有機磷)、physostigmine(膽鹼酯酶抑制)用途不同。故為fomepizole。","options":{"A":"flumazenil拮抗苯二氮平。","B":"fomepizole抑制ADH治甲醇中毒—正解。","C":"pralidoxime用於有機磷中毒。","D":"physostigmine為膽鹼酯酶抑制劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-51":{"quick":"化學拮抗(chemical antagonism)不需與受體結合即可產生。","detail":{"background":"拮抗作用分類:①「競爭性拮抗(competitive)、別構拮抗(allosteric)」——『須與『受體』結合』;②「『化學拮抗(chemical antagonism)』」——『拮抗劑『直接與『致效劑(藥物)』『化學結合/中和』』,『不需與『受體』結合』』(如『protamine中和heparin、螯合劑結合金屬、抗體中和毒素』);③「生理性拮抗(physiologic)」——兩藥作用於『不同受體』產生相反生理效應。故『完全不需與受體結合』者為化學拮抗。","options":{"A":"競爭性拮抗須與受體結合。","B":"別構拮抗須結合受體別構位。","C":"化學拮抗直接中和藥物、不需與受體結合—正解。","D":"生理性拮抗作用於不同受體。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-66":{"quick":"pseudoephedrine為擬交感升壓藥,與血壓下降關聯最低。","detail":{"background":"本題病人疑為『藥物引起的暫時性(姿勢性)低血壓』。①「『tamsulosin』(『α1受體阻斷劑』,治攝護腺肥大)→『血管擴張、姿勢性低血壓』」;②「『verapamil』(鈣離子阻斷劑)→『血管擴張、降血壓』」;③「『carvedilol』(α+β阻斷劑)→『降血壓』」;④「『pseudoephedrine』是『擬交感神經(α致效)『升壓』藥(鼻充血劑)』,『會『升高』血壓(不致低血壓)』」。故與血壓下降關聯『最低』者為pseudoephedrine。","options":{"A":"tamsulosin(α1阻斷)致姿勢性低血壓。","B":"verapamil(CCB)降血壓。","C":"carvedilol(αβ阻斷)降血壓。","D":"pseudoephedrine為升壓藥、與血壓下降關聯最低—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-51":{"quick":"第二期(phase 2)主要確定藥物的治療效能與治療劑量範圍。","detail":{"background":"臨床試驗各期目的:①「一期」——『安全性、最大耐受劑量、藥動學(健康志願者)』;②「『二期(phase 2)』」——『初步評估『治療『效能(efficacy)』』,並『確定『治療『劑量範圍(dose-ranging)』』(病人)』』;③「三期」——『大規模確認療效與安全(常與標準療法比較)』;④「四期」——上市後監測。本題『確定療效與劑量範圍』為第二期。","options":{"A":"一期測安全性與最大耐受劑量。","B":"二期確定療效與治療劑量範圍—正解。","C":"三期大規模確認療效與安全。","D":"四期為上市後監測。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-51":{"quick":"水解(hydrolysis)屬phase I反應,不是phase II反應。","detail":{"background":"肝臟藥物代謝分兩相:①「『Phase I』」——『氧化(oxidation,CYP450)、『還原』、『水解(hydrolysis)』』,使藥物『官能基化(增加極性)』;②「『Phase II』」——『接合(conjugation)反應:『葡萄糖醛酸接合(glucuronidation)、『硫酸接合(sulfation)』、『乙醯化(acetylation)』、『甘胺酸接合(glycine conjugation)』、甲基化、麩胱甘肽接合』,使藥物『更水溶、易排出』。本題『水解(hydrolysis)屬Phase I』(非Phase II)。故為hydrolysis。","options":{"A":"乙醯化(acetylation)屬Phase II。","B":"甘胺酸接合屬Phase II。","C":"硫酸接合(sulfation)屬Phase II。","D":"水解(hydrolysis)屬Phase I、非Phase II—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-51":{"quick":"本題公告「一律給分」;考acyclovir的活化機轉與用途。","detail":{"background":"抗病毒藥acyclovir:為『鳥嘌呤核苷(guanosine)類似物』,須先由『病毒的『胸苷激酶(thymidine kinase, TK)』『磷酸化第一個磷酸根』』,再由宿主酶磷酸化為三磷酸活性型,『選擇性抑制病毒DNA聚合酶』,故『主要對被『疱疹病毒(HSV/VZV)』感染的細胞具選擇性』(對HIV無效)。本題各選項敘述經評定後「一律給分(送分)」。","options":{"A":"acyclovir為鳥嘌呤核苷類似物(非adenosine)。","B":"須被病毒胸苷激酶磷酸化活化(本題送分)。","C":"對感染細胞具選擇性(本題送分)。","D":"用於疱疹病毒、非HIV(本題送分)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-63":{"quick":"rifampin脂溶性最大、易通過血腦屏障,可治腦膜炎。","detail":{"background":"抗生素通過『血腦屏障(BBB)』的能力與『脂溶性』相關:「『rifampin』」脂溶性高、『易通過BBB進入中樞神經』(用於腦膜炎接觸者預防、結核性腦膜炎)。cefazolin(第一代頭孢,過BBB差)、erythromycin(過BBB差)、gentamicin(極性高、幾乎不過BBB)脂溶性低。故脂溶性最大、最易過BBB者為rifampin。","options":{"A":"cefazolin(第一代)過血腦屏障差。","B":"erythromycin過血腦屏障差。","C":"gentamicin極性高、幾乎不過血腦屏障。","D":"rifampin脂溶性大、易過血腦屏障—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-64":{"quick":"vancomycin與細胞壁前驅物的D-Ala-D-Ala緊密結合,抑制細胞壁合成。","detail":{"background":"「vancomycin」是治療『MRSA(抗methicillin金黃葡萄球菌)』的首選之一:其機轉是『與細菌細胞壁『胜肽聚醣(peptidoglycan)前驅物末端的『D-丙胺酸-D-丙胺酸(D-Ala-D-Ala)』『緊密結合』』,『阻止『轉糖基化與轉肽』反應、抑制細胞壁合成』。β-內醯胺類才抑制transpeptidase(PBP);vancomycin抗藥性(VRE/VRSA)即末端變成D-Ala-D-Lac使結合力下降。故機轉為與D-Ala-D-Ala結合。","options":{"A":"抑制transpeptidase為β-內醯胺類機制。","B":"與D-Ala-D-Ala結合抑制細胞壁合成—正解。","C":"抑制D-Ala生成為cycloserine機制。","D":"抑制bactoprenol去磷酸化為bacitracin機制。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-60":{"quick":"isoniazid須併用pyridoxine(維生素B6)以預防周邊神經病變。","detail":{"background":"抗結核藥「『isoniazid(INH)』」會『干擾『維生素B6(pyridoxine)』代謝(增加排出)』,造成『周邊神經病變(神經發炎、感覺異常)』,尤其營養不良、糖尿病、酒癮者。故『併用『pyridoxine(維生素B6)』可『預防』此神經病變副作用』。daptomycin、meropenem、teicoplanin無此需求。故為isoniazid。","options":{"A":"daptomycin不需併用B6。","B":"meropenem不需併用B6。","C":"isoniazid需併用pyridoxine預防周邊神經病變—正解。","D":"teicoplanin不需併用B6。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-61":{"quick":"gentamicin(aminoglycoside)經腎排泄、不經肝代謝,不干擾其他藥物代謝。","detail":{"background":"「『gentamicin』(aminoglycoside)」極性高、『不經肝臟代謝或膽汁排出,『主要以『原型經腎絲球過濾排泄』』,『故『不誘導/抑制肝酶,『不干擾』其他藥物的代謝』』(但具腎毒性與耳毒性)。chloramphenicol(抑肝酶)、erythromycin(抑CYP3A4)、rifampin(誘導肝酶)皆會干擾其他藥物代謝。故為gentamicin。","options":{"A":"chloramphenicol抑制肝酶、會干擾代謝。","B":"erythromycin抑制CYP3A4。","C":"gentamicin經腎排泄、不干擾其他藥物代謝—正解。","D":"rifampin誘導肝酶。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-51":{"quick":"metronidazole不用於淋病球菌(N. gonorrhoeae)感染。","detail":{"background":"「metronidazole」抗『『厭氧菌』與『原蟲』』:臨床用於『腹腔內厭氧菌感染、『困難梭菌(C. difficile)』腸炎、陰道滴蟲(T. vaginalis)、阿米巴(E. histolytica)、梨形鞭毛蟲、細菌性陰道炎』等。「『淋病球菌(N. gonorrhoeae)』是『需氧革蘭氏陰性雙球菌』,metronidazole『無效』(淋病用ceftriaxone)」。故不是其用途者為淋病。","options":{"A":"腹腔厭氧菌/C. difficile為其用途。","B":"陰道滴蟲為其用途。","C":"淋病球菌(需氧)非metronidazole用途—正解。","D":"阿米巴結腸炎為其用途。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-61":{"quick":"ticarcillin屬抗綠膿桿菌penicillin,可與aminoglycoside併用治綠膿桿菌。","detail":{"background":"「『抗綠膿桿菌(antipseudomonal)penicillin』」包括『『ticarcillin、piperacillin、carbenicillin、azlocillin』』,可『與『aminoglycoside』併用『協同』治療『綠膿桿菌(P. aeruginosa)』』感染。amoxicillin(廣效但無抗綠膿)、dicloxacillin/nafcillin(耐酶、抗葡萄球菌)非抗綠膿桿菌penicillin。故為ticarcillin。","options":{"A":"amoxicillin無抗綠膿桿菌作用。","B":"dicloxacillin為耐酶抗葡萄球菌penicillin。","C":"nafcillin為耐酶抗葡萄球菌penicillin。","D":"ticarcillin為抗綠膿桿菌penicillin—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-62":{"quick":"ceftriaxone為淋病球菌感染的首選用藥。","detail":{"background":"「ceftriaxone」(第三代頭孢):①是『淋病(N. gonorrhoeae)的『首選』』(亦用於腦膜炎、肺炎、傷寒等)』(A正確);②屬『第三代(非第四代;第四代為cefepime)』(B錯誤);③『不與clavulanate併用』(amoxicillin-clavulanate才併用)(C錯誤);④『主要『經膽道排泄』,『腎衰竭病人『不需大幅減量』』(D錯誤)。故A正確。","options":{"A":"ceftriaxone為淋病首選—正解。","B":"屬第三代頭孢、非第四代—錯誤。","C":"不與clavulanate併用—錯誤。","D":"經膽道排泄、腎衰不需大幅減量—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-51":{"quick":"旅遊性下痢(革蘭氏陰性桿菌)首選levofloxacin(fluoroquinolone)。","detail":{"background":"本題『自助旅行後『下痢』、止瀉無效、疑『革蘭氏陰性桿菌(如腸毒性大腸桿菌、志賀、沙門)』感染』——『旅遊者腹瀉的首選抗生素為『氟喹諾酮類(fluoroquinolone,如『levofloxacin、ciprofloxacin』)』(或azithromycin)』,涵蓋常見的革蘭氏陰性腸道病原。sulfacetamide(眼用磺胺)、trimethoprim(單用)、vancomycin(抗革蘭氏陽性)不適用。故為levofloxacin。","options":{"A":"levofloxacin(fluoroquinolone)為旅遊腹瀉首選—正解。","B":"sulfacetamide為眼用磺胺。","C":"trimethoprim單用不適用。","D":"vancomycin抗革蘭氏陽性、不治此。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-59":{"quick":"isoniazid主要由肝臟的N-acetyltransferase代謝(乙醯化)。","detail":{"background":"抗結核藥「isoniazid(INH)」:①『機轉是『抑制『分枝菌酸(mycolic acid)』合成』(細胞壁),『非細胞膜』』(故A錯誤);②『可『口服』(非只能靜注)』(B錯誤);③『主要由肝臟『N-乙醯轉移酶(N-acetyltransferase)』『乙醯化』代謝(有快、慢乙醯化者基因多型性)』(C正確);④『副作用為『周邊神經病變(缺B6)、肝毒性』,『視神經病變是『ethambutol』』(D錯誤)。故C正確。","options":{"A":"INH抑制分枝菌酸合成(細胞壁)、非細胞膜—錯誤。","B":"INH可口服、非只靜注—錯誤。","C":"INH由肝N-acetyltransferase代謝—正解。","D":"視神經病變是ethambutol、非INH—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-60":{"quick":"磺胺類致G6PD缺乏新生兒溶血而引起核黃疸,孕婦/新生兒應避免。","detail":{"background":"孕婦/新生兒禁用抗生素的原因:①「『sulfonamides(磺胺)』」——『近產期使用可『置換膽紅素』並『在G6PD缺乏新生兒引起『溶血』』,『致『核黃疸(kernicterus)』』(C正確);②「streptomycin/aminoglycoside」——致『胎兒『第八對腦神經(聽神經)』受損(耳毒)』(故A把erythromycin、B把streptomycin致軟骨皆寫錯);③「『tetracycline』」——致『牙齒著色、骨骼發育抑制』(『『灰嬰症候群』是『chloramphenicol』』,故D錯誤)。故C正確。","options":{"A":"第八對腦神經受損是aminoglycoside、非erythromycin—錯誤。","B":"streptomycin致耳毒(第八對腦神經)、非軟骨—錯誤。","C":"磺胺致G6PD缺乏新生兒溶血→核黃疸—正解。","D":"灰嬰症候群是chloramphenicol、非tetracycline—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-61":{"quick":"rifampin誘導肝臟代謝酵素,使其他藥物藥效降低。","detail":{"background":"「『rifampin』」是『強力的『肝臟『細胞色素P450(CYP)誘導劑』』』:會『加速『多種併用藥物(如口服避孕藥、warfarin、methadone、HIV蛋白酶抑制劑、digoxin等)的代謝』,使其『血中濃度與藥效『降低』』。chloramphenicol、erythromycin、ketoconazole反而是『酶『抑制劑』』(升高其他藥濃度)。故誘導肝酶降低其他藥效者為rifampin。","options":{"A":"chloramphenicol為酶抑制劑。","B":"erythromycin抑制CYP3A4。","C":"ketoconazole抑制CYP3A4。","D":"rifampin誘導肝酶、降低其他藥效—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-62":{"quick":"acyclovir先被病毒thymidine kinase磷酸化,選擇性抑制疱疹病毒複製。","detail":{"background":"「acyclovir」:『鳥嘌呤核苷類似物』,須『先被『病毒的胸苷激酶(thymidine kinase)』磷酸化(第一步)』,再由宿主酶磷酸化成三磷酸活性型,『選擇性抑制『病毒DNA聚合酶』』、終止DNA鏈延長——『因僅在『被病毒感染的細胞』內被活化,對感染細胞具選擇性』,『主要治療『疱疹病毒(HSV、VZV)』』。abacavir/azidothymidine(AZT)抗HIV、amantadine抗流感。故為acyclovir。","options":{"A":"abacavir為抗HIV核苷類似物。","B":"acyclovir被病毒TK磷酸化、治疱疹病毒—正解。","C":"amantadine抗流感A病毒。","D":"azidothymidine(AZT)抗HIV。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-63":{"quick":"cefepime增加aminoglycoside(amikacin)進入細菌,二者併用協同抗菌。","detail":{"background":"β-內醯胺類(如『cefepime』)『破壞細菌『細胞壁』』,可『增加『aminoglycoside(如amikacin)』『穿透細菌、進入胞內』的濃度』,『二者『協同(synergy)』』增強對腸球菌、綠膿桿菌等的殺菌力(臨床如治療腸球菌心內膜炎)。amantadine(抗病毒)、azlocillin(另一penicillin)、aztreonam(monobactam)非此協同對象。故與cefepime協同者為amikacin。","options":{"A":"amantadine為抗病毒藥。","B":"cefepime增amikacin進入細菌、協同—正解。","C":"azlocillin為另一penicillin。","D":"aztreonam為monobactam。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-52":{"quick":"amoxicillin的抗藥性主要因細菌產生β-內醯胺酶。","detail":{"background":"青黴素類藥動與抗藥:①「ampicillin/amoxicillin的『吸收『會受食物影響』(amoxicillin受影響較小)』」(故A「不會受影響」錯誤);②「dicloxacillin『耐酸、口服吸收尚可』」(故B「酸性不穩定致吸收差」錯誤);③「『amoxicillin的抗藥性主要因細菌產生『β-內醯胺酶(β-lactamase)』水解其結構』」(C正確,故臨床併用clavulanate);④「nafcillin『主要經『膽道』排泄』(非腎)」(故D錯誤)。故C正確。","options":{"A":"ampi/amoxi吸收會受食物影響—錯誤。","B":"dicloxacillin耐酸、可口服—錯誤。","C":"amoxicillin抗藥性主因β-內醯胺酶—正解。","D":"nafcillin主要經膽道排泄、非腎—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-66":{"quick":"tiotropium不易過血腦屏障、半衰期長(約25hr),吸入用於COPD支氣管擴張。","detail":{"background":"吸入型抗膽鹼(antimuscarinic)支氣管擴張劑:「『tiotropium』」是『四級銨『長效』抗膽鹼劑』,『不易通過血腦屏障(無中樞副作用)』、『半衰期長(約25小時,『每日一次』)』,『吸入用於『慢性阻塞性肺病(COPD)』』維持治療。ipratropium為『短效』;tropicamide(眼科散瞳)、benztropine(中樞,治帕金森/EPS,『會過BBB』)用途不同。故為tiotropium。","options":{"A":"tropicamide為眼科散瞳劑。","B":"ipratropium為短效吸入抗膽鹼。","C":"tiotropium長效、不過BBB、用於COPD—正解。","D":"benztropine過BBB、用於中樞。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-54":{"quick":"dalbavancin對抗vancomycin的腸球菌(VRE)無效,故D錯誤。","detail":{"background":"抗革蘭氏陽性菌的醣肽類:①「『對vancomycin抗藥(VRE)』的主因是『細胞壁前驅物末端由D-Ala-D-Ala『變成D-Ala-D-Lac』,使vancomycin『失去結合能力』』(A正確);②「vancomycin+cefotaxime可治『對penicillin抗藥的肺炎鏈球菌(PRSP)』」(B正確);③「telavancin可治對vancomycin耐受的革蘭氏陽性菌」(C大致正確);④「『dalbavancin對『vanA型抗藥的腸球菌(VRE)』『無效』』」(故D「dalbavancin可治對vancomycin抗藥的腸球菌」錯誤)。故D錯誤。","options":{"A":"VRE機轉=D-Ala-D-Ala變D-Ala-D-Lac失結合,正確。","B":"vanco+cefotaxime治PRSP,正確。","C":"telavancin治對vanco耐受的G+菌,正確。","D":"dalbavancin對VRE無效、非可治—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-52":{"quick":"本題公告「一律給分」;考肺炎鏈球菌腦膜炎的用藥(cefuroxime過BBB差不適用)。","detail":{"background":"肺炎鏈球菌(Streptococcus pneumoniae)腦膜炎的經驗治療通常用『第三代頭孢(『cefotaxime、ceftriaxone』,過血腦屏障佳)+vancomycin(涵蓋抗藥株)』。「『cefuroxime(第二代)』『通過血腦屏障較差、不適用於腦膜炎』」。本題經評定後「一律給分(送分)」(各選項適用性判定有歧義)。","options":{"A":"cefuroxime(第二代)過BBB差、不適腦膜炎(本題送分)。","B":"cefotaxime為腦膜炎適用(本題送分)。","C":"ceftriaxone為腦膜炎適用(本題送分)。","D":"vancomycin涵蓋抗藥株(本題送分)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-52":{"quick":"rifampin作用於RNA聚合酶,抗藥性源於RNA聚合酶突變(非DNA聚合酶),故A錯誤。","detail":{"background":"rifampin:①『機轉是『抑制細菌『DNA依賴性『RNA聚合酶(RNA polymerase)』』』,『抗藥性源於『RNA聚合酶(rpoB基因)突變』使結合力下降(『非『DNA聚合酶』)』』(故A「結合到DNA聚合酶能力降低」錯誤);②「開放性肺結核須與isoniazid等『併用』以防抗藥性」(B正確);③「『誘導『CYP450』』,加速methadone、抗凝血劑等排除」(C正確);④「與其他rifamycin類有『交叉抗藥性』」(D正確)。故A錯誤。","options":{"A":"rifampin作用於RNA聚合酶、抗藥源於RNA pol突變(非DNA pol)—錯誤(正解)。","B":"須與isoniazid併用防抗藥,正確。","C":"誘導CYP450加速藥物排除,正確。","D":"與rifamycin類有交叉抗藥性,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-55":{"quick":"β-內醯胺酶陽性金黃葡萄球菌感染應用耐酶的dicloxacillin。","detail":{"background":"『產『β-內醯胺酶(β-lactamase)』的金黃葡萄球菌(MSSA)』會水解一般penicillin。應選用『『耐β-內醯胺酶(penicillinase-resistant)的penicillin』——『dicloxacillin、nafcillin、oxacillin、cloxacillin、methicillin』』。ampicillin、penicillin G『會被β-內醯胺酶水解』;piperacillin(抗綠膿)亦不耐酶。故β-內醯胺酶陽性金黃葡萄球菌首選dicloxacillin。","options":{"A":"ampicillin會被β-內醯胺酶水解。","B":"dicloxacillin耐酶、適用β-內醯胺酶陽性金黃葡萄球菌—正解。","C":"penicillin G會被β-內醯胺酶水解。","D":"piperacillin不耐酶。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-52":{"quick":"cefoperazone與ceftazidime皆可用於綠膿桿菌,「都無法使用」錯誤。","detail":{"background":"頭孢菌素:①「cephalexin(第一代)對綠膿桿菌效果差,主要抗革蘭氏陽性」(A正確);②「cefuroxime(第二代)可用於流感嗜血桿菌」(B正確);③「『cefoperazone(三代)與ceftazidime(三代)『都『可』用於『綠膿桿菌(P. aeruginosa)』感染(屬抗綠膿頭孢)』』」——故C「『都『無法』使用』」錯誤;④「ceftriaxone用於腸桿菌屬(Enterobacter)易『誘導AmpC酶產生抗藥』,宜避免」(D正確)。故C錯誤。","options":{"A":"cephalexin對綠膿桿菌效果差,正確。","B":"cefuroxime可用於流感嗜血桿菌,正確。","C":"cefoperazone與ceftazidime可用於綠膿桿菌、非都無法—錯誤(正解)。","D":"ceftriaxone用於腸桿菌易產生抗藥、宜避免,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-54":{"quick":"bleomycin為抗腫瘤抗生素,可抑制癌細胞細胞週期,臨床作抗癌藥。","detail":{"background":"部分『抗生素類藥物因毒性而主要作為『抗癌藥』』:「『bleomycin』」是『醣肽類抗腫瘤抗生素』,經『產生『自由基』造成DNA股斷裂、使細胞停滯於G2/M期』,臨床用於『睪丸癌、淋巴瘤、子宮頸癌』(副作用為肺纖維化)。gentamicin(抗菌)、telithromycin(ketolide抗菌)、daptomycin(抗革蘭氏陽性菌)為抗菌用。故抗癌者為bleomycin。","options":{"A":"bleomycin為抗腫瘤抗生素(抑細胞週期)—正解。","B":"gentamicin為抗菌aminoglycoside。","C":"telithromycin為抗菌ketolide。","D":"daptomycin為抗革蘭氏陽性菌藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-52":{"quick":"TMP:SMZ=1:5配方因TMP脂溶性較高,B正確。","detail":{"background":"TMP-SMZ(共同抑制葉酸合成的『序列阻斷』):①「『SMX(磺胺)抑制『二氫蝶酸合成酶(dihydropteroate synthase)』』;『TMP抑制『二氫葉酸還原酶(dihydrofolate reductase)』』」——『二者作用『不同步驟』(故A「皆抑制dihydropteroate synthase」錯誤);②「『TMP:SMZ=1:5配方』是因為『TMP『脂溶性較高、分布體積大』』,使體內達到最佳的1:20比例」(B正確);③「『可治泌尿道感染,『也是『肺囊蟲肺炎(PCP)』的首選』』」(故C「無法用於PCP」錯誤);④「『多數副作用(皮疹、骨髓抑制、過敏)來自『SMX(磺胺)』』」(故D「來自TMP」錯誤)。故B正確。","options":{"A":"TMP與SMX抑制不同酵素步驟、非皆抑dihydropteroate synthase—錯誤。","B":"TMP:SMZ=1:5因TMP脂溶性較高—正解。","C":"TMP-SMZ為PCP首選、非無法用—錯誤。","D":"多數副作用來自SMX(磺胺)、非TMP—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-52":{"quick":"四環素類(omadacycline)長期使用最易造成8歲以下兒童牙齒、骨骼傷害。","detail":{"background":"「『四環素類(tetracyclines,含新藥『omadacycline』)』」會『與『鈣』螯合、沉積於『發育中的牙齒與骨骼』』,造成『『8歲以下兒童『牙齒『永久性著色(黃灰)』與『骨骼發育抑制』』』,故『孕婦與8歲以下兒童『禁用』』。erythromycin、clindamycin、cephalexin無此特性。故為omadacycline(四環素類)。","options":{"A":"erythromycin不致牙齒骨骼著色。","B":"omadacycline(四環素類)致8歲以下牙齒/骨骼傷害—正解。","C":"clindamycin不致牙齒著色。","D":"cephalexin不致牙齒著色。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-53":{"quick":"zidovudine(AZT)對抗HIV,用於治療愛滋病。","detail":{"background":"抗病毒藥的對象:①「『zidovudine(AZT)』」——『核苷反轉錄酶抑制劑(NRTI)』,『對抗『HIV』、治療愛滋病』;②「amantadine」——抗『流感A』病毒;③「ganciclovir」——抗『巨細胞病毒(CMV)』;④「acyclovir」——抗『疱疹病毒(HSV/VZV)』。故對抗HIV者為zidovudine。","options":{"A":"amantadine抗流感A病毒。","B":"ganciclovir抗CMV。","C":"acyclovir抗疱疹病毒。","D":"zidovudine(AZT)抗HIV—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-55":{"quick":"ceftazidime無法單獨治療產碳青黴烯酶的菌種,故C錯誤。","detail":{"background":"抗生素應用:①「cefepime(第四代)可單獨用於對penicillin G抗藥的鏈球菌」(A正確);②「ceftolozane-tazobactam可用於抗藥革蘭氏陰性菌」(B正確);③「『ceftazidime『無法『單獨』治療『產『碳青黴烯酶(carbapenemase)』』的菌種』(此類菌會水解ceftazidime,須用『ceftazidime-avibactam』等含β-內醯胺酶抑制劑的組合)』」——故C錯誤;④「ceftazidime-avibactam治複雜性腹腔內感染時須『併用metronidazole』涵蓋厭氧菌」(D正確)。故C錯誤。","options":{"A":"cefepime可單獨用於對penicillin G抗藥的鏈球菌,正確。","B":"ceftolozane-tazobactam可用於抗藥革蘭氏陰性菌,正確。","C":"ceftazidime無法單獨治產碳青黴烯酶菌—錯誤(正解)。","D":"ceftazidime-avibactam須併metronidazole治腹腔感染,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-53":{"quick":"aminoglycoside過血腦屏障差、CSF濃度低,「CSF濃度比腎皮質高」錯誤。","detail":{"background":"aminoglycoside(如gentamicin):①「與『ampicillin』併用可『增加穿透細菌』,協同治療『腸球菌心內膜炎』」(A正確);②「為『濃度依賴型』殺菌——『強度與殺菌速度與『劑量(濃度)』正相關』」(B正確);③「有『後抗生素效應(PAE)』,故『『單日單次高劑量』比多次低劑量『效果更好且毒性較低』』」(C正確);④「『極性高、『不易過血腦屏障』,『CSF濃度『低』』,且『在『腎皮質『蓄積(致腎毒)』』』」——故D「『CSF濃度比腎皮質『高』』」錯誤(應相反)。故D錯誤。","options":{"A":"與ampicillin併用增穿透、治腸球菌心內膜炎,正確。","B":"強度與殺菌速度與劑量正相關(濃度依賴),正確。","C":"有後抗生素效應、單日單次高劑量較佳,正確。","D":"CSF濃度低、腎皮質蓄積(非CSF高於腎皮質)—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-55":{"quick":"fluconazole(azole類)抑制黴菌CYP450(14-α-去甲基酶),抑制ergosterol合成。","detail":{"background":"抗黴菌藥機轉:①「『azole類(如fluconazole)』」——『抑制黴菌『細胞色素P450酵素(14-α-去甲基酶)』』,『阻斷『麥角固醇(ergosterol)』合成』(細胞膜成分);②「amphotericin B」——『直接『結合ergosterol』形成孔洞』;③「griseofulvin」——干擾微管(抗皮癬菌);④「terbinafine」——抑制『squalene epoxidase』。本題『抑制黴菌CYP450以抑ergosterol合成』者為fluconazole(azole)。","options":{"A":"amphotericin B直接結合ergosterol形成孔洞。","B":"fluconazole抑黴菌CYP450、抑ergosterol合成—正解。","C":"griseofulvin干擾微管。","D":"terbinafine抑squalene epoxidase。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-68":{"quick":"crofelemer為CFTR/CaCC抑制劑,用於治療HIV藥物引起的腹瀉。","detail":{"background":"「『crofelemer』」是『腸道『氯離子通道(CFTR與鈣活化氯通道CaCC)抑制劑』』,『減少腸腔氯離子與水分分泌』,『核准用於『HIV/AIDS抗反轉錄病毒藥物引起的『非感染性腹瀉』』』。linaclotide(GC-C致效,治便秘)、diphenoxylate(鴉片類止瀉)、docusate(軟便劑)機制不同。故為crofelemer。","options":{"A":"linaclotide為治便秘的GC-C致效劑。","B":"crofelemer為CFTR/CaCC抑制劑、治HIV藥物相關腹瀉—正解。","C":"diphenoxylate為鴉片類止瀉劑。","D":"docusate為軟便劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-52":{"quick":"LMWH主要抗Xa、對thrombin(IIa)中和較弱,「LMWH對thrombin中和能力較高」錯誤。","detail":{"background":"未分餾肝素(UFH)與低分子量肝素(LMWH):①「兩者皆可預防/治療肺栓塞與深層靜脈血栓」(A正確);②「『UFH分子長,可同時『中和factor Xa與thrombin(IIa)』;LMWH分子短,『主要抗Xa』、『對thrombin(IIa)的中和『較弱』』」——故B「『LMWH對thrombin有『較高』中和能力』」錯誤(應較弱);③「LMWH較少引起『肝素誘發血小板低下(HIT)』」(C正確);④「LMWH劑量反應可預測、『較好控制(常不需監測aPTT)』」(D正確)。故B錯誤。","options":{"A":"兩者皆可預防治療肺栓塞,正確。","B":"LMWH主要抗Xa、對thrombin中和較弱(非較高)—錯誤(正解)。","C":"LMWH較少引發血小板低下,正確。","D":"LMWH劑量較好控制,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-66":{"quick":"warfarin抑制vitamin K epoxide reductase,減少凝血因子製造。","detail":{"background":"「『warfarin(香豆素類口服抗凝劑)』」的機轉是『抑制『維生素K環氧化物還原酶(vitamin K epoxide reductase, VKOR)』』,『使維生素K無法再生為活性型,『阻斷『維生素K依賴性凝血因子(II、VII、IX、X與蛋白C、S)的『γ-羧化(活化)』』』,『減少有功能的凝血因子』(故需數天起效)。heparin(抗凝酶)、tPA(溶栓)、melagatran(直接凝血酶抑制)機制不同。故為warfarin。","options":{"A":"heparin經antithrombin抑制凝血酶/Xa。","B":"warfarin抑制vitamin K epoxide reductase—正解。","C":"tPA為血栓溶解劑。","D":"melagatran為直接凝血酶抑制劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-64":{"quick":"tranexamic acid拮抗plasminogen活化成plasmin(抗纖溶止血)。","detail":{"background":"「『tranexamic acid』(與aminocaproic acid)」是『『抗纖維蛋白溶解(antifibrinolytic)止血劑』』:『與plasminogen的『離胺酸結合位』結合,『阻止plasminogen『活化成plasmin』、並阻止plasmin與纖維蛋白結合』,『穩定血塊、減少出血』(用於月經過多、外傷/手術出血、血友病)。urokinase、tPA是『活化』plasminogen的溶栓劑;vasopressin為血管加壓素。故拮抗plasminogen活化者為tranexamic acid。","options":{"A":"urokinase活化plasminogen(溶栓)。","B":"vasopressin為血管加壓素。","C":"tPA活化plasminogen(溶栓)。","D":"tranexamic acid拮抗plasminogen活化(止血)—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-75":{"quick":"deferasirox為口服鐵螯合劑,可治鐵中毒/鐵過載。","detail":{"background":"鐵螯合劑:①「『deferasirox』」——『『口服』鐵螯合劑』,用於慢性鐵過載(如反覆輸血的地中海貧血);②「deferoxamine」——『注射(靜注/肌注)』,用於急性鐵中毒與慢性鐵過載;③「deferiprone」——口服。本題問『『口服』可治鐵中毒』者,故為deferasirox。D-dimethylcysteine(汞)、Prussian blue(鉈/銫)非鐵螯合劑。","options":{"A":"deferoxamine為注射型鐵螯合劑。","B":"deferasirox為口服鐵螯合劑—正解。","C":"D-dimethylcysteine非鐵螯合劑。","D":"Prussian blue用於鉈/銫中毒。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-53":{"quick":"heparin是抗凝血劑,不是血小板凝集拮抗劑。","detail":{"background":"「抗血小板(抑制血小板凝集)藥物」包括:①「aspirin」(抑COX→TXA2↓);②「dipyridamole」(抑PDE/增cAMP、抑腺苷再攝取);③「ticlopidine/clopidogrel」(阻斷ADP受體P2Y12)。而「『heparin』是『『抗凝血劑』(經antithrombin抑制凝血酶與Xa)』,『『不是』血小板凝集拮抗劑』」。故不是抗血小板者為heparin。","options":{"A":"dipyridamole為抗血小板藥。","B":"aspirin為抗血小板藥。","C":"heparin為抗凝血劑、非抗血小板—正解。","D":"ticlopidine為抗血小板藥(阻ADP受體)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-63":{"quick":"deferoxamine是鐵螯合劑(排鐵),無助於改善貧血。","detail":{"background":"改善貧血的藥物:①「口服ferrous fumarate(亞鐵)、注射iron dextran」——『補『鐵』治『缺鐵性貧血』』;②「維生素B12與葉酸」——治『巨母紅血球性貧血』。而「『deferoxamine』是『鐵『螯合劑』』,『『移除(排出)鐵』』(用於鐵過載/鐵中毒),『『無助於』改善貧血(反而排鐵)』」。故無助改善貧血者為deferoxamine。","options":{"A":"口服亞鐵補鐵治缺鐵性貧血。","B":"注射iron dextran補鐵。","C":"deferoxamine為鐵螯合劑(排鐵)、無助貧血—正解。","D":"B12與葉酸治巨母紅血球性貧血。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-56":{"quick":"buspirone(抗焦慮藥)無法預防或治療急性偏頭痛。","detail":{"background":"偏頭痛用藥:①『急性治療』——『『triptans(如sumatriptan,5-HT1B/1D致效)』、麥角類『dihydroergotamine(DHE)』、NSAID』;②『預防』——『β阻斷劑『propranolol』、topiramate、CGRP抗體、TCA』等。而「『buspirone』是『5-HT1A部分致效劑的『抗焦慮藥』』,『『不能』預防或治療偏頭痛』」。故無法治偏頭痛者為buspirone。","options":{"A":"buspirone為抗焦慮藥、無法治偏頭痛—正解。","B":"sumatriptan為急性偏頭痛用藥。","C":"propranolol為偏頭痛預防藥。","D":"dihydroergotamine為急性偏頭痛用藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-66":{"quick":"aspirin在兒童病毒感染退燒時最易引發雷氏症候群(Reye syndrome)。","detail":{"background":"「『雷氏症候群(Reye syndrome)』」是『『兒童/青少年在『病毒感染(如水痘、流感)』時『使用『aspirin(水楊酸)』』退燒』,引發的『急性腦病變與肝脂肪變性(嘔吐、意識改變、肝衰)』』,可致命。故『兒童病毒感染『禁用aspirin』退燒,改用『acetaminophen』』。acetaminophen、sulindac、ibuprofen較不引發Reye。故為aspirin。","options":{"A":"acetaminophen為兒童退燒首選(不致Reye)。","B":"aspirin致兒童雷氏症候群—正解。","C":"sulindac非典型Reye誘因。","D":"ibuprofen非典型Reye誘因。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-72":{"quick":"plerixafor抑制CXCR4,動員造血幹細胞至周邊血以利收集。","detail":{"background":"「『plerixafor』」是『『CXCR4(CXC趨化激素受體4)『拮抗劑』』』:正常時幹細胞表面CXCR4與骨髓基質的SDF-1(CXCL12)結合而『滯留骨髓』;plerixafor『阻斷CXCR4』使『造血幹細胞『動員(釋出)』至『周邊血』』,『與G-CSF併用可提高幹細胞收集量』(用於淋巴瘤、多發性骨髓瘤的自體移植)。故機轉為抑制CXCR4。","options":{"A":"非強化JAK/STAT。","B":"非促G-CSF釋出。","C":"抑制CXCR4以動員幹細胞—正解。","D":"非提高G-CSF與受體結合。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-51":{"quick":"fondaparinux選擇性抑制factor Xa(非thrombin),故A錯誤。","detail":{"background":"「fondaparinux」(合成戊醣):①『機轉是『與『antithrombin III』結合』後『『選擇性『中和factor Xa』』』,『『不抑制thrombin(IIa)』』』(故A「主要抑制thrombin」錯誤);②「皮下注射、每日一次」(C正確);③「『經腎排除』,『嚴重腎功能不全者禁用/慎用』」(D正確);④用於VTE預防/治療、肝素誘發血小板低下(HIT)替代。故A錯誤。","options":{"A":"fondaparinux選擇性抑Xa、不抑thrombin—錯誤(正解)。","B":"經antithrombin III中和factor Xa,正確。","C":"皮下注射每日一次,正確。","D":"腎功能不全者不宜使用,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-70":{"quick":"兒童病毒感染發燒首選acetaminophen(避免aspirin致Reye)。","detail":{"background":"兒童發燒的首選退燒藥為「『acetaminophen(普拿疼)』」(或ibuprofen);應『『避免aspirin』』,因『兒童在病毒感染時用aspirin易引發『雷氏症候群(Reye syndrome)』』。etodolac、celecoxib(NSAID/COX-2)非兒童退燒首選。故首選acetaminophen。","options":{"A":"aspirin致兒童雷氏症候群、應避免。","B":"acetaminophen為兒童退燒首選—正解。","C":"etodolac非兒童退燒首選。","D":"celecoxib(COX-2)非兒童退燒首選。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-58":{"quick":"abciximab為血小板GP IIb/IIIa拮抗劑,用於急性冠狀動脈症候群。","detail":{"background":"「『abciximab』」是『『血小板表面醣蛋白『GP IIb/IIIa(及vitronectin受體)』『拮抗劑(單株抗體)』』』:『阻斷『纖維蛋白原『與GP IIb/IIIa結合』』、『抑制血小板『最終共同路徑的聚集』』』,用於『急性冠狀動脈症候群、經皮冠狀動脈介入(PCI)』。dipyridamole(PDE抑制)、cilostazol(PDE3抑制)、prasugrel(P2Y12阻斷)機制不同。故GP IIb/IIIa拮抗劑為abciximab。","options":{"A":"abciximab為GP IIb/IIIa拮抗劑—正解。","B":"dipyridamole抑制PDE/腺苷再攝取。","C":"cilostazol抑制PDE3。","D":"prasugrel阻斷ADP(P2Y12)受體。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-58":{"quick":"EPO受體主要活化JAK2/STAT5訊息(非ERK),故C錯誤。","detail":{"background":"紅血球生成素(EPO):①「darbepoetin alfa為長效EPO類似物」(A正確);②「常見副作用為『高血壓與血栓(紅血球比容升高)』」(B正確);③「『EPO受體屬『細胞激素受體』,活化的是『JAK2-STAT5』訊息路徑(而非以ERK為主)』」(故C「受體活化ERK訊息」錯誤);④「刺激紅血球前驅細胞(BFU-E/CFU-E)增殖分化」(D正確)。EPO被列為運動禁藥(增加攜氧)。故C錯誤。","options":{"A":"darbepoetin alfa為EPO類似物,正確。","B":"副作用為高血壓與血栓,正確。","C":"EPO受體主要活化JAK2/STAT5、非ERK—錯誤(正解)。","D":"刺激紅血球幹細胞增殖分化,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-59":{"quick":"desmopressin促進凝血是經調節factor VIII(與vWF)的釋放。","detail":{"background":"「『desmopressin(DDAVP)』」(血管加壓素V2受體致效劑)促進凝血的機轉是『刺激血管內皮『釋放『儲存的『factor VIII與von Willebrand factor(vWF)』』』』,『提升血中VIII/vWF濃度』,用於『輕型A型血友病、von Willebrand病、尿崩症』。並非促plasminogen活化、非增cAMP分解、非活化ADP受體。故機轉為調節factor VIII釋放。","options":{"A":"非促plasminogen活化。","B":"調節factor VIII(與vWF)的釋放—正解。","C":"非增加cAMP分解。","D":"非活化ADP受體。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-74":{"quick":"buspirone主要作用於5-HT1A受體(非GABAA),故B錯誤。","detail":{"background":"抗焦慮藥「buspirone」:①「『無『抗抽搐或肌肉鬆弛』作用(與BZD不同)』」(A正確);②「『主要作用於『5-HT1A受體(部分致效)』』,『『而非『GABAA受體』(BZD才作用GABAA)』』」(故B「主要作用GABAA」錯誤);③「『不增強酒精的作用』(無交互鎮靜)」(C正確);④「『起效慢,『服用數週後抗焦慮作用才顯現』』」(D正確)。故B錯誤。","options":{"A":"無抗抽搐/肌肉鬆弛作用,正確。","B":"主要作用5-HT1A、非GABAA—錯誤(正解)。","C":"不增強酒精作用,正確。","D":"服用數週後才顯效,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-58":{"quick":"plasmin經全身靜注會被α2-antiplasmin快速中和、無法有效溶栓,故C錯誤。","detail":{"background":"血栓溶解藥:①「streptokinase為『異種蛋白』,『較t-PA易產生過敏反應』」(A正確);②「streptokinase須先『與plasminogen形成複合物』,再活化其他plasminogen成plasmin」(B正確);③「『直接給『plasmin』全身靜注『無效』——因『被血中『α2-抗纖維蛋白溶酶(α2-antiplasmin)』迅速中和』』」(故C「plasmin可全身靜注有效溶栓」錯誤);④「t-PA對『結合於纖維蛋白上的plasminogen』親和力較高(具血栓選擇性)」(D正確)。故C錯誤。","options":{"A":"streptokinase較t-PA易過敏,正確。","B":"streptokinase與plasminogen形成複合物再活化,正確。","C":"plasmin全身靜注被α2-antiplasmin中和、無效—錯誤(正解)。","D":"t-PA對纖維蛋白結合的plasminogen親和力高,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-51":{"quick":"warfarin的代謝受CYP2C9與VKORC1的基因多型性影響。","detail":{"background":"「warfarin」的劑量反應個體差異大,主要受『兩個基因的多型性』影響:①「『CYP2C9』」——『warfarin(尤S型)的『代謝酵素』,變異者代謝慢、需較低劑量』;②「『VKORC1(維生素K環氧化物還原酶複合體subunit 1)』」——『warfarin的『作用標的』,變異影響敏感度』。故為CYP2C9與VKORC1(此為藥物基因體學的經典範例)。","options":{"A":"CYP2C19非warfarin主要代謝酶。","B":"CYP2C9與VKORC1影響warfarin—正解。","C":"CYP2D6非warfarin主要代謝酶。","D":"CYP2B6/CYP2C19非warfarin的關鍵基因。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-56":{"quick":"ticlopidine阻斷血小板上的ADP受體(P2Y12)。","detail":{"background":"抗血小板藥依機制:①「aspirin」——抑制COX(TXA2↓);②「『ticlopidine』(與clopidogrel、prasugrel)」——『阻斷血小板『ADP受體(P2Y12)』』,抑制ADP誘發的聚集;③「tirofiban」——GP IIb/IIIa拮抗;④「dipyridamole」——抑PDE/腺苷再攝取。本題『阻斷ADP受體』者為ticlopidine。","options":{"A":"aspirin抑制COX。","B":"ticlopidine阻斷ADP(P2Y12)受體—正解。","C":"tirofiban為GP IIb/IIIa拮抗劑。","D":"dipyridamole抑PDE/腺苷再攝取。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-59":{"quick":"octreotide本身會致便秘,「急性便秘」最不適合用octreotide。","detail":{"background":"「octreotide」(體抑素somatostatin類似物)抑制多種激素與分泌,適應症:①「胃泌素瘤(抑胃泌素)」;②「『食道靜脈瘤出血』(減少內臟血流、降門脈壓)」;③「胰島素瘤、類癌、肢端肥大、分泌性腹瀉」。其『常見副作用『包括『便秘(及膽結石、腸蠕動抑制)』』』,故『『急性便秘』『不適合』用octreotide(會加重)』。故最不適合者為急性便秘。","options":{"A":"胃泌素瘤可用octreotide。","B":"食道靜脈瘤出血可用octreotide。","C":"急性便秘不適合(octreotide致便秘)—正解。","D":"胰島素瘤可用octreotide。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-67":{"quick":"急性壓力性潰瘍胃出血應優先給pantoprazole(PPI)以快速抑酸止血。","detail":{"background":"『急性腦損傷等重症病人的『壓力性潰瘍(stress ulcer)』』致胃出血/胃痛,應『優先給『質子幫浦抑制劑(PPI,如『pantoprazole』)』』——『強力抑制胃酸、提高胃內pH以『穩定血塊、促進止血與潰瘍癒合』』(靜脈PPI)。ketoprofen(NSAID,會加重潰瘍)、pilocarpine(膽鹼致效)、meclizine(抗暈)皆不適合。故優先給pantoprazole。","options":{"A":"pantoprazole(PPI)抑酸、改善壓力性潰瘍出血—正解。","B":"ketoprofen為NSAID、會加重潰瘍。","C":"pilocarpine為膽鹼致效劑、不適合。","D":"meclizine為抗暈藥、不適合。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-56":{"quick":"rivaroxaban在年長/腎功能差者半衰期會「延長」(非縮短),故C錯誤。","detail":{"background":"rivaroxaban(直接口服抗凝劑DOAC):①「『主要抑制『factor Xa』』」(A正確);②「用於治療/預防靜脈血栓栓塞、心房顫動中風預防」(B正確);③「『部分經腎排除,『年長者或腎功能不全者『半衰期『延長』』』(故須調整劑量)」——故C「年長者半衰期『縮短』」錯誤(應延長);④「『andexanet alfa』為其『直接解毒劑(逆轉Xa抑制劑)』」(D正確)。故C錯誤。","options":{"A":"抑制factor Xa,正確。","B":"可治療靜脈血栓症,正確。","C":"年長者半衰期延長(非縮短)—錯誤(正解)。","D":"andexanet alfa為直接解毒劑,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-58":{"quick":"oprelvekin(IL-11)刺激血小板生成,不會減少嗜中性球,故C錯誤。","detail":{"background":"「oprelvekin(重組IL-11)」用於『化療所致『血小板低下』』:①「『刺激『巨核細胞(megakaryocyte)』增殖、提高周邊『血小板』數』」(A正確);②「可刺激多種淋巴/骨髓細胞增殖」(B正確);③「『『不會『減少』嗜中性白血球』(IL-11作用於血小板生成,與嗜中性球無此關係)』」(故C「減少嗜中性球」錯誤);④「常見副作用為『體液滯留(水腫)、疲憊、頭痛、『心房心律不整』』」(D正確)。故C錯誤。","options":{"A":"刺激巨核細胞增殖、提高血小板,正確。","B":"可刺激淋巴/骨髓細胞增殖,正確。","C":"不會減少嗜中性球—錯誤(正解)。","D":"副作用含疲憊頭痛、心房心律不整,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-65":{"quick":"mirabegron經β3腎上腺素受體治療膀胱過度活動症。","detail":{"background":"「『mirabegron』」是『『β3-腎上腺素受體『致效劑』』』:『活化膀胱逼尿肌的β3受體→『鬆弛逼尿肌、增加膀胱儲尿容量』』,用於『『膀胱過度活動症(overactive bladder)』』(尿急、頻尿、急迫性尿失禁),為抗膽鹼藥之外的選擇。sibutramine/lorcaserin(減重)、buspirone(抗焦慮)機制不同。故為mirabegron。","options":{"A":"sibutramine為(已下市)減重藥。","B":"lorcaserin為5-HT2C致效減重藥。","C":"mirabegron經β3受體治膀胱過動症—正解。","D":"buspirone為抗焦慮藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-75":{"quick":"deferoxamine主要用於治療鐵中毒(鐵螯合劑)。","detail":{"background":"「『deferoxamine』」是『『鐵螯合劑(chelator)』』,『與游離鐵螯合形成可由腎排出的複合物』,用於『『急性鐵中毒』與慢性鐵過載(如反覆輸血)』(注射給藥)。dimercaprol(砷/汞/鉛)、penicillamine(銅/Wilson病、鉛)、melarsoprol(非洲錐蟲)用途不同。故治鐵中毒者為deferoxamine。","options":{"A":"dimercaprol用於砷/汞/鉛中毒。","B":"penicillamine用於銅(Wilson)/鉛。","C":"melarsoprol為抗非洲錐蟲藥。","D":"deferoxamine為鐵螯合劑、治鐵中毒—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-57":{"quick":"tenecteplase為組織型纖溶酶原活化劑,促plasminogen活化成plasmin溶栓。","detail":{"background":"「『tenecteplase』」是『『t-PA(組織型纖溶酶原活化劑)的基因改造長效型』』,『『促進『plasminogen『活化成plasmin』』、分解纖維蛋白(血栓)』』,用於『急性心肌梗塞、缺血性中風的溶栓』。bivalirudin(直接凝血酶抑制)、apixaban(Xa抑制)、vorapaxar(PAR-1拮抗,抗血小板)皆非溶栓劑。故促plasminogen活化者為tenecteplase。","options":{"A":"bivalirudin為直接凝血酶抑制劑。","B":"tenecteplase(t-PA類)促plasminogen活化溶栓—正解。","C":"apixaban為factor Xa抑制劑。","D":"vorapaxar為PAR-1拮抗(抗血小板)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-56":{"quick":"idelvion為長效型factor IX製劑,用於B型血友病。","detail":{"background":"B型血友病(hemophilia B)是『『凝血因子『IX』缺乏』』,治療以『補充『factor IX製劑』』為主。「『idelvion(albutrepenonacog alfa)』」是『『長效型『factor IX』融合蛋白製劑』』,用於『預防/治療B型血友病出血』。eloctate(長效factor VIII,治A型)、humate-P(含vWF/VIII)、vonicog alfa(重組vWF)用於A型血友病/von Willebrand病。故B型血友病的長效IX製劑為idelvion。","options":{"A":"eloctate為長效factor VIII(治A型血友病)。","B":"idelvion為長效factor IX(治B型血友病)—正解。","C":"humate-P含vWF/VIII。","D":"vonicog alfa為重組vWF。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-57":{"quick":"romiplostim(TPO受體致效劑)可增加血小板,治慢性免疫性血小板低下症(ITP)。","detail":{"background":"「『romiplostim』」是『『血小板生成素(TPO)受體『致效劑(peptibody)』』』:『刺激『巨核細胞』增殖分化、『增加血小板數』』,用於『『慢性『免疫性(原發性)血小板低下症(ITP)』』』(對類固醇/脾切反應不佳者)。plerixafor(CXCR4拮抗,動員幹細胞)、pteroylglutamic acid(葉酸)、hydroxocobalamin(B12)不增血小板。故為romiplostim。","options":{"A":"plerixafor為幹細胞動員劑。","B":"pteroylglutamic acid為葉酸。","C":"romiplostim(TPO受體致效)治慢性ITP—正解。","D":"hydroxocobalamin為維生素B12。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-70":{"quick":"lasmiditan為急性偏頭痛用藥、較sumatriptan無血管收縮副作用,B正確。","detail":{"background":"偏頭痛藥:①「『aspirin/ibuprofen『對偏頭痛『有』鎮痛作用』(輕中度可用)」(故A「無明顯鎮痛」錯誤);②「『lasmiditan(5-HT1F致效劑)』可作『急性發作用藥』,『因不作用於血管的5-HT1B,『較triptans(sumatriptan)『無血管收縮』副作用』(適合有心血管疾病者)』」(B正確);③「『CGRP或其受體的抗體(如erenumab)』『主要用於『預防』偏頭痛』」(C雖大致正確,但屬預防非廣義);④「『ubrogepant(小分子CGRP受體拮抗劑gepant)』『主要用於『急性』治療』,『rimegepant/atogepant才用於預防』」(故D「ubrogepant可『預防』」不準)。本題以B為正解。","options":{"A":"aspirin/ibuprofen對偏頭痛有鎮痛作用—錯誤。","B":"lasmiditan為急性用藥、較sumatriptan無血管收縮—正解。","C":"CGRP抗體主要用於預防(敘述偏向)。","D":"ubrogepant主要用於急性治療、非預防—不準。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-57":{"quick":"plerixafor為幹細胞動員劑,無法治療血小板低下症。","detail":{"background":"治療『血小板低下症(thrombocytopenia)』的藥物:①「romiplostim、eltrombopag」——『TPO受體致效劑(刺激血小板生成)』;②「oprelvekin(IL-11)」——刺激巨核細胞。而「『plerixafor』是『CXCR4拮抗劑』,用於『動員『造血幹細胞』至周邊血(供移植採集)』,『『無法治療血小板低下症』』」。故無法治血小板低下者為plerixafor。","options":{"A":"romiplostim為TPO受體致效劑、治血小板低下。","B":"oprelvekin(IL-11)治血小板低下。","C":"eltrombopag為TPO受體致效劑、治血小板低下。","D":"plerixafor為幹細胞動員劑、無法治血小板低下—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-56":{"quick":"amiodarone抑制CYP2C9,與warfarin併用最可能增加出血風險。","detail":{"background":"與warfarin併用增加出血風險者,多為『抑制其代謝(CYP2C9/CYP3A4)或增強抗凝』的藥:「『amiodarone』『強力『抑制CYP2C9/CYP3A4』,『減慢warfarin代謝、『升高其血中濃度與抗凝(INR)』』,『最易導致『出血』』」。cholestyramine(降warfarin吸收)、chlorthalidone(利尿)、benzodiazepines(鎮靜)較不增加warfarin出血。故為amiodarone。","options":{"A":"cholestyramine減少warfarin吸收(降效)。","B":"chlorthalidone為利尿劑、無此交互作用。","C":"benzodiazepines不顯著增warfarin出血。","D":"amiodarone抑CYP2C9、增warfarin出血—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-57":{"quick":"desmopressin適合治療輕型A型血友病(促factor VIII釋放)。","detail":{"background":"A型血友病(hemophilia A)為『凝血因子『VIII』缺乏』。「『desmopressin(DDAVP)』」可『刺激內皮『釋放儲存的factor VIII與vWF』』,『提升factor VIII濃度』,適用於『『輕型』A型血友病與von Willebrand病』的出血預防/治療(重型仍需補充factor VIII)。deferoxamine(鐵螯合)、oprelvekin(IL-11,血小板)、ferumoxytol(靜脈鐵劑)不治血友病。故為desmopressin。","options":{"A":"deferoxamine為鐵螯合劑。","B":"desmopressin促factor VIII釋放、治輕型A型血友病—正解。","C":"oprelvekin為IL-11(治血小板低下)。","D":"ferumoxytol為靜脈鐵劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-74":{"quick":"suvorexant拮抗orexin受體產生安眠作用。","detail":{"background":"「『suvorexant』(與lemborexant)」是『『食慾素(orexin / hypocretin)受體『拮抗劑』』』:『阻斷orexin維持清醒的作用→『促進入睡與維持睡眠』』,用於『失眠症』。tasimelteon(褪黑激素受體致效)、midazolam(BZD,作用GABAA)、buspirone(5-HT1A,抗焦慮)機制不同。故拮抗orexin受體安眠者為suvorexant。","options":{"A":"tasimelteon為褪黑激素受體致效劑。","B":"suvorexant拮抗orexin受體安眠—正解。","C":"midazolam作用GABAA(BZD)。","D":"buspirone為5-HT1A抗焦慮藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-56":{"quick":"neostigmine過量(膽鹼能增強)會縮瞳,不會散瞳。","detail":{"background":"「neostigmine」是『膽鹼酯酶抑制劑』,過量造成『乙醯膽鹼堆積、副交感(蕈毒鹼)過度興奮』:出現『腹瀉、流汗、流涎、流淚、『縮瞳(miosis)』、支氣管收縮、心搏過緩、『排尿增加』』等(膽鹼性危象)。其中「『散瞳(瞳孔放大)』」是『『抗膽鹼(如atropine)』的作用』,『與neostigmine相反(neostigmine致『縮瞳』)』。故不會產生的是散瞳。","options":{"A":"過量致腹瀉(腸蠕動增加)。","B":"過量致流汗。","C":"膽鹼能增強致縮瞳、不會散瞳—正解。","D":"過量致排尿增加。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-57":{"quick":"propranolol(β阻斷劑)不是治療氣喘的藥物(反而禁用)。","detail":{"background":"治療氣喘的藥物包括:①「cromolyn」(肥大細胞穩定劑);②「zileuton」(5-脂氧化酶抑制,抗白三烯);③「beclomethasone」(吸入型皮質類固醇)。而「『propranolol』是『非選擇性β阻斷劑』,『會『阻斷β2受體→支氣管『收縮』』,『不僅不治氣喘,反而『誘發氣喘發作(氣喘病人禁用)』』」。故不是氣喘藥者為propranolol。","options":{"A":"cromolyn為肥大細胞穩定劑(氣喘藥)。","B":"propranolol(β阻斷)致支氣管收縮、非氣喘藥—正解。","C":"zileuton為抗白三烯氣喘藥。","D":"beclomethasone為吸入型類固醇(氣喘藥)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-72":{"quick":"succinylcholine(去極化型)作用時間最短(被血漿膽鹼酯酶快速分解)。","detail":{"background":"神經肌肉阻斷劑的作用時間:「『succinylcholine』」是『『去極化型』阻斷劑』,『被『血漿(假性)膽鹼酯酶『快速水解』』,『作用時間『最短(數分鐘)』』(用於快速氣管插管)。cisatracurium、pancuronium、vecuronium為『非去極化型』,作用時間較長(中至長效)。故作用時間最短者為succinylcholine。","options":{"A":"succinylcholine作用時間最短(快速被分解)—正解。","B":"cisatracurium為中效非去極化型。","C":"pancuronium為長效非去極化型。","D":"vecuronium為中效非去極化型。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-73":{"quick":"venlafaxine(SNRI)抑制5-HT與NE再回收,較少抗膽鹼與α阻斷副作用。","detail":{"background":"抗憂鬱藥:「『venlafaxine』」是『『血清素-正腎上腺素再回收抑制劑(SNRI)』』,『抑制『serotonin與norepinephrine』的再回收』,『因『不顯著阻斷蕈毒鹼(M)與α受體』,故『較少『抗膽鹼(口乾、便秘)與α阻斷(姿勢性低血壓)』的副作用』(較TCA安全)』。amitriptyline(TCA,抗膽鹼/α阻斷副作用多)、fluoxetine(SSRI,只抑5-HT)、selegiline(MAO-B抑制)機制不同。故為venlafaxine。","options":{"A":"amitriptyline(TCA)抗膽鹼/α阻斷副作用多。","B":"venlafaxine(SNRI)抑5-HT/NE、副作用少—正解。","C":"fluoxetine(SSRI)只抑5-HT再回收。","D":"selegiline為MAO-B抑制劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-68":{"quick":"蕈毒鹼受體阻斷劑(抗膽鹼)不用於青光眼(反而升眼壓)。","detail":{"background":"蕈毒鹼受體阻斷劑(抗膽鹼劑,如atropine)的臨床用途:①「動暈症(scopolamine)」;②「『支氣管擴張(ipratropium治COPD/氣喘)』」;③「帕金森氏症(benztropine等,改善震顫)」;④散瞳檢查、解痙、抗膽鹼酯酶中毒解毒。而「『青光眼』」是『抗膽鹼劑的『禁忌(會『散瞳、阻塞房水流出、『升高眼壓』、誘發隅角閉鎖』)』』,『非其用途』。故不是用途者為青光眼。","options":{"A":"青光眼為抗膽鹼劑禁忌(會升眼壓)、非用途—正解。","B":"動暈症為抗膽鹼劑用途。","C":"支氣管擴張為抗膽鹼劑用途。","D":"帕金森氏症為抗膽鹼劑用途。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-72":{"quick":"dantrolene為治療succinylcholine引起惡性高溫的最適當藥物。","detail":{"background":"「『惡性高溫(malignant hyperthermia)』」是『使用『succinylcholine(去極化肌鬆劑)或揮發性麻醉劑』時,『骨骼肌『ryanodine受體』異常,致『肌漿網『大量釋放鈣』、肌肉持續收縮、高熱、僵直、代謝亢進』』的危急狀況。『首選解藥是『dantrolene』——『抑制肌漿網ryanodine受體的鈣釋放、使肌肉鬆弛』』。baclofen(GABAB)、rocuronium(肌鬆)、diazepam(BZD)非首選。故為dantrolene。","options":{"A":"dantrolene抑制肌漿網鈣釋放、治惡性高溫—正解。","B":"baclofen為GABAB致效肌鬆劑。","C":"rocuronium為非去極化肌鬆劑。","D":"diazepam為苯二氮平。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-58":{"quick":"活化M2蕈毒鹼受體(Gi偶聯)會抑制adenylyl cyclase。","detail":{"background":"受體與G蛋白:①「『M2蕈毒鹼受體』」偶聯『Gi蛋白』,活化後『『抑制adenylyl cyclase→cAMP↓』』(並開啟鉀通道,使心跳變慢);②「M3」偶聯Gq(經PLC、IP3/DAG);③「β1、β3腎上腺素受體」偶聯Gs(『『活化』adenylyl cyclase→cAMP↑』)。本題『活化後『抑制』adenylyl cyclase』者為『M2(Gi)』。故為M2。","options":{"A":"M2(Gi)活化抑制adenylyl cyclase—正解。","B":"M3(Gq)經PLC路徑。","C":"β1(Gs)活化adenylyl cyclase。","D":"β3(Gs)活化adenylyl cyclase。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-67":{"quick":"cevimeline為直接型蕈毒鹼致效劑,治療Sjögren或放療引起的口乾症。","detail":{"background":"「『cevimeline』(與pilocarpine)」是『『直接作用型『蕈毒鹼(M)受體致效劑』』』,『刺激『唾液腺、淚腺『分泌』』』,用於『『薛格連氏症候群(Sjögren)』或頭頸部『放射治療後的口乾症(xerostomia)』』。atropine(抗膽鹼,致口乾)、neostigmine(間接型膽鹼酯酶抑制)、succinylcholine(肌鬆)非直接型M致效劑。故為cevimeline。","options":{"A":"atropine為抗膽鹼劑(致口乾)。","B":"cevimeline為直接M致效劑、治口乾症—正解。","C":"neostigmine為間接型(膽鹼酯酶抑制)。","D":"succinylcholine為去極化肌鬆劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-64":{"quick":"flutamide(抗雄激素)適合用於治療攝護腺腫瘤(轉移性攝護腺癌)。","detail":{"background":"本題『攝護腺腫大、PSA上升、淋巴結腫大與蝕骨性病變→『轉移性攝護腺癌』』。攝護腺癌為『雄激素依賴』,治療以『去雄激素(androgen deprivation)』為主:「『flutamide』是『『雄激素受體拮抗劑(抗雄激素)』』,『阻斷睪固酮/DHT對攝護腺癌的作用』」(常與GnRH類似物併用)。oxandrolone(雄激素)、desogestrel(黃體素避孕)、anastrozole(芳香化酶抑制,治乳癌)不適用。故為flutamide。","options":{"A":"oxandrolone為合成雄激素(反促進)。","B":"desogestrel為避孕黃體素。","C":"anastrozole為芳香化酶抑制劑(治乳癌)。","D":"flutamide為抗雄激素、治攝護腺癌—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-65":{"quick":"betaxolol(β阻斷劑)適於治療隅角開放型青光眼。","detail":{"background":"隅角開放型青光眼的降眼壓藥:「『betaxolol』(與timolol)」是『『β腎上腺素受體『阻斷劑』』』,『『減少『房水生成』』而降眼壓』(betaxolol為β1選擇性,對氣喘較安全)。atropine、tropicamide(抗膽鹼,散瞳『升』眼壓、禁用)、phentolamine(α阻斷)不適用。故為betaxolol。","options":{"A":"atropine(抗膽鹼)散瞳升眼壓、禁用。","B":"betaxolol(β阻斷)減房水生成降眼壓—正解。","C":"phentolamine為α阻斷劑。","D":"tropicamide(抗膽鹼)散瞳、不降眼壓。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-68":{"quick":"oxybutynin為M3蕈毒鹼受體拮抗劑,治療膀胱過動症。","detail":{"background":"「膀胱過動症(overactive bladder)」可用『『抗蕈毒鹼(M3拮抗)藥』』『鬆弛逼尿肌、減少不自主收縮』:「『oxybutynin』(與tolterodine、darifenacin、solifenacin)」即此類。pirenzepine(M1選擇,治潰瘍)、trihexyphenidyl(中樞抗膽鹼,治帕金森)、ipratropium(吸入治COPD)用途不同。故治膀胱過動的M3拮抗劑為oxybutynin。","options":{"A":"pirenzepine為M1選擇性(治胃潰瘍)。","B":"trihexyphenidyl為中樞抗膽鹼(治帕金森)。","C":"ipratropium為吸入抗膽鹼(治COPD)。","D":"oxybutynin為M3拮抗、治膀胱過動症—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-72":{"quick":"olanzapine對D2受體親和力較低,故較少造成錐體外症候群。","detail":{"background":"非典型抗精神病藥「olanzapine」相較典型藥「haloperidol」『較少『錐體外症候群(EPS)』』的原因:①「『對『D2多巴胺受體』的『阻斷作用(親和力)『較低』』』,『對黑質紋狀體D2阻斷較少→EPS較少』」;②同時阻斷『5-HT2A』(進一步減少EPS)。故原因是『與D2受體親和力較低』(C)。","options":{"A":"非因活化α受體。","B":"非抑制突觸前多巴胺釋放。","C":"對D2受體親和力較低、故較少EPS—正解。","D":"非對D1親和力較高。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-71":{"quick":"bimatoprost(前列腺素類似物)的降眼壓效果最明顯。","detail":{"background":"青光眼降眼壓藥中,「『前列腺素類似物(prostaglandin analogs,如『bimatoprost、latanoprost、travoprost』)』」『增加房水經『葡萄膜鞏膜路徑(uveoscleral)』流出』,『降眼壓效果『最強』,為第一線』(每日一次)。selexipag、iloprost、alprostadil為前列環素類(治肺高壓/血管),非降眼壓主力。故降眼壓最明顯者為bimatoprost。","options":{"A":"selexipag為前列環素受體致效(治肺高壓)。","B":"iloprost為前列環素(治肺高壓)。","C":"alprostadil為PGE1(治勃起障礙/PDA)。","D":"bimatoprost(前列腺素)降眼壓最明顯—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-57":{"quick":"fenofibrate活化(非抑制)lipoprotein lipase,故D錯誤。","detail":{"background":"fenofibrate(fibrate類降血脂藥):①「『活化『PPAR-α』受體』」(B正確),進而②「『增加肝臟脂肪酸氧化』」(A正確)、③「『『活化』脂蛋白脂解酶(lipoprotein lipase, LPL)』→『加速三酸甘油酯(VLDL)清除』」——故D「『『抑制』LPL活性』」錯誤(應為活化);④「主要副作用為『肌肉病變(尤與statin併用)與肝功能異常』」(C正確)。fibrate主要降三酸甘油酯。故D錯誤。","options":{"A":"活化肝臟脂肪酸氧化,正確。","B":"活化PPAR-α受體,正確。","C":"副作用為肌肉病變及肝功能異常,正確。","D":"fenofibrate活化(非抑制)LPL—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-63":{"quick":"fenoldopam為D1多巴胺受體致效劑,可作為降血壓藥。","detail":{"background":"「『fenoldopam』」是『『選擇性D1多巴胺受體『致效劑』』』:『活化D1受體→『周邊血管(尤其腎、內臟)『擴張』』、『降血壓並增加腎血流與利鈉』』,『靜脈用於『高血壓急症』』。clonidine(α2致效)、diazoxide(鉀通道開放)、ketanserin(5-HT2拮抗)機制不同。故D1致效降血壓者為fenoldopam。","options":{"A":"clonidine為中樞α2致效劑。","B":"diazoxide為鉀通道開放劑。","C":"fenoldopam為D1致效劑、降血壓—正解。","D":"ketanserin為5-HT2拮抗劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-65":{"quick":"α1受體不致膀胱逼尿肌收縮(逼尿肌收縮由M3);α1致膀胱頸/三角收縮利儲尿,故A錯誤。","detail":{"background":"活化α1腎上腺素受體的反應:①「血管(皮膚、內臟、骨骼肌)『收縮』→升血壓」(C正確);②「豎毛肌收縮(起雞皮疙瘩)」(B正確);③「瞳孔放大(散瞳)、膀胱『頸/三角『收縮』(利儲尿,排尿時須鬆弛)』、攝護腺平滑肌收縮」;④心肌收縮力增強主要由β1(本題D敘述為干擾項)。而「『膀胱『逼尿肌(detrusor)』的『收縮』是由『副交感M3』媒介,『非α1』(α1反而在膀胱頸收縮『抑制排尿』)』」——故A「α1致逼尿肌收縮」錯誤。故A錯誤。","options":{"A":"逼尿肌收縮由M3、非α1(α1致膀胱頸收縮)—錯誤(正解)。","B":"豎毛肌收縮由α1,正確。","C":"血管收縮由α1,正確。","D":"(本題以A為錯誤選項)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-70":{"quick":"latanoprost(前列腺素類似物)最適合治療隅角開放性青光眼。","detail":{"background":"「『latanoprost』」是『『前列腺素F2α類似物』』:『增加房水經『葡萄膜鞏膜路徑』流出→降眼壓』,『為『隅角開放性青光眼』的『第一線』用藥(每日一次,副作用虹膜色素沉著、睫毛增長)』。alprostadil(PGE1,勃起/PDA)、misoprostol(PGE1,胃潰瘍/墮胎)、dinoprostone(PGE2,引產)用途不同。故為latanoprost。","options":{"A":"alprostadil為PGE1(治勃起障礙)。","B":"latanoprost(前列腺素)治隅角開放青光眼—正解。","C":"misoprostol為PGE1(治胃潰瘍/墮胎)。","D":"dinoprostone為PGE2(引產)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-66":{"quick":"labetalol兼具α與β阻斷,具最明顯的α受體阻斷作用。","detail":{"background":"交感受體拮抗劑中,「『labetalol』(與carvedilol)」是『『α與β受體『雙重』阻斷劑』』,『具『明顯的α1受體阻斷作用(血管擴張)』』(用於高血壓、妊娠高血壓)。atenolol(β1選擇)、propranolol(非選擇性β)、pindolol(β阻斷+部分致效)『皆無顯著α阻斷』。故α阻斷最明顯者為labetalol。","options":{"A":"atenolol為β1選擇性阻斷(無α阻斷)。","B":"labetalol兼具α與β阻斷、α阻斷明顯—正解。","C":"propranolol為非選擇性β阻斷(無α阻斷)。","D":"pindolol為β阻斷+部分致效(無α阻斷)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-67":{"quick":"physostigmine為三級胺、易過血腦屏障,不適合治重症肌無力。","detail":{"background":"治療重症肌無力(MG)的膽鹼酯酶抑制劑應為『『四級銨(極性高、『不過血腦屏障』)』』以避免中樞副作用:「『pyridostigmine、neostigmine、ambenonium』」皆為四級銨、適用。而「『physostigmine』是『『三級胺』,『脂溶性高、『易通過血腦屏障』』,『有中樞副作用』,『不適合用於MG』(主要用於抗膽鹼藥中毒、青光眼)』」。故不適合治MG者為physostigmine。","options":{"A":"pyridostigmine(四級銨)適合治MG。","B":"physostigmine(三級胺)過BBB、不適合治MG—正解。","C":"neostigmine(四級銨)適合治MG。","D":"ambenonium(四級銨)適合治MG。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-69":{"quick":"tiotropium為長效型蕈毒鹼受體拮抗劑,用於COPD支氣管擴張。","detail":{"background":"COPD用的『蕈毒鹼受體拮抗劑(抗膽鹼支氣管擴張劑)』:「『tiotropium』」是『『長效型(LAMA,每日一次)』』;「ipratropium」為『短效型(SAMA)』。atropine(全身性抗膽鹼,不作吸入維持)、formoterol(『β2致效劑LABA』,非抗膽鹼)機制不同。故長效型M拮抗劑為tiotropium。","options":{"A":"atropine為全身性抗膽鹼、非吸入維持用。","B":"ipratropium為短效型抗膽鹼。","C":"tiotropium為長效型M拮抗劑(COPD)—正解。","D":"formoterol為長效β2致效劑(非抗膽鹼)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-65":{"quick":"midodrine為前驅藥,水解後成選擇性α1致效劑(desglymidodrine)。","detail":{"background":"「『midodrine』」是『『前驅藥(prodrug)』』:『在體內經酵素水解成活性代謝物『desglymidodrine』,為『選擇性α1腎上腺素受體致效劑』』,『收縮血管、升血壓』,用於『姿勢性(自律神經失調)低血壓』。oxymetazoline(直接α致效鼻充血劑)、ephedrine(間接擬交感)、ritodrine(β2致效安胎)非前驅藥型α1致效劑。故為midodrine。","options":{"A":"oxymetazoline為直接α致效鼻充血劑(非前驅藥)。","B":"ephedrine為間接擬交感藥。","C":"midodrine為前驅藥→選擇性α1致效劑—正解。","D":"ritodrine為β2致效安胎藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-66":{"quick":"darifenacin對M3選擇性最高、半衰期長,一天一次治成人尿失禁。","detail":{"background":"「膀胱過動/急迫性尿失禁」的抗膽鹼藥中,「『darifenacin』」對『『M3受體選擇性最高』』(膀胱逼尿肌主要為M3),且『半衰期較長、『每日一次』』,『因M3選擇性高,較少『M1(認知)』副作用』。tolterodine、oxybutynin、trospium選擇性或半衰期不及。故M3選擇性最高、一天一次者為darifenacin。","options":{"A":"darifenacin對M3選擇性最高、一天一次—正解。","B":"tolterodine選擇性不及darifenacin。","C":"oxybutynin非M3最選擇(抗膽鹼副作用多)。","D":"trospium為四級銨(不過BBB)但非M3最選擇。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-72":{"quick":"clozapine對D2受體阻斷作用較低,故較不引起錐體外症候群。","detail":{"background":"非典型抗精神病藥「clozapine」相較典型藥「haloperidol」『較少『錐體外症候群(EPS)』』的原因是:『對『D2多巴胺受體』的『阻斷作用『較低(親和力低、解離快)』』』,『對黑質紋狀體D2阻斷少→EPS少』(並阻斷5-HT2A)。故原因為『對D2阻斷較低』(A)。(clozapine另有顆粒球缺乏的嚴重副作用須監測。)","options":{"A":"對D2受體阻斷較低、故較少EPS—正解。","B":"抗蕈毒鹼作用強非EPS少的主因。","C":"α阻斷強非EPS少的主因。","D":"(clozapine抗膽鹼作用其實較強,非低)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-73":{"quick":"trazodone為5-HT2受體拮抗劑,兼具抗憂鬱與安眠作用,B正確。","detail":{"background":"抗憂鬱藥:①「『amitriptyline』(TCA)『抗膽鹼(口乾、便秘)、α阻斷副作用『多』,『不適合老年人』」(故A錯誤);②「『trazodone』為『5-HT2受體『拮抗劑』』,『除抗憂鬱外『具『鎮靜/安眠』作用』(低劑量常用於失眠)』」(B正確);③「『mirtazapine』為『突觸前α2受體『拮抗劑』』(『阻斷』α2自體受體→『增加』NE與5-HT釋放)」(故C「α2『作用劑』」錯誤);④「『venlafaxine』為『SNRI』(『非MAO-B抑制劑』)」(故D錯誤)。故B正確。","options":{"A":"amitriptyline抗膽鹼/α阻斷副作用多、不適老人—錯誤。","B":"trazodone為5-HT2拮抗、兼抗憂鬱與安眠—正解。","C":"mirtazapine為α2拮抗劑(非作用劑)—錯誤。","D":"venlafaxine為SNRI(非MAO-B抑制)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-62":{"quick":"methyldopa在中樞轉換成α-methylnorepinephrine,適合腎功能不全的高血壓患者。","detail":{"background":"「『methyldopa』」是『中樞作用降壓藥』:『在腦內被代謝轉換成『α-甲基正腎上腺素(α-methylnorepinephrine)』』,『活化『中樞α2受體』→『減少交感外流→降血壓』』;『因『不依賴腎臟代謝、較安全』,適用於『腎功能不全』與『『妊娠高血壓(孕婦首選之一)』』』。clonidine(α2致效)、captopril(ACEI)、minoxidil(鉀通道開放)機制不同。故為methyldopa。","options":{"A":"clonidine直接活化中樞α2(非經轉換)。","B":"captopril為ACE抑制劑。","C":"methyldopa中樞轉換成α-methylNE、適腎功能不全—正解。","D":"minoxidil為鉀通道開放血管擴張劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-65":{"quick":"atropine點眼無法降眼壓(反而散瞳升眼壓),其餘三者可降眼壓。","detail":{"background":"降眼壓(治隅角開放青光眼)的點眼藥:①「latanoprost(前列腺素,增房水流出)」;②「apraclonidine(α2致效,減房水生成)」;③「timolol(β阻斷,減房水生成)」。而「『atropine(抗膽鹼)』點眼會『散瞳、麻痺睫狀肌』,『『不降眼壓』,反而『升高眼壓』(尤誘發隅角閉鎖)』,『對隅角開放青光眼無改善』」。故無法降眼壓者為atropine。","options":{"A":"latanoprost增房水流出降眼壓。","B":"apraclonidine減房水生成降眼壓。","C":"timolol減房水生成降眼壓。","D":"atropine散瞳升眼壓、不降眼壓—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-66":{"quick":"肉毒桿菌毒素抑制突觸囊泡釋放乙醯膽鹼,使肌肉鬆弛。","detail":{"background":"「『肉毒桿菌毒素(botulinum toxin)』」局部注射的機轉是『『裂解突觸前神經末梢的『SNARE蛋白(如SNAP-25)』』,『『抑制『突觸囊泡『釋放乙醯膽鹼』』』』,『使『神經肌肉接合處『傳遞受阻、肌肉鬆弛(暫時性麻痺)』』』——用於『除皺(鬆弛表情肌)、肌張力障礙、痙攣、多汗症』等。並非作用於鈉通道或菸鹼受體。故機制為抑制乙醯膽鹼釋放。","options":{"A":"非抑制運動神經鈉通道。","B":"非抑制骨骼肌鈉通道。","C":"非阻斷菸鹼受體(本身不結合受體)。","D":"抑制突觸囊泡釋放乙醯膽鹼—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-66":{"quick":"varenicline是菸鹼性α4β2受體部分致效劑(非蕈毒鹼受體拮抗劑),故A錯誤。","detail":{"background":"戒菸藥「varenicline」:①『機轉是『『菸鹼性『α4β2乙醯膽鹼受體『部分致效劑』』』』(『部分活化以緩解戒斷、又阻斷尼古丁的獎賞』),『『而非『蕈毒鹼(M)受體拮抗劑』』』——故A錯誤;②「主要用於『協助戒菸』」(B正確);③「副作用可能有『焦慮、憂鬱、異常夢境』等」(C正確);④「戒菸效用『優於bupropion』」(D正確)。故A錯誤。","options":{"A":"varenicline為菸鹼α4β2部分致效劑、非蕈毒鹼拮抗—錯誤(正解)。","B":"主要用於協助戒菸,正確。","C":"副作用可能引起焦慮憂鬱,正確。","D":"戒菸效用優於bupropion,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-72":{"quick":"fluoxetine(SSRI)的抗憂鬱機制與serotonin(血清素)最相關。","detail":{"background":"「『fluoxetine』」是『『選擇性血清素再回收抑制劑(SSRI)』』,『抑制突觸前『血清素(serotonin, 5-HT)』的『再回收』』,『提高突觸間隙的『血清素』濃度』而抗憂鬱。故與其作用機制最相關的神經傳遞物質為『serotonin』。","options":{"A":"norepinephrine與SNRI/TCA較相關。","B":"serotonin與fluoxetine(SSRI)機制最相關—正解。","C":"glutamate與ketamine等相關。","D":"acetylcholine非SSRI機制。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-64":{"quick":"nifedipine(雙氫吡啶類CCB)最易引起反射性心搏過速。","detail":{"background":"降血壓藥中,「『nifedipine』(『雙氫吡啶類(dihydropyridine)鈣離子阻斷劑』)」『強力擴張『周邊小動脈』→『血壓快速下降』→『反射性『交感興奮』,引起『反射性心搏過速(reflex tachycardia)』』(尤其短效型)。carvedilol(αβ阻斷,降心率)、diltiazem/(verapamil)(非雙氫吡啶CCB,抑制心臟傳導、降心率)、propranolol(β阻斷,降心率)反而『減慢』心率。故最易反射性心搏過速者為nifedipine。","options":{"A":"carvedilol(β阻斷)降心率。","B":"diltiazem抑制心臟傳導、降心率。","C":"nifedipine(雙氫吡啶CCB)最易反射性心搏過速—正解。","D":"propranolol(β阻斷)降心率。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-65":{"quick":"atropine(抗膽鹼)過量最不會出現唾液大量分泌(反而口乾)。","detail":{"background":"「atropine(蕈毒鹼受體阻斷劑)」過量造成『抗膽鹼(副交感被抑制)』症候群:『『心跳加快(阻斷M2)』、『瞳孔放大(散瞳)、視力模糊』、『尿液滯留(膀胱鬆弛)』、『腸蠕動減少(便秘)』、『皮膚乾熱、發燒』、『『口乾(唾液『減少』)』』。其中「『唾液『大量分泌』』」是『膽鹼能(副交感)興奮的表現,『與atropine相反(atropine致『口乾』)』」,故最不會出現。故為唾液大量分泌。","options":{"A":"過量致心跳加快(阻斷M2)。","B":"抗膽鹼致口乾、不會唾液大量分泌—正解。","C":"過量致瞳孔放大(散瞳)。","D":"過量致尿液滯留。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-66":{"quick":"靜脈輸注dopamine最不會經D2受體加快腸蠕動(dopamine反而抑制腸蠕動)。","detail":{"background":"dopamine靜脈輸注依劑量作用不同受體:①「低劑量『活化『D1受體』』→『腎、內臟血管擴張、『利鈉(natriuresis)』』」(A正確);②「中劑量『活化『β1受體』』→『加快心跳、增加心收縮力』」(C正確);③「高劑量『活化『α1受體』』→『血管收縮、升血壓』」(D正確);④「『D2受體』在腸道/CTZ的活化是『『抑制』腸蠕動(並致噁心)』,『『不會『加快』腸蠕動』』」——故B「活化D2加快腸蠕動」錯誤(最不會)。故為B。","options":{"A":"低劑量活化D1利鈉,正確。","B":"D2不會加快腸蠕動(反抑制)—錯誤(正解,最不會)。","C":"活化β1加快心跳,正確。","D":"活化α1升血壓,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-73":{"quick":"SSRI/SNRI/TCA/單環抗憂鬱依序為citalopram、duloxetine、imipramine、bupropion。","detail":{"background":"抗憂鬱藥分類:①「『SSRI(選擇性血清素再回收抑制)』——『citalopram』」(及fluoxetine、sertraline);②「『SNRI(血清素-正腎上腺素再回收抑制)』——『duloxetine』」(及venlafaxine);③「『TCA(三環抗憂鬱)』——『imipramine』」(及amitriptyline);④「『單環(unicyclic / 非典型)』——『bupropion』」(NDRI,單環amino-ketone結構)。故依序為citalopram、duloxetine、imipramine、bupropion(A)。","options":{"A":"citalopram(SSRI)、duloxetine(SNRI)、imipramine(TCA)、bupropion(單環)—正解。","B":"順序錯誤。","C":"順序錯誤。","D":"順序錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-65":{"quick":"pralidoxime為四級銨、中樞穿透力較差,「中樞穿透力較diacetylmonoxime強」最不適當。","detail":{"background":"有機磷中毒解毒劑「pralidoxime(2-PAM)」:①「『使被有機磷『磷酸化的乙醯膽鹼酯酶『恢復活性(重活化)』』(須在『老化(aging)』前使用)」(A正確);②「『不可作為『carbamate(胺基甲酸鹽)』類膽鹼酯酶抑制劑的解毒劑』(carbamate結合可逆、pralidoxime反而可能加重)」(B正確);③「『pralidoxime是『四級銨』,『不易通過血腦屏障』,『中樞穿透力『較『diacetylmonoxime(DAM)』『差』』』」——故C「『中樞穿透力較DAM『強』』」最不適當(應較差);④「過量本身可能致『肌肉無力』」(D正確)。故C最不適當。","options":{"A":"使磷酸化的AChE恢復活性,正確。","B":"不可作carbamate解毒劑,正確。","C":"pralidoxime(四級銨)中樞穿透力較DAM差、非較強—錯誤(正解)。","D":"過量可能導致肌肉無力,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-65":{"quick":"neostigmine會加重心搏過緩,最不適合用於心搏過緩。","detail":{"background":"「neostigmine(膽鹼酯酶抑制劑)」增強膽鹼能作用,適用於:①「重症肌無力(增強神經肌肉傳遞)」;②「術後『癱瘓性腸阻塞(paralytic ileus)』(促腸蠕動)」;③「術後『尿液滯留』(促膀胱收縮)」;④逆轉非去極化肌鬆。而「『心搏過緩(bradycardia)』」是『膽鹼能(迷走)興奮會『『進一步減慢心率』』,『neostigmine會『加重』心搏過緩』,『不適合(反而禁忌)』」。故最不適合者為心搏過緩。","options":{"A":"重症肌無力為neostigmine用途。","B":"術後腸阻塞為neostigmine用途。","C":"心搏過緩會被neostigmine加重、最不適合—正解。","D":"術後尿滯留為neostigmine用途。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_115020-65":{"quick":"ipratropium(抗膽鹼)不用於青光眼(抗膽鹼反升眼壓),故D最不適當。","detail":{"background":"ipratropium:①「為『蕈毒鹼(M)膽鹼受體『拮抗劑』』」(A正確);②「『最常用『吸入劑型與霧化劑型』』」(B正確);③「『常用於COPD(及氣喘),『支氣管擴張』』」(C正確);④「『『青光眼』『不』使用ipratropium——『抗膽鹼藥反而『散瞳、阻礙房水流出、升眼壓』,『禁用於隅角閉鎖青光眼』』』」——故D「用於青光眼幫助房水排出」最不適當。故D最不適當。","options":{"A":"為蕈毒鹼受體拮抗劑,正確。","B":"最常用吸入與霧化劑型,正確。","C":"用於COPD支氣管擴張,正確。","D":"抗膽鹼不用於青光眼(反升眼壓)—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-53":{"quick":"perchlorate的主要機轉是阻斷甲狀腺攝取碘離子。","detail":{"background":"抗甲狀腺機能亢進藥的不同機轉:①「『過氯酸鹽(perchlorate)、硫氰酸鹽(thiocyanate)』」——『競爭性『阻斷甲狀腺『鈉碘共同轉運體(NIS)對碘的攝取(uptake)』』』;②「『硫醯胺類(thioamides,PTU/methimazole)』」——抑制甲狀腺過氧化酶、碘的有機化與偶合;③「PTU另抑制周邊T4脫碘成T3」;④「碘(Lugol)」——抑制甲狀腺素釋放。本題perchlorate機轉為『阻斷甲狀腺攝取碘』。","options":{"A":"perchlorate阻斷甲狀腺攝取碘離子—正解。","B":"抑制過氧化酶為thioamides機制。","C":"抑制周邊脫碘為PTU部分機制。","D":"抑制有機化/減少釋放為thioamides/碘機制。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_106100-68":{"quick":"cholecalciferol(維生素D3)常加入鈣劑與牛奶,預防佝僂症/骨軟化症。","detail":{"background":"「『cholecalciferol(維生素D3)』」(或ergocalciferol D2)是『維生素D的『營養補充型』』,常『添加於『鈣補充劑與牛奶』中』,『促進腸道鈣磷吸收、骨礦化』,『預防『兒童『佝僂症(rickets)』與成人『骨軟化症(osteomalacia)』』』。calcitriol(活性型1,25-D,用於腎病/低鈣)、gallium nitrate(降高血鈣)、sevelamer(磷結合劑,治高血磷)用途不同。故為cholecalciferol。","options":{"A":"calcitriol為活性維生素D(治療用,非營養添加)。","B":"cholecalciferol(維生素D3)預防佝僂/骨軟化—正解。","C":"gallium nitrate用於降高血鈣。","D":"sevelamer為磷結合劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-52":{"quick":"糖皮質激素抑制(非促進)成骨細胞,故B錯誤。","detail":{"background":"糖皮質激素(glucocorticoids)的副作用:①「『干擾鈣代謝(減少腸鈣吸收、增加尿鈣)』並『『抑制『成骨細胞(osteoblast)』、促進骨吸收』』→『骨質疏鬆』」——故B「『『促進』成骨細胞形成及活性』」錯誤(應為抑制);A(干擾鈣致骨鬆)正確;②「增加胃酸/減少黏膜保護→『消化性潰瘍』」(C正確);③「『長期使用『抑制生長激素分泌』→兒童生長遲緩」(D正確)。故B錯誤。","options":{"A":"干擾鈣代謝致骨質疏鬆,正確。","B":"糖皮質激素抑制(非促進)成骨細胞—錯誤(正解)。","C":"增加消化性潰瘍風險,正確。","D":"長期使用抑制生長激素分泌,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-53":{"quick":"停經婦女補充雌激素會增加子宮內膜癌風險(無黃體素拮抗時),B正確。","detail":{"background":"雌激素用於停經婦女補充治療:①「『改善『骨質疏鬆』(非惡化)』」(故A錯誤);②「『單獨使用雌激素(無黃體素)會『刺激『子宮內膜增生』,『增加『子宮內膜癌』風險』』(故有子宮者須併用黃體素)』」(B正確);③「『『緩解(減少)『熱潮紅』』(非誘發)』」(故C錯誤);④「『『降低LDL、升高HDL』(改善血脂)』」(故D「增LDL減HDL」錯誤)。故B正確。","options":{"A":"雌激素改善骨質疏鬆、非惡化—錯誤。","B":"單用雌激素增加子宮內膜癌風險—正解。","C":"雌激素緩解熱潮紅、非誘發—錯誤。","D":"雌激素降LDL升HDL(非相反)—錯誤。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-54":{"quick":"acarbose抑制腸道α-葡萄糖苷酶,減慢碳水化合物消化吸收。","detail":{"background":"「『acarbose』(與miglitol)」是『『α-葡萄糖苷酶(α-glucosidase)『抑制劑』』』:『抑制小腸刷狀緣的α-葡萄糖苷酶,『延緩『碳水化合物(雙醣/寡醣)的消化與葡萄糖吸收』』,『降低『餐後血糖』高峰』(副作用為脹氣、腹瀉)』。並非減少胰島素代謝、非促胰島素分泌、非增肝醣合成。故機轉為抑制α-葡萄糖苷酶。","options":{"A":"非減少胰島素被肝代謝。","B":"抑制腸道α-葡萄糖苷酶、減慢醣吸收—正解。","C":"促胰島素分泌為sulfonylurea機制。","D":"非增加肝醣合成。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_107100-56":{"quick":"mifepristone(RU-486,抗黃體素)可作為早期墮胎藥。","detail":{"background":"「『mifepristone(RU-486)』」是『『黃體素(progesterone)受體『拮抗劑』』』:『拮抗維持懷孕所需的黃體素作用→『子宮內膜剝離、子宮收縮』』,『與『前列腺素(misoprostol)』併用作為『早期(藥物)墮胎』』。alprostadil(PGE1)、treprostinil/iloprost(前列環素,治肺高壓)非墮胎藥。故早期墮胎藥為mifepristone。","options":{"A":"alprostadil為PGE1(勃起/PDA)。","B":"treprostinil為前列環素(治肺高壓)。","C":"mifepristone(抗黃體素)為早期墮胎藥—正解。","D":"iloprost為前列環素(治肺高壓)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108030-64":{"quick":"子宮內膜異位症可肌注medroxyprogesterone(黃體素)治療。","detail":{"background":"「子宮內膜異位症(endometriosis)」的藥物治療在『抑制卵巢雌激素、使異位內膜萎縮』:「『medroxyprogesterone(黃體素)』」(肌注或口服)『抑制下視丘-腦下垂體-卵巢軸、使內膜蛻膜化萎縮』,可緩解經痛(其他選擇:GnRH類似物、danazol、複方口服避孕藥)。flutamide(抗雄激素)、oxandrolone(雄激素)、raloxifene(SERM,治骨鬆)不適用。故為medroxyprogesterone。","options":{"A":"flutamide為抗雄激素(治攝護腺癌)。","B":"肌注medroxyprogesterone(黃體素)治子宮內膜異位—正解。","C":"oxandrolone為雄激素。","D":"raloxifene為SERM(治骨鬆)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-53":{"quick":"Sulfonylureas的主要機轉為促進胰島素分泌。","detail":{"background":"「『Sulfonylureas(磺醯尿素類,如glimepiride、glipizide、glyburide)』」的機轉是『『與胰島β細胞的『ATP敏感性鉀通道(SUR1)』結合、『關閉鉀通道→去極化→鈣內流→『促進胰島素『分泌』』』』(故需有功能的β細胞,用於第二型糖尿病;副作用低血糖、體重增加)。並非抑制胰島素代謝、非增加受體數、非增敏感性為主。故機轉為促進胰島素分泌。","options":{"A":"非抑制胰島素被肝代謝。","B":"非主要促生合成/敏感性。","C":"非增加胰島素受體數目。","D":"促進胰島素分泌(關閉β細胞鉀通道)—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_108100-63":{"quick":"prednisone(糖皮質激素)慢性使用最可能導致骨質疏鬆。","detail":{"background":"本題停經婦女多部位『低骨密度(骨質疏鬆)』,問『慢性使用何藥最可能致骨鬆』:「『prednisone(糖皮質激素)』」『長期使用會『抑制成骨細胞、增加骨吸收、減少腸鈣吸收、增加尿鈣』→『類固醇性骨質疏鬆』(常見的『藥物性骨鬆』原因)。lovastatin(降血脂)、metformin(降血糖)、propranolol(β阻斷)不致骨鬆。故為prednisone。","options":{"A":"lovastatin為statin、不致骨鬆。","B":"metformin為降血糖藥、不致骨鬆。","C":"propranolol為β阻斷、不致骨鬆。","D":"prednisone(糖皮質激素)致骨質疏鬆—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-52":{"quick":"danazol(弱雄激素)不具改善骨質疏鬆的效果。","detail":{"background":"改善骨質疏鬆的藥物:①「vitamin D(促鈣吸收)」;②「alendronate(雙磷酸鹽,抑骨吸收)」;③「raloxifene(SERM,雌激素樣保骨)」。而「『danazol』是『『弱雄激素(合成雄性素)』』,用於『子宮內膜異位、遺傳性血管水腫』,『『不具改善骨質疏鬆』的效果』」。故無骨鬆改善效果者為danazol。","options":{"A":"vitamin D改善骨質疏鬆。","B":"alendronate(雙磷酸鹽)改善骨質疏鬆。","C":"raloxifene(SERM)改善骨質疏鬆。","D":"danazol(弱雄激素)無骨鬆改善效果—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-53":{"quick":"calcitonin可用於治療佩吉特氏病(Paget’s disease)。","detail":{"background":"「佩吉特氏骨病(Paget’s disease of bone)」是骨重塑異常(過度骨吸收與紊亂骨形成)。治療以『抑制破骨細胞』為主:「『calcitonin(抑制破骨細胞)』」與『雙磷酸鹽(bisphosphonates)』可用於Paget氏病(緩解骨痛、降低骨代謝)。thyroxine(甲狀腺素)、exenatide(GLP-1降血糖)、rosiglitazone(TZD降血糖)不治Paget氏病。故為calcitonin。","options":{"A":"thyroxine為甲狀腺素補充。","B":"exenatide為GLP-1降血糖藥。","C":"calcitonin治佩吉特氏病(抑破骨細胞)—正解。","D":"rosiglitazone為降血糖藥。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-55":{"quick":"felodipine(鈣離子阻斷劑)經抑制鈣內流入平滑肌而舒張血管。","detail":{"background":"降血壓藥的血管擴張機轉:「『felodipine』(『雙氫吡啶類鈣離子阻斷劑』)」『阻斷血管平滑肌的『L型鈣離子通道』,『抑制『鈣內流』→平滑肌鬆弛、血管擴張、降血壓』。aliskiren(腎素抑制)、carvedilol(αβ阻斷)、doxazosin(α1阻斷)機制不同。故抑制鈣內流舒張血管者為felodipine。","options":{"A":"aliskiren為直接腎素抑制劑。","B":"carvedilol為αβ阻斷劑。","C":"doxazosin為α1阻斷劑。","D":"felodipine(CCB)抑鈣內流舒張血管—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-66":{"quick":"長期服用glucocorticoid最可能造成骨質疏鬆。","detail":{"background":"長期使用『糖皮質激素(glucocorticoid)』最常見且重要的副作用之一是「『骨質疏鬆(類固醇性骨鬆)』」(抑制成骨、增加骨吸收與尿鈣、減少腸鈣吸收),易致脆性骨折。其他副作用含庫欣樣外觀、高血糖、感染、消化性潰瘍、生長抑制等。『類紅斑性狼瘡(procainamide/hydralazine)、肝中毒、腎上腺『腫瘤』』非其典型副作用(長期外源類固醇反而致腎上腺『萎縮』)。故為骨質疏鬆。","options":{"A":"類紅斑性狼瘡為procainamide等所致。","B":"長期glucocorticoid致骨質疏鬆—正解。","C":"肝中毒非其典型副作用。","D":"致腎上腺萎縮(非腫瘤)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109020-67":{"quick":"生長激素受體基因突變(Laron矮小)應用mecasermin(IGF-1)改善。","detail":{"background":"本題『『生長激素『受體』基因突變』致矮小(Laron症候群)』:因『受體缺陷,『補充生長激素(somatropin)『無效』』』,應『直接補充『生長激素的下游介質『IGF-1(mecasermin)』』』。somatropin(GH,受體壞掉無效)、octreotide(抑GH,治肢端肥大)、atosiban(催產素拮抗安胎)不適用。故為mecasermin。","options":{"A":"somatropin(GH)因受體突變而無效。","B":"octreotide抑制GH(治肢端肥大)。","C":"atosiban為催產素拮抗劑(安胎)。","D":"mecasermin(IGF-1)治生長激素受體突變—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-59":{"quick":"clomiphene作用於雌激素受體,用於誘發卵巢排卵。","detail":{"background":"「『clomiphene(克羅米芬)』」是『『雌激素受體『拮抗劑/選擇性調節劑(SERM)』』』:『阻斷下視丘的雌激素負回饋→『增加GnRH→FSH/LH分泌→『刺激卵巢『排卵』』』,用於『不孕症『誘導排卵』』。progesterone(黃體素)、ketoconazole(抑類固醇合成)、tamoxifen(SERM,治乳癌)用途不同(tamoxifen亦作用ER但用於乳癌)。本題『誘發排卵』者為clomiphene。","options":{"A":"progesterone為黃體素。","B":"ketoconazole抑制類固醇合成。","C":"tamoxifen(SERM)主要治乳癌。","D":"clomiphene(作用ER)誘發排卵—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-60":{"quick":"高血鈣時不適合使用vitamin D3(會進一步升高血鈣)。","detail":{"background":"高血鈣(hypercalcemia)的處理是『降低血鈣』:可用「pamidronate(雙磷酸鹽,抑骨吸收)、calcitonin(抑破骨)、prednisolone(糖皮質激素,某些病因如肉芽腫/淋巴瘤)」與水化、利尿。而「『vitamin D3』會『『增加腸道鈣吸收』→『『升高』血鈣』』,『『高血鈣時『不適合』使用(會加重)』」。故不適合者為vitamin D3。","options":{"A":"pamidronate(雙磷酸鹽)降血鈣、可用。","B":"vitamin D3升血鈣、高血鈣不適合—正解。","C":"calcitonin降血鈣、可用。","D":"prednisolone可用於某些高血鈣病因。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_109100-61":{"quick":"glimepiride(sulfonylurea)主要刺激胰臟分泌更多胰島素。","detail":{"background":"「『glimepiride』(『磺醯尿素類sulfonylurea』)」的主要效果是『『刺激胰島β細胞『分泌『更多胰島素』』』(關閉ATP敏感鉀通道)。acarbose(α-葡萄糖苷酶抑制,減醣吸收)、metformin(減肝糖輸出、增敏感)、rosiglitazone(TZD,PPAR-γ增敏感)非以促泌胰島素為主。故刺激胰島素分泌者為glimepiride。","options":{"A":"acarbose抑制醣吸收。","B":"metformin減肝糖輸出/增敏感。","C":"glimepiride(磺醯尿素)刺激胰島素分泌—正解。","D":"rosiglitazone為胰島素增敏劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-60":{"quick":"甲狀腺機能亢進病人不適合使用levothyroxine(甲狀腺素,會加重)。","detail":{"background":"甲狀腺機能亢進(凸眼、心悸、手抖)的治療藥:①「propylthiouracil(PTU,抗甲狀腺合成)」;②「Lugol’s solution(碘,抑制甲狀腺素釋放、術前準備)」;③「propranolol(β阻斷,緩解心悸手抖)」。而「『levothyroxine』是『『甲狀腺素(T4)補充劑』』,用於甲狀腺『低下』,『『甲亢病人使用會『加重』病情(不適合)』』」。故不適合者為levothyroxine。","options":{"A":"propylthiouracil抗甲狀腺、適合甲亢。","B":"levothyroxine為甲狀腺素、甲亢不適合(會加重)—正解。","C":"Lugol’s solution抑甲狀腺素釋放、適合。","D":"propranolol緩解甲亢症狀、適合。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_110020-61":{"quick":"第一型糖尿病(胰島素絕對缺乏)較適合使用insulin。","detail":{"background":"「第一型糖尿病」是『胰島β細胞被破壞、『胰島素『絕對缺乏』』』,『必須以『『insulin(胰島素)』補充治療』』。dapagliflozin(SGLT2抑制)、sitagliptin(DPP-4抑制)、glipizide(磺醯尿素,『需有功能的β細胞』)主要用於『第二型』糖尿病(對第一型無效或不足)。故第一型糖尿病用insulin。","options":{"A":"dapagliflozin(SGLT2)主要用於第二型。","B":"sitagliptin(DPP-4)主要用於第二型。","C":"第一型糖尿病用insulin—正解。","D":"glipizide需有功能β細胞、用於第二型。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-60":{"quick":"甲狀腺機能低下病人不適合使用methimazole(抗甲狀腺藥)。","detail":{"background":"本題甲狀腺癌『術後『甲狀腺機能『低下(hypothyroidism)』』』:應補充『levothyroxine(甲狀腺素)』;上呼吸道感染可用『dextromethorphan(止咳)、acetaminophen(退燒)』。而「『methimazole』是『『抗甲狀腺藥(抑制甲狀腺素合成)』』,用於甲狀腺『亢進』,『甲狀腺『低下』者使用會『更加重低下(不適合)』』」。故不適合者為methimazole。","options":{"A":"levothyroxine補充甲狀腺素、適合低下。","B":"dextromethorphan止咳、可用。","C":"methimazole為抗甲狀腺藥、低下不適合(會加重)—正解。","D":"acetaminophen退燒、可用。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111020-62":{"quick":"RU-486(mifepristone)墮胎機轉是拮抗黃體素(progesterone)受體。","detail":{"background":"「RU-486(mifepristone)」用於墮胎的機轉是『『拮抗『黃體素(progesterone)受體』』』:『黃體素是『維持懷孕(維持子宮內膜、抑制子宮收縮)』所必需,『拮抗其作用→『子宮內膜剝離、子宮收縮、使受孕無法維持』』』(常與前列腺素misoprostol併用)。並非拮抗糖皮質激素受體(雖也有此作用但非墮胎主因)、非抑制雌激素、非PGI2拮抗。故機轉為拮抗黃體素。","options":{"A":"拮抗糖皮質激素受體非墮胎主機轉。","B":"非抑制雌激素分泌。","C":"非PGI2拮抗劑。","D":"拮抗黃體素受體、使受孕無法維持—正解。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-61":{"quick":"metformin與酒精併用易造成乳酸中毒。","detail":{"background":"「『metformin』」(雙胍類,第二型糖尿病第一線)『抑制肝糖質新生、增加組織對胰島素敏感』,『極少單獨致低血糖』;但其『會增加『乳酸生成/減少清除』』,『『與『酒精』併用(酒精抑制乳酸代謝)時,『易誘發『乳酸中毒(lactic acidosis)』』』(尤其腎/肝功能不良、缺氧者),故酗酒的糖尿病人應避免。故為乳酸中毒。","options":{"A":"metformin不致肥胖(反可能減重)。","B":"metformin與酒精併用易致乳酸中毒—正解。","C":"metformin單獨少致低血糖。","D":"非致高血壓。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-63":{"quick":"ranolazine抑制late sodium current,間接(非直接)抑制鈉鈣交換,故B錯誤。","detail":{"background":"抗心絞痛藥「ranolazine」:①「『抑制『晚期鈉電流(late sodium current)』』」(A正確);②「『因late Na⁺電流減少→『間接『減少『鈉鈣交換器(Na-Ca exchanger)逆向運作』造成的鈣超載』』』,『而『非『直接』抑制鈉鈣交換器』』」——故B「『『直接』抑制鈉鈣交換器』」錯誤;③「結果『降低細胞內鈣濃度』、改善心肌舒張與耗氧」(C正確);④「『可能『延長QT間期』(對無Long QT但有冠心病者)』」(D正確)。故B錯誤。","options":{"A":"抑制late sodium current,正確。","B":"間接(非直接)抑制鈉鈣交換—錯誤(正解)。","C":"降低細胞內鈣濃度,正確。","D":"可能延長QT間期,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_111100-70":{"quick":"misoprostol與mifepristone併用作為懷孕初期墮胎藥。","detail":{"background":"藥物流產:『『mifepristone(RU-486,抗黃體素)』『先』使內膜剝離,『再給『misoprostol(『PGE1類似物』,『使子宮收縮、排出妊娠物』)』』』——『二者『併用』為『懷孕初期『藥物墮胎』的標準組合』。treprostinil、epoprostenol(前列環素,治肺高壓)、latanoprost(前列腺素,降眼壓)非此用途。故與mifepristone併用墮胎者為misoprostol。","options":{"A":"treprostinil為前列環素(治肺高壓)。","B":"misoprostol(PGE1)與mifepristone併用墮胎—正解。","C":"epoprostenol為前列環素(治肺高壓)。","D":"latanoprost為前列腺素(降眼壓)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-60":{"quick":"raloxifene(SERM)作用於雌激素受體,治療停經後骨質疏鬆。","detail":{"background":"「『raloxifene』」是『『選擇性雌激素受體調節劑(SERM)』』:『在『骨骼』表現『雌激素『致效(保骨、抑骨吸收)』』,在『乳房/子宮』表現『拮抗』』,用於『『停經後婦女『骨質疏鬆』的『預防與治療』』(並降低侵襲性乳癌風險)』。omeprazole(PPI)、denosumab(抗RANKL單抗,雖治骨鬆但作用RANKL非ER)、prednisolone(糖皮質激素)非作用ER。故作用雌激素受體治骨鬆者為raloxifene。","options":{"A":"omeprazole為質子幫浦抑制劑。","B":"denosumab作用RANKL(非ER)。","C":"raloxifene(SERM)作用ER、治停經後骨鬆—正解。","D":"prednisolone為糖皮質激素(反致骨鬆)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112020-68":{"quick":"吸入類固醇控制不佳的氣喘,最適合併用長效β2致效劑formoterol預防發作。","detail":{"background":"氣喘『吸入型皮質類固醇(ICS)』控制不佳時,『『加上『長效β2致效劑(LABA,如『formoterol、salmeterol』)』』』(ICS+LABA合併吸入)是『預防發作的標準升階治療』。ephedrine(間接擬交感,非首選)、roflumilast(PDE4抑制,用於COPD)、zileuton(抗白三烯,效果不及LABA)非此情境首選。故併用formoterol。","options":{"A":"ephedrine為間接擬交感(非首選)。","B":"formoterol(LABA)併用ICS預防氣喘發作—正解。","C":"roflumilast(PDE4抑制)用於COPD。","D":"zileuton(抗白三烯)效果不及LABA。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-59":{"quick":"tamoxifen作用於雌激素受體,用於乳癌的輔助治療。","detail":{"background":"「『tamoxifen』」是『『選擇性雌激素受體調節劑(SERM)』』:『在『乳房組織』『拮抗雌激素受體』』,用於『『雌激素受體陽性(ER+)乳癌』的『輔助(adjuvant)與治療』』(在子宮表現致效,增子宮內膜癌風險)。progesterone(黃體素)、ketoconazole(抑類固醇合成)、danazol(弱雄激素)非作用ER治乳癌。故為tamoxifen。","options":{"A":"progesterone為黃體素。","B":"ketoconazole抑制類固醇合成。","C":"tamoxifen(作用ER)用於乳癌輔助治療—正解。","D":"danazol為弱雄激素。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-60":{"quick":"liraglutide(GLP-1類似物)必須以注射方式給予。","detail":{"background":"降血糖藥的給藥途徑:「『liraglutide』(『GLP-1受體致效劑』,胜肽類)」『口服會被消化分解,『必須『皮下注射』』』(每日一次;另有口服semaglutide為特例)。acarbose(口服)、saxagliptin(DPP-4抑制,口服)、rosiglitazone(TZD,口服)皆口服。故須注射者為liraglutide。","options":{"A":"acarbose為口服。","B":"saxagliptin(DPP-4)為口服。","C":"liraglutide(GLP-1胜肽)須注射—正解。","D":"rosiglitazone為口服。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_112100-70":{"quick":"dinoprostone(PGE2)最適合作為懷孕婦女的引產藥。","detail":{"background":"「『dinoprostone(PGE2,前列腺素E2)』」可『『軟化(成熟)子宮頸並引發子宮收縮』』,『臨床用於『足月妊娠『引產(induce labor)/促子宮頸成熟』』』(陰道塞劑/凝膠)。alprostadil(PGE1,勃起/維持PDA)、iloprost(前列環素,肺高壓)、latanoprost(前列腺素,降眼壓)非引產藥。故引產藥為dinoprostone。","options":{"A":"dinoprostone(PGE2)用於引產—正解。","B":"alprostadil(PGE1)用於勃起/維持PDA。","C":"iloprost為前列環素(治肺高壓)。","D":"latanoprost為前列腺素(降眼壓)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-59":{"quick":"碘-131哺乳婦女禁用(經乳汁放射),「可減量使用」錯誤。","detail":{"background":"放射性碘-131(¹³¹I)治療甲狀腺毒症:①「『釋放『β射線』,『破壞甲狀腺組織』』」(A正確);②「『『孕婦『禁用』』(穿越胎盤、破壞胎兒甲狀腺)」(B正確);③「『『哺乳婦女『禁用(放射性碘『經乳汁』分泌、危害嬰兒)』』,『『不能『減量使用』』』」——故C「哺乳婦女可減量使用」錯誤;④「『併用『穩定碘(potassium iodide)』會『競爭、稀釋放射碘的攝取→降低療效』」(D正確)。故C錯誤。","options":{"A":"釋放β射線破壞甲狀腺,正確。","B":"孕婦禁用,正確。","C":"哺乳婦女禁用、非可減量使用—錯誤(正解)。","D":"併用碘化鉀降低療效,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-61":{"quick":"empagliflozin為SGLT2抑制劑(非activator),故配對D錯誤。","detail":{"background":"降血糖藥與機轉配對:①「pioglitazone—PPAR-γ『致效劑』」(A正確);②「metformin—『AMPK活化劑』」(B正確);③「exenatide—『GLP-1受體致效劑』」(C正確);④「『empagliflozin—『鈉-葡萄糖共同轉運體2(SGLT2)『抑制劑(inhibitor)』』(『抑制腎近曲小管再吸收葡萄糖→尿糖排出』),『『而非『SGLT2 activator(活化劑)』』』」——故D配對(SGLT2 activator)錯誤。故D錯誤。","options":{"A":"pioglitazone為PPAR-γ致效劑,正確。","B":"metformin為AMPK活化劑,正確。","C":"exenatide為GLP-1受體致效劑,正確。","D":"empagliflozin為SGLT2抑制劑(非activator)—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_113090-70":{"quick":"dinoprostone為前列腺素衍生物、收縮子宮平滑肌,可用於引產。","detail":{"background":"「『dinoprostone(PGE2)』」是『『前列腺素(prostaglandin)衍生物』』,『『促進子宮頸成熟並『收縮子宮平滑肌』』,『臨床用於『引產(induce labor)』』。oxytocin(『催產素胜肽』,雖引產但非前列腺素)、ergonovine(麥角生物鹼,產後止血)、fasudil(Rho激酶抑制)非前列腺素類。故前列腺素衍生物引產者為dinoprostone。","options":{"A":"oxytocin為催產素(胜肽、非前列腺素)。","B":"dinoprostone為前列腺素衍生物、引產—正解。","C":"ergonovine為麥角生物鹼(產後止血)。","D":"fasudil為Rho激酶抑制劑。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-59":{"quick":"finasteride是5α-還原酶抑制劑(非雄激素受體阻斷劑),故D錯誤。","detail":{"background":"「finasteride」:①「用於『早期『雄性禿(男性型禿髮)』』」(A正確);②「用於『良性攝護腺肥大(BPH)』(縮小攝護腺)」(B正確);③「『口服』使用」(C正確);④「『機轉是『『5α-還原酶(5α-reductase)『抑制劑』』』,『減少『睪固酮轉成『二氫睪固酮(DHT)』』』,『『而非『雄激素受體『阻斷劑』』(後者是flutamide/bicalutamide)』」——故D「是雄激素受體阻斷劑」錯誤。故D錯誤。","options":{"A":"可用於早期雄性禿,正確。","B":"可用於良性攝護腺肥大,正確。","C":"可口服使用,正確。","D":"finasteride為5α-還原酶抑制劑、非受體阻斷劑—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114020-61":{"quick":"fludrocortisone具礦物性皮質固醇活性,治療腎上腺皮質機能不全的鹽類流失。","detail":{"background":"「『fludrocortisone』」是『具『強『礦物性皮質固醇(mineralocorticoid)活性』』的合成類固醇』:『模擬醛固酮、『促進腎『鈉再吸收、鉀/氫排出』』』,用於『『腎上腺皮質機能不全(如愛迪生氏病)『所致的鹽類流失(低血鈉、高血鉀)』』』與某些姿勢性低血壓。paramethasone、hydrocortisone(弱礦皮質)、betamethasone(幾無礦皮質活性)主要為糖皮質作用。故礦物性皮質固醇活性者為fludrocortisone。","options":{"A":"fludrocortisone具礦物性皮質固醇活性、治鹽流失—正解。","B":"paramethasone主要為糖皮質作用。","C":"hydrocortisone礦皮質活性弱。","D":"betamethasone幾無礦皮質活性。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-59":{"quick":"canagliflozin的主要機轉為SGLT2抑制劑。","detail":{"background":"「『canagliflozin』(與dapagliflozin、empagliflozin)」是『『鈉-葡萄糖共同轉運體2(SGLT2)『抑制劑』』』:『抑制腎『近曲小管』對葡萄糖的再吸收→『尿糖排出、降血糖』』(並有降體重、降血壓、心腎保護),『不依賴胰島素』。DPP-4抑制劑(sitagliptin)、GLP-1致效劑(liraglutide)、α-葡萄糖苷酶抑制劑(acarbose)機制不同。故canagliflozin為SGLT2抑制劑。","options":{"A":"DPP-4抑制劑為sitagliptin類。","B":"GLP-1受體致效劑為liraglutide類。","C":"canagliflozin為SGLT2抑制劑—正解。","D":"α-葡萄糖苷酶抑制劑為acarbose。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-60":{"quick":"thioamides抑制甲狀腺素合成,不抑制其釋放,故C錯誤。","detail":{"background":"硫醯胺類(thioamides,PTU/methimazole)的機轉:①「『抑制『甲狀腺過氧化酶(TPO)』、『阻斷碘的有機化(organification)』』」(A正確);②「『PTU另『抑制『周邊T4脫碘成T3』』(高劑量)」(B正確);③「『降低『碘酪胺酸的『偶合(coupling)』反應』」(D正確);④「『thioamides『抑制甲狀腺素『合成』』,『『不抑制甲狀腺素『釋放』』(抑制釋放的是『碘(Lugol)、鋰』)』」——故C「『抑制甲狀腺素『釋放』』」錯誤。故C錯誤。","options":{"A":"抑制TPO與碘的有機化,正確。","B":"PTU抑制周邊T4脫碘,正確。","C":"thioamides抑制合成、不抑制釋放—錯誤(正解)。","D":"降低碘酪胺酸的偶合反應,正確。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-61":{"quick":"維生素D增加腸道鈣與磷吸收、升高血磷,「使血磷下降」錯誤。","detail":{"background":"維生素D與活性產物:①「過量可致『高血鈣症』」(A正確);②「可『改善骨質疏鬆(促鈣吸收、骨礦化)』」(B正確);③「『paricalcitol(活性維生素D類似物)可治『慢性腎臟病引起的『續發性副甲狀腺機能亢進』』」(C正確);④「『維生素D『增加『腸道鈣『與『磷』』的吸收』』→『『升高(而非下降)』血磷與血鈣』』」——故D「使血磷『下降』」錯誤。故D錯誤。","options":{"A":"過量可致高血鈣症,正確。","B":"可改善骨質疏鬆,正確。","C":"paricalcitol治CKD續發副甲亢,正確。","D":"維生素D升高(非下降)血磷—錯誤(正解)。"},"sources":["Katzung《Basic & Clinical Pharmacology》","Goodman & Gilman《藥理學》","Lippincott圖解藥理學"]}},"med2_114090-62":{"quick":"thiazide利尿劑會升高尿酸(致高尿酸血症),不能治高尿酸,故C錯誤。","detail":{"background":"thiazide類利尿劑:①「『減少『尿鈣排出(留鈣)』』→可『改善骨質疏鬆、治『高鈣尿症(預防鈣結石)』』」(A、B正確);②
