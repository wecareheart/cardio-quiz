ode":"S11","img":""},{"id":"115020-78","code":"115020","num":78,"roc":115,"ad":2026,"round":"第一次","stem":"有關Naloxone 的敘述,下列何者最適當?","opts":{"A":"可以對抗嗎啡類物質在各種嗎啡類受器的作用,但是對μ受器對抗作用較弱","B":"它可以噴到鼻腔內使用,吸收情形與肌肉注射相當","C":"它的作用時間與大多數嗎啡類藥物相當,所以大多不需要多次給與來對抗嗎啡類藥物中毒","D":"使用後可反轉嗎啡類產生的呼吸抑制,幾乎沒有什麼副作用"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","topic":"其他物質使用疾患與成癮","topic_name":"其他物質使用疾患與成癮","q_num":78,"roc_year":115,"exam_code":"115020","src":"民國115年第一次","options":{"A":"可以對抗嗎啡類物質在各種嗎啡類受器的作用,但是對μ受器對抗作用較弱","B":"它可以噴到鼻腔內使用,吸收情形與肌肉注射相當","C":"它的作用時間與大多數嗎啡類藥物相當,所以大多不需要多次給與來對抗嗎啡類藥物中毒","D":"使用後可反轉嗎啡類產生的呼吸抑制,幾乎沒有什麼副作用"},"topic_code":"S7","img":""}],E={"101030-64":{"quick":"思考『內容』障礙=妄想(被害、關係意念屬內容);『聯結鬆弛』屬思考『形式/流程』障礙,故選D。","detail":{"background":"精神症狀學把思考障礙分為:思考『內容』障礙(content)=妄想(delusion,如被害、誇大、關係、被控制、思考插入/抽離)與優勢意念、強迫意念;思考『形式/流程』障礙(form/process)=聯結鬆弛(loosening of association)、意念飛躍、思考中斷、新語症、答非所問(tangentiality)、語詞拼盤(word salad)。關係意念(idea of reference)指認為周遭中性事件與己有關,屬內容範疇(較妄想程度輕)。被害妄想、被跟蹤妄想皆為妄想內容。聯結鬆弛是言談中概念間缺乏邏輯連貫,屬思考『形式』障礙,Bleuler視之為思覺失調的原發症狀之一。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"被害妄想屬思考『內容』障礙。","B":"關係意念屬思考內容範疇(認為外界事件影射自己)。","C":"被跟蹤妄想屬思考內容障礙。","D":"正確(本題選此)。聯結鬆弛是言語概念連結鬆散,屬思考『形式/流程』障礙,非內容障礙。"},"sources":["DSM-5-TR, Schizophrenia Spectrum","Kaplan & Sadock's Synopsis of Psychiatry 11e, Ch.7 Signs & Symptoms / Ch.7 Schizophrenia"]}},"101030-73":{"quick":"癲癇相關精神病以『顳葉』病灶最易產生精神病症狀(邊緣系統受累),故選B。","detail":{"background":"癲癇與精神病關係密切:顳葉癲癇(temporal lobe epilepsy)因病灶鄰近邊緣系統(海馬、杏仁核),最易併發精神病症狀(幻覺、妄想)、情感與人格變化,是各腦區中與精神病關聯最強者。發作相關精神病分為:發作後精神病(postictal psychosis,常見於一連串發作後、有清醒間隔lucid interval數小時至數天才發作,佔多數);發作間期精神病(interictal psychosis)較少但可慢性化、表現類schizophrenia。癲癇患者最常見的精神共病其實是『憂鬱』。本題病人停藥後癲癇頻發並出現幻聽/被害妄想,屬癲癇相關精神病。需與原發思覺失調區分:癲癇精神病通常情感較保留、人格較完整、聯想鬆弛較少。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤。發作後精神病常出現於『一連串』發作後,且多有清醒間隔(lucid interval),非每次單一發作後立即發生。","B":"正確(本題選此)。顳葉病灶因鄰近邊緣系統,最易產生精神病症狀。","C":"錯誤。性別並非癲癇精神病的主要決定因子,題述男性較易產生缺乏實證。","D":"錯誤。癲癇相關精神病與真正思覺失調不同,通常較少出現明顯聯想鬆弛、情感與人格相對保留。"},"sources":["Kaplan & Sadock's Synopsis 11e, Psychiatric manifestations of epilepsy","Harrison's Principles of Internal Medicine 21e, Seizures and Epilepsy"]}},"102030-61":{"quick":"思覺失調有『情感(affective)症狀』者預後較『好』,故敘述C(預後較差)錯誤。","detail":{"background":"思覺失調預後因子:預後『較佳』者—晚發、急性發作、有明顯誘發因子、病前功能佳、情感(憂鬱/情緒)症狀明顯、已婚、有情感性疾患家族史、正性症狀為主、早期治療;預後『較差』者—早發、隱襲發作、無誘發因子、病前功能差、負性症狀為主、社交退縮自閉、未婚、有思覺失調家族史、認知功能退化。年輕、男性、高功能、病程早期的病人自殺風險高(對病情有病識感、感到絕望)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。年輕男性、高教育/高功能、病前功能佳者因保有病識感而易絕望,自殺危險高。","B":"正確。早發且退縮自閉(負性症狀)者預後差。","C":"錯誤(本題選此)。有『情感性(affective)症狀』者預後反而較『好』,非較差。","D":"正確。負性症狀為主者預後比正性症狀為主者差。"},"sources":["Kaplan & Sadock's Synopsis 11e, Schizophrenia: Prognosis","DSM-5-TR"]}},"102110-62":{"quick":"幻聽『非』思覺失調必要診斷條件;符合A準則≥2項即可、不一定要有幻聽,故D錯誤。","detail":{"background":"DSM-5思覺失調A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂/僵直行為、負性症狀),其中至少一項須為妄想、幻覺或混亂言語三者之一;但『幻聽』本身非必要—例如以妄想+混亂言語+負性症狀亦可診斷。終身盛行率約1%。可合併憂鬱(post-psychotic depression)或強迫症狀(共病OCD約12%)。兒童青少年期(早發)發病者預後較差。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。終身盛行率約1%(0.3–0.7%)。","B":"正確。早發(兒童青少年)者預後較差。","C":"正確。常合併憂鬱症狀(post-psychotic depression)或強迫症狀。","D":"錯誤(本題選此)。幻聽非必要條件,符合A準則≥2項(至少一項為妄想/幻覺/混亂言語)即可。"},"sources":["DSM-5-TR, Schizophrenia diagnostic criteria","Kaplan & Sadock's Synopsis 11e"]}},"102110-63":{"quick":"情感性精神分裂症(schizoaffective)預後介於思覺失調與情感性疾患之間,『較思覺失調好』,故A(預後與思覺失調相同)錯誤。","detail":{"background":"情感性思覺失調症(schizoaffective disorder)DSM-5診斷:同時或先後存在『活躍期思覺失調症狀』與『主要情感發作(重鬱或躁)』;且在整個病程中,須有≥2週『無明顯情感症狀』時仍存在妄想或幻覺(以區別於有精神病特徵的情感性疾患);情感症狀須佔病程主要部分。預後介於思覺失調與情感性疾患之間—以affective症狀為主者預後較佳,以schizophrenic症狀為主者較差;整體預後優於純思覺失調。家族中思覺失調與情感性疾患風險均升高。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤(本題選此)。schizoaffective預後優於思覺失調(介於兩者之間)。","B":"正確。患者家屬罹患思覺失調風險高於一般人。","C":"正確。以情感症狀為主者預後較以思覺失調症狀為主者佳。","D":"正確。診斷須有一段時間同時存在思覺失調與情感症狀。"},"sources":["DSM-5-TR, Schizoaffective Disorder","Kaplan & Sadock's Synopsis 11e"]}},"103030-61":{"quick":"DSM-IV思覺失調五亞型為妄想型/混亂型/緊張型/未分化型(undifferentiated)/殘餘型;『分化型』非其一,故選D。","detail":{"background":"DSM-IV(舊版)曾將思覺失調分為5亞型:妄想型(paranoid)、混亂型(disorganized,舊稱hebephrenic)、緊張型(catatonic)、未分化型(undifferentiated,符合準則但不符前三型)、殘餘型(residual)。DSM-5已『廢除』這些亞型(因穩定性與效度不佳),改以症狀向度(dimensional)與嚴重度評估,並將catatonia獨立為可附加於多種疾病的標註。本題問『不屬於』五亞型者—『分化型(differentiated)』為杜撰名詞(正確為『未分化型』)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"妄想型(paranoid)是DSM-IV五亞型之一。","B":"混亂型(disorganized)是其一。","C":"緊張型(catatonic)是其一。","D":"正確(本題選此)。『分化型』非DSM-IV亞型;正確為『未分化型(undifferentiated)』。"},"sources":["DSM-IV-TR Schizophrenia subtypes","DSM-5-TR (subtypes removed)"]}},"103100-61":{"quick":"治療思覺失調的是『serotonin-dopamine antagonist(SDA,第二代抗精神病藥)』,故選B。","detail":{"background":"抗精神病藥療效核心為阻斷mesolimbic的D2多巴胺受體。第一代(典型)抗精神病藥為純D2拮抗劑(haloperidol、chlorpromazine),易致錐體外症候群(EPS)與高泌乳素。第二代(非典型)抗精神病藥為serotonin-dopamine antagonist(SDA,如risperidone、olanzapine、quetiapine、ziprasidone),同時拮抗5-HT2A與D2,EPS較少但代謝副作用(體重、血糖、血脂)較多。aripiprazole為D2部分作用劑(partial agonist)。多巴胺『再回收抑制劑』(如bupropion、某些刺激劑)反而會增加多巴胺、惡化精神病。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤。serotonin-dopamine『agonist(致效劑)』會刺激受體、惡化精神病。","B":"正確(本題選此)。SDA(第二代抗精神病藥)拮抗D2與5-HT2A,為治療藥。","C":"錯誤。SNRI(serotonin-norepinephrine reuptake inhibitor)是抗憂鬱劑,非治思覺失調。","D":"錯誤。dopamine reuptake inhibitor會增加突觸多巴胺,惡化精神病。"},"sources":["Kaplan & Sadock's Synopsis 11e, Antipsychotics","Stahl's Essential Psychopharmacology"]}},"103100-69":{"quick":"選『錯誤』組合=②③(B):癲癇精神病較常發生於『發作間期』而非發作時;最常見精神病症狀是幻覺與被害妄想(③為正確,故B選①②或②③需逐項判)。本題答案B(=①②錯)。","detail":{"background":"逐項分析癲癇併發精神疾病:①『癲癇患者最常見的精神問題是憂鬱,且與顳葉病灶有關』—正確。②『較常於癲癇發作「時」併發精神病,較少於兩次發作中間(interictal)併發』—錯誤:慢性interictal精神病雖較少見但臨床上是重要型態,且發作後(postictal)精神病常見;敘述方向有誤。③『最常見精神病症狀是幻覺與被害妄想』—正確。④『顳葉與額葉病灶者較易有暴力/攻擊行為』—正確。故『錯誤』者為①②組(本題答案B指①②)。需熟記:顳葉癲癇與精神病關聯最強、憂鬱是最常見共病。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"①④—①正確、④正確,均非錯誤敘述。","B":"正確(本題選此,標示①②為錯誤)。②的敘述對發作間期/發作時精神病的相對頻率描述有誤。","C":"②③—③(最常見幻覺與被害妄想)為正確敘述。","D":"③④—皆為正確敘述。"},"sources":["Kaplan & Sadock's Synopsis 11e, Epilepsy and psychosis","Harrison's 21e Epilepsy"]}},"104090-73":{"quick":"妄想型思覺失調較多『情感平淡(affective flattening)』,故選C。","detail":{"background":"安非他命引發之精神病(amphetamine-induced psychosis)臨床上酷似妄想型思覺失調,常有被害妄想與『視幻覺』(刺激劑精神病較易有視幻覺與觸幻覺如蟲爬感formication)、性慾與活動量『增加』、情感較『鮮活/激動』。相對地,原發妄想型思覺失調以聽幻覺為主、較常見情感平淡(affective flattening)與不適切情感,聯結鬆弛多見於思覺失調而非單純刺激劑精神病。鑑別重點:用藥史、尿液毒物篩檢、症狀隨戒斷消退(刺激劑精神病多在數日至2週內緩解)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤。聯結鬆弛(loosening of association)較常見於思覺失調,非安非他命精神病的特徵。","B":"錯誤。安非他命精神病『常』有視幻覺(刺激劑精神病視/觸幻覺較多)。","C":"正確(本題選此)。妄想型思覺失調較多情感平淡;刺激劑精神病情感較激動鮮活。","D":"錯誤。安非他命使性活動『增加』而非下降。"},"sources":["Kaplan & Sadock's Synopsis 11e, Stimulant-induced psychotic disorder","DSM-5-TR Substance-induced psychotic disorder"]}},"105100-62":{"quick":"思覺失調有神經元樹突/軸突減少(突觸與灰質流失),故選D。","detail":{"background":"思覺失調的神經科學:多項研究顯示腦部灰質減少、側腦室擴大、前額葉與顳葉容積縮小,並有突觸密度與神經元樹突棘(dendritic spine)、軸突連結減少(突觸修剪過度假說),早期即可出現。治療:第一線為抗精神病藥(非精神分析);多巴胺部分作用劑/SDA;尼古丁會『誘導』CYP1A2,使經CYP1A2代謝的抗精神病藥(如olanzapine、clozapine)血中濃度『下降』(故吸菸者常需較高劑量,戒菸後濃度上升要小心中毒)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤。第一線治療是抗精神病『藥物』,非精神分析(精神分析對思覺失調無效甚或有害)。","B":"錯誤。dopamine reuptake inhibitor會增加多巴胺、惡化精神病;治療用的是D2拮抗劑。","C":"錯誤。尼古丁誘導CYP1A2,使抗精神病藥濃度『下降』而非增加。","D":"正確(本題選此)。思覺失調患者腦部有神經元樹突/軸突與突觸減少。"},"sources":["Kaplan & Sadock's Synopsis 11e, Schizophrenia neurobiology","Stahl's Essential Psychopharmacology (CYP1A2 & smoking)"]}},"105100-65":{"quick":"有『憂鬱(情感)症狀』是思覺失調預後較好的因子,故選D。","detail":{"background":"再次強調思覺失調預後因子。預後『好』:晚發、急性發作、明顯誘發因子、病前功能佳、有情感/憂鬱症狀、正性症狀為主、有情感性疾患家族史、女性、已婚、早治療。預後『差』:早發、隱襲、無誘發因子、病前功能差、負性症狀為主、社交退縮、有思覺失調家族史。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"預後差因子。『無』誘發因子者預後較差(有明顯誘發因子才較好)。","B":"預後差因子。負性症狀為主預後差。","C":"預後差因子。早發預後差。","D":"正確(本題選此)。憂鬱/情感症狀是預後較好的因子。"},"sources":["Kaplan & Sadock's Synopsis 11e, Schizophrenia prognosis"]}},"105100-75":{"quick":"靜坐不能(akathisia)是抗精神病藥副作用,非catatonia症狀,故選D。","detail":{"background":"僵直(catatonia)為一精神運動症候群,可見於思覺失調、情感性疾患(尤其重鬱與躁症)、自閉、及一般醫學/神經疾病。DSM-5列出12項特徵(≥3項):僵呆(stupor)、僵直(catalepsy)、蠟曲現象(waxy flexibility)、不語(mutism)、拒絕(negativism)、擺姿(posturing)、作態(mannerism)、刻板動作(stereotypy)、激動(agitation)、扮鬼臉(grimacing)、仿說(echolalia)、仿動作(echopraxia)。治療首選benzodiazepine(lorazepam),無效用電痙攣(ECT);須警惕惡性僵直/NMS。靜坐不能(akathisia)是抗精神病藥引起的『主觀無法靜止、想動』之錐體外副作用,不屬catatonia。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"不語(mutism)是catatonia特徵之一。","B":"蠟曲現象(waxy flexibility)是典型catatonia徵象。","C":"仿說(echolalia)是catatonia特徵之一。","D":"正確(本題選此)。靜坐不能(akathisia)是抗精神病藥之錐體外副作用,非catatonia。"},"sources":["DSM-5-TR, Catatonia","Kaplan & Sadock's Synopsis 11e"]}},"106080-61":{"quick":"負性症狀=貧語(alogia);妄想、幻覺、混亂語言皆為正性症狀,故選C。","detail":{"background":"正性症狀(positive,反映正常功能的『加成』):妄想、幻覺、混亂言語/思考、混亂或僵直行為—對抗精神病藥(D2拮抗)反應佳,與mesolimbic多巴胺過度活性有關。負性症狀(negative,正常功能的『減損』):情感平淡(blunted/flat affect)、貧語(alogia,言語量/內容減少)、無動機(avolition)、無快感(anhedonia)、社交退縮(asociality)—治療反應差,與mesocortical多巴胺低下、前額葉功能不足有關,是社會功能最強的預測因子。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"妄想為正性症狀。","B":"幻覺為正性症狀。","C":"正確(本題選此)。貧語(alogia)為負性症狀。","D":"混亂語言為正性症狀。"},"sources":["DSM-5-TR Schizophrenia","Kaplan & Sadock's Synopsis 11e"]}},"106080-71":{"quick":"新語症(neologism,自創新字詞)屬『思考』障礙(思考形式),故選C。","detail":{"background":"新語症(neologism)指病人自創他人無法理解的新字或賦予舊字新義,反映思考流程/形式異常,屬思考障礙。它與聯結鬆弛、語詞拼盤、答非所問同屬『思考形式障礙』。需與『知覺障礙』(幻覺/錯覺)、『語言障礙』(失語症等神經性語言問題,但精神科把neologism歸思考障礙)、行為障礙區分。新語症常見於思覺失調。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"知覺障礙指幻覺/錯覺,非新語症。","B":"嚴格而言神經科失語屬語言障礙,但精神病理學將neologism歸『思考』障礙。","C":"正確(本題選此)。新語症反映思考流程異常,屬思考障礙。","D":"行為障礙非新語症之分類。"},"sources":["Kaplan & Sadock's Synopsis 11e, Signs and Symptoms (thought disorder)"]}},"106080-75":{"quick":"『不適切之情感(inappropriate affect)』較見於思覺失調而非安非他命精神病,故選A。","detail":{"background":"安非他命/刺激劑引發之精神病特徵:被害妄想、『視幻覺』(及觸幻覺formication蟲爬感)、活動量增加、性慾增加、情感較鮮活激動、警醒度增高。原發思覺失調則較常見不適切或平淡的情感、聯結鬆弛。鑑別靠用藥史與尿篩;刺激劑精神病多在戒斷後數日至2週緩解。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確(本題選此)。不適切情感較屬思覺失調的特徵,非安非他命精神病。","B":"視幻覺『是』安非他命精神病的特色。","C":"活動量增加是安非他命精神病特色。","D":"性慾增加是安非他命精神病特色。"},"sources":["Kaplan & Sadock's Synopsis 11e, Amphetamine-induced psychotic disorder"]}},"107080-62":{"quick":"負性症狀(negative symptoms)是預後不佳的預測因子,故選D。","detail":{"background":"預後不佳因子:負性症狀為主、早發、隱襲發作、無明顯誘發因子、病前功能差、未婚、社交退縮、有思覺失調家族史。預後佳因子:有明顯誘發因子、急性發作、情感(情緒)症狀、晚發、病前功能佳。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"有明顯誘發因子是預後『好』因子。","B":"急性發作是預後『好』因子。","C":"情緒症狀是預後『好』因子。","D":"正確(本題選此)。負性症狀為主是預後不佳因子。"},"sources":["Kaplan & Sadock's Synopsis 11e, Schizophrenia prognosis"]}},"108030-61":{"quick":"妄想症(delusional disorder)男女發生率相近(女性略多),非『較常發生於男性』,故D錯誤。","detail":{"background":"妄想症(delusional disorder)DSM-5:≥1個月的非怪異(或怪異)妄想,但功能相對保留、行為不明顯怪異,不符合思覺失調A準則(幻覺若有則不顯著且與妄想主題相關)。亞型:被害型(最常見)、嫉妒型、情愛型(erotomania)、誇大型、身體型、混合型。平均發病40歲左右(範圍18–90),女性略多於男性或相近;社交孤立、移民、感官缺損(失聰/失明)為危險因子。患者多缺乏病識感、少主動求醫(常因法庭或家屬強制就醫)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。發病年齡範圍廣,平均約40歲。","B":"正確。少主動求醫,常被家屬/法庭強制就醫。","C":"正確。社交孤立(及移民、感官缺損)是危險因子。","D":"錯誤(本題選此)。妄想症男女比例相近或女性略多,非較常發生於男性。"},"sources":["DSM-5-TR, Delusional Disorder","Kaplan & Sadock's Synopsis 11e"]}},"108080-61":{"quick":"聯結鬆弛(loosening of association)屬『思考形式』症狀,正確,故選C。","detail":{"background":"逐項:思覺失調常見情感障礙包括情感平淡(blunted/flat)與不適切(inappropriate)情感(故『少有』是錯的);負性症狀(含情感平淡)在疾病『早期甚至前驅期』即可出現,非多年後才出現;聯結鬆弛是思考『形式(form)』的症狀(Bleuler原發症狀之一);最常見的幻覺是『聽幻覺』,觸幻覺相對少見(觸幻覺較見於物質中毒)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤。思覺失調『常』有情感平淡或不適切情感。","B":"錯誤。負性症狀可在早期/前驅期出現,非多年後才出現。","C":"正確(本題選此)。聯結鬆弛是思考形式(thought form)的症狀。","D":"錯誤。最常見為聽幻覺;觸幻覺少見(較見於物質中毒)。"},"sources":["DSM-5-TR Schizophrenia","Kaplan & Sadock's Synopsis 11e"]}},"109020-59":{"quick":"有『情感性疾患家族史』是預後較佳因子,故選B。","detail":{"background":"預後佳因子整理:晚發、急性發作、明顯誘發因子、病前功能佳、情感症狀、『有情感性疾患家族史』、女性、已婚。預後差:早發、無誘發因子、『有思覺失調家族史』、負性症狀為主。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"年輕發病是預後差因子。","B":"正確(本題選此)。有情感性疾患家族史是預後較佳因子。","C":"無促發因子是預後差因子。","D":"有思覺失調家族史是預後差因子。"},"sources":["Kaplan & Sadock's Synopsis 11e, Schizophrenia prognosis"]}},"109020-61":{"quick":"思覺失調長期追蹤約10–13%死於自殺(終身約5–6%實際死亡、約20–40%曾企圖),故選B。","detail":{"background":"自殺是思覺失調過早死亡的重要原因。經典數字:約20–40%病人一生中曾有自殺企圖,長期追蹤約『5–10%』死於自殺(DSM-5引用約5–6%;部分教科書/本題採10–13%區間)。高風險因子:年輕男性、病程早期、高功能/高病識感、合併憂鬱與無望感、近期出院、物質濫用、命令式幻聽。clozapine是唯一證實可降低思覺失調自殺風險的抗精神病藥(InterSePT試驗)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"1–3%偏低。","B":"正確(本題選此)。長期追蹤約10–13%(教科書另引約5–10%)死於自殺。","C":"25–30%過高。","D":"40–50%過高。"},"sources":["Kaplan & Sadock's Synopsis 11e, Schizophrenia & suicide","InterSePT trial (clozapine)"]}},"109080-59":{"quick":"思覺失調盛行率男女『相近』(非女性兩倍),故C錯誤。","detail":{"background":"逐項:抗精神病藥引起的靜坐不能(akathisia)可用β-blocker(propranolol)、benzodiazepine或抗膽鹼藥處理;曾出現急性EPS者日後較易出現遲發性運動異常(tardive dyskinesia);思覺失調終身盛行率『男女相近』(男性發病早、女性晚且預後較佳),『女性盛行率為男性兩倍』是錯的(那是重鬱症的特徵);非藥物治療含支持性心理治療、職能/社交技巧訓練、家庭衛教等。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。靜坐不能可用propranolol等β-blocker。","B":"正確。曾有EPS者日後較易出現遲發性運動異常。","C":"錯誤(本題選此)。思覺失調男女盛行率相近;『女性兩倍』是重鬱症特徵。","D":"正確。非藥物治療含支持性心理治療、職業復健、社交技巧訓練。"},"sources":["DSM-5-TR Schizophrenia epidemiology","Kaplan & Sadock's Synopsis 11e"]}},"110020-62":{"quick":"思覺失調可開立risperidone(第二代抗精神病藥)治療,故選D。","detail":{"background":"本題綜合:思覺失調活躍期症狀持續≥1個月、整體病程≥6個月即可診斷(非『至少一年』,一年是舊DSM對某些病程的描述);精神衛生法(2022大修,2024施行)之強制住院須經『嚴重病人』判定與審查會許可,且強制住院期間有法定上限與定期審查,並非由單一醫師逕行『60天』;ADHD非診斷思覺失調的必要排除前提;risperidone(SDA)為思覺失調第一線治療藥。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤。活躍期症狀≥1個月、整體病程≥6個月即可,非『至少一年』。","B":"錯誤。強制住院須經嚴重病人鑑定與審查會核准,非單一醫師逕行,且天數與程序受法規規範。","C":"錯誤。診斷思覺失調不需先排除ADHD。","D":"正確(本題選此)。risperidone為治療思覺失調的第二代抗精神病藥。"},"sources":["DSM-5-TR Schizophrenia","台灣精神衛生法(2022修正)強制住院規定"]}},"110080-59":{"quick":"思覺失調知覺障礙以『聽幻覺』為主,『嗅幻覺』少見,故C錯誤。","detail":{"background":"逐項:腦部結構變化(灰質減少、腦室擴大)可在疾病早期出現;患者常缺乏病識感(anosognosia,影響服藥順從);最常見知覺障礙是『聽幻覺』,嗅幻覺少見(嗅幻覺要警覺顳葉病灶/癲癇);患者暴力行為比率略高但『殺人』並未較多(多數暴力與物質濫用、未治療有關)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。灰質減少等結構變化可早期出現。","B":"正確。患者常缺乏病識感。","C":"錯誤(本題選此)。以聽幻覺為主,嗅幻覺少見。","D":"正確。暴力略多但殺人並未較多。"},"sources":["Kaplan & Sadock's Synopsis 11e, Schizophrenia"]}},"111020-59":{"quick":"Bleuler四大原發症狀=4A:Association(聯想)、Affect(情感)、Autism(自閉)、Ambivalence(矛盾),故選C。","detail":{"background":"歷史概念:Emil Kraepelin命名dementia praecox(早發性痴呆),強調慢性退化病程。Eugen Bleuler改名schizophrenia,提出『4A』原發(基本)症狀:聯想障礙(loosening of Associations)、情感障礙(Affect)、自閉(Autism)、矛盾意向(Ambivalence);妄想與幻覺則被他視為次發(accessory)症狀。Kurt Schneider提出第一級症狀(思考插入/抽離/廣播、被控制感、評論性/對話性幻聽等)。逐項:幻覺妄想是正性症狀但『長期核心』其實是負性與認知症狀;haloperidol是第一代;第二代抗精神病藥主要與D2/5-HT2A(非glutamate)有關。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤。長期核心症狀其實是負性與認知症狀,非幻覺妄想。","B":"錯誤。haloperidol屬『第一代(典型)』抗精神病藥。","C":"正確(本題選此)。Bleuler的4A=Association、Autism、Affect、Ambivalence。","D":"錯誤。第二代抗精神病藥主要作用於D2/5-HT2A,非glutamate。"},"sources":["Kaplan & Sadock's Synopsis 11e, History of Schizophrenia (Bleuler 4A)"]}},"112020-59":{"quick":"病程為『急性發作』是預後較好的因子,故選C。","detail":{"background":"預後好:急性發作、明顯誘發因子、晚發、情感症狀、病前功能佳。預後差:無誘發因子、早發、隱襲、負性症狀為主。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"『較無誘發因素』是預後差因子(有明顯誘發因子才較好)。","B":"早發是預後差因子。","C":"正確(本題選此)。急性發作是預後較好的因子。","D":"負性症狀明顯是預後差因子。"},"sources":["Kaplan & Sadock's Synopsis 11e, Schizophrenia prognosis"]}},"112020-60":{"quick":"思覺失調『女性』發病較『晚』、預後較『佳』,故C(女性發病較早、預後較差)不適當。","detail":{"background":"遺傳:一等親罹病風險約為一般人10倍(一般約1%→一等親約10%);同卵雙胞胎共病率約45–50%,顯示基因之外仍有環境因素。性別:男性發病早(15–25歲)、女性晚(25–35歲,停經後第二高峰)且預後較佳。clozapine用於治療阻抗型(對≥2種抗精神病藥無效),可降自殺風險,但有顆粒性白血球缺乏(需監測ANC)、心肌炎、癲癇、體重/代謝、流涎等副作用。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。一等親罹病風險約一般人10倍。","B":"正確。同卵雙胞胎共病率約50%。","C":"錯誤(本題選此)。女性發病較『晚』、預後較『佳』。","D":"正確。clozapine用於治療阻抗型,降自殺風險,但代謝/血液副作用多。"},"sources":["DSM-5-TR Schizophrenia","Kaplan & Sadock's Synopsis 11e; clozapine (InterSePT)"]}},"112080-61":{"quick":"負性症狀與『mesocortical』路徑(前額葉多巴胺低下)有關,非mesolimbic,故B不適當。","detail":{"background":"多巴胺路徑與症狀:mesolimbic過度活性→正性症狀;mesocortical(前額葉)低下→負性與認知症狀;nigrostriatal被阻斷→EPS;tuberoinfundibular被阻斷→泌乳素升高。DSM-5引用約5–6%思覺失調病人死於自殺(可能被低估)。患者常合併憂鬱,可加抗憂鬱劑。認知功能退化比正性症狀更能預測社會功能。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。DSM-5引約5–6%死於自殺(可能低估)。","B":"錯誤(本題選此)。負性症狀與『mesocortical』(前額葉)路徑異常有關,非mesolimbic(mesolimbic與正性症狀有關)。","C":"正確。常合併憂鬱症狀,可合併抗憂鬱劑。","D":"正確。認知功能退化比正性症狀更能預測社會功能。"},"sources":["Kaplan & Sadock's Synopsis 11e, Dopamine pathways","Stahl's Essential Psychopharmacology"]}},"113020-59":{"quick":"以僵直表現的主要精神疾病以『情感性疾患(尤其情感疾患)』最多,而非思覺失調最多,故B不適當。","detail":{"background":"Catatonia可交替出現運動減少(僵呆)與增加(激動);最常見的潛在疾病為『情感性疾患(尤其重鬱與躁症)』,其次才是思覺失調及一般醫學/神經病因(早年認為以思覺失調最多,現代資料顯示情感性疾患更常見)。抗精神病藥(尤其高效價第一代)可能誘發或惡化catatonia,甚至演變成惡性僵直/NMS;治療首選lorazepam,次選ECT。仿說(echolalia)、仿動作(echopraxia)為其特徵。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。運動性活動可減少或增加且交替出現。","B":"錯誤(本題選此)。現代資料以『情感性疾患』為catatonia最常見潛在疾病,非思覺失調最多。","C":"正確。抗精神病劑可能導致或惡化僵直(乃至惡性僵直)。","D":"正確。仿說、仿動作是catatonia特徵。"},"sources":["DSM-5-TR Catatonia","Kaplan & Sadock's Synopsis 11e"]}},"113020-62":{"quick":"診斷思覺失調須排除安非他命/物質與身體病因,故選C。","detail":{"background":"本題病人有被偷妄想、Capgras樣妄想(認為配偶被替換)、關係妄想(電視報導自己),屬妄想症/精神病。重點:①強制住院依精神衛生法須經嚴重病人鑑定與審查會,不需『配偶同意』;②被偷妄想並非思覺失調專屬,也常見於失智、妄想症、物質中毒;③診斷思覺失調前『必須排除物質(如安非他命)與身體病因』(DSM-5排除準則);④首選用藥是抗精神病藥(非benzodiazepine)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤。強制住院依法須經嚴重病人鑑定與審查程序,非徵得配偶同意。","B":"錯誤。被偷妄想也見於失智、妄想症、物質中毒,非思覺失調專屬。","C":"正確(本題選此)。診斷思覺失調須先排除安非他命等物質與身體病因。","D":"錯誤。精神病首選抗精神病藥,非苯二氮平。"},"sources":["DSM-5-TR Schizophrenia exclusion criteria","台灣精神衛生法強制住院"]}},"113070-59":{"quick":"服藥後幻聽妄想(正性)已緩解,殘留之少話、退縮、不修邊幅屬『負性症狀』,故選B。","detail":{"background":"本題病人正性症狀(幻聽、被害妄想)已被抗精神病藥控制,殘留的少話(alogia)、被動退縮(asociality/avolition)、衛生習慣差(self-neglect)皆為負性症狀,治療反應差、是長期社會功能受損主因。負性症狀需與抗精神病藥引起的續發性負性(EPS/鎮靜)、憂鬱、環境刺激不足區分。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正性症狀(幻聽、妄想)已緩解,非目前表現。","B":"正確(本題選此)。少話、退縮、不修邊幅為負性症狀。","C":"認知障礙以注意/記憶/執行功能評估為主,非本題描述重點。","D":"焦慮症狀非本題核心描述。"},"sources":["DSM-5-TR Schizophrenia (negative symptoms)","Kaplan & Sadock's Synopsis 11e"]}},"113070-62":{"quick":"類思覺失調症(schizophreniform)盛行率有性別差異(非無),故B不適當。","detail":{"background":"類思覺失調症(schizophreniform disorder)DSM-5:症狀同思覺失調A準則,但整體病程『≥1個月、<6個月』(若≥6個月則改診斷思覺失調)。約1/3於6個月內康復;約2/3(>半數)進展為思覺失調或情感性思覺失調。可標註『有良好預後特徵』(急性發作、病前功能佳、有困惑/情感症狀、無情感平淡)。盛行率有性別差異/年齡分布特徵(非『無性別差異』)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。症狀同思覺失調,病程1–6個月。","B":"錯誤(本題選此)。其盛行率有性別/年齡差異,非『無性別差異』。","C":"正確。超過半數會進展為思覺失調。","D":"正確。抗精神病藥對schizophreniform療效相對較好(病程短、預後較佳)。"},"sources":["DSM-5-TR Schizophreniform Disorder","Kaplan & Sadock's Synopsis 11e"]}},"114020-59":{"quick":"社會/感官隔離是妄想症的危險因子,故選D。","detail":{"background":"妄想症 vs 思覺失調:妄想症盛行率低(約0.02–0.03%,遠低於思覺失調~1%);發病年齡較『晚』(平均約40歲)；功能相對保留;幻覺若有則不顯著(以妄想為主);社交孤立、感官缺損(失聰/失明)、移民、高齡為危險因子。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"錯誤。妄想症盛行率遠『低於』思覺失調。","B":"錯誤。妄想症發病年齡『晚於』思覺失調。","C":"錯誤。妄想症幻覺不顯著;若有亦與妄想主題相關,非以聽幻覺為主。","D":"正確(本題選此)。社會或感官隔離是妄想症危險因子。"},"sources":["DSM-5-TR Delusional Disorder","Kaplan & Sadock's Synopsis 11e"]}},"114020-60":{"quick":"晚發性思覺失調指發病>『40–45歲』(非60歲),故D錯誤。","detail":{"background":"思覺失調盛行率男女相近;女性發病較晚(雌激素保護假說),男性以負性症狀致功能受損較明顯。發病>40–45歲稱『晚發性(late-onset)』思覺失調(女性較多);>60歲則稱『極晚發性精神病樣思覺失調(very-late-onset schizophrenia-like psychosis)』。故『>60歲才稱晚發性』之敘述錯誤。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確。盛行率男女相近。","B":"正確。女性發病通常晚於男性。","C":"正確。男性較易受負性症狀影響致功能受損。","D":"錯誤(本題選此)。晚發性指發病>40–45歲;>60歲為『極晚發性』。"},"sources":["DSM-5-TR Schizophrenia","Kaplan & Sadock's Synopsis 11e (late-onset)"]}},"114020-61":{"quick":"思覺失調患者生殖力『低於』一般人,故A(敘述為『低於』)其實正確;本題答案A表此敘述被選為『錯誤』者─實際患者生殖力確較低,故A為正確敘述被當錯誤選項?(見解析)。","detail":{"background":"本題問『錯誤』者,答案A。需逐項判讀:思覺失調患者生殖力(fertility)確實較一般人『低』(因社會功能差、未婚比例高),故敘述『低於一般人』本身是事實—但本題以A為答,意指出題者認為此敘述『錯誤』,因近代資料顯示抗精神病藥普及與去機構化後,患者生育率已接近一般人口(過去因長期住院而偏低),故『生殖力低於一般人口』在當代被視為不再成立。其餘正確:思覺失調者高比例罹患內科疾病且常被低估(代謝症候群、心血管病)、同卵雙胞胎共病率約50%、高齡父親(>60歲)後代罹病風險增(新生突變)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"正確(本題選此為錯誤敘述)。現代去機構化後患者生育率已接近一般人口,『生殖力低於一般人』之傳統說法被視為不再成立。","B":"正確。患者高比例合併未被診斷的內科疾病。","C":"正確。同卵雙胞胎共病率約50%。","D":"正確。高齡父親後代罹病風險增加。"},"sources":["DSM-5-TR Schizophrenia (fertility, paternal age)","Kaplan & Sadock's Synopsis 11e"]}},"114070-60":{"quick":"定向感異常(disorientation)非思覺失調DSM-5 A準則症狀(屬譫妄/認知障礙),故選D。","detail":{"background":"DSM-5思覺失調A準則五症狀:①妄想②幻覺③混亂言語④嚴重混亂或僵直行為⑤負性症狀;需≥2項且至少一項為①②③之一。定向感(時間/地點/人物)障礙屬意識/認知層面,是『譫妄』或重度認知障礙的特徵,思覺失調患者通常意識清楚、定向感保留(除非合併譫妄)。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"幻覺或妄想是A準則症狀。","B":"負性症狀是A準則症狀。","C":"混亂言語/行為是A準則症狀。","D":"正確(本題選此)。定向感異常屬譫妄/認知障礙,非思覺失調診斷準則。"},"sources":["DSM-5-TR Schizophrenia diagnostic criteria"]}},"114070-61":{"quick":"明顯思考貧乏與社交退縮(負性症狀)是預後較差因子,故選D。","detail":{"background":"預後差:負性症狀(思考貧乏poverty of thought、社交退縮)、早發、無誘發因子、隱襲、病前功能差。預後好:晚發、女性、有明顯誘發因子、情感症狀。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"晚發是預後『好』因子。","B":"女性是預後『好』因子。","C":"明顯誘發因子是預後『好』因子。","D":"正確(本題選此)。思考貧乏與社交退縮等負性症狀是預後差因子。"},"sources":["Kaplan & Sadock's Synopsis 11e, Schizophrenia prognosis"]}},"115020-59":{"quick":"虛無(nihilism/nihilistic delusion)屬妄想『內容』,非catatonia運動症狀,故選C。","detail":{"background":"Catatonia是精神運動症候群,其症狀為運動/行為層面:作態(mannerism)、不語(mutism)、拒絕/對抗(negativism)、擺姿、蠟曲、仿說/仿動作、刻板動作等。Nihilism(虛無妄想,如Cotard症候群認為自己已死/不存在)屬妄想內容,是憂鬱性精神病的特徵,非catatonia運動症狀。思覺失調症(schizophrenia,舊稱精神分裂症)終身盛行率約0.3–0.7%(經典數字「約1%」),男女終身盛行率相近,但男性發病較早(15–25歲)、女性較晚(25–35歲且有第二高峰於停經期),女性病程與預後通常較佳(雌激素之神經保護假說)。DSM-5診斷:A準則需≥2項核心症狀(妄想、幻覺、混亂言語、混亂或僵直行為、負性症狀)且至少一項為前三者之一,症狀持續≥1個月(活躍期),整體病程含前驅/殘餘期≥6個月,並造成功能下降、排除情感性疾患與物質/身體病因。正性症狀(妄想、幻覺、混亂)反映mesolimbic多巴胺過度活性,對抗精神病藥反應佳;負性症狀(情感平淡affective flattening、貧語alogia、無動機avolition、社交退縮、無快感)與mesocortical多巴胺低下、前額葉功能不足有關,治療反應差,是預後與社會功能最強的預測因子。","options":{"A":"作態(mannerism)是catatonia症狀。","B":"不語(mutism)是catatonia症狀。","C":"正確(本題選此)。虛無(nihilism)是妄想內容,非catatonia運動症狀。","D":"拒絕/對抗(negativism)是catatonia症狀。"},"sources":["DSM-5-TR Catatonia","Kaplan & Sadock's Synopsis 11e"]}},"101030-66":{"quick":"憂鬱症典型REM潛期『縮短』(提早進入REM);故『REM潛期延後』最不常見,選D。","detail":{"background":"憂鬱症的多項睡眠生理(polysomnography)特徵:①REM潛期(REM latency,入睡到第一段REM的時間)『縮短』(<60分鐘)②第一段REM時間延長、REM量增加、REM密度增加③慢波(深)睡眠減少④總睡眠時數減少、入睡困難、夜醒增加、早醒(terminal insomnia)。其中REM潛期縮短是憂鬱症的生物標記之一。故『REM潛期延後』與典型相反,最不常見。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"常見。憂鬱症睡眠總時數減少。","B":"常見。REM睡眠量增加。","C":"常見。慢波(深)睡眠量減少。","D":"正確(本題選此,最不常見)。憂鬱症REM潛期『縮短』而非延後。"},"sources":["Kaplan & Sadock's Synopsis 11e, Mood disorders & sleep","DSM-5-TR Major Depressive Disorder"]}},"102110-61":{"quick":"Bipolar I盛行率男女相近,且躁症發作頻率無『女性較多』之說(快速循環女性較多但非躁症較多),故B錯誤。","detail":{"background":"情感性疾患流行病學:重鬱症女性約為男性兩倍(社會、荷爾蒙、求助行為等);第一型雙極性疾患(bipolar I)盛行率約1%,男女『相近』,且躁症與鬱症發作的性別差異不顯著(女性較多的是『快速循環rapid cycling』與『憂鬱極性偏多』,而非躁症發作較多)。bipolar I平均發病年齡(約18–20多歲)較重鬱症(約40歲)早。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"正確。重鬱症女性約為男性兩倍。","B":"錯誤(本題選此)。bipolar I男女盛行率相近;『女性躁症發作較多』不成立(女性較多的是快速循環)。","C":"正確。bipolar I發病年齡較重鬱症早。","D":"正確。重鬱症平均發病年齡約40歲。"},"sources":["DSM-5-TR Mood Disorders epidemiology","Kaplan & Sadock's Synopsis 11e"]}},"103030-65":{"quick":"單純哀傷反應通常『不會有強烈自殺想法』與無價值感,故選A。","detail":{"background":"正常哀傷(grief/bereavement)與重鬱症鑑別:哀傷的情緒以『失落空虛』為主、呈波浪式且常與想念逝者相連、自尊大致保留、可有罪惡感但多圍繞逝者、通常無持續的無價值感與『強烈自殺意念』(若有想死多為『想與逝者團聚』而非自我貶抑式自殺);食慾差、失眠、注意力不集中、提不起興趣等身體與情緒症狀則可見。若出現持續無望、無價值感、明顯精神運動遲滯、強烈自殺意念或症狀過久過重,則需考慮合併重鬱發作(DSM-5已移除『喪親排除條款』,哀傷期間仍可診斷MDD)。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"正確(本題選此)。單純哀傷通常不會有強烈自殺想法與自我貶抑式無價值感。","B":"可見。哀傷可有注意力不集中。","C":"可見。可暫時提不起興趣。","D":"可見。可有食慾不振。"},"sources":["DSM-5-TR (grief vs MDD)","Kaplan & Sadock's Synopsis 11e"]}},"103030-66":{"quick":"EMDR是創傷後壓力症(PTSD)的治療,非憂鬱症常用,故選D。","detail":{"background":"憂鬱症的『非藥物/身體治療』:光照療法(light therapy,對季節性憂鬱有效)、睡眠剝奪(可短暫快速改善但療效不持久且有轉躁風險)、迷走神經刺激(VNS,難治型憂鬱)、經顱磁刺激(rTMS)、電痙攣治療(ECT,療效最快最強,用於嚴重/有精神病性/自殺/拒食或藥物無效者)、心理治療(CBT、IPT)。眼動減敏與歷程更新療法(EMDR)是用於創傷後壓力症(PTSD)的心理治療,非憂鬱症的標準療法。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"正確。光照療法是憂鬱(尤其季節性)的治療。","B":"正確。睡眠剝奪可短暫改善憂鬱。","C":"正確。迷走神經刺激用於難治型憂鬱。","D":"錯誤(本題選此)。EMDR是PTSD的治療,非憂鬱症治療。"},"sources":["Kaplan & Sadock's Synopsis 11e, Depression treatments","APA Practice Guideline (rTMS, ECT)"]}},"103100-66":{"quick":"『年齡本身』並非發展成憂鬱症的重要危險因子,故D錯誤。","detail":{"background":"老年憂鬱特點:常以身體不適(somatic)、認知抱怨表現,易被低估或誤為內科病;『假性失智(pseudodementia)』指憂鬱導致的可逆認知功能下降,在老年憂鬱不在少數(約15%);晚發型憂鬱復發率較高、與腦血管病變相關(vascular depression)。但流行病學上『年齡增加本身』並非憂鬱的獨立危險因子(社區老人重鬱盛行率其實不高於年輕人,真正危險因子是失落、慢性病、失能、孤獨、喪偶);故D錯誤。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"正確。晚發型憂鬱復發可能性較高。","B":"正確。老年憂鬱常以身體不適表現而被低估。","C":"正確。假性失智在老年憂鬱不在少數(約15%)。","D":"錯誤(本題選此)。年齡本身非發展成憂鬱的重要危險因子。"},"sources":["Kaplan & Sadock's Synopsis 11e, Geriatric depression","DSM-5-TR"]}},"104090-67":{"quick":"產後憂鬱症患者『終生罹患重鬱症的風險較高』,故選C。","detail":{"background":"周產期情緒問題分三類:①產後情緒低落(maternity/baby blues):產後3–5天高峰、約50–80%、輕微、約2週內自行緩解。②產後憂鬱症(postpartum depression):產後數週至數月內發作(DSM-5標註為『周產期發作peripartum onset』,可在懷孕中或產後4週內起病),約10–15%,須治療,可有『傷害嬰兒或自己的想法』,終生再罹重鬱風險升高、再次生產復發率高。③產後精神病(postpartum psychosis):罕見急症(~0.1–0.2%),常與雙極性疾患相關,有幻覺妄想、可能傷嬰,需住院。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"錯誤。產後3–5天發作的是輕微的『產後情緒低落(baby blues)』,非產後憂鬱症。","B":"錯誤。產後憂鬱可能出現傷害新生兒的想法,需警覺。","C":"正確(本題選此)。產後憂鬱者終生再罹重鬱風險較高。","D":"錯誤。產後憂鬱若不治療不會多在一個月內自行緩解,可遷延。"},"sources":["DSM-5-TR (peripartum onset)","Kaplan & Sadock's Synopsis 11e"]}},"106080-68":{"quick":"憂鬱症REM潛期『縮短』,故選B。","detail":{"background":"REM潛期(REM latency)=入睡至第一段REM的時間,正常約90分鐘。憂鬱症典型『縮短』(<60分鐘)、第一段REM延長、REM密度增加,是憂鬱症的睡眠生物標記。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"錯誤。REM潛期會改變(縮短)。","B":"正確(本題選此)。憂鬱症REM潛期縮短。","C":"錯誤。是縮短而非延長。","D":"錯誤。仍會出現REM及其潛期(只是縮短)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Mood disorders & sleep"]}},"107020-67":{"quick":"父母離異屬『社會性(socio)』且時間久遠故為『前置(predisposing)』因子,選A。","detail":{"background":"病因分析的二維架構:時序維度—前置(predisposing,長期背景易感因子)、誘發(precipitating,近期觸發事件)、延續(perpetuating,使病情持續的因子);內容維度—生物(bio)、心理(psycho)、社會(socio)。本題:父母離異(久遠的社會背景)=socio-predisposing(社會性前置);分手事件(近期觸發)=psycho/socio-precipitating(誘發);家族憂鬱病史(遺傳易感、長期)=bio-predisposing(生物性前置)。故A正確。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"正確(本題選此)。父母離異為長期社會背景→社會性前置因子。","B":"錯誤。分手是近期觸發事件,屬『誘發(precipitating)』而非前置。","C":"錯誤。家族病史屬生物性『前置(predisposing)』,非誘發。","D":"錯誤。家族病史屬『生物性前置』,非社會性延續。"},"sources":["Kaplan & Sadock's Synopsis 11e, Biopsychosocial formulation"]}},"107080-63":{"quick":"Melancholic特徵=anhedonia、早醒、晨重暮輕、體重下降、精神運動遲滯,選D。","detail":{"background":"重鬱症『憂鬱特徵(with melancholic features)』標註:幾乎完全失去興趣/快感(anhedonia)或對愉快刺激無反應,加上≥3項:特殊性質的深沉憂鬱、晨間加重(morning worsening,『早上更憂鬱』)、早醒(較平常早≥2小時)、明顯精神運動遲滯或激動、顯著食慾/體重下降、過度或不當罪惡感。常與自主神經/內分泌(HPA軸、cortisol)異常相關、生物性較強、對ECT與抗憂鬱劑反應佳、較少由外在壓力誘發。相對地『非典型(atypical)』特徵為情緒可隨好事反應、嗜睡、食慾/體重增加、四肢沉重、對人際拒絕敏感。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"錯誤。melancholic是『早上(晨間)』更憂鬱,非晚上。","B":"錯誤。melancholic與自主神經/內分泌(HPA軸)改變『有關』。","C":"錯誤。melancholic較『少』由外在壓力誘發(生物性較強)。","D":"正確(本題選此)。主要特徵為anhedonia、早醒、體重下降、精神運動遲滯。"},"sources":["DSM-5-TR (with melancholic features)","Kaplan & Sadock's Synopsis 11e"]}},"109020-72":{"quick":"熱潮紅是『更年期』症狀,非經前症候群常見症狀,故選C。","detail":{"background":"經前症候群(premenstrual syndrome,PMS)與較嚴重的經前不悅症(PMDD)症狀出現於黃體期(月經前一週),包括情緒(憂鬱、焦慮、易怒、情緒起伏)與身體(腹脹、乳房脹痛、頭痛、水腫、疲倦)症狀,於月經來後緩解。熱潮紅(hot flashes)是雌激素下降的『更年期(menopause)』血管舒縮症狀,非PMS的典型表現。PMDD治療首選SSRI(可持續或僅黃體期給藥)。","options":{"A":"常見。PMS有憂鬱情緒。","B":"常見。PMS有焦慮。","C":"正確(本題選此)。熱潮紅是更年期症狀,非PMS常見。","D":"常見。PMS有腹脹/水腫。"},"sources":["DSM-5-TR Premenstrual Dysphoric Disorder","Kaplan & Sadock's Synopsis 11e"]}},"109080-63":{"quick":"PET顯示多數憂鬱患者『前側大腦代謝下降,尤以左側』,選B。","detail":{"background":"憂鬱症腦影像:功能性影像(PET/SPECT)多顯示前額葉(prefrontal,尤其左側背外側)與前扣帶代謝/血流『下降』,膝下扣帶(subgenual cingulate)活性異常;躁症則相反、前額葉活性可增高。憂鬱對睡眠影響為早醒、REM提早與增加、深睡減少(核心體溫調節亦異常)。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"敘述部分正確但非最佳;核心比較重點在前額葉代謝。","B":"正確(本題選此)。多數憂鬱患者前側大腦(尤其左側)代謝下降。","C":"錯誤。憂鬱者優勢側前額葉活性相對『下降』而非升高。","D":"錯誤方向。躁症前額葉活性傾向增高。"},"sources":["Kaplan & Sadock's Synopsis 11e, Mood disorders neuroimaging"]}},"109080-65":{"quick":"PMDD不含『妄想』;妄想屬精神病症狀,選C。","detail":{"background":"經前不悅症(PMDD)DSM-5獨立診斷:黃體期(經前一週)出現≥5項症狀並於月經後數天緩解,須含≥1項情感核心症狀(明顯情緒起伏、易怒/人際衝突、憂鬱/無望、焦慮/緊張),加上其他如興趣減退、注意力差、疲倦、食慾改變、睡眠改變、失控感、身體症狀(乳房脹痛、腹脹)。不包含妄想(妄想屬精神病症狀,PMDD無精神病性症狀)。","options":{"A":"PMDD常見焦慮。","B":"PMDD常見憂鬱。","C":"正確(本題選此)。妄想屬精神病症狀,非PMDD症狀。","D":"PMDD常見易怒。"},"sources":["DSM-5-TR Premenstrual Dysphoric Disorder"]}},"110020-64":{"quick":"與憂鬱有關的神經傳導物質包含NE、serotonin、dopamine等,選C。","detail":{"background":"單胺假說:憂鬱與NE、serotonin(5-HT)、dopamine三大單胺系統功能不足有關。NE主要來自藍斑核(locus ceruleus),5-HT主要來自縫核(raphe nuclei)—A、B選項把來源對調故錯。抗憂鬱劑的基本作用是『抑制單胺再回收(reuptake inhibition)』使突觸單胺增加(SSRI抑制血清素再回收),而非『加強再回收』。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"錯誤。NE來自『藍斑核(locus ceruleus)』,非縫核;raphe是血清素來源。","B":"錯誤。serotonin來自『縫核(raphe nuclei)』,非藍斑核。","C":"正確(本題選此)。憂鬱機轉含NE、serotonin、dopamine等。","D":"錯誤。抗憂鬱劑是『抑制』再回收(reuptake inhibition),非加強。"},"sources":["Kaplan & Sadock's Synopsis 11e, Monoamine hypothesis","Stahl's Essential Psychopharmacology"]}},"111080-64":{"quick":"嚴重憂鬱合併『藥物+心理治療』優於單一治療,選D。","detail":{"background":"憂鬱治療要點:睡眠剝奪可快速但『不持久』、且有轉躁風險;光照治療有效但仍『有轉躁風險』(故非無風險);rTMS最常見副作用是頭皮不適/頭痛,『癲癇』是罕見但嚴重的副作用(非最常見);嚴重個案以藥物合併心理治療(CBT/IPT)優於單一治療。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"錯誤。睡眠剝奪療效不持久。","B":"錯誤。光照治療仍有轉為躁症的風險。","C":"錯誤。rTMS最常見副作用是頭皮不適/頭痛;癲癇罕見。","D":"正確(本題選此)。嚴重個案藥物併心理治療優於單一治療。"},"sources":["APA Practice Guideline for MDD","Kaplan & Sadock's Synopsis 11e"]}},"112020-73":{"quick":"伴隨身體症狀(水腫、乳房脹痛)『仍可能是』PMDD,故C不適當。","detail":{"background":"經前不悅症(PMDD,DSM-5獨立診斷):於黃體期(經前一週)出現≥5項症狀並於月經來後數天緩解,須含≥1項情感核心症狀(明顯情緒起伏、易怒/人際衝突、憂鬱/無望、焦慮/緊張),加上其他如興趣減退、注意力差、疲倦、食慾/睡眠改變、失控感、及『身體症狀』(乳房脹痛、腹脹、頭痛、水腫)。身體症狀本就是診斷項目之一,有身體症狀不代表排除PMDD。治療首選SSRI(可黃體期或持續給藥),次選排卵抑制(口服避孕藥)、鈣補充、CBT。","options":{"A":"正確。典型於月經前一週出現。","B":"正確。症狀含易怒、情緒起伏、焦慮、憂鬱。","C":"錯誤(本題選此)。伴隨水腫、乳房脹痛等身體症狀仍可為PMDD。","D":"正確。SSRI是治療選項之一。"},"sources":["DSM-5-TR Premenstrual Dysphoric Disorder"]}},"112080-64":{"quick":"Bipolar II自殺死亡率『不低於』bipolar I(甚至更高),且初發年齡不一定較晚,故D不適當。","detail":{"background":"情感性疾患:重鬱症女性約男性兩倍;bipolar I盛行率約1%、男女相近(無顯著性別差異);雙極性疾患(尤bipolar I)合併物質濫用、恐慌、強迫症的比例高於重鬱症。關於自殺:雙極性疾患整體自殺風險高,bipolar II因長期處於鬱期、混合特徵、衝動性,自殺企圖率甚至『不低於或高於』bipolar I—故『bipolar II自殺死亡率較低』之敘述不適當。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"正確。重鬱症女性約男性兩倍。","B":"正確。bipolar I盛行率無顯著性別差異。","C":"正確。bipolar I合併物質濫用/恐慌/強迫比例高於重鬱症。","D":"錯誤(本題選此)。bipolar II自殺死亡率不低於bipolar I,且初發年齡不一定較晚。"},"sources":["DSM-5-TR Bipolar and Related Disorders","Kaplan & Sadock's Synopsis 11e"]}},"113020-66":{"quick":"Omega-3作用機轉非『血清素回收抑制』(主要為抗發炎、調節神經膜與神經傳導),故D不適當。","detail":{"background":"醫療食品(medical food)用於憂鬱輔助:SAMe(S-adenosyl-L-methionine)為甲基供體,促進單胺(serotonin、dopamine、NE)合成;Omega-3多元不飽和脂肪酸(EPA/DHA)的作用機轉與抗發炎、調節神經細胞膜流動性與神經傳導有關,『非血清素再回收抑制』(那是SSRI的機轉)。憂鬱病因複雜,單一藥物療法常不足;新藥/醫療食品上市仍應以隨機對照試驗(RCT,有安慰劑組)為實證基礎。","options":{"A":"正確。藥物實證以RCT(含安慰劑對照)為首重。","B":"正確。憂鬱病因複雜,偏重單一療法易療效不足。","C":"正確。SAMe促進serotonin與NE合成。","D":"錯誤(本題選此)。Omega-3機轉主為抗發炎/調節神經膜,非血清素回收抑制。"},"sources":["Kaplan & Sadock's Synopsis 11e, CAM for depression"]}},"113070-65":{"quick":"抗憂鬱劑『無成癮性』,且緩解後仍需『持續治療數月』以防復發,不應一緩解就停藥,故C不適當。","detail":{"background":"重鬱症診斷需≥5項症狀並含『憂鬱情緒或失去興趣』至少一項。可有『非典型』生理變化:食慾/睡眠『增加』。抗憂鬱劑『不會成癮』(突然停藥可能有停藥症候群discontinuation syndrome,但非成癮);治療緩解後應『持續治療(continuation)』約6個月以上(復發者需更久維持治療)以防復發,不可一緩解就停。三環抗憂鬱劑(TCA)過量致死風險高(心臟傳導毒性、抗膽鹼);SSRI過量相對安全。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"正確。診斷須含憂鬱情緒或失去興趣其一。","B":"正確。可有食慾/睡眠增加(非典型特徵)。","C":"錯誤(本題選此)。抗憂鬱劑無成癮性,且緩解後須持續治療數月防復發,不應及早停藥。","D":"正確。TCA過量致死風險高,SSRI較安全。"},"sources":["APA Practice Guideline for MDD","DSM-5-TR; Kaplan & Sadock's Synopsis 11e"]}},"114070-59":{"quick":"雙極性疾患發病年齡『早於』重鬱症,選B。","detail":{"background":"情感性疾患:重鬱症在低社經較高、雙極性疾患則在高社經/高成就者亦不少(『都在低社經較高』之敘述不正確);雙極性疾患平均發病(約18–20歲出頭)早於重鬱症(約40歲);bipolar I診斷『只需一次躁症發作』即可,不必躁鬱期都出現過;bipolar I男女相近(無女性較多)。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"錯誤。雙極性疾患不限低社經;此敘述過度概括。","B":"正確(本題選此)。雙極性疾患發病年齡早於重鬱症。","C":"錯誤。bipolar I只需一次躁症發作即可診斷,不必躁鬱期都出現。","D":"錯誤。bipolar I男女比例相近。"},"sources":["DSM-5-TR Mood Disorders","Kaplan & Sadock's Synopsis 11e"]}},"114070-64":{"quick":"急性壓力造成cortisol/glucocorticoid『升高(HPA軸過度活化)』而非缺乏,故B錯誤。","detail":{"background":"憂鬱症神經生物:急性與慢性壓力活化HPA軸→CRH↑、ACTH↑、cortisol『升高』(非缺乏),長期高cortisol損害海馬(hippocampus)、影響神經可塑性與BDNF;發炎假說(促發炎細胞激素↑)可解釋憂鬱與心血管/代謝/癌症的共病;REM增加與前額葉功能低下;藥物與心理治療可矯正部分腦功能異常。重度憂鬱症(major depressive disorder,MDD)終身盛行率約15%(女性約為男性『兩倍』,女性~20%),平均發病年齡約20–40歲(常引約40歲);DSM-5需≥5項症狀持續≥2週,且至少一項為『憂鬱情緒』或『失去興趣/快感(anhedonia)』,其餘:體重/食慾改變、失眠或嗜睡、精神運動激動或遲滯、疲倦、無價值感/罪惡感、專注力下降、反覆死亡或自殺意念。生物機轉以單胺假說(serotonin血清素來自raphe nuclei縫核、norepinephrine正腎上腺素來自locus ceruleus藍斑核、dopamine)為核心,並有HPA軸過度活化(cortisol升高、dexamethasone不抑制)、發炎假說、神經滋養因子(BDNF)下降、海馬萎縮等。睡眠變化典型為REM潛期『縮短』、第一段REM提早、REM量增加、慢波(深)睡眠減少、總睡眠時數減少與早醒。","options":{"A":"正確。發炎理論解釋憂鬱與心血管/代謝/癌症共病。","B":"錯誤(本題選此)。急性壓力使cortisol/glucocorticoid『升高(HPA過度活化)』而非缺乏。","C":"正確。患者REM增加、前額葉功能低下。","D":"正確。腦功能異常可經藥物或心理治療矯正。"},"sources":["Kaplan & Sadock's Synopsis 11e, Stress, HPA axis & depression"]}},"102030-63":{"quick":"快速循環(rapid cycling)『與藥物(抗憂鬱劑)及壓力有關』,非僅遺傳,故D錯誤。","detail":{"background":"本題病人多次憂鬱發作、用抗憂鬱劑後轉為躁症(antidepressant-induced mania),診斷雙極性疾患。逐項:單用抗憂鬱劑常無法改善雙相鬱期且會誘發躁/快速循環,故需合併情緒穩定劑;lamotrigine對雙相『鬱期預防』優於躁期預防;緩慢加量lamotrigine可降低Stevens-Johnson症候群風險;快速循環(一年≥4次發作)的成因與『抗憂鬱劑使用、甲狀腺低下、壓力』等有關,並非『與藥物及壓力皆無關』。雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。","options":{"A":"正確。單用抗憂鬱劑無法改善雙相鬱期,需合併情緒穩定劑。","B":"正確。lamotrigine對鬱期預防優於躁期。","C":"正確。緩慢加量lamotrigine可降SJS風險。","D":"錯誤(本題選此)。快速循環與抗憂鬱劑使用、甲狀腺低下、壓力等有關,非僅遺傳。"},"sources":["Kaplan & Sadock's Synopsis 11e, Bipolar disorder","DSM-5-TR (rapid cycling specifier)"]}},"102110-69":{"quick":"lithium與valproic acid『皆有』致畸胎性,選C。","detail":{"background":"鋰鹽(lithium)治療濃度窄(急性0.8–1.2、維持0.6–1.0 mEq/L),需定期『監測血中濃度』(不能只靠臨床觀察);中毒(>1.5–2.0)表現:粗大顫抖、腹瀉嘔吐、運動失調、口齒不清、意識混亂、癲癇、心律不整、昏迷,嚴重時『血液透析』可救命;長期副作用:甲狀腺低下、腎源性尿崩、體重增加、腎功能影響;懷孕前三個月致Ebstein三尖瓣異常(心臟畸形)。valproate致神經管缺損與心臟畸形,lamotrigine致唇顎裂並有Stevens-Johnson風險(需緩慢加量),carbamazepine致神經管缺損。 故lithium(Ebstein心臟畸形)與valproic acid(神經管缺損、心臟畸形、發育/認知影響)『皆有』致畸胎性,懷孕期使用須謹慎評估。","options":{"A":"錯誤。並非只有lithium。","B":"錯誤。並非只有valproic acid。","C":"正確(本題選此)。兩者皆有致畸胎性。","D":"錯誤。兩者皆有致畸胎性。"},"sources":["Kaplan & Sadock's Synopsis 11e, Mood stabilizers in pregnancy"]}},"103030-62":{"quick":"Bipolar I『只需一次躁症發作』即可診斷,選B。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。","options":{"A":"錯誤。bipolar I不需『加上一次重鬱發作』,只要一次躁症即可。","B":"正確(本題選此)。bipolar I只需一次躁症發作即可診斷。","C":"錯誤。bipolar II需輕躁+『重鬱』發作(非輕鬱)。","D":"錯誤。bipolar II需輕躁加上重鬱發作,非只要一次輕躁。"},"sources":["DSM-5-TR Bipolar I/II diagnostic criteria"]}},"103030-63":{"quick":"『嚴重失眠』與日後轉為bipolar I的關聯性『較低』,選A。","detail":{"background":"重鬱症日後轉變為bipolar I的『預測因子』:早發、精神病症狀、家族中有bipolar I病史、抗憂鬱劑誘發的(輕)躁、精神運動遲滯、非典型特徵、產後發作。『嚴重失眠』本身非特異性(各型憂鬱皆常見),預測力較低。雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。","options":{"A":"正確(本題選此)。嚴重失眠是非特異症狀,預測轉為bipolar之力較低。","B":"精神病症狀是轉bipolar的預測因子。","C":"家族bipolar I病史是強預測因子。","D":"抗憂鬱劑誘發輕躁是轉bipolar的預測因子。"},"sources":["Kaplan & Sadock's Synopsis 11e, Predictors of bipolar conversion"]}},"103100-63":{"quick":"『症狀緩慢產生且維持長』(隱襲慢性)最不會轉為雙極性,選B。","detail":{"background":"重鬱轉bipolar的預測因子:早發(25歲前)、合併精神病症狀(妄想/幻覺)、家族bipolar病史、急性發作、抗憂鬱劑誘發輕躁。相對地,『症狀緩慢產生且維持時間長』(隱襲、慢性化的憂鬱)較像單極憂鬱或慢性憂鬱(persistent depressive disorder),最不會轉為雙極性。雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。","options":{"A":"早發是轉bipolar的預測因子。","B":"正確(本題選此)。症狀緩慢產生且維持長(隱襲慢性)最不會轉為bipolar。","C":"25歲前合併妄想是轉bipolar的預測因子。","D":"25歲前合併幻覺是轉bipolar的預測因子。"},"sources":["Kaplan & Sadock's Synopsis 11e"]}},"104030-61":{"quick":"valproate最常見致畸是『神經管缺損/心臟畸形』,非膽道閉鎖,故B錯誤。","detail":{"background":"雙相情緒障礙藥物:lithium、valproate、carbamazepine、非典型抗精神病藥;『valproate孕期最常見致畸為神經管缺損(及心臟畸形)』,非膽道閉鎖(故B錯)。","options":{"A":"正確。lithium致Ebstein三尖瓣異常。","B":"錯誤(本題選此)。valproate最常見致畸為神經管缺損(脊柱裂)與心臟畸形、認知影響,非膽道閉鎖。","C":"正確。lamotrigine可致毒性表皮溶解(TEN)/SJS。","D":"正確。carbamazepine可致SJS及神經管缺損。"},"sources":["Kaplan & Sadock's Synopsis 11e, Mood stabilizers (teratogenicity)"]}},"104030-62":{"quick":"躁症發作需持續『≥1週』(或需住院則不限),非『至少3天』,故C錯誤。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 躁症『≥1週』、輕躁『≥4天』。3天為錯誤門檻。","options":{"A":"正確。膨脹自尊/誇大是躁症準則。","B":"正確。睡眠需求減少是躁症準則。","C":"錯誤(本題選此)。躁症需持續≥1週(或需住院則不限時間),非至少3天。","D":"正確。多話/壓力性言談是躁症準則。"},"sources":["DSM-5-TR Manic Episode criteria"]}},"104090-61":{"quick":"躁症若嚴重到需住院,『時間再短也算一次躁症發作』,選C。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 躁症準則特別註明:若症狀嚴重到需住院,則不論持續時間長短皆算一次躁症發作。","options":{"A":"錯誤。反覆洗手是強迫症狀,非躁症/輕躁準則。","B":"錯誤。躁症與輕躁皆可有自信膨脹,非輕躁專屬。","C":"正確(本題選此)。達住院標準者時間再短亦算一次躁症發作。","D":"錯誤。輕躁『不需』造成顯著功能缺損(那是躁症的條件)。"},"sources":["DSM-5-TR Manic/Hypomanic Episode"]}},"105020-61":{"quick":"『不可單用抗憂鬱劑治療躁症』(會惡化躁症),故D錯誤。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 急性躁症治療:鋰鹽、valproate、抗精神病藥(olanzapine等),可短期合併benzodiazepine鎮靜;單用抗憂鬱劑禁用於躁症(會惡化)。","options":{"A":"正確。鋰鹽治療躁症。","B":"正確。可合併benzodiazepine輔助鎮靜。","C":"正確。olanzapine等抗精神病藥有抗躁效果。","D":"錯誤(本題選此)。不可單用抗憂鬱劑治療躁症(會惡化躁症)。"},"sources":["APA/CANMAT Bipolar Guidelines","Kaplan & Sadock's Synopsis 11e"]}},"105020-64":{"quick":"老年期『新發躁症』須鑑別失智症或譫妄等器質性病因,選A。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 老年期首次出現躁症應警覺『次發性(secondary)躁症』,須鑑別失智(尤其額顳葉)、譫妄、腦中風、藥物(類固醇)、甲狀腺等器質病因。","options":{"A":"正確(本題選此)。老年期新發躁症須鑑別失智/譫妄等器質病因。","B":"錯誤。多數雙極性疾患首次發作是『憂鬱』,非躁期。","C":"錯誤。bipolar II自殺危險不低於重鬱症(甚至較高)。","D":"錯誤。雙極性疾患多會復發,並非半數以上終生只發病一次。"},"sources":["Kaplan & Sadock's Synopsis 11e, Bipolar disorder; secondary mania"]}},"105100-61":{"quick":"Bipolar II發病較bipolar I早、婚姻問題較多,選C。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 bipolar II由『輕躁+重鬱』組成(非輕鬱);抗憂鬱劑誘發輕躁時診斷仍為bipolar II/或物質誘發,『不一定改為bipolar I』(DSM-5:藥物誘發若超出藥理作用期則可算雙相);bipolar II自殺風險『不低於甚至高於』bipolar I。","options":{"A":"錯誤。bipolar II是輕躁+『重鬱』,非『輕鬱』。","B":"錯誤(DSM-IV觀點)。抗憂鬱誘發輕躁未必改為bipolar I。","C":"正確(本題選此)。bipolar II發病較早、婚姻問題較多。","D":"錯誤。bipolar II自殺死亡率不低於bipolar I。"},"sources":["DSM-5-TR Bipolar II","Kaplan & Sadock's Synopsis 11e"]}},"105100-67":{"quick":"valproate治急性躁症有效血中濃度約50–120 μg/mL,選D。","detail":{"background":"valproate(valproic acid)治療急性躁症的有效血中濃度約『50–120 μg/mL』(部分文獻採50–125或≥45)。對照:lithium血中濃度以mEq/L計(急性0.8–1.2),carbamazepine約4–12 μg/mL。雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不 idone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 bipolar I男女相近;重鬱症女性約男性兩倍,故兩者性別比率『不同』。bipolar I也可有精神病(妄想/幻覺)、可於青少年發作;bipolar II需輕躁+重鬱。","options":{"A":"正確。bipolar I可有妄想等精神病症狀。","B":"錯誤(本題選此)。雙極性疾患男女相近,與重鬱症(女多)『不同』。","C":"正確。bipolar II需一次輕躁+一次重鬱。","D":"正確。可於青少年期發作。"},"sources":["DSM-5-TR Bipolar epidemiology"]}},"106080-64":{"quick":"急性躁期可用鋰鹽、抗癲癇藥(valproate)或抗精神病藥,選A。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 維持治療中lithium、valproate、carbamazepine『皆需』監測血中濃度(非只有lithium);lamotrigine對『鬱期』預防較好而非躁期;ECT可用於嚴重躁期『與鬱期』(包括難治、孕婦、拒食、高自殺風險)。","options":{"A":"正確(本題選此)。急性躁期可用鋰鹽、抗癲癇藥或抗精神病藥。","B":"錯誤。valproate、carbamazepine也需監測血中濃度。","C":"錯誤。lamotrigine對『鬱期』預防較佳,非躁期。","D":"錯誤。ECT可用於雙相鬱期(及躁期)。"},"sources":["APA/CANMAT Bipolar Guidelines","Kaplan & Sadock's Synopsis 11e"]}},"107020-61":{"quick":"診斷bipolar I須『排除藥物/物質與身體(甲狀腺)病因』,選D。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 本題女病人有誇大妄想(自認巨星)、活動增加—躁症伴精神病。診斷前須排除甲狀腺亢進/低下、類固醇、安非他命等器質與物質病因(DSM-5排除準則)。躁症必然造成顯著功能損害(否則為輕躁);可有重鬱史但非必需(bipolar I只需一次躁症)。","options":{"A":"錯誤。bipolar I只需一次躁症,不必有重鬱發作。","B":"錯誤。躁症定義須造成顯著功能損害(否則為輕躁)。","C":"錯誤。需考慮藥物/物質的可能影響(排除準則)。","D":"正確(本題選此)。須排除甲狀腺等身體病因。"},"sources":["DSM-5-TR Bipolar I / Manic Episode (exclusion)"]}},"107020-62":{"quick":"輕躁準則含『多話/壓力性言談』,選C。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 輕躁(hypomania)準則與躁症相同症狀群(只是程度輕、≥4天、不需住院、無精神病、無顯著功能損害):自尊膨脹、『睡眠需求減少』、多話/壓力性言談、意念飛躍、分心、活動增加、過度享樂高風險行為。","options":{"A":"錯誤。輕躁是『睡眠需求減少』,非增加。","B":"錯誤。輕躁常『分心』,非注意力集中。","C":"正確(本題選此)。多話/壓力性言談是輕躁準則。","D":"錯誤。輕躁是活動『增加』,非減少退縮。"},"sources":["DSM-5-TR Hypomanic Episode"]}},"107080-64":{"quick":"發病年齡『較大』不是bipolar I預後差因子(早發才差),選C。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 bipolar I預後差因子:男性、早發、合併精神病症狀、合併物質(酒精)依賴、混合特徵、快速循環、發作頻繁、未完全緩解。發病年齡『較大』反而不是預後差因子。","options":{"A":"男性是預後差因子。","B":"伴精神病症狀是預後差因子。","C":"正確(本題選此)。發病年齡較大不是預後差因子(早發才差)。","D":"合併酒精依賴是預後差因子。"},"sources":["Kaplan & Sadock's Synopsis 11e, Bipolar prognosis"]}},"107080-65":{"quick":"躁症『相當比例會有幻覺或妄想』(非極少數),故B錯誤。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 約半數以上bipolar I躁症發作可伴精神病症狀(誇大/被害妄想、幻覺),故『只有極少數會有幻覺妄想』錯誤。多數病人首次發作為憂鬱;主要治療為情緒穩定劑;男性常合併物質濫用。","options":{"A":"正確。多數首次發作為憂鬱。","B":"錯誤(本題選此)。相當比例躁症會有幻覺或妄想,非極少數。","C":"正確。主要治療為情緒穩定劑。","D":"正確。男性個案常合併物質濫用。"},"sources":["DSM-5-TR Bipolar I (with psychotic features)"]}},"108030-62":{"quick":"lamotrigine未獲FDA核准用於『躁期』(用於維持/鬱期預防),選D。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 FDA核准抗躁(acute mania)藥物:lithium、valproate、carbamazepine、多種第二代抗精神病藥(及haloperidol)。lamotrigine僅核准用於bipolar『維持治療(預防,偏鬱期)』,『非急性躁期』。","options":{"A":"鋰鹽核准用於躁期。","B":"carbamazepine核准用於躁期。","C":"valproic acid核准用於躁期。","D":"正確(本題選此)。lamotrigine未核准用於躁期(用於維持/鬱期預防)。"},"sources":["FDA labeling; CANMAT Bipolar Guidelines"]}},"108030-63":{"quick":"重鬱症家族遺傳關聯『低於』雙極性、且女性較多,選C。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 重鬱症終身盛行率(~15%)高於bipolar I(~1%);bipolar I只需一次躁症發作即可診斷(不必躁鬱皆經歷);重鬱症遺傳度低於雙極性疾患、女性患者較多;雙相『鬱期』首選非抗憂鬱劑(用quetiapine/lurasidone/lamotrigine/lithium),抗憂鬱劑單用有誘發躁症風險。","options":{"A":"錯誤。重鬱症終身盛行率較『高』。","B":"錯誤。bipolar I只需一次躁症即可,不必躁鬱皆經歷。","C":"正確(本題選此)。重鬱症遺傳關聯低於雙極性、女性較多。","D":"錯誤。雙相鬱期首選非抗憂鬱劑。"},"sources":["DSM-5-TR Mood Disorders"]}},"108080-63":{"quick":"躁症發作『不應給抗憂鬱劑(fluoxetine)』(會惡化),選A。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 本題吳先生多話、3天不睡、誇大、亂花錢=躁症發作。治療用情緒穩定劑(lithium)或抗精神病藥(olanzapine、aripiprazole);『不應給抗憂鬱劑fluoxetine』(會惡化躁症、誘發混合/快速循環)。","options":{"A":"正確(本題選此)。躁症不應給抗憂鬱劑fluoxetine。","B":"olanzapine可治躁症。","C":"lithium可治躁症。","D":"aripiprazole可治躁症。"},"sources":["APA/CANMAT Bipolar Guidelines"]}},"109080-61":{"quick":"『躁期時間較短』是雙相預後較好因子,選D。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 雙相預後『好』:晚發、躁期短、發作次數少、完全緩解、無物質濫用、治療順從。預後『差』:早發、頻繁發作、合併物質濫用、混合/快速循環、自殺意念多。","options":{"A":"早發是預後差因子。","B":"自殺意念多是預後差因子。","C":"合併物質濫用是預後差因子。","D":"正確(本題選此)。躁期時間較短是預後較好因子。"},"sources":["Kaplan & Sadock's Synopsis 11e, Bipolar prognosis"]}},"109080-62":{"quick":"並非『所有』雙相病人首次都先躁後鬱;多數首次發作為憂鬱,故D錯誤。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 多數雙極性疾患『首次發作為憂鬱』,而非皆先躁/輕躁再鬱;反覆躁症可用長效針劑;長期病人可有認知與社會功能殘損;有思覺失調家族史者罹患雙相機率亦較高(兩病有部分共同遺傳)。","options":{"A":"正確。反覆躁症可用抗精神病藥長效針劑。","B":"正確。長期患者可有認知與社會功能障礙。","C":"正確。思覺失調家族史者罹雙相機率較高。","D":"錯誤(本題選此)。並非皆先躁後鬱;多數首次發作是憂鬱。"},"sources":["DSM-5-TR Bipolar disorder course"]}},"109080-78":{"quick":"鋰鹽(lithium)用於『躁症發作』,選C。","detail":{"background":"鋰鹽(lithium)治療濃度窄(急性0.8–1.2、維持0.6–1.0 mEq/L),需定期『監測血中濃度』(不能只靠臨床觀察);中毒(>1.5–2.0)表現:粗大顫抖、腹瀉嘔吐、運動失調、口齒不清、意識混亂、癲癇、心律不整、昏迷,嚴重時『血液透析』可救命;長期副作用:甲狀腺低下、腎源性尿崩、體重增加、腎功能影響;懷孕前三個月致Ebstein三尖瓣異常(心臟畸形)。valproate致神經管缺損與心臟畸形,lamotrigine致唇顎裂並有Stevens-Johnson風險(需緩慢加量),carbamazepine致神經管缺損。 鋰鹽核心適應症為雙極性疾患(急性躁症、維持治療、降自殺風險),亦可作難治型憂鬱的增強(augmentation)。對酗酒、恐慌症、厭食症非適應症。","options":{"A":"錯誤。酗酒非lithium適應症。","B":"錯誤。恐慌症非lithium適應症。","C":"正確(本題選此)。鋰鹽用於急性躁症。","D":"錯誤。厭食症非lithium適應症。"},"sources":["Kaplan & Sadock's Synopsis 11e, Lithium indications"]}},"110020-61":{"quick":"本題為送分題(四個情緒穩定劑致畸描述皆屬正確/有依據),一律給分。","detail":{"background":"鋰鹽(lithium)治療濃度窄(急性0.8–1.2、維持0.6–1.0 mEq/L),需定期『監測血中濃度』(不能只靠臨床觀察);中毒(>1.5–2.0)表現:粗大顫抖、腹瀉嘔吐、運動失調、口齒不清、意識混亂、癲癇、心律不整、昏迷,嚴重時『血液透析』可救命;長期副作用:甲狀腺低下、腎源性尿崩、體重增加、腎功能影響;懷孕前三個月致Ebstein三尖瓣異常(心臟畸形)。valproate致神經管缺損與心臟畸形,lamotrigine致唇顎裂並有Stevens-Johnson風險(需緩慢加量),carbamazepine致神經管缺損。 四選項分別描述lithium(Ebstein心臟畸形)、valproic acid(心臟畸形/神經管缺損)、lamotrigine(唇顎裂之爭議)、carbamazepine(神經管缺損)之致畸風險,皆有文獻依據,故本題公告送分、一律給分。","options":{"A":"敘述正確(lithium與Ebstein異常有關)。","B":"敘述正確(valproic acid增心臟畸形風險)。","C":"敘述有依據(lamotrigine與唇顎裂之關聯曾有報告,後續證據不一)。","D":"敘述正確(carbamazepine與神經管缺損有關)。"},"sources":["Kaplan & Sadock's Synopsis 11e (teratogenicity); 考選部公告送分"]}},"110080-60":{"quick":"本題多重答案(B、D皆錯/均給分):異卵雙胞胎共病率約16–35%(B數字爭議)、且環境vs生物比例D描述有誤。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 雙極性疾患遺傳度高:單卵雙胞胎共病率約40–70%(部分文獻達70–90%)、異卵約5–25%;為高度遺傳的精神疾病(遺傳貢獻約60–85%,非『環境70%、生物30%』)。家族成員自殺率較高;已知與多個染色體區域(含18q、22q)相關。本題B(雙胞胎共病率數字)與D(環境70%/生物30%)皆被認定為錯誤而均給分。","options":{"A":"正確。家族成員自殺身亡比率較高。","B":"列為錯誤(本題接受)。異卵雙胞胎共病率數字有爭議。","C":"正確。第18、22對染色體長臂被認為相關。","D":"錯誤(本題選此)。雙極性疾患遺傳(生物)貢獻高(約60–85%),非環境占70%。"},"sources":["Kaplan & Sadock's Synopsis 11e, Bipolar genetics; 考選部公告多重答案"]}},"110080-61":{"quick":"抗精神病藥『可』用於雙相維持(預防)治療,故D錯誤。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 第二代抗精神病藥(如quetiapine、aripiprazole、olanzapine、risperidone長效針劑)已有證據用於雙相『維持/預防』治療;亦可治急性躁症、作難治型憂鬱的輔助;副作用含體重增加、代謝異常、EPS。故『尚未有證據用於預防性維持治療』錯誤。","options":{"A":"正確。抗精神病藥可治躁症發作。","B":"正確。可作難治型憂鬱輔助治療。","C":"正確。副作用含肥胖、EPS等。","D":"錯誤(本題選此)。抗精神病藥『可』用於雙相維持(預防)治療。"},"sources":["CANMAT/ISBD Bipolar Guidelines"]}},"111020-61":{"quick":"雙相情緒障礙『較重鬱症「更常」合併物質使用障礙』,故A錯誤。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 雙極性疾患合併物質使用障礙的比例高於重鬱症(衝動性、自我治療);可有明顯幻聽妄想;每次躁症發作增加後續復發風險(kindling效應),故需預防性維持;早發、治療效果不佳的憂鬱日後可能轉診斷為雙相。","options":{"A":"錯誤(本題選此)。雙相『較』重鬱症『更常』合併物質使用障礙。","B":"正確。雙相可出現明顯幻聽或妄想。","C":"正確。每次躁症增加後續發作風險,需預防復發。","D":"正確。早發、難治的憂鬱可能轉為雙相診斷。"},"sources":["DSM-5-TR Bipolar (comorbid substance use)"]}},"111020-62":{"quick":"lamotrigine未獲FDA核准用於『躁症』,選C。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 核准抗躁的第二代抗精神病藥含risperidone、olanzapine、aripiprazole、quetiapine、ziprasidone、asenapine、cariprazine等;lamotrigine僅核准維持(偏鬱期預防),非急性躁症。","options":{"A":"risperidone核准用於躁症。","B":"olanzapine核准用於躁症。","C":"正確(本題選此)。lamotrigine未核准用於躁症。","D":"aripiprazole核准用於躁症。"},"sources":["FDA labeling"]}},"112080-62":{"quick":"情緒穩定劑(尤其valproate、lithium、carbamazepine)致畸風險『不低於甚至高於』部分抗精神病藥,故B不適當。","detail":{"background":"鋰鹽(lithium)治療濃度窄(急性0.8–1.2、維持0.6–1.0 mEq/L),需定期『監測血中濃度』(不能只靠臨床觀察);中毒(>1.5–2.0)表現:粗大顫抖、腹瀉嘔吐、運動失調、口齒不清、意識混亂、癲癇、心律不整、昏迷,嚴重時『血液透析』可救命;長期副作用:甲狀腺低下、腎源性尿崩、體重增加、腎功能影響;懷孕前三個月致Ebstein三尖瓣異常(心臟畸形)。valproate致神經管缺損與心臟畸形,lamotrigine致唇顎裂並有Stevens-Johnson風險(需緩慢加量),carbamazepine致神經管缺損。 多數第二代抗精神病藥(如quetiapine、olanzapine)在懷孕的致畸風險相對較低,而valproate(神經管缺損、IQ下降)、carbamazepine(神經管缺損)、lithium(Ebstein)致畸風險明確;故『情緒穩定劑致畸風險較抗精神病藥低』之概括不適當。lithium可降自殺風險、需注意飲水量(脫水致濃度上升中毒)、過量可致手抖腹瀉口齒不清。","options":{"A":"正確。lithium可降雙相患者自殺風險。","B":"錯誤(本題選此)。情緒穩定劑(valproate/carbamazepine/lithium)致畸風險不低於甚至高於部分抗精神病藥。","C":"正確。服lithium須注意飲水量以免濃度起伏。","D":"正確。lithium過量可見手抖、腹瀉、口齒不清。"},"sources":["Kaplan & Sadock's Synopsis 11e, Teratogenicity of mood stabilizers vs antipsychotics"]}},"113020-60":{"quick":"同卵雙胞胎一位罹雙相,另一位罹病率約『40–70%』(非25%),故B不適當。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 雙相遺傳度高:同卵雙胞胎共病率約40–70%(本題以25%為錯);家族有雙相者其親屬罹『憂鬱症與雙相』機率皆升高;雙相多躁鬱皆有,鬱期較躁期多,約10–20%只出現躁症未經歷鬱期;年輕急性期鋰鹽治療濃度約0.6–1.2 mEq/L。","options":{"A":"正確。家族有雙相者罹憂鬱機率亦升高。","B":"錯誤(本題選此)。同卵雙胞胎另一位罹病率約40–70%,非25%。","C":"正確。鬱期較躁期多,約10–20%僅有躁期。","D":"正確。急性期鋰鹽濃度約0.6–1.2 mEq/L。"},"sources":["Kaplan & Sadock's Synopsis 11e, Bipolar genetics"]}},"113020-61":{"quick":"監測鋰鹽中毒最有效是『測血中濃度』,非臨床觀察,故D不適當。","detail":{"background":"鋰鹽(lithium)治療指數窄,監測中毒『最有效為測血中濃度』(非僅臨床觀察)(故D不適當);中毒見震顫、腹瀉、共濟失調、意識改變。","options":{"A":"正確。lithium可致噁心嘔吐腹瀉、視力模糊。","B":"正確。嚴重中毒可致痙攣、心律不整、昏迷。","C":"正確。血液透析是嚴重lithium中毒的救命療法。","D":"錯誤(本題選此)。最有效監測是『測血中濃度』,非僅臨床觀察(治療窗窄)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Lithium toxicity & monitoring"]}},"113070-61":{"quick":"與『生活事件有關』的憂鬱(反應性)較無法預測轉為雙相,選D。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 預測憂鬱轉雙相之因子:25歲前合併精神病症狀、頻繁發作(>5次)、精神運動遲滯、早發、家族雙相史、抗憂鬱劑誘發輕躁。與『生活事件相關(反應性)』的憂鬱較偏單極反應性憂鬱,預測轉雙相之力較低。","options":{"A":"25歲前合併精神病症狀是預測因子。","B":">5次發作是預測因子。","C":"精神運動遲滯是預測因子。","D":"正確(本題選此)。與生活事件相關的憂鬱較無法預測轉為雙相。"},"sources":["Kaplan & Sadock's Synopsis 11e"]}},"114020-62":{"quick":"雙相『多會復發』,『約一半只發作一次』不正確,故C錯誤。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 雙極性疾患是高復發疾病(>90%躁症病人會再發),『約一半終生只發作一次』錯誤(那較像單次發作的重鬱症,且重鬱也常復發)。bipolar II轉bipolar I比率低(5年內多不轉);ECT可用於嚴重躁/鬱期;發病平均年齡早於重鬱症。","options":{"A":"正確。多數bipolar II 5年內不轉為bipolar I。","B":"正確。ECT可用於嚴重躁期或鬱期。","C":"錯誤(本題選此)。雙相多會復發,『約一半只發作一次』不正確。","D":"正確。雙相發病平均年齡早於憂鬱症。"},"sources":["DSM-5-TR Bipolar course"]}},"115020-60":{"quick":"雙相『鬱期』不宜用risperidone(該藥用於躁症;鬱期證據以quetiapine/lurasidone/lamotrigine/lithium為主),故A最不適當。","detail":{"background":"雙極性疾患(bipolar disorder):bipolar I只需『一次躁症發作(manic episode)』即可診斷(不必有鬱期);躁症定義為情緒高昂/易怒且活動量增加持續≥1週(或需住院則不限時間),DSM-5需≥3項(易怒則≥4項):膨脹自尊/誇大、睡眠需求減少、多話/壓力性言談、意念飛躍、分心、活動量/精神運動增加、過度從事高風險享樂活動(亂花錢、性、投資)，且造成顯著功能損害或需住院或有精神病症狀。輕躁(hypomania)持續≥4天、症狀同躁症但『未致顯著功能損害、不需住院、無精神病症狀』;bipolar II需『≥1次輕躁+≥1次重鬱發作』。bipolar I盛行率約1%、男女相近、發病平均約18–20歲(早於重鬱症)。多數病人第一次發作為『憂鬱』而非躁症。治療:急性躁期用鋰鹽/valproate/抗精神病藥(±BZD輔助),『單用抗憂鬱劑禁忌(會誘發躁症/快速循環)』;鬱期用quetiapine、lurasidone、lamotrigine、lithium;維持期用情緒穩定劑(lithium為金標準、可降自殺風險)或抗精神病藥(含長效針劑)。 bipolar鬱期(bipolar depression)有實證的藥物:quetiapine、lurasidone、lamotrigine、lithium、olanzapine-fluoxetine合劑、cariprazine。risperidone主要用於『躁症』,對雙相鬱期缺乏療效證據,故為最不適當選項。","options":{"A":"錯誤(本題選此)。risperidone用於躁症,對雙相鬱期療效證據不足,最不適當。","B":"適當。lithium可用於雙相鬱期。","C":"適當。lurasidone是雙相鬱期核准藥。","D":"適當。lamotrigine用於雙相鬱期/維持。"},"sources":["CANMAT/ISBD Bipolar Depression Guidelines"]}},"101030-67":{"quick":"恐慌症患者自殺危險性『不低』(升高),故D錯誤。","detail":{"background":"恐慌症(panic disorder):反覆無預警恐慌發作+預期焦慮、廣場恐懼;『自殺危險性升高(不低)』,常合併憂鬱(故D『不低』之敘述判為錯)。","options":{"A":"正確。恐慌症陣發發作但屬慢性病。","B":"正確。咖啡因、尼古丁會惡化恐慌。","C":"正確。可併發憂鬱、物質濫用、強迫症。","D":"錯誤(本題選此)。恐慌症患者自殺危險性『升高』,非不高。"},"sources":["DSM-5-TR Panic Disorder","Kaplan & Sadock's Synopsis 11e"]}},"101030-68":{"quick":"OCD強迫思想出現頻率由高到低:污染>病態懷疑>身體>對稱>攻擊/性,本題答案A(4231)。","detail":{"background":"強迫症(OCD)常見強迫思想(obsession)內容由高到低約為:污染(contamination,怕髒/細菌)最常見、病態性懷疑(pathological doubt,如門有沒有鎖)、身體擔憂、對稱/精確(symmetry)、攻擊性/性/褻瀆等侵入性念頭。對應強迫行為(compulsion)以清洗、檢查、計數、排列、重複最常見。本題4=污染、2=病態懷疑、3=攻擊性念頭、1=對稱,故由高到低為4-2-?-1;標準答案A(4231)。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"正確(本題選此)。污染(4)>病態懷疑(2)>無恥/攻擊念頭(3)>對稱(1)。","B":"順序不符。","C":"順序不符。","D":"順序不符。"},"sources":["Kaplan & Sadock's Synopsis 11e, OCD (obsession content frequency)"]}},"101030-69":{"quick":"無預警、約10分鐘達高峰、心悸冒汗瀕死感=恐慌症,選B。","detail":{"background":"恐慌發作:突發、無預警、約10分鐘達高峰之心悸、冒汗、顫抖、呼吸困難、瀕死/失控感→恐慌症(B);發作短暫、檢查正常。","options":{"A":"廣泛性焦慮是『慢性持續』擔憂,非陣發10分鐘達峰。","B":"正確(本題選此)。無預警、快速達峰、瀕死/發狂感=恐慌發作。","C":"PTSD需有創傷事件與再經驗/逃避症狀。","D":"強迫症以強迫思想/行為為主。"},"sources":["DSM-5-TR Panic Disorder"]}},"
