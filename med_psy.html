『預後不佳的指標』(死亡率高)。病因為身體性(感染、缺氧、電解質、藥物、戒斷、術後、器官衰竭),『與身體疾病密切相關』。EEG典型為『瀰漫性慢波(generalized slowing)』(物質戒斷型可快波)。與失智的鑑別:譫妄急性、波動、注意力受損、意識混濁;失智慢性、進行、意識清楚、記憶為主。前置因子(predisposing,易感背景):高齡、原有失智/認知障礙、感官缺損(失明/失聰)、多重共病、多重用藥、功能依賴;誘發因子(precipitating,急性觸發):手術/麻醉、感染、藥物(抗膽鹼、鎮靜)、脫水、電解質、尿管/約束、ICU環境。治療:找出並矯正潛在病因(首要)、非藥物(定向提示如時鐘/家人照片、改善睡眠、減少約束)、必要時『低劑量抗精神病藥(haloperidol)』短期控制嚴重激動/精神症狀;BZD一般『非首選』(可加重譫妄,除非酒精/BZD戒斷)。 低活動量型(hypoactive)譫妄表現淡漠、嗜睡,易與憂鬱混淆;EEG在譫妄呈『瀰漫性慢波』,在憂鬱多正常,故EEG是兩者鑑別的最佳檢查。","options":{"A":"腰椎穿刺用於懷疑中樞感染,非鑑別憂鬱。","B":"正確(本題選此)。EEG瀰漫性慢波可鑑別譫妄與憂鬱。","C":"CT用於排除結構病灶,非鑑別憂鬱。","D":"生化檢查找病因但非鑑別憂鬱與譫妄的最佳工具。"},"sources":["Kaplan & Sadock's Synopsis 11e, Delirium (EEG)"]}},"107020-73":{"quick":"本題多重答案(A、B皆接受):譫妄核心是注意力障礙、病程數天至數週,均給分。","detail":{"background":"譫妄(delirium)是急性、波動性的『意識/注意力』障礙加上認知改變,核心是『注意力(attention)無法集中』與意識清醒度下降;急性發作(數小時至數天)、症狀時好時壞、夜間加重(sundowning)、自然病程數天至數週、常可逆但為『預後不佳的指標』(死亡率高)。病因為身體性(感染、缺氧、電解質、藥物、戒斷、術後、器官衰竭),『與身體疾病密切相關』。EEG典型為『瀰漫性慢波(generalized slowing)』(物質戒斷型可快波)。與失智的鑑別:譫妄急性、波動、注意力受損、意識混濁;失智慢性、進行、意識清楚、記憶為主。前置因子(predisposing,易感背景):高齡、原有失智/認知障礙、感官缺損(失明/失聰)、多重共病、多重用藥、功能依賴;誘發因子(precipitating,急性觸發):手術/麻醉、感染、藥物(抗膽鹼、鎮靜)、脫水、電解質、尿管/約束、ICU環境。治療:找出並矯正潛在病因(首要)、非藥物(定向提示如時鐘/家人照片、改善睡眠、減少約束)、必要時『低劑量抗精神病藥(haloperidol)』短期控制嚴重激動/精神症狀;BZD一般『非首選』(可加重譫妄,除非酒精/BZD戒斷)。 逐項:譫妄『核心』症狀現代觀點是『注意力障礙』(舊觀點強調定向感),自然病程數天至數週;與物質相關者於『中毒或戒斷』皆可發生(非只戒斷);多為急性發作、易被注意(非緩慢)。官方接受A(定向感障礙)與B(數天到數週)皆給分。","options":{"A":"接受(本題給分)。傳統觀點以定向感障礙為核心(現代更強調注意力)。","B":"正確(本題給分)。自然病程約數天到數週。","C":"錯誤。物質相關譫妄於中毒『或』戒斷皆可發生,非只戒斷。","D":"錯誤。譫妄多急性發作,非緩慢不易察覺。"},"sources":["DSM-5-TR Delirium; 考選部公告多重答案(A/B)"]}},"108030-52":{"quick":"譫妄與失智最大區別是譫妄『注意力不集中』,選B。","detail":{"background":"譫妄與失智最大區別在『注意力(attention)障礙』——譫妄注意力不集中且急性波動(B);失智早期注意力相對保留。","options":{"A":"聽幻覺兩者皆可有,非最大區別。","B":"正確(本題選此)。注意力(attention)障礙是譫妄與失智的關鍵區別。","C":"攻擊行為兩者皆可有。","D":"癲癇非譫妄與失智的鑑別重點。"},"sources":["DSM-5-TR Delirium vs Major NCD"]}},"109020-62":{"quick":"抗精神病『長效針劑』非治療譫妄首選(用短效、可調),故A錯誤。","detail":{"background":"譫妄處置:用『短效、可調劑量』抗精神病藥(如haloperidol);『長效針劑非首選』(A,無法隨病情調整)。","options":{"A":"錯誤(本題選此)。譫妄用『短效、可滴定』的抗精神病藥(如口服/注射haloperidol)短期控制,非長效針劑。","B":">70歲是譫妄高危群。","C":"譫妄是預後不佳的臨床指標。","D":"核心症狀含意識障礙與認知、知覺改變。"},"sources":["DSM-5-TR Delirium management"]}},"110020-68":{"quick":"額顳葉認知障礙症(FTD)『學習記憶與知覺-動作』相對保存,非『社會認知』保存,故D錯誤。","detail":{"background":"DSM-5以『神經認知障礙症(neurocognitive disorder,NCD)』取代失智:六大認知範疇=複雜注意力、執行功能、學習與記憶、語言、知覺-動作、社會認知(定向感屬注意力/記憶面向,非獨立範疇)。輕型(mild NCD)=認知下降但『不』干擾日常獨立生活;重型(major NCD,即失智)=干擾日常獨立。 額顳葉神經認知障礙症(FTD):分行為變異型(behavioral variant,失抑制、冷漠、同理心喪失、強迫/刻板、飲食改變)與語言型(原發性進行性失語);常較早發病(45–65歲)、有家族遺傳傾向、進展可較快;其特徵是『執行功能與社會認知』先受損,而『學習記憶與知覺-動作』相對保存。故D把保存的範疇寫成『學習記憶與社會認知』錯誤(社會認知是FTD早受損的)。","options":{"A":"正確。分行為與語言兩型。","B":"正確。家族遺傳型較早發病。","C":"正確。較阿茲海默進展可較快。","D":"錯誤(本題選此)。FTD相對保存的是『學習記憶與知覺-動作』,社會認知反而早受損。"},"sources":["DSM-5-TR Frontotemporal NCD"]}},"110080-62":{"quick":"譫妄失眠用BZD宜避免長效(易加重譫妄/日間殘餘),故C錯誤。","detail":{"background":"譫妄治療:處理病因+環境支持;『安眠用BZD宜避免長效』(易加重譫妄/日間殘餘)(故C錯);酒精戒斷譫妄才以BZD為主。","options":{"A":"正確。老人譫妄未及時治療致死率高。","B":"正確。低劑量haloperidol短期控制嚴重精神症狀。","C":"錯誤(本題選此)。譫妄失眠『不宜』優先用長效BZD(BZD本就易加重譫妄,長效更糟);BZD非首選,僅酒精/BZD戒斷型才用。","D":"正確。首要治療目標是處理潛在病因。"},"sources":["DSM-5-TR Delirium management"]}},"110080-69":{"quick":"輕型認知障礙症(mild NCD)『不』干擾日常獨立,故B錯誤。","detail":{"background":"認知障礙症(DSM-5):重型(major NCD)干擾日常獨立;『輕型(mild NCD)不干擾日常獨立功能』(故B『輕型干擾日常』錯)。","options":{"A":"正確。六大認知範疇含複雜注意力、社交認知、語言、知覺-動作、學習記憶、執行功能。","B":"錯誤(本題選此)。mild NCD認知缺損『不』干擾日常獨立(干擾獨立者為major NCD/失智)。","C":"正確。mild NCD之缺損非只出現於譫妄(須持續存在)。","D":"正確。認知缺損不能以其他精神疾病更好解釋。"},"sources":["DSM-5-TR Mild/Major Neurocognitive Disorder"]}},"111020-67":{"quick":"操作能力(praxis)屬『知覺-動作』範疇,非執行功能,選C。","detail":{"background":"DSM-5以『神經認知障礙症(neurocognitive disorder,NCD)』取代失智:六大認知範疇=複雜注意力、執行功能、學習與記憶、語言、知覺-動作、社會認知(定向感屬注意力/記憶面向,非獨立範疇)。輕型(mild NCD)=認知下降但『不』干擾日常獨立生活;重型(major NCD,即失智)=干擾日常獨立。 執行功能(executive function)含計畫、決策、工作記憶(working memory)、回饋/錯誤修正、心理彈性、抑制與覆寫習慣。操作能力(praxis,執行學得動作)屬『知覺-動作(perceptual-motor)』範疇,非執行功能。","options":{"A":"工作記憶屬執行功能。","B":"錯誤修正屬執行功能。","C":"正確(本題選此)。praxis屬知覺-動作範疇,非執行功能。","D":"決策屬執行功能。"},"sources":["DSM-5-TR Neurocognitive Domains"]}},"111080-68":{"quick":"路易氏體認知障礙核心特徵是『具體反覆的視幻覺』『認知波動』『自發性巴金森氏症』『REM睡眠行為障礙』,『結構系統妄想』非核心,故A錯誤。","detail":{"background":"DSM-5以『神經認知障礙症(neurocognitive disorder,NCD)』取代失智:六大認知範疇=複雜注意力、執行功能、學習與記憶、語言、知覺-動作、社會認知(定向感屬注意力/記憶面向,非獨立範疇)。輕型(mild NCD)=認知下降但『不』干擾日常獨立生活;重型(major NCD,即失智)=干擾日常獨立。 路易氏體失智(DLB)核心臨床特徵(core):①波動性認知(注意/警覺顯著起伏)②反覆而具體的視幻覺③自發性巴金森氏症④REM睡眠行為障礙;支持特徵含對抗精神病藥極敏感(antipsychotic sensitivity)、反覆跌倒/暈厥。『結構且有系統的妄想』非DLB核心診斷特徵。","options":{"A":"錯誤(本題選此)。結構系統的妄想非DLB核心特徵。","B":"正確。具體反覆的視幻覺是核心特徵。","C":"正確。認知波動合併注意力/警覺改變是核心。","D":"正確。自發性巴金森氏症是核心特徵。"},"sources":["DSM-5-TR NCD with Lewy Bodies; DLB consortium criteria"]}},"111080-70":{"quick":"譫妄病人反覆固著回答前一題=『轉換注意力』障礙,選B。","detail":{"background":"譫妄(delirium)是急性、波動性的『意識/注意力』障礙加上認知改變,核心是『注意力(attention)無法集中』與意識清醒度下降;急性發作(數小時至數天)、症狀時好時壞、夜間加重(sundowning)、自然病程數天至數週、常可逆但為『預後不佳的指標』(死亡率高)。病因為身體性(感染、缺氧、電解質、藥物、戒斷、術後、器官衰竭),『與身體疾病密切相關』。EEG典型為『瀰漫性慢波(generalized slowing)』(物質戒斷型可快波)。與失智的鑑別:譫妄急性、波動、注意力受損、意識混濁;失智慢性、進行、意識清楚、記憶為主。前置因子(predisposing,易感背景):高齡、原有失智/認知障礙、感官缺損(失明/失聰)、多重共病、多重用藥、功能依賴;誘發因子(precipitating,急性觸發):手術/麻醉、感染、藥物(抗膽鹼、鎮靜)、脫水、電解質、尿管/約束、ICU環境。治療:找出並矯正潛在病因(首要)、非藥物(定向提示如時鐘/家人照片、改善睡眠、減少約束)、必要時『低劑量抗精神病藥(haloperidol)』短期控制嚴重激動/精神症狀;BZD一般『非首選』(可加重譫妄,除非酒精/BZD戒斷)。 注意力可分聚焦(focus)、維持(sustain)、轉換(shift)。病人已被問新問題卻反覆固著(perseveration)回答上一題,反映『轉換注意力(shift attention)』困難。","options":{"A":"察覺力非本題描述。","B":"正確(本題選此)。固著前一題=轉換注意力障礙。","C":"聚焦注意力是能否集中於目標。","D":"維持注意力是持續度。"},"sources":["DSM-5-TR Delirium (attention)"]}},"112020-69":{"quick":"白內障術後當晚急性視幻覺、注意力差、波動=術後譫妄,首選haloperidol,選A。","detail":{"background":"譫妄(delirium)是急性、波動性的『意識/注意力』障礙加上認知改變,核心是『注意力(attention)無法集中』與意識清醒度下降;急性發作(數小時至數天)、症狀時好時壞、夜間加重(sundowning)、自然病程數天至數週、常可逆但為『預後不佳的指標』(死亡率高)。病因為身體性(感染、缺氧、電解質、藥物、戒斷、術後、器官衰竭),『與身體疾病密切相關』。EEG典型為『瀰漫性慢波(generalized slowing)』(物質戒斷型可快波)。與失智的鑑別:譫妄急性、波動、注意力受損、意識混濁;失智慢性、進行、意識清楚、記憶為主。前置因子(predisposing,易感背景):高齡、原有失智/認知障礙、感官缺損(失明/失聰)、多重共病、多重用藥、功能依賴;誘發因子(precipitating,急性觸發):手術/麻醉、感染、藥物(抗膽鹼、鎮靜)、脫水、電解質、尿管/約束、ICU環境。治療:找出並矯正潛在病因(首要)、非藥物(定向提示如時鐘/家人照片、改善睡眠、減少約束)、必要時『低劑量抗精神病藥(haloperidol)』短期控制嚴重激動/精神症狀;BZD一般『非首選』(可加重譫妄,除非酒精/BZD戒斷)。 本題糖尿病老人白內障術後當晚出現視幻覺、坐立難安、注意力不集中且波動=術後譫妄。控制嚴重激動/精神症狀首選低劑量haloperidol;lithium、propranolol非譫妄用藥;diazepam(BZD)會加重譫妄(非戒斷型),不宜。","options":{"A":"正確(本題選此)。低劑量haloperidol控制術後譫妄的激動/精神症狀。","B":"lithium用於雙相,非譫妄。","C":"propranolol非譫妄治療。","D":"diazepam(BZD)會加重譫妄(非戒斷型),不宜。"},"sources":["DSM-5-TR Delirium management"]}},"112080-76":{"quick":"失智症『可能出現幻覺』(尤其路易氏體、中重度BPSD),故B最不適當。","detail":{"background":"譫妄(delirium)是急性、波動性的『意識/注意力』障礙加上認知改變,核心是『注意力(attention)無法集中』與意識清醒度下降;急性發作(數小時至數天)、症狀時好時壞、夜間加重(sundowning)、自然病程數天至數週、常可逆但為『預後不佳的指標』(死亡率高)。病因為身體性(感染、缺氧、電解質、藥物、戒斷、術後、器官衰竭),『與身體疾病密切相關』。EEG典型為『瀰漫性慢波(generalized slowing)』(物質戒斷型可快波)。與失智的鑑別:譫妄急性、波動、注意力受損、意識混濁;失智慢性、進行、意識清楚、記憶為主。前置因子(predisposing,易感背景):高齡、原有失智/認知障礙、感官缺損(失明/失聰)、多重共病、多重用藥、功能依賴;誘發因子(precipitating,急性觸發):手術/麻醉、感染、藥物(抗膽鹼、鎮靜)、脫水、電解質、尿管/約束、ICU環境。治療:找出並矯正潛在病因(首要)、非藥物(定向提示如時鐘/家人照片、改善睡眠、減少約束)、必要時『低劑量抗精神病藥(haloperidol)』短期控制嚴重激動/精神症狀;BZD一般『非首選』(可加重譫妄,除非酒精/BZD戒斷)。 本題失智老人走失、自言自語就醫:鑑別應含譫妄、失智惡化、精神疾病;失智症『可出現幻覺』(BPSD、路易氏體早期視幻覺),故B『通常不會出現幻覺』不適當;有震顫不能據以排除譫妄(譫妄可有撲翼樣震顫asterixis);到院應儘速測血糖(低血糖致急性意識變化)。","options":{"A":"適當。鑑別含譫妄、失智、精神疾病。","B":"錯誤(本題選此)。失智症『可能』出現幻覺,非通常不會。","C":"不適當的反面但本題選最不適當為B。震顫不能排除譫妄。","D":"適當。應儘速測血糖。"},"sources":["DSM-5-TR Delirium/Major NCD"]}},"113020-68":{"quick":"譫妄患者『不應長時間約束』(約束會加重譫妄、增傷害),故D最不適當。","detail":{"background":"譫妄治療『不應長時間約束』(約束加重激動/譫妄與傷害)(故D最不適當);以治本、環境調整、必要時低劑量抗精神病藥。","options":{"A":"適當。可用抗精神病藥控制行為紊亂與激動。","B":"適當(相對)。失眠可選短中效BZD輔助但須謹慎(BZD一般非首選)。","C":"適當。擺放家人照片、時鐘建立定向感。","D":"錯誤(本題選此)。不應長時間約束(會加重譫妄、增加傷害與耗竭),應盡量避免。"},"sources":["DSM-5-TR Delirium management"]}},"113070-70":{"quick":"加護病房『環境』是『誘發(precipitating)』因子,非前置因子,故C最不適當。","detail":{"background":"譫妄(delirium)是急性、波動性的『意識/注意力』障礙加上認知改變,核心是『注意力(attention)無法集中』與意識清醒度下降;急性發作(數小時至數天)、症狀時好時壞、夜間加重(sundowning)、自然病程數天至數週、常可逆但為『預後不佳的指標』(死亡率高)。病因為身體性(感染、缺氧、電解質、藥物、戒斷、術後、器官衰竭),『與身體疾病密切相關』。EEG典型為『瀰漫性慢波(generalized slowing)』(物質戒斷型可快波)。與失智的鑑別:譫妄急性、波動、注意力受損、意識混濁;失智慢性、進行、意識清楚、記憶為主。前置因子(predisposing,易感背景):高齡、原有失智/認知障礙、感官缺損(失明/失聰)、多重共病、多重用藥、功能依賴;誘發因子(precipitating,急性觸發):手術/麻醉、感染、藥物(抗膽鹼、鎮靜)、脫水、電解質、尿管/約束、ICU環境。治療:找出並矯正潛在病因(首要)、非藥物(定向提示如時鐘/家人照片、改善睡眠、減少約束)、必要時『低劑量抗精神病藥(haloperidol)』短期控制嚴重激動/精神症狀;BZD一般『非首選』(可加重譫妄,除非酒精/BZD戒斷)。 本題:高齡(前置)、抗膽鹼藥+安眠藥(藥物，屬可矯正的『誘發』因子，亦有人視為前置)、ICU環境/尿管/術後(誘發)。題目把ICU環境歸『前置因子』不適當—環境刺激屬急性『誘發』因子。年齡、原有認知障礙、感官缺損屬前置因子。","options":{"A":"年齡(高齡)屬前置因子(易感背景)。","B":"術前用藥可視為易感/誘發因子(此處選項可接受)。","C":"錯誤(本題選此,最不適當)。ICU環境屬急性『誘發』因子,非前置因子。","D":"髖關節手術是急性『誘發』因子。"},"sources":["DSM-5-TR Delirium (predisposing vs precipitating)"]}},"114020-68":{"quick":"定向感(orientation)非DSM-5獨立認知範疇,選D。","detail":{"background":"DSM-5認知範疇:複雜注意、執行功能、學習與記憶、語言、知覺動作、社會認知;『定向感(orientation)非獨立認知範疇』(D)。","options":{"A":"執行功能是六大範疇之一。","B":"語言是六大範疇之一。","C":"社會認知是六大範疇之一。","D":"正確(本題選此)。定向感非DSM-5獨立認知範疇(屬注意/記憶面向)。"},"sources":["DSM-5-TR Neurocognitive Domains"]}},"114020-78":{"quick":"haloperidol『最不常』引起老人譫妄(反而用於治療譫妄),選B。","detail":{"background":"譫妄(delirium)是急性、波動性的『意識/注意力』障礙加上認知改變,核心是『注意力(attention)無法集中』與意識清醒度下降;急性發作(數小時至數天)、症狀時好時壞、夜間加重(sundowning)、自然病程數天至數週、常可逆但為『預後不佳的指標』(死亡率高)。病因為身體性(感染、缺氧、電解質、藥物、戒斷、術後、器官衰竭),『與身體疾病密切相關』。EEG典型為『瀰漫性慢波(generalized slowing)』(物質戒斷型可快波)。與失智的鑑別:譫妄急性、波動、注意力受損、意識混濁;失智慢性、進行、意識清楚、記憶為主。前置因子(predisposing,易感背景):高齡、原有失智/認知障礙、感官缺損(失明/失聰)、多重共病、多重用藥、功能依賴;誘發因子(precipitating,急性觸發):手術/麻醉、感染、藥物(抗膽鹼、鎮靜)、脫水、電解質、尿管/約束、ICU環境。治療:找出並矯正潛在病因(首要)、非藥物(定向提示如時鐘/家人照片、改善睡眠、減少約束)、必要時『低劑量抗精神病藥(haloperidol)』短期控制嚴重激動/精神症狀;BZD一般『非首選』(可加重譫妄,除非酒精/BZD戒斷)。 引起老人譫妄的常見藥物:抗膽鹼藥(atropine)、鴉片(meperidine尤其—代謝物normeperidine神經毒)、BZD(lorazepam)、抗組織胺、類固醇。haloperidol抗膽鹼作用低,反而是『治療』譫妄的藥,最不常致譫妄。","options":{"A":"atropine(抗膽鹼)常致譫妄。","B":"正確(本題選此,最不常見)。haloperidol反而用於治療譫妄,最不常致譫妄。","C":"lorazepam(BZD)可致/加重譫妄。","D":"meperidine(鴉片,代謝物神經毒)易致老人譫妄。"},"sources":["DSM-5-TR Delirium; Beers Criteria"]}},"114070-69":{"quick":"『增加食慾』非譫妄前置因子,選A。","detail":{"background":"譫妄前置因子(predisposing):高齡、失智、感官缺損、多重共病、多重用藥、失能;『增加食慾』非前置因子(A)。","options":{"A":"錯誤(本題選此)。增加食慾不是譫妄的前置因子。","B":"老年人是前置因子。","C":"原有認知障礙(失智)是前置因子。","D":"感官缺損(失明/失聰)是前置因子。"},"sources":["DSM-5-TR Delirium (predisposing factors)"]}},"114070-76":{"quick":"失智躁動病人不應以『約束+導尿』為常規處置,故D最不適當。","detail":{"background":"譫妄(delirium)是急性、波動性的『意識/注意力』障礙加上認知改變,核心是『注意力(attention)無法集中』與意識清醒度下降;急性發作(數小時至數天)、症狀時好時壞、夜間加重(sundowning)、自然病程數天至數週、常可逆但為『預後不佳的指標』(死亡率高)。病因為身體性(感染、缺氧、電解質、藥物、戒斷、術後、器官衰竭),『與身體疾病密切相關』。EEG典型為『瀰漫性慢波(generalized slowing)』(物質戒斷型可快波)。與失智的鑑別:譫妄急性、波動、注意力受損、意識混濁;失智慢性、進行、意識清楚、記憶為主。前置因子(predisposing,易感背景):高齡、原有失智/認知障礙、感官缺損(失明/失聰)、多重共病、多重用藥、功能依賴;誘發因子(precipitating,急性觸發):手術/麻醉、感染、藥物(抗膽鹼、鎮靜)、脫水、電解質、尿管/約束、ICU環境。治療:找出並矯正潛在病因(首要)、非藥物(定向提示如時鐘/家人照片、改善睡眠、減少約束)、必要時『低劑量抗精神病藥(haloperidol)』短期控制嚴重激動/精神症狀;BZD一般『非首選』(可加重譫妄,除非酒精/BZD戒斷)。 本題失智老人夜間躁動就醫:失智的行為精神症狀(BPSD)在照顧者負荷過大時常成急診原因;第一步應先排除譫妄與身體疾病;失智者工作社交能力下降。對躁動病人『常規給約束並放導尿管』不適當—約束與尿管反而會『加重』譫妄與激動、增加感染/傷害,應先找原因、非藥物安撫優先。","options":{"A":"適當。BPSD在照顧負荷大時常成急診原因。","B":"適當。第一步先確認有無譫妄並鑑別身體疾病。","C":"適當。失智者工作社交能力下降。","D":"錯誤(本題選此)。不應常規約束加導尿(會加重譫妄/激動、增感染傷害)。"},"sources":["DSM-5-TR Delirium/BPSD management"]}},"115020-63":{"quick":"譫妄EEG典型是『瀰漫性慢波』,非generalized paroxysmal fast activity,故D最不適當。","detail":{"background":"譫妄EEG典型為『瀰漫性慢波(diffuse slowing)』(故D『generalized paroxysmal fast activity』錯);反映瀰漫性大腦功能障礙。","options":{"A":"正確。譫妄較失智發作快、波動大。","B":"正確。嚴重躁症的混亂行為與譫妄難區別。","C":"正確。低活動量(hypoactive)譫妄與鬱症難區別。","D":"錯誤(本題選此)。譫妄EEG典型為瀰漫性慢波,非generalized paroxysmal fast activity。"},"sources":["Kaplan & Sadock's Synopsis 11e, Delirium (EEG slowing)"]}},"115020-65":{"quick":"譫妄病人3個月後死亡率約20–30%,選C。","detail":{"background":"譫妄:急性波動、注意力障礙、可逆但預後不佳——『3個月後死亡率約20–30%』(C);須積極找並治療病因。","options":{"A":"錯誤(過度)。不應『優先』以抗精神病藥快速控制;首要是找病因、非藥物優先,藥物僅在嚴重激動/精神症狀時低劑量短期用。","B":"錯誤。身體約束會加重譫妄,非優先。","C":"正確(本題選此)。譫妄者3個月後死亡率約20–30%(預後不佳指標)。","D":"錯誤。BZD一般無法有效緩解譫妄(反加重,除非戒斷型)。"},"sources":["DSM-5-TR Delirium (prognosis & management)"]}},"102110-68":{"quick":"睡前吃太飽不助眠(反加重不適),故B(臨睡前吃飽助眠)錯誤。","detail":{"background":"睡眠衛生:規律作息、避免午睡過長、睡前避免咖啡因/酒精/3C;『睡前吃太飽反不助眠/加重不適』(故B『臨睡前吃飽助眠』錯)。","options":{"A":"正確。準時起床有助穩定生理時鐘。","B":"錯誤(本題選此)。臨睡前吃太飽會干擾睡眠,非助眠。","C":"正確。睡前不宜一直看電視(螢幕光與刺激)。","D":"正確。睡不著宜暫時離床。"},"sources":["Kaplan & Sadock's Synopsis 11e, Sleep hygiene"]}},"104090-66":{"quick":"『睡不滿6–8小時就有害』是錯誤觀念(睡眠需求個別化),故B錯誤。","detail":{"background":"正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。 過度強調『一定要睡滿幾小時』反而加重失眠焦慮;睡眠需求因人而異。","options":{"A":"正確。限制白天躺床時間。","B":"錯誤(本題選此)。睡不滿6–8小時不必然有害,睡眠需求個別化,過度強調反加重焦慮。","C":"正確。固定時間上床。","D":"正確。睡前泡熱水澡(體溫下降助眠)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Insomnia education"]}},"104090-68":{"quick":"凌晨早醒型失眠(後半夜)宜選『中效BZD』維持後半夜睡眠,選C。","detail":{"background":"正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。 本題司機入睡正常但凌晨3點早醒、難再入睡=後半夜維持困難。短效藥(zolpidem、短效BZD)助入睡但維持不足;『中效BZD』可維持後半夜睡眠且晨間殘餘較長效少,較適合;鎮靜抗精神病藥不應作為單純失眠用藥。","options":{"A":"非緩釋zolpidem助入睡但維持不足,不適合早醒型。","B":"短效BZD維持不足。","C":"正確(本題選此)。中效BZD適合維持後半夜睡眠的早醒型失眠。","D":"鎮靜抗精神病藥不應作單純失眠用藥。"},"sources":["Kaplan & Sadock's Synopsis 11e, Insomnia pharmacotherapy"]}},"105020-65":{"quick":"去除外在因素後內在生理時鐘週期『略長於24小時(約24.2小時)』,故D錯誤。","detail":{"background":"生理節律(circadian rhythm)由下視丘『視交叉上核(suprachiasmatic nucleus,SCN)』主導,受光照(zeitgeber)等外在與內在因素調節;在隔離外在線索(free-running)時,人類內在週期約24.2小時,『略長於24小時』(故每日需光照重設)。睡眠是生理節律表現之一。","options":{"A":"正確。睡眠是生理節律表現之一。","B":"正確。生理節律受外在與內在因素調節。","C":"正確。SCN是生理節律中樞。","D":"錯誤(本題選此)。free-running內在週期約24.2小時,略『長』於24小時,非少於。"},"sources":["Kaplan & Sadock's Synopsis 11e, Circadian rhythm"]}},"105020-66":{"quick":"老年人睡眠相『前移(advanced)』—早睡早醒,選A。","detail":{"background":"老化的睡眠變化:睡眠相『前移(advanced sleep phase)』(早睡早醒)、深睡(N3慢波)減少、夜醒增多、總睡眠時數略減、白天小睡增加、REM潛期略縮短。正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。","options":{"A":"正確(本題選此)。老年人睡眠相前移(早睡早醒)。","B":"後移是青少年的特徵。","C":"老年睡眠相是規律前移,非不規則。","D":"與一般成年人有差異。"},"sources":["Kaplan & Sadock's Synopsis 11e, Sleep in elderly"]}},"105100-68":{"quick":"夢遊發生於NREM『第3、4期(深睡)』,選C。","detail":{"background":"夢遊(sleepwalking)為NREM異睡症,發生於『NREM第3、4期(深睡)』(C),前1/3夜為主、事後無記憶。","options":{"A":"stage I是入睡淺睡,非夢遊期。","B":"stage II非夢遊期。","C":"正確(本題選此)。夢遊發生於NREM stage III & IV(深睡)。","D":"REM是做夢/肌肉失張,非典型夢遊期。"},"sources":["DSM-5-TR NREM Sleep Arousal Disorders"]}},"105100-69":{"quick":"『每人每天均應睡足7小時』是錯誤的睡眠衛生觀,選A。","detail":{"background":"睡眠衛生:固定起床時間、不賴床、避免日間長睡;『「每人每天均應睡足7小時」是錯誤觀念』(A,睡眠需求個別化)。","options":{"A":"錯誤(本題選此,違反睡眠衛生)。不需強求每人都睡滿7小時(個別化)。","B":"正確。失眠隔日不宜即刻補眠。","C":"正確。避免入睡前看電視。","D":"正確。晚餐後不宜飲含咖啡因飲品。"},"sources":["Kaplan & Sadock's Synopsis 11e, Sleep hygiene"]}},"107080-49":{"quick":"健康成人每晚約3–5個睡眠週期,選D。","detail":{"background":"健康成人正常睡眠:每晚約『3–5個睡眠週期』、每週期約90分鐘、NREM-REM交替、後半夜REM增加(D)。","options":{"A":"錯誤。每個睡眠週期約90–110分鐘,非60分鐘。","B":"錯誤。N3(深睡)約占20–25%,非50%。","C":"錯誤。正常入睡約<20分鐘,非<5分鐘(<5分鐘提示睡眠剝奪/嗜睡)。","D":"正確(本題選此)。每晚經歷3–5個睡眠週期。"},"sources":["Kaplan & Sadock's Synopsis 11e, Sleep architecture"]}},"107080-67":{"quick":"半夜起床走動取食、叫不醒、事後無記憶=夢遊,發生於NREM深睡(3、4期),選C。","detail":{"background":"半夜起床走動取食、叫不醒、事後無記憶=夢遊,屬NREM『深睡(3、4期)』之異睡症(C)。","options":{"A":"N1非夢遊期。","B":"N2非夢遊期。","C":"正確(本題選此)。夢遊發生於NREM第三、四期(深睡),事後無記憶。","D":"REM是做夢期、肌肉失張,非夢遊。"},"sources":["DSM-5-TR NREM Sleep Arousal Disorders (sleepwalking)"]}},"107080-74":{"quick":"做夢主要出現於『REM睡眠』,選D。","detail":{"background":"做夢(dreaming)主要出現於『快速動眼(REM)睡眠』(D);REM亦見肌張力消失與快速眼動。","options":{"A":"stage I非主要做夢期。","B":"stage II非主要做夢期。","C":"stage III非主要做夢期。","D":"正確(本題選此)。做夢主要出現於REM睡眠。"},"sources":["Kaplan & Sadock's Synopsis 11e, REM sleep"]}},"108030-75":{"quick":"睡眠驚恐症(sleep terror)發生於『前半夜的深睡NREM』,選D。","detail":{"background":"正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。 睡眠驚恐(sleep terror)與夢遊同屬NREM異睡症,發生於前半夜深睡(N3);夢魘(nightmare)發生於後半夜REM、可清楚回憶夢境。故D正確;A(睡眠驚恐在後半夜)、B(夢遊在REM)、C(夢魘在NREM)皆錯。","options":{"A":"錯誤。睡眠驚恐發生於前半夜深睡,非後半夜。","B":"錯誤。夢遊發生於NREM深睡,非REM。","C":"錯誤。夢魘(nightmare)發生於REM,非NREM。","D":"正確(本題選此)。睡眠驚恐症發生於前半夜NREM深睡期。"},"sources":["DSM-5-TR NREM Arousal Disorders / Nightmare Disorder"]}},"108080-64":{"quick":"處方安眠藥前宜先排除睡眠呼吸中止症(OSA),選A。","detail":{"background":"處方安眠藥前宜『先排除睡眠呼吸中止症(OSA)』(A)——OSA者用鎮靜安眠藥可能惡化呼吸抑制;並先行非藥物睡眠衛生。","options":{"A":"正確(本題選此)。處方安眠藥前須排除OSA(鎮靜劑會惡化OSA)。","B":"錯誤。睡前喝酒會破壞睡眠結構,非助療效。","C":"錯誤。晚餐後不宜飲含咖啡因飲品。","D":"錯誤。白天補眠睡不著仍不應再服短效安眠藥(維持睡眠衛生)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Insomnia & OSA"]}},"109080-69":{"quick":"『短效強效安眠藥不應作為長期助眠首選』,故B錯誤。","detail":{"background":"正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。 抗焦慮藥(BZD)大劑量具安眠作用;短效強效BZD成癮性高、不應作長期助眠首選;酒癮者對安眠藥有交叉耐受、且酒精+安眠藥併用危險;巴比妥安全性低、現少用於失眠。","options":{"A":"正確。抗焦慮藥(BZD)大劑量也具安眠作用。","B":"錯誤(本題選此)。短效強效安眠藥成癮性高,非長期助眠首選。","C":"正確。酒癮者對安眠藥有耐受、且不可與酒精併用。","D":"正確。巴比妥安全性低,現少用於失眠。"},"sources":["Kaplan & Sadock's Synopsis 11e, Hypnotics"]}},"110080-63":{"quick":"安眠藥『不應』作為失眠第一線治療(第一線是睡眠衛生與認知行為治療CBT-I),故D錯誤。","detail":{"background":"正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。 失眠第一線治療是『失眠認知行為治療(CBT-I)』與睡眠衛生,非安眠藥;藥物為輔助、短期使用。","options":{"A":"正確。白天減少臥床。","B":"正確。睡不著避免看時鐘(增焦慮)。","C":"正確。失眠不宜白天補眠。","D":"錯誤(本題選此)。安眠藥非失眠第一線(第一線為CBT-I與睡眠衛生)。"},"sources":["AASM / Kaplan & Sadock's Synopsis 11e (CBT-I)"]}},"110080-66":{"quick":"本題多重答案(A、D皆錯/均給分):z-drug仍有成癮性、且有研究支持其短期使用。","detail":{"background":"正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。 z-drug(zolpidem、zopiclone)選擇性作用於GABA-A的ω1次單位,鎮靜為主、肌肉鬆弛/抗癲癇較弱;但『仍有耐受、依賴與成癮風險』(A『不易成癮』錯),且可致失憶、睡眠自動行為(夢遊樣進食/開車)、幻覺;失眠常有潛在病因,藥物治標;『有』醫學研究支持z-drug短期使用(D『沒有任何研究支持』錯)。本題A、D皆被判錯而均給分。","options":{"A":"錯誤(本題給分)。z-drug仍有成癮風險,非『不易成癮』。","B":"正確。可造成失憶、睡眠自動化行為與幻覺。","C":"正確。失眠常有潛在疾病,藥物治標不治本。","D":"錯誤(本題給分)。有研究支持z-drug短期使用,非『沒有任何研究支持』。"},"sources":["Stahl's Essential Psychopharmacology (z-drugs); 考選部公告多重答案(A/D)"]}},"110080-70":{"quick":"zolpidem『仍有耐受性與戒斷問題』,故C錯誤。","detail":{"background":"正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。 BZD與巴比妥皆作用於GABA-A的氯離子通道;BZD使用超過兩週可能出現耐受;zolpidem雖肌肉鬆弛較弱,但『仍有耐受性與戒斷/依賴問題』,故C錯。","options":{"A":"正確。BZD與巴比妥皆作用於GABA-A氯離子通道。","B":"正確。BZD使用超過兩週可能出現耐受性。","C":"錯誤(本題選此)。zolpidem仍有耐受性與戒斷問題。","D":"正確。zolpidem較無肌肉鬆弛效果。"},"sources":["Stahl's Essential Psychopharmacology (z-drugs)"]}},"111020-66":{"quick":"長期BZD病人住院『不可立即全停』(須漸減,以免戒斷癲癇),故D錯誤。","detail":{"background":"正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。 失眠BZD使用原則:最低有效劑量、短期、注意老人跌倒風險;短效BZD成癮性較高;長期使用者戒除須『緩慢減量(taper)』,不可立即全停(驟停可致戒斷癲癇、譫妄)。","options":{"A":"正確。以最低有效劑量為原則。","B":"正確。老人用BZD注意跌倒風險。","C":"正確。短效BZD通常較長效易成癮。","D":"錯誤(本題選此)。長期BZD病人住院也不可立即全停,須緩慢減量。"},"sources":["Kaplan & Sadock's Synopsis 11e, Benzodiazepine taper"]}},"113020-48":{"quick":"延遲型睡眠週期症候群『晚上照光』最不合適(會更延後),選A。","detail":{"background":"延遲型睡眠週期症候群(delayed sleep phase syndrome,常見於青少年):入睡與起床時間皆延後。治療:『清晨』亮光照射(把時鐘往前拉)、傍晚/睡前給低劑量褪黑激素或褪黑激素促效劑、時間療法(chronotherapy,逐日延後就寢重置)。『晚上(傍晚/夜間)照光』會使生理時鐘『更延後』,最不合適。正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。","options":{"A":"正確(本題選此,最不合適)。晚上照光會使睡眠相更延後。","B":"合適。睡前低劑量褪黑激素。","C":"合適。時間療法逐日延後就寢重置。","D":"合適。傍晚褪黑激素促效劑。"},"sources":["AASM Circadian Rhythm Sleep Disorders guideline"]}},"113020-64":{"quick":"失眠『不一定都能查出潛在疾病』(有原發性失眠),故C最不適當。","detail":{"background":"正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。 失眠症(insomnia disorder)DSM-5:睡眠困難每週≥3次且持續≥3個月並影響功能;白天嗜睡者須評估OSA;藥物以短期(≤兩週左右)為原則。但並非『所有失眠都由其他疾病引起、一定查得出潛在病因』—有原發性/慢性失眠。","options":{"A":"適當。白天嗜睡須評估OSA。","B":"適當。每週≥3次且≥3個月符合失眠症診斷。","C":"錯誤(本題選此)。失眠不一定都能查出潛在疾病(有原發性失眠)。","D":"適當。鎮靜安眠藥宜短期(約不超過兩週)。"},"sources":["DSM-5-TR Insomnia Disorder"]}},"114020-48":{"quick":"睡前喝水非入睡抽動(hypnic jerks)的常見加重因子,選B。","detail":{"background":"入睡抽動(hypnic jerks/sleep starts)是入睡時短暫的肌肉抽動,屬良性現象;加重因子為睡眠不足、疲勞、壓力/情緒、咖啡因、尼古丁、睡前劇烈運動。『睡前喝水』非加重因子。正常睡眠結構:一晚約經歷3–5個睡眠週期(每週期約90–110分鐘),交替NREM(N1淺睡→N2→N3深睡/慢波)與REM;入睡正常約<20分鐘;深睡(N3,慢波)約占20–25%、集中於前半夜;REM(做夢、肌肉失張)約占20–25%、後半夜增多。NREM異睡症(夢遊sleepwalking、睡眠驚恐sleep terror)發生於『前半夜的深睡(N3)』、事後多無記憶;REM相關現象(做夢、惡夢nightmare、REM睡眠行為障礙)發生於『後半夜REM』。睡眠衛生(sleep hygiene):固定起床/就寢時間、白天減少臥床與補眠、睡前避免咖啡因/酒精/大餐/激烈運動/3C螢幕、睡不著離床、不看時鐘;不需強求『每天睡滿7–8小時』(睡眠需求個別化)。失眠藥物:以最低有效劑量、短期(一般≤2–4週)為原則;處方安眠藥前須先排除睡眠呼吸中止症(OSA,用鎮靜劑會惡化)。","options":{"A":"睡眠不足是加重因子。","B":"正確(本題選此,非加重因子)。睡前喝水非hypnic jerks加重因子。","C":"睡前劇烈運動是加重因子。","D":"情緒壓力是加重因子。"},"sources":["Kaplan & Sadock's Synopsis 11e (hypnic jerks)"]}},"104030-75":{"quick":"DSM-IV-TR厭食症『停經(amenorrhea)是診斷要件之一』,故D(說不是要件)錯誤。","detail":{"background":"飲食疾患:神經性厭食症(anorexia nervosa,AN)—限制進食致顯著低體重、強烈怕胖、身體心像障礙(消瘦仍覺胖);女性遠多於男性、好發青少年;生理併發症:無月經(amenorrhea,DSM-IV曾為診斷要件、DSM-5已『移除』)、低體溫、心搏過緩、低血壓、低血糖、貧血、骨質疏鬆、白血球低、可有高膽固醇、腦萎縮腦室擴大、電解質異常(催吐者低血鉀hypokalemia),嚴重可猝死(心律不整),為精神疾病中死亡率最高之一。神經性暴食症(bulimia nervosa,BN)—反覆暴食+代償行為(催吐、瀉劑、過度運動),體重多正常或略高、自我評價過度受身材體重影響;ipecac(emetine)催吐致心肌與骨骼肌病變。嗜食症(binge eating disorder,BED)—暴食但『無』代償行為、無強烈瘦身渴望、體重常過重。治療:AN以營養復健(refeeding,注意refeeding syndrome低磷)+心理治療為主、藥物效果有限;BN/BED以SSRI(fluoxetine,BN唯一FDA核准)+CBT。 注意:此題依DSM-IV-TR,停經『是』診斷要件;DSM-5已將停經要件移除。本題以DSM-IV-TR為準,故『停經與否不是診斷要件』錯誤。","options":{"A":"正確。拒絕維持最低正常體重致消瘦。","B":"正確。體重過輕仍強烈怕胖。","C":"正確。身體心像障礙(瘦仍覺胖)。","D":"錯誤(本題選此,依DSM-IV-TR)。停經『是』DSM-IV-TR厭食症診斷要件之一。"},"sources":["DSM-IV-TR Anorexia Nervosa","DSM-5-TR (amenorrhea removed)"]}},"109080-73":{"quick":"厭食症生理變化含低體溫、心搏過緩、低血壓、無月經,選B。","detail":{"background":"飲食疾患:神經性厭食症(anorexia nervosa,AN)—限制進食致顯著低體重、強烈怕胖、身體心像障礙(消瘦仍覺胖);女性遠多於男性、好發青少年;生理併發症:無月經(amenorrhea,DSM-IV曾為診斷要件、DSM-5已『移除』)、低體溫、心搏過緩、低血壓、低血糖、貧血、骨質疏鬆、白血球低、可有高膽固醇、腦萎縮腦室擴大、電解質異常(催吐者低血鉀hypokalemia),嚴重可猝死(心律不整),為精神疾病中死亡率最高之一。神經性暴食症(bulimia nervosa,BN)—反覆暴食+代償行為(催吐、瀉劑、過度運動),體重多正常或略高、自我評價過度受身材體重影響;ipecac(emetine)催吐致心肌與骨骼肌病變。嗜食症(binge eating disorder,BED)—暴食但『無』代償行為、無強烈瘦身渴望、體重常過重。治療:AN以營養復健(refeeding,注意refeeding syndrome低磷)+心理治療為主、藥物效果有限;BN/BED以SSRI(fluoxetine,BN唯一FDA核准)+CBT。","options":{"A":"錯誤。厭食症女性遠多於男性,非相近。","B":"正確(本題選此)。厭食症常見低體溫、心搏過緩、低血壓、無月經。","C":"錯誤。催吐/瀉劑致『低血鉀(hypokalemia)』,非高血鉀。","D":"錯誤。暴食症盛行率『高於』厭食症;女性多於男性正確,但盛行率敘述反了。"},"sources":["DSM-5-TR Eating Disorders"]}},"110080-64":{"quick":"嚴重厭食症成人猝死案例不應只想到『小兒科病房』住院(且未達理想體重70%已屬重度需內科/精神共同處置),故B錯誤。","detail":{"background":"飲食疾患:神經性厭食症(anorexia nervosa,AN)—限制進食致顯著低體重、強烈怕胖、身體心像障礙(消瘦仍覺胖);女性遠多於男性、好發青少年;生理併發症:無月經(amenorrhea,DSM-IV曾為診斷要件、DSM-5已『移除』)、低體溫、心搏過緩、低血壓、低血糖、貧血、骨質疏鬆、白血球低、可有高膽固醇、腦萎縮腦室擴大、電解質異常(催吐者低血鉀hypokalemia),嚴重可猝死(心律不整),為精神疾病中死亡率最高之一。神經性暴食症(bulimia nervosa,BN)—反覆暴食+代償行為(催吐、瀉劑、過度運動),體重多正常或略高、自我評價過度受身材體重影響;ipecac(emetine)催吐致心肌與骨骼肌病變。嗜食症(binge eating disorder,BED)—暴食但『無』代償行為、無強烈瘦身渴望、體重常過重。治療:AN以營養復健(refeeding,注意refeeding syndrome低磷)+心理治療為主、藥物效果有限;BN/BED以SSRI(fluoxetine,BN唯一FDA核准)+CBT。 本題國三女生厭食暴瘦至31公斤後猝死。逐項:厭食症可致腦萎縮腦室擴大、低血糖與高膽固醇;暴食症用ipecac(emetine)催吐致心臟與骨骼肌病變。B『建議於小兒科病房住院』不適當—重度厭食(體重<理想70%、電解質/心律危險)需內科穩定加精神科專責照護(refeeding監測),非單純小兒科病房。","options":{"A":"正確。厭食症可致大腦萎縮、腦室擴大。","B":"錯誤(本題選此)。重度厭食需內科/精神專責住院監測(refeeding),非僅建議小兒科病房。","C":"正確。厭食症可致低血糖、高膽固醇。","D":"正確。ipecac(emetine)催吐致心臟與骨骼肌病變。"},"sources":["DSM-5-TR Anorexia Nervosa; refeeding syndrome"]}},"113020-65":{"quick":"暴食症患者自我評價『過度』受身材/體重影響,故D(說不受影響)最不適當。","detail":{"background":"飲食疾患:神經性厭食症(anorexia nervosa,AN)—限制進食致顯著低體重、強烈怕胖、身體心像障礙(消瘦仍覺胖);女性遠多於男性、好發青少年;生理併發症:無月經(amenorrhea,DSM-IV曾為診斷要件、DSM-5已『移除』)、低體溫、心搏過緩、低血壓、低血糖、貧血、骨質疏鬆、白血球低、可有高膽固醇、腦萎縮腦室擴大、電解質異常(催吐者低血鉀hypokalemia),嚴重可猝死(心律不整),為精神疾病中死亡率最高之一。神經性暴食症(bulimia nervosa,BN)—反覆暴食+代償行為(催吐、瀉劑、過度運動),體重多正常或略高、自我評價過度受身材體重影響;ipecac(emetine)催吐致心肌與骨骼肌病變。嗜食症(binge eating disorder,BED)—暴食但『無』代償行為、無強烈瘦身渴望、體重常過重。治療:AN以營養復健(refeeding,注意refeeding syndrome低磷)+心理治療為主、藥物效果有限;BN/BED以SSRI(fluoxetine,BN唯一FDA核准)+CBT。 嗜食症(BED)與暴食症(BN)鑑別:BED暴食但『無』代償行為(故B正確)、且無強烈瘦身渴望(C正確);BN有代償行為且自我評價『過度受身材體重影響』(故D『不因身材體重而有不當影響』錯)。fluoxetine(SSRI)可治暴食症(A正確)。","options":{"A":"適當。SSRI(fluoxetine)可治暴食症。","B":"適當。嗜食症無反覆代償減重行為。","C":"適當。嗜食症無使體態纖瘦的強烈渴望。","D":"錯誤(本題選此)。暴食症患者自我評價『過度』受身材/體重影響。"},"sources":["DSM-5-TR Bulimia Nervosa / Binge Eating Disorder"]}},"103030-67":{"quick":"反社會人格障礙屬『B群』,選B。","detail":{"background":"DSM人格障礙分群:A群(古怪)、『B群(戲劇化)含反社會、邊緣、做作、自戀』、C群(焦慮)。反社會人格屬B群(B)。","options":{"A":"A群是妄想型/類分裂/思覺失調型。","B":"正確(本題選此)。反社會人格屬B群。","C":"C群是畏避/依賴/強迫型。","D":"無D群(只有A、B、C三群)。"},"sources":["DSM-5-TR Personality Disorders (Cluster B)"]}},"103100-74":{"quick":"人格障礙是『長期穩定、青少年/成年早期起』,非突發於中老年,故D錯誤。","detail":{"background":"人格障礙特性:長期、穩定、僵化、起於『青少年/成年早期』之內在經驗與行為模式(故D『突發於中老年』錯)。","options":{"A":"正確。偏離文化期待,認知/情感/人際/衝動控制適應不良。","B":"正確。存在於廣泛的個人或社會情境。","C":"正確。造成內心痛苦或功能損害。","D":"錯誤(本題選此)。人格障礙非突發、非中老年才發生,而是長期穩定、青少年/成年早期起病。"},"sources":["DSM-5-TR Personality Disorders (general criteria)"]}},"103100-75":{"quick":"邊緣型人格屬『B群』,非C群,選C。","detail":{"background":"人格障礙症(personality disorder):持久而僵化的內在經驗與行為模式,偏離文化期待,廣泛存在於各種情境,造成痛苦或功能損害;『發病於青少年/成年早期、長期穩定』(非突發、非中老年才發生)。DSM-5三大群:A群(古怪/疏離:妄想型paranoid、類分裂schizoid、思覺失調型schizotypal);B群(戲劇/情緒化/善變:反社會antisocial、邊緣borderline、戲劇histrionic、自戀narcissistic);C群(焦慮/害怕:畏避avoidant、依賴dependent、強迫型obsessive-compulsive OCPD)。常共病物質濫用、憂鬱、焦慮。邊緣型(BPD):情緒/人際/自我形象不穩、空虛感、被遺棄恐懼、衝動(花錢/性/物質/暴食/飆車)、反覆自傷與作態性自殺、壓力下短暫精神病/解離、理想化-貶抑兩極化;女性較多;辯證行為治療(DBT)是實證有效療法(尤其降自傷)。反社會型:漠視他人權益、欺騙衝動攻擊無悔意,屬B群,合併高比率物質濫用。 C群(焦慮/害怕)=畏避型、依賴型、強迫型人格;邊緣型(borderline)屬B群(戲劇/情緒化),故為本題『不屬C群』者。","options":{"A":"強迫型人格屬C群。","B":"依賴型人格屬C群。","C":"正確(本題選此)。邊緣型人格屬B群,非C群。","D":"逃避(畏避)型人格屬C群。"},"sources":["DSM-5-TR Personality Disorder Clusters"]}},"106020-74":{"quick":"情緒/人際不穩、空虛、衝動、反覆自傷、理想化-貶抑兩極=邊緣型人格,選C。","detail":{"background":"情緒/人際不穩、長期空虛、衝動、反覆自傷/作態性自殺、理想化-貶抑兩極=『邊緣型人格障礙(borderline)』(C)。","options":{"A":"強迫型人格以完美僵化為主,非本題。","B":"依賴型以依附被照顧為主。","C":"正確(本題選此)。情緒人際不穩、空虛、衝動自傷、兩極化=邊緣型人格。","D":"類分裂型是疏離冷漠,非情緒劇烈波動。"},"sources":["DSM-5-TR Borderline Personality Disorder"]}},"107080-75":{"quick":"人格障礙常共病物質濫用、憂鬱、焦慮,選D。","detail":{"background":"人格障礙『常共病物質濫用、憂鬱、焦慮』(D);各群人格障礙皆增共病風險。","options":{"A":"錯誤。邊緣型人格『女性』較男性多(非男性兩倍)。","B":"錯誤。反社會人格『有』較高比率酒精/物質濫用。","C":"錯誤。強迫型人格雖完美僵化,但其僵化與人際控制亦『影響』社交關係(非交友不受影響)。","D":"正確(本題選此)。人格障礙常共病物質濫用、憂鬱、焦慮。"},"sources":["DSM-5-TR Personality Disorders (comorbidity)"]}},"115020-73":{"quick":"邊緣型人格之自傷/割腕,『辯證行為治療(DBT)』有療效,選C。","detail":{"background":"人格障礙症(personality disorder):持久而僵化的內在經驗與行為模式,偏離文化期待,廣泛存在於各種情境,造成痛苦或功能損害;『發病於青少年/成年早期、長期穩定』(非突發、非中老年才發生)。DSM-5三大群:A群(古怪/疏離:妄想型paranoid、類分裂schizoid、思覺失調型schizotypal);B群(戲劇/情緒化/善變:反社會antisocial、邊緣borderline、戲劇histrionic、自戀narcissistic);C群(焦慮/害怕:畏避avoidant、依賴dependent、強迫型obsessive-compulsive OCPD)。常共病物質濫用、憂鬱、焦慮。邊緣型(BPD):情緒/人際/自我形象不穩、空虛感、被遺棄恐懼、衝動(花錢/性/物質/暴食/飆車)、反覆自傷與作態性自殺、壓力下短暫精神病/解離、理想化-貶抑兩極化;女性較多;辯證行為治療(DBT)是實證有效療法(尤其降自傷)。反社會型:漠視他人權益、欺騙衝動攻擊無悔意,屬B群,合併高比率物質濫用。 本題小芬:長期情緒不穩、空虛、自我貶抑、被遺棄恐懼、以自殺威脅、壓力下退化與短暫類精神病(聽到過世外祖父說話)=邊緣型人格。治療:DBT(辯證行為治療)是實證有效、尤其降低自傷/割腕;心理治療為主、藥物為輔(SSRI、低劑量抗精神病處理特定症狀),心理合併藥物可加成;BZD應避免(去抑制、依賴、增衝動)。","options":{"A":"錯誤。是邊緣型人格,非依賴型。","B":"錯誤。心理合併藥物可有加成,非『無更佳效果』。","C":"正確(本題選此)。DBT對邊緣型人格(尤其割腕自傷)有療效。","D":"錯誤。BZD非核心治療藥(會去抑制、依賴、增衝動)。"},"sources":["DSM-5-TR Borderline Personality Disorder; Linehan DBT"]}},"102030-70":{"quick":"DSM-IV妥瑞氏症起病須在『18歲前』(非15歲前),故D錯誤。","detail":{"background":"妥瑞氏症(DSM-IV):多種運動型+≥1發聲型tic、病程>1年、『起病於18歲前』(故D『15歲前』非要件)。","options":{"A":"正確。須有運動性抽搐。","B":"正確。須有語音(聲音)抽搐。","C":"正確。抽搐一日多次(幾乎每天或間歇)。","D":"錯誤(本題選此)。起病須在18歲前,非15歲前。"},"sources":["DSM-IV-TR / DSM-5-TR Tourette's Disorder"]}},"102110-73":{"quick":"智能障礙以『輕度』最常見(非中度),故B錯誤。","detail":{"background":"智能障礙嚴重度分布以『輕度(mild,約85%)最常見』(故B『中度最常見』錯);多數可達基本自理。","options":{"A":"正確。智能障礙指IQ約<70(−2SD以上)。","B":"錯誤(本題選此)。最常見是『輕度』智能障礙(約85%),非中度。","C":"正確。約2/3可找出可能成因。","D":"正確。fragile X是常見的遺傳性智能障礙病因。"},"sources":["DSM-5-TR Intellectual Disability"]}},"102110-74":{"quick":"本題多重答案(B、C皆給分):methylphenidate是『增加』多巴胺(C說減少→錯);B不自主運動描述亦被判錯。","detail":{"background":"注意力不足過動症(ADHD):核心為注意力不集中、過動與衝動;DSM-5需若干症狀在『12歲前』出現(DSM-IV為7歲前)、且在『≥2種情境(家庭與學校等)』出現並造成功能損害,須與廣泛性發展障礙、思覺失調、情緒/焦慮、解離、人格疾患鑑別。男童多於女童。約半數以上症狀延續至青少年/成年(成年以注意力不集中與內在不安為主,『過動』外顯多隨年齡『減輕』)。患者自尊常較低、易挫折動怒、組織與解決問題能力差。治療:中樞神經興奮劑(methylphenidate、amphetamine類)為第一線,作用是『增加』突觸多巴胺與正腎上腺素(阻斷再回收/促釋放);副作用:食慾不振、失眠、頭痛、心搏血壓上升、抽搐/tic;非興奮劑atomoxetine(NRI)。 methylphenidate阻斷多巴胺/正腎上腺素再回收→『增加』突觸多巴胺(C『減少多巴胺釋放』錯);常見副作用食慾不振、失眠、頭痛(B把『不自主運動』列為常見副作用,本題判錯—tic雖可加重但非常見必然);有長效劑型。官方B、C皆給分。","options":{"A":"正確。可用於治療ADHD。","B":"列為錯誤(本題給分)。常見副作用為食慾不振、失眠、頭痛;不自主運動非『常見』。","C":"錯誤(本題給分)。methylphenidate『增加』而非減少中樞多巴胺釋放/濃度。","D":"正確。除短效外亦有長效劑型。"},"sources":["Stahl's Essential Psychopharmacology (methylphenidate); 考選部公告多重答案(B/C)"]}},"103030-72":{"quick":"自閉兒成年改善『以社交/語言較明顯,儀式重複行為最難改善』,故D錯誤。","detail":{"background":"自閉症類群障礙(ASD,DSM-5整合舊自閉症與亞斯柏格):核心為①社交溝通與互動缺損②侷限重複的行為/興趣/活動;DSM-IV時代:典型自閉症伴『語言與認知發展遲緩』及常合併智能障礙,亞斯柏格症則『語言與認知大致正常』(社交與侷限重複行為仍有困難)—此為兩者鑑別重點。自閉症少數有特殊才能(savant),多數合併不同程度智能障礙;約20–30%會癲癇;抗精神病藥(risperidone/aripiprazole)只改善易怒/攻擊/自傷等『相關』症狀,不改善核心。預後較佳指標:5–7歲時有溝通性語言、IQ>70。 ADHD症狀可延續成年;預測持續的危險因子含家族史、行為規範障礙、負面生活事件;自閉兒5–7歲有溝通語言且IQ>70預後較佳。自閉症成年期『核心的儀式性、重複性行為最難改善』(改善最少),故D『重複行為改善最多』錯誤。","options":{"A":"正確。ADHD症狀可持續至青少年/成人期。","B":"正確。家族史、行為規範障礙、負面生活事件是持續的不利因子。","C":"正確。5–7歲有溝通語言且IQ>70預後較佳。","D":"錯誤(本題選此)。儀式性/重複性行為最『難』改善,非改善最多。"},"sources":["DSM-5-TR ASD / ADHD course"]}},"103100-71":{"quick":"ADHD個案自尊常『較低』(非較高),故B錯誤。","detail":{"background":"注意力不足過動症(ADHD):因學業/人際挫折,個案自尊常『較低』(故B『較高』錯);治療含行為治療與興奮劑。","options":{"A":"正確。注意力無法集中,難完成作業/工作。","B":"錯誤(本題選此)。ADHD個案自尊常『較低』,非較高(反覆挫折、被責)。","C":"正確。衝動控制不佳、易動怒。","D":"正確。缺乏耐心、組織與解決問題能力差。"},"sources":["DSM-5-TR ADHD"]}},"103100-72":{"quick":"輕度智能障礙兒童5歲前『仍可發展』基本社交/溝通技能(只是較慢),故D錯誤。","detail":{"background":"輕度智能障礙兒童『5歲前仍可發展』基本社交與溝通技能(只是較慢)(故D『不能發展』錯);學齡後學業困難較明顯。","options":{"A":"正確。發展評估須比較現有能力與生理年齡應有發展的差距。","B":"正確。輕度智能障礙成人多能發展自我支持的社交職業技能。","C":"正確。多數兒童1歲時已會發出近似語言的聲音(牙牙學語babbling)。","D":"錯誤(本題選此)。輕度智能障礙兒童5歲前『仍可』(較慢地)發展社交與溝通技能,非無法。"},"sources":["DSM-5-TR Intellectual Disability; developmental milestones"]}},"103100-73":{"quick":"典型自閉症有『語言與認知發展遲緩』而亞斯柏格沒有,選C。","detail":{"background":"典型自閉症與亞斯柏格症核心差異:典型自閉症有『語言與認知發展遲緩』,亞斯柏格無明顯遲緩(C);兩者皆有社交與侷限重複行為。","options":{"A":"社交互動缺損兩者皆有。","B":"智能障礙非鑑別點(亞斯柏格智力正常,但典型自閉也非必然智障)。","C":"正確(本題選此)。語言與認知發展遲緩出現於典型自閉症、不在亞斯柏格症。","D":"侷限重複行為兩者皆有。"},"sources":["DSM-IV-TR Autistic Disorder vs Asperger's"]}},"104030-69":{"quick":"輕度智能障礙IQ約落在平均數下『2–3個SD』(IQ 50/55–70),選B。","detail":{"background":"智能障礙(intellectual disability):智力(IQ約<70,即低於平均數2個標準差以上;魏氏IQ平均100、SD15→70約為−2SD)與適應功能缺損,起於發展期;以『輕度』最常見(約85%);約半數~2/3可找到病因(基因如唐氏症、X染色體脆折症fragile X、代謝、產前感染、缺氧等),fragile X是最常見的『遺傳性』智能障礙病因。輕度者成年多能發展自我支持的社交與職業技能。 魏氏量表平均100、SD15;輕度智能障礙IQ約50–70(即平均數下2–3 SD);中度約35–50(−3至−4 SD);重度20–35;極重度<20。","options":{"A":"1–2 SD(IQ 70–85)屬邊緣智能,非智能障礙。","B":"正確(本題選此)。輕度智能障礙約2–3 SD(IQ 50–70)。","C":"3–4 SD屬中度。","D":"4–5 SD屬重度/極重度。"},"sources":["DSM-5-TR Intellectual Disability (IQ ranges)"]}},"104030-74":{"quick":"早發持續的行為規範障礙部分發展成『反社會型人格』,選C。","detail":{"background":"注意力不足過動症(ADHD):核心為注意力不集中、過動與衝動;DSM-5需若干症狀在『12歲前』出現(DSM-IV為7歲前)、且在『≥2種情境(家庭與學校等)』出現並造成功能損害,須與廣泛性發展障礙、思覺失調、情緒/焦慮、解離、人格疾患鑑別。男童多於女童。約半數以上症狀延續至青少年/成年(成年以注意力不集中與內在不安為主,『過動』外顯多隨年齡『減輕』)。患者自尊常較低、易挫折動怒、組織與解決問題能力差。治療:中樞神經興奮劑(methylphenidate、amphetamine類)為第一線,作用是『增加』突觸多巴胺與正腎上腺素(阻斷再回收/促釋放);副作用:食慾不振、失眠、頭痛、心搏血壓上升、抽搐/tic;非興奮劑atomoxetine(NRI)。 行為規範障礙(conduct disorder)早發且持續者,成年後部分發展為反社會型人格障礙(antisocial personality disorder,須年滿18歲才能診斷)。","options":{"A":"妄想型人格非conduct disorder的典型轉歸。","B":"邊緣型人格非典型轉歸。","C":"正確(本題選此)。發展成反社會型人格障礙。","D":"戲劇型人格非典型轉歸。"},"sources":["DSM-5-TR Conduct Disorder → Antisocial PD"]}},"104090-74":{"quick":"亞斯柏格症『語言溝通常無困難』(有社交與侷限重複行為),選A。","detail":{"background":"亞斯柏格症(DSM-IV-TR):社交互動障礙+侷限重複行為,但『語言溝通與認知發展常無顯著遲緩』(A);為與典型自閉症之區別。","options":{"A":"正確(本題選此)。亞斯柏格有社交困難與侷限重複行為,但語言溝通常無困難。","B":"錯誤。多數自閉症兒童『合併不同程度智能障礙』,特殊才能(savant)是少數。","C":"錯誤。約20–30%自閉症會癲癇,非半數以上。","D":"錯誤。抗精神病藥只改善相關症狀(易怒/攻擊),不改善核心症狀。"},"sources":["DSM-IV-TR Asperger's / Autistic Disorder"]}},"108030-71":{"quick":"妥瑞氏症起病須在『18歲前』(非12歲前),故B錯誤。","detail":{"background":"妥瑞氏症診斷:多發性運動+發聲tic、病程>1年、『起病於18歲前』(故B『12歲前』錯)。","options":{"A":"正確。須合併動作抽搐與聲音抽搐。","B":"錯誤(本題選此)。妥瑞起病須在18歲前,非12歲前(12歲是ADHD的起病門檻)。","C":"正確。可用低劑量抗精神病藥治療。","D":"正確。男生多於女生。"},"sources":["DSM-5-TR Tourette's Disorder"]}},"108080-70":{"quick":"ADHD的『過動』隨年齡多『減輕』(非更嚴重),故C錯誤。","detail":{"background":"ADHD自青少年至成年之變化:『過動多隨年齡減輕』(故C『更嚴重』錯),但注意力不足與衝動可持續(成人ADHD)。","options":{"A":"正確。約半數以上症狀延續至成年。","B":"正確。家族史、心理社會壓力、合併行為規範/情緒焦慮是持續危險因子。","C":"錯誤(本題選此)。進入青少年/成年後過動多『減輕』(轉為內在不安),非更嚴重。","D":"正確。可能出現社交困難或偏差行為。"},"sources":["DSM-5-TR ADHD course"]}},"109020-69":{"quick":"本題多重答案(A、B皆給分):DSM-5 ADHD起病門檻改為『12歲前』(A的7歲為舊DSM-IV)、且須『≥2情境』(B『一情境即可』錯)。","detail":{"background":"注意力不足過動症(ADHD):核心為注意力不集中、過動與衝動;DSM-5需若干症狀在『12歲前』出現(DSM-IV為7歲前)、且在『≥2種情境(家庭與學校等)』出現並造成功能損害,須與廣泛性發展障礙、思覺失調、情緒/焦慮、解離、人格疾患鑑別。男童多於女童。約半數以上症狀延續至青少年/成年(成年以注意力不集中與內在不安為主,『過動』外顯多隨年齡『減輕』)。患者自尊常較低、易挫折動怒、組織與解決問題能力差。治療:中樞神經興奮劑(methylphenidate、amphetamine類)為第一線,作用是『增加』突觸多巴胺與正腎上腺素(阻斷再回收/促釋放);副作用:食慾不振、失眠、頭痛、心搏血壓上升、抽搐/tic;非興奮劑atomoxetine(NRI)。 依DSM-5,部分症狀須在『12歲前』出現(A引『7歲前』為DSM-IV舊標準,故依DSM-5為錯);症狀須在『≥2種情境』出現(B『一個情境即可』錯);須造成功能損害並與其他疾病鑑別。官方A、B皆給分。","options":{"A":"列為錯誤(本題給分)。DSM-5改為12歲前(7歲為舊DSM-IV標準)。","B":"錯誤(本題給分)。症狀須在≥2種情境出現,非一個情境即可。","C":"正確。須造成明顯社交/學業/工作功能損害。","D":"正確。須與廣泛性發展障礙、思覺失調、情緒焦慮、解離、人格疾患鑑別。"},"sources":["DSM-5-TR ADHD; 考選部公告多重答案(A/B)"]}},"112020-29":{"quick":"對妥瑞病人『提醒不要發聲/動作』無益反增壓力,故B最不適當。","detail":{"background":"妥瑞氏症/抽動症:tic在壓力下加重、可短暫抑制但隨後反彈;『提醒病人不要發聲/動作無益反增壓力』(B最不適當);治療含衛教、必要時藥物。","options":{"A":"正確。起病須<18歲。","B":"錯誤(本題選此)。提醒病人『不要發出聲音或動作』無益,反增壓力惡化抽搐。","C":"正確。並非所有病患都需藥物治療。","D":"正確。多數於18–20歲後嚴重度大幅改善。"},"sources":["DSM-5-TR Tourette's Disorder management"]}},"101030-63":{"quick":"fluoxetine後坐立不安=靜坐不能(akathisia),β-blocker最有效,選D。","detail":{"background":"SSRI(及抗精神病藥)可引起靜坐不能(akathisia)—主觀無法靜止、躁動走來走去。最有效處置為β-腎上腺素受體阻斷劑(propranolol);BZD次之;抗膽鹼藥對藥物性巴金森症有效但對akathisia效果有限。抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。","options":{"A":"抗膽鹼藥對藥物性巴金森症較有效,對akathisia效果有限。","B":"抗組織胺非首選。","C":"BZD是次選。","D":"正確(本題選此)。β-blocker(propranolol)對靜坐不能最有效。"},"sources":["Kaplan & Sadock's Synopsis 11e, Akathisia"]}},"102030-62":{"quick":"Aripiprazole是多巴胺『部分作用劑』,選B。","detail":{"background":"aripiprazole(及brexpiprazole、cariprazine)是D2/D3部分作用劑(partial agonist)—在多巴胺過高處拮抗、過低處微弱作用,故EPS與泌乳素副作用較少。amisulpride、ziprasidone主要是D2拮抗;clozapine是非典型廣效拮抗。抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。","options":{"A":"Amisulpride是D2/D3拮抗劑。","B":"正確(本題選此)。Aripiprazole是多巴胺部分作用劑。","C":"Clozapine是非典型拮抗劑。","D":"Ziprasidone是SDA拮抗劑。"},"sources":["Stahl's Essential Psychopharmacology (aripiprazole)"]}},"102110-64":{"quick":"bupropion是NDRI(正腎上腺素-多巴胺再回收抑制),非SSRI,選D。","detail":{"background":"SSRI(選擇性血清素再回收抑制劑)包括fluoxetine、sertraline、paroxetine、citalopram、escitalopram、fluvoxamine。bupropion是正腎上腺素-多巴胺再回收抑制劑(NDRI),用於憂鬱與戒菸,『不影響血清素』,故性功能與體重副作用少、可降癲癇閾值。","options":{"A":"fluoxetine是SSRI。","B":"paroxetine是SSRI。","C":"sertraline是SSRI。","D":"正確(本題選此)。bupropion是NDRI,非SSRI。"},"sources":["Stahl's Essential Psychopharmacology (antidepressant classes)"]}},"103100-62":{"quick":"姿勢性低血壓由『α腎上腺素受體阻斷』引起,選B。","detail":{"background":"抗精神病藥受體阻斷與副作用對應:阻斷『膽鹼(M)受體』→口乾、便秘、尿滯留、視力模糊、認知;阻斷『α1腎上腺素受體』→姿勢性低血壓、頭暈;阻斷『H1組織胺受體』→鎮靜、體重增加;阻斷『D2(nigrostriatal)』→錐體外症候群(EPS);阻斷『D2(tuberoinfundibular)』→泌乳素升高。抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。","options":{"A":"錯誤。口乾是『抗膽鹼』作用,非血清素再回收阻斷。","B":"正確(本題選此)。姿勢性低血壓=α腎上腺素受體阻斷。","C":"錯誤。EPS是D2受體『阻斷』,非多巴胺再回收阻斷。","D":"錯誤。尿滯留是『抗膽鹼』作用,非α阻斷。"},"sources":["Stahl's Essential Psychopharmacology (antipsychotic receptor profile)"]}},"104030-66":{"quick":"血清素症候群是『腹瀉/腸蠕動增加』而非便秘,故C錯誤。","detail":{"background":"血清素症候群(serotonin syndrome,血清素過量):自律神經亢進(高燒、盜汗、心搏快、血壓波動、『腹瀉』)、神經肌肉亢進(顫抖、肌陣攣myoclonus、反射亢進、陣攣、僵直)、精神狀態改變(激動、譫妄)。多因合併多種血清素藥(SSRI+MAOI/曲普坦/tramadol/linezolid等)。便秘是『抗膽鹼』表現,與血清素症候群相反。治療:停藥、支持、cyproheptadine。","options":{"A":"正確。體溫升高(高燒)是其表現。","B":"正確。可有譫妄/激動。","C":"錯誤(本題選此)。是『腹瀉/腸蠕動增加』,非便秘。","D":"正確。盜汗是自律亢進表現。"},"sources":["Kaplan & Sadock's Synopsis 11e, Serotonin syndrome"]}},"104090-62":{"quick":"ziprasidone代謝副作用最少(較不增體重/血糖/血脂),選D。","detail":{"background":"第二代抗精神病藥代謝風險:olanzapine、clozapine最高(體重、血糖、血脂);quetiapine、risperidone中等;ziprasidone、aripiprazole最低(代謝中性)。抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。","options":{"A":"quetiapine代謝風險中等。","B":"olanzapine代謝風險高。","C":"clozapine代謝風險最高。","D":"正確(本題選此)。ziprasidone代謝副作用最少。"},"sources":["Stahl's Essential Psychopharmacology (metabolic risk)"]}},"104090-63":{"quick":"急性肌張力不全(眼球上吊)處置『不包括肌肉鬆弛劑』,選C。","detail":{"background":"抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。 本題用藥第三天眼球上吊=急性肌張力不全(oculogyric crisis)。處置:立即抗膽鹼藥(benztropine/diphenhydramine)肌注、減量或換藥、排除癲癇等神經疾患。不需給『一般肌肉鬆弛劑(muscle relaxant)』。","options":{"A":"處置包括給抗膽鹼藥。","B":"處置包括減量或換抗精神病藥。","C":"正確(本題選此,不包括)。一般肌肉鬆弛劑非急性肌張力不全的處置。","D":"處置包括排除癲癇等神經疾患。"},"sources":["Kaplan & Sadock's Synopsis 11e, Acute dystonia"]}},"105100-63":{"quick":"EPS可用『抗膽鹼藥』減輕,選D。","detail":{"background":"抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。 逐項:智能障礙者使用抗精神病藥『仍會』有EPS(非較不會);換第二代抗精神病藥『可』改善EPS;換『高效價』第一代會『惡化』EPS(高效價D2親和力強);抗膽鹼藥(benztropine等)可減少EPS。","options":{"A":"錯誤。智能障礙者仍會有EPS。","B":"錯誤。換第二代抗精神病藥『可』改善EPS。","C":"錯誤。換高效價第一代藥會『惡化』EPS。","D":"正確(本題選此)。抗膽鹼藥可減少EPS。"},"sources":["Kaplan & Sadock's Synopsis 11e, EPS management"]}},"106020-61":{"quick":"GAD首選SSRI,選B。","detail":{"background":"精神疾病首選藥配對:思覺失調→抗精神病藥(D2拮抗或SDA第二代,『非agonist致效劑』,致效劑會惡化精神病);廣泛性焦慮症→SSRI/SNRI(第一線),buspirone、BZD(短期);雙極性疾患→情緒穩定劑(lithium/valproate)與第二代抗精神病藥(『非dopamine agonist』);強迫症→SSRI高劑量合併暴露不反應(ERP)行為治療(『非lithium』)。掌握各大疾病的第一線藥物機轉是用藥配對題的關鍵。","options":{"A":"錯誤。思覺失調用D2拮抗/SDA,非agonist。","B":"正確(本題選此)。GAD首選SSRI。","C":"錯誤。雙極性疾患用情緒穩定劑/抗精神病藥,非dopamine agonist。","D":"錯誤。OCD首選SSRI,非lithium。"},"sources":["Kaplan & Sadock's Synopsis 11e (first-line pharmacotherapy)"]}},"106080-63":{"quick":"haloperidol後眼球上吊、脖子僵直=急性肌張力不全,立即給抗膽鹼藥,選B。","detail":{"background":"抗精神病藥(haloperidol)引起『急性肌張力不全』:用藥後數小時至數天突發眼球上吊(動眼危象)、頸/軀幹扭轉;立即給『抗膽鹼藥』(B)。","options":{"A":"錯誤。是急性肌張力不全,非癲癇。","B":"正確(本題選此)。急性肌張力不全宜立即給抗膽鹼藥(benztropine/diphenhydramine)肌注。","C":"錯誤。這是急性(數小時),非遲發性運動失調(長期)。","D":"錯誤。抗焦慮劑(BZD)並非禁忌(可輔助)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Acute dystonia"]}},"107080-52":{"quick":"metoclopramide(D2拮抗)引起急性肌張力不全(斜頸),給benztropine,選C。","detail":{"background":"抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。 metoclopramide(止吐/促腸蠕動,屬D2拮抗)亦可引起急性肌張力不全(本題持續奇怪姿勢、脖子僵硬轉不動=斜頸/dystonia)。處置給抗膽鹼藥benztropine mesylate(或diphenhydramine)。","options":{"A":"phenytoin是抗癲癇藥,非dystonia處置。","B":"botulinum toxin用於慢性局部肌張力不全,非急性藥物性。","C":"正確(本題選此)。給抗膽鹼藥benztropine mesylate。","D":"haloperidol是D2拮抗,會『加重』dystonia。"},"sources":["Kaplan & Sadock's Synopsis 11e, Drug-induced dystonia"]}},"108080-59":{"quick":"EPS中『肌張力不全(dystonia)』(尤喉部/呼吸肌)最可能造成呼吸困難,選A。","detail":{"background":"抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。 急性肌張力不全若侵犯喉部/呼吸肌(laryngeal dystonia)可致喉痙攣與呼吸困難,為EPS中最危及呼吸者。","options":{"A":"正確(本題選此)。肌張力不全(喉部/呼吸肌)最可能致呼吸困難。","B":"靜坐不能是坐立不安,非呼吸困難。","C":"藥物性巴金森症是動作遲緩僵硬,非呼吸困難。","D":"運動異常(tardive)是口舌不自主動作,非呼吸困難。"},"sources":["Kaplan & Sadock's Synopsis 11e, Acute dystonia (laryngeal)"]}},"109020-63":{"quick":"『血糖急速上升』非SSRI副作用,選A。","detail":{"background":"SSRI常見副作用:噁心/腸胃不適、性功能障礙(低性慾、高潮/射精障礙)、睡眠障礙(失眠或嗜睡)、頭痛、激動/靜坐不能、初期焦慮加重、低血鈉(SIADH,老人)、出血傾向、停藥症候群;『血糖急速上升』非SSRI的典型副作用(代謝/血糖問題較見於第二代抗精神病藥)。","options":{"A":"正確(本題選此,非SSRI副作用)。血糖急速上升非SSRI典型副作用。","B":"噁心是SSRI常見副作用。","C":"性功能障礙是SSRI常見副作用。","D":"睡眠障礙是SSRI副作用。"},"sources":["Stahl's Essential Psychopharmacology (SSRI side effects)"]}},"109020-71":{"quick":"clozapine通常不需常規監測『血中藥物濃度』(需監測的是白血球ANC),選A。","detail":{"background":"需常規監測『血中藥物濃度(治療窗窄)』者:lithium、valproic acid、carbamazepine。clozapine不以血中濃度為常規監測,而是須定期監測『白血球/絕對嗜中性球(ANC)』以防顆粒性白血球缺乏(agranulocytosis)。","options":{"A":"正確(本題選此)。clozapine不常規測血中藥物濃度(改監測ANC白血球)。","B":"lithium需監測血中濃度。","C":"valproic acid需監測血中濃度。","D":"carbamazepine需監測血中濃度。"},"sources":["Stahl's Essential Psychopharmacology; clozapine monitoring"]}},"109080-77":{"quick":"diazepam肌注吸收不穩、不適合肌注,選D。","detail":{"background":"急性躁動(agitation)的肌肉注射鎮靜可用haloperidol、droperidol(抗精神病藥)或lorazepam(BZD,肌注吸收良好可靠),臨床常用haloperidol+lorazepam併用。diazepam因脂溶性高、會沉積於肌肉,肌注吸收『慢且不穩定』,故不適合肌注(口服或靜脈才適合)。處置躁動時須兼顧排除潛在身體病因(低血糖、缺氧、譫妄、中毒戒斷)、環境降低刺激與安全約束(最後手段)。","options":{"A":"haloperidol適合肌注。","B":"droperidol適合肌注。","C":"lorazepam肌注吸收良好。","D":"正確(本題選此)。diazepam肌注吸收慢且不穩,最不適合肌注。"},"sources":["Kaplan & Sadock's Synopsis 11e, Agitation management"]}},"110020-60":{"quick":"Rabbit syndrome表現為『嘴唇/口周的快速震顫』,選A。","detail":{"background":"抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。 抗精神病藥相關動作障礙:Rabbit syndrome是口周(perioral)快速垂直震顫(像兔子嘴),屬遲發/錐體外現象、對抗膽鹼藥反應佳;NMS好發於『年輕男性』(非年長女性);藥物性巴金森症好發於『年長女性』;急性肌張力不全(含角弓反張opisthotonos)好發於『年輕男性』。","options":{"A":"正確(本題選此)。rabbit syndrome是嘴唇/口周肌肉震顫。","B":"錯誤。NMS好發於年輕男性,非年長女性。","C":"錯誤。年輕男性是『急性肌張力不全』高危,藥物性巴金森症好發年長女性。","D":"錯誤。角弓反張(急性肌張力不全)好發年輕男性,非年長女性。"},"sources":["Kaplan & Sadock's Synopsis 11e, Medication-induced movement disorders"]}},"110020-78":{"quick":"midazolam半衰期最短,選A。","detail":{"background":"BZD依半衰期分:超短/短效(midazolam約1.5–2.5小時最短,triazolam)、中效(alprazolam、lorazepam、oxazepam、temazepam)、長效(diazepam、chlordiazepoxide、clonazepam,含活性代謝物半衰期更長)。midazolam最短,故用於麻醉誘導與檢查鎮靜;短效者助入睡但維持不足、戒斷快而劇、成癮性較高;長效者作用久、晨間殘餘鎮靜、戒斷較緩。肝功能差者宜選不需肝臟氧化的lorazepam/oxazepam/temazepam。","options":{"A":"正確(本題選此)。midazolam半衰期最短。","B":"diazepam是長效(含活性代謝物)。","C":"alprazolam是中短效。","D":"lorazepam是中效。"},"sources":["Stahl's Essential Psychopharmacology (BZD half-lives)"]}},"110080-78":{"quick":"急性肌張力不全『主要發生於頭頸/眼/軀幹』(非四肢),故C錯誤。","detail":{"background":"急性肌張力不全『主要影響頭頸、眼(動眼危象)、舌、軀幹』(故C『四肢為主』錯);好發年輕男性、用藥早期,給抗膽鹼藥緩解。","options":{"A":"正確。常見於抗精神病藥治療的副作用。","B":"正確。可用diphenhydramine靜脈治療。","C":"錯誤(本題選此)。急性肌張力不全主要發生於『頭頸、眼(眼球上吊)、軀幹、喉部』,非四肢。","D":"正確。較常發生於年輕人(尤年輕男性)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Acute dystonia"]}},"111080-61":{"quick":"aripiprazole已獲FDA核准作為憂鬱症『輔助(adjunctive)』治療,選B。","detail":{"background":"逐項:躁期治療藥含鋰鹽、valproic acid、抗精神病藥,但『不含抗憂鬱劑』(抗憂鬱劑會惡化躁症),故A錯;aripiprazole(及quetiapine等)獲FDA核准作為重鬱症抗憂鬱劑無效時的『輔助治療』,B正確;rTMS核准用於『難治型憂鬱』(非思覺失調),C錯;抗憂鬱劑是重鬱症首選,但雙相鬱期『非』首選(會誘發躁症),D錯。抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。","options":{"A":"錯誤。躁期治療不含抗憂鬱劑(會惡化躁症)。","B":"正確(本題選此)。aripiprazole核准作為憂鬱症輔助治療。","C":"錯誤。rTMS核准用於難治型憂鬱,非思覺失調。","D":"錯誤。抗憂鬱劑非雙相鬱期首選(會誘發躁症)。"},"sources":["FDA labeling (aripiprazole adjunctive for MDD; rTMS for TRD)"]}},"112020-61":{"quick":"trihexyphenidyl(抗膽鹼藥)『有濫用風險』,故C不適當。","detail":{"background":"抗精神病藥副作用處置:『trihexyphenidyl(抗膽鹼藥)有濫用風險(欣快/抗膽鹼性)』(故C不適當),不應長期常規併用。","options":{"A":"正確。糖尿病者用propranolol緩解akathisia可能掩蓋低血糖的生理反應(心搏加快)。","B":"正確。哺乳婦用propranolol須注意經乳汁分泌。","C":"錯誤(本題選此)。trihexyphenidyl(抗膽鹼藥)『有』欣快/濫用風險。","D":"正確。trihexyphenidyl(抗膽鹼)會惡化隅角閉鎖性青光眼與攝護腺肥大。"},"sources":["Kaplan & Sadock's Synopsis 11e, Anticholinergics (abuse potential)"]}},"112020-64":{"quick":"SSRI/SNRI可用於疼痛、GAD、恐慌症(非躁期),選C(123)。","detail":{"background":"抗憂鬱劑(SSRI/SNRI)藉提升突觸血清素/正腎上腺素,除重鬱症外核准或常用於多種疾病:慢性/神經性疼痛(尤SNRI如duloxetine、TCA)、廣泛性焦慮症、恐慌症、社交焦慮症、強迫症(SSRI高劑量)、創傷後壓力症、暴食症(fluoxetine)、經前不悅症。『但雙相情緒障礙躁期不可用抗憂鬱劑』(會惡化躁症、誘發混合/快速循環),這是鑑別重點。","options":{"A":"不完整(漏②)。","B":"不完整。","C":"正確(本題選此)。SSRI/SNRI可用於疼痛、GAD、恐慌症(①②③)。","D":"錯誤。④雙相躁期不可用抗憂鬱劑。"},"sources":["Stahl's Essential Psychopharmacology (antidepressant indications)"]}},"112080-66":{"quick":"bupropion『不損害(甚至改善)性功能』、risperidone『會損害』性功能(高泌乳素),故D『兩者都提高性慾』最不適當。","detail":{"background":"藥物對性功能:SSRI/SNRI常致低性慾與高潮/射精障礙;處理可加bupropion、cyproheptadine、amantadine、sildenafil等。bupropion(NDRI)『不損害甚至改善』性功能;risperidone因升高泌乳素反而『損害』性功能。lithium亦可致勃起障礙。故『bupropion和risperidone能提高性慾』不適當(risperidone會損害)。","options":{"A":"正確。SSRI/SNRI可致低性慾與高潮障礙。","B":"正確。cyproheptadine、amantadine可改善SSRI性功能異常。","C":"正確。lithium可致勃起障礙。","D":"錯誤(本題選此)。bupropion改善性功能但risperidone(高泌乳素)『損害』性功能,非提高性慾。"},"sources":["Stahl's Essential Psychopharmacology (sexual side effects)"]}},"113070-60":{"quick":"抗精神病藥姿勢性低血壓是『α腎上腺素受體阻斷』所致,非『作用在多巴胺受體』,故D最不適當。","detail":{"background":"抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。 逐項:長期lithium有甲狀腺與心臟副作用(正確);clozapine與fluvoxamine(CYP1A2抑制劑)有交互作用使clozapine濃度升高(正確);valproate與lamotrigine併用會升高lamotrigine濃度、增加皮疹(SJS)風險(正確);抗精神病藥姿勢性低血壓是『α1受體阻斷』所致,非多巴胺受體作用(D錯)。","options":{"A":"正確。長期lithium有甲狀腺、心臟副作用。","B":"正確。clozapine與fluvoxamine有藥物交互作用。","C":"正確。valproate+lamotrigine升高lamotrigine濃度、增皮疹風險。","D":"錯誤(本題選此)。姿勢性低血壓是α腎上腺素受體阻斷,非多巴胺受體作用。"},"sources":["Stahl's Essential Psychopharmacology; drug interactions"]}},"115020-61":{"quick":"重鬱合併身體症狀障礙症者對ECT治療反應較差,選C。","detail":{"background":"電痙攣治療(ECT):對重鬱症(尤其有精神病性、自殺、拒食、緊張型、藥物無效者)療效快又強;對抗憂鬱劑無效者約半數以上仍可有反應。逐項:ECT起效『比藥物快』且療效『至少不亞於』藥物(A『療效沒有差異』不夠精準但其『較快』正確);抗藥性憂鬱接受ECT反應率高(約半數以上,B數字偏保守);合併身體症狀障礙症(somatic symptom disorder)者ECT反應較差(C正確,為本題答案);躁期對鋰鹽無效時ECT『可』用於促進治療(D其實正確)。本題以C為最適當敘述。","options":{"A":"敘述不夠精準(ECT較快且療效不亞於藥物)。","B":"數字較保守。","C":"正確(本題選此)。合併身體症狀障礙症者對ECT反應較差。","D":"敘述本身正確(ECT可輔助難治躁期),但本題取C為最適當。"},"sources":["Kaplan & Sadock's Synopsis 11e, ECT"]}},"115020-64":{"quick":"目前臨床最常用的長效針劑是『2週–3個月效期』,非『一年效期』,故D最不適當。","detail":{"background":"抗精神病藥(尤其第一代/高效價如haloperidol)阻斷nigrostriatal的D2受體,引起錐體外症候群(EPS):①急性肌張力不全(acute dystonia,用藥數小時至數天,眼球上吊oculogyric、斜頸torticollis、軀幹扭轉、喉部痙攣可致呼吸困難—年輕男性高危,立即給抗膽鹼藥如benztropine/diphenhydramine肌注緩解)②靜坐不能(akathisia,主觀坐立不安,β-blocker如propranolol或BZD)③藥物性巴金森症(數週,抗膽鹼藥或減量)④遲發性運動異常(tardive dyskinesia,長期使用後口舌不自主運動,難可逆,換第二代或停藥)。第二代(SDA)EPS較少但代謝副作用多;ziprasidone、aripiprazole代謝副作用最少,olanzapine、clozapine最多。抗膽鹼藥(trihexyphenidyl、benztropine)治EPS,但有抗膽鹼副作用(口乾、便秘、尿滯留、惡化青光眼/前列腺肥大)且『有濫用風險』。抗精神病藥惡性症候群(NMS):高燒、肌僵直、自律不穩、意識改變、CK升高,致命急症,停藥+支持+dantrolene/bromocriptine。 逐項:不少抗精神病藥可致心臟傳導異常(QT延長);NMS是嚴重可致命副作用;NMS可用dantrolene(及bromocriptine)治療;長效針劑(LAI)用於改善服藥順從,目前臨床最常用為2週至1–3個月效期(如paliperidone palmitate有1個月、3個月、6個月劑型),『效期一年』非目前最常用,故D不適當。","options":{"A":"正確。抗精神病藥可致心臟傳導異常(QT延長)。","B":"正確。NMS是嚴重可能致命副作用。","C":"正確。NMS可用dantrolene治療。","D":"錯誤(本題選此)。目前最常用長效針劑為2週–3個月效期,非一年效期。"},"sources":["Stahl's Essential Psychopharmacology (LAI); NMS management"]}},"101030-75":{"quick":"自殺死亡危險性以『65歲以上』最高,選D。","detail":{"background":"自殺死亡危險性以『65歲以上(老年)』最高(D);老年自殺常少預警、手段激烈、合併身體疾病與憂鬱。","options":{"A":"18–35歲非自殺死亡率最高的年齡層。","B":"35–50歲非最高。","C":"50–65歲非最高。","D":"正確(本題選此)。65歲以上(尤其老年男性)自殺死亡危險性最高。"},"sources":["Kaplan & Sadock's Synopsis 11e, Suicide epidemiology"]}},"102030-80":{"quick":"病人揚言殺母屬『有保護/通報義務』的情況,故C不是『不負通報義務』? 本題答案C—因C屬例外可揭露但題問『不負通報義務』者,逐項見解析。","detail":{"background":"本題問醫師『不負通報主管機關義務』者。家暴(A)依家庭暴力防治法、兒少遺棄(B)依兒少權益保障法、HIV感染(D)依傳染病防治法,醫師皆有『通報主管機關』義務。C(病人揚言殺母)屬Tarasoff式『對特定第三人之保護/警告』—醫師應警告/保護該特定對象(母親)、必要時通知警方,但這是『對特定第三人的保護義務』而非『向主管機關通報』的法定通報義務,故為本題答案。生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。","options":{"A":"家暴受害者醫師有通報主管機關義務(家暴防治法)。","B":"兒童遭遺棄醫師有通報義務(兒少權益保障法)。","C":"正確(本題選此)。揚言殺母屬對特定第三人的保護/警告(Tarasoff),非向主管機關之法定通報。","D":"HIV感染者醫師有通報義務(傳染病防治法)。"},"sources":["台灣家暴防治法/兒少權益保障法/傳染病防治法; Tarasoff"]}},"102110-79":{"quick":"偷加藥牽涉尊重自主、不傷害、行善三原則衝突,選B。","detail":{"background":"生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。 本題S之母偷將抗精神病藥加入飲食、醫師配合開立:違反『尊重自主』(病人不知情/被欺瞞)、涉及『不傷害』(產生EPS副作用)、出於『行善(改善病情)』的動機—故牽涉尊重自主、不傷害、行善三原則的衝突。","options":{"A":"未涉正義原則(非資源分配/公平議題)。","B":"正確(本題選此)。涉尊重自主、不傷害、行善三原則衝突。","C":"未涉正義原則。","D":"漏了核心的尊重自主原則。"},"sources":["生命倫理四原則"]}},"103030-75":{"quick":"正確為③④(D):情緒疾患/思覺失調/酒癮自殺風險皆高、45–80%企圖者有情緒疾患;焦慮『與自殺有關』、自殺死亡男性多於女性、自殺率隨年齡上升,故①②⑤錯。","detail":{"background":"自殺事實:情緒疾患/思覺失調/酒癮自殺風險皆高(③)、45–80%企圖者有情緒疾患(④);焦慮與自殺有關、自殺死亡男>女、自殺率隨年齡上升→故①②⑤錯,選③④(D)。","options":{"A":"含錯誤的①⑤。","B":"含錯誤的①。","C":"含錯誤的②⑤。","D":"正確(本題選此)。③(各精神疾病自殺風險高)④(45–80%企圖者有情緒疾患)正確。"},"sources":["Kaplan & Sadock's Synopsis 11e, Suicide risk factors"]}},"103100-79":{"quick":"保密例外:病人同意(④)是最明確的;本題答案D(僅④)。","detail":{"background":"保密(confidentiality)可揭露的『例外』需有正當法律或保護依據。④『病人同意揭露』是最無爭議的合法揭露。①媒體詢問總統病情—無病人同意不得揭露(違反保密);②警察『要求』提供病歷協助破案—須有法院令狀/法律依據,單純要求不足;③以已逝病人詳細病史『公開呼籲自殺防治』—仍涉及死者隱私與家屬,不應未經同意揭露個案細節。故本題以『僅④』為答(嚴格立場)。生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。","options":{"A":"過寬。①②③皆有爭議,不全是合法例外。","B":"含有爭議的①②。","C":"含有爭議的②。","D":"正確(本題選此)。僅④(病人同意)為最明確的保密例外。"},"sources":["醫療法/醫師法保密規定; 醫學倫理"]}},"103100-80":{"quick":"拒絕住院的精神病急診病人,住院醫師應『請精神科專科醫師評估』(不可逕行強制住院),選D。","detail":{"background":"台灣精神衛生法重點:嚴重病人(因精神疾病致認知/現實判斷障礙、嚴重影響社會生活功能)經專科醫師診斷,若有自傷/傷人或之虞、拒絕住院,得依法定程序『強制住院』(須經審查會許可,非單一住院醫師逕行;急性可先緊急安置)。約束/隔離須有醫囑、明確方式與時間、定期評估記錄、延展須再評估;以保護病人安全與治療必要為限,『不可為懲罰或便利照顧而過度/長時間約束』。精神疾病範圍涵蓋精神病、精神官能症、酒癮藥癮、智能與認知障礙等;『反社會性人格違常』在精神衛生法被『排除』於強制治療對象/精神疾病範圍之外(視為非可強制治療之精神疾病)。錄影/教學用途須病人同意(非『未反對』即可)。 本題林先生有妄想幻覺、拒絕住院:強制住院須經『精神科專科醫師』診斷與法定審查程序,『住院醫師不可逕行強制住院』,亦非移送法辦或僅門診追蹤;正確處置是先請精神科專科醫師評估是否符合嚴重病人與強制住院要件。","options":{"A":"錯誤。住院醫師不可逕行強制住院(須專科醫師與審查程序)。","B":"錯誤。病人因病無責任能力,非移送法辦。","C":"錯誤。有自傷傷人之虞、拒絕治療者非僅門診追蹤即可。","D":"正確(本題選此)。應請精神科專科醫師評估。"},"sources":["台灣精神衛生法 強制住院程序"]}},"104030-79":{"quick":"代理決定不應由『醫師逕行以最大利益決定』,選D。","detail":{"background":"生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。","options":{"A":"適當。先尋求家屬代理同意。","B":"適當。家屬意見不一時以親等近者優先。","C":"適當。代理同意須符合病人最大利益且不違背其若清醒時的決定(替代判斷)。","D":"錯誤(本題選此,不適當)。不應由醫師逕行決定,應透過代理同意程序。"},"sources":["生命倫理 surrogate decision-making"]}},"105020-72":{"quick":"自殺企圖女性多、自殺死亡男性多,選D。","detail":{"background":"自殺性別差異:『自殺企圖女性多、自殺死亡男性多』(男性多用致命手段)(D)。","options":{"A":"錯誤。企圖與死亡的性別比例不相同。","B":"錯誤。自殺『企圖』是女性多於男性(非男性多)。","C":"錯誤。自殺死亡男性多正確,但企圖是女性多(非男性)。","D":"正確(本題選此)。企圖女性>男性,死亡男性>女性。"},"sources":["Kaplan & Sadock's Synopsis 11e, Suicide gender paradox"]}},"105020-73":{"quick":"『衝動性』自殺行為(非計畫性)屬相對『低』風險,選B。","detail":{"background":"自殺風險分層:具體計畫、致命手段、強烈意圖為高風險;『衝動性(非計畫)行為』相對屬較低風險(B)。","options":{"A":"鰥寡(獨居/失去配偶)屬高風險。","B":"正確(本題選此)。衝動性(非計畫性)自殺行為相對低風險。","C":"自責(self blame)屬高風險。","D":"上吊或跳樓(高致命手段)屬高風險。"},"sources":["Kaplan & Sadock's Synopsis 11e, Suicide risk assessment"]}},"105020-79":{"quick":"治療醫師P有『治療者與鑑定者角色衝突』,應拒絕法院委託鑑定,選D。","detail":{"background":"生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。 司法精神鑑定原則:治療關係(以病人福祉為念)與司法鑑定(須中立、為法院服務)有『角色衝突(dual relationship/role conflict)』;治療F一年的醫師P不宜同時擔任F的鑑定人,應由獨立的第三方鑑定人進行,以維持公正與保護治療關係。","options":{"A":"錯誤。『最了解F』反而是角色衝突的來源。","B":"錯誤。信任關係不能取代鑑定的中立性。","C":"理由不夠核心(動機論)。","D":"正確(本題選此)。P有照顧者與公正鑑定者的角色衝突,應拒絕。"},"sources":["Forensic psychiatry: dual role conflict"]}},"105100-66":{"quick":"老人自殺『較少』合併酒精濫用(年輕族群較多),故C錯誤。","detail":{"background":"老人自殺:常少預警、手段激烈、合併身體疾病與憂鬱;『較少合併酒精濫用』(酒精相關自殺以年輕族群較多)(故C『老人較常合併酒精』錯)。","options":{"A":"正確。65歲以上自殺風險較其他族群高。","B":"正確。老人多採激烈手段,男性自殺身亡比例較高。","C":"錯誤(本題選此)。老人自殺合併酒精濫用『較少』(物質濫用相關自殺較見於年輕族群)。","D":"正確。失落與身體疾病是老人自殺最常見誘因。"},"sources":["Kaplan & Sadock's Synopsis 11e, Geriatric suicide"]}},"105100-80":{"quick":"病人揚言縱火傷害前妻且危險性高,應『通報並採取保護前妻措施』,選B。","detail":{"background":"生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。 本題病人明確揚言燒前妻房子且判斷危險性高=對特定第三人之明確威脅(Tarasoff情境)。守密義務退讓,醫師有保護/警告義務:通報社工/警方並採取保護前妻的措施,而非僅勸導記錄、簽切結書或只給藥。","options":{"A":"不足。僅勸導記錄無法保護潛在受害者。","B":"正確(本題選此)。通報並採取保護前妻措施(Tarasoff保護義務)。","C":"無效。切結書無保護力。","D":"不足。給藥不能替代對第三人的保護。"},"sources":["Tarasoff duty to protect/warn"]}},"106020-75":{"quick":"老年族群自殺死亡率高於年輕族群,選B。","detail":{"background":"自殺流行病學:『老年族群自殺死亡率高於年輕族群』(B);老年自殺意圖致死率高。","options":{"A":"錯誤。女性自殺『行為(企圖)』較多,但自殺『死亡率』較低(非較高)。","B":"正確(本題選此)。老年族群自殺死亡率高於年輕族群。","C":"錯誤。自殺死亡者約90%以上有精神疾病,非僅10%。","D":"錯誤。過去自殺企圖是未來自殺最強預測因子之一。"},"sources":["Kaplan & Sadock's Synopsis 11e, Suicide"]}},"106020-80":{"quick":"要求把病情寫嚴重以詐領補助,醫師面臨『正義與行善』原則衝突,選C。","detail":{"background":"生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。 本題病人要求醫師誇大病情以取得身心障礙補助:若配合則違反『正義(誠實、公平分配社會資源)』;若拒絕又似違背病人『行善(改善其經濟困境)』的期待—故衝突在『正義原則與行善原則』之間。","options":{"A":"非核心衝突。","B":"非最佳(正義是核心,但對立的是行善而非不傷害)。","C":"正確(本題選此)。正義(誠實/公平)與行善(改善病人處境)原則的衝突。","D":"非核心。"},"sources":["生命倫理四原則"]}},"107020-75":{"quick":"邊緣型人格者常有具操縱意味的自殺企圖,選C。","detail":{"background":"自殺企圖:邊緣型人格者常有『具操縱/作態意味之反覆自殺企圖』(C);仍須認真評估,因實際致死風險存在。","options":{"A":"錯誤。自殺『企圖』女性較男性多。","B":"錯誤。評估自殺應『直接』詢問自殺意念與計畫(直接問不會增加自殺,反而是良好評估)。","C":"正確(本題選此)。邊緣型人格者常有具操縱/求助意味的自殺企圖。","D":"錯誤。自殺企圖者多數有精神科診斷。"},"sources":["Kaplan & Sadock's Synopsis 11e, Suicide assessment"]}},"107080-80":{"quick":"精神病致無決定能力者拒絕必要手術,應由家屬代理簽署同意書,選C。","detail":{"background":"生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。 本題病人因精神病妄想(自認應以死贖罪)『脫離現實、喪失醫療決定能力(incompetent)』而拒絕救命手術。精神科醫師應評估其決定能力,確認無能力後由『家屬代理同意』簽署手術/麻醉同意書(符合病人最大利益),不應尊重其因病所致的『拒絕』、也不是靠勸說或單純等妄想消解(急性腹膜炎為急症不能等)。","options":{"A":"錯誤。其拒絕源於精神病喪失決定能力,不應據以尊重而不開刀。","B":"錯誤。心理勸說無法解決急症且病人喪失決定能力。","C":"正確(本題選此)。確認無決定能力後,由家屬代理簽署同意書。","D":"錯誤。急性腹膜炎為急症,不能等妄想消解。"},"sources":["生命倫理 capacity & surrogate consent"]}},"108030-64":{"quick":"老人自殺『較常採激烈手段』,故B(較少採激烈手段)錯誤。","detail":{"background":"老年人自殺:『較常採取激烈/致命手段』、致死率高(故B『較少採激烈手段』錯)。","options":{"A":"正確。憂鬱症是老人自殺最常見共病。","B":"錯誤(本題選此)。老人自殺『較常』採激烈致命手段,非較少。","C":"正確。自殺死亡男性多於女性。","D":"正確。失落與身體疾病常誘發老人自殺。"},"sources":["Kaplan & Sadock's Synopsis 11e, Geriatric suicide"]}},"109020-79":{"quick":"最符合『病人自願(voluntariness)』的是:信任醫師而遵循建議治療,選A。","detail":{"background":"生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。 自願性(voluntariness)指決定未受『脅迫、不當利誘或操弄/隱瞞資訊』。A(病人信任醫師、自願遵循)符合自願;B(以增加零用錢利誘服藥)是不當利誘;C(隱瞞副作用)是資訊操弄;D(以強制住院威脅換自願住院)是脅迫—皆損害自願性。","options":{"A":"正確(本題選此)。基於信任而遵循治療,最符合自願性。","B":"錯誤。以零用錢利誘屬不當利誘。","C":"錯誤。隱瞞副作用屬資訊操弄。","D":"錯誤。以強制住院威脅換自願住院屬脅迫。"},"sources":["Bioethics: voluntariness & informed consent"]}},"110020-73":{"quick":"伴有精神病(psychosis)的個案自殺危險性『較高』(非較低),故B錯誤。","detail":{"background":"自殺危險性:『伴有精神病(psychosis)者自殺危險性較高』(故B『較低』錯);命令式幻聽尤危險。","options":{"A":"正確。嚴重憂鬱者自殺危險高。","B":"錯誤(本題選此)。伴精神病(命令式幻聽、妄想)者自殺危險性『較高』,非較低。","C":"正確。無望感者自殺危險高。","D":"正確。家庭關係佳、社會支持好者自殺危險較低。"},"sources":["Kaplan & Sadock's Synopsis 11e, Suicide risk"]}},"111020-73":{"quick":"斷續自殺意念、低致命手段(割腕)、可門診/心理治療,選D。","detail":{"background":"自殺流行病學(經典考點):①自殺『企圖(attempt)』女性多於男性,但自殺『死亡(completed)』男性多於女性(男性用較激烈致命手段如上吊、跳樓、槍);②自殺死亡率隨年齡『上升』,老年人(尤其>65歲男性)最高;③高危精神疾病:憂鬱症、雙極性疾患、思覺失調、酒癮/物質、焦慮與人格疾患皆增加風險(焦慮疾患『與自殺有關』);④自殺死亡者約90%以上有可診斷的精神疾病;⑤約45–80%自殺企圖者有情緒疾患。高風險因子:嚴重憂鬱、無望感(hopelessness)、合併精神病、過去自殺企圖史(最強預測因子之一)、明確計畫與致命手段、男性、高齡、獨居/鰥寡、社會支持差、慢性病、物質濫用、自責;相對低風險:有社會支持、衝動性而非計畫性、低致命手段。醫師(尤其精神科、麻醉科)自殺率亦偏高。神經生物:自殺與中樞『血清素(5-HT)功能低下(CSF 5-HIAA下降)』相關。 自殺處置應依風險分層:高風險(明確計畫、高致命手段、嚴重憂鬱無望、缺乏支持)需住院;低-中風險(斷續意念、低致命手段如淺割腕、有支持)可門診加強追蹤與心理治療。本題D屬可門診者。A『一律立即住院』過度;B『轉內科門診』、C『移轉社工門診』未針對自殺風險妥善處理。","options":{"A":"過度。並非所有自殺意念都需立即住院。","B":"不當。曾自殺企圖者不應僅轉內科門診。","C":"不當。明顯憂鬱無望缺支持者風險高,不應只移轉社工門診。","D":"正確(本題選此)。斷續意念、低致命手段,可門診或心理治療。"},"sources":["Kaplan & Sadock's Synopsis 11e, Suicide management"]}},"111020-79":{"quick":"為病情與病人安全,主治醫師『可暫時禁止特定訪客』,選B。","detail":{"background":"台灣精神衛生法:為保障病情與病人安全,主治醫師『可暫時限制特定會客/訪客』(B);強制住院/社區治療有法定程序。","options":{"A":"錯誤。全面裝設攝影須兼顧病人隱私與告知,非『不需告知即可全面裝設』。","B":"正確(本題選此)。為病情與安全,可暫時限制特定家屬(衝突來源)探視。","C":"錯誤。錄影教學用途須病人『同意』,非『未反對』即可。","D":"錯誤。約束須有醫囑、定期評估記錄、且不可長時間不予探視/監測(連續2小時不探視不當)。"},"sources":["台灣精神衛生法 病人權益保護"]}},"111080-73":{"quick":"精神科醫師是醫師族群中自殺高危險群之一,選B。","detail":{"background":"自殺危險因子:精神科醫師、麻醉科等為醫師中自殺『高危險群之一』(B);職業壓力與藥物可近性相關。","options":{"A":"錯誤。一般而言『男性』自殺死亡危險較高。","B":"正確(本題選此)。醫師中精神科醫師(及麻醉科)自殺率偏高。","C":"錯誤。自殺死亡率以老年最高,非兒童青少年最高。","D":"錯誤。思覺失調、酒癮等精神疾病是自殺重要因素。"},"sources":["Kaplan & Sadock's Synopsis 11e, Suicide in physicians"]}},"112080-73":{"quick":"約束/隔離須有醫囑;『緊急先口頭醫囑逕行』在規範上最不適當(應有正式醫囑與程序),選A。","detail":{"background":"約束與隔離規範:須有『醫囑與正式程序、定時評估記錄』;『緊急僅憑口頭逕行而無正式醫囑/程序』最不適當(A)。","options":{"A":"錯誤(本題選此,最不適當)。約束/隔離須有正式醫囑與程序,不應僅憑緊急口頭逕行(縱使緊急亦須儘速補正並記錄)。","B":"正確。須定期審視並記錄被約束/隔離病人狀況。","C":"正確。醫囑須明確訂出方式與時間。","D":"正確。延展須再次評估必要性。"},"sources":["台灣精神衛生法 約束與隔離規範"]}},"113070-73":{"quick":"重鬱症自殺與中樞『血清素功能異常』相關,選C。","detail":{"background":"自殺流行病學(經典考點):①自殺『企圖(attempt)』女性多於男性,但自殺『死亡(completed)』男性多於女性(男性用較激烈致命手段如上吊、跳樓、槍);②自殺死亡率隨年齡『上升』,老年人(尤其>65歲男性)最高;③高危精神疾病:憂鬱症、雙極性疾患、思覺失調、酒癮/物質、焦慮與人格疾患皆增加風險(焦慮疾患『與自殺有關』);④自殺死亡者約90%以上有可診斷的精神疾病;⑤約45–80%自殺企圖者有情緒疾患。高風險因子:嚴重憂鬱、無望感(hopelessness)、合併精神病、過去自殺企圖史(最強預測因子之一)、明確計畫與致命手段、男性、高齡、獨居/鰥寡、社會支持差、慢性病、物質濫用、自責;相對低風險:有社會支持、衝動性而非計畫性、低致命手段。醫師(尤其精神科、麻醉科)自殺率亦偏高。神經生物:自殺與中樞『血清素(5-HT)功能低下(CSF 5-HIAA下降)』相關。 本題重鬱症多年、不規則治療、跳樓自殺:自殺主因是『精神疾病(重鬱症)』而非單一夫妻口角(口角僅誘因);重鬱症『可有』現實感不佳(精神病性憂鬱);自殺神經生物與『中樞血清素(5-HT)功能低下』相關(CSF 5-HIAA下降);自殺可預防(陪伴、限制致命手段、治療憂鬱有助降低風險)。","options":{"A":"錯誤。自殺主因是重鬱症,夫妻口角僅誘因。","B":"錯誤。重鬱症(精神病性)可有現實感不佳。","C":"正確(本題選此)。自殺機轉與中樞血清素功能異常相關。","D":"錯誤。陪伴、限制手段、治療可降低自殺風險(可預防)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Neurobiology of suicide (5-HT)"]}},"114020-73":{"quick":"精神衛生法中『反社會性人格違常』不屬精神疾病(強制治療)範圍,選A。","detail":{"background":"我國精神衛生法之精神疾病範圍含精神病、情感疾患等;『反社會性人格違常不屬(強制治療之)精神疾病範圍』(A)。","options":{"A":"正確(本題選此)。反社會性人格違常被排除於精神衛生法的精神疾病(強制治療對象)範圍之外。","B":"精神病屬精神疾病範圍。","C":"精神官能症屬精神疾病範圍。","D":"酒癮、藥癮屬精神疾病範圍。"},"sources":["台灣精神衛生法 精神疾病定義"]}},"114070-73":{"quick":"『為了減少過度感覺刺激』不是約束的適當適應症,選C。","detail":{"background":"約束之適當適應症為防止傷害自己/他人、維持必要治療;『為了減少過度感覺刺激』不是約束的適當理由(C)。","options":{"A":"適當適應症。防止對治療計畫/環境造成重大干擾。","B":"適當適應症。基於病人自願合理要求(如要求隔離以減少刺激)。","C":"錯誤(本題選此,非適當約束適應症)。減少過度感覺刺激應以環境調整/隔離達成,非以『身體約束』為手段。","D":"適當。可作為進行中行為治療計畫的一部分。"},"sources":["台灣精神衛生法/約束隔離指引"]}},"114070-79":{"quick":"病人對特定對象有報復意圖且危險高,不能以『守密』為由不告知任何人,故C最不恰當。","detail":{"background":"生命倫理四原則:①尊重自主(autonomy,尊重有能力病人的自我決定)②不傷害(non-maleficence)③行善/有利(beneficence,促進病人最大利益)④正義(justice,公平分配資源、誠實對待社會)。意思能力不完全(incompetent)的成年病人由家屬代理同意,須符合病人最大利益並『不違背病人若有能力時會做的決定(替代判斷)』,而非醫師逕行決定。Tarasoff原則:當病人對特定第三人有明確而立即的傷害威脅時,守密義務『退讓』,醫師有保護/警告義務(通報、告知對象、必要時留置)。 本題思覺失調病人對特定鄰居('報復對方')有傷害意圖:屬Tarasoff情境,守密義務『退讓』,醫師有保護/警告義務。應釐清意圖、轉告精神科醫師、必要時通知警衛/家屬並留置。C『基於守密不得告知任何人』最不恰當(會置潛在受害者於危險)。","options":{"A":"恰當。澄清病情、鼓勵治療、釐清報復意圖。","B":"恰當。釐清細節並取得病人配合、轉告精神科醫師。","C":"錯誤(本題選此,最不恰當)。對特定對象有明確危險時,不能以守密為由不告知任何人(應履行保護義務)。","D":"恰當。危險性高時應留置、通知家屬、聯絡精神科協助。"},"sources":["Tarasoff duty to protect; 醫療保密例外"]}},"102110-75":{"quick":"對真實外在刺激(地磚花紋)的錯誤知覺=錯覺(illusion),選B。","detail":{"background":"對『真實外在刺激』的錯誤知覺(把地磚花紋看成蟲)=『錯覺(illusion)』(B);與無刺激而知覺=幻覺不同。","options":{"A":"幻覺是『無』外在刺激卻有知覺,本題有真實的地磚花紋。","B":"正確(本題選此)。對真實外在刺激的錯誤知覺=錯覺(illusion)。","C":"假性幻覺發生於內在主觀空間。","D":"妄想是錯誤信念,非知覺障礙。"},"sources":["Kaplan & Sadock's Synopsis 11e, Perception (illusion vs hallucination)"]}},"104030-65":{"quick":"人格疾患『會』有衝動控制不佳(尤B群),故B錯誤。","detail":{"background":"精神症狀學(psychopathology):知覺(perception)障礙—錯覺(illusion,對『真實外在刺激』的錯誤知覺,如把地磚花紋看成蟲)、幻覺(hallucination,『無外在刺激』卻有知覺,如無聲卻聽到人說話)、假性幻覺(發生於主觀內在空間、知道非真實)。思考障礙分『形式/流程(form)』—意念飛躍(flight of ideas)、聯結鬆弛、新語症(neologism)、思考停頓/中斷(thought blocking)、答非所問;與『內容(content)』—妄想(delusion):被害、關係(referential)、誇大(grandeur)、嫉妒、虛無(nihilistic)、被控制、思考插入(insertion)/抽離(withdrawal)/廣播。記憶障礙—虛談(confabulation,以虛構填補記憶空缺,見於Korsakoff/失憶症)。抽象思考評估—解釋成語/諺語的引申義(如『長江後浪推前浪』),思覺失調與失智者可呈現具體化(concrete)思考障礙;『遇火災怎麼辦』屬判斷力(judgment)而非抽象思考。自閉性思考(autistic/dereistic thinking)—以自我為中心、脫離現實、不顧客觀邏輯,見於思覺失調與自閉症。防衛機轉(defense mechanism)—投射(projection,把自己不被接受的衝動歸於他人,如『以小人之心度君子之腹』)、否認(denial)、合理化(rationalization)、隔離/情感抽離(isolation of affect)、幻想(fantasy)、解離(dissociation)、昇華(sublimation)、退化(regression)。 精神狀態檢查(MSE)的衝動性評估:評估病人對性、攻擊及其他衝動的控制能力、對社會適切行為的覺察、以及對自己與他人造成的潛在危險。人格疾患(尤其邊緣型、反社會型)『常』有衝動控制不佳,故B『人格疾患不會有衝動控制不佳』錯誤。","options":{"A":"正確。衝動評估含性、攻擊及其他衝動控制。","B":"錯誤(本題選此)。人格疾患(尤B群)『常』有衝動控制不佳。","C":"正確。須確認病人對社會適切行為的覺察能力。","D":"正確。衝動評估含對自己與他人的潛在危險。"},"sources":["Kaplan & Sadock's Synopsis 11e, MSE (impulse control)"]}},"104090-65":{"quick":"幻覺『發生情境』在評估上很重要(如入睡前幻覺、酒精戒斷幻覺),故C錯誤。","detail":{"background":"精神症狀學(psychopathology):知覺(perception)障礙—錯覺(illusion,對『真實外在刺激』的錯誤知覺,如把地磚花紋看成蟲)、幻覺(hallucination,『無外在刺激』卻有知覺,如無聲卻聽到人說話)、假性幻覺(發生於主觀內在空間、知道非真實)。思考障礙分『形式/流程(form)』—意念飛躍(flight of ideas)、聯結鬆弛、新語症(neologism)、思考停頓/中斷(thought blocking)、答非所問;與『內容(content)』—妄想(delusion):被害、關係(referential)、誇大(grandeur)、嫉妒、虛無(nihilistic)、被控制、思考插入(insertion)/抽離(withdrawal)/廣播。記憶障礙—虛談(confabulation,以虛構填補記憶空缺,見於Korsakoff/失憶症)。抽象思考評估—解釋成語/諺語的引申義(如『長江後浪推前浪』),思覺失調與失智者可呈現具體化(concrete)思考障礙;『遇火災怎麼辦』屬判斷力(judgment)而非抽象思考。自閉性思考(autistic/dereistic thinking)—以自我為中心、脫離現實、不顧客觀邏輯,見於思覺失調與自閉症。防衛機轉(defense mechanism)—投射(projection,把自己不被接受的衝動歸於他人,如『以小人之心度君子之腹』)、否認(denial)、合理化(rationalization)、隔離/情感抽離(isolation of affect)、幻想(fantasy)、解離(dissociation)、昇華(sublimation)、退化(regression)。 知覺評估須注意幻覺的型態(聽/視/觸/嗅)、內容、以及『發生情境』(入睡期hypnagogic、清醒期hypnopompic、酒精/物質相關、譫妄、特定疾病)—情境對鑑別診斷很重要。古柯鹼/安非他命可致觸幻覺(formication,蟲爬感)。","options":{"A":"正確。知覺異常可為幻覺或錯覺。","B":"正確。知覺異常常與視/聽/嗅/觸覺系統有關。","C":"錯誤(本題選此)。幻覺『發生的情境』在知覺評估中很重要(助鑑別)。","D":"正確。古柯鹼可致觸幻覺(formication)。"},"sources":["Kaplan & Sadock's Synopsis 11e, MSE (perception)"]}},"107020-53":{"quick":"失智者不准配偶接電話、見人聊天就大怒=嫉妒妄想(delusion of jealousy),選C。","detail":{"background":"精神症狀學(psychopathology):知覺(perception)障礙—錯覺(illusion,對『真實外在刺激』的錯誤知覺,如把地磚花紋看成蟲)、幻覺(hallucination,『無外在刺激』卻有知覺,如無聲卻聽到人說話)、假性幻覺(發生於主觀內在空間、知道非真實)。思考障礙分『形式/流程(form)』—意念飛躍(flight of ideas)、聯結鬆弛、新語症(neologism)、思考停頓/中斷(thought blocking)、答非所問;與『內容(content)』—妄想(delusion):被害、關係(referential)、誇大(grandeur)、嫉妒、虛無(nihilistic)、被控制、思考插入(insertion)/抽離(withdrawal)/廣播。記憶障礙—虛談(confabulation,以虛構填補記憶空缺,見於Korsakoff/失憶症)。抽象思考評估—解釋成語/諺語的引申義(如『長江後浪推前浪』),思覺失調與失智者可呈現具體化(concrete)思考障礙;『遇火災怎麼辦』屬判斷力(judgment)而非抽象思考。自閉性思考(autistic/dereistic thinking)—以自我為中心、脫離現實、不顧客觀邏輯,見於思覺失調與自閉症。防衛機轉(defense mechanism)—投射(projection,把自己不被接受的衝動歸於他人,如『以小人之心度君子之腹』)、否認(denial)、合理化(rationalization)、隔離/情感抽離(isolation of affect)、幻想(fantasy)、解離(dissociation)、昇華(sublimation)、退化(regression)。 本題阿茲海默症病人懷疑配偶與他人有染(不准接電話、見人聊天就生氣)=嫉妒妄想(delusion of jealousy,又稱Othello syndrome),是失智行為精神症狀(BPSD)常見的妄想型態之一。","options":{"A":"被害妄想是認為被人加害,非本題核心。","B":"被竊妄想是認為東西被偷(失智常見,但本題是配偶不忠)。","C":"正確(本題選此)。懷疑配偶不忠=嫉妒妄想。","D":"非我家妄想是認為居所非自己家。"},"sources":["Kaplan & Sadock's Synopsis 11e, Delusions; BPSD"]}},"107020-64":{"quick":"被害妄想屬思考『內容』障礙,非思考形式障礙,選D。","detail":{"background":"思考『形式(form)』障礙指聯想鬆弛、語無倫次、思考中斷;『被害妄想屬思考「內容」障礙』非形式障礙(D)。","options":{"A":"意念飛躍屬思考形式障礙。","B":"新語症屬思考形式障礙。","C":"思考停頓(thought blocking)屬思考形式障礙。","D":"正確(本題選此)。被害妄想屬思考『內容』障礙,非形式障礙。"},"sources":["Kaplan & Sadock's Synopsis 11e, Thought form vs content"]}},"107020-66":{"quick":"『以小人之心度君子之腹』=投射(projection),選C。","detail":{"background":"精神症狀學(psychopathology):知覺(perception)障礙—錯覺(illusion,對『真實外在刺激』的錯誤知覺,如把地磚花紋看成蟲)、幻覺(hallucination,『無外在刺激』卻有知覺,如無聲卻聽到人說話)、假性幻覺(發生於主觀內在空間、知道非真實)。思考障礙分『形式/流程(form)』—意念飛躍(flight of ideas)、聯結鬆弛、新語症(neologism)、思考停頓/中斷(thought blocking)、答非所問;與『內容(content)』—妄想(delusion):被害、關係(referential)、誇大(grandeur)、嫉妒、虛無(nihilistic)、被控制、思考插入(insertion)/抽離(withdrawal)/廣播。記憶障礙—虛談(confabulation,以虛構填補記憶空缺,見於Korsakoff/失憶症)。抽象思考評估—解釋成語/諺語的引申義(如『長江後浪推前浪』),思覺失調與失智者可呈現具體化(concrete)思考障礙;『遇火災怎麼辦』屬判斷力(judgment)而非抽象思考。自閉性思考(autistic/dereistic thinking)—以自我為中心、脫離現實、不顧客觀邏輯,見於思覺失調與自閉症。防衛機轉(defense mechanism)—投射(projection,把自己不被接受的衝動歸於他人,如『以小人之心度君子之腹』)、否認(denial)、合理化(rationalization)、隔離/情感抽離(isolation of affect)、幻想(fantasy)、解離(dissociation)、昇華(sublimation)、退化(regression)。 投射(projection):將自己不被接受的想法/衝動歸咎於他人。『以小人之心度君子之腹』正是把自己的卑劣心思投射到他人身上,是投射的典型例子。","options":{"A":"隔離(isolation)是把情感與想法分開。","B":"否定(denial)是否認現實。","C":"正確(本題選此)。投射(projection)—把自己的心思歸於他人。","D":"合理化(rationalization)是為行為找看似合理的理由。"},"sources":["Kaplan & Sadock's Synopsis 11e, Defense mechanisms"]}},"107020-70":{"quick":"『看電影遇火災怎麼辦』評估的是『判斷力(judgment)』而非抽象思考,故A錯誤。","detail":{"background":"抽象思考以解釋諺語/異同評估;『遇火災怎麼辦』評估的是『判斷力(judgment)』而非抽象思考(故A錯)。","options":{"A":"錯誤(本題選此)。『遇火災怎麼辦』評估的是判斷力(judgment),非抽象思考。","B":"正確。解釋成語/諺語的引申義可評估抽象思考。","C":"正確。思覺失調者可有抽象思考障礙(具體化)。","D":"正確。失智者可有抽象思考障礙。"},"sources":["Kaplan & Sadock's Synopsis 11e, MSE (abstract thinking vs judgment)"]}},"109020-67":{"quick":"虛談(confabulation)反映『記憶』障礙,選C。","detail":{"background":"精神症狀學(psychopathology):知覺(perception)障礙—錯覺(illusion,對『真實外在刺激』的錯誤知覺,如把地磚花紋看成蟲)、幻覺(hallucination,『無外在刺激』卻有知覺,如無聲卻聽到人說話)、假性幻覺(發生於主觀內在空間、知道非真實)。思考障礙分『形式/流程(form)』—意念飛躍(flight of ideas)、聯結鬆弛、新語症(neologism)、思考停頓/中斷(thought blocking)、答非所問;與『內容(content)』—妄想(delusion):被害、關係(referential)、誇大(grandeur)、嫉妒、虛無(nihilistic)、被控制、思考插入(insertion)/抽離(withdrawal)/廣播。記憶障礙—虛談(confabulation,以虛構填補記憶空缺,見於Korsakoff/失憶症)。抽象思考評估—解釋成語/諺語的引申義(如『長江後浪推前浪』),思覺失調與失智者可呈現具體化(concrete)思考障礙;『遇火災怎麼辦』屬判斷力(judgment)而非抽象思考。自閉性思考(autistic/dereistic thinking)—以自我為中心、脫離現實、不顧客觀邏輯,見於思覺失調與自閉症。防衛機轉(defense mechanism)—投射(projection,把自己不被接受的衝動歸於他人,如『以小人之心度君子之腹』)、否認(denial)、合理化(rationalization)、隔離/情感抽離(isolation of affect)、幻想(fantasy)、解離(dissociation)、昇華(sublimation)、退化(regression)。 虛談(confabulation)指以虛構內容無意識地填補記憶空缺,是記憶障礙的表現,典型見於Korsakoff症候群與其他失憶症。","options":{"A":"思考障礙非虛談的本質。","B":"情緒障礙非虛談。","C":"正確(本題選此)。虛談反映記憶障礙。","D":"語言障礙非虛談。"},"sources":["Kaplan & Sadock's Synopsis 11e, Memory (confabulation)"]}},"109080-60":{"quick":"自閉性思考是『脫離現實、不顧客觀性』,故B(強調客觀性)錯誤。","detail":{"background":"精神症狀學(psychopathology):知覺(perception)障礙—錯覺(illusion,對『真實外在刺激』的錯誤知覺,如把地磚花紋看成蟲)、幻覺(hallucination,『無外在刺激』卻有知覺,如無聲卻聽到人說話)、假性幻覺(發生於主觀內在空間、知道非真實)。思考障礙分『形式/流程(form)』—意念飛躍(flight of ideas)、聯結鬆弛、新語症(neologism)、思考停頓/中斷(thought blocking)、答非所問;與『內容(content)』—妄想(delusion):被害、關係(referential)、誇大(grandeur)、嫉妒、虛無(nihilistic)、被控制、思考插入(insertion)/抽離(withdrawal)/廣播。記憶障礙—虛談(confabulation,以虛構填補記憶空缺,見於Korsakoff/失憶症)。抽象思考評估—解釋成語/諺語的引申義(如『長江後浪推前浪』),思覺失調與失智者可呈現具體化(concrete)思考障礙;『遇火災怎麼辦』屬判斷力(judgment)而非抽象思考。自閉性思考(autistic/dereistic thinking)—以自我為中心、脫離現實、不顧客觀邏輯,見於思覺失調與自閉症。防衛機轉(defense mechanism)—投射(projection,把自己不被接受的衝動歸於他人,如『以小人之心度君子之腹』)、否認(denial)、合理化(rationalization)、隔離/情感抽離(isolation of affect)、幻想(fantasy)、解離(dissociation)、昇華(sublimation)、退化(regression)。 自閉性思考(autistic thinking,又稱dereistic thinking):以自我為中心、依個人內在邏輯與幻想、脫離現實、不顧客觀事實,常見於思覺失調與自閉症。故『強調思考的客觀性』與其特徵相反。","options":{"A":"正確。自閉性思考以自我為中心。","B":"錯誤(本題選此)。自閉性思考『脫離客觀現實』,非強調客觀性。","C":"正確。多脫離現實。","D":"正確。常見於思覺失調症與自閉症。"},"sources":["Kaplan & Sadock's Synopsis 11e, Autistic/dereistic thinking"]}},"110020-59":{"quick":"無外界刺激卻感知到刺激存在=幻覺(hallucination),選C。","detail":{"background":"『無外界感官刺激卻知覺到刺激存在』=幻覺(hallucination)(C);錯覺則為對真實刺激的誤判。","options":{"A":"錯覺是對『真實刺激』的錯誤知覺。","B":"妄想是錯誤信念,非知覺。","C":"正確(本題選此)。無外在刺激卻有知覺=幻覺。","D":"失憶是記憶障礙,非知覺。"},"sources":["Kaplan & Sadock's Synopsis 11e, Hallucination"]}},"111080-59":{"quick":"病人多話難打斷、誇大、無病識感、意念飛躍=躁症;『不包括解離現象』,選B。","detail":{"background":"精神症狀學(psychopathology):知覺(perception)障礙—錯覺(illusion,對『真實外在刺激』的錯誤知覺,如把地磚花紋看成蟲)、幻覺(hallucination,『無外在刺激』卻有知覺,如無聲卻聽到人說話)、假性幻覺(發生於主觀內在空間、知道非真實)。思考障礙分『形式/流程(form)』—意念飛躍(flight of ideas)、聯結鬆弛、新語症(neologism)、思考停頓/中斷(thought blocking)、答非所問;與『內容(content)』—妄想(delusion):被害、關係(referential)、誇大(grandeur)、嫉妒、虛無(nihilistic)、被控制、思考插入(insertion)/抽離(withdrawal)/廣播。記憶障礙—虛談(confabulation,以虛構填補記憶空缺,見於Korsakoff/失憶症)。抽象思考評估—解釋成語/諺語的引申義(如『長江後浪推前浪』),思覺失調與失智者可呈現具體化(concrete)思考障礙;『遇火災怎麼辦』屬判斷力(judgment)而非抽象思考。自閉性思考(autistic/dereistic thinking)—以自我為中心、脫離現實、不顧客觀邏輯,見於思覺失調與自閉症。防衛機轉(defense mechanism)—投射(projection,把自己不被接受的衝動歸於他人,如『以小人之心度君子之腹』)、否認(denial)、合理化(rationalization)、隔離/情感抽離(isolation of affect)、幻想(fantasy)、解離(dissociation)、昇華(sublimation)、退化(regression)。 本題病人講話快難打斷、話題跳躍(意念飛躍flight of ideas)、誇大妄想(自認能拯救地球)、不知為何住院(無病識感)=躁症表現。其中『不包括』解離現象(解離是身分/記憶/意識的整合斷裂,本題無)。","options":{"A":"包括。語速快、話題不斷變化=意念飛躍。","B":"正確(本題選此,不包括)。本題無解離現象。","C":"包括。自認能拯救地球=誇大妄想。","D":"包括。不知為何被要求住院=無病識感。"},"sources":["Kaplan & Sadock's Synopsis 11e, Manic MSE"]}},"111080-62":{"quick":"病人有關係妄想、思考抽離、被害妄想;『未涵蓋思考置入』,選D。","detail":{"background":"精神症狀學(psychopathology):知覺(perception)障礙—錯覺(illusion,對『真實外在刺激』的錯誤知覺,如把地磚花紋看成蟲)、幻覺(hallucination,『無外在刺激』卻有知覺,如無聲卻聽到人說話)、假性幻覺(發生於主觀內在空間、知道非真實)。思考障礙分『形式/流程(form)』—意念飛躍(flight of ideas)、聯結鬆弛、新語症(neologism)、思考停頓/中斷(thought blocking)、答非所問;與『內容(content)』—妄想(delusion):被害、關係(referential)、誇大(grandeur)、嫉妒、虛無(nihilistic)、被控制、思考插入(insertion)/抽離(withdrawal)/廣播。記憶障礙—虛談(confabulation,以虛構填補記憶空缺,見於Korsakoff/失憶症)。抽象思考評估—解釋成語/諺語的引申義(如『長江後浪推前浪』),思覺失調與失智者可呈現具體化(concrete)思考障礙;『遇火災怎麼辦』屬判斷力(judgment)而非抽象思考。自閉性思考(autistic/dereistic thinking)—以自我為中心、脫離現實、不顧客觀邏輯,見於思覺失調與自閉症。防衛機轉(defense mechanism)—投射(projection,把自己不被接受的衝動歸於他人,如『以小人之心度君子之腹』)、否認(denial)、合理化(rationalization)、隔離/情感抽離(isolation of affect)、幻想(fantasy)、解離(dissociation)、昇華(sublimation)、退化(regression)。 本題病人:電視報導他們家(關係妄想referential)、想法被『抽走』(思考抽離thought withdrawal)、女傭偷錢/要害他(被害妄想)、配偶被替換(Capgras樣)。其中『未涵蓋』思考置入(thought insertion,認為外力把想法『放入』腦中)—本題是想法被『抽走』(withdrawal)而非被『放入』(insertion)。","options":{"A":"涵蓋。電視報導自己=關係妄想。","B":"涵蓋。想法被抽走=思考抽離。","C":"涵蓋。女傭要害他=被害妄想。","D":"正確(本題選此,未涵蓋)。本題是思考『抽離』,非思考『置入』。"},"sources":["Kaplan & Sadock's Synopsis 11e, Thought content (insertion vs withdrawal)"]}},"112020-72":{"quick":"四項防衛機轉配對皆正確,選D(1234)。","detail":{"background":"精神症狀學(psychopathology):知覺(perception)障礙—錯覺(illusion,對『真實外在刺激』的錯誤知覺,如把地磚花紋看成蟲)、幻覺(hallucination,『無外在刺激』卻有知覺,如無聲卻聽到人說話)、假性幻覺(發生於主觀內在空間、知道非真實)。思考障礙分『形式/流程(form)』—意念飛躍(flight of ideas)、聯結鬆弛、新語症(neologism)、思考停頓/中斷(thought blocking)、答非所問;與『內容(content)』—妄想(delusion):被害、關係(referential)、誇大(grandeur)、嫉妒、虛無(nihilistic)、被控制、思考插入(insertion)/抽離(withdrawal)/廣播。記憶障礙—虛談(confabulation,以虛構填補記憶空缺,見於Korsakoff/失憶症)。抽象思考評估—解釋成語/諺語的引申義(如『長江後浪推前浪』),思覺失調與失智者可呈現具體化(concrete)思考障礙;『遇火災怎麼辦』屬判斷力(judgment)而非抽象思考。自閉性思考(autistic/dereistic thinking)—以自我為中心、脫離現實、不顧客觀邏輯,見於思覺失調與自閉症。防衛機轉(defense mechanism)—投射(projection,把自己不被接受的衝動歸於他人,如『以小人之心度君子之腹』)、否認(denial)、合理化(rationalization)、隔離/情感抽離(isolation of affect)、幻想(fantasy)、解離(dissociation)、昇華(sublimation)、退化(regression)。 逐項:①從想像的朋友獲得慰藉=幻想(fantasy);②激烈爭吵後突然忘記自己是誰=解離(dissociation);③不帶感情詳述被虐經過=情感抽離(isolation of affect);④指責醫師不專業=投射(projection)。四項配對皆正確。","options":{"A":"不完整。","B":"不完整(漏③)。","C":"不完整(漏①)。","D":"正確(本題選此)。四項防衛機轉配對皆正確。"},"sources":["Kaplan & Sadock's Synopsis 11e, Defense mechanisms"]}},"112080-59":{"quick":"自認神仙下凡能拯救世人=誇大(grandeur)妄想,選B。","detail":{"background":"妄想內容分類:被害、關係、誇大、罪惡、慮病、嫉妒;『自認神仙下凡能拯救世人』=誇大(grandeur)妄想(B)。","options":{"A":"錯誤。同事受黑道指使要殺他=被害妄想,非虛無妄想(虛無是認為自己/世界不存在)。","B":"正確(本題選此)。自認神仙下凡拯救世人=誇大妄想。","C":"錯誤。同事對她笑就是愛上她=情愛妄想(erotomania),非嫉妒妄想(嫉妒是懷疑配偶不忠)。","D":"錯誤。同事聊天就是聯手對付他=被害/關係妄想,非控制妄想(控制是認為被外力操控)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Types of delusions"]}},"103030-64":{"quick":"放鬆/生理回饋對需高度認知控制與衝動調節的『ADHD』較不適用,選C。","detail":{"background":"生理回饋/放鬆訓練適用於焦慮、緊張性頭痛、高血壓等;『需高度認知控制與衝動調節之ADHD』較不適用(C)。","options":{"A":"睡眠障礙適用放鬆訓練。","B":"氣喘(自律相關)適用。","C":"正確(本題選此)。ADHD核心非自律調節,放鬆訓練較不適用。","D":"緊張性頭痛適用放鬆訓練。"},"sources":["Kaplan & Sadock's Synopsis 11e, Biofeedback/relaxation"]}},"103030-80":{"quick":"末期病人治療順利結束後要求最後擁抱,醫師可答應,選A。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 心理治療須維持專業界限:不可與病人共進晚餐/社交(B)、不可接受病人理財/金錢往來(C)、不可不當自我揭露並引導病人決定(D離婚)。但對『治療已結束、僅餘數日生命』的末期病人,給予一個告別擁抱屬人性化、情境合宜的善終照顧,可答應(A)。","options":{"A":"正確(本題選此)。治療結束後對末期病人的告別擁抱,情境合宜可答應。","B":"不當。與病人社交聚餐違反界限。","C":"不當。接受病人理財/金錢往來違反界限。","D":"不當。不當自我揭露並引導病人離婚違反界限。"},"sources":["Kaplan & Sadock's Synopsis 11e, Therapeutic boundaries"]}},"104030-63":{"quick":"敵意會促進『交感』神經而非副交感,故C錯誤。"
