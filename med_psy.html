101030-77":{"quick":"社交畏懼症最常於『青少年期(約13歲)』發病,非30歲,故B錯誤。","detail":{"background":"社交焦慮症(social anxiety disorder/social phobia):害怕在社交或表現場合被他人評價/批評而出糗,導致逃避;女性盛行率略高於男性(臨床求診則男性也多)、發病年齡早(中位約13歲、青少年期),為慢性病程;常併發畏避型人格障礙(尤其廣泛型)、憂鬱、物質濫用。治療:SSRI/SNRI、CBT(暴露+認知重建),心理合併藥物常優於單一治療;表現型可用β-blocker。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"正確。流行病學女性略多於男性。","B":"錯誤(本題選此)。最常於青少年期(約13歲)發病,非30歲。","C":"正確。心理合併藥物療效常優於單一治療。","D":"正確。廣泛型常併發畏避型人格障礙。"},"sources":["DSM-5-TR Social Anxiety Disorder","Kaplan & Sadock's Synopsis 11e"]}},"102030-64":{"quick":"BZD應於SSRI起效後『逐漸減停』,本題D描述了正確減停流程;處置錯誤者需逐項判,答案B(行為治療應為腹式而非胸式呼吸)。","detail":{"background":"本題考恐慌症完整處置。恐慌症換氣過度(hyperventilation)致呼吸性鹼中毒;行為治療應教『腹式(橫膈)呼吸』與漸進放鬆,以避免換氣過度—題述B寫『胸式呼吸』為錯誤(胸式淺快呼吸反而加重換氣過度)。SSRI需持續8–12個月、低劑量起始、可改用較不鎮靜的sertraline;BZD短期併用、SSRI起效後緩慢減停。恐慌症(panic disorder):反覆、無預警的恐慌發作,數分鐘內(常約10分鐘)達高峰,症狀含心悸、冒汗、顫抖、喘不過氣、窒息感、胸悶、噁心、頭暈、發冷發熱、感覺異常、失去現實感/自我感(derealization/depersonalization)、怕失控/發瘋、怕死;發作後持續擔心再發作或改變行為(預期焦慮)≥1個月。常於青壯年起病、女性較多、為慢性病程、可併發懼曠症、憂鬱、物質濫用,自殺風險升高。因症狀酷似心臟病發作,病人常自行衝急診。治療:SSRI/SNRI為長期維持首選(初期可能加重焦慮故低劑量起始),BZD(alprazolam)短期緩解但有成癮性,CBT(認知重建+呼吸訓練+暴露)有效。","options":{"A":"正確。認知治療糾正災難化解讀。","B":"錯誤(本題選此)。應教『腹式呼吸』而非胸式呼吸(胸式淺快會加重換氣過度)。","C":"正確。SSRI持續治療≥8–12個月,可調整劑量/種類。","D":"正確。BZD初期併用,SSRI起效後緩慢減停。"},"sources":["Kaplan & Sadock's Synopsis 11e, Panic Disorder treatment"]}},"102030-71":{"quick":"見新客戶就緊張冒汗、怕說錯話得罪人=社交畏懼症,選B。","detail":{"background":"本題核心是『社交/表現場合』被評價的恐懼(怕說錯話得罪客戶),屬社交焦慮症。與恐慌症(無預警發作)、GAD(廣泛多項擔憂)、OCD(強迫思想行為)區分。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"OCD以強迫思想/行為為主。","B":"正確(本題選此)。針對社交場合被評價的恐懼=社交畏懼症。","C":"GAD是廣泛、多項、慢性擔憂,非僅社交。","D":"恐慌症是無預警陣發。"},"sources":["DSM-5-TR Social Anxiety Disorder"]}},"102110-65":{"quick":"特定畏懼症(怕狗)『以行為治療(系統減敏)為主』,藥物非首選,故A錯誤。","detail":{"background":"特定畏懼症(specific phobia):對特定物件/情境(動物、高度、血液-注射-受傷、自然環境、情境)過度且不合理的恐懼與逃避;病人多知道害怕過度(有病識感)。治療以『行為治療』為主—系統減敏感法(systematic desensitization)、暴露法(exposure)最常用且最有效;藥物非首選(blood-injection-injury型有暈厥傾向需applied tension);本題『藥物治療效果最佳』錯誤。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"錯誤(本題選此)。特定畏懼症以行為治療為主,藥物非首選/非最佳。","B":"正確。心理治療可協助理解並鼓勵進一步治療。","C":"正確。催眠、支持性、家庭治療或有助益。","D":"正確。行為治療(系統減敏)為最常用方法。"},"sources":["DSM-5-TR Specific Phobia","Kaplan & Sadock's Synopsis 11e"]}},"102110-66":{"quick":"恐慌症首次發作最常自行衝急診(酷似心臟病),選B。","detail":{"background":"恐慌症因症狀酷似心臟病(胸悶心悸瀕死感),『首次發作最常自行衝急診』(B)。","options":{"A":"急性精神病多由家人/警方帶來,病識感差,少自行求診。","B":"正確(本題選此)。恐慌發作酷似心臟病,病人常自行衝急診。","C":"身體畸形性疾患多求診於皮膚/整形,非急診。","D":"慮病症多反覆於各科門診,非急診。"},"sources":["Kaplan & Sadock's Synopsis 11e, Panic Disorder"]}},"102110-67":{"quick":"OCD最常見共病是『重度憂鬱症』,選C。","detail":{"background":"強迫症(OCD)最常見的共病是重度憂鬱症(約2/3一生中曾有重鬱);也常合併其他焦慮症、tic/妥瑞(尤其早發男性)、強迫型人格。但『最常見』者為重鬱症。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"tic disorder與早發OCD相關但非最常見共病。","B":"妥瑞與OCD相關但非最常見。","C":"正確(本題選此)。OCD最常見共病為重度憂鬱症。","D":"酒精濫用可共病但非最常見。"},"sources":["DSM-5-TR OCD comorbidity","Kaplan & Sadock's Synopsis 11e"]}},"103100-64":{"quick":"恐慌發作意識清楚,『失去定向感』非典型(屬譫妄),選D。","detail":{"background":"恐慌症(panic disorder):反覆、無預警的恐慌發作,數分鐘內(常約10分鐘)達高峰,症狀含心悸、冒汗、顫抖、喘不過氣、窒息感、胸悶、噁心、頭暈、發冷發熱、感覺異常、失去現實感/自我感(derealization/depersonalization)、怕失控/發瘋、怕死;發作後持續擔心再發作或改變行為(預期焦慮)≥1個月。常於青壯年起病、女性較多、為慢性病程、可併發懼曠症、憂鬱、物質濫用,自殺風險升高。因症狀酷似心臟病發作,病人常自行衝急診。治療:SSRI/SNRI為長期維持首選(初期可能加重焦慮故低劑量起始),BZD(alprazolam)短期緩解但有成癮性,CBT(認知重建+呼吸訓練+暴露)有效。 恐慌發作病人意識清醒、定向感保留(可有失現實感derealization但非定向感障礙);喉頭異物感(globus)、心悸、胸悶皆常見。","options":{"A":"心悸是典型恐慌症狀。","B":"喉頭異物感可見。","C":"胸悶是典型恐慌症狀。","D":"正確(本題選此,最不可能)。失去定向感屬譫妄,非恐慌發作典型表現。"},"sources":["DSM-5-TR Panic Attack symptoms"]}},"103100-65":{"quick":"OCD最常見強迫思考內容是『怕污染』,選C。","detail":{"background":"OCD:強迫行為後焦慮『暫時』緩解(非完全消除,故反覆);多為隱襲(insidious)發生(B把比例說反—應為多數隱襲);最常見強迫思考內容是污染(contamination);多數患者『知道』自己的強迫行為過度不合理(有病識感,ego-dystonic),非覺得合理。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"錯誤。強迫行為後焦慮僅『暫時』緩解,非完全消除。","B":"錯誤。多數為隱襲發生,描述比例相反。","C":"正確(本題選此)。最常見強迫思考是怕污染。","D":"錯誤。多數患者知道強迫行為過度不合理。"},"sources":["DSM-5-TR OCD"]}},"104030-67":{"quick":"GAD『通常成年早期發病』,選B。","detail":{"background":"廣泛性焦慮症(GAD):對多項日常事務過度且難控制的擔憂,持續≥6個月,伴坐立不安、易疲倦、難專注、易怒、肌肉緊張、睡眠障礙;女性約為男性兩倍、常於成年早期發病、常共病重鬱與其他焦慮症(故『合併重鬱占少數』錯)、為慢性起伏病程;非『九成曾有恐慌發作』。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"錯誤。GAD常合併重鬱(共病高),非占少數。","B":"正確(本題選此)。GAD通常成年早期發病。","C":"錯誤。並非九成以上曾經歷恐慌發作。","D":"錯誤。GAD女性約為男性兩倍,非相等。"},"sources":["DSM-5-TR Generalized Anxiety Disorder"]}},"104030-68":{"quick":"『45歲以上』首次恐慌發作須警覺合併內外科病因,選D。","detail":{"background":"恐慌症(panic disorder):反覆、無預警的恐慌發作,數分鐘內(常約10分鐘)達高峰,症狀含心悸、冒汗、顫抖、喘不過氣、窒息感、胸悶、噁心、頭暈、發冷發熱、感覺異常、失去現實感/自我感(derealization/depersonalization)、怕失控/發瘋、怕死;發作後持續擔心再發作或改變行為(預期焦慮)≥1個月。常於青壯年起病、女性較多、為慢性病程、可併發懼曠症、憂鬱、物質濫用,自殺風險升高。因症狀酷似心臟病發作,病人常自行衝急診。治療:SSRI/SNRI為長期維持首選(初期可能加重焦慮故低劑量起始),BZD(alprazolam)短期緩解但有成癮性,CBT(認知重建+呼吸訓練+暴露)有效。 恐慌症典型於青壯年起病;若『中老年(>45歲)首次』出現恐慌樣症狀,須提高警覺排除內外科病因(心律不整、甲狀腺亢進、嗜鉻細胞瘤、低血糖、肺栓塞、藥物/物質)。","options":{"A":"兒童期非典型須警覺年齡層的重點。","B":"青少年期可為一般起病年齡。","C":"25–35歲是恐慌症常見起病年齡。","D":"正確(本題選此)。>45歲首次發作須特別考慮內外科病因。"},"sources":["Kaplan & Sadock's Synopsis 11e, Panic Disorder (late-onset workup)"]}},"105020-74":{"quick":"公車上反覆無預警呼吸困難、瀕死失控感=恐慌症,選D。","detail":{"background":"反覆於公共場合(公車)無預警呼吸困難、心悸、瀕死失控感並衍生畏懼出門=恐慌症(±廣場恐懼)(D)。","options":{"A":"急性壓力症需明確創傷事件且<1個月。","B":"慮病症是持續擔心罹病,非陣發發作。","C":"社交畏懼針對社交評價場合。","D":"正確(本題選此)。反覆無預警發作、瀕死失控感=恐慌症。"},"sources":["DSM-5-TR Panic Disorder"]}},"105020-75":{"quick":"恐慌症長期穩定治療首選SSRI,選C。","detail":{"background":"恐慌症長期穩定之首選藥物為『SSRI』(C);BZD僅短期緩解,長期以SSRI/SNRI+認知行為治療。","options":{"A":"BZD僅短期緩解、有成癮性,非長期首選。","B":"情緒穩定劑用於雙相,非恐慌症。","C":"正確(本題選此)。SSRI為恐慌症長期維持首選。","D":"抗精神病藥非恐慌症首選。"},"sources":["Kaplan & Sadock's Synopsis 11e, Panic Disorder treatment"]}},"106020-68":{"quick":"因怕無廁所/無法逃離而不敢搭車去公共場所=懼曠症,選C。","detail":{"background":"懼曠症(agoraphobia):對≥2種情境(搭乘大眾運輸、開放空間、密閉空間、排隊/人群、單獨外出)感到恐懼/逃避,因擔心一旦出現恐慌樣或失能症狀時『難以逃離或得不到幫助』。本題病人怕腹瀉失禁而不敢上高速公路、搭車、去人多/無廁所處—屬懼曠症的迴避模式。常與恐慌症共病。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"適應障礙需明確壓力源且時限性。","B":"PTSD需創傷事件與再經驗症狀。","C":"正確(本題選此)。怕難以逃離/求助而逃避多種公共情境=懼曠症。","D":"GAD是廣泛擔憂,非情境逃避。"},"sources":["DSM-5-TR Agoraphobia"]}},"106080-65":{"quick":"DSM-IV焦慮性疾患不含『適應障礙合併焦慮』(屬壓力相關之適應障礙),選C。","detail":{"background":"DSM-IV焦慮性疾患包括:恐慌症(±懼曠症)、特定畏懼症、社交畏懼症、強迫症、創傷後壓力症、急性壓力症、廣泛性焦慮症。『適應障礙(adjustment disorder)合併焦慮』屬於另一類『適應障礙』(對可辨識壓力源的適應不良反應),非焦慮性疾患。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"PTSD在DSM-IV屬焦慮性疾患。","B":"恐慌症屬焦慮性疾患。","C":"正確(本題選此)。適應障礙合併焦慮屬『適應障礙』,非焦慮性疾患。","D":"社交畏懼症屬焦慮性疾患。"},"sources":["DSM-IV-TR Anxiety Disorders"]}},"106080-67":{"quick":"焦慮相關三大神經傳導物質為NE、serotonin、GABA(非乙醯膽鹼),故A最不適切。","detail":{"background":"焦慮的神經化學以正腎上腺素(NE,藍斑核過度活化)、血清素(5-HT)、GABA(抑制性,BZD與酒精經此緩解焦慮)三系統為核心;乙醯膽鹼非焦慮的主要傳導物質。適度焦慮具保護/適應性(警覺、準備);過強時呈交感興奮(心悸、冒汗、顫抖、口乾);當造成功能損害時需就醫。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"錯誤(本題選此)。三大焦慮傳導物質為NE、serotonin、GABA,非乙醯膽鹼。","B":"正確。適度焦慮具保護與適應性。","C":"正確。焦慮過強呈交感神經興奮症狀。","D":"正確。造成功能損害時需就醫。"},"sources":["Kaplan & Sadock's Synopsis 11e, Neurochemistry of anxiety"]}},"107020-65":{"quick":"SSRI對恐慌症療效佳,選C。","detail":{"background":"恐慌症治療:SSRI為一線且療效佳(C);急性可短期BZD,合併CBT,避免長期依賴BZD。","options":{"A":"錯誤。CBT對恐慌症『有效』。","B":"錯誤。BZD不應持續往上調(有耐受/依賴),應於SSRI起效後減停。","C":"正確(本題選此)。SSRI對恐慌症療效佳。","D":"錯誤。alprazolam(短效BZD)成癮性『高』,非低。"},"sources":["Kaplan & Sadock's Synopsis 11e, Panic Disorder treatment"]}},"107020-68":{"quick":"呼吸訓練最適合輔助治療『恐慌症』,選A。","detail":{"background":"恐慌症(panic disorder):反覆、無預警的恐慌發作,數分鐘內(常約10分鐘)達高峰,症狀含心悸、冒汗、顫抖、喘不過氣、窒息感、胸悶、噁心、頭暈、發冷發熱、感覺異常、失去現實感/自我感(derealization/depersonalization)、怕失控/發瘋、怕死;發作後持續擔心再發作或改變行為(預期焦慮)≥1個月。常於青壯年起病、女性較多、為慢性病程、可併發懼曠症、憂鬱、物質濫用,自殺風險升高。因症狀酷似心臟病發作,病人常自行衝急診。治療:SSRI/SNRI為長期維持首選(初期可能加重焦慮故低劑量起始),BZD(alprazolam)短期緩解但有成癮性,CBT(認知重建+呼吸訓練+暴露)有效。 恐慌發作常伴換氣過度(hyperventilation),呼吸訓練(腹式呼吸、減慢呼吸、CO2再吸入概念)可糾正過度換氣、減輕恐慌,故最適合恐慌症。","options":{"A":"正確(本題選此)。恐慌症常合併換氣過度,呼吸訓練最適合。","B":"OCD以暴露不反應(ERP)為主。","C":"重鬱以藥物/CBT/IPT為主。","D":"身體化症非以呼吸訓練為主。"},"sources":["Kaplan & Sadock's Synopsis 11e, Panic Disorder (breathing retraining)"]}},"107080-66":{"quick":"焦慮時交感興奮致『瞳孔放大』而非縮小,故A錯誤。","detail":{"background":"焦慮的生理症狀為交感神經興奮:心悸/心跳加速、呼吸急促、胸悶、出汗、顫抖、口乾、瞳孔『放大(散瞳)』、尿急、腹瀉、肌肉緊張。瞳孔縮小是副交感作用,非焦慮表現。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"正確(本題選此,非焦慮症狀)。焦慮交感興奮致瞳孔『放大』,非縮小。","B":"呼吸急促是焦慮生理症狀。","C":"胸悶是焦慮生理症狀。","D":"腹瀉是焦慮生理症狀。"},"sources":["Kaplan & Sadock's Synopsis 11e, Anxiety symptoms"]}},"108030-65":{"quick":"社交焦慮症通常初發於『青少年期』,非成人早期,故D錯誤。","detail":{"background":"社交焦慮症害怕被他人評價/批評而出糗、伴逃避行為、患者多知道害怕過度;發病早(中位約13歲、青少年期),非成人早期。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"正確。主要害怕他人批評/評價。","B":"正確。常伴逃避人群/社交場合。","C":"正確。患者認為害怕過度或不合理(有病識感)。","D":"錯誤(本題選此)。通常初發於青少年期,非成人早期。"},"sources":["DSM-5-TR Social Anxiety Disorder"]}},"108080-65":{"quick":"Buspirone作用於『5-HT1A受體』,非GABA receptor complex,故C錯誤。","detail":{"background":"GABA-A受體複合體有BZD、barbiturate、酒精、zolpidem(z-drug)等結合位,增強GABA抑制效果→鎮靜、抗焦慮、抗癲癇、肌肉鬆弛。Buspirone是『5-HT1A部分作用劑』,用於GAD,起效慢(數週)、無鎮靜/依賴,『不』作用於GABA受體。","options":{"A":"正確。zolpidem作用於GABA-A受體(BZD結合位)。","B":"正確。GABA受體複合體與抗焦慮效果相關。","C":"錯誤(本題選此)。buspirone作用於5-HT1A受體,非GABA受體。","D":"正確。GABA受體與抑制(鎮靜)效果相關。"},"sources":["Stahl's Essential Psychopharmacology (buspirone, GABA-A)"]}},"109020-64":{"quick":"身體形象畏懼症『手術/醫美無效甚或惡化』,故A錯誤。","detail":{"background":"身體形象畏懼症(body dysmorphic disorder,BDD,DSM-5歸OCD相關疾患):過度專注於想像或輕微的外觀缺陷(常見鼻子、皮膚、頭髮),反覆檢查/求證/照鏡/尋求美容手術;手術或醫美『無法』改善病情(常更不滿、惡化);好發於青少年/成年早期;常共病重鬱與OCD;治療以SSRI(高劑量)與CBT為主。","options":{"A":"錯誤(本題選此)。手術/醫美無法改善BDD,常惡化。","B":"正確。常見不滿部位含鼻子、頭髮、皮膚。","C":"正確。常共病重鬱與強迫症。","D":"正確。藥物以抗憂鬱劑(SSRI)為主。"},"sources":["DSM-5-TR Body Dysmorphic Disorder"]}},"109080-64":{"quick":"GAD最常見發病年齡是『兒童青少年至成年早期』,非50–65歲,故B錯誤。","detail":{"background":"GAD常共病其他精神疾病、慢性病程、CBT是主要心理治療、藥物可用SSRI/SNRI/buspirone(BZD短期);發病年齡多在兒童青少年至成年早期(也有人晚發,但『最常見50–65歲』錯誤)。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"正確。GAD常共病其他精神疾病。","B":"錯誤(本題選此)。最常見發病年齡為兒童青少年至成年早期,非50–65歲。","C":"正確。CBT是主要心理治療。","D":"正確。可用BZD、SSRI等藥物。"},"sources":["DSM-5-TR Generalized Anxiety Disorder"]}},"110020-65":{"quick":"8個月來對工作、孩子、健康等多項過度擔憂+身體緊張=廣泛性焦慮症,選A。","detail":{"background":"本題病人對工作業績、孩子安全/課業、自身健康等『多項』日常事務持續過度擔憂達8個月,伴心悸、胸悶、頭痛、失眠、難專注=GAD。與解離症(失憶/失自我)、畏懼症(特定情境)、強迫症(強迫思想行為)區分。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"正確(本題選此)。多項日常過度擔憂≥6個月+身體症狀=GAD。","B":"解離症以失憶/身分改變為主。","C":"畏懼症針對特定物件/情境。","D":"強迫症以強迫思想/行為為主。"},"sources":["DSM-5-TR Generalized Anxiety Disorder"]}},"110020-66":{"quick":"恐慌症患者主動衝急診比率最高,選A。","detail":{"background":"恐慌症患者主動前往急診求助比率最高(A)——發作酷似心肌梗塞,常反覆掛急診。","options":{"A":"正確(本題選此)。恐慌發作酷似心臟病,主動求診急診比率最高。","B":"重鬱症求診多在門診。","C":"畏懼症多逃避,少主動急診。","D":"雙相多由家人帶來。"},"sources":["Kaplan & Sadock's Synopsis 11e"]}},"111020-71":{"quick":"怕上台/公開講話、逃避而影響學業=社交焦慮症,『CBT有效』,選C。","detail":{"background":"本題小明自小怕上台、被叫上台則發抖冒汗講不出話、甚至翹課影響學業=社交焦慮症(表現/社交場合恐懼)。治療第一線為SSRI(非抗精神病藥)與CBT(暴露+認知重建,實證有效);預後較好的指標為較『早』治療、無共病、急性發作—『晚發、合併憂鬱』反而預後較差。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"錯誤。診斷是社交焦慮症,非PTSD(無創傷事件)。","B":"錯誤。第一線藥物是SSRI,非抗精神病藥。","C":"正確(本題選此)。CBT對社交焦慮症實證有效。","D":"錯誤。晚發、合併憂鬱是預後較差因子。"},"sources":["DSM-5-TR Social Anxiety Disorder"]}},"111080-65":{"quick":"OCD男女盛行率『相近』(成人約相等;兒童期男童略多),故D錯誤。","detail":{"background":"性別差異:社交焦慮、GAD、恐慌症、多數焦慮症女性盛行率高於男性;但強迫症(OCD)成人男女盛行率『大致相等』(兒童期則男童發病略早/略多)。故『OCD女性高於男性』錯誤。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"正確。社交焦慮症女性高於男性。","B":"正確。GAD女性高於男性。","C":"正確。恐慌症女性高於男性。","D":"錯誤(本題選此)。OCD成人男女盛行率相近,非女性較高。"},"sources":["DSM-5-TR (gender differences in anxiety/OCD)"]}},"112020-62":{"quick":"GAD『會慢性化』(慢性起伏病程),非『不會慢性化』,故C不適當。","detail":{"background":"GAD常年輕發病、可單用藥或心理治療或合併、負面生活事件可誘發;為『慢性、起伏』病程,完全緩解率不高,故『不會慢性化』不適當。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"正確。GAD常年輕發病。","B":"正確。可單用或合併藥物/心理治療。","C":"錯誤(本題選此)。GAD為慢性起伏病程,會慢性化。","D":"正確。負面生活事件可誘發GAD。"},"sources":["DSM-5-TR Generalized Anxiety Disorder"]}},"112080-63":{"quick":"OCD治療以『行為治療(暴露不反應ERP)合併藥物(SSRI)』最有效,選C。","detail":{"background":"OCD治療:第一線為SSRI(常需『高劑量、長療程』)合併暴露與不反應預防(exposure and response prevention,ERP)的行為治療;精神分析心理治療對OCD『無效』;BZD無法有效治療/預防OCD;lithium非OCD首選。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"錯誤。精神分析對OCD無效。","B":"錯誤。BZD無法有效預防OCD。","C":"正確(本題選此)。行為治療(ERP)合併SSRI最有療效。","D":"錯誤。lithium非OCD首選(用於雙相)。"},"sources":["DSM-5-TR OCD treatment","APA OCD Guidelines"]}},"112080-77":{"quick":"恐慌發作多『無預警、不可預期』,故B(常有前兆、可預期)不適當。","detail":{"background":"恐慌症(panic disorder):反覆、無預警的恐慌發作,數分鐘內(常約10分鐘)達高峰,症狀含心悸、冒汗、顫抖、喘不過氣、窒息感、胸悶、噁心、頭暈、發冷發熱、感覺異常、失去現實感/自我感(derealization/depersonalization)、怕失控/發瘋、怕死;發作後持續擔心再發作或改變行為(預期焦慮)≥1個月。常於青壯年起病、女性較多、為慢性病程、可併發懼曠症、憂鬱、物質濫用,自殺風險升高。因症狀酷似心臟病發作,病人常自行衝急診。治療:SSRI/SNRI為長期維持首選(初期可能加重焦慮故低劑量起始),BZD(alprazolam)短期緩解但有成癮性,CBT(認知重建+呼吸訓練+暴露)有效。 恐慌發作的核心特徵是『無預警、不可預期(unexpected)』;若每次都可預期/有明確誘因,則較像情境結合的焦慮(如畏懼症)。SSRI/SNRI比alprazolam(BZD)更適合做長期維持治療(BZD有依賴性)。","options":{"A":"正確。恐慌症反覆發作且有預期焦慮。","B":"錯誤(本題選此)。恐慌發作多無預警、不可預期,非常有前兆。","C":"正確。發作數分鐘內達高峰。","D":"正確。SSRI/SNRI比alprazolam更適合做維持治療。"},"sources":["DSM-5-TR Panic Disorder"]}},"113070-63":{"quick":"特定畏懼症最有效是『行為治療(暴露/系統減敏)』,選C。","detail":{"background":"特定畏懼症首選且最有效的治療是行為治療—暴露法(exposure)、系統減敏感法;藥物與光照/ECT/抗精神病藥皆非特定畏懼症的治療。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"光照治療用於季節性憂鬱,非畏懼症。","B":"ECT用於嚴重憂鬱/躁/僵直,非畏懼症。","C":"正確(本題選此)。行為治療(暴露/系統減敏)最有效。","D":"抗精神病藥非畏懼症治療。"},"sources":["DSM-5-TR Specific Phobia"]}},"113070-64":{"quick":"辦公室突發呼吸困難心悸瀕死感、檢查正常、一月內4次=恐慌症,選C。","detail":{"background":"反覆突發呼吸困難、頭暈、心悸、瀕死感、心臟檢查皆正常、一月內≥4次=恐慌症(C);需與心臟疾病鑑別後診斷。","options":{"A":"GAD是持續廣泛擔憂,非陣發。","B":"OCD以強迫思想/行為為主。","C":"正確(本題選此)。反覆突發、檢查正常的瀕死樣發作=恐慌症。","D":"適應障礙需明確壓力源。"},"sources":["DSM-5-TR Panic Disorder"]}},"114020-65":{"quick":"焦慮性疾患多『女性多於男性』,故D錯誤。","detail":{"background":"焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。 焦慮性疾患是盛行率最高的精神疾病群、多於青少年/成年早期發病、女性多於男性(多數焦慮症女性約為男性1.5–2倍);故『男性大於女性』錯誤。","options":{"A":"正確。含GAD、恐慌症、畏懼症等。","B":"正確。為盛行率最高的精神疾病群。","C":"正確。多於青少年或成年早期發病。","D":"錯誤(本題選此)。多數焦慮性疾患女性盛行率高於男性。"},"sources":["DSM-5-TR Anxiety Disorders epidemiology"]}},"114020-66":{"quick":"偷竊癖(kleptomania)為衝動性、非計畫性、所偷物品非為己用/經濟價值,故D錯誤。","detail":{"background":"偷竊癖(kleptomania,屬衝動控制疾患):反覆無法抗拒偷竊衝動,偷的東西『非為個人使用或經濟價值』,行竊前緊張、行竊時/後有快感或紓解;行為為『衝動性、非計畫性』(與一般竊盜為利益、有計畫不同);女性較多、常共病情緒疾患、強迫、進食疾患。","options":{"A":"正確。偷後有張力紓解感。","B":"正確。常與情緒疾患高比率共病。","C":"正確。女性盛行率較高。","D":"錯誤(本題選此)。偷竊癖為衝動、非計畫性,非仔細規劃。"},"sources":["DSM-5-TR Kleptomania"]}},"114070-66":{"quick":"OCD患者覺得強迫思想/動作『不合理(ego-dystonic)』而抗拒,故B(覺得合理)錯誤。","detail":{"background":"OCD:以反覆侵入性的強迫思想(obsession)及/或強迫行為(compulsion)為主;患者多『知道這些想法/行為過度不合理(自我不協調ego-dystonic)』並努力抗拒,故B『覺得合理』錯誤(覺得合理者較像妄想或強迫型人格);可單獨存在強迫思想;多於25歲前發病(男童發病更早)。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"正確。以反覆強迫想法/動作為主。","B":"錯誤(本題選此)。患者覺得強迫想法/動作『不合理』並抗拒,非覺得合理。","C":"正確。可單獨存在強迫想法。","D":"正確。多數於25歲前發作。"},"sources":["DSM-5-TR Obsessive-Compulsive Disorder"]}},"115020-66":{"quick":"OCD多為『持續慢性化』病程,選C。","detail":{"background":"OCD病程多為『慢性、持續』、起伏波動(約2/3慢性化),少數陣發,完全自發緩解少;早期治療(SSRI+ERP)可改善但常需長期。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"錯誤。OCD少快速緩解。","B":"錯誤。陣發性非多數型態。","C":"正確(本題選此)。OCD多持續而慢性化。","D":"錯誤。多非急遽惡化退化。"},"sources":["DSM-5-TR OCD course"]}},"115020-67":{"quick":"懼曠症最常與『恐慌症』共病,選D。","detail":{"background":"懼曠症(agoraphobia)與恐慌症高度共病—多數懼曠的逃避行為源於害怕出現恐慌樣症狀時難以逃離/求助。DSM-5雖將二者分開診斷,但臨床上常並存(panic disorder with agoraphobia)。焦慮性疾患(anxiety disorders)是盛行率最高的精神疾病群,多於兒童青少年或成年早期發病,女性多於男性。DSM-5將之分為:分離焦慮症、選擇性緘默、特定畏懼症、社交焦慮症(social anxiety/social phobia)、恐慌症(panic disorder)、懼曠症(agoraphobia)、廣泛性焦慮症(GAD);強迫症(OCD)與創傷後壓力症(PTSD)在DSM-5已『獨立』成另兩章(不再屬焦慮性疾患),但DSM-IV曾納入焦慮性疾患。焦慮的神經生物以杏仁核(恐懼迴路)、藍斑核(NE)、縫核(5-HT)、GABA系統為核心。藥物治療第一線為SSRI/SNRI;benzodiazepine可短期使用但有依賴/成癮性;buspirone(5-HT1A部分作用劑)用於GAD;心理治療以認知行為治療(CBT)、暴露法為主。","options":{"A":"憂鬱可共病但非最常見。","B":"思覺失調非懼曠症最常共病。","C":"雙相非懼曠症最常共病。","D":"正確(本題選此)。懼曠症最常與恐慌症共病。"},"sources":["DSM-5-TR Agoraphobia & Panic Disorder"]}},"101030-70":{"quick":"創傷後對事件無法回憶、意識清楚、無器質病因=解離性失憶,選C。","detail":{"background":"解離性失憶(dissociative amnesia):因創傷或壓力事件導致無法回憶重要(常為創傷相關)的個人資訊,超出一般遺忘,意識清楚、無神經損傷或物質可解釋;可伴解離性漫遊(fugue,突然離開且忘記身分)。本題被搶後意識始終清楚卻完全無法描述事發經過,屬解離性失憶(非PTSD的再經驗,非轉化的神經功能症狀)。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"PTSD需有再經驗、逃避、過度警覺等症狀,本題僅失憶。","B":"適應障礙是對壓力源的情緒/行為適應不良,非失憶。","C":"正確(本題選此)。創傷後選擇性無法回憶事件=解離性失憶。","D":"轉化症是神經功能(運動/感覺)症狀,非記憶喪失。"},"sources":["DSM-5-TR Dissociative Amnesia"]}},"102110-19":{"quick":"照顧者反覆對孩子施打降血糖藥造成低血糖就醫=代理孟喬森症候群(對他人施加之人為障礙症),選C。","detail":{"background":"代理型人為障礙症(factitious disorder imposed on another,舊稱Munchausen syndrome by proxy):照顧者(常為母親)刻意對被照顧者(常為兒童)製造或誘發疾病症狀,以使其反覆就醫、自己扮演關懷照顧者角色獲取注意,屬『虐待』的一種(兒童是受害者),須通報兒少保護。本題父親友人在發病前給孩子口服降血糖藥造成反覆低血糖,符合此診斷。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"身體虐待是直接暴力傷害,本題是誘發疾病就醫。","B":"性虐待不符。","C":"正確(本題選此)。刻意誘發孩子低血糖反覆就醫=代理孟喬森症候群。","D":"精神虐待不符本題。"},"sources":["DSM-5-TR Factitious Disorder Imposed on Another"]}},"106020-65":{"quick":"身體畸形性疾患好發15–30歲女性、常關注臉部缺陷,選A。","detail":{"background":"DSM-IV身體型疾患(somatoform):身體畸形性疾患(BDD)好發青少年/成年早期(15–30歲)、常關注臉部/外觀缺陷(DSM-5已移至OCD相關章);身體化疾患(somatization)較常見於『低』社經/低教育者;慮病症男女相近、與社經/教育關聯不大;疼痛疾患中急性疼痛較常與『焦慮』共病、慢性疼痛較常與『憂鬱』共病(本題D把急慢性與憂鬱/焦慮對調故錯)。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"正確(本題選此)。BDD好發15–30歲女性,常關注臉部缺陷。","B":"錯誤。身體化疾患較常見於低社經/低教育者。","C":"錯誤。慮病症男女相近、與社經/教育關聯不強。","D":"錯誤。急性疼痛較與焦慮、慢性疼痛較與憂鬱共病(題述對調)。"},"sources":["DSM-IV-TR Somatoform Disorders","DSM-5-TR"]}},"106020-72":{"quick":"參戰士兵最可能產生創傷後壓力症(PTSD),選A。","detail":{"background":"創傷後壓力症(PTSD):暴露於實際或威脅性死亡、重傷、性暴力後,出現①侵入性再經驗(惡夢、闖入回憶、flashback)②持續逃避相關刺激③認知/情緒負向改變④過度警覺(易驚、失眠、過度警戒、易怒),症狀>1個月並造成功能損害。戰爭、性侵、重大意外是典型creator。神經影像:杏仁核(amygdala)過度活化/結構改變、海馬縮小、前額葉調控不足、HPA軸失調。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"正確(本題選此)。參戰是典型創傷源,最易致PTSD。","B":"強迫症與參戰無特定關聯。","C":"妄想症與創傷無特定關聯。","D":"恐慌症非參戰最典型結果。"},"sources":["DSM-5-TR Posttraumatic Stress Disorder"]}},"106080-66":{"quick":"與長官爭吵後突然失聲、無器質病因、非刻意=轉化症(亦可廣義稱解離症),本題C/D皆給分。","detail":{"background":"本題楊小姐情緒衝突後突然『講不出話(失語/失聲)』、非刻意、無神經或生理疾病可解釋=轉化症(conversion disorder,神經功能症狀)。因DSM-IV曾把轉化症與解離症同列『解離與轉化』類別,且失聲可視為解離性表現,故本題官方接受『解離症』與『轉化症』皆給分。重點:非詐病(無外在利益)、非人為障礙(非刻意)。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"錯誤。詐病有外在動機且刻意,本題非刻意。","B":"錯誤。人為障礙是刻意製造症狀,本題非刻意。","C":"接受(本題給分)。可廣義歸解離(轉化)範疇。","D":"正確(本題選此)。情緒衝突後神經功能症狀(失聲)非刻意=轉化症。"},"sources":["DSM-5-TR Conversion Disorder; 考選部公告多重答案(C/D)"]}},"108080-73":{"quick":"慮病症常伴憂鬱或焦慮,選C。","detail":{"background":"慮病症(hypochondriasis;DSM-5拆為somatic symptom disorder與illness anxiety disorder):過度擔心罹患重病、反覆求醫檢查仍不安;男女相近、與社經/教育關聯不強、為慢性起伏病程(常>6個月)、改善率有限(非90%痊癒)、常共病憂鬱與焦慮。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"錯誤。低社經未必預後較佳。","B":"錯誤。改善率有限,非90%以上痊癒。","C":"正確(本題選此)。常伴隨憂鬱或焦慮。","D":"錯誤。病程常>6個月、慢性化。"},"sources":["DSM-5-TR Illness Anxiety Disorder"]}},"109020-65":{"quick":"急性壓力疾患『會出現解離症狀』,故C錯誤。","detail":{"background":"急性壓力疾患(acute stress disorder,ASD):創傷後3天–1個月內出現再經驗、負向情緒、解離(失現實/失自我/失憶)、逃避、過度警覺等症狀;若症狀『>1個月』則改診斷PTSD。ASD的診斷『包含解離症狀群』(故C錯)。PTSD病因含HPA軸失調、杏仁核過度活化;治療藥物(SSRI)合併心理治療(創傷焦點CBT、暴露、EMDR)有助益。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"正確。ASD症狀>1個月需考慮PTSD。","B":"正確。PTSD藥物合併心理治療有助益。","C":"錯誤(本題選此)。ASD『會』出現解離症狀(是其診斷項目之一)。","D":"正確。PTSD病因含HPA軸功能失調。"},"sources":["DSM-5-TR Acute Stress Disorder / PTSD"]}},"109020-73":{"quick":"轉化症『不應告知患者症狀是想像出來的』,故D錯誤。","detail":{"background":"轉化症治療原則:建立治療關係、避免不必要檢查、復健式漸進恢復、處理潛在心理壓力;『不應』直接告訴病人『你的症狀是想像/假裝出來的』(症狀非刻意,如此會破壞關係、加重抗拒)。常見於戲劇型人格(女性)、男性與反社會型人格相關;最常見症狀為運動(癱瘓)、感覺(視盲)、不語、假性癲癇。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"正確。常見於戲劇型人格。","B":"正確。癱瘓、視盲、不語是常見症狀。","C":"正確。男性患者與反社會型人格相關。","D":"錯誤(本題選此)。不應告知患者症狀是想像出來的。"},"sources":["DSM-5-TR Conversion Disorder"]}},"109080-72":{"quick":"症狀可被暗示/lorazepam緩解『仍可能是』轉化症,故B錯誤。","detail":{"background":"轉化症診斷需排除重大內外科/神經疾病(因腦瘤、MS、重症肌無力、早期神經病在病程早期易被誤為轉化症,故須謹慎追蹤);症狀為運動或感覺功能異常;『可被暗示或藥物(如lorazepam,amobarbital訪談)緩解』反而是轉化症的特徵之一,不能據此排除轉化症(故B錯)。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"正確。轉化症需排除重大內外科疾病。","B":"錯誤(本題選此)。可被暗示/lorazepam緩解仍可能是轉化症(是其特徵之一)。","C":"正確。許多神經疾病早期易被誤為轉化症。","D":"正確。常見症狀為運動或感覺功能異常。"},"sources":["DSM-5-TR Conversion Disorder"]}},"111020-63":{"quick":"刻意製造血尿(吃紅火龍果)、無外在利益、為扮病人角色=人為障礙症,選B。","detail":{"background":"本題護理師反覆製造血尿/血便(實為吃紅色火龍果造成尿/便染色),住院檢查皆正常,『無明顯外在利益』(非求償、非逃法),動機在扮演病人角色=人為障礙症(factitious disorder,加諸自身)。與詐病(有外在利益)、慮病(無刻意製造)、轉化(神經功能症狀)區分。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"罹病焦慮症是擔心罹病但不刻意製造症狀。","B":"正確(本題選此)。刻意製造症狀、無外在利益、為病人角色=人為障礙症。","C":"詐病有明確外在動機。","D":"轉化症是神經功能症狀。"},"sources":["DSM-5-TR Factitious Disorder"]}},"111020-64":{"quick":"為逃避兵役故意裝病=詐病(有外在利益),選B。","detail":{"background":"詐病(malingering)非精神疾病診斷:刻意假裝或誇大症狀,具『明確外在動機』(逃避兵役、逃避法律、求償、取得藥物或福利)。本題為逃兵役裝病即典型詐病。與人為障礙(無外在利益、為扮病人角色)區分。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"人為障礙無外在利益(為扮病人角色),本題有逃兵役之外在利益。","B":"正確(本題選此)。有明確外在動機(逃兵役)之裝病=詐病。","C":"轉化症非刻意。","D":"恐慌症不符。"},"sources":["DSM-5-TR Malingering (V code)"]}},"111020-65":{"quick":"轉化症最常見症狀之一是『癱瘓(paralysis)』,選D。","detail":{"background":"轉化症臨床特徵:最常見症狀含運動(癱瘓paralysis、無力、步態異常astasia-abasia、震顫)、感覺(視盲、麻木)、假性癲癇(psychogenic non-epileptic seizure,『常』與真癲癇共病而難鑑別);La belle indifférence(對嚴重症狀表現不在乎)曾被視為特徵但敏感/特異度低,『非診斷主要特徵』。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"錯誤。假性癲癇『常』與真癲癇共病,不易清楚鑑別。","B":"錯誤。astasia-abasia是一種步態異常但非『最常見』動作異常。","C":"錯誤。La belle indifférence非診斷主要特徵(敏感/特異度低)。","D":"正確(本題選此)。癱瘓(paralysis)是轉化症最常見症狀之一。"},"sources":["DSM-5-TR Conversion Disorder"]}},"112020-63":{"quick":"疼痛疾患可用生理回饋、神經阻斷、抗憂鬱劑、催眠等多模式,選D(1234)。","detail":{"background":"疼痛疾患/合併疼痛的身體症狀障礙治療採多模式:生理回饋(biofeedback)、放鬆訓練、神經阻斷術(nerve blocks)、抗憂鬱劑(尤其TCA、SNRI對慢性疼痛有效)、認知行為治療、催眠(hypnosis)、復健與運動。故四者皆可用。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"不完整。","B":"不完整。","C":"不完整(漏催眠)。","D":"正確(本題選此)。生理回饋、神經阻斷、抗憂鬱劑、催眠四者皆可用於疼痛疾患。"},"sources":["Kaplan & Sadock's Synopsis 11e, Pain disorder treatment"]}},"112020-65":{"quick":"情緒衝突後離家、忘記回家路/身分、無器質病因=解離症(解離性漫遊/失憶),選C。","detail":{"background":"本題吳小姐墮胎+被責罵後離家出走、忘記如何回家、無神經影像異常=解離症(解離性漫遊dissociative fugue,屬解離性失憶的一型),壓力誘發的意識/記憶/身分整合斷裂。與中風(有神經影像/局灶徵象)、適應障礙(情緒行為不適應但無失憶)、GAD(慢性擔憂)區分。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"中風會有神經影像異常與局灶神經徵象。","B":"適應障礙無失憶/漫遊。","C":"正確(本題選此)。壓力後離家、失憶=解離症(漫遊型)。","D":"GAD是慢性廣泛擔憂。"},"sources":["DSM-5-TR Dissociative Amnesia (with fugue)"]}},"112080-65":{"quick":"車禍後8個月持續惡夢失眠淡漠逃避=PTSD,『杏仁核結構改變』,選B。","detail":{"background":"本題車禍後持續心悸、失眠、惡夢、淡漠、逃避達8個月(>1個月)=PTSD。PTSD神經影像:杏仁核(amygdala)過度活化與結構改變、海馬體積縮小、內側前額葉調控不足、HPA軸失調(cortisol反應異常);非基底核或頂葉鈣化。症狀超過1個月故非急性壓力疾患。DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。","options":{"A":"錯誤。症狀>1個月且為創傷後完整症候群,屬PTSD而非適應障礙。","B":"正確(本題選此)。PTSD可有杏仁核結構/功能改變。","C":"錯誤。PTSD非基底核功能過低為特徵。","D":"錯誤。頂葉鈣化非PTSD特徵。"},"sources":["DSM-5-TR PTSD; Kaplan & Sadock's Synopsis 11e (neuroimaging)"]}},"113020-73":{"quick":"詐病與人為障礙最大區別=詐病有『明確外在動機』,選D。","detail":{"background":"DSM-5重點鑑別:轉化症(conversion disorder/functional neurological symptom disorder)—神經學功能症狀(無力、癱瘓、視盲、不語、假性癲癇)無法以神經疾病解釋,非刻意產生,常見於戲劇型人格、與心理壓力相關。身體症狀障礙症(somatic symptom disorder)—過度的身體症狀想法/感受/行為。罹病焦慮症(illness anxiety disorder,舊慮病症hypochondriasis)—過度擔心罹患重病但身體症狀輕微。人為障礙症(factitious disorder)—刻意製造/假裝症狀,動機是『扮演病人角色(sick role)』而『無外在實質利益』。詐病(malingering)—刻意假裝症狀,但有『明確外在動機』(逃避兵役/法律、求償、取得藥物),非精神疾病。解離症(dissociative)—意識、記憶、身分、知覺的整合斷裂(解離性失憶、失自我/失現實、解離性身分)。 核心區別:人為障礙(factitious)=刻意製造症狀但『無外在實質利益』,動機在扮演病人角色(sick role);詐病(malingering)=刻意製造/誇大症狀且有『明確外在動機』(逃避兵役/法律、求償)。兩者皆為『有意圖』。","options":{"A":"人為障礙確為有意圖裝病,但這非『與詐病的最大區別』(詐病也是有意圖)。","B":"找不到真正疾病兩者皆然。","C":"錯誤。維持病人角色(sick role)是『人為障礙』的動機,非詐病。","D":"正確(本題選此)。詐病有明確外在因素(逃法、逃兵役等),為與人為障礙的最大區別。"},"sources":["DSM-5-TR Factitious Disorder vs Malingering"]}},"115020-68":{"quick":"診斷兒童性別不安須『強烈渴望成為異性/堅持自己是異性』,選B。","detail":{"background":"性別不安(gender dysphoria,DSM-5):個人經驗/表達的性別與被指定性別(birth-assigned)之間顯著不一致,造成痛苦或功能損害,須持續『≥6個月』。兒童診斷核心須含『強烈渴望成為(或堅持自己就是)另一性別』加上其他指標(偏好異性服裝/玩伴/活動、厭惡自身性徵等)。性別不安『不需先排除雙性人(intersex)』(有DSD者亦可附加診斷);成人也須符合≥6個月(<6個月不可診斷);DSM/APA反對『扭轉治療(conversion therapy)』改變性別認同或性傾向(無效且有害)。","options":{"A":"錯誤。不需先排除雙性人(intersex)。","B":"正確(本題選此)。兒童診斷須強烈渴望成為異性或堅持自己是異性。","C":"錯誤。需持續≥6個月,未達6個月不可診斷。","D":"錯誤。APA反對扭轉治療(無效且有害)。"},"sources":["DSM-5-TR Gender Dysphoria; APA position on conversion therapy"]}},"101030-71":{"quick":"酒精誘發精神病(酒精性幻覺)以『聽幻覺』為主,選B。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 酒精誘發之精神病(酒精性幻覺症alcoholic hallucinosis)以鮮明的『聽幻覺』(常為威脅性話語)為主、意識清楚、定向感保留,與DT(意識混亂、以視幻覺為主)不同。","options":{"A":"視幻覺較見於震顫性譫妄(DT),非酒精性幻覺症的主要型態。","B":"正確(本題選此)。酒精誘發精神病以聽幻覺為主。","C":"嗅幻覺少見(顳葉病灶/癲癇)。","D":"觸幻覺較見於刺激劑/譫妄。"},"sources":["DSM-5-TR Alcohol-Induced Psychotic Disorder","Kaplan & Sadock's Synopsis 11e"]}},"102030-69":{"quick":"酗酒+營養不良+意識混亂+眼肌麻痺+運動失調=Wernicke腦病變,選C。","detail":{"background":"酗酒+營養不良致thiamine(B1)缺乏→『Wernicke腦病變』三聯:意識混亂、眼肌麻痺/眼震、共濟失調(C);須立即大劑量thiamine。","options":{"A":"腦幹中風會有局灶神經徵象與影像病灶,病史不符。","B":"酒精戒斷症候群以自律神經亢進與震顫為主,非眼肌麻痺三徵。","C":"正確(本題選此)。三徵(意識混亂、眼肌麻痺/眼震、運動失調)=Wernicke腦病變。","D":"Korsakoff以記憶喪失/虛談為主(慢性後遺),非急性三徵。"},"sources":["Harrison's 21e (Wernicke encephalopathy)","Kaplan & Sadock's Synopsis 11e"]}},"103100-68":{"quick":"酒精性失智/Korsakoff可出現『虛談(confabulation)』,選A。","detail":{"background":"酒精引起之持續性失智/Korsakoff症候群:慢性thiamine缺乏與酒精直接毒性導致記憶障礙;特徵為『虛談(confabulation,以虛構填補記憶空缺)』、以『近期(順行性)記憶』缺損為主、須考慮營養不良;預後多不佳(非80%可恢復)。Wernicke腦病變(thiamine缺乏)三徵:意識混亂(confusion)、眼肌麻痺/眼球震顫(ophthalmoplegia/nystagmus)、運動失調(ataxia);為急症,須『立即大劑量靜脈thiamine』(且應在給葡萄糖之前或同時補,以免葡萄糖耗盡剩餘thiamine誘發/惡化Wernicke)。Korsakoff症候群為慢性後遺(乳頭體/丘腦受損):嚴重順行性與部分逆行性記憶喪失、虛談(confabulation),多不可逆(僅約20%完全恢復)。","options":{"A":"正確(本題選此)。可出現虛談(confabulation)。","B":"錯誤。須考量營養不良(thiamine缺乏)所致記憶下降。","C":"錯誤。以『近期(順行性)』記憶缺損為主,非長程。","D":"錯誤。預後多不佳,非80%可恢復。"},"sources":["Kaplan & Sadock's Synopsis 11e, Alcohol-induced major neurocognitive disorder"]}},"104090-78":{"quick":"酒精戒斷常見震顫、癲癇、激動;『聽幻覺』非『常見』之核心戒斷症狀(屬幻覺症),本題選B。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 一般酒精戒斷『常見』症狀為震顫(tremor)、焦慮激動(agitation)、自律神經亢進、噁心、失眠、戒斷性癲癇;『聽幻覺』屬酒精性幻覺症(alcoholic hallucinosis)、非典型輕中度戒斷的核心常見症狀,故本題以聽幻覺為『不是常見戒斷症狀』之答案。","options":{"A":"tremor是常見戒斷症狀。","B":"正確(本題選此)。聽幻覺屬幻覺症,非一般戒斷的核心常見症狀。","C":"戒斷性癲癇(seizure)是常見。","D":"激動(agitation)是常見。"},"sources":["DSM-5-TR Alcohol Withdrawal"]}},"105100-71":{"quick":"Korsakoff症候群『多不可逆』,故D錯誤。","detail":{"background":"酒精相關疾患:Wernicke急性可逆;『Korsakoff症候群(順行性失憶、虛談)多不可逆』(故D『可逆』錯)。","options":{"A":"正確。Wernicke是急性症候群。","B":"正確。Wernicke-Korsakoff以thiamine治療。","C":"正確。Korsakoff近期(順行)記憶變差。","D":"錯誤(本題選此)。Korsakoff多不可逆,僅約20%完全恢復。"},"sources":["Kaplan & Sadock's Synopsis 11e (Korsakoff)"]}},"106020-69":{"quick":"disulfiram抑制『aldehyde dehydrogenase』致乙醛堆積、飲酒後不適,選A。","detail":{"background":"戒酒發泡錠(disulfiram)抑制乙醛去氫酶(aldehyde dehydrogenase),使飲酒後乙醛堆積,產生臉紅、心悸、頭痛、噁心嘔吐、低血壓等厭惡反應(disulfiram-ethanol reaction),作為厭惡制約以維持戒酒。其他酒癮藥物:naltrexone(鴉片受體拮抗,減渴求)、acamprosate(調節麩胺酸/GABA,減渴求)。酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。","options":{"A":"正確(本題選此)。disulfiram抑制aldehyde dehydrogenase。","B":"錯誤。抑制alcohol dehydrogenase不是其機轉。","C":"錯誤。非作用於GABA-A通道。","D":"錯誤。5-HT3拮抗(ondansetron)是另一概念,非disulfiram機轉。"},"sources":["Kaplan & Sadock's Synopsis 11e, Disulfiram"]}},"106020-71":{"quick":"住院停酒後出現震顫、自律神經亢進、視幻覺=酒精戒斷,首選benzodiazepine,選B。","detail":{"background":"住院停酒後出現震顫、自律亢進(冒汗、心搏快、血壓高)、煩躁、視幻覺=酒精戒斷,首選『benzodiazepine』(B)以防進展為DT與抽搐。","options":{"A":"錯誤。預防戒斷癲癇首選benzodiazepine,非直接給抗癲癇藥。","B":"正確(本題選此)。酒精戒斷首選benzodiazepine(並補thiamine、矯正電解質)。","C":"錯誤。酒精戒斷可致命(DT),不能僅觀察。","D":"錯誤。抗精神病藥降癲癇閾值,非第一線。"},"sources":["DSM-5-TR / CIWA-Ar protocol"]}},"106080-70":{"quick":"本題為送分(血中酒精濃度與症狀對應因人而異),一律給分。","detail":{"background":"血中酒精濃度與症狀大致關係(耐受性影響大):約50–100 mg/dL協調/判斷受損;100–200 mg/dL步態不穩、言語不清、眼球震顫;200–300 mg/dL明顯運動失調、嘔吐;>300–400 mg/dL意識障礙、昏迷、呼吸抑制致死風險。因個體耐受差異大、且不同教科書切點不一,本題公告送分、一律給分。酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。","options":{"A":"血中50 mg/dL多為協調/判斷受損。","B":"血中100 mg/dL左右開始明顯。","C":"血中200 mg/dL常見眼震、言語不清。","D":"血中400 mg/dL接近昏迷/致死。"},"sources":["Kaplan & Sadock's Synopsis 11e (BAC); 考選部公告送分"]}},"106080-78":{"quick":"酒精戒斷癲癇『大多在停酒2天(48小時)內』,選C。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 戒斷性癲癇多在停酒6–48小時(常2天內),以全身性強直陣攣為主、多為單次或數次短時間發作;若反覆/持續或局灶須查其他病因。約1/3的DT前有戒斷癲癇,但並非『>70%戒斷癲癇者會合併DT』。single seizure未必比multiple多。","options":{"A":"錯誤。多在停酒2天內,非5–6天後。","B":"敘述不適當。可為single或數次,非以此為重點。","C":"正確(本題選此)。多發生在停酒2天(48小時)內。","D":"錯誤。並非>70%戒斷癲癇者合併DT。"},"sources":["DSM-5-TR / Harrison's 21e (alcohol withdrawal seizure)"]}},"107020-69":{"quick":"酒精戒斷典型時序:震顫→幻覺→抽搐→譫妄,故②①③④=本題D(2134)。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 典型時序:②震顫/自律神經亢進(最早,6–24小時)→①知覺障礙/幻覺(12–48小時)→③戒斷癲癇(6–48小時)→④震顫性譫妄DT(48–96小時,最晚最重)。本題以2-1-3-4排序為答。","options":{"A":"順序不符。","B":"順序不符。","C":"順序不符。","D":"正確(本題選此)。震顫(2)→幻覺(1)→抽搐(3)→譫妄(4)。"},"sources":["Harrison's 21e / Kaplan & Sadock's Synopsis 11e"]}},"108030-74":{"quick":"酒精會『減少』REM與深睡(stage 4)並使睡眠片段化,故D錯誤。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 酒精雖助入睡,但會『抑制REM與慢波(深)睡眠』、使後半夜睡眠片段化(rebound夜醒、惡夢);長期飲酒嚴重破壞睡眠結構。故『增加REM與stage 4 sleep』錯誤。","options":{"A":"正確。酒精常共病其他物質、反社會人格、情感/焦慮疾患。","B":"正確。戒斷含手抖、焦慮、噁心、幻覺、癲癇。","C":"正確。戒斷首選benzodiazepine。","D":"錯誤(本題選此)。酒精『減少』REM與深睡(stage 4),非增加。"},"sources":["DSM-5-TR Alcohol Use Disorder; Kaplan & Sadock's Synopsis 11e (alcohol & sleep)"]}},"108080-69":{"quick":"酒精戒斷交感亢進使心跳『加快』而非變慢,故A錯誤。","detail":{"background":"酒精戒斷之交感神經亢進使『心跳加快(非變慢)』(故A錯)、血壓升、震顫、發汗、焦慮,嚴重者DT/抽搐。","options":{"A":"錯誤(本題選此)。酒精戒斷交感亢進使心跳『加快』,非變慢。","B":"正確。戒斷會冒汗(自律神經亢進)。","C":"正確。長期飲酒可致低血鈉等電解質異常。","D":"正確。戒斷可誘發譫妄(DT),為高風險病症。"},"sources":["DSM-5-TR Alcohol Withdrawal"]}},"109020-78":{"quick":"急診酒精戒斷『最不適當』者為phenobarbital(非常規第一線),選A。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 急診酒精戒斷標準處置:benzodiazepine(lorazepam等)為第一線、補thiamine(B1)、補鎂(magnesium sulfate)、矯正電解質與水分。phenobarbital(巴比妥)雖可用於難治型戒斷,但因治療窗窄、呼吸抑制風險,非常規第一線,相對最不適當。","options":{"A":"正確(本題選此,最不適當)。phenobarbital非常規第一線(治療窗窄、呼吸抑制)。","B":"適當。補鎂(magnesium sulfate)。","C":"適當。lorazepam為第一線。","D":"適當。補thiamine防Wernicke。"},"sources":["CIWA-Ar protocol / Harrison's 21e"]}},"109080-67":{"quick":"酒精性斷片(blackout)是『順行性失憶』,長期記憶不受損,故B錯誤。","detail":{"background":"酒精性斷片(alcoholic blackout):大量飲酒時海馬迴記憶固化(consolidation of new memories)受阻,造成『順行性失憶(anterograde amnesia)』—事後記不起酒醉期間的事;但當下短期(即時)記憶與『長期(舊)記憶』仍保留,故當事人仍能執行任務、旁人不易察覺。B錯在『短期與長期記憶皆受損』。","options":{"A":"正確。是順行性失憶,記不起酒醉時的事。","B":"錯誤(本題選此)。長期(舊)記憶不受損,僅新記憶固化受阻。","C":"正確。當事人仍可執行任務、旁人看似無異。","D":"正確。與海馬迴、顳葉新記憶固化受阻有關。"},"sources":["Kaplan & Sadock's Synopsis 11e (alcoholic blackout)"]}},"110020-70":{"quick":"酒精戒斷時序:手抖→幻覺→抽搐→譫妄,故②①④③=本題C(2143)。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 排序:②手抖(最早)→①幻覺→④抽搐→③譫妄(DT,最晚最重)。本題以2-1-4-3為答。","options":{"A":"順序不符。","B":"順序不符。","C":"正確(本題選此)。手抖(2)→幻覺(1)→抽搐(4)→譫妄(3)。","D":"順序不符。"},"sources":["Harrison's 21e (alcohol withdrawal timeline)"]}},"110080-68":{"quick":"酒精『中毒』(高濃度)可致呼吸抑制死亡,故A(不會有死亡風險)錯誤。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 重度酒精中毒(高血中濃度,>300–400 mg/dL)可致昏迷、呼吸抑制、吸入嘔吐物、低體溫而死亡;血中濃度愈高,協調/情緒/認知受損愈明顯;高濃度仍無症狀提示耐受性;台灣酒駕標準為吐氣0.15 mg/L或血中0.03%以上。","options":{"A":"錯誤(本題選此)。酒精中毒(高濃度)有呼吸抑制致死風險。","B":"正確。濃度愈高,平衡/情緒/認知受損愈明顯。","C":"正確。高濃度仍無症狀提示耐受性。","D":"正確。台灣酒駕標準如述。"},"sources":["DSM-5-TR Alcohol Intoxication; 道路交通安全規則"]}},"111020-70":{"quick":"酒精戒斷初期是『失眠/激動』而非嗜睡,故C錯誤。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 酒精戒斷初期以交感亢進(失眠、激動、震顫、焦慮)為主,『非嗜睡』(嗜睡反而見於酒精中毒或刺激劑戒斷);酒精降低深睡(stage 4);戒斷可出現幻覺。","options":{"A":"正確。台灣酒駕標準吐氣0.15 mg/L或血中0.03%。","B":"正確。酒精降低深層睡眠(stage 4)。","C":"錯誤(本題選此)。戒斷初期是失眠/激動,非嗜睡。","D":"正確。戒斷可能出現幻覺。"},"sources":["DSM-5-TR Alcohol Withdrawal"]}},"112020-67":{"quick":"DT預防/戒斷首選『benzodiazepine』,非抗精神病劑,故C最不適當。","detail":{"background":"酒精戒斷譫妄(DT):停酒後2–4天高峰,自律亢進+譫妄+幻覺,死亡率高;『預防/治療首選benzodiazepine』而非抗精神病劑(故C最不適當)。","options":{"A":"正確。DT是醫療急症,未治療死亡率約20%。","B":"正確。死亡多因併發/並存身體疾病。","C":"錯誤(本題選此)。戒斷/DT首選benzodiazepine,非抗精神病劑(後者降癲癇閾值)。","D":"正確。盡量避免身體約束以免對抗約束致體力耗竭。"},"sources":["CIWA-Ar protocol / Harrison's 21e"]}},"112020-76":{"quick":"酒精性肝硬化停酒後躁動、高血壓、癲癇=酒精戒斷,第一線benzodiazepine,選A。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 本題酒精性肝硬化病人停酒30小時出現躁動、高血壓、癲癇=酒精戒斷。第一線為benzodiazepine(肝硬化者首選不需肝臟氧化代謝的lorazepam/oxazepam);戒斷癲癇用BZD預防/止癲(phenytoin對酒精戒斷癲癇預防無效);戒斷幻覺以聽幻覺較常見;DT經積極治療死亡率已明顯下降。","options":{"A":"正確(本題選此)。第一線為benzodiazepine(肝硬化選lorazepam)。","B":"錯誤。phenytoin對酒精戒斷癲癇預防無效,應用BZD。","C":"錯誤。戒斷幻覺以聽幻覺較常見,非視幻覺(DT才以視幻覺多)。","D":"錯誤。積極治療下DT死亡率已大幅下降。"},"sources":["Harrison's 21e; CIWA-Ar protocol"]}},"112080-70":{"quick":"步態不穩+意識混淆+眼球震顫(疑Wernicke),立即處置『注射thiamine』,選D。","detail":{"background":"Wernicke腦病變(thiamine缺乏)三徵:意識混亂(confusion)、眼肌麻痺/眼球震顫(ophthalmoplegia/nystagmus)、運動失調(ataxia);為急症,須『立即大劑量靜脈thiamine』(且應在給葡萄糖之前或同時補,以免葡萄糖耗盡剩餘thiamine誘發/惡化Wernicke)。Korsakoff症候群為慢性後遺(乳頭體/丘腦受損):嚴重順行性與部分逆行性記憶喪失、虛談(confabulation),多不可逆(僅約20%完全恢復)。 本題長期酗酒、少進食、出現步態不穩、意識混淆、眼震=疑Wernicke腦病變。立即處置應『先/同時給thiamine』再給葡萄糖(直接大量輸葡萄糖會耗盡殘存thiamine、惡化Wernicke)。","options":{"A":"短效BZD用於戒斷,非本題Wernicke三徵的立即處置。","B":"錯誤且危險。單獨大量葡萄糖未先補thiamine會惡化Wernicke。","C":"抗精神病藥非Wernicke處置。","D":"正確(本題選此)。立即注射thiamine。"},"sources":["Harrison's 21e (Wernicke: thiamine before glucose)"]}},"113070-68":{"quick":"Wernicke-Korsakoff初期應給『大劑量thiamine』,選A。","detail":{"background":"長期酗酒之Wernicke-Korsakoff:初期應『大劑量thiamine(B1)先於葡萄糖』(A);先給糖會耗竭thiamine惡化腦病變。","options":{"A":"正確(本題選此)。初期應給大劑量(靜脈)thiamine。","B":"錯誤。Wernicke若『及時』thiamine治療,未必發展成Korsakoff(延誤才易)。","C":"錯誤。眼球運動異常常為『雙側、可不對稱』(如外展神經麻痺、眼震),非僅單側。","D":"錯誤。Korsakoff記憶障礙主要與『乳頭體/丘腦』受損有關,非顳葉為主。"},"sources":["Harrison's 21e; Kaplan & Sadock's Synopsis 11e"]}},"114020-70":{"quick":"停酒3天後入睡困難、焦躁、定向感喪失、不認得家人=酒精戒斷譫妄(DT),選C。","detail":{"background":"慢性酗酒者因胰臟炎住院停酒,3天後入睡困難、焦躁、定向喪失、不認得家人=『酒精戒斷譫妄(DT)』(C);以BZD治療。","options":{"A":"Wernicke以眼肌麻痺/運動失調/意識混亂三徵為主,本題以譫妄(定向喪失、不認人)表現。","B":"急性震顫是更早期、較輕的戒斷,無譫妄/定向喪失。","C":"正確(本題選此)。停酒2–4天出現意識混亂+定向喪失=酒精戒斷譫妄(DT)。","D":"酒精性失智是慢性記憶障礙,非急性譫妄。"},"sources":["DSM-5-TR Alcohol Withdrawal Delirium"]}},"114070-70":{"quick":"酒精戒斷癲癇型態為『全身性大發作』而非小發作,故D最不適當。","detail":{"background":"酒精使用疾患是內外科與精神科最常見的物質問題,常共病其他物質、反社會型人格、情感性疾患與焦慮症。酒精『戒斷』時序(交感過度活化):①早期(6–24小時)震顫(tremor)、焦慮、失眠、噁心、自律神經亢進(冒汗、心跳『加快』、血壓升高)②戒斷性癲癇(withdrawal seizure)多在『6–48小時(常2天內)』、全身性大發作為主③酒精性幻覺(alcoholic hallucinosis)約12–48小時、以『聽幻覺』為主、意識清楚④震顫性譫妄(delirium tremens,DT)約48–96小時(2–4天)出現,為醫療急症、未治療死亡率約5–20%(常因併發肺炎/感染/心律不整/電解質),意識混亂+定向感喪失+幻覺+自律神經風暴。治療首選『benzodiazepine』(lorazepam/diazepam/chlordiazepoxide,以CIWA-Ar評分給藥),併補充thiamine(維生素B1)防/治Wernicke、矯正電解質(鎂、鉀)、補水;避免單用抗精神病藥(降癲癇閾值)。 本題停酒4天後失眠、煩躁、意識不清、不認人=酒精戒斷譫妄。處置:benzodiazepine第一線、必要時短期身體約束並密切觀察、propranolol可緩解交感亢進(但不單獨用、不取代BZD)。若發生癲癇,型態為『全身性強直陣攣大發作』,非小發作(absence)。","options":{"A":"適當。首選benzodiazepine。","B":"適當。必要時短期約束並密切觀察。","C":"適當。propranolol可降交感過度活躍(輔助)。","D":"錯誤(本題選此)。戒斷癲癇為全身性大發作,非小發作。"},"sources":["Harrison's 21e (alcohol withdrawal seizure)"]}},"101030-65":{"quick":"嗎啡(morphine)非脫癮藥(本身是鴉片),選B。","detail":{"background":"海洛因(鴉片)成癮之脫癮/替代治療:methadone、buprenorphine(部分致效)、clonidine(緩解自律症狀);『morphine本身即鴉片類,非脫癮治療藥』(故B不恰當)。","options":{"A":"methadone是替代維持治療。","B":"正確(本題選此)。嗎啡本身是鴉片類,非脫癮治療藥。","C":"naltrexone(拮抗劑)用於維持戒斷。","D":"buprenorphine(部分作用劑)用於替代/戒斷。"},"sources":["Kaplan & Sadock's Synopsis 11e, Opioid use disorder treatment"]}},"102030-66":{"quick":"美沙冬使用者意識模糊、針尖瞳孔=海洛因(鴉片)中毒,選D。","detail":{"background":"鴉片(海洛因)中毒三聯:意識抑制、呼吸抑制、『針尖樣瞳孔』;美沙冬亦為鴉片類,過量可致同樣表現→鴉片中毒(D),解毒naloxone。","options":{"A":"安非他命戒斷以疲倦嗜睡情緒低落為主,無針尖瞳孔。","B":"安非他命中毒瞳孔放大、亢進,與本題相反。","C":"鴉片戒斷瞳孔放大、流淚流涕,非針尖瞳孔。","D":"正確(本題選此)。意識下降+針尖瞳孔=鴉片(海洛因)中毒。"},"sources":["DSM-5-TR Opioid Intoxication"]}},"102030-75":{"quick":"安非他命刺激末梢釋放『多巴胺與正腎上腺素』,選A。","detail":{"background":"安非他命藥理:作用於突觸前末梢,促進並阻斷回收『多巴胺與正腎上腺素』(A),致中樞興奮、欣快與交感亢進。","options":{"A":"正確(本題選此)。安非他命促釋放多巴胺與正腎上腺素。","B":"血清素非安非他命主要機轉(MDMA較涉血清素)。","C":"神經胜肽Y非其機轉。","D":"麩胺酸非其機轉。"},"sources":["Stahl's Essential Psychopharmacology (amphetamine)"]}},"102110-72":{"quick":"聽幻覺非安非他命『戒斷』症狀(屬中毒/誘發精神病),選B。","detail":{"background":"安非他命『戒斷』為情緒低落、疲倦嗜睡、食慾增加、渴求;『聽幻覺』屬中毒/誘發精神病(非戒斷,故B不是戒斷症狀)。","options":{"A":"嗜睡是安非他命戒斷(crash)症狀。","B":"正確(本題選此)。聽幻覺屬中毒/刺激劑精神病,非戒斷症狀。","C":"情緒低落是戒斷症狀。","D":"飢餓感(食慾增加)是戒斷症狀。"},"sources":["DSM-5-TR Stimulant Withdrawal"]}},"103030-68":{"quick":"昏睡、呼吸<10、低血壓、心搏與體溫下降=鴉片類中毒,選D。","detail":{"background":"物質過量鑑別:呼吸<10、低血壓、心搏與體溫下降、昏睡=『鴉片類中毒』(D),呼吸抑制為致死主因,解毒naloxone。","options":{"A":"安非他命中毒是亢進(高血壓、心搏快),與本題相反。","B":"ketamine中毒多高血壓心搏快、解離。","C":"LSD中毒以知覺改變為主,生命徵象不會嚴重抑制。","D":"正確(本題選此)。呼吸抑制+低血壓+心搏體溫下降=鴉片中毒。"},"sources":["DSM-5-TR Opioid Intoxication"]}},"103100-67":{"quick":"巴比妥過量最易致『呼吸抑制』死亡,選C。","detail":{"background":"巴比妥鹽治療指數窄,過量易致『呼吸抑制與循環衰竭』死亡(C);苯二氮平相對安全(有flumazenil可拮抗、單獨過量少致命)。","options":{"A":"心律不穩非巴比妥過量致死的主因。","B":"高燒非主因。","C":"正確(本題選此)。巴比妥過量最易致呼吸抑制死亡(BZD相對安全)。","D":"血壓過高非巴比妥過量特徵(反而低血壓)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Barbiturate vs BZD"]}},"104030-70":{"quick":"flumazenil作用時間『短』(數十分鐘),易再鎮靜,故A錯誤。","detail":{"background":"Flumazenil為苯二氮平受體拮抗劑,『作用時間短(數十分鐘)、易再鎮靜』需重複給藥(故A『作用時間長』錯);用於BZD過量。","options":{"A":"錯誤(本題選此)。flumazenil作用短(數十分鐘),非數十小時。","B":"正確。BZD戒斷有焦慮激躁、可能幻覺。","C":"正確。BZD治GAD宜短期使用(避免依賴)。","D":"正確。BZD影響記憶與專注。"},"sources":["Stahl's Essential Psychopharmacology (flumazenil)"]}},"104030-71":{"quick":"天使塵(PCP)機轉是『NMDA拮抗(解離)』,與MDMA(刺激/血清素)『不同』,故B錯誤。","detail":{"background":"天使塵(phencyclidine,PCP):NMDA受體拮抗劑,具解離性麻醉作用;中毒可有極度焦慮、攻擊、眼球震顫(垂直/水平/旋轉)、高血壓、痛覺遲鈍、精神病樣症狀。處置以支持、benzodiazepine鎮靜、降低刺激;『不建議酸化尿液』(雖理論上促排但有腎/代謝風險,現多不推薦)。MDMA(搖頭丸)屬安非他命衍生的擬交感/血清素釋放劑,機轉與PCP不同。","options":{"A":"正確。PCP有解離性麻醉作用。","B":"錯誤(本題選此)。PCP機轉是NMDA拮抗,與MDMA(血清素/擬交感)不同。","C":"正確。PCP中毒可極度焦慮。","D":"正確。可考慮活性炭,不建議酸化尿液。"},"sources":["Kaplan & Sadock's Synopsis 11e, PCP"]}},"104030-72":{"quick":"吸入劑(強力膠)會產生耐受、但戒斷症狀不常見/輕微,選B。","detail":{"background":"吸入劑(inhalant,強力膠含『甲苯toluene』):脂溶性、快速進入腦、作用類似CNS抑制劑(似酒精/麻醉);中毒見欣快、頭暈、運動失調、語無倫次、幻覺,大量可致心律不整猝死(sudden sniffing death)、缺氧;長期損害大腦白質、小腦、周邊神經與『智商(認知)』、肝腎;產生耐受性,但戒斷症狀輕微/不常見;孕期使用影響胎兒。","options":{"A":"錯誤。中毒激躁用benzodiazepine無特別指示,且重點非此。","B":"正確(本題選此)。吸入劑會產生耐受性,但戒斷症狀不常見。","C":"錯誤。長期使用會『影響智商』與認知。","D":"錯誤。大量使用可致心律不整猝死,有生命危險。"},"sources":["DSM-5-TR Inhalant Use Disorder"]}},"104090-70":{"quick":"咖啡因戒斷最常見症狀是『頭痛』,選B。","detail":{"background":"咖啡因戒斷(caffeine withdrawal,DSM-5正式診斷):最常見『頭痛』,並有倦怠/嗜睡、情緒低落/易怒、難專注、類流感症狀;通常停用12–24小時出現、1–2天高峰、約一週緩解;嚴重度與平日使用量相關。咖啡因『中毒』則為心悸、失眠、躁動、利尿、腸胃不適。","options":{"A":"入睡困難是咖啡因『中毒』而非戒斷。","B":"正確(本題選此)。咖啡因戒斷最常見頭痛。","C":"心搏過速是中毒症狀。","D":"手抖是中毒症狀。"},"sources":["DSM-5-TR Caffeine Withdrawal"]}},"104090-71":{"quick":"海洛因中毒(過量)送醫處置原則—注意naloxone半衰期短需重複給,選C? 實為C敘述評估改善的描述,本題答案C(瞳孔放大與呼吸增加表示改善)。","detail":{"background":"鴉片類(opioid):作用於μ受體。中毒三聯=針尖瞳孔(pinpoint pupil)、意識下降、呼吸抑制(可致死),併心搏/血壓/體溫下降。解毒劑naloxone(鴉片拮抗劑)可肌注/靜注/『鼻噴(吸收近肌注)』快速逆轉呼吸抑制,但半衰期短於多數鴉片(尤其長效如methadone),常需重複給藥/持續輸注;對成癮者給naloxone會誘發急性戒斷。戒斷(非致命,但極不適):流淚流鼻水、打哈欠、瞳孔『放大』、起雞皮疙瘩、肌肉骨頭痛、腹痛腹瀉、噁心嘔吐、心搏加快、血壓升高、發燒—與locus ceruleus(藍斑核)正腎上腺素神經活性『增高』有關,停藥6–12小時出現、2–3天高峰、約7–10天緩解,殘存症狀可持續數月。替代/維持治療:methadone(長效μ作用劑,口服每日一次,降低針具共用與HIV/肝炎風險,但本身會依賴、台灣為管制藥)、buprenorphine(部分作用劑)、naltrexone(拮抗劑,維持戒斷)。 本題海洛因過量中毒:救命以維持呼吸道與給naloxone為主(非以methadone治療中毒);naloxone半衰期短,常需『重複給藥或持續輸注』(非單次即可);保溫雖重要但非『最重要』救護(呼吸與naloxone才是);當瞳孔由針尖『放大』、呼吸速率『增加』,代表鴉片作用被逆轉、中毒『改善』中。","options":{"A":"錯誤。最重要的是維持呼吸與給naloxone,非保溫。","B":"錯誤。中毒不以methadone治療(用naloxone)。","C":"正確(本題選此)。瞳孔放大與呼吸增加=鴉片作用被逆轉、中毒改善。","D":"錯誤。naloxone半衰期短,常需重複給藥。"},"sources":["DSM-5-TR Opioid Intoxication; naloxone pharmacology"]}},"104090-72":{"quick":"FM2(flunitrazepam)戒斷可用『carbamazepine』輔助,選B。","detail":{"background":"苯二氮平(benzodiazepine,BZD)與巴比妥皆作用於GABA-A受體(BZD結合ω受體位)增強抑制→鎮靜、抗焦慮、抗癲癇、肌肉鬆弛。BZD較巴比妥安全(巴比妥過量易致『呼吸抑制』死亡),但BZD仍為管制藥、有耐受與依賴、『短效高效價(如alprazolam)成癮性較高』、與酒精併用會加重呼吸抑制與去抑制(攻擊)。戒斷(類似酒精):焦慮、失眠、激躁、震顫、知覺過敏、幻覺,嚴重可『癲癇與譫妄』(短效者戒斷較快較重;長效者較緩),故戒斷時不可驟停、宜緩慢減量或換長效。拮抗劑flumazenil作用『短』(數十分鐘),需注意再鎮靜。 本題長期高劑量flunitrazepam(FM2,長效BZD):①長效者戒斷症狀『較慢』出現(非很快);②可用carbamazepine等抗癲癇藥輔助戒斷以減癲癇/激躁(正確);③戒斷應『緩慢減量或換長效』,不可立即停或僅給短效;④戒斷最常見是焦慮失眠激躁,『譫妄』非最常見(嚴重才有)。","options":{"A":"錯誤。長半衰期者戒斷症狀較『慢』出現,非很快。","B":"正確(本題選此)。可用carbamazepine輔助治療BZD戒斷。","C":"錯誤。不可立即停或僅給短效,應緩慢減量/換長效。","D":"錯誤。譫妄非flunitrazepam戒斷『最常見』症狀。"},"sources":["Kaplan & Sadock's Synopsis 11e, Sedative withdrawal"]}},"105020-67":{"quick":"幻覺劑(hallucinogen,LSD)最不會產生戒斷症狀,選A。","detail":{"background":"幻覺劑(hallucinogen,如LSD、psilocybin):主要影響血清素(5-HT2A)系統;會產生耐受性(快速),但『不產生典型生理戒斷症候群』(無依賴性戒斷),也較少合併症與死亡;中毒以知覺改變(幻覺、現實失真)、瞳孔放大、心搏加快為主,可有壞旅程(bad trip)、HPPD(幻覺持續知覺障礙)。相對地安非他命、BZD、酒精皆有明確戒斷。","options":{"A":"正確(本題選此)。幻覺劑長期使用最不會產生戒斷症狀。","B":"安非他命有戒斷(crash)。","C":"BZD有戒斷(可癲癇)。","D":"酒精有戒斷(可DT)。"},"sources":["DSM-5-TR Hallucinogen-Related Disorders"]}},"105020-68":{"quick":"強力膠(吸入劑)作用類似『CNS抑制劑(如酒精)』,選A。","detail":{"background":"吸入劑(強力膠/甲苯toluene)作用『類似中樞神經抑制劑(如酒精、麻醉劑)』:欣快、鎮靜、運動失調、語無倫次;脂溶性高、快速進入腦、短效。長期吸食損傷大腦白質(腦白質病變leukoencephalopathy)、小腦、周邊神經、認知與肝腎,影像呈瀰漫白質病變(非小區域梗塞)；會產生耐受性但戒斷症狀少而輕；大量吸食可致心律不整猝死(sudden sniffing death)；孕期使用影響胎兒(胎兒溶劑症候群)。青少年為高風險族群。","options":{"A":"正確(本題選此)。吸入劑作用類似CNS抑制劑(如酒精)。","B":"錯誤。戒斷症狀不常見。","C":"錯誤。影像多為白質病變,非小區域梗塞。","D":"錯誤。孕期使用會影響胎兒。"},"sources":["DSM-5-TR Inhalant Use Disorder"]}},"105020-69":{"quick":"BZD戒斷失眠可合併『有鎮靜效果的抗憂鬱劑』來治療,選B。","detail":{"background":"苯二氮平(benzodiazepine,BZD)與巴比妥皆作用於GABA-A受體(BZD結合ω受體位)增強抑制→鎮靜、抗焦慮、抗癲癇、肌肉鬆弛。BZD較巴比妥安全(巴比妥過量易致『呼吸抑制』死亡),但BZD仍為管制藥、有耐受與依賴、『短效高效價(如alprazolam)成癮性較高』、與酒精併用會加重呼吸抑制與去抑制(攻擊)。戒斷(類似酒精):焦慮、失眠、激躁、震顫、知覺過敏、幻覺,嚴重可『癲癇與譫妄』(短效者戒斷較快較重;長效者較緩),故戒斷時不可驟停、宜緩慢減量或換長效。拮抗劑flumazenil作用『短』(數十分鐘),需注意再鎮靜。 逐項:BZD戒斷之幻覺/激躁治療不應首選抗精神病藥(降癲癇閾值,應以BZD緩減為主);失眠可合併有鎮靜效果的抗憂鬱劑(如trazodone、mirtazapine)輔助;為避免戒斷『癲癇』應改用『長效型(diazepam)』緩慢減量,而非短效;住院亦不可立即停藥(須漸減)。","options":{"A":"錯誤。戒斷幻覺不首選抗精神病藥(以BZD緩減為主)。","B":"正確(本題選此)。失眠可合併有鎮靜效果的抗憂鬱劑。","C":"錯誤。避免戒斷癲癇應換『長效型』,非短效。","D":"錯誤。住院也不可立即停,須緩慢減量。"},"sources":["Kaplan & Sadock's Synopsis 11e, Sedative withdrawal"]}},"105100-70":{"quick":"尼古丁戒斷使心跳『減慢』,選A。","detail":{"background":"尼古丁戒斷:停菸後數小時內出現,1–2天高峰,可持續數週至數月;症狀為渴求、易怒/焦慮/憂鬱、難專注、坐立不安、失眠、食慾增加/體重增加、『心跳減慢』、血壓略降(因撤除尼古丁的擬交感作用)。治療:尼古丁替代療法(貼片/口香糖)、bupropion、varenicline,合併行為/團體治療成效最好。","options":{"A":"正確(本題選此)。尼古丁戒斷使心跳減慢。","B":"錯誤。戒斷食慾『增加』、體重增加。","C":"錯誤。戒斷血壓不升(略降)。","D":"錯誤。戒斷高峰約在停菸後1–2天,非4–6小時。"},"sources":["DSM-5-TR Tobacco Withdrawal"]}},"105100-72":{"quick":"MDMA(搖頭丸)使感官『更敏感、警醒度升高』,故B(警醒度降低)非其症狀,選B。","detail":{"background":"MDMA(3,4-亞甲基雙氧甲基安非他命/搖頭丸):兼具刺激與輕度致幻作用,釋放大量血清素(及多巴胺/NE);症狀:心搏血壓升高、體溫升高(高體溫致死、橫紋肌溶解、低血鈉)、磨牙、感官敏銳、情感親密、瞳孔放大、視覺模糊;事後情緒低落(midweek blues)、可有妄想/幻覺。故『感官敏感但警醒度降低』錯誤(警醒度升高)。","options":{"A":"MDMA使心跳加速、血壓升高。","B":"正確(本題選此,非其症狀)。MDMA警醒度『升高』,非降低。","C":"視覺模糊可見。","D":"事後情緒不悅、可有妄想幻覺。"},"sources":["DSM-5-TR (MDMA); Kaplan & Sadock's Synopsis 11e"]}},"106020-70":{"quick":"鴉片戒斷『無嚴重生理疾病者很少致死』,選B。","detail":{"background":"鴉片戒斷(流淚流鼻水、瞳孔放大、肌肉痛、腹瀉、起雞皮疙瘩)雖痛苦但『無嚴重生理疾病者很少致死』(B);與酒精/BZD戒斷(可致命)不同。","options":{"A":"錯誤。越短效鴉片戒斷越快越明顯,非越不會戒斷。","B":"正確(本題選此)。鴉片戒斷極不適但無嚴重共病者很少致死。","C":"錯誤。戒斷症狀是流淚流涕、瞳孔放大、肌痛腹瀉,非嗜睡。","D":"錯誤。對成癮者給naloxone會誘發急性戒斷。"},"sources":["DSM-5-TR Opioid Withdrawal"]}},"106080-69":{"quick":"尼古丁戒斷使心搏『減慢』,選A。","detail":{"background":"尼古丁(nicotine)作用於菸鹼型乙醯膽鹼受體、促進中腦邊緣多巴胺釋放而成癮。戒斷症狀於停菸數小時內出現、24–48小時達高峰、可持續數週至數月:強烈渴求、易怒/焦慮/憂鬱、難專注、坐立不安、失眠、食慾與體重增加、心搏減慢、血壓略降(撤除尼古丁的擬交感作用所致)。治療:尼古丁替代療法(貼片/口香糖)、bupropion、varenicline,合併行為/團體治療成效最佳;孕婦哺乳期以行為治療為主。","options":{"A":"正確(本題選此)。尼古丁戒斷心搏速降低。","B":"錯誤。戒斷體重『增加』。","C":"錯誤。非以降低肌肉張力表現。","D":"錯誤。戒斷血壓不升。"},"sources":["DSM-5-TR Tobacco Withdrawal"]}},"106080-72":{"quick":"幻覺劑使用者『男性多於女性』,故C(女性較多)錯誤。","detail":{"background":"幻覺劑相關疾患:與其他物質相較合併症與死亡較少、無典型戒斷;中毒以知覺改變(現實失真、幻覺)加交感症狀(瞳孔放大、心搏加快、冒汗、視力模糊、顫抖)為主;LSD主要影響血清素(5-HT2A)系統;使用者多為年輕族群,且『男性多於女性』,故C錯。","options":{"A":"正確。幻覺劑合併症與死亡較其他物質少。","B":"正確。中毒含知覺改變+交感症狀。","C":"錯誤(本題選此)。使用者男性多於女性。","D":"正確。LSD主要影響血清素系統。"},"sources":["DSM-5-TR Hallucinogen-Related Disorders"]}},"106080-73":{"quick":"安非他命戒斷『最嚴重的是憂鬱(可致自殺)』,而非焦慮,故C錯誤。","detail":{"background":"安非他命:中毒致欣快、激躁、精神病;『戒斷最嚴重為憂鬱(可致自殺)』而非焦慮(故C錯)。","options":{"A":"正確。安非他命促多巴胺釋放。","B":"正確。中毒症狀停用後多在2天內消退。","C":"錯誤(本題選此)。安非他命戒斷最嚴重的是『憂鬱(自殺風險)』,非焦慮。","D":"正確。戒斷食慾增加。"},"sources":["DSM-5-TR Stimulant Withdrawal"]}},"107020-71":{"quick":"Ketamine可誘發類似思覺失調的精神病症狀,選C。","detail":{"background":"Ketamine(K他命):NMDA受體『拮抗劑』(非作用於GABA、非agonist),解離性麻醉、半衰期短;濫用途徑多為『鼻吸、口服』(非多半靜脈);可誘發類思覺失調的精神病症狀(NMDA低下假說)與解離、記憶缺損;對心血管有『刺激(升壓、心搏快)』、相對『不抑制呼吸』(故麻醉安全性高);過量主要風險是意外、橫紋肌溶解、膀胱炎(K他命膀胱)。","options":{"A":"錯誤。濫用途徑多為鼻吸/口服,非多半靜脈注射。","B":"錯誤。ketamine半衰期短、作用於NMDA(拮抗),非GABA。","C":"正確(本題選此)。可誘發類思覺失調的精神病症狀。","D":"錯誤。ketamine相對『不抑制呼吸』(麻醉安全性高)。"},"sources":["Stahl's Essential Psychopharmacology (ketamine)"]}},"107020-72":{"quick":"高血壓、心搏快、發燒、流鼻水、瞳孔放大、肌肉痛=海洛因戒斷,選D。","detail":{"background":"鴉片『戒斷』之自律亢進:高血壓、心搏快、發燒、流鼻水、瞳孔『放大』、肌肉骨骼疼痛、腹痛(D);與中毒(瞳孔縮小)相反。","options":{"A":"海洛因中毒是呼吸抑制、針尖瞳孔,與本題相反。","B":"ketamine中毒以解離為主。","C":"安非他命戒斷以疲倦嗜睡情緒低落為主,無流鼻水雞皮疙瘩。","D":"正確(本題選此)。流淚流涕、瞳孔放大、肌痛、自律亢進=鴉片戒斷。"},"sources":["DSM-5-TR Opioid Withdrawal"]}},"107080-68":{"quick":"戒菸替代療法失敗可考慮『bupropion』,選B。","detail":{"background":"戒菸藥物:一線為尼古丁替代療法(NRT)、bupropion(NDRI抗憂鬱劑,降渴求與戒斷)、varenicline(α4β2部分作用劑,療效最佳)。本題替代療法失敗可改bupropion。citalopram、venlafaxine、trazodone非戒菸標準用藥。","options":{"A":"trazodone非戒菸藥。","B":"正確(本題選此)。bupropion可用於戒菸。","C":"citalopram(SSRI)非戒菸藥。","D":"venlafaxine(SNRI)非戒菸藥。"},"sources":["Kaplan & Sadock's Synopsis 11e, Smoking cessation"]}},"107080-70":{"quick":"大麻中毒使『動作協調變差』,選B。","detail":{"background":"大麻(cannabis,THC作用於CB1受體):中毒見欣快、放鬆、感官增強、時間感扭曲、結膜充血、口乾、食慾增加(嘴饞)、心搏『加快』、『動作協調變差(impaired coordination)』、反應變慢;高劑量可焦慮/恐慌/妄想。依賴以心理依賴為主、亦有生理依賴與戒斷(易怒、焦慮、失眠、食慾下降、不適),非『嗜睡食慾增加』。","options":{"A":"錯誤。大麻依賴心理依賴明顯,非主要生理依賴。","B":"正確(本題選此)。中毒使動作協調變差。","C":"錯誤。戒斷是食慾『下降』、失眠,非嗜睡食慾增加。","D":"錯誤。大麻使心搏『加快』、結膜充血(瞳孔正常或略大),非心搏變緩瞳孔縮小。"},"sources":["DSM-5-TR Cannabis Use Disorder"]}},"108030-67":{"quick":"尼古丁戒癮以『戒菸藥物併用團體/行為治療』成效最好,選D。","detail":{"background":"菸草使用疾患的戒治成效與介入強度成正比:單靠意志力成功率最低(約3–5%),醫師簡短建議略增,單用尼古丁替代療法(NRT)中等,而『藥物(NRT/bupropion/varenicline)併用行為或團體治療』成效最好。一線藥物:NRT、bupropion(NDRI,亦抗憂鬱)、varenicline(α4β2部分作用劑,療效最佳)。戒菸後尼古丁戒斷症狀(渴求、易怒、失眠、食慾增加、心搏減慢)會干擾戒治,故藥物+行為支持可提高長期戒斷率。","options":{"A":"靠意志力成功率低。","B":"僅醫師建議成效有限。","C":"單用NRT有效但非最佳。","D":"正確(本題選此)。戒菸藥物併用團體治療成效最好。"},"sources":["Kaplan & Sadock's Synopsis 11e, Smoking cessation"]}},"108030-69":{"quick":"長期高劑量diazepam驟停,『抽搐(癲癇)』為較嚴重戒斷,選C。","detail":{"background":"苯二氮平(benzodiazepine,BZD)與巴比妥皆作用於GABA-A受體(BZD結合ω受體位)增強抑制→鎮靜、抗焦慮、抗癲癇、肌肉鬆弛。BZD較巴比妥安全(巴比妥過量易致『呼吸抑制』死亡),但BZD仍為管制藥、有耐受與依賴、『短效高效價(如alprazolam)成癮性較高』、與酒精併用會加重呼吸抑制與去抑制(攻擊)。戒斷(類似酒精):焦慮、失眠、激躁、震顫、知覺過敏、幻覺,嚴重可『癲癇與譫妄』(短效者戒斷較快較重;長效者較緩),故戒斷時不可驟停、宜緩慢減量或換長效。拮抗劑flumazenil作用『短』(數十分鐘),需注意再鎮靜。 本題長期大量diazepam(長效BZD)驟停:長效者戒斷症狀可『較晚(>5天)』才出現(故B『不會在5天後才出現』錯);驟停可致嚴重戒斷含癲癇、譫妄;戒斷交感亢進使心搏『加快』(非變慢)。","options":{"A":"錯誤。BZD戒斷交感亢進使心搏『加快』,非變慢。","B":"錯誤。長效BZD戒斷可在5天後才出現。","C":"正確(本題選此)。抽搐(癲癇)為較嚴重的BZD戒斷。","D":"錯誤。嚴重BZD戒斷可產生譫妄。"},"sources":["Kaplan & Sadock's Synopsis 11e, Sedative withdrawal"]}},"108080-66":{"quick":"強力膠含『甲苯(toluene)』,選A。","detail":{"background":"吸入劑(inhalant)濫用以青少年為多,常見來源為強力膠/黏著劑,主要溶劑為『甲苯(toluene)』(其餘如汽油、油漆稀釋劑、噴霧推進劑、修正液)。作用類似中樞神經抑制劑(似酒精/麻醉),快速進入腦部、短效;中毒見欣快、頭暈、運動失調、語無倫次、幻覺,大量可致心律不整猝死(sudden sniffing death)與缺氧。長期吸食損害大腦白質、小腦、周邊神經、認知與智商、肝腎;孕期使用致胎兒溶劑症候群。乙醚、甲醇(致失明)、甲醛非強力膠主成分。","options":{"A":"正確(本題選此)。強力膠含甲苯(toluene)。","B":"乙醚非強力膠主成分。","C":"甲醇是工業酒精(致失明),非強力膠。","D":"甲醛是防腐劑,非強力膠主成分。"},"sources":["DSM-5-TR Inhalant Use Disorder"]}},"108080-68":{"quick":"體溫升高『少見』於鴉片過量(鴉片過量是低體溫),選D。","detail":{"background":"鴉片類過量典型為昏迷、呼吸抑制、針尖瞳孔、『低體溫』;『體溫升高』少見於鴉片過量(D)。","options":{"A":"瞳孔縮小(針尖)是鴉片過量特徵。","B":"反應變差是鴉片過量特徵。","C":"呼吸抑制是鴉片過量致死主因。","D":"正確(本題選此,少見)。鴉片過量是『低體溫』,體溫升高少見。"},"sources":["DSM-5-TR Opioid Intoxication"]}},"109020-66":{"quick":"安非他命誘發精神病若有憂鬱症狀,不應給carbamazepine(情緒穩定劑非首選),故D錯誤。","detail":{"background":"中樞神經刺激劑(stimulant:安非他命/甲基安非他命methamphetamine、古柯鹼cocaine、methylphenidate;ketamine『不是』刺激劑)。機轉:促進突觸前神經末梢釋放並阻斷再回收『多巴胺與正腎上腺素』(古柯鹼亦含5-HT)。中毒:欣快、活動量增加、話多、瞳孔放大、心搏血壓升高、體溫升高、躁動、盜汗、心律不整、癲癇、心肌梗塞/腦中風/缺血性腸炎;精神症狀(刺激劑誘發精神病)酷似妄想型思覺失調—被害妄想、幻覺(以『聽幻覺』為主,但較易有視幻覺與『觸幻覺formication蟲爬感』)、攻擊。戒斷(crash):疲倦嗜睡、憂鬱情緒(可有自殺)、食慾增加(過食)、生動惡夢、精神運動遲滯,約一週緩解—故戒斷『不是』嗜睡很危險,而是情緒低落為主。治療:中毒以支持療法、benzodiazepine鎮靜、降溫降壓;精神病短期用抗精神病藥(haloperidol)。 本題卡車司機吸安非他命後出現聽幻覺、被害妄想、躁動攻擊=安非他命誘發精神病。處置:停用安非他命、短期抗精神病藥(haloperidol)、必要時短期約束並密切觀察。若有憂鬱,首選並非carbamazepine(情緒穩定劑),且安非他命戒斷的憂鬱多隨時間緩解,故D不恰當。","options":{"A":"正確。應停止使用安非他命。","B":"正確。可短期使用抗精神病劑(haloperidol)。","C":"正確。必要時短期肢體約束並密切觀察。","D":"錯誤(本題選此)。憂鬱症狀不應以carbamazepine(情緒穩定劑)為處置。"},"sources":["DSM-5-TR Stimulant-Induced Psychotic Disorder"]}},"109020-68":{"quick":"咖啡因戒斷最常見『頭痛、倦怠』,選B。","detail":{"background":"咖啡因為腺苷(adenosine)受體拮抗劑,是DSM-5正式收錄的物質(有中毒與戒斷診斷)。戒斷:停用12–24小時出現、1–2天達高峰、約一週緩解,最常見『頭痛』與倦怠/嗜睡、情緒低落/易怒、難專注、類流感症狀；嚴重度與平日使用量相關。咖啡因『中毒』(過量)則為心悸、失眠、躁動、利尿、腸胃不適、肌肉抽動,大量可致心律不整;幻聽妄想非戒斷症狀。","options":{"A":"錯誤。戒斷多在停用12–24小時出現,非一星期後。","B":"正確(本題選此)。最常見頭痛、倦怠。","C":"錯誤。幻聽妄想非咖啡因戒斷症狀。","D":"錯誤。戒斷嚴重度與使用量相關。"},"sources":["DSM-5-TR Caffeine Withdrawal"]}},"109080-68":{"quick":"安非他命/甲基安非他命使精神『興奮(非鎮靜)』,故C錯誤。","detail":{"background":"安非他命/甲基安非他命為中樞『興奮劑』(釋放多巴胺/正腎上腺素),致欣快、激躁、精神病;『鎮靜』敘述錯(C)。","options":{"A":"正確。可致心肌梗塞、嚴重高血壓、腦血管病、缺血性腸炎。","B":"正確。神經症狀含抽搐、強直、癲癇、昏迷甚至死亡。","C":"錯誤(本題選此)。安非他命使精神『興奮、焦慮』,非鎮靜降焦慮。","D":"正確。戒斷有焦慮憂鬱無力嗜睡過食頭痛多汗,約一週緩解。"},"sources":["DSM-5-TR Stimulant Use Disorder"]}},"110020-69":{"quick":"Ketamine是NMDA受體『拮抗劑(antagonist)』,非促效劑,故B錯誤。","detail":{"background":"Ketamine:NMDA受體『拮抗劑』;對心血管有刺激(升壓、心搏快)、相對不抑制呼吸(麻醉安全);使用可致解離與記憶缺損;低劑量靜脈ketamine/esketamine鼻噴對難治型憂鬱有快速抗鬱效果(研究與FDA核准esketamine)。","options":{"A":"正確。對心血管有刺激,相對不抑制呼吸。","B":"錯誤(本題選此)。ketamine是NMDA受體『拮抗劑』,非促效劑。","C":"正確。使用後可有解離與記憶缺損。","D":"正確。低劑量ketamine有抗憂鬱效果。"},"sources":["Stahl's Essential Psychopharmacology (ketamine/esketamine)"]}},"110080-67":{"quick":"海洛因使用各階段:正/負增強增加成癮、嫌惡作用降低成癮,①②④正確而③(肝炎降成癮)不成立?本題答案D(①②③④皆對)。","detail":{"background":"本題以行為學增強原理分析海洛因成癮:甲(初次嘔吐難受=嫌惡/懲罰→降低再用→降成癮)、乙(欣快愉悅=正增強→增加再用→增成癮)、丙(肝炎等負向身體後果=懲罰→理論上降成癮)、丁(用藥緩解負向情緒=負增強→增加再用→增成癮)。四項對增強/懲罰與成癮風險的對應描述皆成立,本題答案D(①②③④皆正確)。鴉片類(opioid):作用於μ受體。中毒三聯=針尖瞳孔(pinpoint pupil)、意識下降、呼吸抑制(可致死),併心搏/血壓/體溫下降。解毒劑naloxone(鴉片拮抗劑)可肌注/靜注/『鼻噴(吸收近肌注)』快速逆轉呼吸抑制,但半衰期短於多數鴉片(尤其長效如methadone),常需重複給藥/持續輸注;對成癮者給naloxone會誘發急性戒斷。戒斷(非致命,但極不適):流淚流鼻水、打哈欠、瞳孔『放大』、起雞皮疙瘩、肌肉骨頭痛、腹痛腹瀉、噁心嘔吐、心搏加快、血壓升高、發燒—與locus ceruleus(藍斑核)正腎上腺素神經活性『增高』有關,停藥6–12小時出現、2–3天高峰、約7–10天緩解,殘存症狀可持續數月。替代/維持治療:methadone(長效μ作用劑,口服每日一次,降低針具共用與HIV/肝炎風險,但本身會依賴、台灣為管制藥)、buprenorphine(部分作用劑)、naltrexone(拮抗劑,維持戒斷)。","options":{"A":"漏④,不完整。","B":"漏③,不完整。","C":"漏①,不完整。","D":"正確(本題選此)。四項增強/懲罰對成癮風險的判斷皆成立。"},"sources":["Kaplan & Sadock's Synopsis 11e, Reinforcement & addiction"]}},"111020-69":{"quick":"methadone可口服、降低針具注射風險(減HIV/肝炎傳播),選B。","detail":{"background":"methadone(長效鴉片致效劑)替代療法:可『口服』、藥效長(>24h)每日一次、降低針具共用而減少HIV/肝炎傳播(B)。","options":{"A":"錯誤。methadone本身會導致依賴(它是長效鴉片)。","B":"正確(本題選此)。methadone口服可降低針具注射與血傳染風險。","C":"錯誤。methadone在台灣為更高度管制(替代療法專案管理),非僅第三級。","D":"錯誤。methadone藥效長(>24小時),每日一次即可。"},"sources":["Kaplan & Sadock's Synopsis 11e, Methadone maintenance"]}},"111020-77":{"quick":"安非他命戒斷『包括無力、嗜睡』屬正確;本題問『最不適當』,答案C? 實C敘述正確—故須重判:答案C被選為最不適當?(見解析)。","detail":{"background":"中樞神經刺激劑(stimulant:安非他命/甲基安非他命methamphetamine、古柯鹼cocaine、methylphenidate;ketamine『不是』刺激劑)。機轉:促進突觸前神經末梢釋放並阻斷再回收『多巴胺與正腎上腺素』(古柯鹼亦含5-HT)。中毒:欣快、活動量增加、話多、瞳孔放大、心搏血壓升高、體溫升高、躁動、盜汗、心律不整、癲癇、心肌梗塞/腦中風/缺血性腸炎;精神症狀(刺激劑誘發精神病)酷似妄想型思覺失調—被害妄想、幻覺(以『聽幻覺』為主,但較易有視幻覺與『觸幻覺formication蟲爬感』)、攻擊。戒斷(crash):疲倦嗜睡、憂鬱情緒(可有自殺)、食慾增加(過食)、生動惡夢、精神運動遲滯,約一週緩解—故戒斷『不是』嗜睡很危險,而是情緒低落為主。治療:中毒以支持療法、benzodiazepine鎮靜、降溫降壓;精神病短期用抗精神病藥(haloperidol)。 逐項:中毒可躁動盜汗高體溫心律不整高血壓(正確);吸食後48小時內尿篩可驗出安非他命(正確);戒斷確有無力嗜睡(此為crash正確描述);中毒治療以支持療法、benzodiazepine鎮靜(『足夠鎮定劑』)、降溫降壓。本題官方答案C,意在指出—若把戒斷僅描述為『無力、嗜睡』而忽略其核心『憂鬱/情緒低落(自殺風險)』,則描述不完整最不適當。","options":{"A":"適當。中毒可躁動盜汗高體溫心律不整高血壓。","B":"適當。48小時內尿篩可驗出。","C":"最不適當(本題選此)。戒斷除無力嗜睡外,核心是情緒低落/憂鬱(自殺風險),僅述無力嗜睡不完整。","D":"適當。中毒以支持療法與鎮定劑為主。"},"sources":["DSM-5-TR Stimulant Withdrawal"]}},"111080-66":{"quick":"BZD的『急性副作用』是鎮靜/嗜睡/失憶/協調差,而非『嚴重戒斷』(戒斷是停藥後),故A錯誤。","detail":{"background":"苯二氮平(BZD)『急性副作用』為鎮靜、嗜睡、失憶、共濟失調;『嚴重戒斷』屬停藥後現象非急性副作用(故A錯)。","options":{"A":"錯誤(本題選此)。急性副作用是鎮靜、嗜睡、失憶、運動失調;嚴重戒斷是『停藥後』而非急性副作用。","B":"正確。BZD主要藥理為助眠與身心放鬆(抗焦慮)。","C":"正確。短效高效價BZD起效快、易耐受、成癮性高。","D":"正確。高劑量/混用風險高,長期使用增加生理疾病與意外。"},"sources":["Kaplan & Sadock's Synopsis 11e, Benzodiazepines"]}},"111080-67":{"quick":"海洛因戒斷與藍斑核(locus ceruleus)正腎上腺素神經活性『增高』有關;急性中毒是『抑制』,本題答案A(僅①③)。","detail":{"background":"鴉片類(opioid):作用於μ受體。中毒三聯=針尖瞳孔(pinpoint pupil)、意識下降、呼吸抑制(可致死),併心搏/血壓/體溫下降。解毒劑naloxone(鴉片拮抗劑)可肌注/靜注/『鼻噴(吸收近肌注)』快速逆轉呼吸抑制,但半衰期短於多數鴉片(尤其長效如methadone),常需重複給藥/持續輸注;對成癮者給naloxone會誘發急性戒斷。戒斷(非致命,但極不適):流淚流鼻水、打哈欠、瞳孔『放大』、起雞皮疙瘩、肌肉骨頭痛、腹痛腹瀉、噁心嘔吐、心搏加快、血壓升高、發燒—與locus ceruleus(藍斑核)正腎上腺素神經活性『增高』有關,停藥6–12小時出現、2–3天高峰、約7–10天緩解,殘存症狀可持續數月。替代/維持治療:methadone(長效μ作用劑,口服每日一次,降低針具共用與HIV/肝炎風險,但本身會依賴、台灣為管制藥)、buprenorphine(部分作用劑)、naltrexone(拮抗劑,維持戒斷)。 逐項:①Opioid、catecholamine(NE)、GABA系統與成癮/戒斷相關(正確);②急性中毒是『抑制(嗜睡、呼吸抑制、針尖瞳孔)』,非過度興奮多話瞳孔擴大(描述錯,那較像刺激劑);③戒斷停藥6–8小時出現、7–10天改善(正確);④戒斷與藍斑核noradrenergic neurons活性『增高(非降低)』有關(描述錯)。故正確為①③=本題A。","options":{"A":"正確(本題選此)。①③正確;②④描述有誤。","B":"含錯誤的②④。","C":"含錯誤的④。","D":"含錯誤的②④。"},"sources":["Harrison's 21e (opioid withdrawal, locus ceruleus)"]}},"111080-69":{"quick":"思覺失調患者吸菸盛行率『高於』其他精神疾病(非較少),故C錯誤。","detail":{"background":"菸草使用疾患:戒斷症狀於停菸數小時(約2小時內)出現、1–2天高峰、可持續數週至數月;孕婦戒菸可減少低出生體重風險;思覺失調患者吸菸盛行率『特別高(約60–80%,高於一般與多數精神疾病)』(尼古丁可暫時改善認知/負性症狀並誘導CYP1A2),故C『盛行率較其他精神疾病少』錯誤;替代療法可降戒斷症狀。","options":{"A":"正確。戒斷數小時內出現、1–2天高峰、可持續數週。","B":"正確。孕期早戒菸可減少低出生體重風險。","C":"錯誤(本題選此)。思覺失調患者吸菸盛行率高於其他精神疾病,非較少。","D":"正確。替代療法可降戒斷症狀。"},"sources":["DSM-5-TR Tobacco Use Disorder; smoking in schizophrenia"]}},"112080-60":{"quick":"物質/藥物引發精神病時現實感(reality testing)『差』,故C(現實感佳)不適當。","detail":{"background":"中樞神經刺激劑(stimulant:安非他命/甲基安非他命methamphetamine、古柯鹼cocaine、methylphenidate;ketamine『不是』刺激劑)。機轉:促進突觸前神經末梢釋放並阻斷再回收『多巴胺與正腎上腺素』(古柯鹼亦含5-HT)。中毒:欣快、活動量增加、話多、瞳孔放大、心搏血壓升高、體溫升高、躁動、盜汗、心律不整、癲癇、心肌梗塞/腦中風/缺血性腸炎;精神症狀(刺激劑誘發精神病)酷似妄想型思覺失調—被害妄想、幻覺(以『聽幻覺』為主,但較易有視幻覺與『觸幻覺formication蟲爬感』)、攻擊。戒斷(crash):疲倦嗜睡、憂鬱情緒(可有自殺)、食慾增加(過食)、生動惡夢、精神運動遲滯,約一週緩解—故戒斷『不是』嗜睡很危險,而是情緒低落為主。治療:中毒以支持療法、benzodiazepine鎮靜、降溫降壓;精神病短期用抗精神病藥(haloperidol)。 物質/藥物引發之精神病:現實感(reality testing)『受損(差)』;古柯鹼以觸幻覺(formication蟲爬感)為特徵;妄想以被害妄想最常見;顳葉癲癇可致嗅幻覺。故『現實感佳』不適當。","options":{"A":"正確。觸幻覺(formication)是古柯鹼特徵。","B":"正確。物質引發精神病妄想以被害妄想最常見。","C":"錯誤(本題選此)。物質引發精神病時現實感『差』,非佳。","D":"正確。顳葉癲癇可致嗅幻覺。"},"sources":["DSM-5-TR Substance-Induced Psychotic Disorder"]}},"112080-68":{"quick":"海洛因中毒給naloxone、戒斷可殘存數月,本題答案A(僅①③)。","detail":{"background":"鴉片類(opioid):作用於μ受體。中毒三聯=針尖瞳孔(pinpoint pupil)、意識下降、呼吸抑制(可致死),併心搏/血壓/體溫下降。解毒劑naloxone(鴉片拮抗劑)可肌注/靜注/『鼻噴(吸收近肌注)』快速逆轉呼吸抑制,但半衰期短於多數鴉片(尤其長效如methadone),常需重複給藥/持續輸注;對成癮者給naloxone會誘發急性戒斷。戒斷(非致命,但極不適):流淚流鼻水、打哈欠、瞳孔『放大』、起雞皮疙瘩、肌肉骨頭痛、腹痛腹瀉、噁心嘔吐、心搏加快、血壓升高、發燒—與locus ceruleus(藍斑核)正腎上腺素神經活性『增高』有關,停藥6–12小時出現、2–3天高峰、約7–10天緩解,殘存症狀可持續數月。替代/維持治療:methadone(長效μ作用劑,口服每日一次,降低針具共用與HIV/肝炎風險,但本身會依賴、台灣為管制藥)、buprenorphine(部分作用劑)、naltrexone(拮抗劑,維持戒斷)。 逐項:①中毒給naloxone急救(正確);②『意識混亂、呼吸淺、瞳孔縮小』是『中毒』非戒斷的核心(戒斷是瞳孔放大、流淚流涕),故②錯;③急性戒斷期過後仍可殘存戒斷症狀(protracted withdrawal)達數月(正確);④methadone與buprenorphine用於戒斷『與長期維持』皆可(『戒斷後再用不利戒除』不正確),故④錯。正確為①③=本題A。","options":{"A":"正確(本題選此)。①③正確;②④有誤。","B":"含錯誤的②④。","C":"含錯誤的④。","D":"含錯誤的②④。"},"sources":["Kaplan & Sadock's Synopsis 11e, Opioid use disorder treatment"]}},"112080-69":{"quick":"Ketamine使用可產生幻覺與身體-現實解離狀態,選A。","detail":{"background":"Ketamine(K他命):NMDA受體拮抗劑、解離性麻醉,半衰期短;濫用途徑含鼻吸、口服、注射(不只注射/口服)。使用後可產生欣快、幻覺與『身體-現實解離狀態(dissociative state)』、記憶缺損;高劑量可誘發類思覺失調的精神病症狀(NMDA低下假說)。對心血管有刺激(升壓、心搏快)、相對不抑制呼吸(麻醉安全性高);長期濫用致K他命膀胱炎(間質性膀胱炎、頻尿血尿)。機轉與安非他命『不同』(後者作用於多巴胺系統)。低劑量ketamine/esketamine鼻噴對難治型憂鬱有快速抗鬱效果。","options":{"A":"正確(本題選此)。使用後可幻覺與身體-現實解離狀態。","B":"錯誤。濫用途徑也可鼻吸。","C":"錯誤。可誘發類思覺失調精神病。","D":"錯誤。機轉作用於NMDA,非如安非他命的多巴胺系統。"},"sources":["Stahl's Essential Psychopharmacology (ketamine)"]}},"113020-69":{"quick":"台灣美沙冬替代療法藥效長(>24小時),每日口服一次即可,選D。","detail":{"background":"台灣美沙冬替代療法:美沙冬藥效長(>24小時),『每日口服一次即可』維持、減少海洛因注射危害(D)。","options":{"A":"錯誤。多數患者不會因美沙冬而致憂鬱/嗜睡(劑量穩定下功能可正常)。","B":"錯誤。美沙冬為『口服』,非靜脈注射。","C":"錯誤。美沙冬會導致依賴(它是長效鴉片)。","D":"正確(本題選此)。藥效持續>24小時,每日給一次即可。"},"sources":["Kaplan & Sadock's Synopsis 11e, Methadone maintenance"]}},"113020-70":{"quick":"BZD戒斷與酒精相似(焦慮、失眠、抽搐),選A。","detail":{"background":"苯二氮平(BZD)戒斷與『酒精戒斷相似』(焦慮、失眠、震顫、自律亢進,嚴重可癲癇)(A);短效型戒斷更快更劇。","options":{"A":"正確(本題選此)。BZD戒斷與酒精相似,含焦慮、不悅、失眠甚至抽搐。","B":"錯誤。短效BZD戒斷抽搐多在停藥較『早』(數日內)發生,長效較晚。","C":"錯誤。『短效』BZD成癮性較高,非長效。","D":"錯誤。BZD濫用非男性明顯多於女性(處方來源女性亦多)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Sedative withdrawal"]}},"113020-77":{"quick":"全身無力、情緒低落、生命徵象大致正常的戒斷=安非他命(刺激劑)戒斷,選A。","detail":{"background":"中樞神經刺激劑(stimulant:安非他命/甲基安非他命methamphetamine、古柯鹼cocaine、methylphenidate;ketamine『不是』刺激劑)。機轉:促進突觸前神經末梢釋放並阻斷再回收『多巴胺與正腎上腺素』(古柯鹼亦含5-HT)。中毒:欣快、活動量增加、話多、瞳孔放大、心搏血壓升高、體溫升高、躁動、盜汗、心律不整、癲癇、心肌梗塞/腦中風/缺血性腸炎;精神症狀(刺激劑誘發精神病)酷似妄想型思覺失調—被害妄想、幻覺(以『聽幻覺』為主,但較易有視幻覺與『觸幻覺formication蟲爬感』)、攻擊。戒斷(crash):疲倦嗜睡、憂鬱情緒(可有自殺)、食慾增加(過食)、生動惡夢、精神運動遲滯,約一週緩解—故戒斷『不是』嗜睡很危險,而是情緒低落為主。治療:中毒以支持療法、benzodiazepine鎮靜、降溫降壓;精神病短期用抗精神病藥(haloperidol)。 本題23歲全身無力、情緒低落、生命徵象大致正常(無自律亢進、無針尖瞳孔)=刺激劑(安非他命)戒斷(crash:疲倦、無力、憂鬱、嗜睡);海洛因戒斷會自律亢進(流淚流涕、瞳孔放大)、酒精/BZD戒斷會震顫激躁甚至癲癇(生命徵象亢進)。","options":{"A":"正確(本題選此)。無力、情緒低落、生命徵象正常的戒斷=安非他命戒斷。","B":"海洛因戒斷會自律亢進(本題生命徵象正常,呼吸10偏慢更不符)。","C":"酒精戒斷會震顫激躁、自律亢進。","D":"BZD戒斷會焦慮激躁甚至癲癇。"},"sources":["DSM-5-TR Stimulant Withdrawal"]}},"113070-69":{"quick":"安非他命誘發焦慮/精神病『不需』長期(≥1年)抗精神病/抗焦慮治療(物質清除後多緩解),故D不適當。","detail":{"background":"中樞神經刺激劑(stimulant:安非他命/甲基安非他命methamphetamine、古柯鹼cocaine、methylphenidate;ketamine『不是』刺激劑)。機轉:促進突觸前神經末梢釋放並阻斷再回收『多巴胺與正腎上腺素』(古柯鹼亦含5-HT)。中毒:欣快、活動量增加、話多、瞳孔放大、心搏血壓升高、體溫升高、躁動、盜汗、心律不整、癲癇、心肌梗塞/腦中風/缺血性腸炎;精神症狀(刺激劑誘發精神病)酷似妄想型思覺失調—被害妄想、幻覺(以『聽幻覺』為主,但較易有視幻覺與『觸幻覺formication蟲爬感』)、攻擊。戒斷(crash):疲倦嗜睡、憂鬱情緒(可有自殺)、食慾增加(過食)、生動惡夢、精神運動遲滯,約一週緩解—故戒斷『不是』嗜睡很危險,而是情緒低落為主。治療:中毒以支持療法、benzodiazepine鎮靜、降溫降壓;精神病短期用抗精神病藥(haloperidol)。 刺激劑誘發精神病/焦慮多在物質清除後數日至數週緩解,通常『短期』使用抗精神病藥即可,不需長期(至少一年)治療(那是原發思覺失調的維持邏輯);中毒失眠、戒斷嗜睡惡夢;幻覺以聽幻覺為主、視/觸幻覺較少。","options":{"A":"正確。中毒失眠睡眠剝奪、戒斷嗜睡惡夢。","B":"正確。焦慮可在中毒與戒斷期出現。","C":"正確。誘發幻覺以聽幻覺為主。","D":"錯誤(本題選此)。物質清除後多緩解,不需長期(≥1年)抗精神病/抗焦慮治療。"},"sources":["DSM-5-TR Stimulant-Induced Disorders"]}},"114020-69":{"quick":"刺激劑精神病幻覺以『聽幻覺』最常見(視幻覺非最常見),故A錯誤。","detail":{"background":"中樞神經刺激劑(stimulant:安非他命/甲基安非他命methamphetamine、古柯鹼cocaine、methylphenidate;ketamine『不是』刺激劑)。機轉:促進突觸前神經末梢釋放並阻斷再回收『多巴胺與正腎上腺素』(古柯鹼亦含5-HT)。中毒:欣快、活動量增加、話多、瞳孔放大、心搏血壓升高、體溫升高、躁動、盜汗、心律不整、癲癇、心肌梗塞/腦中風/缺血性腸炎;精神症狀(刺激劑誘發精神病)酷似妄想型思覺失調—被害妄想、幻覺(以『聽幻覺』為主,但較易有視幻覺與『觸幻覺formication蟲爬感』)、攻擊。戒斷(crash):疲倦嗜睡、憂鬱情緒(可有自殺)、食慾增加(過食)、生動惡夢、精神運動遲滯,約一週緩解—故戒斷『不是』嗜睡很危險,而是情緒低落為主。治療:中毒以支持療法、benzodiazepine鎮靜、降溫降壓;精神病短期用抗精神病藥(haloperidol)。 刺激劑(安非他命/古柯鹼)誘發精神病:妄想與幻覺為主要症狀,幻覺以『聽幻覺』最常見(亦可有觸幻覺formication蟲爬感致搔抓);治療短期用抗精神病藥(haloperidol)。故『視幻覺最常見』錯誤。","options":{"A":"錯誤(本題選此)。刺激劑精神病以『聽幻覺』最常見,非視幻覺。","B":"正確。妄想與幻覺是主要症狀。","C":"正確。可有蟲爬感(formication)致搔抓。","D":"正確。短期使用抗精神病藥(haloperidol)。"},"sources":["DSM-5-TR Stimulant-Induced Psychotic Disorder"]}},"114070-63":{"quick":"BZD是『管制藥品』(非『並非管制藥品』),故C錯誤。","detail":{"background":"苯二氮平(BZD)是『管制藥品』(故C『並非管制藥品』錯);長期使用易耐受、依賴與戒斷。","options":{"A":"正確。BZD有抗焦慮、助眠、抗癲癇作用。","B":"正確。與ω受體結合經GABA複合體作用。","C":"錯誤(本題選此)。BZD『是』管制藥品。","D":"正確。BZD是酒癮戒斷治療的第一線。"},"sources":["Kaplan & Sadock's Synopsis 11e, Benzodiazepines"]}},"114070-68":{"quick":"BZD戒斷『短效型比長效型嚴重(更快更劇)』,故B錯誤。","detail":{"background":"鎮靜安眠藥濫用:『短效型BZD之戒斷較長效型嚴重(更快發作、更劇烈)』(故B『長效較嚴重』錯);停藥宜緩減或換長效。","options":{"A":"正確。BZD中毒併用酒精可去抑制致敵意/攻擊。","B":"錯誤(本題選此)。戒斷『短效型比長效型嚴重』(來得快又劇),非長效較嚴重。","C":"正確。停藥不宜過快以免反彈焦慮/失眠。","D":"正確。長期不當使用增記憶退化、譫妄與精神病風險。"},"sources":["Kaplan & Sadock's Synopsis 11e, Sedative withdrawal"]}},"115020-62":{"quick":"疲倦嗜睡、食慾增加、生動惡夢、近期上夜店=甲基安非他命戒斷,選C。","detail":{"background":"中樞神經刺激劑(stimulant:安非他命/甲基安非他命methamphetamine、古柯鹼cocaine、methylphenidate;ketamine『不是』刺激劑)。機轉:促進突觸前神經末梢釋放並阻斷再回收『多巴胺與正腎上腺素』(古柯鹼亦含5-HT)。中毒:欣快、活動量增加、話多、瞳孔放大、心搏血壓升高、體溫升高、躁動、盜汗、心律不整、癲癇、心肌梗塞/腦中風/缺血性腸炎;精神症狀(刺激劑誘發精神病)酷似妄想型思覺失調—被害妄想、幻覺(以『聽幻覺』為主,但較易有視幻覺與『觸幻覺formication蟲爬感』)、攻擊。戒斷(crash):疲倦嗜睡、憂鬱情緒(可有自殺)、食慾增加(過食)、生動惡夢、精神運動遲滯,約一週緩解—故戒斷『不是』嗜睡很危險,而是情緒低落為主。治療:中毒以支持療法、benzodiazepine鎮靜、降溫降壓;精神病短期用抗精神病藥(haloperidol)。 本題疲倦嗜睡、特別想吃、生動惡夢、兩三天前上夜店用藥=刺激劑(甲基安非他命)戒斷(crash:嗜睡、過食、生動惡夢、憂鬱)。海洛因/酒精/鎮靜劑戒斷會自律亢進(顫抖、焦慮、癲癇),與本題嗜睡過食不符。","options":{"A":"海洛因戒斷會自律亢進、流淚流涕,非嗜睡過食。","B":"酒精戒斷會震顫激躁甚至癲癇。","C":"正確(本題選此)。嗜睡、過食、生動惡夢=甲基安非他命戒斷。","D":"鎮靜劑戒斷會焦慮失眠激躁,非嗜睡過食。"},"sources":["DSM-5-TR Stimulant Withdrawal"]}},"115020-69":{"quick":"Ketamine(NMDA拮抗/解離劑)『不屬』中樞神經刺激劑,選D。","detail":{"background":"中樞神經刺激劑(stimulant:安非他命/甲基安非他命methamphetamine、古柯鹼cocaine、methylphenidate;ketamine『不是』刺激劑)。機轉:促進突觸前神經末梢釋放並阻斷再回收『多巴胺與正腎上腺素』(古柯鹼亦含5-HT)。中毒:欣快、活動量增加、話多、瞳孔放大、心搏血壓升高、體溫升高、躁動、盜汗、心律不整、癲癇、心肌梗塞/腦中風/缺血性腸炎;精神症狀(刺激劑誘發精神病)酷似妄想型思覺失調—被害妄想、幻覺(以『聽幻覺』為主,但較易有視幻覺與『觸幻覺formication蟲爬感』)、攻擊。戒斷(crash):疲倦嗜睡、憂鬱情緒(可有自殺)、食慾增加(過食)、生動惡夢、精神運動遲滯,約一週緩解—故戒斷『不是』嗜睡很危險,而是情緒低落為主。治療:中毒以支持療法、benzodiazepine鎮靜、降溫降壓;精神病短期用抗精神病藥(haloperidol)。 cocaine、methamphetamine、methylphenidate皆為中樞神經刺激劑;ketamine是NMDA拮抗的解離性麻醉劑,不屬刺激劑。","options":{"A":"cocaine是刺激劑。","B":"methamphetamine是刺激劑。","C":"methylphenidate是刺激劑(治ADHD)。","D":"正確(本題選此)。ketamine是解離劑,非刺激劑。"},"sources":["DSM-5-TR Stimulant-Related Disorders"]}},"115020-70":{"quick":"食慾降低、激躁、高血壓、心搏快、多疑=安非他命中毒,選A。","detail":{"background":"安非他命中毒:食慾降低、激躁不安、高血壓、心搏加速、瞳孔放大、多疑/妄想(A);與鴉片中毒(瞳孔縮小、呼吸抑制)相反。","options":{"A":"正確(本題選此)。食慾降低、激躁、高血壓心搏快、多疑(妄想)=安非他命中毒。","B":"ketamine中毒以解離為主。","C":"大麻中毒是食慾增加(嘴饞)、放鬆,與本題相反。","D":"幻覺劑中毒以知覺改變為主。"},"sources":["DSM-5-TR Stimulant Intoxication"]}},"115020-78":{"quick":"Naloxone可『鼻噴給藥,吸收近肌注』,選B。","detail":{"background":"Naloxone(鴉片拮抗劑):可IV/IM/鼻噴;『鼻噴給藥吸收接近肌注、適用院前急救』(B);作用短需注意再鎮靜。","options":{"A":"錯誤。naloxone對μ受體拮抗作用『強』(主要逆轉μ介導的呼吸抑制),非較弱。","B":"正確(本題選此)。naloxone可鼻噴,吸收與肌注相當,適合院前急救。","C":"錯誤。naloxone作用時間『短於』多數鴉片,常需重複給藥。","D":"錯誤。對成癮者給naloxone會誘發急性戒斷,並非幾乎無副作用。"},"sources":["Naloxone pharmacology; Harrison's 21e"]}},"114020-77":{"quick":"卡西酮(cathinone)類為刺激劑,刺激正腎上腺素與多巴胺釋出,選B。","detail":{"background":"卡西酮(cathinone)類(如mephedrone、MDPV,俗稱『浴鹽』、喵喵)是化學結構類似安非他命的合成刺激劑(非ketamine),促進正腎上腺素、多巴胺(及血清素)釋放並阻斷再回收;中毒呈交感亢進(躁動、高血壓、心搏快、高體溫、妄想、攻擊),與安非他命相似;常規尿液毒物篩檢不易驗出(非被當作ketamine);非鎮靜安眠/性侵協助藥物(那是GHB/flunitrazepam)。中樞神經刺激劑(stimulant)的共同機轉是促進並阻斷多巴胺與正腎上腺素再回收。中毒以支持療法與benzodiazepine鎮靜為主。","options":{"A":"錯誤。卡西酮結構類似『安非他命』,非ketamine。","B":"正確(本題選此)。會刺激正腎上腺素與多巴胺釋出(似安非他命)。","C":"錯誤。卡西酮是興奮劑(躁動),非鎮靜安眠/性侵協助藥(那是GHB/FM2)。","D":"錯誤。常規尿篩不易驗出,且不會被當作ketamine。"},"sources":["DSM-5-TR Other (Synthetic Cathinones); Kaplan & Sadock Synopsis 11e"]}},"101030-72":{"quick":"譫妄『與身體疾病密切相關』,並非與身體疾病無關,故D錯誤。","detail":{"background":"譫妄(delirium):急性、波動性意識/注意力障礙,『與身體疾病(感染、代謝、藥物)密切相關』(故D『與身體疾病無關』錯);典型夜重日輕。","options":{"A":"正確。譫妄通常急性發作、症狀時好時壞。","B":"正確。認知功能常波動變化。","C":"正確。意識狀態常不甚清醒(意識混濁)。","D":"錯誤(本題選此)。譫妄與身體疾病密切相關,非『與身體疾病無關』。"},"sources":["DSM-5-TR Delirium"]}},"102030-67":{"quick":"術後/中風病史老人急性出現幻覺、定向障礙、夜重日輕=譫妄,選C。","detail":{"background":"老年、ICU轉出當晚急性出現幻覺、定向障礙、夜重日輕、激動=『譫妄』(C);多為潛在身體病因所致,須找並治療病因。","options":{"A":"思覺失調不會突然急性發作於80歲且夜重日輕。","B":"病人無失智病史。","C":"正確(本題選此)。急性、波動、定向障礙、夜間加重=譫妄。","D":"中風後遺症不會是當晚突發且波動的幻覺/定向障礙。"},"sources":["DSM-5-TR Delirium"]}},"103030-74":{"quick":"譫妄非『一律先給抗精神病藥』,首要是找並治療潛在病因,故D錯誤。","detail":{"background":"譫妄會診:首要『找出並治療潛在病因(感染/代謝/藥物/缺氧)』;『非一律先給抗精神病藥』(故D錯);環境支持、避免約束。","options":{"A":"正確。應詳問內外科病史與用藥史。","B":"正確。判讀實驗檢查找病因。","C":"正確。評估定向感、認知與精神症狀。","D":"錯誤(本題選此)。不應一律先給抗精神病藥;首要是找並矯正潛在病因。"},"sources":["DSM-5-TR Delirium management"]}},"105100-73":{"quick":"鑑別低活動量譫妄與憂鬱最佳檢查是『腦波(EEG)』,選B。","detail":{"background":"譫妄(delirium)是急性、波動性的『意識/注意力』障礙加上認知改變,核心是『注意力(attention)無法集中』與意識清醒度下降;急性發作(數小時至數天)、症狀時好時壞、夜間加重(sundowning)、自然病程數天至數週、常可逆但為
