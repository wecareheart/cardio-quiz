,"detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 A型行為(易怒、不耐煩、急性子、競爭)與冠心病風險相關,『敵意(hostility)』是A型行為與心血管風險的核心成分;敵意/壓力促進『交感神經』活化(非副交感),增加心血管負荷;對心肌梗塞病人的心理介入(改善A型行為/壓力)可降低再梗塞與死亡。","options":{"A":"正確。A型行為與冠心病發生率相關。","B":"正確。敵意是A型行為的核心成分。","C":"錯誤(本題選此)。敵意促進『交感』神經,非副交感。","D":"正確。對MI病人的心理介入可降死亡與再梗塞率。"},"sources":["Kaplan & Sadock's Synopsis 11e, Type A behavior & CAD"]}},"104030-64":{"quick":"正向生活事件(陞遷、得獎)『也會』產生壓力,故D錯誤。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 壓力理論:壓力可致神經傳導物質、內分泌(HPA軸)、免疫失調;生活事件的因應與調適影響健康。即使是『正向』生活事件(陞遷、得獎、結婚)因需適應改變,『也會』產生壓力(life change units),故D錯誤。","options":{"A":"正確。壓力可致神經傳導物質失調。","B":"正確。壓力可致內分泌或免疫失調。","C":"正確。生活事件因應與壓力調適有關。","D":"錯誤(本題選此)。正向生活事件(陞遷得獎)也會產生壓力。"},"sources":["Kaplan & Sadock's Synopsis 11e, Stress theory"]}},"104090-64":{"quick":"本題多重答案(A、D皆給分):TCA可治FGID(A本身正確被列錯?)、長期精神分析非FGID首選(D錯)。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 FGID精神科治療:三環抗鬱劑(TCA)與SSRI可改善腸躁/腸胃症狀(A本身正確);SSRI可能致腸胃不適影響順從性(B正確);用藥須監測副作用(C正確);心理治療(CBT、放鬆、催眠)有效,但『長期精神分析』非FGID的有效標準療法(D錯)。本題官方A、D皆給分(視A的敘述與題意而判錯/接受)。","options":{"A":"列為錯誤(本題給分,依官方)。TCA雖可改善腸躁,但本題與D並列為答。","B":"正確。SSRI可能致腸胃不適影響順從性。","C":"正確。用藥須監測副作用。","D":"錯誤(本題選此)。長期精神分析非FGID的有效療法。"},"sources":["Kaplan & Sadock's Synopsis 11e, FGID; 考選部公告多重答案(A/D)"]}},"105020-62":{"quick":"冠心病的精神科非藥物治療中『精神分析』最欠缺實證,選D。","detail":{"background":"冠心病之精神科非藥物治療(CBT、心臟復健運動、壓力管理)有實證;『精神分析(psychoanalysis)』最欠缺實證佐證(D)。","options":{"A":"放鬆訓練對冠心病有實證。","B":"壓力管理訓練有實證。","C":"團體社會支持有實證。","D":"正確(本題選此)。精神分析對冠心病最欠缺實證佐證。"},"sources":["Kaplan & Sadock's Synopsis 11e, Psychocardiology"]}},"105020-63":{"quick":"器官受贈者最常見精神疾病是『憂鬱/適應障礙』,非PTSD,故C錯誤。","detail":{"background":"器官移植受贈者最常見精神疾病為『憂鬱/適應障礙』(非PTSD)(故C錯);須評估順從性與心理支持。","options":{"A":"正確。受贈者常面臨生活適應困難。","B":"正確。等待/評估/術後適應常產生壓力反應。","C":"錯誤(本題選此)。受贈者最常見精神疾病是憂鬱/適應障礙,非PTSD。","D":"正確。長期類固醇可引起情緒障礙。"},"sources":["Kaplan & Sadock's Synopsis 11e, Transplant psychiatry"]}},"105020-71":{"quick":"生理回饋最不適用於『思覺失調症』,選B。","detail":{"background":"生理回饋適用於焦慮、頭痛、高血壓等;『思覺失調症』最不適用(B,需現實感與配合度)。","options":{"A":"緊張性頭痛適用生理回饋。","B":"正確(本題選此)。思覺失調症非自律調節問題,生理回饋最不適用。","C":"氣喘適用。","D":"心律不整(自律相關)適用。"},"sources":["Kaplan & Sadock's Synopsis 11e, Biofeedback"]}},"106020-62":{"quick":"FGID共病的焦慮中最常出現的是『廣泛性焦慮/恐慌』而非PTSD,故C錯誤。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 功能性腸胃道疾患(FGID)常合併精神疾病,焦慮症為最常見共病;但共病的焦慮以廣泛性焦慮、恐慌症為主,『PTSD是最常出現』之說不正確;恐慌發作症狀亦含腸胃道不適。","options":{"A":"正確。FGID病人常合併精神疾病。","B":"正確。焦慮症是FGID常見精神共病。","C":"錯誤(本題選此)。FGID共病焦慮以GAD/恐慌為主,非PTSD最常出現。","D":"正確。恐慌發作症狀含腸胃道症狀。"},"sources":["Kaplan & Sadock's Synopsis 11e, FGID comorbidity"]}},"106020-64":{"quick":"甲狀腺亢進『會』造成認知功能缺損,故B錯誤。","detail":{"background":"甲狀腺功能亢進『會』造成認知功能缺損(注意力/記憶)與焦慮/情緒症狀(故B『不會造成認知缺損』錯)。","options":{"A":"正確。甲亢可說話滔滔不絕(似躁)。","B":"錯誤(本題選此)。甲亢『會』造成認知功能缺損(尤嚴重/老年apathetic型)。","C":"正確。甲亢可致視幻覺、被害意念、譫妄。","D":"正確。甲亢臨床表現可與躁症相似。"},"sources":["Kaplan & Sadock's Synopsis 11e, Hyperthyroidism & psychiatry"]}},"106020-66":{"quick":"同卵雙胞胎一人罹思覺失調,另一人罹病率約『50%』,非100%,故D錯誤。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 精神疾病病因可用①時序(前置/誘發/延續)②生物-心理-社會三面向分析;基因是生理病因之一。但思覺失調同卵雙胞胎共病率約『45–50%』(非100%),顯示基因之外仍有環境因素。","options":{"A":"正確。可用前置/誘發/延續作時序分析。","B":"正確。可用生物/心理/社會三面向分析。","C":"正確。先天基因變異是生理病因之一。","D":"錯誤(本題選此)。同卵雙胞胎共病率約50%,非100%。"},"sources":["Kaplan & Sadock's Synopsis 11e, Biopsychosocial model; schizophrenia genetics"]}},"107020-63":{"quick":"焦慮『會』導致/加重功能性腸胃道疾患,故D錯誤。","detail":{"background":"功能性腸胃道疾患(如腸躁症)與心理壓力密切相關;『焦慮會導致/加重』功能性腸胃疾患(故D『不會』錯)。","options":{"A":"正確。心身症常以腸胃道症狀表現。","B":"正確。腸胃疾病中相當高比例為功能性。","C":"正確。心理因素影響FGID嚴重度與預後。","D":"錯誤(本題選此)。焦慮『會』導致/加重FGID(腦腸軸)。"},"sources":["Kaplan & Sadock's Synopsis 11e, FGID"]}},"107080-61":{"quick":"甲狀腺亢進與低下『均可』引起認知障礙,選C。","detail":{"background":"甲狀腺功能『亢進與低下均可引起認知障礙』與情緒症狀(C);治療原發甲狀腺問題多可改善。","options":{"A":"錯誤。甲亢『也可能』引起憂鬱情緒(尤老年apathetic型),非只躁症。","B":"錯誤。甲亢可出現幻覺或被害意念等精神病症狀。","C":"正確(本題選此)。甲亢與甲低均可引起認知障礙。","D":"錯誤。甲亢心跳加速等表現『須』列入恐慌症的鑑別診斷。"},"sources":["Kaplan & Sadock's Synopsis 11e, Thyroid & psychiatry"]}},"107080-69":{"quick":"頭部外傷病人對藥物較敏感,應『低劑量起始、緩慢調整』,故D錯誤。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 頭部外傷後精神症狀:6–12個月未改善可能慢性化;常見認知障礙(注意/記憶/學習新資訊困難);行為問題(憂鬱、衝動、攻擊、人格改變)。用藥原則為『低劑量起始、緩慢加量(start low, go slow)』因腦傷病人對藥物副作用更敏感,故D『需較高初始劑量、較快調劑』錯誤。","options":{"A":"正確。6–12個月未改善可能慢性化。","B":"正確。常見注意/記憶/學習困難。","C":"正確。行為問題含憂鬱、衝動、攻擊、人格改變。","D":"錯誤(本題選此)。腦傷者對藥物敏感,應低劑量起始、緩慢調整,非高劑量快速調。"},"sources":["Kaplan & Sadock's Synopsis 11e, Traumatic brain injury & psychiatry"]}},"108030-68":{"quick":"會診精神醫學評估『拒絕手術病人』時,『告知手術必要性/成功率』是外科醫師的職責,非精神科會談重點,選C。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 照會精神醫學評估拒絕治療的病人,重點在『評估病人的醫療決定能力(對病情/利弊/後果的理解)、了解拒絕原委、評估照顧能力』,而非由精神科醫師『告知手術的必要性與成功率』(那是外科醫師的告知職責)。","options":{"A":"是會談重點。評估術後照顧能力。","B":"是會談重點。評估病人對手術利弊的理解(決定能力)。","C":"正確(本題選此,不應包含)。告知手術必要性/成功率是外科醫師的職責,非精神科會談重點。","D":"是會談重點。了解拒絕手術的原委。"},"sources":["Kaplan & Sadock's Synopsis 11e, Consultation-liaison psychiatry (capacity)"]}},"108080-60":{"quick":"糖尿病共病憂鬱的機轉與治療有其特殊性(雙向影響),與單純憂鬱『不完全相同』,故B錯誤。","detail":{"background":"糖尿病與憂鬱雙向相關(憂鬱增糖尿病風險、糖尿病增憂鬱),其機轉/治療有特殊考量,『與單純憂鬱不完全相同』(故B錯)。","options":{"A":"正確。長期抗精神病藥可引發糖尿病(代謝副作用)。","B":"錯誤(本題選此)。糖尿病共病憂鬱有雙向影響,機轉與治療『不完全』與單純憂鬱相同(需考量血糖、藥物交互、自我照顧)。","C":"正確。心理壓力影響飲食控制與血糖。","D":"正確。低血糖可致焦慮、意識/行為混亂。"},"sources":["Kaplan & Sadock's Synopsis 11e, Diabetes & depression"]}},"108080-62":{"quick":"甲狀腺低下引發的精神症狀『不應一開始就用高劑量抗精神病藥』(應補充甲狀腺素治本),故A錯誤。","detail":{"background":"甲狀腺功能低下之精神症狀(憂鬱、認知遲鈍)應『先補充甲狀腺素治本』,『不應一開始即用高劑量抗精神病藥』(故A錯)。","options":{"A":"錯誤(本題選此)。甲低引發的精神症狀應『補充甲狀腺素治本』,非一開始就高劑量抗精神病藥。","B":"正確。甲低可引發認知障礙。","C":"正確。甲低是難治型憂鬱的原因之一。","D":"正確。甲低可引發憂鬱情緒。"},"sources":["Kaplan & Sadock's Synopsis 11e, Hypothyroidism & psychiatry"]}},"110020-63":{"quick":"移植術後最不會出現的是『妄想症(delusional disorder)』,選C。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 移植術後精神科併發症:適應障礙、重鬱症、譫妄(術後/類固醇/感染)、PTSD(部分);但原發性『妄想症(delusional disorder)』是與壓力無關的慢性妄想疾病,最不會因移植而出現。","options":{"A":"適應障礙常見於移植術後。","B":"PTSD可出現於移植術後。","C":"正確(本題選此,最不會)。妄想症是慢性原發疾病,最不會因移植出現。","D":"重鬱症常見於移植術後。"},"sources":["Kaplan & Sadock's Synopsis 11e, Transplant psychiatry"]}},"110020-67":{"quick":"老年人精神病症狀對抗精神病藥『仍有反應』(只是須低劑量小心),故C錯誤。","detail":{"background":"老年精神病症狀『對抗精神病藥仍有反應』(須低劑量、注意副作用)(故C『無反應』錯)。","options":{"A":"正確。社區/護理之家老人約15%有憂鬱症狀。","B":"正確。老人失能中關節炎比失智常見。","C":"錯誤(本題選此)。老年人精神病症狀對抗精神病藥『仍有反應』(須低劑量、慎防副作用),非反應不佳。","D":"正確。妄想症多發於中年,但老年任何時期可發生,最常見被害妄想。"},"sources":["Kaplan & Sadock's Synopsis 11e, Geriatric psychiatry"]}},"110080-65":{"quick":"減重手術後『僅補B12和鐵』不足以防復胖,故D錯誤。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 病態肥胖(BMI≥40或≥35合併共病)治療須先排除續發病因(Prader-Willi、Cushing等)、可能與精神疾病或藥物副作用(抗精神病藥)相關;胃繞道等減重手術被ADA列為第二型糖尿病的治療策略(代謝手術)。術後須補充多種維生素/礦物質(B12、鐵、鈣、葉酸、脂溶性維生素),但『僅補B12和鐵』不足以防復胖—復胖與飲食行為、心理因素等多重因素有關,需行為與營養長期介入。","options":{"A":"正確。須先排除染色體/代謝病因。","B":"正確。病態肥胖可起因於精神疾病或藥物副作用。","C":"正確。減重(代謝)手術被ADA列為第二型糖尿病治療策略。","D":"錯誤(本題選此)。僅補B12和鐵不足以防復胖(需行為/營養長期介入)。"},"sources":["Kaplan & Sadock's Synopsis 11e, Obesity & bariatric surgery; ADA Standards"]}},"110080-73":{"quick":"『低動機(low motivation)』者不適合接受心理治療,選A。","detail":{"background":"心理治療適合具動機、心理識能、能形成治療關係者;『低動機(low motivation)者不適合接受心理治療』(A)。","options":{"A":"正確(本題選此)。低動機者不適合心理治療(動機是良好預後的前提)。","B":"建立關係的能力是適合心理治療的條件。","C":"洞察力是適合心理治療的條件。","D":"充分的自我強度是適合心理治療的條件。"},"sources":["Kaplan & Sadock's Synopsis 11e, Psychotherapy suitability"]}},"111080-63":{"quick":"FGID最常伴隨的精神疾患是『焦慮疾患』,選A。","detail":{"background":"功能性腸胃障礙(FGID)最常伴隨之精神疾患為『焦慮疾患』(A)(其次憂鬱);採身心整合治療。","options":{"A":"正確(本題選此)。FGID最常伴隨焦慮疾患。","B":"憂鬱疾患常見但非『最常』伴隨。","C":"思覺失調非FGID常見共病。","D":"妄想症非FGID常見共病。"},"sources":["Kaplan & Sadock's Synopsis 11e, FGID comorbidity"]}},"112020-66":{"quick":"正常老化的『神經質(neuroticism)』人格特質相對穩定、不隨年齡明顯變化,故A最不適當。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 正常老化:大腦重量減少、腦室變寬;人格大五特質中神經質、外向、開放相對穩定,但最老老年期外向性略降、隨和性略升;孤立感增加會升高憂鬱風險。題述『神經質會隨年紀變化』不適當(神經質相對穩定)。","options":{"A":"錯誤(本題選此,最不適當)。神經質特質相對穩定,不隨年齡明顯變化。","B":"正確。大腦重量減少、腦室變寬。","C":"正確。最老老年期外向性略降、隨和性略升。","D":"正確。孤立感增加提高憂鬱風險。"},"sources":["Kaplan & Sadock's Synopsis 11e, Normal aging"]}},"113020-67":{"quick":"慮病症發生高峰多在『成年早期-中年(20–50歲)』,非60歲以上老年,故B最不適當。","detail":{"background":"老年精神問題:『慮病症(疾病焦慮)發生高峰多在成年早期至中年(20–50歲)』,非60歲以上(故B最不適當)。","options":{"A":"正確。老人自殺風險高,約1/3與孤單有關。","B":"錯誤(本題選此)。慮病症(罹病焦慮症)高峰多在成年早期至中年,非60歲以上老年。","C":"正確。焦慮症多起於成年早期/中年,少數可晚發於老年。","D":"正確。老人呼吸相關睡眠障礙(如OSA)經驗較年輕人高。"},"sources":["Kaplan & Sadock's Synopsis 11e, Geriatric psychiatry; Illness anxiety disorder"]}},"114070-62":{"quick":"COPD病人共病恐慌症的比率『高於』一般人,故A錯誤。","detail":{"background":"COPD病人共病『恐慌症/焦慮比率高於一般人』(缺氧/呼吸困難誘發)(故A『低於一般人』錯)。","options":{"A":"錯誤(本題選此)。COPD病人共病恐慌症的比率『高於』一般人(呼吸困難-恐慌惡性循環)。","B":"正確。睡眠障礙與COPD等內科疾病有關。","C":"正確。COPD共病焦慮症比率高於一般人。","D":"正確。alpha-2 agonist等藥物過量可致焦慮、顫抖。"},"sources":["Kaplan & Sadock's Synopsis 11e, COPD & anxiety/panic"]}},"114070-65":{"quick":"生理回饋(biofeedback)應用『操作型制約(operant conditioning)』原理,選A。","detail":{"background":"會診聯繫精神醫學(consultation-liaison psychiatry)與身心醫學(psychosomatic medicine)處理身體疾病與精神症狀的交互作用。重點:①身體疾病可致精神症狀(甲狀腺亢進→焦慮/躁/譫妄/認知障礙;甲狀腺低下→憂鬱/認知障礙/難治型憂鬱;低血糖→焦慮/意識混亂;類固醇→情緒障礙;頭部外傷→認知/情緒/人格改變)②慢性病常共病憂鬱/焦慮(糖尿病、COPD、冠心病、移植),共病憂鬱的機轉與治療有其特殊性(雙向影響、需考量藥物交互與身體狀況)③心身症/功能性疾患(功能性腸胃道疾患FGID如腸躁症,常合併焦慮為最常見共病、心理因素影響嚴重度,治療用TCA/SSRI與心理治療,但非長期精神分析)④移植/手術之心理適應(適應障礙、憂鬱、譫妄、PTSD較少見、藥物如類固醇致情緒障礙)⑤照會評估病人『決定能力』而非替醫師告知病情。生物-心理-社會病因模式與前置/誘發/延續時序分析是精神醫學的基本架構。生理回饋(biofeedback)基於『操作制約(operant conditioning)』,用於緊張性頭痛、高血壓、氣喘、心律不整、睡眠/焦慮等與自律神經相關的身心症,但對思覺失調、ADHD等核心非自律調節之疾病效果有限。心理治療(psychotherapy)的良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度;治療中須維持專業界限(避免雙重關係、利益往來、自我揭露不當)。 生理回饋將生理訊號(肌電、皮溫、心率、腦波)即時回饋給病人,讓病人學習自主調控—屬『操作制約(操作型增強)』的學習原理。系統減敏感、洪水法是行為治療的暴露技術(基於古典制約/消弱),非生理回饋的原理。","options":{"A":"正確(本題選此)。生理回饋基於操作型制約。","B":"古典制約是聯結學習(如系統減敏的基礎),非生理回饋核心。","C":"系統減敏感法是暴露技術,非生理回饋原理。","D":"洪水法是暴露技術,非生理回饋原理。"},"sources":["Kaplan & Sadock's Synopsis 11e, Biofeedback (operant conditioning)"]}}},TO=["思覺失調症與精神病性疾患", "憂鬱症與情緒障礙", "雙相情緒障礙症", "焦慮症、強迫症及相關疾患", "創傷壓力、解離、身體症狀及人為疾患", "酒精使用疾患", "其他物質使用疾患與成癮", "譫妄與神經認知障礙", "睡眠障礙", "飲食疾患", "人格障礙症", "神經發展與兒童青少年精神疾患", "精神藥理學與身體治療", "自殺防治、精神衛生法規與司法精神醫學", "精神症狀學與精神狀態檢查", "心理治療、會診聯繫與身心醫學"],LEC={"思覺失調症與精神病性疾患":{"title":"思覺失調症與精神病性疾患 複習講義","html":"<p><b>診斷(DSM-5):</b>思覺失調A準則五症狀=妄想、幻覺、混亂言語、嚴重混亂/僵直行為、負性症狀；需<b>≥2項且至少一項為前三者之一</b>，活躍期≥1個月、整體病程≥6個月、功能下降、排除情感性與物質/身體病因。終身盛行率約<b>1%(0.3–0.7%)</b>，男女相近但<b>男性早發(15–25)、女性晚發(25–35,雌激素保護→預後較佳)</b>。</p>\n<p><b>正性 vs 負性症狀：</b>正性(妄想/幻覺/混亂)←mesolimbic多巴胺過度→D2拮抗反應佳；<b>負性(情感平淡、貧語alogia、無動機、社交退縮)←mesocortical多巴胺低下、前額葉不足→治療反應差、最能預測社會功能</b>。聽幻覺最常見、非診斷必要條件。</p>\n<p><b>預後：</b>好=晚發、急性發作、有誘發因子、情感症狀、病前功能佳、有情感疾患家族史、女性；差=早發、隱襲、無誘發因子、負性症狀為主、有思覺失調家族史。一等親風險約10倍、同卵雙胞胎共病約50%。長期約<b>5–10%死於自殺</b>(年輕高功能病程早期最危險)。</p>\n<p><b>相關疾患：</b>情感性思覺失調(schizoaffective)=同時有思覺失調與情感發作、無情感症狀時仍≥2週有精神病、預後介於兩者間；類思覺失調(schizophreniform)=1–6個月；<b>妄想症(delusional disorder)</b>=非怪異妄想、功能保留、晚發(平均40歲)、社交/感官隔離為危險因子。<b>僵直(catatonia)</b>=不語/蠟曲/仿說仿動作/作態，最常見潛在病是情感性疾患，首選lorazepam→ECT。Bleuler 4A=Association/Affect/Autism/Ambivalence。</p>"},"憂鬱症與情緒障礙":{"title":"憂鬱症與情緒障礙 複習講義","html":"<p><b>重鬱症(MDD)：</b>終身盛行率約15%、<b>女性約男性2倍</b>、平均發病約40歲。診斷需≥5症狀≥2週且含<b>憂鬱情緒或失去興趣(anhedonia)其一</b>。生物機轉=單胺(5-HT來自縫核raphe、NE來自藍斑核locus ceruleus、DA)功能不足+HPA軸過度活化(cortisol↑、dexamethasone不抑制)+發炎+BDNF↓+海馬萎縮。<b>睡眠:REM潛期縮短、REM量增、深睡減少、早醒</b>。</p>\n<p><b>特殊型：</b>憂鬱(melancholic)特徵=anhedonia+晨重暮輕+早醒+體重下降+精神運動遲滯+生物性強；非典型=情緒可反應、嗜睡過食。產後憂鬱(產後數週至月、可傷嬰、再罹風險高)≠產後情緒低落(baby blues,3–5天、2週內緩解)。PMDD=黃體期情緒+身體症狀、月經後緩解、SSRI首選。老年憂鬱常以身體不適/假性失智表現。</p>\n<p><b>治療：</b>抗憂鬱劑(SSRI/SNRI)需『持續治療≥6個月』防復發、不成癮(但有停藥症候群)、TCA過量致死、SSRI較安全；非藥物=CBT/IPT、光照(季節性)、rTMS(難治、副作用頭痛)、ECT(最快最強,嚴重/精神病性/自殺/拒食)。嚴重個案藥物+心理治療優於單一。</p>"},"雙相情緒障礙症":{"title":"雙相情緒障礙症 複習講義","html":"<p><b>診斷(DSM-5)：</b><b>bipolar I 只需一次躁症發作</b>(不必有鬱期)；躁症=情緒高昂/易怒+活動增加≥1週(或需住院則不限)+≥3項(易怒≥4):誇大、睡眠需求↓、多話、意念飛躍、分心、活動↑、高風險享樂(亂花錢/性/投資)，致顯著功能損害或需住院或有精神病。<b>輕躁(hypomania)≥4天、無顯著功能損害、不需住院、無精神病</b>；bipolar II=輕躁+重鬱。盛行率約1%、男女相近、發病早(約18–20歲)、多數首次發作為憂鬱。</p>\n<p><b>治療：</b>急性躁期=鋰鹽/valproate/第二代抗精神病藥(±BZD),<b>單用抗憂鬱劑禁忌(會惡化躁症/快速循環)</b>；鬱期=quetiapine/lurasidone/lamotrigine/lithium(risperidone用於躁症非鬱期)；維持=情緒穩定劑(lithium金標準、降自殺)或抗精神病藥(含長效針劑)。</p>\n<p><b>情緒穩定劑：</b><b>lithium</b>治療窗窄(急性0.8–1.2 mEq/L)、需測血中濃度、中毒(粗顫/腹瀉/共濟失調/口齒不清/癲癇,血液透析救命)、長期致甲低/腎尿崩、孕致Ebstein三尖瓣異常。<b>valproate</b>(50–120 µg/mL,孕致神經管缺損)；<b>lamotrigine</b>(鬱期預防、需緩慢加量防SJS、未核准躁期)；carbamazepine。轉雙相預測:早發、精神病症狀、家族bipolar史、抗憂鬱誘發輕躁。</p>"},"焦慮症、強迫症及相關疾患":{"title":"焦慮症、強迫症及相關疾患 複習講義","html":"<p><b>總論：</b>焦慮性疾患是<b>盛行率最高</b>的精神疾病群、多於青少年/成年早期發病、女性多於男性。DSM-5焦慮章=分離焦慮/選擇性緘默/特定畏懼/社交焦慮/恐慌/懼曠/GAD；<b>OCD與PTSD在DSM-5已獨立成章</b>(DSM-IV曾納焦慮)。神經生物=杏仁核、藍斑核(NE)、縫核(5-HT)、GABA。第一線藥=SSRI/SNRI；BZD短期(有依賴);buspirone(5-HT1A)用GAD;CBT/暴露為主。</p>\n<p><b>恐慌症：</b>反覆無預警發作、<b>數分鐘內達高峰</b>、心悸/喘/胸悶/瀕死失控感(意識清楚、定向保留)、發作後預期焦慮；酷似心臟病→自行衝急診比率最高；長期維持首選SSRI、alprazolam成癮性高;呼吸訓練(腹式)矯正換氣過度。<b>懼曠症</b>=怕難逃離/求助而逃避多種公共情境、最常與恐慌共病。</p>\n<p><b>各論：</b>社交焦慮症(怕被評價、青少年期發病、廣泛型併畏避型人格)；特定畏懼症(暴露/系統減敏為主、藥物非首選)；GAD(多項過度擔憂≥6個月+身體緊張、慢性化)。<b>OCD(DSM-5獨立)</b>:強迫思想(最常見=怕污染)+行為(暫時緩解焦慮)、ego-dystonic(知不合理)、男女相近、慢性化、首選SSRI高劑量+暴露不反應(ERP)；身體畸形性疾患/偷竊癖屬OCD相關/衝動控制。</p>"},"創傷壓力、解離、身體症狀及人為疾患":{"title":"創傷壓力、解離、身體症狀及人為疾患 複習講義","html":"<p><b>創傷與壓力相關：</b><b>PTSD</b>=創傷後出現再經驗(惡夢/flashback)+逃避+負向認知情緒+過度警覺、症狀>1個月；<b>急性壓力疾患(ASD)</b>=創傷後3天–1個月、含解離症狀、>1個月改診斷PTSD；適應障礙=對壓力源的適應不良。PTSD神經影像:杏仁核過度活化/結構改變、海馬縮小、HPA軸失調；治療=SSRI+創傷焦點CBT/暴露/EMDR。</p>\n<p><b>解離症：</b>意識/記憶/身分整合斷裂；解離性失憶(壓力後無法回憶創傷、意識清楚)、解離性漫遊(離家忘身分)、解離性身分。</p>\n<p><b>身體症狀與相關：</b><b>轉化症</b>=神經功能症狀(癱瘓/視盲/不語/假性癲癇)無法以神經病解釋、非刻意、常見戲劇型人格、可被暗示/lorazepam緩解、不應告知病人是想像的；身體症狀障礙症;罹病焦慮症(慮病、常共病憂鬱焦慮、慢性)。<b>人為障礙(factitious)</b>=刻意製造症狀、<b>無外在利益、為扮病人角色</b>(對他人施加=代理孟喬森,屬虐待須通報)；<b>詐病(malingering)</b>=刻意+<b>有明確外在動機</b>(逃兵役/法律、求償),非精神疾病。性別不安=性別與指定性別不一致≥6個月、不需先排除intersex、APA反對扭轉治療。</p>"},"酒精使用疾患":{"title":"酒精使用疾患 複習講義","html":"<p><b>酒精戒斷時序(交感過度活化)：</b>①<b>震顫/自律亢進</b>(6–24h,心跳加快非變慢)②<b>戒斷癲癇</b>(多2天內、全身大發作)③<b>酒精性幻覺症</b>(12–48h、聽幻覺為主、意識清楚)④<b>震顫性譫妄DT</b>(48–96h、意識混亂+定向喪失+幻覺+自律風暴,醫療急症、未治療死亡率5–20%)。典型順序:手抖→幻覺→抽搐→譫妄。</p>\n<p><b>治療：</b>首選<b>benzodiazepine</b>(lorazepam/diazepam,依CIWA-Ar)、補<b>thiamine</b>(B1)、矯正鎂鉀與水分；<b>避免單用抗精神病藥</b>(降癲癇閾值)；肝硬化選lorazepam/oxazepam。酒精降低REM與深睡、戒斷初期失眠激躁非嗜睡。disulfiram抑制aldehyde dehydrogenase(乙醛堆積厭惡反應)。</p>\n<p><b>Wernicke-Korsakoff(thiamine缺乏)：</b>Wernicke三徵=<b>意識混亂+眼肌麻痺/眼震+運動失調</b>,急症須<b>立即大劑量靜脈thiamine(且應在給葡萄糖之前/同時)</b>；Korsakoff=慢性後遺(乳頭體/丘腦受損)、嚴重順行性記憶喪失+虛談(confabulation)、多不可逆(約20%恢復)。酒精性斷片(blackout)=順行性失憶、長期記憶不受損。</p>"},"其他物質使用疾患與成癮":{"title":"其他物質使用疾患與成癮 複習講義","html":"<p><b>鴉片(opioid)：</b>中毒三聯=<b>針尖瞳孔+意識下降+呼吸抑制(致死)</b>、低體溫，解毒劑naloxone(可鼻噴、半衰期短需重複)。戒斷(非致命但極不適)=流淚流涕、瞳孔放大、雞皮疙瘩、肌痛腹瀉、自律亢進(藍斑核NE活性↑)。替代/維持:methadone(長效口服每日一次、降針具共用、本身會依賴)、buprenorphine、naltrexone。</p>\n<p><b>刺激劑(安非他命/古柯鹼/methylphenidate；ketamine非刺激劑)：</b>促釋放+阻斷再回收<b>多巴胺與正腎上腺素</b>。中毒=亢進(瞳孔放大、高血壓心搏快、高體溫、躁動、妄想)+精神病(似妄想型思覺失調、聽幻覺為主、觸幻覺formication)。<b>戒斷(crash)=疲倦嗜睡、憂鬱(可自殺)、過食、生動惡夢</b>(非自律亢進)。</p>\n<p><b>其他：</b>鎮靜安眠/BZD=GABA-A、巴比妥過量致呼吸抑制死亡、短效高效價(alprazolam)成癮性高、戒斷似酒精(可癲癇譫妄)、不可驟停。大麻=CB1、中毒協調差/結膜充血/食慾增加。<b>幻覺劑(LSD)=5-HT2A、無戒斷</b>。Ketamine=NMDA拮抗、解離、可誘發精神病。吸入劑(甲苯)=似CNS抑制劑、損白質。<b>尼古丁戒斷=心跳減慢、食慾增加</b>；咖啡因戒斷=頭痛。戒菸:藥物(NRT/bupropion/varenicline)+行為團體最佳。</p>"},"譫妄與神經認知障礙":{"title":"譫妄與神經認知障礙 複習講義","html":"<p><b>譫妄(delirium)：</b>核心=<b>急性、波動性的『注意力/意識』障礙</b>+認知改變；急性發作(數小時–天)、夜間加重(sundowning)、病程數天至數週、<b>與身體疾病密切相關</b>(感染/缺氧/電解質/藥物/戒斷/術後)、為預後不佳指標(3個月死亡率20–30%)。EEG典型=<b>瀰漫性慢波</b>。前置因子(易感):高齡、原有失智、感官缺損、多重用藥；誘發因子(急性):手術、感染、抗膽鹼/鎮靜藥、尿管/約束、ICU。</p>\n<p><b>治療：</b><b>首要=找並矯正潛在病因</b>；非藥物(定向提示時鐘/家人照片、改善睡眠、減少約束、避免長時間約束)；嚴重激動/精神症狀用<b>低劑量haloperidol短期</b>；<b>BZD一般非首選(會加重譫妄,除非酒精/BZD戒斷型)</b>。引起老人譫妄藥:抗膽鹼(atropine)、meperidine、BZD;haloperidol反而最不致譫妄。</p>\n<p><b>神經認知障礙(DSM-5 NCD)：</b>六大認知範疇=複雜注意力、執行功能、學習記憶、語言、知覺-動作、社會認知(<b>定向感非獨立範疇</b>;praxis屬知覺-動作)。輕型(mild)不干擾日常獨立、重型(major=失智)干擾獨立。譫妄vs失智:譫妄急性波動注意力障礙意識混濁;失智慢性進行意識清楚記憶為主。(純退化性失智診斷歸神經科)</p>"},"睡眠障礙":{"title":"睡眠障礙 複習講義","html":"<p><b>正常睡眠結構：</b>一晚<b>3–5個週期</b>(每週期約90–110分鐘)、交替NREM(N1→N2→N3深睡/慢波)與REM；入睡正常<20分鐘；深睡(N3)約20–25%集中前半夜；REM(做夢、肌肉失張)約20–25%後半夜增多。<b>NREM異睡症(夢遊、睡眠驚恐)=前半夜深睡N3、事後無記憶</b>；惡夢(nightmare)/REM行為障礙=後半夜REM、可回憶。</p>\n<p><b>睡眠衛生與失眠：</b>固定起床/就寢、白天減少臥床補眠、睡前避咖啡因/酒精/大餐/激烈運動/螢幕、睡不著離床不看鐘；<b>不需強求睡滿7–8小時(個別化)</b>。失眠症=每週≥3次≥3個月且影響功能；<b>第一線=CBT-I與睡眠衛生</b>，藥物短期(≤2–4週)輔助、最低有效劑量；<b>處方安眠藥前須排除OSA</b>(鎮靜劑惡化OSA)。</p>\n<p><b>藥物與節律：</b>BZD/z-drug(zolpidem)作用GABA-A;z-drug肌鬆弱但仍有耐受/依賴/睡眠自動行為;短效成癮性高、長期BZD須緩慢減量(驟停可癲癇)。生理時鐘中樞=視交叉上核(SCN)、free-running週期約24.2小時;老年睡眠相前移(早睡早醒)、青少年延遲型(清晨亮光治療,晚上照光最不適)。(narcolepsy/RLS/OSA/RBD歸神經/胸腔)</p>"},"飲食疾患":{"title":"飲食疾患 複習講義","html":"<p><b>神經性厭食症(AN)：</b>限制進食致顯著低體重、<b>強烈怕胖、身體心像障礙</b>(消瘦仍覺胖);女性遠多於男性、好發青少年;為精神疾病<b>死亡率最高之一</b>(心律不整猝死)。生理併發症:無月經(DSM-IV曾為要件、<b>DSM-5已移除</b>)、低體溫、心搏過緩、低血壓、低血糖、高膽固醇、貧血、骨鬆、白血球低、腦萎縮腦室擴大、催吐者<b>低血鉀</b>。治療=營養復健(注意refeeding syndrome低磷)+心理治療、藥物效果有限。</p>\n<p><b>暴食症(BN)與嗜食症(BED)：</b>BN=反覆暴食+代償行為(催吐/瀉劑/過度運動)、體重多正常、<b>自我評價過度受身材體重影響</b>、ipecac(emetine)催吐致心臟與骨骼肌病變;BED=暴食但<b>無代償行為、無強烈瘦身渴望、體重常過重</b>。BN/BED治療=SSRI(fluoxetine,BN唯一FDA核准)+CBT。</p>"},"人格障礙症":{"title":"人格障礙症 複習講義","html":"<p><b>總論：</b>人格障礙=持久僵化、偏離文化期待、廣泛跨情境、造成痛苦/功能損害的內在經驗與行為模式；<b>青少年/成年早期起、長期穩定</b>(非突發、非中老年才發生);常共病物質濫用、憂鬱、焦慮。</p>\n<p><b>三大群：</b><b>A群(古怪/疏離)</b>=妄想型、類分裂型、思覺失調型；<b>B群(戲劇/情緒化/善變)</b>=反社會、邊緣、戲劇、自戀；<b>C群(焦慮/害怕)</b>=畏避、依賴、強迫型(OCPD)。反社會型(B群)合併高比率物質濫用、由早發conduct disorder發展而來(須≥18歲才能診斷)。</p>\n<p><b>邊緣型(BPD)：</b>情緒/人際/自我形象不穩、空虛感、被遺棄恐懼、衝動(花錢/性/物質/暴食/飆車)、<b>反覆自傷與作態性自殺</b>、壓力下短暫精神病/解離、理想化-貶抑兩極化;女性較多;<b>辯證行為治療(DBT)實證有效(尤降自傷)</b>、心理治療為主藥物為輔、避免BZD(去抑制/依賴/增衝動)。</p>"},"神經發展與兒童青少年精神疾患":{"title":"神經發展與兒童青少年精神疾患 複習講義","html":"<p><b>ADHD：</b>核心=注意力不集中+過動+衝動；DSM-5需若干症狀<b>12歲前(DSM-IV為7歲前)</b>出現、<b>≥2種情境</b>、致功能損害,須與廣泛發展障礙/思覺失調/情緒焦慮/解離/人格疾患鑑別;男童多;約半數延續成年(過動隨年齡減輕、注意力不集中持續);自尊常較低。治療:刺激劑(methylphenidate,<b>增加</b>多巴胺/NE)第一線,副作用食慾不振/失眠/頭痛/tic;非興奮劑atomoxetine。</p>\n<p><b>妥瑞氏症：</b>多種運動抽搐+≥1聲音抽搐、病程>1年、<b>起病18歲前</b>、一日多次起伏、男多於女、與OCD/ADHD高度共病、多於18–20歲後改善;非全需藥物,需要時α2致效劑(clonidine)或低劑量抗精神病藥;『提醒病人別發聲』無益反增壓力。</p>\n<p><b>智能障礙與自閉症：</b>智能障礙=IQ約<70(−2SD)+適應缺損、<b>輕度最常見(約85%)</b>、約半數~2/3可找病因(fragile X是最常見遺傳性病因)。<b>ASD(DSM-5整合)</b>=社交溝通缺損+侷限重複行為;DSM-IV時代:典型自閉伴語言/認知遲緩且常合併智障,<b>亞斯柏格語言/認知大致正常</b>(此為鑑別);約20–30%癲癇、抗精神病藥只改善易怒攻擊非核心、預後好指標=5–7歲有溝通語言且IQ>70。</p>"},"精神藥理學與身體治療":{"title":"精神藥理學與身體治療 複習講義","html":"<p><b>抗精神病藥與EPS：</b>D2拮抗(尤第一代/高效價如haloperidol)→錐體外症候群:①<b>急性肌張力不全</b>(數小時–天、眼球上吊/斜頸/軀幹扭轉、喉部可致呼吸困難、年輕男性高危→<b>抗膽鹼藥benztropine/diphenhydramine肌注</b>)②<b>靜坐不能akathisia</b>(坐立不安→<b>β-blocker propranolol</b>)③藥物性巴金森症④<b>遲發性運動異常TD</b>(長期、難可逆→換二代/停藥)。受體對應副作用:α阻斷=姿勢性低血壓;M(膽鹼)阻斷=口乾便秘尿滯留;H1阻斷=鎮靜增重;D2(漏斗)=泌乳素↑。<b>NMS</b>=高燒+肌僵直+自律不穩+意識改變+CK↑→停藥+dantrolene。</p>\n<p><b>第二代(SDA)：</b>EPS少但代謝副作用多;olanzapine/clozapine代謝風險最高、<b>ziprasidone/aripiprazole最低</b>;aripiprazole是D2部分作用劑;clozapine用於治療阻抗型(需監測ANC白血球、非血中濃度);長效針劑改善順從(常用2週–3個月效期)。</p>\n<p><b>其他藥理：</b>抗憂鬱劑分類:SSRI(fluoxetine/sertraline/paroxetine)、SNRI、bupropion(NDRI,非SSRI、戒菸、不損性功能)、TCA、MAOI;SSRI副作用=噁心/性功能障礙/失眠/低血鈉/出血;<b>血清素症候群</b>=高燒+反射亢進/肌陣攣+譫妄+腹瀉(非便秘)→停藥+cyproheptadine。需測血中濃度=lithium/valproate/carbamazepine。急性躁動肌注:haloperidol/lorazepam(diazepam肌注吸收差不宜)。ECT=最快最強,用於嚴重/精神病性/自殺/拒食/緊張型/孕婦。</p>"},"自殺防治、精神衛生法規與司法精神醫學":{"title":"自殺防治、精神衛生法規與司法精神醫學 複習講義","html":"<p><b>自殺流行病學：</b><b>企圖女性多、死亡男性多</b>(男性用激烈手段);自殺死亡率<b>隨年齡上升、老年(>65歲男性)最高</b>;高危精神疾病=憂鬱/雙相/思覺失調/酒癮物質/焦慮/人格;自殺死亡者>90%有精神疾病。高風險因子:嚴重憂鬱、<b>無望感</b>、合併精神病、<b>過去自殺企圖史(最強預測)</b>、明確計畫與致命手段、男性高齡獨居、社會支持差、物質濫用;相對低風險:衝動(非計畫)、有支持、低致命手段。神經生物=中樞<b>血清素功能低下</b>。處置依風險分層(高→住院,低中→門診加強)、直接詢問自殺意念不會增加自殺。</p>\n<p><b>司法精神醫學與倫理：</b>四原則=尊重自主/不傷害/行善/正義;能力不完全者由家屬代理同意(須符病人最大利益+替代判斷,非醫師逕行);<b>Tarasoff</b>:對特定第三人有明確危險→守密退讓、有保護/警告義務;治療者不宜兼任同一病人的司法鑑定(角色衝突)。</p>\n<p><b>精神衛生法：</b>嚴重病人有自傷/傷人之虞且拒絕住院→經專科醫師診斷與<b>審查會許可</b>強制住院(住院醫師不可逕行);約束/隔離須有醫囑、明確方式時間、定期評估記錄、不可懲罰/長時間;<b>反社會性人格違常被排除於精神疾病(強制治療)範圍</b>;錄影教學須病人同意。</p>"},"精神症狀學與精神狀態檢查":{"title":"精神症狀學與精神狀態檢查 複習講義","html":"<p><b>知覺障礙：</b><b>錯覺(illusion)</b>=對『真實外在刺激』的錯誤知覺(地磚花紋看成蟲);<b>幻覺(hallucination)</b>=『無外在刺激』卻有知覺;假性幻覺=發生於內在主觀空間且知非真實;古柯鹼/安非他命可致觸幻覺(formication蟲爬感)。評估須注意幻覺發生情境(助鑑別)。</p>\n<p><b>思考障礙：</b>『形式/流程』=意念飛躍、聯結鬆弛、新語症(neologism)、思考停頓(blocking)、答非所問;『內容』=妄想(被害、關係referential、誇大grandeur、嫉妒、虛無nihilistic、被控制、<b>思考插入insertion/抽離withdrawal/廣播</b>)。自閉性思考=自我中心、脫離現實、不顧客觀。虛談(confabulation)=記憶障礙。</p>\n<p><b>MSE其他：</b>抽象思考=解釋成語引申義(『遇火災怎麼辦』是判斷力judgment非抽象思考);衝動評估(人格疾患『會』有衝動控制不佳)。<b>防衛機轉：</b>投射(projection,『以小人之心度君子之腹』)、否認、合理化、隔離/情感抽離、幻想、解離、昇華、退化。心理治療良好預後指標:有動機、能建立關係、有洞察力、足夠自我強度。</p>"},"心理治療、會診聯繫與身心醫學":{"title":"心理治療、會診聯繫與身心醫學 複習講義","html":"<p><b>身體疾病致精神症狀：</b>甲狀腺亢進→焦慮/躁/視幻覺/被害意念/譫妄/<b>認知障礙</b>(甲亢甲低均可致認知障礙);甲狀腺低下→憂鬱/認知障礙/<b>難治型憂鬱</b>(補甲狀腺素治本,非高劑量抗精神病藥);低血糖→焦慮/意識混亂;類固醇/移植→情緒障礙;頭部外傷→注意/記憶/人格改變(用藥<b>低劑量起始緩慢加量</b>,因對副作用敏感)。</p>\n<p><b>心身與功能性疾患：</b>A型行為(敵意為核心)→交感活化→冠心病風險,心理介入可降再梗塞死亡;壓力(含正向生活事件)致神經/內分泌/免疫失調;<b>功能性腸胃道疾患(FGID)</b>常合併精神疾病、<b>焦慮為最常見共病</b>、心理因素影響嚴重度,治療用TCA/SSRI+心理治療(非長期精神分析)。移植/手術心理併發症=適應障礙/憂鬱/譫妄(PTSD較少、妄想症最不會)。</p>\n<p><b>會診與治療原則：</b>照會精神醫學評估拒絕治療者重在『<b>評估決定能力</b>、了解拒絕原委』(告知手術必要性是外科職責);<b>生理回饋(biofeedback)基於操作制約</b>,用於緊張性頭痛/高血壓/氣喘/心律不整等自律相關身心症,對思覺失調/ADHD效果有限;病因分析架構=生物-心理-社會×前置/誘發/延續;心理治療須維持專業界限(避免雙重關係/金錢往來/不當自我揭露)。正常老化:腦重減、腦室寬、神經質特質相對穩定。</p>"}};

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=(q.answer_status&&q.answer_status.indexOf('送分')>=0)?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">直接看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📘 '+esc(l.title)+'</h3>'+l.html+'</div>';}
const TOTAL=Q.length, KEY='med_psy_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){
 const p=PROG[qEl.dataset.id]; if(!p)return;
 fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));
}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
