適切。", "D": "錯誤（本題答案）。鈣化指數非所有有症狀病人最合適工具。"}, "sources": ["2021 ACC/AHA Chest Pain Guideline"]}}, "113070-09": {"quick": "貓抓病（Bartonella）最不可能造成房室傳導阻斷，故選D。", "detail": {"background": "房室傳導阻斷常見原因：心肌梗塞（尤其下壁/RCA）、藥物、退化性傳導系統疾病、頸動脈竇過敏、感染性（如萊姆病心臟炎、感染性心內膜炎合併膿瘍）等。貓抓病主要造成局部淋巴結腫大，少數為心內膜炎，並非典型房室阻斷原因。", "options": {"A": "頸動脈竇過敏可致心搏停頓/房室阻斷。", "B": "萊姆病心臟炎可致房室阻斷。", "C": "心肌梗塞可致房室阻斷。", "D": "最不可能（本題答案）。貓抓病非典型房室阻斷原因。"}, "sources": ["2018 ACC/AHA/HRS Bradycardia Guideline"]}}, "113070-10": {"quick": "修補過的法洛氏四合症出現LBBB型態的單型性心室頻脈，最可能起源於『右心室』（右室流出道疤痕），故選B。", "detail": {"background": "心室頻脈的QRS型態可推斷起源：LBBB型態（V1主要向下）多源自右心室或室間隔；RBBB型態多源自左心室。修補過的法洛氏四合症常因右室流出道切口/補片疤痕形成折返環，產生LBBB型態之單型性VT，為其晚期猝死重要原因。", "options": {"A": "右心房為室上性，非心室頻脈來源。", "B": "正確（本題答案）。LBBB型態VT源自右心室（RVOT疤痕）。", "C": "左心房為室上性。", "D": "左心室來源多呈RBBB型態。"}, "sources": ["2017 AHA/ACC/HRS Ventricular Arrhythmia Guideline；成人先天性心臟病"]}}, "113070-11": {"quick": "二瓣性主動脈瓣相關的主動脈病變主要發生在『升主動脈/主動脈根部』，不是主動脈弓，故A錯誤。", "detail": {"background": "二瓣性主動脈瓣常合併主動脈病變（擴大/動脈瘤），主要位於主動脈根部與『升主動脈』，需追蹤其擴大。成人主動脈瓣狹窄主要為退化性鈣化，且與傳統動脈硬化危險因子相關；人口老化使感染性心內膜炎發生率上升。", "options": {"A": "錯誤（本題答案）。BAV相關主動脈病變主要在升主動脈，非主動脈弓。", "B": "正確。人口老化使IE發生率上升。", "C": "正確。成人AS主要為退化性鈣化。", "D": "正確。動脈硬化危險因子常合併於鈣化性AS。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline；2022 ACC/AHA Aortic Disease"]}}, "113070-12": {"quick": "心包積液一旦造成心包填塞，應緊急施行心包腔穿刺引流，敘述正確，故選D。", "detail": {"background": "心包填塞為急症，確認後應緊急心包腔穿刺引流以解除心臟壓迫。Beck三徵為低血壓、『心音遙遠』、頸靜脈怒張（非摩擦音）；懷疑心包積液優先以『心臟超音波』評估（非胸部X光）；限制型心肌病變屬心肌疾病，與束縮性心包炎是須鑑別的兩種不同病灶（並非經常合併）。", "options": {"A": "錯誤。Beck三徵為低血壓、心音遙遠、頸靜脈怒張，非摩擦音。", "B": "錯誤。優先工具為心臟超音波，非胸部X光。", "C": "錯誤。限制型心肌病變與束縮性心包炎為須鑑別的不同疾病。", "D": "正確（本題答案）。心包填塞應緊急心包腔穿刺。"}, "sources": ["2015 ESC Pericardial Diseases Guideline"]}}, "113070-13": {"quick": "HFpEF與HFrEF的藥物試驗效果『並不相同』——多數在HFrEF有效的藥物於HFpEF未顯示同等效益，故D錯誤。", "detail": {"background": "心衰竭病因含冠狀動脈疾病、長期高血壓等，且有家族群聚傾向。HFpEF與HFrEF病因雖有重疊，但藥物治療反應不同：HFrEF有明確改善預後的GDMT，HFpEF多數試驗為中性（近年SGLT2抑制劑為少數顯示效益者）。故「兩者藥物效果相同」不正確。", "options": {"A": "正確。冠狀動脈疾病為重要原因。", "B": "正確。心衰竭有家族群聚效應。", "C": "正確。長期嚴重高血壓可致心衰竭。", "D": "錯誤（本題答案）。HFpEF與HFrEF藥物試驗效果不相同。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "113070-14": {"quick": "SPECT在『多支血管/平衡性缺血』時可能低估，並非比冠狀動脈CT造影更敏感，故D錯誤。", "detail": {"background": "壓力核醫心肌灌注SPECT用於評估冠心病：可逆缺損＝缺血、固定缺損＝陳舊性梗塞。但在三支/左主幹的『平衡性』缺血時，因各區相對比較，SPECT可能低估病灶範圍；冠狀動脈CT造影對解剖（含多支病灶）敏感度高。故「SPECT比CTA更敏感、尤其多支病」不正確。", "options": {"A": "正確。壓力SPECT常用於冠心病評估。", "B": "正確。可逆缺損暗示缺血。", "C": "正確。固定缺損反映陳舊性梗塞。", "D": "錯誤（本題答案）。多支病時SPECT可能低估，非比CTA更敏感。"}, "sources": ["2021 ACC/AHA Chest Pain Guideline"]}}, "113070-46": {"quick": "呼吸困難、胸痛合併『單側（右）』下肢水腫，提示深部靜脈栓塞引發肺栓塞，故選B。", "detail": {"background": "單側下肢水腫高度提示深部靜脈栓塞（DVT），若合併突發呼吸困難與胸痛，最可能為肺栓塞。心衰竭多為『雙側』對稱水腫；氣胸與COPD不會造成單側下肢水腫。", "options": {"A": "心衰竭多為雙側下肢水腫。", "B": "正確（本題答案）。單側腿腫＋喘＋胸痛＝DVT/肺栓塞。", "C": "氣胸不造成下肢水腫。", "D": "COPD不造成單側下肢水腫。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline"]}}, "113070-78": {"quick": "在所列『降血糖』藥物中，磺醯尿素類（sulfonylureas，如glipizide）最常造成低血糖；本題題幹誤植為降血壓藥，已公布一律給分（送分）。", "detail": {"background": "磺醯尿素類（glipizide、glyburide等）促進胰島素分泌，是口服降血糖藥中最易造成低血糖者，尤其老年與腎功能不全者。Metformin、pioglitazone、acarbose單用低血糖風險低。本題題幹寫成『降血壓藥物』但選項皆為降血糖藥，屬題目瑕疵，考選部公布一律給分。", "options": {"A": "Metformin單用低血糖風險低。", "B": "Pioglitazone單用低血糖風險低。", "C": "在降血糖藥中最易低血糖（本題送分）。", "D": "Acarbose單用低血糖風險低。"}, "sources": ["ADA Standards of Care；考選部更正公告（本題送分）"]}}, "114020-05": {"quick": "主動脈剝離的危險度主要看是否侵犯『升主動脈』；前胸撕裂痛多提示升主動脈（Stanford A，較危險），故「後背痛比前胸痛更危險」最不適當，選A。", "detail": {"background": "急性主動脈剝離依是否侵犯升主動脈分Stanford A（含升主動脈，最危險、需急開刀）與B（僅降主動脈）。前胸撕裂痛多指向升主動脈，背部/肩胛間痛多指向降主動脈。剝離可造成分支阻塞（單側脈搏消失）、向近端延伸侵犯冠狀動脈口（合併心肌梗塞）或破入心包（心包填塞、頸靜脈怒張）。", "options": {"A": "最不適當（本題答案）。前胸（升主動脈）痛通常更危險，非後背痛更危險。", "B": "正確。可有上肢單側脈搏消失。", "C": "正確。頸靜脈怒張需考慮心包填塞。", "D": "正確。可合併急性心肌梗塞。"}, "sources": ["2022 ACC/AHA Aortic Disease Guideline"]}}, "114020-07": {"quick": "無症狀的冠狀動脈繞道術後病人，5年內常規心肌灌流造影並非必要，故A錯誤。", "detail": {"background": "對無症狀的血管重建（CABG或PCI）術後病人，不建議常規例行壓力影像追蹤；應依症狀復發再評估。有症狀者可用核醫心肌灌流評估是否再狹窄/缺血；PCI術後早期可能觀察到輕微可逆性灌流缺損。", "options": {"A": "錯誤（本題答案）。無症狀CABG後常規MPI並非必要。", "B": "正確。無症狀PCI後2年內常規MPI非必要。", "C": "正確。有症狀者可用MPI評估缺血。", "D": "正確。PCI後早期可見輕微可逆缺損。"}, "sources": ["2021 ACC/AHA Chest Pain Guideline；ACC Appropriate Use Criteria"]}}, "114020-08": {"quick": "心肌『水腫』在MRI是T2訊號增加（非T1），故D錯誤。", "detail": {"background": "心臟MRI延遲增強（LGE）型態有助鑑別：缺血性（梗塞）由心內膜下開始；擴大型心肌病變多為中層（midwall）斑塊/線狀，常見於basal septum；浸潤/發炎性（如肉瘤病、心肌炎）多為中外層（mid-myocardial/epicardial）。心肌水腫以T2加權訊號增加表現，與LGE代表不同組織變化與疾病時期。", "options": {"A": "正確。中外層LGE提示浸潤性疾病（如sarcoidosis）。", "B": "正確。DCM的LGE多為midwall、basal septum。", "C": "正確。梗塞LGE由心內膜下開始。", "D": "錯誤（本題答案）。心肌水腫為T2訊號增加，非T1。"}, "sources": ["Braunwald's Heart Disease（心臟MRI）"]}}, "114020-09": {"quick": "心臟動作電位主要由鈉、鉀、鈣離子通道調控；鎂離子不直接參與，故選D。", "detail": {"background": "心肌動作電位：Phase 0鈉內流（去極化）、Phase 1短暫鉀外流、Phase 2鈣內流平台、Phase 3鉀外流再極化、Phase 4靜止。鈉、鉀、鈣為直接調控離子；鎂雖影響部分通道功能與心律穩定，但不是直接構成動作電位各相的主要離子。", "options": {"A": "鈉直接參與Phase 0。", "B": "鉀直接參與再極化。", "C": "鈣直接參與Phase 2平台。", "D": "不直接參與（本題答案）。鎂非構成動作電位的主要離子。"}, "sources": ["Braunwald's Heart Disease（心臟電生理）"]}}, "114020-10": {"quick": "Digoxin不會延長QT（反而使ST下凹、QT略短）；quinidine、ibutilide、sotalol皆延長QT，故選B。", "detail": {"background": "延長QT的抗心律不整藥：Class IA（quinidine）、Class III（sotalol、ibutilide、amiodarone等鉀通道阻斷）。Digoxin的心電圖特徵為ST段下凹（撈匙狀）、T波變化、PR延長，但QT不延長（甚至縮短）。", "options": {"A": "Quinidine（IA）延長QT。", "B": "不延長（本題答案）。Digoxin不延長QT。", "C": "Ibutilide（III）延長QT。", "D": "Sotalol（III）延長QT。"}, "sources": ["Braunwald's Heart Disease（抗心律不整藥與QT）"]}}, "114020-11": {"quick": "合併結構性心臟病的心室頻脈屬後天性，不是遺傳性心律不整症候群，故選D。", "detail": {"background": "遺傳性（離子通道病）心律不整症候群包括長QT症候群、Brugada症候群、兒茶酚胺敏感性多型性室性心搏過速（CPVT）、短QT症候群等，多為單基因離子通道異常、心臟結構正常。合併結構性心臟病（如梗塞疤痕、心肌病變）的VT為後天性、與結構異常相關，非遺傳性症候群。", "options": {"A": "長QT症候群為遺傳性。", "B": "Brugada症候群為遺傳性。", "C": "CPVT為遺傳性。", "D": "不是（本題答案）。結構性心臟病之VT為後天性。"}, "sources": ["2017 AHA/ACC/HRS Ventricular Arrhythmia/SCD Guideline"]}}, "114020-12": {"quick": "HFpEF常見於有多年高血壓病史的老年人，故選C。", "detail": {"background": "HFpEF（射出分率保留之心衰竭，EF≥50%）以左心室舒張功能障礙為主，常見於老年、長期高血壓（左心室肥厚/僵硬）、肥胖、糖尿病、心房顫動者。急性心肌梗塞、病毒性心肌炎急性期多造成收縮功能下降（偏HFrEF）；甲狀腺亢進為高輸出狀態。", "options": {"A": "急性MI急性期多為收縮功能下降。", "B": "甲亢早期為高輸出狀態。", "C": "正確（本題答案）。老年、多年高血壓者常見HFpEF。", "D": "病毒性心肌炎急性期多為收縮功能下降。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "114020-13": {"quick": "心房顫動持續≥48小時或時間不明者，電擊復律前須先抗凝（或經食道超音波排除血栓），不論CHA2DS2-VASc高低，故D錯誤。", "detail": {"background": "AF在老年盛行率高（≥80歲約10%），危險因子含高血壓、糖尿病、心臟病、肥胖、睡眠呼吸中止；AF使中風風險約增5倍、約占四分之一缺血性中風。AF持續≥48小時或時間不明者，因左心房可能已形成血栓，復律（電擊或藥物）前須先抗凝3週或經食道超音波排除血栓，並復律後續抗凝，不可僅憑低CHA2DS2-VASc即未抗凝直接電擊。", "options": {"A": "正確。≥80歲AF約10%。", "B": "正確。危險因子描述正確。", "C": "正確。AF使中風風險約增5倍、占約25%。", "D": "錯誤（本題答案）。≥48小時/時間不明者復律前須先抗凝或TEE排除血栓。"}, "sources": ["2023 ACC/AHA AF Guideline；2024 ESC AF Guideline"]}}, "114020-14": {"quick": "Framingham研究中與HF風險增加相關的是『貧血/低血紅素』等，而非『總血紅蛋白濃度升高』，故D錯誤。", "detail": {"background": "心衰竭風險與多項因子相關：SGLT2抑制劑降低糖尿病人HF風險；較高身體活動量降低HF風險；吸菸為HF危險因子。Framingham研究確立的HF危險因子包含高血壓、心肌梗塞病史、左心室肥厚、糖尿病、瓣膜病等；『血紅素升高』並非HF危險因子（反而貧血與HF相關）。", "options": {"A": "正確。SGLT2抑制劑降低HF風險。", "B": "正確。較高活動量降低HF風險。", "C": "正確。吸菸為HF危險因子。", "D": "錯誤（本題答案）。『總血紅蛋白升高』非HF危險因子（貧血才相關）。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline；Framingham Heart Study"]}}, "114020-51": {"quick": "病毒性心肌炎造成的是『心因性休克』（周邊血管阻抗『升高』），其餘三者皆為分布性休克（SVR下降），故選B。", "detail": {"background": "休克分類與周邊血管阻抗（SVR）：心因性休克（如心肌炎致心輸出下降）SVR代償性『升高』；分布性休克（過敏性、神經性、敗血性）因血管擴張而SVR『下降』。本題A過敏、C脊髓損傷（神經性）、D敗血皆為分布性（SVR↓），B心肌炎為心因性（SVR↑），方向不同。", "options": {"A": "過敏性休克→分布性，SVR下降。", "B": "不同（本題答案）。心肌炎→心因性休克，SVR升高。", "C": "神經性休克→SVR下降。", "D": "敗血性休克→SVR下降。"}, "sources": ["Harrison's Principles of Internal Medicine（休克分類）"]}}, "114020-65": {"quick": "先天性心臟病『完整修復6個月以後』（無殘留缺損）不再需要牙科預防性抗生素，故選C。", "detail": {"background": "需心內膜炎預防的最高風險族群：人工瓣膜/修補材料、曾患感染性心內膜炎、未修復之發紺性先天性心臟病、以及使用人工材料修復先天性心臟病後的『前6個月』。完整修復且無殘留缺損滿6個月後，內皮化完成，不再需要預防性抗生素。", "options": {"A": "人工瓣膜需預防。", "B": "曾患心內膜炎需預防。", "C": "最不需要（本題答案）。完整修復6個月後不需預防。", "D": "未修復發紺性先天性心臟病需預防。"}, "sources": ["2007 AHA Infective Endocarditis Prophylaxis Guideline；2020 ACC/AHA VHD"]}}, "114070-20": {"quick": "DeBakey IIIa與IIIb的最大區別在於是否延伸侵犯『腹主動脈』，故選D。", "detail": {"background": "DeBakey分型：I型起自升主動脈延伸至降主動脈以下；II型局限升主動脈；III型起自降主動脈。IIIa局限於『胸』降主動脈（橫膈以上），IIIb則向下延伸侵犯橫膈以下之『腹主動脈』。故兩者差別在腹主動脈是否受侵犯。", "options": {"A": "升主動脈為I/II型相關。", "B": "主動脈弓非IIIa/IIIb區別重點。", "C": "兩者皆涉及降主動脈。", "D": "正確（本題答案）。差別在是否延伸至腹主動脈。"}, "sources": ["2022 ACC/AHA Aortic Disease Guideline（DeBakey分型）"]}}, "114070-21": {"quick": "橫紋肌溶解時打通血管後，肌球蛋白尿會因再灌流而『加重』，不會立即緩解，故C錯誤。", "detail": {"background": "二尖瓣狹窄合併心房顫動易在左心房形成血栓，脫落造成周邊動脈栓塞（急性肢體缺血：冰冷、無脈、疼痛、感覺異常、蒼白、麻痺）。再灌流後缺血肢體釋出鉀離子（高血鉀）、肌球蛋白（肌球蛋白尿/橫紋肌溶解加重）、並出現再灌流腫脹（缺血時間越久越嚴重，可致腔室症候群）。", "options": {"A": "正確。MS+AF最可能為動脈栓塞。", "B": "正確。再灌流後血鉀可能上升。", "C": "錯誤（本題答案）。再灌流後肌球蛋白尿會加重，非立即緩解。", "D": "正確。缺血越久再灌流腫脹越厲害。"}, "sources": ["Harrison's Principles of Internal Medicine（急性肢體缺血與再灌流）"]}}, "114070-22": {"quick": "法洛氏四合症的缺氧發作（tet spell）應提升體循環阻力、減少右到左分流；給『血管擴張劑』會降低SVR、惡化發紺，最不合適，選C。", "detail": {"background": "法洛氏四合症缺氧發作處置：膝胸位、給氧、輸液、鎮靜止痛（morphine）、β阻斷劑（propranolol，鬆弛右室流出道痙攣、減慢心率）、必要時用升壓劑（phenylephrine）提升體循環阻力以減少右到左分流。血管擴張劑會降低體循環阻力、增加右到左分流而惡化發紺，屬禁忌。", "options": {"A": "合適。β阻斷劑可緩解流出道痙攣。", "B": "合適。輸液增加前負荷與肺血流。", "C": "最不合適（本題答案）。血管擴張劑降SVR、惡化右到左分流。", "D": "合適。鎮靜可中斷發作循環。"}, "sources": ["Braunwald's Heart Disease（法洛氏四合症缺氧發作）"]}}, "114070-23": {"quick": "血管內支架（TEVAR）主要用於『降』胸主動脈，升主動脈瘤仍以開心手術為主流，故D錯誤。", "detail": {"background": "胸主動脈瘤：二瓣性主動脈瓣為升主動脈瘤高危群；女性最大徑達約5.0–5.5 cm（題述7 cm更明確）即建議手術；升主動脈瘤合併瓣膜可考慮保留瓣膜術式。血管內支架治療（TEVAR）適用於『降』胸主動脈，升主動脈瘤因鄰近主動脈瓣、冠狀動脈口與弓部分支，仍以開放手術為主流。", "options": {"A": "正確。二瓣性主動脈瓣為升主動脈瘤高危群。", "B": "正確。女性7 cm可建議手術。", "C": "正確。可考慮保留瓣膜術式。", "D": "錯誤（本題答案）。TEVAR用於降主動脈，升主動脈瘤非以支架為主流。"}, "sources": ["2022 ACC/AHA Aortic Disease Guideline"]}}, "114070-24": {"quick": "以住院手術存活率而言，傳統開腹置換手術的圍術期死亡率較高（存活率較低），敘述正確，故選C。", "detail": {"background": "腹主動脈瘤：無症狀者一般直徑≥5.5 cm（或快速增大/有症狀）才建議修補。血管內支架（EVAR）短期/圍術期死亡率較開腹手術低，但長期再介入率較『高』。手術時下腸繫膜動脈視側枝循環情況決定是否再吻合，並非一律。", "options": {"A": "錯誤。手術門檻一般為≥5.5 cm，非4 cm。", "B": "錯誤。EVAR再介入率較開腹手術『高』。", "C": "正確（本題答案）。開腹手術圍術期存活率較EVAR低。", "D": "錯誤。下腸繫膜動脈非一律須再吻合。"}, "sources": ["2022 ACC/AHA Aortic Disease Guideline；EVAR vs Open Repair 試驗"]}}, "115020-04": {"quick": "昏厥常見原因為迷走神經性、姿態性低血壓與心因性；「手術性昏厥」並非昏厥分類，最不可能，選D。", "detail": {"background": "昏厥（短暫意識喪失合併自發完全恢復）主要分：反射性（迷走神經性最常見）、姿態性低血壓、心因性（心律不整或結構性心臟病）。『手術相關昏厥』並非標準昏厥分類。", "options": {"A": "迷走神經性昏厥為最常見。", "B": "姿態性低血壓為常見原因。", "C": "心因性昏厥為重要且危險的原因。", "D": "最不可能（本題答案）。『手術性昏厥』非昏厥分類。"}, "sources": ["2017 ACC/AHA/HRS Syncope Guideline"]}}, "115020-06": {"quick": "心導管冠脈造影為診斷工具；對『穩定性心絞痛』而言，血管重建並未減少心肌梗塞與死亡（僅緩解症狀），故D最不適當。", "detail": {"background": "缺血性心臟病診斷工具：運動心電圖（致死風險約萬分之一，無併發症之MI約一週後可謹慎進行）、無法運動者用藥物壓力影像（adenosine/dobutamine）、鈣化分數（Agatston，不需顯影劑）。診斷性心導管雖可確診，但對穩定性心絞痛而言，血管重建相較最佳藥物治療並未降低MI與死亡（COURAGE/ISCHEMIA），僅改善症狀。", "options": {"A": "適當。運動心電圖風險與時機描述合理。", "B": "適當。無法運動者用藥物壓力影像。", "C": "適當。鈣化分數不需顯影劑。", "D": "最不適當（本題答案）。穩定性心絞痛血管重建未減少MI/死亡。"}, "sources": ["2021 ACC/AHA Chest Pain Guideline；ISCHEMIA Trial"]}}, "115020-07": {"quick": "高血壓是中風最強危險因子，但大部分中風是『缺血性（腦梗塞）』，非腦出血，故B錯誤。", "detail": {"background": "高血壓造成器官損傷：心（左心室肥厚、心衰竭、心房顫動）、腦（中風、認知障礙/失智）、腎（與收縮壓關係較密切）。高血壓雖是中風最強危險因子，但整體中風約80%為缺血性（腦梗塞），出血性約20%。", "options": {"A": "正確。可致LVH、心衰竭、心房顫動。", "B": "錯誤（本題答案）。中風大部分為缺血性（腦梗塞），非腦出血。", "C": "正確。與認知障礙/失智相關。", "D": "正確。腎損傷與收縮壓關係較密切。"}, "sources": ["2017 ACC/AHA Hypertension Guideline"]}}, "115020-08": {"quick": "由『重大短暫誘發因子』（如外傷/手術）引起的VTE，停藥後復發風險最低；本題公布C、D均給分。", "detail": {"background": "VTE停止抗凝後復發風險依誘發因素分層：由重大短暫/可逆因子（手術、外傷）引起者復發風險最低（約每年3%）；不明原因（unprovoked）與持續性危險因子（活動性癌症）復發風險最高；長途飛行屬較輕微的短暫因子。故由外傷誘發者復發風險最低（本題D），考選部最終認定C、D均給分。", "options": {"A": "活動性癌症復發風險高。", "B": "長途飛行為較輕微短暫因子。", "C": "不明原因（unprovoked）復發風險高（本題列入給分）。", "D": "外傷（重大短暫誘發因子）復發風險最低（本題答案）。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline；考選部更正公告（本題C、D均給分）"]}}, "115020-09": {"quick": "D-dimer顯著升高（20 mg/L）、心搏過速、呼吸困難併NT-proBNP升高與troponin輕升（右心應變）、肝酵素升高（鬱血），最符合肺動脈栓塞，故選D。", "detail": {"background": "本例呈現急性右心應變圖像：顯著升高的D-dimer、竇性/心律不整性心搏過速、NT-proBNP升高（右室壓力負荷）、troponin輕度升高（右室缺血應變）、ALT升高（肝鬱血），合併雙下肢微腫，最符合急性肺動脈栓塞。急性心肌炎、高血壓心臟病、肥厚性心肌病的生化/臨床型態與此不符。", "options": {"A": "急性心肌炎troponin多明顯升高、D-dimer不會如此高。", "B": "高血壓心臟病不會有如此高的D-dimer與急性右心應變。", "C": "肥厚性心肌病不符合此急性D-dimer升高圖像。", "D": "正確（本題答案）。最符合肺動脈栓塞。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline"]}}, "115020-10": {"quick": "Vaughan Williams第IV類是『非雙氫吡啶』鈣阻斷劑（verapamil/diltiazem）；amlodipine（雙氫吡啶）非抗心律不整藥，故D錯誤。", "detail": {"background": "Vaughan Williams分類：I類鈉通道阻斷（flecainide等）、II類β阻斷劑（bisoprolol）、III類鉀通道阻斷（amiodarone、sotalol）、IV類非雙氫吡啶鈣阻斷劑（verapamil、diltiazem，作用於房室結）。Amlodipine屬雙氫吡啶類，主要作用於血管，不具抗心律不整作用。", "options": {"A": "正確。Class I為鈉通道（flecainide）。", "B": "正確。Class II為β受體（bisoprolol）。", "C": "正確。Class III為鉀通道（amiodarone）。", "D": "錯誤（本題答案）。Class IV為verapamil/diltiazem，非amlodipine。"}, "sources": ["Braunwald's Heart Disease（Vaughan Williams分類）"]}}, "115020-11": {"quick": "多源性心房頻脈（MAT）的血栓風險目前『缺乏大型臨床試驗證實』，故選B。", "detail": {"background": "MAT常見於慢性肺病、低血氧、電解質異常者，心電圖有≥3種型態P波、心率>100。其處置以治療潛在疾病為主。MAT的血栓栓塞風險與是否需抗凝，目前缺乏如心房顫動般的大型試驗證據，不應直接套用AF的抗凝建議，也非與心室顫動相同或一律立即抗凝。", "options": {"A": "不適當。不應直接視同AF。", "B": "正確（本題答案）。MAT血栓風險缺乏大型試驗證實。", "C": "不適當。與心室顫動不同。", "D": "不適當。非一律立即抗凝。"}, "sources": ["Braunwald's Heart Disease（多源性心房頻脈）"]}}, "115020-12": {"quick": "探索高血壓致病機轉常查腎功能（肌酸酐）、鉀離子（醛固酮）、甲狀腺素；尿酸與其致病機轉關係最低，故選D。", "detail": {"background": "高血壓初步評估與次發病因探索常用：肌酸酐（腎性高血壓/腎功能）、鉀離子（原發性醛固酮過多→低血鉀）、甲狀腺素（甲狀腺疾病致高血壓）。尿酸雖與高血壓/心血管風險有相關性，但對『致病機轉的探索』關聯性最低。", "options": {"A": "肌酸酐與腎性高血壓相關。", "B": "鉀離子與醛固酮過多相關。", "C": "甲狀腺素與甲狀腺性高血壓相關。", "D": "最無關（本題答案）。尿酸對致病機轉探索關聯性最低。"}, "sources": ["2017 ACC/AHA Hypertension Guideline（初步評估檢驗）"]}}, "115020-13": {"quick": "嚴重狹窄遠端僅微量充盈屬TIMI 1級（滲透但無灌流），TIMI 3才是正常充盈血流，故B錯誤。", "detail": {"background": "TIMI血流分級：0級無血流、1級顯影劑可滲透但無法充盈遠端、2級可充盈但較慢、3級正常且完全充盈。題述『遠端僅微量充盈』應為TIMI 1，非3級。其餘：心肌橋於收縮期壓迫LAD；IVUS與OCT可細部觀察，OCT解析度高但深度淺；FFR<0.8代表狹窄具血行動力學意義。", "options": {"A": "正確。心肌橋於收縮期壓迫、舒張期恢復。", "B": "錯誤（本題答案）。遠端僅微量充盈為TIMI 1級，非3級。", "C": "正確。OCT解析度高、觀察深度較淺。", "D": "正確。FFR<0.8表示狹窄顯著。"}, "sources": ["Braunwald's Heart Disease（冠狀動脈造影與FFR）"]}}, "115020-14": {"quick": "肺部攝取增加與短暫左心室擴大是『嚴重廣泛冠心病』的高風險徵象，但以此作為CAD診斷的專一性『高於』大區域可逆缺損之敘述並不適當，故選C。", "detail": {"background": "壓力核醫心肌灌注的高風險徵象：壓力後肺部攝取增加、短暫性左心室擴大（transient ischemic dilation），皆暗示嚴重/多支冠狀動脈疾病。心臟外的Tl-201蓄積偶可顯示乳房等腫瘤。但宣稱這些徵象對CAD診斷的『專一性高於』大區域/多血管分布之可逆性灌流缺損，並不適當。", "options": {"A": "正確。肺部攝取增加提示嚴重多支病。", "B": "正確。短暫左心室擴大與多支病相關。", "C": "最不適當（本題答案）。其專一性並不高於大區域可逆缺損。", "D": "正確。心臟外Tl-201蓄積可能為乳房腫瘤。"}, "sources": ["Braunwald's Heart Disease（核醫心肌灌注高風險徵象）"]}}, "115020-65": {"quick": "抗生素治療才『3天』血液培養仍陽性，尚屬早期、不一定需手術；其餘（瓣膜破損致心衰竭、瓣周膿瘍、人工瓣膜脫位）才是明確手術適應症，故選D。", "detail": {"background": "感染性心內膜炎的手術適應症：瓣膜破壞致心衰竭、感染未受控（瓣周膿瘍、傳導阻斷擴大）、人工瓣膜脫位不穩、反覆栓塞或大贅生物、以及『適當抗生素治療後仍持續菌血症』。但治療僅3天血培養仍陽性屬早期，菌血症清除常需數日，尚不構成手術依據。", "options": {"A": "需手術。瓣膜破損致嚴重心衰竭。", "B": "需手術。瓣周膿瘍。", "C": "需手術。人工瓣膜脫位不穩。", "D": "最不需要（本題答案）。治療僅3天血培養陽性屬早期，非手術依據。"}, "sources": ["2023 ESC Endocarditis Guideline；2015 AHA IE Guideline"]}}, "115020-73": {"quick": "心律調節器一般『不』被視為延長死亡過程的裝置（與ICD不同），故A最不適當。", "detail": {"background": "末期病人裝置處置的倫理：ICD放電會造成疼痛/不適，臨終可考慮停用（可用磁鐵暫時關閉電擊功能）。心律調節器則不被視為『延長死亡過程』的裝置，停用節律器可能使心律調節依賴者出現心搏過緩相關症狀（心絞痛、呼吸困難），故停用爭議較大、一般不主動關閉。", "options": {"A": "最不適當（本題答案）。心律調節器一般不被視為延長死亡終點。", "B": "正確。停用節律器可能致心絞痛/呼吸困難。", "C": "正確。ICD電擊疼痛不適。", "D": "正確。磁鐵可暫時使ICD電擊失效。"}, "sources": ["HRS Expert Consensus on CIED Management at End of Life (2010)"]}}, "101030-01": {"quick": "固定分裂第二心音＋左上胸骨緣收縮期雜音＋右軸偏移＝心房中隔缺損(ASD)，故選B。", "detail": {"background": "ASD為左到右分流，右心容積負荷使肺血流增加，產生肺動脈瓣區收縮期雜音與右心室擴大；其標誌為「固定分裂S2」(與呼吸無關)，心電圖常見右軸偏移與不完全右束支阻斷(V1 rSR')。", "options": {"A": "VSD為左下胸骨緣全收縮期雜音，無固定分裂S2。", "B": "正確(本題答案)。固定分裂S2＋右心容積負荷＝ASD。", "C": "PDA為連續性機器樣雜音。", "D": "主動脈縮窄以上下肢血壓差表現。"}, "sources": ["Braunwald's Heart Disease(成人先天性心臟病)"]}}, "101030-02": {"quick": "ASD左到右分流使右心出路血流增加，肺動脈瓣關閉延後，造成固定分裂S2，故選A。", "detail": {"background": "S2由主動脈瓣(A2)與肺動脈瓣(P2)關閉組成。ASD因右心血流量增加使P2延後，且因心房間相通使左右心房壓力隨呼吸的差異被平衡，故分裂程度不隨呼吸改變→固定分裂。", "options": {"A": "正確(本題答案)。右心出路血流增加→肺動脈瓣延後關閉。", "B": "方向相反。", "C": "與主動脈瓣無關。", "D": "與主動脈瓣無關。"}, "sources": ["Braunwald's Heart Disease(心音分裂)"]}}, "101030-03": {"quick": "心室肌細胞第4期為靜止期，主要為鉀離子流(維持靜止膜電位)，非鈣離子流，故D錯誤。", "detail": {"background": "心室肌動作電位：第0期鈉內流(去極化)、第1期短暫鉀外流、第2期鈣內流平台、第3期鉀外流再極化、第4期靜止(以鉀為主維持RMP)。鈣離子流主要在第2期。", "options": {"A": "正確。第0期為鈉內流。", "B": "正確。第2期為鈣內流平台。", "C": "正確。第3期為鉀外流。", "D": "錯誤(本題答案)。第4期以鉀離子為主，非鈣離子流。"}, "sources": ["Braunwald's Heart Disease(心臟電生理)"]}}, "101030-04": {"quick": "高血壓合併糖尿病與慢性腎病(蛋白尿)者，血壓目標為<130/80 mmHg，故選A。", "detail": {"background": "2017 ACC/AHA建議多數高血壓病人(含糖尿病、慢性腎病、心血管高風險)血壓目標<130/80 mmHg。此類病人首選ACEI/ARB兼具腎臟保護。", "options": {"A": "正確(本題答案)。<130/80 mmHg。", "B": "過於寬鬆。", "C": "<140/90對高風險族群仍偏高。", "D": "非標準目標。"}, "sources": ["2017 ACC/AHA Hypertension Guideline"]}}, "101030-06": {"quick": "心室中隔缺損(VSD)產生全收縮期雜音，故選B。", "detail": {"background": "全收縮期(holosystolic)雜音見於VSD、二尖瓣逆流、三尖瓣逆流。ASD為肺血流增加之收縮期噴射雜音、肺動脈瓣狹窄為收縮期噴射雜音、PDA為連續性雜音，皆非全收縮期。", "options": {"A": "ASD為收縮期噴射雜音。", "B": "正確(本題答案)。VSD為全收縮期雜音。", "C": "肺動脈瓣狹窄為噴射雜音。", "D": "PDA為連續性雜音。"}, "sources": ["Braunwald's Heart Disease(雜音)"]}}, "101030-08": {"quick": "腎血管性高血壓不只發生在年輕患者(老年動脈硬化亦常見)，故B錯誤。", "detail": {"background": "腎血管性高血壓：年輕者多為纖維肌肉發育異常，年長者多為動脈硬化斑塊；缺血腎分泌過多腎素；腹部可聞血管雜音；雙側腎動脈狹窄者使用ACEI/ARB可致急性腎衰竭，應避免。", "options": {"A": "正確。缺血腎分泌腎素過高。", "B": "錯誤(本題答案)。不只年輕患者，老年動脈硬化亦常見。", "C": "正確。腹部可聞血管雜音。", "D": "正確。雙側腎動脈狹窄禁用ACEI。"}, "sources": ["2017 ACC/AHA Hypertension Guideline"]}}, "101030-09": {"quick": "投射至斜方肌(trapezius)較屬心包炎特徵，非典型心絞痛，故C最不適當。", "detail": {"background": "典型心絞痛持續約2–5分鐘、與活動相關，可投射至肩、上肢、後背、下頜、頸部；很少在肚臍以下。投射至斜方肌是心包炎的特徵性放射部位。", "options": {"A": "正確。持續數分鐘、可投射肩/上肢。", "B": "正確。可投射後背、下頜、頸。", "C": "最不適當(本題答案)。斜方肌放射較屬心包炎。", "D": "正確。很少在肚臍下。"}, "sources": ["Braunwald's Heart Disease；2024 ESC Chronic Coronary Syndromes"]}}, "101030-10": {"quick": "急性期心導管的短程目標是處理「梗塞相關」血管再灌流；同時處理非梗塞血管狹窄非短程目標，故選D。", "detail": {"background": "ACS急性心導管短程目標：盡早再灌流梗塞相關血管、防止梗塞擴大、預防死亡與再阻塞。非梗塞相關血管的完全血運重建可同次或分階段進行，但非「短程」緊急目標(視臨床穩定度而定)。", "options": {"A": "是短程目標。", "B": "是短程目標。", "C": "是短程目標。", "D": "非短程目標(本題答案)。同時處理非梗塞血管非緊急短程目標。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "101030-24": {"quick": "延緩糖尿病腎病變最好的降壓藥是阻斷RAS的ARB(或ACEI)，故選C。", "detail": {"background": "糖尿病腎病變(尤其有蛋白尿)首選ACEI或ARB，可降低腎絲球內壓、減少蛋白尿、延緩腎功能惡化。", "options": {"A": "利尿劑為輔助。", "B": "α阻斷劑非首選。", "C": "正確(本題答案)。ARB(RAS阻斷)最佳。", "D": "CCB非首選。"}, "sources": ["KDIGO 2021；2017 ACC/AHA Hypertension Guideline"]}}, "101030-25": {"quick": "原發性醛固酮過多症造成高血壓合併「低腎素」，故選D。", "detail": {"background": "原發性醛固酮過多：醛固酮自主分泌→鈉滯留、高血壓、低血鉀，並抑制腎素(低腎素)。腎血管性與惡性高血壓為高腎素；本態性高血壓腎素多正常。", "options": {"A": "腎血管性為高腎素。", "B": "惡性高血壓為高腎素。", "C": "本態性腎素多正常。", "D": "正確(本題答案)。原發性醛固酮過多為低腎素。"}, "sources": ["Endocrine Society Primary Aldosteronism Guideline"]}}, "101030-49": {"quick": "心絞痛已用足三種抗心絞痛藥仍有症狀，不應加NSAID(無助且增風險)，故B不適當。", "detail": {"background": "頑固性心絞痛在最佳藥物(硝酸鹽、β-blocker、CCB)後仍有症狀，可考慮鉀通道開放劑(nicorandil)、心導管介入血運重建；合併糖尿病者ACEI有益。NSAID對心絞痛無治療作用且增加心血管/出血風險。", "options": {"A": "鉀通道開放劑可考慮。", "B": "不適當(本題答案)。NSAID無助且增風險。", "C": "心導管介入適當。", "D": "糖尿病者ACEI有益。"}, "sources": ["2024 ESC Chronic Coronary Syndromes Guideline"]}}, "101030-51": {"quick": "主動脈瓣閉鎖不全的舒張期雜音「坐著前傾、呼氣末」較易聽見，而非躺著，故C錯誤。", "detail": {"background": "嚴重AR周邊徵象：Quincke脈(甲床搏動)、Traube徵(股動脈pistol-shot)、寬脈壓、water-hammer脈、Austin Flint雜音(逆流衝擊二尖瓣前葉之心尖舒張中晚期低頻雜音)。其早期舒張吹風樣雜音以隔膜、病人坐起前傾、呼氣末最易聽見。", "options": {"A": "正確。Quincke脈。", "B": "正確。Traube徵。", "C": "錯誤(本題答案)。應坐著前傾、呼氣末較易聽見，非躺著。", "D": "正確。Austin Flint雜音之機轉。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "101030-54": {"quick": "高膽固醇血症最不可能誘發肺栓塞(VTE)，故選D。", "detail": {"background": "VTE危險因子依Virchow三要素：停滯(手術/不動)、高凝(癌症、懷孕)、內皮損傷；心臟衰竭因血流停滯亦增風險。高膽固醇血症為動脈粥狀硬化(動脈)危險因子，與靜脈血栓栓塞無關。", "options": {"A": "膝關節置換手術為強危險因子。", "B": "癌症為高凝狀態。", "C": "心臟衰竭因停滯增風險。", "D": "最不可能(本題答案)。高膽固醇與VTE無關。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline"]}}, "101030-56": {"quick": "診斷嗜鉻細胞瘤最可靠(敏感度最高)的是血漿游離metanephrine，故選D。", "detail": {"background": "嗜鉻細胞瘤生化篩檢以血漿游離metanephrine或24小時尿分餾metanephrine敏感度最高；單純兒茶酚胺或VMA敏感度較低。", "options": {"A": "尿VMA敏感度較低。", "B": "尿兒茶酚胺次之。", "C": "血漿兒茶酚胺易受壓力影響。", "D": "正確(本題答案)。血漿游離metanephrine最可靠。"}, "sources": ["Endocrine Society Pheochromocytoma Guideline (2014)"]}}, "101030-59": {"quick": "Thiazolidinedione類(rosiglitazone)會造成水鈉滯留、誘發/惡化鬱血性心臟衰竭，故選C。", "detail": {"background": "TZD(rosiglitazone、pioglitazone)增加水鈉滯留與血漿容積，可誘發或惡化心衰竭，心衰竭(尤其NYHA III–IV)為其禁忌。Metformin、acarbose、磺醯尿素類不以致心衰竭為特徵。", "options": {"A": "Metformin不致心衰竭。", "B": "Acarbose不致心衰竭。", "C": "正確(本題答案)。TZD致水鈉滯留、誘發心衰竭。", "D": "磺醯尿素類不以心衰竭為特徵。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline(TZD警示)"]}}, "101030-63": {"quick": "Streptococcus bovis為典型引起感染性心內膜炎的菌種，符合Duke主要條件，故選D。", "detail": {"background": "Duke主要條件之一為「典型菌兩套血培陽性」，典型菌包括viridans strep、Streptococcus bovis(gallolyticus)、HACEK、社區型S. aureus、無原發灶之腸球菌。E. coli、Acinetobacter、Klebsiella非典型IE致病菌，不符。", "options": {"A": "E. coli非典型IE菌。", "B": "Acinetobacter非典型IE菌。", "C": "Klebsiella非典型IE菌。", "D": "正確(本題答案)。S. bovis為典型IE菌(且須查大腸病灶)。"}, "sources": ["Modified Duke Criteria；2023 ESC Endocarditis Guideline"]}}, "102030-03": {"quick": "血栓溶解後血流僅達TIMI 1級(滲透無灌流)預後差，並非較佳；該敘述最不正確，故選C。", "detail": {"background": "急性心肌梗塞溶栓黃金時間愈早愈好(數小時內)；最常見副作用為出血；嚴重高血壓(SBP>180)為(相對)禁忌。再灌流目標為TIMI 3級(完全血流)；TIMI 1級代表灌流不良、預後較差。", "options": {"A": "溶栓宜早期給予。", "B": "正確。出血為最常見副作用。", "C": "最不正確(本題答案)。TIMI 1級灌流不良、預後差。", "D": "嚴重高血壓為溶栓禁忌。"}, "sources": ["2025 ACC/AHA ACS Guideline；TIMI flow grading"]}}, "102030-04": {"quick": "胸痛且心電圖提示下壁缺血時，應「逕行右胸心電圖」評估右心室梗塞，故選B。", "detail": {"background": "急性胸痛須在到院10分鐘內完成心電圖；下壁(II/III/aVF)變化時加做右側導程(V4R)偵測右心室梗塞。不應等心肌酵素才診斷，也不應因單次心電圖正常即讓病人回家。", "options": {"A": "錯誤。不需等心肌酵素才診斷。", "B": "正確(本題答案)。逕行右胸心電圖評估右室梗塞。", "C": "錯誤。不可僅憑此讓病人回家。", "D": "應積極評估，非單純等2小時。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "102030-06": {"quick": "突發單側下肢冰冷無脈＋心房顫動＝心源性栓塞造成急性下肢動脈阻塞，故選C。", "detail": {"background": "心房顫動易在左心房形成血栓，脫落造成周邊動脈急性栓塞，表現為急性肢體缺血(6P：疼痛、蒼白、無脈、感覺異常、麻痺、冰冷)。Buerger氏症為年輕吸菸者慢性表現；雷諾為陣發性發白；急性DVT為靜脈腫脹非無脈。", "options": {"A": "急性深部靜脈栓塞為靜脈，表現腫脹非無脈。", "B": "Buerger氏症為年輕吸菸者慢性病程。", "C": "正確(本題答案)。AF栓塞致急性下肢動脈阻塞。", "D": "雷諾現象為陣發性發白。"}, "sources": ["Harrison's(急性肢體缺血)"]}}, "102030-07": {"quick": "此為右心衰竭/嚴重三尖瓣逆流圖像(交替脈、頸靜脈壓升、搏動性肝腫、吸氣增強之LLSB全收縮期雜音)；說它是慢性嚴重主動脈閉鎖不全錯誤，故選D。", "detail": {"background": "交替脈反映嚴重左心室功能不良；吸氣增強之左下胸骨緣全收縮期雜音、搏動性肝腫、頸靜脈壓升、肝充血支持嚴重三尖瓣逆流與右心衰竭。主動脈閉鎖不全為舒張期雜音、water-hammer脈，與此圖像不符。", "options": {"A": "正確。交替脈反映嚴重左室功能不良。", "B": "正確。符合嚴重三尖瓣逆流。", "C": "正確。靜脈壓上升致肝充血。", "D": "錯誤(本題答案)。圖像為TR/右心衰竭，非主動脈閉鎖不全。"}, "sources": ["Braunwald's Heart Disease(瓣膜與右心衰竭)"]}}, "102030-08": {"quick": "25歲心悸、脈搏140、窄QRS規則心搏過速＝陣發性上心室心搏過速(PSVT)，故選C。", "detail": {"background": "年輕、突發、規則窄QRS、心率約140–180，最可能為PSVT(多為AVNRT/AVRT)。竇性頻脈通常有誘因且漸進；心房顫動為不規則；心室頻脈為寬QRS。", "options": {"A": "竇性頻脈漸進且有誘因。", "B": "心房顫動為不規則。", "C": "正確(本題答案)。PSVT。", "D": "VT為寬QRS。"}, "sources": ["2015 ACC/AHA/HRS SVT Guideline"]}}, "102030-09": {"quick": "穩定PSVT經迷走刺激無效後，靜脈快速推注adenosine為首選，故選D。", "detail": {"background": "穩定窄QRS SVT處置：迷走刺激→adenosine快速推注→AV node阻斷劑。Digoxin起效慢、lidocaine用於心室性心律不整、電整流保留給不穩定者。", "options": {"A": "Digoxin起效慢非首選。", "B": "Lidocaine用於VT。", "C": "電整流用於不穩定者。", "D": "正確(本題答案)。adenosine靜脈快速推注。"}, "sources": ["2015 ACC/AHA/HRS SVT Guideline"]}}, "102030-10": {"quick": "痛風病人應避免利尿劑(thiazide升尿酸誘發痛風)，故選B。", "detail": {"background": "thiazide與loop利尿劑減少尿酸排泄、升高血尿酸，可誘發痛風發作，痛風病人之高血壓治療應避免。CCB、β-blocker、ARB對尿酸影響較小(losartan甚至略降尿酸)。", "options": {"A": "CCB對尿酸影響小。", "B": "正確(本題答案)。利尿劑升尿酸、誘發痛風。", "C": "β-blocker影響小。", "D": "ARB(losartan)甚至略降尿酸。"}, "sources": ["2017 ACC/AHA Hypertension Guideline"]}}, "102030-11": {"quick": "心房顫動的中風危險因子由CHA2DS2-VASc決定，「快速心室速率」不是中風危險因子，故選A。", "detail": {"background": "AF血栓栓塞風險取決於CHA2DS2-VASc項目(心衰竭、高血壓、年齡、糖尿病、中風史、血管病、女性)，與心室反應速率快慢無關(速率影響症狀與心搏過速性心肌病，非中風風險)。", "options": {"A": "不是(本題答案)。心室速率快不是中風危險因子。", "B": "高血壓是。", "C": "糖尿病是。", "D": "年齡>75是(2分)。"}, "sources": ["2023 ACC/AHA AF Guideline"]}}, "102030-12": {"quick": "急性心肌梗塞的胸痛不會因休息而消退(與穩定型心絞痛不同)，故B錯誤。", "detail": {"background": "急性心肌梗塞胸痛持續、休息或硝酸鹽常無法緩解，伴無力、冒汗、噁心嘔吐；可在劍突下/上腹被誤為消化不良；老人可以突發呼吸困難/肺水腫表現。", "options": {"A": "正確。常伴自律神經症狀。", "B": "錯誤(本題答案)。MI胸痛不因休息消退。", "C": "正確。可被誤為消化不良。", "D": "正確。老人可以呼吸困難/肺水腫表現。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "102030-14": {"quick": "早期後去極化(EAD)主因為動作電位間期過長(→尖端扭轉)，故選B。", "detail": {"background": "延遲後去極化(DAD)主因細胞內「鈣」過載(如digoxin中毒、兒茶酚胺)；早期後去極化(EAD)主因APD延長(QT延長)，是尖端扭轉(torsades)的機轉。細胞外高鉀不致EAD。", "options": {"A": "錯誤。DAD為細胞內鈣過載，非鉀。", "B": "正確(本題答案)。EAD因APD過長。", "C": "錯誤。Torsades機轉為EAD，非DAD。", "D": "錯誤。高鉀不致EAD。"}, "sources": ["Braunwald's Heart Disease(心律不整機轉)"]}}, "102030-15": {"quick": "穩定型心絞痛併用aspirin與warfarin並不優於單獨aspirin(增加出血)，故D最不適當。", "detail": {"background": "穩定型心絞痛：β-blocker為基礎(無禁忌)；不能用β-blocker者用CCB；合併糖尿病或左心室功能不良者ACEI有益。常規併用aspirin＋warfarin並未較單用aspirin有益且增加出血，非適當。", "options": {"A": "正確。β-blocker為基礎。", "B": "正確。禁忌時用CCB。", "C": "正確。糖尿病/左室不良用ACEI。", "D": "最不適當(本題答案)。aspirin＋warfarin不優於單用aspirin。"}, "sources": ["2024 ESC Chronic Coronary Syndromes Guideline"]}}, "102030-44": {"quick": "由暫時可逆因子(住院臥床)誘發的近端DVT，抗凝至少3個月，故選B。", "detail": {"background": "由重大暫時/可逆危險因子(手術、住院臥床)誘發的VTE，標準抗凝療程約3個月；不明原因或持續危險因子(癌症)者考慮延長。", "options": {"A": "4週太短。", "B": "正確(本題答案)。至少3個月。", "C": "6個月用於部分情況，非此標準。", "D": "12個月用於高復發風險。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline；CHEST VTE Guideline"]}}, "102030-66": {"quick": "嗜鉻細胞瘤即使血壓高低不定，仍應給α腎上腺素受體阻斷劑(並補液)，故選C。", "detail": {"background": "嗜鉻細胞瘤術前/控制：先α阻斷並「補充體液擴容」(非避免輸液)，必要時再加β阻斷(切勿先給β致無對抗α作用之高血壓危象)；鈣離子阻斷劑可作輔助(非絕對禁用)。", "options": {"A": "錯誤。應補液擴容，非避免輸液。", "B": "錯誤。不可先給β阻斷。", "C": "正確(本題答案)。仍應給α阻斷劑。", "D": "錯誤。CCB可輔助，非絕對禁用。"}, "sources": ["Endocrine Society Pheochromocytoma Guideline (2014)"]}}, "102030-67": {"quick": "穩定PSVT可「優先」考慮迷走神經刺激(頸動脈竇按摩)，故選D。", "detail": {"background": "血流動力學穩定的PSVT處置順序：先迷走神經刺激(頸動脈竇按摩、Valsalva)，無效再給adenosine，再AV node阻斷劑(verapamil)。Lidocaine用於心室性心律不整。本題問「優先」→迷走刺激。", "options": {"A": "Adenosine為迷走刺激失敗後首選藥物。", "B": "Lidocaine用於VT。", "C": "Verapamil為後線。", "D": "正確(本題答案)。優先迷走刺激(頸動脈竇按摩)。"}, "sources": ["2015 ACC/AHA/HRS SVT Guideline"]}}, "102110-07": {"quick": "最常見的持續性心律不整為心房顫動，原答C；惟本題後經公布一律給分(送分)。", "detail": {"background": "心房顫動是臨床最常見的持續性心律不整，盛行率隨年齡上升。本題標準答案為C(心房顫動)，但考選部最終公布一律給分。", "options": {"A": "SVT為陣發性。", "B": "VT較少見。", "C": "原訂答案。最常見持續性心律不整為AF(本題送分)。", "D": "心房撲動較少見。"}, "sources": ["2023 ACC/AHA AF Guideline；考選部更正公告(本題送分)"]}}, "102110-09": {"quick": "先天性長QT症候群最常見為「鉀離子通道」突變(LQT1/LQT2)，故選C。", "detail": {"background": "先天性長QT症候群最常見型別LQT1、LQT2皆為鉀離子通道基因突變(影響再極化)；LQT3為鈉離子通道。", "options": {"A": "鈉通道為LQT3(較少)。", "B": "非最常見。", "C": "正確(本題答案)。鉀通道(LQT1/2)最常見。", "D": "氯通道非主要。"}, "sources": ["Braunwald's Heart Disease(遺傳性心律不整)"]}}, "102110-11": {"quick": "主動脈瓣閉鎖不全為「寬脈壓、低舒張壓」，不會有舒張壓升高，故選C。", "detail": {"background": "AR周邊徵象來自寬脈壓與快速逆流：Corrigan/water-hammer脈、de Musset徵(點頭)、Quincke脈、Austin Flint雜音、舒張壓「降低」。舒張壓升高與AR相反。", "options": {"A": "Corrigan脈為AR徵象。", "B": "de Musset徵為AR徵象。", "C": "非AR所見(本題答案)。AR為低舒張壓，非升高。", "D": "Austin Flint雜音為AR所見。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "102110-12": {"quick": "二尖瓣逆流與主動脈瓣狹窄「都是收縮期雜音」，故無法用『一為收縮一為舒張』來區分，選A。", "detail": {"background": "MR(全收縮期、心尖、傳左腋下、較soft)與AS(漸強漸弱噴射型、右上胸骨緣、傳頸部、較harsh)皆為收縮期雜音，可由型態、最大強度位置、放射方向區分，但不能用『收縮vs舒張』區分(兩者皆收縮期)。", "options": {"A": "無法區分(本題答案)。兩者皆收縮期雜音。", "B": "可區分(型態/響度)。", "C": "可區分(放射方向)。", "D": "可區分(最大強度位置)。"}, "sources": ["Braunwald's Heart Disease(心臟聽診)"]}}, "102110-13": {"quick": "依官方標準答案為B(肺心症)。臨床須由完整身體診查判定；本題以右心/肺源性表現為據。", "detail": {"background": "肺心症(cor pulmonale)指因肺部疾病或肺高壓造成的右心室肥大/衰竭。本題病人有長期危險因子與低血氧(SpO2 88%)，官方答案判定為肺心症；鑑別包含急性肺水腫(端坐呼吸、肺囉音)與急性冠心症(運動性胸悶)。實作上須結合完整身體診查與檢查綜合判斷。", "options": {"A": "心臟衰竭為廣義鑑別之一。", "B": "官方答案。以右心/肺源性表現判定為肺心症。", "C": "急性肺水腫為重要鑑別。", "D": "急性冠心症為重要鑑別。"}, "sources": ["Harrison's Principles of Internal Medicine(cor pulmonale)"]}}, "102110-60": {"quick": "靜脈毒癮者心內膜炎之革蘭氏陰性桿菌，以綠膿桿菌(Pseudomonas aeruginosa)最相關，故選C。", "detail": {"background": "靜脈藥癮者IE以S. aureus最常見；若為革蘭氏陰性桿菌，綠膿桿菌(Pseudomonas aeruginosa)為其中具代表性者，常侵犯右側瓣膜並造成敗血性肺栓塞(胸部多發病灶)。", "options": {"A": "Salmonella少見。", "B": "E. coli少為IE菌。", "C": "正確(本題答案)。綠膿桿菌與IVDU革蘭氏陰性IE相關。", "D": "HACEK為革蘭氏陰性但屬挑食菌群、非此情境主菌。"}, "sources": ["2023 ESC Endocarditis Guideline"]}}, "102110-61": {"quick": "三尖瓣大贅生物、適當抗生素2週仍持續發燒且需強心劑維持血壓→應照會心臟外科考慮瓣膜手術，故選C。", "detail": {"background": "感染性心內膜炎的手術適應症：適當抗生素後仍持續感染/菌血症、大贅生物(高栓塞風險)、瓣膜破壞致心衰竭/血流動力不穩。本例符合(持續發燒、1.2×1.4 cm贅生物、需強心劑)，應手術。", "options": {"A": "已適當抗生素仍無效，非僅加藥。", "B": "抗凝對IE無益且增出血。", "C": "正確(本題答案)。照會外科考慮瓣膜置換。", "D": "digoxin/輸液非此情境之適當處置。"}, "sources": ["2023 ESC Endocarditis Guideline(手術適應症)"]}}, "104030-61": {"quick": "Friedewald公式：LDL ＝ 總膽固醇 − HDL − 三酸甘油酯/5 ＝ 287 − 90 − 35 ＝ 162 mg/dL，故選D。", "detail": {"background": "當三酸甘油酯<400 mg/dL時可用Friedewald公式估算LDL-C：LDL ＝ 總膽固醇 − HDL-C − (三酸甘油酯/5)。本例＝287 − 90 − (175/5＝35) ＝ 162 mg/dL。三酸甘油酯≥400時公式不適用，需直接測定。", "options": {"A": "22為計算錯誤。", "B": "85為計算錯誤。", "C": "130為計算錯誤。", "D": "正確(本題答案)。162 mg/dL。"}, "sources": ["Friedewald formula；2018 AHA/ACC Cholesterol Guideline"]}}, "105100-02": {"quick": "血流動力學穩定的窄QRS心搏過速，靜脈adenosine後終止並恢復竇性心律，最符合陣發性上心室心搏過速(PSVT/AVNRT)；對應之心電圖為選項B。", "detail": {"background": "Adenosine短暫阻斷房室結，可終止以房室結為折返環的PSVT(AVNRT/AVRT)。本題四個選項為不同心律的心電圖(見附圖)，能被adenosine終止並轉為竇性者為規則窄QRS的PSVT。心房顫動/撲動通常不會被adenosine『終止』(僅短暫減慢心室反應)。", "options": {"A": "（心電圖選項，型態不符adenosine可終止之PSVT）", "B": "正確(本題答案)。為規則窄QRS之PSVT心電圖。", "C": "（心電圖選項，不符）", "D": "（心電圖選項，不符）"}, "sources": ["2015 ACC/AHA/HRS SVT Guideline"]}}, "103030-03": {"quick": "COPD插管病人呼吸器壓力反覆過高＋單側(右)呼吸音降低＋心搏過速，最需優先以胸部X光排除氣胸(氣壓傷)，故選A。", "detail": {"background": "重度COPD正壓通氣易發生氣壓傷/張力性氣胸：表現為呼吸器尖峰壓力升高、單側呼吸音降低、心搏過速與血壓變化。此時心搏過速多為續發於氣胸/低血氧，應先以胸部X光(必要時直接減壓)找出氣胸，而非先處理心律。", "options": {"A": "正確(本題答案)。先胸部X光排除氣胸。", "B": "窄QRS心搏過速多為續發性，非先給amiodarone。", "C": "電擊用於不穩定心律，非此情境首要。", "D": "adenosine用於PSVT，非此情境首要。"}, "sources": ["Harrison's(氣壓傷/張力性氣胸)"]}}, "103030-18": {"quick": "電腦斷層並非昏厥最重要的診斷工具(以病史、心電圖、姿勢性血壓為主)，故B錯誤。", "detail": {"background": "昏厥為暫時性意識喪失且自行恢復，常見原因為反射性(迷走/自律神經失調)、姿勢性低血壓、心因性(心律不整/結構性)。評估以詳細病史、12導程心電圖、姿勢性血壓為核心；CT非最重要工具(僅在懷疑神經病灶時)。", "options": {"A": "正確。昏厥定義。", "B": "錯誤(本題答案)。CT非最重要工具。", "C": "正確。自律神經/反射性為常見原因。", "D": "正確。心律不整為原因之一。"}, "sources": ["2017 ACC/AHA/HRS Syncope Guideline"]}}, "103030-22": {"quick": "原發性醛固酮過多症常合併『低血鉀』(非高血鉀)，故A錯誤。", "detail": {"background": "次發性高血壓整體以腎實質疾病最常見；原發性醛固酮過多表現高血壓、低血鉀、低腎素；嗜鉻細胞瘤可發生於腎上腺外；睡眠呼吸中止亦為原因之一。", "options": {"A": "錯誤(本題答案)。原發性醛固酮過多為低血鉀。", "B": "正確。腎實質病變最常見。", "C": "正確。嗜鉻細胞瘤可在腎上腺外。", "D": "正確。睡眠呼吸障礙為原因之一。"}, "sources": ["2017 ACC/AHA Hypertension Guideline；Endocrine Society"]}}, "103030-23": {"quick": "細遲脈(pulsus parvus et tardus)、右上胸骨緣粗糙收縮中期雜音、運動性胸痛/昏厥/呼吸困難＝主動脈瓣狹窄合併心衰竭，故選D。", "detail": {"background": "重度主動脈瓣狹窄三大症狀：心絞痛、昏厥、心衰竭；理學為脈搏延遲微弱(pulsus parvus et tardus)、右上胸骨緣收縮中期噴射雜音傳向頸部、S4。出現症狀即建議瓣膜置換。", "options": {"A": "VSD為全收縮期雜音於左下胸骨緣。", "B": "HOCM雜音於左下胸骨緣、隨↓前負荷變大，且脈搏不會是細遲脈。", "C": "MR為心尖全收縮期雜音傳左腋下。", "D": "正確(本題答案)。AS合併心衰竭。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "103030-24": {"quick": "懷孕婦女不適合使用ACEI(captopril，致畸胎)，故選C。", "detail": {"background": "懷孕高血壓可用methyldopa、labetalol、長效nifedipine；ACEI/ARB於懷孕禁忌(致胎兒腎發育不全、羊水過少、致畸)。", "options": {"A": "Methyldopa可用。", "B": "Labetalol可用。", "C": "不適合(本題答案)。captopril(ACEI)懷孕禁忌。", "D": "Nifedipine可用。"}, "sources": ["2017 ACC/AHA Hypertension Guideline；ACOG"]}}, "103030-25": {"quick": "長效硝酸鹽用於『預防』，舌下含片才用於『立即』緩解急性胸痛；說長效更能立即改善是錯的，故C錯誤。", "detail": {"background": "穩定型心絞痛：舌下硝化甘油用於急性發作的立即緩解；長效硝酸鹽用於預防(需注意耐受性，安排無藥期)。核醫灌注掃描可用藥物壓力(dipyridamole/adenosine/dobutamine)；無症狀時理學檢查常正常；statin降LDL並降低心血管風險。", "options": {"A": "正確。可用藥物壓力核醫灌注。", "B": "正確。無症狀時理學常正常。", "C": "錯誤(本題答案)。長效硝酸鹽用於預防，立即緩解應用舌下含片。", "D": "正確。statin降LDL與心血管風險。"}, "sources": ["2024 ESC Chronic Coronary Syndromes Guideline"]}}, "103030-26": {"quick": "血流動力學尚穩定、有症狀的(寬QRS)心室頻脈，可考慮靜脈注射amiodarone，故選C。", "detail": {"background": "穩定的寬QRS心搏過速(疑似心室頻脈)可用抗心律不整藥(amiodarone)；不穩定者同步電整流；有脈搏不需CPR/插管；β-blocker非急性VT首選。digoxin不適用於寬QRS心搏過速。", "options": {"A": "digoxin不適用於VT。", "B": "病人有脈搏意識，不需立即CPR。", "C": "正確(本題答案)。穩定VT可用amiodarone。", "D": "β-blocker非急性VT首選。"}, "sources": ["2017 AHA/ACC/HRS Ventricular Arrhythmia Guideline"]}}, "103030-27": {"quick": "病人為失代償(肺囉音、水腫)HFrEF；β-blocker應在『穩定/無充血』時才開始，不應在急性失代償期立即啟用，故C錯誤。", "detail": {"background": "HFrEF(EF 23%)的GDMT包含β-blocker，但啟用時機為臨床穩定、無明顯充血時；急性失代償期(肺囉音、水腫)應先利尿穩定，再小劑量起始β-blocker並緩慢上調。BNP評估嚴重度、限鹽、QRS>120 ms且最佳藥物後仍有症狀考慮CRT，皆正確。", "options": {"A": "正確。BNP評估嚴重度。", "B": "正確。應限鹽。", "C": "錯誤(本題答案)。失代償期不應立即起始β-blocker。", "D": "正確。QRS>120 ms者考慮CRT。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "103030-39": {"quick": "年輕女性難控制型高血壓，最可能為原發性醛固酮過多症(康氏症/Conn’s syndrome)，故選D。", "detail": {"background": "年輕、難治型(多重藥物仍不達標)高血壓應評估次發原因；原發性醛固酮過多症(Conn’s)為最常見的內分泌性次發高血壓，表現高血壓、低血鉀、低腎素，篩檢用醛固酮/腎素比值(ARR)。", "options": {"A": "嗜鉻細胞瘤以陣發頭痛/心悸/盜汗表現。", "B": "庫欣症候群有特徵性外觀。", "C": "先天性腎上腺增生較罕見。", "D": "正確(本題答案)。Conn’s症為最常見內分泌性次發高血壓。"}, "sources": ["Endocrine Society Primary Aldosteronism Guideline"]}}, "103030-68": {"quick": "Framingham十年風險使用『收縮壓』，不是舒張壓，故選C。", "detail": {"background": "Framingham心血管十年風險指標包含年齡、性別、總膽固醇、HDL、收縮壓(及是否治療)、吸菸、糖尿病。使用收縮壓而非舒張壓。", "options": {"A": "是指標(總膽固醇)。", "B": "是指標(HDL)。", "C": "不是(本題答案)。使用收縮壓，非舒張壓。", "D": "是指標(吸菸)。"}, "sources": ["Framingham Heart Study；2019 ACC/AHA Primary Prevention"]}}, "103100-02": {"quick": "Valsalva用力期減少前負荷，會加重肥厚型心肌病變流出道阻塞、使雜音變大，故選B。", "detail": {"background": "HOCM流出道阻塞與雜音隨『前/後負荷』變化：↓前負荷(Valsalva用力期、站立)→阻塞加重、雜音變大；↑前後負荷(蹲下、握拳、左側躺增加回流)→雜音變小。此與主動脈瓣狹窄相反。", "options": {"A": "坐前傾對HOCM雜音無加強。", "B": "正確(本題答案)。Valsalva使雜音變大。", "C": "蹲下使雜音變小。", "D": "左側躺增加回流，不加強。"}, "sources": ["2024 ACC/AHA Hypertrophic Cardiomyopathy Guideline"]}}, "103100-03": {"quick": "心肌梗塞後病人出現失代償心衰竭(肺囉音、頸靜脈怒張)合併低血壓與心搏過緩(46次)，應利尿並『減量或停用』metoprolol，故選D。", "detail": {"background": "病人為梗塞後心衰竭急性惡化，但同時有症狀性心搏過緩(46)與低血壓(100/45)，提示β-blocker(metoprolol)劑量過量或不耐受。處置為利尿緩解充血，並減量/暫停β-blocker；不需立即節律器，dobutamine非首選。", "options": {"A": "心搏過緩可由β-blocker造成，先調整用藥而非立即節律器。", "B": "甲狀腺檢查非此急性處置重點。", "C": "dobutamine非首選且有心律風險。", "D": "正確(本題答案)。利尿並減量/停用metoprolol。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "103100-17": {"quick": "健康人血中白蛋白無法滲出肺微血管(維持膠體滲透壓)，敘述正確，故選A(本題後公布送分)。", "detail": {"background": "肺水腫由微血管靜水壓上升(心因性)或通透性增加(ARDS)造成。正常肺微血管不讓白蛋白滲出，維持膠體滲透壓。低白蛋白(腎病/肝硬化)主要造成周邊水腫/腹水，單純低白蛋白不易造成肺水腫(需合併靜水壓上升)。本題最終公布送分。", "options": {"A": "正確(本題答案)。正常人白蛋白不滲出肺微血管。", "B": "白蛋白與膠體滲透壓有關，非靜水壓。", "C": "膠體滲透壓>靜水壓會『減少』水腫。", "D": "低白蛋白主要致周邊水腫/腹水，非肺水腫。"}, "sources": ["Harrison's(肺水腫病生理)；考選部公告(本題送分)"]}}, "103100-18": {"quick": "服用α阻斷劑後晨起站立發生昏厥、迅速恢復、無失禁，最可能為姿勢性低血壓，故選A。", "detail": {"background": "α腎上腺素阻斷劑(治療攝護腺肥大)會擴張血管、造成姿勢性低血壓，尤其在晨起站立時；昏厥短暫、迅速恢復、無大小便失禁與後遺症，與癲癇(常有失禁/發作後混亂)不同。", "options": {"A": "正確(本題答案)。α阻斷劑致姿勢性低血壓。", "B": "VF會猝死，與此短暫恢復不符。", "C": "心因性休克不會自行迅速恢復。", "D": "癲癇常有失禁/發作後混亂，此例不符。"}, "sources": ["2017 ACC/AHA/HRS Syncope Guideline"]}}, "103100-19": {"quick": "寬脈壓(150/40)、強勁頸動脈搏動、心尖搏動點擴大、第二心音後高頻吹風樣舒張期雜音＝主動脈瓣閉鎖不全，故選D。", "detail": {"background": "主動脈瓣閉鎖不全(AR)：寬脈壓、water-hammer/Corrigan脈、心尖左下移位，早期舒張高頻吹風樣雜音(坐前傾呼氣末最明顯)。二尖瓣狹窄為舒張中期低頻隆隆；三尖瓣逆流為收縮期；肺動脈瓣狹窄為收縮期噴射。", "options": {"A": "MS為低頻舒張中期隆隆。", "B": "TR為收縮期雜音。", "C": "PS為收縮期噴射雜音。", "D": "正確(本題答案)。AR為早期舒張高頻吹風樣雜音。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "103100-21": {"quick": "開放性動脈導管的雜音是『連續性』雜音，非舒張期雜音，故D錯誤。", "detail": {"background": "MVP有mid-systolic click後late systolic murmur；MR多為全收縮期雜音；AS為收縮中期噴射雜音傳向頸部；PDA為『連續性(機器樣)』雜音(收縮與舒張皆有)，非單純舒張期雜音。", "options": {"A": "正確。MVP之click與late systolic murmur。", "B": "正確。MR多為全收縮期。", "C": "正確。AS為收縮中期噴射、傳頸部。", "D": "錯誤(本題答案)。PDA為連續性雜音，非舒張期。"}, "sources": ["Braunwald's Heart Disease(雜音)"]}}, "103100-22": {"quick": "心房中隔缺損(ASD)不會出現連續性雜音(其為收縮期肺血流雜音)，故選C。", "detail": {"background": "連續性雜音(收縮與舒張皆有)見於PDA、冠狀動靜脈廔管、Valsalva竇動脈瘤破裂、主肺動脈間交通等(主動脈與低壓腔室間持續壓差)。ASD為左右心房間分流，產生的是肺動脈瓣區收縮期噴射雜音，非連續性。", "options": {"A": "PDA有連續性雜音。", "B": "冠狀動靜脈廔管有連續性雜音。", "C": "不會(本題答案)。ASD為收縮期雜音。", "D": "Valsalva竇動脈瘤破裂有連續性雜音。"}, "sources": ["Braunwald's Heart Disease(雜音)"]}}, "103100-23": {"quick": "完全正常的心電圖『不能』排除WPW(可為間歇性或隱匿性旁道)，故B錯誤。", "detail": {"background": "WPW典型心電圖為delta波、PR縮短、QRS增寬；但旁道可間歇性顯現或為『隱匿性』(僅逆向傳導)，故靜態心電圖正常不能排除。發作PSVT時若為antidromic或合併AF經旁道下傳，QRS可寬似VT；最常見PSVT為orthodromic AVRT。", "options": {"A": "正確。典型delta波、PR短、QRS寬。", "B": "錯誤(本題答案)。正常心電圖不能排除WPW。", "C": "正確。發作時QRS可寬似VT。", "D": "正確。最常見為orthodromic AVRT。"}, "sources": ["2015 ACC/AHA/HRS SVT Guideline"]}}, "103100-24": {"quick": "毛地黃(digoxin)可改善症狀但『不增加存活率』，故選B。", "detail": {"background": "HFrEF中能改善存活的藥物：ACEI/ARB(或ARNI)、β-blocker、醛固酮拮抗劑(spironolactone)、SGLT2抑制劑。Digoxin僅能減少住院/改善症狀，未證實降低死亡率。", "options": {"A": "ACEI降低死亡率。", "B": "無法增加存活(本題答案)。digoxin不降死亡率。", "C": "β-blocker降低死亡率。", "D": "spironolactone降低死亡率。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "103100-27": {"quick": "續發性高血壓最常見原因為腎實質病變(renal parenchymal disease)，故選A。", "detail": {"background": "整體次發性高血壓以腎實質疾病最常見；原發性醛固酮過多為最常見的『內分泌性』原因。嗜鉻細胞瘤、庫欣症候群相對少見。", "options": {"A": "正確(本題答案)。腎實質病變最常見。", "B": "原發性醛固酮過多為最常見內分泌原因。", "C": "嗜鉻細胞瘤少見。", "D": "庫欣症候群少見。"}, "sources": ["2017 ACC/AHA Hypertension Guideline"]}}, "103100-38": {"quick": "左上胸緣收縮期射出性雜音＋固定分裂S2＋P2加重＝心房中隔缺損(ASD)，故選B。", "detail": {"background": "ASD的標誌為固定分裂S2，左到右分流使肺血流增加產生肺動脈瓣區收縮期射出雜音，長期肺血流增加致P2加重/肺高壓。", "options": {"A": "VSD為左下胸骨緣全收縮期雜音。", "B": "正確(本題答案)。固定分裂S2＝ASD。", "C": "限制性心肌病變無固定分裂S2。", "D": "肺高壓為P2加重但無固定分裂S2之機轉。"}, "sources": ["Braunwald's Heart Disease(成人先天性心臟病)"]}}, "103100-50": {"quick": "深部靜脈栓塞一般較常發生於『下肢』，非上肢，故D錯誤。", "detail": {"background": "DVT好發於下肢深靜脈；懷疑時應儘早確診並開始抗凝；D-dimer多陽性(敏感度高、特異度低)；壓迫式都卜勒超音波為主要診斷工具。", "options": {"A": "正確。應儘早確診與抗凝。", "B": "正確。D-dimer多陽性。", "C": "正確。壓迫式都卜勒超音波可診斷。", "D": "錯誤(本題答案)。DVT較常發生於下肢，非上肢。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline"]}}, "103100-70": {"quick": "53歲無症狀成人之健檢篩檢，建議大腸癌篩檢(45–50歲起)，故選D。", "detail": {"background": "一般風險成人45–50歲起建議大腸癌篩檢(糞便潛血/大腸鏡)。攝護腺癌篩檢具爭議(需共同決策)；肺癌低劑量CT篩檢限重度吸菸者(此人不吸菸)；腹主動脈瘤超音波篩檢限65–75歲曾吸菸男性。", "options": {"A": "攝護腺癌篩檢具爭議，非首要建議。", "B": "肺癌篩檢限重度吸菸者，此人不吸菸。", "C": "AAA篩檢限65–75歲曾吸菸男性。", "D": "正確(本題答案)。建議大腸癌篩檢。"}, "sources": ["USPSTF Screening Recommendations"]}}, "103100-75": {"quick": "高血鉀(6.0)的處置以鈣穩定心肌、insulin/glucose與碳酸氫鈉移鉀為優先；atropine並非治療高血鉀的優先考量，故選D。", "detail": {"background": "高血鉀緊急處置：①calcium(穩定心肌膜)②insulin＋glucose、β2致效劑、碳酸氫鈉(將鉀移入細胞)③利尿/透析/陽離子交換樹脂(移除鉀)。atropine用於症狀性心搏過緩，並非治療高血鉀的優先藥物。", "options": {"A": "Calcium穩定心肌，是優先。", "B": "Insulin＋glucose移鉀，是優先。", "C": "碳酸氫鈉移鉀，可考慮。", "D": "不是優先(本題答案)。atropine非治療高血鉀。"}, "sources": ["Harrison's(高血鉀處置)"]}}, "103100-76": {"quick": "前胸導程V3–V4出現ST上升＝急性前壁STEMI，應優先做primary PCI，故選A。", "detail": {"background": "V3–V4 ST段上升為前壁STEMI(LAD)，若可即時施行，primary PCI為首選再灌流；曾置放支架更需評估支架內血栓/新病灶。GPIIb/IIIa非常規前置，溶栓不優於可即時的PCI，僅藥物保守治療不足。", "options": {"A": "正確(本題答案)。前壁STEMI優先primary PCI。", "B": "GPIIb/IIIa非常規前置必要。", "C": "可即時PCI時不應以溶栓為宜。", "D": "STEMI不可僅藥物保守治療。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "103100-77": {"quick": "到院前倒下約10分鐘之VF且已無脈，應先做5個循環CPR再評估心律、如仍VF則電擊，故選B。", "detail": {"background": "2010年ACLS：對於『非目擊』或到院前延遲(如已倒下數分鐘)的心室顫動，先給予一段CPR(約5循環/2分鐘)再評估並電擊，可提升電擊成功率；不應只顧插管而延誤胸外按壓。目擊型VF則應儘速電擊。", "options": {"A": "錯誤。不應只顧插管而延誤CPR。", "B": "正確(本題答案)。先5循環CPR再看心律、必要時電擊。", "C": "未先評估心律即電擊不妥。", "D": "非目擊/延遲者先CPR再電擊較佳。"}, "sources": ["2010 AHA CPR/ECC Guidelines"]}}, "104030-03": {"quick": "血壓118/82為正常脈搏壓，不支持嚴重主動脈瓣閉鎖不全(後者為寬脈壓)，故心臟擴大鑑別中D最不可能。", "detail": {"background": "心臟擴大伴心衰竭的常見原因：擴張型心肌病變、酒精性心肌病變(有酗酒史)、缺血性心臟病(HTN/DM/抽菸)。嚴重主動脈瓣閉鎖不全會造成『寬脈壓』(高收縮、低舒張)，本例脈壓正常(118/82)，故較不可能。", "options": {"A": "可能(擴張型心肌病變)。", "B": "可能(酗酒史)。", "C": "可能(多項危險因子)。", "D": "最不可能(本題答案)。嚴重AR應有寬脈壓，本例脈壓正常。"}, "sources": ["Braunwald's Heart Disease(心臟擴大鑑別)"]}}, "104030-23": {"quick": "二尖瓣狹窄最常見原因為風濕熱，故選D。", "detail": {"background": "成人二尖瓣狹窄絕大多數由風濕性心臟病(風濕熱後遺)造成；少見原因包括重度瓣環鈣化、先天性、結締組織病等。", "options": {"A": "先天性少見。", "B": "瓣環鈣化少見。", "C": "自體免疫病少見。", "D": "正確(本題答案)。風濕熱最常見。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "104030-24": {"quick": "慢性腎衰竭、頸靜脈怒張、心音微弱、低血壓、奇脈(深吸氣摸不到脈搏)、肺野乾淨＝心包膜填塞，故選A。", "detail": {"background": "尿毒症常致心包積液；填塞表現Beck三徵(低血壓、心音遙遠、頸靜脈怒張)、奇脈、竇性頻脈、肺野乾淨(非肺水腫)。確診心臟超音波，急救心包穿刺。", "options": {"A": "正確(本題答案)。心包膜填塞。", "B": "ACS不以此組合表現。", "C": "肺動脈高壓無奇脈/心音遙遠之填塞徵象。", "D": "鬱血性心衰竭多有肺囉音，非肺野乾淨。"}, "sources": ["Braunwald's Heart Disease(心包填塞)"]}}, "104030-25": {"quick": "長期吸菸、運動性呼吸困難、頸靜脈怒張、P2加重、下肢水腫＝肺心症(肺源性右心衰竭)，故選C。", "detail": {"background": "肺心症(cor pulmonale)為慢性肺病/肺高壓造成右心室肥大/衰竭：右心衰竭徵象(頸靜脈怒張、下肢水腫)、P2加重、可有功能性三尖瓣逆流之收縮期雜音。", "options": {"A": "縮窄性心包炎有Kussmaul/心包敲擊音，型態不同。", "B": "限制型心肌病變表現不同。", "C": "正確(本題答案)。肺心症。", "D": "ACS為急性缺血表現。"}, "sources": ["2022 ESC/ERS Pulmonary Hypertension Guideline"]}}, "104030-26": {"quick": "右上胸骨緣(第二肋間)收縮期射出型雜音、傳向頸部、S4、心臟大小正常＝主動脈瓣狹窄，故選C。", "detail": {"background": "主動脈瓣狹窄：右上胸骨緣收縮中期噴射雜音傳向頸部、S4(心室肥厚僵硬)、脈搏延遲微弱、心臟大小可正常(向心性肥厚)。血行動力學會見左心室-主動脈間收縮期壓力差。", "options": {"A": "MS為心尖舒張中期隆隆。", "B": "MR為心尖全收縮期傳左腋下。", "C": "正確(本題答案)。主動脈瓣狹窄。", "D": "AR為舒張期雜音、寬脈壓。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "104030-27": {"quick": "85歲主動脈瓣狹窄(運動性呼吸困難、昏厥、收縮期噴射雜音傳右頸)，未治療出現心衰竭後存活約1.5–2年，故選C。", "detail": {"background": "老年AS主要為退化性鈣化(非風濕性)；嚴重度以『主動脈瓣』瓣口面積/壓差評估(非二尖瓣)；出現症狀後預後差(心衰竭約2年)；治療首選為瓣膜置換(AVR/TAVR)，氣球擴張在成人角色有限。", "options": {"A": "錯誤。老年AS多為退化性鈣化。", "B": "錯誤。應測主動脈瓣口面積。", "C": "正確(本題答案)。未治療存活約1.5–2年。", "D": "錯誤。氣球擴張非首選，應瓣膜置換。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "104030-58": {"quick": "懷疑嗜鉻細胞瘤但腎上腺CT找不到腫瘤，下一步以MIBG核醫掃描找腎上腺外/轉移病灶，故選A。", "detail": {"background": "VMA/兒茶酚胺升高提示嗜鉻細胞瘤；若腎上腺影像陰性，應以131I-MIBG(或DOTATATE PET)做功能性全身定位，尋找腎上腺外副神經節瘤或轉移。", "options": {"A": "正確(本題答案)。MIBG核醫掃描定位。", "B": "胸部CT非首選功能性定位。", "C": "胸部MRI非首選功能性定位。", "D": "Tc-Sestamibi用於心肌/副甲狀腺，非此用途。"}, "sources": ["Endocrine Society Pheochromocytoma Guideline (2014)"]}}, "104030-62": {"quick": "靜脈毒癮者心內膜炎、發燒呼吸困難、心雜音、肺部多處浸潤(敗血性肺栓塞)，最可能為金黃色葡萄球菌，故選C。", "detail": {"background": "IVDU心內膜炎好侵右側三尖瓣，最常見致病菌為S. aureus，可造成敗血性肺栓塞(胸部X光多發病灶)。", "options": {"A": "Klebsiella少見。", "B": "Proteus少見。", "C": "正確(本題答案)。S. aureus最常見。", "D": "S. pyogenes少見。"}, "sources": ["2023 ESC Endocarditis Guideline"]}}, "104090-02": {"quick": "二尖瓣狹窄(S1增強、opening snap、舒張中期隆隆)；當心衰竭加重、心輸出量低時，隆隆雜音強度可能減弱甚至消失，故選D。", "detail": {"background": "MS：S1增強(瓣膜尚柔軟)、opening snap、心尖舒張中期低頻隆隆。嚴重度由『A2–OS間距縮短』判斷(越短越嚴重，非越長)。心跳快會縮短舒張期、惡化MS，故應控制心率(降心率有益)。當心輸出量很低時，通過瓣膜的血流減少，雜音可變弱/消失。", "options": {"A": "錯誤。S1增強不代表不嚴重。", "B": "錯誤。A2–OS『縮短』才代表越嚴重。", "C": "錯誤。心跳快惡化MS，應降心率。", "D": "正確(本題答案)。低心輸出時雜音可減弱/消失。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "104090-03": {"quick": "右上胸骨緣收縮期射出型雜音傳向頸部、S4、心臟大小正常，血行動力顯示左室-主動脈壓差＝主動脈瓣狹窄，故選C。", "detail": {"background": "主動脈瓣狹窄之典型聽診與血行動力學：右上胸骨緣收縮中期噴射雜音傳向頸部、S4、脈搏延遲微弱，心導管見左心室收縮壓高於主動脈(跨瓣壓差)。", "options": {"A": "MS為心尖舒張中期隆隆。", "B": "MR為心尖全收縮期。", "C": "正確(本題答案)。主動脈瓣狹窄。", "D": "AR為舒張期雜音、寬脈壓。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "104090-18": {"quick": "陳舊性心肌梗塞需長期aspirin二級預防；擔心胃潰瘍時，處方PPI(esomeprazole)搭配aspirin是恰當作法，故選B。", "detail": {"background": "梗塞後病人aspirin為二級預防基石。有消化性潰瘍風險者，宜加上質子幫浦抑制劑(PPI)做胃保護並『繼續』aspirin，而非改用效果較差的dipyridamole。clopidogrel為aspirin不耐受時的替代，但仍有腸胃出血風險。", "options": {"A": "dipyridamole二級預防效果較差，不宜以此取代。", "B": "正確(本題答案)。PPI＋aspirin做胃保護。", "C": "clopidogrel為替代，非首選且仍有出血風險。", "D": "轉介內視鏡非當下首要處置。"}, "sources": ["2025 ACC/AHA ACS Guideline(二級預防與胃保護)"]}}, "104090-19": {"quick": "二尖瓣閉鎖不全(結構性心臟病)新發心房顫動者，不應使用class IC抗心律不整藥(flecainide/propafenone)，故D不適當。", "detail": {"background": "Class IC抗心律不整藥在『結構性心臟病』(瓣膜病、心衰竭、缺血)為禁忌(致心律不整風險)。新發AF處置：不穩定→電整流；穩定→rate control(β-blocker/diltiazem)；持續≥48小時(本題≥12小時)且無禁忌→抗凝以降中風風險。", "options": {"A": "恰當。不穩定可電整流。", "B": "恰當。穩定可rate control。", "C": "恰當。持續較久者考慮抗凝。", "D": "不適當(本題答案)。結構性心臟病禁用class IC。"}, "sources": ["2023 ACC/AHA AF Guideline"]}}, "104090-20": {"quick": "穩定型胸痛＋心尖收縮期雜音的初步評估用胸部X光、12導程心電圖、心臟超音波；24小時Holter不應列為初步檢查，故選B。", "detail": {"background": "穩定型胸痛/心雜音的初步檢查：靜態12導程心電圖、胸部X光、心臟超音波(評估瓣膜與功能)；24小時Holter用於評估『心律不整/心悸』，非此情境之初步項目。", "options": {"A": "胸部X光為初步檢查。", "B": "不應列為初步(本題答案)。Holter非此情境初步檢查。", "C": "12導程心電圖為初步檢查。", "D": "心臟超音波為初步檢查。"}, "sources": ["2021 ACC/AHA Chest Pain Guideline"]}}, "104090-21": {"quick": "腹部無痛搏動性腫塊＝腹主動脈瘤；直徑<5公分時5年破裂機率約1～2%，故選C。", "detail": {"background": "腹主動脈瘤(AAA)男性多於女性、多位於腎動脈『以下』；破裂風險隨直徑增加(小於約5公分風險低，約每5年1–2%；≥5.5公分風險明顯上升)；瘤內壁栓塞可脫落造成周邊動脈栓塞。", "options": {"A": "錯誤。男性多於女性。", "B": "錯誤。多在腎動脈以下。", "C": "正確(本題答案)。<5公分5年破裂約1–2%。", "D": "錯誤。壁栓塞會增加周邊栓塞風險。"}, "sources": ["2022 ACC/AHA Aortic Disease Guideline"]}}, "104090-58": {"quick": "85歲鬱血性心衰竭、喘惡化、心率152不規則、雙側肺底囉音、體重增加＝急性肺水腫(常因快速心房顫動誘發)，故選A。", "detail": {"background": "急性失代償心衰竭/肺水腫：呼吸困難、雙側肺囉音、頸靜脈怒張、體重增加(體液滯留)；快速心房顫動(心率152不規則)為常見誘因。處置：氧氣、利尿、硝酸鹽、控制心率。", "options": {"A": "正確(本題答案)。急性肺水腫。", "B": "氣胸為單側、無囉音。", "C": "膿胸為感染性肋膜積液。", "D": "肺栓塞不以雙側肺囉音/體重增加表現。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "104090-59": {"quick": "承上題，心率快且節律不規則之心電圖診斷為心房顫動，故選C。", "detail": {"background": "心房顫動心電圖為『不規則的不規則』、無清楚P波；本例心率152不規則符合快速心房顫動，為其急性肺水腫之誘因。", "options": {"A": "AVNRT為規則窄QRS。", "B": "STEMI為ST上升，非此節律。", "C": "正確(本題答案)。心房顫動。", "D": "RVH為形態變化，非心律診斷。"}, "sources": ["2023 ACC/AHA AF Guideline"]}}, "104090-62": {"quick": "血脂代謝流程中甲＝VLDL、乙＝LDL、丙＝chylomicron，故選C。", "detail": {"background": "乳糜微粒(chylomicron)由腸道吸收脂肪後生成、運送外源性三酸甘油酯；肝臟分泌VLDL運送內源性三酸甘油酯，VLDL經脂解後轉為LDL(運送膽固醇)。故圖中甲=VLDL、乙=LDL、丙=chylomicron。", "options": {"A": "順序錯誤。", "B": "含HDL，順序錯誤。", "C": "正確(本題答案)。甲VLDL、乙LDL、丙chylomicron。", "D": "順序錯誤。"}, "sources": ["Harrison's(脂蛋白代謝)"]}}, "104090-75": {"quick": "無意識、無脈搏，心電圖為不可電擊心律(asystole/PEA)時，處置為立即CPR，故選D。", "detail": {"background": "無脈搏的心臟停止依心律分『可電擊』(VF/無脈性VT→去顫)與『不可電擊』(asystole/PEA→不電擊，立即高品質CPR並找可逆原因)。atropine已不再用於無脈性停止。", "options": {"A": "雙相電擊用於VF/無脈性VT。", "B": "單相360J用於VF/無脈性VT。", "C": "atropine不用於無脈性停止。", "D": "正確(本題答案)。不可電擊心律→立即CPR。"}, "sources": ["AHA CPR/ECC Guidelines(ACLS)"]}}, "105020-03": {"quick": "拔牙後發燒、心尖(apex)收縮期雜音＝二尖瓣感染性心內膜炎，故選C。", "detail": {"background": "牙科處置可致暫時性菌血症；心尖收縮期雜音對應二尖瓣。瓣膜性心臟病病人拔牙後發燒、新/變化之心尖雜音、栓塞徵象，高度懷疑二尖瓣感染性心內膜炎。", "options": {"A": "主動脈瓣雜音在右上胸骨緣。", "B": "肺動脈瓣在左上胸骨緣。", "C": "正確(本題答案)。心尖雜音＝二尖瓣。", "D": "三尖瓣在左下胸骨緣、吸氣增強。"}, "sources": ["2023 ESC Endocarditis Guideline"]}}, "105020-04": {"quick": "心肌梗塞後2週出現胸痛＋低度發燒、無感染、ECG無變化＝梗塞後心包炎(Dressler)，治療以高劑量aspirin，故選B。", "detail": {"background": "梗塞後心包炎(早期或Dressler syndrome)可有胸痛、低度發燒、心包摩擦音(未必出現)。梗塞後病人之心包炎治療首選『高劑量aspirin』；應避免其他NSAID與類固醇(可能影響心肌癒合)。", "options": {"A": "類固醇可能影響心肌癒合，不宜。", "B": "正確(本題答案)。梗塞後心包炎以高劑量aspirin。", "C": "無新缺血/血栓證據，非抗凝適應。", "D": "非典型心絞痛，加重狹心症藥非對症。"}, "sources": ["2025 ACC/AHA ACS Guideline；2015 ESC Pericardial Diseases"]}}, "105020-05": {"quick": "BMI 31屬肥胖，於此血壓範圍，減重約9公斤對降血壓效果最明顯，故選C。", "detail": {"background": "生活型態介入降壓效果：減重對肥胖者最顯著(每減約1 kg約降1 mmHg)，其次為DASH飲食、限鈉、規律有氧運動、限酒。本例BMI 31，減重效益最大。", "options": {"A": "少量步行效果有限。", "B": "作息正常非主要降壓措施。", "C": "正確(本題答案)。減重約9公斤效果最明顯。", "D": "限鹽有幫助但對肥胖者不及減重。"}, "sources": ["2017 ACC/AHA Hypertension Guideline(生活型態)"]}}, "105020-22": {"quick": "血栓溶解劑非例行用於非ST段上升急性冠心症(NSTE-ACS)，故選C。", "detail": {"background": "NSTE-ACS為非完全阻塞，溶栓無益甚至有害，不可使用(僅STEMI用)。例行治療為抗血小板(aspirin＋P2Y12)、抗凝(肝素/LMWH)、硝酸鹽、β-blocker、依風險侵入。", "options": {"A": "抗血小板為例行。", "B": "靜脈硝酸鹽可用。", "C": "非例行(本題答案)。溶栓不用於NSTE-ACS。", "D": "抗凝為例行。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "105020-23": {"quick": "年齡超過75歲為溶栓的『相對』禁忌，不是絕對禁忌，故選A。", "detail": {"background": "溶栓『絕對』禁忌：曾有顱內出血、3個月內缺血性中風、已知腦血管病變/腫瘤、活動性出血、疑主動脈剝離、近期頭部外傷等。年齡>75歲與血壓>180/110屬『相對』禁忌；本題以年齡>75為非絕對禁忌之最佳答案。", "options": {"A": "正確(本題答案)。年齡>75為相對禁忌。", "B": "曾腦出血為絕對禁忌。", "C": "嚴重高血壓屬相對禁忌(本題以A為答案)。", "D": "3個月內缺血性中風為絕對禁忌。"}, "sources": ["2025 ACC/AHA ACS Guideline(溶栓禁忌)"]}}, "105020-24": {"quick": "二尖瓣狹窄最常見的心律不整為心房顫動，故選C。", "detail": {"background": "二尖瓣狹窄使左心房壓力上升、擴大，最常併發心房顫動，並增加左心房血栓與栓塞風險(屬瓣膜性AF，須warfarin抗凝)。", "options": {"A": "心房早期收縮非最常見。", "B": "心室早期收縮非MS特徵。", "C": "正確(本題答案)。心房顫動最常見。", "D": "心房撲動較少。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "105020-67": {"quick": "甲狀腺刺激素(TSH)非新診斷高血壓的初步常規檢查，故選C。", "detail": {"background": "新診斷高血壓的初步評估常規包含：尿液常規、血鉀、空腹血糖、血脂、肌酸酐/eGFR、心電圖等(評估器官損傷與心血管風險、篩部分次發原因)。甲狀腺功能(TSH)非常規初步項目，僅在臨床懷疑甲狀腺疾病時安排。", "options": {"A": "尿液常規為初步檢查。", "B": "血鉀為初步檢查。", "C": "不是(本題答案)。TSH非常規初步檢查。", "D": "空腹血糖為初步檢查。"}, "sources": ["2017 ACC/AHA Hypertension Guideline"]}}, "105100-03": {"quick": "洗澡(屬低於日常的中等活動)即出現疲累、胸悶、心悸需休息，屬明顯限制的NYHA第三級，故選C。", "detail": {"background": "NYHA：II＝一般日常活動才出現症狀；III＝『低於』一般日常活動(如洗澡、走短距離)即出現症狀、明顯限制、休息無症狀；IV＝休息即有症狀。洗澡屬輕中度活動，即誘發症狀需休息，符合第三級。", "options": {"A": "I級無症狀。", "B": "II級為一般日常活動才症狀。", "C": "正確(本題答案)。低於日常活動即症狀＝III級。", "D": "IV級為休息即有症狀。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline(NYHA分級)"]}}, "105100-19": {"quick": "急性心衰竭合併肺水腫不以β-blocker為優先用藥(急性失代償期應避免起始/加量)，故選D。", "detail": {"background": "急性肺水腫主要用藥：利尿劑(減少前負荷/充血)、靜脈硝酸鹽(降前後負荷)、必要時強心/升壓劑(dopamine/dobutamine)、氧氣/正壓呼吸。β-blocker於急性失代償期會抑制代償、惡化血行動力，不應優先使用(待穩定後再起始)。", "options": {"A": "強心劑可用於低心輸出。", "B": "硝酸鹽為主要用藥。", "C": "利尿劑為主要用藥。", "D": "不是(本題答案)。急性期不優先用β-blocker。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "105100-20": {"quick": "肥厚型心肌病變出現氣促/胸痛時，不以利尿劑與硝酸鹽為首選(會減少前負荷、加重流出道阻塞)，故D錯誤。", "detail": {"background": "HCM約半數有家族史/基因變異、常聞S4、最常見死因為猝死。有流出道阻塞者治療用負性肌力藥(β-blocker、verapamil)；應避免利尿劑/硝酸鹽/血管擴張劑(減少前負荷會加重阻塞)。", "options": {"A": "正確。約半數有家族史/基因變異。", "B": "正確。常聞S4。", "C": "正確。最常見死因為猝死。", "D": "錯誤(本題答案)。利尿劑/硝酸鹽會加重流出道阻塞，非首選。"}, "sources": ["2024 ACC/AHA Hypertrophic Cardiomyopathy Guideline"]}}, "105100-21": {"quick": "飲酒後新發、持續數小時的心悸、心率140之心房顫動(holiday heart)，血壓穩定，可給amiodarone靜脈注射控制，故選C。", "detail": {"background": "『假日心臟症候群(holiday heart)』為飲酒後誘發的新發心房顫動。血流動力學穩定者可用藥物控制心率/節律(如amiodarone、β-blocker、diltiazem)；不穩定才電整流。新發、持續較久者需評估抗凝(非急性立即靜脈heparin為首要處置)。", "options": {"A": "coumadin口服非急性處置。", "B": "穩定者不需立即電擊。", "C": "正確(本題答案)。amiodarone靜脈注射控制。", "D": "靜脈heparin非當下首要處置。"}, "sources": ["2023 ACC/AHA AF Guideline"]}}, "105100-22": {"quick": "毛地黃(digitalis)可改善症狀但無法延長HFrEF病人壽命，故選C。", "detail": {"background": "HFrEF能延長壽命的藥物：ACEI/ARB(或ARNI)、β-blocker、醛固酮拮抗劑、SGLT2抑制劑、特定族群之hydralazine＋nitrate血管擴張劑組合。Digitalis僅改善症狀/減少住院，不降低死亡率。", "options": {"A": "ACEI延長壽命。", "B": "β-blocker延長壽命。", "C": "無法延長(本題答案)。digitalis不降死亡率。", "D": "特定血管擴張劑組合可延長壽命。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "105100-23": {"quick": "最常見的規則性陣發性上心室頻脈為房室結迴旋頻脈(AVNRT)，故選B。", "detail": {"background": "規則性PSVT最常見為AVNRT，其次為AVRT。心房撲動、心房顫動、多源性心房頻脈不屬『規則性PSVT』的最常見類型。", "options": {"A": "心房撲動非最常見PSVT。", "B": "正確(本題答案)。AVNRT最常見。", "C": "心房顫動為不規則。", "D": "多源性心房頻脈為不規則。"}, "sources": ["2015 ACC/AHA/HRS SVT Guideline"]}}, "105100-24": {"quick": "85歲高血壓病人昏倒、心電圖顯示緩脈/傳導異常，病因應先考慮『降壓藥物』引起(如β-blocker、非DHP鈣阻斷劑)，故選B。", "detail": {"background": "老年高血壓病人之心搏過緩/房室阻斷常與藥物有關(β-blocker、verapamil/diltiazem、digoxin)。若為心肌梗塞所致，房室阻斷較多見於『下壁』梗塞(非前壁)。處置應先停用/調整可疑藥物，必要時暫時節律器，不應立即直接置入永久節律器。", "options": {"A": "心電圖未必為三度房室阻斷。", "B": "正確(本題答案)。應考慮降壓藥物引起。", "C": "錯誤。藥物/缺血致房室阻斷多見於下壁梗塞。", "D": "錯誤。應先排除可逆藥物因素，非立即永久節律器。"}, "sources": ["2018 ACC/AHA/HRS Bradycardia Guideline"]}}, "105100-51": {"quick": "肺栓塞的診斷現主要靠CT肺動脈攝影，傳統肺血管攝影已非主要工具，故B錯誤。", "detail": {"background": "肺栓塞症狀(呼吸困難、胸痛、咳血)不具特異性；現行確診主要為『CT肺動脈攝影(CTPA)』；傳統導管肺血管攝影為舊式黃金標準但侵入性、現少用。D-dimer敏感度高、特異度低；核醫通氣-灌注掃描呈現不吻合。", "options": {"A": "正確。症狀不具特異性。", "B": "錯誤(本題答案)。現主要靠CTPA，非傳統肺血管攝影。", "C": "正確。D-dimer高敏感、低特異。", "D": "正確。V/Q掃描呈現通氣-灌注不吻合。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline"]}}, "105100-59": {"quick": "院內感染的腸球菌(nosocomial Enterococcus)不屬於『典型』感染性心內膜炎菌血症菌種，故選C。", "detail": {"background": "Duke準則中『典型IE菌』包括viridans strep、Streptococcus bovis、HACEK、社區型(無原發灶)S. aureus或腸球菌、以及Coxiella burnetii(Q熱，單次陽性/血清學即為主要條件)。院內感染來源的腸球菌不屬『典型』之列。", "options": {"A": "Strep bovis為典型。", "B": "社區型S. aureus為典型。", "C": "不屬典型(本題答案)。院內感染腸球菌非典型。", "D": "Coxiella burnetii(Q熱)為典型。"}, "sources": ["Modified Duke Criteria；2023 ESC Endocarditis Guideline"]}}, "105100-62": {"quick": "rifampin為強力CYP酵素誘導劑，會加速warfarin代謝、降低抗凝效果(增加劑量仍難達標)，故選D。", "detail": {"background": "warfarin經CYP代謝。『誘導劑』(rifampin、carbamazepine、barbiturates)加速其代謝、降低抗凝效果，需增加劑量仍難達標；『抑制劑』(amiodarone、cimetidine、fluconazole、metronidazole等)則增強抗凝、易出血。本例肺結核治療含rifampin，故抗凝效果不彰。", "options": {"A": "amiodarone為抑制劑，會增強抗凝。", "B": "cimetidine為抑制劑。", "C": "fluconazole為抑制劑。", "D": "正確(本題答案)。rifampin為誘導劑，降低抗凝效果。"}, "sources": ["Harrison's(warfarin藥物交互作用)"]}}},LECT={"心臟衰竭": {"title": "心臟衰竭 Heart Failure", "html": "\n<h4>一、定義與分類</h4>\n<p>心衰竭依左心室射出分率(LVEF)分為：<b>HFrEF（≤40%）</b>、<b>HFmrEF（41–49%）</b>、<b>HFpEF（≥50%）</b>。HFrEF以收縮功能下降為主；HFpEF以舒張功能障礙為主，常見於<b>多年高血壓的老年人</b>、肥胖、糖尿病、心房顫動。病因以<b>冠狀動脈疾病最常見</b>，其次高血壓、瓣膜病、心肌病變（可家族遺傳）。神經內分泌活化（RAAS、交感神經）造成心室重塑是惡化核心。</p>\n<h4>二、臨床表現與身體診察</h4>\n<ul>\n<li><b>左心衰竭</b>：運動性呼吸困難、端坐呼吸、陣發性夜間呼吸困難、肺囉音、第三心音(S3，收縮性)、第四心音(S4，舒張性)、心尖搏動點向左下移位。</li>\n<li><b>右心衰竭</b>：頸靜脈壓上升、肝腫大、腹水、下肢水腫、<b>腹頸靜脈逆流陽性＝容積過載</b>。</li>\n<li><b>交替脈(pulsus alternans)＝嚴重左心室收縮功能不良</b>的徵象（與心電圖electrical alternans不同）。</li>\n</ul>\n<h4>三、NYHA 功能分級（高頻考點）</h4>\n<p>I＝無症狀、日常活動不受限；<b>II＝日常活動會出現症狀、休息無症狀（輕度限制）</b>；III＝低於日常活動即症狀（明顯限制）；IV＝休息即有症狀（如端坐呼吸）。以病人「當下」能力判定。</p>\n<h4>四、生物標記 BNP / NT-proBNP</h4>\n<ul>\n<li>收縮性、舒張性、左心、右心衰竭<b>皆會上升</b>；可評估嚴重度與預後。</li>\n<li>隨<b>年齡↑、腎功能差↑</b>；<b>肥胖者偏低</b>。單一灰色地帶數值不能單獨診斷。</li>\n<li><b>ARNI</b>抑制neprilysin會使<b>BNP上升</b>（不適合追療效），應改看不受影響、會下降的<b>NT-proBNP</b>。</li>\n</ul>\n<h4>五、治療（記住「能不能降死亡率」）</h4>\n<ul>\n<li><b>HFrEF 四大基石（皆降死亡率，無水腫也要用）</b>：RAS抑制劑（<b>ARNI優先</b>，或ACEI/ARB）、β-blocker（<b>carvedilol／bisoprolol／metoprolol succinate</b>；<b>propranolol無實證</b>）、醛固酮拮抗劑(MRA)、<b>SGLT2抑制劑</b>。</li>\n<li><b>利尿劑</b>僅緩解充血、<b>不改善存活</b>；furosemide可致<b>低血鈣、高尿酸</b>。</li>\n<li><b>應避免</b>：非雙氫吡啶CCB（verapamil/diltiazem，負性肌力）與多數CCB（不降死亡率）、NSAID、<b>thiazolidinedione(pioglitazone)會加重水鈉滯留／HF</b>。</li>\n<li><b>Hydralazine＋nitrate</b>：用於不能耐受RAS抑制劑者或特定族群加強，<b>非一律首選</b>。孕婦HF<b>禁ACEI/ARB</b>。</li>\n<li><b>裝置</b>：LBBB→CRT可改善收縮功能；LVEF≤35%（最佳藥物後）→ICD一級預防。</li>\n<li><b>HFpEF</b>：以利尿劑緩解充血、控制血壓與共病為主；ACEI/ARB未證實改善長期預後（SGLT2i近年顯示效益）。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：2022 AHA/ACC/HFSA Heart Failure Guideline；2021 ESC HF Guideline；Braunwald's Heart Disease。</p>\n"}, "冠狀動脈疾病(缺血性心臟病/心肌梗塞)": {"title": "冠狀動脈疾病 / 缺血性心臟病", "html": "\n<h4>一、病生理與分類</h4>\n<p>心肌缺氧＝氧氣供應<需求。穩定型心絞痛多為<b>固定狹窄</b>，發作短暫（數分鐘，休息/NTG緩解）；急性冠心症(ACS)為<b>斑塊破裂＋血栓</b>：<b>STEMI＝完全阻塞</b>（透壁缺血、ST上升）、<b>NSTEMI/不穩定心絞痛＝非完全阻塞</b>。STEMI責任血管常為原本「非嚴重狹窄」斑塊急性破裂。心肌梗塞通用定義：第1型自發、第5型(CABG相關)需troponin>10倍99百分位上限。</p>\n<h4>二、臨床與心電圖定位</h4>\n<ul>\n<li>典型壓迫性胸痛、放射、冒冷汗；部分以下巴/頸/肩/手臂不適（心絞痛等同症狀）或無痛（糖尿病、老人、女性）。</li>\n<li>定位：前壁(V1–V4)→<b>LAD</b>；下壁(II/III/aVF)→<b>RCA</b>（多數）；側壁(I/aVL/V5–6)→左迴旋支。</li>\n<li><b>下壁MI要加右側導程(V4R)</b>偵測<b>右心室梗塞</b>（低血壓＋頸靜脈鼓張＋肺野乾淨＋心搏過緩）；右室梗塞<b>依賴前負荷→快速輸液</b>，<b>禁硝酸鹽/利尿劑</b>。</li>\n<li>到院前猝死主因為<b>心室顫動(VF)</b>，非急性心衰竭。troponin升高可持續7–14天。</li>\n</ul>\n<h4>三、診斷工具與適切性</h4>\n<ul>\n<li>單次心肌酵素正常<b>不能排除MI</b>（需連續監測）。</li>\n<li>運動心電圖：致死風險約<b>萬分之一</b>；LBBB、LVH、digoxin、靜態ST異常會干擾判讀。</li>\n<li>核醫心肌灌注(SPECT)：可逆缺損＝缺血、固定缺損＝陳舊梗塞；多支「平衡性」缺血可能低估。鈣化分數(Agatston，不需顯影劑)用於<b>無症狀中風險分層</b>，非有症狀者首選。</li>\n<li>冠狀動脈攝影（心導管）仍為解剖診斷標準；CT未取代。穩定型冠心病<b>血管重建不減少MI/死亡</b>（僅緩解症狀；糖尿病多支病CABG優於PCI）。</li>\n</ul>\n<h4>四、藥物治療</h4>\n<ul>\n<li><b>β-blocker</b>減少耗氧→緩解心絞痛、降低梗塞後死亡率。<b>短效dihydropyridine CCB（nifedipine）於急性MI禁忌</b>（反射心搏過速）。</li>\n<li><b>aspirin為不可逆COX抑制劑</b>；硝酸鹽釋放NO活化<b>guanylyl cyclase</b>。</li>\n<li>STEMI：辨識後立即啟動再灌流（可即時則primary PCI優於溶栓），不等心肌酵素。<b>r-tPA禁用於NSTEMI/UA</b>。</li>\n<li>NSTE-ACS：抗血小板＋抗凝＋β-blocker＋硝酸鹽；<b>GRACE>140→24小時內早期侵入</b>；GPIIb/IIIa選擇性。氧氣僅SpO2<90%才給。</li>\n<li>二級預防：抗血小板、statin、β-blocker、ACEI、控制危險因子。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：2025 ACC/AHA ACS Guideline；2024 ESC Chronic Coronary Syndromes；2021 ACC/AHA Chest Pain；Braunwald's Heart Disease。</p>\n"}, "心律不整/傳導系統": {"title": "心律不整 / 傳導系統", "html": "\n<h4>一、心房顫動(AF)</h4>\n<ul>\n<li>最常見的持續性心律不整，<b>男性多於女性</b>，盛行率隨年齡上升（≥80歲約10%）。危險因子：高血壓、糖尿病、肥胖、甲亢、瓣膜病、睡眠呼吸中止。可致心搏過速性心肌病/心衰竭與血栓栓塞。</li>\n<li><b>中風風險用CHA2DS2-VASc</b>：充血性心衰1、高血壓1、年齡≥75為<b>2</b>、糖尿病1、中風/TIA/栓塞<b>2</b>、血管疾病1、年齡65–74為1、女性1（<b>DVT不是項目</b>）。</li>\n<li><b>瓣膜性AF（中重度二尖瓣狹窄或機械瓣膜）必須用warfarin</b>，不可只用DOAC。DOAC不劣於warfarin且出血較少；dabigatran有反轉劑idarucizumab；apixaban/dabigatran一天兩次、rivaroxaban/edoxaban一天一次；不可用aspirin替代抗凝。</li>\n<li><b>AF≥48小時或時間不明者，復律前須先抗凝3週或經食道超音波排除血栓</b>（不論CHA2DS2-VASc）。</li>\n</ul>\n<h4>二、室上性心搏過速(SVT)與處置原則</h4>\n<ul>\n<li>規則窄QRS心搏過速多為AVNRT/AVRT；<b>VT是寬QRS</b>，最不可能是窄QRS。</li>\n<li><b>穩定</b>：迷走刺激(carotid sinus massage/Valsalva)→<b>adenosine快速推注</b>→AV node阻斷劑(verapamil/diltiazem/β-blocker)。</li>\n<li><b>不穩定</b>（低血壓、休克、肺水腫、意識改變）：立即<b>同步電整流(cardioversion)</b>。<b>VF無脈→非同步去顫＋CPR</b>。</li>\n</ul>\n<h4>三、傳導阻斷、緩脈與其他</h4>\n<ul>\n<li>房室阻斷原因：下壁MI、藥物(β-blocker/digoxin/非DHP CCB)、退化、頸動脈竇過敏、萊姆病心臟炎等（貓抓病非典型）。症狀性緩脈/AV阻斷評估節律器。</li>\n<li>運動員生理性竇性心搏過緩、無症狀者不需治療。digoxin中毒致緩脈→查濃度、atropine、暫時節律器（<b>勿給硝酸鹽</b>）。</li>\n<li><b>抗心律不整 Vaughan Williams</b>：I鈉通道(flecainide，<b>1C可致Brugada樣ST上升</b>)、II β-blocker、III鉀通道(amiodarone/sotalol，延長QT)、<b>IV為verapamil/diltiazem（非amlodipine）</b>。digoxin<b>不</b>延長QT。</li>\n<li>低血鉀/低血鎂→QT延長→<b>尖端扭轉(torsades)</b>，補鎂；無效用isoproterenol或超速起搏提高心率。HCM/長QT/Brugada/CPVT為遺傳性；結構性心臟病的VT為後天性。</li>\n<li>ICD：猝死倖存者(二級預防)；最佳藥物後LVEF≤35%(一級預防)。適當ICD放電者預後反而較差。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：2023 ACC/AHA與2024 ESC AF Guideline；2015 ACC/AHA SVT；2018 Bradycardia；2017 VA/SCD Guideline；Braunwald's。</p>\n"}, "瓣膜性心臟病/心內膜炎": {"title": "瓣膜性心臟病 / 感染性心內膜炎", "html": "\n<h4>一、雜音定位與動態（必考）</h4>\n<ul>\n<li>收縮期(S1–S2)、舒張期(S2–S1)；可觸頸動脈上衝定時。正常人（兒童、孕婦）可有<b>無害性流動雜音</b>。</li>\n<li><b>MR</b>：心尖全收縮期、傳左腋下；<b>MS</b>：心尖<b>低頻舒張中期隆隆＋opening snap</b>（A2–OS越短越嚴重），S1早期增強；<b>AS</b>：右上胸骨緣收縮期噴射、傳頸部、pulsus parvus et tardus、窄脈壓；<b>AR</b>：早期舒張高頻吹風樣＋寬脈壓；<b>Austin Flint</b>＝AR逆流衝擊二尖瓣前葉之心尖舒張中晚期低頻雜音(功能性MS)。嚴重肺高壓→<b>Graham Steell</b>(PR)。</li>\n<li>動態：右心雜音(TR)<b>吸氣變大(Carvallo)</b>；Valsalva/站立(↓前負荷)使AS/MR變小、<b>HOCM變大</b>；蹲下相反。</li>\n</ul>\n<h4>二、各瓣膜重點</h4>\n<ul>\n<li><b>MS</b>多為<b>風濕性</b>（好發中年女性、台灣減少），瓣口正常4–6 cm²、<b><1 cm²重度</b>；常合併<b>AF</b>與次發性肺高壓；可咳血、肺栓塞、肺炎。</li>\n<li><b>AS</b>多為退化性鈣化（與動脈硬化危險因子相關）或二瓣性；早期<b>向心性肥厚</b>代償，晚期才擴大；出現症狀後存活：心絞痛~5年、<b>昏厥~3年、心衰竭~2年</b>，有症狀即建議置換；高手術風險者TAVR成效近似外科。</li>\n<li><b>MVP</b>：黏液樣變性(好發後葉)、年輕<b>女性</b>多、與Marfan相關、多無症狀；確診用<b>心臟超音波</b>。</li>\n<li>急性中重度逆流合併心衰竭→可用血管擴張劑降後負荷並早期手術。重度原發MR手術以<b>是否有症狀</b>為最優先(或EF≤60%、LVESD≥40mm)。AVR死亡率通常低於MVR；二尖瓣修補優於置換。</li>\n</ul>\n<h4>三、感染性心內膜炎(IE)</h4>\n<ul>\n<li>致病菌：自然瓣膜亞急性→viridans strep；急性/IVDU→<b>S. aureus</b>（好侵三尖瓣、敗血性肺栓塞）；人工瓣膜早期(<2月)→<b>表皮葡萄球菌</b>。</li>\n<li><b>Duke主要條件</b>：①典型菌兩套血培陽性(含HACEK) ②心內膜侵犯證據(超音波贅生物/膿瘍/新逆流)；發燒、Janeway/Osler屬<b>次要</b>。</li>\n<li>治療：viridans strep自然瓣膜用penicillin G q4h約4週；大贅生物高栓塞風險須評估手術。手術適應症：瓣膜破壞致心衰竭、瓣周膿瘍、人工瓣膜脫位、適當抗生素後持續菌血症（治療僅3天血培陽性尚屬早期）。</li>\n<li><b>預防性抗生素</b>僅限最高風險（人工瓣膜、曾患IE、未修復發紺性先天心病、修復用人工材料前6個月）；<b>MVP（即使有逆流）不需</b>。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：2020 ACC/AHA與2021 ESC/EACTS Valvular Heart Disease；2023 ESC Endocarditis；Braunwald's Heart Disease。</p>\n"}, "高血壓": {"title": "高血壓 Hypertension", "html": "\n<h4>一、分級與原發/次發</h4>\n<p>2017 ACC/AHA：正常<120/80、升高120–129/<80、第一期130–139或80–89、第二期≥140或≥90。原發性(essential)約占90%。<b>次發性整體以腎實質疾病最常見</b>；內分泌性中<b>原發性醛固酮過多最常見</b>。</p>\n<h4>二、次發性高血壓線索與檢查</h4>\n<ul>\n<li><b>低血鉀＋低腎素</b>→原發性醛固酮過多（篩aldosterone/renin比值ARR）。</li>\n<li><b>陣發頭痛/心悸/盜汗</b>→嗜鉻細胞瘤：Rule of 10s（10%雙側、惡性、腎上腺外、家族性…），查24h尿兒茶酚胺/metanephrine；術前<b>先α阻斷7–10天＋補液，必要時再β阻斷</b>（<b>勿單獨先給β</b>、<b>勿切片</b>）；VMA高但腎上腺無腫瘤→找腎上腺外。</li>\n<li>打鼾日間嗜睡→睡眠呼吸中止；腎動脈狹窄(年輕FMD、老年動脈硬化)；庫欣、肢端肥大、主動脈縮窄。</li>\n<li>初步評估查：肌酸酐/eGFR、鉀、尿液、血糖、血脂、心電圖；<b>尿酸與致病機轉關聯最低</b>。</li>\n</ul>\n<h4>三、治療與器官損傷</h4>\n<ul>\n<li><b>CKD（尤其蛋白尿）/糖尿病首選ACEI或ARB</b>；糖尿病血壓目標不比一般人寬鬆。痛風者避免thiazide。某些降壓藥(β-blocker)可遮蔽/誘發低血糖。DASH飲食可降壓。</li>\n<li><b>無症狀重度高血壓(urgency)勿快速降壓、勿舌下短效nifedipine</b>；有器官損傷(emergency)才靜脈控制性降壓。</li>\n<li><b>懷孕</b>：methyldopa／labetalol／長效nifedipine；<b>ACEI/ARB禁忌</b>。</li>\n<li>器官損傷：左心室肥厚、心衰竭、<b>心房顫動</b>；中風(最強危險因子，但<b>大多是缺血性</b>)；認知障礙/失智；腎損傷與<b>收縮壓</b>關係較密切。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：2017 ACC/AHA與2023 ESC Hypertension Guideline；Endocrine Society；Harrison。</p>\n"}, "心肌病變/心包疾病": {"title": "心肌病變 / 心包疾病", "html": "\n<h4>一、肥厚型心肌病變(HCM)</h4>\n<ul>\n<li>遺傳性，左心室肥厚多<b>青春期後</b>出現，以舒張障礙±流出道阻塞為特徵；雜音於左下胸骨緣、<b>↓前負荷(站立/Valsalva)變大</b>。</li>\n<li>治療用<b>負性肌力藥(β-blocker、verapamil)</b>；<b>避免digitalis、過度利尿與血管擴張</b>（會加重阻塞）。</li>\n<li><b>猝死危險因子</b>：猝死家族史、室壁≥30mm、不明原因暈厥、Holter非持續性VT、<b>運動時血壓反應異常</b>(非正常上升)；高危→ICD。難治阻塞→酒精中隔消融/外科肌肉切除。<10%進展為擴大型。</li>\n</ul>\n<h4>二、擴張型心肌病變</h4>\n<p>病因多元(感染、毒物、代謝、遺傳)；左室擴大、收縮下降；GDMT與CRT(LBBB)可改善收縮功能。</p>\n<h4>三、心包疾病</h4>\n<ul>\n<li><b>急性心包炎</b>：位置性、吸氣加重、前傾緩解；<b>高頻搔刮樣摩擦音</b>(前傾呼氣末最易聽，約85%)；ECG<b>廣泛凹形ST上升＋PR下降</b>；NSAID＋colchicine(約3個月)。</li>\n<li><b>心包填塞</b>：Beck三徵(低血壓、<b>心音遙遠</b>、頸靜脈怒張)、奇脈、x下降明顯/y消失；<b>緊急心包穿刺</b>。</li>\n<li><b>縮窄性心包炎</b>：RA壓高且x、y皆明顯(M/W)、<b>Kussmaul徵象(吸氣JVP上升)</b>、心包敲擊音、肺野乾淨、心臟不大；<b>Kussmaul可與填塞區分</b>。尿毒性心包炎→透析。</li>\n<li><b>心臟黏液瘤</b>：多左心房、女性、易碎絨毛狀→栓塞(中風)、心尖舒張期tumor plop、全身症狀；切除可治癒。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：2024 ACC/AHA HCM；2023 ESC Cardiomyopathies；2015 ESC Pericardial Diseases；Braunwald。</p>\n"}, "主動脈/周邊血管疾病": {"title": "主動脈 / 周邊血管疾病", "html": "\n<h4>一、急性主動脈剝離</h4>\n<ul>\n<li>撕裂痛轉移背/腹、<b>兩側脈搏/血壓不對稱</b>、分支阻塞(肢體/內臟/冠狀動脈→MI、破入心包→填塞)。</li>\n<li>Stanford A(升主動脈，前胸痛，較危險，須開刀) vs B(降主動脈)；DeBakey IIIa(限胸降)、<b>IIIb(延伸至腹主動脈)</b>。</li>\n<li>處置：<b>積極降壓降心率(β-blocker，SBP約100–120)</b>、止痛、<b>立即CT</b>；<b>禁用肝素</b>。危險因子：高血壓、Marfan/Ehlers-Danlos、二瓣性主動脈瓣、懷孕。</li>\n</ul>\n<h4>二、主動脈瘤</h4>\n<ul>\n<li><b>腹主動脈瘤多位於腎動脈以下</b>、動脈硬化性；無症狀<b>≥5.5cm</b>或快速增大才修補；EVAR短期死亡率低但再介入率較高。</li>\n<li>胸主動脈瘤：升主動脈(二瓣性高危)達門檻或女性7cm建議手術；<b>血管內支架(TEVAR)只用於降主動脈，升主動脈瘤仍以開刀為主</b>；降主動脈用CT/MRI(非經胸超音波)追蹤。</li>\n</ul>\n<h4>三、周邊血管</h4>\n<ul>\n<li><b>急性肢體缺血(6P)</b>：冰冷無脈疼痛感覺異常；<b>MS+AF栓塞最常見</b>；再灌流→<b>高血鉀、肌球蛋白尿(加重)、腔室腫脹(缺血越久越重)</b>。</li>\n<li>周邊動脈疾病(間歇性跛行，動脈硬化)。<b>雷諾現象</b>：原發性(輕、年輕女性)vs次發性(重，硬皮症、老年動脈硬化)，DHP鈣阻斷劑緩解。Buerger氏症(年輕吸菸者)。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：2022 ACC/AHA Aortic Disease Guideline；Harrison；Braunwald。</p>\n"}, "肺栓塞/肺動脈高壓/靜脈栓塞": {"title": "肺栓塞 / 肺動脈高壓 / 靜脈栓塞", "html": "\n<h4>一、靜脈血栓栓塞(VTE)危險因子(Virchow)</h4>\n<p>血流停滯(不動、手術、長途飛行)、高凝(癌症、懷孕、口服避孕藥、<b>遺傳性血栓傾向</b>—亞洲人以<b>protein C/S、antithrombin III缺乏</b>常見，<b>factor V Leiden極罕見</b>)、內皮損傷。糖尿病非強獨立危險因子。</p>\n<h4>二、深部靜脈栓塞與肺栓塞</h4>\n<ul>\n<li>DVT：<b>單側</b>下肢腫痛；抗凝。</li>\n<li>肺栓塞：突發呼吸困難、心搏過速、胸痛、低血壓；ECG<b>S1Q3T3</b>、右心室應變(V1–V4 T倒置)；<b>P2變大</b>；ABG低血氧＋低PaCO2(呼吸性鹼中毒)；<b>CT肺動脈攝影確診</b>；D-dimer<b>敏感度高、特異度低</b>；Wells準則(<b>胸痛非項目</b>)；<b>嚴重PE死因＝右心室衰竭致心因性休克</b>。</li>\n<li>治療：DOAC不劣於warfarin；嚴重者溶栓；療程3–6個月，<b>重大短暫誘發(手術/外傷)復發風險最低</b>，不明原因/癌症較高、考慮延長。</li>\n</ul>\n<h4>三、肺動脈高壓</h4>\n<p>初期症狀無專一性；<b>心臟超音波篩檢、右心導管確診</b>(平均肺動脈壓升高)；右心室肥厚徵象(RV heave、P2大、右側S4、JVD、ECG右軸/RVH)，以TR流速估PASP；次發原因(左心、肺病/COPD、CTEPH、結締組織病如硬皮症、門肺型)；<b>不以合併貧血為特徵</b>；病理為血管收縮與重塑。</p>\n<p style=\"font-size:12px;color:#475569\">來源：2019 ESC Pulmonary Embolism；2022 ESC/ERS Pulmonary Hypertension；Harrison。</p>\n"}, "血脂異常": {"title": "血脂異常 Dyslipidemia", "html": "\n<h4>一、脂蛋白代謝（必考觀念）</h4>\n<ul>\n<li>飲食脂肪→腸細胞組成<b>乳糜微粒</b>(經乳糜管)→血中三酸甘油酯由微血管內皮的<b>脂蛋白脂解酶(LPL)</b>水解(<b>非</b>荷爾蒙敏感性脂肪酶HSL，後者在脂肪細胞內分解儲脂)；VLDL→LDL；<b>LDL受體</b>為細胞攝取膽固醇最重要受體；<b>HDL負責逆向膽固醇運輸</b>。<b>statin抑制HMG-CoA還原酶(reductase，非oxidase)</b>。空腹三酸甘油酯主要由VLDL運送。</li>\n<li>LDL估算(Friedewald)：LDL ＝ 總膽固醇 − HDL − 三酸甘油酯/5。</li>\n</ul>\n<h4>二、治療</h4>\n<ul>\n<li>高LDL→<b>statin</b>首選(肌肉痠痛副作用)；高三酸甘油酯→<b>fibrate</b>首選(但<b>fibrate增加膽結石</b>；與statin併用增加橫紋肌溶解風險，<b>非絕對禁忌</b>)；niacin升HDL；omega-3降三酸甘油酯。</li>\n<li><b>高三酸甘油酯與心血管疾病有關</b>(非無關)。</li>\n</ul>\n<h4>三、特殊脂質異常</h4>\n<p><b>LPL缺乏(家族性乳糜微粒血症，第一型)</b>：極高三酸甘油酯、<b>發疹性黃色瘤、胰臟炎</b>，但<b>不以動脈硬化表現</b>(乳糜微粒太大)。黃色瘤：肌腱/伸肌面→高LDL；發疹性→高三酸甘油酯。</p>\n<p style=\"font-size:12px;color:#475569\">來源：2018 AHA/ACC Cholesterol；2019 ESC/EAS Dyslipidaemias；Harrison。</p>\n"}, "先天性心臟病": {"title": "先天性心臟病", "html": "\n<h4>一、左到右分流(出生不發紺)</h4>\n<ul>\n<li><b>ASD</b>：<b>固定分裂S2</b>(標誌)、左上胸骨緣肺血流收縮期雜音、右心室容積負荷→右室擴大、ECG<b>右軸＋V1 rSR'(不完全RBBB)</b>、可肺高壓/晚發心房性心律不整。</li>\n<li><b>VSD</b>：左下胸骨緣全收縮期雜音；小型常自行關閉。</li>\n<li><b>PDA</b>：連續性機器樣雜音。三者長期可因肺高壓逆轉(Eisenmenger)而發紺。</li>\n</ul>\n<h4>二、發紺型與其他</h4>\n<ul>\n<li><b>法洛氏四合症</b>：出生即發紺(右室流出道阻塞、右到左分流)；<b>缺氧發作(tet spell)</b>處置：膝胸位、給氧、輸液、鎮靜/morphine、β-blocker、phenylephrine升SVR；<b>禁血管擴張劑</b>。修補後晚期可LBBB型態VT、猝死。</li>\n<li><b>主動脈縮窄</b>：左鎖骨下動脈遠端近動脈韌帶；<b>上肢血壓高於下肢</b>、肋骨下緣凹痕(3–9肋)、肩胛間雜音；合併二瓣性主動脈瓣、Turner症；整體男>女。</li>\n<li>心內膜炎預防：<b>未修復發紺性</b>先天心病、用人工材料修復後<b>前6個月</b>需要；完整修復6個月後不需。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：Braunwald's Heart Disease（成人先天性心臟病）；ACC/AHA ACHD。</p>\n"}, "動脈粥狀硬化/心血管危險因子": {"title": "動脈粥狀硬化 / 心血管危險因子", "html": "\n<h4>危險因子與風險評估</h4>\n<ul>\n<li><b>主要(獨立)危險因子</b>：高血壓、吸菸、糖尿病、高LDL/低HDL(<40)、年齡/家族史。<b>適量飲酒非主要危險因子</b>；肥胖多透過其他因子間接作用。</li>\n<li><b>Framingham十年心血管風險</b>指標：年齡、性別、總膽固醇、HDL、收縮壓、吸菸、糖尿病。</li>\n<li>動脈粥狀硬化＝慢性發炎(MMP分解膠原使斑塊不穩)→破裂血栓→ACS。初級預防：生活型態、依風險給statin。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：2019 ACC/AHA Primary Prevention；Framingham Heart Study；Harrison。</p>\n"}, "心血管生理/藥理/心電圖/其他": {"title": "心血管生理 / 藥理 / 心電圖 / 其他", "html": "\n<h4>一、動作電位與心電圖</h4>\n<ul>\n<li>竇結：<b>Phase 4舒張期去極化(自律性)</b>、RMP較不極化、Phase 0慢(鈣依賴)；心室：Na Phase 0、Ca Phase 2平台；主要離子Na/K/Ca(<b>鎂不直接</b>)。</li>\n<li><b>PR間距</b>＝心房去極化＋房室延遲(<b>非心室去極化/QRS</b>)。<b>QT延長</b>：低血鈣、低血鉀/鎂、藥物(amiodarone/sotalol/quinidine)、蜘蛛膜下出血；<b>甲亢不延長</b>；digoxin(ST下凹，不延長QT)。WPW delta波定位旁道。高血鉀(高尖T、QRS增寬)→先給鈣。</li>\n</ul>\n<h4>二、心音、脈搏與血流動力</h4>\n<ul>\n<li>分裂：<b>矛盾分裂＝A2延後</b>(嚴重AS、LBBB)；寬分裂＝P2延後(RBBB、肺高壓)；<b>固定分裂＝ASD</b>。S3(收縮性HF/容積)、S4(僵硬心室)。</li>\n<li><b>寬脈搏壓</b>：AR、甲狀腺毒症、發燒、PDA、貧血(<b>AS為窄脈壓</b>)；奇脈(填塞)；<b>交替脈(嚴重左室功能不良)</b>；腹頸靜脈逆流/JVP＝容積/右心。</li>\n<li>休克：<b>心因性(SVR高)</b> vs 分布性(SVR低：敗血、過敏、神經性)。</li>\n</ul>\n<h4>三、暈厥與裝置</h4>\n<ul>\n<li><b>暈厥</b>：迷走神經性(最常見)、姿態性低血壓(站立3分內SBP↓≥20或DBP↓≥10)、心因性(心律不整/結構性，危險)；傾斜床用於迷走性；評估以心臟超音波/Holter/電生理(<b>非肺功能</b>)。</li>\n<li>機械循環支持：<b>IABP</b>(舒張期充氣→增加冠脈血流，收縮前消氣→降後負荷)、Impella、TandemHeart、ECMO。末期裝置：ICD可用磁鐵暫時關閉電擊；心律調節器一般不被視為延長死亡過程。</li>\n</ul>\n<p style=\"font-size:12px;color:#475569\">來源：Braunwald's Heart Disease；2017 ACC/AHA/HRS Syncope Guideline；Harrison。</p>\n"}},TOPIC_ORDER=["冠狀動脈疾病(缺血性心臟病/心肌梗塞)", "心臟衰竭", "心律不整/傳導系統", "瓣膜性心臟病/心內膜炎", "高血壓", "心肌病變/心包疾病", "主動脈/周邊血管疾病", "肺栓塞/肺動脈高壓/靜脈栓塞", "血脂異常", "先天性心臟病", "動脈粥狀硬化/心血管危險因子", "心血管生理/藥理/心電圖/其他"];
document.getElementById('total').textContent=DATA.length;
document.getElementById('exn').textContent=Object.keys(EXPL).length;
const elList=document.getElementById('list');let view='year';
const fTopic=document.getElementById('fTopic'),fYear=document.getElementById('fYear'),fExpl=document.getElementById('fExpl'),q=document.getElementById('q');
[...new Set(DATA.map(d=>d.topic))].sort((a,b)=>TOPIC_ORDER.indexOf(a)-TOPIC_ORDER.indexOf(b)).forEach(t=>{let o=document.createElement('option');o.value=t;o.textContent=t;fTopic.appendChild(o)});
[...new Set(DATA.map(d=>d.roc_year))].sort((a,b)=>b-a).forEach(y=>{let o=document.createElement('option');o.value=y;o.textContent='民國'+y+'年';fYear.appendChild(o)});
document.querySelectorAll('button.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('button.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');view=b.dataset.view;render()});
[fTopic,fYear,fExpl].forEach(s=>s.onchange=render);q.oninput=render;
function esc(s){return(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function lectureBlock(t){const L=LECT[t];if(!L)return '';return `<div class="lecture open"><div class="lhd" onclick="this.parentElement.classList.toggle('open')">📘 ${esc(L.title||t)}　複習講義（點此展開／收合）</div><div class="lbody">${L.html}</div></div>`;}
function card(d){
  const acc=d.accepted_answers||[],isCorr=d.answer_status&&d.answer_status!=='正常';
  const opts=['A','B','C','D'].filter(k=>d.options[k]!=null).map(k=>`<li class="${acc.includes(k)?'correct':''}"><span class="L">${k}</span><span>${esc(d.options[k])}</span></li>`).join('');
  const imgs=(d.images||[]).map(f=>`<img src="${f}" loading="lazy" onclick="this.classList.toggle('big')">`).join('');
  let ansline;
  if(d.answer_status==='送分(全給分)')ansline=`標準答案：${d.answer}（公布<b>一律給分／送分</b>）`;
  else if(isCorr&&d.answer_status.indexOf('多重')>-1)ansline=`<b>多重答案均給分</b>：${acc.join('、')}（原公布：${d.answer}）`;
  else ansline=`標準答案：${d.answer}`;
  const note=isCorr&&d.correction_note?`<div class="ans-note">考選部更正備註：${esc(d.correction_note)}</div>`:'';
  const ex=EXPL[d.id];let exHtml='';
  if(ex){let det='';if(ex.detail){const o=ex.detail.options||{};const ol=['A','B','C','D'].filter(k=>o[k]).map(k=>`<div class="optline"><b>${k}.</b> ${esc(o[k])}</div>`).join('');const src=(ex.detail.sources||[]).map(esc).join('；');det=`<button class="detbtn" onclick="this.nextElementSibling.classList.toggle('show')">完整詳解（背景＋逐選項）▾</button><div class="detail">${ex.detail.background?`<h4>📘 背景知識</h4><div>${esc(ex.detail.background)}</div>`:''}<h4>🔍 逐選項解析</h4>${ol}${src?`<div class="src">參考來源：${src}</div>`:''}</div>`;}exHtml=`${ex.quick?`<div class="quick"><b>⚡ 快速解答：</b>${esc(ex.quick)}</div>`:''}${det}`;}
  else exHtml=`<div class="todo">（詳解製作中）</div>`;
  const hasbadge=ex?'<span class="badge has">✦ 有詳解</span>':'';
  const warn=isCorr?`<span class="badge warn">⚠ ${esc(d.answer_status)}</span>`:'';
  return `<div class="card"><div class="meta"><span class="badge exam">${esc(d.exam_label)}</span><span class="qnum">第${d.q_num}題</span><span class="badge topic">${esc(d.topic)}</span>${hasbadge}${warn}</div>
   <div class="stem">${esc(d.stem)}</div>${imgs?`<div class="imgs">${imgs}</div>`:''}<ul class="opts">${opts}</ul>
   <button class="ansbtn" onclick="this.closest('.card').classList.toggle('open')">看答案＋詳解 ▾</button>
   <div class="answer"><div class="ans-main">✔ ${ansline}</div>${note}${exHtml}</div></div>`;
}
function render(){
  let rows=DATA.filter(d=>(!fTopic.value||d.topic===fTopic.value)&&(!fYear.value||d.roc_year==fYear.value)&&(!fExpl.value||EXPL[d.id]));
  const kw=q.value.trim().toLowerCase();if(kw)rows=rows.filter(d=>(d.stem+JSON.stringify(d.options)).toLowerCase().includes(kw));
  document.getElementById('count').textContent='顯示 '+rows.length+' 題';
  let h='';
  if(view==='year'){[...new Set(rows.map(d=>d.roc_year))].sort((a,b)=>b-a).forEach(y=>{const g=rows.filter(d=>d.roc_year===y).sort((a,b)=>(a.exam_round>b.exam_round?1:-1)||a.q_num-b.q_num);h+=`<div class="grouphd">民國${y}年 · ${g.length}題</div>`+g.map(card).join('')});}
  else{[...new Set(rows.map(d=>d.topic))].sort((a,b)=>TOPIC_ORDER.indexOf(a)-TOPIC_ORDER.indexOf(b)).forEach(t=>{const g=rows.filter(d=>d.topic===t).sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num);h+=`<div class="grouphd">${t} · ${g.length}題</div>`+lectureBlock(t)+g.map(card).join('')});}
  elList.innerHTML=h||'<p style="text-align:center;color:#888;padding:40px">無符合題目</p>';
}
render();
</script>
