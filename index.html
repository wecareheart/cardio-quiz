.gov.tw/exam/wFrmExamQandASearch.aspx?y=2013&e=102110", "source_question_pdf": "https://wwwq.moex.gov.tw/exam/wHandExamQandA_File.ashx?t=Q&code=102110&c=102&s=0103&q=1"}, {"id": "102110-13", "roc_year": 102, "ad_year": 2013, "exam_round": "第二次", "exam_label": "民國102年 第二次", "exam_code": "102110", "subject": "醫學(三)（內科、家醫科等）", "q_num": 13, "topic": "心臟衰竭", "stem": "張先生60 歲，因罹患高血壓、糖尿病長期規律服藥，最近2 天，走幾步路就會呼吸急促，睡覺時無 法平躺，坐著呼吸才比較舒服，另外走路時胸口悶痛，坐著休息時胸悶就比較緩解，最近胸痛的頻 率也比以前增加。張先生到急診求診，血壓160/90 毫米汞柱，心跳每分鐘130 下，體溫攝氏37 度， 呼吸每分鐘25 次，在無使用氧氣之下的血氧濃度88%，身體診查呈現如下，頸靜脈怒張（jugular vein engorgement），於心尖處有第2 度（Grade II/VI）心收縮雜音，S3 奔跑音（S3 gallop），雙側均有 肺囉音（rales），雙下肢水腫，心電圖呈現竇性心搏過速（sinus tachycardia）與V4-V6 有ST 段下降， 胸部X 光片呈現心臟肥大與肺水腫，對於張先生此次到急診的診斷，下列何者最不恰當？", "options": {"A": "心臟衰竭", "B": "肺心症（cor pulmonale）", "C": "急性肺水腫", "D": "急性冠心症"}, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "correction_note": "", "images": [], "source_page": "https://wwwq.moex.gov.tw/exam/wFrmExamQandASearch.aspx?y=2013&e=102110", "source_question_pdf": "https://wwwq.moex.gov.tw/exam/wHandExamQandA_File.ashx?t=Q&code=102110&c=102&s=0103&q=1"}, {"id": "102110-60", "roc_year": 102, "ad_year": 2013, "exam_round": "第二次", "exam_label": "民國102年 第二次", "exam_code": "102110", "subject": "醫學(三)（內科、家醫科等）", "q_num": 60, "topic": "瓣膜性心臟病/心內膜炎", "stem": "一位40 歲男性，因為發燒4 日合併胸痛及呼吸困難而被送至急診，身體診查發現雙手手腕及手肘有 多處扎針傷口，胸部X 光有多處散發性病灶，尿液檢查呈現heroin 陽性反應，血液檢查白血球數 14,900/μL，segment 88%，lymphocyte 10%，monocyte 2%，兩套血液培養在48 小時後細菌室通報有 革蘭氏陰性桿菌，此菌最有可能是：", "options": {"A": "Salmonella", "B": "Escherichia coli", "C": "Pseudomonas aeruginosa", "D": "HACEK organisms"}, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "correction_note": "", "images": [], "source_page": "https://wwwq.moex.gov.tw/exam/wFrmExamQandASearch.aspx?y=2013&e=102110", "source_question_pdf": "https://wwwq.moex.gov.tw/exam/wHandExamQandA_File.ashx?t=Q&code=102110&c=102&s=0103&q=1"}, {"id": "102110-61", "roc_year": 102, "ad_year": 2013, "exam_round": "第二次", "exam_label": "民國102年 第二次", "exam_code": "102110", "subject": "醫學(三)（內科、家醫科等）", "q_num": 61, "topic": "瓣膜性心臟病/心內膜炎", "stem": "承上題，患者經合適抗生素治療二週後，仍然持續發燒，心臟超音波顯示在三尖瓣膜有一1.2×1.4 公分 贅生物（vegetation），收縮壓100 mmHg，舒張壓60 mmHg，需要inotropic agent（dobutamine）維持 血壓，此時最需要且最合適的處理方式為：", "options": {"A": "繼續使用原本之抗生素，並考慮加上vancomycin 合併治療", "B": "使用抗凝血劑heparin 以改善肺栓塞惡化及避免發生心臟血栓", "C": "照會心臟外科考慮心臟瓣膜置換手術", "D": "加上強心劑digoxin 與增加靜脈輸液（生理食鹽水）以改善心輸出能力"}, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "correction_note": "", "images": [], "source_page": "https://wwwq.moex.gov.tw/exam/wFrmExamQandASearch.aspx?y=2013&e=102110", "source_question_pdf": "https://wwwq.moex.gov.tw/exam/wHandExamQandA_File.ashx?t=Q&code=102110&c=102&s=0103&q=1"}, {"id": "103030-03", "roc_year": 103, "ad_year": 2014, "exam_round": "第一次", "exam_label": "民國103年 第一次", "exam_code": "103030", "subject": "醫學(三)（內科、家醫科等）", "q_num": 3, "topic": "心律不整/傳導系統", "stem": "52 歲男性，因嚴重慢性阻塞性肺病急性發作，血中二氧化碳過高與呼吸衰竭而接受插管治療。即使給 予恰當鎮定治療，呼吸器仍反覆出現壓力過高警訊。臨床上發現心搏過速，檢查血壓112/68 mmHg，心 跳每分鐘180 次，右胸部呼吸音降低，心電圖呈現規則窄波QRS。考慮病人面臨的呼吸系統和心臟 循環系統出現的情況，下一步那一個檢查或治療是你的優先選擇？", "options": {"A": "肺部X 光", "B": "amiodarone 200 mg，靜脈注射", "C": "鎮定病人之後給予電擊（cardioversion）", "D": "adenosine 12 mg，靜脈快速注射"}, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "correction_note": "", "images": [], "source_page": "https://wwwq.moex.gov.tw/exam/wFrmExamQandASearch.aspx?y=2014&e=103030", "source_question_pdf": "https://wwwq.moex.gov.tw/exam/wHandExamQandA_File.ashx?t=Q&code=103030&c=102&s=0103&q=1"}, {"id": "103030-18", "roc_year": 103, "ad_year": 2014, "exam_round": "第一次", "exam_label": "民國103年 第一次", "exam_code": "103030", "subject": "醫學(三)（內科、家醫科等）", "q_num": 18, "topic": "心血管生理/藥理/心電圖/其他", "stem": "有關昏厥（syncope）之敘述，下列何者錯誤？", "options": {"A": "昏厥是指暫時性意識喪失，且能自行恢復", "B": "電腦斷層檢查是最重要的診斷工具", "C": "自律神經性失調為昏厥之常見原因", "D": "心律不整亦是造成昏厥的原因之一 代號：1102 頁次：12－4"}, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "correction_note": "", "images": [], .jpg"]}, {"id": "109080-11", "roc_year": 109, "ad_year": 2020, "exam_round": "第二次", "exam_label": "民國109年 第二次", "exam_code": "109080", "q_num": 11, "topic": "心血管生理/藥理/心電圖/其他", "stem": "有關心音paradoxical splitting之敘述，下列何者正確？", "options": {"A": "係指二尖瓣的關閉時間提前所致", "B": "在嚴重主動脈瓣狹窄病人身上出現時，代表主動脈瓣關閉時間延後所致", "C": "常出現在心電圖紀錄有right bundle branch block的病人", "D": "常出現在肺高壓合併右心衰竭的病人"}, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "correction_note": "", "images": []}, {"id": "109080-14", "roc_year": 109, "ad_year": 2020, "exam_round": "第二次", "exam_label": "民國109年 第二次", "exam_code": "109080", "q_num": 14, "topic": "心臟衰竭", "stem": "有關收縮性心衰竭的治療，下列何者不宜？", "options": {"A": "利尿劑：包括aldosterone拮抗劑", "B": "鈣離子阻斷劑：特別是verapamil及diltiazem", "C": "RAAS抑制劑：包括angiotensin converting enzyme inhibitor以及angiotensin II receptor antagonist類的藥物", "D": "降心跳藥物：包括乙型阻斷劑以及ivabradine"}, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "correction_note": "", "images": []}, {"id": "109080-40", "roc_year": 109, "ad_year": 2020, "exam_round": "第二次", "exam_label": "民國109年 第二次", "exam_code": "109080", "q_num": 40, "topic": "瓣膜性心臟病/心內膜炎", "stem": "一位75歲女性，5年前因為風濕性心臟病而裝置金屬心臟瓣膜，長期服用warfarin以防止血栓。某日例行性的 門診發現INR（international normalized ratio）是5.4，但是臨床上並無出血的現象。以下關於此藥物與這位病 人的處置，何者錯誤？", "options": {"A": "warfarin之抗凝血效果通常不會在服藥後立刻出現，因此需要在開始治療時，同時使用約5天的其他抗凝血藥 物，例如heparin，以快速達到抗凝血的效果", "B": "為了預防出血，此病人應該給與vitamin K靜脈注射，直到INR回到3以下", "C": "對於臨床上有出血的情況，fresh-frozen plasma（FFP）可以快速地補充vitamin K-dependent凝血因子", "D": "warfarin會抑制protein C與protein S的血中濃度，對於protein C或是protein S缺乏的病人，使用warfarin要特別 小心，以免引發血栓"}, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "correction_note": "", "images": []}, {"id": "109080-54", "roc_year": 109, "ad_year": 2020, "exam_round": "第二次", "exam_label": "民國109年 第二次", "exam_code": "109080", "q_num": 54, "topic": "高血壓", "stem": "一位26歲患者，外觀正常，身體質量指數（BMI）為20 kg/m2，無不適。健檢發現高血壓、低血鉀、心跳正 常。為了探討次發性高血壓的可能，此病患宜安排下列何種檢查最合適？", "options": {"A": "抽血檢驗aldosterone和plasma re 一次", "exam_label": "民國113年 第一次", "exam_code": "113020", "q_num": 12, "topic": "心肌病變/心包疾病", "stem": "關於肥厚型心肌症（hypertrophic cardiomyopathy）的描述，下列何者正確？", "options": {"A": "演變成擴大型心肌症的比率小於10%", "B": "大部分病人在出生時即有左心室肥厚的現象", "C": "若有左心室出口阻塞，藥物處理原則是擴張血管和降低心率", "D": "運動時血壓增加30 mmHg是猝死的危險因子"}, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "correction_note": "", "images": []}, {"id": "113020-14", "roc_year": 113, "ad_year": 2024, "exam_round": "第一次", "exam_label": "民國113年 第一次", "exam_code": "113020", "q_num": 14, "topic": "心律不整/傳導系統", "stem": "有關心室性心律不整（ventricular arrhythmia）與心臟猝死（sudden cardiac death）的敘述，下列何者 錯誤？", "options": {"A": "心室性心律不整的診斷是通過在心電圖上記錄心律不整，或通過植入的心律設備（如：心律調節器或植入 性心內去顫器〔Implanted Cardioversion Defibrillator, ICD〕）或在電生理檢查過程中引發的心律不 整來確定的", "B": "如果可能，面對心臟猝死的病患應獲取心律不整的十二導程心電圖，並研究潛在起源部位和潛在可能心臟 病", "C": "猝死的發生多見於心肌缺氧性心室顫動（ventricular fibrillation）。當有植入性心內去顫器 （Implanted Cardioversion Defibrillator, ICD）啟動而迅速終止心室心律不整時，代表病患在往後的 死亡率與心衰竭的風險均大幅減少", "D": "對於心室性心律不整的病患，其初始治療以穩定病患的血流動力學為處理目標"}, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "correction_note": "", "images": []}, {"id": "113020-52", "roc_year": 113, "ad_year": 2024, "exam_round": "第一次", "exam_label": "民國113年 第一次", "exam_code": "113020", "q_num": 52, "topic": "高血壓", "stem": "嗜鉻細胞瘤源自於交感或副交感神經系統，雖然比例上只占高血壓病患的0.1%，但如果沒有及時診斷，對於 心臟及腦血管病變，是個重大的威脅。下列有關嗜鉻細胞瘤的診斷及表現，何者錯誤？", "options": {"A": "嗜鉻細胞瘤可能的臨床表現包括：頭痛、焦慮及恐慌發作、多尿、姿勢性低血壓及血糖上升", "B": "正確診斷嗜鉻細胞瘤應該基於：病患之生化檢查顯示兒茶酚胺（catecholamine）過量以及影像學檢查腫瘤 之定位，兩者同樣重要", "C": "傳統上提及嗜鉻細胞瘤的\"Rule of ten\"包括：10%為單側腎上腺腫瘤（unilateral）、10%為惡性嗜鉻細胞 瘤（malignant pheochromocytoma），以及10%為腎上腺外之腫瘤（extraadrenal）", "D": "影像診斷學上，在施打顯影劑之後，電腦斷層（CT）及磁振造影（MRI）在診斷嗜鉻細胞瘤之敏感度是類似 的"}, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "correction_note": "", "images": []}, {"id": "113020-77", "roc_year": 113, "ad_year": 2024, "exam_round": "第一次", "exam_label": "民國113年 第一次", "exam_code": "113020", "q_num": 77, "topic": "心血管生理/藥理/心電圖/其他", "stem": "70歲男性因胸痛、冒冷汗、呼吸急促 神經受體（beta adrenergic receptor），如bisoprolol", "C": "Class Ⅲ藥物主要針對鉀離子通道（potassium channel），如amiodarone", "D": "Class Ⅳ藥物主要針對鈣離子通道（calcium channel），如amlodipine"}, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "correction_note": "", "images": []}, {"id": "115020-11", "roc_year": 115, "ad_year": 2026, "exam_round": "第一次", "exam_label": "民國115年 第一次", "exam_code": "115020", "q_num": 11, "topic": "心律不整/傳導系統", "stem": "58 歲男性，有慢性肺病和糖尿病病史，住院期間診斷為多重起源心房心搏過速（multifocal atrial tachycardia, MAT）。心電圖顯示130 bpm 的心率，並有三種不同形態的P 波。血液報告顯示正常的凝血功 能，並未使用抗凝劑。關於MAT 的血栓風險，下列敘述何者最適當？", "options": {"A": "MAT 的血栓風險類似於心房顫動（atrial fibrillation, AF）", "B": "MAT 的血栓風險目前缺乏大型臨床試驗證實", "C": "MAT 的血栓風險與心室顫動相同", "D": "MAT 患者需立即開始抗凝治療"}, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "correction_note": "", "images": []}, {"id": "115020-12", "roc_year": 115, "ad_year": 2026, "exam_round": "第一次", "exam_label": "民國115年 第一次", "exam_code": "115020", "q_num": 12, "topic": "高血壓", "stem": "下列血液檢查項目中，何者與高血壓致病機轉的探索最無相關？", "options": {"A": "肌酸酐", "B": "鉀離子", "C": "甲狀腺素", "D": "尿酸"}, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "correction_note": "", "images": []}, {"id": "115020-13", "roc_year": 115, "ad_year": 2026, "exam_round": "第一次", "exam_label": "民國115年 第一次", "exam_code": "115020", "q_num": 13, "topic": "冠狀動脈疾病(缺血性心臟病/心肌梗塞)", "stem": "心導管檢查可用於冠狀動脈心臟病之診斷，下列敘述何者最不適當？", "options": {"A": "於血管攝影時，冠狀動脈左前降支可能受心肌橋（myocardial bridge）壓迫，在心收縮期變細、舒張期恢 復正常", "B": "當冠狀動脈嚴重狹窄時，狹窄遠端血流會減少，以致顯影劑僅能微量充盈遠端血管，此種情況可定義為 TIMI 三級血流", "C": "血管內超音波（intravascular ultrasound, IVUS）及光學同調斷層攝影（optic coherence tomography, OCT）等檢查工具，可送入冠狀動脈內進行細部觀測，而OCT 之空間解析度高於IVUS，但可觀察之範圍深度 較淺", "D": "血流儲備分數（fractional flow reserve, FFR）實際上是測量狹窄遠端及近端的壓力比值，在以藥物引發 最大充血（maximal hyperemia）情況下，若FFR＜0.8 表示病灶狹窄程度顯著，具有影響血行動力學之意義"}, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "correction_note": "", "images": []}, {"id": "115020-14", "roc_year": 115, "ad_year": 2026, "exam_round": "第一次", "exam_label": "民國115年 第一次", "exam_code": "115020", "q_num": 14, "topic": "冠狀動脈疾病(缺血性心臟病/心肌梗塞)", "stem": "有關核醫心肌灌注掃描，下列敘述何者最不適當？", "options": {"A": "壓力催迫（stress）後，肺部攝取量增加（lung uptake），如附圖所示，可能代表嚴重且冠狀動脈多條血 管阻塞", "B": "在壓力測試後，若觀察到短暫左心室擴大，可能與冠狀動脈多條血管阻塞有關", "C": "壓力催迫（stress）後肺部攝取量增加和短暫左心室擴大，對於冠狀動脈疾病的診斷專一性，比大區域或多 處血管分布區域出現可逆性灌流缺損更高", "D": "在心臟以外區域若有Thallium-201 同位素蓄積，如附圖箭頭所示，有可能是乳房腫瘤"}, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "correction_note": "", "images": ["115020_q14_1.jpg"]}, {"id": "115020-65", "roc_year": 115, "ad_year": 2026, "exam_round": "第一次", "exam_label": "民國115年 第一次", "exam_code": "115020", "q_num": 65, "topic": "瓣膜性心臟病/心內膜炎", "stem": "心內膜炎即使在有效抗生素治療下，仍可能發生的併發症中，下列何者最不需要合併外科處置？", "options": {"A": "因為心瓣膜破損導致的嚴重心衰竭", "B": "心內膜炎進展至瓣膜周圍膿瘍（perivalvular abscess）", "C": "人工瓣膜脫位不穩（dehisced unstable prosthetic valve）", "D": "抗生素治療3 天後，血液培養仍為陽性"}, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "correction_note": "", "images": []}, {"id": "115020-73", "roc_year": 115, "ad_year": 2026, "exam_round": "第一次", "exam_label": "民國115年 第一次", "exam_code": "115020", "q_num": 73, "topic": "心律不整/傳導系統", "stem": "許多心臟病末期病人都有植入心律調節器（pacemakers）和植入式心臟去顫器（implantable cardioverter- defibrillators, ICDs）。關於使用上述裝置的描述，何者最不適當？", "options": {"A": "心律調節器被認為可能延長生命的終點", "B": "停用心律調節器可能會導致心絞痛或呼吸困難", "C": "ICDs 會引起類似電擊的疼痛，並被認為與急救過程的電擊一樣令人不舒服", "D": "在植入ICDs 裝置的部位，放置一塊約ICDs 大小的磁鐵，可以使ICDs 暫時失效無法電擊"}, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "correction_note": "", "images": []}],EXPL={"106020-19": {"quick": "STEMI 病人到院前（猝死）最常見死因是惡性心律不整——主要是心室顫動（VF），而非急性心衰竭，故 C 敘述錯誤。", "detail": {"background": "STEMI 是冠狀動脈粥狀斑塊破裂後形成「完全阻塞性血栓」，造成透壁性（transmural）心肌缺血而出現 ST 段上升。心肌壞死後 troponin 於數小時內上升，可維持約 7～14 天。急性期最致命的早期併發症是心室顫動（VF）導致的猝死，這也是病人尚未到院前最常見的死因；及早電擊去顫是降低死亡率的關鍵。下壁心肌梗塞常合併右心室梗塞，因此需加做右側胸導程（V3R–V4R）。", "options": {"A": "正確。STEMI 的病態生理即為粥狀斑塊破裂 → 血小板聚集與凝血瀑布活化 → 形成完全阻塞性血栓。", "B": "正確。Cardiac troponin 在梗塞後持續升高約 7～14 天（troponin I 約 7–10 天、troponin T 可達約兩週），「持續一週」屬合理描述。", "C": "錯誤（本題答案）。到院前死亡（猝死）最主要原因是惡性心室性心律不整（VF/VT），而非急性心衰竭。急性心衰竭/心因性休克是住院期的重要死因，但非到院前猝死主因。", "D": "正確。下壁心肌梗塞應例行加做右側胸導程（V4R）以偵測右心室梗塞，因為合併 RV infarction 會影響輸液與藥物（避免硝酸鹽、需積極補液）的處置。"}, "sources": ["2025 ACC/AHA/ACEP/NAEMSP/SCAI Acute Coronary Syndromes Guideline", "Braunwald's Heart Disease（STEMI 病生理與併發症，標準教科書概念）"]}}, "106080-05": {"quick": "此為下壁＋右心室梗塞（低血壓、頸靜脈鼓張、心搏過緩）。A（下壁）、B（後壁/對應性變化）、C（右室 V4R）都相關；PR 段壓低是心包炎/心房梗塞的表現，與此診斷最無關，故選 D。", "detail": {"background": "題目描述 RCA 阻塞造成的下壁＋右心室梗塞：下壁缺血刺激迷走神經（Bezold–Jarisch reflex）與 AV node 缺血→心搏過緩；右心室梗塞→右心衰竭表現（頸靜脈鼓張、低血壓、肺野乾淨）。對應心電圖會看到下壁導程 ST 上升、右側導程（V4R）ST 上升、前胸導程的對應性 ST 壓低（後壁延伸）。", "options": {"A": "相關。Lead II、III、aVF 的 ST 上升即為下壁梗塞的定義性變化。", "B": "相關。V1、V2 的 ST 壓低為下壁/後壁梗塞常見的對應性（reciprocal）變化或後壁延伸表現。", "C": "相關。V4R 的 ST 上升是右心室梗塞的指標，與本病人低血壓＋頸靜脈鼓張的臨床表現一致。", "D": "最無關（本題答案）。PR 段壓低是急性心包炎（或心房梗塞）的特徵，並非急性下壁/右室心肌梗塞的典型心電圖變化。"}, "sources": ["2025 ACC/AHA/ACEP/NAEMSP/SCAI Acute Coronary Syndromes Guideline（右室梗塞之辨識與處置）", "Braunwald's Heart Disease（心電圖定位與右室梗塞）"]}}, "112020-08": {"quick": "AR 的「早期舒張期吹風樣雜音」就是 AR 本身的雜音；Austin Flint murmur 是 AR 逆流噴流衝擊二尖瓣前葉造成的「心尖、舒張中晚期、低頻隆隆樣」雜音（功能性 MS），故 B 命名錯誤。", "detail": {"background": "瓣膜雜音的辨識是內科與心臟科常考重點。重點配對：嚴重肺高壓→肺動脈瓣環擴大→PR→Graham Steell murmur（左胸骨緣舒張期）；AR→主動脈瓣早期舒張期高頻吹風樣雜音；Austin Flint murmur→AR 逆流衝擊二尖瓣前葉造成的功能性二尖瓣狹窄雜音（心尖、舒張中晚期、低頻）；MS→opening snap＋心尖舒張中期隆隆雜音；MR→心尖全收縮期雜音、傳至左腋下。", "options": {"A": "正確。嚴重肺高壓→肺動脈瓣閉鎖不全→左胸骨緣舒張期雜音＝Graham Steell murmur。", "B": "錯誤（本題答案）。AR 的早期舒張期吹風樣雜音就是 AR 雜音本身；Austin Flint murmur 指的是 AR 逆流造成的心尖、低頻、舒張中晚期隆隆樣雜音（功能性 MS），命名張冠李戴。", "C": "正確。嚴重 MS 可聞 opening snap，位於心尖內側、第二心音後約 0.05–0.12 秒；A2–OS 間距越短代表 MS 越嚴重。", "D": "正確。MR 雜音為心尖部全收縮期雜音，並向左腋下傳導。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline；2021 ESC/EACTS Valvular Heart Disease Guideline", "Braunwald's Heart Disease（心臟聽診與雜音）"]}}, "110080-10": {"quick": "血流動力學「穩定」的窄 QRS、規則心搏過速（SVT）：應先用迷走神經刺激／adenosine／AV node 阻斷劑（verapamil）。直接胸前電擊（cardioversion）是保留給「不穩定」病人，故最不恰當為 A。", "detail": {"background": "窄 QRS、規則、HR 約 150–180、血壓穩定者最可能為陣發性室上性心搏過速（PSVT，多為 AVNRT/AVRT）。穩定病人的處置階梯：①迷走神經刺激（Valsalva、carotid sinus massage）②adenosine 靜脈快速推注 ③AV node 阻斷劑（verapamil/diltiazem 或 β-blocker）。同步電整流（synchronized cardioversion）只在病人「血流動力學不穩定」（低血壓、胸痛、肺水腫、意識改變）時才優先。", "options": {"A": "最不恰當（本題答案）。病人血壓 110/70、意識清楚屬「穩定」，不需立即電擊；且非同步「胸前電擊 100J」用於穩定 SVT 並不適當（電整流應為同步且保留給不穩定者）。", "B": "恰當。Adenosine 靜脈推注是穩定窄 QRS SVT 的首選藥物。", "C": "恰當。Carotid sinus massage 屬迷走神經刺激，為第一線非藥物處置。", "D": "恰當。Verapamil（鈣離子通道阻斷劑）為穩定 SVT 可用的 AV node 阻斷劑（須先排除預激症候群之寬 QRS 心律）。"}, "sources": ["2015 ACC/AHA/HRS Supraventricular Tachycardia Guideline；2019 ESC SVT Guideline", "ACLS（穩定 vs 不穩定心搏過速處置流程）"]}}, "110020-09": {"quick": "HFrEF（EF<35%）的口服藥物基石是 RAS 抑制劑（ACEI/ARB，現以 ARNI 為佳）＋β-blocker＋醛固酮拮抗劑（＋SGLT2i）。Hydralazine＋nitrate 並非「優先選用」，是用於不能耐受 RAS 抑制劑者或特定族群的加強治療，故 D 錯誤。", "detail": {"background": "症狀性 HFrEF 的指引導向藥物治療（GDMT）四大基石：RAS 抑制劑（ARNI 優先，或 ACEI/ARB）、β-blocker、礦皮質素受體拮抗劑（MRA/aldosterone antagonist）、SGLT2 抑制劑——皆以「降低死亡率」為目的，故即使無充血/水腫也應使用（利尿劑則僅用於緩解充血症狀，不改善存活）。Hydralazine＋isosorbide dinitrate 的角色是：①不能耐受 ACEI/ARB/ARNI（如腎功能不全、高血鉀）之替代；②在已用足 GDMT 仍有症狀的特定族群（如自我認定為非裔者）之加強用藥。", "options": {"A": "正確。ACEI 或 ARB 為優先選用（現行指引以 ARNI 取代為更佳，但 ACEI/ARB 仍屬基石）。", "B": "正確。β-blocker（carvedilol、bisoprolol、metoprolol succinate）即使無水腫亦應於穩定後優先使用。", "C": "正確。醛固酮拮抗劑（spironolactone/eplerenone）以降低死亡率為目的，即使無水腫也屬優先（須注意腎功能與血鉀）。", "D": "錯誤（本題答案）。Hydralazine＋nitrate 並非對所有 HFrEF 病人「優先選用」，而是 RAS 抑制劑不耐受時的替代或特定族群的加強用藥。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline；2021 ESC Heart Failure Guideline", "Braunwald's Heart Disease（HFrEF 之藥物治療原則）"]}}, "106020-02": {"quick": "臨床圖像為縮窄性心包炎（右心房壓升高、Y下降波明顯、頸靜脈鼓張、腹水/水腫、心臟不大、肺野乾淨）。其特徵之一是心包敲擊音與奇脈，故選C。", "detail": {"background": "縮窄性心包炎因心包僵硬限制心室充填，造成右心衰竭表現（頸靜脈鼓張、肝腫、腹水、下肢水腫）但肺野通常乾淨、心臟不擴大。頸靜脈波形可見明顯 x、y 下降（M/W 形），常有 Kussmaul 徵象（吸氣時頸靜脈壓不降反升）、心包敲擊音（pericardial knock），部分病人有奇脈。需與限制型心肌病變、心包填塞鑑別。", "options": {"A": "錯誤。縮窄造成心輸出量下降，脈搏壓通常變窄、血壓偏低，而非血壓上升、脈壓變寬。", "B": "錯誤。Kussmaul 徵象是「吸氣」時頸靜脈（非頸動脈）擴張更明顯，敘述方向相反。", "C": "正確（本題答案）。部分縮窄性心包炎可聞心包敲擊音，少數可出現奇脈（paradoxical pulse）。", "D": "錯誤。縮窄性心包炎肺野通常乾淨，不以肺鬱血表現（與左心衰竭不同）。"}, "sources": ["Braunwald's Heart Disease（心包疾病之血流動力與理學徵象）"]}}, "106020-03": {"quick": "血流動力學穩定的窄QRS規則心搏過速（PSVT），迷走神經刺激無效後，首選 adenosine 6 mg 快速靜脈推注，故選C。", "detail": {"background": "穩定 PSVT（多為 AVNRT/AVRT）處置階梯：迷走神經刺激→adenosine 快速推注→AV node 阻斷劑（verapamil/diltiazem 或 β-blocker）。Adenosine 半衰期極短、安全性高，為迷走刺激失敗後的首選藥物，須由靠近中央靜脈快速推注並接著沖洗。", "options": {"A": "可用但非首選。Verapamil 可終止 SVT，但若實為心室頻脈或預激會有風險，故不作為第一線。", "B": "不佳。Digoxin 起效慢、終止 SVT 效果差，不適合急性處置。", "C": "正確（本題答案）。Adenosine 6 mg 快速靜脈推注為迷走刺激失敗後的首選。", "D": "可用但非首選。Diltiazem 為替代藥，仍以 adenosine 優先。"}, "sources": ["2015 ACC/AHA/HRS Supraventricular Tachycardia Guideline；2019 ESC SVT Guideline"]}}, "106020-17": {"quick": "穩定型心絞痛的胸痛短暫（通常數分鐘、休息或硝酸鹽可緩解），「持續數小時」不符，故B錯誤。", "detail": {"background": "心肌缺氧是氧氣供應不及需求。穩定型心絞痛多由固定狹窄造成，發作短暫（約2–10分鐘）、與活動相關、休息/NTG可緩解；不穩定心絞痛可在休息時發作、時間較長；部分病人以「心絞痛等同症狀」（下巴、頸、肩、手臂不適）表現而無典型胸痛，糖尿病/老人/女性尤然。", "options": {"A": "正確。缺氧＝供應<需求之定義。", "B": "錯誤（本題答案）。穩定型心絞痛胸痛短暫，持續數小時應懷疑心肌梗塞或非心因性。", "C": "正確。不穩定心絞痛可於休息狀態發作。", "D": "正確。可僅以下巴/頸/肩/手臂不適表現（anginal equivalent）。"}, "sources": ["2025 ACC/AHA ACS Guideline；2024 ESC Chronic Coronary Syndromes Guideline"]}}, "106020-18": {"quick": "健康人也可有無害性（功能性）心雜音，「正常人不應有心雜音」是錯的，故A錯誤。", "detail": {"background": "心雜音依時相分為收縮期（S1與S2之間）與舒張期（S2與下一個S1之間）。可藉觸診頸動脈搏動定時：與頸動脈上衝同步者為收縮期。無害性（innocent/flow）雜音在兒童、年輕人、懷孕、貧血、發燒等高流量狀態常見，且結構正常。", "options": {"A": "錯誤（本題答案）。正常健康者（尤其兒童、孕婦）可有無害性流動雜音。", "B": "正確。收縮期雜音介於S1與S2之間。", "C": "正確。以頸動脈上衝/下沉協助判斷收縮或舒張期。", "D": "正確。舒張期雜音介於S2與下一個S1之間。"}, "sources": ["Braunwald's Heart Disease（心臟聽診）"]}}, "106020-20": {"quick": "動脈粥狀硬化主要危險因子包含高血壓、抽菸、低HDL、糖尿病、高LDL等；「喝酒」非主要危險因子，故選B。", "detail": {"background": "動脈粥狀硬化之傳統主要危險因子：高血壓、吸菸、糖尿病、高LDL/低HDL膽固醇、家族史/年齡。適量飲酒並非公認的主要致病危險因子（甚至流行病學上與部分心血管風險呈U型關係），但過量飲酒有其他危害。", "options": {"A": "是主要危險因子。", "B": "不是主要危險因子（本題答案）。", "C": "是主要危險因子。", "D": "是主要危險因子（HDL<40 mg/dL）。"}, "sources": ["2018 AHA/ACC Cholesterol Guideline；2019 ACC/AHA Primary Prevention Guideline"]}}, "106020-21": {"quick": "收縮中期喀喇聲＋收縮末期雜音＝二尖瓣脫垂（MVP），確診最佳工具是心臟超音波，故選D。", "detail": {"background": "MVP 典型聽診為 mid-systolic click 加 late systolic murmur。確立診斷與評估脫垂程度、是否合併二尖瓣逆流，最佳工具為心臟超音波（echocardiography）。ECG、CXR、CT 對 MVP 診斷價值有限。", "options": {"A": "心電圖無法確診MVP。", "B": "胸部X光無法確診。", "C": "電腦斷層非首選診斷工具。", "D": "正確（本題答案）。心臟超音波為確診MVP之最佳工具。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "106020-22": {"quick": "纖維蛋白溶解劑（r-tPA）僅適用於STEMI，對NSTEMI/不穩定心絞痛無益甚至有害，屬禁忌，故選D。", "detail": {"background": "NSTEMI/UA 的病生理為非完全阻塞性血栓，治療以抗血小板（aspirin等）＋抗凝（UFH或LMWH）＋必要時侵入性策略為主；纖維蛋白溶解治療只用於 STEMI（完全阻塞），用於 NSTEMI/UA 反而增加出血與死亡。", "options": {"A": "Aspirin 為標準用藥。", "B": "低分子量肝素為抗凝選項。", "C": "未分餾肝素為抗凝選項。", "D": "錯誤用藥（本題答案）。r-tPA 不可用於NSTEMI/UA。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "106020-23": {"quick": "單純二尖瓣狹窄除運動性呼吸困難外，可有咳血、肺栓塞、肺部感染等，故D正確。", "detail": {"background": "二尖瓣狹窄（多為風濕性）造成左心房壓上升、肺鬱血。臨床可見運動性呼吸困難、端坐呼吸、咳血（肺靜脈高壓破裂或肺水腫）、心房顫動及其血栓栓塞、反覆肺部感染。S1 在早期增強；opening snap 在舒張早期，A2–OS 間距越短代表越嚴重。", "options": {"A": "不正確。重度且鈣化僵硬時S1反而變弱，並非「愈嚴重S1愈弱」的簡單線性關係。", "B": "不正確。Opening snap 出現於舒張早期，非收縮期。", "C": "不正確。單純MS的心內膜炎風險低於合併逆流者。", "D": "正確（本題答案）。可有咳血、肺栓塞、肺炎等表現。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline；Braunwald's Heart Disease"]}}, "106020-24": {"quick": "心臟超音波示嚴重心尖部肥厚、收縮功能正常＝肥厚型心肌病變（HCM/apical HCM）；強心劑digitalis會增加收縮、惡化阻塞與舒張功能，最不適當，故選A。", "detail": {"background": "HCM 以舒張功能異常與（部分）左心室流出道阻塞為特徵，治療用負性肌力藥（β-blocker、verapamil、diltiazem）以延長充填、減少阻塞；應避免正性肌力藥（digitalis）與過度利尿/血管擴張，以免惡化流出道阻塞。", "options": {"A": "最不適當（本題答案）。Digitalis 增加收縮力，會惡化流出道阻塞與舒張功能。", "B": "適當。β-blocker 為HCM常用藥。", "C": "適當。Diltiazem 屬負性肌力鈣阻斷劑。", "D": "適當。Verapamil 可改善症狀。"}, "sources": ["2024 ACC/AHA Hypertrophic Cardiomyopathy Guideline；2023 ESC Cardiomyopathies Guideline"]}}, "106020-32": {"quick": "慢性腎病合併高血壓（尤其有蛋白尿）首選ACEI或ARB，可降壓並具腎臟保護，故選D。", "detail": {"background": "CKD 合併高血壓，特別是有白蛋白尿者，首選 RAS 抑制劑（ACEI 或 ARB），因可降低腎絲球內壓、減少蛋白尿、延緩腎功能惡化；需監測血鉀與肌酸酐。其他藥物（利尿劑、CCB、β-blocker）多為合併使用。", "options": {"A": "利尿劑常為輔助用藥，非首選。", "B": "CCB 可合併使用，非首選。", "C": "β-blocker 非首選。", "D": "正確（本題答案）。ACEI/ARB 為CKD合併高血壓之首選。"}, "sources": ["KDIGO 2021 Blood Pressure in CKD Guideline；2017 ACC/AHA Hypertension Guideline"]}}, "106020-33": {"quick": "末期腎病、心包摩擦音、廣泛ST上升＝尿毒性心包炎；最根本治療是加強透析，故選B。", "detail": {"background": "尿毒性心包炎（uremic pericarditis）見於末期腎病，表現心包摩擦音與心電圖廣泛（非區域性）ST上升、PR下降。根本治療為加強/開始透析；本例血鉀僅5.3（輕度）、貧血與胸痛皆為次要，ST上升源自心包炎而非冠狀動脈阻塞，故非PCI適應症。", "options": {"A": "血鉀僅輕度升高，降鉀非根本治療。", "B": "正確（本題答案）。加強透析治療尿毒性心包炎。", "C": "輸血改善貧血但非根本。", "D": "此為心包炎之廣泛ST上升，非STEMI，PCI不適當。"}, "sources": ["Harrison's Principles of Internal Medicine（尿毒性心包炎，標準概念）"]}}, "106020-53": {"quick": "脂蛋白分解酵素（LPL）缺乏（家族性乳糜微粒血症）以極高三酸甘油酯、發疹性黃色瘤、胰臟炎為主；不以動脈硬化表現，故選C。", "detail": {"background": "LPL 缺乏（第一型高脂血症）造成乳糜微粒無法分解、三酸甘油酯極度升高，臨床見發疹性黃色瘤、反覆急性胰臟炎、肝脾腫大、視網膜脂血症。因乳糜微粒顆粒大、不易進入血管壁，故動脈粥狀硬化風險並不增加（與高LDL不同）。", "options": {"A": "是典型表現（發疹性黃色瘤）。", "B": "是典型表現（胰臟炎）。", "C": "非典型表現（本題答案）。動脈硬化不是LPL缺乏的特徵。", "D": "是典型表現（高三酸甘油酯）。"}, "sources": ["Harrison's Principles of Internal Medicine（脂蛋白代謝異常，標準概念）"]}}, "106020-75": {"quick": "毛地黃中毒併心搏過緩、低血壓；最不恰當的是給硝化甘油（會進一步降壓），故選B。", "detail": {"background": "Digoxin 中毒可致各種心律不整與AV阻斷、心搏過緩。處置包括檢測digoxin濃度與電解質、atropine 處理症狀性心搏過緩、必要時暫時性節律器（嚴重者用digoxin-specific antibody）。硝化甘油會降低前負荷與血壓，對已低血壓者有害且無助於中毒處置。", "options": {"A": "恰當。檢測digoxin濃度評估中毒。", "B": "最不恰當（本題答案）。Nitroglycerin 會惡化低血壓。", "C": "恰當。經皮節律器處理症狀性心搏過緩。", "D": "恰當。Atropine 處理心搏過緩。"}, "sources": ["Harrison's Principles of Internal Medicine（毛地黃中毒處置，標準概念）"]}}, "106080-03": {"quick": "無症狀的重度高血壓（高血壓urgency、無器官損傷徵象）不應快速降壓；舌下短效nifedipine會造成血壓驟降而引發中風/心肌缺血，處理欠佳，故選C。", "detail": {"background": "無急性器官損傷的重度高血壓屬「hypertensive urgency」，應於數小時至數天內以口服藥緩降，並評估有無器官損傷。舌下短效 nifedipine 因會造成難以控制的血壓驟降、反射性心搏過速，可能誘發腦缺血或心肌缺血，已不建議使用。", "options": {"A": "恰當。先休息再復測，排除白袍/暫時性升高。", "B": "恰當。詢問病史與家族史。", "C": "處理欠佳（本題答案）。舌下短效nifedipine快速降壓有害。", "D": "恰當。注意神經學變化以評估器官損傷。"}, "sources": ["2017 ACC/AHA Hypertension Guideline（hypertensive urgency 不宜快速降壓）"]}}, "106080-04": {"quick": "此為左室射出分率正常（EF 55%）的心衰竭＝HFpEF；ACEI在HFpEF並未被證實能改善長期預後，故C錯誤。", "detail": {"background": "HFpEF（EF≥50%）的治療以利尿劑緩解充血、積極控制血壓與共病為主。傳統上 ACEI/ARB 在 HFpEF 的大型試驗結果為中性，未證實改善死亡率/長期預後（與 HFrEF 不同）；近年 SGLT2 抑制劑被證實可降低住院。BNP/NT-proBNP 可評估嚴重度。", "options": {"A": "正確。BNP/NT-proBNP可評估嚴重度。", "B": "正確。應限鹽。", "C": "錯誤（本題答案）。ACEI在HFpEF未被證實改善長期預後，不應宣稱「已被證明有幫助、應即刻使用」。", "D": "正確。利尿劑緩解症狀並控制血壓為首選處置。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline；2021 ESC Heart Failure Guideline"]}}, "106080-20": {"quick": "二尖瓣狹窄的雜音是「低頻、舒張中期隆隆樣」雜音（伴opening snap），不是high-pitched early diastolic murmur（那是AR），故D錯誤。", "detail": {"background": "風濕性二尖瓣狹窄：正常瓣口4–6 cm²，<1.5 cm²為重度（<1 cm²極重度）；常合併心房顫動與次發性肺高壓。聽診為心尖部低頻舒張中期隆隆雜音、opening snap、S1增強。高頻早期舒張吹風樣雜音是主動脈瓣閉鎖不全的特徵。", "options": {"A": "正確。瓣口4–6 cm²，<1 cm²為重度狹窄。", "B": "正確。常合併心房顫動。", "C": "正確。常合併次發性肺高壓。", "D": "錯誤（本題答案）。MS為低頻舒張中期隆隆雜音，非high-pitched early diastolic murmur。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "106080-22": {"quick": "二尖瓣脫垂好發於年輕「女性」，不是男性，故C錯誤。", "detail": {"background": "MVP 病理為瓣膜黏液樣變性（myxomatous），常見於後葉，與結締組織疾病（如Marfan）相關；流行病學上以年輕女性較多，多數無症狀、不需特別治療，僅在合併明顯二尖瓣逆流時追蹤處置。", "options": {"A": "正確。黏液樣變性、好發後葉。", "B": "正確。好發於Marfan症候群。", "C": "錯誤（本題答案）。好發於年輕女性而非男性。", "D": "正確。多數無症狀、不需特別治療。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline；Braunwald's Heart Disease"]}}, "106080-23": {"quick": "急性STEMI不可用短效dihydropyridine類鈣離子阻斷劑（如nifedipine），會反射性心搏過速、增加缺血與死亡，故A錯誤。", "detail": {"background": "STEMI 標準早期治療包含 aspirin（160–325 mg）、無禁忌下硝酸鹽緩解症狀、β-blocker、抗凝與再灌流。短效 dihydropyridine CCB（nifedipine）會造成反射性心搏過速、增加心肌耗氧，於急性梗塞為禁忌。", "options": {"A": "錯誤（本題答案）。短效dihydropyridine CCB於急性STEMI有害、禁忌。", "B": "正確。Aspirin 160–325 mg。", "C": "正確。無禁忌可用NTG緩解症狀。", "D": "正確。無禁忌可給β-blocker。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "106080-24": {"quick": "單純主動脈瓣置換（AVR）手術死亡率通常「低於」二尖瓣置換（MVR），故「AVR比MVR高」的敘述錯誤，選A。", "detail": {"background": "瓣膜手術死亡率受瓣位、是否合併冠狀動脈繞道、單瓣或多瓣影響。一般而言單純AVR的手術死亡率低於單純MVR；合併CABG或多瓣置換死亡率較高；二尖瓣修補的死亡率低於二尖瓣置換且能保留心室功能。", "options": {"A": "錯誤（本題答案）。AVR死亡率通常低於MVR，非較高。", "B": "正確。瓣膜＋CABG死亡率較單純瓣膜手術高。", "C": "正確。多瓣置換死亡率較高。", "D": "正確。二尖瓣修補死亡率低於置換。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "106080-58": {"quick": "二尖瓣脫垂但「無逆流」者不屬於心內膜炎預防性抗生素的高風險族群，不需預防，故選A。", "detail": {"background": "現行心內膜炎預防性抗生素僅限「最高風險」族群：人工瓣膜或瓣膜修補材料、曾患感染性心內膜炎、特定先天性心臟病、心臟移植後瓣膜病變者，且僅針對特定（如牙齦/根尖周）牙科處置。二尖瓣脫垂（即使有逆流）並非適應症。", "options": {"A": "不需預防（本題答案）。MVP無逆流非高風險族群。", "B": "需預防。人工瓣膜屬最高風險。", "C": "需預防。曾患心內膜炎屬最高風險。", "D": "需預防。心臟移植後瓣膜病變屬最高風險。"}, "sources": ["2007 AHA Infective Endocarditis Prophylaxis Guideline；2021 ESC/2020 ACC/AHA VHD"]}}, "106080-76": {"quick": "深層靜脈栓塞的危險因子含癌症、肥胖、懷孕、手術/不動、荷爾蒙等；糖尿病非強的獨立危險因子，原答D；本題後經公布「一律給分（送分）」。", "detail": {"background": "VTE 危險因子依Virchow三要素：血流停滯（不動、長途旅行、手術）、高凝（癌症、懷孕、口服避孕藥/荷爾蒙、遺傳性血栓傾向）、血管內皮損傷。糖尿病並非公認的強獨立VTE危險因子。此題最終由考選部公布一律給分。", "options": {"A": "是危險因子（癌症）。", "B": "是危險因子（肥胖）。", "C": "是危險因子（懷孕）。", "D": "原訂答案（糖尿病較不像危險因子）；本題後改為一律給分。"}, "sources": ["2021 ESC/ACCP VTE 相關建議；考選部更正公告（本題送分）"]}}, "106080-77": {"quick": "血流動力學不穩定（血壓70/30、意識模糊）的心搏過速，應立即「同步心臟整流（cardioversion）」，故選C。", "detail": {"background": "任何心搏過速若合併不穩定徵象（低血壓、休克、胸痛、急性心衰竭、意識改變），不論機制皆應立即同步電整流，而非花時間嘗試迷走刺激或藥物。Atropine 用於心搏過緩，方向相反。", "options": {"A": "不適當。迷走刺激用於穩定SVT。", "B": "不適當。Atropine用於心搏過緩。", "C": "正確（本題答案）。不穩定心搏過速應立即同步電整流。", "D": "不適當。Adenosine用於穩定窄QRS SVT。"}, "sources": ["ACLS（不穩定心搏過速處置）；2015 ACC/AHA SVT Guideline"]}}, "107020-02": {"quick": "訓練有素的運動員因迷走神經張力高，睡眠時竇性心搏過緩（42–58）屬正常生理現象，無症狀者不需治療，故選B。", "detail": {"background": "耐力運動員常有靜止性竇性心搏過緩，睡眠時更明顯（高迷走張力），清醒/運動時心率正常上升。只要無症狀（無暈厥、無變時不全症狀）且非病理性傳導阻斷，即屬正常變異，不需電生理檢查或節律器。", "options": {"A": "不需要。無症狀生理性心搏過緩不需電生理檢查。", "B": "正確（本題答案）。屬運動員生理現象，不需治療。", "C": "不需要。無症狀者不需節律器。", "D": "不適當。頸動脈竇按摩用於終止SVT，與此無關。"}, "sources": ["Braunwald's Heart Disease（運動員心臟、竇性心搏過緩）"]}}, "107020-03": {"quick": "位置性、吸氣加重、前傾緩解的胸痛＋三成份心包摩擦音＝急性心包炎；心電圖最可能為廣泛、凹形（saddle）ST上升併PR下降，故選D。", "detail": {"background": "急性心包炎典型心電圖為廣泛導程（多數肢導與胸前導程）凹形ST段上升合併PR段下降（aVR為PR上升、ST下降）。與STEMI的「凸形、區域性」ST上升不同。三成份摩擦音為其特徵理學徵象。", "options": {"A": "胸前T波倒置屬較晚期變化，非初期典型。", "B": "心包炎的PR變化是下降（II、III、aVF為PR下降），非上升。", "C": "凸形、區域性ST上升是STEMI的型態，非心包炎。", "D": "正確（本題答案）。廣泛凹形ST上升（V2–V6、I、aVL）符合急性心包炎。"}, "sources": ["2015 ESC Pericardial Diseases Guideline"]}}, "107020-16": {"quick": "靜脈注射毒癮者的感染性心內膜炎最常見致病菌為Staphylococcus aureus，故選A。", "detail": {"background": "靜脈藥癮者IE好侵犯右側（三尖瓣），最常見致病菌為金黃色葡萄球菌（含MRSA可能），常以發燒、敗血性肺栓塞（喘、胸痛、肺浸潤）表現。Viridans strep多見於自然瓣膜亞急性IE、S. epidermidis多見於人工瓣膜、Enterococcus多見於泌尿生殖道來源。", "options": {"A": "正確（本題答案）。IVDU的IE以S. aureus最常見。", "B": "S. epidermidis多見於人工瓣膜感染。", "C": "Viridans strep多見於自然瓣膜亞急性IE。", "D": "Enterococcus多與泌尿生殖道操作有關。"}, "sources": ["2023 ESC Endocarditis Guideline；2015 AHA Infective Endocarditis"]}}, "107020-21": {"quick": "內頸靜脈壓反映的是右心/右心房壓力，不能「完全」反映左心室功能，故B錯誤。", "detail": {"background": "慢性心衰竭理學：收縮性左心衰常聞S3、舒張性常聞S4；心尖搏動點因心臟擴大而向左下移位；LVEF為評估收縮功能指標。頸靜脈壓（JVP）主要反映右心房/右心壓力與容積狀態，與左心室功能不完全等同（左心衰竭早期JVP可正常）。", "options": {"A": "正確。S3見於收縮性、S4見於舒張性左心衰。", "B": "錯誤（本題答案）。JVP反映右心壓力，不能完全代表左心室功能。", "C": "正確。PMI向左下偏移代表心臟擴大。", "D": "正確。LVEF為收縮功能指標。"}, "sources": ["Braunwald's Heart Disease（心衰竭理學檢查）"]}}, "107020-23": {"quick": "風濕性二尖瓣狹窄合併的心房顫動（瓣膜性AF）屬抗凝血劑的強適應症，「不必抗凝」是錯的，故選C。", "detail": {"background": "心房顫動是最常見的慢性心律不整。是否抗凝，非瓣膜性AF用CHA2DS2-VASc評估；但「瓣膜性AF」（中重度二尖瓣狹窄或機械瓣膜）無論分數高低，皆須使用warfarin抗凝（不可只用DOAC）。可選擇rate control或rhythm control策略。", "options": {"A": "正確。AF為最常見慢性心律不整。", "B": "正確。75歲女性糖尿病CHA2DS2-VASc高，應抗凝。", "C": "錯誤（本題答案）。風濕性MS合併AF屬瓣膜性AF，必須抗凝。", "D": "正確。可考慮僅做心率控制。"}, "sources": ["2023 ACC/AHA AF Guideline；2024 ESC AF Guideline"]}}, "107020-24": {"quick": "決定慢性重度二尖瓣逆流是否手術，最優先考量是「是否出現症狀」，故選C。", "detail": {"background": "原發性重度二尖瓣逆流的手術時機：出現症狀即建議手術；無症狀者若有左心室功能下降（EF≤60%）、左心室收縮末期內徑增大（LVESD≥40 mm）、新發心房顫動或肺高壓也應考慮。是否適合修補影響術式選擇，但「症狀」是最優先的觸發因素。", "options": {"A": "左心室收縮功能為重要參考，但非最優先的單一觸發。", "B": "LVESD為無症狀者的客觀指標之一。", "C": "正確（本題答案）。是否有症狀為最優先考量。", "D": "是否可修補影響術式，但非決定是否手術的最優先因素。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "107020-25": {"quick": "臨床圖像為肺動脈高壓（運動性氣促/昏厥、頸靜脈壓升高、右心室搏動、右側S4、肺動脈膨大）；應評估慢性血栓栓塞與凝血異常（protein C/S、ATIII），故選A。", "detail": {"background": "肺高壓會造成右心室肥厚與右心衰竭徵象；心電圖呈右軸偏移與右心室肥大；以三尖瓣逆流流速估算肺動脈收縮壓。其血管病理為內皮/平滑肌增生、發炎與「血管收縮與重塑」（非擴張）。鑑別需排除慢性血栓栓塞性肺高壓，故檢測凝血傾向（protein C/S、antithrombin III）有意義。", "options": {"A": "正確（本題答案）。評估凝血異常以排除慢性血栓栓塞性肺高壓。", "B": "錯誤。心電圖為右軸偏移、右心室肥大，非左偏/左室肥大。", "C": "錯誤。以三尖瓣（非二尖瓣）逆流流速估算肺動脈壓。", "D": "錯誤。病理為血管收縮與重塑，非血管擴張。"}, "sources": ["2022 ESC/ERS Pulmonary Hypertension Guideline"]}}, "107020-27": {"quick": "自然瓣膜、viridans strep 感染性心內膜炎，標準治療為penicillin G每4小時靜脈注射約4週；15 mm飄動贅生物屬高栓塞風險，需考慮手術，故選B。", "detail": {"background": "Viridans streptococci 自然瓣膜IE可用penicillin G（高劑量分次q4h）約4週，或合併gentamicin的2週短療程（限非複雜性）。本例贅生物大（15 mm、會飄動）屬高栓塞風險，療程後仍須評估外科手術。Ampicillin+gentamicin為腸球菌IE的組合，不符viridans strep。", "options": {"A": "q8h間隔不足，penicillin G應q4h。", "B": "正確（本題答案）。penG q4h約4週後考慮手術。", "C": "短療程不適用於大贅生物/複雜性IE，且不應排除手術。", "D": "ampicillin+gentamicin為腸球菌方案，不符本菌。"}, "sources": ["2023 ESC Endocarditis Guideline；2015 AHA IE Treatment"]}}, "107020-43": {"quick": "病人為臺灣（亞洲）族群，factor V Leiden 在亞洲人幾乎不存在，最不可能是其DVT病因，故選D。", "detail": {"background": "年輕、有家族史的反覆靜脈血栓提示遺傳性血栓傾向。亞洲族群最常見的遺傳性血栓傾向為 protein C、protein S、antithrombin III 缺乏；而 factor V Leiden 與 prothrombin G20210A 突變主要見於白人，亞洲人極為罕見。", "options": {"A": "protein C缺乏在亞洲人是常見原因。", "B": "protein S缺乏在亞洲人是常見原因。", "C": "antithrombin III缺乏在亞洲人是常見原因。", "D": "最不可能（本題答案）。factor V Leiden在亞洲人幾乎不存在。"}, "sources": ["Harrison's Principles of Internal Medicine（遺傳性血栓傾向之族群差異）"]}}, "107020-57": {"quick": "Fibrate與statin並非「嚴禁」併用，而是可在監測下小心併用（橫紋肌溶解風險增加），故D錯誤。", "detail": {"background": "高三酸甘油酯首選fibrate；高LDL膽固醇首選statin。兩者併用會增加肌肉毒性/橫紋肌溶解風險（尤以gemfibrozil明顯，fenofibrate相對較安全），須監測但非絕對禁忌。", "options": {"A": "正確。Fibrate為高三酸甘油酯第一線。", "B": "正確。Statin為高膽固醇第一線。", "C": "正確。併用可能造成橫紋肌溶解。", "D": "錯誤（本題答案）。兩者可在監測下併用，非嚴禁。"}, "sources": ["2018 AHA/ACC Cholesterol Guideline；2019 ESC/EAS Dyslipidaemias Guideline"]}}, "107020-76": {"quick": "Venturi面罩可提供精準且可調的氧濃度（約24–50%），敘述正確，故選C。", "detail": {"background": "急性冠心症若SpO2<90%才需給氧（過度給氧無益甚至有害）。供氧裝置：鼻導管1–6 L約24–44%（低流量、濃度受呼吸型態影響）；Venturi面罩提供固定且精準的FiO2（約24–50%）；非再吸入型面罩需高流量（約10–15 L）才能達80–90%以上。", "options": {"A": "現行建議SpO2<90%才給氧；此敘述過於一概而論。", "B": "鼻導管1–6 L約24–44%，「21–30%」低估。", "C": "正確（本題答案）。Venturi面罩約24–50%且精準可調。", "D": "非再吸入面罩需更高流量（約10–15 L）才能達高濃度，流量敘述不當。"}, "sources": ["2025 ACC/AHA ACS Guideline（氧療指引：SpO2<90%才給氧）"]}}, "107080-13": {"quick": "LDL過高、吸菸、糖尿病皆為動脈硬化的獨立危險因子；肥胖多透過其他因子作用，原答C；本題後公布一律給分（送分）。", "detail": {"background": "傳統獨立危險因子包括高LDL、吸菸、糖尿病、高血壓、低HDL、年齡/家族史。肥胖常被視為透過高血壓、血脂異常、糖尿病等中介作用的「危險因子」，是否屬「獨立」危險因子在不同來源有爭議，故本題最終一律給分。", "options": {"A": "是獨立危險因子（高LDL）。", "B": "是獨立危險因子（吸菸）。", "C": "原訂答案（肥胖多為間接作用）；本題後改為送分。", "D": "是獨立危險因子（糖尿病）。"}, "sources": ["2019 ACC/AHA Primary Prevention Guideline；考選部更正公告（本題送分）"]}}, "107080-14": {"quick": "冠狀動脈電腦斷層對冠心病診斷正確性高，但用於「預後預測」的角色仍在發展、尚未完全確立，敘述正確，故選D。", "detail": {"background": "冠心病功能分級（CCS）：II級為中度限制（快走/上坡/飯後走會誘發）；III級為明顯限制（平地走1–2街區或上一層樓即誘發）。運動心電圖為常用的壓力測試，並非一律禁忌。藥物（dobutamine）壓力心臟超音波的敏感度通常高於運動心電圖。冠狀動脈CTA解剖診斷準確，但其預後預測應用仍在演進。", "options": {"A": "錯誤。飯後上坡才誘發、平時可正常工作，較接近CCS II級而非III級。", "B": "錯誤。不應因風險一概避免運動心電圖。", "C": "錯誤。Dobutamine壓力心臟超音波敏感度通常高於運動心電圖。", "D": "正確（本題答案）。CTA診斷正確性高，但預後預測角色尚不明確。"}, "sources": ["2024 ESC Chronic Coronary Syndromes Guideline；2021 ACC/AHA Chest Pain Guideline"]}}, "107080-15": {"quick": "左右手導程顛倒造成的是第一導程整體倒置（類似右位心），並非典型左軸偏移，故A錯誤。", "detail": {"background": "左軸偏移（LAD）常見原因：正常變異、左心室肥厚、下壁心肌梗塞（喪失下壁向量）、左前分支阻斷等。左右手電極顛倒會使lead I的P、QRS、T全部倒置（模擬右位心/dextrocardia），而非單純造成LAD。", "options": {"A": "錯誤（本題答案）。左右手導程顛倒造成lead I整體倒置，非典型LAD。", "B": "正確。可見於正常變異。", "C": "正確。左心室肥厚可致LAD。", "D": "正確。下壁心肌梗塞可致LAD。"}, "sources": ["Braunwald's Heart Disease（心電圖判讀）"]}}, "107080-16": {"quick": "心電圖呈現預激（WPW）的delta波；依delta波與QRS型態定位旁道，本例最可能位於後中膈（posterior septum），故選D。", "detail": {"background": "預激症候群（WPW）可依12導程的delta波極性與QRS型態定位附屬路徑：例如V1為負向delta、下壁導程（II、III、aVF）為負向delta傾向後中膈（posteroseptal）路徑。需以心電圖圖形綜合判讀，確切定位仍以電生理檢查為準。", "options": {"A": "右心室側壁路徑的delta/QRS型態與本圖不符。", "B": "左心室側壁路徑型態與本圖不符。", "C": "前中膈路徑型態與本圖不符。", "D": "正確（本題答案）。本圖型態最符合後中膈路徑。"}, "sources": ["2019 ESC SVT Guideline（預激與旁道定位概念）"]}}, "107080-17": {"quick": "成人最常見的三尖瓣逆流為「功能性／次發性」，多因肺動脈高壓造成右心室擴大所致，故選A。", "detail": {"background": "成人三尖瓣逆流多為功能性（次發性）：肺動脈高壓或左心疾病導致右心室擴大、三尖瓣環擴張而逆流。原發性（瓣膜本身）原因如類癌、Ebstein異常、心內膜炎相對少見。", "options": {"A": "正確（本題答案）。肺動脈高壓造成的功能性TR最常見。", "B": "類癌為少見原發原因。", "C": "Ebstein異常為少見先天原因。", "D": "心內膜炎為少見原因（IVDU除外）。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "107080-18": {"quick": "主動脈瓣狹窄出現症狀後的存活：心絞痛約5年、昏厥約3年、心衰竭約2年；故「出現心衰竭症狀餘命約3年」錯誤，選B。", "detail": {"background": "重度主動脈瓣狹窄一旦出現症狀，預後急轉直下：心絞痛中位存活約5年、昏厥約3年、心衰竭約2年；出現症狀即建議主動脈瓣置換。鈣化性AS瓣口每年約縮小0.1 cm²；猝死多與心律不整有關。", "options": {"A": "正確。有症狀（含心衰竭）即建議AVR。", "B": "錯誤（本題答案）。出現心衰竭症狀餘命約2年，非3年（3年是昏厥）。", "C": "正確。每年瓣口約縮小0.1 cm²。", "D": "正確。約兩成猝死與心律不整有關。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline；2021 ESC/EACTS VHD"]}}, "107080-19": {"quick": "年輕女性偶發胸悶＋收縮中期雜音，最合適直接安排心臟超音波以釐清瓣膜（如二尖瓣脫垂）並決定後續，故選A。", "detail": {"background": "對於有雜音且伴隨症狀（即使輕微）者，心臟超音波是評估瓣膜結構與功能、區分無害性與病理性雜音最直接有效的工具。ECG/CXR為輔助，但正常並不能排除瓣膜病變，故不應以其正常即停止檢查。", "options": {"A": "正確（本題答案）。直接安排心臟超音波再決定處置。", "B": "錯誤。ECG正常不能排除瓣膜病變。", "C": "流程迂迴；應直接以超音波評估。", "D": "錯誤。ECG/CXR正常不能排除瓣膜病變。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "107080-21": {"quick": "腎動脈狹窄（纖維肌肉發育異常或動脈硬化斑塊）造成腎血管性高血壓，敘述正確，故選B。", "detail": {"background": "次發性高血壓中，腎實質疾病最常見；腎血管性高血壓多因年輕者的纖維肌肉發育異常或老年者的動脈硬化造成腎動脈狹窄。原發性醛固酮過多表現為鈉滯留、高血壓、「低血鉀」與低腎素活性。嗜鉻細胞瘤多為偶發，僅約少數（非80%）為遺傳。", "options": {"A": "不正確。腎實質疾病才是次發性高血壓最常見原因，非腎血管性。", "B": "正確（本題答案）。FMD或動脈硬化致腎動脈狹窄造成高血壓。", "C": "不正確。原發性醛固酮過多應為「低血鉀」，非高血鉀。", "D": "不正確。嗜鉻細胞瘤多為偶發，遺傳比例遠低於80%。"}, "sources": ["2017 ACC/AHA Hypertension Guideline；2023 ESC Hypertension Guideline"]}}, "107080-53": {"quick": "血中三酸甘油酯偏高與心血管疾病有關（並非無關），故A最不適當。", "detail": {"background": "高三酸甘油酯與心血管風險相關，極高時（>500 mg/dL）並有胰臟炎風險；治療首選fibrate（生活型態與血糖控制亦重要）。高LDL與冠心病明確相關，首選statin治療。", "options": {"A": "最不適當（本題答案）。高三酸甘油酯與心臟病有關。", "B": "正確。高三酸甘油酯首選fibrate。", "C": "正確。高LDL與心臟病有關。", "D": "正確。高膽固醇首選statin。"}, "sources": ["2018 AHA/ACC Cholesterol Guideline；2019 ESC/EAS Dyslipidaemias"]}}, "107080-75": {"quick": "術後臥床、突發喘與低血壓低血氧、心電圖S1Q3T3併V1–V4 T波倒置＝急性肺栓塞，故選C。", "detail": {"background": "近期大手術/長期臥床為VTE高危。急性肺栓塞可表現突發呼吸困難、心搏過速、低血壓、低血氧；心電圖典型（雖不敏感）為S1Q3T3、右心室應變（V1–V4 T波倒置）、新發右束支阻斷。確診以CT肺動脈攝影。", "options": {"A": "主動脈剝離以撕裂痛、血壓兩側不對稱表現，不符。", "B": "急性中風通常有局部神經學徵象。", "C": "正確（本題答案）。符合急性肺栓塞。", "D": "大葉性肺炎多有發燒與肺炎影像。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline"]}}, "107080-77": {"quick": "長途飛行後暈厥、心搏過速、呼吸性鹼中毒併低血氧＝高度懷疑肺栓塞，最適當檢查為打顯影劑的螺旋胸部電腦斷層（CT肺動脈攝影），故選C。", "detail": {"background": "長途飛行（久坐不動）為VTE危險因子。臨床高度懷疑肺栓塞且血流動力學尚穩定時，首選確診檢查為CT肺動脈攝影（CTPA）。動脈血呈低PaO2、低PaCO2（過度換氣致呼吸性鹼中毒）符合肺栓塞。", "options": {"A": "心臟超音波可看右心應變，但非確診工具。", "B": "下肢靜脈超音波輔助找DVT，非肺栓塞確診首選。", "C": "正確（本題答案）。CT肺動脈攝影為確診首選。", "D": "主動脈血管攝影用於主動脈病變，不符。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline"]}}, "108030-04": {"quick": "二尖瓣狹窄最常見為風濕性，好發中年女性、台灣近年減少，敘述正確，故選A。", "detail": {"background": "風濕性心臟病是二尖瓣狹窄最主要原因，好發中年女性，台灣因鏈球菌防治而病例下降。急性重度瓣膜逆流合併心衰竭時，血管擴張劑（降後負荷）為橋接治療且應早期手術。純二尖瓣狹窄因阻塞在瓣膜，左心室未受壓力負荷，LVEDP正常或偏低；主動脈瓣狹窄則因左室肥厚/舒張障礙使LVEDP上升。", "options": {"A": "正確（本題答案）。MS最常見為風濕性、好發中年女性、台灣減少。", "B": "錯誤。Marfan可致AR、有舒張期雜音，但S2不會「變大聲」。", "C": "錯誤。急性中重度逆流合併心衰竭應使用血管擴張劑降後負荷並早期手術。", "D": "錯誤。純MS的LVEDP正常/偏低（左室未受壓力負荷）。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline"]}}, "108030-07": {"quick": "位置性胸痛、感冒前驅、心肌酶/D-dimer正常、僅輕度發炎、有少量心包積液與心電圖變化＝急性心包炎，故選C。", "detail": {"background": "急性心包炎常於病毒感染後出現位置性、吸氣加重的胸痛，前傾可緩解；心肌酶正常（無心肌壞死）、D-dimer正常（非肺栓塞）、收縮功能與室壁活動正常（非心肌炎/缺血），可有少量心包積液與廣泛凹形ST上升。", "options": {"A": "心肌酶正常、無室壁活動異常，不支持急性冠心病。", "B": "心肌炎多有心肌酶升高與室壁活動/收縮異常。", "C": "正確（本題答案）。符合急性心包炎。", "D": "D-dimer正常，肺栓塞可能性低。"}, "sources": ["2015 ESC Pericardial Diseases Guideline"]}}, "108030-08": {"quick": "固定分裂的第二心音（fixed splitting S2）＋收縮期雜音、右軸偏移、V1 rSR’、右心房與肺動脈擴大＝心房中膈缺損（ASD），故選A。", "detail": {"background": "ASD的標誌是「固定分裂S2」（與呼吸無關），因左到右分流使右心容積負荷，造成肺動脈血流增加之收縮期雜音、右心房/肺動脈擴大、心電圖右軸偏移與不完全右束支阻斷（V1 rSR’）。長期可併發心房性心律不整。", "options": {"A": "正確（本題答案）。固定分裂S2＋右心容積負荷＝ASD。", "B": "VSD為全收縮期雜音於左下胸骨緣，無固定分裂S2。", "C": "主動脈縮窄以上下肢血壓差、肋骨切跡表現。", "D": "法洛氏四合症為發紺性先天心病，臨床不符。"}, "sources": ["Braunwald's Heart Disease（成人先天性心臟病）"]}}, "108030-10": {"quick": "腹頸靜脈逆流（abdominojugular reflux）陽性、頸靜脈鼓張代表靜脈/容積過載（volume overload），故選B。", "detail": {"background": "腹頸靜脈逆流陽性表示右心無法因應增加的靜脈回流，反映容積過載/右心充填壓升高。它無法單獨判定NYHA分級，也非僅代表左心衰竭或動脈端壓力過載。", "options": {"A": "與動脈端壓力過載無直接關係。", "B": "正確（本題答案）。代表容積過載。", "C": "無法由此單一徵象判定NYHA第四級。", "D": "反映右心/容積狀態，非特指左心衰竭。"}, "sources": ["Braunwald's Heart Disease（頸靜脈與容積評估）"]}}, "108030-56": {"quick": "人工瓣膜術後2個月內的早期心內膜炎，最常見致病菌為凝固酶陰性葡萄球菌（表皮葡萄球菌），故選D。", "detail": {"background": "早期人工瓣膜心內膜炎（術後<2–12個月）多為手術期間植入污染，以凝固酶陰性葡萄球菌（如S. epidermidis）、S. aureus及革蘭氏陰性菌為主；晚期則菌種趨近自然瓣膜IE。", "options": {"A": "Haemophilus少見（屬HACEK，較多晚期/自然瓣膜）。", "B": "VRE非早期PVE主要菌。", "C": "肺炎鏈球菌非PVE常見菌。", "D": "正確（本題答案）。表皮葡萄球菌為早期PVE最常見。"}, "sources": ["2023 ESC Endocarditis Guideline"]}}, "108080-04": {"quick": "PR間距涵蓋心房去極化、心房再極化與房室延遲；心室去極化是QRS，最不可能由PR間距代表，故選D。", "detail": {"background": "PR間距自P波起點至QRS起點，代表電衝動從心房去極化經房室結延遲傳到心室前的時間，期間也含心房再極化（Ta波，常被掩蓋）。心室去極化對應的是QRS複合波，不屬於PR間距。", "options": {"A": "屬於（心房去極化）。", "B": "屬於（心房再極化發生於此時段）。", "C": "屬於（房室延遲）。", "D": "最不可能（本題答案）。心室去極化為QRS，非PR間距。"}, "sources": ["Braunwald's Heart Disease（心電圖基礎）"]}}, "108080-05": {"quick": "心電圖呈前壁ST上升型心肌梗塞，最可能阻塞血管為左前降支（LAD），故選B。", "detail": {"background": "冠狀動脈與梗塞區域對應：前壁/前間壁（V1–V4）→左前降支（LAD）；下壁（II、III、aVF）→右冠狀動脈（RCA，多數）或左迴旋支；側壁（I、aVL、V5–V6）→左迴旋支。本例心電圖型態符合前壁梗塞，責任血管為LAD。", "options": {"A": "左主幹阻塞病情更危急、影響廣泛，型態不符。", "B": "正確（本題答案）。前壁梗塞對應LAD。", "C": "左迴旋支多對應側壁/後壁。", "D": "右冠狀動脈多對應下壁。"}, "sources": ["2025 ACC/AHA ACS Guideline；Braunwald's Heart Disease（梗塞定位）"]}}, "108080-06": {"quick": "Kussmaul徵象（吸氣時頸靜脈壓不降反升）見於縮窄性心包炎，而心包填塞通常沒有，故最能區分兩者，選B。", "detail": {"background": "心包填塞與縮窄性心包炎都會有頸靜脈壓升高與奇脈，但：Kussmaul徵象典型見於縮窄（與限制型心肌病變），填塞通常缺如；填塞的頸靜脈波形x下降明顯、y下降消失，縮窄則x、y皆明顯（M/W形）。故Kussmaul徵象最能區分。", "options": {"A": "奇脈兩者皆可見（填塞更明顯），不易區分。", "B": "正確（本題答案）。Kussmaul見於縮窄、填塞多無。", "C": "S3兩者皆非典型（縮窄為心包敲擊音）。", "D": "明顯x下降是填塞特徵，但須與y波合併判讀，單獨鑑別力不如Kussmaul。"}, "sources": ["Braunwald's Heart Disease（心包疾病鑑別）"]}}, "108080-07": {"quick": "擴張型心肌病變合併心衰竭，經由指引導向藥物（與CRT）治療「可以」改善收縮功能，故「藥物無法改善」錯誤，選D。", "detail": {"background": "擴張型心肌病變病因多元（感染、毒物、代謝、遺傳等），超音波見左室擴大、收縮功能下降。GDMT（RAS抑制劑/ARNI、β-blocker、MRA、SGLT2i）可促進逆向重塑、改善收縮功能與預後；合併LBBB者CRT可進一步改善。", "options": {"A": "正確。病因多元。", "B": "正確。超音波見擴大左室與收縮下降。", "C": "正確。LBBB者CRT可改善收縮功能。", "D": "錯誤（本題答案）。藥物（GDMT）可改善收縮功能。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline；2021 ESC HF Guideline"]}}, "108080-09": {"quick": "Pulsus alternans（交替脈）代表每次心跳的收縮力有差異，見於嚴重左心室衰竭，故選B。", "detail": {"background": "交替脈為脈搏強弱規律交替，反映嚴重左心室收縮功能不全時每跳收縮力的變化；它是機械現象，與心電圖的electrical alternans（多見於大量心包積液/填塞）並非同一回事，也與晨間或右心衰竭無特別關聯。", "options": {"A": "錯誤。與electrical alternans非必然同時出現。", "B": "正確（本題答案）。代表每跳收縮力差異，見於嚴重左心衰竭。", "C": "錯誤。與清晨無關。", "D": "錯誤。為左心室衰竭徵象，非肺高壓/右心衰竭。"}, "sources": ["Braunwald's Heart Disease（脈搏異常）"]}}, "108080-10": {"quick": "HCM猝死的主要預測因子包括猝死家族史、極度肥厚（≥30 mm）、非持續性心室頻脈、不明原因暈厥、運動時血壓「異常」反應；運動時血壓「正常上升」並非危險因子，故選C。", "detail": {"background": "肥厚型心肌病變的猝死風險因子：猝死家族史、最大室壁厚度≥30 mm、不明原因暈厥、24小時心電圖出現非持續性心室頻脈、運動時血壓反應異常（無法上升或下降）。運動時血壓正常上升是正常反應，並非危險因子。", "options": {"A": "是危險因子（猝死家族史）。", "B": "是危險因子（肥厚≥30 mm）。", "C": "不是危險因子（本題答案）。運動時血壓正常上升為正常反應；異常反應才是危險因子。", "D": "是危險因子（非持續性心室頻脈）。"}, "sources": ["2024 ACC/AHA Hypertrophic Cardiomyopathy Guideline；2023 ESC Cardiomyopathies Guideline"]}}, "108080-11": {"quick": "新型口服抗凝劑（rivaroxaban、dabigatran、apixaban）治療VTE效果不亞於warfarin且出血較少，敘述正確，故選D。", "detail": {"background": "急性肺栓塞會有胸痛、心搏過速、頸靜脈怒張，肺高壓時P2「變大聲」。抗凝療程一般3–6個月（誘發性），不明原因/復發者考慮延長，而非一律3年。導管導向溶栓使用「較低」劑量tPA，非全身性的100 mg。DOAC已證實治療VTE不劣於warfarin且大出血較少。", "options": {"A": "錯誤。肺高壓時P2變「大聲」，非變小聲。", "B": "錯誤。療程一般3–6個月，非一律3年。", "C": "錯誤。導管導向溶栓用較低劑量，非與周邊相同的100 mg。", "D": "正確（本題答案）。DOAC不劣於warfarin且出血較少。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline；2021 CHEST VTE Guideline"]}}, "108080-50": {"quick": "分解「血液中」三酸甘油酯（乳糜微粒/VLDL）的酶是脂蛋白脂解酶（lipoprotein lipase），不是荷爾蒙敏感性脂肪酶，故B錯誤。", "detail": {"background": "腸道吸收脂肪後於腸細胞組成乳糜微粒進入乳糜管。血液中乳糜微粒/VLDL的三酸甘油酯由微血管內皮上的「脂蛋白脂解酶（LPL）」水解；荷爾蒙敏感性脂肪酶（HSL）則是在脂肪細胞「內」分解儲存脂肪、釋出游離脂肪酸。LDL由VLDL代謝而來，HDL可與其他脂蛋白交換脂質與膽固醇酯。", "options": {"A": "正確。乳糜微粒經乳糜管進入循環。", "B": "錯誤（本題答案）。分解血中三酸甘油酯的是LPL，非HSL。", "C": "正確。LDL由VLDL轉化而來。", "D": "正確。HDL可與其他脂蛋白交換脂質。"}, "sources": ["Harrison's Principles of Internal Medicine（脂蛋白代謝）"]}}, "108080-51": {"quick": "Amiodarone富含碘，可能惡化甲狀腺毒症，甲亢相關心律不整應儘量避免，故選B。", "detail": {"background": "甲狀腺功能亢進相關心律不整（如心房顫動）控制心率可用β-blocker（如propranolol，兼緩解症狀）、非雙氫吡啶類鈣阻斷劑（diltiazem）、digoxin。Amiodarone每分子含大量碘，可能誘發或惡化甲狀腺毒症（amiodarone-induced thyrotoxicosis），故應儘量避免。", "options": {"A": "Digoxin可用於控制心率。", "B": "正確（本題答案）。Amiodarone含碘，可能惡化甲亢。", "C": "Propranolol為甲亢常用、可緩解症狀。", "D": "Diltiazem可用於控制心率。"}, "sources": ["Harrison's Principles of Internal Medicine（amiodarone與甲狀腺）"]}}, "108080-76": {"quick": "抗組織胺屬抗膽鹼作用，會造成「心搏過速」而非心搏過緩＋低血壓，最不可能造成題述症狀，故選D。", "detail": {"background": "造成心搏過緩＋低血壓的中毒：有機磷與胺基甲酸鹽（膽鹼性過量→流涎、瞳孔縮小、心搏過緩）、clonidine（中樞交感抑制→心搏過緩、低血壓）。抗組織胺具抗膽鹼作用，中毒反而出現心搏過速、瞳孔放大、口乾、發熱、譫妄。", "options": {"A": "有機磷→膽鹼性中毒、心搏過緩。", "B": "胺基甲酸鹽→膽鹼性中毒、心搏過緩。", "C": "Clonidine→心搏過緩、低血壓。", "D": "最不可能（本題答案）。抗組織胺為抗膽鹼，造成心搏過速。"}, "sources": ["Harrison's Principles of Internal Medicine（中毒學）"]}}, "108080-78": {"quick": "換藥後出現腹脹、便秘，最可能是鈣離子阻斷劑amlodipine的副作用，故選D。", "detail": {"background": "鈣離子阻斷劑（尤其影響腸道平滑肌）常見便秘、下肢水腫、臉潮紅、頭痛等副作用；ARB（valsartan）、ACEI（enalapril/Renitec，典型副作用為乾咳、高血鉀）、α/β-blocker（labetalol）較不以便秘為主要副作用。", "options": {"A": "Valsartan（ARB）較不致便秘。", "B": "Renitec（enalapril, ACEI）典型副作用為乾咳。", "C": "Labetalol（α/β阻斷劑）較不致便秘。", "D": "正確（本題答案）。Amlodipine（CCB）可致便秘、水腫。"}, "sources": ["2017 ACC/AHA Hypertension Guideline（降壓藥副作用）"]}}, "109020-06": {"quick": "主動脈瓣狹窄是壓力負荷，左心室以「向心性肥厚」代償（非擴大）；左室擴大是晚期失代償表現，故B錯誤。", "detail": {"background": "主動脈瓣狹窄常見於二瓣性主動脈瓣（最常見先天瓣膜異常）與老年鈣化。為對抗壓力負荷，左心室以向心性肥厚代償，早期收縮功能維持、可無症狀；至晚期失代償才出現左室擴大與功能下降。出現症狀（心絞痛、昏厥、心衰竭）後預後差，心衰竭者平均存活約2年；高手術風險者TAVR成效已與外科相近。", "options": {"A": "正確。二瓣性主動脈瓣為最常見先天瓣膜異常、易致AS。", "B": "錯誤（本題答案）。早期為向心性肥厚代償，非左室擴大。", "C": "正確。出現心衰竭症狀者平均存活約2年。", "D": "正確。高手術風險族群TAVR成效與外科相近。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline；2021 ESC/EACTS VHD"]}}, "109020-07": {"quick": "低血鈣、蜘蛛膜下出血、amiodarone都會使QT延長；甲狀腺亢進最不會造成QT延長，故選C。", "detail": {"background": "QT延長原因：電解質異常（低血鈣、低血鉀、低血鎂）、藥物（amiodarone、sotalol、某些抗生素/抗精神病藥）、中樞神經事件（蜘蛛膜下出血等神經性T波/QT變化）、先天長QT。甲狀腺亢進反而可能使心率加快、心房顫動，不以QT延長為特徵。", "options": {"A": "會（神經性QT延長）。", "B": "會（低血鈣延長QT）。", "C": "最不會（本題答案）。甲亢不以QT延長為特徵。", "D": "會（amiodarone延長QT）。"}, "sources": ["Braunwald's Heart Disease（QT延長病因）"]}}, "109020-08": {"quick": "左上胸骨緣收縮期雜音＋顫抖、右心室頂起、且第二心音分裂「隨呼吸變化」（非固定）＝肺動脈瓣狹窄，故選D。", "detail": {"background": "肺動脈瓣狹窄：左第二肋間（肺動脈區）收縮期噴射雜音與顫抖、右心室肥厚（RV heave），P2延後造成「隨呼吸變化的寬分裂S2」。心房中膈缺損則為「固定」分裂S2（不隨呼吸變化），為本題鑑別關鍵。", "options": {"A": "ASD為固定分裂S2，不隨呼吸變化。", "B": "主動脈狹窄雜音在右上胸骨緣、傳向頸部。", "C": "PDA為連續性機器樣雜音。", "D": "正確（本題答案）。肺動脈瓣狹窄。"}, "sources": ["Braunwald's Heart Disease（先天瓣膜病聽診）"]}}, "109020-09": {"quick": "下壁＋右心室梗塞造成低血壓、心搏過緩、右心室擴大、肺野乾淨；右室梗塞依賴前負荷，最佳處置是快速輸液，故選D。", "detail": {"background": "右心室梗塞（常伴下壁MI）因右心室收縮力下降，心輸出量「依賴前負荷」，故低血壓時應先快速輸液提升前負荷；應避免硝酸鹽/利尿劑/嗎啡等降前負荷藥物。輸液無效再考慮強心劑。", "options": {"A": "主動脈氣球幫浦用於左室衰竭/心因性休克，非首選。", "B": "Dobutamine於輸液無效後才考慮。", "C": "錯誤。硝化甘油降前負荷會惡化右室梗塞低血壓。", "D": "正確（本題答案）。快速輸液提升前負荷。"}, "sources": ["2025 ACC/AHA ACS Guideline（右室梗塞處置）"]}}, "109020-10": {"quick": "病人休息時無症狀，僅在從事（對他而言屬日常的）粗重工作時才喘，屬輕度限制，為NYHA第二級，故選B。", "detail": {"background": "NYHA分級：I級無症狀；II級日常活動會出現症狀、休息時無症狀（輕度限制）；III級低於日常的活動即出現症狀（明顯限制）；IV級休息時即有症狀。本例休息可恢復、仍能從事相當程度的搬運工作（雖比以前差），屬第二級。", "options": {"A": "I級為無症狀，不符。", "B": "正確（本題答案）。日常活動出現症狀、休息無症狀＝II級。", "C": "III級為低於日常活動即症狀，程度更重。", "D": "IV級為休息即有症狀，不符。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline（NYHA分級）"]}}, "109020-11": {"quick": "黃色瘤不只與高LDL有關，發疹性黃色瘤與高「三酸甘油酯」相關，「與TG無關」是錯的，故選A。", "detail": {"background": "黃色瘤型態反映不同脂質異常：肌腱黃色瘤、伸肌面/皮下黃色瘤多見於高LDL（家族性高膽固醇血症）；發疹性黃色瘤則與極高三酸甘油酯（乳糜微粒血症）相關。故黃色瘤與LDL及TG皆可能有關。", "options": {"A": "錯誤（本題答案）。發疹性黃色瘤與高三酸甘油酯有關，並非只與LDL有關。", "B": "正確。常見於皮下。", "C": "正確。可見於肌腱鞘（肌腱黃色瘤）。", "D": "正確。常見於四肢伸肌面。"}, "sources": ["Harrison's Principles of Internal Medicine（黃色瘤與脂質異常）"]}}, "109020-12": {"quick": "心包摩擦音是「高頻」搔刮樣聲音（非低頻），故B敘述錯誤。", "detail": {"background": "心包由臟層與壁層組成，間有約15–50 mL心包液。急性心包炎的摩擦音為「高頻、搔刮樣」，以隔膜聽診、病人前傾、呼氣末最易聽見；積液增多時摩擦音可消失並可能進展為填塞。心電圖早期為廣泛ST上升；填塞的Beck三徵為低血壓、心音遙遠、頸靜脈怒張（x下降明顯、y下降消失）。", "options": {"A": "正確。雙層心包與15–50 mL心包液。", "B": "錯誤（本題答案）。摩擦音為高頻，非低頻。", "C": "正確。早期廣泛ST上升。", "D": "正確。填塞之Beck三徵與頸靜脈波形描述正確。"}, "sources": ["2015 ESC Pericardial Diseases Guideline"]}}, "109020-62": {"quick": "使用利尿劑後出現反覆昏厥、無脈需電擊（torsades/VF），最可能合併低血鉀，故選D。", "detail": {"background": "利尿劑（尤其thiazide/loop）可造成低血鉀與低血鎂，延長QT並誘發尖端扭轉型心室頻脈（torsades de pointes），表現為反覆昏厥、無脈、需電擊。處置為補鉀補鎂、矯正QT延長因素。", "options": {"A": "低血鈉不以致命性心律不整/torsades表現。", "B": "高血鉀心電圖為高尖T波、QRS增寬，非此情境主因。", "C": "高血鈣縮短QT，不致torsades。", "D": "正確（本題答案）。低血鉀致QT延長與torsades。"}, "sources": ["Braunwald's Heart Disease（電解質與心律不整）"]}}, "109020-63": {"quick": "鎂仍無法控制的反覆torsades（多為pause/緩脈依賴），可用isoproterenol或overdrive提高心率至100–120以縮短QT、抑制發作，故選C。", "detail": {"background": "尖端扭轉型心室頻脈若補鎂無效，對「緩脈/間歇依賴型」可用isoproterenol或暫時性超速起搏將心率提高至約100–120次/分，以縮短QT、避免長間歇誘發；單純維持70次/分常不足以抑制。Amiodarone/部分抗心律不整藥反而延長QT，不宜。", "options": {"A": "Amiodarone延長QT，可能惡化torsades。", "B": "Lidocaine效果有限，非首選。", "C": "正確（本題答案）。isoproterenol加速心率至100–120抑制torsades。", "D": "暫時性起搏可行，但維持70次/分常不足，需更快的超速起搏。"}, "sources": ["Braunwald's Heart Disease（torsades處置）；ACLS"]}}, "109020-76": {"quick": "右心室梗塞依賴前負荷，硝化甘油會降前負荷惡化低血壓，最不恰當，故選D。", "detail": {"background": "右心室梗塞合併低血壓時，應給氧、抗血小板、再灌流（溶栓或PCI）、並以輸液維持前負荷；硝酸鹽、利尿劑、嗎啡等降前負荷藥物會惡化血壓，屬禁忌。", "options": {"A": "恰當。給氧。", "B": "恰當。抗血小板治療。", "C": "恰當（若無法即時PCI可溶栓再灌流）。", "D": "最不恰當（本題答案）。硝化甘油降前負荷、惡化右室梗塞低血壓。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "109020-77": {"quick": "撕裂性胸痛轉移至背腹、高血壓、單側股動脈搏動消失＝主動脈剝離併肢體缺血；應立即影像確診（CT），故選D。", "detail": {"background": "急性主動脈剝離以突發撕裂痛、轉移痛、兩側脈搏/血壓不對稱、分支阻塞（肢體/內臟缺血）表現。處置原則：積極控制血壓與心率（目標SBP約100–120、降dP/dt，常用β-blocker±血管擴張劑）、止痛、立即影像（CT主動脈攝影）確診並評估手術；抗凝（heparin）為禁忌。", "options": {"A": "錯誤。應降壓（SBP約100–120），非維持>150。", "B": "錯誤。應給止痛以降低交感與血壓。", "C": "錯誤。主動脈剝離禁用肝素抗凝。", "D": "正確（本題答案）。立即CT確診。"}, "sources": ["2022 ACC/AHA Aortic Disease Guideline；2014 ESC Aortic Diseases"]}}, "109080-06": {"quick": "被激活的血小板是透過GP IIb/IIIa接受器以「纖維蛋白原(fibrinogen)架橋」相互連結，而非彼此直接連結，故C錯誤。", "detail": {"background": "ACS分子機制：發炎細胞分泌TNF、基質金屬蛋白酶分解膠原使斑塊不穩定→斑塊崩壞暴露內膜下蛋白→血小板黏附活化、釋出thromboxane/serotonin致血管收縮與更多血小板活化；活化的GP IIb/IIIa接受器以fibrinogen為橋連結血小板形成團塊；凝血瀑布產生thrombin將fibrinogen轉為fibrin強化血栓。", "options": {"A": "正確。發炎/MMP使斑塊不穩定。", "B": "正確。釋出thromboxane、serotonin致血管收縮。", "C": "錯誤（本題答案）。血小板經GP IIb/IIIa以fibrinogen架橋連結，非彼此直接連結。", "D": "正確。thrombin將fibrinogen轉為fibrin。"}, "sources": ["Braunwald's Heart Disease（血栓形成機制）"]}}, "109080-07": {"quick": "NSTEMI並非所有病人都需在12小時內PCI；侵入性治療時機依風險分層（極高危立即、高危<24小時、其餘選擇性），故C錯誤。", "detail": {"background": "NSTEMI為非完全阻塞，與STEMI不同，並非一律緊急直接PCI。依風險分層決定侵入策略：血流動力學不穩/頑固缺血等「極高危」立即（<2小時）；高危（如troponin上升、GRACE高分）早期（<24小時）；低危可選擇性侵入。治療含抗血小板、抗凝、β-blocker、硝酸鹽等。", "options": {"A": "正確。NSTEMI之臨床/心電圖/心肌酶定義。", "B": "大致正確。troponin敏感度特異度高、上升相對早。", "C": "錯誤（本題答案）。並非所有NSTEMI都需12小時內PCI，須依風險分層。", "D": "正確。藥物治療組合正確。"}, "sources": ["2025 ACC/AHA ACS Guideline；2023 ESC ACS Guideline"]}}, "109080-08": {"quick": "CHA2DS2-VASc：高血壓1＋糖尿病1＋年齡≥75為2＋女性1＝5分。原公布C(6)，後更正為B(5)、C(6)均給分。", "detail": {"background": "CHA2DS2-VASc計分：充血性心衰1、高血壓1、年齡≥75為2、糖尿病1、中風/TIA/栓塞2、血管疾病1、年齡65–74為1、女性1。本例76歲女性、有高血壓與糖尿病、無中風/血管病：高血壓1＋糖尿病1＋年齡≥75(2)＋女性1＝5分，達抗凝門檻。", "options": {"A": "4分計算偏低。", "B": "5分為正解（本題後認定B、C均給分）。", "C": "原公布答案6分（本題後B、C均給分）。", "D": "7分計算偏高。"}, "sources": ["2023 ACC/AHA AF Guideline；考選部更正公告（本題B、C均給分）"]}}, "109080-09": {"quick": "69歲男性有胸悶、易倦、運動耐受差且心搏過緩，心電圖顯示房室傳導阻滯（非單純竇性心搏過緩），故選D。", "detail": {"background": "症狀性心搏過緩需區分竇性心搏過緩與房室傳導阻斷；若心電圖出現P波與QRS不規則對應（PR漸長、漏跳，或P與QRS各自獨立）即為房室阻斷，可解釋其疲倦、運動耐受不佳，且常需評估節律器置入。", "options": {"A": "竇性心搏過緩P-QRS為1:1正常傳導，與本圖不符。", "B": "非QTc延長的表現。", "C": "非左心室肥厚的判讀重點。", "D": "正確（本題答案）。心電圖呈房室傳導阻滯。"}, "sources": ["2018 ACC/AHA/HRS Bradycardia Guideline"]}}, "109080-10": {"quick": "此為肥厚型心肌病變（運動性昏厥、猝死家族史、收縮期雜音、左室肥厚併心室內壓力梯度）；「站起」減少前負荷會使流出道阻塞加重、雜音變大，故選C。", "detail": {"background": "肥厚型心肌病變的流出道阻塞與雜音強度隨「前負荷/後負荷」變化：減少前負荷或後負荷（站立、Valsalva用力期）會加重阻塞、雜音變大；增加前負荷/後負荷（蹲下、握拳、抬腳）會減輕阻塞、雜音變小。這與主動脈瓣狹窄相反，是重要鑑別。", "options": {"A": "握拳增加後負荷→雜音變小。", "B": "蹲下增加前後負荷→雜音變小。", "C": "正確（本題答案）。站起減少前負荷→雜音變大。", "D": "抬腳增加前負荷→雜音變小。"}, "sources": ["2024 ACC/AHA Hypertrophic Cardiomyopathy Guideline"]}}, "109080-11": {"quick": "矛盾分裂（paradoxical splitting）是主動脈瓣關閉「延後」，使A2落在P2之後；見於嚴重主動脈瓣狹窄、LBBB等，故選B。", "detail": {"background": "正常S2於吸氣時分裂變寬。矛盾（反向）分裂指A2延後至P2之後，呼氣時分裂反而較寬、吸氣時變窄；原因為左心室射出延長或左束支阻斷（LBBB），如嚴重主動脈瓣狹窄、HCM、LBBB。右束支阻斷或肺高壓造成的是「寬分裂」（P2延後），非矛盾分裂。", "options": {"A": "錯誤。與二尖瓣提前關閉無關。", "B": "正確（本題答案）。嚴重AS使主動脈瓣關閉延後而矛盾分裂。", "C": "錯誤。RBBB造成寬分裂，非矛盾分裂。", "D": "錯誤。肺高壓/右心衰竭為寬分裂。"}, "sources": ["Braunwald's Heart Disease（心音分裂）"]}}, "109080-14": {"quick": "收縮性心衰竭應避免非雙氫吡啶類鈣阻斷劑（verapamil、diltiazem，負性肌力），故選B為不宜。", "detail": {"background": "HFrEF治療基石為RAAS抑制劑/ARNI、β-blocker、醛固酮拮抗劑、SGLT2i，利尿劑緩解充血，ivabradine可用於竇性心律仍快者。Verapamil、diltiazem具明顯負性肌力，會惡化收縮性心衰竭，應避免。", "options": {"A": "適當。利尿劑（含醛固酮拮抗劑）。", "B": "不宜（本題答案）。verapamil/diltiazem於HFrEF禁忌。", "C": "適當。RAAS抑制劑。", "D": "適當。β-blocker與ivabradine。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline；2021 ESC HF Guideline"]}}, "109080-40": {"quick": "機械瓣膜病人INR 5.4但「無出血」，不應為了預防而靜脈注射維生素K降到INR<3（恐過度矯正致瓣膜血栓），故B錯誤。", "detail": {"background": "warfarin起效慢，急性期需以肝素橋接約5天。對機械瓣膜病人，INR升高但無出血時，應暫停warfarin並密切監測（極高時可考慮極低劑量口服維生素K），避免靜脈注射維生素K大幅逆轉而引發瓣膜血栓。有臨床出血時，FFP或凝血酶原複合物可快速補充維生素K依賴凝血因子。warfarin早期降低protein C/S，缺乏者易血栓（皮膚壞死），需注意。", "options": {"A": "正確。起效慢，需肝素橋接約5天。", "B": "錯誤（本題答案）。無出血時不應靜脈注射維生素K積極降INR，恐致瓣膜血栓。", "C": "正確。FFP可快速補充凝血因子（用於出血時）。", "D": "正確。warfarin降protein C/S，缺乏者須小心。"}, "sources": ["2020 ACC/AHA Valvular Heart Disease Guideline（機械瓣膜抗凝）"]}}, "109080-54": {"quick": "年輕、體型正常、高血壓合併低血鉀，最可能為原發性醛固酮過多症；應抽血檢驗aldosterone與plasma renin activity（ARR），故選A。", "detail": {"background": "年輕高血壓合併自發性低血鉀（非利尿劑造成）高度懷疑原發性醛固酮過多症。篩檢首選血漿醛固酮/腎素活性比值（ARR）：原發性醛固酮過多為高醛固酮、低腎素。其他依臨床懷疑再選（庫欣→cortisol/ACTH、嗜鉻細胞瘤→尿VMA/兒茶酚胺、甲狀腺→TSH/fT4）。", "options": {"A": "正確（本題答案）。檢驗aldosterone與renin activity篩檢原發性醛固酮過多。", "B": "庫欣症候群篩檢，臨床圖像不符。", "C": "嗜鉻細胞瘤篩檢，本例以低血鉀為主較不符。", "D": "甲狀腺檢查，不符低血鉀高血壓圖像。"}, "sources": ["2017 ACC/AHA Hypertension Guideline；Endocrine Society Primary Aldosteronism Guideline"]}}, "110020-04": {"quick": "Fibrate會增加膽汁中膽固醇飽和度，反而「增加」膽結石生成，「減少膽結石」是錯的，故選A。", "detail": {"background": "降血脂藥副作用：fibrate增加膽汁膽固醇飽和度→增加膽結石風險；statin可致肌肉痠痛/肌病；niacin（菸鹼酸）可升高HDL，適用於低HDL；omega-3脂肪酸降低三酸甘油酯（部分透過增加分解/減少VLDL生成）。", "options": {"A": "錯誤（本題答案）。Fibrate增加而非減少膽結石生成。", "B": "正確。Statin可造成肌肉痠痛。", "C": "正確。Niacin適用於低HDL。", "D": "正確。Omega-3降低三酸甘油酯。"}, "sources": ["2018 AHA/ACC Cholesterol Guideline；2019 ESC/EAS Dyslipidaemias"]}}, "110020-06": {"quick": "心包填塞的Beck三徵＝低血壓、心音遙遠（低沉）、頸靜脈怒張，故選C。", "detail": {"background": "急性心包填塞時心包內壓上升、限制心室充填，造成Beck三徵：低血壓、心音遙遠（muffled）、頸靜脈怒張。常伴奇脈、心電圖低電位或電交替。Kussmaul徵象與心包摩擦音較屬縮窄性心包炎/心包發炎，非填塞三徵。", "options": {"A": "含Kussmaul徵象，非填塞三徵。", "B": "含摩擦音，非填塞三徵。", "C": "正確（本題答案）。低沉心音、頸靜脈怒張、低血壓。", "D": "含摩擦音與QRS低電位，非填塞三徵定義。"}, "sources": ["Braunwald's Heart Disease（心包填塞）"]}}, "110020-07": {"quick": "心包填塞造成的是心輸出量下降，不會引起次發性肺高壓，故為例外，選B。", "detail": {"background": "次發性肺高壓成因眾多：肝硬化門脈高壓（門肺型肺高壓）、結締組織疾病（如硬皮症的PAH）、慢性肺病/缺氧（COPD）、左心疾病、慢性血栓栓塞等。心包填塞造成心輸出量下降與全身低灌流，並非肺動脈高壓的成因。", "options": {"A": "可致門肺型肺高壓。", "B": "例外（本題答案）。心包填塞不引起肺高壓。", "C": "硬皮症等結締組織病可致PAH。", "D": "COPD缺氧可致肺高壓。"}, "sources": ["2022 ESC/ERS Pulmonary Hypertension Guideline"]}}, "110020-08": {"quick": "主動脈縮窄的肋骨凹痕（rib notching）位於肋骨「下緣」（第3–9肋），非上緣，故D錯誤。", "detail": {"background": "主動脈縮窄常合併二瓣性主動脈瓣；因狹窄使下肢血壓低於上肢、股動脈搏動延遲；側枝循環經肋間動脈使第3–9肋骨「下緣」出現凹痕（rib notching）；可在背部兩肩胛間聽到收縮期雜音。", "options": {"A": "正確。常合併二瓣性主動脈瓣。", "B": "正確。下肢血壓較上肢低。", "C": "正確。肩胛間區可聞收縮期雜音。", "D": "錯誤（本題答案）。肋骨凹痕在肋骨下緣，非上緣。"}, "sources": ["Braunwald's Heart Disease（主動脈縮窄）"]}}, "110020-11": {"quick": "拔除動脈鞘時傷口劇痛伴臉色蒼白、低血壓、心搏過緩＝血管迷走神經反射；立即處置為atropine加快速輸液，故選B。", "detail": {"background": "拔除股動脈鞘時的疼痛/壓迫可誘發強烈迷走神經反射，造成心搏過緩與低血壓（vasovagal reaction）。處置為平躺、快速輸液擴容並給atropine解除迷走張力；多可迅速恢復，不需升壓劑或主動脈氣球幫浦。", "options": {"A": "升壓劑非迷走反射首選。", "B": "正確（本題答案）。atropine加快速輸液。", "C": "主動脈氣球幫浦用於心因性休克，非此情境。", "D": "非心導管併發症之首要處置。"}, "sources": ["Braunwald's Heart Disease（導管術後血管迷走反應）"]}}, "110020-12": {"quick": "對「穩定」心絞痛，PCI能改善症狀，但與最佳藥物治療相比並未減少心肌梗塞與死亡，故A錯誤。", "detail": {"background": "穩定型冠心病（COURAGE、ISCHEMIA試驗）：PCI可緩解心絞痛、改善生活品質，但相較最佳藥物治療並未降低心肌梗塞或死亡。藥物塗層支架再狹窄較裸支架低但仍有支架血栓風險；慢性全阻塞病灶成功率差異大；糖尿病合併複雜多支病灶以CABG優於PCI（FREEDOM）。", "options": {"A": "錯誤（本題答案）。穩定心絞痛PCI未減少MI/死亡。", "B": "正確。DES再狹窄低但有支架血栓風險。", "C": "正確。CTO成功率報告差異大。", "D": "正確。糖尿病多支病灶CABG優於PCI。"}, "sources": ["2021 ACC/AHA/SCAI Revascularization Guideline；ISCHEMIA Trial"]}}, "110020-13": {"quick": "心電圖顯示急性ST段上升心肌梗塞（STEMI），應立即啟動緊急心導管（primary PCI）流程，故選B。", "detail": {"background": "STEMI為臨床合併心電圖診斷，不應等待心肌酶結果而延誤再灌流。若可於時效內施行，primary PCI優於溶栓。早期給aspirin、評估後給其他抗血小板/抗凝，氧氣僅在SpO2<90%才需，硝酸鹽用於緩解症狀但非優先且須注意低血壓/右室梗塞。", "options": {"A": "錯誤。STEMI不應等心肌酶才處置。", "B": "正確（本題答案）。辨識STEMI並啟動緊急心導管。", "C": "部分合理但非最關鍵；常規氧氣與IV NTG非首要，且漏了再灌流。", "D": "錯誤。可即時PCI時，primary PCI優於溶栓。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "110080-06": {"quick": "心房顫動病人出現心搏過緩（32次/分）多與控制心率的藥物（β-blocker、digoxin、非DHP鈣阻斷劑）有關；甲型阻斷劑造成姿位性低血壓而非心搏過緩，最不相關，故選D。", "detail": {"background": "控制心房顫動心室反應的藥物（β-blocker、digoxin、verapamil/diltiazem）過量或腎功能不全蓄積（如digoxin）可造成嚴重心搏過緩或房室阻斷。甲型交感神經阻斷劑主要造成血管擴張與姿位性低血壓，不以心搏過緩為主。", "options": {"A": "β-blocker可致心搏過緩。", "B": "Digoxin（腎功能不全易蓄積）可致心搏過緩/阻斷。", "C": "非DHP鈣阻斷劑可致心搏過緩。", "D": "最不相關（本題答案）。α-blocker造成低血壓而非心搏過緩。"}, "sources": ["2023 ACC/AHA AF Guideline（心率控制藥物）"]}}, "110080-07": {"quick": "肥胖的心衰竭病人BNP數值會略低於非肥胖者，敘述正確，故選B。", "detail": {"background": "BNP判讀受多因素影響：肥胖者BNP偏低（可能低估）；腎衰竭者因清除減少而BNP「偏高」；單一數值100 pg/mL屬灰色地帶，且BNP無法區分收縮或舒張功能不全，不能僅憑此診斷收縮性心衰竭。以系列BNP指引治療的證據並不一致。", "options": {"A": "錯誤。BNP 100為灰色地帶且不能區分收縮/舒張，不能據此診斷收縮性心衰竭。", "B": "正確（本題答案）。肥胖者BNP偏低。", "C": "錯誤。腎衰竭者BNP反而偏高（清除下降）。", "D": "證據不一致，非標準依據。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline（natriuretic peptide判讀）"]}}, "110080-08": {"quick": "4公分、無剝離的胸降主動脈瘤未達手術門檻，宜每年CT追蹤，若每年增大超過1公分再轉外科，故選A。", "detail": {"background": "胸主動脈瘤手術門檻一般為胸降主動脈≥5.5–6 cm（合併結締組織病/家族症候群更低），或快速增大（>0.5–1 cm/年）、有症狀。4 cm瘤應以CT/MRI（非經胸超音波，後者難評估降主動脈）每年追蹤，並嚴格控制血壓，達門檻或快速增大才手術。", "options": {"A": "正確（本題答案）。每年CT追蹤，快速增大（>1 cm/年）再轉外科。", "B": "錯誤。4 cm未達手術門檻，不需立即手術。", "C": "錯誤。4.5 cm仍低於胸降主動脈手術門檻。", "D": "錯誤。經胸超音波難評估胸降主動脈，應用CT/MRI。"}, "sources": ["2022 ACC/AHA Aortic Disease Guideline"]}}, "110080-09": {"quick": "法洛氏四合症為出生即可發紺的先天性心臟病（右到左分流），故選C。", "detail": {"background": "ASD、VSD、PDA屬左到右分流，出生時不發紺（acyanotic），長期可因肺高壓逆轉（Eisenmenger）才轉發紺。法洛氏四合症因右心室流出道阻塞造成右到左分流，出生即可發紺，屬cyanotic congenital heart disease。", "options": {"A": "ASD為左到右分流，非發紺型。", "B": "VSD為左到右分流，非發紺型。", "C": "正確（本題答案）。法洛氏四合症出生即發紺。", "D": "PDA為左到右分流，非發紺型。"}, "sources": ["Braunwald's Heart Disease（先天性心臟病）"]}}, "110080-11": {"quick": "低血鉀（醛固酮過多）、頭痛心悸盜汗（嗜鉻細胞瘤）、打鼾日間嗜睡（睡眠呼吸中止）都是次發性高血壓線索；高血脂只是共病，最不指向次發性，故選D。", "detail": {"background": "次發性高血壓的警訊：自發性低血鉀（原發性醛固酮過多）、陣發性頭痛/心悸/盜汗（嗜鉻細胞瘤）、打鼾與日間嗜睡（阻塞性睡眠呼吸中止）、年輕發病、難治型高血壓等。高血脂為常見共病，並非次發性高血壓的特異線索。", "options": {"A": "低血鉀→原發性醛固酮過多，是線索。", "B": "頭痛心悸盜汗→嗜鉻細胞瘤，是線索。", "C": "打鼾日間嗜睡→睡眠呼吸中止，是線索。", "D": "最不考慮（本題答案）。高血脂為共病，非次發性線索。"}, "sources": ["2017 ACC/AHA Hypertension Guideline"]}}, "110080-12": {"quick": "暈厥的檢查多針對心臟結構與心律（心臟超音波、Holter、電生理檢查）；肺功能檢查最不可能找出暈厥原因，故選A。", "detail": {"background": "反覆暈厥（尤其坐姿發生、無姿位性低血壓）須評估心因性原因：心臟超音波找結構性疾病、24小時心電圖/事件記錄器找心律不整、電生理檢查評估傳導與誘發性心律不整。肺功能檢查評估的是氣道/通氣，與暈厥成因關聯最低。", "options": {"A": "最不可能（本題答案）。肺功能檢查與暈厥成因關聯最低。", "B": "心臟超音波可找結構性病因。", "C": "Holter可捕捉心律不整。", "D": "電生理檢查可評估傳導/心律問題。"}, "sources": ["2017 ACC/AHA/HRS Syncope Guideline"]}}, "110080-52": {"quick": "Statin抑制的是HMG-CoA「還原酶（reductase）」，不是oxidase，故A錯誤。", "detail": {"background": "膽固醇合成的速率決定步驟由HMG-CoA還原酶催化，statin即為其抑制劑。HDL負責逆向膽固醇運輸；空腹時血中三酸甘油酯主要由VLDL運送（進食後則為乳糜微粒）；LDL受體是細胞攝取血中膽固醇最重要的受體。", "options": {"A": "錯誤（本題答案）。Statin抑制HMG-CoA還原酶，非oxidase。", "B": "正確。HDL為逆向膽固醇運輸主角。", "C": "正確。空腹三酸甘油酯主要由VLDL運送。", "D": "正確。LDL受體為細胞攝取膽固醇最重要受體。"}, "sources": ["Harrison's Principles of Internal Medicine（脂蛋白代謝）"]}}, "110080-76": {"quick": "心室顫動（無脈）需要的是「非同步」去顫，無法同步整流，故最不適合同步整流，選D。", "detail": {"background": "同步整流（synchronized cardioversion）需偵測QRS同步放電，用於「有脈搏」的不穩定快速心律（不穩定VT、AF/AFL伴快速反應、SVT伴不穩定）。心室顫動無有效QRS可同步，必須以「非同步」去顫（defibrillation）並合併CPR。", "options": {"A": "VT合併休克→可同步整流。", "B": "AF快速反應且不穩定→可同步整流。", "C": "SVT合併急性肺水腫（不穩定）→可同步整流。", "D": "最不適合（本題答案）。VF需非同步去顫。"}, "sources": ["ACLS（電擊種類）；2020 AHA CPR/ECC Guidelines"]}}, "111020-01": {"quick": "姿勢性低血壓的定義是站立3分鐘內收縮壓下降≥20 mmHg或舒張壓下降≥10 mmHg；題目「15/5」數值錯誤，故選C。", "detail": {"background": "昏厥分類：反射性（血管迷走性最常見）、姿勢性低血壓、心因性（心律不整或結構性心臟病）。姿勢性低血壓定義為站立3分鐘內SBP↓≥20或DBP↓≥10 mmHg。懷疑血管迷走性昏厥可做傾斜床測試。", "options": {"A": "正確。血管迷走性為最常見原因。", "B": "正確。心因性含心律不整與結構性心臟病。", "C": "錯誤（本題答案）。定義應為SBP↓≥20或DBP↓≥10，非15/5。", "D": "正確。傾斜床測試用於評估血管迷走性昏厥。"}, "sources": ["2017 ACC/AHA/HRS Syncope Guideline；2018 ESC Syncope Guideline"]}}, "111020-03": {"quick": "病人為B肝相關肝病、平躺呼吸較順（platypnea），臨床圖像偏向肝肺症候群/肝硬化；脾腫大（Castell）與腹水（shifting dullness）有助診斷，右心室頂起（肺高壓徵象）最沒幫助，故選D。", "detail": {"background": "端坐比平躺更喘（platypnea-orthodeoxia）合併慢性B肝病史，提示肝硬化的肝肺症候群。確立肝硬化/門脈高壓的理學徵象如脾腫大（Castell's sign）、腹水（移動性濁音）較有幫助；右心室頂起反映肺動脈高壓/右心室肥厚，對此情境診斷幫助最小。", "options": {"A": "Castell's sign（脾腫大）有助評估肝硬化/門脈高壓。", "B": "移動性濁音（腹水）有助評估。", "C": "舒張期隆隆雜音（如MS）雖屬心臟，但仍提供瓣膜資訊。", "D": "最沒幫助（本題答案）。右心室頂起為肺高壓徵象，與此診斷關聯最低。"}, "sources": ["Harrison's Principles of Internal Medicine（肝肺症候群）"]}}, "111020-06": {"quick": "大多數腹主動脈瘤位於腎動脈「以下」（infrarenal），非以上，故C錯誤。", "detail": {"background": "主動脈瘤病因含退化、遺傳症候群（Marfan）、慢性剝離、感染/發炎性動脈炎、創傷等；破裂風險隨瘤徑增大而升高。腹主動脈瘤多為動脈硬化所致且位於「腎動脈以下」（infrarenal）；無症狀AAA直徑≥5.5 cm建議修補，EVAR短期死亡率較開放手術低、長期相近。", "options": {"A": "正確。病因描述正確。", "B": "正確。破裂風險隨大小增加。", "C": "錯誤（本題答案）。AAA多位於腎動脈以下，非以上。", "D": "正確。≥5.5 cm考慮修補，EVAR短期死亡率較低、長期相近。"}, "sources": ["2022 ACC/AHA Aortic Disease Guideline"]}}, "111020-07": {"quick": "主動脈氣球幫浦於「舒張期充氣」以『提升』舒張期主動脈壓、增加冠狀動脈血流，故「降低早期舒張期血壓以增加冠脈血流」的敘述錯誤，選A。", "detail": {"background": "IABP球囊置於降主動脈，舒張期充氣→提升舒張期主動脈壓、增加冠狀動脈灌流；收縮前瞬間消氣→降低後負荷、減少左心室作功。Impella將左室血液泵入主動脈、TandemHeart經左心房抽血以離心泵打入股動脈、ECMO用於心因性休克或合併嚴重呼吸衰竭。", "options": {"A": "錯誤（本題答案）。IABP舒張期是『充氣提升』舒張壓增加冠脈血流，非降低。", "B": "正確。Impella機制描述正確。", "C": "正確。TandemHeart可提供約5 L/min。", "D": "正確。ECMO用於心因性休克/呼吸衰竭。"}, "sources": ["Braunwald's Heart Disease（機械循環支持）"]}}, "111020-08": {"quick": "無症狀的主動脈狹窄不是運動壓力測試的「絕對」禁忌（症狀性重度AS才是），故選C。", "detail": {"background": "運動壓力測試的絕對禁忌包括：急性心肌梗塞（2天內）、不穩定心絞痛未穩定、未控制且有症狀的心律不整、症狀性重度主動脈狹窄、急性心內膜炎/心肌炎、急性主動脈剝離、失代償心衰竭等。無症狀的主動脈狹窄可在謹慎監測下進行運動測試。", "options": {"A": "不穩定心絞痛為絕對禁忌。", "B": "嚴重（活動性）心內膜炎為禁忌。", "C": "不是絕對禁忌（本題答案）。無症狀AS可謹慎測試。", "D": "曾致血行動力不穩的嚴重心律不整為禁忌。"}, "sources": ["2013 ACC/AHA Exercise Testing 原則；Braunwald's Heart Disease"]}}, "111020-09": {"quick": "Class 1C抗心律不整藥（如flecainide）為強鈉通道阻斷劑，可造成Brugada樣ST段上升，故選A。", "detail": {"background": "Class 1C藥物（flecainide、propafenone）強力阻斷鈉通道，可誘發Brugada型心電圖（右胸導程ST上升），甚至作為Brugada症候群的激發試驗。其他類別（II β-blocker、III鉀通道阻斷、IV鈣通道阻斷）不以ST上升表現。", "options": {"A": "正確（本題答案）。Class 1C可致Brugada樣ST上升。", "B": "Class II（β-blocker）不致ST上升。", "C": "Class III延長QT，非ST上升。", "D": "Class IV影響房室傳導，非ST上升。"}, "sources": ["Braunwald's Heart Disease（抗心律不整藥與Brugada）"]}}, "111020-10": {"quick": "心房顫動是「男性」多於女性，故A錯誤。", "detail": {"background": "心房顫動為最常見的持續性心律不整，盛行率男性高於女性；危險因子包括高血壓、糖尿病、肥胖、甲狀腺亢進、瓣膜病、睡眠呼吸中止等；可造成心搏過速性心肌病/心衰竭與血栓栓塞，中風風險以CHA2DS2-VASc評估。", "options": {"A": "錯誤（本題答案）。AF為男性多於女性。", "B": "正確。危險因子描述正確。", "C": "正確。AF可造成心衰竭。", "D": "正確。以CHA2DS2-VASc評估中風風險。"}, "sources": ["2023 ACC/AHA AF Guideline"]}}, "111020-12": {"quick": "HFrEF具實證可改善預後的β-blocker為carvedilol、bisoprolol、metoprolol succinate；propranolol無此實證，故選C。", "detail": {"background": "並非所有β-blocker都能改善HFrEF預後。具大型試驗實證者為carvedilol、bisoprolol與緩釋型metoprolol succinate；propranolol未被證實改善HFrEF存活，不屬指引建議的心衰竭用β-blocker。", "options": {"A": "Carvedilol有實證。", "B": "Bisoprolol有實證。", "C": "無實證（本題答案）。propranolol未證實改善HFrEF預後。", "D": "Metoprolol succinate有實證。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline；2021 ESC HF Guideline"]}}, "111020-13": {"quick": "使用ARNI（含腦啡肽酶抑制）會減少BNP分解，使BNP濃度『上升』（NT-proBNP才下降），故「BNP會降低」錯誤，選A。", "detail": {"background": "BNP為腦啡肽酶（neprilysin）受質；ARNI抑制neprilysin會減少BNP降解、使BNP濃度上升，故ARNI治療下不宜用BNP評估療效，應改用不受影響的NT-proBNP（會下降）。NT-proBNP隨年齡增加、腎功能變差而上升；BNP/NT-proBNP有助門診呼吸困難病人之HF診斷。", "options": {"A": "錯誤（本題答案）。ARNI使BNP上升，非下降。", "B": "正確。NT-proBNP隨年齡上升。", "C": "正確。腎功能差時NT-proBNP上升。", "D": "正確。可輔助HF診斷決策。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline（ARNI與BNP判讀）"]}}, "111020-33": {"quick": "邊緣性紅斑（erythema marginatum）是急性風濕熱中較罕見（<5%）的表現，敘述正確，故選C。", "detail": {"background": "急性風濕熱由A群鏈球菌咽炎後免疫反應引起（非B群），潛伏期約2–4週後出現（非3個月）；主要表現（Jones準則）含心臟炎、多發性關節炎、舞蹈症、皮下結節與邊緣性紅斑，後者較罕見（約<5–6%）；併發心臟炎者相當比例會進展為風濕性心臟病。", "options": {"A": "錯誤。由A群鏈球菌引起，非B群。", "B": "錯誤。潛伏期約2–4週，非3個月。", "C": "正確（本題答案）。邊緣性紅斑為罕見表現（<5%）。", "D": "敘述偏低；併發心臟炎者進展為RHD比例不只10%。"}, "sources": ["2015 AHA Revised Jones Criteria"]}}, "111020-56": {"quick": "內分泌性次發性高血壓中以原發性醛固酮過高最常見，故選A。", "detail": {"background": "次發性高血壓整體以腎實質疾病最常見；在「內分泌」原因中，原發性醛固酮過多症最常見（表現高血壓、低血鉀、低腎素），其次才是嗜鉻細胞瘤、庫欣症候群等。", "options": {"A": "正確（本題答案）。原發性醛固酮過多最常見之內分泌性次發高血壓。", "B": "嗜鉻細胞瘤較少見。", "C": "庫欣症候群較少見。", "D": "肢端肥大症罕見。"}, "sources": ["2017 ACC/AHA Hypertension Guideline；Endocrine Society Guidelines"]}}, "111020-69": {"quick": "本題依附圖的統合分析結果判讀；選項A所述之證據等級/建議等級與圖示不符，為錯誤敘述，故選A。（B、C、D正確描述收縮壓下降幅度、亞組差異與異質性來源）", "detail": {"background": "得舒飲食（DASH）經多項隨機對照試驗證實可有效降低血壓。統合分析顯示整體收縮壓顯著下降（約6.74 mmHg），不同亞組降幅不一，異質性可能來自研究設計、高血壓狀態、介入時間、人數與基線血壓差異。本題A選項對證據等級與建議等級的標示與附圖不一致，為錯誤敘述。", "options": {"A": "錯誤（本題答案）。A所述證據/建議等級與附圖不符。", "B": "正確。整體SBP顯著下降約6.74 mmHg。", "C": "正確。亞組降幅不同。", "D": "正確。異質性來源描述合理。"}, "sources": ["DASH 飲食相關統合分析；2017 ACC/AHA Hypertension Guideline（生活型態介入）"]}}, "111020-76": {"quick": "Furosemide可造成低血鈣與高尿酸血症，敘述正確，故選C。", "detail": {"background": "環利尿劑furosemide可致低血鉀、低血鎂、低血鈣、高尿酸血症與代謝性鹼中毒。Carvedilol可『降低』HFrEF死亡率（非增加）；ACEI/ARB於懷孕為禁忌（致畸胎），孕婦心衰竭不以ACEI為首選；鈣離子阻斷劑未證實降低心衰竭死亡率。", "options": {"A": "錯誤。Carvedilol降低HFrEF死亡率。", "B": "錯誤。ACEI於懷孕禁忌。", "C": "正確（本題答案）。Furosemide可致低血鈣/高尿酸。", "D": "錯誤。CCB未降低心衰竭死亡率。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "111080-02": {"quick": "懷孕期間ACEI/ARB為禁忌（致畸胎），不可作為慢性高血壓首選，故選A最不適當。", "detail": {"background": "懷孕慢性高血壓可用methyldopa、labetalol、長效nifedipine等；ACEI/ARB與直接腎素抑制劑因致畸胎（胎兒腎發育不全、羊水過少）而禁用。血壓控制目標約SBP 130–150、DBP 80–100 mmHg；輕度高血壓是否積極治療能改善預後證據有限。", "options": {"A": "最不適當（本題答案）。ACEI/ARB懷孕禁忌。", "B": "適當。labetalol/nifedipine可用。", "C": "合理。輕度高血壓治療效益證據有限。", "D": "合理的血壓目標。"}, "sources": ["2017 ACC/AHA Hypertension Guideline；ACOG 妊娠高血壓建議"]}}, "111080-03": {"quick": "急性主動脈症候群與結締組織病（Ehlers-Danlos）、懷孕、二瓣性主動脈瓣等有關；病竇症候群（心律問題）相關性最低，故選D。", "detail": {"background": "急性主動脈症候群（剝離/壁內血腫/穿透性潰瘍）危險因子：高血壓、結締組織疾病（Marfan、Ehlers-Danlos）、二瓣性主動脈瓣與主動脈病變、懷孕（尤其第三孕期）、創傷、發炎性動脈炎等。病竇症候群為竇房結功能障礙之心律問題，與主動脈病變無直接關聯。", "options": {"A": "Ehlers-Danlos為結締組織病，相關。", "B": "懷孕為危險因子。", "C": "二瓣性主動脈瓣相關。", "D": "相關性最低（本題答案）。病竇症候群為心律問題。"}, "sources": ["2022 ACC/AHA Aortic Disease Guideline"]}}, "111080-06": {"quick": "運動心電圖致死風險約萬分之一（非千分之一），且鈣化分數無法『準確診斷』阻塞性冠心病；故B、D均為錯誤敘述（本題B、D均給分）。", "detail": {"background": "非侵入性冠心病檢查：靜態心電圖ST/T異常無法確診冠心病；運動心電圖為常用工具，整體致死風險約1/10,000（非1/1,000）；藥物催迫核醫心肌灌注可偵測缺血與梗塞後疤痕；冠狀動脈鈣化分數反映粥狀硬化負荷與風險，但不能『準確診斷』阻塞性病灶，預後應用較明確。", "options": {"A": "正確。靜態心電圖異常不能確診冠心病。", "B": "錯誤（給分）。運動心電圖致死風險約萬分之一，非千分之一。", "C": "正確。藥物催迫核醫可測缺血與疤痕。", "D": "錯誤（給分）。鈣化分數不能準確診斷阻塞性冠心病。"}, "sources": ["2021 ACC/AHA Chest Pain Guideline；考選部更正公告（本題B、D均給分）"]}}, "111080-07": {"quick": "靜態心電圖正常、有症狀且高風險（年長、抽菸）者，運動心電圖ST壓低最能代表冠心病；有LBBB、LVH或服用digoxin者ST判讀受干擾，故選C。", "detail": {"background": "運動心電圖ST段判讀在某些情況下不可靠：左束支阻斷、心室預激、心室節律；左心室肥厚、digoxin、靜態ST/T異常會造成偽陽性。靜態心電圖正常且具高驗前機率（年長、抽菸、有症狀）者，出現ST壓低對診斷冠心病最具意義。", "options": {"A": "LBBB使運動ST判讀不可靠。", "B": "LVH造成ST判讀干擾/偽陽性。", "C": "正確（本題答案）。靜態心電圖正常、高驗前機率，ST壓低最具意義。", "D": "digoxin造成ST變化（偽陽性）、β-blocker鈍化心率。"}, "sources": ["2021 ACC/AHA Chest Pain Guideline"]}}, "111080-08": {"quick": "即使壓力核醫心肌造影正常，具危險因子者仍需危險因子/預防性藥物治療，「完全不需要用藥治療」是錯的，故選C。", "detail": {"background": "正常壓力心肌灌注造影預後良好（年度硬事件風險<1%），但這不代表可停止所有藥物；具高血壓、糖尿病、高血脂、吸菸等危險因子者仍應持續預防性與危險因子治療。術前評估需綜合缺血嚴重度/範圍、左室功能、手術與麻醉種類。", "options": {"A": "正確。依缺血嚴重度決定是否再通。", "B": "正確。術前評估需考量手術與麻醉種類。", "C": "錯誤（本題答案）。『完全不需用藥』不對，仍需危險因子治療。", "D": "正確。正常造影不能完全排除未來斑塊破裂致MI。"}, "sources": ["2021 ACC/AHA Chest Pain Guideline；2014 ACC/AHA 非心臟手術術前評估"]}}, "111080-09": {"quick": "本題依PET/SPECT影像判讀心肌存活性；選項B對左心室前壁的描述與影像不符（屬錯誤敘述），故選B。判讀原則：灌流缺損但FDG攝取保留＝休眠（可逆，宜再通）；灌流與代謝皆缺損＝瘢痕（不可逆，再通效果差）。", "detail": {"background": "心肌存活性評估以灌流（SPECT）與代謝（FDG-PET）配對判讀：灌流-代謝『不匹配』（灌流缺損但FDG保留）＝休眠心肌，血管再通可改善功能；『匹配』（兩者皆缺損）＝瘢痕，再通效果差；混合存活與瘢痕者效果介於兩者之間。本題B對前壁的判讀與附圖不一致，為錯誤敘述。", "options": {"A": "符合判讀。側壁休眠心肌宜積極再通。", "B": "錯誤（本題答案）。前壁之判讀與影像不符。", "C": "符合。下壁混合瘢痕與休眠，再通效果略差。", "D": "符合。心尖混合，再通效果略差。"}, "sources": ["Braunwald's Heart Disease（心肌存活性影像）"]}}, "111080-10": {"quick": "規則的窄QRS心搏過速最不可能是心室頻脈（VT為寬QRS），故選D。", "detail": {"background": "規則窄QRS心搏過速的常見原因：房室結迴旋性心搏過速（AVNRT）、順向型房室迴旋性心搏過速（orthodromic AVRT）、心房頻脈、心房撲動。心室頻脈（VT）為寬QRS心律，不屬窄QRS範疇。", "options": {"A": "Orthodromic AVRT為窄QRS。", "B": "AVNRT為窄QRS。", "C": "心房頻脈為窄QRS。", "D": "最不可能（本題答案）。VT為寬QRS。"}, "sources": ["2015 ACC/AHA/HRS SVT Guideline"]}}, "111080-11": {"quick": "深部靜脈血栓（DVT）不是CHA2DS2-VASc的計分項目，故選D。", "detail": {"background": "CHA2DS2-VASc計分項目：充血性心衰竭、高血壓、年齡≥75（2分）、糖尿病、中風/TIA/血栓栓塞（2分）、血管疾病（含冠心病/心肌梗塞/周邊動脈疾病/主動脈斑塊）、年齡65–74、女性。深部靜脈血栓（靜脈血栓）不在其中。", "options": {"A": "心衰竭為計分項目。", "B": "冠狀動脈心臟病屬『血管疾病』，為計分項目。", "C": "年齡≥65為計分項目。", "D": "不是項目（本題答案）。DVT非CHA2DS2-VASc項目。"}, "sources": ["2023 ACC/AHA AF Guideline"]}}, "111080-13": {"quick": "第二代鈣離子阻斷劑無法改善HFrEF的症狀與預後（且部分有害），故選C為除外。", "detail": {"background": "改善HFrEF症狀與預後的藥物：ACEI/ARB或ARNI、β-blocker、醛固酮拮抗劑、SGLT2抑制劑。鈣離子阻斷劑（含第二代dihydropyridine）並不改善HFrEF預後，非DHP類（verapamil/diltiazem）更具負性肌力而有害。", "options": {"A": "ACEI改善預後。", "B": "醛固酮拮抗劑改善預後。", "C": "除外（本題答案）。第二代CCB不改善HFrEF預後。", "D": "ARNI改善預後。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "111080-14": {"quick": "預防性ICD的條件是LVEF≤35%（合併適當NYHA分級）；「NYHA I且LVEF>35%」不符合，故C錯誤。", "detail": {"background": "心衰竭約半數死亡為心室性心律不整所致（HFrEF尤然）。猝死倖存者屬二級預防，應植入ICD。一級預防ICD主要適用於最佳藥物治療後LVEF≤35%且預期存活>1年者（缺血性需MI後≥40天、非缺血性需治療≥3個月）。LVEF>35%者不符合一級預防條件。", "options": {"A": "正確。約半數HF死亡為心室性心律不整。", "B": "正確。猝死倖存者應考慮ICD（二級預防）。", "C": "錯誤（本題答案）。LVEF>35%不符合預防性ICD條件。", "D": "正確。MI後>40天、LVEF≤30%且仍有VT者建議ICD。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline；2017 AHA/ACC/HRS VA/SCD Guideline"]}}, "111080-27": {"quick": "懷孕婦女應避免ACEI（致畸胎），故以ACEI降蛋白尿、預防子癇前症最不適合，選D。", "detail": {"background": "懷孕合併高血壓/腎病可用methyldopa、長效CCB、labetalol控制血壓。ACEI/ARB於懷孕禁忌（致胎兒腎發育異常、羊水過少、致畸），不可用於孕婦降蛋白尿或預防子癇前症。", "options": {"A": "適當。Methyldopa為孕期常用。", "B": "適當。長效CCB可用。", "C": "適當。Labetalol可用。", "D": "最不適合（本題答案）。ACEI懷孕禁忌。"}, "sources": ["2017 ACC/AHA Hypertension Guideline；ACOG 建議"]}}, "111080-58": {"quick": "嗜鉻細胞瘤手術前需先以α阻斷劑加上補充水分7–10天（必要時再加β阻斷劑），故選C。", "detail": {"background": "嗜鉻細胞瘤術前準備關鍵：先給α腎上腺素受體阻斷劑（如phenoxybenzamine/doxazosin）7–10天並充分補充體液擴容，控制血壓並回復血管內容積；必要時於α阻斷後再加β阻斷劑控制心搏過速（切勿先給β阻斷，以免無對抗的α作用引發高血壓危象）。切片或未準備即手術可誘發致命兒茶酚胺危象。", "options": {"A": "錯誤。未做α阻斷準備即手術可引發危象。", "B": "錯誤。切片可誘發兒茶酚胺危象，屬禁忌。", "C": "正確（本題答案）。術前7–10天α阻斷加補液，必要時再加β阻斷。", "D": "錯誤。Somatostatin類似物非標準術前處置。"}, "sources": ["Endocrine Society Pheochromocytoma Guideline (2014)"]}}, "111080-75": {"quick": "本題依附圖判讀，最可能為開放性動脈導管（PDA，主動脈與肺動脈間之異常通道），故選A。", "detail": {"background": "開放性動脈導管為主動脈峽部與左肺動脈間的持續性通道，可有連續性（機器樣）雜音；電腦斷層血管攝影可見主動脈與肺動脈間之異常管道連通。與主動脈瘤/假性動脈瘤（局部囊狀膨大）、主動脈縮窄（峽部狹窄）之影像不同。", "options": {"A": "正確（本題答案）。影像符合PDA（主動脈-肺動脈間通道）。", "B": "假性動脈瘤為局部囊狀膨出，型態不符。", "C": "主動脈瘤為主動脈本身擴大，不符。", "D": "主動脈縮窄為峽部狹窄，不符。"}, "sources": ["Braunwald's Heart Disease（成人先天性心臟病影像）"]}}, "112020-07": {"quick": "BNP/NT-proBNP在健康人血中濃度會隨年齡上升，敘述正確，故選C。", "detail": {"background": "BNP/NT-proBNP在收縮性與舒張性心衰竭、左心與右心衰竭時皆會上升，且濃度與嚴重度/預後相關。其濃度也受年齡（↑）、腎功能（差時↑）、肥胖（↓）影響；健康人隨年齡增加而上升。", "options": {"A": "錯誤。舒張性心衰竭也會上升。", "B": "錯誤。可協助診斷亦可評估預後。", "C": "正確（本題答案）。健康人濃度隨年齡上升。", "D": "錯誤。右心衰竭也會上升。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "112020-09": {"quick": "第4期舒張期去極化（自律性）是竇結細胞的特徵，故選D。", "detail": {"background": "竇結細胞具自發性去極化（Phase 4 diastolic depolarization）→自律性。相較心室細胞：竇結靜止膜電位較不極化（約-60 mV，心室約-90 mV）；Phase 0上衝慢（鈣依賴），心室快（鈉依賴）；Phase 2平台在心室明顯，竇結不明顯。", "options": {"A": "錯誤。竇結靜止膜電位較不極化（較不負）。", "B": "錯誤。竇結Phase 0上衝較慢（鈣依賴）。", "C": "錯誤。Phase 2平台在心室明顯，竇結不明顯。", "D": "正確（本題答案）。Phase 4舒張期去極化為竇結特徵。"}, "sources": ["Braunwald's Heart Disease（心臟電生理）"]}}, "112020-10": {"quick": "主動脈縮窄通常「男性」多於女性，故C錯誤。", "detail": {"background": "主動脈縮窄狹窄處最常見於左鎖骨下動脈遠端、近動脈韌帶處；屬先天性心臟病，常合併二瓣性主動脈瓣；整體男性多於女性，但在性腺發育不全（Turner症候群，皆女性）患者中常見。臨床有上肢高血壓、下肢血壓低、肋骨凹痕。", "options": {"A": "正確。狹窄處位置描述正確。", "B": "正確。屬先天性心臟病。", "C": "錯誤（本題答案）。一般男性多於女性。", "D": "正確。常見於Turner症候群。"}, "sources": ["Braunwald's Heart Disease（先天性心臟病）"]}}, "112020-13": {"quick": "主動脈瓣狹窄造成的是「窄」脈搏壓（脈搏延遲微弱），不是寬脈搏壓，故選A。", "detail": {"background": "寬脈搏壓常見於主動脈瓣閉鎖不全、甲狀腺毒症、發燒/敗血（周邊血管擴張）、開放性動脈導管、貧血、動靜脈廔管等高心輸出或逆流狀態。主動脈瓣狹窄因射出受阻，脈搏呈現延遲且微弱（pulsus parvus et tardus），為窄脈搏壓。", "options": {"A": "不是（本題答案）。AS為窄脈搏壓。", "B": "是。甲狀腺毒症為寬脈搏壓。", "C": "是。發燒/敗血血管擴張致寬脈搏壓。", "D": "是。PDA為寬脈搏壓。"}, "sources": ["Braunwald's Heart Disease（脈搏與血壓）"]}}, "112020-14": {"quick": "冠狀動脈攝影（心導管）仍是評估冠狀動脈解剖的標準（gold standard），CT尚未取代，故D錯誤。", "detail": {"background": "心導管發展史：Forssmann（1929）自體導管植入右心房；Cournand與Richards（1940年代）改良用於評估心血管系統。冠狀動脈攝影最常見併發症為穿刺部位出血（約1.5–2%）。冠狀動脈CT對解剖評估有用且非侵入，但侵入性冠狀動脈攝影仍為解剖與功能評估、尤其需介入時的標準方法。", "options": {"A": "正確。Forssmann 1929年史實。", "B": "正確。Cournand與Richards 1940年代改良。", "C": "正確。穿刺部位出血最常見（約1.5–2%）。", "D": "錯誤（本題答案）。CT尚未取代心導管成為標準。"}, "sources": ["Braunwald's Heart Disease（心導管發展史）"]}}, "112020-52": {"quick": "臨床高度懷疑嗜鉻細胞瘤；單獨給β阻斷劑會造成無對抗的α作用而引發高血壓危象，故最不適宜，選B。", "detail": {"background": "年輕女性高血壓伴陣發性心悸、頭痛、流汗並安排24小時尿兒茶酚胺＝懷疑嗜鉻細胞瘤。降壓應先用α阻斷劑（必要時再加β阻斷）；切勿『單獨』先用β阻斷劑，否則α受體無對抗作用會使血管收縮、血壓劇升。鈣離子阻斷劑可輔助。", "options": {"A": "適宜。α阻斷劑可用。", "B": "最不適宜（本題答案）。單獨β阻斷恐致高血壓危象。", "C": "適宜。鈣離子阻斷劑可輔助。", "D": "適宜。α阻斷後再加β阻斷。"}, "sources": ["Endocrine Society Pheochromocytoma Guideline (2014)"]}}, "112020-61": {"quick": "Duke準則的主要條件為①血液培養陽性（典型菌含HACEK）與②心內膜侵犯證據（超音波贅生物）；發燒③與Janeway/Osler④屬次要條件，故選A（僅①②）。", "detail": {"background": "修訂版Duke準則——主要條件：(1)典型菌兩套血液培養陽性或持續菌血症（含HACEK）、(2)心內膜侵犯證據（超音波見贅生物/膿瘍/新瓣膜裂開，或新發瓣膜逆流）。次要條件：易感因子、發燒≥38℃、血管現象（Janeway lesion、栓塞）、免疫現象（Osler node、Roth spot、類風濕因子）、未達主要的微生物證據。", "options": {"A": "正確（本題答案）。①②為主要條件。", "B": "③④為次要條件。", "C": "④（Janeway/Osler）屬次要，不應列入。", "D": "③④皆次要，不全為主要。"}, "sources": ["Modified Duke Criteria；2023 ESC Endocarditis Guideline"]}}, "112080-06": {"quick": "N-acetylcysteine預防顯影劑腎病的效益並未獲證實（PRESERVE試驗陰性），「均應給予」是錯的，故選C。", "detail": {"background": "擇期心導管仍有低機率併發症（MI<0.1%、中風約0.01%、死亡約0.1%）；顯影劑可致類過敏反應（約0.1–0.2%）與急性腎損傷。預防顯影劑腎病以「足量輸液（水化）」為主，N-acetylcysteine的保護效益未獲大型試驗證實，不應常規一律給予。檢查前給aspirin，心導管為無菌操作不需預防性抗生素。", "options": {"A": "正確。擇期心導管風險數據合理。", "B": "正確。顯影劑類過敏約0.1–0.2%。", "C": "錯誤（本題答案）。NAC效益未證實，非『均應給予』。", "D": "正確。給aspirin、不需預防性抗生素。"}, "sources": ["PRESERVE Trial (2018)；2021 ACC/AHA Chest Pain Guideline"]}}, "112080-07": {"quick": "β阻斷劑減少心肌耗氧、可減少心絞痛並降低心肌梗塞後死亡率，敘述正確，故選A。", "detail": {"background": "β阻斷劑降低心率與收縮力、減少心肌耗氧，緩解心絞痛並改善梗塞後存活。短效dihydropyridine（nifedipine）會反射性心搏過速、增加缺血，不適合冠心病。aspirin為『不可逆』COX抑制劑。硝酸鹽代謝釋放NO，活化『guanylyl cyclase』（非adenylyl cyclase）使血管擴張。", "options": {"A": "正確（本題答案）。β阻斷劑減少耗氧、降低梗塞後死亡率。", "B": "錯誤。短效DHP CCB不適合冠心病。", "C": "錯誤。aspirin為不可逆COX抑制劑。", "D": "錯誤。NO活化guanylyl cyclase，非adenylyl cyclase。"}, "sources": ["2025 ACC/AHA ACS Guideline；2024 ESC Chronic Coronary Syndromes"]}}, "112080-08": {"quick": "此為肥厚型心肌病變（猝死復甦、左室肥厚、流出道阻塞之收縮期雜音、冠狀動脈正常）；增加利尿劑會減少前負荷、加重流出道阻塞，故D錯誤。", "detail": {"background": "肥厚型心肌病變猝死復甦者應植入ICD（二級預防）；流出道阻塞嚴重時可考慮酒精中隔消融或外科肌肉切除，無效再考慮換心。治療用負性肌力藥（β阻斷劑、verapamil）；應避免過度利尿與血管擴張，因為減少前/後負荷會加重流出道阻塞。", "options": {"A": "正確。診斷為HCM。", "B": "正確。猝死復甦者應植入ICD。", "C": "正確。可酒精消融/外科/換心。", "D": "錯誤（本題答案）。增加利尿劑會加重流出道阻塞。"}, "sources": ["2024 ACC/AHA Hypertrophic Cardiomyopathy Guideline"]}}, "112080-09": {"quick": "心電圖呈不規則、無明確P波的心搏過速＝心房顫動，故選C。", "detail": {"background": "心房顫動心電圖特徵為『不規則的不規則』R-R間距、無清楚P波（代以纖維顫動波）。竇性心搏過速為規則且有P波；心房頻脈規則並有異常P波；心室頻脈為寬QRS。本圖型態符合心房顫動。", "options": {"A": "竇性心搏過速為規則且有P波。", "B": "心房頻脈為規則且有異常P波。", "C": "正確（本題答案）。不規則、無P波＝心房顫動。", "D": "心室頻脈為寬QRS。"}, "sources": ["2023 ACC/AHA AF Guideline"]}}, "112080-10": {"quick": "肺高壓並非以合併貧血為特徵，故D錯誤。", "detail": {"background": "肺高壓初期症狀無專一性（活動性呼吸困難、疲倦）；懷疑時以心臟超音波為優先篩檢，確診須靠右心導管（平均肺動脈壓升高）。其臨床並不以合併貧血為特徵。", "options": {"A": "正確。初期症狀無專一性。", "B": "正確。心臟超音波為優先篩檢。", "C": "正確。右心導管為確診工具。", "D": "錯誤（本題答案）。肺高壓不以合併貧血為特徵。"}, "sources": ["2022 ESC/ERS Pulmonary Hypertension Guideline"]}}, "112080-11": {"quick": "原發性雷諾現象症狀通常較『輕微』，嚴重者多為次發性（如硬皮症），故B錯誤。", "detail": {"background": "雷諾現象分原發與次發。原發性年輕女性多、症狀較輕、不致組織壞死；次發性（硬皮症等結締組織病、動脈硬化等）症狀較重，可致指端潰瘍/壞死。年長者新發雷諾現象應警覺動脈硬化等次發原因。治療可用dihydropyridine鈣離子阻斷劑。", "options": {"A": "正確。常見於硬皮症。", "B": "錯誤（本題答案）。原發性通常較輕微，非較嚴重。", "C": "正確。>50歲動脈硬化為常見次發原因。", "D": "正確。DHP鈣阻斷劑可減輕症狀。"}, "sources": ["Harrison's Principles of Internal Medicine（雷諾現象）"]}}, "112080-12": {"quick": "急性心包炎臨床上主要分為纖維素性（fibrinous）與滲出性（effusive）兩大類，敘述正確，故選A。", "detail": {"background": "急性心包炎主要表現是『胸痛』（位置性、前傾緩解），多數病程中可聞心包摩擦音（約85%）；ECG早期廣泛ST上升、PR下降。治療以NSAID加colchicine（colchicine約給3個月可降低復發），非僅兩週。臨床分類含纖維素性與滲出性（漿液或血性）。", "options": {"A": "正確（本題答案）。分纖維素性與滲出性兩大類。", "B": "錯誤。主要症狀為胸痛，非以發燒為主、胸痛罕見。", "C": "錯誤。多數（約85%）可聞摩擦音，非<10%。", "D": "錯誤。colchicine標準療程約3個月以降低復發。"}, "sources": ["2015 ESC Pericardial Diseases Guideline"]}}, "112080-13": {"quick": "NYHA II＝日常活動會出現症狀、休息無症狀；選項C（平時少動、走到20公尺便利商店仍可但較喘較累、輕度限制）最符合II級。", "detail": {"background": "NYHA：I級無症狀、日常活動不受限；II級輕度限制、日常活動會出現症狀；III級明顯限制、低於日常活動即症狀；IV級休息即有症狀（如端坐呼吸）。需以病人『當下』的功能能力判定。", "options": {"A": "無症狀、活動正常＝NYHA I。", "B": "原可扛20公斤，現扛15公斤上樓即喘、無法上二樓＝明顯限制，NYHA III。", "C": "正確（本題答案）。仍可走到便利商店但較喘較累＝輕度限制，NYHA II。", "D": "需墊兩枕才能平躺（端坐呼吸）＝NYHA III–IV。"}, "sources": ["2022 AHA/ACC/HFSA Heart Failure Guideline（NYHA分級）"]}}, "112080-14": {"quick": "CHA2DS2-VASc：年齡≥75(2)＋高血壓1＋糖尿病1＋心衰竭1＝5分，故選D。", "detail": {"background": "本例78歲男性、有高血壓、糖尿病、且左心射出分率29%併呼吸困難/水腫（充血性心衰竭），無中風/血管病：年齡≥75為2分、高血壓1、糖尿病1、心衰竭1、男性0＝5分，屬高中風風險，建議口服抗凝。", "options": {"A": "2分計算偏低。", "B": "3分計算偏低。", "C": "4分漏計一項。", "D": "正確（本題答案）。共5分。"}, "sources": ["2023 ACC/AHA AF Guideline"]}}, "112080-51": {"quick": "嚴重肺栓塞最常見死因為右心室衰竭導致的心因性休克，敘述正確，故選D。", "detail": {"background": "大量肺栓塞造成右心室後負荷急遽上升→右心室衰竭→心輸出量下降與心因性休克，為最常見死因。胸痛非Wells準則項目（Wells含DVT徵象、PE為最可能診斷、心率>100、近期不動/手術、PE/DVT病史、咳血、惡性腫瘤）。D-dimer敏感度高但『特異度低』。傳統warfarin治療需腸外抗凝重疊≥5天並INR 2–3至少連續2天。", "options": {"A": "錯誤。胸痛非Wells準則項目。", "B": "錯誤。D-dimer特異度低（非高）。", "C": "此為傳統warfarin橋接之描述（大致正確），但本題以D為標準答案。", "D": "正確（本題答案）。最常見死因為右心衰竭致心因性休克。"}, "sources": ["2019 ESC Pulmonary Embolism Guideline"]}}, "112080-54": {"quick": "糖尿病人的血壓控制目標一般與一般人相同或更嚴格，並非『較寬鬆』，故C錯誤。", "detail": {"background": "糖尿病人高血壓盛行率較高；首選降壓藥為ACEI或ARB（兼具腎臟保護）；高血壓會加重糖尿病的大、小血管病變。血壓控制目標一般建議與一般人相同或更嚴格（如<130/80 mmHg），而非較寬鬆。", "options": {"A": "正確。糖尿病人高血壓盛行率較高。", "B": "正確。首選ACEI/ARB。", "C": "錯誤（本題答案）。血壓目標非較寬鬆，多為相同或更嚴格。", "D": "正確。高血壓加重糖尿病血管病變。"}, "sources": ["2017 ACC/AHA Hypertension Guideline；ADA Standards of Care"]}}, "112080-78": {"quick": "高血壓糖尿病病人夜間突發壓迫性胸痛冒冷汗，心電圖下壁導程(II、III、aVF)ST上升>2 mm＝急性（下壁）心肌梗塞，故選C。", "detail": {"background": "典型缺血性胸痛（壓迫感、冒冷汗、放射）合併下壁導程ST段上升即為急性ST上升型心肌梗塞（下壁），責任血管多為右冠狀動脈；應立即啟動再灌流。低血壓需警覺合併右心室梗塞。", "options": {"A": "肺栓塞以低血氧、S1Q3T3表現，不符ST上升型態。", "B": "主動脈剝離以撕裂痛、脈搏不對稱表現。", "C": "正確（本題答案）。下壁導程ST上升＝急性下壁心肌梗塞。", "D": "心肌炎ECG多為瀰漫性變化，臨床圖像不符。"}, "sources": ["2025 ACC/AHA ACS Guideline"]}}, "113020-07": {"quick": "GRACE危險評分>140的NSTE-ACS病人屬高風險，即使穩定也應於24小時內早期侵入性心導管與血流重建，故選D。", "detail": {"background": "NSTE-ACS依風險分層決定侵入時機：極高危（血行不穩、頑固缺血、惡性心律不整）立即（<2小時）；高危（troponin升高動態變化、GRACE>140等）早期（<24小時）；其餘選擇性。troponin升高即可診斷心肌梗塞（不需CK同步升高）；GPIIb/IIIa抑制劑為選擇性使用，非所有病人三合一。", "options": {"A": "敘述之比例與T波倒置數值不準確。", "B": "錯誤。troponin升高即可診斷NSTEMI，不需CK同時升高。", "C": "錯誤。GPIIb/IIIa非所有病人常規使用。", "D": "正確（本題答案）。GRACE>140應24小時內早期侵入。"}, "sources": ["2025 ACC/AHA ACS Guideline；2023 ESC ACS Guideline"]}}, "113020-08": {"quick": "Tl-201半衰期約73小時（非12小時），選項B的半衰期與逆再分布描述有誤，故選B。", "detail": {"background": "核醫心肌灌注顯影劑攝取與血流量及心肌存活有關。Tl-201具與鉀離子相似的生物特性、以主動運輸進入心肌、半衰期約73小時；Tc-99m sestamibi半衰期約6小時、以被動擴散進入心肌。「逆再分布」現象的成因敘述與Tl-201半衰期12小時皆不正確。", "options": {"A": "正確。攝取與血流及存活有關。", "B": "錯誤（本題答案）。Tl-201半衰期約73小時，非12小時；相關描述有誤。", "C": "大致正確。Tc-99m sestamibi半衰期約6小時、被動進入。", "D": "正確。Tl-201與鉀離子生物特性相似。"}, "sources": ["Braunwald's Heart Disease（核醫心肌灌注）"]}}, "113020-09": {"quick": "左心房黏液瘤表面纖細、絨毛、凝膠狀、易碎，脫落即造成栓塞（本例以中風表現），故選D。", "detail": {"background": "心臟黏液瘤約75%位於左心房，女性較多；可造成栓塞（如中風）、阻塞（姿勢性昏厥/black out、心尖舒張期低頻雜音“tumor plop”）與全身症狀（發燒、體重減輕、杵狀指）。散發性黏液瘤手術切除即可治癒、復發率低；家族性（Carney complex）才較易復發/多發。其表面易碎絨毛狀，易脫落栓塞。", "options": {"A": "錯誤。黏液瘤女性較多，非男女3:1（男多）。", "B": "錯誤。散發性復發率低，切除即治癒，不需長期抗凝預防中風。", "C": "錯誤。大多在左心房（非右心房），且多為單發。", "D": "正確（本題答案）。表面纖細絨毛凝膠狀、易碎、易栓塞。"}, "sources": ["Braunwald's Heart Disease（心臟腫瘤）"]}}, "113020-10": {"quick": "此為心房顫動且高中風風險；若用dabigatran，緊急出血時有專一反轉劑（idarucizumab）可用，故選B。", "detail": {"background": "高CHA2DS2-VASc的心房顫動病人需口服抗凝預防中風（不可用aspirin替代）。各DOAC：dabigatran有專一反轉劑idarucizumab；factor Xa抑制劑有andexanet alfa。給藥頻次：apixaban、dabigatran為一天兩次，rivaroxaban、edoxaban為一天一次。", "options": {"A": "錯誤。高風險病人需抗凝，非不需治療。", "B": "正確（本題答案）。dabigatran有反轉劑idarucizumab。", "C": "錯誤。apixaban為一天兩次；一天一次應選rivaroxaban/edoxaban。", "D": "錯誤。指引不建議以aspirin替代抗凝預防AF中風。"}, "sources": ["2023 ACC/AHA AF Guideline；2024 ESC AF Guideline"]}}, "113020-11": {"quick": "三尖瓣回流的雜音在「吸氣」時變大聲（Carvallo徵象），不是吐氣，故B錯誤。", "detail": {"background": "動作影響雜音的原則：右心雜音（如TR）吸氣時靜脈回流增加→變大（Carvallo徵象）；Valsalva用力期與站立減少前負荷→AS、MR雜音變小，HOCM雜音變大；蹲下增加前後負荷→HOCM雜音變小、AS/MR變大。", "options": {"A": "正確。Valsalva使AS雜音變短變弱。", "B": "錯誤（本題答案）。TR雜音在『吸氣』時變大，非吐氣。", "C": "正確。站立使MR雜音變小。", "D": "正確。蹲下使HOCM雜音變小。"}, "sources": ["Braunwald's Heart Disease（雜音的動態變化）"]}}, "113020-12": {"quick": "肥厚型心肌症演變為擴大型（末期）的比率小於10%，敘述正確，故選A。", "detail": {"background": "肥厚型心肌症（HCM）少數（<10%）會進展至擴大/末期（burnt-out）階段。左心室肥厚多於青春期發育後才出現（非出生時）；有流出道阻塞者應用負性肌力藥（β阻斷劑、verapamil），避免血管擴張劑；猝死危險因子是運動時血壓『反應異常（無法上升或下降）』，而非正常上升。", "options": {"A": "正確（本題答案）。進展為擴大型<10%。", "B": "錯誤。左心室肥厚多在青春期後出現，非出生時。", "C": "錯誤。應避免血管擴張，使用負性肌力藥。", "D": "錯誤。血壓『異常反應』才是危險因子，正常上升不是。"}, "sources": ["2024 ACC/AHA Hypertrophic Cardiomyopathy Guideline"]}}, "113020-14": {"quick": "ICD適當放電終止心律不整，反而與『較高』的後續死亡率與心衰竭風險相關，並非大幅減少，故C錯誤。", "detail": {"background": "心室性心律不整可由心電圖、植入裝置紀錄或電生理檢查誘發來診斷；面對猝死病人應盡可能取得12導程心電圖以研判起源與潛在心臟病；初始處置以穩定血流動力為目標。值得注意的是，接受『適當』ICD放電者，預後（死亡率、心衰竭住院）反而較差，代表潛在疾病嚴重，而非風險降低。", "options": {"A": "正確。診斷方式描述正確。", "B": "正確。應取得12導程心電圖研判。", "C": "錯誤（本題答案）。ICD適當放電與較差預後相關，非風險大幅減少。", "D": "正確。初始以穩定血流動力為目標。"}, "sources": ["2017 AHA/ACC/HRS Ventricular Arrhythmia/SCD Guideline"]}}, "113020-52": {"quick": "嗜鉻細胞瘤的「十分之一法則」應為10%『雙側』（非單側），故C錯誤。", "detail": {"background": "嗜鉻細胞瘤Rule of 10s（傳統）：約10%雙側、10%惡性、10%腎上腺外、10%家族性、10%發生於兒童、10%無高血壓等。診斷需生化（兒茶酚胺/metanephrine過量）加上影像定位，兩者同等重要；CT與MRI（加顯影劑）診斷敏感度相近。臨床可有頭痛、焦慮/恐慌、多尿、姿勢性低血壓、血糖上升。", "options": {"A": "正確。臨床表現描述合理。", "B": "正確。生化與影像同等重要。", "C": "錯誤（本題答案）。應為10%『雙側』，非單側。", "D": "正確。CT與MRI敏感度相近。"}, "sources": ["Endocrine Society Pheochromocytoma Guideline (2014)"]}}, "113020-77": {"quick": "單次心肌酵素正常『不能』排除心肌梗塞（需連續監測，早期可正常），故D最不適當。", "detail": {"background": "胸痛病人應在到院10分鐘內完成心電圖；下壁梗塞加做右側導程評估右室；床邊心臟超音波可初步評估主動脈根部與心包。心肌肌鈣蛋白須『連續』監測，早期（症狀數小時內）可能仍正常，單次正常不能排除心肌梗塞。", "options": {"A": "適當。10分鐘內完成心電圖。", "B": "適當。下壁梗塞加做右側導程。", "C": "適當。床邊超音波評估主動脈根部。", "D": "最不適當（本題答案）。單次心肌酵素正常不能排除MI。"}, "sources": ["2025 ACC/AHA ACS Guideline；高敏感troponin連續監測流程"]}}, "113070-06": {"quick": "第五型（冠狀動脈繞道手術相關）心肌梗塞，troponin應至少一次升高超過99百分位上限的10倍，敘述正確，故選D。", "detail": {"background": "心肌梗塞通用定義：第1型為自發性（斑塊破裂血栓），troponin會升高>99百分位上限；第5型為CABG相關，定義需troponin>10倍99百分位上限（合併新Q波/影像等）。STEMI多由原本非嚴重狹窄的斑塊急性破裂血栓完全阻塞造成（非慢性高度狹窄）；未再灌流者不一定全會出現Q波。", "options": {"A": "錯誤。STEMI多為急性斑塊破裂血栓，非慢性高度狹窄。", "B": "錯誤。並非所有未再灌流者最終都出現Q波。", "C": "錯誤。第1型MI的troponin會升高>99百分位上限。", "D": "正確（本題答案）。第5型MI需troponin>10倍99百分位上限。"}, "sources": ["Fourth Universal Definition of Myocardial Infarction (2018)"]}}, "113070-07": {"quick": "心房中隔缺損存在左到右分流，造成右心室容積負荷、右心室擴大，並可能產生肺動脈高壓，敘述正確，故選A。", "detail": {"background": "ASD為常見成人先天性心臟病，左到右分流使右心房室容積負荷、右心室擴大，長期可致肺動脈高壓（甚至Eisenmenger）。Ebstein異常是『三尖瓣』下移（非二尖瓣）造成三尖瓣逆流與右心房擴大。PAPVR是否手術取決於分流量。小型VSD常會自行關閉。", "options": {"A": "正確（本題答案）。ASD左到右分流致右室擴大與肺高壓。", "B": "錯誤。Ebstein異常為三尖瓣下移，非二尖瓣。", "C": "錯誤。PAPVR是否手術取決於分流量，非一律盡早。", "D": "錯誤。小型VSD常會自行關閉。"}, "sources": ["Braunwald's Heart Disease（成人先天性心臟病）"]}}, "113070-08": {"quick": "鈣化指數適用於『無症狀』中等風險者的風險分層，並非所有有症狀病人最合適的檢查，故D錯誤。", "detail": {"background": "冠狀動脈鈣化指數（CAC）主要用於無症狀、中等風險者的風險再分層，並非有症狀病人的首選功能性檢查。已置放支架且無症狀者不需每年例行壓力測試；低風險典型胸痛可考慮運動心電圖；高風險典型胸痛且無法運動/壓力測試者，直接心導管是適切的。", "options": {"A": "正確。無症狀支架病人不需每年壓力測試。", "B": "正確。低風險典型胸痛可做運動心電圖。", "C": "正確。高風險且無法壓力測試者，心導管
