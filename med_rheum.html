JPW3/xyj/hnj4nf9Cz/AOT1t/8AHK+06KAPiz/hnj4nf9Cz/wCT1t/8co/4Z4+J3/Qs/wDk9bf/AByvtOigD4s/4Z4+J3/Qs/8Ak9bf/HK2/BHwJ+ImkeNNA1K+8PeTaWmpW1xNJ9st22IkqsxwJCTgA8AZr64ooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKAP/9k="}],E={"102030-34":{"quick":"抗腫瘤壞死因子（anti-TNF）對RA療效非常好；C正確。","detail":{"background":"**類風濕性關節炎（RA）**為對稱性侵犯小關節（MCP、PIP、腕）之慢性發炎性多關節炎；**晨僵常>1小時**；最常見眼併發症為**乾燥性角結膜炎／鞏膜炎**（非虹膜炎）。診斷需臨床＋RF／anti-CCP＋影像（ACR/EULAR 2010分類準則），**單靠RF陽性不能診斷**（正常人與其他病亦可陽性）。**生物製劑anti-TNF（etanercept、adalimumab等）療效顯著**。","options":{"A":"RA晨僵常超過60分鐘，錯誤。","B":"最常見眼併發症為乾燥性角結膜炎／鞏膜炎，非虹膜炎，錯誤。","C":"正解。anti-TNF對RA療效佳。","D":"RF陽性不能單獨診斷RA，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"102030-35":{"quick":"Leflunomide抑制嘧啶（pyrimidine）合成（抑制DHODH）。","detail":{"background":"**Leflunomide抑制dihydroorotate dehydrogenase（DHODH）→阻斷嘧啶（pyrimidine）從頭合成**，抑制活化淋巴球增生，為RA之DMARD（具肝毒性、致畸胎，孕婦禁用且需washout）。對照：methotrexate抑制DHFR（葉酸/嘌呤）、hydroxychloroquine干擾溶酶體抗原呈現、sulfasalazine機轉不同。","options":{"A":"正解。Leflunomide抑制嘧啶合成。","B":"Cyclosporine抑制calcineurin。","C":"Hydroxychloroquine作用於溶酶體。","D":"Sulfasalazine機轉不同。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"103100-08":{"quick":"RA合併骨侵蝕，除NSAID外應加上methotrexate（第一線DMARD）。","detail":{"background":"**RA一經診斷（尤已有邊緣性骨侵蝕＝預後不良指標）應『儘早』給予疾病修飾抗風濕藥（DMARD），首選methotrexate**（葉酸拮抗，需補葉酸、監測肝與血球）。cyclosporine、cyclophosphamide、azathioprine非RA首選DMARD。","options":{"A":"正解。methotrexate為RA第一線DMARD。","B":"cyclosporine非RA首選。","C":"cyclophosphamide用於重症血管炎/狼瘡。","D":"azathioprine非RA首選。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105100-08":{"quick":"RA經MTX＋SSZ＋類固醇半年無效→加anti-TNF-α生物製劑。","detail":{"background":"**RA經傳統合成DMARD（methotrexate＋sulfasalazine±hydroxychloroquine）併類固醇仍疾病活性高（高ESR/CRP/RF、多關節腫脹）→升階至生物製劑，首選anti-TNF-α（etanercept、adalimumab等）**（用前需排除潛伏結核、B/C肝）。IL-1拮抗劑對RA療效較弱；脈衝類固醇非長期策略；anti-pyrimidine（leflunomide）為傳統DMARD非此階段。","options":{"A":"正解。升階anti-TNF-α。","B":"IL-1拮抗劑對RA療效較弱。","C":"脈衝類固醇非長期方案。","D":"leflunomide為傳統DMARD，非升階生物製劑。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106020-35":{"quick":"anti-CCP相關敘述之錯誤項（本題答B或D均給分）。","detail":{"background":"**anti-CCP（抗環瓜氨酸胜肽抗體）對RA特異度高（>95%）、可早期出現、與『侵蝕性病程／預後較差』相關**；其形成是**精氨酸經PAD酶瓜氨酸化（citrullination）**。治療反應與抗體效價變化關係有限。考選部對本題公告**答B或D均給分**：B（抗體高低與嚴重度相關）敘述過於絕對、D（anti-TNF治療後anti-CCP不會下降）亦非全然正確。","options":{"A":"多見於RA，正確。","B":"給分項。與嚴重度『相關』之絕對化敘述有爭議。","C":"PAD酶將arginine轉citrulline，正確。","D":"給分項（原標準答案）。治療後抗體變化敘述不夠精確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"107080-32":{"quick":"確診類風濕性關節炎最重要檢查為anti-CCP抗體。","detail":{"background":"反覆遊走、漸成持續對稱性小關節炎之病人，**確診RA最具特異性之血清標記為anti-CCP（anti-cyclic citrullinated peptide）抗體**（特異度>95%、可預測侵蝕性）；RF特異度較低；雙手X光（看骨侵蝕）與關節超音波為輔助但anti-CCP對『確診』最關鍵。尿酸用於痛風鑑別。","options":{"A":"尿酸用於痛風，非RA。","B":"X光看侵蝕為輔助。","C":"正解。anti-CCP對確診RA最重要。","D":"超音波為輔助。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"111020-32":{"quick":"RA計畫懷孕：hydroxychloroquine與sulfasalazine可全程使用。","detail":{"background":"**RA懷孕用藥**：**hydroxychloroquine與sulfasalazine（補葉酸）懷孕全程相對安全可續用**；**methotrexate與leflunomide為致畸胎，須懷孕前停用並washout（leflunomide需cholestyramine洗滌）**；低劑量類固醇可用；生物製劑非全部可全程（部分anti-TNF後期需評估）。故C正確。","options":{"A":"MTX/leflunomide需孕前停並washout，錯誤。","B":"並非所有生物製劑全程可用，錯誤。","C":"正解。HCQ與SSZ可全程使用。","D":"低劑量類固醇懷孕可用，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"111020-34":{"quick":"anti-TNF（adalimumab）誘發藥物性狼瘡（ANA/anti-dsDNA轉陽）→停anti-TNF、改rituximab。","detail":{"background":"**anti-TNF可誘發『藥物性狼瘡』（出現ANA、anti-dsDNA陽性與皮疹）**，處置應**停用該anti-TNF**。換另一種anti-TNF（etanercept/infliximab）仍屬同類、可能再發；**改用『非anti-TNF機轉』之生物製劑（如rituximab、abatacept、tocilizumab）較適當**。故C（停adalimumab改rituximab）最適當。","options":{"A":"改etanercept仍為anti-TNF同類，可能再發。","B":"續用adalimumab不當（為致病藥）。","C":"正解。停anti-TNF改rituximab。","D":"改infliximab仍為anti-TNF。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112080-32":{"quick":"RA若遠端指間關節（DIP）也受影響，通常代表同時有退化性關節炎；B正確。","detail":{"background":"**RA典型對稱侵犯MCP、PIP、腕，『罕侵DIP』**；**若DIP也受影響，多代表合併退化性關節炎（OA，Heberden結節）**或乾癬性關節炎。RA初期即對稱、屈側（flexor）腱鞘炎較常見；**頸椎（C1-2）侵犯多見於『晚期』**。故B正確。","options":{"A":"RA一開始即對稱、侵小關節，錯誤。","B":"正解。DIP受累常代表合併OA。","C":"屈側腱鞘炎較常見，敘述相反，錯誤。","D":"頸椎侵犯多見於晚期，非早期，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113070-33":{"quick":"類風濕性關節炎最常見的關節外表現為骨質疏鬆。","detail":{"background":"**RA關節外表現多樣（類風濕結節、肺間質病變、鞏膜炎、血管炎、Felty症候群、繼發乾燥症等），但『骨質疏鬆』最常見**（慢性發炎、活動減少、類固醇使用共同促成）。肺動脈高壓、腰椎脊髓病變相對少見；高雄性素非RA表現。","options":{"A":"高雄性素非RA表現。","B":"正解。骨質疏鬆最常見。","C":"肺動脈高壓較少見。","D":"腰椎脊髓病變少見。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"114020-33":{"quick":"RA經MTX＋HCQ＋類固醇仍活動，加生物製劑→tocilizumab（IL-6拮抗）。","detail":{"background":"**RA傳統DMARD反應不佳時可加生物製劑：anti-TNF、IL-6拮抗（tocilizumab）、abatacept、rituximab、JAK抑制劑**。選項中**tocilizumab為IL-6受體拮抗劑，是RA核可生物製劑**；secukinumab、ixekizumab（anti-IL-17）與ustekinumab（anti-IL-12/23）主要用於乾癬／乾癬性關節炎／僵直性脊椎炎，非RA。故D。","options":{"A":"secukinumab（IL-17）用於乾癬/SpA。","B":"ustekinumab（IL-12/23）用於乾癬。","C":"ixekizumab（IL-17）用於乾癬。","D":"正解。tocilizumab（IL-6）用於RA。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"115020-34":{"quick":"RA為左右對稱多關節炎，疾病初期可從單關節開始；C最適當。","detail":{"background":"**RA特徵**：好發**手腕、MCP、PIP等『小關節』、左右『對稱』**；**晨僵常>1小時（非<30分）**；**初期可表現為單關節炎，後漸成對稱多關節**；**罕侵DIP（DIP受累多為OA）**。故C正確。","options":{"A":"較常侵小關節而非下肢大關節，錯誤。","B":"晨僵常>1小時，非<30分，錯誤。","C":"正解。對稱多關節，初期可單關節起始。","D":"DIP受累多代表OA，非RA嚴重度指標，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"101030-29":{"quick":"與狼瘡腎炎最相關之自體抗體為anti-dsDNA。","detail":{"background":"**Anti-dsDNA與狼瘡腎炎活性最相關**（效價隨腎炎活性起伏，常伴補體C3/C4下降），為SLE特異抗體之一。anti-RNP見於MCTD；anti-SS-A/Ro見於Sjögren／新生兒狼瘡／光敏；anti-ribosomal P與狼瘡精神症狀（psychosis）相關。","options":{"A":"anti-RNP見於MCTD。","B":"正解。anti-dsDNA與狼瘡腎炎最相關。","C":"anti-Ro與光敏/新生兒狼瘡。","D":"anti-ribosomal P與精神症狀。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"102110-34":{"quick":"最符合SLE診斷之組合為ANA＋、anti-dsDNA升高、蛋白尿、血小板低下（B）。","detail":{"background":"**SLE分類準則（1982/1997 ACR需≥4項）涵蓋免疫學（ANA、anti-dsDNA、anti-Sm、抗磷脂）與臨床（顴部紅斑、光敏、口腔潰瘍、關節炎、漿膜炎、腎病變蛋白尿/cellular cast、血液學如溶血/白血球低/血小板低、神經學）**。選項B包含**免疫學2項（ANA＋、anti-dsDNA）＋腎臟（蛋白尿）＋血液（血小板<10萬）→≥4項且涵蓋特異免疫學，最符合**。其他選項多為非特異臨床項或項數不足特異性。","options":{"A":"多為非特異臨床項（發燒非準則）。","B":"正解。免疫學＋腎臟＋血液多項，最符合。","C":"白血球『增加』非準則（應為減少）。","D":"補體下降非1982/1997準則計分項。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"102110-35":{"quick":"嚴重第四型狼瘡腎炎首推之兩種細胞毒／免疫抑制藥為cyclophosphamide或mycophenolate mofetil。","detail":{"background":"**第四型（瀰漫增生性）狼瘡腎炎為重症，誘導治療為高劑量類固醇＋『cyclophosphamide或mycophenolate mofetil（MMF）』**（ACR/EULAR/KDIGO），維持期用MMF或azathioprine。故A。cyclosporine、methotrexate、單用azathioprine非重症誘導首選。","options":{"A":"正解。cyclophosphamide或MMF。","B":"cyclosporine非首選誘導。","C":"azathioprine/MTX非重症誘導。","D":"azathioprine非首選誘導。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"103030-08":{"quick":"年輕女性對稱小關節痛、口腔潰瘍、發燒、白血球低→SLE，ANA陽性率最高。","detail":{"background":"此為典型SLE表現（關節炎、口腔潰瘍、白血球低下）。**ANA為SLE最敏感之篩檢（陽性率>95%，陰性幾可排除），故陽性機率最高**；anti-dsDNA、anti-Sm特異但敏感度較低；RF、anti-CCP為RA標記。","options":{"A":"正解。ANA敏感度最高、陽性機率最高。","B":"RF為RA標記。","C":"anti-dsDNA特異但敏感度較低。","D":"anti-CCP為RA標記。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"103100-40":{"quick":"SLE診斷準則之一為尿液出現cellular casts（細胞圓柱）。","detail":{"background":"**1997 ACR SLE準則中『腎病變』項＝持續性蛋白尿>0.5 g/day或尿液出現『cellular casts（細胞性圓柱，含紅血球/顆粒/管狀等）』**。多發關節『痛』（需關節炎）、mononeuritis multiplex、慢性皮膚潰瘍非SLE分類準則項。故C。","options":{"A":"關節『痛』非準則（需關節炎）。","B":"mononeuritis multiplex非SLE準則。","C":"正解。尿cellular casts為腎病變準則。","D":"慢性皮膚潰瘍非準則。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104030-38":{"quick":"發燒+下肢水腫+腎功能異常+ANA陽性+蛋白尿血尿RBC cast→狼瘡腎炎，驗anti-dsDNA。","detail":{"background":"年輕女性腎炎症候群（蛋白尿、血尿、RBC cast）＋ANA陽性、ANCA陰性→高度疑**狼瘡腎炎**；**anti-dsDNA（雙股DNA抗體）對確立SLE/狼瘡腎炎最有幫助**並可反映活性（伴補體下降）。RF、抗HCV、cryoglobulin為其他病因之檢查。","options":{"A":"RF非確立此診斷。","B":"抗HCV針對冷凝球蛋白血症。","C":"正解。anti-dsDNA確立狼瘡腎炎。","D":"cryoglobulin針對冷凝球蛋白血管炎。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105020-40":{"quick":"anti-phospholipid抗體與習慣性流產（habitual fetal loss）相關；D最正確。","detail":{"background":"**SLE自體抗體臨床關聯**：**anti-Sm特異度最高（非anti-RNP）；anti-dsDNA與腎炎相關（anti-histone與『藥物性』狼瘡相關）；anti-ribosomal P與精神症狀（psychosis）相關（非anti-Sm）；anti-phospholipid（抗磷脂）與『反覆流產、血栓』相關**。故D正確。","options":{"A":"anti-Sm特異度最高，非anti-RNP，錯誤。","B":"anti-histone與藥物性狼瘡相關，非腎炎，錯誤。","C":"精神症狀與anti-ribosomal P相關，非anti-Sm，錯誤。","D":"正解。anti-phospholipid與習慣性流產相關。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106080-08":{"quick":"anti-dsDNA『可』當狼瘡腎炎活性指標；D稱不可，錯誤。","detail":{"background":"25歲女性SLE、蛋白尿>3g、血尿、Cr 3個月由1.2升至2.4→活動性**瀰漫增生性（第四型）狼瘡腎炎**，治療為**脈衝類固醇＋cyclophosphamide（或MMF），可脈衝給予**。**anti-dsDNA效價與補體（C3/C4下降）『可』作為狼瘡腎炎活性監測指標**，故D（稱不可）錯誤。","options":{"A":"最可能第四型瀰漫增生性腎炎，正確。","B":"脈衝類固醇，正確。","C":"cyclophosphamide可脈衝給予，正確。","D":"正解（錯誤）。anti-dsDNA可作活性指標。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106080-37":{"quick":"狼瘡腎炎合併腎功能不全，最不適用cyclosporine（腎毒性）。","detail":{"background":"**狼瘡腎炎合併腎功能不足（Cr 2.0）時，calcineurin抑制劑cyclosporine具『腎毒性』、較不適用**；leflunomide、rituximab、mycophenolate mofetil相對較適合（MMF為標準誘導/維持藥）。故A最不適用。","options":{"A":"正解（最不適用）。cyclosporine腎毒性。","B":"leflunomide可考慮。","C":"rituximab為難治狼瘡選項。","D":"MMF為狼瘡腎炎標準藥。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"107080-31":{"quick":"持續發燒、既往ITP、白血球低、蛋白尿血尿→SLE，ANA最有幫助。","detail":{"background":"年輕女性**既往免疫性血小板低下（ITP）＋現白血球低、貧血、蛋白尿血尿、持續發燒→高度疑SLE**（ITP可為SLE初始表現）。**ANA為最敏感篩檢、對確立SLE最有幫助**。ANCA針對血管炎、CRP、indirect Coombs各有所指但非確立SLE首選。","options":{"A":"CRP非確立SLE。","B":"ANCA針對血管炎。","C":"正解。ANA對確立SLE最有幫助。","D":"Coombs測溶血、非確立SLE。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108030-33":{"quick":"SLE＋高抗心磷脂抗體＋首次DVT→加warfarin抗凝（目標INR約2-3）。【本題一律給分】","detail":{"background":"**抗磷脂症候群（APS）併靜脈血栓→『抗凝（warfarin，目標INR 2-3）』長期治療**（NOAC在APS尤三陽性者不建議）。單用aspirin對已發生之靜脈血栓不足；無急性發炎不需高劑量類固醇。（本題經考選部公告一律給分；臨床標準為warfarin抗凝，目標INR約2.0–3.0。）","options":{"A":"aspirin單用對靜脈血栓不足。","B":"原標準答案。warfarin抗凝（INR約2-3）。","C":"無發炎危象不需高劑量類固醇。","D":"APS不建議NOAC（尤三陽性）。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108080-32":{"quick":"SLE穩定、計畫懷孕→維持目前用藥（續用hydroxychloroquine）不需改變。","detail":{"background":"**SLE孕前準備**：應於『疾病穩定≥6個月』再懷孕；**hydroxychloroquine懷孕全程應『續用』（降低狼瘡活動與胎兒先天心阻滯風險），不可停**；低劑量prednisolone可用（不換成可過胎盤之dexamethasone，除非為胎兒治療）；本例已穩定、用藥安全→**維持現狀**。故B。","options":{"A":"不應換成過胎盤的dexamethasone。","B":"正解。維持現用藥（含HCQ）。","C":"HCQ應續用，不可停。","D":"病情穩定無須加azathioprine。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"110020-31":{"quick":"小關節痛＋光敏＋雷諾＋anti-dsDNA＋→全身性紅斑狼瘡。","detail":{"background":"年輕女性**對稱小關節痛、光過敏、雷諾現象，ANA speckled、anti-dsDNA陽性**→**SLE**。雖anti-RNP也高（MCTD可有重疊特徵），但**anti-dsDNA陽性指向SLE**。RA以侵蝕性關節炎、Sjögren以乾燥、SSc以皮膚硬化為主。","options":{"A":"RA無光敏/anti-dsDNA。","B":"正解。SLE（anti-dsDNA陽性）。","C":"Sjögren以乾燥為主。","D":"SSc以皮膚硬化為主。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112020-31":{"quick":"SLE神經精神症狀中最常見為認知功能障礙（cognitive dysfunction）。","detail":{"background":"**神經精神性狼瘡（NPSLE）表現多樣，其中『認知功能障礙』最常見**（注意力、記憶、執行功能），其次頭痛、情緒障礙、癲癇等；橫貫性脊髓炎、腦出血、自律神經失調相對少見。","options":{"A":"正解。認知功能障礙最常見。","B":"橫貫性脊髓病少見。","C":"腦出血少見。","D":"自律神經失調少見。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113020-28":{"quick":"狼瘡腎炎切片『最不可能』出現FSGS（非狼瘡腎炎分類）；B。","detail":{"background":"**狼瘡腎炎（ISN/RPS分類I–VI）病理含：繫膜增生、局部/瀰漫增生（伴subendothelial沉積、wire-loop、新月體）、膜性（subepithelial免疫複合物）等『免疫複合物』病變**。**『局部節段性腎絲球硬化（FSGS）』為足細胞病非免疫複合物型，並非狼瘡腎炎之分類病變→最不可能**。故B。","options":{"A":"瀰漫增生伴subendothelial沉積＝第IV型，可見。","B":"正解（最不可能）。FSGS非狼瘡腎炎分類。","C":"膜性伴subepithelial沉積＝第V型，可見。","D":"內皮增生伴新月體＝增生型，可見。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113020-35":{"quick":"年輕女性疑SLE之確診，安排『肺部CT』對診斷最無幫助；C。","detail":{"background":"反覆發燒、多關節痛、下肢水腫、血球三系低、蛋白尿、雙側肋膜積水→疑**SLE合併狼瘡腎炎**。確診應驗**ANA／anti-dsDNA、抗磷脂抗體、補體，並腎臟切片**。**『肺部電腦斷層』對確立SLE診斷幫助最小**（肋膜積水已知，CT不增診斷價值）。故C。","options":{"A":"ANA為SLE篩檢，有幫助。","B":"抗磷脂抗體評估，有幫助。","C":"正解（最無幫助）。肺部CT對確診SLE幫助最小。","D":"腎臟切片確立狼瘡腎炎，有幫助。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"103030-41":{"quick":"自體免疫疾病與HLA配對相關性最高者為RA—HLA-DR4。","detail":{"background":"**HLA與疾病關聯**：**RA—HLA-DR4（shared epitope）關聯明確**；SLE與HLA-DR2/DR3相關（非A8）；Behçet—HLA-B51（非C51）；強直性脊椎炎—HLA-B27；自體免疫肝炎—HLA-DR3/DR4。故B（RA-DR4）相關性最高。","options":{"A":"SLE與DR2/DR3，非A8。","B":"正解。RA—HLA-DR4。","C":"Behçet為HLA-B51，非C51。","D":"AS才與HLA-B27。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"103100-41":{"quick":"懷疑抗磷脂症候群最重要檢查為PT與aPTT（aPTT延長）。","detail":{"background":"**抗磷脂抗體症候群（APS）**之lupus anticoagulant會干擾磷脂依賴之凝血試驗→**aPTT延長（且混合試驗不矯正）**，故初步以**PT/aPTT**篩檢，再加anti-cardiolipin、anti-β2GPI與lupus anticoagulant確認。C3/C4、ESR/CRP、血脂非APS核心檢查。","options":{"A":"C3/C4非APS核心。","B":"正解。PT與aPTT（aPTT延長）。","C":"ESR/CRP非APS核心。","D":"血脂非APS核心。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104090-36":{"quick":"自體免疫疾病與自體抗原配對最正確者：多發性硬化症—myelin basic protein。","detail":{"background":"**multiple sclerosis（多發性硬化症）之自體抗原為myelin（含myelin basic protein）**；RA之自體抗原為citrullinated蛋白（非F-actin，F-actin/SMA見於自體免疫肝炎）；自體免疫肝炎非collagen type II；Sjögren為Ro/La（非deoxyribonucleoprotein）。故A最正確。","options":{"A":"正解。MS—myelin basic protein。","B":"RA為citrullinated蛋白，非F-actin。","C":"AIH非collagen II。","D":"Sjögren為Ro/La。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105020-12":{"quick":"DVT且aPTT延長、混合試驗不矯正→優先驗lupus anticoagulant。","detail":{"background":"年輕女性自發性DVT＋**aPTT延長**（thrombin time正常、PT略長），最該先排除**lupus anticoagulant（抗磷脂抗體）**——其『矛盾性』延長磷脂依賴凝血時間卻臨床致『血栓』，且**混合正常血漿不矯正（抑制物特性）**。protein S/C、factor VIII為其他易栓檢查但本例線索指向LA。","options":{"A":"正解。優先驗lupus anticoagulant。","B":"factor VIII升高為次要。","C":"protein S缺乏為其他易栓。","D":"protein C缺乏為其他易栓。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105100-36":{"quick":"抗磷脂症候群與血小板低下（thrombocytopenia）最相關。","detail":{"background":"**APS臨床三大：動/靜脈血栓、習慣性流產、血小板低下（thrombocytopenia）**（並可見網狀青斑、Libman-Sacks心內膜炎）。蛋白尿、光敏為SLE其他表現、關節炎非APS定義特徵。故A。","options":{"A":"正解。血小板低下與APS相關。","B":"蛋白尿非APS定義。","C":"光敏為SLE皮膚表現。","D":"關節炎非APS定義特徵。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"109080-32":{"quick":"自體抗體配對錯誤者：MCTD應為anti-U1RNP（非anti-centromere）；C。","detail":{"background":"**自體抗體—疾病**：Sjögren—anti-Ro(SS-A)；SLE—anti-dsDNA；**混合結締組織病（MCTD）—anti-U1RNP（高效價，非anti-centromere）**；瀰漫型硬皮症—anti-Scl-70（topoisomerase I）。**anti-centromere見於『局限型硬皮症/CREST』**。故C配對錯誤。","options":{"A":"Sjögren—anti-Ro，正確。","B":"SLE—anti-dsDNA，正確。","C":"正解（錯誤）。MCTD為anti-U1RNP，非anti-centromere。","D":"瀰漫型SSc—anti-Scl-70，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"110080-37":{"quick":"lupus anticoagulant之aPTT延長『混合試驗不會矯正』；B稱會矯正，錯誤。","detail":{"background":"**lupus anticoagulant（抗磷脂抗體之一）為『抑制物』**：延長aPTT，**混合正常血漿（mixing test）『不會矯正』**（與凝血因子缺乏可被矯正相反），臨床致血栓而非出血；可致VDRL偽陽性。故B（混合會矯正）錯誤。","options":{"A":"通常無出血傾向（反致血栓），正確。","B":"正解（錯誤）。混合試驗『不』矯正（抑制物）。","C":"非SLE者亦可出現LA，正確。","D":"VDRL可偽陽性，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"111080-35":{"quick":"反覆流產評估APS時，『抗血小板抗體』對確立診斷最沒幫助；B。","detail":{"background":"**APS（反覆流產）診斷標準之實驗室項目為：lupus anticoagulant、anti-cardiolipin抗體、anti-β2 glycoprotein I抗體（需間隔≥12週兩次陽性）**。**『抗血小板抗體（anti-platelet antibodies）』非APS診斷標準項，對確立APS最無幫助**。故B。","options":{"A":"lupus anticoagulant為診斷項。","B":"正解（最無幫助）。抗血小板抗體非APS標準。","C":"anti-cardiolipin為診斷項。","D":"anti-β2GPI為診斷項。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113070-34":{"quick":"HLA與疾病相關性最高者為RA—HLA-DR4。","detail":{"background":"**RA—HLA-DR4（含DRB1 shared epitope）關聯最明確**。第1型糖尿病與HLA-DR3/DR4（非B5801，B5801為allopurinol過敏）；Behçet—HLA-B51（非B1502，B1502為carbamazepine）；Sjögren—HLA-DR3（非DR8）。故D。","options":{"A":"第1型DM與DR3/DR4，非B5801。","B":"Behçet為B51，非B1502。","C":"Sjögren與DR3，非DR8。","D":"正解。RA—HLA-DR4。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"114020-35":{"quick":"抗磷脂症候群最常見的臨床表現為深部靜脈栓塞（DVT）。","detail":{"background":"**APS血栓中以『靜脈血栓（尤深部靜脈栓塞DVT）』最常見**；動脈血栓（如中風）次之；視網膜動脈栓塞、子癇前症、Libman-Sacks心內膜炎為較少見表現。故A。","options":{"A":"正解。深部靜脈栓塞最常見。","B":"視網膜動脈栓塞較少見。","C":"子癇前症為產科表現之一。","D":"Libman-Sacks心內膜炎較少見。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"115020-31":{"quick":"『反覆胃腸出血』對診斷抗磷脂症候群最沒幫助；B。","detail":{"background":"**APS臨床／實驗線索：血栓、習慣性流產、血小板低下、anti-β2GPI／anti-cardiolipin／lupus anticoagulant陽性**。**『反覆胃腸道出血』非APS特徵（APS反致血栓非出血）**，對診斷最無幫助。故B。","options":{"A":"血小板低下與APS相關。","B":"正解（最無幫助）。反覆胃腸出血非APS表現。","C":"反覆流產為APS表現。","D":"anti-β2GPI抗體為診斷項。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"115020-35":{"quick":"自體抗原配對最不適當者：進行性硬皮症應為topoisomerase I（非tubulin）；C。","detail":{"background":"**疾病—自體抗原**：重症肌無力—乙醯膽鹼受體；自體免疫甲狀腺炎—thyroglobulin；**進行性全身性硬化症（SSc）—DNA topoisomerase I（Scl-70）或centromere，『非tubulin』**；GPA—proteinase 3（PR3-ANCA）。故C不適當。","options":{"A":"重症肌無力—ACh受體，正確。","B":"自體免疫甲狀腺炎—thyroglobulin，正確。","C":"正解（不適當）。SSc為topoisomerase I/centromere，非tubulin。","D":"GPA—proteinase 3，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"101030-32":{"quick":"全身性硬化症最常見之初發症狀為雷諾現象（Raynaud's phenomenon）。","detail":{"background":"**全身性硬化症（SSc）之最常見初發症狀為『雷諾現象』**（常早於皮膚硬化數月至數年出現，指端遇冷蒼白→發紺→潮紅）。皮膚增厚、吞嚥困難、運動性呼吸困難為後續臟器受累表現。","options":{"A":"正解。雷諾現象為最常見初發症狀。","B":"皮膚增厚為後續。","C":"吞嚥困難為食道受累後續。","D":"運動性呼吸困難為肺受累後續。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"102030-33":{"quick":"ANA呈centromere pattern與全身性硬化症（局限型/CREST）最相關。","detail":{"background":"**ANA染色型態提示**：**centromere（著絲點）型→局限型硬皮症/CREST（anti-centromere抗體）**；homogeneous→anti-dsDNA/histone（SLE/藥物性狼瘡）；speckled→anti-Sm/RNP/SSA/SSB；nucleolar→瀰漫型硬皮症。故A（centromere）與SSc最相關。","options":{"A":"正解。centromere型與SSc(CREST)相關。","B":"peripheral(rim)與anti-dsDNA。","C":"cytoplasmic型多為抗合成酶/粒線體等。","D":"homogeneous與SLE/藥物性狼瘡。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"103100-42":{"quick":"診斷混合結締組織病（MCTD）最有用之血清標記為anti-U1 RNP。","detail":{"background":"**混合結締組織病（MCTD）兼具SLE、SSc、多發性肌炎特徵，特徵性血清標記為『高效價anti-U1 RNP抗體』**（且常anti-Sm陰性）。anti-SSA為Sjögren、anti-Scl-70為瀰漫型SSc、anti-nucleolar為SSc。故B。","options":{"A":"anti-SSA為Sjögren。","B":"正解。anti-U1 RNP為MCTD標記。","C":"anti-Scl-70為瀰漫型SSc。","D":"anti-nucleolar為SSc。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104030-43":{"quick":"硬皮症早期間質性肺病變首選cyclophosphamide。","detail":{"background":"**硬皮症相關間質性肺病（SSc-ILD）之免疫抑制治療，傳統首選cyclophosphamide（Scleroderma Lung Study證實改善肺功能），近年mycophenolate mofetil與nintedanib／tocilizumab亦用**。類固醇對SSc-ILD效果有限且高劑量增腎危象風險；hydroxychloroquine、D-penicillamine療效不佳。故D。","options":{"A":"類固醇對SSc-ILD效果有限。","B":"hydroxychloroquine療效不佳。","C":"D-penicillamine療效未證實。","D":"正解。cyclophosphamide。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104030-44":{"quick":"硬皮症中促使纖維母細胞大量產生膠原的細胞激素為TGF-β。","detail":{"background":"**硬皮症纖維化之核心細胞激素為transforming growth factor-β（TGF-β）**（活化纖維母細胞→大量膠原沉積），並與CTGF、IL-4、IL-13等協同。TNF-α、IL-4、IFN-α非主要驅動纖維化之因子。故B。","options":{"A":"TNF-α非SSc纖維化主因。","B":"正解。TGF-β驅動膠原生成。","C":"IL-4為輔助。","D":"IFN-α非纖維化主因。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105100-37":{"quick":"全身性硬化症最常侵犯的內臟為食道。","detail":{"background":"**SSc除皮膚外，『食道』為最常受累之內臟**（下2/3平滑肌纖維化→蠕動不良、下食道括約肌鬆弛致逆流、狹窄）。其後可侵犯肺（ILD/肺高壓）、心、腎（硬皮症腎危象）。故A。","options":{"A":"正解。食道最常受累。","B":"心臟受累較食道少。","C":"腎危象為嚴重但較少。","D":"眼睛非SSc主要受累。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"107020-11":{"quick":"雷諾＋微血管擴張＋吞嚥障礙＋anti-centromere→CREST症候群。","detail":{"background":"**CREST症候群（局限型硬皮症）＝Calcinosis、Raynaud、Esophageal dysmotility、Sclerodactyly、Telangiectasia**，特徵性**anti-centromere抗體陽性**（本例centromere pattern、anti-centromere高）。polymyositis、Sjögren、SLE抗體型態不符。故B。","options":{"A":"polymyositis以肌無力為主。","B":"正解。CREST症候群。","C":"Sjögren以乾燥為主。","D":"SLE抗體型態不符。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108080-30":{"quick":"局限型硬皮症若併間質性肺炎，進展較『緩慢』；B為其特性。","detail":{"background":"**局限型（limited cutaneous）SSc vs 瀰漫型（diffuse）**：局限型皮膚硬化進展『慢』、侷限肢端與面部、anti-centromere陽性、**併ILD時進展較緩、但較易『肺動脈高壓』**；瀰漫型皮膚快速廣泛硬化、anti-Scl-70陽性、早期內臟（ILD、腎危象）。故B（局限型ILD進展較緩）為其特性。","options":{"A":"皮膚硬化進展較快為瀰漫型，錯誤。","B":"正解。局限型併ILD進展較緩。","C":"關節疼痛較嚴重非局限型特性。","D":"anti-Scl-70陽性為瀰漫型，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112080-11":{"quick":"原發性雷諾現象症狀通常較『輕』；B稱較嚴重，錯誤。","detail":{"background":"**雷諾現象**：**原發性（primary，無基礎病）症狀較輕、對稱、不致組織壞死、抗體陰性、甲褶微血管正常**；**次發性（如硬皮症）較嚴重、可致指端潰瘍壞死**。50歲以上新發者要考慮動脈粥狀硬化／次發病因。嚴重者用dihydropyridine鈣離子阻斷劑（如nifedipine）。故B（原發較嚴重）錯誤。","options":{"A":"常見於硬皮症，正確。","B":"正解（錯誤）。原發性雷諾症狀較『輕』，非較嚴重。","C":">50歲新發要考慮動脈硬化，正確。","D":"dihydropyridine CCB可減輕，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113020-32":{"quick":"快速進展的間質性肺炎較常見於瀰漫型皮膚硬化症；B最適當。","detail":{"background":"**瀰漫型（diffuse cutaneous）SSc：皮膚快速廣泛硬化、anti-Scl-70陽性、『早期且進展較快之間質性肺病（ILD）』與『硬皮症腎危象』**；**局限型（limited/CREST）：anti-centromere、較易肺動脈高壓、鈣質沉著（calcinosis cutis）**。故B（快速ILD見於瀰漫型）最適當。","options":{"A":"關節攣縮較常見於瀰漫型，錯誤。","B":"正解。快速進展ILD見於瀰漫型。","C":"calcinosis cutis較常見於局限型，錯誤。","D":"腎危象較常見於瀰漫型，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"102110-29":{"quick":"與Sjögren診斷最無關者為HLA-DR2檢測。","detail":{"background":"**乾燥症（Sjögren）診斷工具**：Schirmer test（淚液量）、唾液腺閃爍攝影（sialoscintigraphy）、**下唇小唾液腺切片（focal lymphocytic sialadenitis，focus score）**、anti-Ro/La。**HLA-DR2檢測與診斷『最無關』**（Sjögren相關HLA為DR3，且HLA非診斷工具）。故B。","options":{"A":"sialoscintigraphy為診斷工具。","B":"正解（最無關）。HLA-DR2檢測。","C":"下唇小唾液腺切片為診斷依據。","D":"Schirmer test評估淚液。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104090-37":{"quick":"Sjögren病人最易發生之腫瘤為非何杰金氏淋巴瘤（NHL）。","detail":{"background":"**Sjögren長期慢性B細胞活化→『非何杰金氏淋巴瘤（尤MALT型黏膜相關淋巴瘤）』風險明顯升高**（持續腮腺腫大、紫斑、低補體、cryoglobulin為轉化警訊）。胸腺瘤、小細胞肺癌、腎細胞癌非其特徵性腫瘤。故D。","options":{"A":"胸腺瘤與重症肌無力相關。","B":"小細胞肺癌非Sjögren特徵。","C":"腎細胞癌非Sjögren特徵。","D":"正解。非何杰金氏淋巴瘤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106020-36":{"quick":"原發性乾燥症診斷組合（本題一律給分）。","detail":{"background":"**原發性Sjögren診斷需兼具『主觀乾燥症狀＋客觀檢查（眼乾Schirmer/染色、口乾唾液腺功能）＋免疫（anti-SSA/SSB）或唾液腺切片focus score≥1』**並排除其他病。原組合答案為①口乾②眼乾③Schirmer陽性④唾液腺切片異常。（本題經考選部公告『一律給分』。）","options":{"A":"原標準答案。①②③④（症狀＋客觀檢查）。","B":"含⑦關節痛非診斷核心。","C":"組合亦含客觀項。","D":"含⑦關節痛非核心。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106080-38":{"quick":"乾燥症＋關節痛之病人，最不會陽性者為anticardiolipin抗體；D。","detail":{"background":"中年女性**多關節痛＋眼乾口乾＋腮腺腫→Sjögren**：常見**RF陽性、ANA陽性、anti-SS-A(Ro)/SS-B(La)陽性**。**anticardiolipin（抗心磷脂）抗體屬抗磷脂症候群標記，非Sjögren典型，最不會陽性**。故D。","options":{"A":"RF常陽性。","B":"ANA常陽性。","C":"anti-Ro/La常陽性。","D":"正解（最不會陽性）。anticardiolipin非Sjögren典型。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"109020-30":{"quick":"乾燥症併血管炎時可用類固醇與免疫抑制劑治療；B正確。","detail":{"background":"**Sjögren腺體外表現治療**：**併血管炎→類固醇＋免疫抑制劑（如cyclophosphamide/rituximab）**；關節炎多用hydroxychloroquine（非anti-TNF）；併淋巴瘤需化療（非僅高劑量類固醇）；雷諾用鈣離子阻斷劑（非NSAID）。故B正確。","options":{"A":"關節炎多用HCQ，非anti-TNF，錯誤。","B":"正解。併血管炎用類固醇＋免疫抑制劑。","C":"併淋巴瘤需化療，非僅類固醇，錯誤。","D":"雷諾用CCB，非NSAID，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"111080-33":{"quick":"乾燥症之關節炎大部分為『非侵蝕性（non-erosive）』；C最適當。","detail":{"background":"**Sjögren**：腎臟受累以『腎小管間質（遠端RTA）』為主、腎絲球病變少（且明顯腎侵犯非半數以上）；唾液腺浸潤以**CD4+ T淋巴球**為主（非CD8）；**關節炎多為『非侵蝕性』**（與RA侵蝕性不同）；HLA關聯為DR3（非DR5）。故C最適當。","options":{"A":"明顯腎侵犯非半數以上，錯誤。","B":"以CD4+ T浸潤為主，非CD8，錯誤。","C":"正解。關節炎多為非侵蝕性。","D":"與HLA-DR3相關，非DR5，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"115020-32":{"quick":"Sjögren常有關節痛/關節炎、腎為腎小管間質而非腎絲球；B最不適當。","detail":{"background":"**Sjögren最常侵犯唾液腺與淚腺（口乾眼乾、易蛀牙），常伴關節痛/關節炎；腎臟受累以『腎小管間質（遠端RTA、間質性腎炎）』為主，腎絲球病變較少**；anti-SS-A(Ro)相關；**淋巴瘤風險升高**。故B（稱常腎絲球病變、少關節炎）最不適當。","options":{"A":"侵犯唾液淚腺、易蛀牙，正確。","B":"正解（最不適當）。腎為腎小管間質為主、常有關節症狀。","C":"anti-SS-A相關，正確。","D":"淋巴瘤風險較高，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108030-31":{"quick":"statin類藥物可引發類似多發性肌炎之表現；A正確。","detail":{"background":"**多發性肌炎（polymyositis）**：對稱性『近端』肌無力、CK升高、肌電圖肌源性變化、肌切片**endomysial CD8+ T細胞浸潤**。**statin可致肌病（含罕見之免疫媒介性壞死性肌病，抗HMGCR抗體）類似多發性肌炎**。>50歲發炎性肌病最常見診斷其實為『包涵體肌炎（IBM）』（非多發性肌炎）；關節攣縮、皮下鈣化見於『幼年型皮肌炎』而非多發性肌炎。故A正確。","options":{"A":"正解。statin可引發類肌炎表現。","B":">50歲最常見為包涵體肌炎，非多發性肌炎，錯誤。","C":"關節攣縮非polymyositis典型，錯誤。","D":"皮下鈣化見於幼年型皮肌炎，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"110080-31":{"quick":"上眼瞼及臉頰紅疹＋近端肌無力（晨起需手撐起身）→皮肌炎。","detail":{"background":"**皮肌炎（dermatomyositis）**：對稱『近端』肌無力（起身、舉臂困難）＋特徵皮疹（**heliotrope上眼瞼紫紅疹、Gottron丘疹、向陽性顴部紅疹**），CK/aldolase升高、anti-Jo-1等。微燒、紅疹＋近端無力最符合皮肌炎。SLE、濕疹、單純光敏不符近端肌無力＋特徵皮疹。故A。","options":{"A":"正解。皮肌炎。","B":"SLE無典型近端肌無力＋heliotrope。","C":"濕疹無肌無力。","D":"單純光敏無肌無力。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112020-35":{"quick":"皮肌炎（dermatomyositis）有可能與癌症相關；D正確。","detail":{"background":"**發炎性肌病**：**dermatomyositis與『惡性腫瘤』相關（副腫瘤，尤≥40歲須篩癌）**；**inclusion body myositis好發>50歲（非年輕）**；皮肌炎常有肌外表現（皮膚、ILD、食道）；多發性肌炎家族遺傳性不強。故D正確。","options":{"A":"包涵體肌炎好發老年，非年輕，錯誤。","B":"皮肌炎常有肌外表現，錯誤。","C":"多發性肌炎家族遺傳性不強，錯誤。","D":"正解。皮肌炎可與癌症相關。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112080-33":{"quick":"多發性肌炎肌切片以endomysial／perivascular發炎、CD8+ T細胞浸潤為主；C正確。","detail":{"background":"**發炎性肌病鑑別**：皮肌炎成人、幼童皆可（補體媒介微血管病、CD4/B細胞、perimysial）；**多發性肌炎以『endomysial、CD8+ T細胞直接攻擊肌纖維』為主**；**包涵體肌炎好發>50歲、『男性』居多（非女性）**；壞死性肌病（necrotizing myopathy）與惡性腫瘤、statin、抗HMGCR相關。故C正確。","options":{"A":"皮肌炎成人幼童皆可、敘述不全，錯誤。","B":"IBM以男性居多，非女性，錯誤。","C":"正解。多發性肌炎為endomysial、CD8+ T浸潤。","D":"壞死性肌病與惡性腫瘤相關，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"101030-30":{"quick":"ANCA最常出現於Wegener肉芽腫（GPA）。","detail":{"background":"**抗嗜中性球細胞質抗體（ANCA）**：**c-ANCA（anti-PR3）與肉芽腫性多血管炎（GPA，Wegener）關聯最高**；p-ANCA（anti-MPO）見於顯微多血管炎、EGPA。Behçet、RA、Sjögren非ANCA相關血管炎。故A。","options":{"A":"正解。Wegener（GPA）。","B":"Behçet非ANCA相關。","C":"RA非ANCA血管炎。","D":"Sjögren非ANCA血管炎。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"103100-43":{"quick":"因免疫複合物堆積於血管壁所致之血管炎為Henoch-Schönlein紫斑症（IgA血管炎）。","detail":{"background":"**Henoch-Schönlein purpura（HSP，IgA血管炎）為『免疫複合物（IgA）沉積』之小血管炎**：可觸性紫斑、關節痛、腹痛、IgA腎病變。Takayasu、巨細胞動脈炎為大血管（細胞媒介肉芽腫）；Churg-Strauss（EGPA）為ANCA相關小血管炎（pauci-immune）。故B。","options":{"A":"Takayasu為大血管肉芽腫。","B":"正解。HSP為免疫複合物（IgA）沉積。","C":"EGPA為ANCA相關pauci-immune。","D":"巨細胞動脈炎為大血管肉芽腫。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104090-08":{"quick":"慢性鼻竇炎鼻黏膜潰瘍出血＋肺多發結節＋咳血→肉芽腫性多血管炎（GPA/Wegener）。","detail":{"background":"**肉芽腫性多血管炎（GPA，Wegener）三大受累：上呼吸道（鼻竇炎、鼻中膈穿孔、鞍鼻）、下呼吸道（肺結節／空洞、肺泡出血）、腎（壞死性新月體腎炎）**，c-ANCA（anti-PR3）陽性。肺癌、Behçet、肺結核瘤不符上＋下呼吸道＋ANCA型態。故B。","options":{"A":"肺癌不符多系統。","B":"正解。GPA（Wegener）。","C":"Behçet不符肺結節。","D":"肺結核瘤不符鼻竇＋多結節。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104090-34":{"quick":"Wegener肉芽腫可測得anti-proteinase-3（PR3）抗體；A正確。","detail":{"background":"**GPA（Wegener）：血清『anti-PR3（c-ANCA）』陽性**；白人較黑人常見（非黑人）；腎切片為**『pauci-immune』壞死性新月體腎炎，肉芽腫在腎不常見（多在呼吸道）**；眼部可造成鞏膜炎、結膜炎、眼窩假瘤。故A正確。","options":{"A":"正解。可測得anti-PR3抗體。","B":"白人較黑人常見，錯誤。","C":"腎切片肉芽腫不常見，錯誤。","D":"可造成鞏膜炎/結膜炎，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104090-35":{"quick":"巨細胞動脈炎常與風濕性多肌痛（polymyalgia rheumatica）共同發生。","detail":{"background":"**巨細胞（顳）動脈炎（GCA）與風濕性多肌痛（PMR）密切相關**（約40–50% GCA合併PMR，反之約10–20% PMR發展GCA），皆好發>50歲、ESR/CRP高、對類固醇反應佳。RA、Sjögren、PBC非其典型共病。故C。","options":{"A":"RA非GCA典型共病。","B":"Sjögren非典型。","C":"正解。polymyalgia rheumatica。","D":"PBC非典型。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105020-08":{"quick":"眼眶周圍紫斑＋肝脾腫大＋多系統出血腎病→類澱粉症（AL amyloidosis）。","detail":{"background":"**原發性（AL）類澱粉症**：『**眼眶周圍紫斑（raccoon eyes，因血管壁類澱粉浸潤易出血）**』、巨舌、肝脾腫大、心臟（限制型）、腎病症候群、易出血（凝血因子X缺乏）。本例眼眶紫斑＋肝脾腫大＋出血＋腎病補體正常→amyloidosis（A）；冷凝球蛋白血症與Wegener、SLE多伴補體下降或ANCA特徵。故A。","options":{"A":"正解。類澱粉症（眼眶紫斑特徵）。","B":"冷凝球蛋白血症常補體下降。","C":"Wegener有ANCA與肺腎表現。","D":"SLE補體下降、自體抗體。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106020-37":{"quick":"會合併氣喘發作之全身性血管炎為Churg-Strauss症候群（EGPA）。","detail":{"background":"**嗜伊紅性肉芽腫性多血管炎（EGPA，Churg-Strauss）三期：氣喘／過敏性鼻炎→嗜伊紅球增多（肺浸潤、腸胃）→全身性小血管炎**，約半數p-ANCA（anti-MPO）陽性。Goodpasture（肺腎抗GBM）、混合冷凝球蛋白、藥物性血管炎不以氣喘為特徵。故A。","options":{"A":"正解。Churg-Strauss（EGPA）合併氣喘。","B":"Goodpasture為抗GBM肺腎。","C":"冷凝球蛋白血症不以氣喘為特徵。","D":"藥物性血管炎不以氣喘為特徵。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106020-38":{"quick":"反覆葡萄膜炎＋口腔潰瘍＋下肢壓痛紅疹→Behçet，pathergy test具診斷價值。","detail":{"background":"**貝賽特氏症（Behçet）：反覆口腔潰瘍＋生殖器潰瘍＋眼（葡萄膜炎/視網膜血管炎）＋皮膚（結節性紅斑、毛囊炎）**，**『針刺反應（pathergy test）陽性』為其特徵性檢查**，與HLA-B51相關。Schober test查脊椎活動（AS）、Schirmer查淚液（Sjögren）、PPD查結核。故A。","options":{"A":"正解。pathergy test。","B":"Schober test為AS脊椎活動度。","C":"Schirmer's test為Sjögren。","D":"PPD為結核。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"107020-13":{"quick":"HCV＋下肢壓痛紫斑＋四肢麻痛＋蛋白尿→冷凝球蛋白（cryoglobulin）最具診斷價值。","detail":{"background":"**慢性C型肝炎相關之『混合性冷凝球蛋白血症血管炎』**：可觸性紫斑（小血管炎）、周邊神經病變、腎絲球腎炎（MPGN）、低補體C4。**檢測『血清cryoglobulin』最具診斷價值**（採血需保溫運送）。RF常陽性但非特異；ANA、HCV病毒量非確診此血管炎之關鍵。故C。","options":{"A":"RF常陽性但非特異。","B":"ANA非此診斷關鍵。","C":"正解。cryoglobulin最具診斷價值。","D":"HCV病毒量非確診血管炎。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"107020-37":{"quick":"血管炎臨床特徵正確配對：Churg-Strauss—氣喘發作。","detail":{"background":"**血管炎特徵配對**：**EGPA（Churg-Strauss）—氣喘**（正確）；GPA—上呼吸道（鼻竇炎）而非蕁麻疹；顯微多血管炎—肺腎（非慢性鼻竇炎，後者偏GPA）；結節性多動脈炎（PAN）—腎血管、腸繫膜、神經（非嚴重偏頭痛特徵）。故C正確。","options":{"A":"GPA—蕁麻疹配對不當。","B":"慢性鼻竇炎偏GPA，非顯微多血管炎。","C":"正解。Churg-Strauss—氣喘。","D":"PAN非以偏頭痛為特徵。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108030-32":{"quick":"顳動脈炎常與風濕性多肌痛一起發生；B正確。","detail":{"background":"**顳（巨細胞）動脈炎（GCA）為『大血管炎』**，好發**>50歲女性**，**常與風濕性多肌痛（PMR）並存**；症狀頭痛、顳動脈壓痛、下顎跛行、視力喪失（前部缺血性視神經病變）；ESR顯著升高；**對高劑量類固醇反應良好且需及早治療以防失明**。故B正確。","options":{"A":"屬大血管炎，非中小血管，錯誤。","B":"正解。常與PMR並存。","C":"好發>50歲，非20–40歲，錯誤。","D":"對類固醇反應佳，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108080-31":{"quick":"貝賽特氏症常反覆口腔與生殖器潰瘍；A正確。","detail":{"background":"**Behçet症候群：反覆『口腔與生殖器潰瘍』為核心**，常侵犯眼（葡萄膜炎，可致失明）、皮膚、關節、血管、神經、腸道；**男性常較嚴重（眼/血管/神經受累）**，與HLA-B51相關，pathergy陽性。故A正確（B、C、D皆相反）。","options":{"A":"正解。反覆口腔與生殖器潰瘍。","B":"眼睛常受侵犯，錯誤。","C":"男性常較嚴重，錯誤。","D":"常併關節痛，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"110020-33":{"quick":"cANCA出現比例最高之全身性血管炎為Wegener肉芽腫（GPA）。","detail":{"background":"**c-ANCA（anti-PR3）在GPA（Wegener）陽性率最高（活動期可達>90%）**；顯微多血管炎多為p-ANCA（anti-MPO）；PAN、Goodpasture、Takayasu非典型ANCA相關。故B。","options":{"A":"PAN非ANCA相關。","B":"正解。Wegener（GPA）cANCA最高。","C":"Goodpasture為抗GBM。","D":"Takayasu非ANCA相關。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"110080-30":{"quick":"下肢紫斑＋反覆氣喘＋嗜伊紅球27%→EGPA，驗ANCA最有幫助。","detail":{"background":"**EGPA（Churg-Strauss）**：氣喘／過敏背景＋**顯著嗜伊紅球增多（>10%）**＋小血管炎（可觸性紫斑、神經病變）。**約半數p-ANCA（anti-MPO）陽性，檢測ANCA對診斷最有幫助**（並支持血管炎期）。IgE、IgG4、痰抹片非確立此血管炎之關鍵。故A。","options":{"A":"正解。ANCA對診斷EGPA最有幫助。","B":"IgE升高非特異。","C":"IgG4非EGPA核心。","D":"痰抹片非診斷血管炎。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112020-32":{"quick":"血清可測得ANCA者為肉芽腫性多血管炎（GPA）。","detail":{"background":"**ANCA相關血管炎包含GPA、顯微多血管炎、EGPA**。本題選項中**granulomatosis with polyangiitis（GPA）可測得ANCA（c-ANCA/PR3）**；血清病（serum sickness）、川崎病、結締組織病相關血管炎非ANCA陽性血管炎。故C。","options":{"A":"血清病為免疫複合物。","B":"川崎病非ANCA相關。","C":"正解。GPA可測得ANCA。","D":"結締組織病相關血管炎非ANCA陽性。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113020-33":{"quick":"巨細胞動脈炎可用tocilizumab（IL-6拮抗）治療；C最適當。","detail":{"background":"**巨細胞動脈炎（GCA）**：好發**>50歲、女性多**，與PMR相關（約>40–50%，非僅5%）。治療為**高劑量類固醇（疑視力受威脅即先給，不等切片），且IL-6受體拮抗劑『tocilizumab』經GiACTA試驗證實可作為類固醇節省（steroid-sparing）治療**。故C最適當。","options":{"A":"好發>50歲，非<50歲，錯誤。","B":"女性較常見，非男性，錯誤。","C":"正解。可用tocilizumab。","D":"約>40–50%合併PMR，非5%，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"101030-28":{"quick":"女性較少罹患僵直性脊椎炎且預後較好；D正確。","detail":{"background":"**僵直性脊椎炎（AS）與HLA-B27**：HLA-B27陽性率高（約>90%）但**並非診斷『必要』條件**（診斷靠發炎性下背痛＋影像薦腸關節炎）；**一般人口HLA-B27陽性者僅約1–5%日後發病**（非7成）；**女性發病較少、症狀／放射學進展較輕（嚴重駝背較少）**。故D正確。","options":{"A":"HLA-B27非診斷必要，錯誤。","B":"AS病人HLA-B27陽性率約>90%（非7成）。","C":"陽性者僅約1–5%發病，非4成，錯誤。","D":"正解。女性較少且預後較佳。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104030-08":{"quick":"年輕男性下半夜下背痛＋膝關節炎＋葡萄膜炎→脊椎關節病變，安排骨盆腔X光看薦腸關節炎。","detail":{"background":"年輕男性**發炎性下背痛（夜間痛、晨僵）＋周邊關節炎＋急性前葡萄膜炎→脊椎關節病變（如僵直性脊椎炎）**。**骨盆腔X光看『薦腸關節炎（sacroiliitis）』對診斷最有幫助**（早期可加MRI、HLA-B27）。膝X光、RF/ANA、關節液對此診斷幫助較小。故A。","options":{"A":"正解。骨盆腔X光看薦腸關節炎。","B":"膝X光幫助小。","C":"RF/ANA為RA/SLE標記。","D":"關節液對軸性病變幫助小。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"104030-42":{"quick":"風濕免疫病合併眼病變正確配對：RA—鞏膜炎、PBC—Sjögren乾燥症。","detail":{"background":"**風濕病眼併發配對**：**RA—鞏膜炎（scleritis）／乾燥性角結膜炎**（非葡萄膜炎）；原發性膽道硬化（PBC）常合併乾燥症；**僵直性脊椎炎—『前』葡萄膜炎（anterior uveitis）**（非後房）；SLE眼以視網膜病變／乾眼為主。選項B（RA鞏膜炎＋PBC合併Sjögren）配對最正確。","options":{"A":"RA合併葡萄膜炎配對不當（應為鞏膜炎）。","B":"正解。RA—鞏膜炎；PBC—Sjögren。","C":"AS為『前』葡萄膜炎，非後房。","D":"AS合併前葡萄膜炎正確但乾癬性配鞏膜炎不佳。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105020-09":{"quick":"僵直性脊椎炎併急性前葡萄膜炎首選局部類固醇。","detail":{"background":"**僵直性脊椎炎常合併『急性前葡萄膜炎』（眼紅、畏光、視力模糊）**，**首選治療為『局部（眼）類固醇』＋散瞳劑**，必要時眼科處置；反覆／嚴重者考慮全身性DMARD／anti-TNF。methotrexate、hydroxychloroquine、azathioprine非急性前葡萄膜炎首選。故C。","options":{"A":"methotrexate非急性葡萄膜炎首選。","B":"hydroxychloroquine非首選。","C":"正解。局部類固醇。","D":"azathioprine非首選。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105020-39":{"quick":"下背痛＋晨僵>30分＋阿基里斯腱炎、骨盆X光正常→中軸型脊椎關節炎。","detail":{"background":"**發炎性下背痛（晨僵>30分、活動改善）＋肌腱附著點炎（enthesitis，如阿基里斯腱）**且**骨盆X光尚無明顯薦腸關節炎變化→『中軸型脊椎關節炎（axial spondyloarthritis，X光陰性期）』**（需MRI偵測早期薦腸關節炎）；尚未達放射學僵直性脊椎炎之骨變化。退化性／乾癬性關節炎不符此型態。故B。","options":{"A":"X光尚無變化，未達放射學AS。","B":"正解。中軸型脊椎關節炎（X光陰性期）。","C":"退化性關節炎無發炎性下背痛/enthesitis。","D":"乾癬性關節炎需乾癬背景。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106020-08":{"quick":"遠端指間關節炎＋脫屑紅疹塊（乾癬皮膚）→乾癬性關節炎。","detail":{"background":"**乾癬性關節炎（psoriatic arthritis）**：可侵犯**遠端指間關節（DIP）**、香腸指（dactylitis）、附著點炎，伴**乾癬皮膚（脫屑紅疹塊）與指甲變化**。RA罕侵DIP；細菌性關節炎為單關節急性化膿；SLE無脫屑斑塊。故D。","options":{"A":"RA罕侵DIP。","B":"細菌性關節炎為急性化膿單關節。","C":"SLE無脫屑斑塊。","D":"正解。乾癬性關節炎。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106080-10":{"quick":"乾癬病史＋香腸指、DIP發炎、指甲變厚→乾癬性關節炎。","detail":{"background":"**乾癬性關節炎**：乾癬數年後出現關節炎，特徵**香腸指（dactylitis）、DIP侵犯、指甲病變（點狀凹陷、變厚易脆、油滴徵）**、附著點炎，X光可見『鉛筆套筆帽（pencil-in-cup）』。退化性、類風濕、黴菌感染不符乾癬背景＋香腸指＋指甲變化。故D。","options":{"A":"OA無香腸指/指甲病變。","B":"RA罕侵DIP。","C":"黴菌感染非此全貌。","D":"正解。乾癬性關節炎。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106080-35":{"quick":"一般人口HLA-B27陽性者僅少數會得AS（非20%）；C錯誤（本題答C、D均給分）。","detail":{"background":"**HLA-B27與AS**：陽性者較易併葡萄膜炎、家族傾向較高；**但一般人口HLA-B27陽性者『僅約1–5%』會發展AS（非20%）**。HLA-B27盛行率族群差異大（北美原住民高、台灣原住民低）。考選部公告本題答C或D均給分（D敘述族群盛行率比較亦有爭議）。故以C（20%發病）為主要錯誤。","options":{"A":"B27陽性較易葡萄膜炎，正確。","B":"B27陽性家族傾向較高，正確。","C":"正解（給分）。一般人B27陽性僅約1–5%發病，非20%。","D":"給分項。族群盛行率比較敘述有爭議。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"107020-38":{"quick":"對診斷僵直性脊椎炎最有幫助者為X光呈對稱性薦腸關節炎。","detail":{"background":"**僵直性脊椎炎之診斷核心為『薦腸關節炎（sacroiliitis）』**——**X光呈『對稱性』薦腸關節炎**最具診斷價值（早期可用MRI）。HLA-B27陽性僅支持非必要；老年下背痛史、胸廓擴張時疼痛為輔助但較不具特異診斷力。故D。","options":{"A":"HLA-B27陽性僅支持。","B":"老年下背痛非特異。","C":"胸廓擴張痛為輔助。","D":"正解。X光對稱性薦腸關節炎。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"109020-31":{"quick":"僵直性脊椎炎病人大多數HLA-B27陽性；C正確。","detail":{"background":"**僵直性脊椎炎**：**大多數（約>90%）HLA-B27陽性，但B27陰性『不能』排除AS**；眼部表現為**『前葡萄膜炎』（非結膜炎）**；**男性發病較多（非女性）**。故C正確。","options":{"A":"B27陰性不能排除AS，錯誤。","B":"眼表現為前葡萄膜炎，非結膜炎，錯誤。","C":"正解。大多數HLA-B27陽性。","D":"男性較多，非女性，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"109080-34":{"quick":"僵直性脊椎炎第一線藥物為NSAIDs；C正確。","detail":{"background":"**僵直性脊椎炎治療**：**第一線為NSAIDs（持續使用可改善症狀甚至延緩放射學進展）＋運動復健**；**anti-TNF（與IL-17抑制劑）對『中軸（脊椎）發炎』有效**（非只對周邊）；sulfasalazine、methotrexate主要對『周邊關節炎』有效、對中軸效果有限（不需每人併用MTX）。故C正確。","options":{"A":"sulfasalazine對中軸效果有限，錯誤。","B":"anti-TNF對脊椎發炎『也』有效，錯誤。","C":"正解。NSAIDs為第一線。","D":"不需每人併用MTX，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"110020-32":{"quick":"乾癬病人較常出現HLA-Cw*06。","detail":{"background":"**乾癬（psoriasis，尤早發第一型）與HLA-C（HLA-Cw*06／C*06:02）關聯最強**；HLA-B27與脊椎關節病（AS、乾癬性關節炎之中軸型）相關；HLA-DR4與RA、HLA-A2非特異。故C。","options":{"A":"HLA-A2非特異。","B":"HLA-B27與脊椎關節病。","C":"正解。HLA-Cw*06與乾癬。","D":"HLA-DR4與RA。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"111020-35":{"quick":"脊椎關節炎最起始之病灶為肌腱附著點（enthesis）。","detail":{"background":"**脊椎關節病變（spondyloarthritis）之原發病灶為『肌腱／韌帶附著於骨之附著點（enthesis）』的發炎（enthesitis）**，再致新骨形成（syndesmophyte、骨贅）；不同於RA以滑膜（synovium）為主要起始。故B。","options":{"A":"軟骨非起始。","B":"正解。附著點（enthesis）。","C":"硬骨非起始。","D":"滑膜為RA起始。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"102030-10":{"quick":"痛風病人之高血壓治療最應避免利尿劑（升尿酸）。","detail":{"background":"**thiazide／loop利尿劑減少尿酸排泄、升高血尿酸→誘發痛風**，故痛風病人高血壓用藥應避免利尿劑。**losartan（ARB）有輕度促尿酸排泄、為痛風病人較佳選擇**；鈣離子阻斷劑、β阻斷劑相對中性。故B。","options":{"A":"鈣離子阻斷劑相對中性。","B":"正解。利尿劑升尿酸，應避免。","C":"β阻斷劑相對中性。","D":"ARB（losartan）有降尿酸作用，較佳。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"102110-78":{"quick":"急性單關節炎（海鮮啤酒後）鑑別，最有幫助為關節液分析。","detail":{"background":"**急性單關節炎鑑別（痛風 vs 假性痛風 vs 感染性關節炎）之黃金標準為『關節液分析』**：偏光顯微鏡看結晶（痛風＝『負雙折射』針狀尿酸鈉；CPPD＝『正雙折射』菱形）＋細胞數與培養（排除化膿性）。**急性發作時血尿酸可正常，不能據以確診**。故B（關節液分析）最有幫助。","options":{"A":"急性發作血尿酸可正常，不可靠。","B":"正解。關節液分析（結晶＋培養）。","C":"X光早期常正常。","D":"CRP僅反映發炎、非特異。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106080-36":{"quick":"肩部、subdeltoid bursa壓痛、影像鈣化沉積→鈣化（apatite）晶體引發之關節／滑囊炎。","detail":{"background":"**鈣磷灰石（calcium apatite/hydroxyapatite）沉積**好發於肩部肌腱／滑囊（如『鈣化性肌腱炎』、Milwaukee shoulder），**X光／MRI見鈣化沉積**，急性發作劇痛；apatite結晶極小、需特殊染色（alizarin red）。痛風（尿酸結晶）、RA（RF高、對稱小關節）、冰凍肩（無鈣化沉積）不符影像鈣化。故C。","options":{"A":"痛風為尿酸結晶。","B":"RA為對稱小關節、RF高。","C":"正解。apatite晶體（鈣化性肌腱炎）。","D":"冰凍肩無鈣化沉積。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"107080-28":{"quick":"急性痛風發作時『不應同時開始降尿酸藥』；B錯誤。","detail":{"background":"**痛風治療**：急性發作不治療約3–10天自癒；急性期以NSAID／colchicine／類固醇消炎；**急性發作時『不應同時開始（或調整）降尿酸藥（如allopurinol）』，因尿酸快速波動會延長／惡化發作**（應待緩解後再起始並以colchicine預防發作）。**allopurinol於HLA-B*5801帶因者易致嚴重皮膚過敏（SJS/TEN）**；febuxostat腎功能不全可用。故B錯誤。","options":{"A":"不治療3–10天可自癒，正確。","B":"正解（錯誤）。急性期不應同時開始降尿酸藥。","C":"HLA-B*5801者allopurinol過敏風險高，正確。","D":"febuxostat腎不全可用，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108030-29":{"quick":"HPRT基因位於X染色體，突變致高尿酸血症；A正確。","detail":{"background":"**高尿酸血症成因**：**HPRT（hypoxanthine-guanine phosphoribosyltransferase）基因位於『X染色體』，缺乏（Lesch-Nyhan）致嘌呤再利用障礙、尿酸過量生成**；尿酸由『嘌呤代謝』產生、主要經腎排泄（非肝代謝）；利尿劑『減少』尿酸排泄而『升高』血尿酸；AML化療致腫瘤溶解高尿酸應用『allopurinol/rasburicase』預防（非benzbromarone促排泄藥，後者於大量尿酸生成時反增結石風險）。故A正確。","options":{"A":"正解。HPRT在X染色體，突變致高尿酸。","B":"尿酸非肝代謝為主，錯誤。","C":"利尿劑減少排泄、升尿酸，錯誤。","D":"TLS預防用allopurinol/rasburicase，非benzbromarone，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108030-30":{"quick":"CPPD（假性痛風）好發『老年』非年輕男性；B錯誤。","detail":{"background":"**CPPD（焦磷酸鈣沉積，假性痛風）好發『老年』**（年輕發病要查代謝病如血色素沉著、副甲狀腺亢進、低鎂），臨床似急性痛風，關節液見**正雙折射菱形結晶**；**鈣磷灰石（apatite）沉積在慢性腎衰合併高血磷者更常見**；CPPD與apatite急性發作皆可用colchicine／類固醇。故B（好發年輕男性）錯誤。","options":{"A":"CPPD急性發作似急性痛風，正確。","B":"正解（錯誤）。CPPD好發老年，非年輕男性。","C":"apatite沉積在慢性腎衰高血磷者常見，正確。","D":"皆可用colchicine/類固醇，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108080-28":{"quick":"急性痛風發作時測血尿酸『常正常』、對診斷幫助有限；C錯誤。","detail":{"background":"**痛風**：急性發作好發『下肢』（第一蹠趾關節＝podagra）、男性多於女性。**高尿酸血症雖為主因，但『急性發作時血尿酸可正常甚至偏低』（尿酸沉積入關節），故急性期測血尿酸對診斷幫助有限**——確診靠關節液結晶。關節液白血球可數千至數萬。故C錯誤。","options":{"A":"急性痛風下肢多於上肢，正確。","B":"男性多於女性，正確。","C":"正解（錯誤）。急性期血尿酸可正常，診斷幫助有限。","D":"關節液白血球可數千至數萬，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"110080-29":{"quick":"高血壓服利尿劑者夜間大腳趾足踝劇痛→疑痛風，關節液檢查最有幫助。","detail":{"background":"利尿劑使用者**夜間突發第一蹠趾／足踝紅腫劇痛＝典型痛風發作**。**確診最有幫助為『關節液檢查』**（偏光顯微鏡見負雙折射針狀尿酸鈉結晶、並排除化膿性），急性期血尿酸可正常。故B。","options":{"A":"敗血症評估非首要（除非疑化膿）。","B":"正解。關節液檢查。","C":"抗心磷脂抗體無關。","D":"血尿酸急性期可正常，較不可靠。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"111020-31":{"quick":"急性痛風關節炎發作時血中尿酸可在正常範圍內；B最適當。","detail":{"background":"**痛風**：好發中年男性，**女性停經後痛風風險『上升』（雌激素促尿酸排泄，停經後失去保護）**；**急性發作時血尿酸可正常（B正確）**；**關節超音波可見『雙軌徵（double contour sign）』與尿酸結晶沉積（比X光早）**；腎功能不全者急性發作『可用』glucocorticoid（口服或關節內）。故B最適當。","options":{"A":"女性停經後痛風『上升』，非下降，錯誤。","B":"正解。急性發作血尿酸可正常。","C":"超音波可見尿酸結晶，錯誤。","D":"腎不全者可用類固醇治急性痛風，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112080-04":{"quick":"急性痛風（負雙折射針狀結晶）發作時，最不恰當為起始febuxostat（降尿酸藥）。","detail":{"background":"關節液見**『針狀、強烈負雙折射』結晶並被白血球吞噬＝痛風（尿酸鈉）**。**急性發作之消炎用colchicine／NSAID（ibuprofen）／類固醇（prednisolone）；但『febuxostat等降尿酸藥不應於急性期起始』（尿酸波動延長發作）→最不恰當**。故B。","options":{"A":"colchicine為急性期用藥。","B":"正解（最不恰當）。急性期不應起始febuxostat。","C":"ibuprofen（NSAID）為急性期用藥。","D":"prednisolone為急性期選項。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113020-31":{"quick":"CPPD常侵膝關節、關節液見菱形『正』雙折射結晶；C最適當。","detail":{"background":"**焦磷酸鈣沉積（CPPD）**：**常侵『膝』關節，偏光顯微鏡見『菱形（rhomboid）或棒狀、正（弱）雙折射』結晶**；好發老年（年輕發病查代謝病）；與**原發性副甲狀腺亢進、血色素沉著、低鎂相關**；**X光見軟骨鈣化（chondrocalcinosis），但痛風關節亦偶可見**。故C最適當。","options":{"A":"CPPD好發老年，非年輕，錯誤。","B":"與副甲狀腺亢進等代謝病相關，錯誤。","C":"正解。侵膝、菱形正雙折射結晶。","D":"chondrocalcinosis非CPPD專屬（痛風偶見），此處C更適當。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113020-58":{"quick":"無症狀高尿酸血症『不需』一律積極降尿酸；D最不適當。","detail":{"background":"**高尿酸血症**：與代謝症候群相關；急性大幅升高（如腫瘤溶解）可致急性腎衰；長期偏高可致尿酸結石與痛風。**但『無症狀高尿酸血症』一般『不』建議一律積極藥物降尿酸**（除非極高、反覆結石、化療前等特定情況）；多以生活型態調整為主。故D最不適當。","options":{"A":"代謝症候群常伴高尿酸，正確。","B":"急性大幅升高可致急性腎衰，正確。","C":"長期偏高可致結石，正確。","D":"正解（最不適當）。無症狀者不需一律積極降尿酸。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"115020-33":{"quick":"年輕族群有CPPD常合併其他代謝疾病；B最適當。","detail":{"background":"**CPPD與鈣磷灰石（CAD）結晶關節炎**：CPPD好發『老年』，**『年輕』發病須查潛在代謝病（副甲狀腺亢進、血色素沉著症、低血鎂、低血磷酸酶症）**；偏光顯微鏡可區分CPPD（菱形、正雙折射）與尿酸（針狀、負雙折射），但**apatite結晶極小、一般偏光顯微鏡『不易』看到（需alizarin red染色）**；關節內有CAD結晶不一定都引起急性發作。故B最適當。","options":{"A":"CPPD好發老年，非年輕，錯誤。","B":"正解。年輕CPPD常合併代謝疾病。","C":"apatite一般偏光顯微鏡不易見，錯誤。","D":"有CAD結晶未必都急性發作，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105020-11":{"quick":"膝關節液黃色透明、黏稠度高、白血球250→退化性關節炎（非發炎性）。","detail":{"background":"**關節液分級**：**退化性關節炎（OA）為『非發炎性』關節液：清澈、黏稠度高（玻尿酸完整）、白血球<2000（多<數百）**；發炎性（RA、痛風）白血球2000–50000；化膿性>50000。本例黏稠、WBC 250→OA。痛風／細菌性／乾癬性為發炎性。故B。","options":{"A":"痛風為發炎性、有結晶。","B":"正解。退化性關節炎（非發炎性液）。","C":"細菌性關節炎WBC極高。","D":"乾癬性為發炎性。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"107080-29":{"quick":"復發性多軟骨炎大多數會合併關節炎；B正確。","detail":{"background":"**復發性多軟骨炎（relapsing polychondritis）**：反覆軟骨發炎（耳殼、鼻、氣管支氣管、關節周圍），**大多數合併『關節炎』**（非侵蝕、遊走性）；約三分之一合併其他自體免疫病（非90%）；RF多陰性；**治療以類固醇為主（非anti-TNF為主）**。故B正確。","options":{"A":"RF多陰性，錯誤。","B":"正解。大多合併關節炎。","C":"約1/3合併其他自體免疫病，非90%，錯誤。","D":"以類固醇為主，非anti-TNF，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108080-29":{"quick":"肥厚性骨關節病變（hypertrophic osteoarthropathy）與肺癌相關；A正確。","detail":{"background":"**非關節炎疾病合併關節病變**：**肥厚性骨關節病變（HOA，含杵狀指、長骨骨膜新生骨、關節痛）與『肺癌』等胸腔疾病相關**（副腫瘤）；色素絨毛結節性滑膜炎（PVNS）為良性增生（非糖尿病）；血友病性關節病與凝血因子缺乏（非CKD）；神經病變性關節（Charcot）與糖尿病／脊髓癆相關（非腕隧道）。故A正確。","options":{"A":"正解。肥厚性骨關節病與肺癌相關。","B":"PVNS與糖尿病無關，錯誤。","C":"血友病關節病與凝血因子缺乏，非CKD，錯誤。","D":"Charcot關節與糖尿病相關，非腕隧道，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"109020-29":{"quick":"退化性關節炎為非發炎性，CRP/ESR通常正常；D稱常上升，錯誤。","detail":{"background":"**退化性關節炎（OA）**：好發年長者，侵犯**DIP（Heberden結節）、PIP、髖、膝、第一腕掌與脊椎**；X光見**關節腔狹窄、骨刺（osteophyte）、軟骨下硬化，『無骨侵蝕（erosion）』**；**為『非發炎性』，CRP/ESR通常正常**（與RA不同）。故D錯誤。","options":{"A":"好發年長者，正確。","B":"侵犯DIP、髖、膝，正確。","C":"關節腔狹窄但無骨侵蝕，正確。","D":"正解（錯誤）。OA為非發炎性，CRP/ESR通常正常。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"109080-35":{"quick":"疑纖維肌痛症之確診，最適當為問卷評估疼痛區與全身症狀。","detail":{"background":"**纖維肌痛症（fibromyalgia）為臨床診斷，無特異實驗或影像**；採**『廣泛疼痛指數（Widespread Pain Index, WPI）＋症狀嚴重度量表（SSS）』之問卷評估（ACR 2010/2016準則）**，並排除其他病。再驗RF、做MRI、荷爾蒙對確診幫助不大（皆正常）。故A。","options":{"A":"正解。問卷評估疼痛區與全身症狀。","B":"頸椎MRI對診斷幫助不大。","C":"重驗RF無助。","D":"女性荷爾蒙檢查無助。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112080-31":{"quick":"單純纖維肌痛症之CRP與ESR皆正常。","detail":{"background":"**纖維肌痛症為『非發炎性』之中樞疼痛敏感化疾病，無組織發炎，故CRP與ESR皆『正常』**；若發炎指數上升須找其他發炎／感染／腫瘤病因。故D。","options":{"A":"皆上升不符。","B":"CRP上升不符。","C":"ESR上升不符。","D":"正解。CRP與ESR皆正常。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112080-35":{"quick":"OA相關敘述之錯誤項（本題答B或D均給分）。","detail":{"background":"**退化性關節炎（OA）**：手部與髖關節OA遺傳性較強、膝關節與機械負荷/肥胖較相關；軟骨第二型膠原被基質金屬蛋白酶（MMPs）降解；華人髖OA較白種人少見。**並非『90%以上OA患者都必須先用NSAID』**（治療階梯先非藥物：減重、運動、外用、acetaminophen）。考選部公告本題答B或D均給分。","options":{"A":"手/髖OA遺傳性較強，正確。","B":"給分項。第二型膠原被MMPs破壞（敘述正確，但列入給分）。","C":"華人髖OA較少見，正確。","D":"給分項（原答案）。非90%以上須先用NSAID。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113070-32":{"quick":"膝關節液黏稠、WBC 100、以單核細胞為主→退化性關節炎。","detail":{"background":"**退化性關節炎（OA）關節液為非發炎性：黏稠、清澈、白血球少（<2000，多<數百）、以單核細胞為主**。本例80歲、WBC 100、單核為主→OA。反應性、類風濕為發炎性（白血球較高、嗜中性球為主）；化膿性白血球極高。故A。","options":{"A":"正解。退化性關節炎。","B":"反應性關節炎為發炎性。","C":"RA為發炎性、嗜中性球多。","D":"化膿性關節炎WBC極高。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"114020-31":{"quick":"退化性關節炎危險因子包括高齡、遺傳易感與肥胖；B最適當。","detail":{"background":"**OA危險因子：年齡增長、遺傳易感性、肥胖、女性、關節創傷／過度使用**。好發部位為**DIP、PIP、第一腕掌、髖、膝（『非』MCP與腕關節，後者為RA）**；X光見關節腔狹窄與骨刺但**『無骨侵蝕』**；**TNF非OA主要機轉，anti-TNF對OA無效**。故B最適當。","options":{"A":"OA好發DIP/髖/膝，非MCP/腕，錯誤。","B":"正解。危險因子含高齡、遺傳、肥胖。","C":"OA無骨侵蝕，錯誤。","D":"anti-TNF對OA無效，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"115020-74":{"quick":"月狀骨（lunate）異常之X光→缺血性壞死（Kienböck病）。","detail":{"background":"**月狀骨（lunate）之缺血性（無血管）壞死＝Kienböck病**：X光見月狀骨硬化（密度增高）、塌陷、碎裂，致腕痛與活動受限，與反覆微創傷／血供不良有關。退化性、類風濕、痛風性關節炎不以單一月狀骨壞死表現。故D。","options":{"A":"OA為關節腔狹窄骨刺。","B":"RA為對稱性侵蝕。","C":"痛風為結晶性關節炎。","D":"正解。缺血性壞死（Kienböck病）。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"102030-36":{"quick":"反覆午後高燒、鮭魚色皮疹、肝脾腫、ferritin極高、ANA/RF陰性→成人型史迪爾氏病。","detail":{"background":"**成人型史迪爾氏病（adult-onset Still's disease）為自體發炎性疾病**：**每日『弛張熱（quotidian fever）』、鮭魚色（salmon-colored）一過性皮疹、關節痛、咽痛、肝脾／淋巴腫、白血球與『ferritin顯著升高』、ANA與RF陰性**（為排除性診斷，Yamaguchi準則）。登革、瘧疾、癌性發燒之型態與血清不符。故B。","options":{"A":"登革熱不符反覆兩個月。","B":"正解。成人型史迪爾氏病。","C":"瘧疾有寄生蟲血症。","D":"癌性發燒無此皮疹/ferritin型態。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"109080-31":{"quick":"結節病為肉芽腫性發炎，主要機轉為CD4 T淋巴球過度活化；A正確。","detail":{"background":"**結節病（sarcoidosis）為多系統『非乾酪性肉芽腫』發炎病，致病以『CD4+ T淋巴球（Th1）過度活化』為主**（BAL之CD4/CD8比值『升高』）。**最常侵犯『肺』（雙側肺門淋巴腺腫）**，可致肺高壓；肉芽腫之巨噬細胞產生1α-hydroxylase致**高鈣血症**（非因ACE升高致高鈣）；治療以**類固醇**為主（非IL-1抑制劑）。故A正確。","options":{"A":"正解。CD4 T細胞過度活化之肉芽腫病。","B":"最常侵犯肺，非最少，錯誤。","C":"高鈣因活化維生素D，非ACE致高鈣，錯誤。","D":"以類固醇為主，非IL-1抑制劑，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"110080-44":{"quick":"結節病BAL之CD4/CD8比值『上升』；D稱下降，錯誤。","detail":{"background":"**結節病（sarcoidosis）**：致病與T淋巴球及巨噬細胞活化有關；急性期血清**ACE升高**；典型**雙側肺門淋巴腺腫＋『非乾酪性肉芽腫』**；**支氣管肺泡灌洗（BAL）之淋巴球比例增高且『CD4/CD8比值上升』（常>3.5）**——故D（稱CD4/CD8下降）錯誤。","options":{"A":"與T淋巴球/巨噬細胞活化有關，正確。","B":"急性期ACE升高，正確。","C":"雙側肺門腫＋非乾酪肉芽腫，正確。","D":"正解（錯誤）。BAL之CD4/CD8比值『上升』，非下降。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"111080-31":{"quick":"結節病典型病理為非乾酪性肉芽腫（noncaseating granuloma）；C最適當。","detail":{"background":"**結節病**：致病以**T細胞（CD4 Th1）活化形成肉芽腫**（非B細胞自體抗體）；**肺部侵犯最常見（非僅43%、皮膚非>95%）**；**典型病理為『非乾酪性（noncaseating）肉芽腫』**；高鈣血症因肉芽腫活化維生素D（並非>90%病人都有高鈣）。故C最適當。","options":{"A":"以T細胞活化為主，非B細胞自體抗體，錯誤。","B":"肺侵犯最常見，皮膚非>95%，錯誤。","C":"正解。非乾酪性肉芽腫。","D":"高鈣非>90%病人皆有，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"111080-34":{"quick":"非『單一基因致發炎體過度活化』者為SLE。","detail":{"background":"**單基因自體發炎症候群（inflammasome病）：家族性地中海熱（FMF，MEFV/pyrin）、Muckle-Wells症候群與家族性冷自體發炎症候群（FCAS，NLRP3/cryopyrin）**等，以IL-1過度分泌、反覆發燒為特徵。**SLE為多基因『自體免疫』病（自體抗體、適應性免疫），非單基因發炎體病**。故A。","options":{"A":"正解。SLE為多基因自體免疫，非單基因發炎體病。","B":"FMF為pyrin基因，屬發炎體病。","C":"MWS為NLRP3，屬發炎體病。","D":"FCAS為NLRP3，屬發炎體病。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"112020-34":{"quick":"不屬於自體發炎疾病者為肉芽腫性多血管炎（GPA）。","detail":{"background":"**自體發炎疾病（autoinflammatory，先天免疫／發炎體驅動之反覆發燒）包含：TRAPS（TNF受體相關週期熱）、家族性地中海熱（FMF）、新生兒多系統發炎病（NOMID/CINCA）**等。**肉芽腫性多血管炎（GPA）為ANCA相關『血管炎』（自體免疫），非自體發炎症候群**。故C。","options":{"A":"TRAPS為自體發炎病。","B":"FMF為自體發炎病。","C":"正解。GPA為血管炎，非自體發炎病。","D":"NOMID為自體發炎病。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113070-31":{"quick":"IgG4相關疾病可侵眼周致腫脹，常合併過敏與嗜伊紅球增多；A最適當。","detail":{"background":"**IgG4相關疾病（IgG4-RD）**：多器官腫塊樣纖維化（自體免疫胰臟炎、淚腺唾液腺腫＝Mikulicz、後腹腔纖維化等），**可侵眼周（periocular）造成腫脹，常合併過敏體質與嗜伊紅球增多**；病理為**『席紋狀纖維化（storiform fibrosis）、淋巴漿細胞浸潤（含大量IgG4+漿細胞與B淋巴球）、閉塞性靜脈炎』**；多數血清IgG4升高但與嚴重度非絕對正相關；治療對類固醇反應佳（非急性器官破壞為主）。故A最適當。","options":{"A":"正解。可侵眼周，合併過敏與嗜伊紅球增多。","B":"組織可見大量B淋巴球浸潤，錯誤。","C":"血中IgG4與嚴重度非絕對正相關，錯誤。","D":"多為慢性纖維化、對類固醇反應佳，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"114020-32":{"quick":"遺傳性自體發炎病可因pyrin、p55 TNF受體或NLRP3基因突變引起；A最適當。","detail":{"background":"**遺傳性自體發炎病**：**FMF（pyrin/MEFV）、TRAPS（p55 TNF受體/TNFRSF1A）、CAPS（NLRP3/cryopyrin）**等皆因相關基因突變致**發炎體活化、IL-1β過度分泌→反覆發燒與漿膜炎/關節炎**；遺傳型式有顯性與隱性（非均隱性）；**IL-1抑制劑（anakinra/canakinumab）治療效果『良好』**（非不佳）。故A最適當。","options":{"A":"正解。可因pyrin/p55 TNF受體/NLRP3突變引起。","B":"遺傳型式非均為隱性，錯誤。","C":"主要為IL-1（非IL-2）過度分泌，錯誤。","D":"IL-1抑制劑治療效果良好，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"103030-42":{"quick":"食物過敏為IgE依賴（IgE-dependent）；C最正確。","detail":{"background":"**蕁麻疹（urticaria）機轉多元**：**食物與藥物（如penicillin）之即發型過敏多為『IgE依賴（第I型過敏，肥大細胞去顆粒釋放組織胺）』**；顯影劑反應多為『類過敏（anaphylactoid，非IgE、直接肥大細胞去顆粒）』；阿斯匹靈／NSAID經抑制COX致白三烯增加（非補體依賴）。故C正確。","options":{"A":"顯影劑多為非IgE類過敏，錯誤。","B":"NSAID經COX/白三烯機轉，非補體依賴，錯誤。","C":"正解。食物過敏為IgE依賴。","D":"抗生素過敏多為IgE型（即發），非免疫複合物為主，錯誤。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"103030-44":{"quick":"主要由自體反應性T淋巴球引起之自體免疫傷害為第1型糖尿病。","detail":{"background":"**自體免疫傷害機轉**：**第1型糖尿病為『T細胞媒介』（自體反應性T淋巴球破壞胰島β細胞）**；重症肌無力（抗ACh受體）、Goodpasture（抗GBM抗體）、Graves（抗TSH受體刺激抗體）皆為『抗體（B細胞）媒介』。故A。","options":{"A":"正解。第1型糖尿病為T細胞媒介。","B":"重症肌無力為抗體媒介。","C":"Goodpasture為抗GBM抗體。","D":"Graves為刺激性抗體。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105020-33":{"quick":"與FKBP-12結合、減少IL-2生成之免疫抑制劑為tacrolimus。","detail":{"background":"**tacrolimus（FK506）與『FKBP-12』結合，抑制calcineurin→阻斷NFAT→減少IL-2生成**（抑制T細胞活化）；**cyclosporine與cyclophilin結合（亦抑calcineurin）**；**sirolimus（rapamycin）亦與FKBP-12結合但抑制『mTOR』（非calcineurin/IL-2生成）**；MMF抑制IMPDH（嘌呤合成）。故B。","options":{"A":"cyclosporine與cyclophilin結合。","B":"正解。tacrolimus與FKBP-12結合、減IL-2。","C":"MMF抑制嘌呤合成。","D":"sirolimus與FKBP-12結合但抑mTOR。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105100-33":{"quick":"最易造成移植後糖尿病之免疫抑制劑為tacrolimus。","detail":{"background":"**移植後新發糖尿病（NODAT）以『tacrolimus』風險最高**（抑制胰島素分泌、致β細胞毒性，比cyclosporine明顯），類固醇亦增風險。MMF、sirolimus致糖尿病風險較低（sirolimus主要高血脂/蛋白尿）。故B。","options":{"A":"cyclosporine致糖尿病風險低於tacrolimus。","B":"正解。tacrolimus移植後糖尿病風險最高。","C":"MMF風險低。","D":"sirolimus主要致高血脂/蛋白尿。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"105100-35":{"quick":"持續性血管炎性蕁麻疹可用hydroxychloroquine輔助治療；D最正確。","detail":{"background":"**蕁麻疹／血管性水腫治療**：第一線為**第二代H1抗組織胺**（可加量）；外用類固醇對蕁麻疹『無效』；全身類固醇用於急性嚴重、慢性蕁麻疹『不』長期使用；**『蕁麻疹性血管炎（urticarial vasculitis）』可用hydroxychloroquine、dapsone、秋水仙素等輔助**。故D最正確。","options":{"A":"外用類固醇對急性蕁麻疹無效，錯誤。","B":"止癢以H1（非H2）為主，錯誤。","C":"全身類固醇非慢性蕁麻疹長期用藥，錯誤。","D":"正解。蕁麻疹性血管炎可用hydroxychloroquine輔助。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"106020-39":{"quick":"反覆慢性蕁麻疹追病因，檢測抗過敏原特異性IgE效價最有幫助。","detail":{"background":"**慢性蕁麻疹病因追查**：若懷疑過敏原誘發，**檢測『過敏原特異性IgE（allergen-specific IgE）』或皮膚點刺可協助找出誘因**（第I型IgE媒介）。補體、總嗜伊紅球數、cryoglobulin對一般慢性蕁麻疹病因幫助較小（除非疑血管炎/系統病）。本題答C（過敏原特異性IgE）。","options":{"A":"補體值對一般蕁麻疹病因幫助小。","B":"總嗜伊紅球數非特異。","C":"正解。過敏原特異性IgE效價。","D":"cryoglobulin針對血管炎性蕁麻疹。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"107020-12":{"quick":"anti-TNF（adalimumab）最不建議用於治療SLE。","detail":{"background":"**anti-TNF（adalimumab、etanercept、infliximab）核可用於RA、僵直性脊椎炎、乾癬性關節炎、克隆氏症等；『最不建議用於SLE』**——anti-TNF可『誘發』藥物性狼瘡（產生ANA/anti-dsDNA），於SLE可能惡化。故D。","options":{"A":"Crohn's為anti-TNF適應症。","B":"僵直性脊椎炎為適應症。","C":"RA為適應症。","D":"正解。SLE最不建議用anti-TNF（可誘發狼瘡）。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"108030-24":{"quick":"移植後3個月新發糖尿病，最可能為tacrolimus所致。","detail":{"background":"**移植後新發糖尿病（NODAT）以鈣調磷酸酶抑制劑中之『tacrolimus』風險最高**（致胰島素分泌減少／β細胞毒性，明顯高於cyclosporine）。MMF、sirolimus、everolimus致糖尿病風險較低。故B。","options":{"A":"MMF風險低。","B":"正解。tacrolimus移植後糖尿病風險最高。","C":"sirolimus主要高血脂/蛋白尿。","D":"everolimus風險較低。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"109020-32":{"quick":"蜂螫後全身蕁麻疹＋呼吸困難＋低血壓＝過敏性休克→優先肌肉注射epinephrine。","detail":{"background":"**過敏性休克（anaphylaxis）之第一線、救命用藥為『腎上腺素（epinephrine）肌肉注射（大腿前外側，0.3–0.5 mg）』**，必要時重複；抗組織胺（diphenhydramine）、類固醇（methylprednisolone）、支氣管擴張劑為『輔助』，不可取代且不應優先於epinephrine。故D。","options":{"A":"類固醇為輔助、起效慢。","B":"抗組織胺為輔助。","C":"albuterol為支氣管症狀輔助。","D":"正解。優先肌注epinephrine。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"109080-29":{"quick":"移植抗排斥藥副作用配對錯誤：sirolimus為高血脂/蛋白尿，非高尿酸血症；D。","detail":{"background":"**移植免疫抑制劑副作用**：類固醇—骨質疏鬆、高血糖；**cyclosporine—腎毒性、高血壓、『高尿酸血症』、齒齦增生、多毛**；tacrolimus—移植後糖尿病、神經毒性；**sirolimus—『高血脂、蛋白尿、口腔潰瘍、傷口癒合不良』（非高尿酸血症）**。故D配對錯誤。","options":{"A":"類固醇—骨質疏鬆，正確。","B":"cyclosporine—腎毒性，正確。","C":"tacrolimus—移植後糖尿病，正確。","D":"正解（錯誤）。sirolimus為高血脂/蛋白尿，非高尿酸血症。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"111080-24":{"quick":"作用於T細胞活化『共刺激（costimulatory）路徑』之免疫抑制劑為belatacept。","detail":{"background":"**belatacept（CTLA-4-Ig融合蛋白）阻斷T細胞活化之『共刺激訊號（CD80/86–CD28）』**，用於腎移植維持免疫抑制。tacrolimus（calcineurin）、MMF（嘌呤合成）、sirolimus（mTOR）作用機轉不同，非共刺激路徑。故D。","options":{"A":"tacrolimus抑calcineurin。","B":"MMF抑嘌呤合成。","C":"sirolimus抑mTOR。","D":"正解。belatacept阻斷共刺激路徑。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"113070-30":{"quick":"移植抗排斥藥副作用配對錯誤：cyclosporine為『高』尿酸血症，非低尿酸血症；B。","detail":{"background":"**cyclosporine副作用：腎毒性、高血壓、『高尿酸血症（可誘發痛風）』、齒齦增生、多毛、高血脂**——故B（環孢靈—低尿酸血症）錯誤。類固醇—骨鬆；tacrolimus—移植後糖尿病；sirolimus—蛋白尿，皆正確。故B配對錯誤。","options":{"A":"類固醇—骨質疏鬆，正確。","B":"正解（錯誤）。cyclosporine為高尿酸血症，非低尿酸。","C":"tacrolimus—移植後糖尿病，正確。","D":"sirolimus—蛋白尿，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"114020-25":{"quick":"移植後改藥3週後口腔潰瘍、蛋白尿、高LDL→sirolimus所致。","detail":{"background":"**sirolimus（mTOR抑制劑）副作用：『蛋白尿、高血脂（高LDL/三酸甘油脂）、口腔潰瘍（口瘡）、傷口癒合不良、間質性肺炎、骨髓抑制』**。本例口腔潰爛＋蛋白尿＋高LDL高度符合sirolimus。cyclosporine／tacrolimus主為腎毒性／糖尿病；MMF主為腸胃與骨髓抑制。故D。","options":{"A":"cyclosporine主為腎毒性。","B":"tacrolimus主為糖尿病/神經毒性。","C":"MMF主為腸胃/骨髓抑制。","D":"正解。sirolimus（蛋白尿、高血脂、口瘡）。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}},"114070-05":{"quick":"cyclosporine抑制T細胞IL-2生成（非直接抑制巨噬細胞IL-1）；B錯誤。","detail":{"background":"**免疫抑制劑**：Azathioprine抑制嘌呤合成→抑制骨髓；**cyclosporine與cyclophilin結合抑制calcineurin→阻斷『T細胞IL-2』生成（非直接抑制巨噬細胞產生IL-1）**；OKT3（anti-CD3）致細胞激素釋放（發燒、寒顫、低血壓）；脈衝類固醇可致高血糖、高血壓、失眠。故B錯誤。","options":{"A":"Azathioprine抑制骨髓，正確。","B":"正解（錯誤）。cyclosporine抑制T細胞IL-2，非直接抑巨噬細胞IL-1。","C":"OKT3致細胞激素釋放症候群，正確。","D":"脈衝類固醇可致高血糖/高血壓/失眠，正確。"},"sources":["Harrison 21e","Kelley & Firestein's Rheumatology／ACR・EULAR 指引"]}}},TO=["類風濕性關節炎（診斷/anti-CCP/RF/DMARD/生物製劑）", "全身性紅斑狼瘡（分類準則/自體抗體/狼瘡腎炎/治療/懷孕）", "抗磷脂症候群與自體抗體・HLA關聯", "全身性硬化症與混合結締組織病（硬皮/CREST/雷諾/MCTD）", "乾燥症（Sjögren）", "發炎性肌病（皮肌炎/多發性肌炎/包涵體肌炎）", "血管炎（ANCA相關/PAN/GCA/Takayasu/HSP/PMR/冷凝球蛋白）", "脊椎關節病變（僵直性脊椎炎/乾癬性/反應性/HLA-B27）", "痛風與結晶性關節炎（gout/CPPD/apatite/高尿酸）", "退化性關節炎與軟組織風濕（OA/纖維肌痛/復發性多軟骨炎）", "自體發炎症候群、結節病與IgG4相關疾病、成人型Still氏病", "免疫抑制劑與生物製劑、移植免疫與過敏免疫學總論"],LEC={"全身性紅斑狼瘡（分類準則/自體抗體/狼瘡腎炎/治療/懷孕）":{"title":"全身性紅斑狼瘡（SLE）","html":"<h4>一、臨床與分類準則</h4>\n<p>年輕女性、對稱<b>小關節痛、口腔潰瘍、光敏、雷諾、發燒、血球低</b>。準則組合常見：<b>ANA＋、anti-dsDNA 升、蛋白尿/cellular casts、血小板低</b>。<b>ANA 敏感度最高（篩檢）</b>；神經精神症狀<b>最常見＝認知功能障礙</b>。</p>\n<h4>二、自體抗體</h4>\n<ul>\n<li><b>anti-dsDNA＝狼瘡腎炎最相關、可當活性指標</b>。<b>anti-phospholipid＝習慣性流產/血栓</b>。</li>\n<li>發燒＋水腫＋蛋白尿/RBC cast＋ANA＋→狼瘡腎炎，驗 anti-dsDNA；<b>FSGS 不是</b>狼瘡腎炎分型。</li>\n</ul>\n<h4>三、治療與懷孕</h4>\n<ul>\n<li><b>嚴重第四型狼瘡腎炎</b>誘導＝<b>cyclophosphamide 或 mycophenolate（MMF）</b>；併腎功能不全者<b>cyclosporine 最不適用</b>（腎毒）。</li>\n<li>SLE＋抗心磷脂抗體＋首次 DVT→加 <b>warfarin（INR 2–3）</b>。</li>\n<li>穩定期計畫懷孕→<b>維持 hydroxychloroquine</b> 不需改變。<b>anti-TNF 最不建議用於 SLE</b>。</li>\n</ul>"},"血管炎（ANCA相關/PAN/GCA/Takayasu/HSP/PMR/冷凝球蛋白）":{"title":"血管炎","html":"<h4>一、ANCA 相關血管炎</h4>\n<ul>\n<li><b>GPA（Wegener 肉芽腫）</b>：慢性鼻竇炎/鼻黏膜潰瘍出血＋肺多發結節/咳血＋腎；<b>cANCA / anti-PR3</b>。ANCA 最常出現於 GPA。</li>\n<li><b>EGPA（Churg-Strauss）</b>：<b>氣喘＋嗜伊紅球增多（如 27%）＋紫斑</b>，驗 ANCA。</li>\n</ul>\n<h4>二、大血管與其他</h4>\n<ul>\n<li><b>巨細胞動脈炎（顳動脈炎）</b>：常與<b>風濕性多肌痛（PMR）</b>共發；可用 <b>tocilizumab（IL-6）</b>。</li>\n<li><b>HSP（IgA 血管炎）</b>＝免疫複合物堆積血管壁。<b>Behçet</b>＝反覆口腔＋生殖器潰瘍＋葡萄膜炎、<b>pathergy test</b>。</li>\n<li><b>冷凝球蛋白血症</b>：<b>HCV</b>＋下肢壓痛紫斑＋周邊神經病變＋蛋白尿→驗 cryoglobulin。眼眶紫斑＋肝脾腫＋多系統＝<b>類澱粉症</b>。</li>\n</ul>"},"免疫抑制劑與生物製劑、移植免疫與過敏免疫學總論":{"title":"免疫抑制劑、生物製劑與過敏免疫學總論","html":"<h4>一、免疫抑制劑機轉與副作用（必考）</h4>\n<ul>\n<li><b>tacrolimus</b>：與 <b>FKBP-12 結合、減少 IL-2</b>；<b>最易移植後新發糖尿病</b>。<b>cyclosporine</b>：抑制 T 細胞 IL-2、<b>致高尿酸血症</b>。</li>\n<li><b>sirolimus（mTOR）</b>：高血脂、蛋白尿、口腔潰瘍（<b>非高尿酸</b>）。<b>belatacept</b>＝作用於 T 細胞<b>共刺激（costimulatory）</b>路徑。</li>\n</ul>\n<h4>二、過敏免疫</h4>\n<ul>\n<li><b>蕁麻疹/食物過敏＝IgE 依賴</b>；慢性蕁麻疹追病因驗特異性 IgE；血管炎性蕁麻疹可用 hydroxychloroquine。</li>\n<li><b>蜂螫過敏性休克</b>（蕁麻疹＋呼吸困難＋低血壓）→<b>優先肌肉注射 epinephrine</b>。</li>\n<li>第1型糖尿病＝<b>自體反應性 T 淋巴球</b>傷害。<b>anti-TNF 最不建議用於 SLE</b>。</li>\n</ul>"},"脊椎關節病變（僵直性脊椎炎/乾癬性/反應性/HLA-B27）":{"title":"脊椎關節病變（僵直性脊椎炎、乾癬性、反應性）","html":"<h4>一、僵直性脊椎炎（AS）</h4>\n<ul>\n<li>年輕男性、<b>下半夜下背痛＋晨僵>30 分、附著點炎（阿基里斯腱）、葡萄膜炎</b>；<b>女性較少、預後較好</b>。</li>\n<li>大多 <b>HLA-B27 陽性</b>，但一般人 B27+ 僅<b>少數</b>會發病（非 20%）。診斷最有幫助＝<b>X 光對稱性薦腸關節炎</b>。第一線藥＝<b>NSAIDs</b>；急性前葡萄膜炎首選<b>局部類固醇</b>。</li>\n</ul>\n<h4>二、乾癬性關節炎</h4>\n<p>乾癬皮膚/指甲變厚＋<b>遠端指間關節（DIP）炎、香腸指（dactylitis）</b>；HLA-Cw*06。</p>\n<h4>三、機轉</h4>\n<p>脊椎關節炎<b>最起始病灶＝肌腱附著點（enthesis）</b>。眼病變配對：<b>RA＝鞏膜炎、AS＝前葡萄膜炎</b>。</p>"},"痛風與結晶性關節炎（gout/CPPD/apatite/高尿酸）":{"title":"痛風與結晶性關節炎","html":"<h4>一、痛風（gout）</h4>\n<ul>\n<li>急性單關節炎（大腳趾、海鮮啤酒後/利尿劑），<b>關節液分析最有幫助</b>（負雙折射針狀結晶）；<b>急性發作時血尿酸可正常</b>。</li>\n<li>高血壓病人<b>最應避免利尿劑</b>（升尿酸）。<b>急性發作不可同時開始降尿酸藥</b>（febuxostat/allopurinol）。HPRT 基因（X 染色體）突變致高尿酸。<b>無症狀高尿酸不一律積極降尿酸</b>。</li>\n</ul>\n<h4>二、CPPD（假性痛風）與 apatite</h4>\n<ul>\n<li><b>CPPD</b>：好發<b>老年</b>、常侵<b>膝關節</b>、<b>菱形正雙折射結晶</b>；年輕族群有 CPPD 常合併代謝疾病。</li>\n<li><b>apatite（鈣化）</b>：肩部 subdeltoid bursa 鈣化沉積致急性疼痛。</li>\n</ul>"},"類風濕性關節炎（診斷/anti-CCP/RF/DMARD/生物製劑）":{"title":"類風濕性關節炎（RA）","html":"<h4>一、診斷</h4>\n<p>左右<b>對稱多關節炎</b>（PIP/MCP/腕，初期可單關節）；確診最重要＝<b>anti-CCP 抗體</b>。若 DIP 也受影響通常代表合併退化性關節炎。最常見<b>關節外表現＝骨質疏鬆</b>；HLA 相關性最高＝<b>HLA-DR4</b>。</p>\n<h4>二、治療階梯</h4>\n<ul>\n<li>第一線 DMARD＝<b>methotrexate</b>；<b>leflunomide＝抑制嘧啶（pyrimidine）合成</b>。</li>\n<li>傳統 DMARD 無效→加<b>生物製劑（anti-TNF / tocilizumab（IL-6））</b>。anti-TNF 療效佳，但可<b>誘發藥物性狼瘡</b>（ANA/anti-dsDNA 轉陽）→停 anti-TNF、改 <b>rituximab</b>。</li>\n<li>計畫懷孕：<b>hydroxychloroquine 與 sulfasalazine 可全程使用</b>。</li>\n</ul>"},"抗磷脂症候群與自體抗體・HLA關聯":{"title":"抗磷脂症候群與自體抗體・HLA 關聯","html":"<h4>一、抗磷脂症候群（APS）</h4>\n<ul>\n<li><b>最常見臨床表現＝深部靜脈栓塞（DVT）</b>；也常<b>血小板低下、反覆流產</b>。</li>\n<li>檢查：<b>aPTT 延長且混合試驗不矯正（lupus anticoagulant）</b>；<b>反覆胃腸道出血、抗血小板抗體對診斷最沒幫助</b>（APS 是血栓非出血）。</li>\n</ul>\n<h4>二、自體抗體與 HLA 配對（必考）</h4>\n<ul>\n<li><b>RA＝HLA-DR4（相關性最高）</b>。</li>\n<li>自體抗原配對：<b>多發性硬化症＝myelin basic protein</b>、<b>MCTD＝anti-U1RNP</b>、<b>進行性硬皮症＝topoisomerase I（Scl-70）</b>。</li>\n</ul>"},"全身性硬化症與混合結締組織病（硬皮/CREST/雷諾/MCTD）":{"title":"全身性硬化症與混合結締組織病","html":"<h4>一、全身性硬化症（硬皮症）</h4>\n<ul>\n<li><b>最常見初發症狀＝雷諾現象</b>；<b>最常侵犯內臟＝食道</b>。膠原大量產生主因細胞激素 <b>TGF-β</b>。</li>\n<li>早期間質性肺病變首選 <b>cyclophosphamide</b>。<b>瀰漫型</b>較易快速進展之間質性肺炎；<b>局限型</b>進展較緩。</li>\n</ul>\n<h4>二、CREST 與 MCTD</h4>\n<ul>\n<li><b>CREST（局限型）</b>：雷諾＋微血管擴張＋吞嚥障礙＋<b>anti-centromere（ANA centromere pattern）</b>。</li>\n<li><b>MCTD</b>：最有用血清標記＝<b>anti-U1 RNP</b>。原發性雷諾現象症狀通常<b>較輕</b>。</li>\n</ul>"},"退化性關節炎與軟組織風濕（OA/纖維肌痛/復發性多軟骨炎）":{"title":"退化性關節炎與軟組織風濕","html":"<h4>一、骨關節炎(OA)</h4>\n<ul>\n<li><b>退化性、非發炎</b>(ESR 正常)；負重關節(膝/髖)＋手 <b>Heberden(DIP)、Bouchard(PIP)結節</b>；晨僵 <30 分；活動後加重。</li>\n<li>X 光：<b>關節間隙不對稱變窄、骨刺、軟骨下硬化與囊腫</b>。治療：減重、運動、acetaminophen/局部 NSAID、關節置換。</li>\n</ul>\n<h4>二、纖維肌痛(fibromyalgia)</h4>\n<p>廣泛慢性疼痛＋多處壓痛點＋疲倦/睡眠障礙/腦霧；<b>發炎指標與影像正常</b>；治療運動、認知行為、duloxetine/pregabalin(非類固醇/非鴉片)。</p>\n<h4>三、復發性多軟骨炎</h4>\n<p>反覆軟骨發炎：<b>耳廓(不含耳垂)、鼻(鞍鼻)、氣管軟骨環(呼吸道塌陷)、關節</b>；可伴血管炎。治療類固醇。</p>\n<h4>★考點直擊</h4>\n<p>OA(間隙不對稱窄＋骨刺、ESR 正常) vs RA(對稱、晨僵>1hr、ESR 升、骨侵蝕)。耳廓紅腫不含耳垂＝復發性多軟骨炎。</p>"},"自體發炎症候群、結節病與IgG4相關疾病、成人型Still氏病":{"title":"自體發炎症候群、結節病、IgG4 相關疾病、成人型 Still 氏病","html":"<h4>一、成人型 Still 氏病（AOSD）</h4>\n<p>反覆<b>午後高燒、鮭魚色皮疹、肝脾腫、ferritin 極高、ANA/RF 陰性</b>。</p>\n<h4>二、結節病（Sarcoidosis）</h4>\n<p>肉芽腫性發炎、<b>CD4 T 淋巴球過度活化</b>、<b>非乾酪性肉芽腫</b>；BAL <b>CD4/CD8 比上升</b>。</p>\n<h4>三、自體發炎症候群與 IgG4-RD</h4>\n<ul>\n<li><b>自體發炎（autoinflammatory）</b>＝發炎體（inflammasome）過度活化，常單一基因突變（pyrin/FMF、TNF 受體、NLRP3）；<b>SLE 與 GPA 不屬</b>自體發炎。</li>\n<li><b>IgG4-RD</b>：可侵眼周致腫脹，常合併過敏與嗜伊紅球增多。</li>\n</ul>"},"乾燥症（Sjögren）":{"title":"乾燥症（Sjögren）","html":"<h4>一、病生理與表現</h4>\n<p>外分泌腺淋巴球浸潤破壞→<b>乾眼(角結膜炎)、乾口</b>(齲齒/吞嚥乾糧難)、腮腺腫；可原發或續發於 RA/SLE。</p>\n<h4>二、診斷</h4>\n<ul>\n<li>抗體 <b>anti-Ro(SSA)／anti-La(SSB)</b>、RF、ANA；<b>Schirmer test</b>(淚液<5mm/5min)、唾液腺流量、唇腺切片(局部淋巴球聚集 focus score)。</li>\n</ul>\n<h4>三、腺體外與併發症</h4>\n<ul>\n<li><b>遠端腎小管酸中毒(RTA 第 1 型)</b>→低血鉀、腎結石。</li>\n<li>間質性肺病、周邊神經病變、紫斑(高球蛋白血症)。</li>\n<li><b>淋巴瘤(MALT)風險明顯升高</b>──持續腮腺腫大、新發單株球蛋白要警覺。</li>\n</ul>\n<h4>★考點直擊</h4>\n<p>乾眼乾口＋anti-Ro/La＝Sjögren；母體 anti-Ro→新生兒狼瘡/先天性心傳導阻滯。治療：人工淚液、毛果芸香鹼(pilocarpine)促分泌、控制乾燥併發症。</p>"},"發炎性肌病（皮肌炎/多發性肌炎/包涵體肌炎）":{"title":"發炎性肌病（皮肌炎、多發性肌炎、包涵體肌炎）","html":"<h4>一、共同特徵</h4>\n<p><b>對稱性近端肌無力</b>(梳頭、爬樓難)、CK/aldolase 升、肌電圖肌病變型、肌肉切片發炎浸潤。</p>\n<h4>二、分型</h4>\n<ul>\n<li><b>皮肌炎(DM)</b>：<b>向陽疹(heliotrope)、Gottron 丘疹、V 字/披肩徵</b>；血管周圍浸潤、束周萎縮；<b>與惡性腫瘤相關(須癌症篩檢)</b>；anti-Mi2、anti-MDA5(伴快速間質性肺病)。</li>\n<li><b>多發性肌炎(PM)</b>：無皮疹、內肌束 CD8 浸潤；常合併間質性肺病。</li>\n<li><b>包涵體肌炎(IBM)</b>：>50 歲男、<b>遠端(指屈)＋股四頭</b>不對稱、進展慢、<b>對類固醇反應差</b>、鑲邊空泡。</li>\n</ul>\n<h4>三、抗體與治療</h4>\n<p><b>anti-Jo-1(抗合成酶症候群)</b>：間質性肺病＋技工手＋發燒＋關節炎。治療：高劑量類固醇＋免疫抑制(MTX/azathioprine/IVIG)；IBM 主要復健。</p>\n<h4>★考點直擊</h4>\n<p>近端無力＋CK 升＋向陽疹/Gottron＝皮肌炎且查腫瘤；anti-Jo-1＝間質肺病。鑑別他汀肌病、甲狀腺低下肌病。</p>"}};

TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';if(LEC[t]&&!kw){h+='<div class="lec"><details open><summary>📘 複習講義：'+esc(LEC[t].title)+'</summary>'+LEC[t].html+'</details></div>';}h+=tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_rheum_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
