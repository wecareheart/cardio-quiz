病毒有套膜，易被乙醚破壞。","B":"正確：腺病毒無套膜，可抵抗乙醚。","C":"冠狀病毒有套膜。","D":"麻疹病毒有套膜。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-76":{"quick":"子宮頸癌與人類乳突病毒（HPV）相關。","detail":{"background":"人類乳突病毒（HPV）高危型（16、18等）持續感染是子宮頸癌的主因（E6/E7致癌蛋白使p53/Rb失活）。肝炎病毒與肝癌相關、腺病毒與腸病毒不致子宮頸癌。故與子宮頸癌相關者為HPV。補充：HPV高危型16、18佔子宮頸癌約70%，其E6使p53降解、E7使Rb失活→細胞週期失控。九價HPV疫苗涵蓋6/11(疣)+16/18/31/33/45/52/58。子宮頸抹片(Pap)+HPV檢測為篩檢。對照其他致癌病毒：HBV/HCV-肝癌、EBV-鼻咽癌/Burkitt、HHV8-卡波西肉瘤、HTLV-1-成人T細胞白血病。","options":{"A":"肝炎病毒與肝癌相關，非子宮頸癌。","B":"正確：HPV與子宮頸癌相關。","C":"腺病毒與子宮頸癌無關。","D":"腸病毒與子宮頸癌無關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-72":{"quick":"D型肝炎為「δ病原體」（delta agent），稱「α型病原體肝炎」錯誤。","detail":{"background":"D型肝炎病毒（HDV）又稱「δ肝炎病毒（delta agent）」：是「缺陷型RNA病原體（類病毒樣）」、具環狀單股RNA，「需借B肝病毒的HBsAg作為外套膜」才能組裝複製，故只在HBV感染者致病；重疊感染易致「猛爆性肝炎」。故「可稱為α型病原體肝炎」是錯誤（應為δ，delta）。其餘（需HBV輔助、有套膜環型RNA、致猛爆性肝炎）皆正確。","options":{"A":"正確（為錯誤敘述）：D肝為δ（delta）病原體，非α。","B":"活化複製需HBV輔助，正確。","C":"具套膜及環型RNA，正確。","D":"可致猛爆性肝炎，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-73":{"quick":"HIV「不是」超級抗原；它感染並破壞CD4 T細胞、抑制免疫，並非有效活化T細胞。","detail":{"background":"病毒逃避免疫的機制：①流感以抗原轉移/漂移改變表面抗原；②單純疱疹病毒潛伏於神經節避免辨認；③部分病毒抑制MHC I表達以逃避細胞毒殺T辨認。而HIV「不是超級抗原」——它選擇性感染並耗竭CD4輔助T細胞、瓦解免疫系統（造成免疫缺乏），絕非「有效活化T細胞免疫反應」。故C為錯誤敘述。（超級抗原如葡萄球菌TSST-1才非特異大量活化T細胞。）","options":{"A":"流感以抗原轉移改變外套抗原，正確。","B":"單純疱疹潛伏神經細胞逃避，正確。","C":"正確（為錯誤敘述）：HIV非超抗原，反而破壞CD4 T細胞。","D":"部分病毒抑制MHC I表達，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-76":{"quick":"登革熱病毒屬「黃病毒科（Flavivirus）」、有套膜的單股RNA病毒，非「小RNA病毒（picornavirus）」。","detail":{"background":"登革熱病毒（dengue virus）：屬黃病毒科（Flaviviridae）、「有套膜」、「單股(+)RNA」病毒，以「斑蚊（埃及斑蚊、白線斑蚊）」為媒介，臨床有發燒、頭痛、後眼窩痛、肌肉關節痛（斷骨熱），重症為登革出血熱／休克。故「屬小RNA病毒（picornavirus）」為錯誤敘述（picornavirus無套膜，登革為黃病毒科有套膜）。其餘（有套膜單股RNA、斑蚊媒介、類感冒症狀）皆正確。","options":{"A":"正確（為錯誤敘述）：登革為黃病毒科、非小RNA病毒。","B":"為有套膜、單股RNA病毒，正確。","C":"斑蚊為主要媒介，正確。","D":"有發燒頭痛背痛等症狀，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-78":{"quick":"AZT（zidovudine）為核苷類反轉錄酶抑制劑，「阻斷病毒核酸複製（反轉錄）」。","detail":{"background":"Zidovudine（AZT）是第一個抗HIV藥物，屬「核苷類反轉錄酶抑制劑（NRTI）」——為胸苷類似物，被磷酸化後競爭性抑制反轉錄酶並造成DNA鏈終止，阻斷HIV將RNA反轉錄為DNA、即「阻斷病毒核酸複製」。它不作用於吸附、脫殼或蛋白衣合成。故作用為阻斷病毒核酸複製。","options":{"A":"非阻斷吸附（吸附抑制為其他類）。","B":"非阻斷脫殼。","C":"正確：AZT抑制反轉錄酶、阻斷病毒核酸複製。","D":"非直接抑制蛋白外衣合成。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-77":{"quick":"輸血後肝炎主要由C型肝炎病毒（HCV）引起。","detail":{"background":"C型肝炎病毒（HCV）經血液傳播，過去在血品篩檢未普及時是「輸血後肝炎」的主因（曾稱non-A non-B hepatitis），易慢性化、致肝硬化與肝癌。現血品已篩HCV。A、E型經糞口、不致輸血後肝炎；D型需合併B肝。故輸血後肝炎主因為C型。","options":{"A":"A型經糞口，非輸血傳播。","B":"D型需合併B肝，非輸血後肝炎主因。","C":"正確：C型肝炎為輸血後肝炎主因。","D":"E型經糞口，非輸血傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-79":{"quick":"結膜炎非prion所致；狂牛症、羊搔癢症、Kuru皆為prion病。","detail":{"background":"普利昂（prion）疾病（傳染性海綿狀腦病）包括：人類庫賈氏病（CJD）、Kuru（人類顫抖症）、GSS、致死性家族失眠症；動物的狂牛症（牛海綿狀腦病）、羊搔癢症（scrapie）。結膜炎為一般感染（細菌、病毒、過敏）所致，「非prion疾病」。故不是prion導致者為結膜炎。","options":{"A":"狂牛症為prion病。","B":"羊搔癢症為prion病。","C":"Kuru（人類顫抖症）為prion病。","D":"正確：結膜炎非prion所致。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-77":{"quick":"肝炎病毒中唯一的DNA病毒是「B型肝炎病毒（HBV）」。","detail":{"background":"肝炎病毒核酸：A型（picornavirus，RNA）、C型（flavivirus，RNA）、D型（delta，RNA）、E型（hepevirus，RNA）皆為「RNA病毒」；唯有「B型肝炎病毒（HBV，hepadnavirus）」是「DNA病毒」（部分雙股環狀DNA，複製經反轉錄）。故唯一DNA病毒為B型。","options":{"A":"A型為RNA病毒。","B":"正確：B型肝炎為唯一DNA肝炎病毒。","C":"C型為RNA病毒。","D":"D型為RNA病毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-77":{"quick":"主要經飲食（糞口）傳染的肝炎病毒為E型（與A型）。","detail":{"background":"E型肝炎病毒（HEV）經「糞口（污染水源）」傳播，與A型相似，多為自限性急性肝炎；但「孕婦感染E肝死亡率高（猛爆性肝炎）」為其特點。B、C、D型經血液體液傳播。本題選項中經飲食傳染者為E型。補充：糞口傳播的肝炎＝A型與E型（皆無套膜、耐胃酸）。E型(HEV)特殊處：「孕婦(尤其第三孕期)感染死亡率可達20%、易猛爆性肝炎」；多經污染水源、開發中地區流行。對照：B/C/D型經血液體液、可慢性化。出題給「經飲食/糞口傳染」＝A或E型。","options":{"A":"B型經血液體液。","B":"C型經血液。","C":"D型隨B型經血液。","D":"正確：E型經飲食（糞口）傳染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-79":{"quick":"依波拉病毒（Ebola）複製過程「不經反轉錄」；HIV、HBV、HTLV需反轉錄。","detail":{"background":"需反轉錄（reverse transcription）的病毒：HIV、HTLV（反轉錄病毒）、HBV（複製經前基因組RNA反轉錄）。依波拉病毒（Ebola）屬絲狀病毒科、單股(−)RNA病毒，以RNA依賴性RNA聚合酶直接複製、「不經反轉錄」。故未經反轉錄者為依波拉病毒。","options":{"A":"HIV為反轉錄病毒，需反轉錄。","B":"HBV複製經反轉錄。","C":"HTLV為反轉錄病毒。","D":"正確：依波拉病毒不經反轉錄。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-65":{"quick":"普利昂感染使患者腦部呈「海綿狀空泡化」；此敘述正確。","detail":{"background":"普利昂（prion）是錯摺疊的感染性蛋白（PrPˢᶜ），引發神經元退化，腦組織出現「海綿狀空泡變性（spongiform）」，臨床為快速進行性失智、肌陣攣、運動失調。它「不引起發炎或發燒、不產生抗體免疫反應」、對「一般消毒滅菌極具抗性（無法以常規方法殺死）」。故正確敘述為「腦部成海綿狀空泡化」。","options":{"A":"正確：患者腦部呈海綿狀空泡化。","B":"不引起發炎或發燒。","C":"對一般消毒滅菌極具抗性，無法以常規殺死。","D":"不產生抗體等免疫反應。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-70":{"quick":"A型肝炎主要經「飲食（糞口）」傳染、造成地區流行。","detail":{"background":"A型肝炎病毒（HAV）經「糞口途徑」——污染的食物（生食貝類）與水傳播，常造成地區性流行（衛生不良地區、群聚）。為自限性急性肝炎，可疫苗預防。故主要傳播方式為飲食傳染。補充：A型肝炎屬小RNA病毒科（picornavirus）、單股(+)RNA、「無套膜故耐胃酸與消毒劑」，潛伏期約2–6週；臨床多自限、痊癒後「終身免疫、不慢性化、不致肝硬化肝癌」，與B/C型截然不同。高危行為＝生食貝類、衛生不良地區旅遊。可用不活化A肝疫苗主動免疫、暴露後可用免疫球蛋白被動保護。","options":{"A":"非主要接觸傳染。","B":"非血液傳染（那是B/C型）。","C":"非飛沫傳染。","D":"正確：A型經飲食（糞口）傳染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-72":{"quick":"病毒複製順序：認識細胞→附著穿入→去殼→巨分子合成→組合→釋出（即2-4-1-3-5-6）。","detail":{"background":"病毒複製週期步驟：①辨認目標細胞（受體）→②附著（attachment）與穿入（penetration）→③去殼（uncoating，釋出核酸）→④巨分子合成（複製核酸、合成病毒蛋白）→⑤組合（assembly）→⑥釋出（release）。對照題目編號（1去殼、2認識、3巨分子、4附著穿入、5組合、6釋出），正確順序為2→4→1→3→5→6，即選項D（241356）。","options":{"A":"123456順序錯誤。","B":"132456順序錯誤。","C":"213456順序錯誤（去殼應在附著之後）。","D":"正確：2(認識)4(附著穿入)1(去殼)3(合成)5(組合)6(釋出)。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-72":{"quick":"病毒核心只含「一種」核酸（DNA或RNA其一），不會同時具DNA與RNA；此敘述錯誤。","detail":{"background":"病毒特性：①核心只含「單一種類」核酸（DNA病毒含DNA、RNA病毒含RNA，「不會同時」具兩者——同時具兩者是細菌特徵）；②外有蛋白衣（capsid）或套膜（envelope）；③以「組合（assembly）」方式複製，非二分裂；④為絕對胞內寄生，在宿主細胞外無法產能或合成蛋白。故錯誤者為「核心同時具DNA及RNA」。","options":{"A":"正確（為錯誤敘述）：病毒只含一種核酸，不會同時具DNA與RNA。","B":"有蛋白衣或套膜，正確。","C":"以組合方式複製、非二分裂，正確。","D":"胞外無法產能與合成蛋白，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-73":{"quick":"套膜（envelope）使病毒「較不耐」乾燥與酸；故「使病毒不易被乾燥及酸破壞」錯誤。","detail":{"background":"病毒套膜（envelope）由宿主細胞膜衍生：含宿主脂質與病毒醣蛋白（spike），能與標的細胞受體交互作用（協助附著與融合）。但套膜含脂質，反而使病毒「對乾燥、酸、脂溶劑（乙醚、酒精）較敏感、較不穩定」（故有套膜病毒多需密切接觸傳播）。故「使病毒不易被乾燥及酸破壞」與事實相反、為錯誤（無套膜病毒才較耐環境）。","options":{"A":"套膜含宿主脂質成分，正確。","B":"套膜含病毒蛋白（醣蛋白），正確。","C":"套膜可與標的細胞交互作用，正確。","D":"正確（為錯誤敘述）：套膜使病毒較不耐乾燥與酸。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-79":{"quick":"禽流感H5N1感染人類「罕見」（非每年上萬人重症）；此敘述錯誤。","detail":{"background":"流行性感冒病毒為單股(−)RNA、有套膜、分節基因，有疫苗可預防、有抗病毒藥（oseltamivir等）可治療。禽流感H5N1雖致死率高，但「人類感染罕見」（多為密切接觸禽鳥的零星個案、人傳人效率低），「並非每年上萬人感染重症」。故C為錯誤敘述。","options":{"A":"有流感疫苗可預防，正確。","B":"有抗病毒藥可治療，正確。","C":"正確（為錯誤敘述）：H5N1人類感染罕見，非每年上萬重症。","D":"流感為單股RNA病毒，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-70":{"quick":"天花病毒（smallpox，DNA病毒）是WHO宣布已從人類根除的病毒（1980）。","detail":{"background":"天花病毒（variola/smallpox virus）屬痘病毒科、為「DNA病毒」，致死率高、傳染力強。經全球疫苗接種計畫，WHO於1980年宣布「天花從人類根除」，是首個被人類消滅的傳染病。伊波拉、漢他、E肝皆未被根除。故為已被消滅的DNA病毒者為天花病毒。","options":{"A":"正確：天花病毒（DNA病毒）已被人類根除。","B":"伊波拉病毒未被消滅、且為RNA病毒。","C":"漢他病毒未被消滅、為RNA病毒。","D":"E肝病毒未被消滅、為RNA病毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-72":{"quick":"prion「不引起免疫反應」；故「可引起免疫反應」並非其特性（為非）。","detail":{"background":"普利昂（prion）特性：①可濾過、具傳染性；②本質為蛋白質（錯摺疊的PrPˢᶜ）；③「不含核酸」；④「不引起免疫反應或發炎」（因與宿主自身正常蛋白同源，免疫系統不視為外來，故無抗體、無干擾素）。故「可引起免疫反應」並非prion特性、為錯（答案選此）。","options":{"A":"可濾過具傳染性，是prion特性。","B":"具蛋白質，是其特性。","C":"不具核酸，是其特性。","D":"正確：prion不引起免疫反應，故「可引起免疫反應」為非。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-77":{"quick":"A型肝炎只造成「急性」肝炎、不會慢性化。","detail":{"background":"肝炎病毒慢性化能力：A型與E型「只造成急性肝炎、不慢性化」（自限性、痊癒後免疫）；B、C、D型可慢性化（C型慢性化率最高）。故「只造成急性肝炎、不致長期慢性感染」者為A型肝炎病毒。補充：口訣「A、E惹禍不留（急性、不慢性化）；B、C、D會慢（可慢性化）」。A型與E型經糞口、自限性；B/C/D經血液體液、可慢性化（C型慢性化率最高約75%、易致肝硬化肝癌）。E型特殊處：孕婦感染死亡率高。出題常考「只造成急性、不慢性化」＝A型(或E型)。","options":{"A":"正確：A型只造成急性肝炎、不慢性化。","B":"B型可慢性化。","C":"C型慢性化率高。","D":"D型（合併B肝）可慢性化。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-79":{"quick":"大部分庫賈氏病（CJD）為「偶發型（sporadic）」，非暴露牛海綿狀腦病所致；此敘述錯誤。","detail":{"background":"庫賈氏病（CJD）由prion引起，臨床為快速進行性失智、肌陣攣、運動失調，無特殊療法（支持治療）、無法以一般血清學檢驗確診（須腦電圖、影像、腦脊髓液14-3-3蛋白、病理）。其分型中「散發型（sporadic CJD）」佔約85%（與牛海綿狀腦病無關）；「變異型CJD（vCJD）」才與食用狂牛症病牛相關，但為少數。故「大部分患者曾暴露牛海綿狀腦病」與事實相反、為錯誤（大部分是散發型）。","options":{"A":"正確（為錯誤敘述）：多數CJD為散發型，非暴露狂牛症。","B":"由prion蛋白引起，正確。","C":"無特殊療法、以支持治療為主，正確。","D":"無法以一般血清學檢出，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-74":{"quick":"痘病毒（poxvirus）雖為DNA病毒，但「在細胞質」複製（自帶聚合酶），非細胞核；此敘述錯誤。","detail":{"background":"痘病毒（poxvirus，如天花、傳染性軟疣）為「最大」的DNA病毒，特殊之處在於它「攜帶自己的DNA與RNA聚合酶」，故「在宿主細胞質」完成複製（不像多數DNA病毒在細胞核）。故「因為是DNA病毒所以在細胞核複製」是錯誤（痘病毒例外、在細胞質複製）。其餘（可作生化武器、天花與軟疣只感染人、動物痘病毒可製天花疫苗如牛痘）皆正確。","options":{"A":"天花可被用作生化武器，正確。","B":"天花與軟疣病毒只感染人類，正確。","C":"正確（為錯誤敘述）：痘病毒在細胞質複製、非細胞核。","D":"用牛痘等動物痘病毒製天花疫苗（共通抗原），正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-77":{"quick":"奈瑟氏菌（Neisseria）最易受補體膜攻擊複合體（MAC）作用而被殺；故補體缺乏者易感奈瑟菌。","detail":{"background":"補體活化的終末路徑形成「膜攻擊複合體（MAC, C5b-9）」，在細胞膜打洞溶解標的。MAC對「革蘭氏陰性菌」較有效（外膜可被穿孔）；對厚細胞壁的革蘭氏陽性菌（葡萄球菌、鏈球菌）幾乎無效。其中「奈瑟氏菌（淋病/腦膜炎雙球菌）」特別依賴MAC清除——故「終末補體（C5–C9）缺乏者」易反覆感染奈瑟氏菌。病毒（HBV）不靠MAC直接溶解。故最易受MAC作用者為奈瑟氏菌。","options":{"A":"HBV為病毒、非MAC直接溶解標的。","B":"正確：奈瑟氏菌（G−）最易受MAC溶解。","C":"葡萄球菌（G＋厚壁）對MAC不敏感。","D":"鏈球菌（G＋）對MAC不敏感。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-49":{"quick":"腺病毒（adenovirus）為「無套膜」的裸露DNA病毒。","detail":{"background":"有套膜的病毒：單純疱疹病毒、B型肝炎病毒、流感病毒、冠狀病毒、麻疹等。無套膜（裸露）的病毒：腺病毒、小RNA病毒（腸病毒、A肝）、乳突病毒、細小病毒、輪狀病毒。故不具套膜者為腺病毒（裸露DNA病毒、較耐環境與消毒）。補充：判斷套膜的臨床意義——「有套膜」病毒(疱疹、流感、冠狀、麻疹、HIV、B肝)套膜含脂質，易被乙醚/酒精/清潔劑/乾燥破壞，多需密切接觸傳播；「無套膜(裸露)」病毒(腺病毒、腸病毒、A肝、輪狀、乳突、細小)較耐環境、耐胃酸、耐消毒劑，常經糞口傳播(故腸道病毒多無套膜)。腺病毒＝無套膜DNA病毒。","options":{"A":"正確：腺病毒無套膜。","B":"單純疱疹病毒有套膜。","C":"B型肝炎病毒有套膜。","D":"A型流感病毒有套膜。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-43":{"quick":"麻疹疫苗（MMR）為「活性減毒」疫苗（以活的減毒微生物製備）。","detail":{"background":"疫苗分類：①活性減毒疫苗（活的減毒微生物）——麻疹、腮腺炎、德國麻疹（MMR）、水痘、卡介苗（BCG）、口服小兒麻痺（沙賓）、輪狀病毒；免疫力強、孕婦與免疫低下者禁用。②不活化／死菌疫苗——百日咳、注射型小兒麻痺（沙克Salk）、A肝。③基因重組／次單元——B型肝炎（HBsAg）。故以「活的微生物」製備者為麻疹疫苗。","options":{"A":"B肝疫苗為基因重組次單元疫苗。","B":"百日咳疫苗為不活化疫苗。","C":"沙克（Salk）小兒麻痺疫苗為不活化（注射）疫苗。","D":"正確：麻疹疫苗為活性減毒疫苗。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-47":{"quick":"鼻咽癌與EB病毒（EBV）感染最相關（尤其華南／台灣）。","detail":{"background":"EB病毒（Epstein-Barr virus, HHV-4）與多種腫瘤相關：鼻咽癌（南方型，華南、台灣高發）、Burkitt淋巴瘤（非洲型）、何杰金氏淋巴瘤、移植後淋巴增生。它經唾液傳播，也是傳染性單核球增多症的病原。故與鼻咽癌最相關者為EB病毒。","options":{"A":"HPV與子宮頸癌相關。","B":"B肝與肝癌相關。","C":"腺病毒不致鼻咽癌。","D":"正確：EB病毒與鼻咽癌最相關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-49":{"quick":"prion潛伏期「極長（數年至數十年）」；故「潛伏期短、感染數週即發病」錯誤。","detail":{"background":"普利昂（prion）疾病特性：潛伏期「極長」（數年至數十年）、無季節性、可經「侵入性醫療器械（角膜移植、硬腦膜移植、深部電極、生長激素）」或食用污染組織傳染、目前無藥可治。故「潛伏期短、感染數週即發病」與事實相反、為錯誤敘述。補充：普利昂(prion)疾病(傳染性海綿狀腦病)特性：潛伏期「極長(數年至數十年)」、無季節性、可經「侵入性醫療(角膜/硬腦膜移植、深部電極、屍源生長激素)或食用污染組織(vCJD←狂牛)」傳染、目前無藥可治(支持療法)、對常規消毒滅菌極具抗性。臨床＝快速進行性失智、肌陣攣、運動失調。出題陷阱：「潛伏期短、數週發病」為錯。","options":{"A":"正確（為錯誤敘述）：prion潛伏期極長，非數週發病。","B":"感染無季節性，正確。","C":"可經侵入性醫療裝置傳染，正確。","D":"目前無藥可治，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-45":{"quick":"經糞口傳染的病毒以「無套膜」病毒居多（耐胃酸與膽鹽）；故「以有套膜病毒居多」錯誤。","detail":{"background":"病毒散播：①垂直感染指母體傳子代（經胎盤、產道、哺乳），正確；②「經糞口傳染的腸道病毒以『無套膜』病毒居多」——因無套膜病毒耐胃酸、膽鹽與乾燥（如腸病毒、A肝、輪狀病毒、諾羅），有套膜病毒易被胃酸膽鹽破壞、難經糞口；③蟲媒病毒須能在病媒（蚊）體內複製才可傳播，正確；④疫苗接種是抑制族群散播的最佳方式，正確。故錯誤者為B（糞口傳染應以「無套膜」病毒居多，非有套膜）。","options":{"A":"垂直感染為母傳子代，正確。","B":"正確（為錯誤敘述）：糞口傳染以無套膜病毒居多。","C":"蟲媒病毒須能在蚊體複製，正確。","D":"疫苗接種為抑制散播最佳方式，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-46":{"quick":"需要B肝病毒同時感染才能複製的是「D型肝炎（HDV）」。","detail":{"background":"D型肝炎病毒（HDV）為缺陷型病毒，需借「B肝病毒的HBsAg」做為外套膜才能組裝、感染與複製，故只在HBV感染者身上致病（共感染或重疊感染）。重疊感染易致猛爆性肝炎。故需HBV協助複製者為D型。補充：D型肝炎(HDV)為「缺陷型(衛星)病毒」，須借B肝病毒的HBsAg做外套膜才能組裝感染，故僅在HBV感染者致病。兩種模式：共感染(coinfection，與B肝同時)、重疊感染(superinfection，B肝帶原者再感染HDV→易猛爆性肝炎、預後差)。預防HDV＝接種B肝疫苗(阻斷HBV即阻斷HDV)。","options":{"A":"A型不需HBV協助。","B":"C型不需HBV協助。","C":"正確：D型需B肝病毒同時感染才能複製。","D":"E型不需HBV協助。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-47":{"quick":"流感病毒靠表面「血球凝集素（hemagglutinin, HA）」附著於宿主細胞唾液酸受體。","detail":{"background":"流感病毒表面有兩種醣蛋白：「血球凝集素（HA）」負責「附著」宿主細胞表面的唾液酸（sialic acid）受體並協助膜融合進入細胞（是疫苗與中和抗體的主要標的）；「神經胺酸酶（NA）」則在子代病毒釋出時切斷唾液酸、協助病毒擴散（克流感oseltamivir即抑制NA）。故附著用的是HA。","options":{"A":"M1為基質蛋白，非附著。","B":"NS1為非結構蛋白，非附著。","C":"神經胺酸酶（NA）負責釋出擴散，非附著。","D":"正確：血球凝集素（HA）負責附著宿主細胞。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-48":{"quick":"單股正股（+）RNA病毒的基因組可「直接作為mRNA轉譯病毒蛋白」。","detail":{"background":"單股正股（+ssRNA）病毒（如腸病毒、A肝、登革、冠狀病毒）的基因組「極性與mRNA相同」，進入細胞後可「直接作為mRNA被宿主核糖體轉譯」出病毒蛋白（含RNA依賴性RNA聚合酶），再於細胞質複製。（負股−ssRNA則需先以自帶聚合酶轉成+股mRNA才能轉譯。）故+ssRNA特性為「由+股RNA直接製造病毒蛋白」。","options":{"A":"多數+ssRNA在細胞質複製、非感染初期細胞核。","B":"+ssRNA不需先形成DNA（反轉錄病毒才如此）。","C":"正確：+股RNA可直接作mRNA製造病毒蛋白。","D":"非由−股RNA製造蛋白（那是−ssRNA特性）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-41":{"quick":"噬菌體（phage）媒介細菌基因轉移的方式為「轉導（transduction）」。","detail":{"background":"細菌水平基因轉移：①接合（conjugation）經性菌毛傳質體；②轉形（transformation）攝取游離DNA；③「轉導（transduction）」——經「噬菌體（bacteriophage）」將細菌DNA包裝、感染另一菌而轉移基因（如白喉、肉毒、霍亂毒素基因即經溶原噬菌體轉導/溶原轉換獲得）。故由噬菌體進行者為轉導作用。","options":{"A":"接合作用經性菌毛、非噬菌體。","B":"轉化作用為攝取游離DNA。","C":"正確：噬菌體媒介者為轉導作用。","D":"分泌作用非基因轉移。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-44":{"quick":"口服小兒麻痺沙賓疫苗（Sabin）為「活性減毒」疫苗。","detail":{"background":"小兒麻痺疫苗兩種：「沙賓（Sabin）口服疫苗」為「活性減毒」（可誘導腸道IgA、群體免疫，但極少數可回復毒性致疫苗相關麻痺）；「沙克（Salk）注射疫苗」為「不活化」疫苗。B肝疫苗為基因重組次單元、狂犬病疫苗為不活化、破傷風為類毒素。故屬減毒活疫苗者為沙賓疫苗。","options":{"A":"B肝疫苗為基因重組次單元疫苗。","B":"狂犬病疫苗為不活化疫苗。","C":"破傷風疫苗為類毒素（不活化）。","D":"正確：沙賓口服小兒麻痺疫苗為活性減毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-49":{"quick":"C型肝炎病毒（HCV）目前「沒有上市疫苗」可預防。","detail":{"background":"已有疫苗的RNA病毒：輪狀病毒（口服減毒）、小兒麻痺（沙賓/沙克）、麻疹（MMR）。C型肝炎病毒（HCV）因基因高度變異（多基因型、套膜醣蛋白多變）、缺乏持久中和免疫，「至今尚無上市疫苗」（但已有高治癒率的直接抗病毒藥DAA）。故無疫苗者為C型肝炎病毒。","options":{"A":"輪狀病毒有口服疫苗。","B":"小兒麻痺有疫苗。","C":"麻疹有疫苗（MMR）。","D":"正確：C型肝炎病毒目前無上市疫苗。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-50":{"quick":"病毒都須借「宿主細胞的核糖體」合成自身蛋白質；此敘述最適當。","detail":{"background":"病毒為絕對胞內寄生：①「皆須利用宿主細胞的核糖體」轉譯合成病毒蛋白（病毒自己沒有核糖體）——正確；②並非所有病毒都自帶核酸聚合酶（如+ssRNA可用宿主機制、許多DNA病毒用宿主聚合酶）；③對抗生素「無感受性」（抗生素針對細菌）；④以「組合（assembly）」複製、非二分裂。故最適當為「病毒都用宿主核糖體製造蛋白質」。","options":{"A":"正確：病毒都用宿主核糖體合成蛋白質。","B":"非所有病毒都自帶核酸聚合酶。","C":"病毒對抗生素無感受性。","D":"病毒以組合方式複製、非二分裂。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-50":{"quick":"prion可由「污染物或食物攝入」傳播（如食用病牛組織致vCJD）；此敘述最適當。","detail":{"background":"普利昂（prion）特性：①潛伏期「極長」（非數天）；②「不含核酸」（純蛋白）；③對熱極耐（「100°C無法清除」，須134°C高壓久蒸或強鹼）；④可經「攝入污染食物（病牛組織→變異型CJD）、污染醫療器械、移植組織」傳播。故最適當者為「可由污染物或食物攝入傳播」。","options":{"A":"潛伏期極長，非數天。","B":"prion不具核酸。","C":"加熱100°C無法清除（極耐熱）。","D":"正確：可由污染物或食物攝入傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-48":{"quick":"腺病毒第7型主要致呼吸道／結膜炎，「不增加致癌風險」；HPV-16、EBV、C肝皆與癌相關。","detail":{"background":"與癌症相關的病毒：HPV-16（子宮頸癌）、EB病毒（鼻咽癌、淋巴瘤）、C型肝炎病毒（肝癌）、HBV（肝癌）、HTLV-1、HHV-8。腺病毒（adenovirus type 7）主要造成急性呼吸道感染、結膜炎與腸胃炎，「不增加人類罹癌機會」（雖在實驗動物可致瘤，但對人類非致癌病毒）。故最不會增加罹癌者為腺病毒第7型。（註：C肝為RNA病毒，題幹DNA病毒之設定略有出入，但就「最不致癌」而言答案為腺病毒。）","options":{"A":"HPV-16為高危致癌型（子宮頸癌）。","B":"正確：腺病毒第7型不增加罹癌風險。","C":"EB病毒與鼻咽癌、淋巴瘤相關。","D":"C型肝炎病毒與肝癌相關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-76":{"quick":"A型輪狀病毒主要造成「嬰幼兒（小兒）腹瀉」（冬季流行）。","detail":{"background":"輪狀病毒（rotavirus，雙股分節RNA病毒）是全球嬰幼兒（尤6個月–2歲）「嚴重水樣腹瀉與脫水」最重要病原，冬季流行、經糞口傳播，破壞小腸絨毛上皮致吸收不良。可經口服減毒疫苗預防。成人多有免疫、症狀輕。故主要造成小兒腹瀉。補充：輪狀病毒(雙股、分節RNA)是嬰幼兒(6個月–2歲)嚴重水樣腹瀉與脫水的最重要病原，冬季流行、糞口傳播，破壞小腸絨毛致吸收不良(滲透性腹瀉)。「無特效抗病毒藥」、治療以口服/靜脈補液(ORS)為主；已有「口服減毒疫苗」可預防。同分節基因可發生重組(reassortment)。對照成人病毒性腹瀉多為諾羅病毒。","options":{"A":"正確：A型輪狀病毒主要造成小兒（嬰幼兒）腹瀉。","B":"成人多有免疫、非主要族群。","C":"非致小兒肺炎。","D":"非致大人肺炎。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-76":{"quick":"腸病毒71型屬「糞口傳播」（亦可飛沫/接觸），無套膜耐消毒、無常規疫苗（早年）。","detail":{"background":"腸病毒71型（EV71）屬小RNA病毒科腸病毒屬、單股(+)RNA、「無套膜」，主要經「糞口」（也可呼吸道飛沫、接觸疱疹液）傳播，致手足口病與疱疹性咽峽炎，重症可侵犯中樞致腦幹腦炎（嬰幼兒重症致死）。因無套膜，對酒精等一般消毒劑「抵抗力較強」（須含氯漂白水）。故正確為「屬糞口傳播」。","options":{"A":"非主要引起孕婦呼吸道感染。","B":"本題時點尚無常規EV71疫苗（C才正確）。","C":"正確：腸病毒71型屬糞口傳播。","D":"對含氯消毒敏感，非對所有消毒劑抗性（敘述過絕對）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-77":{"quick":"口腔頰黏膜的「柯氏斑點（Koplik spots）」是麻疹（measles）的特異前驅病徵。","detail":{"background":"麻疹（measles，副黏液病毒科、單股RNA、有套膜）前驅期出現「3C」（咳嗽cough、鼻炎coryza、結膜炎conjunctivitis）與發燒，並在「口腔頰黏膜（對著臼齒處）出現藍白色中心的紅色斑點——柯氏斑點（Koplik spots）」，是麻疹的特異性早期診斷徵象，隨後出現由頭頸蔓延至軀幹四肢的紅疹。故柯氏斑點代表麻疹病毒感染。","options":{"A":"正確：柯氏斑點為麻疹特異徵象。","B":"德國麻疹無柯氏斑點。","C":"腮腺炎以腮腺腫為主，無柯氏斑點。","D":"單純疱疹為口唇水疱，非柯氏斑點。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-75":{"quick":"伊波拉病毒屬「絲狀病毒科」，不屬副黏液病毒（paramyxovirus）。","detail":{"background":"副黏液病毒科（Paramyxoviridae）包括：麻疹病毒、腮腺炎病毒、呼吸道融合病毒（RSV）、副流感病毒，皆為有套膜的單股(−)RNA病毒，常致幼童呼吸道感染與出疹性疾病。伊波拉病毒（Ebola）屬「絲狀病毒科（Filoviridae）」，致出血熱，「不屬」副黏液病毒。故不含者為伊波拉病毒。","options":{"A":"正確：伊波拉屬絲狀病毒科，非副黏液病毒。","B":"呼吸道融合病毒屬副黏液病毒。","C":"麻疹病毒屬副黏液病毒。","D":"腮腺炎病毒屬副黏液病毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-76":{"quick":"HIV主要感染「CD4＋」T淋巴球（非CD8）；故「主要感染CD8 T細胞」錯誤。","detail":{"background":"HIV屬反轉錄病毒、有套膜的單股RNA病毒，以gp120結合「CD4」分子及趨化激素共受體（CCR5/CXCR4）進入細胞，「主要感染CD4＋輔助T細胞」（及巨噬細胞、樹突細胞），漸進耗竭CD4 T細胞致免疫崩潰（AIDS）。治療為高效抗反轉錄病毒療法（HAART，含反轉錄酶抑制劑＋蛋白酶抑制劑等）。故「主要感染CD8 T細胞」為錯誤（應為CD4）。","options":{"A":"HIV為有套膜的反轉錄RNA病毒，正確。","B":"感染途徑含性接觸、靜脈用藥等，正確。","C":"正確（為錯誤敘述）：HIV主要感染CD4 T細胞，非CD8。","D":"以三合一抗病毒療法治療，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-77":{"quick":"EB病毒在亞洲（華南、台灣）與「鼻咽癌」密切相關。","detail":{"background":"EB病毒（EBV, HHV-4）相關腫瘤：鼻咽癌（亞洲華南型高發）、Burkitt淋巴瘤（非洲型）、何杰金氏淋巴瘤、移植後淋巴增生病。它經唾液傳播、潛伏於B細胞。在亞洲最密切相關的癌症為鼻咽癌。補充：EB病毒(EBV/HHV-4)經唾液傳播(「接吻病」)、潛伏於B細胞，致傳染性單核球增多症(發燒、咽炎、頸淋巴結腫、異型淋巴球、Paul-Bunnell嗜異性抗體陽性)。相關腫瘤：亞洲華南型「鼻咽癌」、非洲型「Burkitt淋巴瘤」、何杰金氏淋巴瘤、移植後淋巴增生。出題：亞洲與EBV最相關癌＝鼻咽癌。","options":{"A":"肺癌與EBV無關。","B":"正確：EB病毒與鼻咽癌密切相關（亞洲）。","C":"子宮頸癌與HPV相關。","D":"黑色素癌與紫外線相關，非EBV。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-74":{"quick":"天花疫苗以「痘苗病毒（vaccinia virus）」製備（與天花有共通抗原的減毒痘病毒）。","detail":{"background":"天花疫苗利用與天花病毒（variola）有交叉抗原、但對人致病性低的「痘苗病毒（vaccinia virus）」（牛痘相關的減毒痘病毒）製備，接種後產生對天花的保護性免疫——這是Jenner牛痘接種概念的延伸，也是人類根除天花的工具。不會用真正的天花病毒（太危險）。故製備天花疫苗用痘苗病毒。","options":{"A":"不會用真正天花病毒（致病危險）。","B":"非用猴痘病毒。","C":"正確：以痘苗病毒（vaccinia）製天花疫苗。","D":"非用假牛痘病毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-77":{"quick":"MMR三合一疫苗為「麻疹（Measles）、腮腺炎（Mumps）、德國麻疹（Rubella）」。","detail":{"background":"MMR為活性減毒疫苗，預防三種病毒性出疹/腺體疾病：麻疹（Measles）、腮腺炎（Mumps）、德國麻疹（Rubella）。兒童於滿1歲與滿5歲（入學前）各接種一劑。屬活性減毒疫苗，孕婦與免疫低下者禁用。故MMR指這三者。補充：MMR為活性減毒疫苗(麻疹/腮腺炎/德國麻疹)，台灣於滿1歲、滿5歲各接種一劑；孕婦與免疫嚴重低下者禁用(活疫苗)。三病各重點：麻疹(柯氏斑、3C、SSPE)、腮腺炎(腮腺腫、睪丸炎、無菌性腦膜炎)、德國麻疹(孕婦感染→先天性德國麻疹症候群：白內障、耳聾、PDA)。","options":{"A":"正確：MMR為腮腺炎、麻疹、德國麻疹。","B":"狂犬病非MMR成分。","C":"呼腸病毒非MMR成分。","D":"鼻病毒非MMR成分。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-78":{"quick":"成人T細胞白血病由人類嗜T細胞病毒第1型（HTLV-1）引起。","detail":{"background":"人類嗜T淋巴球病毒第1型（HTLV-1）為反轉錄病毒，經血液、性接觸、母乳傳播，潛伏期長，可致「成人T細胞白血病/淋巴瘤（ATL）」與HTLV相關脊髓病變（HAM/TSP）。本題選項拆字混亂，正解對應HTLV-1。HIV則致AIDS而非ATL。故致成人T細胞白血病者為HTLV(-1)。","options":{"A":"正確：HTLV（-1）致成人T細胞白血病。","B":"即HTLV-1（同屬正解概念）。","C":"無HTLV-3致白血病之說。","D":"HIV致AIDS，非成人T細胞白血病。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-76":{"quick":"正黏液病毒（Orthomyxovirus）即「A、B、C型流行性感冒病毒」。","detail":{"background":"正黏液病毒科（Orthomyxoviridae）為有套膜、單股(−)RNA、「分節（8段）」基因組的病毒，主要成員是「A、B、C型流行性感冒病毒」。A型可感染人與多種動物、易抗原轉移致大流行；B型主要感染人、季節流行；C型症狀輕。故三型為A、B、C型流感病毒。","options":{"A":"正確：正黏液病毒為A、B、C型流感病毒。","B":"無D型之經典三型分類（本題以A/B/C為準）。","C":"無E型流感之分類。","D":"無F型流感之分類。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-78":{"quick":"prion（普利昂）主要引發「腦部」海綿狀病變（海綿狀腦病）。","detail":{"background":"普利昂（prion）疾病為「傳染性海綿狀腦病（transmissible spongiform encephalopathy）」：錯摺疊蛋白PrPˢᶜ累積於中樞神經，造成「腦部」神經元空泡化（海綿狀變性）、星狀膠質增生，臨床為進行性失智、肌陣攣、運動失調（如庫賈氏病、狂牛症）。病變部位在腦部，非心、肝、肺。","options":{"A":"正確：prion引發腦部海綿狀病變。","B":"非心臟病變。","C":"非肝臟病變。","D":"非肺臟病變。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-77":{"quick":"伊波拉「不經空氣傳染」，而是經接觸患者體液血液；故「由空氣傳染」錯誤。","detail":{"background":"伊波拉病毒（Ebola）：絲狀病毒科、單股(−)RNA、盛行於非洲，引起嚴重而致命的「病毒性出血熱」。傳播主要經「直接接觸患者或屍體的血液與體液、污染物」，「並非空氣傳染」（與結核、麻疹的空氣傳播不同）。故「由空氣傳染、傳染率極高」為錯誤敘述。","options":{"A":"為絲狀RNA病毒，正確。","B":"多盛行於非洲，正確。","C":"引起致命出血熱，正確。","D":"正確（為錯誤敘述）：伊波拉經體液接觸傳染，非空氣傳染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-78":{"quick":"德國麻疹（rubella）感染後可產生「終身免疫」。","detail":{"background":"德國麻疹（rubella，披衣病毒科togavirus）只有一種血清型、抗原穩定，自然感染後產生「終身免疫」（MMR疫苗亦提供長久保護）。相對地，腸病毒（多種血清型）、腺病毒（多血清型）、流感病毒（抗原漂移/轉移）皆會反覆感染、不終身免疫。故終身免疫者為德國麻疹。","options":{"A":"腸病毒有多種血清型，可反覆感染。","B":"腺病毒有多血清型，可再感染。","C":"流感抗原變異，每年可再感染。","D":"正確：德國麻疹感染後終身免疫。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-75":{"quick":"器官移植後免疫抑制易再活化、可經輸血傳染者為巨細胞病毒（CMV）。","detail":{"background":"巨細胞病毒（CMV, HHV-5）感染後「終身潛伏」，於免疫抑制（器官/骨髓移植後、愛滋）時「再活化」，造成肺炎、視網膜炎、腸炎、肝炎等嚴重感染；可經「輸血、移植器官、體液」傳染。故移植後免疫抑制易再活化、可經輸血者為CMV。（單純疱疹也潛伏，但移植相關輸血傳染與再活化之經典是CMV。）","options":{"A":"單純疱疹潛伏神經節，但移植輸血相關經典為CMV。","B":"正確：CMV可經輸血、移植後免疫抑制再活化。","C":"HPV不經輸血、與移植再活化無關。","D":"腸病毒非潛伏再活化型。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-77":{"quick":"德國麻疹病毒（rubella）可經胎盤垂直感染、致先天性德國麻疹症候群。","detail":{"background":"德國麻疹病毒（rubella）若孕婦（尤其前三月）感染，可「經胎盤垂直傳染胎兒」，造成「先天性德國麻疹症候群（CRS）」——先天性白內障、耳聾、先天性心臟病（開放性動脈導管）、小頭、智能障礙。屬TORCH群。故經胎盤垂直傳染者為德國麻疹病毒。","options":{"A":"正確：德國麻疹病毒可經胎盤垂直傳染致CRS。","B":"麻疹非典型先天感染病毒。","C":"HPV不經胎盤垂直感染。","D":"牛痘病毒非垂直感染病毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-78":{"quick":"狂犬病毒結合「神經肌肉接合處乙醯膽鹼受體（神經細胞）」，非紅血球P抗原；此配對錯誤。","detail":{"background":"病毒靠表面醣蛋白與特定受體結合決定嗜性：EBV的gp350與B細胞CR2（C3d/C補體受體，正確）；HIV的gp120與CD4及共受體（正確）；流感HA與上皮細胞唾液酸（正確）。狂犬病毒的G蛋白結合的是「神經肌肉接合處的乙醯膽鹼受體、神經細胞黏附分子（NCAM）等」——沿神經逆行入中樞，「並非結合紅血球的P抗原」（紅血球P抗原是細小病毒B19的受體）。故錯誤配對為C。","options":{"A":"EBV gp350與B細胞C3補體受器結合，正確。","B":"HIV gp120與CD4及共受體結合，正確。","C":"正確（為錯誤配對）：狂犬病毒結合神經受體，非紅血球P抗原。","D":"流感HA與上皮細胞唾液酸結合，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-77":{"quick":"腦部出現「內格里小體（Negri body）」是狂犬病（rabies）的特徵性病理。","detail":{"background":"狂犬病毒（rabies virus，彈狀病毒科、子彈狀、單股(−)RNA）經染病動物咬傷傳入，沿周邊神經逆行至中樞，在神經細胞（尤海馬與小腦Purkinje細胞）細胞質形成嗜酸性包涵體「內格里小體（Negri body）」，是病理診斷的特徵。臨床有恐水、恐風、咽喉痙攣，幾乎致命。故出現Negri小體者為狂犬病毒。","options":{"A":"單純疱疹腦炎無Negri小體（有Cowdry A型包涵體）。","B":"CMV有貓頭鷹眼包涵體，非Negri。","C":"正確：狂犬病腦部出現Negri小體。","D":"伊波拉無Negri小體。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-79":{"quick":"抗病毒藥多「專一性低、易對宿主細胞產生毒性」（病毒利用宿主機制故難選擇性）；此敘述正確。","detail":{"background":"抗病毒藥物研發困難，因病毒「利用宿主細胞的機制」複製，藥物難以只殺病毒而不傷宿主，故「多數抗病毒藥專一性較低、易對宿主細胞產生毒性」、治療窗窄。其餘敘述皆錯：抗病毒藥多為「合成」而非源自其他微生物代謝產物（那是抗生素）；抗病毒藥發展「落後於」抗菌藥；病毒（尤RNA病毒）「易產生抗藥性」。故正確者為B。","options":{"A":"抗病毒藥多為人工合成，非源自其他微生物代謝產物。","B":"正確：專一性低、易對宿主細胞產生毒性。","C":"抗病毒藥發展落後於抗菌藥，敘述相反。","D":"病毒（尤RNA病毒）易產生抗藥性。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-70":{"quick":"HIV潛伏期中CD4 T細胞「持續緩慢減少」；故「數量不會減少」錯誤。","detail":{"background":"HIV為RNA（反轉錄）病毒，以gp120結合CD4分子感染輔助T細胞。在臨床「潛伏（無症狀）期」，病毒仍持續低度複製，CD4＋T細胞「逐漸緩慢減少」（並非不變），當CD4降至<200/μL即進入AIDS期、易發伺機性感染與腫瘤（為主要死因）。故「潛伏期中CD4 T細胞數量不會減少」為錯誤敘述。","options":{"A":"HIV屬RNA病毒，正確。","B":"以gp120與CD4結合，正確。","C":"正確（為錯誤敘述）：潛伏期CD4 T細胞仍持續減少。","D":"死因主要為伺機性感染與腫瘤，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-78":{"quick":"MMR三合一疫苗指「麻疹、腮腺炎、德國麻疹」。","detail":{"background":"MMR疫苗預防麻疹（Measles）、腮腺炎（Mumps）、德國麻疹（Rubella），為活性減毒疫苗，兒童常規接種兩劑。故MMR為這三種病毒之合稱。補充：MMR為「活性減毒」疫苗，故孕婦與免疫嚴重低下者禁用（避免疫苗病毒致病）；接種後可能輕微發燒出疹。台灣常規時程為「滿1歲、滿5歲（入學前）」各一劑。德國麻疹部分是預防孕婦感染致「先天性德國麻疹症候群（白內障、耳聾、開放性動脈導管）」，故育齡女性接種尤重要。腮腺炎並發症含睪丸炎、無菌性腦膜炎。","options":{"A":"含小兒麻痺、腸病毒，錯誤。","B":"正確：麻疹、腮腺炎、德國麻疹。","C":"含呼吸道融合病毒，錯誤。","D":"含天花、輪狀病毒，錯誤。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-78":{"quick":"登革熱經「蚊子（斑蚊）」傳播。","detail":{"background":"登革熱（dengue，黃病毒科、有套膜單股RNA）以「斑蚊（埃及斑蚊、白線斑蚊）」為媒介，叮咬傳播；臨床有發燒、頭痛、後眼窩痛、肌肉關節痛，重症為登革出血熱與休克症候群（多次不同型別感染後因抗體依賴增強ADE而加重）。故傳播媒介為蚊子。補充：登革熱(黃病毒科、有套膜、單股(+)RNA、4血清型)經埃及/白線斑蚊傳播，臨床＝突發高燒、頭痛、後眼窩痛、肌肉關節痛(斷骨熱)、皮疹。重症「登革出血熱/休克」常因「二次感染不同血清型」經抗體依賴增強(ADE)而加重(血漿滲漏、血小板低下、出血)。台灣夏季南部本土流行。預防＝清除孳生源、防蚊。","options":{"A":"非鳥類傳播。","B":"非蟑螂傳播。","C":"正確：登革熱經蚊子（斑蚊）傳播。","D":"非老鼠傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-79":{"quick":"HIV感染的確認（confirmatory）試驗為「西方墨點法（Western blot）」。","detail":{"background":"HIV檢測流程：先以ELISA篩檢抗體（敏感度高），陽性者再以「西方墨點法（Western blot）」確認——分離HIV蛋白（gp120、gp41、p24等），偵測病人血清中對多條特異病毒蛋白帶的抗體以確診（避免偽陽性）。（現多用第四代抗原/抗體combo與核酸檢測。）南方墨點測DNA、北方墨點測RNA、東方墨點測蛋白修飾，皆非HIV確認試驗。故確認試驗為西方墨點。","options":{"A":"東方墨點非HIV確認試驗。","B":"正確：西方墨點法為HIV確認試驗。","C":"南方墨點測DNA。","D":"北方墨點測RNA。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-78":{"quick":"伊波拉病毒經「病患的體液、血液」（接觸）傳播。","detail":{"background":"伊波拉病毒（Ebola）經「直接接觸感染者或屍體的血液、體液、分泌物及污染物」傳播，醫護與照顧者、喪葬接觸為高風險，「非空氣傳播、非蚊媒、非飲水」。故傳播途徑為病患的體液、血液。補充：伊波拉屬絲狀病毒科（Filoviridae）、單股(−)RNA、致死率高的「病毒性出血熱」；經接觸體液/血液/屍體傳播（喪葬接觸高風險），「非空氣傳播」是與結核/麻疹的關鍵區別。防護＝接觸與體液防護、隔離。對照記憶：經接觸體液者尚有HIV、B/C肝；經空氣（負壓隔離）者＝結核、麻疹、水痘。","options":{"A":"非經飲用水。","B":"非經病媒蚊。","C":"非經空氣。","D":"正確：經病患體液、血液（接觸）傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-71":{"quick":"HIV以表面gp120與宿主細胞的「CD4」分子結合而感染。","detail":{"background":"HIV的套膜醣蛋白gp120先結合「CD4」分子（主要在輔助T細胞，也在巨噬細胞、樹突細胞），再結合趨化激素共受體（CCR5/CXCR4），由gp41介導套膜與細胞膜融合而進入。故主要結合分子為CD4。CD3為T細胞受體複合物、CD8為細胞毒殺T、CD21為B細胞的EBV受體。","options":{"A":"CD3為T細胞受體複合物，非HIV結合分子。","B":"正確：gp120與CD4結合。","C":"CD8為細胞毒殺T標記，非HIV受體。","D":"CD21（CR2）為EBV的B細胞受體。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-71":{"quick":"反轉錄病毒的RNA為「正股（+）」、可作mRNA；故「其RNA為負股」錯誤。","detail":{"background":"反轉錄病毒（如HIV）：有套膜、單股「正股（+）」RNA（兩條相同、二倍體）、攜帶反轉錄酶；基因組三大基因為gag（核心蛋白）、pol（反轉錄酶、嵌合酶、蛋白酶）、env（套膜醣蛋白）。其RNA為「正股」，但特別的是不直接轉譯，而是先反轉錄為DNA嵌入宿主基因組。故「其RNA為負股」為錯誤敘述（應為正股）。","options":{"A":"為有套膜的RNA病毒，正確。","B":"主含gag、pol、env基因，正確。","C":"正確（為錯誤敘述）：反轉錄病毒RNA為正股，非負股。","D":"具反轉錄聚合酶，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-75":{"quick":"SARS病毒（冠狀病毒）經「呼吸道飛沫」傳播，「不經病媒蚊」；日本腦炎、黃熱、登革皆為蚊媒。","detail":{"background":"蟲（蚊）媒病毒（arbovirus）：日本腦炎（三斑家蚊）、黃熱病（斑蚊）、登革熱（斑蚊）、西尼羅、屈公等，皆經蚊叮咬傳播。SARS冠狀病毒則經「呼吸道飛沫與接觸」人傳人，「不經病媒蚊」。故不經病媒蚊者為SARS病毒。補充：蟲(蚊)媒病毒(arbovirus)須能「在病媒體內複製」才可傳播——日本腦炎(三斑家蚊)、登革/茲卡/屈公/黃熱(斑蚊)、西尼羅(家蚊)。SARS/MERS/新冠等冠狀病毒則經「呼吸道飛沫與接觸」人傳人、不經蚊。出題：不經病媒蚊者＝呼吸道傳播的SARS。","options":{"A":"日本腦炎經蚊（三斑家蚊）傳播。","B":"正確：SARS經飛沫，不經病媒蚊。","C":"黃熱病經斑蚊傳播。","D":"登革熱經斑蚊傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-76":{"quick":"A型肝炎病毒（HAV）與肝癌「無關」（自限性、不慢性化）；此配對錯誤。","detail":{"background":"致癌病毒正確配對：EBV—Burkitt淋巴瘤/鼻咽癌；HPV—子宮頸癌；HHV-8—卡波西氏肉瘤；HBV/HCV—肝癌。A型肝炎病毒（HAV）為自限性急性肝炎、不慢性化、「與肝癌無關」。故錯誤配對為「A型肝炎與肝癌」（肝癌相關的是B、C型）。","options":{"A":"正確（為錯誤配對）：A肝與肝癌無關（B/C型才相關）。","B":"EBV與Burkitt淋巴瘤相關，正確。","C":"HPV與子宮頸癌相關，正確。","D":"HHV-8與卡波西氏肉瘤相關，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-77":{"quick":"口腔黏膜「柯氏斑點（Koplik spots）」是麻疹的前驅症狀。","detail":{"background":"同前述：柯氏斑點（Koplik spots，頰黏膜對臼齒處藍白色中心紅斑）是麻疹（measles）的特異性前驅病徵，出現於皮疹之前，併3C（咳嗽、鼻炎、結膜炎）與高燒。故為麻疹感染的前驅症狀。補充：麻疹（measles，副黏液病毒、單股(−)RNA、有套膜）前驅「3C」＝Cough咳嗽、Coryza鼻炎、Conjunctivitis結膜炎，併發燒；「柯氏斑(Koplik spots)」於頰黏膜(對臼齒)出現、為皮疹前的特異徵象。皮疹由頭頸向下蔓延。併發症＝肺炎、腦炎、亞急性硬化性全腦炎(SSPE)。預防＝MMR活性減毒疫苗。","options":{"A":"腮腺炎以腮腺腫為主。","B":"正確：柯氏斑點為麻疹前驅症狀。","C":"小兒麻痺無柯氏斑點。","D":"德國麻疹無柯氏斑點。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-78":{"quick":"HIV感染「CD4 T細胞」造成免疫不全症候群。","detail":{"background":"HIV以gp120結合CD4分子，主要感染並耗竭「CD4＋輔助T細胞」（免疫網絡的中樞調控細胞），導致細胞媒介免疫崩潰、伺機性感染與腫瘤，即後天免疫缺乏症候群（AIDS）。故HIV感染的目標細胞為CD4 T細胞。補充：HIV以套膜gp120結合CD4＋共受體(CCR5/CXCR4)、gp41介導融合進入，主要感染並耗竭「CD4輔助T細胞」(及巨噬、樹突細胞)。CD4<200/μL進入AIDS期→伺機性感染(PCP肺炎、念珠菌、CMV、結核)與腫瘤(卡波西肉瘤、淋巴瘤)。治療＝HAART(反轉錄酶+蛋白酶+嵌合酶抑制劑)。篩檢ELISA→西方墨點確認。","options":{"A":"正確：HIV感染CD4 T細胞致免疫不全。","B":"非主要感染CD8 T細胞。","C":"非主要感染CD20 B細胞。","D":"非主要感染CD22 B細胞。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-71":{"quick":"漢他病毒（Hantavirus）主要由「齧齒類（鼠）」為媒介傳播至人。","detail":{"background":"漢他病毒（Hantavirus）為布尼亞病毒科、單股(−)RNA，宿主為「齧齒類（鼠）」，人經吸入鼠類排泄物（尿、糞、唾液）氣溶膠或接觸而感染，致漢他病毒肺症候群或腎症候群出血熱。日本腦炎、黃熱、委內瑞拉腦炎皆為「蚊媒」病毒。故由齧齒類傳播者為漢他病毒。","options":{"A":"日本腦炎經蚊傳播。","B":"正確：漢他病毒由齧齒類（鼠）傳播。","C":"黃熱病經蚊傳播。","D":"委內瑞拉腦炎經蚊傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-71":{"quick":"AIDS因HIV感染造成「CD4 T細胞」減少。","detail":{"background":"AIDS（後天免疫缺乏症候群）是HIV持續感染、耗竭「CD4＋輔助T細胞」的結果——CD4細胞是協調細胞與體液免疫的核心，其數量下降（<200/μL）使免疫崩潰、出現伺機性感染（PCP肺炎、念珠菌、CMV）與腫瘤（卡波西肉瘤、淋巴瘤）。故減少的細胞為CD4 T細胞。","options":{"A":"非B細胞主要減少。","B":"正確：CD4 T細胞減少。","C":"巨噬細胞非主要被耗竭族群。","D":"NK細胞非主要被耗竭族群。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-78":{"quick":"神經胺酸酶抑制劑（如克流感）用於流感、「無法用於HIV」；HIV用核苷類、蛋白酶、嵌合酶抑制劑。","detail":{"background":"抗HIV藥物針對其複製步驟：核苷/非核苷類反轉錄酶抑制劑、蛋白酶抑制劑、嵌合酶（integrase）抑制劑、入侵/融合抑制劑。「神經胺酸酶抑制劑（neuraminidase inhibitor，如oseltamivir/zanamivir）」是「抗流感病毒」藥（抑制流感NA、阻子代釋出），與HIV複製無關、「無法用於HIV」。故無法抑制HIV者為神經胺酸酶抑制劑。","options":{"A":"正確：神經胺酸酶抑制劑為抗流感藥，無法用於HIV。","B":"核苷類似物為HIV反轉錄酶抑制劑。","C":"蛋白酶抑制劑為抗HIV藥。","D":"嵌合酶抑制劑為抗HIV藥。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-78":{"quick":"單純疱疹病毒（HSV）潛伏於「神經節（背根/三叉神經節）的神經細胞」內。","detail":{"background":"單純疱疹病毒（HSV-1/2，疱疹病毒科）初次感染後沿感覺神經逆行，「潛伏於神經節（HSV-1於三叉神經節、HSV-2於薦神經節）的神經細胞」內，受壓力、發燒、日曬等誘發時再活化、沿神經回到皮膚黏膜復發（唇疱疹、生殖器疱疹）。故潛伏於神經節神經細胞者為單純疱疹病毒。（EBV潛伏B細胞、CMV潛伏單核/骨髓細胞、日本腦炎不潛伏神經節。）","options":{"A":"EBV潛伏於B細胞，非神經節。","B":"CMV潛伏單核白血球/骨髓前驅細胞。","C":"正確：單純疱疹病毒潛伏於神經節神經細胞。","D":"日本腦炎病毒不以潛伏神經節為特性。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-79":{"quick":"登革熱病毒「有四種血清型」；故「只有一種血清型」錯誤。","detail":{"background":"登革熱病毒有「四種血清型（DENV 1–4）」。感染一型後對該型終身免疫、對其他型僅短暫交叉保護；當「再次感染不同血清型」時，因「抗體依賴增強作用（ADE）」反而促進病毒入侵、使重症（登革出血熱、休克）風險增加。經埃及斑蚊等傳播。故「只有一種血清型」與事實相反、為錯誤。","options":{"A":"正確（為錯誤敘述）：登革病毒有四種血清型，非一種。","B":"可經埃及斑蚊傳播，正確。","C":"多次（不同型）感染重症機率增加，正確。","D":"嚴重者有出血與休克，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-80":{"quick":"病毒缺乏核糖體，必須利用宿主細胞的「轉譯（translation）」機制合成自身蛋白質。","detail":{"background":"病毒沒有核糖體與蛋白質合成機器，故「必須利用宿主細胞的轉譯（translation）」系統（核糖體、tRNA、轉譯因子）來合成病毒蛋白——這是所有病毒（不論DNA或RNA）共通且不可或缺的依賴。RNA剪接、轉錄則因病毒種類而異（如+ssRNA可自帶聚合酶複製、不一定需宿主轉錄），轉導是細菌基因轉移。故必為病毒所用者為轉譯。","options":{"A":"RNA剪接非所有病毒都需宿主進行。","B":"轉錄因病毒類型而異，非絕對必需宿主。","C":"正確：病毒無核糖體，必須用宿主轉譯機制合成蛋白。","D":"轉導為細菌基因轉移，與此無關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-48":{"quick":"沙克（Salk）疫苗為「注射、不活化」；沙賓（Sabin）疫苗為「口服、活性減毒」。","detail":{"background":"小兒麻痺兩種疫苗：①「沙克（Salk）疫苗」——「注射」的「去活化（不活化）」疫苗，安全（無回復毒性風險）、誘導血清IgG；②「沙賓（Sabin）疫苗」——「口服」的「活性減毒」疫苗，能誘導腸道IgA與群體免疫，但極少數可回復毒性致疫苗相關麻痺。故正確為「沙克注射、沙賓口服」。","options":{"A":"正確：沙克為注射、沙賓為口服。","B":"敘述顛倒（沙克注射、沙賓口服）。","C":"顛倒：沙克為去活化、沙賓為減毒活性。","D":"沙克為注射、非均口服。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-48":{"quick":"帶狀疱疹（shingles）由「水痘帶狀疱疹病毒（VZV）」再活化引起，非單純疱疹（HSV）；此配對錯誤。","detail":{"background":"正確配對：EBV—傳染性單核球增多症；JC病毒—進行性多灶性腦白質病變（PML）；微小病毒B19—傳染性紅斑（第五病）。「帶狀疱疹（shingles）」是「水痘帶狀疱疹病毒（VZV）」潛伏於背根神經節後再活化所致，「非單純疱疹病毒（HSV）」。故錯誤配對為「單純疱疹—帶狀疱疹」。","options":{"A":"EBV致傳染性單核球增多症，正確。","B":"JC病毒致PML，正確。","C":"正確（為錯誤配對）：帶狀疱疹由VZV引起，非HSV。","D":"微小病毒B19致傳染性紅斑，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-49":{"quick":"輪狀病毒「無特效抗病毒藥」，以支持療法（補液）為主；故「可用抗病毒藥治療」錯誤。","detail":{"background":"輪狀病毒（rotavirus）為雙股、分節RNA病毒，是嬰幼兒嚴重腹瀉主因；「無特效抗病毒藥」，治療以「補充水分電解質（口服或靜脈ORS）」支持為主。已有「口服減毒疫苗」可預防；同時感染兩種血清型時其分節基因可發生「重組（reassortment）」。故「可用抗病毒藥物治療」為錯誤敘述。","options":{"A":"正確（為錯誤敘述）：輪狀病毒無抗病毒藥，以補液支持為主。","B":"已有口服疫苗，正確。","C":"為嬰幼兒嚴重腹瀉主因，正確。","D":"分節基因可發生重組，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-50":{"quick":"正黏液病毒（流感，Orthomyxovirus）具「分節（segmented）」基因組。","detail":{"background":"具分節（多片段）基因組的RNA病毒主要有：正黏液病毒（流感，8段）、布尼亞病毒（漢他，3段）、呼腸病毒（輪狀，10–11段）、沙狀病毒（2段）。分節基因組讓不同病毒株共感染時可「基因重組（reassortment）」（流感抗原轉移的基礎）。彈狀病毒、小RNA病毒、黃病毒皆為「不分節」單股RNA。故具分節基因組者為正黏液病毒（流感）。","options":{"A":"彈狀病毒為不分節單股RNA。","B":"小RNA病毒為不分節單股RNA。","C":"黃病毒為不分節單股RNA。","D":"正確：正黏液病毒（流感）具分節基因組。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-47":{"quick":"子宮頸癌最相關的是「第16型（與18型）人類乳突病毒（HPV-16）」。","detail":{"background":"人類乳突病毒高危型中，「HPV-16與18」與子宮頸癌（及肛門、口咽癌）關係最密切，約占子宮頸癌的70%；其E6、E7致癌蛋白使p53、Rb失活致細胞癌變。HPV疫苗（如九價）涵蓋16、18等型。低危型（6、11）致生殖器疣。故與子宮頸癌最相關為16型。","options":{"A":"13型非高危致癌型。","B":"14型非高危致癌型。","C":"15型非高危致癌型。","D":"正確：HPV-16與子宮頸癌最相關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-48":{"quick":"病毒無症狀感染者「仍可能散播病毒」給他人；此敘述正確。","detail":{"background":"病毒無症狀感染（asymptomatic/subclinical infection）：①不同病毒發生無症狀感染的機率「不同」；②慢性感染「不一定」皆無症狀；③「即使無症狀，感染者仍可能排出並散播病毒」（如無症狀帶原的B肝、無症狀的腸病毒、COVID-19）——這是防疫的重要挑戰；④初期無症狀不代表後期一定輕微。故正確敘述為「雖無症狀，病毒仍可能被散布」。","options":{"A":"不同病毒無症狀感染機率不同。","B":"慢性感染不一定皆無症狀。","C":"正確：無症狀感染者仍可能散播病毒。","D":"初期無症狀不代表後期較輕。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-49":{"quick":"「恐水症（hydrophobia）」是狂犬病（rabies）的特殊病徵。","detail":{"background":"狂犬病（rabies）侵犯中樞神經，造成吞嚥肌痙攣，使患者一見水或試圖喝水即引發劇烈咽喉痙攣與恐懼，稱「恐水症（hydrophobia）」，併恐風、躁動、流涎、麻痺，幾乎100%致命。故恐水症為狂犬病的特殊病徵。補充：狂犬病毒(rabies，彈狀病毒、子彈狀、單股(−)RNA)經染病動物咬傷傳入，沿周邊神經逆行至中樞，神經細胞質形成「內格里小體(Negri body)」。症狀：恐水(吞嚥肌痙攣)、恐風、躁動、流涎、麻痺，發病後幾乎100%致命。咬傷後處置＝傷口清洗+暴露後預防(疫苗+免疫球蛋白)，發病前接種可救命。","options":{"A":"HIV無恐水症。","B":"HTLV無恐水症。","C":"CMV無恐水症。","D":"正確：恐水症為狂犬病特殊病徵。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-49":{"quick":"HPV-16致子宮頸癌與口咽癌（E6致癌）；「傳染性軟疣（molluscum contagiosum）」由痘病毒引起，非HPV-16；此敘述錯誤。","detail":{"background":"HPV-16為高危致癌型：①增加子宮頸癌風險；②增加口咽癌風險；④E6（與E7）為致癌基因（使p53、Rb失活）。而「傳染性軟疣（molluscum contagiosum）」是由「傳染性軟疣病毒（屬痘病毒科）」引起，「並非HPV-16」（HPV低危型6、11致的是生殖器疣condyloma，非軟疣）。故錯誤敘述為C。","options":{"A":"HPV-16增加子宮頸癌機率，正確。","B":"HPV-16增加口咽癌機率，正確。","C":"正確（為錯誤敘述）：傳染性軟疣由痘病毒引起，非HPV-16。","D":"HPV-16 E6為致癌基因，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-48":{"quick":"接種以減弱天花病毒株製成的疫苗（JYNNEOS）可降低罹患猴痘的機會。","detail":{"background":"猴痘（mpox）由「猴痘病毒」（痘病毒科，與天花病毒同屬正痘病毒、有交叉免疫）引起——「並非天花病毒」、可由染病動物與「人傳人（密切接觸、體液、飛沫）」傳播（不只猴傳人）。因與天花交叉免疫，接種「以減弱天花病毒株製成的疫苗（JYNNEOS）」可降低罹患猴痘的風險。猴痘不造成傳染性軟疣（那是另一種痘病毒）。故最適當為C。","options":{"A":"猴痘由猴痘病毒引起，非天花病毒。","B":"可人傳人，非只由猴傳人。","C":"正確：接種JYNNEOS（減弱天花病毒株）可降低猴痘風險。","D":"猴痘不造成傳染性軟疣。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-49":{"quick":"流感的關節痛是免疫/發炎反應所致，「非病毒直接破壞關節」；故此項不包括。","detail":{"background":"流感的全身症狀（發燒、喉嚨痛、肌肉關節痠痛）來自：①病毒對呼吸道上皮的直接破壞；②T細胞免疫反應與細胞激素（IL-1、IL-6、TNF）；③干擾素引起的全身反應（發燒、倦怠、肌肉痠痛）。流感病毒「不會直接破壞關節」——關節痛是全身性發炎與細胞激素的表現，並非病毒侵入關節。故「不包括」者為「病毒對關節的直接破壞」。","options":{"A":"病毒破壞呼吸道上皮，是症狀原因之一。","B":"正確：流感不直接破壞關節（為免疫/發炎所致），故不包括。","C":"T細胞免疫反應是症狀原因之一。","D":"干擾素引起的反應是症狀原因之一。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-49":{"quick":"腸病毒感染主要為手足口病/咽峽炎/神經侵犯，「腸胃道不適非主要症狀」；此敘述錯誤。","detail":{"background":"腸病毒（enterovirus）：①是「一群」病毒（克沙奇、伊科、EV71、小兒麻痺等）的總稱；②雖名「腸」病毒、經腸道（糞口）感染複製，但「臨床上腸胃道症狀並不明顯」，主要表現是手足口病、疱疹性咽峽炎、發燒，重症可致肢體麻痺、腦幹腦炎、心肌炎；③EV71等可致肢體麻痺併發症；④手足口病為常見症狀。故「感染後常出現腸胃道不適症狀」與臨床不符、為錯誤。","options":{"A":"腸病毒為一群病毒總稱，正確。","B":"正確（為錯誤敘述）：腸胃道不適非腸病毒主要症狀。","C":"可有肢體麻痺併發症，正確。","D":"手足口病為常見症狀，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-48":{"quick":"腺病毒感染「以小孩居多」（兒童常見）；故「以大人居多、小孩少」錯誤。","detail":{"background":"腺病毒（adenovirus，無套膜DNA病毒）造成結膜炎（含游泳池結膜炎）、上呼吸道感染、肺炎、腸胃炎、出血性膀胱炎，「兒童（尤其幼兒、托嬰機構）感染常見」，並非以大人居多。目前無特定抗病毒藥（支持療法為主）。故「感染以大人居多、小孩較少」與事實相反、為錯誤。","options":{"A":"可致結膜炎、呼吸道、腸胃炎，正確。","B":"正確（為錯誤敘述）：腺病毒以小孩感染居多。","C":"基因體為DNA，正確。","D":"無特定抗病毒藥，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-49":{"quick":"流感病毒基因組為「八段『負股』RNA」；故「八段正股RNA」錯誤。","detail":{"background":"流行性感冒病毒：有套膜、基因組為「八段（分節）」的「單股『負股』(−)RNA」（負股需自帶RNA聚合酶先轉錄成mRNA）。可經飛沫與人畜（禽流感）傳播；zanamivir（神經胺酸酶抑制劑）可治A、B型流感；有不活化疫苗預防。故「八段『正股』RNA」為錯誤（應為負股）。","options":{"A":"正確（為錯誤敘述）：流感為八段「負股」RNA，非正股。","B":"可經飛沫與人畜共同傳染，正確。","C":"zanamivir可治A、B型流感，正確。","D":"有去活化疫苗可預防，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-49":{"quick":"茲卡病毒（Zika）由「斑蚊（埃及斑蚊）」傳播，非「蜱」；此配對錯誤。","detail":{"background":"蟲媒病毒與媒介配對：登革病毒—斑蚊（正確）；屈公病毒（Chikungunya）—斑蚊（正確）；克里米亞-剛果出血熱病毒—蜱（正確）。茲卡病毒（Zika）屬黃病毒科，主要由「斑蚊（埃及斑蚊）」傳播（亦可性傳與母嬰垂直致小頭症），「並非蜱」。故錯誤配對為「茲卡病毒/蜱」。","options":{"A":"登革病毒由斑蚊傳播，正確。","B":"正確（為錯誤配對）：茲卡病毒由斑蚊傳播，非蜱。","C":"屈公病毒由斑蚊傳播，正確。","D":"克里米亞-剛果出血熱由蜱傳播，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-44":{"quick":"目前「尚無有效的HIV疫苗」能誘發保護性中和抗體；故「現有HIV疫苗可有效預防」錯誤。","detail":{"background":"疫苗原則：接種是預防傳染病最有效的方法；減毒活疫苗通常比死病毒疫苗誘發更強、更持久的保護性免疫（含細胞免疫），但死（不活化）疫苗較安全（不會因接種而致病）。惟「HIV」因高度變異（套膜gp120多變）、潛伏整合宿主基因組、缺乏自然清除免疫，「至今尚無有效疫苗」能誘發足夠中和抗體。故「目前HIV疫苗可誘發有效中和抗體預防感染」為錯誤敘述。","options":{"A":"正確（為錯誤敘述）：目前尚無有效HIV疫苗誘發中和抗體。","B":"接種疫苗為最有效預防傳染病方法，正確。","C":"減毒活疫苗通常較能引發保護性免疫，正確。","D":"死病毒疫苗較安全、不會因接種致病，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-67":{"quick":"HIV感染初期（急性期）常表現類流感的「淋巴結腫大」與發燒咽痛。","detail":{"background":"HIV感染分期：急性（初期）感染期於暴露後2–4週出現「類單核球增多症」——發燒、咽痛、「全身淋巴結腫大」、皮疹、肌肉痠痛，此時病毒量高、CD4暫降。卡波西氏肉瘤、肺囊蟲肺炎（PCP）、CMV感染等屬「後期（AIDS期）」CD4<200時的伺機性疾病，非初期表現。故感染初期症狀為淋巴結腫大。","options":{"A":"卡波西氏肉瘤為AIDS末期表現。","B":"正確：HIV初期為淋巴結腫大等類流感症狀。","C":"肺囊蟲肺炎為AIDS期伺機感染。","D":"CMV感染為AIDS期伺機感染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-72":{"quick":"嬰孩口腔鵝口瘡由白色念珠菌（Candida albicans）感染引起。","detail":{"background":"鵝口瘡（oral thrush）是口腔黏膜的白色念珠菌感染，常見於嬰兒（免疫未成熟）、使用抗生素或類固醇者、免疫低下者，表現為口腔白色乳凝塊狀斑膜、剝除後黏膜泛紅。白色念珠菌為人體常在的二形性真菌。新型隱球菌致腦膜炎、金黃色葡萄球菌與淋病雙球菌非鵝口瘡病原。","options":{"A":"新型隱球菌主致腦膜炎，非鵝口瘡。","B":"正確：白色念珠菌致鵝口瘡。","C":"金黃色葡萄球菌非鵝口瘡病原。","D":"淋病雙球菌非鵝口瘡病原。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-73":{"quick":"美洲鉤蟲口囊有「一對切板」而非三對牙齒；故「美洲鉤蟲有三對牙齒」錯誤。","detail":{"background":"兩種鉤蟲鑑別：十二指腸鉤蟲（Ancylostoma duodenale）口囊有「兩對牙齒（鉤齒）」、交尾刺兩根平行；美洲鉤蟲（Necator americanus）口囊有「一對切板（cutting plates）」（非三對牙齒）、交尾刺兩根末端癒合成倒鉤。故「美洲鉤蟲有三對牙齒」與事實不符、為錯誤敘述。","options":{"A":"十二指腸鉤蟲口囊有兩對牙齒，正確。","B":"正確（為錯誤敘述）：美洲鉤蟲為一對切板，非三對牙齒。","C":"十二指腸鉤蟲交尾刺二根平行，正確。","D":"美洲鉤蟲交尾刺末端相合有倒鉤，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-74":{"quick":"腦性瘧疾由「惡性瘧原蟲（Plasmodium falciparum）」造成（最致命）。","detail":{"background":"瘧疾由瘧原蟲（Plasmodium）經瘧蚊傳播。其中「惡性瘧原蟲（P. falciparum）」最致命——受感染紅血球表面黏附分子使其黏附微血管內皮（cytoadherence）並阻塞腦部微血管，造成「腦性瘧疾（cerebral malaria）」（意識障礙、抽搐、昏迷、高死亡率）與嚴重貧血、多器官衰竭。間日瘧、卵圓瘧（有肝內潛伏期可復發）、三日瘧較少致腦性瘧疾。","options":{"A":"間日瘧原蟲較少致腦性瘧疾。","B":"卵圓瘧原蟲較少致腦性瘧。","C":"正確：惡性瘧原蟲致腦性瘧疾。","D":"三日瘧原蟲少致腦性瘧。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-74":{"quick":"痢疾阿米巴（Entamoeba histolytica）可經「肛交（糞口性接觸）」傳染。","detail":{"background":"痢疾阿米巴（Entamoeba histolytica）以「成熟囊體（cyst）」經糞口傳播（污染食水），亦可經「口-肛交等性接觸」傳染，造成阿米巴痢疾（血便、腸潰瘍）與腸外阿米巴病（肝膿瘍）。惡性瘧（蚊媒）、蛔蟲（食入蟲卵）、梨形鞭毛蟲（糞口/水）皆非典型經肛交傳播。故經肛交傳染者為痢疾阿米巴。","options":{"A":"惡性瘧經蚊媒，非肛交。","B":"正確：痢疾阿米巴可經肛交（糞口性接觸）傳染。","C":"蛔蟲經食入蟲卵，非肛交。","D":"梨形鞭毛蟲經糞口/污染水，非典型肛交。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-79":{"quick":"披衣菌生活史中具「胞內繁殖能力」的型態為網狀小體（reticulate body, RB）。","detail":{"background":"砂眼披衣菌（Chlamydia trachomatis）雙型生活史：胞外的「原質小體（elementary body, EB）」具感染力、進入細胞；轉為胞內的「網狀小體（reticulate body, RB）」——體大、代謝活躍、「以二分裂在包涵體內繁殖」（但無感染力），再轉回EB釋出。故具胞內繁殖能力的型態為網狀小體。","options":{"A":"囊體為阿米巴等原蟲的型態，非披衣菌。","B":"原質小體具感染力但不繁殖。","C":"正確：網狀小體具胞內繁殖能力。","D":"滋養體為原蟲活動型，非披衣菌型態。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-67":{"quick":"蝨傳、突發頭痛畏寒高燒全身痛者，最可能為流行性斑疹傷寒（普氏立克次體）。","detail":{"background":"流行性斑疹傷寒（epidemic typhus）由「普氏立克次體（Rickettsia prowazekii）」引起，經「體蝨（body louse）」傳播（蝨糞含菌經搔抓傷口進入），多見於擁擠、衛生不良、戰亂環境，突發高燒、劇烈頭痛、肌肉痛、皮疹。地方性斑疹傷寒經鼠蚤、叢林斑疹傷寒（恙蟲病）經恙蟎、斑點熱經蜱。故蝨傳者為流行性斑疹傷寒。","options":{"A":"地方性斑疹傷寒經鼠蚤傳播。","B":"正確：蝨傳者為流行性斑疹傷寒。","C":"叢林斑疹傷寒（恙蟲病）經恙蟎。","D":"斑點熱經蜱傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-76":{"quick":"抗真菌藥中具腎毒性者為多烯類（polyene）「amphotericin B」。","detail":{"background":"Amphotericin B（多烯類polyene）結合真菌細胞膜的麥角固醇（ergosterol）形成孔洞致細胞死亡，是嚴重全身性黴菌感染的藥物，但「腎毒性顯著」（也有發燒寒顫等輸注反應、低血鉀低血鎂）。Azole類（fluconazole）抑制麥角固醇合成、毒性較低；5-FC、griseofulvin非以腎毒性著稱。故具腎毒性者為amphotericin B。","options":{"A":"正確：amphotericin B（多烯類）具腎毒性。","B":"fluconazole腎毒性低。","C":"5-FU/5-FC非以腎毒性著稱。","D":"灰黴素非腎毒性代表。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-80":{"quick":"埃及住血吸蟲（S. haematobium）寄生膀胱靜脈叢，蟲卵須採「尿液」檢出。","detail":{"background":"住血吸蟲（Schistosoma）成蟲寄生於宿主靜脈叢：日本、湄公、曼森住血吸蟲寄生「腸繫膜靜脈」，蟲卵隨「糞便」排出；而「埃及住血吸蟲（S. haematobium）」寄生「膀胱靜脈叢」，蟲卵穿膀胱壁隨「尿液」排出（致血尿、與膀胱癌相關）。故診斷須收集「尿液」檢出蟲卵者為埃及住血吸蟲。","options":{"A":"日本住血吸蟲蟲卵見於糞便。","B":"湄公住血吸蟲蟲卵見於糞便。","C":"曼森住血吸蟲蟲卵見於糞便。","D":"正確：埃及住血吸蟲蟲卵須採尿液檢出。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-74":{"quick":"鞭蟲（Trichuris）經「食入蟲卵」感染，「非幼蟲穿皮」；鉤蟲、糞線蟲則經幼蟲穿皮。","detail":{"background":"土壤傳播蠕蟲的感染途徑：①鉤蟲（十二指腸鉤蟲、美洲鉤蟲）與糞小桿線蟲（Strongyloides）——絲狀幼蟲「經皮膚穿入」（赤腳接觸污染土壤）；②蛔蟲與「鞭蟲（Trichuris trichiura）」——「食入成熟蟲卵」經糞口感染（鞭蟲在大腸發育、不經肺移行）。故不經幼蟲穿皮者為鞭蟲。","options":{"A":"十二指腸鉤蟲經幼蟲穿皮。","B":"美洲鉤蟲經幼蟲穿皮。","C":"正確：鞭蟲經食入蟲卵，非幼蟲穿皮。","D":"糞小桿線蟲經幼蟲穿皮。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-74":{"quick":"孕婦白色念珠菌感染易發生「陰道炎（念珠菌陰道炎）」。","detail":{"background":"懷孕時雌激素上升、陰道肝醣增加與免疫變化，使白色念珠菌易過度增生，造成「念珠菌陰道炎」——外陰搔癢、白色乳酪狀分泌物。鵝口瘡為嬰兒口腔念珠菌感染；結核、濕疹非念珠菌所致。故孕婦念珠菌感染易致陰道炎。補充：白色念珠菌為陰道常在菌，懷孕(雌激素↑、肝醣↑)、糖尿病、抗生素(破壞乳酸桿菌)、免疫低下時過度增生致「念珠菌陰道炎」——外陰搔癢、白色乳酪狀(cottage cheese)分泌物、KOH鏡檢見假菌絲與芽生孢子。治療＝azole(陰道塞劑/口服fluconazole)。鵝口瘡＝嬰兒口腔念珠菌；尿道/血流出現念珠菌則屬感染。","options":{"A":"鵝口瘡為嬰兒口腔念珠菌感染，非孕婦典型。","B":"結核非念珠菌所致。","C":"正確：孕婦念珠菌感染易致陰道炎。","D":"濕疹非念珠菌感染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-75":{"quick":"寄生於人體肺臟、造成咳血者為衛氏肺吸蟲（Paragonimus westermani）。","detail":{"background":"衛氏肺吸蟲（Paragonimus westermani）成蟲寄生於人體「肺臟」，因「生食或醃漬含囊狀幼蟲的淡水蟹、蝦（中間宿主）」而感染，造成肺吸蟲病——慢性咳嗽、「咳血（鐵鏽色或棕色痰）」、胸痛，痰或糞中可見蟲卵，臨床易誤為肺結核。肝吸蟲、薑片蟲寄生肝膽道與腸道，非肺部。故造成咳血的肺寄生蟲為衛氏肺吸蟲。","options":{"A":"正確：衛氏肺吸蟲寄生肺臟、致咳血。","B":"中華肝吸蟲寄生肝膽道。","C":"牛羊肝吸蟲寄生肝膽道。","D":"布氏薑片蟲寄生小腸。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-79":{"quick":"鉤端螺旋體生活史「不需節肢動物媒介」（經鼠尿污染水經皮膚黏膜）；此敘述錯誤。","detail":{"background":"鉤端螺旋體（Leptospira）為螺旋體，存於「帶菌動物（尤鼠類）的腎臟、隨尿排出」污染水土，人經「皮膚黏膜傷口接觸污染水」感染（如颱風淹水後），「不需節肢動物媒介」。人為「偶然（終）宿主」、可用顯微凝集試驗（MAT）診斷、菌可在污染環境存活數週。故「生活史中有節肢動物為媒介」與事實相反、為錯誤。","options":{"A":"正確（為錯誤敘述）：鉤端螺旋體不需節肢動物媒介。","B":"人為偶然/終宿主，正確。","C":"可用顯微凝集試驗檢測，正確。","D":"菌可在污染區存活數週，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-75":{"quick":"易在鴿糞繁殖、經呼吸道感染、致腦膜炎者為新型隱球菌（Cryptococcus neoformans）。","detail":{"background":"新型隱球菌（Cryptococcus neoformans）為有「莢膜」的酵母菌，常存在於「鴿糞」與土壤，人「吸入」孢子經呼吸道感染肺部（初期常無症狀），於免疫低下（愛滋、移植）者播散至中樞，造成「隱球菌腦膜炎」。診斷可用墨汁染色見莢膜、或測莢膜多醣抗原。故鴿糞繁殖、呼吸道傳染者為新型隱球菌。","options":{"A":"肺炎雙球菌非鴿糞繁殖真菌。","B":"立克次體經節肢動物，非鴿糞。","C":"白色念珠菌非鴿糞相關。","D":"正確：新型隱球菌存於鴿糞、經呼吸道致腦膜炎。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-79":{"quick":"孕婦感染弓形蟲（Toxoplasma gondii）可致胎兒視網膜病變與水腦症。","detail":{"background":"岡地弓形蟲（Toxoplasma gondii）為胞內原蟲，貓為終宿主；孕婦經「食入未熟肉中包囊或接觸貓糞中卵囊」初次感染，可「經胎盤垂直感染胎兒」，造成「先天性弓形蟲症」——脈絡視網膜炎（視網膜病變）、腦部鈣化、「水腦症」、智能障礙（典型三聯徵）。屬TORCH群。故孕婦感染致胎兒視網膜病變與水腦症者為弓形蟲。","options":{"A":"正確：弓形蟲致胎兒視網膜病變與水腦症。","B":"惡性瘧主要致母體與胎兒貧血/早產，非此三聯徵。","C":"包生絛蟲致包蟲囊腫，非先天視網膜水腦。","D":"痢疾阿米巴非典型先天感染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-80":{"quick":"地癢（ground itch）由鉤蟲（十二指腸鉤蟲）幼蟲穿透皮膚造成。","detail":{"background":"「地癢（ground itch）」是鉤蟲（十二指腸鉤蟲、美洲鉤蟲）的「絲狀幼蟲經皮膚（多為赤腳接觸污染土壤）穿入」時，於入侵處引起的局部皮膚搔癢紅疹。幼蟲隨血流經肺、上呼吸道被吞入小腸發育為成蟲（吸血致缺鐵性貧血）。蛔蟲、鞭蟲、蟯蟲經食入蟲卵、不致地癢。故地癢為鉤蟲幼蟲穿皮所致。","options":{"A":"蛔蟲經食入蟲卵，不致地癢。","B":"鞭蟲經食入蟲卵。","C":"正確：十二指腸鉤蟲幼蟲穿皮致地癢。","D":"蟯蟲經食入蟲卵（肛門搔癢）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-75":{"quick":"萊姆病的媒介為「硬蜱（hard-shelled tick，Ixodes）」。","detail":{"background":"萊姆病（Lyme disease，B. burgdorferi疏螺旋體）經「硬蜱（hard tick，Ixodes屬，如鹿蜱）」叮咬傳播；典型早期為叮咬處「遊走性紅斑（牛眼狀）」，未治可致神經、心臟與關節（膝）病變。回歸熱經軟蜱/體蝨、斑疹傷寒經體蝨。故萊姆病媒介為硬蜱。","options":{"A":"體蝨傳流行性斑疹傷寒/回歸熱，非萊姆病。","B":"敘述含糊；萊姆病明確為硬蜱。","C":"正確：萊姆病經硬蜱傳播。","D":"軟蜱傳回歸熱（部分Borrelia），非萊姆病。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-76":{"quick":"卡氏肺囊蟲肺炎（PCP）以「染色鏡檢／PCR」診斷，「非血清學抗體」；故此敘述錯誤。","detail":{"background":"肺囊蟲（Pneumocystis jirovecii，舊稱carinii，現歸真菌）主要在免疫低下（尤AIDS CD4<200）者造成「肺囊蟲肺炎（PCP）」——乾咳、漸進呼吸困難、低血氧。初次感染多在肺部；診斷靠「痰/支氣管肺泡灌洗液的染色鏡檢（GMS銀染、甲苯胺藍）或PCR」找病原，「非血清學抗體」（多數人曾感染、抗體無診斷價值）。預防與治療用trimethoprim-sulfamethoxazole（TMP-SMX）。故「以血清學檢驗為診斷依據」為錯誤。","options":{"A":"主要發生於愛滋病人，正確。","B":"初次感染多在肺部，正確。","C":"正確（為錯誤敘述）：PCP靠染色鏡檢/PCR，非血清學抗體。","D":"可用TMP-SMX預防，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-80":{"quick":"蛔蟲（Ascaris）蟲卵以「糞便」鏡檢檢出。","detail":{"background":"蛔蟲（Ascaris lumbricoides）成蟲寄生小腸、雌蟲產卵隨「糞便」排出，故診斷以「糞便鏡檢」找蟲卵（雖幼蟲會經肺移行，但確診靠糞便蟲卵）。尿液用於埃及住血吸蟲、血液用於瘧原蟲/絲蟲、痰用於肺吸蟲/糞線蟲幼蟲。故蛔蟲蟲卵檢出檢體為糞便。","options":{"A":"正確：蛔蟲蟲卵以糞便檢出。","B":"尿液用於埃及住血吸蟲。","C":"血液用於瘧原蟲、絲蟲。","D":"痰用於肺吸蟲、糞線蟲幼蟲。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-75":{"quick":"隱球菌症診斷靠檢測「莢膜多醣抗原（antigen）」或墨汁鏡檢，「非抗體」；故此敘述錯誤。","detail":{"background":"新型隱球菌（Cryptococcus neoformans）：經呼吸道吸入，初期肺部感染多「無症狀」；主要顯性疾病為「隱球菌腦膜炎」；以「出芽酵母菌」形式生長。診斷依據是「檢測腦脊髓液或血清中的『莢膜多醣抗原（CrAg）』」（乳膠凝集或側流免疫分析）或墨汁染色見莢膜，「非檢測抗體」。故「診斷依據為檢驗抗體」為錯誤敘述。","options":{"A":"初期肺感染無症狀，正確。","B":"主要顯性疾病為腦膜炎，正確。","C":"正確（為錯誤敘述）：診斷靠莢膜抗原，非抗體。","D":"以出芽酵母菌形式生長，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-79":{"quick":"檢查新型隱球菌常用「墨汁染色（India ink）」凸顯其莢膜。","detail":{"background":"新型隱球菌有厚的多醣莢膜，於腦脊髓液中以「墨汁染色（India ink staining）」做負染——墨汁使背景變黑，菌體周圍未染色的「莢膜」形成清楚的透明光暈，可快速判讀。革蘭氏染色、抗酸染色、鍍銀染色非偵測隱球菌莢膜的經典快速法。故常用墨汁染色。","options":{"A":"革蘭氏染色非隱球菌莢膜判讀法。","B":"抗酸染色用於分枝桿菌。","C":"鍍銀染色用於真菌組織切片（GMS），非CSF快速墨汁法。","D":"正確：墨汁染色凸顯隱球菌莢膜。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-80":{"quick":"生食含囊狀幼蟲的淡水魚，可感染「中華肝吸蟲（Clonorchis sinensis）」。","detail":{"background":"中華肝吸蟲（Clonorchis sinensis）的感染源為「生食或醃漬未熟的淡水魚（鯉科魚，第二中間宿主）中的囊狀幼蟲（metacercaria）」，幼蟲在十二指腸脫囊、上行至膽管寄生，造成膽管炎、膽結石，長期與「膽管癌」相關。衛氏肺吸蟲經蟹蝦、薑片蟲經水生植物、曼森血吸蟲經皮膚接觸疫水。故生食淡水魚致感染者為中華肝吸蟲。","options":{"A":"正確：中華肝吸蟲經生食淡水魚感染。","B":"衛氏肺吸蟲經淡水蟹蝦。","C":"薑片蟲經水生植物（菱角等）。","D":"曼森血吸蟲經皮膚接觸疫水。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-76":{"quick":"肺結核空洞內「可移動的真菌球（fungus ball）」最可能是麴菌瘤（aspergilloma）。","detail":{"background":"麴菌（Aspergillus）可在原有的肺空洞（如已癒合的結核空洞、支氣管擴張）內定殖、增生形成「麴菌球（aspergilloma/fungus ball）」——影像上空洞內可隨體位「移動」的圓形腫塊（伴新月狀氣影），臨床常以「咳血」表現。念珠菌、接合菌、隱球菌較不形成此可移動真菌球。故為麴菌症（aspergillosis）。","options":{"A":"念珠菌不典型形成肺內可移動真菌球。","B":"正確：麴菌症形成可移動的麴菌球。","C":"接合菌症為侵襲血管壞死，非真菌球。","D":"隱球菌不形成此真菌球。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-80":{"quick":"孕婦感染弓形蟲（Toxoplasma gondii）可經胎盤致胎兒先天性感染。","detail":{"background":"弓形蟲（Toxoplasma gondii）屬TORCH群，孕婦初次感染可「經胎盤垂直傳染胎兒」，造成先天性弓形蟲症（脈絡視網膜炎、腦部鈣化、水腦、智能障礙）。痢疾阿米巴、鞭蟲、陰道滴蟲皆不經胎盤造成先天性感染。故經胎盤致先天感染者為弓形蟲。","options":{"A":"痢疾阿米巴不經胎盤先天感染。","B":"鞭蟲不經胎盤。","C":"陰道滴蟲不經胎盤先天感染。","D":"正確：弓形蟲經胎盤致先天性感染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-77":{"quick":"鼻腦接合菌症（毛黴菌病）主要發生於「糖尿病（酮酸中毒）」患者。","detail":{"background":"鼻腦接合菌症（rhinocerebral zygomycosis/mucormycosis，毛黴菌、根黴菌）好發於「糖尿病酮酸中毒」與免疫嚴重低下者——高血糖酸性環境與游離鐵利於毛黴菌增殖，菌絲侵入血管造成組織梗塞壞死，由鼻竇快速蔓延至眼眶與腦，致死率高。故主要發生於糖尿病患者。","options":{"A":"愛滋非鼻腦接合菌症典型族群。","B":"正確：主要發生於糖尿病（酮酸中毒）患者。","C":"毒癮非典型族群。","D":"早產兒非典型族群。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-80":{"quick":"游泳癢（swimmer’s itch）由「非人類（禽鳥）血吸蟲」尾動幼蟲穿皮引起。","detail":{"background":"游泳癢（swimmer’s itch，尾動幼蟲皮膚炎）是「非人類宿主（鳥類、哺乳動物）的血吸蟲尾動幼蟲（cercaria）」，誤鑽入人皮膚後因人非適宜宿主而死於皮內，引起的過敏性丘疹搔癢。它不會在人體發育為成蟲（與人類住血吸蟲不同）。故游泳癢由非人類血吸蟲所致。","options":{"A":"日本住血吸蟲為人類血吸蟲，致典型住血吸蟲病非游泳癢。","B":"正確：游泳癢由非人類（禽鳥）血吸蟲尾動幼蟲引起。","C":"十二指腸鉤蟲幼蟲致地癢，非游泳癢。","D":"美洲鉤蟲幼蟲致地癢，非游泳癢。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-80":{"quick":"廣東住血線蟲經「食入含感染性幼蟲的陸螺、蛞蝓」感染（人為偶然宿主，致嗜酸性腦膜炎）。","detail":{"background":"廣東住血線蟲（Angiostrongylus cantonensis）：人「食入含第三期感染性幼蟲的陸螺、蛞蝓（或污染的生菜、被其爬過的蔬果）」而感染；人是「偶然宿主」，幼蟲移行至中樞神經但「無法發育為成蟲」（成蟲寄生於鼠肺動脈），造成「嗜酸性球腦膜炎」。診斷靠臨床與腦脊髓液嗜酸性球增多（糞便找不到蟲卵）。台灣有病例。故正確為「吃入含幼蟲的陸螺蛞蝓會感染」。","options":{"A":"正確：食入含感染性幼蟲的陸螺、蛞蝓會造成感染。","B":"人體內幼蟲無法發育為成蟲（鼠肺動脈才有成蟲）。","C":"人糞便中找不到蟲卵，非確診依據。","D":"台灣有確定病例報告。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-74":{"quick":"白色念珠菌為常在菌，若在「尿道（泌尿道）」發現具意義、表示已受感染。","detail":{"background":"白色念珠菌（C. albicans）是口腔、腸胃道、女性生殖道（陰道）的「正常常在菌叢」，在這些部位少量存在屬正常。但「尿道（泌尿道）」在健康狀態為相對無菌部位，於此處培養出念珠菌（尤其導尿、糖尿病、免疫低下者）則具臨床意義、表示「念珠菌泌尿道感染」。故在尿道發現表示已受感染。","options":{"A":"口腔少量念珠菌屬常在。","B":"腸胃道有念珠菌屬常在。","C":"女性生殖道少量念珠菌屬常在菌叢。","D":"正確：尿道（泌尿道）發現念珠菌表示已受感染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-80":{"quick":"犬蛔蟲（Toxocara canis）蟲卵入人體孵化成幼蟲，移行至肝、肺等致「內臟幼蟲移行症」。","detail":{"background":"犬蛔蟲（Toxocara canis）以犬為終宿主；人（尤幼童）「誤食污染土壤中的蟲卵」後，蟲卵在腸內孵化成「幼蟲」，但因人為非適宜宿主，幼蟲「無法在小腸發育為成蟲」，而是穿腸壁隨血流「移行至肝、肺、眼、腦」，造成「內臟幼蟲移行症（VLM）」與眼幼蟲移行症，併嗜酸性球增多。因人體無成蟲產卵，「糞便檢查不到蟲卵」（靠血清學診斷）。故正確為「蟲卵孵化成幼蟲移行肝肺致病」。","options":{"A":"幼蟲在人體不發育為成蟲（人非適宜宿主）。","B":"正確：蟲卵孵化成幼蟲、移行肝肺致病（VLM）。","C":"人糞便檢查不到蟲卵（無成蟲），非診斷依據。","D":"幼蟲在人體移行致病，非很快排出。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-75":{"quick":"Amphotericin B破壞真菌的主要標的是「細胞膜（結合麥角固醇）」。","detail":{"background":"Amphotericin B為多烯類抗真菌劑，與真菌「細胞膜」上的「麥角固醇（ergosterol）」結合，形成跨膜孔洞使鉀離子等胞內物質外漏、細胞死亡（人細胞膜為膽固醇、親和力較低，但仍有腎毒性）。故作用標的為細胞膜（非細胞壁、核酸或粒線體）。","options":{"A":"非作用於細胞壁（echinocandin才作用於細胞壁葡聚醣）。","B":"正確：amphotericin B結合細胞膜麥角固醇。","C":"非作用於核酸（5-FC才抑制核酸）。","D":"非作用於粒線體。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-76":{"quick":"真菌標本常用「過碘酸-希夫染色（PAS, periodic acid-Schiff）」。","detail":{"background":"真菌的細胞壁富含多醣（葡聚醣、幾丁質），故組織切片中真菌常以「過碘酸-希夫染色（PAS）」或銀染（GMS, Gomori methenamine silver）顯色——PAS把多醣染成洋紅/紫紅色，凸顯菌絲與酵母。抗酸染色用於分枝桿菌、革蘭氏染色用於細菌、H&E為一般組織染色。故真菌常用PAS染色。","options":{"A":"正確：真菌常用PAS（過碘酸-希夫）染色。","B":"抗酸染色用於分枝桿菌。","C":"革蘭氏染色用於細菌。","D":"H&E為一般組織染色，非真菌專染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-80":{"quick":"食用淡水蝦蟹可感染「衛氏肺吸蟲（Paragonimus westermani）」。","detail":{"background":"衛氏肺吸蟲（Paragonimus westermani）的第二中間宿主為「淡水蟹、蝲蛄（淡水蝦蟹）」，人「生食或醃漬」其中囊狀幼蟲而感染，成蟲移行至肺，致咳嗽咳血、胸痛（易誤為肺結核）。中華肝吸蟲經淡水魚、薑片蟲經水生植物、曼森血吸蟲經皮膚疫水。故食用淡水蝦蟹致感染者為衛氏肺吸蟲。","options":{"A":"中華肝吸蟲經生食淡水魚。","B":"正確：衛氏肺吸蟲經生食淡水蝦蟹。","C":"薑片蟲經水生植物。","D":"曼森住血吸蟲經皮膚接觸疫水。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-75":{"quick":"威脅生命的擴散性念珠菌症主要發生於「惡性血液疾病併持續免疫抑制」的中性球低下者。","detail":{"background":"擴散性（侵襲性）念珠菌症與念珠菌血症好發於「嗜中性球嚴重低下」的患者——惡性血液疾病（白血病）化療後、造血幹細胞移植後、長期使用免疫抑制劑、中心靜脈導管、廣效抗生素破壞菌叢者。念珠菌經導管或腸道移位入血，播散至多器官、致死率高。故主要族群為惡性血液疾病併免疫抑制者。","options":{"A":"愛滋以黏膜念珠菌（鵝口瘡、食道炎）為主，非典型擴散性念珠菌血症。","B":"糖尿病為念珠菌黏膜感染因子，非擴散性念珠菌主因。","C":"類固醇增風險但非最典型擴散性族群。","D":"正確：惡性血液疾病併免疫抑制（中性球低下）最易擴散性念珠菌症。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-76":{"quick":"黴菌「不一定皆為多細胞」——酵母菌為單細胞；故「黴菌皆多細胞」錯誤。","detail":{"background":"細菌與黴菌比較：①細菌為原核、黴菌為真核（正確）；②細菌多為單細胞，黴菌「有單細胞（酵母菌yeast）與多細胞（黴/絲狀菌mold）」，故「黴菌皆多細胞」錯誤；③細菌多無性（二分裂），黴菌可有性與無性生殖（正確）；④細菌細胞壁含peptidoglycan、黴菌細胞壁含葡聚醣與幾丁質（正確）。故錯誤者為B。","options":{"A":"細菌原核、黴菌真核，正確。","B":"正確（為錯誤敘述）：黴菌不皆多細胞（酵母菌為單細胞）。","C":"黴菌可有性生殖，正確。","D":"黴菌細胞壁含葡聚醣與幾丁質，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-80":{"quick":"機構/難民營/托育中心擁擠環境須特別注意「痢疾阿米巴」等糞口傳播原蟲（人傳人）。","detail":{"background":"在精神病院、難民營、擁擠托育中心等「人口密集、衛生條件不佳、易糞口交叉污染」的場所，須特別注意經「糞口（人傳人）」傳播的腸道原蟲——痢疾阿米巴（Entamoeba histolytica，囊體可直接人傳人）、梨形鞭毛蟲、隱孢子蟲，易群聚流行。蛔蟲、鞭蟲、糞線蟲的蟲卵/幼蟲須在「土壤」中發育後才具感染力（非直接人傳人）。故須特別注意者為痢疾阿米巴。","options":{"A":"蛔蟲蟲卵需土中發育，非直接人傳人。","B":"鞭蟲蟲卵需土中發育。","C":"糞線蟲經土中幼蟲穿皮。","D":"正確：痢疾阿米巴囊體可直接人傳人、易在密集場所群聚。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-75":{"quick":"此題送分；白色念珠菌可呈酵母、假菌絲與菌絲多型態，題幹敘述易混淆故全給分。","detail":{"background":"本題公告一律給分。學理上，白色念珠菌（C. albicans）為「二形性（dimorphic）」真核真菌：在組織內可呈「酵母型（出芽）、假菌絲（pseudohypha）與真菌絲（hypha）」，並可形成芽管（germ tube）。選項稱其為「菌絲型（mold form）」的敘述與「念珠菌主要以酵母/假菌絲存在」的描述易生爭議，故本題各選項均給分。","options":{"A":"念珠菌非單純黴（mold）型（本題送分）。","B":"會出芽，正確（本題送分）。","C":"有假菌絲，正確（本題送分）。","D":"為真核生物，正確（本題送分，各選項均給分）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-76":{"quick":"足癬（tinea pedis）屬「皮膚（cutaneous）」黴菌病，非「表淺性（superficial）」黴菌病。","detail":{"background":"黴菌病依侵犯深度分：①「表淺性（superficial）」——僅角質層最外層或毛幹，如花斑癬（pityriasis versicolor）、黑癬（tinea nigra）、毛幹黑/白節病（black/white piedra），幾無發炎；②「皮膚性（cutaneous）」——侵犯角質、毛髮、指甲的皮癬菌病，如足癬（香港腳tinea pedis）、體癬、頭癬，有發炎反應。故不屬「表淺性」者為足癬（屬皮膚性）。","options":{"A":"花斑癬為表淺性黴菌病。","B":"黑癬為表淺性黴菌病。","C":"正確：足癬屬皮膚性黴菌病，非表淺性。","D":"毛幹黑節病為表淺性黴菌病。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-80":{"quick":"有鉤絛蟲（Taenia solium）的幼蟲「會」在人體形成囊蟲（囊尾幼蟲症）；故「幼蟲不會在人體致病」錯誤。","detail":{"background":"豬肉絛蟲／有鉤絛蟲（Taenia solium）：成蟲寄生人小腸（頭節有吸盤與兩圈小鉤）；其特殊危險在於若人「誤食蟲卵」，幼蟲（六鉤蚴）可在「人體」組織（腦、肌肉、眼）發育成「囊尾幼蟲（cysticercus）」，造成「囊蟲症（cysticercosis）」，腦囊蟲可致癲癇——這是與牛肉絛蟲最大不同。故「幼蟲不會在人體生存致病」與事實相反、為錯誤。台灣有病例。","options":{"A":"成蟲寄生小腸引起腸病變，正確。","B":"台灣曾發現病例，正確。","C":"正確（為錯誤敘述）：有鉤絛蟲幼蟲會在人體形成囊蟲致病。","D":"頭節有吸盤及二圈小鉤，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-78":{"quick":"白色念珠菌通常為「二倍體（diploid）」，非單倍體；故「通常是單倍體」錯誤。","detail":{"background":"白色念珠菌（Candida albicans）特性：①基因組「通常為二倍體（diploid）」（不行典型有性生殖），故「單倍體」敘述錯誤；②在血清中37°C可形成「芽管（germ tube）」（鑑別試驗陽性）；③在CHROMagar Candida呈色培養基上呈「綠色菌落」；④為常見伺機性致病真菌（鵝口瘡、陰道炎、念珠菌血症）。故錯誤者為A。","options":{"A":"正確（為錯誤敘述）：白色念珠菌通常為二倍體，非單倍體。","B":"芽管試驗陽性、形成芽管，正確。","C":"在CHROMagar呈綠色菌落，正確。","D":"為常見伺機性致病菌，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-79":{"quick":"黴菌與人類細胞最大結構差別在於黴菌有「細胞壁」（人類細胞無）。","detail":{"background":"黴菌為真核生物，與人類細胞同樣有細胞核、粒線體、內質網等胞器；最大的結構差異是黴菌有「細胞壁」（成分為葡聚醣、甘露聚醣與幾丁質），人類細胞「沒有細胞壁」。此外黴菌細胞膜的固醇為「麥角固醇（ergosterol）」（人類為膽固醇），是抗真菌藥的選擇性標的。故最大結構差別為細胞壁。","options":{"A":"正確：黴菌有細胞壁，人類細胞無（最大差別）。","B":"兩者皆有細胞膜（固醇種類不同）。","C":"兩者皆有細胞核（皆真核）。","D":"兩者皆有粒線體。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-80":{"quick":"日本血吸蟲的生活史「不需經血液循環到肺」即可到達寄生部位（門脈系統）發育成蟲。","detail":{"background":"部分腸道線蟲（蛔蟲、鉤蟲、糞線蟲）有「肺移行期」——幼蟲須經血流到肺、穿肺泡上呼吸道、再被吞入小腸發育為成蟲。而「日本血吸蟲（Schistosoma japonicum）」的尾動幼蟲穿皮入血後，「直接隨血流經心肺到門脈—腸繫膜靜脈系統」寄生發育，其成熟寄生部位本身即在血管內（不需如腸線蟲般經肺再回腸道發育）。故不需「經血液循環到肺再到寄生部位」者，本題答案為日本血吸蟲。","options":{"A":"鉤蟲有肺移行期。","B":"糞線蟲有肺移行期。","C":"正確：日本血吸蟲不需如腸線蟲經肺再到腸發育（直接於血管系統寄生）。","D":"蛔蟲有肺移行期。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-78":{"quick":"隱球菌屬（Cryptococcus）不是皮膚/毛髮/指甲的皮癬菌；皮癬菌為表皮癬菌、小芽胞菌、毛髮癬菌三屬。","detail":{"background":"皮膚黴菌病（cutaneous mycoses，俗稱癬）的病原是「皮癬菌（dermatophytes）」，僅三屬：表皮癬菌屬（Epidermophyton）、小芽胞菌屬（Microsporum）、毛髮癬菌屬（Trichophyton），侵犯角質、毛髮、指甲。隱球菌屬（Cryptococcus）為有莢膜的酵母菌、致肺與腦膜感染，「非皮癬菌」。故不屬皮膚黴菌者為隱球菌屬。","options":{"A":"正確：隱球菌屬非皮癬菌（致肺/腦膜感染）。","B":"表皮癬菌為皮癬菌。","C":"小芽胞菌為皮癬菌。","D":"毛髮癬菌為皮癬菌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-79":{"quick":"克魯斯念珠菌（Candida krusei）對fluconazole「天然抗藥」，不建議以氟康唑治療。","detail":{"background":"Fluconazole對多數白色念珠菌、近平滑念珠菌、杜氏念珠菌有效；但「克魯斯念珠菌（Candida krusei）對fluconazole天然（內在）抗藥」，光滑念珠菌（C. glabrata）也常抗藥。故克魯斯念珠菌感染不宜用fluconazole，應改用echinocandin（caspofungin等）或amphotericin B。故不建議用fluconazole者為克魯斯念珠菌。","options":{"A":"白色念珠菌對fluconazole多敏感。","B":"杜氏念珠菌對fluconazole多敏感。","C":"正確：克魯斯念珠菌對fluconazole天然抗藥。","D":"近平滑念珠菌對fluconazole多敏感。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-80":{"quick":"與膽管癌最相關的吸蟲為「中華肝吸蟲（Clonorchis sinensis）」。","detail":{"background":"中華肝吸蟲（Clonorchis sinensis）成蟲寄生於膽管，長期感染造成膽管慢性發炎、增生，與「膽管癌（cholangiocarcinoma）」的發生密切相關（WHO列為致癌因子；泰國的麝貓後睪吸蟲Opisthorchis亦然）。經生食淡水魚感染。故與膽管癌最相關者為中華肝吸蟲。","options":{"A":"槍狀肝吸蟲非主要膽管癌相關。","B":"香貓肝吸蟲（Opisthorchis）亦相關，但本題標準答案為中華肝吸蟲。","C":"貓肝吸蟲非本題標準答案。","D":"正確：中華肝吸蟲與膽管癌最相關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-66":{"quick":"CHROMagar Candida呈色培養基用於「鑑別菌種」，「不能測藥物感受性」；故此敘述錯誤。","detail":{"background":"CHROMagar Candida呈色培養基利用「不同念珠菌菌種代謝呈色酵素受質而產生不同顏色菌落」（白色念珠菌綠色、熱帶念珠菌藍色等）來「鑑別菌種」，也常含抗細菌抗生素以抑制細菌、並可看出混合菌種感染。但它「不能測試菌種對抗真菌藥的感受性」（藥敏需另做MIC試驗）。故「可測試藥物感受性」為錯誤敘述。","options":{"A":"可鑑定混合菌種感染，正確。","B":"利用代謝呈色不同鑑別，正確。","C":"正確（為錯誤敘述）：呈色培養基不能測藥物感受性。","D":"通常含抗細菌抗生素，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-69":{"quick":"肺炎鏈球菌（S. pneumoniae）常伴隨呼吸道感染；此敘述較正確。","detail":{"background":"本題比較呼吸道相關細菌：①退伍軍人桿菌的「龐提亞克熱（Pontiac fever）」是輕微自限的流感樣症狀，「比退伍軍人病輕、不致死」（故A錯）；②「肺炎鏈球菌（S. pneumoniae）常伴隨呼吸道感染」（社區肺炎、中耳炎、鼻竇炎，正確）；③不動桿菌（Acinetobacter baumannii）「不產孢子」、其院內感染與抗藥性及環境存活有關（故C錯）；④白喉桿菌不只感染成人、孩童亦可（故D錯）。故較正確者為B。","options":{"A":"龐提亞克熱較退伍軍人病輕、不致死，敘述相反。","B":"正確：肺炎鏈球菌常伴隨呼吸道感染。","C":"不動桿菌不產孢子，敘述錯誤。","D":"白喉桿菌不只感染成人，孩童亦可。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-71":{"quick":"Azole類抗黴菌劑抑制麥角固醇合成，使「細胞膜生成」受阻。","detail":{"background":"Azole類（fluconazole、itraconazole等）抑制真菌的「14-α去甲基酶（一種細胞色素P450酵素）」，阻斷「麥角固醇（ergosterol）」合成——麥角固醇是真菌細胞膜的主要固醇，合成受阻則「細胞膜」結構與功能異常、真菌生長受抑。故azole作用機轉為抑制細胞膜（麥角固醇）生成，非作用於蛋白質、細胞壁或核酸。","options":{"A":"正確：azole抑制麥角固醇合成、阻細胞膜生成。","B":"非抑制蛋白質合成。","C":"非抑制細胞壁生成（echinocandin才作用於細胞壁）。","D":"非抑制核酸合成（5-FC才如此）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-72":{"quick":"中華肝吸蟲主要因「生食未煮熟的鯉科淡水魚」而感染。","detail":{"background":"中華肝吸蟲（Clonorchis sinensis）：第一中間宿主為螺、第二中間宿主為「鯉科淡水魚」，人「生食或醃漬未煮熟的淡水魚」中囊狀幼蟲而感染，成蟲寄生膽管致膽管炎、結石，長期與膽管癌相關。台灣仍有零星病例；以praziquantel治療；感染輕者可無明顯症狀。故正確為「生食受感染未煮熟鯉科淡水魚而感染」。","options":{"A":"台灣仍有感染病例，非已無。","B":"正確：經生食未煮熟鯉科淡水魚感染。","C":"有適當驅蟲藥（praziquantel）可治療。","D":"感染者不一定皆嚴重病變（輕者可無症狀）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-67":{"quick":"隱球菌感染的快速免疫診斷是偵測其「莢膜多醣體抗原（CrAg）」。","detail":{"background":"新型隱球菌（Cryptococcus neoformans）的厚多醣「莢膜」是其關鍵毒力與診斷標的。臨床快速免疫診斷以「乳膠凝集或側流免疫分析」直接偵測「腦脊髓液或血清中的莢膜多醣體抗原（CrAg）」，靈敏特異、可快速診斷隱球菌腦膜炎。不是偵測細胞壁/胞漿抗原，也不是偵測病人抗體（免疫低下者抗體反應差）。故偵測對象為莢膜多醣體抗原。","options":{"A":"非偵測細胞壁抗原。","B":"非偵測細胞漿抗原。","C":"正確：偵測莢膜多醣體抗原（CrAg）。","D":"非偵測特異性抗體（免疫低下者不可靠）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-69":{"quick":"診斷瘧疾（惡性瘧）應採「血液」抹片鏡檢瘧原蟲。","detail":{"background":"瘧原蟲（Plasmodium）感染並增殖於「紅血球」內，故診斷瘧疾的標準是採「血液」做厚、薄血片以Giemsa染色鏡檢，找紅血球內的瘧原蟲（並判別蟲種與寄生密度）；亦可用快速抗原檢測。糞便、尿液、痰皆非瘧疾檢體。故應採血液鏡檢。補充：瘧原蟲在紅血球內增殖，故診斷「採血液」做厚(篩檢、找蟲)、薄(定種、定密度)血片Giemsa染色鏡檢，為診斷標準；亦有快速抗原檢測(RDT)、PCR。蟲種：惡性瘧(falciparum，最致命、腦性瘧)、間日瘧/卵圓瘧(有肝內休眠子可復發、須primaquine根除)、三日瘧。出題：瘧疾檢體＝血液(非糞尿痰)。","options":{"A":"糞便非瘧疾檢體。","B":"尿液非瘧疾檢體。","C":"正確：採血液抹片鏡檢瘧原蟲。","D":"痰非瘧疾檢體。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-70":{"quick":"多數高壓滅菌（autoclave）為「121°C／15分鐘」，非「100°C」；故此敘述錯誤。","detail":{"background":"消毒滅菌原則：①70%酒精比95%「更有效」（適量水分助蛋白變性與穿透），正確；②戊二醛為高效滅菌劑、可殺黴菌細菌及孢子，正確；③高壓蒸氣滅菌（autoclave）標準為「121°C、15 psi、15分鐘」（非100°C，沸水100°C殺不死孢子），故C錯誤；④紫外線殺菌穿透力差、須直接照射，正確。故錯誤者為C。","options":{"A":"70%酒精比95%有效，正確。","B":"戊二醛可殺黴菌細菌及孢子，正確。","C":"正確（為錯誤敘述）：高壓滅菌為121°C/15分鐘，非100°C。","D":"紫外線穿透力差、須直接照射，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-77":{"quick":"會產生「芽管（germ tube）」的真菌為白色念珠菌（Candida albicans）。","detail":{"background":"「芽管試驗（germ tube test）」：將念珠菌置於血清中37°C培養約2–3小時，「白色念珠菌（與杜氏念珠菌）」會長出無縊縮的「芽管（germ tube）」，可快速與其他念珠菌（光滑、克魯斯、熱帶等不形成芽管）區別。故產生芽管者為白色念珠菌。","options":{"A":"正確：白色念珠菌會產生芽管。","B":"光滑念珠菌不形成芽管。","C":"克魯斯念珠菌不形成芽管。","D":"熱帶念珠菌不形成典型芽管（可有假菌絲）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-78":{"quick":"「合成黑色素」非白色念珠菌的主要致病因子（那是新型隱球菌的毒力）。","detail":{"background":"白色念珠菌（C. albicans）的主要致病（毒力）因子：①黏附宿主組織（黏附素）；②分泌「天門冬胺酸蛋白酶（SAP）」等水解酶破壞組織；③「形態轉換（酵母↔菌絲，phenotypic switching）」助侵入與逃避免疫；④生物膜形成。「合成黑色素（melanin）」則是「新型隱球菌」的毒力因子（漆酶於酚類受質合成黑色素抗氧化），「非白色念珠菌」。故非念珠菌致病因子者為合成黑色素。","options":{"A":"黏附組織為念珠菌致病因子。","B":"正確：合成黑色素為隱球菌毒力、非念珠菌致病因子。","C":"分泌蛋白酶為念珠菌致病因子。","D":"形態/表現型轉換為念珠菌致病因子。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-79":{"quick":"「葉酸酶」與麴菌（Aspergillus）毒性無關；彈性蛋白酶、磷脂酶、過氧化氫酶才是其毒力因子。","detail":{"background":"麴菌（Aspergillus，尤A. fumigatus）的毒力因子包括：彈性蛋白酶（elastase，破壞肺組織）、磷脂酶（phospholipase）、過氧化氫酶（catalase，抗氧化逃避吞噬殺菌）、葡萄醣胺酶與真菌毒素（如黃麴毒素）。「葉酸酶」並非麴菌的毒力因子。故與其毒性無關者為葉酸酶。","options":{"A":"彈性蛋白酶為麴菌毒力因子。","B":"正確：葉酸酶與麴菌毒性無關。","C":"磷脂酶為麴菌毒力因子。","D":"過氧化氫酶為麴菌毒力因子（抗吞噬殺菌）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-80":{"quick":"蟠尾絲蟲所致河川盲的首選藥（副作用最小）為「ivermectin」。","detail":{"background":"蟠尾絲蟲（Onchocerca volvulus）經黑蠅叮咬傳播，致「蟠尾絲蟲症（河川盲river blindness）」——微絲蟲移行至皮膚與眼，引起搔癢、皮膚病變與失明。首選治療藥為「ivermectin」——殺微絲蟲、副作用小（須注意若合併羅阿絲蟲感染可有嚴重反應）。praziquantel治吸蟲絛蟲、mebendazole治腸道線蟲、tetracycline（doxycycline）可輔助殺共生Wolbachia。故首選為ivermectin。","options":{"A":"tetracycline（doxycycline）為輔助（殺Wolbachia），非首選殺微絲蟲。","B":"正確：ivermectin為河川盲首選、副作用最小。","C":"praziquantel治吸蟲絛蟲，非蟠尾絲蟲首選。","D":"mebendazole治腸道線蟲，非首選。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-65":{"quick":"真菌「有細胞核」（真核生物），故「沒細胞核」錯誤。","detail":{"background":"真菌（fungi）特性：①為「化合異營（chemoheterotroph）、不含葉綠素」、不行光合作用（須分解有機物獲能）；②有單細胞（酵母）與多細胞（黴/絲狀）型態；③可行無性與有性生殖；④為「真核生物，有真正的細胞核」與膜性胞器，並有細胞壁（葡聚醣、幾丁質）。故「沒細胞核，但有細胞壁」為錯誤敘述（真菌有細胞核）。","options":{"A":"為化合異營、不含葉綠素，正確。","B":"有單細胞與多細胞，正確。","C":"可行無性或有性生殖，正確。","D":"正確（為錯誤敘述）：真菌有細胞核（真核），故敘述錯。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-69":{"quick":"抑制「麥角固醇（ergosterol）」合成相關的抗真菌藥為「polyenes（結合）與azoles（抑制合成）」。","detail":{"background":"與真菌細胞膜麥角固醇有關的抗真菌藥：①「azoles」抑制麥角固醇「合成」（抑14-α去甲基酶）；②「polyenes（amphotericin B、nystatin）」直接「結合」已形成的麥角固醇打洞。兩者皆作用於麥角固醇途徑。echinocandins抑制細胞壁β-葡聚醣合成、flucytosine干擾核酸——皆與麥角固醇無關。故與麥角固醇相關者為polyenes及azoles。","options":{"A":"正確：polyenes與azoles均與麥角固醇相關。","B":"echinocandins作用於細胞壁，與麥角固醇無關。","C":"flucytosine作用於核酸，非麥角固醇。","D":"echinocandins與麥角固醇無關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-75":{"quick":"萊姆病主要由「硬蜱」叮咬傳播，「非人與人經體蝨互傳」；此敘述錯誤。","detail":{"background":"萊姆病（Lyme disease）由「包氏疏螺旋體（Borrelia burgdorferi）」引起，經「硬蜱（Ixodes，鹿蜱）叮咬」傳播（非人傳人、非體蝨）；典型早期為叮咬處「遊走性紅斑（牛眼狀）」，未妥善治療可進展為神經症狀與關節炎。故「主要由體蝨在人與人之間互相傳染」與事實相反、為錯誤（體蝨傳的是流行性斑疹傷寒/回歸熱）。","options":{"A":"由包氏疏螺旋體引起，正確。","B":"正確（為錯誤敘述）：萊姆病經硬蜱叮咬，非人傳人體蝨。","C":"典型為叮咬處遊走性紅斑，正確。","D":"未妥治可致神經症狀與關節炎，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-76":{"quick":"新型隱球菌「不只感染免疫缺失者」，免疫正常者亦可感染（尤gattii型）；此敘述錯誤。","detail":{"background":"新型隱球菌（Cryptococcus neoformans）：常見於「鴿糞」、有多醣「莢膜」、可引起「黴菌性（隱球菌）腦膜炎」。雖好發於免疫低下者（愛滋、移植），但「並非只感染免疫缺失者」——免疫正常者也可能感染（C. gattii更常侵犯免疫正常宿主）。故「只會在免疫缺失病患造成感染」與事實不符、為錯誤。","options":{"A":"常在鴿糞被發現，正確。","B":"會形成莢膜，正確。","C":"會引發黴菌性腦膜炎，正確。","D":"正確（為錯誤敘述）：不限免疫缺失者，免疫正常者亦可感染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-80":{"quick":"旋毛蟲病（trichinellosis）診斷「不需糞便」（靠肌肉切片/血清學）；蛔蟲、鞭蟲、腸道毛線蟲靠糞便。","detail":{"background":"多數腸道蠕蟲（蛔蟲、鞭蟲、腸道毛線蟲）診斷靠「糞便」找蟲卵。而「旋毛蟲病（trichinellosis，旋毛蟲Trichinella）」因「食入含幼蟲包囊的生豬肉」感染，成蟲短暫在腸、幼蟲移行「寄生於橫紋肌（形成包囊）」，糞便中「驗不到蟲卵」，診斷靠「肌肉切片找幼蟲、血清學抗體、嗜酸性球與肌酸激酶上升」。故不需檢查糞便者為旋毛蟲病。","options":{"A":"蛔蟲病需糞便檢查蟲卵。","B":"鞭蟲病需糞便檢查蟲卵。","C":"正確：旋毛蟲病靠肌肉切片/血清學，不需糞便。","D":"腸道毛線蟲病需糞便檢查。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-68":{"quick":"膠帶黏取肛周蟲卵（scotch tape test）用於診斷「蟯蟲（Enterobius vermicularis）」。","detail":{"background":"蟯蟲（Enterobius vermicularis）的雌蟲夜間爬至「肛門周圍」產卵，引起肛門搔癢。診斷以「膠帶黏貼法（scotch tape/cellophane tape test）」——清晨於肛門周圍黏取蟲卵後鏡檢（糞便檢查反而陽性率低）。蛔蟲、鞭蟲、鉤蟲的蟲卵在糞便中檢出。故膠帶黏取法用於蟯蟲。","options":{"A":"正確：膠帶黏取肛周蟲卵診斷蟯蟲。","B":"蛔蟲靠糞便檢查蟲卵。","C":"鞭蟲靠糞便檢查蟲卵。","D":"鉤蟲靠糞便檢查蟲卵。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-47":{"quick":"麴菌（Aspergillus）常經「呼吸道（吸入孢子）」感染。","detail":{"background":"麴菌（Aspergillus）的分生孢子廣布於環境（腐敗植物、空調、灰塵），人「吸入孢子」經呼吸道感染，於免疫低下者致侵襲性肺麴菌病、於有空洞者形成麴菌球、於過敏體質致過敏性支氣管肺麴菌病（ABPA）。念珠菌多為內源性黏膜/血流感染、Fonsecaea致皮下著色芽生菌病、小芽胞菌為皮癬菌。故常經呼吸道感染者為麴菌。","options":{"A":"正確：麴菌常經呼吸道吸入孢子感染。","B":"念珠菌多為內源黏膜/血流感染。","C":"著色芽生菌經外傷植入皮下。","D":"小芽胞菌為皮癬菌（接觸感染皮膚）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-50":{"quick":"此題送分；生食野生動物內臟相關絛蟲（亞洲絛蟲等）敘述爭議，故各選項均給分。","detail":{"background":"本題公告一律給分。學理上，「亞洲絛蟲（Taenia asiatica）」的中間宿主為豬，幼蟲（囊尾蚴）寄生於豬「內臟（尤肝臟）」，人「生食含囊尾蚴的豬內臟」而感染——與生食野生動物內臟的情境相關。惟豬肉絛蟲、牛肉絛蟲（食肌肉）、廣節裂頭絛蟲（食生魚）的感染途徑各異，題意界定有爭議，故本題送分、各選項均給分。","options":{"A":"亞洲絛蟲幼蟲寄生內臟，與生食內臟相關（本題送分）。","B":"豬肉絛蟲經生食豬肌肉（本題送分）。","C":"牛肉絛蟲經生食牛肌肉（本題送分）。","D":"廣節裂頭絛蟲經生食淡水魚（本題送分，各選項均給分）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-42":{"quick":"黴菌「不能行光合作用」（無葉綠素、為異營）；此敘述正確。","detail":{"background":"黴菌（真菌）為真核生物：①「不能行光合作用」（無葉綠素、為化合異營生物）——正確；②有細胞壁但成分是「葡聚醣與幾丁質」（非peptidoglycan，故C錯）；③為真核（非原核，A錯）；④細胞壁無peptidoglycan、故對作用於細胞壁的penicillin「無感受性」（D錯）。故正確敘述為「不能行光合作用」。","options":{"A":"真菌為真核生物，非原核。","B":"正確：黴菌不能行光合作用。","C":"真菌細胞壁為葡聚醣/幾丁質，非peptidoglycan。","D":"真菌對penicillin無感受性（無peptidoglycan細胞壁）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-43":{"quick":"有鉤絛蟲（Taenia solium）的囊尾幼蟲可侵入「腦部」造成神經囊蟲症。","detail":{"background":"豬肉絛蟲／有鉤絛蟲（Taenia solium）：若人誤食其「蟲卵」，孵出的六鉤蚴可移行並在組織形成「囊尾幼蟲（cysticercus）」，侵入「腦部」造成「神經囊蟲症（neurocysticercosis）」——為開發中地區後天性癲癇的重要原因。短小/縮小包膜絛蟲與無鉤絛蟲（牛肉絛蟲）幼蟲不致腦部囊蟲。故囊體幼蟲侵腦者為有鉤絛蟲。","options":{"A":"短小包膜絛蟲不致腦囊蟲。","B":"縮小包膜絛蟲不致腦囊蟲。","C":"正確：有鉤絛蟲囊尾幼蟲侵入腦部致病。","D":"無鉤（牛肉）絛蟲幼蟲不在人體形成腦囊蟲。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-46":{"quick":"常存於鴿糞、致腦膜炎的黴菌為新型隱球菌（Cryptococcus neoformans）。","detail":{"background":"新型隱球菌（Cryptococcus neoformans）常存於「鴿糞」與土壤，吸入後肺部感染，於免疫低下者播散至中樞造成「隱球菌腦膜炎」（最重要的真菌性腦膜炎）。白色念珠菌致黏膜/血流感染、申克氏孢子絲菌致皮下孢子絲菌病、黃色麴菌致肺麴菌病與黃麴毒素。故鴿糞、腦膜炎者為新型隱球菌。","options":{"A":"白色念珠菌非鴿糞相關腦膜炎主因。","B":"孢子絲菌致皮下感染，非鴿糞腦膜炎。","C":"黃色麴菌致肺麴菌病，非鴿糞腦膜炎。","D":"正確：新型隱球菌存鴿糞、致腦膜炎。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-50":{"quick":"埃及斑蚊（Aedes aegypti）最常傳播「登革熱」。","detail":{"background":"埃及斑蚊（Aedes aegypti）是「登革熱」的主要病媒（也傳播茲卡、屈公、黃熱病）。瘧疾由「瘧蚊（Anopheles）」、西尼羅熱由「家蚊（Culex）」、利什曼病由「白蛉（sandfly）」傳播。故埃及斑蚊最常傳播登革熱。補充：病媒與疾病配對是高頻考點——埃及斑蚊(Aedes)＝登革、茲卡、屈公、黃熱；瘧蚊(Anopheles)＝瘧疾；家蚊(Culex)＝日本腦炎、西尼羅;白蛉(sandfly)＝利什曼病;采采蠅＝非洲錐蟲;恙蟎＝叢林斑疹傷寒;硬蜱＝萊姆病。登革熱4血清型、多次不同型感染因ADE致重症(出血熱/休克)。","options":{"A":"瘧疾由瘧蚊（Anopheles）傳播。","B":"正確：埃及斑蚊最常傳播登革熱。","C":"利什曼病由白蛉傳播。","D":"西尼羅熱由家蚊（Culex）傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-48":{"quick":"絲孢酵母菌（Trichosporon）不屬皮癬菌；皮癬菌為表皮癬菌、毛髮癬菌、小芽孢菌三屬。","detail":{"background":"皮癬菌（dermatophytes，造成癬／皮膚黴菌病）僅三屬：表皮癬菌（Epidermophyton）、毛髮癬菌（Trichophyton）、小芽孢菌（Microsporum），侵犯角質、毛髮、指甲。「絲孢酵母菌（Trichosporon）」是另一類酵母樣真菌（致白色毛結節病與免疫低下者播散性感染），「非皮癬菌」。故不屬皮癬菌者為絲孢酵母菌。","options":{"A":"表皮癬菌為皮癬菌。","B":"毛髮癬菌為皮癬菌。","C":"正確：絲孢酵母菌非皮癬菌。","D":"小芽孢菌為皮癬菌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-50":{"quick":"腸外阿米巴病的滋養體最常入侵「肝臟」（致阿米巴肝膿瘍）。","detail":{"background":"痢疾阿米巴（Entamoeba histolytica）的「滋養體（trophozoite）」侵入大腸黏膜造成腸阿米巴病後，可經門靜脈血流到「肝臟」，造成「腸外阿米巴病」中最常見的「阿米巴肝膿瘍」（右肝為主，膿呈巧克力醬樣）。較少見可至肺、腦。故最常受侵犯的腸外器官為肝臟。","options":{"A":"肺為較少見的腸外侵犯部位。","B":"心臟極少受阿米巴侵犯。","C":"正確：肝臟為腸外阿米巴病最常侵犯部位（肝膿瘍）。","D":"腎臟非典型阿米巴侵犯部位。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-50":{"quick":"中華肝吸蟲最常見感染方式為「食用未煮熟的淡水魚」。","detail":{"background":"中華肝吸蟲（Clonorchis sinensis）的感染源是「生食或未煮熟的淡水魚（鯉科，含囊狀幼蟲）」，幼蟲在腸內脫囊、上行至膽管寄生。不是經生菜、生水或蚊蟲。故最常見感染方式為食用未煮熟淡水魚。補充：中華肝吸蟲生活史＝蟲卵→第一中間宿主(螺)→第二中間宿主(鯉科淡水魚，含囊狀幼蟲metacercaria)→人生食而感染→脫囊上行膽管寄生。致膽管炎、膽結石，長期與「膽管癌(cholangiocarcinoma)」相關(WHO致癌因子)。診斷＝糞便找蟲卵；治療＝praziquantel。預防＝淡水魚煮熟。","options":{"A":"生食蔬菜為薑片蟲等途徑，非肝吸蟲主因。","B":"生水非肝吸蟲主要途徑。","C":"正確：食用未煮熟淡水魚為中華肝吸蟲感染主因。","D":"非經蚊蟲叮咬。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-46":{"quick":"尿液中染成番紅紅色的是革蘭氏陰性菌（如E. coli），「不會產生內孢子」；故此敘述錯誤。","detail":{"background":"革蘭氏染色中，被「番紅（safranin，紅色複染劑）」染成紅色者為「革蘭氏陰性菌」（薄peptidoglycan、有LPS外膜）。泌尿道感染最常見即革蘭氏陰性的「大腸桿菌（E. coli）」（A可能）——它有內毒素（LPS，C正確）、缺壁酸（lipoteichoic acid為陽性菌成分，D可能）。但革蘭氏陰性菌「不產內孢子」（產內孢子的是革蘭氏陽性的Bacillus、Clostridium）。故「可能會產生內孢子」為錯誤敘述。","options":{"A":"泌尿道感染常見E. coli（G−），可能正確。","B":"正確（為錯誤敘述）：G−菌不產內孢子。","C":"G−菌有內毒素（LPS），正確。","D":"G−菌缺壁脂酸（陽性菌才有），可能正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-47":{"quick":"花斑癬病原馬拉色氏菌（Malassezia）為「嗜脂性」黴菌；此敘述正確。","detail":{"background":"花斑癬（汗斑，pityriasis versicolor）由「馬拉色氏菌（Malassezia furfur）」引起：它是「嗜脂性（lipophilic）」酵母樣黴菌，「本即皮膚常在菌叢」，於皮脂分泌旺盛、悶熱多汗時過度增生，在皮膚形成色素增減的斑塊；鏡檢可見「短菌絲與圓酵母（義大利麵與肉丸狀spaghetti and meatballs）」。它屬表淺黴菌病、非血流感染主因（但靜脈營養早產兒偶可致導管相關感染）。故正確為「是一種嗜脂性黴菌」。","options":{"A":"馬拉色氏菌本即皮膚常在菌，敘述錯誤。","B":"正確：馬拉色氏菌為嗜脂性黴菌。","C":"鏡檢可見短菌絲（會形成菌絲），敘述錯誤。","D":"非造成血液感染的主要真菌（多為表淺感染）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-50":{"quick":"非洲錐蟲病急性期表現為「發熱、肌肉與關節痛、淋巴結腫大」（如後頸Winterbottom徵）。","detail":{"background":"非洲錐蟲病（睡眠病，African trypanosomiasis，布氏錐蟲經采采蠅傳播）分期：①「急性（血液淋巴）期」——叮咬處硬下疳，續發「間歇發熱、頭痛、肌肉關節痛、淋巴結腫大（後頸淋巴結腫即Winterbottom徵）」；②「慢性（中樞神經）期」——錐蟲侵入腦部致行為改變、日夜睡眠週期顛倒（嗜睡）、昏睡、終至昏迷死亡。故「急性期」表現為發熱、肌肉關節痛、淋巴結腫大。","options":{"A":"昏迷抽搐為晚期中樞侵犯表現。","B":"昏睡（嗜睡）為慢性中樞期表現。","C":"失去平衡、注意力不集中為中樞期表現。","D":"正確：急性期為發熱、肌肉關節痛、淋巴結腫大。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-48":{"quick":"全身性（系統性）真菌病主要經「吸入分生孢子（conidia）」感染。","detail":{"background":"引起全身性（地方流行性）真菌病的二形性真菌（如球黴菌Coccidioides、組織漿菌Histoplasma、芽生菌Blastomyces）以「黴菌型」存在於土壤、產生「分生孢子（conidia/spore）」，人「吸入孢子」經呼吸道感染肺部，在體溫下轉為酵母型並可播散全身。故最常見感染方式為吸入分生孢子（非誤食、傷口或眼黏膜）。","options":{"A":"非主要經誤食菌絲體。","B":"傷口接觸為皮下真菌病途徑（如孢子絲菌），非全身性主途。","C":"正確：全身性真菌病主要經吸入分生孢子。","D":"非主要經眼黏膜接觸。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-47":{"quick":"主要經「人體體蝨」叮咬傳播的細菌為回歸熱包氏螺旋體（Borrelia recurrentis）。","detail":{"background":"經「人體體蝨（body louse）」傳播的病原包括：回歸熱包氏螺旋體（Borrelia recurrentis，致流行性回歸熱）、普氏立克次體（流行性斑疹傷寒）、戰壕熱巴東氏菌。柯克斯體（Q熱，經氣溶膠/接觸動物）、恙蟲病東方體（經恙蟎）、鸚鵡披衣菌（經鳥類氣溶膠）皆非體蝨傳播。故經體蝨傳播者為回歸熱包氏螺旋體。","options":{"A":"正確：回歸熱包氏螺旋體經人體體蝨傳播。","B":"柯克斯體（Q熱）經氣溶膠/接觸動物，非體蝨。","C":"恙蟲病東方體經恙蟎。","D":"鸚鵡披衣菌經鳥類氣溶膠。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-48":{"quick":"真菌細胞壁主成分為「葡聚醣與幾丁質」，「非peptidoglycan（胜肽聚糖）」；故此敘述最不適當。","detail":{"background":"真菌（真核）特性：①為真核生物、有粒線體等胞器（正確）；②細胞膜含「固醇（麥角固醇ergosterol）」、是抗真菌劑作用標的（正確）；③有細胞壁但主成分為「β-葡聚醣、甘露聚醣與幾丁質」（「非peptidoglycan」——peptidoglycan是細菌細胞壁成分），故C最不適當；④有真正的細胞核（正確）。故最不適當（錯誤）者為C。","options":{"A":"真菌為真核、有粒線體，正確。","B":"細胞膜含固醇、為抗真菌劑標的，正確。","C":"正確（為錯誤敘述）：真菌細胞壁為葡聚醣/幾丁質，非peptidoglycan。","D":"真菌有細胞核，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-49":{"quick":"口腔最常見的真菌感染由念珠菌（Candida）引起（鵝口瘡）。","detail":{"background":"口腔最常見的真菌感染是「念珠菌症（鵝口瘡oral thrush）」，由白色念珠菌（Candida albicans）等念珠菌引起——常見於嬰兒、使用抗生素/吸入型類固醇者、義齒、糖尿病與免疫低下者，表現口腔白色斑膜。隱球菌（腦膜炎）、粗球黴菌（肺）、孢子絲菌（皮下）非口腔常見真菌感染。故口腔最常見真菌感染為念珠菌。","options":{"A":"正確：口腔最常見真菌感染為念珠菌（鵝口瘡）。","B":"隱球菌主致腦膜炎，非口腔。","C":"粗球黴菌致肺部感染，非口腔。","D":"孢子絲菌致皮下感染，非口腔。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-50":{"quick":"鉤蟲成蟲吸食腸壁血液，最常造成「（缺鐵性）貧血」。","detail":{"background":"鉤蟲（十二指腸鉤蟲、美洲鉤蟲）成蟲以口囊咬附小腸黏膜、「吸食血液」並分泌抗凝物使傷口持續滲血，長期慢性失血造成「缺鐵性貧血」（與低蛋白、倦怠），是鉤蟲病最重要的臨床表現。故鉤蟲成蟲感染最常見症狀為貧血。補充：鉤蟲(十二指腸鉤蟲/美洲鉤蟲)生活史＝幼蟲經皮膚穿入(地癢ground itch)→經肺移行→吞入小腸發育為成蟲→口囊咬附吸血。成蟲每日吸血致「慢性失血→缺鐵性貧血、低蛋白血症、倦怠」、孩童影響生長。診斷＝糞便找蟲卵；治療＝mebendazole/albendazole＋補鐵。預防＝勿赤腳走污染土壤。","options":{"A":"非致肝硬化。","B":"肺炎非鉤蟲成蟲主症（幼蟲移行可致暫時肺症狀）。","C":"正確：鉤蟲成蟲吸血致缺鐵性貧血。","D":"非致腎衰竭。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-70":{"quick":"血液中數量最多的白血球是「嗜中性球（neutrophil）」（約佔50–70%）。","detail":{"background":"周邊血白血球分類比例（健康成人）：嗜中性球50–70%（最多）＞淋巴球20–40%＞單核球2–8%＞嗜酸性球1–4%＞嗜鹼性球<1%。嗜中性球（多型核白血球）是先天免疫的主力吞噬細胞、急性細菌感染時最早大量聚集化膿。故數目最多者為嗜中性球。","options":{"A":"正確：嗜中性球為血中數量最多的白血球。","B":"嗜酸性球僅佔1–4%。","C":"嗜鹼性球<1%，最少。","D":"單核球約2–8
