","B":"ABO 血型不合","C":"次要組織相容性抗原(minor histocompatibility antigens)不相容","D":"同種異體辨識間接路徑(the indirect pathway of allorecognition)受到活化"},"img":""},{"id":"112110-N1-45","code":"112110","roc":"112","cat":"N1","catname":"基礎醫學","num":45,"stem":"下列何種自體免疫疾病,病人體內會有IgG 抗體對抗腎臟基底膜上第四型膠原蛋白,引起腎組織內的發炎 反應?","opts":{"A":"全身性紅斑狼瘡(Systemic Lupus Erythematosus, SLE)","B":"古德帕斯丘氏症候群(Goodpasture’s syndrome)","C":"類風溼關節炎(Rheumatoid arthritis)","D":"多發性硬化症(Multiple sclerosis)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"disc":"micro","topic":"M10過敏免疫病理疫苗與移植","q_num":45,"roc_year":"112","exam_code":"112110","src":"民國112年","options":{"A":"全身性紅斑狼瘡(Systemic Lupus Erythematosus, SLE)","B":"古德帕斯丘氏症候群(Goodpasture’s syndrome)","C":"類風溼關節炎(Rheumatoid arthritis)","D":"多發性硬化症(Multiple sclerosis)"},"img":""},{"id":"112180-N1-43","code":"112180","roc":"112","cat":"N1","catname":"基礎醫學","num":43,"stem":"下列何種過敏反應主要是由IgE 抗體所引起?","opts":{"A":"第一型過敏反應","B":"第二型過敏反應","C":"第三型過敏反應","D":"第四型過敏反應"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"disc":"micro","topic":"M10過敏免疫病理疫苗與移植","q_num":43,"roc_year":"112","exam_code":"112180","src":"民國112年","options":{"A":"第一型過敏反應","B":"第二型過敏反應","C":"第三型過敏反應","D":"第四型過敏反應"},"img":""},{"id":"113030-N1-44","code":"113030","roc":"113","cat":"N1","catname":"基礎醫學","num":44,"stem":"下列何者屬於第二型過敏反應?","opts":{"A":"阿圖斯氏反應(Arthus reaction)","B":"全身性過敏反應(systemic anaphylaxis)","C":"結核菌素反應","D":"ABO血型不合造成的溶血與輸血反應"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"disc":"micro","topic":"M10過敏免疫病理疫苗與移植","q_num":44,"roc_year":"113","exam_code":"113030","src":"民國113年","options":{"A":"阿圖斯氏反應(Arthus reaction)","B":"全身性過敏反應(systemic anaphylaxis)","C":"結核菌素反應","D":"ABO血型不合造成的溶血與輸血反應"},"img":""},{"id":"113100-N1-46","code":"113100","roc":"113","cat":"N1","catname":"基礎醫學","num":46,"stem":"有關梅毒螺旋體(Treponema pallidum),下列敘述何者正確?","opts":{"A":"具有超氧化物岐化酶(superoxide dismutase),可以在有氧的環境中生存","B":"可以在實驗室中進行體外培養後,以光學顯微鏡進行觀察檢驗","C":"青黴素(penicillin)是治療梅毒螺旋體感染症的常用藥物","D":"接種梅毒疫苗可以預防梅毒螺旋體的感染"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"disc":"micro","topic":"M10過敏免疫病理疫苗與移植","q_num":46,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"具有超氧化物岐化酶(superoxide dismutase),可以在有氧的環境中生存","B":"可以在實驗室中進行體外培養後,以光學顯微鏡進行觀察檢驗","C":"青黴素(penicillin)是治療梅毒螺旋體感染症的常用藥物","D":"接種梅毒疫苗可以預防梅毒螺旋體的感染"},"img":""},{"id":"114100-N1-23","code":"114100","roc":"114","cat":"N1","catname":"基礎醫學","num":23,"stem":"下列何種自體抗體(autoantibody)與全身性紅斑性狼瘡(systemic lupus erythematosus)最相關?","opts":{"A":"抗核抗體(anti-nuclear antibody)","B":"抗肌動蛋白抗體(anti-actin antibody)","C":"抗粒線體抗體(anti-mitochondrial antibody)","D":"抗嗜中性球細胞質抗體(anti-neutrophil cytoplasmic antibody)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"disc":"micro","topic":"M10過敏免疫病理疫苗與移植","q_num":23,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"抗核抗體(anti-nuclear antibody)","B":"抗肌動蛋白抗體(anti-actin antibody)","C":"抗粒線體抗體(anti-mitochondrial antibody)","D":"抗嗜中性球細胞質抗體(anti-neutrophil cytoplasmic antibody)"},"img":""},{"id":"114100-N1-44","code":"114100","roc":"114","cat":"N1","catname":"基礎醫學","num":44,"stem":"下列何種疾病目前無有效的疫苗可預防?","opts":{"A":"肺結核","B":"白喉","C":"破傷風","D":"梅毒"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"disc":"micro","topic":"M10過敏免疫病理疫苗與移植","q_num":44,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"肺結核","B":"白喉","C":"破傷風","D":"梅毒"},"img":""},{"id":"114170-N1-44","code":"114170","roc":"114","cat":"N1","catname":"基礎醫學","num":44,"stem":"有關過敏反應,下列何者不是由抗體引起?","opts":{"A":"異位性皮膚炎","B":"青黴素所引起的過敏反應","C":"接觸常春藤植物葉片造成的皮膚炎","D":"RhD 血型不同所造成的新生兒溶血"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"disc":"micro","topic":"M10過敏免疫病理疫苗與移植","q_num":44,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"異位性皮膚炎","B":"青黴素所引起的過敏反應","C":"接觸常春藤植物葉片造成的皮膚炎","D":"RhD 血型不同所造成的新生兒溶血"},"img":""}],E={"103100-N1-65":{"quick":"高壓蒸氣滅菌（autoclave）121°C、15磅、15分鐘是布料／器械最可靠的滅菌法。","detail":{"background":"滅菌（sterilization）指殺滅所有微生物含細菌內孢子（endospore），消毒（disinfection）僅殺滅多數病原但不一定殺孢子。高壓蒸氣滅菌（autoclave）以121°C、1.05 kg/cm²（15 psi）、維持15分鐘，利用濕熱使蛋白質變性，可殺滅最耐熱的內孢子，是耐熱耐濕物品（布料、被褥、玻璃器械、培養基）的首選。乾熱滅菌（160–180°C、1–2小時）用於不耐濕的油劑、粉末、玻璃；70%酒精與石碳酸僅為消毒劑，無法殺孢子。醫院毛巾被褥可耐高溫高濕，故高壓蒸氣最適當。","options":{"A":"70%酒精僅消毒、不殺孢子，且不適合大批布料。","B":"1%石碳酸（phenol）為消毒劑，殺菌力有限、有刺激性。","C":"正確：高壓蒸氣121°C/15分鐘可達滅菌、適合布料被褥。","D":"乾熱180°C/60分鐘雖可滅菌，但布料受高乾熱易焦損、效率低於濕熱。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-65":{"quick":"院內感染（HAI）最常見且最可預防的傳播原因是醫護人員手部衛生不澈底。","detail":{"background":"醫療照護相關感染（healthcare-associated infection, HAI）主要經「接觸傳播」，而醫護人員的手是病原在病人間散播的最重要媒介。WHO「手部衛生五時機」（接觸病人前、無菌操作前、體液暴觸後、接觸病人後、接觸病人周遭環境後）即針對此。正確洗手（含酒精乾洗手）是降低院內感染最簡單、最有效、最具成本效益的措施；多重抗藥菌（MRSA、CRE、C. difficile）的群聚多與手部衛生不落實有關。","options":{"A":"食物供應與感染傳播無直接因果。","B":"訪客數量並非群聚感染主因。","C":"正確：照護時洗手不澈底是院內群聚感染最常見原因。","D":"醫囑不服從影響療效，非感染傳播主因。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-78":{"quick":"科霍假說須能「分離並純培養病原」，帕金森氏症為神經退化非感染病、無病原可分離，故不適用。","detail":{"background":"科霍假說（Koch’s postulates）是判定某微生物為某疾病病原的四原則：①該病原須在所有患病個體中找到、在健康者不存在；②可從病灶分離並在體外純培養；③純培養接種至健康宿主能引發相同疾病；④可從新發病宿主再分離出同一病原。應用此假說的前提是「疾病由可培養的微生物引起」。帕金森氏症是中腦黑質多巴胺神經元退化造成的神經退化性疾病，並非由微生物感染所致，無病原可供分離培養，故科霍假說不適用。麻疹（病毒）、傷寒（沙門桿菌）、蜂窩性組織炎（鏈球菌／葡萄球菌）皆為可辨識病原的感染病。","options":{"A":"麻疹由麻疹病毒引起，有明確病原。","B":"傷寒由傷寒桿菌引起，可培養分離。","C":"蜂窩性組織炎為細菌感染，有病原。","D":"正確：帕金森氏症非感染病、無可分離培養之病原，科霍假說不適用。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-67":{"quick":"酒精的殺菌機制是使蛋白質變性並破壞細胞膜（脂質溶解）。","detail":{"background":"常見消毒滅菌劑的作用機制各異：①酒精（60–80%）使蛋白質變性、溶解細胞膜脂質→破壞細胞膜與酵素；②紫外線（UV，254 nm）造成DNA相鄰嘧啶形成胸腺嘧啶二聚體→破壞核酸；③戊二醛（glutaraldehyde）與甲醛屬烷化劑，使蛋白質與核酸的胺基烷化交聯→主要使蛋白質變性（高效能滅菌劑，用於內視鏡冷滅菌）；④石碳酸（phenol/Lysol）破壞細胞膜並使蛋白質變性。掌握「機制配對」是考點：酒精＝膜＋蛋白；UV＝核酸；烷化劑＝蛋白與核酸交聯。","options":{"A":"正確：酒精溶解膜脂、變性蛋白，主要破壞細胞膜與酵素。","B":"紫外線破壞的是核酸（形成嘧啶二聚體），非細胞膜。","C":"戊二醛為烷化劑，主要使蛋白質變性交聯，非單純破壞核酸。","D":"石碳酸破壞細胞膜與變性蛋白，非阻礙核酸合成。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-41":{"quick":"含塑膠不耐高溫的手術器材宜用低溫滅菌——過氧化氫氣化電漿（H₂O₂ vapor/plasma）。","detail":{"background":"不耐高溫高濕的器械（含塑膠、光纖、電子元件、內視鏡）不能用高壓蒸氣（121°C）或乾熱滅菌，須採低溫滅菌法：①過氧化氫氣化電漿（H₂O₂ gas plasma）——低溫（<60°C）、無毒性殘留、循環時間短，是現代取代環氧乙烷的主流；②環氧乙烷（EO）——低溫但有毒、易燃、需長時間除氣；③戊二醛冷滅菌。酒精與四級氨（QAC）僅為消毒劑、不殺孢子、達不到滅菌等級；高壓滅菌會使塑膠變形熔損。","options":{"A":"酒精僅消毒、不殺孢子，達不到滅菌。","B":"正確：過氧化氫蒸氣為低溫滅菌、不損塑膠、無毒殘留。","C":"四級氨化合物為低階消毒劑，無法滅菌。","D":"高壓滅菌121°C會使塑膠材質變形熔損。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-41":{"quick":"病人正在使用抗生素會抑制細菌生長，使尿液培養呈偽陰性。","detail":{"background":"尿液細菌培養（urine culture）是診斷泌尿道感染的標準，但結果受多項因素影響。若臨床高度懷疑感染、培養卻為陰性，最常見原因是「採檢前／中已使用抗生素」——抗生素抑制或殺滅細菌，使可培養菌量低於偵測閾值（通常<10⁵ CFU/mL）而呈偽陰性。相對地，檢體污染、室溫久置（>2小時細菌過度增生）會造成菌量偏高的「偽陽性」或菌種混雜，而非陰性。故臨床建議：採尿培養應在開始抗生素前完成。","options":{"A":"正確：已使用抗生素抑制細菌生長，造成培養偽陰性。","B":"採檢污染會使培養呈陽性或混雜菌，而非陰性。","C":"室溫久置使細菌過度增生→偏高，非陰性。","D":"檢體放置過久同樣造成菌量偏高或污染，非陰性主因。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-66":{"quick":"體外可被殺死、體內無效，最可能是「治療部位藥物濃度低於MBC」而達不到殺菌濃度。","detail":{"background":"MIC（最低抑菌濃度）是抑制細菌生長所需的最低藥物濃度；MBC（最低殺菌濃度）是殺死99.9%細菌所需濃度。抗生素要在體內有效，必須在「感染部位」達到足夠濃度（≥MIC，殺菌藥需≥MBC），且維持足夠時間。本題菌株體外對ampicillin敏感（被殺死），但病人服藥無效，最合理解釋是「藥物在治療部位（如膿瘍、組織深部、血腦屏障後）的濃度低於MBC」，無法達到殺菌濃度。其他失敗原因尚包括：藥物無法到達病灶、生物可用率不足、膿瘍包覆、依從性不佳等。","options":{"A":"MIC太低代表菌很敏感，反而應有效，與無效矛盾。","B":"濃度大於MBC應能殺菌、有效，與題意矛盾。","C":"正確：治療部位濃度＜MBC，達不到殺菌濃度故無效。","D":"ampicillin在腸道可作用，且本菌體外可被殺，非藥物本質無作用。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-73":{"quick":"Neisseria的菌毛（pilus）由菌毛蛋白pilin構成，是其黏附與致病的關鍵。","detail":{"background":"菌毛（pili/fimbriae）是革蘭氏陰性菌表面的絲狀附屬構造，主要功能為黏附宿主細胞（毒力因子）與性接合（性菌毛）。奈瑟氏菌（Neisseria gonorrhoeae／meningitidis）的菌毛由重複的「菌毛蛋白（pilin）」次單元聚合而成，藉抗原變異（antigenic variation）逃避免疫並增強對黏膜上皮的黏附，是淋病與腦膜炎奈瑟菌的重要毒力因子。Opa蛋白（混濁蛋白）為另一類外膜黏附蛋白；flagellin是鞭毛蛋白；mucinase為分解黏液的酵素，皆非菌毛主成分。","options":{"A":"flagellin是鞭毛（flagella）的蛋白，非菌毛。","B":"Opa蛋白為外膜混濁蛋白，輔助黏附但非菌毛主成分。","C":"正確：菌毛由pilin（菌毛蛋白）聚合而成。","D":"mucinase為黏蛋白分解酶，與菌毛結構無關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-65":{"quick":"健康人體內臟器如脾臟屬無菌部位，正常不應培養出細菌。","detail":{"background":"人體與外界相通的表面（皮膚、口腔、上呼吸道、腸道、陰道）有大量「正常菌叢（normal flora）」共生；但深部組織與封閉腔室——血液、腦脊髓液、脾臟、肝臟、腎臟、膀胱（膀胱以上泌尿道）、關節腔、腹腔——在健康狀態下為「無菌部位（sterile site）」，培養出細菌即代表感染。脾臟為腹腔內實質臟器、屬無菌部位，正常人無法培養出細菌；口腔、腸道、皮膚則富含常在菌。","options":{"A":"口腔有大量常在菌叢（鏈球菌等）。","B":"正確：脾臟為無菌部位，正常不應培養出細菌。","C":"腸道有最龐大的菌叢（厭氧菌為主）。","D":"皮膚有表皮葡萄球菌、痤瘡桿菌等常在菌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-65":{"quick":"腸道正常菌叢與「骨髓造血」無關；清除菌叢不會直接造成造血功能異常。","detail":{"background":"腸道正常菌叢的生理功能包括：①競爭性抑制（拮抗致病菌定殖，即colonization resistance）；②協助消化、合成維生素K與部分B群；③刺激並維持黏膜免疫（GALT）發育與功能。以廣效抗生素清除菌叢會導致：致病菌（如C. difficile）過度增生引發偽膜性腸炎、維生素合成與消化受損、黏膜免疫失常。而「骨髓造血功能」由造血幹細胞與細胞激素調控，與腸道菌叢無直接關係，故為「無關」者。","options":{"A":"正確：骨髓造血與腸道菌叢無關，為無關選項。","B":"菌叢協助消化，清除後可致消化不良。","C":"菌叢刺激黏膜免疫，清除後免疫失常。","D":"菌叢拮抗致病菌，清除後致病菌易感染（如C. difficile）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-68":{"quick":"細菌（原核）僅有核糖體（70S），無膜性胞器；故細胞質內存在的是核糖體。","detail":{"background":"原核細胞（細菌）與真核細胞最大差異在於「無膜包被的胞器」與「無真正細胞核」。細菌細胞質內僅有：70S核糖體（30S+50S，蛋白質合成處，是抗生素胺基醣苷、四環素、巨環素的作用標的）、擬核（裸露環狀DNA）、質體、內含顆粒。粒線體、中心體、葉綠體、內質網、高基氏體、溶酶體等膜性胞器皆為真核細胞所有，細菌沒有；細菌的能量代謝（電子傳遞鏈）在細胞膜上進行。","options":{"A":"粒線體為真核膜性胞器，細菌無。","B":"中心體為真核細胞分裂相關構造，細菌無。","C":"葉綠體僅植物／藻類有，細菌無（藍綠菌有類囊體但非葉綠體）。","D":"正確：核糖體（70S）存於細菌細胞質內。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-71":{"quick":"腸內桿菌的抗原為O（菌體）、H（鞭毛）、K（莢膜）抗原；無「E抗原」。","detail":{"background":"腸內桿菌科（Enterobacteriaceae，如E. coli、Salmonella）的血清學分型依三種表面抗原：①O抗原（細胞壁脂多醣LPS的多醣側鏈，耐熱）；②H抗原（鞭毛flagellin蛋白，不耐熱）；③K抗原（莢膜多醣，如傷寒桿菌的Vi抗原）。這三種抗原組合（如E. coli O157:H7）用於菌株鑑定與流行病學追蹤。「E抗原」並非腸內桿菌的抗原命名（E抗原一般指B型肝炎的HBeAg），故為非。本題「莢膜」即對應K抗原，屬正確抗原之一。","options":{"A":"O抗原為菌體LPS抗原，是腸內桿菌抗原。","B":"H抗原為鞭毛抗原，是腸內桿菌抗原。","C":"莢膜（K抗原）為腸內桿菌抗原之一。","D":"正確：無「E抗原」之分類，故為非。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-65":{"quick":"合理使用抗生素（依疫情與藥敏監測精準用藥）可防止多重抗藥菌產生。","detail":{"background":"抗生素抗藥性（antimicrobial resistance）的產生與「抗生素濫用、選擇壓力」密切相關。防止多重抗藥菌的策略（抗生素監管 antimicrobial stewardship）包括：依細菌培養與藥敏結果精準選藥、避免不必要的廣效或預防性使用、足量足療程（不可症狀好轉即自行停藥，以免殘留抗藥菌）、定期監測並公告流行病原與藥敏資料供臨床參考。反之，預防性濫用、廣效藥濫用、提前停藥都會增加選擇壓力、促進抗藥性。","options":{"A":"常服預防性抗生素增加選擇壓力，助長抗藥性。","B":"濫用廣效抗生素是抗藥性主因。","C":"正確：依疫情與藥敏監測公告、合理用藥可防抗藥性。","D":"症狀減輕即停藥會殘留抗藥菌、誘發抗藥性。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-65":{"quick":"奎諾酮類（quinolones）抑制DNA gyrase／topoisomerase，干擾細菌DNA複製。","detail":{"background":"抗生素依作用機制分類是重要考點：①奎諾酮類（quinolones/fluoroquinolones，如ciprofloxacin）抑制DNA gyrase（topoisomerase II）與topoisomerase IV→阻斷DNA複製與超螺旋解開；②rifampin抑制RNA polymerase→阻斷轉錄（mRNA合成）；③β-lactam（penicillin/cephalosporin）抑制細胞壁peptidoglycan合成（transpeptidase）；④aminoglycoside（gentamicin）結合30S核糖體→抑制蛋白質合成、造成讀碼錯誤。主要「影響DNA複製」者為奎諾酮類。","options":{"A":"rifampin抑制RNA聚合酶（轉錄），非DNA複製。","B":"β-lactam抑制細胞壁合成。","C":"正確：奎諾酮抑制DNA gyrase/topoisomerase，阻斷DNA複製。","D":"aminoglycoside抑制30S核糖體蛋白質合成。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-65":{"quick":"溶酶體（lysosome）為真核膜性胞器，動物細胞有、細菌（原核）無。","detail":{"background":"比較原核（細菌）與真核（動物）細胞：核糖體兩者皆有（細菌70S、真核80S）；質體（plasmid）主要見於細菌；細胞壁——細菌有（peptidoglycan）、動物細胞無（植物為纖維素）。溶酶體（lysosome）是含水解酶的膜性胞器，負責胞內消化與自噬，屬真核膜性胞器，動物細胞有而細菌無。故「存在動物細胞、不存在細菌」者為溶酶體。","options":{"A":"核糖體兩者皆有（型號不同）。","B":"細胞壁細菌有、動物細胞無，與題意相反。","C":"質體主要存在於細菌，動物細胞一般無。","D":"正確：溶酶體為真核膜性胞器，動物有、細菌無。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-41":{"quick":"細菌水平基因轉移有接合、轉導、轉形三種；「分泌作用」不是基因傳遞方式。","detail":{"background":"細菌的遺傳物質可垂直（分裂）與水平傳遞。水平基因轉移（horizontal gene transfer）三大機制：①接合（conjugation）——經性菌毛（pilus）將質體DNA由供菌傳給受菌（抗藥質體散播的重要途徑）；②轉導（transduction）——經噬菌體（bacteriophage）將細菌DNA包裝後感染並轉移給另一菌；③轉形／轉化（transformation）——細菌直接攝取環境中游離的裸露DNA（如肺炎雙球菌Griffith實驗）。「分泌作用（secretion）」是細菌分泌蛋白／毒素的過程，與遺傳物質傳遞無關。","options":{"A":"接合作用經性菌毛傳遞質體，是基因轉移。","B":"轉導經噬菌體傳遞DNA。","C":"轉形為攝取游離DNA。","D":"正確：分泌作用是分泌蛋白／毒素，非遺傳物質傳遞。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-41":{"quick":"降低抗藥性應靠監測公告與合理用藥；飼料抗生素、低劑量預防、單一藥長用皆助長抗藥性。","detail":{"background":"抗藥性產生源於抗生素的選擇壓力。降低抗藥性的正確措施：定期監測並公告流行病原種類與抗生素敏感性（供臨床精準選藥）、合理規範使用、避免農畜飼料添加抗生素。錯誤做法包括：①飼料添加抗生素促生長——大量低濃度暴露篩選抗藥菌並經食物鏈傳人；②低劑量預防性使用——亞致死濃度誘導抗藥；③醫院長期單用同一抗生素——形成強選擇壓力使抗藥株主導。故正確答案為定期監測公告藥敏。","options":{"A":"正確：監測公告病原與藥敏，引導合理用藥可降抗藥性。","B":"飼料抗生素促生長會篩選並散播抗藥菌。","C":"低劑量預防性使用誘導抗藥性。","D":"長期單一抗生素形成選擇壓力、助長抗藥株。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-68":{"quick":"金黃色葡萄球菌的腸毒素為耐熱（heat-stable）外毒素，加熱不易破壞而致食物中毒。","detail":{"background":"金黃色葡萄球菌（S. aureus）產生的腸毒素（enterotoxin）屬於「耐熱」外毒素，即使食物加熱至100°C數分鐘仍不被破壞，故吃下被毒素污染的食物（如奶蛋糕、肉類）即發病，潛伏期短（1–6小時），以噁心嘔吐為主、少發燒。此為「毒素型食物中毒（intoxication）」——攝入的是預形成毒素而非活菌。產氣莢膜桿菌與腸毒素則不耐熱、潛伏期較長。","options":{"A":"正確：金黃色葡萄球菌腸毒素耐熱，加熱不破壞而致病。","B":"產氣莢膜桿菌腸毒素不耐熱。","C":"傷寒桿菌為侵襲性感染（非耐熱腸毒素）。","D":"鏈球菌不以耐熱腸毒素致食物中毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-69":{"quick":"肺炎鏈球菌肺炎的典型痰為「鐵鏽色（rusty）」痰。","detail":{"background":"肺炎鏈球菌（Streptococcus pneumoniae）是社區型大葉性肺炎最常見病原。其典型臨床表徵為突發高燒、寒顫、胸痛與咳「鐵鏽色痰（rusty sputum）」——因肺泡微血管出血、紅血球崩解的血色素混入痰中所致。相對地，綠膿桿菌痰偏綠、克雷白氏菌（Klebsiella）為「紅醋栗果凍狀（currant jelly）」痰。鐵鏽色痰是肺炎鏈球菌的經典考點。","options":{"A":"粉紅泡沫痰見於肺水腫，非肺炎鏈球菌。","B":"綠色痰多見於綠膿桿菌。","C":"正確：肺炎鏈球菌典型為鐵鏽色痰。","D":"黃色膿痰為非特異性化膿表現。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-80":{"quick":"腸球菌（Enterococcus）為革蘭氏陽性球菌；Neisseria、Vibrio、Campylobacter皆為革蘭氏陰性。","detail":{"background":"革蘭氏染色將細菌分兩大類：陽性菌（厚peptidoglycan、染紫）與陰性菌（薄peptidoglycan＋外膜LPS、染紅）。腸球菌（Enterococcus，腸道常在菌、可致泌尿道與心內膜炎，VRE為院內難治菌）屬革蘭氏「陽性」球菌；奈瑟氏菌（淋病／腦膜炎）、弧菌（霍亂／腸炎弧菌）、曲狀桿菌（空腸彎曲菌）皆為革蘭氏陰性。故不屬陰性者為腸球菌。","options":{"A":"Neisseria為G−雙球菌。","B":"正確：腸球菌為G＋球菌，不屬陰性。","C":"弧菌為G−彎曲桿菌。","D":"曲狀桿菌為G−螺旋彎曲桿菌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-65":{"quick":"亞急性細菌性心內膜炎最常由草綠色鏈球菌（viridans group）引起。","detail":{"background":"感染性心內膜炎依病程分急性與亞急性。「亞急性」者多侵犯原已受損的瓣膜（如風濕性心臟病、二尖瓣脫垂），病程緩、低毒力菌為主——最常見為口腔常在的草綠色鏈球菌（Streptococcus viridans，如S. sanguinis、S. mutans），常於拔牙等牙科操作後經菌血症附著瓣膜贅生物。相對地，「急性」心內膜炎多由金黃色葡萄球菌侵犯正常瓣膜（如靜脈藥癮者三尖瓣）。腸球菌則與泌尿生殖操作相關。","options":{"A":"正確：草綠色鏈球菌為亞急性心內膜炎最常見病原。","B":"β溶血鏈球菌較常致咽炎、蜂窩組織炎。","C":"肺炎雙球菌主要致肺炎、腦膜炎。","D":"金黃色葡萄球菌為「急性」心內膜炎主因。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-66":{"quick":"奈瑟氏球菌（Neisseria）為革蘭氏陰性雙球菌；葡萄球菌、鏈球菌、腸球菌皆為陽性。","detail":{"background":"臨床重要的革蘭氏陽性球菌包括：葡萄球菌（成簇、觸酶＋）、鏈球菌（成鏈、觸酶−）、腸球菌（腸道、抗逆境）。奈瑟氏球菌（Neisseria gonorrhoeae／meningitidis）為革蘭氏「陰性」雙球菌（咖啡豆狀、常見於白血球內），是唯一例外。辨識「球菌的陰陽性」是基礎考點：陰性球菌幾乎只有奈瑟氏菌與Moraxella。","options":{"A":"葡萄球菌為G＋。","B":"鏈球菌為G＋。","C":"正確：奈瑟氏球菌為G−雙球菌，非陽性。","D":"腸球菌為G＋。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-65":{"quick":"肉毒桿菌（C. botulinum）外毒素阻斷神經肌肉接合處乙醯膽鹼釋放，致弛緩性麻痺、呼吸麻痺。","detail":{"background":"肉毒桿菌（Clostridium botulinum）為厭氧產芽孢革蘭氏陽性桿菌，產生「肉毒桿菌毒素」——最強的神經毒素，作用於周邊神經肌肉接合處，裂解SNARE蛋白、阻斷乙醯膽鹼釋放，造成下行性對稱「弛緩性麻痺」，從顱神經（複視、眼瞼下垂、吞嚥困難）延伸至呼吸肌麻痺、心跳停止而死。常見於密封罐頭、真空包裝食品。破傷風桿菌毒素則相反（抑制抑制性神經元、致痙攣性麻痺）。","options":{"A":"產氣莢膜桿菌致氣性壞疽與食物中毒，非呼吸麻痺神經毒。","B":"破傷風桿菌致痙攣性（強直）麻痺，非弛緩性。","C":"正確：肉毒桿菌毒素致弛緩性麻痺、呼吸麻痺。","D":"葡萄球菌為食物中毒（嘔吐），非呼吸麻痺。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-66":{"quick":"葡萄球菌為「兼性厭氧」非絕對厭氧；故「絕對厭氧性」敘述錯誤。","detail":{"background":"金黃色葡萄球菌特性：革蘭氏陽性、成簇球菌、觸酶（catalase）陽性（與鏈球菌區別）、凝固酶（coagulase）陽性（致病性指標）、為「兼性厭氧菌」（有氧無氧皆可生長）、耐鹽（可在7.5–9% NaCl的Mannitol salt agar生長）、易產生抗藥性（如MRSA）。「絕對厭氧」是錯誤敘述——葡萄球菌並非絕對厭氧。","options":{"A":"正確（為錯誤敘述）：葡萄球菌是兼性厭氧，非絕對厭氧。","B":"葡萄球菌觸酶陽性，敘述正確。","C":"可在9% NaCl生長（耐鹽），敘述正確。","D":"易產生抗藥性（MRSA），敘述正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-72":{"quick":"肺炎雙球菌的莢膜（capsule）是抗吞噬的主要毒力因子。","detail":{"background":"肺炎鏈球菌（S. pneumoniae）最重要的毒力因子是「多醣莢膜（polysaccharide capsule）」——抑制吞噬細胞的吞噬作用，使細菌得以在體內存活增殖；有莢膜的菌株具致病性（光滑型S），失去莢膜即喪失毒力（粗糙型R）。莢膜也是疫苗（PCV13、PPSV23）的抗原基礎與血清分型依據。無莢膜的肺炎鏈球菌易被清除、不致病。","options":{"A":"酵素非肺炎雙球菌主要毒力因子。","B":"正確：莢膜抗吞噬，是主要毒力因子。","C":"細胞壁非其關鍵毒力因子。","D":"肺炎鏈球菌不以外毒素致病。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-73":{"quick":"肉毒桿菌經「食入預形成毒素（食物）」致病，非呼吸道；其餘三者經呼吸道。","detail":{"background":"腦膜炎雙球菌（飛沫）、肺炎雙球菌（飛沫／呼吸道）、炭疽桿菌（吸入孢子可致吸入性炭疽）皆可經呼吸道感染。肉毒桿菌（C. botulinum）食物型中毒是「攝入食物中預形成的毒素」經腸胃道吸收，並非經呼吸道；嬰兒型則為攝入孢子（如蜂蜜）。故不經呼吸道者為肉毒桿菌。","options":{"A":"腦膜炎雙球菌經飛沫／呼吸道。","B":"肺炎雙球菌經呼吸道飛沫。","C":"炭疽孢子吸入可致吸入性炭疽。","D":"正確：肉毒桿菌經食入毒素，非呼吸道。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-39":{"quick":"肺炎球菌（Pneumococcus）即肺炎鏈球菌，歸屬於鏈球菌（Streptococcus）。","detail":{"background":"「肺炎球菌（Pneumococcus）」是肺炎鏈球菌（Streptococcus pneumoniae）的舊稱，屬於鏈球菌屬，為α溶血（草綠色）、有莢膜的革蘭氏陽性雙球菌（柳葉刀狀），optochin敏感、膽鹽可溶，可與草綠色鏈球菌區別。它不是葡萄球菌、黴漿菌或披衣菌。","options":{"A":"葡萄球菌為成簇球菌，與肺炎球菌不同屬。","B":"黴漿菌無細胞壁，非肺炎球菌。","C":"披衣菌為胞內菌，非肺炎球菌。","D":"正確：肺炎球菌屬鏈球菌屬。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-65":{"quick":"葡萄球菌腸毒素食物中毒以噁心嘔吐為主、潛伏期短，通常「不發燒」。","detail":{"background":"金黃色葡萄球菌食物中毒為毒素型（攝入耐熱腸毒素）：潛伏期短（1–6小時，多在4小時內）、劇烈噁心嘔吐、腹瀉、腹絞痛，但因是毒素而非活菌侵襲，通常「無發燒」、病程短（24小時內自癒）。故「發燒」並非其特徵。發燒較常見於侵襲性細菌性腸炎（沙門氏菌、志賀氏菌）。","options":{"A":"潛伏期短（4小時內）是其特徵。","B":"嚴重嘔吐是主要表現。","C":"可有腹瀉。","D":"正確：通常不發燒，故非其特徵。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-66":{"quick":"抗生素相關偽膜性腸炎的病原為困難梭狀桿菌（Clostridioides difficile）。","detail":{"background":"廣效抗生素（clindamycin、ampicillin、cephalosporin、fluoroquinolone）破壞腸道正常菌叢後，使抗藥的「困難梭狀桿菌（C. difficile）」過度增生，產生毒素A／B破壞腸黏膜，形成偽膜性腸炎（pseudomembranous colitis），表現為水瀉、腹痛、發燒。治療為停用誘發抗生素並給口服vancomycin或fidaxomicin。此為抗生素相關腹瀉最重要病原。","options":{"A":"產氣莢膜桿菌致氣性壞疽與食物中毒。","B":"肉毒桿菌致神經麻痺。","C":"正確：C. difficile為偽膜性腸炎病原。","D":"腸炎弧菌為海鮮相關腸炎，非抗生素相關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-71":{"quick":"革蘭氏陰性菌細胞壁的peptidoglycan「較薄」；故「陰性菌細胞壁較厚」為錯誤。","detail":{"background":"革蘭氏染色差異本質在細胞壁：陽性菌有厚的peptidoglycan層（多層、保留結晶紫染紫色）＋teichoic acid；陰性菌的peptidoglycan「薄」（單層，位於內外膜之間的周質腔），外有含脂多醣（LPS，內毒素來源）的外膜，染色脫色後再染紅。故「陰性菌細胞壁較厚」與事實相反、為錯誤敘述。","options":{"A":"陰性菌含LPS，正確。","B":"正確（為錯誤敘述）：陰性菌peptidoglycan較薄、非較厚。","C":"陽性菌含厚peptidoglycan，正確。","D":"陽性菌含teichoic acid，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-69":{"quick":"此題經「送分（全給分）」；凝固酶（coagulase）為葡萄球菌的指標性酵素。","detail":{"background":"本題公告一律給分。就學理而言，金黃色葡萄球菌分泌多種酵素與毒素：凝固酶（coagulase，致病性葡萄球菌的鑑別指標，使血漿凝固形成保護膜）、catalase、hyaluronidase（擴散因子）、DNase、lipase等。惟選項中hyaluronidase、streptokinase等也涉及鏈球菌，敘述易混淆，故本題送分、所有選項均給分。凝固酶（A）為最具代表性者。","options":{"A":"凝固酶為葡萄球菌指標酵素（本題送分，各選項均給分）。","B":"hyaluronidase葡萄球菌與鏈球菌皆可產生。","C":"streptokinase主要為鏈球菌產生。","D":"DNase葡萄球菌亦可分泌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-71":{"quick":"感染後急性腎絲球腎炎與風濕熱主要由「A群」β溶血鏈球菌（化膿性鏈球菌）引起。","detail":{"background":"A群β溶血鏈球菌（Streptococcus pyogenes, GAS）感染後可引發兩大免疫性後遺症：①風濕熱（rheumatic fever）——多繼發於「咽喉感染」，因分子相似（molecular mimicry）使抗體攻擊心臟、關節；②急性鏈球菌後腎絲球腎炎（PSGN）——可繼發於咽喉或「皮膚」感染，因免疫複合體沉積腎絲球。兩者皆屬A群（Lancefield A）鏈球菌之併發症。B群（agalactiae）則與新生兒感染相關。","options":{"A":"正確：A群鏈球菌致風濕熱與急性腎絲球腎炎。","B":"B群與新生兒敗血症／腦膜炎相關。","C":"C群非典型後遺症主因。","D":"D群為腸球菌類，非此後遺症主因。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-72":{"quick":"毛囊炎、癤、癰等皮膚化膿感染最常見致病菌為金黃色葡萄球菌。","detail":{"background":"金黃色葡萄球菌（S. aureus）是皮膚軟組織化膿性感染的首要病原：毛囊炎（folliculitis）、癤（furuncle）、癰（carbuncle）、膿疱瘡、傷口感染、膿瘍等，因其凝固酶與多種毒素使感染局限化膿。綠膿桿菌毛囊炎多與泡澡（hot-tub）相關；鏈球菌較常致瀰漫性蜂窩組織炎與丹毒。常規化膿性毛囊炎以金黃色葡萄球菌為最常見。","options":{"A":"鏈球菌較常致丹毒、瀰漫蜂窩組織炎。","B":"正確：金黃色葡萄球菌為毛囊炎最常見病原。","C":"大腸桿菌少致皮膚毛囊炎。","D":"綠膿桿菌毛囊炎多與泡澡相關，非最常見。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-70":{"quick":"破傷風桿菌產毒需「厭氧（缺氧）」環境；「組織有氧存在」不利其產毒，故非條件。","detail":{"background":"破傷風桿菌（Clostridium tetani）為「絕對厭氧」產芽孢桿菌，孢子進入深而缺氧的傷口（如生鏽鐵釘穿刺、合併壞死或其他化膿菌感染、組織血供受損）才能發芽並產生破傷風痙攣毒素（tetanospasmin）。產毒「條件」包括：低氧化還原電位（缺氧）、合併需氧菌耗氧、組織壞死、鈣鹽與異物存在。「組織有氧存在」會抑制此絕對厭氧菌、不利產毒，故為「非條件」。","options":{"A":"合併化膿菌耗氧造成缺氧，利其產毒。","B":"正確：有氧不利厭氧菌產毒，故非條件。","C":"鈣鹽存在為產毒相關條件之一。","D":"血管破損致組織缺氧，利其產毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-66":{"quick":"肺炎雙球菌轉形實驗中，使其性狀改變的物質是「DNA（去氧核醣核酸）」。","detail":{"background":"葛瑞菲斯（Griffith）與Avery等的肺炎雙球菌轉形（transformation）實驗證明「DNA是遺傳物質」：將無致病性（粗糙R型，無莢膜）活菌與「已死亡的致病性（光滑S型）菌之DNA」混合，R型菌攝取S型DNA後轉形為有莢膜的致病性菌。使遺傳性狀改變的是DNA，而非蛋白質、細胞壁或脂肪酸。此為分子遺傳學里程碑。","options":{"A":"細胞壁非轉形的遺傳物質。","B":"蛋白質非遺傳物質（Avery實驗排除）。","C":"脂肪酸與遺傳無關。","D":"正確：DNA為轉形使性狀改變的物質。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-73":{"quick":"化膿性鏈球菌無鞭毛、不產芽孢；「具周鞭毛之產芽孢菌」為錯誤敘述。","detail":{"background":"化膿性鏈球菌（Streptococcus pyogenes, A群）特性：革蘭氏陽性、成鏈球菌、β溶血（血平板上完全溶血、形成透明環）、無鞭毛（不運動）、不產芽孢、觸酶陰性。它是猩紅熱、咽炎、丹毒、壞死性筋膜炎的病原，併發症含風濕熱與急性腎絲球腎炎。「具周鞭毛之產芽孢菌」完全錯誤——鏈球菌既無鞭毛也不產芽孢（產芽孢的是Clostridium、Bacillus）。","options":{"A":"正確（為錯誤敘述）：鏈球菌無鞭毛、不產芽孢。","B":"β溶血在血平板形成透明環，正確。","C":"為猩紅熱致病菌，正確。","D":"急性腎絲球腎炎為其併發症，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-65":{"quick":"肉毒桿菌毒素主要攻擊「神經細胞（神經肌肉接合處）」，阻斷乙醯膽鹼釋放。","detail":{"background":"肉毒桿菌毒素（botulinum toxin）作用標的為周邊運動神經末梢（神經肌肉接合處）的「神經細胞」：裂解突觸SNARE蛋白（SNAP-25），阻止乙醯膽鹼（ACh）釋放，造成肌肉無法收縮的弛緩性麻痺。臨床上利用此機制：醫美除皺、治療斜視、肌張力不全、痙攣。故攻擊對象為神經細胞，而非骨骼、上皮或脾臟細胞。","options":{"A":"非攻擊骨骼細胞。","B":"正確：作用於神經細胞、阻斷ACh釋放。","C":"非作用於呼吸道上皮。","D":"非作用於脾臟細胞。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-71":{"quick":"無乳鏈球菌（S. agalactiae, B群）為女性生殖道常在菌叢之一。","detail":{"background":"B群鏈球菌（Streptococcus agalactiae, GBS）可定殖於約10–30%孕婦的生殖道與直腸，屬常在菌叢；但於分娩時可垂直感染新生兒，造成新生兒敗血症與腦膜炎，故孕期35–37週需篩檢、陽性者產時給預防性抗生素。化膿性鏈球菌（pyogenes）、肺炎鏈球菌為致病菌非生殖道常在菌；Leuconostoc為環境菌。","options":{"A":"正確：B群無乳鏈球菌為女性生殖道常在菌。","B":"化膿性鏈球菌為致病菌，非生殖道常在菌。","C":"Leuconostoc為環境／食品菌，非生殖道常在菌。","D":"肺炎鏈球菌為呼吸道致病菌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-72":{"quick":"化膿性鏈球菌（A群）屬「β溶血」——血平板上形成完全溶血透明環。","detail":{"background":"鏈球菌依血平板溶血型分類：α溶血（部分溶血、草綠色，如肺炎鏈球菌、草綠色鏈球菌）；β溶血（完全溶血、透明環，如A群pyogenes、B群agalactiae）；γ溶血（不溶血，如腸球菌、D群）。化膿性鏈球菌（S. pyogenes）為β溶血。掌握「α草綠／β透明／γ不溶」是基本考點。","options":{"A":"α溶血為草綠色部分溶血（肺炎鏈球菌等）。","B":"正確：化膿性鏈球菌為β溶血。","C":"γ溶血為不溶血（腸球菌）。","D":"無δ溶血之分類。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-70":{"quick":"葡萄球菌可引起食物中毒（腸毒素）；腎絲球腎炎、風濕熱、咽喉炎多為鏈球菌所致。","detail":{"background":"此題區分葡萄球菌與鏈球菌的疾病：葡萄球菌（S. aureus）致皮膚化膿感染、食物中毒（耐熱腸毒素）、毒性休克症候群、燙傷狀皮膚症候群、心內膜炎、骨髓炎。急性腎絲球腎炎、風濕熱（免疫後遺症）與咽喉炎則主要為A群鏈球菌所致。故由葡萄球菌引起者為「食物中毒」。","options":{"A":"急性腎絲球腎炎多為A群鏈球菌後遺症。","B":"正確：食物中毒由葡萄球菌腸毒素引起。","C":"風濕熱為鏈球菌後遺症。","D":"咽喉炎多由A群鏈球菌引起。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-71":{"quick":"A群鏈球菌感染首選青黴素（penicillin）——對其仍高度敏感、無抗藥性。","detail":{"background":"A群β溶血鏈球菌（S. pyogenes）至今對青黴素（penicillin）仍維持高度敏感、未出現臨床抗藥性，故為治療咽炎、丹毒、猩紅熱、皮膚軟組織感染的首選；青黴素過敏者改用紅黴素或第一代頭孢。及早足量治療咽炎可預防風濕熱。萬古黴素保留給MRSA等抗藥革蘭氏陽性菌、非A群鏈球菌首選。","options":{"A":"紅黴素為青黴素過敏者的替代，非首選。","B":"氯黴素非首選且毒性大。","C":"正確：青黴素為A群鏈球菌首選。","D":"萬古黴素保留給抗藥菌，非首選。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-69":{"quick":"衛生棉條相關毒性休克症候群（TSS）由金黃色葡萄球菌TSST-1毒素引起。","detail":{"background":"毒性休克症候群（toxic shock syndrome, TSS）經典與「高吸收力衛生棉條久置」相關，由金黃色葡萄球菌產生的「中毒性休克症候群毒素-1（TSST-1）」引起——它是「超抗原（superantigen）」，非特異性大量活化T細胞、釋放大量細胞激素（cytokine storm），造成高燒、低血壓休克、瀰漫紅疹脫屑、多器官衰竭。A群鏈球菌也可致鏈球菌型TSS，但棉條相關者經典為金黃色葡萄球菌。","options":{"A":"腦膜炎雙球菌致腦膜炎／敗血症，非棉條TSS。","B":"A群鏈球菌可致鏈球菌型TSS但非棉條經典病原。","C":"正確：金黃色葡萄球菌TSST-1致棉條相關TSS。","D":"淋病雙球菌不致TSS。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-70":{"quick":"大腸桿菌（E. coli）為革蘭氏陰性桿菌；白喉、炭疽、肉毒桿菌皆為革蘭氏陽性桿菌。","detail":{"background":"革蘭氏陽性桿菌的代表：白喉棒狀桿菌（Corynebacterium）、炭疽桿菌（Bacillus anthracis）、肉毒桿菌與破傷風桿菌（Clostridium）、李斯特菌。大腸桿菌（E. coli）屬腸內桿菌科，為革蘭氏「陰性」桿菌（有LPS外膜）。故不是革蘭氏陽性桿菌者為大腸桿菌。","options":{"A":"白喉桿菌為G＋桿菌。","B":"正確：大腸桿菌為G−桿菌，不屬陽性。","C":"炭疽桿菌為G＋產芽孢桿菌。","D":"肉毒桿菌為G＋厭氧產芽孢桿菌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-66":{"quick":"富含脂多醣（LPS）是革蘭氏「陰性」菌外膜的特徵；陽性菌無LPS，故此敘述錯誤。","detail":{"background":"革蘭氏陽性菌特性：染色呈藍紫色、厚peptidoglycan細胞壁、含teichoic acid、「無外膜、無LPS」。脂多醣（LPS，內毒素）是革蘭氏陰性菌「外膜」的成分，陽性菌沒有。故「革蘭氏陽性菌富含LPS」與事實相反，為錯誤敘述。葡萄球菌確為陽性菌（D正確）。","options":{"A":"陽性菌染藍紫色，正確。","B":"正確（為錯誤敘述）：LPS為陰性菌外膜成分，陽性菌無。","C":"陽性菌細胞壁較厚，正確。","D":"葡萄球菌為陽性菌，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-70":{"quick":"李斯特菌主要經「食用受污染、未完全滅菌的乳製品（與冷藏即食食品）」傳染。","detail":{"background":"單核球增多性李斯特菌（Listeria monocytogenes）為革蘭氏陽性桿菌，可在「冷藏溫度（4°C）」生長（耐冷），主要經食物傳播——未經完全巴氏滅菌的乳製品、軟乳酪、即食肉品、生菜。它對孕婦（致流產、新生兒感染）、新生兒、老人與免疫低下者特別危險，可致敗血症與腦膜炎。故主要傳染途徑為食用未完全消毒之乳製品。","options":{"A":"血液／輸血非李斯特菌主要途徑。","B":"生蠔相關者為腸炎弧菌／海洋弧菌。","C":"正確：經未完全消毒乳製品等食物傳染。","D":"傷口感染非其主要途徑。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-71":{"quick":"MRSA抗藥機制為mecA基因產生改變的青黴素結合蛋白（PBP2a），降低β-lactam親和力。","detail":{"background":"抗methicillin金黃色葡萄球菌（MRSA）的抗藥機制不是分解藥物，而是獲得「mecA基因」、表現一種改變的「青黴素結合蛋白PBP2a」——它對所有β-lactam類（含methicillin、oxacillin、多數penicillin與cephalosporin）親和力極低，使藥物無法抑制細胞壁合成，故對整類β-lactam皆抗藥。治療改用vancomycin、linezolid、daptomycin。注意：一般葡萄球菌的penicillin抗藥才是靠β-lactamase；MRSA則是PBP改變。","options":{"A":"非以替代代謝途徑（如磺胺抗藥）抗藥。","B":"核糖體改變為胺基醣苷／巨環素抗藥機制。","C":"β-lactamase為一般penicillin抗藥機制，非MRSA對methicillin的機制。","D":"正確：PBP（PBP2a）改變致對β-lactam抗藥。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-70":{"quick":"肉毒桿菌毒素除皺機制為「阻斷神經肌肉接合處乙醯膽鹼釋放」，使肌肉鬆弛。","detail":{"background":"醫美除皺利用肉毒桿菌毒素（Botox）作用於神經肌肉接合處：抑制突觸前膜乙醯膽鹼（ACh）的釋放（裂解SNAP-25），使表情肌（如皺眉肌）暫時性鬆弛麻痺，撫平動態皺紋，效果約維持3–6個月。它不是使肌肉壞死、也非破壞接受器或阻斷GABA，而是阻斷ACh釋放。","options":{"A":"正確：阻斷乙醯膽鹼釋放使肌肉鬆弛除皺。","B":"非使肌肉壞死。","C":"作用於ACh非GABA。","D":"非破壞神經末梢接受器。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-73":{"quick":"抗生素相關腹瀉（偽膜性腸炎）最常見病原為困難梭狀桿菌（C. difficile）。","detail":{"background":"抗生素相關腹瀉（antibiotic-associated diarrhea）中，最重要、最嚴重者為困難梭狀桿菌（C. difficile）感染——廣效抗生素破壞腸道菌叢後，抗藥的C. difficile過度增生並產生毒素A/B，造成偽膜性腸炎。空腸曲狀桿菌、產氣莢膜桿菌、仙人掌桿菌為「食物相關」腸炎，與抗生素使用無直接因果。","options":{"A":"空腸曲狀桿菌為食物（雞肉）相關腸炎。","B":"正確：C. difficile為抗生素相關腹瀉病原。","C":"產氣莢膜桿菌為食物中毒，非抗生素相關。","D":"仙人掌桿菌為米飯類食物中毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-67":{"quick":"白喉桿菌（Corynebacterium diphtheriae）為革蘭氏陽性桿菌。","detail":{"background":"革蘭氏陽性桿菌代表為白喉棒狀桿菌（Corynebacterium，柵欄狀排列、異染顆粒）。其餘選項——腸炎弧菌、綠膿桿菌、腦膜炎雙球菌皆為革蘭氏陰性。故為陽性桿菌者為白喉桿菌。補充：白喉桿菌（Corynebacterium diphtheriae）柵欄狀排列、Albert染色見「異染顆粒（metachromatic granules）」，由帶tox基因的溶原性噬菌體產生白喉毒素（ADP核醣化eEF-2、抑制蛋白質合成），致咽喉灰白「偽膜」可阻塞氣道。記憶：G＋桿菌＝白喉、炭疽（Bacillus）、肉毒/破傷風/產氣莢膜（Clostridium）、李斯特；弧菌/綠膿/奈瑟皆G−。","options":{"A":"腸炎弧菌為G−彎曲桿菌。","B":"正確：白喉桿菌為G＋桿菌。","C":"綠膿桿菌為G−桿菌。","D":"腦膜炎雙球菌為G−雙球菌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-68":{"quick":"新生兒細菌性腦膜炎最常見病原為大腸桿菌（與B群鏈球菌、李斯特菌）。","detail":{"background":"不同年齡腦膜炎病原不同：新生兒（0–3個月）以大腸桿菌（E. coli，尤其K1莢膜株）、B群鏈球菌（GBS）、李斯特菌為主（經產道或周產期感染）；嬰幼兒／青少年則以腦膜炎雙球菌、肺炎鏈球菌、Hib為主。本題選項中最常引起「新生兒」腦膜炎者為大腸桿菌。","options":{"A":"腦膜炎雙球菌好發於兒童青少年，非新生兒最常見。","B":"正確：大腸桿菌為新生兒腦膜炎最常見病原之一。","C":"肺炎鏈球菌好發較大兒童與成人。","D":"結核分枝桿菌致慢性腦膜炎，非新生兒急性常見。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-76":{"quick":"白喉桿菌會造成呼吸道（偽膜性咽喉炎）症狀，也可造成皮膚白喉感染。","detail":{"background":"白喉棒狀桿菌（C. diphtheriae）由帶有tox基因的噬菌體（溶原轉換）產生白喉毒素（抑制eEF-2、阻斷蛋白質合成）。臨床以「呼吸道白喉」為主——咽喉灰白色偽膜（假膜）、可阻塞氣道，毒素入血傷心肌與神經；亦可造成「皮膚白喉」（熱帶地區）。人類為唯一宿主（非人畜共通）；因病程快、致死，須在「實驗室確診前」即臨床判斷給抗毒素；自然感染未必產生足夠保護性免疫，仍須疫苗（DTaP類毒素）。","options":{"A":"人類為唯一宿主，非人畜共通。","B":"正確：可致呼吸道偽膜也可皮膚感染。","C":"須臨床懷疑即治療（給抗毒素），不能等確診。","D":"自然感染未必產生足夠保護性免疫，仍需疫苗。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-77":{"quick":"牙關緊閉、面部痙攣、角弓反張併自律神經不穩，是破傷風（tetanus）典型表現。","detail":{"background":"破傷風（tetanus）由破傷風桿菌毒素（tetanospasmin）阻斷脊髓抑制性神經元（GABA／glycine）釋放，造成「痙攣性（強直性）麻痺」：牙關緊閉（lockjaw/trismus）、苦笑面容、頸背強直、角弓反張、肌肉痛性痙攣，併自律神經過度活化（心律不整、大汗、血壓波動）。與肉毒桿菌（弛緩性麻痺）相反。經缺氧傷口感染，預防靠破傷風類毒素疫苗。","options":{"A":"G−敗血症為休克／發燒，非牙關緊閉痙攣。","B":"食物中毒為腸胃症狀。","C":"肉毒桿菌為弛緩性麻痺（與此相反）。","D":"正確：牙關緊閉、痙攣、自律神經不穩為破傷風。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-65":{"quick":"肺炎雙球菌轉形實驗中，使無毒菌轉為有毒的物質是「核酸（DNA）」。","detail":{"background":"同肺炎雙球菌轉形實驗：無致病性（無莢膜R型）活菌攝取已死亡之有毒（S型）菌的「DNA」後，獲得合成莢膜的基因而轉形為有致病性菌。Avery、MacLeod、McCarty證明此轉形因子是DNA（以DNase處理可消除轉形），確立DNA為遺傳物質。故答案為核酸。","options":{"A":"細胞壁非轉形遺傳物質。","B":"蛋白質非轉形因子。","C":"脂肪酸與遺傳無關。","D":"正確：核酸（DNA）為使其轉形致病的物質。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-68":{"quick":"仙人掌桿菌（Bacillus cereus）感染眼睛可造成嚴重眼內炎與組織破壞。","detail":{"background":"仙人掌桿菌（Bacillus cereus）為革蘭氏陽性產芽孢桿菌：食物中毒有兩型——「嘔吐型」由耐熱腸毒素（常見炒飯久置）、「腹瀉型」由不耐熱腸毒素。此外，B. cereus是「外傷性眼內炎（endophthalmitis）」的重要病原，感染進展快、毒素致嚴重組織破壞、常導致失明。它對penicillin抗藥（產β-lactamase），與炭疽桿菌不同（不致類炭疽症狀）。故正確為「感染眼睛造成嚴重組織破壞」。","options":{"A":"B. cereus常對penicillin抗藥，非有效。","B":"不會造成類似炭疽熱症狀。","C":"嘔吐型由「耐熱」腸毒素（非不耐熱）引起。","D":"正確：眼部感染造成嚴重組織破壞。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-79":{"quick":"肺炎披衣菌感染細胞「會」形成包涵體；故「不會形成包涵體」為錯誤敘述。","detail":{"background":"肺炎披衣菌（Chlamydophila/Chlamydia pneumoniae）為絕對胞內寄生菌，具獨特雙型生活史：感染型的「原體（elementary body, EB）」進入細胞後轉為增殖型「網狀體（reticulate body, RB）」，在胞內形成「包涵體（inclusion body）」內大量複製。它人傳人經呼吸道、只有一種血清型、與非典型肺炎及粥狀動脈硬化相關。故「不會形成包涵體」與事實相反、為錯誤。","options":{"A":"人為主要宿主、呼吸道傳播，正確。","B":"只有一種血清型，正確。","C":"正確（為錯誤敘述）：披衣菌感染會形成包涵體。","D":"與粥狀動脈硬化相關，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-80":{"quick":"黴漿菌（Mycoplasma）缺乏細胞壁，故青黴素（作用於細胞壁）對其無效。","detail":{"background":"黴漿菌（Mycoplasma pneumoniae）是最小的自我複製細菌、「無細胞壁」（細胞膜含固醇）。由於青黴素、頭孢菌素等β-lactam抗生素的作用標的是細胞壁peptidoglycan合成，黴漿菌沒有細胞壁故對這類藥「天然抗藥」；治療須用作用於蛋白質合成的巨環類（macrolide，如azithromycin）、四環素或fluoroquinolone。破傷風桿菌、梅毒螺旋體、疏螺旋體皆有細胞壁。","options":{"A":"破傷風桿菌有細胞壁。","B":"梅毒螺旋體有細胞壁（雖薄）。","C":"疏螺旋體有細胞壁。","D":"正確：黴漿菌無細胞壁，青黴素無效。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-66":{"quick":"肉毒桿菌毒素為神經毒素（阻斷神經傳導）；霍亂、紅斑、百日咳毒素作用機制不同。","detail":{"background":"依作用機制，外毒素可分神經毒素、腸毒素、細胞毒素等。「神經毒素」如肉毒桿菌毒素（阻斷ACh釋放、弛緩麻痺）與破傷風毒素（阻斷抑制性神經傳導、痙攣麻痺）。霍亂毒素（活化腺苷酸環化酶、cAMP上升致大量水瀉，屬腸毒素）、紅斑毒素（鏈球菌猩紅熱皮疹，超抗原）、百日咳毒素（抑制Gi、影響cAMP訊息）皆非典型神經毒素。故神經毒素為肉毒桿菌毒素。","options":{"A":"霍亂毒素為腸毒素（cAMP水瀉）。","B":"紅斑毒素為猩紅熱皮疹毒素（超抗原）。","C":"正確：肉毒桿菌毒素為神經毒素。","D":"百日咳毒素作用於G蛋白訊息，非典型神經毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-74":{"quick":"李斯特菌主要侵襲「免疫低下者、孕婦、新生兒、老人」，非主要感染健康人；此敘述錯誤。","detail":{"background":"李斯特菌（Listeria monocytogenes）為胞內寄生的革蘭氏陽性桿菌，雖可在冷藏食品中繁殖，但「侵襲性感染」主要發生在免疫低下族群——孕婦（致流產、死產、新生兒敗血症）、新生兒、老人、免疫抑制者；健康成人多僅輕微腸胃炎或無症狀。故「主要感染健康人引發嚴重侵襲性感染」與事實相反、為錯誤。其餘食物中毒敘述（金黃色葡萄球菌腸毒素、曲狀桿菌雞肉、仙人掌桿菌腹瀉）皆正確。","options":{"A":"金黃色葡萄球菌腸毒素污染食物致中毒，正確。","B":"曲狀桿菌常因受感染雞肉，正確。","C":"正確（為錯誤敘述）：李斯特菌主要侵襲免疫低下者，非健康人。","D":"仙人掌桿菌腸毒素可致水瀉，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-67":{"quick":"藍氏（Lancefield）分類依鏈球菌「細胞壁」的C醣類抗原差異分群（A、B、D等）。","detail":{"background":"Lancefield血清學分類法依β溶血鏈球菌「細胞壁的carbohydrate（C抗原，多醣）」抗原性差異，將其分為A、B、C、D…等群——如A群（pyogenes）、B群（agalactiae）、D群（腸球菌類）。此分類用於臨床鑑定與流行病學。故分類依據為細胞壁的醣類抗原，非細胞膜、細胞質或細胞核。","options":{"A":"正確：依細胞壁C醣類抗原分群。","B":"非依細胞膜分類。","C":"非依細胞質分類。","D":"細菌無真正細胞核，非分類依據。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-68":{"quick":"棉條相關毒性休克症候群由金黃色葡萄球菌（TSST-1）引起。","detail":{"background":"同前述TSS：高吸收力衛生棉條久置提供金黃色葡萄球菌增殖環境，產生超抗原TSST-1，引發高燒、低血壓休克、瀰漫紅疹脫屑與多器官受損。經典棉條相關TSS病原為金黃色葡萄球菌；A群鏈球菌可致鏈球菌型TSS但非棉條相關之經典病原。補充：毒性休克症候群(TSS)由金黃色葡萄球菌「TSST-1超抗原」引起——超抗原直接橋接MHC II與TCR的Vβ區、非特異活化大量(5–20%)T細胞、釋放細胞激素風暴，致高燒、低血壓休克、瀰漫紅疹脫屑、多器官衰竭。經典＝高吸收力衛生棉條久置；亦見於傷口、鼻填塞。A群鏈球菌可致鏈球菌型TSS(常合併壞死性筋膜炎)。","options":{"A":"腦膜炎雙球菌非棉條TSS病原。","B":"正確：金黃色葡萄球菌TSST-1致棉條TSS。","C":"A群鏈球菌可致鏈球菌型TSS，非棉條經典病原。","D":"淋病雙球菌不致TSS。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-69":{"quick":"絕對厭氧菌因缺乏超氧岐化酶（SOD）與觸酶（catalase），無法清除氧的毒性產物而不能在有氧下生長。","detail":{"background":"氧代謝會產生有毒的超氧化物（O₂⁻）與過氧化氫（H₂O₂）。需氧菌靠「超氧岐化酶（SOD）」將O₂⁻轉為H₂O₂、再以「觸酶（catalase）或過氧化酶」分解H₂O₂解毒。絕對厭氧菌（如Clostridium、Bacteroides）缺乏SOD與catalase，在有氧環境下會被超氧化物與過氧化氫毒殺，故只能在無氧下生長。凝固酶與氧化酶與此氧毒性防禦無關。","options":{"A":"凝固酶與抗氧無關。","B":"正確：缺SOD與catalase故不能耐氧。","C":"氧化酶非清除超氧化物的關鍵酵素組合。","D":"凝固酶與抗氧無關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-44":{"quick":"肉毒桿菌經食入毒素致病，非經呼吸道；腦膜炎雙球菌、肺炎雙球菌、炭疽可經呼吸道。","detail":{"background":"同107年類題：腦膜炎雙球菌（飛沫）、肺炎雙球菌（呼吸道）、炭疽桿菌（吸入孢子→吸入性炭疽）皆可經呼吸道；肉毒桿菌食物中毒為攝入食物中預形成毒素，不經呼吸道。故不經呼吸道者為肉毒桿菌。補充：判斷「是否經呼吸道」可從致病機轉切入——肉毒桿菌是「攝入食物中預形成的神經毒素」（毒素型中毒、經腸胃吸收），與經呼吸道飛沫/吸入孢子的腦膜炎雙球菌、肺炎雙球菌、炭疽完全不同。炭疽三型中「吸入型」最致命（出血性縱膈炎）。肉毒桿菌毒素＝阻斷ACh釋放→弛緩性麻痺、呼吸肌麻痺。","options":{"A":"腦膜炎雙球菌經飛沫。","B":"肺炎雙球菌經呼吸道。","C":"炭疽孢子吸入致吸入性炭疽。","D":"正確：肉毒桿菌經食入毒素，非呼吸道。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-46":{"quick":"炭疽桿菌很少引起肺炎；吸入型為出血性縱膈炎而非典型肺炎，此敘述正確。","detail":{"background":"炭疽桿菌（Bacillus anthracis）為革蘭氏陽性產芽孢桿菌，毒力因子為「蛋白質莢膜（poly-D-glutamate，非多醣）」與三聯體外毒素（保護抗原PA＋致死因子LF＋水腫因子EF）。臨床三型：皮膚型（最常見、焦痂、致死率低，可治療）、吸入型（最致命、出血性縱膈炎與敗血症，並非典型肺泡肺炎、故「很少引起肺炎」之描述成立）、腸胃型（嚴重、致死率高）。故「很少引發肺炎」正確；其餘選項皆與事實相反。","options":{"A":"正確：炭疽吸入型為出血性縱膈炎，很少為典型肺炎。","B":"莢膜為「蛋白質（poly-D-glutamate）」非多醣體。","C":"皮膚型致死率最低，非最高。","D":"腸胃型致死率高，非極低。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-47":{"quick":"產氣莢膜桿菌（C. perfringens）為「厭氧」菌，非需氧菌；此敘述錯誤。","detail":{"background":"產氣莢膜桿菌（Clostridium perfringens）為革蘭氏陽性、產芽孢的「厭氧」桿菌。在缺氧的壞死組織中增殖、發酵醣類產生氣體（造成皮下捻髮音與氣性壞疽gas gangrene），並分泌α毒素（lecithinase/卵磷脂酶）破壞細胞膜；腸道感染可致壞死性腸炎、食物中毒。故「需氧菌」為錯誤——它是厭氧菌。其餘敘述（G＋、氣性壞疽、壞死性腸炎）皆正確。","options":{"A":"為革蘭氏陽性，正確。","B":"正確（為錯誤敘述）：為厭氧菌、非需氧。","C":"產氣致氣性壞疽，正確。","D":"可致壞死性腸炎，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-44":{"quick":"葡萄球菌食物中毒「潛伏期短（數小時）」；「潛伏期長（24小時後）」為非特徵（錯誤）。","detail":{"background":"金黃色葡萄球菌食物中毒因攝入「預形成的耐熱腸毒素」，發病極快——潛伏期短（1–6小時，平均約2–4小時），以噁心、嘔吐為主，伴腹瀉腹痛，多不發燒、24小時內自癒。故「潛伏期長（24小時後才發生）」與事實相反，並非其特徵。補充：金黃色葡萄球菌食物中毒為「毒素型(intoxication)」——攝入預形成的耐熱腸毒素，故潛伏期短(1–6小時、平均2–4)、以噁心嘔吐為主、多不發燒、24小時內自癒。與「感染型」(沙門氏菌、志賀氏菌，潛伏較長、發燒血便)區別。出題陷阱：葡萄球菌食物中毒「潛伏期短、不發燒」，故「潛伏期長(24h後)」或「發燒血便」皆為非其特徵。","options":{"A":"嘔吐為主要特徵。","B":"正確：潛伏期「短」非長，故「潛伏期長」為非特徵。","C":"噁心為特徵。","D":"腹瀉為特徵之一。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-45":{"quick":"金黃色葡萄球菌院內感染（多為MRSA）首選萬古黴素（vancomycin）。","detail":{"background":"院內感染的金黃色葡萄球菌多為抗甲氧苯青黴素株（MRSA），對所有β-lactam（含penicillin、cephalosporin）抗藥。治療嚴重MRSA感染首選「萬古黴素（vancomycin）」（作用於細胞壁前驅物D-Ala-D-Ala），替代藥含linezolid、daptomycin。青黴素、紅黴素、氯黴素對MRSA多無效或抗藥。","options":{"A":"紅黴素對MRSA多已抗藥。","B":"正確：萬古黴素為MRSA院內感染首選。","C":"氯黴素非首選且毒性大。","D":"青黴素對MRSA無效。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-44":{"quick":"致病性葡萄球菌「凝固酶陽性」；「凝固酶呈陰性」非其特色（陰性者多為非致病表皮葡萄球菌）。","detail":{"background":"金黃色葡萄球菌（致病性葡萄球菌）特色：產生金黃色色素、發酵甘露醇（mannitol，在MSA上變黃）、具溶血作用、「凝固酶（coagulase）陽性」（凝固酶是致病性指標，使血漿凝固形成保護纖維蛋白）。凝固酶「陰性」的葡萄球菌（如表皮葡萄球菌S. epidermidis）多為皮膚常在、低致病性（除導管相關感染）。故「凝固酶反應陰性」並非致病性葡萄球菌特色。","options":{"A":"能產生（金黃色）色素，是特色。","B":"能發酵甘露醇，是特色。","C":"具溶血作用，是特色。","D":"正確：致病性葡萄球菌凝固酶「陽性」，故陰性反應非其特色。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-45":{"quick":"心內膜炎是金黃色葡萄球菌「侵襲」瓣膜所致，非由其分泌的「毒素」造成。","detail":{"background":"金黃色葡萄球菌的疾病可分「毒素媒介（toxin-mediated）」與「侵襲性（invasive）」兩類。毒素媒介者：食物中毒（腸毒素）、燙傷狀皮膚症候群（剝脫毒素）、毒性休克症候群（TSST-1）、猛爆性紫斑（部分與超抗原相關）。心內膜炎（endocarditis）則是細菌「直接侵襲」並黏附心瓣膜形成贅生物的感染，非由分泌毒素引起。故「不是由毒素導致」者為心內膜炎。","options":{"A":"猛爆性紫斑與毒素／超抗原相關。","B":"食物中毒由腸毒素（毒素）導致。","C":"正確：心內膜炎為侵襲性感染，非毒素導致。","D":"燙傷狀皮膚症候群由剝脫毒素導致。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-45":{"quick":"葡萄球菌食物中毒通常「不發燒、不血便」；故「伴隨發燒及血便」為錯誤敘述。","detail":{"background":"金黃色葡萄球菌食物中毒為毒素型：食材於煮熟前被污染、產生耐熱腸毒素，症狀於進食後平均約4小時內發作，以劇烈嘔吐、噁心、腹瀉為主，「通常不發燒、無血便」，病程短可自癒，治療以症狀支持為主、不需抗生素。故「伴隨發燒及血便」與事實不符、為錯誤（發燒血便較見於侵襲性細菌性腸炎如志賀氏、沙門氏菌）。","options":{"A":"進食後約4小時發作，正確。","B":"由耐熱腸毒素造成，正確。","C":"正確（為錯誤敘述）：通常不發燒不血便。","D":"以症狀治療為主、不需抗生素，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-47":{"quick":"傷口出現黃橘色「硫磺顆粒（sulfur granules）」、與口腔衛生不佳／牙科手術相關者為放線菌（Actinomyces）。","detail":{"background":"放線菌（Actinomyces israelii）為革蘭氏陽性、厭氧、絲狀分枝桿菌，是口腔正常菌叢；於口腔衛生不佳、拔牙或侵入性牙科手術後侵入組織，造成「頸面部放線菌病」——慢性化膿、形成竇道並排出含菌絲團塊的「黃橘色硫磺顆粒（sulfur granules）」。治療為長期青黴素。乳酸桿菌、比菲德氏菌為腸道益菌，梭狀芽孢桿菌不形成硫磺顆粒。","options":{"A":"正確：放線菌形成硫磺顆粒、與牙科操作相關。","B":"乳酸桿菌為腸道益菌，不形成硫磺顆粒。","C":"比菲德氏菌為腸道益菌，無此表現。","D":"梭狀芽孢桿菌不形成硫磺顆粒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-41":{"quick":"革蘭氏陽性菌的peptidoglycan層較陰性菌厚；此敘述正確。","detail":{"background":"革蘭氏陽性菌特性：染色呈藍紫色（非紅色）、細胞壁有「厚的peptidoglycan層」（多層交聯，故脫色時保留結晶紫）、含teichoic acid、「無外膜、無LPS」、只有單層細胞膜（無內外膜之分）。故正確敘述為「其peptidoglycan層較陰性菌厚」。其餘選項（染紅、有內外膜、細胞膜含LPS）皆為陰性菌特徵、對陽性菌而言錯誤。","options":{"A":"陽性菌染藍紫色，非紅色。","B":"陽性菌無外膜（內外膜為陰性菌特徵）。","C":"LPS為陰性菌外膜成分，陽性菌無。","D":"正確：陽性菌peptidoglycan層較厚。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-45":{"quick":"風濕熱主要繼發於A群鏈球菌的「咽喉」感染，非皮膚感染；此敘述錯誤。","detail":{"background":"化膿性鏈球菌（S. pyogenes, A群）特性與後遺症：M protein為主要毒力因子與分型依據（抗吞噬、與風濕熱分子相似有關）；可致壞死性筋膜炎（俗稱「噬肉菌」，需抗生素＋清創手術）；急性腎絲球腎炎可繼發於咽喉或皮膚感染、以ASO（anti-streptolysin O）等檢測佐證。但「風濕熱」主要繼發於「咽喉（扁桃腺）感染」，而非皮膚感染（皮膚感染後較易致腎絲球腎炎、極少致風濕熱）。故B為錯誤敘述。","options":{"A":"M protein為致病與分型蛋白，正確。","B":"正確（為錯誤敘述）：風濕熱主要源自咽喉感染，非皮膚。","C":"噬肉菌需抗生素併手術，正確。","D":"可致急性腎絲球腎炎、ASO輔助診斷，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-79":{"quick":"尿素呼吸試驗（urea breath test）用於診斷幽門螺旋桿菌（H. pylori）。","detail":{"background":"幽門螺旋桿菌（Helicobacter pylori）為彎曲的革蘭氏陰性桿菌，具強力「尿素酶（urease）」，可將尿素分解為氨而中和胃酸、定殖胃黏膜，與慢性胃炎、消化性潰瘍、胃癌、MALT淋巴瘤相關。尿素呼吸試驗即利用此尿素酶活性：服用含¹³C/¹⁴C標記的尿素，若有H. pylori則分解產生標記CO₂由呼氣測得。為非侵入性診斷與療效追蹤工具。","options":{"A":"志賀氏菌診斷靠糞便培養，非尿素呼吸試驗。","B":"沙門氏菌靠培養／血清，非此試驗。","C":"曲狀桿菌靠糞便培養。","D":"正確：尿素呼吸試驗針對幽門螺旋桿菌（尿素酶）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-72":{"quick":"退伍軍人病經吸入含菌的「水氣微粒（氣溶膠）」感染，不會人傳人。","detail":{"background":"退伍軍人桿菌（Legionella pneumophila）為革蘭氏陰性桿菌，存在於溫水環境——冷卻水塔、空調、熱水系統、噴霧裝置。人吸入含菌的「水氣微粒（aerosol）」而感染肺部，造成退伍軍人病（嚴重肺炎）或龐提亞克熱；「不會人傳人」、不靠輸血或蟲咬。高危群為老人、吸菸、慢性肺病、免疫低下者。診斷靠尿液抗原，治療用巨環類或fluoroquinolone。","options":{"A":"非經輸血。","B":"非經蚊蟲叮咬。","C":"正確：經吸入含菌水氣微粒。","D":"非經鼠咬。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-73":{"quick":"梅毒以「第一期與第二期」體內細菌量大、傳染力最高。","detail":{"background":"梅毒（Treponema pallidum）分期：第一期（硬性下疳、無痛潰瘍，局部螺旋體大量）；第二期（全身性皮膚黏膜疹含手掌腳掌、扁平濕疣，螺旋體經血播散全身、傳染力最高）；潛伏期；第三期（梅毒腫、心血管與神經性梅毒，此期細菌少、傳染力低、以組織破壞與免疫反應為主）。故傳染力高的時期為「第一、二期」。","options":{"A":"第三期傳染力低，不應含。","B":"正確：第一、二期細菌多、傳染力最高。","C":"第三期傳染力低。","D":"缺第二期，第二期傳染力最高不可漏。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-74":{"quick":"類桿菌（Bacteroides）感染多為「多種微生物混合（內源性）厭氧化膿性」感染。","detail":{"background":"脆弱類桿菌（Bacteroides fragilis）為腸道內最主要的厭氧革蘭氏陰性桿菌、屬正常菌叢，當黏膜屏障破壞（腸穿孔、手術、腹腔污染）時侵入，造成「內源性、多種微生物（混合需氧厭氧菌）」的化膿性感染——腹腔膿瘍、骨盆腔膿瘍。其莢膜為毒力因子、可促膿瘍形成（故具化膿性）。它與胃癌無關（胃癌為H. pylori）。","options":{"A":"正確：類桿菌感染多為多種微生物混合感染。","B":"為內源性（常在菌）感染，非外源性。","C":"具化膿性（形成膿瘍）。","D":"胃癌與H. pylori相關，非類桿菌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-75":{"quick":"志賀氏桿菌（Shigella）主要引起細菌性痢疾（血便、裏急後重）。","detail":{"background":"志賀氏桿菌（Shigella）為革蘭氏陰性、不運動的腸內桿菌，「感染劑量極低（數十至數百個菌即可致病）」、人傳人易，侵襲大腸黏膜上皮，產生志賀毒素（Shiga toxin），造成「細菌性痢疾（bacillary dysentery）」——發燒、腹痛、裏急後重、黏液血便。它不致腦膜炎、肺炎或尿道炎。","options":{"A":"非致腦膜炎。","B":"正確：志賀氏桿菌致細菌性痢疾。","C":"非致肺炎。","D":"非致尿道炎。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-79":{"quick":"VDRL屬非密螺旋體（nontreponemal）梅毒血清檢測；TPHA、FTA-ABS、MHA-TP為密螺旋體檢測。","detail":{"background":"梅毒血清學分兩類：①「非密螺旋體試驗（nontreponemal）」——VDRL、RPR，測對抗心脂質（cardiolipin）的非特異抗體，用於篩檢與療效追蹤（隨治療滴度下降），但可有偽陽性；②「密螺旋體試驗（treponemal）」——TPHA、FTA-ABS、MHA-TP、TPPA，測對螺旋體特異抗原的抗體，用於確診，終生陽性。故屬非密螺旋體者為VDRL。","options":{"A":"TPHA為密螺旋體確診試驗。","B":"正確：VDRL為非密螺旋體試驗。","C":"FTA-ABS為密螺旋體試驗。","D":"MHA-TP為密螺旋體試驗。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-80":{"quick":"新生兒眼炎（ophthalmia neonatorum）主要由淋病雙球菌（N. gonorrhoeae）經產道感染引起。","detail":{"background":"新生兒淋菌性結膜炎（ophthalmia neonatorum）由感染淋病的母親經產道垂直感染，出生後2–5天出現嚴重化膿性結膜炎，未治療可致角膜潰瘍與失明。預防為新生兒出生後點眼（紅黴素眼藥膏）。沙眼披衣菌亦可致新生兒結膜炎（較晚、5–14天）。本題答案為淋病雙球菌。","options":{"A":"A群鏈球菌非新生兒眼炎典型病原。","B":"正確：淋病雙球菌經產道致新生兒化膿性眼炎。","C":"腦膜炎雙球菌非新生兒眼炎主因。","D":"金黃色葡萄球菌非典型新生兒眼炎病原。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-67":{"quick":"霍亂為腸道（糞口）傳染，採接觸／腸道防護即可，「不需負壓隔離」（負壓用於空氣傳染病）。","detail":{"background":"霍亂（Vibrio cholerae）經「糞口（污染水與食物）」傳播，霍亂毒素活化cAMP使腸道大量分泌水與電解質，造成「米湯樣水瀉」與嚴重脫水。護理重點為「積極補充水分與電解質（口服或靜脈ORS）」（救命關鍵）、必要時抗生素縮短病程，並採「腸道／接觸防護」。「負壓隔離」用於「空氣傳染（如結核、麻疹、水痘）」，霍亂非空氣傳染、不需負壓，故為錯誤護理。","options":{"A":"正確（為錯誤護理）：霍亂為腸道傳染，不需負壓隔離。","B":"補充水分為救命關鍵，正確。","C":"補充電解質正確。","D":"可用抗生素縮短病程，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-72":{"quick":"腦膜炎雙球菌（N. meningitidis）主要經「飛沫」傳染。","detail":{"background":"腦膜炎雙球菌（Neisseria meningitidis）為革蘭氏陰性雙球菌，定殖鼻咽，主要經「呼吸道飛沫」於密切接觸（宿舍、軍營）傳播，可致流行性腦脊髓膜炎與猛爆性敗血症（Waterhouse-Friderichsen症候群）。其莢膜為毒力因子與疫苗基礎。傳染途徑為飛沫，非飲水、伺機或單純接觸。","options":{"A":"非飲水污染（那是腸道菌）。","B":"非伺機感染（為原發致病菌）。","C":"正確：經飛沫傳染。","D":"主要為飛沫而非一般接觸。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-73":{"quick":"大腸桿菌（E. coli）為糞便污染指標菌，用以評量食品與飲水衛生。","detail":{"background":"大腸桿菌（Escherichia coli）為腸道正常菌叢，於環境中存在即代表「糞便污染」，故被用作飲水與食品的「衛生指標菌（indicator organism）」——大腸桿菌群（coliform）超標即提示糞口污染風險。其餘選項（曲狀桿菌、志賀氏菌、傷寒桿菌）為特定致病菌、非通用衛生指標。","options":{"A":"正確：大腸桿菌為食品／飲水衛生指標菌。","B":"空腸曲狀桿菌為特定病原，非指標。","C":"志賀氏菌為痢疾病原，非指標。","D":"傷寒桿菌為特定病原，非指標。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-80":{"quick":"胃癌與幽門螺旋桿菌（H. pylori）密切相關（WHO列為第一類致癌物）。","detail":{"background":"幽門螺旋桿菌（H. pylori）長期感染造成慢性胃炎→萎縮性胃炎→腸化生→異生→胃腺癌，並與胃MALT淋巴瘤相關，被WHO國際癌症研究署列為「第一類（明確）致癌原」。除菌（三或四合一療法：PPI＋兩種抗生素±鉍劑）可降低消化性潰瘍復發與胃癌風險。其餘菌與胃癌無此關係。","options":{"A":"金黃色葡萄球菌與胃癌無關。","B":"正確：幽門螺旋桿菌與胃癌密切相關。","C":"曲狀桿菌致腸炎，非胃癌。","D":"綠膿桿菌與胃癌無關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-70":{"quick":"百日咳的氣管細胞毒素（tracheal cytotoxin）破壞纖毛上皮，使黏液無法清除而劇咳。","detail":{"background":"百日咳桿菌（Bordetella pertussis）為革蘭氏陰性球桿菌，產生多種毒素：「氣管細胞毒素（tracheal cytotoxin）」破壞呼吸道纖毛上皮細胞，使纖毛無法正常擺動清除黏液，導致黏液堆積與陣發性劇咳、咳後吸氣哮鳴（whooping）；另有百日咳毒素（PT）。檢體以「鼻咽」拭子（非咽喉）最佳；傳染力最高在「卡他期（catarrhal stage）」而非突發期；後疫苗時代成人與青少年（免疫力衰退）亦可感染。故D正確。","options":{"A":"最佳檢體為鼻咽（非咽喉）。","B":"後疫苗時代成人亦會感染，不限青少年。","C":"傳染力最高為卡他期，非突發期。","D":"正確：氣管細胞毒素破壞纖毛、致黏液滯留。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-72":{"quick":"曲狀桿菌腸炎護理應「補充水分」（防脫水），「減少水分攝取」為錯誤。","detail":{"background":"空腸曲狀桿菌（Campylobacter jejuni）為革蘭氏陰性彎曲桿菌，常因食用未熟雞肉或污染水而感染，造成發炎性腸胃炎（發燒、腹痛、血便），是Guillain-Barré症候群的常見前驅感染。治療與護理：適當處理食物、防水源污染、必要時抗生素（azithromycin）；腹瀉護理重點是「補充水分電解質防脫水」。故「腸胃炎護理需減少水分攝取」與正確處置相反、為錯誤。","options":{"A":"可用抗生素治療，正確。","B":"防水源污染為預防，正確。","C":"適當處理食物為預防，正確。","D":"正確（為錯誤敘述）：腸炎應補充水分，非減少。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-73":{"quick":"腸毒性大腸桿菌（ETEC）產生「不耐熱腸毒素（LT）」，機制類似霍亂毒素致水瀉。","detail":{"background":"腸毒性大腸桿菌（ETEC）是旅行者腹瀉的主因，產生兩種腸毒素：「不耐熱毒素（LT，heat-labile）」結構與機制類似霍亂毒素——活化腺苷酸環化酶、cAMP上升、腸道大量分泌水電解質致水瀉；以及「耐熱毒素（ST）」。故產生「不耐熱腸毒素、造成類似霍亂感染」者為大腸桿菌（ETEC）。","options":{"A":"沙門氏菌為侵襲性感染，非LT腸毒素。","B":"金黃色葡萄球菌腸毒素為嘔吐型、耐熱。","C":"志賀氏菌產志賀毒素（抑制蛋白質合成），非類霍亂。","D":"正確：ETEC產不耐熱腸毒素LT，機制類霍亂。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-65":{"quick":"肺炎以青黴素／頭孢（作用於細胞壁）無效，最可能是無細胞壁的黴漿菌（非典型肺炎）。","detail":{"background":"黴漿菌（Mycoplasma pneumoniae）無細胞壁，對作用於細胞壁的β-lactam（青黴素、頭孢）天然抗藥，是「非典型肺炎（walking pneumonia）」的常見病原——青壯年、乾咳、肺部X光浸潤明顯但聽診相對輕、肺外症狀（冷凝集素溶血）。治療須用巨環類（azithromycin）或四環素、fluoroquinolone。故「β-lactam治療無效」最可能為黴漿菌。","options":{"A":"大腸桿菌有細胞壁、非此題情境。","B":"嗜血桿菌有細胞壁，β-lactam多有效。","C":"肺炎雙球菌對β-lactam多敏感。","D":"正確：黴漿菌無細胞壁，β-lactam無效。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-74":{"quick":"立克次體、艾利希體、科克斯菌為絕對胞內寄生菌，在真核細胞的「細胞質」內生長。","detail":{"background":"立克次體（Rickettsia）、艾利希體（Ehrlichia）、科克斯菌（Coxiella）皆為「絕對細胞內寄生」的革蘭氏陰性菌，無法在無細胞培養基生長，需在真核宿主細胞「細胞質（cytoplasm）」內增殖（部分立克次體可達細胞核附近，但增殖主要在細胞質）。它們多經節肢動物（蝨、蚤、蜱、恙蟎）傳播。故生長部位為細胞質。","options":{"A":"正確：在真核細胞的細胞質內生長。","B":"非在細胞核內增殖。","C":"非在細胞膜。","D":"非在細胞壁（真核細胞無細胞壁）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-72":{"quick":"淋病後尿道炎由淋病雙球菌與「沙眼披衣菌（Chlamydia trachomatis）」共同／續發感染。","detail":{"background":"淋病（N. gonorrhoeae）與沙眼披衣菌（Chlamydia trachomatis）常「共同感染」性傳染病。淋病治療後仍持續的尿道炎（postgonococcal urethritis）多為合併感染的披衣菌所致（披衣菌為非淋菌性尿道炎NGU最常見病原）。故臨床治療淋病時常同時涵蓋披衣菌（ceftriaxone＋doxycycline/azithromycin）。","options":{"A":"傷寒桿菌為腸道病原，非尿道炎。","B":"曲狀桿菌為腸炎病原。","C":"幽門螺旋桿菌為胃部病原。","D":"正確：沙眼披衣菌與淋菌共感致淋病後尿道炎。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-74":{"quick":"結核分枝桿菌主要經「呼吸道飛沫核（airborne）」傳染。","detail":{"background":"結核分枝桿菌（Mycobacterium tuberculosis）為抗酸桿菌、絕對需氧、生長緩慢，主要經「空氣（飛沫核droplet nuclei）」傳播——開放性肺結核患者咳嗽、噴嚏產生含菌飛沫核懸浮空氣，他人吸入肺泡而感染。故隔離需「負壓（空氣）隔離」。傳染途徑為呼吸道飛沫，非接觸、蟲媒或體液。","options":{"A":"正確：經呼吸道飛沫（空氣）傳染。","B":"非主要經接觸。","C":"非經蚊蟲媒介。","D":"非主要經體液。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-75":{"quick":"結核造成的組織傷害主要源自「宿主自身的細胞媒介免疫（遲發型過敏）反應」。","detail":{"background":"結核分枝桿菌本身不分泌強力外毒素，其造成的組織破壞（乾酪樣壞死、空洞、肉芽腫）主要來自「宿主的細胞媒介免疫（第四型遲發型過敏反應）」——巨噬細胞與T細胞對胞內菌與其抗原（如cord factor、結核菌素）的持續免疫反應，形成肉芽腫並破壞周邊組織。故傷害主因是宿主免疫反應，而非細菌直接毒素。","options":{"A":"正確：主要為宿主免疫反應（遲發型過敏）造成傷害。","B":"結核菌無強力組織傷害毒素。","C":"cord factor促肉芽腫但非組織傷害主因（仍經免疫反應）。","D":"與紅血球數目無關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-74":{"quick":"立克次體經「節肢動物（蝨蚤蜱蟎）」傳播，非性接觸傳染病。","detail":{"background":"性接觸傳染的細菌包括：梅毒螺旋體、淋病雙球菌、沙眼披衣菌、杜克氏嗜血桿菌（軟性下疳）。立克次體（Rickettsia）則經「節肢動物媒介（蝨、蚤、蜱、恙蟎）」叮咬傳播，致斑疹傷寒、洛磯山斑點熱等，「非」性接觸傳染。故不屬性接觸傳染者為立克次體。","options":{"A":"梅毒為性接觸傳染。","B":"淋病為性接觸傳染。","C":"正確：立克次體經節肢動物傳播，非性接觸。","D":"披衣菌為性接觸傳染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-75":{"quick":"百日咳於「卡他期（catarrhal stage）」菌量最高、傳染力最強。","detail":{"background":"百日咳（B. pertussis）病程分三期：①卡他期（catarrhal stage，1–2週）——類似感冒（流鼻水、輕咳），此時「菌量最高、傳染力最強」、但最不易被診斷；②陣發期（paroxysmal stage）——典型陣發性劇咳、咳後吸氣哮鳴（whoop），此時菌量已下降，症狀由毒素造成；③恢復期。故菌量高峰在卡他期。","options":{"A":"潛伏期尚未發病。","B":"正確：卡他期菌量最高、傳染力最強。","C":"突發（陣發）期菌量已下降。","D":"恢復期菌量更低。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-76":{"quick":"抗酸性細菌（分枝桿菌）細胞壁富含「分枝菌酸（mycolic acid）」。","detail":{"background":"分枝桿菌（Mycobacterium，如結核菌、痲瘋菌）的細胞壁富含長鏈脂質「分枝菌酸（mycolic acid）」——使細胞壁蠟質化、疏水、不易被一般染色，須用抗酸染色（Ziehl-Neelsen），染後不被酸性酒精脫色（故稱「抗酸菌acid-fast」）。分枝菌酸也使其對乾燥、消毒劑與部分抗生素具抵抗力、生長緩慢。LPS為陰性菌外膜成分、lipoteichoic acid為陽性菌成分，皆非分枝桿菌抗酸特徵。","options":{"A":"類固醇為黴漿菌膜成分，非抗酸菌特徵。","B":"脂胞壁酸為革蘭氏陽性菌成分。","C":"正確：抗酸菌富含分枝菌酸。","D":"脂多醣為革蘭氏陰性菌外膜成分。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-72":{"quick":"幼童細菌性腦膜炎曾以b型流感嗜血桿菌（Hib）為主要致病原。","detail":{"background":"在Hib疫苗普及前，「b型流感嗜血桿菌（Haemophilus influenzae type b, Hib）」是幼童（尤其<5歲）細菌性腦膜炎與會厭炎最常見病原；它是革蘭氏陰性球桿菌，莢膜（PRP）為毒力因子與疫苗抗原。Hib疫苗使其發生率大幅下降，現幼兒腦膜炎以肺炎鏈球菌、腦膜炎雙球菌為主。本題選項中經典「幼童」病原為Hib。","options":{"A":"正確：流感嗜血桿菌（Hib）為幼童腦膜炎經典病原。","B":"綠膿桿菌多為院內／免疫低下感染。","C":"腦膜炎雙球菌好發較大兒童青少年。","D":"肺炎雙球菌亦常見但本題經典「幼童」答案為Hib。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-73":{"quick":"此題送分；克雷白氏菌等腸內桿菌皆為常見伺機性感染病原。","detail":{"background":"本題公告一律給分。學理上，伺機性感染（opportunistic infection）指在免疫低下、住院、置入導管等情況下由常在或環境菌引起的感染。克雷白氏桿菌（Klebsiella）、大腸桿菌、變形桿菌、綠膿桿菌等革蘭氏陰性桿菌皆為常見院內伺機性感染病原（肺炎、泌尿道、敗血症）；傷寒桿菌則為原發致病菌。因選項多者皆可視為伺機菌、界定不一，故本題送分、各選項均給分。","options":{"A":"傷寒桿菌偏原發致病菌（本題送分）。","B":"大腸桿菌為常見伺機菌（本題送分）。","C":"變形桿菌為常見伺機菌（本題送分）。","D":"克雷白氏菌為常見院內伺機菌（本題送分，各選項均給分）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-79":{"quick":"立克次體與病毒相似之處在於「絕對細胞內寄生」。","detail":{"background":"立克次體（Rickettsia）雖為真正的細菌（有細胞壁、核糖體、二分裂、對抗生素敏感），但與病毒類似的是「絕對細胞內寄生」——無法在無細胞培養基上生長，必須在活的真核細胞內增殖（因其無法自行產生足夠ATP）。與病毒不同處：立克次體有細胞膜與細胞壁、不能結晶、對抗生素敏感。故相似點為絕對胞內寄生。","options":{"A":"正確：與病毒相似在絕對細胞內寄生。","B":"立克次體不能結晶（病毒可）。","C":"立克次體有細胞膜。","D":"立克次體有細胞壁。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-71":{"quick":"腸球菌（Enterococcus）為革蘭氏陽性球菌，不屬腸內桿菌科（Enterobacteriaceae）。","detail":{"background":"腸內桿菌科（Enterobacteriaceae）為革蘭氏陰性、兼性厭氧、發酵葡萄糖的桿菌，包括Escherichia（大腸桿菌）、Salmonella、Shigella、Klebsiella、Proteus、Enterobacter等。腸球菌（Enterococcus）雖名稱含「腸」、住在腸道，但它是革蘭氏「陽性球菌」、不屬腸內桿菌科。故不屬者為腸球菌。","options":{"A":"變形桿菌屬腸內桿菌科。","B":"大腸桿菌屬腸內桿菌科。","C":"沙門氏菌屬腸內桿菌科。","D":"正確：腸球菌為G＋球菌，不屬腸內桿菌科。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-72":{"quick":"志賀毒素（Shiga toxin）作用於核糖體、抑制「蛋白質合成」。","detail":{"background":"志賀毒素（Shiga toxin，志賀氏菌及腸出血性大腸桿菌O157的Shiga-like toxin/Vero毒素）為AB型外毒素：B次單元結合腸與腎血管內皮細胞，A次單元為N-glycosidase，切除60S核糖體28S rRNA上的一個腺嘌呤，使eEF-1無法結合、「停止蛋白質合成」而致細胞死亡。可造成出血性腸炎與溶血性尿毒症候群（HUS）。故作用目標為蛋白質合成。","options":{"A":"非作用於RNA轉錄。","B":"非作用於DNA複製。","C":"正確：志賀毒素抑制蛋白質合成（去除rRNA腺嘌呤）。","D":"非破壞細胞膜穩定度。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-73":{"quick":"退伍軍人症好發於「夏末與秋天」（溫暖、水系統使用旺盛）。","detail":{"background":"退伍軍人桿菌（Legionella）生長於溫水環境，疾病好發於「夏末至秋天」——氣溫高、冷卻水塔與空調使用頻繁，利於菌在水系統增殖並形成含菌氣溶膠。高危群為老人、吸菸者、慢性肺病與免疫低下者。補充：退伍軍人桿菌（Legionella pneumophila）為兼性胞內G−桿菌、生長於溫水（冷卻水塔、空調、熱水器、噴霧），人「吸入含菌氣溶膠」感染、「不人傳人」。好發夏末秋天。診斷＝「尿液抗原」(快速)；治療＝巨環類(azithromycin)或fluoroquinolone(β-lactam無效，因胞內菌)。龐提亞克熱為輕症自限型。","options":{"A":"非主要在春天初夏。","B":"正確：好發於夏末和秋天。","C":"非冬末春天。","D":"非冬天初春。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-74":{"quick":"幽門螺旋桿菌在胃內定殖的關鍵決定因子是「尿素酶（urease）」。","detail":{"background":"幽門螺旋桿菌（H. pylori）能定殖於強酸的胃黏膜，關鍵在其強力「尿素酶（urease）」——分解尿素產生氨，中和菌體周圍胃酸、形成鹼性微環境保護自身；加上螺旋形與鞭毛運動鑽入黏液層。尿素酶同時是尿素呼吸試驗與快速尿素酶檢測的偵測基礎。故定殖決定因子為尿素酶。","options":{"A":"非馬尿酸水解酶（為其他菌鑑定）。","B":"正確：尿素酶為胃內定殖決定因子。","C":"氧化酶非定殖關鍵。","D":"觸酶非定殖決定因子。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-72":{"quick":"肺炎披衣菌經「呼吸道飛沫」人傳人，並非經水傳播。","detail":{"background":"經「水」傳播的病原：退伍軍人桿菌（水氣微粒）、鉤端螺旋體（鼠尿污染水經皮膚黏膜）、土倫法蘭西斯菌（兔熱病，可經污染水/接觸）。肺炎披衣菌（Chlamydophila pneumoniae）則經「呼吸道飛沫」人傳人，不經水。故非經水傳播者為肺炎披衣菌。","options":{"A":"退伍軍人桿菌經水氣微粒傳播。","B":"鉤端螺旋體經污染水傳播。","C":"正確：肺炎披衣菌經呼吸道飛沫，非經水。","D":"土倫法蘭西斯菌可經污染水／接觸傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-73":{"quick":"鏈桿菌（鼠咬熱）潛伏期「較短」非較長；故「鏈桿菌潛伏期較長」為錯誤。","detail":{"background":"鼠咬熱有兩型病原：念珠狀鏈桿菌（Streptobacillus moniliformis，美洲型）與小螺旋菌（Spirillum minus，亞洲型sodoku）。兩者傳染窩皆為鼠類與小型嚙齒類、皆可用青黴素治療。差異在潛伏期：鏈桿菌型潛伏期「短（約數天，<10天）」，小螺旋菌型潛伏期「較長（1–4週）」。故「鏈桿菌潛伏期較螺旋菌長」與事實相反、為錯誤。","options":{"A":"傳染窩均為鼠類，正確。","B":"正確（為錯誤敘述）：鏈桿菌潛伏期較「短」非長。","C":"兩者均可用青黴素，正確。","D":"鏈桿菌未治療致死率較高，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-71":{"quick":"百日咳於「卡他（黏膜）期」菌量最高、最具傳染力。","detail":{"background":"同前述：百日咳病程卡他期（catarrhal phase）症狀類似感冒、但「菌量最高、傳染力最強」；陣發期由毒素致典型劇咳但菌量下降。故菌量最高且最具傳染力者為黏膜（卡他）期。補充：百日咳三期＝卡他期（catarrhal，類感冒、菌量最高、傳染力最強、最該採檢治療）→陣發期（paroxysmal，陣發劇咳+咳後吸氣whoop、菌量已降、症狀由毒素致）→恢復期。診斷採「鼻咽」拭子（非咽喉）。出題陷阱：傳染力最高在卡他期、典型劇咳卻在陣發期（兩者不同期）。預防＝DTaP疫苗（含百日咳）。","options":{"A":"潛伏期尚未排菌高峰。","B":"正確：卡他（黏膜）期菌量最高、最具傳染力。","C":"陣發期菌量已降。","D":"恢復期菌量最低。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-74":{"quick":"砂眼（沙眼披衣菌）經「眼分泌物接觸／污染」傳播，非節肢動物媒介。","detail":{"background":"經節肢動物傳播的細菌感染：回歸熱（疏螺旋體，經蝨／蜱）、立克次痘（蟎）、萊姆病之遊走性紅斑（疏螺旋體，經蜱）。砂眼（trachoma）由沙眼披衣菌引起，經「眼-手-眼接觸、污染物（毛巾）、蒼蠅機械性帶菌」傳播，並非節肢動物為生物性媒介。故較少經節肢動物傳播者為砂眼。","options":{"A":"回歸熱經蝨／蜱傳播。","B":"立克次痘經蟎傳播。","C":"遊走性紅斑（萊姆病）經蜱傳播。","D":"正確：砂眼經接觸傳播，非節肢動物媒介。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-69":{"quick":"披衣菌的「原體（elementary body, EB）」具感染力。","detail":{"background":"披衣菌（Chlamydia）獨特的雙型生活史：「原體（elementary body, EB）」——體小、代謝不活躍、有堅韌外殼（雙硫鍵交聯），是「胞外感染型」、具感染力，附著並進入宿主細胞；進入後轉為「網狀體（reticulate body, RB）」——體大、代謝活躍、二分裂增殖（但無感染力），在包涵體內複製後再轉回EB釋出。故具感染力者為原體（EB）。","options":{"A":"正確：原體（EB）具感染力。","B":"網狀體為胞內增殖型、無感染力。","C":"無「球狀小體」之分型。","D":"無「不規則小體」之分型。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-68":{"quick":"奇異變形桿菌主要致「尿道感染」（產尿素酶、結石），非食物性腹瀉病原；此敘述錯誤。","detail":{"background":"奇異變形桿菌（Proteus mirabilis）為革蘭氏陰性桿菌、有「群集運動（swarming）」、產生大量「尿素酶（urease）」。尿素酶分解尿素產氨使尿液鹼化，促成磷酸銨鎂（struvite）結石，故它是「泌尿道感染」（尤其導尿、結石相關）的重要病原，而非引起食物性腹瀉的主要病原。故「造成食物引起腹瀉的重要病菌」為錯誤敘述。","options":{"A":"正確（為錯誤敘述）：Proteus主致尿道感染，非食物性腹瀉。","B":"常致尿道感染，正確。","C":"產大量尿素酶，正確。","D":"為革蘭氏陰性菌，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-65":{"quick":"創傷弧菌（V. vulnificus）常經傷口感染海水後致敗血症（尤其肝病者），此敘述正確。","detail":{"background":"弧菌屬比較：①霍亂弧菌（V. cholerae）「不耐胃酸」（故需大量菌或胃酸低者易感），致大量水瀉，「需補液治療（嚴重者致命，非不需治療）」；②創傷弧菌（V. vulnificus）存在溫暖海水，經「傷口接觸海水」或生食牡蠣感染，於慢性肝病、免疫低下者可致「壞死性軟組織感染與敗血症」、致死率高；③腸炎弧菌（V. parahaemolyticus）經海鮮致腸胃炎，「致死率低、少嚴重血便」。故正確為創傷弧菌經傷口致敗血症。","options":{"A":"霍亂弧菌不耐胃酸，敘述錯誤。","B":"霍亂嚴重脫水可致命，需治療，敘述錯誤。","C":"正確：創傷弧菌經傷口致敗血症（肝病者高危）。","D":"腸炎弧菌致死率低、非嚴重血便，敘述錯誤。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-73":{"quick":"幽門螺旋桿菌主要在人類間傳播（糞口／口口），「非人畜共通」傳染病；此敘述錯誤。","detail":{"background":"幽門螺旋桿菌（H. pylori）以「人」為主要宿主，於人際間經糞口或口口傳播（家庭內聚集），「並非人畜共通」傳染病。它致急性／慢性胃炎、消化性潰瘍；除菌療法多以PPI＋amoxicillin（β-lactam）＋clarithromycin（macrolide）三合一；診斷可用尿素呼吸試驗。故「是人畜共通傳染病」為錯誤敘述。","options":{"A":"正確（為錯誤敘述）：H. pylori以人為宿主，非人畜共通。","B":"可致胃炎與胃潰瘍，正確。","C":"除菌常用β-lactam合併macrolide，正確。","D":"可用尿素呼吸試驗偵測，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-75":{"quick":"披衣菌為「絕對細胞內寄生」的細菌；此敘述正確。","detail":{"background":"披衣菌（Chlamydia）特性：有細胞壁（含peptidoglycan成分，但缺典型胞壁酸）、為「絕對細胞內寄生」（自身缺乏產ATP能力、需宿主供能，故須在細胞內增殖）。其生活史：具感染力的是「原體（EB，有雙硫鍵交聯的穩定結構、不複製）」，胞內增殖型是「網狀體（RB，可複製、無雙硫鍵穩定外殼）」。故正確敘述為「絕對細胞內寄生」；其餘選項（無細胞壁、EB可複製、RB有雙硫鍵）皆錯。","options":{"A":"披衣菌有細胞壁（非無）。","B":"正確：披衣菌為絕對細胞內寄生菌。","C":"原體（EB）不複製，複製的是網狀體。","D":"雙硫鍵穩定結構在原體（EB），非網狀體。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-76":{"quick":"痲瘋以「多重藥物合併療法（MDT）」治療；此敘述正確。","detail":{"background":"痲瘋分枝桿菌（Mycobacterium leprae）：「無法人工培養」（須以犰狳或鼠足墊增殖）、生長極慢、為胞內菌。臨床分型——「類結核型（tuberculoid）」細胞免疫強、菌量少、皮膚病變局限明顯；「痲瘋瘤型（lepromatous）」細胞免疫弱、菌量多、皮膚病變廣泛瀰漫（故病變較類結核型「明顯廣泛」）。治療以WHO「多重藥物合併療法（MDT：dapsone＋rifampin±clofazimine）」。故D正確。其餘：人傳人（非人畜共通主途徑，但犰狳可帶菌）、不能人工培養、瘤型病變較廣，皆使A/B/C錯。","options":{"A":"主要人際傳播（非人畜共通為主）。","B":"無法以人工培養基體外培養。","C":"痲瘋瘤型病變較類結核型廣泛明顯，敘述相反。","D":"正確：以多重藥物合併療法治療。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-80":{"quick":"沙門氏菌主要經「飲食（糞口）」傳染。","detail":{"background":"沙門氏菌（Salmonella）為革蘭氏陰性腸內桿菌，主要經「污染的食物與水（糞口途徑）」傳染——未熟蛋、家禽、肉類、乳製品。非傷寒型致腸胃炎，傷寒型（S. Typhi）致傷寒（持續高燒、玫瑰疹、肝脾腫大）。傳染途徑為飲食，非輸血、蚊咬或飛沫。","options":{"A":"非經輸血。","B":"非經蚊咬。","C":"非經飛沫。","D":"正確：經飲食（糞口）傳染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-69":{"quick":"疏螺旋體（Borrelia）除萊姆病外，主要造成「回歸熱（relapsing fever）」。","detail":{"background":"疏螺旋體（Borrelia）屬螺旋體：①B. burgdorferi經硬蜱傳播致「萊姆病」（遊走性紅斑、關節炎、神經與心臟侵犯）；②B. recurrentis（經蝨）與其他Borrelia（經軟蜱）致「回歸熱（relapsing fever）」——因抗原變異造成週期性反覆發燒。梅毒為Treponema、不屬Borrelia。故Borrelia除萊姆病外主要致回歸熱。","options":{"A":"梅毒為Treponema（密螺旋體），非Borrelia。","B":"腦膜炎非Borrelia主病。","C":"正確：Borrelia致回歸熱。","D":"非致食物中毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-72":{"quick":"痤瘡丙酸桿菌造成的青春痘「無法僅靠清潔皮膚完全消除」；此敘述錯誤。","detail":{"background":"厭氧菌多為人體常在菌、經黏膜傷口侵入致內源性感染。痤瘡丙酸桿菌（Cutibacterium/Propionibacterium acnes）為皮脂腺毛囊內厭氧常在菌，與青春痘（痤瘡）形成有關，但痤瘡涉及皮脂分泌、毛囊角化、發炎與菌共同作用，「無法單靠清潔皮膚完全消除」（需外用/口服A酸、抗生素、過氧化苯等綜合治療）。其餘（脆弱類桿菌莢膜為毒力因子、放線菌硫磺顆粒、厭氧菌多為常在菌）皆正確。故錯誤者為A。","options":{"A":"正確（為錯誤敘述）：痤瘡無法僅靠清潔皮膚完全消除。","B":"厭氧菌多為常在菌、經黏膜傷口侵入，正確。","C":"脆弱類桿菌莢膜為重要致病因子，正確。","D":"放線菌可見硫磺顆粒，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-73":{"quick":"萊姆病典型為「遊走性紅斑（牛眼狀）」，非「全身性丘疹」；此敘述錯誤。","detail":{"background":"萊姆病（Lyme disease，B. burgdorferi，經硬蜱叮咬）的臨床：①早期局部——叮咬處「遊走性紅斑（erythema migrans，牛眼靶心狀紅斑）」，非全身性丘疹；②早期播散——多發紅斑、神經（顏面神經麻痺）、心臟（房室傳導阻滯）；③晚期——關節炎（膝關節）、慢性神經病變。診斷可用血清學（ELISA＋西方墨點）。故「全身性丘疹」描述錯誤（應為遊走性紅斑）。","options":{"A":"被蜱（節肢動物）叮咬引發，正確。","B":"正確（為錯誤敘述）：典型為遊走性紅斑，非全身性丘疹。","C":"未妥治可致關節炎，正確。","D":"血清學可輔助診斷，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-75":{"quick":"李斯特菌（Listeria）與「非典型肺炎」無關；非典型肺炎由黴漿菌、退伍軍人菌、披衣菌引起。","detail":{"background":"非典型肺炎（atypical/walking pneumonia）的典型病原為「黴漿菌、退伍軍人桿菌、披衣菌（含鸚鵡熱）」——臨床乾咳、肺外症狀、X光浸潤明顯但理學徵象輕、對β-lactam反應差。李斯特菌（Listeria monocytogenes）主要致食源性腦膜炎、敗血症（孕婦、新生兒、免疫低下），與非典型肺炎「無關」。故答案為李斯特菌。","options":{"A":"正確：李斯特菌與非典型肺炎無關。","B":"黴漿菌為非典型肺炎主因。","C":"退伍軍人桿菌為非典型肺炎病原。","D":"肺炎披衣菌為非典型肺炎病原。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-76":{"quick":"黴漿菌「可在無細胞培養基自由生長」，並非絕對細胞內寄生；此敘述錯誤。","detail":{"background":"黴漿菌（Mycoplasma）特性：①是「最小的可自我複製、可自由生長（free-living）」的細菌，「並非」絕對細胞內寄生（與披衣菌、立克次體不同）；②「無細胞壁」（故對β-lactam天然抗藥）；③細胞膜含「固醇（sterol）」、培養須添加膽固醇；④菌體極小，可通過0.45 μm濾膜。故錯誤者為A——黴漿菌可自由生長、非絕對胞內寄生。","options":{"A":"正確（為錯誤敘述）：黴漿菌可自由生長，非絕對胞內寄生。","B":"無細胞壁，正確。","C":"培養需添加固醇，正確。","D":"可通過0.45μm濾膜，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-42":{"quick":"尿漿菌（Ureaplasma）對萬古黴素抗藥，因其「沒有細胞壁」。","detail":{"background":"尿漿菌（Ureaplasma）與黴漿菌同屬Mollicutes，「無細胞壁」。萬古黴素（vancomycin）的作用機制是抑制細胞壁peptidoglycan合成（結合D-Ala-D-Ala），對「無細胞壁」的尿漿菌天然無效（抗藥）。同理它對所有作用於細胞壁的β-lactam也抗藥；治療須用四環素、巨環類等。故抗藥機制為無細胞壁。","options":{"A":"正確：無細胞壁，故對萬古黴素天然抗藥。","B":"非特殊細胞壁鍵結（根本沒有細胞壁）。","C":"非特殊細胞壁成分（無細胞壁）。","D":"非因細胞膜厚或外莢膜。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-48":{"quick":"先天性梅毒主要經「孕婦胎盤」垂直傳染給胎兒。","detail":{"background":"梅毒（T. pallidum）各期：①第一期——「無痛」硬性下疳（與軟性下疳的痛性潰瘍不同）；②第二期——螺旋體播散全身、淋巴結腫，有「明顯」皮膚黏膜疹（含手掌腳掌）與扁平濕疣、傳染力最高；③第三期——梅毒腫、心血管與神經性梅毒（皮疹濕疣是第二期、非第三期）。「先天性梅毒」由感染孕婦經胎盤垂直傳染胎兒，致死產、新生兒多器官病變。故D正確。","options":{"A":"第一期下疳「無痛」，軟性下疳才是痛性潰瘍（不同病原）。","B":"第二期有明顯臨床症狀，非無症狀。","C":"皮疹濕疣為第二期、非第三期。","D":"正確：先天性梅毒經胎盤垂直傳染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-46":{"quick":"第二期梅毒主要表現為「全身性黏膜皮膚紅疹」（含手掌腳掌）。","detail":{"background":"梅毒第二期是螺旋體經血流播散全身的階段，主要臨床為「瀰漫性黏膜皮膚紅疹」——對稱性斑丘疹，特徵性侵犯「手掌與腳掌」，並有扁平濕疣、黏膜斑、全身淋巴結腫、發燒倦怠，傳染力最高。下疳是第一期；梅毒腫、心血管與神經性梅毒是第三期。故第二期主要症狀為全身性黏膜皮膚紅疹。","options":{"A":"下疳為第一期表現。","B":"心血管性梅毒為第三期。","C":"梅毒腫為第三期。","D":"正確：第二期為全身性黏膜皮膚紅疹。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-45":{"quick":"軟性下疳（chancroid）由杜克氏嗜血桿菌（Haemophilus ducreyi）引起。","detail":{"background":"軟性下疳（chancroid）為性傳染病，病原是「杜克氏嗜血桿菌（Haemophilus ducreyi）」——革蘭氏陰性球桿菌，造成「疼痛的、邊緣柔軟（按壓糜軟）的生殖器潰瘍」併壓痛的鼠蹊淋巴結腫（可化膿破潰）。與梅毒的「無痛硬性下疳」相對。故病原為杜克氏嗜血桿菌。","options":{"A":"尿素放線菌非軟性下疳病原。","B":"流感嗜血桿菌致呼吸道感染，非軟性下疳。","C":"正確：杜克氏嗜血桿菌致軟性下疳。","D":"泡沫狀嗜血桿菌非軟性下疳病原。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-46":{"quick":"帶殼海鮮（牡蠣、蝦蟹）相關食物中毒常與腸炎弧菌（V. parahaemolyticus）有關。","detail":{"background":"腸炎弧菌（Vibrio parahaemolyticus）為嗜鹽的革蘭氏陰性弧菌，存在於溫暖海水與海產，因「生食或未熟的帶殼海鮮（牡蠣、蝦蟹、貝類）」造成食物中毒——水瀉、腹痛、噁心嘔吐，是台灣海鮮相關食物中毒最常見病原之一。其餘（傷寒桿菌、鼠疫桿菌、志賀氏菌）非海鮮相關。","options":{"A":"正確：腸炎弧菌與帶殼海鮮食物中毒相關。","B":"傷寒桿菌經污染食水（非海鮮特異）。","C":"鼠疫桿菌經鼠蚤，非海鮮。","D":"志賀氏菌為糞口痢疾，非海鮮特異。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-47":{"quick":"空腸彎曲桿菌（Campylobacter jejuni）腸炎是Guillain-Barré症候群最常見的前驅感染。","detail":{"background":"空腸彎曲桿菌（Campylobacter jejuni）腸炎（常因未熟雞肉）是「Guillain-Barré症候群（GBS，急性發炎性脫髓鞘多神經病變）」最常見的前驅感染——其脂寡糖（LOS）與周邊神經節苷脂（ganglioside）抗原相似（分子相似molecular mimicry），誘發的抗體交叉攻擊周邊神經，造成上行性對稱無力。故最易引發周邊神經病變者為空腸彎曲桿菌。","options":{"A":"大腸桿菌腸炎非GBS典型前驅。","B":"幽門螺旋桿菌與GBS無典型關聯。","C":"霍亂弧菌與GBS無關。","D":"正確：空腸彎曲桿菌為GBS最常見前驅感染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-44":{"quick":"結核分枝桿菌可造成肺部與肺外（含腸道）感染；此敘述最適當。","detail":{"background":"結核分枝桿菌（M. tuberculosis）：①治療「不用青黴素」，第一線為RIPE（rifampin、isoniazid、pyrazinamide、ethambutol）多藥合併；②為「絕對需氧菌」（好發肺尖含氧高處），不可能不能在有氧生存；③「生長極慢」（倍增時間約15–20小時、培養需數週）；④可造成肺結核及肺外結核（淋巴、骨、腦膜、「腸道」、泌尿生殖等）。故最適當者為「可造成肺部及腸道感染」。","options":{"A":"治療不用青黴素，第一線為抗結核藥。","B":"正確：可造成肺部及腸道（肺外）感染。","C":"生長非常緩慢，非快速。","D":"為絕對需氧菌，能在有氧環境生存。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-47":{"quick":"恙蟎可傳播叢林型斑疹傷寒（恙蟲病）；此敘述正確。","detail":{"background":"恙蟎（chigger mite）：發育為「不完全變態」（卵→幼蟲→稚蟲→成蟲），只有「幼蟲（larva）」會叮咬吸食組織液並傳病（稚蟲與成蟲不吸血）。帶有立克次體（Orientia tsutsugamushi）的恙蟎幼蟲叮咬人，傳播「叢林型斑疹傷寒（scrub typhus，恙蟲病）」。故「可傳播斑疹傷寒」正確；其餘（完全變態、稚蟲成蟲吸血、感染蟎無法傳病）皆錯。","options":{"A":"恙蟎為不完全變態，非完全變態。","B":"僅幼蟲吸血傳病，稚蟲成蟲不吸血。","C":"帶病原的恙蟎可傳病。","D":"正確：恙蟎可傳播（叢林型）斑疹傷寒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-50":{"quick":"叢林型斑疹傷寒病原為「Orientia tsutsugamushi」，非「Rickettsia rickettsii」；此敘述錯誤。","detail":{"background":"叢林型斑疹傷寒（scrub typhus，恙蟲病）：病原是「Orientia tsutsugamushi」（舊稱Rickettsia tsutsugamushi），經「恙蟎（幼蟲）叮咬」傳播，潛伏期約10–12天，臨床有發燒、頭痛、肌肉痛、淋巴結腫大、叮咬處焦痂（eschar）。「Rickettsia rickettsii」則是「洛磯山斑點熱」的病原（經蜱傳播），非恙蟲病。故A為錯誤敘述。","options":{"A":"正確（為錯誤敘述）：恙蟲病病原為Orientia tsutsugamushi，非R. rickettsii。","B":"經恙蟎叮咬傳播，正確。","C":"潛伏期約10–12天，正確。","D":"有發燒、頭痛、肌肉痛、淋巴結腫，正確。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-46":{"quick":"志賀氏菌「感染劑量極低（數十至數百個菌即可致病）」；此敘述最適當。","detail":{"background":"腸內菌致病比較：①傷寒沙門氏菌（S. Typhi）以人為宿主、「可人傳人（帶原者）」，故A錯；②赤痢志賀氏菌（Shigella）「感染劑量極低（上百個菌即可致病）」、人傳人易，故B正確；③鼠疫耶氏桿菌（Yersinia pestis）主要經「鼠蚤叮咬」（腺鼠疫）或飛沫（肺鼠疫），非糞口，故C錯；④克雷白氏菌（Klebsiella）除肺炎外亦致泌尿道、敗血等多種感染，非「只」呼吸道，故D錯。","options":{"A":"傷寒桿菌可經帶原者人傳人，敘述錯誤。","B":"正確：志賀氏菌感染劑量極低（數百個菌）即可致病。","C":"鼠疫桿菌主經鼠蚤叮咬，非糞口。","D":"克雷白氏菌不只致呼吸道，亦致泌尿道、敗血等。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-46":{"quick":"貓抓熱（Bartonella henselae）常引發「局部淋巴結腫大（淋巴病變）」。","detail":{"background":"貓抓熱（cat-scratch disease）由「巴東氏菌（Bartonella henselae）」引起，經貓抓咬傳人。典型表現為抓傷處出現丘疹／膿疱，續發「引流區的局部淋巴結腫大（淋巴病變）」，多為自限性、預後良好、嚴重併發症少見（免疫正常者）。此菌「不易分離培養」（診斷多靠血清學/PCR），治療以azithromycin等（β-lactam效果不佳）。故最適當為「常引發局部淋巴病變」。","options":{"A":"β-lactam效果不佳，多用azithromycin。","B":"正確：常引發局部淋巴結腫大。","C":"免疫正常者多自限、少嚴重併發症。","D":"此菌難培養，非以分離培養為主要鑑定。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-47":{"quick":"梅毒螺旋體（T. pallidum）可「直接人對人」（性接觸／垂直）傳染。","detail":{"background":"比較傳播方式：法蘭西氏菌（兔熱病，經蜱／接觸感染動物）、巴東氏菌（貓抓）、疏螺旋體（蜱／蝨）皆需「媒介或動物來源」，非典型人對人直接傳染。梅毒螺旋體（Treponema pallidum）則經「性接觸（黏膜直接接觸）與母嬰垂直」直接在人之間傳染。故可直接人對人傳染者為梅毒螺旋體。","options":{"A":"法蘭西氏菌經蜱／接觸動物，非典型人傳人。","B":"巴東氏菌經貓抓咬。","C":"疏螺旋體經蜱／蝨媒介。","D":"正確：梅毒螺旋體可直接人對人（性接觸／垂直）傳染。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-75":{"quick":"單股正股（+）RNA病毒在宿主「細胞質」進行RNA複製（多數RNA病毒於細胞質複製）。","detail":{"background":"病毒核酸複製的場所：多數「RNA病毒」於宿主「細胞質」複製（例外：流感病毒與反轉錄病毒涉及細胞核）；多數「DNA病毒」於「細胞核」複製（例外：痘病毒於細胞質）。單股正股（+ssRNA）病毒（如腸病毒、登革、冠狀病毒）的基因組本身即可直接作為mRNA轉譯，並在細胞質藉RNA依賴性RNA聚合酶複製。故複製場所為細胞質。","options":{"A":"多數RNA病毒非在細胞核複製（流感、反轉錄為例外）。","B":"正確：+ssRNA病毒在細胞質複製。","C":"非在細胞膜複製。","D":"非在核膜複製。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-77":{"quick":"B肝帶原者再感染「D型肝炎（HDV）」（共感染／重複感染）極易引發猛爆性肝炎。","detail":{"background":"D型肝炎病毒（HDV）是缺陷型病毒，需「B型肝炎病毒（HBV）的表面抗原HBsAg」作為外殼才能組裝複製，故只在HBV感染者身上致病。當B肝帶原者再「重疊感染（superinfection）」HDV，常使肝炎急遽惡化、易引發猛爆性（爆發性）肝炎與肝衰竭。A型與E型為糞口傳播急性肝炎，C型多為慢性，皆不需HBV輔助。","options":{"A":"A型為糞口急性肝炎，不致此重疊效應。","B":"C型多慢性，非典型猛爆。","C":"正確：D型重疊B肝感染易致猛爆性肝炎。","D":"E型糞口傳播，孕婦較重但非靠B肝。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-78":{"quick":"血液中一般測不到「HBc抗原（HBcAg）」——它存在於肝細胞核內、不游離於血中。","detail":{"background":"B肝血清標誌：HBsAg（表面抗原，現症感染指標）、抗-HBs（保護性抗體，痊癒或疫苗後）、HBeAg（複製活躍、高傳染力）、抗-HBe、抗-HBc（核心抗體，IgM示急性、IgG示曾感染）。「HBc抗原（HBcAg，核心抗原）」存在於受感染肝細胞「核內」、組裝於病毒顆粒核心，「不游離於血液中」，故一般血清檢測「測不到HBcAg」（只能測到抗-HBc抗體）。","options":{"A":"抗-HBc抗體可測得。","B":"正確：HBcAg在肝細胞核內，血中測不到。","C":"抗-HBs抗體可測得。","D":"HBsAg可在血中測得。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-69":{"quick":"干擾素主要由病毒感染細胞與免疫細胞產生；「TH2細胞為主要來源」錯誤（IFN-γ主要來自TH1/NK）。","detail":{"background":"干擾素（interferon, IFN）：第一型（IFN-α/β）由病毒感染的細胞產生，誘導鄰近細胞抗病毒狀態（抑制病毒複製）並上調MHC I表達；第二型（IFN-γ，免疫干擾素）主要由「TH1細胞、NK細胞與細胞毒殺T」產生，活化巨噬細胞、上調MHC I與II。故「TH2細胞為干擾素主要來源」是錯誤（TH2分泌IL-4/5/13，與抗體與過敏相關，非IFN-γ主要來源）。","options":{"A":"IFN可抗病毒複製並調節免疫，正確。","B":"IFN可誘導MHC I與II表達，正確。","C":"第二類IFN即IFN-γ（免疫干擾素），正確。","D":"正確（為錯誤敘述）：IFN-γ主要來自TH1/NK，非TH2。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-75":{"quick":"普利昂蛋白（prion）對熱與福馬林等消毒劑極具抗性；此敘述正確。","detail":{"background":"普利昂（prion）是「不含核酸的感染性蛋白」，由正常PrPᶜ轉為錯誤摺疊的PrPˢᶜ並引發連鎖錯摺，造成海綿狀腦病（庫賈氏病、狂牛症、羊搔癢症、Kuru）。特性：①「不含核酸」（非RNA/DNA病毒）；②潛伏期「極長」（數年至數十年）；③「不引起發炎或免疫反應」（無干擾素、無抗體）；④對熱、福馬林、紫外線、放射線、一般消毒滅菌「極具抗性」（須高壓134°C久蒸或強鹼處理）。故B正確。","options":{"A":"普利昂不含RNA（非病毒）。","B":"正確：對熱及福馬林等消毒劑極具抗性。","C":"不引起干擾素反應。","D":"潛伏期極長，非短。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-78":{"quick":"人類乳頭瘤病毒（HPV）為DNA病毒，複製「不需」反轉錄酶。","detail":{"background":"需要反轉錄酶（reverse transcriptase）的病毒：①反轉錄病毒（HIV、HTLV，+ssRNA→以反轉錄酶轉為DNA嵌入宿主基因組）；②B型肝炎病毒（HBV，DNA病毒但複製過程經由「前基因組RNA→反轉錄」回DNA）。人類乳頭瘤病毒（HPV）為雙股「DNA」病毒，以一般DNA複製方式增殖，「不需反轉錄酶」。故答案為HPV。","options":{"A":"HBV複製需反轉錄階段。","B":"HIV為反轉錄病毒，需反轉錄酶。","C":"HTLV為反轉錄病毒，需反轉錄酶。","D":"正確：HPV為DNA病毒，不需反轉錄酶。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-80":{"quick":"細小病毒（Parvovirus）是感染人類「最小的DNA病毒」（單股DNA）。","detail":{"background":"病毒大小與核酸：①痘病毒（Poxvirus）是「最大」的人類病毒，且為「DNA」病毒（非RNA）；②SARS冠狀病毒為「單股（+）RNA」病毒（非雙股RNA）；③細小病毒（Parvovirus B19）是「最小」的人類DNA病毒（單股DNA，致傳染性紅斑、胎兒水腫、再生不良危象）；④呼吸道腸病毒（Reovirus）為「雙股、分節」RNA病毒（非單股）。故正確敘述為「細小病毒是最小的DNA病毒」。","options":{"A":"痘病毒是最大病毒、且為DNA病毒（非RNA）。","B":"SARS病毒為單股(+)RNA，非雙股RNA。","C":"正確：細小病毒為感染人類最小的DNA病毒。","D":"Reovirus為「雙股」分節RNA，非單股。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-77":{"quick":"子宮頸癌與人類乳突病毒（HPV，尤其16、18型）最相關。","detail":{"background":"人類乳突病毒（HPV）的高危型（16、18等）持續感染子宮頸上皮，其E6、E7致癌蛋白分別抑制p53與Rb，導致細胞週期失控、癌變，是子宮頸癌的主因（>99%）。子宮頸抹片（Pap smear）與HPV檢測用於篩檢；HPV疫苗可預防。其餘（HIV、流感、HBV）與子宮頸癌無直接因果。","options":{"A":"HIV與子宮頸癌無直接因果（但免疫低下增風險）。","B":"流感病毒與子宮頸癌無關。","C":"HBV與肝癌相關，非子宮頸癌。","D":"正確：HPV與子宮頸癌最相關。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-78":{"quick":"在台灣，干擾素主要用於治療「C型肝炎」（過去標準療法為干擾素＋ribavirin）。","detail":{"background":"C型肝炎（HCV）易轉慢性、與肝硬化及肝癌相關。過去標準治療為「長效干擾素（pegylated IFN-α）＋ribavirin」；近年已被全口服直接抗病毒藥（DAA）取代（治癒率>95%）。B肝亦可用干擾素，但本題在台灣好發、以干擾素為主要治療者經典指C肝。A、E型為自限性急性肝炎、不需干擾素。","options":{"A":"A型為自限性急性肝炎，不需干擾素。","B":"正確：干擾素主要用於C型肝炎治療。","C":"E型為自限性，不用干擾素。","D":"G型臨床意義不明，非干擾素適應。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-79":{"quick":"蛋白外衣（capsid）的功能不包括「抗吞噬」；抗吞噬是莢膜等的功能。","detail":{"background":"病毒蛋白外衣（capsid）由capsomere組成，功能：①保護內部病毒核酸；②（與表面蛋白）辨認並附著宿主細胞受體；③具抗原性、被宿主免疫系統辨認。「抗吞噬作用」是細菌莢膜等毒力因子的特性，並非病毒capsid的基本功能。故非capsid基本特性者為「具抗吞噬作用」。","options":{"A":"capsid保護病毒核酸，是其功能。","B":"capsid（與表面蛋白）辨認寄主細胞，是其功能。","C":"正確：抗吞噬非capsid功能（為莢膜等特性）。","D":"capsid具抗原性、被免疫辨認，是其特性。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-65":{"quick":"普利昂（prion）對熱與消毒安定、對放射線「不敏感」；故「對放射線非常敏感」錯誤。","detail":{"background":"普利昂（prion）特性：潛伏期極長、對熱與一般消毒（含福馬林）安定、不引起發炎反應、且「對紫外線與放射線具高度抗性（不敏感）」——因為它不含核酸，放射線主要破壞核酸故對其無效。故「對放射線非常敏感」與事實相反、為錯誤敘述。補充：普利昂(prion)是錯誤摺疊的感染性蛋白PrPˢᶜ，「不含核酸」，故對「破壞核酸的紫外線與放射線不敏感」、對熱與福馬林與一般消毒滅菌極具抗性(須134°C高壓久蒸或強鹼NaOH/NaOCl)；潛伏期極長、不引起發炎與免疫反應。致海綿狀腦病(庫賈氏病、狂牛、羊搔癢、Kuru)。出題陷阱：「對放射線非常敏感」為錯(應為不敏感)。","options":{"A":"潛伏期極長，正確。","B":"對熱安定不易破壞，正確。","C":"不引起發炎反應，正確。","D":"正確（為錯誤敘述）：prion對放射線不敏感（無核酸）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-71":{"quick":"HIV為「單股RNA」反轉錄病毒（兩條相同+ssRNA、二倍體）。","detail":{"background":"人類免疫缺乏病毒（HIV）屬反轉錄病毒科（Retroviridae）：基因組為「單股（+）RNA」（含兩條相同RNA，故稱二倍體），有套膜（gp120/gp41）、攜帶反轉錄酶、嵌合酶、蛋白酶。感染時以反轉錄酶將RNA轉為DNA並嵌入宿主基因組（前病毒）。故HIV為單股RNA病毒。","options":{"A":"正確：HIV為單股RNA（反轉錄）病毒。","B":"非雙股RNA。","C":"非單股DNA。","D":"非雙股DNA。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-77":{"quick":"原發性肝細胞癌與肝硬化最相關的肝炎病毒為「B型（HBV）」（台灣以B肝為主）。","detail":{"background":"B型肝炎病毒（HBV）為DNA病毒，慢性感染（尤其母嬰垂直感染的帶原者）長期造成慢性肝炎→肝硬化→肝細胞癌，是台灣肝癌與肝硬化的主要病因（HBV的DNA可嵌入宿主基因組促癌）。C肝亦與肝硬化肝癌相關，但本題台灣最相關經典答案為B型。A、E型為自限性、G型意義不明，皆不致慢性肝病肝癌。","options":{"A":"A型為自限性急性肝炎，不致肝癌。","B":"正確：B型肝炎與肝硬化及肝細胞癌最相關。","C":"E型為自限性，不致慢性肝癌。","D":"G型臨床意義不明。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-78":{"quick":"腺病毒（adenovirus）與肺癌「無」致癌關聯；此配對錯誤。","detail":{"background":"已知致癌病毒配對：EBV—鼻咽癌與Burkitt淋巴瘤；HBV/HCV—肝癌；HPV—子宮頸癌；HTLV-1—成人T細胞白血病；HHV-8—卡波西氏肉瘤。腺病毒（adenovirus）主要致呼吸道、結膜與腸胃道感染，「與肺癌無致癌關聯」。故錯誤配對為「腺病毒和肺癌」。","options":{"A":"EBV與鼻咽癌相關，正確。","B":"HBV與肝癌相關，正確。","C":"HPV與子宮頸癌相關，正確。","D":"正確（為錯誤配對）：腺病毒與肺癌無致癌關聯。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-76":{"quick":"A型流感造成全球大流行的主因是HA/NA抗原的「不連續性大變異（antigenic shift）」。","detail":{"background":"A型流感病毒表面有血球凝集素（HA）與神經胺酸酶（NA）。其抗原變異兩型：①抗原漂移（antigenic drift）——點突變累積的小變異，造成季節性流行；②抗原轉移（antigenic shift）——當不同來源（人/禽/豬）病毒共感染同細胞，分節基因「重組（reassortment）」產生全新HA/NA亞型，人群普遍無免疫，造成「全球大流行（pandemic）」。故大流行主因為抗原轉移（不連續變異）。","options":{"A":"複製速度非大流行主因。","B":"套膜病毒反而較不穩定（易被消毒劑破壞）。","C":"正確：HA/NA抗原轉移（不連續變異）致全球大流行。","D":"流感不以釋放毒素殺細胞致大流行。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-78":{"quick":"A型肝炎病毒（HAV）經「糞口（飲食）」傳播，不經血液感染。","detail":{"background":"肝炎病毒傳播途徑：A型與E型經「糞口（污染飲食）」傳播、為自限性急性肝炎；B、C、D型經「血液、體液、性、母嬰」傳播、可慢性化。故「不經血液感染」者為A型肝炎病毒（HAV，糞口傳播）。補充：口訣「母音(A、E)經口（糞口）、子音(B、C、D)經血」。A型＝小RNA病毒無套膜耐胃酸、糞口；B型＝唯一DNA病毒、血液體液母嬰；C型＝輸血後肝炎主因、易慢性；D型＝缺陷病毒須依附B肝。臨床：B/C型可慢性化→肝硬化、肝癌；A/E型自限不慢性化。","options":{"A":"正確：A型經糞口傳播，不經血液。","B":"B型經血液體液傳播。","C":"C型經血液傳播。","D":"D型隨B型經血液傳播。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-76":{"quick":"A型肝炎為自限性急性肝炎，「不會造成慢性肝病」；此敘述錯誤。","detail":{"background":"A型肝炎（HAV）：屬小RNA病毒科（picornavirus）、單股(+)RNA、無套膜；經「糞口」傳播（俗稱傳染性肝炎），常為流行性；臨床多為「自限性急性肝炎」、痊癒後終身免疫，「不會慢性化、不致肝硬化或肝癌」。故「會造成慢性肝病」與事實相反、為錯誤敘述。可用疫苗預防。","options":{"A":"A肝俗稱傳染性肝炎，正確。","B":"屬picornavirus（小RNA病毒），正確。","C":"經糞口傳播，正確。","D":"正確（為錯誤敘述）：A肝為自限性、不致慢性肝病。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-78":{"quick":"立克次體「同時具有DNA與RNA」（細菌特性），故判定為細菌而非病毒。","detail":{"background":"病毒只含「一種核酸（DNA或RNA其中之一）」；細菌則「同時含DNA與RNA」、有核糖體、可二分裂、有細胞壁與細胞膜、對抗生素敏感。立克次體雖小且絕對胞內寄生（似病毒），但它「同時具DNA與RNA」、以二分裂繁殖、對抗生素敏感，這些是「細菌」的決定性特徵。故判定為細菌的「主因」是同時具DNA與RNA。","options":{"A":"大小非決定性（有些大病毒亦大）。","B":"絕對胞內寄生與病毒相似，非區別點。","C":"繁殖方式為輔助特徵，題目要核酸主因。","D":"正確：同時具DNA與RNA是細菌特徵，故為細菌。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-77":{"quick":"巨細胞病毒（CMV）是最常見經胎盤垂直感染、致先天缺陷（小頭畸形等）的病毒。","detail":{"background":"巨細胞病毒（cytomegalovirus, CMV，HHV-5）是「先天性感染最常見」的病毒，經胎盤垂直傳染，造成先天性CMV感染——小頭畸形（小腦/小頭）、腦部鈣化、感音神經性聽損、肝脾腫大、紫斑、生長遲滯。它屬TORCH群之一。故經胎盤致先天缺陷最常見者為CMV。","options":{"A":"腺病毒非主要先天感染病毒。","B":"正確：CMV為最常見先天感染、致小頭等缺陷。","C":"痘病毒非典型先天感染。","D":"B肝主要致肝病，非小頭畸形。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-79":{"quick":"干擾素抗病毒主要在抑制病毒的「蛋白質合成」（誘導抗病毒蛋白）。","detail":{"background":"第一型干擾素（IFN-α/β）由病毒感染細胞分泌，作用於鄰近細胞，誘導抗病毒蛋白：①蛋白激酶R（PKR）使eIF-2磷酸化→抑制病毒（及細胞）mRNA轉譯「蛋白質合成」；②2′-5′寡腺苷酸合成酶活化RNase L→降解病毒mRNA。結果阻斷病毒在被保護細胞內的複製，主要在「蛋白質合成」步驟。故作用步驟為蛋白質合成。","options":{"A":"非直接阻斷附著。","B":"非作用於脫殼。","C":"非直接抑制核苷酸製造為主。","D":"正確：干擾素誘導抗病毒蛋白、抑制病毒蛋白質合成。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-77":{"quick":"B肝例行檢測一般「不包括HBcAg」（核心抗原存於肝細胞、血中測不到）。","detail":{"background":"B肝常規血清檢測包括HBsAg（表面抗原）、HBeAg（e抗原）、抗-HBs、抗-HBc、抗-HBe等。「HBcAg（核心抗原）」存在於受感染肝細胞核內、不游離於血清中，故「不在例行血液檢測項目」（只能測抗-HBc抗體）。故不包括者為HBcAg。","options":{"A":"HBsAg為常規檢測項目。","B":"正確：HBcAg血中測不到，不在例行檢測。","C":"HBeAg為常規檢測項目。","D":"抗-HBs為常規檢測項目。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-79":{"quick":"此題送分；RNA病毒突變率高因RNA依賴性RNA聚合酶缺乏校正（proofreading）功能。","detail":{"background":"本題公告一律給分。學理上，RNA病毒（如流感、HIV、HCV）突變率高，是因其複製所用的「RNA依賴性RNA聚合酶（RNA-dependent RNA polymerase）」或反轉錄酶「缺乏3′→5′核酸外切校正（proofreading）」機制，複製錯誤無法修正而累積突變，造成抗原變異與抗藥性。惟因選項中反轉錄酶（RNA-dependent DNA polymerase, C）亦欠缺校正、題意涵蓋面廣，故本題送分、各選項均給分。","options":{"A":"DNA聚合酶具校正功能（本題送分）。","B":"DNA依賴RNA聚合酶（本題送分）。","C":"反轉錄酶亦缺校正（本題送分）。","D":"RNA依賴RNA聚合酶缺校正致高突變（本題送分，各選項均給分）。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-78":{"quick":"水痘帶狀疱疹病毒（VZV）是人類疱疹病毒中最小、傳染力極高、經飛沫或接觸傳播者。","detail":{"background":"人類疱疹病毒（HHV）皆為有套膜的雙股DNA病毒、可潛伏。水痘帶狀疱疹病毒（VZV/HHV-3）是其中病毒顆粒「最小」、傳染力「極高」者，經「呼吸道飛沫或直接接觸水疱液」傳播，初次感染致水痘、再活化致帶狀疱疹（潛伏於背根神經節）。故符合「最小、傳染性極高、飛沫/接觸傳播」者為VZV。","options":{"A":"小兒麻痺病毒非疱疹病毒。","B":"CMV傳染力相對低、非經典飛沫高傳染。","C":"正確：水痘帶狀疱疹病毒最小、傳染力極高。","D":"A肝病毒非疱疹病毒。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-79":{"quick":"A型肝炎病毒（HAV）依分類被歸為「腸病毒72型（enterovirus 72）」。","detail":{"background":"A型肝炎病毒（HAV）屬小RNA病毒科（Picornaviridae）、單股(+)RNA、無套膜、耐酸（可通過胃酸）、經糞口傳播。依早期分類曾被歸為「腸病毒72型（enterovirus 72）」（後另立Hepatovirus屬）。故對應為腸病毒72。","options":{"A":"腸病毒71為手足口病／重症腦炎病毒。","B":"正確：A肝病毒舊分類為腸病毒72。","C":"無腸病毒73之HAV對應。","D":"無腸病毒74之HAV對應。"},"sources":["Murray《Medical Microbiology》","Levinson《Review of Medical Microbiology and Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-74":{"quick":"腺病毒（adenovirus）「無套膜」，故可抵抗乙醚（脂溶劑）破壞。","detail":{"background":"有「套膜（envelope）」的病毒（疱疹、冠狀、流感、麻疹）其套膜含脂質，易被「脂溶劑（乙醚、酒精、清潔劑）」破壞而失去感染力、對乾燥與胃酸也較不耐。「無套膜（裸露）」病毒（腺病毒、小RNA病毒、乳突病毒、細小病毒）外層為蛋白衣，「不被乙醚等脂溶劑破壞」、較耐環境與胃酸。故不具套膜、可抵抗乙醚者為腺病毒。","options":{"A":"單純疱疹
