%。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-68":{"quick":"肉芽腫由類上皮細胞、巨噬細胞、巨細胞、淋巴球等組成，「不包括平滑肌細胞」。","detail":{"background":"肉芽腫（granuloma）是慢性發炎（如結核、結節病）對難清除抗原的局限性反應，主要由活化巨噬細胞轉變的「類上皮細胞（epithelioid cells）」、融合的「多核巨細胞」、外圍的淋巴球與纖維母細胞組成（內可有壞死中心）。「平滑肌細胞」並非肉芽腫的組成細胞。故不包括者為平滑肌細胞。","options":{"A":"類上皮細胞為肉芽腫主要成分。","B":"巨噬細胞為肉芽腫成分。","C":"內皮細胞（新生血管）可見於肉芽腫周邊。","D":"正確：平滑肌細胞非肉芽腫組成。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-68":{"quick":"脾臟可過濾清除血液中的病原菌（與衰老血球）。","detail":{"background":"脾臟是體內最大的次級淋巴器官，紅髓的巨噬細胞「過濾血液」、清除血中病原菌、抗體包覆的細菌與衰老的紅血球、血小板；白髓則含淋巴球進行對血源抗原的免疫反應。故脾切除者對「有莢膜細菌（肺炎鏈球菌、Hib、腦膜炎雙球菌）」感染風險升高。故過濾清除血中病原菌者為脾臟。","options":{"A":"胸腺為T細胞成熟場所，非過濾血液。","B":"胰臟為消化/內分泌器官。","C":"骨髓為造血器官。","D":"正確：脾臟過濾清除血中病原菌與衰老血球。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-67":{"quick":"加熱56–65°C會使補體失活，故測不到「需補體的細胞溶解反應」。","detail":{"background":"補體（complement）為熱不穩定的血清蛋白，「加熱56°C 30分鐘（或更高溫）即失去活性（去補體化）」。需要補體參與的免疫反應——尤其「補體依賴的細胞溶解反應（complement-dependent cytotoxicity，如溶血、溶菌）」——在去補體血清中將測不到。沉澱、中和、凝集反應主要靠抗體本身、不需補體，仍可測得。故測不到者為細胞溶解反應。","options":{"A":"沉澱反應靠抗體、不需補體，仍可測。","B":"正確：細胞溶解反應需補體，去補體後測不到。","C":"中和反應靠抗體，不需補體。","D":"凝集反應靠抗體，不需補體。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-67":{"quick":"先天性免疫「不具長期記憶性」（反應快、無抗原專一性）。","detail":{"background":"先天（固有）免疫特性：①「反應快速」（數分鐘至數小時、不需事先致敏）；②「無抗原專一性」（以模式辨識受體PRR辨認病原共通的PAMP，非特定抗原）；③不只發生在吞噬細胞（含補體、屏障、NK、發炎介質）；④「不具長期免疫記憶」（再遇同病原反應不增強，這與後天免疫不同）。故正確描述為「不具備長期記憶性」。","options":{"A":"先天免疫不需多次抗原刺激即啟動，敘述錯誤。","B":"先天免疫無抗原專一性，敘述錯誤。","C":"先天免疫不只發生在吞噬細胞，敘述錯誤。","D":"正確：先天性免疫不具長期記憶性。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-66":{"quick":"56°C（30分鐘）可破壞補體活性。","detail":{"background":"補體為熱不穩定蛋白，「加熱56°C約30分鐘」即失活（去補體化）；25、37、40°C則不破壞補體（37°C為體溫、補體仍具活性）。故可破壞補體的溫度為56°C。實驗上常以56°C 30分鐘將血清去補體，以排除補體干擾。補充：補體為熱不穩定血清蛋白，「56°C 30分鐘」即去活(去補體化)，常用於實驗排除補體干擾。需補體的反應(補體依賴的溶血/溶菌)會消失，但靠抗體本身的沉澱、中和、凝集反應不受影響。臨床關聯：陣發性夜間血紅素尿症(PNH)因CD55/CD59(GPI錨)缺失、紅血球易被補體溶解。","options":{"A":"25°C不破壞補體。","B":"37°C為體溫，補體仍有活性。","C":"40°C不足以破壞補體。","D":"正確：56°C可破壞補體活性。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-73":{"quick":"「肉芽腫杯盞狀菌（Klebsiella/Calymmatobacterium granulomatis）」為革蘭氏陰性菌。","detail":{"background":"丙酸桿菌、梭狀芽孢桿菌、奴卡氏菌皆為革蘭氏「陽性」；而「肉芽腫杯盞狀菌（Calymmatobacterium/Klebsiella granulomatis，致腹股溝肉芽腫donovanosis）」為革蘭氏「陰性」桿菌。故革蘭氏陰性者為肉芽腫杯盞狀菌。","options":{"A":"丙酸桿菌為G＋。","B":"梭狀芽孢桿菌為G＋。","C":"正確：肉芽腫杯盞狀菌為G−。","D":"奴卡氏菌為G＋（部分抗酸）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-67":{"quick":"TNF-α大量釋放會引起休克、循環崩潰與出血性壞死，「不會促進傷口癒合」。","detail":{"background":"腫瘤壞死因子-α（TNF-α）是巨噬細胞釋放的促發炎細胞激素：適量時促進局部發炎、活化內皮、召募白血球；但「大量（全身性）釋放」時造成敗血性休克、血管擴張與通透增加致「循環崩潰」、瀰漫性血管內凝血與「出血性壞死」、惡病質。「傷口癒合」是組織修復過程（由生長因子、纖維母細胞主導），「不是TNF-α大量釋放引起的病症」。故不會引起者為傷口癒合。","options":{"A":"正確：TNF-α大量釋放不會引起傷口癒合（反而破壞組織）。","B":"大量TNF-α可致休克。","C":"可致循環崩潰。","D":"可致出血性壞死。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-66":{"quick":"加熱56°C 30分鐘可破壞血清補體的溶解細胞反應。","detail":{"background":"補體溶解細胞（如補體依賴的溶菌、溶血）需要熱不穩定的補體蛋白。「加熱56°C 30分鐘」使補體失活（去補體化），即可破壞此溶解反應。生理食鹽水、濾紙過濾、加抗生素皆不會去除補體活性。故破壞補體溶解反應的處理為56°C 30分鐘加熱。補充：補體溶解細胞反應(補體依賴的溶菌、溶血)需熱不穩定的補體蛋白，「56°C 30分鐘」去活即破壞之；生理食鹽水、濾紙過濾、抗生素皆不影響補體。實驗上常先去補體以排除干擾。膜攻擊複合體(MAC, C5b-9)對G−菌與奈瑟菌的溶解尤重要——終末補體(C5–C9)缺乏者易反覆奈瑟菌感染。","options":{"A":"加生理食鹽水不破壞補體。","B":"正確：加熱56°C 30分鐘去活補體、破壞溶解反應。","C":"濾紙過濾不去除補體活性。","D":"添加抗生素與補體活性無關。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-67":{"quick":"細菌感染時「最早」聚集於感染部位的是多型核白血球（嗜中性球）。","detail":{"background":"急性細菌感染的發炎反應中，「嗜中性球（多型核白血球，PMN）」是「最早、最大量」被趨化召募至感染部位的細胞（數小時內），進行吞噬與殺菌（化膿）；巨噬細胞、淋巴球則隨後到達。NK主要對抗病毒/腫瘤細胞。故最早聚集者為多型核白血球。補充：急性發炎細胞浸潤時序——「嗜中性球(多型核白血球)最早(數小時內)、最大量趨化至感染處」吞噬殺菌化膿；24–48小時後巨噬細胞接手清理；淋巴球參與後天免疫較晚。慢性發炎則以巨噬、淋巴、漿細胞為主。嗜中性球趨化由C5a、IL-8、LTB4、細菌胜肽(fMLP)驅動。出題：細菌感染最早聚集＝嗜中性球。","options":{"A":"NK細胞主要對抗病毒/腫瘤，非細菌感染最早聚集者。","B":"淋巴球屬後天免疫、較晚參與。","C":"巨噬細胞稍晚於嗜中性球到達。","D":"正確：多型核白血球（嗜中性球）最早聚集。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-65":{"quick":"體細胞受病毒感染後，主要靠「CD8毒殺T細胞」辨認並清除受感染細胞以控制病情。","detail":{"background":"病毒感染細胞後，受感染細胞會將病毒胜肽呈現於「MHC class I」上。「CD8＋毒殺T細胞（細胞毒殺T，CTL）」辨認MHC I－病毒抗原複合體，釋放穿孔素與顆粒酶誘導受感染細胞凋亡，是清除「病毒感染細胞」、控制病毒擴散的主力（NK亦輔助）。故主要啟動以控制病毒者為CD8 T細胞。","options":{"A":"樹突細胞為抗原呈現，非直接清除感染細胞。","B":"正確：CD8毒殺T細胞清除病毒感染細胞。","C":"B細胞產抗體（對胞外病毒），非直接殺感染細胞。","D":"肥大細胞與過敏發炎相關，非抗病毒主力。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-72":{"quick":"脾臟過濾血液病原體並清除衰老的血球與血小板。","detail":{"background":"脾臟紅髓的巨噬細胞負責「過濾血液、清除衰老或異常的紅血球、血小板及血中病原菌」（尤其有莢膜細菌）；白髓進行對血源抗原的免疫反應。扁桃腺、盲腸、培氏斑屬黏膜相關淋巴組織（MALT/GALT），守備黏膜面、非過濾血液。故過濾血液清除衰老血球者為脾臟。","options":{"A":"扁桃腺為黏膜淋巴組織，非過濾血液。","B":"盲腸（闌尾）為腸道淋巴組織。","C":"正確：脾臟過濾血液、清除衰老血球與病原。","D":"培氏斑為腸道淋巴組織。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-76":{"quick":"志賀毒性大腸桿菌（STEC/O157）經未煮熟食物傳染、致出血性腹瀉；此敘述正確。","detail":{"background":"致病性大腸桿菌類型：①STEC（如O157:H7）產志賀毒素，經「未煮熟牛肉等食物」傳染，致「出血性腹瀉」與溶血性尿毒症候群（正確）；②ETEC產腸毒素致旅行者腹瀉，經「污染食水」（非以人傳人為主，故B錯）；③EAEC可致「持續性腹瀉並有發炎」（故C錯）；④EPEC造成嬰兒腹瀉、其機制為黏附抹平（A/E病變），「不具志賀毒素」（故D錯）。故正確者為A。","options":{"A":"正確：STEC經未煮熟食物、致出血性腹瀉。","B":"ETEC經污染食水，非以人傳人為主。","C":"EAEC可致發炎，非只持續腹瀉不發炎。","D":"EPEC不具志賀毒素（產志賀毒素的是STEC）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-77":{"quick":"第三期梅毒腫（gumma）「不只出現在生殖器」，可侵犯皮膚、骨、內臟；此敘述錯誤。","detail":{"background":"梅毒（T. pallidum）各期：①第一期——感染後約10–90天於接觸處出現「無痛硬性下疳」（正確）；②第二期——螺旋體播散、全身皮膚黏膜紅疹（正確）；③第三期——「梅毒腫（gumma，肉芽腫）」可出現於「皮膚、骨骼、肝、中樞神經、心血管」等多處（非只生殖器，故C錯）；④可經胎盤致先天性梅毒（正確）。故錯誤者為C。","options":{"A":"第一期硬性下疳、感染後10–90天無痛潰瘍，正確。","B":"第二期全身皮膚黏膜紅疹，正確。","C":"正確（為錯誤敘述）：梅毒腫不只生殖器，可侵多處。","D":"可經胎盤致先天性梅毒，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-66":{"quick":"補體C5a可活化（趨化並活化）吞噬細胞、是強力過敏毒素與趨化因子。","detail":{"background":"補體活化產生的小片段中：「C5a」是最強的「過敏毒素（anaphylatoxin）」與「趨化因子」——吸引並「活化嗜中性球、巨噬細胞」（增黏附、脫顆粒、呼吸爆發），並使肥大細胞釋放組織胺增血管通透。C3b為調理素（促吞噬辨識）、C5b-9為膜攻擊複合體（溶解）、C1為活化起始。故活化吞噬細胞者為C5a。","options":{"A":"C1為傳統途徑活化起始，非活化吞噬細胞。","B":"正確：C5a趨化並活化吞噬細胞。","C":"C4參與活化級聯，非直接活化吞噬細胞。","D":"C5b-9為膜攻擊複合體（溶解作用）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-70":{"quick":"引起敗血症全身性反應的主要因子是腫瘤壞死因子-α（TNF-α）。","detail":{"background":"敗血症（sepsis）時，細菌（尤其革蘭氏陰性菌的內毒素LPS）刺激巨噬細胞大量釋放「TNF-α」（與IL-1、IL-6）——TNF-α是引發全身性發炎反應症候群（SIRS）、發燒、血管擴張低血壓、瀰漫性血管內凝血與多器官衰竭的「主要關鍵介質」。IL-12促Th1分化、IL-17促嗜中性球募集、CRP為急性期反應指標，皆非敗血症全身反應的主導因子。故主要因子為TNF-α。","options":{"A":"正確：TNF-α為敗血症全身性反應的主要因子。","B":"IL-12促Th1分化，非敗血症主導。","C":"IL-17促嗜中性球募集，非主導。","D":"CRP為急性期指標，非致病因子。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-72":{"quick":"肉毒桿菌中毒是「神經毒素致弛緩性麻痺」，「非嚴重發炎」致死；故此敘述錯誤。","detail":{"background":"肉毒桿菌（C. botulinum）食物中毒特性：①因攝入「預形成的神經毒素」、「腸道不易分離出活菌」（A正確）；②常因自製醃漬/封裝罐頭被污染（B正確）；③死亡是「神經毒素阻斷乙醯膽鹼釋放→弛緩性麻痺→呼吸肌麻痺」所致，「並非嚴重發炎反應」（C錯誤）；④毒素量微小、康復後「不產生免疫力」（D正確）。故錯誤者為C。","options":{"A":"腸道不易分離出細菌，正確。","B":"常因自製醃漬/罐頭污染，正確。","C":"正確（為錯誤敘述）：死於神經毒素弛緩麻痺，非嚴重發炎。","D":"康復後仍不具免疫力，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-44":{"quick":"補體C3b的主要功能是「調理作用（opsonization）」——促進病原被吞噬細胞辨識吞噬。","detail":{"background":"補體C3裂解為C3a與C3b：「C3b」結合並包覆病原體表面，作為「調理素（opsonin）」，被吞噬細胞上的補體受體（CR1）辨識，「促進病原體被吞噬細胞辨識與吞噬」；也參與形成C5轉化酶推進膜攻擊複合體。增加血管通透、趨化、促發炎主要是C3a、C5a（過敏毒素）的功能。故C3b主要功能為促吞噬辨識（調理）。","options":{"A":"增加血管通透為C3a/C5a功能。","B":"吸引吞噬細胞（趨化）為C5a功能。","C":"促進發炎為C3a/C5a功能。","D":"正確：C3b促進病原被吞噬細胞辨識（調理作用）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-46":{"quick":"破傷風梭狀菌（C. tetani）「不在吞噬細胞內生存複製」（以毒素致病）；Legionella、Yersinia、Listeria為胞內菌。","detail":{"background":"胞內寄生菌可在吞噬細胞內存活複製：退伍軍人桿菌（Legionella，抑制吞噬體溶酶體融合）、鼠疫桿菌（Yersinia）、李斯特菌（Listeria，逃逸至胞質）。「破傷風桿菌（C. tetani）」則是在「缺氧傷口局部增殖、分泌神經毒素」經血流/神經作用致病，「並非胞內菌、不在吞噬細胞內生存複製」。故不會在吞噬細胞內生存複製者為破傷風桿菌。","options":{"A":"退伍軍人桿菌為胞內菌、可在吞噬細胞內存活。","B":"鼠疫桿菌可在吞噬細胞內存活。","C":"正確：破傷風桿菌非胞內菌（以毒素致病）。","D":"李斯特菌為胞內菌、可在吞噬細胞內存活。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-41":{"quick":"內毒素（LPS）「會促進（而非抑制）發炎反應」；故「可抑制宿主發炎」錯誤。","detail":{"background":"內毒素（endotoxin）即革蘭氏陰性菌外膜的「脂多醣（LPS）」，於「細菌死亡分解時釋出」（正確）；其lipid A刺激免疫，可「活化補體」（正確）、活化巨噬細胞釋放TNF/IL-1致「發燒（致熱原）」（正確）、嚴重時致敗血性休克與DIC。LPS是「促進（強化）發炎」而非抑制。故「可抑制宿主的發炎反應」為錯誤敘述。","options":{"A":"內毒素可活化補體，正確。","B":"正確（為錯誤敘述）：內毒素促進發炎，非抑制。","C":"內毒素可引起高燒（致熱原），正確。","D":"由死菌分解釋放，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-42":{"quick":"膜攻擊複合體（MAC）由「C5b-9」（C5b、C6、C7、C8、多個C9）組成。","detail":{"background":"補體三條活化路徑最終匯聚於終末路徑，依序C5b→C6→C7→C8→多個C9聚合，形成「膜攻擊複合體（MAC，C5b-9）」，在標的細胞膜上打出孔洞造成滲透溶解（對革蘭氏陰性菌與奈瑟氏菌尤重要）。C1為傳統途徑起始、C3為中心放大、C5a為過敏毒素，皆非MAC組成。故MAC為C5b-9。","options":{"A":"C1為傳統途徑起始，非MAC。","B":"C3為中心成分，非MAC本體。","C":"C5a為過敏毒素片段，非MAC。","D":"正確：膜攻擊複合體為C5b-9。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-45":{"quick":"法蘭西氏土倫桿菌（Francisella tularensis）主要感染「巨噬細胞」（胞內菌）。","detail":{"background":"土倫法蘭西斯菌（Francisella tularensis，致兔熱病tularemia）為革蘭氏陰性的「胞內寄生菌」，主要在「巨噬細胞」內存活增殖（藉抑制吞噬體-溶酶體融合、逃逸至胞質），感染力極強、可作生物戰劑。故主要感染的人體細胞為巨噬細胞。","options":{"A":"正確：法蘭西氏土倫桿菌主要感染巨噬細胞（胞內菌）。","B":"非主要感染上皮細胞。","C":"非感染基底細胞。","D":"非感染自然殺手細胞。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-41":{"quick":"血液中數量最多的吞噬細胞是「嗜中性球（neutrophil）」。","detail":{"background":"人類血液中「數量最多的白血球」是嗜中性球（佔50–70%），它也是血液中「最主要、數量最多的吞噬細胞」，於急性細菌感染時最早大量趨化至感染處吞噬殺菌。巨噬細胞主要在組織內（數量不如血中嗜中性球）；嗜鹼性球與NK非主要吞噬細胞。故血中最多吞噬細胞為嗜中性球。","options":{"A":"嗜鹼性球非主要吞噬細胞、數量極少。","B":"正確：嗜中性球為血中數量最多的吞噬細胞。","C":"巨噬細胞主要在組織、血中為單核球。","D":"NK細胞非吞噬細胞。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-41":{"quick":"幫助細菌抵抗吞噬作用的多醣構造是「莢膜（capsule）」。","detail":{"background":"「莢膜（capsule）」是許多致病菌（肺炎鏈球菌、腦膜炎雙球菌、Hib、克雷白氏菌）細胞壁外的多醣（少數為多肽）層，是重要「抗吞噬」毒力因子——阻礙吞噬細胞辨識與吞噬，使細菌得以存活增殖；也是疫苗抗原與血清分型依據。鞭毛司運動、線毛司黏附、芽孢為抗逆境休眠體，皆非抗吞噬主構造。故抗吞噬的多醣構造為莢膜。","options":{"A":"正確：莢膜（多醣）抗吞噬。","B":"鞭毛司運動，非抗吞噬。","C":"線毛司黏附，非抗吞噬。","D":"芽孢為休眠抗逆境構造，非抗吞噬。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-42":{"quick":"補體C3a（過敏毒素）促肥大細胞活化、脫顆粒；本題答案為C3a。","detail":{"background":"補體過敏毒素「C3a、C5a」可作用於肥大細胞與嗜鹼性球，促其活化、脫顆粒釋放組織胺等發炎介質（增血管通透、平滑肌收縮）。本題選項中與肥大細胞活化最相關者為「C3a」（C5a更強，但本題給C3a）；C1a、C2a、C4b非典型促肥大細胞過敏毒素。故答案為C3a。","options":{"A":"C1a非典型過敏毒素。","B":"C2a為C3轉化酶成分，非過敏毒素。","C":"正確：C3a（過敏毒素）促肥大細胞活化脫顆粒。","D":"C4b為調理/轉化酶成分，非過敏毒素。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-45":{"quick":"法蘭西氏土倫桿菌能在巨噬細胞內存活，因其「抑制吞噬體-溶酶體融合」。","detail":{"background":"土倫法蘭西斯菌（Francisella tularensis）為兼性胞內菌，能在巨噬細胞內存活的關鍵機制是「抑制吞噬體（phagosome）與溶酶體（lysosome）的融合」（並可逃逸至胞質），避免被溶酶體酵素與酸性環境殺滅，從而在巨噬細胞內增殖。此為多種胞內菌（如結核菌、Legionella）共通的免疫逃避策略。故主因為抑制吞噬體-溶酶體融合。","options":{"A":"正確：抑制吞噬體-溶酶體融合而於巨噬細胞內存活。","B":"抗氧化非其主要存活機制描述。","C":"不具脂質莢膜與胞內存活無直接因果。","D":"內毒素非其在巨噬細胞內存活的機制。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-46":{"quick":"腦膜炎雙球菌「以人為唯一宿主、經飛沫人傳人」，「非人畜共通」；故此敘述錯誤。","detail":{"background":"腦膜炎雙球菌（Neisseria meningitidis）：①有「莢膜」抑制吞噬（毒力與疫苗抗原，正確）；②「以人為唯一宿主、經呼吸道飛沫人傳人」，「並非人畜共通」（故C錯）；③臨床可見「出血性瘀斑/紫斑」（猛爆性敗血症Waterhouse-Friderichsen）為診斷線索之一（正確）。故錯誤者為C（腦膜炎雙球菌非人畜共通）。","options":{"A":"有莢膜抑制吞噬，正確。","B":"主要經飛沫傳染，正確。","C":"正確（為錯誤敘述）：以人為宿主、經飛沫人傳人，非人畜共通。","D":"出血性皮疹為診斷依據之一，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-65":{"quick":"不同的細胞激素可能執行類似功能（功能重疊性，redundancy）。","detail":{"background":"細胞激素（cytokine）特性：①作用「無抗原專一性」（與抗體不同）；②可經自泌（autocrine）、旁泌（paracrine）與內分泌方式作用；③具「重疊性（redundancy）」——「不同細胞激素可執行類似功能」；④具「多效性（pleiotropy）」——「一種細胞激素可產生多種生理作用」；並有協同與拮抗作用。故正確敘述為「不同細胞激素可能執行類似功能」。","options":{"A":"細胞激素無抗原特異性，敘述錯誤。","B":"可經旁泌作用影響其他細胞，敘述錯誤。","C":"正確：不同細胞激素可執行類似功能（重疊性）。","D":"一種細胞激素可產生多重作用（多效性），敘述錯誤。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-66":{"quick":"毒殺T細胞的表面標記為「CD8」。","detail":{"background":"T細胞依共受體分兩大類：「CD8＋」為「毒殺（細胞毒殺）T細胞（CTL）」，辨識MHC class I－抗原、毒殺病毒感染與腫瘤細胞；「CD4＋」為輔助T細胞，辨識MHC class II－抗原、分泌細胞激素協調免疫。故毒殺T細胞的標記為CD8。","options":{"A":"CD9非T細胞亞群標記。","B":"CD4為輔助T細胞標記。","C":"正確：CD8為毒殺T細胞標記。","D":"CD10為前驅淋巴細胞標記，非毒殺T。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"101030-N1-71":{"quick":"「受體經基因再排列產生」是後天免疫（B/T細胞受體）的特性，非先天免疫。","detail":{"background":"先天免疫特性：反應快（數小時內）、靠吞噬細胞快速吞噬、由細胞激素媒介發炎、以「胚系編碼、固定的模式辨識受體（PRR，如TLR）」辨認病原共通模式（PAMP）。而「辨認受體經由基因重組（gene rearrangement/recombination）產生多樣性」是「後天免疫」B細胞受體（抗體）與T細胞受體的特性。故不是先天免疫特性者為C。","options":{"A":"先天免疫反應數小時內形成，是其特性。","B":"吞噬細胞快速吞噬，是先天免疫特性。","C":"正確：受體經基因再排列產生為後天免疫特性，非先天免疫。","D":"細胞激素媒介發炎，是先天免疫特性。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-70":{"quick":"可通過胎盤由母親傳給胎兒的免疫球蛋白是IgG。","detail":{"background":"五類免疫球蛋白中，只有「IgG」能「主動通過胎盤」（經胎盤FcRn受體運輸），提供新生兒出生後數月的被動免疫保護。IgM分子大不能過胎盤、IgA經初乳提供黏膜被動免疫、IgE與IgD不過胎盤。故可過胎盤者為IgG。補充：五類Ig特性記憶——IgG(血清最多、「唯一過胎盤」、半衰期最長約3週、活化補體)、IgM(初次反應、五聚體、活化補體最強)、IgA(黏膜分泌雙體)、IgE(過敏/抗寄生蟲)、IgD(B細胞表面)。新生兒被動免疫＝母IgG經胎盤(出生時最多)+母IgA經初乳。臍血IgM↑提示子宮內感染(IgM不過胎盤、為胎兒自製)。","options":{"A":"IgA經初乳提供黏膜免疫，不過胎盤。","B":"IgD不過胎盤。","C":"IgE不過胎盤。","D":"正確：IgG可通過胎盤傳給胎兒。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-71":{"quick":"CD59抑制C9併入C5b-8、阻止膜攻擊複合體形成，保護自體細胞。","detail":{"background":"CD59（protectin）是自體細胞膜上的補體調節蛋白，「阻礙C9與C5b-8結合聚合」，防止膜攻擊複合體（MAC）在自身細胞上形成，避免補體誤傷自體細胞。CD59缺陷（如陣發性夜間血紅素尿症PNH，GPI錨缺失）會使紅血球易被補體溶解。故阻礙C5b-8與C9結合者為CD59。","options":{"A":"CD4為輔助T細胞共受體。","B":"CD16為NK/巨噬細胞的Fc受體。","C":"CD44為黏附分子。","D":"正確：CD59阻礙C9與C5b-8結合（抑制MAC）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-70":{"quick":"CD8 T細胞辨識「MHC class I」呈現的抗原。","detail":{"background":"CD8＋毒殺T細胞的CD8共受體結合「MHC class I」（表現於所有有核細胞），辨識其呈現的「內源性（如病毒、腫瘤）抗原胜肽」，進而毒殺該細胞。（CD4輔助T細胞則辨識MHC class II。）MHC III為補體等基因，無IV。故CD8辨識MHC I。","options":{"A":"正確：CD8 T細胞辨識MHC class I。","B":"MHC II由CD4 T細胞辨識。","C":"MHC III為補體等基因，非抗原呈現分子。","D":"無MHC IV之分類。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-72":{"quick":"樹突細胞（dendritic cell）是最強的「專業抗原呈現細胞」，誘發最強的後天免疫。","detail":{"background":"樹突細胞（dendritic cell, DC）是「最有效的專業抗原呈現細胞（APC）」——能捕捉抗原、移行至淋巴結、高表現MHC II與協同刺激分子（B7），是唯一能活化「初始（naïve）T細胞」啟動初級免疫反應的細胞，誘發最強的後天性免疫。嗜鹼性球、表皮細胞非專業APC；CD4 T細胞本身是被呈現的對象。故誘發最強免疫者為樹突細胞。","options":{"A":"嗜鹼性球非專業抗原呈現細胞。","B":"表皮細胞非專業APC。","C":"CD4 T細胞是被活化者，非主要抗原呈現者。","D":"正確：樹突細胞為最強抗原呈現細胞。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-73":{"quick":"侵入血液的病原菌最可能在「脾臟」引起專一性免疫反應。","detail":{"background":"次級淋巴器官各守不同入口：「脾臟」過濾並對「血源（血液）」抗原引起免疫反應；「淋巴結」對組織淋巴引流來的抗原反應；黏膜淋巴組織（MALT）守備黏膜。故「血液中」的病原菌最可能在脾臟（白髓）引起專一性免疫反應。補充：次級淋巴器官依抗原入口分工——脾臟(白髓)對「血源」抗原反應、紅髓過濾血液；淋巴結對「組織淋巴引流」抗原反應；MALT(培氏斑、扁桃腺)守備黏膜。故菌血症(血中病原)主要在脾臟引起專一性免疫。臨床：脾切除者對「有莢膜菌(肺炎鏈球菌、Hib、腦膜炎雙球菌)」感染風險大增，須接種相關疫苗。","options":{"A":"血管壁非免疫反應主要場所。","B":"骨髓為造血/初級淋巴器官。","C":"正確：脾臟對血源抗原引起免疫反應。","D":"淋巴結主要對組織淋巴引流抗原反應。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-67":{"quick":"T淋巴細胞在「胸腺（thymus）」發育成熟。","detail":{"background":"T細胞前驅由骨髓產生後遷移至「胸腺（thymus）」成熟——在胸腺經正向選擇（能辨識自體MHC者存活）與負向選擇（剔除強烈反應自體抗原者，建立中樞耐受），成為成熟的CD4或CD8 T細胞。故T細胞成熟場所為胸腺（B細胞則在骨髓成熟）。補充：T細胞前驅自骨髓遷移至「胸腺」成熟——正向選擇(保留能適度辨識自體MHC者)、負向選擇(凋亡剔除強烈反應自體抗原者→中樞耐受)，分化為CD4(辨識MHC II)/CD8(辨識MHC I)。B細胞則在「骨髓」成熟。DiGeorge症候群(22q11缺失)＝胸腺發育不全→T細胞缺乏、反覆感染、低血鈣。","options":{"A":"骨髓為T細胞前驅來源與B細胞成熟處，非T成熟。","B":"正確：T細胞在胸腺成熟。","C":"脾臟為次級淋巴器官。","D":"淋巴結為次級淋巴器官。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-70":{"quick":"TH2細胞分泌IL-4、IL-5、IL-13等（如IL-5）。","detail":{"background":"輔助T細胞分化亞群與其細胞激素：TH1分泌IFN-γ、IL-2（促細胞免疫、巨噬細胞活化）；「TH2分泌IL-4、IL-5、IL-13」（促B細胞抗體、IgE、嗜酸性球、過敏與抗寄生蟲）；TH17分泌IL-17。選項中屬TH2者為「IL-5」。IFN-γ與IL-12屬TH1相關、TNF-β非TH2代表。","options":{"A":"IFN-γ為TH1細胞激素。","B":"IL-12促TH1分化（由APC分泌）。","C":"TNF-β非TH2代表細胞激素。","D":"正確：IL-5為TH2分泌的細胞激素。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-37":{"quick":"消化道（黏膜）分泌「IgA」防禦病原菌。","detail":{"background":"黏膜表面（消化道、呼吸道、泌尿生殖道）與外分泌液（唾液、淚液、初乳）主要的免疫球蛋白是「分泌型IgA（sIgA，雙體＋分泌片）」——中和病原與毒素、阻止黏附，是黏膜免疫的第一道體液防線。故消化道分泌的免疫球蛋白為IgA。補充：黏膜免疫第一道體液防線＝「分泌型IgA(sIgA)」，為「雙體(J鏈連接)＋分泌片(secretory component)」，分泌片保護其免於蛋白酶分解。功能：中和病原與毒素、阻止黏附(免疫排除)。母乳(初乳)富含sIgA→提供新生兒腸道被動黏膜免疫。出題：消化道/呼吸道/唾液/淚液分泌的Ig＝IgA。","options":{"A":"IgD主要在B細胞表面，非黏膜分泌。","B":"IgG為血清主要抗體，非黏膜分泌主力。","C":"IgM為初次反應主要抗體，非黏膜分泌。","D":"正確：消化道（黏膜）分泌IgA。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-68":{"quick":"二次（記憶）抗體反應最大量產生的是「IgG」。","detail":{"background":"初次抗原刺激（primary response）以「IgM」為主、量少、潛伏期長；二次（含以上）刺激時記憶B細胞快速活化，反應快、量大、親和力高，「主要產生IgG」（經類別轉換）。這是疫苗追加劑與免疫記憶的基礎。故二次反應最大量的抗體為IgG。","options":{"A":"正確：二次反應最大量產生IgG。","B":"IgM為初次反應主要抗體。","C":"IgE與過敏/抗寄生蟲相關，非二次反應主力。","D":"IgD非主要分泌抗體。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-69":{"quick":"CTLA-4對T細胞活化有「抑制」作用（負向調節）。","detail":{"background":"T細胞活化需第二訊號（協同刺激）：T細胞的「CD28」結合APC的B7（CD80/86）→「促進」活化；活化後表現的「CTLA-4（CD152）」與B7結合親和力更高、傳遞「抑制」訊號→負向調節、終止過度反應（是免疫檢查點，抗CTLA-4為癌症免疫治療標的）。CD2、L-selectin為黏附分子。故抑制T細胞活化者為CTLA-4。","options":{"A":"CD2為黏附/共刺激分子，非抑制。","B":"CD28為促進活化的共刺激分子。","C":"正確：CTLA-4抑制T細胞活化。","D":"L-selectin為淋巴球歸巢黏附分子。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-70":{"quick":"初級淋巴組織（骨髓、胸腺）是「製造／成熟免疫細胞的場所」。","detail":{"background":"初級（中樞）淋巴器官——「骨髓」（B細胞生成與成熟、造血）與「胸腺」（T細胞成熟）——是「免疫細胞（淋巴球）製造與成熟」的場所。次級淋巴器官（淋巴結、脾臟、MALT）才是「進行專一性免疫反應」之處。故初級淋巴組織為製造免疫細胞的場所。補充：初級(中樞)淋巴器官＝骨髓(B成熟)+胸腺(T成熟)，是「製造與成熟免疫細胞」之處；次級(周邊)＝淋巴結、脾、扁桃腺、MALT，是「進行專一性免疫反應」之處。記憶：初級＝養成所(不直接接觸抗原進行反應)，次級＝戰場(淋巴球與抗原相遇活化)。","options":{"A":"正確：初級淋巴組織為製造（成熟）免疫細胞的場所。","B":"非進行非專一性免疫反應的描述。","C":"專一性免疫反應在次級淋巴器官進行。","D":"補體活化在血漿/組織，非初級淋巴組織專責。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-66":{"quick":"抗體多樣性「不靠染色體融合」；靠基因重組、體細胞超突變、類別轉換等。","detail":{"background":"抗體多樣性的來源：①V(D)J「基因重組（重鏈與輕鏈基因片段重排）」；②連接多樣性（接合處插入/刪除）；③重輕鏈組合多樣性；④「體細胞超突變（somatic hypermutation）」（生發中心提高親和力）；⑤「類別（同型）轉換（class switching）」改變Fc功能。「染色體融合（chromosome fusion）」並非抗體多樣性的機制。故不是者為染色體融合。","options":{"A":"重輕鏈基因重排是多樣性機制。","B":"正確：染色體融合非抗體多樣性機制。","C":"體細胞超突變是多樣性機制。","D":"類別轉換是多樣性/功能變化機制。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-66":{"quick":"抗體屬「後天（適應性）免疫」，不是先天防衛系統成員。","detail":{"background":"先天免疫成員：物理屏障、補體、吞噬細胞（巨噬細胞、嗜中性球）、自然殺手細胞、發炎介質、模式辨識受體。「抗體（由B細胞/漿細胞產生）」屬「後天（適應性）免疫」的體液成分（具抗原專一性與記憶），「非先天免疫成員」。故不是先天防衛系統成員者為抗體。","options":{"A":"補體為先天免疫成員。","B":"正確：抗體屬後天免疫，非先天防衛系統。","C":"巨噬細胞為先天免疫成員。","D":"自然殺手細胞為先天免疫成員。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-68":{"quick":"剛出生胎兒體內最多的抗體是「IgG」（來自母體經胎盤）。","detail":{"background":"新生兒（剛出生）體內抗體以「IgG」最多——這是「母親的IgG經胎盤主動運輸」給胎兒，提供出生後數月的被動免疫保護（隨後逐漸消退，嬰兒自身IgG再上升）。胎兒自身合成有限；IgM不過胎盤（若臍血IgM升高提示子宮內感染）。故出生時最多者為IgG。","options":{"A":"IgM不過胎盤、胎兒自製有限。","B":"正確：出生時IgG最多（來自母體）。","C":"IgA經初乳供應，非出生時最多。","D":"IgE量極少。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-69":{"quick":"自然殺手（NK）細胞辨識無MHC I的細胞並毒殺，屬「先天免疫」、非後天免疫功能。","detail":{"background":"後天（適應性）免疫的功能：CTL以穿孔素/顆粒酶毒殺標的（A）、抗體中和/調理/活化補體（B）、輔助T細胞分泌細胞激素活化巨噬細胞（C）——皆具抗原專一性。「自然殺手細胞（NK）辨識喪失MHC I的細胞（missing self）並毒殺」屬「先天免疫」（無抗原專一性、無記憶），「非後天免疫功能」。故非後天免疫者為NK的作用。","options":{"A":"CTL穿孔素毒殺為後天免疫功能。","B":"抗體中和/調理/補體為後天免疫功能。","C":"輔助T分泌細胞激素活化巨噬為後天免疫功能。","D":"正確：NK辨識無MHC I毒殺屬先天免疫，非後天。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-70":{"quick":"IL-10「抑制」發炎、非促TH17分化；故「IL-10促TH17分化」錯誤。","detail":{"background":"輔助T細胞分化的細胞激素：IL-4促TH2（A正確）；IL-12促TH1（B正確）；IFN-γ促TH1（D正確）；TH17由TGF-β＋IL-6（及IL-23維持）誘導。「IL-10」是「抑制性（抗發炎）細胞激素」（由Treg、巨噬等分泌，抑制TH1與發炎），「不促進TH17分化」。故錯誤者為C（IL-10促TH17分化）。","options":{"A":"IL-4促TH2分化，正確。","B":"IL-12促TH1分化，正確。","C":"正確（為錯誤敘述）：IL-10為抑制性，非促TH17分化。","D":"IFN-γ促TH1分化，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-66":{"quick":"骨髓是「初級（中樞）淋巴器官」，不是次級淋巴器官。","detail":{"background":"初級（中樞）淋巴器官：骨髓（B細胞成熟）、胸腺（T細胞成熟）——淋巴球生成與成熟處。次級（周邊）淋巴器官：脾臟、淋巴結、扁桃腺、黏膜相關淋巴組織（MALT）——成熟淋巴球與抗原相遇、進行免疫反應處。故「不是次級淋巴器官」者為骨髓。補充：初級(中樞)淋巴器官＝骨髓(B細胞成熟、造血)、胸腺(T細胞成熟)——淋巴球「生成與成熟」處；次級(周邊)＝脾、淋巴結、扁桃腺、MALT/GALT——成熟淋巴球與抗原相遇、「進行免疫反應」處。故「骨髓非次級淋巴器官」。記憶：初級＝製造工廠，次級＝作戰前線。","options":{"A":"脾臟為次級淋巴器官。","B":"淋巴結為次級淋巴器官。","C":"正確：骨髓為初級淋巴器官，非次級。","D":"扁桃腺為次級淋巴組織。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-67":{"quick":"MHC的功能是「將抗原胜肽呈現給T細胞辨識」。","detail":{"background":"主要組織相容性複合體（MHC，人類即HLA）的核心功能是「將處理後的抗原胜肽呈現給T細胞辨識」——MHC I呈現內源性抗原給CD8 T、MHC II呈現外源性抗原給CD4 T。它不直接增吞噬力、不呈現給B細胞（B細胞受體可直接辨識完整抗原）、非移行因子。故MHC功能為將抗原呈現給T細胞。","options":{"A":"非直接增加吞噬細胞活力。","B":"MHC呈現給T細胞而非B細胞。","C":"正確：MHC將抗原呈現給T細胞辨識。","D":"非促進免疫細胞移行。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-69":{"quick":"超抗原「不需經APC處理」即可非專一性活化大量T細胞；故「需經APC處理才能活化T細胞」錯誤。","detail":{"background":"超抗原（superantigen，如葡萄球菌TSST-1、腸毒素、鏈球菌外毒素）特性：①可引起中毒性休克症候群（A正確）；②「非專一性」大量活化T細胞（B正確）；③「直接橋接」APC的「MHC II」外側與T細胞受體的Vβ區（D正確），「不需經APC處理（加工）成胜肽」即活化大量（5–20%）T細胞、釋放大量細胞激素致休克。故「需經APC處理後才能活化T細胞」為錯誤敘述。","options":{"A":"可引起中毒性休克，正確。","B":"非專一性活化T細胞，正確。","C":"正確（為錯誤敘述）：超抗原不需APC處理即活化T細胞。","D":"與APC的MHC II結合，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-71":{"quick":"初次反應「速度較慢」（潛伏期長）；故「初次反應較二次快」錯誤。","detail":{"background":"初次與二次抗體反應：①初次刺激naïve B細胞活化、主要產生「IgM」、潛伏期長、量少（A正確）；②二次刺激記憶B細胞、主要產生「IgG」、反應「快」、量大、親和力高（B、D正確）。故「初次反應的速度較二次快」與事實相反、為錯誤（二次反應較快）。","options":{"A":"初次刺激主要產IgM，正確。","B":"二次刺激主要產IgG，正確。","C":"正確（為錯誤敘述）：初次反應較慢，非較快。","D":"二次反應抗體親和力較高，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-67":{"quick":"巨噬細胞「不形成補體膜攻擊複合體」來溶解病原（MAC由補體蛋白形成）。","detail":{"background":"巨噬細胞殺菌機制：①以抗體（或補體C3b）調理加速吞噬（A正確）；②產生活性氧與「一氧化氮（NO）」殺菌（C正確）；③分泌TNF-α等細胞激素（D正確）；並有溶酶體酵素。「形成補體膜攻擊複合體（MAC, C5b-9）溶解病原」是「補體系統」的功能，「非巨噬細胞」所為。故不包括者為B（巨噬細胞不形成MAC）。","options":{"A":"以抗體調理加速吞噬，是其機制。","B":"正確：MAC由補體形成，非巨噬細胞機制。","C":"產生NO殺菌，是其機制。","D":"分泌TNF，是其機制。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-68":{"quick":"MHC（class I）表現被抑制，與「癌症（腫瘤免疫逃脫）」相關。","detail":{"background":"腫瘤細胞常「下調MHC class I表現」以逃避CD8毒殺T細胞辨識（免疫逃脫），這與「癌症」的發生與進展相關（不過MHC I下降會被NK的「missing self」機制辨識）。故MHC表現被抑制最相關的疾病為癌症。氣喘、失智、甲狀腺亢進與MHC I下調無此典型關聯。","options":{"A":"氣喘為過敏性疾病，與MHC I下調無此關聯。","B":"失智與MHC I下調無此關聯。","C":"正確：MHC I表現被抑制與癌症（免疫逃脫）相關。","D":"甲狀腺亢進為自體免疫，非MHC I下調機制。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-69":{"quick":"此題送分；HLA-G可抑制NK攻擊（如胎盤滋養細胞免於NK毒殺）。","detail":{"background":"本題公告一律給分。學理上，「非典型的HLA-G」表現於胎盤滋養細胞，可結合NK細胞的抑制性受體、避免NK攻擊（保護胎兒免於母體NK毒殺）；典型的HLA-A、B、C（MHC I）也能向NK提供「自我」訊號抑制其毒殺（missing-self原理）。因各HLA I皆可某程度抑制NK，題意界定有爭議，故本題送分、各選項均給分。","options":{"A":"HLA-A可提供NK自我訊號（本題送分）。","B":"HLA-B可提供NK自我訊號（本題送分）。","C":"HLA-C與NK抑制受體KIR作用（本題送分）。","D":"HLA-G抑制NK攻擊（本題送分，各選項均給分）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-70":{"quick":"性聯無丙型球蛋白血症（Bruton）因「B細胞」發育缺陷、缺乏抗體。","detail":{"background":"性聯（X-linked）無丙種球蛋白血症（Bruton agammaglobulinemia）由「Bruton酪胺酸激酶（BTK）」基因突變，使「B細胞」無法成熟，導致幾乎沒有成熟B細胞與各類免疫球蛋白（抗體），自6個月（母源IgG消退）後反覆細菌（尤其有莢膜菌）感染。為B細胞缺乏所致（T細胞正常）。故缺乏的細胞為B細胞。","options":{"A":"T細胞在此病正常。","B":"正確：缺乏B細胞致無丙種球蛋白血症。","C":"非上皮細胞缺乏。","D":"非內皮細胞缺乏。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-67":{"quick":"古典途徑活化補體需要「IgM（或IgG）」與抗原形成的免疫複合體啟動C1。","detail":{"background":"補體古典途徑（classical pathway）由「抗體（IgM或IgG）與抗原結合形成的免疫複合體」啟動——C1q結合抗體的Fc段而活化C1。其中「IgM（五聚體，一個分子即可活化）」是最有效的補體活化抗體（IgG需兩個鄰近分子）。IgE、IgA、IgD不活化古典途徑。故參與古典途徑者為IgM。","options":{"A":"IgE與過敏相關，不活化古典補體。","B":"IgA不活化古典途徑（可活化替代/凝集素）。","C":"IgD不活化古典途徑。","D":"正確：IgM（或IgG）啟動古典途徑補體。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-69":{"quick":"TH1「也能」幫助B細胞製造（如IgG）抗體；故「TH1不會幫助B細胞製造抗體」錯誤。","detail":{"background":"後天免疫敘述：②IgG經CD16使NK行ADCC（正確）；③TH17分泌IL-17活化上皮與嗜中性球促發炎（正確）；④IgG、IgM可活化補體（正確）。①「TH1只幫助細胞免疫、不幫B細胞製造抗體」是錯誤——TH1分泌IFN-γ可促使B細胞類別轉換為「調理與補體結合型抗體（如IgG2a）」，仍參與抗體生成（雖TH2更主導抗體與IgE）。故錯誤者為A。","options":{"A":"正確（為錯誤敘述）：TH1也能幫助B細胞製造（調理型）抗體。","B":"IgG經CD16使NK行ADCC，正確。","C":"TH17分泌IL-17促發炎，正確。","D":"IgG與IgM可活化補體，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-66":{"quick":"IgG可通過胎盤、由母體傳給胎兒；此敘述正確。","detail":{"background":"IgG特性：①「血清中含量最高」的抗體（非比IgM少，A錯）；②「活化補體能力強」（IgG、IgM可活化古典途徑，比不活化的IgA強，B錯）；③由「兩條重鏈與兩條輕鏈」組成（非一重二輕，C錯）；④「可通過胎盤」由母體傳胎兒提供被動免疫（D正確）。故正確敘述為D。","options":{"A":"IgG為血清含量最高的抗體，非較IgM少。","B":"IgG活化補體能力比IgA強（IgA不活化古典途徑）。","C":"IgG由兩重鏈兩輕鏈組成，非一重二輕。","D":"正確：IgG可通過胎盤傳給胎兒。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-36":{"quick":"專屬APC、呈現給CD4 T細胞的是HLA class II（即HLA-D區，如HLA-DR/DQ/DP）。","detail":{"background":"HLA（人類MHC）class I（HLA-A、B、C）表現於所有有核細胞、呈現內源性抗原給CD8 T；HLA class II（「HLA-D區：DR、DQ、DP」）「專屬於抗原呈現細胞（樹突、巨噬、B細胞）」、呈現外源性抗原給「CD4輔助T細胞」。故允許CD4 T辨識外來抗原、專屬APC者為HLA-D（class II）。","options":{"A":"HLA-A為class I（呈現給CD8）。","B":"HLA-B為class I。","C":"HLA-C為class I。","D":"正確：HLA-D（class II）專屬APC、呈現給CD4 T。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-65":{"quick":"辨識革蘭氏陰性菌脂多醣（LPS）的受體是Toll樣受體4（TLR4）。","detail":{"background":"Toll樣受體（TLR）為先天免疫的模式辨識受體，各辨識不同病原模式：「TLR4」辨識革蘭氏陰性菌的「脂多醣（LPS）」（與CD14、MD-2協同）；TLR3辨雙股RNA、TLR5辨鞭毛蛋白、TLR9辨細菌CpG DNA。LPS結合TLR4後活化NF-κB、釋放發炎細胞激素（過量致敗血性休克）。故辨識LPS者為TLR4。","options":{"A":"Fc受體辨識抗體Fc段，非LPS。","B":"T細胞受體辨識MHC-胜肽，非LPS。","C":"正確：TLR4辨識革蘭氏陰性菌LPS。","D":"抗體辨識特定抗原，非LPS模式辨識受體。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-66":{"quick":"與B7（CD80/86）結合後「抑制」T細胞活化者為CTLA-4（CD152）。","detail":{"background":"T細胞共刺激：「CD28」結合APC的B7（CD80/CD86）→「促進」活化（第二訊號）；活化後表現的「CTLA-4（CD152）」對B7親和力更高、競爭結合並傳遞「抑制」訊號→負向調節（免疫檢查點）。故與B7結合後抑制T細胞活化者為CTLA-4。","options":{"A":"CD28結合B7為促進活化。","B":"正確：CTLA-4（CD152）結合B7後抑制T細胞活化。","C":"CD4為輔助T共受體，非此功能。","D":"CD2為黏附分子。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-67":{"quick":"IL-5刺激嗜酸性球分泌媒介物、與氣喘相關。","detail":{"background":"「IL-5」是TH2細胞分泌的細胞激素，主要作用是「促進嗜酸性球（eosinophil）的增生、分化、活化與存活」，使其釋放媒介物，與「過敏性氣喘」與抗寄生蟲免疫相關（抗IL-5單株抗體mepolizumab用於嗜酸性氣喘）。故刺激嗜酸性球、引起氣喘者為IL-5。","options":{"A":"IL-1為促發炎、致熱原，非嗜酸性球專一。","B":"正確：IL-5刺激嗜酸性球、與氣喘相關。","C":"IL-15與NK/T記憶細胞相關。","D":"IL-12促TH1分化。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-68":{"quick":"A型血的人血中有「抗B抗體」。","detail":{"background":"ABO血型的「天然抗體」遵循Landsteiner法則——個體血清中含「對抗自身所無A/B抗原」的抗體：A型（紅血球有A抗原）血中含「抗B抗體」；B型含抗A；O型含抗A與抗B；AB型無抗A抗B。這些天然抗體為IgM、可活化補體致溶血。故A型血中抗體為抗B。","options":{"A":"A型不會有抗A抗體（會溶自身）。","B":"正確：A型血中含抗B抗體。","C":"A型血中有抗B抗體，非無抗體。","D":"同時抗A抗B為O型。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-67":{"quick":"毒殺性T細胞（CTL）屬「後天免疫」，非先天免疫細胞。","detail":{"background":"先天免疫細胞：自然殺手細胞（NK）、巨噬細胞、嗜中性球、肥大細胞、樹突細胞（兼橋接）等——無抗原專一性、反應快。「毒殺性T細胞（CD8 CTL）」具抗原專一性（辨識MHC I－特定抗原）、有記憶，屬「後天（適應性）免疫」。故不負擔先天免疫者為毒殺性T細胞。","options":{"A":"NK細胞為先天免疫細胞。","B":"巨噬細胞為先天免疫細胞。","C":"肥大細胞為先天免疫細胞。","D":"正確：毒殺性T細胞屬後天免疫，非先天。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-68":{"quick":"B細胞受體可直接結合抗原，但T細胞受體「不能直接」結合（須經MHC呈現）；故此敘述錯誤。","detail":{"background":"後天免疫：①T細胞完整活化需APC提供黏附分子、MHC＋抗原片段、協同刺激與細胞激素（A正確）；②巨噬、B細胞、樹突細胞皆可為APC（B正確）；④後天免疫細胞的初始活化在次級淋巴器官（D正確）。③「B細胞受體（膜結合抗體）可直接結合完整抗原」，但「T細胞受體『不能』直接結合游離抗原——必須辨識APC的MHC所呈現的抗原胜肽」。故「B與T細胞受體均可與抗原直接結合」為錯誤敘述（T細胞受體不能直接結合）。","options":{"A":"T細胞活化需多重訊號，正確。","B":"巨噬、B、樹突細胞皆可為APC，正確。","C":"正確（為錯誤敘述）：T細胞受體不能直接結合抗原，須經MHC呈現。","D":"初始活化在次級淋巴器官，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-67":{"quick":"抗體的抗原專一性由「重鏈與輕鏈共同形成的可變區（三度空間）」決定。","detail":{"background":"抗體（免疫球蛋白）的抗原結合部位由「重鏈可變區（VH）與輕鏈可變區（VL）共同構成」，其中的互補決定區（CDR，特別CDR3）形成的「三度空間構形」決定對抗原的專一性辨識。故由重鏈與輕鏈「共同」形成的三度空間決定，非單由重鏈或輕鏈、亦非僅靠彎曲彈性。","options":{"A":"非只由重鏈決定。","B":"非只由輕鏈決定。","C":"正確：由重鏈與輕鏈共同形成的三度空間決定專一性。","D":"非由結構彎曲彈性決定。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-68":{"quick":"IgM經「古典途徑（classical pathway）」活化補體，非替代途徑；故此敘述錯誤。","detail":{"background":"抗體敘述：②IgG可通過胎盤（正確）；③分泌型IgA以雙體在黏膜中和病原與毒素（正確）；④IgG半衰期約3週（最長，正確）。①「IgM」是與抗原結合後經「古典途徑（classical pathway）」活化補體（C1q結合IgM的Fc），「並非替代途徑（alternative pathway，由病原表面直接啟動、不需抗體）」。故「IgM透過alternative pathway活化補體」為錯誤敘述。","options":{"A":"正確（為錯誤敘述）：IgM經古典途徑活化補體，非替代途徑。","B":"IgG可通過胎盤，正確。","C":"分泌型IgA雙體在黏膜中和，正確。","D":"IgG半衰期約三週，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-68":{"quick":"MHC呈現抗原給T淋巴細胞、與T細胞活化有關；此敘述正確。","detail":{"background":"MHC敘述：①MHC class I由「T細胞（CD8）」辨識，非B細胞（A錯）；②每人MHC為「共顯性」表現雙親各一套單倍型、與單一親不會「完全相同」（B錯）；③「B細胞」結合MHC產生細胞激素的描述不正確——是「T細胞」辨識MHC-抗原後活化（C錯）；④「MHC呈現抗原與T淋巴細胞活化有關」（D正確）。故正確者為D。","options":{"A":"MHC I由CD8 T細胞辨識，非B細胞。","B":"每人MHC為雙親共顯性，與單一親不完全相同。","C":"是T細胞辨識MHC-抗原而活化，非B細胞結合MHC產激素。","D":"正確：MHC呈現抗原、與T細胞活化有關。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-73":{"quick":"TLR可表現於「細胞膜或胞內體（endosome）膜」上；此敘述正確。","detail":{"background":"Toll樣受體（TLR）分布：①不只樹突細胞表現——巨噬、上皮、B細胞等多種細胞皆表現（A錯）；②屬「組成性表現」、不需病原刺激才出現（B錯）；③位於「細胞膜表面（辨識細菌脂質、蛋白如LPS、鞭毛蛋白）」或「胞內體（endosome）膜（辨識病毒/細菌核酸如dsRNA、ssRNA、CpG DNA）」，「非細胞核」（C錯，D正確）。故正確者為D。","options":{"A":"多種細胞皆表現TLR，非只樹突細胞。","B":"TLR為組成性表現，不需病原刺激才出現。","C":"TLR位於細胞膜或胞內體膜，非細胞核。","D":"正確：TLR可表現於細胞膜或胞內體膜。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-74":{"quick":"對「細菌莢膜多醣」快速產生抗體屬「T細胞非依賴性」反應，不需T細胞參與。","detail":{"background":"B細胞反應分兩類：①「T細胞依賴性」——對蛋白質抗原，需Th輔助，能「類別轉換（IgM→IgG）」、產生「記憶」與「親和力成熟」、「續發加強反應」（A、C、D皆需T細胞）。②「T細胞非依賴性」——對「多醣類（如細菌莢膜多醣）」抗原，B細胞可「不需T細胞輔助」直接快速產生（主要IgM）抗體，但無類別轉換與記憶。故不需T細胞者為「對莢膜多醣快速產生抗體」。","options":{"A":"IgM轉IgG（類別轉換）需T細胞。","B":"正確：對莢膜多醣快速產抗體為T細胞非依賴性、不需T細胞。","C":"刺激B細胞增殖分化（蛋白抗原）需T細胞。","D":"續發加強抗體反應需T細胞。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-75":{"quick":"CD8 T細胞主要毒殺感染/腫瘤細胞；「分泌細胞激素幫助產生抗體」是CD4輔助T的功能，與CD8較無關。","detail":{"background":"CD8＋毒殺T細胞功能：清除「病毒感染細胞」、清除「腫瘤細胞」、誘發標的細胞「凋亡（穿孔素/顆粒酶、Fas/FasL）」。「分泌多種細胞激素幫助B細胞產生抗體」則是「CD4輔助T細胞（尤其濾泡輔助T，Tfh）」的功能，與CD8「較無關」。故與CD8作用較無關者為C。","options":{"A":"清除腫瘤細胞為CD8功能。","B":"清除病毒感染細胞為CD8功能。","C":"正確：幫助產生抗體為CD4功能，與CD8較無關。","D":"誘發標的細胞凋亡為CD8功能。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-69":{"quick":"症狀不明顯的布魯氏桿菌症常以「血清中專一性抗體反應」鑑定診斷。","detail":{"background":"布魯氏桿菌症（brucellosis）為人畜共通的胞內菌感染，臨床表現非特異（波狀熱、倦怠），且布魯氏桿菌「培養困難、生長慢、且有實驗室感染風險」。故對臨床症狀不明顯者，「常以血清學檢測『專一性抗體』效價（凝集試驗）」來輔助診斷（與滴度上升）。直接分離培養雖為確診但耗時且不易，傳統染色鏡檢不敏感。故常用血清抗體反應鑑定。","options":{"A":"分離培養雖確診但慢、難、有感染風險，非首選快速法。","B":"血中抗原檢測非常規。","C":"正確：以血清中專一性抗體反應鑑定。","D":"傳統染色鏡檢不敏感、非主要鑑定法。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-70":{"quick":"胸腺的功能是「剔除具自體反應性的T淋巴球」（建立中樞耐受）。","detail":{"background":"胸腺（thymus）是T細胞成熟場所，進行：①正向選擇（保留能適度辨識自體MHC者）；②「負向選擇——剔除（凋亡）對自體抗原反應過強的T細胞」，建立「中樞免疫耐受」、避免自體免疫。它不選B細胞、不主管巨噬或樹突細胞成熟。故胸腺功能為剔除自體反應性T細胞。","options":{"A":"選擇B細胞是骨髓的功能。","B":"非主要為產胸腺素活化巨噬。","C":"非主管樹突細胞成熟活化。","D":"正確：胸腺剔除有自體反應性的T淋巴球。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-73":{"quick":"活化後的樹突細胞主要作用是「處理抗原並呈現給T細胞」（啟動後天免疫）。","detail":{"background":"樹突細胞（DC）成熟前後功能轉變：「未成熟DC」在周邊組織主要「捕捉、吞噬抗原」並辨識病原；「活化（成熟）後DC」移行至淋巴結，「主要功能轉為處理抗原蛋白並以MHC呈現給T細胞」（高表現MHC與協同刺激分子B7），啟動初始T細胞、橋接先天與後天免疫。故活化後DC的主要免疫作用為處理並呈現抗原給T細胞。","options":{"A":"吞噬微生物為未成熟DC的作用。","B":"正確：活化後DC處理抗原並呈現給T細胞。","C":"辨識病原體為未成熟DC作用。","D":"活化補體非DC主要功能。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-74":{"quick":"感染時「最早活化」的補體途徑是「替代途徑（alternative pathway）」。","detail":{"background":"補體三條活化途徑：①「替代途徑（alternative pathway）」——由病原體表面（如細菌LPS、酵母聚醣）「直接」啟動，「不需抗體、最早（先天免疫早期）」即可活化；②凝集素途徑——由MBL結合病原甘露糖啟動；③古典途徑——需抗體-抗原免疫複合體（後天免疫產生抗體後）才啟動，較晚。故感染初期最早活化者為替代途徑。","options":{"A":"古典途徑需抗體、較晚活化。","B":"正確：替代途徑最早活化（不需抗體）。","C":"凝集素途徑由MBL啟動，非最早。","D":"抗原呈現非補體活化途徑。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-75":{"quick":"Treg（調節型CD4 T細胞）能抑制其他T細胞的活性；此敘述正確。","detail":{"background":"CD4 T細胞亞群與細胞激素：TH1主要分泌IFN-γ（非IL-4，A錯）；TH2主要分泌IL-4/5/13（非IFN-γ，B錯）；TH17分泌IL-17、主要強化「抗胞外菌與黴菌（嗜中性球）」而非「抗病毒」（C錯）；「Treg（調節型T細胞，CD4+CD25+FoxP3+）分泌IL-10、TGF-β，抑制其他T細胞活性、維持免疫耐受」（D正確）。故正確者為D。","options":{"A":"TH1主要分泌IFN-γ，非IL-4。","B":"TH2主要分泌IL-4，非IFN-γ。","C":"TH17主要抗胞外菌/黴菌，非強化抗病毒。","D":"正確：Treg能抑制其他T細胞活性。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-67":{"quick":"出生後立即切除胸腺，主要影響「（毒殺）T細胞的產生」。","detail":{"background":"胸腺是T細胞成熟場所。新生小鼠「立即切除胸腺（neonatal thymectomy）」會使「T淋巴球（含毒殺T與輔助T）無法成熟產生」，導致細胞媒介免疫嚴重缺損（與依賴T輔助的抗體反應受損）。補體、樹突細胞抗原呈現、巨噬細胞吞噬不直接依賴胸腺。故主要受影響者為毒殺T細胞的產生。","options":{"A":"補體作用不直接依賴胸腺。","B":"正確：切除胸腺影響（毒殺）T細胞的產生。","C":"樹突細胞抗原呈現不依賴胸腺成熟。","D":"巨噬細胞吞噬不依賴胸腺。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-70":{"quick":"平滑肌細胞「不具抗原呈現功能」；樹突、B細胞、巨噬細胞才是專業APC。","detail":{"background":"專業抗原呈現細胞（APC）：樹突細胞、巨噬細胞、B細胞——表現MHC II與協同刺激分子，能將抗原呈現給CD4 T細胞。「平滑肌細胞」屬一般體細胞（僅表現MHC I），「不具專業抗原呈現功能」。故通常不具APC功能者為平滑肌細胞。補充：專業抗原呈現細胞(APC)＝樹突細胞(最強、活化初始T細胞)、巨噬細胞、B細胞，表現MHC II與協同刺激分子(B7)呈現外源性抗原給CD4 T。「平滑肌細胞」屬一般體細胞、僅表現MHC I(呈現內源性抗原給CD8)、無協同刺激分子、不具專業APC功能。所有有核細胞皆有MHC I，但MHC II只在專業APC。","options":{"A":"樹突細胞為最強APC。","B":"B細胞為專業APC。","C":"正確：平滑肌細胞不具抗原呈現功能。","D":"巨噬細胞為專業APC。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"109030-N1-74":{"quick":"活化巨噬細胞使其產生iNOS、NO與ROS的最佳細胞激素是第二型干擾素（IFN-γ）。","detail":{"background":"「IFN-γ（第二型干擾素）」由TH1、NK與CD8 T分泌，是「活化巨噬細胞」最重要的細胞激素——使巨噬細胞表現「誘導型一氧化氮合成酶（iNOS）」產生NO、增加活性氧化物（ROS）與溶酶體酵素，大幅提升其殺胞內菌能力（IFN-γ缺陷者易患分枝桿菌、沙門氏菌等胞內菌感染）。第一型IFN（α/β）主抗病毒、TNF-α輔助但非最佳活化巨噬產NO者。故最佳因子為IFN-γ。","options":{"A":"第一型IFN主要抗病毒，非活化巨噬產NO最佳。","B":"正確：IFN-γ為活化巨噬產iNOS/NO/ROS最佳因子。","C":"第三型IFN主作用於上皮抗病毒。","D":"TNF-α輔助發炎，非活化巨噬產NO的最佳因子。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-68":{"quick":"製造特異性抗體的細胞是「B淋巴細胞（漿細胞）」。","detail":{"background":"專一性（特異性）抗體由「B淋巴細胞」在抗原刺激（多需Th輔助）後增殖分化為「漿細胞（plasma cell）」大量分泌。多形性白血球（嗜中性球）為吞噬、抗原呈現細胞與樹突細胞為呈現抗原，皆不製造抗體。故製造特異性抗體者為B淋巴細胞。補充：專一性抗體由B淋巴細胞經抗原刺激(蛋白抗原多需Th輔助、提供CD40L與細胞激素)後，增殖分化為「漿細胞」大量分泌；部分成為記憶B細胞。多形性白血球(吞噬)、樹突/巨噬(抗原呈現)皆不製造抗體。對莢膜多醣等T非依賴抗原，B細胞可不需T輔助直接快速產IgM(但無記憶與類別轉換)。","options":{"A":"多形性白血球為吞噬細胞，不製造抗體。","B":"正確：B淋巴細胞（漿細胞）製造特異性抗體。","C":"抗原呈現細胞呈現抗原，不製造抗體。","D":"樹突細胞呈現抗原，不製造抗體。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-66":{"quick":"惡性貧血是產生對抗「內在因子（intrinsic factor）」（與胃壁細胞）的自體抗體所致。","detail":{"background":"惡性貧血（pernicious anemia）是「自體免疫」疾病——產生對抗「內在因子（intrinsic factor）」與胃壁細胞的自體抗體，使內在因子無法與維生素B12結合、回腸無法吸收B12，導致B12缺乏的巨球性貧血與神經病變。故自體抗體對抗的是內在因子（B12吸收所需）。","options":{"A":"非對抗維生素C。","B":"正確：對抗內在因子（intrinsic factor）致B12吸收障礙。","C":"胰島素自體抗體見於部分糖尿病，非惡性貧血。","D":"非對抗血清素。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-75":{"quick":"MHC呈現抗原前，蛋白須先裂解成「短胜肽」才能被MHC呈現；此敘述正確。","detail":{"background":"MHC抗原呈現：①「MHC class I」呈現抗原給「CD8」T（非CD4，A錯）；②MHC class II「只表現於專業APC」、非所有有核細胞（所有有核細胞表現的是MHC I，B錯）；③「蛋白抗原必須先被裂解成短胜肽」才能裝載於MHC溝槽呈現（C正確）；④MHC class I呈現約「8–10個胺基酸」的短胜肽（非11–13，D錯）。故正確者為C。","options":{"A":"MHC I呈現給CD8 T（非CD4）。","B":"MHC II僅表現於專業APC，非所有有核細胞。","C":"正確：蛋白須裂解成短胜肽才能被MHC呈現。","D":"MHC I呈現約8–10個胺基酸胜肽，非11–13。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-67":{"quick":"出生後立即切除胸腺，主要影響「T淋巴細胞的成熟分化」。","detail":{"background":"胸腺是T細胞成熟分化的器官。新生即切除胸腺會使「T淋巴細胞無法成熟分化」，造成細胞媒介免疫缺損與依賴T輔助的抗體反應受損。補體、樹突細胞抗原呈現、B細胞產IgM（T非依賴性的部分）不直接依賴胸腺。故主要受影響者為T淋巴細胞的成熟分化。補充：胸腺是T細胞成熟分化的器官，新生即切除→T淋巴細胞無法成熟→細胞媒介免疫(毒殺T)與依賴Th輔助的抗體反應(類別轉換)受損；補體、吞噬、樹突細胞抗原呈現與T非依賴的IgM反應相對不受影響。臨床對應：DiGeorge症候群(胸腺發育不全)→反覆病毒/黴菌/胞內菌感染。","options":{"A":"補體作用不依賴胸腺。","B":"樹突細胞抗原呈現不依賴胸腺。","C":"正確：切除胸腺影響T淋巴細胞成熟分化。","D":"B細胞產IgM（T非依賴部分）不全依賴胸腺。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-70":{"quick":"源於卵黃囊、長期駐守組織的巨噬細胞如肝臟「庫氏細胞（Kupffer cell）」。","detail":{"background":"組織常駐巨噬細胞（tissue-resident macrophage）多源自「胚胎卵黃囊」、長期駐守特定組織並可自我更新，負責組織維護與修復、清除衰老細胞與病原——如肝臟的「庫氏細胞（Kupffer cell）」、腦的微膠細胞、肺的肺泡巨噬細胞、骨的蝕骨細胞。樹突細胞、肥大細胞、漿細胞非此類組織常駐巨噬細胞。故為庫氏細胞。","options":{"A":"正確：庫氏細胞為源於卵黃囊、肝臟常駐巨噬細胞。","B":"樹突細胞非此類組織常駐巨噬細胞。","C":"肥大細胞非組織常駐巨噬細胞。","D":"漿細胞為抗體分泌細胞，非組織常駐巨噬。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-73":{"quick":"土倫法蘭西斯桿菌「A型（A亞種）毒性比B型強」；此敘述正確。","detail":{"background":"土倫法蘭西斯桿菌（Francisella tularensis，兔熱病）：①為胞內菌，清除主要靠「細胞免疫（非抗體）」（A錯）；②「A型（tularensis亞種）毒性比B型（holarctica）強」（B正確）；③治療用「胺基醣苷（streptomycin/gentamicin）」或四環素，「β-lactam無效」（C錯）；④引起「兔熱病（tularemia）」，「戰壕熱」是巴東氏菌所致（D錯）。故正確者為B。","options":{"A":"清除胞內菌靠細胞免疫較重要，非抗體。","B":"正確：A型毒性比B型強。","C":"β-lactam對其無效，須用胺基醣苷/四環素。","D":"致兔熱病，戰壕熱為巴東氏菌。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-65":{"quick":"淋巴結濾泡（生發中心）聚集的B細胞會產生「抗體」。","detail":{"background":"淋巴結的「濾泡（follicle）」是B細胞區，受抗原與Tfh輔助刺激後形成「生發中心（germinal center）」，B細胞在此增殖、體細胞超突變（親和力成熟）、類別轉換，分化為漿細胞「產生抗體」與記憶B細胞。肝素由肥大細胞、穿孔素/顆粒酶由CTL/NK、纖維分解酶非淋巴球產物。故濾泡細胞產生的特殊蛋白為抗體。","options":{"A":"肝素由肥大細胞產生，非濾泡B細胞。","B":"正確：濾泡（生發中心）B細胞產生抗體。","C":"穿孔素/顆粒酶由CTL/NK產生。","D":"纖維（纖維素）分解酶非淋巴球產物。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-66":{"quick":"細胞激素「可誘發其他細胞激素的產生」（級聯網絡）；故「無法誘發其他細胞激素」錯誤。","detail":{"background":"細胞激素特性：①多效性（pleiotropy，一種作用多靶）；②協同作用（synergy）；③拮抗作用（antagonism）；④「級聯／誘導性」——「一種細胞激素可誘發其他細胞激素的產生」（形成網絡，如IL-1誘導IL-6）；⑤重疊性。故「無法誘發其他細胞激素的產生」與事實相反、為錯誤。","options":{"A":"具多效性，正確。","B":"具協同作用，正確。","C":"具拮抗作用，正確。","D":"正確（為錯誤敘述）：細胞激素可誘發其他細胞激素產生。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-43":{"quick":"內源性抗原在「蛋白酶體（proteasome）」被降解成短胜肽，經MHC class I呈現。","detail":{"background":"MHC class I呈現「內源性抗原（如病毒蛋白、自身/腫瘤蛋白）」的路徑：胞質中的內源性蛋白被「蛋白酶體（proteasome）」降解成短胜肽→經TAP運入內質網→裝載於MHC I→運至細胞表面呈現給「CD8」T細胞（毒殺胞內感染與腫瘤細胞）。吞噬與溶酶體降解是「外源性抗原→MHC II」路徑。故內源性路徑為蛋白酶體降解。","options":{"A":"吞噬獲得抗原為外源性（MHC II）路徑。","B":"溶酶體降解為外源性（MHC II）路徑。","C":"正確：內源性抗原在蛋白酶體降解、經MHC I呈現。","D":"MHC I路徑清除胞內（病毒/腫瘤），非胞外菌。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-50":{"quick":"ABO血型不合輸血所產生的天然血型抗體屬「IgM」。","detail":{"background":"ABO血型的天然抗體（如B型者的抗A、A型者的抗B）為「IgM」（五聚體），可有效活化補體造成血管內溶血——故ABO不合輸血引起急性溶血反應。（Rh抗體則為IgG、可過胎盤致新生兒溶血。）本題A血型輸給B血型者，受血者（B型，本有抗A）因A抗原刺激的天然血型抗體屬IgM。故為IgM。","options":{"A":"正確：ABO血型天然抗體屬IgM。","B":"IgG為Rh等免疫性抗體，非ABO天然抗體主型。","C":"IgA非血型抗體主型。","D":"IgE與過敏相關，非血型抗體。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-41":{"quick":"B細胞「可」呈現抗原給T細胞（為專業APC）；故「B細胞不能呈現抗原給T細胞」錯誤。","detail":{"background":"免疫敘述：①B細胞可分泌抗體（正確）；③T細胞辨識APC呈現的抗原即被活化（正確）；④T細胞（濾泡輔助T）幫助B細胞親和力成熟、產生較高親和力抗體（正確）。②「B細胞是專業抗原呈現細胞之一，可經由BCR攝取抗原、加工後以MHC II呈現給T細胞」，故「B細胞不能呈現抗原給T細胞」與事實相反、為錯誤。","options":{"A":"B細胞可分泌抗體，正確。","B":"正確（為錯誤敘述）：B細胞可呈現抗原給T細胞（為APC）。","C":"T細胞辨識APC呈現的抗原可被活化，正確。","D":"T細胞幫助B細胞產生較高親和力抗體，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-42":{"quick":"未受抗原刺激的初始T細胞主要由「樹突細胞」啟動第一步活化。","detail":{"background":"從胸腺成熟、「未曾受抗原刺激的初始（naïve）T細胞」，主要在淋巴結由「樹突細胞（DC）」啟動——只有DC能高表現MHC與協同刺激分子（B7），有效活化naïve T細胞（B細胞、巨噬細胞主要再活化已啟動的效應/記憶T，較難初始活化naïve T）。故啟動初始T細胞第一步者為樹突細胞。","options":{"A":"B細胞較難初始活化naïve T細胞。","B":"巨噬細胞較難初始活化naïve T。","C":"嗜中性球非抗原呈現細胞。","D":"正確：樹突細胞啟動初始T細胞的第一步活化。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-42":{"quick":"B細胞體細胞超突變（與類別轉換）主要由酵素「AID（活化誘導胞苷脫胺酶）」負責。","detail":{"background":"「活化誘導胞苷脫胺酶（AID, activation-induced cytidine deaminase）」是生發中心B細胞進行「體細胞超突變（提高抗體親和力）」與「類別轉換重組（改變Ig同型）」的關鍵酵素（將胞苷脫胺為尿苷引發突變/重組）。RAG1/RAG2負責V(D)J重組（受體生成）、TdT增加接合多樣性，皆非超突變酵素。故負責體細胞超突變者為AID。","options":{"A":"RAG1負責V(D)J重組，非超突變。","B":"RAG2負責V(D)J重組。","C":"TdT增加接合多樣性，非超突變。","D":"正確：AID負責體細胞超突變與類別轉換。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-43":{"quick":"血清中濃度最高的抗體是「IgG」（非IgE）；故「血清濃度最高是IgE」錯誤。","detail":{"background":"抗體敘述：①IgG為兩重鏈兩輕鏈、雙硫鍵連結（正確）；②分泌型IgA以雙體經上皮poly-Ig受體運至管腔（正確）；③IgG半衰期約3週（最長，正確）。④「血清中濃度最高的抗體是IgG」（約佔75–80%），「IgE在血清中濃度最低」（與過敏、抗寄生蟲相關）。故「血清中濃度最高的是IgE」為錯誤敘述（應為IgG）。","options":{"A":"IgG為兩重兩輕鏈雙硫鍵連結，正確。","B":"分泌型IgA經poly-Ig受體運至黏膜管腔，正確。","C":"IgG半衰期約三週，正確。","D":"正確（為錯誤敘述）：血清最高是IgG，IgE最低。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-41":{"quick":"內毒素主成分為「脂多醣（LPS）」，「非蛋白質」；故此敘述最不適當。","detail":{"background":"內毒素（endotoxin）：①主成分為革蘭氏陰性菌外膜的「脂多醣（LPS）」（其lipid A為毒性核心），「非蛋白質」（A最不適當）；②位於細胞壁/外膜、細菌裂解時釋出（B正確）；③刺激先天免疫、產生細胞激素（TNF、IL-1，C正確）；④可引起發燒與休克（D正確）。故最不適當（錯誤）者為A。","options":{"A":"正確（為錯誤敘述）：內毒素主成分為脂多醣，非蛋白質。","B":"位於細胞壁、裂解時釋出，正確。","C":"刺激先天免疫產生細胞激素，正確。","D":"可引起發燒與休克，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-42":{"quick":"對抗病菌後死亡的嗜中性球由「巨噬細胞」清除以維持組織恆定。","detail":{"background":"嗜中性球（neutrophil）在化膿吞噬殺菌後凋亡死亡，這些凋亡的嗜中性球（與細胞碎片）由「巨噬細胞」吞噬清除（efferocytosis），以消解發炎、維持組織恆定並促進修復。肥大細胞、樹突細胞、漿細胞無此清除功能。故清除死亡嗜中性球者為巨噬細胞。","options":{"A":"正確：巨噬細胞清除凋亡的嗜中性球。","B":"肥大細胞與過敏發炎相關，非清除細胞。","C":"樹突細胞為抗原呈現，非主要清除凋亡嗜中性球。","D":"漿細胞分泌抗體，無此清除功能。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-43":{"quick":"具抑制CD4與CD8 T細胞活性功能者為「調節型T細胞（Treg）」。","detail":{"background":"調節型T細胞（Treg，CD4+CD25+FoxP3+）分泌IL-10、TGF-β等抑制性細胞激素，「抑制其他CD4與CD8 T細胞的活性」、維持自體免疫耐受、避免過度免疫反應。TH1、TH2、Tfh皆為「促進/輔助」性效應T細胞，無抑制功能。故抑制T細胞活性者為Treg。","options":{"A":"TH1促細胞免疫，非抑制。","B":"TH2促體液/過敏免疫，非抑制。","C":"濾泡輔助T（Tfh）幫助B細胞，非抑制。","D":"正確：調節型T細胞（Treg）抑制CD4與CD8 T細胞活性。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113180-N1-43":{"quick":"MHC class II缺陷（裸淋巴球症候群）使「CD4 T細胞缺乏、易受感染」。","detail":{"background":"MHC class II先天缺陷（裸淋巴球症候群bare lymphocyte syndrome）——抗原呈現細胞無法表現MHC II，「CD4輔助T細胞在胸腺無法正向選擇成熟」，導致CD4 T細胞嚴重缺乏、體液與細胞免疫受損，「易反覆感染」（屬嚴重複合免疫缺乏類）。故易有的病變為「因T淋巴細胞缺乏而易受感染」。","options":{"A":"非典型致糖尿病。","B":"非典型致關節炎。","C":"正確：MHC II缺陷致CD4 T細胞缺乏、易受感染。","D":"非致高血壓。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-42":{"quick":"嗜中性白血球屬「先天免疫」細胞，非後天免疫；故此敘述錯誤。","detail":{"background":"嗜中性白血球（neutrophil）：①屬「先天免疫」細胞（非後天免疫，A錯）；②產生活性氧化物（呼吸爆發）殺菌（正確）；③有吞噬微生物能力（正確）；④可經「NETosis」特殊死亡方式釋放「中性球胞外捕網（NET）」捕捉並殺微生物（正確）。故錯誤者為A（嗜中性球屬先天免疫，非後天）。","options":{"A":"正確（為錯誤敘述）：嗜中性球屬先天免疫，非後天。","B":"產生氧化活性物殺菌，正確。","C":"有吞噬能力，正確。","D":"可釋放NET捕捉微生物，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114030-N1-43":{"quick":"T細胞最初發育（成熟）的器官是「胸腺（thymus）」。","detail":{"background":"T細胞的前驅由骨髓產生後，遷移至「胸腺（thymus）」進行最初的發育與成熟（正向、負向選擇）。淋巴結、脾臟為次級淋巴器官（成熟T細胞作用處）、肝臟非T細胞發育器官。故T細胞最初發育器官為胸腺。補充：T細胞前驅來自骨髓，於「胸腺」成熟——正向選擇(保留能適度辨識自體MHC者)、負向選擇(剔除強烈反應自體抗原者→中樞耐受)，分化為CD4/CD8。記憶：初級(中樞)淋巴器官＝骨髓(B成熟)+胸腺(T成熟)；次級(周邊)＝淋巴結、脾、扁桃腺、MALT(成熟淋巴球作用處)。DiGeorge症候群＝胸腺發育不全→T細胞缺乏。","options":{"A":"淋巴結為次級淋巴器官。","B":"脾臟為次級淋巴器官。","C":"正確：胸腺為T細胞最初發育（成熟）的器官。","D":"肝臟非T細胞發育器官。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-42":{"quick":"五大類免疫球蛋白為「IgA、IgD、IgE、IgG、IgM」。","detail":{"background":"免疫球蛋白依重鏈恆定區分為五大類（同型）：IgG、IgM、IgA、IgE、IgD（口訣GMADE）。「IgK」並非一類抗體（κ是輕鏈的一種類型kappa，非重鏈分類）。故正確的五大類為IgA、IgD、IgE、IgG、IgM。補充：五類免疫球蛋白(同型isotype)依「重鏈」恆定區分＝IgG、IgM、IgA、IgE、IgD(口訣GMADE)。「κ/λ(kappa/lambda)」是「輕鏈」的兩種類型，非重鏈分類，故無「IgK」這一類。各類功能：IgG過胎盤/最多、IgM初次反應/五聚體、IgA黏膜雙體、IgE過敏、IgD B細胞表面受體。","options":{"A":"含「IgK」錯誤（無此類）。","B":"正確：IgA、IgD、IgE、IgG、IgM為五大類。","C":"含「IgK」錯誤。","D":"含「IgK」錯誤。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-43":{"quick":"TH1以「CD40L-CD40」與「IFN-γ」兩訊號進一步活化巨噬細胞。","detail":{"background":"效應TH1細胞進一步活化巨噬細胞（使其增強殺胞內菌）需兩訊號：①「CD40L（T細胞）-CD40（巨噬細胞）」接觸訊號；②分泌「IFN-γ」（最強的巨噬細胞活化因子）。兩者協同使巨噬細胞表現iNOS、產NO/ROS、增吞噬殺菌。PD1-PDL1與IL-10為抑制訊號、CD28-B7為T細胞自身共刺激。故為CD40L-CD40與IFN-γ。","options":{"A":"PD1-PDL1為抑制訊號，非活化巨噬。","B":"正確：CD40L-CD40與IFN-γ進一步活化巨噬細胞。","C":"IL-10為抑制性，非活化巨噬。","D":"TCR-MHC/IL-2為T細胞自身活化，非活化巨噬之兩訊號。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-42":{"quick":"常以「雙聚體（dimer）」分泌的抗體是IgA（分泌型）。","detail":{"background":"分泌型IgA（sIgA）以「雙體（dimer，兩個IgA單體由J鏈連接＋分泌片）」形式分泌至黏膜表面與外分泌液（唾液、淚液、初乳），中和病原與毒素。IgM為五聚體（pentamer）、IgG與IgE為單體。故常以雙聚體分泌者為IgA。補充：分泌型IgA(sIgA)為「雙體(dimer，兩單體經J鏈連接)＋分泌片」，分泌片由黏膜上皮的poly-Ig受體裂解而來、保護IgA免於蛋白酶。功能＝黏膜中和病原與毒素、免疫排除。對照其他Ig聚合：IgM為「五聚體(pentamer，含J鏈)」、IgG/IgE/IgD為單體。血清中IgA多為單體、黏膜分泌型才為雙體。","options":{"A":"正確：分泌型IgA以雙聚體分泌。","B":"IgG為單體。","C":"IgM為五聚體（非雙體）。","D":"IgE為單體。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-43":{"quick":"面對胞外細菌、強化嗜中性球趨化反應貢獻較大者為TH17細胞。","detail":{"background":"效應CD4 T亞群對抗不同病原：TH1（IFN-γ）抗胞內菌；TH2（IL-4/5/13）抗寄生蟲與過敏；「TH17（IL-17、IL-22）強化『嗜中性球的招募與趨化』、活化上皮，對抗『胞外細菌與黴菌』」貢獻大；Treg為抑制性。故面對胞外細菌、強化嗜中性球趨化者為TH17。","options":{"A":"TH1主抗胞內菌（IFN-γ）。","B":"TH2主抗寄生蟲與過敏。","C":"正確：TH17強化嗜中性球趨化、抗胞外菌。","D":"Treg為抑制性，非強化趨化。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-45":{"quick":"白喉毒素「抑制蛋白質生成」（使eEF-2失活）；此敘述正確。","detail":{"background":"細菌毒素機制：①霍亂毒素活化腺苷酸環化酶、cAMP上升致大量水瀉（非穿孔，A錯）；②百日咳毒素抑制Gi、影響cAMP（非「活化T細胞」，B錯）；③「白喉毒素使延長因子eEF-2（EF-2）ADP核醣化失活、抑制蛋白質合成」（C正確）；④炭疽毒素（水腫因子/致死因子）非「抑制肌肉放鬆」（D錯，破傷風才致肌肉痙攣）。故正確者為C。","options":{"A":"霍亂毒素致cAMP上升水瀉，非穿孔死亡。","B":"百日咳毒素影響G蛋白訊息，非活化T細胞。","C":"正確：白喉毒素抑制蛋白質生成（eEF-2失活）。","D":"炭疽毒素非抑制肌肉放鬆。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-42":{"quick":"具吞噬能力、作為抗菌第一道防線的是「巨噬細胞（macrophage）」。","detail":{"background":"當病原菌入侵組織，「組織常駐巨噬細胞（macrophage）」是先天免疫「第一道（細胞性）防線」——立即吞噬病原、釋放細胞激素召募嗜中性球、並作為抗原呈現細胞橋接後天免疫。肥大細胞司過敏發炎、漿細胞分泌抗體、NK毒殺異常細胞，皆非主要吞噬第一線。故第一道吞噬防線為巨噬細胞。","options":{"A":"肥大細胞與過敏發炎相關，非主要吞噬第一線。","B":"正確：巨噬細胞為具吞噬能力的抗菌第一道防線。","C":"漿細胞分泌抗體，無吞噬能力。","D":"NK細胞毒殺異常細胞，非主要吞噬細胞。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"115030-N1-43":{"quick":"主要表現MHC class II、將抗原呈現給T細胞的是「樹突細胞」。","detail":{"background":"「樹突細胞（dendritic cell）」是「最主要、最有效」表現MHC class II與協同刺激分子的專業抗原呈現細胞，能將外源性抗原呈現給CD4 T細胞、活化初始T細胞，啟動後天免疫。紅血球（無核、不表現MHC）、嗜中性球（非主要APC）、肝細胞（一般體細胞、僅MHC I）皆非主要MHC II抗原呈現細胞。故為樹突細胞。","options":{"A":"紅血球無核、不表現MHC。","B":"正確：樹突細胞主要表現MHC II、呈現抗原給T細胞。","C":"嗜中性球非主要抗原呈現細胞。","D":"肝細胞為一般體細胞（僅MHC I），非主要MHC II APC。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"101110-N1-67":{"quick":"遺傳性血管性水腫因缺乏「C1抑制酶（C1 inhibitor）」所致。","detail":{"background":"遺傳性血管性水腫（hereditary angioedema, HAE）由「C1抑制酶（C1 esterase inhibitor, C1-INH）」缺乏或功能不足引起——C1-INH調控補體與接觸（緩激肽）系統，缺乏時「緩激肽（bradykinin）過度產生」使血管通透增加，造成反覆性、無蕁麻疹的皮下與黏膜水腫（喉頭水腫可致命）。此非IgE媒介的過敏（抗組織胺與類固醇無效）。故缺乏者為C1抑制酶。","options":{"A":"非缺乏C1本身。","B":"正確：缺乏C1抑制酶（C1-INH）致遺傳性血管性水腫。","C":"非缺乏C3。","D":"無「C3抑制酶」之對應致病。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-68":{"quick":"重症肌無力由「抗乙醯膽鹼受體抗體」引起（第二型過敏／自體免疫）。","detail":{"background":"重症肌無力（myasthenia gravis）是自體免疫疾病——產生「抗乙醯膽鹼受體（AChR）的自體抗體」，阻斷並破壞神經肌肉接合處的AChR，使神經肌肉傳導受損，造成「易疲勞性肌肉無力」（眼瞼下垂、複視、吞嚥困難，活動後加重）。屬第二型過敏反應（抗體對抗細胞表面受體）。故致病抗體為抗AChR抗體。","options":{"A":"抗DNA抗體見於SLE。","B":"抗RNA抗體非重症肌無力。","C":"正確：抗乙醯膽鹼受體抗體致重症肌無力。","D":"抗RNP抗體見於混合結締組織病。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-69":{"quick":"食物過敏（速發型全身反應）由「IgE」抗體媒介（第一型過敏）。","detail":{"background":"對魚、海鮮等食物過敏者，再次接觸過敏原時，與肥大細胞/嗜鹼性球表面「IgE」交聯，使其脫顆粒釋放組織胺等介質，造成「速發型（第一型）過敏反應」——全身紅斑（蕁麻疹）、血管性水腫、氣管收縮（支氣管痙攣）、嚴重時過敏性休克。故媒介此速發反應的抗體為IgE。","options":{"A":"IgA為黏膜抗體，非速發過敏媒介。","B":"IgD非過敏媒介。","C":"正確：IgE媒介速發型食物過敏反應。","D":"IgG非第一型速發過敏的主要媒介。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102030-N1-71":{"quick":"Fas或FasL缺乏使淋巴細胞「不易凋亡」（自體免疫淋巴增生症候群）。","detail":{"background":"Fas（CD95）與其配體FasL是誘導細胞「凋亡（apoptosis）」的重要途徑——活化的淋巴細胞經Fas-FasL作用而凋亡，以終止免疫反應、清除自體反應性淋巴球（周邊耐受）。「Fas或FasL缺乏」時，淋巴細胞「較不易凋亡」、過度累積，造成「自體免疫淋巴增生症候群（ALPS）」——淋巴結與脾腫大、自體免疫。故Fas/FasL缺乏導致淋巴細胞不易凋亡。","options":{"A":"非致MHC I表現缺失。","B":"非致B細胞只產IgM（那是CD40L缺乏的高IgM症候群）。","C":"正確：Fas/FasL缺乏使淋巴細胞不易凋亡。","D":"非致無法產生Th1反應。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"102110-N1-69":{"quick":"免疫複合體沉積、活化補體所致者為「第三型過敏反應」。","detail":{"background":"過敏（過度敏感）反應分四型：第一型（IgE媒介速發型，過敏性休克、氣喘）；第二型（抗體對抗細胞表面抗原，溶血、ABO不合）；「第三型——『免疫複合體（抗原-抗體複合體）沉積』於組織血管壁、活化補體、招募嗜中性球致發炎」（血清病、SLE腎炎、Arthus反應）；第四型（細胞媒介遲發型，結核菌素、接觸性皮膚炎）。故免疫複合體沉積活化補體者為第三型。","options":{"A":"第一型為IgE媒介速發型。","B":"第二型為抗體對抗細胞表面抗原。","C":"正確：免疫複合體沉積活化補體為第三型。","D":"第四型為細胞媒介遲發型。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"103030-N1-34":{"quick":"過敏性氣喘由「IgE」抗體媒介（第一型過敏）。","detail":{"background":"過敏性（外因性）氣喘屬第一型過敏反應：過敏原使呼吸道肥大細胞表面的「IgE」交聯、脫顆粒釋放組織胺、白三烯等，造成支氣管平滑肌收縮、黏液分泌與發炎，引起喘鳴與呼吸困難。故媒介過敏性氣喘的抗體為IgE。補充：過敏性氣喘屬第一型(IgE媒介)過敏，分早期相(組織胺致支氣管痙攣)與晚期相(嗜酸性球、白三烯致持續發炎與氣道高反應)。治療：緩解用短效β2作用劑(SABA)、控制用吸入型類固醇(ICS)±長效β2(LABA)、白三烯受體拮抗劑(montelukast)、嚴重者抗IgE(omalizumab)/抗IL-5。誘發因子＝塵蟎、花粉、冷空氣、運動。","options":{"A":"正確：IgE媒介過敏性氣喘。","B":"IgM非過敏氣喘媒介。","C":"IgD非過敏媒介。","D":"IgA為黏膜抗體，非過敏氣喘媒介。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"103100-N1-68":{"quick":"含鎳錶帶引起的接觸性皮膚炎屬「第四型（遲發型細胞媒介）過敏反應」。","detail":{"background":"對鎳（金屬）、橡膠、毒藤等的「接觸性皮膚炎」是「第四型（遲發型）過敏反應」——由「致敏的T細胞（非抗體）」媒介：再接觸後T細胞釋放細胞激素、活化巨噬細胞，於接觸後24–72小時出現紅疹、水疱（遲發）。故含鎳錶帶過敏為第四型。補充：接觸性皮膚炎(鎳、橡膠、毒藤、染髮劑、藥膏)屬「第四型(遲發型、細胞媒介)」過敏——半抗原(hapten)與皮膚蛋白結合致敏T細胞，再接觸後T細胞釋放細胞激素、活化巨噬細胞，於「24–72小時」出現紅疹水疱(故稱遲發)。「無抗體參與」。同型機制：結核菌素試驗、移植排斥。診斷＝貼膚試驗(patch test)。","options":{"A":"第一型為IgE速發型，非接觸性皮膚炎。","B":"第二型為抗細胞抗體。","C":"第三型為免疫複合體。","D":"正確：含鎳接觸性皮膚炎為第四型（遲發細胞媒介）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104030-N1-71":{"quick":"補體蛋白「基因缺陷」屬「先天（原發）」免疫缺陷，非後天因素。","detail":{"background":"後天（續發）性免疫缺陷的原因：營養不良、HIV感染（破壞CD4）、藥物（類固醇、化療、免疫抑制劑）、惡性腫瘤、放射線等。「各類補體蛋白的基因缺陷」屬「先天（原發、遺傳）性」免疫缺陷（如C1-INH缺乏、終末補體缺乏致反覆奈瑟菌感染），「非後天因素」。故非後天性者為補體蛋白基因缺陷。","options":{"A":"營養不良為後天因素。","B":"HIV感染為後天因素。","C":"類固醇藥物為後天因素。","D":"正確：補體蛋白基因缺陷為先天（非後天）因素。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-68":{"quick":"塵蟎引起的是「第一型（IgE）過敏」，非第四型；故塵蟎非引起第四型者。","detail":{"background":"第四型（遲發型細胞媒介）過敏由致敏T細胞引起，常見過敏原為「接觸性」小分子半抗原——鎳、橡膠（乳膠/橡膠促進劑）、毒藤（poison ivy）、化妝品、藥物等接觸性皮膚炎。「塵蟎（mite）」是吸入性過敏原，引起的是「第一型（IgE媒介）」過敏（過敏性鼻炎、氣喘），「非第四型」。故非引起第四型者為塵蟎。","options":{"A":"鎳引起第四型接觸性過敏。","B":"正確：塵蟎引起第一型（IgE）過敏，非第四型。","C":"橡膠引起第四型接觸性過敏。","D":"毒藤引起第四型接觸性皮膚炎。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"104100-N1-73":{"quick":"肺炎鏈球菌「已有疫苗」（PCV13、PPSV23）；故「疫苗尚未發展成功」錯誤。","detail":{"background":"肺炎鏈球菌（S. pneumoniae）：①可寄生健康成人上呼吸道（A正確）；②主要毒力因子為「多醣莢膜」（抗吞噬，B正確）；③「已有有效疫苗」——結合型（PCV13/15/20）與多醣型（PPSV23），故「疫苗尚未發展成功」為錯誤（C錯）；④對penicillin的抗藥性與「青黴素結合蛋白（PBP）改變」有關（D正確）。故錯誤者為C。","options":{"A":"健康成人上呼吸道可帶菌，正確。","B":"主要毒力因子為多醣莢膜，正確。","C":"正確（為錯誤敘述）：肺炎鏈球菌已有疫苗。","D":"penicillin抗藥與PBP改變有關，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-71":{"quick":"全身性紅斑狼瘡（SLE）為「非器官特異性（全身性）」自體免疫疾病。","detail":{"background":"自體免疫疾病分：①「器官特異性」——自體抗體針對特定器官（重症肌無力對AChR、橋本氏甲狀腺炎對甲狀腺、第一型糖尿病對胰島β細胞）；②「非器官特異性（全身性）」——自體抗體針對廣泛分布的自體抗原（如核抗原），侵犯多器官，典型為「全身性紅斑狼瘡（SLE，抗核抗體、抗dsDNA）」。故非器官特異性者為SLE。","options":{"A":"正確：SLE為非器官特異性（全身性）自體免疫疾病。","B":"重症肌無力為器官特異性（對AChR）。","C":"橋本氏甲狀腺炎為器官特異性。","D":"第一型糖尿病為器官特異性（對胰島β細胞）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-72":{"quick":"白喉已有「類毒素（toxoid）疫苗」（DPT中的D）可預防。","detail":{"background":"類毒素（toxoid）疫苗是以「去毒性但保留抗原性的外毒素」製成，誘導抗毒素抗體——「白喉（白喉類毒素）」與「破傷風（破傷風類毒素）」即經典類毒素疫苗（含於DPT/Tdap）。肺炎雙球菌與流腦疫苗為「莢膜多醣（或結合型）」疫苗、李斯特菌無疫苗。故有類毒素疫苗者為白喉。","options":{"A":"肺炎雙球菌疫苗為多醣/結合型，非類毒素。","B":"流腦疫苗為莢膜多醣/結合型，非類毒素。","C":"正確：白喉有類毒素疫苗（DPT）。","D":"李斯特菌症無疫苗。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105030-N1-74":{"quick":"肺炎黴漿菌「無有效疫苗」，控制非以疫苗為最佳；故此敘述錯誤。","detail":{"background":"肺炎黴漿菌（Mycoplasma pneumoniae）：①為細菌、以二分裂繁殖（A正確）；②無細胞壁、細胞膜「含固醇（sterol）」（B正確）；③在培養基上菌落呈「荷包蛋（fried-egg）狀」（C正確）；④「目前無有效疫苗」，控制以「抗生素治療（巨環類、四環素）」為主，「非以疫苗為最佳」（D錯）。故錯誤者為D。","options":{"A":"為細菌、二分裂繁殖，正確。","B":"細胞膜含固醇，正確。","C":"菌落呈荷包蛋狀，正確。","D":"正確（為錯誤敘述）：黴漿菌無有效疫苗，非以疫苗控制為最佳。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-35":{"quick":"結核病屬「細胞媒介（第四型遲發型）」過敏免疫反應。","detail":{"background":"細胞媒介（第四型遲發型）過敏由「致敏T細胞與巨噬細胞」媒介，典型為「結核病（與結核菌素皮膚試驗）」、接觸性皮膚炎、移植排斥——皆無抗體參與、反應遲發（24–72小時）。花粉熱（第一型IgE）、古德巴斯德症候群（第二型抗基底膜抗體）、血清病（第三型免疫複合體）皆為「抗體媒介」。故屬細胞媒介者為結核病。","options":{"A":"花粉熱為第一型（IgE）抗體媒介。","B":"古德巴斯德症候群為第二型抗體媒介。","C":"血清病為第三型免疫複合體（抗體）媒介。","D":"正確：結核病為細胞媒介（第四型）反應。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-68":{"quick":"「混合佐劑（adjuvant）」的抗原疫苗可最有效快速誘發抗體。","detail":{"background":"佐劑（adjuvant，如鋁鹽）能增強疫苗的免疫原性——延長抗原在注射處的釋放、活化先天免疫與APC、促進抗體量與持久性。故「混合佐劑的抗原疫苗」比單純低/高濃度或高純度蛋白抗原更能有效、快速地誘發抗體反應（高純度蛋白反而免疫原性常較弱、需佐劑）。故最有效快速誘發抗體者為混合佐劑的抗原疫苗。","options":{"A":"低濃度抗原免疫反應弱。","B":"單純高濃度抗原未必持久、不如加佐劑。","C":"正確：混合佐劑的抗原疫苗最有效快速誘發抗體。","D":"高純度蛋白免疫原性常較弱、需佐劑。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"105090-N1-70":{"quick":"自體免疫糖尿病（第一型）「與T細胞有關」（T細胞媒介破壞β細胞）；故「與T細胞無關」錯誤。","detail":{"background":"自體免疫成因：①SLE因清除凋亡細胞缺陷、核成分暴露誘發抗核抗體（正確）；②分子相似（molecular mimicry）使抗微生物抗體攻擊自體（正確，如風濕熱）；③葛瑞夫茲症的自體抗體刺激TSH受體致甲狀腺活化增生（正確）。④「自體免疫（第一型）糖尿病」是「T細胞（細胞媒介，CD8 T與巨噬）破壞胰島β細胞」為主（自體抗體為標記但破壞主要靠T細胞），「並非與T細胞無關」。故錯誤者為D。","options":{"A":"SLE因凋亡清除缺陷致抗核抗體，正確。","B":"分子相似致抗體攻擊自體，正確。","C":"葛瑞夫茲症自體抗體刺激TSH受體，正確。","D":"正確（為錯誤敘述）：自體免疫糖尿病由T細胞媒介破壞β細胞，與T細胞有關。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-65":{"quick":"多次疫苗注射後（二次反應）「誘發的免疫反應較快」（記憶反應）。","detail":{"background":"多次（追加）疫苗注射利用「免疫記憶」——記憶B/T細胞使再次反應「更快、量更大、抗體親和力更高、以IgG為主」（類別轉換與親和力成熟）。故正確敘述為「誘發的免疫反應比較快」。補充：此即疫苗「追加（boost）」與二次免疫反應原理——初次反應潛伏期長、以IgM為主、量少；二次反應因記憶B/T細胞而「潛伏期短、量大、IgG為主、親和力高（親和力成熟）」。臨床應用：破傷風類毒素每10年追加；B肝疫苗三劑(0-1-6月)即利用此記憶強化。出題陷阱：二次反應抗體「親和力變高、非變低」、「濃度升高、非降低」。","options":{"A":"多次注射後以IgG為主，非IgM。","B":"正確：多次注射後免疫反應較快（記憶反應）。","C":"抗體親和力變高，非變低。","D":"抗體濃度升高，非低。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106030-N1-69":{"quick":"腎臟移植的「超急性排斥」主要由「ABO血型（與既存抗HLA抗體）」不合引起。","detail":{"background":"超急性排斥（hyperacute rejection）發生在移植後數分鐘至數小時，由受贈者「既存（preformed）的抗體」——主要對抗「ABO血型抗原」或既存的抗供者HLA抗體——立即結合移植器官血管內皮、活化補體，造成血栓與梗塞。故超急性排斥主要由ABO血型（與既存抗體）不合引起。（急性排斥主由T細胞對HLA反應、慢性排斥為多因素。）","options":{"A":"正確：ABO血型不合（既存抗體）致超急性排斥。","B":"RhD系統主要與輸血/新生兒溶血相關，非移植超急性排斥主因。","C":"Kell系統非移植超急性排斥主因。","D":"MN系統非移植超急性排斥主因。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106110-N1-75":{"quick":"B型肝炎可用疫苗（與免疫球蛋白）有效預防嬰兒被母親垂直感染。","detail":{"background":"B型肝炎（HBV）可經「母嬰垂直（周產期）」傳染，是慢性帶原的主要來源。預防策略：新生兒「出生後24小時內接種B肝疫苗（主動免疫）」，若母為高傳染性（HBeAg陽性/高病毒量）者再加「B肝免疫球蛋白HBIG（被動免疫）」，可有效阻斷母嬰垂直感染。故能以疫苗有效預防嬰兒被母親感染者為B型肝炎。","options":{"A":"A型為糞口傳播，非母嬰垂直主要對象。","B":"正確：B型肝炎可用疫苗預防母嬰垂直感染。","C":"C型目前無疫苗。","D":"D型隨B型，預防B肝即可間接預防。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"106111-N1-69":{"quick":"血清病（serum sickness）由「免疫複合體」引起、屬「第三型」過敏，非第二型。","detail":{"background":"第二型過敏（抗體對抗細胞表面/基質抗原、致細胞破壞）的例子：Rh不合新生兒溶血（母IgG過胎盤破壞胎兒紅血球，A）、ABO不合溶血性輸血反應（B）、藥物引發自體免疫溶血性貧血（C）。「巨量免疫複合體沉積引發血清病（serum sickness）」屬「第三型」過敏反應（免疫複合體），「非第二型」。故非第二型者為D（血清病）。","options":{"A":"Rh不合新生兒溶血為第二型。","B":"ABO不合溶血性輸血反應為第二型。","C":"藥物引發自體免疫溶血為第二型。","D":"正確：血清病為第三型（免疫複合體），非第二型。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-69":{"quick":"古德帕斯丘症候群（Goodpasture）屬「第二型」（抗基底膜抗體），非第三型。","detail":{"background":"第三型過敏（免疫複合體沉積）疾病：血清病（A）、Arthus反應（B，局部免疫複合體）、SLE腎絲球腎炎（D，免疫複合體沉積腎絲球）。「古德帕斯丘症候群（Goodpasture’s syndrome，肺出血-腎炎）」是「第二型」過敏——「抗腎絲球與肺泡基底膜（第四型膠原蛋白）的IgG自體抗體」直接結合基底膜並活化補體，「非免疫複合體沉積（第三型）」。故不屬第三型者為C（Goodpasture）。","options":{"A":"血清病為第三型。","B":"Arthus反應為第三型（局部免疫複合體）。","C":"正確：Goodpasture為第二型（抗基底膜抗體），非第三型。","D":"SLE腎絲球腎炎為第三型（免疫複合體）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"107030-N1-74":{"quick":"回歸熱反覆發燒因疏螺旋體能在宿主體內進行「抗原變異」逃避免疫、再度致病。","detail":{"background":"回歸熱疏螺旋體（Borrelia recurrentis）特性是其表面抗原（變異主要蛋白VMP）能「週期性抗原變異（antigenic variation）」——當宿主對某抗原型產生抗體控制感染（退燒）後，少數已變異成新抗原型的螺旋體再增殖、逃避既有抗體，造成「再度發燒」，如此反覆（回歸熱）。故反覆發燒的主因是抗原變異。","options":{"A":"非宿主自體免疫反應。","B":"正確：此菌能進行抗原變異、逃避免疫再致病。","C":"非間歇釋放外毒素。","D":"非間歇抑制宿主免疫。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-66":{"quick":"單一抗體具「專一性（specificity）」，只結合一個或少數特定抗原（決定位）。","detail":{"background":"抗體（免疫球蛋白）功能與特性：①由「B細胞（漿細胞）」製造，不「直接殺死細胞」（A錯）；②感冒疫苗藉抗體「中和病毒」預防感染，非「抑制過敏」（B錯）；③「單一抗體具高度專一性，只結合一個或少數特定抗原決定位（epitope）」（C正確）；④體內抗體多樣性靠基因重組，「總數與染色體多寡無關」（D錯）。故正確者為C。","options":{"A":"抗體由B細胞製造，不直接殺細胞。","B":"疫苗抗體用於中和病原，非抑制過敏。","C":"正確：單一抗體有專一性，只結合一個或少數抗原。","D":"抗體多樣性靠基因重組，非染色體數目。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-69":{"quick":"FcεRI（IgE高親和力受體）「不表現於T細胞」；表現於肥大細胞、嗜鹼性球、活化嗜酸性球。","detail":{"background":"IgE的「高親和力受體FcεRI」表現於「肥大細胞、嗜鹼性球」（與活化的嗜酸性球、部分樹突細胞）表面——IgE結合FcεRI後，再遇過敏原交聯即誘發脫顆粒（第一型過敏）。「T細胞」不表現FcεRI。故不表現FcεRI者為T細胞。補充：IgE高親和力受體「FcεRI」表現於肥大細胞、嗜鹼性球(與活化嗜酸性球、部分樹突細胞)，是第一型過敏的核心——IgE結合FcεRI後再遇過敏原交聯即脫顆粒。「T細胞不表現FcεRI」。低親和力受體FcεRII(CD23)則在B細胞等。臨床：抗IgE單株抗體(omalizumab)阻斷IgE結合FcεRI，治嚴重過敏氣喘。","options":{"A":"肥大細胞表現FcεRI。","B":"嗜鹼性球表現FcεRI。","C":"正確：T細胞不表現FcεRI。","D":"活化的嗜酸性球可表現FcεRI。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"107110-N1-72":{"quick":"淋病「目前無有效疫苗」可預防；故「透過疫苗已可有效預防」錯誤。","detail":{"background":"淋病雙球菌（Neisseria gonorrhoeae）：①主要造成生殖泌尿道感染（A正確）；②「目前無有效疫苗」——因其表面抗原（菌毛pilin、Opa）「高度抗原變異」，難以製成有效疫苗（B錯）；③為革蘭氏陰性菌、有內毒素（LPS/LOS）可致發炎發燒（C正確）；④播散性淋菌感染可致皮疹與關節炎（D正確）。故錯誤者為B。","options":{"A":"主要致生殖泌尿道感染，正確。","B":"正確（為錯誤敘述）：淋病目前無有效疫苗。","C":"為G−菌、有內毒素可致發燒，正確。","D":"可致皮疹及關節炎（播散性），正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108020-N1-66":{"quick":"葛瑞夫茲症（Graves）的自體抗體「模擬TSH刺激受體致甲狀腺活化增生」（非破壞細胞）。","detail":{"background":"葛瑞夫茲症（Graves’ disease）是自體免疫甲狀腺亢進——自體抗體（TSI，甲狀腺刺激免疫球蛋白）「模擬TSH、結合並『刺激』甲狀腺上皮的TSH受體」，使甲狀腺「活化、增生並過度分泌甲狀腺素」（而非破壞細胞），屬第二型過敏中「受體刺激型」。其他選項：SLE為免疫複合體、重症肌無力為受體阻斷/破壞、類風濕為複合體與發炎。故抗體刺激受體致活化增生者為葛瑞夫茲症。","options":{"A":"SLE為免疫複合體致多器官損傷。","B":"重症肌無力抗體阻斷/破壞AChR（細胞功能受損）。","C":"正確：葛瑞夫茲症抗體刺激TSH受體致甲狀腺活化增生。","D":"類風濕關節炎為免疫複合體與慢性發炎。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-66":{"quick":"第一型過敏中肥大細胞釋放的介質造成「氣管收縮、血管擴張」（非氣管擴張、血管收縮）；故此敘述錯誤。","detail":{"background":"第一型（IgE速發型）過敏：肥大細胞受過敏原刺激脫顆粒，釋放組織胺、前列腺素、白三烯等，造成「支氣管平滑肌『收縮』（氣喘）、血管『擴張』與通透增加（水腫、低血壓）」。故A敘述「造成氣管擴張、血管收縮」與事實相反、為錯誤。其餘（減敏療法降IgE增IgG需1–2年、避免接觸過敏原最直接、皮膚試驗與測IgE為常用檢測）皆正確。","options":{"A":"正確（為錯誤敘述）：介質造成氣管收縮與血管擴張，非氣管擴張血管收縮。","B":"減敏療法降IgE增IgG、需1–2年，正確。","C":"避免接觸過敏原最直接，正確。","D":"皮膚試驗與測IgE為常用檢測，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-67":{"quick":"預防白喉注射「DPT（白喉-百日咳-破傷風）三合一疫苗」。","detail":{"background":"DPT（DTaP）三合一疫苗預防「白喉（D，白喉類毒素）、百日咳（P）、破傷風（T，破傷風類毒素）」。故預防白喉注射DPT。卡介苗（BCG）防結核、MR防麻疹德國麻疹、牛痘防天花，皆非白喉疫苗。補充：DTaP三合一＝白喉類毒素+無細胞性百日咳+破傷風類毒素，台灣於出生後2、4、6、18月及5歲接種。白喉/破傷風為「類毒素(toxoid)疫苗」(去毒外毒素、誘導抗毒素抗體)。對照：卡介苗BCG＝減毒活疫苗防結核、MMR/MR防麻疹德麻疹、牛痘(vaccinia)防天花。出題：預防白喉＝DPT/DTaP。","options":{"A":"正確：DPT三合一疫苗預防白喉。","B":"卡介苗防結核，非白喉。","C":"麻疹疫苗（MR）防麻疹德國麻疹，非白喉。","D":"牛痘疫苗防天花，非白喉。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-76":{"quick":"C. difficile腸炎治療應「停用」誘發的廣效抗生素、改用vancomycin等；「持續廣效抗生素」錯誤。","detail":{"background":"梭狀芽孢桿菌敘述：②嬰兒肉毒桿菌中毒可從糞便分離出菌確診（正確）；③預防破傷風須給「破傷風免疫球蛋白（被動）＋類毒素疫苗（主動）」（正確）；④產氣莢膜桿菌的氣性壞疽組織壞死、檢體中「白血球少」（毒素破壞，正確）。①「困難梭狀桿菌（C. difficile）腸炎」治療應「停用」誘發的廣效抗生素，改用「口服vancomycin或fidaxomicin」，「持續使用廣效抗生素」反而惡化（A錯）。故錯誤者為A。","options":{"A":"正確（為錯誤敘述）：C. difficile腸炎應停廣效抗生素、改用vancomycin，非持續廣效抗生素。","B":"嬰兒肉毒可從糞便分離菌確診，正確。","C":"破傷風預防須免疫球蛋白＋類毒素，正確。","D":"產氣莢膜桿菌感染檢體白血球少，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"108110-N1-77":{"quick":"卡介苗（BCG）是減毒活疫苗、通常於年幼時接種；此敘述正確。","detail":{"background":"結核分枝桿菌敘述：①生長「非常緩慢」（倍增約15–20小時，非分鐘，A錯）；②「卡介苗（BCG）是『減毒活疫苗』（減毒牛分枝桿菌），通常於『年幼』時接種」（B正確）；③抗酸染色偵測的是「細胞壁的分枝菌酸（蠟質）」、非16S rRNA（C錯）；④治療須「多藥合併（RIPE）」、非單一抗生素（避免抗藥，D錯）。故正確者為B。","options":{"A":"結核菌生長非常緩慢，非15–20分鐘。","B":"正確：卡介苗為減毒活疫苗、幼時接種。","C":"抗酸染色偵測分枝菌酸，非16S rRNA。","D":"須多藥合併治療，非單一抗生素。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"109110-N1-71":{"quick":"猩紅熱（scarlet fever）是A群鏈球菌感染（外毒素），「非自體免疫疾病」。","detail":{"background":"自體免疫疾病的例子：尋常天疱瘡（抗橋粒抗體）、重症肌無力（抗AChR）、第一型糖尿病（抗胰島β細胞）。「猩紅熱（scarlet fever）」是「A群鏈球菌（S. pyogenes）感染」、由其「紅斑（致熱外）毒素」造成全身紅疹與草莓舌的「感染性疾病」，「非自體免疫」。故不屬自體免疫者為猩紅熱。","options":{"A":"正確：猩紅熱為鏈球菌感染，非自體免疫。","B":"尋常天疱瘡為自體免疫（抗橋粒）。","C":"重症肌無力為自體免疫（抗AChR）。","D":"第一型糖尿病為自體免疫。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-68":{"quick":"淋病雙球菌「目前無疫苗」可預防（因抗原高度變異）。","detail":{"background":"已有疫苗者：百日咳桿菌（DPT）、流感嗜血桿菌（Hib疫苗）、破傷風桿菌（破傷風類毒素）。「淋病雙球菌（N. gonorrhoeae）」因表面抗原（菌毛、Opa蛋白）「高度抗原變異」、缺乏持久保護性免疫，「目前無有效疫苗」。故目前無疫苗可預防者為淋病雙球菌。","options":{"A":"百日咳桿菌有疫苗（DPT）。","B":"正確：淋病雙球菌目前無疫苗。","C":"流感嗜血桿菌有Hib疫苗。","D":"破傷風桿菌有類毒素疫苗。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-73":{"quick":"骨髓（造血幹細胞）移植最易發生「移植體對抗宿主疾病（GVHD）」。","detail":{"background":"移植體對抗宿主疾病（GVHD）發生於「移植物中含有具免疫活性的供者T細胞」時——供者T細胞辨識並攻擊受贈者組織。故「骨髓（造血幹細胞）移植」（移植物富含供者免疫細胞、且受贈者多經免疫抑制/清除）最易發生GVHD（侵犯皮膚、腸、肝）。實質器官（肝、心、腎）移植以「宿主排斥移植物」為主、GVHD少見。故最易發生GVHD者為骨髓移植。","options":{"A":"肝臟移植GVHD較少見。","B":"心臟移植以宿主排斥為主。","C":"正確：骨髓（造血幹細胞）移植最易發生GVHD。","D":"腎臟移植以宿主排斥為主。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110030-N1-74":{"quick":"IgG是「半衰期最長」的免疫球蛋白（約3週）；此敘述正確。","detail":{"background":"五類免疫球蛋白：①「IgE」與全身性過敏（過敏性休克）相關（非IgA，A錯）；②「只有IgG能通過胎盤」（非所有類型，B錯）；③「IgG半衰期最長（約3週）」（C正確）；④固定（活化）補體最有效率的是「IgM」（五聚體），非IgE（D錯）。故正確者為C。","options":{"A":"全身性過敏與IgE相關，非IgA。","B":"只有IgG能通過胎盤，非所有類型。","C":"正確：IgG半衰期最長（約三週）。","D":"活化補體最有效率的是IgM，非IgE。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"110110-N1-74":{"quick":"肉毒桿菌中毒「不以疫苗治療」，而是給「抗毒素（antitoxin）」與支持療法；故此敘述錯誤。","detail":{"background":"肉毒梭狀桿菌（C. botulinum）：①為產芽孢的厭氧菌（A正確）；②食源性中毒常由「罐頭或真空包裝食品」引起（C正確）；③嬰兒型可由「污染蜂蜜」中孢子引起（D正確）。②「治療」是給「肉毒桿菌抗毒素（中和毒素）＋呼吸支持」，「不是給疫苗」（疫苗為預防、且非急性治療手段，毒素量微亦不誘導免疫），故「感染者應立即給予疫苗治療」為錯誤。故錯誤者為B。","options":{"A":"為產芽孢厭氧菌，正確。","B":"正確（為錯誤敘述）：應給抗毒素與支持療法，非疫苗治療。","C":"食源性中毒常由罐頭/真空包裝引起，正確。","D":"嬰兒型可由污染蜂蜜傳染，正確。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"111030-N1-71":{"quick":"影響自體免疫疾病易感性的主要遺傳因子是「HLA（人類白血球抗原）」。","detail":{"background":"自體免疫疾病的遺傳易感性中，「HLA（MHC）基因」是最主要、關聯最強的遺傳因子——特定HLA型別與特定自體免疫病高度相關（如HLA-B27與僵直性脊椎炎、HLA-DR3/DR4與第一型糖尿病、HLA-DR2與SLE）。CTLA-4、FOXP3、AIRE也與自體免疫相關但屬次要/特定。故主要遺傳因子為HLA。","options":{"A":"CTLA-4與自體免疫相關但非最主要遺傳因子。","B":"FOXP3缺陷致IPEX（特定），非最主要群體易感因子。","C":"正確：HLA為自體免疫易感性的主要遺傳因子。","D":"AIRE缺陷致APECED（特定），非最主要。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"111110-N1-45":{"quick":"IgG與可溶性抗原形成免疫複合體所致者屬「第三型過敏反應」。","detail":{"background":"第三型過敏反應由「可溶性抗原與抗體（IgG）形成的免疫複合體」沉積於組織（血管壁、腎絲球、關節）、活化補體、召募嗜中性球造成發炎損傷（血清病、SLE、Arthus反應）。故IgG與可溶性抗原形成免疫複合體致病者為第三型。補充：第三型(免疫複合體)過敏＝「可溶性抗原+IgG/IgM抗體形成免疫複合體」沉積於血管壁、腎絲球、關節、皮膚，活化補體(C3a/C5a)召募嗜中性球釋放酵素致發炎損傷。典型疾病：血清病、Arthus反應(局部)、SLE腎絲球腎炎、感染後腎絲球腎炎、類風濕關節炎。對照：II型抗體對抗「細胞表面/基質」固定抗原；III型對抗「可溶性」抗原形成複合體。","options":{"A":"第一型為IgE媒介速發型。","B":"第二型為抗體對抗細胞表面抗原。","C":"正確：IgG與可溶性抗原形成免疫複合體為第三型。","D":"第四型為細胞媒介遲發型。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112030-N1-22":{"quick":"引發第一型過敏反應的主要抗體是IgE。","detail":{"background":"第一型（速發型）過敏反應由「IgE」媒介：過敏原使附著於肥大細胞/嗜鹼性球FcεRI上的IgE交聯，脫顆粒釋放組織胺等介質，造成過敏性鼻炎、氣喘、蕁麻疹、過敏性休克。故引發第一型過敏的抗體為IgE。補充：四型過敏記憶「ACID」——第一型Anaphylactic由IgE媒介(速發、數分鐘)。機轉：初次致敏產生IgE結合肥大細胞/嗜鹼性球FcεRI；再接觸過敏原交聯IgE→脫顆粒釋放組織胺(立即)、白三烯/前列腺素(較強)。臨床：過敏性鼻炎、氣喘、蕁麻疹、血管性水腫、過敏性休克。急救＝腎上腺素(IM)。","options":{"A":"IgD非過敏媒介。","B":"正確：IgE引發第一型過敏反應。","C":"IgG非第一型速發過敏主要媒介。","D":"IgA為黏膜抗體，非第一型過敏媒介。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-44":{"quick":"器官移植「超急性排斥」由「ABO血型不合（既存抗體）」造成。","detail":{"background":"超急性排斥（hyperacute rejection）在移植後數分鐘至數小時發生，由受贈者「既存（preformed）抗體」——對抗「ABO血型抗原」或既存抗供者HLA抗體——立即結合移植器官血管內皮、活化補體致血栓梗塞。故超急性排斥主因為ABO血型不合（既存抗體）。HLA配對不合、次要組織相容抗原、間接路徑活化主要與「急性/慢性」排斥相關。","options":{"A":"HLA不合主要致急性排斥（T細胞），非超急性。","B":"正確：ABO血型不合（既存抗體）致超急性排斥。","C":"次要組織相容抗原與急/慢性排斥相關。","D":"間接路徑活化與急/慢性排斥相關。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112110-N1-45":{"quick":"古德帕斯丘症候群的IgG抗體對抗腎臟基底膜第四型膠原蛋白，引起腎炎（與肺出血）。","detail":{"background":"古德帕斯丘症候群（Goodpasture’s syndrome）是第二型過敏的自體免疫病——「IgG自體抗體對抗腎絲球與肺泡基底膜的『第四型膠原蛋白（α3鏈）』」，結合基底膜並活化補體，造成「快速進行性腎絲球腎炎與肺泡出血（咳血）」。免疫螢光呈「線狀（linear）」沉積。故對抗腎基底膜第四型膠原蛋白者為古德帕斯丘症候群。","options":{"A":"SLE為抗核抗體、免疫複合體（顆粒狀沉積）。","B":"正確：古德帕斯丘症候群抗基底膜第四型膠原蛋白。","C":"類風濕關節炎為抗CCP/RF、關節滑膜發炎。","D":"多發性硬化症為中樞髓鞘的T細胞媒介病變。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"112180-N1-43":{"quick":"由IgE抗體引起者為「第一型過敏反應」。","detail":{"background":"第一型（速發型）過敏反應由「IgE」媒介——過敏原與肥大細胞/嗜鹼性球上的IgE交聯、脫顆粒釋放組織胺等，造成過敏性鼻炎、氣喘、蕁麻疹、過敏性休克。故主要由IgE引起者為第一型過敏反應。補充：四型過敏口訣「ACID」——I型Anaphylactic(IgE)、II型Cytotoxic(IgG/IgM對細胞表面抗原)、III型Immune-complex(IgG免疫複合體)、IV型Delayed(T細胞)。第一型介質：組織胺(立即)、白三烯/前列腺素(較慢且強)。臨床＝過敏性鼻炎、氣喘、蕁麻疹、過敏性休克、食物/藥物過敏。治療：避開過敏原、抗組織胺、腎上腺素(休克時)、減敏療法。","options":{"A":"正確：第一型過敏反應主要由IgE引起。","B":"第二型由IgG/IgM對抗細胞抗原。","C":"第三型由免疫複合體。","D":"第四型為細胞媒介。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113030-N1-44":{"quick":"ABO血型不合的溶血/輸血反應屬「第二型過敏反應」。","detail":{"background":"第二型過敏反應由「抗體（IgG/IgM）對抗細胞表面抗原」、經補體或調理致細胞破壞——「ABO血型不合的溶血性輸血反應」（抗A/抗B結合紅血球致溶血）即典型第二型。Arthus反應、血清病為第三型（免疫複合體）；全身性過敏為第一型（IgE）；結核菌素反應為第四型（細胞媒介）。故屬第二型者為ABO不合溶血輸血反應。","options":{"A":"Arthus反應為第三型。","B":"全身性過敏反應為第一型。","C":"結核菌素反應為第四型。","D":"正確：ABO血型不合溶血輸血反應為第二型。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"113100-N1-46":{"quick":"青黴素（penicillin）是治療梅毒的常用（首選）藥物；此敘述正確。","detail":{"background":"梅毒螺旋體（Treponema pallidum）：①為微需氧、「無法在人工培養基體外培養」（須暗視野顯微鏡或動物接種，A、B錯）；③「青黴素（penicillin G）為治療梅毒的首選藥物」（至今高度敏感，C正確）；④「目前無梅毒疫苗」（D錯）。故正確者為C。","options":{"A":"梅毒螺旋體非以SOD於有氧環境生存為特徵（微需氧、難培養）。","B":"無法體外人工培養、非以光學顯微鏡常規觀察。","C":"正確：青黴素為治療梅毒的常用首選藥物。","D":"目前無梅毒疫苗。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-23":{"quick":"與全身性紅斑性狼瘡（SLE）最相關的自體抗體是「抗核抗體（ANA）」。","detail":{"background":"全身性紅斑性狼瘡（SLE）是非器官特異性自體免疫病，「抗核抗體（ANA）」為最敏感的篩檢標記（幾乎全部陽性）；更具特異性的是「抗dsDNA」與「抗Sm抗體」。抗肌動蛋白（自體免疫肝炎）、抗粒線體（原發性膽汁性膽管炎）、ANCA（血管炎）為其他病的標記。故與SLE最相關者為抗核抗體。","options":{"A":"正確：抗核抗體（ANA）與SLE最相關。","B":"抗肌動蛋白抗體見於自體免疫肝炎。","C":"抗粒線體抗體見於原發性膽汁性膽管炎。","D":"ANCA見於血管炎（如GPA）。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114100-N1-44":{"quick":"梅毒「目前無有效疫苗」可預防。","detail":{"background":"已有有效疫苗者：肺結核（卡介苗BCG）、白喉（白喉類毒素）、破傷風（破傷風類毒素）。「梅毒（Treponema pallidum）」因螺旋體難培養、缺乏有效保護性抗原，「目前無有效疫苗」（預防靠安全性行為與及早青黴素治療）。故目前無有效疫苗者為梅毒。","options":{"A":"肺結核有卡介苗。","B":"白喉有類毒素疫苗。","C":"破傷風有類毒素疫苗。","D":"正確：梅毒目前無有效疫苗。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}},"114170-N1-44":{"quick":"接觸常春藤（毒藤）造成的皮膚炎屬「第四型（T細胞媒介）」，「非抗體引起」。","detail":{"background":"由「抗體」引起的過敏：異位性皮膚炎（與IgE相關，第一型）、青黴素過敏（IgE速發或其他抗體型）、RhD不合新生兒溶血（IgG，第二型）。「接觸常春藤（毒藤poison ivy）葉片造成的接觸性皮膚炎」屬「第四型（遲發型）過敏」——由「致敏T細胞（細胞媒介）」引起，「非抗體」。故不是由抗體引起者為C（毒藤接觸性皮膚炎）。","options":{"A":"異位性皮膚炎與IgE（抗體）相關。","B":"青黴素過敏由抗體（IgE等）引起。","C":"正確：毒藤接觸性皮膚炎為第四型細胞媒介，非抗體引起。","D":"RhD不合新生兒溶血由IgG抗體引起。"},"sources":["Levinson《Review of Medical Microbiology and Immunology》","Abbas《Cellular and Molecular Immunology》","實用微生物及免疫學（新文京）"]}}},TO=["M1微生物學總論與感染控制", "M2細菌學總論與致病機轉", "M3革蘭氏陽性菌", "M4革蘭氏陰性菌與分枝桿菌螺旋體", "M5病毒學總論與肝炎病毒", "M6重要致病病毒", "M7黴菌與寄生蟲", "M8免疫學總論先天免疫與補體", "M9後天免疫抗體與細胞免疫", "M10過敏免疫病理疫苗與移植"],LEC={"M1微生物學總論與感染控制":{"title":"（1）微生物學總論與感染控制 複習講義","html":"\n<h3>一、消毒與滅菌</h3>\n<p><b>滅菌(sterilization)</b>＝殺滅所有微生物含內孢子；<b>消毒(disinfection)</b>＝殺多數病原但未必殺孢子。\n<b>高壓蒸氣滅菌(autoclave)＝121°C、15 psi、15分鐘</b>（濕熱使蛋白變性、可殺孢子，耐熱耐濕物品首選）；乾熱160–180°C（油劑粉末）；不耐高溫物（含塑膠、內視鏡）用<b>過氧化氫氣化電漿/環氧乙烷</b>低溫滅菌。</p>\n<h3>二、各消毒劑機制</h3>\n<p>酒精(70%最佳)＝溶解膜脂＋變性蛋白；紫外線＝破壞核酸(嘧啶二聚體)；戊二醛/甲醛＝烷化交聯蛋白；石碳酸＝破壞膜與變性蛋白。</p>\n<h3>三、感染控制與科霍假說</h3>\n<p>院內感染最常見且最可預防的傳播原因＝<b>手部衛生不澈底</b>（WHO手部衛生五時機）。<b>科霍假說(Koch’s postulates)</b>：病原須能分離純培養、接種能致病、再分離；不適用於無法培養之病原（如帕金森氏症等非感染病）。尿培養偽陰性最常見原因＝採檢前已用抗生素。</p>\n"},"M2細菌學總論與致病機轉":{"title":"（2）細菌學總論與致病機轉 複習講義","html":"\n<h3>一、原核 vs 真核</h3>\n<p>細菌（原核）：無膜性胞器、無真正核、僅<b>70S核糖體</b>、有細胞壁(peptidoglycan)；能量代謝在細胞膜。動物細胞有溶酶體、粒線體等膜性胞器、無細胞壁。細菌同時含DNA與RNA（與只含一種核酸的病毒不同）。</p>\n<h3>二、毒力因子</h3>\n<p><b>內毒素(endotoxin)＝G−外膜的脂多醣LPS</b>，菌死裂解時釋出、活化補體與巨噬細胞致發燒休克；<b>外毒素(exotoxin)</b>為活菌分泌的蛋白、毒性強且可製類毒素。莢膜＝抗吞噬；鞭毛＝運動；菌毛(pili)＝黏附與接合。腸內桿菌抗原＝O(菌體LPS)、H(鞭毛)、K(莢膜)。</p>\n<h3>三、水平基因轉移與抗藥性</h3>\n<p>三方式：<b>接合(conjugation,性菌毛傳質體)、轉導(transduction,噬菌體)、轉形(transformation,攝取游離DNA)</b>；分泌作用非基因轉移。降低抗藥性＝依藥敏監測合理用藥、足量足療程、勿濫用廣效/預防性/飼料抗生素。MIC＝抑菌、MBC＝殺菌濃度；治療無效常因病灶濃度＜MBC。</p>\n"},"M3革蘭氏陽性菌":{"title":"（3）革蘭氏陽性菌 複習講義","html":"\n<h3>一、葡萄球菌</h3>\n<p><b>金黃色葡萄球菌</b>：成簇、觸酶＋、凝固酶＋(致病指標)、兼性厭氧、耐鹽、易抗藥(MRSA＝PBP2a改變、對所有β-lactam抗藥→用vancomycin)。致皮膚化膿(毛囊炎/癤)、<b>食物中毒(耐熱腸毒素、潛伏短、嘔吐為主不發燒)</b>、毒性休克(TSST-1超抗原)、燙傷狀皮膚症候群、心內膜炎。</p>\n<h3>二、鏈球菌</h3>\n<p>溶血分型：α(草綠,肺炎鏈球菌)、β(透明,A群pyogenes/B群agalactiae)、γ(不溶,腸球菌)。<b>A群鏈球菌</b>：M protein為毒力/分型、首選penicillin、後遺症＝風濕熱(咽喉感染後)與急性腎絲球腎炎；噬肉菌(壞死性筋膜炎)需手術。<b>肺炎鏈球菌</b>：莢膜為主要毒力、鐵鏽色痰、有疫苗。Lancefield依細胞壁C醣類抗原分群。</p>\n<h3>三、產芽孢G＋桿菌與其他</h3>\n<p><b>Clostridium(厭氧)</b>：肉毒桿菌(神經毒阻ACh釋放→弛緩麻痺/呼吸麻痺)、破傷風桿菌(阻抑制性神經→痙攣麻痺/牙關緊閉，產毒需缺氧)、產氣莢膜桿菌(氣性壞疽)、困難梭狀桿菌(抗生素相關偽膜性腸炎→停廣效抗生素、用vancomycin)。<b>Bacillus</b>：炭疽(蛋白質莢膜)、仙人掌桿菌(炒飯嘔吐型耐熱腸毒素、眼內炎)。白喉桿菌(類毒素疫苗DPT)、李斯特菌(冷藏食品、孕婦/新生兒/免疫低下)、放線菌(硫磺顆粒)。</p>\n"},"M4革蘭氏陰性菌與分枝桿菌螺旋體":{"title":"（4）革蘭氏陰性菌與分枝桿菌、螺旋體 複習講義","html":"\n<h3>一、腸道G−桿菌</h3>\n<p>大腸桿菌(衛生指標菌；ETEC不耐熱腸毒素LT類霍亂/STEC O157志賀毒素→出血性腹瀉+HUS)、沙門氏菌(飲食、傷寒)、志賀氏菌(感染劑量極低、細菌性痢疾)、霍亂弧菌(米湯瀉、補液救命)、腸炎弧菌(海鮮)、創傷弧菌(傷口+肝病→敗血症)、變形桿菌(尿素酶→結石/UTI)、克雷白氏菌(院內伺機)。<b>幽門螺旋桿菌</b>：尿素酶定殖胃、與胃癌/潰瘍相關、尿素呼吸試驗。曲狀桿菌(雞肉→GBS前驅)。</p>\n<h3>二、其他G−</h3>\n<p>奈瑟氏菌(G−雙球菌，淋病/腦膜炎，菌毛pilin抗原變異、無疫苗)、退伍軍人桿菌(水氣微粒、夏秋、不人傳人)、百日咳桿菌(氣管細胞毒素破壞纖毛、卡他期傳染力最高、鼻咽檢體)、Hib(幼童腦膜炎/會厭炎)、軟性下疳(杜克氏嗜血桿菌)、貓抓熱(Bartonella)。</p>\n<h3>三、分枝桿菌與螺旋體</h3>\n<p><b>結核菌</b>：抗酸(分枝菌酸)、絕對需氧、生長慢、空氣飛沫核傳染、組織傷害源自宿主第四型過敏、RIPE多藥、卡介苗減毒活疫苗。痲瘋菌(無法培養、MDT)。<b>螺旋體</b>：梅毒(無痛硬下疳/二期全身疹手掌腳掌傳染力最高/三期梅毒腫；VDRL非密螺旋體篩檢、TPHA確診；青黴素首選、無疫苗；先天經胎盤)、鉤端螺旋體(鼠尿污染水、不需節肢動物)、疏螺旋體(萊姆病=硬蜱+遊走性紅斑；回歸熱=體蝨/軟蜱+抗原變異)。立克次體/恙蟲病(節肢動物媒介、絕對胞內、細胞質增殖)。</p>\n"},"M5病毒學總論與肝炎病毒":{"title":"（5）病毒學總論與肝炎病毒 複習講義","html":"\n<h3>一、病毒總論</h3>\n<p>病毒＝絕對胞內寄生、只含<b>一種核酸</b>(DNA或RNA其一)、有capsid或套膜、以<b>組合(assembly)</b>複製(非二分裂)、須借宿主核糖體(轉譯)。複製步驟：認識→附著穿入→去殼→巨分子合成→組合→釋出。多數RNA病毒在<b>細胞質</b>複製、多數DNA病毒在<b>細胞核</b>(痘病毒例外在細胞質)。<b>有套膜</b>病毒易被乙醚/酒精/酸/乾燥破壞；<b>無套膜</b>(腺/小RNA/乳突/輪狀)耐環境耐胃酸。+ssRNA可直接作mRNA。RNA病毒突變率高(聚合酶無校正)。</p>\n<h3>二、普利昂(prion)</h3>\n<p>不含核酸的感染性蛋白(PrPˢᶜ)；潛伏期極長、不引起發炎/免疫、對熱與福馬林與放射線極具抗性、致海綿狀腦病(庫賈氏病/狂牛/羊搔癢/Kuru)；可經污染器械或食物攝入傳播、100°C無法清除。</p>\n<h3>三、肝炎病毒</h3>\n<p><b>傳播</b>：A、E型＝糞口(飲食)、自限性不慢性化；B、C、D型＝血液體液、可慢性化。<b>B型</b>＝唯一DNA病毒、與肝硬化/肝癌最相關(台灣)、疫苗+HBIG阻斷母嬰垂直；血清標誌HBsAg/抗HBs/HBeAg/抗HBc(HBcAg血中測不到)。<b>C型</b>＝輸血後肝炎主因、易慢性、無疫苗、干擾素/DAA治療。<b>D型</b>＝缺陷病毒需HBsAg、重疊B肝易猛爆性。<b>E型</b>＝糞口、孕婦死亡率高。致癌病毒：HBV/HCV-肝癌、HPV-子宮頸癌、EBV-鼻咽癌/Burkitt、HTLV-1-成人T細胞白血病、HHV8-卡波西肉瘤。</p>\n"},"M6重要致病病毒":{"title":"（6）重要致病病毒 複習講義","html":"\n<h3>一、疱疹病毒群(有套膜DNA、可潛伏)</h3>\n<p>HSV(潛伏神經節)、VZV(水痘/帶狀疱疹、最小、傳染力高)、EBV(鼻咽癌/Burkitt/單核球增多症)、CMV(最常見先天感染→小頭/聽損、移植後再活化、可經輸血)。</p>\n<h3>二、RNA病毒</h3>\n<p>流感(正黏液病毒、8段負股RNA、HA附著/NA釋出、抗原漂移→季節、<b>抗原轉移→大流行</b>)、副黏液病毒(麻疹=柯氏斑/腮腺炎/RSV)、腸病毒(EV71手足口/重症、無套膜糞口)、輪狀病毒(嬰幼兒腹瀉、口服疫苗、無抗病毒藥)、登革(斑蚊、4血清型、ADE致重症)、狂犬(Negri小體、恐水症)、伊波拉(接觸體液、非空氣)、漢他(齧齒類)、HIV見下。</p>\n<h3>三、HIV與疫苗</h3>\n<p><b>HIV</b>：反轉錄病毒、有套膜+ssRNA、gp120結合<b>CD4</b>+共受體、感染耗竭CD4 T細胞致AIDS、初期淋巴結腫大/後期伺機感染與腫瘤、西方墨點確認、AZT抑反轉錄酶、無有效疫苗。<b>疫苗</b>：減毒活(MMR麻腮疹/水痘/卡介苗/沙賓口服小兒麻痺/輪狀，孕婦免疫低下禁用)、不活化(百日咳/沙克注射小兒麻痺/A肝)、類毒素(白喉/破傷風DPT)、基因重組(B肝)。減毒活疫苗免疫較強、死疫苗較安全。</p>\n"},"M7黴菌與寄生蟲":{"title":"（7）黴菌與寄生蟲 複習講義","html":"\n<h3>一、黴菌(真核、有細胞壁=葡聚醣/幾丁質、細胞膜含麥角固醇)</h3>\n<p>抗真菌藥：<b>polyene(amphotericin B,結合麥角固醇、腎毒性)、azole(抑麥角固醇合成)、echinocandin(抑細胞壁β-葡聚醣)、flucytosine(抑核酸)</b>。<b>念珠菌</b>(常在菌；鵝口瘡/陰道炎/尿道感染表示已受感染；芽管試驗、CHROMagar綠；克魯斯念珠菌對fluconazole天然抗藥)。<b>新型隱球菌</b>(鴿糞、莢膜、墨汁染色、隱球菌腦膜炎、測莢膜抗原)。<b>麴菌</b>(吸入孢子、空洞內可移動麴菌球咳血)。<b>毛黴菌(接合菌)</b>(糖尿病酮酸中毒、鼻腦)。皮癬菌三屬(表皮癬菌/毛髮癬菌/小芽胞菌→足癬等)。真菌組織染色用PAS/銀染。全身性真菌病經吸入分生孢子。</p>\n<h3>二、寄生蟲</h3>\n<p><b>原蟲</b>：瘧原蟲(血液鏡檢；惡性瘧→腦性瘧疾)、痢疾阿米巴(囊體糞口/肛交、肝膿瘍)、弓形蟲(貓、孕婦經胎盤→視網膜炎+水腦+腦鈣化)、非洲錐蟲(采采蠅、急性發熱淋巴結腫→慢性嗜睡)。<b>線蟲</b>：蛔蟲/鞭蟲(食入蟲卵、糞便檢卵)、鉤蟲/糞線蟲(幼蟲穿皮=地癢、鉤蟲吸血→缺鐵性貧血)、蟯蟲(膠帶法肛周)、旋毛蟲(生豬肉、肌肉切片)、廣東住血線蟲(陸螺蛞蝓→嗜酸性腦膜炎)。<b>吸蟲</b>：中華肝吸蟲(淡水魚→膽管癌)、衛氏肺吸蟲(淡水蝦蟹→咳血)、住血吸蟲(埃及型→尿中卵/膀胱)。<b>絛蟲</b>：有鉤(豬肉)絛蟲幼蟲可致腦囊蟲症。</p>\n"},"M8免疫學總論先天免疫與補體":{"title":"（8）免疫學總論、先天免疫與補體 複習講義","html":"\n<h3>一、先天 vs 後天免疫</h3>\n<p>先天免疫
