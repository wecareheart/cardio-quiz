接種)。"},"sources":["CDC/ACIP Vaccinating Pregnant Women","Harrison 21e, Immunization Principles","Taiwan CDC 孕婦疫苗建議"]}},"110-90":{"quick":"孕婦(含高風險)不建議接種的活性減毒疫苗：帶狀皰疹/水痘活疫苗(2)與MMR(3)；HBV、流感、Td/Tdap皆可，故選B(2+3)。","detail":{"background":"同「活疫苗孕期禁忌」原則。本題:(2)帶狀皰疹/水痘活疫苗(Varicella-zoster live vaccine, 如Zostavax)為活性減毒→孕期禁忌;(3)MMR為活性減毒→孕期禁忌。可接種者:(1)B型肝炎疫苗(重組次單位，非活性)→孕婦可打(尤其高風險);(4)流感疫苗(注射去活化)→孕婦「建議」接種;(5)白喉-百日咳-破傷風(Td/Tdap，類毒素+次單位)→孕婦建議於每次懷孕第27–36週接種Tdap以保護新生兒免於百日咳。故孕婦不建議者為(2)+(3)。要點：對高風險暴露孕婦，多數去活化/類毒素疫苗反而更應接種以保護母嬰，唯獨活疫苗禁忌。110年此題與109-114同一原則、互為對照。","options":{"A":"錯誤。(1)HBV疫苗孕婦可打。","B":"正確。(2)帶狀皰疹/水痘活疫苗與(3)MMR為活疫苗，孕期禁忌。","C":"錯誤。(4)流感孕婦建議接種。","D":"錯誤。(4)(5)孕婦皆可接種。","E":"錯誤。(5)Td/Tdap孕婦建議接種。"},"sources":["CDC/ACIP Pregnancy & Vaccines","ACOG Tdap in Pregnancy (27-36 wk)","Harrison 21e, Immunization"]}},"111-88":{"quick":"酒精乾洗手對「有外套膜(enveloped)病毒」有效，可清除流感病毒與新冠病毒(選D)；但對無外套膜的腸病毒/諾羅病毒及寄生蟲蟲卵效果差，需用肥皂與水。","detail":{"background":"手部衛生是感染管制基石。酒精性乾洗手液(含60–80%乙醇/異丙醇)藉變性蛋白與溶解脂質外套膜殺滅微生物，對「有外套膜(enveloped)」的病毒(流感病毒、冠狀病毒/SARS-CoV-2、HIV、皰疹病毒)與多數細菌、結核菌有效。但對「無外套膜(non-enveloped)」病毒(腸病毒、諾羅病毒、輪狀病毒、A型肝炎病毒)效果差，以及對細菌孢子(如C. difficile孢子)與寄生蟲蟲卵/卵囊(Cryptosporidium)無效——這些情境須改用「肥皂與流動清水」物理搓洗去除。故正確為D(可清除流感、新冠病毒)。臨床推論:照護腸病毒/諾羅/C. difficile病人時，不可只靠酒精乾洗手，須加強肥皂洗手與環境清消(含氯)。111年此題在COVID期間測試酒精乾洗手的適用與限制。","options":{"A":"錯誤。每次使用建議足量(約3 mL/覆蓋雙手搓乾約20–30秒)，「1毫升即可」不足。","B":"錯誤。酒精無法清除寄生蟲蟲卵。","C":"錯誤。腸病毒、諾羅病毒為無外套膜病毒，酒精效果差。","D":"正確。流感病毒與新冠病毒為有外套膜病毒，酒精乾洗手可清除。","E":"錯誤。並非以上皆正確。"},"sources":["WHO Hand Hygiene Guidelines","CDC Hand Hygiene in Healthcare","Harrison 21e, Infection Control"]}},"112-89":{"quick":"活性疫苗不建議用於嚴重免疫不全者：MMR(2)與帶狀皰疹活疫苗Zostavax(4)；TdaP、HPV、結合型腦膜炎雙球菌疫苗皆非活疫苗，故選B(2+4)。","detail":{"background":"嚴重免疫不全(化療、HSCT、實體器官移植、進階HIV、高劑量類固醇/生物製劑)者「禁用活性減毒疫苗」(可能造成疫苗株感染)，但「可且應」接種去活化/次單位/類毒素疫苗。本題活疫苗為:(2)MMR(麻疹-腮腺炎-德國麻疹)為活性減毒→免疫不全禁忌;(4)帶狀皰疹活疫苗Zostavax(live attenuated)→免疫不全禁忌(註:新一代重組帶狀皰疹疫苗Shingrix/RZV為「非活性」次單位疫苗，免疫不全者反而建議接種，是本題的時代對比)。非活疫苗(可接種):(1)TdaP(類毒素+次單位)、(3)HPV(重組次單位)、(5)結合型腦膜炎雙球菌疫苗(多醣-蛋白結合)。故活疫苗為(2)+(4)。112年此題測試免疫不全者的活疫苗禁忌與Zostavax(活)vs Shingrix(非活)的差異。","options":{"A":"錯誤。(1)TdaP、(3)HPV、(5)結合型腦膜炎雙球菌皆非活疫苗。","B":"正確。(2)MMR與(4)帶狀皰疹活疫苗(Zostavax)為活疫苗，免疫不全禁忌。","C":"錯誤。(1)(3)非活疫苗。","D":"錯誤。含(3)(5)非活疫苗。","E":"錯誤。(5)結合型疫苗非活疫苗。"},"sources":["CDC/ACIP Altered Immunocompetence","IDSA 2013 Immunization of Immunocompromised Hosts","Harrison 21e, Immunization"]}},"113-83":{"quick":"成人疫苗：65歲以上打肺炎鏈球菌/流感/COVID(2)、孕28–36週打一劑Tdap(4)、孕婦任何孕期可打流感(5)皆對；孕婦立即補MMR(1)與移植後立即打水痘活疫苗(3)為錯，故(2)+(4)+(5)→D。","detail":{"background":"成人與孕婦疫苗接種建議綜合題。正確:(2)65歲以上長者若無禁忌，建議接種肺炎鏈球菌疫苗(PCV+PPSV)、流感疫苗與COVID-19疫苗;(4)孕婦於懷孕第27–36(本題28–36)週建議接種一劑減量破傷風-白喉-非細胞性百日咳混合疫苗(Tdap)，使母體抗體經胎盤保護新生兒免於百日咳;(5)流感疫苗(去活化)於孕婦「任何孕期」皆可接種。錯誤:(1)德國麻疹/MMR為活疫苗，孕婦發現無抗體「不可立即於孕期補打」，應於產後或孕前接種(孕期禁忌);(3)骨髓(造血幹細胞)移植後因免疫重建未完成，活疫苗(水痘)不可「移植後立即」接種，須延後(通常至移植後約24個月、免疫恢復且無GVHD/免疫抑制時)。故正確為(2)+(4)+(5)。113年此題測試成人/孕婦/移植者疫苗時程與活疫苗禁忌。","options":{"A":"錯誤。含(1)(3)活疫苗時機錯誤。","B":"錯誤。含(1)(3)。","C":"錯誤。含(1)孕婦立即補MMR之錯誤。","D":"正確。(2)長者三疫苗、(4)孕期Tdap、(5)孕期流感皆正確。","E":"錯誤。含(3)移植後立即打水痘活疫苗之錯誤。"},"sources":["CDC/ACIP Adult Immunization Schedule","ACOG/CDC Tdap in Pregnancy","IDSA HSCT vaccination timing"]}},"113-89":{"quick":"孕婦禁忌的是活性減毒疫苗——Varicella(水痘)疫苗(選D)；肺炎鏈球菌(多醣/結合)、HBV、結合型腦膜炎雙球菌皆非活疫苗，孕婦可接種。","detail":{"background":"同「活疫苗孕期禁忌」原則的單選版。本題唯一活性減毒疫苗為Varicella(水痘)活疫苗→孕婦禁忌(接種後亦建議避孕1個月)。其餘皆為非活疫苗、孕婦可接種:Pneumococcal polysaccharide vaccine(PPSV23,多醣)、Pneumococcal conjugate vaccine(PCV,結合)、Hepatitis B vaccine(重組次單位)、Meningococcal conjugate vaccine(結合型)。故禁忌者選Varicella vaccine。延伸:孕期其他禁忌活疫苗包含MMR、BCG、OPV、LAIV(鼻噴流感)、Zostavax(帶狀皰疹活疫苗)、黃熱病(權衡風險)。113年此題以單選測試活疫苗孕期禁忌的辨識。","options":{"A":"錯誤(非禁忌)。肺炎鏈球菌多醣疫苗非活疫苗，孕婦可打。","B":"錯誤(非禁忌)。肺炎鏈球菌結合型疫苗非活疫苗。","C":"錯誤(非禁忌)。B型肝炎疫苗為重組次單位，孕婦可打。","D":"正確(為答案，禁忌)。Varicella(水痘)為活性減毒疫苗，孕婦禁忌。","E":"錯誤(非禁忌)。結合型腦膜炎雙球菌疫苗孕婦可打。"},"sources":["CDC/ACIP Pregnancy & Vaccines","Harrison 21e, Immunization","Taiwan CDC 孕婦疫苗建議"]}},"113-94":{"quick":"醫療人員建議常規評估施打：HBV、水痘、MMR、流感(及Tdap)；「帶狀皰疹疫苗」針對年長者非醫療人員常規項目，故不建議常規評估者選C。","detail":{"background":"醫療人員(HCW)是接觸與傳播感染的高風險族群，CDC建議HCW「常規評估並補種」的疫苗包括:B型肝炎疫苗(HBV，含接種後anti-HBs確認)、麻疹-腮腺炎-德國麻疹(MMR)、水痘(varicella，無免疫力者)、Tdap(破傷風-白喉-百日咳)、每年流感疫苗;另有特定暴露族群追加腦膜炎雙球菌(實驗室人員)等。相對地，「帶狀皰疹疫苗(zoster vaccine)」的接種建議是依「年齡」(現行重組Shingrix建議≥50歲成人)而非「醫療人員職業」——它不是HCW的常規職業疫苗評估項目。故「不是醫療人員建議應常規評估施打」者為帶狀皰疹疫苗。113年此題測試HCW職業疫苗清單。","options":{"A":"錯誤(屬常規)。HBV疫苗為HCW常規評估接種項目。","B":"錯誤(屬常規)。水痘疫苗為無免疫力HCW建議接種。","C":"正確(為答案)。帶狀皰疹疫苗依年齡(≥50歲)建議，非HCW職業常規評估項目。","D":"錯誤(屬常規)。MMR為HCW常規評估接種項目。","E":"錯誤(屬常規)。流感疫苗為HCW每年建議接種。"},"sources":["CDC Immunization of Health-Care Personnel (MMWR)","Harrison 21e, Immunization of HCW","ACIP Zoster (Shingrix ≥50y)"]}},"109-97":{"quick":"HIV相關腫瘤與病毒配對：Burkitt淋巴瘤與「EBV」相關，並非CMV，故D敘述錯誤(選D)。","detail":{"background":"HIV感染因細胞免疫(CD4)低下，伴隨多種「病毒驅動」的腫瘤(AIDS-defining與non-AIDS-defining)。重要配對:Kaposi肉瘤←人類第8型皰疹病毒(HHV-8/KSHV);子宮頸癌與肛門鱗狀上皮癌←人類乳突病毒(HPV);原發性中樞神經淋巴瘤(PCNSL)←Epstein-Barr病毒(EBV);肝細胞癌←B/C型肝炎病毒;成人T細胞血癌/淋巴瘤←HTLV-1;Burkitt淋巴瘤←EBV(尤其地方流行型)。HIV相關淋巴瘤多為「B細胞」來源(瀰漫性大B細胞、Burkitt、原發滲出性淋巴瘤、漿母細胞)。本題錯誤者為(D)「Burkitt淋巴瘤與CMV(巨細胞病毒)有關」——應為「EBV」。CMV在HIV是造成視網膜炎、腸炎、食道炎等伺機感染的病原，並非Burkitt的致癌病毒。109年此題測試致癌病毒-腫瘤的精準配對。","options":{"A":"正確。Kaposi肉瘤與HHV-8相關。","B":"正確。肛門/生殖道鱗狀上皮癌與HPV相關。","C":"正確。原發性中樞神經淋巴瘤與EBV相關。","D":"錯誤(為答案)。Burkitt淋巴瘤與EBV相關，非CMV。","E":"正確。HIV相關淋巴瘤主要為B細胞淋巴瘤。"},"sources":["Harrison 21e, HIV/AIDS-associated Malignancies","Mandell 9e, Oncogenic Viruses","IARC Oncogenic Infections"]}},"110-91":{"quick":"造血幹細胞移植「後期(>100天)」感染：Aspergillus、CMV、Toxoplasma為此期常見伺機病原(2+3+6)，與慢性GVHD及細胞免疫長期低下相關，故選A。","detail":{"background":"造血幹細胞移植(HSCT)後感染依時相(time-line)分三期，是經典考點:(1)移植前期(pre-engraftment, <30天)：嗜中性球低下與黏膜破損為主，病原為細菌(腸道革蘭陰性桿菌、綠膿桿菌)、念珠菌(Candida)、HSV;(2)早中期(post-engraftment, 30–100天)：細胞免疫缺損，CMV再活化、麴菌(Aspergillus)、肺囊蟲(PCP)、Toxoplasma為主;(3)後期(late, >100天)：尤其慢性GVHD與長期免疫抑制者，仍有CMV晚發、Aspergillus、有莢膜細菌(肺炎球菌等)、VZV、PCP、Toxoplasma。本題情境為「移植後100天」(屬中後期)，常見伺機病原組合為Aspergillus(2)、CMV(3)、Toxoplasma(6)。E. coli與念珠菌、C. difficile多為更早期，VZV/有莢膜菌偏更後期。故選A(2+3+6)。110年此題測試HSCT感染時相。","options":{"A":"正確。100天前後/後期常見Aspergillus、CMV、Toxoplasma等細胞免疫缺損相關伺機感染。","B":"錯誤。E. coli與C. difficile多屬更早期(中性球低下期)。","C":"錯誤。含早期病原組合，不符後期典型。","D":"錯誤。VZV與有莢膜菌偏更後期/特定情境，組合不最符。","E":"錯誤。E. coli、C. difficile、VZV組合不符此期典型。"},"sources":["Harrison 21e, Infections in Transplant Recipients","Mandell 9e, HSCT Timeline of Infection","IDSA HSCT Infection Prevention"]}},"112-94":{"quick":"HSCT「早期(<1個月，中性球低下期)」感染以細菌(綠膿桿菌)、念珠菌、HSV、C. difficile為主；CMV屬「中期(1–4個月)」再活化，故早期最不適當者選C。","detail":{"background":"造血幹細胞移植後早期(移植後<1個月，pre-engraftment嗜中性球低下期)的感染主因是「黏膜屏障破壞＋嗜中性球極低」，病原以細菌與真菌為主:革蘭陰性桿菌(尤其Pseudomonas aeruginosa)、革蘭陽性菌(導管相關)、念珠菌(Candida albicans，黏膜炎/念珠菌血症)、單純皰疹病毒(HSV再活化)、以及艱難梭菌(Clostridioides difficile)腸炎。相對地，巨細胞病毒(CMV)再活化典型發生在「中期(約移植後30–100天，即1–4個月)」細胞免疫重建延遲時，是早期(<1個月)「最不適當」的病原。故選C(CMV)。這與時相概念一致:早期細菌/念珠菌/HSV→中期CMV/Aspergillus/PCP→後期有莢膜菌/VZV。112年此題以「早期最不適當」測試HSCT感染時相。","options":{"A":"錯誤(屬早期)。綠膿桿菌為中性球低下早期常見。","B":"錯誤(屬早期)。HSV再活化常見於早期。","C":"正確(為答案，早期最不適當)。CMV再活化屬中期(1–4個月)。","D":"錯誤(屬早期)。念珠菌(Candida albicans)為早期常見真菌。","E":"錯誤(屬早期)。C. difficile腸炎可見於早期。"},"sources":["Harrison 21e, Infections in HSCT","Mandell 9e, Timeline of Post-transplant Infection"]}},"113-95":{"quick":"HSCT後長期TMP-SMX預防可涵蓋Pneumocystis、Toxoplasma、Listeria、Nocardia、肺炎球菌等，但對「綠膿桿菌(Pseudomonas)無效」，故最不適當選D。","detail":{"background":"Trimethoprim-sulfamethoxazole(TMP-SMX)在移植後常用於長期預防，其涵蓋範圍對應它的抗菌譜:最主要是預防肺囊蟲肺炎(PCP, Pneumocystis jirovecii)，同時可涵蓋Toxoplasma gondii(弓漿蟲)、Listeria monocytogenes、Nocardia、部分有莢膜菌(如肺炎鏈球菌Streptococcus pneumoniae)與許多腸道桿菌。但TMP-SMX對「綠膿桿菌(Pseudomonas aeruginosa)無效(天生抗藥)」，因此長期TMP-SMX預防「不能」減少綠膿桿菌感染——這是與114-92(TMP-SMX除外Pseudomonas)互相呼應的考點。故最不適當者為D(Pseudomonas)。臨床上HSCT後綠膿桿菌的防護依賴中性球低下期的廣效抗綠膿桿菌經驗治療(如cefepime/piperacillin-tazobactam/carbapenem)，而非TMP-SMX預防。113年此題測試TMP-SMX預防涵蓋與綠膿桿菌盲點。","options":{"A":"錯誤(可預防)。TMP-SMX可涵蓋Listeria。","B":"錯誤(可預防)。TMP-SMX為Nocardia有效藥。","C":"錯誤(可預防)。可涵蓋肺炎鏈球菌(有莢膜菌)。","D":"正確(為答案，最不適當)。對綠膿桿菌無效，無法以TMP-SMX預防。","E":"錯誤(可預防)。TMP-SMX為Pneumocystis預防首選。"},"sources":["Harrison 21e, TMP-SMX / Prophylaxis in Transplant","IDSA PCP Prophylaxis","Mandell 9e, Antimicrobial Spectrum"]}},"113-96":{"quick":"HSCT「早期(<1個月)」較不常見的是CMV(屬中期1–4個月再活化)；早期以E. coli、念珠菌、C. difficile、麴菌為主，故選C。","detail":{"background":"與112-94同一概念。造血幹細胞移植後「早期(移植後<1個月，嗜中性球低下期)」的感染以細菌(腸道革蘭陰性桿菌如E. coli、綠膿桿菌)、念珠菌(Candida albicans)、單純皰疹病毒(HSV)、艱難梭菌(C. difficile)、以及侵襲性麴菌(Aspergillus，可在中性球長期低下時出現)為主。巨細胞病毒(CMV)再活化典型在「中期(約30–100天)」細胞免疫尚未重建時發生，因此在早期(<1個月)「較不常出現」的致病原是CMV。故選C。本題與113-95、112-94同為HSCT感染時相系列，113年連續出此主題，反映移植照護是內專重點。早期防護:抗細菌/抗念珠菌/抗HSV預防;中期:CMV監測(pp65/PCR)與預防性/搶先治療(ganciclovir/letermovir)。","options":{"A":"錯誤(屬早期)。E. coli等腸道桿菌為早期常見。","B":"錯誤(屬早期)。念珠菌(Candida albicans)為早期常見真菌。","C":"正確(為答案)。CMV屬中期(1–4個月)再活化，早期較不常見。","D":"錯誤(屬早期)。C. difficile腸炎可見於早期。","E":"錯誤(屬早期)。Aspergillus可在早期中性球低下時出現。"},"sources":["Harrison 21e, Infections in HSCT","Mandell 9e, Post-transplant Infection Timeline"]}},"113-114":{"quick":"出現抗細胞激素自體抗體者易合併胞內菌/黴菌/NTM感染：anti-interferon-γ(抗IFN-γ，台灣成人型免疫缺損→播散性NTM)與anti-IL-23(IL-12/23-IFN-γ軸)，故(2)+(3)→B。","detail":{"background":"「抗細胞激素自體抗體(anti-cytokine autoantibodies)」是後天免疫缺損的重要機制，台灣與東亞研究貢獻卓著。最具代表性的是「抗干擾素-γ自體抗體(anti-interferon-γ autoantibody)」——造成成人型免疫缺損症候群，臨床以「播散性非結核分枝桿菌(disseminated NTM)」感染為標誌，並易合併沙門氏菌、Burkholderia、隱球菌、帶狀皰疹等胞內病原(IFN-γ是巨噬細胞活化、對抗胞內菌的關鍵)。IL-12/IL-23-IFN-γ軸(Mendelian susceptibility to mycobacterial disease, MSMD)缺損(含anti-IL-23相關)同樣導致對分枝桿菌/沙門氏菌易感。相對地，anti-IL-17/anti-IL-22自體抗體(常見於自體免疫多腺體症候群第一型/胸腺瘤)造成「慢性黏膜皮膚念珠菌病」;anti-GM-CSF自體抗體造成肺泡蛋白沉積症與隱球菌/Nocardia感染;anti-IL-4/IL-5/IL-13與過敏/嗜酸性相關，非胞內菌感染。本題答案(2)anti-IL-23+(3)anti-IFN-γ對應IL-12/23-IFN-γ軸缺損→胞內菌/黴菌/NTM感染。113年此題測試抗細胞激素自體抗體與NTM的台灣本土重點。","options":{"A":"錯誤。(1)anti-IL-4與過敏相關，非胞內菌感染。","B":"正確。(2)anti-IL-23與(3)anti-IFN-γ屬IL-12/23-IFN-γ軸缺損，易感胞內菌/黴菌/NTM。","C":"錯誤。(4)anti-IL-5與嗜酸性球相關。","D":"錯誤。(4)(5)與過敏/嗜酸性相關。","E":"錯誤。(1)(5)與胞內菌感染無直接關聯。"},"sources":["Harrison 21e, Anti-cytokine Autoantibodies / Adult Immunodeficiency","Browne SK et al. NEJM 2012 (anti-IFN-γ in Asia)","Mandell 9e, Disseminated NTM"]}},"114-90":{"quick":"allo-HSCT後「後期(6個月，常伴慢性GVHD)」瀰漫性感染風險最高者為有莢膜菌——肺炎球菌(Streptococcus pneumoniae)，故選B。","detail":{"background":"同種異體造血幹細胞移植(allo-HSCT)後期(移植後>100天至6個月以上)的感染風險，主要受「慢性移植物對抗宿主病(chronic GVHD)」及其免疫抑制治療影響，導致「體液免疫與脾功能不良(functional asplenia)」，因此對「有莢膜細菌(encapsulated bacteria)」尤其易感。後期瀰漫性感染風險最高者為肺炎球菌(Streptococcus pneumoniae，及其他有莢膜菌如Haemophilus、Neisseria)，故移植後期常給予預防性抗生素(如penicillin)並重新接種肺炎球菌等疫苗。相對地，綠膿桿菌、念珠菌主要在早期中性球低下期;CMV、Legionella雖可見但非「後期瀰漫性感染風險最高」;C. difficile為抗生素相關腸炎而非典型瀰漫性。故選B(肺炎球菌)。114年此題測試allo-HSCT後期慢性GVHD與有莢膜菌易感。","options":{"A":"錯誤。綠膿桿菌風險主要在早期中性球低下期。","B":"正確。後期(慢性GVHD、體液/脾功能不良)對有莢膜的肺炎球菌風險最高。","C":"錯誤。退伍軍人桿菌非後期瀰漫性感染最高風險者。","D":"錯誤。C. difficile為抗生素相關腸炎，非典型瀰漫性感染。","E":"錯誤。念珠菌主要在早期中性球低下/黏膜炎期。"},"sources":["Harrison 21e, Infections in Allo-HSCT / Chronic GVHD","IDSA HSCT Prevention Guidelines","Mandell 9e, Encapsulated Bacteria in Asplenia"]}},"109-102":{"quick":"登革熱共4型，二次感染不同型別時可因「抗體依賴性增強(ADE)」造成重症(出血熱/休克)，故衛教重點選C；病媒為斑蚊(白線/埃及)非瘧蚊、無終生交叉免疫。","detail":{"background":"登革熱(dengue)是台灣重要的蟲媒病(法定傳染病)，由登革病毒(Flavivirus，4種血清型DENV-1~4)經斑蚊(白線斑蚊Aedes albopictus、埃及斑蚊Aedes aegypti)叮咬傳播——「瘧蚊(Anopheles)」傳的是瘧疾，常被混淆。感染後對「同型」病毒終生免疫，但對「異型」僅短暫交叉保護；當日後感染「不同血清型」時，原有的非中和性抗體可能促進病毒進入單核/巨噬細胞，即「抗體依賴性免疫增強(antibody-dependent enhancement, ADE)」，是二次感染易演變為登革出血熱(DHF)/登革休克症候群(DSS)的關鍵機轉。出血熱/休克並不限於第一型，曾得過也不會終生免疫。Sanofi的減毒活疫苗(Dengvaxia)因ADE疑慮，「僅建議用於曾感染過登革熱(血清陽性)者」，未感染者接種反增重症風險——與選項E所述相反。故衛教正確者為C(ADE概念)。臨床處置以支持性治療、警示徵象監測、防蚊(蚊帳)與通報為主。109年此題測試登革熱ADE與防治。","options":{"A":"錯誤。台灣病媒為斑蚊(白線/埃及斑蚊)，非瘧蚊。","B":"錯誤。僅對「同型」終生免疫，異型無終生保護。","C":"正確。二次感染異型可因ADE造成重症(DHF/DSS)。","D":"錯誤。出血熱/休克不限第一型，曾得過亦非終生免疫。","E":"錯誤。Dengvaxia建議用於「曾感染過(血清陽性)」者，非未感染者。"},"sources":["Harrison 21e, Dengue","WHO Dengue Guidelines","Taiwan CDC 登革熱防治"]}},"109-111":{"quick":"鼠咬後高燒、淋巴腫、血培養長菌→鼠咬熱(Streptobacillus moniliformis)；此菌為「革蘭陰性」多形性桿菌，故「屬革蘭陽性桿菌」為非(選B)；首選penicillin、過敏用doxycycline。","detail":{"background":"鼠咬熱(rat-bite fever)是人畜共通傳染病，經鼠咬/抓或接觸鼠類分泌物/排泄物傳播。北美/歐洲主要致病菌為Streptobacillus moniliformis(也可由Spirillum minus引起，後者稱sodoku)。Streptobacillus moniliformis是「革蘭陰性、多形性(pleomorphic)的桿菌」，生長緩慢、營養要求高，常需3–7天甚至更久才培養出，因此本題敘述「屬革蘭陽性桿菌(Gram positive bacilli)」是錯誤的(為本題「何者為非」答案)。臨床表現:咬傷後數日發燒、畏寒、頭痛、遊走性多關節痛、淋巴腫脹、手足斑丘疹/瘀點，可併心內膜炎。治療首選penicillin G(或amoxicillin)，penicillin過敏者用doxycycline。需與其他鼠類相關感染鑑別(如Leptospira可經血清抗體力價診斷，故選項E正確)。109年此題測試鼠咬熱病原的革蘭染色與治療。","options":{"A":"正確。致病原為Streptobacillus moniliformis(或Spirillum/Pasteurella)。","B":"錯誤(為答案)。Streptobacillus moniliformis為「革蘭陰性」多形性桿菌，非陽性。","C":"正確。此菌生長緩慢，常需3–7天培養。","D":"正確。Penicillin過敏者可用doxycycline。","E":"正確。鼠類相關之Leptospira可利用血清抗體力價診斷。"},"sources":["Harrison 21e, Rat-bite Fever","Mandell 9e, Streptobacillus moniliformis","CDC Rat-bite Fever"]}},"110-84":{"quick":"腹瀉/便溏、階梯式高燒、相對心搏徐緩、玫瑰疹、肝脾腫、AST/ALT上升、血培革蘭陰性菌→傷寒(typhoid, Salmonella Typhi)，治療ceftriaxone，故選B。","detail":{"background":"本題35歲男性「腹部不適、稀便、漸進高燒、頭痛、皮疹、相對性心搏徐緩(體溫40°C但脈搏僅62/分，relative bradycardia, Faget sign)、玫瑰疹(下胸上腹變淡紅斑)、肝脾腫大壓痛、AST/ALT上升、白血球不高甚至偏低、二套血培養為革蘭陰性菌」——是典型傷寒(typhoid/enteric fever, Salmonella enterica serotype Typhi)的表現。傷寒經糞口途徑(污染食物/水)傳播，潛伏期約1–3週，第一週菌血症(血培養陽性率最高)、第二週玫瑰疹與相對心搏徐緩、可併腸出血/穿孔。治療：因東南亞/南亞抗藥(對fluoroquinolone的nalidixic acid抗藥、MDR)增加，第三代頭孢ceftriaxone為經驗首選，敏感者可用azithromycin或fluoroquinolone(視藥敏)。鈎端螺旋體(結膜充血、黃疸、腎衰)、退伍軍人病(肺炎+低鈉)、李斯特、布氏桿菌的情境與本題不符。故選B(傷寒，ceftriaxone)。110年此題測試傷寒的經典臨床與用藥。","options":{"A":"錯誤。鈎端螺旋體以結膜充血、黃疸、腎損為主，治療不同(penicillin/doxycycline)。","B":"正確。傷寒(Salmonella Typhi)，治療以ceftriaxone為經驗首選。","C":"錯誤。退伍軍人病以肺炎、低血鈉為主，非此腸熱表現。","D":"錯誤。李斯特菌感染情境(孕婦/老人腦膜炎)不符。","E":"錯誤。布氏桿菌病多有動物接觸、波狀熱，與此玫瑰疹/相對心搏徐緩不符。"},"sources":["Harrison 21e, Typhoid (Enteric) Fever","Mandell 9e, Salmonella Typhi","WHO Typhoid Treatment"]}},"110-86":{"quick":"鉤端螺旋體風險暴露：洪水氾濫後、溪流河川活動、廚師(處理鼠污染食材)、農田/獸醫/畜牧；三溫暖泡足部溫泉非典型，故(1)+(2)+(3)+(4)→D。","detail":{"background":"鉤端螺旋體病(leptospirosis)是全球分布的人畜共通螺旋體感染，藉「受感染動物(尤其囓齒類)尿液污染的水或土壤」經皮膚傷口/黏膜接觸傳播。高風險暴露:(1)洪水氾濫後(台灣颱風後群聚經典情境)、(2)在溪流河川活動(泛舟、戲水、鐵人三項)、(3)廚師(處理可能受鼠尿污染的食材/廚餘環境)、(4)從事農田、獸醫或畜牧工作(接觸動物與污染水土)。這些皆是教科書與台灣本土的高風險職業/活動。(5)「到三溫暖泡足部溫泉」並非典型鉤端螺旋體暴露(高溫氯化的人工溫泉不利病原存活)。臨床:雙相病程，初期發燒肌痛、結膜充血(無分泌物之conjunctival suffusion)，重症(Weil氏病)出現黃疸、急性腎損傷、出血。治療輕症doxycycline、重症penicillin G或ceftriaxone。故風險組合為(1)+(2)+(3)+(4)。110年此題測試鉤端螺旋體的暴露風險。","options":{"A":"錯誤。漏(3)廚師。","B":"錯誤。含(5)非典型暴露。","C":"錯誤。漏(2)溪流活動。","D":"正確。(1)洪水、(2)溪流、(3)廚師、(4)農牧/獸醫皆為高風險暴露。","E":"錯誤。(5)三溫暖泡足部溫泉非典型鉤端螺旋體暴露。"},"sources":["Harrison 21e, Leptospirosis","Mandell 9e, Leptospira","Taiwan CDC 鉤端螺旋體病"]}},"111-87":{"quick":"猴痘(monkeypox)：DNA病毒、與天花類似、天花疫苗約85%保護、密切接觸/性接觸傳播、皮疹臉部開始向外、單人病房及空氣防護等敘述皆正確，故全選(1)~(5)→D。","detail":{"background":"猴痘(M-pox/monkeypox)在2022年於非洲以外多國爆發並通報WHO，是當年重要新興傳染病。要點全為正確敘述:(1)由「DNA病毒」(痘病毒科Orthopoxvirus)引起，症狀類似天花但較輕，過去主要見於中非/西非鄰熱帶雨林地區；既往接種「天花疫苗對猴痘約有85%交叉保護力」;(2)傳播主要透過密切接觸感染者的皮膚病灶、呼吸道分泌物或污染物體，潛伏期約5–21天(多6–13天);(3)症狀含發燒、頭痛、肌痛、淋巴腺腫(淋巴結腫大是與天花重要區別)、虛脫，皮疹多由臉部開始向四肢擴散，從斑丘疹→水皰→膿皰，約10天結痂、2–3週脫落;(4)為人畜共通傳染病，2022疫情多經「性行為(尤其MSM)」傳播，會陰部病灶需與梅毒、軟性下疳、帶狀皰疹鑑別;(5)台灣CDC建議收治於具獨立衛浴單人病房，進行可能產生氣溶膠的醫療處置時需空氣傳染防護與適當PPE。故全部正確，選D。111年此題即時反映2022猴痘疫情。","options":{"A":"錯誤(不完整)。漏(4)，五項皆正確應全選。","B":"錯誤(不完整)。漏(4)(5)。","C":"錯誤。(3)亦正確，不應排除。","D":"正確。(1)~(5)皆為正確敘述。","E":"錯誤。(2)亦正確，不應排除。"},"sources":["Harrison 21e, Poxviruses / Mpox","WHO Mpox Guidance 2022","Taiwan CDC 猴痘"]}},"112-96":{"quick":"猴痘皮疹分布為「離心性(centrifugal)」——由臉部/軀幹中心向四肢蔓延；題目敘述「由四肢向臉部及軀幹中心(centripetal)蔓延」相反，故最不適當選E。","detail":{"background":"猴痘(Mpox)是雙股DNA痘病毒(Poxviridae, Orthopoxvirus)引起的人畜共通傳染病。正確要點:(A)屬痘病毒科正痘病毒屬，為dsDNA病毒;(B)接種天花(smallpox)疫苗可對猴痘產生「部分交叉免疫」(約85%);(C)主要藉囓齒類及靈長類動物傳播給人(人畜共通)，2022後人際性接觸傳播增加;(D)前驅症狀如發熱、頭痛、疲倦、淋巴結腫，約1–4天。錯誤者為(E)：傳統天花與猴痘的皮疹分布是「離心性(centrifugal)」——即「由臉部與軀幹中心向四肢(含手掌腳掌)擴散」，且各病灶「同步(同一階段)」演變;題目敘述「由四肢向臉部及軀幹中心(centripetal向心性)蔓延」剛好相反，故最不適當。(對比水痘為向心性、軀幹為主、各階段病灶並存。)112年此題測試猴痘皮疹分布方向。","options":{"A":"正確。猴痘病毒屬痘病毒科正痘病毒屬，為dsDNA病毒。","B":"正確。天花疫苗對猴痘有部分交叉免疫。","C":"正確。主要由囓齒類及靈長類傳播給人(人畜共通)。","D":"正確。前驅症狀(發熱、頭痛、疲倦)約1–4天。","E":"最不適當(為答案)。猴痘/天花皮疹為離心性(臉/中心→四肢)，非向心性。"},"sources":["Harrison 21e, Mpox / Smallpox","WHO Mpox Clinical Features","CDC Mpox Rash Distribution"]}},"113-82":{"quick":"菲律賓旅遊返國、反覆發燒+皮疹+束臂出血點(tourniquet sign)+白血球與血小板下降+NS1抗原陽性→登革熱；應支持性治療、防蚊(蚊帳)並通報疾管署，故選C。","detail":{"background":"本題為輸入性登革熱(dengue)的典型案例:近期東南亞(菲律賓)旅遊史、反覆發燒、頭痛、肌痛、皮疹，量血壓的束臂處出現出血點(tourniquet sign陽性，提示微血管脆弱/血小板下降)，抽血白血球(2100)與血小板(104k)下降、AST略升，且「登革熱NS1抗原陽性」直接確診急性登革感染。正確處置(C):登革熱為支持性治療(輸液、退燒以acetaminophen為主)、密切監測警示徵象(腹痛、持續嘔吐、黏膜出血、嗜睡、血比容上升伴血小板驟降)，並採「防蚊隔離(蚊帳)」避免病人再被斑蚊叮咬而擴大傳播，且為法定傳染病須通報疾管署。錯誤觀念:(A)血小板雖低但無活動性出血時「不宜常規預防性輸血小板」;(B)不需經驗性抗生素，且應「避免NSAID/aspirin」(增加出血風險);(D)感染後僅對同型終生免疫，異型仍可再感染(且ADE致重症)。故選C。113年此題測試輸入性登革熱的診斷與正確處置。","options":{"A":"錯誤。無活動性出血時不宜常規預防性輸血小板。","B":"錯誤。登革熱不需經驗性抗生素，且應避免NSAIDs(增加出血)。","C":"正確。高度懷疑登革熱→支持性治療、防蚊(蚊帳)並通報疾管署。","D":"錯誤。僅對同型終生免疫，異型仍可再感染(ADE致重症)。","E":"錯誤。C為正確處置，非以上皆非。"},"sources":["Harrison 21e, Dengue","WHO Dengue Case Management","Taiwan CDC 登革熱通報/防治"]}},"113-84":{"quick":"猴痘(Mpox)：DNA病毒、密切接觸/性接觸傳播、結痂前後皆具傳染力、人畜共通且需與性病鑑別、JYNNEOS疫苗可預防等皆正確，故全選(1)~(5)→D。","detail":{"background":"本題為猴痘(Mpox)的綜合正確敘述題，五項皆對:(1)由「DNA病毒」(痘病毒科)引起，症狀類似天花，過去主要見於中非/西非熱帶雨林地區;(2)主要透過密切接觸感染者皮膚病灶、呼吸道分泌物或污染物傳播，潛伏期約3–21天(多6–13天);(3)症狀含發燒、頭痛、肌痛、虛脫，皮疹由臉部開始向四肢擴散，斑丘疹→水皰→膿皰，約10天結痂、2–3週脫落，且「即使病灶結痂，碰觸仍有傳染風險」(直到痂皮完全脫落、新皮膚長出才不具傳染力);(4)為人畜共通傳染病，近期多經性行為傳播，會陰病灶需與梅毒、軟性下疳、帶狀皰疹鑑別;(5)猴痘疫苗(JYNNEOS, 第三代非複製型天花/猴痘疫苗)可用於暴露前/後預防。故全部正確，選D。與111-87同主題，113年再考反映Mpox持續為公衛重點。","options":{"A":"錯誤(不完整)。漏(4)(5)。","B":"錯誤(不完整)。漏(5)。","C":"錯誤。(3)亦正確，不應排除。","D":"正確。(1)~(5)皆為正確敘述(含結痂前後皆具傳染力、JYNNEOS疫苗可預防)。","E":"錯誤。(4)亦正確，不應排除。"},"sources":["Harrison 21e, Mpox","WHO/CDC Mpox Guidance","JYNNEOS Vaccine (ACIP)"]}},"114-83":{"quick":"颱風後傷口接觸污泥→腳膿瘍與雙側肺炎、安全別針狀革蘭陰性菌＝類鼻疽(Burkholderia pseudomallei)；治療須「強化期2週靜脈ceftazidime/meropenem＋根除期口服TMP-SMX 3–6個月」，故「ceftazidime 2–4週即治癒」最錯，選D。","detail":{"background":"類鼻疽(melioidosis)由Burkholderia pseudomallei引起，是台灣(尤其南部、颱風後)與東南亞/北澳的重要環境性人畜共通感染。病原存於土壤與地表水，經「皮膚傷口接觸污染土壤/水」或吸入(颱風、強風揚塵)感染，糖尿病是最重要的宿主危險因子(其他:慢性肺/腎病、地中海型貧血、酗酒、免疫抑制)。臨床多樣:局部膿瘍、肺炎(可似結核)、敗血症與休克、多發臟器膿瘍，顯微鏡下呈現「兩端濃染的安全別針狀(safety-pin/bipolar)」革蘭陰性桿菌。治療分兩階段且療程長:強化期(intensive)2–8週靜脈ceftazidime或meropenem/imipenem；接續根除期(eradication)口服TMP-SMX(±doxycycline)至少3–6個月以防復發。故「使用ceftazidime治療2–4週即可完全治癒」是錯誤——療程遠不止此且需口服根除期，否則易復發。114年此題測試類鼻疽的台灣本土流行、外觀與長療程治療。","options":{"A":"正確。致病菌為Burkholderia pseudomallei，革蘭陰性、安全別針狀外觀。","B":"正確。傳染途徑為傷口接觸污染土壤/水，亦可吸入感染。","C":"正確。急性可致嚴重肺炎、敗血症與休克。","D":"錯誤(為答案)。需強化期2週以上IV＋口服根除期3–6個月，非「ceftazidime 2–4週即治癒」。","E":"正確。糖尿病、慢性肺/腎病、地中海型貧血、免疫抑制為高風險因子。"},"sources":["Harrison 21e, Melioidosis (Burkholderia pseudomallei)","Mandell 9e, Melioidosis Therapy","Taiwan CDC 類鼻疽"]}},"114-84":{"quick":"颱風後清淤水→發燒、肌痛、結膜充血、黃疸、急性腎衰＝鉤端螺旋體病(Weil氏病)；應優先考慮、治療用penicillin或ceftriaxone，故(1)+(3)+(4)→B；診斷靠血清/PCR非常規培養，azithromycin非首選。","detail":{"background":"本題為颱風後鉤端螺旋體病(leptospirosis)的重症(Weil氏病)案例:清理淹水(接觸鼠尿污染水土)後一週發燒、頭痛、全身痠痛、食慾差，理學見「結膜充血(conjunctival suffusion)」，並出現黃疸與急性腎衰竭——這是Weil氏病的肝腎症候群三聯(黃疸、腎衰、出血傾向)。正確:(1)應「優先考慮鉤端螺旋體病」(颱風後+水土暴露+結膜充血+黃疸+腎衰為典型);(3)首選治療可用penicillin G(重症靜脈);(4)亦可用ceftriaxone(重症療效與penicillin相當)。錯誤:(2)診斷「主要依細菌培養」不正確——leptospira培養困難、耗時數週、敏感度低，臨床診斷主要靠「血清學(MAT顯微凝集試驗、IgM)與PCR」;(5)輕症可用doxycycline或azithromycin，但重症首選為penicillin/ceftriaxone，「azithromycin為首選」不正確。故正確組合為(1)+(3)+(4)。114年此題與110-86呼應，測試颱風後鉤端螺旋體的診治。","options":{"A":"錯誤。含(2)「主要依細菌培養」之錯誤。","B":"正確。(1)優先考慮鉤端螺旋體、(3)penicillin、(4)ceftriaxone皆正確。","C":"錯誤。含(2)錯誤、且漏(1)。","D":"錯誤。含(2)。","E":"錯誤。含(2)(5)，azithromycin非重症首選。"},"sources":["Harrison 21e, Leptospirosis (Weil disease)","Mandell 9e, Leptospira Diagnosis (serology/PCR)","Taiwan CDC 鉤端螺旋體病"]}},"112-77":{"quick":"退伍軍人症(Legionella)為胞內菌，β-lactam(含第三代頭孢ceftriaxone)無效；治療須用「呼吸型fluoroquinolone或巨環類(azithromycin)」，故「免疫低下者用第三代頭孢可有效治療」為非，選C。","detail":{"background":"退伍軍人症(Legionellosis)由Legionella pneumophila(嗜氧革蘭陰性桿菌、難以一般染色顯現、需BCYE培養基)引起，是非典型肺炎的重要病原。流行病學:經吸入受污染水源產生的氣溶膠傳播(冷卻水塔、熱水系統、噴泉、加濕器)，潛伏期約2–10天，重症與免疫低下、吸菸、慢性肺病者相關;臨床除肺炎外可有相對心搏徐緩、低血鈉、肝功能異常、腹瀉、意識改變，並可肺外感染(心內膜炎、腹膜炎、腎盂腎炎等)；診斷常用尿液抗原(對血清型1敏感)。關鍵治療:Legionella是「胞內菌」，必須用能進入細胞的抗生素——「呼吸型fluoroquinolone(levofloxacin/moxifloxacin)或巨環類(azithromycin)」為首選;β-lactam(包含第三代頭孢ceftriaxone)因無法有效作用於胞內菌而「治療無效」。故本題敘述「免疫低下感染者使用10–14天第三代頭孢(如ceftriaxone)可有效治療」是錯誤(為「為非」答案)。供水系統可用二氧化氯或銅銀離子消毒(D正確)。112年此題測試Legionella的胞內菌特性與正確用藥。","options":{"A":"正確。Legionella為嗜氧革蘭陰性桿菌，主要為L. pneumophila致病。","B":"正確。經吸入污染水源氣溶膠傳播，潛伏期約2–10天。","C":"錯誤(為答案)。Legionella為胞內菌，第三代頭孢(β-lactam)無效；應用fluoroquinolone或巨環類。","D":"正確。供水系統可用二氧化氯或銅-銀離子消毒。","E":"正確。Legionella可造成肺外感染(如腹膜炎、腎盂腎炎)。"},"sources":["Harrison 21e, Legionella Infections","IDSA/ATS CAP 2019","Mandell 9e, Legionellosis Therapy"]}},"103-綜-5":{"quick":"Fournier壞疽是「會陰/生殖器」的壞死性筋膜炎，並非「肢體」的別稱，故D敘述為非；台灣壞死性軟組織感染Klebsiella比例較高、需早期清創＋抗生素皆正確。","detail":{"background":"皮膚軟組織感染(SSTI)的重症為壞死性筋膜炎(necrotizing fasciitis, NF)——沿筋膜快速蔓延的壞死性感染，死亡率可達20–30%以上，臨床「疼痛與外觀不成比例」、皮膚變色/水皰、捻髮音、全身毒性，是外科急症。台灣的特色:糖尿病盛行使Klebsiella pneumoniae在台灣的壞死性軟組織感染與肝膿瘍比例「高於歐美」(歐美NF以A群鏈球菌、混合菌、海洋弧菌為主)。治療鐵則為「儘早外科清創＋廣效有效抗生素(涵蓋革蘭陽性、陰性與厭氧，A群鏈球菌時加clindamycin抑毒素)」。Primary pyomyositis(原發性化膿性肌炎)是骨骼肌內形成膿瘍，最常見致病菌為金黃色葡萄球菌(S. aureus)。錯誤者為(D):「Fournier氏壞疽(Fournier gangrene)」是發生於「會陰、生殖器與肛周」的壞死性筋膜炎，並非「發生在肢體」的別稱，故敘述錯誤(為本題「為非」答案)。103年此題測試NF的台灣流行與Fournier壞疽的定位。","options":{"A":"正確。台灣因糖尿病盛行，Klebsiella pneumoniae比例較歐美高。","B":"正確。壞死性筋膜炎沿筋膜快速蔓延，死亡率可達26%。","C":"正確。治療需儘早外科清創及有效抗生素。","D":"錯誤(為答案)。Fournier壞疽為「會陰/生殖器」的壞死性筋膜炎，非「肢體」之別稱。","E":"正確。原發性化膿性肌炎最常見致病菌為金黃色葡萄球菌。"},"sources":["Harrison 21e, Necrotizing Soft-Tissue Infections","Mandell 9e, Necrotizing Fasciitis / Fournier","IDSA 2014 SSTI Guidelines"]}},"110-85":{"quick":"動物咬傷處置：狗貓咬涵蓋Pasteurella與厭氧、首選amoxicillin/clavulanate、考慮狂犬病皆對；但「被猴子咬亦只用amox/clav、無需抗病毒」為錯——猴咬須考慮皰疹B病毒(herpes B)抗病毒預防，故選E。","detail":{"background":"動物咬傷感染處置常考。要點:(A)狗咬與貓咬的致病菌包括金黃色葡萄球菌、巴士德桿菌(Pasteurella multocida，貓咬尤其)、厭氧菌與Capnocytophaga;(B)首選抗生素為amoxicillin/clavulanate(或ampicillin/sulbactam)——能涵蓋Pasteurella與厭氧菌;(C)penicillin過敏者替代為「doxycycline或fluoroquinolone＋抗厭氧(clindamycin或metronidazole)」或clindamycin+TMP-SMX;(D)所有哺乳類咬傷都需評估狂犬病(rabies)暴露後預防與破傷風。錯誤者為(E):「被猴子咬傷只用amoxicillin/clavulanate、無需考慮抗病毒藥」是錯的——獼猴(macaque)咬傷/抓傷須警覺「B病毒(Herpes B virus, Cercopithecine herpesvirus 1)」，可致致命性腦脊髓炎，須立即沖洗傷口並考慮acyclovir/valacyclovir抗病毒預防。故E為「不正確」答案。110年此題測試動物咬傷與猴咬B病毒的特殊性。","options":{"A":"正確。狗貓咬致病菌含金黃色葡萄球菌、Pasteurella multocida與厭氧菌。","B":"正確。首選amoxicillin/clavulanate或ampicillin/sulbactam。","C":"正確。penicillin過敏可用clindamycin+TMP-SMX或fluoroquinolone。","D":"正確。哺乳類咬傷須評估狂犬病預防。","E":"錯誤(為答案)。猴咬須考慮B病毒(herpes B)、給予抗病毒預防，非僅用抗生素。"},"sources":["Harrison 21e, Bite Wound Infections","CDC Herpes B Virus (Macaque bites)","IDSA 2014 SSTI Guidelines"]}},"111-85":{"quick":"海水/魚鉤受傷＋C肝肝硬化→壞死性筋膜炎、出血性水泡、彎曲的革蘭陰性桿菌＝海洋創傷弧菌(Vibrio vulnificus)，故選D。","detail":{"background":"本題男性「海邊涉水踩魚鉤受傷」、「C型肝炎併肝硬化」、發燒與左下肢紅腫疼痛快速上行、「出血性水泡(hemorrhagic bullae)」、清創見壞死性肌筋膜炎、革蘭染色為「彎曲的革蘭陰性桿菌」——是海洋創傷弧菌(Vibrio vulnificus)感染的經典圖像。Vibrio vulnificus存於溫暖海水與生鮮海產(尤其生蠔)，感染途徑為「傷口接觸海水/海產」或「食入生蠔」;高危宿主為「肝硬化/慢性肝病、血色素沉著症、酗酒、免疫低下」(因鐵質可用性增加細菌毒力)。臨床可暴發性壞死性軟組織感染與原發性敗血症(食入後)，死亡率高，須「緊急清創＋抗生素(doxycycline＋第三代頭孢ceftriaxone/ceftazidime為建議組合)」。革蘭染色「彎曲桿菌」是弧菌特徵。其他選項:Erysipelothrix(豬/魚處理者，類丹毒)、Listeria、Mycobacterium marinum(魚缸肉芽腫，慢性)、Legionella皆與此暴發性壞死/出血性水泡不符。故選D。111年此題測試海水傷口+肝硬化→Vibrio vulnificus的招牌情境。","options":{"A":"錯誤。Erysipelothrix造成類丹毒(局部、慢性)，非暴發壞死性筋膜炎。","B":"錯誤。Listeria不以海水傷口壞死性筋膜炎表現。","C":"錯誤。Mycobacterium marinum造成慢性「魚缸肉芽腫」，非急性壞死。","D":"正確。海水傷口＋肝硬化＋出血性水泡＋彎曲革蘭陰性桿菌＝Vibrio vulnificus。","E":"錯誤。Legionella為肺炎病原，非軟組織壞死。"},"sources":["Harrison 21e, Vibrio vulnificus Infections","Mandell 9e, Vibrio Soft-tissue Infection","IDSA 2014 SSTI Guidelines"]}},"111-86":{"quick":"健康年輕人蚊蟲叮咬後局部單純蜂窩組織炎(無膿、無全身毒性)→致病菌多為鏈球菌/葡萄球菌，門診口服首選cephalexin(第一代頭孢)，故選D。","detail":{"background":"單純性蜂窩組織炎(non-purulent cellulitis，無膿瘍、無膿汁)的最常見致病菌是「β溶血性鏈球菌(尤其A群)」與「甲氧西林敏感金黃色葡萄球菌(MSSA)」。本題24歲平常健康男性、蚊蟲叮咬後左腳局部紅腫溫熱、「無化膿、無淋巴結腫痛、無全身毒性徵象」，屬輕度單純蜂窩組織炎，門診口服抗生素首選為涵蓋鏈球菌與MSSA的「第一代頭孢cephalexin」(或cloxacillin、amoxicillin-clavulanate)。若為「化膿性(purulent)」感染/膿瘍且疑CA-MRSA，才需切開引流並用TMP-SMX或doxycycline。其他選項:moxifloxacin/ciprofloxacin(fluoroquinolone)對單純蜂窩組織炎的革蘭陽性涵蓋與抗藥考量不適合作首選;linezolid為MRSA重症保留藥、不會作為單純蜂窩組織炎門診首選;doxycycline主要用於疑MRSA膿瘍或特定病原。故選D(cephalexin)。111年此題測試單純蜂窩組織炎的門診首選口服藥。","options":{"A":"錯誤。Moxifloxacin對單純蜂窩組織炎非首選(抗藥/涵蓋考量)。","B":"錯誤。Ciprofloxacin對革蘭陽性(鏈球菌)涵蓋不佳，非首選。","C":"錯誤。Linezolid為MRSA重症保留藥，非單純蜂窩組織炎門診首選。","D":"正確。單純蜂窩組織炎口服首選cephalexin(涵蓋鏈球菌與MSSA)。","E":"錯誤。Doxycycline用於疑MRSA膿瘍等，非此單純蜂窩組織炎首選。"},"sources":["IDSA 2014 SSTI Guidelines","Harrison 21e, Cellulitis","Mandell 9e, Skin and Soft Tissue Infections"]}},"111-96":{"quick":"狗咬傷：致病菌含S. aureus、Pasteurella、厭氧；首選amox/clav；Capnocytophaga敗血症血培養需長時間；須評估狂犬病——皆對；但penicillin過敏「用macrolide替代」為錯(對Pasteurella/厭氧涵蓋不足)，選D。","detail":{"background":"狗咬傷感染處置:(A)常見致病原為金黃色葡萄球菌(Staphylococcus aureus)、Pasteurella multocida、厭氧菌(及Capnocytophaga canimorsus);(B)Capnocytophaga canimorsus可在無脾/肝硬化/酗酒者引起猛爆性敗血症，且培養生長慢，血液培養可能需延長至「14天」;(C)首選治療為amoxicillin/clavulanate或ampicillin/sulbactam(涵蓋Pasteurella與厭氧);(E)須評估狂犬病(rabies)暴露後預防與破傷風。錯誤者為(D):penicillin過敏「用macrolide(巨環類)做替代」並不適當——macrolide對Pasteurella multocida與厭氧菌的涵蓋不足/不可靠，正確替代應為「doxycycline或fluoroquinolone＋抗厭氧(metronidazole/clindamycin)」或clindamycin+TMP-SMX。故D為「不正確」答案。111年此題測試狗咬傷的病原涵蓋與penicillin過敏替代。","options":{"A":"正確。狗咬常見S. aureus、Pasteurella multocida、厭氧菌。","B":"正確。Capnocytophaga canimorsus敗血症血培養可能需長至14天。","C":"正確。首選amoxicillin/clavulanate或ampicillin/sulbactam。","D":"錯誤(為答案)。penicillin過敏不宜僅用macrolide(對Pasteurella/厭氧涵蓋不足)，應用doxycycline/FQ＋抗厭氧。","E":"正確。須評估狂犬病暴露後預防。"},"sources":["Harrison 21e, Bite Wound Infections","Mandell 9e, Capnocytophaga / Pasteurella","IDSA 2014 SSTI Guidelines"]}},"112-93":{"quick":"動物咬傷-病原配對：猴(Monkey)咬的特殊風險是「B病毒(herpes B)」與混合口腔菌，而Streptobacillus moniliformis是「鼠(rat)」咬熱的病原，配對錯置，故最不適當選C。","detail":{"background":"動物咬傷與致病原配對:(A)狗(Dog)咬–Pasteurella multocida(及S. aureus、厭氧);(B)人(Human)咬–口腔草綠色鏈球菌(viridans streptococci)、Eikenella corrodens、厭氧;(D)蛇(Snake)咬–口腔菌叢含Pseudomonas aeruginosa、Morganella、厭氧等(故需廣效抗生素);(E)鼠(Rodent)–Leptospira(及鼠咬熱Streptobacillus moniliformis)。錯誤配對為(C):「猴(Monkey)–Streptobacillus moniliformis」——Streptobacillus moniliformis是「鼠咬熱」的病原，並非猴咬;猴(尤其獼猴)咬傷的特殊風險是「B病毒(Herpes B virus)」(致命腦脊髓炎，需acyclovir/valacyclovir預防)及口腔混合菌。故配對最不適當者為C。112年此題與110-85呼應，測試猴咬B病毒與鼠咬熱病原的區辨。","options":{"A":"正確配對。狗咬–Pasteurella multocida。","B":"正確配對。人咬–viridans streptococci(及Eikenella)。","C":"最不適當(為答案)。Streptobacillus moniliformis為「鼠咬熱」病原；猴咬特殊風險為B病毒。","D":"正確配對。蛇咬口腔菌含Pseudomonas aeruginosa等。","E":"正確配對。鼠(囓齒類)–Leptospira。"},"sources":["Harrison 21e, Bite Wounds / Herpes B","Mandell 9e, Animal Bite Pathogens","CDC Herpes B Virus"]}},"112-156":{"quick":"疥瘡(scabies)：初次感染可能長達4–6週才癢(致敏期)、結痂型(挪威疥)好發於免疫低下臥床衰弱者；故(1)+(3)→C。塗藥需全身、寵物疥蟲為人畜共通可暫時侵擾、成人好發指縫/腕/腰非臉部。","detail":{"background":"疥瘡(scabies)由人疥蟎(Sarcoptes scabiei var. hominis)寄生表皮所致，經密切皮膚接觸傳播(機構/家庭群聚常見)。正確:(1)「初次」感染因尚未致敏，潛伏(無症狀)期可長達「4–6週」才出現劇癢(再次感染則因已致敏，1–3天即癢);(3)「結痂型疥瘡(挪威疥, crusted/Norwegian scabies)」蟲量極大、傳染力極強，好發於「免疫力低下、年長衰弱、臥床」病人(如AIDS、類固醇/免疫抑制、失能)。錯誤:(2)治療(permethrin/ivermectin)需「全身塗抹(頸部以下全身，含指縫、皺褶、生殖器)」並過夜，僅塗紅疹處不足以根除，且須同時治療接觸者、處理衣物寢具;(4)動物疥蟎(犬疥)雖宿主特異，但可暫時叮咬人類造成短暫搔癢(自限)，並非「完全不會」;(5)成人疥瘡好發於「指縫、腕屈側、腋下、腰、生殖器、乳暈」等皮膚薄/皺褶處，「臉部」少見(嬰幼兒才常見頭臉)。故正確為(1)+(3)。112年此題測試疥瘡致敏期、挪威疥與好發部位。","options":{"A":"錯誤。含(2)塗藥僅紅疹處之錯誤。","B":"錯誤。含(2)(4)錯誤。","C":"正確。(1)初次感染可達4–6週才癢、(3)結痂型疥瘡好發免疫低下臥床者。","D":"錯誤。(2)塗藥僅患部不足、(4)動物疥蟎可暫時侵擾人。","E":"錯誤。(5)成人好發指縫/腕/腰而非臉部。"},"sources":["Harrison 21e, Scabies","Mandell 9e, Ectoparasites","CDC Scabies (treatment of contacts)"]}},"112-160":{"quick":"圖示為境界清楚、紅腫熱痛的丹毒/蜂窩組織炎樣病灶→最可能由「鏈球菌(Streptococcus，尤其A群β溶血)」造成，故選E。","detail":{"background":"本題附圖為皮膚紅腫、境界相對清楚、表面緊繃發亮的丹毒(erysipelas)/蜂窩組織炎(cellulitis)樣病灶。此類「非化膿性、界線清楚、快速擴散」的皮膚軟組織感染最常見致病菌為「β溶血性鏈球菌(尤其A群Streptococcus pyogenes)」(丹毒幾乎都由鏈球菌引起，侵犯真皮上層與淋巴管，故界線分明、可有淋巴管炎紅線)。治療以penicillin/amoxicillin或第一代頭孢cephalexin為主。其他選項:Nocardia(土壤絲菌，造成慢性化膿/淋巴皮膚型或肺/腦)、Mycobacterium(慢性肉芽腫)、Varicella zoster(沿皮節水疱)、Candida(間擦疹/黏膜)皆與此急性界線清楚的紅腫病灶不符。故選E(鏈球菌)。112年此題以臨床圖測試丹毒/蜂窩組織炎的鏈球菌病原。","options":{"A":"錯誤。Nocardia造成慢性化膿性/淋巴皮膚或肺腦病灶，非此急性丹毒樣。","B":"錯誤。分枝桿菌造成慢性肉芽腫，非急性界線清楚紅腫。","C":"錯誤。帶狀皰疹沿皮節分布水疱，外觀不同。","D":"錯誤。念珠菌多為間擦疹/黏膜白斑，非此表現。","E":"正確。境界清楚的丹毒/蜂窩組織炎樣病灶最可能由鏈球菌造成。"},"sources":["Harrison 21e, Erysipelas / Cellulitis","IDSA 2014 SSTI Guidelines","Mandell 9e, Streptococcal Skin Infections"]}},"113-87":{"quick":"A族鏈球菌(食肉菌)：咽喉炎(可猩紅熱)、膿痂疹/丹毒/蜂窩組織炎、嚴重致壞死性筋膜炎/毒性休克、密切接觸易傳播、10天amoxicillin治咽喉炎可縮短病程並降低風濕熱——皆正確，故全選(1)~(5)→E。","detail":{"background":"本題對應近年「食肉菌(A族鏈球菌, Group A Streptococcus, GAS, Streptococcus pyogenes)侵襲性感染」的新聞與公衛關注，五項皆為正確敘述:(1)GAS急性咽喉炎可有不等程度發燒、喉痛、咽喉紅腫、扁桃腺與後咽部化膿，並可因紅疹毒素表現「猩紅熱(scarlet fever)」;(2)皮膚表現可為膿痂疹(impetigo)、丹毒(erysipelas)或蜂窩組織炎;(3)嚴重侵襲性感染可造成壞死性肌筋膜炎(necrotizing fasciitis)甚或鏈球菌毒性休克症候群(STSS);(4)同住家人、密切接觸者或擁擠環境(學校、軍營)容易傳播;(5)急性咽喉炎以「10天口服amoxicillin/penicillin」治療可縮短症狀病程、降低化膿性併發症與「急性風濕熱」風險(GAS至今對penicillin 100%敏感)。嚴重侵襲性感染治療為penicillin＋clindamycin(抑制毒素與M蛋白生成)。故全部正確，選E。113年此題即時呼應GAS侵襲性感染議題。","options":{"A":"錯誤(不完整)。漏(4)(5)。","B":"錯誤(不完整)。漏(2)(4)。","C":"錯誤(不完整)。漏(5)。","D":"錯誤(不完整)。漏(4)。","E":"正確。(1)~(5)皆為正確敘述。"},"sources":["Harrison 21e, Streptococcus pyogenes Infections","IDSA 2012 GAS Pharyngitis / 2014 SSTI","CDC Invasive Group A Strep"]}},"111-158":{"quick":"印尼移工、紅色丘疹斑塊擴散全身、外側眉毛脫失、病灶麻木、真皮泡沫細胞(foam cells)＋大量抗酸菌→腫瘤型漢生病(Lepromatous leprosy)，故選E。","detail":{"background":"漢生病(leprosy/Hansen disease)由Mycobacterium leprae(及M. lepromatosis)引起，是慢性肉芽腫性感染，主要侵犯「皮膚與周邊神經」，潛伏期可長達數年，移工/移民(來自流行區如印尼、印度)是台灣的重要族群。依宿主細胞免疫(Th1 vs Th2)呈現光譜:類結核型(tuberculoid, TT)——細胞免疫強、病灶少而界線清楚、神經受損早、抗酸菌少;腫瘤型(lepromatous, LL)——細胞免疫弱、菌量極多、病灶廣泛對稱、皮膚浸潤增厚、外側眉毛脫失(madarosis)、獅面(leonine facies)、周邊神經對稱性麻木，病理見「真皮充滿載菌的泡沫狀組織球(foam cells/Virchow lepra cells)與大量抗酸菌」。本題「全身擴散的紅色丘疹斑塊、外側眉毛脫失、病灶麻木感、真皮泡沫細胞＋大量抗酸菌」完全符合腫瘤型漢生病(LL)。治療為多重藥物療法(MDT: dapsone＋rifampin＋clofazimine)。其他選項(尋常狼瘡=皮膚結核、類肉瘤病、環形肉芽腫、類結核型)與「泡沫細胞＋大量抗酸菌」之多菌型不符。故選E。111年此題以移工皮膚病理測試腫瘤型漢生病。","options":{"A":"錯誤。類結核型漢生病菌量少、病灶少而界線清楚，與「大量抗酸菌/泡沫細胞」不符。","B":"錯誤。尋常狼瘡為皮膚結核，病理不以泡沫細胞＋大量抗酸菌表現。","C":"錯誤。類肉瘤病為非乾酪性肉芽腫、抗酸菌染色陰性。","D":"錯誤。環形肉芽腫為柵欄狀肉芽腫，無抗酸菌。","E":"正確。泡沫細胞＋大量抗酸菌＋眉毛脫失/麻木的多菌型表現＝腫瘤型漢生病。"},"sources":["Harrison 21e, Leprosy (Hansen Disease)","Mandell 9e, Mycobacterium leprae","WHO Leprosy MDT"]}},"110-156":{"quick":"無症狀、反覆/持續、有東南亞旅遊與性接觸風險的軀幹皮疹，最須先排除「二期梅毒」→抽血驗VDRL/RPR(非特異)及TPPA/TPHA(特異)，故選C。","detail":{"background":"梅毒(syphilis, Treponema pallidum)是「偉大的模仿者」，二期梅毒(secondary syphilis)的皮疹多樣且常「無症狀(不癢)」，可見軀幹與「手掌腳掌」對稱性斑丘疹、扁平濕疣、黏膜斑、不規則脫髮，常伴全身淋巴結腫，且會自行消退而反覆——與本題「東南亞旅遊史、無症狀皮疹持續2個月」相符。診斷採「兩類血清學併用」:非特異性試驗VDRL/RPR(反映疾病活性、可定量追蹤治療反應，但有偽陽性)＋特異性試驗TPPA/TPHA或FTA-ABS(確認感染、終生陽性)。本題最需要的檢查即為「抽血檢測VDRL/RPR及TPPA/TPHA效價」(選C)。其他選項:KOH(黴菌)、非典型分枝桿菌切片(慢性結節)、Borrelia(萊姆病，需流行區蜱叮咬史)、伍氏燈(色素/紅癬)皆非此情境首要。梅毒治療首選benzathine penicillin G。110年此題以旅遊+無症狀皮疹測試二期梅毒的血清學診斷。","options":{"A":"錯誤。KOH檢查用於表淺黴菌感染，與此無症狀軀幹皮疹不符。","B":"錯誤。非典型分枝桿菌切片用於慢性結節/潰瘍，非首要。","C":"正確。最須排除二期梅毒，抽血驗VDRL/RPR與TPPA/TPHA。","D":"錯誤。Borrelia(萊姆病)需流行區蜱叮咬史，台灣/東南亞非典型。","E":"錯誤。伍氏燈用於色素性疾病/紅癬等，非此診斷。"},"sources":["Harrison 21e, Syphilis","CDC STI Treatment Guidelines 2021","Mandell 9e, Treponema pallidum"]}},"111-95":{"quick":"性病表徵-病原配對為非者：生殖器疣(Genital warts)由「HPV第6/11型」造成，並非「人類第8型皰疹病毒(HHV-8)」，故選D。","detail":{"background":"性傳染病(STI)的症候群-病原配對是基本功:(A)副睪炎(epididymitis)在年輕男性多由Chlamydia trachomatis(及Neisseria gonorrhoeae)引起;(B)前庭大腺炎(Bartholinitis)可由淋菌、披衣菌或陰道滴蟲(Trichomonas vaginalis)等引起;(C)輸卵管疤痕導致不孕(infertility)可因淋菌(Neisseria gonorrhoeae)/披衣菌上行造成骨盆腔炎(PID)後遺;(E)生殖器潰瘍(genital ulcers)可由Haemophilus ducreyi(軟性下疳)、梅毒(硬性下疳)、HSV等造成。錯誤配對為(D):「生殖器疣(Genital warts，尖圭濕疣/菜花)」由「人類乳突病毒(HPV)第6、11型(低致癌風險型)」造成，而非「人類第8型皰疹病毒(HHV-8)」——HHV-8是Kaposi肉瘤的病原。故配對為非者選D。111年此題測試STI症候群與病原的精準配對，及HPV vs HHV-8的區辨。","options":{"A":"正確配對。副睪炎–Chlamydia trachomatis。","B":"正確配對。前庭大腺炎–可由Trichomonas等引起。","C":"正確配對。淋菌致PID後不孕。","D":"錯誤(為答案)。生殖器疣由HPV第6/11型造成，非HHV-8。","E":"正確配對。生殖器潰瘍–Haemophilus ducreyi(軟性下疳)。"},"sources":["Harrison 21e, Sexually Transmitted Infections","CDC STI Treatment Guidelines 2021","Mandell 9e, HPV / HHV-8"]}},"112-87":{"quick":"披衣菌與淋菌診斷的首選是「核酸增幅檢驗(NAAT)」，其敏感度「優於」培養與革蘭染色，故「NAAT不如培養和革蘭染色」為錯誤(選E)。","detail":{"background":"台灣愛滋防治強調安全性行為、篩檢與暴露前預防性投藥(PrEP)，但性傳染的梅毒、淋病、砂眼披衣菌仍上升。關於披衣菌(Chlamydia trachomatis)與淋菌(Neisseria gonorrhoeae)的正確敘述:(A)披衣菌感染「常無症狀」，女性可上行造成子宮外孕、不孕與慢性骨盆腔疼痛;(B)美國建議對「孕婦、有風險因子的年輕女性、男男性行為者(MSM)」每年篩檢披衣菌與淋菌;(C)淋菌可造成子宮頸炎、骨盆腔炎、尿道炎、副睪炎，也可造成咽炎與肛門直腸感染;(D)瀰漫性淋菌感染(DGI)以關節炎-皮膚炎症候群或化膿性關節炎表現。錯誤者為(E):披衣菌與淋菌診斷的「核酸增幅檢驗(NAAT)」敏感度與專一度「高於」傳統培養與革蘭染色，已成為首選檢驗(可用尿液、自採拭子，並適用咽喉/直腸採檢)；故「NAAT敏感性不如培養和革蘭染色」是錯誤。(註:淋菌培養仍有藥敏監測價值。)治療:淋菌現以ceftriaxone單次注射，披衣菌以doxycycline 7天。112年此題測試NAAT為STI首選診斷。","options":{"A":"正確。披衣菌常無症狀，可致子宮外孕、不孕、慢性骨盆腔痛。","B":"正確。孕婦、高風險年輕女性與MSM建議每年篩檢。","C":"正確。淋菌可致子宮頸炎、PID、尿道炎、咽炎與肛門直腸感染。","D":"正確。瀰漫性淋菌感染以關節炎-皮膚炎或化膿性關節炎表現。","E":"錯誤(為答案)。NAAT對披衣菌/淋菌敏感度優於培養與革蘭染色，為首選檢驗。"},"sources":["CDC STI Treatment Guidelines 2021","Harrison 21e, Gonococcal/Chlamydial Infections","Mandell 9e, NAAT for STI"]}},"113-158":{"quick":"二期梅毒皮膚表現：不規則蟲蝕狀禿髮、軀幹斑丘疹、手掌腳掌丘疹、扁平濕疣皆對；「結節性梅毒腫(gumma)」屬「三期梅毒」，非二期，故選D。","detail":{"background":"梅毒分期的皮膚表現是重要考點。二期梅毒(secondary syphilis，感染後數週至數月，血行播散)的皮膚黏膜表現:(A)不規則「蟲蝕狀」禿髮(moth-eaten alopecia);(B)軀幹對稱性斑狀丘狀疹(maculopapular truncal eruption);(C)「手掌與腳掌」的丘疹(palmar/plantar papules，是二期梅毒的特徵性線索之一);(E)扁平濕疣(condylomata lata，潮濕部位的高傳染性灰白色斑塊)。錯誤者為(D):「結節性梅毒腫(nodular gumma)」是「第三期(tertiary)梅毒」的破壞性肉芽腫病灶(gumma，可侵犯皮膚、骨、內臟)，並非二期表現。故選D。臨床:二期梅毒VDRL/RPR效價最高，治療benzathine penicillin G單劑;晚期/神經梅毒則需更長療程。113年此題測試梅毒分期皮膚表現的歸屬。","options":{"A":"正確(二期)。不規則蟲蝕狀禿髮為二期梅毒表現。","B":"正確(二期)。軀幹斑狀丘狀疹為二期表現。","C":"正確(二期)。手掌腳掌丘疹為二期梅毒特徵線索。","D":"錯誤(為答案)。結節性梅毒腫(gumma)屬第三期梅毒，非二期。","E":"正確(二期)。扁平濕疣(condylomata lata)為二期表現。"},"sources":["Harrison 21e, Syphilis (stages)","CDC STI Treatment Guidelines 2021","Mandell 9e, Secondary vs Tertiary Syphilis"]}},"114-139":{"quick":"與人類子宮頸癌「致癌性最高」的兩個HPV高危型為第16型與第18型(約占子宮頸癌70%)，故選B。","detail":{"background":"人類乳突病毒(HPV)依致癌風險分高危型與低危型。「高危型(high-risk)」HPV持續感染是子宮頸癌(及肛門、陰道、外陰、陰莖、口咽癌)的主因，其中「第16型與第18型」致癌性最高，合計約占全球子宮頸癌的70%(HPV-16最主要)，其他高危型尚有31、33、45、52、58等。「低危型(low-risk)」如第6、11型主要造成生殖器疣(菜花)與復發性呼吸道乳頭瘤，非致癌主角。HPV疫苗演進:二價(16/18)、四價(6/11/16/18)到九價(6/11/16/18/31/33/45/52/58)，九價可預防約90%子宮頸癌；台灣已將HPV疫苗納入國中女生(並擴及男生)公費接種。子宮頸癌防治並用HPV疫苗(初級預防)與子宮頸抹片/HPV檢測篩檢(次級預防)。故致癌性最高的兩型為16、18，選B。114年此題測試HPV高危型與疫苗防癌。","options":{"A":"錯誤。HPV 6、11為低危型，造成生殖器疣，非致癌主角。","B":"正確。HPV第16、18型致癌性最高(約占子宮頸癌70%)。","C":"錯誤。11為低危型；31雖高危但非致癌性最高的兩型。","D":"錯誤。31、33為高危型但非致癌性最高的兩型。","E":"錯誤。45、52雖高危但非致癌性最高的兩型(以16、18為首)。"},"sources":["Harrison 21e, Human Papillomavirus / Cervical Cancer","WHO/IARC HPV and Cancer","ACIP HPV Vaccine (9-valent)"]}},"109-110":{"quick":"發燒皮疹-病原配對為非者：傳染性紅斑(第五病)由「人類細小病毒B19(Parvovirus B19)」造成，並非Coxsackievirus A9，故選C。","detail":{"background":"兒童/成人發燒合併皮疹(exanthem)的經典病原配對:第一病麻疹(Measles)–麻疹病毒(Paramyxovirus);第二病猩紅熱–A群鏈球菌;第三病德國麻疹(Rubella)–德國麻疹病毒(Togavirus);第四病(現少用);第五病「傳染性紅斑(Erythema infectiosum)」–「人類細小病毒B19(Parvovirus B19)」(典型「巴掌臉slapped cheek」紅疹，可致再生不良危象、胎兒水腫、關節痛);第六病「玫瑰疹(Roseola/exanthem subitum)」–人類皰疹病毒第6型(HHV-6);登革熱(Dengue)–黃病毒(Flaviviruses)。本題錯誤配對為(C):「傳染性紅斑(第五病)–Coxsackievirus A9」——應為「Parvovirus B19」(Coxsackievirus屬腸病毒，造成手足口病/疱疹性咽峽炎)。故配對為非者選C。109年此題測試發燒-皮疹病原的經典配對。","options":{"A":"正確配對。麻疹–Paramyxovirus(麻疹病毒)。","B":"正確配對。德國麻疹–Togavirus(Rubella病毒)。","C":"錯誤(為答案)。傳染性紅斑(第五病)由Parvovirus B19引起，非Coxsackievirus A9。","D":"正確配對。玫瑰疹(第六病)–人類皰疹病毒第6型(HHV-6)。","E":"正確配對。登革熱–黃病毒(Flaviviruses)。"},"sources":["Harrison 21e, Parvovirus B19 / Viral Exanthems","Mandell 9e, Childhood Exanthems","CDC Fifth Disease"]}},"109-119":{"quick":"腫瘤與感染致病原配對最不適當：肛門鱗狀上皮癌的直接致癌病毒是「HPV」而非HIV(HIV僅為免疫低下使HPV相關癌風險升高的間接因素)，故選E。","detail":{"background":"致癌性感染(oncogenic infections)與腫瘤的配對:(A)子宮頸癌–人類乳突病毒(HPV);(B)Kaposi肉瘤–人類第8型皰疹病毒(HHV-8/KSHV);(C)成人T細胞血癌/淋巴瘤–人類T細胞白血病病毒第一型(HTLV-1);(D)肝細胞癌–B型(及C型)肝炎病毒。最不適當者為(E):「肛門鱗狀上皮癌(anal squamous cell carcinoma)–愛滋病毒(HIV)」——肛門鱗狀上皮癌的「直接致癌病毒是HPV(尤其高危型16)」，HIV本身並非直接致癌，而是透過造成免疫低下使HPV持續感染與相關癌(肛門/子宮頸/口咽)風險升高，屬「間接/促進」因素。故就「致病原(直接致癌)配對」而言，把肛門鱗狀上皮癌歸給HIV是最不適當。109年此題測試直接致癌病毒與HIV間接角色的區辨。","options":{"A":"正確配對。子宮頸癌–HPV。","B":"正確配對。Kaposi肉瘤–HHV-8。","C":"正確配對。成人T細胞血癌–HTLV-1。","D":"正確配對。肝細胞癌–B型肝炎病毒。","E":"最不適當(為答案)。肛門鱗狀上皮癌的直接致癌病毒為HPV，HIV僅為間接(免疫低下)因素。"},"sources":["Harrison 21e, Oncogenic Viruses","IARC Biological Carcinogens","Mandell 9e, HPV-related Cancers"]}},"110-92":{"quick":"皰疹病毒疾病配對最不適當：疱疹性咽峽炎(Herpangina)由「克沙奇病毒(Coxsackievirus A)」造成，非HSV-1；HSV-1造成的是疱疹性齒齦口腔炎，故選A。","detail":{"background":"人類皰疹病毒(Herpesviridae)的疾病配對:(A)單純皰疹病毒第一型(HSV-1)–造成「疱疹性齒齦口腔炎(herpetic gingivostomatitis)」、唇疱疹、角膜炎、腦炎，而「疱疹性咽峽炎(Herpangina)」其實是「克沙奇病毒A型(Coxsackievirus A，屬腸病毒)」所致，故此配對最不適當;(B)水痘-帶狀皰疹病毒(VZV)–Ramsay Hunt症候群(膝狀神經節帶狀皰疹合併顏面神經麻痺與耳疱疹);(C)EB病毒(EBV)–B細胞淋巴瘤(及Burkitt、鼻咽癌、傳染性單核球增多症);(D)人類皰疹病毒第8型(HHV-8)–Kaposi肉瘤;(E)EBV–口腔毛狀白斑(oral hairy leukoplakia，HIV相關)。故配對最不適當者為(A)。記憶要點:「疱疹」之名易混淆——Herpangina/手足口病是腸病毒(克沙奇),而非真正的皰疹病毒。110年此題測試皰疹病毒疾病配對與herpangina的腸病毒病因。","options":{"A":"最不適當(為答案)。疱疹性咽峽炎(Herpangina)由克沙奇病毒A引起，非HSV-1(HSV-1造成齒齦口腔炎)。","B":"正確配對。VZV–Ramsay Hunt症候群。","C":"正確配對。EBV–B細胞淋巴瘤。","D":"正確配對。HHV-8–Kaposi肉瘤。","E":"正確配對。EBV–口腔毛狀白斑。"},"sources":["Harrison 21e, Herpesvirus Infections","Mandell 9e, Enteroviruses (Herpangina)","CDC Hand-Foot-Mouth/Herpangina"]}},"110-159":{"quick":"異位性皮膚炎病人短期內搔癢疼痛皮疹快速擴散、口服cephalexin無效→疱疹性濕疹(eczema herpeticum, HSV)；正確處置為全身性抗病毒acyclovir，故選C。","detail":{"background":"本題2歲起異位性皮膚炎、一週前發燒並由前臂出現「搔癢疼痛」的皮疹、口服cephalexin治療下仍擴散至臉、頸、軀幹、下肢——是「疱疹性濕疹(eczema herpeticum / Kaposi varicelliform eruption)」的典型表現:在異位性皮膚炎等屏障受損的皮膚上，單純皰疹病毒(HSV)廣泛播散，造成「成簇、單一形態、臍凹(punched-out)的水疱/糜爛」並快速擴散，可伴發燒、疼痛，嚴重可全身播散、續發細菌感染甚至致命。關鍵:這是「病毒(HSV)」感染，抗細菌的cephalexin無效、惡化是線索。正確處置為「全身性(口服或靜脈)抗病毒藥acyclovir」儘早治療(嚴重/眼周受侵或免疫低下者靜脈注射)，並評估是否合併細菌續發感染。topical mupirocin/vancomycin(抗菌)、systemic prednisolone(類固醇會惡化病毒感染)、fluconazole(抗黴菌)皆不對。故選C。110年此題測試異位性皮膚炎背景下eczema herpeticum的辨識與抗病毒治療。","options":{"A":"錯誤。Topical mupirocin為局部抗菌，對HSV無效。","B":"錯誤。全身類固醇會惡化病毒(HSV)感染。","C":"正確。疱疹性濕疹(HSV)應給全身性acyclovir。","D":"錯誤。靜脈vancomycin為抗菌藥，對HSV無效。","E":"錯誤。Fluconazole為抗黴菌藥，與HSV無關。"},"sources":["Harrison 21e, HSV Infections (Eczema Herpeticum)","Mandell 9e, Herpes Simplex Virus","AAD Atopic Dermatitis Complications"]}},"111-92":{"quick":"血絲蟲(Filariae)經「昆蟲病媒叮咬(insect vector bite)」傳播感染人體(如蚊子傳淋巴絲蟲、黑蠅傳蟠尾絲蟲)，故選A。","detail":{"background":"血絲蟲病(filariasis)由絲蟲(filarial nematodes)引起，依蟲種與病媒不同:淋巴絲蟲病(Wuchereria bancrofti、Brugia malayi)經「蚊子」叮咬傳播，造成淋巴管阻塞與象皮病;蟠尾絲蟲(Onchocerca volvulus，河盲症)經「黑蠅(Simulium)」傳播;羅阿絲蟲(Loa loa)經「鹿蠅/斑虻(Chrysops)」傳播。共通點是「以節肢動物(昆蟲)病媒叮咬」將感染期幼蟲(L3)送入人體皮膚，故感染途徑為「昆蟲病媒叮咬(insect vector bite)」(選A)。其他選項對應不同寄生蟲途徑:鉤蟲/糞小桿線蟲(larvae skin penetration，幼蟲鑽皮)、蛔蟲/鞭蟲(ingest egg經口吃入蟲卵)、肺吸蟲/肝吸蟲(metacercaria in fish/淡水蟹/魚)、血吸蟲(cercariae經接觸疫水鑽皮)。故血絲蟲為昆蟲病媒叮咬，選A。治療以diethylcarbamazine(DEC)、ivermectin、albendazole等。111年此題測試寄生蟲的感染途徑分類。","options":{"A":"正確。血絲蟲經昆蟲病媒(蚊/蠅)叮咬傳播。","B":"錯誤。幼蟲鑽皮為鉤蟲/糞小桿線蟲途徑。","C":"錯誤。經口吃入蟲卵為蛔蟲/鞭蟲途徑。","D":"錯誤。魚中囊狀幼蟲(metacercaria)為肝/肺吸蟲途徑。","E":"錯誤。接觸疫水尾動幼蟲鑽皮為血吸蟲途徑。"},"sources":["Harrison 21e, Filarial Infections","Mandell 9e, Tissue Nematodes","CDC Lymphatic Filariasis"]}},"111-156":{"quick":"異位性皮膚炎病人臉頸短期內出現搔癢疼痛皮疹(如圖)→疱疹性濕疹(eczema herpeticum)，最可能病原為單純疱疹病毒(HSV)，故選A。","detail":{"background":"本題20歲自孩童期異位性皮膚炎、一週前發燒並在「臉頸部」出現搔癢疼痛的皮疹——是「疱疹性濕疹(eczema herpeticum / Kaposi varicelliform eruption)」的典型情境。其病原為「單純疱疹病毒(Herpes simplex virus, HSV)」:在異位性皮膚炎受損屏障上，HSV廣泛播散造成成簇、單一形態、中央臍凹(punched-out)的水疱與糜爛、迅速擴散並伴疼痛、發燒，是皮膚科急症，須儘早給全身性acyclovir。鑑別:水痘帶狀皰疹病毒(VZV)造成水痘(全身向心性)或帶狀皰疹(沿皮節);A群鏈球菌造成膿痂疹/丹毒;金黃色葡萄球菌造成膿痂疹/續發感染(SSSS);人類細小病毒B19造成傳染性紅斑。本題「異位性皮膚炎背景＋臉頸成簇疼痛水疱快速擴散」最符合HSV的eczema herpeticum，故選A。與110-159為同一概念的姊妹題。111年此題以圖測試eczema herpeticum的HSV病原。","options":{"A":"正確。異位性皮膚炎背景之疱疹性濕疹由單純疱疹病毒(HSV)引起。","B":"錯誤。人類細小病毒B19造成傳染性紅斑(巴掌臉)，非此成簇水疱。","C":"錯誤。A群鏈球菌造成膿痂疹/丹毒，外觀不同。","D":"錯誤。VZV造成水痘/帶狀皰疹，分布與病程不同。","E":"錯誤。金黃色葡萄球菌造成膿痂疹/續發感染，非疱疹性濕疹主因。"},"sources":["Harrison 21e, HSV (Eczema Herpeticum)","Mandell 9e, Herpes Simplex Virus","AAD Eczema Herpeticum"]}},"113-160":{"quick":"帶狀皰疹(Herpes zoster)是潛伏VZV「再活化」，並非近期接觸他人VZV所致，故「通常近期內有VZV接觸史」為錯誤(選B)。","detail":{"background":"帶狀皰疹(herpes zoster, shingles)由「潛伏於背根/腦神經節的水痘-帶狀皰疹病毒(VZV)再活化(reactivation)」引起，而非近期再被他人傳染VZV。發病機轉:幼年原發感染(水痘)後VZV潛伏於感覺神經節，當細胞免疫隨年齡、壓力、免疫低下而下降時再活化，沿單一感覺皮節(dermatome)出現「成簇水疱、單側不過中線、伴神經痛」(故選項C「沿皮節分布」正確)。並發症含眼帶狀皰疹(三叉神經眼支)、Ramsay Hunt(顏面神經)、可侵犯中樞(腦炎/脊髓炎，選項D正確)、以及帶狀皰疹後神經痛(PHN)。治療:口服抗病毒藥(acyclovir/valacyclovir/famciclovir)於發疹72小時內給予可促癒合、減輕疼痛(選項E正確)。錯誤者為(B):「通常近期內有VZV接觸史」——帶狀皰疹是自身潛伏病毒再活化，非近期接觸傳染所致(雖帶狀皰疹的水疱液可傳染VZV給「未具免疫力者」使其得水痘，但這與「病人自己發病需近期接觸」無關)。故選B。113年此題測試帶狀皰疹「再活化」的核心觀念。","options":{"A":"正確。帶狀皰疹由水痘-帶狀皰疹病毒(VZV)造成。","B":"錯誤(為答案)。帶狀皰疹為潛伏VZV再活化，非近期接觸他人VZV所致。","C":"正確。皮疹常沿單一感覺皮節(dermatome)分布、單側不過中線。","D":"正確。VZV可侵犯中樞神經(腦炎/脊髓炎)。","E":"正確。口服抗病毒藥可促進病灶癒合、改善疼痛。"},"sources":["Harrison 21e, Varicella-Zoster Virus","Mandell 9e, Herpes Zoster","CDC Shingles"]}},"114-81":{"quick":"MSM、迴腸末端/升結腸潰瘍切片見活動體(trophozoites)＝阿米巴大腸炎(Entamoeba histolytica)；治療「先metronidazole殺組織型，再以paromomycin根除腸腔囊體」，故選D。","detail":{"background":"阿米巴病(amebiasis)由Entamoeba histolytica引起，經糞口途徑(污染食水、肛交，故男男性行為者MSM為風險族群)傳播。本題MSM出現發燒、血性腹瀉、迴腸末端與升結腸腸壁增厚、大腸鏡見潰瘍、切片見「活動體(trophozoites)」——是阿米巴大腸炎(可進展為阿米巴肝膿瘍)。治療鐵則為「兩階段、兩類藥」:(1)先用「組織型殺蟲藥」metronidazole(或tinidazole)殺滅侵入組織的活動體(治療有症狀的腸阿米巴與肝膿瘍);(2)接續用「腸腔內(luminal)殺蟲藥」paromomycin(或diloxanide furoate、iodoquinol)根除「腸腔內囊體(cyst)」，否則殘留囊體會復發並持續排出傳染。重要陷阱:metronidazole「無法有效清除腸腔內囊體」(故選項C錯誤)，單用會復發;paromomycin單用也不足以治療侵襲性組織感染。故正確處置為「先metronidazole、再paromomycin」(選D)。114年此題測試阿米巴大腸炎的兩階段治療。","options":{"A":"錯誤(不完整)。單用metronidazole無法清除腸腔囊體，會復發，須接續腸腔殺蟲藥。","B":"錯誤。單用paromomycin不足以治療侵襲性組織型感染。","C":"錯誤。Metronidazole可殺活動體，但「無法」有效清除腸腔內囊體。","D":"正確。先metronidazole殺組織型活動體，再以paromomycin根除腸腔內囊體。","E":"錯誤。D為正確處置，非以上皆非。"},"sources":["Harrison 21e, Amebiasis (Entamoeba histolytica)","Mandell 9e, Intestinal Amebiasis","CDC Amebiasis Treatment"]}},"111-93":{"quick":"隱球菌敘述「為非」者：血清隱球菌抗原(CrAg)對「侷限性肺部隱球菌病」敏感度不高(可能陰性)，故「CrAg可有效診斷肺部感染且敏感專一」是錯誤敘述，選C。","detail":{"background":"隱球菌病(cryptococcosis)由Cryptococcus neoformans(常見、與鴿子/鳥糞、AIDS相關)與Cryptococcus gattii(與尤加利樹、可侵犯免疫正常者)引起，主要造成腦膜腦炎與肺部感染。診斷工具中「隱球菌莢膜多醣抗原(cryptococcal antigen, CrAg)」(乳膠凝集或側流分析LFA)對「腦膜炎與播散性/隱球菌血症」的血清與CSF敏感度與專一度極高，是診斷利器;但對「侷限性肺部隱球菌病(尤其免疫正常者的單純肺結節)」血清CrAg敏感度「較低、可能為陰性」，常需靠組織切片/培養。因此本題「Cryptococcal Ag可以有效診斷肺部感染(pulmonary cryptococcosis)，具有很好的敏感性與專一性」是「為非(錯誤)」的敘述(選C)。其他正確敘述:C. gattii可存於環境(尤加利樹、土壤)、HIV感染者memory B cell/IgM下降增加感染風險、肺部隱球菌以fluconazole 200–400 mg/天治療3–6個月、肺外/腦膜炎以amphotericin B(±flucytosine)起始。111年此題測試CrAg在肺部 vs 腦膜/播散的敏感度差異。","options":{"A":"正確。C. gattii主要存於尤加利樹/土壤等環境，在鳥類糞便(鴿糞，C. neoformans來源)不易發現。","B":"正確。HIV感染者memory B cell與IgM下降，增加隱球菌感染風險。","C":"錯誤(為答案)。CrAg對侷限性肺部隱球菌病敏感度不高(可能陰性)，非「很好敏感性與專一性」。","D":"正確。肺部隱球菌感染以fluconazole 200–400 mg/天治療3–6個月。","E":"正確。肺外/腦膜炎以amphotericin B deoxycholate起始治療(±flucytosine)。"},"sources":["Harrison 21e, Cryptococcosis","IDSA 2010 Cryptococcal Disease Guidelines","Mandell 9e, Cryptococcus (CrAg sensitivity)"]}},"105-綜-8":{"quick":"喜宴後「3小時」即上吐下瀉(極短潛伏期)＝金黃色葡萄球菌「預形成腸毒素(preformed enterotoxin)」食物中毒，故選A。","detail":{"background":"食因性胃腸炎(food-borne illness)可依「潛伏期」與「症狀型態」推測病原。極短潛伏期(1–6小時)、以「嘔吐」為主的食物中毒，是攝入食物中「預先形成的腸毒素(preformed enterotoxin)」所致，最典型為金黃色葡萄球菌(Staphylococcus aureus，常因帶菌者手部污染後室溫放置增殖產毒，如宴席的火腿、奶油、沙拉)，以及Bacillus cereus的嘔吐型(炒飯)。本題「喜宴後僅3小時」即上吐下瀉，潛伏期極短，最符合金黃色葡萄球菌腸毒素中毒(選A)。相對地:Salmonella(8–72小時，發炎性腹瀉)、Shigella(腹瀉、痢疾，需細菌增殖)、Vibrio cholerae(米湯樣水瀉，潛伏較久)、腸道出血性大腸桿菌EHEC(數天，血便、HUS)潛伏期都較長。故選A。處置以支持性(補液)為主，腸毒素型不需抗生素。105年此題測試以潛伏期辨識金黃色葡萄球菌腸毒素中毒。","options":{"A":"正確。3小時極短潛伏、以嘔吐為主＝金黃色葡萄球菌預形成腸毒素中毒。","B":"錯誤。Shigella潛伏較久、以痢疾(血便/裏急後重)表現。","C":"錯誤。霍亂弧菌潛伏較久、米湯樣大量水瀉。","D":"錯誤。Salmonella潛伏8–72小時，發炎性腹瀉。","E":"錯誤。腸道出血性大腸桿菌潛伏數天、血便、可致HUS。"},"sources":["Harrison 21e, Food-borne Diseases","Mandell 9e, Staphylococcal Food Poisoning","CDC Foodborne Illness Incubation"]}},"109-105":{"quick":"食媒性疾病配對最不正確：Q熱(Q fever, Coxiella burnetii)主要經「吸入受感染家畜(牛羊)生產分泌物之氣溶膠」或未殺菌乳品感染，與「生牛肉」配對最不正確，故選E。","detail":{"background":"食媒性疾病(食物-病原配對)的常考組合:(A)李斯特菌病(Listeriosis)與「軟乳酪/即食冷藏食品」(Listeria可在冷藏繁殖，孕婦/老人/免疫低下高危);(B)曲狀桿菌(Campylobacter jejuni)與「未煮熟雞肉/家禽」;(C)沙門氏菌(Salmonella)與「生雞蛋/蛋製品/家禽」;(D)諾羅病毒(Norovirus)與「生蠔/貝類或受污染的水」。最不正確者為(E):「Q熱(Q fever)與生牛肉」——Q熱由Coxiella burnetii引起，主要傳播途徑是「吸入受感染家畜(牛、羊、山羊)生產時的胎盤/羊水/排泄物形成的氣溶膠」，或飲用未殺菌(生)乳品，而非「吃生牛肉」;故此配對最不正確。Q熱臨床表現為非典型肺炎、肝炎、或慢性心內膜炎(培養陰性IE)。109年此題測試食媒病原配對與Q熱的氣溶膠傳播。","options":{"A":"正確配對。李斯特菌與乳酪(冷藏可繁殖)。","B":"正確配對。曲狀桿菌與未煮熟雞肉。","C":"正確配對。沙門氏菌與生雞蛋。","D":"正確配對。諾羅病毒與生蠔或污染水。","E":"最不正確(為答案)。Q熱(Coxiella)主要經氣溶膠/未殺菌乳品傳播，非「生牛肉」。"},"sources":["Harrison 21e, Q Fever (Coxiella burnetii)","Mandell 9e, Foodborne and Zoonotic Infections","CDC Q Fever"]}},"110-58":{"quick":"產生urease(尿素酶)而易致鹼性尿與磷酸銨鎂結石(struvite)及反覆UTI的菌：Proteus、Klebsiella、Staphylococcus(含S. epidermidis/saprophyticus)、Mycoplasma(ureaplasma);而「E. coli不產urease」，故最不可能者選B。","detail":{"background":"Struvite(磷酸銨鎂, 鳥糞石)結石是「感染性結石(infection stones)」，形成機轉為「產生尿素酶(urease)」的細菌將尿素分解為氨，使尿液鹼化(pH↑)，促使磷酸銨鎂與碳酸磷灰石沉澱，可形成鹿角狀(staghorn)結石並與反覆泌尿道感染互為因果。會產生urease的常見泌尿道病原包括:Proteus(最典型)、Klebsiella、Pseudomonas、Staphylococcus(含Staphylococcus saprophyticus、S. epidermidis)、Ureaplasma/Mycoplasma、部分Providencia/Morganella。關鍵:「Escherichia coli(大腸桿菌)雖是最常見的UTI病原，但它『不產生urease』」，因此與struvite結石形成關聯最小——是本題「最不可能造成struvite結石與反覆UTI(就urease機轉而言)」的菌(選B)。治療感染性結石需完整移除結石(常需經皮腎造廔取石)＋根除感染，否則殘留即復發。110年此題測試urease陽性菌與struvite結石、及E. coli不產urease的例外。","options":{"A":"錯誤(可能)。Klebsiella可產urease，與struvite相關。","B":"正確(為答案，最不可能)。E. coli不產urease，與struvite結石關聯最小。","C":"錯誤(可能)。Mycoplasma/Ureaplasma可產urease。","D":"錯誤(可能)。Staphylococcus(含saprophyticus)可產urease。","E":"錯誤(可能)。Proteus為最典型的urease陽性、struvite結石病原。"},"sources":["Harrison 21e, Urinary Tract Infections / Struvite Stones","Mandell 9e, Urease-producing Organisms","Campbell-Walsh Urology, Infection Stones"]}},"111-83":{"quick":"急性腎盂腎炎以對藥敏感的ceftriaxone治療仍「高燒>72小時不退」→應安排「腎臟電腦斷層」尋找膿瘍或阻塞/結石等需引流之併發症，故選A。","detail":{"background":"急性腎盂腎炎(acute pyelonephritis)在投以「對培養菌敏感」的適當抗生素(本題ceftriaxone、且尿培養E. coli對其敏感)後，通常48–72小時內退燒改善。若「持續高燒超過72小時不退」，代表可能有「併發症」未解決——最常見為腎或腎周膿瘍(perinephric/renal abscess)、泌尿道阻塞(結石、腫瘤造成的腎盂積膿pyonephrosis)等需要「引流/解除阻塞」的情況。此時最適當的下一步是「腎臟影像學檢查(電腦斷層CT，含/不含顯影)」以尋找膿瘍或阻塞性病灶(選A)。其他選項:再驗尿培養(B)價值有限(已知病原與藥敏)、改gentamicin(C)或amoxicillin/clavulanate(D)在菌株已對ceftriaxone敏感時並非優先(問題在於有未引流的病灶而非抗生素無效)、僅退燒觀察(E)會延誤併發症處置。故選A。111年此題測試腎盂腎炎治療反應不佳時的影像評估。","options":{"A":"正確。治療72小時不退燒應做腎臟CT尋找膿瘍/阻塞等需引流之併發症。","B":"錯誤。已知病原與藥敏，再驗尿培養價值有限。","C":"錯誤。菌株對ceftriaxone敏感，改gentamicin非優先。","D":"錯誤。改amoxicillin/clavulanate無助於未引流的病灶。","E":"錯誤。持續高燒不可僅退燒觀察，須找併發症。"},"sources":["Harrison 21e, Pyelonephritis / Complicated UTI","IDSA Complicated UTI","Mandell 9e, Renal Abscess"]}},"111-89":{"quick":"台灣糖尿病人之Klebsiella pneumoniae易致肝膿瘍/泌尿道感染；ESBL-producing K. pneumoniae對第一線抗生素抗藥，建議用carbapenem(imipenem或ertapenem)，故選C。","detail":{"background":"Klebsiella pneumoniae是台灣血糖控制不良者社區型肝膿瘍(常為高黏稠hypervirulent K1/K2莢膜型，可併轉移性眼內炎、腦膜炎)與泌尿道感染的重要病原。抗生素選擇依抗藥機制:(A)野生型(wild type)K. pneumoniae對ampicillin「天生抗藥」(帶染色體SHV-1 β-lactamase)，故不可用ampicillin;(B/C)產廣效β-內醯胺酶(ESBL)的K. pneumoniae對第三代頭孢(ceftriaxone)與青黴素類抗藥，「嚴重感染建議用carbapenem(imipenem或ertapenem)」(因carbapenem不被ESBL水解)——這是正確答案(選C);(D)產NDM-1金屬碳青黴烯酶(carbapenemase)者連carbapenem都抗藥(屬CRE)，不能僅用tigecycline+TMP-SMX，需依藥敏選新藥(如ceftazidime/avibactam對NDM無效、需aztreonam/avibactam或cefiderocol等);(E)台灣造成肝膿瘍/眼內炎的高毒力K. pneumoniae「相對抗藥性較低(多為對抗生素敏感的社區型高毒力株)」，並非「大多為ESBL」。故正確為C。111年此題測試Klebsiella抗藥階梯與台灣高毒力肝膿瘍株特性。","options":{"A":"錯誤。野生型K. pneumoniae對ampicillin天生抗藥，不可用ampicillin。","B":"錯誤。ESBL株對ceftriaxone抗藥，不可用ceftriaxone。","C":"正確。ESBL-producing K. pneumoniae建議用carbapenem(imipenem或ertapenem)。","D":"錯誤。NDM-1碳青黴烯酶株連carbapenem都抗藥，不能僅以tigecycline+TMP-SMX，需依藥敏選新藥。","E":"錯誤。台灣肝膿瘍/眼內炎多為高毒力但「抗藥性相對較低」的社區株，非大多ESBL。"},"sources":["Harrison 21e, Klebsiella / Pyogenic Liver Abscess","Mandell 9e, ESBL/CRE Klebsiella","Taiwan hypervirulent K. pneumoniae literature"]}},"113-86":{"quick":"菌尿與尿路感染：危險因子、孕婦菌尿須治療、男性UTI多有結構異常皆對；但「長期導尿管、以URI症狀就醫、尿培養腸球菌即給ciprofloxacin」屬導管相關無症狀菌尿(CA-ASB)不該治療，故錯誤選D。","detail":{"background":"菌尿(bacteriuria)與尿路感染(UTI)的處置原則常考。正確:(A)UTI危險因子包括停經婦女(雌激素下降)、性行為、糖尿病、尿失禁;(B)孕婦的「無症狀菌尿(ASB)」應治療——可降低腎盂腎炎、早產與低出生體重;(C)男性UTI相對少見，多伴功能性或結構性異常(攝護腺肥大、包皮、結石等)，需評估。錯誤者為(D):一位長期置放導尿管的70歲女性，因「流鼻水、咳嗽及輕微發燒(上呼吸道感染症狀)」就醫，回護理之家後追蹤尿培養長出Enterococcus——這是典型「導管相關無症狀菌尿(catheter-associated asymptomatic bacteriuria, CA-ASB)」:長期導尿管者幾乎都有菌尿/移生，且本次發燒可由上呼吸道感染解釋、無泌尿道特異症狀，故「不應給予抗生素(ciprofloxacin)治療」(治療無症狀菌尿無益且助長抗藥與C. difficile)。除孕婦與即將接受泌尿道侵入手術者外，無症狀菌尿不治療。(E)腎移植病人、嗜中性球低下、即將尿路手術者屬例外——有菌尿即使無症狀也宜處置(如VRE用linezolid)，故E正確。113年此題測試CA-ASB不治療原則。","options":{"A":"正確。停經、性行為、糖尿病、失禁為UTI危險因子。","B":"正確。孕婦無症狀菌尿須治療以降低腎盂腎炎/早產。","C":"正確。男性UTI多伴功能/結構異常，需評估。","D":"錯誤(為答案)。長期導尿管者之無症狀菌尿(CA-ASB)＋以URI症狀就醫，不應給ciprofloxacin治療。","E":"正確。腎移植/嗜中性球低下/將行尿路手術者為治療例外。"},"sources":["IDSA 2019 Asymptomatic Bacteriuria","Harrison 21e, Catheter-associated UTI","Mandell 9e, CA-UTI/CA-ASB"]}},"113-88":{"quick":"Klebsiella pneumoniae：ESBL株對第三代頭孢/青黴素抗藥，建議用carbapenem(ertapenem或imipenem)，故選C；野生型對ampicillin天生抗藥、台灣肝膿瘍株多為敏感之高毒力株。","detail":{"background":"與111-89同主題的Klebsiella pneumoniae抗藥階梯題。Klebsiella造成社區型肝膿瘍、泌尿道感染與嚴重院內感染。正確選項(C):對「產廣效β-內醯胺酶(ESBL)的K. pneumoniae」感染，建議使用碳青黴烯類「ertapenem或imipenem」治療(carbapenem不被ESBL水解，為ESBL嚴重感染首選)。錯誤:(A)野生型K. pneumoniae對ampicillin「天生抗藥」(染色體SHV β-lactamase)，不可用ampicillin;(B)ESBL株不應用minocycline作首選(涵蓋不可靠);(D)產NDM-1碳青黴烯酶株不能用ceftazidime/avibactam(avibactam對金屬酶NDM無抑制作用，需aztreonam/avibactam或cefiderocol);(E)台灣造成肝膿瘍/眼內炎的高毒力K. pneumoniae「抗藥性相對較低」(多為社區型敏感高毒力株)，非「大多為ESBL」。故正確為C。113年再考此題反映Klebsiella與carbapenem在台灣的臨床重要性。","options":{"A":"錯誤。野生型K. pneumoniae對ampicillin天生抗藥。","B":"錯誤。ESBL株不宜以minocycline作首選。","C":"正確。ESBL-producing K. pneumoniae建議用ertapenem或imipenem(carbapenem)。","D":"錯誤。NDM-1金屬酶株對ceftazidime/avibactam無效，需其他新藥。","E":"錯誤。台灣肝膿瘍/眼內炎株多為抗藥性較低之高毒力社區株，非大多ESBL。"},"sources":["Harrison 21e, Klebsiella Infections","Mandell 9e, ESBL/Carbapenemase Klebsiella","IDSA AMR Guidance"]}},"114-85":{"quick":"艱難梭菌感染(CDI)：第一線口服可用metronidazole或vancomycin(現首選口服vancomycin/fidaxomicin)，故選C；孢子須肥皂洗手(酒精無效)、PPI增加風險、嚴重者用「口服」vancomycin、培養出菌不等於CDI。","detail":{"background":"艱難梭菌(Clostridioides difficile)感染(CDI)是抗生素相關腹瀉/偽膜性結腸炎的主因，由抗生素破壞腸道菌叢後C. difficile產毒素(TcdA/TcdB)致病。正確選項(C):CDI可使用「metronidazole或vancomycin作為口服治療選擇」(歷史上metronidazole曾為輕症首選;現行2017/2021 IDSA已改為「口服vancomycin或fidaxomicin」為各級首選，metronidazole僅在無法取得時用於非重症)。錯誤:(A)C. difficile「孢子」對酒精性乾洗手「無效」，預防孢子傳播須「肥皂與流動清水洗手」＋接觸隔離＋含氯環境清消(戴手套/隔離衣正確，但「酒精乾洗手」無法殺孢子);(B)質子幫浦抑制劑(PPI)會「增加」CDI風險，並非降低;(D)嚴重CDI應用「口服(腸道內)vancomycin」(腸腔濃度高)，「針劑(靜脈)vancomycin」無法到達腸腔、無效，重症腸阻塞時才加直腸灌注或靜脈metronidazole輔助;(E)無症狀者糞便培養/驗出C. difficile或毒素「不等於」CDI(移生常見)，須有臨床腹瀉症狀才診斷與治療。故正確為C。114年此題測試CDI治療與孢子防治。","options":{"A":"錯誤。C. difficile孢子對酒精乾洗手無效，須肥皂洗手＋含氯清消。","B":"錯誤。PPI會增加(非降低)CDI風險。","C":"正確。CDI第一線口服可用metronidazole或vancomycin(現首選口服vancomycin/fidaxomicin)。","D":"錯誤。嚴重CDI應用「口服」vancomycin(靜脈無法到達腸腔)。","E":"錯誤。培養/驗出C. difficile不等於CDI，須有臨床症狀。"},"sources":["IDSA/SHEA 2017/2021 C. difficile Guidelines","Harrison 21e, C. difficile Infection","Mandell 9e, Pseudomembranous Colitis"]}},"114-95":{"quick":"CDI「不適當」的組合：(3)NAP1/027菌株首選不是口服metronidazole(應為vancomycin/fidaxomicin)、(5)復發不用「針劑vancomycin」減量(靜脈無法到腸腔，應口服vancomycin tapered)，故選D(3+5)。","detail":{"background":"本題問艱難梭菌感染(CDI)「不適當」的敘述組合。逐項:(1)正確——萬古黴素(vancomycin)等抗生素本身也會破壞菌叢、可能引發後續C. difficile colitis(任何抗生素皆可誘發CDI);(2)正確——對初次感染，現行指引以「口服fidaxomicin或vancomycin持續10天」為首選治療;(4)正確——治療終點是「腹瀉停止/臨床痊癒」，「不需」再追蹤檢測糞便毒素清除(test of cure無意義，帶菌可持續);(3)不適當——針對高毒力的NAP1/BI/027菌株(與重症、爆發相關)，首選並非「口服metronidazole」，而應為「口服vancomycin或fidaxomicin」(metronidazole療效較差);(5)不適當——多次復發者可用「口服vancomycin減量/脈衝(tapered/pulsed)」療法，但題目寫「針劑(靜脈)vancomycin做減量」是錯的——靜脈vancomycin無法到達腸腔、對CDI無效。故「不適當」組合為(3)+(5)，選D。其他復發處置含fidaxomicin、糞便菌叢移植(FMT)、bezlotoxumab。114年此題測試CDI的菌株別治療與復發療法的給藥途徑。","options":{"A":"錯誤。含(1)(4)(5)，但(1)(4)為「適當(正確)」敘述。","B":"錯誤。(2)為適當敘述。","C":"錯誤。(1)為適當敘述。","D":"正確。(3)NAP1/027首選非口服metronidazole、(5)復發應用「口服」非「針劑」vancomycin減量，二者皆不適當。","E":"錯誤。(4)為適當敘述。"},"sources":["IDSA/SHEA 2017/2021 C. difficile Guidelines","Harrison 21e, C. difficile (NAP1/027)","Mandell 9e, Recurrent CDI / Tapered Vancomycin"]}},"109-41":{"quick":"進展為重症COVID-19的危險因子是「年齡大」(尤其≥65歲)，而「年齡小於65歲」不是危險因子，故選A。","detail":{"background":"COVID-19(SARS-CoV-2)重症的危險因子在疫情早期(109年/2020)即已釐清，是內專與公衛重點:高齡(年齡越大風險越高，≥65歲明顯增加)、慢性肺病(COPD、氣喘)、糖尿病、肥胖、心血管疾病、慢性腎病(末期腎病ESRD)、慢性肝病、免疫低下、惡性腫瘤、懷孕等。年齡是最強的單一預後因子。本題問「不是」重症危險因子者，答案為「年齡小於65歲」(A)——高齡才是危險因子，年輕(<65歲)反而風險較低。其餘(慢性肺病、糖尿病、肥胖、ESRD)皆為確立的重症危險因子。109年此題測試COVID-19重症危險因子的辨識。","options":{"A":"正確(為答案)。年齡小於65歲「不是」重症危險因子(高齡才是)。","B":"錯誤(屬危險因子)。慢性肺病增加重症風險。","C":"錯誤(屬危險因子)。糖尿病增加重症風險。","D":"錯誤(屬危險因子)。肥胖增加重症風險。","E":"錯誤(屬危險因子)。末期腎病(ESRD)增加重症風險。"},"sources":["Harrison 21e, COVID-19","CDC People at Increased Risk (COVID-19)","WHO COVID-19 Clinical Management"]}},"109-66":{"quick":"COVID-19胃腸/肝表現：腹瀉是最常見胃腸表現(2)、輕度AST/ALT上升為最常見肝異常(4)、胃腸異常較肝異常更常見(5)，故選E。","detail":{"background":"COVID-19除呼吸道症狀外，常有胃腸與肝臟表現(SARS-CoV-2受體ACE2在腸上皮高表現)。要點:(2)「腹瀉」是最常見的胃腸表現(其次噁心/嘔吐、食慾不振、腹痛);(4)肝臟異常以「輕度AST/ALT上升」最常見(多為輕度、與疾病嚴重度相關，重症可較高);(5)整體而言「胃腸道異常較肝臟異常更常見」。錯誤敘述:(1)「噁心比食慾不振常見」不一定成立(食慾不振/厭食常見)，且本題將其列為錯;(3)以嗅覺/味覺異常預測COVID-19，其「特異度高於敏感度」(嗅味覺喪失對COVID相當特異，但不是每個病人都有，故敏感度不高)，題目寫「敏感度比特異度高」是錯的。故正確組合為(2)+(4)+(5)，選E。109年此題測試COVID-19腸胃肝表現的流行特徵。","options":{"A":"錯誤。含(1)(3)錯誤敘述。","B":"錯誤。含(3)錯誤(嗅味覺異常特異度高於敏感度)。","C":"錯誤。含(3)錯誤。","D":"錯誤。含(1)(3)錯誤。","E":"正確。(2)腹瀉最常見、(4)輕度AST/ALT上升最常見肝異常、(5)胃腸異常較肝異常常見。"},"sources":["Harrison 21e, COVID-19 Extrapulmonary Manifestations","Mandell 9e, SARS-CoV-2","NIH COVID-19 Guidelines"]}},"109-108":{"quick":"冠狀病毒：SARS-CoV/MERS-CoV/SARS-CoV-2皆為Betacoronavirus的RNA病毒(1)、SARS-CoV-2重症IL-6升高、可致細胞激素風暴(4)，故選D(1+4)。","detail":{"background":"冠狀病毒(Coronaviridae)為「單股正鏈RNA病毒」，造成人類重大疫情的SARS-CoV(2003)、MERS-CoV(2012)、SARS-CoV-2(2019)皆屬「β冠狀病毒屬(Betacoronavirus)」(故(1)正確)。其結構蛋白:棘蛋白(S, spike)負責「結合宿主受體(ACE2)並介導入侵」、套膜蛋白(E, envelope)參與病毒組裝與釋放，「E蛋白並非負責結合受體」(故(2)錯誤——結合受體的是S棘蛋白)。死亡率:三者中以「MERS-CoV最高(約35%)」，而非SARS-CoV(故(3)錯誤)。SARS-CoV-2重症可引發「細胞激素風暴(cytokine storm)」，重症患者體內IL-6濃度偏高(這也是用IL-6受體拮抗劑tocilizumab的依據)(故(4)正確)。Hydroxychloroquine經臨床試驗證實「無效且有害」，不建議常規使用(故(5)錯誤)。故正確組合為(1)+(4)，選D。109年此題測試冠狀病毒分類、棘蛋白功能與IL-6。","options":{"A":"錯誤。(2)(3)皆錯(E蛋白非結合受體、MERS死亡率最高)。","B":"錯誤。含(3)錯誤。","C":"錯誤。含(3)錯誤。","D":"正確。(1)三者皆為Betacoronavirus RNA病毒、(4)重症IL-6升高/細胞激素風暴。","E":"錯誤。含(2)(3)(5)錯誤。"},"sources":["Harrison 21e, Coronaviruses","NIH/IDSA COVID-19 Guidelines","WHO Coronavirus Biology"]}},"109-116":{"quick":"COVID-19敘述為非者：飛沫/接觸傳染、典型發燒乾咳倦怠、RT-PCR為急性期首選、70%酒精有效皆對；「全球死亡率約0.5%~1%」於當時(109年)的通報致死率被高估，故為非選E。","detail":{"background":"COVID-19(SARS-CoV-2)的基本防疫知識(109年/2020):(A)傳染途徑主要為近距離「飛沫」與「接觸」(後來亦強調氣溶膠);(B)典型症狀為發燒、乾咳、倦怠，約三分之一有呼吸急促;(C)急性期診斷以「分子核酸RT-PCR」為首選;(D)70%酒精乾洗手可有效殺滅有套膜的冠狀病毒。本題「為非」者為(E):「全球COVID-19感染的死亡率約為0.5%~1%」——在出題當時(2020年中)，全球「通報的個案致死率(CFR)」明顯高於此(各國約3–7%不等，受檢測量能、年齡結構影響)，故此敘述被視為錯誤(註:後續血清學估計的「感染致死率IFR」確實接近0.5–1%，但CFR與IFR概念不同;依當時時空，E被判為不正確)。故選E。109年此題測試COVID-19基礎防疫與致死率概念。","options":{"A":"正確。主要為飛沫與接觸傳染。","B":"正確。典型發燒、乾咳、倦怠，約1/3呼吸急促。","C":"正確。急性期以RT-PCR為診斷首選。","D":"正確。70%酒精可有效殺滅冠狀病毒。","E":"錯誤(為答案)。當時全球通報致死率高於0.5%~1%，此敘述不正確。"},"sources":["Harrison 21e, COVID-19","WHO COVID-19 Situation Reports 2020","CDC COVID-19 (CFR vs IFR)"]}},"109-134":{"quick":"COVID-19糖尿病人疾病惡化「非確認」之風險因子：在感染前已使用ACEI/ARB控制高血壓者，並非確認的惡化風險因子(早期疑慮未被證實)，故選B。","detail":{"background":"疫情早期(2020上半)曾有理論疑慮:ACE抑制劑(ACEI)/血管收縮素受體阻斷劑(ARB)可能上調ACE2而增加SARS-CoV-2感染或惡化風險。但隨後的臨床研究(BRACE-CORONA等隨機試驗與多項觀察研究)「並未證實」ACEI/ARB會增加COVID-19重症或死亡，反而建議「不應因COVID-19而停用」既有的ACEI/ARB。因此在COVID-19糖尿病人中，「感染前已使用ACEI/ARB控制高血壓」並非「確認」的疾病惡化風險因子(選B)。已確認的惡化風險因子包括:高齡(A)、既有動脈粥狀硬化性心血管疾病ASCVD(C)、肥胖/高BMI(D)、第一型糖尿病(E，控制較差/酮酸風險)等。故「非確認」者選B。109年此題測試ACEI/ARB與COVID-19的關係(疑慮未被證實)。","options":{"A":"錯誤(屬確認因子)。高齡是確認的惡化風險因子。","B":"正確(為答案，非確認)。感染前使用ACEI/ARB控制高血壓者並非確認的惡化風險因子。","C":"錯誤(屬確認因子)。既有ASCVD為確認風險因子。","D":"錯誤(屬確認因子)。肥胖(高BMI)為確認風險因子。","E":"錯誤(屬確認因子)。第一型糖尿病為惡化風險因子。"},"sources":["Harrison 21e, COVID-19 and Comorbidities","BRACE-CORONA Trial (ACEI/ARB)","AHA/ESC statements on RAAS inhibitors in COVID-19"]}},"109-142":{"quick":"COVID-19呼吸衰竭死亡者肺部病理最大特徵為「廣泛肺血管栓塞與肺微血管病變(thrombosis與microangiopathy)」，故選A。","detail":{"background":"COVID-19重症呼吸衰竭的肺部病理研究(2020)顯示，除瀰漫性肺泡損傷(DAD)外，最具特徵的是「廣泛的肺血管栓塞(pulmonary thrombosis)與肺微血管病變(microangiopathy)」——包括微血栓形成、內皮炎(endotheliitis)、血管新生增加，反映SARS-CoV-2造成的內皮損傷與高凝狀態(故臨床COVID-19者D-dimer升高、靜脈/動脈栓塞風險增加，重症需預防性抗凝)。本題「肺部病理變化最大特徵」答案為(A)廣泛肺部血管栓塞及微血管病變(thrombosis及microangiopathy)。其他選項(廣泛肺血管出血、肺腫瘤、肺動脈高血壓、廣泛B細胞浸潤)皆非COVID-19呼吸衰竭的特徵性病理。109年此題測試COVID-19肺病理的血栓/微血管病變特徵。","options":{"A":"正確。COVID-19呼吸衰竭肺病理以廣泛血栓與微血管病變(thrombosis/microangiopathy)為特徵。","B":"錯誤。廣泛肺血管出血非主要特徵。","C":"錯誤。肺腫瘤與COVID-19病理無關。","D":"錯誤。肺動脈高血壓非COVID-19呼吸衰竭的病理特徵。","E":"錯誤。廣泛B細胞浸潤非COVID-19肺病理特徵。"},"sources":["Harrison 21e, COVID-19 Pathology","Ackermann M et al. NEJM 2020 (Pulmonary Vascular Endothelialitis)","Mandell 9e, SARS-CoV-2"]}},"109-143":{"quick":"SARS-CoV-2藉棘蛋白結合宿主細胞的「血管收縮素轉換酶2(ACE2)」受體而入侵，故選B。","detail":{"background":"SARS-CoV-2(及SARS-CoV)藉由其棘蛋白(spike protein)的受體結合域(RBD)結合宿主細胞表面的「血管收縮素轉換酶2(angiotensin-converting enzyme 2, ACE2)」受體，並在跨膜絲胺酸蛋白酶TMPRSS2協助下使棘蛋白裂解活化、促成膜融合與病毒進入。ACE2在肺泡第二型上皮細胞、腸上皮、血管內皮、心肌、腎臟等廣泛表現，解釋了COVID-19的多器官表現。本題答案為(B)血管收縮素轉換酶2(ACE2)。注意ACE2(本題正確受體)與ACE1(angiotensin-converting enzyme 1)不同;ACE3/4/5並不存在(為干擾選項)。此題與109-134(ACEI/ARB與ACE2疑慮)概念相連。109年此題測試SARS-CoV-2的入侵受體。","options":{"A":"錯誤。ACE1並非SARS-CoV-2入侵受體。","B":"正確。SARS-CoV-2藉棘蛋白結合ACE2受體入侵細胞。","C":"錯誤。ACE3不存在(干擾選項)。","D":"錯誤。ACE4不存在(干擾選項)。","E":"錯誤。ACE5不存在(干擾選項)。"},"sources":["Harrison 21e, SARS-CoV-2 Virology (ACE2/TMPRSS2)","Hoffmann M et al. Cell 2020","NIH COVID-19 Guidelines"]}},"110-34":{"quick":"可降低需ICU照護之COVID-19病患死亡率者為「IL-6受體拮抗劑(tocilizumab或sarilumab)」(RECOVERY/REMAP-CAP證據)，故選C。","detail":{"background":"COVID-19重症(需高流量氧氣、非侵襲性通氣或ICU、且發炎指標升高)的免疫調節治療有明確實證。「IL-6受體拮抗劑(tocilizumab或sarilumab)」在RECOVERY與REMAP-CAP等大型試驗中，對需ICU/呼吸支持且全身性發炎的重症病人，「合併類固醇使用」可降低死亡率與改善預後(故選C)。其他選項:(A)Remdesivir(抗病毒)主要對「需氧氣但未到機械通氣」者縮短病程、對死亡率益處有限，對已需ICU重症效益不明顯;(B)Baricitinib(JAK抑制劑)+Remdesivir對部分住院病人有益，但本題以IL-6拮抗劑為「降低需ICU者死亡率」最對應的答案;(D)恢復期血漿(convalescent plasma)經試驗證實對重症無顯著降低死亡率效益;(E)中和抗體(neutralizing antibody)用於早期輕中症高危者(降低住院)，對已重症ICU者無益且受變異株影響。故選C。110年此題測試COVID-19重症免疫調節(IL-6拮抗劑)的死亡率效益。","options":{"A":"錯誤。Remdesivir對已需ICU重症的死亡率效益不明顯。","B":"錯誤。Baricitinib+Remdesivir有助部分住院者，但非本題「降低需ICU者死亡率」的最佳對應。","C":"正確。IL-6受體拮抗劑(tocilizumab/sarilumab)可降低需ICU重症之死亡率。","D":"錯誤。恢復期血漿對重症無顯著降低死亡率。","E":"錯誤。中和抗體用於早期輕中症高危者，對ICU重症無益。"},"sources":["RECOVERY Tocilizumab, Lancet 2021","REMAP-CAP IL-6 antagonists, NEJM 2021","NIH COVID-19 Treatment Guidelines"]}},"110-81":{"quick":"COVID-19治療正確：單株抗體bamlanivimab+etesevimab用於輕中症高危者降住院死亡(2)、casirivimab+imdevimab對β/γ變異株中和未變(3)、tocilizumab與dexamethasone併用於嚴重肺炎(4)，故選B(2+3+4)。","detail":{"background":"本題為COVID-19治療的多重敘述(110年/2021時空)。正確:(2)單株中和抗體bamlanivimab+etesevimab(作用於棘蛋白)用於「輕度或中度且具重症危險因子(年齡≥65、肥胖、慢性腎/肺/心血管病、高血壓、糖尿病、免疫抑制)」者，於發病早期(3天內)使用可降低住院與死亡風險;(3)當時資料顯示bamlanivimab+etesevimab對南非(β)、巴西(γ)變異株體外中和變差，而casirivimab+imdevimab對前述變異株中和「未明顯改變」;(4)IL-6受體阻斷劑tocilizumab建議「與dexamethasone(類固醇)合併」用於嚴重肺炎/重症。錯誤:(1)Remdesivir「單獨使用」並非對「輕、重症都有極顯著效果」(對死亡率益處有限);(5)JAK抑制劑baricitinib「可」與dexamethasone合併使用(並非不可)。故正確組合為(2)+(3)+(4)，選B。110年此題反映2021單株抗體與免疫調節的治療策略(註:後續Omicron使多數早期單株抗體失效)。","options":{"A":"錯誤。含(1)remdesivir單用對輕重症皆顯著之錯誤。","B":"正確。(2)單株抗體用於輕中症高危、(3)casirivimab+imdevimab對β/γ中和未變、(4)tocilizumab+dexamethasone用於嚴重肺炎。","C":"錯誤。含(1)錯誤。","D":"錯誤。含(5)「baricitinib不可與dexamethasone併用」之錯誤。","E":"錯誤。含(1)(5)錯誤。"},"sources":["NIH COVID-19 Treatment Guidelines (2021)","RECOVERY/REMAP-CAP","FDA mAb EUA 2021"]}},"110-94":{"quick":"COVID-19最不適當敘述：SARS-CoV-2在「症狀發生前(presymptomatic)」即具明顯傳染性，故「症狀發生前極少具傳染性」錯誤，選C。","detail":{"background":"COVID-19(SARS-CoV-2)的傳播特性與病程:(A)致病原為RNA病毒，人類感染以呼吸道症狀為主;(B)潛伏期一般2–14天，多為4–5天(Omicron後更短);(D)約有相當比例(早期估約5%)患者發生呼吸衰竭或敗血性休克等極嚴重感染需加護治療;(E)實驗室檢查「淋巴球減少(lymphopenia)合併D-dimer升高」與較高死亡率相關。最不適當者為(C):「臨床症狀發生前極少具有傳染性，大多接觸到有症狀者才傳染」——這是錯誤的，SARS-CoV-2的重要傳播特性正是「症狀發生前(presymptomatic)」與「無症狀(asymptomatic)」即可大量傳播(發病前1–2天病毒量已高、傳染力強)，這也是其難以圍堵的關鍵。故選C。110年此題測試COVID-19的presymptomatic傳播特性。","options":{"A":"正確。SARS-CoV-2為RNA病毒，以呼吸道症狀為主。","B":"正確。潛伏期一般2–14天，多4–5天。","C":"最不適當(為答案)。症狀發生前(presymptomatic)即具明顯傳染性，非「極少」。","D":"正確。約5%患者發生呼吸衰竭/敗血性休克等極嚴重感染。","E":"正確。淋巴球減少合併D-dimer升高與死亡率正相關。"},"sources":["Harrison 21e, COVID-19 Transmission","He X et al. Nat Med 2020 (presymptomatic transmission)","WHO COVID-19 Transmission"]}},"111-82":{"quick":"2022與病毒共存階段COVID治療正確：Paxlovid之ritonavir為CYP3A4強抑制劑以增強nirmatrelvir(2)、molnupiravir核苷類似物致突變不建議孕婦(3)、Paxlovid/molnupiravir用於早期高危者(4)，故選C(2+3+4)。","detail":{"background":"本題為2022年台灣面對大量社區感染、進入「與病毒共存」階段的COVID-19口服抗病毒治療。正確:(2)Nirmatrelvir/ritonavir(Paxlovid)中，nirmatrelvir抑制病毒主要蛋白酶(Mpro/3CL protease)阻止病毒複製，ritonavir本身是「CYP3A4強抑制劑」，藉抑制肝臟代謝來「拉高並維持nirmatrelvir血中濃度」增強療效(這也帶來大量藥物交互作用);(3)Molnupiravir為核苷類似物，使病毒RNA複製時累積突變(error catastrophe)，因致突變/致畸疑慮「不建議用於孕婦」;(4)Paxlovid與molnupiravir主要用於「COVID-19發病早期、症狀輕微但有重症或死亡高風險者」(發病5天內)。錯誤:(1)Remdesivir「單獨使用」並非對輕重症皆顯著(益處有限/侷限特定族群);(5)Paxlovid有很多藥物交互作用與禁忌，且「腎功能eGFR 30–60需減量」，「eGFR>30就不需調整」是錯的(eGFR<30不建議使用、30–60須減量)。故正確組合為(2)+(3)+(4)，選C。111年此題測試口服抗病毒藥機轉、適應症與腎功能調整。","options":{"A":"錯誤。含(1)remdesivir單用顯著之錯誤。","B":"錯誤。含(1)錯誤。","C":"正確。(2)ritonavir為CYP3A4抑制劑增強nirmatrelvir、(3)molnupiravir孕婦不建議、(4)早期高危者使用。","D":"錯誤。含(5)「eGFR>30不需調整」之錯誤。","E":"錯誤。含(1)(5)錯誤。"},"sources":["NIH COVID-19 Treatment Guidelines","FDA Paxlovid/Molnupiravir EUA","Taiwan CDC 口服抗病毒藥使用指引"]}},"111-94":{"quick":"COVID-19藥物機轉配對為非者：Baricitinib是「JAK抑制劑」，並非TNF-α抑制劑，故選D。","detail":{"background":"COVID-19治療藥物與機轉配對:(A)Remdesivir——抑制病毒RNA依賴性RNA聚合酶(RdRp)，為核苷酸類似物抗病毒藥;(B)Tocilizumab——IL-6受體單株抗體(免疫調節，用於重症發炎);(C)Molnupiravir——核糖核苷類似物(致病毒突變);(E)Nirmatrelvir/Ritonavir(Paxlovid)——蛋白酶抑制劑(nirmatrelvir抑制3CL/Mpro蛋白酶，ritonavir為藥動增強劑)。配對為非者為(D):「Baricitinib:TNF-α inhibitor」——baricitinib其實是「Janus激酶(JAK1/2)抑制劑」，藉抑制細胞激素訊號(JAK-STAT)達免疫調節，用於重症COVID-19(常與類固醇/remdesivir併用)，並非TNF-α抑制劑。故選D。111年此題測試COVID-19各藥物的作用機轉。","options":{"A":"正確配對。Remdesivir抑制病毒RNA聚合酶。","B":"正確配對。Tocilizumab為IL-6單株抗體。","C":"正確配對。Molnupiravir為核苷類似物。","D":"錯誤(為答案)。Baricitinib為JAK抑制劑，非TNF-α抑制劑。","E":"正確配對。Nirmatrelvir/Ritonavir為蛋白酶抑制劑。"},"sources":["NIH COVID-19 Treatment Guidelines","Harrison 21e, COVID-19 Therapeutics","FDA Baricitinib EUA (JAK inhibitor)"]}},"112-86":{"quick":"COVID-19敘述錯誤者：長效單株抗體tixagevimab+cilgavimab(Evusheld)對較新的Omicron次變異株(如XBB、BQ.1.1)「已失去中和效果」，故「都一直具有很好中和效果」錯誤，選E。","detail":{"background":"本題為2022–2023(112年)時空的COVID-19綜合敘述。正確:(A)自2022/1至2023/3台灣公布的逾千萬本土確診中約16%為60歲以上，依WHO嚴重度分類嚴重肺炎/ARDS約佔0.4%且多為高齡;(B)口服抗病毒molnupiravir為核苷類似物，使病毒RNA複製累積突變而無法完成複製;(C)Paxlovid(nirmatrelvir/ritonavir)中ritonavir為肝CYP3A4強抑制劑，減緩nirmatrelvir代謝以增強抗病毒;(D)Paxlovid與molnupiravir對「不需用氧但具重症風險因子」之感染者可降低死亡與後續住院。錯誤者為(E):長效單株抗體tixagevimab+cilgavimab(Evusheld，用於免疫低下者暴露前預防)雖對早期變異株(α/β/γ/δ及部分Omicron)有效，但對「較新的Omicron次變異株(如XBB、BQ.1.1)已喪失中和活性」，故美國FDA於2023年初撤回其授權;因此「對最近的XBB和BQ.1.1都一直具有很好中和效果」是錯誤的。故選E。112年此題測試單株抗體因病毒變異而失效的時效性。","options":{"A":"正確。台灣確診約16%為60歲以上，嚴重肺炎/ARDS約0.4%且多高齡。","B":"正確。Molnupiravir為核苷類似物，致病毒突變無法複製。","C":"正確。Paxlovid之ritonavir為CYP3A4強抑制劑以增強nirmatrelvir。","D":"正確。Paxlovid/molnupiravir對具重症風險因子者降低死亡與住院。","E":"錯誤(為答案)。tixagevimab+cilgavimab對XBB、BQ.1.1已失去中和效果(後遭撤回授權)。"},"sources":["NIH COVID-19 Treatment Guidelines","FDA Evusheld EUA withdrawal 2023","Taiwan CDC COVID-19 統計"]}}},TO=["敗血症、不明熱與感染性心內膜炎", "中樞神經系統感染", "抗微生物製劑與抗藥性", "疫苗、旅遊與感染管制", "免疫不全、移植後與伺機性感染", "蟲媒、人畜共通與輸入性感染", "皮膚軟組織與骨關節感染", "性傳染病", "病毒、黴菌與寄生蟲感染", "泌尿道、腸胃道與腹腔內感染", "新型冠狀病毒 (COVID-19)"];
