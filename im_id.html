<script>
const Q=[{"num":113,"answer":"A","stem":"有關抗生素治療與敗血症致病原的配對,下列哪些組合是正確的? (1) Ceftriaxone - Neisseria meningitidis (2) Penicillin - Group A Streptococcus (3) Clindamycin - Rickettsia (4) Ceftazidime- Enterococcus","options":{"A":"(1)+(2)","B":"(2)+(3)","C":"(1)+(3)","D":"(2)+(4)","E":"(1)+(4)"},"id":"109-113","roc_year":109,"source":"109合併PDF","topic_num":1,"topic":"敗血症、不明熱與感染性心內膜炎","q_num":113,"src":"109合併卷"},{"num":117,"answer":"D","stem":"一位34歲長期使用靜脈注射海洛英的男性,因發燒、喘、呼吸困難一週來急診就診,身體診察有發現收縮 期心雜音,下列敘述何者為非? (1) 感染原最常見為金黃色葡萄球菌(Staphylococcus aureus) (2) 此S. aureus 極少為methicillin抗藥(MRSA)性菌株 (3) 此右心心內膜炎,以三尖瓣(tricuspid valve)為主要侵犯位置 (4) 相對於非靜脈藥癮心內膜炎,此病人致病原更常有綠膿桿菌(Pseudomonas aeruginosa)或念珠 菌(Candida)感染的機會 (5) 若為HIV感染者,致病原出現HACEK group的機會較高","options":{"A":"(1)+(2)+(3)","B":"(1)+(3)+(5)","C":"(4)+(5)","D":"(2)+(5)","E":"(1)+(2)+(3)+(4)+(5)"},"id":"109-117","roc_year":109,"source":"109合併PDF","topic_num":1,"topic":"敗血症、不明熱與感染性心內膜炎","q_num":117,"src":"109合併卷"},{"num":88,"answer":"E","stem":"有一位23歲男性因高燒不退一週而來住院, 他於三週前全身長滿水痘, 於二週前水痘已漸結痂。住院身體 診察體溫40°C, 血壓140/50mmHg, 心跳136/min,呼吸22/min, 結膜發紅, 胸部X光檢查沒有明顯肺浸潤現 象, CBC呈現Hgb 12 gm/dL, WBC18000/cumm, neutrophil 82%, band form 6%, lymphocyte 10%, monocyte 2%, 尿液檢查呈現RBC10-20, WBC5-10, 蛋白(-), 以下哪一項不正確?","options":{"A":"應行完整的身體診察。","B":"可能會有心雜音。","C":"應行至少兩套血液培養。","D":"應行心臟超音波檢查。","E":"病人最可能有腦膜炎。"},"id":"110-88","roc_year":110,"source":"110合併PDF","topic_num":1,"topic":"敗血症、不明熱與感染性心內膜炎","q_num":88,"src":"110合併卷"},{"num":91,"answer":"A","stem":"脾臟切除後病人發生敗血症(post-splenectomy sepsis),下列那一個是此急症常見的致病菌組合? (1) Streptococcus pneumoniae (2) Staphylococcus aureus (3) Haemophilus influenzae (4) Neisseria meningitidis (5) Pseudomonas aeruginosa","options":{"A":"(1)+(3)+(4)。","B":"(1)+(2)。","C":"(1)+(3)+(5)。","D":"(2)+(3)+(4)。","E":"(4)+(5)。"},"id":"113-91","roc_year":113,"source":"113合併PDF","topic_num":1,"topic":"敗血症、不明熱與感染性心內膜炎","q_num":91,"src":"113合併卷"},{"num":23,"answer":"C","stem":"關於敗血症的病理生物學(Pathobiology of Sepsis),下列敘述何者正確?","options":{"A":"敗血症主要由過度炎症反應引起,免疫抑制在病理過程中不具重要性。","B":"微血管損傷在敗血症中表現為血管通透性降低,減少血栓形成風險。","C":"敗血症的病理特徵包括同時存在的過度炎症反應和免疫抑制,並伴隨微血管損傷。","D":"敗血症患者的淋巴細胞增生是免疫系統正常運作的標誌,與預後良好相關。","E":"敗血症的器官衰竭僅由病原體直接破壞組織引起,與宿主免疫反應無關。"},"id":"114-23","roc_year":114,"source":"114合併PDF","topic_num":1,"topic":"敗血症、不明熱與感染性心內膜炎","q_num":23,"src":"114合併卷"},{"num":24,"answer":"D","stem":"關於敗血性休克(Septic Shock)之處置與治療,下列何者正確?","options":{"A":"第一線升壓劑建議使用多巴胺(dopamine),因其對腎臟有保護效果。","B":"血管加壓劑建議僅由中心靜脈注射,避免外滲風險。","C":"持續高乳酸濃度不需理會,只要血壓穩定即可。","D":"補液使用晶體液(crystalloid)為優先選擇,建議初始劑量為30 ml/kg。","E":"降低平均動脈壓(MAP)至50 mmHg 有助減少液體輸注需求。"},"id":"114-24","roc_year":114,"source":"114合併PDF","topic_num":1,"topic":"敗血症、不明熱與感染性心內膜炎","q_num":24,"src":"114合併卷"},{"num":89,"answer":"C","stem":"有關感染性心內膜炎(Infective Endocarditis)的敘述,下列何者最不適當?","options":{"A":"進行經驗性抗生素治療前,應從不同位置進行至少三套血液培養。","B":"如果首次血液培養為陰性,48至72小時後應再執行兩套至三套血液培養。","C":"人工瓣膜手術後四週發生心內膜炎,最常見為鏈球菌(streptococci)感染。","D":"對於臨床診斷為心內膜炎的患者,經胸壁心臟超音波(TTE)約有20%-35%看不到贅生 物(vegetation)。","E":"經食道心臟超音波檢查(TEE)對臨床診斷為心內膜炎的患者約有6%-18%假陰性,敏感度約 為90%。"},"id":"114-89","roc_year":114,"source":"114合併PDF","topic_num":1,"topic":"敗血症、不明熱與感染性心內膜炎","q_num":89,"src":"114合併卷"},{"num":96,"answer":"A","stem":"下列所列致病原,哪一個細菌組合都是具有莢膜(capsulated)? (1) Streptococcus pneumoniae (2) Haemophilus influenzae (3) Staphylococcus aureus (4) Neisseria meningitidis (5) Pseudomonas aeruginosa","options":{"A":"(1)+(2)+(4)。","B":"(3)+(4)。","C":"(4)+(5)。","D":"(1)+(3)。","E":"(1)+(3)+(5)。"},"id":"114-96","roc_year":114,"source":"114合併PDF","topic_num":1,"topic":"敗血症、不明熱與感染性心內膜炎","q_num":96,"src":"114合併卷"},{"num":2,"answer":"B","stem":"十八歲女性,突然發燒、頭痛及嘔吐,8小時後住院,身體檢查發現病人嗜睡、體溫40°C,在下肢可見紫斑性皮疹以及頸項僵直、末梢血白血球23x1000/μL分類明顯左移,CSF檢查發現白血球10x1000/μL,多形核佔95%,葡萄糖10 mg/dL,蛋白質90 mg/dL,CSF沈渣抹片染色鏡檢發現革蘭陰性雙球菌。最可能的診斷是:","options":{"A":"淋菌性腦膜炎","B":"腦膜炎球菌性腦膜炎","C":"嗜血流行感冒桿菌性腦膜炎","D":"結核性腦膜炎","E":"肺炎球菌性腦膜炎"},"id":"104-綜-2","roc_year":104,"source":"104舊站q5綜合卷","topic_num":2,"topic":"中樞神經系統感染","q_num":2,"src":"舊站綜合卷"},{"num":109,"answer":"E","stem":"請問細菌性腦膜炎的診斷、治療以下何者錯誤?","options":{"A":"須盡快使用抗生素","B":"病人可能會頭痛、畏光","C":"確定診斷需腰椎穿刺,將腦脊髓液送培養","D":"腰椎穿刺前須考慮做電腦斷層避免加重可能已升高之腦壓","E":"使用較後線之carbapenem類抗生素可避免治療失敗"},"id":"109-109","roc_year":109,"source":"109合併PDF","topic_num":2,"topic":"中樞神經系統感染","q_num":109,"src":"109合併卷"},{"num":81,"answer":"A","stem":"庫賈氏病(Creutzfeldt-Jakob disease; CJD) 在1920年代初期首先被報導,為一種相當罕見的疾病。下列 敘述,何項組合最正確?(1)致病原Prion不是傳統的細菌或病毒等病原,也不具核酸,但卻有感染力,但僅 限於同種動物間才可傳染。(2)臨床症狀包括記憶喪失及混淆、慢性痴呆化、運動神經失調、及喪失語言 能力。(3)人的新型庫賈氏病(new variant CJD, v-CJD)與牛海綿狀腦病(Bovine spongiform encephalopathy; BSE)有高度相關。此類患者發生年齡較散發型庫賈氏病年輕。(4)照顧病患基本上不需 要特別隔離, 只需以一般防護再加上正確的消毒。(5)感染性的變性蛋白質對一般常用的物理或化學方法有 很強的抵抗性,必須使用紫外線、輻射照射及消毒劑來消毒。","options":{"A":"(2)+(3)+(4)。","B":"(2)+(3)+(5)。","C":"(1)+(2)+(3)+(5)。","D":"(2)+(3)+(4)+(5)。","E":"(1)+(2)+(3)+(4)+(5)。"},"id":"112-81","roc_year":112,"source":"112合併PDF","topic_num":2,"topic":"中樞神經系統感染","q_num":81,"src":"112合併卷"},{"num":92,"answer":"B","stem":"細菌性腦膜炎(Bacterial meningitis),經腦脊髓液培養為Streptococcus pneumoniae,且β-lactam是sensitive,請問此時首選的藥物,最適合的是下列那一個?","options":{"A":"vancomycin。","B":"ceftriaxone。","C":"ampicillin。","D":"levofloxacin。","E":"dexamethasone。"},"id":"113-92","roc_year":113,"source":"113合併PDF","topic_num":2,"topic":"中樞神經系統感染","q_num":92,"src":"113合併卷"},{"num":87,"answer":"C","stem":"40歲男性病人,主訴持續性頭痛、發燒及頸部僵硬持續2天,腦脊髓液檢查結果為外觀混濁、壓 力280mmH2O(正常參考值70-180mmH2O)、白血球計數1200/mm3且以多核球為主(正常參考值0-5淋 巴球/mm3)、葡萄糖20mg/dL(正常參考值45-85mg/dL)、蛋白質180mg/dL(正常參考 值15-45mg/dL)、血糖值正常。下列敘述何者最不適當?","options":{"A":"最常見的致病原是Streptococcus pneumoniae。","B":"即便使用適當抗生素治療,此疾病之死亡率約為20%。","C":"若見到身上有紅斑(purpura)或出血(petechoia)需先考慮Hemophilus influenzae。","D":"經驗抗生素治療採用ceftriaxone加上vancomycin。","E":"若為腦部手術後之腦膜炎需考慮抗綠膿桿菌治療。"},"id":"114-87","roc_year":114,"source":"114合併PDF","topic_num":2,"topic":"中樞神經系統感染","q_num":87,"src":"114合併卷"},{"num":88,"answer":"D","stem":"有關急性腦炎(acute encephalitis)的敘述,下列何者最不適當?","options":{"A":"皰疹病毒屬(Herpesviruses)為最常見和最重要的病原。","B":"臨床表現為發燒、意識狀態改變,合併性格改變或癲癇。","C":"腦脊髓液分析應包括單純皰疹病毒和腸病毒聚合酶連鎖反應(PCR)檢測。","D":"對於確診HSV腦炎,磁振攝影(MRI)影像80%個案可發現額葉(frontal lobe)病灶。","E":"對於HSV腦炎診斷,腦脊髓液PCR敏感度約96%,專一度約99%,與腦部切片(biopsy)相當,甚至 更高。"},"id":"114-88","roc_year":114,"source":"114合併PDF","topic_num":2,"topic":"中樞神經系統感染","q_num":88,"src":"114合併卷"},{"num":94,"answer":"A","stem":"一位30歲女性,經臉部微整形注射手術後,發生眼瞼下垂、複視及構音困難的狀況,請問下列敘述何者最 不適當?","options":{"A":"診斷為破傷風(tetanus),致病原為Clostridium tetani。","B":"治療以支持性治療為主,嚴重者可注射抗毒素。","C":"檢測血清毒素可以做為確診依據。","D":"無法以廣效性抗生素治療或預防。","E":"症狀與神經毒素(neurotoxin)有關。"},"id":"114-94","roc_year":114,"source":"114合併PDF","topic_num":2,"topic":"中樞神經系統感染","q_num":94,"src":"114合併卷"},{"num":103,"answer":"D","stem":"有關腸球菌與抗生素之敘述,請選出最正確的答案 (1) Vancomycin抗藥性腸球菌 (VRE) 最常見的菌種是Enterococcus faecium (2) Enterococcus faecalis菌血症通常以 vancomycin治療 (3) Enterococcus faecails感染的首選治療通常是 ampicillin (4) VRE的嚴重感染常需使用linezolid或daptomycin治療 (5) 尿液培養或痰液培養有VRE,需使用linezolid治療","options":{"A":"(1)+(2)","B":"(1)+(3)","C":"(2)+(4)","D":"(1)+(3)+(4)","E":"(1)+(2)+(3)+(4)+(5)"},"id":"109-103","roc_year":109,"source":"109合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":103,"src":"109合併卷"},{"num":107,"answer":"D","stem":"下列用於治療methicillin-resistant Staphylococcus aureus (MRSA)之敘述何者正確?","options":{"A":"MRSA與 methicillin-susceptible Staphylococcus aureus (MSSA) 心內膜炎死亡率相近","B":"只有院內感染才有MRSA的風險,一般社區型肺炎不應將MRSA列入考量","C":"Tigecycline屬於殺菌型藥物,可用於心內膜炎及菌血症之治療,高劑量使用須注意腸胃道症狀","D":"Linezolid長時間使用可能會造成血小板數量降低,也可能引發視神經病變,須注意眼底檢查","E":"Vancomycin使用時只須監測血中 trough 濃度,以評估其療效及副作用"},"id":"109-107","roc_year":109,"source":"109合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":107,"src":"109合併卷"},{"num":76,"answer":"D","stem":"底下哪一個抗生素藥物當使用劑量較大時,有可能產生肌肉毒性甚至發生肌肉溶解症之不良後果?","options":{"A":"Erythromycin","B":"Colistin","C":"Quinolone","D":"Daptomycin.","E":"Vancomycin"},"id":"109-76","roc_year":109,"source":"109合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":76,"src":"109合併卷"},{"num":83,"answer":"C","stem":"一位58歲男性因為髖骨骨折接受手術,手術後發生MRSA感染,於住院後接受清創手術及vancomycin注 射,治療三週進步後出院。出院時使用口服linezolid治療,請問在門診追蹤下列哪一項較不重要?","options":{"A":"Linezolid不可與單胺氧化酶抑制劑(monoamine oxidase inhibitor)或selective serotonin re-uptake inhibitor共同使用。","B":"要注意是否有乳酸中毒現象。","C":"會造成QTc prolongation。","D":"使用超過2週有骨髓抑制風險。","E":"使用超過4週有視神經和周邊神經病變之風險。"},"id":"110-83","roc_year":110,"source":"110合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":83,"src":"110合併卷"},{"num":87,"answer":"D","stem":"考量抗生素的特性及抗藥性問題, 在台灣目前經驗性抗生素在下列哪些情況不建議以 fluoroquinolone 當作 第一線治療?(1)急性化膿性扁桃炎(2)急性膀胱炎(3)足癬合併下肢蜂窩組織炎(4)急性腦膜炎(5)急性腹瀉","options":{"A":"(1)+(4)+(5)。","B":"(1)+(2)+(5)。","C":"(2)+(3)+(5)。","D":"(1)+(2)+(3)+(4)+(5)。","E":"(1)+(2)+(3)+(4)。"},"id":"110-87","roc_year":110,"source":"110合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":87,"src":"110合併卷"},{"num":93,"answer":"D","stem":"下列有關於抗生素與其他藥物產生之交互作用配對,何者最不適當?","options":{"A":"Metronidazole併用Ethanol發生disulfiram-like reaction。","B":"Macrolides併用Fluoroquinolones會增加心律不整(arrhythmias)的風險。","C":"Tetracyclines併用Warfarin會加強Warfarin抗凝血功能增加出血的風險。","D":"Rifampin會加強荷爾蒙作用,口服避孕藥(oral contraceptive)應減量使用。","E":"Linezolid會增加adrenergic升壓藥的作用,發生不易控制的高血壓。"},"id":"110-93","roc_year":110,"source":"110合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":93,"src":"110合併卷"},{"num":96,"answer":"C","stem":"下列有關抗生素的主要抑制機轉配對,何者最不適當?","options":{"A":"Cephalosporin–抑制細胞壁(Cell wall)合成。","B":"Clindamycin– 抑制蛋白質(Protein synthesis)合成。","C":"Macrolide– 抑制DNA合成。","D":"Sulfonamide– 抑制葉酸(Folate)合成。","E":"Rifampin - 抑制RNA合成。"},"id":"110-96","roc_year":110,"source":"110合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":96,"src":"110合併卷"},{"num":83,"answer":"E","stem":"近年來抗藥性細菌的問題引起各國政府重視,尤其以ESKAPE這些菌最為棘手。下列敘述,何項組合最正 確?(1) MRSA多以院內感染為主,社區型感染不需考慮MRSA。(2) Linezolid為抑菌型抗生素,所以不適 合用於治療VRE (vancomycin-resistant Enterococcus)引起之菌血症。(3)由於抗藥性細菌盛行率節節高 升,即便社區型感染還是得使用後線抗生素治療,以免治療失敗。(4)畜牧業使用抗生素,與人類得到抗 藥性細菌感染有關係。(5)在台灣carbapenem-resistant Klebsiella pneumoniae (CRKP)主要與碳青黴烯類 酶OXA-48有相關。","options":{"A":"(1)+(3)。","B":"(1)+(2)+(3) +(4)。","C":"(2)+(4)。","D":"(2)+(4)+(5)。","E":"(4)+(5)。"},"id":"112-83","roc_year":112,"source":"112合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":83,"src":"112合併卷"},{"num":85,"answer":"E","stem":"有關penicillin過敏,以下敘述何者錯誤?","options":{"A":"越來越多研究認為多數註記為penicillin過敏反應的病人並沒有真正過敏,而且penicillin過敏反應會隨 著時間過去而降低其產生過敏反應的機會,因此病史詢問、重新評估和正確註記很重要。","B":"曾被註記為penicillin過敏的病人因治療會接受更多vancomycin、fluoroquinolone或clindamycin等抗 生素,而增加多重抗藥菌感染率及手術傷口感染的機會。","C":"大多數對penicillin過敏的病人並非對完整藥物分子過敏,而是對體內penicillin降解物與白蛋白共價連 接產物過敏,以藥物溶液進行皮膚測試不足以識別大多數病人的過敏。","D":"目前國內臨床病人處置以病史為主,若無penicillin過敏病史,於符合適應症時可以直接使 用penicillin,並不須以藥物溶液進行皮膚測試;惟完備急救設備藥物和人員環境是所有醫療院所之基本 法規要求。","E":"若病史有中度或高度penicillin過敏反應風險者,建議以藥物溶液逕行進行皮膚測試。"},"id":"112-85","roc_year":112,"source":"112合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":85,"src":"112合併卷"},{"num":95,"answer":"B","stem":"下列之抗生素選項,何者無法治療李斯特菌(Listeria monocytogenes)感染?","options":{"A":"Ampicillin。","B":"Ceftriaxone。","C":"Vancomycin。","D":"Linezolid。","E":"TMP-SMX(Trimethoprim-Sulfamethoxazole)。"},"id":"112-95","roc_year":112,"source":"112合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":95,"src":"112合併卷"},{"num":85,"answer":"E","stem":"關於Ampicillin抗藥性且Vancomycin 抗藥性 Enterococcus species (VRE) 和抗生素治療的敘述,以下那 一組最正確? (1) 只要尿、痰或rectal swab 培養發現VRE,就應該立即治療。 (2) 可以使用Daptomycin治療VRE肺炎。 (3) 可以使用 Linezolid 或Daptomycin治療VRE菌血症。 (4) 近年VRE菌株數量在疾管署的統計之下,已佔整體Enterococcus species中之三至四成以上。 (5) VRE雖具Vancomycin 抗藥性,使用Teicoplanin治療其感染仍有很好之療效。","options":{"A":"(1)+(2)+(3)。","B":"(2)+(3)+(4)。","C":"(2)+(3)+(5)。","D":"(2)+(3)。","E":"(3)+(4)。"},"id":"113-85","roc_year":113,"source":"113合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":85,"src":"113合併卷"},{"num":93,"answer":"C","stem":"Extended-spectrum β-lactamase(ESBL)可以水解下列那些β-lactam抗生素,何者除外?","options":{"A":"Cefotaxime (Third-generatioin cephalosporin)。","B":"Aztreonam(Monobactam)。","C":"Meropenem(Carbapenem)。","D":"Piperacillin (anti-pseudomonal Penicillin)。","E":"Ceftazidime (anti-pseudomonal cephalosporin)。"},"id":"113-93","roc_year":113,"source":"113合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":93,"src":"113合併卷"},{"num":82,"answer":"D","stem":"有關腸球菌與抗生素使用之敘述,請選出最正確的答案 (1) vancomycin抗藥性腸球菌(VRE) 最常見菌種是Enterococcus faecium (2) 一位懷孕婦女產前檢查發現有尿中白血球數增加,尿培養是 Enterococcus faecalis ,建議給予口 服Amoxicillin治療 (3) 有一位腎移植病人,在準備尿路手術前發現尿液培養有VRE,此時可以給予 linezolid 治療 (4) VRE的嚴重感染常需要使用linezolid或daptomycin治療 (5) 尿液培養或痰液培養有VRE,就需要使用linezolid治療","options":{"A":"(1)+(2)+(4)。","B":"(1)+(3)+(4)。","C":"(2)+(3)+(4)。","D":"(1)+(2)+(3)+(4)。","E":"(1)+(2)+(3)+(4)+(5)。"},"id":"114-82","roc_year":114,"source":"114合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":82,"src":"114合併卷"},{"num":86,"answer":"D","stem":"金黃色葡萄球菌感染的治療,以下何者正確? (1) 對methicillin-susceptible Staphylococcus aureus, MSSA引起的關節感染, vancomycin或teicoplanin 治療優於 oxacillin 或 cefazolin (2) 對MSSA心內膜炎,優先以vancomycin或daptomycin治療 (3) 對vancomycin-intermediate Staphylococcus aureus, VISA菌株感染,可以考慮使 用linezolid或ceftaroline治療 (4) 當病人有金黃色葡萄球菌菌血症治療5天後,持續發燒應再重複血液培養,並檢查是否有深部感染病灶 (5) 對於輕微之皮膚軟組織感染可以選用口服 TMP-SMX 或 doxycycline 治療","options":{"A":"(1)+(2)+(3)。","B":"(1)+(3)+(4)。","C":"(2)+(3)+(5)。","D":"(3)+(4)+(5)。","E":"(1)+(2)+(4)+(5)。"},"id":"114-86","roc_year":114,"source":"114合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":86,"src":"114合併卷"},{"num":91,"answer":"B","stem":"對於胺基糖苷類(aminoglycosides)藥物的敘述,下列何者最不適當?","options":{"A":"這類藥物透過與細菌30S次單位核糖體(ribosomal subunit)16 SrRNA結合,在mRNA轉譯過程,抑 制細菌蛋白質合成。","B":"胺基糖苷類藥物如gentamicin,屬於抑菌性 ( bacteriostatic ) 抗生素,常與細胞壁活性藥物(如β內醯 胺類)併用,輔助用於治療嚴重感染。","C":"胺基糖苷類藥物在膿瘍(abscesses)的低pH值/低氧環境中,不具有良好的活性。","D":"這類抗生素的使用,發生腎毒性(nephrotoxicity)經常是可逆性,而耳毒性(ototoxicity)可能是不 可逆的。","E":"此類抗生素具有濃度依賴(concentration dependent)殺菌作用及後抗生素效應(post-antibiotic effect)。"},"id":"114-91","roc_year":114,"source":"114合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":91,"src":"114合併卷"},{"num":92,"answer":"D","stem":"磺胺類藥物(Trimethoprim/sulfamethoxazole)是廣效性抗生素,臨床可治療下列病原,但何者除外?","options":{"A":"人類肺囊蟲(Pneumocystis jiroveci)。","B":"嗜麥芽窄食單胞菌(Stenotrophomonas maltophilia)。","C":"社區性抗藥金黃色葡萄球菌(community-acquired MRSA)。","D":"綠膿桿菌(Pseudomonas aeruginosa)。","E":"感冒桿菌(Hemophilus influenzae)。"},"id":"114-92","roc_year":114,"source":"114合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":92,"src":"114合併卷"},{"num":93,"answer":"B","stem":"第二類Carbapenem如imipenem,是常見用於嚴重抗藥性菌感染的後線抗生素,下列哪一個病原具有與生 俱來的內源性抗藥(intrinsically resistant)?","options":{"A":"Pseudomonas aeruginosa。","B":"Stenotrophomonas maltophilia。","C":"ESBL-producing Klebsiella pneumoniae。","D":"Amp C-producing E. coli。","E":"Enterococcus faecalis。"},"id":"114-93","roc_year":114,"source":"114合併PDF","topic_num":3,"topic":"抗微生物製劑與抗藥性","q_num":93,"src":"114合併卷"},{"num":5,"answer":"E","stem":"有關流感疫苗接種副作用與禁忌症之敘述,下列何者正確? (1)對雞蛋嚴重過敏者為接種流感疫苗之禁忌。 (2)除了美國1976年H1N1豬流感疫苗外,接種季節流感疫苗後發生Guillain-Barre syndrome之機率極低。 (3)小於6個月之嬰兒不宜接受流感疫苗施打。 (4)部分流感疫苗中含有甲基汞與乙基汞用以保存疫苗,甲基汞與乙基汞均可為人體所代謝。 (5)在判斷流感疫苗接種後不良事件與疫苗接種之因果關係時,該不良事件之死亡或重症比率是重要的觀察指標。","options":{"A":"(1)+(2)+(3)","B":"(1)+(2)+(4)","C":"(1)+(3)+(4)","D":"(1)+(3)+(5)","E":"(1)+(2)+(3)+(5)"},"id":"107-綜-5","roc_year":107,"source":"107舊站q5綜合卷","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":5,"src":"舊站綜合卷"},{"num":104,"answer":"E","stem":"加護病房洗水槽同時使用於汙染物清洗和洗手等行為,容易造成院內感染,因此建議汙水與清潔水槽需區 分清楚,甚至將汙水槽移出加護病房,常見之病原菌下列何者為非?","options":{"A":"Pseudomonas aeruginosa","B":"Nontuberculous Mycobacterium","C":"Chryseobacterium","D":"Stenotrophomonas maltophilia","E":"Aspergillus fumigatus"},"id":"109-104","roc_year":109,"source":"109合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":104,"src":"109合併卷"},{"num":106,"answer":"C","stem":"暴露後預防建議使用抗微生物製劑者,請選出最適當的答案? (1) HIV (2) 麻疹 (3) COVID-19 (4) Influenza (5) Meningococcus","options":{"A":"(1)+(2)+(4)","B":"(1)+(3)+(4)","C":"(1)+(4)+(5)","D":"(1)+(3)+(4)+(5)","E":"(1)+(2)+(3)+(4)+(5)"},"id":"109-106","roc_year":109,"source":"109合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":106,"src":"109合併卷"},{"num":112,"answer":"D","stem":"有關預防中心靜脈導管相關血流感染之實證,下列何者組合為正確? (1) 使用最大無菌面(maximal barrier precautions)做防護 (2) 皮膚消毒效果使用β-iodine優於chlorhexidine (3) 置放導管前後需執行手部衛生(hand hygiene) (4) 中心靜脈導管置放時間以14天為原則,每14天需常規更換一次,以避免感染","options":{"A":"(1)+(2)+(3)+(4)","B":"(1)+(2)+(3)","C":"(2)+(4)","D":"(1)+(3)","E":"(1)+(3)+(4)"},"id":"109-112","roc_year":109,"source":"109合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":112,"src":"109合併卷"},{"num":114,"answer":"B","stem":"有一位30歲孕婦,想來門診施打疫苗預防感染,下列那些疫苗是孕婦不建議注射的? (1) Influenza vaccine 流感疫苗 (2) MMR vaccine (Measles – Mump – Rubella vaccine) 麻疹-腮腺炎-德國麻疹疫苗 (3) Varicella vaccine 水痘疫苗 (4) Pneumococcal vaccine 肺炎鏈球菌疫苗","options":{"A":"(1)+(3)","B":"(2)+(3)","C":"(1)+(4)","D":"(1)+(2)+(3)","E":"(2)+(3)+(4)"},"id":"109-114","roc_year":109,"source":"109合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":114,"src":"109合併卷"},{"num":90,"answer":"B","stem":"根據美國疾病管制局的建議,對於懷孕者,包括高風險感染之懷孕婦女,下列何者是不建議接種的疫苗組 合?選項:(1)B型肝炎疫苗(HBV vaccine)(2)帶狀皰疹疫苗(Varicella-zoster vaccine)(3)麻疹、德國 麻疹、腮腺炎疫苗(MMR vaccine)(4)流感疫苗(Influenza)(5)白喉、百日咳、破傷風(Td/Tdap vaccine)","options":{"A":"(1)+(2)。","B":"(2)+(3)。","C":"(3)+(4)。","D":"(4)+(5)。","E":"(3)+(5)。"},"id":"110-90","roc_year":110,"source":"110合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":90,"src":"110合併卷"},{"num":88,"answer":"D","stem":"推廣酒精乾洗手可以大大降低院內感染的發生,以下敘述何者正確?","options":{"A":"酒精乾洗手每次使用酒精量1毫升即可。","B":"酒精乾洗手可清除寄生蟲蟲卵。","C":"酒精乾洗手可清除腸病毒、諾羅病毒。","D":"酒精乾洗手可清除流感病毒、新冠病毒。","E":"以上皆正確。"},"id":"111-88","roc_year":111,"source":"111合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":88,"src":"111合併卷"},{"num":89,"answer":"B","stem":"下列疫苗組合選項,何者皆為活性疫苗,不建議接種於嚴重免疫不全病人?(1)TdaP(破傷風、白喉、百日 咳混合疫苗) (2)MMR(麻疹、腮腺炎、德國麻疹混合疫苗) (3)HPV(人類乳突病毒疫苗) (4)Varicella-Zoster(帶狀皰疹疫苗,Zostavax®) (5)Meningococcal vaccine(腦膜炎雙球菌疫苗)","options":{"A":"(1)+(3)+(5)。","B":"(2)+(4)。","C":"(1)+(2)+(3)。","D":"(2)+(3)+(5)。","E":"(4)+(5)。"},"id":"112-89","roc_year":112,"source":"112合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":89,"src":"112合併卷"},{"num":83,"answer":"D","stem":"有關成人疫苗接種建議下列何組正確? (1) 德國麻疹感染對胎兒有重大影響,建議懷孕中婦女一旦發現無抗體,便立即補施打MMR。 (2) 依國內成人疫苗接種建議,65歲以上長者,若無特殊禁忌,建議施打肺炎鏈球菌疫苗、流感疫苗及新 型冠狀病毐疫苗。 (3) 骨髓移植後病患,考慮其免疫功能低下情況,宜於移植後立即接種水痘疫苗,以降低感染風險。 (4) 依國內成人疫苗接種建議,育齡婦女於懷孕第28至36週建議接種一劑減量破傷風白喉非細胞性百日咳 混合 ( Tdap) 疫苗,以保護胎兒及剛出生嬰兒。 (5) 婦女於懷孕後任何孕期都可以接種流感疫苗。","options":{"A":"(1)+(2)+(3)。","B":"(1)+(2)+(3)+(4)。","C":"(1)+(2)+(4)+(5)。","D":"(2)+(4)+(5)。","E":"(2)+(3)+(5)。"},"id":"113-83","roc_year":113,"source":"113合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":83,"src":"113合併卷"},{"num":89,"answer":"D","stem":"下列那一個疫苗在懷孕婦女(pregnancy)是禁忌症(contraindications)?","options":{"A":"Pneumococcal polysaccharide vaccine。","B":"Pneumococcal conjugate vaccine。","C":"Hepatitis B vaccine。","D":"Varicella vaccine。","E":"Meningococcal conjugate vaccine。"},"id":"113-89","roc_year":113,"source":"113合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":89,"src":"113合併卷"},{"num":94,"answer":"C","stem":"下列何者不是醫療人員建議應常規評估施打的疫苗?","options":{"A":"B型肝炎疫苗(HBV vaccine)。","B":"水痘疫苗(chickenpox vaccine)。","C":"帶狀皰疹疫苗(Varicella-zoster vaccine)。","D":"麻疹、腮腺炎疫苗、德國麻疹(MMR vaccine)。","E":"流感疫苗 (influenza vaccine)。"},"id":"113-94","roc_year":113,"source":"113合併PDF","topic_num":4,"topic":"疫苗、旅遊與感染管制","q_num":94,"src":"113合併卷"},{"num":97,"answer":"D","stem":"下列關於HIV感染與腫瘤的關係何者錯誤?","options":{"A":"Kaposi’s sarcoma與Human Herpes virus – 8 (HHV-8) 的感染有關","B":"Anogenital carcinoma與Human papilloma virus (HPV) 的感染有關","C":"Primary CNS lymphoma (原發性中樞神經淋巴瘤) 與Epstein-Barr virus ( EBV )的感染有關","D":"Burkitt’s lymphoma與Cytomegalovirus ( CMV ) 的感染有關係","E":"HIV感染相關之lymphoma主要是B cell lymphoma"},"id":"109-97","roc_year":109,"source":"109合併PDF","topic_num":5,"topic":"免疫不全、移植後與伺機性感染","q_num":97,"src":"109合併卷"},{"num":91,"answer":"A","stem":"一位接受血液幹細胞移植(Hematopoietic Stem Cell Transplantation)的病人,在移植後100天發生感 染,請問在此時期之常見之致病原組合,下列何者為最正確?(1)Escherichia coli(2)Aspergillus(3)Cytomegalovirus(4)Clostridium difficile(5)Encapsulated bacteria(6)Toxoplasma(7)Varicella zoster virus","options":{"A":"(2)+(3)+(6)。","B":"(1)+(3)+(4)+(5)。","C":"(2)+(4)+(5)。","D":"(5)+(6)+(7)。","E":"(1)+(4)+(7)。"},"id":"110-91","roc_year":110,"source":"110合併PDF","topic_num":5,"topic":"免疫不全、移植後與伺機性感染","q_num":91,"src":"110合併卷"},{"num":94,"answer":"C","stem":"有關在血液幹細胞移植後(Hematopoietic Stem Cell Transplant)早期(<1個月)發生的感染,下列何者致病 原之選項最不適當?","options":{"A":"Pseudomonas aeruginosa。","B":"Herpes simplex virus。","C":"Cytomegalovirus (CMV)。","D":"Candida albicans。","E":"Clostridium difficile。"},"id":"112-94","roc_year":112,"source":"112合併PDF","topic_num":5,"topic":"免疫不全、移植後與伺機性感染","q_num":94,"src":"112合併卷"},{"num":114,"answer":"B","stem":"病人出現下列何種抗體常合併細胞內細菌,黴菌及非結核分枝桿菌(non-tuberculous mycobacteria)之感 染? (1) anti-IL-4 (2) anti-IL-23 (3) anti-interferon-γ (4) anti-IL-5 (5) anti-IL-13。","options":{"A":"(1)+(2)。","B":"(2)+(3)。","C":"(3)+(4)。","D":"(4)+(5)。","E":"(5)+(1)。"},"id":"113-114","roc_year":113,"source":"113合併PDF","topic_num":5,"topic":"免疫不全、移植後與伺機性感染","q_num":114,"src":"113合併卷"},{"num":95,"answer":"D","stem":"血液幹細胞移植後使用一年TMP-SMX預防,可以減少的致病原感染,下列何者最不適當?","options":{"A":"Listeria monocytogenes。","B":"Nocardia。","C":"Streptococcus pneumoniae。","D":"Pseudomonas aeruginosa。","E":"Pneumocystis。"},"id":"113-95","roc_year":113,"source":"113合併PDF","topic_num":5,"topic":"免疫不全、移植後與伺機性感染","q_num":95,"src":"113合併卷"},{"num":96,"answer":"C","stem":"下列那一個致病原較不常出現於早期(1個月內)血液幹細胞移植(Hematopoietic Stem Cell Transplantation)後感染?","options":{"A":"Escherichia coli。","B":"Candida albicans。","C":"Cytomegalovirus。","D":"Clostridium difficile。","E":"Aspergillus fumigatus。"},"id":"113-96","roc_year":113,"source":"113合併PDF","topic_num":5,"topic":"免疫不全、移植後與伺機性感染","q_num":96,"src":"113合併卷"},{"num":90,"answer":"B","stem":"一位接受同種異體造血幹細胞移植(allogeneic HSCT)的病人,免疫狀態穩定,在移植後6個月發生瀰漫 性 (disseminated) 感染,請問下列致病原何者風險最高?","options":{"A":"綠膿桿菌(Pseudomonas aeruginosa)。","B":"肺炎球菌(Streptococcus pneumoniae)。","C":"退伍軍人菌(Legionella)。","D":"困難梭狀桿菌 (Clostridioides [Clostridium] difficile)。","E":"念珠菌(Candida)。"},"id":"114-90","roc_year":114,"source":"114合併PDF","topic_num":5,"topic":"免疫不全、移植後與伺機性感染","q_num":90,"src":"114合併卷"},{"num":102,"answer":"C","stem":"你收療的登革熱患者即將出院,關於出院衛教,以下何者正確?","options":{"A":"登革熱常發生在熱帶及亞熱帶地區,在台灣主要病媒蚊為瘧蚊和白線斑蚊","B":"得過登革熱之後即會出現保護性抗體,對登革熱終生免疫","C":"登革熱一共有4型,目前認為第一次感染登革熱病毒後體內自然產生的抗體,可能會在感染其他型別 登革熱時造成「抗體依賴性免疫加強反應」(antibody dependent enhancement; ADE),造成嚴重的 併發症","D":"登革出血熱 (dengue hemorrhagic fever) 與登革熱休克症候群 (dengue shock syndrome) 僅會出現在 第一型登革熱,所以若曾得過登革出血熱,就會終生免疫了","E":"登革熱4效價減毒活疫苗 (Sanofi) 建議使用於未曾感染過登革熱的人"},"id":"109-102","roc_year":109,"source":"109合併PDF","topic_num":6,"topic":"蟲媒、人畜共通與輸入性感染","q_num":102,"src":"109合併卷"},{"num":111,"answer":"B","stem":"一位廚師,在清理廚餘時不慎被老鼠(Rodent)咬傷腳趾,幾天後開始出現高燒、畏寒、頭痛、四肢疼 痛、淋巴腫脹、血液細菌培養有報告長菌,下列敘述何者為非?","options":{"A":"致病原為Streptobacillus moniliformis或Pasteurella multocida","B":"此感染致病菌屬於革蘭氏陽性桿菌(Gram positive bacilli)","C":"此菌生長緩慢,可能需要3至7天培養才會養出","D":"若對於Penicillin有過敏,可以使用doxycycline","E":"致病原亦可為Leptospira,可利用血清抗體力價診斷"},"id":"109-111","roc_year":109,"source":"109合併PDF","topic_num":6,"topic":"蟲媒、人畜共通與輸入性感染","q_num":111,"src":"109合併卷"},{"num":84,"answer":"B","stem":"一位35歲男性到急診就醫,主訴腹部不適、嘔吐和稀大便5天,發燒也越來越嚴重,也有頭痛和皮膚 疹。身體診察體溫40°C,血壓100/70mmHg,心搏62/分,吸呼20/分,BMI 26,明顯生病樣。在下胸和 上腹部有變淡的紅斑疹,他的鞏膜變黃,結膜充血,咽部較紅,而觸診有肝脾腫大和壓痛。CBC血色 素12 gm/dl,白血球4500/cumm,多形核白血球68%,band form 10%,淋巴球16%,單核球6%,血小 板90000/cumm,AST 120u/L,ALT 240u/L,二套血液培養為格蘭氏陰性菌。最可能的診斷及其治療?","options":{"A":"鈎端螺旋體感染,ciprofloxacin。","B":"傷寒,ceftriaxone。","C":"退伍軍人病,ciprofloxacin。","D":"李斯特菌感染,ampicillin。","E":"布氏桿菌病 (brucellosis),doxycycline。"},"id":"110-84","roc_year":110,"source":"110合併PDF","topic_num":6,"topic":"蟲媒、人畜共通與輸入性感染","q_num":84,"src":"110合併卷"},{"num":86,"answer":"D","stem":"病史詢問可提供敗血症病原重要線索, 以下哪些狀況要想到鉤端螺旋體病之風險? (1)洪水氾濫後 (2)在溪流河川活動 (3)廚師 (4)從事農田、獸醫或畜牧工作 (5)到三溫暖泡足部溫泉","options":{"A":"(1)+(2)+(4)。","B":"(3)+(4)+(5)。","C":"(1)+(3)+(4)。","D":"(1)+(2)+(3)+(4)。","E":"(1)+(2)+(3)+(4)+(5)。"},"id":"110-86","roc_year":110,"source":"110合併PDF","topic_num":6,"topic":"蟲媒、人畜共通與輸入性感染","q_num":86,"src":"110合併卷"},{"num":87,"answer":"D","stem":"猴痘 (monkeypox) 2022年6月至少在27個非洲以外國家發現並通報世界衛生組織(WHO)。下列敘述,何 項組合最正確? (1) 猴痘由DNA病毒造成,症狀與天花類似,過去主要發現於鄰近熱帶雨林的中非和西非國家。天花疫苗 對猴痘有85%保護力。 (2) 傳播主要是透過密切接觸到呼吸分泌物感染的皮膚病灶或汙染的物體。潛伏期可從5至21天,但大 多6至13天。 (3) 症狀如發燒、頭痛、肌肉腫脹和酸痛、虛脫,一般先從臉部出疹,再逐漸擴散到手、足等身體其他部 位。皮疹從斑丘疹、小水皰轉變為膿皰,約10天後結痂,2至3週消失。 (4) 猴痘是人畜共通傳染病,惟近期很多新增個案是經性行為傳播,在會陰部病灶常需與梅毒、軟性下疳 和帶狀泡疹鑑別。 (5) 猴痘病人在照護上,台灣CDC建議收治於具獨立衛浴之單人病房。在進行會引起氣溶膠的醫療處 置(aerosal generating procedues)需有空氣傳染防護措施(airborne precaution),且要穿戴適當防護裝 備。","options":{"A":"(1)+(2)+(3)+(5)。","B":"(1)+(2)+(3)。","C":"(1)+(2)+(4)。","D":"(1)+(2)+(3)+(4)+(5)。","E":"(1)+(3)+(4)+(5)。"},"id":"111-87","roc_year":111,"source":"111合併PDF","topic_num":6,"topic":"蟲媒、人畜共通與輸入性感染","q_num":87,"src":"111合併卷"},{"num":77,"answer":"C","stem":"有關退伍軍人症(Legionellosis),下列何者敘述為非?","options":{"A":"Legionella是嗜氧革蘭氏陰性桿菌,主要是Legionella pneumophila與人類感染有關。","B":"傳染方式是飛沫傳染,通常經由吸入受汙染水源而致病,潛伏期為2至10天。","C":"免疫力低下感染病人容易感染,使用10至14天第三代頭孢子素(如Ceftriaxone)可有效治療。","D":"醫院供水系統中發現該病菌時,可藉二氧化氯(chlorine dioxide)消毒,或銅-銀離子交換(copper-silver ionization)進行消毒。","E":"Legionella可造成肺外感染,如腹膜炎或腎盂腎炎。"},"id":"112-77","roc_year":112,"source":"112合併PDF","topic_num":6,"topic":"蟲媒、人畜共通與輸入性感染","q_num":77,"src":"112合併卷"},{"num":96,"answer":"E","stem":"以下針對猴痘(Monkeypox)的敘述,何者最不適當?","options":{"A":"猴痘病毒屬於痘病毒科(Poxviridae),正痘病毒屬(Orthopoxvirideae),為雙股DNA病毒(dsDNA)。","B":"接種天花(smallpox)疫苗,可對猴痘產生部分免疫力。","C":"主要藉由齧齒類動物及靈長類動物傳播給人,屬人畜共通傳染病(zoonosis)。","D":"前驅症狀,如發熱、頭痛、疲倦,約維持1至4天。","E":"發疹(皮膚病灶)係由四肢向臉部及軀幹中心蔓延(centripetal)。"},"id":"112-96","roc_year":112,"source":"112合併PDF","topic_num":6,"topic":"蟲媒、人畜共通與輸入性感染","q_num":96,"src":"112合併卷"},{"num":82,"answer":"C","stem":"29歲未婚女性,無特別過去病史,9天前自菲律賓返國,自5天前始出現反覆發燒,頭痛,全身酸痛,後 續開始出現有皮疹(如圖一),至醫院急診就醫,意識清楚,體溫390C,血壓98/57mmHg,心 跳85/min.,呼吸20/min.,於量測血壓之手臀有發現疑似出血點(如圖二)抽血檢查結果如 下:WBC:2100/uL; Hgb:14.4 g/dl; PLT:104k/uL; N/L:83.7%/11%; AST:41 U/L; ALT:8 U/L; Creatinine: 0.6 mg/dL; 血清NS-1 Ag檢測結果為陽性,請問有關此個案處置何者正確?","options":{"A":"血小板過低併有疑似出血點,宜立即輸血小板。","B":"立即給予經驗性抗生素治療atypical pathogens,並給予NSAIDs以減緩疼痛。","C":"此個案高度懷疑為登革熱,建議給予支持性治療並通報疾管署,使用蚊帳。","D":"此疾病一旦感染過便具有抗體,終生不會再次得該病。","E":"以上皆非。"},"id":"113-82","roc_year":113,"source":"113合併PDF","topic_num":6,"topic":"蟲媒、人畜共通與輸入性感染","img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgk "103-綜-5","roc_year":103,"source":"103舊站q5綜合卷","topic_num":7,"topic":"皮膚軟組織與骨關節感染","q_num":5,"src":"舊站綜合卷"},{"num":85,"answer":"E","stem":"被動物咬傷時有所聞,當病患被咬傷後到醫院就醫,你除了處理傷口外,下列敘述何者不正確?","options":{"A":"狗咬和貓咬的致病菌包括金黃色葡萄球菌、巴士德桿菌(Pasteurella multocida)和厭氧菌。","B":"優先考慮的抗生素是amoxicillin/clavulanate或ampicillin/sulbactam。","C":"如病人有penicillin過敏史,可用clindamycin + trimethoprim-sulfamethoxazole或 fluoroquinolone。","D":"需考慮狂犬病預防。","E":"被猴子咬傷也是選擇amoxicillin/clavulanate治療, 無需考慮抗病毒藥的使用。"},"id":"110-85","roc_year":110,"source":"110合併PDF","topic_num":7,"topic":"皮膚軟組織與骨關節感染","q_num":85,"src":"110合併卷"},{"num":158,"answer":"E","stem":"45歲男性印尼移工,一年前開始注意到自己身體出現紅色突起丘疹及斑塊,病灶逐漸擴展至臉部及四 肢,單一病灶面積也變大,一個月前發現外側眉毛脫失,病灶觸摸時有麻木感 (圖一及圖二)。皮膚切片病 理檢查可見皮膚真皮內有泡沫細胞(foam cells)浸潤及許多抗酸性菌。請問最可能的診斷為何?","options":{"A":"類結核型漢生病 (Tuberculoid leprosy)。","B":"尋常狼瘡 (Lupus vulgaris)。","C":"類肉瘤病 (Sarcoidosis)。","D":"環形肉芽腫 (Granuloma annulare)。","E":"腫瘤型漢生病 (Lepromatous leprosy)。"},"id":"111-158","roc_year":111,"source":"111合併PDF","topic_num":7,"topic":"皮膚軟組織與骨關節感染","img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAHRA4QDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDxwU4U1aeBX6Sj5NhTSKdigimySMjmkxTyKQmkUhoFOApBTxxQIAKaVp4NLQBGBigU5himigpCUUYpQOaksTFNxUtNA55/Tmk1J/CF11I8U8Dil8s5wKU 5,"src":"111合併卷"},{"num":86,"answer":"D","stem":"一位24歲男性大學生,平常健康,因蚊子叮咬後,左腳紅腫到門診來,身體診察體溫37.3°C ,血 壓120/72 mmHg,脈搏72/min,呼吸14/min,在左腳有3×5公分紅腫,觸摸有溫熱,但無化膿現象,也無 淋巴結腫痛。下述最合適的抗生素:","options":{"A":"moxifloxacin。","B":"ciprofloxacin。","C":"linezolid。","D":"cephalexin。","E":"doxycycline。"},"id":"111-86","roc_year":111,"source":"111合併PDF","topic_num":7,"topic":"皮膚軟組織與骨關節感染","q_num":86,"src":"111合併卷"},{"num":96,"answer":"D","stem":"一位30歲男性,路上不慎被狗咬傷,被送至急診處置,下列敘述何者不正確?","options":{"A":"常見致病原為Staphylococcus aureus、Pasteurella multocida、Anaerobe等。","B":"若致病原為Capnocytophaga canimorsus引起之敗血症,血液培養需要至14天。","C":"首選治療為amoxicillin/clavulanate或ampicillin/sulbactam。","D":"若對penicillin過敏,可使用macrolide治療做為替代。","E":"需評估是否有Rabies預防處置之需要。"},"id":"111-96","roc_year":111,"source":"111合併PDF","topic_num":7,"topic":"皮膚軟組織與骨關節感染","q_num":96,"src":"111合併卷"},{"num":156,"answer":"C","stem":"關於疥瘡(scabies)感染,以下何者「正確」?(1) 第㇐次受到疥蟲 (Sarcoptes scabiei var. hominis)感染之 個案,可能長達六週才出現搔癢的症狀。(2) 抗疥藥膏局部厚塗於患部紅疹處就可徹底除去疥蟲感染。(3) 結痂型疥瘡(挪威疥) (crusted / Norwegian scabies)常發生在免疫力低下的年長衰弱的臥床病人。(4) 家中 寵物(如貓狗)身上的疥蟲不會傳染給人類。(5) 成人的疥瘡感染最好發於手臂、腿部、背部及臉部 。","options":{"A":"(1)+(2)+(3)。","B":"(2)+(3)+(4)。","C":"(1)+(3)。","D":"(2)+(4)。","E":"(3)+(4)+(5)。"},"id":"112-156","roc_year":112,"source":"112合併PDF","topic_num":7,"topic":"皮膚軟組織與骨關節感染","q_num":156,"src":"112合併卷"},{"num":160,"answer":"E","stem":"請問如圖中所示之疾病,最有可能由以下何者造成?","options":{"A":"土壤絲菌(Nocardia)。","B":"分枝桿菌(Mycobacterium)。","C":"帶狀疱疹病毒(Varicella zoster virus)。","D":"白色念珠菌(Candida albicans)。","E":"鏈球菌(Streptococcus)。"},"id":"112-160","roc_year":112,"source":"112合併PDF","topic_num":7,"topic":"皮膚軟組織與骨關節感染","img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCALZAsQDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM nsect vector bite。","B":"larvae skin penetration。","C":"ingest egg from mouth。","D":"metacercaria in fish。","E":"cercariae skin penetration from water。"},"id":"111-92","roc_year":111,"source":"111合併PDF","topic_num":9,"topic":"病毒、黴菌與寄生蟲感染","q_num":92,"src":"111合併卷"},{"num":93,"answer":"C","stem":"下列有關隱球菌(Cryptococcus)的描述,何者為非?","options":{"A":"C. gattii在鳥類糞便(如鴿子)不容易發現。","B":"在HIV感染族群,memory B cell IgM的下降,具有較高的感染風險。","C":"Cryptococcal Ag可以有效的診斷肺部感染(pulmonary cryptococcosis),具有很好的敏感性與專一性。","D":"肺部隱球菌感染的治療以fluconazole 200-400mg/天為期3-6個月。","E":"肺外感染(如腦膜炎)以amphotericin B deoxycholate 0.5-1 mg/kg/天,做為起始治療。"},"id":"111-93","roc_year":111,"source":"111合併PDF","topic_num":9,"topic":"病毒、黴菌與寄生蟲感染","q_num":93,"src":"111合併卷"},{"num":160,"answer":"B","stem":"有位病人右臉疼痛數日後出現水泡,經診斷為帶狀疱疹 (Herpes zoster)。有關此疾病之敘述,以下何者 錯誤:","options":{"A":"由Varicella-zoster virus (VZV) 造成。","B":"病人通常在近期內有VZV接觸史。","C":"皮疹常沿神經皮節 (dermatome) 分布。","D":"可侵犯中樞神經。","E":"口服抗病毒藥物可促進病灶癒合、疼痛改善。"},"id":"113-160","roc_year":113,"source":"113合併PDF","topic_num":9,"topic":"病毒、黴菌與寄生蟲感染","q_num":160,"src":"113合併卷"},{"num":81,"answer":"D","stem":"一位36歲男同志(MSM)因頭痛、發燒、畏寒一週,噁心、嘔吐及水瀉一週而來到急診,血液檢查白血 球13000/cumm,中性白血球83%,CRP 25mg/dL,腹部斷層攝影在迴腸末端和升結腸有腸壁增厚現 象,糞便檢查潛血4+,大腸鏡發現在升結腸有潰瘍,切片檢查有活動體(trophozoites) ,對這位病人治療 建議為何?","options":{"A":"治療以口服或靜脈注射metronidazole 750mg Tid × 5-10天。","B":"治療以paromomycin 500mg Tid × 10天。","C":"Metronidazole可殺Entamoeba histolytica活動體和腸腔內囊體(cyst)。","D":"治療初期以metronidazole,接著應以paromomycin治療以根除腸腔內囊體。","E":"以上皆非。"},"id":"114-81","roc_year":114,"source":"114合併PDF","topic_num":9,"topic":"病毒、黴菌與寄生蟲感染","q_num":81,"src":"114合併卷"},{"num":8,"answer":"A","stem":"一位30歲男性,在參加喜宴後3小時開始發生上吐下瀉之症狀,請問最有可能與下列何種病原相關?","options":{"A":"Staphylococcus aureus","B":"Shigella spp.","C":"Vibrio cholerae","D":"Salmonella spp.","E":"Enterohemorrhagic"},"id":"105-綜-8","roc_year":105,"source":"105舊站q5綜合卷","topic_num":10,"topic":"泌尿道、腸胃道與腹腔內感染","q_num":8,"src":"舊站綜合卷"},{"num":105,"answer":"E","stem":"食媒性疾病,以下哪些配對最不正確?","options":{"A":"Listeriosis與乳酪","B":"Campylobacter jejuni與未煮熟雞肉","C":"Salmonella與生雞蛋","D":"Norovirus與生蠔或污染的水","E":"Q fever與生牛肉"},"id":"109-105","roc_year":109,"source":"109合併PDF","topic_num":10,"topic":"泌尿道、腸胃道與腹腔內感染","q_num":105,"src":"109合併卷"},{"num":58,"answer":"B","stem":"Struvite stones occurs in patients of repeated urinary tract infections (UTI) from bacteria that produce the enzyme urease, including both gram-positive and gram-negative species. Which is the least possible micropathogen causing struvite stone and repeated UTI?","options":{"A":"Klebsiella spp。","B":"Escherichia coli。","C":"Mycoplasma spp。","D":"Staphylococcus epidermidis。","E":"Proteus。"},"id":"110-58","roc_year":110,"source":"110合併PDF","topic_num":10,"topic":"泌尿道、腸胃道與腹腔內感染","q_num":58,"src":"110合併卷"},{"num":83,"answer":"A","stem":"一位51歲女性於3天前因噁心、嘔吐、右側腰肋疼痛和高燒住院,在急性腎盂腎炎的診斷下入院即開始接 受Ceftriaxone治療。因為病人高燒72小時不退,你值班被呼叫去看病人,此時病人身體診察體 溫39°C,血壓106/60 mmHg,脈搏110/min,呼吸18/min,BMI 27,右側肋脊角壓痛。入院時尿液培養 發現大於105菌落/mL的E. coli且對ceftriaxone有敏感性,血液培養陰性。請問下列那一項是最適當的處 置?","options":{"A":"腎臟電腦斷層攝影檢查。","B":"尿液培養。","C":"抗生素改為gentamicin。","D":"抗生素改為amoxicillin/clavulanate。","E":"給退燒藥,觀察即可。"},"id":"111-83","roc_year":111,"source":"111合併PDF","topic_num":10,"topic":"泌尿道、腸胃道與腹腔內感染","q_num":83,"src":"111合併卷"},{"num":89,"answer":"C","stem":"在台灣血糖控制不良的患者中,Klebsiella pneumoniae是重要且常見的腸源性致病菌,經常造成肝膿 瘍、泌尿道感染等疾病,以下相關敘述,何者正確?","options":{"A":"臨床上wild type K. pneumoniae 可用Ampicillin治療。","B":"若檢驗結果為Extended spectrum beta-lactamase (ESBL) -producing K. pneumoniae 因對第一線抗 生素有抗藥性,建議使用Ceftriaxone治療。","C":"臨床上對於ESBL-producing K. pneumoniae 感染建議使用imipenem或ertapenem治療。","D":"可產生NDM-1 carbapenemase的K. pneumoniae可用Tigecycline和Trimethoprim /Sulfamethoxazole (TPM-SMX)治療。","E":"在台灣造成肝膿瘍或眼內炎的致病菌相對抗藥性較高,大多是屬於ESBL-producing K. pneumoniae。"},"id":"111-89","roc_year":111,"source":"111合併PDF","topic_num":10,"topic":"泌尿道、腸胃道與腹腔內感染","q_num":89,"src":"111合併卷"},{"num":86,"answer":"D","stem":"關於菌尿 (bacteriuria)和尿路感染的敘述,以下何者錯誤?","options":{"A":"尿路感染的危險因子包括停經婦女、性行為、糖尿病和失禁。","B":"懷孕婦女有菌尿時,給予適當抗生素治療可以降低腎盂腎炎、早產、嬰孩低出生體重之發生。","C":"大多數有尿路感染的男性都有尿路功能性或解剖結構的異常,例如攝護腺肥大或包皮因素。","D":"一位70歲女性,一年前中風後長期接受導尿管置放,因流鼻水、咳嗽及輕微發燒被送到急診室,給 予症狀性治療後送回護理之家,3天後病人被帶回門診追蹤,此時病人只有輕微咳嗽,餵食情況良 好,而在急診室所送檢之尿培養報告有糞腸球菌 (Enterococcus faecalis),此時應給 予ciprofloxacin治療。","E":"腎移植病人、嗜中性白血球數低下、要接受尿路手術者,有菌尿但沒有症狀,尿培養報告 有Vancomycin抗藥性尿腸球菌 (Enterococcus faecium),此時可以給予口服linezolid治療。"},"id":"113-86","roc_year":113,"source":"113合併PDF","topic_num":10,"topic":"泌尿道、腸胃道與腹腔內感染","q_num":86,"src":"113合併卷"},{"num":88,"answer":"C","stem":"Klebsiella pneumoniae是重要且常見的致病菌,常造成社區性肝膿瘍、泌尿道感染,也常造成嚴重的院內 感染,以下相關敘述,何者正確?","options":{"A":"臨床上wild type K. pneumoniae 可用Ampicillin治療。","B":"若檢驗結果為Extended spectrum beta-lactamase (ESBL) -producing K. pneumoniae ,建議使 用minocycline治療。","C":"臨床上對於ESBL-producing K. pneumoniae 感染建議使用ertapenem或imipenem治療。","D":"可產生NDM-1 carbapenemase的K. pneumoniae可用ceftazidime/avibactam治療。","E":"在台灣造成肝膿瘍或眼內炎的致病菌相對抗藥性較高,大多是屬於ESBL-producing K. pneumoniae。"},"id":"113-88","roc_year":113,"source":"113合併PDF","topic_num":10,"topic":"泌尿道、腸胃道與腹腔內感染","q_num":88,"src":"113合併卷"},{"num":85,"answer":"C","stem":"Clostridioides (Clostridium) difficile 感染之相關敘述,何者正確?","options":{"A":"有效預防 Clostridioides (Clostridium) difficile 孢子傳播之院內感染控制措施包括戴手套、穿隔離衣及 使用酒精性乾洗手液洗手。","B":"對於長期住院病患,使用胃腸道質子幫浦抑制劑(PPI)能有效降低感染風險。","C":"此菌株可使用 metronidazole 或 vancomycin 作為第一線口服治療選擇。","D":"對於嚴重感染(如每日腹瀉逾 10 次)應優先使用針劑 vancomycin 治療。","E":"腹瀉病患如 stool culture 培養出 Clostridioides (Clostridium) difficile,即可診斷為 Clostridioides (Clostridium) difficile associated disease。"},"id":"114-85","roc_year":114,"source":"114合併PDF","topic_num":10,"topic":"泌尿道、腸胃道與腹腔內感染","q_num":85,"src":"114合併卷"},{"num":95,"answer":"D","stem":"有關困難梭狀桿菌(Clostridioides [Clostridium] difficile)感染(CDI),下列何者組合皆為不適當的描述? (1) 萬古黴素(vancomycin)也具有引發後續發生C. difficile colitis的風險。 (2) 對於初次感染,以fidaxomicin或萬古黴素(vancomycin)口服持續10天為首選治療。 (3) 針對NAP1/BI/027菌株,CDI首選治療為口服metronidazole。 (4) 治療終點為腹瀉停止,不需要再檢測糞便的毒素清除情形。 (5) 多次治療後仍復發的患者,建議可使用針劑vancomycin做減量治療(tapered therapy)。","options":{"A":"(1)+(3)+(4)+(5)。","B":"(2)+(3)。","C":"(1)+(4)。","D":"(3)+(5)。","E":"(4)+(5)。"},"id":"114-95","roc_year":114,"source":"114合併PDF","topic_num":10,"topic":"泌尿道、腸胃道與腹腔內感染","q_num":95,"src":"114合併卷"},{"num":108,"answer":"D","stem":"有關冠狀病毒,請選出最適當的答案。 (1) SARS-CoV、MERS-CoV、SARS-CoV-2皆屬於RNA病毒,此三者皆屬於Betacoronavirus (2) 冠狀病毒中,E gene負責製造Envelope protein,幫助病毒結合受體,進而入侵人體細胞 (3) 此三株病毒以SARS-CoV感染者之死亡率最高 (4) SARS-CoV-2感染者可能引發細胞素風暴症候群(cytokine storm syndrome),目前已發現重症患者體 內IL-6濃度會偏高 (5) 建議常規使用hydroxychloroquine以有效治療SARS-CoV-2感染者","options":{"A":"(1)+(2)+(3)","B":"(1)+(3)+(4)","C":"(1)+(3)","D":"(1)+(4)","E":"(2)+(3)+(5)"},"id":"109-108","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":108,"src":"109合併卷"},{"num":116,"answer":"E","stem":"有關2019新型冠狀病毒感染症(COVID-19)之敘述,何者為非?","options":{"A":"COVID-19傳染途徑主要為近距離飛沫傳染或接觸傳染","B":"典型症狀為發燒、乾咳、倦怠,約有三分之一會呼吸急促","C":"目前診斷COVID-19以分子核酸RT-PCR為急性期檢驗首選","D":"70%酒精乾洗手液可以有效殺死冠狀病毒","E":"全球COVID-19 感染的死亡率約為0.5%~1%"},"id":"109-116","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":116,"src":"109合併卷"},{"num":134,"answer":"B","stem":"2020年之Covid-19 新型冠狀病毒的肆虐,對於糖尿病患而言,在統計學上,顯然是重大的隱憂,因為糖 尿病患罹患新冠肺炎,產生併發症後之死亡率,明顯高於非糖尿病患者。依照2020上半年之研究報 告,下列有關之因子中何者,並非確認之疾病惡化風險因子?","options":{"A":"年齡愈大的糖尿病患者 (Aging)","B":"糖尿病患者,合併高血壓,在罹患新冠肺炎前,即已使用angiotensin-converting enzyme inhibitor (ACEI) 或 Angiotnensin receptor blocker (ARB),控制高血壓者","C":"原本即已罹患確診之心臟血管疾病(ASCVD, atherosclerotic cardiovascular disease)者","D":"Body mass index (BMI) 偏高之肥胖糖尿病患者 (Obesity)","E":"第一型糖尿病患者 (Type 1 diabetes mellitus)"},"id":"109-134","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":134,"src":"109合併卷"},{"num":142,"answer":"A","stem":"全球新冠肺炎病毒 (Covid-19)感染已超過一仟柒百萬人,死亡人數超過六十八萬(至109年7月),呼吸衰竭 為最大死亡原因,其肺部病理變化最大特徵為何?","options":{"A":"廣泛肺部血管栓塞及肺部微血管病變 (thrombosis及microangiopathy)","B":"廣泛肺血管出血","C":"肺腫瘤","D":"肺動脈高血壓","E":"廣泛肺血管B細胞浸潤"},"id":"109-142","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":142,"src":"109合併卷"},{"num":143,"answer":"B","stem":"上述新冠肺炎病毒 (Covid-19)進入人體細胞是結合何種分子而感染?","options":{"A":"血管收縮素-轉換酵素1 (Angiotensin-converting enzyme 1)","B":"血管收縮素-轉換酵素2 (Angiotensin-converting enzyme 2)","C":"血管收縮素-轉換酵素3 (Angiotensin-converting enzyme 3)","D":"血管收縮素-轉換酵素4 (Angiotensin-converting enzyme 4)","E":"血管收縮素-轉換酵素5 (Angiotensin-converting enzyme 5)"},"id":"109-143","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":143,"src":"109合併卷"},{"num":41,"answer":"A","stem":"下列何者不是進展成為嚴重新型冠狀肺炎(severe coronavirus disease 2019,Covid-19)的危險因子?","options":{"A":"年齡小於65歲","B":"慢性肺疾病","C":"糖尿病","D":"肥胖","E":"末期腎病(End Stage Renal Disease, ESRD)"},"id":"109-41","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":41,"src":"109合併卷"},{"num":66,"answer":"E","stem":"有關COVID-19的胃腸與肝臟異常表現敘述,下列何者正確? (1) 噁心(nausea)比食慾不振(anorexia)常見 (2) 腹瀉是最常見的胃腸表現 (3) 以嗅覺或味覺做為預測COVID-19表現,敏感度比特異度高 (4) 輕度AST/ALT上昇為最常見之肝臟異常 (5) 胃腸異常較肝臟異常更常見","options":{"A":"(1)+(2)+(3)","B":"(2)+(3)+(4)","C":"(3)+(4)+(5)","D":"(1)+(3)+(5)","E":"(2)+(4)+(5)"},"id":"109-66","roc_year":109,"source":"109合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":66,"src":"109合併卷"},{"num":34,"answer":"C","stem":"下列何種治療可降低需ICU照護之COVID-19病患死亡率?","options":{"A":"Remdesivir。","B":"Baricitinib plus Remdesivir。","C":"Interleukin-6 Receptor Antagonists (tocilizumab or sarilumab)","D":"Covid-19 convalescent plasma。","E":"SARS-CoV-2 Neutralizing Antibody。"},"id":"110-34","roc_year":110,"source":"110合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":34,"src":"110合併卷"},{"num":81,"answer":"B","stem":"有關COVID-19的治療,以下何者正確,請選出最適當的答案 (1)單獨使用抗病毒藥Remdesivir對疾病輕、重症患者之預後都有極為顯著之效果。 (2)單株抗體Bamlanivimab + Etesevimab主要作用於病毒spike glycoprotein,對於疾病輕微或中度而有重 症危險因素如年紀≥65歲、肥胖(BMI ≥35),有慢性腎病、慢性肺病、心血管疾病、高血壓、糖尿病、免疫 抑制患者,於發病診斷3天內使用,可降低住院和死亡之風險。 (3)單株抗體Bamlanivimab + Etesevimab對南非變異株(B.1.351, β)和巴西變異株(P.1, γ)在體外中和試驗 效果變差,而單株抗體Casirivimab + Imdevimab則對前述病毒變異株之體外中和試驗效果未改變。 (4)IL-6 receptor blocker如Tocilizumab建議與dexamethasone合併使用於嚴重肺炎。 (5)JAK抑制劑Baricitinib,不可與dexamethasone合併使用。","options":{"A":"(1)+(2)+(3)。","B":"(2)+(3)+(4)。","C":"(1)+(2)+(4)。","D":"(2)+(3)+(5)。","E":"(2)+(4)。"},"id":"110-81","roc_year":110,"source":"110合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":81,"src":"110合併卷"},{"num":94,"answer":"C","stem":"有關新冠肺炎 (Coronavirus disease 2019, COVID-19)之敘述,下列何者最不適當?","options":{"A":"致病原SARS-CoV-2屬於RNA病毒,人類感染冠狀病毒以呼吸道症狀為主。","B":"SARS-CoV-2潛伏期一般介於2至14天,大部分為4到5天。","C":"臨床症狀發生前極少具有傳染性,大多數感染者是接觸到有症狀者而發生傳染。","D":"約有5%患者會發生呼吸衰竭或敗血性休克等極嚴重感染,需加護治療。","E":"實驗室檢查淋巴球減少(lymphopenia)合併D-dimer升高與死亡率呈正相關。"},"id":"110-94","roc_year":110,"source":"110合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":94,"src":"110合併卷"},{"num":82,"answer":"C","stem":"我國2022年5月開始面對大量COVID-19社區感染者,防治策略漸次進入與病毒共存的階段,此時有 關COVID-19的治療,下列何者正確,請選出最適當的答案 (1)Remdesivir是RNA-dependent RNA polymerase抑制劑,對疾病輕、重症患者單獨使用之預後皆有顯 著之效果。 (2)Nirmatrelvir/ritonavir (Paxlovid)能阻止病毒蛋白酶複製,ritonavir是cytochrome P450 3A4 (CYP3A4)的 強抑制劑,可減緩Nirmatrelvir被肝臟cytochrome P450分解代謝的速度,而增強其效果。 (3)Molnupiravir則藉由其成份的核苷類似物,讓病毒的複製酶在RNA複製時產生有缺陷的RNA,因有基因 突變等考量,不建議使用於孕婦。 (4)Paxlovid和Molnupiravir主要於COVID-19發病早期,症狀輕微但有發生重症或死亡之高風險者。 (5)Paxlovid有很多藥物交互作用及禁忌症,惟腎功能只要eGFR >30就不需調整劑量。","options":{"A":"(1)+(2)+(3)。","B":"(1)+(2)+(3)+(4)。","C":"(2)+(3)+(4)。","D":"(2)+(3)+(4)+(5)。","E":"(1)+(2)+(3)+(4)+(5)。"},"id":"111-82","roc_year":111,"source":"111合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":82,"src":"111合併卷"},{"num":94,"answer":"D","stem":"下列有關COVID-19治療藥物與其機轉的配對,何者為非?","options":{"A":"Remdesivir:Inhibit viral RNA polymerase。","B":"Tocilizumab:IL-6 monoclonal Ab。","C":"Molnupiravir:Ribonucleoside analog。","D":"Baricitinib:TNF-α inhibitor。","E":"Nirmatrelvir/Ritonavir:protease inhibitor。"},"id":"111-94","roc_year":111,"source":"111合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":94,"src":"111合併卷"},{"num":86,"answer":"E","stem":"SARS-CoV-2感染及其治療,以下敘述何者錯誤?","options":{"A":"自2022年1月至2023年3月,我國公布1010萬本土確診個案中,約16%為60歲以上。依WHO嚴重度 分類為嚴重肺炎或ARDS個案占0.4%,其中58% 為大於60歲。","B":"口服抗病毒Molnupiravir是一種核苷類似物,使病毒RNA複製時不斷累積突變,導致無法完全複製而 自行消失。","C":"Paxlovid (Nirmatrelvir/ritonavir)能阻止病毒蛋白酶複製,ritonavir是肝cytochrome P450 3A4的強抑制 劑,可減緩Nirmatrelvir被cytochrome P450代謝,而增強其抗病毒作用。","D":"Paxlovid和molnupiravir對不須用氧氣且具重症風險因子之SARS-CoV-2感染者可降低其死亡率及後續 住院率。","E":"長效單株抗體藥Tixagevimab + cilgavimab對SARS-CoV-2 α, β, γ, δ及omicron最近subvariant XBB 和BQ.1.1 都一直具有很好的中和效果。"},"id":"112-86","roc_year":112,"source":"112合併PDF","topic_num":11,"topic":"新型冠狀病毒 (COVID-19)","q_num":86,"src":"112合併卷"}],E={"109-113":{"quick":"抗生素－病原配對：Ceftriaxone↔腦膜炎雙球菌、Penicillin↔A群鏈球菌皆正確；Clindamycin不治Rickettsia(要doxycycline)、Ceftazidime對腸球菌無效，故答(1)+(2)。","detail":{"background":"敗血症的經驗性與標的性抗生素選擇，必須建立在「病原－藥物相符(bug-drug match)」的基本功上。Neisseria meningitidis(腦膜炎雙球菌)首選為第三代頭孢菌素ceftriaxone或cefotaxime，因其能良好穿透血腦障壁且對絕大多數菌株敏感，penicillin G雖傳統有效但近年中度抗藥(MIC上升)漸增，故經驗治療多以ceftriaxone為主。A群鏈球菌(Streptococcus pyogenes)至今對penicillin仍100%敏感(從未出現penicillin抗藥的GAS)，因此penicillin(嚴重侵襲性感染如壞死性筋膜炎、毒性休克時併用clindamycin抑制外毒素與M蛋白合成)是首選。Rickettsia(立克次體，如恙蟲病、斑疹傷寒)為細胞內寄生菌，治療藥物是doxycycline(各年齡層、含孕婦重症皆首選)，clindamycin並無療效，這是常見陷阱。腸球菌(Enterococcus)對所有頭孢菌素天生具內源性抗藥(intrinsic resistance)，ceftazidime完全無效；腸球菌感染依藥敏選ampicillin(faecalis多敏感)或vancomycin，嚴重時加aminoglycoside協同或改linezolid/daptomycin(對VRE)。本題測試的是台灣內科醫師對常見敗血症病原首選藥的反射性記憶，出題年(109年)正值抗生素管理(antimicrobial stewardship)受重視，強調精準用藥。","options":{"A":"正確。(1)Ceftriaxone對N. meningitidis、(2)Penicillin對A群鏈球菌皆為標準首選配對，故為答案。","B":"錯誤。(2)正確但(3)Clindamycin對Rickettsia無效(應為doxycycline)，故此組合不成立。","C":"錯誤。(3)配對錯誤(立克次體要doxycycline)。","D":"錯誤。(4)Ceftazidime對腸球菌天生無效(腸球菌對所有頭孢菌素內源抗藥)。","E":"錯誤。(1)正確但(4)錯誤，組合不成立。"},"sources":["Harrison 21e, Ch. Approach to the Acutely Ill Infected Febrile Patient","Mandell 9e, Anti-infective Therapy","IDSA 2017 Bacterial Meningitis / 2014 GAS guidelines"]}},"113-91":{"quick":"脾切除後敗血症(OPSI)由「有莢膜細菌」主導：S. pneumoniae、H. influenzae、N. meningitidis，故(1)+(3)+(4)；脾臟是清除莢膜菌與製造opsonin/IgM的關鍵。","detail":{"background":"脾臟切除後敗血症(overwhelming post-splenectomy infection, OPSI)是無脾或脾功能低下者的致命急症，終生風險約5%、死亡率可達50–70%、常於數小時內由輕症進展至猛爆性敗血症與華佛氏症候群(Waterhouse-Friderichsen)。機轉在於脾臟是清除「未被opsonize之有莢膜(encapsulated)細菌」的主要器官，並負責產生對多醣莢膜的IgM抗體與補體調理素(opsonin, 如tuftsin、properdin)；失去脾臟後，對莢膜菌的清除大幅下降。三大致病菌均為莢膜菌：Streptococcus pneumoniae(占50–90%，最重要)、Haemophilus influenzae type b、Neisseria meningitidis；此外Capnocytophaga canimorsus(犬咬)、瘧疾、Babesia亦風險升高。預防策略為「疫苗+衛教+備用抗生素」：理想於脾切除前≥2週接種PCV13/PCV15(或PCV20)、之後接續PPSV23，並接種Hib與四價腦膜炎雙球菌結合型疫苗(MenACWY)及MenB；發燒時立即就醫並考慮自備amoxicillin/clavulanate待命。Pseudomonas與S. aureus並非OPSI典型主角，故(2)、(5)不選。此題反映台灣對無脾者疫苗接種與衛教的臨床重視。","options":{"A":"正確。(1)肺炎鏈球菌、(3)b型嗜血桿菌、(4)腦膜炎雙球菌皆為莢膜菌，是OPSI三大病原。","B":"錯誤。(2)金黃色葡萄球菌非OPSI典型主角。","C":"錯誤。(5)綠膿桿菌非OPSI典型病原。","D":"錯誤。含(2)金黃色葡萄球菌不符。","E":"錯誤。(4)(5)組合不完整且含綠膿桿菌。"},"sources":["Harrison 21e, Infections in Asplenic Patients","Mandell 9e, Prevention/Management of OPSI","CDC/ACIP Asplenia Vaccination Schedule"]}},"114-23":{"quick":"敗血症病理＝「過度發炎」與「免疫抑制」同時並存，並伴隨內皮/微血管損傷(通透性增加、微血栓)；非單純過度發炎，亦非僅病原直接破壞，故選C。","detail":{"background":"當代對敗血症(2016 Sepsis-3定義：感染所致、危及生命的器官失能，以SOFA上升≥2分界定；敗血性休克為需升壓劑維持MAP≥65 mmHg且乳酸>2 mmol/L)的病理生理理解，已從早期單一「全身發炎反應症候群(SIRS)/細胞激素風暴」模型，演進為「過度發炎(hyperinflammation)」與「免疫抑制/免疫麻痺(immunosuppression, immunoparalysis)」同時並存且互相交織的失衡狀態。宿主對病原相關分子模式(PAMPs)與損傷相關分子模式(DAMPs)的識別觸發先天免疫(細胞激素如TNF-α、IL-1、IL-6大量釋放)，同時出現淋巴球大量凋亡(apoptosis)、T細胞耗竭、HLA-DR下降、調節性T細胞與骨髓衍生抑制細胞增加，導致續發性感染與再活化(如CMV、HSV)。內皮細胞活化造成「微血管損傷」——醣萼(glycocalyx)脫落、血管通透性增加(非降低)、白血球黏附、瀰漫性血管內凝血(DIC)與微血栓形成，最終組織灌流不足與多重器官衰竭。器官失能並非只由病原直接破壞，更多來自失調的宿主反應。114年此題正是要求考生掌握Sepsis-3時代的整合性病理觀。","options":{"A":"錯誤。免疫抑制在敗血症病程後期極為重要(淋巴球凋亡、免疫麻痺、續發感染)，不可忽視。","B":"錯誤。微血管損傷表現為通透性「增加」與血栓「增加」(DIC)，非降低、非減少血栓。","C":"正確。過度發炎與免疫抑制並存、合併微血管損傷，是現代敗血症病理核心。","D":"錯誤。敗血症常見淋巴球「減少/凋亡」而非增生，且淋巴球減少與不良預後相關。","E":"錯誤。器官衰竭主要來自失調的宿主免疫反應，非僅病原直接破壞組織。"},"sources":["Harrison 21e, Severe Sepsis and Septic Shock","Singer M et al. Sepsis-3, JAMA 2016","Surviving Sepsis Campaign 2021"]}},"114-24":{"quick":"敗血性休克復甦：晶體液30 mL/kg為初始首選(選D)；第一線升壓劑為norepinephrine(非dopamine)，乳酸須追蹤導向復甦，MAP目標≥65 mmHg。","detail":{"background":"敗血性休克的早期復甦依循Surviving Sepsis Campaign(SSC) 2021指引：辨識後立即在第1小時內取得乳酸、抽血液培養(用藥前)、給予廣效抗生素，並對低灌流/低血壓者於前3小時內輸注晶體液(crystalloid)初始劑量30 mL/kg，之後依動態指標(被動抬腿、每搏量變異、超音波)滴定。晶體液(平衡晶體液如lactated Ringer/Plasma-Lyte優於大量0.9%生理食鹽水，可減少高氯性酸中毒)為首選，白蛋白可在需大量輸液時輔助使用，羥乙基澱粉(HES)因增加腎損傷與死亡率而禁用。第一線升壓劑為norepinephrine(去甲腎上腺素)，可降低心律不整風險並優於dopamine(dopamine增加心律不整且未顯示腎保護，「腎臟劑量dopamine」概念已被推翻)；norepinephrine不足時加vasopressin，再不足加epinephrine；對心因性成分加dobutamine。目標MAP≥65 mmHg(非降至50 mmHg)，並以乳酸清除與灌流指標(尿量、皮膚花斑、毛細血管再充填)導向。持續高乳酸代表灌流不足與不良預後，不可置之不理。114年此題對應SSC 2021對晶體液30 mL/kg與norepinephrine首選的明確建議。","options":{"A":"錯誤。第一線升壓劑為norepinephrine，非dopamine；「腎臟劑量dopamine」之腎保護概念已被推翻。","B":"錯誤。緊急時升壓劑可經周邊短暫給予以爭取時間，不必僅限中心靜脈；強調儘速建立中心通路而非延誤。","C":"錯誤。持續高乳酸反映灌流不足與不良預後，須積極處置(乳酸導向復甦)，不可不理會。","D":"正確。晶體液為優先，初始建議30 mL/kg，再依動態反應滴定。","E":"錯誤。MAP目標為≥65 mmHg，降至50 mmHg將惡化器官灌流。"},"sources":["Surviving Sepsis Campaign 2021","Harrison 21e, Septic Shock","NEJM SMART/SPLIT balanced crystalloid trials"]}},"114-96":{"quick":"有莢膜(encapsulated)細菌組合：S. pneumoniae、H. influenzae、N. meningitidis(1+2+4)；S. aureus與Pseudomonas一般不以多醣莢膜為主要毒力，故選A。","detail":{"background":"「有莢膜細菌」是感染學與無脾/補體缺損宿主照護的核心概念。多醣莢膜(polysaccharide capsule)是抗吞噬的主要毒力因子，使細菌逃避未經opsonize的吞噬作用，因此清除依賴脾臟與對莢膜的特異抗體/補體調理。經典「SHiN/SHINE」記憶法涵蓋：Streptococcus pneumoniae、Haemophilus influenzae type b、Neisseria meningitidis(以及Salmonella、E. coli K1、群B鏈球菌、Klebsiella等)。這些莢膜菌正是脾切除後敗血症(OPSI)、補體末端(C5–C9, MAC)缺損(易反覆Neisseria感染)與多醣疫苗(PPSV23、Hib、MenACWY)的標的。Staphylococcus aureus的主要毒力來自表面蛋白(protein A)、毒素與生物膜，雖有微莢膜但臨床不歸類為典型莢膜菌；Pseudomonas aeruginosa以多種毒力因子(外毒素、生物膜、第三型分泌系統)致病，黏液型(mucoid, 囊性纖維化)雖有藻酸鹽外膜但一般考題不列為「莢膜菌」主角。故正確組合為(1)+(2)+(4)。114年此題與同年OPSI、疫苗題相呼應，測試莢膜菌的整合概念。","options":{"A":"正確。肺炎鏈球菌、b型嗜血桿菌、腦膜炎雙球菌皆為典型莢膜菌。","B":"錯誤。(3)金黃色葡萄球菌非典型莢膜菌。","C":"錯誤。(5)綠膿桿菌非以多醣莢膜歸類。","D":"錯誤。含(3)金黃色葡萄球菌不符。","E":"錯誤。含(3)(5)皆非典型莢膜菌。"},"sources":["Harrison 21e, Pneumococcal/Meningococcal/Haemophilus Infections","Mandell 9e, Bacterial Capsules and Immune Evasion"]}},"109-117":{"quick":"靜脈藥癮者右心心內膜炎以S. aureus(常為MRSA)、三尖瓣為主；(2)「極少為MRSA」與(5)「HIV者HACEK較高」皆錯，故為非者選(2)+(5)→答D。","detail":{"background":"靜脈藥癮(IVDU)相關感染性心內膜炎(IE)是重要臨床情境。其最常見致病菌為Staphylococcus aureus(占約60–70%)，且因社區型MRSA(CA-MRSA)盛行，MRSA比例相當高，並非「極少為MRSA」。受侵犯瓣膜以右心三尖瓣(tricuspid valve)為主(約50%)，臨床表現為持續發燒、敗血性肺栓塞(多發性結節、空洞)、呼吸困難，胸部影像可見多發肺浸潤；右心IE預後相對左心佳但仍需4–6週靜脈抗生素。相較非藥癮者，IVDU者由Pseudomonas aeruginosa與Candida(真菌)致病的機會增加(與污染針具、稀釋液有關)。HACEK群(Haemophilus、Aggregatibacter、Cardiobacterium、Eikenella、Kingella)為「培養較慢的革蘭陰性口腔常在菌」，與口腔來源、自然瓣膜亞急性IE相關，並非HIV或IVDU的特徵性病原，故「HIV感染者HACEK機會較高」為錯誤敘述。本題以「何者為非」測試IVDU-IE的細節，(2)與(5)為錯誤敘述。經驗治療常以vancomycin涵蓋MRSA，必要時加涵蓋綠膿桿菌。","options":{"A":"非「為非」者(此三項皆正確)：S. aureus最常見、右心三尖瓣為主皆對。","B":"(1)(3)正確、(5)錯誤，但本題答案取最精準的(2)+(5)組合。","C":"(4)正確(Pseudomonas/Candida機會增加)，(5)錯誤，組合不完整。","D":"正確。(2)「此S. aureus極少為MRSA」錯誤(MRSA其實常見)、(5)「HIV者HACEK較高」錯誤，二者皆為非。","E":"錯誤。並非全部皆錯，(1)(3)(4)為正確敘述。"},"sources":["Harrison 21e, Infective Endocarditis","Mandell 9e, IE in Injection Drug Users","AHA 2015 / ESC 2023 IE guidelines"]}},"110-88":{"quick":"水痘後持續高燒、新出現心雜音、菌血症徵象→應警覺感染性心內膜炎(續發金黃色葡萄球菌)，最該安排血培養與心臟超音波；「最可能有腦膜炎」為不正確(選E)。","detail":{"background":"水痘(varicella, VZV原發感染)後最常見的細菌性併發症是皮膚水疱的續發細菌感染，以A群鏈球菌(Streptococcus pyogenes)與金黃色葡萄球菌(S. aureus)為主，可進一步引發菌血症、壞死性軟組織感染、毒性休克症候群，甚至感染性心內膜炎(IE)。本題23歲男性水痘結痂後仍持續高燒一週、脈搏快、結膜充血、白血球與band form上升、尿液有血尿與膿尿，提示持續性菌血症與可能的IE(菌血症播散造成腎臟微梗塞/腎炎)。臨床上對「不明原因持續發燒+新雜音+菌血症徵象」的標準作法是依Duke準則進行完整身體檢查、抽至少兩套血液培養(用藥前、不同部位)、安排心臟超音波(先TTE，必要時TEE)。新出現的心雜音是IE重要線索。此情境最該優先排除的是IE而非腦膜炎——病人並無頭痛、頸僵直、意識改變等腦膜炎症狀，「最可能有腦膜炎」為不正確的選項。110年此題以水痘併發症為背景串聯IE的診斷流程。","options":{"A":"正確。應行完整身體診察以尋找栓塞徵象(Janeway lesion、Osler nodes、瘀斑)。","B":"正確。IE可出現新的或變化的心雜音(瓣膜贅生物/逆流)。","C":"正確。疑似IE/菌血症應抽至少兩套血液培養。","D":"正確。應安排心臟超音波(TTE/TEE)尋找贅生物。","E":"錯誤(為本題答案)。病人無腦膜炎臨床表現，最該懷疑的是感染性心內膜炎而非腦膜炎。"},"sources":["Harrison 21e, Varicella-Zoster / Infective Endocarditis","Mandell 9e, Complications of Varicella","Duke Criteria (modified) for IE"]}},"114-89":{"quick":"人工瓣膜術後「早期(<60天，含4週)」PVE最常見為凝固酶陰性葡萄球菌/金黃色葡萄球菌(院內植入污染)，非鏈球菌，故C最不適當。","detail":{"background":"感染性心內膜炎(IE)的診斷與微生物學依瓣膜種類與發病時程而異。血液培養是核心：經驗治療前應於不同部位、間隔抽取至少3套血液培養(嚴重敗血症可短間隔)；若首次陰性，48–72小時後再追加2–3套(尤其疑似培養陰性IE或已用過抗生素時)。影像方面，經胸壁超音波(TTE)敏感度有限，對自然瓣膜約60–75%、人工瓣膜更低，約有相當比例(20–35%)看不到贅生物；經食道超音波(TEE)敏感度約90%以上、假陰性低，為人工瓣膜與TTE陰性但高度懷疑時的首選。人工瓣膜心內膜炎(PVE)依時程分：早期PVE(植入後≤60天，部分定義1年內)主要為手術期植入污染所致，病原以凝固酶陰性葡萄球菌(尤其Staphylococcus epidermidis)、金黃色葡萄球菌、革蘭陰性桿菌與真菌為主；晚期PVE(>1年)則病原譜趨近自然瓣膜IE(草綠色鏈球菌、腸球菌、HACEK等)。因此「人工瓣膜術後四週(屬早期PVE)最常見為鏈球菌」是最不適當的敘述，應為葡萄球菌。114年此題測試PVE時程與病原的對應、及超音波敏感度數值。","options":{"A":"正確。經驗治療前應於不同位置抽取至少3套血液培養。","B":"正確。首次陰性者48–72小時後再追加2–3套血液培養。","C":"最不適當(為答案)。術後四週屬早期PVE，最常見為(凝固酶陰性)葡萄球菌與金黃色葡萄球菌，非鏈球菌。","D":"正確。TTE對IE約有20–35%看不到贅生物(敏感度有限)。","E":"正確。TEE敏感度約90%、假陰性約6–18%，遠優於TTE。"},"sources":["Harrison 21e, Infective Endocarditis (PVE)","ESC 2023 IE guidelines","Mandell 9e, Prosthetic Valve Endocarditis"]}},"104-綜-2":{"quick":"急性發燒、頭痛、嘔吐、頸僵直＋下肢紫斑(petechiae/purpura)、CSF革蘭陰性雙球菌→腦膜炎雙球菌(Neisseria meningitidis)腦膜炎，選B。","detail":{"background":"細菌性腦膜炎依CSF革蘭染色形態可快速縮小病原範圍：革蘭陽性雙球菌→肺炎鏈球菌；革蘭陰性雙球菌→腦膜炎雙球菌(Neisseria meningitidis)；革蘭陰性小桿菌→嗜血桿菌；革蘭陽性桿菌→李斯特菌。本例為18歲(青少年/年輕成人為腦膜炎雙球菌好發族群)急性起病、發燒40°C、頸僵直，CSF呈現典型細菌性腦膜炎特徵(白血球極高且以多形核為主、葡萄糖極低<40 mg/dL或CSF/血糖比<0.4、蛋白質升高)，加上「下肢紫斑性皮疹(petechiae/purpura)」——這是腦膜炎雙球菌血症(meningococcemia)的指標性表現，可進展為猛爆性紫斑、DIC與華佛氏症候群(腎上腺出血)。CSF沉渣見革蘭陰性雙球菌直接定調為腦膜炎雙球菌。處置要點：疑似時不延誤抗生素(ceftriaxone/cefotaxime，李斯特高風險者加ampicillin)、依情況併用dexamethasone(肺炎鏈球菌證據最強)、密切接觸者化學預防(rifampin/ciprofloxacin/ceftriaxone)並法定傳染病通報。淋菌性腦膜炎極罕見、嗜血桿菌(疫苗後大減)為小桿菌、結核性為淋巴球與極低糖之亞急性、肺炎球菌為革蘭陽性，皆不符「革蘭陰性雙球菌+紫斑」。","options":{"A":"錯誤。淋菌(N. gonorrhoeae)腦膜炎極罕見，臨床情境不符。","B":"正確。年輕成人、紫斑、CSF革蘭陰性雙球菌＝腦膜炎雙球菌腦膜炎。","C":"錯誤。嗜血桿菌為革蘭陰性「小桿菌」而非雙球菌，且疫苗後罕見。","D":"錯誤。結核性腦膜炎為亞急性、CSF以淋巴球為主、糖低但病程較慢，且非雙球菌。","E":"錯誤。肺炎球菌為革蘭「陽性」雙球菌，與染色結果不符。"},"sources":["Harrison 21e, Acute Bacterial Meningitis","Mandell 9e, Meningococcal Disease","IDSA 2004 Bacterial Meningitis"]}},"109-109":{"quick":"細菌性腦膜炎：盡早抗生素、頭痛畏光、腰椎穿刺送培養、有局部徵象/意識改變者穿刺前先CT皆對；「用carbapenem即可避免治療失敗」為錯誤(選E)。","detail":{"background":"急性細菌性腦膜炎是內科急症，診治原則：(1)盡早給抗生素——疑似時不應為等待檢查而延誤，每延遲一小時預後變差；(2)典型症狀為頭痛、發燒、頸僵直、畏光、意識改變(經典三聯徵齊全者不到一半)；(3)確診靠腰椎穿刺(LP)取CSF做細胞數、生化、革蘭染色與培養(±多重PCR)；(4)對有免疫低下、中樞病史、新發癲癇、意識障礙或局部神經學徵象者，LP前先做腦部影像(CT)以排除占位/腦壓升高造成腦疝的風險，但取得血液培養與給予抗生素(±dexamethasone)不應因等CT而延誤。經驗抗生素依年齡/風險：成人ceftriaxone+vancomycin(涵蓋抗藥肺炎球菌)，>50歲或免疫低下加ampicillin(李斯特)。「使用較後線的carbapenem即可避免治療失敗」是錯誤觀念——抗生素選擇應依病原與藥敏(carbapenem雖廣效，但對抗藥肺炎球菌仍須足量第三代頭孢±vancomycin，且濫用後線藥助長抗藥性，並非萬靈丹)。109年此題強調正確的腦膜炎處置流程與抗生素管理。","options":{"A":"正確。疑似細菌性腦膜炎須盡快給抗生素，不可延誤。","B":"正確。頭痛、畏光為典型臨床表現。","C":"正確。確診需腰椎穿刺取CSF送培養。","D":"正確。對特定高風險者腰椎穿刺前應先CT以避免腦疝(但勿因此延誤抗生素)。","E":"錯誤(為答案)。並非用carbapenem就能避免治療失敗；抗生素須依病原藥敏、且濫用後線藥助長抗藥性。"},"sources":["Harrison 21e, Acute Bacterial Meningitis","IDSA 2004 Practice Guidelines for Bacterial Meningitis","Mandell 9e, Approach to CNS Infection"]}},"112-81":{"quick":"庫賈氏病(CJD)由變性蛋白prion致病(無核酸卻有感染力)；臨床快速失智+肌陣攣，vCJD與牛海綿狀腦病(BSE)相關，prion對常規消毒高度抵抗，故正確組合為(1)(2)(3)(5)→選C。","detail":{"background":"庫賈氏病(Creutzfeldt-Jakob disease, CJD)屬傳染性海綿狀腦病(prion disease)。致病原為「變性的普利昂蛋白(prion, PrP^Sc)」——不具核酸的錯誤摺疊蛋白，卻能誘導正常PrP^C轉變而具感染力，這顛覆傳統「病原須含核酸」概念。臨床以「快速進行性失智」為核心，合併肌陣攣(myoclonus)、運動失調、視覺/小腦症狀與緘默，多於數月內死亡；輔助診斷有腦電圖週期性尖波複合波、MRI瀰散加權影像皮質/基底核高訊號(cortical ribboning)、CSF 14-3-3蛋白與RT-QuIC。散發型最常見(約85%)；新變異型(vCJD)與牛海綿狀腦病(BSE)經食物鏈傳播高度相關，發病年齡較輕。Prion對一般物理化學消毒(常規高壓滅菌、福馬林、酒精、紫外線、輻射照射)具高度抵抗性，須以特殊去汙程序(如1N NaOH或次氯酸鈉浸泡＋延長高溫高壓134°C)處理器械，照護一般以標準防護加上對神經外科/侵入性器械的特殊去汙為主。本題官方答案為(1)+(2)+(3)+(5)，即排除(4)。112年此題測試prion生物學與感染管制重點。","options":{"A":"錯誤。(4)被視為不適當敘述，故不選含(4)的組合。","B":"錯誤。漏掉(1)prion基本特性之正確敘述。","C":"正確(官方答案)。(1)prion無核酸有感染力、(2)臨床失智運動失調、(3)vCJD與BSE相關、(5)對常規消毒高度抵抗皆正確。","D":"錯誤。含(4)。","E":"錯誤。將(1)(2)(3)(4)(5)全選，但(4)不適當。"},"sources":["Harrison 21e, Prion Diseases","Mandell 9e, Transmissible Spongiform Encephalopathies","WHO Infection Control Guidelines for TSE"]}},"113-92":{"quick":"肺炎鏈球菌腦膜炎且β-lactam敏感→首選第三代頭孢ceftriaxone(穿透BBB佳、殺菌)；vancomycin僅在抗藥時加用，dexamethasone為輔助非抗生素，故選B。","detail":{"background":"當細菌性腦膜炎CSF培養確認為Streptococcus pneumoniae且藥敏顯示對β-lactam(penicillin/cephalosporin)敏感時，標的治療首選為第三代頭孢菌素ceftriaxone(或cefotaxime)：其對肺炎球菌殺菌力強、能良好穿透發炎的血腦障壁、且為腦膜炎標準劑量(ceftriaxone 2 g q12h)。經驗治療階段因台灣與全球存在penicillin/cephalosporin中度抗藥肺炎球菌，會「ceftriaxone+vancomycin」並用以涵蓋抗藥株；一旦藥敏證實β-lactam敏感，即可降階(de-escalation)停用vancomycin、單用ceftriaxone。Vancomycin對敏感株並非首選(穿透BBB較差、需確保血中濃度)。Ampicillin/penicillin雖對敏感株有效，但因抗藥疑慮與穿透考量，現行指引仍以第三代頭孢為腦膜炎首選。Levofloxacin為替代(β-lactam嚴重過敏時)。Dexamethasone是「輔助治療」——肺炎球菌腦膜炎成人於首劑抗生素前或同時給予可降低聽損與死亡率，但它是類固醇、非抗生素，不能作為「首選藥物」回答。113年此題測試降階治療與肺炎球菌腦膜炎首選藥。","options":{"A":"錯誤。Vancomycin僅於抗藥肺炎球菌時加用，對β-lactam敏感株非首選(穿透BBB較差)。","B":"正確。β-lactam敏感之肺炎球菌腦膜炎首選ceftriaxone。","C":"錯誤。Ampicillin對敏感株有效但非腦膜炎首選；第三代頭孢穿透與涵蓋更佳。","D":"錯誤。Levofloxacin僅為β-lactam嚴重過敏時的替代。","E":"錯誤。Dexamethasone為輔助類固醇(降低聽損/死亡)，非抗生素、非「首選藥物」。"},"sources":["Harrison 21e, Pneumococcal Meningitis","IDSA 2004 Bacterial Meningitis","de Gans NEJM 2002 (dexamethasone)"]}},"114-87":{"quick":"CSF混濁、壓力高、白血球以多核為主、糖極低、蛋白高→典型細菌性腦膜炎(成人最常見肺炎球菌)；若見紫斑/瘀點應先想「腦膜炎雙球菌」而非嗜血桿菌，故C最不適當。","detail":{"background":"本題CSF外觀混濁、壓力升高(280 mmH2O)、白血球1200/mm³以多核球為主、葡萄糖極低(20 mg/dL，血糖正常下CSF/血糖比明顯<0.4)、蛋白質升高(180 mg/dL)——是典型化膿性(細菌性)腦膜炎。成人社區型細菌性腦膜炎最常見致病菌為Streptococcus pneumoniae(肺炎鏈球菌)，其次為Neisseria meningitidis；即使適當抗生素治療，肺炎球菌腦膜炎死亡率仍約20–30%。經驗抗生素為ceftriaxone(或cefotaxime)＋vancomycin(涵蓋抗藥肺炎球菌)，>50歲或免疫低下加ampicillin涵蓋李斯特；神經外科手術後或頭部外傷後腦膜炎需考慮抗綠膿桿菌/抗MRSA(如cefepime/meropenem+vancomycin)。關鍵陷阱在C：若病人合併皮膚瘀點/紫斑(petechiae/purpura)，最該優先考慮的是腦膜炎雙球菌血症(meningococcemia)，而非嗜血桿菌——b型嗜血桿菌在Hib疫苗普及後成人罕見，且紫斑是腦膜炎雙球菌的標誌。故「見到紫斑需先考慮Hemophilus influenzae」最不適當。114年此題測試CSF判讀、經驗用藥與皮疹病原連結。","options":{"A":"正確。成人細菌性腦膜炎最常見為肺炎鏈球菌。","B":"正確。即使治療得當，肺炎球菌腦膜炎死亡率仍約20%。","C":"最不適當(為答案)。見紫斑/瘀點應先想腦膜炎雙球菌(meningococcemia)，非嗜血桿菌。","D":"正確。經驗治療為ceftriaxone加vancomycin。","E":"正確。術後腦膜炎須涵蓋綠膿桿菌(如cefepime/meropenem)。"},"sources":["Harrison 21e, Acute Bacterial Meningitis","IDSA 2004 Bacterial Meningitis","Mandell 9e, Meningococcal Disease"]}},"114-88":{"quick":"急性病毒性腦炎以皰疹病毒(尤其HSV-1)最重要；HSV腦炎典型侵犯「顳葉(temporal lobe)」而非額葉，故D敘述(80%額葉)最不適當；CSF PCR敏感96%/專一99%。","detail":{"background":"急性腦炎(encephalitis)是腦實質的發炎，臨床以發燒、意識/性格改變、局部神經學徵象與癲癇為特徵(與腦膜炎以腦膜刺激徵為主不同)。病毒性腦炎最重要且可治療的病原是單純皰疹病毒第一型(HSV-1)——是散發性致命腦炎的首因，未治療死亡率>70%，故任何疑似腦炎都應「先經驗性給acyclovir」並儘速確診。診斷靠CSF的HSV PCR(敏感度約96%、專一度約99%，已取代腦切片成為標準)，並含腸病毒等PCR。影像學上，HSV-1腦炎典型侵犯「顳葉(temporal lobe)」、邊緣系統與額葉「眶面/下內側」，MRI顯示顳葉內側與島葉、扣帶迴的水腫/出血性變化；EEG可見顳區週期性側化癲癇樣放電(PLEDs)。題目D敘述「MRI 80%可見『額葉(frontal lobe)』病灶」與HSV腦炎典型的「顳葉」侵犯不符，為最不適當。其他病原依季節/暴露考量(日本腦炎、腸病毒、西尼羅、狂犬、自體免疫如anti-NMDA)。114年此題測試HSV腦炎的影像定位與CSF PCR效能。","options":{"A":"正確。皰疹病毒(尤其HSV-1)為最常見且最重要的病毒性腦炎病原。","B":"正確。表現為發燒、意識改變、性格改變或癲癇。","C":"正確。CSF應含HSV與腸病毒PCR檢測。","D":"最不適當(為答案)。HSV腦炎典型侵犯顳葉(temporal lobe)而非額葉，故「80%額葉病灶」錯誤。","E":"正確。CSF PCR敏感度約96%、專一度約99%，與腦切片相當甚至更佳。"},"sources":["Harrison 21e, Viral Encephalitis (HSV)","IDSA 2008 Encephalitis Guidelines","Mandell 9e, Herpes Simplex Encephalitis"]}},"114-94":{"quick":"臉部肉毒桿菌素(botulinum toxin)微整後出現眼瞼下垂、複視、構音困難＝醫源性肉毒桿菌中毒(botulism)，非破傷風；故「診斷為破傷風」最不適當(選A)。","detail":{"background":"本題30歲女性「臉部微整形注射後」出現眼瞼下垂(ptosis)、複視(diplopia)、構音困難(dysarthria)——是下行性、對稱性、由顱神經開始的鬆弛性麻痺，典型為肉毒桿菌中毒(botulism)，此處為醫源性(注射肉毒桿菌素botulinum toxin A過量或擴散)。肉毒毒素是Clostridium botulinum產生的神經毒素(neurotoxin)，作用機轉為「抑制突觸前膽鹼性神經末梢釋放乙醯膽鹼(阻斷SNARE蛋白)」，造成鬆弛性麻痺(意識清醒、無感覺異常、無發燒)，可向下侵犯延伸至呼吸肌致呼吸衰竭。這與破傷風(tetanus)完全相反——破傷風毒素(tetanospasmin)抑制脊髓抑制性中間神經元釋放GABA/glycine，造成「痙攣性」麻痺(牙關緊閉、角弓反張)。故「診斷為破傷風」是最不適當。處置以支持治療(密切監測呼吸、必要時插管)為主，及早給抗毒素(antitoxin)中和循環中游離毒素；診斷可送血清/檢體毒素偵測(小鼠生物檢定或PCR)；抗生素對毒素已結合者無效、且部分抗生素(aminoglycoside)可能加重神經肌肉阻斷。症狀全由神經毒素引起。114年此題以醫美情境測試肉毒vs破傷風的鑑別。","options":{"A":"最不適當(為答案)。應診斷為肉毒桿菌中毒(botulism)，非破傷風(tetanus)。","B":"正確。治療以支持性為主，嚴重者注射抗毒素中和游離毒素。","C":"正確。檢測血清/檢體中的毒素可作為確診依據。","D":"正確。對已結合之毒素，廣效抗生素無治療或預防作用。","E":"正確。症狀由肉毒神經毒素(抑制乙醯膽鹼釋放)引起。"},"sources":["Harrison 21e, Botulism / Tetanus","CDC Botulism Clinical Guidance","Mandell 9e, Clostridial Neurotoxins"]}},"109-76":{"quick":"大劑量易致肌肉毒性/橫紋肌溶解的抗生素是Daptomycin(脂肽類)；故監測CPK，且不可用於肺炎(被肺界面活性劑去活化)，選D。","detail":{"background":"Daptomycin(達托黴素)是環脂肽類(cyclic lipopeptide)抗生素，藉由插入革蘭陽性菌細胞膜、去極化造成快速殺菌，對MRSA、VRE、菌血症與右心心內膜炎有效，屬濃度依賴型殺菌。其特徵性副作用為「肌肉毒性」——可致creatine phosphokinase(CPK)上升、肌痛、甚至橫紋肌溶解(rhabdomyolysis)，劑量越高(如6–10 mg/kg)風險越大，故使用期間須每週監測CPK、並儘量避免併用statin。另一關鍵：daptomycin會被肺部界面活性劑(surfactant)去活化，「不能用於肺炎」治療。相較之下，erythromycin/quinolone主要心臟(QTc)與腸胃副作用，vancomycin主要腎毒性與紅人症候群，colistin主要腎與神經毒性，皆非以橫紋肌溶解為標誌。109年此題測試daptomycin的標誌性肌肉毒性與CPK監測。","options":{"A":"錯誤。Erythromycin(巨環類)主要造成腸胃不適與QTc延長，非橫紋肌溶解。","B":"錯誤。Colistin主要腎毒性與神經毒性。","C":"錯誤。Quinolone主要肌腱病變/QTc/中樞副作用，非典型橫紋肌溶解。","D":"正確。Daptomycin大劑量可致肌肉毒性與橫紋肌溶解，須監測CPK。","E":"錯誤。Vancomycin主要腎毒性與紅人症候群。"},"sources":["Harrison 21e, Antibacterial Agents (Daptomycin)","Mandell 9e, Lipopeptides","FDA daptomycin label (CPK monitoring)"]}},"109-103":{"quick":"腸球菌：VRE最常見菌種為E. faecium(1對)、E. faecalis首選ampicillin(3對)、VRE嚴重感染用linezolid/daptomycin(4對)；故(1)+(3)+(4)→D。faecalis菌血症首選非vanco、尿/痰帶菌不需治療。","detail":{"background":"腸球菌(Enterococcus)是泌尿道、腹腔、菌血症與心內膜炎的重要病原，對頭孢菌素天生抗藥。臨床須先分種：E. faecalis(較常見、對ampicillin多敏感)其感染首選ampicillin(嚴重如心內膜炎時加aminoglycoside或用ampicillin+ceftriaxone雙β-lactam協同)，並非常規用vancomycin；E. faecium抗藥性較高，且抗萬古黴素腸球菌(VRE)最常見即為E. faecium。VRE嚴重感染(菌血症、深部感染)以linezolid或daptomycin治療(注意daptomycin需較高劑量且不可用於肺炎)。重要觀念：尿液或痰液培養出VRE多屬「移生(colonization)」而非感染，無症狀者不需治療、僅治真正感染部位，以免濫用後線藥。故正確為(1)(3)(4)。109年此題測試腸球菌分種治療與「移生不治療」原則。","options":{"A":"錯誤。僅(1)(2)，但(2)faecalis菌血症首選為ampicillin非vancomycin。","B":"錯誤。(1)(3)正確但組合不完整。","C":"錯誤。(2)錯誤(faecalis首選ampicillin)。","D":"正確。(1)VRE最常為E. faecium、(3)faecalis首選ampicillin、(4)VRE嚴重感染用linezolid/daptomycin。","E":"錯誤。(5)尿/痰VRE屬移生不需治療，全選不成立。"},"sources":["Harrison 21e, Enterococcal Infections","Mandell 9e, Enterococcus / VRE","IDSA Asymptomatic Bacteriuria 2019"]}},"109-107":{"quick":"Linezolid長期使用可致骨髓抑制(血小板下降)與視神經/周邊神經病變，須注意眼底；其餘MRSA敘述皆有誤，故選D。","detail":{"background":"MRSA感染治療的細節常考。重點：(1)MRSA菌血症/心內膜炎死亡率高於MSSA(MRSA預後較差，並非相近)；(2)社區型MRSA(CA-MRSA)盛行，社區型肺炎在特定情境(壞死性肺炎、流感後)仍需考量MRSA，並非「只有院內才有」；(3)Tigecycline為抑菌型(bacteriostatic)、血中濃度低，「不建議用於菌血症與心內膜炎」(高劑量增加腸胃副作用且療效不足)；(4)Linezolid(oxazolidinone, 抑制50S起始複合體)長期使用(>2週)可致可逆性骨髓抑制(尤其血小板下降)、(>4週)視神經與周邊神經病變、乳酸中毒，並與MAOI/SSRI併用有血清素症候群風險，故長期使用須監測血球與眼底；(5)Vancomycin除trough(或AUC/MIC)濃度監測外，仍須監測腎功能與輸注反應，「只須監測trough」不完整。故正確為D。109年此題測試MRSA藥物的關鍵安全性。","options":{"A":"錯誤。MRSA菌血症/心內膜炎死亡率高於MSSA，非相近。","B":"錯誤。CA-MRSA存在，社區型肺炎特定情境仍須考量MRSA。","C":"錯誤。Tigecycline為抑菌型、血中濃度低，不建議用於菌血症/心內膜炎。","D":"正確。Linezolid長期使用致血小板下降與視神經病變，須監測血球與眼底。","E":"錯誤。Vancomycin除濃度監測外仍須監測腎功能與輸注反應。"},"sources":["Harrison 21e, Staphylococcal Infections / MRSA","Mandell 9e, Oxazolidinones / Glycopeptides","IDSA 2011 MRSA Guidelines"]}},"110-83":{"quick":"Linezolid門診追蹤重點：MAOI/SSRI交互作用、乳酸中毒、長期骨髓抑制(>2週)、視神經/周邊神經病變(>4週)；QTc延長並非linezolid主要問題，故「較不重要」選C。","detail":{"background":"本題MRSA感染病人出院後口服linezolid治療，問門診追蹤「較不重要」者。Linezolid(oxazolidinone)的安全性監測重點包括：(A)與單胺氧化酶抑制劑(MAOI)及SSRI/SNRI併用有血清素症候群風險，須避免或謹慎；(B)可致乳酸中毒(粒線體蛋白合成抑制)，注意不明原因酸中毒；(D)使用>2週有骨髓抑制(尤其血小板、也含貧血/白血球低下)風險，須監測全血球；(E)使用>4週有視神經與周邊神經病變風險(部分不可逆)，須注意視力。相對地，「QTc prolongation」並非linezolid的典型重要不良反應(QTc延長較常見於巨環類、fluoroquinolone、azole等)，因此在linezolid門診追蹤中「較不重要」。110年此題以對比方式測試linezolid獨特的安全監測項目。","options":{"A":"重要。Linezolid不可與MAOI或SSRI併用(血清素症候群)。","B":"重要。須注意乳酸中毒(粒線體毒性)。","C":"較不重要(為答案)。QTc延長並非linezolid主要安全問題，相對其他項目較不需特別追蹤。","D":"重要。使用>2週有骨髓抑制風險，須監測血球。","E":"重要。使用>4週有視神經與周邊神經病變風險。"},"sources":["Harrison 21e, Oxazolidinones","FDA linezolid label","Mandell 9e, Linezolid Toxicity"]}},"110-87":{"quick":"在台灣這些情況都不建議以fluoroquinolone當第一線：化膿性扁桃炎、急性膀胱炎、皮膚蜂窩組織炎、急性腦膜炎、急性腹瀉，故(1)~(5)全部，選D。","detail":{"background":"Fluoroquinolone(FQ, 如ciprofloxacin、levofloxacin)雖廣效，但因抗藥性升高與嚴重副作用(肌腱斷裂、主動脈瘤/剝離、QTc、周邊神經病變、低血糖、CNS)，各國(含台灣與FDA黑框警告)強調「保留使用、避免用於可用更安全藥物的常見感染」。本題各情境皆不宜以FQ作第一線：(1)急性化膿性扁桃炎多為A群鏈球菌，首選penicillin/amoxicillin；(2)急性(單純)膀胱炎首選nitrofurantoin、fosfomycin或TMP-SMX，FQ留作備用以減少抗藥;(3)足癬合併下肢蜂窩組織炎以革蘭陽性菌(鏈球菌/葡萄球菌)為主，首選cephalexin/cloxacillin/amoxicillin-clavulanate，FQ對革蘭陽性涵蓋與組織滲透不佳;(4)急性細菌性腦膜炎首選第三代頭孢±vancomycin，FQ僅為過敏替代;(5)急性腹瀉多為病毒性或自限性，多數不需抗生素，FQ濫用且增抗藥。故全部(1)~(5)皆不建議FQ第一線。110年此題呼應台灣抗生素管理與FQ限用政策。","options":{"A":"錯誤。漏列其他同樣不宜FQ的情況。","B":"錯誤。組合不完整。","C":"錯誤。組合不完整。","D":"正確。五種情況皆不建議以fluoroquinolone作第一線。","E":"錯誤。(5)急性腹瀉同樣不宜FQ第一線，不應排除。"},"sources":["FDA Fluoroquinolone Safety Warnings","IDSA Uncomplicated Cystitis 2011","Harrison 21e, Quinolones"]}},"110-93":{"quick":"Rifampin是強力CYP誘導劑，會「降低」口服避孕藥效果(需改用其他避孕)，而非「加強荷爾蒙作用、應減量」，故配對最不適當選D。","detail":{"background":"抗生素的藥物交互作用是臨床安全重點。正確配對：(A)Metronidazole併用酒精→disulfiram樣反應(臉紅、噁心、心悸)，須戒酒;(B)巨環類(macrolide)與fluoroquinolone皆延長QTc，併用增加致命性心律不整(尖端扭轉)風險;(C)Tetracycline/doxycycline可增強warfarin抗凝(改變腸道菌叢、影響維生素K與蛋白結合)，增加出血;(E)Linezolid具弱MAOI作用，與腎上腺素能升壓藥或含tyramine食物併用可致高血壓危象/血清素症候群。錯誤者為(D)：Rifampin是強力的肝臟細胞色素P450(尤其CYP3A4)與P-gp誘導劑，會「加速代謝、降低」許多藥物(含口服避孕藥、warfarin、protease inhibitor、免疫抑制劑、azole)的血中濃度與效果，因此服用rifampin者口服避孕藥會「失效」，須改用或加用非荷爾蒙避孕法，而非「加強荷爾蒙作用、應減量」。110年此題測試rifampin為酵素誘導劑的核心概念。","options":{"A":"正確。Metronidazole併酒精→disulfiram樣反應。","B":"正確。Macrolide併FQ增加QTc/心律不整風險。","C":"正確。Tetracycline增強warfarin抗凝、增加出血。","D":"最不適當(為答案)。Rifampin為CYP誘導劑，降低口服避孕藥效果(須改其他避孕)，非加強荷爾蒙、非減量。","E":"正確。Linezolid增強腎上腺素能升壓藥作用，可致高血壓。"},"sources":["Harrison 21e, Antimicrobial Drug Interactions","Mandell 9e, Rifamycins (enzyme induction)"]}},"110-96":{"quick":"抗生素機轉配對：Macrolide為「抑制蛋白質合成(50S)」而非抑制DNA，故配對最不適當選C；抑制DNA的是fluoroquinolone(gyrase/topo IV)。","detail":{"background":"抗生素依作用機轉分類是基礎且常考：(A)Cephalosporin(β-lactam)抑制細胞壁合成(結合PBP、阻斷transpeptidation);(B)Clindamycin結合50S抑制蛋白質合成;(C)Macrolide(erythromycin/azithromycin/clarithromycin)同樣結合50S核糖體抑制「蛋白質合成」——而非DNA合成，故此配對最不適當;(D)Sulfonamide抑制dihydropteroate synthase、trimethoprim抑制dihydrofolate reductase，二者阻斷葉酸合成;(E)Rifampin抑制細菌DNA依賴性RNA聚合酶，阻斷RNA合成。真正「抑制DNA」者為fluoroquinolone(抑制DNA gyrase與topoisomerase IV)與metronidazole(破壞DNA)。記憶要點：30S抑制者aminoglycoside、tetracycline；50S抑制者macrolide、clindamycin、linezolid、chloramphenicol。110年此題測試抗生素機轉分類。","options":{"A":"正確。Cephalosporin抑制細胞壁合成。","B":"正確。Clindamycin抑制蛋白質合成(50S)。","C":"最不適當(為答案)。Macrolide抑制蛋白質合成(50S)，非DNA合成。","D":"正確。Sulfonamide抑制葉酸合成。","E":"正確。Rifampin抑制RNA合成(RNA聚合酶)。"},"sources":["Harrison 21e, Mechanisms of Antibacterial Action","Mandell 9e, Antimicrobial Classes"]}},"112-83":{"quick":"ESKAPE抗藥菌：畜牧業用抗生素與人類抗藥相關(4對)、台灣CRKP與carbapenemase相關(5對)；MRSA社區也要考慮、linezolid可治VRE菌血症、社區感染仍應先窄譜，皆錯，故選E(4+5)。","detail":{"background":"ESKAPE代表六大臨床棘手的多重抗藥菌：Enterococcus faecium、Staphylococcus aureus、Klebsiella pneumoniae、Acinetobacter baumannii、Pseudomonas aeruginosa、Enterobacter species，它們能「逃脫(escape)」抗生素作用，是院內感染與抗藥危機核心。正確敘述：(4)畜牧業大量使用抗生素(促生長/預防)與人類取得抗藥菌(經食物鏈、環境)確有關聯，是「One Health」抗藥防治重點;(5)台灣抗碳青黴烯類克雷白氏肺炎桿菌(CRKP)的碳青黴烯酶流行病學中OXA-48型(及KPC、NDM)為重要機制(本題以OXA-48為正確敘述)。錯誤敘述:(1)社區型MRSA(CA-MRSA)存在，社區感染仍需視情境考量MRSA，非「不需考慮」;(2)Linezolid雖為抑菌型，但「可」有效用於VRE菌血症(臨床常用)，故「不適合用於VRE菌血症」錯誤;(3)抗藥盛行不代表「即便社區感染也得用後線藥」，反而應依風險與培養精準、避免過度使用後線藥(抗生素管理)。故正確為(4)+(5)。112年此題測試ESKAPE與抗藥防治政策觀念。","options":{"A":"錯誤。(1)(3)皆為錯誤敘述。","B":"錯誤。含(1)(2)(3)三項錯誤。","C":"錯誤。(2)linezolid可用於VRE菌血症，「不適合」為誤。","D":"錯誤。含(2)錯誤敘述。","E":"正確。(4)畜牧抗生素與人類抗藥相關、(5)台灣CRKP與carbapenemase(OXA-48等)相關。"},"sources":["Harrison 21e, Antimicrobial Resistance","Mandell 9e, MDR Gram-negative / CRE","Taiwan CDC AMR surveillance"]}},"112-85":{"quick":"Penicillin過敏：多數標註過敏者實非真過敏、會隨時間消退、應重新評估；對「中/高度風險者」不宜逕以藥物溶液做皮膚測試(需專業評估/正規試劑或分級激發)，故E錯誤。","detail":{"background":"Penicillin(青黴素)過敏標註的「去標籤化(de-labeling)」是近年抗生素管理重點。臨床事實：(A)約90%以上被標註penicillin過敏者其實並非真正IgE媒介過敏，且即使曾真過敏，其IgE反應會隨時間(約10年消退80%)減弱，故詳細病史、重新評估與正確註記非常重要;(B)被誤標過敏者往往接受更多vancomycin、fluoroquinolone、clindamycin等替代藥，增加多重抗藥菌、艱難梭菌與手術部位感染風險，並增加醫療成本;(C)多數過敏並非對完整分子，而是對penicillin降解產物(penicilloyl等)與蛋白共價結合物，因此需用適當的主要/次要決定簇試劑(如PRE-PEN)做皮膚測試，單純用藥物溶液皮膚測試不足以辨識多數病人;(D)台灣現況以病史為主，無過敏史且符合適應症者可直接使用，並要求具備急救設備與人員。錯誤者為(E)：對「中度或高度風險」(病史明確、嚴重立即型反應)者，不應「逕行以藥物溶液進行皮膚測試」——應由過敏專科以正規試劑審慎評估或分級藥物激發，貿然測試/激發有過敏性休克風險。112年此題呼應penicillin de-labeling與安全評估流程。","options":{"A":"正確。多數過敏標註非真過敏、會隨時間消退，病史重新評估重要。","B":"正確。誤標過敏增加替代藥使用與多重抗藥/手術感染風險。","C":"正確。多數過敏針對降解物-蛋白結合物，藥物溶液皮膚測試不足以辨識。","D":"正確。無過敏史且符合適應症可直接使用，須備急救環境。","E":"錯誤(為答案)。中/高風險者不宜逕以藥物溶液皮膚測試，須專業評估與正規試劑/分級激發。"},"sources":["Shenoy/Castells JAMA 2019 Penicillin Allergy","IDSA/AAAAI Penicillin Allergy guidance","Harrison 21e, Drug Allergy"]}},"112-95":{"quick":"Listeria monocytogenes對「頭孢菌素天生無效」，故無法以ceftriaxone治療；首選ampicillin(±gentamicin)，過敏者TMP-SMX，故選B。","detail":{"background":"Listeria monocytogenes(單核球增多性李斯特菌)是革蘭陽性、可在冷藏溫度繁殖的胞內菌，藉受污染食品(未殺菌乳製品、即食肉品、生菜)傳播，好侵犯新生兒、孕婦、老年人(>50歲)與細胞免疫低下者，臨床造成菌血症、腦膜炎與腦幹腦炎(rhombencephalitis)。治療關鍵：李斯特菌對「所有頭孢菌素(cephalosporins)天生無效(intrinsic resistance)」，這也是為何>50歲或免疫低下的細菌性腦膜炎經驗治療要在第三代頭孢之外「加上ampicillin」涵蓋李斯特。首選治療為ampicillin(或penicillin G)，嚴重感染加gentamicin協同；對penicillin過敏者首選trimethoprim-sulfamethoxazole(TMP-SMX)；vancomycin、linezolid對革蘭陽性的李斯特有體外活性可作替代。故「無法治療李斯特菌」者為ceftriaxone(頭孢菌素)。112年此題測試李斯特對頭孢天生抗藥的經典考點。","options":{"A":"錯誤。Ampicillin為李斯特菌首選，可治療。","B":"正確(為答案)。Ceftriaxone(頭孢菌素)對李斯特天生無效，無法治療。","C":"錯誤。Vancomycin對革蘭陽性李斯特有活性，可作替代。","D":"錯誤。Linezolid對李斯特有體外活性，可作替代。","E":"錯誤。TMP-SMX為penicillin過敏者的首選替代藥。"},"sources":["Harrison 21e, Listeria monocytogenes Infections","Mandell 9e, Listeriosis","IDSA Bacterial Meningitis (empiric ampicillin >50y)"]}},"113-85":{"quick":"VRE：嚴重感染/菌血症用linezolid或daptomycin(3對)；VRE於整體腸球菌比例升高至三到四成以上(4對)；故(3)+(4)→E。尿/痰/swab帶菌不治、dapto不治肺炎、teicoplanin對VanA無效，皆錯。","detail":{"background":"抗萬古黴素腸球菌(VRE)的治療與流行病學常考。重點：(3)VRE的嚴重感染(尤其菌血症)以linezolid或daptomycin治療(daptomycin需較高劑量；linezolid為抑菌型但臨床可用)，為正確選項;(4)依台灣疾管署監測，VRE(主要E. faecium)在腸球菌中的比例近年確實上升至三至四成以上，反映抗藥趨勢，本題視為正確。錯誤敘述:(1)只要尿、痰或肛門拭子(rectal swab)培養出VRE「就應立即治療」是錯的——多屬移生(colonization)，無症狀不治療;(2)Daptomycin「不能用於肺炎」(被肺部界面活性劑去活化)，故「可用daptomycin治VRE肺炎」錯誤;(5)VRE(VanA型)對vancomycin與teicoplanin皆抗藥(交叉抗藥)，「teicoplanin仍有很好療效」錯誤(VanB型可能對teicoplanin仍敏感，但不可一概而論)。故正確組合為(3)+(4)。113年此題測試VRE治療與台灣抗藥流行。","options":{"A":"錯誤。(1)帶菌不需治療、含錯誤敘述。","B":"錯誤。(2)daptomycin不能治肺炎。","C":"錯誤。(5)teicoplanin對VanA型VRE無效。","D":"錯誤。僅(2)(3)，且(2)錯誤。","E":"正確。(3)VRE菌血症用linezolid/daptomycin、(4)台灣VRE比例升至三至四成以上。"},"sources":["Harrison 21e, Enterococcal Infections / VRE","Mandell 9e, Daptomycin (lung inactivation)","Taiwan CDC VRE surveillance"]}},"113-93":{"quick":"ESBL(廣效β-內醯胺酶)能水解青黴素、第三代頭孢與aztreonam(monobactam)，但「不能水解carbapenem」，故除外者為Meropenem，選C。","detail":{"background":"Extended-spectrum β-lactamase(ESBL，廣效乙內醯胺酶)是革蘭陰性菌(尤其E. coli、Klebsiella)經由質體獲得的酵素，能水解青黴素類、第一至第三/四代頭孢菌素(cefotaxime、ceftazidime、ceftriaxone)與單環類aztreonam(monobactam)，但「不能水解碳青黴烯類(carbapenem，如meropenem、imipenem、ertapenem)」，且其活性可被β-lactamase抑制劑(clavulanate)抑制(這也是表型偵測的依據)。臨床意義：ESBL菌感染的「嚴重感染首選為carbapenem」(因carbapenem不被ESBL水解)，對輕度感染或源頭控制良好者，部分情況可考慮ceftazidime/avibactam、piperacillin/tazobactam(具爭議)等。故本題「ESBL可水解的β-lactam，何者除外」答案為Meropenem(carbapenem)。注意ESBL不同於碳青黴烯酶(KPC、NDM、OXA-48)，後者才會水解carbapenem(造成CRE)。113年此題測試ESBL受質範圍與carbapenem的穩定性。","options":{"A":"錯誤(非除外項)。Cefotaxime(第三代頭孢)會被ESBL水解。","B":"錯誤(非除外項)。Aztreonam(monobactam)會被ESBL水解。","C":"正確(為答案，除外項)。Meropenem(carbapenem)不被ESBL水解，故為例外。","D":"錯誤(非除外項)。Piperacillin(青黴素類)會被ESBL水解。","E":"錯誤(非除外項)。Ceftazidime會被ESBL水解。"},"sources":["Harrison 21e, β-lactamases / Resistance","Mandell 9e, ESBL and Carbapenems","CLSI ESBL detection"]}},"114-82":{"quick":"腸球菌：VRE最常為E. faecium(1對)、孕婦尿faecalis給amoxicillin(2對)、腎移植尿路術前VRE給linezolid(3對)、VRE嚴重感染用linezolid/daptomycin(4對)；故(1)+(2)+(3)+(4)→D。尿/痰VRE僅移生不治(5錯)。","detail":{"background":"本題綜合腸球菌與抗生素的多個正確概念：(1)抗萬古黴素腸球菌(VRE)最常見菌種為E. faecium(抗藥性高於faecalis);(2)孕婦產前篩出無症狀菌尿(尿培養E. faecalis)應治療——因孕期無症狀菌尿會增加腎盂腎炎、早產與低出生體重，E. faecalis對amoxicillin/ampicillin多敏感，故口服amoxicillin為合理選擇;(3)腎移植病人在尿路侵入性手術「前」即使是無症狀，因屬高風險族群(免疫低下＋將進行尿路操作)，對VRE移生宜先處置(linezolid)以降低術後感染;(4)VRE嚴重感染常需linezolid或daptomycin;(5)單純尿液或痰液培養有VRE而無症狀屬移生(colonization)，「就需要使用linezolid治療」是錯誤(不治療)。差別在於——一般無症狀菌尿不治療，但「孕婦」與「即將尿路手術者」是兩大例外需治療。故正確為(1)+(2)+(3)+(4)。114年此題整合腸球菌治療與「無症狀菌尿治療例外」。","options":{"A":"錯誤。漏(3)腎移植尿路術前處置。","B":"錯誤。漏(2)孕婦菌尿治療。","C":"錯誤。漏(1)。","D":"正確。(1)(2)(3)(4)皆正確，(5)為移生不治療。","E":"錯誤。(5)尿/痰VRE屬移生不治療，全選不成立。"},"sources":["Harrison 21e, Enterococcal Infections","IDSA Asymptomatic Bacteriuria 2019 (pregnancy/urologic exceptions)","Mandell 9e, VRE Therapy"]}},"114-86":{"quick":"金黃色葡萄球菌治療正確：VISA可用linezolid/ceftaroline(3)、SAB治療5天仍發燒須重複血培找深部感染(4)、輕微皮膚軟組織用口服TMP-SMX/doxycycline(5)；故(3)+(4)+(5)→D。MSSA首選β-lactam(oxacillin/cefazolin)非vanco。","detail":{"background":"金黃色葡萄球菌(S. aureus)治療的核心是「依甲氧西林敏感性選藥」。正確敘述:(3)對中度抗萬古黴素金黃色葡萄球菌(VISA)，可考慮linezolid或ceftaroline(第五代頭孢，唯一對MRSA有效之頭孢)等替代;(4)金黃色葡萄球菌菌血症(SAB)若治療(約3–5天)後仍持續發燒或菌血症，應重複血液培養並積極尋找深部感染病灶(心內膜炎、骨髓炎、轉移性膿瘍、人工裝置感染)——這是SAB照護的關鍵原則(常需感染科會診、追蹤血培養至陰性、評估心臟超音波);(5)輕微皮膚軟組織感染(尤其疑CA-MRSA膿瘍)可口服TMP-SMX或doxycycline(±切開引流)。錯誤敘述:(1)對甲氧西林敏感金黃色葡萄球菌(MSSA)引起的感染，β-lactam(oxacillin/nafcillin或cefazolin)療效「優於」vancomycin/teicoplanin，故「vancomycin優於oxacillin」是反的;(2)MSSA心內膜炎首選為抗葡萄球菌β-lactam(oxacillin/cefazolin)，而非「vancomycin或daptomycin優先」(後二者保留給MRSA或過敏)。故正確為(3)+(4)+(5)。114年此題測試MSSA首選β-lactam與SAB深部感染追查。","options":{"A":"錯誤。(1)(2)皆錯(MSSA首選β-lactam非vancomycin)。","B":"錯誤。含(1)錯誤敘述。","C":"錯誤。含(2)錯誤敘述。","D":"正確。(3)VISA用linezolid/ceftaroline、(4)SAB持續發燒重複血培找深部、(5)輕症皮膚用口服TMP-SMX/doxycycline。","E":"錯誤。含(1)(2)錯誤敘述。"},"sources":["Harrison 21e, Staphylococcal Infections","IDSA 2011 MRSA Guidelines","Mandell 9e, S. aureus Bacteremia management"]}},"114-91":{"quick":"Aminoglycosides為「殺菌型(bactericidal)、濃度依賴」，並非抑菌型(bacteriostatic)，故B最不適當；其餘(30S結合、膿瘍低pH/缺氧失效、腎毒可逆耳毒不可逆、後抗生素效應)皆正確。","detail":{"background":"Aminoglycosides(胺基糖苷類，如gentamicin、amikacin、tobramycin)是治療嚴重革蘭陰性菌感染的重要藥物。藥理特性：(A)與細菌30S核糖體次單位(16S rRNA)結合，造成mRNA錯讀與抑制蛋白質合成;(B)它們是「殺菌型(bactericidal)」抗生素且為「濃度依賴型」殺菌，並非抑菌型(bacteriostatic)——這是本題最不適當之處;常與細胞壁活性藥(β-lactam)併用產生協同(synergy)以治療腸球菌/綠膿桿菌等嚴重感染;(C)在膿瘍的低pH/缺氧(低氧)環境中活性差(其攝入依賴氧依賴性轉運)，故對膿瘍滲透/殺菌不佳;(D)腎毒性(近端腎小管)通常為「可逆」，耳毒性(耳蝸/前庭)可能「不可逆」;(E)具濃度依賴殺菌與顯著的後抗生素效應(post-antibiotic effect)，故臨床採「每日一次(extended-interval)」給藥以提高療效並降低毒性。故B「屬抑菌性」最不適當。114年此題測試aminoglycoside藥理。","options":{"A":"正確。與30S(16S rRNA)結合抑制蛋白質合成。","B":"最不適當(為答案)。Aminoglycoside為殺菌型(濃度依賴)，非抑菌性。","C":"正確。在膿瘍低pH/缺氧環境活性不佳。","D":"正確。腎毒性多可逆、耳毒性可能不可逆。","E":"正確。具濃度依賴殺菌作用與後抗生素效應(故每日一次給藥)。"},"sources":["Harrison 21e, Aminoglycosides","Mandell 9e, Aminoglycoside Pharmacology","Goodman & Gilman, Aminoglycosides"]}},"114-92":{"quick":"TMP-SMX可治Pneumocystis、Stenotrophomonas、CA-MRSA、Haemophilus等，但對「綠膿桿菌(Pseudomonas)無效」，故除外者選D。","detail":{"background":"Trimethoprim-sulfamethoxazole(TMP-SMX, co-trimoxazole)是抑制葉酸合成的廣效殺菌組合(sulfamethoxazole抑制dihydropteroate synthase、trimethoprim抑制dihydrofolate reductase，序列阻斷)。涵蓋範圍廣：(A)肺囊蟲(Pneumocystis jirovecii)肺炎的「首選治療與預防」;(B)嗜麥芽窄食單胞菌(Stenotrophomonas maltophilia)的首選藥(該菌對carbapenem天生抗藥);(C)社區型抗藥金黃色葡萄球菌(CA-MRSA)皮膚軟組織感染口服選擇;(E)Haemophilus influenzae、許多腸道桿菌、Nocardia、Listeria(替代)、Toxoplasma等。但對(D)綠膿桿菌(Pseudomonas aeruginosa)「無效」——綠膿桿菌對TMP-SMX天生抗藥。故「何者除外」答案為Pseudomonas。注意TMP-SMX副作用：皮疹/SJS-TEN、高血鉀、肌酸酐假性上升、骨髓抑制、G6PD缺乏溶血。114年此題測試TMP-SMX的涵蓋與綠膿桿菌的盲點。","options":{"A":"錯誤(非除外項)。TMP-SMX為肺囊蟲首選。","B":"錯誤(非除外項)。TMP-SMX為Stenotrophomonas首選。","C":"錯誤(非除外項)。TMP-SMX可治CA-MRSA皮膚軟組織感染。","D":"正確(為答案，除外項)。對綠膿桿菌無效(天生抗藥)。","E":"錯誤(非除外項)。可涵蓋Haemophilus influenzae。"},"sources":["Harrison 21e, Sulfonamides/Trimethoprim","Mandell 9e, TMP-SMX spectrum","IDSA PCP prophylaxis"]}},"114-93":{"quick":"對carbapenem(imipenem)具「與生俱來內源性抗藥」的是Stenotrophomonas maltophilia(帶L1金屬-β-內醯胺酶)，故選B；其餘多為後天獲得性抗藥。","detail":{"background":"碳青黴烯類(carbapenem，如imipenem、meropenem)是對抗多重抗藥革蘭陰性菌的後線藥，但少數菌種「天生(內源性, intrinsic)」即對carbapenem抗藥。最典型者為Stenotrophomonas maltophilia——它帶有染色體性的金屬-β-內醯胺酶(L1 metallo-β-lactamase, 可水解carbapenem)與L2 serine β-lactamase，故對所有carbapenem天生抗藥，治療首選為TMP-SMX(替代為levofloxacin、ceftazidime或新藥)。相對地：Pseudomonas aeruginosa對carbapenem的抗藥多為「後天獲得」(外膜孔蛋白OprD缺失、外排幫浦、獲得碳青黴烯酶)，並非全部天生抗藥(imipenem通常仍有部分活性)；ESBL-producing Klebsiella對carbapenem「敏感」(ESBL不水解carbapenem，這正是用carbapenem治ESBL的理由)；AmpC-producing E. coli對carbapenem亦敏感。故唯一「與生俱來內源性抗carbapenem」者為Stenotrophomonas maltophilia。114年此題測試內源性 vs 後天抗藥與Stenotrophomonas的特性。","options":{"A":"錯誤。Pseudomonas對carbapenem抗藥多為後天(OprD缺失/外排/酶)，非全部天生。","B":"正確。Stenotrophomonas maltophilia帶L1金屬-β-內醯胺酶，對carbapenem天生抗藥(首選TMP-SMX)。","C":"錯誤。ESBL-producing Klebsiella對carbapenem敏感(ESBL不水解carbapenem)。","D":"錯誤(此選項文字殘為D，原意Amp C-producing E. coli對carbapenem敏感)。","E":"錯誤。Amp C-producing E. coli對carbapenem仍敏感。"},"sources":["Harrison 21e, Stenotrophomonas / Intrinsic Resistance","Mandell 9e, Stenotrophomonas maltophilia","CLSI intrinsic resistance tables"]}},"107-綜-5":{"quick":"流感疫苗：對雞蛋嚴重過敏為禁忌、季節流感疫苗後GBS極罕見、<6月不打、不良事件重症/死亡率為重要觀察指標皆對(1235)；「甲基汞與乙基汞均可被代謝」為錯(4)，故選E。","detail":{"background":"流感疫苗接種的禁忌與副作用是公衛常考。正確敘述:(1)對雞蛋有「嚴重」過敏(過敏性反應)者，傳統視為禁忌(現多數仍可在監測下接種或選用細胞培養/重組疫苗);(2)除1976年美國H1N1豬流感疫苗曾與GBS明確相關外，季節性流感疫苗後發生Guillain-Barré syndrome(GBS)的機率極低(約每百萬劑1–2例);(3)6個月以下嬰兒不建議施打流感疫苗(改以母親孕期接種與周邊群體免疫保護);(5)評估疫苗接種後不良事件與疫苗的因果關係時，該事件的死亡或重症比率是重要的觀察指標。錯誤者為(4)：保存劑thimerosal含「乙基汞(ethylmercury)」，可被人體代謝並較快排出；而「甲基汞(methylmercury)」(來自環境/食物)會在體內累積、半衰期長、神經毒性高——二者藥動學不同，「甲基汞與乙基汞均可為人體代謝」是錯誤敘述。故正確組合為(1)+(2)+(3)+(5)。107年此題測試流感疫苗安全性與thimerosal的汞種差異。","options":{"A":"錯誤。漏(5)，且未涵蓋正確全組。","B":"錯誤。含(4)甲基汞/乙基汞代謝之錯誤敘述。","C":"錯誤。含(4)錯誤敘述。","D":"錯誤。漏(2)。","E":"正確。(1)(2)(3)(5)為正確敘述，(4)為錯誤(甲基汞會累積而非可代謝)。"},"sources":["CDC/ACIP Influenza Vaccination","Harrison 21e, Influenza","Taiwan CDC 流感疫苗接種建議"]}},"109-104":{"quick":"加護病房水槽(潮濕環境)相關院內感染病原多為水生革蘭陰性菌(Pseudomonas、Stenotrophomonas、Chryseobacterium)與非結核分枝桿菌；Aspergillus為空氣/環境黴菌(與建築揚塵相關)，故為非選E。","detail":{"background":"醫療照護相關感染(HAI)的環境貯主(reservoir)概念重要。加護病房的洗手槽、水龍頭、排水孔等「潮濕水環境」常成為水生革蘭陰性桿菌的貯主與生物膜溫床，故建議汙水與清潔水槽分流、甚至將水槽移出ICU。與「水環境/水槽」相關的院內病原包括：Pseudomonas aeruginosa(綠膿桿菌)、Stenotrophomonas maltophilia、Chryseobacterium(Elizabethkingia)、非結核分枝桿菌(NTM, 如M. abscessus/chelonae，常存於供水系統)、退伍軍人桿菌(Legionella)等。相對地，Aspergillus fumigatus(麴菌)是「空氣傳播」的環境黴菌，孢子來自塵土、腐植質與「建築工程/裝修揚塵」，與「水槽」無關，是免疫低下者侵襲性麴菌病的院內風險(故移植病房需HEPA正壓、工程防塵)。故「水槽相關病原中為非者」為Aspergillus fumigatus。109年此題測試水傳vs空氣傳病原與感染管制。","options":{"A":"錯誤(屬水相關)。Pseudomonas aeruginosa與潮濕水環境相關。","B":"錯誤(屬水相關)。非結核分枝桿菌常存於供水系統。","C":"錯誤(屬水相關)。Chryseobacterium為水環境革蘭陰性菌。","D":"錯誤(屬水相關)。Stenotrophomonas maltophilia與潮濕環境/水相關。","E":"正確(為答案，非水相關)。Aspergillus為空氣傳播之環境黴菌，與水槽無關。"},"sources":["Mandell 9e, Healthcare-associated Infections","Harrison 21e, Hospital-acquired Infections","CDC Environmental Infection Control"]}},"109-106":{"quick":"需以「抗微生物製劑」做暴露後預防(PEP)者：HIV(抗病毒藥)、Influenza(oseltamivir)、Meningococcus(抗生素)；麻疹PEP用疫苗/免疫球蛋白、當時COVID-19無抗微生物PEP，故(1)+(4)+(5)→C。","detail":{"background":"暴露後預防(post-exposure prophylaxis, PEP)依病原採不同策略：用「抗微生物製劑」者與用「疫苗/免疫球蛋白(被動免疫)」者須分清。需用抗微生物製劑PEP:(1)HIV——職業或性暴露後72小時內開始抗反轉錄病毒三合一(如tenofovir/emtricitabine+dolutegravir)28天;(4)流感(Influenza)——對高風險暴露者可用神經胺酸酶抑制劑(oseltamivir)做PEP;(5)腦膜炎雙球菌(Meningococcus)——密切接觸者以抗生素(rifampin/ciprofloxacin/ceftriaxone)PEP。相對地:(2)麻疹(measles)暴露後預防用「疫苗(72小時內)或免疫球蛋白(6天內)」，非抗微生物製劑;(3)COVID-19在本題時空(109年)並無常規抗微生物製劑PEP(早期以隔離/檢疫為主)。故以抗微生物製劑PEP者為(1)+(4)+(5)。109年此題測試各病原PEP的方式差異。","options":{"A":"錯誤。(2)麻疹PEP用疫苗/免疫球蛋白非抗微生物製劑。","B":"錯誤。(3)COVID-19當時無抗微生物製劑PEP。","C":"正確。(1)HIV、(4)流感、(5)腦膜炎雙球菌可用抗微生物製劑PEP。","D":"錯誤。含(3)。","E":"錯誤。含(2)(3)。"},"sources":["CDC PEP Guidelines (HIV/Meningococcal/Influenza)","Harrison 21e, Immunization & Prophylaxis","Mandell 9e, Chemoprophylaxis"]}},"109-112":{"quick":"預防中心靜脈導管血流感染(CLABSI)的實證：最大無菌面防護(1)＋置管前後手部衛生(3)；皮膚消毒以chlorhexidine優於povidone-iodine、導管不需常規定期更換，故(2)(4)錯，選D。","detail":{"background":"中心靜脈導管相關血流感染(CLABSI)是可預防的HAI，IHI「中心線置入組合(central line bundle)」實證措施包括:(1)置管時採「最大無菌面防護(maximal sterile barrier)」——術者戴帽子、口罩、無菌手術衣、無菌手套，並使用大型無菌覆蓋布;(3)置管前後執行手部衛生(hand hygiene);其餘要素含選擇適當置入部位(避免股靜脈)、以>0.5% chlorhexidine酒精溶液消毒皮膚、每日評估是否仍需導管並儘早移除。錯誤敘述:(2)皮膚消毒以「chlorhexidine優於povidone-iodine(β-iodine)」，本敘述把優劣寫反;(4)中心靜脈導管「不需常規定期(如每14天)更換」——常規更換並不降低感染、反增機械併發症，應以臨床指徵決定移除/更換，而非排程更換。故實證正確為(1)+(3)。109年此題測試CLABSI bundle核心。","options":{"A":"錯誤。含(2)(4)錯誤措施。","B":"錯誤。含(2)(chlorhexidine才優於碘)。","C":"錯誤。含(2)(4)。","D":"正確。(1)最大無菌面、(3)手部衛生為實證有效。","E":"錯誤。(4)不需常規定期更換導管。"},"sources":["CDC/HICPAC Intravascular Catheter Guidelines 2011","IHI Central Line Bundle","Mandell 9e, Catheter-related Infections"]}},"109-114":{"quick":"孕婦「不建議」接種的是活性減毒疫苗：MMR(2)與Varicella(3)；流感(去活化)與肺炎鏈球菌則可接種，故選B(2+3)。","detail":{"background":"孕婦疫苗接種的鐵律：「活性減毒疫苗(live-attenuated)在懷孕期間禁忌」(理論上有胎兒感染風險)，而「去活化/次單位/類毒素疫苗一般安全可打」。本題:(2)MMR(麻疹-腮腺炎-德國麻疹)為活性減毒疫苗→孕期禁忌(且接種後建議避孕至少1個月);(3)Varicella(水痘)疫苗為活性減毒→孕期禁忌;(1)流感疫苗(注射型為去活化)→孕婦「建議」接種(任何孕期皆可，保護母嬰);(4)肺炎鏈球菌疫苗(多醣/結合型，非活性)→有適應症可接種。故孕婦不建議的是(2)+(3)。其他孕期禁忌的活疫苗還有BCG、口服小兒麻痺(OPV)、黃熱病(權衡)、帶狀皰疹活疫苗(Zostavax)、鼻噴流感活疫苗(LAIV)。109年此題測試「活疫苗孕期禁忌」核心原則。","options":{"A":"錯誤。(1)流感(去活化)孕婦可接種。","B":"正確。(2)MMR與(3)Varicella皆為活性減毒疫苗，孕期禁忌。","C":"錯誤。(1)(4)皆非活疫苗，孕婦可打。","D":"錯誤。含(1)流感(可接種)。","E":"錯誤。含(4)肺炎鏈球菌(可
