9, "correction_note": ""}, {"id": "113-通論-5分科-38", "roc_year": 113, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 38, "stem": "依據國民健康署代謝症候群之判定標準,不包括下列何者?", "options": {"A": "高血壓", "B": "三酸甘油脂", "C": "低密度膽固醇", "D": "空腹血糖"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_通論_5分科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "肥胖、代謝症候群與血脂異常", "topic_code": "E9", "topic_num": 9, "correction_note": ""}, {"id": "113-進階-內科-38", "roc_year": 113, "subject_group": "進階專科護理", "branch": "內科", "q_num": 38, "stem": "下列哪一個疾病與代謝症候群最不相關?", "options": {"A": "高尿酸血症", "B": "第 2 型糖尿病", "C": "非酒精性脂肪肝疾病", "D": "多囊性腎疾病"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "113_進階_內科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "肥胖、代謝症候群與血脂異常", "topic_code": "E9", "topic_num": 9, "correction_note": ""}, {"id": "113-進階-家庭-67", "roc_year": 113, "subject_group": "進階專科護理", "branch": "家庭", "q_num": 67, "stem": "根據我國國民健康署所公佈之標準,下列何者為成人代謝症候群 ( metabolic syndrome ) 的 診斷標準?", "options": {"A": "空腹血糖值大於或等於 126 mg / dL", "B": "血壓大於或等於 140 / 90 mmHg", "C": "高密度脂蛋白膽固醇男性小於 40 mg / dL,女性小於 50 mg / dL", "D": "腰圍男性大於 100 cm,女性大於 90 cm"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_進階_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "肥胖、代謝症候群與血脂異常", "topic_code": "E9", "topic_num": 9, "correction_note": ""}, {"id": "114-進階-外科-43", "roc_year": 114, "subject_group": "進階專科護理", "branch": "外科", "q_num": 43, "stem": "有關病態肥胖 ( morbid obesity ) 的敘述,下列何者錯誤?", "options": {"A": "育齡女性在手術時不應懷孕,建議手術後至少 1 年保持使用避孕措施", "B": "在接受胃袖狀手術的病人術前須檢測幽門螺旋桿菌", "C": "在減重手術前的體重減輕,並不會造成術後有更明顯的體重減輕", "D": "Roux - en - Y 胃旁路手術之減重是結合了限制性和吸收不良性機制"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_進階_外科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "肥胖、代謝症候群與血脂異常", "topic_code": "E9", "topic_num": 9, "correction_note": ""}, {"id": "114-進階-內科-46", "roc_year": 114, "subject_group": "進階專科護理", "branch": "內科", "q_num": 46, "stem": "有關代謝性症候群造成胰島素阻抗的病理機轉,下列敘述何者正確?", "options": {"A": "高血壓引起胰島素分泌減少", "B": "肝臟脂肪堆積導致胰島素快速分解", "C": "高密度脂蛋白增加胰島素抗性", "D": "細胞內脂肪酸損害胰島素訊息傳遞路徑"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "114_進階_內科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "肥胖、代謝症候群與血脂異常", "topic_code": "E9", "topic_num": 9, "correction_note": ""}], E={"105-TNPA-通論-40": {"quick": "甲狀腺低下代謝降低→皮膚乾粗、眼眶/臉部黏液水腫、食慾差、便祕、怕冷,故選B。", "detail": {"background": "甲狀腺功能低下(hypothyroidism)因甲狀腺素不足使全身代謝率下降。典型症狀:怕冷、體重增加、疲倦嗜睡、皮膚乾粗、掉髮、眉毛外1/3稀疏、聲音低沉沙啞、便祕(腸蠕動慢)、食慾差、反應遲鈍、月經過多、深肌腱反射『鬆弛期延長』、黏液水腫(myxedema,非壓陷性水腫如眼眶/脛前)。最常見原因為自體免疫『橋本氏甲狀腺炎』,其次碘缺乏、甲狀腺術後/放射碘後、藥物(amiodarone、lithium)。診斷:TSH升高、free T4降低(原發性)。治療:levothyroxine補充並依TSH調整。相對地甲狀腺亢進為怕熱、出汗、體重減輕、腹瀉、心悸。\\n\\n護理:衛教levothyroxine空腹服用、終生服藥、定期驗TSH;老年/心臟病者低劑量起始漸增。", "options": {"A": "『易拉肚子』屬甲狀腺亢進(腸蠕動快),甲低為便祕,不符。", "B": "正解:皮膚乾粗、眼眶水腫、食慾差、便祕為甲狀腺低下特徵。", "C": "出汗、脈搏強屬甲狀腺亢進,不符甲低。", "D": "眼睛怕光等非甲低典型(突眼屬Graves甲亢)。"}, "sources": ["Harrison 21e, Hypothyroidism", "ATA Hypothyroidism Guidelines"]}}, "106-106a-內科-20": {"quick": "甲狀腺風暴診斷依據為發燒、心搏過速/心衰、中樞神經與肝功能異常(Burch-Wartofsky);『眼突及月經不正常』非診斷依據,故選C。", "detail": {"background": "甲狀腺風暴(thyroid storm)是甲狀腺毒症的致命急症,常因感染、手術、創傷、停藥、放射碘等誘發。診斷依『Burch-Wartofsky評分』的器官失代償表現:①高燒(常>38.5–40°C);②心血管:心搏過速(常>140)、心房顫動、心衰竭;③中樞神經:躁動、譫妄、抽搐、昏迷;④腸胃肝:噁心嘔吐腹瀉、黃疸/肝功能異常。『突眼(exophthalmos)與月經不規則』是慢性甲亢/Graves的表現,並非甲狀腺風暴的『診斷依據』(風暴看的是急性器官失代償),故C為答案。治療:β阻斷劑(propranolol)、thionamide(PTU優先,抑制合成並抑制T4→T3)、給藥1小時後給碘(Lugol/SSKI抑制釋放)、類固醇(hydrocortisone,抑周邊轉換並補腎上腺)、降溫(避aspirin)、治誘因、支持。\\n\\n護理:加護監測體溫/心律/意識、降溫、依序給藥(thionamide先於碘)、找並治療誘因。", "options": {"A": "中樞神經症狀與肝功能異常是甲狀腺風暴的器官失代償依據,屬之。", "B": "發燒是甲狀腺風暴重要診斷依據,屬之。", "C": "正解(非依據):突眼與月經不正常屬慢性甲亢表現,非甲狀腺風暴的診斷依據。", "D": "心搏過速或心衰是甲狀腺風暴心血管失代償依據,屬之。"}, "sources": ["Burch-Wartofsky Point Scale", "Harrison 21e, Thyroid Storm", "ATA Hyperthyroidism Guidelines"]}}, "106-106a-內科-36": {"quick": "甲狀腺聽到血管雜音(bruit)代表血流增加,最可能為甲狀腺機能亢進(Graves),故選A。", "detail": {"background": "Graves病(甲狀腺機能亢進最常見原因)因TSH受體刺激抗體(TRAb/TSI)使甲狀腺瀰漫性腫大且『血流大幅增加』,理學檢查可在腫大的甲狀腺上聽到『血管雜音(bruit)』或觸到震顫(thrill),是血管高灌流的表現,屬甲亢的特異徵象。甲狀腺低下、黏液水腫不會增加血流故無bruit;頸動脈狹窄的bruit位於頸動脈而非甲狀腺。其他甲亢徵象:心搏過速、手抖、怕熱出汗、體重減輕、突眼(Graves眼病)、脛前黏液水腫。\\n\\n護理:評估甲亢症狀與甲狀腺腫大/雜音;以β阻斷劑緩解症狀、thionamide治療、追蹤TSH/free T4。", "options": {"A": "正解:甲狀腺bruit代表血流增加,見於甲狀腺機能亢進(Graves)。", "B": "甲狀腺低下血流不增加,無bruit。", "C": "頸動脈狹窄的雜音位於頸動脈,非甲狀腺處。", "D": "黏液水腫(甲低)不會有甲狀腺bruit。"}, "sources": ["Harrison 21e, Graves' Disease", "Bates' Guide, Thyroid examination"]}}, "107-TNPA-通論-23": {"quick": "皮膚乾、髮質粗、眉毛稀是『甲狀腺低下』(非亢進)的表現,故配對錯誤者為B。", "detail": {"background": "體重異常增加的內分泌/系統病因與其特徵配對:①庫欣氏症候群(Cushing)→水牛肩、滿月臉、軀幹性(中心性)肥胖、紫紋、四肢瘦;②多囊性卵巢症候群(PCOS)→多毛、月經稀少/不規則、肥胖、胰島素阻抗;③腎病症候群→嚴重全身水腫(低白蛋白)、蛋白尿;④『甲狀腺低下』→體重增加、皮膚乾粗、髮質粗、眉毛外側稀疏、怕冷、便祕。本題B把『皮膚乾、髮質粗、眉毛稀』配給『甲狀腺亢進』是錯的(這些是甲狀腺『低下』的表現;甲亢反而體重減輕、皮膚溫濕),故B為配對錯誤(答案)。\\n\\n護理:依特徵鑑別體重增加的內分泌病因(Cushing/甲低/PCOS),安排對應檢查(皮質醇、TSH、雄性素)。", "options": {"A": "正確配對:水牛肩、滿月臉、中心性肥胖為庫欣氏症候群。", "B": "錯誤配對(正解):皮膚乾、髮質粗、眉毛稀屬甲狀腺『低下』,非亢進。", "C": "正確配對:多毛、月經稀為多囊性卵巢症。", "D": "正確配對:嚴重全身水腫為腎病症候群。"}, "sources": ["Harrison 21e, Cushing/Hypothyroidism/PCOS", "ATA/Endocrine Society"]}}, "107-TNPA-通論-52": {"quick": "年輕男性、突發下肢無力+低血鉀(K 2)+甲狀腺背景→甲狀腺毒性週期性麻痺,應優先驗甲狀腺功能,故選A。", "detail": {"background": "甲狀腺毒性週期性麻痺(thyrotoxic periodic paralysis, TPP)好發『亞洲年輕男性』,在甲狀腺毒症基礎上,因甲狀腺素增強Na-K-ATPase活性,使鉀大量移入細胞內→突發『低血鉀』與『近端對稱性下肢為主的肌肉無力/麻痺』,常於高碳水大餐、運動後或休息時發作,深肌腱反射可減弱(本例下肢DTR消失、上肢正常),感覺與意識正常、Babinski陰性(下運動神經元/肌肉問題而非中樞)。本例『常大吃大喝、體重未增(甲亢消耗)、突發下肢癱、K 2 mmol/L』→高度懷疑TPP,除補鉀外『應優先驗甲狀腺功能(free T4、TSH)』確認甲亢(A)。治療:謹慎補鉀(回升時可能反彈高血鉀)、非選擇性β阻斷劑(propranolol)可預防、根本治療甲亢。\\n\\n護理:低血鉀肌無力+亞洲年輕男性要想到TPP;監測心電圖與血鉀、補鉀勿過量、治療甲亢防復發。", "options": {"A": "正解:低血鉀週期性麻痺要驗甲狀腺功能(free T4/TSH)找甲亢(TPP)。", "B": "腰椎MRI非首要(本例為代謝性低血鉀麻痺,非結構壓迫)。", "C": "高濃度葡萄糖會刺激胰島素使鉀更往細胞內移,加重低血鉀,不當。", "D": "非精神問題,不應優先會診精神科。"}, "sources": ["Harrison 21e, Thyrotoxic Periodic Paralysis", "Endocrine emergencies"]}}, "107-TNPA-內科-55": {"quick": "甲狀腺低下腸蠕動變慢→便祕,『腹瀉』不正確,故選D。", "detail": {"background": "甲狀腺功能低下因代謝率下降,典型:皮膚乾燥、掉髮、眉毛外側稀疏、體重增加、怕冷、疲倦嗜睡、聲音低沉、『便祕(腸蠕動減慢)』、月經過多、反應遲鈍、深肌腱反射鬆弛期延長、黏液水腫。『腹瀉』是甲狀腺『亢進』(腸蠕動加快)的表現,不屬甲低,故D不正確(答案)。診斷TSH升高、free T4降低;治療levothyroxine。\\n\\n護理:衛教高纖飲食、水分、活動改善便祕;levothyroxine空腹服用、定期驗TSH。", "options": {"A": "正確:甲低皮膚乾燥。", "B": "正確:甲低掉髮。", "C": "正確:甲低體重增加。", "D": "不正確(正解):甲低為便祕,腹瀉屬甲狀腺亢進。"}, "sources": ["Harrison 21e, Hypothyroidism", "ATA Guidelines"]}}, "108a-TNPA-內科-10": {"quick": "Graves病為原發性甲亢→TSH被抑制(低)、T4升高,故選A(低TSH與高T4)。", "detail": {"background": "Graves病是甲狀腺機能亢進最常見原因,由TSH受體刺激抗體(TRAb/TSI)持續刺激甲狀腺,使甲狀腺素(T4/T3)過量分泌。依負回饋,過多甲狀腺素抑制腦下垂體→『TSH降低(被抑制)』,同時『free T4(及T3)升高』,即『原發性甲亢』的典型檢驗:低TSH+高T4(A正解)。TSH是最敏感的初篩;若TSH低但T4正常,需驗T3(可能T3-toxicosis)或屬亞臨床甲亢。Graves另有突眼、脛前黏液水腫、瀰漫性甲狀腺腫+bruit、TRAb陽性。\\n\\n護理:衛教β阻斷劑緩解症狀、thionamide/放射碘/手術選項;追蹤free T4(TSH恢復較慢)。", "options": {"A": "正解:Graves為原發性甲亢→低TSH、高T4。", "B": "低TSH正常T4偏向亞臨床甲亢,非Graves典型。", "C": "正常TSH高T4不符原發性甲亢的負回饋(罕見TSH瘤才如此)。", "D": "正常TSH正常T4為正常甲狀腺功能。"}, "sources": ["Harrison 21e, Graves' Disease", "ATA Hyperthyroidism Guidelines"]}}, "108b-TNPA-通論-26": {"quick": "毒性結節以methimazole可控功能但結節不會消失;故A正確。", "detail": {"background": "毒性結節性甲狀腺腫(toxic nodular goiter,含毒性腺瘤與多結節毒性甲狀腺腫)為自主功能性結節分泌過量甲狀腺素致甲亢。①抗甲狀腺藥(methimazole/PTU)可『控制甲狀腺功能(降低T4)』,但『不會使結節縮小消失』(結節為自主性,停藥即復發)(A正確);②因此毒性結節的『根治』首選『放射碘』或『手術』(非單靠藥物),藥物多為術前/碘前準備或不適合根治者;③毒性結節停藥『復發率高(>20%)』(B錯);④功能亢進時應先以藥物/β阻斷劑控制至甲狀腺功能正常再手術,『不建議在甲亢未控制時急速手術』(以免誘發甲狀腺風暴)(C錯);⑤『突眼(Graves眼病)是Graves的自體免疫表現,毒性結節較「少」凸眼』(D錯,毒性結節較不易凸眼)。本題A正確。\\n\\n護理:衛教毒性結節需放射碘或手術根治、藥物僅控制功能;β阻斷劑緩解症狀;放射碘前後注意。", "options": {"A": "正解:methimazole可改善甲狀腺功能,但結節不易縮小消失。", "B": "錯誤:毒性結節停藥復發率高(>20%)。", "C": "錯誤:應先控制甲亢至正常再手術,不宜在亢進時急速手術。", "D": "錯誤:突眼屬Graves,毒性結節較少凸眼。"}, "sources": ["ATA Hyperthyroidism Guidelines", "Harrison 21e, Toxic Nodular Goiter"]}}, "108b-TNPA-通論-55": {"quick": "漸進倦怠、體重增加、怕冷、表情冷漠、臉浮腫、脛前『非壓陷性水腫(黏液水腫)』→甲狀腺功能低下,故選A。", "detail": {"background": "本例76歲女性:漸進性倦怠、食慾降低但『體重增加』、怕冷、表情冷漠、臉部浮腫、脛前『非壓陷性水腫(non-pitting edema=黏液水腫)』、四肢肌力下降→典型『甲狀腺功能低下(myxedema)』。黏液水腫因真皮黏多醣(glycosaminoglycan)堆積吸水形成非壓陷性腫脹。老年甲低常表現不典型(疲倦、認知變差),易被誤為憂鬱或老化。診斷TSH升高、free T4降低(原發性,多為橋本氏)。第二型糖尿病以多尿口渴體重『減輕』為主;憂鬱症無黏液水腫等理學;急性腦血管病變為突發局部神經缺損。\\n\\n護理:老年不明倦怠+怕冷+非壓陷水腫要驗TSH;levothyroxine低劑量起始漸增(心臟風險)。", "options": {"A": "正解:怕冷+體重增加+黏液水腫(非壓陷)→甲狀腺功能低下。", "B": "第二型糖尿病以體重減輕、多尿口渴為主,不符。", "C": "憂鬱症無黏液水腫等理學表現。", "D": "急性腦血管病變為突發局部神經缺損,非漸進全身症狀。"}, "sources": ["Harrison 21e, Hypothyroidism/Myxedema", "ATA Guidelines"]}}, "108b-TNPA-內科-59": {"quick": "甲狀腺功能低下孕婦需『增加』levothyroxine劑量,故B正確。", "detail": {"background": "甲狀腺疾病要點:①『amiodarone』含大量碘,可致甲狀腺功能異常(amiodarone引起甲亢AIT或甲低AIH),會影響甲狀腺功能(故A『不會影響』錯);②『懷孕時因雌激素↑甲狀腺結合球蛋白、胎盤去碘酶與胎兒需求增加,甲狀腺素需求上升』,故已在補充levothyroxine的甲低孕婦『需增加劑量(常增25–30%)』並密集監測TSH(B正確);③甲亢合併高血壓最適合用『β阻斷劑(propranolol)』緩解心搏過速與症狀,『血管擴張劑(isordil)』不適合(C錯);④中年男性『感冒後突發甲狀腺腫痛+一過性甲亢』多為『亞急性(de Quervain)甲狀腺炎(病毒後)』,屬自限性、以NSAID/類固醇與β阻斷劑症狀治療,『不應用抗甲狀腺藥』(亞急性甲狀腺炎的甲亢是濾泡破壞釋放,非合成增加)(D錯)。本題B正確。\\n\\n護理:孕婦甲低增量並密集驗TSH;amiodarone使用者監測甲狀腺;亞急性甲狀腺炎支持治療。", "options": {"A": "錯誤:amiodarone含碘,會影響甲狀腺功能(致甲亢或甲低)。", "B": "正解:甲低孕婦需增加levothyroxine劑量。", "C": "錯誤:甲亢合併高血壓最適合β阻斷劑,非血管擴張劑。", "D": "錯誤:感冒後突發甲狀腺腫痛多為亞急性甲狀腺炎,不應用抗甲狀腺藥。"}, "sources": ["ATA Thyroid in Pregnancy Guidelines", "Harrison 21e, Thyroiditis; Amiodarone and thyroid"]}}, "108b-TNPA-外科-62": {"quick": "甲狀腺腫瘤合併『抑鈣素(calcitonin)』與CEA升高→甲狀腺髓質癌(MTC),故選C。", "detail": {"background": "甲狀腺癌四型:①乳突癌(papillary,最常見、預後最好、淋巴轉移、與輻射相關);②濾泡癌(follicular,血行轉移肺/骨);③『髓質癌(medullary, MTC)』源自分泌『抑鈣素(calcitonin)的濾泡旁C細胞』,故血中『calcitonin』與CEA升高為其腫瘤標記,可偶發或遺傳(MEN2,與RET基因相關),會早期淋巴轉移;④未分化癌(anaplastic,老年、侵襲快、預後極差)。本例calcitonin+CEA升高→MTC(C)。MTC治療為甲狀腺全切除+頸部淋巴廓清(放射碘對MTC無效,因C細胞不攝碘),遺傳型需家族篩檢RET。\\n\\n護理:MTC驗calcitonin/CEA追蹤、評估MEN2(嗜鉻細胞瘤、副甲亢)、家族基因篩檢。", "options": {"A": "乳突癌不以calcitonin為標記(thyroglobulin),不符。", "B": "濾泡癌標記為thyroglobulin,非calcitonin。", "C": "正解:calcitonin(+CEA)升高→甲狀腺髓質癌(C細胞)。", "D": "未分化癌侵襲快、無calcitonin標記特徵,不符。"}, "sources": ["Harrison 21e, Medullary Thyroid Carcinoma; MEN2", "ATA MTC Guidelines"]}}, "108a-TNPA-外科-80": {"quick": "甲狀腺手術截斷上甲狀腺動脈時傷及『上喉神經外側分支』→無法發高音(環甲肌麻痺),故選D。", "detail": {"background": "甲狀腺手術的神經損傷:①『喉返神經(recurrent laryngeal nerve)』走行於氣管食道溝、鄰近『下』甲狀腺動脈,受損致聲帶麻痺→聲音沙啞(單側)或呼吸困難喘鳴(雙側);②『上喉神經外側分支(external branch of superior laryngeal nerve)』鄰近『上』甲狀腺動脈,支配『環甲肌(cricothyroid)』,負責拉緊聲帶發『高音』,受損致『無法發高音/聲音易疲乏』──對歌唱者(女高音)影響大。本例女高音術後無法唱高音→『上喉神經外側分支』受損(鄰近上甲狀腺動脈),故D正確(截斷上甲狀腺動脈傷及上喉神經外側分支)。\\n\\n護理:甲狀腺術後評估聲音(沙啞→喉返神經;無法發高音→上喉神經外支)、呼吸道(雙側喉返神經損傷致喘鳴需緊急處置)、低血鈣(副甲狀腺受損)。", "options": {"A": "喉返神經鄰近『下』甲狀腺動脈,且其損傷為沙啞非無法發高音,部位敘述不符。", "B": "喉返神經損傷致聲帶麻痺/沙啞,非單純無法發高音。", "C": "上喉神經外支鄰近『上』甲狀腺動脈,非下甲狀腺動脈,部位錯。", "D": "正解:截斷上甲狀腺動脈傷及上喉神經外側分支→環甲肌麻痺、無法發高音。"}, "sources": ["Sabiston, Thyroidectomy nerve injuries", "Harrison 21e"]}}, "109-進階-其他-10": {"quick": "甲狀腺術後拔管即聲音沙啞+喘鳴→喉返神經受損(聲帶麻痺),故選A。", "detail": {"background": "甲狀腺手術最受關注的神經併發症是『喉返神經(recurrent laryngeal nerve)損傷』:支配大部分喉內肌與聲帶,『單側』受損致聲帶麻痺→聲音沙啞;『雙側』受損兩側聲帶內收致氣道狹窄→吸氣性喘鳴(stridor)、呼吸困難,為緊急狀況(可能需再插管/氣切)。本例拔管後『聲音沙啞且喘鳴』→喉返神經受損(A)。上喉神經損傷以發高音困難為主(無喘鳴)。處置:評估聲帶、必要時重新插管確保氣道。\\n\\n護理:甲狀腺術後密切觀察呼吸道(喘鳴/呼吸困難)、聲音、頸部腫脹出血(壓迫氣道)與低血鈣徵象,備緊急氣道器材。", "options": {"A": "正解:沙啞+喘鳴→喉返神經受損致聲帶麻痺。", "B": "喉上神經損傷以發高音困難為主,非喘鳴。", "C": "『喉下神經』即喉返神經之分支,標準答案以喉返神經(A)為對。", "D": "迷走神經為上游主幹,甲狀腺術損傷以其分支喉返神經為主。"}, "sources": ["Sabiston, Recurrent Laryngeal Nerve Injury", "Harrison 21e"]}}, "109-進階-外科-15": {"quick": "甲狀腺癌(腫大/胸骨後甲狀腺腫)壓迫氣管致上呼吸道阻塞→聽診聞及『喘鳴(stridor)』,故選C。", "detail": {"background": "大型甲狀腺腫或甲狀腺癌(尤其向胸骨後延伸substernal goiter或侵犯)可壓迫/侵犯氣管,造成上呼吸道阻塞,胸部X光可見氣管偏移/變窄、縱膈腫塊。上呼吸道(喉/氣管)阻塞的聽診特徵是『吸氣性喘鳴(stridor)』(C)──高調、來自大氣道的狹窄。對比:crackles(囉音)為肺泡/間質病變;mediastinal crunch(Hamman's sign)為縱膈氣腫;pleural friction rub為肋膜摩擦。本例甲狀腺癌呼吸窘迫+氣管壓迫→stridor。\\n\\n護理:評估上呼吸道阻塞(stridor、呼吸窘迫、不能平躺)、備氣道處置;甲狀腺腫壓迫氣管為手術指徵之一。", "options": {"A": "crackles為肺實質/間質病變,非大氣道阻塞。", "B": "Hamman's sign為縱膈氣腫的捻髮音,不符。", "C": "正解:氣管受壓的上呼吸道阻塞→吸氣性喘鳴(stridor)。", "D": "pleural friction rub為肋膜摩擦音,非氣道阻塞。"}, "sources": ["Harrison 21e, Goiter/Airway obstruction", "Bates' Guide, Stridor"]}}, "109-通論-其他-31": {"quick": "葛瑞夫茲病是甲狀腺『亢進』的原因,不是甲狀腺低下的原因,故選D。", "detail": {"background": "甲狀腺功能低下的原因:①『碘缺乏』(全球最常見);②自體免疫『橋本氏甲狀腺炎』(已開發地區最常見,anti-TPO陽性);③甲狀腺手術後/放射碘治療後/頸部放療後;④藥物(amiodarone、lithium、抗甲狀腺藥過量);⑤浸潤性疾病如『澱粉沉積症(amyloidosis)』、Riedel甲狀腺炎;⑥次發性(腦下垂體/下視丘TSH不足)。『葛瑞夫茲病(Graves)』是甲狀腺『亢進』最常見原因(TSH受體刺激抗體),『不是』甲狀腺低下的原因(D為答案;但Graves經治療/晚期可致甲低,題意指其本質為甲亢)。\\n\\n護理:依病因處理甲低(多為橋本氏);levothyroxine補充並追蹤TSH。", "options": {"A": "碘缺乏是甲狀腺低下原因,正確。", "B": "橋本氏甲狀腺炎是甲低最常見自體免疫原因,正確。", "C": "澱粉沉積症可浸潤甲狀腺致甲低,正確。", "D": "錯誤(正解):葛瑞夫茲病是甲狀腺亢進的原因,非甲低。"}, "sources": ["Harrison 21e, Hypothyroidism etiologies", "ATA Guidelines"]}}, "109-通論-其他-34": {"quick": "甲亢病人術中應持續用抗甲狀腺藥、碘劑與β阻斷劑控制,以防甲狀腺風暴,故選B。", "detail": {"background": "甲狀腺機能亢進病人手術(任何手術)的麻醉前評估與準備重點是『把甲狀腺功能控制到接近正常』以避免術中/術後『甲狀腺風暴』:①擇期手術應延後到甲狀腺功能正常(thionamide+β阻斷劑,必要時碘劑),『甲亢未控制(尤其心率快)不宜常規手術』(A錯);②圍術期『持續使用抗甲狀腺藥、β阻斷劑控制心率,術前可加碘劑(Lugol)抑制釋放』(B正確);③『緊急手術』前若甲亢未控,仍應『給β阻斷劑等快速降心率/控制症狀』並備類固醇,不可不處理(C錯);④麻醉方式選擇並非『全身一定優於區域』,重點在避免交感刺激與及早辨識風暴(D錯,無此一概而論)。本題B正確。\\n\\n護理:術前確認甲狀腺功能受控、持續β阻斷劑與抗甲狀腺藥;術中術後監測心律/體溫,警覺甲狀腺風暴。", "options": {"A": "錯誤:甲亢未控制(心率快)不宜進行常規手術,應先控制。", "B": "正解:術中持續抗甲狀腺藥、碘劑與β阻斷劑以控制甲亢。", "C": "錯誤:緊急手術前仍須給降心率/控制症狀藥物,不可不處理。", "D": "錯誤:並非全身麻醉一定優於區域麻醉,無此通則。"}, "sources": ["Harrison 21e, Hyperthyroidism perioperative management", "Miller's Anesthesia, Endocrine disease"]}}, "109-進階-內科-49": {"quick": "TSH被抑制(低)但free T4正常→需驗血清T3排除『T3-toxicosis』,故選A。", "detail": {"background": "甲狀腺功能判讀:TSH是最敏感初篩。本例TSH 0.05(低、被抑制)但free T4正常→不符典型甲亢(T4高),須懷疑『T3型甲狀腺毒症(T3-toxicosis)』──部分甲亢(尤其Graves早期或毒性結節)以T3升高為主而T4仍正常,故『下一步驗血清T3(或free T3)』(A)。若T3也正常則為『亞臨床甲亢(subclinical hyperthyroidism)』。本例有甲亢症狀(手抖、心搏快、甲狀腺腫)+TSH低,驗T3可確認。anti-TSHR抗體用於確認Graves病因(在確立甲亢後);超音波看結構;6–12週追蹤適用無症狀的輕度異常。本題以驗T3為最適當下一步。\\n\\n護理:TSH低+T4正常+有症狀→驗T3;確認甲亢後查病因(TRAb/攝碘掃描)並治療。", "options": {"A": "正解:TSH低、T4正常+症狀→驗T3排除T3-toxicosis。", "B": "anti-TSHR抗體用於確認Graves病因,應在確立甲亢後。", "C": "有明顯症狀者不宜只等6–12週追蹤而不驗T3。", "D": "超音波看結構,對功能性T3-toxicosis的診斷非首要。"}, "sources": ["Harrison 21e, T3 toxicosis", "ATA Hyperthyroidism Guidelines"]}}, "109-進階-內科-63": {"quick": "抗甲狀腺藥(methimazole/PTU)最嚴重副作用為『顆粒性白血球缺乏症(agranulocytosis)』,故選C。", "detail": {"background": "抗甲狀腺藥(thionamides:methimazole、propylthiouracil PTU)副作用:常見皮疹、搔癢、關節痛、腸胃不適;『最嚴重』為『顆粒性白血球缺乏症(agranulocytosis)』──免疫媒介的嗜中性球驟降,可致嚴重感染甚至致命,多在開始治療前3個月內發生,典型以『發燒、喉嚨痛』表現。另PTU可致『猛爆性肝衰竭』(故PTU多保留給孕早期/甲狀腺風暴/methimazole不耐者)。衛教:服藥期間若出現『發燒、喉嚨痛』應立即停藥並驗白血球(CBC)。\\n\\n護理:衛教agranulocytosis警訊(發燒/喉嚨痛即停藥就醫驗CBC);PTU注意肝毒性;不需常規定期驗白血球但有症狀即查。", "options": {"A": "皮疹搔癢為常見輕微副作用,非最嚴重。", "B": "關節疼痛為較輕副作用。", "C": "正解:顆粒性白血球缺乏症為最嚴重副作用(發燒喉嚨痛即停藥)。", "D": "抗甲狀腺藥過量可致甲低但通常可逆(減量即恢復),非『最嚴重不可逆』。"}, "sources": ["ATA Hyperthyroidism Guidelines (agranulocytosis)", "Harrison 21e, Antithyroid drugs"]}}, "110-進階-內科-50": {"quick": "突眼+脛前黏液水腫+TRAb(TBII)/anti-TPO陽性+瀰漫性甲狀腺腫+甲亢→葛瑞夫茲氏症,故選C。", "detail": {"background": "葛瑞夫茲氏症(Graves' disease)的診斷特徵齊全:①甲狀腺毒症生化(T3/T4升高、TSH被抑制);②『眼病(突眼exophthalmos)』與『脛前黏液水腫(pretibial myxedema)』為Graves特有的甲狀腺外自體免疫表現;③『TRAb/TBII(TSH受體抗體)陽性』為病因確認、anti-TPO常陽性;④『瀰漫性、非壓痛性甲狀腺腫』(可有bruit)。本例全部符合→Graves(C)。鑑別:毒性多結節性甲狀腺腫為結節性腫大、無突眼/TRAb;亞急性甲狀腺炎為痛性甲狀腺腫+病毒前驅+攝碘低;無痛性甲狀腺炎為一過性、攝碘低。\\n\\n護理:Graves以β阻斷劑緩解症狀、thionamide/放射碘/手術治療;眼病轉眼科;追蹤free T4/TRAb。", "options": {"A": "毒性多結節甲狀腺腫為結節性、無突眼與TRAb陽性,不符。", "B": "亞急性甲狀腺炎為痛性甲狀腺腫、攝碘低,不符。", "C": "正解:突眼+脛前黏液水腫+TRAb陽性+瀰漫腫→Graves。", "D": "無痛性甲狀腺炎為一過性甲亢、無突眼/TRAb,不符。"}, "sources": ["Harrison 21e, Graves' Disease", "ATA Hyperthyroidism Guidelines"]}}, "110-通論-其他-60": {"quick": "亞臨床甲狀腺低下的定義為『T4正常、TSH偏高』,故選B。", "detail": {"background": "『亞臨床甲狀腺低下(subclinical hypothyroidism)』指『TSH升高(偏高)但free T4仍在正常範圍』,病人常無症狀或症狀輕微(本例健檢偶然發現)。其相對的『亞臨床甲亢』為TSH低+T4正常。判讀邏輯:原發性甲狀腺問題TSH變化最敏感最早──甲狀腺素稍不足時,腦下垂體先以升高TSH代償維持T4正常,即亞臨床甲低。是否治療(levothyroxine)依TSH程度(常>10 mU/L)、症狀、抗體、年齡、懷孕計畫等決定。本題B(T4正常、TSH偏高)正確。\\n\\n護理:亞臨床甲低衛教追蹤TSH;TSH>10或有症狀/懷孕考慮治療;avoid過度治療(老年)。", "options": {"A": "T4正常、TSH偏低為亞臨床『甲亢』,不符。", "B": "正解:T4正常、TSH偏高為亞臨床甲狀腺低下。", "C": "T4與TSH皆正常為正常甲狀腺功能。", "D": "T4偏低+TSH低偏向次發性(中樞)甲低,非亞臨床原發性甲低。"}, "sources": ["ATA Subclinical Hypothyroidism Guidelines", "Harrison 21e"]}}, "110-通論-其他-64": {"quick": "原發性甲低(TSH 66高、free T4低)之黏液水腫因纖維母細胞產生過多黏多醣堆積,故選C。", "detail": {"background": "本例TSH顯著升高(66)、free T4極低→『原發性甲狀腺功能低下』(甲狀腺本身問題,TSH代償升高;若為次發性中樞問題TSH會低,故A『次發性』錯)。最常見原因為『自體免疫(橋本氏)甲狀腺炎』(故B『自體免疫罕見』錯)。黏液水腫(myxedema)機轉:甲狀腺素不足使真皮『纖維母細胞產生過多黏多醣(glycosaminoglycan/黏多醣類)』堆積、吸水→非壓陷性腫脹(臉、眼皮、脛前)(C正確)。治療levothyroxine,『年輕無心臟病者可用足量起始,老年/心臟病者低劑量起始漸增』,且levothyroxine劑量以『微克(μg)』計(常1.6 μg/kg/day,約100–125 μg),『200 mg』為錯誤單位/過量(應為μg)(D錯)。本題C正確。\\n\\n護理:原發性甲低以levothyroxine補充、依TSH調量;老年/心病低劑量起始;衛教空腹服用。", "options": {"A": "錯誤:TSH高+T4低為『原發性』甲低,非次發性。", "B": "錯誤:自體免疫(橋本氏)是甲低最常見原因,非罕見。", "C": "正解:纖維母細胞產生過多黏多醣堆積→黏液腫。", "D": "錯誤:levothyroxine劑量以μg計(非mg),且老年起始劑量不會高達『200 mg』。"}, "sources": ["Harrison 21e, Hypothyroidism/Myxedema", "ATA Hypothyroidism Guidelines"]}}, "111-進階-外科-78": {"quick": "遺傳性甲狀腺髓質癌(MTC)常經家族篩檢發現、會早期頸部淋巴轉移,故選C。", "detail": {"background": "甲狀腺髓質癌(MTC)源自分泌『抑鈣素(calcitonin)的「濾泡旁C細胞」』(非濾泡上皮細胞,故A錯)。分『偶發型(約75%)』與『遺傳型(約25%,MEN2A/2B或家族性,RET基因突變)』。①遺傳型『常經家族RET基因篩檢早期發現』,且MTC『傾向早期轉移至頸部淋巴結』(C正確);②偶發型多為單一結節,但MTC本質侵襲、常已有淋巴轉移,『質地較硬』(B『質地較軟、較少淋巴轉移』錯);③標準治療為『甲狀腺全切除『加頸部淋巴廓清』』(D只寫全切除不夠完整,且MTC放射碘無效);以calcitonin/CEA追蹤。遺傳型須評估並先處理共存的嗜鉻細胞瘤(MEN2)。本題C正確。\\n\\n護理:MTC驗calcitonin/CEA、RET基因與MEN2評估(先排除嗜鉻細胞瘤再手術)、家族篩檢。", "options": {"A": "錯誤:MTC源自濾泡『旁』C細胞(分泌calcitonin),非濾泡上皮。", "B": "錯誤:MTC常質地硬且早期淋巴轉移,非軟且少轉移。", "C": "正解:遺傳型MTC多由家族篩檢發現、會早期頸部淋巴轉移。", "D": "全切除為治療一環,但須加頸部淋巴廓清,敘述不完整(非最正確)。"}, "sources": ["ATA Medullary Thyroid Carcinoma Guidelines", "Harrison 21e, MEN2/MTC"]}}, "112-進階-內科-52": {"quick": "多結節性甲狀腺腫的惡性程度『並非』比單一結節高;此敘述錯誤,故選B。", "detail": {"background": "甲狀腺腫瘤要點:①乳頭狀癌(papillary)與濾泡上皮癌(follicular)屬惡性(A正確);②惡性風險評估:傳統上『單一(孤立)結節』的惡性疑慮不低於多結節,『多結節性甲狀腺腫並非比單個結節惡性程度更高』(故B『多結節惡性程度較高』錯誤,為答案);結節惡性危險因子為:實質性低回音、微鈣化、邊緣不規則、縱長>橫、頸部淋巴結異常、生長快、聲音沙啞、放射史、家族史;以超音波(TI-RADS)與細針抽吸(FNA)評估;③良性結節若功能性可用levothyroxine抑制試驗,6–12個月無效應停(C大致正確);④惡性臨床特徵為生長快、淋巴侵犯、聲音沙啞(D正確)。本題B錯誤。\\n\\n護理:甲狀腺結節以超音波+FNA評估惡性;衛教良性結節追蹤、惡性手術。", "options": {"A": "正確:乳頭狀癌與濾泡癌屬惡性。", "B": "錯誤(正解):多結節性甲狀腺腫惡性程度並非比單一結節高。", "C": "大致正確:良性結節可試levothyroxine抑制,無效應停。", "D": "正確:惡性特徵為生長快、淋巴侵犯、聲音沙啞。"}, "sources": ["ATA Thyroid Nodule Guidelines", "Harrison 21e, Thyroid Neoplasia"]}}, "113-進階-內科-55": {"quick": "抗甲狀腺過氧化酶抗體(anti-TPO)常見於橋本氏甲狀腺炎,故選C。", "detail": {"background": "甲狀腺檢查的臨床應用:①『TSH』是評估甲狀腺功能與篩檢的『最敏感』指標(初篩首選);②『free T4』評估;total T3主要用於甲『亢』(尤其T3-toxicosis),非用於甲『低』(故A錯);③評估Graves治療效果不宜只看TSH(治療後TSH恢復慢、可長期被抑制),應看『free T4』(故B『TSH是Graves治療效果主要指標』不適當);④『anti-TPO(抗甲狀腺過氧化酶抗體)』陽性是『橋本氏甲狀腺炎』(自體免疫甲低)的標記(C正確);anti-TSHR(TRAb)用於Graves;⑤『甲狀腺球蛋白(thyroglobulin)』用於『已分化甲狀腺癌(乳突/濾泡)術後追蹤復發』的腫瘤標記,『不是診斷甲狀腺癌的標準檢查』(診斷靠FNA)(D錯)。本題C正確。\\n\\n護理:TSH初篩、free T4評估、抗體分辨病因(anti-TPO橋本、TRAb Graves)、thyroglobulin追蹤分化型甲狀腺癌術後。", "options": {"A": "錯誤:total T3用於評估甲亢(T3-toxicosis),非甲低。", "B": "錯誤:Graves治療效果應看free T4(TSH恢復慢),非以TSH為主。", "C": "正解:anti-TPO常見於橋本氏甲狀腺炎。", "D": "錯誤:thyroglobulin用於分化型甲狀腺癌術後追蹤,非診斷標準。"}, "sources": ["Harrison 21e, Thyroid Function Tests", "ATA Guidelines"]}}, "113-通論-5分科-57": {"quick": "便秘屬甲狀腺『低下』;甲狀腺機能亢進為腸蠕動快(腹瀉/排便次數多),故『便秘』非甲亢症狀,選B。", "detail": {"background": "甲狀腺機能亢進(甲亢)因代謝率上升,常見症狀:體重減輕(食慾增但消耗大)、怕熱、皮膚溫濕『冒汗』、心悸/心搏過速、手抖、焦慮失眠、『排便次數增加/腹瀉(腸蠕動加快)』、月經減少、肌肉無力(近端)、Graves可有突眼/甲狀腺腫。『便秘』是甲狀腺『低下』(腸蠕動變慢)的表現,『不是』甲亢常見症狀(B為答案)。\\n\\n護理:依甲亢症狀評估,β阻斷劑緩解心悸手抖;與甲低(怕冷便秘體重增加)鑑別。", "options": {"A": "體重減輕是甲亢常見症狀。", "B": "正解(非甲亢):便秘屬甲狀腺低下,甲亢為腸蠕動加快。", "C": "心跳加速是甲亢常見症狀。", "D": "皮膚冒汗(怕熱)是甲亢常見症狀。"}, "sources": ["Harrison 21e, Thyrotoxicosis symptoms", "ATA Guidelines"]}}, "114-進階-外科-24": {"quick": "甲狀腺風暴若常規治療12–24小時無改善,可考慮甲狀腺切除術,故選C。", "detail": {"background": "甲狀腺風暴(thyroid storm)為臨床急症,『診斷以「臨床表現」(Burch-Wartofsky評分:高燒、心搏過速/心衰、中樞神經異常、腸胃肝功能異常)為主,非僅靠T4/TSH數值』(故A錯,激素高低與風暴嚴重度不一定相關)。治療順序與機轉:①β阻斷劑(propranolol)控制心率與周邊T4→T3轉換;②『thionamide(PTU優先)』抑制『新合成』(注意:thionamide抑制「合成」而非直接抑制腺體「釋放」,故B『直接抑制釋放T4/T3』錯──抑制釋放的是『碘劑』);③給thionamide『1小時後』再給『碘劑(Lugol/SSKI)』抑制釋放(太早給碘會成為合成原料);④類固醇(hydrocortisone)抑制轉換並補腎上腺;⑤降溫(避aspirin,會增游離T4)、治誘因。『急性期不可用放射碘』(放射碘為慢性根治、且會先一過性惡化)(故D錯)。若上述常規治療12–24小時無效,可考慮『血漿置換或甲狀腺切除』(C正確)。本題C正確。\\n\\n護理:加護監測、依序給藥(β阻斷劑+PTU,1小時後碘劑+類固醇)、降溫治誘因;頑固者評估手術/血漿置換。", "options": {"A": "錯誤:甲狀腺風暴以臨床診斷(Burch-Wartofsky),非僅靠T4/TSH數值。", "B": "錯誤:thionamide抑制『合成』;抑制『釋放』的是碘劑。", "C": "正解:常規治療12–24小時無改善可考慮甲狀腺切除。", "D": "錯誤:急性期不可用放射碘(屬慢性治療且會一過性惡化)。"}, "sources": ["ATA Hyperthyroidism Guidelines (thyroid storm)", "Harrison 21e"]}}, "114-進階-內科-49": {"quick": "甲狀腺毒症治療並非一律『切除甲狀腺』(多以藥物/放射碘),故『治療方式為切除甲狀腺』錯誤,選D。", "detail": {"background": "甲狀腺毒症(thyrotoxicosis):①最常見病因為『Graves病』(B正確),Graves為原發性甲亢→『TSH過低、free T4過高』(A正確);②甲狀腺可瀰漫腫大至原本2–3倍(C正確);③治療有三大選項:『抗甲狀腺藥(thionamide)、放射碘(I-131)、手術』,並以β阻斷劑緩解症狀──『並非一律切除甲狀腺』(手術僅用於甲狀腺很大壓迫、合併疑惡性結節、藥物/放射碘不適用、孕婦特定情況等),故D『治療方式為切除甲狀腺』錯誤(為答案)。亞急性甲狀腺炎等破壞性甲狀腺毒症則為自限、不用抗甲狀腺藥。\\n\\n護理:依病因與病人選擇治療(藥物/放射碘/手術),β阻斷劑緩解症狀;衛教各治療優缺與追蹤。", "options": {"A": "正確:Graves為原發性甲亢→TSH低、free T4高。", "B": "正確:甲狀腺毒症常見病因為Graves病。", "C": "正確:甲狀腺可增大至原本2–3倍。", "D": "錯誤(正解):治療並非一律切除甲狀腺,多以藥物或放射碘。"}, "sources": ["ATA Hyperthyroidism Guidelines", "Harrison 21e, Thyrotoxicosis"]}}, "105-TNPA-內科-47": {"quick": "住院感染、空腹血糖285、Cr 2.0(腎功能差)→停metformin(乳酸中毒風險)與磺醯尿素(低血糖),改基礎(Lantus)+餐前RI,故選C。", "detail": {"background": "住院、急性感染、高血糖且『腎功能不全(Cr 2.0)』的糖尿病人血糖處置原則:①『停口服藥』──metformin於腎功能不全/急性病/缺氧時有乳酸中毒風險須停;磺醯尿素(Amaryl/glimepiride)在進食不穩、腎功能差時易致低血糖須停;TZD(pioglitazone)起效慢、會水腫不適合急性期。②改用『胰島素』,且住院控糖建議『基礎-餐時-校正(basal-bolus)』方案──基礎胰島素(Lantus/glargine)+每餐前速效/短效(RI),較能平穩控糖。③不建議單用『sliding scale(僅依血糖高低補打,無基礎)』──反應慢、血糖起伏大、非建議方式。故C(停口服藥,Lantus+餐前RI)最恰當。\\n\\n護理:急性病/腎功能差停metformin與磺醯尿素;住院改basal-bolus胰島素、監測血糖、治療感染。", "options": {"A": "只加基礎胰島素未停易低血糖的磺醯尿素與有乳酸中毒風險的metformin,不夠恰當。", "B": "加pioglitazone(起效慢、水腫)不適合急性高血糖/感染,且未停口服藥。", "C": "正解:停metformin與Amaryl,改basal(Lantus)+餐前RI(basal-bolus)。", "D": "單用RI sliding scale無基礎胰島素,控糖不穩,非建議方式。"}, "sources": ["ADA Standards of Care (Inpatient glycemic management)", "Harrison 21e, Diabetes inpatient management"]}}, "108a-TNPA-內科-46": {"quick": "住院感染、空腹血糖285、Cr 2.0(腎功能差)→停metformin(乳酸中毒風險)與磺醯尿素(低血糖),改基礎(Lantus)+餐前RI,故選C。", "detail": {"background": "住院、急性感染、高血糖且『腎功能不全(Cr 2.0)』的糖尿病人血糖處置原則:①『停口服藥』──metformin於腎功能不全/急性病/缺氧時有乳酸中毒風險須停;磺醯尿素(Amaryl/glimepiride)在進食不穩、腎功能差時易致低血糖須停;TZD(pioglitazone)起效慢、會水腫不適合急性期。②改用『胰島素』,且住院控糖建議『基礎-餐時-校正(basal-bolus)』方案──基礎胰島素(Lantus/glargine)+每餐前速效/短效(RI),較能平穩控糖。③不建議單用『sliding scale(僅依血糖高低補打,無基礎)』──反應慢、血糖起伏大、非建議方式。故C(停口服藥,Lantus+餐前RI)最恰當。\\n\\n護理:急性病/腎功能差停metformin與磺醯尿素;住院改basal-bolus胰島素、監測血糖、治療感染。", "options": {"A": "只加基礎胰島素未停易低血糖的磺醯尿素與有乳酸中毒風險的metformin,不夠恰當。", "B": "加pioglitazone(起效慢、水腫)不適合急性高血糖/感染,且未停口服藥。", "C": "正解:停metformin與Amaryl,改basal(Lantus)+餐前RI(basal-bolus)。", "D": "單用RI sliding scale無基礎胰島素,控糖不穩,非建議方式。"}, "sources": ["ADA Standards of Care (Inpatient glycemic management)", "Harrison 21e, Diabetes inpatient management"]}}, "105-TNPA-通論-70": {"quick": "1800大卡飲食中脂肪應佔約25–30%,上限約540大卡(30%),故選C。", "detail": {"background": "糖尿病/均衡飲食的三大營養素熱量分配建議:碳水化合物約50–60%、蛋白質約15–20%、『脂肪約「不超過30%」(飽和脂肪<7–10%)』。本題每日1800大卡,脂肪上限=1800×30%=『540大卡』(C)。換算脂肪克數:540/9(每克脂肪9大卡)=60克。糖尿病飲食重點:定時定量、控制總熱量與碳水(醣類計算)、選複合性碳水與高纖、限飽和/反式脂肪、適量優質蛋白。\\n\\n護理:衛教飲食代換/醣類計算、脂肪<30%、規律進餐配合藥物,監測血糖與體重。", "options": {"A": "360大卡(20%)低於脂肪上限,非『不能多於』的上限值。", "B": "480大卡非標準上限。", "C": "正解:脂肪上限約30%→1800×30%=540大卡。", "D": "900大卡(50%)過高,超過建議。"}, "sources": ["ADA Nutrition Therapy", "國健署 糖尿病飲食"]}}, "105-TNPA-內科-71": {"quick": "補充『基礎胰島素』需用長效製劑;insulin detemir為長效基礎胰島素,故選C。", "detail": {"background": "胰島素依作用時間分:①『速效(rapid):aspart、lispro、glulisine』──餐時控制飯後血糖,起效快(10–15分)、持續短;②『短效(regular/RI)』──餐前30分鐘給;③『中效(NPH)』;④『長效/基礎(basal):glargine(Lantus)、detemir(Levemir)、degludec』──作用平穩約24小時,補充『基礎胰島素』維持空腹/餐間血糖。本題『補充基礎胰島素不足、改善空腹血糖』→需長效基礎胰島素『insulin detemir(C)』。aspart、lispro為速效(餐時)、regular為短效,皆非基礎。\\n\\n護理:basal胰島素睡前固定時間注射、輪換部位、監測空腹血糖調量、衛教低血糖處理。", "options": {"A": "regular insulin為短效(餐時),非基礎胰島素。", "B": "insulin aspart為速效(餐時),非基礎。", "C": "正解:insulin detemir為長效基礎胰島素,補充基礎之不足。", "D": "insulin lispro為速效(餐時),非基礎。"}, "sources": ["ADA Standards of Care (insulin)", "Harrison 21e, Insulin preparations"]}}, "105-TNPA-內科-76": {"quick": "重症血糖不宜過度嚴格控制在110以內(NICE-SUGAR顯示增加低血糖與死亡),目標約140–180,故A不正確。", "detail": {"background": "重症(ICU)病人血糖控制:①過去主張嚴格控制(<110)的研究後被『NICE-SUGAR』推翻──嚴格控制(目標81–108)組『嚴重低血糖與死亡率增加』,故『不應控制在110以內』(A不正確,為答案);②現建議重症血糖目標約『140–180 mg/dL』,以靜脈胰島素輸注並頻繁監測;③『血糖變異度大』也與不良預後相關(B正確);④『壓力性高血糖』可發生於無糖尿病者(重症應激致胰島素阻抗),與是否有糖尿病無絕對關聯(C正確);⑤胰島素輸注/幫浦初期需『每1–2小時監測血糖』調整(D正確)。本題A不正確。\\n\\n護理:重症目標140–180、避免低血糖、靜脈胰島素並頻繁監測血糖。", "options": {"A": "不正確(正解):重症血糖不宜<110(NICE-SUGAR示增加低血糖死亡),目標140–180。", "B": "正確:血糖變異度影響預後。", "C": "正確:壓力性高血糖與有無糖尿病無絕對關聯。", "D": "正確:胰島素輸注初期每1–2小時監測血糖。"}, "sources": ["NICE-SUGAR Trial", "ADA Inpatient/Critical care glycemic targets"]}}, "106-106a-內科-39": {"quick": "GLP-1受體促效劑(如Dulaglutide)會抑制食慾、延緩胃排空→『減重』,最不可能引起體重增加,故選D。", "detail": {"background": "降血糖藥對體重的影響:①『增加體重』:胰島素、磺醯尿素(刺激胰島素分泌)、TZD(pioglitazone,水鈉滯留/脂肪增加);②『體重中性』:metformin(略降/中性)、DPP-4抑制劑、acarbose;③『減重』:『GLP-1受體促效劑(liraglutide、dulaglutide、semaglutide)』(抑制食慾、延緩胃排空、中樞飽足)與『SGLT-2抑制劑(尿糖排出熱量)』。本題問『最不可能引起體重增加』→GLP-1 RA(D)(反而減重)。GLP-1 RA也有心血管與腎臟保護益處。\\n\\n護理:肥胖第二型糖尿病優先選減重藥(GLP-1 RA/SGLT-2i);衛教GLP-1腸胃副作用(噁心)、SGLT-2i泌尿生殖感染與脫水。", "options": {"A": "胰島素會增加體重。", "B": "磺醯尿素刺激胰島素分泌、增加體重。", "C": "TZD(pioglitazone)會水鈉滯留增加體重。", "D": "正解:GLP-1受體促效劑減重,最不可能增加體重。"}, "sources": ["ADA Standards of Care (pharmacology)", "Harrison 21e, Diabetes drugs"]}}, "106-106a-內科-40": {"quick": "第二型糖尿病為胰島素阻抗+肝糖過度製造+游離脂肪酸增加;『昇糖激素分泌不足』非其機轉(反而glucagon相對過多),故選C。", "detail": {"background": "第二型糖尿病(T2DM)的致病機轉(『ominous octet』):①『胰島素阻抗』(肌肉葡萄糖攝取下降);②『肝臟葡萄糖過度製造(肝糖輸出增加)』;③β細胞功能漸衰、胰島素分泌不足;④脂肪組織分解增加→『游離脂肪酸(FFA)過多』加重阻抗;⑤『α細胞昇糖素(glucagon)相對「過多」』而非不足;⑥腸泌素(incretin)效應下降;⑦腎臟葡萄糖再吸收增加;⑧中樞食慾調節異常。故『昇糖激素分泌「不足」』『不是』T2DM機轉(反而是glucagon過多)(C為答案)。\\n\\n護理:T2DM治療針對阻抗(metformin/TZD)、分泌(磺醯尿素/DPP-4/GLP-1)、腎排糖(SGLT-2i)等多機轉;生活型態為基礎。", "options": {"A": "肝糖製造過多是T2DM機轉之一。", "B": "游離脂肪酸過多加重胰島素阻抗,屬機轉。", "C": "正解(非機轉):T2DM為glucagon相對『過多』,非昇糖激素分泌不足。", "D": "胰島素阻抗是T2DM核心機轉。"}, "sources": ["Harrison 21e, Pathophysiology of T2DM (ominous octet)", "ADA"]}}, "106-106a-通論-46": {"quick": "糖尿病診斷的HbA1c標準為『≥6.5%』,非7%,故B(HbA1c 7%)的敘述錯誤。", "detail": {"background": "ADA糖尿病診斷標準(任一,無症狀者需另日複驗確認):①空腹血漿血糖(禁食≥8小時)『≥126 mg/dL』;②75克OGTT 2小時血糖『≥200 mg/dL』;③『HbA1c ≥6.5%』;④典型高血糖症狀/高血糖危象+隨機血糖『≥200 mg/dL』。本題B寫『HbA1c 7%』作為診斷標準是錯誤的(診斷切點是『≥6.5%』,7%是常見的『控制目標』而非診斷切點)(B為答案)。前期糖尿病:空腹100–125(IFG)、OGTT 140–199(IGT)、HbA1c 5.7–6.4%。\\n\\n護理:衛教診斷切點(空腹126、OGTT 200、A1c 6.5、隨機200+症狀);無症狀者需複驗確認。", "options": {"A": "正確:空腹血糖≥126為診斷標準。", "B": "錯誤(正解):診斷HbA1c切點為≥6.5%,非7%。", "C": "正確:症狀+隨機血糖≥200為診斷標準。", "D": "正確:OGTT 2小時≥200為診斷標準。"}, "sources": ["ADA Standards of Care (Diagnosis)", "Harrison 21e"]}}, "106-106a-通論-62": {"quick": "提高診斷切點(160>120)會使特異性上升、敏感性下降、偽陽性減少、偽陰性增加;故B(方法B特異性較高)正確。", "detail": {"background": "診斷檢驗的『切點(cut-off)』與敏感性/特異性的取捨:①提高切點(本題方法B以血糖>160 vs 方法A >120)→『更難被判為陽性』→『特異性(specificity)上升、偽陽性減少』(B正確);但『敏感性下降、偽陰性增加』(會漏掉較多真病人)。②降低切點則相反(敏感性高、偽陽性多)。故方法B:特異性>方法A(B對);敏感性<方法A(A錯);偽陽性<方法A(C錯,B偽陽性較少);偽陰性>方法A(D錯,B偽陰性較多)。記憶:SnNout(高敏感陰性可排除)、SpPin(高特異陽性可確診);提高切點偏向特異。\\n\\n護理:理解篩檢(高敏感)與確診(高特異)的切點選擇;糖尿病篩檢用敏感方法,陽性再確診。", "options": {"A": "錯誤:方法B切點高,敏感性『低』於方法A。", "B": "正解:方法B切點高,特異性高於方法A。", "C": "錯誤:方法B偽陽性『較少』(特異性高)。", "D": "錯誤:方法B偽陰性『較多』(敏感性低)。"}, "sources": ["流行病學:Sensitivity/Specificity與cut-off", "ADA Screening"]}}, "106-106a-通論-76": {"quick": "新診斷、感染中、血糖控制需求高的住院病人不宜貿然把胰島素改回口服藥,故A最不適當。", "detail": {"background": "本例63歲、一個月前因肺炎住院初診糖尿病、以胰島素控制良好,今因『低血糖且高燒』再入院。處置:①找並治療感染(高燒)──開立血液/痰/尿檢驗(D適當);②評估低血糖原因──檢視近日飲食運動(C適當)、確認胰島素注射技術正確(B『請病人示範注射流程』適當,排除技術/劑量錯誤);③『最不適當』是『此時把胰島素改回口服藥』(A)──急性感染、血糖需求變動、低血糖事件待釐清之際,胰島素較易調整安全,不應貿然改口服(口服藥起效慢、低血糖風險、感染期不穩);出院穩定後再評估是否轉口服。本題A最不適當。\\n\\n護理:急性病期維持胰島素並查低血糖原因(技術/飲食/感染);穩定後再考慮調整方案。", "options": {"A": "最不適當(正解):急性感染/低血糖未明時不宜貿然把胰島素改回口服藥。", "B": "適當:請病人示範注射流程以排除技術/劑量問題。", "C": "適當:評估近日飲食運動找低血糖原因。", "D": "適當:查血/痰/尿排除感染(高燒)。"}, "sources": ["ADA Inpatient glycemic management", "Harrison 21e"]}}, "107-TNPA-通論-50": {"quick": "胰島C(PP)細胞分泌胰多肽,『calcitonin』來自甲狀腺C細胞(非胰臟);故配對錯誤者為C。", "detail": {"background": "胰島(Langerhans島)的內分泌細胞與分泌物:①α(A)細胞→『升糖素(glucagon)』;②β(B)細胞→『胰島素(insulin)』與C-peptide;③δ(D)細胞→『體抑素(somatostatin)』;④PP(F/「C」)細胞→『胰多肽(pancreatic polypeptide)』。本題C把『C細胞配calcitonin』是錯的──『抑鈣素(calcitonin)是「甲狀腺」濾泡旁C細胞分泌』,並非胰臟;胰島的相應細胞分泌胰多肽。故C為配對錯誤(答案)。\\n\\n護理:理解胰島細胞與血糖調節(insulin降糖、glucagon升糖、somatostatin抑制);與甲狀腺C細胞(calcitonin)區分。", "options": {"A": "正確:A細胞分泌glucagon。", "B": "正確:B細胞分泌insulin。", "C": "錯誤(正解):calcitonin來自甲狀腺C細胞,非胰臟;胰島相應細胞分泌胰多肽。", "D": "正確:D細胞分泌somatostatin。"}, "sources": ["Harrison 21e, Pancreatic islet physiology", "Williams Endocrinology"]}}, "107-TNPA-內科-52": {"quick": "pioglitazone(TZD)副作用為水腫/心衰、體重增加、骨折(女性);『慢性腎臟衰竭』非其典型副作用,故選A。", "detail": {"background": "Thiazolidinedione(TZD,pioglitazone)為PPAR-γ促效劑、改善胰島素阻抗。副作用:①『水鈉滯留→水腫、加重/誘發鬱血性心衰竭』(NYHA III-IV禁用)(D屬之);②『體重增加』(C屬之);③『骨折』風險增加(尤其停經女性)(B屬之);④膀胱癌疑慮(長期高劑量);⑤肝功能監測。『慢性腎臟衰竭』『不是』pioglitazone的典型副作用(且TZD在腎功能不全時相對可用,不經腎排,但水腫需注意)(A為答案,不包括)。\\n\\n護理:用TZD監測水腫/體重/心衰徵象、跌倒骨折風險;心衰者避免。", "options": {"A": "正解(不包括):慢性腎臟衰竭非pioglitazone典型副作用。", "B": "骨折是TZD副作用(尤其女性)。", "C": "體重增加是TZD副作用。", "D": "鬱血性心衰竭(水鈉滯留)是TZD副作用。"}, "sources": ["Harrison 21e, TZD adverse effects", "ADA"]}}, "107-TNPA-內科-56": {"quick": "metformin為體重中性/略降,『病人體重常增加』最不可能,故選A。", "detail": {"background": "Metformin(雙胍類)為第二型糖尿病『第一線』藥,機轉為抑制肝糖輸出、改善胰島素敏感。特點:①『不增加體重(中性或略降)』,故『體重常增加』最不可能(A為答案);②腸胃副作用常見(腹瀉、噁心、金屬味)→建議隨餐、緩釋劑型(B正確);③『腎功能不全(eGFR<30禁用,30–45謹慎)』、缺氧/顯影劑/急性病時須停──避免『乳酸中毒(lactic acidosis)』(罕見但致命)(C、D正確);④長期可致維生素B12缺乏。本題A最不可能。\\n\\n護理:metformin隨餐減腸胃不適、腎功能監測、顯影劑/手術前後暫停、長期監測B12。", "options": {"A": "正解(最不可能):metformin為體重中性/略降,不常增加體重。", "B": "正確:可能腹瀉、噁心(腸胃副作用)。", "C": "正確:腎功能差不建議使用。", "D": "正確:可能造成乳酸中毒(罕見)。"}, "sources": ["ADA Standards of Care (metformin)", "Harrison 21e"]}}, "108a-TNPA-通論-20": {"quick": "口服長效降血糖藥病人圍術期不一定『需』改短效胰島素;小手術停藥即可,故A『需改短效胰島素』最不適當。", "detail": {"background": "糖尿病人手術期(圍術期)血糖處置:①『小型/一般手術、血糖控制良好』者,通常『手術當天早上停口服降血糖藥』即可,不一定需要改打胰島素(故A『需改為短效胰島素注射』作為通則『最不適當』);②『metformin』因顯影劑/缺氧/乳酸中毒考量,常建議『前一天晚上或當天停』(D合理);③能恢復進食時即恢復口服藥(B合理);④大手術、控制不佳、長時間禁食或重症者才需改『胰島素(基礎±輸注)』控制。本題A最不適當(非一律改短效胰島素)。\\n\\n護理:圍術期依手術大小與控制狀況決定;小手術停藥、metformin提前停、監測血糖,必要時才用胰島素。", "options": {"A": "最不適當(正解):非一律需改短效胰島素;小手術停藥即可。", "B": "適當:能進食時恢復口服藥。", "C": "適當:一般手術當天早上停藥。", "D": "適當:服metformin者前一天晚上停藥。"}, "sources": ["ADA/Perioperative glycemic management", "Harrison 21e"]}}, "108a-TNPA-內科-54": {"quick": "最易造成乳酸中毒的口服降血糖藥是『metformin(雙胍類)』,故選A。", "detail": {"background": "『乳酸中毒(lactic acidosis)』是『雙胍類metformin』罕見但致命的副作用──metformin抑制肝臟糖質新生時也抑制乳酸代謝,於腎功能不全、缺氧(心肺衰竭、敗血、休克)、肝病、酗酒、顯影劑後等乳酸堆積情況下風險升高。故須在這些情況『停用metformin』。其他口服藥(repaglinide、磺醯尿素sulfonylureas、TZD)無此風險(磺醯尿素主要風險是低血糖)。本題A(metformin)。\\n\\n護理:metformin於腎功能不全/缺氧/顯影劑/重症時停用;衛教乳酸中毒徵兆(肌痛、倦怠、呼吸快、腹痛)。", "options": {"A": "正解:metformin(雙胍類)最易造成乳酸中毒。", "B": "repaglinide(美格替耐)主要風險為低血糖,非乳酸中毒。", "C": "磺醯尿素主要風險為低血糖。", "D": "TZD主要副作用為水腫/體重增加/骨折,非乳酸中毒。"}, "sources": ["Harrison 21e, Metformin and lactic acidosis", "ADA"]}}, "108a-TNPA-內科-57": {"quick": "SGLT-2抑制劑使尿糖排出(熱量流失)→較不會增加體重(反而減重),故選D。", "detail": {"background": "降血糖藥體重影響:增加體重者為胰島素、磺醯尿素、TZD;『體重中性/減重』者為metformin、DPP-4i、GLP-1 RA(減重)、『SGLT-2抑制劑(SGLT-2i)』。SGLT-2i(dapagliflozin、empagliflozin)抑制腎近端小管葡萄糖再吸收,使『尿糖排出』帶走熱量→『減重』,並降血壓、有心衰與腎臟保護益處。故『較不會體重上升』選SGLT-2i(D)。題目選項B寫『PPAR-γ抑制劑』其實TZD是PPAR-γ『促效劑』且會增重;胰島素、磺醯尿素皆增重。\\n\\n護理:SGLT-2i衛教泌尿生殖道感染、脫水/姿勢性低血壓、酮酸(尤其禁食/手術前暫停)、足部照護。", "options": {"A": "胰島素會增加體重。", "B": "TZD(PPAR-γ促效劑)會增加體重。", "C": "磺醯尿素會增加體重。", "D": "正解:SGLT-2抑制劑使尿糖排出、減重,較不會增加體重。"}, "sources": ["ADA Standards of Care (SGLT-2i)", "Harrison 21e"]}}, "108b-TNPA-內科-68": {"quick": "單用sliding scale控糖反應慢、血糖起伏大,並非『簡單有效』的好方法;故A錯誤。", "detail": {"background": "住院血糖控制:①『單用sliding scale(僅依當下血糖補打速效胰島素、無基礎)』『不被建議』──它是『被動、追著高血糖跑』,造成血糖大幅起伏,並非『簡單有效』(故A錯誤,為答案);②建議『基礎-餐時-校正(basal-bolus + correction)』方案(B正確);③NICE-SUGAR:ICU過度嚴格控制(目標~81–108,平均控到較低)組死亡率較高,故『118組比144組死亡率高』(C正確,支持較寬鬆目標140–180);④重症建議『靜脈胰島素輸注(IV insulin infusion)』(D正確)。本題A錯誤。\\n\\n護理:住院用basal-bolus、重症用IV輸注、目標140–180、避免單用sliding scale。", "options": {"A": "錯誤(正解):單用sliding scale血糖起伏大,非簡單有效的好方法。", "B": "正確:basal-bolus(基礎-餐時-校正)為住院建議策略。", "C": "正確:NICE-SUGAR示過嚴控制(較低目標)死亡率較高。", "D": "正確:重症建議靜脈胰島素輸注。"}, "sources": ["NICE-SUGAR Trial", "ADA Inpatient glycemic management"]}}, "109-進階-內科-26": {"quick": "糖尿病篩檢應用空腹血糖、HbA1c或OGTT;『隨機血糖』無症狀者較不建議作為篩檢,故選B。", "detail": {"background": "糖尿病『篩檢/診斷』(無高血糖症狀的高風險者)建議用標準化、可重複的方法:①『空腹血漿血糖(FPG)』;②『HbA1c』(不需禁食、不受當下波動);③『75克OGTT』(較敏感但較繁複)。『隨機血糖(random glucose)』『不建議』作為無症狀者的篩檢工具──因受進食影響、缺乏標準化切點(隨機血糖僅在『有典型高血糖症狀』時≥200才用於診斷)。故B(隨機血糖)較不建議。本題B。\\n\\n護理:高風險者(肥胖、家族史、妊娠糖尿病史、高血壓/血脂異常)以FPG/A1c/OGTT定期篩檢。", "options": {"A": "空腹血糖是建議的篩檢方法。", "B": "正解(較不建議):隨機血糖無症狀者不適合作為篩檢。", "C": "糖化血色素是建議的篩檢方法。", "D": "葡萄糖耐受試驗是建議的篩檢方法。"}, "sources": ["ADA Standards of Care (Screening)", "Harrison 21e"]}}, "109-進階-內科-62": {"quick": "GLP-1受體促效劑(liraglutide)單用『不易』造成低血糖(葡萄糖依賴性);說它容易低血糖錯誤,故選C。", "detail": {"background": "口服/注射降血糖藥的低血糖風險:①『磺醯尿素、胰島素』──低血糖風險高;②『metformin、DPP-4i、GLP-1 RA、SGLT-2i、TZD、acarbose』──單用『低血糖風險低』(因作用為『葡萄糖依賴性』或不直接促胰島素分泌)。本題:A『TZD(pioglitazone)心衰者較不適宜』正確(水腫);B『DPP-4i(linagliptin)不增體重』正確;C『GLP-1 RA(liraglutide)容易造成低血糖』『錯誤』──GLP-1 RA促胰島素分泌是『葡萄糖依賴性』(血糖高才作用),單用不易低血糖(C為答案);D『metformin比磺醯尿素較不會低血糖』正確。本題C最不恰當。\\n\\n護理:衛教GLP-1 RA單用低血糖風險低(但與磺醯尿素/胰島素併用會增);GLP-1腸胃副作用。", "options": {"A": "正確:TZD於心衰病人較不適宜(水腫)。", "B": "正確:DPP-4i不引起體重增加。", "C": "錯誤(正解):GLP-1 RA為葡萄糖依賴性,單用不易造成低血糖。", "D": "正確:metformin比磺醯尿素較不會低血糖。"}, "sources": ["ADA Standards of Care", "Harrison 21e, Incretin-based therapy"]}}, "109-進階-內科-64": {"quick": "metformin副作用為乳酸中毒、B12缺乏、腸胃不適;『急性胰臟炎』非metformin典型副作用(那是GLP-1/DPP-4),故選D。", "detail": {"background": "metformin副作用:①腸胃不適(腹瀉、噁心、金屬味)最常見;②長期『維生素B12缺乏』(影響迴腸吸收);③罕見但致命的『乳酸中毒』(腎功能不全/缺氧時)。『急性胰臟炎』『不是』metformin的副作用──與『腸泌素類(GLP-1 RA、DPP-4i)』較相關(雖整體風險低)。故D(急性胰臟炎)最不恰當(非metformin副作用)。\\n\\n護理:metformin監測腎功能與B12、隨餐減腸胃不適、缺氧/顯影劑時停;胰臟炎風險衛教用於腸泌素類。", "options": {"A": "乳酸中毒是metformin罕見但重要副作用。", "B": "維生素B12缺乏是metformin長期副作用。", "C": "腸胃道不適是metformin常見副作用。", "D": "正解(非metformin副作用):急性胰臟炎與腸泌素類較相關,非metformin。"}, "sources": ["Harrison 21e, Metformin adverse effects", "ADA"]}}, "109-通論-其他-67": {"quick": "糖尿病共病危險因子管理含高血壓、高血脂、戒菸減重;『高胰島素血症』非『需處理的危險因子』敘述,故選D。", "detail": {"background": "糖尿病照護(全人照護)除血糖外,須『妥善處理共存的心血管危險因子』以降低大血管併發症:①『高血壓』(控制血壓,目標常<130/80);②『高血脂』(他汀類降LDL);③『吸菸、肥胖』(戒菸、減重、運動)。這些是明確需介入的危險因子(A、B、C正確)。而『高胰島素血症(hyperinsulinemia)』是胰島素阻抗的『生理現象/標記』,並非照護網中『列為要處理的危險因子項目』(D為答案,敘述不恰當)。糖尿病ABC目標:A1c、Blood pressure、Cholesterol。\\n\\n護理:糖尿病全人照護同時管理血壓、血脂、戒菸、減重與血糖;定期篩併發症。", "options": {"A": "高血壓是需處理的危險因子。", "B": "高血脂症是需處理的危險因子。", "C": "吸菸、肥胖是需處理的危險因子。", "D": "正解:高胰島素血症為阻抗標記,非照護網列為處理的危險因子項目。"}, "sources": ["ADA Standards of Care (CV risk)", "國健署 糖尿病照護網"]}}, "109-通論-其他-80": {"quick": "重症/圍術期血糖建議維持在『140–180 mg/dL』,故選C。", "detail": {"background": "重症與圍術期血糖目標(ADA/NICE-SUGAR後):一般重症與住院病人建議『140–180 mg/dL』,避免過嚴(<110)造成低血糖增加死亡(NICE-SUGAR)、也避免過高(>200)增加感染與不良預後。以靜脈胰島素輸注並頻繁監測。故圍術期重症血糖維持140–180(C)。\\n\\n護理:重症/圍術期目標140–180、靜脈胰島素、頻繁監測、避免低血糖。", "options": {"A": "60–100過低,易低血糖,不建議。", "B": "80–120偏嚴,NICE-SUGAR示增加低血糖死亡。", "C": "正解:140–180為重症/圍術期建議血糖範圍。", "D": "200–240過高,增加感染與不良預後。"}, "sources": ["ADA Inpatient glycemic targets", "NICE-SUGAR"]}}, "110-通論-其他-26": {"quick": "運動衛教不應限制心跳<100(過度限制反不足以達訓練效益);故A較不合適。", "detail": {"background": "糖尿病前期/糖尿病的運動治療:①有氧運動(快走、慢跑)改善心肺與身體組成、降血糖(C適當);②阻力/重量訓練增肌、改善胰島素敏感與血糖(B適當);③運動強度應達『中等強度』(達最大心率約50–70%或可對話但略喘),『不應把心跳限制在<100次/分以免心臟負擔』──這對多數人過度保守、達不到訓練效益(故A『心跳勿超過100』較不合適,為答案);除非有特定心臟疾病才個別限制。④對HbA1c 6.7(前期)以生活型態介入屬『次級預防(早期發現早期治療/避免進展)』,大致合理。本題A較不合適。\\n\\n護理:衛教中等強度有氧+阻力運動、每週150分鐘;有心臟病/併發症者個別評估;注意運動相關低血糖。", "options": {"A": "較不合適(正解):不應一律限制心跳<100,過度保守達不到運動效益。", "B": "適當:重量訓練增肌、助血糖控制。", "C": "適當:快走慢跑等有氧改善心肺與身體組成。", "D": "大致適當:前期介入屬次級預防/健康促進。"}, "sources": ["ADA Physical Activity", "Harrison 21e"]}}, "110-進階-內科-49": {"quick": "與體重增加相關性最高的降血糖藥為TZD(pioglitazone);故選C。", "detail": {"background": "降血糖藥體重影響:增重者『胰島素、磺醯尿素、TZD(pioglitazone)』,其中TZD因『水鈉滯留+脂肪重新分布』體重增加明顯;metformin中性/略降;acarbose中性;SGLT-2i(dapagliflozin)減重。本題在選項中『pioglitazone(Actos)』與體重增加相關性最高(C);metformin、acarbose中性,dapagliflozin減重。\\n\\n護理:擔心體重者避免TZD/磺醯尿素,選metformin/GLP-1 RA/SGLT-2i;TZD注意水腫心衰。", "options": {"A": "metformin為體重中性/略降。", "B": "acarbose為體重中性。", "C": "正解:pioglitazone(TZD)與體重增加相關性最高。", "D": "dapagliflozin(SGLT-2i)為減重。"}, "sources": ["ADA Standards of Care", "Harrison 21e, TZD"]}}, "111-進階-內科-52": {"quick": "住院血糖目標:ICU約140–180、病房空腹<140、飯後<180;符合的組合為2、3,故選B。", "detail": {"background": "住院糖尿病血糖控制目標(ADA):①『重症(ICU)』:140–180 mg/dL(不建議100–140的過嚴目標,NICE-SUGAR示增加低血糖)──故敘述1『ICU 100–140』不正確;②『非重症(病房)』:空腹/餐前<140、隨機/飯後<180;故敘述2(空腹<140)、3(飯後<180)正確;③敘述4『隨機<140應調降胰島素』不正確(隨機<140在範圍內,不需因此降量;通常<100–110才需防低血糖調降)。故正確為2、3(B)。\\n\\n護理:依重症/非重症設定目標(ICU 140–180、病房空腹<140飯後<180);避免低血糖。", "options": {"A": "1、2:1(ICU 100–140)過嚴不正確。", "B": "正解:2(空腹<140)、3(飯後<180)正確。", "C": "1、3含1不正確。", "D": "2、4含4(隨機<140調降)不正確。"}, "sources": ["ADA Inpatient glycemic targets", "Harrison 21e"]}}, "111-進階-內科-56": {"quick": "單用sliding scale不是最有效的控糖方式(應basal-bolus);故C錯誤。", "detail": {"background": "住院血糖控制:①糖尿病人『HbA1c>8.5%(控制差)』者擇期手術宜延後先控制(A正確);②控制住院血糖可降低併發症與死亡(B正確);③『單用sliding scale並非「最有效」控糖方式』──被動追高血糖、起伏大,應採『basal-bolus(基礎-餐時-校正)』(故C錯誤,為答案);④『持續/間歇管灌餵食』者以短效(RI)或中效(NPH)搭配基礎胰島素控制(D正確)。本題C錯誤。\\n\\n護理:住院用basal-bolus、避免單用sliding scale;管灌者搭配適當胰島素;控制差者延後擇期手術。", "options": {"A": "正確:A1c>8.5%應避免常規手術(先控制)。", "B": "正確:控制住院血糖降低共病與死亡。", "C": "錯誤(正解):單用sliding scale非最有效,應用basal-bolus。", "D": "正確:管灌者以RI/NPH搭配基礎胰島素控制。"}, "sources": ["ADA Inpatient glycemic management", "Harrison 21e"]}}, "112-進階-內科-50": {"quick": "DPP-4抑制劑與雙胍類(metformin)較不易造成低血糖,故B正確。", "detail": {"background": "口服降血糖藥要點:①『磺醯尿素(sulfonylureas)』刺激胰島素分泌→『增加體重、有低血糖風險』(故A『磺醯尿素導致體重下降』錯);②『DPP-4抑制劑與雙胍類(metformin)』作用機轉使低血糖風險低、體重中性(B正確);③『SGLT-2抑制劑』不僅可用於第二型糖尿病,且對『合併心衰竭/心血管/腎臟疾病』者『有益(降心衰住院、腎臟保護)』,是優先選擇之一(故C『不宜用於合併心臟病』錯,正好相反);④『TZD』因水鈉滯留會『加重心衰竭』,『不是』心衰病人的首選(對心衰反而禁用)(故D錯)。本題B正確。\\n\\n護理:依共病選藥(心衰/腎病優先SGLT-2i或GLP-1 RA);DPP-4i/metformin低血糖風險低;TZD避免用於心衰。", "options": {"A": "錯誤:磺醯尿素增加體重(非下降)。", "B": "正解:DPP-4抑制劑與雙胍類較不易造成低血糖。", "C": "錯誤:SGLT-2i對合併心衰/心血管者有益,並非不宜。", "D": "錯誤:TZD加重心衰,非心衰病人首選(應避免)。"}, "sources": ["ADA Standards of Care (pharmacology; CV/renal)", "Harrison 21e"]}}, "113-進階-婦產科-50": {"quick": "妊娠中末期使胰島素阻抗的主要荷爾蒙是『人類胎盤泌乳激素(hPL)』,故選D。", "detail": {"background": "妊娠糖尿病(GDM)的病生理:懷孕中後期胎盤分泌多種『致糖尿病(diabetogenic)荷爾蒙』造成『胰島素阻抗』,其中以『人類胎盤泌乳激素(human placental lactogen, hPL,又稱hCS)』為主要,還有黃體素、雌激素、胎盤生長激素、皮質醇、催乳素等。胰島素阻抗使母體血糖升高以利胎兒供糖,當母體β細胞代償不足即出現GDM。hCG主要在『早期』維持黃體,非中末期阻抗主因。故D(hPL)。GDM增加巨嬰、新生兒低血糖、子癇前症風險,產後須追蹤(易進展為T2DM)。\\n\\n護理:GDM以飲食運動為主、必要時胰島素(口服藥選擇有限);監測血糖、產後追蹤OGTT。", "options": {"A": "雌激素參與但非中末期阻抗的『主要』荷爾蒙。", "B": "黃體激素參與但非主要。", "C": "hCG主要在早期維持黃體,非中末期阻抗主因。", "D": "正解:人類胎盤泌乳激素(hPL)為妊娠中末期胰島素阻抗主因。"}, "sources": ["Williams Obstetrics, GDM pathophysiology", "Harrison 21e"]}}, "114-進階-內科-2": {"quick": "HbA1c反映血糖控制,『不是』營養狀態評估指標;營養看BMI、白蛋白、血色素,故選C。", "detail": {"background": "營養狀態評估指標:①人體測量『BMI』、體重變化;②血清『白蛋白(albumin)』、前白蛋白(反映蛋白營養,但受發炎影響);③『血色素(hemoglobin)』(貧血/營養);④淋巴球數、總膽固醇等。『HbA1c(糖化血色素)』反映的是過去2–3個月的『血糖控制』,屬糖尿病控制指標,『不是營養狀態指標』(C為答案)。本題問糖尿病人營養評估,HbA1c非營養指標。\\n\\n護理:評估營養用BMI、白蛋白、血色素、體重變化;HbA1c用於血糖控制追蹤。", "options": {"A": "BMI是營養狀態評估指標。", "B": "白蛋白是營養(蛋白)狀態指標。", "C": "正解:HbA1c反映血糖控制,非營養狀態指標。", "D": "血色素可反映營養/貧血狀態。"}, "sources": ["臨床營養評估指標", "ADA"]}}, "114-通論-5分科-33": {"quick": "ADA飲食不會『鼓勵以動物性蛋白取代植物性蛋白』(反而鼓勵植物性蛋白如豆腐黃豆);故B最不符合。", "detail": {"background": "ADA糖尿病飲食原則(2025):①強調『均衡飲食與個別化』、達成血糖/體重/代謝目標,不偏好單一特殊飲食(如生酮)作為通用建議(D符合);②鼓勵『全榖、蔬果、豆類、「植物性蛋白(如豆腐、黃豆)」、健康脂肪』,『減少紅肉/加工肉(動物性飽和脂肪)』──故『鼓勵以動物性優質蛋白取代植物性蛋白』與指引相反(B最不符合,為答案);③不鼓勵以市售營養/含糖飲料作為主要能量來源(A符合);④可用無熱量代糖飲料『取代含糖飲料』以減少游離糖(C符合,雖更建議白開水)。本題B最不符合。\\n\\n護理:衛教多植物性蛋白與全榖蔬果、限紅肉加工肉與含糖飲料、個別化均衡飲食。", "options": {"A": "符合:不鼓勵以市售營養飲料作主要能量來源。", "B": "最不符合(正解):指引鼓勵植物性蛋白,非以動物性取代植物性。", "C": "符合:以代糖飲料取代含糖飲料可減少游離糖。", "D": "符合:強調均衡與代謝目標,避免特殊飲食(如生酮)作通用建議。"}, "sources": ["ADA Standards of Care 2025 (Nutrition)", "國健署"]}}, "114-通論-5分科-60": {"quick": "黎明現象為清晨(約4–8AM)反調節荷爾蒙致血糖上升,夜間血糖正常、清晨升高(2AM 120→6AM 180),故選B。", "detail": {"background": "清晨高血糖(空腹血糖偏高)的兩大機轉:①『黎明現象(dawn phenomenon)』:清晨(約4–8AM)生長激素、皮質醇等『反調節荷爾蒙』分泌使肝糖輸出增加→血糖『逐漸上升』,『夜間(2–3AM)血糖正常或不低』、清晨升高(本題B:2AM 120→6AM 180);②『Somogyi效應(反彈性高血糖)』:夜間發生『低血糖(2–3AM血糖低,如A的2AM 50)』,引發反調節荷爾蒙反彈致清晨高血糖。鑑別靠『凌晨2–3AM血糖』:黎明現象2AM不低、Somogyi 2AM低。處置:黎明現象可調整基礎胰島素時間/劑量;Somogyi需減少夜間胰島素或睡前加點心。本題B符合黎明現象。\\n\\n護理:連續血糖監測或測2–3AM血糖鑑別黎明vs Somogyi;對因調整胰島素。", "options": {"A": "2AM 50(夜間低血糖)→反彈高血糖屬Somogyi效應,非黎明現象。", "B": "正解:2AM正常(120)、6AM升高(180)為黎明現象。", "C": "整夜偏高且清晨略降不符黎明現象型態。", "D": "整夜持續偏高為基礎胰島素不足,非典型黎明現象。"}, "sources": ["Harrison 21e, Dawn phenomenon vs Somogyi", "ADA"]}}, "105-TNPA-通論-37": {"quick": "留鉀利尿劑致『高血鉀性正常陰離子間隙(高氯)代謝性酸中毒』,AG不升;乳酸/DKA/甲醇皆為高AG,故選A。", "detail": {"background": "代謝性酸中毒分『高陰離子間隙(high AG)』與『正常AG(高氯型)』。①『高AG』(口訣MUDPILES):甲醇(Methanol)、尿毒(Uremia)、『糖尿病酮酸中毒(DKA)』、丙二醇、異菸鹼/鐵、『乳酸血症(Lactic acidosis)』、乙二醇、水楊酸──因未測量陰離子(酮酸、乳酸等)增加;②『正常AG(高氯)』:腹瀉、腎小管酸中毒(RTA)、『使用留鉀(保鉀)利尿劑/第四型RTA』、carbonic anhydrase抑制劑等──以HCO3流失或Cl增加為主,AG不升。本題『留鉀利尿劑』屬正常AG酸中毒(第四型RTA樣)→AG『不會』升高(A);乳酸、DKA、甲醇皆為高AG。\\n\\n護理:酸中毒先算AG分類找病因(高AG查酮酸/乳酸/毒物;正常AG查腹瀉/RTA)。", "options": {"A": "正解:留鉀利尿劑致高氯型(正常AG)酸中毒,AG不升。", "B": "乳酸血症為高AG酸中毒。", "C": "DKA為高AG酸中毒(酮酸)。", "D": "甲醇中毒為高AG酸中毒。"}, "sources": ["Harrison 21e, Metabolic Acidosis (AG)", "UpToDate Anion gap"]}}, "105-TNPA-內科-52": {"quick": "四藥中repaglinide(美格替耐,促胰島素分泌)最易造成低血糖,故選A。", "detail": {"background": "造成低血糖的降血糖藥以『促進胰島素分泌且非葡萄糖依賴』者風險最高:磺醯尿素與美格替耐類(meglitinides:repaglinide、nateglinide)及胰島素。相對地metformin、DPP-4抑制劑(sitagliptin)、TZD(pioglitazone)、SGLT-2i、acarbose單用低血糖風險低。本例昏迷+血糖30(嚴重低血糖),四藥中repaglinide為促胰島素分泌劑→最可能致低血糖。處置:意識不清的低血糖給靜脈葡萄糖(或glucagon),找誘因(進食少、腎功能、藥物)。\\n\\n護理:用磺醯尿素/美格替耐/胰島素者衛教低血糖徵兆與處理(15克糖15分鐘);老年/腎功能差更易低血糖。", "options": {"A": "正解:repaglinide(美格替耐)促胰島素分泌,最易造成低血糖。", "B": "metformin單用低血糖風險低。", "C": "sitagliptin(DPP-4i)單用低血糖風險低。", "D": "pioglitazone(TZD)單用低血糖風險低。"}, "sources": ["ADA Standards of Care", "Harrison 21e, Hypoglycemia"]}}, "108a-TNPA-內科-59": {"quick": "四藥中repaglinide(美格替耐,促胰島素分泌)最易造成低血糖,故選C。", "detail": {"background": "造成低血糖的降血糖藥以『促進胰島素分泌且非葡萄糖依賴』者風險最高:磺醯尿素與美格替耐類(meglitinides:repaglinide、nateglinide)及胰島素。相對地metformin、DPP-4抑制劑(sitagliptin)、TZD(pioglitazone)、SGLT-2i、acarbose單用低血糖風險低。本例昏迷+血糖30(嚴重低血糖),四藥中repaglinide為促胰島素分泌劑→最可能致低血糖。處置:意識不清的低血糖給靜脈葡萄糖(或glucagon),找誘因(進食少、腎功能、藥物)。\\n\\n護理:用磺醯尿素/美格替耐/胰島素者衛教低血糖徵兆與處理(15克糖15分鐘);老年/腎功能差更易低血糖。", "options": {"A": "sitagliptin(DPP-4i)單用低血糖風險低。", "B": "metformin單用低血糖風險低。", "C": "正解:repaglinide(美格替耐)促胰島素分泌,最易造成低血糖。", "D": "pioglitazone(TZD)單用低血糖風險低。"}, "sources": ["ADA Standards of Care", "Harrison 21e, Hypoglycemia"]}}, "107-TNPA-通論-49": {"quick": "DKA酸中毒時鉀移出細胞外,pH每下降0.1,血鉀約上升0.5 mEq/L,故選A。", "detail": {"background": "酸鹼與鉀的關係:酸中毒時細胞外H+進入細胞、交換K+移出細胞外→血鉀『假性升高』;鹼中毒則相反。經驗法則:『pH每下降0.1,血鉀約上升0.5 mEq/L』(A)。臨床意義:DKA病人雖『血鉀數值可能正常或偏高』,但因滲透性利尿、嘔吐、酸中毒使鉀移出後排出,『體內總鉀其實是嚴重缺乏』;一旦給胰島素(把鉀打回細胞內)+補液,血鉀會『快速下降』,故DKA治療中須『密集監測血鉀並及早補鉀』(血鉀<5.2即邊補鉀邊給胰島素,<3.3先補鉀暫緩胰島素)。\\n\\n護理:DKA治療密切監測血鉀與心電圖、依血鉀補鉀;勿被初期正常/偏高血鉀誤導(總鉀缺乏)。", "options": {"A": "正解:pH每下降0.1,血鉀約上升0.5 mEq/L。", "B": "上升1.0過大,非經驗值。", "C": "酸中毒應使血鉀上升(移出細胞),非下降。", "D": "方向錯誤(酸中毒血鉀上升)。"}, "sources": ["Harrison 21e, Potassium and acid-base", "DKA management"]}}, "108b-TNPA-通論-27": {"quick": "DKA『大多有誘發因子』(感染、停藥、初發病、心肌梗塞等);說『大部分沒有誘發因子』錯誤,故選B。", "detail": {"background": "糖尿病酮酸中毒(DKA):①常有『腹痛、噁心嘔吐』(代謝性酸中毒刺激)(A正確);②『大多有明確誘發因子』──最常見『感染(I)』,以及『胰島素中斷/不足、初次診斷、心肌梗塞、中風、胰臟炎、藥物(類固醇、SGLT-2i)、懷孕』等;故B『大部分沒有特殊誘發因子』『錯誤』(為答案);③胰島素連續輸注治療時須『密集監測血鉀』(胰島素使鉀回細胞致低血鉀)(C正確);④『大量補液(生理食鹽水)』與胰島素並列為DKA治療關鍵(D正確);還需補鉀、找並治療誘因、監測anion gap與酮體至緩解。\\n\\n護理:DKA找誘因(尤其感染)、大量補液、靜脈胰島素、補鉀、密集監測血糖/鉀/AG。", "options": {"A": "正確:DKA可有腹痛。", "B": "錯誤(正解):DKA大多有誘發因子(感染、停藥、初發等)。", "C": "正確:胰島素治療需密集監測血鉀。", "D": "正確:水分補充是DKA治療關鍵。"}, "sources": ["ADA DKA/HHS Consensus", "Harrison 21e"]}}, "108b-TNPA-內科-60": {"quick": "高血糖(350)+高AG代謝性酸中毒(pH7.2、HCO3 14)+尿酮陽性→糖尿病酮酸血症,故選D。", "detail": {"background": "本例:糖尿病、意識不清、血糖350、HCO3 14、pH 7.20(代謝性酸中毒)、PaCO2 28(呼吸代償)、『尿酮(Ketone)陽性』→『糖尿病酮酸血症(DKA)』。計算AG=Na−(Cl+HCO3)=136−(106+14)=16(升高,高AG酸中毒)。DKA三要件:高血糖(>250)、高AG代謝性酸中毒、酮體陽性(尿/血)。水楊酸中毒為高AG但有耳鳴/呼吸性鹼合併;metformin中毒為乳酸酸中毒(血糖不一定高、無酮);RTA為正常AG。本題尿酮陽性+高血糖→DKA。\\n\\n護理:DKA補液+靜脈胰島素+補鉀、監測AG/酮體至緩解、找誘因。", "options": {"A": "水楊酸中毒常合併呼吸性鹼中毒、有耳鳴,且非尿酮陽性高血糖,不符。", "B": "metformin中毒為乳酸酸中毒,血糖不一定高、無酮體,不符。", "C": "腎小管酸血症為正常AG(高氯)酸中毒,本例為高AG,不符。", "D": "正解:高血糖+高AG酸中毒+尿酮陽性→糖尿病酮酸血症。"}, "sources": ["ADA DKA Consensus", "Harrison 21e"]}}, "109-進階-內科-54": {"quick": "血清/尿液滲透壓計算用Na、K、glucose(及BUN/尿素);HCO3不納入滲透壓計算,故選C。", "detail": {"background": "滲透壓由溶質的莫耳濃度決定。『血清(或估算)滲透壓』常用公式:2×[Na+] (+2×[K+]) + glucose/18 + BUN/2.8(mg/dL單位)。主要滲透分子為『鈉、鉀、葡萄糖、尿素(BUN)』。『碳酸氫根(HCO3)』與『氯』屬陰離子,計算滲透壓時不單獨納入(鈉已×2涵蓋伴隨陰離子)。故計算滲透壓『不需用到HCO3』(C)。DKA/HHS評估有效滲透壓(2Na+glucose/18,不含尿素因尿素可自由跨膜)很重要。\\n\\n護理:DKA/HHS監測有效血漿滲透壓評估脫水與意識;滲透壓用Na/K/glucose/BUN計算。", "options": {"A": "Na是滲透壓計算主要參數。", "B": "K是滲透壓計算參數之一。", "C": "正解:HCO3不納入滲透壓計算。", "D": "Glucose是滲透壓計算參數。"}, "sources": ["Harrison 21e, Plasma osmolality", "DKA/HHS"]}}, "109-進階-內科-57": {"quick": "夜間心慌惡夢(夜間低血糖)後晨間高血糖→Somogyi效應(反彈性高血糖),故選C。", "detail": {"background": "本例:晚餐只吃1/3卻仍打了預混胰島素(Novomix 30),夜裡『心慌、做惡夢』(夜間低血糖症狀)、今晨空腹血糖『偏高(250)』→『Somogyi效應(反彈性高血糖)』:夜間發生低血糖,引發反調節荷爾蒙(腎上腺素、升糖素、皮質醇、GH)反彈,使清晨血糖升高。鑑別『黎明現象』:黎明現象『夜間血糖不低』、清晨因反調節荷爾蒙自然升高;Somogyi則『先有夜間低血糖』。本例有明確夜間低血糖症狀(進食少卻打胰島素)→Somogyi。處置:減少夜間胰島素劑量或睡前加點心,避免夜間低血糖。\\n\\n護理:晨間高血糖測凌晨2–3AM血糖鑑別Somogyi(低)vs黎明(不低);Somogyi減夜間胰島素/睡前點心。", "options": {"A": "DKA會有酸中毒/酮體/高血糖危象,本例僅晨間血糖250且有夜間低血糖,不符。", "B": "黎明現象夜間血糖不低,本例有夜間低血糖症狀,不符。", "C": "正解:夜間低血糖後反彈晨間高血糖→Somogyi效應。", "D": "升糖素過度作用非此臨床情境的最佳解釋(本質為反彈)。"}, "sources": ["Harrison 21e, Somogyi vs Dawn", "ADA"]}}, "110-通論-其他-70": {"quick": "血糖600的高血糖危象血漿滲透壓應『升高』(非下降至250);故A較不像,選A。", "detail": {"background": "血糖600 mg/dL的高血糖危象(DKA或HHS):①『血漿滲透壓「升高」』(高血糖+脫水),HHS常>320 mOsm/kg──故『滲透壓下降至250』與高血糖不符(A為答案,較不像);②高血糖致滲透性利尿→脫水→『腎前性氮血症(creatinine上升)』(C符合);③高血糖造成『稀釋性/轉移性低血鈉(假性低血鈉:每升血糖100,血鈉降約1.6–2.4)』(B符合);④若為DKA則有『代謝性酸中毒、HCO3降低(14)』(D符合,DKA)。本題A(滲透壓下降)較不像高血糖病人的結果。\\n\\n護理:高血糖危象評估滲透壓(升高)、脫水、電解質;大量補液+胰島素+補鉀。", "options": {"A": "較不像(正解):血糖600應使血漿滲透壓升高,非下降至250。", "B": "符合:高血糖致稀釋性(假性)低血鈉。", "C": "符合:滲透性利尿脫水→腎前性氮血症。", "D": "符合:若為DKA則代謝性酸中毒、HCO3降低。"}, "sources": ["ADA DKA/HHS", "Harrison 21e"]}}, "111-進階-內科-53": {"quick": "HHS處置:①0.9%生理食鹽水補液、②補KCl防低血鉀為正確(1、2);胰島素應輸注非IV bolus快速降、且血糖降後須加5%葡萄糖,故選A。", "detail": {"background": "高滲透壓高血糖狀態(HHS)處置原則(與DKA類似):①『大量補液(先0.9% normal saline)』矯正嚴重脫水為首要(1正確);②胰島素治療使鉀回細胞→須『補充KCl避免低血鉀』(血鉀<5.2即補)(2正確);③胰島素應以『連續低劑量靜脈「輸注」』緩慢降糖(目標每小時降約50–75 mg/dL),『不可IV bolus讓血糖「快速」恢復正常』(過快降糖/滲透壓→腦水腫)(3錯);④當血糖降至約250–300時應『加上含5%葡萄糖的點滴』(邊給胰島素清除酮體/維持、邊防低血糖),而非『避免葡萄糖』(4錯)。故正確為1、2(A)。\\n\\n護理:HHS大量補液、胰島素輸注緩降、補鉀、血糖降至250–300加葡萄糖、找誘因、監測滲透壓與意識。", "options": {"A": "正解:1(0.9% saline補液)+2(補KCl)正確。", "B": "3(IV bolus快速降)、4(避免葡萄糖)皆錯。", "C": "含3(IV bolus快速降)錯誤。", "D": "含4(避免葡萄糖)錯誤。"}, "sources": ["ADA DKA/HHS Consensus", "Harrison 21e"]}}, "112-進階-內科-18": {"quick": "DKA治療給生理食鹽水+胰島素,但『不常規給NaHCO3』(僅嚴重酸中毒pH<6.9考慮);故C(常規給NaHCO3)不適當/錯誤。", "detail": {"background": "本例20歲、腹痛嘔吐深快呼吸、血糖560、高AG代謝性酸中毒(pH7.15、HCO3 9、AG=122−(Cl+9)升高)→DKA。處置正確:①查血清酮體確認(A正確);②DKA為高AG代謝性酸中毒,AG升高(B正確);③治療給『生理食鹽水大量補液+靜脈胰島素+補鉀』,但『碳酸氫鈉(NaHCO3)不常規使用』──僅在『嚴重酸中毒(pH<6.9)』才考慮,過度給予有低血鉀、腦脊液反常酸化、腦水腫等風險(故C『常規給NaHCO3』不適當,為本題答案);④血糖降到250以下時『加含葡萄糖點滴』(邊給胰島素清酮體)(D正確)。本題C錯誤。\\n\\n護理:DKA補液+胰島素+補鉀;NaHCO3僅pH<6.9考慮;血糖<250加葡萄糖。", "options": {"A": "正確:應查血清酮體確認DKA。", "B": "正確:DKA為高AG代謝性酸中毒。", "C": "錯誤(正解):DKA不常規給NaHCO3(僅pH<6.9考慮)。", "D": "正確:血糖<250加含葡萄糖輸液。"}, "sources": ["ADA DKA Consensus (bicarbonate only if pH<6.9)", "Harrison 21e"]}}, "112-進階-內科-51": {"quick": "DKA由靜脈胰島素轉皮下時,須『先打皮下胰島素並重疊1–2小時後才關靜脈幫浦』,不能立即關,故C錯誤。", "detail": {"background": "DKA緩解後將『連續靜脈胰島素』轉換為『皮下胰島素』的注意事項:①轉換條件:血糖穩定(常<200)且至少穩定『4–6小時』、『酸中毒改善、AG恢復正常、酮體清除、病人能進食』(A、B正確);②『須在「打了皮下(尤其基礎)胰島素後重疊1–2小時」才關閉靜脈幫浦』──因靜脈胰島素半衰期極短,若打完皮下立即關靜脈,皮下尚未起效會出現空窗→反彈高血糖/DKA復發(故C『施打皮下後即可關閉靜脈幫浦』『錯誤』,為答案);③皮下起始總劑量約為前一天靜脈總量的『60–80%』(D正確)。本題C錯誤。\\n\\n護理:DKA轉皮下要『重疊1–2小時』再關靜脈;確認AG正常、能進食;劑量取靜脈總量60–80%。", "options": {"A": "正確:血糖至少穩定4–6小時。", "B": "正確:酸中毒改善、AG正常才轉換。", "C": "錯誤(正解):打皮下後須重疊1–2小時才關靜脈幫浦,不可立即關。", "D": "正確:皮下起始總量約為靜脈總量60–80%。"}, "sources": ["ADA DKA management (transition to SC insulin)", "Harrison 21e"]}}, "112-通論-其他-71": {"quick": "DKA因高血糖,血漿滲透壓應『升高』而非下降至240;故B『滲透壓下降至240』不正確。", "detail": {"background": "本例30歲糖尿病、Kussmaul深快呼吸、血糖550、血清酮體陽性→DKA。各敘述:①血鉀4.0(看似正常)但DKA體內總鉀缺乏,治療(胰島素)會使血鉀下降,故『治療應同時補鉀』(A正確);②DKA因高血糖+脫水,『血漿滲透壓應「升高」』,『下降至240』不正確(B為答案);『受血糖排擠』指的是稀釋性低血鈉(鈉被稀釋),但整體滲透壓因高血糖而升高;③血氣為『代謝性酸中毒+呼吸代償(Kussmaul呼吸排CO2)』(C正確);④高血糖致稀釋性『假性低血鈉(122)』(D正確)。本題B不正確。\\n\\n護理:DKA監測滲透壓(升高)、補液、胰島素、補鉀;Kussmaul呼吸為酸中毒代償。", "options": {"A": "正確:DKA治療(胰島素)會降血鉀,應同時補鉀。", "B": "不正確(正解):DKA血漿滲透壓升高,非下降至240。", "C": "正確:代謝性酸中毒合併呼吸代償(Kussmaul)。", "D": "正確:高血糖致假性低血鈉。"}, "sources": ["ADA DKA/HHS", "Harrison 21e"]}}, "113-進階-內科-9": {"quick": "重度DKA(pH7.14)應在加護單位嚴密監測;若一般病房住院則須嚴密監測追蹤(A正確);其餘關於AG、常規NaHCO3、停胰島素皆錯。", "detail": {"background": "本例23歲、嘔吐呼吸急促、血糖585、高AG代謝性酸中毒(pH7.14、HCO3 8)→『重度DKA』(pH<7.0為重度,需加護)。各敘述:①重度DKA理想在ICU,『若在一般病房,須「嚴密監測與追蹤」(血糖/電解質/AG/意識/尿量)』(A正確);②DKA為『高AG』代謝性酸中毒,AG應『升高』(故B『anion gap應正常』錯);③『不常規給NaHCO3』(僅pH<6.9考慮)(故C『常規給NaHCO3』錯);④血糖降至250–300時『不可立即停胰島素』──應降低胰島素速率並『加含葡萄糖輸液繼續給胰島素』直到酮體清除/AG正常(故D『立即停胰島素』錯)。本題A正確。\\n\\n護理:重度DKA加護監測;補液+胰島素輸注+補鉀;血糖降後加葡萄糖續胰島素至AG正常。", "options": {"A": "正確:在一般病房須嚴密監測與追蹤(重度DKA宜加護)。", "B": "錯誤:DKA為高AG酸中毒,AG升高。", "C": "錯誤:不常規給NaHCO3(僅pH<6.9)。", "D": "錯誤:血糖降至250–300不可立即停胰島素(加葡萄糖續打至AG正常)。"}, "sources": ["ADA DKA Consensus", "Harrison 21e"]}}, "113-進階-內科-17": {"quick": "孕婦DKA的胰島素治療原則與非孕婦相同;且『血糖正常仍可能DKA(euglycemic DKA)』,故選D。", "detail": {"background": "本例第1型糖尿病孕婦28週、嘔吐、『血糖僅200』但pH 6.9、HCO3 12、酮體8 mmol/L→『正常血糖性糖尿病酮酸中毒(euglycemic DKA)』。要點:①『血糖<300甚至正常「不能排除」DKA』──孕婦(及使用SGLT-2i者)易發生euglycemic DKA(故A『血糖<300可排除酮酸中毒』錯);②孕婦DKA是『母胎急症』,治療目標是『穩定母體、矯正DKA』,『不是立刻引產』(引產不矯正DKA;穩定母體後胎兒狀況多會改善)(故B錯);③孕婦DKA『仍須矯正酸中毒』(補液、胰島素),不可不處理pH(故C錯);④『孕婦DKA的胰島素治療原則與非孕婦相同(靜脈胰島素+補液+補鉀)』(D正確)。本題D正確。\\n\\n護理:孕婦/服SGLT-2i者血糖正常也要驗酮體/血氣排除euglycemic DKA;治療同非孕婦並監測胎兒。", "options": {"A": "錯誤:血糖<300不能排除DKA(孕婦可euglycemic DKA)。", "B": "錯誤:孕婦DKA應穩定母體矯正DKA,非立刻引產。", "C": "錯誤:孕婦DKA仍須矯正酸中毒(補液+胰島素)。", "D": "正解:孕婦DKA胰島素治療原則與非孕婦相同。"}, "sources": ["Williams Obstetrics, DKA in pregnancy", "ADA"]}}, "113-進階-家庭-31": {"quick": "DKA好發於第1型糖尿病;為代謝性酸中毒(非呼吸性)、Kussmaul呼吸(非Cheyne-Stokes)、急性期不給葡萄糖,故選B。", "detail": {"background": "糖尿病酮酸血症(DKA):①為『代謝性酸中毒(高AG)』,非『原發性呼吸性酸中毒』(故A錯;呼吸是代償性深快=Kussmaul);②『好發於第1型糖尿病』(胰島素絕對缺乏),也可見於第2型在重大壓力下(B正確);③呼吸型態為『Kussmaul呼吸(深而快,代償酸中毒)』,非『Cheyne-Stokes(潮式呼吸,見於心衰/腦病)』(故C錯);④急性期治療是『補液+胰島素+補鉀』,『不是補葡萄糖』(血糖已高;待血糖降到250才加葡萄糖)(故D錯)。本題B正確。\\n\\n護理:DKA好發第1型;Kussmaul呼吸;補液+胰島素+補鉀,血糖降後才加葡萄糖。", "options": {"A": "錯誤:DKA為代謝性酸中毒,非原發性呼吸性酸中毒。", "B": "正解:DKA易發生於第1型糖尿病。", "C": "錯誤:DKA為Kussmaul呼吸,非Cheyne-Stokes。", "D": "錯誤:急性期不補葡萄糖(血糖已高),待血糖降才加。"}, "sources": ["Harrison 21e, DKA", "ADA"]}}, "113-進階-家庭-32": {"quick": "DKA因脫水,皮膚乾燥溫熱而非『濕冷』;故『皮膚濕冷』不是DKA表現,選B。", "detail": {"background": "DKA的臨床表現:①噁心、嘔吐、『腹痛』(酸中毒刺激)(A、C屬之);②『呼吸深快(Kussmaul)、呼吸急促』、呼氣有水果味(丙酮)(D屬之);③多尿、口渴、脫水(皮膚『乾燥』、黏膜乾、心搏快、低血壓);④意識改變。『皮膚濕冷』是『低血糖』或休克(交感興奮出汗)的表現,『不是』DKA(DKA因脫水皮膚乾燥溫)(B為答案)。低血糖vs DKA:低血糖=急性、冒冷汗濕冷顫抖;DKA=亞急性、脫水乾燥、Kussmaul、水果味。\\n\\n護理:鑑別低血糖(濕冷冒汗)與DKA(乾燥Kussmaul水果味);DKA補液矯正脫水。", "options": {"A": "噁心嘔吐是DKA表現。", "B": "正解(非DKA):皮膚濕冷屬低血糖/休克,DKA因脫水皮膚乾燥。", "C": "腹痛是DKA表現。", "D": "呼吸急促(Kussmaul)是DKA表現。"}, "sources": ["Harrison 21e, DKA clinical features", "ADA"]}}, "114-進階-內科-14": {"quick": "血糖980、滲透壓350、酮體僅0.1、pH/HCO3正常→高滲透壓高血糖狀態(HHS),故選A。", "detail": {"background": "高滲透壓高血糖狀態(HHS)vs DKA鑑別:①『HHS』:血糖『極高(常>600,可達1000)』、『血漿滲透壓>320』、『無顯著酮酸中毒(pH>7.3、HCO3>18、酮體陰性/微量)』、嚴重脫水與意識改變,好發『第2型糖尿病老年』;②『DKA』:血糖通常250–600、『高AG代謝性酸中毒(pH<7.3、HCO3<18)、酮體陽性』,好發第1型。本例血糖980、滲透壓350、『酮體0.1(陰性)』、pH7.36/HCO3 22(正常)、lactate正常→『HHS』(A)。HHS死亡率較DKA高(老年、脫水重)。治療:更大量補液+胰島素+補鉀。\\n\\n護理:HHS大量補液為首要、胰島素緩降、補鉀、找誘因(感染、藥物),監測滲透壓與意識。", "options": {"A": "正解:血糖極高+高滲透壓+無酮酸中毒→HHS。", "B": "DKA有高AG酸中毒+酮體陽性,本例酮體0.1、pH正常,不符。", "C": "高乳酸酸中毒lactate會升高,本例1.9正常,不符。", "D": "非正常代謝性酸中毒(pH/HCO3正常)。"}, "sources": ["ADA DKA/HHS Consensus", "Harrison 21e"]}}, "114-進階-內科-48": {"quick": "DKA酸中毒刺激呼吸中樞→Kussmaul深快呼吸排CO2代償,故A正確;高血糖致假性低血鈉、血鉀升高為移出非細胞內增加、水果味為丙酮(acetone)。", "detail": {"background": "本例第1型糖尿病、腹痛嘔吐意識改變、Kussmaul深呼吸帶水果味、血糖490、pH7.08、HCO3 7、Na128、K5.8→DKA。各敘述:①『代謝性酸中毒刺激呼吸中樞→呼吸深快(Kussmaul)以排出CO2代償』(A正確);②高血糖致『稀釋性(假性)低血鈉』,是『稀釋』不是『稀釋血鈉的生理目的』,且高血糖『升高』血漿滲透壓非下降(故B『高血糖致滲透壓下降以稀釋血鈉』錯);③DKA血鉀『看似升高(5.8)是因酸中毒使鉀「移出」細胞外』,但『細胞內與總體鉀其實缺乏』(故C『血鉀升高顯示細胞內鉀增加』錯);④呼氣水果味主要來自『丙酮(acetone)』(揮發性酮體),非acetoacetic acid(乙醯乙酸不揮發)(故D錯)。本題A正確。\\n\\n護理:DKA補液+胰島素+補鉀(雖血鉀高但會驟降);Kussmaul呼吸為代償;監測AG/酮體。", "options": {"A": "正解:酸中毒促進呼吸深快(Kussmaul)排CO2代償。", "B": "錯誤:高血糖使血漿滲透壓升高(致假性低血鈉),非下降。", "C": "錯誤:血鉀升高是鉀移出細胞外,細胞內/總鉀其實缺乏。", "D": "錯誤:水果味主要由丙酮(acetone)產生,非acetoacetic acid。"}, "sources": ["Harrison 21e, DKA pathophysiology", "ADA"]}}, "107-TNPA-內科-6": {"quick": "糖尿病神經病變性疼痛首選『三環抗憂鬱劑(amitriptyline)』等(或gabapentin/pregabalin/duloxetine),故選B。", "detail": {"background": "糖尿病周邊神經病變性疼痛(diabetic neuropathic pain)的藥物治療,第一線為:①『三環抗憂鬱劑(TCA,如amitriptyline)』;②『抗癲癇藥gabapentin/pregabalin』;③『SNRI(duloxetine、venlafaxine)』。這些藥作用於神經傳導與下行抑制路徑,對『神經病變性』疼痛效果優於一般止痛藥。本例選『amitriptyline(B)』。對比:fluoxetine(SSRI)對神經病變痛效果較差;acetaminophen與aspirin(NSAID)對神經病變性疼痛效果不佳(它們對傷害感受性疼痛較有效)。amitriptyline注意抗膽鹼副作用(老年慎用)。\\n\\n護理:神經病變痛用TCA/gabapentin/pregabalin/duloxetine;控制血糖延緩進展;衛教TCA副作用(口乾、嗜睡、姿勢性低血壓)。", "options": {"A": "fluoxetine(SSRI)對神經病變性疼痛效果較差。", "B": "正解:amitriptyline(三環抗憂鬱劑)為糖尿病神經病變痛首選之一。", "C": "acetaminophen對神經病變性疼痛效果不佳。", "D": "aspirin(NSAID)對神經病變性疼痛效果不佳。"}, "sources": ["ADA Neuropathy Position Statement", "Harrison 21e, Diabetic Neuropathy"]}}, "108b-TNPA-內科-6": {"quick": "傷口紅潤、邊緣不規則、有腐肉滲液且位於內踝(足靴區)→較符合『靜脈性潰瘍』特徵,故選A。", "detail": {"background": "下肢慢性潰瘍鑑別:①『靜脈性潰瘍』──好發『內踝上方(足靴區gaiter area)』,傷口『淺、邊緣不規則、滲液多、肉芽紅潤』,周圍有色素沉著/脂性皮膚硬化、水腫,因靜脈高壓所致;②『動脈性潰瘍』──好發肢端/趾尖/壓力點,『深、邊緣整齊「打洞狀」、基底蒼白乾、痛、脈搏弱、肢冷』;③『神經病變性潰瘍』──好發『足底受壓點(蹠骨頭)』,周圍厚繭、無痛、脈搏多正常。本例『內踝、邊緣不規則、腐肉滲液、紅潤』→較符合『靜脈性潰瘍』(A)。雖病人有糖尿病,但傷口型態(部位內踝+滲液多+邊緣不規則)指向靜脈性。\\n\\n護理:依潰瘍型態處置:靜脈性用加壓治療+傷口照護;動脈性評估血流/血管重建;神經病變性減壓+血糖控制;感染傷口抗生素。", "options": {"A": "正解:內踝+邊緣不規則+滲液多+紅潤→靜脈性潰瘍。", "B": "動脈性潰瘍為深、打洞狀、基底蒼白乾、痛、脈搏弱,不符。", "C": "神經病變性潰瘍好發足底受壓點、周圍厚繭、無痛,不符部位。", "D": "『糖尿病足性潰瘍』非標準分類(糖尿病足多為神經/缺血混合),本題以靜脈性為最符合型態。"}, "sources": ["Sabiston, Leg ulcers (venous/arterial/neuropathic)", "Harrison 21e"]}}, "108a-TNPA-內科-11": {"quick": "糖尿病神經病變痛不以鴉片類為主(用TCA/gabapentin等);故C『以鴉片類止痛藥為主』不適當。", "detail": {"background": "糖尿病周邊神經病變(diabetic peripheral neuropathy)的特徵與治療:①疼痛常『夜間加重』(A正確);②與『血糖控制不佳』相關,良好血糖控制可延緩進展(B正確);③『治療神經病變性疼痛以「三環抗憂鬱劑、gabapentin/pregabalin、duloxetine」為第一線』,『不以鴉片類為主』(鴉片對神經病變痛效果有限且成癮/副作用,僅難治時輔助)(故C『以鴉片類為主』不適當,為答案);④可有『異痛(allodynia,輕觸即痛)、感覺過敏、麻木』(D正確)。本題C不適當。\\n\\n護理:神經病變痛用TCA/gabapentin/pregabalin/duloxetine;優化血糖;足部保護(感覺喪失易潰瘍)。", "options": {"A": "正確:神經病變性疼痛常夜間加重。", "B": "正確:與血糖控制不佳相關。", "C": "不適當(正解):神經病變痛以TCA/gabapentin等為主,非鴉片類。", "D": "正確:可有異痛(輕觸即痛)、感覺過敏。"}, "sources": ["ADA Neuropathy", "Harrison 21e"]}}, "108a-TNPA-內科-18": {"quick": "足部潰瘍紅腫、黃白滲液、味重(感染)→選用『銀離子敷料』抗菌,故選C。", "detail": {"background": "傷口敷料依傷口狀況選擇:①『銀離子敷料(silver dressing)』──具『抗菌』作用,適用於『感染或高生物負荷』的傷口(本例紅腫、黃白滲液、味重=感染徵象)(C正解);②水凝膠(hydrogel)──提供濕潤、適用『乾燥/有壞死焦痂需自體清創』的傷口;③親水性敷料(hydrocolloid)──適用少至中量滲液、不適合感染傷口(密閉);④藻酸鹽(alginate)──吸收力強,適用『大量滲液』傷口(但感染傷口優先控制感染)。本例感染傷口→銀離子敷料。同時須清創、評估血流(ABI)、控制血糖、必要時全身抗生素。\\n\\n護理:感染傷口用抗菌敷料(銀)、清創、依需求加全身抗生素;糖尿病足評估血流與減壓。", "options": {"A": "水凝膠適用乾燥/壞死焦痂的傷口,非感染滲液傷口。", "B": "親水性敷料不適合感染傷口(密閉)。", "C": "正解:感染(紅腫滲液味重)傷口選銀離子抗菌敷料。", "D": "藻酸鹽適用大量滲液,但感染傷口優先抗菌(銀)。"}, "sources": ["傷口照護:Dressing selection", "Sabiston, Wound care"]}}, "108b-TNPA-內科-24": {"quick": "第1型糖尿病左足下垂(無法背屈)+感覺喪失而脈搏/膝反射正常→周邊神經病變,最恰當為『神經傳導檢查』,故選B。", "detail": {"background": "本例第1型糖尿病19年、『左足無法背屈(foot drop)+感覺喪失』,但『足背動脈搏動正常(血流佳)、膝反射正常』→指向『糖尿病周邊神經病變(可能單一神經病變如腓神經,或多發性神經病變)』。最恰當檢查為『神經傳導檢查(nerve conduction study, NCS)/肌電圖』以評估周邊神經功能與定位。ABI(A)用於評估『周邊「動脈」疾病』,但本例脈搏正常、問題是神經;腦脊髓液蛋白電泳(C)用於Guillain-Barré等;腰部MRI(D)用於神經根/脊髓壓迫(本例膝反射正常、雙側對稱性糖尿病背景,較不像腰椎壓迫)。本題B(神經傳導檢查)。\\n\\n護理:糖尿病感覺喪失+運動無力→神經傳導檢查評估;足部保護防潰瘍;優化血糖。", "options": {"A": "ABI評估動脈疾病,本例脈搏正常、問題在神經,不適。", "B": "正解:周邊神經病變(foot drop+感覺喪失)以神經傳導檢查評估。", "C": "腦脊髓液蛋白電泳用於Guillain-Barré等,非此情境。", "D": "腰部MRI用於神經根壓迫,本例對稱糖尿病背景、膝反射正常,較不適。"}, "sources": ["Harrison 21e, Diabetic Neuropathy; NCS", "ADA"]}}, "110-進階-外科-30": {"quick": "糖尿病足底厚繭『不可用化學溶液(腐蝕劑)自行溶解』(易致傷口潰瘍感染),故C錯誤。", "detail": {"background": "糖尿病足照護指引:①『每日檢查與清潔足部、趾縫』(早期發現傷口)(A正確);②洗澡後『塗保濕乳液(避趾縫)』防皮膚乾裂(B正確);③『厚繭(callus)應由專業(足科)修剪』,『不可用「化學溶液/雞眼藥(含水楊酸等腐蝕劑)」自行溶解』──糖尿病人感覺差、血流差,腐蝕劑易造成『化學灼傷、潰瘍與感染』(故C『化學溶液溶解清除』錯誤,為答案);④『穿襪保暖、穿合腳鞋』、不赤腳、修剪指甲平剪。本題C錯誤。\\n\\n護理:糖尿病足衛教每日檢查、保濕(避趾縫)、合腳鞋襪、不赤腳、厚繭由專業處理、勿用腐蝕劑/熱敷。", "options": {"A": "正確:每日檢查清潔足部與趾縫。", "B": "正確:洗澡後塗保濕乳(避趾縫)。", "C": "錯誤(正解):厚繭不可用化學溶液自行溶解(易灼傷潰瘍),應由專業修剪。", "D": "正確:穿襪保暖(並穿合腳鞋)。"}, "sources": ["ADA Foot care", "IWGDF Diabetic Foot Guidelines"]}}, "111-進階-外科-27": {"quick": "夏柯氏足(Charcot foot)為足部與踝關節的進行性破壞變形(中足塌陷),故選A。", "detail": {"background": "夏柯氏足(Charcot neuroarthropathy)是糖尿病(感覺神經病變)病人足部的『進行性、破壞性關節病變』:因失去保護性感覺,反覆微創傷與發炎導致『骨與關節破壞、脫位、塌陷』,典型『中足塌陷(rocker-bottom foot,搖椅底足)、足與踝關節變形』(A正確)。急性期足部紅腫熱(易誤為感染/蜂窩炎),X光見骨破壞/脫位/碎裂。治療:急性期『完全減壓/不負重、全接觸石膏(TCC)』固定,防進一步破壞與潰瘍。對比:跟骨骨刺、拇趾外翻(hallux valgus)、爪狀趾(claw toe)是其他足部變形但非Charcot的核心。本題A正確。\\n\\n護理:Charcot足急性期完全不負重/石膏固定、防潰瘍;與感染鑑別;衛教足部保護。", "options": {"A": "正解:Charcot foot為足與踝關節破壞變形(中足塌陷)。", "B": "跟骨骨性生長(骨刺)非Charcot足核心。", "C": "拇趾外翻(hallux valgus)非Charcot變形。", "D": "爪狀趾(claw toe)為其他足變形,非Charcot核心特徵。"}, "sources": ["IWGDF Charcot Foot", "Harrison 21e, Diabetic foot"]}}, "111-進階-外科-28": {"quick": "單股尼龍繩(10g monofilament)檢測時須壓到尼龍繩彎成『C形』(達10克壓力)以測保護性感覺,故選C。", "detail": {"background": "『10克尼龍單絲(Semmes-Weinstein 10g monofilament)』檢測是篩檢糖尿病足『保護性感覺喪失(LOPS)』的標準工具:①將單絲『垂直壓於足底特定測試點』,『施壓至尼龍絲「彎曲成C形」』(代表施加約10克壓力),停留約1–2秒,問病人是否感覺到(C正確);②測試『足底』數個點(如蹠骨頭1/3/5、拇趾、足跟等),『避開厚繭/潰瘍/疤痕』(不在厚繭上測);③並非『測整隻足』或固定『壓5秒』。無法感覺到10g單絲=保護性感覺喪失→高潰瘍風險。本題C正確。\\n\\n護理:以10g單絲與音叉/針刺/反射評估糖尿病周邊神經;LOPS者衛教足部保護與每日檢查。", "options": {"A": "非測整隻足,而是足底特定測試點。", "B": "測試點為蹠骨頭等足底點(避厚繭),非單指第1/3/5腳趾且描述不完整。", "C": "正解:施壓至尼龍繩彎曲成C形(約10克壓力)以測保護性感覺。", "D": "停留約1–2秒,非每點至少5秒。"}, "sources": ["IWGDF/ADA Monofilament testing", "Harrison 21e"]}}, "112-進階-外科-70": {"quick": "確認糖尿病足潰瘍是否合併『骨髓炎』的初步影像檢查為『X光(plain X-rays)』,故選A。", "detail": {"background": "糖尿病足潰瘍合併『骨髓炎(osteomyelitis)』的評估:①『初步影像為「X光(plain radiograph)」』──可見骨破壞、骨膜反應、皮質侵蝕(但早期可能正常);②『探骨試驗(probe-to-bone)』陽性、潰瘍大而深/長期不癒、發炎指標(ESR/CRP)升高也提示骨髓炎;③X光不確定時以『MRI』(敏感度高)確認;最終診斷靠骨切片培養。本題問『確認骨髓炎的檢驗項目』,在選項中『X光(A)』為對應的影像檢查。ABI、壓力測試、單絲(monofilament)分別評估血流、壓力、感覺,非骨髓炎。本題A。\\n\\n護理:深/久不癒的足潰瘍懷疑骨髓炎→X光(±MRI)、探骨試驗、發炎指標;確診需長療程抗生素±清創。", "options": {"A": "正解:X光為確認糖尿病足骨髓炎的初步影像檢查。", "B": "ABI評估動脈血流,非骨髓炎。", "C": "壓力測試評估足底壓力,非骨髓炎。", "D": "單絲(monofilament)評估保護性感覺,非骨髓炎。"}, "sources": ["IDSA Diabetic Foot Infection Guidelines", "IWGDF"]}}, "113-通論-家庭-60": {"quick": "足背/後脛動脈搏動微弱+傷口久不癒+肢冷→周邊動脈阻塞,可用ABI(踝肱血壓指數)測阻塞程度,故選C。", "detail": {"background": "本例糖尿病、左小腿冰涼、傷口5cm逾1個月不癒、足背與後脛動脈搏動微弱→『周邊動脈阻塞性疾病(PAD)』致缺血性潰瘍。要點:①評估缺血程度用『踝肱血壓指數(ABI=踝收縮壓/肱收縮壓)』,<0.9提示PAD、<0.4為嚴重缺血(C正確);②PAD缺血肢『不一定有明顯水腫』(缺血以肢冷、脈弱、蒼白、疼痛為主;水腫較屬靜脈性/心衰)(故A『通常伴明顯水腫』錯);③缺血性潰瘍『須先「血流重建(血管擴張術/繞道)」改善灌流傷口才會癒合』,『不是等傷口癒合後才打通血管』(故B順序顛倒錯);④『間歇性跛行』定義是『「走路時」患肢疼痛、休息可緩解』(嚴重缺血才有「休息痛」);D把定義寫反(『休息時痛、走路緩解』)→錯。本題C正確。\\n\\n護理:糖尿病缺血足量ABI、評估血流重建、傷口照護、戒菸、控制危險因子。", "options": {"A": "錯誤:PAD缺血肢不一定有明顯水腫(以肢冷脈弱為主)。", "B": "錯誤:缺血性潰瘍應先血流重建再期待癒合,順序顛倒。", "C": "正解:可用ABI測知動脈阻塞程度。", "D": "錯誤:間歇性跛行為走路時痛、休息緩解(本選項定義寫反)。"}, "sources": ["ACC/AHA PAD Guidelines (ABI)", "IWGDF"]}}, "106-106a-通論-40": {"quick": "庫欣氏症(類固醇過多)因皮質醇的礦物皮質作用→低血鉀(非高血鉀);故『高血鉀引起水腫』最不可能,選C。", "detail": {"background": "本例使用『來路不明藥物(常含類固醇)』致『醫源性庫欣氏症候群(Cushing syndrome)』:中心性(軀幹)肥胖、月亮臉、水牛肩、四肢消瘦。皮質醇過多的表現:①皮膚變薄、易瘀血、紫紋(B皮膚變薄正確);②骨質疏鬆(B正確);③葡萄糖耐量異常/類固醇糖尿病(D正確);④高血壓、『低血鉀(皮質醇的礦物皮質活性→保鈉排鉀)』與代謝性鹼中毒、水鈉滯留水腫。故『「高血鉀」引起水腫』錯誤(應為「低血鉀」)→最不可能(C為答案)。診斷:24小時尿游離皮質醇、隔夜dexamethasone抑制試驗、午夜唾液皮質醇;醫源性者停類固醇(逐步減量)。\\n\\n護理:Cushing監測血壓/血糖/血鉀/骨質;醫源性逐步減類固醇(避免續發性腎上腺危象)。", "options": {"A": "正確:皮質醇過多致皮膚變薄、易瘀血。", "B": "正確:Cushing可致骨質疏鬆。", "C": "最不可能(正解):Cushing為『低血鉀』(保鈉排鉀),非高血鉀。", "D": "正確:可致葡萄糖耐量異常/糖尿病。"}, "sources": ["Harrison 21e, Cushing's Syndrome", "Endocrine Society"]}}, "106-106a-內科-65": {"quick": "次發性腎上腺衰竭(ACTH不足)醛固酮多正常(受RAAS調控)→不會高血鉀;故『高血鉀』為除外,選C。", "detail": {"background": "腎上腺功能不足分『原發性(Addison,腎上腺本身壞)』與『次發性(腦下垂體ACTH不足)』。關鍵差異在『礦物皮質醛固酮(aldosterone)』:①原發性→皮質醇與『醛固酮皆缺』→低血鈉、『「高」血鉀』、低血壓、且因負回饋使ACTH升高→『皮膚色素沈著』;②『次發性(ACTH不足)』→『醛固酮仍受RAAS(腎素-血管收縮素)調控大致正常』→『不會有高血鉀』,且ACTH低→『無皮膚色素沈著』。次發性可有低血壓、低血糖(皮質醇缺)、性慾降低(常合併其他垂體前葉荷爾蒙不足)。故次發性腎上腺衰竭『不會合併高血鉀』(C為除外答案)。\\n\\n護理:原發性補糖皮質+礦物皮質;次發性主要補糖皮質(醛固酮多正常);壓力時加量防腎上腺危象。", "options": {"A": "低血壓可見於次發性(皮質醇不足)。", "B": "性慾降低(常合併垂體其他荷爾蒙不足)可見。", "C": "除外(正解):次發性醛固酮多正常,不會高血鉀(高血鉀屬原發性)。", "D": "低血糖(皮質醇不足)可見於次發性。"}, "sources": ["Harrison 21e, Adrenal Insufficiency (primary vs secondary)", "Endocrine Society"]}}, "108a-TNPA-通論-45": {"quick": "醛固酮受『腎素-血管收縮素系統及血鉀(K+)』調控,『血漿氫離子(H+)』非主要調控;故B錯誤。", "detail": {"background": "醛固酮(aldosterone)是腎上腺皮質『絲球帶(zona glomerulosa)』分泌的『礦物皮質荷爾蒙』(A正確),作用於遠端腎小管保鈉排鉀(及排H+)。其分泌主要受『①腎素-血管收縮素系統(RAAS,血壓/血容積)、②血漿「鉀離子」濃度(高血鉀刺激醛固酮)』調控(次要受ACTH)。本題B寫『受RAAS及「氫離子(H+)」濃度控制』──主要調控離子是『鉀(K+)』而非氫離子,故B錯誤(為答案)。其他:腎上腺皮質結節增生(原發性醛固酮增多)→醛固酮上升(C正確);愛迪生氏症(腎上腺壞)→醛固酮下降(D正確)。\\n\\n護理:醛固酮過多→高血壓低血鉀(原發性醛固酮增多);不足→低血壓高血鉀(Addison)。", "options": {"A": "正確:醛固酮由腎上腺絲球帶分泌的礦物皮質荷爾蒙。", "B": "錯誤(正解):受RAAS與『血鉀』調控,非氫離子(H+)。", "C": "正確:腎上腺皮質結節增生→醛固酮上升。", "D": "正確:愛迪生氏症醛固酮下降。"}, "sources": ["Harrison 21e, Aldosterone/RAAS", "Williams Endocrinology"]}}, "108a-TNPA-內科-55": {"quick": "皮膚黝黑+低血壓+低血糖+低血鈉+高血鉀(+結核史)→原發性腎上腺功能不足(Addison);評估腎上腺,C-peptide(評估胰島素)最不需要,選D。", "detail": {"background": "本例:肺結核病史(結核可侵犯腎上腺)、食慾不振無力、『皮膚黝黑(ACTH/MSH升高致色素沈著)』、低血壓、『低血糖、低血鈉、高血鉀』→典型『原發性腎上腺功能不足(Addison's disease)』。應做的檢查:①『cortisol(皮質醇,清晨低)』、②『ACTH(原發性會「升高」)』、③『aldosterone(原發性低)』,以及ACTH刺激試驗(cosyntropin)。『C-peptide』是評估『內生性胰島素分泌(用於糖尿病/胰島素瘤)』,與腎上腺功能無關→『最不需要/較不建議』(D為答案)。\\n\\n護理:Addison危象(低血壓、低血糖、高血鉀)→靜脈hydrocortisone+生理食鹽水葡萄糖;確診後終生補充糖皮質+礦物皮質,壓力時加量。", "options": {"A": "檢測cortisol評估腎上腺功能,需要。", "B": "檢測aldosterone評估礦物皮質,需要。", "C": "檢測ACTH區分原發/次發,需要。", "D": "正解(最不需要):C-peptide評估胰島素分泌,與腎上腺功能無關。"}, "sources": ["Harrison 21e, Addison's disease", "Endocrine Society Adrenal Insufficiency"]}}, "108a-TNPA-內科-56": {"quick": "原發性腎上腺功能不足需『同時補充糖皮質素與礦物皮質素』,故選C。", "detail": {"background": "腎上腺功能不足(adrenal insufficiency)要點:①臨床為疲倦、無力、低血壓、低血糖、體重減輕;『月亮臉、水牛肩、紫紋』是『庫欣(皮質醇過「多」)』的表現,『不是』功能「不足」(故A錯);②『原發性』腎上腺功能不足(Addison)兼缺糖皮質與礦物皮質,故需『同時補充「糖皮質素(hydrocortisone)＋礦物皮質素(fludrocortisone)」』(C正確);③要做『腦下垂體MRI』評估的是『「次發性」(ACTH不足,垂體問題)』,而非原發性(原發性看腎上腺)(故B『原發性需做腦垂腺MRI』錯);④『極長鏈脂肪酸(very long chain fatty acids)』升高用於診斷『腎上腺腦白質失養症(adrenoleukodystrophy)』──是原發性腎上腺功能不足的『一個原因』,故測量『有助』鑑別病因(故D『無助』錯)。本題C正確。\\n\\n護理:Addison同補糖皮質+礦物皮質,壓力時加量、衛教危象預防與急救類固醇卡。", "options": {"A": "錯誤:月亮臉/水牛肩/紫紋是庫欣(皮質醇過多),非功能不足。", "B": "錯誤:做垂體MRI是評估『次發性』,非原發性。", "C": "正解:原發性腎上腺功能不足需同時補充糖皮質與礦物皮質素。", "D": "錯誤:極長鏈脂肪酸有助鑑別腎上腺腦白質失養症等病因。"}, "sources": ["Endocrine Society Adrenal Insufficiency Guideline", "Harrison 21e"]}}, "109-通論-其他-48": {"quick": "陣發性高血壓+頭痛+冒汗+心悸→嗜鉻細胞瘤;診斷查兒茶酚胺代謝物,影像查『腹部(腎上腺)』而非胸部,故錯誤為B(5P描述)與D(胸部CT/MRI)均給分。", "detail": {"background": "本例36歲、陣發性嚴重高血壓(200/130)+頭痛、冒汗、心悸、手抖→典型『嗜鉻細胞瘤(pheochromocytoma)』(腎上腺髓質分泌過量兒茶酚胺)。①好發年輕、難控制/陣發性高血壓(A正確);②經典『5P』:陣發性『高血壓(Pressure)』、頭痛(Pain)、心悸(Palpitation)、出汗(Perspiration)、面色蒼白(Pallor)──本題B把其中描述寫成胸痛/感覺異常(parethesia)等與標準5P不符(故B敘述有誤);③診斷查『血漿/尿液中游離甲基腎上腺素(metanephrines)與兒茶酚胺及其代謝物』(C正確);④影像定位應查『「腹部(腎上腺)」CT/MRI』(嗜鉻細胞瘤多在腎上腺),而非『胸部』(故D錯誤)。本題錯誤敘述為B與D(標準答案多重給分B、D)。治療:先α阻斷(phenoxybenzamine)再β阻斷,再手術切除。\\n\\n護理:嗜鉻細胞瘤避免單獨先用β阻斷(會高血壓危象);術前α阻斷與擴容;查metanephrines、腹部影像定位。", "options": {"A": "正確:嗜鉻細胞瘤好發年輕、難控制/陣發性高血壓。", "B": "錯誤(給分):5P應為Pressure/Pain(頭痛)/Palpitation/Perspiration/Pallor,本敘述不符。", "C": "正確:查尿/血中兒茶酚胺及代謝物(metanephrines)。", "D": "錯誤(給分):應查『腹部(腎上腺)』CT/MRI,非胸部。"}, "sources": ["Endocrine Society Pheochromocytoma Guideline", "Harrison 21e"]}}, "111-通論-5分科-66": {"quick": "原發性腎上腺功能不全(Addison)特徵為『皮膚色素沈積』(ACTH升高),故選C。", "detail": {"background": "原發性腎上腺功能不全(primary adrenal insufficiency, Addison):腎上腺本身被破壞→皮質醇與醛固酮『皆缺』。特徵:①醛固酮缺→保鈉排鉀失常→『低血鈉、「高」血鉀』(故A『低血鉀』、B『高血鈉』錯,方向相反);②皮質醇缺→負回饋使腦下垂體『ACTH「升高」』,ACTH/前驅物的黑色素細胞刺激作用→『皮膚與黏膜色素沈著(尤其皺褶、疤痕、口腔)』(C正確;故D『低ACTH』錯,原發性ACTH高);③低血壓、低血糖、疲倦、體重減輕。本題C正確。次發性(ACTH不足)則無色素沈著、無高血鉀。\\n\\n護理:Addison補糖皮質+礦物皮質,壓力加量防危象;辨識色素沈著、低血壓高血鉀。", "options": {"A": "錯誤:Addison為『高』血鉀(醛固酮缺),非低血鉀。", "B": "錯誤:Addison為『低』血鈉,非高血鈉。", "C": "正解:原發性(Addison)ACTH升高→皮膚色素沈積。", "D": "錯誤:原發性ACTH『升高』,非低ACTH(低ACTH屬次發性)。"}, "sources": ["Harrison 21e, Addison's disease", "Endocrine Society"]}}, "112-通論-其他-66": {"quick": "Addison氏病為低血鈉、『高』血鉀;『高血鈉』最不可能,故選C。", "detail": {"background": "愛迪生氏病(Addison's disease,原發性腎上腺功能不足):醛固酮缺→保鈉排鉀失常→『低血鈉、「高」血鉀』、低血壓脫水;皮質醇缺→低血糖、疲倦無力;ACTH升高→『皮膚色素沈著』(A正確,ACTH升高B正確,高血鉀D正確)。『高血鈉』與Addison相反(Addison是『低血鈉』)→『最不可能』(C為答案)。診斷:清晨皮質醇低、ACTH高、ACTH刺激試驗反應差。\\n\\n護理:Addison低血鈉高血鉀低血壓→補糖皮質+礦物皮質+生理食鹽水;危象急救;壓力加量。", "options": {"A": "皮膚色素沈積是Addison表現(ACTH升高)。", "B": "ACTH血中濃度升高是原發性Addison特徵。", "C": "最不可能(正解):Addison為低血鈉,非高血鈉。", "D": "高血鉀是Addison表現(醛固酮缺)。"}, "sources": ["Harrison 21e, Addison's disease", "Endocrine Society"]}}, "112-進階-內科-71": {"quick": "β阻斷劑會抑制腎素使ARR『假性「升高」』(非下降);故D『ARR假性下降』錯誤。", "detail": {"background": "原發性醛固酮增多症(primary aldosteronism,如腎上腺腺瘤Conn's或增生):①典型『高血壓+可能低血鉀(及代謝性鹼中毒)』(A正確,部分血鉀正常);②篩檢用『醛固酮/腎素比值(aldosterone-renin ratio, ARR)』──原發性醛固酮增多時醛固酮高、腎素被抑制低→ARR升高(B正確);③檢測前須『將低血鉀矯正至正常』(低血鉀會抑制醛固酮分泌造成假陰性)(C正確);④藥物干擾:『β阻斷劑會「抑制腎素」分泌→使腎素更低→ARR「假性升高」(偽陽性)』(故D『β阻斷劑使ARR假性「下降」』錯誤,為答案);而ACEI/ARB、利尿劑、MRA(spironolactone)會升高腎素使ARR假性下降(偽陰性),檢測前需停。本題D錯誤。\\n\\n護理:ARR篩檢前矯正血鉀、停干擾藥(MRA、利尿劑、ACEI/ARB);β阻斷劑使ARR假性升高需留意。", "options": {"A": "正確:原發性醛固酮增多常高血壓±低血鉀。", "B": "正確:應篩檢醛固酮/腎素比值(ARR)。", "C": "正確:檢測前應矯正血鉀至正常。", "D": "錯誤(正解):β阻斷劑抑制腎素使ARR『假性升高』,非下降。"}, "sources": ["Endocrine Society Primary Aldosteronism Guideline", "Harrison 21e"]}}, "113-通論-5分科-58": {"quick": "疲倦、食慾不振、體重減輕、皮膚變黑+低血鈉→愛迪生氏病(原發性腎上腺功能不足),故選C。", "detail": {"background": "本例:慢性疲倦、食慾不振、體重減輕、『皮膚變黑(色素沈著)』+『低血鈉』→典型『愛迪生氏病(Addison)』:腎上腺皮質醇與醛固酮缺乏,ACTH升高致皮膚色素沈著;醛固酮缺→低血鈉、高血鉀、低血壓;皮質醇缺→低血糖、疲倦、體重減輕。皮質醇過多症(Cushing)為體重『增加』、中心性肥胖(不符);甲狀腺低下為怕冷便秘體重增加(無皮膚變黑);甲狀腺亢進為體重減輕但皮膚溫濕、無色素沈著與低血鈉。本題C(愛迪生氏病)。\\n\\n護理:疑Addison查清晨皮質醇/ACTH/電解質;補充類固醇,危象急救。", "options": {"A": "甲狀腺低下為怕冷便秘體重增加,無皮膚變黑與低血鈉。", "B": "皮質醇過多症為體重增加、中心性肥胖,不符。", "C": "正解:疲倦體重減輕+皮膚變黑+低血鈉→愛迪生氏病。", "D": "甲狀腺亢進皮膚溫濕、無色素沈著與低血鈉。"}, "sources": ["Harrison 21e, Addison's disease", "Endocrine Society"]}}, "113-通論-家庭-74": {"quick": "Addison氏病為低血鈉高血鉀;『高血鈉』最不適當,故選C。", "detail": {"background": "(與112-其他-66同概念)愛迪生氏病(原發性腎上腺功能不足):醛固酮缺→『低血鈉、高血鉀』、低血壓;ACTH升高→皮膚色素沈著(A正確);低血壓(B正確);高血鉀(D正確)。『高血鈉(C)』與Addison相反(應為低血鈉)→最不適當(答案)。\\n\\n護理:Addison低血鈉高血鉀低血壓→類固醇補充+生理食鹽水;危象急救;壓力加量。", "options": {"A": "皮膚色素沈積是Addison表現。", "B": "低血壓是Addison表現。", "C": "最不適當(正解):Addison為低血鈉,非高血鈉。", "D": "高血鉀是Addison表現。"}, "sources": ["Harrison 21e, Addison's disease", "Endocrine Society"]}}, "105-TNPA-婦產科-63": {"quick": "PCOS常併高血脂、第二型糖尿病、高血壓/心血管疾病;與『肝硬化』無關,故選D。", "detail": {"background": "多囊性卵巢症候群(PCOS)是育齡女性常見的內分泌代謝疾病,核心為『高雄性素+排卵障礙+胰島素阻抗』。Rotterdam診斷(三取二):①稀少排卵/無排卵(月經稀少/不規則);②高雄性素的臨床(多毛、痤瘡)或生化表現;③超音波多囊卵巢型態;並須排除其他高雄性素原因(先天性腎上腺增生、庫欣、分泌雄性素腫瘤、泌乳素瘤、甲狀腺)。常合併『肥胖、第二型糖尿病/胰島素阻抗、血脂異常、高血壓、心血管疾病、代謝症候群、不孕、子宮內膜增生/癌風險』(但與肝硬化無關)。治療:減重/生活型態為首要;月經與內膜保護用『口服避孕藥(含雌/黃體素,抗雄性素)』;胰島素阻抗用metformin;助孕誘導排卵用『clomiphene(或letrozole)』。", "options": {"A": "高血脂症常與PCOS併發。", "B": "成人型(第二型)糖尿病常與PCOS併發。", "C": "高血壓及心血管疾病常與PCOS併發。", "D": "正解(不屬):肝硬化與PCOS無關。"}, "sources": ["Rotterdam Criteria; Endocrine Society PCOS", "Harrison 21e"]}}, "108a-TNPA-婦產科-33": {"quick": "PCOS常併高血脂、第二型糖尿病、心血管疾病;『肝硬化』較不常見/無關,故選B。", "detail": {"background": "多囊性卵巢症候群(PCOS)是育齡女性常見的內分泌代謝疾病,核心為『高雄性素+排卵障礙+胰島素阻抗』。Rotterdam診斷(三取二):①稀少排卵/無排卵(月經稀少/不規則);②高雄性素的臨床(多毛、痤瘡)或生化表現;③超音波多囊卵巢型態;並須排除其他高雄性素原因(先天性腎上腺增生、庫欣、分泌雄性素腫瘤、泌乳素瘤、甲狀腺)。常合併『肥胖、第二型糖尿病/胰島素阻抗、血脂異常、高血壓、心血管疾病、代謝症候群、不孕、子宮內膜增生/癌風險』(但與肝硬化無關)。治療:減重/生活型態為首要;月經與內膜保護用『口服避孕藥(含雌/黃體素,抗雄性素)』;胰島素阻抗用metformin;助孕誘導排卵用『clomiphene(或letrozole)』。", "options": {"A": "高血脂症常與PCOS併發。", "B": "正解(較不常見):肝硬化與PCOS無關。", "C": "成人型糖尿病常與PCOS併發。", "D": "高血壓及心血管疾病常與PCOS併發。"}, "sources": ["Rotterdam Criteria; Endocrine Society PCOS", "Harrison 21e"]}}, "108b-TNPA-婦產科-79": {"quick": "PCOS誘導排卵最優先(第一線)為口服排卵藥『clomiphene(或letrozole)』,故選D。", "detail": {"background": "多囊性卵巢症候群(PCOS)是育齡女性常見的內分泌代謝疾病,核心為『高雄性素+排卵障礙+胰島素阻抗』。Rotterdam診斷(三取二):①稀少排卵/無排卵(月經稀少/不規則);②高雄性素的臨床(多毛、痤瘡)或生化表現;③超音波多囊卵巢型態;並須排除其他高雄性素原因(先天性腎上腺增生、庫欣、分泌雄性素腫瘤、泌乳素瘤、甲狀腺)。常合併『肥胖、第二型糖尿病/胰島素阻抗、血脂異常、高血壓、心血管疾病、代謝症候群、不孕、子宮內膜增生/癌風險』(但與肝硬化無關)。治療:減重/生活型態為首要;月經與內膜保護用『口服避孕藥(含雌/黃體素,抗雄性素)』;胰島素阻抗用metformin;助孕誘導排卵用『clomiphene(或letrozole)』。 誘導排卵:第一線為口服『clomiphene citrate』(或letrozole,近年常更優先),搭配減重;對clomiphene阻抗者可加metformin或用注射型促性腺激素(hMG/FSH,屬第二線、需監測卵巢過度刺激)。hCG用於『破卵』而非誘導濾泡發育。本題第一線/最優先為clomiphene(D)。", "options": {"A": "hMG(促性腺激素)為第二線注射治療,非最優先。", "B": "GnRH therapy非PCOS誘導排卵的第一線。", "C": "hCG用於『破卵』,非誘導濾泡發育。", "D": "正解:誘導排卵最優先為口服排卵藥clomiphene。"}, "sources": ["Endocrine Society PCOS Guideline", "Williams Gynecology"]}}, "110-進階-婦產科-44": {"quick": "PCOS第一線非『雌激素拮抗男性素』;應以減重生活型態為首要、需先排除其他高雄原因、metformin改善胰島素,故A較不適當。", "detail": {"background": "多囊性卵巢症候群(PCOS)是育齡女性常見的內分泌代謝疾病,核心為『高雄性素+排卵障礙+胰島素阻抗』。Rotterdam診斷(三取二):①稀少排卵/無排卵(月經稀少/不規則);②高雄性素的臨床(多毛、痤瘡)或生化表現;③超音波多囊卵巢型態;並須排除其他高雄性素原因(先天性腎上腺增生、庫欣、分泌雄性素腫瘤、泌乳素瘤、甲狀腺)。常合併『肥胖、第二型糖尿病/胰島素阻抗、血脂異常、高血壓、心血管疾病、代謝症候群、不孕、子宮內膜增生/癌風險』(但與肝硬化無關)。治療:減重/生活型態為首要;月經與內膜保護用『口服避孕藥(含雌/黃體素,抗雄性素)』;胰島素阻抗用metformin;助孕誘導排卵用『clomiphene(或letrozole)』。", "options": {"A": "較不適當(正解):PCOS第一線非單用雌激素拮抗男性素;治療以減重、口服避孕藥(含抗雄)與對症為主。", "B": "適當:肥胖者減重/生活型態調整為首要建議。", "C": "適當:診斷PCOS需先排除其他高雄性素原因。", "D": "適當:metformin可改善PCOS的胰島素敏感性。"}, "sources": ["Endocrine Society/International PCOS Guideline", "Harrison 21e"]}}, "112-進階-婦產科-69": {"quick": "metformin可改善PCOS胰島素阻抗、助排卵、輔助減重,但對『多毛症』改善有限,故選D。", "detail": {"background": "多囊性卵巢症候群(PCOS)是育齡女性常見的內分泌代謝疾病,核心為『高雄性素+排卵障礙+胰島素阻抗』。Rotterdam診斷(三取二):①稀少排卵/無排卵(月經稀少/不規則);②高雄性素的臨床(多毛、痤瘡)或生化表現;③超音波多囊卵巢型態;並須排除其他高雄性素原因(先天性腎上腺增生、庫欣、分泌雄性素腫瘤、泌乳素瘤、甲狀腺)。常合併『肥胖、第二型糖尿病/胰島素阻抗、血脂異常、高血壓、心血管疾病、代謝症候群、不孕、子宮內膜增生/癌風險』(但與肝硬化無關)。治療:減重/生活型態為首要;月經與內膜保護用『口服避孕藥(含雌/黃體素,抗雄性素)』;胰島素阻抗用metformin;助孕誘導排卵用『clomiphene(或letrozole)』。 Metformin在PCOS的角色:改善『胰島素阻抗』、降血糖、輔助『減重』、可改善月經規則與『促進排卵(助孕)』;但對『多毛(hirsutism)』的改善效果『有限』(改善多毛主要靠口服避孕藥/抗雄性素如spironolactone)。故『改善多毛症』較不適當(D為答案)。", "options": {"A": "適當:改善胰島素抗阻性。", "B": "適當:可促進排卵。", "C": "適當:輔助減輕體重。", "D": "較不適當(正解):metformin對多毛症改善有限(需抗雄性素/口服避孕藥)。"}, "sources": ["Endocrine Society PCOS Guideline", "Harrison 21e"]}}, "113-進階-婦產科-72": {"quick": "Rotterdam診斷PCOS三條件為少排卵/無排卵、高雄性素表現、多囊卵巢型態;『血糖過高』不是診斷條件,故選B。", "detail": {"background": "多囊性卵巢症候群(PCOS)是育齡女性常見的內分泌代謝疾病,核心為『高雄性素+排卵障礙+胰島素阻抗』。Rotterdam診斷(三取二):①稀少排卵/無排卵(月經稀少/不規則);②高雄性素的臨床(多毛、痤瘡)或生化表現;③超音波多囊卵巢型態;並須排除其他高雄性素原因(先天性腎上腺增生、庫欣、分泌雄性素腫瘤、泌乳素瘤、甲狀腺)。常合併『肥胖、第二型糖尿病/胰島素阻抗、血脂異常、高血壓、心血管疾病、代謝症候群、不孕、子宮內膜增生/癌風險』(但與肝硬化無關)。治療:減重/生活型態為首要;月經與內膜保護用『口服避孕藥(含雌/黃體素,抗雄性素)』;胰島素阻抗用metformin;助孕誘導排卵用『clomiphene(或letrozole)』。 Rotterdam準則(三取二):①少排卵/無排卵;②高雄性素(臨床多毛痤瘡或生化);③超音波多囊卵巢型態。『高血糖/胰島素阻抗』雖『常併發』PCOS,但『不是診斷條件』(B為答案)。", "options": {"A": "少排卵/無排卵是Rotterdam條件。", "B": "正解(非條件):血糖過高是常見併發但非PCOS診斷條件。", "C": "高雄性素臨床表現是Rotterdam條件。", "D": "多囊卵巢型態是Rotterdam條件。"}, "sources": ["Rotterdam Criteria", "Endocrine Society PCOS"]}}, "113-進階-婦產科-63": {"quick": "黃體素測試(progesterone challenge)有撤退性出血代表體內『雌激素(E2)』充足且內膜有反應、流出道通暢,故主要確認『內源性雌激素足夠』,選D。", "detail": {"background": "無月經(閉經)評估常用『黃體素(progestin)挑戰試驗』:給予黃體素後停藥,若出現『撤退性出血』→代表①體內有『足夠的內源性雌激素(E2)』使子宮內膜增生、②子宮內膜能對荷爾蒙反應、③流出道(子宮頸/陰道)通暢。其主要目的是『評估「內源性雌激素」是否足夠』(D正確)。若無撤退性出血,則可能雌激素不足(下視丘/垂體/卵巢問題)或流出道阻塞/內膜問題。泌乳素、甲狀腺、體脂為閉經其他評估面向但非此測試直接確認的。本題D。\\n\\n護理:閉經評估先驗β-hCG排除懷孕,再查泌乳素、TSH、FSH/LH/E2;黃體素挑戰評估雌激素與流出道。", "options": {"A": "泌乳素過高是閉經原因之一,但非此測試確認的對象。", "B": "甲狀腺素為閉經評估面向,非黃體素測試直接確認。", "C": "體脂(下視丘性閉經)相關,但非此測試直接確認。", "D": "正解:黃體素測試主要確認內源性雌激素(E2)是否足夠。"}, "sources": ["Williams Gynecology, Amenorrhea workup", "Speroff Reproductive Endocrinology"]}}, "106-106a-內科-67": {"quick": "腦下垂體腫瘤壓迫視交叉(視神經交叉)→『雙顳側偏盲(bitemporal hemianopia)』,故選A。", "detail": {"background": "視神經交叉(optic chiasm)位於腦下垂體上方,交叉處走行的是來自『雙眼鼻側視網膜』的纖維(負責『顳側視野』)。腦下垂體腫瘤(如泌乳素瘤、無功能大腺瘤)向上長壓迫『視交叉中央』→雙眼鼻側纖維受損→『雙「顳」側視野缺損(bitemporal hemianopia,雙顳側偏盲)』(A正確)。這是垂體腫瘤的典型視野缺損。其他:視束/枕葉病變致同側偏盲;單眼問題致單眼視野缺損。本題A。\\n\\n護理:垂體腫瘤評估視野(對抗視交叉壓迫)、垂體前葉荷爾蒙(泌乳素等)、必要時MRI與手術(經蝶骨)。", "options": {"A": "正解:壓迫視交叉→雙顳側偏盲。", "B": "單顳側偏盲非視交叉中央壓迫的典型。", "C": "雙鼻側視野缺損見於視交叉外側受壓(罕見),非典型。", "D": "單鼻側視野缺損非垂體腫瘤典型。"}, "sources": ["Harrison 21e, Pituitary tumors/Visual field", "Williams Endocrinology"]}}, "108b-TNPA-外科-71": {"quick": "垂體腫瘤壓迫『視交叉』→雙顳側偏盲,故選A。", "detail": {"background": "腦下垂體腫瘤向上生長壓迫『視交叉(optic chiasm)』,使來自雙眼鼻側視網膜(負責顳側視野)的交叉纖維受損→『雙顳側偏盲(bitemporal hemianopia)』(A正確)。①壓迫『枕葉』致同側偏盲(非顳側偏盲)(B錯);②『雙鼻側』視野缺損需『視交叉兩外側』受壓(罕見,如雙側頸內動脈瘤),非中央壓迫(C錯);③第III/IV/VI腦神經麻痺(海綿竇侵犯)致眼球運動障礙/複視,非『雙鼻側視野缺損』(D錯)。本題A正確。\\n\\n護理:垂體腫瘤查視野、垂體功能、MRI;急性出血(垂體中風)頭痛視力惡化為急症。", "options": {"A": "正解:雙顳側偏盲因腫瘤壓迫視交叉。", "B": "錯誤:壓迫枕葉致同側偏盲,非雙顳側偏盲。", "C": "錯誤:雙鼻側缺損需視交叉外側受壓(罕見),非中央壓迫。", "D": "錯誤:第III/IV/VI腦神經受損致眼動障礙/複視,非雙鼻側視野缺損。"}, "sources": ["Harrison 21e, Pituitary tumors", "Williams Endocrinology"]}}, "109-進階-外科-41": {"quick": "泌乳素瘤(壓迫視交叉)→雙顳側偏盲、月經不規則、乳漏;『尿崩症』不常出現(尿崩多為後葉受損,前葉腺瘤少見),故選D。", "detail": {"background": "本例35歲女性、視力模糊、MRI見腦下垂體腫瘤壓迫視神經、『催乳激素(prolactin)高』→『泌乳素瘤(prolactinoma,前葉腺瘤)』。常見表現:①壓迫視交叉→『雙顳側偏盲』(A常見);②高泌乳素抑制GnRH→『月經不規則/閉經、不孕』(B常見);③『乳漏(galactorrhea)』(C常見)。『尿崩症(diabetes insipidus,抗利尿激素ADH不足)』屬『腦下垂體「後葉」/下視丘』受損,『泌乳素瘤(前葉腺瘤)很少造成尿崩』(除非大腫瘤壓迫下視丘/術後)──故『尿崩症不常出現』(D為答案)。治療泌乳素瘤首選『多巴胺促效劑(cabergoline/bromocriptine)』。\\n\\n護理:泌乳素瘤多以藥物(多巴胺促效劑)治療、追蹤泌乳素與視野/MRI;前葉腺瘤少見尿崩。", "options": {"A": "雙顳側偏盲常見(壓迫視交叉)。", "B": "月經不規則常見(高泌乳素抑制GnRH)。", "C": "乳漏常見(高泌乳素)。", "D": "正解(不常出現):尿崩症屬後葉/下視丘受損,泌乳素瘤(前葉)少見。"}, "sources": ["Endocrine Society Prolactinoma Guideline", "Harrison 21e"]}}, "105-TNPA-通論-74": {"quick": "副甲狀腺切除術後突發Chvostek/Trousseau徵象→低血鈣,故選C。", "detail": {"background": "低血鈣使神經肌肉興奮性增加,出現感覺異常(口周/指尖麻)、手足搐搦(tetany)、Chvostek徵象(輕敲耳前顏面神經→同側臉部肌肉抽動)、Trousseau徵象(血壓計壓脈帶加壓使前臂缺血數分鐘→腕部痙攣),嚴重可喉痙攣、抽搐、QT延長心律不整。副甲狀腺切除或甲狀腺切除誤傷副甲狀腺→PTH不足→低血鈣。治療:急性有症狀給靜脈鈣(calcium gluconate),慢性口服鈣+活性維生素D(calcitriol)。本例iPTH過高(副甲亢進)接受副甲狀腺切除後,PTH驟降→『低血鈣』,出現Chvostek/Trousseau。\\n\\n護理:副甲/甲狀腺術後監測血鈣與低血鈣徵象,備靜脈鈣。", "options": {"A": "低血鎂可致低血鈣但本例直接因副甲切除致PTH降低引發低血鈣。", "B": "低血鉀不引起Chvostek/Trousseau。", "C": "正解:副甲切除後PTH降低→低血鈣→Chvostek/Trousseau。", "D": "高血鈣表現為神經肌肉抑制(無力便祕),與搐搦相反。"}, "sources": ["Harrison 21e, Hypocalcemia", "Endocrine Society"]}}, "106-106a-內科-3": {"quick": "甲狀腺切除後嘴唇感覺異常+手指強直(tetany)→副甲狀腺受損致低血鈣,故選A。", "detail": {"background": "低血鈣使神經肌肉興奮性增加,出現感覺異常(口周/指尖麻)、手足搐搦(tetany)、Chvostek徵象(輕敲耳前顏面神經→同側臉部肌肉抽動)、Trousseau徵象(血壓計壓脈帶加壓使前臂缺血數分鐘→腕部痙攣),嚴重可喉痙攣、抽搐、QT延長心律不整。副甲狀腺切除或甲狀腺切除誤傷副甲狀腺→PTH不足→低血鈣。治療:急性有症狀給靜脈鈣(calcium gluconate),慢性口服鈣+活性維生素D(calcitriol)。甲狀腺切除時副甲狀腺可能被一併切除或缺血→PTH不足→低血鈣,出現口周感覺異常與手足搐搦。\\n\\n護理:甲狀腺術後監測血鈣(術後24–48小時),口周麻/搐搦即驗鈣並補鈣。", "options": {"A": "正解:甲狀腺術後副甲受損致低血鈣症(口周麻+tetany)。", "B": "低血鈉以意識改變為主,非手足搐搦。", "C": "高血鉀以肌無力/心律不整為主,非tetany。", "D": "高血磷本身少直接致tetany(低血鈣才是)。"}, "sources": ["Harrison 21e, Postoperative Hypocalcemia", "Sabiston"]}}, "106-106a-外科-48": {"quick": "血清鈣極高(25)+PTH須查→原發性副甲亢進(多為單一腺瘤);此非『次發性』,故B錯誤。", "detail": {"background": "高血鈣鑑別:①『原發性副甲狀腺機能亢進(primary hyperparathyroidism)』──副甲狀腺『腺瘤(約85%為單一腺瘤)』自主分泌PTH→高血鈣、低血磷、PTH升高,好發停經後女性,可致骨質流失、腎結石;②『惡性腫瘤』(PTHrP或溶骨)是住院病人高血鈣最常見;③『次發性副甲亢進』見於『慢性腎衰竭/維生素D缺乏』,特徵是『血鈣「低或正常」+PTH升高』(代償),『不會有高血鈣』。本例血鈣25(極高)→應查iPTH(A正確)、約85%為單一腺瘤(C正確)、符合手術轉介標準(D正確,高血鈣明顯);『B說「可能是次發性副甲亢進」錯誤』──次發性血鈣不會高(為答案)。本題B錯誤。\\n\\n護理:高血鈣查PTH區分原發(PTH高)vs惡性(PTH低/PTHrP);原發性副甲亢進高血鈣明顯者手術。", "options": {"A": "正確:高血鈣須監測iPTH(原發性副甲亢進PTH升高)。", "B": "錯誤(正解):次發性副甲亢進血鈣低/正常,不會高血鈣25。", "C": "正確:原發性副甲亢進約85%為單一腺瘤。", "D": "正確:明顯高血鈣符合外科轉介標準。"}, "sources": ["Harrison 21e, Hyperparathyroidism", "Endocrine Society"]}}, "108a-TNPA-通論-5": {"quick": "高血鈣(11)矯正:0.9%生理食鹽水擴容+furosemide利尿促鈣排出,故選B。", "detail": {"background": "『高血鈣(hypercalcemia)』治療(尤其有症狀:噁心、多尿、便祕、肌無力、反射減弱、意識變化):①『大量0.9%生理食鹽水補液(擴容)』恢復腎灌流並促進鈣排出為第一步;②補足水分後可加『環利尿劑furosemide』增加尿鈣排出(避免thiazide──thiazide「保鈣」會「升」血鈣,故禁用);③嚴重/惡性可加bisphosphonate、calcitonin;④停鈣與維生素D補充。本例自行補鈣致高血鈣11→『0.9% NS + furosemide』(B)。A的『thiazide』會加重高血鈣(錯);補鎂、胰島素非高血鈣治療。\\n\\n護理:高血鈣大量NS補液+furosemide(非thiazide)、停鈣/維D、嚴重者bisphosphonate;監測心電圖(短QT)。", "options": {"A": "thiazide會保鈣升高血鈣,禁用於高血鈣,錯誤。", "B": "正解:0.9%生理食鹽水擴容+furosemide促鈣排出。", "C": "補鎂非高血鈣治療。", "D": "胰島素非高血鈣治療(用於高血鉀)。"}, "sources": ["Harrison 21e, Hypercalcemia treatment", "Endocrine Society"]}}, "108a-TNPA-內科-27": {"quick": "囊狀纖維化骨炎(osteitis fibrosa cystica)為副甲狀腺功能亢進(PTH過多溶骨)所致,故選C。", "detail": {"background": "『囊狀纖維化骨炎(osteitis fibrosa cystica)』是『副甲狀腺機能亢進』長期『PTH過多』使破骨活性增加、骨吸收→骨內纖維化、囊腫與『棕色瘤(brown tumor)』,X光見骨膜下骨吸收(指骨橈側)、頭顱『鹽與胡椒(salt-and-pepper)』樣、骨密度下降。可見於原發性(腺瘤)或續發性(慢性腎衰竭的腎性骨病)副甲亢進。故為『副甲狀腺功能亢進』(C)。甲狀腺亢進雖增加骨轉換但不致典型osteitis fibrosa cystica;副甲低下為低血鈣。本題C。\\n\\n護理:副甲亢進監測血鈣/PTH/骨密度;腎性骨病控制磷/維D/PTH;原發性高血鈣者手術。", "options": {"A": "甲狀腺亢進增加骨轉換,但非典型囊狀纖維化骨炎之因。", "B": "甲狀腺低下不致此。", "C": "正解:副甲狀腺功能亢進(PTH過多溶骨)致囊狀纖維化骨炎。", "D": "副甲狀腺低下為低血鈣,非此。"}, "sources": ["Harrison 21e, Hyperparathyroidism/Osteitis fibrosa cystica", "Brenner & Rector (renal osteodystrophy)"]}}, "108a-TNPA-外科-56": {"quick": "甲狀腺術後『暫時性低血鈣』可口服carbonate鈣(1g TID)數週治療,故選C。", "detail": {"background": "甲狀腺切除術後併發症處理:①『術後出血→頸部血腫壓迫氣道』是急症,應『立即「拆開傷口縫線」減壓並送開刀房』,不一定要立刻外科氣道(故A『需立即建立外科呼吸道』過於絕對);②『單側喉返神經損傷』致單側聲帶麻痺/聲音沙啞,『不一定需即刻插管』(雙側才致氣道阻塞需處置)(故B錯);③『術後「暫時性低血鈣」(副甲受損/缺血)』可『口服碳酸鈣(calcium carbonate 1g TID)±活性維生素D』治療數週,多數可恢復(C正確);④單側喉返神經誤斷不需立即氣切(D錯)。本題C正確。\\n\\n護理:甲狀腺術後監測血腫(拆線減壓)、聲音(喉返神經)、低血鈣(口周麻/Chvostek→口服或靜脈鈣)。", "options": {"A": "術後血腫應先拆線減壓,非一律立即建立外科呼吸道。", "B": "單側喉返神經損傷致沙啞,不一定需即刻插管。", "C": "正解:術後暫時性低血鈣可口服碳酸鈣(1g TID)數週。", "D": "單側喉返神經誤斷不需立即氣切。"}, "sources": ["Sabiston, Thyroidectomy complications", "Harrison 21e"]}}, "108a-TNPA-通論-64": {"quick": "偽低血鈣常因低白蛋白血症(總鈣低但游離鈣正常),故A正確;Chvostek/Trousseau定義與低血鈣須查血鎂,選項互換或錯置。", "detail": {"background": "低血鈣判讀:①血中鈣約一半與白蛋白結合,『低白蛋白血症會使「總鈣」偏低但「游離(離子)鈣」正常』→『偽低血鈣(pseudohypocalcemia)』,須以白蛋白校正或測游離鈣(A正確);②『Chvostek徵象』=『輕敲「耳前顏面神經」→同側臉部肌肉抽動』(本題B把它描述成壓脈帶/腕痙攣是錯);③『Trousseau徵象』=『血壓計壓脈帶加壓數分鐘致前臂缺血→「腕部痙攣」』(本題C把它描述成敲臉是錯,描述互換);④治療低血鈣時應『同時檢查並矯正「血鎂」』(低血鎂會致頑固性低血鈣與PTH分泌/作用受損),非『血鉀』(故D『查血鉀』不精確,應為血鎂)。本題以A為正確。\\n\\n護理:低白蛋白者用校正鈣或游離鈣;低血鈣同時查並補鎂;Chvostek敲臉、Trousseau壓脈帶。", "options": {"A": "正解:偽低血鈣常因低白蛋白血症(總鈣低、游離鈣正常)。", "B": "錯誤:此描述為Trousseau(壓脈帶腕痙攣),非Chvostek(敲臉)。", "C": "錯誤:此描述為Chvostek(敲臉),非Trousseau。", "D": "低血鈣應同時查『血鎂』(非血鉀)。"}, "sources": ["Harrison 21e, Hypocalcemia (Chvostek/Trousseau; albumin correction; magnesium)"]}}, "110-進階-內科-1": {"quick": "校正鈣=測得鈣+0.8×(4−白蛋白)=2.0+0.8×(4−2.5)=3.2,故選D。", "detail": {"background": "血鈣校正公式(低白蛋白時):『校正鈣(mg/dL)=測得總鈣 + 0.8 ×(4.0 − 血清白蛋白)』。本例測得鈣2.0、白蛋白2.5→校正鈣=2.0+0.8×(4.0−2.5)=2.0+0.8×1.5=2.0+1.2=『3.2 mg/dL』(D)。(註:本題數值偏低,重點在公式應用;每白蛋白低1 g/dL,總鈣約低0.8 mg/dL,故須校正以反映真實鈣狀態,或直接測游離鈣。)\\n\\n護理:低白蛋白病人解讀血鈣須校正或測游離鈣,避免誤判低血鈣。", "options": {"A": "1.8未套用校正公式。", "B": "2.4計算錯誤。", "C": "2.8計算錯誤。", "D": "正解:2.0+0.8×(4−2.5)=3.2。"}, "sources": ["Harrison 21e, Corrected calcium formula"]}}, "110-進階-內科-51": {"quick": "慢性腎衰竭透析+iPTH升高+血鈣低/正常+高血磷→繼發性副甲狀腺功能亢進,故選C。", "detail": {"background": "慢性腎臟病-礦物質骨病(CKD-MBD):腎衰竭→①磷排出減少→『高血磷』;②活性維生素D(calcitriol)生成減少→腸鈣吸收↓→『低/正常血鈣』;③低鈣+高磷+低維D刺激副甲狀腺→『PTH代償性升高=「繼發性(secondary)副甲狀腺功能亢進」』(C)。本例iPTH 420、血鈣8.2(低/正常)、血磷8.2(高)、透析→繼發性副甲亢進(腎性骨病)。對比:①原發性副甲亢進=血鈣『高』+PTH高;②『三發性(tertiary)』=長期繼發性後副甲狀腺自主化→血鈣轉為『高』+PTH極高;④偽副甲低下=PTH高但對PTH阻抗、低血鈣高血磷(遺傳)。本例血鈣不高→繼發性。治療:控磷(磷結合劑)、活性維生素D/calcimimetic(cinacalcet)。\\n\\n護理:CKD-MBD控制磷(飲食+磷結合劑)、補活性維D、降PTH;監測鈣磷PTH。", "options": {"A": "原發性副甲亢進血鈣『高』,本例血鈣不高,不符。", "B": "偽副甲低下為低血鈣高磷但PTH高且對PTH阻抗(遺傳),非透析所致。", "C": "正解:CKD透析+高磷+低/正常鈣+PTH高→繼發性副甲亢進。", "D": "三發性副甲亢進血鈣轉為『高』,本例血鈣不高,尚屬繼發性。"}, "sources": ["KDIGO CKD-MBD", "Harrison 21e, Secondary Hyperparathyroidism"]}}, "110-進階-外科-59": {"quick": "甲狀腺術後出血常發生在『術後6小時內』(急症),故A正確。", "detail": {"background": "甲狀腺切除術後併發症時序:①『出血/頸部血腫』多發生在『術後6–24小時內(尤其6小時內)』,血腫壓迫氣道是急症,須立即拆線減壓(A正確);②『低血鈣(副甲受損)』通常在術後『24–72小時』出現,且多見於『「雙側」全甲狀腺切除』(單側切除較少低血鈣,因對側副甲仍在)(故B『單側切除術後低血鈣』較不正確);③『喉返神經損傷』致聲音沙啞是『術後立即』出現(非數週後)(故C『數週才產生』錯);④喉返神經損傷的危險因子是『再次手術、惡性腫瘤侵犯、大甲狀腺腫、手術技術』,『非年紀大及男性』(故D錯)。本題A正確。\\n\\n護理:甲狀腺術後密切觀察頸部腫脹出血(6小時內)、聲音(喉返神經)、低血鈣(24–72小時),備緊急拆線與氣道。", "options": {"A": "正解:甲狀腺術後出血常發生在術後6小時內。", "B": "低血鈣多見於『雙側』全切除、術後24–72小時,單側較少。", "C": "喉返神經損傷致沙啞為術後立即出現,非數週後。", "D": "喉返神經損傷危險因子非年紀大/男性,而是再手術/惡性/大甲狀腺腫。"}, "sources": ["Sabiston, Thyroidectomy complications", "Harrison 21e"]}}, "110-通論-其他-59": {"quick": "全甲狀腺切除後臉部感覺異常+敲臉肌肉收縮(Chvostek)→低血鈣(副甲受損),故選D。", "detail": {"background": "低血鈣使神經肌肉興奮性增加,出現感覺異常(口周/指尖麻)、手足搐搦(tetany)、Chvostek徵象(輕敲耳前顏面神經→同側臉部肌肉抽動)、Trousseau徵象(血壓計壓脈帶加壓使前臂缺血數分鐘→腕部痙攣),嚴重可喉痙攣、抽搐、QT延長心律不整。副甲狀腺切除或甲狀腺切除誤傷副甲狀腺→PTH不足→低血鈣。治療:急性有症狀給靜脈鈣(calcium gluconate),慢性口服鈣+活性維生素D(calcitriol)。本例雙側全甲狀腺切除後副甲狀腺受損→PTH不足→『低血鈣』,出現臉部感覺異常與『Chvostek徵象(敲擊耳前顏面神經→同側臉部肌肉收縮)』。\\n\\n護理:甲狀腺全切除後監測血鈣與Chvostek/Trousseau,補鈣+活性維生素D。", "options": {"A": "高血鉀不致Chvostek。", "B": "低血鉀不致Chvostek。", "C": "高血鈣為神經肌肉抑制(無力),與Chvostek相反。", "D": "正解:全甲狀腺切除致副甲受損→低血鈣→Chvostek徵象。"}, "sources": ["Harrison 21e, Postoperative Hypocalcemia"]}}, "111-進階-內科-17": {"quick": "Chvostek與Trousseau徵象(低血鈣)最可能發生在『副甲狀腺切除手術』後,故選A。", "detail": {"background": "低血鈣使神經肌肉興奮性增加,出現感覺異常(口周/指尖麻)、手足搐搦(tetany)、Chvostek徵象(輕敲耳前顏面神經→同側臉部肌肉抽動)、Trousseau徵象(血壓計壓脈帶加壓使前臂缺血數分鐘→腕部痙攣),嚴重可喉痙攣、抽搐、QT延長心律不整。副甲狀腺切除或甲狀腺切除誤傷副甲狀腺→PTH不足→低血鈣。治療:急性有症狀給靜脈鈣(calcium gluconate),慢性口服鈣+活性維生素D(calcitriol)。Chvostek/Trousseau是『低血鈣』的徵象;手術中最直接造成低血鈣的是『副甲狀腺切除』(PTH來源被移除)。甲狀腺切除也可能因誤傷副甲致低血鈣,但『副甲狀腺切除』是更直接的原因(本題A)。卵巢、胸腺切除與鈣代謝無關。\\n\\n護理:副甲/甲狀腺術後監測血鈣與低血鈣徵象,備靜脈鈣。", "options": {"A": "正解:副甲狀腺切除直接移除PTH來源→低血鈣→Chvostek/Trousseau。", "B": "甲狀腺切除可能誤傷副甲致低血鈣,但副甲切除更直接。", "C": "卵巢切除與鈣代謝無關。", "D": "胸腺切除與鈣代謝無關。"}, "sources": ["Harrison 21e, Hypocalcemia", "Sab
