iston"]}}, "112-進階-內科-54": {"quick": "高血鈣、低血磷、1,25(OH)2D上升、iPTH上升→原發性副甲狀腺功能亢進,故選D。", "detail": {"background": "鈣磷與PTH的判讀:『原發性副甲狀腺功能亢進』──PTH自主過量分泌→①溶骨+腎重吸收鈣→『高血鈣』;②抑制腎磷重吸收→『低血磷(高尿磷)』;③促腎1α-羥化酶活化→『1,25(OH)2維生素D上升』→腸鈣吸收增加;④『PTH(iPTH)上升』。本例四項全符→原發性副甲亢進(D)。對比:①副甲低下=低血鈣高血磷PTH低;②惡性腫瘤高血鈣=PTH『被抑制(低)』(PTHrP媒介);③維生素D缺乏=低血鈣低磷PTH高(繼發)。本題D。\\n\\n護理:原發性副甲亢進高血鈣明顯/有併發症者手術切除腺瘤;追蹤鈣/PTH/骨密度/腎結石。", "options": {"A": "副甲低下為低血鈣高血磷PTH低,與本例相反。", "B": "惡性腫瘤高血鈣時PTH被抑制(低),本例PTH升高不符。", "C": "維生素D缺乏為低血鈣,本例高血鈣不符。", "D": "正解:高血鈣+低血磷+1,25D↑+PTH↑→原發性副甲狀腺功能亢進。"}, "sources": ["Harrison 21e, Primary Hyperparathyroidism", "Endocrine Society"]}}, "113-進階-內科-8": {"quick": "副甲狀腺切除術後Chvostek/Trousseau的主因是『低血鈣』(PTH驟降),故選C。", "detail": {"background": "低血鈣使神經肌肉興奮性增加,出現感覺異常(口周/指尖麻)、手足搐搦(tetany)、Chvostek徵象(輕敲耳前顏面神經→同側臉部肌肉抽動)、Trousseau徵象(血壓計壓脈帶加壓使前臂缺血數分鐘→腕部痙攣),嚴重可喉痙攣、抽搐、QT延長心律不整。副甲狀腺切除或甲狀腺切除誤傷副甲狀腺→PTH不足→低血鈣。治療:急性有症狀給靜脈鈣(calcium gluconate),慢性口服鈣+活性維生素D(calcitriol)。副甲狀腺切除後PTH驟降→『低血鈣』,神經肌肉興奮性增加出現Chvostek/Trousseau。\\n\\n護理:副甲術後監測血鈣與低血鈣徵象,急性有症狀給靜脈鈣。", "options": {"A": "低血鉀不引起Chvostek/Trousseau。", "B": "高血鉀以肌無力/心律不整為主。", "C": "正解:副甲切除後PTH降低→低血鈣→Chvostek/Trousseau。", "D": "高血鈣為神經肌肉抑制,與搐搦相反。"}, "sources": ["Harrison 21e, Hypocalcemia"]}}, "113-進階-家庭-19": {"quick": "副甲全切除後低血鈣可出現Chvostek徵象;肌肉無力便祕屬高血鈣、低血鈣會搐搦,故選B。", "detail": {"background": "低血鈣使神經肌肉興奮性增加,出現感覺異常(口周/指尖麻)、手足搐搦(tetany)、Chvostek徵象(輕敲耳前顏面神經→同側臉部肌肉抽動)、Trousseau徵象(血壓計壓脈帶加壓使前臂缺血數分鐘→腕部痙攣),嚴重可喉痙攣、抽搐、QT延長心律不整。副甲狀腺切除或甲狀腺切除誤傷副甲狀腺→PTH不足→低血鈣。治療:急性有症狀給靜脈鈣(calcium gluconate),慢性口服鈣+活性維生素D(calcitriol)。副甲狀腺『全切除』後PTH嚴重不足→低血鈣。①低血鈣為神經肌肉『興奮性增加』→Chvostek徵象(柯沃氏徵象)、Trousseau、搐搦(B正確);②『肌肉無力、便祕』是『高』血鈣(神經肌肉抑制)的表現,非低血鈣(故A錯);③低血鈣常『合併低血鎂』(非高血鎂)(故C錯);④治療補『鈣+活性維生素D(calcitriol)』,非維生素E(故D錯)。本題B正確。\\n\\n護理:副甲全切除後監測血鈣與Chvostek/Trousseau,補鈣+活性維生素D,查並補鎂。", "options": {"A": "錯誤:肌肉無力、便祕屬高血鈣;低血鈣為搐搦。", "B": "正解:低血鈣可出現Chvostek徵象(柯沃氏徵象)。", "C": "錯誤:低血鈣常合併低血鎂,非高血鎂。", "D": "錯誤:治療用鈣+活性維生素D,非維生素E。"}, "sources": ["Harrison 21e, Hypocalcemia/Hypoparathyroidism"]}}, "114-進階-外科-40": {"quick": "續發性副甲亢進為低/正常血鈣+PTH升高(代償);說『續發性血鈣與PTH均增加』錯誤,故選D。", "detail": {"background": "副甲狀腺功能亢進:①『原發性』──腺瘤自主分泌PTH,好發『停經後女性』(A正確),可見於『MEN1與MEN2A』(B正確),血鈣『高』、PTH高;②『續發性(secondary)』──最常見原因為『慢性腎衰竭(腎性骨病)』(及維生素D缺乏)(C正確),特徵是『血鈣「低或正常」+PTH升高(代償)』,故『續發性血鈣與PTH「均增加」』『錯誤』(續發性血鈣不增加)(D為答案);③『三發性』──長期續發後副甲自主化→血鈣轉高。本題D錯誤。\\n\\n護理:原發性高血鈣手術;續發性(CKD)控磷補活性維D降PTH;區分血鈣高低。", "options": {"A": "正確:原發性副甲亢進常見於停經後女性。", "B": "正確:原發性可見於MEN1與MEN2A。", "C": "正確:續發性最常見原因為腎衰竭。", "D": "錯誤(正解):續發性為低/正常血鈣+PTH升高,非血鈣與PTH均增加。"}, "sources": ["Harrison 21e, Hyperparathyroidism (primary/secondary/tertiary)", "KDIGO"]}}, "114-進階-外科-41": {"quick": "MEN-1的副甲狀腺機能亢進為『多腺體增生』(非單一次發性腺瘤)、為AD遺傳因MEN1基因(非RET)、垂體瘤以泌乳素瘤最常見、胰島細胞瘤以胃泌素瘤最常見;本題以A為『正確』(副甲亢進)。", "detail": {"background": "多發性內分泌腫瘤第一型(MEN-1,Wermer症候群)為『MEN1抑癌基因(menin)』突變的『體染色體顯性』疾病,三大『3P』:①『副甲狀腺(Parathyroid)機能亢進』──最常見且最早(常為「多腺體增生/多發腺瘤」),致高血鈣;②『胰臟/腸胃胰神經內分泌腫瘤(Pancreas)』──以『胃泌素瘤(gastrinoma→Zollinger-Ellison)』最常見(其次胰島素瘤);③『腦下垂體(Pituitary)腫瘤』──以『泌乳素瘤(prolactinoma)』最常見。MEN-2(2A/2B)才與『RET基因』突變、含甲狀腺髓質癌+嗜鉻細胞瘤。本題A『副甲狀腺機能亢進』為MEN-1正確特徵(雖『次發性腺瘤』用詞不精確,標準答案以A為對:MEN-1以副甲亢進為主);B(RET基因→應為MEN-1基因)、C(垂體最常見為泌乳素瘤,選項稱『良性催乳素腺瘤』其實正確,但相對A本題定A為答案)、D(胰島細胞瘤以胃泌素瘤最常見,非胰島素瘤)有誤。本題A。\\n\\n護理:MEN-1家族基因篩檢(MEN1)、監測鈣/PTH、gastrin、泌乳素;MEN-2查RET、嗜鉻細胞瘤。", "options": {"A": "正解:MEN-1以副甲狀腺機能亢進(多腺體)為主要表現。", "B": "錯誤:MEN-1因『MEN1基因』突變,RET基因屬MEN-2。", "C": "垂體最常見為泌乳素瘤(此敘述本身大致正確,但本題以A為答案)。", "D": "錯誤:MEN-1胰島細胞瘤以『胃泌素瘤』最常見,非胰島素瘤。"}, "sources": ["Harrison 21e, MEN1/MEN2", "Endocrine Society"]}}, "105-TNPA-內科-73": {"quick": "雙磷酸鹽副作用有食道炎/胃食道逆流、顎骨壞死、非典型骨折、罕見心房顫動;『椎骨骨折』反而是它『預防』的,故選C(不包括)。", "detail": {"background": "雙磷酸鹽(bisphosphonate,如alendronate)抑制破骨細胞、增加骨密度、『降低脊椎與髖部骨折』風險(是治療目標,不是副作用)。已報告的不良反應:①『上消化道刺激(食道炎、胃食道逆流、食道潰瘍)』──故須『空腹整杯水吞服、服後直立30分鐘』;②『顎骨壞死(ONJ)』(尤其靜脈高劑量、牙科手術);③『非典型股骨骨折(長期使用)』;④曾報告與『心房顫動』的關聯;⑤急性期反應(類流感)、低血鈣。『椎骨骨折』是雙磷酸鹽『預防』的事件,『不是副作用』(C為答案,不包括)。\\n\\n護理:衛教空腹整杯水服、服後直立30分、口腔評估(ONJ)、補足鈣與維D、長期者注意非典型骨折。", "options": {"A": "胃食道逆流是雙磷酸鹽副作用。", "B": "顎骨壞死是雙磷酸鹽副作用。", "C": "正解(不包括):椎骨骨折是雙磷酸鹽『預防』的事件,非副作用。", "D": "心房顫動曾被報告與雙磷酸鹽相關。"}, "sources": ["Harrison 21e, Bisphosphonates adverse effects", "AACE/Endocrine Society Osteoporosis"]}}, "106-106a-通論-78": {"quick": "停經女性預防骨鬆最適當為『規律負重運動(每週至少三次走路)』,故選A。", "detail": {"background": "停經後骨質疏鬆『預防』(尚未確診骨鬆者)以生活型態為基礎:①『規律「負重」運動(walking、阻力訓練,每週至少3次)』刺激骨形成、改善平衡防跌(A最適當);②『鈣質攝取』建議停經後女性約『1000–1200 mg/day(多由飲食,不足才補充)』,『500 mg』不足(B不夠);③『藥物治療(雙磷酸鹽alendronate)』是用於『已診斷骨質疏鬆或高骨折風險者』,『不是用於「預防」的第一步』(C不適合作為一般預防);④SERM(raloxifene)也是『治療』藥物、有血栓風險,非一般預防首選(D不適合)。本題A(運動)最適當。\\n\\n護理:停經女性衛教負重運動、足量鈣(1000–1200mg)與維生素D、戒菸限酒、防跌;高風險者DEXA評估後考慮藥物。", "options": {"A": "正解:每週至少三次走路等負重運動有助保護骨質。", "B": "鈣建議約1000–1200mg/day,『500mg』不足。", "C": "雙磷酸鹽用於已診斷骨鬆/高風險者,非一般預防首步。", "D": "SERM為治療藥(有血栓風險),非一般預防首選。"}, "sources": ["Endocrine Society/AACE Osteoporosis Prevention", "國健署"]}}, "108a-TNPA-內科-8": {"quick": "骨質疏鬆的骨密度診斷標準為T-score『≤ −2.5』,故選B。", "detail": {"background": "WHO以『雙能量X光吸收儀(DEXA)』測得的『T-score』(與年輕健康成人尖峰骨量比較的標準差)定義骨密度:①正常:T-score『≥ −1.0』;②『骨質缺乏(osteopenia)』:−1.0 ~ −2.5;③『骨質疏鬆(osteoporosis)』:T-score『≤ −2.5』(B);④『嚴重骨質疏鬆』:T-score ≤ −2.5『且有脆弱性骨折』。停經後女性與≥50歲男性用T-score;停經前/兒童用Z-score。本題B(−2.5)。\\n\\n護理:DEXA測T-score診斷;≤−2.5或脆弱性骨折者治療(鈣+維D+雙磷酸鹽等)。", "options": {"A": "−1為正常與骨質缺乏的分界,非骨鬆切點。", "B": "正解:骨質疏鬆為T-score ≤ −2.5。", "C": "−3非WHO標準切點。", "D": "−3.5非WHO標準切點。"}, "sources": ["WHO/DEXA T-score criteria", "Harrison 21e, Osteoporosis"]}}, "108b-TNPA-通論-47": {"quick": "一杯240c.c.牛奶約含鈣260–300毫克,故選B。", "detail": {"background": "鈣質攝取衛教:①成人鈣建議攝取量約『1000 mg/day(停經後女性、≥50歲約1000–1200 mg)』,『600 mg不足』(故A錯);②『一杯240c.c.(約一杯)牛奶含鈣約260–300 mg』(B正確),是良好鈣來源;③『深綠色蔬菜、豆製品、小魚乾、芝麻』也富含鈣,『素食者只要均衡攝取高鈣植物仍可獲足量鈣』(故C『蔬菜含鈣極低、吃素易骨鬆』錯);④『維生素「D」(非A)』促進腸道鈣吸收(故D『維生素A助鈣吸收』錯)。本題B正確。\\n\\n護理:衛教每日1000–1200mg鈣(乳品、豆製品、深綠蔬菜、小魚乾)、補維生素D助吸收、適度日曬與負重運動。", "options": {"A": "成人鈣建議約1000mg/day,600mg不足。", "B": "正解:一杯240c.c.牛奶含鈣約260–300mg。", "C": "深綠蔬菜/豆製品含鈣,素食均衡仍可足量,敘述錯誤。", "D": "促進鈣吸收的是維生素D,非維生素A。"}, "sources": ["國健署 鈣攝取建議", "Endocrine Society"]}}, "108b-TNPA-通論-79": {"quick": "利尿劑中『thiazide保鈣』反而保護骨質;增加骨鬆風險的是類固醇、甲狀腺素過量、鋰鹽等,故『利尿劑』為錯誤(非增加風險),選A。", "detail": {"background": "增加骨質疏鬆風險的『藥物』:①『糖皮質類固醇(glucocorticoid)』──最重要(抑制成骨、增加骨吸收與鈣流失),長期使用致類固醇性骨鬆;②『甲狀腺素過量(過度補充/甲亢)』──增加骨轉換致骨流失;③『鋰鹽』、抗癲癇藥、aromatase抑制劑、GnRH促效劑、長期heparin、PPI等。而『利尿劑』中『「thiazide」利尿劑會「保鈣(減少尿鈣)」→反而「保護」骨質、降低骨折風險』(環利尿劑furosemide才增加尿鈣);故『利尿劑(thiazide)增加骨鬆風險』『錯誤』(A為答案)。本題A。\\n\\n護理:長期類固醇者預防骨鬆(鈣+維D±雙磷酸鹽);甲狀腺素勿過量;thiazide對骨質中性偏保護。", "options": {"A": "錯誤(正解):thiazide利尿劑保鈣、反保護骨質,非增加骨鬆風險。", "B": "甲狀腺素過量增加骨轉換、增加骨鬆風險。", "C": "鋰鹽可增加骨鬆風險。", "D": "類固醇是增加骨鬆風險最重要的藥物。"}, "sources": ["Harrison 21e, Drug-induced osteoporosis", "Endocrine Society"]}}, "109-進階-內科-60": {"quick": "骨質疏鬆常用藥為雌激素、雙磷酸鹽、降鈣素(及SERM、denosumab、teriparatide);『甲狀腺素』非骨鬆用藥(反致骨流失),故選D。", "detail": {"background": "骨質疏鬆治療藥物:①『抗骨吸收』:雙磷酸鹽(alendronate等,第一線)、『降鈣素(calcitonin)』、SERM(raloxifene)、雌激素(停經後)、denosumab(RANKL單抗);②『促骨形成』:teriparatide(PTH類似物)、romosozumab;搭配鈣+維生素D。『甲狀腺素(thyroxine)』『不是』骨鬆用藥──相反『過量甲狀腺素會增加骨轉換致骨質流失』(D為答案,非骨鬆藥物)。本題D。\\n\\n護理:骨鬆以雙磷酸鹽為主、補鈣+維D、防跌;甲狀腺素勿過量。", "options": {"A": "雌激素是停經後骨鬆用藥。", "B": "雙磷酸鹽是骨鬆第一線藥。", "C": "降鈣素是骨鬆用藥之一。", "D": "正解(非骨鬆藥):甲狀腺素過量反致骨流失,非治療骨鬆藥物。"}, "sources": ["Endocrine Society/AACE Osteoporosis", "Harrison 21e"]}}, "111-進階-內科-54": {"quick": "骨質疏鬆性骨折以『脊椎(椎體)壓迫性骨折』發生率最高,故選B。", "detail": {"background": "骨質疏鬆相關的『脆弱性骨折』好發於『富含「海綿骨(trabecular bone)」』的部位:①『脊椎(椎體)壓迫性骨折』──『發生率最高』(且常無症狀/未被診斷,致身高變矮、駝背);②髖部骨折(死亡率與失能最高);③遠端橈骨(Colles骨折,手腕);④肱骨近端。本題問『發生率最高』→『脊椎骨』(B)。雖髖部骨折後果最嚴重,但『發生率』以脊椎最高。\\n\\n護理:衛教脊椎壓迫性骨折(身高變矮、背痛、駝背)、防跌預防髖部骨折、治療骨鬆。", "options": {"A": "髖骨骨折後果最嚴重,但非發生率最高。", "B": "正解:脊椎(椎體)壓迫性骨折發生率最高。", "C": "手腕(遠端橈骨)骨折常見但非最高。", "D": "肩關節非骨鬆性骨折最高發部位。"}, "sources": ["Harrison 21e, Osteoporosis (vertebral fractures)", "Endocrine Society"]}}, "112-進階-內科-53": {"quick": "骨質疏鬆的DEXA診斷切點為T-score『< −2.5』(非−1.5),故A錯誤。", "detail": {"background": "骨質疏鬆:①診斷以DEXA測T-score,『骨質疏鬆為T-score ≤ −2.5』(−1~−2.5為骨質缺乏);故A『T-score < −1.5為陽性』『錯誤』(切點是−2.5,為答案);②骨鬆『骨折前通常無症狀』(B正確,故稱沉默疾病);③脆弱性骨折好發『脊椎、髖部、遠端橈骨(手腕)』(C正確);④危險因子:『性激素缺乏(停經、性腺低下)、長期高劑量類固醇』、低體重、抽菸酗酒、家族史、制動等(D正確)。本題A錯誤。\\n\\n護理:DEXA T-score≤−2.5診斷;補鈣維D、雙磷酸鹽、防跌;高風險(類固醇/停經)早期評估。", "options": {"A": "錯誤(正解):骨鬆診斷T-score切點為≤−2.5,非−1.5。", "B": "正確:骨折前通常無症狀。", "C": "正確:好發脊椎、髖部、遠端橈骨。", "D": "正確:性激素缺乏與高劑量類固醇是常見危險因子。"}, "sources": ["WHO/DEXA T-score", "Harrison 21e, Osteoporosis"]}}, "114-進階-內科-47": {"quick": "診斷骨質疏鬆的標準檢查為『雙能量X光吸收儀(DEXA)』測骨密度,故選D。", "detail": {"background": "骨質疏鬆『診斷的黃金標準』是『雙能量X光吸收儀(dual-energy X-ray absorptiometry, DEXA/DXA)』測量『腰椎與髖部骨密度(T-score)』,輻射低、精準、可追蹤。其他:①骨骼掃描(bone scan,核醫)用於『骨轉移/骨折/感染』,非測骨密度;②腰椎X光只能在骨流失30%以上才看出、不能定量診斷骨鬆;③定量超音波(QUS,常測腳跟)可『篩檢』但『不能作為診斷標準』(精準度不足)。本題D(DEXA)。\\n\\n護理:高風險者(停經後女性、≥65歲、長期類固醇、脆弱性骨折)安排DEXA;依T-score診斷與追蹤。", "options": {"A": "骨骼掃描用於骨轉移/骨折/感染,非測骨密度。", "B": "腰椎X光不能定量診斷骨鬆(骨流失多才顯現)。", "C": "定量超音波(QUS)可篩檢,非診斷標準。", "D": "正解:DEXA(雙能量X光吸收儀)為診斷骨質疏鬆的標準檢查。"}, "sources": ["ISCD/WHO DEXA", "Harrison 21e, Osteoporosis diagnosis"]}}, "105-TNPA-通論-71": {"quick": "收縮壓168/舒張80→第二期高血壓(收縮≥160或舒張≥100),故選A。", "detail": {"background": "本例68歲、吸菸、TG 240(高)、LDL-C 140、血壓168/80。①高血壓分期(舊JNC):正常<120/80;前期120–139/80–89;第一期140–159/90–99;『第二期≥160/100』(只要收縮或舒張任一達標即依較高者分期);本例收縮168→『第二期高血壓』(A正確,須積極治療,非只追蹤);②TG 240已屬『高(≥200)』、LDL 140偏高,合併吸菸與高血壓屬心血管高風險,『不是只「邊緣宜續追蹤」或拖延3–6個月』(B、D不適當);③代謝症候群需符合三項判定(腰圍/血壓/血糖/TG/HDL),本題資料不足以『確定』(C不適當)。本題A正確。\\n\\n護理:第二期高血壓應藥物治療+生活型態;戒菸、控血脂(高風險他汀)、整體心血管風險管理。", "options": {"A": "正解:收縮壓168→第二期高血壓(≥160/100)。", "B": "TG 240已是高(≥200),非僅邊緣追蹤。", "C": "代謝症候群需符合三項判定,本題資料不足以確定。", "D": "第二期高血壓+高風險不應拖延3–6個月才治療。"}, "sources": ["JNC/ACC-AHA 高血壓分期", "NCEP ATP III 血脂"]}}, "106-106a-內科-18": {"quick": "代謝症候群判定不包括『身體質量指數(BMI)』(用腰圍),故選A。", "detail": {"background": "台灣國健署『代謝症候群』診斷(五項中符合『三項』以上):①『腰圍』男≥90cm、女≥80cm(腹部肥胖);②『血壓』≥130/85 mmHg(或服藥);③『空腹血糖』≥100 mg/dL(或服藥);④『三酸甘油酯(TG)』≥150 mg/dL(或服藥);⑤『高密度脂蛋白膽固醇(HDL-C)』男<40、女<50 mg/dL。注意:『不含BMI』與『不含LDL』(這兩者常被誤列)。代謝症候群核心為『胰島素阻抗(以內臟/脂肪細胞為主)』,增加第二型糖尿病與心血管疾病風險。本題問『不包括』者→『身體質量指數(BMI)』(A)──代謝症候群用『腰圍(腹部肥胖)』而非BMI;腰圍、血壓、三酸甘油酯皆為判定項目。\\n\\n護理:衛教代謝症候群五項(腰圍/血壓/血糖/TG/HDL),不含BMI與LDL。", "options": {"A": "正解(不包括):代謝症候群用腰圍,不含BMI。", "B": "腰圍是判定項目。", "C": "血壓是判定項目。", "D": "三酸甘油酯是判定項目。"}, "sources": ["國健署 代謝症候群", "NCEP ATP III"]}}, "107-TNPA-內科-53": {"quick": "NCEP ATP III(亞洲)代謝症候群的血壓切點是『≥130/85』,非『≥140/90』,故選C(不包括)。", "detail": {"background": "台灣國健署『代謝症候群』診斷(五項中符合『三項』以上):①『腰圍』男≥90cm、女≥80cm(腹部肥胖);②『血壓』≥130/85 mmHg(或服藥);③『空腹血糖』≥100 mg/dL(或服藥);④『三酸甘油酯(TG)』≥150 mg/dL(或服藥);⑤『高密度脂蛋白膽固醇(HDL-C)』男<40、女<50 mg/dL。注意:『不含BMI』與『不含LDL』(這兩者常被誤列)。代謝症候群核心為『胰島素阻抗(以內臟/脂肪細胞為主)』,增加第二型糖尿病與心血管疾病風險。本題NCEP ATP III(亞洲修訂)五項:TG≥150(A正確)、HDL男<40女<50(B正確)、『血壓≥「130/85」』(非140/90)、空腹血糖≥100(D正確)、腰圍(亞洲男≥90女≥80)。本題C寫『血壓≥140/90』與標準『≥130/85』不符→『不包括』(C為答案)。\\n\\n護理:代謝症候群血壓切點為≥130/85(較高血壓診斷140/90為低),強調早期介入。", "options": {"A": "TG≥150是判定項目。", "B": "HDL男<40女<50是判定項目。", "C": "正解(不包括):血壓切點為≥130/85,非≥140/90。", "D": "空腹血糖≥100是判定項目。"}, "sources": ["NCEP ATP III (Asian)", "國健署"]}}, "108a-TNPA-內科-12": {"quick": "代謝症候群血脂判定用『TG與HDL』,不含『LDL>130』;故A(LDL>130)不是診斷條件,選A。", "detail": {"background": "台灣國健署『代謝症候群』診斷(五項中符合『三項』以上):①『腰圍』男≥90cm、女≥80cm(腹部肥胖);②『血壓』≥130/85 mmHg(或服藥);③『空腹血糖』≥100 mg/dL(或服藥);④『三酸甘油酯(TG)』≥150 mg/dL(或服藥);⑤『高密度脂蛋白膽固醇(HDL-C)』男<40、女<50 mg/dL。注意:『不含BMI』與『不含LDL』(這兩者常被誤列)。代謝症候群核心為『胰島素阻抗(以內臟/脂肪細胞為主)』,增加第二型糖尿病與心血管疾病風險。本題問『不是』診斷條件者→『低密度脂蛋白(LDL)>130』(A)──代謝症候群血脂判定用『TG≥150』與『HDL男<40女<50』,『不含LDL』。HDL(B)、血壓>130/85(C)、腰圍男>90女>80(D)皆為判定條件。\\n\\n護理:代謝症候群不看LDL(LDL是心血管風險/他汀治療目標,但非代謝症候群判定);用TG/HDL/腰圍/血壓/血糖。", "options": {"A": "正解(非條件):LDL>130不是代謝症候群診斷條件(用TG/HDL)。", "B": "HDL男<40女<50是判定條件。", "C": "血壓>130/85是判定條件。", "D": "腰圍男>90女>80是判定條件。"}, "sources": ["國健署 代謝症候群", "NCEP ATP III"]}}, "109-進階-外科-53": {"quick": "袖狀胃切除(LSG)較不影響鐵吸收→較不會缺鐵性貧血,故A正確。", "detail": {"background": "減重(代謝)手術比較:①『腹腔鏡袖狀胃切除(LSG)』──切除大部分胃(含分泌『飢餓素ghrelin』的胃底)→『減少ghrelin、增加飽足』,屬『限制型』,『不繞道腸道』故『較不影響鐵/B12吸收→較不會缺鐵性貧血』(A正確);②『Roux-en-Y胃繞道(RYGB)』──限制+『吸收不良(繞過十二指腸近端)』,減重效果佳、改善糖尿病/逆流,但『易缺鐵、B12、鈣、葉酸』需終生補充;③『RYGB的飽足與ghrelin的關係』:LSG才是切除胃底降ghrelin明顯,RYGB主要靠繞道與腸泌素(故C『RYGB靠ghrelin降低』不精確);④減重手術『不適合』未控制的重度心臟衰竭等高手術風險者(D錯)。本題A正確。\\n\\n護理:減重手術術後監測營養(尤其RYGB/膽胰分流的鐵/B12/鈣/脂溶性維生素)、補充、追蹤體重與共病改善。", "options": {"A": "正解:LSG不繞道腸道,較不影響鐵吸收、較不缺鐵性貧血。", "B": "一般RYGB減重效果≥LSG,B『LSG減重較佳』不一定成立。", "C": "切除胃底降ghrelin明顯的是LSG,非RYGB。", "D": "心臟衰竭等高風險者不適合減重手術。"}, "sources": ["ASMBS Bariatric Surgery", "Harrison 21e, Obesity surgery"]}}, "109-進階-內科-59": {"quick": "代謝症候群的胰島素阻抗與『脂肪細胞(adipocyte)』最相關(內臟脂肪釋放FFA與發炎因子),故選A。", "detail": {"background": "代謝症候群/胰島素阻抗的核心在『脂肪組織(尤其內臟脂肪)』:肥大功能異常的『脂肪細胞(adipocyte)』釋放過多『游離脂肪酸(FFA)』與促發炎脂肪激素(TNF-α、IL-6、resistin、leptin↑、adiponectin↓),這些FFA與發炎因子在肌肉、肝臟損害胰島素訊息傳遞→全身胰島素阻抗。故與胰島素阻抗『最相關』的細胞為『脂肪細胞』(A)。肌肉細胞是葡萄糖攝取主要部位(受影響),肝細胞輸出葡萄糖,但『源頭』在脂肪細胞功能異常。本題A。\\n\\n護理:減重(尤其減內臟脂肪)、運動可改善脂肪細胞功能與胰島素阻抗。", "options": {"A": "正解:代謝症候群胰島素阻抗與脂肪細胞(內臟脂肪)最相關。", "B": "肌肉細胞是受阻抗影響的葡萄糖攝取部位,非源頭。", "C": "神經元非胰島素阻抗主要相關細胞。", "D": "肝細胞輸出葡萄糖受影響,但源頭在脂肪細胞。"}, "sources": ["Harrison 21e, Insulin resistance/Metabolic syndrome", "ADA"]}}, "110-通論-其他-25": {"quick": "代謝症候群需符合三項;本題以選項D(腰圍/血糖/血壓符合)為代謝症候群,故選D。", "detail": {"background": "台灣國健署『代謝症候群』診斷(五項中符合『三項』以上):①『腰圍』男≥90cm、女≥80cm(腹部肥胖);②『血壓』≥130/85 mmHg(或服藥);③『空腹血糖』≥100 mg/dL(或服藥);④『三酸甘油酯(TG)』≥150 mg/dL(或服藥);⑤『高密度脂蛋白膽固醇(HDL-C)』男<40、女<50 mg/dL。注意:『不含BMI』與『不含LDL』(這兩者常被誤列)。代謝症候群核心為『胰島素阻抗(以內臟/脂肪細胞為主)』,增加第二型糖尿病與心血管疾病風險。判斷各選項符合幾項(需≥3):本題答案為D(該選項組合『腰圍、空腹血糖≥100、血壓≥130/85』等達三項)。注意題目部分腰圍數值疑為繕打(如『腰圍5/8公分』應為85/88等),作答以『符合三項代謝指標(腹部肥胖+血糖+血壓/血脂)』者為代謝症候群。判讀要訣:逐項對照五大切點(腰圍男90女80、血壓130/85、血糖100、TG150、HDL男40女50),數符合項目≥3即是。\\n\\n護理:衛教代謝症候群為心血管/糖尿病高風險,以生活型態(減重運動飲食)為核心介入。", "options": {"A": "未達三項代謝指標。", "B": "未達三項。", "C": "未達三項(僅腰圍/血糖等不足三項)。", "D": "正解:符合三項代謝症候群判定指標。"}, "sources": ["國健署 代謝症候群", "NCEP ATP III"]}}, "110-進階-內科-52": {"quick": "本例符合『血糖120、腰圍93、血壓138/90』三項(BMI與TG144未達標),故選B。", "detail": {"background": "台灣國健署『代謝症候群』診斷(五項中符合『三項』以上):①『腰圍』男≥90cm、女≥80cm(腹部肥胖);②『血壓』≥130/85 mmHg(或服藥);③『空腹血糖』≥100 mg/dL(或服藥);④『三酸甘油酯(TG)』≥150 mg/dL(或服藥);⑤『高密度脂蛋白膽固醇(HDL-C)』男<40、女<50 mg/dL。注意:『不含BMI』與『不含LDL』(這兩者常被誤列)。代謝症候群核心為『胰島素阻抗(以內臟/脂肪細胞為主)』,增加第二型糖尿病與心血管疾病風險。本例逐項對照:①腰圍93(男≥90)『符合』;②血壓138/90(≥130/85)『符合』;③空腹血糖120(≥100)『符合』;④TG 144(<150)『不符合』;⑤BMI 29『不列入』代謝症候群判定。故符合的三項為『血糖、腰圍、血壓』(B)。BMI雖屬肥胖指標但非代謝症候群判定項目。\\n\\n護理:代謝症候群以腰圍(非BMI)、血壓、血糖、TG、HDL五項判定;本例已符三項,衛教生活型態介入。", "options": {"A": "含BMI(非判定項目),不正確。", "B": "正解:血糖、腰圍、血壓三項符合。", "C": "含BMI且TG 144未達標,不正確。", "D": "TG 144未達標(<150),不正確。"}, "sources": ["國健署 代謝症候群", "NCEP ATP III"]}}, "111-通論-5分科-28": {"quick": "肥胖致血脂異常、代謝症候群、PCOS等;『第一型糖尿病』為自體免疫(非肥胖造成),故選C。", "detail": {"background": "肥胖對內分泌與代謝的影響:①『血脂異常(高TG、低HDL)』;②『代謝症候群』;③『第二型糖尿病(胰島素阻抗)』;④『多囊性卵巢症候群(PCOS)』;⑤非酒精性脂肪肝、高尿酸/痛風、阻塞性睡眠呼吸中止、心血管疾病等。而『第一型糖尿病』是『自體免疫破壞β細胞致胰島素「絕對」缺乏』,『與肥胖無因果關係』(C為答案,非肥胖造成)。本題C。\\n\\n護理:肥胖增加第二型糖尿病/代謝症候群/PCOS等風險;減重可改善;第一型糖尿病非肥胖所致。", "options": {"A": "血脂異常是肥胖的影響。", "B": "代謝症候群是肥胖的影響。", "C": "正解(非肥胖影響):第一型糖尿病為自體免疫,與肥胖無關。", "D": "多囊性卵巢症候群與肥胖/胰島素阻抗相關。"}, "sources": ["Harrison 21e, Obesity complications", "ADA"]}}, "111-進階-內科-42": {"quick": "代謝症候群高危群有PCOS、阻塞性睡眠呼吸中止、高尿酸血症;『急性肝炎』不是,故選C。", "detail": {"background": "代謝症候群(胰島素阻抗為核心)的『高危險群/相關狀況』:①『多囊性卵巢症候群(PCOS)』(胰島素阻抗);②『阻塞性睡眠呼吸中止(OSA)』(與肥胖代謝相互關聯);③『高尿酸血症/痛風』(與胰島素阻抗、代謝症候群相關);④非酒精性脂肪肝、第二型糖尿病、心血管疾病。『急性肝炎(病毒性)』是感染性肝臟發炎,『與代謝症候群無關』(C為答案,非高危群)。本題C。\\n\\n護理:PCOS/OSA/高尿酸者篩代謝症候群與心血管風險;急性肝炎非代謝症候群相關。", "options": {"A": "PCOS是代謝症候群高危群。", "B": "阻塞性睡眠中止是代謝症候群相關。", "C": "正解(非高危群):急性肝炎與代謝症候群無關。", "D": "高尿酸血症與代謝症候群相關。"}, "sources": ["Harrison 21e, Metabolic syndrome associations", "ADA"]}}, "111-通論-5分科-67": {"quick": "本例符合『腰圍110、血壓135/90、TG170』三項(血糖80、HDL50未達標)→3項,故選A。", "detail": {"background": "台灣國健署『代謝症候群』診斷(五項中符合『三項』以上):①『腰圍』男≥90cm、女≥80cm(腹部肥胖);②『血壓』≥130/85 mmHg(或服藥);③『空腹血糖』≥100 mg/dL(或服藥);④『三酸甘油酯(TG)』≥150 mg/dL(或服藥);⑤『高密度脂蛋白膽固醇(HDL-C)』男<40、女<50 mg/dL。注意:『不含BMI』與『不含LDL』(這兩者常被誤列)。代謝症候群核心為『胰島素阻抗(以內臟/脂肪細胞為主)』,增加第二型糖尿病與心血管疾病風險。逐項對照本例(男性):①腰圍110(男≥90)『符合』;②血壓135/90(≥130/85)『符合』;③TG 170(≥150)『符合』;④空腹血糖80(<100)『不符』;⑤HDL 50(男需<40才符,50不符)『不符』。符合三項(腰圍、血壓、TG)→『3項』(A),已達代謝症候群診斷(≥3)。\\n\\n護理:符合三項即代謝症候群,衛教減重運動飲食、控制血壓血脂、預防糖尿病與心血管疾病。", "options": {"A": "正解:符合腰圍、血壓、TG共3項。", "B": "低估(實為3項)。", "C": "低估(實為3項)。", "D": "血糖80與HDL50未達標,非4項。"}, "sources": ["國健署 代謝症候群", "NCEP ATP III"]}}, "111-進階-外科-69": {"quick": "膽胰分流(BPD)的減重效果與維持『優於(較強)』RYGB,但吸收不良更明顯;說它『比RYGB差』錯誤,故選D。", "detail": {"background": "減重手術型態:①『可調節胃束帶(AGB)』──限制型、代謝障礙風險低,但減重較少、可致胃食道逆流(A正確);②『袖狀胃切除(LSG)』──技術較簡單、無傾食症候群,但有胃出口/食道逆流風險(B正確);③『Roux-en-Y胃繞道(RYGB)』──限制+吸收不良,減重多、可改善逆流,但易缺鐵/B12(C正確);④『膽胰分流(biliopancreatic diversion, BPD±十二指腸轉位)』──『減重效果與維持「最強」(優於RYGB)』,但『吸收不良最嚴重(脂溶性維生素、蛋白質、礦物質缺乏)』──故『D說膽胰分流減重效果比RYGB「差」』『錯誤』(BPD減重更強)(為答案)。本題D錯誤。\\n\\n護理:減重手術依減重幅度與併發症選擇;BPD減重最強但營養缺乏風險最高,須嚴密補充與追蹤。", "options": {"A": "正確:胃束帶代謝障礙風險低但增加胃食道逆流。", "B": "正確:袖狀胃切除技術簡單、無傾食,但有胃出口阻塞風險。", "C": "正確:RYGB減重較多、改善逆流,但易缺鐵/B12。", "D": "錯誤(正解):膽胰分流減重效果優於RYGB(非較差),但吸收不良更嚴重。"}, "sources": ["ASMBS Bariatric Surgery", "Sabiston"]}}, "113-通論-5分科-38": {"quick": "代謝症候群血脂判定用TG與HDL,『不含低密度膽固醇(LDL)』,故選C。", "detail": {"background": "台灣國健署『代謝症候群』診斷(五項中符合『三項』以上):①『腰圍』男≥90cm、女≥80cm(腹部肥胖);②『血壓』≥130/85 mmHg(或服藥);③『空腹血糖』≥100 mg/dL(或服藥);④『三酸甘油酯(TG)』≥150 mg/dL(或服藥);⑤『高密度脂蛋白膽固醇(HDL-C)』男<40、女<50 mg/dL。注意:『不含BMI』與『不含LDL』(這兩者常被誤列)。代謝症候群核心為『胰島素阻抗(以內臟/脂肪細胞為主)』,增加第二型糖尿病與心血管疾病風險。本題問『不包括』者→『低密度膽固醇(LDL)』(C)──代謝症候群血脂判定用『TG≥150』與『HDL低』,『不含LDL』。高血壓(A)、三酸甘油酯(B)、空腹血糖(D)皆為判定項目。\\n\\n護理:代謝症候群用TG/HDL,不看LDL(LDL為心血管風險與他汀目標)。", "options": {"A": "高血壓是判定項目。", "B": "三酸甘油酯是判定項目。", "C": "正解(不包括):LDL不是代謝症候群判定項目。", "D": "空腹血糖是判定項目。"}, "sources": ["國健署 代謝症候群", "NCEP ATP III"]}}, "113-進階-內科-38": {"quick": "代謝症候群與高尿酸、第二型糖尿病、非酒精性脂肪肝相關;『多囊性「腎」疾病』最不相關,故選D。", "detail": {"background": "代謝症候群(胰島素阻抗)相關的疾病:①『高尿酸血症/痛風』;②『第二型糖尿病』;③『非酒精性脂肪肝疾病(NAFLD/NASH)』──被視為代謝症候群的肝臟表現;④心血管疾病、PCOS、OSA。『多囊性「腎」疾病(polycystic kidney disease, PKD)』是『遺傳性腎臟囊性疾病(ADPKD)』,『與代謝症候群無關』(D為答案,最不相關;勿與多囊性『卵巢』PCOS混淆)。本題D。\\n\\n護理:代謝症候群者篩NAFLD/糖尿病/高尿酸/心血管;PKD為遺傳性腎病,與代謝症候群無關。", "options": {"A": "高尿酸血症與代謝症候群相關。", "B": "第二型糖尿病與代謝症候群相關。", "C": "非酒精性脂肪肝為代謝症候群的肝臟表現。", "D": "正解(最不相關):多囊性『腎』疾病為遺傳性腎病,與代謝症候群無關。"}, "sources": ["Harrison 21e, Metabolic syndrome/NAFLD", "ADA"]}}, "113-進階-家庭-67": {"quick": "代謝症候群血脂判定為『HDL男<40、女<50』,故選C;其餘血糖/血壓/腰圍切點選項數值錯。", "detail": {"background": "台灣國健署『代謝症候群』診斷(五項中符合『三項』以上):①『腰圍』男≥90cm、女≥80cm(腹部肥胖);②『血壓』≥130/85 mmHg(或服藥);③『空腹血糖』≥100 mg/dL(或服藥);④『三酸甘油酯(TG)』≥150 mg/dL(或服藥);⑤『高密度脂蛋白膽固醇(HDL-C)』男<40、女<50 mg/dL。注意:『不含BMI』與『不含LDL』(這兩者常被誤列)。代謝症候群核心為『胰島素阻抗(以內臟/脂肪細胞為主)』,增加第二型糖尿病與心血管疾病風險。本題問哪一項為代謝症候群『正確』的診斷標準:①血糖切點是『≥100』(非126;126是糖尿病診斷)(A錯);②血壓切點是『≥130/85』(非140/90)(B錯);③『HDL-C男<40、女<50』(C正確);④腰圍切點男『≥90』女『≥80』(非100/90)(D錯)。本題C正確。\\n\\n護理:熟記五項切點(腰圍90/80、血壓130/85、血糖100、TG150、HDL40/50),三項即診斷。", "options": {"A": "錯誤:代謝症候群血糖切點≥100(126是糖尿病)。", "B": "錯誤:血壓切點≥130/85(非140/90)。", "C": "正解:HDL-C男<40、女<50為判定標準。", "D": "錯誤:腰圍切點男≥90、女≥80(非100/90)。"}, "sources": ["國健署 代謝症候群", "NCEP ATP III"]}}, "114-進階-外科-43": {"quick": "接受『袖狀胃切除』術前須檢測幽門螺旋桿菌(殘胃癌變/潰瘍考量),此敘述正確;但本題問『錯誤』,答案為B(因C/D...)——實為C錯誤(術前減重會改善術後減重)。", "detail": {"background": "病態肥胖與減重手術:①育齡女性『術後應避孕至少12–18個月』(快速減重期營養波動不利懷孕)(A正確);②『術前減重』(如術前低熱量飲食縮小肝臟)『有助手術安全,且與術後減重成效相關』──故『C說「術前體重減輕不會造成術後更明顯減重」』與一般認知不符;③RYGB結合『限制性+吸收不良』機制(D正確);④『袖狀胃切除/減重手術術前評估「幽門螺旋桿菌」並根除』是常見建議(降低術後潰瘍/併發症)──故B(術前須檢測幽門桿菌)實為『正確』敘述。本題標準答案為B(視為『錯誤』之命題設計);綜合而言,考點在減重手術的機制與術前準備。建議掌握:RYGB=限制+吸收不良、術後須補營養與避孕、術前評估H. pylori。\\n\\n護理:減重手術術前評估(含H. pylori)、術後營養補充與避孕衛教、追蹤體重與共病。", "options": {"A": "正確:育齡女性術後建議至少1年避孕。", "B": "本題定為答案:袖狀胃手術術前是否須常規檢測H. pylori之敘述(命題視為錯誤)。", "C": "術前減重有助手術安全且與術後減重相關,『不會更明顯』之敘述不正確。", "D": "正確:RYGB結合限制性與吸收不良機制。"}, "sources": ["ASMBS Bariatric Surgery (preop evaluation)", "Sabiston"]}}, "114-進階-內科-46": {"quick": "代謝症候群胰島素阻抗的機轉為『細胞內脂肪酸(及代謝物)損害胰島素訊息傳遞路徑』,故選D。", "detail": {"background": "代謝症候群/胰島素阻抗的分子機轉:過多『游離脂肪酸(FFA)』進入肌肉與肝臟,堆積為『細胞內脂質代謝物(diacylglycerol、ceramide)』,活化serine kinase使『胰島素受體受質(IRS-1)serine磷酸化』、抑制PI3K-Akt路徑→『損害胰島素訊息傳遞』→葡萄糖攝取下降、肝糖輸出增加(D正確)。其他選項錯誤:A『高血壓引起胰島素分泌減少』(因果反置,胰島素阻抗/高胰島素可致高血壓);B『肝脂肪致胰島素快速分解』(機轉不對,肝脂肪致阻抗非加速分解);C『HDL增加胰島素抗性』(錯,HDL是保護性,低HDL才與代謝症候群相關)。本題D正確。\\n\\n護理:減內臟脂肪/運動改善細胞內脂質與胰島素訊息;代謝症候群整體心血管風險管理。", "options": {"A": "錯誤:因果反置(胰島素阻抗/高胰島素可致高血壓)。", "B": "錯誤:肝脂肪堆積致阻抗,非加速胰島素分解。", "C": "錯誤:HDL為保護性,低HDL才與代謝症候群相關。", "D": "正解:細胞內脂肪酸(代謝物)損害胰島素訊息傳遞路徑。"}, "sources": ["Harrison 21e, Insulin resistance mechanisms", "ADA"]}}}, L={"甲狀腺疾病": {"title": "甲狀腺疾病", "html": "<p><b>核心概念：</b>甲狀腺功能由TSH(最敏感)與free T4評估;掌握甲亢(Graves/甲狀腺風暴)與甲低(橋本/黏液水腫)的症狀對比、抗甲狀腺藥副作用、甲狀腺癌分型與術後併發症。</p><ul><li><b>甲狀腺低下:</b>怕冷、體重增加、皮膚乾粗、掉髮、眉毛外1/3稀、<b>便祕</b>、聲音低沉、反射鬆弛期延長、<b>黏液水腫(非壓陷)</b>;原發性TSH↑、free T4↓,最常見橋本氏(anti-TPO+);治療levothyroxine,<b>孕婦需增量</b>。亞臨床甲低=TSH↑、T4正常。</li><li><b>甲狀腺亢進:</b>怕熱出汗、體重減輕、心悸手抖、<b>腹瀉</b>、失眠。<b>Graves</b>(最常見)→TSH↓+T4↑、TRAb+、突眼、脛前黏液水腫、瀰漫腫+<b>bruit</b>。TSH↓但T4正常→驗T3(T3-toxicosis)。治療:β阻斷劑緩解症狀+thionamide/放射碘/手術(<b>非一律切除</b>)。</li><li><b>抗甲狀腺藥(methimazole/PTU):</b>最嚴重副作用<b>顆粒性白血球缺乏症(發燒喉嚨痛即停藥驗CBC)</b>;PTU注意肝毒性。</li><li><b>甲狀腺風暴:</b>臨床診斷(Burch-Wartofsky:高燒、心搏過速/心衰、中樞神經、腸胃肝);治療β阻斷劑+PTU(抑合成)+<b>1小時後</b>給碘(抑釋放)+類固醇,降溫避aspirin,<b>急性期不用放射碘</b>。甲狀腺毒性週期性麻痺(亞洲年輕男)=甲亢+低血鉀麻痺。</li><li><b>甲狀腺癌:</b>乳突(最常見、淋巴轉移、預後佳)、濾泡(血行轉移)、<b>髓質(C細胞、calcitonin↑、MEN2)</b>、未分化(老年侵襲快)。</li><li><b>術後併發症:</b>出血(6小時內,壓迫氣道急症)、<b>喉返神經</b>損傷(沙啞;雙側→喘鳴需插管)、上喉神經外支(無法發高音)、<b>低血鈣(副甲受損,24–72小時)</b>。amiodarone(含碘)影響甲狀腺功能。</li></ul>"}, "糖尿病診斷與藥物治療": {"title": "糖尿病診斷與藥物治療", "html": "<p><b>核心概念：</b>掌握糖尿病診斷切點、口服與注射藥物的機轉/副作用/體重影響、胰島素分類、住院血糖控制策略。</p><ul><li><b>診斷(ADA,任一+複驗):</b>空腹≥126、OGTT 2h≥200、<b>HbA1c≥6.5%</b>、症狀+隨機≥200。前期:空腹100–125、A1c 5.7–6.4。篩檢用空腹/A1c/OGTT(<b>不用隨機血糖</b>)。</li><li><b>T2DM機轉:</b>胰島素阻抗+肝糖輸出增加+FFA過多+β細胞衰退+<b>glucagon相對過多</b>(非不足)。</li><li><b>藥物:</b><b>metformin第一線</b>(體重中性、腸胃副作用、腎差/缺氧停防<b>乳酸中毒</b>、長期缺B12);磺醯尿素/<b>美格替耐(repaglinide)</b>促泌→<b>低血糖、增重</b>;TZD(pioglitazone)→水腫/心衰、增重、骨折;DPP-4i體重中性低血糖少;<b>GLP-1 RA減重</b>(葡萄糖依賴不易低血糖);<b>SGLT-2i減重、心腎保護</b>(注意酮酸/泌尿生殖感染)。</li><li><b>胰島素:</b>速效(aspart/lispro,餐時)、短效(RI)、中效(NPH)、<b>長效基礎(glargine/detemir)</b>。</li><li><b>住院控糖:</b>建議<b>basal-bolus</b>(避免單用sliding scale);重症IV輸注,目標<b>140–180</b>(NICE-SUGAR示過嚴增加死亡)。急性病/腎差停metformin與磺醯尿素改胰島素。</li><li><b>飲食:</b>脂肪<30%、多植物性蛋白與全榖蔬果、限含糖飲料。黎明現象(夜間血糖不低、晨升)vs Somogyi(夜間低血糖反彈)。</li></ul>"}, "糖尿病急症與低血糖": {"title": "糖尿病急症與低血糖", "html": "<p><b>核心概念：</b>DKA與HHS的鑑別與處置、低血糖、酸鹼與電解質判讀。</p><ul><li><b>DKA:</b>好發第1型;高血糖(>250)+<b>高陰離子間隙代謝性酸中毒</b>+酮體陽性;Kussmaul深快呼吸、水果味(丙酮)、腹痛嘔吐、脫水(皮膚乾,非濕冷)。誘因多(<b>感染最常見</b>、停藥、初發)。治療:<b>大量生理食鹽水+靜脈胰島素+補鉀</b>(雖血鉀看似正常但總鉀缺,胰島素會使其驟降);血糖降至250加葡萄糖續打至AG正常;<b>NaHCO3僅pH<6.9才用</b>。轉皮下胰島素須重疊1–2小時。孕婦/SGLT-2i可<b>血糖正常的euglycemic DKA</b>。</li><li><b>HHS:</b>好發第2型老年;血糖極高(常>600)、<b>滲透壓>320、無顯著酮酸中毒</b>、嚴重脫水意識改變;死亡率高;大量補液為首要。</li><li><b>低血糖:</b>促泌劑(磺醯尿素/美格替耐)與胰島素最易致;冒冷汗、心悸、顫抖、意識改變;意識不清給靜脈葡萄糖/glucagon,找誘因。</li><li><b>酸鹼/電解質:</b>pH每降0.1血鉀約升0.5;高AG酸中毒(MUDPILES含DKA、乳酸、甲醇);留鉀利尿劑為正常AG(高氯)酸中毒。高血糖致假性低血鈉(每升100糖,鈉降1.6–2.4)、滲透壓升高。</li></ul>"}, "糖尿病慢性併發症與糖尿病足": {"title": "糖尿病慢性併發症與糖尿病足", "html": "<p><b>核心概念：</b>糖尿病大小血管併發症;神經病變性疼痛治療、糖尿病足評估與照護。</p><ul><li><b>微血管併發症:</b>視網膜病變(定期眼底)、腎病變(微量白蛋白尿)、<b>周邊神經病變</b>(對稱遠端麻木/疼痛、夜間加重、異痛)。</li><li><b>神經病變性疼痛:</b>第一線<b>三環抗憂鬱劑(amitriptyline)、gabapentin/pregabalin、duloxetine</b>;<b>不以鴉片類為主</b>;NSAID/acetaminophen效果差。</li><li><b>糖尿病足評估:</b><b>10克單絲(壓成C形測保護性感覺)</b>、音叉、ABI(評動脈)、神經傳導(運動無力)。保護性感覺喪失→高潰瘍風險。</li><li><b>糖尿病足照護:</b>每日檢查清潔、保濕(避趾縫)、合腳鞋襪、不赤腳、<b>厚繭由專業修剪(禁腐蝕劑/雞眼藥)</b>。</li><li><b>Charcot足:</b>感覺神經病變致足踝關節破壞變形(<b>中足塌陷rocker-bottom</b>);急性期完全不負重/石膏固定。</li><li><b>足潰瘍/感染:</b>感染傷口用<b>銀離子敷料</b>+抗生素;懷疑<b>骨髓炎用X光(±MRI、探骨試驗)</b>;缺血性潰瘍計算ABI、評估血流重建。潰瘍型態:靜脈性(內踝、滲液多)、動脈性(肢端打洞狀、痛、脈弱)、神經病變性(足底受壓點、厚繭、無痛)。</li></ul>"}, "腎上腺疾病": {"title": "腎上腺疾病", "html": "<p><b>核心概念：</b>掌握腎上腺功能不足(Addison vs 次發性)、庫欣症候群、原發性醛固酮增多症、嗜鉻細胞瘤的特徵與診斷。</p><ul><li><b>原發性腎上腺功能不足(Addison):</b>皮質醇+醛固酮皆缺→<b>低血鈉、高血鉀</b>、低血壓、低血糖、<b>ACTH↑→皮膚色素沈著</b>、疲倦體重減輕。治療<b>糖皮質+礦物皮質</b>並存,壓力加量防危象;危象急救hydrocortisone+生理食鹽水葡萄糖。</li><li><b>次發性(ACTH不足):</b>醛固酮受RAAS調控大致正常→<b>不會高血鉀、無色素沈著</b>;主要補糖皮質;評估需垂體MRI。</li><li><b>庫欣症候群(皮質醇過多):</b>中心性肥胖、月亮臉、水牛肩、紫紋、皮膚薄易瘀、<b>低血鉀</b>、高血壓、骨鬆、類固醇糖尿病;醫源性(外用/口服類固醇)最常見。診斷:24h尿游離皮質醇、隔夜dexamethasone抑制、午夜唾液皮質醇。</li><li><b>原發性醛固酮增多症:</b>高血壓±低血鉀;篩檢<b>醛固酮/腎素比值(ARR)</b>(先矯正血鉀;<b>β阻斷劑使ARR假性升高</b>,ACEI/ARB/利尿劑/MRA假性下降)。醛固酮由絲球帶分泌,受RAAS與<b>血鉀</b>調控。</li><li><b>嗜鉻細胞瘤:</b>年輕、陣發/難控高血壓+<b>5P(Pressure/Pain頭痛/Palpitation/Perspiration/Pallor)</b>;查血漿/尿metanephrines,<b>腹部(腎上腺)影像</b>定位;治療<b>先α阻斷再β阻斷</b>再手術(MEN2相關)。</li></ul>"}, "腦下垂體與性腺生殖內分泌": {"title": "腦下垂體與性腺生殖內分泌", "html": "<p><b>核心概念：</b>腦下垂體腫瘤的視野缺損與荷爾蒙影響;多囊性卵巢症候群(PCOS)的診斷與治療。</p><ul><li><b>腦下垂體腫瘤:</b>向上壓迫<b>視交叉→雙顳側偏盲(bitemporal hemianopia)</b>;<b>泌乳素瘤</b>(前葉,最常見功能性腺瘤)→泌乳素↑→月經不規則、乳漏、不孕,治療首選<b>多巴胺促效劑(cabergoline/bromocriptine)</b>;前葉腺瘤<b>少見尿崩</b>(尿崩屬後葉/下視丘)。垂體中風(突發頭痛視力惡化)為急症。</li><li><b>PCOS:</b>核心=高雄性素+排卵障礙+胰島素阻抗。<b>Rotterdam三取二</b>:少/無排卵、高雄性素(多毛痤瘡或生化)、超音波多囊型態;須排除其他高雄原因(<b>血糖過高非診斷條件</b>)。常併肥胖、第二型糖尿病、血脂異常、心血管疾病、子宮內膜增生(<b>與肝硬化無關</b>)。</li><li><b>PCOS治療:</b>減重/生活型態為首要;月經/內膜保護用口服避孕藥(抗雄);胰島素阻抗用<b>metformin</b>(改善阻抗/助排卵/減重,但<b>對多毛改善有限</b>);誘導排卵第一線<b>clomiphene(或letrozole)</b>;多毛用抗雄性素。</li><li><b>閉經評估:</b>先驗β-hCG排除懷孕;<b>黃體素挑戰試驗</b>有撤退性出血→代表內源性雌激素足夠+內膜有反應+流出道通暢。</li></ul>"}, "副甲狀腺與鈣磷代謝": {"title": "副甲狀腺與鈣磷代謝", "html": "<p><b>核心概念：</b>低血鈣與高血鈣的表現與處置;原發/續發/三發性副甲狀腺功能亢進的鈣磷PTH型態。</p><ul><li><b>低血鈣:</b>神經肌肉興奮性增加→口周/指尖麻、手足搐搦、<b>Chvostek(敲耳前顏面神經→臉抽動)、Trousseau(壓脈帶加壓→腕痙攣)</b>、QT延長。常因<b>副甲狀腺切除或甲狀腺切除誤傷副甲(術後24–72小時)</b>、低血鎂。治療:急性靜脈鈣;慢性口服鈣+<b>活性維生素D(calcitriol)</b>,並查補鎂。低白蛋白致<b>偽低血鈣</b>(校正鈣=測得+0.8×(4−白蛋白))。</li><li><b>高血鈣:</b>神經肌肉抑制→無力、便祕、多尿、噁心、反射減弱、意識變化、短QT。治療:<b>大量0.9%生理食鹽水+furosemide</b>(<b>禁thiazide,thiazide保鈣升鈣</b>)、嚴重加bisphosphonate/calcitonin。</li><li><b>原發性副甲亢進:</b>腺瘤(約85%單一)自主分泌PTH→<b>高血鈣、低血磷、PTH↑、1,25D↑</b>;好發停經後女性,可MEN1/2A;高血鈣明顯/併發症者手術。<b>囊狀纖維化骨炎</b>=PTH過多溶骨。</li><li><b>續發性副甲亢進:</b>慢性腎衰竭(高磷、低/正常鈣、低活性維D)→<b>PTH代償↑但血鈣不高</b>;治療控磷+活性維D+calcimimetic。<b>三發性</b>=長期續發後自主化→血鈣轉高。</li><li><b>惡性高血鈣:</b>PTH被抑制(PTHrP媒介)。MEN-1(3P:副甲增生、胰GI神經內分泌瘤以胃泌素瘤最常見、垂體泌乳素瘤);MEN-2與RET基因(髓質癌+嗜鉻)。</li></ul>"}, "骨質疏鬆症": {"title": "骨質疏鬆症", "html": "<p><b>核心概念：</b>骨質疏鬆的診斷(DEXA/T-score)、危險因子、預防與藥物治療。</p><ul><li><b>診斷:</b>以<b>雙能量X光吸收儀(DEXA)</b>測T-score:正常≥−1.0、骨質缺乏−1.0~−2.5、<b>骨質疏鬆≤−2.5</b>、嚴重骨鬆≤−2.5且有脆弱性骨折。骨折前通常無症狀。骨骼掃描/X光/超音波非診斷標準。</li><li><b>骨折部位:</b><b>脊椎(椎體)壓迫性骨折發生率最高</b>(常無症狀、身高變矮駝背);髖部骨折後果最嚴重;遠端橈骨(手腕)、肱骨近端。</li><li><b>危險因子:</b>性激素缺乏(停經、性腺低下)、<b>長期高劑量類固醇</b>(最重要藥物)、甲狀腺素過量、鋰鹽、低體重、抽菸酗酒、家族史、制動。<b>thiazide利尿劑反保鈣保護骨質</b>(非風險)。</li><li><b>預防:</b><b>規律負重運動(每週≥3次)</b>、足量鈣(停經後1000–1200mg,一杯240c.c.牛奶約260–300mg)、維生素D、戒菸限酒、防跌;深綠蔬菜/豆製品也含鈣。</li><li><b>藥物:</b>抗骨吸收(<b>雙磷酸鹽第一線</b>、denosumab、SERM、降鈣素、雌激素)、促骨形成(teriparatide);<b>甲狀腺素非骨鬆用藥</b>。雙磷酸鹽副作用:食道炎(空腹整杯水、服後直立30分)、顎骨壞死、非典型骨折、罕見心房顫動。</li></ul>"}, "肥胖、代謝症候群與血脂異常": {"title": "肥胖、代謝症候群與血脂異常", "html": "<p><b>核心概念：</b>代謝症候群的診斷標準(國健署五項)、胰島素阻抗機轉、肥胖與減重手術。</p><ul><li><b>代謝症候群(國健署,五項符合≥3):</b>①<b>腰圍</b>男≥90/女≥80;②血壓≥130/85;③空腹血糖≥100;④三酸甘油酯≥150;⑤HDL-C男<40/女<50。<b>不含BMI、不含LDL</b>。NCEP血壓切點亦為130/85(非140/90)。</li><li><b>胰島素阻抗機轉:</b>核心在<b>脂肪細胞(內臟脂肪)</b>→釋放游離脂肪酸與發炎因子→<b>細胞內脂質代謝物損害胰島素訊息傳遞(IRS-1絲胺酸磷酸化)</b>→葡萄糖攝取下降、肝糖輸出增加。HDL為保護性(低HDL才相關)。</li><li><b>相關疾病:</b>第二型糖尿病、<b>非酒精性脂肪肝(NAFLD)</b>、高尿酸/痛風、PCOS、阻塞性睡眠呼吸中止、心血管疾病(<b>與多囊性「腎」病、急性肝炎、第一型糖尿病無關</b>)。</li><li><b>肥胖致內分泌影響:</b>血脂異常、代謝症候群、第二型糖尿病、PCOS(<b>非第一型糖尿病</b>)。</li><li><b>減重(代謝)手術:</b>限制型(胃束帶、<b>袖狀胃切除LSG</b>切胃底降ghrelin、不繞道故較少缺鐵)、限制+吸收不良型(<b>Roux-en-Y胃繞道RYGB</b>減重多、改善逆流但缺鐵/B12/鈣)、<b>膽胰分流(BPD)減重最強但吸收不良最重</b>。術後須營養補充、避孕(術後≥1年)。</li></ul>"}};
const TORDER=["甲狀腺疾病", "糖尿病診斷與藥物治療", "糖尿病急症與低血糖", "糖尿病慢性併發症與糖尿病足", "腎上腺疾病", "腦下垂體與性腺生殖內分泌", "副甲狀腺與鈣磷代謝", "骨質疏鬆症", "肥胖、代謝症候群與血脂異常"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if((q.answer_status||'').indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if((q.answer_status||'').indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if((q.answer_status||'').indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if((q.answer_status||'').indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 let opts='';
 for(const k of ['A','B','C','D','E']){ if(q.options[k]!==undefined) opts+='<div class="opt"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
ce.addEventListener('click',e=>{if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render); fKw.oninput=render;
expandBtn=$('#expand'); expandBtn.onclick=()=>{expand=!expand;expandBtn.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
