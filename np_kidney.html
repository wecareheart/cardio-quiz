ing; AIN", "KDIGO 2012 AKI Guideline"]}}, "108a-TNPA-外科-61": {"quick": "橫紋肌溶解傷的是『腎小管』(色素性 ATN)而非腎絲球；敘述『造成腎絲球體傷害』錯誤(B)。", "detail": {"background": "橫紋肌溶解症(rhabdomyolysis)是骨骼肌大量壞死釋出 myoglobin、CK、鉀、磷等。其造成 AKI 的機轉為『色素性急性腎小管壞死(pigment-induced ATN)』：(1)myoglobin 在遠端腎小管與 Tamm-Horsfall 蛋白結合形成色素管型阻塞腎小管;(2)myoglobin 分解的鐵造成腎小管細胞氧化毒性;(3)容積耗竭與腎血管收縮致腎缺血。受損部位是『腎小管』而非腎絲球。臨床:深色(茶/可樂色)尿、尿潛血陽性但無 RBC、CK 大幅升高、高血鉀、高血磷、低血鈣、Cr 上升。治療核心:早期大量等張輸液(生理食鹽水或林格氏液)維持充足尿量(常建議>2 mL/kg/hr 或目標尿量 200–300 mL/hr)以沖洗腎小管、稀釋並排出 myoglobin;矯正高血鉀(危及生命);部分情況碳酸氫鈉鹼化尿液;嚴重時透析。故敘述(B)『造成腎絲球體傷害』錯誤——應為腎小管壞死。", "options": {"A": "正確。肌肉與深部組織嚴重損傷釋出大量肌蛋白(myoglobin)是橫紋肌溶解的本質，敘述正確。", "B": "錯誤(答案)。橫紋肌溶解造成的是『腎小管』壞死(色素性 ATN)，並非腎絲球體傷害。", "C": "正確。觀察到深色尿(myoglobinuria)應給予大量等張輸液(如林格氏液)維持尿量、沖洗腎小管，敘述正確。", "D": "正確。維持充足尿量(常建議>2 mL/kg/hr)有助沖洗 myoglobin、預防腎小管阻塞，敘述正確。"}, "sources": ["Harrison 21e, Pigment Nephropathy/Rhabdomyolysis", "Brenner & Rector's The Kidney 11e, Myoglobinuric AKI", "KDIGO 2012 AKI Guideline"]}}, "109-進階-兒科-61": {"quick": "CKD 基礎上感冒發燒、胃口差脫水→在慢性腎衰上疊加腎前性 AKI(Cr 1.0→4.0)，首要是補充水分電解質恢復灌注(D)。", "detail": {"background": "本題為『急性-慢性腎損傷疊加(acute-on-chronic kidney injury)』。1 歲男嬰雙側腎發育不良已有慢性腎衰竭(基線 Cr 1.0 穩定)，近期感冒發燒、持續胃口不好(進食/進水不足、發燒不顯性失水)造成容積耗竭，Cr 由 1.0 急升至 4.0、BUN 70，呈現腎前性 AKI 疊加於 CKD。處置首要是『矯正容積耗竭、恢復腎灌注』──適當補充水分與電解質(fluid and electrolyte supply)。腎前性 AKI 及時補液多可逆,延遲則進展為缺血性 ATN。其他選項在此急性脫水情境不適當:限水限鹽用於『容積過載/水腫/高血壓』而非脫水;蛋白限制是 CKD 慢性飲食管理,急性脫水期非首要;albumin infusion 用於低白蛋白/腎病症候群,本題無此指徵。注意嬰幼兒脫水評估與補液須謹慎監測尿量、體重、電解質。", "options": {"A": "water and salt restriction(限水限鹽)用於容積過載/水腫,此病人是脫水導致腎前性 AKI,限水會加重灌注不足,不適當。", "B": "protein restriction 屬 CKD 慢性飲食管理,急性脫水期非首要處置。", "C": "albumin infusion 用於低白蛋白血症/腎病症候群,本題無此指徵。", "D": "正確答案。脫水致腎前性 AKI 疊加 CKD,首要補充水分與電解質以恢復腎灌注,使 AKI 可逆。"}, "sources": ["Harrison 21e, Acute Kidney Injury; Acute-on-chronic", "Nelson Textbook of Pediatrics, AKI in Children", "KDIGO 2012 AKI Guideline"]}}, "109-進階-兒科-69": {"quick": "兒童發燒+血便後出現微血管病性溶血(破碎紅血球、Coombs陰性)+血小板下降+急性腎衰→大腸桿菌(STEC)引起的溶血性尿毒症候群(HUS)(A)。", "detail": {"background": "溶血性尿毒症候群(hemolytic uremic syndrome, HUS)是兒童 AKI 重要病因,典型(典型/腹瀉相關 D+ HUS)由產志賀毒素大腸桿菌(STEC, 以 O157:H7 為代表)感染引起,常先有血便性腹瀉(出血性結腸炎),志賀毒素損傷血管內皮、活化凝血,造成血栓性微血管病變(thrombotic microangiopathy, TMA)。三大特徵:(1)微血管病性溶血性貧血(microangiopathic hemolytic anemia)──血液抹片可見破碎紅血球(schistocytes)、Hb 驟降、LDH 升、haptoglobin 降、Coombs 試驗『陰性』(非免疫性溶血);(2)血小板減少(消耗於微血栓);(3)急性腎損傷(Cr 升高、血尿蛋白尿)。本案 6 歲幼童發燒合併血便、Hb 12→6、PLT 下降、Cr 升至 6.0、尿血尿蛋白尿、Coombs 陰性、抹片有破碎紅血球,完全符合 STEC-HUS。治療以支持為主(輸液、電解質、必要時透析),避免抗生素與止瀉劑(可能增加毒素釋放)。鑑別:非典型 HUS(補體調節異常)、TTP(ADAMTS13 缺乏,神經症狀為主)、急性腎絲球腎炎(無溶血與血小板減少)。", "options": {"A": "正確答案。STEC(大腸桿菌)感染後血便+微血管病性溶血(破碎紅血球、Coombs陰性)+血小板減少+AKI=溶血性尿毒症候群(HUS)。", "B": "感染後急性腎絲球腎炎會有血尿蛋白尿與腎功能下降,但不會有溶血性貧血+破碎紅血球+血小板減少這組 TMA 特徵。", "C": "沙門氏菌敗血症雖可致 AKI,但無法解釋破碎紅血球的微血管病性溶血與血小板消耗。", "D": "傷寒(typhoid fever)以發燒、相對心搏徐緩、玫瑰疹為主,不符微血管病性溶血+AKI 的表現。"}, "sources": ["Harrison 21e, Thrombotic Microangiopathies (HUS/TTP)", "Brenner & Rector's The Kidney 11e, HUS", "Nelson Textbook of Pediatrics, Hemolytic Uremic Syndrome"]}}, "109-進階-內科-32": {"quick": "eGFR 43 mL/min/1.73m² 落在 30–59,屬慢性腎臟病 GFR 分期第3期(本題選項至第3期)(C)。", "detail": {"background": "同 106-106a-通論-47 之 CKD 分期題。KDIGO 2012/2024 依 eGFR 分:G1(≥90)、G2(60–89)、G3a(45–59)、G3b(30–44)、G4(15–29)、G5(<15)。eGFR 43 介於 30–59,傳統三分法屬第3期(細分 G3b 30–44)。70 歲長者本身 eGFR 隨年齡下降,診斷 CKD 需腎損傷或 GFR 下降持續≥3 個月並結合 albuminuria(A1–A3)評估風險。第3期起須監測併發症(貧血、CKD-MBD、酸中毒、高血壓、高血鉀)、依 eGFR 調整藥物劑量、避免腎毒性物質與顯影劑、控制血壓血糖與蛋白尿以延緩進展。", "options": {"A": "第1期為 eGFR≥90,不符。", "B": "第2期為 eGFR 60–89,不符。", "C": "正確答案。eGFR 43 落在 30–59,屬第3期(細分 G3b 30–44)。", "D": "第4期為 eGFR 15–29,43 尚未到第4期。"}, "sources": ["Harrison 21e, Chronic Kidney Disease", "Brenner & Rector's The Kidney 11e, CKD Staging", "KDIGO 2024 CKD Evaluation and Management Guideline"]}}, "109-進階-內科-56": {"quick": "CK↑、尿潛血陽性但顯微鏡無 RBC=橫紋肌溶解的色素尿,典型情境為馬拉松後肌痠、可樂色尿、少尿(A)。", "detail": {"background": "本題核心同樣是『尿潛血陽性但顯微鏡無紅血球』+CK 上升=橫紋肌溶解(myoglobinuria)。尿液試紙潛血對 hemoglobin 與 myoglobin 皆陽性,當無 RBC 卻潛血陽性時代表色素來自 myoglobin(肌肉破壞)或游離血紅素(溶血)。再加上 creatine kinase(CK)上升即指向橫紋肌溶解。最典型臨床情境為『劇烈運動(馬拉松)後肌肉痠痛、可樂色尿、少尿』,劇烈運動致橫紋肌溶解、myoglobin 釋出造成色素性 ATN。治療:大量等張輸液維持尿量、矯正高血鉀。其他選項:發燒低血壓屬腎前性(無 CK 上升與色素尿特徵);痛風+ketorolac(NSAID)屬藥物性腎內/血流動力性;攝護腺肥大下腹脹無尿屬腎後性阻塞,皆不符 CK 上升+myoglobinuria 的描述。", "options": {"A": "正確答案。馬拉松後肌痠、可樂色尿、少尿=運動誘發橫紋肌溶解,CK 上升、潛血陽性而無 RBC(myoglobinuria)。", "B": "發燒、低血壓為腎前性灌注不足,不會有 CK 上升與 myoglobinuria。", "C": "痛風+靜脈 ketorolac(NSAID)致腎內性/血流動力性 AKI,非橫紋肌溶解的色素尿特徵。", "D": "攝護腺肥大、下腹脹、少尿為腎後性阻塞,與 CK 上升無關。"}, "sources": ["Harrison 21e, Rhabdomyolysis/Pigment Nephropathy", "Brenner & Rector's The Kidney 11e, Myoglobinuric AKI", "KDIGO 2012 AKI Guideline"]}}, "109-通論-其他-22": {"quick": "腎後性(postrenal)= 尿路阻塞,ureteral obstruction(輸尿管阻塞)為典型(D)。", "detail": {"background": "AKI 三分類:腎前性(腎灌注不足,如 heart failure、休克、renal artery stenosis 影響腎血流)、腎內性/腎實質性(腎本身受損,如 acute tubular necrosis、GN、AIN)、腎後性(尿路阻塞,使逆壓傳回腎元致 GFR 下降)。腎後性病因:雙側輸尿管阻塞或單側輸尿管阻塞於孤腎(結石、腫瘤、後腹腔纖維化)、膀胱出口阻塞(攝護腺肥大、神經性膀胱)、尿道阻塞(後尿道瓣膜)。本題問腎後因素,ureteral obstruction(輸尿管阻塞)即典型答案。腎後性 AKI 須及早解除阻塞(導尿、輸尿管支架、腎造廔),解阻後多可逆,但長期阻塞可致永久損傷;解阻後可能出現阻塞後利尿(post-obstructive diuresis)需監測水電解質。", "options": {"A": "heart failure 使腎灌注下降,屬腎前性,非腎後性。", "B": "renal artery stenosis 限制腎血流,屬腎前性,非腎後性。", "C": "acute tubular necrosis 是腎小管實質壞死,屬腎內性,非腎後性。", "D": "正確答案。ureteral obstruction(輸尿管阻塞)是尿路阻塞,屬腎後性(postrenal)。"}, "sources": ["Harrison 21e, Acute Kidney Injury classification", "Brenner & Rector's The Kidney 11e, Postrenal AKI/Urinary Tract Obstruction", "KDIGO 2012 AKI Guideline"]}}, "110-進階-兒科-66": {"quick": "後尿道瓣膜已切除、近期脫水致 Cr 4.0(基線 0.9)→腎前性 AKI 疊加 CKD,應補適量生理食鹽水恢復灌注(C);此時非腎後阻塞、亦不應限水。", "detail": {"background": "本題同樣是『急性-慢性疊加』+判斷 AKI 類型。男嬰原本後尿道瓣膜(腎後阻塞)已由泌尿科瓣膜切除(ablation),術後 Cr 0.9 穩定(殘存 CKD),近期感冒發燒、胃口不好持續數天造成脫水,Cr 急升 4.0、BUN 70、eGFR 9.4、尿培養無菌。判讀:阻塞已解除、無感染證據,當前急性惡化是『脫水導致腎前性 AKI』疊加慢性腎病。正確處置是補充『適量生理食鹽水(normal saline)』矯正容積耗竭、恢復腎灌注。限水限鹽用於容積過載/水腫,此處是脫水,反而不可限水;當前並非腎後阻塞(已切除瓣膜、無阻塞或感染證據),不需再次手術;雖長期可能進展至 CKD 第5期需透析,但當前首要是處理可逆的腎前性 AKI 而非直接論斷需透析。", "options": {"A": "錯誤。病人是脫水致腎前性 AKI,限水限鹽會加重灌注不足;限水限鹽適用於容積過載。", "B": "雖長期可能進展至 CKD 第5期,但當前急性惡化主因是脫水,首要是補液矯正可逆的腎前性 AKI,而非直接論斷不久需透析。", "C": "正確答案。脫水致腎前性 AKI,應給予適量生理食鹽水恢復腎灌注。", "D": "錯誤。瓣膜已切除、尿培養無菌、無阻塞證據,當前非腎後性衰竭,不需再次手術。"}, "sources": ["Harrison 21e, Acute Kidney Injury", "Nelson Textbook of Pediatrics, Posterior Urethral Valves; AKI", "KDIGO 2012 AKI Guideline"]}}, "110-進階-內科-51": {"quick": "長期透析(ESRD)+高 PTH(iPTH 420)+低鈣(8.2)+高磷(8.2)=尿毒症續發性副甲狀腺亢進(secondary hyperparathyroidism)(C)。", "detail": {"background": "鑑別副甲狀腺功能亢進三型,關鍵看『鈣磷與背景』:(1)原發性(primary HPT)──副甲狀腺自主分泌過多 PTH,典型『高血鈣+低血磷』,多為單一腺瘤。(2)續發性(secondary HPT)──因低血鈣或高血磷『刺激』PTH 代償上升,最常見於 CKD/ESRD:腎臟 calcitriol 不足與磷排出減少→低鈣高磷→刺激副甲狀腺,呈『PTH 高、鈣偏低或正常、磷高』。(3)三發性(tertiary HPT)──長期續發性後副甲狀腺變自主分泌,即使原刺激消失仍過度分泌,呈『PTH 很高+高血鈣』(常見於移植後或長期 ESRD)。本題:透析 5 年、iPTH 420(高)、血鈣 8.2(偏低)、血磷 8.2(高)──PTH 高、低鈣高磷,完全符合『續發性副甲狀腺亢進』。治療:限磷飲食+磷結合劑、活性維生素D類似物、calcimimetics,難治者 parathyroidectomy。", "options": {"A": "原發性 HPT 應呈高血鈣+低血磷,與本題低鈣高磷不符。", "B": "偽副甲狀腺功能低下為 PTH 阻抗,呈低血鈣高血磷『但 PTH 高』於非 CKD 背景,且非透析病人之典型,且本題明確為 ESRD 刺激所致,屬續發性。", "C": "正確答案。ESRD 透析病人因低鈣高磷刺激,PTH 高=續發性副甲狀腺亢進(secondary HPT)。", "D": "三發性 HPT 應出現『高血鈣』(自主分泌),本題血鈣偏低(8.2),尚屬續發性而非三發性。"}, "sources": ["Harrison 21e, Disorders of the Parathyroid; CKD-MBD", "Brenner & Rector's The Kidney 11e, Secondary Hyperparathyroidism", "KDIGO 2017 CKD-MBD Guideline Update"]}}, "110-進階-內科-69": {"quick": "馬拉松後橫紋肌溶解(CPK 13,000、潛血2+無 RBC、Cr 1.8)→首要『大量靜脈輸液』維持尿量沖洗 myoglobin(A);禁 NSAID、禁酸化尿、不需急做 CT。", "detail": {"background": "本題為橫紋肌溶解症 AKI 的處置題。馬拉松後肌肉痠痛、棕紅色尿、尿潛血 2+ 但無 RBC(myoglobinuria)、CPK 13,000 IU/L(大幅升高)、Cr 1.8──典型運動誘發橫紋肌溶解致早期色素性 ATN。治療核心:『早期大量等張靜脈輸液(生理食鹽水)』維持充足尿量(目標尿量約 200–300 mL/hr 或>2 mL/kg/hr),以稀釋並沖洗 myoglobin、避免色素管型阻塞腎小管,並矯正容積耗竭與高血鉀(危及生命)。部分情況以碳酸氫鈉鹼化尿液(pH>6.5)減少 myoglobin 毒性(證據不一)。禁忌與陷阱:(1)NSAID(止痛藥)會收縮腎血管、惡化腎功能,橫紋肌溶解病人應避免;(2)不應用維他命C『酸化』尿液──酸性尿反而促進 myoglobin 沉澱、加重腎損傷(治療方向相反);(3)診斷已明(運動史+CK+myoglobinuria),不需緊急腎臟 CT 排除血尿,且顯影劑反而增加腎負擔。", "options": {"A": "正確答案。橫紋肌溶解首要是大量靜脈等張輸液維持尿量、沖洗 myoglobin、矯正容積與高血鉀。", "B": "錯誤。NSAID 會收縮腎血管惡化 AKI,橫紋肌溶解病人應避免使用。", "C": "錯誤。診斷已明確(CK 大幅升高+myoglobinuria),不需緊急腎臟 CT,顯影劑反增腎負擔。", "D": "錯誤。應『鹼化』而非『酸化』尿液;維他命C酸化尿會促 myoglobin 沉澱、加重腎損傷。"}, "sources": ["Harrison 21e, Rhabdomyolysis/Pigment Nephropathy", "Brenner & Rector's The Kidney 11e, Management of Myoglobinuric AKI", "KDIGO 2012 AKI Guideline"]}}, "110-進階-內科-72": {"quick": "糖尿病 CKD 病人用 Fleet Phospho-soda 含磷瀉劑清腸後 Cr 急升=磷酸鹽腎病變(phosphate nephropathy)(A)。", "detail": {"background": "磷酸鹽腎病變(acute phosphate nephropathy)是使用『含磷酸鈉的口服腸道準備劑(oral sodium phosphate, OSP, 如 Fleet Phospho-soda)』清腸後發生的 AKI。機轉:大量磷酸鹽急速吸收造成一過性高磷血症,磷酸鈣在腎小管與間質沉澱(calcium phosphate deposition/nephrocalcinosis),造成腎小管阻塞與損傷。危險因子:高齡、女性、慢性腎病、糖尿病、脫水、合併使用 ACEI/ARB/利尿劑/NSAID。臨床:清腸後數天至數週 Cr 上升,常為非少尿性、無明顯發燒或皮疹,血壓尿量大致正常(如本題 Cr 1.5→4.0、BUN 80、尿量 1,100 mL/天、無發燒皮疹)。預後:部分可恢復,部分留下慢性腎功能損害。預防:高風險族群(尤其 CKD、糖尿病、老年)避免使用含磷腸道準備劑,改用 PEG(polyethylene glycol)製劑,並充分水化。FDA 已對 OSP 提出警語。本題情境(糖尿病 CKD+Fleet Phospho-soda 後 Cr 急升)即典型磷酸鹽腎病變。", "options": {"A": "正確答案。糖尿病 CKD 病人用含磷瀉劑(Fleet Phospho-soda)清腸後 Cr 急升=磷酸鹽腎病變(磷酸鈣沉積於腎小管)。", "B": "止痛藥腎病變為長期 NSAID/analgesic 慢性間質損傷,與本題急性清腸後病程不符。", "C": "低血鉀腎病變為長期低血鉀致慢性間質改變,與本題情境不符。", "D": "草酸鹽腎病變多見於高草酸狀態(如乙二醇中毒、短腸、過量維C),非本題含磷清腸劑情境。"}, "sources": ["Harrison 21e, Acute Kidney Injury (crystal-induced)", "Brenner & Rector's The Kidney 11e, Acute Phosphate Nephropathy", "FDA Safety Communication on Oral Sodium Phosphate"]}}, "110-通論-麻醉-61": {"quick": "術後寡尿鑑別中,輸尿管/膀胱阻塞或術中綁到輸尿管屬腎後性,解除原因後多可逆(C)正確。", "detail": {"background": "本題綜合考術後寡尿(oliguria)的鑑別與尿液指標。寡尿三分類同 AKI:(1)腎前性──灌注不足,腎小管努力保鈉保水,呈尿濃縮(高滲透壓)、尿鈉低(<20)、FENa<1%;(2)腎內性(如缺血/毒素致 ATN)──腎小管受損無法保鈉濃縮,呈尿鈉高、FENa>2%、等張尿;(3)腎後性──尿路阻塞(血塊堵輸尿管/膀胱、術中誤綁輸尿管),解除阻塞後寡尿多可逆。逐選項判讀:(A)濃縮尿但鈉含量『高』代表腎小管『無法保鈉』即功能受損(ATN),非正常,敘述相反故錯;(B)缺血或毒素造成的是『ATN(腎小管壞死)』而非腎絲球腎炎,且 ATN 尿鈉『偏高』,敘述把病灶與尿鈉都說錯;(C)正確,血塊或術中綁到輸尿管屬腎後阻塞,去除原因後寡尿多為可逆;(D)急性間質性腎炎(AIN)典型『常伴』發燒、皮疹、嗜伊紅血球增多等發炎反應,敘述說『並不常見』錯誤。", "options": {"A": "錯誤。濃縮尿中鈉含量『高』表示腎小管無法保鈉(功能受損,如 ATN),並非腎小管功能正常。", "B": "錯誤。缺血或毒素造成的是急性腎小管壞死(ATN)而非腎絲球腎炎,且 ATN 尿鈉偏高(非偏低)。", "C": "正確答案。血塊或術中誤綁輸尿管屬腎後性阻塞,去除原因後寡尿多為可逆。", "D": "錯誤。急性間質性腎炎常伴發燒、皮疹等發炎反應(典型過敏三聯徵),並非不常見。"}, "sources": ["Harrison 21e, Acute Kidney Injury; Acute Interstitial Nephritis", "Brenner & Rector's The Kidney 11e, Postoperative AKI/Urinary Indices", "KDIGO 2012 AKI Guideline"]}}, "111-進階-兒科-64": {"quick": "CKD eGFR 22(第4期)會有貧血、生長遲滯、續發性副甲狀腺亢進;尿毒性腦病變(uremic encephalopathy)通常到末期(第5期)才出現,此階段較不會(C)。", "detail": {"background": "兒童 CKD 隨 GFR 下降逐步出現併發症。eGFR 22(第4期,15–29)常見:(1)腎性貧血(EPO 不足);(2)生長遲滯(尿毒、酸中毒、營養不良、生長激素阻抗、CKD-MBD 影響骨骼,兒童特有重點);(3)CKD-MBD 與續發性副甲狀腺亢進(高磷低鈣低 calcitriol 刺激 PTH);(4)代謝性酸中毒、高血壓、高血鉀。而『尿毒性腦病變(uremic encephalopathy)』──表現為注意力不集中、嗜睡、撲翼樣震顫、抽搐、意識改變,是『尿毒症末期(CKD 第5期、eGFR 顯著<15 或嚴重氮血症)』的表現,需相當高的尿毒毒素累積才出現,在 eGFR 22 的第4期通常尚不會發生。故本題『不會在此階段出現』者為尿毒性腦病變。臨床上一旦出現尿毒性腦病變,即為開始透析的指徵之一(AEIOU 中的 U=uremic symptoms)。", "options": {"A": "貧血在 CKD 第3–4期即常見(EPO 不足),會出現,非答案。", "B": "生長遲滯是兒童 CKD 第4期常見併發症(尿毒、酸中毒、MBD、生長激素阻抗),會出現,非答案。", "C": "正確答案。尿毒性腦病變多在末期(第5期、嚴重尿毒)才出現,eGFR 22 的第4期通常尚不會發生。", "D": "續發性副甲狀腺亢進在 CKD 第3–4期即因高磷低鈣低 calcitriol 而出現,非答案。"}, "sources": ["Harrison 21e, Chronic Kidney Disease (Uremic Encephalopathy)", "Brenner & Rector's The Kidney 11e, Complications of CKD", "Nelson Textbook of Pediatrics, CKD in Children"]}}, "111-進階-內科-70": {"quick": "橫紋肌溶解 AKI 的尿液特徵是『潛血陽性但顯微鏡無/極少 RBC』(myoglobinuria);選項說『潛血陰性但有多顆紅血球』正好相反,故不符(C)。", "detail": {"background": "橫紋肌溶解症併 AKI 的實驗室特徵需熟記:(1)肌肉破壞釋出細胞內容物→高血鉀、高血磷、高尿酸、低血鈣(鈣沉積於受損肌肉)、Cr 與 BUN 上升;(2)血中 creatine kinase(CK/CPK)大幅升高(診斷標誌);(3)尿液試紙『潛血反應陽性』(因 myoglobin 與 hemoglobin 皆使 dipstick 陽性)『但顯微鏡無/極少紅血球』──這是 myoglobinuria 的招牌矛盾;(4)因常合併容積耗竭,腎前成分使 FENa 可<1%(早期),但進展為色素性 ATN 後 FENa 可升高(臨床上橫紋肌溶解 FENa 變異大,早期常偏低)。本題問『不會出現』者:選項(C)說『尿液潛血反應呈現陰性,但有多顆紅血球』──與橫紋肌溶解『潛血陽性而無 RBC』完全相反,故為不符(答案)。其餘(A)高血鉀高肌酸酐高血磷、(B)CK 上升、(D)FENa<1% 皆為橫紋肌溶解可見的檢驗。", "options": {"A": "會出現。橫紋肌溶解釋鉀、釋磷、Cr 上升,呈高血鉀、高肌酸酐、高血磷,非答案。", "B": "會出現。CK(creatine kinase)大幅升高是橫紋肌溶解的診斷標誌,非答案。", "C": "正確答案(不會出現)。橫紋肌溶解尿液應為『潛血陽性但無/極少 RBC』(myoglobinuria),選項說『潛血陰性但有多顆紅血球』正好相反,不符。", "D": "可出現。早期合併容積耗竭時 FENa 可<1%,屬橫紋肌溶解可見表現,非答案。"}, "sources": ["Harrison 21e, Rhabdomyolysis/Pigment Nephropathy", "Brenner & Rector's The Kidney 11e, Myoglobinuric AKI", "KDIGO 2012 AKI Guideline"]}}, "111-通論-麻醉-61": {"quick": "術後 AKI 危險因子含糖尿病、既有腎功能不全、高齡(>65)、心臟/主動脈手術等;BMI 24(正常體位)不是危險因子(C)。", "detail": {"background": "術後/圍術期急性腎損傷(postoperative AKI)是常見且增加死亡率的併發症。危險因子分:(1)病人本身因素──既有慢性腎病/腎功能不全(最強)、糖尿病、高齡(>65 歲)、高血壓、心衰竭、肝硬化、貧血、『肥胖(高 BMI)』、周邊血管疾病;(2)手術因素──心臟手術(尤其體外循環)、主動脈手術、大手術、急診手術、術中大量出血/低血容、長時間低血壓(低平均動脈壓)、輸血;(3)藥物/暴露──腎毒性藥(NSAID、aminoglycoside)、術前顯影劑、ACEI/ARB。本題問『不包括』的危險因子:BMI 24 屬正常體位(BMI 18.5–24.9),不是危險因子(危險者為肥胖/高 BMI);糖尿病、腎功能不全、年齡>65 皆為公認危險因子。故答案為(C)BMI 24。預防:維持足夠灌注與血壓、避免低血容與腎毒物、術前最佳化共病。", "options": {"A": "糖尿病是術後 AKI 公認危險因子(血管病變、腎儲備差),屬危險因子,非答案。", "B": "既有腎功能不全是術後 AKI 最重要的危險因子之一,非答案。", "C": "正確答案(不包括)。BMI 24 屬正常體位,不是術後 AKI 危險因子(危險者為肥胖/高 BMI)。", "D": "年齡>65 歲(高齡)是術後 AKI 危險因子,非答案。"}, "sources": ["Harrison 21e, Perioperative AKI", "Brenner & Rector's The Kidney 11e, Risk Factors for Postoperative AKI", "KDIGO 2012 AKI Guideline"]}}, "112-進階-兒科-66": {"quick": "VUR nephropathy 致 CKD(eGFR 50)的兒童自我照顧重點之一是矯正腎性貧血→提高鐵質與葉酸攝取(D);此期不需限制體育、不必常規預防性抗生素、亦非首要低蛋白。", "detail": {"background": "膀胱輸尿管逆流腎病變(vesicoureteral reflux nephropathy, VUR nephropathy)是兒童 CKD 重要病因之一(逆流致腎瘢痕)。本題女孩 eGFR 50(CKD 第3期)的居家自我照顧:(1)營養與貧血──CKD 兒童常有腎性貧血(EPO 不足)及缺鐵,鼓勵攝取足夠鐵質與葉酸(造血所需),必要時 ESA 與鐵劑,故提高鐵質及葉酸攝取是合適建議;(2)生長與發育──確保足夠熱量與適當蛋白(兒童不宜過度限蛋白以免影響生長,僅在進展期適度調整),不應為了腎病就『不上體育課』,適度運動有益;(3)血壓控制、避免腎毒性藥物、定期追蹤腎功能與尿蛋白;(4)預防性抗生素──常規長期預防性抗生素並非所有 VUR 兒童都需要(視逆流分級、是否反覆 UTI 而定),在已成 CKD 第3期且無活動性感染下,『規則服用預防性抗生素』非首要自我照顧建議。故四選項中最適當為提高鐵質及葉酸攝取。", "options": {"A": "錯誤。CKD 第3期適度運動有益,不需避免上體育課;過度限制活動不利身心發展。", "B": "兒童 CKD 不宜過度低蛋白飲食(影響生長),低蛋白非此期首要自我照顧建議。", "C": "規則長期預防性抗生素並非所有 VUR/CKD 兒童都需要,視逆流分級與反覆感染而定,非此題最適當的日常自我照顧。", "D": "正確答案。CKD 兒童常有腎性貧血與缺鐵,提高鐵質及葉酸攝取以支持造血是適當的自我照顧建議。"}, "sources": ["Harrison 21e, Anemia of CKD", "Nelson Textbook of Pediatrics, Vesicoureteral Reflux; CKD in Children", "KDIGO 2012 Anemia in CKD Guideline"]}}, "112-進階-內科-67": {"quick": "第3期 AKI(KDIGO):Cr 升≥3倍或≥4.0、或無尿≥12hr、或尿量<0.3mL/kg/hr≥24hr;本題符合者為②無尿>12hr與③Cr 2.5→4.5(達4.0)→組合(C)23。", "detail": {"background": "KDIGO 2012 AKI 分期(取 Cr 與尿量較嚴重者):第1期──Cr 升 1.5–1.9倍(7天內基線)或升≥0.3 mg/dL(48小時內),或尿量<0.5 mL/kg/hr 持續 6–12 小時;第2期──Cr 升 2.0–2.9倍,或尿量<0.5 mL/kg/hr 持續≥12 小時;第3期──Cr 升≥3.0倍、或 Cr 升至≥4.0 mg/dL、或開始腎臟替代療法(RRT)、或(<18歲)eGFR<35,或尿量<0.3 mL/kg/hr 持續≥24 小時、或無尿(anuria)≥12 小時。逐項檢視(80 kg 病人):①尿量 30 mL/hr 持續 24hr→每小時 30/80≈0.375 mL/kg/hr,介於 0.3–0.5 之間,符合第1期尿量(<0.5)但未達第3期(<0.3),故①不符第3期;②無尿>12 小時→符合第3期尿量標準✓;③48hr 內 Cr 由 2.5→4.5(達≥4.0,且升幅 1.8倍但達絕對值≥4.0)→符合第3期 Cr 標準✓;④BUN 由 22→66(BUN 不是 KDIGO 分期標準,分期只用 Cr 與尿量)→不符。故符合第3期者為②③,答案(C)23。", "options": {"A": "14(①④)。①尿量 0.375 mL/kg/hr 僅達第1期未達第3期;④BUN 非 KDIGO 分期標準,皆不符第3期。", "B": "13(①③)。①不符第3期(如上),雖③符合,但①錯,故整組不對。", "C": "正確答案。23(②③):②無尿>12hr 符合第3期尿量標準;③Cr 升至≥4.0(2.5→4.5)符合第3期 Cr 標準。", "D": "24(②④)。②符合,但④BUN 變化非 KDIGO 分期標準,故不對。"}, "sources": ["KDIGO 2012 AKI Clinical Practice Guideline (Staging Criteria)", "Harrison 21e, Acute Kidney Injury", "Brenner & Rector's The Kidney 11e, AKI Definition and Staging"]}}, "113-進階-兒科-66": {"quick": "急性腎衰竭飲食要『限磷、限鉀、限鈉』;藕粉/米苔目屬低蛋白低鉀低磷的精緻澱粉,可當點心(D);五穀米、紫菜海帶豆腐、醬瓜皆高鉀/高磷/高鈉。", "detail": {"background": "急性腎衰竭(及進展期 CKD)飲食原則:(1)限鉀──腎排鉀下降易高血鉀(危及心律),避免高鉀食物如全穀類、深綠蔬菜、菇類、堅果、香蕉、楊桃(楊桃對腎病人有神經毒性禁食)、紫菜海帶等海藻、低鈉鹽(含鉀);(2)限磷──避免高磷的全穀、堅果、乳製品、內臟、加工食品、豆製品較高磷者;(3)限鈉──避免醃漬醬菜(醬瓜、豆腐乳)、加工高鹽食品以控制水腫與血壓;(4)適當蛋白與足夠熱量,以精緻澱粉(白米、冬粉、米苔目、藕粉、粉圓)補充熱量而不增加鉀磷蛋白負荷。逐選項:五穀米/糙米屬全穀,鉀磷較白米高,不如白米;紫菜、海帶屬高鉀海藻,豆腐含磷,不宜多;醬瓜為高鈉醃漬品,加重鈉負荷;藕粉、米苔目為精緻澱粉,低鉀低磷低蛋白,適合作為腎病人補充熱量的點心。故(D)最適當。", "options": {"A": "錯誤。五穀米(全穀)鉀、磷含量比白米高,腎衰飲食應選白米較佳,而非五穀米。", "B": "錯誤。紫菜、海帶屬高鉀海藻,豆腐含磷,腎衰病人應避免多吃,以防高血鉀高血磷。", "C": "錯誤。醬瓜為高鈉醃漬品,會增加鈉與水負荷、加重水腫高血壓,不宜。", "D": "正確答案。藕粉、米苔目屬低鉀低磷低蛋白的精緻澱粉,適合作為腎病人補充熱量的點心。"}, "sources": ["Harrison 21e, Nutrition in Kidney Disease", "Brenner & Rector's The Kidney 11e, Dietary Management in AKI/CKD", "KDOQI Nutrition in CKD Guideline 2020"]}}, "113-進階-內科-58": {"quick": "AKI 第1期:Cr 升 1.5–1.9倍或升≥0.3 mg/dL,或尿量<0.5mL/kg/hr 6–12hr;本題 Cr 1.2→1.6(升 0.4≥0.3 且 1.33倍)符合(C)。", "detail": {"background": "依 KDIGO 2012,AKI 第1期定義:血清肌酸酐在 48 小時內升高≥0.3 mg/dL,或在 7 天內升至基線的 1.5–1.9 倍;或尿量<0.5 mL/kg/hr 持續 6–12 小時。逐選項判讀:(A)鉀>6 mEq/L 是高血鉀(透析指徵之一),但『血鉀濃度』本身不是 AKI 分期標準;(B)尿量<0.5 mL/kg/hr 持續 24 小時──持續 24 小時已超過第1期(6–12hr)範圍,對應到更高分期(<0.5 持續≥12hr 為第2期、<0.3 持續≥24hr 為第3期),且 0.5 的門檻配 24hr 不是第1期定義;(C)48 小時內 Cr 由 1.2→1.6:升幅 0.4 mg/dL(≥0.3)且為 1.33倍(<1.5),符合『48hr 內升≥0.3 mg/dL』的第1期標準✓;(D)BUN 22→66 是尿素氮變化,BUN 非 KDIGO 分期標準。故符合第1期者為(C)。記憶:分期只看『Cr 與尿量』,不看 BUN 或鉀;48hr 看絕對值≥0.3,7天看倍數 1.5–1.9。", "options": {"A": "錯誤。血鉀>6 mEq/L 是高血鉀(可能需透析),但不是 AKI 的分期定義標準。", "B": "錯誤。尿量<0.5 mL/kg/hr『持續 24 小時』超出第1期(6–12hr)範圍;第1期尿量標準為持續 6–12 小時。", "C": "正確答案。48 小時內 Cr 由 1.2→1.6,升≥0.3 mg/dL(且<1.5倍),符合第1期。", "D": "錯誤。BUN(尿素氮)變化不是 KDIGO AKI 分期標準。"}, "sources": ["KDIGO 2012 AKI Clinical Practice Guideline (Staging)", "Harrison 21e, Acute Kidney Injury", "Brenner & Rector's The Kidney 11e, AKI Definition and Staging"]}}, "113-進階-內科-80": {"quick": "CKD 貧血常見原因為 EPO 缺乏、缺鐵、慢性發炎(及失血、葉酸/B12不足);維他命B6缺乏不是 CKD 貧血常見原因(B)。", "detail": {"background": "慢性腎病變貧血(anemia of CKD)為多因性:(1)主因 erythropoietin(EPO)生成不足(腎間質周邊細胞受損);(2)功能性與絕對性『缺鐵』──慢性發炎使 hepcidin 上升阻斷鐵吸收與釋出、透析失血、抽血、腸道吸收差;(3)慢性發炎(anemia of inflammation,炎症細胞激素抑制造血、影響鐵利用);(4)紅血球壽命縮短(尿毒環境);(5)營養性缺乏(葉酸、維生素B12)與失血(出血傾向);(6)續發性副甲狀腺亢進(高 PTH 抑制骨髓、骨髓纖維化)。治療:ESA(EPO 類似物)+補鐵(常需靜脈鐵),目標 Hb 約 10–11.5 g/dL。本題問『不是常見原因』:維他命『B6(pyridoxine)缺乏』並非 CKD 貧血的常見原因(B6 缺乏與 sideroblastic anemia 相關,非 CKD 貧血典型機轉);相對地慢性發炎、缺鐵、EPO 缺乏都是 CKD 貧血的核心原因。故答案(B)。", "options": {"A": "慢性發炎(炎症使 hepcidin 上升、抑制造血)是 CKD 貧血常見原因,非答案。", "B": "正確答案(不是常見原因)。維他命B6缺乏與 CKD 貧血無典型關聯(B6 缺乏多致 sideroblastic anemia),非 CKD 貧血常見原因。", "C": "缺鐵性貧血(功能性/絕對性缺鐵)是 CKD 貧血常見且重要的原因,非答案。", "D": "紅血球生成素(EPO)缺乏是 CKD 貧血的主因,非答案。"}, "sources": ["Harrison 21e, Anemia of CKD", "Brenner & Rector's The Kidney 11e, Anemia in CKD", "KDIGO 2012 Anemia in CKD Guideline"]}}, "113-進階-家庭-57": {"quick": "腎前性 AKI 因腎小管努力保鈉→FENa<1%(D)正確;泌尿道腫瘤/抗膽鹼藥屬腎後、失血燒燙傷休克屬腎前、腎絲球腎小管間質損傷屬腎內(各選項把分類弄反)。", "detail": {"background": "本題綜合考 AKI 三分類與尿液指標。腎前性(prerenal)──灌注不足(失血、嚴重燒燙傷、休克、脫水、心衰竭),腎小管完好努力『保鈉保水』,故尿鈉低、FENa<1%(若用利尿劑改看 FEUrea<35%)、BUN/Cr>20、尿濃縮(>500 mOsm/kg)。腎內性(intrinsic)──腎絲球、腎小管(ATN)、間質(AIN)、血管本身損傷。腎後性(postrenal)──尿路阻塞(泌尿道腫瘤、結石、攝護腺肥大、抗膽鹼藥致尿滯留)。逐選項判讀其分類正確與否:(A)泌尿道腫瘤或抗膽鹼藥物(致尿滯留/阻塞)→應屬『腎後性』,選項說『腎內性』錯;(B)大量失血、嚴重燒燙傷或休克→屬『腎前性』,選項說『腎後性』錯;(C)腎絲球、腎小管或腎間質損傷→屬『腎內性』,選項說『腎前性』錯;(D)排鈉分率 FENa<1% 常見於腎前性 AKI(腎小管保鈉)──正確✓。", "options": {"A": "錯誤。泌尿道腫瘤或抗膽鹼藥物(致尿滯留/阻塞)屬『腎後性』,非腎內性。", "B": "錯誤。大量失血、嚴重燒燙傷或休克屬『腎前性』灌注不足,非腎後性。", "C": "錯誤。腎絲球、腎小管或腎間質損傷屬『腎內性』,非腎前性。", "D": "正確答案。腎前性 AKI 腎小管努力保鈉,FENa<1% 常見於腎前性病人。"}, "sources": ["Harrison 21e, Acute Kidney Injury classification and urinary indices", "Brenner & Rector's The Kidney 11e, Prerenal/Intrinsic/Postrenal AKI", "KDIGO 2012 AKI Guideline"]}}, "113-通論-麻醉-66": {"quick": "術中平均動脈壓(MAP)55 mmHg 即使短時間仍有 AKI 風險;敘述『MAP 55 持續<5 分鐘不會引起 AKI』錯誤(A)。", "detail": {"background": "圍術期 AKI 與『腎臟灌注壓』密切相關。研究(如非心臟手術術中低血壓研究)顯示術中平均動脈壓(MAP)低於約 60–65 mmHg 即與術後 AKI 及心肌損傷風險上升相關,且風險隨低血壓的『深度與時間累積』增加──但即使是短暫(數分鐘)的較深度低血壓(MAP≈55)也可能造成腎臟缺血、增加 AKI 風險,並無『持續<5 分鐘就絕對安全』的閾值。因此敘述(A)『MAP 55 持續<5 分鐘並不會引起 AKI』過於武斷且錯誤。其餘正確:術中出血/低血容會降低腎灌注致 AKI;高齡是術後 AKI 危險因子;心臟與主動脈手術(尤其體外循環、主動脈夾鉗致腎缺血、栓塞、發炎)AKI 風險明顯升高。圍術期保腎策略:維持足夠 MAP 與血容、避免腎毒物與顯影劑、術前最佳化共病。", "options": {"A": "錯誤(答案)。術中 MAP 55 mmHg 即使短時間仍可能造成腎缺血、增加 AKI 風險,並無『<5 分鐘就不會引起 AKI』的安全保證。", "B": "正確。術中出血或低血容會降低腎灌注,可能引起 AKI,敘述正確。", "C": "正確。高齡與術後 AKI 發生密切相關,敘述正確。", "D": "正確。心臟與主動脈手術(體外循環、主動脈夾鉗、栓塞、發炎)AKI 風險升高,敘述正確。"}, "sources": ["Harrison 21e, Perioperative AKI", "Brenner & Rector's The Kidney 11e, Hemodynamic Determinants of AKI", "Perioperative Intraoperative Hypotension and AKI literature; KDIGO 2012 AKI Guideline"]}}, "114-進階-兒科-66": {"quick": "兒童 AKI『不應積極』補碳酸氫鈉把 HCO3 拉到 20–26;過度鹼化恐致容積/鈉負荷、低血鈣與鹼中毒,只在嚴重酸中毒謹慎少量補,敘述(D)最不適當。", "detail": {"background": "兒童急性腎損傷的處置重點:(1)高血鉀緊急處理──心電圖變化由高尖 T 波→PR 延長、QRS 增寬→正弦波;處置順序:鈣劑穩定心肌膜、胰島素+葡萄糖/β2 致效劑/碳酸氫鈉使鉀移入細胞、利尿劑/陽離子交換樹脂(kayexalate 口服或灌腸)/透析移除鉀。(2)利尿劑──須在血管內容積足夠時使用,若給予後尿量未改善可考慮連續靜脈輸注,但無尿者勿盲目重複高劑量。(3)代謝性酸中毒──AKI 常見,但補碳酸氫鈉應『謹慎、僅在嚴重酸中毒(pH 低、HCO3 明顯偏低)時少量補充』,『不應積極』把 HCO3 補到 20–26 mEq/L 正常範圍:過度補鹼會帶來鈉與容積負荷(AKI 病人排鈉排水能力差,易加重水腫/肺水腫)、誘發低血鈣(鹼化使游離鈣下降致 tetany)、代謝性鹼中毒、並可能加重高鈉。因此敘述(D)『應積極補碳酸氫鈉維持 HCO3 在 20–26』最不適當。", "options": {"A": "正確。高血鉀早期心電圖變化包括高尖 T 波等(嚴重時 QRS 增寬),敘述大致正確,非答案。", "B": "正確。口服或灌腸給予 kayexalate(陽離子交換樹脂)可促鉀排出,是高血鉀處置之一,非答案。", "C": "正確。利尿劑應在血管內容積足夠時使用,使用後尿量無改善可考慮連續輸注,敘述合理,非答案。", "D": "最不適當(答案)。不應『積極』補碳酸氫鈉把 HCO3 拉到 20–26;過度補鹼致鈉/容積負荷、低血鈣與鹼中毒,僅嚴重酸中毒時謹慎少量補。"}, "sources": ["Harrison 21e, Acute Kidney Injury management; Metabolic Acidosis", "Nelson Textbook of Pediatrics, Management of AKI", "KDIGO 2012 AKI Guideline"]}}, "114-進階-內科-11": {"quick": "腎前性 AKI 腎小管努力保鈉→FENa<1%;『FENa>1%』不符腎前性(A);其餘尿滲透壓>500、BUN/Cr>20、FEUrea<35% 皆符合腎前性。", "detail": {"background": "腎前性 AKI(prerenal)診斷靠尿液指標,反映腎小管功能完好努力保鈉保水:(1)FENa(fractional excretion of sodium)<1%──腎小管重吸收鈉以保留容積,故排鈉分率低;(2)尿滲透壓>500 mOsm/kg──腎小管濃縮能力正常,尿濃縮;(3)BUN/Cr 比值>20──BUN 隨水被重吸收,不成比例升高;(4)尿鈉<20 mEq/L;(5)當病人使用利尿劑(干擾 FENa)時改用 FEUrea(fractional excretion of urea)<35% 判斷腎前性。相對腎內性 ATN:FENa>2%、尿滲透壓<350(等張尿)、BUN/Cr≈10–15、FEUrea>50%。本題問『不符合腎前性』:(A)FENa>1% 與腎前性的<1% 相反,故不符(答案);(B)尿滲透壓>500、(C)BUN/Cr>20、(D)FEUrea<35% 皆符合腎前性。", "options": {"A": "正確答案(不符合)。腎前性 AKI 應為 FENa<1%(腎小管保鈉);FENa>1% 反而提示腎小管受損(如 ATN),不符腎前性。", "B": "符合腎前性。尿滲透壓>500 mOsm/kg 表示腎小管濃縮功能完好,屬腎前性特徵。", "C": "符合腎前性。BUN/Cr>20 因 BUN 隨水重吸收升高,屬腎前性特徵。", "D": "符合腎前性。FEUrea<35%(用於使用利尿劑時)提示腎前性。"}, "sources": ["Harrison 21e, Urinary Indices in AKI", "Brenner & Rector's The Kidney 11e, Prerenal AKI Diagnosis", "KDIGO 2012 AKI Guideline"]}}, "114-進階-外科-28": {"quick": "AKI 因排泄下降典型是『高血鉀、高血磷、低血鈣、代謝性酸中毒』;選項說『低血鉀、低血磷、高血鈣』方向全反,錯誤(A)。", "detail": {"background": "急性腎損傷(AKI)的定義與代謝後果需熟記。KDIGO 定義:48 小時內 Cr 升高≥0.3 mg/dL,或 7 天內升至基線 1.5 倍,或尿量<0.5 mL/kg/hr 持續≥6 小時。AKI 因腎臟排泄與調節功能下降,典型電解質/酸鹼變化為:(1)『高血鉀』(排鉀下降+細胞釋鉀+酸中毒使鉀外移)──最危及生命;(2)『高血磷』(排磷下降);(3)『低血鈣』(高磷結合鈣、calcitriol 不足);(4)『代謝性酸中毒』(無法排酸、重碳酸鹽流失);(5)氮血症(BUN/Cr 上升)、可能高尿酸。腎內性 AKI 最常見原因是急性腎小管壞死(ATN)。逐選項:(A)說『低血鉀、低血磷、高血鈣及代謝性酸中毒』──鉀磷鈣方向全與 AKI 典型相反(應為高鉀、高磷、低鈣),故錯誤(答案);(B)尿量<0.5 mL/kg/hr 持續 6 小時符合 AKI 尿量標準,正確;(C)48hr 內 Cr 升高≥0.3 mg/dL 符合 AKI 定義,正確;(D)腎內性 AKI 最常見原因為 ATN,正確。", "options": {"A": "錯誤(答案)。AKI 典型為『高血鉀、高血磷、低血鈣』+代謝性酸中毒;選項說低血鉀、低血磷、高血鈣方向全反。", "B": "正確。尿量<0.5 mL/kg/hr 持續 6 小時符合 AKI(KDIGO)尿量標準,敘述正確。", "C": "正確。48 小時內血清肌酸酐升高≥0.3 mg/dL 符合 AKI 定義,敘述正確。", "D": "正確。腎內性(intrinsic)AKI 最常見原因是急性腎小管壞死(ATN),敘述正確。"}, "sources": ["Harrison 21e, Acute Kidney Injury (metabolic complications)", "Brenner & Rector's The Kidney 11e, AKI Definition and Consequences", "KDIGO 2012 AKI Guideline"]}}, "114-進階-家庭-61": {"quick": "低血容性休克致 AKI,最緊迫且優先是『恢復有效循環血容量』(等張輸液回填灌注)(B);利尿劑、抗生素、腎切片皆非當下首要。", "detail": {"background": "本題為低血容性休克併腎前性 AKI 的急救優先順序。75 歲病人因低血容性休克(BP 80/50、脈搏 110、尿量明顯減少)致急性腎衰竭,背景有 CKD(基線 Cr 1.4)。腎前性 AKI 的根本問題是『有效循環血容量不足、腎灌注下降』,故最緊迫且優先的處置是『快速恢復有效循環血容量』──給予等張晶體液(生理食鹽水/林格氏液)積極輸液,必要時輸血(若失血)與血管活性藥,以回復血壓與腎灌注。及時補容可使腎前性 AKI 可逆,延遲則進展為缺血性 ATN。其他選項時機不對:(C)在低血容未矯正前給利尿劑會加重容積耗竭、惡化灌注,禁忌;(A)抗生素僅在有感染/敗血證據時使用,本題主因是低血容而非感染,非當下首要;(D)腎臟穿刺活檢用於不明原因腎實質病變診斷,在休克急救當下並不適當且有出血風險。處置原則:先穩定循環(ABC、容積復甦)再找並處理出血/失液源頭。", "options": {"A": "靜脈抗生素僅在有感染/敗血證據時使用;本題主因是低血容性休克,抗生素非當下最緊迫處置。", "B": "正確答案。低血容性休克致腎前性 AKI,最緊迫且優先是恢復有效循環血容量(積極等張輸液/必要時輸血)以回復腎灌注。", "C": "錯誤。容積未矯正前給利尿劑會加重容積耗竭、惡化腎灌注,為禁忌。", "D": "錯誤。休克急救當下不適合做腎臟穿刺活檢(有出血風險且非當前需要)。"}, "sources": ["Harrison 21e, Shock; Acute Kidney Injury (prerenal)", "Brenner & Rector's The Kidney 11e, Management of Prerenal AKI", "KDIGO 2012 AKI Guideline"]}}, "105-TNPA-兒科-58": {"quick": "高血鈉(151)+高血漿滲透壓(303)但尿液稀釋(尿osm 107、SG 1.004)→無法濃縮尿液=尿崩症(DI)。", "detail": {"background": "尿崩症(diabetes insipidus, DI)為 ADH(vasopressin)缺乏(中樞性)或腎臟對 ADH 無反應(腎因性)，導致集尿管 free water 再吸收障礙→大量稀釋尿、多尿、煩渴。診斷核心數值:當血漿高張(高血鈉、plasma osmolality↑)時尿液卻無法適當濃縮(urine osmolality 偏低、尿比重低)，即為腎臟濃縮功能失能。本題女孩血鈉 151(>145)、血漿 osm 303(>295,高張)，尿 osm 僅 107、尿比重 1.004(極稀)，呈現典型『高張血漿+不當稀釋尿』=DI。多尿且體重下降為脫水表現。鑑別:正常人在高血鈉/高張狀態下尿 osm 應 >600–800、尿比重 >1.020(代償性濃縮)。診斷工具:水剝奪試驗(water deprivation test)觀察尿 osm 能否上升，再給 DDAVP——中樞性 DI 給 DDAVP 後尿 osm 上升 >50%(腎臟能反應)，腎因性 DI 則無反應。兒童中樞性 DI 常見病因:顱咽管瘤、組織球增生症、頭部外傷、術後;腎因性:遺傳性 AVPR2/AQP2 突變、低血鉀、高血鈣、鋰鹽。護理:嚴格監測 I/O、體重、血鈉、神經學;補水不可過快以免腦水腫。陷阱:本題血糖正常→排除糖尿病;BUN/Cr 正常、無酸血症→排除 RTA。", "options": {"A": "正確。高血鈉+高血漿滲透壓卻搭配低尿滲透壓、低尿比重=腎臟在該濃縮時無法濃縮，即 DI 的標準表現。延伸:此時應以 DDAVP 試驗區分中樞性 vs 腎因性。", "B": "錯。糖尿病(DM)會多尿但屬『滲透性利尿』，因高血糖使尿糖↑帶走水分→尿 osm 與尿比重反而偏高(>1.020)且尿糖陽性;本題血糖正常，排除。", "C": "錯。腎小管酸血症(RTA)主要表現為 normal anion gap 代謝性酸血症與低血鉀/生長遲滯，不以高血鈉+稀釋尿為特徵;本題 BUN/Cr 正常、無酸血症描述。", "D": "錯。心因性(精神性)多飲(psychogenic polydipsia)因大量飲水使血漿被稀釋→血鈉與血漿 osm 應『偏低』，與本題高血鈉(151)、高血漿 osm 矛盾;且尿稀釋是因水負荷過多而非濃縮失能。"}, "sources": ["Harrison 21e, Fluid and Electrolyte Disturbances; Disorders of the Neurohypophysis", "Brenner & Rector's The Kidney 11e, Disorders of Water Balance", "Nelson Textbook of Pediatrics, Diabetes Insipidus"]}}, "106-106a-內科-5": {"quick": "術後低血容性休克(心跳快、低血壓、口乾少尿)→首選等張晶體液 0.9% 生理食鹽水快速擴容。", "detail": {"background": "術後出現口乾、少尿、心跳加速(120/分)、低血壓(80/60)為典型低血容(hypovolemia)/早期休克表現,病生理為有效循環容積不足→交感代償心搏加速、腎灌流下降致少尿。處置原則:迅速以『等張晶體液』補充血管內容積。0.9% normal saline(NS, 308 mOsm/L)與血漿等張,輸入後留在血管內/細胞外液(ECF)、不會造成滲透壓劇變，是急性容積復甦首選;另一選擇為 lactated Ringer's。輸液種類分布:等張液(NS、LR)主要擴張 ECF→適合擴容;低張液(0.45% saline、台大五號/D5 含葡萄糖代謝後變 free water)會進入細胞內、擴容效果差且可能致低血鈉;5% glucose(D5W)代謝後等同純水→僅 1/12 留血管內,擴容無效且稀釋血鈉。護理:快速給 NS 後監測血壓、心跳、尿量(目標 >0.5 mL/kg/hr)、CVP/灌流;持續低血壓考慮失血需輸血/找出血點。陷阱:葡萄糖水/低張液不能用於急性休克復甦。", "options": {"A": "正確。0.9% 生理食鹽水為等張晶體液,輸入後主要停留於血管內與 ECF,能有效擴張有效循環容積、提升血壓與腎灌流,為低血容性休克復甦首選。", "B": "錯。0.45% 食鹽水為低張液,大部分水分會進入細胞內,血管內擴容效果差,且可能引起低血鈉,不適合急性容積復甦。", "C": "錯。5% 葡萄糖水所含葡萄糖被代謝後相當於純 free water,僅約 1/12 留在血管內,擴容幾乎無效並稀釋血鈉,禁用於休克復甦。", "D": "錯。台大五號(TAITA No.5)為含葡萄糖之低張維持液,設計用途是日常維持輸液而非急性擴容,擴容效率不足。"}, "sources": ["Harrison 21e, Approach to the Patient with Shock; Fluid and Electrolyte Disturbances", "Brenner & Rector's The Kidney 11e, Intravenous Fluid Therapy", "Surviving Sepsis / 急性復甦晶體液原則"]}}, "106-106a-內科-26": {"quick": "代謝性酸中毒=pH↓+HCO3↓並呼吸代償 PaCO2↓→選 pH 7.31、PaCO2 34、HCO3 17(D)。", "detail": {"background": "代謝性酸中毒(metabolic acidosis)原發異常為 HCO3 下降→pH 下降;呼吸系統代償為過度換氣使 PaCO2 下降(以 Winter's formula 預期 PaCO2 = 1.5×HCO3 + 8 ± 2)。SLE 併腎功能不全者因腎臟無法排酸/保留 HCO3,易產生代謝性酸中毒(可為 uremia 之 high AG 或 RTA 之 normal AG)。判讀 ABG 步驟:①看 pH 判酸/鹼血症;②看原發是代謝(HCO3)或呼吸(PaCO2);③算代償是否適當;④高 AG 酸中毒再算 anion gap(Na−Cl−HCO3,正常 8–12)。選項 D: pH 7.23 偏酸、HCO3 17(↓)為原發代謝性酸中毒,PaCO2 34(↓)為呼吸代償,完全符合代謝性酸中毒;以 Winter's 預期 PaCO2=1.5×17+8=33.5,實測 34 代償適當。護理:監測呼吸型態(Kussmaul 深快呼吸)、ABG 追蹤、找病因(腎功能、乳酸、酮體)、針對病因治療。陷阱:勿把『HCO3 高+PaCO2 高』誤判為酸中毒(那是代謝性鹼或呼吸性酸)。", "options": {"A": "錯。pH 7.42 正常偏鹼、PaCO2 48(↑)、HCO3 28(↑)→屬代謝性鹼中毒(HCO3↑)併呼吸代償或代償後狀態,非酸中毒。", "B": "錯。pH 7.43、PaCO2 42(正常)、HCO3 30(↑)→代謝性鹼中毒,pH 偏鹼,與題目代謝性酸中毒不符。", "C": "錯。pH 7.23(酸)、PaCO2 60(↑)、HCO3 28(↑)→原發為 PaCO2 升高的『呼吸性』酸中毒(HCO3 代償性上升),非代謝性酸中毒。", "D": "正確。pH 7.31(酸)、HCO3 17(↓,原發)、PaCO2 34(↓,呼吸代償)→典型代謝性酸中毒,符合 SLE 腎功能不全排酸障礙。"}, "sources": ["Harrison 21e, Acidosis and Alkalosis", "Brenner & Rector's The Kidney 11e, Metabolic Acidosis", "ABG 判讀與 Winter's formula"]}}, "106-106a-內科-41": {"quick": "酗酒+腹瀉造成難治性低血鈣+低血鉀,最該檢查 magnesium——低血鎂會同時致頑固低鈣低鉀。", "detail": {"background": "本題 47 歲酗酒男性,低血鈣(6.0)、低血鉀(3.4)、QT 延長、白蛋白偏低。關鍵在『酗酒+腹瀉』為低血鎂(hypomagnesemia)經典情境(酒精性營養不良、腸道流失、腎臟漏鎂)。低血鎂的核心臨床意義:會造成『難以矯正的低血鉀與低血鈣』——低鎂抑制 PTH 分泌與作用→低血鈣;低鎂使腎臟 ROMK 鉀通道活性增加→持續漏鉀致頑固低血鉀。因此遇到同時低鈣+低鉀且補充無效時,務必檢查並補充鎂,否則鈣鉀補不上去。低血鈣校正:總鈣須以白蛋白校正(corrected Ca = 量測Ca + 0.8×(4−albumin)),本題 albumin 3.0,校正後 Ca = 6.0 + 0.8×1.0 = 6.8,仍明顯偏低→真性低血鈣。低血鈣 ECG 特徵為 QT 延長(本題符合)、可有 Chvostek/Trousseau 徵象、tetany。護理:心電圖監測 QT/心律、抽搐預防、鎂鈣鉀同步追蹤。陷阱:此情境若只補鈣鉀而不查/補鎂,將反覆失敗。", "options": {"A": "錯。1,25-Dihydroxyvitamin D 用於評估維生素 D 代謝相關低鈣,但本題情境(酗酒+腹瀉+合併低鉀)最直接指向低血鎂,非首要;且補維生素 D 無法解決低鎂導致的 PTH 抑制。", "B": "錯。24 小時尿鈣排泄用於評估高血鈣鑑別(如 FHH)或結石、副甲狀腺評估,對此急性低鈣低鉀情境非當務之急。", "C": "錯。ionized calcium 可確認真性低鈣(尤其白蛋白異常時),但本題已可用白蛋白校正判定為真性低鈣;真正解開『同時低鈣低鉀且難矯正』之謎的是鎂值,故 magnesium 更適當。", "D": "正確。酗酒+腹瀉高度懷疑低血鎂;低血鎂同時造成頑固性低血鈣(抑制PTH)與低血鉀(腎臟漏鉀),不先測並補鎂則鈣鉀皆難矯正,故 magnesium level 最適當。"}, "sources": ["Harrison 21e, Disorders of Magnesium / Calcium Metabolism", "Brenner & Rector's The Kidney 11e, Disorders of Magnesium Balance", "低血鎂致頑固低鉀低鈣機轉"]}}, "106-106a-內科-64": {"quick": "SIADH=euvolemic hyponatremia,尿濃縮不當偏高(尿osm>100)、尿鈉>30,治療首選限水。", "detail": {"background": "SIADH(syndrome of inappropriate ADH secretion)因 ADH 不當分泌→集尿管 free water 再吸收↑→稀釋性低血鈉、臨床 euvolemia(無水腫亦無脫水)。診斷準則:serum Na<135、plasma osmolality<275、urine osmolality>100(尿無法適當稀釋,反映 ADH 持續作用)、urine Na>30、臨床 euvolemia、甲狀腺與腎上腺功能正常、近期未用利尿劑。病因:CNS 病變(腦傷、出血)、肺部疾病(小細胞肺癌 paraneoplastic、肺炎、結核)、藥物(SSRI、carbamazepine、cyclophosphamide、抗精神病藥)、術後疼痛/噁心。治療階梯:輕中度限水(<800–1000 mL/day)為首選;嚴重或有神經症狀(癲癇/昏迷)用 3% hypertonic saline,矯正速度 <8–10 mEq/L/24hr 以免 osmotic demyelination syndrome(ODS);慢性難治可用 vaptans(V2 拮抗劑)或鹽片/urea。護理:嚴格監測 I/O、體重、血鈉趨勢、神經學變化。陷阱:SIADH 為等容,須與低血容(cerebral salt wasting、利尿劑)及高血容(心衰、肝硬化、腎病)區別;甲低與腎上腺不足也會低鈉,須先排除。", "options": {"A": "正確。SIADH 為典型 euvolemic(等容性)hyponatremia——ADH 增加水再吸收使血鈉稀釋,但鈉總量正常故無明顯水腫或脫水。", "B": "錯。甲狀腺功能低下確實會造成低血鈉,但那是另一種病因;SIADH 的診斷前提反而是『甲狀腺與腎上腺功能正常』方能成立,故甲低非 SIADH 常見原因。", "C": "錯。SIADH 因 ADH 過多,腎臟濃縮尿液能力『過強/不當偏高』(urine osmolality >100 甚至很高),並非濃縮能力不全;濃縮能力不全(尿稀釋)反而是尿崩症。", "D": "錯。治療首選『限水』;若給大量等張生理食鹽水,因 ADH 持續作用會把水留下、把鈉排掉,反可能惡化低血鈉(desalination 現象)。嚴重症狀才用『高張』3% saline 並嚴控矯正速度。"}, "sources": ["Harrison 21e, Fluid and Electrolyte Disturbances; Disorders of the Neurohypophysis", "Brenner & Rector's The Kidney 11e, Hyponatremia / Disorders of Water Balance", "NEJM 綜論 SIADH/hyponatremia 處置原則"]}}, "106-106a-通論-58": {"quick": "pH 7.2+HCO3↓+AG 20(高)=高陰離子間隙代謝性酸中毒;過度換氣症候群是呼吸性鹼,最不可能。", "detail": {"background": "本題 ABG: pH 7.2(酸)、HCO3 14.2(↓)、PaCO2 30(↓,代償)、anion gap 20(>12,升高)→診斷為『高陰離子間隙代謝性酸中毒(high AG metabolic acidosis)』。AG=Na−Cl−HCO3(正常 8–12),升高代表體內堆積『未測定的酸根陰離子』。高 AG 酸中毒病因記憶法 GOLDMARK / MUDPILES:lactate(乳酸)、ketoacidosis(糖尿病/飢餓/酒精酮酸)、uremia(腎衰竭尿毒)、salicylate(水楊酸/阿斯匹靈中毒)、methanol/ethylene glycol、propylene glycol 等。本題選項中:水楊酸中毒(產生有機酸)、飢餓(ketoacidosis)、腎衰竭(uremia)皆屬高 AG 酸中毒。而『過度換氣症候群』是把 CO2 吹掉→PaCO2↓、pH↑,屬『呼吸性鹼中毒』,不會造成 HCO3 與 AG 升高的代謝性酸中毒,故為最不可能。判讀提醒:本題 PaCO2 下降是『繼發於酸中毒的代償(呼吸代償)』,不是原發過度換氣。護理:辨別代償 vs 原發、追 ABG、針對病因(補液、降血糖酮、透析)。", "options": {"A": "正確(最不可能)。過度換氣症候群造成呼吸性鹼中毒(PaCO2↓、pH↑、HCO3 正常或代償性略降),與本題 pH 7.2 之高 AG 代謝性酸中毒病生理相反,故不可能是病因。", "B": "錯(屬可能病因)。水楊酸(salicylate)中毒會產生有機酸並刺激乳酸生成,造成高 AG 代謝性酸中毒(典型還合併呼吸性鹼的混合型),符合本題。", "C": "錯(屬可能病因)。飢餓會誘發 ketoacidosis(酮酸堆積)→高 AG 代謝性酸中毒,符合本題之 AG 20。", "D": "錯(屬可能病因)。腎衰竭使硫酸鹽、磷酸鹽等有機酸無法排除→uremic acidosis,典型高 AG 代謝性酸中毒,符合本題。"}, "sources": ["Harrison 21e, Acidosis and Alkalosis (anion gap)", "Brenner & Rector's The Kidney 11e, Metabolic Acidosis", "高 AG 酸中毒 GOLDMARK/MUDPILES 鑑別"]}}, "107-TNPA-內科-2": {"quick": "腎衰竭因腎臟排鎂↓反致『高』血鎂;低血鎂常見於高血鈣、腹瀉、aminoglycoside,故腎衰竭(D)非低鎂原因。", "detail": {"background": "鎂主要由小腸吸收、腎臟調節排泄(亨利氏環升枝再吸收)。低血鎂(hypomagnesemia)機轉分三類:①腸道流失(慢性腹瀉、吸收不良、PPI 長期使用)、②腎臟流失(利尿劑、aminoglycosides、cisplatin、amphotericin B、Bartter/Gitelman、酒精、高血鈣)、③攝取/分布(酗酒營養不良、refeeding、急性胰臟炎)。高血鈣會經 calcium-sensing receptor 抑制亨利氏環對鎂的再吸收→腎臟漏鎂→低血鎂。低血鎂臨床:神經肌肉興奮(tremor、tetany、Chvostek/Trousseau)、心律不整(torsades de pointes)、並造成『難治性低血鉀與低血鈣』。相對地,腎衰竭(尤其晚期 CKD/ESRD)因腎絲球濾過下降、排鎂能力降低→鎂滯留→傾向『高血鎂(hypermagnesemia)』,而非低血鎂。治療低血鎂:口服或靜脈 MgSO4,合併低鉀低鈣須同補。護理:心電圖監測 QT、深部肌腱反射、追蹤鎂鈣鉀。陷阱:腎衰竭+服用含鎂制酸劑/瀉劑更易高血鎂。", "options": {"A": "錯(是低鎂原因)。高血鈣經 calcium-sensing receptor 抑制亨利氏環對鎂與鈣的再吸收,造成腎臟漏鎂→低血鎂。", "B": "錯(是低鎂原因)。長期腹瀉使腸道鎂大量流失,為低血鎂常見原因之一(下消化道分泌液富含鎂)。", "C": "錯(是低鎂原因)。aminoglycosides 具腎小管毒性,損害亨利氏環/遠端小管對鎂的再吸收→腎臟漏鎂致低血鎂(亦常合併低鉀低鈣)。", "D": "正確(非低鎂原因)。腎衰竭時腎臟排鎂能力下降→鎂滯留,反而傾向『高血鎂』,並非導致低血鎂的原因,故為答案。"}, "sources": ["Harrison 21e, Disorders of Magnesium Metabolism", "Brenner & Rector's The Kidney 11e, Disorders of Magnesium Balance", "CKD 與電解質滯留"]}}, "107-TNPA-內科-30": {"quick": "低血鈉(124)+尿鈉 35+euvolemia(皮膚濕潤無水腫)+甲狀腺腎上腺正常=SIADH(常見於腦中風)。", "detail": {"background": "本題 78 歲陳舊性腦中風女性,癲癇發作,血鈉 124(低)、尿鈉 35(>30,尿鈉不適當偏高)、皮膚濕潤無水腫(euvolemia)、甲狀腺與腎上腺功能正常。完全符合 SIADH 診斷準則(低血鈉、euvolemia、尿鈉>30、無利尿劑、甲狀腺/腎上腺正常)。低血鈉的容積分類是鑑別關鍵:①hypovolemic(脫水、皮膚乾、尿鈉<20——若腎外流失):嘔吐腹瀉、利尿劑;②euvolemic:SIADH、甲低、腎上腺不足、原發性多飲;③hypervolemic(水腫):心衰、肝硬化、腎病症候群。本題病人 euvolemic 且尿鈉高→指向 SIADH。CNS 病變(中風、腦傷、腫瘤)是 SIADH 典型病因(本題陳舊性中風+管灌),且管灌低鈉飲食/free water 過多也加重低鈉。低血鈉可致意識變化與癲癇(本題以癲癇表現)。治療:限水為主,嚴重症狀(癲癇)時短期 3% saline 並控矯正速度 <8 mEq/L/24hr 防 ODS。護理:嚴格 I/O、體重、血鈉趨勢、神經學/抽搐照護。", "options": {"A": "正確。Euvolemia(皮膚濕潤無水腫)+尿鈉 35(>30)+甲狀腺腎上腺正常+低血鈉=SIADH;陳舊性腦中風為其常見 CNS 病因。", "B": "錯。鬱血性心衰竭屬『高血容性(hypervolemic)』低血鈉,會有水腫、頸靜脈怒張等容積過多徵象,且有效循環不足使尿鈉常 <20;本題無水腫,不符。", "C": "錯。體液容積不足(hypovolemic)會皮膚乾、tenting、心搏快,腎外流失時尿鈉 <20;本題皮膚濕潤、euvolemia,與此矛盾。", "D": "錯。腎病症候群屬高血容性低血鈉(水腫、低白蛋白、大量蛋白尿),本題無此描述且為 euvolemia,不符。"}, "sources": ["Harrison 21e, Fluid and Electrolyte Disturbances (hyponatremia 分類)", "Brenner & Rector's The Kidney 11e, Hyponatremia", "SIADH 與 CNS 病變"]}}, "108b-TNPA-內科-2": {"quick": "SIADH 屬『等容性』低血鈉,非低容積性;低容積性低血鈉病因為失血、腹瀉、醛固酮缺乏(D 為答案)。", "detail": {"background": "低血鈉依容積狀態分三類,是鑑別與治療核心。①低容積性(hypovolemic)低血鈉:體液與鈉同時流失但水補回相對較多→血鈉低且有效循環不足。病因:腎外流失(嘔吐、腹瀉、出血、第三間隙、燒傷,尿鈉<20)與腎臟流失(利尿劑、醛固酮缺乏/腎上腺不足、salt-wasting nephropathy,尿鈉>20)。醛固酮缺乏(如原發性腎上腺不足 Addison's)使腎臟保鈉能力下降→失鈉失水致低容積性低血鈉並常合併高血鉀。②等容性(euvolemic):SIADH、甲低、腎上腺糖皮質不足、原發性多飲——體液大致正常,無明顯脫水或水腫。③高容積性(hypervolemic):心衰、肝硬化、腎病症候群(水腫)。本題問『何者不是低容積性低血鈉原因』,SIADH 屬『等容性』,故為答案。治療:低容積性以等張 NS 補容積矯正;SIADH 以限水為主(給 NS 反惡化)。護理:評估容積狀態(皮膚、頸靜脈、體重、I/O)、尿鈉,決定補液策略。", "options": {"A": "錯(是低容積性原因)。失血造成血管內容積與鈉同時流失,屬低容積性低血鈉,須以晶體液/輸血復甦。", "B": "錯(是低容積性原因)。腹瀉經腸道流失等張液體,屬腎外性低容積流失(尿鈉<20),為低容積性低血鈉典型原因。", "C": "錯(是低容積性原因)。醛固酮缺乏(腎上腺不足)使腎臟無法保鈉→失鈉失水致低容積性低血鈉(常伴高血鉀),屬腎臟性流失(尿鈉>20)。", "D": "正確(非低容積性原因)。SIADH 為 ADH 過多致水滯留的『等容性』低血鈉,容積大致正常無脫水,不屬低容積性,故為答案。"}, "sources": ["Harrison 21e, Fluid and Electrolyte Disturbances (hyponatremia 容積分類)", "Brenner & Rector's The Kidney 11e, Hyponatremia", "腎上腺不足與低血鈉"]}}, "108a-TNPA-內科-70": {"quick": "乳酸過多(lactic acidosis)堆積有機酸根→高陰離子間隙代謝性酸中毒;腹瀉與RTA屬正常AG。", "detail": {"background": "代謝性酸中毒依 anion gap(AG=Na−Cl−HCO3,正常 8–12)分兩大類。①高 AG(high anion gap):因產生或堆積『未測定有機酸根』,HCO3 被消耗、Cl 不變→AG↑。病因 GOLDMARK/MUDPILES:lactate(乳酸,如休克/敗血症/組織缺氧/metformin)、ketoacidosis(糖尿病/酒精/飢餓)、uremia(腎衰竭)、毒物(methanol、ethylene glycol、salicylate、propylene glycol)。②正常 AG(normal/hyperchloremic):因 HCO3 直接流失或排酸障礙,Cl 代償上升維持 AG 正常。病因:腹瀉(下消化道流失 HCO3)、腎小管酸血症(RTA,腎臟排酸或保 HCO3 障礙)、carbonic anhydrase 抑制劑、輸尿管轉流。本題乳酸過多即經典『高 AG』酸中毒;腹瀉與 RTA 是『正常 AG』酸中毒的兩大代表,故答案為乳酸(B)。COPD 主要造成『呼吸性』酸中毒(CO2 滯留),非代謝性。護理:測 AG、找病因、針對乳酸需改善組織灌流/治敗血症。", "options": {"A": "錯(屬正常 AG)。腹瀉經下消化道直接流失富含 HCO3 的腸液,Cl 代償上升→正常 anion gap(高血氯)代謝性酸中毒,而非高 AG。", "B": "正確。乳酸堆積屬未測定有機酸根,消耗 HCO3、Cl 不變→高 anion gap 代謝性酸中毒,常見於休克、敗血症、組織缺氧。", "C": "錯(屬正常 AG)。RTA 為腎小管排酸或保留 HCO3 障礙,以 Cl 代償維持 AG 正常→正常 anion gap 酸中毒。", "D": "錯。COPD 造成的是肺泡換氣不足、CO2 滯留→『呼吸性』酸中毒,並非代謝性高 AG 酸中毒。"}, "sources": ["Harrison 21e, Acidosis and Alkalosis (anion gap 分類)", "Brenner & Rector's The Kidney 11e, Metabolic Acidosis", "乳酸性酸中毒機轉"]}}, "108b-TNPA-內科-76": {"quick": "SIADH 首要治療=限制水分攝取(限水);嚴重症狀才用 3% 高張鹽水,利尿劑/白蛋白非首選。", "detail": {"background": "SIADH 因 ADH 不當分泌→集尿管自由水再吸收過多→稀釋性低血鈉、euvolemia。治療階梯以『限水(fluid restriction)』為首要與最基本措施:限制每日水分攝取(常 <800–1000 mL/day)以使體內 free water 負平衡、血鈉緩慢回升。為何不給生理食鹽水?因 ADH 持續作用,輸入的鈉會被排出、水卻被留下(desalination),反可能惡化低血鈉。僅在『嚴重症狀性低血鈉』(癲癇、昏迷)時才短期使用 3% hypertonic saline,並嚴控矯正速度 <8–10 mEq/L/24hr 以免 osmotic demyelination syndrome(ODS)。慢性/限水無效者可加 vaptans(V2 受體拮抗劑 tolvaptan)、urea 或鹽片+loop diuretic。利尿劑單獨非首選(可作輔助);白蛋白用於低白蛋白/肝腎症候群,與 SIADH 無關。護理:嚴格 I/O、每日體重、血鈉趨勢監測(避免矯正過快)、衛教限水。陷阱:選『高張鹽水』為首要是錯的——它僅限嚴重症狀時使用,基本/首要仍是限水。", "options": {"A": "錯。高張(3%)鹽水僅用於『嚴重症狀性』低血鈉(癲癇、昏迷)之緊急處置,並非 SIADH 的首要/常規治療,且須嚴控矯正速度。", "B": "正確。限制水分攝取是 SIADH 的首要與最基本治療,藉由 free water 負平衡使血鈉緩慢回升,安全且不會引發過快矯正。", "C": "錯。利尿劑(常配合鹽片)可作為限水效果不足時的輔助,但非首要治療;單獨使用且不限水並不能根本解決水滯留。", "D": "錯。白蛋白輸液用於低白蛋白血症或肝腎症候群等容積問題,與 SIADH 的水滯留機轉無關,不適用。"}, "sources": ["Harrison 21e, Fluid and Electrolyte Disturbances (SIADH 治療)", "Brenner & Rector's The Kidney 11e, Hyponatremia 處置", "SIADH 限水/高張鹽水適應症"]}}, "108a-TNPA-婦產科-73": {"quick": "硫酸鎂治療下出現深部肌腱反射消失+PR延長QRS變寬+腎功能差→高血鎂中毒,血鎂約 8.4–12.4 mg/dL(C)。", "detail": {"background": "子癇前症孕婦以硫酸鎂(MgSO4)預防/治療癲癇(子癇),但鎂主要經腎臟排除,腎功能差(本題 Cr 2.1)時易蓄積中毒。高血鎂(hypermagnesemia)依濃度呈現漸進毒性(正常血鎂約 1.7–2.4 mg/dL):①4–7 mg/dL(治療範圍上緣):噁心、潮紅、嗜睡;②約 7–10 mg/dL:深部肌腱反射(DTR)『消失』(最早且重要的監測指標)、低血壓;③約 >10–12 mg/dL:呼吸抑制、PR 延長/QRS 增寬/傳導阻滯、嗜睡;④>15 mg/dL:呼吸麻痺、心搏停止。本題已出現『深部肌腱反射消失+PR 延長+QRS 變寬』,屬中重度毒性,對應血鎂約 8.4–12.4 mg/dL(選項 C)。處置:立即停 MgSO4、給 calcium gluconate(鈣為鎂的生理拮抗劑,穩定膜電位/解毒)、支持呼吸循環、必要時透析(尤其腎功能差)。護理監測:給 MgSO4 時每小時評估 DTR、呼吸次數(>12/分)、尿量(>30 mL/hr)、意識——DTR 消失是停藥警訊。陷阱:選項 D『16.4–20.4 mmol/L』單位錯置且過高;mg/dL 與 mmol/L 不可混。", "options": {"A": "錯。2.0–3.5 mg/dL 接近正常或略高,不會造成深部肌腱反射消失與明顯 ECG 傳導改變,與本題嚴重毒性表現不符。", "B": "錯。4.8–8.0 mg/dL 為輕中度升高,可能有潮紅、嗜睡、DTR 減弱,但尚未到 DTR『完全消失』合併 PR 延長、QRS 變寬的程度。", "C": "正確。出現 DTR 消失+PR 延長+QRS 變寬屬中重度高血鎂毒性,對應血鎂約 8.4–12.4 mg/dL,且腎功能差利於鎂蓄積。", "D": "錯。16.4–20.4『mmol/L』單位錯誤且換算過高(>15 mg/dL 已心搏停止),與病人仍存活之臨床狀態不符。"}, "sources": ["Harrison 21e, Disorders of Magnesium Metabolism (hypermagnesemia)", "Williams Obstetrics, Magnesium Sulfate Toxicity", "MgSO4 中毒分級與 calcium gluconate 解毒"]}}, "108a-TNPA-通論-6": {"quick": "敗血症組織灌流不足→無氧代謝產生乳酸→lactic acidosis(乳酸)為其代謝性酸中毒最相關指數。", "detail": {"background": "敗血症(sepsis)/敗血性休克因全身性發炎、微循環障礙與組織灌流不足→細胞缺氧、轉為無氧糖解→丙酮酸無法進入有氧代謝而轉為乳酸(lactate)堆積→『lactic acidosis(乳酸性酸中毒)』,屬高 anion gap 代謝性酸中毒。血中乳酸(lactate)是敗血症嚴重度與組織缺氧的重要指標,亦為復甦目標:Surviving Sepsis Campaign 建議以乳酸清除/正常化(lactate <2 mmol/L)作為復甦終點,乳酸 ≥4 mmol/L 提示組織灌流嚴重不足、預後較差。機轉除缺氧外,敗血症亦有粒線體功能障礙、肝臟乳酸清除下降。處置:積極輸液(晶體液)、抗生素、必要時升壓劑改善灌流→乳酸下降。護理:監測 lactate 趨勢、ABG、尿量、灌流(MAP)、意識。鑑別其他酸:酮酸見於 DKA/飢餓;肌酐酸(creatinine)反映腎功能但非酸本身;胺基酸非主要致酸。故敗血症最相關為乳酸。", "options": {"A": "錯。酮酸(ketoacid)堆積見於糖尿病酮酸中毒、飢餓或酒精性酮酸中毒,並非敗血症代謝性酸中毒的主要機轉。", "B": "錯。胺基酸代謝異常非敗血症酸中毒的核心;敗血症的酸主要來自無氧代謝產生的乳酸。", "C": "正確。敗血症組織灌流不足致無氧代謝→乳酸堆積,lactic acidosis 為其最相關指數,乳酸值並用於評估嚴重度與復甦成效。", "D": "錯。肌酐酸(creatinine)是腎功能指標,雖敗血症可併發 AKI 使其上升,但它本身不是造成酸中毒的酸,相關性不如乳酸直接。"}, "sources": ["Harrison 21e, Sepsis and Septic Shock; Lactic Acidosis", "Surviving Sepsis Campaign Guidelines (lactate 復甦目標)", "Brenner & Rector's The Kidney 11e, Metabolic Acidosis"]}}, "109-進階-內科-4": {"quick": "惡性腫瘤典型造成『高』血鈣(PTHrP/溶骨),非低血鈣;低血鈣常見於副甲低、低血鎂、腎衰竭(D 為答案)。", "detail": {"background": "低血鈣(hypocalcemia)機轉與常見病因:①PTH 不足或作用障礙——副甲狀腺機能低下(術後、自體免疫)、低血鎂(抑制 PTH 分泌與作用,致頑固低鈣);②維生素 D 不足/作用障礙——營養不足、吸收不良、肝腎活化障礙;③腎衰竭(CKD)——磷滯留、1,25-(OH)2D 活化下降→低鈣(伴高磷、續發性副甲亢);④鈣螯合/沉積——急性胰臟炎、大量輸血(citrate)、橫紋肌溶解、腫瘤溶解症候群(高磷使鈣沉積)。臨床:神經肌肉興奮 tetany、Chvostek(敲面神經抽動)/Trousseau(綁壓脈帶手痙攣)徵象、QT 延長、癲癇。校正:總鈣須以白蛋白校正(每 albumin 低 1 g/dL，corrected Ca + 0.8)。相對地,『惡性腫瘤』最經典是造成『高血鈣(hypercalcemia)』——透過 PTHrP(humoral hypercalcemia of malignancy)、溶骨性轉移(local osteolysis)、或淋巴瘤產生 1,25-(OH)2D;故惡性腫瘤是高鈣而非低鈣原因(例外:腫瘤溶解症候群可低鈣,但屬少見特例,非『一般惡性腫瘤』通則)。本題問『最不可能造成低血鈣』→惡性腫瘤(D)。護理:QT 監測、抽搐預防、補鈣同查鎂。", "options": {"A": "錯(是低鈣原因)。副甲狀腺機能低下使 PTH 不足→腎臟保鈣、骨鈣釋出與維生素 D 活化下降→低血鈣(常伴高磷)。", "B": "錯(是低鈣原因)。低血鎂抑制 PTH 分泌及其周邊作用,造成『頑固性』低血鈣,須補鎂方能矯正。", "C": "錯(是低鈣原因)。腎衰竭使磷滯留、1,25-(OH)2D 活化減少→低血鈣並續發性副甲狀腺亢進。", "D": "正確(最不可能造成低鈣)。惡性腫瘤典型透過 PTHrP/溶骨/維生素D 機轉造成『高血鈣』,而非低血鈣,故為答案。"}, "sources": ["Harrison 21e, Disorders of the Parathyroid Gland and Calcium Homeostasis", "Brenner & Rector's The Kidney 11e, Disorders of Calcium Balance", "惡性腫瘤高血鈣(PTHrP)機轉"]}}, "110-進階-內科-70": {"quick": "高血鈣可致腎因性尿崩、抑制 ADH 作用→多尿;多尿定義為尿量>3 L/day(非次數),選 B。", "detail": {"background": "多尿症(polyuria)定義為『成人 24 小時尿量 > 3 公升(約 >40–50 mL/kg/day)』,以『尿量』而非『排尿次數』界定(頻尿/夜尿是次數問題,不等於多尿)。多尿三大機轉:①水利尿(尿稀釋,尿 osm <250–300):中樞性尿崩(ADH 缺乏)、腎因性尿崩(腎臟對 ADH 無反應)、原發性多飲;②滲透性/溶質利尿(尿 osm 偏高):高血糖糖尿、甘露醇、高蛋白/高鹽負荷。高血鈣(hypercalcemia)會引起腎因性尿崩:高鈣經 calcium-sensing receptor 干擾集尿管對 ADH 的反應、下調 AQP2 水通道→腎臟濃縮能力下降→多尿、煩渴、脫水(『stones, bones, groans, psychiatric moans, polyuria』)。鑑別流程:先測尿滲透壓——尿 osm <250 屬水利尿,需做『限水測試(water deprivation test)』再給 DDAVP 區分中樞性 vs 腎因性 vs 原發性多飲;尿 osm 偏高(>300)則找溶質利尿原因。鋰鹽(lithium)造成的是『腎因性』尿崩(腎臟對 ADH 無反應),非中樞性。護理:I/O、體重、血鈉、找病因。", "options": {"A": "錯。多尿症以『尿量 >3 L/day』定義,而非『排尿次數 >8 次』;排尿次數多屬頻尿(可能膀胱問題),與多尿(尿量)概念不同。", "B": "正確。高血鈣干擾集尿管對 ADH 的反應、下調 AQP2→腎因性尿崩,造成濃縮能力下降而多尿,為高血鈣典型表現之一。", "C": "錯。尿 osm 468 mOsm/L 已屬偏高(>300),提示溶質性利尿,不需做限水測試;限水測試是用於『尿稀釋(低尿 osm)』的多尿以區分尿崩 vs 多飲。", "D": "錯。鋰鹽造成的是『腎因性(nephrogenic)』尿崩——腎臟對 ADH 無反應,而非中樞性(ADH 分泌不足);故敘述錯誤。"}, "sources": ["Harrison 21e, Disorders of the Neurohypophysis; Polyuria 評估", "Brenner & Rector's The Kidney 11e, Disorders of Urine Concentration", "高血鈣致腎因性 DI 機轉"]}}, "110-進階-內科-71": {"quick": "血漿 osm 280(正常)而血鈉 120→『假性低血鈉』,長期高血脂占據血漿水相所致(B 假性、選高血脂A)。", "detail": {"background": "本題血鈉 120(很低)但血漿滲透壓(osmolality)280 mOsm/L(『正常範圍 275–295』)——這是判讀關鍵:真性低血鈉(如 SIADH、低容積)會伴隨『低』血漿滲透壓(<275);若血鈉低而血漿滲透壓『正常』,要想到『假性低血鈉(pseudohyponatremia)』或『等張性低血鈉』。假性低血鈉多因高血脂(嚴重高三酸甘油酯)或高蛋白(如多發性骨髓瘤)使血漿中『非水相』體積增加,佔據血漿體積,以舊式間接電位法測得的鈉濃度被稀釋偏低,但實際血漿水相的鈉與滲透壓正常(故 osm 正常)。本題病人有『高血脂症』,正是假性低血鈉的成因。臨床上真性低血鈉會有相應低滲透壓與神經症狀;但本題的嗜睡/混亂更可能與感染、類固醇調整或其他因素相關,而 120 這個數字本身是測量假象。處置:確認用直接離子選擇電極(direct ISE)或量測血漿滲透壓即可釐清;治療原發高血脂。護理:不要對假性低血鈉盲目補鈉/限水。陷阱:看到低血鈉先看『血漿滲透壓』分類(低張/等張/高張)。", "options": {"A": "正確。嚴重高血脂使血漿非水相體積增加→間接法測得鈉偏低(假性低血鈉),但血漿滲透壓仍正常(280),正符合本題;故病因是高血脂症。", "B": "錯。皮質醇缺乏(腎上腺不足)會造成『真性』等容性低血鈉並伴低血漿滲透壓;本題血漿滲透壓正常,不符,且病人正服用類固醇而非缺乏。", "C": "錯。腎病症候群屬高容積性低血鈉,會有水腫、低白蛋白;且為真性低血鈉伴低滲透壓,與本題正常滲透壓不符。", "D": "錯。SIADH 為真性等容性低血鈉,血漿滲透壓應 <275(低張),本題滲透壓 280 正常,不支持 SIADH。"}, "sources": ["Harrison 21e, Hyponatremia (pseudohyponatremia / 滲透壓分類)", "Brenner & Rector's The Kidney 11e, Hyponatremia", "假性低血鈉與高血脂/高蛋白"]}}, "110-進階-精神科-25": {"quick": "精神科過度飲水(水中毒)主要監測『低血鈉』而非低血鉀;水稀釋致低鈉是核心風險(D 錯誤)。", "detail": {"background": "精神科病人過度飲水(psychogenic polydipsia / primary polydipsia,又稱 water intoxication)常見於思覺失調等慢性精神病人,部分與抗精神病藥物副作用(口乾、ADH 影響、強迫性飲水)有關。大量飲水超過腎臟排水上限(約 0.8–1 L/hr)→血漿被稀釋→『稀釋性低血鈉(hyponatremia)』為最核心、最危險的併發症;嚴重低血鈉可致腦水腫、抽搐、昏迷甚至死亡。臨床表現:全身無力、頻尿、噁心、躁動不安、定向力障礙、譫妄、抽搐。評估監測指標:晝夜體重變化(因白天大量飲水,常以『晝夜體重增加 ≥4%』與尿比重 ≤1.009 等作為判斷與監測依據),以及嚴密追蹤血鈉。處置:限水、必要時嚴重症狀性低鈉給高張鹽水並控矯正速度。護理重點:監測體重、I/O、血鈉、意識與抽搐徵象,限制飲水。陷阱:本症的電解質風險是『低血鈉』(水稀釋),不是低血鉀;選『主要監測低血鉀』即為錯誤敘述。", "options": {"A": "錯(敘述正確)。部分抗精神病藥物可致口乾、影響 ADH 或誘發強迫性飲水,過度飲水確可與藥物副作用相關。", "B": "錯(敘述正確)。臨床症狀確可包括全身無力、頻尿、躁動不安、譫妄等,皆與稀釋性低血鈉/水負荷相關。", "C": "錯(敘述正確)。臨床常以晝夜體重增加 ≥4%、尿比重 ≤1.009(尿極稀)作為過度飲水的評估判斷依據。", "D": "正確(此為錯誤敘述,故為答案)。過度飲水主要造成『稀釋性低血鈉』,應監測『低血鈉』而非低血鉀;說主要監測低血鉀是錯的。"}, "sources": ["Harrison 21e, Hyponatremia (primary polydipsia / water intoxication)", "精神科水中毒監測(體重/尿比重/血鈉)", "Brenner & Rector's The Kidney 11e, Disorders of Water Balance"]}}, "111-進階-麻醉-30": {"quick": "燒傷術中 ECG 示高血鉀(peaked T等);dantrolene 是惡性高熱用藥,與高血鉀處置無關(B 不適當)。", "detail": {"background": "燒傷/大面積組織損傷或使用 succinylcholine 可釋出大量細胞內鉀→高血鉀(hyperkalemia),ECG 進程:peaked T wave(高尖 T 波,最早)→PR 延長、P 波變平→QRS 增寬→sine wave→心室顫動/停搏。高血鉀的緊急處置遵循三步順序:①『穩定心肌膜電位』——立即靜脈 calcium gluconate(或 calcium chloride),拮抗鉀對膜電位的去極化作用、保護心臟,起效最快但不降鉀;②『把鉀移入細胞內(暫時降血鉀)』——regular insulin + glucose(防低血糖)、β2-agonist 吸入、(酸中毒時)bicarbonate;③『把鉀移出體外(根本降鉀)』——loop/thiazide 利尿劑促排、陽離子交換樹脂(如 patiromer / SPS)、嚴重或腎衰竭時血液透析。本題選項 A(insulin 移鉀入細胞)、C(calcium gluconate 穩定膜電位)、D(利尿劑+必要時洗腎移除鉀)皆為正確的高血鉀處置。dantrolene 是『惡性高熱(malignant hyperthermia)』的專一解藥,抑制 ryanodine receptor、減少肌漿網鈣釋放,與高血鉀的鉀處置無關,故為不適當。護理:持續 ECG 監測、追蹤血鉀、給藥順序正確、警覺心律不整。", "options": {"A": "錯(處置適當)。靜脈 insulin(配葡萄糖)促使鉀離子移入細胞內,可暫時快速降低血鉀,為標準高血鉀處置之一。", "B": "正確(處置不適當,故為答案)。dantrolene 是惡性高熱的解藥(抑制肌漿網鈣釋放),用於高血鉀處置毫無作用,屬不適當。", "C": "錯(處置適當)。calcium gluconate 不降鉀但能穩定心肌膜電位、拮抗高鉀去極化作用,為高血鉀心電圖異常時的首要保護措施。", "D": "錯(處置適當)。利尿劑促進腎臟排鉀,腎功能不足/嚴重高血鉀時立即血液透析移除鉀,均為移除體內鉀的正確手段。"}, "sources": ["Harrison 21e, Potassium Disorders (hyperkalemia 處置順序)", "Brenner & Rector's The Kidney 11e, Disorders of Potassium Balance", "惡性高熱與 dantrolene"]}}, "111-通論-麻醉-64": {"quick": "尿崩症核心=多尿(尿量>2–3 L/day)、ADH 缺乏(中樞)或腎臟無反應(腎因);腎因性給 vasopressin 無效。", "detail": {"background": "尿崩症(diabetes insipidus, DI)是 ADH(vasopressin)缺乏或腎臟對 ADH 無反應,致集尿管無法再吸收自由水→大量稀釋尿(多尿)、煩渴、傾向高血鈉。分兩型:①中樞性(central/neurogenic)DI——下視丘/腦下垂體後葉病變使 ADH『分泌不足』(過少,非過多),病因有腦傷、術後、腫瘤、自體免疫;對外源性 DDAVP/vasopressin『有反應』(尿 osm 上升、尿量減少)。②腎因性(nephrogenic)DI——腎小管對 ADH『反應不足/無反應』(非過強),病因有遺傳 AVPR2/AQP2 突變、鋰鹽、高血鈣、低血鉀;給 vasopressin/DDAVP『無法』減少尿量(因腎臟不反應)。實驗室:多尿(尿量常 >2000–3000 mL/day)、尿 osm 低、尿比重低,血漿滲透壓與血鈉偏高。診斷:水剝奪試驗後給 DDAVP——中樞型尿 osm 明顯上升,腎因型不上升。本題正確敘述為『每天尿量多於 2000 mL』(多尿,D)。治療:中樞型補 DDAVP;腎因型停致病藥、低鹽低蛋白飲食、thiazide(矛盾性減少尿量)、amiloride(鋰所致)、NSAIDs。護理:I/O、體重、血鈉。", "options": {"A": "錯。DI 是 ADH『缺乏(過少)』或腎臟無反應,而非腦下垂體後葉分泌 ADH『過多』;ADH 過多反而是 SIADH。", "B": "錯。腎因性 DI 是腎小管對 ADH『反應過弱/無反應』,並非『反應過強』;反應過強概念與 DI 相反。", "C": "錯。腎因性 DI 因腎臟對 ADH 不反應,給 vasopressin/DDAVP『無法』減少尿量(無效);能藉 vasopressin 減少尿量的是中樞性 DI。", "D": "正確。DI 的核心表現是多尿,每天尿量常 >2000(甚至 3000)mL,搭配稀釋尿(尿 osm/比重低)、煩渴與高血鈉傾向。"}, "sources": ["Harrison 21e, Disorders of the Neurohypophysis (DI 分型/水剝奪試驗)", "Brenner & Rector's The Kidney 11e, Nephrogenic Diabetes Insipidus", "中樞性 vs 腎因性 DI 之 DDAVP 反應"]}}, "112-進階-兒科-63": {"quick": "急性腹瀉脫水兒首要補等張電解質液;『禁食12小時後從稀釋奶開始』為過時錯誤做法,應早期重新餵食(D 錯)。", "detail": {"background": "嬰幼兒急性腹瀉(尤其輪狀/病毒性水便)主要併發症為脫水與電解質紊亂。現行兒科處置原則(WHO/ESPGHAN/AAP):①以口服電解質補充液(WHO-ORS,低滲透壓配方)矯正脫水並維持;②『早期重新餵食(early refeeding)』——不需長時間禁食,脫水矯正後(約 4–6 小時內)即恢復一般飲食/正常濃度配方奶,不必稀釋奶或長時間 NPO,因早期餵食可維持腸黏膜營養、縮短病程;③避免高糖飲料/運動飲料(高滲透壓加重腹瀉)。本題嬰兒體重由 9→8.1 kg(掉約 10% 為中重度脫水)、尿少、躁動。逐項看:腹瀉因下消化道流失 HCO3,常合併代謝性酸血症;脫水使腎前性氮血症→BUN、尿酸上升;可給 WHO-ORS 補充。錯誤者為 D『禁食 12 小時後從半奶(稀釋)開始餵食』——這是已被淘汰的舊觀念,現代主張早期重新餵食、避免長時間禁食與不必要的稀釋奶(會延遲營養恢復、無益)。護理:評估脫水程度(體重、皮膚、尿量、囟門)、補液、記 I/O、衛教持續餵食。", "options": {"A": "錯(敘述大致正確,非答案)。急性腹瀉因下消化道流失富含 HCO3 的腸液,常合併正常 AG 代謝性酸血症,屬合理推論。", "B": "錯(敘述正確,非答案)。脫水致腎前性低灌流→BUN(及尿酸)升高(腎前性氮血症),符合臨床。", "C": "錯(敘述正確,非答案)。可給 WHO-ORS 低滲透壓口服電解質液補充脫水與電解質,為標準處置。", "D": "正確(此為錯誤處置,故為答案)。『禁食 12 小時後從稀釋半奶開始』為過時做法;現行原則為早期重新餵食、避免長時間禁食與不必要的稀釋奶。"}, "sources": ["Nelson Textbook of Pediatrics, Acute Gastroenteritis; Oral Rehydration", "WHO/ESPGHAN/AAP 兒童急性腹瀉處置(early refeeding)", "Harrison 21e, Fluid and Electrolyte Disturbances"]}}, "112-進階-內科-1": {"quick": "RTA(腎小管酸血症)屬『正常』anion gap 酸中毒;lactic acidosis、DKA、uremia 才是高 AG(C 錯誤)。", "detail": {"background": "代謝性酸中毒以 anion gap(AG=Na−Cl−HCO3,正常 8–12)二分。①高 AG 代謝性酸中毒:因產生/堆積未測定有機酸根(消耗 HCO3、Cl 不變),病因 GOLDMARK/MUDPILES——lactic acidosis(乳酸)、ketoacidosis(DKA、酒精、飢餓)、uremia(尿毒,硫酸/磷酸根堆積)、毒物(methanol、ethylene glycol、salicylate、propylene glycol)、5-oxoproline。②正常 AG(高血氯型)代謝性酸中毒:因直接流失 HCO3 或排酸障礙,Cl 代償上升維持 AG 正常,病因——腹瀉、腎小管酸血症(RTA)、carbonic anhydrase 抑制劑、輸尿管轉流、早期 CKD。本題問『何者「不是」高 AG 酸中毒常見原因』:lactic acidosis(A)、diabetic ketoacidosis(B)、uremia(D)皆為高 AG;而 RTA(C)是『正常 AG(高血氯)』酸中毒的代表,故為答案。RTA 分型:第1型(遠端,泌酸障礙,尿 pH 高、低血鉀、結石)、第2型(近端,HCO3 再吸收障礙、低血鉀、Fanconi)、第4型(醛固酮不足/抗性,高血鉀)。護理:測 AG 與血鉀、找病因。陷阱:RTA 雖是腎臟病但屬『正常』AG,別誤歸高 AG。", "options": {"A": "錯(是高 AG 原因)。lactic acidosis 因乳酸這類有機酸根堆積,屬典型高 anion gap 代謝性酸中毒。", "B": "錯(是高 AG 原因)。diabetic ketoacidosis 因酮酸(β-hydroxybutyrate、acetoacetate)堆積,屬高 anion gap 酸中毒。", "C": "正確(非高 AG,故為答案)。RTA 為腎小管排酸或保 HCO3 障礙,以 Cl 代償維持 AG 正常→屬『正常 anion gap(高血氯)』酸中毒,非高 AG。", "D": "錯(是高 AG 原因)。uremia(腎衰竭)使硫酸鹽、磷酸鹽等有機酸根滯留→高 anion gap 代謝性酸中毒。"}, "sources": ["Harrison 21e, Acidosis and Alkalosis (anion gap; RTA)", "Brenner & Rector's The Kidney 11e, Renal Tubular Acidosis", "高 AG vs 正常 AG 酸中毒鑑別"]}}, "113-進階-內科-53": {"quick": "DKA/重症併低血鉀(K 2.6)時,先補鉀與輸液再給胰島素;K<3.3 先給胰島素會使鉀更低致心律不整(C 最不適當)。", "detail": {"background": "本題糖尿病病人重症 COVID 第 6 天出現嗜睡、心搏快、低血壓、高血糖(420)、腎前性氮血症(BUN 46、Cr 1.4)、低血鈉(126)、『低血鉀(K 2.6)』,情境像高血糖危症(DKA/HHS)合併脫水與低血鉀。處置原則(ADA DKA/HHS):①大量等張生理食鹽水補容積矯正脫水(首要);②補鉀——胰島素會把鉀(連同葡萄糖)驅入細胞內使血鉀進一步下降,故『若血鉀 <3.3 mEq/L,須先補鉀使 K ≥3.3 才可開始胰島素』,否則可能誘發致命性低血鉀心律不整、呼吸肌無力;③待容積與鉀安全後再靜脈 regular insulin 降血糖。本題 K 僅 2.6(<3.3),『立即給胰島素』會雪上加霜→故 C『給予靜脈胰島素』為此刻『最不適當』。正確順序:先輸液+補 KCl,監測血鉀,待 K≥3.3 再啟動胰島素。抽 ABG 評估酸鹼(A)、大量 NS(B)、輸液同時補 KCl(D)皆適當。護理:心電圖監測(低鉀 U 波/心律不整)、每 1–2 小時追血鉀血糖、嚴格 I/O。", "options": {"A": "錯(處置適當)。抽 ABG 評估是否有代謝性酸中毒(DKA)及酸鹼/陰離子間隙,有助診斷與監測,屬合理初步處置。", "B": "錯(處置適當)。高血糖危症脫水須以 0.9% NS 大量補容積,矯正低血壓與腎前性氮血症,為首要措施。", "C": "正確(最不適當,故為答案)。血鉀僅 2.6(<3.3),此時『立即』給胰島素會把鉀驅入細胞致更嚴重低血鉀與心律不整;應先補鉀使 K≥3.3 再給胰島素。", "D": "錯(處置適當)。在大量輸液同時補充 KCl 以矯正低血鉀、為後續胰島素治療鋪路,是正確且必要的處置。"}, "sources": ["ADA Standards / Hyperglycemic Crises (DKA/HHS) 處置(K<3.3 先補鉀)", "Harrison 21e, Diabetic Ketoacidosis and Hyperosmolar State; Potassium Disorders", "Brenner & Rector's The Kidney 11e, Hypokalemia"]}}, "113-進階-內科-59": {"quick": "多尿+尿 osm 偏高(400)且血鈉偏低→屬溶質(滲透)性利尿,非尿崩(尿崩尿 osm 低),選 D。", "detail": {"background": "多尿(尿量 3600 mL/day >3 L)鑑別的關鍵是『尿滲透壓(urine osmolality)』與『每日溶質排泄量』。①水利尿(water diuresis):尿被稀釋,尿 osm 低(<250–300 mOsm/kg),病因為中樞性尿崩(ADH 缺乏)、腎因性尿崩(ADH 無反應)、原發性多飲;②溶質(滲透)性利尿(solute/osmotic diuresis):大量溶質(葡萄糖、尿素、鈉、甘露醇)使尿 osm 不低反偏高(常 ≥300,接近或高於血漿等張),每日尿溶質排泄 >900–1000 mOsm。本題尿 osm 400 mOsm/kg(明顯偏高,非稀釋尿)→不符合尿崩(尿崩應尿 osm 低)、也不符原發性多飲(亦低 osm),而是『溶質性利尿(solute diuresis)』。常見溶質性利尿情境:控制不佳糖尿病(尿糖)、高蛋白管灌(尿素)、利尿劑後、阻塞解除後利尿。血鈉 130 略低,亦與大量溶質帶水流失/補水有關。診斷可估每日尿溶質(尿 osm × 尿量):400×3.6 ≈ 1440 mOsm/day,>900 支持溶質性利尿。護理:找溶質來源(血糖、BUN、用藥)、監測電解質與容積。陷阱:尿 osm 不低就不要先想尿崩。", "options": {"A": "錯。原發性多飲屬水利尿,尿被大量稀釋→尿 osm『低』(常 <100–250),與本題尿 osm 400(偏高)不符。", "B": "錯。中樞性尿崩因 ADH 缺乏→尿稀釋,尿 osm『低』;本題尿 osm 400 偏高,不符尿崩表現。", "C": "錯。腎因性尿崩腎臟對 ADH 無反應→同樣尿稀釋、尿 osm『低』;與本題偏高尿 osm 矛盾。", "D": "正確。尿 osm 400(偏高、非稀釋)且尿量大、估算每日尿溶質高,符合『溶質性(滲透性)利尿』,如尿糖、尿素等溶質帶水排出。"}, "sources": ["Harrison 21e, Disorders of the Neurohypophysis; Polyuria 評估(水 vs 溶質利尿)", "Brenner & Rector's The Kidney 11e, Disorders of Urine Concentration", "每日尿溶質排泄判定 solute diuresis"]}}, "113-進階-家庭-30": {"quick": "高血鈉(150)+高血漿 osm(325)卻尿稀釋(尿 osm 250、SG 1.005)+大量尿→尿崩症優先(B)。", "detail": {"background": "本題 13 歲女童頻尿、尿濕褲、非刻意大量飲水、尿量約 4000 mL/day(多尿),血漿滲透壓增加(325,高張)、血鈉增加(150,高)、尿滲透壓降低(250)、尿比重 1.005(稀)。判讀核心:在『高張血漿(高血鈉、高 osm)』下,尿液卻無法濃縮(尿 osm 低、尿比重低)→腎臟濃縮失能=尿崩症(DI)。正常人在高血鈉時尿 osm 應 >600–800 來代償保水;本題反而稀釋,診斷指向 DI(尚需 DDAVP 試驗區分中樞性 vs 腎因性)。鑑別:①SIADH 因 ADH 過多→水滯留,血鈉與血漿 osm 應『偏低』,與本題高血鈉相反,排除;②第1型糖尿病雖多尿,但屬『滲透性利尿』,尿 osm 會偏高且尿糖陽性、血糖高,與本題尿稀釋(osm 250)不符;③滲透性多尿(osmotic diuresis)尿 osm 偏高,亦與本題低尿 osm 矛盾。故優先列入『尿崩症』。臨床上兒童頻尿/尿床+多飲多尿+高血鈉要警覺 DI。護理:I/O、體重、血鈉、安排水剝奪/DDAVP 試驗,避免脫水與血鈉劇變。", "options": {"A": "錯。SIADH 為 ADH 過多致水滯留,血鈉與血漿滲透壓應偏『低』;本題高血鈉(150)、高血漿 osm(325),完全相反,排除。", "B": "正確。高血漿張力下尿液仍稀釋(尿 osm 250、比重 1.005)且大量尿→腎臟濃縮失能=尿崩症,應優先考慮(再以 DDAVP 區分中樞/腎因)。", "C": "錯。第1型糖尿病多尿屬滲透性利尿,尿 osm 會偏高且伴尿糖、高血糖;本題尿 osm 偏低、未提高血糖,不符。", "D": "錯。滲透性(溶質性)多尿尿 osm 應偏高(溶質帶水),與本題低尿 osm(250)、低比重相矛盾。"}, "sources": ["Harrison 21e, Disorders of the Neurohypophysis (DI 診斷)", "Nelson Textbook of Pediatrics, Diabetes Insipidus", "Brenner & Rector's The Kidney 11e, Disorders of Urine Concentration"]}}, "113-進階-家庭-76": {"quick": "失智老人脫水致高張性高血鈉(119?實為脫水+高血糖)+低血容→首選等張生理食鹽水緩慢補容積(C)。", "detail": {"background": "本題 76 歲失智、吞嚥差、嗜睡、四肢抽動,口腔乾、皮膚彈性差(明顯脫水/低血容),ABG 接近正常(pH 7.32、HCO3 22)、K 3.2(低)、Na 119(數據偏低,但合併 glucose 500 之高血糖會稀釋鈉,校正後鈉偏高,屬高張脫水)、BUN 80/Cr 2.0(腎前性氮血症)、血糖 500(高血糖危症 HHS)。整體為『高血糖高滲透壓狀態(HHS)+嚴重脫水低血容』。最適當的『初步』治療是先以『等張生理食鹽水(normal saline)緩慢/適速補容積』矯正血管內脫水與低灌流(本題選 normal saline 1000 mL 在 1 小時)——這是 HHS/嚴重脫水復甦的第一步(先補液擴容,胰島素稍後且須先確保血鉀)。為何不選其他:3% 高張鹽水(A)用於嚴重症狀性『真性低血鈉』,本題鈉低為高血糖假性稀釋、且病人是脫水高張狀態,給高張鹽水危險;立即大劑量胰島素(B)在補液與補鉀(K 3.2 偏低)前會使血鉀更低且血糖驟降致腦水腫風險,不應作初步;3000 mL/1 hr(D)輸注過快,老年人有肺水腫/腦水腫風險,速度不當。故 C 等張 NS 適速補容積最適當。護理:I/O、血鈉血糖每 1–2 小時、補鉀、避免血鈉/血糖矯正過快(防腦水腫)。", "options": {"A": "錯。3% saline 用於嚴重『症狀性真性低血鈉』;本題低鈉主要為高血糖(500)稀釋造成的假象且病人為脫水高張狀態,給高張鹽水會加重高張、危險。", "B": "錯。在補液與補鉀前立即給大劑量 regular insulin,會使血鉀(已 3.2 偏低)驟降致心律不整,且血糖過快下降增加腦水腫風險,不應作為初步處置。", "C": "正確。HHS 合併嚴重脫水低血容,初步以等張 normal saline 適速補容積(1000 mL/1 hr)矯正脫水與腎前性氮血症,為復甦第一步。", "D": "錯。3000 mL 在 1 小時輸注過快,老年病人易致肺水腫、且血鈉/滲透壓矯正過快有腦水腫風險,速度不當。"}, "sources": ["ADA Hyperglycemic Crises (HHS) 復甦原則(先等張液擴容)", "Harrison 21e, Hyperosmolar Hyperglycemic State; Hypernatremia", "Brenner & Rector's The Kidney 11e, Disorders of Water Balance"]}}, "113-進階-麻醉-53": {"quick": "腦傷後中樞性尿崩→ADH 不足致集尿管無法濃縮尿,典型為『低尿滲透壓』(尿稀)而血鈉/血漿 osm 偏高(C)。", "detail": {"background": "腦部外傷/神經外科術後常見中樞性尿崩(central DI)——下視丘-腦下垂體後葉受損使 ADH(vasopressin)分泌不足→集尿管自由水再吸收障礙→大量稀釋尿、free water 流失。典型檢驗:①尿液——尿滲透壓『低』(<300,因無法濃縮)、尿比重低、尿量大(>3 L/day);②血液——因 free water 流失而血漿滲透壓『升高』、血鈉『升高』(高血鈉傾向)。尿鈉則不一定降低(失的是水不是鈉,尿鈉可正常)。本題問腦傷後 DI 常見結果,正確者為『低尿滲透壓(low urine osmolality)』。逐項辨析:血鈉應『高』非低(A 錯);血漿滲透壓應『高』非低(B 錯);尿鈉不一定低,DI 的特徵不是低尿鈉(D 非特徵)。鑑別腦傷後低鈉/多尿:DI(高鈉、尿稀)vs SIADH(低鈉、尿濃)vs cerebral salt wasting(低鈉、低血容、尿鈉高)。治療:中樞性 DI 給 DDAVP、補水維持血鈉。護理:嚴密 I/O(每小時尿量)、體重、血鈉,警覺大量稀尿與高血鈉,避免脫水與血鈉劇變。", "options": {"A": "錯。中樞性 DI 因 free water 流失,血鈉傾向『升高』(高血鈉),而非低血鈉;低血鈉反見於 SIADH/CSW。", "B": "錯。free water 流失使血漿滲透壓『升高』,非降低;血漿 osm 偏高是 DI 的特徵之一。", "C": "正確。ADH 不足使腎臟無法濃縮尿→尿滲透壓『低』(尿稀、低比重)為腦傷後中樞性 DI 的典型尿液檢查結果。", "D": "錯。DI 流失的是水而非鈉,尿鈉常正常,並非『低尿鈉』;低尿鈉(<20)反多見於低血容腎外流失。"}, "sources": ["Harrison 21e, Disorders of the Neurohypophysis (central DI)", "Brenner & Rector's The Kidney 11e, Disorders of Urine Concentration", "神經外科術後 DI vs SIADH vs CSW 鑑別"]}}, "114-進階-兒科-52": {"quick": "中樞性 DI 補液須緩慢以免血鈉/血漿張力驟降致腦水腫與抽搐;故『避免輸液過快』最適當(B)。", "detail": {"background": "嬰兒中樞性尿崩(central DI):ADH 缺乏→大量稀釋尿(尿比重 <1.005、尿 osm 低)、反覆脫水、體重減輕、高血鈉(本題 Na 152),DDAVP 試驗後尿能濃縮確診為中樞型。護理照顧核心是『安全矯正高血鈉』:高血鈉(尤其慢性)時腦細胞已產生有機滲透物(idiogenic osmoles)以適應高張;若快速給予低張液或輸液過快使血鈉/血漿張力驟降,水分快速進入腦細胞→『腦水腫』與抽搐、甚至死亡。故矯正血鈉速度須緩慢——一般建議血鈉下降速度不超過約 0.5 mEq/L/hr(<10–12 mEq/L/24hr)。本題正確答案 B『避免輸液過快以防止快速降低血鈉引發癲癇/腦水腫』即此原則。逐項辨析:A『持續補充高張靜脈液』錯——病人已高血鈉,再給高張液會更高張、加重病情;C『限制水分』錯——DI 病人正在大量失水,限水會惡化脫水高血鈉;D『高蛋白高鈉飲食』錯——高鈉會加重高血鈉,高蛋白增加溶質負荷與尿素利尿。治療:補充足夠水分(自由水)矯正脫水並『緩慢』降鈉,給 DDAVP 減少尿量。護理:嚴格 I/O、每日體重、頻繁血鈉監測(控速度)、神經學觀察。", "options": {"A": "錯。病人已高血鈉(152),持續補『高張』靜脈液會使血漿更高張、加重高血鈉與脫水,反而有害,並非避免腦水腫之道。", "B": "正確。高血鈉須緩慢矯正,輸液過快使血鈉/血漿張力驟降會讓水分快速進入腦細胞→腦水腫與癲癇;避免輸液過快、控制降鈉速度最適當。", "C": "錯。DI 病人正大量失水脫水,限制水分攝取會惡化脫水與高血鈉,完全與治療方向相反。", "D": "錯。高鈉飲食會加重高血鈉,高蛋白增加溶質(尿素)負荷與滲透性利尿,均不利,不應建議。"}, "sources": ["Harrison 21e, Hypernatremia (矯正速度與腦水腫)", "Nelson Textbook of Pediatrics, Diabetes Insipidus / Hypernatremic Dehydration", "Brenner & Rector's The Kidney 11e, Hypernatremia 處置"]}}, "114-進階-內科-78": {"quick": "惡性高血鈣靠 NS 補液促鈣排出+bisphosphonate/calcitonin;thiazide 會『保鈣』反加重高鈣,故 B 錯誤。", "detail": {"background": "惡性腫瘤高血鈣(humoral hypercalcemia of malignancy)機轉:PTHrP 分泌(肺/頭頸鱗癌、乳癌、腎癌)、溶骨性骨轉移、淋巴瘤產生 1,25-(OH)2D。臨床:多尿煩渴(高鈣致腎因性 DI)、脫水、便秘、噁心、意識變化、心律(QT 縮短)。治療階梯:①『大量等張生理食鹽水(NS)輸液』——擴容並促進腎臟由尿排出鈣(高鈣本身致脫水,補液同時提升 GFR 與鈉/鈣排泄),為第一步;②曾用 loop diuretic(furosemide)在『充分補液後』促鈣排出(現已不常規,僅容積過多時);③『bisphosphonate(zoledronic acid、pamidronate)』抑制蝕骨細胞、抑制骨吸收,為控制惡性高鈣的主力(起效約 2–4 天,效果持久;嚴重腎功能不全須謹慎/減量);④『calcitonin』降鈣快(數小時)但作用弱且會產生『耐受性(tachyphylaxis)』,僅作短期橋接;⑤denosumab(對 bisphosphonate 無效或腎功能差者)、糖皮質素(淋巴瘤/維生素D介導)。關鍵陷阱:『thiazide 利尿劑會「增加」遠端腎小管鈣的「再吸收」→使血鈣「上升」』,臨床上反而用於高尿鈣結石/降尿鈣,『不可』用於降血鈣;惡性高鈣要用的是『loop diuretic(且須先充分補液)』而非 thiazide。故 B『thiazide 促鈣排出』為錯誤敘述。護理:I/O、補液監測心肺負荷、血鈣/腎功能追蹤、心電圖。", "options": {"A": "錯(敘述正確)。大量等張生理食鹽水擴容並提升腎臟鈉/鈣排泄,可促進鈣由腎臟排出,是惡性高血鈣治療第一步。", "B": "正確(此為錯誤敘述,故為答案)。thiazide 利尿劑會『增加』遠端小管鈣再吸收→使血鈣上升(用於降尿鈣),不能用來促鈣排出/降血鈣;降鈣應用 loop diuretic(且先補液)。", "C": "錯(敘述正確)。calcitonin 抑制蝕骨並增加尿鈣排出,降鈣作用快(數小時)但易產生耐受性(tachyphylaxis),僅作短期橋接。", "D": "錯(敘述正確)。zoledronic acid(bisphosphonate)抑制蝕骨細胞、抑制骨吸收為主力,但經腎排除,嚴重腎功能異常者須謹慎使用/評估。"}, "sources": ["Harrison 21e, Hypercalcemia of Malignancy", "Brenner & Rector's The Kidney 11e, Disorders of Calcium Balance", "惡性高血鈣治療(NS+bisphosphonate;thiazide 保鈣不可用)"]}}, "105-TNPA-內科-62": {"quick": "aminoglycoside 即使治療劑量仍有耳毒性（不可逆 cochlear/vestibular 損傷），故『一般劑量不會耳毒』為錯。", "detail": {"background": "Aminoglycoside（gentamicin、amikacin、tobramycin、streptomycin）為濃度依賴型殺菌劑，與細菌 30S ribosome 結合抑制蛋白質合成，常用於 Gram-negative 嚴重感染與抗藥性結核。其兩大毒性為腎毒性與耳毒性。【腎毒性】屬非少尿型 ATN（non-oliguric ATN），藥物經 megalin 受體在近端腎小管累積，破壞溶酶體與粒線體，典型在用藥 5–10 天後血 Cr 緩慢上升、伴隨低鎂/低鉀/低鈣（鎂耗損為特徵），停藥後多可恢復。危險因子：高齡、原有腎功能不全、容積耗竭、合併其他腎毒藥（vancomycin、利尿劑、顯影劑）、療程長。預防靠『足夠水化、每日一次給藥（once-daily，利用 post-antibiotic effect 並減少近端腎小管累積）、監測 trough 濃度、限制療程』。【耳毒性】損傷耳蝸毛細胞（聽力，常先高頻聽力喪失）與前庭（平衡/眩暈），機轉與粒線體 12S rRNA 基因突變相關，多為『不可逆』且即使在治療劑量、正常 trough 仍可能發生（並非劑量過量才有），停藥後仍可能持續進展，故須延長監測聽力數週。護理監測重點：用藥前後測 SCr/BUN、電解質（Mg）、聽力（audiometry）、trough 濃度、尿量與每日體重。", "options": {"A": "對。維持良好水化（避免容積耗竭）可降低近端腎小管藥物累積，是預防腎毒性的核心護理措施。", "B": "錯（為答案）。aminoglycoside 在『一般治療劑量、正常血中濃度』下仍可能引起耳毒性，因毒性與毛細胞累積及遺傳易感性相關，並非僅劑量過量才發生。此即本題要選的錯誤敘述。", "C": "對。高齡病人腎血流與 GFR 下降、腎元儲備減少，藥物清除慢，較易發生腎毒性，需依腎功能調整劑量並監測 trough。", "D": "對。耳毒性可在停藥後仍持續或延遲出現，故停藥後須繼續監測聽力約數週（3–4 週合理）。"}, "sources": ["Harrison 21e Antibacterial Agents（Aminoglycosides）", "Brenner & Rector's The Kidney 11e — Acute Kidney Injury / Drug-induced nephrotoxicity", "Harrison 21e 急性腎損傷章"]}}, "105-TNPA-外科-51": {"quick": "淋巴水腫非腎移植血管/泌尿『手術』併發症；血管（動靜脈狹窄/血栓）與泌尿（漏尿/阻塞）才是。", "detail": {"background": "腎臟移植手術將供腎置於髂窩（iliac fossa），腎動脈接受贈者髂動脈、腎靜脈接髂靜脈、輸尿管再植入膀胱。術後手術相關（外科性）併發症分『血管性』『泌尿性』與『傷口/淋巴』三類。血管性：腎動脈狹窄（移植後高血壓、移植腎功能惡化最常見血管併發症）、腎動脈/靜脈血栓（多在術後早期，致突發無尿、移植腎喪失，是早期移植腎失敗主因之一）。泌尿性：尿液滲漏（urine leak，多源自輸尿管-膀胱吻合處缺血壞死，表現傷口滲液、尿量減少、Cr 上升、局部腫脹）與輸尿管阻塞/狹窄（後期，致 hydronephrosis）。其他外科性問題包括淋巴囊腫（lymphocele，髂血管周圍淋巴管未結紮致淋巴液積聚，可壓迫輸尿管造成阻塞）、傷口感染、出血。『淋巴水腫（lymphedema）』指肢體組織間液回流障礙的慢性腫脹，並非腎移植吻合手術的典型併發症，與『淋巴囊腫』不同。護理監測：尿量（突然減少警示血栓/漏尿/排斥）、傷口引流量與性狀、移植腎區腫脹壓痛、血壓、Cr/BUN 趨勢。", "options": {"A": "對（屬手術併發症）。腎動脈狹窄/阻塞為血管吻合併發症，可致移植腎缺血、難治性高血壓。", "B": "錯（為答案）。淋巴水腫非腎移植血管或泌尿吻合的手術併發症；移植相關的是『淋巴囊腫(lymphocele)』而非肢體淋巴水腫。", "C": "對（屬手術併發症）。尿液滲漏為輸尿管-膀胱吻合處的泌尿性併發症。", "D": "對（屬手術併發症）。腎靜脈阻塞/血栓為早期血管併發症，可致移植腎急速喪失。"}, "sources": ["Harrison 21e Transplantation in the Treatment of Renal Failure", "Brenner & Rector's The Kidney 11e — Kidney Transplantation（surgical complications）"]}}, "105-TNPA-外科-52": {"quick": "ABO 血型不合並非絕對禁忌（可做減敏/ABO-incompatible 移植）；糖尿病、難控高血壓、BMI>40 才是捐贈禁忌。", "detail": {"background": "活體腎臟捐贈者篩選以『確保捐贈者長期僅一顆腎仍安全』與『受贈者得到良好移植腎』為原則。捐贈禁忌（contraindication）包括：明顯腎功能不全或蛋白尿、糖尿病（捐後單腎更易進展為糖尿病腎病）、難以控制需多種藥物的高血壓（已有靶器官風險）、病態性肥胖（BMI 多以 >35–40 為界，手術風險高且日後 CKD 風險增）、活動性惡性腫瘤或傳染病、解剖異常、重大精神或社會問題等。值得注意：『ABO 血型不合』與『HLA 不相合』在現代並非絕對禁忌——透過術前血漿置換/免疫吸附去除抗 A/B 抗體、利妥昔單抗（rituximab）等減敏治療，可進行 ABO-incompatible 活體腎移植，或透過配對交換（paired exchange）解決。故血型不合可被克服，不算『禁忌症』。護理/評估重點：捐贈者 GFR、24 小時尿蛋白、血壓、血糖、影像評估雙腎解剖與分腎功能，以及完整心理社會評估與知情同意。", "options": {"A": "對（為禁忌）。BMI > 40 屬病態性肥胖，手術與日後 CKD 風險高，為捐贈禁忌。", "B": "對（為禁忌）。糖尿病捐贈者捐後單腎更易發展糖尿病腎病，屬禁忌。", "C": "對（為禁忌）。需多種藥物控制的高血壓代表已較難控制、可能有靶器官損傷，為捐贈禁忌。", "D": "錯（為答案）。ABO 血型不合並非『絕對禁忌』，可透過減敏（血漿置換、rituximab）或配對交換進行 ABO-incompatible 移植，故此為本題錯誤敘述。"}, "sources": ["Harrison 21e Transplantation in the Treatment of Renal Failure（living donor evaluation）", "Brenner & Rector's The Kidney 11e — Selection of the kidney transplant donor", "KDIGO Living Kidney Donor Guideline 2017"]}}, "106-106a-內科-31": {"quick": "長期 HD 病人須限鉀（高鉀致命），不補 potassium；反而要補鈣磷結合劑、水溶性維生素（B群、葉酸）。", "detail": {"background": "末期腎病（ESRD）接受長期血液透析者，腎臟排鉀能力幾乎喪失，鉀僅能靠透析間歇清除，故易高血鉀（hyperkalemia），是透析病人猝死（致命性心律不整）主因之一，飲食須『限鉀』而非補鉀。其營養特點與護理重點：①蛋白質——透析每次流失胺基酸與蛋白，故 HD 病人蛋白需求反而較高（約 1.0–1.2 g/kg/day，與保守治療期的低蛋白相反）；②磷——須限磷並使用磷結合劑（如 calcium carbonate、calcium acetate、sevelamer、lanthanum）隨餐服用，控制續發性副甲狀腺亢進與血管鈣化；③鈣/維生素 D——常需補鈣與活性維生素 D（calcitriol）治療 CKD-MBD；④水溶性維生素——B 群、葉酸（folic acid）、維生素 C 會在透析中被清除，須補充（脂溶性 A 易蓄積反而不補、避免維生素 A 過量）；⑤鈉與水分——限制以防容積過載與透析間體重增加過多。本題問『不適合補充』者，即會造成高血鉀風險的 potassium。", "options": {"A": "對（為答案，不適合補充）。長期 HD 病人腎臟排鉀能力喪失，補鉀會造成致命性高血鉀，故不補鉀、反須限鉀。", "B": "適合補充。calcium carbonate 兼具補鈣與『磷結合劑』作用（隨餐服可降磷），用於 CKD-MBD。", "C": "適合補充。維生素 B 群為水溶性，會在透析過程被清除，須補充以防缺乏。", "D": "適合補充。folic acid（葉酸）水溶性、透析中流失，補充可協助紅血球生成與降同半胱胺酸。"}, "sources": ["Harrison 21e Dialysis in the Treatment of Renal Failure", "Brenner & Rector's The Kidney 11e — Nutrition in dialysis patients", "KDOQI Clinical Practice Guideline for Nutrition in CKD 2020"]}}, "106-106a-內科-78": {"quick": "Macrolide（erythromycin）主要經肝代謝膽道排泄，腎衰不需減量；aminoglycoside/colistin/TMP-SMX 經腎排泄須減量。", "detail": {"background": "CKD 病人用藥須依清除途徑與腎毒性調整：『主要經腎排泄』的藥物在 GFR 下降時會蓄積，須依肌酸酐清除率（CrCl）減量或延長間隔；『主要經肝代謝/膽道排泄』者通常不需依腎功能調整。【經腎排泄、須減量的抗生素】aminoglycoside（gentamicin，本身具腎毒性、依 trough 與 CrCl 調整）、glycopeptide（vancomycin）、多數 β-lactam（penicillin、cephalosporin、carbapenem）、fluoroquinolone（部分）、colistin/polymyxin（腎排泄且具腎毒性，須嚴格依 CrCl 減量並監測）、TMP-SMX（sulfamethoxazole 與 trimethoprim 皆部分經腎，CrCl<30 須減量，且 trimethoprim 會升血鉀與假性升 Cr）。【主要肝代謝、腎衰不需減量】macrolide（erythromycin、azithromycin）、clindamycin、moxifloxacin、metronidazole、ceftriaxone（雙重排泄）、linezolid（部分）等。護理監測：CKD 病人用腎排泄藥須查 CrCl、監測血中濃度（aminoglycoside/vancomycin trough）、注意 colistin 腎毒性與 TMP-SMX 高血鉀。", "options": {"A": "對（為答案，不需減量）。macrolide 如 erythromycin 主要經肝臟代謝、膽道排泄，腎衰竭時通常不需依腎功能減量。", "B": "須減量。aminoglycoside（gentamicin）經腎排泄且具腎毒性，CKD 必須依 CrCl 與 trough 調整。", "C": "須減量。polymyxin/colistin 經腎排泄且具明顯腎毒性，CKD 須嚴格減量並監測腎功能。", "D": "須減量。TMP-SMX 部分經腎排泄，CrCl 下降須減量，且 trimethoprim 會升血鉀、競爭性升高血 Cr。"}, "sources": ["Harrison 21e Antibacterial Agents / Prescribing in renal failure", "Brenner & Rector's The Kidney 11e — Drug dosing in kidney disease"]}}, "106-106a-外科-76": {"quick": "70 歲、GFR 75 且無共病者可捐；感染性結石、糖尿病、難控高血壓皆為禁忌。", "detail": {"background": "活體腎捐贈者篩選核心在於『捐後單腎仍能維持足夠長期腎功能且手術安全』。一般可接受條件：足夠的 GFR（多要求 ≥80，部分中心對高齡者放寬至 60–80 並依年齡校正）、無蛋白尿/血尿、血壓正常或單藥良好控制且無靶器官損傷、無糖尿病、無活動性惡性腫瘤或傳染病、BMI 在可接受範圍、腎解剖正常。年齡本身非絕對禁忌——高齡者若無共病、GFR 與年齡相符（如 70 歲 GFR 75 屬該年齡正常範圍），可審慎接受捐贈，因高齡受贈者也常配對高齡供腎。【不可捐的情況】感染性結石（struvite/感染石，復發與腎功能損害風險高，且殘留感染風險）、糖尿病（即使早期、A1C 達標，捐後單腎易進展糖尿病腎病）、需多種藥物控制的高血壓（控制不易、靶器官風險）。護理/評估重點：分腎功能影像、24h 尿蛋白、口服葡萄糖耐量（疑糖尿病者）、血壓動態監測、心理社會評估。", "options": {"A": "不可捐。右腎感染性結石（即使碎石後）有復發與隱匿感染風險，捐贈會留下風險腎並影響受贈者，屬禁忌。", "B": "不可捐。雖血糖控制良好、GFR 80，但『糖尿病』本身即捐贈禁忌，單腎後易進展糖尿病腎病。", "C": "對（為答案，可捐）。70 歲、GFR 75 屬該年齡正常範圍，若無其他共病可審慎接受為活體捐贈者。", "D": "不可捐。血壓需三種藥物控制代表較難控制、可能已有靶器官損傷，屬捐贈禁忌。"}, "sources": ["KDIGO Clinical Practice Guideline on the Evaluation and Care of Living Kidney Donors 2017", "Harrison 21e Transplantation in the Treatment of Renal Failure", "Brenner & Rector's The Kidney 11e — Living donor evaluation"]}}, "107-TNPA-兒科-50": {"quick": "低血磷+高尿磷(TRP↓)+鹼磷酶↑+正常鈣與維生素 D+父子皆患→X-linked hypophosphatemic rickets（FGF23 過量、腎小管漏磷）。", "detail": {"background": "本題為典型『家族性低血磷佝僂症』（X-linked hypophosphatemic rickets, XLH，最常見的遺傳性佝僂症）。機轉：PHEX 基因突變導致 FGF23（一種磷調節激素）降解減少、循環 FGF23 升高；FGF23 抑制近端腎小管 NaPi-2a/2c 磷再吸收→腎臟大量漏磷（renal phosphate wasting），同時抑制 1α-hydroxylase→活性維生素 D 生成不足（但檢驗常呈『不適當地正常』而非高）。結果：低血磷（hypophosphatemia）、高尿磷、TRP（腎小管磷再吸收率）下降（本題 73%，正常 83–95%）、TmP/GFR 下降（本題 1.75，正常>4.0），血鈣與 PTH 正常、骨骼礦化不足造成佝僂（下肢彎曲、O 型腿）、生長遲緩、鹼性磷酸酶升高（造骨活性增）。遺傳呈 X-linked dominant，故『父親幼時也有下肢彎曲佝僂』符合家族遺傳。鑑別：維生素 D 缺乏佝僂會有低血鈣、PTH 升高、維生素 D 低、且非家族性；磷攝取不足與日曬不足無此家族史與高尿磷特徵。治療：口服磷酸鹽＋活性維生素 D（calcitriol），或新藥 burosumab（抗 FGF23 單株抗體）。護理重點：監測生長、血磷/鈣/PTH/鹼磷酶、避免口服磷致續發性副甲狀腺亢進。", "options": {"A": "對（為答案）。低血磷+高尿磷(TRP/TmPGFR↓)+正常鈣與維生素 D+鹼磷酶↑+父子同病史，完全符合 X-linked 家族性低血磷佝僂症（FGF23 過量致腎漏磷）。", "B": "錯。維生素 D 缺乏佝僂會見『低血鈣、PTH 升高、維生素 D 低』，與本題正常鈣/D 不符，且非家族遺傳。", "C": "錯。單純磷攝取不足不會造成『高尿磷/TRP 下降』（缺磷時腎應保磷），且無家族史。", "D": "錯。日曬不足影響維生素 D，本題維生素 D 正常且有明確高尿磷與家族史，不符。"}, "sources": ["Harrison 21e Bone and Mineral Metabolism / Hypophosphatemia（FGF23）", "Brenner & Rector's The Kidney 11e — Disorders of phosphate homeostasis / proximal tubule", "Nelson Textbook of Pediatrics — Rickets"]}}, "107-TNPA-內科-46": {"quick": "Sjögren's syndrome 最常引起遠端(type 1)腎小管性酸血症（間質淋巴浸潤致 distal RTA、低血鉀）。", "detail": {"background": "腎小管性酸血症（RTA）為腎小管處理酸鹼異常導致的『正常陰離子間隙（normal anion gap, hyperchloremic）代謝性酸中毒』。分型：【Type 1（distal RTA）】遠端腎小管 H+ 分泌障礙，尿液無法酸化（尿 pH 持續>5.5）、低血鉀、易腎結石/腎鈣化、可致骨病；常見續發於自體免疫疾病——尤其『Sjögren's syndrome（修格連氏症）』因淋巴球浸潤遠端腎小管間質而最常引起 distal RTA，其次 SLE、RA、原發性膽汁性膽管炎。【Type 2（proximal RTA）】近端 HCO3- 再吸收障礙，常合併 Fanconi 症候群（糖尿、胺基酸尿、磷尿），見於骨髓瘤、藥物（acetazolamide、tenofovir、ifosfamide）。【Type 4】hyporeninemic hypoaldosteronism，醛固酮缺乏或抵抗，特徵為『高血鉀』，常見於糖尿病腎病、NSAID、ACEI/ARB、鈣調磷酸酶抑制劑。本題問『最易造成 RTA 的免疫疾病』即 Sjögren's（典型考點：乾燥症→distal RTA→低血鉀無力/週期性麻痺）。護理重點：監測血鉀（type 1/2 低鉀、type 4 高鉀）、尿 pH、酸鹼狀態，補鹼（citrate/bicarbonate）。", "options": {"A": "對（為答案）。Sjögren's syndrome 因淋巴浸潤遠端腎小管，是最易引起 distal（type 1）RTA 的自體免疫疾病，典型伴低血鉀。", "B": "錯。皮肌炎主要侵犯肌肉與皮膚，非典型 RTA 病因。", "C": "錯。硬皮症（scleroderma）腎受累主要為『硬皮症腎危象』（惡性高血壓、微血管病性溶血、急性腎損傷），非以 RTA 表現。", "D": "錯。類風濕性關節炎可有腎受累（澱粉樣變、藥物腎病），但引起 RTA 遠不如 Sjögren's 典型。"}, "sources": ["Harrison 21e Acidosis and Alkalosis / Renal Tubular Acidosis", "Brenner & Rector's The Kidney 11e — Renal Tubular Acidosis", "Kelley & Firestein Rheumatology — Sjögren syndrome renal involvement"]}}, "107-TNPA-內科-70": {"quick": "移植後第1個月以手術/院內感染為主（傷口、UTI、導管）；CMV 等伺機感染多在 1–6 個月後才好發，故第一週發生率最低。", "detail": {"background": "腎移植後感染依時序分三階段，與免疫抑制累積程度相關：【術後第 1 個月（<1 month）】以『傳統院內/手術相關感染』為主——手術傷口感染、導尿管相關尿路感染（UTI 為腎移植最常見感染）、中心靜脈導管相關血流感染、肺炎、吻合處感染；此期免疫抑制尚未累積，伺機性感染少見。【1–6 個月】細胞免疫被持續壓制，為『伺機性與潛伏病毒再活化』高峰——CMV（最重要，發燒、白血球低下、移植腎/腸胃/肺侵犯）、BK virus（腎病變）、Pneumocystis jirovecii（PCP）、EBV（PTLD）、結核、黴菌、單純皰疹（HSV）多在此期或稍早；故需 CMV 預防（valganciclovir）與 PCP 預防（TMP-SMX）。【>6 個月】社區型感染為主，慢性病毒感染後遺症。本題病人術後『一星期』發燒，CMV 感染此時發生率最低（需 1–6 個月潛伏再活化期），最可能是傷口、UTI 或導管相關。護理重點：早期嚴格無菌導管照護、傷口監測、尿液監測；中期警覺 CMV/PCP，按時給預防性藥物與監測 CMV 病毒量。", "options": {"A": "發生率高。傷口感染屬術後早期手術相關感染，第一週常見。", "B": "發生率高。UTI（導尿管相關）是腎移植最常見感染，早期即可發生。", "C": "可能發生。HSV 等皰疹病毒再活化可在較早期出現，發生率高於 CMV。", "D": "對（為答案，發生率最低）。CMV 多在移植後 1–6 個月伺機期再活化，術後第一週發生率最低。"}, "sources": ["Harrison 21e Infections in Transplant Recipients", "Brenner & Rector's The Kidney 11e — Infectious complications of kidney transplantation（timeline）"]}}, "107-TNPA-外科-42": {"quick": "腎功能不全中重度疼痛宜選 fentanyl 與 hydromorphone（無活性代謝物蓄積）；避免 morphine、meperidine。", "detail": {"background": "鴉片類在腎衰竭病人的安全性取決於『活性/神經毒性代謝物是否經腎排泄而蓄積』。【應避免】morphine→代謝為 morphine-6-glucuronide（M6G，活性鎮痛但會蓄積致過度鎮靜、呼吸抑制）與 M3G（致神經興奮/肌躍）；meperidine（pethidine）→代謝為 normeperidine，腎衰時蓄積引起癲癇、震顫、神經毒性，腎病人『禁用』；codeine、tramadol 亦因代謝物蓄積須謹慎減量。【相對安全】fentanyl→經肝代謝為無活性產物、無明顯活性代謝物蓄積，腎衰可用（首選之一）；hydromorphone→主要代謝物 H3G 雖可蓄積但臨床上較 morphine 安全，常用於腎功能不全；methadone、buprenorphine 亦相對安全。本題選 2（fentanyl）+ 3（hydromorphone）= 選項 B（23）。護理重點：腎衰病人用鴉片須減量、延長間隔、密切監測呼吸與意識（嗜睡、肌躍是中毒前兆），備 naloxone。", "options": {"A": "錯（含 morphine）。1=morphine 在腎衰蓄積 M6G/M3G，不宜，故 13 不適當。", "B": "對（為答案）。2=fentanyl、3=hydromorphone 在腎功能不全相對安全，為較適合的組合。", "C": "錯（含 morphine+meperidine）。14 含 morphine 與 meperidine，皆腎衰應避免。", "D": "錯（含 meperidine）。24 含 meperidine（normeperidine 致癲癇），腎衰禁用。"}, "sources": ["Harrison 21e Pain: Pathophysiology and Management / Palliative Care", "Brenner & Rector's The Kidney 11e — Analgesic use in kidney failure", "KDIGO / palliative care opioid dosing in CKD"]}}, "108a-TNPA-兒科-73": {"quick": "aminoglycoside 三大毒性為腎毒、耳毒、神經肌肉阻斷；靜脈炎(phlebitis)最少見。", "detail": {"background": "Aminoglycoside（gentamicin、amikacin 等）為濃度依賴型殺菌劑，作用於 30S ribosome。其特徵性不良反應有三：①腎毒性（近端腎小管累積致非少尿型 ATN，伴低鎂/鉀/鈣）；②耳毒性（耳蝸與前庭毛細胞損傷，常不可逆，與粒線體基因易感性相關）；③神經肌肉阻斷（neuromuscular blockade/paralysis）——aminoglycoside 抑制突觸前 ACh 釋放並降低突觸後膜對 ACh 敏感性，可在重症肌無力病人、快速靜脈注射、或與肌肉鬆弛劑/麻醉劑併用時誘發肌肉無力甚至呼吸抑制，雖少見但屬其『特徵性』毒性。相對而言，『靜脈炎（phlebitis）』為一般靜脈刺激性藥物（如某些抗生素、高滲透壓/低 pH 輸液）的局部反應，並非 aminoglycoside 的代表性副作用，發生率最低。護理監測：腎功能（SCr、尿量、Mg）、聽力、神經肌肉狀態（尤其重症肌無力或術後病人）、避免快速推注。", "options": {"A": "可見。神經肌肉麻痺為 aminoglycoside 特徵毒性之一（抑制 ACh 釋放），重症肌無力/合併肌鬆劑時尤須留意。", "B": "常見。耳毒性是 aminoglycoside 代表性毒性，常不可逆。", "C": "常見。腎毒性（非少尿型 ATN）為 aminoglycoside 代表性毒性。", "D": "對（為答案，最少見）。靜脈炎非 aminoglycoside 的特徵性毒性，發生率最低。"}, "sources": ["Harrison 21e Antibacterial Agents（Aminoglycosides — adverse effects）", "Goodman & Gilman — Aminoglycosides（neuromuscular blockade）"]}}, "108a-TNPA-內科-71": {"quick": "嚴重尿毒(BUN 202)首次透析後出現意識混亂+腦水腫→透析不平衡症候群(溶質快速移除致腦水腫)。", "detail": {"background": "透析不平衡症候群（dialysis disequilibrium syndrome, DDS）發生於『嚴重尿毒病人首次（或前幾次）血液透析』時，因血中尿素等溶質被快速清除，血漿滲透壓驟降，而腦組織內溶質（尿素、idiogenic osmoles）下降較慢，造成血腦間滲透壓梯度→水分移入腦組織→『腦水腫』。臨床表現：頭痛、噁心嘔吐、躁動、意識混亂（譫妄）、肌躍、嚴重者抽搐昏迷；影像可見輕微腦水腫。危險因子：嚴重氮血症（BUN 很高，如本題 202）、首次透析、高效率/快速透析、兒童與老人。預防（關鍵護理）：初次透析採『慢血流、短時間、低效率（小面積透析器）、分次漸進降 BUN』，避免一次清除過多溶質；必要時加滲透劑（mannitol）。本題病人 BUN 202、首次透析後出現譫妄、嘔吐、躁動且 CT 見輕微腦水腫，典型 DDS。鑑別：橋腦中央髓鞘溶解（CPM）係『過快矯正低血鈉』所致（本題鈉 128 雖低但非快速矯正背景）、輸血過敏為皮膚/過敏/血壓變化，皆不符腦水腫意識變化。", "options": {"A": "錯。橋腦中央髓鞘溶解症係『過快矯正慢性低血鈉』所致，影像為橋腦病灶，與首次透析後瀰漫性腦水腫不符。", "B": "錯。快速矯正鈣磷雖可致症狀，但不會造成此典型『首次透析後腦水腫+意識混亂』的圖像。", "C": "對（為答案）。嚴重尿毒首次透析、溶質快速移除致滲透梯度與腦水腫，符合透析不平衡症候群。", "D": "錯。輸血過敏反應表現為蕁麻疹、發燒、低血壓/呼吸窘迫，非腦水腫意識混亂。"}, "sources": ["Harrison 21e Dialysis in the Treatment of Renal Failure（disequilibrium syndrome）", "Brenner & Rector's The Kidney 11e — Complications of hemodialysis"]}}, "108b-TNPA-內科-74": {"quick": "PD 腹膜炎最常見致病菌為皮膚來源的 Gram(+)球菌——coagulase-negative staphylococci(表皮葡萄球菌)。", "detail": {"background": "腹膜透析（PD）相關腹膜炎是 PD 最主要併發症，多因『接管/換液時皮膚菌污染導管』而起。最常見致病菌為『Gram-positive 球菌』，其中以皮膚正常菌叢的『凝固酶陰性葡萄球菌（coagulase-negative staphylococci，如 Staphylococcus epidermidis）』居首，其次 Staphylococcus aureus（常與導管出口/隧道感染相關）、Streptococcus；Gram-negative（大腸桿菌、綠膿桿菌、Klebsiella）則提示腸道源或較嚴重感染、預後較差。診斷標準（ISPD）：符合三項中至少兩項——①腹痛/透析液混濁等臨床表現；②透析液白血球>100 cells/µL 且『多形核中性球(PMN)>50%』；③透析液培養陽性。治療：經驗性『腹腔內（intraperitoneal）』給抗生素涵蓋 Gram(+)（如 vancomycin/cefazolin）與 Gram(-)（如 ceftazidime/aminoglycoside），依培養調整，療程約 2–3 週；反覆/難治、黴菌或分枝桿菌感染須『移除導管』。護理重點：強調無菌換液技術、出口照護、辨識透析液混濁與腹痛、留取透析液送檢。本題答葡萄球菌菌種（即 CoNS 為主的 Gram(+)球菌）。", "options": {"A": "對（為答案）。葡萄球菌（尤其凝固酶陰性的 S. epidermidis）為皮膚來源，是 PD 腹膜炎最常見致病菌。", "B": "錯。綠膿桿菌（Pseudomonas）較少見，常與導管感染相關、較難治。", "C": "錯。克雷伯氏菌屬 Gram(-) 腸道菌，非最常見。", "D": "錯。大腸桿菌屬 Gram(-) 腸道源，提示腸道污染、非 PD 腹膜炎首位致病菌。"}, "sources": ["ISPD Peritonitis Recommendations 2022", "Harrison 21e Dialysis（peritoneal dialysis complications）", "Brenner & Rector's The Kidney 11e — Peritoneal dialysis"]}}, "108a-TNPA-外科-36": {"quick": "糖尿病腎病是腎移植最常見『適應症』而非禁忌；活動性癌、嚴重心肺病、無法配合醫囑才是禁忌。", "detail": {"background": "腎移植受贈者（recipient）評估在於確認病人能安全承受手術與終身免疫抑制並從中獲益。【絕對/相對禁忌】活動性或近期惡性腫瘤、轉移性癌（免疫抑制會促癌進展，須無病一段期間）、無法控制的活動性感染、嚴重不可逆的心肺疾病（無法承受手術與終身用藥）、活動性物質濫用、嚴重精神疾病致無法理解與遵從複雜免疫抑制醫囑（影響移植腎存活）、預期壽命過短等。【非禁忌、反為適應症】末期腎病的各種病因——其中『糖尿病腎病變』正是 ESRD 與腎移植最常見的『原發病因/適應症』之一（糖尿病病人移植後存活與生活品質常優於長期透析，部分可考慮胰腎同時移植）。故糖尿病導致的腎衰竭不是受贈禁忌，而是常見換腎理由。護理/評估重點：腫瘤篩檢與無病期確認、感染源清除、心肺功能評估（冠狀動脈評估）、心理社會與遵從性評估、疫苗接種。", "options": {"A": "為禁忌。近期/轉移性惡性腫瘤下免疫抑制會促癌，屬禁忌（須達無病期）。", "B": "對（為答案，非禁忌）。糖尿病導致的腎衰竭是腎移植最常見適應症之一，並非禁忌。", "C": "為禁忌。嚴重不可逆心肺疾病無法承受手術與終身免疫抑制，屬禁忌。", "D": "為禁忌。精神疾病致無法理解/遵從醫囑會危及移植腎存活，屬禁忌。"}, "sources": ["Harrison 21e Transplantation in the Treatment of Renal Failure（recipient evaluation）", "Brenner & Rector's The Kidney 11e — Recipient selection and contraindications"]}}, "108b-TNPA-外科-43": {"quick": "NSAID(ibuprofen)護理重點：監測 BUN/Cr(腎毒)與腸胃出血(噁心/嘔吐/吐血)→選 1+4。", "detail": {"background": "Ibuprofen 屬非選擇性 NSAID，抑制 COX-1/COX-2 進而減少前列腺素合成。前列腺素在腎臟維持入球小動脈擴張以保腎血流，被抑制後腎血流與 GFR 下降→『腎功能惡化（BUN/Cr 上升）、水鈉滯留、高血鉀、間質性腎炎』，在容積耗竭、老年、心衰、合併 ACEI/利尿劑（三重打擊 triple whammy）者尤甚。COX-1 抑制使胃黏膜保護性前列腺素減少→『胃腸黏膜糜爛、潰瘍、出血』（噁心、嘔吐、解黑便或吐血）。故服用 ibuprofen 須特別觀察『①腎功能（BUN、creatinine）變化』與『④噁心、嘔吐或吐血（腸胃道出血徵象）』，即選項 1+4 = A。抽筋（②）與呼吸變慢（③，呼吸抑制是鴉片類而非 NSAID 的副作用）非 NSAID 重點觀察項。護理：用最低有效劑量與最短療程、隨餐服、必要時併 PPI 護胃、監測腎功能與電解質、避免合併其他腎毒藥。", "options": {"A": "對（為答案）。1（BUN/Cr 腎毒性）+4（腸胃道出血：噁心/嘔吐/吐血）正是 NSAID 兩大須監測併發症。", "B": "錯。2 抽筋與 3 呼吸變慢非 NSAID 主要副作用（呼吸抑制屬鴉片類）。", "C": "錯。含 3（呼吸變慢）為鴉片類副作用，非 NSAID 重點。", "D": "錯。雖含 4 正確，但 2 抽筋非 NSAID 主要監測項，組合不完整。"}, "sources": ["Harrison 21e NSAIDs / Drug-induced kidney injury", "Brenner & Rector's The Kidney 11e — NSAID nephrotoxicity / prostaglandin and renal hemodynamics"]}}, "108b-TNPA-外科-53": {"quick": "移植術後第2天突發尿量驟減+Cr 急升+移植區腫痛→腎動靜脈血栓（早期血管併發症致移植腎缺血）。", "detail": {"background": "腎移植早期（術後數天內）的鑑別需依『發生時間+臨床型態』：【腎動脈/靜脈血栓】多在術後極早期（24–72 小時），表現『突發無尿/少尿、Cr 急速上升、移植腎區腫脹疼痛』，是早期移植腎喪失的重要外科性原因，需緊急都卜勒超音波確認血流，常需手術探查或取出移植腎。【超急性排斥】因受贈者預存抗體（pre-formed antibody）在『手術台上吻合後數分鐘至數小時內』即發生移植腎變色、無尿，現因術前 crossmatch 已罕見，且通常不會等到術後第 2 天才表現。【尿液滲漏】輸尿管吻合處缺血壞死，多在術後數天，表現傷口滲尿、尿量減少、局部腫脹，但 Cr 上升較緩、且引流液可測肌酸酐＞血。【淋巴囊腫】為後期、漸進，壓迫輸尿管致阻塞，非急性無尿腫痛。本題『術後第 2 天突然尿量↓、BUN/Cr 由 10/0.8→30/2.6、傷口腫脹疼痛』最符合『腎動靜脈血栓』。護理重點：嚴密監測每小時尿量（突降為警訊）、傷口腫脹/疼痛、Cr 趨勢，立即通報並安排都卜勒超音波。", "options": {"A": "錯。淋巴囊腫為後期漸進、壓迫致阻塞，非術後第 2 天的急性無尿腫痛。", "B": "對（為答案）。術後早期突發尿量驟減、Cr 急升、移植腎區腫痛，符合腎動靜脈血栓。", "C": "錯。尿液滲漏 Cr 上升較緩、以傷口滲尿為主，急性度不如血栓。", "D": "錯。超急性排斥多在吻合後數分鐘至數小時（手術中）即發生，現因 crossmatch 已罕見，不在第 2 天表現。"}, "sources": ["Harrison 21e Transplantation in the Treatment of Renal Failure（early graft dysfunction）", "Brenner & Rector's The Kidney 11e — Vascular and urologic complications of kidney transplantation"]}}, "108a-TNPA-通論-55": {"quick": "尿比重 1.001(極稀)見於腎絲球腎炎/腎濃縮力差；citrate 鹼化尿使 pH 偏鹼非酸→正確為③④(選A)。註：原 ③④ 配對需依官方答案 A 判讀。", "detail": {"background": "尿液常規（urinalysis）各項臨床意義：①Nitrite（NIT）陽性→提示『會把硝酸鹽還原成亞硝酸鹽的 Gram(-) 菌（如 E. coli）尿路感染』，與『溶血性貧血』無關（溶血血紅素相關的是尿膽素原/血紅素尿）。②尿 pH：酸性（如 3.8）多見於酸中毒/高蛋白飲食/某些代謝；服用 potassium-citrate（檸檬酸鉀，臨床用於鹼化尿液預防尿酸/胱胺酸結石）應使尿『偏鹼』而非 pH 3.8，故②敘述方向相反。③Protein（PRO +++）明顯蛋白尿→提示腎絲球疾病（如腎絲球腎炎/腎病症候群），單純泌尿道感染通常僅微量蛋白尿，故『PRO +++→泌尿道感染』不夠精準（大量蛋白尿應想腎絲球病變）。④比重（Sp. Gr.）1.001 為極度稀釋尿（接近水），反映腎濃縮能力下降或大量稀釋，可見於腎實質病變（如腎絲球腎炎影響濃縮）、尿崩、過度水化。本題官方答案為 A（即配對③④為『正確』組合）；就臨床精神而言，極稀尿（④）反映腎濃縮力受損可與腎絲球/腎小管病變相關，是相對較合理者，而①②方向明顯錯誤被排除。護理重點：解讀尿常規須結合臨床——NIT/LE 看感染、PRO 看腎絲球、Sp.Gr. 看濃縮力、pH 看代謝與用藥。", "options": {"A": "對（為官方答案）。本題將③④判為正確配對；相對於①②的明顯錯誤（NIT 非溶血、citrate 應鹼化尿非 pH3.8），③④被選為答案。", "B": "錯。①NIT 陽性提示泌尿道感染而非溶血性貧血；②citrate 應使尿偏鹼，故①②錯誤。", "C": "錯。含①（NIT→溶血）此錯誤敘述。", "D": "錯。含②（citrate→pH3.8）方向相反的錯誤敘述。"}, "sources": ["Harrison 21e Approach to the Patient with Renal Disease（urinalysis）", "Brenner & Rector's The Kidney 11e — Laboratory Assessment of Kidney Disease（urinalysis interpretation）"]}}, "109-進階-內科-18": {"quick": "cisplatin 雖具腎毒性，但洗腎(ESRD)病人仍可使用（透析可清除）；故『洗腎不能用』為錯。", "detail": {"background": "Cisplatin（順鉑）為含鉑化療藥，以共價結合 DNA 形成交聯、抑制 DNA 複製與轉錄而抗癌，須監測骨髓抑制（CBC）。其特徵毒性：①腎毒性——是劑量限制毒性，傷害近端腎小管致 ATN，並造成『低血鎂（顯著且持久）、低鉀、低鈣』與鹽耗損，預防靠『充分靜脈水化＋利尿（強迫利尿）＋補鎂』，可考慮較不腎毒的 carboplatin 替代；②耳毒性——高頻聽力喪失、耳鳴，須監測聽力；③周邊神經病變；④強烈致吐（需強效止吐預防）；⑤為發泡劑（vesicant），外滲會組織壞死，須中心靜脈給藥並嚴密觀察。關於『洗腎病人能否使用』：腎毒性是對『有功能腎臟』的傷害；對已透析的 ESRD 病人，cisplatin 可在『透析配合下』使用（cisplatin 可被血液透析清除，常於給藥後安排透析），故『洗腎患者不能使用』的敘述錯誤——臨床上會調整劑量與配合透析時程而非禁用。本題要選錯誤者即 B。護理重點：給藥前後水化、監測 SCr/電解質（尤其 Mg）、CBC、聽力、止吐、預防外滲。", "options": {"A": "對。cisplatin 透過結合 DNA 抑制其合成，會致骨髓抑制，須定期監測 CBC。", "B": "錯（為答案）。cisplatin 雖具腎毒性，但 ESRD/洗腎病人並非絕對禁用——可調整劑量並配合透析清除，故『洗腎不能用』錯誤。", "C": "對。cisplatin 具耳毒性（高頻聽損、耳鳴），須評估聽力。", "D": "對。cisplatin 為發泡劑（vesicant），外滲會致組織壞死，須嚴密觀察。"}, "sources": ["DeVita Cancer: Principles & Practice of Oncology — Platinum agents", "Harrison 21e Principles of Cancer Treatment（chemotherapy toxicity）", "Brenner & Rector's The Kidney 11e — Cisplatin nephrotoxicity"]}}, "109-通論-其他-21": {"quick": "PD 最常見問題為蛋白質流失（透析液每日丟失蛋白/胺基酸），須提高蛋白攝取。", "detail": {"background": "腹膜透析（PD）以腹膜為半透膜，灌入含葡萄糖的透析液藉滲透與擴散移除水分與溶質。其營養與代謝特點：①『蛋白質流失』——腹膜對蛋白具通透性，每日經透析液丟失約 5–15 g 蛋白與胺基酸（腹膜炎時更多），是 PD 病人常見問題，易致低白蛋白與營養不良，故衛教須『提高蛋白攝取（約 1.2–1.3 g/kg/day）』。②葡萄糖吸收——透析液葡萄糖被吸收提供熱量但也致『高血糖、體重增加、高三酸甘油酯』，故反而較少低血糖（除非糖尿病用藥未調整）。③其他併發症：腹膜炎（最重要感染併發症）、導管出口/隧道感染、機械性問題（引流不良、滲漏、疝氣）、長期可致包囊性硬化性腹膜炎（少見但嚴重）。本題問『最常見之問題或併發症』，選『蛋白質流失』。鑑別：低血糖少見（反多高血糖）、胸悶非典型、肌肉痙攣較常見於『血液透析』超濾過快時。護理重點：監測白蛋白與營養狀態、衛教高蛋白飲食、無菌換液防腹膜炎、監測體重與血糖。", "options": {"A": "錯。PD 因吸收透析液葡萄糖反易『高血糖』，低血糖少見。", "B": "對（為答案）。腹膜對蛋白通透，每日經透析液流失蛋白與胺基酸，是 PD 最常見營養問題。", "C": "錯。胸部悶痛非 PD 典型併發症。", "D": "錯。肌肉痙攣較常見於血液透析超濾過快、容積快速下降時。"}, "sources": ["Harrison 21e Dialysis（peritoneal dialysis）", "Brenner & Rector's The Kidney 11e — Peritoneal dialysis: protein loss and nutrition", "KDOQI Nutrition Guideline 2020"]}}, "109-進階-其他-47": {"quick": "Mannitol 經腎絲球過濾後『不被再吸收』而留在管腔產生滲透利尿；故『經腎小管再吸收』為非。", "detail": {"background": "利尿劑依作用部位與機轉分類：①『滲透性利尿劑 mannitol』——經腎絲球自由過濾，但在腎小管『不被再吸收』，留在管腔提高管液滲透壓、阻止水分再吸收而利尿，並可短暫擴張血漿容積（用於腦水腫降顱壓、青光眼、某些 AKI 預防）；故『經腎小管再吸收』是錯的（恰相反，正因不被再吸收才有滲透利尿效果）。②『噻嗪類 thiazide』——作用於『遠端曲小管』，抑制 Na-Cl 共同轉運子（NCC），減少鈉氯再吸收，用於本態性高血壓與輕度水腫，副作用低鉀、低鈉、高鈣、高尿酸、高血糖。③『亨利氏環利尿劑 loop（furosemide）』——抑制升支粗段 Na-K-2Cl 共同轉運子（NKCC2），利尿最強，用於水腫/心衰/高血鉀，副作用低鉀、低鎂、低鈣、耳毒性。④『保鉀利尿劑 spironolactone』——醛固酮（aldosterone）受體拮抗劑，作用於集尿管，阻斷醛固酮促鈉再吸收與排鉀，故『保鉀』、用於原發性醛固酮增多、心衰、肝硬化腹水，副作用高血鉀、男性女乳。本題問『何者為非』，B（mannitol 經腎小管再吸收）錯誤。護理重點：監測電解質（loop/thiazide 低鉀、K-sparing 高鉀）、血壓、尿量、體重。", "options": {"A": "對。thiazide 抑制遠端曲小管 NCC、減少鈉氯再吸收，治療本態性高血壓。", "B": "錯（為答案）。mannitol 過濾後『不被腎小管再吸收』，留在管腔產生滲透利尿，敘述方向相反故為非。", "C": "對。spironolactone 為醛固酮受體拮抗劑，阻斷 aldosterone 對集尿管作用而保鉀利尿。", "D": "對。loop 利尿劑抑制亨利氏環升支 Na-K-2Cl 共同轉運子，減少鈉氯再吸收。"}, "sources": ["Harrison 21e Diuretics and the management of edema", "Brenner & Rector's The Kidney 11e — Diuretics: mechanisms and clinical use", "Goodman & Gilman — Diuretics"]}}, "109-通論-其他-49": {"quick": "HD 後身體水分電解質達平衡約需 6 小時，故術前透析宜安排於手術前約 6 小時完成。", "detail": {"background": "長期血液透析病人接受手術前須妥善安排透析時機，以矯正容積過載、高血鉀與代謝性酸中毒，但又要避免『剛透析完即手術』。原因：透析過程造成『體液與電解質的快速移動』，剛透析完病人常有相對容積耗竭（易低血壓）、暫時性低鉀、抗凝（透析常用 heparin）尚未代謝完畢致出血風險、以及細胞內外電解質尚未平衡。一般建議『透析結束後留約 6 小時讓水分與電解質達到新的平衡』再進行常規手術，此時容積與電解質較穩定、heparin 抗凝作用也已消退。術前透析其他要點：監測手術日的鉀（高鉀延後）、避免透析間體重過度增加、保護動靜脈廔管（避免該側量血壓/打針/壓迫）、評估貧血與心血管風險。本題答 6 小時。", "options": {"A": "錯。2 小時過短，剛透析後容積耗竭、heparin 殘留、電解質尚未平衡，不宜立即手術。", "B": "對（為答案）。透析後約 6 小時水分與電解質可達平衡，為術前透析與手術間建議間隔。", "C": "錯。12 小時偏長（雖安全），標準建議約 6 小時即可達平衡。", "D": "錯。24 小時過長，間隔太久反而可能再度容積過載/高血鉀。"}, "sources": ["Brenner & Rector's The Kidney 11e — Perioperative management of the dialysis patient", "Miller's Anesthesia — Anesthesia for patients with renal disease / ESRD"]}}, "110-進階-內科-48": {"quick": "GFR 10 時 metformin/SGLT2i 禁用、sitagliptin/SGLT2i 須減量；pioglitazone(肝代謝)不需依腎功能調整。", "detail": {"background": "嚴重 CKD（GFR 10）合併菌血症與高血糖時的口服降糖藥調整：①metformin——主要經腎排泄，eGFR<30 禁用（乳酸中毒風險，尤其敗血症/低灌流時更危險），不可加量。②SGLT2 抑制劑 empagliflozin（Jardiance）——降糖效果依賴 GFR，GFR 極低時降糖作用消失、且在急性病/感染時應暫停（會增酮酸中毒與泌尿生殖感染風險），eGFR<30 不建議用於『降糖目的』，故『可減量繼續用以降糖』不正確。③DPP-4 抑制劑 sitagliptin（Januvia）——主要經腎排泄，CKD 須『減量』（eGFR<30 用 25 mg/day），故『不需調整』錯誤（linagliptin 才是經膽道、不需調整）。④pioglitazone（Actos，TZD）——主要經『肝臟』代謝，不依賴腎排泄，CKD 不需依腎功能調整劑量（但須注意水鈉滯留/心衰、骨折風險，敗血症併容積問題時仍須謹慎）。本題問『正確』者為 D（pioglitazone 不需調整）。臨床上嚴重感染、GFR 10 的住院病人多改『胰島素』控制最安全。護理重點：監測血糖、腎功能、乳酸（疑乳酸中毒）、容積狀態。", "options": {"A": "錯。metformin 在 eGFR<30 禁用且敗血症下乳酸中毒風險高，絕不可加量。", "B": "錯。sitagliptin 主要經腎排泄，CKD 須減量（eGFR<30 減為 25 mg/day），非不需調整。", "C": "錯。empagliflozin 在 GFR 極低降糖效果喪失且急性病/感染應暫停，不宜以降糖目的續用。", "D": "對（為答案）。pioglitazone 主要經肝代謝，不需依腎功能調整劑量（但須留意水鈉滯留與心衰）。"}, "sources": ["KDIGO Diabetes in CKD Guideline 2022", "Harrison 21e Diabetes Mellitus（drug therapy in renal impairment）", "Brenner & Rector's The Kidney 11e — Drug dosing in CKD"]}}, "110-進階-內科-53": {"quick": "GFR 26(CKD 3b-4)病人 bisphosphonate 慎用、PTH/calcitonin 非首選；預防類固醇骨鬆優先補鈣+維生素 D。", "detail": {"background": "本題為『類固醇誘發骨質疏鬆（glucocorticoid-induced osteoporosis, GIOP）合併中重度 CKD（GFR 26，CKD stage 4）』的預防用藥選擇。長期類固醇透過抑制造骨細胞、增加蝕骨、減少腸鈣吸收與性腺抑制致快速骨流失，凡長期使用者均應補充『鈣＋維生素 D』作為基礎。藥物考量受腎功能限制：①雙磷酸鹽（bisphosphonate）——抗骨吸收、為一般 GIOP 首選，但『經腎排泄』，eGFR<30–35 mL/min 時多數仿單禁用/慎用（且須先排除低血鈣與 CKD-MBD 中的低轉換骨病），本題 GFR 26 屬此限制範圍，故非最安全選項。②降鈣素（calcitonin）——抗骨吸收效果弱、長期療效與安全性不佳，非首選。③人工合成 PTH（teriparatide）——為合成代謝藥，但用於嚴重腎功能不全與本題情境須謹慎，且非『預防』之首選一線。④鈣片＋維生素 D——是所有長期類固醇病人的基礎預防措施，在腎功能受限時相對安全且必要（同時對應 CKD-MBD 處理，惟須監測血鈣磷避免高鈣）。故本題答 C（鈣＋維生素 D）為最適當的『預防』骨鬆基礎處置。護理重點：監測血鈣磷、PTH、25-OH 維生素 D，避免高血鈣；GFR<30 用抗骨吸收藥前須腎臟與骨代謝評估。", "options": {"A": "錯。bisphosphonate 經腎排泄，eGFR<30–35 多禁用/慎用，本題 GFR 26 不宜作首選。", "B": "錯。calcitonin 抗骨吸收效果弱、非預防骨鬆首選。", "C": "對（為答案）。鈣片＋維生素 D 為所有長期類固醇病人骨鬆預防的基礎措施，CKD 下相對安全（須監測血鈣磷）。", "D": "錯。合成 PTH（teriparatide）為合成代謝藥，非『預防』首選，且嚴重腎功能不全須謹慎。"}, "sources": ["ACR Guideline for the Prevention and Treatment of Glucocorticoid-Induced Osteoporosis 2017", "Harrison 21e Osteoporosis / Glucocorticoid-induced bone loss", "Brenner & Rector's The Kidney 11e — CKD-MBD（bisphosphonate caution in low GFR）"]}}, "110-進階-內科-73": {"quick": "PD 腹膜炎(WBC>100、PMN>50%)應『腹腔內(intraperitoneal)』給經驗性抗生素；療程約2–3週、難治需移除導管。", "detail": {"background": "本題透析液白血球 150 cells/mm³ 且嗜中性球 60%（>100 且 PMN>50%）＋腹痛，符合 PD 相關腹膜炎診斷（ISPD 標準：腹痛/混濁＋透析液 WBC>100 且 PMN>50%＋培養陽性，三取二）。處置重點（依 ISPD 2022）：①立即留取透析液送『細胞計數、革蘭氏染色與培養』；②『經驗性抗生素首選經腹腔內（intraperitoneal, IP）途徑』給藥——IP 給藥可在腹腔達高濃度、療效優於靜脈，須涵蓋 Gram(+)（vancomycin 或 cefazolin）＋Gram(-)（ceftazidime 或 aminoglycoside），再依培養調整；③療程一般『至少 2–3 週』而非僅一週（依菌種，金黃葡萄球菌/Gram(-)/腸球菌需 3 週）；④遇引流不暢可考慮處理纖維蛋白，但常規不是隨意加 tPA；⑤『難治性、復發性、黴菌或分枝桿菌腹膜炎須『移除腹膜透析導管』』，不可一味延長抗生素而不拔管。本題正確處置為 B（IP 給藥）。護理重點：強調無菌換液與出口照護、辨識混濁透析液、留檢、配合 IP 抗生素給藥、監測退燒與透析液澄清度。", "options": {"A": "錯。療程不應只持續一週；金黃葡萄球菌/Gram(-)等須至少 2–3 週，敘述療程過短。", "B": "對（為答案）。PD 腹膜炎經驗性抗生素首選『腹腔內(IP)』途徑給藥，達局部高濃度療效佳。", "C": "錯。tPA/Urokinase 並非腹膜炎常規處置，主要用於導管阻塞/纖維蛋白堵塞之特定情況，非感染首要措施。", "D": "錯。難治、復發、黴菌或分枝桿菌感染應『移除導管』，不可只延長抗生素而不拔管。"}, "sources": ["ISPD Peritonitis Recommendations 2022", "Brenner & Rector's The Kidney 11e — PD peritonitis management", "Harrison 21e Dialysis（peritoneal dialysis complications）"]}}, "110-進階-外科-75": {"quick": "肝移植術後 AST/ALT 通常<2000 且在24–48小時內迅速下降為正常經過(C 正確)；持續升高才需擔心血流問題。", "detail": {"background": "本題綜合腎與肝移植術後監測重點。【腎移植】①血壓不應一味壓到收縮壓<110——移植腎需『足夠灌流壓』維持尿量與避免缺血，過低反害移植腎，故 A 錯。②術後尿量本就應充足，若尿量過低應先評估容積、血流與排斥/阻塞，而非『連續利尿劑沖尿量』掩蓋問題（過度利尿致容積耗竭反傷移植腎），故 B 錯。【肝移植】③術後肝細胞因缺血再灌流會有一過性轉胺酶上升，但若移植順利，AST/ALT 高峰『通常<2,000 U/L 並在術後 24–48 小時內迅速下降』，代表移植肝功能良好——此為正常經過，C 正確。④若 AST/ALT『持續升高或再度上升』，提示移植肝缺血（肝動脈血栓 HAT、門靜脈問題）或原發性無功能，須儘速安排『都卜勒超音波/血管攝影』評估肝血流——故『持續升高應先做血管影像評估血流』本身方向正確，但本題以 C 為標準答案（最切合『正確』之一般經過描述）；D 的處置精神雖合理，惟題目設定 C 為正確選項。護理重點：腎移植維持足夠灌流與尿量、避免過度降壓/盲目利尿；肝移植監測轉胺酶趨勢，持續升高即評估血流。", "options": {"A": "錯。腎移植術後不應將收縮壓壓到<110，移植腎需足夠灌流壓維持功能。", "B": "錯。尿量過低應先查容積/血流/阻塞/排斥，而非連續利尿劑硬沖尿量（會掩蓋問題並致容積耗竭）。", "C": "對（為答案）。移植順利時肝移植術後 AST/ALT 多<2,000 U/L 並於 24–48 小時內迅速下降，屬正常經過。", "D": "敘述方向合理但非本題標準答案。AST/ALT 持續升高確實應評估肝血流（都卜勒/血管攝影），惟題目以 C 為正確選項。"}, "sources": ["Harrison 21e Liver Transplantation / Transplantation of the Kidney", "Brenner & Rector's The Kidney 11e — Postoperative care of the kidney transplant recipient", "Miller's Anesthesia — perioperative transplant management"]}}, "110-通論-麻醉-68": {"quick": "透析結束與常規手術至少間隔約6小時，以利水分電解質達平衡、heparin 代謝。", "detail": {"background": "與本批 109-通論-其他-49 同一考點：長期血液透析病人術前透析時機。透析過程會造成體液與電解質快速移動、剛透析完常呈相對容積耗竭（易術中低血壓）、暫時低鉀、且常用 heparin 抗凝尚未完全代謝（增出血風險）。因此不宜『剛透析完立即手術』，一般建議『透析結束後至少約 6 小時』讓水分、電解質與酸鹼達到新的平衡、heparin 作用消退，再進行常規手術。此間隔也讓醫療團隊能於手術日重新評估鉀離子（高鉀者延後）、容積與貧血。護理重點：保護動靜脈廔管側肢（勿量血壓/打針）、監測手術日電解質、避免透析間體重過度增加、注意抗凝狀態。本題答 6 小時。", "options": {"A": "錯。24 小時過長，間隔太久可能再度容積過載/高血鉀。", "B": "錯。12 小時偏長，標準建議約 6 小時即可達平衡。", "C": "對（為答案）。透析結束後至少約 6 小時水分電解質達平衡、heparin 代謝，較適合手術。", "D": "錯。4 小時偏短，容積與電解質、heparin 尚未充分平衡/代謝。"}, "sources": ["Brenner & Rector's The Kidney 11e — Perioperative dialysis timing", "Miller's Anesthesia — Anesthesia for the patient with ESRD"]}}, "110-進階-麻醉-68": {"quick": "CKD 病人術後 morphine(M6G 蓄積)致呼吸抑制+瞳孔縮小，最適當處置為 naloxone(鴉片拮抗劑)。", "detail": {"background": "本題慢性腎衰竭病人術中給予 morphine 6 mg、cisatracurium（肌鬆劑）與 propofol，術後『無法喚醒、呼吸慢、瞳孔縮
