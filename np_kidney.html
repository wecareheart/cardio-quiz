asse(石街);『輸尿管破裂』(B)非 ESWL 併發症(屬輸尿管鏡 URS 的併發症),故非。", "detail": {"background": "ESWL 以體外震波碎石,屬非侵入性,常見併發症:①血尿(最常見,震波傷及腎黏膜/微血管,通常短暫自限);②腎周圍/被膜下血腫(subcapsular/perinephric hematoma,凝血異常或高血壓者風險高);③steinstrasse『石街』(碎裂的結石碎屑在輸尿管內堆積成串,阻塞輸尿管,可致腎絞痛、腎積水甚至感染,大結石碎石後較易發生,有時需放雙 J 或 URS 處理);④感染/urosepsis(結石含菌時);⑤碎石不完全需重複治療。『輸尿管破裂/穿孔』是『輸尿管鏡碎石(URS)』器械操作的併發症,而非 ESWL(體外震波不直接接觸輸尿管壁,不會造成輸尿管機械性破裂)。0.9 cm 腎結石為 ESWL 良好適應症。護理:術後監測血尿程度(短暫紅色尿常見、衛教多喝水)、腰痛、發燒、排尿狀況與是否排出碎石。", "options": {"A": "是常見併發症。血尿為 ESWL 最常見併發症,因震波傷及腎黏膜微血管,多為短暫自限。", "B": "非 ESWL 併發症(正解)。輸尿管破裂/穿孔是輸尿管鏡(URS)器械操作的併發症;ESWL 不直接接觸輸尿管,不會造成機械性破裂。", "C": "是常見併發症。腎周圍/被膜下血腫為 ESWL 的併發症,凝血異常或高血壓者風險增加。", "D": "是常見併發症。steinstrasse(石街)指碎屑在輸尿管堆積成串阻塞,為 ESWL 後典型併發症,大結石後更易發生。"}, "sources": ["AUA/EAU Urolithiasis Guideline (ESWL complications)", "Campbell-Walsh-Wein Urology", "Harrison 21e, Nephrolithiasis"]}}, "111-進階-內科-16": {"quick": "急性脇腹絞痛放射至腹壁/生殖器+噁心嘔吐+肉眼血尿,是輸尿管結石(renal colic)的教科書表現,故(B)。", "detail": {"background": "輸尿管結石造成的腎絞痛(renal/ureteral colic)是典型臨床圖像:結石卡在輸尿管造成阻塞與管壁痙攣牽扯,產生突發、陣發性絞痛(colicky pain),起於患側脇腹/腰背(flank/loin),沿輸尿管走向放射至下腹、腹股溝、同側睪丸/陰唇(referred pain,因輸尿管與生殖器共享 T11–L1 神經支配),病人常坐立難安、輾轉反側(與腹膜炎病人不敢動恰相反),伴噁心、嘔吐(內臟自主神經反射)、肉眼或鏡下血尿(結石刮傷尿路上皮)。輸尿管三處生理狹窄最易卡石:UPJ(腎盂輸尿管交界)、跨越髂血管處、UVJ(輸尿管膀胱交界)。診斷首選 non-contrast CT。鑑別:急性腎盂腎炎(發燒、膿尿、CVA 敲痛)、AAA 破裂(老年、休克)、急性闌尾炎/憩室炎、卵巢扭轉/異位妊娠、睪丸扭轉。其他選項皆不符此急性絞痛+血尿表現。", "options": {"A": "腎臟腫瘤(RCC)典型為『無痛性』肉眼血尿、可觸及腫塊、體重減輕,非急性絞痛,不符。", "B": "正解。輸尿管結石造成 renal colic:急性脇腹絞痛放射至生殖器、噁心嘔吐、肉眼血尿,完全符合題幹。", "C": "前列腺肥大(BPH)表現為排尿困難、頻尿、夜尿等下尿路症狀,非急性絞痛與血尿,不符。", "D": "腎病症候群表現為大量蛋白尿、水腫、低白蛋白血症,無急性絞痛,不符。"}, "sources": ["Harrison 21e, Nephrolithiasis & Urinary Tract Obstruction", "Brenner & Rector's The Kidney 11e", "AUA/EAU Urolithiasis Guideline"]}}, "111-進階-外科-38": {"quick": "輻射至腹股溝/生殖器的轉移痛來自『輸尿管(尤其下段)結石』而非腎盞/腎盂結石;腎實質/腎盂結石痛多在腰脇背部,故(D)錯誤。", "detail": {"background": "尿路結石疼痛的解剖機轉:①疼痛分『腎絞痛型(renal colic)』與『非腎絞痛型』——腎絞痛源於輸尿管被結石阻塞、管壁強力蠕動牽扯而產生的陣發性絞痛;②輸尿管有三處生理狹窄最易卡石:UPJ(腎盂輸尿管交界)、輸尿管跨越髂血管(髂動靜脈)處、UVJ(輸尿管膀胱交界);③疼痛放射(referred pain)與結石位置相關:腎盂/上段輸尿管結石痛多在脇腹/腰背、放射至同側腹部;中段輸尿管(跨髂血管)放射至下腹;『下段輸尿管/UVJ』結石才放射至腹股溝、睪丸/陰唇、甚至引起尿急頻尿(刺激膀胱)。因此『腎盞或腎盂結石的輻射痛會輻射到腹股溝及生殖器』為錯誤——腎盂/腎盞結石(位置高)的痛主要在腰脇,放射至腹股溝/生殖器是『下段輸尿管』結石的特徵。護理上可藉疼痛放射部位粗略推測結石位置。", "options": {"A": "正確。尿路結石疼痛可分腎絞痛型(輸尿管阻塞蠕動牽扯)與非腎絞痛型(如腎盂腎盞結石的鈍痛/腰痛)。", "B": "正確。腎絞痛是輸尿管結石使管壁蠕動受阻、強力收縮牽扯所致的陣發性絞痛。", "C": "正確。輸尿管三處生理狹窄為 UPJ、跨越髂動靜脈處、UVJ,是結石最易卡住的位置。", "D": "錯誤(正解)。放射至腹股溝/生殖器的轉移痛是『下段輸尿管』結石的特徵;腎盞/腎盂結石位置高,痛多在腰脇背部,不會典型放射至腹股溝生殖器。"}, "sources": ["Harrison 21e, Nephrolithiasis", "Campbell-Walsh-Wein Urology", "Brenner & Rector's The Kidney 11e"]}}, "111-進階-外科-74": {"quick": "尿路結石『男性多於女性』(約 2–3:1),故『男女機率一樣』(A)錯誤;與肥胖(BMI↑)、炎熱乾燥氣候、40–60 歲高峰皆正相關。", "detail": {"background": "尿路結石流行病學重點:①性別——傳統上男性發生率高於女性(約 2–3:1,與男性尿酸/草酸代謝、職業脫水等有關),但近年女性比例上升、差距縮小;②BMI/肥胖——與結石風險『正相關』,肥胖與代謝症候群、胰島素阻抗使尿偏酸、尿鈣與尿酸排泄增加,促進草酸鈣與尿酸結石;③氣候/地理——『結石帶(stone belt)』,炎熱乾燥地區因出汗多、尿濃縮、尿量少,盛行率高(台灣南部夏季亦高);④年齡——好發高峰約 30–60 歲(此題給 40–60 歲),男性常在 30–50 歲首發;⑤其他危險因子:水分攝取少、高鈉高動物蛋白飲食、高草酸飲食、家族史、反覆 UTI(struvite)、原發性副甲狀腺亢進(高鈣尿)、痛風(尿酸石)、慢性腹瀉/腸道手術。護理衛教首重『多喝水使尿量>2–2.5 L/day』、調整飲食、控制體重。", "options": {"A": "錯誤(正解)。尿路結石男性發生率高於女性(約 2–3:1),並非男女機率一樣。", "B": "正確。結石發生率與 BMI 呈正相關,肥胖/代謝症候群使尿偏酸、尿鈣與尿酸排泄增加。", "C": "正確。炎熱乾燥地區因脫水、尿濃縮、尿量少,結石盛行率較高(stone belt)。", "D": "正確。約 40–60 歲(廣義 30–60)為結石發生高峰期。"}, "sources": ["Harrison 21e, Nephrolithiasis (epidemiology)", "Brenner & Rector's The Kidney 11e", "AUA/EAU Urolithiasis Guideline"]}}, "112-進階-兒科-65": {"quick": "新生兒腎上端不均質實質腫瘤+黃疸快速上升,須優先以 CBC 評估(排除溶血/感染、腫瘤侵犯骨髓);CBC 為侵入性最低、最即時的第一線檢查,故(B)。", "detail": {"background": "本題為新生兒腎上極(suprarenal/上端)不均質實質腫塊,合併快速上升的黃疸(bilirubin 17 mg/dL)與呼吸偏快。新生兒『腎上極/腎上腺區』的實質腫瘤鑑別含:congenital mesoblastic nephroma(新生兒最常見的腎臟實質腫瘤)、neuroblastoma(源自腎上腺/交感神經節,新生兒可表現腹部腫塊、可能轉移肝/骨髓、產兒茶酚胺代謝物 VMA/HVA)、新生兒腎上腺出血(adrenal hemorrhage,可致黃疸上升因血腫吸收+紅血球破壞)等。題目問『最適當的第一個診斷工具』——在尚未確立腫瘤性質、且病嬰已有快速黃疸與呼吸異常時,先做最快速、非侵入性的 CBC 評估:看貧血(出血/溶血)、血小板、白血球與是否有 blast/骨髓侵犯,並輔助判讀黃疸成因。VMA(A)雖對 neuroblastoma 有意義但屬針對性檢查、非『第一線通用』;IVP(C)為含顯影劑侵入性影像且新生兒少用;biopsy(D)為侵入性、非第一步。故先以 CBC 作初步且安全的全面評估。", "options": {"A": "urine VMA 是 neuroblastoma 的特異性檢查(兒茶酚胺代謝物),但屬針對性、非新生兒急性評估的『第一個』通用工具。", "B": "正解。CBC 為非侵入、即時的第一線檢查,可評估貧血/出血/溶血(解釋快速黃疸)、血小板、白血球與骨髓侵犯,適合作為初步診斷工具。", "C": "IVP(靜脈腎盂攝影)需顯影劑、屬侵入性且新生兒少用,非首選第一步。", "D": "renal/tissue biopsy 為侵入性確診手段,須在初步評估與影像後才考慮,不會作為『第一個』診斷工具。"}, "sources": ["Nelson Textbook of Pediatrics (neonatal abdominal/renal masses, neuroblastoma)", "Harrison 21e", "兒科腫瘤評估原則"]}}, "112-進階-兒科-67": {"quick": "偵測腎實質局部發炎(急性腎盂腎炎)與腎結痂(renal scar)的最佳工具是核醫 Tc-99m DMSA 腎臟掃描,故(D)。", "detail": {"background": "兒童泌尿道感染(UTI)與膀胱輸尿管逆流(VUR)的影像評估各有分工:①Renal ultrasound(腎超音波)——第一線、無輻射,看腎大小、積水、結構異常,但對偵測腎實質局部發炎/結痂敏感度不足;②VCUG(膀胱尿道攝影)——診斷『膀胱輸尿管逆流(VUR)』的標準工具,看逆流分級與後尿道,但不評估腎實質發炎/疤痕;③CT——可見腎盂腎炎但有輻射,非兒童首選;④『Tc-99m DMSA 腎臟掃描(核醫)』——DMSA(dimercaptosuccinic acid)被腎近曲小管攝取,正常皮質均勻顯影;急性腎盂腎炎時發炎區攝取『缺損(photopenic defect)』,慢性則顯示『腎結痂(renal scar)』,因此 DMSA 是偵測『腎實質局部發炎與腎皮質結痂』的最敏感、最佳工具,也用於評估 UTI 後是否留下永久腎損傷。臨床上 UTI 兒童急性期 DMSA 可確認上泌尿道侵犯(腎盂腎炎),數月後追蹤 DMSA 可確認結痂。", "options": {"A": "腎超音波無輻射、為第一線結構評估(積水/結構異常),但對腎實質局部發炎與結痂的敏感度不足,非最佳。", "B": "VCUG 是診斷膀胱輸尿管逆流(VUR)的標準,但不用於評估腎實質發炎或腎結痂。", "C": "腎 CT 可顯示腎盂腎炎但有輻射、非兒童首選,且偵測皮質結痂不如 DMSA。", "D": "正解。Tc-99m DMSA 腎掃描由近曲小管攝取,急性發炎呈攝取缺損、慢性呈腎結痂,是偵測腎實質局部發炎與腎皮質結痂的最佳工具。"}, "sources": ["Nelson Textbook of Pediatrics (UTI, VUR imaging)", "AAP UTI Guideline", "核醫 DMSA renal scan 臨床應用"]}}, "112-進階-婦產科-37": {"quick": "重度子宮脫垂壓迫雙側輸尿管造成阻塞性腎病變(雙側腎水腫+BUN/Cr↑、意識不清);第一步應『解除阻塞』——放置 pessary 子宮托復位脫垂、解除輸尿管壓迫,故(D)。", "detail": {"background": "本題為 stage IV 子宮脫垂(重度,子宮完全脫出)壓迫/扭曲雙側輸尿管(脫垂的子宮頸與膀胱底牽扯使輸尿管下段受壓),造成『postrenal(阻塞性)acute kidney injury』:雙側腎水腫(hydronephrosis)、BUN 92/Cr 3.2 大幅上升、尿毒導致意識不清。阻塞性腎病變的處置原則是『先解除阻塞』,腎功能多可回復。對子宮脫垂壓迫所致者,放置『子宮托(pessary)』可立即將脫垂的子宮復位、解除對輸尿管的牽扯壓迫,使腎水腫與腎功能改善——是最快速、低侵入且對 80 歲、急性意識不清病人最適當的處置。手術(uterosacral ligament suspension、sacrocolpopexy)對急性腎衰竭、高齡且意識不清的病人風險過高,非當下首選;血液透析僅在阻塞解除後仍有危及生命的尿毒/高鉀/酸中毒/容積過載時才需要,並非優先處理『可逆性阻塞』的第一步。護理:放置 pessary 後監測尿量(解除阻塞後可能 post-obstructive diuresis 大量利尿、須補液與監測電解質)、腎功能與意識回復。", "options": {"A": "血液透析非第一步。阻塞性腎病變應先解除阻塞使腎功能回復;透析僅在阻塞解除後仍有危及生命之尿毒/高鉀/酸中毒/容積過載時才需要。", "B": "子宮薦韌帶懸吊手術為脫垂的根治性手術,但對 80 歲、急性意識不清、急性腎衰竭病人麻醉與手術風險過高,非當下處置。", "C": "薦骨陰道固定術(sacrocolpopexy)同為脫垂手術,屬擇期根治手術,不適合急性意識不清、腎衰竭的當下處理。", "D": "正解。放置 pessary(子宮托)可立即復位脫垂子宮、解除對輸尿管的壓迫,改善雙側腎水腫與阻塞性腎衰竭,為最快速適當的處置。"}, "sources": ["Harrison 21e, Urinary Tract Obstruction (postrenal AKI)", "Brenner & Rector's The Kidney 11e", "Williams Gynecology (pelvic organ prolapse, pessary)"]}}, "113-進階-外科-33": {"quick": "高劑量維他命 D 過量(致高鈣尿)會增加結石,但『維他命 A』過量並非結石危險因子;故『高劑量維他命 A 或 D 攝取增加結石』(D)的『維他命 A』部分錯誤。", "detail": {"background": "泌尿道結石診斷與危險因子整理:①影像——超音波(無輻射、第一線、看積水與較大結石)與『無顯影劑電腦斷層(non-contrast CT)』為診斷利器,CT 是 gold standard,其敏感度與特異度均高於超音波,能偵測幾乎所有成分結石(含 radiolucent 尿酸結石);②好發年齡約 30–50(廣義 30–60)歲;③維他命與結石——『維他命 D 過量』會增加腸鈣吸收、升高尿鈣(hypercalciuria)而促進含鈣結石;『維他命 C(ascorbic acid)大量補充』在體內代謝為草酸,可增加尿草酸、促進草酸鈣結石;而『維他命 A』過量主要造成肝毒性、顱內壓升高、骨骼/皮膚問題,並非腎結石的危險因子(維他命 A『缺乏』反而與某些上皮化生/結石形成理論有關)。因此本題把『維他命 A』與 D 並列為增加結石的因子是錯誤——應為維他命 D(或維他命 C),而非維他命 A。其他危險因子:水分不足、高鈉高蛋白高草酸飲食、肥胖、副甲狀腺亢進、痛風、反覆 UTI。", "options": {"A": "正確。超音波與無顯影劑 CT 都是診斷結石的利器(超音波無輻射為第一線、CT 為 gold standard)。", "B": "正確。結石好發於約 30–50 歲。", "C": "正確。無顯影劑 CT 偵測結石的敏感度高於超音波,能偵測幾乎所有結石含 radiolucent 尿酸結石。", "D": "錯誤(正解)。高劑量『維他命 D』過量會升高尿鈣促進含鈣結石,但『維他命 A』過量並非結石危險因子(其過量為肝毒性/顱壓上升),故此敘述把維他命 A 列為結石因子有誤。"}, "sources": ["Harrison 21e, Nephrolithiasis (risk factors)", "Brenner & Rector's The Kidney 11e", "AUA Medical Management of Kidney Stones Guideline"]}}, "114-進階-兒科-80": {"quick": "3 歲、單側平滑不易移動、不跨中線的腎內實質腫塊+輕微血尿、AFP 不升,為威爾姆氏腫瘤(Wilms tumor/nephroblastoma),故(B)。", "detail": {"background": "Wilms tumor(腎母細胞瘤,nephroblastoma)是兒童最常見的腎臟惡性腫瘤,好發 2–5 歲(高峰約 3–4 歲),典型表現為『無症狀、單側、平滑、邊界清楚、不易移動且通常不跨越中線』的腹部/腰腹腫塊,常由家長換尿布或洗澡時偶然摸到;可伴血尿(顯微或肉眼)、高血壓(腫瘤分泌 renin)、輕微腹痛或低燒。影像(超音波/CT)顯示源自腎實質、邊界清楚的實質腫塊。相關症候群:WAGR、Denys-Drash、Beckwith-Wiedemann(WT1 基因)。關鍵鑑別:①neuroblastoma(神經母細胞瘤)——源自腎上腺/交感神經節,腫塊常『跨越中線、不規則、鈣化』,VMA/HVA 升高,可伴眼眶瘀斑、舞蹈眼陣攣;②hepatoblastoma——源自肝臟、右上腹腫塊,『AFP 明顯升高』(本題 AFP 未升高即不支持);③腎盂腫瘤(尿路上皮癌)在兒童極罕見。本題各項特徵(腎內實質、不跨中線、AFP 正常、血尿、好發年齡)皆指向 Wilms tumor。處置:影像分期後手術(腎切除)+化療±放療,預後佳。護理重點:『避免用力觸診腹部腫塊』以免腫瘤破裂播散。", "options": {"A": "neuroblastoma 源自腎上腺/交感神經,腫塊常『跨越中線、不規則、有鈣化』,VMA/HVA 升高;本題腫瘤位腎內、不跨中線,不符。", "B": "正解。Wilms tumor 為 2–5 歲最常見腎惡性腫瘤,單側、平滑、邊界清楚、不跨中線的腎實質腫塊,可伴血尿、AFP 正常,完全符合題幹。", "C": "hepatoblastoma 源自肝臟、AFP 明顯升高;本題 AFP 未升高且腫瘤位於右腎,不符。", "D": "腎盂腫瘤(尿路上皮癌)為成人疾病、兒童極罕見,不符 3 歲病童表現。"}, "sources": ["Nelson Textbook of Pediatrics (Wilms tumor / neuroblastoma)", "Harrison 21e, Renal tumors", "兒童腎臟腫瘤鑑別診斷"]}}}, L={"腎絲球疾病(腎炎/腎病症候群)": {"title": "腎絲球疾病(腎炎 vs 腎病症候群)", "html": "<p><b>核心概念：</b>腎絲球疾病可分為兩大臨床型——「腎炎型(nephritic)」以血尿、紅血球柱、高血壓、輕中度蛋白尿、腎功能下降為主；「腎病型(nephrotic)」以大量蛋白尿、低白蛋白、水腫、高血脂為主。考題反覆考的是『水腫機轉』『低血容性休克處置』『PSGN 與腎病症候群的鑑別與照護』，務必掌握兩型的差異與危急處置。</p><ul><li><b>腎病症候群四聯徵：</b>大量蛋白尿(兒童尿蛋白 3~4+、成人 &gt;3.5 g/24hr)＋低白蛋白(&lt;3 g/dL)＋全身水腫＋高血脂(膽固醇、三酸甘油酯升高)。腎功能(Cr)常正常、無高尿糖。兒童最常見為微小變化型(MCD)，『血尿不是診斷標準』(若顯著血尿要懷疑非 MCD)。</li><li><b>水腫機轉(常考)：</b>大量蛋白尿→低白蛋白→血漿膠體滲透壓下降→水分外漏到組織間隙。故水腫代表『血管內容積不足(減少)』而非增加——切勿答成血管內容積增加。</li><li><b>低血容性休克(高頻急症題)：</b>腎病症候群病童腹痛、盜汗、脈搏微弱、血壓下降(如 60/40)、心臟變小、Hb/Hct 因血液濃縮而升高(Hct 可達 60%)→低血容性休克。確認靠 CBC/血比容(血濃縮)。首選處置是『輸注 25% 白蛋白』回填血管內容積，不可先給利尿劑(會加重低血容)。</li><li><b>白蛋白的兩面性：</b>低血容(腎病型、休克)時要給白蛋白；但若病人已『容積過載』(腎炎型：水腫、高血壓、心臟擴大)再輸白蛋白會把間質液拉回血管，使血壓更高，此時白蛋白為禁忌。</li><li><b>感染風險與抗生素：</b>腎病症候群病童因 IgG 與補體 factor B 隨尿流失，易感莢膜菌→自發性腹膜炎、蜂窩組織炎。抗生素須涵蓋『肺炎鏈球菌(Streptococcus pneumoniae)＋革蘭氏陰性腸內菌』。</li><li><b>類固醇與生長/疫苗：</b>長期/反覆用 corticosteroid 會抑制兒童生長，停藥後常可追趕→先續觀察身高即可。免疫抑制中(prednisolone＋cyclosporin)只能打不活化疫苗(如流感疫苗)，禁活性減毒疫苗。利尿劑(排鉀)使用時衛教補充富鉀食物(香蕉、番茄)防低血鉀。</li><li><b>膜性腎病變(membranous)：</b>高凝狀態，突發單側腰痛＋血尿＋大量蛋白尿要優先懷疑『腎靜脈栓塞(renal vein thrombosis)』。</li><li><b>膜增生性腎炎(MPGN)＋冷凝球蛋白：</b>最常見肝炎病因為『C 型肝炎(HCV)』。</li><li><b>急性鏈球菌感染後腎絲球腎炎(PSGN，最高頻)：</b>前驅咽喉炎/皮膚感染後 1~2 週出現茶色尿、少尿、水腫、體重增加、高血壓，尿檢 dysmorphic RBC、RBC cast、蛋白尿；血清『C3 下降(最具支持性)』、ASLO 升高、白蛋白多正常。診斷靠臨床＋血清學，『腎切片最不需要』(僅不典型/不癒才做)。</li><li><b>PSGN 治療與照護：</b>支持性為主，重點是『限制鹽分、控制容積過載與高血壓』(利尿劑＋降壓藥如 CCB/nifedipine 常為必要)。Penicillin 雖清除殘存鏈球菌但『無法治療已發生的腎炎』，並非治腎炎必要。預後佳、多自限。</li><li><b>RBC cast(紅血球柱)：</b>是腎絲球源性血尿的標誌，幾乎專一指向腎絲球腎炎。</li><li><b>糖尿病腎病變(常考分期與護腎藥)：</b>以 urine ACR 分期——正常 &lt;30、microalbuminuria 30~300、macroalbuminuria &gt;300 mg/g。單次 ACR 落在 microalbuminuria 邊緣應 3~6 個月內『再驗確認持續性』(3 次中 2 次陽性)才診斷。護腎首選『ACEi 或 ARB』(降腎絲球內壓、減蛋白尿)；合併蛋白尿/CKD 者『SGLT2 抑制劑』兼具護腎與降心血管事件。起始 ACEi/ARB 後血鉀輕升至 5.3 mEq/L 不需立即停藥。CKD 合併蛋白尿應限蛋白(約 0.6~0.8 g/kg/day)，非高蛋白。</li><li><b>其他鑑別：</b>Henoch-Schönlein purpura(IgA vasculitis)為 small vessel vasculitis、好發 4~6 歲，四聯徵=可觸性紫斑＋關節炎＋腹痛＋腎炎。年輕女性蛋白尿＋血球低下＋低 C3/C4＋對稱小關節痛=SLE(lupus nephritis)，anti-dsDNA 與疾病活性正相關。無症狀兒童尿篩首次異常→先『重複常規尿檢』確認，勿貿然切片。</li></ul>"}, "慢性腎臟病/尿毒症/腎性貧血/CKD-MBD": {"title": "慢性腎臟病、尿毒症、腎性貧血與 CKD-MBD", "html": "<p><b>核心概念：</b>慢性腎臟病(CKD)依 eGFR 分 5 期，併發症隨期別累積：貧血(EPO 不足)、礦物質骨病變(CKD-MBD：低鈣高磷、續發性副甲狀腺亢進)、尿毒症(出血傾向、腦病變)。考題重點在『eGFR 分期換算』『腎性貧血為正球性正色素』『低鈣與 Chvostek's sign』『尿毒症血小板功能障礙』。</p><ul><li><b>eGFR 分期(高頻換算)：</b>G1 ≥90、G2 60~89、G3 30~59、G4 15~29、G5 &lt;15(或透析)。例：eGFR 43 →第 3 期。第 2 期『通常無症狀』，靠檢驗/尿蛋白發現。</li><li><b>腎性貧血(常考型態)：</b>主因 EPO 分泌不足，型態為『正球性正色素(normocytic normochromic)』——『小球性貧血最不可能』。其他原因：缺鐵、慢性發炎、失血、葉酸/B12 不足；『維他命 B6 缺乏不是常見原因』。兒童 CKD 貧血照護重點之一是補充鐵質與葉酸。</li><li><b>CKD-MBD 與續發性副甲狀腺亢進：</b>腎排磷↓→高磷＋活性維生素 D↓→低血鈣→PTH 代償升高(iPTH 升高，如 420 pg/mL)。長期透析＋高 PTH＋低鈣＋高磷=secondary hyperparathyroidism，會致腎性骨病變、搔癢、貧血惡化。</li><li><b>低血鈣的神經肌肉徵象(高頻)：</b>須先用白蛋白校正鈣(白蛋白每低 1 g/dL，校正鈣＋0.8)。校正後低血鈣→神經肌肉激惹→Chvostek's sign(+)、Trousseau's sign、肌肉抽搐。副甲狀腺切除術後出現 Chvostek's sign 提示 hungry bone syndrome 之急性低血鈣→靜脈注射 calcium gluconate。</li><li><b>副甲狀腺手術觀念：</b>初次副甲狀腺切除『不需』必做影像定位(通常四腺探查)；常做全切除併自體移植。</li><li><b>尿毒症出血傾向(常考)：</b>機轉是『血小板功能障礙』(尿毒毒素抑制 vWF-GPIb 黏附)，反映在『bleeding time 延長』；PT/aPTT/TT 多正常。評估尿毒病人出血傾向最可靠檢查為 bleeding time。</li><li><b>尿毒症與腦病變：</b>尿毒性腦病變(uremic encephalopathy)通常到第 5 期(末期)才出現，eGFR 約 20 的第 4 期較不會。</li><li><b>腎衰竭用藥/輸液陷阱：</b>腎功能不良併急性肺水腫第一線為 LMNOP(利尿、嗎啡、硝酸鹽、氧氣、體位)；『nitroprusside 在腎衰會蓄積 thiocyanate/氰化物中毒』最不適當。</li><li><b>慢性低血鈉矯正：</b>嚴重低血鈉若屬慢性(有長期頭暈/失智)，須『緩慢矯正(&lt;8~10 mEq/L/24hr)』以防滲透性脫髓鞘；不可用 3% NaCl 快速衝高。</li><li><b>急性間質性腎炎易混淆：</b>最常見原因是『藥物過敏』而非脫水(老年腎照護題常考此陷阱)。</li></ul>"}, "急性腎損傷(AKI)": {"title": "急性腎損傷(AKI)：分類、分期與橫紋肌溶解", "html": "<p><b>核心概念：</b>AKI 依病因分『腎前性(灌注不足)、腎內性(腎實質受損如 ATN)、腎後性(尿路阻塞)』三類；分期用 KDIGO 看血清肌酸酐與尿量。考題最常考：腎前性 vs 腎內性的尿液指標鑑別(FENa)、橫紋肌溶解、溶血性尿毒症候群(HUS)、首要處置是恢復灌注。</p><ul><li><b>三大分類(高頻)：</b>腎前性=腎血流灌注不足(脫水、出血、休克、發燒＋低血壓、心輸出下降)；腎內性=腎實質病變(ATN、急性腎絲球腎炎、急性間質性腎炎、橫紋肌溶解、顯影劑、NSAID)；腎後性=尿路阻塞(輸尿管阻塞、攝護腺、術中綁到輸尿管、血塊)。兒童最常見腎前性原因是『脫水/容積耗竭』。</li><li><b>腎前性 vs ATN 的尿液鑑別(必考)：</b>腎前性——腎小管努力保鈉→『FENa &lt;1%』、尿鈉 &lt;20、尿滲透壓 &gt;500、BUN/Cr &gt;20、FEUrea &lt;35%。ATN(含顯影劑致腎損)——『FENa &gt;1%』、尿鈉高、尿滲透壓低。FENa &gt;1% 不符腎前性。</li><li><b>KDIGO 分期(常考算題)：</b>第 1 期 Cr 升 1.5~1.9 倍或升 ≥0.3 mg/dL，或尿量 &lt;0.5 mL/kg/hr 持續 6~12hr(例 Cr 1.2→1.6 符合)；第 3 期 Cr 升 ≥3 倍或 ≥4.0、或無尿 ≥12hr、或尿量 &lt;0.3 mL/kg/hr ≥24hr。</li><li><b>橫紋肌溶解症(超高頻)：</b>劇烈運動(青蛙跳、馬拉松)後肌肉痠痛＋『可樂色/茶色尿＋尿潛血陽性但顯微鏡無紅血球(myoglobinuria)』＋Cr 升。確診靠『creatine kinase / CPK 顯著升高』。傷的是『腎小管(色素性 ATN)』而非腎絲球。典型併『高血鉀、高血磷、低血鈣』。處置首要『大量靜脈輸液』沖洗 myoglobin、維持尿量；禁 NSAID。</li><li><b>溶血性尿毒症候群(HUS)：</b>兒童發燒＋血便後出現微血管病性溶血(破碎紅血球、Coombs 陰性)＋血小板下降＋急性腎衰→大腸桿菌(STEC, O157)引起的 HUS。</li><li><b>AKI 電解質/酸鹼方向(常考反向陷阱)：</b>因排泄下降，典型為『高血鉀、高血磷、低血鈣、代謝性酸中毒』——勿答成低鉀低磷高鈣。</li><li><b>磷酸鹽腎病變：</b>糖尿病/CKD 病人大腸鏡清腸用含磷瀉劑(Fleet Phospho-soda)後 Cr 急升=phosphate nephropathy。</li><li><b>首要處置與危險因子：</b>低血容性休克致 AKI 最緊迫優先是『恢復有效循環血容量』(等張輸液)，而非利尿劑/腎切片。術後 AKI 危險因子含糖尿病、既有腎功能不全、高齡、心臟/主動脈手術；術中 MAP 55 mmHg 即使短時間仍有 AKI 風險(『MAP 55 持續 &lt;5 分鐘不會引起 AKI』為錯)。BMI 24 正常體位不是危險因子。</li><li><b>兒童 AKI 與飲食：</b>不應積極補 NaHCO3 把 HCO3 拉到 20~26(過度鹼化致鈉/容積負荷、低血鈣)。AKI 飲食要限磷、限鉀、限鈉，點心可選低蛋白低鉀低磷的藕粉、米苔目。</li></ul>"}, "水分電解質異常": {"title": "水分電解質異常：鈉鉀鈣鎂與尿崩症/SIADH", "html": "<p><b>核心概念：</b>本主題環繞鈉(低/高血鈉)、鉀、鈣、鎂異常與多尿症的鑑別。最高頻是『SIADH(等容性低鈉)vs 低容性低鈉』『尿崩症的高血鈉＋稀尿』『低血鎂導致頑固低鈣低鉀』『假性低血鈉』與『鎂中毒徵象』。</p><ul><li><b>SIADH(高頻)：</b>屬『等容性(euvolemic)低血鈉』，ADH 不當分泌→尿濃縮不當偏高(尿 osm &gt;100)、尿鈉 &gt;30，常見於腦中風、腦傷、肺病、惡性腫瘤。臨床無水腫、皮膚濕潤、甲狀腺與腎上腺功能正常。『首要治療＝限制水分』；嚴重症狀(抽搐)才用 3% 高張鹽水。SIADH 不是低容性低鈉的原因。</li><li><b>低容性低血鈉病因：</b>失血、腹瀉嘔吐、利尿劑、醛固酮缺乏(SIADH 不屬於)。</li><li><b>尿崩症(DI，高頻)：</b>核心=多尿(尿量 &gt;2~3 L/day)＋無法濃縮尿。實驗室『高血鈉(如 150~152)＋高血漿滲透壓(&gt;300)但尿稀釋(尿 osm 低如 107~250、SG 1.004~1.005)』。中樞性=ADH 缺乏(腦傷後)、給 DDAVP/vasopressin 有效；腎因性=腎臟對 ADH 無反應、給 vasopressin 無效。補液須緩慢以防血鈉驟降致腦水腫/抽搐。</li><li><b>多尿症鑑別：</b>水利尿(尿 osm 低)見於 DI、原發性多飲；溶質(滲透)性利尿(尿 osm 偏高如 400)見於高血糖、高鈣。高血鈣可致腎因性尿崩→多尿(多尿定義為尿量 &gt;3 L/day 而非次數)。</li><li><b>低血鎂(常考連鎖)：</b>酗酒、腹瀉、aminoglycoside、高血鈣可致低血鎂；低血鎂會同時造成『頑固性低血鈣＋低血鉀』，故難治性低鈣低鉀應查血鎂。腎衰竭因排鎂下降反致『高』血鎂(不是低鎂原因)。</li><li><b>鎂中毒(常考治療併發症)：</b>妊娠高血壓/子癇前症用硫酸鎂時，若出現『深部肌腱反射消失＋PR 延長、QRS 變寬＋腎功能差』為高血鎂中毒(血鎂約 8.4~12.4 mg/dL)，須停藥並備 calcium gluconate 拮抗。</li><li><b>低血鈣 vs 高血鈣病因：</b>低血鈣常見於副甲狀腺低下、低血鎂、腎衰竭；『惡性腫瘤典型造成高血鈣』(PTHrP/溶骨)非低鈣。</li><li><b>假性低血鈉：</b>血鈉低但『血漿滲透壓正常(如 280)』，見於高血脂、高蛋白血症(脂質/蛋白占據血漿水相)；高血糖則造成稀釋性(轉移性)低鈉。</li><li><b>低血鉀與胰島素(危急題)：</b>DKA/重症併低血鉀(K 2.6)時，若 K &lt;3.3 先給胰島素會使鉀更低致心律不整——應先補鉀與輸液再給胰島素。</li><li><b>水中毒：</b>精神科病人過度飲水主要監測『低血鈉』(非低血鉀)。</li><li><b>輸液選擇：</b>術後低血容性休克(心跳快、低血壓、口乾少尿)首選等張晶體液 0.9% 生理食鹽水快速擴容；脫水高血鈉老人也以等張 NS 緩慢補容積。</li><li><b>惡性高血鈣治療：</b>NS 補液促鈣排出＋bisphosphonate/calcitonin；『thiazide 會保鈣』反加重高鈣(故非治療、為錯誤敘述)。</li><li><b>小兒急性腹瀉：</b>首要補等張電解質液並『早期重新餵食』；『禁食 12 小時後從稀釋奶開始』為過時錯誤做法。</li></ul>"}, "酸鹼平衡異常": {"title": "酸鹼平衡異常：代謝性酸中毒與陰離子間隙", "html": "<p><b>核心概念：</b>判讀 ABG 先看 pH、再看 HCO3 與 PaCO2，代謝性酸中毒的關鍵在『陰離子間隙(anion gap, AG)』的高低，用以鑑別病因。考題集中於高 AG 代謝性酸中毒的常見原因(乳酸、DKA、尿毒)與正常 AG 的鑑別(RTA、腹瀉)。</p><ul><li><b>代謝性酸中毒判讀：</b>pH 下降＋HCO3 下降，並有呼吸代償使 PaCO2 下降(如 pH 7.31、HCO3 17、PaCO2 34)。</li><li><b>陰離子間隙(AG=Na−Cl−HCO3，正常約 8~12)：</b>AG 升高(如 20)代表有不可測陰離子堆積(有機酸)。</li><li><b>高 AG 代謝性酸中毒常見原因(必考)：</b>乳酸酸中毒(lactic acidosis)、糖尿病酮酸血症(DKA)、尿毒症(uremia)、中毒(甲醇/乙二醇/水楊酸)。pH 7.2＋HCO3 14＋AG 20 即典型高 AG 代謝性酸中毒；『過度換氣症候群是呼吸性鹼中毒，最不可能』。</li><li><b>敗血症與乳酸(高頻)：</b>敗血症組織灌流不足→無氧代謝產生乳酸→lactic acidosis；其代謝性酸中毒與『乳酸(lactic acid)』指數最相關，乳酸值也是敗血症嚴重度與復甦目標。</li><li><b>正常 AG 代謝性酸中毒(易混淆陷阱)：</b>腎小管酸血症(RTA)與腹瀉屬『正常 AG(高血氯)』酸中毒——RTA『不是』高 AG 的原因。」</li></ul>"}, "透析與腎臟移植": {"title": "透析(HD/PD)與腎臟移植照護", "html": "<p><b>核心概念：</b>本主題涵蓋血液透析(HD)、腹膜透析(PD)與腎移植三大塊。考題高頻在『透析不平衡症候群』『PD 腹膜炎(致病菌與診斷標準、腹腔內給藥)』『活體捐贈與受贈禁忌』『移植術後早期併發症與感染時序』『免疫抑制劑分類』『HD 病人限鉀與術前評估』。</p><ul><li><b>透析不平衡症候群(必考)：</b>嚴重尿毒(BUN 高如 182~202)『初次透析』時，溶質被快速移除致血漿滲透壓驟降、水分移入腦細胞→腦水腫、意識混亂、嘔吐、抽搐。預防＝『縮短初次透析時間、低效率慢速、用小透析器』；『延長透析時間』是錯誤做法。</li><li><b>PD 腹膜炎(高頻)：</b>診斷標準＝透析液 WBC &gt;100/mm³ 且『&gt;50% 為多形核中性球(PMN/neutrophil)』(非單核球)。最常見致病菌為皮膚來源的 Gram(+)球菌——coagulase-negative staphylococci(表皮葡萄球菌)。處置：『腹腔內(intraperitoneal)』給經驗性抗生素，療程約 2~3 週，難治需移除導管。</li><li><b>PD 常見問題與電解質：</b>最常見併發症為『蛋白質流失』(透析液每日丟蛋白/胺基酸)，故須提高蛋白攝取。PD 相較 HD 較常出現『低血鉀』(透析液不含鉀＋葡萄糖驅鉀入細胞)。</li><li><b>HD 病人營養與術前：</b>長期 HD 須『限鉀』(不補 potassium，高鉀致命)，反而補鈣磷結合劑與水溶性維生素(B 群、葉酸)。術前須矯正『高血鉀』(非低鉀)；長期服 imipramine(TCA)會增心律不整風險。HD 後身體水分電解質達平衡約需『6 小時』，故透析與常規手術至少間隔約 6 小時(利 heparin 代謝)。</li><li><b>活體腎臟捐贈條件/禁忌：</b>可捐者如 70 歲、GFR 75 且無共病(BMI &gt;20 屬正常非禁忌)；禁忌為糖尿病、難控高血壓、BMI &gt;40、顯著白蛋白尿、活動性惡性腫瘤、嚴重精神病、感染性結石。『ABO 血型不合非絕對禁忌』(可做 ABO-incompatible 減敏移植)。活體移植仍須『終身免疫抑制劑』(除同卵雙生)。</li><li><b>受贈禁忌：</b>絕對禁忌＝活動性感染、治療中惡性腫瘤、不可重建的嚴重血管病、無法配合醫囑；『糖尿病腎病是最常見的適應症而非禁忌』；『病態性肥胖』屬相對禁忌(可減重後評估)。</li><li><b>移植術後併發症時序(高頻)：</b>術後第 1~2 天突發尿量驟減＋Cr 急升＋移植區腫痛→『腎動靜脈血栓』(早期血管併發症)。手術併發症為血管(動靜脈狹窄/血栓)與泌尿(漏尿/阻塞)，『淋巴水腫』非手術併發症。感染時序：第 1 個月以手術/院內感染為主(傷口、UTI、導管)，故第一週 CMV 等伺機感染發生率最低(CMV 多在 1~6 個月)。</li><li><b>免疫抑制劑分類(常考)：</b>calcineurin inhibitor(CNI)＝cyclosporine、tacrolimus；『everolimus 是 mTOR 抑制劑，不是 CNI』(此為常見錯誤敘述)。</li><li><b>移植麻醉與灌流：</b>腎移植再灌流時須維持『足夠灌流壓』(MAP 偏高)以保移植腎血流，維持 MAP 僅 60 mmHg 不適當。輸液宜選含氯較低的平衡晶體(LR/Plasmalyte)，大量 0.9% NS 會致高氯性代謝性酸中毒。肝移植術後 AST/ALT 通常 &lt;2000 且 24~48 小時迅速下降為正常。</li></ul>"}, "泌尿道感染與腎盂腎炎": {"title": "泌尿道感染(UTI)與急性腎盂腎炎", "html": "<p><b>核心概念：</b>UTI 分『下泌尿道(膀胱炎)』與『上泌尿道(腎盂腎炎)』。鑑別關鍵在『發燒＋肋脊角(CVA)敲擊痛＝上泌尿道』。本主題題量最大，高頻考點：最常見致病菌 E. coli、無症狀菌尿(ASB)多不治療、孕婦禁 quinolone、CAUTI 預防、敗血性休克處置、VUR 分級、與結石/血尿評估的鑑別。</p><ul><li><b>致病菌(必考)：</b>社區單純性 UTI、孕婦菌尿、兒童 UTI 最常見皆為『大腸桿菌(Escherichia coli)』；年輕性活躍未孕女性第二常見為『Staphylococcus saprophyticus』。院內/導尿管相關 UTI 常見 Enterococci、Candida。鹿角結石(成分磷酸銨鎂/struvite)與產 urease 的『Proteus mirabilis』相關。</li><li><b>上 vs 下泌尿道鑑別(超高頻)：</b>急性腎盂腎炎＝發燒/寒顫＋單側腰腹痛＋『CVA 敲擊痛』＋膿尿＋WBC 升高，可合併低血壓(敗血)；此時診斷成『下泌尿道感染』最不適當。膀胱炎(cystitis)＝頻尿、尿急、解尿痛(dysuria)、尿檢 leukocyte esterase(+)/nitrite(+)/膿尿，但『無發燒、無 CVA 痛』。dysuria 是解尿時疼痛灼熱(非解不出)，男性常主訴陰莖底部/會陰痛。</li><li><b>無症狀菌尿(ASB，高頻)：</b>長期導尿管、脊損、失智老人、控制良好糖尿病、念珠菌尿等『無症狀者不需抗生素』，僅『孕婦』與『泌尿侵入性處置前』才需治療。高齡 ASB『並非皆須抗生素』(IDSA 不治療)；首要是移除/更換不必要導管。</li><li><b>孕婦 UTI/腎盂腎炎：</b>『禁 fluoroquinolone』(影響胎兒軟骨)，安全選 ampicillin/cephalosporin、nitrofurantoin。孕婦急性腎盂腎炎須住院靜脈 β-lactam，不可僅支持療法或 3 天口服。</li><li><b>抗生素要點：</b>nitrofurantoin 抑制細菌 acetyl-CoA 等酵素與核糖體；fluoroquinolone 對攝護腺『穿透性佳』、是攝護腺炎第一線(『穿透不佳』為錯)。SGLT2 抑制劑(canagliflozin)使尿糖增加→最易引發泌尿生殖道感染。</li><li><b>CAUTI 預防：</b>『不應常規定期更換導尿管』(無預防實證、反增菌入)；應減少留置、用無菌密閉系統、儘早移除。</li><li><b>UTI 確診與診斷工具：</b>標準診斷＝尿液分析＋尿液培養；確診金標準為中段尿培養達菌落數(E. coli ≥10⁵ CFU/mL)。多為上行性感染、女性多於男性、病原以細菌為主。</li><li><b>敗血性休克處置(危急題)：</b>UTI 併低血壓＋乳酸 ≥4＋尿少→依 Surviving Sepsis，首小時『快速晶體輸液 30 mL/kg』穩定血壓最優先。</li><li><b>膀胱輸尿管逆流(VUR)分級(常考)：</b>第三級＝逆流至輸尿管＋腎盂、腎盞『輕微』擴張；第四級＝腎盂腎盞『清楚擴張變形』、輸尿管輕微擴張。神經性膀胱(脊柱裂)＋高度 VUR 反覆 UTI→首選『清潔間歇導尿(CIC)』確保排空。評估 UTI 嚴重度(ALN/膿腎/腎膿瘍)用超音波/DMSA/CT，『VCUG 是評估逆流而非感染嚴重度』。腎實質局部發炎與腎結痂的最佳工具是『Tc-99m DMSA 腎掃描』。</li><li><b>結石/腎絞痛鑑別(與感染對比)：</b>突發單側腰背劇痛放射至腹股溝/生殖器＋血尿＋『無發燒、僅 CVA 敲痛』→腎/輸尿管結石(renal colic)；急性腎盂腎炎則『伴發燒寒顫』。疑阻塞性腎病致少尿首選腎臟超音波。結石阻塞合併感染腎水腫(膿腎/urosepsis)須儘速抗生素＋解除阻塞引流，避免盲目大量輸液。</li><li><b>血尿評估(常考定位)：</b>『初(前)段血尿』提示尿道/膀胱頸出口；『終段血尿』提示膀胱頸/三角；『全段血尿』提示上尿路。dysmorphic RBC＝腎絲球源(腎炎)，與 UTI 無關。肉眼血尿之惡性腫瘤『以膀胱(尿路上皮)癌最常見』，非腎細胞癌。CVA 敲擊痛反映腎/後腹腔病灶，『肝膿瘍位前腹右上腹，最不會有 CVA 痛』。</li><li><b>兒童/老年陷阱：</b>兒童 UTI 致病菌為腸內菌科，『A 型鏈球菌非泌尿道病原』。兒童 UTI 治療後『不需常規重複尿培養(test of cure)』。長期臥床留置導尿失智老人發燒，優先想吸入性肺炎/CAUTI/褥瘡軟組織感染，而非腦膜炎。</li></ul>"}, "尿路結石/阻塞/血尿評估": {"title": "尿路結石、阻塞與血尿評估", "html": "<p><b>核心概念：</b>尿路結石以『血尿＋脇腹絞痛(renal colic)放射至腹股溝/生殖器』為典型表現。考點集中於結石成分與影像特性(尿酸結石 X 光透明)、飲食(草酸鈣不可低鈣)、治療選擇(小石用 α-blocker 排石、大鹿角結石用 PCNL)、ESWL 禁忌與併發症、阻塞性腎病的解阻塞處理。</p><ul><li><b>典型表現：</b>尿路結石常合併血尿(hematuria)＋脇腹痛(flank pain)，疼痛為痙攣性絞痛，可放射至腹壁/腹股溝/生殖器、伴噁心嘔吐。轉移至腹股溝/生殖器的牽涉痛來自『輸尿管(尤其下段)結石』而非腎盞/腎盂結石。</li><li><b>結石成分與影像(必考)：</b>最常見成分為草酸鈣(radiopaque，X 光可見)；『尿酸結石為 radiolucent(X 光透明)，KUB 最不易顯影』。鹿角結石(staghorn)成分為磷酸銨鎂(struvite)，與產 urease 菌(Proteus)致鹼性尿相關。</li><li><b>尿酸結石治療：</b>機轉為『酸性尿＋尿酸過飽和』，核心治療是『鹼化尿液(pH 6.5~7，如 potassium citrate)』；『降低尿液 pH 反而促進尿酸結石』(為錯誤/不適當)。</li><li><b>草酸鈣結石飲食(高頻陷阱)：</b>『不可低鈣飲食』——低鈣使腸道游離草酸吸收增加、尿草酸上升反促進結石；應維持正常鈣攝取、限草酸/限鈉/多喝水。</li><li><b>治療選擇(常考)：</b>下段輸尿管小結石(≤0.5~1 cm)可自行排出，最常用『α-blocker tamsulosin』做藥物排石治療(MET)。大型/複雜鹿角結石(如 3.5 cm)首選『經皮穿腎取石術(PCNL)』，ESWL 對如此大結石清石率差、易形成 steinstrasse(石街)。</li><li><b>PCNL 併發症：</b>須穿刺腎實質，最常見『嚴重』併發症為『出血』(可需輸血/栓塞)；結石內藏菌＋灌洗壓力仍可致 urosepsis(『術後沒有敗血症問題』為錯)。</li><li><b>ESWL 禁忌與併發症：</b>禁忌＝『急性感染(絕對禁忌)』、孕婦、未矯正凝血異常、無法定位/碎屑無法排的解剖異常。常見併發症為血尿、腎周圍血腫、steinstrasse；『輸尿管破裂』屬輸尿管鏡(URS)而非 ESWL。『輸尿管結石合併腎積水』是 ESWL 適應症而非禁忌。</li><li><b>阻塞性腎病(常考處置)：</b>重度子宮脫垂可壓迫雙側輸尿管→雙側腎水腫＋BUN/Cr 升＋意識不清，第一步『解除阻塞』(放置 pessary 子宮托復位)。腎結石史＋少尿＋導尿後仍少尿疑阻塞→首選腎臟超音波。</li><li><b>流行病學/危險因子：</b>男性多於女性(約 2~3:1)、好發 40~60 歲、與肥胖(BMI↑)、炎熱乾燥氣候、脫水正相關；高劑量維他命 D 過量(高鈣尿)增加結石，但維他命 A 過量並非結石危險因子。</li></ul>"}, "腎小管間質疾病/RTA/腎毒性與藥理": {"title": "腎小管間質疾病、RTA 與腎毒性藥理", "html": "<p><b>核心概念：</b>本主題串連腎小管功能異常(RTA、低血磷佝僂症)、急性間質性腎炎(AIN)與『腎功能不全病人的用藥安全』。考題大量集中在腎毒性藥物(aminoglycoside、NSAID、cisplatin、顯影劑)的副作用與監測，以及 CKD 病人的止痛劑與降血糖藥選擇。</p><ul><li><b>aminoglycoside 毒性(高頻)：</b>三大毒性＝腎毒性、耳毒性、神經肌肉阻斷。『即使治療劑量仍可耳毒』(不可逆 cochlear/vestibular 損傷，故「一般劑量不會耳毒」為錯)；靜脈炎(phlebitis)最少見；在膿瘍的『低 pH/低氧環境活性降低』(故「仍保良好活性」為錯)。</li><li><b>NSAID 腎毒性(常考護理監測)：</b>ibuprofen/ketorolac 抑制前列腺素→腎血流下降致 AKI，並有腸胃出血風險。護理重點＝監測『BUN/Cr』與『腸胃出血(噁心/嘔吐/吐血)』。『急性腎衰或低血容病人禁用 ketorolac』(ketorolac 非退燒、非 COX-2 選擇性)。</li><li><b>顯影劑腎病變(高頻)：</b>預防靠檢查前後給『等張靜脈輸液(水化)』與使用『等/低滲透壓顯影劑』(風險較低)；Cr 多在 24~48 小時上升、3~5 天達峰。NAC 證據不一、ARB/利尿劑無預防效益甚至有害。</li><li><b>cisplatin：</b>具腎毒性(近端腎小管)，但『洗腎(ESRD)病人仍可使用』(透析可清除，故「洗腎不能用」為錯)，須水化＋鎂補充。</li><li><b>藥物性急性間質性腎炎(AIN)：</b>常見藥物如 β-lactam(amoxicillin)、NSAID、PPI；服藥 1~2 週後腎功能惡化。典型『發燒＋皮疹＋嗜酸球＋白血球尿/膿尿、嗜酸球尿』；『肉眼血尿少見』(多為微觀血尿)。</li><li><b>腎小管酸血症(RTA)/小管漏失：</b>最易引起遠端(type 1)RTA 的免疫疾病是『Sjögren's syndrome』(間質淋巴浸潤、低血鉀)。X-linked 家族性低血磷佝僂症＝低血磷＋高尿磷(TRP↓)＋鹼磷酶升高＋鈣與維生素 D 正常＋家族史(FGF23 過量致腎漏磷)。citrate(鹼化尿)使尿 pH 偏鹼；尿比重 1.001 極稀見於腎濃縮力差/腎絲球腎炎。</li><li><b>CKD 止痛劑選擇(高頻)：</b>腎功能不全中重度疼痛宜選『fentanyl、hydromorphone』(無活性代謝物蓄積)；避免 morphine(M6G 蓄積)、meperidine(normeperidine 致癲癇)。但安寧/重度癌痛仍可謹慎滴定 morphine。CKD 病人術後 morphine 致呼吸抑制＋瞳孔縮小→『naloxone』拮抗。WHO 三階梯：acetaminophen 不足(如 6 分)→加弱鴉片 tramadol(第二階)，避 NSAID。</li><li><b>CKD 降血糖藥調整：</b>GFR 10 時 metformin(乳酸中毒風險)、SGLT2i 禁用，sitagliptin 須減量；『pioglitazone(肝代謝)不需依腎功能調整劑量』。</li><li><b>腎功能評估與骨鬆：</b>『肌酸酐清除率(CrCl)比單一 SCr/BUN 更可靠反映 GFR』(SCr 對輕度腎損不敏感、BUN 受飲食/水合影響)。GFR 26(CKD 3b~4)病人 bisphosphonate 慎用，預防類固醇骨鬆優先補『鈣＋維生素 D』。利尿劑觀念：mannitol 經腎絲球過濾後『不被再吸收』而留管腔產生滲透利尿(故「經腎小管再吸收」為非)。</li><li><b>不需依腎功能減量的抗生素：</b>macrolide(erythromycin)主要經肝代謝膽道排泄，腎衰『不需減量』；aminoglycoside、colistin、TMP-SMX 經腎排泄須減量。</li></ul>"}, "腎臟腫瘤與囊性/遺傳性腎病": {"title": "腎臟腫瘤與囊性/遺傳性腎病", "html": "<p><b>核心概念：</b>兒科腎臟腫瘤以『威爾姆氏腫瘤(Wilms tumor)』為代表，須與其他腹部腫塊鑑別並掌握其臨床特徵與初步評估。</p><ul><li><b>威爾姆氏腫瘤(Wilms tumor / nephroblastoma)：</b>好發約 3 歲幼兒，典型為『單側、平滑、邊界清楚、不易移動、不跨中線』的腎內實質腫塊，可伴輕微血尿、低燒、高血壓；『AFP(甲型胎兒蛋白)不升高』(與肝母細胞瘤鑑別)。影像可見腎內實質性腫塊。</li><li><b>新生兒腎腫瘤初步評估：</b>新生兒腎上端不均質實質腫瘤合併黃疸快速上升，第一線檢查優先選『全血球計數(CBC)』——侵入性最低、最即時，可評估溶血/感染/骨髓侵犯。</li><li><b>鑑別重點：</b>觸診不易移動、不跨中線、AFP 正常支持 Wilms tumor；診斷與分期後續再以影像(超音波/CT)與必要時切片補強，避免過早侵入性檢查。</li></ul>"}};
const TORDER=["腎絲球疾病(腎炎/腎病症候群)", "慢性腎臟病/尿毒症/腎性貧血/CKD-MBD", "急性腎損傷(AKI)", "水分電解質異常", "酸鹼平衡異常", "透析與腎臟移植", "泌尿道感染與腎盂腎炎", "尿路結石/阻塞/血尿評估", "腎小管間質疾病/RTA/腎毒性與藥理", "腎臟腫瘤與囊性/遺傳性腎病"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if((q.answer_status||'').indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if((q.answer_status||'').indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if((q.answer_status||'').indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if((q.answer_status||'').indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 let opts='';
 for(const k of ['A','B','C','D','E']){ if(q.options[k]!==undefined) opts+='<div class="opt"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
ce.addEventListener('click',e=>{if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render); fKw.oninput=render;
expandBtn=$('#expand'); expandBtn.onclick=()=>{expand=!expand;expandBtn.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
