小、可抬頭十秒（提示肌力已恢復）』。瞳孔縮小（pinpoint）＋呼吸抑制＋過度鎮靜是『鴉片過量/蓄積』的典型三徵；在 CKD 病人 morphine 的活性代謝物 M6G（經腎排泄）會蓄積延長呼吸抑制，故元兇是鴉片。對應拮抗劑：①naloxone——鴉片受體拮抗劑，逆轉鴉片所致呼吸抑制與鎮靜，為本題後續若再呼吸抑制的最適處置。②flumazenil——苯二氮平類（benzodiazepine）拮抗劑，本題未用 BZD。③neostigmine——膽鹼酯酶抑制劑，用於逆轉非去極化肌鬆劑，但病人已可抬頭十秒（肌力恢復），且 cisatracurium 殘餘亦非主要問題（且 neostigmine 對 propofol/鴉片無效）。④sugammadex——專一逆轉 rocuronium/vecuronium（aminosteroid 類）肌鬆，對 cisatracurium（benzylisoquinolinium 類）無效。故正確為 A（naloxone）。注意 naloxone 半衰期短於 morphine/M6G，須持續監測或重複給藥/輸注以防再鎮靜。護理重點：監測呼吸/SpO2、意識、瞳孔，備 naloxone 並警覺再次呼吸抑制。", "options": {"A": "對（為答案）。瞳孔縮小＋呼吸抑制＋過度鎮靜為鴉片蓄積（CKD 致 M6G 蓄積），naloxone 為對應拮抗劑。", "B": "錯。flumazenil 拮抗 benzodiazepine，本題未用 BZD。", "C": "錯。neostigmine 逆轉非去極化肌鬆，但病人肌力已恢復（可抬頭十秒），且對鴉片/propofol 無效。", "D": "錯。sugammadex 僅逆轉 rocuronium/vecuronium，對 cisatracurium 無效。"}, "sources": ["Miller's Anesthesia — Opioids and reversal / patients with renal disease", "Harrison 21e Opioid pharmacology", "Brenner & Rector's The Kidney 11e — Opioid metabolite accumulation in CKD"]}}, "111-進階-外科-34": {"quick": "Ketorolac 為非選擇性 NSAID，急性腎衰/低血容病人禁用（致 AKI）；非退燒、非 COX-2 選擇性。", "detail": {"background": "Ketorolac 為強效『非選擇性 NSAID』（同時抑制 COX-1/COX-2），常用於『中重度急性疼痛』的短期止痛（如術後），鎮痛效力可媲美部分鴉片。重點警示：①腎毒性——抑制前列腺素使入球小動脈無法擴張，在『低血容、容積耗竭、原有腎功能不全或心衰』者會使腎血流驟降造成急性腎損傷（AKI），故『急性腎衰竭或低血容積病人應避免使用』正確（C）。②腸胃道出血/潰瘍與血小板功能抑制（增手術出血），是其特別須警惕的副作用。③『療程須短』——一般建議『不超過 5 天』（口服+注射合計），長期使用腎與腸胃風險高，故『不超過一週』雖方向正確但臨床標準更嚴格為 ≤5 天；本題以 C 為正確答案。④非『COX-2 選擇性』（celecoxib 才是）。⑤主要用途是『止痛』而非退燒（雖有解熱作用，但臨床定位為強效止痛劑，非首選退燒藥）。本題問『正確』者為 C。護理重點：用藥前評估容積與腎功能、限制療程、監測 BUN/Cr 與腸胃道出血徵象、避免合併其他腎毒藥。", "options": {"A": "錯。ketorolac 為非選擇性 NSAID（抑制 COX-1/COX-2），非選擇性 COX-2 抑制劑。", "B": "敘述方向合理但非本題答案。臨床建議療程更嚴格為『不超過 5 天』，本題以 C 為正確。", "C": "對（為答案）。急性腎衰竭或低血容積病人使用 ketorolac 會因前列腺素抑制致腎血流驟降而 AKI，應避免。", "D": "錯。ketorolac 主要用途為止痛而非退燒。"}, "sources": ["Harrison 21e NSAIDs / Acute kidney injury", "Brenner & Rector's The Kidney 11e — NSAID-induced AKI（hemodynamic）", "Goodman & Gilman — Ketorolac"]}}, "111-進階-外科-42": {"quick": "everolimus 是 mTOR 抑制劑而非 calcineurin inhibitor(CNI)；CNI 指 cyclosporine/tacrolimus。故 C 錯。", "detail": {"background": "移植免疫抑制劑分類與特性：①『鈣調磷酸酶抑制劑（calcineurin inhibitors, CNI）』——cyclosporine 與 tacrolimus（Tacrolimus®/Prograf），抑制 calcineurin→阻斷 IL-2 轉錄→抑制 T 細胞活化增生；副作用為『腎毒性（需密切監測血中濃度與劑量調整）』、高血壓、高血糖（tacrolimus 致糖尿病）、神經毒性、高血鉀。②『mTOR 抑制劑』——sirolimus（rapamycin）與『everolimus』，抑制 mTOR→阻斷 IL-2 驅動的 T 細胞增生訊號，但機轉與 CNI『不同』（不是 calcineurin 抑制劑）；副作用為傷口癒合不良、口腔潰瘍、高血脂、蛋白尿、肺炎。③『抗代謝藥』——mycophenolic acid/MMF（黴酚酸），抑制嘌呤合成阻斷淋巴球增生，常見『腸胃道副作用（腹瀉、噁心）』與骨髓抑制。④類固醇——廣泛免疫抑制，亦用於『治療急性排斥（高劑量類固醇衝擊）』。本題問錯誤者為 C：everolimus 被誤稱為 CNI，實為 mTOR 抑制劑。護理重點：CNI 與 mTOR 抑制劑均須監測血中藥物濃度（窄治療範圍）、腎功能、血壓、血脂、感染徵象與藥物交互作用（CYP3A4）。", "options": {"A": "對。mycophenolic acid（MMF）常見腸胃道副作用（腹瀉、噁心），須調整或分次給藥。", "B": "對。tacrolimus 為 CNI，具腎毒性，須密切監測血中濃度調整劑量。", "C": "錯（為答案）。everolimus 是 mTOR 抑制劑，非 calcineurin inhibitor；雖同樣抑制 IL-2/T 細胞增生，但機轉與 CNI 不同。", "D": "對。類固醇為常見免疫抑制劑，高劑量可用於治療急性排斥反應。"}, "sources": ["Harrison 21e Transplantation Immunology / Immunosuppressive agents", "Brenner & Rector's The Kidney 11e — Immunosuppression in kidney transplantation"]}}, "111-進階-外科-44": {"quick": "活體腎移植仍須終身使用免疫抑制劑（除同卵雙生）；『不需免疫抑制劑』是錯的好處。", "detail": {"background": "活體（living donor）腎臟移植相較於屍腎（deceased donor）移植的優點：①『可擇期安排手術』——不必在等待名單上長期等待屍腎而被迫先洗腎，可在腎衰前『搶先移植（pre-emptive transplant）』，預後更好。②『冷缺血時間短』——活體腎自取出到植入時間短，較少缺血再灌流傷害，故『移植腎延遲功能（delayed graft function）與急性腎小管壞死（ATN）發生率較低』，術後立即排尿機會高。③『移植腎與病人長期存活率較高』——HLA 配對通常較佳、器官品質好，長期存活優於屍腎。④可進行更完整術前評估與配對。但無論活體或屍腎，『除非是同卵雙生（identical twin）之間』，受贈者『仍須終身服用免疫抑制劑』以防排斥——活體移植並不能免除免疫抑制。故『不需要使用免疫抑制劑』不是活體移植的好處（為本題答案 C）。護理重點：強調終身免疫抑制與遵從性、感染與惡性腫瘤監測、藥物濃度監測、移植腎功能追蹤。", "options": {"A": "是好處。活體可擇期安排，不必苦等屍腎而被迫先洗腎，甚至可搶先移植。", "B": "是好處。活體腎冷缺血時間短，移植後 ATN/延遲功能發生率較低。", "C": "錯（為答案，非好處）。除同卵雙生外，活體腎移植受贈者仍須終身使用免疫抑制劑，並非『不需要』。", "D": "是好處。活體移植因器官品質與配對佳，移植腎與病人長期存活率較高。"}, "sources": ["Harrison 21e Transplantation in the Treatment of Renal Failure（living vs deceased donor）", "Brenner & Rector's The Kidney 11e — Advantages of living donor transplantation"]}}, "112-進階-內科-3": {"quick": "CKD 癌痛重度(8分)宜選 morphine(WHO 第三階、可滴定)；避 ibuprofen(腎毒)、meperidine(normeperidine 致癲癇)。", "detail": {"background": "本題 85 歲頭頸癌、CKD（Cr 2.1）病人，癌症傷口『重度疼痛（8 分）』的止痛選擇，須兼顧 WHO 三階梯與腎功能安全。WHO 止痛階梯：第一階非鴉片（acetaminophen、NSAID）→第二階弱鴉片（codeine、tramadol）→第三階強鴉片（morphine、oxycodone、fentanyl、hydromorphone）。重度癌痛（7–10 分）應直接用『強鴉片（第三階）』。各選項在 CKD 的安全性：①ibuprofen（NSAID）——腎毒、抑制前列腺素致腎血流下降、腸胃出血，CKD 與老年人應避免，且止痛強度不足以對付 8 分癌痛。②meperidine（pethidine）——代謝物 normeperidine 在腎衰蓄積致癲癇、神經毒性，腎病人『禁用』。③acetaminophen——對 8 分重度癌痛強度不足（屬第一階），單用無法緩解。④morphine——強效第三階鴉片，可有效控制重度癌痛、可滴定，是 WHO 對重度癌痛的核心用藥；雖 CKD 病人 M6G 會蓄積須『減量、延長間隔、密切監測呼吸與鎮靜』，但在『安寧/重度癌痛』情境仍是適當選擇（本題答 D）。臨床上 CKD 重度癌痛若擔心 morphine 蓄積，亦可選 fentanyl/hydromorphone，但於本題選項中 morphine 為最適當者。護理重點：滴定劑量、監測呼吸/意識/瞳孔、預防便秘、備 naloxone。", "options": {"A": "錯。ibuprofen 為 NSAID，腎毒並致腸胃出血，CKD/老年應避免，且止痛強度不足以對付 8 分癌痛。", "B": "錯。meperidine 代謝物 normeperidine 在腎衰蓄積致癲癇，腎病人禁用。", "C": "錯。acetaminophen 屬第一階非鴉片，對 8 分重度癌痛強度不足。", "D": "對（為答案）。morphine 為強效第三階鴉片，可有效滴定控制重度癌痛；CKD 須減量、延長間隔並密切監測呼吸。"}, "sources": ["WHO Analgesic Ladder / WHO Cancer Pain Guidelines", "Harrison 21e Palliative Care / Pain Management", "Brenner & Rector's The Kidney 11e — Opioid use in CKD"]}}, "112-進階-內科-69": {"quick": "嚴重尿毒初次透析應『縮短時間、低效率慢速』防不平衡症候群，而非延長時間；故 A 錯。", "detail": {"background": "本題考血液透析併發症與處置。①透析不平衡症候群（DDS）預防——嚴重尿毒病人首次透析時，溶質快速移除致腦水腫，預防策略是『縮短透析時間、降低血流速與效率（小面積透析器）、分次漸進降 BUN』，而非『延長透析時間』；故 A『應延長透析時間』錯誤（為本題答案）。②透析中低血壓（intradialytic hypotension, IDH）——透析超濾移除過多容積、降壓藥作用、心功能不全、進食、感染（敗血症致血管擴張）都可致 IDH，故須『檢視高血壓藥物時機/劑量（透析日延後降壓藥）與是否合併感染』，B 正確。③透析病人『發燒併寒顫』——須警覺『導管相關血流感染』（尤其使用中心靜脈導管者），C 正確，須留菌血培養並評估導管。④導管感染風險『非隧道式導管 > 隧道式導管』——非隧道型（暫時性）導管感染率高於隧道式（含 Dacron cuff、皮下隧道）長期導管，D 正確；故臨床偏好瘻管>移植血管>隧道式導管>非隧道導管。護理重點：初次透析慢而短、監測血壓與容積、發燒寒顫查導管感染、優先建立瘻管減少導管使用。", "options": {"A": "錯（為答案）。嚴重尿毒初次透析應『縮短時間、低效率慢速』以防不平衡症候群，而非延長透析時間。", "B": "對。透析中低血壓須檢視降壓藥時機/劑量與是否合併感染（敗血症性血管擴張）。", "C": "對。透析病人發燒併寒顫須警覺導管相關血流感染，留菌血培養評估導管。", "D": "對。非隧道式（暫時）導管感染風險高於隧道式長期導管。"}, "sources": ["Harrison 21e Dialysis（complications: disequilibrium, hypotension, access infection）", "Brenner & Rector's The Kidney 11e — Complications of hemodialysis / vascular access infection", "KDOQI Vascular Access Guideline 2019"]}}, "112-進階-外科-31": {"quick": "病態性肥胖為腎移植『相對』禁忌(可減重後評估)，非絕對禁忌；絕對禁忌為活動性感染/治療中惡性腫瘤/不可重建之嚴重血管病。", "detail": {"background": "腎移植禁忌分『絕對』與『相對』：【絕對禁忌】①無法控制的活動性感染（免疫抑制會致感染惡化）；②治療中/活動性惡性腫瘤（免疫抑制促癌進展，須達無病期才考慮）；③嚴重不可逆且無法重建的心血管/腦血管/周邊血管病變（無法承受手術與灌流需求）；④嚴重不可逆肺/肝病、預期壽命過短；⑤無法配合終身免疫抑制（嚴重未控精神病、活動性物質濫用、嚴重不遵從）。【相對禁忌】病態性肥胖（morbid obesity）——增加手術與傷口併發症、延遲移植腎功能、術後糖尿病風險，但可透過『減重（含減重手術）後再評估』而移植，故屬『相對』而非絕對禁忌；其他相對禁忌如高齡、可控的 HIV/B 肝/C 肝、復發風險疾病等。本題問『絕對禁忌中何者錯誤』——B 病態性肥胖屬相對禁忌（可矯正後移植），故為答案。護理/評估重點：感染源清除、腫瘤無病期、心血管評估與血管重建可行性、體重管理與營養介入、遵從性與心理社會評估。", "options": {"A": "為絕對禁忌。無法控制的活動性感染下移植與免疫抑制會致命，屬絕對禁忌。", "B": "錯（為答案）。病態性肥胖屬『相對』禁忌，可減重後再評估移植，非絕對禁忌。", "C": "為絕對禁忌。無法重建的嚴重腦/周邊血管病變無法承受手術與灌流，屬絕對禁忌。", "D": "為絕對禁忌。治療中的惡性腫瘤下免疫抑制促癌，須達無病期，屬絕對禁忌。"}, "sources": ["Harrison 21e Transplantation in the Treatment of Renal Failure（contraindications）", "Brenner & Rector's The Kidney 11e — Recipient evaluation: absolute vs relative contraindications", "KDIGO Candidate Evaluation Guideline 2020"]}}, "113-進階-內科-44": {"quick": "藥物性間質性腎炎(AIN)典型：發燒+皮疹+嗜酸球+白血球尿/膿尿，肉眼血尿少見(多為微觀血尿)。", "detail": {"background": "急性間質性腎炎（acute interstitial nephritis, AIN）是『腎間質的過敏/免疫發炎』，最常見原因為『藥物』——β-lactam（如本題 amoxicillin/penicillin 類）、NSAID、PPI（質子幫浦抑制劑）、磺胺類、利福平、利尿劑等，少數為感染或自體免疫（如 Sjögren、結節病、TINU）。機轉為對藥物的遲發性過敏反應（T 細胞媒介），病程多在用藥『數天至數週』後出現。典型臨床三聯徵（雖僅約 10–30% 同時具備）：『發燒、皮疹、嗜酸性白血球增多（eosinophilia）』；伴隨『急性腎功能惡化（Cr 上升）』、無菌性膿尿/白血球尿、『嗜酸性白血球尿（eosinophiluria）』、輕度蛋白尿（NSAID 引起者可達腎病範圍且常無典型過敏徵）；可有噁心、食慾差等尿毒/不適症狀，水腫與寡尿亦可出現。『肉眼血尿（gross hematuria）』在 AIN『少見』——多為鏡下微觀血尿，肉眼血尿較常見於腎絲球腎炎（如 IgA 腎病）、泌尿道結石/腫瘤/感染。故本題問『最不可能出現』者為 D（肉眼可見血尿）。處置：立即停用致病藥物，必要時類固醇；多數停藥後可改善。護理重點：辨識新近用藥史與過敏徵、監測 Cr/尿液（白血球尿、嗜酸球）、停藥與避免再暴露。", "options": {"A": "可能出現。發燒、皮疹、血中嗜酸性白血球增多為 AIN 過敏性三聯徵的典型表現。", "B": "可能出現。AIN 致急性腎功能惡化可有水鈉滯留、水腫，嚴重者呼吸急促。", "C": "可能出現。腎功能惡化的尿毒不適可表現噁心、嘔吐、食慾下降。", "D": "對（為答案，最不可能）。AIN 多為微觀血尿，肉眼血尿少見；肉眼血尿較常見於腎絲球腎炎/結石/腫瘤。"}, "sources": ["Harrison 21e Tubulointerstitial Diseases of the Kidney（Acute Interstitial Nephritis）", "Brenner & Rector's The Kidney 11e — Acute Interstitial Nephritis", "KDIGO AKI considerations"]}}, "113-進階-內科-56": {"quick": "PD 腹膜炎透析液 WBC>100/mm³ 且『>50% 為多形核中性球(PMN)』，非單核球；故 D 錯。", "detail": {"background": "PD 相關腹膜炎診斷（ISPD 2022）需符合下列三項中至少兩項：①臨床表現——腹痛與/或腹膜透析液混濁；②透析液白血球計數『>100 cells/µL（mm³）且其中『>50% 為多形核中性球（polymorphonuclear neutrophils, PMN）』』（並非單核球/monocyte）；③透析液培養陽性。致病菌多源自『皮膚表皮的 Gram-positive 球菌』（凝固酶陰性葡萄球菌、S. aureus），因換液接管時污染導管；Gram(-) 或多重菌種提示腸源或較嚴重。處置：留取『引流的透析液送細胞計數、革蘭氏染色與培養』，經驗性『腹腔內(IP)』抗生素涵蓋 Gram(+)/Gram(-)，療程 2–3 週，難治/復發/黴菌須拔管。本題問『錯誤』者為 D——錯在『>50% 為單核球』，正確應為『>50% 為中性球(PMN)』（單核球比例升高反而提示結核或其他非典型/慢性感染）。護理重點：辨識混濁透析液與腹痛、正確留檢、配合 IP 給藥、強化無菌換液技術。", "options": {"A": "對。典型表現為腹痛及腹膜透析液混濁。", "B": "對。常見菌種為皮膚表皮來源的 Gram(+) 球菌（如凝固酶陰性葡萄球菌）。", "C": "對。須將引流出的透析液進行細胞計數與菌種培養。", "D": "錯（為答案）。透析液 WBC>100/mm³ 且應『>50% 為多形核中性球(PMN)』而非單核球；單核球為主反提示結核等非典型感染。"}, "sources": ["ISPD Peritonitis Recommendations 2022", "Brenner & Rector's The Kidney 11e — PD peritonitis diagnostic criteria", "Harrison 21e Dialysis"]}}, "113-進階-麻醉-38": {"quick": "腎移植麻醉宜選『含氯較低』的平衡晶體(如 LR/Plasmalyte)，大量 N/S 才會致高氯性代謝酸中毒；故 D 敘述相反。", "detail": {"background": "腎移植病人的麻醉照護重點：①侵入性監測（動脈導管、中央靜脈導管）——須權衡監測利益與『導管相關敗血症』風險，且尿毒病人免疫功能受損、易感染，A 正確。②尿毒病人常有『胃排空延遲（gastroparesis）』與自主神經病變，誤吸風險增，麻醉誘導視為飽胃處理，B 正確。③移植腎再灌流後『尿量是直接監測指標』，吻合後常給 mannitol（滲透利尿、清除自由基）與 furosemide 促利尿、維持腎血流與尿量，C 正確。④輸液選擇——『大量生理食鹽水（0.9% N/S，含氯 154 mmol/L）會造成高氯性代謝性酸中毒（hyperchloremic metabolic acidosis）並可能加重高血鉀』，故腎移植/腎病人輸液常『偏好含氯較低的平衡晶體液（如 lactated Ringer's、Plasmalyte）』而非大量 N/S；早期擔心 LR 含鉀（4 mmol/L）會升鉀，但研究顯示大量 N/S 反因酸中毒使鉀外移、升鉀更明顯。故 D『應優先使用 N/S，因大量 LR 會引起高氯性酸中毒』敘述『因果相反』——其實是『大量 N/S 才引起高氯性酸中毒』，故 D 為錯誤（本題答案）。護理重點：監測尿量、電解質（鉀/氯）、酸鹼、容積，謹慎選輸液。", "options": {"A": "對。須評估侵入性監測的利弊與導管相關敗血症風險（尿毒病人易感染）。", "B": "對。尿毒病人胃排空常延遲，麻醉須視為飽胃處理以防誤吸。", "C": "對。移植腎再灌流後尿量為直接監測指標，吻合後可用 mannitol 與 furosemide 利尿。", "D": "錯（為答案）。因果相反——是『大量 N/S』導致高氯性代謝性酸中毒；腎病人反而宜選含氯較低的平衡晶體（LR/Plasmalyte）。"}, "sources": ["Miller's Anesthesia — Anesthesia for renal transplantation / fluid selection", "Harrison 21e Acid-Base Disorders（hyperchloremic acidosis）", "Brenner & Rector's The Kidney 11e — Perioperative fluid management"]}}, "113-進階-麻醉-74": {"quick": "腎移植再灌流時須維持『足夠灌流壓』(MAP 偏高)以保移植腎血流；維持 MAP 僅 60 mmHg 最不適當。", "detail": {"background": "腎移植手術中、尤其『新腎再灌流（renal reperfusion）』階段，移植腎沒有自主神經調控、血流高度依賴『全身灌流壓』，須維持『足夠且偏高的平均動脈壓（MAP）與適當前負荷（容積/中央靜脈壓）』，以確保移植腎獲得充分灌流、促進早期排尿、避免延遲移植腎功能（DGF/ATN）。血流動力學處置原則：①維持足夠 MAP——一般建議維持較高的 MAP（常 ≥ 90–95 mmHg 或接近病人基礎血壓），『僅維持 MAP 60 mmHg 對移植腎灌流不足』，最不適當（本題答案 A）；②低血壓時先給『晶體溶液擴容』，無效再用血管收縮劑（vasopressor），B 合理；③慢性高血壓病人的 MAP 應維持在『接近其基礎血壓』（如基礎血壓的 10–20% 範圍內）以保器官灌流，C 合理；④術中建議監測『中央靜脈壓(CVP)』以指導容積管理（確保適當前負荷以灌流移植腎），D 合理。故最不適當者為 A（MAP 只維持 60）。護理重點：維持足夠灌流壓與容積、監測 CVP 與尿量、慎用過低血壓目標、再灌流期密切血流動力學監測。", "options": {"A": "對（為答案，最不適當）。再灌流時維持 MAP 僅 60 mmHg 對移植腎灌流不足，應維持較高 MAP（接近基礎血壓）。", "B": "適當。低血壓時先給晶體擴容，無效再用血管收縮劑。", "C": "適當。慢性高血壓病人 MAP 維持在接近基礎血壓（±15–20%）以保器官灌流。", "D": "適當。術中監測 CVP 以指導容積管理、維持足夠前負荷灌流移植腎。"}, "sources": ["Miller's Anesthesia — Anesthesia for kidney transplantation（hemodynamics at reperfusion）", "Brenner & Rector's The Kidney 11e — Intraoperative management for graft perfusion"]}}, "114-進階-內科-6": {"quick": "aminoglycoside 在膿瘍的低 pH/低氧環境『活性降低』(需氧攝入），故『仍保有良好活性』為不適當敘述。", "detail": {"background": "Aminoglycoside（胺基糖苷類）藥理：①機轉——與細菌 30S ribosome 結合，干擾 mRNA 轉譯（誤讀、阻斷起始與轉位），抑制蛋白質合成，為濃度依賴型殺菌劑（A 正確）。②協同——常與『細胞壁活性藥物（β-lactam、glycopeptide）』併用治療嚴重感染（如腸球菌、綠膿桿菌、心內膜炎），因細胞壁被破壞後 aminoglycoside 更易進入細菌（協同作用）（B 正確）。③攝取依賴氧氣——aminoglycoside 進入細菌需『氧氣依賴的主動運輸』，故在『低氧、低 pH（如膿瘍腔、缺氧壞死組織）』環境下『攝取受抑、活性下降』，對厭氧菌『無效』；因此 C『在膿瘍的低 pH/低氧環境仍保有良好活性』『不適當（錯誤）』——恰相反，膿瘍環境會削弱其效果，這也是膿瘍須引流的原因之一（C 為答案）。④毒性——須注意『腎毒性（非少尿型 ATN）與耳毒性（常不可逆）』（D 正確）。本題問『不適當』者即 C。護理重點：監測腎功能與聽力、足夠水化、每日一次給藥、膿瘍須引流（光靠抗生素於低氧環境效果差）。", "options": {"A": "適當。aminoglycoside 與 30S ribosome 結合干擾 mRNA 轉譯，抑制細菌蛋白質合成。", "B": "適當。常與細胞壁活性藥（β-lactam）併用治療嚴重感染，具協同作用。", "C": "錯（為答案，不適當）。aminoglycoside 攝取需氧氣，在膿瘍的低 pH/低氧環境『活性下降』而非保有良好活性。", "D": "適當。aminoglycoside 須注意可能發生不可逆的腎毒性與耳毒性。"}, "sources": ["Harrison 21e Antibacterial Agents（Aminoglycosides — uptake requires oxygen）", "Goodman & Gilman — Aminoglycosides（anaerobic/abscess inefficacy）"]}}, "114-進階-內科-65": {"quick": "嚴重尿毒(BUN 182)初次透析防不平衡症候群→『縮短初次透析時間』(慢、短、低效率小透析器)。", "detail": {"background": "本題 CKD 第五期、BUN 182/Cr 16.4 的嚴重尿毒病人首次血液透析，最須預防『透析不平衡症候群（DDS）』——溶質（尿素）被快速清除致血漿滲透壓驟降、水分移入腦組織造成腦水腫，表現頭痛、噁心、躁動、意識混亂甚至抽搐。預防的核心是『讓溶質緩慢移除，降低血腦滲透梯度』，具體做法：①『縮短初次透析時間（如僅透析 2 小時）』；②『降低血流速（Qb）』；③『選用面積較小、效率較低的透析器（small surface area dialyzer）』；④分次、漸進地降 BUN（避免一次清太多）；⑤必要時加滲透劑（mannitol/高張鈉）。故正確選項為 C『縮短初次透析時間』。錯誤者：A『延長透析間隔天數』與防 DDS 無關；B『較快血流速』與 D『面積較大透析器』都會『加快溶質清除』，反而『增加』DDS 風險。護理重點：初次透析慢而短、密切監測神經症狀（頭痛、嘔吐、意識）、分次漸進降 BUN。", "options": {"A": "錯。延長透析間隔天數與預防不平衡症候群無關，且會延後尿毒矯正。", "B": "錯。較快血流速會加快溶質清除，反而增加不平衡症候群風險。", "C": "對（為答案）。縮短初次透析時間（搭配慢血流、小面積低效率透析器）可緩慢降 BUN，預防不平衡症候群。", "D": "錯。面積較大透析器效率高、清除快，會增加不平衡症候群風險。"}, "sources": ["Harrison 21e Dialysis（disequilibrium syndrome prevention）", "Brenner & Rector's The Kidney 11e — Initiating hemodialysis in severe uremia", "KDOQI Hemodialysis Adequacy Guideline"]}}, "114-進階-內科-66": {"quick": "PD 相較 HD 較常出現低血鉀(透析液不含鉀、持續清除+葡萄糖驅鉀入細胞)；蛋白攝取應提高(非0.6-0.8)、葡萄糖靠滲透非擴散除水。", "detail": {"background": "腹膜透析（PD）的生理與併發症：①電解質——PD 透析液『不含鉀』且為持續性透析，加上吸收葡萄糖刺激胰島素使鉀移入細胞，故 PD 病人『較血液透析病人更常出現低血鉀（hypokalemia）』（HD 病人因間歇透析反多透析前高鉀），A 正確。②蛋白質——PD 每日經透析液流失蛋白與胺基酸，故蛋白攝取應『提高（約 1.2–1.3 g/kg/day）』，而非 0.6–0.8 g/day（那是 CKD 未透析期的低蛋白飲食），故 B 錯。③除水機轉——PD 靠『透析液中高濃度葡萄糖造成的滲透壓梯度（osmosis，滲透作用）』把水分由腹膜微血管拉入腹腔而超濾移除多餘水分，是『滲透』而非『擴散（diffusion）』（擴散是用於溶質清除），故 C 錯（機轉用詞錯誤）。④包囊性硬化性腹膜炎（encapsulating peritonitis sclerosis, EPS）——是 PD『長期（多年，通常 >5–8 年）』的罕見但嚴重併發症，並非『1 年內常見』，故 D 錯。本題問『正確』者為 A（PD 較常低血鉀）。護理重點：監測血鉀（PD 易低鉀，必要時補鉀或調整透析液）、衛教高蛋白飲食、理解滲透除水原理、長期 PD 警覺 EPS。", "options": {"A": "對（為答案）。PD 透析液不含鉀且持續清除、葡萄糖驅鉀入細胞，較 HD 病人更常出現低血鉀。", "B": "錯。PD 經透析液流失蛋白，蛋白攝取應『提高（約 1.2–1.3 g/kg/day）』，非 0.6–0.8 g/day。", "C": "錯。PD 靠葡萄糖造成的『滲透（osmosis）』移除水分，非『擴散』（擴散用於溶質清除）。", "D": "錯。包囊性硬化性腹膜炎為 PD『長期（多年）』罕見嚴重併發症，非 1 年內常見。"}, "sources": ["Harrison 21e Dialysis（peritoneal dialysis）", "Brenner & Rector's The Kidney 11e — Peritoneal dialysis: solute & water transport, complications", "ISPD guidelines"]}}, "114-進階-內科-70": {"quick": "顯影劑腎病變預防靠檢查前後給『等張靜脈輸液(水化)』；等滲透壓顯影劑風險較低、Cr 多在24-48h 上升、3-5天達峰。", "detail": {"background": "顯影劑相關急性腎損傷（contrast-associated AKI, CA-AKI / CIN）為使用碘顯影劑後腎功能急性惡化，機轉為腎髓質血管收縮缺氧＋顯影劑直接腎小管毒性＋氧化壓力。危險因子：原有 CKD（尤其糖尿病腎病）、容積耗竭、大劑量/高滲透壓顯影劑、合併腎毒藥（NSAID、aminoglycoside）、心衰、老年。臨床經過：血清肌酸酐通常在『使用顯影劑後 24–48 小時開始上升』、約『3–5 天達高峰』、多在 1–2 週恢復（故 C『12 小時上升』與 D『24 小時達高峰』時間點不正確）。顯影劑滲透壓：『等滲透壓（iso-osmolar）或低滲透壓顯影劑風險低於高滲透壓顯影劑』，故 A『等滲透壓會增加風險』錯誤（恰相反，等/低滲透壓較安全）。預防核心：『檢查前後給予等張（isotonic）靜脈輸液（生理食鹽水或碳酸氫鈉）水化』、使用最低必要顯影劑量、避免短期重複注射、停用腎毒藥與利尿劑/腎毒物。N-acetylcysteine 與碳酸氫鈉的額外效益證據不一致（PRESERVE trial 顯示無明顯優於生理食鹽水）。本題問『正確』者為 B（檢查前後給等張輸液預防）。護理重點：檢查前評估腎功能與容積、安排水化、檢查後監測 Cr（48–72 小時）、避免合併腎毒藥。", "options": {"A": "錯。『等滲透壓/低滲透壓』顯影劑風險『較低』，會增加風險的是高滲透壓顯影劑，敘述相反。", "B": "對（為答案）。檢查前後給予等張性靜脈輸液（水化）是預防顯影劑腎病變的核心措施。", "C": "錯。血清肌酸酐通常在使用顯影劑後『24–48 小時』開始上升，非 12 小時。", "D": "錯。血清肌酸酐通常在『3–5 天』達高峰，非 24 小時。"}, "sources": ["KDIGO AKI Guideline / contrast-associated AKI", "Harrison 21e Acute Kidney Injury（contrast nephropathy）", "PRESERVE Trial NEJM 2018", "Brenner & Rector's The Kidney 11e — Contrast-induced nephropathy"]}}, "114-進階-內科-80": {"quick": "CKD3 癌痛 acetaminophen 已不足(6分)→依 WHO 階梯『加上弱鴉片 tramadol(第二階)』；避 NSAID(celecoxib 腎毒)。", "detail": {"background": "本題 CKD 第三期、轉移性大腸癌病人，使用 acetaminophen 500 mg q4h 後疼痛仍 6 分（中度），須依 WHO 三階梯止痛原則往上加強。WHO 階梯：第一階『非鴉片（acetaminophen/NSAID）』→第二階『弱鴉片（codeine、tramadol）±非鴉片』→第三階『強鴉片（morphine 等）』。當第一階非鴉片已用足而疼痛持續為中度（4–6 分），應『進到第二階：加上弱鴉片（tramadol）』。各選項：①增加 acetaminophen 至每日上限——已使用且效果不足，單純加量天花板效應有限，且每日上限約 3–4 g（老年/肝風險者更低），非最佳；②改用 celecoxib（COX-2 NSAID）——NSAID 在 CKD 會抑制前列腺素致腎血流下降惡化腎功能（CKD3 應避免），不宜；③加上口服 tramadol——符合 WHO 第二階梯（弱鴉片），是中度癌痛 acetaminophen 不足時的合理升階（注意 CKD 須減量、且 tramadol 降癲癇閾值與血清素症候群風險），為本題答案 C；④直接改靜脈 morphine——對『中度（6 分）』疼痛、且尚未經第二階梯而直接跳到強鴉片靜脈輸注，過於激進（雖重度癌痛可直接用強鴉片，但本題為中度且有第二階選項，依階梯先加 tramadol 較適當）。護理重點：依疼痛分數階梯式調整、CKD 病人弱/強鴉片皆須減量並監測、留意 tramadol 的癲癇與藥物交互作用。", "options": {"A": "錯。acetaminophen 已使用且效果不足，加量有天花板效應且受每日上限與肝/老年限制，非最佳。", "B": "錯。celecoxib（NSAID）在 CKD3 會惡化腎功能（前列腺素抑制致腎血流下降），應避免。", "C": "對（為答案）。依 WHO 階梯，第一階不足的中度癌痛應『加上弱鴉片 tramadol（第二階）』；CKD 須減量並注意癲癇/血清素風險。", "D": "錯。對中度（6 分）疼痛且未經第二階即直接靜脈 morphine 過於激進，依階梯宜先加弱鴉片。"}, "sources": ["WHO Analgesic Ladder / Cancer Pain Guidelines", "Harrison 21e Palliative Care / Pain Management", "Brenner & Rector's The Kidney 11e — Analgesics in CKD"]}}, "114-進階-外科-30": {"quick": "BMI>20 並非捐贈禁忌(正常範圍)；顯著白蛋白尿、活動性惡性腫瘤、嚴重精神疾病才是禁忌。", "detail": {"background": "活體腎捐贈者禁忌症（contraindication）包括：①明顯腎臟異常——『顯著的白蛋白尿/蛋白尿』（提示潛在腎病，捐後單腎風險高）、低 GFR、血尿、結石病、解剖異常；②全身性禁忌——活動性惡性腫瘤（捐贈會傳播腫瘤風險且供者自身需治療）、未控的傳染病、糖尿病、難控高血壓、嚴重肥胖（BMI 多以 >35–40 為界）；③心理社會——嚴重精神疾病致無法知情同意或術後自我照顧、被脅迫捐贈等。關鍵陷阱：『BMI > 20 kg/m²』屬『正常體位範圍』（正常 BMI 約 18.5–24.9），完全不是禁忌——禁忌的是『過度肥胖』（如 BMI>35–40）而非 BMI>20。故 A『BMI>20 為禁忌』錯誤（為本題答案）。護理/評估重點：24 小時尿白蛋白/蛋白、GFR、影像評估雙腎、腫瘤與感染篩檢、完整心理社會評估與自願性確認。", "options": {"A": "錯（為答案）。BMI > 20 kg/m² 屬正常體位範圍，並非捐贈禁忌；禁忌的是『過度肥胖（如 BMI>35–40）』。", "B": "為禁忌。顯著白蛋白尿提示潛在腎病，捐後單腎風險高，屬禁忌。", "C": "為禁忌。具活動性惡性腫瘤有腫瘤傳播風險且供者需治療，屬禁忌。", "D": "為禁忌。嚴重精神疾病障礙致無法知情同意/術後自我照顧，屬禁忌。"}, "sources": ["KDIGO Living Kidney Donor Guideline 2017", "Harrison 21e Transplantation（living donor evaluation）", "Brenner & Rector's The Kidney 11e — Living donor contraindications"]}}, "114-進階-家庭-64": {"quick": "預防顯影劑 AKI 用『等/低滲透壓顯影劑』(風險較高滲透壓低)；NAC 證據不一、ARB/利尿劑無預防效益甚至有害。", "detail": {"background": "預防顯影劑相關急性腎損傷（CA-AKI）的實證措施：①『使用等滲透壓或低滲透壓顯影劑』取代高滲透壓顯影劑，可降低高風險病人的 CA-AKI 風險，為合理預防措施（本題答案 D）；②『檢查前後等張靜脈輸液（水化）』——以生理食鹽水或碳酸氫鈉擴容、維持腎血流，是最核心且證據最一致的預防方法；③『使用最低必要顯影劑量、避免短期重複注射』；④『停用腎毒藥（NSAID、aminoglycoside）與檢查前後暫停某些藥物』。不建議/無效或有害者：『N-acetylcysteine（NAC）』——早期被用於預防，但大型 PRESERVE trial 顯示『NAC 並不優於安慰劑』，故證據不一致、非可靠預防措施（A 因此不選）；『ARB（angiotensin-receptor blocker）』與『利尿劑（如 furosemide、mannitol 強迫利尿）』——非但不能預防，利尿劑反因致容積耗竭而『增加』CA-AKI 風險（B、C 為不適當）。本題在四個選項中，最確切『可用於預防』者為 D（使用等滲透壓顯影劑）。護理重點：檢查前評估腎功能/容積、安排等張輸液水化、選低/等滲透壓顯影劑、避免利尿劑與腎毒藥、檢查後追蹤 Cr。", "options": {"A": "錯。N-acetylcysteine 預防 CA-AKI 證據不一致（PRESERVE 顯示無優於安慰劑），非可靠預防措施。", "B": "錯。ARB 並無預防 CA-AKI 的效果。", "C": "錯。利尿劑（強迫利尿）反因容積耗竭『增加』CA-AKI 風險，不可用於預防。", "D": "對（為答案）。使用等滲透壓（或低滲透壓）顯影劑可降低 CA-AKI 風險，為合理預防處置。"}, "sources": ["KDIGO AKI Guideline（contrast-associated AKI prevention）", "PRESERVE Trial NEJM 2018", "Harrison 21e Acute Kidney Injury", "Brenner & Rector's The Kidney 11e — Prevention of contrast nephropathy"]}}, "114-進階-麻醉-34": {"quick": "長期 HD 病人術前須矯正『高血鉀』而非低血鉀；長期服 imipramine(TCA)會增心律不整風險(C 正確)。", "detail": {"background": "長期血液透析病人術前麻醉評估重點：①電解質——透析病人典型異常為『高血鉀（hyperkalemia，最致命，須術前透析矯正以防心律不整）、代謝性酸中毒、容積過載、低鈣/高磷（CKD-MBD）』；故須確認『高血鉀』已矯正，選項 A『矯正高血鈣與低血磷』、B『矯正高血鈉與低血鉀』方向都『相反』（透析病人多為高鉀、高磷而非高鈣、低磷/低鉀），皆錯。②心血管用藥——三環抗憂鬱劑（tricyclic antidepressant, TCA，如 imipramine）具『抗膽鹼與奎尼丁樣（quinidine-like）膜穩定作用』，會延長 QT、增加心律不整風險，與麻醉藥物併用更須留意，故 C『長期服 imipramine 會提高心律不整風險』正確（為本題答案）。③fluoxetine（SSRI）——與『非典型尿毒溶血症候群（atypical HUS）』無因果關係（aHUS 與補體調節異常、某些藥物如鈣調磷酸酶抑制劑/某些化療相關，非 SSRI），故 D 錯。本題問『最適當』敘述者為 C。護理/麻醉重點：術前透析矯正高鉀與容積、評估貧血與心血管風險、保護動靜脈廔管側肢、留意病人慢性用藥（TCA 致心律不整）對麻醉的影響。", "options": {"A": "錯。透析病人多為『高血鉀、高血磷』，須矯正的是高血鉀，而非『高血鈣與低血磷』。", "B": "錯。應矯正的是高血鉀，敘述為『高血鈉與低血鉀』方向相反。", "C": "對（為答案）。imipramine（TCA）有奎尼丁樣作用會延長 QT、提高心律不整風險，麻醉前須留意。", "D": "錯。fluoxetine（SSRI）與非典型尿毒溶血症候群無因果關係。"}, "sources": ["Miller's Anesthesia — Anesthesia for patients with ESRD（preoperative electrolyte correction）", "Harrison 21e Hyperkalemia / Tricyclic antidepressant cardiotoxicity", "Brenner & Rector's The Kidney 11e — Perioperative management of dialysis patients"]}}, "114-通論-麻醉-70": {"quick": "肌酸酐清除率(CrCl)比單一 SCr/BUN 更可靠反映 GFR；SCr 對輕度腎損不敏感、BUN 受飲食/水合影響。", "detail": {"background": "術前腎功能評估指標比較：①血清肌酸酐（serum creatinine, SCr）——由肌肉代謝產生、經腎絲球過濾排泄，但與 GFR 呈『非線性反曲線』關係，且受『肌肉量、年齡、性別、種族』影響；腎功能要下降相當程度（GFR 約降一半）SCr 才明顯上升，故『SCr 對輕微腎功能障礙不敏感』（A 錯——SCr 無法可靠偵測輕微腎損）。②肌酸酐清除率（creatinine clearance, CrCl，由 24 小時尿或 Cockcroft-Gault 估算）——綜合血與尿肌酸酐及尿量，較單一 SCr 或 BUN『更可靠地估計 GFR』（雖因腎小管分泌會略高估真實 GFR，但仍優於單點 SCr/BUN），故 B 正確（為本題答案）。③BUN（血尿素氮）——除腎功能外，『受飲食蛋白攝取、消化道出血、分解代謝、與水合/容積狀態（脫水時 BUN 不成比例上升）』影響甚大，並非單純反映腎功能，故 C『不受飲食或水合影響』錯誤。④SCr 確實『反映肌肉產生與腎臟排泄之間的平衡』（穩態時生成=排泄），故 D『無法反映此平衡』錯誤。本題問『正確』者為 B。護理/評估重點：評估腎功能勿單看 SCr（對輕損不敏感），可用 CrCl/eGFR；解讀 BUN 須結合飲食、出血、容積狀態。", "options": {"A": "錯。SCr 對『輕微』腎功能障礙不敏感（GFR 須下降相當程度 SCr 才明顯上升）。", "B": "對（為答案）。肌酸酐清除率綜合血尿肌酸酐與尿量，較單一 SCr 或 BUN 更可靠反映 GFR。", "C": "錯。BUN 受飲食蛋白、消化道出血、分解代謝與水合/容積狀態影響甚大，非僅反映腎功能。", "D": "錯。SCr 在穩態下正反映肌肉生成與腎臟排泄之間的平衡。"}, "sources": ["Harrison 21e Approach to the Patient with Renal Disease（GFR assessment）", "Brenner & Rector's The Kidney 11e — Assessment of GFR（creatinine clearance vs SCr/BUN）", "Miller's Anesthesia — Preoperative renal assessment"]}}, "105-TNPA-內科-9": {"quick": "長期導尿管的無症狀菌尿(asymptomatic bacteriuria/CA-ASB)不必治療，僅孕婦或泌尿侵入性處置前才需處理，無症狀者觀察即可。", "detail": {"background": "Asymptomatic bacteriuria(ASB)指尿培養菌落數達標(女性連續兩次≥10^5 CFU/mL、導尿管尿一次≥10^2~10^5 CFU/mL)但**無 UTI 症狀**(無發燒、頻尿、急尿、解尿疼痛、腰痛/CVA 敲痛)。長期留置導尿管者幾乎 100% 在 2~4 週內會出現 bacteriuria 與 pyuria，這是『定殖(colonization)』而非感染，膿尿(pyuria)單獨存在**不是**治療指標。IDSA 2019 ASB 指引明確指出：對非孕成人、糖尿病、老年、長照住民、脊髓損傷、留置導尿管者的 ASB **不建議篩檢也不建議治療**——因抗生素不降低有症狀 UTI 或死亡率，反而增加抗藥性、Clostridioides difficile 感染與藥物副作用。**唯二需治療的例外**：(1)孕婦(降低 pyelonephritis 與早產風險)、(2)接受會造成黏膜出血的泌尿系統侵入性處置前(如 TURP、輸尿管鏡碎石)。本題 56 歲長照住民、長期導尿、僅有 WBC 與細菌但無症狀無發燒→典型 CA-ASB，正確處置是觀察、有症狀再驗培養治療。護理監測重點：避免不必要留置、無菌密閉引流系統、儘早移除導尿管、勿因尿混濁或有味就送培養。陷阱：老年人非特異性意識改變/倦怠不應僅憑菌尿即診斷 UTI，需排除其他病因。", "options": {"A": "錯。無症狀菌尿給口服抗生素無益處(不降低有症狀 UTI)反增抗藥性與 C. difficile 風險，IDSA 2019 明確不建議。", "B": "錯。病人生命徵象穩定、無發燒無敗血徵象，無急診必要；過度醫療。", "C": "錯。無症狀者不需送培養更不需靜脈抗生素；靜脈抗生素是有症狀腎盂腎炎/urosepsis 才用。導尿管菌尿驗培養只在有症狀時做。", "D": "對。長期導尿之 ASB 正確處置為觀察追蹤，待出現發燒或 UTI 症狀再評估與治療，符合 IDSA 指引與 CAUTI 預防原則。"}, "sources": ["Harrison 21e, Urinary Tract Infections, Pyelonephritis & Prostatitis", "IDSA 2019 Clinical Practice Guideline on Asymptomatic Bacteriuria", "Brenner & Rector's The Kidney 11e, UTI"]}}, "105-TNPA-內科-45": {"quick": "糖尿病女性發燒+CVA 敲痛+WBC↑+膿尿+低血壓→急性腎盂腎炎(upper UTI)合併敗血徵象，不能診斷為『下泌尿道感染』。", "detail": {"background": "急性腎盂腎炎(acute pyelonephritis)為**上泌尿道感染**，典型三聯徵為發燒/寒顫、腰痛或肋脊角(CVA)敲痛、膿尿/菌尿，常伴白血球增多與全身性發炎；下泌尿道感染(cystitis)則以頻尿、急尿、解尿疼痛、恥骨上不適為主、**典型無發燒、無 CVA 敲痛、無全身性表現**。本題病人有糖尿病(UTI 與複雜化、氣腫性腎盂腎炎之危險因子)、發燒、左腰肋觸痛(CVA)、WBC 17,000、膿尿>100/HPF，已是 complicated upper UTI；血壓 86/52、心跳 102→已達敗血/低血壓，屬 urosepsis 範疇。正確處置：血液+尿液培養、住院、儘早經驗性靜脈抗生素(涵蓋革蘭氏陰性桿菌如三代 cephalosporin 或 fluoroquinolone)、影像(超音波/CT)排除阻塞或膿瘍。糖尿病者影像門檻應放寬(警覺氣腫性腎盂腎炎、腎周膿瘍)。題目問『不適當』者→把它當下泌尿道感染處理最不適當。", "options": {"A": "適當。血液與尿液培養是腎盂腎炎/urosepsis 標準作法，可定菌與調整抗生素，故非答案。", "B": "適當。腹部超音波可評估有無水腎、結石、膿瘍，糖尿病者尤應做，故非答案。", "C": "適當(『安排住院、開始抗生素』正確；句首『僅供參考』為原卷浮水印雜訊)。有低血壓敗血徵象須住院並儘早抗生素，故非答案。", "D": "錯(本題答案)。臨床表現為上泌尿道(腎盂腎炎)合併敗血，診斷成下泌尿道感染會低估嚴重度、延誤住院與靜脈抗生素，最不適當。"}, "sources": ["Harrison 21e, Pyelonephritis", "IDSA 2010 UTI/Pyelonephritis Guideline", "Brenner & Rector's The Kidney 11e"]}}, "105-TNPA-外科-69": {"quick": "nitrofurantoin 抑制細菌乙醯輔酶A(acetyl-CoA)等多種酵素與核糖體蛋白合成，是其廣泛抗菌機轉的一環。", "detail": {"background": "nitrofurantoin 是治療**單純性下泌尿道感染(cystitis)**的第一線藥之一(IDSA 建議 nitrofurantoin、TMP-SMX、fosfomycin)。其機轉特殊：藥物被細菌 nitroreductase 還原成多種高反應性中間產物，**廣泛攻擊細菌的核糖體蛋白、DNA、細胞壁合成及多種代謝酵素**(包括抑制 acetyl-CoA 相關酵素與 pyruvate 代謝)，因作用標的多元故**不易產生抗藥性**。藥動特性：口服後在尿中濃縮達高濃度、血中濃度低→**僅適用膀胱炎，不能用於腎盂腎炎或全身性感染**。禁忌與護理：CrCl<30~45 mL/min 者尿中濃度不足且全身蓄積→**腎功能不全禁用**；G6PD 缺乏者可致溶血；長期使用可致肺纖維化與周邊神經病變；**孕婦近足月(38週後)避免**(新生兒溶血風險)。trimethoprim、sulfamethoxazole、sulfisomidine 機轉為抑制葉酸合成(DHFR/DHPS)，與 acetyl-CoA 無關。", "options": {"A": "對。nitrofurantoin 經還原後產生多重活性中間物，抑制包含 acetyl-CoA 在內的多種細菌酵素與蛋白合成，符合題意。", "B": "錯。trimethoprim 抑制 dihydrofolate reductase(DHFR)阻斷葉酸合成，與 acetyl-CoA 無關。", "C": "錯。sulfamethoxazole 為 sulfonamide，抑制 dihydropteroate synthase(DHPS)競爭 PABA，屬葉酸合成抑制。", "D": "錯。sulfisomidine 亦為 sulfonamide 類葉酸合成抑制劑，非 acetyl-CoA 機轉。"}, "sources": ["Harrison 21e, Antibacterial Agents / UTI Treatment", "IDSA 2010 Uncomplicated Cystitis Guideline", "Goodman & Gilman Pharmacology, Nitrofurantoin"]}}, "105-TNPA-通論-4": {"quick": "突發單側腰背劇痛放射至腹股溝/睪丸+血尿+無發燒、僅 CVA 敲痛→典型輸尿管/腎結石腎絞痛(renal colic)。", "detail": {"background": "Renal colic(腎絞痛)由輸尿管結石阻塞、輸尿管平滑肌痙攣與管腔壓力上升所致，典型為**突發、陣發性、絞痛**，由腰背沿輸尿管走向**放射至腹股溝、陰囊/陰唇**(loin to groin)，病人常坐立難安、無法找到舒服姿勢(與腹膜炎喜靜止相反)。常伴血尿(微觀或肉眼，因結石刮傷尿路上皮)、噁心嘔吐(腹腔神經叢共享神經反射)。**典型無發燒**——若合併發燒、寒顫須警覺結石阻塞合併感染(obstructive pyelonephritis/urosepsis，泌尿急症需引流)。診斷首選 **non-contrast CT(KUB protocol)**(敏感度特異度最高)，超音波可看水腎、KUB 看 radio-opaque 結石。本題病人體溫 36.8°C 正常、CVA 敲痛、血尿、疼痛放射至腹股溝睪丸→renal/ureteral colic。鑑別：acute pyelonephritis 會發燒、為持續鈍痛非絞痛；cystitis 為頻尿解尿痛無腰痛；闌尾炎疼痛在右下腹、無血尿無放射至睪丸。", "options": {"A": "對。突發絞痛放射至腹股溝睪丸、血尿、無發燒、CVA 敲痛→renal colic(輸尿管結石)，最符合。", "B": "錯。acute pyelonephritis 應有發燒/寒顫與持續鈍痛，本題無發燒(36.8°C)且為突發放射性絞痛，不符。", "C": "錯。acute cystitis 主症為頻尿、急尿、解尿痛、恥骨上痛，不會劇痛放射至睪丸或 CVA 敲痛。", "D": "錯。atypical appendicitis 疼痛多在右下腹(McBurney 點)，不會放射至腹股溝睪丸且不致血尿。"}, "sources": ["Harrison 21e, Nephrolithiasis / Approach to Flank Pain", "Brenner & Rector's The Kidney 11e, Urinary Stones", "AUA Surgical Management of Stones Guideline"]}}, "105-TNPA-通論-22": {"quick": "臨床尿路感染最常見致病菌為 Escherichia coli(uropathogenic E. coli, UPEC)，約佔社區單純性 UTI 的 75~85%。", "detail": {"background": "UTI 致病菌絕大多數來自腸道菌群上行感染。**E. coli(UPEC)為各族群、各部位 UTI 之最常見病原**，社區單純性膀胱炎/腎盂腎炎約佔 75~85%。其致病靠 type 1 fimbriae(FimH，黏附膀胱上皮 uroplakin)、P fimbriae(PapG，黏附腎臟上皮、與腎盂腎炎相關)、溶血素、鐵載體等毒力因子。其他常見菌：Klebsiella pneumoniae、Proteus mirabilis(產 urease 分解尿素→鹼性尿、struvite/磷酸銨鎂鹿角結石)、Enterococcus、Staphylococcus saprophyticus(性活躍年輕女性社區膀胱炎第二常見)；院內/導尿管相關則加入 Pseudomonas、Enterococcus、Candida 與抗藥菌。診斷靠尿液分析(膿尿、nitrite+提示腸內菌科、leukocyte esterase+)與中段尿培養。記憶口訣 KEEPS(Klebsiella, E. coli, Enterococcus, Proteus, Staphylococcus)中以 E. coli 為首。", "options": {"A": "對。E. coli 是臨床 UTI 最常見致病菌(約 80%)，為標準答案。", "B": "錯。Klebsiella 為次常見之一，多見於院內/糖尿病/有導管者，非最常見。", "C": "錯。Staphylococcus saprophyticus 是性活躍年輕女性社區膀胱炎的第二常見菌，整體仍遠少於 E. coli。", "D": "錯。Proteus(尤其 P. mirabilis)產 urease 與 struvite 結石相關，但非最常見致病菌。"}, "sources": ["Harrison 21e, UTI Microbiology", "IDSA 2010 Uncomplicated UTI Guideline", "Brenner & Rector's The Kidney 11e"]}}, "106-106a-內科-11": {"quick": "院內 UTI(多與導尿管相關)常見菌含 Enterococci 與 Candida(伺機性黴菌)；Clostridium botulinum 不是泌尿道病原。", "detail": {"background": "院內泌尿道感染(hospital-acquired/catheter-associated UTI, CAUTI)是最常見的院內感染之一(約佔院內感染 30~40%)，幾乎都與留置導尿管相關。其菌譜與社區不同：除 E. coli 外，**Enterococci、Klebsiella、Pseudomonas aeruginosa、Proteus、Candida(白色念珠菌)**比例上升，且抗藥性高(ESBL、VRE、多重抗藥革蘭氏陰性菌)。Candida 在留置導管、糖尿病、近期廣效抗生素、免疫低下者尤常見，多為定殖(candiduria)，無症狀者僅需移除/更換導管而不需抗黴菌治療。本題選項：1 Enterococci ✓、3 Candida ✓ 皆為典型院內 UTI 病原；2 Staphylococcus aureus 雖可由血行播散至腎(腎膿瘍)但**非導管相關院內 UTI 的常見上行病原**；4 Clostridium botulinum(肉毒桿菌，產神經毒素致弛緩性麻痺)與泌尿道感染無關。故答案 1+3(B)。", "options": {"A": "錯。含 2 S. aureus；S. aureus 非院內 UTI 常見上行病原(尿中見 S. aureus 反應警覺血行播散性腎感染)。", "B": "對。1 Enterococci + 3 Candida 皆為導管相關院內 UTI 常見病原，正確。", "C": "錯。含 2 S. aureus(不常見)；雖含 3 Candida 正確，但組合不對。", "D": "錯。含 4 Clostridium botulinum(與 UTI 無關)，明顯錯誤。"}, "sources": ["Harrison 21e, Healthcare-Associated Infections / CAUTI", "IDSA 2009 CAUTI Guideline", "CDC NHSN UTI Surveillance"]}}, "106-106a-內科-25": {"quick": "老年男性 UTI 常與攝護腺肥大(BPH)致殘尿、尿滯留相關；孕婦菌尿須治療、殺精劑增加 UTI 風險、糖尿病女性 ASB 較男性多。", "detail": {"background": "本題綜合 UTI 危險因子與處置原則。**男性 UTI 相對少見**(較長尿道有保護)，一旦發生多屬複雜性，常與攝護腺肥大(BPH)造成膀胱出口阻塞、殘尿增加、菌尿滯留有關，故老年男性 UTI 需評估前列腺與下尿路阻塞。**孕婦 ASB 必須治療**(降低腎盂腎炎、早產、低體重，IDSA 例外族群)，不能因怕副作用而不治療(選 nitrofurantoin/cephalosporin/ampicillin 等安全藥)。**殺精劑(spermicide，含 nonoxynol-9)會改變陰道菌叢、抑制乳酸桿菌、促 E. coli 定殖→增加 UTI 風險**，含殺精劑的保險套/子宮帽尤甚。糖尿病女性 ASB 與 UTI 盛行率**明顯高於男性**(女性尿道短、加上糖尿、glycosuria、神經性膀胱)，故男女比例『相同』之敘述錯誤。", "options": {"A": "錯。孕婦 ASB/UTI 必須治療(降低腎盂腎炎與早產)，不能因怕副作用而不治療；可選孕期安全抗生素。", "B": "對(本題答案)。老年男性 UTI 常與 BPH 致膀胱出口阻塞、殘尿增加有關，須評估前列腺與下尿路阻塞。", "C": "錯。糖尿病女性 ASB/UTI 盛行率高於男性(尿道短、glycosuria、神經性膀胱)，比例並非相同。", "D": "錯。使用含殺精劑避孕會改變陰道菌叢、促 E. coli 定殖，**增加**(而非不增加)UTI 風險。"}, "sources": ["Harrison 21e, UTI Risk Factors", "IDSA 2019 ASB Guideline (pregnancy exception)", "Brenner & Rector's The Kidney 11e"]}}, "106-106a-通論-51": {"quick": "脊損長期導尿之無症狀菌尿(CA-ASB)不需抗生素，無論格蘭氏陽性或陰性菌，僅有症狀時才治療。", "detail": {"background": "脊髓損傷(SCI)病人因神經性膀胱常需長期導尿(留置或間歇性)，幾乎都會出現持續性 bacteriuria(常為多重菌、含革蘭氏陽性與陰性菌)。IDSA 2019 ASB 與 2009 CAUTI 指引：**SCI 與長期導尿者的無症狀菌尿不應篩檢也不應治療**，因抗生素不降低有症狀 UTI、無改善預後，反促抗藥菌定殖與 C. difficile。**唯有出現感染症狀**(發燒、新發/惡化的痙攣、自主神經反射異常 autonomic dysreflexia、惡臭混濁尿伴全身不適、血尿、上尿路症狀)時才驗培養並治療。本題病人無發燒無症狀→不需任何抗生素(D)。護理重點：間歇導尿優於長期留置可降感染、無菌技術、儘早移除、足夠水分；勿因尿混濁就送培養給藥。", "options": {"A": "錯。無症狀菌尿不治療，針對格蘭氏陽性菌給藥屬不必要抗生素。", "B": "錯。同理，針對格蘭氏陰性菌給藥亦屬不必要治療無症狀菌尿。", "C": "錯。涵蓋陽性+陰性菌的廣效治療更增抗藥性與副作用，無症狀者不需治療。", "D": "對。長期導尿之 CA-ASB 不需抗生素，觀察追蹤、有症狀再處理，符合 IDSA 指引。"}, "sources": ["IDSA 2019 ASB Guideline (spinal cord injury, indwelling catheter)", "IDSA 2009 CAUTI Guideline", "Harrison 21e, CAUTI"]}}, "106-106a-通論-63": {"quick": "右脇部突發劇痛+噁心嘔吐+無創傷+血尿+脇部敲痛、Murphy's sign 陰性→急性腎結石腎絞痛。", "detail": {"background": "本題鑑別右脇/右上腹劇痛。**急性腎結石腎絞痛(acute renal stone colic)**典型為突發、陣發絞痛、脇部敲痛(CVA tenderness)、伴噁心嘔吐與**血尿**(結石刮傷尿路上皮)，Murphy's sign 陰性(非膽囊源)。鑑別：(1)acute cholecystitis—右上腹痛、Murphy's sign 陽性(吸氣時觸診右肋下疼痛而暫停呼吸)、可放射至右肩胛、發燒、無血尿，本題 Murphy's sign 陰性已排除；(2)acute pancreatitis—中上腹痛放射至背、lipase/amylase↑、無血尿；(3)acute myocarditis—心臟症狀(胸悶、心衰、心律不整)，與脇痛血尿無關。診斷腎結石首選 non-contrast CT KUB。本題血尿+脇部敲痛+Murphy 陰性→D 結石腎絞痛。", "options": {"A": "錯。acute cholecystitis 應 Murphy's sign 陽性、無血尿，本題 Murphy 陰性已排除。", "B": "錯。acute pancreatitis 為中上腹痛放射至背、無血尿、無脇部敲痛特徵。", "C": "錯。acute myocarditis 表現為心臟症狀，與單側脇痛及血尿無關。", "D": "對。突發脇部絞痛+血尿+CVA 敲痛+Murphy 陰性→急性腎/輸尿管結石腎絞痛，最符合。"}, "sources": ["Harrison 21e, Nephrolithiasis", "Brenner & Rector's The Kidney 11e, Urinary Stones", "ACR Appropriateness Criteria, Acute Onset Flank Pain"]}}, "107-TNPA-內科-72": {"quick": "變形紅血球(dysmorphic RBC)代表腎絲球源性血尿(腎炎)，與泌尿道感染無關；UTI 的尿檢標誌是 nitrite、leukocyte esterase、WBC。", "detail": {"background": "尿液分析在 UTI 的關鍵指標：(1)**白血球(膿尿 pyuria，WBC>5~10/HPF)**—感染發炎標誌，幾乎所有真性 UTI 都有膿尿，無膿尿應重新考慮診斷；(2)**亞硝酸鹽(nitrite)陽性**—腸內菌科(Enterobacteriaceae，如 E. coli、Klebsiella、Proteus)能把尿中硝酸鹽還原為亞硝酸鹽，陽性高度提示這類革蘭氏陰性桿菌感染(特異度高、敏感度較低，因需細菌量足且尿在膀胱停留夠久；Enterococcus、S. saprophyticus 不產 nitrite 可偽陰性)；(3)**白血球酯酶(leukocyte esterase)陽性**—中性球釋放，是膿尿的間接指標。**變形/異形紅血球(dysmorphic RBC)**(如 acanthocyte/棘狀紅血球)與紅血球柱狀體則代表紅血球**通過受損腎絲球基底膜**而變形→腎絲球源性血尿(glomerulonephritis)，是**腎炎而非 UTI** 的指標。故與 UTI 最無關者為 B。", "options": {"A": "相關。nitrite 陽性提示腸內菌科(E. coli 等)感染，是 UTI 的有用指標。", "B": "對(本題答案)。dysmorphic RBC 提示腎絲球源性血尿(腎炎)，與 UTI 無關。", "C": "相關。leukocyte esterase 陽性反映膿尿，是 UTI 的篩檢標誌。", "D": "相關。尿中白血球(膿尿)是 UTI 的核心發炎指標。"}, "sources": ["Harrison 21e, Urinalysis / Hematuria evaluation", "Brenner & Rector's The Kidney 11e, Urinalysis", "Free analysis of dysmorphic RBC in glomerular disease"]}}, "107-TNPA-內科-74": {"quick": "孕婦 UTI 禁用 fluoroquinolone(影響胎兒軟骨/關節發育)；nitrofurantoin、ampicillin、cephalosporin 相對安全。", "detail": {"background": "孕婦 UTI(含 ASB、膀胱炎、腎盂腎炎)必須治療(IDSA ASB 例外族群)，但抗生素選擇受胎兒安全限制。**fluoroquinolone(如 ciprofloxacin、levofloxacin)在孕期禁用**——動物實驗顯示影響軟骨/關節發育(arthropathy)，列為相對禁忌。**TMP-SMX**在**孕早期(第一孕期)**避免(trimethoprim 為葉酸拮抗→神經管缺損風險)、**孕晚期(近足月)**避免(sulfa 競爭膽紅素結合致核黃疸 kernicterus)。**nitrofurantoin**孕中期相對安全但**近足月(38週後)避免**(新生兒溶血，尤其 G6PD)。**aminoglycoside**有耳腎毒性(僅重症權衡使用)。孕期相對安全的首選：**β-lactam 類(ampicillin/amoxicillin、cephalosporin 如 cefazolin、cephalexin)**與孕中期 nitrofurantoin、fosfomycin。本題已懷孕 3 個月，最不宜為 fluoroquinolone。", "options": {"A": "對(本題答案)。fluoroquinolone 孕期禁用(影響胎兒軟骨關節發育)，最不宜。", "B": "錯(可用)。nitrofurantoin 孕中期相對安全(僅近足月避免)，此時懷孕 3 個月可用。", "C": "錯(可用)。ampicillin 屬 β-lactam，孕期安全性高，是孕婦 UTI 常用藥。", "D": "錯(可用)。cefazolin 為第一代 cephalosporin，孕期安全，可用於 UTI。"}, "sources": ["Harrison 21e, UTI in Pregnancy", "IDSA 2019 ASB Guideline (pregnancy)", "ACOG Committee Opinion on UTI in Pregnancy"]}}, "107-TNPA-通論-25": {"quick": "血尿出現時機定位病灶——『初段血尿』提示尿道/膀胱頸出口；『終段血尿』提示膀胱(頸/三角)；題目 C 把初段血尿錯歸膀胱故為非。", "detail": {"background": "血尿(hematuria)依排尿過程出現時機可大略定位出血部位：(1)**初段血尿(initial hematuria，小便開始時)**—出血來自**尿道(前尿道)或膀胱頸/出口**，因排尿初期沖出該處積血；(2)**終段血尿(terminal hematuria，小便快結束時)**—出血來自**膀胱頸、膀胱三角或後尿道**，膀胱收縮末期擠出；(3)**全段血尿(total hematuria，整段都有血)**—出血來自**膀胱、輸尿管或腎臟(上尿路)**，血液在膀胱內與尿混勻。此外腎絲球源性血尿(腎炎)為全段、伴 dysmorphic RBC 與蛋白尿、無血塊。本題問『何者為非』：C 稱『小便開始時之血尿表示膀胱是病灶來源』錯誤——初段血尿應指向**尿道/膀胱頸出口**而非膀胱體。其餘 A(感染/創傷/結石皆可致血尿)、B(頻尿急尿恥骨上痛→下尿路)、D(全段血尿→腎/輸尿管上尿路)皆正確。", "options": {"A": "正確(非答案)。感染、創傷、尿路結石、腫瘤皆為血尿常見原因。", "B": "正確(非答案)。頻尿/急尿、恥骨上疼痛屬下泌尿道(膀胱/尿道)症狀。", "C": "錯誤(本題答案)。初段血尿(小便開始)提示尿道/膀胱頸出口，而非膀胱體本身為病灶。", "D": "正確(非答案)。全段血尿代表出血在膀胱以上(腎臟、輸尿管等上尿路)。"}, "sources": ["Harrison 21e, Hematuria approach", "Brenner & Rector's The Kidney 11e, Hematuria", "AUA Microhematuria Guideline 2020"]}}, "107-TNPA-通論-30": {"quick": "發燒+單側腰腹痛+CVA 敲痛+WBC 18,200→急性腎盂腎炎(upper UTI)。", "detail": {"background": "急性腎盂腎炎為上泌尿道細菌感染(多 E. coli 上行)，典型三聯：發燒/寒顫、腰/側腹痛或肋脊角(CVA)敲痛、膿尿，常伴白血球增多、噁心嘔吐。診斷靠臨床+尿液分析(膿尿、菌尿、nitrite+)+尿培養；影像(超音波/CT)用於評估阻塞、結石、膿瘍、氣腫性腎盂腎炎(糖尿病)，或抗生素 48~72 小時無效時。治療：輕症可口服 fluoroquinolone，重症/敗血/孕婦/無法口服者住院靜脈三代 cephalosporin 或 fluoroquinolone±aminoglycoside。本題 32 歲女性發燒+右腰腹痛+右 CVA 敲痛+WBC 18,200→典型急性腎盂腎炎(B)。鑑別：急性心肌炎(心臟症狀)、骨盆腔感染(下腹/附件壓痛、性活躍、子宮頸搖痛)、細菌性腸炎(腹瀉為主、無 CVA 敲痛)皆不符。", "options": {"A": "錯(原卷『公告試題』為浮水印雜訊)。急性心肌炎表現為胸悶、心衰、心律不整，與腰痛 CVA 敲痛無關。", "B": "對。發燒+腰腹痛+CVA 敲痛+WBC↑→典型急性腎盂腎炎。", "C": "錯。急性骨盆腔感染(PID)以下腹/附件痛、子宮頸搖痛為主，無 CVA 敲痛。", "D": "錯。急性細菌性腸炎以腹瀉、腹部絞痛為主，不會有單側 CVA 敲痛。"}, "sources": ["Harrison 21e, Acute Pyelonephritis", "IDSA 2010 Pyelonephritis Guideline", "Brenner & Rector's The Kidney 11e"]}}, "108a-TNPA-內科-21": {"quick": "糖尿病女性發燒+CVA 敲痛+膿尿+低血壓徵象→急性腎盂腎炎(upper UTI)，診斷成『下泌尿道感染』最不適當。", "detail": {"background": "與 105-45 為同型題。本題糖尿病女性發燒、左腰肋觸痛(CVA)、血壓 94/62 偏低、心跳 100、WBC 13,500 中性球 84%、膿尿 80~90/HPF→典型 complicated **upper UTI(急性腎盂腎炎)**，已有偏低血壓須警覺 urosepsis。下泌尿道感染(膀胱炎)典型**無發燒、無 CVA 敲痛、無全身性反應**，本題明顯不符。正確處置：尿液培養(定菌)、血液培養(發燒/疑敗血)、腹部超音波(糖尿病者排除阻塞、膿瘍、氣腫性腎盂腎炎)、住院經驗性靜脈抗生素。題問『較不適當』→把它診斷為下泌尿道感染最不恰當(A)。", "options": {"A": "對(本題答案)。臨床為上泌尿道(腎盂腎炎)合併敗血徵象，診斷成下泌尿道感染會低估嚴重度，最不適當。", "B": "適當(非答案)。尿液培養可定菌與調整抗生素，腎盂腎炎標準作法。", "C": "適當(非答案)。糖尿病者腹部超音波可排除阻塞、膿瘍、氣腫性腎盂腎炎。", "D": "適當(非答案)。有低血壓敗血徵象，住院治療並血液培養恰當。"}, "sources": ["Harrison 21e, Complicated UTI / Pyelonephritis in DM", "IDSA 2010 Pyelonephritis Guideline", "Brenner & Rector's The Kidney 11e"]}}, "108b-TNPA-內科-30": {"quick": "疑阻塞性腎病致急性腎衰竭(腎結石史+少尿+導尿後仍少尿)→首選腎臟超音波(無輻射、無顯影劑、可快速看水腎)。", "detail": {"background": "急性腎損傷(AKI)分腎前性、腎性、腎後性(阻塞性)。本題 50 歲女性有腎結石史、近期大腸癌術後(可能輸尿管沾黏/壓迫)、少尿一週、Cr 16.5 mg/dL、放尿管後仍僅 30 mL(排除尿道/膀胱出口阻塞，提示上尿路雙側阻塞或腎實質衰竭)→須排除**阻塞性腎病(post-renal/obstructive uropathy)**。評估阻塞首選 **腎臟超音波(renal ultrasonography)**：無輻射、無顯影劑(對已腎衰者尤重要，避免顯影劑腎病)、床邊即可做，可看雙側水腎(hydronephrosis)、腎盂輸尿管擴張、結石。若超音波顯示水腎則進一步定位(CT urography 或順行/逆行腎盂攝影)並引流(經皮腎造瘻或輸尿管支架)。IVP/順行腎盂攝影需顯影劑或侵入性、VCUG 是評估下尿路逆流非上尿路阻塞，皆不適合做為首選。", "options": {"A": "錯。IVP 需靜脈顯影劑，在 Cr 16.5 的腎衰病人禁用(顯影劑腎病/腎衰已無法濃縮顯影)。", "B": "錯。順行腎盂攝影(antegrade pyelography)屬侵入性(經皮穿刺腎盂)，非首選初步檢查。", "C": "對。腎臟超音波無創、無顯影劑、可快速判定有無水腎/阻塞，為阻塞性 AKI 首選初步影像。", "D": "錯。VCUG(解尿膀胱尿道攝影)評估膀胱輸尿管逆流(下尿路)，無助於評估上尿路阻塞。"}, "sources": ["Harrison 21e, AKI / Obstructive Uropathy evaluation", "Brenner & Rector's The Kidney 11e, Urinary Tract Obstruction", "KDIGO AKI Guideline 2012"]}}, "108b-TNPA-內科-73": {"quick": "糖尿病控制良好之老年女性無症狀菌尿(即使培養 E. coli)不需治療，觀察即可(IDSA ASB 不治療)。", "detail": {"background": "ASB 在糖尿病、老年女性盛行率高，但 IDSA 2019 指引明確：**糖尿病者(無論控制好壞)、老年人、長照住民的 ASB 不篩檢也不治療**——大型隨機試驗(含糖尿病女性)顯示治療 ASB 不降低有症狀 UTI、不改善腎功能或預後，反增抗藥性與 C. difficile。本題 68 歲糖尿病控制良好女性、膿尿 20~30/HPF、尿培養 E. coli、**無發燒、無下泌尿道症狀、理學無異狀**→典型 ASB，正確處置為觀察不給抗生素(D)。膿尿單獨存在不是治療指標。例外仍是孕婦與泌尿侵入性處置前。陷阱：不要因『糖尿病』或『培養長菌』就投藥。", "options": {"A": "錯。無症狀菌尿給口服抗生素無益，反增抗藥性，IDSA 不建議。", "B": "錯。無症狀者無需住院更不需靜脈抗生素，過度醫療。", "C": "錯。無症狀菌尿無需常規超音波(無阻塞/結石/腎盂腎炎徵象)。", "D": "對。糖尿病(控制良好)老年女性之 ASB 觀察即可，暫不需抗生素，符合 IDSA 2019。"}, "sources": ["IDSA 2019 ASB Guideline (diabetes, elderly)", "Harrison 21e, ASB", "Brenner & Rector's The Kidney 11e"]}}, "108b-TNPA-外科-57": {"quick": "結石阻塞合併感染腎水腫(疑膿腎/urosepsis)→須儘速抗生素+解除阻塞引流，並避免盲目大量輸液致肺水腫；此情境『因尿少給大量輸液』不適當。", "detail": {"background": "本題為**結石阻塞合併感染(obstructive pyelonephritis/pyonephrosis)**——泌尿外科急症。53 歲男性發燒+劇烈腰痛+WBC 28,000+尿中大量 RBC/WBC+KUB 疑輸尿管結石+超音波右腎明顯水腎。阻塞遠端感染的膿尿無法引流，極易演變 urosepsis、敗血性休克，**核心處置=儘早經靜脈廣效抗生素 + 緊急解除阻塞引流**(逆行輸尿管雙J支架或經皮腎造瘻 PCN，視膿腎程度與穩定度選)。**結石本身的根除治療(碎石、取石)須延後到感染控制後**，急性感染期是體外震波碎石(ESWL)的禁忌。**少尿在此情境多源於阻塞(post-renal)而非血容積不足**——盲目給『大量(30 mL/kg 級)靜脈輸液』無法增加被阻塞側尿量、反而在敗血/腎功能受損下增加肺水腫與容積過載風險，故 D『因尿少給大量靜脈輸液』最不適當。輸液應依血流動力學謹慎滴定，真正解方是引流。", "options": {"A": "適當(非答案)。疑急性腎盂腎炎/膿腎，立即靜脈抗生素正確。", "B": "適當(非答案)。結石合併腎水腫須解除阻塞，內視鏡放雙J導管引流為合理選項。", "C": "適當(非答案)。膿腎/嚴重感染可經皮腎造瘻(PCN)引流膿尿，是標準引流途徑。", "D": "對(本題答案)。少尿源於阻塞而非低容積，盲目大量輸液無法增尿、反致容積過載/肺水腫，最不適當。"}, "sources": ["Harrison 21e, Obstructive Uropathy / Urosepsis", "AUA Surgical Management of Stones Guideline (infected obstruction → urgent decompression)", "EAU Urolithiasis Guideline"]}}, "108b-TNPA-通論-32": {"quick": "發燒+左腰脇痛+脊椎肋角敲痛+膿尿 80~100/HPF→急性腎盂腎炎(upper UTI)，故『單純性下泌尿道感染』敘述錯誤。", "detail": {"background": "急性腎盂腎炎致病途徑有二：(1)**上行性(ascending)**—腸道菌(E. coli)經尿道→膀胱→輸尿管→腎盂(最常見)；(2)**血行性(hematogenous)**—菌血症(如 S. aureus、結核)由血流播散至腎(較少見)。本題 32 歲女性左腰脇痛+噁心+發燒+左脊椎腰之間敲痛(CVA tenderness)+WBC 13,400 中性球 86%+CRP 4.8+膿尿 80~100/HPF→**急性腎盂腎炎(上泌尿道感染)**。題問『何者錯誤』：C『單純性下泌尿道感染』錯誤——有發燒、CVA 敲痛、全身性發炎反應，屬上泌尿道而非下泌尿道，且伴腰痛已非『單純性膀胱炎』。A(急性腎盂腎炎)、B(上行性感染機轉)、D(血行性播散機轉)皆正確。", "options": {"A": "正確(非答案)。臨床表現符合急性腎盂腎炎。", "B": "正確(非答案)。細菌經尿路逆行(上行)進入腎盂是最常見感染途徑。", "C": "錯誤(本題答案)。有發燒+CVA 敲痛屬上泌尿道感染(腎盂腎炎)，非單純性下泌尿道感染。", "D": "正確(非答案)。血行性播散(如菌血症)亦為腎盂腎炎可能途徑之一。"}, "sources": ["Harrison 21e, Pathogenesis of Pyelonephritis (ascending vs hematogenous)", "IDSA 2010 Pyelonephritis Guideline", "Brenner & Rector's The Kidney 11e"]}}, "108b-TNPA-通論-80": {"quick": "預防 CAUTI 不應『定期更換導尿管』——常規定期更換並無預防感染實證，反增菌入；應減少留置、無菌密閉系統、儘早移除。", "detail": {"background": "留置導尿管相關尿路感染(CAUTI)是台灣醫院病安年度工作目標之一。實證有效的預防措施(IDSA 2009、CDC HICPAC)：(1)**減少不必要的留置與置入(嚴格適應症)**;(2)**置入採無菌技術**;(3)**維持密閉式引流系統**(不可斷開連接、集尿袋低於膀胱且不觸地、不逆流);(4)**儘早移除導尿管**(每日評估必要性)。**不建議**的作法：常規『定期更換導尿管以防感染』——並無證據顯示固定週期更換能降低 CAUTI，反而每次更換都是一次菌入機會，僅在阻塞、感染、系統破壞或臨床指示時才更換;同樣不建議常規膀胱沖洗、預防性抗生素、常規篩檢/治療 ASB。故 B『應定期更換導尿管以防感染』為較不適當者。", "options": {"A": "適當(非答案)。減少不必要的留置導尿管是 CAUTI 預防核心。", "B": "對(本題答案)。常規『定期更換導尿管以防感染』無實證、反增菌入機會，較不適當；應依臨床指示更換。", "C": "適當(非答案)。維持引流系統密閉性可防逆行性感染。", "D": "適當(非答案)。放置導尿管採無菌操作可降低置入時污染。(原卷選項後黏附答案表為浮水印/頁尾雜訊)"}, "sources": ["IDSA 2009 CAUTI Prevention Guideline", "CDC/HICPAC Guideline for Prevention of CAUTI 2009", "台灣病人安全年度工作目標 (CAUTI bundle)"]}}, "109-進階-兒科-67": {"quick": "先天脊柱裂神經性膀胱+高度(IV)VUR 致反覆 UTI 與解尿困難→首選清潔間歇導尿(CIC)確保排空、降感染與保護上尿路。", "detail": {"background": "先天脊柱裂(spina bifida)常合併**神經性膀胱(neurogenic bladder)**：逼尿肌-括約肌不協調致殘尿、高膀胱內壓，繼發反覆 UTI、膀胱輸尿管逆流(VUR)、上尿路損害甚至腎衰竭。處置首要目標是**確保膀胱規律排空、降低膀胱內壓、保護腎功能**，標準作法為**清潔間歇導尿(clean intermittent catheterization, CIC)**搭配抗膽鹼藥(降逼尿肌壓力)，可顯著減少殘尿、UTI 與逆流惡化。第四度 VUR(輸尿管/腎盂腎盞中度擴張)在神經性膀胱情境下，**先以 CIC＋膀胱壓力管理為主**(很多逆流會隨膀胱壓力下降而改善)，外科(輸尿管重植、玻尿酸 Deflux 注射)留待保守治療無效或合併嚴重逆流/反覆突破性感染時。本題最合適為持續間歇性導尿(A)。", "options": {"A": "對。神經性膀胱致反覆 UTI 與排空困難，清潔間歇導尿確保排空、降膀胱內壓、保護上尿路，為首選。", "B": "錯。玻尿酸(Deflux)內視鏡注射用於較低度原發性 VUR；神經性膀胱高壓未控制前注射效果差，非首選。", "C": "錯。恥骨上膀胱造瘻為留置引流，增 CAUTI 風險且非神經性膀胱首選，保守(CIC)失敗才考慮改道。", "D": "錯。輸尿管重植術為外科矯正逆流，須先以 CIC 控制膀胱壓力；未處理底層神經性膀胱前手術易失敗。"}, "sources": ["Brenner & Rector's The Kidney 11e, VUR / Neurogenic Bladder", "Nelson Textbook of Pediatrics, Neurogenic Bladder & VUR", "AUA/EAU Pediatric Neurogenic Bladder Guideline"]}}, "109-通論-其他-23": {"quick": "預防復發性 UTI 衛教首選『性交前後排空膀胱』；抗生素須足療程、避免會陰道沖洗劑與盆浴(增逆行污染)。", "detail": {"background": "年輕女性復發性膀胱炎與性行為密切相關(性交將會陰/陰道口菌推入尿道，即『蜜月膀胱炎』)。實證有效的非藥物預防衛教：(1)**性交後(及性交前)排空膀胱**—沖出進入尿道的細菌，降低定殖;(2)多喝水、勿憋尿、規律排空;(3)排便後由前往後擦拭(避免肛門菌污染尿道口);(4)避免使用含殺精劑避孕(改變陰道菌叢促 E. coli 定殖)。**不建議**：常規會陰/陰道沖洗劑或灌洗(破壞陰道乳酸桿菌正常菌叢、反增 UTI 與陰道炎)、盆浴(坐浴使會陰污水接觸尿道口增逆行污染，宜淋浴)。**抗生素必須完成整個療程**(症狀緩解即停藥易致復發與抗藥)。本題最恰當為 C(性交前後排空膀胱)。", "options": {"A": "錯。抗生素須完成足療程，症狀緩解即停藥易復發並誘導抗藥性。", "B": "錯。常規使用會陰/陰道清潔劑會破壞陰道正常菌叢，反增 UTI 與陰道炎風險。", "C": "對。維持性交前後排空膀胱可沖出進入尿道的細菌，是復發性 UTI 的有效預防衛教。", "D": "錯。盆浴(坐浴)使會陰污水接觸尿道口增逆行污染，宜改淋浴；前後擦拭方向才是重點。"}, "sources": ["Harrison 21e, Recurrent UTI Prevention", "IDSA Recurrent UTI in Women Guideline (AUA/CUA/SUFU 2019)", "Brenner & Rector's The Kidney 11e"]}}, "109-進階-外科-76": {"quick": "鹿角結石(staghorn)主成分為磷酸銨鎂(struvite, MgNH4PO4)，非『鈣、氨及磷酸』；與產 urease 菌感染、鹼性尿(pH>7.2)相關。", "detail": {"background": "鹿角形結石(staghorn calculus)填滿腎盂腎盞、外形如鹿角，**主成分為 struvite(磷酸銨鎂 magnesium ammonium phosphate, MgNH4PO4·6H2O)**，常混合碳酸鈣磷灰石(carbonate apatite)，又稱『感染石(infection stone)』。形成機轉：**產 urease 細菌**(Proteus mirabilis 最典型，其他 Klebsiella、Pseudomonas、Staphylococcus、Ureaplasma)分解尿素(urea)→產生氨(NH3)與 CO2，氨使**尿液鹼化(pH 常>7.2)**，鹼性環境下 Mg²⁺、NH4⁺、PO4³⁻ 過飽和而沉澱成 struvite，並可快速長成鹿角石。治療：須**完整移除結石(常需經皮腎造瘻取石 PCNL)＋根除感染**(殘留結石碎片藏菌易復發與持續感染)，並長期抗生素/尿酸化。題問『何者錯誤』：A 稱主成分為『鈣、氨及磷酸』錯誤——應為**鎂、銨(氨)、磷酸(magnesium ammonium phosphate)**，含鎂而非以鈣為主。B(合併 UTI 須抗生素)、C(產 urease/相關菌種)、D(尿 pH>7.2)皆正確。", "options": {"A": "錯誤(本題答案)。鹿角結石主成分為磷酸銨鎂(struvite, 鎂+銨+磷酸)，非『鈣、氨及磷酸』。", "B": "正確(非答案)。感染石病人常合併 UTI，需以抗生素治療並根除感染。", "C": "正確(非答案)。常見產 urease 菌含 Proteus mirabilis、Pseudomonas aeruginosa、Klebsiella 等。", "D": "正確(非答案)。urease 分解尿素產氨使尿鹼化，pH 通常>7.2 利於 struvite 沉澱。"}, "sources": ["Brenner & Rector's The Kidney 11e, Struvite/Infection Stones", "Harrison 21e, Nephrolithiasis", "AUA Surgical Management of Stones (staghorn/PCNL)"]}}, "109-進階-外科-78": {"quick": "fluoroquinolone 對攝護腺穿透性『佳』、是攝護腺炎第一線；題目稱穿透不佳故錯誤。", "detail": {"background": "本題考 UTI/攝護腺炎抗生素藥理。(1)**aminoglycoside(如 gentamicin、amikacin)**經腎排泄、具腎與耳毒性，**腎功能不全須依 CrCl 調整劑量**並監測血中濃度與腎功能(正確)。(2)**fluoroquinolone(ciprofloxacin、levofloxacin)對攝護腺組織穿透性良好(脂溶性高、達高組織濃度)，是急/慢性細菌性攝護腺炎的第一線藥**——題目稱『穿透性不佳、非第一線』與事實相反，故為錯誤敘述(本題答案)；相對地許多 β-lactam 穿透攝護腺差。(3)為避免抗藥性，須謹慎選藥與決定療程天數(antibiotic stewardship，正確)。(4)第一代 cephalosporin(如 cephalexin、cefazolin)對革蘭氏陽性菌效果好，對部分腸內菌科(E. coli、Proteus mirabilis、Klebsiella)亦有效，常用於單純 UTI(大致正確)。", "options": {"A": "正確(非答案)。aminoglycoside 腎排泄、有腎毒性，腎功能不全須調整劑量並監測。", "B": "錯誤(本題答案)。fluoroquinolone 對攝護腺穿透性『佳』，是細菌性攝護腺炎第一線，題述相反。", "C": "正確(非答案)。謹慎選藥與療程天數以避免抗藥性，符合抗生素管理原則。", "D": "正確(非答案)。第一代 cephalosporin 對 G(+)菌佳，亦可涵蓋 E. coli、Proteus、Klebsiella 等常見尿路菌。"}, "sources": ["Harrison 21e, Prostatitis / UTI Treatment", "Goodman & Gilman, Fluoroquinolones (prostate penetration)", "IDSA/EAU Prostatitis Guideline"]}}, "110-進階-兒科-68": {"quick": "Proteus mirabilis(產 urease→鹼性尿)UTI 促進感染性結石(struvite)形成；thiazide、檸檬酸鉀、allopurinol 反而是防石/降石藥。", "detail": {"background": "本題問何者『增加』腎結石形成機會。(1)**Proteus mirabilis(或其他產 urease 菌)UTI**：分解尿素產氨→尿鹼化→促 struvite(磷酸銨鎂)感染石形成，**增加結石風險**(本題答案)。(2)**thiazide 利尿劑**：減少遠端腎小管鈣排泄→**降低尿鈣→預防鈣結石**(是治療高尿鈣結石的藥)。(3)**檸檬酸鉀(potassium citrate)**：鹼化尿液、提高尿中檸檬酸(天然鈣結石抑制因子)，**用於遠端 RTA、低檸檬酸尿、尿酸/胱胺酸結石的預防**，是防石藥。(4)**allopurinol**：抑制黃嘌呤氧化酶降尿酸→**預防尿酸結石與高尿酸尿性鈣結石**。故唯一增加結石機會者為 A(Proteus UTI)。記憶：感染石=struvite=產 urease 菌(Proteus 最典型)。", "options": {"A": "對。Proteus mirabilis UTI 產 urease→鹼性尿→促 struvite 感染石形成，增加結石機會。", "B": "錯。thiazide 降尿鈣，是預防鈣結石的藥，不增加反降低結石風險。", "C": "錯。檸檬酸鉀鹼化尿並提高檸檬酸(結石抑制因子)，用於防石(含遠端 RTA)。", "D": "錯。allopurinol 降尿酸，預防尿酸結石與高尿酸尿性鈣結石。"}, "sources": ["Brenner & Rector's The Kidney 11e, Stone Prevention (citrate, thiazide)", "Harrison 21e, Nephrolithiasis", "AUA Medical Management of Kidney Stones Guideline"]}}, "110-進階-兒科-69": {"quick": "兒童 UTI 最常見致病菌同成人，仍為 Escherichia coli。", "detail": {"background": "兒童泌尿道感染(尤其嬰幼兒)是常見且需重視的感染——可能合併先天泌尿異常(VUR、後尿道瓣膜、腎積水)且反覆腎盂腎炎可致腎結痂(renal scarring)、日後高血壓與慢性腎病。**致病菌仍以 E. coli 為首(約 80%)**，其次 Klebsiella、Proteus(男童、與包皮垢/struvite 相關)、Enterococcus、Pseudomonas(住院/反覆者)。診斷：嬰幼兒可導尿或恥骨上抽取尿(避免袋尿污染)送培養;發燒型 UTI(腎盂腎炎)後須評估上尿路(超音波)，反覆或異常者考慮 VCUG(看 VUR)、DMSA(看腎結痂/急性腎盂腎炎)。本題答案為 B(E. coli)。", "options": {"A": "錯。Enterococcus 為次要病原(住院、反覆、有導管者較多)，非最常見。", "B": "對。E. coli 是兒童 UTI 最常見致病菌(約 80%)，與成人一致。", "C": "錯。Klebsiella pneumoniae 為次常見之一，非首位。", "D": "錯。Proteus mirabilis 在男童/包皮垢/struvite 結石相關較多，整體仍少於 E. coli。"}, "sources": ["Nelson Textbook of Pediatrics, UTI in Children", "Harrison 21e, UTI Microbiology", "AAP UTI in Febrile Infants Guideline"]}}, "110-進階-內科-7": {"quick": "非孕、無症狀年輕女性體檢偶見菌尿(ASB)→不需處置/不予理會，僅孕婦或泌尿手術前才治療。", "detail": {"background": "26 歲非孕、無不適女性體檢尿中見細菌，符合 asymptomatic bacteriuria(ASB)定義。IDSA 2019：**健康非孕成年女性的 ASB 不應篩檢也不應治療**——治療不降低有症狀 UTI、不改善預後，反增抗藥性。題目情境為健康無症狀者，正確處置是『若無不適則不予理會(觀察)』(C)。例外仍是孕婦與會造成黏膜出血的泌尿侵入性處置前。陷阱：A『回診複檢排除下泌尿道感染』屬過度檢查(無症狀不需);D『口服抗生素治療』是錯誤的不必要用藥;B 自行退燒亦不當(若真發燒應就醫評估而非自行處理，但本題重點在無症狀不需治療)。", "options": {"A": "錯。無症狀者不需回診複檢去『排除下泌尿道感染』，屬過度檢查。", "B": "錯。若發燒代表可能轉為有症狀感染，應就醫評估而非自行退燒，且偏離 ASB 不治療的核心。", "C": "對。非孕、無症狀的菌尿(ASB)若無不適則不予理會(觀察)，符合 IDSA 2019。", "D": "錯。對無症狀菌尿給口服抗生素無益、反增抗藥性，不應治療。"}, "sources": ["IDSA 2019 ASB Guideline (non-pregnant women)", "Harrison 21e, ASB", "Brenner & Rector's The Kidney 11e"]}}, "110-進階-內科-68": {"quick": "年輕(性活躍)未孕女性社區膀胱炎之第二常見菌、且本選項中最可能尿路致病者為 Staphylococcus saprophyticus。", "detail": {"background": "性活躍年輕女性社區單純性膀胱炎致病菌中，**E. coli 第一、Staphylococcus saprophyticus 第二常見**(約佔 5~15%)。S. saprophyticus 為凝固酶陰性葡萄球菌、novobiocin 抗性，好發於性活躍年輕女性、常於下午就診、易合併較高的上尿路侵犯傾向。本題選項中 E. coli 未列，須在 Lactobacillus、Enterococcus、S. saprophyticus、group B streptococcus 中挑『最可能致病菌』→**S. saprophyticus**(C)。其餘：Lactobacillus 為陰道正常菌叢(常為污染、非致病);Enterococcus 多見於院內/複雜性/有器械操作者，非年輕健康女性社區典型;group B streptococcus(S. agalactiae)主要與孕婦定殖、新生兒感染相關，非年輕女性膀胱炎典型致病菌。", "options": {"A": "錯。Lactobacillus 是陰道正常菌叢，尿中出現多為污染、非尿路致病菌。", "B": "錯。Enterococcus 較見於院內、複雜性 UTI、器械操作後，非年輕健康女性社區膀胱炎典型。", "C": "對。S. saprophyticus 是性活躍年輕女性社區膀胱炎第二常見致病菌(僅次 E. coli)。", "D": "錯。group B streptococcus 主要與孕婦定殖/新生兒感染相關，非年輕女性膀胱炎典型病原。"}, "sources": ["Harrison 21e, UTI in Young Women (S. saprophyticus)", "IDSA 2010 Uncomplicated Cystitis Guideline", "Mandell Principles & Practice of Infectious Diseases"]}}, "110-通論-其他-48": {"quick": "突發單側嚴重腹痛放射至腹股溝/生殖器+血尿+無發燒+CVA 敲痛→腎/輸尿管結石(renal stone)，非腎盂腎炎(無發燒)。", "detail": {"background": "本題鑑別右側絞痛+血尿。**腎結石/輸尿管結石(renal stone)**：突發、絞痛、由腰背放射至腹股溝及生殖器(loin to groin)、伴血尿、坐立難安、**典型無發燒、無排尿困難**，CVA 敲痛陽性，符合本題(B)。鑑別：(1)pyelonephritis—應發燒、為持續鈍痛、膿尿，本題明確『否認發燒』故排除;(2)testicular torsion(睪丸扭轉)—陰囊急性劇痛腫脹、提睪反射消失、為泌尿外科急症，但本題生殖器檢查正常且痛在脇部放射至腹股溝，不符;(3)acute prostatitis(急性前列腺炎)—發燒、會陰/直腸痛、解尿困難、攝護腺觸痛，本題直腸檢查正常無發燒，不符。診斷腎結石首選 non-contrast CT KUB。", "options": {"A": "錯。pyelonephritis 應有發燒、膿尿、持續鈍痛，本題明確否認發燒，不符。", "B": "對。突發絞痛放射至腹股溝生殖器+血尿+無發燒+CVA 敲痛→腎/輸尿管結石。", "C": "錯。睪丸扭轉表現為陰囊急性劇痛腫脹、提睪反射消失，本題生殖器檢查正常。", "D": "錯。急性前列腺炎應有發燒、解尿困難、攝護腺觸痛，本題直腸檢查正常無發燒。"}, "sources": ["Harrison 21e, Nephrolithiasis / Flank Pain", "Brenner & Rector's The Kidney 11e, Urinary Stones", "ACR Appropriateness Criteria, Acute Flank Pain"]}}, "110-進階-外科-67": {"quick": "鹿角結石(成分磷酸銨鎂/struvite)與產 urease 的 Proteus mirabilis 最相關(鹼性尿→感染石)。", "detail": {"background": "本題明示結石成分為**磷酸銨鎂(struvite)鹿角結石**，問與結石最相關的致病菌→**Proteus mirabilis**(B)。機轉：Proteus 為強力產 urease 菌，分解尿素產氨→尿鹼化(pH↑)→Mg²⁺/NH4⁺/PO4³⁻ 過飽和沉澱成 struvite 感染石，並快速長成鹿角形。本題尿檢有顯著膿尿(WBC 80~90)＋血尿，符合 struvite 感染石合併 UTI。其餘：Streptococcus pneumoniae 為呼吸道病原非尿路產 urease 菌;Enterococcus faecalis 雖可致 UTI 但不產 urease、與 struvite 無特定關聯;E. coli 是最常見 UTI 菌但**不產 urease**、與感染石無關。治療須完整移除結石(PCNL)＋根除感染。", "options": {"A": "錯。S. pneumoniae 為呼吸道病原，非尿路產 urease 菌，與 struvite 無關。", "B": "對。Proteus mirabilis 強力產 urease→鹼性尿→促磷酸銨鎂(struvite)感染石，與鹿角石最相關。", "C": "錯(原文 Enterococcus faecalis)。可致 UTI 但不產 urease，與 struvite 結石無特定關聯。", "D": "錯(原文 Escherichia coli)。最常見 UTI 菌但不產 urease，與感染性結石無關。"}, "sources": ["Brenner & Rector's The Kidney 11e, Struvite Stones (Proteus/urease)", "Harrison 21e, Nephrolithiasis", "AUA Surgical Management of Stones"]}}, "110-進階-婦產科-38": {"quick": "妊娠婦女無症狀菌尿(ASB)最常見致病原仍為 Escherichia coli。", "detail": {"background": "孕婦因黃體素使輸尿管平滑肌鬆弛、子宮壓迫致尿滯留與生理性腎積水，ASB 盛行率約 2~7%，且**孕婦 ASB 若不治療約 20~40% 會進展為腎盂腎炎、並增早產與低體重風險**，故孕婦 ASB 是 IDSA 例外族群——**須篩檢(產檢早期尿培養)並治療**(選孕期安全抗生素：β-lactam、孕中期 nitrofurantoin、fosfomycin)。**致病菌以 E. coli 為最常見(約 70~80%)**，其次 Klebsiella、Proteus、group B streptococcus(GBS，注意 GBS 菌尿亦提示產時須預防新生兒感染)。本題答案 D(E. coli)。其餘 S. aureus、Candida、GBS 皆非孕婦 ASB 最常見原。", "options": {"A": "錯。S. aureus 非孕婦 ASB 常見上行病原(尿中見之反警覺血行播散)。", "B": "錯。Candida(白色念珠菌)多見於導管/糖尿病/免疫低下定殖，非孕婦 ASB 最常見。", "C": "錯。GBS(S. agalactiae)雖可致孕婦菌尿且與新生兒感染相關，但非『最常見』致病原。", "D": "對。Escherichia coli 為妊娠婦女 ASB 最常見致病原(約 70~80%)。"}, "sources": ["IDSA 2019 ASB Guideline (pregnancy, screen & treat)", "Harrison 21e, UTI in Pregnancy", "ACOG Committee Opinion, UTI in Pregnancy"]}}, "111-通論-5分科-50": {"quick": "頻繁性交及殺精劑避孕會增加 UTI 風險(正確)；免疫抑制者 ASB 仍不常規治療、男性『因有前列腺』非較易 UTI、糖尿病女性 ASB 多於男性。", "detail": {"background": "本題綜合住院/常見 UTI 危險因子。(A)免疫抑制劑使用者的 ASB——指引(IDSA 2019)未把一般免疫抑制者列為常規治療對象(實體器官移植早期等特定情境另有考量，但常規免疫抑制非全面治療指徵)，且『為避免副作用所以不治療』的推論在 ASB 本就不治療的前提下並不正確地表述為通則;(B)『男性因有前列腺較容易 UTI』錯誤——男性因尿道長、前列腺分泌物有抑菌作用，UTI 反而較少;前列腺肥大致殘尿才增風險，但敘述本身把『有前列腺』當成易感因子是錯的;(C)糖尿病女性 ASB/UTI 盛行率**高於男性**，並非『男女皆容易』地等同;(D)**頻繁性交與使用殺精劑避孕確實增加 UTI 風險**(性交把菌推入尿道、殺精劑改變陰道菌叢促 E. coli 定殖)——正確(本題答案)。", "options": {"A": "錯。ASB 本就以不治療為原則；把『免疫抑制者 ASB 為避免副作用不治療』當通則表述並不正確(且移植早期等特殊情境另議)。", "B": "錯。男性尿道長、前列腺分泌物抑菌，UTI 較女性少;『有前列腺』非易感因子(殘尿才是)。", "C": "錯。糖尿病女性 ASB/UTI 盛行率明顯高於男性，非『男女皆容易』等同。", "D": "對(本題答案)。頻繁性交與殺精劑避孕(改變陰道菌叢促 E. coli 定殖)會增加 UTI 風險。"}, "sources": ["Harrison 21e, UTI Risk Factors", "IDSA 2019 ASB Guideline", "Brenner & Rector's The Kidney 11e"]}}, "111-通論-5分科-51": {"quick": "前段(初段)血尿提示來自尿道/會陰出口；終段提示膀胱頸/三角;全段提示上尿路;無痛性血尿須警覺泌尿道腫瘤而非僅慢性膀胱炎。", "detail": {"background": "血尿出現時機定位(同 107-通論-25)：(1)**初段/前段血尿**—出血在**尿道(前尿道)或膀胱頸出口/會陰出口**;(2)**終段血尿(解到快完時)**—出血在**膀胱頸、膀胱三角、後尿道**;(3)**全段血尿**—出血在膀胱以上(輸尿管、腎臟上尿路)。**無痛性肉眼血尿**是泌尿上皮癌(尤其膀胱癌)的重要警訊，必須完整評估(尿細胞學、膀胱鏡、上尿路影像)，**不可僅歸因於慢性膀胱炎**。本題 50 歲女性、美髮業(芳香胺等職業暴露為膀胱癌危險因子)、結石史、無痛性血尿——更須排除腫瘤。題問『何者正確』：A『整段尿都是血代表下尿路』錯(全段→上尿路);B『解到快完時出血→膀胱出血』方向對但更精確是膀胱頸/三角(此選項較粗略，非最佳);C『前段尿就有血須排除來自會陰出口的問題』正確(初段血尿提示尿道/會陰出口);D『無痛性血尿是慢性膀胱炎表徵』錯(無痛性血尿首要排除腫瘤)。最正確為 C。", "options": {"A": "錯。整段(全段)血尿代表出血在膀胱以上(輸尿管、腎臟上尿路)，非下尿路。", "B": "錯/不精確。終段血尿提示膀胱頸/三角/後尿道而非泛指『膀胱』體出血，定位不夠準確。", "C": "對。前段(初段)血尿提示出血來自尿道/會陰出口，須排除該處病灶。", "D": "錯。無痛性肉眼血尿是泌尿道腫瘤(膀胱癌)的重要警訊，須先排除腫瘤，非慢性膀胱炎表徵。"}, "sources": ["Harrison 21e, Hematuria Approach", "AUA Microhematuria Guideline 2020 (painless hematuria → malignancy work-up)", "Brenner & Rector's The Kidney 11e"]}}, "111-進階-兒科-65": {"quick": "VUR 逆流至輸尿管+腎盂、腎盞輕微擴張→第三級(grade III)。", "detail": {"background": "膀胱輸尿管逆流(VUR)依 VCUG 表現分為 I~V 級(International Reflux Study Classification)：**Grade I**—逆流僅達輸尿管，未到腎盂;**Grade II**—逆流達腎盂腎盞但**無擴張**，腎盞穹窿正常;**Grade III**—逆流達腎盂腎盞並有**輕度~中度擴張、輸尿管輕度迂曲**，腎盞穹窿輕鈍但仍維持;**Grade IV**—中度擴張迂曲、腎盞穹窿鈍化但仍可見乳頭印痕;**Grade V**—嚴重擴張迂曲、腎盞嚴重變形、乳頭印痕消失。本題『逆流至輸尿管和腎盂，且腎盞有輕微擴張』→符合 **Grade III(第三級)**(C)。臨床意義：低級(I~II)多可自癒以預防性抗生素觀察;高級(IV~V)或反覆突破性感染/腎結痂者考慮 Deflux 注射或輸尿管重植。", "options": {"A": "錯。第一級逆流僅達輸尿管，未到腎盂腎盞，無擴張。", "B": "錯。第二級逆流達腎盂腎盞但無任何擴張。", "C": "對。逆流達腎盂腎盞並腎盞輕微擴張→第三級(grade III)。", "D": "錯。第四級為中度擴張迂曲、腎盞穹窿鈍化，較本題『輕微擴張』為重。"}, "sources": ["Nelson Textbook of Pediatrics, VUR Grading", "Brenner & Rector's The Kidney 11e, Reflux Nephropathy", "International Reflux Study Classification (I–V)"]}}, "111-進階-兒科-68": {"quick": "評估 UTI 嚴重度(ALN、膿腎、腎膿瘍)用超音波/DMSA/CT;VCUG 是評估膀胱輸尿管逆流而非感染嚴重度，故無助於嚴重度判定。", "detail": {"background": "兒童複雜/嚴重 UTI 評估的影像工具各有用途：(1)**腎臟超音波(renal sonography)**—第一線、無輻射，可看腎積水、膿腎(pyonephrosis)、腎膿瘍、結石、結構異常;(2)**DMSA 腎掃描**—評估腎實質受損，可顯示**急性腎盂腎炎/急性大葉性腎炎(ALN)的局部攝取缺損**與日後**腎結痂(renal scar)**，是評估腎實質受侵與嚴重度的利器;(3)**腎臟電腦斷層(CT)**—對腎膿瘍、ALN、膿腎、氣腫性感染、解剖細節解析度最高;(4)**VCUG(解尿膀胱尿道攝影)**—是評估**膀胱輸尿管逆流(VUR)與下尿路解剖**的工具，**不能評估目前感染的嚴重度/腎實質侵犯**。題問『何者無助於診斷 UTI 嚴重度』→**VCUG(B)**。", "options": {"A": "有助(非答案)。腎臟超音波可看膿腎、腎膿瘍、積水、結構異常。", "B": "對(本題答案)。VCUG 評估膀胱輸尿管逆流(下尿路解剖)，無助於判定 ALN/膿腎/腎膿瘍等感染嚴重度。", "C": "有助(非答案)。DMSA 腎掃描顯示腎實質攝取缺損(ALN/急性腎盂腎炎)與腎結痂。", "D": "有助(非答案)。腎臟 CT 對腎膿瘍、ALN、膿腎解析度最高。"}, "sources": ["Nelson Textbook of Pediatrics, Imaging in Pediatric UTI (US/DMSA/VCUG roles)", "AAP UTI Guideline", "Brenner & Rector's The Kidney 11e"]}}, "111-進階-兒科-69": {"quick": "後尿道瓣膜阻塞+UTI 致 AKI 與高鉀低鈉酸中毒，屬醛固酮『阻抗/作用不足』之第4型 RTA，但此情境醛固酮多『升高』而非低下，故『aldosterone 低』敘述最不適當。", "detail": {"background": "後尿道瓣膜(posterior urethral valves, PUV)是男嬰下尿路阻塞最常見先天原因，致膀胱出口阻塞、雙側腎積水、反覆 UTI、阻塞性腎病與腎發育不良。本題男嬰急性出現低血鈉(Na 114)、高血鉀(K 7.0)、代謝性酸中毒(HCO3 12、pH 7.30)、AKI(Cr 由 0.8→2.0)、TTKG 偏低(4.2，提示高鉀下腎臟排鉀不足)、E. coli UTI。此電解質型態(高鉀+高氯型代謝性酸中毒+低鈉)為**第4型腎小管酸血症(type 4 RTA)/醛固酮作用不足型**——在阻塞性腎病與間質受損時，遠端腎小管對醛固酮『反應/阻抗』下降(aldosterone resistance)，導致排鉀排氫不足→高鉀代謝性酸中毒。**此時血中 aldosterone 通常因高血鉀刺激而『升高』(代償，但腎小管阻抗使其作用不足)，而非低下**。故 D『病嬰血中醛固酮低』最不適當(本題答案)。A(與 UTI 相關)、B(與阻塞相關)、C(出現第4型 RTA)皆正確。", "options": {"A": "正確(非答案)。E. coli 菌落>10^5 之 UTI，與此急性病程相關。", "B": "正確(非答案)。後尿道瓣膜致下尿路阻塞(obstruction)，是病因核心。", "C": "正確(非答案)。高鉀+代謝性酸中毒+TTKG 不適當偏低→第4型 RTA(醛固酮作用不足型)。", "D": "錯誤(本題答案)。第4型 RTA 在阻塞性腎病多為醛固酮『阻抗』，血中 aldosterone 常因高鉀代償而升高，非低下。"}, "sources": ["Brenner & Rector's The Kidney 11e, Type 4 RTA / Obstructive Uropathy", "Harrison 21e, RTA / Hyperkalemia", "Nelson Textbook of Pediatrics, Posterior Urethral Valves"]}}, "112-進階-兒科-68": {"quick": "確診 UTI 的金標準是『中段尿細菌培養達菌落數標準(E. coli ≥10^5 CFU/mL)』，症狀與尿檢僅是提示。", "detail": {"background": "UTI 的診斷：症狀(頻尿、解尿痛)與尿液分析(膿尿、nitrite+、leukocyte esterase+)提供臨床提示與篩檢，但**確診(definitive diagnosis)需『尿液細菌培養』長出致病菌並達菌落數閾值**。閾值依採尿方式：中段清潔尿女性≥10^5 CFU/mL(有症狀者≥10^2~10^3 亦可)、導尿尿≥10^2~10^4、恥骨上抽取尿任何量。本題選項中 D『中段尿培養 E. coli 10^5 CFU/mL』達標→**最能確定診斷 UTI**(D)。其餘：A 症狀(頻尿解尿痛)非特異(陰道炎、尿道症候群亦有);B 膿尿(WBC 20~30)可見於非感染性發炎或污染;C nitrite+提示腸內菌但敏感度低、單獨不足以確診。故診斷金標準是尿培養。", "options": {"A": "錯。頻尿解尿痛是症狀提示，特異度不足(陰道炎、間質性膀胱炎等亦有)，不能確診。", "B": "錯。膿尿(WBC 20~30/HPF)是發炎/感染指標但可見於污染或非感染性發炎，單獨不能確診。", "C": "錯。nitrite+提示腸內菌科但敏感度低(需菌量足且尿停留夠久)，單項不足確診。", "D": "對。中段尿培養 E. coli ≥10^5 CFU/mL 達閾值，是確診 UTI 的標準依據。"}, "sources": ["Harrison 21e, UTI Diagnosis (urine culture thresholds)", "IDSA 2010 UTI Guideline", "AAP/Nelson Pediatric UTI Diagnosis"]}}, "112-進階-內科-70": {"quick": "高齡無症狀菌尿『並非皆須抗生素』——IDSA 不治療老年 ASB;其餘(48~72h 無效查超音波、G(-)菌為腎盂腎炎主因、無菌性膿尿警覺 STI)皆正確。", "detail": {"background": "本題問『何者錯誤』。(A)『高齡無症狀菌尿皆須抗生素以降敗血休克風險』**錯誤(本題答案)**——IDSA 2019 明確不建議治療老年 ASB，治療無益反增抗藥性與 C. difficile，敗血休克的預防靠的是辨識有症狀感染而非廣篩濫治 ASB。(B)正確——腎盂腎炎經適當抗生素 48~72 小時仍持續發燒/腰痛，須做腎臟超音波(或 CT)排除尿路阻塞、結石、膿瘍、氣腫性腎盂腎炎等併發症。(C)正確——急性腎盂腎炎最常見病原為革蘭氏陰性桿菌(E. coli 等腸內菌科)。(D)正確——性活躍者出現『無菌性膿尿(sterile pyuria，膿尿但常規培養陰性)』須留意性傳播感染(如 Chlamydia、Gonorrhea 尿道炎)、結核等特殊病原。", "options": {"A": "錯誤(本題答案)。高齡 ASB 不須常規抗生素(IDSA 2019)，治療無益反增抗藥性與 C. difficile。", "B": "正確(非答案)。腎盂腎炎抗生素 48~72h 無改善須影像排除阻塞/膿瘍。", "C": "正確(非答案)。革蘭氏陰性桿菌(E. coli)為急性腎盂腎炎主要病原。", "D": "正確(非答案)。性活躍者無菌性膿尿須留意性傳播感染(Chlamydia、淋病等)。"}, "sources": ["IDSA 2019 ASB Guideline (elderly)", "Harrison 21e, Pyelonephritis follow-up imaging / sterile pyuria", "IDSA 2010 UTI Guideline"]}}, "112-通論-其他-58": {"quick": "dysuria=解尿時疼痛/灼熱(非解不出來);男性下尿路感染常主訴解尿時陰莖底部/會陰疼痛。", "detail": {"background": "下泌尿道感染刺激膀胱與尿道，造成排尿相關症狀群(下尿路症狀 LUTS)：**dysuria(排尿疼痛/灼熱感，非『解不出來』，後者為 urinary retention/尿滯留)**、frequency(頻尿，尿量反而少而次數多，非尿量變多)、urgency(急尿)、恥骨上不適。男性因尿道較長，下尿路/攝護腺受刺激時常主訴**解尿時陰莖底部、會陰或骨盆底疼痛**(但典型不會描述成『燒灼感由骨盆底擴散到直腸』——那較像攝護腺炎的會陰直腸不適)。本題問『何者正確』：A『dysuria 指解不出來』錯(dysuria 是解尿痛);B『女性主訴尿量變多』錯(UTI 是頻尿但每次尿量少);C『男性主訴骨盆底燒灼感擴散到直腸』描述偏攝護腺炎、非膀胱炎典型且敘述不精確;D『男性主要是解尿時陰莖底部疼痛』正確(本題答案)。", "options": {"A": "錯。dysuria 指解尿時疼痛/灼熱，而非『解不出來』(解不出來是尿滯留)。", "B": "錯。UTI 為頻尿(次數多)但每次尿量反而少，非尿量變多。", "C": "錯。骨盆底燒灼感擴散到直腸較屬攝護腺炎表現，非單純膀胱炎典型且不精確。", "D": "對。男性下尿路感染常主訴解尿時陰莖底部/會陰疼痛。"}, "sources": ["Harrison 21e, UTI Clinical Manifestations (dysuria, frequency)", "Brenner & Rector's The Kidney 11e", "Campbell-Walsh Urology, LUTS"]}}, "112-進階-外科-64": {"quick": "血尿常見原因為感染、結石、腫瘤;『直腸膀胱廔管』表現為氣尿/糞尿而非典型血尿，最不適當。", "detail": {"background": "血尿常見原因可依部位/機轉分：(1)感染(UTI、出血性膀胱炎、攝護腺炎)、(2)結石(刮傷尿路上皮)、(3)腫瘤(膀胱癌、腎細胞癌、攝護腺癌——尤其無痛性肉眼血尿須優先排除)、(4)腎絲球疾病(腎炎，伴 dysmorphic RBC/蛋白尿)、(5)創傷、(6)藥物(抗凝、cyclophosphamide)、(7)劇烈運動。**直腸膀胱廔管(rectovesical fistula)**是直腸與膀胱間異常通道(常因憩室炎、克隆氏症、骨盆腫瘤或手術後)，其典型表現是**氣尿(pneumaturia，尿中有氣泡)與糞尿(fecaluria，尿中混糞便)及反覆多重菌 UTI**，**而非以血尿為主**，故為『不適當(最不像血尿原因)』者(C)。", "options": {"A": "適當(非答案)。泌尿道感染是血尿常見原因之一。", "B": "適當(非答案)。尿路結石刮傷尿路上皮致血尿，常見。", "C": "對(本題答案)。直腸膀胱廔管典型為氣尿/糞尿與反覆 UTI，而非以血尿表現，最不適當。", "D": "適當(非答案)。泌尿道腫瘤(膀胱癌等)是無痛性血尿的重要原因。"}, "sources": ["Harrison 21e, Hematuria Differential", "Campbell-Walsh Urology, Vesicoenteric Fistula (pneumaturia/fecaluria)", "AUA Microhematuria Guideline"]}}, "112-進階-外科-65": {"quick": "UTI 標準診斷=尿液分析+尿液培養;多為上行性(非血行)、女性多於男性、病原以細菌(非病毒)為主。", "detail": {"background": "本題問『何者正確』。(A)『常經由血行性感染造成腎盂腎炎』錯——腎盂腎炎**最常見為上行性(ascending)**感染(腸道菌經尿道上行)，血行性較少見。(B)『發生率男性大於女性』錯——女性尿道短、近肛門，UTI 發生率**遠高於男性**(育齡女性尤甚;男性僅在嬰兒期與老年 BPH 後上升)。(C)『病原以病毒為大宗』錯——UTI 病原**絕大多數為細菌**(E. coli 為首)，病毒性 UTI 少見(如腺病毒致出血性膀胱炎、BK 病毒在免疫低下)。(D)『標準診斷方法是尿液分析及尿液培養』**正確(本題答案)**——尿液分析(膿尿、nitrite、LE)＋中段尿培養(定菌定量定藥敏)是 UTI 診斷標準。", "options": {"A": "錯。UTI/腎盂腎炎最常見為上行性感染，血行性較少見。", "B": "錯。女性 UTI 發生率遠高於男性(尿道短、近肛門)。", "C": "錯。UTI 病原以細菌(E. coli)為主，病毒少見。", "D": "對。尿液分析＋尿液培養是 UTI 的標準診斷方法。"}, "sources": ["Harrison 21e, UTI Epidemiology & Diagnosis", "IDSA 2010 UTI Guideline", "Brenner & Rector's The Kidney 11e"]}}, "112-進階-外科-66": {"quick": "急性泌尿道感染是體外震波碎石(ESWL)的絕對禁忌(可致 urosepsis 與感染擴散)。", "detail": {"background": "體外震波碎石(extracorporeal shock wave lithotripsy, ESWL)用高能震波由體外將結石碎裂後隨尿排出。**絕對禁忌**：(1)**懷孕**(震波傷胎);(2)**未控制的凝血功能異常/抗凝中**(腎被膜下/腎周血腫風險);(3)**急性泌尿道感染/未控制的 UTI**——震波可使結石內藏菌與感染擴散、誘發 urosepsis;(4)阻塞在結石遠端(碎石無法排出);(5)未矯正的動脈瘤(腎/腹主動脈瘤於震波路徑)。**相對禁忌/降低成功率**：肥胖/體表至結石距離過遠(震波衰減)、結石過大(>2 cm，常需 PCNL)、過硬結石(胱胺酸、草酸鈣一水合物)、結石位置(下腎盞清石率低)。本題問『絕對禁忌』→**急性感染(B)**。肥胖、結石>2 cm、距離遠屬相對禁忌或影響成功率，非絕對禁忌。", "options": {"A": "錯。肥胖使震波衰減、成功率下降，屬相對禁忌/技術困難，非絕對禁忌。", "B": "對。急性(未控制)泌尿道感染是 ESWL 絕對禁忌(碎石可致感染擴散與 urosepsis)。", "C": "錯。結石>2 cm 成功率低、常改用 PCNL，屬相對禁忌而非絕對禁忌。", "D": "錯。體表至結石距離過遠使震波衰減、降低成功率，屬技術限制非絕對禁忌。"}, "sources": ["AUA Surgical Management of Stones Guideline (ESWL contraindications)", "EAU Urolithiasis Guideline", "Campbell-Walsh Urology, ESWL"]}}, "112-進階-外科-67": {"quick": "可視性(肉眼)血尿之惡性腫瘤中以『膀胱(尿路上皮)癌』最常見，非腎細胞癌;故 A 錯誤。", "detail": {"background": "肉眼血尿(gross/visible hematuria)是泌尿道惡性腫瘤的重要警訊，必須完整評估(膀胱鏡＋上尿路影像 CT urography＋尿細胞學)。在以血尿表現的惡性腫瘤中，**膀胱癌(尿路上皮癌, urothelial carcinoma)最常見**(無痛性肉眼血尿是膀胱癌典型表現)，遠多於腎細胞癌或上尿路尿路上皮癌。流行病學概略：肉眼血尿病人約 20% 左右會找到惡性腫瘤(其中膀胱癌最多)，相當比例可找到明確病因(感染、結石、攝護腺等)。本題問『何者錯誤』：A『可視性血尿的惡性腫瘤中以腎細胞癌最常見』**錯誤(本題答案)**——應為**膀胱(尿路上皮)癌最常見**。B(惡性約 20%)、C(約 40% 可找到明顯病因)、D(第二常見原因為 UTI)在多數教材數據範圍內可接受。", "options": {"A": "錯誤(本題答案)。肉眼血尿之惡性腫瘤以膀胱(尿路上皮)癌最常見，非腎細胞癌。", "B": "可接受(非答案)。肉眼血尿病人約二成左右為惡性腫瘤。", "C": "可接受(非答案)。約四成左右肉眼血尿可找到明顯病因。", "D": "可接受(非答案)。泌尿道感染為肉眼血尿常見原因之一(次常見)。"}, "sources": ["AUA Microhematuria Guideline 2020 (bladder/urothelial cancer most common)", "Harrison 21e, Hematuria & Bladder Cancer", "Campbell-Walsh Urology"]}}, "113-通論-5分科-74": {"quick": "肝膿瘍位於右上腹/肝區，最不會出現『右側肋脊角(CVA)』敲擊痛;CVA 痛反映腎/腎周/腰大肌等後腹腔病灶。", "detail": {"background": "肋脊角(costovertebral angle, CVA)敲擊痛(Murphy's punch/Lloyd's sign)是**後腹腔、腎臟區域**病灶的徵象，叩擊第12肋與脊椎夾角處誘發疼痛，提示腎/腎周/後腹腔發炎或牽張。會出現 CVA 敲痛的病灶：(1)**急性腎盂腎炎**(腎實質發炎);(2)**腰大肌膿瘍**(psoas abscess，緊鄰後腹腔，牽動時痛);(3)**腎臟血管肌脂肪瘤(AML)破裂**(腎被膜下/腎周出血牽張);(4)腎結石、腎膿瘍、腎梗塞等。**肝膿瘍**位於**右上腹肝臟區(前腹/右季肋)**，表現為右上腹痛、發燒、肝腫大壓痛、有時放射至右肩，**最不會以後腹腔的 CVA 敲擊痛表現**。故本題答案 D(肝膿瘍)。", "options": {"A": "會(非答案)。腎血管肌脂肪瘤破裂致腎被膜下/腎周出血牽張，可有 CVA 敲痛。", "B": "會(非答案)。急性腎盂腎炎是 CVA 敲痛的典型病因。", "C": "會(非答案)。腰大肌膿瘍位於後腹腔，可誘發 CVA 區疼痛。", "D": "對(本題答案)。肝膿瘍位於右上腹肝區(前腹)，最不會出現後腹腔 CVA 敲擊痛。"}, "sources": ["Harrison 21e, Approach to Flank Pain / CVA Tenderness", "Bates' Guide to Physical Examination, CVA tenderness", "Brenner & Rector's The Kidney 11e"]}}, "113-進階-兒科-68": {"quick": "兒童 UTI 常見菌為腸內菌科(E. coli、Klebsiella、Proteus);A 型鏈球菌(Group A Strep)非泌尿道常見病原，故錯誤。", "detail": {"background": "兒童 UTI 致病菌以**腸道革蘭氏陰性桿菌**為主：E. coli(最常見約 80%)、Klebsiella pneumoniae、Proteus mirabilis(男童、與包皮垢/struvite 相關)、Enterobacter、Citrobacter;革蘭氏陽性菌中 Enterococcus、Staphylococcus saprophyticus(青少女)亦可。**A 型鏈球菌(Group A Streptococcus, S. pyogenes)主要致咽炎、皮膚軟組織感染、猩紅熱、急性風濕熱及『鏈球菌感染後腎絲球腎炎(PSGN)』，但本身並非泌尿道感染的常見上行病原**。題問『何者錯誤』→ D(Group A Streptococcus)。A(Klebsiella)、B(Proteus mirabilis)、C(E. coli)皆為兒童 UTI 常見菌。", "options": {"A": "正確(非答案)。Klebsiella pneumoniae 是兒童 UTI 常見腸內菌科病原之一。", "B": "正確(非答案，原文 Proteus mirabilis)。Proteus 為兒童(尤男童)UTI 常見菌、與 struvite 結石相關。", "C": "正確(非答案)。E. coli 是兒童 UTI 最常見致病菌。", "D": "錯誤(本題答案)。A 型鏈球菌主致咽炎/皮膚感染/PSGN，非 UTI 常見病原。"}, "sources": ["Nelson Textbook of Pediatrics, UTI Microbiology", "Harrison 21e, UTI / Group A Streptococcus", "AAP UTI Guideline"]}}, "113-進階-內科-54": {"quick": "SGLT2 抑制劑 canagliflozin 使尿糖增加→促進泌尿生殖道感染(UTI/黴菌性外陰陰道炎)，最易引發 UTI。", "detail": {"background": "**SGLT2 抑制劑(canagliflozin、dapagliflozin、empagliflozin)**抑制近端腎小管 SGLT2，阻斷葡萄糖再吸收→**糖尿(glycosuria)**，藉此降血糖並有心腎保護(降 HF 住院、延緩 CKD 進展)。但尿中高糖提供細菌與黴菌生長基質→**增加生殖泌尿道感染**：最常見**黴菌性外陰陰道炎/龜頭炎(genital mycotic infection)**，UTI(尤其女性)亦增加，少數有 Fournier 壞死性筋膜炎(會陰)警訊。護理衛教：注意會陰清潔、足夠水分、留意排尿不適/外陰搔癢分泌物、容積耗竭(利尿)與酮酸中毒(尤手術/禁食/生病時)風險。其餘藥物：gliclazide(sulfonylurea，致低血糖)、metformin(腸胃不適、乳酸中毒少見)、voglibose(α-glucosidase 抑制劑，腹脹排氣)——皆**不以增加 UTI 為特徵**。故最易引發 UTI 者為 A(canagliflozin)。", "options": {"A": "對。canagliflozin(SGLT2 抑制劑)致糖尿，增加細菌/黴菌泌尿生殖道感染，最易引發 UTI。", "B": "錯。gliclazide(sulfonylurea)主要副作用為低血糖、體重增加，非 UTI。", "C": "錯。metformin 主要副作用為腸胃不適、罕見乳酸中毒，不增 UTI。", "D": "錯。voglibose(α-glucosidase 抑制劑)主要副作用為腹脹、排氣，非 UTI。"}, "sources": ["Harrison 21e, SGLT2 Inhibitors / Diabetes Pharmacology", "ADA Standards of Care (SGLT2i genital/urinary infection)", "FDA label, canagliflozin"]}}, "113-通論-家庭-52": {"quick": "急性腎盂腎炎=後脇腹痛『伴隨發燒寒顫』(感染源);腎/輸尿管結石為突發劇烈絞痛放射至腹股溝，非持續鈍痛。", "detail": {"background": "後脇腹痛(flank pain)鑑別配對：(1)**腎/輸尿管結石**—**突發、陣發、劇烈絞痛(colicky)**，由腰背放射至腹股溝/陰部，病人坐立難安、伴血尿、噁心嘔吐，**典型無發燒**;(2)**急性腎盂腎炎**—**持續性脇腹痛/腰痛伴發燒、寒顫、膿尿**(感染性，全身性發炎)，CVA 敲痛陽性。題問『最適當配對』：A『腎結石:尖銳痛、突如其來劇痛』方向對(腎絞痛確為突發劇痛)但題目把焦點放在 B;B『急性腎盂腎炎:疼痛伴隨發燒寒顫』**最正確(本題答案)**——腎盂腎炎以感染性發燒寒顫合併腰痛為特徵;C『輸尿管結石:鈍痛』錯(輸尿管結石是劇烈絞痛非鈍痛，雖會放射腹股溝);D『輸尿管結石:腰痠並持續穩定的痛』錯(結石是陣發絞痛非持續穩定鈍痛)。故 B 最適當。", "options": {"A": "部分正確但非最佳。腎結石確為突發劇痛，但本題以 B 為最適當配對。", "B": "對(本題答案)。急性腎盂腎炎以脇腹痛伴發燒、寒顫為特徵，配對最適當。", "C": "錯。輸尿管結石為劇烈絞痛(非鈍痛)，雖會放射至腹股溝但『鈍痛』描述不符。", "D": "錯。結石痛為陣發性絞痛，非『持續穩定的痛』。"}, "sources": ["Harrison 21e, Flank Pain: Stone vs Pyelonephritis", "Brenner & Rector's The Kidney 11e", "ACR Appropriateness Criteria, Acute Flank Pain"]}}, "113-進階-家庭-53": {"quick": "反覆發燒+頻尿/小便燒灼+右側 CVA 敲擊痛、尿量正常→急性腎盂腎炎(upper UTI)。", "detail": {"background": "急性腎盂腎炎=上泌尿道感染，臨床三要素為發燒/寒顫、腰痛或 CVA 敲擊痛、下尿路症狀(頻尿、解尿燒灼)。本題 35 歲女性反覆發燒+頻尿+小便燒灼感+右側敲擊痛、尿量無減少→典型急性腎盂腎炎(B)。鑑別：(1)acute cystitis(膀胱炎)—有頻尿燒灼但**無發燒、無 CVA 敲痛**，本題有發燒與敲痛故非單純膀胱炎;(2)acute glomerulonephritis(急性腎絲球腎炎)—血尿(可樂色尿)、蛋白尿、水腫、高血壓、常無發燒與燒灼感，不符;(3)PID(骨盆腔炎)—下腹/附件痛、子宮頸搖痛、性活躍、陰道分泌物，無 CVA 敲痛。診斷靠尿檢(膿尿、菌尿)＋尿培養，治療經驗性涵蓋革蘭氏陰性桿菌。", "options": {"A": "錯。急性膀胱炎有頻尿燒灼但無發燒、無 CVA 敲痛，本題有發燒與敲痛不符。", "B": "對。發燒+下尿路症狀+CVA 敲擊痛→急性腎盂腎炎。", "C": "錯。急性腎絲球腎炎以血尿、蛋白尿、水腫、高血壓為主，無燒灼感與 CVA 敲痛。", "D": "錯。PID 以下腹/附件痛、子宮頸搖痛為主，無 CVA 敲擊痛。"}, "sources": ["Harrison 21e, Acute Pyelonephritis", "IDSA 2010 Pyelonephritis Guideline", "Brenner & Rector's The Kidney 11e"]}}, "113-進階-家庭-54": {"quick": "女性泌尿道感染最常見致病菌為 Escherichia coli。", "detail": {"background": "女性因尿道短(約 4 cm)、尿道口近陰道與肛門，腸道菌易上行致 UTI，盛行率遠高於男性。**最常見致病菌為 E. coli(uropathogenic E. coli, 約 75~85%)**，靠 type 1/P fimbriae 黏附尿路上皮致病;其次為 Staphylococcus saprophyticus(性活躍年輕女性社區膀胱炎第二常見)、Klebsiella、Proteus、Enterococcus。本題答案 B(E. coli)。其餘 Klebsiella、Proteus mirabilis(產 urease/struvite)、S. aureus(非上行常見病原)皆非女性 UTI 最常見菌。", "options": {"A": "錯。Klebsiella pneumoniae 為次常見之一，非最常見。", "B": "對。E. coli 是女性 UTI 最常見致病菌(約 75~85%)。", "C": "錯。Proteus mirabilis 與 struvite 結石/鹼性尿相關，非最常見。", "D": "錯。S. aureus 非尿路上行常見病原(尿中見之反警覺血行播散)。"}, "sources": ["Harrison 21e, UTI in Women", "IDSA 2010 Uncomplicated UTI Guideline", "Brenner & Rector's The Kidney 11e"]}}, "113-進階-家庭-55": {"quick": "高燒寒顫+右 CVA 敲擊痛+腰大肌徵候(無咳嗽腹瀉頻尿)→後腹腔病灶(腎盂腎炎/腰大肌膿瘍/升結腸憩室炎);肝膿瘍位前腹右上腹，最不可能。", "detail": {"background": "本題以症狀定位後腹腔病灶。65 歲女性高燒寒顫、右側 CVA 敲擊痛、**腰大肌徵候(psoas sign)陽性**(髖部伸展時疼痛，提示後腹腔/腰大肌附近發炎)，無呼吸道與腸胃症狀。可解釋的診斷(會牽動後腹腔/CVA 區)：(1)**急性腎盂腎炎**(腎發炎、CVA 敲痛);(2)**腰大肌膿瘍**(直接累及腰大肌、psoas sign 陽性);(3)**升結腸憩室炎/後腹膜延伸的腸道發炎**(右側後腹腔，可刺激腰大肌)。**肝膿瘍**位於**右上腹肝區(前腹腔/橫膈下)**，表現為右上腹痛、肝區壓痛、發燒，**較不會以後腹腔的 CVA 敲擊痛＋腰大肌徵候表現**，故為『最不可能』(B)。", "options": {"A": "可能(非答案)。升結腸位右側後腹腔，憩室炎可刺激腰大肌、引右側後腹腔痛。", "B": "對(本題答案)。肝膿瘍位右上腹肝區(前腹/橫膈下)，最不會以後腹腔 CVA 敲擊痛+腰大肌徵候表現。", "C": "可能(非答案)。腰大肌膿瘍直接累及腰大肌，psoas sign 陽性、CVA 區痛。", "D": "可能(非答案)。急性腎盂腎炎是 CVA 敲擊痛的典型病因。"}, "sources": ["Harrison 21e, Psoas Sign / Retroperitoneal Infection", "Bates' Physical Examination, psoas & CVA tenderness", "Sabiston Textbook of Surgery, psoas abscess"]}}, "113-進階-家庭-72": {"quick": "長期臥床、經口餵食、留置導尿之失智老人發燒寒顫，優先考慮吸入性肺炎、CAUTI、褥瘡軟組織感染;細菌性腦膜炎非優先。", "detail": {"background": "本題評估長期臥床失智老人發燒的常見感染源。85 歲糖尿病+中風+失智、長期臥床經口餵食、神經性膀胱留置導尿，出現倦怠嗜睡食慾差＋發燒寒顫。此族群發燒最常見感染源(依風險)：(1)**吸入性肺炎**(吞嚥困難、經口餵食誤吸——失智臥床者頭號感染);(2)**導尿管相關尿路感染 CAUTI**(留置導尿，發燒須評估);(3)**褥瘡(壓力性損傷)合併軟組織感染**(長期臥床)。**細菌性腦膜炎**在此情境**非優先考慮**——無頸部僵硬、無特定腦膜刺激徵象描述，且老年失智者腦膜炎相對少見，屬較低機率診斷;若有意識急遽惡化、頸僵、局部神經學徵象才升高懷疑。故『非優先考慮』者為 A(細菌性腦膜炎)。", "options": {"A": "對(本題答案)。細菌性腦膜炎在此情境機率低、非優先;無腦膜刺激徵象描述。", "B": "錯(屬優先)。吸入性肺炎是吞嚥困難/經口餵食臥床失智者最常見發燒源。", "C": "錯(屬優先)。留置導尿者發燒須優先評估 CAUTI。", "D": "錯(屬優先)。長期臥床者褥瘡合併軟組織感染為常見發燒源。"}, "sources": ["Harrison 21e, Fever in the Elderly / Aspiration Pneumonia / CAUTI", "IDSA CAUTI Guideline", "Hazzard's Geriatric Medicine, infections in bedridden patients"]}}, "113-進階-家庭-78": {"quick": "長期導尿之無症狀念珠菌尿(candiduria)、病人無症狀→暫不需抗黴菌治療;首要是移除/更換不必要導管。", "detail": {"background": "**Candiduria(尿中念珠菌)**在長期留置導尿、糖尿病、近期廣效抗生素、免疫低下者很常見，**絕大多數為定殖(colonization)而非真正侵犯性感染**。IDSA 念珠菌感染指引：**無症狀念珠菌尿不需抗黴菌治療**(治療無益、不降後續症狀感染、反促抗藥);處置重點是**移除或更換不必要的導尿管**(常可使 candiduria 自行清除)、控制糖尿病、停用不必要抗生素。**例外需治療**：有症狀的念珠菌膀胱炎/腎盂腎炎、嗜中性球低下者、新生兒低體重兒、或將接受泌尿器械操作前。本題 78 歲糖尿病臥床留置導尿、尿混濁、培養 Candida 50000 CFU/mL、**無發燒、無血尿、無下腹痛**→無症狀 candiduria，正確處置為暫不需藥物(A)。膀胱灌洗(amphotericin 沖洗)已不建議常規使用、預防性抗生素/抗黴菌亦不當。", "options": {"A": "對。無症狀念珠菌尿不需抗黴菌治療，先移除/更換不必要導管即可，符合 IDSA 指引。", "B": "錯。常規膀胱灌洗(amphotericin 沖洗)無實證、不建議常規使用。", "C": "錯。無症狀者不需口服抗黴菌(且口服 fluconazole 雖入尿，但無症狀不需治療)。", "D": "錯。預防性口服抗生素無益、反增抗藥性與 C. difficile，不應給予。"}, "sources": ["IDSA 2016 Candidiasis Guideline (asymptomatic candiduria)", "Harrison 21e, Candiduria", "IDSA 2019 ASB / 2009 CAUTI Guideline"]}}, "114-進階-兒科-65": {"quick": "兒童 UTI 治療療程完成後『不需常規重複尿培養確認』(test of cure 不建議);其餘療程/口服與靜脈等效之敘述正確。", "detail": {"background": "兒童 UTI 治療要點：(1)**急性腎盂腎炎抗生素療程約 7~14 天**(常規 7~10 天，A 之 7~10 天可接受);(2)**口服與靜脈抗生素效果相當**——多項試驗顯示，能口服且非嚴重者，口服與靜脈起始治療療效相同(B 正確)，靜脈僅用於嬰幼兒嚴重、嘔吐無法口服、敗血或無法服藥者;(3)**急性大葉性腎炎(acute lobar nephronia, ALN)**是腎臟局部嚴重發炎(介於腎盂腎炎與膿瘍間)，**療程需較長(常≥14~21 天)**(C 可接受);(4)**療程完成後不需常規重複尿培養做 test of cure**——臨床改善即可，例行追蹤培養無實證、不建議(D 錯誤，本題答案)。例外是特定高風險或臨床未改善者才重驗。發燒型 UTI 後須影像評估(超音波±VCUG/DMSA)是另一回事。", "options": {"A": "正確(非答案)。急性腎盂腎炎抗生素療程約 7~10 天，可接受。", "B": "正確(非答案)。非嚴重者口服與靜脈抗生素治療療效相當。", "C": "正確(非答案)。急性大葉性腎炎(ALN)發炎較重，療程常需≥14 天。", "D": "錯誤(本題答案)。療程完成後不需常規重複尿培養(test of cure 不建議)，臨床改善即可。"}, "sources": ["AAP UTI Guideline (oral=IV efficacy; no routine test of cure)", "Nelson Textbook of Pediatrics, UTI Treatment / ALN", "Harrison 21e, UTI Treatment"]}}, "114-進階-兒科-67": {"quick": "使用布質尿布與 UTI 最無相關;包皮過長、如廁訓練期、性活躍青少女皆為兒童/青少年 UTI 危險因子。", "detail": {"background": "兒童/青少年 UTI 危險因子：(1)**男嬰包皮過長/未割包皮(uncircumcised)**——包皮垢與包皮下細菌定殖增 UTI(尤其嬰兒期男嬰);(2)**如廁訓練期(toilet training)**——憋尿、排空不全、便秘、會陰污染增 UTI;(3)**性活躍青少女**——性行為把會陰菌推入尿道(同成人年輕女性);此外尚有 VUR、神經性膀胱、結構異常、便秘。**布質尿布 vs 紙尿布與 UTI 風險並無明確相關**(更換頻率與清潔比尿布材質重要)，故『使用布質尿布』與 UTI **最無相關**(A)。", "options": {"A": "對(本題答案)。布質尿布本身與 UTI 風險無明確相關(清潔與更換頻率才重要)。", "B": "錯(相關)。男童包皮過長/未割包皮增 UTI(包皮下細菌定殖)。", "C": "錯(相關)。如廁訓練期憋尿、排空不全、會陰污染增 UTI。", "D": "錯(相關)。性活躍青少女性行為把菌推入尿道，增 UTI。"}, "sources": ["Nelson Textbook of Pediatrics, UTI Risk Factors", "AAP UTI Guideline (circumcision status)", "Harrison 21e, UTI Risk Factors"]}}, "114-進階-兒科-69": {"quick": "VCUG 顯示尿路逆流+腎盂腎盞『清楚擴張變形』、輸尿管輕微擴張→第四級(grade IV)VUR。", "detail": {"background": "VUR 分級(I~V)複習：**Grade I**—逆流僅達輸尿管;**Grade II**—達腎盂腎盞但無擴張;**Grade III**—輕~中度擴張、輸尿管輕度迂曲、腎盞穹窿輕鈍但維持;**Grade IV**—**腎盂腎盞中度擴張且變形、輸尿管中度迂曲擴張、腎盞穹窿鈍化但仍可見乳頭印痕**;**Grade V**—嚴重擴張迂曲、腎盞嚴重變形、乳頭印痕消失。本題『腎盂、腎盞清楚地擴張與變形、輸尿管輕微擴張、有尿路逆流』→腎盂腎盞明顯擴張變形(中度且變形)符合 **Grade IV(第四級)**(C)。注意與本批 111-65(僅腎盞輕微擴張→Grade III)對照:本題已『清楚擴張變形』程度較重故為 IV。高級 VUR(IV~V)較易腎結痂、需積極處理(預防性抗生素、Deflux 注射或輸尿管重植)。", "options": {"A": "錯。第二級逆流達腎盂腎盞但無擴張，較本題輕。", "B": "錯。第三級為輕~中度擴張、腎盞穹窿僅輕鈍，未達『清楚擴張與變形』。", "C": "對。腎盂腎盞清楚擴張變形、輸尿管擴張→第四級(grade IV)。", "D": "錯。第五級為嚴重擴張迂曲、乳頭印痕消失，較本題更重。"}, "sources": ["Nelson Textbook of Pediatrics, VUR Grading (I–V)", "International Reflux Study Classification", "Brenner & Rector's The Kidney 11e, Reflux Nephropathy"]}}, "114-進階-內科-17": {"quick": "UTI 致敗血性休克(低血壓+乳酸 4.2+尿少)→Surviving Sepsis 早期目標:首小時快速晶體輸液 30 mL/kg 穩定血壓最優先。", "detail": {"background": "本題為 **urosepsis 合併敗血性休克(septic shock)**：65 歲男性 UTI、寒顫發燒、血壓 85/50(低血壓)、心跳 110、呼吸 24、尿量減少、**乳酸 4.2 mmol/L(>2 提示組織灌流不足/休克)**。Surviving Sepsis Campaign(SSC 2021)『hour-1 bundle』：(1)測乳酸(>2 須再追蹤);(2)**抗生素前先抽血液培養**;(3)**儘速(首小時內)給經驗性廣效抗生素**;(4)**低血壓或乳酸≥4 時,於前 3 小時內快速給晶體溶液 30 mL/kg**;(5)輸液後仍低血壓則加升壓劑(norepinephrine 首選)維持 MAP≥65。在本題選項中，能立即穩定血壓/恢復灌流的關鍵第一步是**快速晶體輸液 30 mL/kg(C)**(配合儘早抗生素與血液培養)。退燒藥(B)不處理休克;先安排超音波(A)不應延誤復甦(影像找阻塞重要但非第一優先於穩定循環);D『等醫師評估再決定升壓劑』延誤救命且升壓劑須在充分輸液後使用，皆非首要。NP 在敗血復甦中應主動啟動輸液與通報，符合早期目標導向。", "options": {"A": "錯。腎臟超音波找水腎重要(排除阻塞性腎盂腎炎需引流)，但不應優先於穩定循環的液體復甦。", "B": "錯。退燒藥僅緩解不適，不處理低血壓/組織低灌流的休克核心。", "C": "對。敗血性休克(低血壓+乳酸 4.2)應於首小時內快速晶體輸液 30 mL/kg 穩定血壓，最優先。", "D": "錯。升壓劑用於充分輸液後仍低血壓時;消極等待會延誤救命，不應作為第一步。"}, "sources": ["Surviving Sepsis Campaign Guideline 2021 (hour-1 bundle, 30 mL/kg crystalloid)", "Harrison 21e, Sepsis & Septic Shock", "IDSA Urosepsis management"]}}, "114-進階-內科-64": {"quick": "孕婦(6個月)急性腎盂腎炎→住院靜脈 β-lactam(ampicillin/cephalosporin)為優先;禁 quinolone、不可僅支持療法或 3 天口服。", "detail": {"background": "孕婦急性腎盂腎炎是須住院的產科/內科急症(可致敗血、ARDS、早產)。本題懷孕 6 個月、持續發燒寒顫+頻尿+腰痛+右 CVA 敲痛→急性腎盂腎炎。處置：**住院、靜脈經驗性抗生素涵蓋革蘭氏陰性桿菌、足夠水分、監測母胎**。**孕期安全且首選的靜脈抗生素為 β-lactam 類**：ampicillin(±gentamicin)、第二/三代 cephalosporin(如 cefuroxime、ceftriaxone),療程約 10~14 天。**禁忌**：fluoroquinolone(影響胎兒軟骨關節，C 錯)、TMP-SMX(早期致畸、晚期核黃疸)、aminoglycoside 慎用(耳腎毒)。不可『不給抗生素只支持療法』(A 錯，腎盂腎炎須抗生素);也不可『口服 3 天了事』(B 錯，孕婦腎盂腎炎須住院靜脈治療、療程足夠)。故最適當為 D(靜脈 ampicillin 或 cephalosporin)。", "options": {"A": "錯。孕婦急性腎盂腎炎必須抗生素治療，僅支持療法會致敗血與早產。", "B": "錯。孕婦腎盂腎炎須住院靜脈治療、療程約 10~14 天，口服 3 天不足。", "C": "錯。fluoroquinolone 孕期禁用(影響胎兒軟骨關節)，不可作為首選。", "D": "對。孕婦急性腎盂腎炎首選靜脈 β-lactam(ampicillin 或 cephalosporins)，安全且涵蓋常見病原。"}, "sources": ["Harrison 21e, Pyelonephritis in Pregnancy", "ACOG Practice Bulletin, UTI in Pregnancy", "IDSA UTI Guideline"]}}, "114-進階-家庭-60": {"quick": "年輕女性頻尿尿急解尿痛、無發燒無腰痛、尿檢 LE(+)/nitrite(+)/膿尿、無 CVA 痛→單純性膀胱炎(cystitis)。", "detail": {"background": "單純性膀胱炎(uncomplicated cystitis)是下泌尿道感染，典型為**頻尿、急尿、解尿疼痛、恥骨上不適、無發燒、無腰痛/CVA 痛、無全身性反應**;尿檢膿尿(WBC↑)、leukocyte esterase(+)、nitrite(+提示腸內菌科如 E. coli)。本題 25 歲女性 2 天頻尿尿急解尿痛、**無發燒寒顫腰痛噁心嘔吐、無 CVA 壓痛**、LE(+)、nitrite(+)、WBC 50~100/HPF、RBC 0~5→典型**膀胱炎(B)**。鑑別：(1)pyelonephritis—應有發燒、CVA 敲痛、全身反應，本題皆無;(2)vaginitis—陰道分泌物/搔癢/異味、尿檢 nitrite 多陰性，本題 nitrite(+)更指向細菌性 UTI;(3)nephrolithiasis—絞痛放射腹股溝、血尿明顯，本題以下尿路刺激症狀為主。治療首選 nitrofurantoin、TMP-SMX 或 fosfomycin(3~5 天短療程)。", "options": {"A": "錯。腎盂腎炎應有發燒、CVA 敲痛、全身反應，本題皆無。", "B": "對。頻尿尿急解尿痛+LE/nitrite(+)+膿尿、無發燒無腰痛→單純性膀胱炎。", "C": "錯。陰道炎以分泌物/搔癢為主、nitrite 多陰性，本題 nitrite(+)指向細菌性 UTI。", "D": "錯。腎結石以絞痛放射腹股溝+明顯血尿為主，本題以下尿路刺激症狀為主、RBC 僅 0~5。"}, "sources": ["Harrison 21e, Acute Uncomplicated Cystitis", "IDSA 2010 Uncomplicated Cystitis Guideline", "Brenner & Rector's The Kidney 11e"]}}, "114-進階-家庭-63": {"quick": "低鈣飲食『不能』降草酸鈣結石風險、反而增加(腸道游離草酸吸收↑→高草酸尿);正常鈣攝取才防石。", "detail": {"background": "本題考結石種類與危險因子。**反直覺重點**：**草酸鈣結石病人不應限制飲食鈣**——適量飲食鈣會在腸道與草酸結合形成不可吸收的草酸鈣由糞排出，減少草酸吸收與尿中草酸;**低鈣飲食反而使腸道游離草酸吸收增加→尿草酸升高→草酸鈣結石風險上升**(C 錯誤，本題答案)。正確防石是『正常鈣攝取＋限草酸、限鈉、限動物性蛋白、多喝水』。其餘正確：(A)高劑量 salicylates(水楊酸)可干擾尿酸排泄/代謝，與尿酸代謝改變相關，且病人脫水/酸性尿易成尿酸結石(此選項在考題脈絡視為正確);(B)鳥糞石(struvite)危險因子是先前/反覆 UTI(產 urease 菌);(D)副甲狀腺機能亢進致高血鈣高尿鈣，易形成鈣性結石(磷酸鈣/草酸鈣)。", "options": {"A": "正確(非答案)。高劑量水楊酸可影響尿酸代謝/排泄、配合酸性尿與脫水易成尿酸結石。", "B": "正確(非答案)。鳥糞石(struvite)危險因子包含先前/反覆泌尿道感染(產 urease 菌)。", "C": "錯誤(本題答案)。低鈣飲食使腸道游離草酸吸收增加→高草酸尿，反『增加』草酸鈣結石風險;應維持正常鈣攝取。", "D": "正確(非答案)。副甲狀腺機能亢進致高血鈣高尿鈣，易形成磷酸鈣/鈣性結石。"}, "sources": ["Brenner & Rector's The Kidney 11e, Calcium Oxalate Stones (normal calcium intake)", "Harrison 21e, Nephrolithiasis Prevention", "AUA Medical Management of Kidney Stones Guideline"]}}, "106-106a-內科-79": {"quick": "尿酸結石的根本機轉是「酸性尿+尿酸過飽和」，治療核心是『鹼化尿液(pH 6.5–7)』而非降低 pH；故『降低尿液 pH 能減少尿酸結石』(A)最不適當、反而促進結石。", "detail": {"background": "尿酸結石(uric acid stone)約占所有腎結石的 5–10%，是少數可用『內科藥物溶解』的結石。其形成三大因素為:①持續性酸性尿(low urinary pH，最關鍵；尿 pH < 5.5 時尿酸大量以不溶性的 undissociated uric acid 形式存在)、②高尿酸尿(hyperuricosuria)、③尿量不足(濃縮尿)。常見於 gout、metabolic syndrome/胰島素阻抗(腎小管產氨↓→尿偏酸)、慢性腹瀉/迴腸造口(失碳酸氫鹽)、高動物蛋白(高 purine+酸負荷)、骨髓增生疾病/化療後 tumour lysis(高尿酸負荷)。尿酸結石是 radiolucent(X 光透明)，KUB 看不到，需靠超音波或 non-contrast CT(仍可顯影，因密度高於空氣/軟組織)。治療階梯:①大量水化使尿量>2–2.5 L/day;②『鹼化尿液』為核心——口服 potassium citrate(檸檬酸鉀)或 sodium bicarbonate，目標尿 pH 6.5–7.0，可使既有結石溶解(唯一可內科溶石的結石類型);③限制 purine(內臟、紅肉、海鮮)與酒精;④高尿酸者加 xanthine oxidase inhibitor(allopurinol/febuxostat)。護理監測:衛教定時驗尿 pH(試紙)、確認水分攝取、避免鹼化過頭(pH>7 反而易生 calcium phosphate 結石)。陷阱:尿酸結石與 calcium 結石的尿液 pH 策略相反——尿酸結石要『鹼化』，而 calcium phosphate / struvite 結石在鹼性尿易形成。", "options": {"A": "敘述『降低尿液 pH 能減少尿酸結石』錯誤——尿酸在酸性尿中溶解度反而下降、更易結晶,正確策略是『鹼化』尿液至 pH 6.5–7。此為本題最不適當的選項(正解)。", "B": "正確。補充 bicarbonate(碳酸氫鹽)或 citrate(檸檬酸鹽,如 potassium citrate)可鹼化尿液、增加尿酸溶解度,是尿酸結石的核心治療,甚至能溶解既有結石。", "C": "正確。減少 purine(嘌呤)攝取(內臟、紅肉、海鮮、酒精)可降低尿酸生成與尿酸尿,減少結石形成。", "D": "正確。allopurinol 與 febuxostat 為 xanthine oxidase inhibitor,抑制尿酸合成、降低高尿酸尿,對高尿酸負荷者(如 gout、化療後)可預防尿酸結石。"}, "sources": ["Harrison 21e, Nephrolithiasis", "Brenner & Rector's The Kidney 11e", "AUA Medical Management of Kidney Stones Guideline; EAU Urolithiasis Guideline"]}}, "106-106a-外科-80": {"quick": "3.5 cm 鹿角結石(staghorn)屬大型複雜結石,首選 PCNL;『體外震波碎石(ESWL)』(A)對如此大的結石清石率差、易產生 steinstrasse,為錯誤(不適當)治療。", "detail": {"background": "鹿角結石(staghorn calculus)填滿腎盂與多個腎盞、外形似鹿角,多為 struvite(magnesium ammonium phosphate)成分,常與產 urease 菌(Proteus、Klebsiella、Pseudomonas)造成的慢性 UTI 及鹼性尿相關,部分為 cystine 或 calcium。其危害是反覆感染、腎功能喪失、甚至 urosepsis 與 xanthogranulomatous pyelonephritis,故原則上『須積極完全清除結石』。治療選擇依結石大小(directly 影響清石率):<10 mm 可保守/ESWL;10–20 mm 視位置選 ESWL 或 URS;>20 mm 或鹿角結石 → 首選 percutaneous nephrolithotomy(PCNL，經皮腎造廔取石),清石率最高;極複雜者可合併 PCNL + 軟式輸尿管鏡(combined/ECIRS)或開放/腹腔鏡手術。ESWL 對 >20 mm 大結石清石率低、碎石後大量碎屑堆積輸尿管形成 steinstrasse(石街),且鹿角結石含感染成分,ESWL 碎裂可誘發菌血症,故不建議單獨用於鹿角結石。護理重點:PCNL 術後監測出血/血尿、發燒(urosepsis)、腎造廔管引流量與通暢、照胸部 X 光排除氣胸/水胸。", "options": {"A": "錯誤(本題要選的『錯誤治療』)。3.5 cm 鹿角結石以 ESWL 處理清石率極差、易形成 steinstrasse 並誘發感染,不適合作為主要治療,故為錯誤選項(正解)。", "B": "正確治療。PCNL 是 >2 cm 與鹿角結石的首選術式,經皮直接進入腎盂碎石取石,清石率最高。", "C": "可行治療。達文西機械手臂輔助腎盂切開取石(robot-assisted pyelolithotomy)為微創取石選項之一,對特定複雜結石可用。", "D": "可行治療。腹腔鏡腎(盂)切開取石(laparoscopic pyelolithotomy)亦為大型結石的手術選項,雖較少用但屬合理治療。"}, "sources": ["Harrison 21e, Nephrolithiasis", "Campbell-Walsh-Wein Urology", "AUA Surgical Management of Stones Guideline"]}}, "107-TNPA-內科-31": {"quick": "尿酸結石(uric acid stone)為 radiolucent(X 光透明),KUB 上最不易顯影、最不易被診斷出來,故(B)。", "detail": {"background": "結石在腹部 X 光(KUB)上的顯影程度取決於成分密度(radiopacity):①Calcium oxalate / calcium phosphate → 最 radiopaque(含鈣,最易顯影);②Struvite(magnesium ammonium phosphate)→ 中度 radiopaque;③Cystine → 弱 radiopaque(因含硫 sulfur,呈毛玻璃狀淡影,介於可見與不可見之間);④Uric acid → radiolucent(X 光透明,KUB 完全看不到);⑤某些藥物結石(如 indinavir)亦 radiolucent。因此 KUB 上『最不易被診斷』的是純尿酸結石。但須注意:即使 radiolucent 結石在 KUB 上看不到,在 non-contrast helical CT 上仍可顯影(因其 CT 密度/HU 仍高於周圍軟組織),故 CT 為診斷結石的 gold standard、可偵測幾乎所有成分結石。臨床意義:對懷疑結石但 KUB 陰性者,不可排除結石,應安排超音波或 CT;尿酸結石診斷後可考慮鹼化尿液內科溶石。護理衛教:尿酸結石病人須驗尿 pH、增加水分、限 purine。", "options": {"A": "calcium oxalate(草酸鈣)含鈣,radiopaque,KUB 最易顯影、最易被診斷,故非答案。", "B": "uric acid(尿酸)結石為 radiolucent,KUB 透明看不到,最不易被診斷,為正解。", "C": "cystine(胱胺酸)結石含硫,呈弱 radiopaque(毛玻璃狀淡影),雖不如鈣結石明顯但仍可隱約顯影,故非『最不易』。", "D": "struvite(鹿角狀/磷酸銨鎂)結石為中度 radiopaque,常因體積大(鹿角形)反而在 KUB 上明顯可見。"}, "sources": ["Harrison 21e, Nephrolithiasis", "Brenner & Rector's The Kidney 11e", "AUA/EAU Urolithiasis Guideline"]}}, "107-TNPA-外科-78": {"quick": "PCNL 雖術中持續灌洗,仍可能因結石內藏菌、灌洗壓力使細菌入血而引發 urosepsis;故『術後沒有敗血症問題』(B)為錯誤敘述。", "detail": {"background": "經皮穿腎取石術(percutaneous nephrolithotomy, PCNL)是處理大型(>2 cm)、鹿角及複雜性腎結石的首選微創術式:在超音波/X 光導引下經皮膚穿刺建立通道進入腎盂,以碎石器(超音波/氣動/雷射)碎石並取出。主要併發症:①出血(最常見的嚴重併發症,因穿刺腎實質傷及血管,可能需輸血或栓塞);②感染/urosepsis(結石尤其 struvite 含菌,碎石時細菌與內毒素釋出,加上術中高壓灌洗使含菌灌洗液逆行入血→菌血症/敗血性休克,是 PCNL 致命併發症,故術前須驗尿培養並預防性抗生素、術中監測灌洗壓力與時間);③胸膜損傷(上極穿刺經第 11–12 肋上方易致氣胸/水胸/血胸,故術後常規照胸部 X 光);④鄰近器官損傷(大腸、肝、脾)。術後腎造廔管(nephrostomy tube)若出血量多,可暫時夾管利用血塊壓迫止血。護理重點:監測生命徵象與發燒(早期敗血症)、血尿/引流量與血色、引流管通暢、呼吸狀況。", "options": {"A": "正確。PCNL 為侵入性手術,穿刺腎實質,術後常見血尿,須監測腎臟出血、生命徵象與血紅素。", "B": "錯誤(正解)。術中持續灌洗無法保證沖走所有細菌;結石本身藏菌,且高壓灌洗反而可能將含菌灌洗液逆行入血,urosepsis 是 PCNL 重要且可致命的併發症,不可謂『沒有敗血症問題』。", "C": "正確。上極穿刺可能傷及胸膜造成氣胸/水胸/血胸,故術後照胸部 X 光排除胸腔併發症。", "D": "正確。若腎造廔管出血量多,可暫時夾閉造廔管,利用腎盂內血塊形成的壓力(tamponade)達到止血效果,為常用的處置手法。"}, "sources": ["Harrison 21e, Urinary Tract Obstruction & Nephrolithiasis", "Campbell-Walsh-Wein Urology, PCNL chapter", "AUA Surgical Management of Stones Guideline"]}}, "108a-TNPA-外科-57": {"quick": "草酸鈣結石病人不可一味『減少鈣攝取』——低鈣飲食反而使腸道游離草酸吸收增加、尿草酸上升而促進結石;應維持正常鈣攝取,故(A)不適當。", "detail": {"background": "Calcium oxalate(草酸鈣)結石為最常見的腎結石(約 70–80%)。其形成與高鈣尿(hypercalciuria)、高草酸尿(hyperoxaluria)、低檸檬酸尿(hypocitraturia,citrate 是結石抑制因子)、低尿量有關。飲食預防的核心觀念(重要陷阱):①『維持正常鈣攝取(約 1000–1200 mg/day),不可限鈣』——飲食中的鈣會在腸道與草酸結合成不溶性 calcium oxalate 隨糞排出,減少草酸吸收;低鈣飲食反使游離草酸吸收↑、尿草酸↑、結石風險『增加』(經典 RCT:Borghi 2002 NEJM 證實正常鈣+低鈉低動物蛋白飲食比低鈣飲食更能降低復發);②限制高草酸食物(菠菜、堅果、巧克力、濃茶、甜菜);③限鈉(高鈉→尿鈣排泄↑);④限動物蛋白(酸負荷↑尿鈣、↓尿 citrate);⑤增加 citrate(檸檬酸鉀/柑橘類)以抑制結晶;⑥大量水分使尿量>2–2.5 L/day。護理衛教重點即在於糾正『結石就要少吃鈣』的迷思。", "options": {"A": "不適當(正解)。減少鈣攝取會使腸道游離草酸吸收增加、尿草酸上升,反而促進草酸鈣結石;應維持正常鈣攝取。", "B": "適當。減少鈉攝取可降低尿鈣排泄(高鈉促進尿鈣),有助預防結石。", "C": "適當。減少高草酸食物(菠菜、堅果、巧克力、濃茶)可降低尿草酸,減少草酸鈣結晶。", "D": "適當。增加 citrate(檸檬酸鉀)攝取可與鈣結合並抑制結晶聚集、鹼化尿液,是草酸鈣結石的保護因子。"}, "sources": ["Borghi L, et al. NEJM 2002 (calcium vs low-calcium diet)", "Harrison 21e, Nephrolithiasis", "AUA Medical Management of Kidney Stones Guideline"]}}, "108a-TNPA-外科-72": {"quick": "PCNL 須穿刺腎實質,最常見的『嚴重』併發症為出血(可需輸血/栓塞),故(A)。", "detail": {"background": "PCNL(percutaneous nephrolithotomy)經皮建立通道穿入腎實質取石,各種併發症中『出血』為最常見的嚴重併發症:穿刺與擴張通道時傷及腎內血管(葉間/弓狀動脈),可造成術中/術後出血、腎周圍血腫,嚴重者需輸血,少數形成 pseudoaneurysm 或 AV fistula 需血管攝影栓塞。其他併發症:①感染/urosepsis(亦嚴重、可致命,但發生率低於出血,尤其術前已抗生素覆蓋);②氣胸/水胸/血胸(上極穿刺傷胸膜,故術後照 CXR);③鄰近器官損傷(大腸、肝、脾、十二指腸,罕見);④集尿系統穿孔、尿外滲。風險因子:結石愈大愈複雜、通道愈多、手術時間愈長,出血風險愈高。護理:術後密切監測血紅素、血壓心跳、引流液血色與量、腎造廔管通暢;若大量出血先夾管壓迫,無效則血管栓塞。", "options": {"A": "正解。出血是 PCNL 最常見的嚴重併發症,因穿刺擴張腎實質傷及血管,可能需輸血或栓塞處理。", "B": "氣胸或水胸是上極穿刺的併發症,但發生率低於出血,非『最常見』。", "C": "大腸穿孔(結腸後位)罕見,雖嚴重但非最常見。", "D": "敗血症為嚴重且可致命的併發症,但在術前尿培養與預防性抗生素下發生率低於出血,非『最常見』。"}, "sources": ["Campbell-Walsh-Wein Urology, PCNL chapter", "Harrison 21e, Nephrolithiasis", "AUA Surgical Management of Stones Guideline"]}}, "108a-TNPA-外科-77": {"quick": "下段輸尿管 0.5 cm 結石屬可自行排出範圍,最常用的『促進排石(MET)』藥為 α-blocker tamsulosin,故(A)。", "detail": {"background": "輸尿管結石的處置依大小決定:<5 mm 約 70–80% 可自行排出、5–10 mm 約 50%、>10 mm 多需介入。對 <10 mm(尤其下段)的輸尿管結石,首選保守觀察+『藥物排石療法(medical expulsive therapy, MET)』:核心藥物為 α1-adrenergic blocker(tamsulosin),作用是鬆弛輸尿管下段與膀胱輸尿管交接處(UVJ)的平滑肌,降低蠕動阻力、加速結石排出並減少腎絞痛發作。MET 對下段輸尿管結石(α 受體分布密集處)效果最佳。其他輔助:大量水分、NSAID/opioid 止痛、依結石濾出。CCB(nifedipine)亦曾用於 MET 但證據與效果不如 tamsulosin。合併感染或阻塞(發燒、無尿、單腎)為急症,須緊急引流(雙 J 或腎造廔)。護理衛教:tamsulosin 可能姿勢性低血壓(α-blocker)、逆行射精;教病人濾尿收集排出之結石送成分分析。", "options": {"A": "正解。tamsulosin(Harnalidge)為 α1-blocker,鬆弛輸尿管下段與 UVJ 平滑肌,是最常用的藥物排石療法(MET),促進 <10 mm 結石排出。", "B": "hyoscine-N-butylbromide(Buscopan)為抗膽鹼解痙劑,用於緩解絞痛/平滑肌痙攣,但非促進『排石』的標準藥物,排石效果不佳。", "C": "furosemide(Lasix)為 loop diuretic,並不能促進結石排出,反而可能增加結石(高鈣尿)或脫水,不適用。", "D": "prednisolone(類固醇)無排石作用,僅理論上減輕輸尿管水腫,非標準排石藥物。"}, "sources": ["Harrison 21e, Nephrolithiasis", "AUA/EAU Urolithiasis Guideline (medical expulsive therapy)", "Brenner & Rector's The Kidney 11e"]}}, "108a-TNPA-通論-38": {"quick": "尿路結石典型表現為血尿+脇腹痛(renal colic),故(A)正確;最常見成分是草酸鈣非尿酸、含鈣結石為 radiopaque、struvite 在鹼性尿形成,B/C/D 皆錯。", "detail": {"background": "尿路結石(nephrolithiasis/urolithiasis)臨床核心知識:①典型症狀為突發單側脇腹痛(flank pain),沿輸尿管放射至同側腹股溝/生殖器,呈絞痛(colicky),伴噁心嘔吐、肉眼或鏡下血尿、CVA 敲痛;②成分頻率:calcium oxalate(~70–80%,最常見)> calcium phosphate > uric acid(5–10%)> struvite > cystine;③X 光顯影:含鈣結石(oxalate/phosphate)為 radiopaque(X 光不透明,KUB 可見),uric acid 為 radiolucent;④struvite(magnesium ammonium phosphate,鹿角結石主成分)是在『鹼性尿』中、由產 urease 菌(Proteus 等)分解尿素產氨使尿鹼化而形成,而非酸性尿;尿酸與胱胺酸結石才好發於酸性尿。診斷 gold standard 為 non-contrast CT。治療依大小與是否合併感染/阻塞而定。本題逐項對照即可辨正誤。", "options": {"A": "正確(正解)。尿路結石常合併血尿(hematuria)與脇腹痛(flank pain),為典型的 renal colic 表現。", "B": "錯誤。最常見的是 calcium oxalate(草酸鈣)結石(~80%),而非尿酸結石(僅 5–10%)。", "C": "錯誤。含鈣結石(calcium-based)為 radiopaque(X 光不透明、可顯影);radiolucent 的是尿酸結石。", "D": "錯誤。struvite(鹿角型,含 magnesium/ammonium/phosphate)由產 urease 菌使尿鹼化,在『鹼性尿』中形成,非酸性尿。"}, "sources": ["Harrison 21e, Nephrolithiasis", "Brenner & Rector's The Kidney 11e", "AUA/EAU Urolithiasis Guideline"]}}, "109-進階-外科-77": {"quick": "ESWL 禁忌含孕婦、未矯正凝血異常、解剖結構異常(無法定位/碎屑無法排);『輸尿管結石合併腎積水』(D)反而是 ESWL 的常見適應症(積水代表阻塞需處理),故非禁忌。", "detail": {"background": "體外震波碎石術(extracorporeal shock wave lithotripsy, ESWL)以體外產生的震波聚焦於結石使其碎裂、碎屑隨尿排出,適用於 <2 cm 的腎與上段輸尿管結石。絕對/相對禁忌症:①懷孕(震波傷胎,絕對禁忌);②未矯正的凝血功能異常或抗凝治療中(碎石致腎被膜下/周圍出血、血腫);③未控制的泌尿道感染(碎石致菌血症/urosepsis);④結石遠端阻塞(碎屑無排出路徑);⑤無法定位結石(過度肥胖、解剖結構異常/畸形使震波無法聚焦);⑥未控制的高血壓;⑦腹主動脈瘤鄰近;⑧裝置心律調節器/植入式電子裝置(相對)。『輸尿管結石合併輕中度腎積水』本身不是禁忌——腎積水是結石阻塞的後果,ESWL 正是用來解除阻塞的治療手段(只要遠端無固定狹窄使碎屑無法排出);但若是『嚴重阻塞合併感染』則須先引流。護理:術後監測血尿(常見且短暫)、腎周圍血腫、發燒(感染)、steinstrasse(石街)。", "options": {"A": "是禁忌。孕婦接受 ESWL 震波可能傷及胎兒,為絕對禁忌。", "B": "是禁忌。身體畸形/解剖結構異常使結石無法被震波正確定位聚焦,影響療效與安全。", "C": "是禁忌。未經治療的凝血功能異常會增加碎石後腎被膜下/周圍出血與血腫風險。", "D": "不是禁忌(正解)。輸尿管結石合併腎積水代表結石造成阻塞,正是 ESWL 欲解除的目標,屬適應症而非禁忌(除非合併感染或遠端固定狹窄阻礙碎屑排出)。"}, "sources": ["AUA/EAU Urolithiasis Guideline (ESWL contraindications)", "Campbell-Walsh-Wein Urology", "Harrison 21e, Nephrolithiasis"]}}, "109-進階-外科-80": {"quick": "ESWL 常見併發症為血尿、腎周圍血腫、steinstr
