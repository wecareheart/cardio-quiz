g": "113", "source": "MOHW", "topic": "泌尿道感染與腎盂腎炎", "topic_code": "T9", "topic_num": 7, "correction_note": ""}, {"id": "113-進階-家庭-76", "roc_year": 113, "subject_group": "進階專科護理", "branch": "家庭", "q_num": 76, "stem": "76 歲女性病人,失智症病史多年,吃飯需要他人餵食,近半年來發現吞嚥變差,近1 週 開始出現更虛弱且嗜睡,今早注意到病人四肢抽動,趕緊送來急診。檢查時注意到口腔 黏膜乾燥,皮膚彈性差。血液檢驗: pH 7.32、PCO 2 40 mmHg、HCO3- 22 mEq / L、 K + 3.2 mEq / L、Na + 119 mEq / L、BUN 80 mg / dL、creatinine 2.0 mg / dL、glucose 500 mg / dL, 下列何者為此病人最適當之初步治療?", "options": {"A": "3 % saline 100 mL IV in 15 mins", "B": "regular insulin 20 IU IV stat", "C": "normal saline 1000 mL IF in 1 hour", "D": "normal saline 3000 mL IF in 1 hour"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_進階_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "水分電解質異常", "topic_code": "T5", "topic_num": 4, "correction_note": ""}, {"id": "113-進階-家庭-78", "roc_year": 113, "subject_group": "進階專科護理", "branch": "家庭", "q_num": 78, "stem": "78 歲女性病人,因糖尿病及中風臥床2 年且有導尿管留置,並由居家護理師定期到府更換。 本週因尿液混濁進行尿液培養,培養結果為 Candida species 50000 CFU / mL,然病人無發燒、 血尿或下腹痛,下列敘述何者正確?", "options": {"A": "病人尚無尿路感染症狀,暫不需給予藥物治療", "B": "應由留置導尿管進行單次膀胱灌洗", "C": "屬複雜性泌尿道感染,應給予口服抗黴菌劑治療", "D": "應給予預防性口服抗生素,防止細菌性泌尿道感染"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "113_進階_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "泌尿道感染與腎盂腎炎", "topic_code": "T9", "topic_num": 7, "correction_note": ""}, {"id": "113-進階-麻醉-38", "roc_year": 113, "subject_group": "進階專科護理", "branch": "麻醉", "q_num": 38, "stem": "關於腎臟移植病人的麻醉照護,下列敘述何者錯誤?", "options": {"A": "評估侵入性監測利弊與導管置入相關敗血症之風險", "B": "胃排空時間常會延遲", "C": "尿量可作為直接監測指標,吻合後使用 mannitol 和 furosemide 進行利尿", "D": "應優先使用 N / S,因大量 lactated Ringers 可引起高氯性代謝性酸中毒"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "113_進階_麻醉_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "透析與腎臟移植", "topic_code": "T7", "topic_num": 6, "correction_note": ""}, {"id": "113-進階-麻醉-53", "roc_year": 113, "subject_group": "進階專科護理", "branch": "麻醉", "q_num": 53, "stem": "下列何者為腦部受傷後造成之尿崩症 ( diabetes insipidus ) 常見的血液及尿液檢查結果?", "options": {"A": "low serum sodium concentration", "B": "low serum osmolality", "C": "low urine osmolality", "D": "low urine sodium concentration"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_進階_麻醉_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "水分電解質異常", "topic_code": "T5", "topic_num": 4, "correction_note": ""}, {"id": "113-通論-麻醉-66", "roc_year": 113, "subject_group": "專科護理通論", "branch": "麻醉", "q_num": 66, "stem": "有關圍術期急性腎損傷 ( acute kidney injury, AKI )的原因,下列敘述何者錯誤?", "options": {"A": "術中平均動脈壓55 mmHg 持續時間小於 5 分鐘並不會引起AKI", "B": "術中出血或低血容(hypovolemia)可能會引起AKI", "C": "高齡與術後 AKI 的發生有密切相關", "D": "接受心臟和主動脈手術的病人 AKI 風險會升高"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "113_通論_麻醉_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "急性腎損傷(AKI)", "topic_code": "T3", "topic_num": 3, "correction_note": ""}, {"id": "113-進階-麻醉-74", "roc_year": 113, "subject_group": "進階專科護理", "branch": "麻醉", "q_num": 74, "stem": "50 歲病人接受腎臟移植手術,新腎臟再灌流 ( renal reperfusion ) 時生命徵象穩定,關於血液動 力學的處置,下列敘述何者最不適當?", "options": {"A": "麻醉中維持平均動脈壓 60 mmHg", "B": "發生低血壓時,可先給予晶體溶液,若無法改善,可再靜脈推注血管收縮劑 ( vasopressors )", "C": "患有慢性高血壓的病人,平均動脈壓維持在基礎血壓 ( baseline blood pressure ) 的 15 - 20 %", "D": "術中建議監控中央靜脈壓 ( central venous pressure, CVP )"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "113_進階_麻醉_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "透析與腎臟移植", "topic_code": "T7", "topic_num": 6, "correction_note": ""}, {"id": "114-進階-兒科-52", "roc_year": 114, "subject_group": "進階專科護理", "branch": "兒科", "q_num": 52, "stem": "一位8 個月大嬰兒,因反覆脫水與體重減輕住院。入院時其有大量稀尿、頻繁口渴、血鈉 152 mEq / L、尿比重< 1.005、尿滲透壓明顯低下,經去氨加壓素 ( decompressin acetate, DDAVP ) 等檢驗後診斷為中樞性尿崩症 ( central diabetes insipidus )。有關護理照顧的敘述, 下列何者最適當?", "options": {"A": "持續補充高張性靜脈輸液以避免腦水腫", "B": "避免輸液過快以防止快速降低血鈉濃度引發癲癇", "C": "限制水分攝取以降低尿量並改善電解質不平衡", "D": "建議餵食高蛋白高鈉飲食以補充電解質流失"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_進階_兒科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "水分電解質異常", "topic_code": "T5", "topic_num": 4, "correction_note": ""}, {"id": "114-進階-兒科-64", "roc_year": 114, "subject_group": "進階專科護理", "branch": "兒科", "q_num": 64, "stem": "一位6 歲兒童由家人帶來求診,主訴無症狀血尿,尿液常規檢驗: 紅血球 100 / HPF、蛋白質 1 +,血清補體 C 3: 40 mg / dL( normal range 90 - 180 )、血清補體 C 4: 10 mg / dL ( normal range 18 - 40 )、抗鏈球菌溶血 O ( anti - streptolysin O titer ) 250 IU / ml ( normal range < 166 IU / ml )、血清肌酸酐 ( creatinine ) 0.9 mg / dL、血壓 135 / 90 mmHg, 下列敘述何者最不適當?", "options": {"A": "鏈球菌感染後的腎絲球腎炎 ( PSGN ) 為最可能的診斷", "B": "膜性增生性腎絲球炎 ( membranoproliferative GN ) 是鑑別診斷之一", "C": "需給與對鏈球菌敏感的抗生素用來治療急性腎絲球腎炎", "D": "大於 95 % 的病人會完全恢復正常,同時復發的機率是極為罕見"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_兒科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "腎絲球疾病(腎炎/腎病症候群)", "topic_code": "T1", "topic_num": 1, "correction_note": ""}, {"id": "114-進階-兒科-65", "roc_year": 114, "subject_group": "進階專科護理", "branch": "兒科", "q_num": 65, "stem": "有關小兒泌尿道感染的治療,下列何者最不正確?", "options": {"A": "急性腎盂腎炎 ( acute pyelonephritis ) 抗生素治療的時間應為 7 - 10 天", "B": "急性腎盂腎炎的抗生素治療口服與靜脈給予的效果相同", "C": "急性大葉性腎炎 ( acute lobar nephronia ) 抗生素治療的時間至少需 14 天", "D": "泌尿道感染的治療療程完成後,必須重複尿液培養確定"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "114_進階_兒科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "泌尿道感染與腎盂腎炎", "topic_code": "T9", "topic_num": 7, "correction_note": ""}, {"id": "114-進階-兒科-66", "roc_year": 114, "subject_group": "進階專科護理", "branch": "兒科", "q_num": 66, "stem": "有關兒童急性腎損傷 ( acute kidney injury, AKI ) 的敘述,下列何者最不適當?", "options": {"A": "早期高血鉀症的心電圖變化包括:高 T 波、QRS 波變寬、ST 節段下降等", "B": "可口服或灌腸給予kayexalate 以利於鉀離子排出", "C": "利尿劑應在血管內容積足夠時使用,若使用後尿量沒有改善,可考慮連續給予利尿劑", "D": "應積極的補充碳酸氫鈉 ( NaHCO 3 ),以維持重碳酸鹽 ( HCO 3- ) 在 20 – 26 mEq / L 的範圍"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "114_進階_兒科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "急性腎損傷(AKI)", "topic_code": "T3", "topic_num": 3, "correction_note": ""}, {"id": "114-進階-兒科-67", "roc_year": 114, "subject_group": "進階專科護理", "branch": "兒科", "q_num": 67, "stem": "有關引發泌尿道感染之危險因子,下列何者最無相關性?", "options": {"A": "使用布質尿布", "B": "男生包皮過長", "C": "訓練大小便", "D": "性交頻繁之青少女"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "114_進階_兒科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "泌尿道感染與腎盂腎炎", "topic_code": "T9", "topic_num": 7, "correction_note": ""}, {"id": "114-進階-兒科-68", "roc_year": 114, "subject_group": "進階專科護理", "branch": "兒科", "q_num": 68, "stem": "一位4 歲兒童因全身水腫、小便減少就醫,尿液檢查呈現有 4 價蛋白尿、血液檢查發現血中 膽固醇 270 mg / dL、白蛋白 2.0 g / dL、血中肌酸酐 ( creatinine ) 0.7 mg / dL。最佳診斷為下列 何者?", "options": {"A": "尿路感染 ( urinary tract infection )", "B": "腎絲球腎炎 ( glomerulonephritis )", "C": "慢性腎衰竭 ( chronic renal failure )", "D": "腎病症候群 ( nephrotic syndrome )"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "114_進階_兒科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "腎絲球疾病(腎炎/腎病症候群)", "topic_code": "T1", "topic_num": 1, "correction_note": ""}, {"id": "114-進階-兒科-69", "roc_year": 114, "subject_group": "進階專科護理", "branch": "兒科", "q_num": 69, "stem": "一位病童接受排尿性膀胱尿道攝影檢查,發現除尿路逆流外,腎盂、腎盞清楚地擴張與 變形、輸尿管有輕微擴張情形。此檢查結果之尿路逆流屬於第幾級?", "options": {"A": "第二級", "B": "第三級", "C": "第四級", "D": "第五級"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_兒科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "泌尿道感染與腎盂腎炎", "topic_code": "T9", "topic_num": 7, "correction_note": ""}, {"id": "114-進階-兒科-80", "roc_year": 114, "subject_group": "進階專科護理", "branch": "兒科", "q_num": 80, "stem": "一位 3 歲兒童腹部腫脹約2 週。體檢發現右側腹部無壓痛、平滑、可觸及的腫塊,邊界清楚 且不易移動。病童無明顯腹痛或腸胃道症狀,偶有低燒與輕微血尿。血液檢查顯示白血球與 腎功能正常,甲型胎兒蛋白 ( alpha fetoprotein ) 未升高。尿液檢查顯微血尿。腹部超音波顯示 腎臟內部可見實質性腫塊,邊界清楚。腹部 CT 顯示腫瘤位於右腎,未跨越中線,無脊椎 受侵犯跡象,最可能的診斷為何?", "options": {"A": "神經母細胞瘤 ( neuroblastoma )", "B": "威爾姆氏腫瘤 ( Wilms’ tumor )", "C": "肝母細胞瘤 ( hepatoblastoma )", "D": "腎盂腫瘤 ( renal pelvis tumor )"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_進階_兒科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "腎臟腫瘤與囊性/遺傳性腎病", "topic_code": "T11", "topic_num": 10, "correction_note": ""}, {"id": "114-進階-內科-6", "roc_year": 114, "subject_group": "進階專科護理", "branch": "內科", "q_num": 6, "stem": "有關胺基糖苷類 ( aminoglycosides ) 藥物,下列敘述何者不適當?", "options": {"A": "透過與細菌核糖體 ( ribosome ) 結合,在 mRNA 轉譯過程,抑制細菌蛋白質合成", "B": "常與細胞壁活性藥物 ( 如β 內醯胺類 ) 併用,用於治療嚴重感染", "C": "在膿瘍 ( abscesses ) 的低pH 值 / 低氧環境中,仍保有良好的活性", "D": "使用需注意發生不可逆腎毒性 ( nephrotoxicity ) 和耳毒性 ( ototoxicity )"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_內科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "腎小管間質疾病/RTA/腎毒性與藥理", "topic_code": "T12", "topic_num": 9, "correction_note": ""}, {"id": "114-進階-內科-11", "roc_year": 114, "subject_group": "進階專科護理", "branch": "內科", "q_num": 11, "stem": "下列實驗室檢查結果,何者不符合腎前性急性腎損傷 ( prerenal acute kidney injury )的診斷?", "options": {"A": "排鈉分率 ( fractional excretion of sodium, FENa ) > 1 %", "B": "尿液滲透壓 ( urine osmolality ) > 500 mOsm / kg", "C": "尿素氮和血清肌酸酐的比值 ( BUN: Cr ratio ) > 20", "D": "尿素排出分率 ( fractional excretion of urea nitrogen, FEUrea ) < 35 %"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "114_進階_內科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "急性腎損傷(AKI)", "topic_code": "T3", "topic_num": 3, "correction_note": ""}, {"id": "114-進階-內科-17", "roc_year": 114, "subject_group": "進階專科護理", "branch": "內科", "q_num": 17, "stem": "一位 65 歲男性因泌尿道感染併發寒顫與發燒入院,生命徵象為血壓 85 / 50 mmHg、 體溫 37.8 ° C、心跳 110 次 / 分、呼吸速率 24 次 / 分,尿量明顯減少。 SpO 2為 98 %, 乳酸值為 4.2 mmol / L。此時,作為專科護理師,下列哪項處置應優先執行?", "options": {"A": "盡快安排病人立即接受腎臟超音波檢查,查明是否有水腎 ( hydronephrosis )", "B": "給予退燒藥以降低病人不適", "C": "快速給予靜脈輸注晶體溶液 ( crystalloid fluid ) 30 mL / kg 以穩定血壓", "D": "等待醫師評估後再決定是否使用升壓劑"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_內科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "泌尿道感染與腎盂腎炎", "topic_code": "T9", "topic_num": 7, "correction_note": ""}, {"id": "114-進階-內科-64", "roc_year": 114, "subject_group": "進階專科護理", "branch": "內科", "q_num": 64, "stem": "懷孕 6 個月婦女因持續發燒 2 天,合併寒顫、頻尿及腰痛入院,體溫 39.2°C、脈搏 88 次 / 分、 呼吸 18 次 / 分及血壓 110 / 90 mmHg,身體診察發現右側肋脊夾角敲痛 ( CV angle knocking pain ), 尿液培養尚未有報告,下列處置何者最適當?", "options": {"A": "為避免藥物副作用,不建議使用抗生素,給予支持療法即可", "B": "優先選擇口服抗生素,療程以 3 天為限,以免造成胎兒傷害", "C": "靜脈注射 quinolone 類抗生素為優先選擇", "D": "靜脈注射 ampicillin 類或 cephalosporins 類抗生素為優先選擇"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "114_進階_內科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "泌尿道感染與腎盂腎炎", "topic_code": "T9", "topic_num": 7, "correction_note": ""}, {"id": "114-進階-內科-65", "roc_year": 114, "subject_group": "進階專科護理", "branch": "內科", "q_num": 65, "stem": "慢性腎衰竭第五期的病人,血液檢驗報告呈現 BUN 182 mg / dL、creatinine 16.4 mg / dL, 建議進行血液透析治療,為預防初次血液透析引起的透析不平衡症候群,下列選項何者 正確?", "options": {"A": "延長透析間隔天數", "B": "較快的透析血流速", "C": "縮短初次透析時間", "D": "選擇面積較大的透析器"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_內科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "透析與腎臟移植", "topic_code": "T7", "topic_num": 6, "correction_note": ""}, {"id": "114-進階-內科-66", "roc_year": 114, "subject_group": "進階專科護理", "branch": "內科", "q_num": 66, "stem": "有關腹膜透析的敘述,下列何者正確?", "options": {"A": "相較於血液透析病人較常出現低血鉀症", "B": "衛教飲食中蛋白質攝取量為 0.6 - 0.8 g / da _group": "進階專科護理", "branch": "內科", "q_num": 80, "stem": "第三期慢性腎臟病病人,因罹患轉移性大腸癌,近期抱怨右側腰部持續性鈍痛。雖每 4 小時 服用 acetaminophen 500 mg,但疼痛指數仍為 6 分 ( 滿分 10 分表示最痛 )。根據 WHO 三階 止痛藥物開立原則,下列何者是最適當的藥物處置?", "options": {"A": "增加 acetaminophen 劑量至每日上限", "B": "改用口服 celecoxib", "C": "加上口服 tramadol", "D": "改用靜脈輸注 morphine"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_內科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "腎小管間質疾病/RTA/腎毒性與藥理", "topic_code": "T12", "topic_num": 9, "correction_note": ""}, {"id": "114-進階-外科-28", "roc_year": 114, "subject_group": "進階專科護理", "branch": "外科", "q_num": 28, "stem": "有關急性腎損傷 ( acute kidney injury, AKI ) 的敘述,下列何者錯誤?", "options": {"A": "併發有低血鉀、低血磷、高血鈣及代謝性酸中毒等", "B": "尿量 < 0.5 mL / kg / 小時,持續 6 小時", "C": "48 小時內血清肌酸酐升高 ≥ 0.3 mg / dL", "D": "腎內性急性腎損傷最常見的原因是急性腎小管壞死"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "114_進階_外科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "急性腎損傷(AKI)", "topic_code": "T3", "topic_num": 3, "correction_note": ""}, {"id": "114-進階-外科-30", "roc_year": 114, "subject_group": "進階專科護理", "branch": "外科", "q_num": 30, "stem": "有關活體腎臟捐贈者的禁忌症,下列何者錯誤?", "options": {"A": "BMI ( 身體質量指數 ) 大於 20 kg / m 2", "B": "顯著的白蛋白尿", "C": "具活動性惡性腫瘤", "D": "嚴重的精神疾病障礙"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "114_進階_外科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "透析與腎臟移植", "topic_code": "T7", "topic_num": 6, "correction_note": ""}, {"id": "114-進階-家庭-60", "roc_year": 114, "subject_group": "進階專科護理", "branch": "家庭", "q_num": 60, "stem": "一位 25 歲女性病人,抱怨過去 2 天頻尿、尿急和解尿疼痛。沒有發燒、寒顫、腰痛或 噁心嘔吐,沒有泌尿道感染病史。身體診察發現生命徵象穩定,腹部無壓痛,無肋脊角 壓痛。尿液分析顯示:白血球酯酶 ( eukocyte esterase ) 陽性,亞硝酸鹽 ( nitrite ) 陽性, 白血球 50 - 100 / HPF,紅血球 0 - 5 / HPF。根據上述臨床情境,最可能的診斷為何?", "options": {"A": "腎盂腎炎 ( pyelonephritis )", "B": "膀胱炎 ( cystitis )", "C": "陰道炎 ( vaginitis )", "D": "腎結石 ( nephrolithiasis )"}, "n angiotensin - receptor blocker", "C": "給予利尿劑", "D": "使用等滲透壓性顯影劑"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "114_進階_家庭_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "腎小管間質疾病/RTA/腎毒性與藥理", "topic_code": "T12", "topic_num": 9, "correction_note": ""}, {"id": "114-進階-麻醉-34", "roc_year": 114, "subject_group": "進階專科護理", "branch": "麻醉", "q_num": 34, "stem": "有關長期接受血液透析治療病人的術前麻醉評估,下列敘述何者最適當?", "options": {"A": "電解質監測,確認高血鈣與低血磷狀態已矯正", "B": "電解質監測,確認高血鈉與低血鉀狀態已矯正", "C": "長期服用 imipramine,會提高心律不整的風險", "D": "長期服用 fluoxetine,會提高非典型性尿毒溶血症候群風險"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_麻醉_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "透析與腎臟移植", "topic_code": "T7", "topic_num": 6, "correction_note": ""}, {"id": "114-通論-麻醉-70", "roc_year": 114, "subject_group": "專科護理通論", "branch": "麻醉", "q_num": 70, "stem": "有關腎功能的術前評估,下列何者正確?( 血清肌酸酐: serum creatinine; BUN: blood urea nitrogen; GFR:腎絲球過濾率 )", "options": {"A": "血清肌酸酐濃度能夠可靠地偵測出輕微的腎功能障礙", "B": "相較於血清肌酸酐或BUN,肌酸酐清除率是衡量 GFR 更可靠的指標", "C": "BUN 濃度主要受腎功能影響,不受飲食或水合狀態的影響", "D": "血清肌酸酐濃度無法反映肌肉生產肌酸酐與腎臟排泄之間的平衡"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_通論_麻醉_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "腎小管間質疾病/RTA/腎毒性與藥理", "topic_code": "T12", "topic_num": 9, "correction_note": ""}], E={"105-TNPA-兒科-35": {"quick": "腎病症候群兒童長期/反覆使用 corticosteroid 會抑制生長，停藥後生長常可追趕回來，正確處置是先持續觀察身高，不需立即做生長激素測驗或補鈣。", "detail": {"background": "兒童腎病症候群（nephrotic syndrome, NS）80–90% 為 minimal change disease（MCD），對 corticosteroid 反應佳，但治療常需高劑量 prednisolone（2 mg/kg/day）數週並反覆復發，長期/累積類固醇暴露會造成醫源性 Cushing 表現與『線性生長抑制（growth suppression）』——機轉是 glucocorticoid 抑制下視丘 GHRH/腦垂體 GH 分泌、降低 IGF-1 生物活性、直接抑制生長板軟骨細胞增殖並促進蛋白分解。臨床上長期類固醇兒童身高速率（height velocity）會下降。關鍵概念：此種生長遲滯多為『可逆』，當疾病緩解、類固醇減量或停藥後，多數兒童會出現追趕性生長（catch-up growth）回到原本生長曲線百分位。本題病童剛停藥，正確的護理/臨床判斷是先『持續監測身高與生長速率』，給予時間觀察是否追趕，而非貿然介入。生長激素治療（GH therapy）僅在確診 GH deficiency 或經兒童內分泌科評估生長板未癒合且確實生長停滯時才考慮，且 NS 病童不常規使用。護理重點：定期測量並繪製生長曲線、評估營養與類固醇累積劑量、衛教家屬停藥後追趕生長之概念、留意骨齡與青春期發育。陷阱：把類固醇相關生長抑制誤判為低血鈣或蛋白質流失而給鈣或白蛋白注射，皆非正確處置。", "options": {"A": "正確。剛停類固醇，先持續觀察身高與生長速率，多數會出現追趕性生長；這是最恰當且不過度介入的處置。", "B": "錯誤。生長激素測驗與 GH 治療屬侵入且非首選，須先確認非單純類固醇可逆性抑制；NS 病童不常規使用 GH。", "C": "錯誤。身高未長與低血鈣無直接因果；類固醇相關生長抑制機轉是 GH/IGF-1 軸與生長板抑制，補鈣無法改善生長速率。", "D": "錯誤。蛋白質流失造成低白蛋白與水腫，但白蛋白注射僅短暫且用於急性低血容/嚴重水腫，與『身高不長』無關，不應用來促進生長。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Glomerular Diseases", "Nelson Textbook of Pediatrics, Nephrotic Syndrome", "KDIGO 2021 Clinical Practice Guideline for the Management of Glomerular Diseases"]}}, "105-TNPA-兒科-68": {"quick": "典型 PSGN（前驅感染＋茶色尿＋低 C3＋ASLO 升高）診斷靠臨床與血清學，腎切片（renal biopsy）最不需要，僅在不典型或病程不癒時才做。", "detail": {"background": "急性鏈球菌感染後腎絲球腎炎（post-streptococcal glomerulonephritis, PSGN）是兒童最常見的急性腎炎症候群（nephritic syndrome）原因。病生理為 group A β-hemolytic streptococcus（咽喉炎 1–2 週後或膿皮症 3–6 週後）誘發免疫複合體沉積於腎絲球，活化補體 classical/alternative pathway → C3 下降；表現為血尿（茶色/可樂色尿、dysmorphic RBC、RBC cast）、蛋白尿、水腫、高血壓、少尿與短暫腎功能下降。診斷依據：①前驅鏈球菌感染史＋鏈球菌抗體升高（ASLO、anti-DNase B）②低補體 C3（典型 6–8 週內回升，若 >8 週不回升要懷疑 MPGN 或 lupus）③典型尿液與臨床表現。預後極佳，>95% 兒童完全康復。本題病童有典型前驅感染、茶色尿、紅血球>100/HPF、蛋白尿、creatinine 輕度升高與心臟擴大（容積過載），臨床高度符合 PSGN。評估上：Body weight/BP 監測容積與高血壓（必要）；ASLO 與 C3 確認 PSGN（必要）；ANA 與 ANCA 用於鑑別 lupus nephritis 與 ANCA 相關血管炎等其他腎炎（合理排除）。腎切片在典型 PSGN『不需要』，僅在不典型表現（無低 C3、進行性腎衰竭、腎病範圍蛋白尿、C3 持續>8 週不回升、急進性腎炎 RPGN）時才考慮。護理重點：監測 I/O、體重、血壓、限鹽限水、處理高血壓與容積過載。", "options": {"A": "需要。體重與血壓監測容積過載與高血壓，是 PSGN 照護核心，故為必要評估。", "B": "需要。ASLO 證實鏈球菌前驅感染、C3 下降為 PSGN 典型血清學，最支持診斷。", "C": "合理需要。ANA/ANCA 用以鑑別 lupus nephritis 與 ANCA 血管炎等其他腎炎病因，於初步排除有其價值。", "D": "最不需要（正解）。典型 PSGN 靠臨床＋血清學即可診斷，腎切片屬侵入性，僅保留給不典型或病程異常者。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Acute Glomerulonephritis", "Nelson Textbook of Pediatrics, Poststreptococcal Glomerulonephritis", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "105-TNPA-兒科-69": {"quick": "PSGN 治療為支持性，重點在控制容積過載與高血壓（利尿劑＋降壓藥），故高血壓藥物常為必要治療；類固醇與抗生素皆非用來改善腎炎本身。", "detail": {"background": "PSGN 為自限性疾病，治療目標是『支持性處理併發症』而非根除病因。核心併發症是『鈉水滯留』導致的容積過載——表現為水腫、高血壓、甚至高血壓腦病變與肺水腫/心衰竭。因此治療階梯：①限鈉限水；②利尿劑（loop diuretic 如 furosemide）排除過多容積；③若血壓仍高，加用降壓藥（calcium channel blocker 如 nifedipine、或血管擴張劑）。高血壓在急性期可能危及生命（高血壓腦病變、抽搐），故降壓常是『必要』治療。抗生素（penicillin）僅用於清除仍存在的鏈球菌感染（避免傳播給接觸者），但『無法改善已發生的腎炎或改變腎炎病程』——因為腎炎是免疫複合體沉積後的免疫反應，感染早已過去。類固醇對典型 PSGN 無效，不是第一線（與 MCD 不同）。限鈉確實是急性期重點，但目的是控制容積與血壓，而非『預防慢性腎病』（PSGN 預後佳，少進展成 CKD）。護理重點：嚴密監測血壓、體重、I/O、限鈉限水、警覺高血壓腦病變與心衰竭徵象。", "options": {"A": "錯誤。類固醇對典型 PSGN 無效，非第一線；類固醇是 MCD/腎病症候群的首選，勿混淆。", "B": "正確（正解）。急性期容積過載與高血壓常須降壓藥（如 CCB／血管擴張劑）控制，可預防高血壓腦病變等危症，屬必要治療。", "C": "錯誤之處在於『預防慢性腎病』的說法。限鈉是急性期控制容積/血壓的重點，但 PSGN 預後佳少進展為 CKD，限鈉目的並非預防 CKD。", "D": "錯誤。抗生素清除殘存鏈球菌感染（防傳播），但無法改善或逆轉已發生的免疫複合體腎炎，不改變腎炎病程。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Acute Glomerulonephritis", "Nelson Textbook of Pediatrics, Poststreptococcal Glomerulonephritis", "Brenner & Rector's The Kidney 11e"]}}, "105-TNPA-兒科-70": {"quick": "腎病症候群水腫的機轉是大量蛋白尿→低白蛋白→血漿膠體滲透壓下降→血管內液體外漏到組織間隙，故『血管內容積增加』敘述錯誤（實為血管內容積常不足）。", "detail": {"background": "腎病症候群（NS）四大特徵：①大量蛋白尿（兒童 >40 mg/m²/hr 或 UPCR >2 mg/mg）②低白蛋白血症（serum albumin <2.5 g/dL）③水腫 ④高血脂。核心病生理是腎絲球濾過屏障（podocyte 與 slit diaphragm）受損 → 白蛋白大量漏出尿中 → 血漿白蛋白降低 → 血漿膠體滲透壓（oncotic pressure）下降 → 依 Starling 力學，液體從血管內滲入組織間隙形成水腫。傳統 underfill 理論認為血管內容積『減少』（甚至低血容），腎臟代償性活化 RAAS、ADH 促鈉水滯留加重水腫；部分病人為 overfill（原發腎臟鈉滯留）機轉。重點觀念：水腫『不』代表血管內容積增加——反而典型 MCD 病童在嚴重低白蛋白時血管內可能容積不足，過度利尿易致低血容性休克。高血脂機轉：肝臟因低 oncotic pressure 代償性增加脂蛋白合成＋脂蛋白分解下降。兒童 NS 以 MCD 最常見，對類固醇反應佳。護理重點：監測水腫/體重/尿蛋白、警覺低血容（過度利尿風險）、預防感染與血栓。", "options": {"A": "正確。NS 核心即大量尿蛋白流失（podocyte 損傷），是低白蛋白與後續一連串變化的源頭。", "B": "正確。低白蛋白→血漿膠體滲透壓（oncotic pressure）不足→液體外漏組織間隙形成水腫，機轉正確。", "C": "正確。NS 確會高血脂，機轉為肝臟代償增加脂蛋白合成＋脂蛋白分解下降，膽固醇與 LDL 上升。", "D": "錯誤（正解）。水腫並非血管內容積增加；機轉是血管內液外漏到間質，血管內容積常不足（underfill），故敘述有誤。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Nephrotic Syndrome", "Nelson Textbook of Pediatrics, Nephrotic Syndrome", "Brenner & Rector's The Kidney 11e"]}}, "105-TNPA-內科-48": {"quick": "單次 urine ACR 45 mg/g 落在 microalbuminuria（30–300）邊緣，需 3–6 個月內再驗確認持續性（至少 3 次中 2 次陽性）才診斷糖尿病腎病變並啟動 ACEi/ARB，故先 3 個月後再做 ACR 最適當。", "detail": {"background": "糖尿病腎病變（diabetic kidney disease, DKD）的早期標記是白蛋白尿。urine albumin-creatinine ratio（ACR）分級：<30 mg/g 正常；30–300 mg/g 為 moderately increased albuminuria（舊稱 microalbuminuria）；>300 mg/g 為 severely increased（macroalbuminuria）。重要原則：白蛋白尿有相當大的日間變異（運動、發燒、感染、月經、高血糖、高血壓、高蛋白餐皆可短暫升高），故『單次』陽性不足以診斷——需在 3–6 個月內重複檢測，3 次中至少 2 次（或 2 次中 2 次）持續陽性才確立 persistent albuminuria。本題 29 歲 T1DM 10 年、HbA1c 7–8%、眼底正常、血壓 135/85、單次 ACR 45 mg/g（剛跨入 microalbuminuria 邊緣）。正確做法是『先排除暫時性原因並 3 個月後再驗 ACR』確認是否持續，而非依單次結果即開始 ACEi/ARB。一旦確認 persistent albuminuria 才啟動 ACEi 或 ARB（兩者擇一、不併用）以降低腎絲球內壓、減少蛋白尿、延緩腎病進展。陷阱：尿路感染篩檢非必要（無症狀且無膿尿），單次邊緣值不應立即用藥。護理重點：血糖與血壓達標、定期監測 ACR 與 eGFR、衛教正確留尿時機。", "options": {"A": "錯誤（不是最佳）。單次邊緣 microalbuminuria 不足以診斷 DKD，未確認持續性即用 ACEi 過早。", "B": "錯誤（不是最佳）。同理，ARB 亦不應僅憑單次邊緣 ACR 即啟動；且 ACEi/ARB 須先確認持續性白蛋白尿。", "C": "錯誤。病人無泌尿道感染症狀或膿尿，常規做尿液感染篩檢非必要且非首要處置。", "D": "正確（正解）。3 個月後再驗 ACR 以確認是否為 persistent albuminuria（3 中 2 陽性），是診斷 DKD 的標準步驟，再決定是否用藥。"}, "sources": ["KDIGO 2022/2020 Diabetes in CKD Guideline", "ADA Standards of Care 2024", "Brenner & Rector's The Kidney 11e, Diabetic Nephropathy"]}}, "105-TNPA-內科-80": {"quick": "尿白蛋白 30 mg/dL／尿 Cr 75 mg/dL 換算 ACR≈400 mg/g（30/75×1000），>300 屬 macroalbuminuria（巨量白蛋白尿）；血 Cr 1.1 仍正常，尚未達慢性腎衰竭。", "detail": {"background": "糖尿病腎病變傳統分期（Mogensen）：①正常白蛋白尿（ACR <30 mg/g）②微量白蛋白尿/incipient nephropathy（ACR 30–300 mg/g）③巨量白蛋白尿/overt nephropathy（ACR >300 mg/g，常伴血壓上升、GFR 開始下降）④慢性腎衰竭/ESRD（GFR 持續下降至末期）。關鍵計算：當尿白蛋白與尿 creatinine 同單位（皆 mg/dL）時，ACR（mg/g）= 尿白蛋白(mg/dL) ÷ 尿 Cr(mg/dL) × 1000。本題尿 albumin 30 mg/dL、尿 Cr 75 mg/dL → ACR = 30/75 × 1000 = 400 mg/g，>300，屬『巨量白蛋白尿（macroalbuminuria）』。血清 Cr 1.1 mg/dL 仍在正常範圍，eGFR 尚可，故未到『慢性腎衰竭』階段。注意常見陷阱：勿把『尿白蛋白 30 mg/dL』直接當成 microalbuminuria——點尿濃度需用 ACR 校正尿液稀釋濃縮，30 mg/dL 配上偏低的尿 Cr（75）反映尿液偏稀，實際排泄量已達 macroalbuminuria。護理重點：此期應積極控糖控壓、啟動 ACEi/ARB（必要時加 SGLT2i）、監測 eGFR 與電解質、定期追蹤 ACR。", "options": {"A": "錯誤。ACR≈400 mg/g 遠高於 30，絕非正常白蛋白尿。", "B": "錯誤。microalbuminuria 為 ACR 30–300；本題換算後達 400，已超過此範圍。", "C": "正確（正解）。ACR≈400 mg/g >300，屬巨量白蛋白尿（macroalbuminuria / overt nephropathy）。", "D": "錯誤。血 Cr 1.1 mg/dL 仍正常、eGFR 尚可，未達慢性腎衰竭（需 GFR 持續下降至末期）。"}, "sources": ["Brenner & Rector's The Kidney 11e, Diabetic Nephropathy", "KDIGO 2022 Diabetes in CKD Guideline", "Harrison's Principles of Internal Medicine 21e, Diabetic Nephropathy"]}}, "106-106b-內科-68": {"quick": "腎病症候群病童低白蛋白→血管內容積不足，又出現低血壓（70/50）的低血容性休克，首選給白蛋白輸液（25% albumin）擴充血管內容積，切勿先給利尿劑（會加重低血容）。", "detail": {"background": "腎病症候群（尤其 MCD）因大量白蛋白流失致嚴重低白蛋白血症，血漿膠體滲透壓下降使液體外漏到第三腔隙（水腫、腹水），『血管內容積反而不足（underfill）』。當尿量減少、四肢水腫加重又合併低血壓（本題 BP 70/50、心搏 100），是典型『低血容性休克（hypovolemic shock）』而非容積過多。此時血色素偏高（本題 Hb 20 g/dL，血液濃縮）也支持血管內脫水。處置原則：先以含白蛋白的膠體（如 25% albumin）回填血管內容積、提升 oncotic pressure，將間質液拉回血管內、回復循環與尿量；待容積回穩後若仍水腫過多，可在 albumin 後謹慎給 furosemide 促利尿。關鍵陷阱：『先給利尿劑』在低血容狀態下會進一步排除血管內容積、加重休克，絕對禁忌單獨先用；dopamine 對低血容性休克非首選（休克根因是容積不足，應先補容積）；此病童意識/呼吸尚穩（RR 18），不需先插管急救。護理重點：監測 BP、HR、I/O、Hb/Hct、警覺輸注 albumin 後可能容積過載致肺水腫。", "options": {"A": "錯誤。低血容性休克下單獨先給利尿劑會更排空血管內容積、加重低血壓，屬禁忌。", "B": "錯誤。dopamine 升壓劑非低血容休克首選；根本問題是容積不足，應先補容積而非升壓。", "C": "錯誤。病童呼吸 18 次/分、意識未述昏迷，無立即呼吸衰竭，不需先插管。", "D": "正確（正解）。低白蛋白導致的低血容性休克應給白蛋白輸液擴充血管內容積、提升 oncotic pressure，回復循環與尿量。"}, "sources": ["Nelson Textbook of Pediatrics, Nephrotic Syndrome Complications", "Harrison's Principles of Internal Medicine 21e, Nephrotic Syndrome", "Brenner & Rector's The Kidney 11e"]}}, "106-106b-外科-48": {"quick": "懷孕合併 IgA nephropathy 且已有腎功能下降（Cr 1.8）與蛋白尿，會增加早產、子癲前症、IUGR 風險，但與『妊娠糖尿病』較無關（GDM 風險因子是肥胖/家族史/高齡等，非慢性腎病）。", "detail": {"background": "孕前已有慢性腎臟病（CKD）合併蛋白尿與腎功能受損的孕婦，妊娠不良結局風險明顯上升。本題 22 歲孕婦有 IgA glomerulonephritis 病史、血清 Cr 1.8 mg/dL（已升高）、baseline 24 小時尿蛋白 1200 mg、Ccr 輕度異常——屬中度腎功能受損合併蛋白尿的高風險妊娠。CKD 合併蛋白尿/高血壓對母胎的主要風險包括：①子癲前症（preeclampsia）——慢性腎病與既有蛋白尿/內皮功能異常是 preeclampsia 強烈危險因子，且臨床上與惡化的腎病難以區分；②早產（preterm delivery）——常因母體子癲前症或胎兒窘迫而需提早終止妊娠；③子宮內胎兒生長遲滯（IUGR）——胎盤灌流不足所致。這些都與 CKD/蛋白尿/高血壓的血管與胎盤病理直接相關。相對地，妊娠糖尿病（GDM）的危險因子是肥胖、高齡、GDM 病史、多囊卵巢、家族史、特定族群等『胰島素阻抗相關』因素，與慢性腎絲球疾病沒有直接因果，故為『較無關』者。護理重點：密切監測血壓、蛋白尿、腎功能與胎兒生長，警覺 preeclampsia 重疊（superimposed preeclampsia）。", "options": {"A": "有關。CKD/蛋白尿孕婦常因子癲前症或胎兒窘迫需提早生產，早產風險上升。", "B": "有關。既有蛋白尿、高血壓與內皮功能異常使子癲前症（superimposed preeclampsia）風險顯著增加。", "C": "較無關（正解）。妊娠糖尿病的危險因子為肥胖/高齡/家族史等胰島素阻抗因素，與慢性腎絲球疾病無直接因果。", "D": "有關。胎盤灌流不足致子宮內胎兒生長遲滯（IUGR），是 CKD 合併蛋白尿妊娠常見併發症。"}, "sources": ["Brenner & Rector's The Kidney 11e, Pregnancy and Kidney Disease", "Harrison's Principles of Internal Medicine 21e, IgA Nephropathy", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "106-106a-通論-25": {"quick": "紅血球柱狀體（RBC cast）是腎絲球源性血尿的標誌，代表紅血球在腎小管內與 Tamm-Horsfall 蛋白凝聚成型，幾乎專一指向腎絲球腎炎（glomerulonephritis）。", "detail": {"background": "尿沉渣中的『管型（cast）』在腎小管內由 Tamm-Horsfall（uromodulin）蛋白為基質形成，不同細胞或物質嵌入形成不同管型，具定位診斷價值。RBC cast（紅血球柱狀體）形成的前提是紅血球必須『在腎小管管腔內』與蛋白基質凝聚——這意味著紅血球是『從腎絲球』漏進腎小管系統的，而非來自下泌尿道（膀胱、輸尿管）。因此 RBC cast 是『腎絲球性血尿（glomerular hematuria）』的特異標記，最常見於各種腎絲球腎炎（PSGN、IgA nephropathy、lupus nephritis、ANCA 血管炎、Goodpasture 等），常伴 dysmorphic RBC（變形紅血球）與蛋白尿，構成 nephritic syndrome。對比：腎盂腎炎（pyelonephritis）典型見 WBC cast 與膿尿；腎小管缺血/急性腎小管壞死（ATN）見 muddy brown granular cast 與 renal tubular epithelial cell cast；膀胱炎（下泌尿道）的血尿是『等形紅血球（isomorphic RBC）』、無管型（因紅血球未經腎小管）。臨床/護理重點：見到 RBC cast 應啟動腎絲球腎炎評估（補體、自體抗體、必要時腎切片），並監測腎功能、血壓與蛋白尿。", "options": {"A": "正確（正解）。RBC cast 反映腎絲球源性血尿，紅血球經腎絲球漏入腎小管成型，專一指向腎絲球腎炎。", "B": "錯誤。腎盂腎炎典型為 WBC cast 與膿尿、菌尿，而非 RBC cast。", "C": "錯誤。腎小管缺血性傷害（ATN）典型為 muddy brown granular cast 與腎小管上皮細胞管型，非 RBC cast。", "D": "錯誤。膀胱炎為下泌尿道出血，紅血球未經腎小管，呈等形紅血球且無管型。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Approach to Hematuria", "Brenner & Rector's The Kidney 11e, Urinalysis", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "107-TNPA-兒科-59": {"quick": "PSGN 急性期重點是控制容積過載與高血壓（限鹽＋furosemide＋降壓如 nifedipine），penicillin 雖可清除殘存鏈球菌但無法改變腎炎病程，故非『治療腎炎所必要』。", "detail": {"background": "本題大雄 10 歲，2 週前咽喉炎，現茶色尿、RBC>100/HPF、蛋白尿、BP 160/100、ASLO 1200（升高）、C3 24 mg/dL（下降）、Cr 0.9（正常）——典型 PSGN。PSGN 為免疫複合體誘發的補體活化腎炎，自限性、預後佳。急性期治療目標是處理『鈉水滯留』所致的併發症：①限鈉限水控制容積；②利尿劑 furosemide 排除過多容積、改善水腫與血壓；③高血壓藥（如 CCB nifedipine、或血管擴張劑）控制嚴重高血壓（BP 160/100 有高血壓腦病變風險，必須降壓）。penicillin 的角色僅是清除咽喉殘存的鏈球菌、減少帶菌與傳染給家庭接觸者，『但無法改善或縮短已發生的免疫性腎炎』——因腎炎是感染後的免疫複合體反應，抗生素不能逆轉。故四選項中，penicillin 是『目前非必要的治療』（針對腎炎本身無效）。陷阱：誤以為抗生素能治腎炎。護理重點：嚴密血壓監測、限鈉限水、I/O 與體重監測、警覺高血壓腦病變（頭痛、抽搐、意識改變）與肺水腫。", "options": {"A": "正確（正解，為『非必要』者）。penicillin 清除殘存鏈球菌防傳播，但無法改變已發生的腎炎病程，非治療腎炎所必要。", "B": "需要。nifedipine（CCB）控制 BP 160/100 的高血壓，預防高血壓腦病變，屬必要治療。", "C": "需要。限鹽（sodium restriction）是控制容積過載與血壓的基礎措施。", "D": "需要。furosemide 利尿排除過多容積、改善水腫與高血壓，急性期常須使用。"}, "sources": ["Nelson Textbook of Pediatrics, Poststreptococcal Glomerulonephritis", "Harrison's Principles of Internal Medicine 21e, Acute Glomerulonephritis", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "107-TNPA-兒科-60": {"quick": "腎病症候群病童因 IgG 與補體 factor B 流失，易感染莢膜菌；蜂窩組織炎/腹膜炎的抗生素須涵蓋肺炎鏈球菌（pneumococcus）與革蘭氏陰性腸內菌。", "detail": {"background": "腎病症候群（NS）病童的感染易感性是重要併發症與死因。機轉：①大量尿蛋白流失同時帶走免疫球蛋白 IgG 與補體替代途徑的 factor B/properdin → 對『莢膜（encapsulated）細菌』的調理（opsonization）能力下降；②水腫液（腹水、皮下水腫）為細菌孳生的良好培養基；③類固醇/免疫抑制治療進一步降低免疫力。最典型的感染是『自發性細菌性腹膜炎（spontaneous bacterial peritonitis）』與蜂窩組織炎，最常見病原為 Streptococcus pneumoniae（肺炎鏈球菌，莢膜菌的代表），其次為革蘭氏陰性腸內菌（如 E. coli）以及 group A streptococcus、Haemophilus。因此經驗性抗生素需『同時涵蓋肺炎鏈球菌與革蘭氏陰性桿菌』（如 third-generation cephalosporin ceftriaxone/cefotaxime）。本題蜂窩組織炎答案 C『pneumococcus and gram-negative bacteria』正確涵蓋此兩大族群。預防：NS 病童建議接種肺炎鏈球菌疫苗（PCV/PPSV）。護理重點：警覺發燒、腹痛、局部紅腫熱痛等感染徵象，早期辨識腹膜炎與蜂窩組織炎，監測體溫與發炎指標。", "options": {"A": "錯誤。非典型分枝桿菌（atypical mycobacteria）非 NS 常見致病菌，無需特別涵蓋。", "B": "錯誤。念珠菌（candida）為黴菌，非 NS 蜂窩組織炎/腹膜炎的主要病原，不需常規涵蓋。", "C": "正確（正解）。NS 因 IgG/factor B 流失易感莢膜菌，pneumococcus 與革蘭氏陰性腸內菌是最常見病原，須同時涵蓋。", "D": "部分相關但不完整。Staphylococcus 雖為皮膚軟組織常見菌，但 NS 病童特別需涵蓋的關鍵是 pneumococcus＋gram-negative，單純涵蓋葡萄球菌不足。"}, "sources": ["Nelson Textbook of Pediatrics, Nephrotic Syndrome Infections", "Harrison's Principles of Internal Medicine 21e, Nephrotic Syndrome", "Brenner & Rector's The Kidney 11e"]}}, "107-TNPA-兒科-61": {"quick": "NS 病童低白蛋白(2.0)、血液濃縮(Hb 20)、心臟變小、脈搏微弱、BP 60/40，是血管內容積不足的低血容性休克（hypovolemic shock），而非敗血、心因或神經性休克。", "detail": {"background": "本題 6 歲 NS 病童：腹痛、冷汗、心搏過速、下肢輕微水腫、脈搏微弱、BP 60/40、胸片心臟『偏小』、尿蛋白3+、albumin 2.0 g/dL、cholesterol 400、Hb 20 g/dL、WBC 14,000——綜合判斷為『低血容性休克』。判讀關鍵：①嚴重低白蛋白血症（2.0）使血漿 oncotic pressure 下降，血管內液體外漏到第三腔隙（水腫、腹水）→ 血管內容積（preload）不足；②血液濃縮（Hb 高達 20 g/dL）反映血管內脫水；③胸片心臟『變小』＝心臟充填不足（容積過低），與心衰竭的心臟擴大相反；④脈搏微弱、低血壓、冷汗、心搏代償加快＝低灌流的休克表現。各型休克鑑別：低血容性（容積不足，CVP 低、心小）；心因性（幫浦衰竭，常心臟大、肺淤血）；敗血性（早期暖休克、血管擴張，雖 WBC 升高但本題無明確感染源且整體圖像是脫水濃縮）；神經性（脊髓/交感喪失，心搏常變慢非加快）。處置：給白蛋白回填血管內容積。護理重點：監測 BP/HR/I/O/Hb-Hct，警覺過度利尿誘發此並發症。", "options": {"A": "錯誤。雖 WBC 略升、有腹痛，但無明確感染源且整體呈血液濃縮/血管內脫水，圖像非典型敗血性休克。", "B": "正確（正解）。低白蛋白→血管內容積外漏＋血液濃縮（Hb 20）＋心臟變小＋脈弱低血壓，符合低血容性休克。", "C": "錯誤。心因性休克常見心臟擴大與肺淤血；本題心臟『變小』正好相反，不支持。", "D": "錯誤。神經性休克為交感張力喪失、常見相對心搏過緩與暖肢；本題心搏過速、冷汗，不符。"}, "sources": ["Nelson Textbook of Pediatrics, Shock & Nephrotic Syndrome", "Harrison's Principles of Internal Medicine 21e, Approach to Shock", "Brenner & Rector's The Kidney 11e"]}}, "107-TNPA-通論-24": {"quick": "CKD（eGFR 53.5，stage 3A）合併蛋白尿者應『限制』蛋白質（約 0.6–0.8 g/kg/day），故『蛋白質 1.5–2 g/kg/day』敘述為非（過量）。", "detail": {"background": "慢性腎臟病（CKD）分期依 eGFR（KDIGO）：G1 ≥90；G2 60–89；G3a 45–59；G3b 30–44；G4 15–29；G5 <15。本題吳先生 eGFR 53.5 ml/min/1.73m² 屬『stage 3A』。CKD 的營養治療核心是『適度限制蛋白質』以減少含氮廢物與腎絲球高灌流/高過濾，延緩腎病進展：KDIGO 與營養指引建議非透析、無糖尿病或穩定的 CKD G3–G5 病人蛋白質約 0.55–0.8 g/kg/day（糖尿病 CKD 約 0.6–0.8）；其中『高生物價蛋白（high biological value protein）』應占 50–75%（提供必需胺基酸、減少廢物產生）；同時須提供『足夠熱量 25–35 Kcal/kg/day』以避免蛋白質-能量耗損（PEW）並防止內生性蛋白分解。本題選項 B『1.5–2 g/kg/day』屬『高蛋白』飲食（接近健身/分解代謝狀態建議量），對 CKD 病人是有害的（加速腎病進展、增加尿毒素），故為錯誤敘述。陷阱：別把運動員/重症高蛋白需求套用到 CKD。護理重點：營養衛教、定期評估營養狀態與蛋白尿、避免過度限蛋白致營養不良、糖尿病者同時控糖控壓。", "options": {"A": "正確。eGFR 53.5 落在 45–59，屬 CKD stage 3A，分期無誤。", "B": "錯誤（正解）。CKD 應限制蛋白質（約 0.6–0.8 g/kg/day），1.5–2 g/kg/day 屬高蛋白，會加速腎病進展。", "C": "正確。高生物價蛋白占 50–75% 以提供必需胺基酸、減少含氮廢物，是 CKD 蛋白質配置原則。", "D": "正確。足夠熱量 25–30（至 35）Kcal/kg/day 以避免蛋白質-能量耗損與內生性蛋白分解。"}, "sources": ["KDIGO 2024 CKD Guideline; KDOQI Clinical Practice Guideline for Nutrition in CKD 2020", "Harrison's Principles of Internal Medicine 21e, Chronic Kidney Disease", "Brenner & Rector's The Kidney 11e"]}}, "108b-TNPA-兒科-64": {"quick": "典型 PSGN（前驅咽喉炎＋茶色尿＋dysmorphic RBC＋BP 150/100）治療為支持性，重點控制容積與高血壓（calcium channel blocker 或利尿劑），故選項 B 敘述正確。", "detail": {"background": "本題 7 歲男童咽喉炎 2 週後出現茶色尿、BP 150/100、WBC>20-30、RBC>100 with dysmorphic RBC、protein 2+——典型 PSGN（acute nephritic syndrome）。dysmorphic（變形）RBC 與紅血球管型是腎絲球源性血尿標誌，支持腎絲球腎炎而非下泌尿道出血。PSGN 病生理為鏈球菌抗原誘發免疫複合體沉積、活化補體，造成血尿、蛋白尿、水腫、高血壓與少尿。治療重點：①PSGN 是自限性、預後極佳（>95% 兒童完全康復），抗生素（penicillin）只清除殘存鏈球菌、無法減少或改變『已發生』的腎炎；②急性期主要處理鈉水滯留導致的容積過載與高血壓——限鈉限水、利尿劑（furosemide）、必要時降壓藥（CCB 如 nifedipine/amlodipine）。本題 B 選項『建議使用 calcium channel antagonist 或利尿劑治療』正確反映支持性照護重點。對比錯誤選項：A 誇大抗生素能『減少腎炎發生』；C 誤稱預後不佳/高比率 CKD（實則預後佳）；D 誇大血尿持續 1–2 年（鏡下血尿通常數月內、最長約 1–2 年漸消，但與『蛋白尿同時持續』之敘述不準）。護理重點：嚴密血壓監測、限鈉限水、I/O 與體重、警覺高血壓腦病變。", "options": {"A": "錯誤。penicillin 清除殘存鏈球菌、防傳播，但無法『減少腎炎的發生』或改變已發生的免疫性腎炎病程。", "B": "正確（正解）。急性期重點是控制容積過載與高血壓，使用 CCB 或利尿劑屬恰當支持性治療。", "C": "錯誤。PSGN 預後極佳，>95% 兒童完全康復，極少進展為慢性腎臟病，敘述相反。", "D": "錯誤。鏡下血尿多在數月內漸消（少數延至約 1 年），蛋白尿通常較早緩解；『兩者同時持續 1-2 年』不準確。"}, "sources": ["Nelson Textbook of Pediatrics, Poststreptococcal Glomerulonephritis", "Harrison's Principles of Internal Medicine 21e, Acute Glomerulonephritis", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "108a-TNPA-兒科-66": {"quick": "特發性腎病症候群（MCD）診斷標準是大量蛋白尿＋低白蛋白＋水腫＋高血脂；『血尿』不是診斷標準（典型 MCD 無明顯血尿，若顯著血尿要懷疑非 MCD）。", "detail": {"background": "兒童特發性腎病症候群（idiopathic nephrotic syndrome），80–90% 病理為 minimal change disease（MCD）。診斷四要件：①大量蛋白尿（nephrotic-range，兒童 UPCR >2 mg/mg 或 >40 mg/m²/hr，定性常 3+~4+）②低白蛋白血症（albumin <2.5 g/dL）③水腫（眼瞼、下肢凹陷性水腫）④高血脂/高膽固醇血症。典型 MCD 的特徵是『選擇性蛋白尿』且『血尿不明顯、血壓正常、補體正常、腎功能正常』——這些正常項目是 MCD 與『腎炎性（nephritic）疾病』的區別點。因此『血尿』並非腎病症候群的診斷標準；若兒童 NS 合併明顯血尿、高血壓、低補體或腎功能惡化，要懷疑非典型 NS 或其他腎絲球腎炎（如 FSGS、MPGN、PSGN、lupus nephritis），需考慮腎切片。本題問『何者錯誤（非診斷標準）』，答案為『血尿』。注意少數 MCD 可有微量鏡下血尿，但血尿從來不是診斷『要件』。護理重點：監測尿蛋白/白蛋白/水腫/血脂、警覺出現血尿或高血壓時轉介評估。", "options": {"A": "是診斷標準。水腫為 NS 四要件之一（低 oncotic pressure 致液體外漏）。", "B": "是診斷標準。大量蛋白尿（nephrotic-range proteinuria）為 NS 最核心要件。", "C": "錯誤（正解，非診斷標準）。典型 MCD 血尿不明顯，血尿不是腎病症候群的診斷要件；顯著血尿反而提示非 MCD。", "D": "是診斷標準。高膽固醇血症/高血脂為 NS 四要件之一（肝臟代償增加脂蛋白合成）。"}, "sources": ["Nelson Textbook of Pediatrics, Idiopathic Nephrotic Syndrome", "Harrison's Principles of Internal Medicine 21e, Nephrotic Syndrome / Minimal Change Disease", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "108b-TNPA-兒科-67": {"quick": "NS 病童低血容休克時，血液濃縮會使全血球計數（CBC）出現 Hb/Hct 上升（血濃縮），最能即時佐證血管內容積不足／低血容；故 CBC 可確認診斷。", "detail": {"background": "本題 6 歲 NS 復發病童，蛋白尿、腹痛 3 天、盜汗、心搏過速、BP 60/30，懷疑低血容性（hypovolemic）休克。NS 低血容休克的根本機轉是：大量白蛋白流失→低 oncotic pressure→血管內液體外漏到組織間隙（水腫、腹水）→血管內容積（plasma volume）減少→血液被『濃縮』。最直接反映血液濃縮、可即時佐證血管內脫水的檢驗是『全血球計數（CBC）』——表現為 hemoglobin/hematocrit 升高（hemoconcentration），白血球也可能因壓力/濃縮而上升。因此本題答案為 CBC。其他選項分析：血白蛋白（albumin）證實低白蛋白血症（NS 本就會低），它說明『為何會低血容』的背景原因，但不直接量化『當下血管內容積狀態』；BUN/Cr 可反映腎前性氮血症（容積不足時 BUN/Cr 比值上升）但較間接且受多因素影響；尿鈉與尿滲透壓在低血容/腎前狀態會顯示尿鈉降低、尿滲透壓上升（腎臟保鈉保水），亦為佐證但較費時。題目要『可確認診斷』且即時，CBC 的 Hb/Hct 上升最直接反映血液濃縮。護理重點：監測 Hb/Hct、BP、HR、I/O，給白蛋白回填容積。", "options": {"A": "正確（正解）。CBC 顯示 Hb/Hct 上升（血液濃縮）最直接反映血管內容積不足／低血容，可佐證診斷。", "B": "錯誤（非最佳）。NS 本就低白蛋白，albumin 說明病因背景，但不直接量化當下血管內容積狀態。", "C": "錯誤（非最佳）。BUN/Cr 比值上升可提示腎前性氮血症（容積不足），但較間接且受多因素干擾。", "D": "錯誤（非最佳）。尿鈉低、尿滲透壓高雖支持腎前/低血容，但檢驗較費時，非『確認』診斷的最即時指標。"}, "sources": ["Nelson Textbook of Pediatrics, Nephrotic Syndrome Complications", "Harrison's Principles of Internal Medicine 21e, Hypovolemia", "Brenner & Rector's The Kidney 11e"]}}, "108a-TNPA-兒科-68": {"quick": "Henoch-Schönlein purpura（IgA vasculitis）是 small vessel vasculitis，好發 4–6 歲學齡前兒童，故選項 A 正確；典型四聯徵（可觸性紫斑、關節炎、腹痛、腎炎）。", "detail": {"background": "過敏性紫斑症（Henoch-Schönlein purpura, HSP；現稱 IgA vasculitis）是兒童最常見的『全身性小血管炎（small vessel vasculitis）』，病生理為 IgA1 免疫複合體沉積於小血管壁與腎絲球膜質區（mesangium），常於上呼吸道感染後誘發。好發年齡 3–10 歲（典型 4–6 歲學齡前兒童），男童略多，秋冬好發。典型四大臨床表現：①可觸性紫斑（palpable purpura，對稱分布於下肢與臀部，不會因壓而退）②關節炎/關節痛③腹痛（腸壁血管炎，可併腸套疊、腸出血）④腎炎（HSP nephritis，表現血尿、蛋白尿，與 IgA nephropathy 病理相似）。腎臟受侵約 20–60%，多數為輕微一過性血尿/蛋白尿、預後良好，僅少數（尤其腎病範圍蛋白尿者）進展為 CKD——故『發生 CKD 機率大』的敘述為錯誤。治療：多為支持性；類固醇可緩解腹痛與關節痛，但『未被證實能預防或改變腎炎長期預後』，故非『標準腎炎治療』。本題答案 A 正確（小血管炎、好發學齡前）。注意：HSP 紫斑、腹痛、關節炎『不一定同時出現』，可先後發生。護理重點：監測紫斑分布、腹痛/腸套疊徵象、定期驗尿追蹤腎炎。", "options": {"A": "正確（正解）。HSP 為 IgA 介導的小血管炎，好發 4–6 歲學齡前兒童，敘述符合。", "B": "錯誤。HSP 各表現（紫斑、關節炎、腹痛、腎炎）可先後出現、不必『同時』；且皮膚為可觸性紫斑，敘述過於絕對。", "C": "錯誤。多數 HSP nephritis 為輕微一過性、預後良好，僅少數進展 CKD，並非『機會大』。", "D": "錯誤。類固醇可緩解腹痛/關節痛，但未證實能預防或改變腎炎長期預後，非標準腎炎治療。"}, "sources": ["Nelson Textbook of Pediatrics, IgA Vasculitis (Henoch-Schönlein Purpura)", "Harrison's Principles of Internal Medicine 21e, IgA Vasculitis", "KDIGO 2021 Glomerular Diseases Guideline (IgA Vasculitis Nephritis)"]}}, "108a-TNPA-內科-75": {"quick": "膜增生性腎炎（MPGN）合併 cryoglobulinemia（冷凝球蛋白陽性）最常見的肝炎病因是 C 型肝炎（HCV），HCV 相關 type II mixed cryoglobulinemia 是經典關聯。", "detail": {"background": "膜增生性腎絲球腎炎（membranoproliferative glomerulonephritis, MPGN）是一種以腎絲球膜質與內皮細胞增生、基底膜雙軌（double contour/tram-track）為特徵的免疫複合體腎炎，臨床常呈腎病症候群＋腎炎混合表現、低補體。重要關聯：『C 型肝炎病毒（HCV）感染』是 MPGN 在成人最常見的可辨識病因，機轉為 HCV 慢性感染誘發『混合型冷凝球蛋白血症（mixed cryoglobulinemia, type II，含單株 IgM-RF＋多株 IgG）』，冷凝球蛋白免疫複合體沉積於小血管與腎絲球，活化補體（典型 C4 顯著下降、C3 也低）造成 cryoglobulinemic MPGN，臨床可見可觸性紫斑、關節痛、周邊神經病變與腎炎/腎病。本題 47 歲男性雙腳水腫＋嚴重蛋白尿，切片 MPGN，cryoglobulin 陽性——最可能導因即 C 型肝炎。對比：A 型肝炎為急性自限、不慢性化，與 MPGN/cryoglobulin 無關；D 型肝炎需依附 B 肝、罕見與此關聯；E 型肝炎多為急性，無此典型關聯。治療：抗病毒清除 HCV（DAA）為根本，嚴重者加免疫抑制/血漿置換。護理重點：篩檢 HCV、監測補體與冷凝球蛋白、留意紫斑與神經症狀。", "options": {"A": "錯誤。A 型肝炎為糞口傳染、急性自限、不慢性化，與 cryoglobulinemia/MPGN 無關。", "B": "正確（正解）。HCV 是 MPGN 合併混合型冷凝球蛋白血症（type II）最經典的病因。", "C": "錯誤。D 型肝炎須依附 B 肝感染，與冷凝球蛋白相關 MPGN 無典型關聯。", "D": "錯誤。E 型肝炎多為急性（孕婦較重症），不是 MPGN/cryoglobulin 的典型導因。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, MPGN / Cryoglobulinemia / Hepatitis C", "Brenner & Rector's The Kidney 11e, MPGN", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "108b-TNPA-婦產科-60": {"quick": "卵巢過度刺激症候群（OHSS）的腹水/水腫機轉是 VEGF 介導血管通透性增加，使富含蛋白質的液體外漏到第三腔隙，與腎病症候群類似的『蛋白流失/體液重分布』概念；故選項 B 機轉描述最適當。", "detail": {"background": "卵巢過度刺激症候群（ovarian hyperstimulation syndrome, OHSS）是輔助生殖（hCG 觸發排卵後）常見且可能危及生命的併發症。病生理核心：被刺激而增大的卵巢（本題約 12 cm）在 hCG（外源性注射或妊娠內源性）作用下大量分泌『血管內皮生長因子（VEGF）』等血管活性物質，使全身微血管通透性（vascular permeability）增加 → 富含蛋白質的血漿從血管內漏出到第三腔隙 → 腹水、肋膜積水、全身水腫，同時血管內容積與蛋白下降（血液濃縮、低血容、寡尿、血栓風險上升）。本題出現 hCG 注射兩週後體重/腹圍急增、腸胃不適、腹水、卵巢 12 cm，典型 OHSS。選項 B『卵巢受刺激增大，分泌富含蛋白質液體增加』正確抓住『血管通透性增加致蛋白質液體外漏』的核心機轉（與題庫歸入腎絲球疾病主題的連結點即此『蛋白質豐富液體外漏／第三腔隙』概念，類比 NS 水腫）。治療為支持性：監測容積、避免脫水與血栓、嚴重者引流腹水/住院；『不應貿然用 furosemide 利尿』（會加重血管內低容積與血栓）；亦不建議劇烈運動（卵巢扭轉/破裂風險）。護理重點：監測體重/腹圍/I/O/Hct、警覺血栓與低血容、避免利尿與激烈活動。", "options": {"A": "部分對但非最佳。OHSS 確與外源性 hCG 觸發有關，但本題情境（不孕治療後注射 hCG）肯定是外源性；題幹要選『最適當敘述機轉』，B 更完整描述蛋白質液體外漏。", "B": "正確（正解）。增大的卵巢在 hCG 作用下經 VEGF 增加血管通透性，使富含蛋白質液體外漏到第三腔隙，形成腹水/水腫，機轉描述最適當。", "C": "錯誤。OHSS 為血管內低容積/血液濃縮狀態，給 furosemide 利尿會加重血管內脫水與血栓風險，屬不當處置。", "D": "錯誤。OHSS 卵巢大且易扭轉/破裂、血栓風險高，不建議規律（劇烈）運動，應避免激烈活動。"}, "sources": ["Williams Gynecology / Speroff's Clinical Gynecologic Endocrinology, OHSS", "Harrison's Principles of Internal Medicine 21e, Capillary Leak Mechanisms", "ASRM Practice Committee, Prevention and Treatment of OHSS"]}}, "109-進階-兒科-60": {"quick": "PSGN 確診最具支持性的血清學是『低補體 C3』（典型 6–8 週內回升）；ASLO 只證實鏈球菌前驅感染，尿檢顯示腎炎但不特異，故 C3 最能支持診斷。", "detail": {"background": "急性鏈球菌感染後腎絲球腎炎（PSGN）的診斷依據可拆為三類：①前驅鏈球菌感染證據（ASLO、anti-DNase B 抗體升高）②補體變化（C3 下降為核心）③臨床與尿液表現（茶色尿、dysmorphic RBC、RBC cast、蛋白尿）。在『最能支持/確立診斷』的脈絡下，『低補體 C3』最具特徵性——PSGN 機轉是免疫複合體活化補體 alternative pathway，C3 顯著下降而 C4 多正常，且典型『6–8 週內自行回升』。這個動態變化（先低後回升）是 PSGN 的重要診斷指紋，也用來與其他低補體腎炎（MPGN、lupus nephritis 之 C3 持續低不回升）區別。ASLO 升高只證明『曾有鏈球菌感染』，但鏈球菌感染極普遍，不能直接證明腎炎是它引起（且少數 PSGN 由皮膚感染引起時 ASLO 可能不高，需驗 anti-DNase B）。尿檢顯示腎炎性表現（血尿、蛋白尿、RBC cast）支持『腎絲球腎炎』但不特異於 PSGN。腎臟超音波對 PSGN 診斷無特異幫助（用於排除結構異常）。本題答案為 C3。護理重點：追蹤 C3 是否回升以確認 PSGN 診斷與病程。", "options": {"A": "錯誤（非最佳）。ASLO 升高只證實曾有鏈球菌感染，不能直接證明腎炎由它引起，特異性不足。", "B": "正確（正解）。低補體 C3（典型 6–8 週回升）是 PSGN 最具特徵性的血清學，最能支持診斷。", "C": "錯誤（非最佳）。尿檢顯示腎炎性血尿/蛋白尿，支持腎絲球腎炎但不特異於 PSGN。", "D": "錯誤。腎臟超音波對 PSGN 無特異診斷價值，主要用於排除結構性異常。"}, "sources": ["Nelson Textbook of Pediatrics, Poststreptococcal Glomerulonephritis", "Harrison's Principles of Internal Medicine 21e, Acute Glomerulonephritis", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "109-進階-兒科-62": {"quick": "兒童腎病症候群主要由『大量尿蛋白流失』引起（podocyte 損傷），選項 A 正確；其餘關於水腫機轉、降血脂藥、疫苗的敘述皆有誤。", "detail": {"background": "兒童腎病症候群（NS）以 MCD 最常見，核心病生理是腎絲球濾過屏障（podocyte/slit diaphragm）受損→大量白蛋白漏入尿液（massive proteinuria）→低白蛋白血症→低 oncotic pressure→水腫，並代償性高血脂。本題逐項釐清四個常見觀念陷阱：A『主要由尿蛋白大量流失引起』為核心正確機轉（一切下游變化的源頭）。B 的錯誤在『水腫是因腎功能變差致血管內容積增加』——典型 MCD 腎功能正常，水腫是低白蛋白致血管內液外漏（血管內容積常不足而非增加），且過度/盲目利尿在低血容時會誘發休克，不應『盡速使用利尿劑』。C 的錯誤在『常規使用降血脂藥』——兒童 NS 的高血脂多隨疾病緩解而改善，類固醇有效者高血脂常自行回復，不常規對兒童使用 statin（除非難治型/持續高血脂）。D 的錯誤在『不建議打肺炎鏈球菌或流感疫苗』——恰好相反，NS 病童因 IgG/factor B 流失易感莢膜菌感染，『應接種』肺炎鏈球菌（PCV/PPSV）與流感等『不活化疫苗』；但使用高劑量類固醇/免疫抑制時應避免『活性減毒疫苗（如 MMR、水痘、口服小兒麻痺）』。護理重點：監測尿蛋白/白蛋白/水腫、避免不當利尿致低血容、依時程接種不活化疫苗。", "options": {"A": "正確（正解）。NS 核心即 podocyte 損傷致大量尿蛋白流失，為低白蛋白與水腫等變化的源頭。", "B": "錯誤。典型 MCD 腎功能正常；水腫是低白蛋白致血管內液外漏（容積常不足），不應盲目盡速利尿（恐致低血容休克）。", "C": "錯誤。兒童 NS 高血脂多隨緩解改善，不常規使用降血脂藥，僅難治/持續高血脂者才考慮。", "D": "錯誤。NS 病童反而『應』接種肺炎鏈球菌、流感等不活化疫苗以防莢膜菌感染；僅活性減毒疫苗在免疫抑制期需避免。"}, "sources": ["Nelson Textbook of Pediatrics, Idiopathic Nephrotic Syndrome", "Harrison's Principles of Internal Medicine 21e, Nephrotic Syndrome", "KDIGO 2021 Glomerular Diseases Guideline; 兒童免疫接種建議"]}}, "109-進階-兒科-80": {"quick": "NS 病童低白蛋白(1.9)、血液濃縮(Hb 21)、低血壓(60/40)為低血容性休克，首選『白蛋白輸注』回填血管內容積，而非抗生素/dopamine/heparin。", "detail": {"background": "本題 9 歲 NS 病童：腹痛、冷汗、心搏過速、下肢輕微水腫、脈搏微弱、BP 60/40、尿蛋白3+、albumin 1.9、Na 125、Hb 21、WBC 16,000、PLT 600k——典型『低血容性休克』。機轉同前述：嚴重低白蛋白血症使血漿 oncotic pressure 崩跌，血管內液大量外漏到第三腔隙（水腫、腹水），血管內容積（preload）不足；Hb 高達 21 g/dL 與血鈉偏低（稀釋性低鈉）反映血液濃縮與容積重分布。處置首選『白蛋白輸注（25% albumin）』——回填血管內容積、提升 oncotic pressure 將間質液拉回血管內，恢復循環灌流與尿量；待容積回穩後若仍水腫過多，可在 albumin 之後謹慎給 furosemide。各錯誤選項：抗生素僅在確認感染（如腹膜炎）時使用，本題休克根因是低血容而非敗血；dopamine 升壓非低血容休克首選（應先補容積）；heparin 雖 NS 為高凝狀態（抗凝蛋白如 antithrombin III 流失致血栓風險），但在『急性低血容休克』當下首要是補容積，且血小板高、無明確血栓事件時不會優先給 heparin。護理重點：監測 BP/HR/I/O/Hb-Hct，輸 albumin 後警覺容積過載致肺水腫，並留意血栓徵象。", "options": {"A": "錯誤。無明確感染證據，休克根因是低血容；抗生素非優先處置。", "B": "正確（正解）。低白蛋白致低血容休克應先給白蛋白輸注回填血管內容積、提升 oncotic pressure、恢復灌流與尿量。", "C": "錯誤。dopamine 升壓劑非低血容休克首選；根本問題是容積不足，應先補容積。", "D": "錯誤。NS 雖高凝易血栓，但急性低血容休克當下首要補容積；血小板高、無血栓事件時不優先抗凝。"}, "sources": ["Nelson Textbook of Pediatrics, Nephrotic Syndrome Complications", "Harrison's Principles of Internal Medicine 21e, Approach to Shock", "Brenner & Rector's The Kidney 11e"]}}, "110-進階-兒科-65": {"quick": "5 歲 NS 病童低白蛋白(2.0)、血液濃縮(Hb 20)、低血壓(50/30)、稀釋性低鈉(125)為低血容性休克，治療首選『白蛋白』回填血管內容積，而非單獨給生理食鹽水或升壓劑。", "detail": {"background": "本題與多題類似：NS 病童因嚴重低白蛋白（2.0 g/dL）致血漿 oncotic pressure 崩跌、血管內液外漏第三腔隙，出現低血容性休克（BP 50/30、脈弱、Hb 20 血濃縮、Na 125 稀釋性低鈉、膽固醇 400 反映 NS）。為何首選『白蛋白』而非『生理食鹽水』？因為此類休克的核心問題是『血管內 oncotic pressure 不足』，單給等張晶體液（normal saline）雖可暫時擴容，但因低白蛋白，輸入的鹽水會很快再外漏到組織間隙、加重水腫且擴容效果短暫；給 25% albumin 同時提升 oncotic pressure，能把間質水拉回血管、擴容效果較持久，是低白蛋白性低血容休克的首選。實務上可先用少量晶體液初步穩定，但本題在『最正確治療』下選白蛋白。dopamine/dobutamine 為升壓/強心，非低血容休克根本治療（應先補容積）；抗生素無感染證據不需優先。注意：輸 albumin 後血管內容積回升，可能誘發容積過載/肺水腫，常於 albumin 後給 furosemide 並嚴密監測。護理重點：監測 BP/HR/I/O/Hb-Hct/呼吸，警覺輸注後肺水腫。", "options": {"A": "錯誤（非最佳）。生理食鹽水可暫時擴容，但低白蛋白下會快速外漏加重水腫、效果短暫，非低白蛋白性低血容休克的最佳選擇。", "B": "正確（正解）。白蛋白同時擴容並提升 oncotic pressure，把間質水拉回血管，是低白蛋白性低血容休克的首選治療。", "C": "錯誤。dopamine/dobutamine 為升壓強心劑，非低血容休克根本治療，應先補容積而非升壓。", "D": "錯誤。本題無明確感染證據，抗生素非優先；休克根因是低血容而非敗血。"}, "sources": ["Nelson Textbook of Pediatrics, Nephrotic Syndrome Complications", "Harrison's Principles of Internal Medicine 21e, Approach to Shock", "Brenner & Rector's The Kidney 11e"]}}, "110-進階-兒科-67": {"quick": "NS 病童 IgG 與補體 factor B 流失易感『莢膜菌』，除革蘭氏陰性腸內菌外，最常見的是『肺炎鏈球菌（Streptococcus pneumoniae）』，可致自發性腹膜炎與蜂窩組織炎。", "detail": {"background": "腎病症候群（NS）的感染易感性源於：大量尿蛋白流失同時帶走免疫球蛋白 IgG 與補體替代途徑的 factor B/properdin → 對『莢膜（encapsulated）細菌』的調理吞噬能力（opsonophagocytosis）下降；加上水腫液（腹水）為培養基、類固醇/免疫抑制降低免疫力。最具代表性的致病菌是『Streptococcus pneumoniae（肺炎鏈球菌）』——是 NS 病童自發性細菌性腹膜炎與蜂窩組織炎最常見的莢膜菌病原；其次為革蘭氏陰性腸內菌（如 E. coli）、group A streptococcus、Haemophilus influenzae。本題在『除革蘭氏陰性腸內菌之外、最常見者』，答案為肺炎鏈球菌（D）。因此 NS 病童的感染預防重點是接種『肺炎鏈球菌疫苗（PCV13/PPSV23）』與流感疫苗等不活化疫苗。對比其他選項：念珠菌（黴菌）非常見；group A strep 與金黃葡萄球菌雖可致皮膚軟組織感染，但 NS 特異性易感的莢膜菌代表是肺炎鏈球菌。護理重點：警覺發燒、腹痛（腹膜炎）、局部紅腫（蜂窩組織炎），確保疫苗接種，避免漏診莢膜菌感染。", "options": {"A": "錯誤。念珠菌（黴菌）非 NS 病童常見感染，不是莢膜菌易感的代表病原。", "B": "錯誤（非最佳）。group A strep 可致皮膚軟組織感染，但 NS 特異易感的莢膜菌代表並非它。", "C": "錯誤（非最佳）。金黃葡萄球菌為皮膚軟組織常見菌，但非 NS 因 IgG/factor B 流失而特異易感的莢膜菌。", "D": "正確（正解）。肺炎鏈球菌是 NS 病童最常見的莢膜菌病原，致自發性腹膜炎與蜂窩組織炎，故建議接種肺炎鏈球菌疫苗。"}, "sources": ["Nelson Textbook of Pediatrics, Nephrotic Syndrome Infections", "Harrison's Principles of Internal Medicine 21e, Nephrotic Syndrome", "Brenner & Rector's The Kidney 11e"]}}, "110-進階-內科-77": {"quick": "年輕女性蛋白尿＋血球低下(WBC/PLT 低)＋低 C3/C4＋對稱小關節痛，是 SLE（lupus nephritis），anti-dsDNA 抗體與疾病活性（尤其腎炎）呈正相關，故選項 A 正確。", "detail": {"background": "本題 20 歲女性：尿蛋白3+、白血球減少（2,800）、血小板減少（60,000）、補體 C3/C4 偏低、雙側手指與腕關節疼痛——典型『系統性紅斑性狼瘡（SLE）』合併狼瘡腎炎（lupus nephritis）。SLE 是自體免疫疾病，免疫複合體沉積活化補體致『低 C3、低 C4』（消耗性低補體），並造成多系統侵犯：腎炎（蛋白尿/血尿）、血液學異常（白血球減少、淋巴球減少、血小板減少、溶血性貧血）、對稱性非侵蝕性多關節炎（好發手指 PIP/MCP 與腕）。血清學上：①ANA 為篩檢（敏感但不特異）；②anti-dsDNA 抗體『特異性高且與疾病活性、尤其狼瘡腎炎活性正相關』，可用來監測病情與腎炎活動；③anti-Sm 抗體特異性高但與活性關聯較弱。本題選項 A『anti-dsDNA 與疾病活性呈正相關』正確。對比錯誤選項：B 把腸胃/泌尿道細菌感染誘發說成 SLE 機轉，是反應性關節炎/PSGN 的概念，非 SLE；C 的 anti-CCP 是『類風濕性關節炎（RA）』的特異抗體，非 SLE；D 前葡萄膜炎（anterior uveitis）與 HLA-B27 相關脊椎關節病（如 AS）關聯，非 SLE 典型。護理重點：監測補體與 anti-dsDNA 追蹤腎炎活性、血球、蛋白尿與器官侵犯。", "options": {"A": "正確（正解）。anti-dsDNA 抗體對 SLE 特異性高，且與疾病活性（尤其狼瘡腎炎）正相關，可監測病情。", "B": "錯誤。腸胃/泌尿道細菌誘發是反應性關節炎或 PSGN 的概念；SLE 為自體免疫病，非由特定感染菌直接誘發。", "C": "錯誤。anti-CCP 抗體是類風濕性關節炎（RA）的特異抗體，與 SLE 特異性無關。", "D": "錯誤。前葡萄膜炎與 HLA-B27 相關脊椎關節病（如僵直性脊椎炎）關聯，非 SLE 典型表現。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Systemic Lupus Erythematosus / Lupus Nephritis", "KDIGO 2021 Glomerular Diseases Guideline (Lupus Nephritis)", "ACR/EULAR 2019 SLE Classification Criteria"]}}, "111-進階-兒科-52": {"quick": "急性腎絲球腎炎（nephritic）與腎病症候群（nephrotic）皆可水腫，但僅腎病症候群因大量蛋白流失而『血漿白蛋白降低』；急性腎炎的水腫主要是鈉水滯留、白蛋白未必降低，故『血漿白蛋白均降低』為兩者共通敘述中正確者。", "detail": {"background": "本題比較『急性腎絲球腎炎（acute glomerulonephritis, nephritic syndrome）』與『腎病症候群（nephrotic syndrome）』兩大腎絲球症候群——但題目選項設計需逐一檢視『何者敘述正確』。先建立兩症候群的核心對照：①腎炎性（nephritic）：血尿（dysmorphic RBC、RBC cast）為主、輕中度蛋白尿（多 <3.5 g/day）、高血壓與少尿（鈉水滯留）、腎功能下降（BUN/Cr 上升）、水腫多為臉/眼瞼；②腎病性（nephrotic）：大量蛋白尿（>3.5 g/day 或兒童 nephrotic-range）、低白蛋白血症、明顯凹陷性水腫、高血脂、血尿不明顯、腎功能多正常（典型 MCD）。逐項判讀：A『均出現全身性水腫』——NS 水腫常較明顯且全身，急性腎炎水腫多較輕（眼瞼/臉），『均全身性』不準。B『血漿白蛋白數值均降低』——本題設定為『正確』者：NS 因大量蛋白流失白蛋白明顯降低；急性腎炎若有相當程度蛋白尿亦可使白蛋白偏低（兒童 PSGN 嚴重者亦可見），題意取『兩者皆可見白蛋白下降』為相對最正確的共通敘述。C『均會出現尿素氮上升』——BUN/Cr 上升主要見於腎炎性（GFR 下降），典型 NS（MCD）腎功能正常、BUN 不必上升，故非『均』。D『血脂值均異常升高』——高血脂是腎病症候群特徵，急性腎炎不必有高血脂，故非『均』。護理重點：依血尿/蛋白尿/白蛋白/腎功能/血脂的組合區分兩症候群並對應處置。", "options": {"A": "錯誤。NS 水腫常較明顯全身性，急性腎炎水腫多較輕（眼瞼/臉部），非『均』全身性水腫。", "B": "正確（正解）。NS 因大量蛋白流失白蛋白明顯降低，急性腎炎若蛋白尿明顯亦可見白蛋白下降，為兩者相對共通且正確的敘述。", "C": "錯誤。BUN 上升主要見於腎炎性（GFR 下降）；典型腎病症候群（MCD）腎功能正常，不必 BUN 上升，故非『均』。", "D": "錯誤。高血脂為腎病症候群特徵，急性腎炎不必有高血脂，故非『均』異常升高。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Nephritic vs Nephrotic Syndrome", "Nelson Textbook of Pediatrics, Glomerular Diseases", "Brenner & Rector's The Kidney 11e"]}}, "111-進階-兒科-66": {"quick": "NS 病童低血容休克時，血液濃縮使『血比容（hematocrit）升高（60%）』最能確認血管內容積不足／低血容性休克。", "detail": {"background": "本題 6 歲 NS 復發病童：蛋白尿、腹痛、盜汗、心搏快速、BP 50/30，懷疑低血容性（hypovolemic）休克，問『何者可確認診斷』。低血容性休克的核心是『血管內容積（plasma volume）減少』，最直接、即時反映此狀態的客觀數據是『血液濃縮（hemoconcentration）』——即 hematocrit（血比容）升高。本題選項 C『hematocrit 60%』（兒童正常約 35–45%）顯著升高，直接證實血漿容積減少、血液被濃縮，最能確認低血容。逐項分析其他選項：A『血鈉 128』為稀釋性低鈉（與容積重分布有關），雖常見於 NS 但低鈉本身不能『確認低血容』（低鈉成因眾多）；B『albumin 2.0』證實 NS 的低白蛋白血症（是低血容的『原因/背景』），但不直接量化當下血管內容積狀態；D『尿鈉低（8）＋尿滲透壓高（600）』反映腎臟在低灌流下保鈉濃縮尿液（腎前性/低血容的佐證），方向正確但較間接、且受其他因素影響，不如 Hct 升高直接。故答案為血比容升高（C）。護理重點：監測 Hct/Hb 變化、BP/HR/I/O，給白蛋白回填容積後留意 Hct 回落與容積過載。", "options": {"A": "錯誤（非最佳）。血鈉 128 為稀釋性低鈉，與容積重分布相關，但低鈉成因多，不能單獨『確認』低血容。", "B": "錯誤（非最佳）。albumin 2.0 證實低白蛋白血症，是低血容的背景原因，但不直接反映當下血管內容積狀態。", "C": "正確（正解）。hematocrit 升高至 60%（血液濃縮）最直接反映血漿容積減少，可確認低血容性休克。", "D": "錯誤（非最佳）。尿鈉低、尿滲透壓高支持腎前性/低血容，方向正確但較間接，不如 Hct 升高直接。"}, "sources": ["Nelson Textbook of Pediatrics, Nephrotic Syndrome Complications", "Harrison's Principles of Internal Medicine 21e, Hypovolemia / Shock", "Brenner & Rector's The Kidney 11e"]}}, "111-進階-兒科-67": {"quick": "PSGN 病童本已容積過載（水腫、高血壓、心臟擴大），再輸白蛋白會把間質液拉回血管、進一步擴張血管內容積，使『血壓變得更高』，故白蛋白在容積過載的腎炎是禁忌。", "detail": {"background": "本題 10 歲病童：前驅咽喉炎、血尿蛋白尿、體重增加 3 kg、BP 160/100、胸片心臟擴大、ASLO 1200、C3 26（下降）、Cr 1.5、albumin 2.0——典型 PSGN 合併『容積過載（volume overload）』：水腫、高血壓、心臟擴大、少尿都是鈉水滯留、血管內容積『過多』的表現。這與腎病症候群（NS）的低血容截然不同！PSGN 雖然 albumin 偏低（蛋白尿所致），但它的病理生理是『鈉水滯留、血管內容積增加』而非外漏不足。因此若在 PSGN（容積過載狀態）誤輸白蛋白：白蛋白提升血漿 oncotic pressure → 把間質水分拉回血管內 → 進一步擴張本已過多的血管內容積 → 血壓更高、加重高血壓與心臟負荷、甚至誘發肺水腫/高血壓腦病變。故答案是『血壓變得更高』（B）。這是重要的觀念對比與陷阱：白蛋白只適用於『低血容』的腎病症候群休克，絕不可用於『容積過載』的急性腎炎。PSGN 容積過載的正確處置是限鈉限水、利尿劑、降壓藥。護理重點：辨別容積狀態（過載 vs 不足）再決定是否補白蛋白，PSGN 應避免擴容。", "options": {"A": "錯誤。PSGN 已容積過載，輸白蛋白擴張血管內容積會加重而非改善，不會使尿量增加、體重減少（且 PSGN 利尿應靠利尿劑）。", "B": "正確（正解）。白蛋白把間質液拉回血管、擴張本已過多的血管內容積，使血壓更高，故在容積過載的腎炎屬禁忌。", "C": "錯誤。輸白蛋白擴容會加重心臟前負荷，不會使擴大的心臟恢復正常，反而加重容積負荷。", "D": "錯誤。擴張血管內容積會增加肺水腫風險而非減少；白蛋白在容積過載狀態恐誘發肺水腫。"}, "sources": ["Nelson Textbook of Pediatrics, Poststreptococcal Glomerulonephritis", "Harrison's Principles of Internal Medicine 21e, Acute Glomerulonephritis / Volume Overload", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "111-進階-內科-27": {"quick": "糖尿病腎病變的腎臟保護首選 ACEi（或 ARB），藉阻斷 RAAS 降低腎絲球出球小動脈張力、降低腎絲球內壓與蛋白尿，最能延緩腎病進展。", "detail": {"background": "糖尿病腎病變（DKD）的進展與『腎絲球內高壓（intraglomerular hypertension）』密切相關。血管收縮素 II（angiotensin II）優先收縮『出球小動脈（efferent arteriole）』，使腎絲球內壓升高、加速高過濾與蛋白尿、促進腎絲球硬化。ACEi（angiotensin-converting enzyme inhibitor）阻斷 angiotensin II 生成、ARB 阻斷其受體，兩者皆可『擴張出球小動脈、降低腎絲球內壓』，從而減少蛋白尿、延緩腎病進展——這是與單純降壓無關的『腎臟特異保護效果』，故對糖尿病合併白蛋白尿/高血壓者，ACEi 或 ARB 為『首選降壓兼護腎藥物』。經典證據：RENAAL、IDNT（ARB 於 T2DM 腎病）、Captopril 試驗（ACEi 於 T1DM 腎病）皆顯示延緩腎病進展。本題答案為 ACEi（D）。對比其他選項：renin inhibitor（如 aliskiren）雖阻斷 RAAS 上游，但與 ACEi/ARB 併用增加高血鉀/急性腎損傷風險（ALTITUDE 試驗提前中止），非首選且不單獨優於 ACEi；CCB（如 amlodipine）有效降壓但護腎特異性不如 ACEi/ARB；beta-blocker 降壓但無特別護腎優勢。注意用藥監測：起始後 1–2 週追蹤血壓、血清 Cr 與血鉀（可能短暫升 Cr/高血鉀）。護理重點：監測 Cr/K、血壓達標、追蹤蛋白尿（ACR）。", "options": {"A": "錯誤。renin inhibitor 阻斷 RAAS 上游，但與 ACEi/ARB 併用風險高（ALTITUDE 提前中止），非首選護腎藥。", "B": "錯誤。CCB 有效降壓但缺乏 ACEi/ARB 那種降腎絲球內壓、減蛋白尿的特異護腎效果。", "C": "錯誤。beta-blocker 可降壓但無特別延緩糖尿病腎病的護腎優勢。", "D": "正確（正解）。ACEi 阻斷 angiotensin II、擴張出球小動脈、降低腎絲球內壓與蛋白尿，最能延緩糖尿病腎病進展。"}, "sources": ["KDIGO 2022 Diabetes in CKD Guideline", "RENAAL / IDNT / Captopril Trial", "Brenner & Rector's The Kidney 11e, Diabetic Nephropathy"]}}, "111-進階-內科-71": {"quick": "糖尿病合併蛋白尿與 CKD 的病人，SGLT2 inhibitor 同時具腎臟保護與降低心血管事件（含心衰竭住院）的效果，是兼顧護腎與護心的首選。", "detail": {"background": "本題糖尿病合併高血壓、泡泡尿（蛋白尿）、UPCR 460 mg/dL、Cr 1.4、eGFR 60、BUN 25——屬糖尿病腎病變合併白蛋白尿與 CKD G2/早 G3。近十年的關鍵突破是『SGLT2 inhibitor（sodium-glucose cotransporter-2 inhibitor，如 dapagliflozin、empagliflozin、canagliflozin）』：透過抑制近曲小管葡萄糖/鈉再吸收，恢復管球回饋（tubuloglomerular feedback）、收縮入球小動脈、降低腎絲球內高壓與高過濾，並有利鈉、降壓、減重、減少氧化壓力等多重機轉，顯著『減少蛋白尿、延緩 eGFR 下降、降低 ESRD』，同時『降低心血管死亡與心衰竭住院』。關鍵試驗：CREDENCE（canagliflozin，糖尿病腎病）、DAPA-CKD（dapagliflozin，含非糖尿病 CKD）、EMPA-KIDNEY 皆證實腎臟與心血管雙重保護。故 KDIGO 2022/ADA 均建議糖尿病合併蛋白尿 CKD 者在 ACEi/ARB 基礎上加用 SGLT2i。本題答案為 SGLT2i（D）。對比其他降糖藥：TZD（增加水腫/心衰竭風險）、DPP4i（心腎中性、無顯著護腎護心優勢）、AGI（控制餐後血糖、無心腎結局效益）均無 SGLT2i 的雙重保護。護理重點：注意泌尿生殖道黴菌感染、容積與血壓、起始時 eGFR 可能短暫小幅下降（屬血流動力學變化、可逆）、酮酸中毒風險衛教。", "options": {"A": "錯誤。TZD 可致水腫並增加心衰竭風險，無腎臟保護優勢，不適合此病人。", "B": "錯誤。DPP4i 心腎結局多為中性，無顯著護腎護心效果。", "C": "錯誤。AGI 主要降餐後血糖，無心血管或腎臟結局效益。", "D": "正確（正解）。SGLT2 inhibitor 經 CREDENCE/DAPA-CKD 等證實同時護腎（減蛋白尿、延緩 eGFR 下降）與降低心血管/心衰竭事件，是首選。"}, "sources": ["KDIGO 2022 Diabetes in CKD Guideline", "CREDENCE / DAPA-CKD / EMPA-KIDNEY Trials", "ADA Standards of Care 2024"]}}, "112-進階-兒科-69": {"quick": "PSGN 急性期照護重點是『限制鹽分攝取』以控制鈉水滯留導致的水腫與高血壓；不需嚴格限蛋白、不鼓勵高鉀香蕉、抗生素非治腎炎所必要。", "detail": {"background": "本題 10 歲男孩咽喉痛 2 週後出現血尿、高血壓、水腫，喉嚨培養陰性（感染已過），診斷 PSGN。PSGN 急性期的核心問題是『鈉水滯留→容積過載→水腫＋高血壓』，因此最重要的護理照護是『限制鈉（鹽）攝取』並限水，配合利尿劑/降壓藥控制容積與血壓。逐項分析：A『限制鹽』正確——直接針對容積過載與高血壓。B『鼓勵多吃香蕉』錯誤——香蕉富含鉀，PSGN 急性期若有少尿/腎功能下降，補鉀有高血鉀風險，應避免；且與容積控制目標無關。C『嚴格限制蛋白質攝取』錯誤——PSGN 一般不需『嚴格』限蛋白（除非嚴重氮血症/腎衰竭才適度限制），過度限蛋白對成長中兒童有害。D『規則服用抗生素至少一週』——抗生素（penicillin）僅用於清除殘存鏈球菌、防傳播，本題喉嚨培養已陰性（感染已過），且抗生素無法改變已發生的腎炎，故非『治療腎炎所必要』的照護重點。故答案 A。護理重點：限鈉限水、監測血壓/體重/I/O、警覺高血壓腦病變、避免高鉀食物（少尿時）。", "options": {"A": "正確（正解）。限鹽針對 PSGN 的鈉水滯留、水腫與高血壓，是急性期最重要的飲食照護。", "B": "錯誤。香蕉富鉀，PSGN 少尿/腎功能下降時補鉀有高血鉀風險，應避免而非鼓勵。", "C": "錯誤。PSGN 一般不需嚴格限蛋白（過度限制有害成長兒童），僅嚴重氮血症才適度限制。", "D": "錯誤。喉嚨培養已陰性、感染已過，抗生素無法改變已發生的腎炎，非治腎炎所必要的照護重點。"}, "sources": ["Nelson Textbook of Pediatrics, Poststreptococcal Glomerulonephritis", "Harrison's Principles of Internal Medicine 21e, Acute Glomerulonephritis", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "112-進階-兒科-70": {"quick": "無症狀兒童學校尿篩首次發現鏡下血尿/蛋白尿，最有價值的下一步是『重複常規尿檢確認』，因單次異常常為暫時性（運動、發燒、姿勢性），不應貿然腎切片。", "detail": {"background": "兒童學校尿液篩檢偶會發現『單次無症狀的尿液異常』（鏡下血尿、輕微蛋白尿）。重要原則：『單次』尿液異常常為良性、暫時性原因——運動、發燒、脫水、月經、姿勢性（orthostatic）蛋白尿、留尿污染等皆可造成一過性異常。因此面對無症狀兒童首次尿異常，最具價值、最具成本效益的下一步是『在不同時間重複常規尿液檢查（urinalysis）』以確認異常是否『持續存在』。若重複後異常消失，多為暫時性、無須進一步檢查；若『持續』血尿/蛋白尿，才依情況進一步評估（量化蛋白尿 UPCR、腎功能、補體、必要時影像或轉介）。腎切片（renal biopsy）是侵入性檢查，僅在『持續顯著蛋白尿（nephrotic-range）、持續血尿合併蛋白尿、腎功能下降、低補體不回升、家族史』等明確指徵下才做，絕不會作為無症狀單次異常的第一步。腎臟超音波用於排除結構性異常但非首步；尿液細菌培養僅在懷疑感染（膿尿、症狀）時做，本題無症狀且非膿尿主導。本題答案 A『再驗一次常規尿檢』。護理重點：衛教正確留尿時機、追蹤重複尿檢、區分暫時性與持續性異常。", "options": {"A": "正確（正解）。單次無症狀尿異常常為暫時性，重複常規尿檢確認是否持續，是最具價值且符合成本效益的下一步。", "B": "錯誤。腎切片為侵入性，僅在持續顯著異常/腎功能下降等明確指徵才做，絕非無症狀單次異常的第一步。", "C": "錯誤。腎臟超音波用於排除結構異常，非首步；應先確認尿異常是否持續。", "D": "錯誤。尿液細菌培養僅在懷疑泌尿道感染（膿尿、症狀）時做，本題無症狀且非膿尿主導，非首選。"}, "sources": ["Nelson Textbook of Pediatrics, Evaluation of Asymptomatic Hematuria/Proteinuria", "Harrison's Principles of Internal Medicine 21e, Approach to Hematuria", "Brenner & Rector's The Kidney 11e"]}}, "112-進階-兒科-75": {"quick": "正在使用 prednisolone＋cyclosporin（免疫抑制）的腎病症候群孩童，只能打『不活化疫苗』；流行性感冒（不活化）疫苗可打，其餘三者為活性減毒疫苗應避免。", "detail": {"background": "腎病症候群（NS）孩童常使用 corticosteroid（prednisolone）與 calcineurin inhibitor（cyclosporin）等免疫抑制治療。疫苗安全的核心原則：『免疫抑制狀態下禁止接種活性減毒疫苗（live-attenuated vaccine）』——因為被削弱的免疫力可能無法控制疫苗株活病毒/細菌，導致疫苗相關感染（vaccine-associated disease）。活性減毒疫苗包括：口服小兒麻痺疫苗（OPV）、麻疹腮腺炎德國麻疹（MMR）、水痘（varicella）、卡介苗（BCG）、輪狀病毒、黃熱病、鼻噴流感（LAIV）等。相對地，『不活化疫苗（inactivated/subunit）』在免疫抑制下『可以且應該接種』（雖免疫反應可能稍弱），包括：不活化流感疫苗（注射劑型）、肺炎鏈球菌疫苗（PCV/PPSV）、Hib、B 肝、白喉破傷風百日咳（DTaP/Tdap）等。NS 病童因 IgG/factor B 流失易感莢膜菌，特別建議接種肺炎鏈球菌與流感等不活化疫苗。本題四選項中：A 口服小兒麻痺（活）、B MMR（活）、C 水痘（活）皆為活性減毒疫苗，免疫抑制中禁打；D『流行性感冒疫苗（注射不活化）』可打。故答案 D。護理重點：用藥前確認疫苗種類（活 vs 不活化）、停藥後一定間隔再補活性疫苗、家庭接觸者疫苗策略（避免 OPV、可給 MMR/水痘）。", "options": {"A": "錯誤（禁打）。口服小兒麻痺疫苗（OPV）為活性減毒疫苗，免疫抑制中禁止接種。", "B": "錯誤（禁打）。MMR（麻疹腮腺炎德國麻疹）為活性減毒疫苗，免疫抑制中禁止接種。", "C": "錯誤（禁打）。水痘疫苗為活性減毒疫苗，免疫抑制中禁止接種。", "D": "正確（正解）。注射型流行性感冒疫苗為不活化疫苗，免疫抑制中可且建議接種，並有助 NS 病童預防感染。"}, "sources": ["Nelson Textbook of Pediatrics, Immunization in Immunocompromised Children", "ACIP / 台灣兒童免疫接種建議", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "112-進階-內科-68": {"quick": "糖尿病 CKD 用 ACEi/ARB 為首選；起始後血鉀輕度上升至 5.3 mEq/L 不必立即停藥（可飲食調整/利尿劑處理），故『K 5.3 即立即停用』敘述錯誤。", "detail": {"background": "糖尿病合併 CKD 的高血壓與蛋白尿，ACEi 或 ARB 是『首選降壓兼護腎藥物』，藉阻斷 RAAS 降低腎絲球內壓、減少蛋白尿、延緩腎病進展。但 ACEi/ARB 會帶來兩項可預期的監測重點：①因擴張出球小動脈、降低腎絲球濾過壓，起始後血清 Cr 可能短暫上升——『Cr 上升 ≤30% 屬可接受的血流動力學變化，可繼續使用並監測』，只有當『Cr 上升 >30%（部分指引用 >25–30%）』才需暫停並尋找原因（如雙側腎動脈狹窄、容積不足、併用 NSAID）；②因抑制 aldosterone 致『高血鉀』風險——輕度高血鉀（如 K 5.3–5.5 mEq/L）通常可透過飲食限鉀、調整利尿劑、停用其他升鉀藥物等保守處理『繼續用藥』，不需一見輕度上升就立即停藥；只有『顯著或持續高血鉀（如 >5.5–6.0 且無法以保守方式控制）』才考慮減量/停藥。本題選項 D『K 上升到 5.3 即立即停用』過於嚴格、錯誤（5.3 屬輕度，可保守處理續用）。起始後 1–2 週追蹤血壓、Cr、K 是正確監測（B 正確）。本題答案 D。護理重點：起始後 1–2 週追蹤 Cr/K/血壓、衛教低鉀飲食、避免併用 NSAID、教導脫水/嘔吐腹瀉時暫停（sick day rule）。", "options": {"A": "正確。ACEi/ARB 為糖尿病 CKD 合併白蛋白尿/高血壓的首選降壓兼護腎藥物。", "B": "正確。起始後 1–2 週追蹤血壓、血清 Cr 與血鉀，是標準監測作法。", "C": "正確。Cr 上升超過約 30% 應停用並查因（如腎動脈狹窄、容積不足），屬合理閾值。", "D": "錯誤（正解）。K 5.3 mEq/L 僅輕度上升，可透過飲食/利尿劑等保守處理續用，不需立即停藥；應對顯著或頑固高血鉀才停。"}, "sources": ["KDIGO 2022 Diabetes in CKD Guideline; KDIGO 2021 BP in CKD Guideline", "ADA Standards of Care 2024", "Brenner & Rector's The Kidney 11e"]}}, "113-進階-兒科-64": {"quick": "兒童雙腳水腫＋泡泡尿、低白蛋白(1.9)＋高膽固醇(450)＋高三酸甘油酯(270)、腎功能正常，符合『腎病症候群』四聯徵（大量蛋白尿、低白蛋白、水腫、高血脂）。", "detail": {"background": "本題兒童：雙腳水腫、泡泡尿（蛋白尿）、BUN 10（正常）、Cr 0.2（兒童正常偏低）、albumin 1.9 g/dL（低白蛋白）、cholesterol 450＋TG 270（高血脂）——典型『腎病症候群（nephrotic syndrome, NS）』。NS 診斷四要件：①大量蛋白尿（泡泡尿是線索，需 UPCR/24hr 量化）②低白蛋白血症（<2.5 g/dL，本題 1.9）③水腫（雙腳水腫）④高血脂（膽固醇與三酸甘油酯皆升高）。腎功能正常（BUN/Cr 正常）支持典型 MCD（minimal change disease，兒童 NS 80–90%）——MCD 特徵即腎功能正常、血壓正常、血尿不明顯、補體正常。逐項排除其他選項：acute pyelonephritis（急性腎盂腎炎）應有發燒、腰痛、膿尿、菌尿，與本題低白蛋白高血脂水腫不符；vesicoureteral reflux（膀胱輸尿管逆流）為結構性逆流致反覆 UTI，不會造成低白蛋白高血脂；urinary tract infection（泌尿道感染）有膿尿/排尿症狀，亦不致此代謝表現。本題答案 D。護理重點：量化蛋白尿（UPCR）、監測水腫/體重、啟動 prednisolone（MCD 反應佳）、預防感染與血栓、衛教水腫與低血容警訊。", "options": {"A": "錯誤。急性腎盂腎炎以發燒、腰痛、膿尿菌尿為主，不會造成低白蛋白＋高血脂＋全身水腫。", "B": "錯誤。膀胱輸尿管逆流為結構性逆流致反覆泌尿道感染，與低白蛋白/高血脂/水腫無關。", "C": "錯誤。泌尿道感染以膿尿與排尿症狀為主，不致低白蛋白血症與高血脂。", "D": "正確（正解）。水腫＋蛋白尿＋低白蛋白(1.9)＋高血脂(膽固醇450/TG270)＋腎功能正常，符合腎病症候群（典型 MCD）。"}, "sources": ["Nelson Textbook of Pediatrics, Idiopathic Nephrotic Syndrome", "Harrison's Principles of Internal Medicine 21e, Nephrotic Syndrome", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "113-進階-兒科-65": {"quick": "腎病症候群病童出院衛教：使用利尿劑（如 furosemide 排鉀）時應補充富鉀食物（香蕉、番茄）以防低血鉀，故選項 D 正確。", "detail": {"background": "腎病症候群（NS）病童的出院衛教需兼顧飲食、用藥安全與感染預防。逐項釐清：A『多攝取蛋白且以豆類為主』錯誤——NS 急性期不主張高蛋白飲食（過量蛋白會增加腎絲球負荷與尿蛋白排泄，無助於補充流失的白蛋白），建議『適量、優質蛋白』；且不會特別指定以豆類為主。B『吃洋芋片/鹹蘇打餅補鈉』錯誤——NS 水腫期應『限鈉（限鹽）』以控制水腫，高鈉零食反而加重水腫，絕對禁止。C『施打帶狀疱疹疫苗』錯誤——帶狀疱疹（zoster）疫苗的活性減毒型在免疫抑制（NS 常用類固醇/免疫抑制劑）下『禁用』；且 zoster 疫苗主要用於成人/老年，非兒童常規。D『給利尿劑時補充香蕉或番茄』正確——NS 治療常用『排鉀型利尿劑（loop diuretic furosemide、thiazide）』，會增加尿鉀排泄、易致低血鉀（hypokalemia），故衛教補充富鉀食物（香蕉、番茄、柳橙等）以維持血鉀，是正確的用藥安全衛教（注意：此前提是『使用排鉀利尿劑且腎功能正常無高血鉀風險』；若用保鉀利尿劑或腎功能差則相反）。本題答案 D。護理重點：限鈉、適量優質蛋白、利尿劑相關低血鉀監測與補鉀衛教、免疫抑制期避免活性疫苗。", "options": {"A": "錯誤。NS 不主張高蛋白飲食（增加腎絲球負荷與尿蛋白），建議適量優質蛋白，且不特別以豆類為主。", "B": "錯誤。NS 水腫期應限鈉，洋芋片/鹹蘇打餅等高鈉食物會加重水腫，禁止以此補鈉。", "C": "錯誤。帶狀疱疹（活性減毒）疫苗在免疫抑制中禁用，且非兒童常規，不應施打。", "D": "正確（正解）。使用排鉀型利尿劑（furosemide）易致低血鉀，衛教補充富鉀的香蕉/番茄以維持血鉀，是正確用藥安全衛教。"}, "sources": ["Nelson Textbook of Pediatrics, Nephrotic Syndrome Management", "Harrison's Principles of Internal Medicine 21e, Diuretics & Potassium", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "113-進階-兒科-69": {"quick": "兒童茶色尿＋少尿＋水腫＋體重增加＋血壓上升＋BUN 上升＋C3 下降＋白蛋白正常＋血尿，為『急性腎絲球腎炎（nephritic）』而非腎病症候群（白蛋白正常是關鍵區別）。", "detail": {"background": "本題 10 歲男童：下肢腫脹、尿量減少、茶色尿、體重增加、食慾下降、血壓上升、白蛋白『正常』、BUN 上升、C3 下降、血尿——符合『急性腎絲球腎炎（acute glomerulonephritis, nephritic syndrome）』，最可能是 PSGN（鏈球菌感染後腎炎）。判讀關鍵與鑑別：①腎炎性（nephritic）特徵：血尿（茶色/可樂色尿）為主、高血壓、少尿與水腫（鈉水滯留）、腎功能下降（BUN 上升）、低補體 C3（PSGN 典型）、白蛋白多『正常或僅輕度下降』（蛋白尿未達 nephrotic-range）；②腎病性（nephrotic）特徵：大量蛋白尿、『低白蛋白血症』、高血脂、明顯水腫、血尿不明顯。本題『白蛋白正常＋血尿＋低 C3＋BUN 上升＋高血壓』整組指向腎炎性，故『非』腎病症候群。逐項排除：A 糖尿病（無高血糖背景、表現非 DKD）；B 高血脂症（單純高血脂不致此急性腎炎圖像，且未提血脂）；C 腎病症候群（白蛋白正常、血尿、低 C3 與之不符——NS 應低白蛋白、高血脂、血尿不明顯）；D 急性腎絲球腎炎正確（茶色尿＋低 C3＋BUN 上升＋高血壓＋白蛋白正常）。本題答案 D。護理重點：監測血壓/體重/I/O、限鈉限水、追蹤 C3 回升、警覺高血壓腦病變與容積過載。", "options": {"A": "錯誤。無高血糖或糖尿病背景，表現為急性腎炎圖像，非糖尿病。", "B": "錯誤。單純高血脂症不會造成茶色尿、低 C3、BUN 上升的急性腎炎圖像，且題未提血脂異常。", "C": "錯誤。腎病症候群應低白蛋白、高血脂、血尿不明顯；本題白蛋白『正常』＋血尿＋低 C3，與 NS 不符。", "D": "正確（正解）。茶色尿＋血尿＋低 C3＋BUN 上升＋高血壓＋白蛋白正常，符合急性腎絲球腎炎（nephritic syndrome，常為 PSGN）。"}, "sources": ["Nelson Textbook of Pediatrics, Acute Poststreptococcal Glomerulonephritis", "Harrison's Principles of Internal Medicine 21e, Nephritic vs Nephrotic Syndrome", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "113-進階-家庭-50": {"quick": "成人腳踝/臉部水腫＋大量蛋白尿(5 g/day)＋低白蛋白(2.8)＋高膽固醇(300)＋腎功能近正常，符合『腎病症候群』四聯徵；血壓略高與少量血尿不影響此最可能診斷。", "detail": {"background": "本題 45 歲男性：持續腳踝與臉部水腫、1 個月體重增加 10 kg、疲勞、albumin 2.8 g/dL（低）、24 小時尿蛋白 5 g/day（大量蛋白尿，>3.5 g/day）、cholesterol 300（高血脂）、Cr 1.2（正常邊緣）、少量血尿、BP 144/90——符合『腎病症候群（nephrotic syndrome）』。成人 NS 診斷四要件：①大量蛋白尿（≥3.5 g/24hr，本題 5 g/day）②低白蛋白血症（<3.0–3.5 g/dL，本題 2.8）③水腫④高血脂（膽固醇升高）。本題全部符合，故最可能診斷為腎病症候群。成人 NS 常見病因：membranous nephropathy（成人原發 NS 最常見之一）、FSGS、MCD、diabetic nephropathy、amyloidosis、lupus 等，需進一步腎切片與抗 PLA2R 抗體等釐清。逐項排除其他選項：A 腎盂腎炎（發燒、腰痛、膿尿菌尿，不致大量蛋白尿與低白蛋白）；C 糖尿病腎病變（需糖尿病病史與長期高血糖，本題未提糖尿病，雖可致 NS 但『糖尿病腎病變』需糖尿病前提，故非最可能）；D 高血壓腎病變（長期高血壓致硬化，蛋白尿多為輕中度、少達 nephrotic-range，且不致明顯低白蛋白高血脂）。本題答案 B。護理重點：量化蛋白尿、監測水腫/體重/白蛋白、轉介腎臟科腎切片、ACEi/ARB 減蛋白尿、限鈉、警覺血栓（NS 高凝）。", "options": {"A": "錯誤。腎盂腎炎以發燒、腰痛、膿尿菌尿為主，不會造成 5 g/day 大量蛋白尿與低白蛋白血症。", "B": "正確（正解）。大量蛋白尿(5 g/day)＋低白蛋白(2.8)＋水腫＋高膽固醇(300)＋腎功能近正常，符合腎病症候群四聯徵。", "C": "錯誤（非最可能）。糖尿病腎病變需糖尿病病史與長期高血糖前提，本題未提糖尿病，故非最可能診斷。", "D": "錯誤。高血壓腎病變蛋白尿多為輕中度、少達 nephrotic-range，且不致明顯低白蛋白與高血脂。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Nephrotic Syndrome (Adults)", "Brenner & Rector's The Kidney 11e, Membranous Nephropathy & FSGS", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "114-進階-兒科-64": {"quick": "典型 PSGN（前驅感染、低 C3、ASLO 升高、血尿）是自限性、預後佳，抗生素無法治療『已發生』的腎炎，故『須給抗生素來治療急性腎絲球腎炎』敘述最不適當。", "detail": {"background": "本題 6 歲兒童：無症狀血尿、RBC 100/HPF、蛋白尿1+、C3 40（下降）、C4 10（下降）、ASLO 250（升高）、Cr 0.9、BP 135/90。雖 ASLO 升高與低補體可指向感染後腎炎，但要注意『C3 與 C4 同時下降』在純 PSGN 較不典型（PSGN 多 C3 低而 C4 正常），故鑑別診斷需納入 MPGN、lupus 等『C3、C4 皆低』的疾病。逐項判讀：A『PSGN 為最可能診斷』——有前驅感染證據（ASLO 升高）、低補體、血尿，PSGN 仍是兒童此情境最常見，合理（最可能）。B『MPGN 為鑑別診斷之一』——正確，因 C4 也低且若 C3 持續 >8 週不回升要懷疑 MPGN，列入鑑別恰當。C『須給對鏈球菌敏感的抗生素來治療急性腎絲球腎炎』——錯誤（最不適當）：抗生素只能清除殘存鏈球菌、防傳播，『無法治療或改變已發生的免疫性腎炎』；腎炎是感染後免疫複合體反應，不是仍在進行的活動性感染，故抗生素不是『治療腎炎』的手段。D『>95% 病人完全恢復、復發罕見』——兒童 PSGN 預後極佳，>95% 完全康復且少復發，正確。本題問『最不適當』，答案 C。護理重點：追蹤 C3 是否回升以鑑別 PSGN vs MPGN、監測血壓/血尿/腎功能、支持性治療為主。", "options": {"A": "適當。有前驅鏈球菌感染證據（ASLO 升高）、低補體與血尿，PSGN 仍是此兒童最可能診斷。", "B": "適當。C4 也下降、需警覺 C3 不回升可能為 MPGN，列入鑑別診斷恰當。", "C": "最不適當（正解）。抗生素僅清除殘存鏈球菌、防傳播，無法治療已發生的免疫性腎炎，不是治療腎炎的手段。", "D": "適當。兒童 PSGN 預後極佳，>95% 完全康復且復發罕見，敘述正確。"}, "sources": ["Nelson Textbook of Pediatrics, Poststreptococcal Glomerulonephritis", "Harrison's Principles of Internal Medicine 21e, Acute Glomerulonephritis", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "114-進階-兒科-68": {"quick": "4 歲兒童全身水腫＋少尿＋4 價（大量）蛋白尿＋低白蛋白(2.0)＋高膽固醇(270)＋腎功能正常(Cr 0.7)，符合『腎病症候群』（典型 MCD）。", "detail": {"background": "本題 4 歲兒童：全身水腫、小便減少、尿蛋白『4+（大量蛋白尿）』、cholesterol 270（高血脂）、albumin 2.0 g/dL（低白蛋白）、Cr 0.7（正常）——典型『腎病症候群（nephrotic syndrome）』，且年齡與表現高度符合 minimal change disease（MCD，兒童 NS 80–90%）。NS 診斷四要件全數符合：①大量蛋白尿（4+）②低白蛋白血症（2.0）③水腫（全身水腫）④高血脂（cholesterol 270）；且腎功能正常（Cr 0.7）支持典型 MCD（MCD 特徵：腎功能正常、血壓正常、血尿不明顯、補體正常、對類固醇反應佳）。逐項排除其他選項：A 尿路感染（膿尿、排尿症狀，不致大量蛋白尿與低白蛋白高血脂）；B 腎絲球腎炎（nephritic）以血尿、高血壓、腎功能下降、低補體為主，白蛋白多正常，與本題低白蛋白高血脂的『腎病性』圖像不同；C 慢性腎衰竭（應有 Cr 明顯上升、eGFR 下降，本題 Cr 0.7 正常，不符）。本題答案 D。護理重點：量化蛋白尿（UPCR）、啟動 prednisolone（MCD 反應佳）、監測水腫/體重/白蛋白、預防感染（莢膜菌）與血栓、警覺低血容。", "options": {"A": "錯誤。尿路感染以膿尿與排尿症狀為主，不會造成大量蛋白尿、低白蛋白血症與高血脂。", "B": "錯誤。腎絲球腎炎（nephritic）以血尿、高血壓、腎功能下降為主、白蛋白多正常，與本題低白蛋白高血脂不符。", "C": "錯誤。慢性腎衰竭應有 Cr 明顯上升、eGFR 下降；本題 Cr 0.7 正常，不符。", "D": "正確（正解）。全身水腫＋4 價蛋白尿＋低白蛋白(2.0)＋高膽固醇(270)＋腎功能正常，符合腎病症候群（典型 MCD）。"}, "sources": ["Nelson Textbook of Pediatrics, Idiopathic Nephrotic Syndrome", "Harrison's Principles of Internal Medicine 21e, Minimal Change Disease", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "114-進階-內科-69": {"quick": "膜性腎病變（membranous nephropathy）為高凝狀態，突發單側腰痛＋血尿＋大量蛋白尿，須優先懷疑『腎靜脈栓塞（renal vein thrombosis）』——膜性腎病變是 RVT 最相關的腎絲球疾病。", "detail": {"background": "本題膜性腎病變（membranous nephropathy, MN）病人『突然右側腰部劇烈疼痛＋血尿』。關鍵連結：腎病症候群（尤其『膜性腎病變』）是『高凝狀態（hypercoagulable state）』——機轉為尿中流失抗凝蛋白（antithrombin III、protein C/S）、肝臟代償增加凝血因子與纖維蛋白原合成、血小板活化、利尿致血液濃縮等，使血栓風險顯著上升。在各種腎病症候群中，『膜性腎病變與腎靜脈栓塞（renal vein thrombosis, RVT）的關聯最強』（MN 病人 RVT 發生率可達 20–40%）。RVT 的臨床表現：急性者突發『腰/側腹劇痛、肉眼血尿、蛋白尿惡化、患側腎腫大、LDH 上升』，甚至腎功能惡化；慢性者可無症狀。本題 MN 病人突發單側腰痛＋血尿（RBC 200-300/HPF）＋蛋白尿3+，最須『優先』懷疑 RVT。診斷以 CT venography 或 Doppler 超音波/MRV 確認，治療為抗凝（heparin→warfarin/DOAC）。逐項鑑別：B 急性腎盂腎炎（應發燒、膿尿菌尿、白血球升高，本題體溫 36.2 無發燒，雖 WBC 升但無發燒不典型）；C 腎結石合併腎水腫（劇痛＋血尿可能，但 MN 背景下 RVT 更須優先且本題無結石描述）；D 腎臟腫瘤（多為無痛血尿、慢性病程，急性劇痛不典型）。本題答案 A。護理重點：NS/MN 病人警覺血栓徵象（腰痛、血尿、下肢腫、肺栓塞）、評估抗凝需求、監測血栓指標。", "options": {"A": "正確（正解）。膜性腎病變為高凝狀態且與腎靜脈栓塞關聯最強；突發單側腰痛＋血尿＋蛋白尿應優先懷疑 RVT。", "B": "錯誤（非優先）。急性腎盂腎炎應有發燒與膿尿菌尿，本題體溫 36.2 無發燒，不典型。", "C": "錯誤（非優先）。腎結石合併腎水腫可致劇痛血尿，但 MN 高凝背景下 RVT 更須優先，且無結石描述。", "D": "錯誤。腎臟腫瘤多為無痛血尿、慢性病程，急性劇痛表現不典型。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Membranous Nephropathy / Renal Vein Thrombosis", "Brenner & Rector's The Kidney 11e, Nephrotic Syndrome Complications", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "114-進階-家庭-62": {"quick": "腎病症候群實驗室發現包含大量蛋白尿(>3.5 g/24hr)、低白蛋白血症、高膽固醇血症；『高尿糖』不是 NS 的表現（尿糖屬糖尿病/腎小管問題），故不包含。", "detail": {"background": "腎病症候群（nephrotic syndrome, NS）的四大實驗室/臨床特徵：①嚴重（大量）蛋白尿——成人 >3.5 g/24hr（或 UPCR >3.5 g/g）；②低白蛋白血症（serum albumin <3.0–3.5 g/dL）；③水腫；④高血脂（高膽固醇血症、高 LDL，常伴高三酸甘油酯）。此外可見高凝狀態（抗凝蛋白流失）、脂尿（lipiduria，尿中可見 oval fat body、fatty cast、'Maltese cross'）。本題問『不包含下列何者』——『高尿糖（glycosuria）』並非 NS 的特徵。尿糖出現的原因是：①血糖超過腎閾值（renal threshold，約 180 mg/dL，見於糖尿病）使葡萄糖溢入尿中；或②近端腎小管再吸收葡萄糖功能缺陷（renal glycosuria、Fanconi syndrome、SGLT2 inhibitor 作用）使血糖正常但尿糖陽性。這些與腎絲球濾過屏障受損致『蛋白』漏出的 NS 機轉無關——NS 漏的是白蛋白等大分子蛋白，不是葡萄糖。故『高尿糖』不屬於 NS 的實驗室發現。本題答案 B。護理重點：認識 NS 四聯徵與脂尿，區分蛋白尿（NS）與糖尿（糖尿病/腎小管）的不同機轉。", "options": {"A": "包含。嚴重蛋白尿（>3.5 g/24hr）是 NS 的核心定義性實驗室發現。", "B": "不包含（正解）。高尿糖屬糖尿病（血糖超過腎閾值）或近端腎小管缺陷，與 NS 的蛋白漏出機轉無關，非 NS 表現。", "C": "包含。低白蛋白血症為 NS 四要件之一（大量蛋白尿致白蛋白流失）。", "D": "包含。高膽固醇血症/高血脂為 NS 四要件之一（肝臟代償增加脂蛋白合成）。"}, "sources": ["Harrison's Principles of Internal Medicine 21e, Nephrotic Syndrome", "Brenner & Rector's The Kidney 11e", "KDIGO 2021 Glomerular Diseases Guideline"]}}, "105-TNPA-兒科-67": {"quick": "兒童 prerenal AKI 的核心是『腎血流灌注不足』(脫水、休克、低心輸出)；acute glomerulonephritis 屬腎實質(intrinsic)病變，非腎前因素。", "detail": {"background": "急性腎損傷(AKI)依解剖位置分三大類：(1)腎前性(prerenal，約佔兒童 AKI 最大宗)──腎臟本身結構正常，但因有效循環血量或腎灌注壓不足致 GFR 下降，常見原因為腹瀉/嘔吐脫水、出血、燒燙傷、敗血性休克(分布性休克)、心衰竭(心源性)、第三腔室積液(腎病症候群、肝硬化造成的有效血量不足)、腎血管收縮(NSAID、ACEI/ARB)。其特徵為尿濃縮(尿比重>1.020、尿滲透壓>500 mOsm/kg)、尿鈉低(<20 mEq/L)、FENa<1%、BUN/Cr>20，且補充容積後可逆。(2)腎實質性/腎內性(intrinsic)──腎絲球、腎小管、間質或血管本身受損，如急性腎絲球腎炎(post-streptococcal GN)、急性腎小管壞死(ATN)、急性間質性腎炎、溶血性尿毒症候群(HUS)。(3)腎後性(postrenal)──尿路阻塞，如後尿道瓣膜、雙側輸尿管阻塞。本題問『何者不是腎前因素』。注意陷阱：腎病症候群雖屬腎絲球疾病，但其造成 AKI 的機轉是『低白蛋白血症→血漿膠體滲透壓下降→有效循環血量不足』，故臨床上歸為腎前性容積耗竭；而急性腎絲球腎炎是腎絲球發炎直接破壞濾過膜，屬腎實質(intrinsic)病變，不是腎前因素。", "options": {"A": "正確答案。acute glomerulonephritis(急性腎絲球發炎)是腎絲球本身發炎受損，屬腎內性(intrinsic)病變，並非腎前因素。", "B": "腎病症候群因大量蛋白尿→低白蛋白血症→血漿膠體滲透壓下降→液體外滲、有效循環血量不足，臨床上造成腎前性灌注不足，屬腎前因素，故非答案。", "C": "腹瀉脫水是兒童最常見的腎前性 AKI 原因(容積耗竭使腎灌注下降)，屬腎前因素。", "D": "敗血性休克為分布性休克、有效循環血量不足致腎灌注下降，屬腎前因素。"}, "sources": ["Harrison 21e, Acute Kidney Injury", "Brenner & Rector's The Kidney 11e, Pediatric AKI", "KDIGO 2012 AKI Clinical Practice Guideline"]}}, "105-TNPA-內科-10": {"quick": "CKD 第4期 + 校正後低血鈣(corrected Ca≈8.0 mg/dL、肌肉抽搐)→低血鈣神經肌肉激惹，Chvostek's sign(+)。", "detail": {"background": "慢性腎臟病(CKD)第4期(eGFR 15–29)常伴 CKD-MBD：腎臟 1α-hydroxylase 活性下降使活性維生素D(calcitriol)不足、磷排出減少致高磷血症，兩者皆使血鈣下降，刺激副甲狀腺→secondary hyperparathyroidism。低血鈣會增加神經肌肉興奮性(因細胞膜閾值降低)，臨床表現為口周麻木、感覺異常、肌肉抽搐、痙攣(tetany)、喉痙攣。低血鈣兩大理學徵象：Chvostek's sign(輕敲耳前面神經處→同側臉部肌肉抽搐)與 Trousseau's sign(血壓計加壓帶充氣高於收縮壓 3 分鐘→腕部痙攣 carpopedal spasm，特異性較高)。本題血鈣 7.1 mg/dL 但 albumin 僅 2.9 g/dL，需做白蛋白校正：corrected Ca = 量測Ca + 0.8×(4.0 − albumin) = 7.1 + 0.8×1.1 ≈ 8.0 mg/dL，仍偏低且病人有肌肉抽搐症狀，故為症狀性低血鈣。護理重點：監測低血鈣徵象、心電圖 QT 延長、補鈣與活性維生素D、降磷飲食。", "options": {"A": "Cullen's sign 為臍周瘀斑，見於腹膜後出血/急性胰臟炎，與低血鈣無關。", "B": "正確答案。Chvostek's sign 是低血鈣造成神經肌肉興奮性增加的徵象，與本題校正後低血鈣、肌肉抽搐相符。", "C": "Turner's(Grey Turner's) sign 為側腹瘀斑，見於腹膜後出血/重症胰臟炎，與低血鈣無關。", "D": "Psoas sign(+)見於闌尾炎等腹膜後刺激，與低血鈣無關。"}, "sources": ["Harrison 21e, Disorders of Calcium Metabolism; Chronic Kidney Disease", "Brenner & Rector's The Kidney 11e, CKD-Mineral and Bone Disorder", "KDIGO 2017 CKD-MBD Guideline Update"]}}, "105-TNPA-外科-50": {"quick": "次發性副甲狀腺亢進手術前並非『必要』先做影像定位(初次手術通常四腺探查)；其餘關於骨病變、改善貧血搔癢、全切除併自體移植皆正確 →錯誤敘述為(D)。", "detail": {"background": "末期腎病變(ESRD)長期高磷、低鈣、calcitriol 不足持續刺激副甲狀腺，造成 secondary hyperparathyroidism(SHPT)甚至四個腺體增生肥大。臨床表現：renal osteodystrophy(高骨轉換的 osteitis fibrosa cystica)、骨痛骨折、皮膚搔癢、轉移性鈣化(血管/軟組織)、calciphylaxis、貧血(高 PTH 抑制骨髓造血、骨髓纖維化)、疲倦。內科治療：限磷飲食、磷結合劑、活性維生素D類似物、calcimimetics(cinacalcet/etelcalcetide)。當藥物無效(iPTH 持續>800、嚴重高鈣高磷、鈣化防禦)時行 parathyroidectomy。手術方式：subtotal(次全切除留 1/2 腺)或 total parathyroidectomy with autotransplantation(全切除+前臂自體移植，方便日後復發再切除)。重點：ESRD 之 SHPT 為『四腺瀰漫增生』，初次手術採雙側頸部探查找出全部腺體，故術前影像定位(sestamibi/超音波)並非必要，主要用於『再次手術』或定位異位腺。手術成功後 PTH 下降可改善骨病變、搔癢、貧血(對 EPO 反應改善)、疲倦。", "options": {"A": "正確。SHPT 造成高骨轉換性 renal osteodystrophy(osteitis fibrosa)，會有骨痛、骨折、骨質異常。敘述正確非答案。", "B": "正確。切除過度活躍的副甲狀腺後 PTH 下降，可改善貧血(對 EPO 反應變好)、皮膚搔癢、疲倦等尿毒相關症狀。敘述正確非答案。", "C": "正確。全副甲狀腺切除併自體移植(total parathyroidectomy with autotransplantation)是 ESRD-SHPT 常用且良好的選擇，自體移植利於日後復發時局部再切除。敘述正確非答案。", "D": "錯誤(答案)。ESRD 之 SHPT 為四腺增生，初次手術以雙側頸部探查為主，術前影像定位『並非必要』；影像定位主要保留給再次手術或異位腺定位。故此敘述為錯誤。"}, "sources": ["Harrison 21e, Disorders of the Parathyroid Gland; CKD-MBD", "Brenner & Rector's The Kidney 11e, Parathyroidectomy in ESRD", "KDIGO 2017 CKD-MBD Guideline Update"]}}, "105-TNPA-通論-16": {"quick": "嚴重低血鈉(Na 112)且有長期頭暈(慢性低鈉)→須緩慢矯正(<8–10 mEq/L/24hr)以防滲透性脫髓鞘；快速以 3% NaCl 衝至 135–145 不適當(B)。", "detail": {"background": "本題重點為『慢性低血鈉的矯正速度』。低血鈉(Na<135)在 CKD 與老年人常見，原因含利尿劑(thiazide/loop)、SIADH、甲狀腺低下、腎上腺功能不足、藥物。Na 112 mEq/L 屬重度低血鈉。矯正原則：(1)有急性嚴重神經症狀(癲癇、昏迷)才以 3% 高張食鹽水『限量』快速提升(目標僅先升 4–6 mEq/L 解除腦水腫)；(2)慢性低血鈉(>48 小時，本題病人有長期頭暈)血腦已適應，若矯正過快(>8–10 mEq/L/24hr 或>18/48hr)會引發滲透性脫髓鞘症候群(ODS/中央橋腦髓鞘溶解)，造成不可逆神經損傷。因此『儘速補至 135–145』是危險且不適當的處置。正確流程：找原因(查滲透壓與 FENa 判斷容積/SIADH、核對用藥、查甲狀腺與腎上腺功能)，並控制矯正速度、密切監測血鈉。", "options": {"A": "適當。檢測血漿滲透壓與 FENa 有助鑑別低血鈉病因(低容積 vs SIADH vs 多飲)，是合理評估，非答案。", "B": "不適當(答案)。病人為慢性低血鈉(長期頭暈)，以 3% NaCl 快速衝至 135–145 mEq/L 會使矯正速度過快，導致滲透性脫髓鞘(ODS)，應限制每日上升<8–10 mEq/L。", "C": "適當。許多藥物(利尿劑、SSRI、carbamazepine 等)會引起低血鈉，核對用藥史是正確處置，非答案。", "D": "適當。甲狀腺功能低下與腎上腺功能不足皆為低血鈉病因，檢驗甲狀腺激素及評估腎上腺功能合理，非答案。"}, "sources": ["Harrison 21e, Fluid and Electrolyte Disturbances (Hyponatremia)", "Brenner & Rector's The Kidney 11e, Disorders of Water Balance", "European/US Hyponatremia Guidelines 2014"]}}, "105-TNPA-通論-80": {"quick": "橫紋肌溶解症肌肉壞死釋出 CK→血中 creatine kinase(CK)顯著升高為標誌；並典型造成高血鉀(非低)、立即茶色尿、可致急性(非慢性)腎損傷 →正確為(B)。", "detail": {"background": "橫紋肌溶解症(rhabdomyolysis)為骨骼肌細胞破壞、細胞內容物(myoglobin、CK、鉀、磷、尿酸、有機酸)釋入血液。病因：擠壓傷/外傷、長時間制動、劇烈運動或抽搐、缺血、藥物(statin、酒精)、高熱、感染、電解質異常。診斷標誌為血中 creatine kinase(CK/CPK)大幅升高(常>5倍正常或>1000，重症可達上萬)。臨床電解質變化：肌細胞釋鉀→高血鉀(hyperkalemia，危及心律)、釋磷→高血磷、鈣沉積於受損肌肉與高磷致低血鈣、後期(恢復期)高血鈣；尿酸升高。myoglobinuria 使尿液呈茶色/可樂色，且尿液試紙潛血(+)但顯微鏡無紅血球(因 myoglobin 與 dipstick 反應)。腎損傷機轉：myoglobin 在腎小管形成色素管型阻塞+腎小管直接毒性+腎血管收縮→急性腎小管壞死(ATN)，屬『急性』腎損傷，可致少尿。治療：大量等張輸液(生理食鹽水)維持尿量、矯正高血鉀、必要時透析。茶色尿在肌肉受傷後即可出現，非『72 小時後』。", "options": {"A": "錯誤。橫紋肌溶解症因肌細胞釋鉀，典型造成『高血鉀』而非低血鉀。", "B": "正確答案。肌肉壞死釋出大量 creatine kinase(CK/肌酸激酶)，血中 CK 顯著升高是診斷標誌。", "C": "錯誤。myoglobinuria 在肌肉損傷後『立即/早期』即出現茶色尿，並非 72 小時後才產生。", "D": "錯誤。橫紋肌溶解造成的是『急性』腎損傷(色素性 ATN)導致尿量減少，而非慢性腎損傷。"}, "sources": ["Harrison 21e, Acute Kidney Injury (Pigment Nephropathy); Rhabdomyolysis", "Brenner & Rector's The Kidney 11e, Myoglobinuric AKI", "KDIGO 2012 AKI Guideline"]}}, "106-106a-內科-33": {"quick": "尿毒症出血傾向源於『血小板功能障礙』(尿毒毒素抑制 vWF-GPIb 黏附)，反映在 bleeding time 延長；PT/aPTT/TT(凝血因子)多正常 →最可靠檢查為 bleeding time(B)。", "detail": {"background": "尿毒症(uremia)病人有出血傾向，機轉是『血小板功能異常(qualitative platelet dysfunction)』而非凝血因子缺乏或血小板數量減少。尿毒毒素(如 guanidinosuccinic acid)干擾血小板與血管內皮 von Willebrand factor 的黏附(GPIb)、抑制血小板聚集、加上貧血(紅血球少使血小板被推向血管壁邊流的力量下降)及一氧化氮增加，共同造成出血。因此評估尿毒出血傾向應測『反映血小板功能與初級止血』的檢查──bleeding time(出血時間)會延長。而 PT、aPTT、TT 測的是凝血因子串聯(次級止血)，在單純尿毒症通常正常，故無法反映其出血風險。臨床改善尿毒出血方式：透析、DDAVP(去氨加壓素，促 vWF 釋放)、冷凍沉澱品、矯正貧血(輸血或 EPO 提升 Hct)、結合雌激素。本病人僅服葉酸、未抗凝、要拔牙評估出血，故首選 bleeding time。", "options": {"A": "aPTT 評估內在凝血路徑(因子 VIII、IX、XI、XII 等)，尿毒症通常正常，無法反映血小板功能性出血。", "B": "正確答案。bleeding time 反映血小板功能與初級止血，尿毒症因血小板功能障礙會使出血時間延長，最能反映其出血傾向。", "C": "thrombin time 評估纖維蛋白原轉成纖維蛋白(共同路徑末端)，與尿毒血小板功能障礙無關。", "D": "prothrombin time(PT)評估外在路徑(因子 VII)及共同路徑，尿毒症通常正常。"}, "sources": ["Harrison 21e, Hemostasis in Renal Disease; Chronic Kidney Disease", "Brenner & Rector's The Kidney 11e, Bleeding Diathesis of Uremia", "KDIGO 2012 CKD Guideline"]}}, "106-106a-通論-47": {"quick": "eGFR 43 mL/min/1.73m² 落在 30–59 區間，屬 KDIGO 慢性腎臟病第3期(G3，本題選項僅到第3期)。", "detail": {"background": "慢性腎臟病(CKD)依 KDIGO 2012/2024 以 eGFR 分六期：G1(≥90，有腎損傷但 GFR 正常)、G2(60–89)、G3a(45–59)、G3b(30–44)、G4(15–29)、G5(<15，腎衰竭)，並合併 albuminuria 分級 A1(<30)、A2(30–300)、A3(>300 mg/g)共同決定預後(KDIGO 風險熱圖)。本題 eGFR 43 介於 30–59，傳統三分法即第3期(細分為 G3b 30–44)。CKD 第3期起常開始出現併發症：secondary hyperparathyroidism、腎性貧血、代謝性酸中毒、高血壓、高血鉀。護理監測：血壓、容積狀態、電解質(K、磷)、避免腎毒性藥物與顯影劑、藥物劑量依 eGFR 調整、營養(限磷限鈉、適量蛋白)。診斷 CKD 需 eGFR 下降或腎損傷標誌持續≥3 個月。", "options": {"A": "第1期為 eGFR≥90 且有腎損傷標誌，與 eGFR 43 不符。", "B": "第2期為 eGFR 60–89，與 43 不符。", "C": "正確答案。eGFR 43 落在 30–59，屬第3期(細分 G3b 30–44)。", "D": "第4期為 eGFR 15–29，43 尚未到第4期。"}, "sources": ["Harrison 21e, Chronic Kidney Disease", "Brenner & Rector's The Kidney 11e, Staging of CKD", "KDIGO 2024 CKD Evaluation and Management Guideline"]}}, "106-106a-通論-48": {"quick": "PTX 術後 Chvostek's sign(+)代表急性症狀性低血鈣(hungry bone syndrome)→應靜脈注射 calcium gluconate 補鈣(B)。", "detail": {"background": "尿毒症 secondary hyperparathyroidism 病人接受 parathyroidectomy(PTX)後，因術前長期高 PTH 使骨骼處於高轉換、PTX 後 PTH 驟降，骨骼大量攝取鈣磷沉積(hungry bone syndrome)，造成術後嚴重低血鈣與低血磷。低血鈣神經肌肉興奮性增加→Chvostek's sign(輕敲面神經致面肌抽搐)與 Trousseau's sign(加壓帶充氣致腕痙攣)陽性，嚴重時喉痙攣、癲癇、QT 延長與心律不整。處置：有症狀或嚴重低血鈣應『靜脈注射 calcium gluconate』緩慢輸注矯正，並補充活性維生素D(calcitriol)及口服鈣，密切監測血鈣/磷/鉀與心電圖。護理重點：術後常規監測低血鈣徵象、備妥靜脈鈣劑、注意喉痙攣與呼吸道安全。本題正確處置即靜脈鈣劑補充。注意：Chvostek's sign 是『敲面神經』，並非血壓計加壓帶(那是 Trousseau's sign)。", "options": {"A": "錯誤。血壓計加壓帶充氣造成腕痙攣是 Trousseau's sign，不是 Chvostek's sign(Chvostek's 為輕敲面神經致面肌抽搐)。", "B": "正確答案。PTX 術後低血鈣致 Chvostek's(+)，應靜脈注射 calcium gluconate 矯正低血鈣。", "C": "錯誤。calcitonin 用於『降低』血鈣(治高血鈣)，對低血鈣病人會加重低鈣，不適當。", "D": "錯誤。單純 0.9% N/S hydration 無法矯正症狀性低血鈣，且本題核心問題是補鈣而非容積補充。"}, "sources": ["Harrison 21e, Hypocalcemia; CKD-MBD", "Brenner & Rector's The Kidney 11e, Hungry Bone Syndrome after Parathyroidectomy", "KDIGO 2017 CKD-MBD Guideline Update"]}}, "107-TNPA-兒科-58": {"quick": "運動(青蛙跳)後紅尿、尿潛血3+但 RBC 0–2/HPF(潛血與紅血球不一致)、Cr 升高→典型橫紋肌溶解，確診靠 creatine phosphokinase(CPK/CK)(C)。", "detail": {"background": "本題經典考點為『尿潛血陽性但顯微鏡無紅血球』的鑑別。尿液試紙潛血反應對 hemoglobin 與 myoglobin 皆呈陽性，當潛血(3+)但顯微鏡 RBC 極少(0–2/HPF)時，代表尿中色素來自 myoglobin(橫紋肌溶解)或游離 hemoglobin(血管內溶血)，而非真正的血尿。本案大雄被罰青蛙跳(劇烈運動致骨骼肌損傷)、出現紅尿、Cr 升高(3.0 mg/dL，色素性 AKI)，高度符合『運動誘發橫紋肌溶解症』。確診應檢測 creatine phosphokinase(CPK/CK)──大幅升高即證實肌肉壞死；同時可測 myoglobin。鑑別溶血則查 haptoglobin(下降)、LDH、間接膽紅素、血液抹片。治療：大量等張輸液維持尿量以沖洗 myoglobin、矯正高血鉀。", "options": {"A": "G-6-PD 缺乏症造成的是『血管內溶血』(會有真正血紅素尿)，但本題情境為運動後肌肉損傷，且應先以 CK 確認橫紋肌溶解，G6PD 非最直接確診工具。", "B": "haptoglobin 用於評估『溶血』(溶血時下降)，本題為運動性肌肉損傷，CK 才是直接證據。", "C": "正確答案。creatine phosphokinase(CPK/CK)大幅升高可確診橫紋肌溶解症，解釋紅尿(myoglobinuria)、潛血陽性但無 RBC、及 Cr 升高。", "D": "腎臟超音波用於評估結構/阻塞，無法確認橫紋肌溶解的病因。"}, "sources": ["Harrison 21e, Rhabdomyolysis; Hematuria evaluation", "Brenner & Rector's The Kidney 11e, Pigment Nephropathy", "Nelson Textbook of Pediatrics, Rhabdomyolysis"]}}, "107-TNPA-內科-12": {"quick": "腎功能不良 + 急性肺水腫(高血壓、低血氧、crackles)的第一線是 LMNOP(利尿/嗎啡/硝酸鹽/氧氣/體位)；nitroprusside 在腎衰會蓄積 thiocyanate 致氰化物中毒，最不適當(D)。", "detail": {"background": "本題情境為慢性腎病變病人發生急性心因性肺水腫(咳嗽、呼吸困難、血壓 198/116、SpO2 93%、雙肺 crackles)。急性肺水腫第一線治療傳統口訣 LMNOP：Lasix(利尿劑 furosemide 降前負荷與肺充血)、Morphine(降焦慮與前負荷，現代用量保守)、Nitrates(硝酸鹽降前/後負荷)、Oxygen(含必要時 CPAP/NIV)、Position(端坐姿)。降血壓控制後負荷亦重要。關鍵藥理陷阱：nitroprusside 代謝會產生 cyanide，再經肝轉成 thiocyanate 由『腎臟』排除；腎功能不良病人使用 nitroprusside 會使 thiocyanate/cyanide 蓄積→氰化物中毒(意識變化、乳酸中毒、心血管崩潰)，故在腎衰竭病人應避免或極謹慎。因此本題『靜脈注射 nitroprusside 降血壓』最不適當；若需快速降壓可選 nitroglycerin、nicardipine、labetalol 等較安全選擇。", "options": {"A": "適當。furosemide(Lasix)利尿降低肺充血與前負荷，是急性肺水腫第一線，非答案。", "B": "適當(在傳統治療中)。靜脈 morphine 可降低焦慮與前負荷、緩解呼吸困難，屬第一線之一，非最不適當者。", "C": "適當。氧氣治療矯正低血氧(SpO2 93%)，是基本且必要處置，非答案。", "D": "最不適當(答案)。腎功能不良病人使用 nitroprusside 易蓄積 thiocyanate/cyanide 致氰化物中毒，應避免；可改用 nitroglycerin、nicardipine 等較安全降壓藥。"}, "sources": ["Harrison 21e, Acute Pulmonary Edema; Hypertensive Emergencies", "Brenner & Rector's The Kidney 11e, Drug Dosing in Renal Failure", "2022 AHA/ACC/HFSA Heart Failure Guideline"]}}, "107-TNPA-內科-29": {"quick": "BUN/Cr>20、尿鈉低、FENa<1%、尿滲透壓>500 全屬『腎前性』腎灌注不足型態；顯影劑致 ATN(腎實質)會 FENa>1%、尿鈉高，最不可能(D)。", "detail": {"background": "本題考腎前性 AKI 的尿液診斷指標。腎前性(prerenal)AKI 因腎灌注下降，腎小管功能完好仍努力『重吸收鈉與水』以保留容積，故呈現：尿鈉低(<20 mEq/L)、FENa<1%(若用利尿劑改用 FEUrea<35%)、尿滲透壓高(>500 mOsm/kg，濃縮尿)、尿比重高、BUN/Cr 比值>20(因 BUN 隨水被重吸收而不成比例升高)。常見腎前病因：心衰竭(心輸出↓)、消化道出血/容積耗竭、敗血症低血壓初期、脫水、肝腎症候群。相對地，急性腎小管壞死(ATN，腎實質性)──如顯影劑、缺血、毒素──腎小管受損無法保鈉濃縮，呈現尿鈉高(>40)、FENa>2%、尿滲透壓<350(等張尿)、BUN/Cr≈10–15、尿沉渣可見泥棕色顆粒管型。題目給的全是腎前性指標，故四選項中『顯影劑引起腎臟傷害(造成 ATN)』最不符合此型態。", "options": {"A": "心衰竭使心輸出與腎灌注下降，屬腎前性，符合題目腎前指標，可能。", "B": "腸胃道出血造成容積耗竭→腎前性灌注不足，符合，可能。", "C": "敗血症引起低血壓在早期屬腎前性灌注不足，符合題目指標，可能。", "D": "最不可能(答案)。顯影劑造成 contrast-induced ATN 屬腎實質損傷，會呈 FENa>1–2%、尿鈉高、尿滲透壓低，與題目的腎前性指標不符。"}, "sources": ["Harrison 21e, Acute Kidney Injury (prerenal vs ATN)", "Brenner & Rector's The Kidney 11e, Urinary Indices in AKI", "KDIGO 2012 AKI Guideline"]}}, "107-TNPA-內科-71": {"quick": "CKD 第2期(eGFR 60–89)腎臟仍有代償，臨床『通常無症狀』，靠檢驗/尿蛋白才發現(A)。", "detail": {"background": "CKD 第2期定義為 eGFR 60–89 mL/min/1.73m² 且合併腎損傷標誌(蛋白尿、血尿、影像異常等)；單純 eGFR 60–89 而無損傷標誌不算 CKD。此期腎臟功能僅輕度下降、存有強大代償(剩餘腎元高過濾 hyperfiltration)，故病人『通常沒有症狀』，多在健檢驗尿/驗血或追蹤慢性病時偶然發現。併發症(貧血、骨病變、酸中毒)多在第3期後才明顯。重要觀念：CKD 一旦腎元破壞造成 GFR 持續下降，是『不可逆』的進展性過程，早期治療目的在『延緩惡化』(控制血壓、血糖、減少蛋白尿、避免腎毒性藥物)，而非『恢復已喪失的腎功能』。代償性 GFR 上升(hyperfiltration)發生在更早期或單側腎切除後，並非第2期的定義特徵，且長期 hyperfiltration 反而加速殘餘腎元受損。", "options": {"A": "正確答案。CKD 第2期腎功能僅輕度下降、有良好代償，臨床通常無症狀，多靠檢驗發現。", "B": "錯誤。約 50% 腎功能喪失大致對應 eGFR≈45–60(第3期左右)，第2期(60–89)喪失程度較輕。", "C": "錯誤。CKD 造成的腎元喪失是不可逆的，早期治療是延緩惡化而非恢復已失功能。", "D": "錯誤。代償性 GFR 上升(hyperfiltration)主要見於更早期或單腎情況，並非第2期的定義性特徵。"}, "sources": ["Harrison 21e, Chronic Kidney Disease", "Brenner & Rector's The Kidney 11e, Progression of CKD", "KDIGO 2024 CKD Evaluation and Management Guideline"]}}, "107-TNPA-內科-75": {"quick": "腎性貧血為 EPO 不足造成的『正球性正色素』貧血，非小球性；故『小球性貧血』最不可能(A)。", "detail": {"background": "慢性腎衰竭貧血主因是『腎臟(腎間質周邊細胞)產生 erythropoietin(EPO)不足』，加上尿毒毒素縮短紅血球壽命、慢性發炎使 hepcidin 上升致功能性鐵缺乏、營養與失血(透析、抽血、出血傾向)、葉酸/B12 不足與續發性副甲狀腺亢進抑制骨髓。其典型形態為『正球性正色素貧血(normocytic normochromic)』。治療：紅血球生成刺激劑(ESA，如 epoetin、darbepoetin)合併補充鐵劑(常需靜脈鐵以克服 hepcidin 阻斷)，治療前須確保鐵儲備充足，否則 ESA 反應不佳。KDIGO 2012 貧血指引建議一般 ESA 治療目標 Hb 不超過 11.5 g/dL(避免>13 增加心血管/血栓風險)，臨床常將 Hb 維持約 10–11.5 g/dL(本題選項 11–12 屬此概念)。因此『小球性貧血』與腎性貧血形態(正球性)不符，為最不可能。若 CKD 病人呈小球性貧血，要懷疑合併缺鐵或地中海型貧血。", "options": {"A": "最不可能(答案)。腎性貧血典型為『正球性正色素』，並非小球性(microcytic)；小球性需懷疑合併缺鐵或地中海貧血。", "B": "正確描述。腎臟產生 EPO 不足是腎性貧血的核心機轉。", "C": "正確描述。Hb 治療目標約維持 11–12 g/dL(KDIGO 建議不超過約 11.5–13)，過高增加心血管風險。", "D": "正確描述。補充鐵劑(尤其靜脈鐵)可改善鐵供給，提升 ESA/EPO 對貧血的療效。"}, "sources": ["Harrison 21e, Anemia of CKD", "Brenner & Rector's The Kidney 11e, Hematologic Manifestations of CKD", "KDIGO 2012 Anemia in CKD Guideline"]}}, "107-TNPA-通論-22": {"quick": "AKI 三分類中 intrinsic(腎內性)= 腎實質受損，acute tubular necrosis(ATN)即典型代表(B)。", "detail": {"background": "AKI 依解剖分三類：(1)腎前性(prerenal)──腎灌注不足，如 heart failure、低血容、休克、腎動脈狹窄(腎血流受限)。(2)腎內性/腎實質性(intrinsic)──腎絲球、腎小管、間質、血管本身受損，最常見為急性腎小管壞死(ATN，由缺血或腎毒素如顯影劑、aminoglycoside、myoglobin 引起)，其他含急性腎絲球腎炎、急性間質性腎炎、血管炎/TMA。(3)腎後性(postrenal)──尿路阻塞，如 ureteral obstruction(輸尿管阻塞)、攝護腺肥大、結石。本題問『腎內因素』，acute tubular necrosis 是腎實質受損的典型代表，為正確答案。注意：renal artery stenosis 影響腎血流灌注，歸腎前性範疇；ureteral obstruction 是腎後性。", "options": {"A": "heart failure 使心輸出與腎灌注下降，屬腎前性(prerenal)，非腎內性。", "B": "正確答案。acute tubular necrosis(ATN)是腎小管實質壞死，屬腎內性(intrinsic)AKI 的典型代表。", "C": "renal artery stenosis 是腎血管供血受限、影響腎灌注，歸腎前性而非腎實質損傷。", "D": "ureteral obstruction(輸尿管阻塞)屬腎後性(postrenal)。"}, "sources": ["Harrison 21e, Acute Kidney Injury classification", "Brenner & Rector's The Kidney 11e, Intrinsic AKI/ATN", "KDIGO 2012 AKI Guideline"]}}, "108a-TNPA-兒科-67": {"quick": "兒童最常見的腎前性 AKI 原因是『脫水/容積耗竭』(腹瀉嘔吐)(C)。", "detail": {"background": "腎前性(prerenal)AKI 為腎臟結構正常但腎灌注不足致 GFR 下降，是兒童 AKI 最常見的型態，而其最常見成因即『容積耗竭/脫水』(腸胃炎引起腹瀉嘔吐、攝食不足、發燒不顯性失水)，其次為出血、燒燙傷、敗血性休克、心衰竭、第三腔室積液。腎前性特徵：尿濃縮(尿滲透壓>500、比重高)、尿鈉低(<20)、FENa<1%、BUN/Cr>20，補充容積後可逆。處置首重恢復有效循環血量(等張輸液)。鑑別其他選項：腎病症候群與狼瘡腎炎屬腎絲球/腎實質疾病，出血性膀胱炎屬下泌尿道/腎後相關，皆非『最常見的腎前性原因』。早期辨識脫水並補液，可預防進展為缺血性 ATN(腎實質損傷)。", "options": {"A": "腎病症候群屬腎絲球疾病(雖低白蛋白可致有效血量不足)，非兒童最常見之腎前性 AKI 原因。", "B": "紅斑性狼瘡腎炎為腎絲球發炎(腎實質性)，非腎前性。", "C": "正確答案。脫水(腹瀉嘔吐致容積耗竭)是兒童最常見的腎前性 AKI 原因。", "D": "出血性膀胱炎屬下泌尿道病變，非腎前性原因。"}, "sources": ["Harrison 21e, Acute Kidney Injury", "Nelson Textbook of Pediatrics, AKI in Children", "KDIGO 2012 AKI Guideline"]}}, "108b-TNPA-內科-25": {"quick": "CKD 第4期 + 校正後低血鈣(肌肉抽搐)→低血鈣神經肌肉激惹，Chvostek's sign(+)(B)。", "detail": {"background": "與 105-TNPA-內科-10 同型題。CKD 第4期(eGFR 15–29)因 calcitriol 不足與高磷導致低血鈣，並刺激續發性副甲狀腺亢進。本題 Ca 7.1、albumin 2.9：corrected Ca = 7.1 + 0.8×(4.0−2.9) ≈ 8.0 mg/dL，仍偏低且有肌肉抽搐，屬症狀性低血鈣。低血鈣使神經肌肉興奮性增加，徵象為 Chvostek's sign(輕敲耳前面神經致同側面肌抽搐)與 Trousseau's sign(加壓帶充氣致腕痙攣)。處置：靜脈或口服補鈣、補充活性維生素D、降磷飲食與磷結合劑，監測心電圖 QT 延長。注意選項 C『Curner's sign』為誤植(無此徵象)。", "options": {"A": "Cullen's sign 為臍周瘀斑(腹膜後出血/胰臟炎)，與低血鈣無關。", "B": "正確答案。Chvostek's sign 反映低血鈣造成的神經肌肉興奮性增加，符合本題校正後低血鈣與肌肉抽搐。", "C": "Curner's sign(誤植，無此徵象)；可能想指 Grey Turner's sign(側腹瘀斑)，與低血鈣無關。", "D": "psoas sign(+)見於闌尾炎/腹膜後刺激，與低血鈣無關。"}, "sources": ["Harrison 21e, Hypocalcemia; CKD-MBD", "Brenner & Rector's The Kidney 11e, Mineral Metabolism in CKD", "KDIGO 2017 CKD-MBD Guideline Update"]}}, "108a-TNPA-內科-72": {"quick": "腎前性 AKI 是腎灌注不足；『發燒+低血壓』(敗血性容積/灌注不足)最符合腎前性(B)；馬拉松後可樂尿=橫紋肌(intrinsic)、NSAID=腎內性、攝護腺無尿=腎後性。", "detail": {"background": "本題鑑別 AKI 三分類的臨床情境。腎前性(prerenal)= 腎灌注壓/有效循環血量下降，常見於脫水、出血、心衰竭、敗血性休克(分布性休克致低血壓)。『發燒+低血壓』提示感染/敗血造成的灌注不足，屬腎前性。其他三選項各對應不同類型：(A)馬拉松後肌肉痠痛、可樂色尿、少尿→橫紋肌溶解的色素性 ATN，屬腎內性(intrinsic)；(C)痛風+靜脈 ketorolac(NSAID)→NSAID 抑制前列腺素使入球小動脈收縮，或致急性間質性腎炎，屬腎內性(亦含血流動力性);(D)攝護腺肥大、下腹脹痛、無尿→膀胱出口阻塞，屬腎後性(postrenal)。故最符合腎前性的是『發燒、低血壓』。鑑別重點：腎前性尿濃縮、FENa<1%、補液可逆；腎後性需解阻塞;腎內性(ATN/AIN)需移除病因、支持治療。", "options": {"A": "馬拉松後肌肉痠痛、可樂色尿、少尿是橫紋肌溶解的色素性 ATN，屬腎內性(intrinsic)，非腎前性。", "B": "正確答案。發燒、低血壓提示敗血/灌注不足，屬腎前性(prerenal)AKI。", "C": "痛風發作+靜脈 ketorolac(NSAID)會收縮入球小動脈或致急性間質性腎炎，屬腎內性。", "D": "攝護腺肥大、下腹脹痛、無尿為膀胱出口阻塞，屬腎後性(postrenal)。"}, "sources": ["Harrison 21e, Acute Kidney Injury classification", "Brenner & Rector's The Kidney 11e, Prerenal vs Intrinsic vs Postrenal AKI", "KDIGO 2012 AKI Guideline"]}}, "108b-TNPA-內科-79": {"quick": "急性間質性腎炎最常見原因是『藥物過敏』(非脫水)；其餘老年腎臟生理敘述皆正確 →錯誤為(A)。", "detail": {"background": "老年腎臟生理重點：(1)腎元數目與 GFR 隨年齡下降(約每十年降約 8 mL/min)，但因肌肉量減少使 serum creatinine 生成下降，故血清肌酸酐『不一定』隨老化上升，易低估真實腎功能(用 eGFR/cystatin C 較準)。(2)老年人腎臟對缺血、藥物、容積變化更敏感，AKI 風險高。(3)使用 ACEI/ARB 在容積耗竭或雙側腎動脈狹窄時可能誘發 AKI，故須謹慎(預防 AKI 時應留意)。(4)腎內性 AKI 最常見原因為急性腎小管壞死(ATN)。關鍵錯誤點在(A)：急性間質性腎炎(AIN)最常見原因是『藥物過敏反應』(抗生素如 β-lactam、NSAID、PPI、利尿劑等)與感染、自體免疫，典型三聯徵為發燒、皮疹、嗜伊紅性白血球增多，尿中可見白血球與嗜伊紅性白血球；脫水並非 AIN 的常見原因。故敘述(A)錯誤。", "options": {"A": "錯誤(答案)。急性間質性腎炎(AIN)最常見原因是『藥物過敏』(抗生素、NSAID、PPI 等)，而非脫水。", "B": "正確。老年人為預防 AKI 應謹慎使用 ARB/ACEI(容積耗竭或腎動脈狹窄時可誘發 AKI)，敘述合理，非答案。", "C": "正確。GFR 隨年齡下降，但因肌肉量減少使肌酸酐生成減少，血清 Cr 不一定隨老化上升，敘述正確。", "D": "正確。腎內性(intrarenal)AKI 最常見原因是急性腎小管壞死(ATN)，敘述正確。"}, "sources": ["Harrison 21e, Acute Interstitial Nephritis; Aging and the Kidney", "Brenner & Rector's The Kidney 11e, The Kidney in Ag
