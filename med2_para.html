sis)之患者,其耳朵軟骨常被侵蝕造成chiclero's ulcer","B":"嬰兒利什曼原蟲(Leishmania infantum)能侵入人體所有的有核細胞中分裂增殖","C":"杜氏利什曼原蟲(Leishmania donovani)是黑熱病(kala-azar)的致病原","D":"熱帶利什曼原蟲(Leishmania tropica)從未有導致內臟利什曼原蟲症(visceral leishmaniasis)的人體病例報 告"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_109100-32","q_num":32,"roc_year":"109","exam_code":"109100","src":"民國109年","topic":"P2血液與組織原蟲","stem":"有關瘧疾(malaria)致病機轉的敘述,下列何者錯誤?","options":{"A":"局部組織血液流量減少係因惡性瘧原蟲(Plasmodium falciparum)的細胞附著現象(cytoadherence)所引起","B":"被瘧原蟲寄生的紅血球表面會產生結合體(ligand)蛋白,並與內皮細胞上的特定受體形成複合物(ligand- receptor complex)造成細胞附著能力增加","C":"患者自體的血小板凝集蛋白(thrombospondin)受到抑制,造成受到瘧原蟲寄生的紅血球集結成團,進而影 響血流","D":"造成患者貧血的部分原因,為體內未受瘧原蟲感染的紅血球被活化並遭受破壞"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_110020-33","q_num":33,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"P2血液與組織原蟲","stem":"有關罹患瘧疾(malaria)後產生併發症的敘述,下列何者正確?","options":{"A":"腎絲球性腎炎(glomerulonephritis):係因三日瘧原蟲(Plasmodium malariae)感染後,過多的原蟲沉積在 腎絲球所造成的病變","B":"黑水熱(blackwater fever):和自體免疫有關,患者產生抗體攻擊受瘧原蟲感染的紅血球,導致破裂而造成","C":"熱帶脾腫大症候群(tropical splenomegaly syndrome):患者體內 T 淋巴球的大量增生所致","D":"低血糖症(hypoglycemia):特別是在惡性瘧原蟲(Plasmodium falciparum)發作時,血壓快速降低並伴隨 高寄生蟲血症(hyperparasitemia)有關"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_110020-35","q_num":35,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"P2血液與組織原蟲","stem":"采采蠅(tsetse fly)可經叮咬而傳播下列何種人類寄生蟲?","options":{"A":"熱帶利什曼原蟲(Leishmania tropica)","B":"杜氏利什曼原蟲(Leishmania donovani)","C":"岡比亞錐蟲(Trypanosoma brucei gambiense)","D":"枯西氏錐蟲(Trypanosoma cruzi)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_111020-33","q_num":33,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"P2血液與組織原蟲","stem":"下列何者為瘧疾(malaria)患者發燒週期之最可能原因?","options":{"A":"瘧原蟲入侵紅血球內,因為產生裂殖子(merozoite)而自紅血球內排出代謝產物所致","B":"除惡性瘧原蟲(Plasmodium falciparum)外,原蟲感染的細胞狀態是同步,所以發燒會呈現週期且有規律性","C":"間日瘧原蟲(P. vi "img":""},{"id":"med2_115020-31","q_num":31,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"P7絛蟲","stem":"李先生因頭痛、肌肉痙攣及視力急速減退而就醫,血液檢查有輕微的嗜伊紅性白血球(eosinophil)上升, 糞便檢查未發現任何寄生蟲蟲卵或蟲體,電腦斷層掃描(CT)和磁振造影(MRI)在腦實質組織、腦室發現許 多囊體(直徑4~15 毫米),患者先前曾被公司派駐墨西哥一年,他最可能罹患下列何種疾病?","options":{"A":"幼裂絛蟲症(sparganosis)","B":"囊尾幼蟲症(cysticercosis)","C":"廣節裂頭絛蟲症(diphyllobothriasis latum)","D":"縮小包膜絛蟲症(hymenolepiasis diminuta)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_106100-35","q_num":35,"roc_year":"106","exam_code":"106100","src":"民國106年","topic":"P8節肢動物病媒與感染","stem":"下列何種節肢動物,主要以機械性傳播(mechanical transmission)方式媒介病原體?","options":{"A":"蚊(mosquito)","B":"家蠅(house fly)","C":"跳蚤(flea)","D":"體蝨(body louse)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_107100-34","q_num":34,"roc_year":"107","exam_code":"107100","src":"民國107年","topic":"P8節肢動物病媒與感染","stem":"人類感染恙蟲病(scrub typhus)主要是經由下列何者之叮咬而感染?","options":{"A":"感染性成蜱(tick)","B":"感染性幼蜱(tick)","C":"感染性成蟎(mite)","D":"感染性幼蟎(mite)"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_108030-35","q_num":35,"roc_year":"108","exam_code":"108030","src":"民國108年","topic":"P8節肢動物病媒與感染","stem":"有關蠅蛆症(myiasis)之敘述,下列何者錯誤?","options":{"A":"人膚蠅(Dermatobia hominis)產卵於吸血性蚊/蠅之腹部而致孵化之幼蟲鑽入宿主皮膚傷口","B":"院內蠅蛆症(nosocomial myiasis)常發生於長期臥床且有開放性傷口病患","C":"耳部蠅蛆症(aural myiasis)病患常有蟲體爬動感、雜音及惡臭分泌物","D":"人膚蠅(Dermatobia hominis)傳播之蠅蛆症經常發生於亞洲地區"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_109020-35","q_num":35,"roc_year":"109","exam_code":"109020","src":"民國109年","topic":"P8節肢動物病媒與感染","stem":"有關病媒(vector)及其媒介疾病之關係,下列何者錯誤?","options":{"A":"埃及斑蚊(Aedes aegypti)傳播黃熱病(yellow fever)","B":"蚋(Simulium spp.)傳播河川盲(river blindness)","C":"采采蠅(tsetse fly)傳播卡格氏症(Chagas’disease)","D":"白蛉(sandfly)傳播利什曼原蟲症(leishmaniasis)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_109100-34","q_num":34,"roc_year":"109","exam_code":"109100","src":"民國109年","topic":"P8節肢動物病媒與感染","stem":"病媒蜱(vector tick)可以藉由叮咬而傳播下列何種人類感染症?","options":{"A":"黑熱病(kala-azar)","B":"戰壕熱(trench fever)","C":"黃熱病(yellow fever)","D":"回歸熱(relapsing fever)"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_111020-35","q_num":35,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"P8節肢動物病媒與感染","stem":"下列有關鼠蚤(Xenopsylla cheopis)傳播之鼠疫(plague)敘述,何者錯誤?","options":{"A":"人類感染初期會呈現腋窩(axilla)腫大之腺鼠疫(bubonic plague)","B":"人類感染後期呈現人傳播人之肺鼠疫(pneumonic plague)","C":"感染性鼠蚤藉由嘔吐作用(vomiting)污染叮咬傷口而感染人類","D":"主要致病原為鼠疫桿菌(Yersinia pestis),屬於格蘭氏陰性菌"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_111100-35","q_num":35,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"P8節肢動物病媒與感染","stem":"下列何時期之恙蟎屬(Leptotrombidium spp.)為人類感染恙蟲病(tsutsugamushi disease)之主要媒介?","options":{"A":"幼蟎(larvae)","B":"稚(若)蟎(nymph)","C":"雌蟎(female)","D":"雄蟎(male)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_112100-34","q_num":34,"roc_year":"112","exam_code":"112100","src":"民國112年","topic":"P8節肢動物病媒與感染","stem":"下列何種節肢動物已被確認可以導致兒童過敏及氣喘(asthma)之主要致敏原(allergen)?","options":{"A":"疥蟎(scabies mite)","B":"塵蟎(dust mite)","C":"毛囊蟎(follicle mite)","D":"恙蟎(chigger mite)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_114020-35","q_num":35,"roc_year":"114","exam_code":"114020","src":"民國114年","topic":"P8節肢動物病媒與感染","stem":"下列有關病媒(vector)的敘述,何者最為適當?","options":{"A":"蒼蠅主要藉由經卵傳播(transovarial transmission)而媒介病原體","B":"腮腺炎是藉由昆蟲為媒介而傳染","C":"節肢動物的馬氏管(Malpighian tubules)主要負責移除含氮廢物","D":"防治病媒蚊無法遏阻登革熱的流行"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_114090-35","q_num":35,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"P8節肢動物病媒與感染","stem":"下列有關病媒(vector)及其媒介疾病之關係,何者錯誤?","options":{"A":"體蝨(body louse);戰壕熱(trench fever)","B":"軟蜱(soft tick);日本斑疹熱(Japanese spotted fever)","C":"采采蠅(tsetse fly);非洲睡眠病(African sleeping sickness)","D":"虻(Chrysops spp.);羅阿絲蟲病(loaiasis)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""}],E={"med2_106100-34":{"quick":"阿米巴腫(ameboma)為肉芽腫性團塊,常被誤診為惡性腫瘤,敘述正確。","detail":{"background":"痢疾阿米巴(Entamoeba histolytica)經糞口攝入囊體感染,滋養體侵入大腸黏膜致阿米巴痢疾(果醬樣血便),可經門脈播散致「阿米巴肝膿瘍」——「好發於『右葉』(門脈血流方向),膿瘍中央為壞死液化的『鯷魚醬樣』物質、滋養體多在『膿瘍壁邊緣』(故抽吸取壁部陽性率高)」;第一線治療為「metronidazole(殺組織內滋養體)+ 腸腔殺囊體劑(paromomycin)」。腸壁慢性肉芽腫團塊稱「阿米巴腫(ameboma)」,影像/內視鏡下易與大腸癌混淆而誤診。故D正確。","options":{"A":"肝膿瘍好發右葉、非左葉—錯誤。","B":"滋養體多在膿瘍壁邊緣、非中央壞死區—錯誤。","C":"第一線為metronidazole、非驅蟲藥mebendazole—錯誤。","D":"阿米巴腫常被誤診為惡性腫瘤—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_107100-33":{"quick":"組織切片中皆可同時見滋養體與囊體者為棘阿米巴與巴氏阿米巴;Naegleria在組織中只有滋養體。","detail":{"background":"自由生活阿米巴的組織型態差異很重要:①「棘阿米巴(Acanthamoeba)」與「巴氏阿米巴(Balamuthia mandrillaris)」——在「組織(腦、角膜)切片中可『同時見到滋養體與囊體』」(致肉芽腫性阿米巴腦炎GAE、角膜炎);②「福氏內格里阿米巴(Naegleria fowleri)」——在組織(腦)中「『只有滋養體、不形成囊體』」(致急性原發性阿米巴腦膜腦炎PAM)。痢疾阿米巴的囊體見於腸腔/糞便而非侵入組織。故組織切片皆可見囊體者為棘阿米巴+巴氏阿米巴。","options":{"A":"哈氏阿米巴為腸道非致病小型阿米巴、組織切片非此情境。","B":"痢疾阿米巴侵入組織為滋養體、囊體在腸腔。","C":"棘阿米巴與巴氏阿米巴組織切片皆可見滋養體與囊體—正解。","D":"Naegleria在組織只有滋養體、無囊體。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108030-34":{"quick":"痢疾阿米巴感染高危險群包括男同性戀者與教養/精神院生,敘述正確。","detail":{"background":"阿米巴鑑別:①「嗜碘阿米巴(Iodamoeba bütschlii)」的『囊體』具大型肝醣泡(碘染色深;非滋養體);②「哈氏阿米巴(E. hartmanni)」體型小、為非致病性,『不吞噬紅血球』(吞噬紅血球的滋養體是痢疾阿米巴的致病指標);③「痢疾阿米巴(E. histolytica)」經糞口傳播,高危險群為「衛生不良地區、男男性行為者、教養院/精神機構住民、免疫低下者」;④其囊體內的「類染色體(chromatoid bodies)」成分為『RNA(核糖體聚集)』而非DNA。故C正確。","options":{"A":"大肝醣泡在嗜碘阿米巴的囊體(非滋養體)—錯誤。","B":"哈氏阿米巴不吞噬紅血球—錯誤。","C":"痢疾阿米巴高危險群含男同性戀與教養院生—正解。","D":"類染色體成分為RNA而非DNA—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109100-33":{"quick":"腸道阿米巴中成熟囊體平均體型最大者為大腸阿米巴(Entamoeba coli)。","detail":{"background":"腸道阿米巴囊體大小與核數可用於鑑別:「大腸阿米巴(Entamoeba coli)」的成熟囊體最大(約10-30μm)、具『8個核』(成熟時),為非致病性共生阿米巴;痢疾阿米巴(E. histolytica)囊體約10-20μm、4核;哈氏阿米巴(E. hartmanni)體型小(<10μm)、4核;嗜碘阿米巴囊體約8-15μm、單核且具大肝醣泡。故平均囊體最大者為大腸阿米巴。","options":{"A":"嗜碘阿米巴囊體較小(單核)。","B":"哈氏阿米巴囊體最小。","C":"大腸阿米巴成熟囊體平均最大(8核)—正解。","D":"痢疾阿米巴囊體中等(4核)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_113090-32":{"quick":"弓蟲主要經食入含囊體的肉或貓糞卵囊感染,非經飲用污染水;其餘三者為水媒。","detail":{"background":"經「飲用受污染水」傳播的腸道原蟲常見:「環孢子蟲(Cyclospora cayetanensis)、梨形鞭毛蟲(Giardia lamblia)、隱孢子蟲(Cryptosporidium)」——其卵囊/囊體可污染水源(隱孢子蟲對加氯消毒抵抗)。而「弓蟲(Toxoplasma gondii)」的主要感染途徑為「食入含『緩殖子囊體(bradyzoite cyst)』的未熟肉」或「誤食貓糞中的『卵囊(oocyst)』」(以及經胎盤垂直感染),「並非主要經飲水」。故不是經飲水所致者為弓蟲。","options":{"A":"環孢子蟲為水媒傳播。","B":"弓蟲主要經食肉/貓糞卵囊、非飲水—正解。","C":"梨形鞭毛蟲為水媒傳播。","D":"隱孢子蟲為水媒傳播(抗氯)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114020-34":{"quick":"腸道鞭毛蟲生活史多只需一個宿主、經口感染,最為適當。","detail":{"background":"腸道鞭毛蟲(如梨形鞭毛蟲Giardia、人腸道滴蟲、陰道滴蟲等):①「生活史多『只需一個宿主』,經口(糞口)感染」;②「並非都寄生小腸」——梨形鞭毛蟲寄生十二指腸/小腸,但大腸纖毛蟲、某些阿米巴在大腸,陰道滴蟲在泌尿生殖道;③「感染型不都是囊體」——『陰道滴蟲(Trichomonas vaginalis)『無囊體期』,以滋養體經性接觸傳播』;④腸道鞭毛蟲多缺乏典型粒線體,副基體(parabasal body)是高基氏體相關構造、非粒線體核酸集中區。故A最適當。","options":{"A":"生活史只需一個宿主、經口感染—正解。","B":"非均寄生小腸(大腸/泌尿生殖道亦有)—錯誤。","C":"陰道滴蟲無囊體、感染型非都是囊體—錯誤。","D":"副基體非粒線體核酸集中區—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114090-33":{"quick":"免疫妥協者嚴重腹瀉主要不是由肺孢子蟲與弓蟲(②④)引起;而是微孢子蟲與等孢子蟲。","detail":{"background":"免疫低下(尤其AIDS)患者「慢性嚴重腹瀉」的腸道機會性原蟲主要為:「①微孢子蟲(Enterocytozoon bieneusi)、③貝氏等孢子蟲(Cystoisospora/Isospora belli)」,以及隱孢子蟲、環孢子蟲——這些感染腸上皮致水瀉、吸收不良。而「②肺孢子蟲(Pneumocystis jirovecii)」造成的是『肺炎(PCP)』、「④弓蟲(Toxoplasma)」在免疫低下者造成的是『腦炎』,「皆非以腹瀉為主」。故主要不是引起腹瀉者為②④。","options":{"A":"①微孢子蟲確致免疫低下者腹瀉。","B":"③等孢子蟲確致腹瀉(②④才非)。","C":"①③皆致腹瀉。","D":"②肺孢子蟲致肺炎、④弓蟲致腦炎,非腹瀉—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_115020-32":{"quick":"新生兒可經產道感染陰道滴蟲,「新生兒不會感染」最不適當。","detail":{"background":"陰道滴蟲症(由Trichomonas vaginalis引起):①「主要經性行為傳播」;②男性多為「無症狀帶蟲」、但可致尿道炎、攝護腺炎並傳染伴侶;③「metronidazole(或tinidazole)」為有效治療(伴侶須同治);④「新生兒『可經產道』感染」(致陰道分泌物或新生兒呼吸道感染),故「新生兒不會感染」與事實相反。陰道滴蟲無囊體期、以滋養體存活,典型表現泡沫狀黃綠色分泌物與草莓狀子宮頸。故D最不適當。","options":{"A":"主要經性行為傳播,正確。","B":"男性多無症狀、可致攝護腺炎,正確。","C":"metronidazole為有效治療,正確。","D":"新生兒可經產道感染、非不會感染—錯誤(正解)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_106100-33":{"quick":"印度旅遊後肝脾腫大、骨髓巨噬細胞內見無鞭毛體,為內臟利什曼原蟲病(黑熱病)。","detail":{"background":"內臟利什曼原蟲病(visceral leishmaniasis,黑熱病kala-azar)由「杜氏利什曼原蟲(Leishmania donovani)」引起,經「白蛉(sandfly)」叮咬傳染,流行於印度、東非等地。臨床:長期不規則發燒、「肝脾腫大(尤其脾大)、貧血、白血球與血小板減少、消瘦、皮膚變黑」;診斷以「骨髓/脾穿刺見『巨噬細胞內無鞭毛體(amastigote,Leishman-Donovan body)』」。本題印度旅遊+肝脾腫大+骨髓巨噬內amastigote即黑熱病。黑水熱(瘧疾溶血)、絲蟲症、Chagas病表現不同。","options":{"A":"黑水熱為瘧疾的溶血併發、非此。","B":"黑熱病(內臟利什曼,骨髓amastigote)—正解。","C":"絲蟲症致淋巴象皮病、非此。","D":"Chagas病(枯西氏錐蟲)致心臟/巨結腸、非此。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_107100-35":{"quick":"巴貝氏原蟲寄生紅血球內,最易經輸血途徑造成人傳人感染。","detail":{"background":"「巴貝氏原蟲症(babesiosis)」由Babesia寄生「紅血球內」(似瘧原蟲),原本經「硬蜱」叮咬傳染;但因「寄生於紅血球」,可經「輸血(輸入帶蟲紅血球)」造成『人傳人』感染(輸血相關巴貝氏症為重要血品安全議題)。巴西利什曼(白蛉、皮膚黏膜)、萊姆病(蜱、Borrelia)、恙蟲病(恙蟎、立克次體)主要靠病媒叮咬、較不以輸血傳人。故較易經輸血傳人者為巴貝氏原蟲症。","options":{"A":"巴西利什曼經白蛉、非以輸血為主。","B":"萊姆病經蜱叮咬。","C":"恙蟲病經恙蟎叮咬。","D":"巴貝氏原蟲寄生紅血球、可經輸血人傳人—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108030-33":{"quick":"三日瘧(P. malariae)以「帶狀型滋養體」為特徵;卵形瘧鑑定非看帶狀型,故C錯誤。","detail":{"background":"瘧疾要點:①典型「發作(paroxysm)依序為惡寒→發燒→發汗」;②「三日瘧原蟲(P. malariae)」偏好侵入『成熟(老)紅血球』,血片可見特徵性「『帶狀型滋養體(band form)』」與玫瑰花環裂殖體;③「卵形瘧(P. ovale)」的鑑定特徵是『受感染紅血球呈橢圓形、邊緣流蘇狀、有Schüffner點』,而非帶狀型(帶狀型是三日瘧);④流行區「六個月以下嬰兒因母體被動抗體(及胎兒血紅素)」較少發病。故C(以帶狀型滋養體鑑定卵形瘧)錯誤。","options":{"A":"瘧疾發作為惡寒→發燒→發汗,正確。","B":"三日瘧偏好成熟紅血球,正確。","C":"帶狀型滋養體是三日瘧特徵、非卵形瘧鑑定依據—錯誤(正解)。","D":"流行區六月以下嬰兒受母體抗體保護,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108100-33":{"quick":"岡比亞錐蟲分布西/中非、羅得西亞錐蟲在東/南非,「蘇丹同時有兩者」不準確,故A錯誤。","detail":{"background":"非洲錐蟲(睡眠病)有兩亞種,地理分布不同:「岡比亞錐蟲(T. b. gambiense)」分布『西非與中非』(慢性病程);「羅得西亞錐蟲(T. b. rhodesiense)」分布『東非與南非』(急性病程,東非野生動物保護區旅客可感染)。蘇丹主要為岡比亞型,並非典型『同時有兩亞種共域』。其餘:黑熱病治療不當後可出現「後黑熱病皮膚利什曼病(PKDL)」(B正確);美國曾有本土Chagas病例(C正確);歐美人士至東非旅遊可感染羅得西亞錐蟲(D正確)。故A最不正確。","options":{"A":"兩錐蟲亞種地理分布不同、非同時共域於蘇丹—錯誤(正解)。","B":"黑熱病可後續出現PKDL皮膚病灶,正確。","C":"美國有本土Chagas病例,正確。","D":"東非旅遊可感染羅得西亞錐蟲,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108100-34":{"quick":"巨食道/巨結腸(Megaesophagus/megacolon)是枯西氏錐蟲(Chagas)所致,配對為杜氏利什曼錯誤。","detail":{"background":"病徵與病原配對:①「Romaña氏徵(單側眼瞼水腫)」——枯西氏錐蟲(Chagas病急性期叮咬入侵處);②「Winterbottom氏徵(後頸淋巴結腫大)」——岡比亞錐蟲(非洲睡眠病);③「Espundia(黏膜皮膚利什曼病)」——巴西利什曼原蟲;④「巨食道/巨結腸(Megaesophagus/megacolon)」——『枯西氏錐蟲(Chagas病慢性期破壞腸道神經叢)』而『非杜氏利什曼原蟲』(後者致黑熱病肝脾腫大)。故C配對錯誤。","options":{"A":"Romaña徵-枯西氏錐蟲,正確。","B":"Winterbottom徵-岡比亞錐蟲,正確。","C":"巨食道應配枯西氏錐蟲而非杜氏利什曼—錯誤(正解)。","D":"Espundia-巴西利什曼,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108100-35":{"quick":"巴貝氏症的高寄生蟲血症與重症多見於脾切/免疫低下者(非無症狀),故B錯誤。","detail":{"background":"人巴貝氏原蟲症(human babesiosis):①Babesia經硬蜱傳染後「主要寄生於『紅血球內』」(似瘧原蟲,可見四分體Maltese cross);②「免疫健全者多為輕症或無症狀(低寄生蟲血症)」,而「『高寄生蟲血症與重症(溶血、器官衰竭)』通常發生在『脾切除、老年或免疫低下』者」——故B「常呈『無症狀』之『高度寄生蟲血症』」自相矛盾、錯誤;③致死病例多見於脾切者(C正確);④診斷以「血液抹片+免疫螢光抗體(IFA)/PCR」(D正確)。故B錯誤。","options":{"A":"巴貝氏原蟲主要寄生紅血球內,正確。","B":"無症狀者多低寄生蟲血症、高寄生蟲血症見於重症—錯誤(正解)。","C":"致死多見於脾切除者,正確。","D":"以血抹片配合IFA診斷,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109020-34":{"quick":"杜氏利什曼原蟲(L. donovani)是黑熱病(內臟利什曼病)的致病原,敘述正確。","detail":{"background":"利什曼原蟲鑑別:①「杜氏利什曼原蟲(L. donovani)」——『黑熱病(內臟利什曼病kala-azar)』的致病原(肝脾腫大、發燒、全血球減少);②「chiclero潰瘍(耳殼軟骨破壞)」是『墨西哥利什曼(L. mexicana)』新世界皮膚利什曼病的表現,非巴西利什曼;③「嬰兒利什曼(L. infantum)」與其他利什曼皆主要寄生『巨噬細胞(網狀內皮系統)』,而非『所有有核細胞』;④「熱帶利什曼(L. tropica)」雖主致皮膚利什曼,『曾有』內臟病例報告(故「從未」不正確)。故C正確。","options":{"A":"chiclero潰瘍為墨西哥利什曼、非巴西利什曼—錯誤。","B":"嬰兒利什曼寄生巨噬細胞、非所有有核細胞—錯誤。","C":"杜氏利什曼為黑熱病致病原—正解。","D":"熱帶利什曼曾有內臟病例、非「從未」—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109100-32":{"quick":"瘧疾的thrombospondin參與細胞附著(cytoadherence),「受到抑制」敘述錯誤。","detail":{"background":"惡性瘧(P. falciparum)致命機轉核心是「細胞附著(cytoadherence)與紅血球聚集」:被寄生的紅血球表面表現「PfEMP1等ligand蛋白」,與微血管「內皮受體(如CD36、ICAM-1、『thrombospondin』)」結合,使感染紅血球黏附並阻塞微血管→局部血流減少、組織缺氧(腦瘧、器官衰竭),並造成「玫瑰花結(rosetting)」。故「thrombospondin」是『參與/媒介細胞附著』的分子,「並非受到抑制」;C「thrombospondin受抑制」敘述錯誤。另貧血部分源於未感染紅血球也被破壞/清除。","options":{"A":"惡性瘧cytoadherence致局部血流減少,正確。","B":"感染紅血球ligand與內皮受體結合增加附著,正確。","C":"thrombospondin參與附著、非受抑制—錯誤(正解)。","D":"未感染紅血球也被破壞致貧血,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_110020-33":{"quick":"黑水熱與自體免疫/抗體攻擊感染紅血球致血管內溶血有關,敘述正確。","detail":{"background":"瘧疾併發症:①「腎絲球性腎炎」——尤其『三日瘧(P. malariae)』後,因『免疫複合體』沉積於腎絲球(非原蟲本身沉積);②「黑水熱(blackwater fever)」——『血管內大量溶血併血紅素尿(尿呈深褐黑色)』,與『自體免疫(抗體攻擊受感染紅血球)、奎寧使用及G6PD缺乏』有關;③「熱帶脾腫大症候群」——與『B淋巴球/IgM過度反應』(非T淋巴球大量增生)有關;④「低血糖」——常見於惡性瘧重症及奎寧治療,與高寄生蟲血症、胰島素分泌有關。故B(黑水熱與自體免疫/抗體攻擊感染紅血球溶血)正確。","options":{"A":"腎炎為免疫複合體沉積、非原蟲沉積—錯誤。","B":"黑水熱與抗體攻擊感染紅血球致溶血有關—正解。","C":"熱帶脾腫與B/IgM反應有關、非T淋巴球—錯誤。","D":"低血糖機轉與奎寧/高寄生蟲血症有關,描述不準。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_110020-35":{"quick":"采采蠅(tsetse fly)傳播岡比亞錐蟲(非洲睡眠病)。","detail":{"background":"病媒與錐蟲/利什曼配對:①「采采蠅(tsetse fly, Glossina)」——傳播『非洲錐蟲(岡比亞T. b. gambiense與羅得西亞T. b. rhodesiense)』,致『非洲睡眠病』;②「白蛉(sandfly)」——傳播『利什曼原蟲(熱帶/杜氏)』與白蛉熱;③「錐蝽/獵蝽(triatomine bug)」——傳播『枯西氏錐蟲(Chagas病,美洲錐蟲)』。故采采蠅傳播者為岡比亞錐蟲。","options":{"A":"熱帶利什曼由白蛉傳播。","B":"杜氏利什曼由白蛉傳播。","C":"采采蠅傳播岡比亞錐蟲(睡眠病)—正解。","D":"枯西氏錐蟲由錐蝽傳播。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111020-33":{"quick":"間日瘧發燒週期約48小時,不同次族群感染可造成不規則發燒,最為合理。","detail":{"background":"瘧疾發燒週期源於「紅血球內裂殖體同步破裂、釋出裂殖子與『致熱原(瘧疾色素、細胞殘骸)』」引發畏寒發燒:①「間日瘧(P. vivax)與卵形瘧」週期約『48小時(隔日熱tertian)』、三日瘧約『72小時(quartan)』、惡性瘧不規則(約36-48小時);②若體內有『不同次族群(sub-population)』同時感染、破裂不同步,則造成『不規則發燒週期』(C正確);③惡性瘧因不同步,發燒『不規則』;④三日瘧潛伏期較長(非較短)。故C最合理。","options":{"A":"發燒源於裂殖體破裂釋出致熱原、非排代謝產物,描述不準。","B":"惡性瘧不同步、發燒不規則,B敘述不準。","C":"間日瘧約48小時、不同次族群可致不規則發燒—正解。","D":"三日瘧潛伏期較長、非較短—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111020-34":{"quick":"黑水熱是瘧疾的溶血併發,與杜氏利什曼(黑熱病)無關。","detail":{"background":"杜氏利什曼原蟲(L. donovani)造成「內臟利什曼病(黑熱病kala-azar)」,典型表現「『肝脾腫大、貧血、發燒、消瘦、腹瀉、全血球減少、皮膚變黑』」。而「黑水熱(blackwater fever)」是『瘧疾(尤惡性瘧)』血管內大量溶血併血紅素尿的併發症,「與利什曼原蟲無關」。故與杜氏利什曼感染無關者為黑水熱。","options":{"A":"腹瀉可見於黑熱病。","B":"貧血為黑熱病常見。","C":"黑水熱屬瘧疾溶血併發、與利什曼無關—正解。","D":"肝脾腫大為黑熱病特徵。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111100-33":{"quick":"黑熱病部分患者後續出現後黑熱病皮膚利什曼病(PKDL,色素脫失結節),敘述正確。","detail":{"background":"黑熱病(內臟利什曼病kala-azar):①主要致病原為「杜氏利什曼原蟲(L. donovani)」(非熱帶利什曼);②利什曼分類「不能僅靠無鞭毛體形態(各種利什曼amastigote相似)」,須借助分子、同功酶或中間宿主;③臨床為「肝脾腫大、發燒、皮膚變暗(『黑』指皮膚色素沉著)」,「『黑尿』並非黑熱病特徵(黑尿是瘧疾黑水熱)」;④部分患者治療後出現「『後黑熱病皮膚利什曼病(PKDL)』——皮膚色素脫失結節/丘疹」(D正確,為傳染源)。故D正確。","options":{"A":"主要致病原為杜氏利什曼而非熱帶利什曼—錯誤。","B":"無鞭毛體形態相似、不能作分類主依據—錯誤。","C":"黑尿是瘧疾黑水熱、非黑熱病特徵—錯誤。","D":"部分患者出現後黑熱病皮膚病灶(PKDL)—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112020-32":{"quick":"利什曼前鞭毛體進入脊椎宿主後被巨噬細胞吞噬、轉為無鞭毛體,敘述正確。","detail":{"background":"利什曼原蟲生活史:①「白蛉(中間宿主/病媒)叮咬時注入『前鞭毛體(promastigote)』」;②前鞭毛體在『脊椎動物宿主』體內『被巨噬細胞吞噬』後,於吞噬泡內『轉變為無鞭毛體(amastigote)』並二分裂增殖(A正確);③白蛉再吸血時攝入amastigote,在白蛉腸道轉回前鞭毛體並移行至口器(完成循環)。利什曼分類『不能僅靠中間宿主種株』;形態轉換主要由溫度/環境觸發。故A正確。","options":{"A":"前鞭毛體被巨噬細胞吞噬後轉為無鞭毛體—正解。","B":"形態轉換非單因氧分壓降低,描述不準。","C":"分類不能僅靠中間宿主種株—錯誤。","D":"循環後期錐鞭毛體為錐蟲(Chagas)機制、非利什曼—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112020-33":{"quick":"黑熱病(kala-azar)為利什曼原蟲所致,與枯西氏錐蟲(Chagas病)無關。","detail":{"background":"枯西氏錐蟲(Trypanosoma cruzi)致「Chagas病(美洲錐蟲病)」,經錐蝽(獵蝽)糞便經傷口/黏膜感染。臨床:①急性期「Romaña氏徵(單側眼瞼水腫)」;②可致「心肌炎(慢性Chagas心肌病、心臟擴大傳導阻滯)」;③慢性期破壞腸道神經叢致「巨食道、巨結腸(megacolon)」。而「黑熱病(kala-azar)」是『杜氏利什曼原蟲』所致的內臟利什曼病,「與枯西氏錐蟲無關」。故無關者為黑熱病。","options":{"A":"Romaña氏徵為Chagas急性期表現。","B":"心肌炎為Chagas心臟侵犯。","C":"巨結腸為Chagas慢性腸神經破壞。","D":"黑熱病為利什曼所致、與枯西氏錐蟲無關—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112020-34":{"quick":"卵動子鑽入蚊「中腸壁」形成卵囊發育孢子體,「鑽入唾液腺」錯誤。","detail":{"background":"瘧原蟲在病媒蚊(瘧蚊Anopheles)體內的有性世代(孢子增殖):①瘧蚊吸血時攝入「雌、雄配子母細胞(gametocyte)」;②在蚊中腸內配子結合受精成「合子(zygote)」→發育為能動的「『卵動子(ookinete)』」;③「卵動子『鑽入蚊中腸壁』、在中腸上皮外側形成『卵囊(oocyst)』」,內含大量「孢子體(sporozoites)」;④卵囊成熟破裂釋出孢子體,孢子體再「移行至『唾液腺』」待下次吸血時注入人體。故C「卵動子鑽入『唾液腺』發育成孢子體」錯誤(應鑽入中腸壁形成卵囊)。蚊內發育約8-35天(依種類/溫度)。","options":{"A":"瘧蚊吸入雌雄配子母細胞,正確。","B":"合子發育成能動的卵動子,正確。","C":"卵動子鑽入中腸壁形成卵囊、非鑽入唾液腺—錯誤(正解)。","D":"蚊體內發育約8-35天,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112100-32":{"quick":"弓蟲急性感染期多無症狀或類流感,「出現大量腹水」錯誤。","detail":{"background":"弓蟲症(toxoplasmosis):①「腸外期」感染主要因『食入含『緩殖子(bradyzoite)』的組織囊體(未熟肉)』或誤食貓糞卵囊;②「免疫健全者『急性期』多『無症狀或僅類似感冒(發燒、淋巴腺腫)』」——『不致大量腹水』;③「慢性期」蟲體在腦、肌肉、視網膜形成囊體,免疫低下(AIDS)再活化時致「『腦炎(膠質細胞結節、環狀強化病灶)』、脈絡視網膜炎」;孕婦初次感染可垂直傳染致先天弓蟲症(腦鈣化、水腦、視網膜脈絡炎)。故C「急性期出現大量腹水」錯誤。","options":{"A":"腸外期因食入含緩殖子的食物,正確。","B":"免疫正常者多無症狀或類感冒,正確。","C":"急性期不致大量腹水—錯誤(正解)。","D":"慢性期膠質細胞結節致慢性腦炎(免疫低下再活化),正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112100-35":{"quick":"蜱叮咬後白血球與血小板減少、嗜中性球內見桑椹胚菌體,最符合人艾利希體症。","detail":{"background":"本題「美國東北部、野營、蜱叮咬、頭痛高燒、『白血球減少、血小板減少、肝功能異常』,血片『嗜中性球(或單核球)內見桑椹胚樣包涵體(morulae)』」——最符合「人艾利希體/無形體症(ehrlichiosis/anaplasmosis)」(立克次體目,經蜱傳染,doxycycline治療)。對照:巴貝氏症(紅血球內蟲體、溶血)、萊姆病(遊走性紅斑)、巴東菌症(貓抓病、桿菌性血管瘤)表現不同。故為人艾利希體症。(註:艾利希體屬立克次體類,常與蜱媒寄生蟲病同列鑑別。)","options":{"A":"巴貝氏症蟲體在紅血球內、致溶血,非中性球內morulae。","B":"人艾利希體症(中性球/單核球內morulae、血球減少)—正解。","C":"萊姆病以遊走性紅斑為特徵。","D":"巴東菌症為貓抓病/血管瘤,非此。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_113090-33":{"quick":"間日瘧在西非罕見(因當地多Duffy陰性),「在西非最常見」錯誤。","detail":{"background":"間日瘧原蟲(Plasmodium vivax):①裂殖子主要侵犯「年輕紅血球(網狀紅血球reticulocyte)」;②其入侵需與紅血球的「Duffy血型抗原」結合(為附著受體);③『因「西非人口多為Duffy陰性(Duffy-negative)」,缺乏受體,間日瘧在『西非反而罕見』(而非最常見)』——間日瘧好發於亞洲、中南美;④紅血球破裂釋出裂殖子、瘧疾色素與殘骸引發畏寒發燒。故C「間日瘧在西非最常見」錯誤。","options":{"A":"間日瘧侵犯年輕紅血球(網狀紅血球),正確。","B":"Duffy抗原為其附著部位,正確。","C":"西非多Duffy陰性、間日瘧罕見而非最常見—錯誤(正解)。","D":"紅血球破裂釋出致畏寒發燒,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114020-33":{"quick":"枯西氏錐蟲可經性行為與輸血傳播(及先天、移植),最為適當。","detail":{"background":"枯西氏錐蟲(T. cruzi,Chagas病):①病媒「錐蝽(triatoma bug)」叮咬後在叮咬處『排糞』,糞便中的「『錐鞭毛體(trypomastigote)』」經抓破的傷口/黏膜進入人體(非amastigote進入);②急性期可見「Romaña氏徵(單側眼瞼水腫)」(非Winterbottom徵——後者為非洲錐蟲);③慢性期「巨食道、巨結腸」係『腸道神經節(肌叢)被破壞(自體免疫/直接損傷)』所致(非補體攻擊);④「『性行為、輸血、器官移植、先天(經胎盤)』皆可傳播」。故D最適當。","options":{"A":"進入人體的是錐鞭毛體(經糞-傷口)、非amastigote—錯誤。","B":"眼瞼浮腫為Romaña徵、非Winterbottom徵—錯誤。","C":"巨食道/巨結腸為神經節破壞、非補體攻擊—錯誤。","D":"性行為與輸血均可傳播Chagas病—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114090-34":{"quick":"唇形鞭毛蟲(Chilomastix mesnili)是腸道非致病鞭毛蟲,不是血鞭毛蟲。","detail":{"background":"「血鞭毛蟲(hemoflagellate)」指寄生於血液/組織、具鞭毛的原蟲——即「錐蟲屬(Trypanosoma,如布氏羅德西亞錐蟲、枯西氏錐蟲)」與「利什曼原蟲屬(Leishmania,如熱帶利什曼)」。而「唇形鞭毛蟲(Chilomastix mesnili)」是『腸道腔內的非致病性鞭毛蟲』(寄生大腸),「並非血鞭毛蟲」。故不是血鞭毛蟲者為唇形鞭毛蟲。","options":{"A":"布氏羅德西亞錐蟲為血鞭毛蟲。","B":"枯西氏錐蟲為血鞭毛蟲。","C":"唇形鞭毛蟲為腸道非致病鞭毛蟲、非血鞭毛蟲—正解。","D":"熱帶利什曼為血鞭毛蟲。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_115020-33":{"quick":"人巴貝氏原蟲症最佳治療為clindamycin + quinine(③④)；或atovaquone+azithromycin。","detail":{"background":"人巴貝氏原蟲症(human babesiosis)的治療:①輕中度常用「『atovaquone + azithromycin』」;②重症或免疫低下/脾切者用「『clindamycin + quinine(奎寧)』」(本題以③④為解);③嚴重高寄生蟲血症可加換血。青黴素、四環素並非巴貝氏症的標準治療(青黴素無效)。故最佳用藥為clindamycin(③)+quinine(④)。","options":{"A":"青黴素對巴貝氏原蟲無效。","B":"四環素非標準治療。","C":"含奎寧但搭配錯誤。","D":"clindamycin + quinine為巴貝氏症治療—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_115020-34":{"quick":"非洲蠅叮咬後下疳、後頸淋巴結腫大、CSF查見蟲體,為布氏岡比亞錐蟲(睡眠病)。","detail":{"background":"本題「非洲、采采蠅叮咬、叮咬處『下疳(trypanosomal chancre)』、發燒、『後頸淋巴結腫大(Winterbottom氏徵)』,晚期『腦脊髓液中查見蟲體(中樞神經期)』」——典型為「布氏岡比亞錐蟲(T. b. gambiense)」所致『西非慢性非洲睡眠病』(進展為腦膜腦炎、嗜睡、晝夜節律紊亂)。杜氏利什曼(黑熱病)、枯西氏錐蟲(Chagas/美洲)、惡性瘧(無下疳/Winterbottom徵)表現不同。故為布氏岡比亞錐蟲。","options":{"A":"杜氏利什曼致黑熱病、無下疳/Winterbottom徵。","B":"枯西氏錐蟲為美洲Chagas病、非采采蠅。","C":"布氏岡比亞錐蟲致非洲睡眠病(下疳+Winterbottom徵+CSF蟲體)—正解。","D":"惡性瘧無此表現。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_115020-35":{"quick":"黑水熱為瘧疾血管內大量溶血併血紅素尿所致,最為適當。","detail":{"background":"黑水熱(blackwater fever)是『瘧疾(尤其惡性瘧P. falciparum)』的嚴重併發症:特徵為「血管內『大量溶血(intravascular hemolysis)』,釋出大量血紅素由腎排出造成『血紅素尿(hemoglobinuria),尿呈深褐黑色(故名黑水)』」,可併發急性腎衰竭。其發生與『嚴重瘧疾、奎寧使用及G6PD缺乏(藥物誘發溶血)、抗體攻擊感染紅血球』有關,並非卵形瘧、非肝細胞被寄生致血小板低下、非IFN-γ受體缺陷。故最適當為「血管內大量溶血併血紅素尿」。","options":{"A":"黑水熱主要與惡性瘧相關、非卵形瘧—錯誤。","B":"非因肝細胞被寄生致血小板低下—錯誤。","C":"血管內大量溶血併血紅素尿—正解。","D":"與IFN-γ受體損傷無關—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_106100-32":{"quick":"池塘游泳後急性腦膜腦炎、嗅覺失常、數日內死亡,為福氏內格里阿米巴(PAM)。","detail":{"background":"「福氏內格里阿米巴(Naegleria fowleri)」存在溫暖淡水(池塘、溫泉、未消毒泳池),游泳時經「鼻腔篩板(嗅神經)」侵入腦部,造成「『原發性阿米巴腦膜腦炎(primary amebic meningoencephalitis, PAM)』」:急性發作的發燒、頭痛、『嗅覺異常/失常(嗅神經侵入)』、頸部僵硬與腦膜刺激徵(Kernig徵)、嗜中性球為主的腦脊髓液,病程兇猛「常於數天(3-7天)內死亡」。組織中只見『滋養體(無囊體)』。本題池塘游泳+急性腦膜腦炎+嗅覺失常+5天死亡即PAM。","options":{"A":"福氏內格里阿米巴致原發性阿米巴腦膜腦炎(PAM)—正解。","B":"痢疾阿米巴致腸炎/肝膿瘍、非急性腦膜腦炎。","C":"棘阿米巴致肉芽腫性腦炎(GAE,慢性)/角膜炎、非PAM。","D":"大腸阿米巴為非致病性腸道阿米巴。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109020-33":{"quick":"戴隱形眼鏡者角膜炎、刮取物見雙層壁囊體,為棘阿米巴角膜炎。","detail":{"background":"「棘阿米巴(Acanthamoeba spp.)」存在土壤與水中,「配戴隱形眼鏡(尤其清潔不當、用自來水沖洗鏡片)」者易發生「『棘阿米巴角膜炎(Acanthamoeba keratitis)』」:嚴重眼痛(與病灶不成比例)、紅腫、環狀角膜浸潤;角膜刮取物鏡檢可見特徵性「『雙層壁(角狀外壁)囊體』」與滋養體。在免疫低下者棘阿米巴亦可致肉芽腫性阿米巴腦炎(GAE)。本題隱形眼鏡+角膜炎+雙層壁囊體即棘阿米巴。","options":{"A":"大腸阿米巴為腸道非致病阿米巴。","B":"痢疾阿米巴致腸炎/肝膿瘍。","C":"福氏內格里阿米巴致急性腦膜腦炎、非角膜炎。","D":"棘阿米巴致角膜炎(雙層壁囊體)—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112100-33":{"quick":"原發性阿米巴腦膜腦炎(Naegleria)若未及時診治,常於症狀出現後3-6天內死亡,最正確。","detail":{"background":"自由生活阿米巴致病要點:①「並非所有」自由生活阿米巴腦感染都與游泳有關——『棘阿米巴(Acanthamoeba)、巴氏阿米巴(Balamuthia)』致的『肉芽腫性阿米巴腦炎(GAE)』多經皮膚/呼吸道入血再到腦(慢性),非游泳;②「福氏內格里阿米巴(Naegleria)」在『組織中只見滋養體、不形成囊體』(故B「同時見滋養體與囊體」錯);③「原發性阿米巴腦膜腦炎(PAM,Naegleria)」病程極快,『未及時診治常於症狀出現後3-6天內死亡』(C正確);④棘阿米巴角膜炎『不一定都需角膜移植』(早期藥物治療可)。故C最正確。","options":{"A":"非所有自由生活阿米巴腦感染都與游泳有關(GAE非游泳)—錯誤。","B":"Naegleria組織中只有滋養體、無囊體—錯誤。","C":"PAM未及時診治常3-6天內死亡—正解。","D":"棘阿米巴角膜炎不一定都需角膜移植—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_106100-30":{"quick":"蟯蟲可異位移行入女性生殖系統與腹腔,致慢性骨盆腔腹膜炎。","detail":{"background":"蟯蟲(Enterobius vermicularis,蟯蟲/針線蟲)寄生大腸,雌蟲夜間移行至「肛門周圍」產卵(致夜間肛門搔癢、以肛圍擦拭法diagnose)。在女性,雌蟲可「『異位移行(ectopic migration)』經陰道、子宮、輸卵管進入『腹腔(腹膜腔)』」,引起肉芽腫性「慢性骨盆腔腹膜炎」或附件肉芽腫。鞭蟲(大腸)、旋毛蟲(肌肉)、蛔蟲(小腸/膽道)不以此方式致骨盆腔腹膜炎。故為蟯蟲。","options":{"A":"蟯蟲異位移行入生殖系統與腹腔致慢性骨盆腔腹膜炎—正解。","B":"鞭蟲寄生大腸、不致骨盆腔腹膜炎。","C":"旋毛蟲寄生橫紋肌。","D":"蛔蟲寄生小腸/可阻膽道,非此。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108100-29":{"quick":"十二指腸鉤蟲可經皮膚與『經口』感染、最早症狀為皮膚搔癢,故①③錯誤。","detail":{"background":"鉤蟲(hookworm)感染:①「美洲鉤蟲(Necator americanus)僅經『皮膚』感染」,但「『十二指腸鉤蟲(Ancylostoma duodenale)』可『經皮膚『及』經口』感染」——故①「僅經皮膚」錯誤;②「重度感染且鐵攝取不足→慢性失血致『缺鐵性貧血』」正確;③「感染後『最早』的症狀是『絲狀幼蟲鑽入皮膚處的搔癢/皮膚炎(ground itch)』」而非嗜伊紅性白血球增多(嗜伊紅增多在幼蟲移行肺部時較明顯)——故③錯誤。故錯誤者為①③(僅13)。","options":{"A":"①錯②非錯,組合不符。","B":"①③皆錯(經皮膚及經口、最早為皮膚搔癢)—正解(僅13)。","C":"②正確,組合不符。","D":"②正確,非全錯。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108100-30":{"quick":"犬鉤蟲(Ancylostoma caninum)幼蟲鑽入人皮膚移行,致皮膚幼蟲移行症。","detail":{"background":"「皮膚幼蟲移行症(cutaneous larva migrans, CLM,匐行疹creeping eruption)」由「動物(犬、貓)鉤蟲——尤其『犬鉤蟲(Ancylostoma caninum)、巴西鉤蟲(A. braziliense)』」的絲狀幼蟲鑽入人皮膚後,因人非適合宿主、幼蟲『無法穿入真皮下完成移行』,只能在表皮下「蜿蜒爬行」形成『紅色、搔癢、延伸的線狀皮疹』。犬心絲蟲(皮下結節/肺)、犬蛔蟲Toxocara(內臟/眼幼蟲移行症)、肝毛線蟲(肝)致病不同。故CLM為犬鉤蟲。","options":{"A":"犬心絲蟲致皮下結節/肺病灶。","B":"犬鉤蟲幼蟲致皮膚幼蟲移行症—正解。","C":"犬蛔蟲(Toxocara)致內臟/眼幼蟲移行症。","D":"肝毛線蟲致肝病灶。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109020-29":{"quick":"瀰漫性糞小桿線蟲症好發於免疫缺陷者、嗜酸性球增加不明顯(②③),且會播散全身。","detail":{"background":"糞小桿線蟲(Strongyloides stercoralis)可在宿主體內「『自體感染(autoinfection)』」而長期存在。在「『免疫缺陷(尤其使用類固醇、HTLV-1感染)』」者,可發生「『瀰漫性/過度感染症候群(disseminated/hyperinfection)』」:幼蟲『大量播散至全身多器官(腸、肺、中樞神經、皮膚等,非僅腸與肺)』,並常帶入腸道細菌致革蘭氏陰性敗血症/腦膜炎,死亡率高;此時「『嗜酸性球增加常不明顯(被類固醇抑制)』」反而是預後差的指標。故②③正確(①「僅侵腸道及肺臟」錯誤)。","options":{"A":"①「僅侵腸道肺臟」錯誤(會全身播散)。","B":"①錯誤,組合不符。","C":"②好發免疫缺陷者③嗜酸性球增加不明顯—正解(僅23)。","D":"①錯誤,非全部正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109100-29":{"quick":"菲律賓毛線蟲經『食入含幼蟲的生魚』感染,「因食入蟲卵污染的魚肉」敘述無關(錯誤)。","detail":{"background":"菲律賓毛線蟲(Capillaria philippinensis)經「食入『含感染性幼蟲』的『未煮熟淡水/半鹹水小魚』」感染(非因食入蟲卵污染的魚肉);在人腸道可「『自體感染(autoinfection)』」大量增殖,造成嚴重慢性腹瀉、「吸收不良與『低蛋白血症』、電解質流失」,重症可致死,故須補充電解質與蛋白。故與其感染「無關」的敘述是A(因食入蟲卵污染的魚肉)。","options":{"A":"經食入含幼蟲的生魚、非蟲卵污染魚肉—與其感染無關(正解)。","B":"腸道可自體感染,正確(相關)。","C":"可致低蛋白血症,正確(相關)。","D":"腹瀉須補電解質,正確(相關)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111020-30":{"quick":"鞭蟲蟲卵需在土壤發育為感染卵,不引起自體感染,故C錯誤。","detail":{"background":"鞭蟲(Trichuris trichiura)生活史:①蟲卵隨糞便排出後「在『土壤』中發育為含感染性幼蟲的卵」,人『食入此感染卵』後「『幼蟲直接在腸道孵出並發育為成蟲(不經肺移行)』」;②「成蟲主要寄生於『大腸(盲腸、升結腸)』」,前端鑽入黏膜;③「『不引起自體感染』(蟲卵須在外界土壤成熟,C錯誤)」;④「幼童重度感染可致慢性腹瀉、貧血與『脫肛(直腸脫垂)』」。故C「會引起自體感染」錯誤(具自體感染者是糞小桿線蟲與蟯蟲、菲律賓毛線蟲)。","options":{"A":"幼蟲直接在腸道發育為成蟲,正確。","B":"成蟲主要寄生大腸,正確。","C":"鞭蟲不引起自體感染—錯誤(正解)。","D":"幼童重度感染可致脫肛,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111100-29":{"quick":"蛔蟲重度感染幼童時最易發生異位移行(移行至膽道、胰管、肝等)。","detail":{"background":"蛔蟲(Ascaris lumbricoides)是體型最大的腸道線蟲,寄生小腸。「重度感染或受刺激(發燒、麻醉、藥物)時,成蟲易『異位移行(ectopic migration)』」鑽入「膽道(致膽道阻塞、膽管炎)、胰管(致胰臟炎)、肝、闌尾」,甚至經口鼻吐出/嗆入呼吸道,幼童重度感染尤甚(蟲團亦可致腸阻塞)。蟯蟲、鞭蟲、菲律賓毛線蟲較不以此種大型蟲體異位移行致膽胰阻塞為特徵。故為蛔蟲。","options":{"A":"菲律賓毛線蟲以自體感染/吸收不良為主。","B":"蟯蟲異位移行至生殖道、非膽胰。","C":"蛔蟲重度感染易異位移行至膽道/胰管—正解。","D":"鞭蟲寄生大腸、不以異位移行為特徵。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112100-30":{"quick":"種菜接觸污泥後手臂延伸性紅斑為鉤蟲爬行疹;「東方毛線蟲感染」最不適當。","detail":{"background":"本題「農地種菜、手腳常接觸污泥、手臂發癢並出現『延伸的線狀紅斑』」——典型為「『鉤蟲(尤動物鉤蟲)幼蟲鑽入皮膚的爬行疹(creeping eruption / 皮膚幼蟲移行症)』」,因絲狀幼蟲在表皮下蜿蜒移行。其搔癢可為「過敏反應(A合理)」,抓破可「續發細菌感染(B合理)」。而「東方毛線蟲(Trichostrongylus orientalis)」主要經『食入受污染蔬菜的幼蟲』致『腸道感染(嗜酸性球增多、腹部不適)』,「不造成皮膚爬行疹」,故C最不適當。","options":{"A":"皮膚搔癢可為寄生蟲過敏反應,合理。","B":"抓破可續發細菌感染,合理。","C":"東方毛線蟲致腸道感染、不致皮膚爬行疹—最不適當(正解)。","D":"可能為鉤蟲爬行疹,合理。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_113090-30":{"quick":"睡眠病(sleeping sickness)是非洲錐蟲所致;蟯蟲致夜間肛門搔癢,故A錯誤。","detail":{"background":"蟯蟲(Enterobius vermicularis):①雌蟲夜間移行至肛周產卵,致「『夜間肛門搔癢』、睡眠不安」——『並非「睡眠病(sleeping sickness)」(後者是非洲錐蟲致的腦膜腦炎)』,故A錯誤;②蟲卵輕、可隨「『空氣/塵埃飄散』而被吸入或食入傳染」(亦藉手-口、衣物寢具),易家庭/團體內傳播;③女性可異位移行致「慢性骨盆腔腹膜炎」;④診斷最佳方式為「『肛圍擦拭法(perianal cellophane swab/Scotch tape)』於清晨採卵」(糞檢陽性率低)。故A錯誤。","options":{"A":"致夜間肛門搔癢、非睡眠病(後者為非洲錐蟲)—錯誤(正解)。","B":"蟲卵可藉空氣/塵埃傳播,正確。","C":"可致慢性骨盆腔腹膜炎(異位),正確。","D":"最佳診斷為肛圍擦拭法,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114020-30":{"quick":"鞭蟲前端細長後端粗大、蟲卵桶狀兩端有透明卵塞、慢性可致貧血脫肛(①②③正確)。","detail":{"background":"鞭蟲(Trichuris trichiura)特徵:①「成蟲呈鞭狀——『前端細長(鑽入大腸黏膜)、後端粗大』」(雌雄皆然);②「蟲卵呈『桶狀(barrel-shaped)、兩端各有一個透明卵塞(polar plug/egg plug)』」為診斷依據;③「重度慢性感染可致『缺鐵性貧血、生長遲緩與『直腸脫垂(脫肛)』』(尤幼童)」;④鞭蟲卵與『肝毛線蟲(Capillaria hepatica)卵雖皆有卵塞但形態仍可區別』,但本題以①②③為正解組合。故為①②③(123)。","options":{"A":"遺漏②③,不完整。","B":"含④(鑑別敘述非本題正解),不符。","C":"①前端細長後端粗大②兩端卵塞③慢性致貧血脫肛—正解(123)。","D":"含④、遺漏①,不符。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114090-29":{"quick":"具完整消化系統(口咽食道腸肛門)者為線蟲——蛔蟲、美洲鉤蟲、糞小桿線蟲(②③④)。","detail":{"background":"消化系統有無可區分蠕蟲類別:①「線蟲(圓蟲)」——具「『完整的消化道:口→咽管/食道→腸道→肛門』」,如『②蛔蟲、③美洲鉤蟲、④糞小桿線蟲』;②「絛蟲(扁蟲)」——『無消化道(無口無腸)』,藉體表(皮層)直接吸收宿主腸道養分,如『①縮小包膜絛蟲(Hymenolepis diminuta)、⑤亞洲絛蟲(Taenia asiatica)』。故具完整消化系統者為②③④(線蟲)。","options":{"A":"①Hymenolepis為絛蟲、無消化道,不符。","B":"②蛔蟲③美洲鉤蟲④糞小桿線蟲(線蟲)具完整消化道—正解。","C":"⑤Taenia為絛蟲、無消化道,不符。","D":"①⑤皆絛蟲、無消化道,不符。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_106100-29":{"quick":"diethylcarbamazine(DEC)的激發試驗可使夜間週期性的微絲蟲於白天出現於末梢血,助白天採血。","detail":{"background":"班氏絲蟲(Wuchereria bancrofti)的微絲蟲具「夜間週期性(nocturnal periodicity)」——白天滯留肺微血管、夜間(約22時至凌晨)才大量出現於末梢血,故傳統採血須在夜間。「diethylcarbamazine(DEC)」是抗絲蟲首選藥,其「激發(provocation)試驗」可使微絲蟲於白天暫時釋出至末梢血,便於白天採血檢出(亦為治療藥)。albendazole(廣效驅蟲)、praziquantel(吸蟲/絛蟲)、metronidazole(原蟲/厭氧菌)非此用途。故為DEC。","options":{"A":"albendazole為廣效驅線蟲藥、非激發採血。","B":"DEC激發試驗使微絲蟲白天出現於末梢血—正解。","C":"praziquantel用於吸蟲/絛蟲。","D":"metronidazole用於原蟲/厭氧菌。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_107100-29":{"quick":"食用生/醃蝸牛後嗜酸性腦膜腦炎,最可能為廣東住血線蟲感染。","detail":{"background":"「廣東住血線蟲(Angiostrongylus cantonensis)」是人類「嗜酸性腦膜炎(eosinophilic meningitis)」的最常見病原。人因「食入未煮熟的中間宿主『螺/蝸牛/蛞蝓』(或受其黏液污染的生菜)」中的第三期幼蟲而感染;幼蟲移行至中樞神經造成「腦膜腦炎、劇烈頭痛、腦脊髓液白血球升高且『嗜酸性球明顯增多』」。本題食生/醃蝸牛+CSF高白血球+嗜酸性球增多即廣東住血線蟲。旋毛蟲(肌肉)、廣節裂頭絛蟲(B12缺乏)、棘頜口線蟲(移行性腫脹)表現不同。","options":{"A":"旋毛蟲致肌肉囊包/肌炎,非嗜酸性腦膜炎。","B":"廣節裂頭絛蟲致B12缺乏性貧血。","C":"棘頜口線蟲致游走性皮下腫脹(亦可入腦,但本題以蝸牛史指向廣東住血線蟲)。","D":"廣東住血線蟲致嗜酸性腦膜炎(生食蝸牛)—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_107100-30":{"quick":"皮下切片(skin snips)查微絲蟲是診斷蟠尾絲蟲(Onchocerca volvulus)的重要依據。","detail":{"background":"「蟠尾絲蟲(Onchocerca volvulus)」由「蚋(Simulium,black fly)」叮咬傳染,致「河川盲(river blindness)」與皮膚病變。其成蟲位於皮下結節,微絲蟲「分布於『皮膚與眼』(不在血液)」,故診斷靠「『皮下切片(skin snips)』鏡檢微絲蟲」(非採血)。對照:羅阿絲蟲(Loa loa,微絲蟲在血、白天週期、眼結膜遊走成蟲)、麥地那線蟲(皮膚潰瘍拉出長蟲)、馬來亞絲蟲(微絲蟲在血、夜間週期、採血診斷)。故skin snips對應蟠尾絲蟲。","options":{"A":"羅阿絲蟲微絲蟲在血液(採血診斷)。","B":"蟠尾絲蟲微絲蟲在皮膚、以皮下切片診斷—正解。","C":"麥地那線蟲由皮膚潰瘍拉出成蟲診斷。","D":"馬來亞絲蟲微絲蟲在血液(採血診斷)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108030-29":{"quick":"人為Anisakis的非適宜宿主,蟲不發育成蟲產卵,「靠糞便蟲卵確認」錯誤。","detail":{"background":"海獸胃線蟲(Anisakis spp.)的終宿主為海洋哺乳類,須經「兩個中間宿主(甲殼類→海魚/烏賊)」發育出第三期幼蟲。人「生食含幼蟲的海水魚生魚片(鯖、鮭、鯡等)」感染,但「人是『非適宜(終端)宿主』,幼蟲『不發育為成蟲、不產卵』」,只鑽入胃腸壁引起「急性腹痛、噁心嘔吐(常被誤為急性腹症)」或過敏。因此「『糞便檢查蟲卵』無法確認」(無蟲卵),診斷靠「『內視鏡直接見到幼蟲』或手術/組織切片」。故B錯誤。","options":{"A":"須經兩個中間宿主發育,正確。","B":"人為非適宜宿主、不產卵,無法靠糞便蟲卵確認—錯誤(正解)。","C":"通常吃海水魚生魚片而感染,正確。","D":"感染後常引起急性腹痛,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108030-30":{"quick":"病媒蚊注入的是第三期幼蟲(L3),非微絲蟲,故A錯誤。","detail":{"background":"班氏絲蟲(Wuchereria bancrofti)生活史:①「病媒蚊(如熱帶家蚊Culex)吸血時『注入第三期感染性幼蟲(L3)』」(而非微絲蟲;微絲蟲是蚊吸血時『被吸入』蚊體內發育成L3);②幼蟲進入人體後移行至「淋巴管/淋巴結發育為成蟲」,成蟲交配產出「微絲蟲」;③微絲蟲具「『夜間週期性』,夜間才大量出現於末梢血」;④淋巴阻塞可致象皮病(elephantiasis)與「乳糜尿(chyluria,其中可見微絲蟲)」。故A「蚊直接注入微絲蟲」錯誤(應為L3幼蟲)。","options":{"A":"蚊注入第三期幼蟲(L3)、非微絲蟲—錯誤(正解)。","B":"成蟲在淋巴管發育,正確。","C":"微絲蟲具夜間週期性,正確。","D":"乳糜尿中可見微絲蟲,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109020-30":{"quick":"廣東住血線蟲正確敘述為①食未熟蝸牛感染與④嗜酸性球明顯增加(共2項)。","detail":{"background":"廣東住血線蟲(Angiostrongylus cantonensis):①「人因『食入未熟帶蟲的螺/蝸牛/蛞蝓』(或受污染生菜)而感染」(正確);②「人是『意外/非正常(dead-end)宿主』,『終宿主是鼠』」(故「人為終宿主」錯誤);③感染後幼蟲移行至中樞神經致嗜酸性腦膜炎,「『不只』侵犯腦脊髓——亦可侵犯『眼』等」(故「只侵犯腦脊髓」錯誤);④「引起『嗜酸性球明顯增加』(血與腦脊髓液)」(正確)。故正確者為①④共「2項」。","options":{"A":"正確項數非1項。","B":"正確者為①④共2項—正解。","C":"②③錯誤、非3項正確。","D":"②③錯誤、非全對。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_110020-29":{"quick":"生魚片後腹絞痛腹鳴與低蛋白、低鉀、低鈣等嚴重電解質失衡,最符合菲律賓毛線蟲。","detail":{"background":"菲律賓毛線蟲(Capillaria philippinensis)因「食入含感染性幼蟲的未熟『淡水/半鹹水小魚』」感染,在腸道可「『自體感染(autoinfection)』大量增殖」,造成嚴重慢性腹瀉、「腹絞痛、腹鳴(borborygmus)、厭食、嘔吐」與「『吸收不良→低蛋白血症、低血鉀、低血鈣等嚴重電解質與蛋白流失』」,重症可致死(須補充電解質與蛋白)。海獸胃線蟲(急性腹痛)、旋毛蟲(肌肉)、棘頜口線蟲(游走腫脹)表現不同。故為菲律賓毛線蟲。","options":{"A":"菲律賓毛線蟲致嚴重吸收不良/電解質蛋白流失—正解。","B":"海獸胃線蟲致急性腹痛、非慢性吸收不良。","C":"旋毛蟲致肌肉囊包/肌炎。","D":"棘頜口線蟲致游走性腫脹。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_110020-30":{"quick":"生菜沙拉可沾染中間宿主黏液或小螺而感染廣東住血線蟲,「不會感染」錯誤。","detail":{"background":"廣東住血線蟲(Angiostrongylus cantonensis):①感染人體致「嗜伊紅性(嗜酸性)腦膜炎」;②確診靠「『腦脊髓液中發現蟲體(幼蟲)』」(或血清/PCR);③感染源除生食螺/蝸牛/蛞蝓外,「『受其黏液污染的生菜沙拉』也可能含第三期幼蟲而感染」——故C「吃生菜沙拉不會感染」錯誤;④患者「腦脊髓液中嗜酸性球異常增加」。故C錯誤。","options":{"A":"感染致嗜伊紅性腦膜炎,正確。","B":"CSF發現蟲體可確診,正確。","C":"生菜沙拉可沾染中間宿主而感染、非不會感染—錯誤(正解)。","D":"CSF嗜酸性球異常增加,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111020-29":{"quick":"生食中國淡水魚後出現游走性眼眶腫脹並摘出小蟲體,最符合有棘頜口線蟲。","detail":{"background":"有棘頜口線蟲(Gnathostoma spinigerum)因「食入含第三期幼蟲的未熟『淡水魚、蛙、蛇、雞』」感染。幼蟲在人體無法發育成熟,「『游走移行』於皮下與內臟」,造成「『游走性、間歇性的皮下/眼眶腫脹(腫塊移位)』」,可侵入眼、中樞神經(嗜酸性腦膜炎、出血);有時可從腫脹處『摘出蟲體』。本題生食中國淡水魚+眼眶游走性浮腫+摘出4mm蟲即棘頜口線蟲。蟠尾絲蟲(皮下結節/眼盲)、東方眼蟲(結膜)、麥地那線蟲(皮膚潰瘍長蟲)表現不同。","options":{"A":"蟠尾絲蟲致皮下結節與河川盲。","B":"有棘頜口線蟲致游走性腫脹(生食淡水魚)—正解。","C":"東方眼蟲寄生結膜囊。","D":"麥地那線蟲自皮膚潰瘍拉出長蟲。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111100-30":{"quick":"非洲飲生水後腳踝潰瘍拉出100公分長蟲,為麥地那線蟲(幾內亞蟲)。","detail":{"background":"麥地那線蟲(Dracunculus medinensis,幾內亞蟲guinea worm)因「飲用含受感染『劍水蚤(Cyclops)』的『生水』」感染。幼蟲在腹腔/結締組織發育,雌成蟲(可長達『約1公尺(100公分)』)約一年後移行至「下肢(腳踝/足部)皮膚形成水皰、潰瘍」,接觸水時自潰瘍處釋出幼蟲;傳統治療以「將蟲體纏繞小棒『緩慢逐日拉出』」。本題非洲+飲生水+腳踝潰瘍拉出100cm長蟲即麥地那線蟲。","options":{"A":"鉤蟲為小型腸道線蟲、非長蟲。","B":"羅阿絲蟲為血絲蟲(眼結膜遊走),非皮膚拉出長蟲。","C":"蟠尾絲蟲致皮下結節/河川盲。","D":"麥地那線蟲致下肢潰瘍拉出長蟲—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111100-34":{"quick":"蟠尾絲蟲(河川盲)的主要病媒為蚋(Simulium spp.,black fly)。","detail":{"background":"「蟠尾絲蟲(Onchocerca volvulus)」造成「蟠尾絲蟲病(onchocerciasis)/河川盲(river blindness)」,其主要病媒為「『蚋(Simulium spp.,黑蠅black fly)』」(孳生於湍急河流,故疾病分布近河流)。對照其他絲蟲病媒:班氏/馬來絲蟲——蚊(Culex/Anopheles/Aedes);羅阿絲蟲——「虻(Chrysops,鹿蠅/芒果蠅)」;蠓(Culicoides)傳常現絲蟲。故蟠尾絲蟲病媒為蚋。","options":{"A":"蚋(Simulium)為蟠尾絲蟲主要病媒—正解。","B":"蠓(Culicoides)傳常現絲蟲。","C":"虻(Chrysops)傳羅阿絲蟲。","D":"蚊傳班氏/馬來絲蟲。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112020-29":{"quick":"棘頜口線蟲在人體可侵內臟與中樞神經,「只侵犯皮下組織」錯誤。","detail":{"background":"有棘頜口線蟲(Gnathostoma spinigerum):①「成蟲寄生於終宿主(貓、犬)的『胃壁』腫瘤狀腫塊內」;②生活史需「兩個中間宿主(劍水蚤→淡水魚/蛙等)」;③人「食入未熟帶第三期幼蟲的淡水魚」感染,因人為非適宜宿主,幼蟲「『游走移行』——不只皮下,還可侵入『內臟、眼、中樞神經(致嗜酸性腦膜炎、腦出血)』」,故C「只侵犯皮下組織」錯誤;④表現為游走性腫脹與嗜酸性球增多。故C錯誤。","options":{"A":"成蟲寄生貓胃壁,正確。","B":"生活史需兩個中間宿主,正確。","C":"可侵內臟/中樞神經、非只皮下—錯誤(正解)。","D":"食未熟帶蟲淡水魚感染,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112020-35":{"quick":"台澎金馬與中國南方流行的班氏絲蟲主要病媒為熱帶家蚊(Culex quinquefasciatus)。","detail":{"background":"班氏絲蟲(Wuchereria bancrofti)在「台澎金馬與中國南方」過去流行,其主要病媒為「『熱帶家蚊(Culex quinquefasciatus / C. fatigans,即致倦庫蚊)』」(孳生於污水)。對照:埃及斑蚊/白線斑蚊主要傳登革、黃熱、茲卡;微小瘧蚊(Anopheles minimus)傳瘧疾。故班氏絲蟲在台澎金馬的病媒為熱帶家蚊。","options":{"A":"埃及斑蚊主要傳登革/黃熱。","B":"白線斑蚊主要傳登革。","C":"熱帶家蚊為班氏絲蟲主要病媒(台澎金馬)—正解。","D":"微小瘧蚊傳瘧疾。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112100-29":{"quick":"海獸胃線蟲以胃腸道病變為主,最不可能引起眼睛病變。","detail":{"background":"可引起「眼睛病變」的寄生蟲:①「犬蛔蟲(Toxocara canis)」——眼幼蟲移行症(ocular larva migrans,致視網膜肉芽腫、似視網膜母細胞瘤);②「廣東住血線蟲」——可侵入眼(眼內感染);③「羅阿絲蟲(Loa loa)」——成蟲可遊走於『眼結膜下』(眼蟲)。而「海獸胃線蟲(Anisakis)」幼蟲鑽入『胃腸壁』致急性腹症,「『最不可能』引起眼睛病變」。故為海獸胃線蟲。","options":{"A":"犬蛔蟲可致眼幼蟲移行症。","B":"廣東住血線蟲可侵入眼。","C":"羅阿絲蟲成蟲可遊走眼結膜下。","D":"海獸胃線蟲以胃腸病變為主、最不可能致眼病變—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_113090-29":{"quick":"移工糞便出現肝毛線蟲卵,實為食入含卵動物肝後卵經消化道排出的「假性感染」。","detail":{"background":"肝毛線蟲(Capillaria hepatica)的成蟲與蟲卵『寄生並滯留在宿主(鼠等)肝臟組織內』,蟲卵『不會由宿主糞便正常排出』(須宿主死亡、肝被掠食或腐敗後蟲卵才釋出到環境)。因此若「人糞便中出現肝毛線蟲卵」,通常是「『食入含蟲卵的動物肝臟』後,蟲卵僅『通過消化道隨糞便排出』,『並未真正在人體建立感染』」——即「『假性感染(spurious infection)』」。故D最適當。","options":{"A":"非真正卵感染(假性感染)—錯誤。","B":"非幼蟲感染—錯誤。","C":"非真正卵感染—錯誤。","D":"為假性感染(食入含卵肝臟後卵經消化道排出)—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114020-29":{"quick":"馬來絲蟲的微絲蟲尾端具有2個尾核(terminal nuclei),為其鑑別特徵。","detail":{"background":"馬來絲蟲(Brugia malayi)致淋巴絲蟲病(淋巴管炎、象皮病,多侵下肢):①「『不』侵犯眼睛致盲」(致盲者是蟠尾絲蟲);②微絲蟲在『血液』中(具夜間週期性),「以『採血查微絲蟲』診斷」而非皮膚切片(皮膚切片查微絲蟲是蟠尾絲蟲);③「鼠蹊懸垂(hanging groin)」是『蟠尾絲蟲』的皮膚表現;④「馬來絲蟲微絲蟲的『尾端有2個分離的尾核(terminal nuclei)』」(班氏絲蟲微絲蟲尾端『無核』),為形態鑑別重點。故D正確。","options":{"A":"侵眼致盲者為蟠尾絲蟲、非馬來絲蟲—錯誤。","B":"以血液查微絲蟲為主、非皮膚切片查成蟲—錯誤。","C":"鼠蹊懸垂為蟠尾絲蟲表現—錯誤。","D":"馬來絲蟲微絲蟲尾端有2個尾核—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114090-30":{"quick":"幼童嗜酸性球異常增高合併肝腫大,最可能為犬蛔蟲(內臟幼蟲移行症)。","detail":{"background":"「犬蛔蟲(Toxocara canis)」的蟲卵經貓狗糞污染環境,幼童因「『異食/接觸污染土壤、玩沙』誤食蟲卵」感染。幼蟲在人體無法發育成熟,「在內臟(肝、肺、眼、腦)『移行』」造成「『內臟幼蟲移行症(visceral larva migrans, VLM)』」:典型為「幼童『嗜酸性球顯著增高』、『肝腫大』、發燒、咳嗽、高球蛋白血症」;移行至眼則致眼幼蟲移行症。本題5歲+嗜酸性球異常增高+肝腫大即犬蛔蟲VLM。旋毛蟲(肌肉)、蟯蟲(肛癢)、廣東住血線蟲(腦膜炎)表現不同。","options":{"A":"旋毛蟲致肌肉囊包/肌炎。","B":"蟯蟲致肛門搔癢。","C":"廣東住血線蟲致嗜酸性腦膜炎。","D":"犬蛔蟲致內臟幼蟲移行症(嗜酸性球高+肝腫大)—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_115020-29":{"quick":"旋毛蟲的第三期幼蟲在橫紋肌形成囊體,此時亦為診斷期(肌肉切片)。","detail":{"background":"旋毛蟲(Trichinella spiralis)因「食入含『被囊幼蟲』的未熟豬肉/野生動物肉」感染:腸道內幼蟲發育成成蟲、雌蟲產出新生幼蟲,經血行散布,「『第三期幼蟲鑽入『橫紋肌(尤膈肌、舌、眼外肌)』內捲曲、形成被囊(囊體encapsulated)』」——此「肌肉內被囊幼蟲」也是「『診斷期(肌肉切片鏡檢被囊幼蟲)』」。臨床:腸炎期後出現發燒、肌痛、眼眶周圍水腫、嗜酸性球增多。故為旋毛蟲。","options":{"A":"犬蛔蟲為內臟幼蟲移行(不形成肌肉被囊)。","B":"廣東住血線蟲移行中樞神經。","C":"菲律賓毛線蟲在腸道。","D":"旋毛蟲第三期幼蟲在橫紋肌形成被囊(診斷期)—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_106100-31":{"quick":"衛氏肺吸蟲經生食含囊蚴的淡水蟹(蝲蛄)感染。","detail":{"background":"衛氏肺吸蟲(Paragonimus westermani)生活史需「螺(第一中間宿主)→『淡水蟹/蝲蛄(第二中間宿主)』」。人因「生食或醃漬未熟的『淡水蟹(如醉蟹)、蝲蛄』中的『囊蚴(metacercaria)』」感染;囊蚴在腸道脫囊、穿腸壁與橫膈移行至『肺』發育為成蟲,致慢性咳嗽、咳血絲痰、胸痛(似肺結核)。故感染途徑為生食含囊蚴的淡水蟹(尾動幼蟲鑽皮膚是血吸蟲的方式)。","options":{"A":"生食淡水魚囊蚴者為肝吸蟲、非肺吸蟲。","B":"生食水生植物囊蚴者為薑片蟲/肝蛭。","C":"生食含囊蚴的淡水蟹致肺吸蟲—正解。","D":"尾動幼蟲鑽皮膚者為血吸蟲。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_107100-31":{"quick":"曼氏血吸蟲卵具側刺(非終端刺)、經尾動幼蟲鑽皮膚感染(無囊蚴),故①③錯誤。","detail":{"background":"曼氏血吸蟲(Schistosoma mansoni):①「蟲卵具『側刺(lateral spine)』」(終端刺terminal spine是『埃及血吸蟲』、小側刺是日本血吸蟲);故「具終端尾刺的蟲卵確診曼氏」錯誤;②成蟲寄生於「腸繫膜下靜脈」,慢性期蟲卵沉積致肝纖維化(門脈高壓、肝脾腫);③「血吸蟲『無囊蚴(metacercaria)階段』,感染是『尾動幼蟲(cercaria)直接鑽入人皮膚』」,故「生食水螺囊幼感染」錯誤。故錯誤者為①③(僅13)。","options":{"A":"①錯②非錯,組合不符。","B":"①(側刺非終端刺)③(cercaria鑽皮膚非囊蚴)皆錯—正解(僅13)。","C":"②正確,組合不符。","D":"②正確,非全錯。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_107100-32":{"quick":"食生豬肉可得旋毛蟲與囊蟲症;肺吸蟲(蟹)與包蟲(犬糞卵)與豬肉無關(本題C、D給分)。","detail":{"background":"與「食用未熟/生豬肉」相關的寄生蟲病:①「旋毛蟲症(trichinellosis)」——食含被囊幼蟲的豬肉;②「囊蟲症(cysticercosis)」——食入『豬肉絛蟲(Taenia solium)的蟲卵』(經人糞污染或自體感染)後致組織囊蟲(注意:吃帶囊蟲的豬肉得到的是腸道成蟲,而吃到蟲卵才致囊蟲症)。而「『肺吸蟲症(paragonimiasis)』——生食『淡水蟹』」、「『包蟲症(hydatid disease)』——誤食『犬糞中包生絛蟲卵』」,「皆與豬肉無關」。本題以多重答案處理:肺吸蟲(C)與包蟲(D)皆「最不可能由食生豬肉罹患」(均判給分)。","options":{"A":"旋毛蟲症可由食生豬肉罹患。","B":"囊蟲症與豬肉絛蟲卵相關。","C":"肺吸蟲症由生食淡水蟹、與豬肉無關(本題給分)。","D":"包蟲症由誤食犬糞包生絛蟲卵、與豬肉無關—正解(均給分)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108030-31":{"quick":"食醉蟹多年後咳血絲痰、痰中見深褐蟲卵與Charcot-Leyden結晶,為衛氏肺吸蟲。","detail":{"background":"本題「長期食『醉蟹(浸酒毛蟹)』、發燒咳嗽胸痛、『大量帶血絲濃痰(咳血)』、痰中『深褐色蟲卵』與『Charcot-Leyden結晶(嗜酸性球崩解物)』、胸部X光斑狀浸潤與結節囊狀陰影、胸膜積水與嗜酸性球增多」——典型為「衛氏肺吸蟲(Paragonimus westermani)」(生食淡水蟹的囊蚴,成蟲寄生肺,似肺結核)。異形吸蟲(腸)、日本血吸蟲(肝脾/腸)、薑片蟲(腸)表現不同。故為衛氏肺吸蟲。","options":{"A":"異形吸蟲為小型腸道吸蟲。","B":"日本血吸蟲致肝脾/腸病變。","C":"薑片蟲為腸道吸蟲。","D":"衛氏肺吸蟲(醉蟹、咳血痰、痰中蟲卵)—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109020-31":{"quick":"血吸蟲無囊蚴(metacercaria)階段,「囊幼」與日本血吸蟲無關。","detail":{"background":"日本血吸蟲(Schistosoma japonicum)生活史與致病:①以「『尾動幼蟲(cercariae)』直接鑽入人皮膚」感染(『無囊蚴metacercaria階段』——故囊幼與血吸蟲無關);②成蟲寄生腸繫膜靜脈,蟲卵沉積於肝、腸引發「『肉芽腫(granulomas)』與纖維化」(致病主因);③急性感染期可出現「『片山熱(Katayama fever)』」(發燒、蕁麻疹、嗜酸性球增多、肝脾腫)。故與日本血吸蟲『無關』者為「囊幼(metacercariae)」。","options":{"A":"尾動幼蟲(cercariae)為血吸蟲感染型,相關。","B":"血吸蟲無囊蚴階段、囊幼與其無關—正解。","C":"蟲卵肉芽腫為致病機轉,相關。","D":"片山熱為急性血吸蟲病,相關。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109100-30":{"quick":"片山熱(Katayama fever)是日本血吸蟲急性感染期所致。","detail":{"background":"「片山熱(Katayama fever)」是「『血吸蟲(尤其日本血吸蟲Schistosoma japonicum,亦曼氏)』的『急性感染期』全身過敏性反應」:感染後數週,隨蟲體成熟與大量產卵,出現「發燒、畏寒、蕁麻疹、肌痛、咳嗽、肝脾腫大與『嗜酸性球顯著增多』」,屬蟲卵抗原引發的免疫反應。中華肝吸蟲(膽管)、棘口吸蟲(腸)、槍狀肝吸蟲(膽管)不致片山熱。故為日本血吸蟲。","options":{"A":"中華肝吸蟲寄生膽管、不致片山熱。","B":"日本血吸蟲致片山熱(急性血吸蟲病)—正解。","C":"伊羅棘口吸蟲為腸道吸蟲。","D":"槍狀肝吸蟲寄生膽管。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_110020-32":{"quick":"薑片蟲為大型腸道吸蟲,最不可能在腦部造成異位病變。","detail":{"background":"可在腦部造成「異位病變(ectopic lesion)」的吸蟲:①「日本血吸蟲」——蟲卵可栓塞至腦造成腦型血吸蟲病(癲癇);②「衛氏肺吸蟲」——可異位移行至腦造成『腦型肺吸蟲病(癲癇、佔位病變)』;③「異形吸蟲」——小蟲卵可經血流栓塞至腦/心。而「薑片蟲(Fasciolopsis buski)」是寄生小腸的大型吸蟲(致腹瀉、腸阻塞、營養不良),「『最不可能』在腦部造成異位病變」。故為薑片蟲。","options":{"A":"日本血吸蟲卵可栓塞至腦。","B":"衛氏肺吸蟲可異位至腦。","C":"薑片蟲為腸道吸蟲、最不可能致腦異位—正解。","D":"異形吸蟲小卵可栓塞至腦/心。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111100-32":{"quick":"吸蟲(除血吸蟲外)生活史皆須經螺類為第一中間宿主,為共同特徵。","detail":{"background":"吸蟲(trematode/fluke)的共同特徵之一是「『第一中間宿主皆為螺(螺貝類)』」——蟲卵在水中孵出毛蚴侵入螺,於螺體內經胞蚴/雷蚴增殖再釋出尾動幼蟲。其餘:①「並非都需『兩個』中間宿主」(血吸蟲只有螺一個中間宿主,之後cercaria直接鑽皮膚);②「抱雌溝(gynecophoral canal)是『血吸蟲』雄蟲『特有』」(多數吸蟲雌雄同體);③「蟲卵『不皆有卵蓋(operculum)』」(血吸蟲卵『無卵蓋』、有刺)。故吸蟲共同特徵為「均須經螺類傳播」。","options":{"A":"非皆需兩個中間宿主(血吸蟲僅一個)。","B":"抱雌溝為血吸蟲雄蟲特有、非共同。","C":"血吸蟲卵無卵蓋,非皆有卵蓋。","D":"吸蟲皆須經螺類為第一中間宿主—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112020-30":{"quick":"halzoun(咽喉型病症)最可能由牛羊肝吸蟲(Fasciola hepatica)引起。","detail":{"background":"「halzoun(咽喉型寄生蟲病)」是「生食受感染的『動物內臟(肝、淋巴)』或『水生植物(水芹)』」後,「『牛羊肝吸蟲(Fasciola hepatica)』(或Linguatula等)的幼蟲附著於『咽喉黏膜』」,引起「咽喉劇烈疼痛、水腫、出血與呼吸困難(似喉部阻塞)」。牛羊肝吸蟲一般經生食含囊蚴的「水芹等水生植物」致肝膽管感染,而幼蟲附咽喉即halzoun。其他肝吸蟲(貓肝吸蟲、泰國肝吸蟲、槍狀肝吸蟲)較不以halzoun表現。故為牛羊肝吸蟲。","options":{"A":"牛羊肝吸蟲(Fasciola hepatica)可致halzoun—正解。","B":"貓肝吸蟲致膽管感染、非典型halzoun。","C":"槍狀肝吸蟲寄生膽管。","D":"泰國肝吸蟲寄生膽管(與膽管癌相關)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112100-31":{"quick":"埃及血吸蟲被認為是埃及/非洲膀胱癌的主要原因,敘述正確。","detail":{"background":"埃及血吸蟲(Schistosoma haematobium):①「蟲卵具『終端棘(terminal spine)』」(側刺是曼氏血吸蟲);②成蟲寄生於「『膀胱與骨盆靜脈叢(vesical/pelvic plexus)』」,蟲卵穿膀胱壁致血尿,故由『尿液』查卵;③慢性感染致膀胱壁纖維化、鈣化與「『鱗狀細胞膀胱癌』,被認為是埃及與非洲部分地區『膀胱癌的主要原因』」(C正確);④治療首選「praziquantel」(非metronidazole)。故C正確。","options":{"A":"埃及血吸蟲卵具終端棘、非側棘—錯誤。","B":"成蟲寄生膀胱/骨盆靜脈叢、非下腸繫膜—錯誤。","C":"被認為是埃及/非洲膀胱癌主因—正解。","D":"治療首選praziquantel、非metronidazole—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_113090-31":{"quick":"血吸蟲為雌雄異體(雄蟲具抱雌溝),「雌雄同體」錯誤。","detail":{"background":"血吸蟲(Schistosoma)與多數吸蟲不同:①「『雌雄異體(dioecious)』——『雄蟲較粗短、腹面有『抱雌溝(gynecophoral canal)』夾抱細長的雌蟲』」(故「雌雄同體」錯誤);②感染是「中間宿主螺釋出的『尾動幼蟲(cercaria)直接穿透人皮膚』」;③「曼森血吸蟲(S. mansoni)分布地區最廣(非洲、中南美、中東)」;④致病主要來自「『宿主對沉積『蟲卵』的免疫(肉芽腫)反應』」而非成蟲本身。故A「雌雄同體」錯誤。","options":{"A":"血吸蟲為雌雄異體(雄具抱雌溝)、非同體—錯誤(正解)。","B":"尾動幼蟲可穿透人皮膚,正確。","C":"曼森血吸蟲分布最廣,正確。","D":"致病主要來自對蟲卵的免疫反應,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114090-32":{"quick":"遍嚐淡水魚後膽囊炎、糞檢確診,最可能為中華肝吸蟲。","detail":{"background":"中華肝吸蟲(Clonorchis sinensis)因「生食或未熟『淡水魚(如吳郭魚、草魚)』中的囊蚴」感染,成蟲寄生於「『肝內膽管』」,造成膽管炎、膽管阻塞、膽囊炎、膽結石,慢性長期感染與「『膽管癌(cholangiocarcinoma)』」相關;診斷以「『糞便鏡檢蟲卵(小型、有卵蓋與肩峰)』」。本題香港旅遊+遍嚐魚類+膽囊炎+糞檢確診即中華肝吸蟲。日本血吸蟲(腸/肝)、肺吸蟲(肺/蟹)、薑片蟲(腸/水生植物)表現/感染源不同。故為中華肝吸蟲。","options":{"A":"日本血吸蟲經cercaria鑽皮膚、非生食魚。","B":"衛氏肺吸蟲由淡水蟹、致肺病變。","C":"薑片蟲由水生植物、寄生小腸。","D":"中華肝吸蟲(生食淡水魚、膽管/膽囊炎)—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_115020-30":{"quick":"江浙食醉蟹後咳血稠痰、痰糞鏡確診,為衛氏肺吸蟲。","detail":{"background":"本題「中國江浙、長期食『醉蟹(生醃淡水蟹)』、發燒咳嗽『咳血稠痰』、『痰液與糞便鏡檢』確診」——典型為「衛氏肺吸蟲(Paragonimus westermani)」:生食淡水蟹的囊蚴後,成蟲寄生肺部致慢性咳血(似肺結核),痰與糞便中可查到深褐色有卵蓋的蟲卵。中華肝吸蟲(生食淡水魚、膽管)、薑片蟲(腸)、橫川氏吸蟲(小腸)感染源/表現不同。故為衛氏肺吸蟲。","options":{"A":"中華肝吸蟲由生食淡水魚、致膽管病變。","B":"衛氏肺吸蟲(醉蟹、咳血痰、痰糞查卵)—正解。","C":"薑片蟲為腸道吸蟲。","D":"橫川氏吸蟲為小型腸道吸蟲。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108030-32":{"quick":"囊尾幼蟲症由食入豬肉絛蟲『蟲卵』所致;「食帶蟲豬肉」得到的是腸道成蟲,故A錯誤。","detail":{"background":"人類「豬囊尾幼蟲症(cysticercosis)」是「『食入『豬肉絛蟲(Taenia solium)的蟲卵』(經人糞污染食物/水,或腸內成蟲卵『自體感染』)』」,蟲卵孵出『六鉤幼蟲』穿腸壁、隨血流移行至『肌肉、皮下、腦、眼』形成『囊尾幼蟲(囊蟲)』致病——『而非食入帶囊蟲的豬肉』(後者得到的是『腸道成蟲taeniasis』)。臨床:肌肉/皮下結節、『神經性囊蟲症致癲癇』、眼囊蟲;血清抗體與影像(CT/MRI)有助診斷。故A錯誤(把感染途徑寫成食帶蟲豬肉)。","options":{"A":"囊蟲症由食入『蟲卵』而非帶蟲豬肉(後者得腸道成蟲)—錯誤(正解)。","B":"也會在肌肉致病,正確。","C":"可發生癲癇(神經囊蟲症),正確。","D":"血清抗體檢查有助診斷,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108100-31":{"quick":"棘口吸蟲為腸道吸蟲,不致腦部病變;其餘三者皆可致腦病變。","detail":{"background":"會導致「腦部病變」的寄生蟲:①「日本血吸蟲」——蟲卵栓塞致腦型血吸蟲病;②「豬肉絛蟲(Taenia solium)」——『神經性囊尾幼蟲症(neurocysticercosis)』致癲癇;③「顆粒性包生絛蟲(Echinococcus granulosus)」——腦包生囊(佔位病變)。而「棘口吸蟲(Echinostoma spp.)」是寄生小腸的吸蟲(致腸炎/腹瀉),「『不會導致腦部病變』」。故為棘口吸蟲。","options":{"A":"日本血吸蟲可致腦型病變。","B":"豬肉絛蟲致神經性囊蟲症。","C":"單胞(顆粒性包生)絛蟲可致腦包生囊。","D":"棘口吸蟲為腸道吸蟲、不致腦病變—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108100-32":{"quick":"蟲卵具卵蓋(operculum)的絛蟲為廣節裂頭絛蟲(Diphyllobothrium latum)。","detail":{"background":"絛蟲蟲卵多無卵蓋(如Taenia卵為厚殼放射狀);但「『廣節裂頭絛蟲(Diphyllobothrium latum)』的蟲卵『具卵蓋(operculum)』」(似吸蟲卵,因其生活史經水中孵化、需中間宿主橈足類)。顆粒性包生絛蟲、牛肉絛蟲、短小包膜絛蟲的卵皆無卵蓋。故具卵蓋者為廣節裂頭絛蟲。","options":{"A":"顆粒性包生絛蟲卵無卵蓋。","B":"牛肉絛蟲卵無卵蓋(放射狀厚殼)。","C":"廣節裂頭絛蟲卵具卵蓋—正解。","D":"短小包膜絛蟲卵無卵蓋。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109020-32":{"quick":"受孕節片具卵囊(egg capsules)者為犬複殖器絛蟲(Dipylidium caninum)。","detail":{"background":"「犬複殖器絛蟲(Dipylidium caninum,犬絛蟲)」的成熟『受孕節片(gravid proglottid)』內含許多「『卵囊(egg capsules / egg packets)』,每個卵囊內包數枚至數十枚蟲卵」,節片狀似南瓜籽,可主動爬出肛門。人(尤幼童)因「誤食含似囊尾幼蟲(cysticercoid)的『貓狗蚤(flea)』」感染。牛肉絛蟲、縮小包膜絛蟲、廣節裂頭絛蟲的節片不具此卵囊構造。故為犬複殖器絛蟲。","options":{"A":"犬複殖器絛蟲受孕節片具卵囊—正解。","B":"牛肉絛蟲節片不具卵囊。","C":"縮小包膜絛蟲節片不具卵囊。","D":"廣節裂頭絛蟲節片不具卵囊。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109100-31":{"quick":"絛蟲成蟲頭節(scolex)具吸盤/小鉤等附著定位器官,敘述正確。","detail":{"background":"絛蟲成蟲(扁蟲)構造:①體型雖大(數公尺),但「『多無明顯全身症狀』(常為輕微腹部不適)」,故「容易造成全身症狀」不準;②「成蟲寄生於『終宿主腸道』,經『皮層(tegument)直接吸收宿主『腸道』養分』(無消化道)」——敘述B把『中間宿主腸道』寫錯(成蟲在終宿主);③「『雌雄同體』,但『行有性生殖(自體或異節片受精)』」(非無性生殖);④「『頭節(scolex)』上具『吸盤(sucker)、額嘴(rostellum)與小鉤』等『附著與定位器官』」(D正確)。故D正確。","options":{"A":"絛蟲成蟲多無明顯全身症狀—錯誤。","B":"成蟲寄生終宿主腸道(非中間宿主)—措詞錯誤。","C":"雌雄同體但行有性生殖、非無性—錯誤。","D":"頭節具吸盤/小鉤等附著定位器官—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_110020-31":{"quick":"顆粒性包生絛蟲在患者肝臟形成單房包生囊(hydatid cyst),敘述正確。","detail":{"background":"顆粒性(細粒)包生絛蟲(Echinococcus granulosus):①終宿主為犬,中間宿主為羊;「人是『偶然中間宿主』,因『誤食犬糞中的『蟲卵』』(非食羊肉)感染」;②六鉤幼蟲移行至「『肝(最常)、肺』形成『單房包生囊(unilocular hydatid cyst)』」(囊內含原頭節與子囊);③「『肺泡狀/多房囊(alveolar cyst)』是『多房包生絛蟲(E. multilocularis)』的特徵」(非顆粒性);④人是中間宿主、『糞便中不會排出六鉤幼蟲卵』。故B正確。","options":{"A":"人因食入犬糞中蟲卵感染、非食羊肉—錯誤。","B":"在肝臟形成包生囊(hydatid cyst)—正解。","C":"肺泡狀多房囊為多房包生絛蟲特徵—錯誤。","D":"人為中間宿主、糞中不排卵—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_110020-34":{"quick":"誤食受感染的貓狗蚤,最可能感染犬複殖器絛蟲(Dipylidium caninum)。","detail":{"background":"「犬複殖器絛蟲(Dipylidium caninum,犬/貓絛蟲)」的中間宿主是「『蚤(貓蚤/犬蚤,以及犬毛蝨)』」——蚤幼蟲吞食絛蟲卵、體內發育成『似囊尾幼蟲(cysticercoid)』。人(尤其與貓狗親密接觸的『幼童』)因「『誤食含似囊尾幼蟲的受感染蚤』」而感染,成蟲寄生小腸,可見南瓜籽狀節片自肛門爬出。犬蛔蟲(食卵)、犬鉤蟲(幼蟲鑽皮膚)、菲律賓毛線蟲(生魚)感染途徑不同。故誤食蚤者感染犬複殖器絛蟲。","options":{"A":"犬蛔蟲經誤食蟲卵感染。","B":"誤食受感染蚤致犬複殖器絛蟲—正解。","C":"犬鉤蟲經幼蟲鑽皮膚。","D":"菲律賓毛線蟲經生食小魚。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111020-31":{"quick":"北歐醃魚後維生素B12缺乏與空腸帶狀蟲,為廣節裂頭絛蟲(魚絛蟲)。","detail":{"background":"廣節裂頭絛蟲(Diphyllobothrium latum,魚肉絛蟲)流行於「『北歐(瑞典、芬蘭)、淡水湖區』」,人因「生食或醃漬未熟的『淡水魚』(含裂頭幼蟲plerocercoid)」感染。成蟲(可長達數公尺)寄生於「『空腸』」,「『競爭吸收維生素B12』」,可致「『維生素B12缺乏性(巨母紅血球性/惡性)貧血』」。本題北歐+醃魚+B12缺乏+空腸帶狀蟲即廣節裂頭絛蟲。中華肝吸蟲(膽管)、橫川吸蟲(腸)、增生性裂頭幼蟲(sparganosis組織)不致B12缺乏。","options":{"A":"中華肝吸蟲寄生膽管、不致B12缺乏。","B":"橫川吸蟲為小型腸道吸蟲。","C":"廣節裂頭絛蟲競爭B12致惡性貧血(北歐醃魚)—正解。","D":"增生性裂頭幼蟲致組織裂頭蚴病。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111020-32":{"quick":"神經性囊尾幼蟲症最常由豬肉絛蟲(Taenia solium)的蟲卵感染所致。","detail":{"background":"「神經性囊尾幼蟲症(neurocysticercosis)」是「『豬肉絛蟲(Taenia solium)』的『蟲卵』被人食入(經糞口或自體感染)」後,六鉤幼蟲移行至『腦/中樞神經』形成囊尾幼蟲,是「『成人後天性癲癇』的重要原因(尤其開發中地區)」。牛肉絛蟲(Taenia saginata)與亞洲無鈎絛蟲的『蟲卵不會在人體發育成囊尾幼蟲』(只致腸道成蟲);旋毛蟲致肌肉病變。故神經性囊蟲症為豬肉絛蟲。","options":{"A":"旋毛蟲致肌肉囊包、非神經囊蟲症。","B":"牛肉絛蟲卵不致人體囊蟲症。","C":"豬肉絛蟲卵致神經性囊尾幼蟲症—正解。","D":"亞洲無鈎絛蟲不致人體囊蟲症。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111100-31":{"quick":"人同時為終宿主(腸道成蟲)與中間宿主(囊尾幼蟲)者為豬肉絛蟲(Taenia solium)。","detail":{"background":"「豬肉絛蟲(Taenia solium)」特殊之處在於「『人類可同時是終宿主與中間宿主』」:①「食帶囊蟲的『豬肉』→腸道『成蟲(終宿主,taeniasis)』」;②「食入其『蟲卵』→六鉤幼蟲移行組織形成『囊尾幼蟲(中間宿主,cysticercosis)』」——後者(尤其神經囊蟲症)是其危險性。牛肉絛蟲(人只是終宿主,中間宿主為牛)、短小包膜絛蟲(可自體感染但屬同一類)、曼森裂頭絛蟲(人多為中間宿主)情況不同(本題以豬肉絛蟲為解)。","options":{"A":"短小包膜絛蟲生活史不同(本題以豬肉絛蟲為解)。","B":"豬肉絛蟲人可同時為終宿主與中間宿主—正解。","C":"曼森裂頭絛蟲人多為中間宿主。","D":"牛肉絛蟲人僅為終宿主。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112020-31":{"quick":"顆粒性包生絛蟲可在肺形成包生囊,導致人類肺部病變。","detail":{"background":"「顆粒性(細粒)包生絛蟲(Echinococcus granulosus)」的幼蟲(六鉤幼蟲)經血流移行,最常在「肝」,其次在「『肺』形成『包生囊(hydatid cyst)』」,造成咳嗽、咳血、胸痛,囊體破裂可致過敏性休克與播散。犬複殖器絛蟲(腸)、廣節裂頭絛蟲(腸/B12)、短小包膜絛蟲(腸)皆為腸道絛蟲、不致肺部囊腫病變。故致肺部病變者為顆粒性包生絛蟲。","options":{"A":"犬複殖器絛蟲為腸道絛蟲。","B":"顆粒性包生絛蟲可在肺形成包生囊—正解。","C":"廣節裂頭絛蟲為腸道絛蟲(致B12缺乏)。","D":"短小包膜絛蟲為腸道絛蟲。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114020-31":{"quick":"短小包膜絛蟲(Hymenolepis nana)蟲卵在小腸孵化後可經自體感染重新感染同一宿主。","detail":{"background":"「短小包膜絛蟲(Hymenolepis nana,矮小絛蟲)」是『唯一不需中間宿主即可完成生活史』的絛蟲:其「『蟲卵被食入後在『小腸』孵化』→六鉤幼蟲鑽入腸絨毛形成似囊尾幼蟲→再回到腸腔發育為成蟲」,且「『可在同一宿主體內『自體感染(autoinfection)』』反覆增殖」(故免疫低下者可大量感染)。縮小包膜絛蟲(需中間宿主穀蟲)、顆粒性包生絛蟲、犬複殖器絛蟲(需蚤)皆需中間宿主、不行此種自體感染。故為短小包膜絛蟲。","options":{"A":"短小包膜絛蟲可自體感染、不需中間宿主—正解。","B":"縮小包膜絛蟲需中間宿主(穀蟲)。","C":"顆粒性包生絛蟲需中間宿主。","D":"犬複殖器絛蟲需中間宿主(蚤)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114020-32":{"quick":"豬肉絛蟲比牛肉絛蟲嚴重,最主要因其會造成人類囊尾幼蟲症。","detail":{"background":"豬肉絛蟲(Taenia solium)與牛肉絛蟲(Taenia saginata)的成蟲皆寄生人腸道、症狀輕微相似;但豬肉絛蟲「『對人類危害更嚴重』的『最主要原因』是——其『蟲卵可被人食入(或腸內成蟲自體感染),六鉤幼蟲移行至組織形成『囊尾幼蟲(cysticercosis)』,尤其『神經性囊蟲症致癲癇』』」;牛肉絛蟲的蟲卵『不會在人體發育成囊尾幼蟲』。雖然豬肉絛蟲頭節有小鉤、牛肉絛蟲無,但危害嚴重的關鍵在於『人類囊尾幼蟲症』。故D最正確。","options":{"A":"頭節小鉤非危害更嚴重的主因。","B":"吸收營養致衰弱非主因。","C":"絛蟲不以分泌毒素致病。","D":"豬肉絛蟲會造成人類囊尾幼蟲症—正解(主因)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114090-31":{"quick":"包生囊蟲病正確為:多房包生囊最具危險性②與囊體破裂致過敏性休克④(即24)。","detail":{"background":"人類包生囊蟲病(hydatid disease)由包生絛蟲(Echinococcus)引起:①「人因『食入犬糞中的『蟲卵』』感染(非食污染肉類)」(故①錯誤);②「『肺泡狀(多房)包生囊症(alveolar echinococcosis,E. multilocularis)』因『浸潤性生長似惡性腫瘤』,『最具致病危險性、預後差』」(②正確);③「歐洲多房包生絛蟲以『狐、犬』為終宿主、囓齒類為中間宿主(非以豬為主要感染源)」(③錯誤);④「『囊體破裂』釋出囊液與原頭節,可致『過敏性休克(anaphylactic shock)』與腹腔/全身播散」(④正確)。故正確為②④(24)。","options":{"A":"①(食污染肉類)錯誤,不符。","B":"③(歐洲以豬為源)錯誤,不符。","C":"①③皆錯誤,不符。","D":"②多房囊最危險④破裂致過敏性休克—正解(24)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_115020-31":{"quick":"派駐墨西哥後頭痛、視力減退、腦/腦室多發囊體而糞檢陰性,為神經性囊尾幼蟲症。","detail":{"background":"本題「曾派駐『墨西哥(豬肉絛蟲流行區)』、『頭痛、肌肉痙攣/抽搐、視力急速減退』、輕微嗜酸性球上升、『糞檢無蟲卵蟲體』、CT/MRI於『腦實質與腦室見許多4-15mm囊體』」——典型為「『神經性囊尾幼蟲症(neurocysticercosis)』」(食入豬肉絛蟲『蟲卵』後囊尾幼蟲移行至腦),是流行區後天性癲癇主因(糞檢陰性因致病的是組織囊蟲非腸道成蟲)。幼裂絛蟲症(sparganosis,皮下/組織)、廣節裂頭絛蟲症(B12缺乏)、縮小包膜絛蟲症(腸道)表現不同。故為囊尾幼蟲症。","options":{"A":"幼裂絛蟲症為皮下/組織裂頭蚴,非腦多發囊體典型。","B":"神經性囊尾幼蟲症(墨西哥、腦多發囊體、糞檢陰)—正解。","C":"廣節裂頭絛蟲症致B12缺乏性貧血。","D":"縮小包膜絛蟲症為腸道感染。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_106100-35":{"quick":"家蠅以「機械性傳播」方式攜帶並媒介病原體(體表/嘔吐物污染食物)。","detail":{"background":"病媒的傳播方式分:①「機械性傳播(mechanical transmission)」——病原體『不在媒介體內發育繁殖』,僅由媒介『體表、口器或排泄物機械性攜帶』污染食物,如「『家蠅(house fly)』把痢疾、傷寒、霍亂、阿米巴等病原由糞便帶到食物」;②「生物性傳播(biological transmission)」——病原在媒介體內發育/繁殖(如蚊傳瘧疾、蚤傳鼠疫、蝨傳斑疹傷寒)。故主要以機械性傳播者為家蠅。","options":{"A":"蚊為生物性傳播(瘧疾/登革等)。","B":"家蠅以機械性傳播媒介病原—正解。","C":"跳蚤為生物性傳播(鼠疫)。","D":"體蝨為生物性傳播(斑疹傷寒)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_107100-34":{"quick":"恙蟲病經感染性的「幼蟎(larvae)」叮咬而感染。","detail":{"background":"恙蟲病(scrub typhus,叢林斑疹傷寒)由「立克次體Orientia tsutsugamushi」引起,經「『恙蟎(Leptotrombidium spp.)的『幼蟎(larvae,即恙蟲)』』叮咬」吸取組織液時傳染(只有『幼蟎』階段會叮咬哺乳動物吸食組織液;若蟎與成蟎不吸血)。叮咬處形成特徵性「焦痂(eschar)」,伴發燒、淋巴腺腫、皮疹。蜱(成/幼蜱)、成蟎非恙蟲病的傳播階段。故為感染性幼蟎。","options":{"A":"蜱非恙蟲病媒介。","B":"蜱非恙蟲病媒介。","C":"成蟎不吸血、非媒介。","D":"感染性幼蟎(larvae)叮咬傳播恙蟲病—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_108030-35":{"quick":"人膚蠅(Dermatobia hominis)蠅蛆症主要發生於中南美洲,「常發生於亞洲」錯誤。","detail":{"background":"蠅蛆症(myiasis,蠅幼蟲寄生人體組織):①「人膚蠅(Dermatobia hominis)」採『攜播(phoresy)』方式——把卵產於『吸血性蚊/蠅的腹部』,當這些昆蟲叮咬人時,受體溫刺激孵化的幼蟲『鑽入人皮膚』形成癤狀病灶;②「院內蠅蛆症」常見於『長期臥床、有開放性傷口、意識不清』的病患;③「耳部蠅蛆症」患者有蟲體爬動感、雜音與惡臭分泌物;④「人膚蠅分布於『中南美洲熱帶』,『並非亞洲』」——故D錯誤。","options":{"A":"人膚蠅以攜播方式由吸血昆蟲帶卵、幼蟲鑽入皮膚,正確。","B":"院內蠅蛆症好發長期臥床開放傷口者,正確。","C":"耳部蠅蛆症有爬動感與惡臭分泌物,正確。","D":"人膚蠅蠅蛆症發生於中南美洲、非亞洲—錯誤(正解)。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109020-35":{"quick":"采采蠅傳播的是非洲睡眠病(非洲錐蟲),Chagas病由錐蝽傳播,故C錯誤。","detail":{"background":"病媒與疾病配對:①「埃及斑蚊(Aedes aegypti)」——傳播黃熱病、登革熱(正確);②「蚋(Simulium)」——傳播蟠尾絲蟲病/『河川盲(river blindness)』(正確);③「采采蠅(tsetse fly)」——傳播『非洲錐蟲(非洲睡眠病)』,『而『卡格氏症(Chagas病/美洲錐蟲病)』由『錐蝽(triatomine bug)』傳播』(故C「采采蠅傳Chagas病」錯誤);④「白蛉(sandfly)」——傳播利什曼原蟲症(正確)。故C錯誤。","options":{"A":"埃及斑蚊傳黃熱病,正確。","B":"蚋傳河川盲,正確。","C":"采采蠅傳非洲睡眠病、Chagas由錐蝽傳—錯誤(正解)。","D":"白蛉傳利什曼原蟲症,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_109100-34":{"quick":"病媒蜱可經叮咬傳播回歸熱(軟蜱傳Borrelia);其餘三者非蜱媒。","detail":{"background":"蜱(tick)媒傳染病:①「回歸熱(relapsing fever)」——地方性回歸熱由『軟蜱(Ornithodoros)』傳播疏螺旋體Borrelia(流行性回歸熱則由體蝨傳);亦傳萊姆病、洛磯山斑疹熱、巴貝氏症等。對照:②「黑熱病(kala-azar)」由『白蛉』傳;③「戰壕熱(trench fever)」由『體蝨』傳;④「黃熱病(yellow fever)」由『蚊(斑蚊)』傳。故蜱叮咬可傳播者為回歸熱。","options":{"A":"黑熱病由白蛉傳播。","B":"戰壕熱由體蝨傳播。","C":"黃熱病由蚊傳播。","D":"回歸熱可由蜱傳播—正解。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111020-35":{"quick":"鼠蚤傳鼠疫的機轉是前胃阻塞致吸血時血液「反流(regurgitation)」帶菌入傷口,C描述被判為不適當。","detail":{"background":"鼠疫(plague):①致病原為「鼠疫桿菌(Yersinia pestis,『革蘭氏陰性』桿菌)」;②經「『鼠蚤(Xenopsylla cheopis)』」叮咬傳播——其機轉是『鼠疫桿菌在蚤『前胃(proventriculus)』增殖形成生物膜造成『阻塞(blocked flea)』,蚤吸血受阻時把含菌血液『反流(regurgitation)』注入叮咬傷口』(亦可經蚤糞搔抓入傷口);③人感染初期出現『腹股溝/腋窩淋巴結化膿腫大(腺鼠疫bubonic plague)』;④後期可發展為『肺鼠疫(pneumonic plague),經飛沫人傳人』。本題C以「嘔吐(vomiting)污染傷口」描述被判為不適當(精確說法為阻塞蚤『反流』)。","options":{"A":"感染初期呈腺鼠疫(腋窩/腹股溝淋巴腫),正確。","B":"後期可呈人傳人的肺鼠疫,正確。","C":"機轉為前胃阻塞致血液反流、非單純「嘔吐」—錯誤(正解)。","D":"致病原為革蘭氏陰性的鼠疫桿菌,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_111100-35":{"quick":"恙蟎屬中只有「幼蟎(larvae)」會叮咬人吸組織液,為恙蟲病的主要媒介。","detail":{"background":"恙蟎屬(Leptotrombidium spp.)的生活史中,「『只有『幼蟎(larvae,即恙蟲chigger)』階段會附著於哺乳動物(鼠、人)皮膚『吸食組織液』』」——也只有此階段傳播「恙蟲病(Orientia tsutsugamushi)」;其後的『若蟎(nymph)與成蟎』為『自由生活、以土壤中小節肢動物卵為食、不吸血』,故不傳病。立克次體在恙蟎可『經卵傳遞(transovarial)』維持。故主要媒介時期為幼蟎。","options":{"A":"幼蟎(larvae)叮咬吸組織液、為恙蟲病主要媒介—正解。","B":"若蟎自由生活、不吸血。","C":"雌蟎自由生活、不吸血。","D":"雄蟎自由生活、不吸血。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_112100-34":{"quick":"已確認導致兒童過敏與氣喘的主要致敏原節肢動物為塵蟎(dust mite)。","detail":{"background":"「塵蟎(dust mite,如屋塵蟎Dermatophagoides)」廣布於居家灰塵、寢具、地毯,以人類脫落皮屑為食。其『排泄物與蟲體碎片中的蛋白(如Der p 1)』是「『兒童過敏性鼻炎、過敏性氣喘與異位性皮膚炎的『主要室內致敏原(allergen)』』」,為過敏疾病防治的重點(減塵、防蟎寢具)。疥蟎(疥瘡)、毛囊蟎(蠕形蟎,玫瑰斑相關)、恙蟎(恙蟲病)非主要氣喘致敏原。故為塵蟎。","options":{"A":"疥蟎致疥瘡、非主要氣喘致敏原。","B":"塵蟎為兒童過敏/氣喘主要致敏原—正解。","C":"毛囊蟎與玫瑰斑相關、非氣喘致敏原。","D":"恙蟎傳恙蟲病、非氣喘致敏原。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114020-35":{"quick":"節肢動物的馬氏管(Malpighian tubules)主要負責移除含氮廢物(排泄),敘述最適當。","detail":{"background":"病媒/節肢動物相關概念:①「蒼蠅主要以『機械性傳播』媒介病原」(非經卵傳播;經卵傳遞transovarial見於某些蜱、蟎、蚊傳病原);②「『腮腺炎(mumps)』是『病毒經飛沫(呼吸道)傳染』,『不是昆蟲媒介』」;③「節肢動物的『馬氏管(Malpighian tubules)』是其排泄器官,『主要負責移除含氮廢物(如尿酸)』」(C正確);④「『防治病媒蚊『可以』有效遏阻登革熱流行』(登革無疫苗時主要靠病媒管制)」。故C最適當。","options":{"A":"蒼蠅主要為機械性傳播、非經卵傳播—錯誤。","B":"腮腺炎為病毒飛沫傳染、非昆蟲媒介—錯誤。","C":"馬氏管負責移除含氮廢物(排泄)—正解。","D":"防治病媒蚊可遏阻登革熱、非無法—錯誤。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}},"med2_114090-35":{"quick":"日本斑疹熱由硬蜱傳播;「軟蜱傳日本斑疹熱」錯誤(軟蜱傳回歸熱)。","detail":{"background":"病媒與疾病配對:①「體蝨(body louse)」——傳播『戰壕熱(trench fever, Bartonella quintana)』、流行性斑疹傷寒、流行性回歸熱(正確);②「『日本斑疹熱(Japanese spotted fever, Rickettsia japonica)』由『『硬蜱(hard tick)』』傳播」,『『軟蜱(soft tick)』傳播的是『地方性回歸熱(Borrelia)』』(故B「軟蜱傳日本斑疹熱」錯誤);③「采采蠅(tsetse fly)」——非洲睡眠病(正確);④「虻(Chrysops)」——羅阿絲蟲病(正確)。故B錯誤。","options":{"A":"體蝨傳戰壕熱,正確。","B":"日本斑疹熱由硬蜱傳、軟蜱傳回歸熱—錯誤(正解)。","C":"采采蠅傳非洲睡眠病,正確。","D":"虻(Chrysops)傳羅阿絲蟲病,正確。"},"sources":["Markell & Voge’s Medical Parasitology","醫用寄生蟲學","CDC DPDx 寄生蟲診斷資料庫"]}}},TO=["P1腸道與管腔原蟲", "P2血液與組織原蟲", "P3自由生活阿米巴", "P4腸道線蟲", "P5組織與血液線蟲", "P6吸蟲", "P7絛蟲", "P8節肢動物病媒與感染"],LEC={"P1腸道與管腔原蟲":{"title":"腸道與管腔原蟲(阿米巴‧鞭毛蟲‧滴蟲)","html":"<p><b>痢疾阿米巴(Entamoeba histolytica)</b>:糞口傳染、囊體(4核)為感染型。滋養體侵腸黏膜致果醬樣血便,經門脈致『右葉』肝膿瘍(膿在右、滋養體在膿瘍『壁邊緣』、鯷魚醬樣)。治療metronidazole+腸腔殺囊劑;阿米巴腫易誤診大腸癌。吞噬紅血球的滋養體=致病指標。非致病:大腸阿米巴(囊體最大、8核)、哈氏阿米巴(小、不吞紅血球)、嗜碘阿米巴(囊體大肝醣泡)。</p><p><b>腸道鞭毛蟲</b>:梨形鞭毛蟲(Giardia,水媒、十二指腸、脂肪瀉)、唇形鞭毛蟲(非致病)。陰道滴蟲(Trichomonas vaginalis):性傳播、『無囊體』、滋養體傳、泡沫黃綠分泌物+草莓子宮頸、男性多無症狀可致攝護腺炎、新生兒可經產道感染、metronidazole治療。隱孢子蟲/環孢子蟲/微孢子蟲/等孢子蟲=免疫低下者腹瀉(隱孢子蟲抗氯、水媒)。弓蟲經食肉囊體/貓糞卵囊(非飲水)。</p>"},"P2血液與組織原蟲":{"title":"瘧疾‧利什曼‧錐蟲‧弓蟲‧巴貝氏","html":"<p><b>瘧疾(Plasmodium)</b>:瘧蚊(Anopheles)傳;紅內期裂殖體同步破裂釋裂殖子致週期熱(間日/卵形48hr、三日72hr、惡性不規則)。惡性瘧:cytoadherence(PfEMP1-內皮受體+thrombospondin)致腦瘧/器官衰竭。間日瘧需Duffy抗原(西非Duffy陰性故罕見)、侵年輕RBC。蚊內:配子母→合子→卵動子(鑽『中腸壁』成卵囊)→孢子體移行『唾液腺』。併發症:黑水熱(血管內溶血+血紅素尿、與奎寧/G6PD/抗體有關)、腎炎(三日瘧免疫複合體)、低血糖。</p><p><b>血鞭毛蟲</b>:利什曼(白蛉傳;前鞭毛體入人被巨噬吞噬→無鞭毛體amastigote;杜氏=黑熱病肝脾腫大全血球減少、PKDL;墨西哥=chiclero耳潰瘍;巴西=Espundia黏膜)。非洲錐蟲(采采蠅;岡比亞西非慢性Winterbottom後頸淋巴腫、羅得西亞東非急性;下疳→腦CSF蟲體)。枯西氏錐蟲(錐蝽糞-傷口;Chagas:Romaña眼瞼水腫、心肌炎、巨食道/巨結腸;性/輸血亦傳)。弓蟲(食肉囊體/貓糞卵囊/胎盤;免疫低下腦炎、先天弓蟲症)。巴貝氏(硬蜱、紅血球內、可輸血傳、脾切者重症、clindamycin+quinine)。人艾利希體症(蜱、中性球內morulae、血球減少,屬立克次體)。</p>"},"P3自由生活阿米巴":{"title":"福氏內格里‧棘阿米巴‧巴氏阿米巴","html":"<p><b>福氏內格里阿米巴(Naegleria fowleri)</b>:溫暖淡水(池塘/溫泉)游泳→經鼻篩板入腦→『原發性阿米巴腦膜腦炎(PAM)』,急性、嗜中性球為主CSF、嗅覺異常、3-7天內死亡;組織中『只有滋養體無囊體』。</p><p><b>棘阿米巴(Acanthamoeba)/巴氏阿米巴(Balamuthia)</b>:致『肉芽腫性阿米巴腦炎(GAE,慢性,經血行/呼吸非游泳)』;棘阿米巴+隱形眼鏡(自來水洗鏡)→『角膜炎(劇痛、雙層壁囊體)』。此二者組織切片可『同時見滋養體與囊體』。</p>"},"P4腸道線蟲":{"title":"蛔蟲‧鉤蟲‧蟯蟲‧鞭蟲‧糞小桿線蟲","html":"<p><b>蛔蟲(Ascaris)</b>:最大腸道線蟲、小腸;幼蟲經肺移行(Loeffler);重度感染易『異位移行』入膽道/胰管/肝。<b>鉤蟲</b>:Necator僅經皮膚、Ancylostoma duodenale可經皮膚『及經口』;最早症狀=皮膚搔癢(ground itch);重度致缺鐵性貧血。動物鉤蟲(犬鉤蟲)幼蟲→皮膚幼蟲移行症(creeping eruption)。</p><p><b>蟯蟲(Enterobius)</b>:大腸、雌蟲夜間肛周產卵→夜間肛癢、肛圍擦拭法診斷、卵可空氣傳播、女性異位移行致慢性骨盆腔腹膜炎。<b>鞭蟲(Trichuris)</b>:大腸(盲腸)、鞭狀(前細後粗)、卵桶狀兩端卵塞、重度致脫肛/貧血、『不自體感染』。<b>糞小桿線蟲(Strongyloides)</b>:可『自體感染』;免疫低下/類固醇→瀰漫性過度感染(全身播散+G-敗血、嗜酸性球反不明顯)。菲律賓毛線蟲(生食小魚、自體感染、嚴重吸收不良低蛋白低電解質)。線蟲有完整消化道(口→腸→肛),絛蟲無。</p>"},"P5組織與血液線蟲":{"title":"絲蟲‧旋毛蟲‧廣東住血線蟲‧海獸胃線蟲‧棘頜口線蟲","html":"<p><b>絲蟲</b>:班氏/馬來絲蟲(蚊傳;台澎金馬班氏由熱帶家蚊Culex;微絲蟲夜間週期;蚊注入L3非微絲蟲;成蟲在淋巴管→象皮病、乳糜尿;DEC治療與白天激發採血;馬來絲蟲微絲蟲尾端有2尾核、班氏無)。蟠尾絲蟲(蚋Simulium傳;河川盲、皮下結節、鼠蹊懸垂;微絲蟲在『皮膚』→skin snips診斷)。羅阿絲蟲(虻Chrysops;眼結膜遊走;微絲蟲在血、白天週期)。麥地那線蟲(飲生水含劍水蚤;下肢潰瘍拉出100cm長蟲)。</p><p><b>組織線蟲</b>:旋毛蟲(食生豬肉囊包幼蟲;第三期幼蟲在橫紋肌成囊體=診斷期;眼眶水腫肌痛嗜酸性球高)。廣東住血線蟲(生食蝸牛/螺/污染生菜;『鼠是終宿主、人意外宿主』;嗜酸性腦膜炎;CSF查蟲體)。海獸胃線蟲(Anisakis;海水魚生魚片;人非適宜宿主不產卵→內視鏡診斷非糞檢;急性腹痛)。棘頜口線蟲(生食淡水魚;游走性皮下/眼眶腫脹、可入腦)。犬蛔蟲(Toxocara;誤食卵→內臟幼蟲移行症VLM:幼童嗜酸性球高+肝腫大;眼幼蟲移行症)。肝毛線蟲卵見於糞=假性感染(食含卵動物肝)。</p>"},"P6吸蟲":{"title":"血吸蟲‧肺吸蟲‧肝吸蟲‧薑片蟲","html":"<p><b>共同特徵</b>:第一中間宿主皆為『螺』。除血吸蟲外多為雌雄同體、卵有卵蓋、感染型為囊蚴(metacercaria,生食含囊蚴的第二中間宿主/植物)。</p><p><b>血吸蟲(Schistosoma)</b>:『雌雄異體』(雄具抱雌溝)、『尾動幼蟲cercaria鑽皮膚』感染(無囊蚴)、致病靠對『蟲卵』的肉芽腫反應。曼氏(側刺、腸繫膜下靜脈、分布最廣)、日本(小側刺、片山熱、腦栓塞)、埃及(終端棘、膀胱靜脈叢、血尿、膀胱鱗癌主因);治療praziquantel。</p><p><b>食源性吸蟲</b>:衛氏肺吸蟲(生食淡水蟹/醉蟹→肺、咳血痰、痰中卵+Charcot-Leyden、可腦異位);中華肝吸蟲(生食淡水魚→膽管、膽管癌、糞查卵);牛羊肝吸蟲Fasciola(水生植物/水芹;幼蟲附咽喉=halzoun);薑片蟲(水生植物→小腸,大型,不入腦)。</p>"},"P7絛蟲":{"title":"豬/牛肉絛蟲‧囊蟲症‧包生絛蟲‧裂頭絛蟲","html":"<p><b>絛蟲總論</b>:扁蟲、『無消化道』(經皮層tegument吸收)、頭節(scolex)有吸盤/小鉤定位、雌雄同體行有性生殖。<b>豬肉絛蟲(Taenia solium)</b>:食帶囊蟲豬肉→腸道成蟲;食入『蟲卵』(糞口/自體感染)→『囊尾幼蟲症(cysticercosis),尤神經性囊蟲症致癲癇』;人可同為終+中間宿主。牛肉絛蟲(Taenia saginata):卵不致人囊蟲症(危害較輕)。</p><p><b>其他絛蟲</b>:廣節裂頭絛蟲(北歐醃魚/淡水魚、空腸、卵『有卵蓋』、競爭B12致惡性貧血)。短小包膜絛蟲(Hymenolepis nana,不需中間宿主、卵在小腸孵化可『自體感染』)。犬複殖器絛蟲(Dipylidium,誤食含似囊尾幼蟲的『蚤』、受孕節片具『卵囊egg capsule』、南瓜籽節片)。包生絛蟲(Echinococcus):誤食『犬糞蟲卵』→肝/肺包生囊;細粒(顆粒性)=單房囊、多房(E. multilocularis)=肺泡狀浸潤似惡性最危險;囊破→過敏性休克。</p>"},"P8節肢動物病媒與感染":{"title":"病媒傳播‧蜱蟎蚤蝨‧蠅蛆症","html":"<p><b>傳播方式</b>:機械性傳播(家蠅體表/嘔吐物帶痢疾傷寒霍亂);生物性傳播(病原在媒介體內發育繁殖:蚊-瘧疾/登革、蚤-鼠疫、蝨-斑疹傷寒)。經卵傳遞(transovarial)見於某些蜱/蟎。節肢動物馬氏管=排泄含氮廢物。</p><p><b>重要病媒</b>:蚊(瘧疾/絲蟲/登革黃熱)、蚋Simulium(蟠尾絲蟲河川盲)、虻Chrysops(羅阿絲蟲)、白蛉sandfly(利什曼/黑熱)、采采蠅tsetse(非洲睡眠病)、錐蝽triatomine(Chagas)、硬蜱(萊姆/斑疹熱/巴貝氏)、軟蜱(地方性回歸熱)、體蝨(戰壕熱/斑疹傷寒/流行性回歸熱)、恙蟎『幼蟎』(恙蟲病焦痂)、鼠蚤Xenopsylla(鼠疫:前胃阻塞反流;腺鼠疫→肺鼠疫人傳人;Yersinia pestis為G-)、塵蟎(兒童氣喘主要致敏原)、疥蟎(疥瘡)。蠅蛆症(myiasis):人膚蠅Dermatobia(中南美、攜播phoresy、幼蟲鑽皮膚)、院內蠅蛆症(臥床開放傷口)。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^P(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='med2_para_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
