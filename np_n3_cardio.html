V)銳減」，心輸出量反而下降(並非心跳越快CO越大)；心輸出量在適中心率時最佳。故錯誤為B。　深入補充：心輸出量CO＝SV×HR，但心率過快(如200次/分)時舒張充盈時間大幅縮短、SV銳減，CO反而下降，故並非心率越快CO越大。CVP測右心房壓、MAP＝1/3收縮壓＋2/3舒張壓。心率在適中範圍時CO最佳。","options":{"A":"CO＝SV×HR，正確。","B":"錯誤(正解)。心跳200次時舒張充盈不足、SV銳減，心輸出量反而下降。","C":"中心靜脈導管測右心房壓力，正確。","D":"MAP＝1/3收縮壓＋2/3舒張壓，正確。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"110030-N3-34":{"quick":"決定「心搏出量(SV)」的是前負荷、後負荷、心收縮力；「心跳速率」不是SV的決定因素(它影響的是心輸出量CO)。","detail":{"background":"心搏出量(stroke volume, SV)＝每次心跳由心室射出的血量，其三大決定因素是：①「前負荷(preload)」(舒張末期容量，依Frank-Starling定律)、②「後負荷(afterload)」(射血阻力)、③「心收縮力(contractility)」。而「心跳速率(HR)」並非決定「每一搏血量(SV)」的因素，HR是影響「心輸出量(CO＝SV×HR)」的另一獨立變數。故不是SV決定要素的是D心跳速率。　深入補充：心搏出量(SV)由前負荷(Frank-Starling)、後負荷(射血阻力)、收縮力決定；心率(HR)不決定SV，而是與SV相乘決定心輸出量(CO＝SV×HR)。射出率(EF)＝SV/舒張末容積，反映收縮功能(正常55~70%)。","options":{"A":"前負荷是心搏出量的決定要素。","B":"後負荷是心搏出量的決定要素。","C":"心收縮力是心搏出量的決定要素。","D":"正解(非要素)。心跳速率不決定「心搏出量」，它影響的是心輸出量。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"110110-N3-29":{"quick":"聽診第三心音(S3)是「低頻音」，應以聽診器的「鐘面(bell)」在心尖聽診(左側臥)；用「膜面」是錯誤。","detail":{"background":"心臟血管評估：A頸靜脈搏動最高點與胸骨角垂直距離5公分(>3~4)提示右心房壓偏高，正確；C心尖最大搏動點正常在「左鎖骨中線與第5肋間交叉處」，正確；D評估脈搏應記錄速率、節律、強度並比較左右對稱，正確。B「聽診第三心音採左側臥、以膜面聽心尖」——S3是「低頻(low-pitched)」聲音，應以聽診器的「鐘面(bell)」輕貼心尖聽診(膜面適合聽高頻音如S1/S2、雜音)，故「以膜面」聽S3是錯誤(應用鐘面)。故錯誤為B。　深入補充：第三心音(S3)為低頻音、出現於舒張早期快速充盈期，以聽診器「鐘面(bell)」輕貼心尖、左側臥聽診最清楚(膜面適合高頻音如S1/S2、心雜音)。S3在年輕人/孕婦可為生理性，在成人常提示心衰竭/容量過載。","options":{"A":"頸靜脈高度5公分(>3~4)提示右心房壓偏高，正確。","B":"錯誤(正解)。第三心音為低頻音，應以「鐘面(bell)」聽診，非膜面。","C":"心尖最大搏動點正常在左鎖骨中線第5肋間，正確。","D":"評估脈搏記錄速率節律強度並比較左右，正確。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"110110-N3-30":{"quick":"T波代表心室「再極化」(不是去極化)；心室去極化是QRS波，故B錯誤。","detail":{"background":"心電圖判讀：A胸導程V5置於「左腋前線第5肋間」，正確；C運動心電圖評估運動誘發的心肌缺氧，正確；D「相鄰2個R波為5大格→300÷5＝60次/分」，正確。B「T波表示心室去極化」錯誤——T波代表心室「再極化(舒張)」，「心室去極化」是QRS波。故錯誤為B。　深入補充：心電圖——P波(心房去極化)、QRS(心室去極化)、T波(心室「再」極化)。胸前導程V1~V6由胸骨右緣第4肋間依序排到左腋中線第5肋間(V5在左腋前線第5肋間)。心率5大格→300÷5＝60次/分。運動心電圖評估心肌缺血。","options":{"A":"V5置於左腋前線第5肋間，正確。","B":"錯誤(正解)。T波代表心室「再極化」，心室去極化是QRS波。","C":"運動心電圖可評估心肌缺氧，正確。","D":"相鄰R波5大格→300÷5＝60次/分，正確。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"111030-N3-31":{"quick":"心衰竭的第三心音(S3)出現在「心室舒張早期(快速充盈期)」，不是「舒張末期」；故D錯誤。","detail":{"background":"心音聽診：A第一心音由「僧帽瓣與三尖瓣(房室瓣)關閉」血液撞擊產生，正確；B主動脈瓣聽診區在「胸骨右緣第2肋間」，正確；C聽到第二心音(半月瓣關閉)之後進入心室「舒張期」，正確。D錯誤——「第三心音(S3)」出現於「心室舒張『早期』的快速充盈期」(S2之後不久)，是血液快速衝入擴張/順應性下降的心室所致(心衰竭、容量過載常見)，並非「舒張末期」(舒張末期出現的是第四心音S4，與心房收縮有關)。故錯誤為D。　深入補充：S1(房室瓣關閉)＝收縮期開始；S2(半月瓣關閉)＝舒張期開始。主動脈瓣聽診區在胸骨右緣第2肋間。第三心音(S3)出現在「舒張早期(快速充盈期)」(心衰竭/容量過載)；第四心音(S4)在舒張末期(心房收縮、心室順應性下降)。","options":{"A":"第一心音由房室瓣(僧帽瓣、三尖瓣)關閉產生，正確。","B":"主動脈瓣聽診區在胸骨右緣第2肋間，正確。","C":"第二心音之後進入心室舒張期，正確。","D":"錯誤(正解)。第三心音出現在舒張「早期(快速充盈期)」，非舒張末期。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"111030-N3-32":{"quick":"正常血流動力學數值為「上腔靜脈壓8 mmHg」；右心房壓130、右心室收縮壓120、左心室舒張壓40皆異常過高。","detail":{"background":"正常壓力參考值：右心房壓(≈CVP)約2~8 mmHg、右心室收縮壓約15~25 mmHg、左心室舒張末壓約5~12 mmHg、上腔靜脈壓(≈CVP)約2~8 mmHg。本題：A右心房壓130(嚴重過高，幾乎不可能)、B右心室收縮壓120(過高，正常約25)、C左心室舒張壓40(過高，正常<12)皆異常；D「上腔靜脈壓8 mmHg」落在正常範圍。故正常者為D。　深入補充：壓力正常值——右心房壓/CVP 2~8、右心室約25/5、肺動脈約25/10、肺動脈楔壓6~12、左心室約120/10、上腔靜脈壓≈CVP 2~8 mmHg。本題唯上腔靜脈壓8 mmHg正常，其餘數值皆異常過高。","options":{"A":"右心房壓130 mmHg嚴重異常(正常2~8)。","B":"右心室收縮壓120 mmHg過高(正常約15~25)。","C":"左心室舒張壓40 mmHg過高(正常<12)。","D":"正解。上腔靜脈壓8 mmHg在正常範圍(2~8)。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"111030-N3-33":{"quick":"輸注Nitroprusside(Nipride)須以「不透光錫箔紙包住點滴瓶與輸液管」避光(它對光敏感、遇光分解)。","detail":{"background":"Nitroprusside(硝普鈉, Nipride)是強力動靜脈血管擴張劑，用於高血壓急症與降低後負荷。它「對光極敏感、遇光易分解(產生氰化物)」，故輸注時須以「不透光的錫箔紙/避光套包住點滴瓶與整條輸液管」避光保存，並現配現用、注意硫氰酸鹽/氰化物毒性。其他選項中Diazoxide、Dobutamine、Nitroglycerin(Tridil)雖各有保存注意事項(NTG也建議避免長時間光照、且會吸附於PVC材質)，但「必須以錫箔紙整條避光」最典型且強調的是「Nitroprusside」。故答案為D。　深入補充：Nitroprusside(Nipride)是強力動靜脈血管擴張劑，用於高血壓急症、急性心衰竭降後負荷；對光極敏感(遇光分解產生氰化物)，須以錫箔紙整條避光、現配現用、限時更換，並監測硫氰酸鹽/氰化物毒性(尤其腎/肝功能不全者)。","options":{"A":"Diazoxide非以避光錫箔紙包覆為其最典型注意事項。","B":"Dobutamine非典型需整條避光者。","C":"Nitroglycerin雖建議避光、且會吸附PVC，但本題最典型須錫箔避光者為Nitroprusside。","D":"正解。Nitroprusside對光敏感，須以不透光錫箔紙包住點滴瓶及輸液管避光。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}}},TO=["C1冠狀動脈疾病與心絞痛", "C2心肌梗塞", "C3心臟衰竭與肺水腫", "C4心律不整節律器與去顫", "C5瓣膜性心臟病與風濕熱", "C6心內膜炎心包與心肌疾病", "C7高血壓", "C8周邊血管疾病", "C9心臟手術心導管與循環輔助", "C10心血管評估血流動力學與心臟生理藥理"],LEC={"C1冠狀動脈疾病與心絞痛":{"title":"C1 冠狀動脈疾病與心絞痛 複習講義","html":"<h3>一、病理與分型</h3><p>冠狀動脈粥狀硬化使管腔狹窄→心肌「<b>供氧&lt;需氧</b>」即缺血。<b>心絞痛三型</b>：①<b>穩定型(勞動型)</b>＝固定狹窄，<b>費力/情緒/飽餐/寒冷(4E)</b>誘發、休息或NTG數分鐘緩解、程度可預測；②<b>不穩定型</b>＝休息時也痛、頻率強度增加(屬急性冠心症)；③<b>變異型(Prinzmetal)</b>＝<b>冠脈痙攣</b>，常於休息/夜間發作、發作時<b>ST段上升</b>。</p><h3>二、危險因子與動脈粥狀硬化</h3><p>內皮損傷→LDL氧化沉積、泡沫細胞、血小板凝集、纖維帽→管腔狹窄變硬。<b>抽菸</b>：交感↑血管收縮、血小板凝集↑、CO結合血紅素使<b>攜氧↓</b>。控制：戒菸、降LDL、控糖控壓、運動。</p><h3>三、治療藥物(降需氧＋抗血栓)</h3><p>①<b>NTG(硝化甘油)</b>：擴張靜脈降前負荷、擴冠脈→<b>舌下含服不可吞</b>、坐/臥姿防姿勢性低血壓、可活動前預防用、急性發作<b>每5分1顆最多3顆(15分)無效即就醫</b>、<b>棕色遮光瓶</b>保存。②<b>β阻斷劑</b>：降心率/收縮力/血壓→降耗氧(氣喘禁用、勿驟停)。③<b>鈣阻斷劑</b>：擴冠脈降後負荷。④<b>Aspirin</b>：抑制血小板COX-1→抗血栓(非止痛)。</p><h3>四、PTCA/支架護理</h3><p>股動脈穿刺後<b>患肢伸直制動6~8小時、加壓止血</b>(屈膝屈髖會出血)；監測雙側脈搏/末梢循環、心電圖；多喝水排顯影劑；<b>不會立即拔除所有導管</b>(抗凝狀態保留鞘管)。支架後須持續<b>雙抗血小板</b>，不可自行停藥(防支架內血栓)。</p>"},"C2心肌梗塞":{"title":"C2 心肌梗塞 複習講義","html":"<h3>一、診斷三本柱</h3><p>①<b>胸痛</b>：持續&gt;20~30分、休息與NTG皆<b>無法緩解</b>(與心絞痛鑑別)、冷汗噁心瀕死感。②<b>心電圖</b>：缺血<b>T波倒置</b>→損傷<b>ST上升</b>→壞死<b>病理性Q波(永久)</b>。定位：II/III/aVF=下壁(RCA)、V3~V4=前壁(LAD)、I/aVL/V5~6=側壁(LCX)。③<b>心肌酵素</b>：<b>肌紅素</b>最早升最快退(無特異)；<b>Troponin I</b>最敏感特異、是黃金標準、持續7~14天；CK-MB升4~6h峰24h；LDH1/LDH2&gt;1(翻轉)。</p><h3>二、Killip分級</h3><p>Ⅰ無心衰；Ⅱ輕中度(肺底囉音/S3)；<b>Ⅲ＝急性肺水腫</b>；Ⅳ＝心因性休克。級數越高死亡率越高。</p><h3>三、急性期處置與護理</h3><p><b>MONA</b>：適度給氧、嗎啡(止痛、降焦慮、擴靜脈<b>降前負荷</b>)、NTG、Aspirin抗血小板；<b>STEMI於12小時內</b>給血栓溶解劑或PCI再灌流；heparin抗凝監測<b>aPTT</b>。半坐臥降前負荷、限鈉減體液、<b>禁等長運動(Valsalva升負荷)</b>。最常見且致死併發症＝<b>心律不整(心室顫動)</b>。</p><h3>四、心臟復健</h3><p>分期：第一期住院(教育＋漸進低強度活動)→第二期門診監測運動→第三期維持。<b>1 MET＝3.5 mL O₂/kg/min</b>。原則：暖身、<b>有氧</b>運動、<b>不可閉氣(Valsalva)</b>、餐後勿立即運動、心率增加<b>不超過休息時約20%(20次/分)</b>、血壓升幅&lt;25 mmHg、出現胸悶胸痛眩暈即停。性生活約3~5 MET(上下兩層樓)、NTG事前用、避免飽餐酒後。</p>"},"C3心臟衰竭與肺水腫":{"title":"C3 心臟衰竭與肺水腫 複習講義","html":"<h3>一、左、右心衰竭鑑別</h3><p><b>左心衰竭→肺鬱血</b>：呼吸困難(活動時)、端坐呼吸、陣發性夜間呼吸困難、咳嗽<b>泡沫(可帶血絲)痰</b>、肺底囉音、左心房壓↑。<b>右心衰竭→體循環鬱血</b>：<b>下垂性水腫(早期)</b>、頸靜脈怒張、肝脾腫大、腹水、<b>肝頸反流陽性</b>、CVP↑、體重增加。</p><h3>二、前負荷/後負荷與NYHA</h3><p>前負荷＝靜脈回流/舒張末容量(吸氣、VSD分流增加；失血、周邊擴張減少)；後負荷＝動脈阻力(主動脈狹窄、高血壓、肺高壓增加)。<b>NYHA</b>：Ⅰ不受限；Ⅱ一般活動有症狀；Ⅲ低於一般活動有症狀、休息舒適；<b>Ⅳ休息時即有症狀</b>。</p><h3>三、藥物</h3><p>①<b>毛地黃(digoxin)</b>：正性肌力。中毒＝<b>腸胃道(最早:噁心嘔吐厭食)＋黃綠視覺＋心搏過慢/房室阻滯</b>；誘因＝<b>低血鉀(最重要)</b>、低血鎂、高血鈣、腎功能不全；給藥前測<b>心尖脈滿1分鐘、&lt;60暫停</b>；併thiazide排鉀<b>增加</b>中毒(非避免)；U波(低血鉀)警覺中毒。②<b>Dopamine劑量</b>：低(1~3)腎血流、中(3~10)β1增收縮、高(&gt;10)α血管收縮。③Dobutamine＝β1強心(左心泵衰竭)。</p><h3>四、急性肺水腫與護理</h3><p>大量<b>粉紅泡沫痰</b>、端坐呼吸、全肺囉音、冷汗。<b>高坐臥(雙腳下垂)、積極供氧、限水限鈉、依醫囑嗎啡(降前後負荷)、利尿</b>。<b>勿抬高下肢/頭低腳高</b>(增回心血量加重肺鬱血)。最需密切觀察＝<b>肺部囉音</b>。</p>"},"C4心律不整節律器與去顫":{"title":"C4 心律不整、節律器與去顫 複習講義","html":"<h3>一、心房顫動(Af)</h3><p>心房不規則顫動、<b>無清楚P波</b>、心室律<b>不規則的不規則</b>；心尖脈&gt;橈動脈＝<b>脈搏短絀</b>。左心房(尤左心耳)易生血栓→須<b>長期口服抗凝劑Warfarin</b>(非Heparin、非抗血小板)預防中風。</p><h3>二、抗心律不整藥(Vaughan-Williams)</h3><p>Ⅰ類＝<b>鈉通道阻斷</b>(lidocaine、phenytoin治毛地黃中毒心律不整)；Ⅱ＝β阻斷劑；Ⅲ＝<b>鉀通道阻斷</b>(amiodarone)；Ⅳ＝鈣通道阻斷。Warfarin監測<b>PT/INR</b>(非PTT)、漏服不可補雙倍、避免大量深綠蔬菜(維生素K)與銀杏當歸。</p><h3>三、整流 vs 去顫</h3><p><b>去顫(非同步)</b>用於<b>心室顫動(VF)、無脈搏VT</b>；<b>同步整流(cardioversion)</b>用於有脈搏的VT、Af、PSVT。<b>AED</b>＝只做非同步去顫、可由民眾操作、裝節律器仍可用(貼片避開)、放電前清場；操作「開、貼、插、按」。PSVT可先試<b>迷走刺激(Valsalva、頸動脈竇按摩)</b>；A-V block不可用頸動脈竇按摩。</p><h3>四、心臟節律器護理</h3><p>適應症＝<b>完全(三度)房室傳導阻滯</b>等過慢/傳導阻滯。術後：12導程確認、抗生素、<b>每日測脈搏1分鐘</b>、<b>患側手臂4~6週內避免抬高/提重物</b>(防電極移位)、<b>不可按摩植入處</b>、攜識別卡、避強磁場(MRI)。<b>持續打嗝</b>＝電極移位刺激橫膈的<b>異常徵象→就醫</b>(非用Valsalva自解)。心電圖<b>激搏波(spike)</b>後接QRS＝正常起搏。心律變慢可能電池將盡。</p>"},"C5瓣膜性心臟病與風濕熱":{"title":"C5 瓣膜性心臟病與風濕熱 複習講義","html":"<h3>一、瓣膜聽診位置(APT-M)</h3><p>主動脈瓣＝胸骨<b>右</b>緣第2肋間；肺動脈瓣＝胸骨<b>左</b>緣第2肋間；三尖瓣＝胸骨左緣第4~5肋間；<b>二尖瓣(僧帽瓣)＝心尖(左鎖骨中線第5肋間)</b>。</p><h3>二、二尖瓣病變</h3><p><b>二尖瓣狹窄</b>：血鬱左心房→<b>左心房壓↑、左房擴大(易Af、左房血栓→全身性栓塞)</b>→回堵肺循環(肺鬱血、PCWP↑)、肺高壓→右心壓↑、CVP↑、心輸出↓；<b>舒張期</b>雜音。<b>二尖瓣逆流</b>：<b>收縮全期(泛收縮期)</b>雜音於心尖傳腋下。症狀以肺鬱血(呼吸困難、端坐呼吸、咳嗽)為主。</p><h3>三、風濕熱/風濕性心臟病</h3><p><b>A群β溶血性鏈球菌</b>咽喉炎後的<b>自體免疫</b>反應(非化膿)，<b>好發5~15歲兒童</b>；最常侵犯<b>二尖瓣</b>。Jones主要表現：心臟炎、游走性多發關節炎、舞蹈症、<b>邊緣性紅斑</b>、<b>皮下結節(無痛、骨突處)</b>；ESR/CRP↑。治療：<b>抗生素(penicillin)</b>、急性期<b>臥床休息</b>、心衰竭低鹽。</p><h3>四、人工瓣膜選擇</h3><p><b>機械瓣</b>：金屬、<b>耐用</b>但血栓性高→<b>須終身Warfarin</b>，適合<b>較年輕、無懷孕計畫、無出血傾向</b>者。<b>生物瓣</b>：<b>不需終身抗凝</b>(僅短期)但耐用性差(10~15年)，適合<b>高齡、出血傾向、計畫懷孕婦女(避Warfarin致畸)</b>。</p>"},"C6心內膜炎心包與心肌疾病":{"title":"C6 心內膜炎、心包與心肌疾病 複習講義","html":"<h3>一、感染性心內膜炎</h3><p>微生物侵犯瓣膜/心內膜形成贅生物；<b>最常見菌＝金黃色葡萄球菌</b>(亞急性自體瓣膜為草綠色鏈球菌)。危險因子＝瓣膜異常、<b>人工瓣膜/節律器/人工血管</b>、靜脈藥癮、侵入處置。表現：發燒、<b>新心雜音</b>、栓塞(腦栓塞)、周邊徵象——<b>Janeway病灶(手掌腳底無痛斑)、Osler結節(指趾痛性結節)、裂片狀出血(甲床)、Roth斑(視網膜，非四肢)</b>。</p><h3>二、心包膜炎/心包積水</h3><p>胸痛<b>平躺/深呼吸加重、前傾坐起減輕</b>(故採前傾坐姿、勿鼓勵平躺深呼吸)；心包膜摩擦音(積液增多時<b>減弱/消失</b>)；積液→心音模糊、心輸出↓、頸靜脈怒張。可用Aspirin/NSAID止痛。</p><h3>三、心包填塞(cardiac tamponade)</h3><p>液體壓迫心臟→充盈受限、心輸出驟降。<b>Beck三徵＝頸靜脈怒張＋心音模糊低沉＋動脈性低血壓</b>；加<b>奇異脈(吸氣時收縮壓↓&gt;10 mmHg)</b>、<b>脈搏壓變窄</b>、心搏過速、尿量減少。處置：心包穿刺引流、補液維持前負荷、監測。</p><h3>四、心肌病變/心肌炎</h3><p><b>擴張型(最常見，常繼發心肌炎/酒精)</b>、<b>肥厚型(多遺傳、可運動猝死)</b>、限制型(最少見，澱粉樣)。皆使<b>心輸出↓</b>、心律不整。擴張型如心衰竭需<b>限水</b>。<b>心肌炎須休息</b>(費力/阻力運動易誘發心律不整猝死)、用毛地黃監測脈搏、類固醇觀察腸胃出血。</p>"},"C7高血壓":{"title":"C7 高血壓 複習講義","html":"<h3>一、分類與合併症</h3><p><b>原發性(本態性)約90~95%</b>(遺傳、肥胖、高鈉/酒精、壓力等多因子)；續發性少數(腎、內分泌等特定病因)。<b>惡性高血壓</b>＝血壓急遽嚴重升高(舒張壓常&gt;120~130)＋器官急性損傷，為內科急症。長期控制不佳→<b>腦(中風)、眼(視網膜)、心(肥大/衰竭)、腎(腎病變)</b>標靶器官損害。</p><h3>二、生活型態(非藥物)</h3><p>控制體重(正常BMI)、<b>減鈉(&lt;6 g鹽)</b>、<b>DASH足量鉀鈣鎂</b>、限酒(男≤約30 mL/女≤15 mL純酒精)、<b>有氧運動</b>、戒菸。避免泡熱水澡(姿勢性低血壓)、避免等長運動(Valsalva升壓)。合併CKD血壓控更嚴(約&lt;130/80~85)。</p><h3>三、低鈉飲食衛教</h3><p>清蒸水煮取代滷製、天然辛香料取代鹽醬油沙茶、避免罐頭醃漬加工；<b>味素(麩胺酸鈉)、小蘇打(碳酸氫鈉)、醬油都含鈉須限制</b>。</p><h3>四、藥物與護理</h3><p><b>ACEI</b>(captopril)＝抑制血管收縮素<b>I→II</b>，副作用乾咳、高血鉀；<b>β阻斷劑(propranolol)</b>＝降心率，<b>氣喘禁用、服藥前測心跳、勿驟停(反彈)</b>；<b>保鉀利尿劑(spironolactone)</b>用者<b>限高鉀食物</b>(防高血鉀)；降壓藥定時定量、每日固定時間測血壓。</p>"},"C8周邊血管疾病":{"title":"C8 周邊血管疾病 複習講義","html":"<h3>一、動脈 vs 靜脈功能不全</h3><p><b>動脈(PAD/ASO)</b>：<b>間歇性跛行</b>、抬高蒼白/下垂潮紅、<b>脈搏減弱消失</b>、皮膚冰冷光亮無毛、<b>潰瘍在腳趾/壓力點(痛)</b>、趾甲增厚。處置：<b>步行(促側枝循環)</b>、患肢<b>下垂(勿抬高)</b>、戒菸低脂、<b>勿熱敷/勿過緊衣物</b>。<b>靜脈</b>：<b>水腫、踝部色素沉著、內踝鬱滯性潰瘍</b>、痠脹。處置：<b>抬高、彈性襪、運動、控制體重</b>。</p><h3>二、特殊動脈疾病</h3><p><b>柏格氏病(Buerger)</b>：年輕男吸菸者、遠端中小動脈/靜脈發炎閉塞、好發下肢、<b>戒菸為關鍵</b>。<b>雷諾氏病(Raynaud)</b>：年輕女性、<b>遠端肢端</b>遇冷/壓力痙攣、<b>蒼白→發紺→潮紅三相變色</b>。<b>腹主動脈瘤(AAA)</b>：<b>搏動性腫塊、腹部跳動感、收縮期嘈音</b>；控制血壓100~120、避免Valsalva；<b>背痛加劇＝擴大/破裂警訊</b>。</p><h3>三、深部靜脈栓塞(DVT)</h3><p><b>Virchow三要素</b>：血流鬱滯(久臥/久坐/長途飛行)、高凝、內皮損傷。徵象：單側紅腫熱痛、<b>Homan徵象(足背屈→腓腸肌痛)陽性</b>。處置：抬高、臥床、抗凝、彈性襪、<b>注意肺栓塞</b>。<b>絕不可按摩患肢(血栓脫落→肺栓塞)</b>、避免侵入治療。</p><h3>四、抗凝與靜脈曲張</h3><p>Warfarin監測<b>PT/INR</b>(Heparin看aPTT)、用電動刮鬍刀防出血、避免大量維生素K(深綠蔬菜)、血尿須通報、不可自停。<b>靜脈曲張</b>：抬高患肢、穿彈性襪(非緊身衣)、控制體重、運動；剝除術後<b>鼓勵足踝運動防DVT</b>、抬高床尾、下床穿彈性襪。靜脈瓣評估＝<b>逆流填充(Trendelenburg)、手壓測驗</b>(Allen評動脈、Homan評DVT)。</p>"},"C9心臟手術心導管與循環輔助":{"title":"C9 心臟手術、心導管與循環輔助 複習講義","html":"<h3>一、心導管與檢查</h3><p>心導管可<b>直接測各腔室壓力、心輸出量、做冠脈攝影</b>。檢查後穿刺側肢體<b>伸直制動、加壓止血</b>(勿屈曲彎曲)、多喝水排顯影劑、監測末梢循環(6P)。<b>橈動脈穿刺側不可用壓脈帶量血壓</b>。運動壓力試驗＝達<b>次極限目標心率(85%最大)</b>並監測缺血，出現症狀即停。<b>鉈-201</b>＝心肌灌注(缺血/梗塞部位範圍)。<b>運動心電圖無法測心輸出量</b>。</p><h3>二、IABP(主動脈內氣球幫浦)</h3><p>導管置<b>降主動脈</b>。<b>舒張期(主動脈瓣關閉)充氣</b>→增加冠脈灌流；<b>收縮期放氣</b>→降後負荷、減耗氧。護理：患肢伸直制動、<b>比較患肢與健肢末梢循環</b>(防下肢缺血)、給Heparin抗凝。</p><h3>三、ECMO/人工心肺機/移植</h3><p><b>ECMO</b>＝體外心肺循環，支持循環並氣體交換。人工心肺機術後以<b>魚精蛋白(Protamine)中和Heparin</b>(PT延長則用維生素K/FFP)。CABG術後警覺出血(<b>胸管&gt;100~200 mL/hr立即通報、評估凝血</b>，正出血者勿給Aspirin退燒)、少尿監測血鉀。<b>心臟移植最常見併發症＝排斥與感染</b>。</p><h3>四、心因性休克</h3><p>＝<b>心臟幫浦衰竭</b>(最常見<b>心肌梗塞</b>)使心輸出不足；表現<b>低血壓、灌流不足</b>(非呼吸停止)。治療：強心劑(dobutamine/dopamine)、<b>IABP</b>、必要時ECMO、給氧、處理病因。<b>禁用電毯/溫熱(周邊擴張使血壓更低)</b>。鑑別：敗血性(分布性)、出血(低血容性)、主動脈剝離/張力性氣胸(阻塞性)非心因性。</p>"},"C10心血管評估血流動力學與心臟生理藥理":{"title":"C10 心血管評估、血流動力學與心臟生理藥理 複習講義","html":"<h3>一、心電圖與心音</h3><p>波形：<b>P＝心房去極化、QRS＝心室去極化、T＝心室再極化</b>。心率＝<b>300÷R-R大方格數</b>(4格75、5格60)。心音：<b>S1＝房室瓣關閉＝收縮期開始</b>；<b>S2＝半月瓣關閉＝舒張期開始</b>；S1~S2間為收縮期；生理性<b>S2分裂於吸氣期</b>明顯；<b>S3(低頻、舒張早期)以鐘面聽心尖、左側臥</b>，見於心衰竭/容量過載。</p><h3>二、血流動力學正常值</h3><p>CVP/上腔靜脈壓≈2~8 mmHg、PAWP≈6~12、心輸出量≈4~8 L/min、MAP≈70~105。<b>MAP＝舒張壓＋1/3脈壓＝1/3收縮壓＋2/3舒張壓</b>(需≥60維持灌流)。<b>CVP與頸靜脈壓反映右心房壓</b>(敗血性休克時CVP↓，心衰/填塞/容量過量時↑)。頸靜脈壓＝內頸靜脈搏動最高點與胸骨角垂直距離(半坐臥30~45度)。</p><h3>三、心輸出量生理</h3><p><b>CO＝SV×HR</b>。<b>SV決定於前負荷、後負荷、心收縮力</b>(HR不決定SV)。心率過快(如200)舒張充盈時間不足→SV銳減→CO反而下降。低血壓治療：β1<b>致效劑</b>增心率收縮力(非拮抗劑)、α1致效升周邊阻力、頭低腳高增前負荷、中劑量dopamine。</p><h3>四、血脂與用藥</h3><p>正常：總膽固醇&lt;200、TG&lt;150、<b>LDL&lt;100~130(壞，越低越好)</b>、<b>HDL&gt;40(好，越高越保護)</b>。<b>BNP&gt;100 pg/mL提示心臟衰竭</b>。Allen test評橈/尺動脈通暢(陽性＝側枝不足)。<b>Nitroprusside(Nipride)對光敏感→錫箔紙避光輸注</b>。頸動脈嘈音＝頸動脈狹窄(湍流)。左心室肥大→心尖搏動<b>增強、左下偏移</b>。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^C(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='medn3cardio_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
