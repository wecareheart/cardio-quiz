血)、肺高壓、右心衰竭，並使左心房擴大易生Af與左房血栓(栓塞風險)。雜音為心尖區舒張中期隆隆音(diastolic rumble)。","options":{"A":"正解。二尖瓣狹窄使血液鬱積左心房、回堵肺循環，導致肺部鬱血。","B":"三尖瓣狹窄影響右心房→體循環鬱血，非肺鬱血。","C":"肺動脈瓣逆流影響右心室，非造成肺靜脈鬱血。","D":"肺動脈瓣狹窄增加右心室後負荷，非肺靜脈鬱血。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"104030-N3-9":{"quick":"二尖瓣(僧帽瓣)的聽診位置在「左鎖骨中線第五肋間(心尖)」。","detail":{"background":"心臟瓣膜聽診位置(口訣APT-M)：①主動脈瓣(A)——胸骨「右」緣第2肋間；②肺動脈瓣(P)——胸骨「左」緣第2肋間；③三尖瓣(T)——胸骨左緣下方第4~5肋間；④二尖瓣/僧帽瓣(M)——「心尖區，左鎖骨中線第5肋間」。二尖瓣音在心尖最清楚(第一心音S1於此最響)。故二尖瓣聽診位置為左鎖骨中線第5肋間。　深入補充：心臟瓣膜聽診位置記憶「APT-M」由上而下、由右而左：主動脈瓣(右2肋間)、肺動脈瓣(左2肋間)、三尖瓣(左下胸骨緣4~5肋間)、二尖瓣(心尖、左鎖骨中線第5肋間)。第一心音在心尖最響、第二心音在心底最響。","options":{"A":"胸骨左緣第4肋間較接近三尖瓣區。","B":"正解。二尖瓣(僧帽瓣)聽診於左鎖骨中線第5肋間(心尖)。","C":"胸骨左緣第2肋間是肺動脈瓣區。","D":"胸骨右緣第2肋間是主動脈瓣區。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"104030-N3-29":{"quick":"「肺動脈瓣硬化」屬非風濕熱(退化/先天)所致的瓣膜病變；風濕熱主要侵犯二尖瓣、主動脈瓣造成逆流/狹窄。","detail":{"background":"風濕性心臟病(風濕熱後遺)最常侵犯「二尖瓣」(其次主動脈瓣)，造成瓣膜閉鎖不全(逆流)與狹窄，故二尖瓣逆流、主動脈瓣狹窄、瓣膜閉鎖不全都是風濕熱常見的瓣膜後遺。而「肺動脈瓣」極少被風濕熱侵犯，「肺動脈瓣硬化」多為退化性或先天性病變(非風濕熱感染所致)。本題問「非風濕熱感染常見」的瓣膜病變，故選肺動脈瓣硬化。　深入補充：風濕熱主要侵犯二尖瓣(其次主動脈瓣)，造成狹窄與逆流，三尖瓣偶受累、肺動脈瓣極少。退化性主動脈瓣鈣化(老年)、二尖瓣脫垂、感染性心內膜炎是非風濕熱的瓣膜病變來源。肺動脈瓣硬化多為退化/先天。","options":{"A":"瓣膜閉鎖不全是風濕熱常見後遺。","B":"僧帽瓣(二尖瓣)逆流是風濕熱最常見的瓣膜後遺。","C":"主動脈瓣狹窄可由風濕熱引起。","D":"正解。肺動脈瓣硬化屬退化/先天性，非風濕熱感染所致。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"107030-N3-28":{"quick":"風濕熱的皮下結節是「無痛性」、位於骨突與肌腱處；說「疼痛性皮下結節」是錯誤。","detail":{"background":"風濕熱是A群β型溶血性鏈球菌咽喉感染後，因「自體免疫(交叉反應)」引起的全身發炎(非細菌直接侵犯心臟的化膿性炎症)。Jones診斷標準的主要表現：心臟炎(可致二尖瓣損傷)、游走性多發性關節炎、舞蹈症、邊緣性紅斑、「皮下結節(無痛性、堅硬、位於骨突與肌腱伸側)」。本題A把皮下結節描述為「疼痛性」是錯的——風濕熱皮下結節是「無痛性」。喉頭培養出A群鏈球菌、二尖瓣損傷、自體免疫機轉皆正確。　深入補充：風濕熱以修訂版Jones標準診斷(2個主要或1主要+2次要，加鏈球菌感染證據)。主要：心臟炎、多發性關節炎、舞蹈症、邊緣性紅斑、皮下結節(無痛、骨突)。次要：發燒、關節痛、ESR/CRP↑、PR間距延長。治療含抗生素根除鏈球菌、抗發炎、長期預防性盤尼西林。","options":{"A":"錯誤(正解)。風濕熱皮下結節是「無痛性」，非疼痛性。","B":"風濕熱心臟炎可造成二尖瓣損傷，正確。","C":"風濕熱與自體免疫有關、屬非細菌性炎症反應，正確。","D":"前驅為A群β型溶血性鏈球菌咽喉感染，正確。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"108020-N3-31":{"quick":"腹水、下肢水腫、肝脾腫大(體循環鬱血)→最可能是右心受累的「三尖瓣閉鎖不全」。","detail":{"background":"三尖瓣位於右心房與右心室間。「三尖瓣閉鎖不全(逆流)」時右心室收縮的血液逆流回右心房→右心房與體循環靜脈壓上升→體循環鬱血，表現為頸靜脈怒張、肝脾腫大、腹水、下肢水腫(與右心衰竭相同的體循環鬱血徵象)。主動脈瓣/二尖瓣病變主要影響左心→肺鬱血(呼吸困難)。本題以「腹水、下肢水腫、肝脾腫大」為主，指向右心系統的三尖瓣閉鎖不全。　深入補充：腹水、下肢水腫、肝脾腫大是體循環鬱血(右心系統)表現。三尖瓣閉鎖不全使右心室血逆流回右心房→右心房與體循環靜脈壓上升。常繼發於右心室擴大/肺高壓(功能性逆流)。聽診為胸骨左下緣的收縮期雜音、吸氣時增強。","options":{"A":"主動脈瓣狹窄影響左心室，表現為心絞痛、暈厥、左心衰，非體循環鬱血為主。","B":"二尖瓣狹窄主要造成肺鬱血(呼吸困難)，非以腹水肝脾腫大為主。","C":"正解。三尖瓣閉鎖不全造成體循環鬱血，出現腹水、下肢水腫、肝脾腫大。","D":"二尖瓣閉鎖不全主要影響左心→肺鬱血。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"109030-N3-13":{"quick":"風濕熱②須用抗生素(penicillin)、④有心衰竭須低鹽飲食(選D 24)；最常侵犯二尖瓣(非三尖瓣)、急性期應臥床休息(非多運動)。","detail":{"background":"風濕熱處置與特性：①最常侵犯的瓣膜是「二尖瓣」(非三尖瓣)；②為A群鏈球菌感染後的免疫反應，須使用「抗生素(penicillin)」清除鏈球菌並長期預防復發；③急性期心臟炎時應「臥床休息」減少心臟負荷，「不可」多從事體能活動(反而加重心臟損傷)；④若併心衰竭，須採「低鹽飲食」減少體液負荷。故正確為②④(D)。　深入補充：風濕熱好發5~15歲兒童、A群鏈球菌咽喉炎後1~5週發病、自體免疫機轉、最常侵犯二尖瓣；治療含penicillin根除鏈球菌、急性期臥床休息、抗發炎(aspirin/類固醇)、心衰竭低鹽，並長期預防復發。","options":{"A":"含①(應為二尖瓣)、③(應臥床休息)，皆錯誤。","B":"含①(三尖瓣錯誤)，不符。","C":"含③(應休息非多運動)，不符。","D":"正解。②須用抗生素、④心衰竭採低鹽飲食。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"109030-N3-25":{"quick":"26歲計畫懷孕者：因Warfarin有致畸性，應選「生物性瓣膜、不可服Warfarin」。","detail":{"background":"人工瓣膜選擇考量：①「機械瓣」耐用(可達一生)但血栓性高，須「終身服用Warfarin」抗凝，適合年輕但「無懷孕計畫、無出血傾向」者；②「生物瓣(組織瓣)」血栓性低、通常不需長期抗凝(或僅短期)，但耐用性較差(約10~15年需再換)，適合「高齡、有出血風險、或有生育計畫的婦女」。本題26歲計畫懷孕——因Warfarin會通過胎盤致胎兒畸形/出血(致畸性)，「不可」使用，故應選「生物性瓣膜並避免Warfarin」。　深入補充：機械瓣須終身Warfarin、血栓性高、耐用；生物瓣不需長期抗凝、耐用性差(10~15年)。Warfarin為致畸物(尤其妊娠6~12週)，計畫懷孕者選生物瓣或孕期改用Heparin/LMWH。瓣膜選擇需綜合年齡、生育計畫、出血風險與遵從性。","options":{"A":"機械瓣須終身Warfarin，Warfarin有致畸性，對計畫懷孕者不適當。","B":"正解。計畫懷孕者宜選生物性瓣膜、不可服Warfarin(避免致畸)。","C":"機械瓣「必須」抗凝，「不服Warfarin」會致瓣膜血栓，矛盾不當。","D":"生物瓣通常不需長期Warfarin；對計畫懷孕者更應避免Warfarin。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"109030-N3-30":{"quick":"二尖瓣閉鎖不全(逆流)的心雜音出現於「收縮全期(holosystolic/泛收縮期)」。","detail":{"background":"二尖瓣閉鎖不全(逆流)：心室「收縮」時，左心室的血應全部射向主動脈，但因二尖瓣關閉不全，部分血逆流回左心房，產生雜音；此逆流貫穿整個收縮期，故為「收縮全期(泛收縮期, holosystolic)雜音」，在心尖最清楚並可傳向腋下。對比：二尖瓣狹窄為「舒張期」雜音。故二尖瓣逆流雜音出現於收縮全期。　深入補充：二尖瓣逆流為心尖區「收縮全期(泛收縮期)」雜音、可傳向腋下；二尖瓣狹窄為舒張中期隆隆音。主動脈瓣狹窄為收縮期噴射性雜音(傳向頸部)、主動脈瓣逆流為舒張早期遞減性雜音。依雜音時相與位置可鑑別瓣膜病變。","options":{"A":"舒張全期雜音見於主動脈瓣逆流等，非二尖瓣逆流。","B":"舒張期雜音常見於二尖瓣「狹窄」，非逆流。","C":"正解。二尖瓣逆流為收縮全期(泛收縮期)雜音。","D":"收縮末期雜音型態(如二尖瓣脫垂)非典型二尖瓣逆流之全期雜音。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"109110-N3-26":{"quick":"僧帽瓣(二尖瓣)逆流/狹窄主要造成肺鬱血→①呼吸困難、③端坐呼吸、④咳嗽(選B 134)；下肢水腫、肝腫大屬右心後期。","detail":{"background":"僧帽瓣(二尖瓣)逆流或狹窄主要使血液鬱積於左心房、回堵肺循環，造成「肺鬱血」症狀：①呼吸困難、③端坐呼吸、④咳嗽(可咳血/泡沫痰)、陣發性夜間呼吸困難。隨病程進展、肺高壓導致右心衰竭後，才出現②下肢水腫、⑤肝腫大等體循環鬱血。本題問「易出現」之症狀，以肺鬱血為主，故①③④(B)。　深入補充：二尖瓣病變(狹窄/逆流)使血鬱左心房、回堵肺循環，主要表現肺鬱血(呼吸困難、端坐呼吸、咳嗽、咳血)。進展為肺高壓、右心衰竭後才出現下肢水腫、肝腫大。二尖瓣狹窄左房擴大易併心房顫動與栓塞。","options":{"A":"含②下肢水腫(右心後期)，非二尖瓣病變最主要早期症狀。","B":"正解。①呼吸困難、③端坐呼吸、④咳嗽為肺鬱血主要表現。","C":"含②⑤(體循環鬱血、右心後期)，不符主要表現。","D":"含②⑤，不符。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"110110-N3-32":{"quick":"僧帽瓣狹窄使「左心房壓力上升、左心房擴大」(易併心房顫動與左房血栓)。","detail":{"background":"僧帽瓣(二尖瓣)狹窄：左心房血液難排入左心室→「左心房壓力上升、左心房擴大」，擴大的左房易出現心房顫動，並在鬱滯的左心房(尤其左心耳)形成血栓→脫落造成「全身性動脈栓塞(如腦中風)」而非周邊靜脈栓塞。壓力進一步回堵肺循環→肺高壓、右心衰竭，並非使「周邊血壓上升」。其雜音為「舒張期」(非收縮期)。故正確為A「左心房壓力上升、左心房擴大」。　深入補充：二尖瓣狹窄使左心房壓上升、左房擴大(易Af與左房血栓→全身性動脈栓塞如腦中風)、回堵肺循環致肺高壓與右心衰竭、心輸出下降。雜音為舒張期。治療含利尿、控制心室率、抗凝、瓣膜整形(經皮二尖瓣氣球擴張術)或置換。","options":{"A":"正解。僧帽瓣狹窄使左心房壓力上升、左心房擴大。","B":"血液鬱積左心房回堵肺循環(肺高壓)，並非使周邊血壓上升。","C":"左房血栓造成的是「全身性動脈」栓塞，非周邊「靜脈」栓塞。","D":"僧帽瓣狹窄為「舒張期」雜音，非收縮期。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"111110-N3-26":{"quick":"86歲高齡者宜選「生物性瓣膜、不需終身服Warfarin」(耐用性需求低、避免抗凝出血風險)。","detail":{"background":"人工瓣膜選擇：機械瓣耐用但須「終身抗凝(Warfarin)」、血栓性高，適合較年輕者；生物瓣耐用性較差(約10~15年)但血栓性低、「通常不需終身抗凝」，適合高齡(餘命內瓣膜夠用)、有出血風險或計畫懷孕者。86歲高齡病人預期壽命內生物瓣足夠耐用，且可避免長期抗凝的出血風險，故宜選「生物性瓣膜、不需終身服Warfarin」。　深入補充：高齡者選生物瓣(餘命內耐用、避免長期抗凝出血)；年輕、無懷孕計畫、無出血傾向者選機械瓣(耐用但須終身Warfarin)。瓣膜置換後仍須監測瓣膜功能、預防感染性心內膜炎(侵入處置前抗生素預防)。","options":{"A":"機械瓣須終身Warfarin，對86歲高齡增加出血風險，較不適合。","B":"正解。高齡者宜選生物性瓣膜、不需終身服Warfarin。","C":"機械瓣「必須」終身抗凝，「不需Warfarin」矛盾不當。","D":"生物瓣通常不需終身Warfarin，「需終身Warfarin」敘述不正確。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"111110-N3-29":{"quick":"「凝血時間延長」不是風濕熱的主要臨床表徵；風濕熱主要表現是心臟炎、多發性關節炎、舞蹈症、邊緣性紅斑、皮下結節。","detail":{"background":"風濕熱的主要表現(Jones標準主要項)：①心臟炎(carditis)；②游走性多發性關節炎；③舞蹈症(Sydenham chorea)；④「邊緣性紅斑(erythema marginatum)」；⑤「皮下結節(無痛、骨突處)」。次要表現含發燒、關節痛、ESR/CRP上升、PR間距延長等。「凝血時間延長」並非風濕熱的特徵(風濕熱無凝血功能障礙)。本題問錯誤者，B凝血時間延長不是風濕熱表徵。　深入補充：風濕熱Jones主要表現五項——心臟炎、游走性多發關節炎、舞蹈症、邊緣性紅斑、皮下結節(無痛、骨突處)。「凝血時間延長」非其表現。次要表現含發燒、關節痛、ESR/CRP升高、PR間距延長。","options":{"A":"邊緣性紅斑是風濕熱主要表現之一，正確。","B":"錯誤(正解)。凝血時間延長不是風濕熱的臨床表徵。","C":"多發性(游走性)關節炎是風濕熱主要表現，正確。","D":"皮下結節是風濕熱主要表現，正確。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"112030-N3-32":{"quick":"「50歲停經婦女」最適合機械瓣(較年輕需耐用、無懷孕計畫、無出血傾向)；出血傾向、計畫生育、80歲老人皆不宜機械瓣。","detail":{"background":"機械瓣耐用(終身)但須「終身服Warfarin」、血栓性高，最適合「較年輕、預期壽命長、無出血傾向、無懷孕計畫」者(可長期受益於耐用性、能配合終身抗凝)。逐一評估：①出血傾向者——抗凝出血風險高，不宜機械瓣；②計畫生育婦女——Warfarin致畸，不宜機械瓣；③80歲老人——餘命內生物瓣已足夠耐用、且抗凝出血風險高，宜生物瓣；④「50歲停經婦女」——較年輕、無懷孕顧慮、若無出血傾向可長期抗凝並受益於耐用性，最適合機械瓣。故選C。　深入補充：機械瓣最適合「較年輕、預期壽命長、無出血傾向、無懷孕計畫、能配合終身抗凝」者；出血傾向、計畫生育(Warfarin致畸)、高齡(餘命內生物瓣已足)者宜選生物瓣。瓣膜選擇是個別化的風險效益權衡。","options":{"A":"出血傾向者使用機械瓣須終身抗凝、出血風險高，不適合。","B":"計畫生育婦女因Warfarin致畸，不適合機械瓣。","C":"正解。50歲停經婦女較年輕、無懷孕顧慮，最適合耐用的機械瓣。","D":"80歲老人宜選生物瓣(餘命足夠且避免抗凝出血)。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"112110-N3-31":{"quick":"風濕熱「好發於5~15歲兒童」而非65歲以上女性；其餘以心臟炎為主、最常侵犯二尖瓣、ESR增加皆正確。","detail":{"background":"風濕熱流行病學與表現：①好發於「5~15歲學齡兒童」，前驅為A群β溶血性鏈球菌咽喉炎後1~5週的免疫反應，並非好發於65歲以上女性；②心臟炎(可侵犯心內膜、心肌、心包，造成瓣膜損傷)是其重要且可能留下後遺的表現；③最常侵犯「二尖瓣」；④急性發炎期紅血球沉降速率(ESR)、CRP上升。故A「好發於65歲以上女性」錯誤。　深入補充：風濕熱好發5~15歲兒童(非65歲以上)、前驅為A群鏈球菌咽喉炎後免疫反應、心臟炎可侵犯瓣膜(最常二尖瓣)留下後遺、急性期ESR/CRP升高。預防靠及時治療鏈球菌咽喉炎與長期預防性抗生素。","options":{"A":"錯誤(正解)。風濕熱好發於5~15歲兒童，非65歲以上女性。","B":"心臟炎是風濕熱重要臨床表現，正確。","C":"最常侵犯二尖瓣，正確。","D":"急性期ESR(紅血球沉降速率)增加，正確。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"112180-N3-21":{"quick":"生物性瓣膜「不需終身抗凝」(血栓性低)；說「須終身服抗凝血藥物」是錯誤(那是機械瓣)。","detail":{"background":"生物性(組織)人工瓣膜特性：①血栓性低，「通常不需終身抗凝」(多僅術後短期約3個月抗凝)，這是相對機械瓣的最大優點；②耐用性較差(約10~15年退化鈣化，可能需再次置換)；③適合高齡、有出血傾向、或有「生育計畫」的婦女(避免Warfarin致畸)；④瓣膜開關聲音較柔和(機械瓣有金屬喀答聲)。本題問錯誤者，A「術後須終身服抗凝血藥物」是機械瓣特性，對生物瓣為錯誤。　深入補充：生物瓣血栓性低(通常僅術後短期抗凝約3個月)、聲音柔和、適合高齡/出血傾向/計畫懷孕者，但耐用性差(10~15年退化鈣化需再換)。機械瓣耐用但須終身Warfarin、有金屬喀答聲、血栓性高。","options":{"A":"錯誤(正解)。生物瓣不需終身抗凝(僅短期)，終身抗凝是機械瓣特性。","B":"生物瓣耐用性較差(約10~15年)，正確。","C":"生物瓣不需長期Warfarin，適合有生育計畫婦女，正確。","D":"生物瓣開關聲音較小(柔和)，正確。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"113100-N3-20":{"quick":"二尖瓣狹窄使血液回堵→CVP、右心室壓、PCWP皆上升，但「心輸出量下降」(非上升)，故D錯誤。","detail":{"background":"二尖瓣狹窄的血流動力學：左心房血排入左心室受阻→左心房壓上升→肺微血管楔壓(PCWP)上升→肺循環鬱血、肺高壓→右心室壓力上升→右心房與體循環靜脈壓上升(中心靜脈壓CVP上升)。由於血液難以順利通過狹窄的二尖瓣進入左心室，左心室充盈不足，「心輸出量下降(非上升)」。本題問錯誤者，D「心輸出量上升」與病理相反。　深入補充：二尖瓣狹窄血流動力學——左房排血受阻使左心房壓、PCWP上升→肺鬱血、肺高壓→右心室與右心房壓(CVP)上升；左心室充盈不足使心輸出「下降」。瓣口面積&lt;1.5 cm²為中重度狹窄。常併心房顫動與左房血栓。","options":{"A":"回堵造成中心靜脈壓上升，正確。","B":"肺高壓使右心室壓力上升，正確。","C":"左心房壓回堵使肺微血管楔壓(PCWP)上升，正確。","D":"錯誤(正解)。二尖瓣狹窄使左心室充盈不足，心輸出量「下降」而非上升。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"113180-N3-20":{"quick":"機械性人工瓣膜「金屬材質、耐用性較高」；但血栓性高須長期抗凝，不適合出血傾向者。","detail":{"background":"機械性人工瓣膜特性：①金屬/碳纖材質「耐用性高」(常可使用一生、不易退化)——B正確；②但表面易引發凝血、「血栓性高」，故須「長期(終身)抗凝(Warfarin)」並監測INR，並非僅短期抗凝；③因血栓風險高，較易形成血栓(非不易)；④需終身抗凝故「不適合有出血傾向」的病人。本題問正確者為B「金屬材質耐用性較高」。　深入補充：機械瓣金屬/碳纖耐用(可一生)、但表面促凝須「終身抗凝(Warfarin，INR目標2.5~3.5依瓣位)」、有金屬喀答聲、血栓性高、不適合出血傾向者。生物瓣相反——不需長期抗凝但耐用性差。","options":{"A":"機械瓣須「終身(長期)」抗凝，非短期，敘述錯誤。","B":"正解。機械瓣金屬材質、耐用性較高。","C":"機械瓣血栓性高、「較易」形成血栓，非不易。","D":"機械瓣須終身抗凝，「不適合」出血傾向病人。"},"sources":["新文京《內外科護理學》瓣膜性心臟病","華杏《內外科護理學》心臟血管系統","2020 ACC/AHA 瓣膜性心臟病指引","Harrison 內科學 瓣膜性心臟病/風濕熱"]}},"101030-N3-51":{"quick":"心肌病變可能為「遺傳性基因病變」(尤其肥厚型多為自體顯性遺傳)；最常見的是擴張型(非肥厚型)。","detail":{"background":"心肌病變(cardiomyopathy)是心肌本身的結構/功能異常，分三型：①擴張型(dilated)——「最常見(約占多數)」，心室擴大、收縮力下降，常繼發於心肌炎、酒精、特發性；②肥厚型(hypertrophic)——心室壁(尤其中膈)肥厚，「多為自體顯性遺傳的基因病變」，可造成左心室流出道阻塞，是年輕人運動猝死原因之一；③限制型(restrictive)——最少見，心室壁僵硬充盈受限(如澱粉樣變性)。早期症狀視類型而異，不一定以夜間陣發性呼吸困難最先。故「可能是遺傳性基因病變」正確。　深入補充：心肌病變分擴張型(最常見，收縮功能不全)、肥厚型(常自體顯性遺傳，可致左心室流出道阻塞、運動猝死)、限制型(最少見，心室僵硬充盈受限，如澱粉樣變性)。診斷以心臟超音波為主，肥厚型須避免劇烈運動。","options":{"A":"正解。心肌病變(尤其肥厚型)可能為遺傳性基因病變(自體顯性)。","B":"最常見的是「擴張型」心肌病變，非肥厚型。","C":"早期症狀依型別而異，不一定以夜間陣發性呼吸困難最明顯。","D":"壓力差數值之手術指標敘述非通用，且肥厚型阻塞性手術考量複雜，非如此單一界定。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"101110-N3-58":{"quick":"擴張型心肌病變有容量過載/體液滯留，應「限水」而非補充水分；說「宜補充水分增加心輸出」是錯誤。","detail":{"background":"擴張型心肌病變(DCM)是心室擴大、收縮力嚴重下降，臨床如同收縮性心衰竭，是心肌病變中「最常見(占大部分)」者。治療同心衰竭：①依醫囑給毛地黃強心劑增加收縮力；②給血管擴張劑降低後負荷、減輕心臟工作；③利尿、限水、限鈉以減少體液過量(因DCM已有容量過載與肺/體循環鬱血)。故「補充水分以增加心輸出量」是錯誤——補水會加重前負荷與鬱血，DCM應「限水」。　深入補充：擴張型心肌病變(DCM)是心肌病變中最常見者，常繼發於心肌炎、酒精、特發性、化療藥(doxorubicin)；治療同收縮性心衰竭(限水限鈉、利尿、ACEI/ARB、β阻斷劑、必要時毛地黃、抗凝防心室血栓)。","options":{"A":"擴張型約占心肌病變大多數，是最常見型，敘述方向正確。","B":"依醫囑給毛地黃強心，正確。","C":"給血管擴張劑減輕後負荷，正確。","D":"錯誤(正解)。DCM有容量過載應限水；補充水分會加重鬱血，不能增加心輸出。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"102030-N3-31":{"quick":"手掌、腳底出現無痛性斑點「賈尼威氏病灶(Janeway lesions)」是感染性「心內膜炎」的周邊表徵。","detail":{"background":"感染性心內膜炎因瓣膜上的贅生物脫落造成周邊栓塞與免疫反應，產生特徵性的周邊表徵：①Janeway病灶——手掌、腳底的「無痛性」出血性斑點(栓塞性)；②Osler結節——指/趾的「疼痛性」紅色結節(免疫性)；③指甲下裂片狀出血(splinter hemorrhage)；④Roth斑——視網膜出血。這些周邊徵象合併發燒、新出現心雜音，是心內膜炎的重要線索。本題Janeway病灶對應的疾病是心內膜炎。　深入補充：感染性心內膜炎周邊徵象——Janeway病灶(手掌腳底無痛栓塞斑)、Osler結節(指趾痛性免疫結節)、裂片狀出血(甲床)、Roth斑(視網膜)。合併發燒、新心雜音、栓塞事件，須以血液培養(3套)與心臟超音波(看贅生物)診斷。","options":{"A":"正解。Janeway病灶(手掌腳底無痛性斑點)是感染性心內膜炎的周邊表徵。","B":"心肌梗塞無Janeway病灶。","C":"心包填塞表現為Beck三徵，無Janeway病灶。","D":"心律不整與Janeway病灶無關。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"102030-N3-37":{"quick":"心包膜填塞會「心跳變快(代償)」而非變慢；填塞使心音模糊、奇異脈、頸靜脈怒張、低血壓。","detail":{"background":"心包膜填塞(cardiac tamponade)是心包腔液體快速積聚、壓迫心臟使心室充盈受限、心輸出量驟降。代償機轉使「心跳加快(心搏過速)」以維持心輸出，故「心跳變慢」是錯誤。其典型表現：Beck三徵(頸靜脈怒張、心音模糊低沉、動脈性低血壓)、奇異脈(吸氣時收縮壓下降>10 mmHg)、脈搏壓變窄、呼吸困難、尿量減少。乳癌等惡性腫瘤可造成惡性心包積液與填塞。故本題錯誤者為C「心跳變慢」。　深入補充：心包填塞使心室充盈受限、心輸出驟降，代償性「心搏過速」(非過緩)。Beck三徵(頸靜脈怒張、心音模糊、低血壓)＋奇異脈＋脈搏壓變窄。惡性腫瘤(肺癌、乳癌、淋巴瘤)是惡性心包積液的常見原因，可快速積液致填塞。","options":{"A":"填塞使心輸出下降、肺/體循環受阻，呼吸困難，正確。","B":"奇異脈(吸氣時脈搏變弱)是填塞典型徵象，正確。","C":"錯誤(正解)。填塞代償使心跳「變快」，非變慢。","D":"右心受壓使體循環鬱血、頸靜脈怒張，正確。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"103030-N3-30":{"quick":"使用「人工植入物(人工瓣膜、節律器、人工血管)」是引發感染性心內膜炎的原因之一。","detail":{"background":"感染性心內膜炎是微生物(多為細菌)侵入心內膜/瓣膜形成贅生物。①病因是「感染」而非自體免疫；②「依病程與致病菌毒力」分急性(如金黃色葡萄球菌，病程快、毒力強)與亞急性(如草綠色鏈球菌，病程緩)，而非單純「依症狀嚴重程度」；③危險因子包括既有瓣膜異常、先天性心臟病、「人工植入物(人工瓣膜、心臟節律器、人工血管)」、靜脈藥癮、侵入性牙科/手術處置等。本題以B「人工植入物是引發原因之一」為最明確正確敘述(瓣膜異常雖也是危險因子，但A病因敘述錯、C分類依據錯)。　深入補充：感染性心內膜炎是感染(非自體免疫)，依病程與菌力分急性(金黃色葡萄球菌)與亞急性(草綠色鏈球菌)。危險因子含瓣膜異常、人工瓣膜/植入物、靜脈藥癮、先天性心臟病、侵入處置。診斷依Duke準則(血培養＋心臟超音波)。","options":{"A":"大部分心內膜炎由「感染(細菌等)」所致，非自體免疫，錯誤。","B":"正解。人工瓣膜、節律器、人工血管等植入物是引發心內膜炎的原因之一。","C":"急性/亞急性是依「病程與致病菌毒力」區分，非單純依症狀嚴重程度。","D":"瓣膜異常確為危險因子(敘述本身合理)，惟本題以B為標準答案。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"103100-N3-28":{"quick":"評估心包填塞的奇異脈應觀察「吸氣」時收縮壓變化；「觀察呼氣時收縮壓變化」與評估不相關。","detail":{"background":"心包膜炎/心包積水的護理評估：①以聽診器膜面在胸骨左下緣聽「心包膜摩擦音」；②評讀胸部X光的心臟陰影變化(積液時心影擴大呈燒瓶狀)；③評估呼吸型態(呼吸困難、端坐前傾)；④評估「奇異脈」——測量血壓時觀察「吸氣期」收縮壓是否下降>10 mmHg(填塞時更明顯)。題目B「觀察呼氣時收縮壓之變化」搞錯時相(奇異脈是看「吸氣」期下降)，故與評估「不相關」。　深入補充：心包填塞的奇異脈評估——量血壓時於「吸氣期」收縮壓下降&gt;10 mmHg。心包炎/積液評估還含心包膜摩擦音(膜面聽診)、胸部X光(心影擴大呈燒瓶狀)、心電圖(瀰漫性ST上升、低電壓、電交替)、呼吸型態。","options":{"A":"以聽診器膜面評估心包膜摩擦音，相關。","B":"不相關(正解)。奇異脈應觀察「吸氣」時收縮壓下降，非「呼氣」時。","C":"評讀胸部X光心臟影像變化(心影擴大)，相關。","D":"評估呼吸型態(呼吸困難)，相關。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"104030-N3-26":{"quick":"心包積水嚴重時心臟受壓、體循環鬱血→「頸靜脈怒張」；心輸出量下降、摩擦音因積液而減弱。","detail":{"background":"心包膜炎造成心包積水時：①液體壓迫心臟使充盈受限、心輸出量「下降」(非增加)；②隨積液增多，原本的心包膜「摩擦音會減弱或消失」(液體分隔兩層心包)，而非更明顯；③嚴重積液/填塞時右心受壓、體循環靜脈鬱血→「頸靜脈怒張」(C正確)；④心包炎疼痛多在胸骨後/心前區，可傳至頸、肩或斜方肌，臥平與深呼吸時加重、前傾坐起減輕，並非以「左側背部」為主。故正確為C頸靜脈怒張。　深入補充：心包積水使心臟受壓、心輸出下降、體循環鬱血(頸靜脈怒張)；積液增多時心包膜摩擦音「減弱消失」。心包炎胸痛在前傾坐起時減輕、平躺深呼吸時加重。大量積液或快速積液可致心包填塞，須緊急心包穿刺引流。","options":{"A":"心包積水使心臟受壓、心輸出量「下降」，非增加。","B":"積液增多時摩擦音「減弱/消失」，非更明顯。","C":"正解。嚴重心包積水使體循環鬱血，出現頸靜脈怒張。","D":"心包炎痛多在胸骨後/心前區、可傳斜方肌，非以左側背部為主。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"104100-N3-27":{"quick":"Beck三徵＝頸靜脈怒張、心音模糊低沉、動脈性低血壓；「呼吸速度>15次/分」不屬於Beck三徵。","detail":{"background":"心包膜填塞的「貝克氏三病徵(Beck triad)」是診斷的經典組合：①頸靜脈怒張(右心受壓、靜脈壓上升)、②心音模糊低沉(積液隔絕心音)、③動脈性低血壓(心輸出量驟降)。這三者反映「心室充盈受限、心輸出下降、體循環鬱血」。呼吸速度>15次/分屬一般生理變化，不是Beck三徵的內容。故不包括者為D。　深入補充：Beck三徵＝頸靜脈怒張(靜脈壓上升)＋心音模糊低沉(積液隔絕)＋動脈性低血壓(心輸出驟降)，是心包填塞的經典組合，反映「充盈受限、輸出下降、體循環鬱血」。確診靠心臟超音波(看積液與心室塌陷)，治療為心包穿刺。","options":{"A":"頸靜脈怒張屬Beck三徵。","B":"心音模糊低沉屬Beck三徵。","C":"動脈性低血壓屬Beck三徵。","D":"正解(不包括)。呼吸速度>15次/分不是Beck三徵的內容。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"105090-N3-24":{"quick":"導致感染性心內膜炎「最常見」的菌種是金黃色葡萄球菌(Staphylococcus aureus)。","detail":{"background":"感染性心內膜炎的致病菌：現今整體最常見為「金黃色葡萄球菌(S. aureus)」，常見於急性心內膜炎、靜脈藥癮者、人工瓣膜與醫療相關感染，病程急、毒力強；草綠色(viridans)鏈球菌則是亞急性自體瓣膜心內膜炎(牙科處置後)的經典菌。本題問「最常見」菌種，答案為金黃色葡萄球菌。　深入補充：感染性心內膜炎致病菌——整體最常見金黃色葡萄球菌(急性、靜脈藥癮、人工瓣膜、醫療相關)；亞急性自體瓣膜常為草綠色鏈球菌(牙科處置後)；腸球菌(泌尿生殖道處置)；人工瓣膜早期為表皮葡萄球菌。血培養須於抗生素前抽取。","options":{"A":"克雷伯氏菌非心內膜炎最常見致病菌。","B":"正解。金黃色葡萄球菌是感染性心內膜炎最常見的致病菌。","C":"β溶血性鏈球菌非心內膜炎最常見菌(草綠色鏈球菌才是亞急性常見菌)。","D":"B型流行性嗜血桿菌非心內膜炎常見致病菌。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"106030-N3-25":{"quick":"心包填塞術後最「不需要」的是保護隔離；需要的是監測生命徵象/心電圖、補充體液增加心輸出、維持引流管通暢。","detail":{"background":"心包填塞經心包穿刺/開窗引流術後護理重點：①密切監測生命徵象與心電圖(觀察是否再積液、心律不整、心輸出恢復)；②「補充足夠體液」維持前負荷與心輸出(填塞解除前心室充盈受限，適度補液有助維持輸出)；③若留置心包引流管，須確認引流通暢、記錄引流量與性狀。心包填塞並非傳染病或免疫低下隔離情境，故「保護隔離措施」最不需要。　深入補充：心包穿刺/開窗引流術後須監測生命徵象與心電圖(防再積液、心律不整)、維持引流管通暢、記錄引流量性狀、補液維持前負荷以支持心輸出。心包填塞非感染性隔離情境，不需保護隔離。","options":{"A":"監測生命徵象與心電圖變化，需要。","B":"補充足夠體液維持前負荷與心輸出，需要。","C":"確認引流管通暢、記錄引流，需要。","D":"最不需要(正解)。心包填塞術後不需保護隔離措施。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"106110-N3-26":{"quick":"懷疑心內膜炎時最需收集「有無心臟血管手術/侵入性處置紀錄」(人工瓣膜、植入物、菌血症來源是關鍵危險因子)。","detail":{"background":"感染性心內膜炎的關鍵危險因子是「心內膜/瓣膜的易感受性＋菌血症來源」：既有瓣膜病變、先天性心臟病、「人工瓣膜或心臟血管手術/植入物」、靜脈藥癮、近期侵入性牙科或手術處置。故懷疑心內膜炎時，護理師最需收集的是「有無心臟血管手術或侵入性處置紀錄(及人工瓣膜/裝置)」，以評估感染來源與危險因子。心臟病家族史、抽菸、體重增加並非心內膜炎最關鍵的資料。　深入補充：感染性心內膜炎的關鍵危險因子是「瓣膜易感受性＋菌血症來源」——人工瓣膜/心臟裝置、既有瓣膜病變、先天性心臟病、靜脈藥癮、近期牙科或侵入處置。護理評估應收集這些病史及發燒、新雜音、栓塞徵象。","options":{"A":"心臟病家族史與心內膜炎發生關聯較小。","B":"抽菸非心內膜炎的關鍵危險因子。","C":"正解。心臟血管手術/植入物紀錄是心內膜炎的關鍵危險因子，最需收集。","D":"體重增加與心內膜炎關聯小。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"109110-N3-27":{"quick":"心包填塞表現為①低沉心音、②中心靜脈壓上升、③奇異脈(選A 123)；脈搏壓會「變窄」而非變寬(④錯)。","detail":{"background":"心包填塞的臨床表徵：①「心音模糊低沉」(積液隔絕)、②「中心靜脈壓/頸靜脈壓上升」(右心受壓、靜脈鬱血)、③「奇異脈」(吸氣時收縮壓下降>10 mmHg)、④「脈搏壓變窄」(收縮壓下降、舒張壓相對維持，脈壓變小)。④說「脈搏壓變寬」與填塞相反(應變窄)。故正確組合為①②③(A)。　深入補充：心包填塞表現——心音模糊低沉、中心靜脈壓/頸靜脈壓上升、奇異脈(吸氣收縮壓↓&gt;10)、脈搏壓變窄(非變寬)、心搏過速、尿量減少。心電圖可見低電壓與電交替。確診靠心臟超音波，治療為緊急心包穿刺。","options":{"A":"正解。①低沉心音、②CVP上升、③奇異脈皆為填塞表徵。","B":"含④(脈搏壓應變窄非變寬)，不符。","C":"含④，不符。","D":"含④，不符。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"110030-N3-26":{"quick":"擴張型心肌病變「最常見於心肌炎後」；肥厚型多與家族遺傳「有關」、限制型最少見、心肌病變心輸出「下降」。","detail":{"background":"心肌病變三型：①擴張型(dilated)——「最常見」，常繼發於「心肌炎」、酒精、特發性，心室擴大、收縮力下降(A正確)；②肥厚型(hypertrophic)——「多與家族遺傳有關(自體顯性)」，故「與遺傳無關」之敘述錯誤；③限制型(restrictive)——「最少見」(非最常見)；④心肌病變使心輸出量「下降」、常有體液過量需限水。故正確為A「擴張型最常見於心肌炎」。　深入補充：擴張型心肌病變最常見、常繼發心肌炎/酒精；肥厚型多家族遺傳(自體顯性，肌節基因突變)、可致左室流出道阻塞與猝死；限制型最少見(澱粉樣變性等)。心肌病變使心輸出下降、常需限水，肥厚型須避免劇烈運動與脫水。","options":{"A":"正解。擴張型心肌病變常繼發於心肌炎，且為最常見型。","B":"肥厚型多與家族遺傳「有關」，敘述相反，錯誤。","C":"心肌病變心輸出「下降」、常需限水，敘述錯誤。","D":"限制型心肌病變「最少見」，非最常見。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"110110-N3-34":{"quick":"心包積水使脈搏壓「變窄(下降)」而非升高；其餘胸痛、心音模糊低沉、頸靜脈怒張皆為主要症狀。","detail":{"background":"心包積水(尤其進展為填塞)時：①心包炎性胸痛(尖銳或瀰漫鈍痛，臥平/深呼吸加重、前傾減輕)；②積液隔絕使「心音模糊低沉」；③右心受壓使體循環鬱血「頸靜脈怒張」；④心輸出量下降、收縮壓降，「脈搏壓變窄(下降)」並出現奇異脈。故B「脈搏壓升高」與病理相反(應變窄)，為錯誤敘述。　深入補充：心包積水/填塞使脈搏壓「變窄(下降)」、心音模糊、頸靜脈怒張、胸痛(平躺加重前傾減輕)、奇異脈。胸部X光心影擴大、心電圖低電壓電交替、超音波見積液與心室塌陷。少量慢性積液可無症狀，快速大量積液致填塞。","options":{"A":"胸痛(尖銳痛或瀰漫鈍痛)是心包積水/心包炎症狀，正確。","B":"錯誤(正解)。心包積水使脈搏壓「變窄/下降」，非升高。","C":"積液使心音模糊低沉，正確。","D":"體循環鬱血使頸靜脈怒張，正確。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"111110-N3-30":{"quick":"心包填塞使心輸出下降→「收縮壓下降(低血壓)」，說「收縮壓上升」是錯誤。","detail":{"background":"心包填塞因心室充盈受限、心輸出量驟降，啟動代償：①頸靜脈怒張(靜脈鬱血)；②心跳變快(代償心搏過速)；③腎灌流下降使「尿量減少」；④「動脈性低血壓(收縮壓下降)」並脈搏壓變窄、奇異脈。故D「收縮壓上升」與填塞病理相反(應為低血壓)，為錯誤敘述。　深入補充：心包填塞代償——心搏過速、體循環鬱血(頸靜脈怒張)、腎灌流下降(尿量減少)、動脈性低血壓(收縮壓下降，非上升)、奇異脈、脈搏壓變窄。是阻塞性休克的一種，須緊急心包穿刺解除壓迫。","options":{"A":"頸靜脈怒張是填塞徵象，正確。","B":"代償性心跳變快，正確。","C":"腎灌流下降使尿量減少，正確。","D":"錯誤(正解)。填塞使心輸出下降→收縮壓「下降」，非上升。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"111110-N3-34":{"quick":"奇脈(paradoxical pulse)＝「吸氣時收縮壓下降超過10 mmHg」。","detail":{"background":"奇異脈(pulsus paradoxus)是「吸氣時收縮壓較呼氣時下降超過10 mmHg」的現象。正常吸氣時胸內負壓使右心回流增加、肺血管容量增加，左心輸出略降、收縮壓本就略低(<10 mmHg)；在心包填塞、嚴重氣喘、慢性阻塞性肺病等使心室間相互依存或胸內壓變化放大時，吸氣期左心充盈被進一步壓縮，收縮壓下降>10 mmHg而成「奇異脈」。重點是「吸氣」期、「收縮壓」下降。　深入補充：奇異脈(pulsus paradoxus)＝吸氣時收縮壓較呼氣下降&gt;10 mmHg，見於心包填塞、嚴重氣喘、COPD、張力性氣胸。機轉為吸氣時右心充盈增加、心室間隔左移壓縮左心充盈使左心輸出與收縮壓下降。","options":{"A":"是「吸氣」時下降，非呼氣時。","B":"正解。奇脈＝吸氣時收縮壓下降超過10 mmHg。","C":"奇脈看的是「收縮壓」，且為吸氣期，非呼氣舒張壓。","D":"奇脈看「收縮壓」下降，非舒張壓。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"112030-N3-25":{"quick":"心包填塞脈搏壓「變窄」而非變寬；其餘奇異脈、心音模糊低沉、頸靜脈怒張皆為填塞徵象。","detail":{"background":"心包填塞徵象：①奇異脈(吸氣時脈搏變弱/收縮壓下降>10 mmHg)；②心音模糊低沉(Beck三徵之一)；③頸靜脈怒張(Beck三徵之一，體循環鬱血)；④因收縮壓下降而舒張壓相對維持，使「脈搏壓變窄」。故C「脈搏壓變寬」與填塞相反(應變窄)，為錯誤敘述。　深入補充：心包填塞徵象——奇異脈(吸氣脈搏變弱)、心音模糊低沉、頸靜脈怒張、脈搏壓「變窄」、心搏過速、低血壓。Beck三徵(頸靜脈怒張＋心音模糊＋低血壓)是診斷核心，須與緊縮性心包炎、右心衰竭鑑別，治療為心包穿刺。","options":{"A":"奇異脈(吸氣時脈搏變弱)是填塞徵象，正確。","B":"心音模糊低沉是填塞徵象，正確。","C":"錯誤(正解)。填塞使脈搏壓「變窄」，非變寬。","D":"頸靜脈怒張是填塞徵象，正確。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"112110-N3-25":{"quick":"羅氏斑(Roth spots)是「視網膜(眼底)」的出血，不是「四肢末梢的出血點」，故D敘述錯誤。","detail":{"background":"感染性心內膜炎的周邊表徵：①「裂片狀出血(splinter hemorrhage)」——指/趾甲床下細線狀出血；②「Janeway病灶」——手掌、腳底的「無痛性」出血斑(栓塞性)；③「Osler結節」——指/趾的「疼痛性」紅色結節(免疫複合體)；④「Roth斑」——「視網膜(眼底)」中央蒼白的出血點(眼底鏡可見)。本題D把Roth斑說成「四肢末梢出血點」是錯的——Roth斑位於「視網膜」。故錯誤為D。　深入補充：感染性心內膜炎周邊徵象——裂片狀出血(甲床)、Janeway病灶(手掌腳底無痛斑)、Osler結節(指趾痛性結節)、Roth斑(視網膜出血，非四肢)。記憶：Osler痛(O for Ouch)、Janeway不痛。合併發燒、新雜音、栓塞事件。","options":{"A":"裂片狀出血(splinter hemorrhage)在甲床，正確。","B":"Janeway病灶為手掌腳底無痛性紅斑，正確。","C":"Osler結節為指趾疼痛性紅色結節，正確。","D":"錯誤(正解)。Roth斑在「視網膜」，非四肢末梢出血點。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"112110-N3-26":{"quick":"心肌病變使心輸出量「下降」(非增加)；其餘心律不整、心搏過速、端坐呼吸皆為其表現。","detail":{"background":"心肌病變(無論擴張型、肥厚型或限制型)最終都損害心臟泵血功能，使「心輸出量下降」，並引發心衰竭相關表現：心律不整(心肌結構異常致電氣不穩)、心搏過速(代償)、端坐呼吸(肺鬱血)、疲倦、運動耐受下降。故D「心輸出量增加」與心肌病變病理相反，為錯誤敘述。　深入補充：心肌病變(擴張/肥厚/限制型)最終損害泵血功能使心輸出「下降」，並引發心律不整、心搏過速、端坐呼吸、疲倦。肥厚型可有胸痛、暈厥、猝死；限制型以充盈受限的右心衰竭表現。治療依型別而異。","options":{"A":"心肌病變常見心律不整，正確。","B":"代償性心搏過速，正確。","C":"肺鬱血致端坐呼吸，正確。","D":"錯誤(正解)。心肌病變使心輸出量「下降」，非增加。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"113030-N3-16":{"quick":"心肌炎病人須「休息、避免費力運動」(運動會增加心臟負荷、誘發心律不整猝死)；教導阻力運動提升耐力是不適宜的。","detail":{"background":"心肌炎是心肌的發炎，急性期心肌脆弱、易發生心律不整與心衰竭，甚至運動誘發猝死，故護理重點是「限制活動、臥床休息」以減少心臟負荷，「不可」教導阻力(費力)運動提升耐力。其他處置：依醫囑用類固醇/抗發炎時觀察腸胃道出血(大便顏色)；限水減少前負荷；服用毛地黃須監測脈搏(防中毒)。故不適宜者為A教導阻力運動。　深入補充：心肌炎常由病毒(克沙奇病毒、腺病毒等)引起，急性期心肌脆弱、易心律不整與心衰竭甚至猝死，故須「限制活動、臥床休息」。治療以支持療法、處理心衰與心律不整為主；費力/阻力運動會增加心臟負荷誘發危險，禁止。","options":{"A":"不適宜(正解)。心肌炎須休息，阻力(費力)運動會增加心臟負荷、誘發心律不整猝死。","B":"用類固醇須觀察大便顏色(注意腸胃道出血)，適宜。","C":"減少水分攝取以減前負荷，適宜。","D":"服毛地黃須監測脈搏防中毒，適宜。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"113100-N3-16":{"quick":"羅氏斑(Roth spots)位於「視網膜」，非「四肢」；故D「四肢出現羅氏斑」錯誤。","detail":{"background":"感染性心內膜炎臨床表徵：①發燒(可呈回歸熱/間歇熱型)、夜汗、倦怠；②瓣膜贅生物破壞瓣膜→出現「新的或變化的心雜音」；③贅生物脫落造成栓塞→腦栓塞(中風)、脾栓塞、腎栓塞等；④周邊免疫/栓塞徵象——Janeway病灶(手掌腳底)、Osler結節(指趾)、裂片狀出血(甲床)、「Roth斑(視網膜出血)」。本題D把Roth斑說成「四肢」出現是錯的，應在視網膜。故錯誤為D。　深入補充：感染性心內膜炎表現——發燒(可呈間歇/回歸熱型)、新或變化的心雜音、栓塞事件(腦、脾、腎栓塞)、周邊徵象(Janeway、Osler、裂片狀出血、Roth斑於視網膜)。診斷依Duke準則，治療為長程靜脈抗生素，必要時瓣膜手術。","options":{"A":"感染性心內膜炎可呈回歸熱型發燒，正確。","B":"瓣膜破壞出現心雜音，正確。","C":"贅生物脫落常造成腦栓塞等，正確。","D":"錯誤(正解)。Roth斑在「視網膜」，非四肢。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"113100-N3-17":{"quick":"心包填塞時積液增多，心包膜摩擦音多「減弱/消失」，故C「摩擦音增強」錯誤；填塞為低血壓、頸靜脈怒張、呼吸困難。","detail":{"background":"心包填塞臨床表徵：①「動脈性低血壓」(心輸出驟降)；②「頸靜脈怒張」(右心受壓、體循環鬱血)；③心音模糊低沉、奇異脈、脈搏壓變窄、心跳變快；④呼吸困難。關於摩擦音：心包炎早期、積液少時可聞心包膜摩擦音，但「填塞時積液大量增多，兩層心包被液體分隔，摩擦音反而減弱或消失」，故C「心包膜摩擦音增強」與填塞病理相反，為錯誤敘述。　深入補充：心包填塞時積液大量增多，兩層心包被液體分隔，摩擦音反而「減弱消失」(非增強)。表現為動脈性低血壓、頸靜脈怒張、心音模糊、奇異脈、脈搏壓變窄、呼吸困難。緊縮性心包炎則有Kussmaul徵象(吸氣時頸靜脈反而更脹)。","options":{"A":"填塞使心輸出下降、動脈性低血壓，正確。","B":"右心受壓使頸靜脈怒張，正確。","C":"錯誤(正解)。填塞時積液增多，摩擦音多減弱/消失，非增強。","D":"心輸出下降、肺受壓致呼吸困難，正確。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"113180-N3-16":{"quick":"本題以「主動脈狹窄」為肥厚之病因(壓力過載→心室代償性肥厚)；心肌炎/澱粉樣/酒精分別對應擴張或限制型。","detail":{"background":"心室「肥厚」可由「壓力過載」引起：主動脈瓣狹窄使左心室射血阻力(後負荷)長期增加，心室代償性「向心性肥厚」。本題四個選項中，心肌炎與酒精中毒對應「擴張型」心肌病變、澱粉樣病變對應「限制型」心肌病變，唯有「主動脈狹窄」對應心室肥厚(壓力過載)，故為最符合「肥厚」之病因。(註：原發性肥厚型心肌病變屬基因病變，但本題選項中以主動脈狹窄為最相符之肥厚成因。)　深入補充：心室「肥厚」可由壓力過載引起(主動脈狹窄、高血壓使左心室向心性肥厚)。本題選項中心肌炎/酒精對應擴張型、澱粉樣變性對應限制型，故以主動脈狹窄為「肥厚」成因。原發性肥厚型心肌病變則屬肌節基因突變的遺傳病。","options":{"A":"正解。主動脈狹窄造成壓力過載，使心室代償性肥厚。","B":"心肌炎多導致「擴張型」心肌病變。","C":"澱粉樣病變導致「限制型」心肌病變。","D":"酒精中毒導致「擴張型」心肌病變。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"115030-N3-16":{"quick":"心包膜炎胸痛「平躺與深呼吸時加重」，前傾坐起才減輕；鼓勵平躺及深呼吸減痛是不適宜的。","detail":{"background":"心包膜炎護理：①疼痛特性是「臥平與深呼吸/咳嗽時加重，坐起前傾時減輕」，故應協助病人採「前傾坐姿」緩解胸痛，而非鼓勵平躺及深呼吸(會加重疼痛)；②發燒時臥床休息減少心肌耗氧；③可用阿斯匹靈(Aspirin)/NSAIDs退燒並抗發炎(也是心包炎止痛常用藥)；④提供高蛋白、高熱量(高醣)飲食以利組織修復。故不適宜者為A「鼓勵平躺及深呼吸減緩胸痛」。　深入補充：心包膜炎胸痛在「平躺、深呼吸、咳嗽、吞嚥時加重，前傾坐起時減輕」，故採前傾坐姿緩解、勿鼓勵平躺深呼吸。發燒臥床休息、Aspirin/NSAID(秋水仙素colchicine亦常用)抗發炎止痛、高蛋白高熱量飲食利修復。","options":{"A":"不適宜(正解)。心包炎胸痛在平躺/深呼吸時加重，應採前傾坐姿緩解。","B":"發燒臥床休息減少心肌耗氧，適宜。","C":"阿斯匹靈可退燒並抗發炎(心包炎止痛常用)，適宜。","D":"高蛋白高醣飲食利組織修復，適宜。"},"sources":["新文京《內外科護理學》心肌/心包/心內膜疾病","華杏《內外科護理學》心臟血管系統","2015 ESC 感染性心內膜炎指引","Harrison 內科學 心肌病變/心包疾病/心內膜炎"]}},"101030-N3-55":{"quick":"高血壓生活型態調整應「攝取足量鉀、鎂(DASH飲食)」；「低鉀低鎂」是錯誤的(反而需增加鉀鎂)。","detail":{"background":"高血壓的生活型態調整(非藥物治療)重點：①控制體重(維持正常BMI)；②減少鈉鹽攝取(每日鈉<2.4 g/鹽<6 g)；③「增加鉀、鈣、鎂攝取」——DASH得舒飲食富含蔬果、低脂乳，提供足量鉀鎂鈣有助降血壓；④限制酒精；⑤規律有氧運動、戒菸、減壓。本題C「低鉀低鎂」與原則相反(應為足量/高鉀鎂)，為錯誤。　深入補充：高血壓非藥物治療(生活型態調整)包括控制體重、減鈉(DASH得舒飲食)、增加鉀鈣鎂(蔬果低脂乳)、限酒、規律有氧運動、戒菸、減壓。鉀可對抗鈉的升壓作用，故應「足量」而非低鉀。腎功能不全者補鉀須謹慎防高血鉀。","options":{"A":"控制體重是降血壓的重要生活調整，正確。","B":"減少鈉鹽攝取有助降血壓，正確。","C":"錯誤(正解)。應「攝取足量鉀、鎂」(DASH)，非低鉀低鎂。","D":"限制酒精有助控制血壓，正確。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"103030-N3-34":{"quick":"ACEI(血管收縮素轉換酶抑制劑)的作用是「抑制血管收縮素I轉換為血管收縮素II」。","detail":{"background":"腎素-血管收縮素-醛固酮系統(RAAS)：腎素將血管收縮素原轉為「血管收縮素I」→「血管收縮素轉換酶(ACE)」把I轉成「血管收縮素II(強力血管收縮、刺激醛固酮保鈉保水)」。ACEI(如captopril、enalapril)即抑制ACE，阻斷I→II的轉換，使血管收縮素II減少→血管擴張、降低血壓、減少醛固酮(利於排鈉)。常見副作用為乾咳(緩激肽堆積)與高血鉀，須注意。故主要作用是抑制I轉換為II。　深入補充：ACEI抑制血管收縮素轉換酶(I→II)，使血管擴張、降壓、減少醛固酮(利排鈉)，並有腎臟與心臟保護(降蛋白尿、抗心室重塑)。副作用：乾咳(緩激肽堆積，可換ARB)、高血鉀、血管性水腫、孕婦禁用(致畸)。","options":{"A":"腎素將血管收縮素原轉為I，非ACEI作用點。","B":"正解。ACEI抑制血管收縮素I轉換為血管收縮素II。","C":"ACE作用於I→II，非II→III。","D":"ACEI不作用於III→腎素。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"106110-N3-28":{"quick":"高血壓病人應「規律運動以增加HDL、改善血壓」；以茶代酒、泡熱水澡、等長運動皆不恰當。","detail":{"background":"高血壓日常護理指導：①規律「有氧」運動可提升高密度脂蛋白(HDL)、改善血壓與體重(A正確)；②減少酒精，但「以茶代酒」不佳(茶含咖啡因，會升高血壓)，應以白開水/無咖啡因飲品取代；③不建議泡溫泉/熱水澡——高溫使血管擴張可能造成姿勢性低血壓、暈厥，溫差大也增加心血管事件風險；④運動宜選「有氧」而非「等長(isometric)」運動，因等長運動會引發伐氏效應(Valsalva)使血壓驟升。故正確為A。　深入補充：高血壓運動以「有氧」為主可提升HDL、改善血壓與體重；避免等長運動(Valsalva升壓)與泡熱水/三溫暖(血管擴張致姿勢性低血壓)。減酒應以白開水取代而非含咖啡因的茶(咖啡因短暫升壓)。","options":{"A":"正解。規律(有氧)運動可增加HDL、改善血壓，是正確指導。","B":"茶含咖啡因會升血壓，「以茶代酒」不恰當。","C":"泡溫泉/熱水澡使血管擴張，恐姿勢性低血壓、增加心血管風險，不建議。","D":"應選有氧運動；等長運動引發Valsalva使血壓驟升，不宜。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"106110-N3-79":{"quick":"高血壓合併慢性腎病者，血壓宜更嚴格控制在「130/85 mmHg以下」以延緩腎功能惡化。","detail":{"background":"高血壓是慢性腎病(CKD)惡化的重要因素，良好的血壓控制可延緩腎功能衰退與蛋白尿進展。對「高血壓合併慢性腎病(尤其有蛋白尿)」者，血壓目標較一般人更嚴格，建議控制在約「130/80~85 mmHg以下」。本題選項中「130/85 mmHg以下」最符合此嚴格控制目標。140~150/90以上皆過高、不利腎臟保護。　深入補充：高血壓合併慢性腎病(尤其有蛋白尿)血壓目標較嚴(約&lt;130/80~85)，首選ACEI/ARB(降蛋白尿、保護腎功能)。血壓控制不佳會加速腎絲球硬化與腎功能衰退，形成「高血壓—腎病—更高血壓」惡性循環。","options":{"A":"正解。高血壓合併CKD者血壓宜控制在130/85 mmHg以下，延緩腎功能惡化。","B":"140~145/85~90偏高，不利腎臟保護。","C":"145~150/90~95過高，不利腎臟。","D":"CKD有明確較嚴格的目標(約<130/80~85)，非僅「視情況而定」。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"106111-N3-28":{"quick":"王先生有家族史＋飲酒高鈉生活型態→應推測為「原發性(本態性)高血壓」，說「續發性」是錯誤。","detail":{"background":"高血壓分兩類：①「原發性(本態性/primary)」占約90~95%，無單一明確病因，與遺傳(家族史)、年齡、肥胖、高鈉/高酒精攝取、壓力等多因子有關；②「續發性(secondary)」占少數，有明確可辨病因(腎血管/腎實質疾病、內分泌如原發性醛固酮增多症/嗜鉻細胞瘤、藥物等)。王先生有高血壓家族史、經常飲酒、無其他疾病——這些指向「原發性高血壓」，故A「推測為續發性高血壓」是錯誤。其餘B(高鈉酒精)、C(可能惡化為惡性高血壓增加後負荷)、D(目標<140/90)皆合理。　深入補充：原發性高血壓占90~95%，與遺傳(家族史)、肥胖、高鈉、過量酒精、壓力等多因子有關，無單一病因；續發性高血壓有特定病因(腎血管/腎實質病、原發性醛固酮增多症、嗜鉻細胞瘤、甲狀腺、藥物等)，年輕、難治、突發者應排查。","options":{"A":"錯誤(正解)。家族史＋高鈉酒精生活型態應推測為「原發性」高血壓，非續發性。","B":"高鈉與酒精攝取過多可導致血壓升高，推論合理。","C":"控制不佳可惡化為惡性高血壓、增加心臟後負荷，正確。","D":"一般高血壓治療目標約<140/90 mmHg，合理。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"106111-N3-29":{"quick":"王先生併用spironolactone(保鉀利尿劑)，不可再「多攝取香蕉、柳橙等高鉀食物」(會高血鉀)，故D錯誤。","detail":{"background":"承上題王先生使用propranolol(β阻斷劑)與spironolactone(保鉀利尿劑aldactone)。護理指導：①降壓藥須「定時定量」、不可驟停(β阻斷劑驟停會反彈性高血壓/心搏過速)；②每日固定時間測量並記錄血壓；③propranolol會使心跳減慢，須教導測量脈搏、過慢時就醫。④spironolactone是「保鉀」利尿劑，會使血鉀「上升」，故須監測血鉀但「不可再多攝取香蕉、柳橙、楊桃等高鉀食物」(會造成高血鉀危險，楊桃對腎功能不佳者另有神經毒性風險)。故D錯誤。　深入補充：spironolactone是「保鉀」利尿劑(醛固酮拮抗劑)，會使血鉀「上升」，故須限制高鉀食物(香蕉、柳橙、楊桃、深綠蔬菜)並監測血鉀，避免高血鉀致心律不整。楊桃對腎功能不佳者另有神經毒性風險。β阻斷劑勿驟停(反彈)。","options":{"A":"降壓藥定時定量、防驟停反彈性高血壓，正確。","B":"每日固定時間測量並記錄血壓，正確。","C":"propranolol使心跳降低，須教導測脈搏，正確。","D":"錯誤(正解)。用保鉀利尿劑(spironolactone)應「限制」高鉀食物，不可多吃香蕉柳橙楊桃(防高血鉀)。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"106111-N3-32":{"quick":"味素(含鈉的麩胺酸鈉)與小蘇打(碳酸氫鈉)都「含鈉」，低鈉飲食須限制；說「不含鈉不需限制」是錯誤。","detail":{"background":"低鈉飲食衛教：①烹調多用清蒸、水煮取代滷製、油炸(滷汁醬料含大量鈉)；②以天然辛香料(蔥薑蒜、檸檬、胡椒)取代鹽、醬油、沙茶醬等高鈉調味；③避免罐頭、加工醃漬、煙燻食品(鈉含量高)；④「味素(麩胺酸『鈉』, MSG)、小蘇打(碳酸氫『鈉』)、烏醋/醬油/番茄醬等」皆含鈉，必須限制。故D「味素與小蘇打不含鈉、不需限制」是錯誤敘述。　深入補充：低鈉飲食須注意「隱形鈉」——味素(麩胺酸鈉)、小蘇打(碳酸氫鈉)、醬油、烏醋、番茄醬、加工肉、罐頭、醃漬品、運動飲料、部分藥物(制酸劑)。每日鈉建議&lt;2.4 g(鹽&lt;6 g)。以天然辛香料、檸檬、蔥薑蒜提味取代鹽。","options":{"A":"多用清蒸水煮取代滷製，減少鈉，正確。","B":"以天然辛香料取代高鈉調味，正確。","C":"避免罐頭與加工醃漬食物(高鈉)，正確。","D":"錯誤(正解)。味素(麩胺酸鈉)與小蘇打(碳酸氫鈉)都含鈉，須限制。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"107110-N3-37":{"quick":"抑制血管加壓素I轉換成II的抗高血壓藥是ACEI，即captopril(capoten)。","detail":{"background":"ACE抑制劑(ACEI)抑制血管收縮素轉換酶，阻斷血管加壓素I→II的轉換，使強力血管收縮的血管加壓素II減少→血管擴張、降血壓，並減少醛固酮(利排鈉)。captopril(capoten)是典型ACEI。其他選項：digoxin是強心配醣體、nifedipine是鈣離子阻斷劑(直接擴張血管降壓但機轉不同)、propranolol是β阻斷劑。故抑制I→II者為captopril。　深入補充：ACEI(captopril、enalapril、lisinopril)抑制血管加壓素I→II，副作用乾咳與高血鉀；ARB(losartan等)阻斷血管收縮素II受體、較少乾咳。兩者皆孕婦禁用、可保護腎臟與心臟，是高血壓合併糖尿病/CKD/心衰的首選。","options":{"A":"digoxin是強心配醣體，非ACEI。","B":"正解。captopril(ACEI)抑制血管加壓素I轉換為II。","C":"nifedipine是鈣離子阻斷劑，機轉不同。","D":"propranolol是β阻斷劑，非ACEI。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"108020-N3-32":{"quick":"高血壓限酒應「每日酒精攝取量遠低於120 mL」(建議男性≤約30 mL、女性≤約15 mL)；「<120 mL」量過高，最不適當。","detail":{"background":"高血壓護理指導：①維持BMI於正常範圍(控制體重)；②攝取適量鉀、鈣、鎂(DASH飲食)；③「限制酒精」——建議每日純酒精攝取量男性不超過約30 mL(女性約15 mL)，過量飲酒會升高血壓；④持續規律有氧運動。本題C「每日酒精攝取量少於120 mL」其上限訂得「過高」(120 mL純酒精遠超過建議量)，作為衛教標準最不適當。　深入補充：高血壓限酒建議每日純酒精男性≤約30 mL(女性≤15 mL)，過量飲酒升壓並降低藥效。其他生活調整：BMI正常、DASH足量鉀鈣鎂、規律有氧、戒菸、減壓。本題「酒精&lt;120 mL」上限訂得過高，是錯誤衛教。","options":{"A":"維持正常BMI(控制體重)，適當。","B":"攝取適量鉀鈣鎂(DASH)，適當。","C":"最不適當(正解)。每日酒精<120 mL上限過高，應限於男約30 mL/女約15 mL以內。","D":"持續規律有氧運動，適當。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"109030-N3-62":{"quick":"長期服「抗凝血劑」者有出血風險，住院期間「不宜接受腎臟活體組織切片」(侵入性、易大出血)。","detail":{"background":"張先生長期服用「抗凝血劑」(凝血功能被抑制)，此次因血尿、下肢水腫、發燒住院。各檢查的出血風險：①靜脈腎盂攝影、②酚紅試驗(腎功能/排泄試驗)、③肌酸酐廓清試驗皆為非侵入性或低出血風險的檢查，可進行；④「腎臟活體組織切片」是「侵入性穿刺」，在抗凝狀態下進行極易造成腎臟與腹膜後嚴重出血，故住院期間「不宜接受」。應先矯正凝血或停抗凝後再評估。故答案為D。　深入補充：服用抗凝血劑者進行侵入性檢查(腎臟切片、深部穿刺)出血風險高，須先評估/矯正凝血(停藥、補充維生素K或凝血因子)。靜脈腎盂攝影、肌酸酐廓清、酚紅試驗等非侵入或低出血風險檢查可進行。糖尿病用顯影劑須注意腎病變。","options":{"A":"靜脈腎盂攝影為影像檢查，出血風險低，可進行。","B":"酚紅試驗為腎排泄功能檢查，非侵入性出血風險低。","C":"肌酸酐廓清試驗為抽血/收集尿液，無出血風險。","D":"正解。抗凝狀態下腎臟切片(侵入性穿刺)易大出血，不宜接受。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"110030-N3-27":{"quick":"高血壓飲食應「低鈉、足量鈣」，鼓勵「高鈣與高鈉」中的「高鈉」不適當(應減鈉)。","detail":{"background":"高血壓飲食原則(得舒/DASH)：①「減少鈉」(低鈉飲食)，同時攝取「足量鉀、鈣、鎂」；②高纖(全穀、蔬果)飲食；③避免含咖啡因飲料(咖啡因短暫升血壓)；④避免高油、油炸、飽和脂肪食物。本題A「鼓勵高鈣與高鈉飲食」中的「高鈉」與降血壓原則相反(應減鈉)，故不適當。　深入補充：高血壓飲食採DASH原則——低鈉(減鈉)、足量鉀鈣鎂、高纖(全穀蔬果)、低飽和脂肪與低膽固醇、避免咖啡因與酒精。本題「高鈣」可接受但「高鈉」與降壓原則相反，是錯誤之處。","options":{"A":"不適當(正解)。高血壓應「減鈉」，鼓勵高鈉飲食與原則相反。","B":"鼓勵高纖飲食，適當。","C":"避免含咖啡因飲料，適當。","D":"避免高油炸食物，適當。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"110110-N3-27":{"quick":"Propranolol(β阻斷劑)護理：①須確認有無氣喘(β2收縮支氣管禁用)、②服藥前先測心跳(過慢暫停)，選A(①②)。","detail":{"background":"Propranolol是非選擇性β阻斷劑：①會阻斷β2受體使支氣管收縮，「氣喘/COPD病人禁用或慎用」，故服藥前須確認有無氣喘；②具負性頻率/肌力作用，會降低心率與血壓，「給藥前須先測量心跳」，若心搏過慢(如<60次/分)應暫停並通報；③驟停會反彈性心搏過速與血壓上升；④會遮蔽低血糖症狀。低血鈉與脫水並非propranolol的典型副作用(③④錯)。故正確為①②(A)。　深入補充：propranolol為非選擇性β阻斷劑，阻β2會收縮支氣管→氣喘/COPD禁用或慎用；具負性頻率作用，服藥前測心跳、過慢(如&lt;60)暫停；驟停反彈性心搏過速與血壓上升；會遮蔽低血糖症狀(糖尿病須注意)。低血鈉、脫水非典型副作用。","options":{"A":"正解。①確認有無氣喘(β阻斷劑禁忌)、②服藥前測心跳(過慢暫停)。","B":"含③低血鈉(非propranolol典型副作用)，不符。","C":"含③，不符。","D":"含③④(脫水也非典型副作用)，不符。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"112030-N3-37":{"quick":"有乳癌家族史者應「依建議定期接受乳房攝影篩檢」，而非「自覺異狀才做」；故A建議錯誤。","detail":{"background":"面對有乳癌家族史、抽菸、擔心罹癌的周女士，正確的健康促進建議：①有家族史屬高風險，應「依篩檢建議定期接受乳房攝影/超音波檢查」，及早發現，而非等到「自覺乳房異狀才做」(等有症狀常已較晚)；②鼓勵戒菸並轉介戒菸門診(抽菸增加多種癌症與心血管風險)；③將運動融入生活(走樓梯代替電梯)以控制體重與血壓；④適度日曬促進維生素D合成。故錯誤建議為A。　深入補充：有乳癌家族史(尤其一等親)屬高風險，應依篩檢建議「定期」乳房攝影(台灣公費為45~69歲、40~44歲有家族史每2年一次)，而非等症狀。健康促進同時含戒菸、規律運動、體重控制、適度日曬補維生素D。","options":{"A":"錯誤(正解)。有乳癌家族史應「定期」做乳房攝影篩檢，不是自覺異狀才做。","B":"鼓勵戒菸並轉介戒菸門診，正確。","C":"將運動融入生活(走樓梯)有益，正確。","D":"適度日曬促進維生素D合成，正確。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"113180-N3-18":{"quick":"高血壓控制不佳會導致「腦、眼、心、腎」等標靶器官的合併症(D正確)；90%以上是原發性、惡性高血壓血壓極高。","detail":{"background":"高血壓觀念：①約「90~95%是原發性(本態性)」，續發性僅少數，故「90%以上屬續發性」錯誤；②抽菸、喝酒、高膽固醇飲食是「原發性高血壓的危險因子/生活型態因素」，而非「續發性」的病因(續發性有腎、內分泌等特定病因)；③「惡性高血壓」是血壓「急遽且嚴重升高(如舒張壓常>120~130 mmHg)」並合併標靶器官急性損傷的內科急症，並非收縮壓僅130；④高血壓長期控制不佳會造成「腦(中風)、眼(視網膜病變)、心(左心室肥大/心衰/冠心)、腎(腎病變)」等標靶器官合併症(D正確)。　深入補充：原發性高血壓占90~95%(危險因子含抽菸、酗酒、高脂、肥胖、高鈉、壓力)；續發性少數有特定病因。惡性高血壓血壓急遽升高(舒張壓常&gt;120~130)＋器官急性損傷，屬內科急症。長期控制不佳損害腦、眼、心、腎標靶器官。","options":{"A":"約90%以上是「原發性」高血壓，非續發性，錯誤。","B":"抽菸喝酒高膽固醇是原發性高血壓的危險因子，非續發性病因，錯誤。","C":"惡性高血壓血壓極高(舒張壓常>120~130)並合併器官損傷，非收縮壓僅130，錯誤。","D":"正解。高血壓控制不佳常導致腦、眼、心、腎等標靶器官合併症。"},"sources":["新文京《內外科護理學》高血壓","華杏《內外科護理學》心臟血管系統","2017 ACC/AHA 高血壓指引","DASH 飲食/台灣高血壓治療指引"]}},"101030-N3-56":{"quick":"下肢「動脈」功能不全最常出現「間歇性跛行」(走路時缺血疼痛、休息緩解)。","detail":{"background":"下肢動脈功能不全(周邊動脈疾病)是動脈狹窄使遠端組織缺血。最典型且最早的症狀是「間歇性跛行(intermittent claudication)」——行走時肌肉耗氧增加而供血不足，引起小腿/臀部痠痛、休息後緩解；其他：肢體抬高時蒼白、下垂時潮紅、皮膚冰冷光亮無毛、脈搏「減弱或消失」、潰瘍多在腳趾/足背等壓力點且疼痛。相對地，內踝潰瘍與色素沉著是「靜脈」功能不全的特徵。本題動脈功能不全最常見表徵為間歇性跛行。　深入補充：周邊動脈疾病(PAD)以踝肱指數(ABI)診斷，ABI&lt;0.9提示動脈狹窄。「6P」(疼痛、蒼白、無脈、肢冷、麻痺、感覺異常)是急性動脈阻塞的危急徵象，須緊急處置。間歇性跛行隨運動加重、休息緩解，是PAD最早表現。","options":{"A":"正解。間歇性跛行是下肢動脈功能不全最常見的早期表徵。","B":"內腳踝(內踝)潰瘍是「靜脈」功能不全的特徵。","C":"動脈功能不全脈搏「減弱或消失」，非增強。","D":"腳踝色素沉著是「靜脈」鬱積的特徵。"},"sources":["新文京《內外科護理學》周邊動脈疾病","華杏《內外科護理學》心臟血管系統","Harrison 內科學 周邊血管疾病"]}},"101110-N3-59":{"quick":"增進下肢動脈循環最有效的是「步行活動」(促進側枝循環)；抬高下肢反而減少動脈灌流。","detail":{"background":"下肢動脈功能不全的循環促進：「規律步行運動」最有效——走到出現跛行痛後休息、再走，反覆訓練可刺激「側枝循環」形成、改善缺血肢體的血流與行走距離。動脈缺血肢體應採「下垂(非抬高)」以利重力增加動脈灌流；不可用腳底按摩或熱敷(缺血肢體感覺/灌流差，易受傷、燙傷)，保暖宜用穿襪等被動方式而非直接熱源。故最有效措施為步行活動。　深入補充：PAD病人「步行運動(走到跛行痛再休息、反覆)」可促進側枝循環、延長行走距離，是非手術治療的核心。患肢採下垂利重力灌流、保暖用穿襪(勿直接熱源)、戒菸、控制危險因子、抗血小板(aspirin/cilostazol)。","options":{"A":"正解。步行活動促進側枝循環，是增進動脈血流最有效的方式。","B":"抬高下肢會「減少」動脈灌流，不利動脈缺血肢體。","C":"腳底按摩對動脈缺血改善有限，且缺血肢體易受傷。","D":"被動保暖有限，且不可用直接熱源(易燙傷缺血肢)。"},"sources":["新文京《內外科護理學》周邊動脈疾病","華杏《內外科護理學》心臟血管系統","Harrison 內科學 周邊血管疾病"]}},"102030-N3-33":{"quick":"周邊「靜脈」功能不足的表徵是「肢體水腫」(及色素沉著、內踝潰瘍)；間歇性跛行、脈搏消失、蒼白屬動脈。","detail":{"background":"周邊靜脈功能不足(靜脈瓣閉鎖不全/慢性靜脈疾病)：靜脈回流不良使血液鬱積於下肢→「肢體水腫(凹陷性)」、踝部色素沉著(含鐵血黃素沉積)、靜脈曲張、痠脹沉重感、慢性者於「內踝」形成鬱滯性潰瘍，膚溫常溫熱。相對地，間歇性跛行、脈搏消失、肢體蒼白(抬高時)是「動脈」功能不全的特徵。故周邊靜脈功能不足表徵為肢體水腫。　深入補充：靜脈功能不全因靜脈瓣閉鎖不全、久站、肥胖、懷孕、深部靜脈栓塞後遺；表現肢體水腫、踝部色素沉著、靜脈曲張、痠脹沉重、內踝鬱滯性潰瘍。處置以抬高、彈性襪(漸進壓力)、運動、控制體重為主，與動脈缺血的處置相反。","options":{"A":"間歇性跛行是「動脈」功能不全的特徵。","B":"脈搏消失是「動脈」阻塞的特徵。","C":"正解。肢體水腫是周邊靜脈功能不足的典型表徵。","D":"膚色蒼白是「動脈」缺血(抬高時)的表現。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"102110-N3-27":{"quick":"藻酸鈣(Calcium alginate)敷料用於滲液多的傷口，主要目的是「吸收及清除滲液」。","detail":{"background":"藻酸鈣(calcium alginate)敷料是由海藻提煉的纖維，遇傷口滲液形成凝膠，「吸收力強」(可吸收約自身重量數倍的滲液)，適用於「中至大量滲液」的傷口(如靜脈鬱滯性潰瘍、壓瘡)；其釋出的鈣離子亦有輕度促凝/止血作用，並維持濕潤癒合環境。其「最主要目的」是吸收與清除過多滲液、控制傷口濕度，而非止痛、抑制凝血或單純防沾黏。故正解為C。　深入補充：傷口敷料選擇依滲液量與傷口狀態——藻酸鈣(高吸收，中大量滲液)、泡棉(中等吸收)、親水膠體(少量滲液、自體清創)、親水纖維、含銀(抗菌)。靜脈鬱滯性潰瘍治療核心是「壓力治療(彈性繃帶/襪)」改善靜脈高壓。","options":{"A":"止痛非藻酸鈣的主要目的。","B":"藻酸鈣釋出鈣反而有輕度促凝/止血作用，非抑制凝血。","C":"正解。藻酸鈣吸收力強，主要用於吸收及清除傷口滲液。","D":"防沾黏非其主要目的(主要為吸收滲液)。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"103100-N3-32":{"quick":"深部血栓靜脈炎(DVT)會出現「霍曼氏徵象(Homan sign)」陽性——足背屈曲時腓腸肌疼痛。","detail":{"background":"深部靜脈血栓性靜脈炎(DVT)：靜脈內血栓伴發炎，患肢出現紅、腫、熱、痛、緊繃，霍曼氏徵象(Homan sign)可呈陽性——將足部「背屈(dorsiflexion)」時，牽動發炎的腓腸肌與深靜脈引起小腿疼痛。其他選項：Bulge sign與Puddle sign評估膝關節積液；Tinel sign評估周邊神經(如腕隧道)受壓。故DVT相關徵象為Homan sign。　深入補充：深部靜脈栓塞(DVT)以下肢單側腫脹、疼痛、發熱、Homan徵象(足背屈腓腸肌痛)表現，但理學徵象敏感特異度有限，確診靠都卜勒超音波與D-dimer。最危險併發症是肺栓塞，須抗凝並避免按摩患肢。","options":{"A":"Bulge sign評估膝關節積液，與DVT無關。","B":"Puddle sign評估膝關節積液，與DVT無關。","C":"正解。Homan sign(足背屈曲腓腸肌痛)見於深部靜脈血栓。","D":"Tinel sign評估周邊神經受壓(如腕隧道)，非DVT。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"104030-N3-31":{"quick":"長期臥床不動使「靜脈血流鬱積(stasis)」，是形成靜脈血栓的主因(Virchow三要素之一)。","detail":{"background":"Virchow三要素說明血栓形成的三大機轉：①「血流鬱滯(stasis)」、②血液高凝、③血管內皮損傷。長期臥床不動者，小腿肌肉幫浦活動減少→靜脈血流鬱積在下肢深靜脈，是其發生靜脈血栓的「主要原因」。故主因為靜脈血流鬱積。　深入補充：Virchow三要素(血流鬱滯、高凝、內皮損傷)解釋血栓形成。長期臥床、術後、長途旅行(久坐)使下肢靜脈血流鬱滯為主因。預防：早期下床、足踝幫浦運動、彈性襪、間歇性氣壓裝置、高危者預防性抗凝。","options":{"A":"正解。長期臥床使下肢靜脈血流鬱積，是靜脈血栓的主因。","B":"血液高凝是另一機轉，但臥床的直接主因是「血流鬱積」。","C":"血球異常增生非長期臥床的主要機轉。","D":"血管內皮損傷是另一要素，但臥床主因為血流鬱積。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"104100-N3-31":{"quick":"「手壓測定法(manual compression test)」是評估「靜脈瓣」功能(靜脈曲張)，不是評估動脈微血管充盈，故C敘述用於動脈病人是錯的。","detail":{"background":"動脈硬化阻塞疾病(ASO/PAD)：①間歇性跛行、肢體蒼白(抬高時)、週邊觸不到脈動，是動脈缺血表現(A正確)；②晚期嚴重缺血者「休息時末端持續性隱痛(rest pain)」，平躺/夜間加重(B正確)；③應避免穿過緊衣物、過冷以免進一步影響循環(D正確)。而「手壓測定法(manual compression test)」是用於評估「下肢靜脈瓣/靜脈曲張」的檢查(壓迫一段靜脈感覺另一端有無逆流衝擊)，並非檢查動脈的微血管充盈，故C把它用在動脈病人並稱「發現微血管充盈緩慢」是錯誤(評估動脈缺血應看微血管充填時間/抬高蒼白試驗)。　深入補充：動脈硬化阻塞(ASO/PAD)以間歇性跛行、休息痛(rest pain，平躺/夜間加重)、肢端蒼白冰冷無脈、潰瘍/壞疽表現，ABI&lt;0.9診斷。手壓測定法評估的是「靜脈瓣」(靜脈曲張)非動脈，是本題的鑑別陷阱。","options":{"A":"間歇性跛行、蒼白、週邊無脈動是ASO表現，正確。","B":"晚期休息痛(rest pain)是嚴重動脈缺血表現，正確。","C":"錯誤(正解)。手壓測定法評估「靜脈瓣」功能，非動脈微血管充盈。","D":"避免穿過緊衣物以免影響循環，正確。"},"sources":["新文京《內外科護理學》周邊動脈疾病","華杏《內外科護理學》心臟血管系統","Harrison 內科學 周邊血管疾病"]}},"105090-N3-33":{"quick":"DVT患肢「不可按摩」(會使血栓脫落造成肺栓塞)；應抬高、避免侵入治療、評估腫脹。","detail":{"background":"下肢深部靜脈血栓(DVT)急性期護理：①適度抬高患肢減輕腫脹、促靜脈回流；②患肢「避免注射或侵入性治療」(防出血/感染加重)；③每日評估並記錄患肢腫脹、周徑、膚色、疼痛；④臥床休息、依醫囑抗凝、注意肺栓塞徵候。最重要的禁忌是「不可按摩或熱搓患肢」——按摩可能使血栓脫落順血流到肺造成致命「肺栓塞」。故不適宜者為B按摩患處。　深入補充：DVT急性期護理——抬高患肢、臥床休息、抗凝、彈性襪、評估腫脹周徑、注意肺栓塞徵候。最重要禁忌是「不可按摩/熱搓患肢」，因可能使血栓脫落造成致命肺栓塞。患肢避免侵入治療(注射、穿刺)。","options":{"A":"適度抬高患肢減輕腫脹，適宜。","B":"不適宜(正解)。按摩患處可能使血栓脫落造成肺栓塞，絕對禁止。","C":"患肢避免注射或侵入性治療，適宜。","D":"每日評估記錄患肢腫脹，適宜。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"106030-N3-29":{"quick":"吸菸使一氧化碳與血紅素結合(碳氧血紅素)→血液攜氧能力「下降」；說「攜氧能力增加」是錯誤。","detail":{"background":"吸菸對動脈硬化阻塞疾病的不利影響：①尼古丁刺激交感神經使「動脈血管收縮/痙攣」、加重缺血；②使「心跳加快、心輸出量增加」、血壓上升；③一氧化碳(CO)與血紅素結合形成碳氧血紅素，使「血液攜氧能力下降」(非增加)；④以上使「心肌與組織需氧增加但供氧減少」。故C「血液攜氧能力增加」與事實相反，為錯誤敘述。　深入補充：吸菸對PAD的不利——尼古丁使動脈收縮/痙攣、心率血壓上升、CO結合血紅素使攜氧「下降」、加速動脈硬化與血栓。戒菸是PAD與柏格氏病的首要治療。「血液攜氧能力增加」與事實相反，是本題錯誤所在。","options":{"A":"吸菸使動脈血管收縮，正確。","B":"吸菸使心跳加快、心輸出量增加，正確。","C":"錯誤(正解)。吸菸使CO結合血紅素，攜氧能力「下降」，非增加。","D":"吸菸使心肌需氧量增加，正確。"},"sources":["新文京《內外科護理學》周邊動脈疾病","華杏《內外科護理學》心臟血管系統","Harrison 內科學 周邊血管疾病"]}},"106030-N3-30":{"quick":"腹主動脈瘤手術後應避免「高坐臥(髖部過度彎曲)」以防牽扯人工血管吻合處；故C錯誤。","detail":{"background":"腹主動脈瘤(AAA)護理：①嚴格控制血壓(維持收縮壓約100~120 mmHg)，避免血壓過高使動脈瘤破裂；②避免閉氣用力(Valsalva)、便祕用力、提重物使腹壓與血壓驟升；③詳細記錄輸出入量(術後監測腎臟灌流——腎動脈可能受影響)。術後體位應避免「髖部過度彎曲(高坐臥>45~60度)」，以免牽扯/張力作用於人工血管移植吻合處，故「協助術後病人採高坐臥姿」是錯誤護理。　深入補充：腹主動脈瘤(AAA)護理——嚴格控制血壓(收縮壓100~120)防破裂、避免Valsalva與用力、術後避免髖部過度彎曲(防牽扯人工血管吻合處)、記錄I/O(監測腎灌流)。破裂三徵：劇烈腹/背痛、搏動性腫塊、低血壓休克，是外科急症。","options":{"A":"維持收縮壓100~120以防破裂，正確。","B":"避免閉氣用力以防腹壓血壓驟升，正確。","C":"錯誤(正解)。術後應避免高坐臥(髖部過度彎曲)，以防牽扯人工血管吻合處。","D":"詳細記錄輸出入量監測腎灌流，正確。"},"sources":["新文京《內外科護理學》周邊動脈疾病","華杏《內外科護理學》心臟血管系統","Harrison 內科學 周邊血管疾病"]}},"106030-N3-33":{"quick":"下肢腫脹、發紅、溫熱且Homan徵象陽性→最可能是「深部靜脈栓塞(DVT)」。","detail":{"background":"深部靜脈栓塞(DVT)的典型表現：患肢「單側腫脹、發紅、溫熱、緊繃疼痛」、淺靜脈擴張，霍曼氏徵象(Homan sign，足背屈曲時腓腸肌痛)可陽性。靜脈曲張多為彎曲擴張的淺靜脈、無急性紅熱痛；周邊「動脈」阻塞是肢體蒼白、冰冷、無脈、缺血痛；右心衰竭是「雙側」對稱性水腫且無Homan陽性。本題單側紅腫熱痛＋Homan陽性，最符合DVT。　深入補充：DVT典型為單側肢體腫脹、發紅、溫熱、緊繃疼痛、Homan徵象陽性。右心衰竭是雙側對稱水腫；周邊動脈阻塞是蒼白冰冷無脈；靜脈曲張是淺靜脈彎曲擴張無急性紅熱。確診靠都卜勒超音波。","options":{"A":"靜脈曲張為彎曲擴張的淺靜脈，無急性紅熱痛與Homan陽性。","B":"周邊動脈阻塞是蒼白、冰冷、無脈，與紅熱腫脹相反。","C":"正解。單側腫脹發紅溫熱＋Homan陽性，最可能為深部靜脈栓塞。","D":"右心衰竭多為雙側對稱水腫，無單側Homan陽性。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"107110-N3-31":{"quick":"評估交通靜脈與隱靜脈瓣功能用「逆流填充測驗(Retrograde filling test/Trendelenburg test)」。","detail":{"background":"下肢靜脈瓣功能檢查：「逆流填充試驗(Trendelenburg test)」——病人平躺抬高下肢排空靜脈、在大腿綁止血帶壓住隱靜脈，再站起來觀察靜脈充填情形與放鬆止血帶後的逆流，可判斷「隱靜脈瓣與交通(穿通)靜脈瓣」是否閉鎖不全。其他：霍曼氏徵象評估深部靜脈血栓、墨菲氏徵象評估膽囊炎、灌注/Allen試驗評估動脈。故評估靜脈瓣功能用逆流填充試驗。　深入補充：靜脈瓣功能評估——逆流填充試驗(Trendelenburg test)評估隱靜脈與交通靜脈瓣、手壓測驗評估靜脈瓣逆流。Homan徵象評估深部靜脈血栓、Allen test評估手部動脈、墨菲徵象評估膽囊炎，須區辨各檢查的用途。","options":{"A":"正解。逆流填充試驗(Trendelenburg)評估隱靜脈與交通靜脈瓣功能。","B":"霍曼氏徵象評估深部靜脈血栓，非靜脈瓣功能。","C":"墨菲氏徵象評估膽囊炎。","D":"灌注/動脈試驗評估動脈通暢，非靜脈瓣。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"107110-N3-35":{"quick":"DVT患肢「不可按摩」(防血栓脫落致肺栓塞)；應抬高臥床、穿彈性襪、注意肺栓塞徵候。","detail":{"background":"深部血栓靜脈炎護理：①協助抬高患肢、臥床休息以減腫脹並促回流；②急性期過後教導穿「漸進壓力彈性襪」促進靜脈回流、預防再發；③密切「注意肺栓塞徵候」(突發胸痛、呼吸困難、咳血、低血氧)——這是DVT最危險的併發症；④患肢「絕不可按摩」，因按摩可能使血栓脫落順血流栓塞肺動脈。故不適當者為D提供患肢按摩。　深入補充：DVT護理——抬高患肢臥床、依醫囑抗凝、急性期過後穿漸進壓力彈性襪、密切注意肺栓塞徵候(突發胸痛、呼吸困難、咳血、低血氧)。患肢「絕不可按摩」(血栓脫落致肺栓塞)。","options":{"A":"抬高患肢臥床休息，適當。","B":"教導穿彈性襪促進回流，適當。","C":"注意肺栓塞徵候，適當且重要。","D":"不適當(正解)。按摩患肢可能使血栓脫落造成肺栓塞，禁止。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"109110-N3-29":{"quick":"評估深部靜脈栓塞用「霍曼氏徵象(Homan sign)」——足背屈曲時腓腸肌疼痛。","detail":{"background":"深部靜脈栓塞的床邊評估常用「霍曼氏徵象(Homan sign)」：將病人足部用力「背屈(dorsiflexion)」，若牽動發炎的小腿深靜脈/腓腸肌引起小腿疼痛即為陽性，提示可能有DVT(惟特異度有限，須配合影像)。其他：艾倫試驗(Allen test)評估手部橈/尺動脈通暢、抬腿試驗評估坐骨神經/腰椎、克尼格氏徵象(Kernig sign)評估腦膜刺激。故評估DVT用Homan sign。　深入補充：Homan徵象(足背屈時腓腸肌痛)用於床邊評估DVT，但敏感特異度有限，確診須都卜勒超音波與D-dimer。長途飛行、久坐、術後、懷孕、口服避孕藥、惡性腫瘤是DVT危險因子。","options":{"A":"艾倫試驗評估手部動脈通暢，非DVT。","B":"正解。霍曼氏徵象(足背屈腓腸肌痛)用於評估深部靜脈栓塞。","C":"抬腿試驗評估坐骨神經/腰椎，非DVT。","D":"克尼格氏徵象評估腦膜刺激徵象，非DVT。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"110030-N3-28":{"quick":"腹主動脈瘤典型是「腹部可觸及搏動性腫塊、主訴腹部有心跳搏動感」。","detail":{"background":"腹主動脈瘤(AAA)：腹主動脈局部擴張，病人常「主訴腹部有跳動感」，理學檢查可在臍周觸及「搏動性(會跳動)腫塊」，聽診可聞「收縮期」血管嘈音(bruit，非舒張期)。多數無症狀，破裂前兆/擴大時會出現「腹/腰背疼痛」——「背痛加劇」反而提示動脈瘤擴大或瀕臨破裂的危險，而非症狀緩解。血壓不一定上升(破裂時反而休克低血壓)。故最符合的評估結果為C「主訴腹部有心跳搏動感」。　深入補充：腹主動脈瘤(AAA)多無症狀，常於體檢觸及臍周「搏動性腫塊」或主訴腹部跳動感、聽診收縮期嘈音。危險因子：高齡男性、抽菸、高血壓、動脈硬化。直徑越大破裂風險越高(&gt;5.5 cm考慮手術)。背痛加劇是擴大/破裂警訊。","options":{"A":"AAA不一定使血壓上升(破裂時反而低血壓休克)。","B":"AAA聽診為「收縮期」血管嘈音，非舒張期。","C":"正解。腹部搏動性腫塊、主訴腹部有心跳搏動感是AAA典型表現。","D":"疼痛轉移至下背常代表動脈瘤擴大/破裂前兆，是惡化而非緩解。"},"sources":["新文京《內外科護理學》周邊動脈疾病","華杏《內外科護理學》心臟血管系統","Harrison 內科學 周邊血管疾病"]}},"110030-N3-29":{"quick":"靜脈炎患肢應「休息」而非鼓勵活動；正確做法是拔除導管、抬高患肢、局部溫敷。","detail":{"background":"長時間靜脈注射(尤其刺激性藥物/抗生素)引發的「血栓性靜脈炎」護理：①「立即拔除」該處靜脈導管(去除刺激源)、更換注射部位；②抬高患肢減輕腫脹；③局部「溫敷」促進發炎吸收、緩解疼痛；④患肢宜「休息」減少刺激，而非鼓勵活動。本題問錯誤者，B「鼓勵活動」不適當(應休息、抬高、溫敷)。　深入補充：輸液性(化學性)靜脈炎處置——立即拔除導管、抬高患肢、局部溫敷促發炎吸收、患肢休息。預防：選適當靜脈、稀釋刺激性藥物、定期更換注射部位、觀察紅腫熱痛硬索。血栓性靜脈炎可沿靜脈走向硬化。","options":{"A":"抬高患肢減輕腫脹，正確。","B":"錯誤(正解)。靜脈炎患肢應休息，不宜鼓勵活動。","C":"立即拔除靜脈導管去除刺激源，正確。","D":"局部溫敷促進發炎吸收、緩解疼痛，正確。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"110030-N3-30":{"quick":"預防靜脈曲張：①避免外傷、④規律運動(選B 14)；下肢「宜抬高」、且應「控制體重」。","detail":{"background":"預防靜脈曲張(慢性靜脈功能不全)的護理指導：①避免下肢外傷(靜脈曲張處皮膚脆弱易破潰出血)；④「規律運動」(尤其走路、踝幫浦運動)促進小腿肌肉幫浦、改善靜脈回流；另應「抬高下肢」促回流、穿彈性襪、「控制體重」(肥胖增加靜脈壓)、避免久站久坐。故②「下肢不宜抬高」(錯，應抬高)、③「不需控制體重」(錯，應控制)皆不適當。正解為①④(B)。　深入補充：預防靜脈曲張——避免久站久坐、抬高下肢、穿漸進壓力彈性襪、控制體重、規律運動(踝幫浦)、避免外傷與緊束衣物。已形成的靜脈曲張可考慮硬化劑注射、雷射、剝除結紮手術。","options":{"A":"含③(應控制體重)，不符。","B":"正解。①避免外傷、④規律運動，是預防靜脈曲張的正確指導。","C":"含②③(下肢宜抬高、需控制體重)，不符。","D":"含②，不符。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"110110-N3-26":{"quick":"Warfarin預防DVT：①監測PT、④用電動刮鬍刀防出血(選B 14)；應避免銀杏當歸、血尿須通報。","detail":{"background":"使用Warfarin的護理指導：①定期監測「凝血酶原時間(PT)/INR」(目標約2~3)；④日常防出血——用「電動刮鬍刀」、軟毛牙刷、避免外傷；②避免銀杏、當歸、大蒜、人參等具抗凝/活血作用的食品(會增強出血)；③出現「血尿、牙齦出血、黑便、瘀斑」是出血徵象，須「立即通報」而非置之不理。故正確為①④(B)。　深入補充：Warfarin衛教——監測PT/INR、用電動刮鬍刀與軟毛牙刷防出血、避免銀杏當歸大蒜人參(增出血)、維生素K食物固定適量、漏服不補雙倍、出血徵象(血尿、黑便、瘀斑、牙齦出血)立即通報就醫，不可置之不理。","options":{"A":"含③(血尿不理會，錯誤)，不符。","B":"正解。①監測PT、④用電動刮鬍刀防出血。","C":"含②③(銀杏當歸增強出血、血尿不理)，不符。","D":"含②，不符。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"110110-N3-33":{"quick":"請病人快速「背屈足部」出現小腿疼痛＝「霍曼氏徵象(Homan sign)」，提示深部靜脈栓塞。","detail":{"background":"霍曼氏徵象(Homan sign)：囑病人膝伸直、將足部用力「背屈(向上彎)」，若引起小腿(腓腸肌)疼痛即陽性，常用於懷疑深部靜脈血栓的床邊評估(特異度有限，須配合超音波)。其他霍夫曼徵象(Hoffmann sign)是上運動神經元徵象(中指甲彈撥引起拇指屈曲)，與本題無關；B、C為混淆選項。故為Homan sign。　深入補充：Homan徵象(足背屈→腓腸肌痛)是床邊評估DVT的徵象，但僅供參考(敏感特異度低)，確診靠都卜勒超音波。霍夫曼徵象(Hoffmann)是上運動神經元徵象，與靜脈無關，是混淆選項。","options":{"A":"霍夫曼徵象(Hoffmann)是上運動神經元徵象，與小腿痛無關。","B":"為混淆選項，非正確徵象名稱。","C":"為混淆選項，非正確徵象名稱。","D":"正解。足背屈出現小腿疼痛是霍曼氏徵象(Homan sign)。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"111030-N3-27":{"quick":"柏格氏病(Buerger病/血栓閉塞性血管炎)「與抽菸高度相關」，侵犯遠端中小動脈、好發下肢、會跛行。","detail":{"background":"柏格氏病(Buerger disease，血栓閉塞性脈管炎, thromboangiitis obliterans)：好發於「年輕男性吸菸者」，與抽菸「高度相關」(戒菸是治療關鍵)，是遠端「中小型動脈與靜脈」的發炎性閉塞，「好發於下肢遠端(足、小腿)」，造成間歇性跛行、肢端缺血、休息痛、潰瘍甚至壞疽。故正確為「與抽菸有關」。　深入補充：柏格氏病(血栓閉塞性脈管炎)好發年輕男性吸菸者、遠端中小動脈與靜脈節段性發炎閉塞、好發下肢、造成間歇性跛行、缺血痛、潰瘍壞疽，並可有遊走性表淺靜脈炎。「戒菸」是唯一有效阻止病程進展的方法。","options":{"A":"正解。柏格氏病與抽菸高度相關，戒菸為治療關鍵。","B":"主要侵犯遠端「中小動脈」(及靜脈)，非僅周邊靜脈阻塞。","C":"好發於「下肢」遠端，非上肢。","D":"會出現間歇性跛行，走路有異狀，非「無異狀」。"},"sources":["新文京《內外科護理學》周邊動脈疾病","華杏《內外科護理學》心臟血管系統","Harrison 內科學 周邊血管疾病"]}},"111110-N3-27":{"quick":"雷諾氏病好發於「肢體遠端(手指/腳趾)」而非近心端；好發年輕女性、遇冷/壓力誘發、患肢三相變色(白→紫→紅)。","detail":{"background":"雷諾氏病/現象(Raynaud)：遇「寒冷或情緒壓力」誘發的「遠端肢體(手指、腳趾)」小動脈陣發性痙攣，造成典型三相變色——先「蒼白(缺血)」→「發紺(缺氧)」→回暖後「潮紅(反應性充血)」，伴麻木刺痛。好發於「年輕女性」。其侵犯部位是「遠端肢端」而非近心端，故B「好發於近心端肢體」錯誤。　深入補充：雷諾現象遇冷/壓力誘發遠端肢端(手指腳趾)小動脈痙攣，呈蒼白→發紺→潮紅三相變色。原發性(雷諾病)好發年輕女性、預後良好；續發性與結締組織病(硬皮症、SLE)相關。處置：保暖、戒菸、避免誘因、必要時鈣阻斷劑。","options":{"A":"好發於年輕女性，正確。","B":"錯誤(正解)。雷諾氏病好發於「遠端肢端(手指腳趾)」，非近心端。","C":"遇冷或壓力誘發血管痙攣，正確。","D":"患肢先變白(缺血)再發紺(缺氧)，正確。"},"sources":["新文京《內外科護理學》周邊動脈疾病","華杏《內外科護理學》心臟血管系統","Harrison 內科學 周邊血管疾病"]}},"111110-N3-31":{"quick":"下肢周邊「動脈」疾病應「鼓勵促進下肢血循的運動(步行)」；高飽和脂肪、抬高患肢、局部熱敷皆不宜。","detail":{"background":"下肢周邊動脈疾病(PAD)護理指導：①「鼓勵步行運動」促進側枝循環、改善跛行(B正確)；②飲食應「低飽和脂肪、低膽固醇」控制動脈硬化，「多攝取高飽和脂肪」錯誤；③動脈缺血肢體應「下垂(非抬高)」以利重力增加灌流，「抬高患肢」會減少動脈血流；④「不可局部熱敷」——缺血肢體感覺與灌流差，熱敷易燙傷且增加組織代謝需氧。故正確為B。　深入補充：周邊「動脈」疾病護理——鼓勵步行(促側枝循環)、低脂飲食控制動脈硬化、患肢「下垂(勿抬高)」利灌流、「勿熱敷」(缺血肢易燙傷)、戒菸、控糖控壓、足部護理(防潰瘍感染)、抗血小板。與靜脈疾病(抬高、彈性襪)處置相反。","options":{"A":"應低飽和脂肪飲食，「多攝取高飽和脂肪」錯誤。","B":"正解。鼓勵步行等促進下肢血循的運動，改善動脈缺血。","C":"動脈缺血肢體宜下垂，「抬高患肢」反減少灌流。","D":"缺血肢體不可局部熱敷(易燙傷、增加耗氧)。"},"sources":["新文京《內外科護理學》周邊動脈疾病","華杏《內外科護理學》心臟血管系統","Harrison 內科學 周邊血管疾病"]}},"111110-N3-33":{"quick":"長程飛行久坐不動使下肢「血液鬱積(stasis)」，是搭機後DVT的主要原因。","detail":{"background":"長途飛行造成深部靜脈栓塞(經濟艙症候群)的主要機轉是「血流鬱滯」：長時間久坐、下肢屈曲不動使小腿肌肉幫浦失能，靜脈血鬱積於下肢深靜脈；加上機艙脫水、低濕度使血液濃稠。雖Virchow三要素中高凝、內皮損傷也可能參與，但「久坐不動造成的血液鬱積」是最直接主因。預防：定時起身走動、踝部運動、多喝水、穿彈性襪。故主因為血液鬱積。　深入補充：長途飛行/久坐(經濟艙症候群)使下肢靜脈血流鬱滯為DVT主因，加上機艙脫水使血液濃稠。預防：定時起身走動、足踝運動、多喝水、穿彈性襪、高危者預防性抗凝。出現單側下肢腫痛須警覺DVT。","options":{"A":"內皮細胞受損非久坐的主要機轉。","B":"血液凝固性增加(脫水)有影響，但主因是久坐血液鬱積。","C":"正解。久坐不動使下肢靜脈血液鬱積，是搭機後DVT的主因。","D":"血管收縮非搭機DVT的主要原因。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"112030-N3-31":{"quick":"靜脈注射不當造成血管紅、腫、痛＝「血栓性靜脈炎」。","detail":{"background":"靜脈注射(尤其長時間留置或注入刺激性藥物)損傷靜脈內皮、合併血流鬱滯，造成局部靜脈發炎與血栓形成，沿靜脈走向出現「紅、腫、熱、痛、硬索狀」，即「(表淺)血栓性靜脈炎(thrombophlebitis)」。處置：拔除導管、抬高、溫敷、休息。靜脈曲張是淺靜脈彎曲擴張、靜脈功能不全是慢性回流不良水腫、鬱滯性潰瘍是慢性靜脈高壓的內踝潰瘍，皆與此急性紅腫痛不同。故為血栓性靜脈炎。　深入補充：靜脈注射損傷內皮、合併刺激性藥物與血流鬱滯，造成局部血栓性靜脈炎(沿靜脈紅腫熱痛硬索)。處置：拔除導管、抬高、溫敷、休息。與靜脈曲張(淺靜脈擴張)、靜脈功能不全(慢性水腫)、鬱滯性潰瘍(內踝慢性潰瘍)不同。","options":{"A":"靜脈曲張是淺靜脈彎曲擴張，無急性紅腫痛。","B":"正解。靜脈注射不當引起血管紅腫痛屬血栓性靜脈炎。","C":"靜脈功能不全是慢性回流不良、水腫，非急性紅腫痛。","D":"鬱滯性潰瘍是慢性靜脈高壓的內踝潰瘍。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"112110-N3-32":{"quick":"靜脈曲張護理：睡前/休息時「抬高患肢」促進回流(D正確)；應穿彈性襪非緊身衣、維持理想體重、適度運動。","detail":{"background":"靜脈曲張(慢性靜脈功能不全)護理指導：①「抬高患肢」(高於心臟)促進靜脈回流、減輕腫脹沉重感，睡前或休息時抬高有益(D正確)；②穿「漸進壓力彈性襪」而非「緊身衣」(緊身衣會壓迫近端、反阻礙回流)；③維持「理想體重」(肥胖增加靜脈壓，不可「無需維持」)；④鼓勵「適度運動」(走路、踝幫浦)促進回流，而非「不宜運動」。故正確為D。　深入補充：靜脈曲張護理——抬高患肢(高於心臟)、穿漸進壓力彈性襪(非緊身衣，緊身衣壓近端反阻回流)、維持理想體重、適度運動(踝幫浦)、避免久站久坐與外傷。嚴重者考慮硬化治療、雷射或剝除手術。","options":{"A":"應穿漸進壓力彈性襪，「緊身衣」會阻礙回流，不宜。","B":"須維持理想體重(肥胖加重靜脈壓)，非「無需維持」。","C":"應鼓勵適度運動促回流，非「不宜運動」。","D":"正解。睡前/休息時抬高患肢可促進靜脈回流、減輕症狀。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"113030-N3-20":{"quick":"DVT服Warfarin應「避免大量食用深綠色蔬菜(維生素K)」；Warfarin監測PT/INR(非APTT)、不可自停、不補維生素K。","detail":{"background":"下肢DVT使用Warfarin的護理指導：①監測「凝血酶原時間PT/INR」(APTT是Heparin的監測指標)；②不可自行停藥(停藥增加血栓復發風險)；③維生素K會「拮抗」Warfarin降低藥效，富含維生素K的深綠色蔬菜(菠菜、花椰菜、海帶)應「固定且適量、避免大量攝取」(C正確)；④不可額外「補充維生素K」(會抵消藥效)。故正確為C。　深入補充：DVT用Warfarin——監測PT/INR(非aPTT)、不可自停(防復發)、深綠蔬菜(維生素K)固定適量勿大量、不額外補維生素K、避免增出血食品(銀杏當歸)、防跌防外傷、定期回診調整劑量。NOAC為替代選擇(限制少)。","options":{"A":"Warfarin監測PT/INR，APTT是Heparin的指標，錯誤。","B":"不可自行停藥(防血栓復發)，錯誤。","C":"正解。避免大量食用深綠色蔬菜(維生素K拮抗Warfarin)。","D":"補充維生素K會抵消Warfarin藥效，不可，錯誤。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"113180-N3-19":{"quick":"評估靜脈曲張靜脈瓣功能用①逆流型充盈試驗(Trendelenburg)、④手壓測驗(選B 14)；Allen評動脈、Homan評DVT。","detail":{"background":"評估下肢「靜脈曲張之靜脈瓣功能」的檢查：①「逆流型(retrograde)充盈試驗(Trendelenburg test)」——評估隱靜脈與交通靜脈瓣逆流；④「手壓測驗(manual compression test)」——壓迫近端靜脈、於遠端感覺有無逆流衝擊波，評估靜脈瓣閉鎖不全。②艾倫試驗(Allen test)評估手部「橈/尺動脈」通暢、③霍曼氏徵象(Homan sign)評估「深部靜脈血栓」，皆非評估靜脈瓣功能。故正解為①④(B)。　深入補充：靜脈曲張靜脈瓣功能評估——逆流型充盈試驗(Trendelenburg)與手壓測驗(manual compression test)。Allen test評手部橈尺動脈、Homan徵象評DVT，皆非評估靜脈瓣。都卜勒超音波是現今評估靜脈逆流的標準。","options":{"A":"含②Allen(評動脈)，不符。","B":"正解。①逆流型充盈試驗、④手壓測驗評估靜脈瓣功能。","C":"含②③(Allen評動脈、Homan評DVT)，不符。","D":"含③Homan，不符。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"114030-N3-20":{"quick":"靜脈剝除結紮術後臥床期間「應鼓勵足踝/下肢關節運動」促進靜脈回流、預防DVT；說「避免全範圍關節運動」是錯誤。","detail":{"background":"靜脈曲張剝除結紮(stripping & ligation)術後照護：①臥床期間應「鼓勵足踝背屈/伸直等下肢關節運動」促進靜脈回流、預防深部靜脈血栓，而非「避免全範圍關節運動」(臥床不動反增血栓)；②抬高床尾約15度、膝部保持不彎曲，利於靜脈回流並避免膝後靜脈受壓；③下床時穿彈性襪維持壓力、促回流；④監測末梢血循、膚色、感覺(評估有無神經血管損傷)。故錯誤者為A。　深入補充：靜脈剝除結紮術後——臥床期間鼓勵足踝/下肢關節運動促靜脈回流防DVT、抬高床尾約15度膝不彎、下床穿彈性襪、監測末梢血循與感覺(防神經血管損傷)、觀察傷口出血。早期下床活動有助回流，避免長期不動。","options":{"A":"錯誤(正解)。術後臥床應鼓勵足踝/下肢關節運動防DVT，不可避免全範圍關節運動。","B":"抬高床尾15度、膝不彎曲利靜脈回流，正確。","C":"下床時穿彈性襪維持壓力，正確。","D":"監測末梢血循與感覺異常，正確。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"114100-N3-18":{"quick":"預防靜脈血栓「不宜多穿緊身衣」(會壓迫近端阻礙回流)；應早期下床、抬高下肢、穿彈性襪。","detail":{"background":"預防靜脈血栓(DVT)措施：①術後「早期下床活動」促進小腿肌肉幫浦、改善靜脈回流；③「抬高下肢」促回流、減少鬱滯；④穿「漸進壓力彈性襪/間歇性氣壓裝置」促進靜脈回流。而「多穿緊身衣」會壓迫近端靜脈、反而「阻礙回流、增加鬱滯」，與彈性襪的「漸進壓力(遠端緊近端鬆)」不同，故B「多穿緊身衣」不適當。　深入補充：預防靜脈血栓——早期下床活動、足踝幫浦運動、抬高下肢、漸進壓力彈性襪、間歇性氣壓裝置、高危者預防性抗凝。「緊身衣」會壓迫近端靜脈反阻回流，與「漸進壓力(遠緊近鬆)彈性襪」不同，故不適當。","options":{"A":"術後早期下床活動促回流，預防DVT，適當。","B":"不適當(正解)。緊身衣壓迫近端阻礙靜脈回流，反不利；應穿「漸進壓力彈性襪」。","C":"抬高下肢促進靜脈回流，適當。","D":"穿彈性襪促進靜脈回流，適當。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"114170-N3-16":{"quick":"使用「Heparin」者無維生素K飲食限制；「避免深色蔬菜」是Warfarin的指導，對Heparin病人最不適當。","detail":{"background":"孕婦DVT常用「Heparin/低分子量肝素」抗凝(分子大、不通過胎盤，較Warfarin安全)。護理指導：①避免自行按摩腿部(防血栓脫落致肺栓塞)；②避免使用「口服避孕藥」(雌激素增加血栓風險)；④避免長期久坐(防血流鬱滯)。而「避免食用深色(深綠)蔬菜」是針對「Warfarin」(維生素K拮抗)的飲食指導，對使用「Heparin」者並無此維生素K限制，故C對本題Heparin病人「最不適當」。　深入補充：孕婦DVT首選Heparin/低分子量肝素(分子大、不過胎盤、較Warfarin安全；Warfarin致畸)。護理：避免按摩腿部、避免口服避孕藥(雌激素增血栓)、避免久坐。Heparin無維生素K飲食限制(「避免深綠蔬菜」是Warfarin指導)，故對Heparin病人不適當。","options":{"A":"避免自行按摩腿部防血栓脫落，適當。","B":"避免口服避孕藥(雌激素增加血栓風險)，適當。","C":"最不適當(正解)。避免深綠色蔬菜是Warfarin指導；用Heparin者無此維生素K限制。","D":"避免長期久坐防血流鬱滯，適當。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"115030-N3-17":{"quick":"血栓性靜脈炎患肢「不可定期按摩」(會使血栓脫落致肺栓塞)；應抬高、用Coumadin、Homan評估。","detail":{"background":"血栓性靜脈炎評估與照護：①Homan徵象——足背屈曲時腓腸肌疼痛(A正確)；②口服Coumadin(Warfarin)可預防與治療靜脈血栓(B正確)；③協助「抬高患肢」可減輕發炎與疼痛、促進回流(D正確)；④「絕不可定期按摩患肢」——按摩可能使血栓脫落造成致命肺栓塞，故C「定期按摩患肢促進循環」是錯誤照護。　深入補充：血栓性靜脈炎評估與照護——Homan徵象、抬高患肢減輕發炎疼痛、口服Coumadin/抗凝預防治療、彈性襪、注意肺栓塞。「絕不可按摩患肢」(血栓脫落致肺栓塞)是核心禁忌。表淺者可溫敷，深部者以抗凝為主。","options":{"A":"足背屈曲腓腸肌痛(Homan)是血栓性靜脈炎評估，正確。","B":"口服Coumadin可預防治療靜脈血栓，正確。","C":"錯誤(正解)。患肢不可按摩，按摩會使血栓脫落造成肺栓塞。","D":"抬高患肢可減輕發炎及疼痛，正確。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"115030-N3-18":{"quick":"靜脈鬱滯性潰瘍：①好發足踝「內側」、②色素沉著、③凹陷性水腫(選A 123)；趾甲變厚、腳趾潰瘍屬動脈缺血。","detail":{"background":"慢性靜脈功能不全引起的「鬱滯性潰瘍(stasis ulcer)」之肢體評估：①潰瘍多發生於「足踝內側(內踝上方)」；②慢性靜脈高壓使含鐵血黃素沉積，皮膚出現「色素沉著(棕褐色)」；③下肢「凹陷性水腫」、皮膚硬化(脂肪皮膚硬化症)。相對地，④「趾甲增厚」與⑤「腳趾(末端)潰瘍」是「動脈」缺血(肢端供血不足)的特徵。故靜脈鬱滯性潰瘍的正確評估為①②③(A)。　深入補充：靜脈鬱滯性潰瘍(慢性靜脈功能不全)——潰瘍在「足踝內側」、色素沉著(含鐵血黃素)、凹陷性水腫、皮膚硬化(脂肪皮膚硬化)、溫熱。動脈缺血潰瘍則在「肢端/壓力點」、趾甲增厚、蒼白冰冷無脈、痛。治療核心是壓力治療改善靜脈高壓。","options":{"A":"正解。①足踝內側潰瘍、②色素沉著、③凹陷性水腫是靜脈鬱滯性潰瘍特徵。","B":"含⑤腳趾潰瘍(屬動脈缺血)，不符。","C":"含⑤，不符。","D":"含④⑤(趾甲變厚、腳趾潰瘍屬動脈)，不符。"},"sources":["新文京《內外科護理學》靜脈疾病/靜脈栓塞","華杏《內外科護理學》心臟血管系統","2021 ASH 靜脈血栓栓塞指引"]}},"101030-N3-25":{"quick":"IABP在「心臟收縮時放氣」→降低左心室「後負荷」(舒張時充氣則增加冠狀動脈灌流)。","detail":{"background":"主動脈內氣球幫浦(IABP)導管置於「降主動脈」，與心動週期同步：①「心臟舒張期、主動脈瓣關閉時氣球充氣」——將血推向上(增加冠狀動脈灌流)與向下(增加全身灌流)，提升舒張壓、改善心肌供血；②「心臟收縮期、主動脈瓣開啟前氣球放氣」——瞬間在主動脈造成負壓真空，使左心室射血阻力下降，「降低後負荷」、減少心肌耗氧。故收縮期放氣的作用是降低左心室後負荷。　深入補充：IABP導管置降主動脈，與心動週期同步：舒張期(主動脈瓣關閉)充氣→提升舒張壓、增加冠脈與全身灌流；收縮期放氣→在主動脈造成負壓、降低後負荷與心肌耗氧。用於心因性休克、高危PCI、心臟術後橋接。禁忌：主動脈瓣逆流、主動脈剝離。","options":{"A":"收縮期是「放氣」非充氣；且充氣在舒張期，作用非降前負荷。","B":"收縮期是放氣非充氣，敘述時相錯誤。","C":"放氣降的是「後負荷」非前負荷。","D":"正解。收縮期氣球放氣，降低左心室後負荷、減少心肌耗氧。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"101030-N3-48":{"quick":"TEE合併dobutamine藥物壓力試驗「不需常規插入動脈導管」；故B錯誤。","detail":{"background":"經食道心臟超音波(TEE)：探頭經食道貼近心臟取像，影像清晰。檢查護理：①檢查前禁食約6小時(防誤吸、便於插管)；②過程監測血壓、心電圖與血氧；③探頭插入食道/胃部可刺激迷走神經，須監測有無迷走反應(心搏過緩、低血壓)。若合併dobutamine藥物壓力試驗(以藥物增加心臟負荷模擬運動)，主要監測心電圖、血壓與症狀，「不需常規插入動脈導管」。故B「需插入動脈導管」為錯誤敘述。　深入補充：TEE(經食道超音波)探頭貼近心臟、影像清晰，用於評估瓣膜、贅生物(心內膜炎)、左心耳血栓(整流前)、主動脈病變。檢查禁食6小時、局部麻醉咽喉、監測血壓心電圖血氧與迷走反應(心搏過緩、低血壓)。檢查後待吞嚥反射恢復才進食。","options":{"A":"檢查前禁食6小時，正確。","B":"錯誤(正解)。TEE合併dobutamine壓力試驗不需常規插入動脈導管。","C":"過程監測血壓與心電圖，正確。","D":"探頭插入可引起迷走神經反應，須監測，正確。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"101030-N3-49":{"quick":"運動壓力試驗目標是達到「目標(次極限)心跳」並監測缺血，而非「最高心跳」；出現症狀/缺血即停止。","detail":{"background":"運動壓力試驗(運動心電圖)：讓病人在跑步機/腳踏車上漸進運動以增加心臟負荷，觀察心電圖ST變化、症狀與血壓反應，評估冠狀動脈是否在運動時供血不足。①「目標心率」以「最大預測心率(220-年齡)的約85%(次極限)」為目標，而非追求「達到絕對最高心跳」；②過程監測心肌缺氧(ST下降、胸痛)；③出現異常心電圖(ST下降≥1 mm)或胸痛、心律不整、血壓異常即「停止並判為陽性」。故A「目標是讓病人達到最高心跳」是錯誤(目標是次極限並適時停止)。　深入補充：運動壓力試驗目標達次極限心率(約最大預測心率85%)並監測ST變化、症狀、血壓。陽性指標：ST下降≥1 mm、胸痛、血壓下降、惡性心律不整。禁忌：急性心肌梗塞、不穩定心絞痛、嚴重主動脈狹窄、失控心律不整。不能運動者用藥物壓力試驗。","options":{"A":"錯誤(正解)。目標是達「次極限的目標心率」並適時停止，非追求絕對最高心跳。","B":"最高心率以年齡計算(220-年齡)，正確。","C":"過程監測心肌缺氧變化，正確。","D":"出現異常心電圖代表陽性，正確。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"102030-N3-29":{"quick":"心導管檢查後穿刺側肢體應「伸直制動」止血，不可「屈曲90度」；故A錯誤。","detail":{"background":"心導管檢查護理：①檢查前禁食至少約4~6小時(防嘔吐吸入)；②檢查後密切監測生命徵象(觀察出血、心律不整、過敏)；③觀察穿刺側遠心端肢體的脈搏、膚色、溫度與感覺(評估動脈血流)；④穿刺側肢體須「伸直、制動數小時」、加壓止血，避免彎曲(尤其經股動脈者不可屈髖屈膝)。故A「維持檢查側肢體屈曲90度」是錯誤——屈曲會牽動穿刺處造成出血/血腫。　深入補充：心導管檢查可評估冠脈狹窄、測量腔室壓力與心輸出、做PCI。術後穿刺側(股或橈)肢體伸直制動加壓止血、監測末梢循環(6P)與穿刺處出血血腫、多喝水排顯影劑。並發症含出血、血腫、假性動脈瘤、顯影劑腎病變、心律不整。","options":{"A":"錯誤(正解)。穿刺側肢體應伸直制動止血，不可屈曲90度。","B":"檢查前禁食至少4小時，正確。","C":"檢查後密切監測生命徵象，正確。","D":"觀察檢查側肢體末梢血液循環，正確。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"102110-N3-26":{"quick":"ECMO(葉克膜體外維生系統)如同「體外心肺循環」，可同時支持循環並執行氣體交換(氧合與排碳)。","detail":{"background":"葉克膜(ECMO，extracorporeal membrane oxygenation)是「體外心肺循環支持」：將血引出體外，經氧合器進行「氣體交換(供氧、排二氧化碳)」後再泵回體內，可暫時取代/輔助心臟與肺臟功能，用於嚴重心因性休克、急性呼吸窘迫等可逆性心肺衰竭的過渡支持。它不是單純的呼吸器(可同時取代心臟泵血)、非節律器、非人工腎臟(排毒是透析的功能)。故最正確為「如同體外心肺循環，執行氣體交換」。　深入補充：ECMO分VV型(靜脈到靜脈，僅支持肺/氣體交換)與VA型(靜脈到動脈，同時支持心與肺)。用於可逆性嚴重心肺衰竭的過渡(等待恢復、移植或裝置)。並發症含出血、血栓、肢體缺血、感染。非人工腎臟(排毒靠透析)、非節律器。","options":{"A":"ECMO不只如呼吸器，還可支持「循環」，敘述不完整。","B":"ECMO非體外節律器、不治療心律不整。","C":"正解。ECMO如同體外心肺循環，支持循環並執行氣體交換。","D":"排除毒素是人工腎臟(透析)的功能，非ECMO。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"103030-N3-33":{"quick":"心臟移植後最常見的合併症是「排斥與感染」(免疫抑制下的兩大威脅)。","detail":{"background":"心臟移植術後須長期使用免疫抑制劑以防排斥，但這也使病人處於「排斥」與「感染」的兩難：①「移植排斥」(急性/慢性，包括移植血管病變)是移植失敗主因，須定期心肌切片監測；②免疫抑制使「感染(細菌、病毒如CMV、黴菌、伺機性感染)」風險大增，是術後死亡的重要原因。故排斥與感染是心臟移植後「最常見」的合併症。　深入補充：心臟移植術後長期免疫抑制(calcineurin抑制劑、類固醇、抗增殖劑)以防排斥，但增加感染、惡性腫瘤、腎毒性、高血壓、糖尿病風險。排斥(急性細胞性/抗體性、慢性移植血管病變)與感染是術後兩大威脅，須定期心肌切片監測。","options":{"A":"酸鹼中毒非心臟移植後最常見合併症。","B":"正解。排斥與感染是心臟移植後最常見的合併症。","C":"心臟衰竭可因排斥引起，但「排斥與感染」才是最常見直接合併症。","D":"肺水腫非移植後最常見的特異合併症。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"103100-N3-26":{"quick":"IABP氣球在「心室舒張、主動脈瓣關閉時充氣」(增加冠狀動脈灌流)；導管置於「降主動脈」。","detail":{"background":"主動脈內氣球幫浦(IABP)操作原理：①導管置於「降主動脈」(左鎖骨下動脈遠端至腎動脈上方)，非升主動脈；②「心室舒張、主動脈瓣關閉時氣球充氣」——提升舒張壓、增加「冠狀動脈血流量」與全身灌流(B正確)；③「心室收縮、主動脈瓣開啟前放氣」——降低後負荷、減少心肌耗氧。充氣與下肢「靜脈」回流無關；增加冠狀動脈血流是「充氣(舒張期)」時、非放氣時。故正確為B。　深入補充：IABP導管置「降主動脈」(左鎖骨下動脈遠端至腎動脈上方)；舒張期(主動脈瓣關閉)充氣增冠脈灌流、收縮期放氣降後負荷。護理：患肢伸直制動、比較雙側末梢循環(防下肢缺血)、抗凝、監測血小板(肝素誘導性血小板低下)。","options":{"A":"IABP導管放置於「降主動脈」，非升主動脈。","B":"正解。氣球在心室舒張、主動脈瓣關閉時充氣，增加冠脈灌流。","C":"充氣與下肢「靜脈」回流量無關。","D":"增加冠狀動脈血流是「充氣(舒張期)」的作用，非放氣時。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"104030-N3-28":{"quick":"可同時測得心臟「各腔室壓力」的檢查是「心導管檢查」。","detail":{"background":"心導管檢查是將導管經周邊血管送入心臟各腔室與大血管，可「直接測量各腔室與肺動脈的壓力、血氧」、評估心輸出量、注射顯影劑做冠狀動脈攝影、量測壓力差(瓣膜狹窄)等，是評估血流動力學的侵入性「金標準」。動脈血管攝影主要看血管形態；心臟電氣生理檢查評估傳導/心律不整；核磁共振看結構。故能同時測各腔室壓力者為心導管檢查。　深入補充：心導管是評估血流動力學的侵入性金標準，可直接測各腔室與肺動脈壓力、血氧、心輸出量(熱稀釋/Fick法)、瓣膜壓力差，並做冠脈攝影與PCI。非侵入替代有心臟超音波(估算)、核磁共振(結構)、核子掃描(灌注)。","options":{"A":"動脈血管攝影主要顯示血管形態，非測各腔室壓力。","B":"正解。心導管檢查可直接測得心臟各腔室壓力。","C":"心臟電氣生理檢查評估傳導與心律不整，非測壓力。","D":"核磁共振顯示結構影像，非直接測腔室壓力。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"104030-N3-30":{"quick":"人工心肺機手術後，用「魚精蛋白(Protamine)」中和「Heparin(肝素)」的抗凝作用。","detail":{"background":"心臟手術使用人工心肺機(體外循環)時須全身肝素化(heparin)防止血液在管路中凝固。手術結束、恢復正常血循時，給予「魚精蛋白(Protamine sulfate)」與肝素結合形成穩定複合物，「中和(逆轉)肝素的抗凝作用」以恢復正常凝血、減少術後出血。Protamine是肝素的專一拮抗劑，與aspirin、coumadin、digoxin無此中和關係(Warfarin以維生素K逆轉)。故中和的是Heparin。　深入補充：人工心肺機(體外循環)術中全身肝素化防管路凝血，術後用魚精蛋白(Protamine)依比例中和肝素恢復凝血。Protamine本身可能引起低血壓、過敏(對魚過敏、曾用含魚精蛋白胰島素者風險高)。Warfarin則以維生素K逆轉。","options":{"A":"Aspirin抗血小板，無Protamine中和。","B":"Coumadin(Warfarin)以維生素K逆轉，非Protamine。","C":"Digoxin非抗凝劑，與Protamine無關。","D":"正解。Protamine中和Heparin(肝素)的抗凝作用。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"105090-N3-28":{"quick":"右鼠蹊心導管後穿刺側肢體應「伸直制動」止血，不可「多彎曲」；故C不適當。","detail":{"background":"經股動脈(右鼠蹊)心導管檢查後護理：①多喝開水加速顯影劑由腎臟排出、預防顯影劑腎病變；②密切監測心跳、血壓，觀察出血、血腫、心律不整等合併症；③穿刺側肢體須「伸直、制動數小時」並加壓，避免屈髖屈膝牽動穿刺處出血；④喝水後若無噁心嘔吐等不適即可進食。故C「指導病人多彎曲穿刺肢體」與止血制動原則相反，不適當(且彎曲反而牽動傷口出血，並非防血栓)。　深入補充：經股動脈心導管後護理——穿刺側肢體伸直制動數小時、加壓止血、監測穿刺處出血血腫與遠端6P、多喝水排顯影劑、喝水無不適進食。多彎曲肢體會牽動穿刺處出血(非防血栓)，故不適當。現多採橈動脈路徑可早期下床。","options":{"A":"多喝水排出顯影劑，適當。","B":"監測心跳血壓觀察合併症，適當。","C":"不適當(正解)。穿刺肢體應伸直制動止血，不可多彎曲。","D":"喝水無不適即可進食，適當。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"108110-N3-22":{"quick":"CABG術後「胸管引流量200 mL/hr」過多(疑術後出血)，須立即通知醫師。","detail":{"background":"冠狀動脈繞道手術(CABG)後送加護病房，須警覺「術後出血」：胸管引流量正常應逐漸減少，若「>100~200 mL/hr且持續、或突然增多/變鮮紅」，提示活動性出血(可能須回手術室或矯正凝血)，須「立即通知醫師」。其他：體溫35°C(體外循環後輕度低溫常見、復溫即可)、血壓90/60(偏低但可接受、需觀察)、SaO2 90~92%(偏低、可調整氧氣)，相對非最緊急。故最須立即通報者為C胸管引流量200 mL/hr。　深入補充：CABG術後加護病房監測重點——出血(胸管引流量、凝血)、血流動力學(血壓、心輸出、CVP)、心律(心房顫動常見)、體溫(體外循環後低溫須復溫)、血氧、尿量、電解質(血鉀)。胸管引流&gt;100~200 mL/hr持續須立即通報、警覺心包填塞。","options":{"A":"體溫35°C(術後輕度低溫)常見，復溫處理即可。","B":"血壓90/60偏低但可接受，先觀察。","C":"正解。胸管引流量200 mL/hr過多，疑術後出血，須立即通知醫師。","D":"SaO2 90~92%偏低，可先調整氧氣。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"109030-N3-28":{"quick":"「運動心電圖」評估的是運動誘發的心肌缺血，無法直接評估「心輸出量」。","detail":{"background":"評估心輸出量(CO)的方法：①心臟超音波(可由左心室容積/射出率估算CO)；②肺動脈導管(熱稀釋法直接測CO，加上各種壓力)；③心導管檢查(可量測CO與壓力)。而「運動心電圖(運動壓力試驗)」是讓病人運動時監測心電圖ST變化以評估「心肌缺血/冠狀動脈供血」，並「不能直接評估心輸出量」。故無法評估CO者為運動心電圖。　深入補充：心輸出量評估法——心臟超音波(由容積/EF估算)、肺動脈導管(熱稀釋法直接測，並得各壓力與混合靜脈血氧)、心導管(Fick/熱稀釋法)。運動心電圖評估「運動誘發心肌缺血」，無法測心輸出量，是本題鑑別重點。","options":{"A":"心臟超音波可估算心輸出量。","B":"肺動脈導管可直接測心輸出量。","C":"心導管檢查可測心輸出量與壓力。","D":"正解。運動心電圖評估心肌缺血，無法直接評估心輸出量。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"109030-N3-29":{"quick":"鉈-201(Tl-201)心肌灌注掃描可「確定心肌受傷(缺血/梗塞)的部位與範圍」。","detail":{"background":"鉈-201(Thallium-201)心肌灌注掃描：鉈-201被正常灌流的存活心肌攝取，缺血或梗塞區攝取減少呈「冷區(缺損)」；配合運動/藥物負荷可區分「可逆性缺血(運動時缺損、休息回填)」與「不可逆梗塞(固定缺損)」，因此能「確定心肌受傷的部位與範圍」、評估冠狀動脈疾病的功能性影響與心肌存活度。它不是評估瓣膜功能(超音波)、收縮舒張(心室攝影/超音波)或電氣傳導(心電圖)。故目的為確定心肌受傷部位與範圍。　深入補充：鉈-201(或鎝-99m sestamibi)心肌灌注掃描——正常灌流心肌攝取核素呈亮、缺血/梗塞呈冷區。配合運動/藥物負荷可區分可逆缺血(運動缺損、休息回填)與固定梗塞，評估冠心病功能影響與心肌存活度，指引血管重建決策。","options":{"A":"瓣膜功能由心臟超音波評估，非鉈掃描。","B":"心室收縮舒張由超音波/心室攝影評估。","C":"正解。鉈-201心肌灌注掃描確定心肌缺血/梗塞的部位與範圍。","D":"電氣傳導由心電圖評估，非鉈掃描。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"109110-N3-28":{"quick":"心因性休克的主因是心臟「幫浦」問題(心肌梗塞、心律不整、瓣膜病)；「創傷出血過多」是「低血容性」休克，不屬之。","detail":{"background":"休克依機轉分類：①「心因性(cardiogenic)」——心臟泵血功能衰竭，主因為「急性心肌梗塞(最常見)、嚴重心律不整、瓣膜性心臟病、心肌病變」；②「低血容性(hypovolemic)」——血液/體液大量流失，「創傷出血過多」屬此類；③分布性(敗血/過敏/神經性)；④阻塞性(肺栓塞、張力性氣胸、心包填塞)。本題問心因性休克的主要原因，「創傷致出血過多」屬低血容性，不包括在內。　深入補充：休克分類——心因性(泵衰竭:MI、心律不整、瓣膜病)、低血容性(出血、脫水)、分布性(敗血、過敏、神經性)、阻塞性(肺栓塞、張力性氣胸、心包填塞)。創傷出血屬低血容性，治療補液止血；心因性則需強心、IABP、處理病因。","options":{"A":"嚴重心律不整可造成心因性休克，屬主因之一。","B":"心肌梗塞是心因性休克最常見原因。","C":"瓣膜性心臟病可導致心因性休克。","D":"正解(不包括)。創傷出血過多屬「低血容性」休克，非心因性。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"109110-N3-35":{"quick":"橈動脈穿刺側「不可以血壓壓脈帶加壓量血壓」；故B「每15分鐘測量雙手血壓」(含穿刺側)錯誤。","detail":{"background":"經左側橈動脈心導管檢查後護理：①穿刺處加壓止血(常以壓迫帶加壓約2小時)、觀察有無出血血腫(A合理)；③以「6P(疼痛、蒼白、無脈、肢冷、麻痺、感覺異常)」評估穿刺側手部末梢循環並與健側比較(C合理)；④出院後該手暫禁提重物(D合理)。而B「第1小時每15分鐘測量『雙手』血壓」不當——「穿刺(橈動脈)的那隻手不可用血壓壓脈帶加壓量血壓」(會壓迫穿刺處造成出血、且影響止血)，應改測健側或以末梢循環評估為主。故錯誤為B。　深入補充：橈動脈心導管後——穿刺側不可用壓脈帶量血壓(會壓迫穿刺處出血)，應測健側；以壓迫帶加壓止血約2小時、漸鬆；以6P評估該手末梢循環；出院後該手暫禁提重物。橈動脈路徑出血併發症較股動脈少、可早期下床。","options":{"A":"加壓傷口止血並觀察出血，合理。","B":"錯誤(正解)。穿刺(橈動脈)側不可用壓脈帶量血壓，「測雙手血壓」會壓迫穿刺處。","C":"以6P評估雙手末梢並比較，合理。","D":"出院後穿刺側手禁提重物，合理。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"111030-N3-30":{"quick":"心因性休克最常見症狀是「低血壓、組織灌流不足」，而非「呼吸停止」；故C錯誤。","detail":{"background":"心因性休克：①「心臟幫浦功能障礙」造成心輸出量不足、循環衰竭(A、D正確)；②最常見致病原因為「急性心肌梗塞」(大面積左心室受損)(B正確)；③表現為「低血壓、心搏過速、末梢冰冷濕冷蒼白、尿量減少、意識改變、肺鬱血」等組織灌流不足徵象。「呼吸停止」並非心因性休克的「最常見症狀」(是末期/瀕死的事件)，故C「最常見症狀為呼吸停止」錯誤。　深入補充：心因性休克(最常見MI)是心臟泵血衰竭→心輸出不足、組織灌流不良，表現低血壓、心搏過速、末梢冰冷濕冷蒼白、尿量減少、意識改變、肺鬱血。死亡率高，治療靠強心劑、IABP/ECMO、再灌流。「呼吸停止」非最常見症狀。","options":{"A":"心臟幫浦功能障礙造成循環衰竭，正確。","B":"最常見致病原因為心肌梗塞，正確。","C":"錯誤(正解)。最常見表現是低血壓、灌流不足，非「呼吸停止」。","D":"心輸出量不符身體組織所需，正確。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"111110-N3-32":{"quick":"CABG後胸管已引流600 mL(疑出血)，「體溫高給Aspirin」會加重出血，錯誤；應評估凝血、給氧、視情況輸血。","detail":{"background":"此CABG術後病人胸管引流600 mL(偏多、疑出血)、體溫38.7、血壓100/60、SaO2 94%。處置評估：①引流量多應「評估凝血功能」並找出血原因(A正確)；②SaO2 94%偏低可給氧氣鼻導管3 L/min(B正確)；③血壓偏低且有出血，必要時依醫囑輸血補充血量(C合理)；④體溫38.7雖偏高，但此病人「正在出血」，給「Aspirin」會抑制血小板「加重出血」，且術後發燒應先找原因(感染/吸收熱)，不宜以Aspirin退燒。故錯誤處置為D。　深入補充：CABG術後正在出血(胸管引流多)的病人，給Aspirin會抑制血小板加重出血。術後發燒應先找原因(早期多吸收熱/體外循環反應，後期警覺感染、心包切開症候群)。處置須評估凝血、視情況輸血、必要時回手術室止血。","options":{"A":"引流量多應評估凝血功能，正確。","B":"SaO2 94%偏低給氧3 L/min，正確。","C":"血壓偏低且出血，必要時輸血，合理。","D":"錯誤(正解)。病人正出血，給Aspirin會加重出血，不可用以退燒。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"112180-N3-22":{"quick":"PT延長應以維生素K/新鮮冷凍血漿處理；「注射Protamine Sulfate」是中和Heparin(看aPTT)，不適用於PT延長，故D錯誤。","detail":{"background":"CABG術後護理：①尿量減少時須監測血鉀(腎灌流不足、組織分解可致高血鉀)；②縱膈腔引流量>100 mL/hr須監測凝血功能、警覺出血；③持續監測心律、觀察傷口出血。④「魚精蛋白(Protamine Sulfate)」是用來「中和Heparin(肝素)」的(Heparin監測aPTT)；而「凝血酶原時間(PT)延長」反映外因/共同路徑凝血因子或Warfarin作用，應以「維生素K、新鮮冷凍血漿(FFP)」矯正，「不是」注射Protamine。故D錯誤。　深入補充：CABG術後——少尿監測血鉀(腎灌流不足、溶血可致高血鉀)、引流&gt;100 mL/hr監測凝血、監測心律與傷口。Protamine只中和「Heparin」(監測aPTT)；PT延長(外因/共同路徑或Warfarin)應以維生素K、新鮮冷凍血漿矯正。","options":{"A":"尿量減少監測血鉀，正確。","B":"引流>100 mL/hr監測凝血功能，正確。","C":"監測心律並注意傷口出血，正確。","D":"錯誤(正解)。PT延長應以維生素K/FFP處理；Protamine是中和Heparin(看aPTT)，不適用。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"113100-N3-48":{"quick":"心因性休克是心臟幫浦衰竭，「主動脈內氣球幫浦(IABP)」是重要治療方式之一。","detail":{"background":"心因性休克是「心臟泵血功能衰竭」造成心輸出量不足、組織灌流不良，最常見於大面積心肌梗塞。治療目標是支持心輸出與灌流：強心劑(dobutamine、dopamine)、必要時血管收縮劑，以及「機械循環輔助——主動脈內氣球幫浦(IABP)」(舒張期充氣增加冠脈灌流、收縮期放氣降後負荷)、嚴重者ECMO/心室輔助器，並處理病因(再灌流治療)。其他選項分屬：A感染/血管通透性→敗血性休克；B主動脈剝離/張力性氣胸→阻塞性休克；C創傷出血→低血容性休克。故正確為D「IABP是重要治療方式之一」。　深入補充：心因性休克是泵衰竭(最常見大面積MI)使心輸出不足。治療：強心劑(dobutamine、dopamine)、必要時血管收縮劑、機械循環支持(IABP舒張充氣增冠脈/收縮放氣降後負荷、嚴重者ECMO/心室輔助器)、再灌流處理病因。鑑別其他休克類型。","options":{"A":"感染或血管通透性改變是「敗血性(分布性)」休克，非心因性。","B":"主動脈剝離、張力性氣胸屬「阻塞性」休克。","C":"創傷出血造成回血量減少是「低血容性」休克。","D":"正解。IABP是心因性休克的重要機械循環支持治療之一。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"114030-N3-19":{"quick":"嗎啡除止痛外「會降低心臟前(後)負荷」；說「對前後負荷沒有影響」是錯誤。","detail":{"background":"急性心肌梗塞引起心因性休克的藥物處置：①Dobutamine(β1致效)增加心肌收縮力與心輸出量；②利尿劑減少循環血量、降低「前負荷」與肺鬱血；④血管擴張劑NTG擴張血管、降低前後負荷、減輕心臟工作；③嗎啡(morphine)除「止痛、降焦慮交感」外，還能「擴張靜脈(降前負荷)」、減輕肺水腫，故「對前、後負荷沒有影響」的敘述錯誤(嗎啡確實會降低前負荷)。故錯誤為C。　深入補充：MI併心因性休克藥物——dobutamine增收縮與心輸出、利尿劑降前負荷、NTG/血管擴張劑降前後負荷、嗎啡止痛並擴張靜脈降前負荷(故「對前後負荷無影響」錯誤)。嚴重者加IABP/ECMO並緊急再灌流。須監測血壓、心律、尿量、灌流。","options":{"A":"Dobutamine增加收縮力與心輸出量，正確。","B":"利尿劑降低前負荷，正確。","C":"錯誤(正解)。嗎啡會降低心臟前負荷(亦有後負荷作用)，並非「沒有影響」。","D":"NTG擴張血管減輕心臟負荷，正確。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"114170-N3-24":{"quick":"IABP病人須「比較患肢與健肢的末梢脈搏、血循、感覺」(導管在股動脈，監測下肢缺血)；患肢應制動勿屈曲。","detail":{"background":"使用主動脈內氣球幫浦(IABP)病人(導管多經股動脈置入)的護理：①「比較患肢與健肢的末梢脈搏、膚色、溫度、感覺」，警覺導管造成下肢動脈缺血(C正確)；②患肢應「伸直制動」，避免屈曲導致導管移位/折損，故「患肢屈曲伸展交替活動」錯誤；③IABP的氣球是在「舒張期充氣」(增加冠脈灌流)、收縮期放氣降後負荷，故「收縮時充氣降前負荷」錯誤；④IABP留置須「給予抗凝(heparin)」防血栓，故「避免給Heparin」錯誤。故最適當為C。　深入補充：IABP護理——患肢伸直制動(防導管移位)、比較患肢與健肢末梢脈搏血循感覺(防下肢缺血)、給Heparin抗凝防血栓、監測血小板(HIT)、觀察穿刺處出血、確認氣球與心動週期同步(舒張充氣、收縮放氣)、監測溶血。","options":{"A":"患肢應伸直制動防導管移位，「屈曲/伸展交替活動」不當。","B":"IABP在「舒張期」充氣(非收縮期)、且作用是降後負荷，敘述錯誤。","C":"正解。須比較患肢與健肢末梢脈搏、血循、感覺差異(防下肢缺血)。","D":"IABP留置須給Heparin抗凝防血栓，「避免Heparin」錯誤。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"115030-N3-19":{"quick":"心因性休克「不可用電毯等溫熱療法」(會使周邊血管擴張、血壓更低、灌流更差)；應給強心藥、IABP、氧氣。","detail":{"background":"心因性休克護理重點：①依醫囑使用「強心(促進心臟幫浦)藥物」(dobutamine/dopamine)維持心輸出；③為提高心輸出，必要時協助放置「主動脈內氣球幫浦(IABP)」等機械循環支持；④給予氧氣改善組織缺氧。②「使用溫熱療法(電毯)提高周邊循環」是錯誤——休克時血液應優先供應重要器官，加熱使「周邊血管擴張」會使血壓更低、有效循環血量更分散到周邊、重要器官灌流更差，且灌流不足的皮膚易燙傷。故錯誤者為B。　深入補充：心因性休克護理——依醫囑用強心劑維持心輸出、必要時IABP、給氧改善缺氧、監測血流動力學與尿量、處理病因。「禁用電毯/溫熱療法」——加熱使周邊血管擴張、血壓更低、重要器官灌流更差，且灌流不足皮膚易燙傷。","options":{"A":"依醫囑用促進心臟幫浦的藥物，正確。","B":"錯誤(正解)。電毯溫熱使周邊血管擴張、血壓更低、灌流更差，不可用。","C":"必要時放置IABP提高心輸出，正確。","D":"給予氧氣改善缺氧，正確。"},"sources":["新文京《內外科護理學》心臟外科/心導管","華杏《內外科護理學》心臟血管系統","Harrison 內科學 循環輔助/休克"]}},"101030-N3-50":{"quick":"此例HDL 25 mg/dL「過低」(HDL為保護性脂蛋白，宜>40)；TG、總膽固醇、LDL皆在可接受範圍。","detail":{"background":"血脂判讀(常用標準)：總膽固醇<200、三酸甘油酯(TG)<150、低密度脂蛋白(LDL，壞膽固醇)<100~130、「高密度脂蛋白(HDL，好膽固醇)應>40(越高越保護)」。本例TG 120(正常)、總膽固醇190(正常)、LDL 80(理想)，但「HDL 25(過低)」——HDL過低是冠狀動脈疾病的危險因子。故為HDL過低。　深入補充：血脂治療目標依心血管風險分層而異(極高危LDL&lt;55~70、高危&lt;70~100 mg/dL)。HDL過低(男&lt;40、女&lt;50)是獨立危險因子，可藉運動、戒菸、減重提升。Statin降LDL為一線；TG過高(&gt;500)有胰臟炎風險須用fibrate。","options":{"A":"TG 120 mg/dL在正常範圍(<150)，非過高。","B":"總膽固醇190 mg/dL正常(<200)，非過低。","C":"正解。HDL 25 mg/dL過低(應>40)，是心血管危險因子。","D":"LDL 80 mg/dL為理想範圍，非過高。"},"sources":["新文京《內外科護理學》血脂異常","台灣血脂治療指引(TLCA)","2018 ACC/AHA 膽固醇指引"]}},"101110-N3-56":{"quick":"聽診頸動脈出現嘈音(bruit)的原因是「頸動脈狹窄」(粥狀硬化使血流湍流)。","detail":{"background":"頸動脈嘈音(carotid bruit)是以聽診器在頸動脈聽到的「咻咻」血流雜音，成因是「頸動脈粥狀硬化造成管腔狹窄」，血流通過狹窄處變成「湍流」而產生雜音，提示頸動脈狹窄(中風危險因子)。靜脈血流低壓不易產生此種動脈性嘈音；主動脈瓣狹窄的雜音在主動脈瓣區、可傳向頸部但其源頭在瓣膜。故頸動脈嘈音的原因是頸動脈狹窄。　深入補充：頸動脈嘈音(bruit)提示頸動脈粥狀硬化狹窄、血流湍流，是缺血性中風危險因子，可進一步以頸動脈超音波(都卜勒)評估狹窄程度。重度狹窄(尤其有症狀)考慮頸動脈內膜切除術或支架。動脈嘈音須與靜脈嗡音、心雜音傳導區別。","options":{"A":"頸動脈嘈音多為「病理性」(狹窄湍流)，非功能性雜音。","B":"正解。頸動脈狹窄使血流湍流，產生頸動脈嘈音。","C":"靜脈為低壓系統，不易產生此種動脈性嘈音。","D":"主動脈瓣狹窄雜音源於瓣膜，本題問頸動脈嘈音指頸動脈狹窄。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"101110-N3-57":{"quick":"平均動脈壓(MAP)=舒張壓+1/3(收縮壓−舒張壓)=90+1/3×60=110 mmHg。","detail":{"background":"平均動脈壓(MAP)反映一個心動週期中動脈的平均灌流壓，因舒張期較收縮期長，故加權公式為「MAP = 舒張壓(DBP) + 1/3 ×(收縮壓SBP − 舒張壓DBP)」，亦可寫成「MAP = 1/3 SBP + 2/3 DBP」。本題SBP 150、DBP 90：脈搏壓=150−90=60；MAP = 90 + 1/3×60 = 90+20 = 110 mmHg。MAP通常需≥60 mmHg以維持重要器官灌流。　深入補充：平均動脈壓(MAP)＝舒張壓＋1/3脈壓＝1/3收縮壓＋2/3舒張壓，因舒張期較長故加權偏向舒張壓。MAP需≥60~65 mmHg以維持腦、腎、冠脈灌流，是休克復甦的重要指標(常以升壓劑維持MAP≥65)。","options":{"A":"120非正確計算結果。","B":"正解。MAP = 90 + 1/3×(150−90) = 110 mmHg。","C":"90是舒張壓，非MAP。","D":"60非本題MAP。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"102030-N3-35":{"quick":"生理性分裂音出現於「第二心音(S2)」、且於「吸氣期」較明顯(選C 23)。","detail":{"background":"生理性分裂音指「第二心音(S2)」的分裂：S2由主動脈瓣與肺動脈瓣關閉組成，正常「吸氣時」胸腔負壓使右心回流增加、肺動脈瓣關閉延遲，造成主動脈瓣(A2)與肺動脈瓣(P2)關閉時間差加大→聽到S2分裂(「呼氣時」兩者較同步、分裂消失)。故生理性分裂音是②出現於第二心音、③於吸氣期發生。正解②③(C)。　深入補充：第二心音(S2)由主動脈瓣(A2)與肺動脈瓣(P2)關閉組成。「生理性分裂」在吸氣時因右心回流增加、肺動脈瓣關閉延遲而出現，呼氣時消失。「固定分裂」見於心房中隔缺損(ASD)、「反常分裂」見於主動脈瓣狹窄/左束支阻滯，須鑑別。","options":{"A":"含①(第一心音，錯)，不符。","B":"含①④，不符。","C":"正解。②生理性分裂音出現於第二心音、③於吸氣期較明顯。","D":"含④(呼氣期分裂消失)，不符。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"102030-N3-79":{"quick":"心輸出量下降但PAWP(前負荷)與SVR(後負荷)皆不變→應「增加心跳速率」以提升心輸出量。","detail":{"background":"心輸出量(CO)= 心搏出量(SV)× 心跳速率(HR)。心搏出量取決於前負荷、後負荷與心收縮力。本題肺動脈楔壓(PAWP，反映左心前負荷)與全身血管阻力(SVR，反映後負荷)「皆未改變」，表示前後負荷沒問題；在SV不變的情況下，要提升下降的心輸出量，最直接的處置是「增加心跳速率(HR)」。降低右心房壓、降低SV、降低CVP都會「減少」而非增加心輸出。故適宜處置為增加心跳。　深入補充：心輸出量(CO)＝心搏出量(SV)×心率(HR)。SV取決於前負荷(PAWP反映)、後負荷(SVR反映)、收縮力。本題前後負荷皆正常而CO低，最直接的處置是增加心率。臨床須先排除心搏過緩、找出CO下降原因再對因處理。","options":{"A":"降低右心房壓不會提升心輸出量。","B":"降低心搏出量會使心輸出量更低，方向相反。","C":"降低中央靜脈壓(前負荷)反而減少心輸出。","D":"正解。前後負荷不變下，增加心跳速率可提升心輸出量。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"102110-N3-25":{"quick":"艾倫氏試驗(Allen test)陽性表示「橈動脈或尺動脈供應掌弓的血流異常(側枝循環不良)」。","detail":{"background":"艾倫氏試驗(Allen test)用於評估手部「橈動脈與尺動脈」對掌弓的側枝循環是否足夠(常在橈動脈穿刺/採血前執行)：同時壓住橈、尺動脈使手掌變白，放開「尺動脈」後觀察手掌恢復血色的速度——若放開尺動脈後手掌「無法迅速恢復血色(>5~10秒)」即為「陽性」，表示尺動脈側枝供血不足、橈動脈穿刺後若橈動脈阻塞可能造成手部缺血。故陽性反應代表橈/尺動脈供應掌弓的血流異常。　深入補充：Allen test於橈動脈穿刺/採血/置動脈導管前執行，確認尺動脈側枝足夠——同壓橈尺動脈使手掌變白、放開尺動脈，&gt;5~10秒未恢復血色為陽性(側枝不足)，此時不宜行橈動脈穿刺以免手部缺血。可改用脈衝血氧儀(改良Allen)。","options":{"A":"正解。Allen test陽性表示橈/尺動脈供應掌弓動脈的血流異常(側枝不足)。","B":"Allen test評估手部動脈，非股動脈。","C":"隱靜脈瓣功能用Trendelenburg等靜脈試驗評估。","D":"Allen test與頸靜脈血流無關。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"103030-N3-29":{"quick":"心尖搏動(最大搏動點PMI)的「範圍大小可作為心臟大小的參考」；位置在左鎖骨中線第5肋間，左側臥較易評估。","detail":{"background":"心尖搏動(最大搏動點, PMI)評估：①正常位置在「左鎖骨中線與第5肋間交叉處」(非胸骨右緣)；②PMI的「範圍(直徑)增大或搏動瀰漫，可作為心臟擴大/肥大的參考」(B正確)；③採「左側臥」使心臟靠近胸壁，較易觸診評估(非右側臥)；④左心室肥大/擴大時PMI會「向左下偏移」(非上移/右移)。故正確為B。　深入補充：最大搏動點(PMI)正常在左鎖骨中線第5肋間、範圍約1~2公分。PMI範圍增大或瀰漫提示心臟擴大；向左下偏移提示左心室肥大/擴大。採左側臥使心臟靠近胸壁較易觸診。心臟超音波是評估心臟大小的準確方法。","options":{"A":"PMI位置在「左鎖骨中線第5肋間」，非胸骨右緣第5肋間。","B":"正解。最大搏動點的範圍可作為心臟大小的參考。","C":"採「左側臥」較有助心尖搏動評估，非右側臥。","D":"左心室肥大時PMI向「左下」偏移，非上移或右移。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"103100-N3-29":{"quick":"艾倫測驗(Allen test)評估「橈動脈與尺動脈」是否通暢。","detail":{"background":"Allen test的目的是評估手部「橈動脈與尺動脈」的通暢度及掌弓側枝循環，常於橈動脈採血、置入動脈導管或做動脈血液氣體分析前執行，確認若橈動脈受阻時尺動脈能維持手部血流，避免手部缺血。其他動脈(膝膕、股、足背、脛後、肱、頸)的通暢度需以各自的脈搏觸診/都卜勒評估，不是Allen test。故Allen test評估的是橈動脈與尺動脈。　深入補充：Allen test評估手部「橈動脈與尺動脈」對掌弓的側枝循環，用於橈動脈相關處置前確認尺動脈能維持手部血流。其他動脈(股、膕、足背、脛後、肱、頸)通暢度以各自脈搏觸診或都卜勒評估，非Allen test。","options":{"A":"膝膕與股動脈不以Allen test評估。","B":"正解。Allen test評估橈動脈與尺動脈是否通暢。","C":"足背與脛後動脈不以Allen test評估。","D":"肱與頸動脈不以Allen test評估。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"103100-N3-33":{"quick":"心電圖「QRS波代表心室去極化」；P波代表心房去極化、T波代表心室再極化。","detail":{"background":"心電圖波形對應心臟電氣活動：①「P波」＝心房「去極化(收縮)」；②「QRS波」＝心室「去極化(收縮)」(C正解)；③「T波」＝心室「再極化(舒張)」；④心房的再極化被QRS掩蓋不易見。本題各選項：A「P波代表心房舒張」錯(是心房去極化/收縮)、B「QRS代表心房去極化」錯(是心室)、C「P波代表心房再極化」錯。故正確為D「QRS代表心室去極化」。　深入補充：心電圖——P波(心房去極化)、PR間距(房室傳導，正常0.12~0.20秒)、QRS(心室去極化，正常&lt;0.12秒)、ST段(心室再極化早期)、T波(心室再極化)、QT間距(整體心室再極化)。心房再極化被QRS掩蓋不易見。","options":{"A":"P波代表心房「去極化(收縮)」，非舒張。","B":"QRS代表「心室」去極化，非心房。","C":"P波是心房去極化，非再極化。","D":"正解。QRS波代表心室去極化。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"104030-N3-32":{"quick":"正常血流動力學數值為「平均動脈壓(MAP)85 mmHg」；PAWP 25、CO 2.5、CVP 14皆異常。","detail":{"background":"常見血流動力學正常值：①中心靜脈壓(CVP)約2~8 mmHg；②肺動脈楔壓(PAWP/PCWP)約6~12 mmHg；③心輸出量(CO)約4~8 L/min；④平均動脈壓(MAP)約70~105 mmHg(需≥60維持灌流)。本題：A PAWP 25(過高)、B CO 2.5 L/min(過低)、D CVP 14 mmHg(過高)皆異常；C「MAP 85 mmHg」落在正常範圍。故正常者為C。　深入補充：血流動力學正常值——CVP 2~8 mmHg、PAWP 6~12、肺動脈壓約25/10、心輸出量4~8 L/min、心輸出指數2.5~4 L/min/m²、SVR 800~1200、MAP 70~105。這些數值由肺動脈導管(Swan-Ganz)測得，指導休克與心衰竭的治療。","options":{"A":"PAWP 25 mmHg過高(正常6~12)。","B":"心輸出量2.5 L/min過低(正常4~8)。","C":"正解。平均動脈壓85 mmHg在正常範圍。","D":"中心靜脈壓14 mmHg過高(正常2~8)。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"104100-N3-4":{"quick":"在心電圖類檢查中，最能反映心臟「結構性變化(如心室肥大、心軸偏移)」的是「12導程心電圖」。","detail":{"background":"各類心電圖檢查的用途：①「12導程心電圖」——一次擷取多導程，可評估心律、心肌缺血/梗塞定位，並由電壓與型態推斷「心室肥大、心房擴大、心軸偏移」等「結構相關」變化，是檢查心臟結構性變化最適用的心電圖；②霍爾特(Holter)/連續性監測——長時間記錄，主要捕捉「陣發性心律不整」；③運動心電圖——評估運動誘發的「心肌缺血」。故結構性變化評估以12導程心電圖最適用(註：心臟結構的金標準仍是心臟超音波，本題限於心電圖類比較)。　深入補充：心電圖類型——12導程(評估心律、缺血/梗塞定位、肥大/軸偏移等結構相關變化)、Holter(24小時記錄陣發性心律不整)、運動心電圖(評估運動誘發缺血)、事件記錄器。心臟「結構」的真正金標準是心臟超音波。","options":{"A":"Holter監測主要用於捕捉陣發性心律不整。","B":"正解。12導程心電圖最能反映心室肥大等結構相關變化。","C":"運動心電圖主要評估運動誘發的心肌缺血。","D":"連續性心電圖監測主要用於監測心律變化。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"104100-N3-33":{"quick":"相鄰R波間有4個大方格→心率=300÷4=75次/分。","detail":{"background":"心電圖紙上每「1個大方格」代表0.2秒，故「300÷相鄰R-R間的大方格數」即為每分鐘心率(快速估算法)。本題相鄰R波間有「4個大方格」→心率＝300÷4＝「75次/分」。(對照：1格300、2格150、3格100、4格75、5格60、6格50。)故為75次/分。　深入補充：心率快速估算——大方格法「300÷R-R大方格數」(1格300、2格150、3格100、4格75、5格60、6格50)；小方格法「1500÷R-R小方格數」；不規則時數6秒內QRS數×10。每大格0.2秒、每小格0.04秒。","options":{"A":"50次/分對應「6個大方格」。","B":"60次/分對應「5個大方格」。","C":"正解。4個大方格→300÷4＝75次/分。","D":"90次/分非整數格之標準對應值。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"105030-N3-29":{"quick":"頸靜脈壓是測量「內頸靜脈搏動最高點與胸骨角之間的垂直距離」(病人採半坐臥約30~45度)。","detail":{"background":"頸靜脈壓(JVP)評估：①病人採「半坐臥(床頭約抬高30~45度)」，非平放；②觀察「右內頸靜脈搏動的最高點」，測量其與「胸骨角(Louis角)」之間的「垂直高度(公分)」(B正確)，再加上胸骨角到右心房約5公分換算右心房壓；③測量時自然呼吸，不需特別深吸氣；④正常頸靜脈壓(以胸骨角為基準)約「不超過3~4公分」，「高於」此值代表右心房壓上升(右心衰竭、體液過量)。故正確為B。　深入補充：頸靜脈壓(JVP)評估——病人半坐臥30~45度、頭轉向對側，觀察右內頸靜脈搏動最高點，測其與胸骨角的垂直距離(正常≤3~4公分)，加胸骨角到右心房約5公分得右心房壓估計。升高見於右心衰竭、體液過量、心包填塞。","options":{"A":"測壓時床頭應抬高約30~45度(半坐臥)，非放平。","B":"正解。測量內頸靜脈搏動最高點與胸骨角間的垂直距離。","C":"自然呼吸即可，不需特別深吸氣。","D":"正常值約「不超過3~4公分」，「高於」3~4公分才屬偏高。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"105030-N3-32":{"quick":"中心靜脈壓(CVP)與頸靜脈壓(JVP)都反映「右心房壓力」。","detail":{"background":"中心靜脈壓(CVP)是經中心靜脈導管測得「右心房/上腔靜脈」的壓力，反映右心前負荷與體液狀態；頸靜脈壓(JVP)透過觀察內頸靜脈搏動高度，也是「右心房壓力」的體表估計。兩者都反映「右心房壓力」(B正確)。CVP不代表左心房/左心室壓力(那需肺動脈楔壓估計)，JVP不代表肺動脈/肺微血管壓，也不是測頸動脈壓。故正確為B。　深入補充：中心靜脈壓(CVP)經中心靜脈導管測右心房/上腔靜脈壓(正常2~8 mmHg)，反映右心前負荷與體液狀態；頸靜脈壓是其體表估計。兩者反映「右心」；「左心」充盈壓需以肺動脈楔壓(PAWP)估計。","options":{"A":"CVP代表右心房壓力，非左心房/左心室。","B":"正解。中心靜脈壓與頸靜脈壓都反映右心房壓力。","C":"肺動脈/肺微血管壓需以肺動脈楔壓估計，非頸靜脈壓。","D":"CVP/JVP反映靜脈(右心房)壓力，非頸動脈壓。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"105090-N3-29":{"quick":"此例「低密度脂蛋白(LDL)135 mg/dL」異常偏高(宜<100~130)；總膽固醇、HDL、TG皆正常或良好。","detail":{"background":"血脂正常值：總膽固醇<200、三酸甘油酯<150、HDL>40(越高越好)、LDL<100~130。本題：A總膽固醇170(正常)、B HDL 130(很高，屬保護性、非異常壞事)、C TG 130(正常)、D「LDL 135(偏高，超過130)」——LDL是動脈粥狀硬化的主要壞膽固醇，偏高為異常。故異常者為D。　深入補充：血脂判讀——總膽固醇&lt;200、TG&lt;150、LDL&lt;100~130(壞、越低越好)、HDL&gt;40(好、越高越保護)。LDL是動脈硬化主要致病脂蛋白，偏高須以statin治療並控制飲食。HDL偏高(如130)屬保護性，非異常壞事。","options":{"A":"總膽固醇170 mg/dL正常(<200)。","B":"HDL 130 mg/dL偏高，屬保護性(非異常壞值)。","C":"TG 130 mg/dL正常(<150)。","D":"正解。LDL 135 mg/dL偏高(宜<100~130)，屬異常。"},"sources":["新文京《內外科護理學》血脂異常","台灣血脂治療指引(TLCA)","2018 ACC/AHA 膽固醇指引"]}},"107030-N3-25":{"quick":"左心室肥大時心尖搏動「增強且抬舉感、向左下偏移」，說「心尖搏動減弱」是錯誤。","detail":{"background":"左心室肥大(LVH)的評估發現：①觸診心尖搏動(PMI)「增強、有抬舉感(heaving)」且因心室增大而「向左下偏移」(B正確)，而非「減弱」；②心電圖可見「QRS電壓增高、QRS稍變寬、ST-T變化」，也可能合併心室早期收縮等心律不整。本題A「心尖搏動減弱」與LVH表現相反(應增強)，為錯誤敘述。　深入補充：左心室肥大(LVH)——觸診心尖搏動增強、抬舉感、向左下偏移；心電圖QRS電壓增高(如Sokolow-Lyon標準)、ST-T變化(勞損型)、可能左軸偏移。常因高血壓、主動脈狹窄等壓力過載。「心尖搏動減弱」與LVH相反。","options":{"A":"錯誤(正解)。左心室肥大時心尖搏動「增強」(抬舉感)，非減弱。","B":"心尖搏動向左下偏移，正確。","C":"可合併心室早期收縮等心律不整，正確。","D":"心電圖QRS波電壓增高且可稍變寬，正確。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"107030-N3-26":{"quick":"治療低血壓應用β1「致效劑(促進劑)」增加心率/收縮力；用β1「拮抗劑」會降低心率，故A錯誤。","detail":{"background":"低血壓(尤其心因性/灌流不足)的治療原理：①給「β1接受器致效劑(promotor/agonist)」如dobutamine、dopamine，可增加心率與心肌收縮力、提高心輸出與血壓——本題A卻寫「β1接受器『拮抗劑』可以增加心跳」，β1「拮抗劑」(如propranolol)是「降低」心率，方向相反，故A錯誤；②給α1致效劑增加周邊血管阻力升壓(B正確)；③採頭低腳高(Trendelenburg)增加靜脈回流(前負荷)、提高心輸出(C正確)；④中劑量Dopamine增加心輸出，高劑量增加周邊阻力(D合理)。故錯誤為A。　深入補充：低血壓/休克升壓——β1致效劑(dobutamine、dopamine)增心率收縮力；α1致效劑(norepinephrine、phenylephrine)增周邊阻力升壓；頭低腳高(Trendelenburg)增前負荷。β1「拮抗劑」會降心率，與升壓相反，是本題錯誤。","options":{"A":"錯誤(正解)。應給β1「致效劑」增加心跳；β1「拮抗劑」會降低心率，敘述相反。","B":"α1致效劑增加周邊血管阻力使血壓升高，正確。","C":"頭低腳高增加前負荷、提高心輸出，正確。","D":"中劑量Dopamine增加心輸出量，正確。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"107030-N3-31":{"quick":"第一心音(S1)與第二心音(S2)之間是「心室收縮期」(S1標誌收縮開始、S2標誌收縮結束)。","detail":{"background":"心動週期與心音：①「第一心音(S1)」由房室瓣(僧帽瓣、三尖瓣)關閉產生，標誌「心室收縮期開始」；②「第二心音(S2)」由半月瓣(主動脈瓣、肺動脈瓣)關閉產生，標誌「收縮期結束、舒張期開始」；③故「S1與S2之間＝心室收縮期」(C正確)，S2到下一個S1之間為舒張期；④正常心率下「舒張期比收縮期長」(非收縮期較長)；⑤生理性S2分裂在「吸氣期」較明顯(非呼氣期)。故正確為C。　深入補充：心動週期——S1(房室瓣關閉)標誌收縮期開始、S2(半月瓣關閉)標誌舒張期開始；S1~S2為收縮期、S2到下一S1為舒張期。正常心率下舒張期較收縮期長(心率快時舒張期先縮短)。生理性S2分裂於吸氣期明顯。","options":{"A":"主動脈與肺動脈瓣關閉造成的是「第二心音」，非第一心音。","B":"正常心率下舒張期較收縮期「長」，敘述相反。","C":"正解。第一心音與第二心音間為心室收縮期。","D":"生理性第二心音分裂於「吸氣期」較明顯，非呼氣期。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"107110-N3-36":{"quick":"第一心音(S1)出現在「心收縮期開始」(房室瓣關閉)。","detail":{"background":"第一心音(S1)由「房室瓣(僧帽瓣、三尖瓣)關閉」血液撞擊瓣膜所產生，發生於「心室收縮期開始」的瞬間，標誌收縮期的起點(此時半月瓣即將開啟射血)。對比：第二心音(S2)由半月瓣關閉產生，標誌收縮期結束、舒張期開始。故S1出現於心收縮期開始。　深入補充：第一心音(S1)由房室瓣(僧帽瓣、三尖瓣)關閉產生、標誌心室收縮期開始；第二心音(S2)由半月瓣(主動脈瓣、肺動脈瓣)關閉產生、標誌舒張期開始。S3(舒張早期)、S4(舒張末期/心房收縮)為額外心音，常提示病理。","options":{"A":"房室瓣「開啟」是舒張期充盈開始，非S1(S1是房室瓣關閉)。","B":"半月瓣關閉產生的是「第二心音」，非第一心音。","C":"舒張期開始對應第二心音之後，非第一心音。","D":"正解。第一心音出現在心收縮期開始(房室瓣關閉)。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"108110-N3-23":{"quick":"「敗血性休克」是血管擴張、循環血量分布改變，中心靜脈壓多「下降」而非升高；故D不是CVP升高的原因。","detail":{"background":"中心靜脈壓(CVP)反映右心房壓與體液/右心狀態。使CVP「升高」的原因：①右心衰竭(如心肌梗塞影響右心)、②二尖瓣逆流/瓣膜病造成回堵、③心包膜填塞(右心受壓)、④體液過量、肺高壓、張力性氣胸等。而「敗血性休克」屬「分布性休克」，特徵是周邊血管廣泛擴張、有效循環血量相對不足、靜脈回流減少，CVP多「偏低(下降)」。故D「敗血性休克」不是CVP升高的原因。　深入補充：CVP升高原因——右心衰竭、二尖瓣/三尖瓣病變回堵、心包填塞、肺高壓、張力性氣胸、體液過量、正壓通氣。敗血性休克屬分布性休克(血管擴張、血量相對不足)，CVP多「下降」。CVP須結合臨床與其他指標判讀。","options":{"A":"心肌梗塞(影響右心)可使CVP升高。","B":"二尖瓣逆流回堵可使CVP升高。","C":"心包膜填塞壓迫右心使CVP升高。","D":"錯誤(正解)。敗血性休克血管擴張、CVP多「下降」，非升高。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"108110-N3-28":{"quick":"脈搏「很難摸到、明顯減弱」記錄為「1+」(微弱、細絲狀)。","detail":{"background":"脈搏強度的常用評分(0~3+或0~4+)：0＝摸不到(無脈)；1+＝「微弱、細絲狀(很難摸到、易被壓閉)」；2+＝正常；3+＝飽滿有力(或4+＝跳躍性/洪脈)。本題「很難摸得到、脈搏明顯減弱」對應「1+」(微弱)。0是完全摸不到、2+是正常、3+是有力。故記錄為1+。　深入補充：脈搏強度評分(0~3+或0~4+)——0無脈、1+微弱細絲(難摸、易壓閉)、2+正常、3+飽滿有力(或4+跳躍性洪脈)。評估時記錄速率、節律、強度並比較左右對稱性，並注意有無脈搏短絀。微弱脈見於休克、低心輸出、動脈狹窄。","options":{"A":"0代表完全摸不到(無脈)，本題仍可摸到但微弱。","B":"正解。脈搏很難摸到、明顯減弱記錄為1+(微弱)。","C":"2+代表正常脈搏，與「明顯減弱」不符。","D":"3+代表飽滿有力，與減弱相反。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"109030-N3-31":{"quick":"此例「低密度脂蛋白(LDL)170 mg/dL」異常偏高；HDL 60、總膽固醇150、LDL/HDL=1.5皆良好。","detail":{"background":"血脂判讀：LDL(壞膽固醇)宜<100~130、HDL(好膽固醇)宜>40、總膽固醇<200、LDL/HDL比值越低越好(理想<3)。本題：A「LDL 170(明顯偏高)」屬異常；B HDL 60(良好偏高)；C總膽固醇150(正常)；D LDL/HDL=1.5(良好)。故不正常者為A LDL 170。　深入補充：血脂判讀——LDL&lt;100~130、HDL&gt;40、總膽固醇&lt;200、TG&lt;150、LDL/HDL比值越低越好(理想&lt;3)。LDL 170明顯偏高為主要異常，須以statin治療並改善生活型態。心血管極高危者LDL目標可低至&lt;55~70。","options":{"A":"正解。LDL 170 mg/dL明顯偏高(宜<100~130)，不正常。","B":"HDL 60 mg/dL屬良好(>40)。","C":"總膽固醇150 mg/dL正常(<200)。","D":"LDL/HDL=1.5屬良好比值。"},"sources":["新文京《內外科護理學》血脂異常","台灣血脂治療指引(TLCA)","2018 ACC/AHA 膽固醇指引"]}},"110030-N3-32":{"quick":"B型排鈉利尿胜肽(BNP)>100 pg/mL表示「心臟衰竭」(心室壁張力上升時分泌增加)。","detail":{"background":"心血管診斷判讀：①II、III、aVF的ST上升是「下壁」心肌梗塞(右冠狀動脈)，非前壁(前壁看V3~V4)；②「BNP(B型排鈉利尿胜肽)」由心室在壁張力/容量負荷增加時分泌，「BNP>100 pg/mL常提示心臟衰竭」並可評估嚴重度(B正確)；③肺動脈楔壓(PAWP)過高反映「左心房/左心室充盈壓」上升(左心衰/二尖瓣病)，非代表「主動脈阻力」；④HDL是「保護性」脂蛋白，「偏高」反而「降低」冠狀動脈疾病風險(HDL偏低才易罹病)。故正確為B。　深入補充：心血管診斷判讀——下壁梗塞看II/III/aVF(非前壁)；BNP&gt;100 pg/mL提示心衰竭並評估嚴重度；PAWP反映左心充盈壓(非主動脈阻力，主動脈阻力屬後負荷/SVR)；HDL偏高是保護性、降低冠心病風險(HDL偏低才易罹病)。","options":{"A":"II、III、aVF ST上升是「下壁」梗塞，非前壁。","B":"正解。BNP>100 pg/mL提示心臟衰竭。","C":"PAWP過高反映左心充盈壓，非主動脈阻力。","D":"HDL偏高是保護性、降低CAD風險，非易罹病。"},"sources":["新文京《內外科護理學》心臟血管評估","華杏《內外科護理學》心臟血管系統","Guyton 生理學 心臟循環","Harrison 內科學 心血管診斷"]}},"110030-N3-33":{"quick":"心跳200次/分時舒張充盈時間過短、心搏出量銳減，心輸出量反而「下降」，故B「200次CO>80次CO」錯誤。","detail":{"background":"心臟循環動力學：A「心輸出量＝心搏出量×每分鐘心跳次數」正確；C「中心靜脈導管測量右心房壓力」正確；D「平均動脈壓＝1/3收縮壓＋2/3舒張壓」正確。B「心跳200次的心輸出量>心跳80次」錯誤——心跳過快(如200次/分)時「舒張期充盈時間大幅縮短」，心室來不及充盈使「心搏出量(S
