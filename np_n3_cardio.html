code":"S2","system_name":"心臟血管系統","topic":"C10心血管評估血流動力學與心臟生理藥理","topic_code":"C10","q_num":31,"roc_year":"111","exam_code":"111030","src":"民國111年","options":{"A":"第一心音的產生是僧帽瓣與三尖瓣關閉血液撞擊所造成","B":"聽診心音的主動脈瓣區在胸骨右緣第2 肋間","C":"聽到第二心音之後心動週期進入心室的舒張期","D":"心臟衰竭病人如出現第三心音會在心室的舒張末期聽到"},"img":""},{"id":"111030-N3-32","code":"111030","roc":"111","cat":"N3","catname":"內外科護理學","num":32,"stem":"下列血流動力學檢查結果何者正常?","opts":{"A":"右心房壓力130 mmHg","B":"右心室收縮壓120 mmHg","C":"左心室舒張壓40 mmHg","D":"上腔靜脈壓8 mmHg"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"system_code":"S2","system_name":"心臟血管系統","topic":"C10心血管評估血流動力學與心臟生理藥理","topic_code":"C10","q_num":32,"roc_year":"111","exam_code":"111030","src":"民國111年","options":{"A":"右心房壓力130 mmHg","B":"右心室收縮壓120 mmHg","C":"左心室舒張壓40 mmHg","D":"上腔靜脈壓8 mmHg"},"img":""},{"id":"111030-N3-33","code":"111030","roc":"111","cat":"N3","catname":"內外科護理學","num":33,"stem":"輸注下列何種藥物時,需以不透光錫箔紙包住點滴瓶及輸液管?","opts":{"A":"Diazoxide(Hyperstat)","B":"Dobutamine(Dobutrex)","C":"Nitroglycerin(Tridil)","D":"Nitroprusside(Nipride)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"system_code":"S2","system_name":"心臟血管系統","topic":"C10心血管評估血流動力學與心臟生理藥理","topic_code":"C10","q_num":33,"roc_year":"111","exam_code":"111030","src":"民國111年","options":{"A":"Diazoxide(Hyperstat)","B":"Dobutamine(Dobutrex)","C":"Nitroglycerin(Tridil)","D":"Nitroprusside(Nipride)"},"img":""}],E={"101110-N3-60":{"quick":"NTG 含舌下、可在誘發活動(如性活動、用力)前「預防性」服用；每5分鐘1顆、連3顆(15分鐘)仍未緩解即須就醫。","detail":{"background":"硝化甘油(Nitroglycerin, NTG)是緩解心絞痛的首選藥，機轉為釋放一氧化氮(NO)使血管平滑肌鬆弛：靜脈擴張→降低前負荷、減少心室壁張力與心肌耗氧；冠狀動脈擴張→增加缺血區供血。給藥重點：①「舌下含服」不可吞服(吞服經肝臟首渡代謝會失效)；②含服採坐姿或臥姿，因強力血管擴張易引起姿勢性低血壓、頭暈、頭痛、面潮紅(這些是預期副作用，非停藥指標)；③急性發作時每5分鐘含1顆，最多3顆(共15分鐘)，若仍未緩解應懷疑心肌梗塞、立即就醫；④可在已知會誘發心絞痛的活動(費力、情緒激動、性活動、寒冷、用力解便)「之前」預防性使用；⑤藥物對光、熱、潮濕敏感，須存放原棕色遮光瓶、3~6個月更換。　深入補充：NTG除舌下錠外尚有貼片、噴霧與靜脈劑型；皮膚貼片須每日輪換部位並保留「無貼片時段(約8~12小時)」以防耐受性。NTG與磷酸二酯酶抑制劑(如威而鋼sildenafil)併用會嚴重低血壓，須間隔24~48小時，是重要衛教禁忌。","options":{"A":"NTG 須「舌下含服」靠口腔黏膜吸收，咬碎吞下會被肝臟首渡代謝破壞、失去療效。","B":"應為每5分鐘1顆、最多3顆(15分鐘)仍未緩解即須就醫，而非用到5顆；延誤就醫可能錯失心肌梗塞黃金治療時間。","C":"正解。可在可能誘發心絞痛的活動(如性活動)前預防性含服，以避免發作。","D":"NTG 因血管擴張而常引起「低血壓」(非高血壓)、頭痛、面潮紅，屬預期副作用，不需立即停藥。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"102030-N3-32":{"quick":"β阻斷劑降低心率、心收縮力與血壓→「降低心肌耗氧量」，是穩定型心絞痛的主要治療目的。","detail":{"background":"β腎上腺素阻斷劑(如propranolol、metoprolol、atenolol)阻斷心臟β1受體，產生負性頻率(降心率)、負性肌力(降收縮力)、降血壓三重作用，使心肌做功與耗氧量(MVO2)下降，並延長舒張期增加冠狀動脈灌流時間，因此可預防心絞痛發作、降低運動誘發缺血。心絞痛的本質是心肌「需氧>供氧」，治療策略即「降需氧(β阻斷劑、減重、休息)」加「增供氧(硝酸鹽、鈣離子阻斷劑擴張冠脈)」。β阻斷劑注意事項：氣喘/COPD慎用(β2收縮支氣管)、不可驟然停藥(反彈性心搏過速與心絞痛惡化)、會遮蔽低血糖症狀。　深入補充：β阻斷劑分非選擇性(propranolol，阻β1+β2)與心臟選擇性(metoprolol、atenolol、bisoprolol，主阻β1)，氣喘/COPD宜選心臟選擇性或避用；對心肌梗塞後病人長期使用可降低再梗塞與死亡率(屬次級預防用藥)。停藥須逐步減量以防反彈性心搏過速與心絞痛惡化。","options":{"A":"促進排尿是利尿劑作用，與β阻斷劑無關。","B":"β阻斷劑是「負性肌力」=降低收縮力，非增加。","C":"β阻斷劑降低心跳速率(負性頻率)，非增加。","D":"正解。降低心率、收縮力與血壓→降低心肌需氧量，緩解與預防心絞痛。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"102110-N3-56":{"quick":"穩定型(勞動型)心絞痛因「費力時需氧增加」誘發、休息或NTG可緩解；「睡夢中發作」屬變異型/不穩定型，非穩定型。","detail":{"background":"穩定型心絞痛(stable/exertional angina)：固定狹窄的冠狀動脈在勞動、情緒激動、寒冷、飽餐使心肌需氧上升時供氧不足而胸痛，特徵為胸骨後或心前區壓迫/緊縮/重壓感，可輻射至左肩、左臂內側、下頷，持續約3~5分鐘(一般<15分鐘)，休息或舌下NTG即可緩解，誘因與程度固定可預測。對比：①不穩定型心絞痛＝休息時也痛、發作頻率與強度增加，是急性冠心症；②變異型(Prinzmetal)＝冠狀動脈痙攣引起，常於休息或半夜/清晨發作、ST段上升。「睡夢/休息中發作」反映非勞動誘發，屬變異或不穩定型，不是穩定型的特徵。　深入補充：穩定型心絞痛可用加拿大心血管學會(CCS)分級描述活動受限程度(CCS I~IV)。診斷常以運動心電圖、心肌灌注掃描或冠狀動脈電腦斷層/血管攝影評估。藥物治療無法控制或左主幹/三條血管病變時，考慮PCI或冠狀動脈繞道手術(CABG)。","options":{"A":"胸骨後重壓感是穩定型心絞痛典型表現，正確。","B":"穩定型持續時間短(約5~10分鐘內)，正確。","C":"舌下NTG可緩解是穩定型特徵，正確。","D":"錯誤(正解)。睡夢中(休息時)發作屬變異型或不穩定型心絞痛，非穩定型；穩定型由費力誘發。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"103030-N3-31":{"quick":"股動脈穿刺PTCA後平躺6~8小時且患肢伸直，是為「壓迫止血、預防穿刺處出血/血腫與動脈血栓形成」。","detail":{"background":"經皮冠狀動脈介入(PTCA/PCI)經股動脈導入導管，術後拔鞘需在穿刺處加壓止血。股動脈是大動脈、壓力高，若患肢彎曲(屈膝、屈髖)會牽動穿刺點造成出血、血腫或假性動脈瘤，也可能因血流擾動形成血栓。故術後須臥床平躺6~8小時、穿刺側下肢伸直制動、沙袋加壓，並密切觀察穿刺處有無出血/血腫、患肢遠端脈搏、膚色與溫度(評估動脈是否阻塞)。同時鼓勵多喝水加速顯影劑由腎臟排出(預防顯影劑腎病變)。本題問「平躺不彎曲」之目的，核心是維持壓迫止血、預防血栓與出血。　深入補充：股動脈穿刺後併發症含血腫、後腹膜出血、假性動脈瘤、動靜脈瘻管。現多採「橈動脈」路徑(出血少、可早期下床)。拔鞘後可用人工壓迫或血管縫合器止血。須以6P(疼痛、蒼白、無脈、肢冷、麻痺、感覺異常)評估遠端肢體灌流。","options":{"A":"正解。患肢伸直制動可維持穿刺處壓迫、預防出血/血腫並避免局部血流擾動形成血栓。","B":"顯影劑於術中已注入血管，術後平躺與其滲入組織無關。","C":"頭痛非股動脈穿刺臥床制動之主要考量。","D":"平躺制動非為預防姿勢性低血壓而設；姿勢性低血壓是由臥到站時的問題。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"103030-N3-35":{"quick":"抽菸促進動脈粥狀硬化的機轉之一是「使血小板凝集增加、加速血栓形成」(並損傷內皮、升高LDL、使血管痙攣)。","detail":{"background":"吸菸是冠狀動脈疾病的主要可控危險因子。其促進動脈粥狀硬化的機轉：①尼古丁刺激「交感神經」釋放兒茶酚胺→心跳血壓上升、冠狀動脈痙攣、心肌耗氧增加；②損傷血管內皮細胞，啟動發炎與脂質沉積；③使LDL氧化上升、HDL下降，加速粥狀斑塊形成；④增加血小板黏附與凝集、升高血纖維蛋白原→血液高凝、易形成血栓；⑤一氧化碳與血紅素結合(碳氧血紅素)，降低血液帶氧能力，加重心肌缺氧。戒菸可顯著降低心血管事件。本題四選項中唯一正確機轉是「血小板凝集增加、加速血塊凝結」。　深入補充：吸菸是冠心病、周邊動脈疾病、中風與腹主動脈瘤的共同危險因子。戒菸1年後冠心病風險可降約一半。二手菸亦有害。護理上應評估菸齡(包-年)、提供5A(詢問Ask、建議Advise、評估Assess、協助Assist、追蹤Arrange)戒菸介入並轉介戒菸門診。","options":{"A":"尼古丁刺激的是「交感」神經(非副交感)，引起血管收縮/痙攣。","B":"正解。吸菸使血小板黏附凝集增加、血液高凝，加速血栓形成。","C":"吸菸並非「抑制白血球生長」；其機轉是內皮損傷與發炎，敘述錯誤。","D":"吸菸使一氧化碳與血紅素結合(碳氧血紅素↑)降低帶氧，而非「減少血紅素溶解」，用詞錯誤。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"104030-N3-33":{"quick":"飽餐後胸痛、休息片刻即緩解＝典型「(穩定型)心絞痛」(飽餐增加心肌需氧、休息後緩解)。","detail":{"background":"穩定型心絞痛由心肌需氧暫時超過供氧誘發，常見誘因「4E」：Exertion(用力)、Emotion(情緒)、Eating(飽餐)、Exposure to cold(寒冷)。飽餐後血液集中至腸胃道、心輸出需求上升使心肌耗氧增加，誘發胸痛；停下休息使需氧下降後，數分鐘內緩解，這是心絞痛(供需暫時失衡)的特徵。對比心肌梗塞：胸痛持續>30分鐘、休息與NTG皆無法緩解、伴冷汗噁心瀕死感；胃潰瘍/消化不良雖也可餐後不適，但典型表現為上腹灼痛、與飲食關係不同且不會「休息數分鐘即緩解」。故最符合者為心絞痛。　深入補充：胸痛鑑別還包括胃食道逆流(灼熱、躺下加重、制酸劑緩解)、肌肉骨骼痛(按壓/姿勢改變痛)、主動脈剝離(撕裂樣痛傳到背)、肺栓塞(突發呼吸困難)、心包炎(前傾減輕)。心絞痛特徵是與「用力相關、休息或NTG數分鐘緩解」。","options":{"A":"正解。飽餐(增加心肌需氧)誘發、休息後緩解，符合穩定型心絞痛的供需失衡特徵。","B":"胃潰瘍痛多為上腹空腹/夜間灼痛、與制酸劑/進食相關，不會「休息數分鐘即緩解」。","C":"消化不良為上腹脹悶，與「胸痛休息後緩解」型態不符。","D":"心肌梗塞胸痛持續>30分鐘、休息及NTG皆無法緩解，與本題休息即緩解相反。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"105030-N3-28":{"quick":"心絞痛胸痛「持續時間短(數分鐘，一般<15分鐘)」；「持續>30分鐘」是心肌梗塞而非心絞痛，故為錯誤敘述。","detail":{"background":"心絞痛(暫時性心肌缺血)胸痛特徵：位置在胸骨後或心前區，呈壓迫、緊縮、重壓或灼熱感；常輻射至左肩、左臂內側、頸、下頷甚至上腹；持續時間短，多為3~5分鐘、一般不超過15分鐘；由勞動/情緒/飽餐/寒冷誘發，休息或舌下NTG於數分鐘內緩解。若胸痛持續超過15~30分鐘、休息與NTG皆無法緩解，並伴隨冷汗、噁心嘔吐、瀕死感，應高度懷疑「急性心肌梗塞」(冠脈完全阻塞、心肌壞死)，需立即送醫。本題D選項把「持續>30分鐘」當成心絞痛特徵是錯的。　深入補充：心絞痛痛感多為悶、緊、壓而非尖銳刺痛，且不因深呼吸或按壓而改變(可與肋膜炎、肌肉痛區別)。女性、糖尿病、老人常以非典型症狀(上腹不適、噁心、倦怠、呼吸困難)表現，易被忽略，護理評估應提高警覺。","options":{"A":"胸骨後/心前區壓迫感，是心絞痛典型位置與性質，正確。","B":"可輻射至左肩、上臂，正確。","C":"錯誤(正解)。持續>30分鐘是心肌梗塞表現，心絞痛通常數分鐘、不超過15分鐘。","D":"舌下NTG可於數分鐘內緩解，是心絞痛特徵，正確。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"106030-N3-27":{"quick":"PTCA後不會「立即拔除所有導管」；常保留動脈鞘一段時間，待凝血恢復(或抗凝藥代謝)後才拔鞘加壓止血。","detail":{"background":"經皮冠狀動脈血管成形術(PTCA/PCI)護理：術前禁食6~8小時、評估腎功能與顯影劑/碘過敏史；術中常使用抗凝(heparin)。術後因病人仍處抗凝狀態且穿刺的是高壓大動脈，不會「立即拔除所有導管」，多保留動脈鞘(sheath)一段時間，待ACT/凝血恢復後再拔鞘並加壓止血、臥床制動數小時。術後護理重點：密切監測生命徵象與心電圖(觀察有無再阻塞、心律不整)、觀察穿刺處出血/血腫、評估穿刺側遠心端肢體的脈搏、膚色、溫度與感覺(評估動脈血流)、鼓勵多飲水排顯影劑。　深入補充：PCI術前須評估腎功能與顯影劑/碘過敏；糖尿病服用metformin者，顯影劑可能增加乳酸中毒/腎病變風險，常於檢查當天暫停。術後水化(多喝水或靜脈輸液)以加速顯影劑排出、預防顯影劑腎病變。","options":{"A":"術前禁食6~8小時(避免術中嘔吐吸入、為可能的緊急手術準備)，正確。","B":"術後密切監測生命徵象變化，正確。","C":"術後須評估穿刺側遠心端肢體循環(脈搏/膚溫/顏色)，正確。","D":"錯誤(正解)。病人仍在抗凝狀態，不會立即拔除所有導管止血；多保留鞘管待凝血恢復後再拔鞘加壓。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"106111-N3-27":{"quick":"變異型(Prinzmetal)心絞痛因冠狀動脈痙攣引起、常於休息/夜間發作、發作時心電圖呈「ST段上升」。","detail":{"background":"心絞痛分型：①穩定型(勞動型)＝固定狹窄，費力誘發、休息或NTG緩解、程度與持續時間固定可預測；②不穩定型＝斑塊不穩定/部分血栓，休息時也痛、頻率強度增加，屬急性冠心症前驅；③變異型(Prinzmetal/血管痙攣型)＝冠狀動脈痙攣引起，與費力無關，常在休息、夜間或清晨發作，發作當下心電圖可見「ST段上升」(暫時性透壁缺血)，緩解後恢復，治療以鈣離子阻斷劑與硝酸鹽鬆弛痙攣為主。重要觀念：穩定型心絞痛雖須積極控制危險因子，但本身並非「必然是心肌梗塞前兆」；NTG可緩解各型心絞痛但不能「治癒」冠心症。　深入補充：變異型心絞痛(Prinzmetal)以鈣離子阻斷劑與硝酸鹽治療冠脈痙攣為主，β阻斷劑可能加重痙攣須謹慎；常見於抽菸者，戒菸重要。穩定型與變異型的鑑別在「誘因(費力 vs 休息/夜間)」與「發作時ST變化(下降 vs 上升)」。","options":{"A":"變異型由「冠脈痙攣」引起、與費力無關、常休息時發作；本選項把它說成費力誘發，錯誤。","B":"穩定型胸痛程度與持續時間相對固定，並非與程度「成正比」變化，敘述不正確。","C":"穩定型心絞痛不等於必然是心肌梗塞前兆；此敘述過度推論，不正確。","D":"正解。變異型心絞痛因冠脈痙攣，發作時心電圖常見ST段上升。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"106111-N3-31":{"quick":"面對病人「裝支架後以為痊癒、不想吃藥」的錯誤認知，護理師應傾聽、衛教支架作用與持續服藥(雙抗血小板)的重要性；「指責、恐嚇」是錯誤反應。","detail":{"background":"冠狀動脈支架置放後，內皮尚未完全覆蓋支架前有支架內血栓風險，必須持續服用「雙抗血小板治療(DAPT，aspirin＋clopidogrel等)」一段時間，並長期服aspirin與他汀(statin)、控制危險因子；支架是「撐開狹窄、改善血流」並非根治動脈硬化，自行停藥可能造成致命的支架內血栓與再梗塞。面對病人錯誤觀念，治療性溝通原則：以不批判態度傾聽、了解其想法與顧慮、提供個別化衛教、強調持續服藥重要性。「指責病人、用後果恐嚇」屬非治療性溝通，會破壞信任、增加焦慮，是錯誤的護理反應。　深入補充：支架後雙抗血小板治療(DAPT)時間依支架種類與出血風險而定(藥物塗層支架常≥6~12個月)。提早自行停藥是支架內血栓的主因，可能致命。護理以動機式晤談、書面提醒、家屬參與提升服藥遵從性，並衛教辨識再梗塞徵象。","options":{"A":"鼓勵病人說出想法、以不批判態度傾聽，是正確的治療性溝通。","B":"了解想法並給予個別性指導，正確。","C":"錯誤(正解)。指責並恐嚇病人屬非治療性溝通，會損害護病關係，不應如此反應。","D":"告知支架作用與持續服藥的重要性，是正確衛教。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"107110-N3-30":{"quick":"NTG對光/熱/濕敏感，須存放原「棕色遮光玻璃瓶」、不可用紙包散裝保存(會失效)；含舌下不可吞服。","detail":{"background":"硝化甘油(NTG)舌下錠極不穩定，遇光、熱、空氣、潮濕會分解失效，故須存放於原本的棕色遮光玻璃瓶中、瓶蓋密閉、避免高溫(不可放口袋貼身/車內)、開封後約3~6個月更換、攜帶時連瓶帶著而非用紙或塑膠袋分裝。給藥指導：舌下含服不可吞嚥(吞服經肝首渡代謝失效)；含服時採坐/臥姿以防姿勢性低血壓與跌倒；含服後舌下會有灼熱/刺麻感、可能頭痛、面潮紅(屬血管擴張的預期副作用)；急性發作每5分鐘1顆、最多3顆，無效即就醫。　深入補充：NTG舌下錠開封後藥效約維持3~6個月須更換；若含服後「無灼熱/刺麻感」常提示藥已失效。攜帶時連棕色瓶帶著、勿放貼身口袋(體溫)或車內(高溫)。含服後若頭暈應坐下休息防跌倒。","options":{"A":"NTG應舌下含服不可吞服，正確。","B":"含服採坐姿或臥姿以避免姿勢性低血壓跌倒，正確。","C":"錯誤(正解)。NTG對光/熱/濕敏感，須存於原棕色遮光瓶，不可取出用紙包保存，否則藥效喪失。","D":"含服後頭痛、面潮紅是血管擴張之預期副作用，正確。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"108020-N3-28":{"quick":"穩定型心絞痛持續時間「短(數分鐘)」；「痛了3個多小時」不是穩定型心絞痛(應懷疑心肌梗塞)。","detail":{"background":"穩定型心絞痛典型特徵：①由費力誘發(如用力解便、爬樓、情緒激動、飽餐)；②胸口壓迫/緊縮/重壓感、像被重物壓住、吸不上氣；③可輻射至左肩、左臂、頸、下頷，雙側胸與肩也可受影響；④持續時間短，多在數分鐘內(一般<15分鐘)，休息或舌下NTG即緩解。若胸痛持續達數十分鐘到數小時、休息與NTG皆無效，代表心肌持續缺血壞死，是「急性心肌梗塞」而非穩定型心絞痛。題目D「從吃完飯一直痛到睡前、痛了3個多小時」持續過久，不符合穩定型心絞痛(時間短)的典型特徵。　深入補充：穩定型心絞痛的「典型」特徵是費力誘發、壓迫感、可輻射、數分鐘內休息/NTG緩解。持續數小時不緩解須警覺急性心肌梗塞並立即送醫。用力解便(Valsalva)增加心臟負荷，故心臟病人應軟便、避免用力。","options":{"A":"用力解便(Valsalva增加心臟負荷)後胸痛，符合費力誘發的特徵。","B":"壓迫感、吸不上氣，是典型心絞痛性質。","C":"胸與肩部疼痛(可輻射)符合心絞痛表現。","D":"正解(非典型者)。痛達3個多小時持續過久，不是穩定型心絞痛，應警覺心肌梗塞。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"108020-N3-29":{"quick":"降低心肌耗氧量的藥是β阻斷劑、硝酸鹽、鈣離子阻斷劑；「低劑量aspirin」是抗血小板(預防血栓)，不直接降低心肌耗氧量。","detail":{"background":"心絞痛治療藥物依機轉分兩類：①「降低心肌需氧」——β交感神經阻斷劑(降心率、收縮力、血壓)、硝酸鹽類(NTG，主要降前負荷、亦擴張冠脈)、鈣離子阻斷劑(降後負荷、擴張冠脈、減心收縮力)；②「抗血小板/抗血栓」——aspirin不可逆抑制血小板COX-1減少血栓素A2(TXA2)、抑制血小板凝集，目的是預防冠脈血栓形成與心血管事件，並不直接減少心肌耗氧量。本題問「能降低心肌耗氧量」的藥，aspirin屬抗血小板而非降耗氧，故為錯誤選項(例外)。　深入補充：降心肌耗氧(MVO₂)的決定因素為心率、心收縮力、心室壁張力(前後負荷)。β阻斷劑、鈣阻斷劑、硝酸鹽各從不同面向降耗氧。Aspirin、clopidogrel、statin屬「抗血栓/穩定斑塊」用藥，是冠心病長期治療的另一支柱(ABCDE原則)。","options":{"A":"β阻斷劑降心率/收縮力/血壓→降心肌耗氧，正確。","B":"硝酸鹽降前負荷並擴張冠脈→降耗氧增供氧，正確。","C":"鈣離子阻斷劑降後負荷、擴張冠脈→降耗氧，正確。","D":"錯誤(正解)。低劑量aspirin是抗血小板、預防血栓，不直接降低心肌耗氧量。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"108110-N3-25":{"quick":"心肌梗塞用morphine：止痛、降焦慮、並擴張血管降低前負荷、減少心肌耗氧。其餘三選項敘述皆有誤。","detail":{"background":"冠心症常用藥物：①NTG主要降前負荷與擴冠脈，副作用是低血壓/頭痛，重點監測「血壓」而非心搏出量；②propranolol是β阻斷劑，作用為降心率、收縮力(降耗氧)，並非「擴張動脈降後負荷」(那是鈣阻斷劑/血管擴張劑)；③morphine用於心肌梗塞可止痛、解除焦慮與交感興奮，並透過靜脈擴張降低前負荷，減少心臟工作與耗氧，亦有助緩解肺水腫；④heparin是抗凝劑，作用於內生路徑，監測指標為aPTT(活化部分凝血酶原時間)，warfarin才監測PT/INR。故正確為C。　深入補充：morphine用於心肌梗塞除止痛、降前負荷外，須監測呼吸抑制與低血壓，必要時以naloxone拮抗。heparin抗凝監測aPTT(目標約正常1.5~2.5倍)；低分子量肝素(LMWH)依體重給藥、多不需常規監測。","options":{"A":"NTG重點監測「血壓」(防低血壓)，非心搏出量，敘述不當。","B":"propranolol是β阻斷劑，主要降心率與收縮力，並非擴張動脈降後負荷，敘述錯誤。","C":"正解。morphine可止痛、降焦慮並擴張靜脈降低前負荷，減少心肌耗氧。","D":"heparin監測aPTT而非PT；PT/INR是warfarin的監測指標，敘述錯誤。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"109110-N3-31":{"quick":"NTG急性發作每5分鐘1顆、最多3顆(15分鐘)仍未緩解即須就醫；「連5顆才就醫」是錯誤指導。","detail":{"background":"舌下NTG急救用法：胸痛發作時立即舌下含1顆，若5分鐘未緩解再含第2顆、再5分鐘含第3顆，最多3顆共15分鐘；若3顆後仍未緩解，須立即就醫(高度懷疑心肌梗塞)。其他衛教：含服時舌下有灼熱/刺麻感代表藥仍有效(若無刺麻感可能已失效需換藥)；存放於原棕色遮光瓶、陰涼乾燥處、避免高溫陽光；皮膚貼片(經皮NTG)每日定時更換、輪換貼附部位避免皮膚刺激，且每日須有一段「無貼片時段」以避免耐受性。本題A把「連續5顆無效才就醫」當正確是錯的，正確是3顆/15分鐘。　深入補充：NTG舌下含服「3顆15分鐘」無效即須懷疑心肌梗塞、撥打119。皮膚貼片每日更換並輪換部位、撕除舊貼片再貼新的。NTG與勃起功能藥併用禁忌(嚴重低血壓)。靜脈NTG須用玻璃瓶/特殊輸液管(會吸附於PVC)。","options":{"A":"錯誤(正解)。應為最多3顆(每5分鐘1顆、共15分鐘)仍未緩解即就醫，而非5顆。","B":"舌下含服有熱辣/刺麻感代表藥效仍存，正確。","C":"存放遮光陰涼處、避免高溫，正確。","D":"皮膚貼片每日更換並輪換部位，正確。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"111030-N3-28":{"quick":"PTCA後患肢須制動(平躺、伸直)以壓迫止血、防出血/血栓；「鼓勵下肢全關節主動運動」會牽動穿刺處出血，錯誤。","detail":{"background":"股動脈PTCA後護理：①監測「雙側」肢體脈搏、膚色、溫度(穿刺側比對另一側評估動脈血流，警覺血栓/阻塞)；②持續心電圖監測(觀察再阻塞、心律不整、ST變化)；③鼓勵多飲水加速顯影劑由腎臟排出、預防顯影劑腎病變；④穿刺側下肢須伸直制動數小時(不可屈膝屈髖)、沙袋加壓，避免穿刺點出血、血腫或假性動脈瘤。因此「鼓勵病人做下肢全關節主動運動」與術後制動止血的需求相違背，會牽動穿刺處導致出血，是錯誤護理。　深入補充：PTCA術後鼓勵多飲水排顯影劑、監測尿量與腎功能。穿刺側肢體制動期間可做「健側」肢體與足踝幫浦運動預防靜脈栓塞，但「患側」須伸直制動。觀察穿刺處有無腫脹、瘀血、搏動性腫塊(假性動脈瘤)。","options":{"A":"監測雙側肢體脈搏以評估動脈血流，正確。","B":"監測心電圖觀察心肌缺血/心律，正確。","C":"鼓勵多飲水排出顯影劑、保護腎臟，正確。","D":"錯誤(正解)。患肢須制動伸直止血，鼓勵下肢全關節主動運動會牽動穿刺處造成出血。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"112110-N3-30":{"quick":"動脈粥狀硬化機轉：內皮損傷→脂質沉積、血小板凝集、交感兒茶酚胺使血管收縮；「周邊血管擴張、心肌供氧增加」與之相反，為錯誤。","detail":{"background":"動脈粥狀硬化(atherosclerosis)病理過程：①血管內皮細胞損傷(高血壓、抽菸、高血糖、氧化LDL等)；②LDL進入內皮下被氧化、巨噬細胞吞噬成泡沫細胞，形成脂肪條紋與粥狀斑塊；③血小板黏附凝集、平滑肌增生、纖維帽形成→血管腔狹窄、管壁變硬；④斑塊破裂時暴露膠原引發血栓，造成急性阻塞(心肌梗塞/中風)。交感神經興奮分泌兒茶酚胺(腎上腺素、正腎上腺素)使血管「收縮」、心率血壓上升、心肌耗氧增加，加重缺血。粥狀硬化的結果是血管「狹窄、供氧減少」，故D「周邊血管擴張、心肌供氧增加」與真實機轉相反，是錯誤敘述。　深入補充：動脈粥狀硬化是慢性發炎過程，C反應蛋白(CRP)等發炎指標升高與心血管風險相關。斑塊「不穩定(薄纖維帽、大脂質核)」破裂時暴露組織因子引發血栓，造成急性冠心症。降LDL(statin)可穩定斑塊、降低事件。","options":{"A":"血管內皮細胞損傷是粥狀硬化的起始機轉，正確。","B":"血小板凝集增加、血塊形成參與斑塊與血栓，正確。","C":"交感神經受刺激分泌兒茶酚胺使血管收縮、耗氧增加，正確。","D":"錯誤(正解)。粥狀硬化使血管狹窄、供氧「減少」；「周邊血管擴張、供氧增加」方向相反。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"113030-N3-18":{"quick":"冠心病人服aspirin的主要目的是「抑制血小板凝集」、預防冠脈血栓與心肌梗塞，不是止痛或降心率。","detail":{"background":"Aspirin(乙醯水楊酸)低劑量(如81~100 mg/天)用於冠狀動脈疾病的核心目的是「抗血小板」：不可逆抑制血小板的環氧合酶-1(COX-1)，使其無法合成血栓素A2(TXA2)，因而抑制血小板的活化與凝集，降低冠狀動脈內血栓形成的風險，預防心肌梗塞與缺血性中風(屬次級預防)。由於血小板無細胞核無法重新合成酵素，此抑制持續整個血小板壽命(約7~10天)。Aspirin並非用來「緩解急性胸痛(那是NTG)」、也不是鬆弛血管平滑肌或減慢心跳。常見副作用為腸胃道刺激/出血，須注意。　深入補充：Aspirin抗血小板效果持續整個血小板壽命(約7~10天)，故手術前常需停藥數天評估出血風險。主要副作用為腸胃道刺激與出血，可與制酸/護胃藥併用。對Aspirin不耐者可用clopidogrel(P2Y12抑制劑)替代。","options":{"A":"緩解急性發作胸痛是NTG的作用，非aspirin。","B":"鬆弛血管平滑肌是硝酸鹽/鈣阻斷劑作用，非aspirin。","C":"正解。aspirin抑制血小板COX-1、減少TXA2→抑制血小板凝集，預防冠脈血栓。","D":"減緩心跳是β阻斷劑作用，非aspirin。"},"sources":["新文京《內外科護理學》冠狀動脈疾病","華杏《內外科護理學》心臟血管系統","2021 ESC 慢性冠心症指引","Harrison 內科學 缺血性心臟病"]}},"101030-N3-9":{"quick":"急性心肌梗塞最具代表的心電圖變化是「ST段上升」(透壁性損傷)。","detail":{"background":"心肌梗塞(MI)是冠狀動脈完全阻塞使心肌缺血壞死，心電圖隨缺血→損傷→壞死依序變化：①缺血期T波倒置或高聳；②損傷期「ST段上升」(透壁性損傷的指標，是急性ST上升型MI(STEMI)的關鍵診斷)；③壞死期出現「病理性Q波」(深寬Q波，代表心肌壞死，常永久存在)。PR間距延長見於房室傳導阻滯、QRS增寬見於心室內傳導障礙(如束支傳導阻滯)，皆非MI的代表變化。臨床上ST段上升合併胸痛、心肌酵素(Troponin)上升，即可診斷急性STEMI並考慮再灌流治療。　深入補充：ST上升型心肌梗塞(STEMI)代表透壁性損傷，須緊急再灌流(PCI或溶栓)；非ST上升型(NSTEMI)/不穩定型心絞痛多為ST下降或T倒置。心電圖須連續追蹤(動態變化)，並對照相鄰導程定位梗塞部位。","options":{"A":"T波變窄矮非MI典型；MI早期為T波高聳或倒置。","B":"PR間距延長代表房室傳導阻滯，非MI代表變化。","C":"正解。ST段上升代表透壁性心肌損傷，是急性心肌梗塞的關鍵心電圖變化。","D":"QRS增寬代表心室內傳導障礙(如束支阻滯)，非MI典型。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"101110-N3-44":{"quick":"MI時心肌特異酵素「CK-MB上升」(CK-MB來自心肌；CK-BB來自腦、CK-MM來自骨骼肌)。","detail":{"background":"心肌損傷標記物：肌酸激酶(CK)有三種同功酶——CK-MM(骨骼肌)、CK-MB(心肌)、CK-BB(腦)，心肌梗塞時釋出「CK-MB上升」(約4~6小時上升、24小時達高峰、2~3天恢復)。乳酸脫氫酶(LDH)有LDH1~LDH5，心肌富含LDH1，正常LDH1<LDH2，MI時LDH1上升使「LDH1/LDH2>1(翻轉)」，約24~48小時上升、可持續7~14天。最敏感且特異的是心肌旋轉蛋白(Troponin I/T)。本題唯一正確為「CK-MB上升」。　深入補充：CK-MB過去為診斷標記，現以高敏感性心肌旋轉蛋白(hs-Troponin)為主，可更早(發病1~3小時)偵測。LDH因恢復慢，過去用於延遲就醫(數天後)的回溯診斷，現已少用。","options":{"A":"LDH4與心肌無特異關聯，「下降」非MI表現。","B":"MI時LDH1上升(LDH1/LDH2翻轉)，並非以LDH2上升為標記。","C":"CK-BB來自腦組織，與心肌梗塞無關。","D":"正解。CK-MB來自心肌，心肌梗塞時上升。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"101110-N3-45":{"quick":"MI後出現「急性肺水腫」屬Killip III級。","detail":{"background":"Killip分級依心肌梗塞後的心衰竭嚴重度與死亡風險分四級：Ⅰ級＝無心衰竭徵象(無囉音、無S3)；Ⅱ級＝輕中度心衰竭(肺底囉音<肺野1/2、S3、頸靜脈怒張)；Ⅲ級＝「急性肺水腫」(囉音遍及全肺野)；Ⅳ級＝心因性休克(收縮壓<90 mmHg、末梢灌流不足)。分級愈高死亡率愈高。本題「出現急性肺水腫」對應Ⅲ級。　深入補充：Killip分級於入院時評估，級數越高30天死亡率越高(Ⅰ約5%、Ⅳ可達80%以上)。另有Forrester分類依「心輸出指數＋肺動脈楔壓」分四象限指導治療。急性肺水腫(Ⅲ級)須高坐臥、利尿、嗎啡、供氧。","options":{"A":"Ⅰ級為無心衰竭徵象，與肺水腫不符。","B":"Ⅱ級為輕中度心衰竭(局部囉音/S3)，尚未達全肺水腫。","C":"正解。急性肺水腫(囉音遍及全肺)為Killip Ⅲ級。","D":"Ⅳ級為心因性休克，較肺水腫更嚴重。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"102030-N3-28":{"quick":"抬高床頭(半坐臥)使靜脈回流減少→「降低前負荷」、減少心臟工作與耗氧。","detail":{"background":"心肌梗塞病人採半坐臥/抬高床頭的目的：①利用重力使下肢與內臟靜脈血回流減少，降低回到右心的血量(前負荷)，減輕心臟前負荷與肺鬱血；②膈肌下降、增加肺擴張改善換氣與血氧。前負荷下降使心室壁張力與心肌耗氧減少，有助缺血心肌恢復。抬高床頭並非降低後負荷(後負荷主要與動脈阻力/血壓有關)，也不會增加心率或收縮力。　深入補充：心肌梗塞急性期須監測心律(連續心電圖)、警覺心室顫動(早期猝死主因)、備妥去顫器。半坐臥同時可改善肺擴張與血氧。避免Valsalva(用力解便)，常給軟便劑。","options":{"A":"後負荷主要由動脈阻力/血壓決定，抬高床頭不以降後負荷為主。","B":"正解。抬高床頭減少靜脈回流→降低前負荷，減輕心臟負荷與耗氧。","C":"目的在減少心臟工作，非增加心跳速率。","D":"抬高床頭不增加心收縮力。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"102030-N3-30":{"quick":"心肌梗塞後心臟復健「不應做等長(isometric)運動」(會Valsalva升高後負荷與心肌耗氧)，且運動心率不該追求最大心率80%以上。","detail":{"background":"心臟復健以「漸進性、有氧」為原則：暖身5~10分鐘、漸進增加活動量、了解並控制危險因子、以代謝當量(MET)選擇活動、運動強度控制在最大心率(220-年齡)的一定百分比(通常恢復早期保守，約60~75%且心率增加不超過休息時20~25%)。「等長運動(舉重、用力閉氣推牽)」會引發Valsalva使胸內壓上升、靜脈回流劇變、血壓與後負荷驟升、心肌耗氧增加，對心臟病人有害，應避免，改以有氧運動(走路、踏車)增進心肺耐力。故「加強等長訓練」與「要求達最大心率80%以上」皆不當；本題問錯誤，D加強等長訓練最不適當。　深入補充：心臟復健以「漸進、有氧」為原則，避免等長(isometric)運動因其引發Valsalva使血壓與後負荷驟升、心肌耗氧增加。早期運動強度保守(約最大心率60~75%)、心率增加不超過休息時20次/分。心臟復健可降低心肌梗塞後再住院與死亡率，並改善運動耐力與生活品質。","options":{"A":"漸進性增加活動量是復健正確原則。","B":"了解危險因子並加以控制是復健重要內容。","C":"要求運動達最大心率80%以上對MI病人偏高、有風險，並不恰當(此選項敘述亦不妥)。","D":"錯誤(正解)。等長運動引發Valsalva升高血壓與心肌耗氧，心臟復健應避免，改做有氧運動。"},"sources":["新文京《內外科護理學》心臟復健","華杏《內外科護理學》心臟血管系統","AACVPR 心臟復健指引"]}},"102110-N3-9":{"quick":"前壁與心尖心肌梗塞最可能是「左前降枝(LAD)」阻塞。","detail":{"background":"冠狀動脈供血區與梗塞部位對應：①左前降枝(LAD)供應「前壁、心尖、心室中隔前2/3」，阻塞→前壁/前間壁梗塞，反映於胸前導程V1~V4，因供應範圍大、影響左心室功能而被稱「widow maker」；②右冠狀動脈(RCA)供應「下壁、右心室、房室結」，阻塞→下壁梗塞(II、III、aVF)，易併房室傳導阻滯；③左迴旋枝(LCX)供應「側壁、後壁」，反映於I、aVL、V5~V6；④左主幹(LM)阻塞範圍最廣、最危險。本題前壁與心尖梗塞對應LAD。　深入補充：左前降枝(LAD)阻塞範圍大、影響左心室收縮，併發心衰竭、心因性休克風險高，故稱「widow maker(寡婦製造者)」。下壁梗塞(RCA)易併心搏過緩/房室阻滯；右心室梗塞對前負荷敏感，忌用硝酸鹽與利尿劑(會使血壓驟降)。","options":{"A":"正解。左前降枝(LAD)供應前壁與心尖，阻塞造成前壁/心尖梗塞。","B":"右冠狀動脈供應下壁與右心室，對應下壁梗塞。","C":"左主幹(總冠狀動脈)阻塞範圍極廣，非特定僅前壁心尖。","D":"左迴旋枝供應側壁/後壁，非前壁心尖。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"102110-N3-54":{"quick":"MI注射嗎啡是為止痛、降焦慮交感興奮並擴張靜脈降前負荷；「加快心跳速率」非其目的(反而抑制交感)。","detail":{"background":"心肌梗塞使用嗎啡(morphine)的目的：①強效止痛緩解劇烈胸痛；②解除焦慮與交感神經過度興奮，降低心率與心肌耗氧；③靜脈擴張降低前負荷，減輕肺鬱血(對合併肺水腫有益)。嗎啡並非用來「加快心跳」，相反它抑制交感、可能使心率與血壓下降；也會抑制呼吸中樞(須監測呼吸)，並非支氣管擴張劑(嗎啡可釋放組織胺，反而可能收縮支氣管)。本題問錯誤目的，D「加快心跳速率」是錯的。　深入補充：morphine降低交感張力與心肌耗氧、緩解肺鬱血，但須監測呼吸抑制、血壓下降與噁心。近年部分研究指出morphine可能延緩口服抗血小板藥吸收，故臨床用量趨於謹慎、以止痛為導向。","options":{"A":"止痛是嗎啡主要目的，正確。","B":"嗎啡靜脈擴張可降低前負荷，正確。","C":"嗎啡並無支氣管擴張作用(此敘述亦非其使用目的)；惟本題標準答案以D為最錯誤之「加快心跳」。","D":"錯誤(正解)。嗎啡抑制交感、心率多下降，並非用來加快心跳速率。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"103030-N3-32":{"quick":"MI後避免「彎曲膝部、交疊雙腳」以防靜脈鬱滯形成血栓；不需絕對臥床7天、亦非永遠平躺。","detail":{"background":"心肌梗塞後活動指導：急性期須限制活動以降低心肌耗氧，但「絕對臥床過久」反增加靜脈血栓(深部靜脈栓塞)、肺栓塞、肌力流失與壓瘡風險，現多採早期漸進活動。臥床期間應避免膝部彎曲、雙腳交疊或膝下墊枕等使下肢靜脈受壓、血流鬱滯的姿勢，並鼓勵足踝主動運動、必要時穿彈性襪以促進靜脈回流、預防血栓。半坐臥可降前負荷。出院後須循序漸進恢復活動、控制危險因子，並非「立即恢復原有生活」。　深入補充：早期漸進活動(early mobilization)可減少臥床併發症(DVT、肺炎、肌力流失、譫妄)。活動進展依病情、有無併發症調整；出院後依心臟復健計畫循序恢復，並控制危險因子(戒菸、降脂、控糖控壓)。","options":{"A":"絕對臥床7天過度，反增血栓與失能風險，不正確。","B":"長期平躺不利且增前負荷/血栓風險，不正確。","C":"正解。避免彎膝、交疊雙腳以防下肢靜脈鬱滯形成血栓。","D":"出院後須漸進恢復並控制危險因子，不可立即恢復原生活。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"103100-N3-27":{"quick":"MI病人應避免「等長運動」(Valsalva升高心臟負荷)；其餘半坐臥、給氧、少量多餐皆適當。","detail":{"background":"急性心肌梗塞護理：①半坐臥姿促進肺擴張、減少靜脈回流降低心臟負荷；②供氧改善心肌缺氧、緩解胸痛與呼吸困難(目標維持血氧)；③飲食採少量多餐、避免產氣與含咖啡因(咖啡因刺激交感增加心率/耗氧)、限鈉減少水分滯留；④活動須限制並漸進，禁止等長(用力閉氣)運動，因會引發Valsalva使胸內壓、血壓與後負荷驟升、心肌耗氧增加，恐誘發心律不整或再梗塞。故「規律進行等長運動」是不適當的措施。　深入補充：心肌梗塞飲食採少量多餐、低鈉、避免飽餐(飽餐增加心臟負荷)、避免咖啡因(刺激交感)、避免極冷極熱食物(可能誘發心律)。便祕者用軟便劑避免Valsalva。供氧以維持SpO₂約94%以上、避免不必要的高濃度氧。","options":{"A":"半坐臥促進肺擴張、減少心臟負荷，適當。","B":"供氧改善缺氧、緩解胸痛呼吸困難，適當。","C":"少量多餐、避免產氣與咖啡因，適當。","D":"不適當(正解)。等長運動引發Valsalva升高心臟負荷與耗氧，MI病人應避免。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"104030-N3-27":{"quick":"急性心肌梗塞「最早且最具特異性」的心肌標記是Troponin I(心肌旋轉蛋白)。","detail":{"background":"心肌損傷標記出現順序與特性：①肌紅素(myoglobin)最早上升(1~2小時)但無心肌特異性、最快恢復；②心肌旋轉蛋白(Troponin I/T)約3~6小時開始上升、敏感度與特異度最高，是現行診斷急性心肌梗塞的「黃金標準」，且持續上升7~14天利於回溯診斷；③CK-MB約4~6小時上升、24小時高峰、2~3天恢復，特異度次於troponin；④LDH(LDH1/LDH2>1)上升較晚(24~48小時)、持續較久。AST(GOT)非心肌特異。題目問「最早出現變化」且選項含Troponin I，正解為Troponin I(臨床最早可靠且特異的心肌壞死標記)。　深入補充：肌紅素(myoglobin)最早升(1~2h)但無特異性；troponin約3~6h升、7~14天回復，敏感特異度最高；CK-MB約4~6h升、2~3天回復，可用於評估「再梗塞」(troponin仍高時，CK-MB再上升提示新梗塞)。","options":{"A":"CK升高較troponin晚、且總CK特異度低。","B":"LDH上升較晚(24~48小時)，恢復也慢。","C":"正解。Troponin I敏感度/特異度最高、是診斷MI的最佳標記。","D":"AST(GOT)非心肌特異，已不作為MI主要標記。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"104100-N3-24":{"quick":"MI可合併低度發燒、噁心嘔吐、呼吸短促等；但「滲透性利尿」不是MI的合併症。","detail":{"background":"急性心肌梗塞的伴隨症狀：①交感興奮與壞死組織發炎→低度發燒(常於發病24~48小時，WBC上升)；②迷走刺激與心輸出下降→噁心、嘔吐、冷汗；③左心功能下降、肺鬱血→呼吸短促、端坐呼吸；④胸痛、瀕死焦慮、臉色蒼白。「滲透性利尿(osmotic diuresis)」見於高血糖(糖尿)或使用甘露醇等高滲溶質時，與心肌梗塞病理無關。本題問錯誤，B滲透性利尿不是MI合併症。　深入補充：心肌梗塞的全身反應包括發炎(WBC↑、發燒、ESR/CRP↑)、交感興奮(冷汗、焦慮)、迷走刺激(噁心嘔吐、心搏過緩，尤其下壁)。滲透性利尿見於高血糖/甘露醇，與心肌梗塞病理無關，是本題鑑別重點。","options":{"A":"壞死組織發炎引起低度發燒，是MI常見伴隨表現。","B":"錯誤(正解)。滲透性利尿與MI無關(見於高血糖/高滲溶質)。","C":"迷走刺激/心輸出下降引起噁心嘔吐，常見。","D":"左心功能下降肺鬱血造成呼吸短促，常見。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"104100-N3-30":{"quick":"心臟復健第一期(住院期)以「教育疾病知識、自我照顧與漸進性低強度活動」為主。","detail":{"background":"心臟復健分期：第一期(住院期)＝在住院期間進行，以衛教(疾病知識、危險因子、用藥、警訊)、自我照顧、床邊與病房內漸進性低強度活動(翻身、坐起、室內步行)為主，避免長期臥床合併症；第二期(門診監測期)＝出院後在心電圖監測下進行有監督的運動訓練；第三期(維持期)＝社區/居家長期維持運動與生活型態。第一期不要求一定要走上下樓、走樓梯不需常規用氧，也適用於心肌梗塞病人(MI是心臟復健的主要對象)。故正解為A。　深入補充：第一期(住院期)心臟復健目標是預防臥床合併症、衛教與低強度自我照顧活動(約1~2 MET)；出院前評估能否耐受走上下樓(約4~5 MET)。心肌梗塞病人正是心臟復健的主要對象，可降低再住院與死亡率。","options":{"A":"正解。第一期(住院期)以教育疾病知識、自我照顧與漸進性活動為主。","B":"走上下一層樓是較後期/出院前評估，非第一期「皆須」執行。","C":"走樓梯不需常規使用氧氣。","D":"心肌梗塞病人正是心臟復健的主要適用對象，並非不適用。"},"sources":["新文京《內外科護理學》心臟復健","華杏《內外科護理學》心臟血管系統","AACVPR 心臟復健指引"]}},"105030-N3-27":{"quick":"心肌「壞死」對應的心電圖變化是「明顯(病理性)Q波」。","detail":{"background":"MI心電圖三層變化對應病理：①缺血(ischemia)→T波倒置/高聳；②損傷(injury)→ST段上升或下降；③壞死(necrosis)→出現「病理性Q波」(寬≥0.04秒、深>R波1/4)，代表該區心肌壞死無電氣活性，常永久殘留作為陳舊性梗塞的標記。P波倒置與心房去極化方向有關、QT延長與再極化/電解質藥物有關、T波變平非特異，皆非「壞死」的代表。故壞死對應明顯Q波。　深入補充：心電圖三層次——缺血(T倒置/高聳)、損傷(ST偏移)、壞死(病理性Q波)。病理性Q波定義為寬≥0.04秒或深度&gt;同導程R波1/4，代表心肌壞死，多永久存在作為陳舊性梗塞標記。","options":{"A":"P波倒置與心房去極化方向相關，非心肌壞死標記。","B":"QT延長與再極化/電解質/藥物有關，非壞死標記。","C":"T波變平非特異，且代表缺血層面而非壞死。","D":"正解。明顯(病理性)Q波代表心肌壞死。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"105090-N3-25":{"quick":"II、III、aVF出現ST上升＝「下壁(inferior)」心肌梗塞(對應右冠狀動脈)。","detail":{"background":"心電圖導程與梗塞部位定位：II、III、aVF＝「下壁」(供應血管多為右冠狀動脈RCA)；V1~V2＝中隔；V3~V4＝前壁；V5~V6、I、aVL＝側壁；V1~V2鏡像ST下降合併R波增高＝後壁。下壁梗塞因RCA也供應房室結，易併發心搏過緩或房室傳導阻滯，須注意心律與血壓。本題II、III、aVF的ST上升與T倒置即「下壁梗塞」。　深入補充：下壁梗塞(II、III、aVF)多為右冠狀動脈(RCA)阻塞，因RCA也供應竇房結與房室結，易併心搏過緩與房室傳導阻滯，須備atropine與經皮節律器；若合併右心室梗塞，忌硝酸鹽/利尿劑(會嚴重低血壓)。","options":{"A":"正解。II、III、aVF對應下壁，提示下壁心肌梗塞(RCA)。","B":"前壁對應V3~V4(LAD)。","C":"後壁多由V1~V2鏡像變化判斷。","D":"側壁對應I、aVL、V5~V6(LCX)。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"105090-N3-26":{"quick":"1個代謝當量(MET)＝安靜坐著時每公斤體重每分鐘消耗約3.5 mL氧氣。","detail":{"background":"代謝當量(metabolic equivalent, MET)是表示身體活動耗能的單位，1 MET定義為「安靜休息(靜坐)時每公斤體重每分鐘約消耗3.5 mL氧氣(3.5 mL O2/kg/min)」。心臟復健以MET量化活動強度並漸進增加(如進食/盥洗約1.5~2 MET、平地走路約3 MET、上樓約4~5 MET、性行為約3~5 MET)，協助選擇安全的活動內容。故1 MET＝3.5 mL O2/kg/min。　深入補充：MET可量化日常活動：進食盥洗約1.5~2、平地走路約3、上樓/性行為約4~5、跑步更高。心臟復健以MET循序漸進選擇活動，避免超過病人耐受度，並監測心率、血壓與自覺費力程度(Borg量表)。","options":{"A":"1.0 mL過低，非MET定義。","B":"2.5 mL非MET定義。","C":"正解。1 MET = 3.5 mL O2/公斤/分鐘。","D":"5.0 mL非1 MET之定義值。"},"sources":["新文京《內外科護理學》心臟復健","華杏《內外科護理學》心臟血管系統","AACVPR 心臟復健指引"]}},"105090-N3-30":{"quick":"MI時LDH1上升使「LDH1/LDH2>1(翻轉)」；本題寫「LDH1/LDH2<1」是錯誤敘述。","detail":{"background":"心肌梗塞實驗室變化：①壞死發炎→白血球(WBC)上升、低度發燒、CRP上升；②心肌旋轉蛋白(Troponin I/T)上升＝心肌壞死標記、最敏感特異；③CK-MB上升＝心肌受損；④LDH同功酶中心肌富含LDH1，正常時LDH1<LDH2，MI時LDH1上升造成「LDH1/LDH2>1(翻轉)」，是延遲期(數天)診斷的依據。本題B寫「LDH1/LDH2<1」與MI翻轉現象相反，是錯誤敘述。　深入補充：心肌梗塞除心肌標記外，常合併壓力性高血糖、白血球與發炎指標上升。LDH同功酶翻轉(LDH1&gt;LDH2)曾用於延遲診斷，現以troponin取代。BNP升高反映合併心衰竭。","options":{"A":"壞死發炎使WBC上升，正確。","B":"錯誤(正解)。MI時應為LDH1/LDH2>1(翻轉)，「<1」敘述相反。","C":"Troponin I上升是心肌壞死標記，正確。","D":"CK-MB上升表示心肌受損，正確。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"106030-N3-31":{"quick":"MI後「最快恢復正常」的標記是肌紅素(myoglobin)。","detail":{"background":"心肌標記的時間動力學：①肌紅素(myoglobin)最早上升(1~2小時)、也「最快恢復正常(約24小時內)」，因分子小、非心肌特異；②CK-MB約4~6小時升、24小時峰、2~3天恢復；③Troponin I約3~6小時升、可持續上升「7~14天」(恢復最慢)，特異敏感度最高；④LDH約24~48小時升、持續7~14天。問「最快恢復」即myoglobin，問「最特異/可回溯」即troponin。　深入補充：肌紅素分子小、最早上升也最快(約24小時)回復正常，敏感但不特異(骨骼肌損傷、腎衰也升)，故常作「陰性排除」用。Troponin恢復最慢(7~14天)，利於回溯診斷但不利於偵測「再梗塞」。","options":{"A":"正解。肌紅素分子小、最早上升也最快恢復正常(約24小時)。","B":"CK-MB約2~3天恢復，比myoglobin慢。","C":"Troponin-I持續7~14天，恢復最慢。","D":"LDH持續7~14天，恢復慢。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"106110-N3-25":{"quick":"75歲胸悶噁心呼吸困難冷汗焦慮＝疑急性冠心症，應放IV、做12導程ECG、給氧；「靜脈推Ativan鎮靜」不適宜。","detail":{"background":"老年人(尤其女性、糖尿病)的急性冠心症常以「非典型」表現呈現：胸悶、上腹不適、噁心、呼吸困難、冷汗、極度焦慮/瀕死感，而非典型壓榨性胸痛。急診初步處置(MONA與評估)：建立靜脈管路(備藥與抽血驗心肌酵素)、立即做12導程心電圖判別有無ST上升、給氧改善缺氧、給aspirin與硝酸鹽、必要時嗎啡止痛。對於疑似心肌梗塞且焦慮的病人，不宜貿然靜脈推注benzodiazepine(如Lorazepam/Ativan)，因會抑制呼吸與血壓、掩蓋病情、延誤心臟評估；焦慮應以陪伴、解釋、處理缺血為主。故D最不適宜。　深入補充：老年、女性、糖尿病常以非典型急性冠心症表現(胸悶、上腹不適、噁心、呼吸困難、極度倦怠/焦慮)。急診應於10分鐘內完成12導程心電圖；疑似MI且焦慮者不宜貿然以benzodiazepine鎮靜(抑制呼吸、掩蓋病情)。","options":{"A":"放置靜脈留置針以備給藥/抽血，適宜。","B":"立即12導程心電圖判別STEMI，適宜且必要。","C":"給氧改善心肌缺氧，適宜。","D":"不適宜(正解)。靜脈推注Ativan會抑制呼吸/血壓、掩蓋病情，疑似MI時不應如此鎮靜。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"106110-N3-30":{"quick":"初期心臟復健活動心率增加以「不超過休息時的20%(約20次/分內)」為原則。(本題官方列為送分)","detail":{"background":"心臟復健初期的安全活動原則：心率增加量以「不超過休息時的20%(或不超過休息心率+20次/分鐘)」為原則，血壓上升不超過正常值25 mmHg，採漸進方式，並監測有無胸悶、胸痛、眩暈、盜汗、心律不整等不耐徵象。題目選項中常用答案為20%(約20次/分鐘)；本題官方公告為「送分(一律給分)」，因臨床標準有以20次/分或20~25%表述、選項區分不夠明確。學習重點：記住「心率增幅≤休息時20%(約20次/分)、血壓升幅<25 mmHg」即可。　深入補充：心臟復健初期活動安全閾值——心率增加不超過休息時約20%(或+20次/分)、收縮壓上升不超過正常值25 mmHg；出現胸悶、胸痛、眩暈、盜汗、心律不整、過度疲倦即停止活動並評估。","options":{"A":"10%偏保守，非常用標準值。","B":"15%非常用標準值。","C":"20%(約20次/分)為常見教材標準；惟本題送分一律給分。","D":"官方答案列D(25%)；本題送分，重點記「約20%/20次/分」原則。"},"sources":["新文京《內外科護理學》心臟復健","華杏《內外科護理學》心臟血管系統","AACVPR 心臟復健指引"]}},"106110-N3-31":{"quick":"MI後「不正常(病理性)Q波」一旦出現最可能「永遠不消失」(代表心肌壞死)。","detail":{"background":"MI心電圖演變：急性期ST段上升、T波倒置多在數天至數週內隨缺血改善而回復(ST通常數日內回到基線、T波倒置可數週至數月恢復)。但「病理性Q波」代表該區心肌已壞死、被疤痕取代而無電氣活性，通常「永久存留」作為陳舊性梗塞的證據。故四者中最可能永不消失的是病理性Q波。　深入補充：ST段上升通常數日內回基線、T波倒置數週至數月可恢復，但病理性Q波代表壞死疤痕、多永久存留。若ST持續上升數週不退，須警覺心室壁瘤形成。","options":{"A":"T波倒置多在數週至數月內可恢復，非永久。","B":"ST段上升通常數日內回到基線，非永久。","C":"正解。病理性(不正常)Q波代表心肌壞死，多永久存留。","D":"QRS變窄非MI壞死標記。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"107030-N3-16":{"quick":"急性MI最典型表現是「胸痛持續(>20~30分鐘)、休息與NTG皆無法緩解」。","detail":{"background":"急性心肌梗塞典型臨床表徵：劇烈胸痛(胸骨後壓榨/緊縮，可輻射左肩臂、頸、下頷)、持續時間長(通常>20~30分鐘)、休息與舌下NTG皆無法緩解(與心絞痛最大區別)，常伴冷汗、噁心嘔吐、呼吸困難、臉色蒼白、瀕死焦慮；血壓可上升或下降(若併心衰/休克則下降)，非必然上升。故最典型且鑑別關鍵是「休息無法緩解胸痛」。　深入補充：急性心肌梗塞的「時間就是心肌(time is muscle)」，STEMI從到院到打通血管(door-to-balloon)應≤90分鐘。典型胸痛持續、休息與NTG皆不緩解是與心絞痛的關鍵鑑別點。","options":{"A":"MI胸痛持續較久(>20~30分鐘)，「<20分鐘」不典型。","B":"血壓不一定上升，併休克時反而下降，非典型必然。","C":"NTG「無法」緩解才是MI特徵；可被NTG緩解者多為心絞痛。","D":"正解。休息無法緩解胸痛，是急性心肌梗塞的典型特徵。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"107110-N3-29":{"quick":"MI使用aspirin是「抗血小板、避免血小板凝集形成血栓」；不是止痛、降耗氧或溶栓。","detail":{"background":"心肌梗塞早期給予aspirin是急性處置的關鍵之一：不可逆抑制血小板COX-1、減少血栓素A2，抑制血小板凝集，阻止冠脈內血栓持續形成與擴大，降低死亡率(屬抗血小板，非溶栓)。溶解既有血栓需「血栓溶解劑(如tPA、streptokinase)」或經皮介入；止痛用morphine；降心肌耗氧用β阻斷劑/硝酸鹽。故aspirin的作用是「避免血小板凝集而產生血栓」。　深入補充：急性心肌梗塞應「嚼碎」aspirin以加速吸收抗血小板。長期次級預防常合併aspirin＋P2Y12抑制劑(雙抗血小板)、statin、β阻斷劑、ACEI/ARB(ABCDE)。溶栓需血栓溶解劑(tPA等)，aspirin本身不溶栓。","options":{"A":"止痛是嗎啡的作用，非aspirin。","B":"降低心肌需氧量是β阻斷劑/硝酸鹽，非aspirin。","C":"正解。aspirin抗血小板、抑制凝集以避免血栓形成。","D":"溶解既有血栓是血栓溶解劑作用；aspirin僅抑制血小板，不溶栓。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"108110-N3-24":{"quick":"限鈉飲食的目的是「減少水分滯留→降低循環血量→減輕心臟工作負荷」(預防而非直接利尿/消水腫)。","detail":{"background":"心臟疾病採限鈉飲食的原理：鈉會吸附水分，鈉攝取過多使體液滯留、循環血量(前負荷)增加、加重心臟工作與肺鬱血；限鈉可減少水分滯留、降低循環血量與心臟負荷，是「預防」體液過量的飲食策略。它本身並不會「直接利尿、移除已有水腫」(那需利尿劑)，也非用以提高心臟收縮效能。正確理解是「避免水分滯留以減少心臟工作負荷」。　深入補充：限鈉減少水分滯留、降低循環血量與心臟前負荷，是預防策略而非利尿。心肌梗塞合併心衰竭者更須限鈉限水並監測每日體重與I/O。處理現存水腫需利尿劑。","options":{"A":"限鈉是預防，不會主動「改善現存水腫並提高心臟效能」。","B":"血壓升高機轉與水腫表述不精確；限鈉重點在減少體液負荷。","C":"正解。限鈉避免水分滯留→降低循環血量→減少心臟工作負荷。","D":"限鈉非利尿劑，不會「產生利尿效果」減少血量。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"109030-N3-27":{"quick":"運動時「不可摒(閉)住呼吸」(會Valsalva升高心臟負荷)；其餘暖身、餐後勿立即運動、目標心率原則皆正確。","detail":{"background":"心臟復健運動原則：①運動前暖身5~10分鐘、運動後緩和；②全程「正常呼吸、不可閉氣」，閉氣用力(Valsalva)會使胸內壓上升、血壓與後負荷驟變、心肌耗氧增加，誘發心律不整；③用餐後不宜立即運動(血液集中腸胃、心臟負荷增加)，宜餐後休息1~2小時；④運動強度以最大心率(220-年齡)×一定百分比為原則並監測自覺費力程度。故「為達最大效果可摒住呼吸」是錯誤的。　深入補充：運動中閉氣(Valsalva)使胸內壓上升、靜脈回流與血壓劇變、後負荷與心肌耗氧增加，恐誘發心律不整，故全程須正常呼吸。餐後血液集中腸胃，宜餐後休息1~2小時再運動。暖身與緩和各5~10分鐘。","options":{"A":"運動前暖身5~10分鐘，正確。","B":"錯誤(正解)。摒住呼吸(Valsalva)升高心臟負荷，運動中應正常呼吸不可閉氣。","C":"用餐後不宜立刻運動，正確。","D":"以最大心率×百分比設定運動強度，是合理原則。"},"sources":["新文京《內外科護理學》心臟復健","華杏《內外科護理學》心臟血管系統","AACVPR 心臟復健指引"]}},"110030-N3-31":{"quick":"急性MI診斷「最具專一性」的是心肌旋轉蛋白I(cardiac troponin I)。","detail":{"background":"診斷急性心肌梗塞的標記中，「心肌旋轉蛋白(cardiac troponin I/T)」對心肌損傷的敏感度與特異度最高，是現行黃金標準；肌紅素(myoglobin)雖最早上升但缺乏特異性(骨骼肌損傷也會升)；鉈-201掃描是評估心肌灌注/缺血的影像檢查，非急性壞死的生化標記；心電圖(ST/Q波)雖快速且重要，但敏感度與特異度不如troponin(部分MI心電圖正常)。故最具專一性者為cardiac troponin I。　深入補充：心肌旋轉蛋白(troponin I/T)對心肌損傷特異度最高，是診斷急性心肌梗塞的黃金標準；高敏感troponin可更早偵測並用連續檢測(0/1或0/3小時)判讀變化趨勢。心電圖與troponin並用提升診斷準確度。","options":{"A":"正解。心肌旋轉蛋白I對心肌損傷特異度最高，是診斷MI的黃金標準。","B":"鉈-201掃描評估灌注/缺血，非急性壞死之專一生化標記。","C":"肌紅素最早上升但無心肌特異性(骨骼肌損傷也升)。","D":"心電圖重要但特異度/敏感度不如troponin。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"110110-N3-28":{"quick":"MI病人「不應教導等長運動」(Valsalva增加心臟負荷)；半坐臥、給氧、性交前NTG皆正確。","detail":{"background":"心肌梗塞護理重點：①半坐臥減少靜脈回流、促肺擴張，降低心肌耗氧；②給氧增加心肌供氧、緩解缺血；③NTG可在已知會誘發胸痛的活動(含性行為)前預防性含服；④活動採漸進有氧，「禁止等長運動」——等長(用力閉氣)運動引發Valsalva使血壓與後負荷驟升、心肌耗氧增加，恐誘發再梗塞或心律不整，因此「教導等長運動增加活動耐力」是錯誤的。　深入補充：心肌梗塞護理核心是「降低心肌耗氧、維持供氧、預防併發症」：半坐臥、供氧、止痛、限鈉、避免Valsalva與等長運動、連續心電圖監測心律。NTG可在誘發活動(含性行為)前預防性含服。","options":{"A":"半坐臥減少心肌耗氧，正確。","B":"錯誤(正解)。等長運動Valsalva增加心臟負荷，MI病人應避免，不可用來增加耐力。","C":"供氧增加心肌供氧量，正確。","D":"性交前服NTG預防胸痛，是適當衛教。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"111030-N3-26":{"quick":"心臟復健活動初期心率「不宜以最大心率80%」為原則(偏高)；應採較保守強度並漸進。","detail":{"background":"心臟復健活動注意事項：①漸進性增加強度(由低而高)；②活動時心率增加以「不超過休息時20次/分(約20%)」為原則，初期強度保守，不應一開始就要求達最大心率的80%(過高、風險大)；③活動後收縮壓上升以不超過正常值25 mmHg為原則；④出現胸悶胸痛、眩暈盜汗、心律不整、過度疲倦即停止。本題問錯誤，B「初期以最大心跳80%為原則」過高、不正確。　深入補充：心臟復健活動採漸進原則，初期強度保守(約最大心率60~75%)，心率增加不超過休息時20次/分、血壓升幅&lt;25 mmHg。出現不耐徵象(胸痛、眩暈、心律不整)即停。等長運動因Valsalva升負荷應避免。","options":{"A":"漸進性增加強度，正確。","B":"錯誤(正解)。活動初期不應以最大心率80%為目標(過高)，應採保守強度漸進。","C":"心率增加不超過休息時20次/分，正確。","D":"活動後血壓上升不超過25 mmHg，正確。"},"sources":["新文京《內外科護理學》心臟復健","華杏《內外科護理學》心臟血管系統","AACVPR 心臟復健指引"]}},"111030-N3-34":{"quick":"MI最常見且致死的併發症是「心律不整」(尤其心室顫動)。","detail":{"background":"急性心肌梗塞併發症中，「心律不整」最為常見，發生於絕大多數病人，其中「心室顫動(VF)」是早期猝死的主因(常在發病數小時內)，故MI須持續心電圖監測、備妥去顫器。其他併發症：心因性休克(死亡率高但較少見)、心衰竭/急性肺水腫、心室中隔或乳突肌破裂、心包炎、再梗塞等。雖然心因性休克致死率高，但「最常見且導致死亡」的是心律不整(VF)。　深入補充：心肌梗塞早期(數小時內)最常見併發症與猝死主因是「心室顫動」，故須連續心電圖監測、備去顫器。其他併發症：心因性休克、心衰竭、乳突肌/心室中隔/游離壁破裂、心包炎、心室壁瘤、再梗塞。","options":{"A":"心因性休克致死率高但發生率較低，非「最常見」。","B":"再梗塞並非MI最常見的致死併發症。","C":"正解。心律不整(尤其心室顫動)最常見且為早期猝死主因。","D":"急性肺水腫常見但「最常見致死」是心律不整。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"112030-N3-26":{"quick":"心電圖出現「Q波代表心肌壞死(透壁性)」而非「表層受損」；故C敘述錯誤。","detail":{"background":"MI診斷檢查：①CPK(CK)升高代表組織損傷(但總CK特異度低，須看CK-MB)；②Troponin I對心肌受損具高特異性與敏感性，是黃金標準；③心電圖「病理性Q波」代表心肌「壞死(常為透壁/全層)」，不是「表層受損」——若僅內膜下(非透壁)缺血多呈ST下降/T倒置而無Q波；ST段與T波改變可協助判斷缺血、損傷或壞死的層次與時序。本題C「Q波表示受損在表層」與病理相反(Q波代表深層/透壁壞死)，為錯誤敘述。　深入補充：心電圖Q波代表透壁(全層)壞死；非透壁(內膜下)缺血多呈ST下降/T倒置而無Q波。CK升高代表組織損傷但需看CK-MB特異性；troponin特異敏感度最高。ST/T動態變化可判讀缺血、損傷與壞死的時序與層次。","options":{"A":"CPK升高表示組織損傷，正確。","B":"Troponin I對心肌受損具特異性與敏感性，正確。","C":"錯誤(正解)。Q波代表心肌「壞死(透壁)」，非表層受損。","D":"ST段與T波變化可協助判斷缺血/缺氧/壞死，正確。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"112110-N3-27":{"quick":"第一期心臟復健活動心率增加「不超過休息時25%(約20次/分)」；說「至少要超過25%」是錯誤。","detail":{"background":"第一期(住院期)心臟復健原則：①以代謝當量(MET)作為活動量指引、漸進增加；②活動時血壓上升不超過正常值25 mmHg；③活動時心率增加以「不超過」休息時的約20~25%(或+20次/分)為「上限」，重點在「不可過度」。本題D把它寫成「活動時增加心跳速率至少要超過休息時的25%」，將安全上限誤寫成下限目標，方向相反，為錯誤敘述。　深入補充：第一期心臟復健以MET量化、漸進增加活動量；安全上限為「心率增加不超過休息時約20~25%、血壓升幅不超過正常值25 mmHg」。重點是「不可過度」，題目常把上限誤寫成「至少要超過」考驗判讀。","options":{"A":"以MET作為活動量指引，正確。","B":"採漸進方式增加活動量，正確。","C":"活動後血壓上升不超過正常值25 mmHg，正確。","D":"錯誤(正解)。心率增加應「不超過」休息時約20~25%(上限)，非「至少要超過25%」。"},"sources":["新文京《內外科護理學》心臟復健","華杏《內外科護理學》心臟血管系統","AACVPR 心臟復健指引"]}},"112110-N3-28":{"quick":"MI急性期處置正確為②嗎啡止痛、③血栓溶解劑、④抗凝血劑(選234)；①高流量10L鼻套管與⑤維生素K不適當。","detail":{"background":"急性心肌梗塞急性期處置(以再灌流與減少心肌耗氧為核心)：②給予麻醉性止痛劑(morphine)止痛、降交感與前負荷；③對ST上升型(STEMI)於時間窗內給「血栓溶解劑」溶解冠脈血栓(或PCI)；④給「抗凝血劑(heparin)」抗凝防血栓延伸。①給氧應採「適度低流量(如鼻導管2~6 L/min，維持SpO2)」，不需也不宜常規以鼻套管10 L/min高流量(過高氧對心肌反而不利、且鼻套管不適合給高流量)；⑤維生素K是逆轉warfarin抗凝的拮抗劑，與MI需「抗凝/溶栓」方向相反，不應給。故正解為234。　深入補充：急性心肌梗塞處置以再灌流(STEMI時限內溶栓或PCI)、抗血小板(aspirin)、抗凝(heparin)、止痛(morphine)、降耗氧(β阻斷劑、硝酸鹽)為核心。給氧採適度低流量維持SpO₂；維生素K會逆轉抗凝、方向相反不可給。","options":{"A":"含①(鼻套管10L過高)，不正確。","B":"含①與⑤(維生素K逆轉抗凝)，不正確。","C":"正解。②嗎啡止痛＋③血栓溶解劑＋④抗凝血劑，符合急性期再灌流原則。","D":"含⑤維生素K(抗凝拮抗，方向相反)，不正確。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"113030-N3-17":{"quick":"MI後性生活衛教：②能量約等於上下兩層樓、⑤在熟悉環境與固定伴侶、⑥室溫適中(選256)；不需完全避免、飽餐/酒後與事後常規NTG皆不當。","detail":{"background":"MI後恢復性生活的衛教：①不必「完全避免」，待病情穩定、能耐受約3~5 MET活動(相當於走上下兩層樓而無不適)即可逐步恢復；②性行為能量消耗約與「上下兩層樓」相當(約3~5 MET)；③避免「飽餐後或飲酒後」進行(會增加心臟負荷)；④NTG是在性行為「之前」預防性使用(若易誘發心絞痛)，而非「事後」；⑤宜在熟悉、放鬆的環境與固定伴侶進行，避免緊張刺激；⑥室溫勿過冷過熱(極端溫度增加心臟負荷)。故正確組合為256。　深入補充：心肌梗塞後恢復性生活須病情穩定、能耐受約3~5 MET活動(走上下兩層樓無不適)。避免飽餐後、飲酒後、極端溫度與陌生緊張情境；NTG於行為「前」預防性使用。心理層面常見焦慮與性功能疑慮，需衛教與支持。","options":{"A":"含①(應避免)與③(飽餐酒後不宜)，不正確。","B":"含①與④(NTG應事前非事後)，不正確。","C":"正解。②能量約上下兩層樓、⑤熟悉環境固定伴侶、⑥室溫適中。","D":"含③(飽餐酒後不宜)與④(NTG事前用)，不正確。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"113180-N3-17":{"quick":"Troponin I 15.0 ng/mL大幅升高＝心肌細胞受損；此例K+3.0為「低血鉀」而非高血鉀，故D錯、B對。","detail":{"background":"判讀此MI檢驗：①LDH1/LDH2>1(翻轉)代表心肌損傷(LDH1富含於心肌)，故「>1表示無受損」是錯的；②CK-MB 460 U/L遠高於正常(<25 U/L)，代表心肌明顯受損，「正常表示未受損」前提不成立；③Troponin I 15.0 ng/mL遠超過正常(<0.04 ng/mL)，明確代表心肌細胞壞死/受損(B正確)；④K+ 3.0 mEq/L是「低血鉀(hypokalemia)」而非高血鉀，低血鉀會使再極化異常、出現U波、增加心律不整與毛地黃中毒風險，D把它說成「高血鉀」判讀錯誤。故正解B。　深入補充：判讀心肌標記時須同時看電解質——本例K⁺ 3.0為「低血鉀」，會造成T波平坦、U波、心律不整，並增強毛地黃毒性。低血鉀為心肌梗塞病人常見且須矯正的問題(目標血鉀4.0~4.5 mmol/L)。","options":{"A":"LDH1/LDH2>1是翻轉、代表心肌受損，「表示無受損」錯誤。","B":"正解。Troponin I 15.0 ng/mL遠高於正常，明確代表心肌細胞受損。","C":"CK-MB 460 U/L遠高於正常、非在正常範圍，前提錯誤。","D":"K+ 3.0為「低血鉀」非高血鉀，敘述判讀錯誤。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"114030-N3-16":{"quick":"判斷活動耐力不足而停止的依據是心率/血壓變化超過20、出現胸悶胸痛眩暈盜汗等；「體溫>37°C」不是判斷依據。","detail":{"background":"心臟復健活動中應「停止」的不耐徵象：①心跳上升或下降超過20次/分鐘以上、或出現心律不整；②血壓上升或下降超過20 mmHg以上(或收縮壓不升反降)；③主觀症狀：胸悶、胸痛、眩暈、盜汗、臉色蒼白、虛弱、極度疲倦、呼吸困難。這些反映心臟無法負荷當前活動量。「體溫>37°C」屬一般生理波動、與運動耐受度判斷無直接關係，不是停止活動的依據。故C不是判斷依據。　深入補充：心臟復健活動中止指標——心率變化&gt;20次/分或心律不整、血壓變化&gt;20 mmHg(或收縮壓不升反降)、胸悶胸痛、眩暈、盜汗、臉色蒼白、極度疲倦或呼吸困難。體溫輕微波動非中止依據。","options":{"A":"心律不整或心率變化>20次/分是停止依據。","B":"血壓變化>20 mmHg是停止依據。","C":"正解(非依據)。體溫>37°C非活動耐力不足的判斷依據。","D":"胸悶胸痛眩暈盜汗虛弱疲倦是停止活動依據。"},"sources":["新文京《內外科護理學》心臟復健","華杏《內外科護理學》心臟血管系統","AACVPR 心臟復健指引"]}},"114100-N3-17":{"quick":"心臟復健應依「代謝當量(MET)」選活動、鼓勵「有氧運動」增心肺耐力(選23)；依BMR與等長運動皆不當。","detail":{"background":"心臟復健活動選擇原則：②以「代謝當量(MET)」量化並選擇活動強度(非以基礎代謝率BMR)；③鼓勵「有氧運動(走路、踏車、游泳)」以增進心肺耐力與循環，是復健核心；④應「避免等長(isometric)運動(舉重、用力閉氣)」，因Valsalva升高血壓與後負荷、增加心肌耗氧，不利心臟病人，故「為加強肌力鼓勵等長運動」不當。①以BMR選活動內容並非復健標準(BMR是靜息代謝率，非活動強度指標)。故正確為23。　深入補充：心臟復健以代謝當量(MET)選擇活動強度、鼓勵有氧運動增進心肺耐力，並避免等長(isometric)運動(Valsalva升負荷)。基礎代謝率(BMR)是靜息代謝，非活動強度指標。運動處方含頻率、強度、時間、型態(FITT)。","options":{"A":"含①(應用MET非BMR)，不正確。","B":"含①與④(等長運動不宜)，不正確。","C":"正解。②依MET選活動、③鼓勵有氧運動增心肺耐力。","D":"含④(鼓勵等長運動)，不正確。"},"sources":["新文京《內外科護理學》心臟復健","華杏《內外科護理學》心臟血管系統","AACVPR 心臟復健指引"]}},"114170-N3-34":{"quick":"MI急性期：ST上升型(STEMI)應於「症狀發作12小時內」給血栓溶解劑(或PCI)再灌流。","detail":{"background":"急性心肌梗塞急性期處置要點：①heparin(肝素)抗凝監測「aPTT」而非PT(PT/INR是warfarin)；②急性劇烈胸痛應以「嗎啡(morphine)」止痛，aspirin是抗血小板、非鎮痛劑；③MI病人採「半坐臥(非平躺)」以減少靜脈回流、降低心臟負荷；④「ST段上升型(STEMI)」在症狀發作後愈早再灌流愈好，黃金時間約「12小時內」給予血栓溶解劑或行緊急PCI，可挽救心肌、降低死亡率。故最適當為D。　深入補充：STEMI再灌流首選緊急PCI(到院90分鐘內)，無法及時PCI時於症狀發作12小時內給血栓溶解劑。heparin監測aPTT(非PT)；急性疼痛用morphine(非aspirin止痛)；體位採半坐臥降前負荷。","options":{"A":"heparin監測aPTT，非PT，敘述錯誤。","B":"急性疼痛應用嗎啡止痛；aspirin是抗血小板非止痛，敘述不當。","C":"MI採半坐臥降負荷，平躺反增前負荷，不當。","D":"正解。STEMI於症狀發作12小時內給血栓溶解劑(或PCI)再灌流。"},"sources":["新文京《內外科護理學》冠狀動脈疾病/心肌梗塞","華杏《內外科護理學》心臟血管系統","2023 ESC 急性冠心症(ACS)指引","Harrison 內科學 急性心肌梗塞"]}},"101030-N3-24":{"quick":"毛地黃中毒最早最常見的是「腸胃道症狀(噁心、嘔吐、厭食)」；視覺異常為黃綠視覺(非紅色)、心律多為過慢。","detail":{"background":"毛地黃(digoxin)為強心配醣體，治療指數窄，中毒症狀分三類：①腸胃道(最早出現)——厭食、噁心、嘔吐、腹瀉；②視覺——黃綠色視覺、視物有光暈(yellow-green halos)、視力模糊；③心臟——各種心律不整，典型為「心搏過慢、房室傳導阻滯」(因增強迷走張力)，亦可致室性早期收縮。誘發因子：低血鉀(最重要)、低血鎂、高血鈣、腎功能不全(排除減少)、老年。本題選項中唯一正確的中毒徵象是「噁心、嘔吐」。　深入補充：毛地黃治療指數窄(治療血中濃度約0.5~2.0 ng/mL)，中毒時可測血中濃度輔助判斷。嚴重中毒(致命性心律不整、高血鉀)可用毛地黃專一抗體(digoxin-specific Fab)解毒。給藥前須評估腎功能與血鉀。","options":{"A":"嘴角抽動非毛地黃中毒表現。","B":"正解。噁心、嘔吐(腸胃道症狀)是毛地黃中毒最早最常見的表現。","C":"毛地黃中毒多為心搏「過慢」與傳導阻滯，非過速。","D":"視覺異常為黃綠視覺/光暈，非「紅色視覺」。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"101030-N3-26":{"quick":"心衰竭合併端坐呼吸者「抬高下肢30度以上」會增加靜脈回流、加重前負荷與肺鬱血，為錯誤處置。","detail":{"background":"心臟衰竭護理目標是減少心臟負荷與體液過量：①監測攝入排出量(I/O)與每日體重(評估體液平衡)；②低鹽飲食、限水以減少體液滯留與前負荷；③口渴時可口含冰塊或漱口緩解(限水下的處置)；④採半坐臥/高坐臥減少靜脈回流、促肺擴張。對「下肢水腫且端坐呼吸」者，「抬高下肢」雖能減輕局部水腫，卻會使下肢靜脈血大量回流至已衰竭的心臟，增加前負荷、加重肺鬱血與呼吸困難，故不宜抬高過高(>30度)，是錯誤護理。　深入補充：心衰竭護理目標是「減前負荷、減心臟工作、改善氧合」：半坐臥、限鈉限水、監測每日體重(同時段同衣著，1天增加&gt;1 kg須警覺體液滯留)與I/O。端坐呼吸者抬高下肢會增加靜脈回流、加重肺鬱血，故不宜。","options":{"A":"錯誤(正解)。抬高下肢增加靜脈回流、加重前負荷與肺鬱血，端坐呼吸的心衰竭病人不宜。","B":"監測攝入排出量評估體液平衡，正確。","C":"限水下口渴時可口含冰塊緩解，正確。","D":"低鹽飲食減少體液滯留，正確。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"101110-N3-41":{"quick":"心衰竭抬高床頭(半坐臥)使靜脈回流減少→「降低前負荷」，並促肺擴張改善呼吸。","detail":{"background":"心衰竭病人抬高床頭(半坐臥/高坐臥)的主要目的：①藉重力使下肢與內臟血回流減少，降低回到心臟的血量(前負荷)，減輕肺鬱血與呼吸困難；②橫膈下降增加肺擴張、改善換氣。這並非為加速心跳、增加尿量或降低後負荷(後負荷由動脈阻力決定)。故主要目的是降低前負荷。　深入補充：心衰竭採高坐臥(Fowler位)或端坐(雙腳下垂，cardiac chair position)可最大幅減少靜脈回流並改善肺擴張。後負荷由動脈阻力決定，需血管擴張劑(ACEI、hydralazine、nitroprusside)降低。","options":{"A":"抬高床頭非為加速心跳。","B":"增加尿量是利尿劑作用，非體位。","C":"後負荷由動脈阻力/血壓決定，非抬高床頭主要作用。","D":"正解。減少靜脈回流→降低前負荷，減輕肺鬱血與呼吸困難。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"101110-N3-42":{"quick":"降低前負荷的藥物是靜脈擴張劑、利尿劑、硝化甘油(②③⑥)，加上鈣離子阻斷劑(本題鍵為②③⑤⑥)。","detail":{"background":"前負荷＝心室舒張末期容量/靜脈回流量。降低前負荷的方式是「減少靜脈回流或血容量」：②靜脈擴張劑(使靜脈血池化)、⑥硝化甘油(NTG，主要靜脈擴張降前負荷)、③利尿劑(排出水分降低循環血量)；本題答案另納入⑤鈣離子阻斷劑(verapamil/diltiazem降心收縮與心率、減少心臟工作負荷)。相對地，①小動脈擴張劑與⑦高劑量Dopamine作用於「後負荷(動脈阻力)」，④毛地黃是增加「心收縮力」，皆非降前負荷。故正解為②③⑤⑥。　深入補充：心衰竭治療把握「降前負荷(利尿劑、靜脈擴張劑/硝酸鹽)、降後負荷(ACEI/ARB、動脈擴張劑)、增收縮力(毛地黃、正性肌力藥)」三方向。現代慢性心衰指引核心藥物為ACEI/ARNI、β阻斷劑、MRA與SGLT2抑制劑(四大支柱)。","options":{"A":"含①小動脈擴張(後負荷)、④毛地黃(收縮力)，非降前負荷。","B":"含①與⑦(影響後負荷)，不符。","C":"正解。②靜脈擴張劑、③利尿劑、⑤鈣離子阻斷劑、⑥硝化甘油可降低前負荷。","D":"含⑦高劑量Dopamine(血管收縮升後負荷)，不符。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"102030-N3-27":{"quick":"Dobutamine是β1致效的兒茶酚胺類強心劑，主要用於「左心室功能不全/低心輸出」；說「治療右心室功能不全」較不準確，為本題錯誤敘述。","detail":{"background":"Dobutamine屬合成兒茶酚胺類，選擇性興奮心臟β1受體，產生正性肌力(增加心肌收縮力)、增加心輸出量，並促進房室傳導，臨床主要用於「左心室收縮功能不全、低心輸出/心因性休克(泵衰竭)」的短期支持。本題四選項中，B(兒茶酚胺類)、C(增加收縮力)、D(增加房室傳導)皆為其正確藥理特性；而「治療右心室功能不全」並非其主要適應症定位(主要為左心室泵衰竭)，故為本題錯誤敘述。　深入補充：Dobutamine半衰期短(數分鐘)須持續靜脈滴注、以輸液幫浦控制速率，並監測心電圖(可能心搏過速、心律不整)與血壓。多用於急性失代償性心衰竭/低心輸出狀態的短期支持，非長期用藥。","options":{"A":"錯誤(正解)。Dobutamine主要用於左心室功能不全/低心輸出，非定位於治療右心室功能不全。","B":"Dobutamine屬兒茶酚胺類藥物，正確。","C":"興奮β1增加心肌收縮力，正確。","D":"增加房室傳導，正確。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"102030-N3-34":{"quick":"「高血鉀」不會誘發毛地黃中毒(反而拮抗其作用)；誘發中毒的是低血鉀、低血鎂、高血鈣、腎功能不全。","detail":{"background":"毛地黃中毒的誘發因子：①「低血鉀(最重要)」——鉀與毛地黃競爭Na-K幫浦結合位，低血鉀時毛地黃結合增加、毒性上升(常見於合併使用排鉀利尿劑thiazide/loop)；②低血鎂；③高血鈣(鈣協同增強毛地黃的心臟作用，增加心律不整風險)；④腎功能不全(毛地黃由腎排除，腎衰使藥物蓄積)；⑤老年、甲狀腺低下。而「高血鉀」會佔據結合位、拮抗毛地黃作用，不會誘發中毒(嚴重高血鉀本身另有心臟危險，但非毛地黃中毒誘因)。本題問錯誤者，A高血鉀是錯的。　深入補充：毛地黃由腎排除，腎功能不全、老年、低體重者易蓄積中毒。電解質中「低血鉀、低血鎂、高血鈣」增強毒性。合併排鉀利尿劑(thiazide/loop)時須監測並補鉀。中毒可致各種心律不整(心搏過緩、房室阻滯、室性早搏)。","options":{"A":"錯誤(正解)。高血鉀拮抗毛地黃、不會誘發中毒；誘發的是「低」血鉀。","B":"高血鈣協同增強毛地黃心臟作用，會誘發中毒，正確。","C":"低血鎂會誘發毛地黃中毒，正確。","D":"腎功能不全使毛地黃排除減少、蓄積中毒，正確。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"102110-N3-24":{"quick":"能增加心輸出量的是正性肌力藥：①毛地黃、②dobutamine、③中劑量dopamine(選①②③)；④NTG與⑤鈣阻斷劑不增加心輸出。","detail":{"background":"增加心輸出量(CO)主要靠提升心肌收縮力(正性肌力)：①毛地黃(抑制Na-K幫浦、增加細胞內鈣→增強收縮)、②dobutamine(β1致效增收縮)、③中劑量dopamine(2~10 μg/kg/min作用於β1增收縮與心輸出)。相對地，④硝化甘油是血管擴張劑(降前負荷，不直接增加CO)，⑤鈣離子阻斷劑為「負性肌力」(降低收縮力)反而可能減少CO。故能增加CO者為①②③。　深入補充：正性肌力藥(毛地黃、dobutamine、中劑量dopamine、milrinone)可短期增加心輸出，但會增加心肌耗氧與心律不整風險，長期使用可能增加死亡率，故多用於急性失代償或橋接治療。慢性心衰以四大支柱藥物為主。","options":{"A":"正解。①毛地黃、②dobutamine、③中劑量dopamine皆為正性肌力、增加心輸出量。","B":"含④NTG(降前負荷，不增CO)，不符。","C":"含⑤鈣阻斷劑(負性肌力)，不符。","D":"含④⑤，不符。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"102110-N3-55":{"quick":"左心室衰竭使「左心房壓力上升」(而非降低)，造成肺鬱血；「左心房壓力降低」是錯誤敘述。","detail":{"background":"左心室衰竭：左心室排空不良→左心室與「左心房壓力上升」→肺靜脈與肺微血管壓力上升→肺鬱血/肺水腫，臨床表現為呼吸困難、端坐呼吸、陣發性夜間呼吸困難、咳嗽帶泡沫(可帶血絲)痰、兩側肺底囉音(crackles)、組織灌流不足(疲倦、活動耐受下降)。故「肺充血、囉音、泡沫痰」皆為左心衰竭表現，而「左心房壓力降低」與病理相反(應為上升)，是錯誤敘述。　深入補充：左心衰竭使左心房、肺靜脈與肺微血管壓上升→肺鬱血/肺水腫。診斷可用胸部X光(肺血重新分布、Kerley B線、心臟擴大)、BNP升高、心臟超音波(評估射出率)。射出率下降型(HFrEF)與保留型(HFpEF)治療策略不同。","options":{"A":"肺充血、組織缺血是左心衰竭表現，正確。","B":"咳嗽及帶泡沫痰是肺鬱血表現，正確。","C":"錯誤(正解)。左心衰竭使左心房壓力「上升」，非降低。","D":"兩側肺底囉音/爆裂音是左心衰竭肺鬱血表現，正確。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"103030-N3-28":{"quick":"會增加前負荷的是「吸氣期(胸腔負壓增加靜脈回流)」；失血降前負荷、周邊血管擴張降回流、流出阻力增加是後負荷。","detail":{"background":"前負荷反映心室舒張末期的容積/靜脈回流量。增加前負荷的情況＝增加靜脈回流或血容量：吸氣時胸腔內壓下降(負壓)使靜脈回流右心增加→增加右心前負荷。相對地：①周邊血管擴張使血液滯留周邊、回心血量「減少」→降前負荷；②車禍大量失血使血容量下降→降前負荷；③心室收縮時血液流出的阻力(動脈阻力)增加屬「後負荷」非前負荷。故唯一增加前負荷者為吸氣期。　深入補充：前負荷依Frank-Starling定律影響心搏出量，但過度前負荷(容量過載)會使衰竭心臟更失代償。吸氣時胸內負壓增加靜脈回流；周邊血管擴張、失血、利尿則降低前負荷。後負荷由動脈阻力(血壓、主動脈狹窄)決定。","options":{"A":"周邊血管擴張使血液滯留周邊、回心血量減少，降低前負荷。","B":"失血使血容量下降，降低前負荷。","C":"正解。吸氣期胸腔負壓增加靜脈回流，增加前負荷。","D":"心室流出阻力增加屬「後負荷」，非前負荷。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"103100-N3-30":{"quick":"會增加心臟前負荷(容量負荷)的是「心室中膈缺損(VSD左到右分流→容量過載)」；主動脈瓣狹窄/肺高壓屬後負荷、心包膜炎限制充盈。","detail":{"background":"心衰竭病因依負荷類型：①「前負荷(容量過載)」增加——瓣膜逆流、心內分流(如心室中膈缺損VSD造成左到右分流使肺循環與左心容量過載)、輸液過量；②「後負荷(壓力過載)」增加——主動脈瓣狹窄、體循環高血壓(左心後負荷)、肺高壓(右心後負荷)；③充盈受限——心包膜炎/填塞、限制型心肌病使心室無法充盈(前負荷反而受限)。本題問增加前負荷者，心室中膈缺損(容量過載)正確。　深入補充：心衰竭病因可依負荷分「容量過載(前負荷:瓣膜逆流、心內分流如VSD/ASD、輸液過量)」與「壓力過載(後負荷:主動脈狹窄、高血壓、肺高壓)」，以及心肌本身病變(心肌梗塞、心肌病變)與充盈受限(心包填塞、限制型)。","options":{"A":"主動脈瓣狹窄增加左心室「後負荷(壓力過載)」。","B":"正解。心室中膈缺損造成分流容量過載，增加前負荷。","C":"肺高壓增加右心室「後負荷」。","D":"心包膜炎限制心室充盈，使前負荷受限而非增加。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"103100-N3-42":{"quick":"Lasix(furosemide)衛教重點：每日測體重、評估水腫(監測療效與體液)；它會排鉀(須注意低血鉀)、增加鈣排出，不可長期無監測使用。","detail":{"background":"Furosemide(Lasix)是亨利氏環利尿劑，作用於亨利氏環上升枝抑制Na-K-2Cl共同轉運子，產生強力利尿，臨床用於心衰竭/水腫降低前負荷。護理衛教：①每日固定時間測量體重、記錄I/O與評估水腫，作為利尿療效與體液狀態的指標；②會大量排出鉀(造成低血鉀，增加毛地黃中毒與心律不整風險)，宜採「高鉀飲食」並監測血鉀，必要時補鉀；③環利尿劑「增加鈣排出」(與thiazide增加鈣再吸收相反)；④非無副作用、不可長期未監測使用(低血鉀、低血鈉、脫水、耳毒性)。故正確衛教為「每日測體重及評估水腫」。　深入補充：Furosemide(環利尿劑)作用於亨利氏環上升枝，利尿強且快，副作用含低血鉀、低血鈉、低血鎂、脫水、低血壓、耳毒性(快速大劑量靜脈注射)、增加尿鈣排出。須監測電解質、體重、I/O，並採高鉀飲食或補鉀。","options":{"A":"環利尿劑「增加」鈣排出，非增加鈣再吸收(那是thiazide)，敘述錯誤。","B":"利尿劑有低血鉀、脫水、耳毒性等副作用，需監測，不可長期無監測使用。","C":"應採「高鉀」飲食(補充流失的鉀)，且不宜高鈉，敘述相反。","D":"正解。每日測量體重、評估水腫，是監測利尿療效與體液平衡的重要衛教。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"104100-N3-28":{"quick":"左心衰竭表現是「活動用力時呼吸困難」(肺鬱血)；頸靜脈怒張、下肢水腫、腹水屬右心衰竭。","detail":{"background":"左、右心衰竭的鑑別：①左心衰竭→肺循環鬱血→呼吸困難(尤其活動用力時)、端坐呼吸、陣發性夜間呼吸困難、咳嗽泡沫痰、肺底囉音；②右心衰竭→體循環鬱血→頸靜脈怒張、下肢下垂性水腫、肝脾腫大、腹水、體重增加。本題問左心衰竭表現，「活動用力時呼吸困難」是肺鬱血表現，正確；其餘頸靜脈怒張、嚴重下肢水腫、腹水皆為右心衰竭(體循環鬱血)。　深入補充：左心衰竭(肺鬱血)以「向後(肺循環)」與「向前(心輸出不足→疲倦、活動耐受下降)」表現；右心衰竭以體循環鬱血(水腫、肝腫大、頸靜脈怒張)表現。最常見的右心衰竭原因其實是「左心衰竭」(肺高壓繼發右心受累)。","options":{"A":"頸靜脈怒張屬右心衰竭(體循環鬱血)。","B":"正解。活動用力時呼吸困難是左心衰竭肺鬱血的表現。","C":"嚴重下肢水腫屬右心衰竭。","D":"腹水屬右心衰竭。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"104100-N3-29":{"quick":"毛地黃中毒在生命徵象上的典型變化是「心搏過慢(心尖脈50次/分)」。","detail":{"background":"毛地黃增強迷走神經張力、減慢竇房結放電與房室傳導，中毒時典型出現「心搏過慢、房室傳導阻滯」，故給藥前須測量「心尖脈滿1分鐘」，若<60次/分應暫停給藥並通報。本題四個生命徵象中，體溫37.8、血壓150/96、呼吸22皆非毛地黃中毒特異變化；「心尖脈50次/分(心搏過慢)」才是毛地黃中毒的徵象。　深入補充：毛地黃增強迷走張力、抑制竇房結與房室傳導，中毒典型為「心搏過慢、房室傳導阻滯」，故給藥前測心尖脈滿1分鐘、&lt;60暫停並通報。中毒亦可致室性早搏、雙向性心室頻脈等危險心律。","options":{"A":"體溫37.8°C非毛地黃中毒特異徵象。","B":"血壓150/96非毛地黃中毒典型變化。","C":"呼吸22次/分非毛地黃中毒特異徵象。","D":"正解。心尖脈50次/分(心搏過慢)是毛地黃中毒的典型表現。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"105030-N3-33":{"quick":"下肢水腫、端坐呼吸且「執行任何身體活動皆造成呼吸困難」→NYHA第Ⅳ級。","detail":{"background":"紐約心臟學會(NYHA)功能分級依「症狀與活動限制」分四級：Ⅰ級＝身體活動不受限，一般活動無症狀；Ⅱ級＝輕度受限，一般活動(如快走)會出現症狀，休息時舒適；Ⅲ級＝明顯受限，「低於一般」的活動即出現症狀，但休息時仍舒適；Ⅳ級＝無法從事任何身體活動而不適，休息時也可能有症狀。本題病人「執行任何身體活動皆造成呼吸困難」且合併端坐呼吸、下肢水腫，活動受限最嚴重，屬第Ⅳ級。　深入補充：NYHA功能分級用於描述症狀嚴重度並追蹤治療反應；另有ACC/AHA心衰竭分期(A有風險、B結構異常無症狀、C有症狀、D末期)強調「疾病進展與預防」。Ⅳ級者休息時即有症狀、預後最差。","options":{"A":"Ⅰ級活動不受限，與本題嚴重受限不符。","B":"Ⅱ級僅輕度受限，與「任何活動皆呼吸困難」不符。","C":"Ⅲ級為低於一般活動才出現症狀、休息舒適，較本題輕。","D":"正解。任何身體活動皆呼吸困難屬NYHA第Ⅳ級。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"105030-N3-34":{"quick":"右心衰竭的早期表現是「下垂性(依重力)水腫」(體循環鬱血)。","detail":{"background":"右心衰竭因右心無法將體循環回流的血排入肺循環→體循環靜脈鬱血，早期出現「下垂性水腫(dependent edema，受重力影響，站立時下肢、臥床時薦部)」、頸靜脈怒張、肝腫大、體重增加，後期腹水。端坐呼吸與肺水腫屬「左」心衰竭(肺鬱血)；尿液減少是心輸出下降致腎灌流不足的較後期表現。故右心衰竭早期表現為下垂性水腫。　深入補充：右心衰竭體循環鬱血——下垂性水腫(站立時下肢、臥床時薦部)、頸靜脈怒張、肝腫大壓痛、肝頸反流陽性、腹水、體重增加、食慾不振(腸道鬱血)。右心衰竭最常繼發於左心衰竭，亦見於肺高壓、肺心症。","options":{"A":"端坐呼吸屬左心衰竭(肺鬱血)。","B":"正解。下垂性水腫是右心衰竭體循環鬱血的早期表現。","C":"尿液減少為心輸出下降的較後期表現。","D":"肺水腫屬左心衰竭。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"106030-N3-28":{"quick":"提示急性肺水腫的是「③端坐呼吸＋④帶泡沫的痰」(選D)；心搏過緩與高燒非肺水腫表徵。","detail":{"background":"急性肺水腫是左心衰竭急性惡化、肺微血管壓劇升使液體滲入肺泡，典型表現：嚴重呼吸困難、端坐呼吸、咳出大量「粉紅色泡沫痰」、兩側囉音遍及全肺、臉色蒼白冒冷汗、焦慮、血氧下降、心搏「過速」(代償)。故④帶泡沫的痰與③端坐呼吸是肺水腫的關鍵表徵；①心搏過緩(肺水腫多為心搏過速)與②高燒(非肺水腫特徵)皆不符。正解為③④(D)。　深入補充：急性肺水腫是內科急症，處置記憶法LMNOP：Lasix(利尿)、Morphine(降前負荷)、Nitrates(硝酸鹽)、Oxygen/正壓通氣、Position(高坐臥/雙腳下垂)。咳粉紅泡沫痰、全肺囉音、極度呼吸窘迫是典型表現。","options":{"A":"①②(心搏過緩、高燒)皆非急性肺水腫表徵。","B":"含①心搏過緩(肺水腫多為心搏過速)，不符。","C":"含②高燒(非肺水腫特徵)，不符。","D":"正解。③端坐呼吸＋④帶泡沫痰是急性肺水腫的典型表徵。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"106030-N3-32":{"quick":"Dopamine「低劑量(1~3 μg/kg/min)可增加腎臟血流量」；不應一開始高劑量、中劑量主要增收縮、高劑量才血管收縮。","detail":{"background":"Dopamine呈劑量依賴作用：①低劑量(約1~3 μg/kg/min)→興奮多巴胺受體，擴張腎與內臟血管、增加腎血流與尿量；②中劑量(約3~10)→興奮β1受體，增加心肌收縮力與心輸出量；③高劑量(>10)→興奮α受體，使周邊血管收縮、升高血壓。用藥應由低而高漸進調整、不可一開始即高劑量(易引起心律不整、肢端缺血)。本題正確敘述為「低劑量可增加腎臟血流量」。　深入補充：Dopamine須以中心靜脈或大靜脈給予(外滲可致組織壞死，解毒用phentolamine局部浸潤)，並以輸液幫浦精準控速。低劑量增腎血流的「腎臟保護」效益在實證上有限，現多依血流動力學目標調整劑量。","options":{"A":"應由低劑量漸進調整，不可一開始即用高劑量迅速緩解，敘述不當。","B":"正解。低劑量(1~3 μg/kg/min)擴張腎血管、增加腎血流量。","C":"使血管收縮、血壓上升是「高劑量(>10)」的α作用，非中劑量。","D":"增加心收縮力是「中劑量」β1作用，非高劑量(高劑量為血管收縮)。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"106110-N3-27":{"quick":"毛地黃中毒可出現噁心嘔吐、視力模糊、房室傳導阻滯與心搏過慢；本題官方列為送分。","detail":{"background":"毛地黃(digoxin)中毒症狀包含腸胃道(噁心、嘔吐、厭食)、視覺(黃綠視覺、視力模糊)、心臟(心搏過慢、房室傳導阻滯、各種心律不整)。本題四個選項(噁心嘔吐、視力模糊、房室傳導阻礙、心搏過慢)其實「都是」毛地黃中毒可能出現的症狀，難以單選「最常出現」，故官方公告為「送分(一律給分)」。學習重點：毛地黃中毒以「腸胃道症狀最早出現」、「心律變化(過慢/傳導阻滯)最危險」，給藥前須測心尖脈1分鐘、<60暫停並監測血鉀。　深入補充：毛地黃中毒可測血中濃度(治療範圍約0.5~2.0 ng/mL)輔助診斷，並矯正低血鉀/低血鎂；嚴重者用digoxin-specific Fab抗體。腸胃道症狀最早、視覺(黃綠視覺)具特徵、心律變化(過緩/傳導阻滯)最危險。","options":{"A":"噁心嘔吐是毛地黃中毒(最早)的症狀，正確。","B":"視力模糊/黃綠視覺是毛地黃中毒症狀，正確。","C":"房室傳導阻滯是毛地黃中毒的心臟表現，正確。","D":"官方答案列D(心搏過慢)；惟本題四選項皆為中毒症狀，故送分一律給分。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"106110-N3-77":{"quick":"心衰竭評估中「呼吸音出現囉音(rales)」提示肺鬱血/急性肺水腫，最需密切觀察。","detail":{"background":"心衰竭病人各評估項目的緊急度：①「肺部囉音(rales/crackles)」代表肺微血管液體滲出、肺鬱血甚或急性肺水腫，是病情惡化、可能危及生命的警訊，須最密切觀察並及時處置；②下肢水腫反映慢性體液過量，較不緊急；③血壓146/88僅輕度偏高，非立即危險；④微血管再充填<3秒屬正常末梢灌流。故最需密切觀察的是肺部囉音。　深入補充：心衰竭惡化警訊(須密切觀察與及時通報)：肺部囉音增加、呼吸困難加重、端坐呼吸、咳泡沫痰、血氧下降、體重短期快速增加、頸靜脈怒張、尿量減少、意識改變。肺囉音反映急性肺鬱血，最具立即危險性。","options":{"A":"下肢水腫反映慢性體液過量，相對不緊急。","B":"正解。肺部囉音提示肺鬱血/肺水腫，是病情惡化警訊，最需密切觀察。","C":"血壓146/88僅輕度偏高，非立即危險。","D":"微血管再充填<3秒為正常末梢灌流，不需特別擔心。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"106111-N3-25":{"quick":"腎臟疾病者因毛地黃排除減少而為中毒高危險群(A正確)；T波升高是高血鉀而非低血鉀。","detail":{"background":"毛地黃使用注意事項：①毛地黃主要由腎臟排除，「腎功能不全者」藥物易蓄積，是中毒高危險群(A正確)；②給藥前應測量「心尖脈滿1分鐘」，心尖脈<60次/分應暫停給藥並通報；③低血鉀會增強毛地黃毒性，須監測血鉀並注意合併利尿劑者；④低血鉀的心電圖表現為「T波變平坦、出現U波、ST下降」，而「T波升高(高聳)」是高血鉀的表現，故D敘述把「T波升高表示低血鉀」是錯的。本題以A為最明確正確敘述。　深入補充：毛地黃給藥前必測「心尖脈」滿1分鐘(評估心律與速率比橈動脈準確)，&lt;60(成人)或依醫囑下限應暫停並通報。腎功能不全、低血鉀、老年是中毒高危。低血鉀心電圖為T波平坦、U波、ST下降(非T波升高)。","options":{"A":"正解。腎臟疾病者毛地黃排除減少、易蓄積中毒，屬高危險群。","B":"測量脈搏應強調「心尖脈」滿1分鐘，本敘述不夠精確(非本題最佳答案)。","C":"應為「心尖脈」<60暫停給藥；以橈動脈脈搏判斷不夠精確(非本題最佳答案)。","D":"錯誤。T波升高(高聳)是高血鉀表現；低血鉀為T波平坦、U波，敘述顛倒。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"106111-N3-26":{"quick":"左心室衰竭「早期常見」的是咳嗽(肺鬱血刺激)；頸靜脈怒張屬右心衰，端坐呼吸/陣發性夜間呼吸困難為較進展的表現。","detail":{"background":"左心室衰竭因肺循環鬱血，最早出現的常是「活動性呼吸困難與乾咳/咳嗽」(肺間質與支氣管黏膜鬱血刺激咳嗽反射)，隨病程進展才出現端坐呼吸、陣發性夜間呼吸困難(PND)、咳泡沫痰、肺水腫。頸靜脈怒張屬「右」心衰竭(體循環鬱血)。本題問左心室衰竭「早期」症狀，咳嗽最符合。　深入補充：左心衰竭最早常以「活動性呼吸困難與乾咳」表現(肺間質鬱血刺激)，隨進展出現端坐呼吸、陣發性夜間呼吸困難、咳泡沫痰、肺水腫。頸靜脈怒張、下肢水腫屬右心衰竭(體循環鬱血)。","options":{"A":"正解。咳嗽(肺鬱血刺激)是左心室衰竭早期常見症狀。","B":"頸靜脈怒張屬右心衰竭。","C":"端坐呼吸是較進展的左心衰竭表現，非最早期。","D":"陣發性夜間呼吸困難屬較進展期表現。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"107110-N3-32":{"quick":"心臟衰竭(右心/體循環鬱血)會使「肝頸反流(hepatojugular reflux)」呈陽性。","detail":{"background":"肝頸反流試驗：壓迫右上腹肝臟區10~30秒，正常人頸靜脈僅短暫上升即回落；若「右心衰竭/體循環靜脈鬱血」，壓肝時回心血量增加而右心無法代償，頸靜脈持續怒張(陽性)，反映右心充盈壓升高與體液過量。墨菲氏徵象(Murphy sign)用於膽囊炎；逆流填充測驗評估下肢靜脈瓣；霍曼氏徵象(Homan sign)用於深部靜脈栓塞。故心衰竭會有陽性的是肝頸反流。　深入補充：肝頸反流(壓肝時頸靜脈持續怒張)反映右心無法代償增加的回心血量，是右心衰竭/體液過量的徵象。墨菲徵象(膽囊炎)、霍曼徵象(DVT)、逆流填充測驗(靜脈瓣)各評估不同問題，須區辨。","options":{"A":"墨菲氏徵象用於膽囊炎，與心衰竭無關。","B":"正解。心衰竭(右心鬱血)使肝頸反流呈陽性。","C":"逆流填充測驗評估下肢靜脈瓣功能(靜脈疾病)。","D":"霍曼氏徵象用於深部靜脈栓塞評估。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"107110-N3-33":{"quick":"能降低心衰竭「後負荷」的是依醫囑給予嗎啡(擴張血管降前後負荷)；限鈉、高坐臥主要降前負荷，I/O是監測。","detail":{"background":"後負荷＝心室射血時所需克服的動脈阻力。降低後負荷須用「血管擴張(尤其動脈)」的方式。本題選項中：限制鈉攝取與採高坐臥姿主要是「降前負荷(減少體液/靜脈回流)」；監測I/O、體重、水腫屬「評估」；而嗎啡(morphine)除止痛、降焦慮外，可同時擴張靜脈與小動脈，降低「前負荷與後負荷」，減輕心臟工作並緩解肺水腫，故為能降低後負荷的措施。　深入補充：降後負荷的血管擴張劑(ACEI/ARB、hydralazine、nitroprusside、嗎啡的小動脈擴張)可減少心室射血阻力、增加心輸出，是心衰竭治療要角。限鈉、高坐臥主要降前負荷；ACEI/ARB同時改善預後。","options":{"A":"限鈉主要減少體液、降「前負荷」，非後負荷。","B":"高坐臥減少靜脈回流、降「前負荷」。","C":"監測I/O、體重、水腫屬評估，非降後負荷之措施。","D":"正解。嗎啡擴張血管可同時降低前、後負荷，減輕心臟負荷。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"108020-N3-26":{"quick":"毛地黃與「Thiazide利尿劑」並用會因低血鉀而「增加」毛地黃中毒，並非避免；故B錯誤。","detail":{"background":"心衰竭臨床處置：①IABP增加舒張期冠狀動脈灌流、降低後負荷，改善心臟氧供需；③低鹽飲食減少體液滯留、降前負荷；④Dobutamine增加心肌收縮力、提升心輸出量。而②「毛地黃與thiazide併用可避免中毒」是錯的——thiazide(及loop)利尿劑會排鉀造成「低血鉀」，低血鉀反而「增強毛地黃毒性、增加中毒風險」，故併用時須監測血鉀並補鉀，而非可避免中毒。本題問錯誤者為B。　深入補充：IABP舒張期充氣增加冠脈灌流、收縮期放氣降後負荷，用於心因性休克、高危PCI、心臟手術橋接。毛地黃與排鉀利尿劑(thiazide/loop)併用會因低血鉀「增加」中毒風險，須監測血鉀並補鉀。","options":{"A":"IABP增加冠狀動脈血流且減少後負荷，正確。","B":"錯誤(正解)。thiazide排鉀致低血鉀，反而「增加」毛地黃中毒風險，非避免。","C":"低鹽飲食減少體液、降前負荷，正確。","D":"Dobutamine增加收縮力、提高心輸出量，正確。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"108020-N3-30":{"quick":"毛地黃中毒症狀為①腹瀉、③噁心嘔吐、④黃色視覺(選A 134)；便祕、紅色視覺、心跳變快非典型。","detail":{"background":"毛地黃中毒症狀：腸胃道——厭食、噁心、嘔吐、「腹瀉」(非便祕)；視覺——「黃綠/黃色視覺」、光暈、視力模糊(非紅色視覺)；心臟——心搏「過慢」、房室傳導阻滯(非心跳變快)。故①腹瀉、③噁心嘔吐、④黃色視覺正確，②便祕、⑤紅色視覺、⑥心跳變快錯誤，正解為①③④(A)。　深入補充：毛地黃中毒症狀記憶——腸胃道(厭食、噁心嘔吐、腹瀉)、視覺(黃綠視覺、光暈、視力模糊)、神經(頭痛、倦怠、混亂)、心臟(心搏過緩、房室阻滯、室性心律不整)。誘因為低血鉀/鎂、高血鈣、腎功能不全。","options":{"A":"正解。①腹瀉、③噁心嘔吐、④黃色視覺皆為毛地黃中毒症狀。","B":"含⑤紅色視覺、⑥心跳變快(應為過慢)，錯誤。","C":"含②便祕(應為腹瀉)、⑤紅色視覺，錯誤。","D":"含②便祕、⑥心跳變快，錯誤。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"108110-N3-26":{"quick":"日常生活需他人協助、「休息時仍呼吸喘、夜間因呼吸不順無法入睡」→NYHA第Ⅳ級。","detail":{"background":"NYHA分級重點在「休息時是否有症狀」：第Ⅳ級＝休息時即有症狀、無法從事任何身體活動而不適。本題王太太「日常生活活動需家人幫忙、休息時仍感呼吸喘、夜間因呼吸不順(端坐呼吸/PND)無法入睡」，顯示休息狀態下即有明顯症狀、活動能力極度受限，屬第Ⅳ級。(對比：Ⅲ級為低於一般活動才有症狀、休息時舒適。)　深入補充：NYHA第Ⅳ級＝休息時即有症狀、無法從事任何活動而不適，預後最差。評估時關鍵問「休息時是否有症狀」區分Ⅲ(休息舒適)與Ⅳ(休息仍喘)。夜間因呼吸不順無法平躺入睡(端坐呼吸)是嚴重肺鬱血表現。","options":{"A":"第Ⅰ級活動不受限，與本題嚴重受限不符。","B":"第Ⅱ級僅輕度受限，不符。","C":"第Ⅲ級休息時舒適，但本題休息仍喘，更嚴重。","D":"正解。休息時仍呼吸喘、夜間無法入睡屬NYHA第Ⅳ級。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"108110-N3-27":{"quick":"射出率僅12%、端坐呼吸且雙下肢嚴重水腫者，「抬高雙腳30度以上」會增加靜脈回流加重心臟負荷，最不適當。","detail":{"background":"嚴重收縮性心衰竭(EF 12%)合併端坐呼吸與下肢水腫者，護理重點是「減少心臟負荷與體液過量」：採半坐臥維持呼吸順暢、限水限鹽、監測體重與I/O。「抬高雙腳30度以上」雖可暫時減輕下肢水腫，卻會使大量下肢靜脈血回流到極度衰竭的左心，增加前負荷、加重肺鬱血與端坐呼吸，對EF僅12%的病人尤其危險，故最不適當。　深入補充：射出率(EF)正常約55~70%，EF 12%屬嚴重收縮功能不全(HFrEF)。護理以減少前負荷與心臟工作為主(半坐臥、限水限鈉、監測體重I/O)。抬高雙腳會增加靜脈回流，對極度衰竭的心臟危險，是常見陷阱題。","options":{"A":"半坐臥維持呼吸順暢、減少靜脈回流，適當。","B":"限水限鹽減少體液負荷，適當。","C":"最不適當(正解)。抬高雙腳增加靜脈回流、加重前負荷與肺鬱血，對EF 12%者危險。","D":"監測體重與I/O評估體液平衡，適當。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"109030-N3-26":{"quick":"Dopamine 6 μg/kg/min屬中劑量，主要作用β1受體「增加心肌收縮力」。","detail":{"background":"Dopamine 6 μg/kg/min落在「中劑量(約3~10 μg/kg/min)」範圍，主要興奮心臟β1受體，產生正性肌力(增加心肌收縮力與心輸出量)，用於心衰竭/心因性休克支持心輸出。低劑量(1~3)才以多巴胺受體增加腎血流；高劑量(>10)才以α受體使周邊血管收縮升壓。故6 μg/kg/min的主要目的是增加心肌收縮力。　深入補充：Dopamine劑量依賴——低(1~3 μg/kg/min)多巴胺受體增腎血流、中(3~10)β1增收縮與心輸出、高(&gt;10)α血管收縮升壓。6 μg/kg/min屬中劑量，主作用增加心肌收縮力。須以幫浦精準控速、監測心律。","options":{"A":"增加腎血流量是「低劑量(1~3)」作用。","B":"促進周邊血管收縮是「高劑量(>10)」的α作用。","C":"正解。6 μg/kg/min(中劑量)主要β1作用，增加心肌收縮力。","D":"中劑量增加腎與心臟灌流，並非降低腎絲球過濾率。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"109110-N3-30":{"quick":"心衰竭出現臉色蒼白、冷汗、陣發性夜間呼吸困難、咳大量「帶血絲泡沫痰」＝急性肺水腫。","detail":{"background":"急性肺水腫是左心衰竭急性惡化，肺微血管壓劇升、液體滲入肺泡：突發嚴重呼吸困難、端坐呼吸、陣發性夜間呼吸困難、咳出大量「粉紅色(帶血絲)泡沫痰」、兩側囉音、臉色蒼白冒冷汗、焦慮瀕死感、血氧下降。本題曾先生的表現(冷汗蒼白、PND、大量帶血絲泡沫痰)正是急性肺水腫的典型合併症。氣喘為喘鳴與呼氣延長、肺結核為慢性咳嗽咳血盜汗、肺栓塞為突發胸痛呼吸困難，皆與此圖像不同。　深入補充：急性肺水腫須與氣喘(喘鳴、呼氣延長)、肺栓塞(突發胸痛、低血氧、D-dimer升)、肺炎(發燒、膿痰、浸潤)鑑別。心因性肺水腫特徵為粉紅泡沫痰、端坐呼吸、兩側囉音、第三心音、BNP升高。","options":{"A":"氣喘以喘鳴、呼氣延長為主，無大量泡沫血絲痰。","B":"肺結核為慢性咳嗽、咳血、夜間盜汗，病程不同。","C":"肺栓塞為突發胸痛、呼吸困難、低血氧，無大量泡沫痰之典型。","D":"正解。冷汗蒼白、PND、大量帶血絲泡沫痰＝急性肺水腫。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"109110-N3-34":{"quick":"心電圖出現明顯「U波」提示低血鉀，低血鉀會增強「毛地黃製劑」毒性，須警覺中毒。","detail":{"background":"低血鉀的心電圖變化：T波變平坦、ST段下降、出現明顯「U波」、QT延長。低血鉀時毛地黃與心肌Na-K幫浦的結合增加，毒性增強，易誘發致命心律不整。心衰竭病人常同時使用排鉀利尿劑(造成低血鉀)與毛地黃，故見到U波(低血鉀)時，特別要警覺「毛地黃製劑」可能中毒，應監測血鉀、暫停或調整毛地黃。利尿劑、軟便劑、血管擴張劑並非因低血鉀而直接「中毒」。　深入補充：低血鉀(常因排鉀利尿劑)心電圖呈T波平坦、ST下降、U波、QT延長，會增強毛地黃與心肌Na-K幫浦結合、加重毒性並誘發致命心律不整。心衰竭病人見U波時須警覺低血鉀與毛地黃中毒，監測並補鉀。","options":{"A":"利尿劑是造成低血鉀的原因，但不會因低血鉀而「中毒」。","B":"軟便劑與低血鉀致中毒無直接關係。","C":"血管擴張劑與U波/低血鉀致中毒無直接關係。","D":"正解。低血鉀(U波)會增強毛地黃毒性，須警覺毛地黃中毒。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"110030-N3-49":{"quick":"心衰竭合併肺水腫可依醫囑給嗎啡以「減輕前後負荷」；應採高坐臥(非頭低腳高)、限液降前負荷、給氧不可限制。","detail":{"background":"心臟衰竭合併肺水腫護理：①體位採「高坐臥/端坐(雙腳下垂)」以減少靜脈回流、促肺擴張，而非頭低腳高(會增回心血量、加重肺鬱血)；②限制液體攝入是為「減少前負荷(循環血量)」而非後負荷；③依醫囑給嗎啡——擴張靜脈與小動脈、降低前後負荷、解除焦慮、緩解肺水腫呼吸困難(C正確)；④肺水腫缺氧須「積極供氧(高濃度氧、必要時正壓)」，不可限制給氧。故正確為C。　深入補充：急性心衰竭/肺水腫護理——高坐臥(雙腳下垂)、積極供氧(必要時CPAP/BiPAP正壓)、限水限鈉、利尿、依醫囑嗎啡(降前後負荷、緩解焦慮與呼吸困難)、血管擴張劑。頭低腳高與限制給氧均錯誤、會加重病情。","options":{"A":"應採高坐臥減少回心血量；頭低腳高會增前負荷、加重肺水腫，錯誤。","B":"限液是減少「前負荷(循環血量)」，非後負荷，原理敘述錯誤。","C":"正解。依醫囑給嗎啡可降低前後負荷、緩解肺水腫。","D":"肺水腫缺氧須積極供氧，不可限制給氧。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"111110-N3-28":{"quick":"CABG術後維持心輸出量：Nitroglycerine是「血管擴張劑(降前負荷)」，不會增加心肌收縮力，故C錯誤。","detail":{"background":"冠狀動脈繞道術(CABG)後維持心輸出量的常用藥理策略：①Dobutamine——β1致效，增加心肌收縮力、提升心輸出(正確)；②Furosemide(Lasix)——利尿、減少循環血量降前負荷(正確)；④Nipride(nitroprusside)——強力血管擴張劑，同時降低前負荷與後負荷(正確)。而③Nitroglycerine是硝酸鹽類「血管擴張劑」，主要擴張靜脈降前負荷、亦擴張冠狀動脈，但「不會增加心肌收縮力」，故C「使用NTG可以增加心肌收縮力」是錯誤敘述。　深入補充：CABG術後維持心輸出常用Dobutamine(增收縮)、利尿劑(降前負荷)、Nitroprusside(降前後負荷)；NTG是血管擴張劑(降前負荷、擴冠脈)但「不增加收縮力」。須監測心輸出、CVP、尿量、末梢灌流與引流量。","options":{"A":"Dobutamine增加心肌收縮力，正確。","B":"Furosemide利尿、降前負荷，正確。","C":"錯誤(正解)。NTG是血管擴張劑(降前負荷)，不會增加心肌收縮力。","D":"Nipride同時降前、後負荷，正確。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"112110-N3-52":{"quick":"心因性肺水腫的肺動脈楔壓(PAWP)會升高(>18);本題PAWP 14 mmHg在正常範圍，不是肺水腫的典型表徵。","detail":{"background":"心因性(左心衰竭)肺水腫的血流動力學與表現：①低血氧(PaO2下降，如48 mmHg屬嚴重低血氧)；②「肺動脈楔壓(PAWP)上升(常>18 mmHg)」反映左心房壓升高、肺微血管靜水壓增加致肺水腫；③中心靜脈壓(CVP)升高(如18 cmH2O)、頸靜脈怒張反映合併右心受累/體液過量。本題PAWP 14 mmHg屬「正常範圍(正常約6~12，14僅略高)」，並非肺水腫(需明顯升高>18)的典型表徵，故為「不是」典型者。　深入補充：心因性肺水腫的肺動脈楔壓(PAWP)常&gt;18 mmHg(正常6~12)，反映左心房壓升高、肺微血管靜水壓增加；本題PAWP 14接近正常故非典型。非心因性(ARDS)肺水腫PAWP正常、屬通透性增加型，須鑑別。","options":{"A":"PaO2 48 mmHg(嚴重低血氧)是肺水腫典型表現。","B":"正解(非典型)。PAWP 14 mmHg接近正常；心因性肺水腫應明顯升高(>18 mmHg)。","C":"頸靜脈怒張反映體液過量/右心受累，可見於肺水腫。","D":"CVP 18 cmH2O(升高)反映體液過量，可見於肺水腫。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"112180-N3-19":{"quick":"Dopamine：>10 μg/kg/min使末梢血管收縮(④正確)，並可於休克時升壓支持(②)；本題鍵為②④(D)。低劑量增腎血流非「5~10」、且不會減少心律障礙。","detail":{"background":"Dopamine劑量依賴作用：低劑量(約1~3 μg/kg/min)興奮多巴胺受體增加腎血流；中劑量(約3~10)興奮β1增加心收縮與心輸出；高劑量(>10)興奮α使「末梢血管收縮、升高血壓」(④正確)。臨床上dopamine用於休克狀態維持血壓灌流(②)。①「2 μg會增加心肌自動性而減少心律障礙」錯誤——增加自動性反而「增加」心律不整風險；③「5~10 μg主要增加腎血流」錯誤——增腎血流是低劑量(1~3)、5~10已是β1心臟作用。故正確為②④(D)。　深入補充：Dopamine於休克時可支持血壓灌流，但低血容性休克應先補液而非單靠升壓劑。低劑量增腎血流、中劑量增收縮、高劑量(&gt;10)使末梢血管收縮。增加心肌自動性會「增加」而非減少心律不整風險。","options":{"A":"含①③(皆錯誤)，不符。","B":"含①(增加自動性會增心律不整，錯誤)，不符。","C":"含③(5~10主要為β1心臟作用而非腎血流)，不符。","D":"正解。②休克時升壓支持、④>10 μg末梢血管收縮，皆正確。"},"sources":["新文京《內外科護理學》毛地黃/強心配醣體","華杏《藥理學》心臟血管用藥","Lehne 藥理學 digoxin"]}},"112180-N3-20":{"quick":"心衰竭照護：②限水限鹽減前負荷、③動脈擴張劑降後負荷(選C 23)；高坐臥是降「前」負荷、嗎啡可減輕心臟負荷。","detail":{"background":"心臟衰竭照護原理：②限水、限鹽是為「減少體液與循環血量→降低前負荷」(正確)；③使用動脈血管擴張劑可降低周邊血管阻力、降低「後負荷」、減輕心室射血阻力(正確)。①「高坐臥姿可減少後負荷」錯誤——高坐臥是減少靜脈回流、降「前負荷」(非後負荷)；④「嗎啡改善呼吸喘但無法減輕心臟負荷」錯誤——嗎啡擴張血管降低前後負荷、確實能減輕心臟負荷。故正確為②③(C)。　深入補充：心衰竭照護——高坐臥減「前」負荷(減少靜脈回流)、限水限鈉減前負荷、動脈擴張劑(ACEI/ARB)減後負荷、嗎啡擴張血管減前後負荷並緩解呼吸困難。慢性心衰核心藥物為ARNI/ACEI、β阻斷劑、MRA、SGLT2抑制劑。","options":{"A":"含①(高坐臥降前負荷非後負荷)，不符。","B":"含①與④(皆錯誤)，不符。","C":"正解。②限水限鹽降前負荷、③動脈擴張劑降後負荷。","D":"含④(嗎啡可減輕心臟負荷，題述錯誤)，不符。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"114030-N3-18":{"quick":"左心衰竭常見「呼吸困難、端坐呼吸」(肺鬱血)；其餘三項把左右心衰表現對調或張冠李戴，皆錯。","detail":{"background":"左、右心衰竭表現：左心衰竭→肺鬱血→呼吸困難、端坐呼吸、PND、咳泡沫(可帶血絲)痰、肺底囉音；右心衰竭→體循環鬱血→下肢下垂性水腫、頸靜脈怒張、肝脾腫大、腹水、體重增加。逐一檢視：A把「乾咳泡沫血絲痰(左心)」誤稱右心；C把「下肢水腫、頸靜脈怒張、腹水(右心)」誤稱左心「早期」；D「左心衰竭呼吸困難、端坐呼吸」正確。A的「右心衰會出現第三心音/心搏過速」描述也非精確右心特徵。故正解D。　深入補充：左心衰竭→肺鬱血(呼吸困難、端坐呼吸、PND、泡沫痰、肺囉音)；右心衰竭→體循環鬱血(下肢水腫、頸靜脈怒張、肝脾腫大、腹水)。第三心音(S3)是收縮功能不全/容量過載的徵象。考題常把左右心衰表現對調，須仔細判讀。","options":{"A":"乾咳泡沫血絲痰屬「左」心衰竭表現，敘述張冠李戴，錯誤。","B":"帶泡沫血絲痰是左心衰竭表現，標為右心衰竭錯誤。","C":"下肢水腫、頸靜脈怒張、腹水屬右心衰竭，標為左心衰竭早期錯誤。","D":"正解。左心衰竭常見呼吸困難、端坐呼吸(肺鬱血)。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"114100-N3-16":{"quick":"左心衰竭臨床表徵是「端坐呼吸」(肺鬱血)；下肢水腫、肝脾腫大、CVP上升屬右心衰竭。","detail":{"background":"左心衰竭因肺循環鬱血→呼吸困難、「端坐呼吸」、PND、咳嗽泡沫痰、肺底囉音；右心衰竭因體循環鬱血→下肢下垂性水腫、肝脾腫大、頸靜脈怒張、「中心靜脈壓(CVP)上升」、腹水。本題問左心衰竭表徵，端坐呼吸(肺鬱血)正確；下肢水腫、肝脾腫大、CVP上升皆為右心衰竭。　深入補充：左心衰竭肺鬱血以端坐呼吸、PND、活動性呼吸困難、咳泡沫痰、肺底囉音、第三心音為主；右心衰竭以下肢水腫、頸靜脈怒張、CVP上升、肝腫大為主。BNP升高有助診斷與評估嚴重度。","options":{"A":"下肢水腫屬右心衰竭。","B":"肝脾腫大屬右心衰竭。","C":"中心靜脈壓上升屬右心衰竭。","D":"正解。端坐呼吸是左心衰竭肺鬱血的表現。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"114100-N3-20":{"quick":"心衰竭的代償機轉是心跳加快、心室擴張、心肌肥厚；「心肌需氧減少」並非代償(代償反而增加耗氧)。","detail":{"background":"心臟衰竭時，身體啟動代償機轉以維持心輸出：①交感神經興奮→「心跳加快」、收縮力增強；②前負荷增加使心室腔擴張(Frank-Starling)以提升每搏量；③長期壓力/容量負荷使「心肌肥厚」。這些代償雖暫時維持輸出，卻都「增加心肌做功與耗氧量」，長期反而加速心衰惡化。「心肌需氧減少」並非心衰竭的代償現象(代償使耗氧增加)，故為非代償徵象。　深入補充：心衰竭代償機轉——交感興奮(心率收縮力↑)、RAAS活化(保鈉保水增前負荷)、心室擴張(Starling)與心肌肥厚。這些短期維持輸出但長期增加耗氧、心肌重塑、惡化心衰，故現代治療以阻斷神經內分泌過度活化為核心。","options":{"A":"心跳變快是交感代償，屬代償徵象。","B":"心室腔擴張(Starling機轉)屬代償徵象。","C":"正解(非代償)。代償會「增加」心肌耗氧；「心肌需氧減少」不是代償現象。","D":"心肌肥厚是壓力/容量負荷的代償徵象。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"115030-N3-20":{"quick":"右心衰竭臨床表徵是「下肢水腫」(體循環鬱血)；呼吸困難、粉紅泡沫痰屬左心衰。","detail":{"background":"右心衰竭因右心無法將回流血排出→體循環靜脈鬱血→「下肢下垂性水腫」、頸靜脈怒張、肝脾腫大、腹水、體重增加。呼吸困難、粉紅色泡沫痰、肺水腫屬「左」心衰竭(肺鬱血)；少尿或無尿是心輸出嚴重下降致腎灌流不足的較後期、非特異右心徵象。本題問右心衰竭表徵，下肢水腫正確。　深入補充：右心衰竭體循環鬱血——下垂性水腫、頸靜脈怒張、肝脾腫大、腹水、體重增加、肝頸反流陽性。呼吸困難、粉紅泡沫痰屬左心衰竭(肺鬱血)。右心衰竭多繼發於左心衰竭或肺部疾病(肺心症)。","options":{"A":"呼吸困難屬左心衰竭(肺鬱血)。","B":"粉紅色泡沫痰屬左心衰竭/肺水腫。","C":"正解。下肢水腫是右心衰竭體循環鬱血的表現。","D":"少尿/無尿為心輸出嚴重下降的較後期表現，非特異右心徵象。"},"sources":["新文京《內外科護理學》心臟衰竭","華杏《內外科護理學》心臟血管系統","2021 ESC 心臟衰竭指引","Harrison 內科學 心衰竭"]}},"101030-N3-27":{"quick":"心房顫動(Af)血流鬱滯易形成左心房血栓，須長期口服「Warfarin(口服抗凝劑)」預防血栓栓塞。","detail":{"background":"心房顫動(Af)時心房不規則顫動、失去有效收縮，血液在左心房(尤其左心耳)鬱滯易形成血栓，脫落可造成中風或全身性栓塞。預防須「長期口服抗凝劑」，傳統用Warfarin(維生素K拮抗劑，監測INR目標約2~3)，現亦有新型口服抗凝劑(NOAC)。Heparin是「注射」用、短期/急性抗凝，不適合長期口服(口服無效)；Clopidogrel是抗血小板，預防動脈血栓效果不如抗凝劑對Af；Digoxin控制心室率，不抗凝。故長期口服預防血栓選Warfarin。　深入補充：Af抗凝與否依CHA₂DS₂-VASc評分(心衰、高血壓、年齡≥75、糖尿病、中風史、血管疾病、女性等)評估中風風險，分數高者建議抗凝；出血風險以HAS-BLED評估。新型口服抗凝劑(NOAC)不需常規監測INR、飲食限制少，現多優於Warfarin。","options":{"A":"Heparin為注射劑、用於急性短期抗凝，非長期「口服」用藥。","B":"正解。Warfarin為口服抗凝劑，長期使用預防Af的血栓栓塞。","C":"Clopidogrel是抗血小板，對Af血栓預防不如抗凝劑。","D":"Digoxin控制心室率，不具抗凝/抗血栓作用。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"101110-N3-43":{"quick":"永久性節律器術後應「限制植入側肢體大幅/抬高活動」以免電極移位，「抬高患側肢體24小時」並非正確護理。","detail":{"background":"永久性心臟節律器植入術後護理：①立即做12導程心電圖確認節律器擷獲(capture)與功能；②給予抗生素預防囊袋傷口感染；③教導每日固定測量脈搏(評估節律器是否正常起搏)，並隨身攜帶識別卡；④術後早期(數週內)「限制植入側手臂過度抬高、外展或提重物」，以防電極導線移位，但這是「限制活動」而非「抬高肢體」。題目D「抬高裝置側肢體至少24小時」並非節律器術後的正確指導(易使導線受牽動移位)，故為錯誤。　深入補充：永久性節律器植入後早期(約4~6週)患側手臂避免過度抬高、外展、提重物，以防電極導線移位。識別卡須隨身攜帶(過機場安檢、就醫MRI前告知)。教導辨識電池將盡(心率低於設定值)、感染(傷口紅腫熱痛發燒)等就醫時機。","options":{"A":"術後立即做12導程心電圖確認功能，正確。","B":"給予抗生素預防傷口感染，正確。","C":"教導每日測量脈搏監測起搏功能，正確。","D":"錯誤(正解)。應「限制」植入側肢體大幅抬高活動以防導線移位，而非抬高患側24小時。"},"sources":["新文京《內外科護理學》心臟節律器","華杏《內外科護理學》心臟血管系統"]}},"102110-N3-23":{"quick":"PSVT常以「心悸、胸悶」表現，多非立即致命、不需裝節律器；發作時因心率極快常看不清P波。","detail":{"background":"陣發性心室上心搏過速(PSVT)起源於心房或房室結，特徵為突發突止、心率約150~250次/分且規則。症狀以「心悸、胸悶、頭暈、焦慮」為主，多數非立即致命(血流動力學穩定者可先試迷走神經刺激如Valsalva、頸動脈竇按摩，或用adenosine)。因心率太快，P波常埋在前一個T波中而「看不清楚」。它不需要裝置心律調節器(那是用於過慢/傳導阻滯)。故正確為「心悸胸悶為常見症狀」。　深入補充：PSVT血流動力學穩定者，先試迷走神經刺激(Valsalva、頸動脈竇按摩、冰敷臉)，無效用adenosine(快速靜脈推注、半衰期極短)，再考慮鈣阻斷劑/β阻斷劑；不穩定者同步整流。根治可用導管電氣燒灼(catheter ablation)。","options":{"A":"PSVT多非立即致命(血流動力學多穩定)，敘述過度。","B":"PSVT治療為迷走刺激/藥物/電氣燒灼，非裝節律器。","C":"心率極快時P波常看不清楚，非「清楚P波」。","D":"正解。心悸、胸悶是PSVT常見症狀。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"104100-N3-32":{"quick":"心房顫動聽診心尖脈「節律不規則」，且因部分心跳無有效輸出，心尖脈次數常多於週邊脈(脈搏短絀)。","detail":{"background":"心房顫動(Af)：心房以350~600次/分不規則顫動、無有效收縮，房室結不規則下傳，造成「心室律不規則(irregularly irregular)」。聽診心尖脈節律不規則；因部分過快心跳的每搏量不足以產生可觸及的週邊脈搏，故「心尖脈次數>橈動脈脈搏次數」，兩者差值稱「脈搏短絀(pulse deficit)」。心電圖無清楚單一P波(代之以纖維顫動波f波)。Af本身多非「立即致命」(相對於心室顫動)，但長期有血栓中風與心衰風險。故正確為「心尖脈節律不規則」。　深入補充：Af心室律完全不規則、無清楚P波(代以f波)、脈搏短絀(心尖脈&gt;橈脈)。治療分「心率控制(β阻斷劑、鈣阻斷劑、digoxin)」與「節律控制(抗心律不整藥、整流、燒灼)」，並依CHA₂DS₂-VASc評估抗凝。","options":{"A":"正解。Af心室律不規則，聽診心尖脈節律不規則。","B":"Af常有脈搏短絀，心尖脈次數「多於」週邊脈，非相同。","C":"Af無清楚單一P波，代之以f(纖維顫動)波。","D":"Af非立即致命的心律不整(相對於心室顫動)。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"105030-N3-42":{"quick":"電擊「去顫(defibrillation，非同步)」適用於「心室纖維顫動(VF)」與無脈搏心室頻脈。","detail":{"background":"電擊治療分兩類：①「去顫(defibrillation，非同步電擊)」用於「無組織、無有效搏出的混亂心律」——心室纖維顫動(VF)、無脈搏心室頻脈(pulseless VT)，目標讓全部心肌同時去極化後讓竇房結重新主導；②「整流(cardioversion，同步電擊)」用於「仍有QRS、血流不穩」的快速心律如有脈搏VT、Af伴血流不穩、PSVT。心室早期收縮(PVC/VPC)與心搏過緩不以去顫處理(過緩需藥物/節律器)。本題去顫術適用者為「心室纖維顫動」。　深入補充：去顫(非同步)用於VF與無脈搏VT；同步整流用於有脈搏VT、Af、PSVT。可電擊心律(VF/無脈VT)是CPR時唯一適用去顫者；無脈電氣活動(PEA)與心搏停止(asystole)不可電擊，須CPR與腎上腺素。","options":{"A":"心室「撲動」可考慮整流/去顫，但本題最標準答案為心室纖維顫動。","B":"無脈搏的心室「搏動過緩」屬過緩/無脈電氣活動，去顫無效，須CPR與藥物。","C":"正解。心室纖維顫動(VF)是去顫術的標準適應症。","D":"心室早期收縮不需去顫(必要時用抗心律不整藥)。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"105090-N3-27":{"quick":"「剝離性動脈瘤」最不需要抗凝(抗凝會增加血管破裂出血風險)；Af、心肌梗塞、瓣膜置換則需抗凝。","detail":{"background":"需要抗凝治療的常見情況：①心房顫動(預防左心房血栓栓塞)；②心肌梗塞(預防心室壁血栓與冠脈血栓延伸)；③人工瓣膜置換尤其「機械瓣」(終身抗凝，預防瓣膜血栓)；④深部靜脈栓塞/肺栓塞。而「剝離性(主動脈)動脈瘤」是血管壁撕裂剝離，給抗凝劑會增加出血/血管破裂、夾層擴大的致命風險，治療反而以控制血壓心率、必要時手術為主，故「最不需(且不宜)」抗凝。　深入補充：須抗凝的常見情況——Af(依CHA₂DS₂-VASc)、機械瓣膜(終身)、DVT/肺栓塞、心肌梗塞(心室血栓)。剝離性動脈瘤、活動性出血、近期出血性中風等是抗凝禁忌(會加重出血)，須先排除。","options":{"A":"心房顫動需抗凝預防血栓栓塞。","B":"正解。剝離性動脈瘤最不需(且不宜)抗凝，以免增加出血/破裂風險。","C":"心肌梗塞常需抗凝預防血栓。","D":"二尖瓣置換(尤其機械瓣)須長期抗凝。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"105090-N3-32":{"quick":"節律器植入後「不可按摩患部」(會使電極移位、傷口受損)；其餘觀察傷口、攜識別卡、測脈搏皆正確。","detail":{"background":"心臟節律器出院指導：①「不可按摩或壓迫植入囊袋部位」——按摩會牽動電極導線造成移位、損傷傷口，是錯誤指導；②密切觀察傷口紅腫熱痛，異常立即就醫；③隨身攜帶識別卡(載明機型、醫院、醫師)，過安檢/就醫時告知；④每日測量脈搏並記錄，若脈搏次數明顯低於設定值(可能電池快沒電或起搏失敗)應儘速就醫；⑤避免強磁場(MRI)、術後早期限制患側手臂大幅抬高與提重物。故不適宜者為A每日按摩患部。　深入補充：節律器術後衛教——不可按摩植入處(防電極移位/傷口損傷)、觀察傷口感染、避免強磁場(MRI、大型發電機、電弧焊)、攜識別卡、每日測脈搏記錄、術後早期限制患肢活動。手機建議放對側口袋、距裝置15公分以上。","options":{"A":"不適宜(正解)。按摩患部會使電極移位、損傷傷口，絕不可每日按摩。","B":"觀察傷口紅腫熱痛、異常就醫，正確。","C":"隨身攜帶識別卡，正確。","D":"每日測脈搏、明顯減少就醫，正確。"},"sources":["新文京《內外科護理學》心臟節律器","華杏《內外科護理學》心臟血管系統"]}},"106110-N3-29":{"quick":"心房早期收縮(APC)多為良性、不需特別治療；A-V block不用去顫/頸動脈竇按摩、Af應用抗凝(口服Warfarin非Heparin)。","detail":{"background":"各心律不整處置：①心房早期收縮(APC/PAC)常見於正常人、咖啡因/壓力下，多為良性、無症狀者「不需特別治療」(去除誘因即可)；②房室傳導阻滯(A-V block)是傳導變慢/中斷，治療為atropine或裝節律器，「不能」用去顫術(去顫用於VF)或頸動脈竇按摩(該手法增加迷走張力反而加重傳導阻滯)；③心房顫動(Af)預防血栓應「長期口服Warfarin」，Heparin是注射短期用。故正確為「APC不需特別治療」。　深入補充：APC(心房早期收縮)/PVC(心室早期收縮)在無心臟病者多為良性，去除誘因(咖啡因、菸酒、壓力、缺乏睡眠)即可。房室傳導阻滯以atropine/節律器處理，頸動脈竇按摩會增迷走張力加重阻滯。Af抗凝用口服抗凝劑非Heparin。","options":{"A":"A-V block應用atropine/節律器，不可用去纖維震顫術(那是VF用)。","B":"頸動脈竇按摩增加迷走張力，反而加重A-V block，不可用於改善傳導阻滯。","C":"正解。APC多良性，無症狀者不需特別治療。","D":"Af應「口服Warfarin」抗凝；Heparin為注射短期用，敘述不當。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"106111-N3-30":{"quick":"此心電圖R-R間距不規則、無清楚P波、基線呈纖維顫動波→診斷為「心房顫動(Af)」。","detail":{"background":"判讀本題心電圖(看圖)：①QRS之間的R-R間距「長短不一、呈不規則的不規則(irregularly irregular)」；②QRS前看不到固定、清楚的P波，基線呈現細小不規則的「纖維顫動波(f波)」；③QRS形態正常(窄)。此三特徵正是「心房顫動(Atrial fibrillation, Af)」的典型表現。對比：二度房室傳導阻滯有規律的PR延長/漏搏型態並可見P波；三度房室傳導阻滯P波與QRS各自獨立(房室分離)、心室律規則而慢；APC為提早出現、形態相似的心房性早期收縮。故依圖診斷為Af。　深入補充：心房顫動心電圖三特徵——R-R不規則的不規則、無清楚P波(代以纖維顫動f波)、QRS形態正常。與心房撲動(規則鋸齒狀F波、常固定比例下傳)區別。Af長期風險為中風(左心房血栓)與心搏過速性心肌病變。","options":{"A":"二度房室傳導阻滯可見P波且有規律的漏搏型態，與本圖無清楚P波、完全不規則不符。","B":"三度房室傳導阻滯P波與QRS各自獨立、心室律規則而慢，與本圖不規則不符。","C":"APC為偶發提早的心房收縮，本圖為持續性完全不規則、無P波，非單純APC。","D":"正解。R-R不規則、無清楚P波、基線顫動波，診斷為心房顫動(Af)。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"107110-N3-27":{"quick":"心房顫動病人使用Warfarin的目的是「抑制血栓生成」、預防中風與栓塞；不控制心率、不改善心悸、不使心律規則。","detail":{"background":"Warfarin(coumadin)是維生素K拮抗劑、口服抗凝劑，抑制凝血因子II、VII、IX、X的合成，達到抗凝、「抑制血栓生成」的效果。心房顫動因左心房血流鬱滯易生血栓，給Warfarin是為「預防血栓脫落造成中風或全身栓塞」(監測INR目標約2~3)。它「不會」控制心率(那是β阻斷劑、digoxin、鈣阻斷劑)、不會改善心悸或使心律恢復規則(那需整流/抗心律不整藥/燒灼)。故目的是抑制血栓生成。　深入補充：Warfarin抑制維生素K依賴凝血因子(II、VII、IX、X)合成，起效需數天，初期常與Heparin重疊(橋接)。監測PT/INR(Af目標2~3)。出血是主要風險，逆轉用維生素K或新鮮冷凍血漿/凝血酶原複合物。","options":{"A":"抑制心跳次數是控制心室率藥物的作用，非Warfarin。","B":"正解。Warfarin抗凝、抑制血栓生成，預防Af的栓塞中風。","C":"Warfarin不改善心悸症狀。","D":"Warfarin不使心律恢復規則(需整流/抗心律不整治療)。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"107110-N3-28":{"quick":"心悸、心尖脈98且「節律不規則」、心尖脈(98)>橈動脈(80)有脈搏短絀→最可能是「心房顫動」。","detail":{"background":"此病人特徵：①心悸；②心尖脈98次/分且「節律不規則」；③心尖脈(98)大於橈動脈脈搏(80)，差距18即「脈搏短絀(pulse deficit)」。脈搏短絀的成因是某些心搏的每搏量太少、無法傳到週邊產生可觸脈搏，最典型見於「心房顫動」(心室律完全不規則)。心室纖維顫動是無脈、致命，不會走進門診描述；心房撲動律多較規則(常呈固定比例下傳)；PSVT律規則且更快。故最可能為心房顫動。　深入補充：脈搏短絀(pulse deficit)＝心尖脈次數&gt;橈動脈脈搏次數，最典型見於心房顫動(部分過快無效心搏未能傳到週邊)。測量須兩人同時聽診心尖脈與觸橈脈滿1分鐘。差距越大反映心律越紊亂、心輸出越不穩。","options":{"A":"正解。節律不規則加脈搏短絀(心尖脈>橈脈)是心房顫動的典型。","B":"心室纖維顫動為無脈、致命，與本題清醒有脈不符。","C":"心房撲動常呈規則比例下傳，律較規則，不符「完全不規則」。","D":"PSVT律規則且心率更快(150~250)，不符不規則。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"108020-N3-27":{"quick":"Phenytoin(Dilantin)可治療「毛地黃中毒引起的心律不整」(A正確)；其餘對藥物分類/離子通道的敘述皆有誤。","detail":{"background":"抗心律不整藥物：①Phenytoin(Dilantin)屬Ib類，對「毛地黃中毒引起的心律不整」特別有效(A正確)；②Lidocaine屬Ib類「鈉離子通道阻斷劑」(非鉀離子通道)，用於心室性心律不整；③心房早期收縮(APC)多良性、無症狀者不需治療(更非以鈣阻斷劑常規處理)；④Amiodarone屬第Ⅲ類，主要「鉀離子通道阻斷劑」(延長動作電位/再極化)，並非鈉離子通道阻斷劑。故正確敘述為A。　深入補充：抗心律不整藥Vaughan-Williams分類——Ⅰ鈉通道(Ia quinidine/Ib lidocaine、phenytoin/Ic flecainide)、Ⅱβ阻斷劑、Ⅲ鉀通道(amiodarone)、Ⅳ鈣通道(verapamil、diltiazem)。Phenytoin對毛地黃中毒引起的心律不整有效。","options":{"A":"正解。Phenytoin可用於治療毛地黃中毒引起的心律不整。","B":"Lidocaine是「鈉」離子通道阻斷劑(Ib類)，非鉀離子通道，敘述錯誤。","C":"APC多良性、無症狀不需治療，非常規以鈣阻斷劑處理，敘述不當。","D":"Amiodarone主要為第Ⅲ類「鉀」離子通道阻斷劑，非鈉離子通道，敘述錯誤。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"108110-N3-78":{"quick":"AED使用時機為「心室纖維顫動或無脈搏心室頻脈」；自動體外去顫器只執行「非同步去顫」、不具同步整流功能，故C錯誤。","detail":{"background":"自動體外心臟去顫器(AED)：①政府於公共場所設置AED並立法(如緊急醫療救護法)提供善意施救者免責保障；②適應症為「可電擊心律」——心室纖維顫動(VF)或無脈搏心室頻脈(pulseless VT)；③AED自動分析心律後給予「非同步去顫(defibrillation)」電擊，「不具同步整流(cardioversion)」功能(同步整流用於有脈搏的清醒病人，由醫療人員以手動去顫器執行)；④具語音提示引導操作。故C「有整流與去顫兩種功能」錯誤。　深入補充：AED只執行「非同步去顫」，自動分析心律後對VF/無脈VT建議電擊。公共場所設置AED屬「公眾除顫(PAD)」，配合及早CPR可提升到院前心臟停止存活率。緊急醫療救護法保障善意施救者免責(好撒馬利亞人法)。","options":{"A":"公共場所設AED並立法保障善意施救者免責，正確。","B":"使用時機為VF或無脈搏VT，正確。","C":"錯誤(正解)。AED只執行非同步去顫，不具同步整流功能。","D":"具語音提示引導操作，正確。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"109110-N3-32":{"quick":"屬「鈉離子通道阻斷劑」的抗心律不整藥是Lidocaine(第Ⅰ類)。","detail":{"background":"Vaughan-Williams抗心律不整分類：第Ⅰ類＝「鈉離子通道阻斷劑」(Ia如quinidine、Ib如lidocaine/phenytoin、Ic如flecainide)；第Ⅱ類＝β阻斷劑(propranolol)；第Ⅲ類＝鉀離子通道阻斷劑(amiodarone、sotalol)；第Ⅳ類＝鈣離子通道阻斷劑(verapamil、diltiazem)。Atropine是抗膽鹼藥(用於心搏過慢)。本題問鈉離子通道阻斷劑，答案為Lidocaine。　深入補充：Lidocaine(Ib類鈉通道阻斷)用於心室性心律不整(如VT)，須監測中樞神經毒性(嗜睡、抽搐)與心臟抑制。Amiodarone(Ⅲ類)廣效但有肺纖維化、甲狀腺、肝、皮膚等長期副作用。Atropine用於心搏過慢，propranolol為β阻斷劑。","options":{"A":"Amiodarone屬第Ⅲ類鉀離子通道阻斷劑。","B":"Atropine是抗膽鹼藥(治心搏過緩)，非鈉通道阻斷劑。","C":"正解。Lidocaine屬第Ⅰ類(Ib)鈉離子通道阻斷劑。","D":"Propranolol屬第Ⅱ類β阻斷劑。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"109110-N3-33":{"quick":"「有意識(有脈搏)」的VT應使用「同步心臟電氣轉換術(synchronized cardioversion)」；無脈搏VT/VF才用非同步去顫，且不需先麻醉。","detail":{"background":"心室頻脈(VT)處置依「有無脈搏/意識」分流：①「有脈搏、清醒但血流不穩」的VT→採「同步整流(synchronized cardioversion)」，電擊與R波同步以避免落在T波引發VF；清醒病人施行前可給鎮靜；②「無脈搏VT或VF」→屬心臟停止，立即「非同步去顫(defibrillation)」並CPR，緊急情況「不需也不應」延遲去等待麻醉；③VT惡化為VF時應「持續/立即去顫並CPR」，而非停止去顫。故A正確：有意識(有脈搏)時選同步整流。　深入補充：有脈搏VT且血流不穩→同步整流(避免電擊落在T波上引發VF)；無脈搏VT/VF→立即非同步去顫並CPR。清醒病人整流前可給鎮靜。VT惡化為VF時應持續去顫，不可停止。整流能量依機型(雙相約100~200焦耳)。","options":{"A":"正解。有脈搏(意識)的VT應採同步心臟電氣轉換術(synchronized cardioversion)。","B":"無脈搏為心臟停止之急救，立即非同步去顫，不應先給麻醉延誤。","C":"有脈搏VT應「同步」整流且依情況選能量，非直接非同步100焦耳之描述。","D":"VT變VF更需「立即去顫並CPR」，而非停止去顫。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"110110-N3-31":{"quick":"心房顫動預防血栓應「長期口服抗凝劑(Warfarin/NOAC)」，而非用Heparin；其餘PSVT迷走刺激、運動員竇緩、1°AV block不需治療皆正確。","detail":{"background":"心律不整觀念：①心房顫動(Af)易生左心房血栓，預防須「長期口服抗凝劑(Warfarin/NOAC)」，Heparin為注射、短期/橋接用，不適合長期居家預防，故A「用Heparin預防」錯誤；②PSVT血流穩定時可用迷走神經刺激(頸動脈竇按摩、Valsalva)終止；③竇性心搏過慢常見於運動員(迷走張力高)、無症狀者不需治療；④一度房室傳導阻滯(PR>0.2秒但每個P後都有QRS)通常無症狀、不需治療。本題問錯誤者為A。　深入補充：Af長期預防血栓用「口服抗凝劑(Warfarin/NOAC)」，Heparin僅注射短期/橋接。一度房室阻滯(PR&gt;0.2秒但每P後有QRS)多無症狀；竇性心搏過慢於運動員為生理性。PSVT可用迷走刺激嘗試終止。","options":{"A":"錯誤(正解)。Af長期預防血栓應「口服抗凝劑」，非用Heparin。","B":"PSVT可用頸動脈竇按摩等迷走刺激終止，正確。","C":"運動員的竇性心搏過慢常為生理性、不需治療，正確。","D":"一度房室傳導阻滯多無症狀、不需治療，正確。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"111030-N3-29":{"quick":"節律器病人應每天監測脈搏(B本身正確)；錯誤的是把選項當「正確指導」——本題問錯誤，C「持續打嗝用Valsalva緩解」是錯的(打嗝不停可能是電極刺激橫膈，應就醫)。","detail":{"background":"心臟節律器護理指導：①心律變慢或低於設定下限可能是電池快沒電或起搏失敗的徵象，須就醫；②每天監測脈搏(可測橈動脈)滿1分鐘並記錄；③術後約6週內避免患側手臂提重物、大幅外展抬高，以防電極導線移位；④若出現「持續打嗝或胸肌抽動」，可能是電極移位刺激橫膈神經/胸肌，屬異常徵象「應就醫檢查節律器設定」，而非以Valsalva運動自行緩解。故本題錯誤指導為C。　深入補充：節律器持續打嗝或胸肌抽動，常是電極移位刺激橫膈神經/胸肌的異常徵象，應就醫檢查並重設輸出，不可自行用Valsalva緩解。每日測脈搏記錄(可測橈動脈)，心率低於設定下限可能電池將盡或失起搏，須回診。","options":{"A":"心律變慢可能是電池快沒電徵象，正確。","B":"每天監測橈動脈脈搏滿1分鐘，正確。","C":"錯誤(正解)。持續打嗝可能是電極刺激橫膈的異常徵象，應就醫，非以Valsalva自行緩解。","D":"術後6週內避免抬重物以防導線移位，正確。"},"sources":["新文京《內外科護理學》心臟節律器","華杏《內外科護理學》心臟血管系統"]}},"112030-N3-27":{"quick":"AICD病人持續打嗝可能是電極刺激橫膈的異常徵象，應「就醫」而非以多飲水/憋氣自行處理，故B錯誤。","detail":{"background":"植入式自動心律轉換去顫器(AICD)居家指導：①AICD放電瞬間若有人觸摸病人可能感到輕微「觸電感」，屬正常、不會有害；②術後約4~6週內患肢避免提重物與劇烈肩部運動，以防電極移位；③可正常使用微波爐、電鍋等家電(保持合理距離)，但「應避免核磁共振(MRI)及強磁場」；④若出現「持續打嗝不停或局部肌肉抽動」，可能是電極移位刺激橫膈，屬異常，應「就醫檢查」，不可靠多飲水或憋氣自行處理。故B為錯誤指導。　深入補充：AICD能偵測致命性室性心律不整並自動電擊。放電時旁人觸碰病人僅輕微觸電感、無害。居家避免強磁場(MRI禁忌)、發電機、電弧焊；一般家電(微波爐、電鍋)可正常使用。持續打嗝/抽動疑電極移位須就醫。","options":{"A":"AICD放電時觸摸病人可能有輕微觸電感，屬正常，正確。","B":"錯誤(正解)。持續打嗝可能是電極移位刺激橫膈的異常徵象，應就醫，非多飲水/憋氣處理。","C":"術後4~6週患肢避免提重物與劇烈肩部運動，正確。","D":"可用微波爐電鍋但避免MRI，正確。"},"sources":["新文京《內外科護理學》心臟節律器","華杏《內外科護理學》心臟血管系統"]}},"112030-N3-28":{"quick":"服Warfarin忘記服藥「不可次日服雙倍」(會增加出血風險)；應依醫囑(通常略過該次)，故D錯誤。","detail":{"background":"Warfarin衛教：①任何侵入性處置(拔牙、手術)前須告知正在服用Warfarin，以評估是否調整或停藥；②維生素K會拮抗Warfarin降低藥效，深綠色蔬菜(菠菜、花椰菜等)富含維生素K，攝取應「固定且適量」避免忽多忽少影響INR；③黑木耳、銀杏、大蒜、人參、Aspirin等具抗凝/抗血小板作用，會「增強」出血風險，須避免任意併用；④「漏服不可自行補成雙倍劑量」——雙倍會使INR過高、增加出血風險，正確做法是依醫囑(通常當天想起可補、若已接近次日則略過該次)並記錄。故錯誤指導為D。　深入補充：Warfarin衛教——侵入處置前告知、維生素K食物(深綠蔬菜)固定適量、避免銀杏當歸大蒜人參Aspirin(增出血)、漏服不可補雙倍、定期監測INR、出血徵象(瘀斑、血尿、黑便、牙齦出血)就醫、用軟毛牙刷與電動刮鬍刀。","options":{"A":"拔牙前告知正在使用Warfarin，正確。","B":"深綠色食物富含維生素K會降低藥效，須固定適量，正確方向。","C":"黑木耳、銀杏會增強抗凝/出血風險，應避免，正確。","D":"錯誤(正解)。漏服不可次日服雙倍劑量(會致INR過高出血)，應依醫囑處理。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"112030-N3-29":{"quick":"服用Warfarin監測的是「凝血酶原時間PT/INR」，而非PTT；故D「監測PTT」錯誤(PTT是Heparin的監測指標)。","detail":{"background":"心律不整照護：①整流術(cardioversion)前對清醒病人可給鎮靜劑(如Valium)減少焦慮與不適；②節律器病人隨身攜帶識別卡；③心室上心搏過速(SVT)可教導伐氏操作法(Valsalva)等迷走刺激嘗試終止；④抗凝監測——「Warfarin監測PT/INR」、「Heparin監測aPTT/PTT」。本題D「服用Warfarin需定期監測PTT」錯誤，應為PT/INR。　深入補充：抗凝監測——Warfarin看PT/INR、Heparin看aPTT。整流前清醒病人給鎮靜(如diazepam)減少不適。SVT可教Valsalva等迷走刺激。節律器病人攜識別卡。本題以「Warfarin監測PTT」為錯誤(應監測PT/INR)。","options":{"A":"整流術前給Valium鎮靜減少焦慮，正確。","B":"節律器病人隨身攜帶識別卡，正確。","C":"SVT可教Valsalva操作迷走刺激，正確。","D":"錯誤(正解)。Warfarin應監測PT/INR，PTT是Heparin的指標。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"112110-N3-29":{"quick":"節律器術後心電圖出現「心室激搏波(spike)」代表節律器正常起搏，是「正常」現象，不需立即通知醫師；故A不適宜。","detail":{"background":"心臟節律器術後護理：①心電圖上的「激搏波(pace spike)」是節律器發出電刺激起搏心臟的訊號，spike後接著QRS代表「擷獲(capture)成功、運作正常」，屬正常現象，「不需」因此立即通知醫師；反而應警覺的是「有spike卻無後續QRS(失擷獲)」或完全無spike(失起搏)；②每日評估傷口有無發炎、血腫；③術後早期植入側手臂避免抬高的關節運動，防電極移位；④術後第一小時每15分鐘評估生命徵象。故「看到spike就立即通知醫師」不適宜(誤把正常當異常)，A為答案。　深入補充：節律器心電圖的激搏波(pace spike)後接著QRS＝擷獲(capture)成功、運作正常，屬正常現象。須警覺的異常是「有spike無QRS(失擷獲)」或「該起搏卻無spike(失起搏)」、感知不良。術後早期評估傷口血腫、限制患肢抬高、密切監測生命徵象。","options":{"A":"不適宜(正解)。心室激搏波(spike)代表節律器正常起搏，屬正常，不需立即通知醫師。","B":"每日評估傷口發炎血腫，適宜。","C":"植入側手臂避免抬高關節運動防移位，適宜。","D":"術後第一小時每15分鐘評估生命徵象，適宜。"},"sources":["新文京《內外科護理學》心臟節律器","華杏《內外科護理學》心臟血管系統"]}},"112110-N3-75":{"quick":"永久性心臟節律器的適應症是「完全(三度)房室傳導阻滯」等過慢/傳導阻滯型心律。","detail":{"background":"永久性心臟節律器主要用於「症狀性心搏過慢或傳導阻滯」——如「完全(三度)房室傳導阻滯」、有症狀的二度Ⅱ型房室傳導阻滯、症狀性竇房結功能不良(病竇症候群)、慢性雙束支阻滯等，藉持續或按需起搏維持足夠心室率。心房早期收縮(APC)、心室早期收縮(PVC)多為良性不需節律器；心房撲動屬快速心律，治療為控制心室率/整流/燒灼，非裝節律器。故適應症為完全房室傳導阻滯。　深入補充：永久性節律器適應症——症狀性心搏過緩、完全(三度)房室傳導阻滯、症狀性二度Ⅱ型阻滯、病竇症候群、慢性雙束支阻滯等。APC、PVC、心房撲動屬其他處置範疇。節律器模式以代碼表示(如DDD、VVI)，反映起搏/感知腔室與反應。","options":{"A":"正解。完全(三度)房室傳導阻滯是永久性節律器的典型適應症。","B":"心房早期收縮多良性，不需節律器。","C":"心室早期收縮多不需節律器。","D":"心房撲動為快速心律，治療為控制心室率/整流/燒灼，非裝節律器。"},"sources":["新文京《內外科護理學》心臟節律器","華杏《內外科護理學》心臟血管系統"]}},"112180-N3-18":{"quick":"去顫器測試/放電時「不可對空放電」(危險、且應在去顫器內測試)；其餘避氧氣帳、放電勿觸病人病床、皮膚灼傷為合併症皆正確。","detail":{"background":"心臟去顫器(defibrillator)使用安全：①「避免於氧氣帳/高濃度氧環境放電」(電火花遇高濃度氧有燃燒爆炸危險，放電前移開氧氣)；②功能測試應依機器設計在「機內測試座」進行，「不可將電擊板對空(對空氣)放電」(危險且可能損壞機器/傷人)；③放電瞬間「不可碰觸病人或病床」(避免施救者被電擊)，須先喊「clear清場」；④常見合併症為電擊板接觸處的「皮膚灼傷」(故須塗導電膠、確實貼合)。故錯誤敘述為B「對空放電」。　深入補充：去顫安全——放電前喊「clear」清場、不可碰觸病人與病床；移開氧氣(高濃度氧遇火花有燃爆風險)；電擊板塗導電膠/貼導電貼片以防皮膚灼傷並降低經胸阻抗；測試功能須在機器內建測試座，不可對空放電。","options":{"A":"避免於氧氣帳內放電(防燃爆)，正確。","B":"錯誤(正解)。不可對空放電，應於機器內建測試座測試功能。","C":"放電時不可碰觸病人或病床，正確。","D":"皮膚灼傷是去顫常見合併症，正確。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"112180-N3-48":{"quick":"AED使用「胸毛太多」應先剃除或撕除以使貼片密合，「用手按壓電擊片」極危險(施救者會觸電)，故B錯誤。","detail":{"background":"AED操作要點：①兩片電擊貼片分別貼於「右鎖骨下方」與「左乳外側/左腋中線胸壁」(形成跨心臟電流路徑)；②胸毛過多會使貼片無法密合導電，應先以剃刀剃除或用一組貼片黏貼後快速撕除毛髮，再貼新貼片，「絕不可用手按壓電擊片」——放電瞬間施救者會被電擊，極度危險；③聽到「按下電擊按鈕」前須「清場」、確認無人接觸病人；④病人身體潮濕會分流電流、降低效果並致灼傷，須先擦乾胸部再貼。故錯誤為B。　深入補充：AED貼片貼右鎖骨下與左乳外側(腋中線)形成跨心電流。胸毛過多先剃除/撕除使密合；身體潮濕先擦乾(防電流分流與灼傷)；體內金屬植入物(節律器)貼片避開即可。絕不可用手按壓電擊片(施救者會觸電)。","options":{"A":"貼片貼右鎖骨下與左乳旁(腋前),形成跨心電流，正確。","B":"錯誤(正解)。胸毛多應剃除/撕除使貼片密合，絕不可用手按壓電擊片(施救者會觸電)。","C":"按電擊鈕前確認無人接觸病人(清場)，正確。","D":"身體潮濕先擦乾再貼，正確。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"113030-N3-19":{"quick":"永久性心律調節器植入後「4~6週內應避免提重物」(防電極移位)，為正確敘述。","detail":{"background":"心臟節律器要點：①裝置後出現「持續打嗝」可能是電極移位刺激橫膈，屬「異常」徵象應就醫，並非正常現象；②「永久性」節律器的脈衝產生器(激搏器)埋於體內(鎖骨下皮下囊袋)，並非在體外方便更換電池(體外的是暫時性節律器)；③裝置暫時性或永久性節律器，只要有起搏，心電圖上「都會」出現激搏波(pace spike)，故「暫時性不會出現spike」錯誤；④永久性節律器植入後「約4~6週內避免提重物、患側手臂大幅抬高外展」以防電極導線移位(D正確)。　深入補充：暫時性節律器激搏器在「體外」(經靜脈或體表)、用於緊急或過渡；永久性節律器埋於鎖骨下皮下囊袋。兩者起搏時心電圖皆出現激搏波。持續打嗝疑電極移位刺激橫膈須就醫。永久性術後4~6週避免提重物與患肢大幅活動。","options":{"A":"裝置後持續打嗝是電極移位刺激橫膈的異常徵象，非正常現象，錯誤。","B":"永久性節律器激搏器埋於體內，非在體外更換電池，錯誤(體外者為暫時性)。","C":"暫時性節律器起搏時心電圖「會」出現激搏波，敘述錯誤。","D":"正解。永久性節律器植入後4~6週內應避免提重物，以防電極移位。"},"sources":["新文京《內外科護理學》心臟節律器","華杏《內外科護理學》心臟血管系統"]}},"113030-N3-49":{"quick":"病人體內裝有人工節律器「仍可使用AED」(只需貼片避開節律器位置)，說「不能使用」是錯誤。","detail":{"background":"AED操作觀念：①AED設計為「非醫護的一般民眾」也能操作(公眾除顫概念)；②體內裝有人工心臟節律器「不是AED的禁忌」——遇到VF/無脈VT仍應使用AED，只要將電擊貼片貼在「距離節律器植入處至少約2.5公分以外」避免直接覆蓋即可，故「裝節律器就不能用AED」是錯誤敘述；③操作口訣常記為「開(開機)、貼(貼電擊片)、插(插接線)、按(依指示按電擊)」；④按電擊鈕前須清場、確認無人接觸病人。故錯誤為B。　深入補充：AED可由非醫護民眾操作，操作口訣「開、貼、插、按」。體內裝節律器不是禁忌(貼片避開即可)。按電擊鈕前清場、確認無人接觸病人。對小於8歲/25 kg兒童宜用兒童電擊片或衰減器。","options":{"A":"AED可由非醫護人員操作，正確。","B":"錯誤(正解)。裝有節律器仍可用AED，只需貼片避開節律器位置，並非不能使用。","C":"操作口訣「開、貼、插、按」，正確。","D":"按電擊鈕前清場、確認無人接觸病人，正確。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"113100-N3-18":{"quick":"心房顫動可服用「鈉離子通道阻斷劑(第Ⅰ類抗心律不整藥)」等控制；頸動脈竇按摩主要用於SVT、去顫用於VF、AICD用於致命室性心律。","detail":{"background":"心房顫動(Af)臨床處置策略：①「控制心室率」(β阻斷劑、鈣阻斷劑、digoxin)或「節律控制」(抗心律不整藥如第Ⅰc/Ⅲ類，含鈉離子通道阻斷劑可用於恢復/維持竇性心律並影響傳導)；②抗凝預防血栓；③藥物無效或血流不穩可考慮電氣整流或導管燒灼。而「頸動脈竇按摩」主要用於診斷/終止陣發性室上心搏過速(對Af多僅暫時減慢心室率、不能恢復規則)；「去顫(非同步)」用於VF/無脈VT而非Af(Af若需電擊是用同步整流)；「AICD」用於預防致命性室性心律不整猝死，非為改善Af心悸。故正確為D「可服用鈉離子通道阻斷劑」。　深入補充：Af處置——心率控制(β阻斷劑、鈣阻斷劑、digoxin)、節律控制(抗心律不整藥含鈉通道阻斷劑、整流、燒灼)、抗凝(依CHA₂DS₂-VASc)。頸動脈竇按摩用於SVT；去顫(非同步)用於VF/無脈VT；AICD預防猝死，皆非Af首選。","options":{"A":"頸動脈竇按摩主要用於SVT，對Af多僅暫時減慢、非標準處置。","B":"Af若電擊應用「同步整流」，非「非同步去顫」(去顫用於VF/無脈VT)。","C":"AICD用於預防致命室性心律不整猝死，非為改善Af心悸。","D":"正解。Af可使用鈉離子通道阻斷劑(第Ⅰ類抗心律不整藥)等控制。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"114030-N3-17":{"quick":"永久性節律器持續打嗝可能是電極移位刺激橫膈的「異常」徵象、應就醫，不可用Valsalva自行緩解，故D錯誤。","detail":{"background":"永久性節律器居家指導：①每天測量橈動脈脈搏滿1分鐘並記錄，監測起搏功能；②避免靠近強電磁場(住家頂樓避免設置手機基地台、發電機、大型磁場)，以免干擾節律器；③可使用微波爐等家電但保持安全距離；④若出現「持續打嗝或胸肌抽動」可能是電極移位刺激橫膈神經，屬「異常」應就醫檢查，「不可」以伐氏操作法(Valsalva)自行緩解。故錯誤指導為D。　深入補充：永久性節律器居家指導——每日測橈動脈脈搏1分鐘、避免強電磁場(基地台、發電機、MRI)、可用一般家電但保持距離、攜識別卡。持續打嗝疑電極移位刺激橫膈，屬異常須就醫，不可用Valsalva自解。","options":{"A":"每天測量橈動脈脈搏1分鐘監測起搏，正確。","B":"避免住家頂樓設手機基地台(強電磁場干擾)，正確。","C":"可使用微波爐但保持安全距離，正確。","D":"錯誤(正解)。持續打嗝是電極移位刺激橫膈的異常徵象應就醫，不可用Valsalva緩解。"},"sources":["新文京《內外科護理學》心臟節律器","華杏《內外科護理學》心臟血管系統"]}},"114100-N3-19":{"quick":"去顫整流術「常用於心室纖維顫動(VF)/無脈VT」而非心房顫動；故C「常用於心房纖維顫動」錯誤。","detail":{"background":"去顫(defibrillation)：①初次電量依機型介於約50~360焦耳(單相約360、雙相約120~200；本題敘述50~200屬常見範圍)；②電擊板/貼片放置——「胸骨右緣第2肋間」與「左腋前線(心尖)第5肋間」，形成跨心臟電流；③去顫(非同步)用於「無組織的致命心律——心室纖維顫動(VF)、無脈搏VT」，「不是」用於心房顫動(Af若需電擊是用同步整流cardioversion)；④放電時切勿碰觸病人與病床(防施救者觸電)。故錯誤為C。　深入補充：去顫(非同步)用於VF/無脈VT；Af若需電擊用同步整流。電擊板置胸骨右緣第2肋間與左腋前線第5肋間(心尖)。初次能量依機型(單相約360、雙相約120~200焦耳)。放電時勿碰觸病人病床，先清場。","options":{"A":"初次去顫電量約介於50~200(視機型)，屬合理敘述。","B":"電擊板置胸骨右緣第2肋間與左腋前線第5肋間，正確。","C":"錯誤(正解)。去顫常用於VF/無脈VT；心房顫動若電擊應用「同步整流」，非去顫。","D":"電擊時切勿碰觸病人與病床，正確。"},"sources":["新文京《內外科護理學》心律不整","華杏《內外科護理學》心臟血管系統","2023 ACC/AHA/ACCP/HRS 心房顫動指引","2020 AHA ACLS 急救指引"]}},"103100-N3-31":{"quick":"「二尖瓣狹窄」使血液鬱積於左心房→回堵至肺循環，造成肺部鬱血。","detail":{"background":"二尖瓣位於左心房與左心室之間。「二尖瓣狹窄」時左心房血液難以排入左心室→左心房壓力上升、血液鬱積→逆向回堵到肺靜脈與肺微血管→肺循環鬱血(肺水腫、呼吸困難、咳嗽、咳血)。三尖瓣與肺動脈瓣病變影響的是「右心與體循環/肺動脈出口」，不直接造成肺靜脈鬱血。故與肺部鬱血最相關的瓣膜病變是二尖瓣狹窄。　深入補充：二尖瓣狹窄(多由風濕熱)使左心房壓上升、回堵肺循環→肺鬱血(呼吸困難、端坐呼吸、咳
