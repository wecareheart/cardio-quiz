關節、改善功能」而非矯正變形(A錯);保守治療(運動、減重、輔具、避免過度負荷如提重物)為主,人工關節置換是末期保守無效才考慮(C錯,非「最佳首選」);適度低衝擊運動(游泳、騎車)有益,且非絕對禁止慢跑(D過絕對)。故B(避免提重物減負荷)最正確。","options":{"A":"OA復健目的非「矯正變形」,而是減痛保功能。","B":"OA好發承重關節,應避免提重物減負荷→正解。","C":"人工關節置換是末期選項,非最佳首選。","D":"OA可做適度運動,非絕對禁慢跑。"},"sources":["Braddom PM&R, Osteoarthritis rehabilitation"]}},"103100-62":{"quick":"退化性關節炎敘述「錯誤」:不會出現發炎現象→錯,OA急性發作可有局部發炎(滑膜炎、積液)(答C)。","detail":{"background":"退化性關節炎(OA)雖以軟骨退化與骨贅(osteophyte)為核心,但現代觀念認為「發炎」參與其中——OA可有低度滑膜發炎,急性發作時關節腫脹、積液、局部發熱(尤其合併鈣化或過度使用後)。男女好發位置不同(女性手部DIP多);好發膝、髖等承重關節;年齡是最重要危險因子。故C「不會出現發炎現象」錯誤。","options":{"A":"男女好發關節位置不同→正確。","B":"好發膝、髖等承重關節→正確。","C":"OA「不會出現發炎」→錯誤(可有低度滑膜炎/急性發炎),即答案。","D":"年齡是最重要危險因子→正確。"},"sources":["Braddom PM&R, Osteoarthritis (low-grade inflammation)"]}},"104030-62":{"quick":"慢跑者膝外側、股骨外髁前方壓痛、無外傷→腸脛束摩擦症候群(iliotibial band friction syndrome)(答C)。","detail":{"background":"腸脛束摩擦症候群(ITBS)是跑者常見的過度使用傷害:腸脛束在膝屈伸時反覆摩擦「股骨外上髁」,造成膝「外側」疼痛與外髁前方局部壓痛,跑步(尤其下坡)加重,無明確外傷。半月板破裂/側副韌帶扭傷多有扭轉外傷史與關節線壓痛;腰椎間盤突出沿皮節放射。本題慢跑+外髁前壓痛+無外傷→ITBS。","options":{"A":"外側半月板破裂多有扭轉外傷與關節線痛。","B":"L3-4椎間盤突出沿大腿前皮節放射,非局部外髁壓痛。","C":"腸脛束摩擦症候群(跑者外髁前壓痛)→正解。","D":"外側副韌帶扭傷多有外傷史。"},"sources":["Braddom PM&R, Iliotibial band friction syndrome"]}},"105020-74":{"quick":"11歲男童膝前(脛骨粗隆)痛、超音波→奧斯戈德氏病(Osgood-Schlatter syndrome)(答C)。","detail":{"background":"奧斯戈德-施拉特病(Osgood-Schlatter disease)是青少年(尤其活動量大的男孩,11-15歲)脛骨粗隆(髕腱附著處)的牽引性骨突炎(apophysitis),因股四頭肌反覆牽拉未成熟的脛骨結節骨骺,造成脛骨粗隆腫痛、活動加重、局部突起。超音波/X光可見脛骨結節碎裂與軟組織腫脹。本題11歲男童膝前(脛骨粗隆)痛→OSD。骨髓炎/骨肉瘤有全身/破壞性表現;髕腱炎多見成人跳躍者。","options":{"A":"骨髓炎有發燒、全身症狀與骨破壞。","B":"骨肉瘤有侵襲性骨破壞、Codman三角等。","C":"奧斯戈德氏病(脛骨粗隆牽引骨突炎)→正解。","D":"髕腱炎多見成人跳躍者,非青少年脛骨粗隆。"},"sources":["Braddom PM&R, Osgood-Schlatter disease"]}},"105100-57":{"quick":"冰凍肩(frozen shoulder)復健最正確:以「熱療+關節活動(伸展)治療」為主(答A)。","detail":{"background":"冰凍肩(沾黏性關節囊炎,adhesive capsulitis)是肩關節囊發炎纖維化致主動與「被動」活動度皆全面受限(尤其外旋),病程經疼痛期、僵硬期、解凍期。復健以「熱療(增加組織延展性)+漸進性關節活動度/伸展運動」為主,輔以止痛、關節囊內注射;多數可自行緩解但耗時。麻醉下徒手鬆動(manipulation)只在頑固病例選用、非常規;不需特殊醫院器材(居家伸展即可);無法保證100%不復發。故A最正確。","options":{"A":"冰凍肩以熱療+關節活動治療為主→正解。","B":"麻醉下鬆動僅頑固病例選用,非常規。","C":"復健不需特殊醫院器材,居家伸展可行。","D":"無法保證100%治癒不復發。"},"sources":["Braddom PM&R, Adhesive capsulitis (frozen shoulder)"]}},"106020-72":{"quick":"85歲、肩痛>6個月、無肌肉萎縮、超音波旋轉環帶長短軸→棘上肌腱斷裂(supraspinatus tendon tear)(答B)。","detail":{"background":"老年人慢性肩痛常見退化性「旋轉肌袖(尤棘上肌)肌腱病變/撕裂」。超音波是評估旋轉肌袖的首選影像,長軸與短軸切面可見棘上肌腱的全層或部分撕裂(肌腱不連續、低回音缺損、液體填充)。本題以超音波旋轉環帶長短軸顯示→棘上肌腱斷裂。風濕性/化膿性關節炎有發炎全身/感染表現;三角肌撕裂少見。故答棘上肌腱斷裂。","options":{"A":"風濕性關節炎為多關節對稱發炎,非單一肌腱。","B":"超音波旋轉環帶切面顯示棘上肌腱斷裂→正解。","C":"化膿性關節炎有紅腫熱與感染徵象。","D":"三角肌撕裂少見,非旋轉環帶切面所見。"},"sources":["Braddom PM&R, Ultrasound of rotator cuff tear"]}},"106020-73":{"quick":"右肩痛+轉動受限、超音波及X光→肩峰下/三角肌下滑囊炎(subacromial-subdeltoid bursitis)(答C)。","detail":{"background":"肩峰下-三角肌下滑囊(subacromial-subdeltoid bursa)發炎是肩夾擠/旋轉肌袖病變常見伴隨,超音波可見滑囊增厚、積液(低回音帶),X光可正常或見夾擠徵象。本題影像顯示滑囊變化→subacromial-subdeltoid bursitis。鈣化性肌腱變性會見肌腱內鈣化、旋轉肌袖撕裂見肌腱缺損、退化性關節炎見關節腔狹窄骨贅——影像表現不同。故依題給影像為滑囊炎。","options":{"A":"旋轉肌袖斷裂見肌腱缺損(本題以滑囊變化為主)。","B":"退化性關節炎見關節腔狹窄骨贅。","C":"肩峰下-三角肌下滑囊炎(影像滑囊增厚積液)→正解。","D":"鈣化性肌腱變性見肌腱鈣化斑。"},"sources":["Braddom PM&R, Subacromial-subdeltoid bursitis"]}},"106080-61":{"quick":"足踝扭傷最常傷的韌帶=前距腓韌帶(anterior talofibular ligament, ATFL)(答B)。","detail":{"background":"踝關節外側韌帶扭傷(最常見的踝扭傷機轉是「內翻inversion+蹠屈」)最先且最常受傷的是「前距腓韌帶(ATFL)」,因其在蹠屈時最緊張、最弱;次為跟腓韌帶(CFL),後距腓韌帶(PTFL)最少受傷;三角韌帶(deltoid,內側)在外翻傷才受累且較強少傷。故答ATFL。","options":{"A":"後距腓韌帶最少受傷。","B":"前距腓韌帶(ATFL)最常受傷→正解。","C":"「側距腓韌帶」非標準命名(外側韌帶含ATFL/CFL/PTFL)。","D":"三角韌帶在外翻傷才受累,較強少傷。"},"sources":["Braddom PM&R, Ankle sprain (ATFL most common)"]}},"107020-63":{"quick":"僵直性脊椎炎與脊椎骨折關係「正確」:脊椎骨折以「頸椎」最常見(答D)。","detail":{"background":"僵直性脊椎炎(AS)使脊椎韌帶骨化、形成「竹節狀脊椎(bamboo spine)」,整段脊椎僵硬如長骨,失去彈性緩衝→「即使輕微外力也易骨折」(故AS病人比一般人「更易」骨折,A錯);骨折常為跨三柱不穩定骨折、且容易合併「脊髓損傷(比率較一般人高,B錯)」;骨折好發於「頸椎(尤其下頸椎)」(D正確);機轉常為「輕微跌倒/低能量創傷」即可造成(非以車禍高能量為主,C錯)。故D正確。","options":{"A":"AS脊椎僵硬反而「更易」骨折,非不易→錯。","B":"AS骨折合併脊髓損傷比率「較高」,非較低→錯。","C":"AS骨折常為輕微外力,非以車禍最常見→錯。","D":"AS脊椎骨折以頸椎最常見→正解。"},"sources":["Braddom/Rheum, Ankylosing spondylitis spinal fractures (cervical)"]}},"107020-64":{"quick":"61歲、DIP+PIP腫脹+小硬塊(Heberden/Bouchard結節)、無麻木→退化性關節炎(OA)(答C)。","detail":{"background":"手部退化性關節炎(OA)好發遠端指間關節(DIP,形成Heberden結節)與近端指間關節(PIP,形成Bouchard結節)及拇指腕掌關節,呈骨性硬結節、活動時痛、晨僵短(<30分鐘),無全身發炎或麻木。類風濕關節炎(RA)好發MCP與腕關節、對稱性軟組織腫脹、晨僵>1小時;痛風為急性單關節紅腫劇痛(常第一蹠趾);假性痛風好發膝/腕。本題DIP+PIP骨性結節→OA。","options":{"A":"RA好發MCP/腕,對稱軟組織腫,晨僵長。","B":"痛風為急性紅腫劇痛(常蹠趾),非慢性結節。","C":"退化性關節炎(Heberden/Bouchard結節)→正解。","D":"假性痛風好發膝/腕急性發作。"},"sources":["Braddom/Rheum, Hand osteoarthritis (Heberden/Bouchard nodes)"]}},"107020-72":{"quick":"老人跌倒後頸痛+上肢酸麻、頸椎T2 MRI→後縱韌帶骨化(OPLL)(答A)。","detail":{"background":"後縱韌帶骨化(ossification of posterior longitudinal ligament, OPLL)好發於亞洲中老年,頸椎後縱韌帶骨化增厚,造成椎管狹窄與脊髓/神經根壓迫;輕微外傷(跌倒過伸)即可誘發脊髓病變(頸痛、上肢酸麻無力、脊髓壓迫)。MRI/CT可見後縱韌帶骨化壓迫脊髓。對比後骨刺、椎間盤突出影像不同(OPLL為連續性骨化條帶)。本題老人跌倒後頸痛+上肢麻+MRI→OPLL。","options":{"A":"後縱韌帶骨化(OPLL)→老人跌倒後頸髓壓迫→正解。","B":"肌筋膜疼痛無脊髓壓迫影像。","C":"後骨刺為局部退化骨贅,影像不同。","D":"椎間盤突出為軟組織突出,影像不同於骨化條帶。"},"sources":["Braddom/Spine, Ossification of posterior longitudinal ligament (OPLL)"]}},"107080-59":{"quick":"頸椎間盤突出敘述「正確」:中央型(central)突出較易壓迫脊髓(致脊髓病變)(答B)。","detail":{"background":"頸椎間盤突出(HIVD):中央(central)型突出朝椎管中央,較易壓迫「脊髓」造成脊髓病變(myelopathy);外側(lateral/posterolateral)型壓迫「神經根」造成神經根病變(radiculopathy)。C5-6椎間的外側型突出壓迫的是「C6神經根」(頸神經根在該椎間孔出口,C5-6間出C6根)而非C5(C錯)。頸椎HIVD疼痛「可」轉至前胸(可類似心絞痛,A錯)。懷疑神經根病變的EMG不必「一週內」急做(去神經電位需2-3週後才出現,過早做易偽陰性,D錯)。故B正確。","options":{"A":"頸椎HIVD疼痛可轉至前胸(假性心絞痛)→A錯。","B":"中央型突出較易壓迫脊髓→正解。","C":"C5-6外側型壓迫C6神經根(非C5)→C錯。","D":"EMG應待2-3週後做(去神經電位才出現),非一週內→D錯。"},"sources":["Braddom/Spine, Cervical disc herniation (central vs lateral)"]}},"107080-60":{"quick":"籃球員跳投時髕骨下緣痛→膝肌腱炎(髕腱炎,patellar tendinitis/jumpers knee)(答D)。","detail":{"background":"跳投(反覆跳躍)時髕骨「下緣」(髕腱起點)疼痛是「髕骨肌腱病變/肌腱炎(jumpers knee)」的典型——跳躍運動員的過度使用傷害,壓痛點在髕骨下極。ACL斷裂為急性扭轉外傷(關節腫、不穩);骨關節炎多見年長、上下樓痛;半月板破裂為扭轉、關節線痛+卡住。本題跳投+髕骨下緣痛→髕腱炎。","options":{"A":"ACL斷裂為急性扭轉傷,非反覆跳投痛。","B":"膝骨關節炎多見年長者。","C":"半月板破裂有扭轉與關節線痛/卡住。","D":"膝肌腱炎(髕腱炎,jumpers knee)→正解。"},"sources":["Braddom PM&R, Patellar tendinopathy"]}},"108030-63":{"quick":"走十分鐘下肢痠麻、坐下即緩解(神經性跛行)→診斷腰椎管狹窄,最有幫助檢查=MRI(答D)。","detail":{"background":"神經性跛行(neurogenic claudication):走一段路後雙下肢痠痛麻木、「坐下/前彎(屈曲椎管變大)即緩解」,是「腰椎管狹窄(lumbar spinal stenosis)」典型,好發老年。確診最有幫助的影像是「MRI」——可顯示椎管狹窄程度、神經受壓、軟組織(黃韌帶肥厚、椎間盤、硬膜囊)。X光只看骨;EMG/NCS輔助評估神經受累但非定位狹窄最佳。需與血管性跛行(動脈)鑑別(後者站立休息即緩、不需坐下前彎)。故答MRI。","options":{"A":"X光僅看骨,無法顯示椎管軟組織狹窄程度。","B":"EMG輔助評估神經,非定位狹窄最佳。","C":"NCS輔助,非診斷椎管狹窄最佳。","D":"MRI最能顯示腰椎管狹窄與神經受壓→正解。"},"sources":["Braddom/Spine, Lumbar spinal stenosis (MRI)"]}},"108030-64":{"quick":"類風濕關節炎復健「錯誤」:物理治療最重要、多數不需職能治療→錯,RA手部變形與ADL受損,職能治療(關節保護、副木、ADL訓練)非常重要(答C)。","detail":{"background":"類風濕關節炎(RA)復健目標:避免關節變形、維持活動功能(A正確);必要時用矯具(副木)矯正/保護變形關節(B正確);須配合居家與工作環境調整(D正確)。RA常侵犯手部小關節致變形與日常功能受損,「職能治療(關節保護原則、能量節約、輔具、副木、ADL訓練)」與物理治療同等重要、大多數病人「需要」職能治療。故C「多數不需職能治療」錯誤。","options":{"A":"目標避免變形、維持功能→正確。","B":"必要時用矯具矯正變形→正確。","C":"說「多數不需職能治療」→錯誤(RA很需OT),即答案。","D":"配合居家/工作環境適應→正確。"},"sources":["Braddom/Rheum, Rheumatoid arthritis rehabilitation (OT important)"]}},"108080-62":{"quick":"膝OA爬山後急性腫痛積水,「最不適宜」=立即把膝牽拉到正常角度(暴力被動伸展)(答C)。","detail":{"background":"膝退化性關節炎急性發作(爬山後過度使用)出現腫脹積水、屈曲受限。適當處置:相對休息、NSAIDs消炎止痛(A適宜)、TENS止痛(B適宜)、等長運動維持股四頭肌力而不過度負荷關節(D適宜)。「立即把腫痛的膝暴力牽拉到正常角度」會在急性發炎/積水時造成更多疼痛與組織損傷→最不適宜。應待急性發炎緩解後再漸進恢復活動度。","options":{"A":"NSAIDs消炎止痛→適宜。","B":"TENS止痛→適宜。","C":"急性腫痛時立即暴力牽拉至正常角度→最不適宜,即答案。","D":"等長運動維持肌力不增關節負荷→適宜。"},"sources":["Braddom PM&R, Acute knee OA flare management"]}},"108080-63":{"quick":"超音波不易檢測、最需MRI者=肩關節「盂唇(labrum)」(深部關節內結構)(答D)。","detail":{"background":"肌肉骨骼超音波擅長評估「淺層」結構:旋轉肌袖肌腱(棘上、棘下)、滑囊(三角肌下滑囊)、表淺肌腱韌帶。但「肩盂唇(glenoid labrum)」位於關節「深部」、被骨性肩盂與肱骨頭遮蔽,超音波難以完整評估;須用MRI(尤其MR關節攝影MR arthrography)診斷盂唇撕裂(如SLAP、Bankart)。故最需MRI者為盂唇。","options":{"A":"棘上肌腱表淺,超音波可評估。","B":"棘下肌腱表淺,超音波可評估。","C":"三角肌下滑囊表淺,超音波可評估。","D":"肩盂唇位於深部,超音波難測、需MRI→正解。"},"sources":["Braddom PM&R, MSK imaging (labrum needs MRI)"]}},"108080-70":{"quick":"跌倒後兩側腹股溝痛、髖屈曲正常→懷疑脊椎壓迫骨折,最可能節段=L1(胸腰交界)(答C)。","detail":{"background":"骨質疏鬆性脊椎壓迫性骨折好發於「胸腰交界(T12-L1)」,因該處是相對固定的胸椎與活動的腰椎交界、應力集中。L1骨折的疼痛可沿神經分布轉移至「腹股溝/下腹」(L1皮節),且髖關節本身正常(髖屈曲角度正常排除髖部骨折)。本題兩側腹股溝痛+髖屈曲正常+疑壓迫骨折→L1最可能。","options":{"A":"C7為頸椎,與腹股溝痛無關。","B":"T8偏高,非胸腰交界好發處。","C":"L1(胸腰交界)壓迫骨折,痛轉至腹股溝→正解。","D":"L5偏低,非典型骨鬆壓迫骨折好發處。"},"sources":["Braddom PM&R, Osteoporotic vertebral compression fracture (T12-L1)"]}},"109020-62":{"quick":"下背痛的「紅旗(red flag)」=夜間痛且進行性加重(疑腫瘤/感染)(答A)。","detail":{"background":"下背痛紅旗(red flags,提示嚴重病變需進一步檢查):年齡<20或>50初發、夜間痛/休息痛且進行性加重(疑惡性腫瘤/感染)、不明原因體重減輕、發燒、癌症病史、馬尾症候群徵候(鞍區麻、大小便失禁、雙下肢無力)、明顯外傷、進行性神經學缺損、靜脈藥癮/免疫低下。本題「夜間疼痛且愈來愈嚴重」是典型紅旗。BMI高、合併下肢放射痛(常見於HIVD)、曾腰椎手術史皆非紅旗。故答A。","options":{"A":"夜間痛且進行性加重→下背痛紅旗→正解。","B":"BMI高非紅旗。","C":"合併下肢痛(放射痛)常見於HIVD,非嚴重病變紅旗。","D":"曾腰椎手術史非紅旗。"},"sources":["Braddom PM&R, Low back pain red flags"]}},"109020-64":{"quick":"「不是」類風濕關節炎好發部位=腰椎(關節);RA好發腕、MCP、PIP、肩、踝等滑膜關節,少侵犯腰椎(答C)。","detail":{"background":"類風濕關節炎(RA)侵犯「滑膜關節」,好發於手腕、掌指(MCP)、近端指間(PIP)關節、以及肩、肘、膝、踝、足部MTP;在脊椎主要侵犯「頸椎(尤其寰樞關節C1-2,可致半脫位)」而「很少侵犯腰椎」(腰椎主要是退化性與僵直性脊椎炎的範圍)。故RA「不」好發於腰椎關節。","options":{"A":"腕關節是RA好發處。","B":"肩關節可受RA侵犯。","C":"腰椎關節非RA好發處(RA脊椎主要侵犯頸椎)→正解。","D":"踝關節可受RA侵犯。"},"sources":["Braddom/Rheum, RA joint distribution"]}},"109020-73":{"quick":"跌倒後左肩痛、X光如圖——本題官方「送分(一律給分)」;考點為老年跌倒後肩部X光的鑑別(鈣化性肌腱變性vs大結節撕脫骨折vs骨轉移vs原發骨腫瘤)。","detail":{"background":"此題為影像判讀題,考選部判定「一律給分」(送分),四選項皆給分。臨床上老年女性跌倒後肩痛的X光鑑別:鈣化性肌腱變性(肌腱內鈣化白斑、無外傷亦可見)、肱骨大結節撕脫骨折(跌倒外傷後,旋轉肌袖牽拉撕脫)、骨轉移(溶骨/成骨病灶,常多發)、原發成骨性骨腫瘤(少見)。因影像判讀爭議,本題送分;考生應掌握各診斷的影像特徵。","options":{"A":"鈣化性肌腱變性:肌腱內鈣化白斑(送分)。","B":"大結節撕脫骨折:外傷後骨片撕脫(送分)。","C":"骨轉移:常多發溶骨/成骨病灶(送分)。","D":"原發成骨性骨腫瘤:少見(送分)。"},"sources":["Braddom PM&R, Shoulder radiograph; 送分"]}},"109080-70":{"quick":"「不是」纖維肌痛常見表現者=多發性關節炎(關節發炎)(答D)。","detail":{"background":"纖維肌痛症(fibromyalgia)是中樞痛覺敏感化(central sensitization)造成的「廣泛性慢性肌肉骨骼疼痛」,伴隨多處壓痛點、疲倦、睡眠障礙、認知障礙(fibro-fog)、腸激躁症、頭痛、情緒障礙(憂鬱/焦慮)。其關節「無客觀發炎(無紅腫、無關節破壞)」——非發炎性、非自體免疫關節炎。故「多發性關節炎(關節發炎)」不是纖維肌痛表現。","options":{"A":"腸激躁症是纖維肌痛常見共病→是表現。","B":"憂鬱是常見共病→是表現。","C":"認知障礙(fibro-fog)是常見表現。","D":"多發性關節炎(關節發炎)非纖維肌痛表現(其無關節發炎)→正解。"},"sources":["ACR Fibromyalgia; Braddom PM&R"]}},"109080-72":{"quick":"右肩外傷後X光(正位+內旋)敘述「錯誤」:「沒有bony Bankart病灶」→若X光見Hill-Sachs則屬前脫位,常合併bony Bankart;此敘述與影像不符(答B)。","detail":{"background":"肩關節前脫位後的X光徵象:「Hill-Sachs病灶」=肱骨頭後外側因撞擊肩盂前緣形成的壓陷缺損(內旋位X光顯示);常合併「Bankart病灶」=肩盂前下唇/骨緣損傷(bony Bankart為骨性缺損)。這些反映復發性前向不穩定。本題影像可見Hill-Sachs(D正確)、提示有前向不穩定(C正確)、單純肩X光「無法完整評估旋轉肌袖」(A正確,需超音波/MRI)。B說「沒有bony Bankart病灶」與「有Hill-Sachs+不穩定」的影像不符(此情境常見bony Bankart)→為錯誤敘述。","options":{"A":"單純X光無法評估旋轉肌袖(需US/MRI)→正確。","B":"稱「沒有bony Bankart」與Hill-Sachs+不穩定影像不符→錯誤,即答案。","C":"可能有肩關節不穩定→正確。","D":"可見Hill-Sachs病灶→正確。"},"sources":["Braddom/Ortho, Shoulder instability (Hill-Sachs, Bankart)"]}},"110020-62":{"quick":"「不是」足底筋膜炎致病因素=距下關節「旋後(supination)」;足底筋膜炎與過度「旋前(pronation)/扁平足」或高弓足、踝背屈受限有關(答B)。","detail":{"background":"足底筋膜炎(plantar fasciitis)危險因子:足部生物力學異常——「過度旋前(pronation)/扁平足」(牽張足底筋膜)或「高弓足(high-arched/pes cavus)」(緩衝差)、踝背屈受限(蹠屈活動度差、小腿三頭肌緊)、第一蹠趾關節僵硬(hallux limitus,推進期代償)、肥胖、久站、跑步。距下關節「旋後(supination)」不是其致病因素(旋前才是)。故B不是。","options":{"A":"高弓足是致病因素(緩衝差)。","B":"距下關節「旋後」非致病因素(旋前才是)→正解(不是)。","C":"踝背屈/蹠屈活動度變差是因素。","D":"第一蹠趾關節僵硬是因素。"},"sources":["Braddom PM&R, Plantar fasciitis risk factors"]}},"110020-63":{"quick":"足球外側撞擊聽到POP、膝腫脹積血→「先抽取關節積液/積血(hemarthrosis)」(答C)。","detail":{"background":"急性膝外傷後迅速腫脹+聽到「POP」聲常提示前十字韌帶(ACL)斷裂合併「關節積血(hemarthrosis)」。急性處置:RICE、評估韌帶穩定度(Lachman、前後抽屜),腫脹劇痛時可「抽取關節積液/積血」以減壓緩解疼痛並協助診斷(積血提示ACL/骨軟骨/邊緣骨折)。並非緊急開刀(A,ACL手術多延後待消腫後)、後十字韌帶非最可能(B,前外側撞擊+POP多為ACL)、不需急做CT(D,軟組織韌帶用MRI)。故先抽積血。","options":{"A":"急性ACL傷不需緊急開刀(多延後手術)。","B":"前外側撞擊+POP多為ACL(非PCL最可能)。","C":"先抽取關節積血減壓並助診斷→正解。","D":"韌帶/軟組織用MRI評估,非急做CT。"},"sources":["Braddom/Ortho, Acute knee injury with hemarthrosis"]}},"110080-62":{"quick":"僵直性脊椎炎敘述「正確」:肌腱接骨點病變(enthesopathy)比率高於類風濕關節炎(答A)。","detail":{"background":"僵直性脊椎炎(AS,血清陰性脊椎關節病變):特徵為「肌腱/韌帶附著點發炎(enthesitis/enthesopathy)」(如阿基里斯腱、足底筋膜、薦髂關節),此附著點病變是脊椎關節病變的標誌、「比RA(以滑膜炎為主)更顯著」(A正確)。HLA-B27陽性率約90%而非100%(B錯);復健運動應強調脊椎「伸展/後伸與胸廓擴張」以對抗駝背僵直,非「前屈」(C錯);早期薦髂關節X光可能正常,需數年才見侵蝕/硬化,早期靠MRI(D錯)。故A正確。","options":{"A":"AS附著點病變(enthesopathy)比率高於RA→正解。","B":"HLA-B27陽性率約90%,非100%→錯。","C":"AS復健強調脊椎「伸展」非前屈→錯。","D":"早期薦髂關節X光常正常(需MRI)→錯。"},"sources":["Braddom/Rheum, Ankylosing spondylitis (enthesopathy)"]}},"110080-63":{"quick":"長走後雙膝痛+晨僵、X光膝內側關節腔狹窄+軟骨下囊腫→退化性骨關節炎(OA)(答C)。","detail":{"background":"退化性骨關節炎(OA)X光四大特徵:關節腔狹窄(非對稱、承重側為主,如膝內側)、軟骨下硬化(subchondral sclerosis)、軟骨下囊腫(subchondral cyst)、骨贅(osteophyte)。臨床:活動後痛、短暫晨僵(<30分鐘)、好發承重關節(膝、髖)。本題長走後雙膝痛+內側關節腔狹窄+軟骨下囊腫→OA。RA為對稱性侵蝕+骨質疏鬆;痛風見穿鑿狀骨蝕;感染性關節炎有紅腫熱與全身症狀。故答OA。","options":{"A":"RA為對稱性關節周邊侵蝕+骨質疏鬆,非軟骨下囊腫為主。","B":"痛風見邊緣穿鑿狀骨蝕(punched-out)。","C":"退化性骨關節炎(關節腔狹窄+軟骨下囊腫)→正解。","D":"感染性關節炎有急性紅腫熱與全身症狀。"},"sources":["Braddom/Ortho, Osteoarthritis radiographic features"]}},"111080-62":{"quick":"網球肘(tennis elbow)敘述「正確」:最常侵犯「橈側伸腕短肌(ECRB)」肌腱(答D)。","detail":{"background":"網球肘(肱骨外上髁炎,lateral epicondylitis):是伸腕肌總腱起點(肱骨外上髁)的「肌腱病變(tendinosis)」,病理為「退化/血管纖維母細胞增生」而非典型急性發炎(A錯);病變部位在「肌腱起點(外上髁附著處)」而非肌肉肌腱交接處(B錯);肘關節活動度通常正常(C錯);最常受累的是「橈側伸腕短肌(extensor carpi radialis brevis, ECRB)」肌腱(D正確)。臨床:外上髁壓痛、阻力伸腕痛。故D正確。","options":{"A":"病理為退化性肌腱病變,非以發炎為主→錯。","B":"病變在肌腱起點(外上髁),非肌肉肌腱交接處→錯。","C":"肘關節活動度通常正常→錯。","D":"最常侵犯橈側伸腕短肌(ECRB)肌腱→正解。"},"sources":["Braddom PM&R, Lateral epicondylitis (ECRB)"]}},"112020-62":{"quick":"退化性關節炎敘述「最不適當」:髖OA機率「遠高於」膝OA→錯,膝OA比髖OA更常見(答C)。","detail":{"background":"退化性關節炎(OA)流行:致病因素含高齡、長期負重、外傷、基因、肥胖(A正確);常見下肢單一負重關節OA(B正確);手部以「大拇指腕掌關節(第一CMC)」OA最影響功能(D正確)。在亞洲族群「膝關節OA遠比髖關節OA常見」(與西方髖OA較多略不同,但整體膝OA盛行率高);故C「髖OA機率遠高於膝OA」錯誤(應為膝OA較常見)。","options":{"A":"致病因素含高齡/負重/外傷/基因/肥胖→正確。","B":"下肢單一負重關節OA常見→正確。","C":"髖OA「遠高於」膝OA→錯誤(膝OA較常見),即答案。","D":"第一腕掌關節OA影響手功能→正確。"},"sources":["Braddom/Rheum, Osteoarthritis epidemiology"]}},"112020-64":{"quick":"ACL損傷敘述「最適當」:ACL損傷「不一定需要手術」(視活動需求與不穩定程度)(答B)。","detail":{"background":"前十字韌帶(ACL)損傷:ACL限制脛骨相對股骨「向前位移」與「過度內旋(internal rotation)」(A說限制外旋,錯);治療「不一定需手術」——低活動需求、不從事旋轉跳躍運動且膝穩定者可保守(復健強化股四頭/腿後肌、本體感覺、護具),年輕活躍/反覆不穩定者才重建(B正確);ACL診斷靠理學(Lachman最敏感)與「MRI」(非超音波,C錯);若手術一般建議「待急性腫脹消退、恢復活動度後(約受傷3週後)」再重建以降低關節纖維化風險,非受傷一週內(D錯)。故B最適當。","options":{"A":"ACL限制脛骨前移與過度內旋(非外旋)→錯。","B":"ACL損傷不一定需手術(視需求)→正解。","C":"ACL用MRI診斷,非超音波→錯。","D":"重建宜待消腫恢復ROM後(非一週內)→錯。"},"sources":["Braddom/Ortho, ACL injury management"]}},"112080-77":{"quick":"主動上舉痛、被動外展不痛、無紅腫、無斜方肌壓痛→旋轉肌(rotator cuff)損傷(答B)。","detail":{"background":"肩痛鑑別:旋轉肌袖(rotator cuff)病變/夾擠的特徵是「主動上舉(尤外展60-120度疼痛弧)會痛、但被動活動相對不痛」(因主動需肌腱出力),夜間痛,無紅腫變形。冰凍肩(沾黏性關節囊炎)是「主動與被動皆受限」(本題被動外展不痛,不符);纖維肌痛為廣泛性壓痛;肩關節炎有關節破壞與活動度全面受限。本題主動痛、被動不痛→旋轉肌損傷。","options":{"A":"纖維肌痛為廣泛性多處壓痛,非單肩主動痛。","B":"旋轉肌損傷:主動上舉痛、被動不痛→正解。","C":"冰凍肩主動與被動皆受限(本題被動不痛,不符)。","D":"肩關節炎有關節破壞與全面活動受限。"},"sources":["Braddom PM&R, Rotator cuff injury (active painful, passive spared)"]}},"113020-70":{"quick":"乳癌術後最常見肩部失能、最受限角度=外展(abduction)(答A)。","detail":{"background":"乳房切除(尤含腋下淋巴廓清)後,因疤痕沾黏、疼痛、淋巴水腫與胸大肌/腋部組織受影響,肩關節活動「外展(abduction)」與屈曲(前舉)最易受限(過頭動作受影響最明顯)。復健重點為漸進肩外展/屈曲伸展運動與淋巴水腫預防。故最受限角度為外展。","options":{"A":"乳癌術後肩外展最受限→正解。","B":"內收非主要受限方向。","C":"內旋受影響較小。","D":"外旋受影響較外展小。"},"sources":["Braddom PM&R, Post-mastectomy shoulder dysfunction"]}},"113070-63":{"quick":"梨狀肌症候群敘述「最不適當」:緊繃測試把患肢「屈曲、外展、外旋」誘發痛→錯,應是「屈曲、內收、內旋(FAIR)」拉緊梨狀肌誘發痛(答D)。","detail":{"background":"梨狀肌症候群(piriformis syndrome):梨狀肌緊繃/痙攣壓迫坐骨神經,造成臀部深層痛、可放射至大腿後/小腿(類似坐骨神經痛),久坐或姿勢不良誘發(A、B正確),臀部局部痛點(C正確)。誘發測試:梨狀肌是髖「外旋肌」,故「拉緊」它需把髖擺在「屈曲+內收+內旋(FAIR test:Flexion-Adduction-Internal Rotation)」位來伸展梨狀肌、壓迫坐骨神經誘發症狀。本題D說「屈曲、外展、外旋」(外旋是梨狀肌的收縮方向,不會拉緊它)→敘述錯誤。","options":{"A":"臀部深層痛可合併腰痛/下肢放射→正確。","B":"坐姿/站姿不良誘發→正確。","C":"臀部局部痛點→正確。","D":"緊繃測試應為屈曲+內收+內旋(FAIR),非外展外旋→此敘述最不適當,即答案。"},"sources":["Braddom PM&R, Piriformis syndrome (FAIR test)"]}},"114070-68":{"quick":"口腔癌術後牙關緊閉(trismus)復健——本題官方「送分(一律給分)」;牙關緊閉一般定義門齒間距明顯受限,放療常為遲發主因,嚼檳榔者術前即常有,復健應「早期」介入。","detail":{"background":"口腔癌(尤其嚼檳榔者)術後與放療後常見「牙關緊閉(trismus)」——咀嚼肌纖維化致張口受限,影響進食、口腔衛生與生活品質。牙關緊閉診斷常以「門齒間距(inter-incisor distance)」受限為依據(常用界值約<35mm即受限,而非<5公分=50mm,故A的數值有爭議);「放射治療(非化療)」是造成遲發性牙關緊閉的主因;嚼檳榔者(口腔黏膜下纖維化)術前即常有牙關緊閉;復健應「早期」介入(張口運動、被動撐張器)以防纖維化固定,而非等後期。本題因選項爭議經判定「一律給分」(送分)。","options":{"A":"門齒間距界值定義(送分;一般受限界值約<35mm)。","B":"遲發牙關緊閉主因為放療而非化療(送分)。","C":"嚼檳榔者(口腔纖維化)術前常已有牙關緊閉(送分)。","D":"牙關緊閉復健應早期介入,非等後期(送分)。"},"sources":["Braddom PM&R, Trismus in head/neck cancer; 送分"]}},"103030-57":{"quick":"「不」屬深部熱療者=向量干擾波(interferential current)→那是電療(止痛),非熱療(答C)。","detail":{"background":"物理因子熱療分淺層與深層:淺層熱療(熱敷包、紅外線、蠟療、水療,穿透約0.5-2cm);「深層熱療(diathermy)」=短波(short wave)、微波(microwave)、超音波(ultrasound),可加熱較深組織(2-5cm,如關節、肌腱)。向量干擾波(interferential current)是「電療(中頻電刺激)」,用於止痛與肌肉刺激,「不產生深部熱」。故不屬深部熱療者為干擾波。","options":{"A":"短波是深層熱療。","B":"微波是深層熱療。","C":"向量干擾波是電療(非熱療)→正解。","D":"超音波是深層熱療。"},"sources":["Braddom PM&R, Deep heating modalities (SWD/MWD/US)"]}},"105020-07":{"quick":"慢性非癌症疼痛多重治療「錯誤」:麻醉醫師「就只是」用神經阻斷與藥物→錯,疼痛屬多專業團隊照護(答D)。","detail":{"background":"慢性非癌症疼痛採「生物-心理-社會多專業團隊」模式:心理(行為認知治療有助下背痛)、復健(「主動運動」優於「被動按摩」)、職能治療(功能與工作調整)、藥物與介入(疼痛科/麻醉醫師除神經阻斷與藥物外,亦參與整體疼痛管理計畫)。故D把麻醉醫師角色窄化為「就只是神經阻斷與藥物」與多專業整合精神不符→錯誤。","options":{"A":"行為治療幫助下背痛→正確。","B":"主動運動優於被動按摩→正確。","C":"職能治療有助疼痛治療→正確。","D":"麻醉醫師「就只是」神經阻斷與藥物→錯誤(應多專業整合),即答案。"},"sources":["Braddom PM&R, Multidisciplinary chronic pain management"]}},"105020-69":{"quick":"脊髓刺激(SCS)「非」常見適應症=癌症痛(答C)。","detail":{"background":"脊髓電刺激(spinal cord stimulation, SCS)是神經調節介入,常見適應症為「神經病變性疼痛」:脊椎手術後疼痛症候群(failed back surgery syndrome)、複雜性區域疼痛症候群(CRPS)、脊髓損傷相關神經痛、截肢後/幻肢痛、糖尿病周邊神經病變痛、缺血性肢痛。「癌症痛」一般不是SCS的常見適應症(癌痛多用藥物階梯、鞘內幫浦或神經破壞術)。故非常見適應症為癌症痛。","options":{"A":"脊椎術後症候群是SCS適應症。","B":"SCI相關疼痛是SCS適應症。","C":"癌症痛非SCS常見適應症→正解。","D":"截肢後疼痛是SCS適應症。"},"sources":["Braddom PM&R, Spinal cord stimulation indications"]}},"105100-59":{"quick":"長期臥床「不會」出現者=韌帶鬆弛延展性增加→錯,臥床致韌帶/關節囊「攣縮、延展性降低」(答C)。","detail":{"background":"長期臥床/制動(immobilization)的生理反應(廢用症候群):肌肉萎縮、肌力與耐力減退、動作協調變差、心肺去適應(姿勢性低血壓、心跳上升)、骨質流失(廢用性骨質疏鬆)、深部靜脈栓塞、壓瘡、便秘、以及「結締組織(韌帶、關節囊)攣縮、延展性『降低』致關節攣縮」。故C「韌帶鬆弛、延展性增加」與事實相反(應是攣縮、延展性降低)→不會出現。","options":{"A":"肌肉萎縮是臥床反應。","B":"肌力減退是臥床反應。","C":"韌帶鬆弛延展性增加→錯(實為攣縮/延展性降低),正解(不會)。","D":"動作協調變差是臥床反應。"},"sources":["Braddom PM&R, Effects of immobilization / deconditioning"]}},"106080-08":{"quick":"非藥物止痛「不包括」者=腹腔神經叢阻斷(celiac plexus block)→那是侵入性藥物/神經破壞介入(答D)。","detail":{"background":"控制疼痛的「非藥物方法」:經皮神經電刺激(TENS,門閥理論止痛)、針灸(acupuncture)、行為認知治療(behavioral modification)、運動、物理因子(熱冷)、按摩等。「腹腔神經叢阻斷(celiac plexus block)」是注射局麻劑/神經破壞劑的「侵入性介入性疼痛治療(屬藥物/神經阻斷)」,不屬「非藥物」方法。故不包括者為celiac plexus block。","options":{"A":"TENS是非藥物止痛。","B":"針灸是非藥物止痛。","C":"行為治療是非藥物止痛。","D":"腹腔神經叢阻斷屬侵入性藥物/神經阻斷→不屬非藥物,正解。"},"sources":["Braddom PM&R, Non-pharmacologic pain control"]}},"106080-62":{"quick":"脛骨骨折石膏固定期間「最適當」=患肢肌肉「等長運動(isometric exercise)」(維持肌力且不移動骨折處)(答C)。","detail":{"background":"骨折石膏固定期間的復健:被固定的關節無法活動,但應做「等長收縮(isometric exercise)」——肌肉用力收縮但「關節不動、不移動骨折端」,可維持肌力、減少廢用萎縮且不影響骨折癒合。等張(isotonic)運動會移動關節(石膏內無法做且可能移位);完全限制活動會加速萎縮;踝關節在小腿石膏內無法做全關節運動。故等長運動最適當。","options":{"A":"等張運動會移動關節,石膏內無法做。","B":"完全限制活動會加速肌肉萎縮。","C":"等長運動維持肌力且不移動骨折端→正解。","D":"踝關節在石膏固定內無法做全關節運動。"},"sources":["Braddom PM&R, Exercise during fracture immobilization (isometric)"]}},"107020-55":{"quick":"「最不適合」用功能性電刺激(FES)=貝克氏肌肉失養症(肌肉本身病變,FES無法治療肌肉萎縮)(答D)。","detail":{"background":"功能性電刺激(FES)透過刺激「完整的下運動神經/肌肉」誘發功能性收縮。適應症:婦女應力性尿失禁(刺激骨盆底)、SCI預防骨質流失/誘發運動、臥床者刺激小腿肌肉預防DVT、垂足FES、肩半脫位等。但「貝克氏肌肉失養症(Becker MD)」是肌肉本身的遺傳退化性疾病(肌纖維進行性壞死),FES無法逆轉或治療其肌肉萎縮(且過度刺激病變肌肉可能有害)。故最不適合FES者為Becker MD。","options":{"A":"應力性尿失禁可用FES刺激骨盆底→適合。","B":"SCI骨質流失可用FES誘發運動→適合。","C":"臥床防DVT可用FES刺激小腿→適合。","D":"Becker肌失養症(肌肉本身病變)FES無法治療→正解(最不適合)。"},"sources":["Braddom PM&R, Functional electrical stimulation indications"]}},"107080-69":{"quick":"頸椎牽引「絕對禁忌」=Lhermitte徵兆陽性(提示脊髓病變/不穩,牽引可致脊髓傷害)(答B)。","detail":{"background":"頸椎牽引(cervical traction)用於頸神經根病變(radiculopathy)減壓。「絕對禁忌」含:脊髓病變/壓迫徵候(myelopathy)、頸椎不穩定、類風濕關節炎(寰樞不穩)、感染、腫瘤、骨質疏鬆嚴重、椎動脈不全。「Lhermitte徵兆(低頭時電擊感沿脊背向下放射)」陽性提示「脊髓(後柱)受刺激/脊髓病變」,此時牽引可能加重脊髓傷害→絕對禁忌。Spurling測試陽性、頸椎退化、神經根病變反而是牽引的「適應症」。故答Lhermitte陽性。","options":{"A":"Spurling陽性(神經根受壓)是牽引適應症。","B":"Lhermitte陽性(脊髓病變)→牽引絕對禁忌→正解。","C":"頸椎退化性關節炎是牽引可考慮的情況。","D":"頸神經根病變是牽引適應症。"},"sources":["Braddom PM&R, Cervical traction contraindications (myelopathy)"]}},"107080-71":{"quick":"承上(尺神經損傷致手內肌)防肌肉萎縮最合適=功能性電刺激(FES)誘發肌肉收縮(答A)。","detail":{"background":"下運動神經元/周邊神經損傷致去神經肌肉,為延緩肌肉萎縮與纖維化,可用「電刺激誘發肌肉收縮」。其中「功能性電刺激(FES)」直接刺激神經/肌肉產生收縮以維持肌肉量;經皮神經電刺激(TENS)主要是「止痛」(門閥理論)而非誘發收縮;低能量雷射、超音波熱療為輔助,無法有效防去神經肌肉萎縮。故防肌肉萎縮最合適者為FES。","options":{"A":"功能性電刺激(FES)誘發收縮防肌肉萎縮→正解。","B":"TENS主要止痛,非誘發收縮防萎縮。","C":"低能量雷射無法有效防去神經萎縮。","D":"超音波熱療為輔助,非防萎縮主力。"},"sources":["Braddom PM&R, Electrical stimulation for denervated muscle"]}},"108080-65":{"quick":"骨折復健「錯誤」:急性期骨折處「局部熱療」→錯,急性期應冰敷(熱療會增加腫脹出血)(答C)。","detail":{"background":"骨折復健原則:未固定的鄰近關節應儘早活動防僵硬(A正確);老年人步態訓練先用助行器確保安全(B正確);適當漸進負重(weight bearing)可刺激骨癒合(Wolff定律,D正確)。但「急性期」骨折處應「冰敷(冷療)」以減少腫脹、出血與疼痛;「局部熱療」在急性期(出血/發炎期)會「增加血流、加重腫脹出血」→不當(熱療應用於亞急性/慢性期)。故C錯誤。","options":{"A":"未固定關節儘早活動→正確。","B":"老人步態訓練先用助行器→正確。","C":"急性期骨折處局部熱療→錯誤(應冰敷),即答案。","D":"適當負重促進骨折癒合→正確。"},"sources":["Braddom PM&R, Fracture rehabilitation (acute=ice not heat)"]}},"108080-67":{"quick":"肌力訓練「錯誤」:等張運動「就是」等速(等角速度)運動→錯,兩者不同(答C)。","detail":{"background":"肌肉收縮/運動類型:等長(isometric)=肌肉收縮但長度與關節角度不變(對抗固定阻力,如推牆);等張(isotonic)=「阻力(負荷)固定」、肌肉長度改變、關節產生動作(如舉啞鈴,含向心concentric與離心eccentric);等速/等角速度(isokinetic)=「角速度固定」、阻力隨用力調整(需特殊儀器如Cybex)。故「等張≠等速」(C錯誤)。其餘:阻力訓練常含等長收縮(A大致正確)、等長阻力訓練關節不動(B正確)、阻力訓練對心臟負荷較大、心臟病/老人較不建議高阻力(D大致正確)。故答C。","options":{"A":"阻力訓練常含等長收縮成分→敘述大致正確。","B":"等長阻力訓練關節不產生動作→正確。","C":"等張運動「就是」等速運動→錯誤(兩者不同),即答案。","D":"高阻力訓練對心臟負荷大、心臟病/老人較不建議→大致正確。"},"sources":["Braddom PM&R, Types of muscle contraction (isometric/isotonic/isokinetic)"]}},"109020-70":{"quick":"物理治療後出現皮膚病變(燙傷),最可能元兇=熱敷包(hot packs)(答B)。","detail":{"background":"物理治療造成皮膚燙傷最常見於「熱敷包(hot packs)」——若包覆毛巾層數不足、直接接觸皮膚、感覺缺損者或長時間使用,易致接觸性熱燙傷(紅斑、水泡、燙傷)。短波/微波透熱不接觸皮膚但金屬植入物附近過熱有風險;干擾波(電療)與低能量雷射較少致燙傷。本題物理治療後皮膚病變(如圖燙傷)→最可能熱敷包。故答B。","options":{"A":"短波透熱不接觸皮膚,致燙傷較少(但金屬處有風險)。","B":"熱敷包接觸皮膚最易致接觸性燙傷→正解。","C":"干擾波為電療,較少致燙傷。","D":"低能量雷射致燙傷罕見。"},"sources":["Braddom PM&R, Burns from superficial heat (hot packs)"]}},"110080-64":{"quick":"退化性關節炎熱敷「不是」目的者=促進關節面軟骨「再生」→熱敷無法使軟骨再生(答C)。","detail":{"background":"退化性關節炎熱敷(淺層熱療)的目的/效果:改善局部血液循環、減低疼痛、放鬆關節周邊肌肉與韌帶(增加軟組織延展性、減少僵硬)、為運動治療前的準備。但熱敷「無法促進已退化的關節軟骨再生」——OA軟骨退化是不可逆的,熱敷只是症狀緩解,非結構修復。故C不是熱敷目的。","options":{"A":"改善局部血流是熱敷目的。","B":"減低疼痛是熱敷目的。","C":"促進軟骨再生→熱敷無法達成,正解(不是目的)。","D":"放鬆肌肉韌帶是熱敷目的。"},"sources":["Braddom PM&R, Thermotherapy goals in OA"]}},"111080-69":{"quick":"垂足FES主要刺激=深腓神經(deep peroneal nerve)誘發踝背屈(答B)。","detail":{"background":"垂足(drop foot,背屈無力)的功能性電刺激(FES)在步行擺盪期刺激「總腓神經/深腓神經(deep peroneal nerve)」,興奮脛前肌等背屈肌使足背屈、防足尖拖地(常見於中風垂足)。脛神經支配蹠屈肌(相反動作);股神經管股四頭肌;蹠神經為足底感覺。故垂足FES刺激深腓神經。","options":{"A":"脛神經管蹠屈肌(相反動作)。","B":"深腓神經支配背屈肌→垂足FES刺激此→正解。","C":"股神經管股四頭肌伸膝。","D":"蹠神經為足底感覺神經。"},"sources":["Braddom PM&R, FES for foot drop (deep peroneal nerve)"]}},"112020-69":{"quick":"疼痛復健「最不適當」:嚴重疼痛應「優先選擇手術療法」→錯,疼痛復健以多專業保守治療為主,手術非優先(答C)。","detail":{"background":"疼痛復健原則:屬「跨專業團隊」合作模式(A正確);治療涵蓋保守療法、藥物、針刺、物理因子、心理、必要時介入或手術(B正確);適當運動可增加腦內啡(endorphin)、紓壓、減痛(D正確)。但「嚴重疼痛應優先手術」不正確——慢性疼痛應先以多模式保守/復健治療為主,手術僅在明確結構病因且保守無效時才考慮,非「優先」。故C最不適當。","options":{"A":"疼痛復健為團隊合作模式→正確。","B":"疼痛控制含保守、針刺、手術等多元→正確。","C":"嚴重疼痛「優先選手術」→錯誤(保守優先),即答案。","D":"運動增加腦啡、紓壓、減痛→正確。"},"sources":["Braddom PM&R, Pain rehabilitation principles"]}},"112080-62":{"quick":"物理因子敘述「最不適當」:物理因子「只應用在復健醫學領域」→錯,物理因子廣泛用於各科(運動醫學、骨科、神經科等)(答B)。","detail":{"background":"物理因子(physical modality)涵蓋:動力(運動/牽引)、聲能(超音波)、光/電磁能(雷射、紅外線、紫外線)、電能(各式電療)、熱能(含冷療)、水療等(A、D正確);熱療(thermotherapy)=增加熱能、冷療(cryotherapy)=降低熱能(C正確)。物理因子並非「只用在復健醫學」——骨科、運動醫學、神經科、疼痛科、長照等廣泛應用。故B「只應用在復健醫學領域」最不適當。","options":{"A":"物理因子涵蓋動力/聲/光電/熱/水療→正確。","B":"物理因子「只用在復健醫學」→錯誤(各科廣用),即答案。","C":"熱療增熱、冷療降熱→正確。","D":"熱傳遞含傳導/對流/輻射/蒸發/轉換→正確。"},"sources":["Braddom PM&R, Physical modalities overview"]}},"114020-63":{"quick":"冷療敘述「最不適當」:冷療對慢性疼痛「效果不好、應避免使用」→錯,冷療對慢性疼痛(如肌筋膜)亦有止痛效果可用(答B)。","detail":{"background":"冷療(cryotherapy)效應:血管收縮→降低急性發炎、減少出血腫脹、止痛(降低神經傳導與代謝)(A正確);過度/過久冷療可致循環障礙、凍傷、神經麻痺(C正確);冷水浴藉對流降溫,可用於局部燒燙傷後快速降溫(D正確)。冷療不僅用於急性傷害,對「慢性疼痛(如肌筋膜疼痛、痙攣)」亦有止痛與降張力效果,並非「效果不好應避免」。故B最不適當。","options":{"A":"冷療使血管收縮、降發炎、減腫、止痛→正確。","B":"冷療對慢性疼痛「效果不好應避免」→錯誤(慢性痛亦可用),即答案。","C":"過度冷療可致循環障礙→正確。","D":"冷水浴對流降溫可用於燒燙傷後降溫→正確。"},"sources":["Braddom PM&R, Cryotherapy applications"]}},"114020-69":{"quick":"疼痛傳導敘述「錯誤」:Aδ纖維「無法精準定位」→錯,Aδ(快痛、有髓鞘)傳導快、定位「精準」;C纖維(慢痛、無髓鞘)才定位不清(答C)。","detail":{"background":"痛覺傳導:快痛(fast/first pain)由「Aδ纖維(有髓鞘、傳導快)」傳導,為尖銳、定位「精確」的痛;慢痛(slow/second pain)由「C纖維(無髓鞘、傳導慢)」傳導,為鈍痛、灼痛、定位「不精確、瀰漫」(A、B正確)。TENS經皮神經電刺激透過「門閥控制理論(gate control)」刺激粗的Aβ纖維抑制痛覺傳入(D正確)。故C說「Aδ纖維無法精準定位」與事實相反(Aδ定位精準,是C纖維定位不清)→錯誤。","options":{"A":"痛覺分快痛與慢痛→正確。","B":"快痛由Aδ、慢痛由C纖維傳導→正確。","C":"說Aδ「無法精準定位」→錯誤(Aδ定位精準,C纖維才不精準),即答案。","D":"TENS經門閥理論止痛→正確。"},"sources":["Braddom PM&R, Pain transmission (Aδ vs C fibers); gate control theory"]}},"114070-62":{"quick":"電療敘述「最不適當」:對「剛發生未固定的骨折部位」電刺激有很大幫助→錯,新鮮未固定骨折處電刺激/肌肉收縮會致骨折移位,不當(答C)。","detail":{"background":"電療(electrotherapy)生理效應:抑制疼痛(門閥理論/內啡釋放)、增加局部循環、減少肌肉痙攣(A、B正確);干擾波電療電極環繞治療部位以使中頻電流在深部交叉產生治療效應(D正確)。但「剛發生、未經固定的骨折部位」施以電刺激誘發肌肉收縮,會造成「骨折端移位」、妨礙癒合→不當(電刺激/運動需待骨折穩定固定後)。故C最不適當。(註:特定「骨生長刺激器」用於延遲癒合是另一回事,且非急性未固定骨折處肌肉電刺激。)","options":{"A":"電療可抑制疼痛→正確。","B":"電療增加循環、減少肌肉痙攣→正確。","C":"對「剛發生未固定骨折」電刺激「很有幫助」→錯誤(會致移位),即答案。","D":"干擾波電極環繞治療部位→正確。"},"sources":["Braddom PM&R, Electrotherapy precautions"]}},"101030-61":{"quick":"CABG術後1週心肺復健「最不適合」=此時做「上半身肌力訓練」→錯,胸骨切開術後需保護胸骨(胸骨防護),早期避免上肢用力與抗阻訓練(答B)。","detail":{"background":"冠狀動脈繞道手術(CABG)經「胸骨正中切開」,術後約6-8週胸骨才癒合,故早期需「胸骨防護(sternal precautions)」——避免上肢推拉抗阻、提重物與軀幹過度旋轉,以防胸骨裂開。早期(住院期/第一期)心臟復健可做坐起、移位、步行等下肢與低強度有氧活動(C適合),CABG病人因無心肌壞死、通常比心肌梗塞病人可「較早」進展復健(A適合),術後2-3週可做運動測試評估(D適合)。但「上半身肌力(抗阻)訓練」在術後1週(胸骨未癒)應避免→最不適合。故答B。","options":{"A":"CABG病人通常可較MI病人早進行心肺復健→適合。","B":"術後1週做上半身肌力訓練違反胸骨防護→最不適合,即答案。","C":"可進行坐起、移位、步行等活動→適合。","D":"術後2-3週可做運動測試→適合。"},"sources":["Braddom PM&R, Cardiac rehab post-CABG (sternal precautions)"]}},"102030-63":{"quick":"心臟移植病人(去神經心臟,心率不受自律神經調控)運動強度最適指標=自覺用力係數(RPE/Borg scale)(答A)。","detail":{"background":"心臟移植後,供心被「去神經(denervated)」,失去自律神經支配——運動時心率「不會立即隨交感反應上升」(反應遲鈍、靠循環中兒茶酚胺才緩慢上升),休息心率偏高。因此「心率」不適合作為運動強度指標。最適當的是依「自覺用力係數(rating of perceived exertion, RPE/Borg量表)」來調控強度。血壓、SpO2亦非主要強度依據。故答RPE。","options":{"A":"自覺用力係數(RPE/Borg)是去神經心臟運動強度的最適指標→正解。","B":"心率因心臟去神經反應遲鈍,不適合作指標。","C":"血壓非主要運動強度指標。","D":"SpO2非運動強度指標。"},"sources":["Braddom PM&R, Exercise in cardiac transplant (RPE; denervated heart)"]}},"102110-63":{"quick":"ABI 0.48(重度周邊動脈疾病)的心肺測試「最不可能」=最大攝氧量(peak VO2)正常→PAD下肢缺血限制運動,peak VO2應下降(答A)。","detail":{"background":"踝肱指數(ABI)0.48屬「重度周邊動脈疾病(PAD)」(正常0.9-1.3,<0.5重度缺血)。PAD病人運動時下肢缺血、間歇性跛行限制運動能力:最大攝氧量(peak VO2)「下降」、無氧閾值(AT)提早(下降)、常因跛行痛而提早終止運動致「未達年齡預期最大心跳率」、加上常合併心血管病可能血壓異常反應。故「peak VO2正常」最不可能(應下降)。故答A。","options":{"A":"重度PAD下peak VO2應下降,說「正常」最不可能→正解。","B":"PAD合併心血管病可有血壓異常反應→可能。","C":"運動能力受限致無氧閾值下降→可能。","D":"因跛行痛提早終止致未達預期最大心率→可能。"},"sources":["Braddom PM&R, Exercise testing in PAD (low ABI)"]}},"102110-65":{"quick":"心肌病變運動測試預後「最正確」:無法達到85%預期最大心率(變時性不全)→預後不佳(答A)。","detail":{"background":"運動測試的預後指標:無法達到85%年齡預期最大心率(變時性功能不全chronotropic incompetence)、運動能力(peak VO2)低、運動誘發ST下降、運動後心率恢復(heart rate recovery)「緩慢」皆預後「不佳」。辨析各選項:A「無法達85%預期最大心率→預後不佳」正確;B「心率×收縮壓(rate-pressure product,反映心肌耗氧)愈高代表運動耐受愈差」錯誤(達到較高RPP通常代表能承受較大負荷、運動能力較佳);C「運動後心率快速回復代表體適能差」錯誤(快速恢復代表副交感佳、預後好);D「一開始即出現ST下降預後較佳」錯誤(早期出現缺血代表嚴重、預後差)。故A正確。","options":{"A":"無法達85%預期最大心率→預後不佳→正解。","B":"rate-pressure product愈高代表耐受愈差→錯(高RPP代表能力較佳)。","C":"運動後心率快速回復代表體適能差→錯(快速恢復是好現象)。","D":"一開始即ST下降預後較佳→錯(早期缺血預後差)。"},"sources":["Braddom PM&R, Prognostic value of exercise testing"]}},"103030-66":{"quick":"1 MET≈3.5 mL O2/kg/min;70kg成人休息耗氧=3.5×70≈245 mL/min(答C)。","detail":{"background":"代謝當量(MET)定義:1 MET = 休息(躺平)時的耗氧量 = 3.5 mL O2 / kg 體重 / 分鐘。70公斤成人在1 MET(休息)時每分鐘耗氧 = 3.5 × 70 = 245 mL/min。MET是心臟復健活動強度的常用單位(如步行2-3 METs、慢跑7-8 METs)。故答245 mL。","options":{"A":"70 mL過低(未乘3.5×體重)。","B":"210 mL為3×70,但1 MET=3.5 mL/kg/min,非3。","C":"3.5×70=245 mL/min→正解。","D":"280 mL為4×70,過高。"},"sources":["Definition of MET (3.5 mL O2/kg/min)"]}},"103030-78":{"quick":"急性心肌梗塞後復健敘述「錯誤」(官方多重A、B):A「應出院後才轉介」→錯(住院第1期即開始);B「女性參與比率較高」→錯(女性參與率反而較低)。","detail":{"background":"心臟復健分期:第I期(住院期,MI/CABG病情穩定後「住院中即開始」早期活動、衛教,非等出院後才轉介)、第II期(出院後監督下門診運動)、第III/IV期(維持期)。已證實心臟復健可改善短期與長期死亡率(D正確);但目前「使用率仍偏低」(C正確);而「女性、老年、社經弱勢」族群的「參與率反而較低」(B說女性參與率較高,錯誤)。故官方判定A(應出院後才轉介)與B(女性參與率較高)皆為錯誤敘述(多重給分)。","options":{"A":"說「應出院後才轉介」→錯誤(住院第I期即開始),給分。","B":"說「女性參與比率較高」→錯誤(女性參與率較低),給分。","C":"心臟復健使用率仍偏低→正確敘述。","D":"可改善短期與長期死亡率→正確敘述。"},"sources":["Braddom PM&R, Cardiac rehabilitation phases (官方多重答案A、B)"]}},"103100-65":{"quick":"心臟復健的目的=增進心臟功能+減少殘障+找出並改善危險因子(1234皆是,但「治療心臟病」本身廣義亦含)→答D(全部)。","detail":{"background":"心臟復健是「全面性的次級預防計畫」,目的包含:增進心臟功能與運動耐受(2)、減少失能/殘障與提升生活品質(3)、找出並改善心血管危險因子(戒菸、血脂血壓血糖控制、體重、運動)(4),並透過運動、衛教、心理與危險因子管理整體「治療與管理心臟疾病(1,廣義)」、降低再發與死亡。本題選1234全包含(D)。","options":{"A":"僅1、2不完整。","B":"僅3、4不完整。","C":"僅123漏掉危險因子管理。","D":"1234全是心臟復健目的→正解。"},"sources":["Braddom PM&R, Goals of cardiac rehabilitation"]}},"103100-66":{"quick":"胸腔復健「主要目的不是用於痰液排除」者=橫膈呼吸(diaphragmatic breathing)(答D)。","detail":{"background":"氣道清潔(排痰)技術:背部叩擊(percussion)、震動(vibration)、姿勢性引流(postural drainage,利用重力引流各肺葉分泌物)、有效咳嗽(huff cough)、拍痰、主動循環呼吸技術等——目的是「移除分泌物(排痰)」。「橫膈(腹式)呼吸(diaphragmatic breathing)」的主要目的是「改善呼吸型態與效率、增加潮氣量、減少呼吸功、放鬆」,而非排痰。故答D。","options":{"A":"背部叩擊用於鬆動分泌物→排痰。","B":"有效咳嗽用於排出分泌物→排痰。","C":"姿勢性引流用重力引流分泌物→排痰。","D":"橫膈呼吸目的是改善呼吸型態,非排痰→正解。"},"sources":["Braddom PM&R, Airway clearance vs breathing exercises"]}},"104030-66":{"quick":"急性MI無併發症者,心臟復健(第I期)「住進CCU第1天」即開始(早期活動)(答A)。","detail":{"background":"無併發症(無心律不整、無心衰、血液動力穩定)的急性心肌梗塞病人,現代心臟復健主張「早期介入」——住進加護病房(CCU)後「第1天」即開始第I期(住院期)復健:漸進的床上活動、坐起、低強度ADL與衛教,而非長期臥床。早期活動可減少臥床併發症、加速恢復。故最佳開始時機為住進CCU第1天。","options":{"A":"無併發症MI住進CCU第1天即開始(早期活動)→正解。","B":"臥床1週才開始過晚。","C":"臥床4-6週嚴重延誤。","D":"等轉普通病房才開始過晚。"},"sources":["Braddom PM&R, Early cardiac rehab after uncomplicated MI"]}},"104090-64":{"quick":"「不屬於」心臟復健有氧訓練=舉重(weightlifting,屬阻力/無氧運動)(答D)。","detail":{"background":"心臟復健有氧(耐力)運動:固定式腳踏車、跑步機、游泳、快走、有氧舞蹈等「大肌群、持續、中強度」運動,可提升最大攝氧量。「舉重(weightlifting)」屬高強度「阻力/無氧」運動,會大幅增加心臟後負荷(Valsalva致血壓驟升),非有氧訓練(心臟病人若做阻力訓練須低阻力多次數、避免閉氣)。故不屬有氧者為舉重。","options":{"A":"固定式腳踏車是有氧訓練。","B":"跑步機運動是有氧訓練。","C":"游泳是有氧訓練。","D":"舉重屬阻力/無氧運動,非有氧→正解。"},"sources":["Braddom PM&R, Aerobic exercise in cardiac rehab"]}},"104090-65":{"quick":"肺復健運動時血氧分壓「≦60 mmHg」可考慮給氧(答D)。","detail":{"background":"運動時補充氧氣的考量依血氧:當動脈血氧分壓(PaO2)≦55-60 mmHg(或SpO2≦88%)時屬低血氧,應考慮給氧;在肺復健運動訓練中,若運動誘發PaO2降至「≦60 mmHg」即可考慮同時給氧以維持組織供氧、提升運動耐受並避免低血氧傷害。PaO2在61 mmHg以上多不需常規給氧。故答≦60 mmHg。","options":{"A":"81-91 mmHg正常,不需給氧。","B":"71-80 mmHg尚足,不需常規給氧。","C":"61-70 mmHg接近但未達給氧門檻。","D":"≦60 mmHg屬低血氧,應考慮給氧→正解。"},"sources":["Braddom PM&R, Supplemental O2 in pulmonary rehab (PaO2≤60)"]}},"106020-64":{"quick":"「不可」作為心臟病患運動強度指標=血氧濃度;運動強度用心率%、RPE、MET(答A)。","detail":{"background":"心臟復健運動「強度」處方指標:最大心率百分比(target HR,如60-80% HRmax或心率儲備法Karvonen)、自覺用力量表(RPE/Borg)、代謝當量(MET,對應活動能量)、無氧閾值(由心肺運動測試)。「血氧濃度(SpO2)」反映「氧合(肺/呼吸)」狀態,並非運動「強度」的指標(它在心肺疾病監測安全用,但不用來訂運動強度)。故不可作強度指標者為血氧濃度。","options":{"A":"血氧濃度反映氧合,非運動強度指標→正解(不可)。","B":"最大心率%是運動強度指標。","C":"運動自覺量表(RPE)是強度指標。","D":"MET(代謝當量)是強度指標。"},"sources":["Braddom PM&R, Exercise intensity prescription indices"]}},"106020-65":{"quick":"MI第一期(急性住院期)復健「不包含」:運動中監控血壓上下「不可超過20mmHg」→過嚴/敘述不當(答D)。","detail":{"background":"心肌梗塞第I期(住院急性期)復健:儘早活動(early mobilization,A)、低強度活動(約2-3 METs以內,如坐起、如廁、緩慢步行甚至下少量樓梯,B、C合理)、密切監測。關於血壓監測,常見安全停止指標是「運動中收縮壓『下降』≧10-20mmHg(伴缺血徵象)」或「收縮壓過度上升(如>180-200)」需警惕;本題D「血壓上升或下降不可超過20mmHg」把上升與下降都框在20mmHg、表述不符標準監測準則(尤其運動本來收縮壓會生理性上升超過20mmHg)→屬不恰當/不包含的敘述。故答D。","options":{"A":"儘早活動是第I期原則→包含。","B":"可做低強度活動(下少量樓梯)→包含。","C":"2-3 METs以內活動→包含。","D":"「血壓上升或下降不可超過20mmHg」表述不符監測準則→不包含,即答案。"},"sources":["Braddom PM&R, Phase I cardiac rehab monitoring"]}},"106080-60":{"quick":"有氧訓練後「次強度運動」生理變化「錯誤」:心輸出量「增加」→錯,同一次強度負荷下心輸出量需求不變(甚至略降),主要是心率降、每搏量增、A-V O2差增(答A)。","detail":{"background":"規律有氧訓練的適應:在「相同的次強度(submaximal)負荷」下,訓練後「心率下降、每搏輸出量增加、動靜脈含氧差(A-V O2 difference)上升(組織攝氧效率增)、收縮壓下降、心肌耗氧降低」;由於同一外在負荷的氧需求相同,該負荷下的「心輸出量大致不變(或略降)」,而非增加(增加的是『最大』運動時的心輸出量上限)。故A說次強度運動時心輸出量「增加」錯誤。","options":{"A":"同一次強度負荷下心輸出量不增(略降)→此敘述錯誤,即答案。","B":"訓練後同負荷心率降低→正確。","C":"動靜脈含氧差上升(攝氧效率增)→正確。","D":"同負荷收縮壓下降→正確。"},"sources":["Braddom PM&R, Physiologic adaptations to aerobic training"]}},"106080-65":{"quick":"「不是」心臟復健造成的變化=增加「預估最大心率」→錯,最大心率主要由年齡決定,訓練不會提高(答A)。","detail":{"background":"心臟復健(有氧訓練)的生理變化:最大攝氧量(VO2 max)增加、同一負荷下心肌耗氧(心率×血壓)降低、周邊血管阻力下降、靜息與次強度心率下降、每搏量增加。但「最大心率(maximum heart rate)」主要由「年齡」決定(約220−年齡),訓練「不會增加最大心率」(甚至高度訓練者略低)。故A「增加預估最大心率」不是訓練造成的變化。","options":{"A":"增加最大心率→非訓練造成(最大心率由年齡決定)→正解。","B":"增加最大耗氧量(VO2 max)→是訓練效果。","C":"降低運動時最大心肌耗氧→是訓練效果。","D":"降低周邊血管阻力→是訓練效果。"},"sources":["Braddom PM&R, Effects of cardiac rehabilitation"]}},"106080-66":{"quick":"心臟病運動訓練「禁忌症」=嚴重主動脈狹窄(severe aortic stenosis)(答B)。","detail":{"background":"運動訓練的「絕對禁忌/高危」含:嚴重「主動脈瓣狹窄(severe AS)」(運動時心輸出無法相應增加、易暈厥猝死)、不穩定型心絞痛、未控制的心律不整或心衰竭、急性心肌炎/心包膜炎、急性主動脈剝離、嚴重未控制高血壓等。選項中:服用乙型阻斷劑(A,反而是常規用藥,只是訓練心率目標需調整)、第一度房室傳導阻滯(C,輕微非禁忌)、心臟移植病人(D,可且應參與心臟復健)皆非禁忌。故禁忌為嚴重主動脈狹窄。","options":{"A":"服用乙型阻斷劑非禁忌(調整心率目標即可)。","B":"嚴重主動脈狹窄是運動訓練禁忌→正解。","C":"第一度房室傳導阻滯輕微,非禁忌。","D":"心臟移植病人可參與心臟復健。"},"sources":["Braddom PM&R, Contraindications to exercise (severe AS)"]}},"108030-66":{"quick":"COPD呼吸運動敘述「錯誤」:撅唇呼吸強調「快而淺」→錯,撅唇呼吸是「慢而深、延長吐氣」(答B)。","detail":{"background":"COPD呼吸運動:教導前先放鬆(A正確);「撅唇呼吸(pursed-lip breathing)」是用鼻吸氣、噘嘴「緩慢延長吐氣」,在呼氣期維持氣道正壓、防止小氣道塌陷與氣體陷積(air trapping)、減少呼吸頻率與呼吸困難——強調「慢而深、吐氣長」而非「快而淺」(故B錯誤);撅唇呼吸維持呼氣期氣道正壓(C正確);對部分嚴重COPD(過度充氣、橫膈低平)病人,橫膈式呼吸反而可能增加呼吸功、不一定優於自然呼吸(D正確)。故B錯誤。","options":{"A":"呼吸運動前先學放鬆→正確。","B":"撅唇呼吸強調「快而淺」→錯誤(應慢而深、長吐氣),即答案。","C":"撅唇呼吸維持呼氣期氣道正壓→正確。","D":"某些COPD病人橫膈呼吸可能增加呼吸功→正確。"},"sources":["Braddom PM&R, Breathing exercises in COPD (pursed-lip)"]}},"109020-65":{"quick":"心臟復健「絕對禁忌」=急性心包膜炎或心肌炎(答C)。","detail":{"background":"心臟復健/運動訓練的「絕對禁忌」含:不穩定心絞痛、未控制的心律不整、嚴重症狀性主動脈狹窄、失代償心衰竭、「急性心肌炎或心包膜炎」、急性主動脈剝離、急性肺栓塞/深部靜脈栓塞、近期心肌梗塞合併併發症等。選項中:急性MI(穩定後)、CABG術後、心臟移植病人皆「應」接受心臟復健(非禁忌),只有「急性心包膜炎/心肌炎」是絕對禁忌(運動可加重發炎、致心律不整與猝死)。故答C。","options":{"A":"急性MI穩定後是心臟復健適應症,非絕對禁忌。","B":"CABG術後是心臟復健適應症。","C":"急性心包膜炎/心肌炎是運動絕對禁忌→正解。","D":"心臟移植病人應接受心臟復健。"},"sources":["Braddom PM&R, Absolute contraindications to cardiac rehab"]}},"109080-65":{"quick":"肺復健運動處方「錯誤」:活動性呼吸窘迫(exertional dyspnea)是「絕對禁忌」→錯,運動性呼吸困難正是肺復健「要處理的對象」而非禁忌(答D)。","detail":{"background":"肺部復健(pulmonary rehabilitation):核心是有氧運動訓練(A正確),訓練前可做完整心肺運動測試評估(B正確),任何影響運動的共病應先評估控制(C正確)。「活動性(運動性)呼吸困難(exertional dyspnea)」是慢性肺病病人的主要症狀,正是肺復健「要改善的目標」(透過運動訓練、撅唇呼吸、能量節約等減輕呼吸困難),並非禁忌。故D「活動性呼吸窘迫是絕對禁忌」錯誤。(肺復健禁忌是嚴重不穩定共病如不穩定心臟病、嚴重肺高壓不穩等。)","options":{"A":"有氧運動是肺復健重要一環→正確。","B":"肺復健前可做心肺運動測試→正確。","C":"影響運動的共病應先控制→正確。","D":"運動性呼吸困難是肺復健目標而非禁忌→此敘述錯誤,即答案。"},"sources":["Braddom PM&R, Pulmonary rehabilitation exercise prescription"]}},"110080-65":{"quick":"術前後肺復健「錯誤」:術後擺位「把好的肺葉放在上方」→錯,原則是「好肺在下(good lung down)」以利好肺通氣灌流(答C)。","detail":{"background":"手術前後肺部照護:胸腹部手術後肺併發症以「肺泡塌陷(atelectasis)與肺炎」最常見(A正確);術前即介入預防性胸腔照護(誘發性肺量計、咳痰訓練、衛教)可降低術後罹病率與死亡(B、D正確)。關於擺位:一般原則是「好肺(健側)在下、患肺在上(good lung down)」——使灌流較多的下肺為通氣較佳的健肺,改善通氣灌流匹配與氧合(嬰兒與大量單側肺出血等特殊情況例外)。本題C說「把好的肺葉放在上方」與此相反→錯誤。","options":{"A":"術後肺併發症以肺泡塌陷與肺炎最常見→正確。","B":"預防性胸腔照護降低術後罹病死亡→正確。","C":"擺位應「好肺在下」非「好肺在上」→此敘述錯誤,即答案。","D":"術前即接受整體胸腔照護→正確。"},"sources":["Braddom PM&R, Perioperative pulmonary care (good lung down)"]}},"111020-66":{"quick":"心臟復健訓練效果=增加最大攝氧量(VO2 max)(答A)。","detail":{"background":"心臟復健(規律有氧訓練)的效果:最大攝氧量(VO2 max)「增加」(運動能力提升)、最大動靜脈含氧差「增加」(組織攝氧效率提升)、靜息與次強度心率「下降」、血紅素不會因訓練而降低(耐力運動者血漿量增多可能稀釋性「假性」貧血,但非真正降血紅素)。故訓練效果為「增加最大攝氧量」。其餘選項(降血紅素、減少A-V O2差、增加休息心率)皆與訓練效果相反。","options":{"A":"增加最大攝氧量(VO2 max)→正解。","B":"訓練不會降低血紅素。","C":"A-V O2差應增加(攝氧效率提升),非減少。","D":"休息心率應下降,非增加。"},"sources":["Braddom PM&R, Training effects of cardiac rehab"]}},"113020-65":{"quick":"6分鐘行走測試(6MWT)「最恰當」:主要用於功能性活動評估,常用於心肺疾病的運動耐力評估(答A)。","detail":{"background":"六分鐘行走測試(6-minute walk test, 6MWT):測量病人在6分鐘內於平直走道(標準長度約30公尺直線走道、硬地)能走的距離,是評估「功能性運動能力(submaximal)」的簡易、安全、可重複工具,廣泛用於慢性心肺疾病(COPD、心衰、肺高壓)的運動耐力評估與治療反應追蹤。它能整體反映心肺、肌肉骨骼與循環系統交互作用(故B說「較不適用評估交互作用」錯誤);有標準化流程規範(C說流程因人而異無規範,錯誤);走道為硬地(D說軟性地板,錯誤)。故A最恰當。","options":{"A":"6MWT用於功能性活動/運動耐力評估(心肺疾病)→正解。","B":"6MWT整體反映多系統交互作用(非不適用)→錯。","C":"6MWT有標準化流程規範(非因人而異)→錯。","D":"走道應為硬地約30公尺直線(非軟性地板)→錯。"},"sources":["ATS 6-minute walk test guidelines; Braddom PM&R"]}},"113070-65":{"quick":"CABG後心臟復健的好處=改善血清脂質(ameliorated serum lipids)(答C)。","detail":{"background":"心臟復健對CABG/冠心病人的益處(次級預防):提升運動能力與最大攝氧量、「提高缺血閾值(可承受更高負荷才出現缺血,非降低)」、改善內皮功能、降低靜息與運動時心率/血壓與心肌耗氧、改善「血脂(降低LDL/三酸甘油酯、提升HDL)」與血糖控制、降低安靜兒茶酚胺、改善心理與降低再住院/死亡。辨析:A「降低缺血閾值」錯(應提高);B「改善右心室功能」非主要效果;D「增加血漿兒茶酚胺」錯(應降低)。故C(改善血脂)正確。","options":{"A":"心臟復健「提高」缺血閾值,非降低→錯。","B":"改善右心室功能非心臟復健主要好處。","C":"改善血清脂質(降LDL/TG、升HDL)→正解。","D":"心臟復健「降低」安靜兒茶酚胺,非增加→錯。"},"sources":["Braddom PM&R, Benefits of cardiac rehab (lipids)"]}},"114020-65":{"quick":"「最適合」開始心臟復健的對象=休息血壓160/100的高血壓心臟病人(輕中度可控,非禁忌)(答C)。","detail":{"background":"心臟復健開始前需排除「絕對禁忌/不穩定」狀態。辨析:A不穩定型心絞痛=絕對禁忌;B「由臥姿變坐姿收縮壓下降30mmHg」=明顯姿勢性低血壓(運動易暈厥)需先處理;D未裝節律器的「第三度(完全)房室傳導阻滯」=危險心律(運動可猝死)屬禁忌;C休息血壓160/100屬「輕中度高血壓」(運動前安全上限常設收縮壓<180-200、舒張<110),此程度可在監測下開始運動且運動本身有助降壓——相對最適合開始。故答C。","options":{"A":"不穩定型心絞痛是絕對禁忌。","B":"姿勢性低血壓(站起收縮壓降30)需先處理。","C":"休息血壓160/100(輕中度)可監測下開始心臟復健→正解。","D":"未裝節律器的第三度房室阻滯屬危險,禁忌。"},"sources":["Braddom PM&R, Patient selection for cardiac rehab"]}},"114070-65":{"quick":"呼吸加護病房早期胸腔復健「最恰當」:早期復健介入可協助「改善呼吸器脫離率」(答D)。","detail":{"background":"重症/呼吸加護病房的「早期復健(early mobilization)」實證:在生命徵象穩定下「儘早(常在48-72小時內)介入」漸進活動(被動到主動關節活動、坐起、站立、床邊活動)安全且有益——可減少ICU後肌無力(ICU-acquired weakness)、譫妄、住院天數,並「協助改善呼吸器脫離(weaning)率」與功能預後。辨析:A「三天內介入不宜」錯(穩定即可早期介入);B意識清楚者應做「主動」運動(非被動);C意識不清者復健不只訓練呼吸肌力(含被動ROM、擺位、感覺刺激)。故D最恰當。","options":{"A":"生命穩定下三天內介入「不宜」→錯(應早期介入)。","B":"意識清楚者應做主動運動,非「被動」。","C":"意識不清者復健不只訓練呼吸肌力。","D":"早期胸腔復健可改善呼吸器脫離率→正解。"},"sources":["Braddom PM&R, Early mobilization in ICU (improves weaning)"]}},"101030-64":{"quick":"1歲2個月幼兒仍可正常存在的反射=蘭多反射(Landau);原始反射(Moro、ATNR、抓握)此時應已消失(答B)。","detail":{"background":"嬰兒反射發展:原始反射(primitive reflexes)應在特定月齡消失,持續存在提示神經發育異常——Moro驚嚇反射(約4-6個月消失)、不對稱張力頸反射ATNR(約4-6個月消失)、手掌抓握反射(約4-6個月消失)。「姿勢反射(postural reflexes)」則隨發育「出現並持續」——Landau反射(蘭多,俯臥懸空時頭軀幹伸展,約3-4個月出現、約1-2歲後漸整合)、降落傘反射(parachute,約6-9個月出現後終生保留)。本題1歲2個月:Moro/ATNR/抓握早該消失(若仍在=異常),而Landau此時仍可正常存在。故答B。","options":{"A":"Moro反射約4-6個月消失,1歲2個月仍在屬異常。","B":"Landau反射此年齡仍正常存在→正解。","C":"張力性頸反射(ATNR)約4-6個月消失。","D":"手掌抓握反射約4-6個月消失。"},"sources":["Braddom PM&R, Primitive vs postural reflexes"]}},"101030-66":{"quick":"5歲CP踮腳尖+剪刀腳痙攣步態,對改善步態「無幫忙」者=TENS(經皮神經電刺激,僅止痛,不降痙攣)(答D)。","detail":{"background":"痙攣型腦性麻痺的剪刀腳(髖內收肌痙攣)、踮腳尖(小腿三頭肌痙攣致馬蹄足)步態,治療在「降低痙攣與防攣縮」:拉筋(牽拉緊縮肌)、踝足矯具(AFO,控制馬蹄足、改善廓清)、肉毒桿菌注射(降局部痙攣,如腓腸肌、內收肌)、嚴重者鞘內baclofen或選擇性脊神經後根切斷術(SDR)、骨科手術(肌腱延長)。「經皮神經電刺激(TENS)」主要功能是「止痛」,對降低痙攣與改善痙攣步態「無幫助」。故答D。","options":{"A":"拉筋牽拉緊縮肌→有助。","B":"AFO控制馬蹄足、改善廓清→有助。","C":"肉毒桿菌降局部痙攣→有助。","D":"TENS僅止痛,對痙攣步態無幫助→正解。"},"sources":["Braddom PM&R, Management of spastic CP gait"]}},"101030-67":{"quick":"發展遲緩判讀(官方多重C、D);粗動作里程:30個月才會雙腳跳(C,正常約2歲已會)、4歲才會騎三輪車(D,正常約3歲)皆屬落後。","detail":{"background":"粗動作發展里程(gross motor milestones):約4-6個月翻身(supine to prone)、約9個月雙手雙膝爬行、約2歲(24個月)雙腳併立跳躍、約3歲會騎三輪車(pedal tricycle)、約4歲單腳跳。判讀:A(5個月翻身)、B(9個月爬行)屬正常;C(30個月才開始雙腳跳)落後於約2歲應達成→遲緩;D(4歲才騎三輪車)落後於約3歲應達成→遲緩。故官方判定C、D皆符合發展遲緩(多重給分)。","options":{"A":"5個月翻身屬正常里程。","B":"9個月雙手雙膝爬行屬正常。","C":"30個月才雙腳跳→落後(應約24個月)→遲緩,給分。","D":"4歲才騎三輪車→落後(應約3歲)→遲緩,給分。"},"sources":["Developmental milestones; 官方多重答案C、D"]}},"101030-68":{"quick":"嬰兒先天性肌肉斜頸敘述「錯誤」:臉部/枕部扁平在「左側」→錯,頭轉向右、傾向左(患側左SCM短縮),臉扁平在「右側(轉向側)」、枕部扁平在患側(答C)。","detail":{"background":"先天性肌肉性斜頸(congenital muscular torticollis):患側胸鎖乳突肌(SCM)纖維化短縮(可摸到硬塊),造成頭「傾向患側、轉向對側(健側)」。本題頭「轉向右、傾向左、左頸硬塊」→患側為「左SCM」(B正確,左SCM異常)。可合併先天性髖關節發育不良(A正確);若不治療會造成姿勢性顱顏不對稱——「臉部扁平在『轉向的那一側(對側=右側)』、枕部扁平在患側」。本題說「左側臉部扁平」與「頭轉向右(臉朝右)」矛盾(臉扁平應在右側)→C錯誤。3歲前徹底治療(伸展、擺位,少數需手術)臉部畸形多可改善(D正確)。","options":{"A":"可與先天性髖關節發育不良併發→正確。","B":"左SCM異常(患側左)→正確。","C":"臉部扁平應在右側(轉向側),說「左側臉部扁平」→錯誤,即答案。","D":"3歲前徹底治療臉部畸形多可改善→正確。"},"sources":["Braddom PM&R, Congenital muscular torticollis"]}},"102030-55":{"quick":"女孩內八步態(in-toeing)最常見原因(此年齡)→股骨內旋(femoral anteversion/medial torsion)(答C)。","detail":{"background":"兒童內八(in-toeing)三大原因依年齡:嬰兒期(<1歲)多為「蹠骨內收(metatarsus adductus)」;幼兒期(1-3歲)多為「脛骨內旋(internal tibial torsion)」;學齡前至學齡(3-8歲,尤其女孩)多為「股骨前傾/股骨內旋(femoral anteversion/medial femoral torsion)」——表現為W坐姿、髖內旋角度大,多數隨成長自行矯正。本題依題意(女孩、圖示)最主要原因為股骨內旋。","options":{"A":"脛骨內旋多見1-3歲幼兒。","B":"脛骨外旋造成外八,非內八。","C":"股骨內旋(前傾)是學齡女孩內八最常見原因→正解。","D":"股骨外旋造成外八。"},"sources":["Braddom/Peds Ortho, In-toeing (femoral anteversion)"]}},"102030-66":{"quick":"足月產、高黃疸照光史、無法坐站、伸手取物有怪動作、怪表情→徐動型(athetoid)腦性麻痺(答B)。","detail":{"background":"徐動型(athetoid/dyskinetic)腦性麻痺:因「核黃疸(kernicterus,新生兒高膽紅素血症)或缺氧」損傷「基底核」所致,表現為不自主、扭動的動作(伸手取物時出現多餘怪異動作)、臉部怪表情(口面不自主動作)、肌張力起伏波動,常合併「聽力障礙(高黃疸傷及聽覺路徑)」與構音障礙,智力多保留。本題足月產+高黃疸照光史+聽力減弱+不自主動作→徐動型。痙攣型雙邊麻痺多見早產(腦室旁白質軟化)。","options":{"A":"低張型多為早期表現或過渡,不符高黃疸+不自主動作。","B":"徐動型(高黃疸/缺氧傷基底核)→正解。","C":"痙攣型雙邊麻痺多見早產兒。","D":"痙攣型四肢麻痺為廣泛腦損傷,非高黃疸典型。"},"sources":["Braddom PM&R, Athetoid CP (kernicterus, basal ganglia)"]}},"102110-60":{"quick":"脊柱側彎X光判讀:依題圖凸向左側、Cobb角約40度(答B)。","detail":{"background":"脊柱側彎以「Cobb角」量化:在正面X光取側彎上下端椎,各畫平行於椎體終板的線,兩線(或其垂線)夾角即Cobb角。側彎「方向」以凸側命名(凸向左=左凸)。Cobb角>10度即脊柱側彎,>40-50度多考慮手術。本題依X光圖判讀為「凸向左側、約40度」(角度為數十度級,非140度——140度為不合理的過大值)。故答B。","options":{"A":"方向(凸向右)與圖不符。","B":"凸向左側、約40度→正解(依圖)。","C":"140度為不合理過大角度。","D":"140度過大且方向不符。"},"sources":["Braddom/Ortho, Cobb angle measurement"]}},"102110-66":{"quick":"兒童異常步態(剪刀腳/痙攣步態圖)→痙攣型腦性麻痺(答D)。","detail":{"background":"依題圖兒童步態(雙下肢內收交叉的剪刀腳、踮腳尖、痙攣姿態)→痙攣型腦性麻痺典型。鑑別:小兒麻痺(脊髓灰質炎)為弛緩性麻痺(肌肉無力鬆軟、肌萎縮、無痙攣);脊髓性肌肉萎縮(SMA)為下運動神經元弛緩無力;髖關節脫位步態為Trendelenburg/搖擺。剪刀腳+痙攣姿態=痙攣型CP。","options":{"A":"小兒麻痺為弛緩性麻痺,非痙攣剪刀腳。","B":"SMA為弛緩無力。","C":"髖脫位為搖擺/Trendelenburg步態。","D":"痙攣型腦性麻痺(剪刀腳痙攣步態)→正解。"},"sources":["Braddom PM&R, Spastic CP gait"]}},"102110-72":{"quick":"足月兒CP、MRI雙側額枕對稱萎縮+訊號增加→周產期窒息(perinatal asphyxia)後遺(答A)。","detail":{"background":"腦性麻痺的MRI與病因對應:早產兒缺氧缺血→「腦室旁白質軟化(PVL)」(腦室周圍白質);足月兒「周產期窒息/缺氧缺血性腦病變」→影響分水嶺區與基底核/視丘,呈現皮質與皮質下對稱性損傷、膠質增生(FLAIR訊號增加)與組織萎縮。本題足月兒+雙側(額、枕)對稱性腦萎縮+訊號增加→足月兒周產期窒息後遺。嬰兒頭部外傷、皰疹/日本腦炎腦炎的影像分布與病史不符(非對稱分水嶺型、且無感染病史)。故答A。","options":{"A":"足月兒周產期窒息(缺氧缺血)後遺→對稱性皮質損傷→正解。","B":"嬰兒頭部外傷多為局部/不對稱。","C":"皰疹腦炎好侵顳葉,有感染病史。","D":"日本腦炎好侵視丘/基底核,有感染病史。"},"sources":["Braddom/Peds Neuro, Perinatal asphyxia in term infant"]}},"103030-67":{"quick":"發展遲緩/需早療的面向=認知+語言溝通+心理社會+動作 全部(1234)(答D)。","detail":{"background":"發展遲緩(developmental delay)指未滿6歲兒童在「動作、認知、語言溝通、心理社會(社會適應/情緒)、知覺、生活自理」等任一或多項出現落後或異常。需早期療育介入的面向涵蓋:認知發展、語言及溝通發展、心理社會發展、動作發展(1234全包含),以及知覺、生活自理等。故答1234全是。(註:選項D尾端「代頁」為原PDF頁尾雜訊,應為「1234」。)","options":{"A":"僅14不完整。","B":"僅124漏心理社會。","C":"僅134漏語言溝通。","D":"1234(認知/語言溝通/心理社會/動作)全是→正解。"},"sources":["Braddom/Peds, Domains of developmental delay & early intervention"]}},"103100-68":{"quick":"腦性麻痺敘述「錯誤」:CP是腦部「退化性」疾病引起→錯,CP是發育中腦部的「非進行性(非退化)」損傷(答B)。","detail":{"background":"腦性麻痺(CP)定義:在「發育未成熟的腦部」發生的「非進行性(non-progressive,非退化、病灶本身不再惡化)」病變或損傷,造成運動與姿勢的永久性障礙(常合併認知、感覺、語言、癲癇等)。危險因子:早產(<32週)、低出生體重(<2500g)、缺氧、感染、核黃疸等(A正確);病因依時間分產前、產中、產後(C正確);診斷必含「運動功能障礙」(D正確)。故B「退化性疾病」錯誤(CP是非進行性,非退化性)。","options":{"A":"早產<32週、體重<2500g是CP危險因子→正確。","B":"CP是「非進行性」損傷,非「退化性」疾病→錯誤,即答案。","C":"病因分產前/產中/產後→正確。","D":"症狀必含運動功能障礙→正確。"},"sources":["Braddom PM&R, Cerebral palsy definition (non-progressive)"]}},"104030-68":{"quick":"早產兒最常見CP類型=痙攣型「雙側麻痺(diplegia),下肢較嚴重」(答D)。","detail":{"background":"早產兒因腦室旁白質軟化(PVL)——受損的是腦室周圍下行的皮質脊髓徑,而「支配下肢的纖維最靠近腦室」,故早產兒最常見「痙攣型雙側麻痺(spastic diplegia),下肢受累比上肢嚴重」(剪刀腳、踮腳尖步態,上肢與認知相對較好)。足月兒缺氧多致四肢麻痺或偏癱。故早產兒→diplegia下肢較重。","options":{"A":"偏癱上肢較重非早產兒最常見型。","B":"偏癱下肢較重不符。","C":"雙側麻痺「上肢較重」不符(早產兒下肢較重)。","D":"痙攣型雙側麻痺、下肢較嚴重→正解。"},"sources":["Braddom PM&R, Spastic diplegia in prematurity (PVL)"]}},"104090-56":{"quick":"假性肌肉肥大(pseudohypertrophy)最常見於裘馨氏肌肉失養症(DMD,小腿假性肥大)(答C)。","detail":{"background":"假性肥大(pseudohypertrophy)指肌肉因「脂肪與結締組織取代退化的肌纖維」而外觀「變大但實際無力」,最典型見於「裘馨氏肌肉失養症(Duchenne muscular dystrophy, DMD)」的「小腿肚(腓腸肌)假性肥大」。DMD為X性聯隱性、dystrophin缺乏,男童3-5歲起近端無力、Gower徵象、約8-12歲喪失行走。其他肌病(MND、後小兒麻痺、肌強直症)無典型小腿假性肥大。故答DMD。","options":{"A":"運動神經元疾病以肌萎縮為主,無假性肥大。","B":"後小兒麻痺症候群為陳舊弛緩性麻痺。","C":"裘馨氏肌失養症(小腿假性肥大)→正解。","D":"先天性肌強直症以肌強直為主,非假性肥大。"},"sources":["Braddom PM&R, Duchenne muscular dystrophy (calf pseudohypertrophy)"]}},"104090-66":{"quick":"腦性麻痺敘述「錯誤」:CP發生率已降至非常低、成為不常見疾病→錯,CP仍是兒童最常見的運動障礙(發生率約每千名活產2-3,並未顯著下降)(答A)。","detail":{"background":"腦性麻痺仍是兒童「最常見的慢性運動障礙」,發生率約「每1000名活產2-3例」,並未因醫學進步而大幅下降——反因「早產與極低出生體重兒存活率提高」,早產相關CP比率相對「上升」(B正確);近年因核黃疸/缺氧處置進步,徐動型比率「下降」、痙攣型為主(C正確);早產兒最常合併雙側麻痺(diplegia)(D正確)。故A「CP已變罕見」錯誤。","options":{"A":"CP「已降至非常低、不常見」→錯誤(仍最常見運動障礙),即答案。","B":"早產兒存活率增使早產相關CP比率上升→正確。","C":"徐動型比率近年下降→正確。","D":"早產兒最常合併雙側麻痺→正確。"},"sources":["Braddom PM&R, CP epidemiology"]}},"104090-67":{"quick":"四肢痙攣型CP用鞘內baclofen幫浦敘述「錯誤」:僅對痙攣有效、對肌張力不全(dystonia)無效→錯,鞘內baclofen對「痙攣與肌張力不全」皆有療效(答A)。","detail":{"background":"鞘內baclofen幫浦(intrathecal baclofen, ITB)將baclofen直接送入脊髓蛛網膜下腔作用於GABA-B受體,以極低劑量強效降低肌張力。對「痙攣(spasticity)」效果顯著,對「肌張力不全(dystonia)」(如混合型/徐動型CP)「也有療效」(常用於重度痙攣合併dystonia者)。其益處:改善姿勢、減少痙攣相關疼痛、降低行走/照護的能量耗費、減少照顧不便與骨科手術需求。故A「對dystonia不具效用」錯誤。","options":{"A":"說ITB「僅對痙攣、對dystonia無效」→錯誤(對兩者皆有效),即答案。","B":"可改善姿勢、減少痙攣疼痛→正確。","C":"可減少行走能量耗費→正確。","D":"可減少照顧不便與手術需求→正確。"},"sources":["Braddom PM&R, Intrathecal baclofen (spasticity & dystonia)"]}},"105020-66":{"quick":"腦性麻痺敘述「錯誤」:CP「主要以智能障礙為主」→錯,CP核心是運動/姿勢障礙,智能障礙是「可能合併」而非主要(答B)。","detail":{"background":"腦性麻痺是一群(症候群,A正確)因發育中腦部非進行性損傷(D正確)造成「運動與姿勢障礙」為核心的疾病,常「合併」其他神經功能障礙(智能、癲癇、視聽、語言、感覺,C正確)。但CP的「主要/定義性問題是運動與姿勢障礙」,並非「以智能障礙為主」(許多CP兒智力正常)。故B錯誤。","options":{"A":"CP是一種症候群→正確。","B":"說CP「主要以智能障礙為主」→錯誤(核心是運動障礙),即答案。","C":"常合併其他神經功能障礙→正確。","D":"發育未成熟腦部的非進行性損傷→正確。"},"sources":["Braddom PM&R, CP is primarily a motor disorder"]}},"105100-65":{"quick":"腦性麻痺敘述「最正確」:徐動型常因高黃疸或缺氧傷及基底核(答B)。","detail":{"background":"CP各型:徐動型(athetoid/dyskinetic)由「高膽紅素(核黃疸)或缺氧」傷及「基底核」所致(B正確)。辨析其他:多數CP並非「長期低張」(低張可能是早期過渡,後多轉痙攣型,A錯);「雙側麻痺(diplegia)」指「下肢受累比上肢嚴重」而非四肢受影響程度相同(C錯);偏癱型(hemiplegic)CP「大多數可以行走」(D錯,說無法走錯誤)。故B最正確。","options":{"A":"多數CP非長期低張(後多轉痙攣型)→錯。","B":"徐動型由高黃疸/缺氧傷基底核→正解。","C":"diplegia是下肢較重,非四肢相同→錯。","D":"偏癱型CP大多可行走→錯。"},"sources":["Braddom PM&R, CP types"]}},"106020-66":{"quick":"腦性麻痺敘述「錯誤」:痙攣型「單肢偏癱(monoplegia)」最常見→錯,痙攣型CP以「雙側麻痺(diplegia)或偏癱」較常見,單肢麻痺罕見(答C)。","detail":{"background":"CP評估含肌張力、反射、姿勢與異常運動(A正確);嬰兒「1歲前過早出現明顯慣用手(hand preference)」需警覺偏癱型CP或周邊神經損傷(正常約1.5-2歲才有慣用手,B正確);痙攣型四肢麻痺常合併吞嚥困難(廣泛腦損傷,D正確)。痙攣型CP的分布以「雙側麻痺(diplegia)、偏癱(hemiplegia)、四肢麻痺(quadriplegia)」為主,「單肢麻痺(monoplegia)很罕見」、非最常見。故C錯誤。","options":{"A":"CP評估含張力/反射/姿勢/異常動作→正確。","B":"1歲前過早出現慣用手需評估偏癱→正確。","C":"痙攣型「單肢偏癱最常見」→錯誤(monoplegia罕見),即答案。","D":"痙攣型四肢麻痺常合併吞嚥困難→正確。"},"sources":["Braddom PM&R, CP topographic classification"]}},"106080-67":{"quick":"腦性麻痺敘述「最正確」:高膽紅素致徐動型CP較易合併「聽力障礙」(答D)。","detail":{"background":"核黃疸(高膽紅素)損傷基底核與「聽覺路徑(腦幹聽神經核)」,故「徐動型CP較易合併感音性聽力障礙」(D正確,須做聽力篩檢)。辨析:CP兒「不一定」都合併智能障礙(許多智力正常,A錯);CP最常見型為「痙攣型」而非低張型(B錯);偏癱型CP「大多數可以走路」(C錯)。故D最正確。","options":{"A":"CP不一定合併智能障礙→錯。","B":"最常見為痙攣型,非低張型→錯。","C":"偏癱型CP大多可走路→錯。","D":"高膽紅素徐動型CP較易合併聽力障礙→正解。"},"sources":["Braddom PM&R, Kernicterus athetoid CP (hearing loss)"]}},"107020-68":{"quick":"CP最易產生髖關節脫位的類型=四肢癱瘓型(quadriplegic,重度、不能行走)(答B)。","detail":{"background":"CP髖關節脫位/半脫位(hip displacement)風險與「嚴重度(GMFCS高、不能行走)」高度相關:愈重度、愈不能負重行走者風險愈高。「四肢癱瘓型(spastic quadriplegic)」是最重度、最不能行走、髖內收肌痙攣最強,故「最易髖脫位」(須定期髖部X光監測migration percentage)。偏癱型(可走)風險低;雙邊麻痺次之;運動困難型不一定。故答四肢癱瘓型。","options":{"A":"偏癱型可行走,髖脫位風險低。","B":"四肢癱瘓型(重度不能走)髖脫位風險最高→正解。","C":"運動困難型風險不一定最高。","D":"雙邊麻痺型風險次於四肢癱瘓型。"},"sources":["Braddom/Peds Ortho, CP hip displacement (quadriplegic)"]}},"107080-65":{"quick":"CP脊柱側彎風險最高=GMFCS最重度者(GMFCS IV或V);四選項中GMFCS IV(答D)。","detail":{"background":"腦性麻痺的脊柱側彎與「整體嚴重度(GMFCS等級)」呈正相關:GMFCS愈高(IV、V,即不能獨立行走、需輪椅、軀幹控制差者)脊柱側彎發生率與嚴重度愈高(尤其神經肌肉型C形側彎合併骨盆歪斜)。本題選項到GMFCS IV,故「GMFCS IV」(重度)最易產生脊柱側彎。故答D。","options":{"A":"GMFCS I(可獨立行走)風險最低。","B":"GMFCS II風險低。","C":"GMFCS III中等。","D":"GMFCS IV(重度)脊柱側彎風險最高→正解。"},"sources":["Braddom PM&R, CP scoliosis vs GMFCS severity"]}},"108030-67":{"quick":"裘馨氏肌失養症敘述「錯誤」:Gower徵象是因「遠端」肢體無力→錯,Gower徵象是「近端(骨盆帶/股四頭)」無力,需用手撐著大腿爬起(答D)。","detail":{"background":"裘馨氏肌失養症(DMD):X性聯隱性遺傳(A正確);近端肌(尤其骨盆帶、臀中肌)無力致「鴨步/搖擺步態(waddling gait)」(B正確);約8-12歲喪失行走能力(C正確);「Gower徵象(Gowers sign)」=因「近端(骨盆帶與股四頭肌)無力」,病童從地上起身時無法直接站起,須「用雙手依序撐著自己的小腿、膝、大腿『往上爬』」才能站立——反映的是「近端」無力,而非遠端。故D「遠端肢體無力」錯誤。","options":{"A":"X性聯隱性遺傳→正確。","B":"臀中肌無力致搖擺步態→正確。","C":"約8-12歲喪失行走→正確。","D":"Gower徵象是「近端」無力(非遠端)→此敘述錯誤,即答案。"},"sources":["Braddom PM&R, Duchenne MD (Gower sign = proximal weakness)"]}},"108030-68":{"quick":"「最不會」造成腦性麻痺=胎兒心跳過快(fetal tachycardia)(答A)。","detail":{"background":"腦性麻痺危險因子:早產與低出生體重(<2500g)、缺氧缺血(產程窘迫、胎兒心搏「過慢/bradycardia」反映缺氧)、新生兒癲癇(反映腦損傷)、核黃疸、宮內感染、母親因素(如智能障礙/遺傳背景、多胞胎)。「胎兒心跳過『快』(tachycardia)」本身較不特異於缺氧腦損傷(嚴重缺氧反而以心搏過慢/減速為警訊),相對「最不會」造成CP。故答A。","options":{"A":"胎兒心跳過快最不會造成CP(缺氧以心搏過慢為警訊)→正解。","B":"新生兒癲癇反映腦損傷→CP危險因子。","C":"出生體重<2500g→CP危險因子。","D":"母親智能障礙(遺傳/環境)→相關危險因子。"},"sources":["Braddom PM&R, CP risk factors"]}},"109080-67":{"quick":"CP神經系統合併症敘述「錯誤」:雙邊麻痺型(diplegic)容易有「聽力異常」→錯,聽力異常較常見於「徐動型(核黃疸)」,非diplegic(答D)。","detail":{"background":"CP各型合併症:偏癱型(hemiplegic)較易有癲癇(A正確);四肢癱瘓型(quadriplegic,廣泛腦損傷)易有智能障礙(B正確);運動困難/徐動型(dyskinetic)常有新生兒黃疸(核黃疸)病史與「聽力障礙」(C正確)。「聽力異常」與「徐動型(核黃疸)」關聯最高,而非「雙邊麻痺型(diplegic,早產PVL,主要下肢痙攣)」。故D「diplegic易有聽力異常」錯誤。","options":{"A":"偏癱型易有癲癇→正確。","B":"四肢癱瘓型易有智能障礙→正確。","C":"運動困難型常有新生兒黃疸病史→正確。","D":"說diplegic「易有聽力異常」→錯誤(聽力異常多見徐動型),即答案。"},"sources":["Braddom PM&R, CP comorbidities by type"]}},"109080-68":{"quick":"「不是」罕見疾病兒童復健目的者=「生理功能回復正常」(罕病多不可治癒,目標是提升功能/生活品質而非回復正常)(答B)。","detail":{"background":"罕見疾病(多為遺傳/進行性、無法治癒)兒童的復健目標:提升各種「生活功能」與自理、預防及限制肢體變形與攣縮、維持與延緩功能退化、促進社會參與、提升生活品質、支持家庭。由於多數罕病無法治癒,「使生理功能『回復正常』」並非實際可達的復健目標(復健目標是『最佳化功能』而非治癒回復正常)。故B不是目的。","options":{"A":"提升各種生活功能→是目的。","B":"使生理功能「回復正常」→非實際復健目的(罕病多不可治癒)→正解。","C":"預防及限制肢體變形→是目的。","D":"促進社會參與→是目的。"},"sources":["Braddom PM&R, Rehabilitation goals in rare/progressive diseases"]}},"110020-65":{"quick":"脊柱側彎敘述「正確」:背架主要目的是「避免側彎惡化」(非矯正治癒)(答D)。","detail":{"background":"脊柱側彎:側彎測量器(scoliometer)用於前彎測試(Adams)測「軀幹旋轉角度(rib hump,屬橫斷/旋轉面)」而非額平面角度(額平面角度是X光Cobb角,A錯);特發性脊柱側彎與睡姿「無關」(B錯);電刺激對脊柱側彎「無明確療效」(C錯);「背架(bracing)」用於骨骼未成熟、中度(約25-45度)進行性側彎,目的是「避免(延緩)側彎惡化」(不能矯正既有彎度、不能治癒),D正確。重度(>45-50度)考慮手術。故答D。","options":{"A":"scoliometer測軀幹旋轉(非額平面),X光Cobb才測額平面→A錯。","B":"特發性脊柱側彎與睡姿無關→B錯。","C":"電刺激對脊柱側彎無明確療效→C錯。","D":"背架主要目的是避免側彎惡化→正解。"},"sources":["Braddom/Ortho, Scoliosis bracing"]}},"110020-69":{"quick":"最常合併水腦症(hydrocephalus)的兒童疾病=脊髓脊膜膨出(myelomeningocele,脊柱裂)(答A)。","detail":{"background":"脊髓脊膜膨出(myelomeningocele,最嚴重的開放性脊柱裂)常合併「Arnold-Chiari II型畸形(後腦疝)」,阻塞腦脊液循環,故「約80-90%合併水腦症(hydrocephalus)」,多需腦室腹腔分流(VP shunt)。此外合併下肢癱瘓、神經性膀胱腸、脊柱與足部畸形。腦性麻痺、SMA、肌失養症皆不以水腦為特徵。故答myelomeningocele。","options":{"A":"脊髓脊膜膨出(合併Chiari II)最常併水腦症→正解。","B":"腦性麻痺不以水腦為特徵。","C":"SMA為下運動神經元病,不併水腦。","D":"肌失養症為肌肉病變,不併水腦。"},"sources":["Braddom/Peds, Myelomeningocele & hydrocephalus"]}},"110080-67":{"quick":"早期療育介入模式特性「錯誤」:以「醫院為主」的治療模式→錯,早療強調「以家庭為中心、社區/自然情境」介入(答B)。","detail":{"background":"早期療育(early intervention,針對未滿6歲發展遲緩兒)特性:跨專業科際整合團隊合作(A正確);「以家庭為中心(family-centered)、在兒童的自然生活情境(家庭/社區/托育)」進行,並訓練父母成為介入的一部分(C正確)、而非「以醫院為主」;愈早介入效果愈好(D正確)。故B「以醫院為主」錯誤。","options":{"A":"跨專業科際整合團隊→正確。","B":"說「以醫院為主」→錯誤(應以家庭/社區自然情境為中心),即答案。","C":"訓練父母補強家庭能力→正確。","D":"愈早介入效果愈好→正確。"},"sources":["Braddom/Peds, Early intervention (family-centered)"]}},"111020-63":{"quick":"3個月男嬰先天性肌肉斜頸(頭轉向右、傾向左)敘述「正確」:髖關節發育不良可能性較高(常併發)(答B)。","detail":{"background":"先天性肌肉性斜頸:本題「頸轉向右、後腦傾向左」表示患側為「左SCM短縮」(頭傾向患側左、轉向健側右),故A說「右側SCM短縮」錯誤(應為左側)。斜頸常「合併先天性髖關節發育不良(DDH)」,須一併檢查髖部(B正確)。治療「首選保守(物理治療伸展、擺位),大多有效」,少數頑固(>1歲未改善)才手術(C錯,非通常需手術);頸圈不是治療首選(D錯,治療以伸展運動為主)。故B正確。","options":{"A":"本題患側為左SCM(非右側短縮)→A錯。","B":"先天肌肉斜頸常合併髖關節發育不良→正解。","C":"治療首選保守(伸展/擺位),非通常需手術→C錯。","D":"頸圈非治療首選(以伸展運動為主)→D錯。"},"sources":["Braddom PM&R, Congenital muscular torticollis (DDH association)"]}},"111020-68":{"quick":"CP下肢手術一般建議7歲後,但「例外可較早做」=髖關節(髖脫位進展快、需及早處理)(答A)。","detail":{"background":"腦性麻痺下肢矯正手術(肌腱延長、骨切矯正)一般建議在「步態成熟(約7-8歲後)」一次性多階段手術(single-event multilevel surgery),以免過早手術復發再開刀。但「髖關節」是例外——痙攣型CP的「髖關節半脫位/脫位會進行性惡化」,須「定期監測並及早(不必等7歲)以軟組織鬆解或骨切手術介入」防止脫位與疼痛、退化。故例外為髖關節。","options":{"A":"髖關節(脫位進展快)可較早手術介入→正解(例外)。","B":"膝關節手術多待步態成熟後。","C":"踝關節手術多待步態成熟後。","D":"脊椎(側彎)手術依嚴重度,非此題例外脈絡。"},"sources":["Braddom/Peds Ortho, Timing of CP orthopedic surgery (hip)"]}},"111080-68":{"quick":"高膽紅素血症(核黃疸)關聯性最高的CP類型=徐動型(athetoid)(答B)。","detail":{"background":"核黃疸(高膽紅素)未結合膽紅素沉積於「基底核(蒼白球、視丘下核)與腦幹聽核」,造成「徐動型(athetoid/dyskinetic)腦性麻痺」——不自主扭動、肌張力波動,合併感音性聽損與牙釉質發育不良、向上凝視麻痺。故高膽紅素關聯最高者為徐動型。痙攣型多與缺氧/早產PVL有關;低張/失調型病因不同。","options":{"A":"痙攣型多與缺氧/早產PVL有關。","B":"徐動型與核黃疸(高膽紅素)關聯最高→正解。","C":"低張型非核黃疸典型。","D":"失調型多與小腦病變/遺傳有關。"},"sources":["Braddom PM&R, Kernicterus → athetoid CP"]}},"112020-67":{"quick":"CP各型敘述「最不適當」:癲癇「較常發生於雙邊麻痺型(diplegic)」→錯,癲癇較常見於「偏癱型(hemiplegic)與四肢麻痺型」(皮質受累),diplegic(白質)癲癇較少(答D)。","detail":{"background":"CP各型病理:偏癱型(hemiplegic)多見足月兒(單側病灶,常皮質受累→癲癇較多,A正確);四肢麻痺型(quadriplegic)多廣泛腦病變(B正確,癲癇與智障多);雙邊麻痺型(diplegic)多見早產兒「腦室周圍白質軟化(PVL)」(C正確)。癲癇與「皮質灰質受累」相關,故「偏癱型與四肢麻痺型癲癇較多」,而diplegic(主要白質受損、皮質相對保留)「癲癇較少」。故D說「癲癇較常發生於diplegic」相較hemiplegic→不適當(相反)。","options":{"A":"偏癱型多見足月兒→正確。","B":"四肢麻痺型有廣泛腦病變→正確。","C":"雙邊麻痺型有腦室周圍白質軟化(PVL)→正確。","D":"說癲癇較常見於diplegic(相較hemiplegic)→最不適當(偏癱型癲癇較多),即答案。"},"sources":["Braddom PM&R, CP types and seizure association"]}},"112080-67":{"quick":"CP合併症敘述「錯誤」:CP「通常與遺傳性疾病相關」→錯,CP多為後天性腦損傷(缺氧/早產/核黃疸/感染),非遺傳性疾病(答C)。","detail":{"background":"CP合併症:常有認知缺損(A正確);核黃疸所致CP須查聽力(B正確);抗癲癇藥(長期)可致骨質缺乏(維生素D代謝/骨密度下降,D正確)。CP的病因「主要是後天性(產前缺氧/感染、早產PVL、產中窒息、產後核黃疸/外傷)」,「通常與遺傳性疾病無關」(雖少數有遺傳/代謝病因)。故C「通常與遺傳性疾病相關」錯誤。","options":{"A":"CP常有認知缺損→正確。","B":"核黃疸CP須查聽力→正確。","C":"說CP「通常與遺傳性疾病相關」→錯誤(多為後天腦損傷),即答案。","D":"抗癲癇藥可致骨質缺乏→正確。"},"sources":["Braddom PM&R, CP etiology (mostly acquired)"]}},"113020-66":{"quick":"正常兒童持續「最久」的反射=降落傘反射(parachute reflex)(出生後出現,終生保留)(答A)。","detail":{"background":"反射的時序:原始反射(Moro、ATNR、抓握)在約4-6個月內消失;「姿勢/保護反射」較晚出現且「持續/終生保留」——降落傘反射(parachute,約6-9個月出現,之後「終生存在」)、正中翻正反射等。本題比較:降落傘反射(終生)>其餘原始反射(早消失)。故持續最久者為降落傘反射。","options":{"A":"降落傘反射出現後終生保留→持續最久,正解。","B":"手掌抓握反射約4-6個月消失。","C":"不對稱張力頸反射(ATNR)約4-6個月消失。","D":"Moro反射約4-6個月消失。"},"sources":["Braddom PM&R, Parachute reflex (persists)"]}},"113020-67":{"quick":"腦性麻痺敘述「錯誤」:早產最常導致的CP型是「四肢麻痺型」→錯,早產(PVL)最常導致「雙側麻痺型(diplegic)」(答C)。","detail":{"background":"CP:痙攣型(spastic)是最常見型態(A正確);偏癱型(hemiplegic)大多能獨立行走(B正確);CP兒因痙攣與動作異常,肌肉骨骼系統易「提早老化」(關節退化、疼痛,D正確)。早產兒因腦室周圍白質軟化(PVL),最常導致「痙攣型雙側麻痺(diplegia,下肢較重)」,而非四肢麻痺型。故C「早產最常導致四肢麻痺型」錯誤(應為diplegic)。","options":{"A":"痙攣型是最常見CP型態→正確。","B":"偏癱型幾乎都可獨立行走→正確。","C":"說早產最常導致「四肢麻痺型」→錯誤(應為雙側麻痺diplegic),即答案。","D":"CP常見肌肉骨骼系統提早老化→正確。"},"sources":["Braddom PM&R, Prematurity → spastic diplegia"]}},"113070-66":{"quick":"裘馨氏肌失養症敘述「最不適當」:心肌「通常不受影響」→錯,DMD常合併「擴張型心肌病變」(dystrophin亦表現於心肌)(答D)。","detail":{"background":"裘馨氏肌失養症(DMD):X性聯隱性(A正確);近端(骨盆帶)肌無力為主(B正確);「不建議最大強度/離心阻力運動」(過度離心收縮會加速肌纖維損傷,C正確)。dystrophin不僅表現於骨骼肌也表現於「心肌」,故DMD病人常合併「擴張型心肌病變與心律不整」(青少年後是重要死因之一,須定期心臟追蹤),呼吸肌無力致呼吸衰竭為另一死因。故D「心肌通常不受影響」錯誤。","options":{"A":"X性聯隱性遺傳→正確。","B":"近端(骨盆帶)肌無力→正確。","C":"不建議最大強度運動(避免肌損傷)→正確。","D":"說「心肌通常不受影響」→錯誤(DMD常併擴張型心肌病),即答案。"},"sources":["Braddom PM&R, DMD cardiomyopathy"]}},"113070-67":{"quick":"嬰兒型脊髓性肌肉萎縮(SMA type 1)敘述「最適當」:產前DNA檢測(SMN1基因)可作為診斷參考(答C)。","detail":{"background":"脊髓性肌肉萎縮症(SMA):體染色體「隱性」遺傳(SMN1基因5q缺失/突變,A說顯性錯誤);嬰兒型(SMA type 1, Werdnig-Hoffmann)出生後6個月內即嚴重全身弛緩無力、無法坐、舌肌顫動、呼吸困難(B說10歲後才無力錯誤);肌電圖/神經傳導呈現「去神經」變化(前角細胞退化,D說EMG完全正常錯誤);「產前/分子DNA檢測(SMN1基因)」可用於診斷與產前篩檢(C正確)。故C最適當。","options":{"A":"SMA為體染色體「隱性」遺傳(非顯性)→錯。","B":"嬰兒型SMA出生數月內即無力(非10歲後)→錯。","C":"產前/DNA檢測(SMN1)可作診斷參考→正解。","D":"SMA的EMG呈去神經變化(非完全正常)→錯。"},"sources":["Braddom/Peds Neuro, Spinal muscular atrophy"]}},"114070-66":{"quick":"CP肌肉骨骼敘述「最不適當」:髖痛與髖脫位的嚴重度「直接相關」→錯,CP髖脫位常為無痛性、進展隱匿(疼痛與脫位程度不一定直接相關)(答D)。","detail":{"background":"CP肌肉骨骼:肉毒桿菌注射可改善局部肌張力(A正確);髖關節「較少承重(不能行走者)」是髖發育不良/脫位的因素(B正確);「不能行走(nonambulatory)」者髖脫位風險較高(C正確)。但CP的髖脫位「常為隱匿、無痛性(尤其重度兒)」,「髖痛與脫位嚴重度不一定直接相關」——故須靠定期X光(migration percentage)監測而非等到疼痛才發現。故D「髖痛與髖脫位嚴重度直接相關」最不適當。","options":{"A":"肉毒桿菌改善肌張力→正確。","B":"髖較少承重是髖發育不良因素→正確。","C":"不能行走者髖脫位風險高→正確。","D":"說髖痛與脫位嚴重度「直接相關」→最不適當(常無痛、需X光監測),即答案。"},"sources":["Braddom/Peds Ortho, CP hip surveillance"]}},"114070-67":{"quick":"早療/發展遲緩敘述「最不適當」:WHO統計發展遲緩發生率約「千分之六至八」→錯,一般估計發展遲緩盛行率約6-8%(百分之六至八),非千分之(答C)。","detail":{"background":"早期療育針對「未滿6歲」發展遲緩兒及其家庭提供治療、教育與服務(A正確);發展遲緩涵蓋動作、知覺、語言、情緒、認知、心理、社會適應等一或多面向落後(B正確);早療精神為早期發現、早期診斷、早期治療(D正確)。發展遲緩的「盛行率一般估計約6-8%(即百分之六至八)」(各國數據不一),本題C說「千分之六至八」明顯低估、數量級錯誤→最不適當。","options":{"A":"早療針對未滿6歲遲緩兒及家庭→正確。","B":"發展遲緩涵蓋多面向落後→正確。","C":"發生率說「千分之六至八」→錯誤(約百分之六至八),即答案。","D":"早療精神=早期發現/診斷/治療→正確。"},"sources":["Braddom/Peds, Developmental delay prevalence"]}},"115020-67":{"quick":"CP脊柱側彎敘述「最不適當」:背架「可有效避免CP脊柱側彎惡化」→錯,神經肌肉型(CP)脊柱側彎背架療效有限、無法有效阻止惡化(答D)。","detail":{"background":"腦性麻痺(神經肌肉型)脊柱側彎:愈不能行走(nonambulatory)、愈是全身影響(total body involvement)的重度CP,脊柱側彎愈嚴重(A、B正確);重度不能走者常形成長C形側彎合併骨盆歪斜(C正確)。與「特發性脊柱側彎」不同,「神經肌肉型側彎」進展快、僵硬,「背架對阻止其惡化效果有限(無法有效避免惡化)」,主要用於支撐坐姿/延緩,確定治療常需手術(脊椎融合)。故D「背架可有效避免CP脊柱側彎惡化」最不適當。","options":{"A":"不能行走者側彎較嚴重→正確。","B":"全身影響者側彎較嚴重→正確。","C":"不能走者易C形側彎+骨盆歪斜→正確。","D":"說背架「可有效避免CP側彎惡化」→最不適當(神經肌肉型背架療效有限),即答案。"},"sources":["Braddom/Peds Ortho, Neuromuscular (CP) scoliosis (bracing limited)"]}},"101030-71":{"quick":"失能病患復健「不包括」:採一對一、暫不讓病人與他人社會互動→錯,復健鼓勵團體與社會互動(答D)。","detail":{"background":"失能(disability)病患復健原則:個別化(因人量身安排,A)、注意環境因素(無障礙空間,B)、教育家屬參與(C)。復健強調「全人」與「社會參與(participation,ICF架構)」,團體治療與病友互動有助心理支持、動機與社會技能;「刻意避免病人與他人社會互動」與復健精神相反→不應包括。故答D。","options":{"A":"個別化(量身安排)→復健重點。","B":"注意無障礙環境因素→重點。","C":"教育家屬→重點。","D":"採一對一、避免社會互動→錯誤(應鼓勵社會參與),即答案。"},"sources":["Braddom PM&R, Principles of rehabilitation (ICF, participation)"]}},"102030-70":{"quick":"Barthel vs FIM敘述「錯誤」:巴氏量表單項最高「7分」→錯,Barthel單項以0/5/10/15計分(最高15,如行走/上下樓),非7分;FIM才是1-7分(答C)。","detail":{"background":"功能評估量表:巴氏量表(Barthel Index)評估ADL,總分0-100,單項以「0、5、10(部分項目到15)」級距計分(不是7分);分數越高越獨立(A正確)。功能獨立量表(FIM)有18項、每項「1-7分」(總18-126),除運動項外還含「溝通與社會認知」項目(B正確),單項「5分以下需他人協助、6-7分獨立」(D正確)。故C「巴氏量表單項最高7分」錯誤(7分制是FIM)。","options":{"A":"兩者皆分數越高越獨立→正確。","B":"FIM含溝通與社會認知評量→正確。","C":"巴氏量表單項最高「7分」→錯誤(Barthel為0/5/10/15;7分是FIM),即答案。","D":"FIM單項≤5分需協助→正確。"},"sources":["Braddom PM&R, Barthel Index vs FIM"]}},"103100-69":{"quick":"乳癌淋巴水腫的去腫脹淋巴療法(CDT)中「最少使用」=抬高患部引流(elevation)(答C)。","detail":{"background":"完整去腫脹治療(complex/complete decongestive therapy, CDT)四大要素:徒手淋巴引流(MLD)、低彈性繃帶多層壓迫(short-stretch bandaging)、去腫脹運動(decongestive exercise)、皮膚照護;維持期加壓力袖套。對「慢性淋巴水腫」而言,「單純抬高患部引流(elevation)」效果有限(對淋巴水腫不如靜脈水腫有效),在CDT中是「最少使用/輔助」的措施。故答抬高患部。","options":{"A":"徒手淋巴引流是CDT核心。","B":"低彈性繃帶壓迫是CDT核心。","C":"抬高患部引流對淋巴水腫效果有限,最少使用→正解。","D":"去腫脹運動是CDT要素。"},"sources":["Braddom PM&R, Complex decongestive therapy for lymphedema"]}},"103100-71":{"quick":"復健功能評估「最不相關」=病患「肝腎功能」(那是內科檢驗,非功能評估)(答B)。","detail":{"background":"復健醫學的「功能評估」聚焦於病人的「功能與活動能力」:自我照顧/ADL(A)、發病前的行走與活動能力(基準,C)、軀幹與四肢肌力(D)、關節活動度、平衡、認知、溝通等。「肝腎功能(生化檢驗)」屬內科疾病評估,與復健「功能」評估最不相關。故答B。","options":{"A":"自我照顧功能是復健功能評估核心。","B":"肝腎功能(檢驗)與復健功能評估最不相關→正解。","C":"發病前行走能力是功能基準。","D":"軀幹四肢肌力是功能評估項目。"},"sources":["Braddom PM&R, Functional assessment scope"]}},"104030-67":{"quick":"復健概念「錯誤」:「多元專業(multidisciplinary)是最佳復健模式」→相對而言「跨專業整合(interdisciplinary/transdisciplinary)」團隊溝通更佳(答C)。","detail":{"background":"復健概念:有功能障礙愈早介入愈好(A正確);須正確診斷以訂正確復健目標(B正確);須家庭參與與居家訓練(D正確)。復健團隊模式:「multidisciplinary(多專業並行,各自評估較少橫向整合)」、「interdisciplinary(跨專業,團隊共同討論整合目標)」、「transdisciplinary(超專業,角色釋放)」。一般認為「interdisciplinary(跨專業整合)」溝通協調最佳,而非「multidisciplinary」是「最佳」。故C敘述(稱multidisciplinary為最佳)錯誤。","options":{"A":"有功能障礙愈早介入愈好→正確。","B":"須正確診斷訂復健目標→正確。","C":"稱「multidisciplinary是最佳模式」→錯誤(interdisciplinary整合更佳),即答案。","D":"須家庭參與與居家訓練→正確。"},"sources":["Braddom PM&R, Rehabilitation team models"]}},"104030-71":{"quick":"「不是」老年疾病特點=老人「較不會」發生系統性疾病→錯,老人多重共病、系統性疾病更多(答D)。","detail":{"background":"老年疾病特點:症狀「模糊、非特異(non-specific)」(如感染不發燒、心梗無胸痛,A正確);病情「多樣化、多重共病(multimorbidity)」(B正確);易產生功能障礙且恢復較慢(器官儲備低,C正確);老人「更常」發生多系統性疾病與併發症。故D「老人較不會發生系統性疾病」與事實相反→不是老年疾病特點。","options":{"A":"症狀模糊非特異→老年特點。","B":"病情多樣化(多重共病)→老年特點。","C":"易功能障礙、恢復較慢→老年特點。","D":"說「較不會發生系統性疾病」→錯誤(老人系統性疾病更多),即答案。"},"sources":["Braddom/Geriatrics, Features of disease in the elderly"]}},"104090-71":{"quick":"「不」屬於ADL/IADL評估內容=握力大小(那是肌力測量,非ADL/IADL)(答A)。","detail":{"background":"日常生活活動(ADL)=基本自理(進食、穿衣、盥洗、如廁、移位、行走、洗澡);工具性日常活動(IADL)=較複雜的獨立生活能力(烹煮、購物、理財、家務、用藥管理、使用交通/電話)。本題:輪椅移位(ADL移動)、烹煮食物(IADL)、穿戴護腰(自理/穿著)皆屬ADL/IADL範疇;「握力大小」是「肌力(impairment層級)測量」,不屬ADL/IADL(activity層級)評估。故答A。","options":{"A":"握力是肌力測量,非ADL/IADL→正解(不屬)。","B":"輪椅移位屬ADL(移動)。","C":"烹煮食物屬IADL。","D":"穿戴護腰屬自理/穿著。"},"sources":["Braddom PM&R, ADL/IADL assessment"]}},"106020-69":{"quick":"身心障礙者權益保障法敘述「錯誤」:進入收費公營風景區/場所「應予半價優待」→錯,法定為「免費(免費入場)」(答C)。","detail":{"background":"依《身心障礙者權益保障法》:各級政府機關與公營事業員工總數34人以上者,進用身障者不得低於員工總數「3%」(A正確);公共停車場應保留「2%」位置作身障專用(B正確);各級政府應至少每5年舉辦身障者生活狀況等需求評估與服務調查(D正確);身障者及其必要陪伴者「進入收費的公營風景區、康樂場所或文教設施,應予『免費(其必要陪伴者一人半價)』」——本題C說「憑證明應予半價優待」與法定「免費」不符→錯誤。","options":{"A":"公部門進用身障者≥3%→正確。","B":"公共停車場保留2%身障車位→正確。","C":"說公營風景區「半價優待」→錯誤(法定免費),即答案。","D":"政府至少每5年辦需求調查→正確。"},"sources":["身心障礙者權益保障法; Braddom/復健政策"]}},"106080-69":{"quick":"重度失能病患復健心理問題——本題官方「送分(一律給分)」;否認/憂鬱/焦慮皆常見,SCI與中風的憂鬱vs焦慮比較有爭議故送分。","detail":{"background":"重度失能(中風、脊髓損傷等)病患復健常見心理問題:否認(denial,常見且非單一現象,A)、憂鬱與焦慮(皆常見,B)、適應障礙、自殺風險等,須整合心理支持與藥物。關於「脊髓損傷/中風的憂鬱是否比焦慮更常見」(C、D)的相對比較,文獻數據不一致、有爭議,故本題經考選部判定「一律給分」(送分),四選項皆給分。重點:重度失能者憂鬱與焦慮皆需積極篩檢與處置。","options":{"A":"否認是常見心理問題且非單一現象(送分)。","B":"憂鬱與焦慮皆復健常見心理問題(送分)。","C":"SCI憂鬱vs焦慮何者較常見有爭議(送分)。","D":"中風憂鬱vs焦慮比較有爭議(送分)。"},"sources":["Braddom PM&R, Psychological issues in disability; 送分"]}},"109080-71":{"quick":"巴氏量表(Barthel)「不包含」=服藥(taking medication,屬IADL)(答C)。","detail":{"background":"巴氏量表(Barthel Index)評估10項「基本ADL」:進食、洗澡、修飾(盥洗)、穿衣、大便控制、小便控制、如廁、移位(transfer)、行走(移動)、上下樓梯。「服藥(用藥管理)」屬「工具性ADL(IADL)」,不在Barthel基本ADL之列。故答C(服藥)。","options":{"A":"移位是Barthel項目。","B":"上下樓梯是Barthel項目。","C":"服藥屬IADL,不在Barthel內→正解。","D":"大便控制是Barthel項目。"},"sources":["Braddom PM&R, Barthel Index items"]}},"112020-71":{"quick":"癌症造成失能「最適當」:功能儲備不佳的器官癌症,早期就會出現失能症狀(答C)。","detail":{"background":"癌症相關失能:腫瘤伴生神經症候群(paraneoplastic)多與「免疫(自體抗體)」機轉相關而非「內分泌異常」(A錯);癌症轉移(骨、肺、腦)常造成心肺功能下降、肌力減弱、疼痛等功能喪失(B說「很少出現」錯誤);「功能儲備不佳的器官」一旦長腫瘤,因代償空間小,「早期即出現失能症狀」(C正確);肝臟代償儲備大,肝癌「早期」多無明顯全身失能(D說早期即嚴重失能錯誤)。故C最適當。","options":{"A":"paraneoplastic多為免疫機轉,非內分泌→A錯。","B":"癌轉移常致心肺/肌力下降(非很少)→B錯。","C":"功能儲備差的器官癌症早期即失能→正解。","D":"肝代償大,肝癌早期多無嚴重失能→D錯。"},"sources":["Braddom PM&R, Cancer-related disability"]}},"112080-59":{"quick":"老年肌肉變化「最不適當」:肌力減少「上肢比下肢明顯」→錯,老化肌力減退「下肢比上肢」更明顯(答A)。","detail":{"background":"老化肌肉(aging muscle/sarcopenia)變化:肌肉量(mass)減少、肌力(power)減退、第二型(type II,快縮、爆發力)肌纖維「較易萎縮」(D正確);肌力減退以「下肢(尤其近端)比上肢明顯」(下肢負重肌流失較快,影響行走、起身、跌倒)、且「近端比遠端明顯」(C正確)。本題A說「上肢比下肢明顯」與事實相反(應為下肢較明顯)→最不適當。","options":{"A":"說肌力減少「上肢比下肢明顯」→錯誤(下肢較明顯),即答案。","B":"肌肉量減少→正確。","C":"肌力減退近端比遠端明顯→正確。","D":"第二型肌纖維較易萎縮→正確。"},"sources":["Braddom/Geriatrics, Aging muscle changes"]}},"112080-68":{"quick":"巴氏量表敘述「錯誤」:分數越「低」越「不需」他人協助→錯,分數越低代表越「依賴」(越需協助)(答C)。","detail":{"background":"巴氏量表(Barthel Index):總分0-100(A正確);評估基本ADL、共10項(D正確);用於評估日常生活功能(B正確)。「分數越『高』越獨立(自理能力越好)、分數越『低』越『依賴(越需他人協助)』」。本題C說「分數越低越不需協助」與事實相反→錯誤。","options":{"A":"總分0-100→正確。","B":"評估日常生活功能→正確。","C":"說「分數越低越不需協助」→錯誤(低分=越依賴),即答案。","D":"評估項目共10項→正確。"},"sources":["Braddom PM&R, Barthel Index scoring"]}},"112080-70":{"quick":"老年肌少症(sarcopenia)「最適當」:是肌肉量、肌力與身體功能隨年齡減少的症候群(答A)。","detail":{"background":"肌少症(sarcopenia)定義(EWGSOP/AWGS):隨年齡進行性、全身性的「肌肉量減少+肌力下降(或身體功能/步速下降)」的症候群,以「低肌力」為核心、合併「低肌肉量」確診、再加「低體能」為嚴重。它會增加「跌倒、失能、住院、感染、壓瘡與『死亡率』」的風險(無性別限定為男性);發生率「與年齡直接相關(年齡越大越高)」,並受失用/不活動、營養不良、慢性病加重。故A最適當(B說尤其男性、C說不增死亡率、D說與年齡無直接相關皆錯)。","options":{"A":"肌少症=肌量+肌力+功能隨年齡減少的症候群→正解。","B":"增加失能風險不限「尤其男性」→B不夠精確。","C":"肌少症會增加死亡率(非不會)→C錯。","D":"發生率與年齡「直接相關」(非無關)→D錯。"},"sources":["AWGS/EWGSOP Sarcopenia; Braddom/Geriatrics"]}},"113020-69":{"quick":"老年復健目標「最適當」:不論短期長期皆要維持功能、提升生活品質、減少依賴與被照顧(答B)。","detail":{"background":"老年復健目標核心:維持與恢復「功能獨立」、提升「生活品質」、減少「依賴與被照顧負擔」、預防併發症與跌倒、促進社會參與——此目標貫穿短期與長期(B正確)。辨析:老年人多已退休,「職業/就業訓練」非主要重點(A錯);「獨立生活、社交與娛樂」正是老年復健重視的(C說較不需偏重錯誤);精神、疾病、體能因素「短期與長期都需考量」(D說只長期才需錯誤)。故B最適當。","options":{"A":"老人就業訓練非主要重點→A錯。","B":"維持功能、提升生活品質、減少依賴(短長期皆然)→正解。","C":"獨立生活/社交/娛樂正是重點(非較不需)→C錯。","D":"精神/疾病/體能短長期都需考量→D錯。"},"sources":["Braddom/Geriatrics, Goals of geriatric rehabilitation"]}},"113070-62":{"quick":"肌少症敘述「最不適當」:女性肌力衰退「較晚發生但速度較快」→錯(此敘述不正確)(答B)。","detail":{"background":"肌少症:男性肌肉量在50歲後每十年約降12-15%(A,概略數據);癌症與心肺肝腎末期等慢性消耗性疾病也會造成「次發性肌少症」(C正確);肌少症造成生活品質下降並增加死亡風險(D正確)。關於性別:一般而言男性絕對肌肉量與肌力較高、隨年齡流失的絕對量也較大;選項B對「女性肌力衰退較晚發生但速度較快」的描述並不符合公認趨勢(屬不正確/最不適當的敘述)。故答B。","options":{"A":"男性肌肉量50歲後每十年約降12-15%→大致正確。","B":"「女性肌力衰退較晚但速度較快」→不正確,最不適當,即答案。","C":"慢性消耗性疾病可致次發性肌少症→正確。","D":"肌少症降低生活品質、增死亡風險→正確。"},"sources":["AWGS Sarcopenia; Braddom/Geriatrics"]}},"113070-68":{"quick":"老年復健訓練風險「最適當」:比起不活動/臥床的併發症,復健訓練的風險傷害相對較小(答B)。","detail":{"background":"老年復健訓練雖有跌倒、扭傷、肌肉骨骼傷害或心血管事件等風險(A說「不會帶來傷害」錯誤),但「相較於『不活動/臥床』所造成的廢用症候群(肌肉萎縮、骨流失、壓瘡、DVT、肺炎、譫妄、功能退化)等併發症,復健訓練的風險傷害相對小得多」(B正確,故應鼓勵活動);選擇適當運動與強度、有監督下「可有效『降低』風險」(C說仍不易減少風險錯誤);復健最重大的風險不單是肌肉骨骼傷害(尚有心血管事件,D過於絕對)。故B最適當。","options":{"A":"說復健訓練「不會帶來傷害」→錯(有跌倒/扭傷等風險)。","B":"相較臥床併發症,復健風險相對較小→正解。","C":"適當運動+監督「可降低」風險(非不易減少)→C錯。","D":"最重大風險「就是」肌肉骨骼傷害→過絕對(尚有心血管事件)。"},"sources":["Braddom/Geriatrics, Risk-benefit of exercise in elderly"]}},"113070-71":{"quick":"巴氏量表敘述「最不適當」:包含「溝通能力及社會認知」→錯,那是FIM的項目,Barthel只含基本ADL不含溝通/社會認知(答D)。","detail":{"background":"巴氏量表(Barthel Index)評估「基本ADL」(A正確),滿分100(B正確),包含大小便控制(C正確),但「不含溝通與社會認知」——溝通與社會認知是「功能獨立量表(FIM)」才有的項目。故D「Barthel包含溝通能力及社會認知」最不適當(錯誤)。","options":{"A":"Barthel評估ADL能力→正確。","B":"滿分100→正確。","C":"包含大小便控制→正確。","D":"說包含「溝通與社會認知」→錯誤(那是FIM),即答案。"},"sources":["Braddom PM&R, Barthel vs FIM (no communication/cognition in Barthel)"]}},"114020-62":{"quick":"肌少症治療「最不適當」:高齡肌少症「為避免血壓上升不要做阻力運動」→錯,「阻力(抗阻)運動」正是肌少症最有效的核心治療(答C)。","detail":{"background":"肌少症治療的兩大基石:「阻力(抗阻)運動(resistance exercise)」(最有效、可增加肌量與肌力,A的身體活動含此)與「營養補充(足量蛋白質、維生素D)」(B正確);肌少症增加死亡率(D正確)。對高齡者,阻力運動安全且強烈建議(在適當強度與監督下),不應因「擔心血壓上升」而避免——避免阻力運動反而加重肌肉流失。故C「應不要進行阻力運動」最不適當。","options":{"A":"身體活動(含阻力運動)是治療→正確。","B":"營養補充(蛋白質/維D)是治療→正確。","C":"說「應不要做阻力運動」→最不適當(阻力運動是核心治療),即答案。","D":"肌少症增加死亡率→正確。"},"sources":["AWGS Sarcopenia management (resistance exercise + nutrition)"]}},"114020-68":{"quick":"巴氏量表「不包括」=溝通(communication)(答A)。","detail":{"background":"巴氏量表(Barthel Index)評估10項基本ADL:進食、洗澡(盥洗)、修飾、穿衣、大小便控制、如廁、移位、行走、上下樓梯。「溝通(communication)」「不」屬Barthel項目(它是FIM的社會認知/溝通項目)。本題選項中進食、如廁、盥洗皆屬Barthel,唯「溝通」不包括。故答A。","options":{"A":"溝通不屬Barthel(屬FIM)→正解(不包括)。","B":"進食是Barthel項目。","C":"如廁是Barthel項目。","D":"盥洗(修飾/洗澡)是Barthel項目。"},"sources":["Braddom PM&R, Barthel Index items"]}},"114070-69":{"quick":"巴氏量表敘述「最不適當」(官方多重B、C):B「評估項目共7項」→錯(共10項);C外籍看護申請「80歲以上總分<60」的條件敘述亦不正確。","detail":{"background":"巴氏量表(Barthel Index)是常用基本ADL評估量表(A正確),評估「10項」(B說7項錯誤),總分0分代表完全依賴(D正確)。關於我國「外籍家庭看護工」申請的巴氏量表門檻規定(依年齡分層,且近年放寬),選項C所述「80歲以上總分低於60分方可申請」與現行/通用規定不符(條件敘述不正確)。故官方判定B、C皆為最不適當(錯誤)敘述(多重給分)。","options":{"A":"Barthel是常用基本ADL量表→正確。","B":"說「評估項目共7項」→錯誤(共10項),給分。","C":"外籍看護申請門檻敘述不正確→給分。","D":"總分0分代表完全依賴→正確。"},"sources":["Braddom PM&R, Barthel Index; 官方多重答案B、C"]}},"114070-70":{"quick":"復健醫療照護「最不適當」:以「疾病種類」為界定復健療程/黃金期的「主要」依據→錯,應以「個別病人的功能障礙程度與復健潛能」為主要依據(答A)。","detail":{"background":"復健醫療精神:對象是「全人(whole person)」而非僅疾病(C正確);貢獻在改善生活品質、降低醫療與照顧社會成本、增進家庭和諧(B正確);急性期以「復健潛能(rehabilitation potential)」決定復健層級與強度(D正確)。復健療程與黃金治療期應依「個別病人的功能障礙、復健潛能與整體狀況」量身界定,而非單純以「疾病種類(中風/SCI等)」為主要依據(同一疾病不同病人差異極大)。故A最不適當。","options":{"A":"以「疾病種類」為界定療程/黃金期主要依據→最不適當(應依個別功能/潛能),即答案。","B":"復健改善生活品質、降低社會成本→正確。","C":"復健對象是全人→正確。","D":"急性期以復健潛能決定層級→正確。"},"sources":["Braddom PM&R, Principles of rehabilitation care"]}},"115020-65":{"quick":"骨質疏鬆性胸腰椎壓迫性骨折「最適當」:位於脊椎前柱(anterior column)者通常穩定、不需手術固定(答C)。","detail":{"background":"骨質疏鬆性壓迫性骨折:危險因子為「女性、停經、高齡、抽菸、低體重、類固醇」等(A說「男性」為主要危險因子不妥,女性風險更高);疼痛多在受傷後「數週內逐漸『改善』(癒合)」,而非愈來愈嚴重(B錯,若進行性加重須警覺惡性/感染);依Denis三柱概念,單純「前柱(anterior column)楔形壓迫」屬「穩定性骨折」,多以保守治療(止痛、支架、漸進活動、抗骨鬆藥)即可、「不需手術固定」(C正確);部分骨鬆壓迫性骨折「無明顯疼痛、偶然發現」(D說「一定有疼痛」錯誤)。故C最適當。","options":{"A":"女性才是主要危險因子(說「男性」不妥)→A不適當。","B":"疼痛多在數週內改善(非愈來愈嚴重)→B錯。","C":"前柱壓迫屬穩定骨折,通常不需手術固定→正解。","D":"部分骨鬆壓迫骨折無痛,說「一定有疼痛」→D錯。"},"sources":["Braddom/Ortho, Osteoporotic vertebral compression fracture (stable anterior column)"]}}},TO=["中樞神經復健(中風與腦傷)", "語言吞嚥與構音障礙", "脊髓損傷", "周邊神經病變與肌電圖診斷", "義肢截肢", "輔具裝具輪椅與無障礙環境", "肌肉骨骼與疼痛復健", "物理因子與運動治療", "心肺復健", "小兒復健", "老年復健肌少症與功能評估"],LEC={"中樞神經復健(中風與腦傷)":{"title":"中樞神經復健(中風與腦傷)","html":"<p><b>中風動作恢復—Brunnstrom 六階段</b>(高頻必考)：I 弛緩無動作→II 開始出現痙攣與協同動作→III 痙攣達高峰、能隨意做<u>協同動作</u>→IV 痙攣下降、<u>開始脫離協同</u>(手放腰後)→V 痙攣明顯減退、可做進階脫離協同(手舉過頭、伸肘旋前後)→VI 協調近正常。</p>\n<p><b>協同動作(synergy)</b>：上肢<b>屈曲協同</b>=肩外展外旋+肘屈+前臂<u>旋後</u>+腕指屈;<b>伸直協同</b>=肩內收內旋+肘伸+前臂<u>旋前</u>。考題常問「前臂旋前不屬屈曲協同」。</p>\n<p><b>傳統治療技術</b>：NDT(Bobath)抑制異常模式、誘發選擇性控制;Brunnstrom 利用協同/反射;PNF 對角模式;工作導向訓練。</p>\n<p><b>痙攣處置階梯</b>：去誘因(痛/感染/壓瘡/尿滯)→擺位牽拉→局部(肉毒桿菌:抑制突觸前ACh釋放/切SNAP-25,3-7天起效、維持3-4月)→口服(baclofen GABA-B、tizanidine、dantrolene)→鞘內baclofen(廣泛嚴重者最佳)。腦傷廣泛痙攣「藥物治療」效果最好。</p>\n<p><b>偏癱併發症</b>:急性期最常見=吸入性肺炎;肩半脫位處置=維持被動ROM+加強肩外展(非長期肩帶);壓瘡側臥好發大轉子;DVT抗凝後可早期活動。中風後中樞痛(視丘/Dejerine-Roussy)=病灶<u>對側</u>灼痛、溫痛覺受損。</p>\n<p><b>定位與症狀</b>:MCA→對側偏癱(上肢顏面重)、同向偏盲、優勢側失語、非優勢側忽略/失用;ACA/額葉內側→動作不能性緘默;額葉→認知行為人格改變;頂葉→失用症;腦幹(橋腦)→交叉徵候;小腦→共濟失調(非MCA)。右半球中風→忽略+衝動→<u>跌倒</u>風險高。</p>\n<p><b>腦傷(TBI)預後</b>:GCS、昏迷時間、創傷後失憶(PTA)時間為主;癲癇發生頻率關聯最低。Rancho量表追蹤認知恢復。腦傷臨床三角=慢性痛+睡眠障礙+PTSD。</p>"},"語言吞嚥與構音障礙":{"title":"語言吞嚥與構音障礙","html":"<p><b>失語症—用「覆誦」分型</b>(必考核心)：覆誦<u>差</u>者=Broca(不流暢、理解佳)、Wernicke(流暢、理解差、新詞neologism)、傳導型(流暢理解佳但覆誦差,弓狀束)、全失語(三區皆損,左MCA大梗塞);覆誦<u>保留</u>者=三種經皮質型(分水嶺帶)與命名型(anomic,最輕、覆誦最佳)。</p>\n<p><b>構音障礙(dysarthria)—依病灶</b>:弛緩型(LMN/NMJ)、痙攣型(<u>雙側</u>UMN)、運動失調型(小腦,scanning speech)、運動過弱型(帕金森/基底核,音量單調短促)、運動過強型(舞蹈/徐動,母音扭曲嗓音停頓)。口吃=語暢障礙(字首難發、重複延長阻斷)。</p>\n<p><b>吞嚥</b>:四期(口腔準備/口腔/咽喉/食道)。咽喉期障礙→<u>液體易嗆</u>;食道期→食團滯留胸後。代償:單側咽無力「頭轉向患側」;Mendelsohn手法<u>延長/增加</u>上食道括約肌開放;chin-tuck保護氣道。固體過不去(環咽肌失弛緩)→環咽肌擴張/切開。餵食:清醒、坐直(勿平躺)、小口、略低頭。</p>"},"脊髓損傷":{"title":"脊髓損傷(SCI)","html":"<p><b>ASIA分級</b>:先定神經學節段(最低正常感覺+肌力≥3;臍=T10)。AIS:A完全(S4-5無感覺運動)、B僅感覺保留、C運動不完全(多數關鍵肌<3)、D(多數≥3)、E正常。看薦髓保留(S4-5感覺、肛門自主收縮VAC)。</p>\n<p><b>功能分級(完全損傷)</b>:C4僅電動輪椅(下巴/吹吸);C5屈肘、特製手動輪椅(最高位可獨立手動輪椅);C6伸腕tenodesis抓握、防滑手套+橡皮輪圈推輪椅;C7伸肘(三頭肌)、可撐起轉位;T6可前臂枴/助行器。上肢恢復多在傷後6-9月(前3月最快),早恢復預後佳。</p>\n<p><b>併發症</b>:自主神經反射不良(T6以上完全損傷,膀胱脹最常見誘因→陣發性<u>高血壓</u>+頭痛潮紅出汗心搏緩;處置:坐起、去誘因/導尿;脊髓休克消退後即>1月才出現);異位性骨化(髖最常見、傷後1-6月,<u>三相骨掃描</u>最早最敏感,成熟後才手術);壓瘡(急性仰臥=薦骨、慢性坐輪椅=坐骨);泌尿:UTI最常見併發症;神經性膀胱(薦髓上=逼尿肌過動+DSD高壓小容量)。</p>\n<p><b>症候群</b>:Brown-Séquard(半切:同側運動+本體覺、對側痛溫覺;預後最佳多可走);中央索(老人退化頸椎過伸跌倒、無骨折,上肢重於下肢);前脊髓動脈梗塞(前2/3,owl''s eye);NPUAP壓瘡分級(3級見脂肪、4級見肌腱骨)。</p>"},"周邊神經病變與肌電圖診斷":{"title":"周邊神經病變與肌電圖診斷","html":"<p><b>電學診斷選擇</b>(高頻):神經傳導(NCS)→腕隧道<u>早期</u>、多發性神經病變(糖尿病)、脫髓鞘vs軸突;針極EMG→神經根病變(查脊旁肌、感覺NCS常正常)、肌病vs神經病、運動神經元病(廣泛肌束顫動);重複神經刺激(RNS)→NMJ疾病(MG遞減);EMG/NCS<u>無法</u>診斷上運動神經元病變。EMG禁忌=出血傾向(血友病)。去神經電位(纖維顫動)需傷後2-3週才現。NCS受體溫(正相關)、肢長、年齡影響。</p>\n<p><b>晚反應</b>:H反射=單突觸反射(Ia傳入,評S1);F波=超強度刺激、逆行再順行、潛期多變、出現在M波後、振幅小。</p>\n<p><b>上肢神經卡壓</b>:正中(腕隧道CTS:拇-中指麻、Tinel/Phalen+、大魚際萎縮但<u>掌皮支保留故大魚際皮膚不麻</u>;治療先腕中立副木)(旋前圓肌症候群=前臂近端);尺神經(肘隧道/腕Guyon管:鷹爪手、小魚際萎縮、Froment徵象);橈神經(螺旋溝骨折→垂腕;PIN→伸指無力);骨間前神經(AIN)管屈指不影響伸指。</p>\n<p><b>肩胛/神經</b>:長胸神經(前鋸肌→翼狀肩胛);上肩胛神經(棘上下肌,過頭運動員);臂神經叢上幹(C5-6 Erb→waiter''s tip);root avulsion=節前撕脫(假性脊膜膨出)。下肢:腓神經(CMT最易侵犯、垂足);GBS診斷必要=反射消失,上行性。</p>"},"義肢截肢":{"title":"義肢截肢","html":"<p><b>截肢層級</b>(由遠至近):趾→經蹠骨→Lisfranc(蹠跗關節,殘肢無蹠骨)→Chopart(跗中關節,保留距/跟骨,適AFO型義肢)→Syme(踝關節離斷,跟墊覆脛骨遠端可承重)→經脛骨(膝下,理想殘肢約原脛骨40%中段)→膝上。</p>\n<p><b>義足</b>:SACH(固定踝軟跟,無儲能)、單軸、多軸(適應地面)、儲能型=Flex-foot(費式,碳纖維,高活動量)。膝下PTB承筒:承壓區=髕腱、脛骨內側平台、股骨內髁;免壓區=脛骨嵴、腓骨頭(腓神經)。</p>\n<p><b>術後復健</b>:彈繃塑形減水腫、減敏感、早期肌力訓練、<u>勿膝後墊枕</u>(防屈曲攣縮);現代採早期/臨時義肢(不必等完全癒合)。幻肢痛=神經病變痛,TENS/拍打殘肢有效。流行病學:下肢截肢最常見=血管疾病;兒童=創傷(非腫瘤);上肢=創傷、手指最多;先天缺損上肢較多。糖尿病足照護終極目標=降低截肢率。</p>"},"輔具裝具輪椅與無障礙環境":{"title":"輔具裝具輪椅與無障礙環境","html":"<p><b>下肢矯具</b>:AFO(最常用,垂足/小腿無力/痙攣;會限制距下關節;非用於功能性扁平足);KAFO(鎖膝伸直,股四頭無力);單純膝無力不需HKAFO。膝OA內側→外側楔形鞋墊;RA鈕扣孔變形→環形矯具。脊椎背架:胸腰段壓迫骨折(T10-T12)→Knight-Taylor全背架(TLSO);William(腰薦,限伸展);Milwaukee(脊柱側彎)。頸圈限制度:軟頸圈最弱<費城<四柱<halo最強。燒傷手抗攣縮位:腕伸、MCP屈、IP伸、拇外展(勿屈);腋下燒傷飛機副木維持肩<u>外展</u>。</p>\n<p><b>行走輔具</b>:穩定/承重 手杖<四腳杖<前臂枴<腋下枴(承重最大)<助行器(穩定最大,共濟失調用);腋下枴壓腋窩→橈神經(crutch palsy)。矯具不訓練肌力(被動支撐)。</p>\n<p><b>輪椅</b>:手動優點=易運送;電動=長程省力過粗地;後輪camber(外傾)→穩定/省力/護肩但輪胎不均磨損;後軸偏前=省力護肩;扶手高度影響推行;訂製需評估心肺功能、皮膚、ROM。<b>無障礙</b>:出院前即評估;常用物品放易取處(勿放地板);加寬門/扶手;職能治療師主責(非僅復健科醫師)。</p>"},"肌肉骨骼與疼痛復健":{"title":"肌肉骨骼與疼痛復健","html":"<p><b>肩</b>:旋轉肌袖=SITS(棘上下、小圓、肩胛下;非二頭肌);鈣化性肌腱炎(X光鈣化白斑、夜間痛);冰凍肩(沾黏性關節囊炎,主動+<u>被動</u>皆受限,熱療+ROM);旋轉肌損傷(主動痛、被動不痛);肩盂唇需MRI(超音波難測);Hill-Sachs/Bankart(前脫位不穩定);乳癌術後肩外展最受限(漸進ROM,勿術後立即主動全活動)。</p>\n<p><b>膝/下肢</b>:跳躍者膝=髕腱炎(髕骨下緣);腸脛束摩擦(跑者外髁前痛);ACL斷裂(POP聲+血關節積血,先抽積血、不一定手術、MRI診斷);OA(承重關節、軟骨下囊腫/骨刺/關節腔窄、避提重物、有低度發炎);足底筋膜炎(高弓/扁平、踝背屈受限;非距下旋後);踝扭傷最常傷ATFL。</p>\n<p><b>脊椎/其他</b>:腰椎間盤突出→熱敷+骨盆牽引;神經性跛行(坐下/前彎緩解)=腰椎管狹窄(MRI);OPLL(老人過伸跌倒頸髓壓迫);頸椎中央型突出壓脊髓、外側型壓神經根;下背痛紅旗=夜間痛進行性加重。手OA(Heberden/Bouchard結節);網球肘(ECRB肌腱起點退化);僵直性脊椎炎(附著點病變>RA、骨折好發頸椎、HLA-B27約90%、復健強調伸展);梨狀肌症候群(FAIR test屈曲內收內旋);纖維肌痛(廣泛痛、無關節發炎)。</p>"},"物理因子與運動治療":{"title":"物理因子與運動治療","html":"<p><b>熱療</b>:淺層(熱敷包/紅外線/蠟療,熱敷包最易燙傷);深層diathermy=短波/微波/超音波。冷療:血管收縮、降急性發炎腫脹、止痛(慢性痛亦可用);急性骨折/扭傷用冰敷(熱療會加重出血腫脹)。</p>\n<p><b>電療</b>:TENS(門閥理論止痛,刺激Aβ);干擾波(中頻電療,非熱);FES(功能性電刺激,刺激完整神經/肌肉誘發收縮→垂足刺激深腓神經、防去神經肌萎縮、SCI骨流失、應力尿失禁;肌肉本身病變如Becker MD無效);新鮮未固定骨折處勿電刺激(致移位)。</p>\n<p><b>運動類型</b>:等長(關節不動,石膏固定期適用)、等張(負荷固定關節動)、等速(角速度固定,需儀器);三者不同(等張≠等速)。<b>制動(臥床)效應</b>:肌萎縮、肌力減退、協調差、骨流失、DVT、壓瘡、韌帶<u>攣縮(延展性降低)</u>。</p>\n<p><b>疼痛復健</b>:多專業團隊(非麻醉醫師單獨);保守優先(非優先手術);運動增腦啡;脊髓刺激(SCS)用於神經病變痛(failed back/SCI/截肢痛),非癌痛;非藥物止痛=TENS/針灸/行為(腹腔神經叢阻斷屬侵入性藥物)。痛覺:快痛Aδ(定位精準)、慢痛C纖維(瀰漫)。</p>"},"心肺復健":{"title":"心肺復健","html":"<p><b>心臟復健分期</b>:第I期(住院期,無併發症MI/CABG「住院第1天」即開始早期活動);第II期(出院後監督門診運動);III/IV維持期。CABG術後須<u>胸骨防護</u>(早期避免上肢抗阻、提重)。已證實降低短期長期死亡率,但使用率偏低、女性/老人參與率<u>較低</u>。</p>\n<p><b>運動強度指標</b>:最大心率%、心率儲備(Karvonen)、RPE(Borg)、MET、無氧閾值;<u>血氧不是強度指標</u>。心臟移植(去神經)→用RPE(心率不可靠)。1 MET=3.5 mL O2/kg/min(70kg休息=245 mL/min)。</p>\n<p><b>禁忌</b>(絕對):不穩定心絞痛、嚴重主動脈狹窄、失代償心衰、急性<u>心肌炎/心包膜炎</u>、未控制心律不整。MI穩定後/CABG/心臟移植反而應做心臟復健。</p>\n<p><b>訓練效果</b>:VO2max↑、A-V O2差↑、靜息/次強度心率↓、收縮壓↓、心肌耗氧↓、血脂改善、缺血閾值↑;最大心率(由年齡定)不變。<b>肺復健</b>:有氧訓練、撅唇呼吸(慢深長吐、維持呼氣正壓防氣道塌陷)、排痰(叩擊/姿位引流/有效咳嗽;橫膈呼吸非排痰);PaO2≤60給氧;運動性呼吸困難是<u>目標非禁忌</u>;術後擺位「好肺在下」;ICU早期復健改善呼吸器脫離率。6分鐘行走測試(30m硬地)評估功能性運動耐力。</p>"},"小兒復健":{"title":"小兒復健","html":"<p><b>腦性麻痺(CP)</b>(最大宗):發育中腦部<u>非進行性</u>損傷,核心=運動姿勢障礙(非以智障為主),最常見痙攣型。分型/病因:<b>痙攣型雙側麻痺(diplegia,下肢重)</b>=早產PVL最常見;偏癱型(hemiplegic)=足月、可走、癲癇較多;四肢麻痺型(quadriplegic)=廣泛腦損傷、智障/吞嚥困難、髖脫位風險最高;<b>徐動型(athetoid)</b>=核黃疸(高膽紅素)/缺氧傷基底核、合併聽損。GMFCS愈高(IV-V)脊柱側彎愈嚴重(神經肌肉型C形+骨盆歪斜,背架療效有限)。髖脫位常無痛、需X光監測;下肢手術多待7歲後但「髖關節」例外可早做。治療:拉筋、AFO、肉毒、鞘內baclofen(對痙攣與dystonia皆有效);TENS不改善痙攣步態。</p>\n<p><b>發展里程/反射</b>:翻身~4-6月、爬~9月、雙腳跳~2歲、騎三輪車~3歲。原始反射(Moro/ATNR/抓握)4-6月消失(持續=異常);姿勢反射(Landau~3-4月現、降落傘~6-9月現後<u>終生保留</u>)。</p>\n<p><b>其他</b>:先天肌肉斜頸(患側SCM短縮、頭傾患側轉健側、合併髖發育不良、保守伸展為主);內八(學齡女孩=股骨前傾);DMD(X隱性、小腿假性肥大、Gower徵象=<u>近端</u>無力、心肌受累);SMA(體染色體隱性SMN1、嬰兒型嚴重、DNA產前診斷、EMG去神經);脊髓脊膜膨出→合併水腦(Chiari II);早療(<6歲、家庭中心、愈早愈好、盛行率約6-8%)。</p>"},"老年復健肌少症與功能評估":{"title":"老年復健肌少症與功能評估","html":"<p><b>功能評估量表</b>(高頻):<b>巴氏量表(Barthel Index)</b>=10項基本ADL(進食/洗澡/修飾/穿衣/大小便/如廁/移位/行走/上下樓),總分0-100,<u>分數越高越獨立</u>,<u>不含溝通與社會認知、不含服藥(屬IADL)</u>。<b>FIM(功能獨立量表)</b>=18項、每項1-7分、含溝通與社會認知。ADL=基本自理;IADL=烹煮/購物/理財/用藥。握力屬肌力(非ADL)。復健功能評估與肝腎功能最不相關。</p>\n<p><b>肌少症(sarcopenia)</b>:肌量+肌力+體能隨年齡進行性下降的症候群(AWGS/EWGSOP);增加跌倒、失能、感染、住院與<u>死亡率</u>;與年齡直接相關;下肢/近端、第二型(快縮)纖維較易萎縮。治療兩基石=<b>阻力運動+營養(蛋白質/維D)</b>(勿因怕血壓而不做阻力運動)。</p>\n<p><b>老年復健原則</b>:老年病症狀模糊非特異、多重共病、恢復慢;復健目標=維持功能、提升生活品質、減少依賴(短長期皆然);復健訓練風險遠小於臥床併發症;以個別「功能障礙與復健潛能」界定療程(非以疾病種類);復健對象是「全人」。骨鬆壓迫性骨折(女性危險因子、痛多數週內改善、前柱穩定多不需手術);乳癌淋巴水腫CDT(徒手引流+低彈繃帶+運動+皮膚照護;單純抬高效果有限)。身心障礙者權益保障法:公部門進用≥3%、停車位2%、公營風景區<u>免費</u>。</p>"}};

const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
