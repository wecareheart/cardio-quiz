、抽菸均是危險因子","B":"通常疼痛在數週內會愈來愈嚴重","C":"若損傷處位於脊椎前列（anterior column），通常不需手術固定","D":"病人一定有疼痛現象"}},{"id":"115020-67","code":"115020","num":67,"roc":115,"ad":2026,"round":"第一次","stem":"關於腦性麻痺（cerebral palsy）患者相關的脊椎側彎（scoliosis），下列敘述何者最不適當？","opts":{"A":"無法行走（nonambulatory）的腦性麻痺患者，比可以行走的腦性麻痺患者脊椎側彎嚴重","B":"全身影響（total body involvement）的腦性麻痺患者，比不是全身影響的腦性麻痺患者脊椎側彎嚴重","C":"無法行走（nonambulatory）的腦性麻痺患者容易發生C 形狀（C-shape）的脊椎側彎合併骨盆歪斜（pelvicobliquity）","D":"背架（bracing）可以有效的避免腦性麻痺患者脊椎側彎的惡化"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","topic_code":"T10","topic":"小兒復健","topic_num":40,"img":"","q_num":67,"roc_year":115,"exam_code":"115020","src":"民國115年第一次","options":{"A":"無法行走（nonambulatory）的腦性麻痺患者，比可以行走的腦性麻痺患者脊椎側彎嚴重","B":"全身影響（total body involvement）的腦性麻痺患者，比不是全身影響的腦性麻痺患者脊椎側彎嚴重","C":"無法行走（nonambulatory）的腦性麻痺患者容易發生C 形狀（C-shape）的脊椎側彎合併骨盆歪斜（pelvicobliquity）","D":"背架（bracing）可以有效的避免腦性麻痺患者脊椎側彎的惡化"}},{"id":"115020-70","code":"115020","num":70,"roc":115,"ad":2026,"round":"第一次","stem":"下列何者不是執行無障礙環境介入時的省力及工作簡化原則？","opts":{"A":"將物品依照使用頻率放置，將經常需要使用之物品放在離病人較遠的位置，以讓患者多行動來進行復健","B":"使用槓桿原理及重力以節省體力","C":"儘量在neutral position 的關節活動度姿勢下執行職能活動","D":"使用機械操控之機器、設備設施、工具來取代人力"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","topic_code":"T6","topic":"輔具裝具輪椅與無障礙環境","topic_num":29,"img":"","q_num":70,"roc_year":115,"exam_code":"115020","src":"民國115年第一次","options":{"A":"將物品依照使用頻率放置，將經常需要使用之物品放在離病人較遠的位置，以讓患者多行動來進行復健","B":"使用槓桿原理及重力以節省體力","C":"儘量在neutral position 的關節活動度姿勢下執行職能活動","D":"使用機械操控之機器、設備設施、工具來取代人力"}},{"id":"115020-71","code":"115020","num":71,"roc":115,"ad":2026,"round":"第一次","stem":"下列有關輪椅的敘述，何者最不適當？","opts":{"A":"對於全身痙攣張力強或軀幹控制不佳的腦性麻痺病人而言，傳統輪椅較為不合適","B":"對於C5 受傷的病人而言，最好在輪環的手推圈上加上橡膠包覆或突出的小握把，以方便他們自行推動","C":"大輪的尺寸一般為22～26 吋，若尺寸太大，對於上肢活動度較差的病人而言較不合適","D":"椅背的高度最好落在肩胛骨上緣處，有利於病人上身的活動度"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","topic_code":"T6","topic":"輔具裝具輪椅與無障礙環境","topic_num":30,"img":"","q_num":71,"roc_year":115,"exam_code":"115020","src":"民國115年第一次","options":{"A":"對於全身痙攣張力強或軀幹控制不佳的腦性麻痺病人而言，傳統輪椅較為不合適","B":"對於C5 受傷的病人而言，最好在輪環的手推圈上加上橡膠包覆或突出的小握把，以方便他們自行推動","C":"大輪的尺寸一般為22～26 吋，若尺寸太大，對於上肢活動度較差的病人而言較不合適","D":"椅背的高度最好落在肩胛骨上緣處，有利於病人上身的活動度"}}],E={"101030-56":{"quick":"偏癱步態靠「伸肌張力過強」走路:髖環繞、足內翻下垂、上肢協同屈曲;膝是「外翻genu valgum」不會出現,反而常見膝過度伸直(genu recurvatum)。","detail":{"background":"腦中風或痙攣型腦性麻痺造成上運動神經元(UMN)損傷,患側出現「伸肌張力過強型偏癱步態(spastic hemiparetic gait)」。其機轉是痙攣使抗重力肌(下肢伸肌、足蹠屈肌)張力過強、動作以僵硬的「協同模式(synergy)」進行而非選擇性肌肉控制。典型表現:下肢因髖屈/膝屈無力且伸直僵硬,擺盪期無法縮短肢長,只能以「髖部環繞動作(circumduction)」把腿甩向外前方繞過;足踝因腓腸肌/脛後肌痙攣呈現「馬蹄內翻足(equinovarus)」即足下垂併內翻;站立期患膝常因股四頭肌痙攣而過度伸直(genu recurvatum膝反屈);上肢呈屈曲協同(肩內收、肘腕指屈曲)並在用力時出現「協同收縮(co-contraction)」。重點:膝部變化是「過度伸直(recurvatum)」而非「外翻(genu valgum)」,genu valgum(膝外翻/X型腿)屬骨骼排列問題,與痙攣偏癱步態無關。","options":{"A":"膝外翻(genu valgum)是骨骼排列異常,不是痙攣偏癱步態特徵→此即答案(不會出現)。偏癱步態膝部反而常見過度伸直(recurvatum)。","B":"髖部環繞動作(circumduction)是偏癱步態代表性特徵,因擺盪期無法縮短患肢→會出現。","C":"上肢協同收縮(co-contraction)是UMN損傷喪失選擇性控制的表現→會出現。","D":"足部內翻(inversion,合併下垂成equinovarus)因腓腸肌與脛後肌痙攣→會出現。"},"sources":["Braddom Physical Medicine & Rehabilitation, Stroke Rehabilitation & Gait","DeLisa Rehabilitation Medicine"]}},"102110-55":{"quick":"右側無力(左腦中風)由地上站起,要用「健側(左)下肢屈膝在後出力、患側(右)伸膝在前」當支點→答案A:右下肢伸膝向前、左下肢屈膝。","detail":{"background":"腦中風偏癱病人的轉位/起身訓練,核心原則是「以健側為主要出力與支撐、患側擺在穩定省力的位置」。右側肢體無力代表左大腦中風;由地面站起時,健側(左)肢體需提供主要推進力,故健側下肢屈膝置於身體下方(蹲跪姿)以利發力;患側(右)下肢無力無法出力,應伸膝向前作為被動支撐避免拖絆。健側上肢撐地或扶物協助。此即「健側帶動患側」的代償策略,也是物理治療轉位訓練的基礎。","options":{"A":"右(患)下肢伸膝向前作支撐、左(健)下肢屈膝在下出力→正解,符合健側出力原則。","B":"左右相反,要患側出力屈膝,但患側無力無法出力→不當。","C":"描述上肢扶地但下肢配置不利於健側出力。","D":"右上肢為患側無力,以患側上肢扶地不穩→不當。"},"sources":["Braddom PM&R, Stroke functional training","物理治療轉位訓練原則"]}},"102110-59":{"quick":"腦傷後全身性痙攣最有效是「藥物治療」(口服baclofen/tizanidine、嚴重者鞘內baclofen或局部肉毒);冷熱與牽拉只能暫時、輔助。","detail":{"background":"痙攣(spasticity)是UMN損傷後速度依賴性的肌張力增加,源於脊髓反射去抑制。處置採階梯式:先去除誘發因子(疼痛、感染、壓瘡、尿滯留)與正確擺位/牽拉;局部痙攣用肉毒桿菌注射或神經阻斷;全身廣泛性痙攣以口服抗痙攣藥(baclofen GABA-B致效劑、tizanidine α2致效劑、diazepam、dantrolene作用於肌肉)為主,頑固者用鞘內baclofen幫浦。題目問「腦傷病人(廣泛性)」最有效者→藥物治療。物理方法(冷療降神經傳導、牽拉、反射抑制擺位)效果短暫、屬輔助。","options":{"A":"藥物治療對廣泛性痙攣最有效→正解。","B":"冷熱療法只能暫時降張力,效果短暫。","C":"反射抑制法(擺位)為輔助,無法持久控制。","D":"牽拉運動可維持關節活動度、預防攣縮,但對降張力效果有限。"},"sources":["Braddom PM&R, Spasticity Management","DeLisa, Spasticity"]}},"103030-55":{"quick":"Modified Ashworth:被動活動「整個ROM大部分張力增加但仍可輕易移動」=Grade 2;「整個ROM增加且移動困難」才是3。題目「>50% ROM張力增加、可輕易移動」→2(答C)。","detail":{"background":"修正版Ashworth量表(Modified Ashworth Scale, MAS)是臨床評估痙攣張力最常用的工具,分級:0=無張力增加;1=輕微增加,於ROM末端出現卡頓或極小阻力;1+=輕微增加,於ROM後半(<50%)出現卡頓並伴隨小阻力;2=明顯增加於「大部分ROM」但患肢仍「可輕易被移動」;3=張力顯著增加、被動移動「困難」;4=患肢僵直無法移動。本題:被動背屈時於「大於50% ROM」張力明顯增加,但「可以很容易被移動」→符合Grade 2。判讀關鍵在「阻力出現範圍(大部分ROM)」+「仍可輕易移動」。","options":{"A":"1=僅ROM末端極小卡頓,與本題大部分ROM增加不符。","B":"1+=ROM後半<50%出現卡頓+小阻力,本題已>50%且明顯。","C":"2=大部分ROM張力增加但可輕易移動→正解。","D":"4=肢體僵直無法移動,本題仍可輕易移動,不符。"},"sources":["Modified Ashworth Scale (Bohannon & Smith 1987)","Braddom PM&R, Spasticity assessment"]}},"103030-56":{"quick":"上肢屈曲協同包含肩外展(上抬)、肘屈、腕指屈、前臂「旋後」;「前臂旋前」屬伸直協同→不包含(答C)。","detail":{"background":"腦中風後動作恢復常以刻板的「協同動作(synergy/聯帶運動)」進行,無法選擇性單一關節控制。上肢有兩種協同:屈曲協同(flexor synergy)=肩胛回縮上抬、肩外展外旋、肘屈曲、前臂旋後、腕指屈曲;伸直協同(extensor synergy)=肩內收內旋、肘伸直、前臂旋前。本題問屈曲協同「不包含」者→前臂旋前(屬伸直協同)。記憶法:屈曲協同上肢「縮回貼近身體+旋後」。","options":{"A":"肩外展屬上肢屈曲協同→包含。","B":"肘屈曲是屈曲協同核心→包含。","C":"前臂旋前(pronation)屬伸直協同,不屬屈曲協同→正解。","D":"腕屈曲屬屈曲協同→包含。"},"sources":["Brunnstrom Movement Therapy","Braddom PM&R, Motor recovery synergies"]}},"103100-55":{"quick":"帕金森復健「最不常用」的是跑步機作體能訓練;因動作緩慢/姿態不穩跑步機跌倒風險高。常用的是節律/感覺提示(cueing)、大幅度動作(LSVT-BIG)、柔軟與阻力運動、帶輪助行器。","detail":{"background":"帕金森氏病(PD)是黑質多巴胺神經元退化造成動作遲緩(bradykinesia)、僵硬、靜止性震顫與姿勢不穩。復健核心:利用「外在提示(cueing)」克服動作起始困難與凍結步態(視覺地面線條、聽覺節拍器、觸覺),大幅度動作訓練(LSVT-BIG)、發聲訓練(LSVT-LOUD)、柔軟度與軀幹旋轉、平衡與阻力運動。輔具用帶輪助行器(rolling walker)維持前進動力(無輪助行器反而促成凍結跌倒)。跑步機訓練雖有部分研究支持,但PD病人姿勢反射差、易凍結跌倒,屬較少常規使用、需嚴密保護→本題「最不常用」。","options":{"A":"跑步機體能訓練因跌倒風險、姿勢不穩,最不常規使用→正解。","B":"帶輪助行器維持活動功能→常用。","C":"阻力與柔軟運動改善體能與僵硬→常用。","D":"多重感覺提示(cues)是PD復健核心策略→常用。"},"sources":["Braddom PM&R, Parkinson Disease Rehabilitation","LSVT BIG/LOUD"]}},"103100-57":{"quick":"中樞性(UMN)上肢痙攣最佳效果是「藥物治療」(口服抗痙攣藥、局部肉毒);物理治療/輔具/針灸為輔助。","detail":{"background":"同痙攣處置階梯。中樞神經(腦或脊髓)損傷造成的痙攣,物理治療(牽拉、擺位)與輔具可預防攣縮、輔助控制,但要「最佳療效」降低肌張力仍以藥物(局部肉毒桿菌注射、口服baclofen/tizanidine/dantrolene、鞘內baclofen)為主。針灸實證有限。","options":{"A":"物理治療為輔助,降張力效果有限。","B":"藥物治療對中樞性痙攣最佳效果→正解。","C":"輔具矯正預防攣縮,非降張力主力。","D":"針灸實證薄弱。"},"sources":["Braddom PM&R, Spasticity"]}},"103100-64":{"quick":"中風半年內預後「不佳」因子:坐姿不穩、尿失禁、認知/心智改變、嚴重弛緩無張力等;「肢體張力增強(spasticity)」反映運動恢復進展,非不佳因子(答D)。","detail":{"background":"急性中風後預測功能恢復的不良預後因子包括:嚴重的初始癱瘓、持續弛緩無動作、坐姿平衡差(poor sitting balance)、大小便失禁(尤其尿失禁是強預後指標)、認知/知覺缺損與心智狀態改變、嚴重忽略、本體感覺喪失、高齡與多重共病。相對地,肌張力由弛緩→出現痙攣與協同動作(Brunnstrom由stage 1進入2-3)代表運動恢復「正在進展」,屬恢復過程而非預後不佳指標。故本題答D。","options":{"A":"坐姿不穩(平衡差)→預後不佳因子。","B":"尿失禁是公認的中風不良預後強指標。","C":"心智/認知改變影響學習與配合→不佳因子。","D":"肢體痙攣張力增強代表恢復進展(離開弛緩期),非不佳因子→正解。"},"sources":["Braddom PM&R, Stroke prognosis","Stroke rehabilitation outcome predictors"]}},"104030-64":{"quick":"發病1個月仍有肩關節半脫位,最重要的是「維持被動肩關節活動度+加強肩周(外展)肌力」以重建肩盂穩定;肩帶/貼紮為輔助,不可只固定。","detail":{"background":"中風後偏癱肩半脫位(glenohumeral subluxation)常見於弛緩期,因棘上肌、三角肌等肩袖與肩周肌張力低下,加上重力牽引使肱骨頭由肩盂下滑。處置原則:正確擺位與支撐避免牽拉,維持被動關節活動度防止攣縮與沾黏,並儘早促進肩周肌(棘上肌、三角肌)再活化以重建主動穩定(電刺激、主動/輔助運動)。肩帶(sling)、貼紮、放軟墊僅為暫時輔助、過度依賴反而促成攣縮。故最重要者為維持被動ROM+加強肩外展肌力(答B)。","options":{"A":"肩帶固定為暫時輔助,長期使用易致屈曲攣縮。","B":"維持被動肩ROM並加強肩外展肌力,重建穩定→正解。","C":"腋下軟墊增加外展只是被動措施,非最重要。","D":"貼紮固定僅輔助,無法根本重建肌肉穩定。"},"sources":["Braddom PM&R, Hemiplegic shoulder","Stroke shoulder subluxation management"]}},"104030-69":{"quick":"神經心理測驗敘述「錯誤」者:Rancho量表「無法」觀察進步→錯,Rancho Los Amigos認知功能分級正是用來追蹤腦傷恢復進展(答B)。","detail":{"background":"腦傷後神經心理/認知評估工具:Glasgow Coma Scale(GCS)用於急性意識/嚴重度篩檢與分級(輕13-15、中9-12、重≤8);Rancho Los Amigos認知功能分級(Levels I-VIII/X)專門描述腦傷病人「認知與行為恢復的階段」,可縱向追蹤進步,並指導照護策略(如第IV級躁動期環境管理)。神經心理測驗有助復健計畫擬定;情緒/行為問題會影響復健成效。本題敘述B說Rancho「無法」觀察進步,與其用途相反→錯誤。","options":{"A":"GCS用於急性神經損傷篩檢分級→正確。","B":"Rancho量表本即用於追蹤腦傷認知恢復進展,說「無法」→錯誤,即答案。","C":"神經心理測驗協助復健計畫擬定→正確。","D":"情緒行為問題影響復健→正確。"},"sources":["Rancho Los Amigos Levels of Cognitive Functioning","Braddom PM&R, TBI assessment"]}},"104090-55":{"quick":"右半球(非優勢半球)中風較易有「忽略、空間/知覺障礙、衝動、病覺缺失」→跌倒風險高;故復健要特別留意跌倒(答A)。","detail":{"background":"右大腦半球(多數人為非優勢半球)中風常造成左側偏癱合併「半側空間忽略(left neglect)」、視知覺與空間定向障礙、病覺缺失(anosognosia,否認障礙)、衝動與安全意識差。這些缺損使病人高估能力、忽略患側環境,導致跌倒與意外風險顯著升高;復健需強化安全監督與環境管理。左半球(優勢)中風則多有失語、失用與較謹慎的人格。故右半球中風復健需特別留意「跌倒」。","options":{"A":"右半球中風因忽略+衝動+病覺缺失→跌倒風險特別高→正解。","B":"尿失禁與半球側別關聯不特異。","C":"飢餓感與半球無關。","D":"低血糖與中風半球無關。"},"sources":["Braddom PM&R, Right hemisphere stroke, neglect & safety"]}},"104090-58":{"quick":"肉毒桿菌毒素機轉:抑制神經肌肉接合處突觸前「乙醯膽鹼由終板釋出」(切裂SNARE蛋白),造成化學性去神經、肌肉鬆弛(答C)。","detail":{"background":"A型肉毒桿菌毒素(botulinum toxin A)經肌肉注射後,被神經末梢攝入,其輕鏈為鋅依賴蛋白酶,切裂突觸前膜融合所需的SNARE複合體(BoNT-A切SNAP-25),阻止含乙醯膽鹼(ACh)的囊泡與突觸前膜融合釋放,造成神經肌肉接合處傳遞阻斷、肌肉化學性去神經而鬆弛。臨床用於局部痙攣(中風、CP、SCI)、肌張力不全、眼瞼/半面痙攣、多汗症等。效果非立即,約3-7天起效、2週達高峰、維持約3-4個月(神經末梢芽生後恢復)。","options":{"A":"非阻斷肌肉細胞膜鈣通道。","B":"非破壞ACh受體(那是重症肌無力的自體抗體機轉)。","C":"抑制突觸前ACh由終板釋放、阻斷NMJ→正解。","D":"非阻斷軸突細胞質流動。"},"sources":["Braddom PM&R, Botulinum toxin pharmacology","SNARE/SNAP-25 cleavage"]}},"105020-56":{"quick":"腦傷預後關聯「最低」者:創傷後癲癇「發生頻率」;預後主要看GCS、昏迷時間長短、創傷後失憶(PTA)時間(答A)。","detail":{"background":"外傷性腦傷(TBI)嚴重度與預後的主要指標:初始Glasgow Coma Scale(GCS,尤其運動分項)、昏迷持續時間、創傷後失憶症(PTA)持續時間(PTA>4週屬極重度,是長期預後的良好預測因子),以及影像損傷範圍、年齡、低血壓/缺氧等續發性傷害。創傷後癲癇雖是併發症、需預防早期癲癇,但其「發生頻率」與整體功能預後的關聯性相對最低。故答A。","options":{"A":"創傷後癲癇發生頻率與功能預後關聯最低→正解。","B":"GCS是核心預後指標。","C":"PTA(創傷後失憶)時間是強預後指標。","D":"昏迷時間長短反映損傷嚴重度與預後。"},"sources":["Braddom PM&R, TBI prognosis (GCS, PTA, coma duration)"]}},"105020-58":{"quick":"認知功能失常、行為/人格改變→病變最常在「額葉」(執行功能、行為調控、人格)(答A)。","detail":{"background":"大腦各葉功能定位:額葉(frontal)=執行功能、計畫、判斷、行為與人格調控、運動;頂葉(parietal)=體感覺、空間定向、忽略;顳葉(temporal)=記憶、聽覺、語言理解(優勢側Wernicke);枕葉(occipital)=視覺。中風或腦傷出現「認知功能失常+行為改變+人格改變」最常源於額葉(尤其前額葉)損傷。","options":{"A":"額葉主司執行與行為/人格→認知行為改變最常見於此→正解。","B":"頂葉主體感覺/空間,以忽略、失用為主。","C":"顳葉以記憶、聽覺、理解性語言為主。","D":"枕葉以視野缺損為主。"},"sources":["Braddom PM&R, Cortical localization"]}},"105020-59":{"quick":"中大腦動脈(MCA)梗塞影響視放射→「對側同側性偏盲(homonymous hemianopia)」(答B)。","detail":{"background":"視覺路徑:視交叉後的視束/視放射攜帶「對側視野」訊息。MCA供應視放射(特別是頂葉與顳葉部分的Meyer環),梗塞造成對側「同向性偏盲(homonymous hemianopia)」(雙眼同側視野缺損)。雙顳側偏盲(bitemporal)源於視交叉中央受壓(如腦下垂體瘤);中心暗點(central scotoma)源於黃斑/視神經病變;單眼盲源於視神經或視網膜中心動脈問題。故MCA中風→同向性偏盲。","options":{"A":"雙顳側偏盲屬視交叉中央病變(垂體瘤),非MCA。","B":"對側同向性偏盲→MCA梗塞典型→正解。","C":"中心暗點屬黃斑/視神經病變。","D":"單眼盲屬視神經/視網膜動脈問題。"},"sources":["Braddom PM&R / Neuro-anatomy, Visual field defects"]}},"106020-56":{"quick":"急性期中風「最常見併發症」=肺炎(吸入性);其次才是壓瘡、靜脈栓塞等(答A)。","detail":{"background":"急性中風常見併發症依機率:感染(以肺炎尤其吸入性肺炎最常見、是早期死亡主因之一,因吞嚥困難+意識/咳嗽反射差)、泌尿道感染;深部靜脈栓塞/肺栓塞(臥床);壓瘡;跌倒;癲癇;憂鬱;肩痛/肩手症候群。急性期介入重點含早期吞嚥評估、擺位翻身、預防VTE。故最常見者為肺炎。","options":{"A":"吸入性肺炎是急性中風最常見併發症→正解。","B":"褥瘡可預防,非最常見。","C":"靜脈栓塞發生但較肺炎少。","D":"癲癇發作相對少見。"},"sources":["Braddom PM&R, Acute stroke complications"]}},"106020-68":{"quick":"中風後中樞痛特性:發生於病灶「對側」、與視丘(thalamic pain)相關、溫覺/痛覺常受損;本題官方多重答案A、C均給分(對側+一年內高發生率)。","detail":{"background":"中風後中樞痛(central post-stroke pain, CPSP)是因中樞體感覺路徑(典型為視丘腹後外側核VPL,故稱thalamic pain/Dejerine-Roussy症候群,也可在腦幹/皮質)受損後的神經病變痛,表現為病灶「對側」肢體與顏面的灼痛、異常感覺、異感性疼痛(allodynia),常伴溫度/痛覺等脊髓視丘路徑感覺缺損。多在中風後數週至數月內出現(多數一年內)。小病灶亦可引發。治療以抗癲癇藥(gabapentin/pregabalin)、三環抗憂鬱劑為主。本題官方判定A(對側)、C(一年內高發生)均給分。","options":{"A":"中樞痛發生於病灶對側→正確(給分)。","B":"小病灶「不會」引發為錯誤敘述(小病灶亦可引發)。","C":"中樞痛多在發病後一年內出現,發生率不低→給分。","D":"多數病人溫覺(脊髓視丘路徑)受影響,說「不受影響」為錯。"},"sources":["Braddom PM&R, Central post-stroke pain (Dejerine-Roussy)"]}},"106080-56":{"quick":"患側半身+顏面「異常感覺與疼痛、運動正常」=純感覺型→病變在「視丘(thalamus)」(答B)。","detail":{"background":"純感覺性中風(pure sensory stroke)典型為視丘(腹後核VPL/VPM)的小腔隙性梗塞,造成對側偏身(含顏面)的感覺異常(麻、灼痛、dysesthesia)而運動功能保留,日後可能演變為視丘痛(中樞痛)。橋腦/延腦病變多伴隨腦神經與運動長徑徵候(交叉性);小腦病變以共濟失調為主。故純感覺+疼痛→視丘。","options":{"A":"小腦病變以協調/平衡障礙為主,非純感覺。","B":"視丘(VPL/VPM)→對側純感覺障礙+中樞痛→正解。","C":"橋腦病變多有腦神經與運動徵候。","D":"延腦病變(如Wallenberg)有交叉感覺與後組腦神經徵候。"},"sources":["Braddom PM&R / Neuro, Pure sensory (thalamic) stroke"]}},"106080-58":{"quick":"可稍微抗重力移動+明顯肌張力(痙攣)與協同動作達高峰→Brunnstrom stage 3(答C)。","detail":{"background":"Brunnstrom中風動作恢復六階段:I=弛緩無動作(張力低);II=開始出現痙攣與協同動作、最小自主動作;III=痙攣達高峰、可隨意做出協同動作(可抗重力但僅以刻板協同模式移動);IV=痙攣開始下降、出現一些脫離協同的選擇性動作;V=痙攣明顯下降、可做較複雜的脫離協同動作;VI=協調近正常、痙攣消失。本題「可稍微抗重力移動但有明顯肌肉緊張(痙攣)及協同動作」→痙攣高峰+以協同動作移動=stage 3。","options":{"A":"stage1為弛緩無動作。","B":"stage2僅開始出現痙攣與最小動作。","C":"stage3痙攣高峰、以協同動作隨意移動→正解。","D":"stage5痙攣已明顯下降、能脫離協同。"},"sources":["Brunnstrom Stages of Motor Recovery"]}},"106080-76":{"quick":"中風復健敘述「錯誤」者:約束治療(restraint therapy)指限制「健側」、強迫使用「患側」(CIMT),而非約束患側訓練健側(答D)。","detail":{"background":"中風復健原則:病情穩定即早期介入(改善長期預後)、早期擺位翻身與被動關節活動度訓練(預防攣縮、壓瘡、DVT)、利用輔具及早離床。題中D的「約束治療」即「強制誘發運動治療(constraint-induced movement therapy, CIMT)」,做法是「約束健側上肢(戴連指手套/吊帶)」並大量集中訓練「患側」上肢,以克服習得性廢用(learned non-use)。本題D把它寫成「約束患側、訓練健側」完全相反→錯誤。","options":{"A":"病情穩定下越早復健、長期預後越好→正確。","B":"用輔具及早離床預防併發症→正確。","C":"臥床也應做ROM訓練防攣縮→正確。","D":"CIMT是約束健側、強迫使用患側,本敘述相反→錯誤,即答案。"},"sources":["Braddom PM&R, Constraint-induced movement therapy (CIMT)"]}},"107020-56":{"quick":"半側忽略評估常用:線二等分、仿畫(時鐘/花)、刪除測驗;「方向測試」非常用忽略評估(答C)。","detail":{"background":"半側空間忽略(hemispatial neglect,多見右頂葉損傷致左側忽略)的標準床邊評估工具:線段二等分測驗(line bisection,病人把線中點偏向健側)、刪除/劃消測驗(cancellation test,如Albert、星星刪除,漏掉患側目標)、仿畫測驗(copy test,畫時鐘/花/房子時漏畫左半)、閱讀與書寫測驗。「方向測試(direction test)」非標準忽略評估工具→最不常用。","options":{"A":"線二等分是經典忽略測驗。","B":"仿畫測試常用於偵測忽略。","C":"方向測試非標準忽略評估→正解(最不常用)。","D":"刪除測驗是核心忽略評估。"},"sources":["Braddom PM&R, Assessment of neglect"]}},"107020-67":{"quick":"肉毒桿菌治療痙攣敘述「錯誤」:效果「立即出現」→錯,需約3-7天起效、2週達高峰(答D)。","detail":{"background":"A型肉毒桿菌毒素治療局部痙攣:可用於CP兒童、中風/SCI局部痙攣;經肌肉注射;機轉為抑制突觸前NMJ的ACh釋放(切裂SNAP-25),造成化學去神經。藥效非立即——注射後約3-7天才漸起效、約2週達高峰、維持約3-4個月。故D「立即出現」錯誤。","options":{"A":"可治療CP兒童痙攣→正確。","B":"治療途徑為肌肉注射→正確。","C":"機轉是抑制NMJ的ACh釋放→正確。","D":"效果非立即(需數天至2週)→錯誤,即答案。"},"sources":["Braddom PM&R, Botulinum toxin for spasticity"]}},"107020-70":{"quick":"側躺(側臥)時最受壓的骨突=「股骨大轉子(greater trochanter)」→壓瘡好發處(答C)。","detail":{"background":"壓瘡好發於體位相對應的骨突受壓處:仰臥→薦骨、足跟、枕骨、肩胛;側臥→股骨大轉子(greater trochanter)、外踝、膝外側、耳殼;坐姿→坐骨粗隆(ischial tuberosity)。本題中風病人「長時間側躺」→大轉子最易壓瘡。預防靠每2小時翻身、減壓墊、皮膚照護。","options":{"A":"腳跟為仰臥好發處。","B":"肩峰非典型側臥壓瘡點。","C":"股骨大轉子是側臥最受壓骨突→正解。","D":"腸骨突非主要側臥壓瘡點。"},"sources":["Braddom PM&R, Pressure injury sites by position"]}},"110080-59":{"quick":"中風併發症敘述「錯誤」:診斷急性下肢DVT「應臥床一週」→錯,現代處置是抗凝後可儘早活動,長期臥床反增併發症(答D)。","detail":{"background":"中風併發症照護:正確擺位預防患側肢水腫與肩痛;吸入性肺炎是早期常見感染。關於深部靜脈栓塞(DVT):過去認為需臥床避免栓子脫落,但現行實證顯示給予足量抗凝(或合併壓力治療)後「早期活動」並不增加肺栓塞風險,且可降低臥床相關併發症;長期臥床反而有害。故D「應臥床至少一週」為錯誤。","options":{"A":"正確擺位可預防患側肢水腫→正確。","B":"中風常見患側肩痛→正確。","C":"吸入性肺炎是早期常見感染→正確。","D":"DVT診斷後抗凝即可早期活動,不需長期臥床→此敘述錯誤,即答案。"},"sources":["Braddom PM&R, Stroke complications; DVT early mobilization"]}},"111020-58":{"quick":"強調「抑制不正常姿勢/動作並誘發獨立(選擇性)肌肉控制」=神經發展技術(NDT/Bobath)(答B)。","detail":{"background":"中風傳統神經生理治療技術比較:Bobath/神經發展技術(NDT)強調抑制異常張力與病態協同模式、促進正常姿勢反應與「選擇性(獨立)肌肉控制」;Brunnstrom技術反而「利用」協同動作與反射來誘發動作(早期善用協同);本體感覺神經肌肉誘發術(PNF)用對角螺旋模式與牽張/阻力誘發;工作導向訓練(task-oriented)則以功能性任務反覆練習。本題描述抑制異常模式+誘發獨立肌肉控制→NDT。","options":{"A":"Brunnstrom反而利用協同動作與反射。","B":"NDT(Bobath)抑制異常模式、促進選擇性控制→正解。","C":"本體誘發(PNF)以模式與阻力為主。","D":"工作導向以功能任務反覆練習為核心。"},"sources":["Braddom PM&R, Neurophysiologic approaches (NDT/Bobath, Brunnstrom, PNF)"]}},"111020-61":{"quick":"右側上下肢無力+「左側」顏面神經麻痺=交叉性徵候→病灶在「橋腦」(左下運動神經元顏面+右側肢體上運動神經元)(答C)。","detail":{"background":"交叉性(crossed)神經學徵候提示腦幹病變:同側腦神經下運動神經元徵候+對側肢體上運動神經元徵候。本題:右側肢體無力(對側皮質脊髓徑,病灶在左側)+「左側」顏面神經(第VII對)麻痺(同側,即病灶側)。顏面神經核位於橋腦,病灶在左橋腦造成同側(左)周邊型顏面麻痺+對側(右)肢體偏癱(Millard-Gubler症候群類型)→定位橋腦。","options":{"A":"基底核病變多為純運動偏癱,無交叉腦神經徵候。","B":"視丘病變以感覺為主。","C":"橋腦(顏面神經核)→同側顏面+對側肢體=交叉徵候→正解。","D":"小腦病變以共濟失調為主。"},"sources":["Braddom/Neuro, Brainstem crossed syndromes (pons, CN VII)"]}},"111020-74":{"quick":"中風後右髖腫脹6個月、無DVT、骨盆X光→「異位性骨化(heterotopic ossification)」(答B)。","detail":{"background":"異位性骨化(HO)是軟組織(關節周圍)內異常生成成熟骨,常見於脊髓損傷、外傷性腦傷、中風與大關節術後/燒傷。好發髖、膝、肘、肩;發病多在傷後1-6個月。臨床:關節周圍腫脹、熱、活動度漸減,須與DVT、蜂窩組織炎、骨折鑑別。早期診斷以三相骨掃描最敏感;X光要數週才見鈣化。本題中風後肢體癱瘓+髖腫脹+排除DVT+X光見異常骨化→HO。治療:NSAIDs/bisphosphonate、維持ROM,成熟後(骨掃描穩定)再考慮手術切除以免復發。","options":{"A":"惡性骨肉瘤少見且影像/病程不符。","B":"異位性骨化→中風/SCI/TBI後關節周圍腫脹典型→正解。","C":"軟骨肉瘤少見。","D":"結核性肉芽腫不符病史。"},"sources":["Braddom PM&R, Heterotopic ossification"]}},"111080-58":{"quick":"MCA中風「不」常見者:動作不能性緘默(akinetic mutism)→屬「前大腦動脈(ACA)/額葉內側」病變(答D)。","detail":{"background":"中大腦動脈(MCA)供應大腦外側面與深部:典型造成對側偏癱(上肢/顏面重於下肢)、對側感覺缺損、同向性偏盲;優勢半球→失語、失用(apraxia);非優勢半球→忽略(neglect)、病覺缺失、空間障礙、情感失認。動作不能性緘默(akinetic mutism,清醒但無自發動作與語言)源於「前大腦動脈(ACA)/額葉內側(扣帶回)」雙側病變,非MCA。故D不屬MCA症狀。","options":{"A":"忽略症候群為非優勢MCA典型。","B":"失用症為優勢MCA典型。","C":"情感失認屬MCA相關皮質症狀。","D":"動作不能性緘默屬ACA/額葉內側病變→正解(非MCA)。"},"sources":["Braddom/Neuro, MCA vs ACA syndromes"]}},"111080-70":{"quick":"穿衣等動作執行障礙=失用症(apraxia)→病灶在「頂葉(parietal lobe)」(優勢側為主)(答A)。","detail":{"background":"失用症(apraxia)是在運動、感覺、理解皆大致正常下,無法執行有目的的習得動作。其神經基礎與頂葉(尤其左/優勢頂葉,儲存動作的時空程式)及其與運動皮質的連結有關;穿衣失用(dressing apraxia)與結構性失用更常與右頂葉/頂枕病變相關。本題中風後肌力近正常卻不會穿衣、診斷失用→定位頂葉。","options":{"A":"頂葉是失用症主要病灶→正解。","B":"額葉以執行/行為/運動為主。","C":"枕葉以視覺為主。","D":"顳葉以記憶/聽覺/語言理解為主。"},"sources":["Braddom/Neuro, Apraxia and parietal lobe"]}},"112080-58":{"quick":"「開始有獨立(脫離協同)動作、肌張力開始下降」=Brunnstrom stage IV(答C)。","detail":{"background":"Brunnstrom分期關鍵轉折在stage IV:痙攣「開始下降」、病人「開始出現脫離協同模式的選擇性動作」(如手能放到腰後、肩屈90度伸肘、足跟著地踝背屈)。stage III為痙攣高峰、僅能做刻板協同;stage V痙攣明顯減退、能做更複雜的脫離協同動作。本題「開始有獨立動作、張力開始下降」→stage IV。","options":{"A":"II僅開始出現痙攣與最小動作。","B":"III為痙攣高峰、以協同動作為主。","C":"IV開始脫離協同、張力下降→正解。","D":"V痙攣明顯減退、脫離協同更完整。"},"sources":["Brunnstrom Stages of Motor Recovery"]}},"113070-59":{"quick":"造成踝「蹠屈(plantarflexion)」的高張力痙攣肌=腓腸肌(gastrocnemius)(答D)。","detail":{"background":"踝關節動作對應肌群:蹠屈(plantarflexion)=腓腸肌(gastrocnemius)、比目魚肌(soleus)即小腿三頭肌;背屈(dorsiflexion)=脛前肌;外翻=腓骨長/短肌;內翻=脛後肌。中風/UMN損傷常見小腿三頭肌痙攣造成馬蹄足(equinus,持續蹠屈),走路足尖著地、踝背屈受限。本題問造成蹠屈的痙攣肌→腓腸肌。處置:牽拉、AFO、肉毒注射腓腸肌/比目魚肌。","options":{"A":"腓長肌主要管外翻/蹠屈協助,非主要蹠屈肌。","B":"脛前肌是背屈肌(相反動作)。","C":"伸趾長肌管伸趾/協助背屈。","D":"腓腸肌是主要蹠屈肌,其痙攣造成馬蹄足→正解。"},"sources":["Braddom PM&R, Lower limb spasticity / equinus"]}},"113070-60":{"quick":"椎底動脈基底動脈(後循環/腦幹)症候群常有吞嚥困難、構音障礙、平衡失調;「失語症」屬大腦皮質(前循環)功能→非後循環症狀(答C)。","detail":{"background":"椎基底動脈(vertebrobasilar)系統供應腦幹、小腦與枕葉。其症候群表現為腦幹/小腦徵候:複視、眩暈、構音障礙(dysarthria)、吞嚥困難(dysphagia)、共濟失調與平衡困難、交叉性感覺運動缺損、視野缺損(枕葉)等。失語症(aphasia)是「語言」障礙,屬大腦優勢半球皮質(前循環MCA供應的Broca/Wernicke區)功能,不屬後循環腦幹症狀。故C非常見症狀。","options":{"A":"吞嚥困難屬腦幹(疑核)受累→後循環常見。","B":"構音障礙屬腦幹/小腦→後循環常見。","C":"失語症屬大腦皮質(前循環)→非後循環症狀,正解。","D":"平衡困難屬小腦/腦幹→後循環常見。"},"sources":["Braddom/Neuro, Vertebrobasilar (posterior circulation) syndromes"]}},"114020-59":{"quick":"左側MCA阻塞「最不可能」出現共濟失調(ataxia);ataxia屬小腦/後循環。左MCA→右側偏癱感覺缺損、右視野缺損、失語(答A)。","detail":{"background":"左(多為優勢)側中大腦動脈阻塞造成:對側(右)偏癱與感覺障礙(上肢/顏面重)、右側同向性偏盲/視野缺損、以及優勢半球的失語症(Broca/Wernicke/global)。共濟失調(ataxia)是小腦或其連結(後循環/椎基底)病變的徵候,不屬MCA(前循環)範圍。故左MCA中風最不可能出現ataxia。","options":{"A":"共濟失調屬小腦/後循環→左MCA最不可能→正解。","B":"失語症為優勢MCA典型。","C":"右側視野缺損符合左MCA。","D":"右側知覺障礙符合左MCA。"},"sources":["Braddom/Neuro, MCA stroke clinical features"]}},"114070-61":{"quick":"手可上舉過頭、側舉到水平、伸肘旋前旋後、拇指碰食指指節→已能脫離協同做選擇性動作,屬Brunnstrom stage V(答D)。","detail":{"background":"Brunnstrom上肢恢復:stage IV開始脫離協同(手放腰後、肩屈90伸肘、前臂可旋後);stage V能做更困難的脫離協同動作——手臂可上舉過頭(肩屈/外展近180度且伸肘)、肘伸直時前臂可旋前旋後、開始有較精細的抓握。stage VI協調近正常、可做個別手指動作。本題病人能高舉過頭、伸肘旋前旋後、初步對指→符合stage V(進階脫離協同),尚未到完全正常的VI。","options":{"A":"II僅最小協同動作。","B":"III痙攣高峰僅刻板協同。","C":"IV才剛開始脫離協同(手放腰後等基本動作)。","D":"V能高舉過頭、伸肘旋前後等進階脫離協同動作→正解。"},"sources":["Brunnstrom Stages (upper limb), stage V"]}},"115020-59":{"quick":"鞘內(intrathecal)注射控制嚴重痙攣最常用的藥=baclofen(GABA-B致效劑)(答B)。","detail":{"background":"頑固性、廣泛性痙攣(嚴重中風/SCI/CP/MS)當口服藥效果不足或副作用過大時,採「鞘內baclofen幫浦(intrathecal baclofen, ITB)」:將baclofen直接送入脊髓蛛網膜下腔作用於GABA-B受體,以極低劑量達強效降張力並減少全身嗜睡副作用。其他抗痙攣藥(tizanidine α2致效、diazepam GABA-A、dantrolene作用於肌漿網ryanodine受體抑制鈣釋放)為口服用;鞘內給藥主流是baclofen(少數用ziconotide於疼痛)。故答baclofen。","options":{"A":"tizanidine為口服α2致效劑。","B":"baclofen為鞘內注射控制痙攣首選→正解。","C":"diazepam為口服GABA-A製劑。","D":"dantrolene作用於肌肉、口服。"},"sources":["Braddom PM&R, Intrathecal baclofen"]}},"115020-62":{"quick":"上肢「屈曲」協同「不適當」者=前臂旋前;屈曲協同是前臂「旋後」(答A)。","detail":{"background":"同103030-56。上肢屈曲協同(flexor synergy)包含:肩胛回縮上抬、肩外展外旋、肘屈曲、前臂「旋後(supination)」、腕指屈曲。前臂「旋前(pronation)」屬伸直協同。本題問屈曲協同動作中「最不適當(不屬於)」者→前臂旋前。","options":{"A":"前臂旋前屬伸直協同,不屬屈曲協同→正解。","B":"手肘屈曲屬屈曲協同。","C":"肩外展屬屈曲協同。","D":"肩外轉屬屈曲協同。"},"sources":["Brunnstrom flexor/extensor synergies"]}},"115020-63":{"quick":"腦傷常與「慢性疼痛+睡眠障礙+創傷後壓力症(PTSD)」形成臨床三角→答A(PTSD)。","detail":{"background":"外傷性腦傷(尤其輕度TBI/腦震盪後症候群)後,慢性疼痛(常為創傷後頭痛)、睡眠障礙與情緒/心理問題彼此交互強化,造成長期失能。其中創傷後壓力症(PTSD)與慢性疼痛、睡眠障礙常並存且互相加重,形成所謂的「臨床三角(clinical triad)」(常見於軍人/退伍軍人TBI族群),須整合身心治療。故與慢性疼痛形成三角者為PTSD。","options":{"A":"創傷後壓力症(PTSD)與慢性疼痛、睡眠障礙形成腦傷後臨床三角→正解。","B":"大便失禁非此三角成分。","C":"吞嚥障礙非此三角成分。","D":"肢體失用症非此三角成分。"},"sources":["Braddom PM&R, TBI; chronic pain-PTSD-sleep triad"]}},"106020-55":{"quick":"腦傷預後「最不常用」指標=創傷後癲癇發生頻率;常用為昏迷時間、GCS、創傷後失憶(PTA)時間(答A)。","detail":{"background":"外傷性腦傷(TBI)預後評估三大臨床指標:初始Glasgow Coma Scale(GCS)、昏迷持續時間、創傷後失憶症(PTA)持續時間——三者皆反映瀰漫性軸突損傷的嚴重度,與長期功能預後高度相關(PTA>4週屬極重度)。創傷後癲癇雖為併發症且需處置,但其「發生頻率」與整體功能預後關聯性相對最低、臨床最不常用來評估預後。同105020-56題型。","options":{"A":"創傷後癲癇發生頻率與預後關聯最低、最不常用→正解。","B":"昏迷時間長短反映損傷嚴重度→常用。","C":"GCS是核心預後指標→常用。","D":"創傷後失憶(PTA)時間是強預後指標→常用。"},"sources":["Braddom PM&R, TBI prognostic indicators (GCS, coma duration, PTA)"]}},"101030-69":{"quick":"可喝水但吞固體/半固體困難=食物無法通過上食道括約肌(環咽肌失弛緩)→「環咽肌擴張術(cricopharyngeal dilatation)」最能改善(答C)。","detail":{"background":"吞嚥分四期:口腔準備期、口腔期、咽喉期、食道期。中風後咽喉期吞嚥困難常見。本題病人「能喝水(液體)卻吞固體/半固體困難」提示固體食團無法順利通過上食道括約肌(由環咽肌組成)——環咽肌失弛緩/開放不足。直接擴張或切開環咽肌(cricopharyngeal dilatation/myotomy)可改善固體通過。其他代償(頭轉向、閉氣吞嚥、增稠液體)主要針對「液體易嗆」的咽喉期保護,本題液體反而沒問題,故不對症。","options":{"A":"頭轉向一側用於單側咽部無力,非本題固體通過障礙。","B":"吞嚥前閉氣(聲門上吞嚥)保護氣道、防液體嗆入,非改善固體通過。","C":"環咽肌擴張術直接解決上食道括約肌開放不足→正解。","D":"增稠液體用於液體嗆咳,本題液體無礙→不對症。"},"sources":["Braddom PM&R, Dysphagia; cricopharyngeal dysfunction"]}},"102030-57":{"quick":"傳導型失語症病灶在「弓狀束(arcuate fasciculus)」——連接Broca與Wernicke,受損致覆誦能力差(答A)。","detail":{"background":"失語症定位:Broca區(額下回後部)=表達性/不流暢失語(說話費力電報式、理解相對佳、覆誦差);Wernicke區(顳上回後部)=接受性/流暢失語(說話流利但無意義、理解差、覆誦差);弓狀束(arcuate fasciculus,連接Broca與Wernicke的白質束)受損=傳導型失語(流暢、理解佳,但「覆誦特別差」並有語音性錯語);全失語=三者皆受損。傳導型核心病灶即弓狀束。","options":{"A":"弓狀束受損→傳導型失語(覆誦差)→正解。","B":"基底核病變多致皮質下失語,非典型傳導型。","C":"Broca區致表達性失語。","D":"Wernicke區致接受性失語。"},"sources":["Braddom/Neuro, Aphasia classification (arcuate fasciculus)"]}},"102030-69":{"quick":"理解與流暢度皆缺損(似全失語)「但覆誦完整保留」→經皮質混合型失語(transcortical aphasia)(答D)。","detail":{"background":"覆誦(repetition)能力是區分失語型別的關鍵:覆誦「差」者為Broca、Wernicke、傳導型、全失語(因病灶累及語言核心區或弓狀束);覆誦「保留」者為三種「經皮質型(transcortical)」失語——因病灶在語言核心區的「周圍(分水嶺帶)」而核心語言環路(含弓狀束)完整,故能鸚鵡式覆誦。本題理解與流暢皆損(類似全失語表現)但覆誦完好→經皮質混合型(transcortical mixed/isolation syndrome)。","options":{"A":"Wernicke覆誦差。","B":"傳導型覆誦差。","C":"Broca覆誦差。","D":"經皮質型覆誦保留→正解。"},"sources":["Braddom/Neuro, Transcortical aphasia (repetition spared)"]}},"102110-57":{"quick":"不會講、聽不懂(似全失語)「但覆誦完整正常」→經皮質型(transcortical)失語(答D)。","detail":{"background":"同上覆誦原則。病人表達與理解皆嚴重受損(似全失語),但「覆誦完全正常」,代表語言核心環路保留、病灶在分水嶺周邊區→經皮質型失語(此處表達+理解皆損即經皮質混合型/語言孤立症候群)。深化:失語分型最快速的鑑別軸是「覆誦」——覆誦差者(Broca/Wernicke/傳導/全失語)病灶位於語言核心區或弓狀束;覆誦保留者(三種經皮質型)病灶在語言核心區外圍的「分水嶺帶(watershed)」,常見於低血壓/缺氧造成的邊緣帶梗塞或一氧化碳中毒。經皮質混合型(語言孤立症候群)表現為流暢度與理解皆差但能鸚鵡式覆誦(echolalia)。臨床評估失語務必測五項:自發語流暢度、理解、覆誦、命名、閱讀書寫。","options":{"A":"Broca覆誦差。","B":"Wernicke覆誦差。","C":"傳導型覆誦差。","D":"經皮質型覆誦保留→正解。"},"sources":["Braddom/Neuro, Transcortical aphasia"]}},"102110-68":{"quick":"吞嚥困難敘述「錯誤」:孟德森手法(Mendelsohn maneuver)是「延長並增加」喉上抬與上食道括約肌開放,而非減少(答C)。","detail":{"background":"孟德森手法(Mendelsohn maneuver)是吞嚥治療手法:吞嚥時刻意「維持喉部上抬」一段時間,藉以「延長並增大」上食道括約肌(環咽肌)的開放時間與程度,改善食團通過。本題C說它「減少」開放程度與時間,與其作用相反→錯誤。其餘正確:頭頸部放療後組織纖維化致吞嚥困難;胸部(食道期)吞嚥困難多源於食道功能障礙;吞嚥動作涉及超過50條肌肉序列性興奮抑制。","options":{"A":"頭頸放療後纖維化致吞嚥困難→正確。","B":"食道期吞嚥困難多由食道功能障礙造成→正確。","C":"Mendelsohn手法是增加(非減少)括約肌開放→敘述錯誤,即答案。","D":"吞嚥涉及>50條肌肉序列協調→正確。"},"sources":["Braddom PM&R, Dysphagia therapy (Mendelsohn maneuver)"]}},"102110-69":{"quick":"能慢吞半固體但喝水/果汁易嗆→「咽喉期(pharyngeal phase)」吞嚥障礙(答B)。","detail":{"background":"吞嚥障礙的階段判讀:口腔期問題=食團控制/咀嚼差、食物殘留口腔、流口水;咽喉期問題=吞嚥反射延遲、喉部上抬與閉合不足→「液體易嗆入氣道(aspiration)」、需多次吞嚥;食道期問題=食團卡在胸骨後、逆流。本題「液體(水/果汁)容易嗆到」是咽喉期保護不足的典型表現(液體流速快、最易在咽喉期嗆入)。故定位咽喉期。","options":{"A":"口腔期以食團控制/咀嚼問題為主。","B":"咽喉期保護不足→液體嗆咳→正解。","C":"食道期以食團滯留胸後/逆流為主。","D":"鼻腔非吞嚥分期。"},"sources":["Braddom PM&R, Phases of swallowing; pharyngeal dysphagia"]}},"103100-70":{"quick":"帕金森說話音量單調、短促急衝→運動過弱型構音障礙(hypokinetic dysarthria)(答A)。","detail":{"background":"構音障礙(dysarthria)依神經病灶分型:弛緩型(flaccid,下運動神經元/NMJ,氣息聲、鼻音過重);痙攣型(spastic,雙側上運動神經元,費力擠壓聲、緩慢);運動失調型(ataxic,小腦,音節分裂、scanning speech、重音不當);運動過弱型(hypokinetic,基底核/帕金森,音量低且單調monoloudness、語速忽快忽慢短促急衝short rushes、起始困難);運動過強型(hyperkinetic,基底核舞蹈/肌張力不全,不自主中斷、母音扭曲)。帕金森→hypokinetic。","options":{"A":"帕金森→運動過弱型構音障礙→正解。","B":"弛緩型屬下運動神經元病變。","C":"運動失調型屬小腦。","D":"痙攣型屬雙側UMN。"},"sources":["Darley dysarthria classification; Braddom PM&R"]}},"105100-66":{"quick":"單側咽部無力的中風病人吞嚥→「頭轉向患側」可關閉患側梨狀竇、讓食團走健側(答A)。","detail":{"background":"單側咽部無力的吞嚥代償姿勢:「頭轉向患側(無力側)」——使患側咽壁與梨狀竇受擠壓關閉,引導食團繞向「健側」較有力的通道下嚥,減少患側滯留與嗆咳。對比:下巴內收(chin tuck/低頭)用於吞嚥反射延遲或氣道保護差;頭傾向健側(side bending)用於利用重力導向健側。本題單側咽無力→頭轉向患側。","options":{"A":"頭轉向患側→關閉患側、食團走健側→正解。","B":"頭轉向健側反而把食團導向無力側。","C":"仰頭利用重力但增加嗆入風險,非單側無力首選。","D":"低頭(chin tuck)用於保護氣道/反射延遲。"},"sources":["Braddom PM&R, Dysphagia compensatory postures (head rotation to weak side)"]}},"105100-67":{"quick":"腦性麻痺(常為徐動/肌張力不全型)說話母音扭曲、嗓音停頓→運動過強型構音障礙(hyperkinetic dysarthria)(答A)。","detail":{"background":"運動過強型構音障礙(hyperkinetic dysarthria)源於基底核錐體外系統病變(舞蹈症、肌張力不全、徐動型腦性麻痺),不自主動作干擾發聲造成:母音扭曲(distorted vowels)、突發的嗓音停頓/中斷(voice stoppages)、音量與音調不規則波動。徐動型(athetoid)CP常出現此型。對比痙攣型CP→痙攣型構音障礙(費力擠壓)。本題母音扭曲+嗓音停頓→hyperkinetic。","options":{"A":"運動過強型(母音扭曲、嗓音停頓)→正解。","B":"弛緩型為下運動神經元(氣息聲、鼻音)。","C":"運動失調型為小腦(scanning speech)。","D":"痙攣型為雙側UMN(費力擠壓聲)。"},"sources":["Darley dysarthria; Braddom PM&R, CP speech"]}},"106020-22":{"quick":"學齡前構音障礙敘述「錯誤」:舌繫帶短「約15%會構音障礙、應及早手術」誇大且不正確,多數舌繫帶輕度過短不影響構音、不需常規手術(答A)。","detail":{"background":"兒童構音障礙(articulation disorder)成因:聽力障礙(故純音聽力檢查重要)、口腔結構異常(顎裂、黏膜下腭裂submucous cleft palate)、神經肌肉問題、發展性語音障礙等;言語治療(言語復健)是主要介入。關於「舌繫帶過短(ankyloglossia)」:多數兒童舌繫帶輕度過短並不造成構音障礙,只有少數明顯限制舌活動才考慮舌繫帶矯正術,並非「約15%會構音障礙、應及早手術」——此敘述誇大且把手術適應症過度泛化→錯誤。","options":{"A":"舌繫帶短「15%構音障礙、應及早手術」為誇大不實→錯誤,即答案。","B":"純音聽力檢查重要(排除聽損)→正確。","C":"言語治療有助改正構音→正確。","D":"黏膜下腭裂是構音障礙可能原因→正確。"},"sources":["Braddom PM&R, Pediatric speech disorders; ankyloglossia"]}},"106080-68":{"quick":"左側MCA嚴重阻塞→預期為「全失語症(global aphasia)」(A);本題官方多重答案,A/C/D均給分。","detail":{"background":"左(優勢)半球MCA供應Broca區、Wernicke區與弓狀束。MCA主幹「嚴重(整段)阻塞」會同時破壞表達、理解與覆誦的所有語言區→全失語症(global aphasia,A為標準答案)。但因「嚴重阻塞」範圍與側枝循環差異,臨床可能呈現以表達為主(似Broca,D)或以理解為主(似Wernicke,C)的不完全表現,故官方判定A、C、D皆給分。傳導型(B)為侷限弓狀束的較小病灶,與MCA主幹大梗塞不符,未給分。","options":{"A":"左MCA大範圍阻塞→全失語(標準答案,給分)。","B":"傳導型屬侷限弓狀束小病灶,與主幹大梗塞不符→未給分。","C":"Wernicke型(理解為主缺損)亦可能→給分。","D":"Broca型(表達為主缺損)亦可能→給分。"},"sources":["Braddom/Neuro, MCA occlusion and aphasia (official multi-answer)"]}},"106080-71":{"quick":"吞嚥困難餵食「錯誤」者:讓病人「平躺」進食→錯,應坐直(≥90度)以防嗆入(答B)。","detail":{"background":"吞嚥困難病人餵食安全原則:選病人清醒警覺時餵食;採直立坐姿(軀幹≥90度、頭部中立或微低頭chin tuck);小口餵食、放慢速度、確認前一口吞乾淨再餵下一口;依評估調整食物質地與液體稠度;餵食後維持直立30分鐘。「讓病人平躺」會大幅增加食物逆流與吸入性肺炎風險→錯誤。","options":{"A":"選清醒時刻餵食→正確。","B":"讓病人平躺進食→錯誤(應坐直),即答案。","C":"小口餵食→正確。","D":"略微低頭(chin tuck)保護氣道→正確。"},"sources":["Braddom PM&R, Safe feeding in dysphagia"]}},"107020-69":{"quick":"第一個字難發出、說話延長/重複/中斷→口吃(stuttering)(答A)。","detail":{"background":"語言流暢性障礙鑑別:口吃(stuttering/語暢障礙)=言語流暢度問題,表現為語音/音節的重複、延長、阻斷(block,尤其字首難發出)、伴隨掙扎與第二性動作,語言內容與構音器官本身正常;吶吃(dysarthria)=構音肌肉的神經肌肉控制障礙,言語含糊;失語症(aphasia)=語言(詞彙/語法/理解)中樞障礙;失用症(apraxia of speech)=言語動作計畫障礙,摸索式發音、不一致錯誤。本題字首難發+延長重複中斷→口吃。","options":{"A":"口吃(語暢障礙):字首難發、延長、重複、阻斷→正解。","B":"吶吃為構音肌肉控制問題。","C":"失語症為語言中樞障礙。","D":"言語失用為動作計畫障礙。"},"sources":["Braddom PM&R, Fluency disorders (stuttering)"]}},"107080-67":{"quick":"聽理解差、覆誦差、口語流利但找字困難、言之無物→渥尼克(Wernicke)失語症(答A)。","detail":{"background":"Wernicke(接受型/流暢型)失語症:口語「流利」但充滿錯語(paraphasia)、新詞與空話、言之無物;「聽理解嚴重受損」;「覆誦差」;命名與閱讀理解亦差;病人常無病覺。病灶在優勢顳上回後部。本題「聽理解明顯障礙+覆誦困難+流利但找字困難讓人聽不懂」=典型Wernicke。對比經皮質感覺型(理解差但覆誦保留)。","options":{"A":"Wernicke:流利、理解差、覆誦差→正解。","B":"經皮質感覺型理解差但覆誦保留(本題覆誦差,不符)。","C":"Broca為不流暢/費力。","D":"經皮質運動型不流暢但覆誦保留。"},"sources":["Braddom/Neuro, Wernicke aphasia"]}},"108030-71":{"quick":"覆誦能力「最佳」的失語症=命名型失語(anomic aphasia)(答B)。","detail":{"background":"依覆誦能力分組:覆誦差=Broca、Wernicke、傳導型、全失語;覆誦保留=三種經皮質型與命名型(anomic)。其中「命名型失語(anomic aphasia)」是最輕微的失語,主要僅「命名/找字困難(word-finding)」,流暢度、理解、覆誦都相對良好,故四選項中覆誦能力最佳者為anomic。傳導型、全失語、Wernicke覆誦均差。","options":{"A":"傳導型覆誦差。","B":"命名型(anomic)失語覆誦最佳(僅找字困難)→正解。","C":"全失語覆誦差。","D":"Wernicke覆誦差。"},"sources":["Braddom/Neuro, Anomic aphasia"]}},"108080-69":{"quick":"語誤但理解與流暢度尚佳、「覆誦/聽寫/朗讀特別困難」→傳導型失語(conduction aphasia)(答B)。","detail":{"background":"傳導型失語(弓狀束受損):特徵為「覆誦能力嚴重受損(與其相對良好的流暢度與理解形成不成比例)」,說話流利但有語音性錯語、能自我察覺並嘗試修正(conduite dapproche),朗讀與聽寫(需經由語音轉錄)也困難,但聽理解大致正常。本題「理解與流暢尚佳,但覆述/聽寫/朗誦困難」=傳導型。","options":{"A":"Wernicke理解差(本題理解尚佳,不符)。","B":"傳導型:理解流暢佳但覆誦/朗讀/聽寫差→正解。","C":"經皮質混合型覆誦反而保留。","D":"運動失調吶吃是構音問題,非語言。"},"sources":["Braddom/Neuro, Conduction aphasia"]}},"109020-71":{"quick":"痙攣型構音障礙(spastic dysarthria)源於「雙側上運動神經元」病變(答C)。","detail":{"background":"痙攣型構音障礙的神經基礎是「雙側上運動神經元(bilateral UMN)」損傷(如假性延髓麻痺pseudobulbar palsy、雙側中風、ALS的UMN成分),造成發聲肌張力過高:費力擠壓的嗓音(strained-strangled)、語速緩慢、子音不準、鼻音過重。單側UMN損傷因有對側代償,構音障礙輕微短暫;下運動神經元損傷→弛緩型。故痙攣型需「雙側UMN」。","options":{"A":"單側UMN因對側代償,構音障礙輕微。","B":"單側LMN致局部弛緩型。","C":"雙側上運動神經元→痙攣型構音障礙→正解。","D":"雙側LMN致弛緩型。"},"sources":["Darley dysarthria; spastic dysarthria = bilateral UMN"]}},"109080-69":{"quick":"表達流暢度與覆誦皆嚴重受損、理解尚好→布洛卡(Broca)失語症(答C)。","detail":{"background":"Broca(表達型/不流暢型)失語:口語「不流暢」、費力、電報式、語法缺損(agrammatism);「覆誦差」;但「聽理解相對保留(尚好)」;常伴右側偏癱(因鄰近運動皮質)與病覺(感到挫折)。本題「表達流暢性與覆誦嚴重受損但理解尚好」=Broca。對比經皮質運動型(不流暢但覆誦保留)。","options":{"A":"Wernicke理解差、流利。","B":"經皮質感覺型理解差但覆誦保留。","C":"Broca:不流暢、覆誦差、理解保留→正解。","D":"經皮質運動型不流暢但覆誦保留(本題覆誦差,不符)。"},"sources":["Braddom/Neuro, Broca aphasia"]}},"110020-70":{"quick":"小腦損傷→運動失調型吶吃(ataxic dysarthria)(答A)。","detail":{"background":"小腦負責動作的協調與時序,受損造成「運動失調型構音障礙(ataxic dysarthria)」:音節分裂(scanning speech)、重音與語調不當、不規則的子音破裂、語速與音量不穩(像喝醉)。失語症(Broca/Wernicke/經皮質)屬大腦皮質語言障礙,與小腦無關;弛緩型吶吃屬下運動神經元。故小腦→ataxic dysarthria。","options":{"A":"小腦→運動失調型吶吃→正解。","B":"弛緩型屬下運動神經元/NMJ。","C":"Broca失語屬大腦皮質。","D":"經皮質感覺型失語屬大腦皮質。"},"sources":["Darley dysarthria; ataxic dysarthria = cerebellar"]}},"112020-58":{"quick":"自創新詞(neologism)、言語他人無法理解→渥尼克(Wernicke)失語症(答A)。","detail":{"background":"Wernicke失語的流利空話常出現「新詞(neologisms,自創無意義字)」與大量語意/語音性錯語,加上嚴重的理解缺損,使旁人完全聽不懂其內容,且病人多無自覺。新詞錯語(neologistic jargon)是Wernicke(及其嚴重型jargon aphasia)的標誌。Broca為費力不流暢、經皮質型覆誦保留,皆不以新詞為特徵。","options":{"A":"Wernicke:流利空話含新詞(neologism)→正解。","B":"Broca為不流暢費力。","C":"經皮質運動型不流暢但覆誦保留。","D":"經皮質感覺型理解差但覆誦保留,較少以新詞為主表現。"},"sources":["Braddom/Neuro, Wernicke aphasia (neologisms)"]}},"101030-55":{"quick":"需防滑手套+輪圈纏橡皮帶才能推輪椅=抓握無力但有伸腕→C6完全損傷(答B)。","detail":{"background":"頸髓損傷功能分級(完全性)依保留的最低神經節段決定可達功能:C4=仰賴呼吸器邊緣、僅能操作下巴/吹吸控制電動輪椅;C5=屈肘(肱二頭肌)可用,需平衡式前臂支架輔助進食,手動輪椅需特製;C6=保留伸腕(extensor carpi radialis),可用「肌腱固定式抓握(tenodesis)」,能獨立或半獨立推手動輪椅但「手內肌與抓握無力」,故需防滑手套增加摩擦、輪圈加橡皮/突起以代償抓握→正是本題情境;C7=伸肘(三頭肌)可用,轉位與自我照顧大幅獨立。故答C6。","options":{"A":"C4無手部功能,只能用下巴/吹吸控制電動輪椅,無法以手推。","B":"C6保留伸腕但抓握弱,需防滑手套+橡皮輪圈推手動輪椅→正解。","C":"T2完全損傷上肢正常,不需這些代償。","D":"L1損傷上肢完全正常,無關手部代償。"},"sources":["Braddom PM&R, SCI functional levels (C6 tenodesis)"]}},"102030-56":{"quick":"尿動力學見小容量、高壓、外括約肌EMG活動增加(逼尿肌-括約肌不協調DSD)→脊髓上(上薦髓)損傷,T6 SCI(答B)。","detail":{"background":"神經性膀胱依病灶分型:薦髓上(suprasacral,脊髓上)損傷→反射亢進性(逼尿肌過動)膀胱,常合併「逼尿肌-外括約肌不協調(DSD)」——逼尿肌收縮時外括約肌反而同步收縮(EMG活動增加),造成小容量、高壓、排空不全與膀胱輸尿管逆流風險,須警覺上泌尿道受損。薦髓/薦下(下運動神經元)損傷→逼尿肌無收縮、低張弛緩膀胱、滿溢性尿失禁。本題:小容量(80mL內壓即達73cmH2O,高壓)+外括約肌EMG有活動(DSD)→屬薦髓上損傷=T6脊髓損傷。糖尿病或圓錐/馬尾(L腰椎)病變多為弛緩型,不符。","options":{"A":"糖尿病性膀胱多為弛緩低張、感覺缺損,非高壓DSD。","B":"T6脊髓損傷=薦髓上→逼尿肌過動+DSD(高壓小容量)→正解。","C":"L2爆裂骨折傷及圓錐/馬尾→多為弛緩型。","D":"L4-5椎間盤突出傷神經根→下運動神經元弛緩型。"},"sources":["Braddom PM&R, Neurogenic bladder; detrusor-sphincter dyssynergia"]}},"102030-58":{"quick":"頸髓損傷5年、雙膝無法彎曲、X光見關節周圍鈣化骨化→異位性骨化(異位性鈣化症)(答C)。","detail":{"background":"異位性骨化(heterotopic ossification, HO)是SCI常見併發症,在大關節(髖最常見,其次膝、肘、肩)周圍軟組織異常生成骨,造成關節活動度進行性受限甚至僵直(本題雙膝無法彎曲)。X光可見關節旁成熟骨化團塊。本題慢性SCI+雙膝屈曲受限+X光鈣化骨化→HO(異位性鈣化/骨化症)。骨癌/骨質疏鬆/退化性關節炎影像與病程皆不符。","options":{"A":"骨癌少見且影像不符。","B":"骨質疏鬆是骨密度減少,不會造成關節旁鈣化團與屈曲僵直。","C":"異位性鈣化/骨化症→慢性SCI關節旁骨化致僵直→正解。","D":"退化性膝關節炎以關節腔狹窄/骨刺為主,非關節旁大塊鈣化。"},"sources":["Braddom PM&R, Heterotopic ossification in SCI"]}},"103100-59":{"quick":"臍(T10皮節)以下感覺與運動完全喪失→ASIA A(完全)、神經學節段T10(答C)。","detail":{"background":"ASIA神經學分級:先定「神經學損傷節段(neurological level)」=最低仍保有正常感覺與運動(肌力≥3)的節段;臍部對應T10皮節。ASIA損傷量表(AIS):A=完全(S4-5無任何感覺與運動);B=不完全,僅感覺保留(含S4-5)無運動;C=不完全,損傷節段以下半數以上關鍵肌肌力<3;D=半數以上肌力≥3;E=正常。本題「臍(T10)以下感覺與運動完全喪失」=完全損傷ASIA A、節段T10。","options":{"A":"節段標T4不符(臍為T10)。","B":"ASIA E是正常,與完全喪失矛盾。","C":"ASIA A、level T10→正解。","D":"ASIA E錯誤(非正常)。"},"sources":["ASIA International Standards for Neurological Classification of SCI"]}},"104090-69":{"quick":"C4四肢癱(無上肢功能)→只能用「特殊電動輪椅」(下巴/吹吸/頭控)(答D)。","detail":{"background":"C4完全損傷:橫膈(C3-5)部分保留但呼吸儲備差、肩以下無自主運動,上肢無功能。故無法自行淋浴、無法持湯匙進食、無法自行轉位;能達到的「行動」是操作具特殊控制介面(下巴控制、吹吸sip-and-puff、頭控)的「電動輪椅」。對比C5可輔助進食、C6可推手動輪椅、C7可轉位。故C4僅能用特殊電動輪椅。","options":{"A":"自行淋浴需手功能與轉位,C4無法。","B":"持湯匙進食需C5以上+輔具。","C":"自行轉位需C7左右的伸肘功能。","D":"C4可操作特殊控制電動輪椅→正解。"},"sources":["Braddom PM&R, SCI functional outcomes by level (C4)"]}},"106020-70":{"quick":"SCI急性期(臥床仰臥)壓瘡最好發於「薦骨(sacrum)」(答B)。","detail":{"background":"壓瘡好發於受壓骨突,且依姿勢不同:急性SCI病人多平躺臥床→仰臥最受壓處為「薦骨」(最常見),其次足跟、枕骨。進入慢性期長坐輪椅後,則以「坐骨粗隆(ischial tuberosity)」最常見。側臥時為大轉子。本題「急性期」(臥床為主)→薦骨。預防:每2小時翻身、減壓床墊、皮膚檢視。","options":{"A":"坐骨是「慢性期長坐輪椅」最常見處,非急性臥床期。","B":"薦骨是急性期仰臥最常見壓瘡處→正解。","C":"大轉子為側臥好發處。","D":"足跟為仰臥次常見,非最常見。"},"sources":["Braddom PM&R, Pressure injury in SCI (acute=sacrum)"]}},"108030-57":{"quick":"SCI電極取精(electroejaculation)探頭置於「直腸」,刺激前列腺/精囊周圍神經誘發射精(答C)。","detail":{"background":"脊髓損傷男性常有勃起與射精功能障礙影響生育。協助取精方法:陰莖震動刺激(penile vibratory stimulation,適用T10以上、射精反射弧完整者)為第一線;若失敗或低位損傷則用「直腸探頭電刺激取精(rectal probe electroejaculation, EEJ)」——將電極經肛門置入「直腸」,刺激前列腺與精囊區的交感/副交感神經叢誘發射精。故電極置於直腸。","options":{"A":"腹部非取精電極放置處。","B":"會陰非標準EEJ位置。","C":"直腸(rectal probe)是電極取精放置處→正解。","D":"陰莖用於「震動刺激法」而非電極取精的電極位置。"},"sources":["Braddom PM&R, SCI fertility; rectal probe electroejaculation"]}},"108030-58":{"quick":"SCI併四肢癱恢復敘述「錯誤」:受傷初期肌力與後續恢復「無關」→錯,初期保留的肌力是恢復的重要預測因子(答C)。","detail":{"background":"頸髓損傷後神經恢復的特性:上肢功能恢復多發生於傷後前6-9個月(尤其前3個月恢復最快),之後速度漸緩;愈早出現恢復跡象者,最終預後愈佳;不完全損傷比完全損傷恢復潛能大;「受傷初期保留的運動功能(肌力)」與「損傷的完整性」是預後的關鍵預測因子——初期殘存肌力愈多,後續恢復愈好。故C說「初期肌力與往後恢復無關」與事實相反→錯誤。","options":{"A":"上肢恢復多在傷後6-9個月內→正確。","B":"恢復最快在傷後3個月內→正確。","C":"初期肌力與恢復「無關」→錯誤(初期肌力是重要預測因子),即答案。","D":"愈早恢復預後愈佳→正確。"},"sources":["Braddom PM&R, SCI recovery prognosis"]}},"109020-59":{"quick":"自主神經反射異常敘述「錯誤」:常發生在「受傷後一個月內」→錯,多在脊髓休克消退後(數週至數月後、傷後>1個月)才出現(答A)。","detail":{"background":"自主神經反射不良(autonomic dysreflexia, AD)是T6(含)以上完全性SCI的潛在致命急症:損傷節段以下的有害刺激(最常為膀胱脹/尿滯留,其次便秘、壓瘡、嵌甲)引發大量交感反射,病灶以下血管收縮致「陣發性嚴重高血壓」,病灶以上代償性反應出現劇烈頭痛、潮紅出汗、鼻塞、反射性心搏過緩。處置:立即坐起、鬆解束縛、找出並去除誘因(先導尿/通便)、必要時降壓藥。AD通常在「脊髓休克期過後」才出現(多在傷後數週至數月、即>1個月),故A說「常發生在傷後一個月內」錯誤。","options":{"A":"AD多在脊髓休克消退後(>1個月)才出現,說「一個月內」→錯誤,即答案。","B":"主要見於T6以上完全損傷→正確。","C":"膀胱脹尿是最常見誘因→正確。","D":"處置先去除刺激來源(導尿等)→正確。"},"sources":["Braddom PM&R, Autonomic dysreflexia"]}},"109080-58":{"quick":"四肢無動作但肛門有「自主收縮」(運動保留至S4-5)且S4-5有感覺→運動不完全,且因肛門自主收縮屬運動保留,須評定運動完整性:多數關鍵肌<3→ASIA C(答C)。","detail":{"background":"ASIA判定先看薦髓保留(sacral sparing):S4-5是否有深部肛門壓覺/輕觸痛覺感覺,以及「肛門外括約肌自主收縮(VAC)」。本題:S4-5有感覺(感覺保留)且「肛門指診有自主收縮」=運動功能保留至最低薦節→屬「運動不完全」損傷(AIS C或D)。再依損傷節段以下關鍵肌:四肢「沒有任何(自主)動作」表示絕大多數關鍵肌肌力<3→AIS C(運動不完全,半數以上關鍵肌<3)。若半數以上≥3才是D。故ASIA C。","options":{"A":"A為完全損傷(S4-5無任何感覺運動),本題S4-5有感覺+肛門自主收縮,不符。","B":"B為僅感覺保留無運動;本題有肛門自主收縮(運動保留)→非B。","C":"運動不完全且關鍵肌多數<3→ASIA C→正解。","D":"D需半數以上關鍵肌≥3,本題四肢無動作不符。"},"sources":["ASIA Impairment Scale (sacral sparing, VAC → motor incomplete C)"]}},"109080-61":{"quick":"SCI泌尿系統「最常見」併發症=泌尿道感染(UTI)(答B)。","detail":{"background":"神經性膀胱使SCI病人長期面臨泌尿道併發症,其中「泌尿道感染(UTI)」最常見(與排空不全、餘尿、導尿、結石、逆流相關),也是發燒與敗血的常見來源。其他併發症(結石、膀胱輸尿管逆流、腎水腫、最終腎衰竭)較UTI少見且多為長期累積結果。處置重點:適當膀胱排空計畫(間歇性導尿)、維持低壓儲尿、定期上泌尿道追蹤。故最常見為UTI。","options":{"A":"腎衰竭是長期嚴重後果,非最常見。","B":"泌尿道感染是SCI泌尿系統最常見併發症→正解。","C":"泌尿道瘻管罕見。","D":"結石較UTI少見。"},"sources":["Braddom PM&R, Urologic complications of SCI"]}},"110020-59":{"quick":"SCI後異位性骨化敘述「錯誤」:骨化「初期」就手術切除→錯,應等骨化成熟(骨掃描活性穩定、約12-18個月)再切除,過早手術復發率高(答D)。","detail":{"background":"SCI後異位性骨化(HO):好發髖關節(最常見),多在傷後1-6個月出現;早期診斷以「三相骨掃描」最敏感(X光要數週才見鈣化),血中鹼性磷酸酶可升高。治療:NSAIDs(indomethacin)或bisphosphonate抑制、維持關節活動度防僵直;若嚴重影響功能需手術切除,但「必須等骨化成熟(骨掃描攝取穩定、約成熟12-18個月)後」再切除,以免在活躍期手術導致大量復發。故D「初期即手術切除」錯誤。","options":{"A":"HO常發生在髖關節→正確。","B":"多在傷後1-6個月→正確。","C":"三相骨掃描可早期偵測→正確。","D":"骨化初期手術會高復發,應待成熟→此敘述錯誤,即答案。"},"sources":["Braddom PM&R, Heterotopic ossification management"]}},"110020-60":{"quick":"Brown-Séquard(脊髓半切)典型:同側運動(皮質脊髓徑)+同側本體/振動覺喪失;「對側」痛溫覺喪失(脊髓視丘徑已交叉)(答D)。","detail":{"background":"脊髓半切症候群(Brown-Séquard syndrome)因一側脊髓損傷,反映各徑的交叉位置:皮質脊髓徑(運動)在延腦已交叉故支配同側→損傷致「同側」運動喪失(病灶以下);後柱(本體覺、振動、精細觸覺)上行至延腦才交叉→「同側」喪失;脊髓視丘徑(痛溫覺)進脊髓1-2節即交叉至對側上行→損傷致「對側」痛溫覺喪失(病灶以下1-2節)。本題D「對側下肢痛溫覺喪失+同側下肢運動喪失」=典型Brown-Séquard。此症候群預後相對佳(多可恢復行走)。","options":{"A":"描述同側全失,不符半切的分離性表現。","B":"僅本體覺喪失不完整。","C":"描述像中央索症候群(上肢重於下肢)。","D":"同側運動+對側痛溫覺喪失→Brown-Séquard典型→正解。"},"sources":["Braddom/Neuro, Brown-Séquard syndrome"]}},"112020-60":{"quick":"頸髓SCI睡眠呼吸障礙敘述「最不適當」:以「中樞型」睡眠呼吸中止為主→錯,實際以「阻塞型(OSA)」為主(答B)。","detail":{"background":"頸髓損傷病人睡眠呼吸障礙盛行率高,主要為「阻塞型睡眠呼吸中止(OSA)」(因呼吸肌無力、肌張力改變、肥胖、藥物如baclofen等);夜眠常中斷、白天嗜睡;BMI>30為危險因子之一;阻抗性吸氣肌訓練可改善四肢癱者的呼吸與睡眠呼吸問題。故B說「以中樞型為主」錯誤(應為阻塞型)。","options":{"A":"病人夜眠常中斷→正確。","B":"頸髓SCI睡眠呼吸障礙以阻塞型(非中樞型)為主→此敘述最不適當,即答案。","C":"BMI>30是危險因子→正確。","D":"吸氣肌訓練可改善→正確。"},"sources":["Braddom PM&R, Sleep-disordered breathing in cervical SCI (mostly obstructive)"]}},"112080-60":{"quick":"中央索症候群(central cord syndrome)敘述「最不適當」:多因「骨折脫位」→錯,典型是老年人「頸椎退化+過度伸直」跌倒、無骨折(答B)。","detail":{"background":"中央索症候群(central cord syndrome)是最常見的不完全SCI,典型發生於「已有頸椎退化狹窄的老年人,跌倒時頸部過度伸直(hyperextension)」,常「無骨折脫位」,脊髓中央灰質與內側皮質脊髓徑(支配上肢的纖維居中)受損→「上肢無力重於下肢」、手部功能差,變異性感覺與膀胱障礙;預後多數可改善(下肢與膀胱先恢復,手部最差)。故B「常因骨折脫位造成」錯誤(典型為退化+過伸、無骨折)。下肢恢復比上肢好(D正確)。","options":{"A":"最常發生於頸髓→正確。","B":"典型為退化+過度伸直跌倒,常無骨折脫位→此敘述最不適當,即答案。","C":"好發於老年人跌倒→正確。","D":"下肢功能恢復比上肢好(手部最差)→正確。"},"sources":["Braddom PM&R, Central cord syndrome"]}},"112080-69":{"quick":"完全頸髓損傷一年後仍能獨立操作「手動」輪椅的最高位=C5(答B)。","detail":{"background":"頸髓完全損傷的手動輪椅獨立性:C4以上無上肢功能→只能電動輪椅;C5保留屈肘(肱二頭肌)與部分肩功能,經訓練可使用「特製手動輪椅(加裝突起/塗層輪圈)」於平地短程獨立推行(雖費力);C6(伸腕、tenodesis)更能獨立推手動輪椅;C7(伸肘)推行與轉位更佳。題問「有可能獨立操作手動輪椅的最高位(即最嚴重)損傷」=C5。","options":{"A":"C4無足夠上肢功能,只能電動輪椅。","B":"C5經訓練可獨立操作特製手動輪椅(最高位)→正解。","C":"C6當然可以,但非「最高位」。","D":"C7更佳,非「最高位」答案。"},"sources":["Braddom PM&R, SCI level and wheelchair independence"]}},"113020-59":{"quick":"Brown-Séquard敘述「最適當」:大部分病人可恢復獨立行走(預後相對佳)(答C)。","detail":{"background":"脊髓半切(Brown-Séquard)的分離性表現:同側病灶以下運動喪失+同側本體/振動覺喪失;對側痛溫覺喪失。臨床純粹型少見,多為部分。其預後在所有不完全SCI症候群中相對最佳,「大多數病人可恢復行走能力與括約肌控制」。選項辨析:同側「本體覺」喪失(非對側);同側溫痛覺保留(對側才喪失);同側運動受損較重。故最正確敘述為C(多可恢復獨立行走)。","options":{"A":"溫痛覺喪失在「對側」,非同側→錯。","B":"本體覺喪失在「同側」,非對側→錯。","C":"大部分病人可恢復獨立行走(預後佳)→正解。","D":"運動受損在「同側」,非對側→錯。"},"sources":["Braddom PM&R, Brown-Séquard prognosis"]}},"113020-60":{"quick":"全皮層缺損、見脂肪+肉芽但無肌腱/骨外露→壓瘡「第三級(Stage 3)」(答B)。","detail":{"background":"NPUAP(2016)壓瘡分級:第1級=完整皮膚出現不會變白的紅斑;第2級=部分皮層缺損,真皮暴露(淺潰瘍或水泡),無脂肪外露;第3級=全皮層缺損,可見「皮下脂肪、可有肉芽與捲邊(epibole)」,但「未見筋膜、肌肉、肌腱、骨」;第4級=全皮層+組織缺損,筋膜/肌肉/肌腱/骨外露或可觸及;另有不可分級(被腐肉/焦痂覆蓋無法判深度)與深部組織損傷。本題「全皮層缺損、見脂肪+肉芽、無肌腱軟骨外露」=第3級(無第5級)。","options":{"A":"第2級為部分皮層缺損(真皮),無脂肪外露。","B":"第3級:全皮層+脂肪可見、無肌腱骨外露→正解。","C":"第4級需見肌腱/肌肉/骨外露。","D":"NPUAP無第5級。"},"sources":["NPUAP/EPUAP Pressure Injury Staging 2016"]}},"113070-58":{"quick":"自主神經反射不良症狀「最不適切」:血壓「降低」→錯,AD是陣發性嚴重「高血壓」(答A)。","detail":{"background":"自主神經反射不良(AD)發作的核心是「陣發性嚴重高血壓」(收縮壓可較基礎值升高20-40mmHg以上)。伴隨症狀:病灶以上(高位)代償性副交感反應——劇烈搏動性頭痛、臉部潮紅、鼻塞、上半身出汗(冒汗)、反射性心搏過緩;病灶以下交感過度反應——血管收縮、立毛(起雞皮疙瘩)、皮膚蒼白。故「血壓降低」與AD相反→最不適切。","options":{"A":"AD是高血壓而非血壓降低→最不適切,即答案。","B":"冒汗(病灶以上出汗)是AD症狀→正確。","C":"起雞皮疙瘩(立毛)是AD症狀→正確。","D":"劇烈頭痛是AD典型症狀→正確。"},"sources":["Braddom PM&R, Autonomic dysreflexia signs"]}},"113070-61":{"quick":"SCI復健功能目標「最不適當」:C6損傷「可進行肱三頭肌動作」→錯,三頭肌(伸肘)由C7支配,C6尚無三頭肌功能(答C)。","detail":{"background":"完全性SCI各節段可達功能與關鍵肌:C3以上需呼吸器(C3-5橫膈),C3損傷常需呼吸器輔助;C5=肱二頭肌(屈肘),可用屈肘肌矯具/平衡式前臂支架活動;C6=伸腕(tenodesis抓握),尚「無」伸肘(三頭肌);C7=肱三頭肌(伸肘)→才能做撐起轉位;T6胸髓損傷上肢正常,可用支架+前臂枴/助行器站立行走訓練。故C說「C6可進行肱三頭肌動作」錯誤(三頭肌屬C7)。","options":{"A":"C3損傷常需呼吸器→正確。","B":"C5可用屈肘肌矯具→正確。","C":"肱三頭肌(伸肘)屬C7,C6尚無→此敘述最不適當,即答案。","D":"T6可用前臂枴/助行器→正確。"},"sources":["Braddom PM&R, SCI key muscles by level (triceps=C7)"]}},"114020-72":{"quick":"跌倒後四肢無力+大小便失禁、胸椎MRI→脊髓梗塞敘述「錯誤」:受影響血管最常是「後」脊髓動脈→錯,最常見是「前脊髓動脈(anterior spinal artery)」(答C)。","detail":{"background":"脊髓梗塞(spinal cord infarction)最常見為「前脊髓動脈症候群(anterior spinal artery syndrome)」:前脊髓動脈供應脊髓前2/3(含皮質脊髓徑、脊髓視丘徑、前角),梗塞造成病灶以下運動麻痺、痛溫覺喪失、膀胱腸功能障礙,而後柱(本體/振動覺,由成對的後脊髓動脈供應)相對保留。脊髓血供=一條前脊髓動脈+一對後脊髓動脈(D正確);軸切MRI在前角灰質可見對稱高訊號「貓頭鷹眼(owls eye/snake eye)」徵象(B正確)。故C「最常是後脊髓動脈」錯誤(應為前脊髓動脈)。","options":{"A":"臨床+影像符合脊髓梗塞→正確。","B":"MRI可見owls eye(前角)→正確。","C":"最常受影響為「前」脊髓動脈,非後→此敘述錯誤,即答案。","D":"血供=一條前脊髓動脈+一對後脊髓動脈→正確。"},"sources":["Braddom/Neuro, Spinal cord infarction (anterior spinal artery)"]}},"114070-59":{"quick":"SCI慢性神經病變痛敘述「最不適當」:傷處「以下」的疼痛稱「幻肢痛」→錯,幻肢痛是截肢後對缺失肢體的痛,SCI傷處以下痛屬中樞性神經病變痛(答D)。","detail":{"background":"SCI後慢性疼痛分類:傷害感受性痛(肌肉骨骼、內臟)與神經病變痛。神經病變痛又分:「傷處(at-level)」痛——多與神經根或脊髓段壓迫/損傷有關;「傷處以下(below-level)」痛——中樞去傳入性疼痛,與大腦痛覺中樞重組(reorganization)有關。可有異感性疼痛(allodynia)、燒灼痛。治療以gabapentin/pregabalin、TCA為主。「幻肢痛(phantom pain)」是「截肢」後感受到已不存在肢體的疼痛,與SCI傷處以下疼痛是不同概念。故D錯誤(SCI below-level痛不叫幻肢痛)。","options":{"A":"可有異感性疼痛(allodynia)→正確。","B":"傷處(at-level)痛可源自脊髓壓迫→正確。","C":"傷處以下痛與大腦痛覺重組有關→正確。","D":"把SCI傷處以下痛稱為「幻肢痛」→錯誤(幻肢痛屬截肢),即答案。"},"sources":["Braddom PM&R, SCI neuropathic pain (at-level / below-level)"]}},"114070-60":{"quick":"偵測SCI早期異位性骨化「最敏感」=三相骨骼掃描(答A)。","detail":{"background":"異位性骨化的早期(尚未鈣化階段)偵測:「三相骨骼掃描(three-phase bone scan)」最敏感,在臨床或X光出現變化「前」即可偵測到血流與骨代謝增加(可早1-2週);X光要待礦化沉積(數週後)才顯現,屬較晚指標;CT/MRI可顯示成熟病灶與範圍但早期敏感度不如骨掃描;血中鹼性磷酸酶可升高但非特異。故早期最敏感為三相骨掃描。","options":{"A":"三相骨掃描最早、最敏感偵測HO→正解。","B":"MRI可顯示但非早期最敏感。","C":"CT顯示成熟病灶,早期較不敏感。","D":"X光要數週後礦化才見,屬晚期。"},"sources":["Braddom PM&R, Three-phase bone scan for early HO"]}},"103030-58":{"quick":"肌電圖(EMG)需以針電極插入肌肉,故「出血傾向(血友病)」是相對禁忌(答B)。","detail":{"background":"針極肌電圖(needle EMG)是把同軸針電極插入肌肉記錄電活動,屬侵入性,主要顧慮出血與感染。禁忌/相對禁忌:嚴重出血傾向或凝血異常(血友病、抗凝治療INR過高)、局部感染、淋巴水腫肢體(感染風險);植入式去顫器/起搏器附近須謹慎。愛滋、B肝帶原(以標準防護處理)、癲癇皆非禁忌。故EMG禁忌為血友病(出血傾向)。","options":{"A":"愛滋以標準防護即可,非禁忌。","B":"血友病(出血傾向)是針極EMG相對禁忌→正解。","C":"癲癇與EMG無關,非禁忌。","D":"B肝帶原以標準防護處理,非禁忌。"},"sources":["Braddom PM&R, Electrodiagnosis (needle EMG contraindications)"]}},"103100-58":{"quick":"腕隧道症候群「早期」最有價值的電學診斷=神經傳導檢查(NCS,尤其感覺神經傳導潛期延長)(答A)。","detail":{"background":"腕隧道症候群(CTS)是正中神經在腕部受壓。電學診斷:「神經傳導檢查(NCS)」最敏感、最早出現異常——感覺神經傳導(跨腕段)潛期延長、傳導速度減慢是最早的指標(脫髓鞘),其次運動遠端潛期延長;針極EMG(看大魚際肌去神經)只在較嚴重、軸突已受損時才異常,屬較晚期變化。故早期診斷首選NCS。","options":{"A":"神經傳導(感覺潛期延長)是CTS最早、最敏感指標→正解。","B":"EMG在軸突受損的較嚴重期才異常。","C":"連續電刺激用於NMJ疾病。","D":"體感誘發電位非CTS常規早期工具。"},"sources":["Braddom PM&R, Carpal tunnel electrodiagnosis (NCS first)"]}},"104030-56":{"quick":"糖尿病神經病變(廣泛性周邊神經病變)診斷最有用的電學檢查=神經傳導檢查(NCS)(答A)。","detail":{"background":"糖尿病多發性周邊神經病變屬長度依賴的感覺運動多發神經病變,評估其傳導功能(脫髓鞘vs軸突)最有用的是「神經傳導檢查(NCS)」——測感覺/運動傳導速度、潛期、振幅,可量化嚴重度與型態。EMG輔助看去神經(軸突喪失)。連續電刺激用於NMJ;肌肉激發檢查非常規。故首選NCS。","options":{"A":"神經傳導檢查是評估糖尿病周邊神經病變的主力→正解。","B":"EMG為輔助(看去神經)。","C":"肌肉激發檢查非常規。","D":"連續電刺激用於NMJ疾病。"},"sources":["Braddom PM&R, NCS for polyneuropathy"]}},"105100-70":{"quick":"產後哺乳婦、拇~中指尖麻、腕部Tinel/Phalen陽性→正中神經病變(腕隧道症候群)(答C)。","detail":{"background":"腕隧道症候群(CTS):正中神經在腕橫韌帶下受壓,典型症狀為拇、食、中指及無名指橈側(正中神經感覺分布)麻木刺痛,夜間加重,甩手可緩;嚴重時大魚際(拇對掌肌)萎縮無力。誘發測試:Tinels sign(叩腕部正中神經區誘發放電)、Phalens test(屈腕1分鐘誘發麻)皆陽性。好發於孕產婦/哺乳期(體液滯留)、反覆手部動作、糖尿病、甲狀腺低下。本題產後+第1-3指尖麻+Tinel/Phalen陽性=正中神經CTS。","options":{"A":"橈神經病變以手腕下垂(伸肌無力)為主,非指尖麻。","B":"尺神經病變影響第4-5指。","C":"正中神經病變(CTS):拇-中指麻+Tinel/Phalen陽性→正解。","D":"頸神經根病變多沿皮節放射至前臂,Phalen/Tinel(腕)非典型。"},"sources":["Braddom PM&R, Carpal tunnel syndrome"]}},"105100-71":{"quick":"CTS(輕中度)首選保守治療=「腕部副木(夜間中立位)」(答C)。","detail":{"background":"承上CTS治療階梯:輕中度先保守治療——夜間「腕部中立位副木(wrist splint)」(避免屈腕加壓)為第一線、活動調整、局部類固醇注射;口服消炎止痛劑效果有限;頸部牽引是針對頸神經根病變(非腕部問題);充氣壓迫療法用於淋巴水腫。嚴重(大魚際萎縮、持續軸突喪失)才手術鬆解腕橫韌帶。故首選腕部副木。","options":{"A":"口服消炎止痛劑對CTS效果有限,非首選。","B":"頸部牽引針對頸神經根病變,非腕部CTS。","C":"腕部中立位副木是CTS第一線保守治療→正解。","D":"充氣壓迫療法用於淋巴水腫,與CTS無關。"},"sources":["Braddom PM&R, CTS conservative management (wrist splint)"]}},"106020-58":{"quick":"神經傳導速度檢查敘述「錯誤」:常用於分辨「急性與慢性」神經病變→錯,區分急慢性靠針極EMG(去神經電位的演變),NCS無法區分急慢性(答C)。","detail":{"background":"神經傳導檢查(NCS)用途與特性:可分辨「肌肉病變vs神經病變」(配合EMG)、定位與量化神經損傷、判定脫髓鞘(速度慢/潛期長)vs軸突喪失(振幅低);新生兒髓鞘未成熟,傳導速度約成人一半;傳導速度與「體溫成正相關」(低溫變慢,故檢查需保暖)。但「區分急性與慢性」主要靠針極EMG觀察去神經電位(纖維顫動fibrillation數週後才出現)與再生(多相波)的時序演變,NCS本身難以判定急慢性。故C錯誤。","options":{"A":"NCS配合EMG可分辨肌肉vs神經病變→正確。","B":"新生兒傳導速度約成人一半→正確。","C":"區分急慢性靠EMG時序,NCS難以→此敘述錯誤,即答案。","D":"傳導速度與體溫正相關→正確。"},"sources":["Braddom PM&R, Nerve conduction studies"]}},"106080-55":{"quick":"「最不」影響神經傳導反應時間的生理因素=受檢時的「姿勢」;身高、年齡、體溫皆影響(答B)。","detail":{"background":"影響神經傳導參數的生理因素:體溫(低溫使傳導變慢、潛期延長,最重要的技術干擾因子,需維持肢溫32-34度);身高/肢長(肢愈長,近端到遠端的傳導時間/F波潛期愈長);年齡(嬰兒髓鞘未成熟速度慢,老年漸減);這些都會影響潛期與速度。受檢時的「姿勢」並非影響傳導反應時間的生理因素(只要正確擺位定距)。故最不影響者為姿勢。","options":{"A":"身高(肢長)影響傳導時間。","B":"受檢姿勢最不影響傳導反應時間→正解。","C":"年齡影響傳導速度。","D":"體溫是重要影響因子。"},"sources":["Braddom PM&R, Factors affecting nerve conduction"]}},"106080-57":{"quick":"診斷神經根病變(radiculopathy)定位最有價值=針極肌電圖(EMG)(答B)。","detail":{"background":"神經根病變(radiculopathy)的電學診斷:病灶在背根/腹根近端。「針極EMG」最有定位價值——可在受該神經根支配的肢體肌肉(及最關鍵的「脊旁肌paraspinal muscles」)看到去神經電位(纖維顫動、正銳波),依受累肌肉的肌節(myotome)分布定位節段;脊旁肌異常更指向神經根(近端)病變。常規感覺NCS在神經根病變(節前損傷,背根節以近)常正常(感覺神經元胞體在背根節仍存活),故NCS定位價值低。F波/H反射為輔助。故首選EMG。","options":{"A":"感覺NCS在神經根病變常正常,定位價值低。","B":"針極EMG(含脊旁肌)定位神經根最有價值→正解。","C":"F波僅粗略反映近端,特異性不足。","D":"Hoffmann反射(H反射)主要評S1,輔助而非主力。"},"sources":["Braddom PM&R, EMG for radiculopathy (paraspinal muscles)"]}},"107020-57":{"quick":"H反射與F波敘述「正確」者:H反射是「單突觸反射」(刺激Ia傳入→經脊髓單突觸→運動神經元)(答A)。","detail":{"background":"晚反應比較:H反射(Hoffmann reflex)=次強度電刺激興奮Ia感覺傳入纖維,經脊髓「單突觸」反射弧興奮運動神經元產生反應(相當於電誘發的肌伸張反射,成人主要在腓腸肌/比目魚肌-脛神經,評估S1),屬單突觸反射;F波(F-wave)=用「超強度(supramaximal)」刺激,動作電位逆行至前角運動神經元後再「反彈順行」產生的小晚波,反映運動神經元與近端傳導,潛期與波形「多變不固定」、振幅小、出現在M波「之後」。故A正確;B(F波在M波前)、C(F波振幅比H反射大)、D(F波因超強度故時間固定)皆錯。","options":{"A":"H反射是單突觸反射→正解。","B":"F波出現在M波「之後」,非前面→錯。","C":"F波振幅小(僅少數運動單位),通常比H反射小→錯。","D":"F波潛期/波形「多變不固定」(每次激發的神經元不同)→錯。"},"sources":["Braddom PM&R, Late responses (H-reflex, F-wave)"]}},"107020-58":{"quick":"「最不會」造成周邊神經病變的感染=B型肝炎;AIDS、痲瘋、白喉皆會(答A)。","detail":{"background":"感染相關周邊神經病變:愛滋(HIV,遠端對稱性多發神經病變、CMV多神經根病變);痲瘋(Hansen病,全球感染性周邊神經病變最常見原因之一,侵犯皮神經造成感覺喪失與變形);白喉(diphtheria毒素致脫髓鞘性神經病變,可侵犯顱神經與呼吸肌);C型肝炎(常合併冷凝球蛋白血症性血管炎神經病變)。「B型肝炎」相對最不以周邊神經病變為典型表現(其神經併發症罕見)。故答B肝。","options":{"A":"B型肝炎最不會造成周邊神經病變→正解。","B":"AIDS常見遠端對稱性多發神經病變。","C":"痲瘋是感染性周邊神經病變經典。","D":"白喉毒素致脫髓鞘神經病變。"},"sources":["Harrison/Braddom, Infectious peripheral neuropathies"]}},"107020-59":{"quick":"「不會」造成手指伸展無力者=骨間前神經病變(AIN);AIN支配屈指(FPL、FDP橈側、PQ)而非伸指(答B)。","detail":{"background":"手指伸展(extension)由橈神經系統支配:橈神經主幹(肱骨螺旋溝)受傷→伸腕伸指無力(垂腕);骨間後神經(PIN,橈神經深支)症候群→伸指(掌指關節)無力但無感覺缺損、伸腕偏橈;臂神經叢後索→含橈神經與腋神經,亦影響伸肌。骨間前神經(AIN,正中神經分支)只支配「屈」拇長肌(FPL)、屈指深肌(FDP橈側)與旋前方肌→造成無法做OK手勢(屈拇屈食指末節),「不影響伸指」。故AIN病變不會造成伸指無力。","options":{"A":"橈神經受傷致伸腕伸指無力→會。","B":"骨間前神經(AIN)管屈指,不影響伸指→正解(不會)。","C":"骨間後神經(PIN)症候群致伸指無力→會。","D":"臂神經叢後索含橈神經→會影響伸指。"},"sources":["Braddom PM&R, Forearm nerve syndromes (AIN vs PIN)"]}},"108030-56":{"quick":"夏柯-馬利-杜斯病(CMT)最易侵犯「腓神經(peroneal nerve)」→足下垂、高弓足、垂足、鸛腿(答A)。","detail":{"background":"夏柯-馬利-杜斯病(Charcot-Marie-Tooth, CMT/遺傳性運動感覺神經病變HMSN)是最常見的遺傳性周邊神經病變,長度依賴、由遠端開始。下肢最易受累的是「腓總神經(peroneal/fibular nerve)」系統,造成足背屈與外翻無力→垂足、高弓足(pes cavus)、槌狀趾,小腿遠端肌萎縮形成「倒香檳瓶腿/鸛腿(stork legs)」,步態為跨閾步態(steppage gait)。故最易侵犯腓神經。","options":{"A":"腓神經最易受累(垂足、高弓足)→正解。","B":"脛神經相對較晚受累。","C":"股神經非CMT典型受累。","D":"隱神經(純感覺)非典型。"},"sources":["Braddom/Neuro, Charcot-Marie-Tooth disease"]}},"108030-59":{"quick":"分辨「肌肉病變vs神經病變」最有用=針極肌電圖(EMG)(答B)。","detail":{"background":"針極EMG透過分析靜止期自發電位(纖維顫動、正銳波)與用力收縮時的「運動單位動作電位(MUAP)」形態與徵召(recruitment)模式,可區分:神經病變(去神經電位、MUAP振幅大時程長多相波、徵召減少)vs肌肉病變(MUAP振幅小時程短多相、早期徵召full但小)。故分辨肌病vs神經病變最有用的是EMG。神經傳導輔助評估傳導;連續電刺激用於NMJ;肌肉激發非常規。","options":{"A":"NCS輔助,但分辨肌病vs神經病主力是EMG。","B":"針極EMG分辨肌肉病變vs神經病變最有用→正解。","C":"連續電刺激用於NMJ疾病。","D":"肌肉激發檢查非常規。"},"sources":["Braddom PM&R, Needle EMG (myopathy vs neuropathy)"]}},"108030-70":{"quick":"右第4-5指無法完全伸直+小魚際萎縮+鷹爪手→尺神經病變(答A)。","detail":{"background":"尺神經病變:支配小魚際肌、骨間肌、第3-4蚓狀肌與內側兩指,受損造成「鷹爪手(claw hand/benediction反向)」——第4、5指掌指關節過度伸展、指間關節屈曲無法伸直,小魚際(hypothenar)與骨間肌萎縮、Froment徵象陽性、第4-5指感覺異常。常見壓迫點為肘隧道(肘部)與腕部Guyon管。本題小魚際萎縮+第4-5指鷹爪→尺神經。","options":{"A":"尺神經病變→小魚際萎縮+鷹爪手→正解。","B":"橈神經病變致垂腕。","C":"正中神經病變影響大魚際與第1-3指。","D":"肌皮神經管屈肘(肱二頭肌),與手部無關。"},"sources":["Braddom PM&R, Ulnar neuropathy (claw hand)"]}},"108030-74":{"quick":"車禍後右上肢無力,頸椎MRI示臂神經叢傷害——敘述「錯誤」:root avulsion是神經根與脊髓的「節前(pre-ganglionic)」分離,不是「節後(post-ganglionic)」(答D)。","detail":{"background":"臂神經叢損傷(brachial plexus injury):常因牽拉(stretching)或撕脫(avulsion)。MRI/脊髓攝影可見「假性脊髓膜膨出(pseudomeningocele)」——神經根撕脫時硬脊膜囊破損形成的腦脊液囊袋,是「節前撕脫(preganglionic root avulsion)」的影像標誌,預後差(無法靠周邊神經修復)。「root avulsion(神經根撕脫)」指神經根自「脊髓」分離,屬「節前(pre-ganglionic,即背根節近端)」損傷,而非「節後(post-ganglionic)」。故D敘述把它說成節後分離→錯誤。","options":{"A":"臨床+影像符合臂神經叢傷害→正確。","B":"假性脊髓膜膨出是撕脫的影像表現→正確。","C":"臂神經叢傷可為牽拉傷、神經根撕脫等→正確。","D":"Root avulsion是「節前」分離(神經根離脊髓),非節後→此敘述錯誤,即答案。"},"sources":["Braddom PM&R, Brachial plexus injury; preganglionic avulsion"]}},"108080-59":{"quick":"「侍者小費(waiters tip)」姿勢=上臂神經叢(C5-6, Erb麻痺)受損(答A)。","detail":{"background":"臂神經叢上幹(C5-C6)損傷=Erb-Duchenne麻痺(產傷或肩部牽拉),受累肌肉(三角肌、棘上下肌、肱二頭肌、肱橈肌)無力,上肢呈「侍者收小費(waiters tip)」姿勢:肩內收內旋、肘伸直、前臂旋前、腕屈曲。下幹(C8-T1)損傷=Klumpke麻痺→爪形手、手內肌無力。本題waiters tip→上臂神經叢(C5-6)。","options":{"A":"臂神經叢上幹(C5-6, Erb)→waiters tip→正解。","B":"正中神經病變致猿手/OK手勢困難。","C":"尺神經病變致爪形手。","D":"橈神經病變致垂腕。"},"sources":["Braddom/Neuro, Erb palsy (waiters tip)"]}},"109020-61":{"quick":"車禍後鷹爪手(claw hand)→尺神經病變(答A)。","detail":{"background":"同108030-70。鷹爪手(claw hand)是尺神經病變的標誌:小魚際與骨間肌、內側蚓狀肌無力萎縮,第4、5指掌指關節過伸、指間關節屈曲、無法伸直,合併小指與無名指感覺異常、Froment徵象陽性。深化:尺神經常見壓迫點為肘隧道(肘部,最常見)與腕部Guyon管;肘部病變較完整的鷹爪;腕部Guyon管病變因屈指深肌仍受肘上完整支配,第4-5指屈曲更明顯(「尺神經矛盾ulnar paradox」——病灶愈高位,爪形反而愈不明顯)。電學診斷以神經傳導(跨肘段傳導速度減慢)定位、針極EMG看手內肌去神經。治療:輕者護肘避壓、夜間伸肘副木;嚴重或進行性者手術減壓/前移。","options":{"A":"尺神經病變→鷹爪手→正解。","B":"橈神經→垂腕。","C":"正中神經→大魚際萎縮/猿手。","D":"肌皮神經→屈肘無力。"},"sources":["Braddom PM&R, Ulnar neuropathy"]}},"109080-60":{"quick":"篩檢神經肌肉接合處(NMJ)疾病最常用=連續(重複)電刺激(repetitive nerve stimulation)(答C)。","detail":{"background":"神經肌肉接合處疾病(如重症肌無力MG、Lambert-Eaton)的電學診斷:「重複神經電刺激(repetitive nerve stimulation, RNS)」最常用——低頻(2-3Hz)刺激在MG出現「遞減反應(decrement,複合肌肉動作電位振幅遞減>10%)」;Lambert-Eaton高頻(或運動後)出現「遞增(increment)」。更敏感者為單纖維肌電圖(jitter增加),但RNS是最常用的篩檢法。NCS、針極EMG用於神經/肌肉病變。故答RNS。","options":{"A":"NCS用於神經傳導,非NMJ篩檢主力。","B":"肌肉激發檢查非常規。","C":"重複神經電刺激(RNS)是NMJ疾病最常用篩檢→正解。","D":"針極EMG用於肌肉/神經病變(單纖維EMG才特別敏感於NMJ,但非「最常用」)。"},"sources":["Braddom PM&R, Repetitive nerve stimulation for NMJ disorders"]}},"110020-61":{"quick":"慢性脫髓鞘病變肌電診斷「最不常出現」=複合肌肉動作電位(CMAP)振幅「增加」;脫髓鞘應是潛期長、速度慢、可能波幅離散降低(答B)。","detail":{"background":"慢性脫髓鞘性神經病變(如CIDP)的電生理特徵:遠端潛期(distal latency)延長、傳導速度(運動與感覺)減慢、傳導阻斷與時間離散(temporal dispersion)、F波潛期延長;若伴次發性軸突喪失,慢性再生使MUAP出現高振幅長時程「多相波」增加。CMAP振幅在脫髓鞘多為正常或因傳導阻斷/離散而「降低」,絕不會「增加」。故B(CMAP振幅增加)最不可能出現。","options":{"A":"遠端潛期延長是脫髓鞘特徵→會出現。","B":"CMAP振幅「增加」不會在脫髓鞘出現→正解(最不常)。","C":"感覺傳導速度變慢是脫髓鞘特徵→會出現。","D":"慢性再生致多相波增加→會出現。"},"sources":["Braddom PM&R, Electrodiagnosis of demyelinating neuropathy"]}},"110080-58":{"quick":"雙手推牆時右肩胛「翼狀(winging)外移」→長胸神經(long thoracic nerve)受損,前鋸肌無力(答A)。","detail":{"background":"翼狀肩胛(scapular winging):前鋸肌(serratus anterior,由長胸神經C5-7支配)使肩胛緊貼胸壁,長胸神經受損(揹重物、揮拍運動、手術牽拉)→前鋸肌無力,推牆時肩胛內緣翹起「內側型翼狀肩胛」(最常見)。斜方肌(副神經spinal accessory)無力→外側型翼狀;背肩胛神經支配菱形肌。本題推牆→內側翼狀→長胸神經。","options":{"A":"長胸神經(前鋸肌)→推牆內側型翼狀肩胛→正解。","B":"背肩胛神經支配菱形肌(較少典型推牆翼狀)。","C":"腋神經支配三角肌,無關翼狀。","D":"副神經(斜方肌)致外側型翼狀。"},"sources":["Braddom PM&R, Scapular winging (long thoracic nerve)"]}},"110080-69":{"quick":"小指無名指麻+肘內側酸痛+手無力=肘隧道症候群→尺神經(答B)。","detail":{"background":"肘隧道症候群(cubital tunnel syndrome)是尺神經在肘部(肘管,內上髁後方)第二常見的壓迫性神經病變(僅次於腕部CTS的正中神經)。症狀:小指與無名指(尺側)麻木刺痛、肘內側酸痛(屈肘加重)、手內肌無力與萎縮、嚴重時鷹爪手與Froment陽性。故肘隧道症候群=尺神經。","options":{"A":"正中神經病變影響第1-3指(腕隧道)。","B":"肘隧道症候群=尺神經受壓→正解。","C":"橈神經病變致垂腕。","D":"肌皮神經管屈肘。"},"sources":["Braddom PM&R, Cubital tunnel syndrome (ulnar)"]}},"111020-59":{"quick":"肱骨螺旋溝(spiral groove)骨折+垂腕(無法背屈)→橈神經受傷(答B)。","detail":{"background":"橈神經(radial nerve)沿肱骨後方螺旋溝(spiral groove)走行,肱骨幹中段骨折或長時間壓迫(週六夜麻痺Saturday night palsy)易傷橈神經,造成「垂腕(wrist drop)」——伸腕、伸指、伸拇無力,手背虎口區感覺缺損,但屈肌(正中/尺神經)正常。本題螺旋溝骨折+垂腕→橈神經。","options":{"A":"尺神經病變致鷹爪手,非垂腕。","B":"橈神經(螺旋溝)受傷→垂腕→正解。","C":"正中神經病變致大魚際萎縮。","D":"肌皮神經管屈肘。"},"sources":["Braddom PM&R, Radial neuropathy (spiral groove, wrist drop)"]}},"111020-75":{"quick":"典型Guillain-Barré診斷「必要」條件=「無神經反射(腱反射消失/減弱)」(答D)。","detail":{"background":"格林-巴利症候群(GBS,急性發炎性脫髓鞘多神經病變AIDP)診斷要件(Asbury準則):「必要(required)」特徵為(1)進行性、超過一肢的無力,(2)反射消失或明顯減弱(areflexia/hyporeflexia)——反射消失是診斷必要條件。支持(supportive)特徵:數天至4週內進展、相對對稱、輕度感覺症狀、顱神經受累、自律神經失調、CSF蛋白上升而細胞數不高(albuminocytologic dissociation)、EMG/NCS脫髓鞘表現。故四選項中「無神經反射」是必要條件,其餘屬支持而非必要。","options":{"A":"數天內惡化是支持特徵,非絕對必要(進展可達4週)。","B":"自律神經異常是支持特徵,非必要。","C":"EMG/NCS典型表現是支持證據,非診斷必要(早期可正常)。","D":"反射消失(無神經反射)是GBS診斷必要條件→正解。"},"sources":["Asbury criteria; Braddom/Neuro, Guillain-Barré syndrome"]}},"111080-59":{"quick":"周邊神經病變復健「錯誤」者:神經截斷(neurotmesis)「先復健3個月看是否進步」→錯,完全斷裂需「手術修復」,不能延誤期待自行恢復(答C)。","detail":{"background":"周邊神經損傷分級(Seddon):神經失用(neuropraxia,僅局部脫髓鞘、軸突完整)預後最好,多在數週至3個月內完全恢復;軸突斷裂(axonotmesis,軸突斷但結締組織鞘保留)可沿原管路再生(約1mm/天),預後中等;神經截斷(neurotmesis,神經完全斷裂含鞘膜)無法自行有效再生,「需手術修復(neurorrhaphy/移植)」,愈早修復預後愈好,不能空等復健3個月。復健可用副木/被動ROM防攣縮、完全去神經肌肉用電刺激延緩萎縮纖維化。故C錯誤。","options":{"A":"復健初期用副木+被動ROM防攣縮→正確。","B":"完全去神經肌肉可用電刺激延緩萎縮→正確。","C":"神經截斷需手術修復,不應空等復健3個月→此敘述錯誤,即答案。","D":"神經失用預後佳,多3個月內恢復→正確。"},"sources":["Seddon classification; Braddom PM&R, Peripheral nerve injury"]}},"111080-60":{"quick":"Froment徵象(夾紙時拇指因內收肌無力而屈曲代償)→尺神經病變(答A)。","detail":{"background":"Froments sign:請病人用拇指與食指側緣夾住紙片,正常用拇內收肌(adductor pollicis,尺神經支配)夾持;尺神經病變時拇內收肌無力,改以「拇長屈肌(正中神經)」屈曲拇指指間關節來代償夾持→拇指IP關節彎曲即陽性。反映尺神經受損致手內肌(含拇內收肌、骨間肌)無力萎縮。故Froment徵象=尺神經。","options":{"A":"Froment徵象反映拇內收肌無力→尺神經病變→正解。","B":"橈神經病變致垂腕。","C":"正中神經病變致大魚際萎縮。","D":"肌皮神經管屈肘。"},"sources":["Braddom PM&R, Froment sign (ulnar)"]}},"111080-61":{"quick":"EMG中最易出現「肌束顫動(fasciculation)」=運動神經元疾病(MND,如ALS)(答B)。","detail":{"background":"肌束顫動(fasciculation)是單一運動單位自發性放電,於EMG與肉眼皆可見。最具代表性的是「運動神經元疾病(MND/ALS)」——前角細胞退化導致廣泛去神經與肌束顫動、纖維顫動、正銳波,加上慢性再生的高振幅長時程多相MUAP與徵召減少,合併上運動神經元徵候。糖尿病神經病變、GBS、神經根病變雖可有部分自發電位,但「肌束顫動」最典型且廣泛者為MND。故答B。","options":{"A":"糖尿病神經病變以遠端去神經為主,肌束顫動非典型。","B":"運動神經元疾病(ALS)最易出現廣泛肌束顫動→正解。","C":"GBS為脫髓鞘,以傳導阻斷為主。","D":"神經根病變局限於受累肌節,非廣泛肌束顫動。"},"sources":["Braddom PM&R, EMG in motor neuron disease (fasciculations)"]}},"114020-60":{"quick":"EMG/NCS「最不可能」達到的目的=「確診上運動神經元(UMN)病變」;電學檢查評估的是下運動神經元/周邊/肌肉(答B)。","detail":{"background":"肌電圖與神經傳導檢查評估的是「下運動神經元、周邊神經、神經肌肉接合與肌肉」的功能,可:定位病灶(神經/根/叢/肌肉)、量化軸突損傷程度與分布、判定脫髓鞘vs軸突、評估預後與恢復(再生電位)。但「上運動神經元(UMN)病變」(皮質脊髓徑)無法靠EMG/NCS確診——UMN損傷時周邊神經與肌肉電生理多正常,需靠臨床(反射亢進、巴賓斯基)、誘發電位或影像。故B最不可能。","options":{"A":"EMG/NCS可定位神經損傷部位→可達到。","B":"確診UMN病變非EMG/NCS能力(評估的是LMN/周邊/肌肉)→正解。","C":"可量化軸突損傷程度→可達到。","D":"可評估神經損傷預後→可達到。"},"sources":["Braddom PM&R, Scope of electrodiagnosis (cannot diagnose UMN)"]}},"114020-61":{"quick":"排球選手單側肩痛+棘上(肩胛脊上方)肌萎縮→上肩胛神經(suprascapular nerve)受傷(答D)。","detail":{"background":"上肩胛神經(suprascapular nerve, C5-6)經肩胛上切跡(suprascapular notch)與棘盂切跡(spinoglenoid notch),支配棘上肌與棘下肌。在過頭運動員(排球、棒球、舉重)因反覆牽拉或腱鞘囊腫壓迫,於切跡處受卡壓,造成棘上/棘下肌(肩胛脊上下方)萎縮與肩外展/外旋無力、鈍痛。本題肩胛脊「上方」(棘上肌)萎縮+肩痛→上肩胛神經。長胸神經致翼狀肩胛、腋神經致三角肌、背肩胛神經致菱形肌。","options":{"A":"長胸神經致翼狀肩胛(前鋸肌)。","B":"腋神經致三角肌萎縮/肩外展無力與肩外側感覺缺損。","C":"背肩胛神經支配菱形肌(肩胛內緣)。","D":"上肩胛神經→棘上/棘下肌萎縮(肩胛脊上方)→正解。"},"sources":["Braddom PM&R, Suprascapular neuropathy"]}},"114070-58":{"quick":"遺傳性運動感覺神經病變(HMSN/CMT)敘述——本題官方「送分(一律給分)」;一般而言CMT「典型較少疼痛」、為遠端對稱進行性無力影響髓鞘(第1型)。","detail":{"background":"遺傳性運動感覺神經病變(HMSN,即CMT):對稱、遠端起始、緩慢進行性的運動與感覺神經病變;CMT1型為脫髓鞘型(影響髓鞘,PMP22重複)、CMT2型為軸突型;典型遠端肌肉(小腿、足內肌、手內肌)無力萎縮、高弓足、垂足、深部反射消失;一般「感覺症狀相對輕、疼痛較不突出」(故選項D「常常有疼痛」相對不恰當)。本題經考選部判定「一律給分」(送分),四選項皆給分;考點在認識CMT為遠端對稱進行性、第1型影響髓鞘、疼痛非典型。","options":{"A":"對稱進行性肌無力是CMT特徵→正確敘述。","B":"第1型(CMT1)影響髓鞘→正確敘述。","C":"遠端肌群無力較明顯→正確敘述。","D":"CMT典型疼痛較少(原預設「最不恰當」答案);本題一律給分。"},"sources":["Braddom/Neuro, Hereditary motor sensory neuropathy (CMT); 送分"]}},"114070-64":{"quick":"旋前圓肌症候群(pronator syndrome)=正中神經在前臂(穿旋前圓肌處)受壓(答A)。","detail":{"background":"旋前圓肌症候群(pronator syndrome)是正中神經在「前臂近端」穿過旋前圓肌兩頭(或經肱二頭肌腱膜、屈指淺肌腱弓)處受壓,造成前臂掌側痛、無力與正中神經分布區麻木;與腕隧道不同處是「前臂(近端)疼痛較明顯、夜間症狀較少、手掌大魚際區(掌皮支)亦麻(因掌皮支在腕隧道近端發出未進腕管)」。故與正中神經最相關。","options":{"A":"旋前圓肌症候群=正中神經前臂近端受壓→正解。","B":"尺神經受壓於肘管/腕Guyon管。","C":"橈神經受壓於螺旋溝/PIN。","D":"肌皮神經管屈肘。"},"sources":["Braddom PM&R, Pronator syndrome (median)"]}},"114070-75":{"quick":"Guillain-Barré敘述「最不適當」:典型症狀「由軀幹往下延伸到下肢」→錯,GBS典型是「由下肢遠端往上(上行性)」的對稱無力(答C)。","detail":{"background":"GBS典型為「上行性(ascending)、對稱性」運動無力,自下肢遠端開始往近端與上肢進展,深部反射消失;常於前驅感染(如Campylobacter腸炎、病毒)或疫苗後1-3週發生;為急性脫髓鞘多神經病變(影響髓鞘);可累及呼吸肌致呼吸衰竭(需監測肺活量、必要時插管)與自律神經不穩。故C「由軀幹往下延伸到下肢」與其上行性模式相反→最不適當。","options":{"A":"常在病毒感染/疫苗後發生→正確。","B":"為急性多發神經病變、髓鞘受損→正確。","C":"GBS是上行性(下肢往上),非「軀幹往下到下肢」→此敘述最不適當,即答案。","D":"可致呼吸肌麻痺→正確。"},"sources":["Braddom/Neuro, Guillain-Barré (ascending paralysis)"]}},"115020-58":{"quick":"腕隧道症候群敘述「最不適當」:魚際(大魚際)「會有麻的感覺」→錯,大魚際區由「掌皮支」支配(腕管近端發出),CTS此區「不麻」(答D)。","detail":{"background":"腕隧道症候群(CTS):常見壓迫性神經病變;女性較常見;感覺異常分布於拇、食、中指及無名指橈側;嚴重時大魚際(thenar,拇對掌肌/外展短肌)肌肉「萎縮無力」。但關鍵考點:正中神經的「掌皮支(palmar cutaneous branch)」在進入腕隧道「之前(近端)」即分出,支配大魚際表面皮膚感覺,故CTS時「大魚際區皮膚感覺正常、不會麻」(這可與更近端的正中神經病變區分)。故D「魚際部位會有麻的感覺」錯誤(會萎縮無力但不麻)。","options":{"A":"CTS是常見壓迫性神經病變→正確。","B":"女性較常發生→正確。","C":"嚴重者大魚際肌肉萎縮→正確。","D":"大魚際區感覺由掌皮支(腕管近端)支配,CTS不會麻→此敘述錯誤,即答案。"},"sources":["Braddom PM&R, Carpal tunnel (palmar cutaneous branch spares thenar skin)"]}},"102030-60":{"quick":"膝下截肢術後復健「不包含」:膝後墊枕頭→錯,會造成膝屈曲攣縮,妨礙日後義肢裝配(答C)。","detail":{"background":"經脛骨(膝下,trans-tibial)截肢術後復健重點:預防殘肢水腫(彈性繃帶/壓力襪塑形成錐狀利於承筒)、殘肢減敏感(輕拍、按摩、不同質地刺激)、儘早肌力訓練與關節活動度維持、預防「膝屈曲攣縮」。膝後墊枕頭雖暫時減痛,卻會固定在屈曲位造成「膝屈曲攣縮」,使日後無法裝配義肢與行走→應避免。故術後復健「不包含」墊枕頭。","options":{"A":"彈性繃帶減殘肢水腫、塑形→正確措施。","B":"輕拍殘肢減敏感→正確措施。","C":"膝後墊枕頭會致屈曲攣縮→不包含(錯誤做法)→正解。","D":"儘早肌力訓練→正確措施。"},"sources":["Braddom PM&R, Transtibial amputation postop care"]}},"103030-64":{"quick":"儲能型義足(energy storage foot)=費式義足(Flex-foot)(答C)。","detail":{"background":"義足(prosthetic foot)分類:SACH足(solid-ankle cushion-heel,沙奇式)為基本固定踝、軟跟,無儲能;單軸足(single-axis)可蹠屈背屈;多軸足(multi-axis)可內外翻適應不平地面;「儲能型義足(energy storage and return, ESAR)」如Flex-foot(費式義足)以碳纖維彈性葉片在站立期儲存能量、推進期釋放,提供類似彈跳的推進力,適合活動量高、運動的截肢者。故儲能型=Flex-foot。","options":{"A":"單軸足僅提供蹠/背屈,無儲能。","B":"多軸足適應地面,非儲能型。","C":"費式義足(Flex-foot)是儲能型義足→正解。","D":"SACH足為基本軟跟固定踝,無儲能。"},"sources":["Braddom PM&R, Prosthetic feet (energy storage, Flex-foot)"]}},"103100-63":{"quick":"賽姆氏截肢(Syme amputation)=踝關節離斷(答C)。","detail":{"background":"足部與踝部截肢層級(由遠至近):趾離斷、經蹠骨截肢(trans-metatarsal)、Lisfranc(蹠跗關節)離斷、Chopart(跗中關節,保留距骨與跟骨)離斷、Syme截肢(踝關節離斷,切除足部但保留跟骨脂肪墊覆蓋脛骨遠端,可承重)、經脛骨(膝下)截肢。故Syme=踝關節離斷(ankle disarticulation)。","options":{"A":"大拇趾離斷是趾截肢。","B":"經蹠骨截肢在足中段。","C":"Syme截肢=踝關節離斷→正解。","D":"經脛骨截肢為膝下截肢。"},"sources":["Braddom PM&R, Levels of foot/ankle amputation (Syme)"]}},"104090-60":{"quick":"幻痛敘述「最正確」:拍打殘肢端或TENS是相當有效的止痛方式(答D)。","detail":{"background":"幻肢痛(phantom limb pain)是截肢後感受到「已不存在肢體」的疼痛,屬神經病變性疼痛,與中樞重組、周邊神經瘤、心理與環境(冷天、情緒)等有關。處置:藥物(gabapentin/pregabalin、TCA)、桌鏡療法(mirror therapy)、減敏感、以及「殘肢端輕拍/按摩與經皮神經電刺激(TENS)」等非藥物方法相當有效。選項辨析:延遲裝義肢「不會」減輕幻痛(早期使用義肢反而可能有益);兒童發生率不一定較低;入睡後通常減輕(非「仍存在」)。故最正確為D。","options":{"A":"延遲裝義肢並不會減輕幻痛(早期義肢使用可能有益)。","B":"成人比兒童「低」並不確立。","C":"幻痛與冷天/情緒有關,但入睡後多減輕,非「仍存在」。","D":"拍打殘肢端/TENS是有效的止痛方式→正解。"},"sources":["Braddom PM&R, Phantom limb pain"]}},"104090-62":{"quick":"最適合「踝足支架型義肢(AFO-style)」=Chopart截肢(丘巴特,跗中關節離斷)(答B)。","detail":{"background":"部分足截肢的義肢/輔具選擇與殘存足長度相關。Chopart截肢(跗中關節離斷,保留距骨與跟骨,但失去前中足)會因失去前足槓桿且足跟肌力不平衡(蹠屈攣縮傾向),常需「踝足支架型義肢/AFO-style填充義肢」提供前足填充與踝部穩定控制。經蹠骨/Lisfranc截肢殘足較長,多用足部填充鞋墊;Syme與膝下截肢用承重承筒義肢/義足而非AFO型。故最適合AFO型者為Chopart截肢。","options":{"A":"經蹠骨截肢殘足長,用填充鞋墊即可。","B":"Chopart截肢適合踝足支架型義肢→正解。","C":"Syme截肢用承重義肢(末端承重)。","D":"膝下截肢用PTB承筒義肢,非AFO型。"},"sources":["Braddom PM&R, Partial foot amputation prostheses (Chopart)"]}},"105020-62":{"quick":"Lisfranc截肢=經「蹠跗關節(tarsometatarsal)」離斷,殘肢「不會留有蹠骨(metatarsus)」(答A)。","detail":{"background":"Lisfranc關節即蹠跗關節(tarsometatarsal joint),Lisfranc截肢在此處離斷,切除「前方的蹠骨(metatarsus)與趾骨」,保留後方的跗骨(楔骨cuneiform、骰骨、舟骨、距骨talus、跟骨calcaneus)。故殘肢「不會留有蹠骨」。楔骨、距骨、跟骨皆在離斷近端、被保留。","options":{"A":"蹠骨在Lisfranc離斷處遠端被切除,殘肢不留→正解。","B":"楔骨在近端保留。","C":"跟骨在近端保留。","D":"距骨在近端保留。"},"sources":["Braddom PM&R, Lisfranc (tarsometatarsal) amputation"]}},"105020-63":{"quick":"理想膝下(經脛骨)截肢殘肢長度約為原脛骨長度的「40%」(中段三分之一)(答C)。","detail":{"background":"經脛骨(膝下)截肢的理想殘肢長度:一般取「脛骨結節以下約12.5-17.5公分」或概估為原脛骨長度的中段三分之一(約原長的40%左右)。過長(遠端三分之一)軟組織少、血供差、承重不佳、皮膚易破;過短(<5公分或僅保留結節)力臂不足、義肢控制差。中段約40%可兼顧槓桿、承重墊與皮瓣覆蓋。故答40%。","options":{"A":"80%過長,遠端血供與軟組織不足。","B":"60%偏長。","C":"約40%(中段三分之一)為理想長度→正解。","D":"20%過短,力臂不足、義肢控制差。"},"sources":["Braddom PM&R, Transtibial residual limb length"]}},"105020-67":{"quick":"先天性小兒下肢缺損開始裝義肢最佳時機=「9-12個月」(配合開始站立/扶走的發展里程)(答B)。","detail":{"background":"小兒先天性肢體缺損的義肢裝配時機配合動作發展里程:下肢義肢約在「9-12個月」、即嬰兒開始「拉站、扶走」的發展階段裝配,使站立與行走經驗與正常發展同步;上肢義肢約在6個月(會坐、雙手到中線)時裝被動義肢。早於發展需求裝配無益、過晚則錯過動作學習。故下肢約9-12個月。","options":{"A":"6-8個月對下肢站立尚早。","B":"9-12個月(開始拉站扶走)裝下肢義肢最佳→正解。","C":"13-18個月偏晚。","D":"19-24個月過晚。"},"sources":["Braddom PM&R, Pediatric prosthetic fitting timing"]}},"107020-71":{"quick":"糖尿病足瘡敘述「最正確」:處理糖尿病足的最終目標是「降低截肢發生率」(答D)。","detail":{"background":"糖尿病足潰瘍是周邊神經病變(保護性感覺喪失)+周邊動脈疾病(缺血)+反覆壓力與感染的結果,是非外傷性下肢截肢的首要原因。重點:已癒合的足瘡「復發率高」(故需持續足部護理與減壓鞋具);缺血性(血管病變)預後比單純神經病變者「差」;潰瘍必須積極就醫處理(清創、減壓、控制感染與血糖、血管評估),不可放任自我照顧。整體照護「最終目標即降低截肢發生率」。故D最正確。","options":{"A":"已癒合足瘡復發率「高」,非較少。","B":"血管(缺血)病變引起者預後「較差」,非較好。","C":"潰瘍須就醫積極處理,不可放任自我照顧。","D":"糖尿病足照護最終目標=降低截肢率→正解。"},"sources":["Braddom PM&R / IWGDF, Diabetic foot ulcer"]}},"107080-58":{"quick":"後天性截肢原因敘述「錯誤」(本題多重答案B、D):創傷性下肢截肢年齡多在「年輕族群」(非60-70歲);兒童截肢最常見原因是「創傷」(非腫瘤)。","detail":{"background":"後天性截肢流行病學:下肢截肢「最常見原因是血管疾病(糖尿病/周邊動脈疾病,好發中老年)」(A正確);創傷性截肢好發於「年輕、活動力高的男性」(B說60-70歲錯誤);上肢截肢以創傷為主、多在手腕以下、以手指截肢最多(C正確);兒童族群截肢「最常見原因是創傷(其次先天)」而非腫瘤(D說腫瘤最常見,錯誤)。故官方判定B、D均為錯誤敘述(多重給分)。","options":{"A":"下肢截肢最常見原因是血管疾病→正確敘述。","B":"創傷性下肢截肢好發年輕族群,非60-70歲→錯誤,給分。","C":"上肢截肢以創傷為主、手指截肢最多→正確敘述。","D":"兒童截肢最常見原因是創傷而非腫瘤→錯誤,給分。"},"sources":["Braddom PM&R, Epidemiology of amputation (官方多重答案B、D)"]}},"110080-61":{"quick":"截肢復健「不恰當」:創傷性截肢「必須等傷口完全癒合後」才裝義肢→過於絕對,現代多採早期/術後即裝(IPOP)或臨時義肢以加速復健(答A)。","detail":{"background":"截肢復健概念:術後殘肢照護含傷口處理、塑形、肌力訓練與衛教(B正確);義肢裝配與訓練品質影響病人長期使用意願(C正確);長期追蹤含殘肢、義肢、步態與功能達成度(D正確)。關於「裝配時機」:傳統需等傷口癒合,但現代復健常採「早期/術後即時義肢(immediate/early postoperative prosthesis, IPOP)」或臨時(暫時)義肢,在傷口尚未完全癒合前即開始,以減少水腫、攣縮、加速站立行走與心理適應。故A把「必須等完全癒合後才可開始」說得過於絕對→不恰當。","options":{"A":"創傷性截肢「必須等傷口完全癒合後」才裝→過絕對(可早期裝配)→正解(不恰當)。","B":"殘肢照護含傷口、肌力、衛教→恰當。","C":"義肢裝配訓練影響使用意願→恰當。","D":"長期追蹤殘肢/義肢/步態/功能→恰當。"},"sources":["Braddom PM&R, Amputation rehabilitation (early prosthetic fitting)"]}},"111080-64":{"quick":"膝下PTB承筒可「承壓區(pressure-tolerant)」=股骨內髁、髕骨肌腱、脛骨內側平台等;選項中為股骨內髁(答C)。","detail":{"background":"膝下髕骨肌腱承重(patellar tendon-bearing, PTB)承筒設計依殘肢組織耐壓性分區:「承壓區(pressure-tolerant)」=髕骨肌腱(主要承重點)、脛骨內側平台/脛骨前內側面平坦處、腓腸肌肌腹、股骨髁(內髁medial femoral condyle);「不耐壓區(pressure-sensitive),須留空減壓」=脛骨嵴(tibial crest)與脛骨結節、脛骨遠端前緣、腓骨頭(總腓神經通過,壓迫致麻)、腓骨遠端。本題選項中可承壓者為股骨內髁。","options":{"A":"腓骨頭(總腓神經)為不耐壓區。","B":"脛骨嵴為不耐壓區(尖銳)。","C":"股骨內髁屬承壓耐壓區→正解。","D":"膕肌肌腱區非主要承壓點。"},"sources":["Braddom PM&R, PTB socket pressure-tolerant/sensitive areas"]}},"112080-63":{"quick":"截肢復健「最不適當」:裝義肢「必須等傷口完全癒合後」→過絕對(可早期/臨時義肢)(答B)。","detail":{"background":"同110080-61觀念。殘肢痛(residual limb pain)原因含結構損傷、感染、缺血、神經瘤等(A正確);幻肢痛屬神經病變性疼痛(C正確)、是對已截除肢體仍感疼痛(D正確)。B「裝義肢必須等傷口完全癒合後再開始」過於絕對——現代採早期/術後即時義肢與臨時義肢加速復健,不需一律等到完全癒合。故B最不適當。","options":{"A":"殘肢痛原因含結構傷、感染、缺血、神經瘤→正確。","B":"裝義肢「必須等完全癒合」過絕對(可早期裝配)→此最不適當,即答案。","C":"幻肢痛屬神經病變性疼痛→正確。","D":"幻肢痛是對已截除肢體仍感疼痛→正確。"},"sources":["Braddom PM&R, Amputation rehab; phantom/residual pain"]}},"113020-64":{"quick":"義肢配置「不良因子」不包括「年齡<60歲」;高位截肢、失智/認知障礙、傷口延遲癒合皆為不良因子(答B)。","detail":{"background":"影響義肢配置與使用成功的「不良預後因子」:截肢層級愈高(higher level,如經股骨>膝下,能量耗費大、控制難)、高齡與心肺體能差、合併失智或認知障礙(學習與安全使用困難)、傷口延遲癒合或殘肢狀況不佳、嚴重共病(嚴重周邊動脈疾病、對側肢病變)、平衡差。年齡「小於60歲」屬「較有利」因素,並非不良因子。故不包括者為年齡<60歲。","options":{"A":"高位截肢是不良因子。","B":"年齡<60歲是有利因素,非不良因子→正解(不包括)。","C":"失智/認知障礙是不良因子。","D":"傷口延遲癒合是不良因子。"},"sources":["Braddom PM&R, Prosthetic candidacy factors"]}},"114070-63":{"quick":"截肢敘述「最不適當」:先天缺損「下肢多於上肢」且後天截肢「上肢明顯多於下肢」→錯,先天缺損上肢較多、後天截肢下肢遠多於上肢(答B)。","detail":{"background":"截肢流行病學:先天性肢體缺損以「上肢」較常見(如橈骨側縱向缺損等);後天性截肢則以「下肢遠多於上肢」(因下肢血管疾病/糖尿病佔多數)。上肢截肢以創傷(職業傷害)為主、其中手指截肢最多;近年因重建/再植技術進步與職安改善,外傷性截肢比例逐年下降。故B「先天下肢多於上肢、後天上肢明顯多於下肢」與事實相反→最不適當。","options":{"A":"截肢含先天缺損與後天截肢→正確。","B":"先天上肢較多、後天下肢遠多於上肢,本敘述相反→最不適當,即答案。","C":"上肢截肢以外傷為主、手指截肢最多→正確。","D":"重建再植進步使外傷截肢比例下降→正確。"},"sources":["Braddom PM&R, Amputation epidemiology"]}},"101030-60":{"quick":"內側膝退化性關節炎承重痛→「外側楔形鞋墊(lateral wedge)」把承重外移、減少內側壓力(答A)。","detail":{"background":"內側間室膝退化性關節炎(medial compartment OA)常伴內翻(varus)排列,承重時內側壓力過大致痛。「外側楔形鞋墊(lateral heel/sole wedge)」可使後足輕度外翻、把地面反作用力向量外移,減少膝內側間室負荷與內翻力矩,緩解疼痛(雖長期實證有限但概念上對症)。足弓墊、足跟杯針對足部問題;彈性繃帶僅本體感覺/腫脹輔助,皆非針對內側膝負荷。故答外側楔形鞋墊。","options":{"A":"外側楔形鞋墊減少膝內側間室負荷→正解。","B":"足弓墊針對扁平足,非膝內側負荷。","C":"足跟杯用於足跟痛。","D":"彈性繃帶僅輔助,無法改變膝負荷向量。"},"sources":["Braddom PM&R, Orthotic management of knee OA (lateral wedge)"]}},"102030-65":{"quick":"T10(胸腰段)壓迫性骨折→需限制胸腰椎屈曲伸展的「Knight-Taylor背架(全背架/TLSO型)」(答A)。","detail":{"background":"脊椎背架依控制節段:Knight-Taylor背架(具胸椎墊與肩帶,屬胸腰薦椎矯具TLSO,控制胸腰段屈伸與側彎)適合「胸椎/胸腰段壓迫性骨折」如T10;William背架(腰薦,限制伸展、促屈曲)用於腰椎滑脫/狹窄等需減少伸展者;Knight背架(腰薦LSO,控制腰段)用於下腰段;Milwaukee背架(CTLSO含頸環)用於脊柱側彎。T10壓迫性骨折位置高,需控制胸腰段→Knight-Taylor。","options":{"A":"Knight-Taylor(TLSO)控制胸腰段→適合T10壓迫骨折→正解。","B":"William背架用於腰椎(限伸展促屈曲)。","C":"Knight背架控制下腰段,過低。","D":"Milwaukee背架用於脊柱側彎。"},"sources":["Braddom PM&R, Spinal orthoses (Knight-Taylor for thoracolumbar)"]}},"102110-70":{"quick":"手動輪椅相較電動輪椅的優點=「容易運送(輕、可摺、不需電池)」(答B)。","detail":{"background":"手動vs電動輪椅比較:手動輪椅輕便、可摺疊、易搬運上下車、無需充電與維修電子系統、成本低、且推行可提供運動;缺點是長程易疲勞、需上肢功能、易致上肢反覆勞損。電動輪椅可長程省力、過粗糙地形、適合上肢無力者、減少上肢反覆傷害,但笨重難運送。故「容易運送」是手動輪椅的優點。","options":{"A":"長程不疲勞是電動輪椅優點。","B":"容易運送(輕便可摺)是手動輪椅優點→正解。","C":"穿越粗糙地形是電動輪椅優點。","D":"避免上肢反覆傷害是電動輪椅優點(手動反而易致傷)。"},"sources":["Braddom PM&R, Manual vs power wheelchair"]}},"103030-60":{"quick":"燒燙傷手部抗攣縮擺位「錯誤」者:大拇指置於「掌外展+彎曲」→錯,拇指應「外展+伸展/對掌」位以防虎口攣縮(答D)。","detail":{"background":"燒燙傷手部的「抗攣縮(anti-deformity/intrinsic-plus)」擺位:腕關節略伸展(20-30度)、掌指關節(MCP)屈曲(約70-90度,因MCP副韌帶在屈曲時拉緊,可防MCP伸直攣縮)、指間關節(IP)完全伸直、拇指外展並維持虎口(web space)張開(palmar/radial abduction)以防內收攣縮。本題D「拇指置於掌外展與彎曲(flexion)姿勢」中的「彎曲」不當——拇指應維持外展+伸展/對掌位,而非屈曲。故D錯誤。","options":{"A":"腕略伸展→正確擺位。","B":"指間關節(IP)伸展→正確。","C":"掌指關節(MCP)屈曲→正確(防MCP伸直攣縮)。","D":"拇指應外展+伸展維持虎口,非「彎曲」→此敘述錯誤,即答案。"},"sources":["Braddom PM&R, Burn hand positioning (intrinsic-plus / anti-deformity)"]}},"103030-62":{"quick":"AFO「不」適用者=功能性扁平足;AFO用於足下垂/小腿無力/痙攣(答B)。","detail":{"background":"踝足矯具(AFO)主要適應症:控制足踝動作與穩定——足下垂(drop foot,如腓神經麻痺、中風)、小腿肌肉無力(腦傷/SCI)、下肢痙攣(腦性麻痺equinus)、踝不穩。功能性扁平足(flexible flatfoot)主要以「足部鞋墊(足弓墊/UCBL)」矯正,不需跨踝的AFO。故AFO最不適用功能性扁平足。","options":{"A":"腦傷合併小腿無力→AFO適應症。","B":"功能性扁平足用鞋墊矯正,非AFO→正解(不適用)。","C":"腦性麻痺下肢痙攣(equinus)→AFO適應症。","D":"腓神經麻痺垂足→AFO典型適應症。"},"sources":["Braddom PM&R, AFO indications"]}},"103100-60":{"quick":"小腦中風共濟失調(ataxia)步行訓練→需最大穩定支撐的「助行器(walker)」(答D)。","detail":{"background":"行動輔具依「提供的穩定度/承重」由小到大:手杖(cane,單點)<四腳手杖(quad cane)<腋下/前臂枴杖<助行器(walker,四點接觸最穩)。小腦病變共濟失調的核心問題是「平衡與協調差、步態不穩」,需提供「最大穩定基底」的助行器(尤其有輪式或標準walker提供寬大支撐基底)。故選助行器。","options":{"A":"手杖穩定度最低,不足以應付共濟失調。","B":"腋下枴杖需良好協調操作,對共濟失調不利。","C":"四腳手杖穩定度中等,仍不及助行器。","D":"助行器提供最大支撐基底→共濟失調最恰當→正解。"},"sources":["Braddom PM&R, Ambulation aids for ataxia (walker)"]}},"104030-59":{"quick":"腋下柺杖使用不當壓迫腋窩→傷「橈神經」(crutch palsy,垂腕)(答B)。","detail":{"background":"腋下柺杖(axillary crutch)正確使用應以「手」承重、腋墊與腋窩間留約2-3指寬,避免以腋窩直接壓在柺墊上。若以腋窩承重(使用不當)會壓迫腋窩內走行的臂神經叢與「橈神經」,造成「柺杖麻痺(crutch palsy)」——以橈神經受損為主,出現垂腕、伸腕伸指無力。故答橈神經。","options":{"A":"腋神經支配三角肌,非柺杖壓迫主神經。","B":"橈神經(腋窩受壓)→crutch palsy垂腕→正解。","C":"正中神經非腋窩受壓主神經。","D":"尺神經非腋窩柺杖壓迫主神經。"},"sources":["Braddom PM&R, Crutch palsy (radial nerve)"]}},"104030-61":{"quick":"中風AFO「不是」最主要目的者:增加踝背屈「肌力」→錯,AFO是外部支撐代償,不會增加肌力(答A)。","detail":{"background":"中風步行訓練用AFO的主要目的:防止足下垂(drop foot)、控制擺盪期足廓清與站立期穩定、矯正/預防蹠屈攣縮(equinus)、提供踝穩定改善步態與安全。AFO是「被動外部支撐」,代償無力或痙攣,本身「不會增加踝背屈肌力」(肌力靠主動運動訓練而非穿戴矯具)。故A非AFO主要目的。","options":{"A":"AFO是外部支撐,不會增加背屈肌力→正解(非目的)。","B":"防止足下垂→AFO主要目的。","C":"矯正/預防蹠屈攣縮→AFO目的。","D":"本題「提供足弓著地穩定」與防垂足等屬AFO作用。(註:正解為增加肌力)"},"sources":["Braddom PM&R, AFO purposes in stroke gait"]}},"105020-61":{"quick":"類風濕關節炎「鈕扣孔變形(boutonnière)」矯正最常用=環形(三點固定)輔具(ring/Silver Ring orthosis)(答B)。","detail":{"background":"手指變形矯具:鈕扣孔變形(boutonnière deformity,近端指間關節PIP屈曲+遠端指間關節DIP過伸,因中央腱束斷裂)→用「環形矯具(ring orthosis,如銀環指夾,三點壓力使PIP伸直)」矯正;天鵝頸變形(swan-neck,PIP過伸+DIP屈曲)也常用環形矯具(限制PIP過伸)。豎腕副木(cock-up)用於垂腕;休息position副木用於急性發炎全手休息;C-bar維持虎口。故boutonnière→環形輔具。","options":{"A":"豎腕副木用於腕下垂(橈神經)。","B":"環形輔具矯正鈕扣孔變形→正解。","C":"休息位副木用於急性發炎全手休息。","D":"C-bar維持拇指虎口外展。"},"sources":["Braddom PM&R, Finger orthoses for RA deformities (ring orthosis)"]}},"105100-58":{"quick":"提供「最大身體承重」的行走輔具=腋下柺杖(axillary crutch)(答B)。","detail":{"background":"行走輔具的「可承重(off-loading)能力」:腋下柺杖(axillary crutch)可承受最大體重轉移(雙柺可達近全部體重,適合下肢完全不能負重者),其次前臂柺杖、助行器(提供穩定但承重不如雙腋柺)、手杖(僅約體重20-25%)。注意:助行器提供最大「穩定度」但腋下柺杖提供最大「承重轉移」。本題問「最大身體承重」→腋下柺杖。","options":{"A":"手杖僅小幅承重。","B":"腋下柺杖提供最大身體承重轉移→正解。","C":"前臂柺杖承重次於腋下柺杖。","D":"助行器提供最大穩定,但承重不如雙腋柺。"},"sources":["Braddom PM&R, Ambulation aids weight-bearing capacity"]}},"105100-60":{"quick":"股四頭肌無力+膝OA要「站立時完全伸展(穩定膝)」,「最不合適」者=HKAFO(過度跨到髖,非必要)(答D)。","detail":{"background":"股四頭肌無力者站立時膝易屈曲打軟(buckling),需矯具提供「膝關節伸直穩定」:膝矯具(KO)或膝踝足矯具(KAFO,鎖膝於伸直)可達此目的;Scott-Craig KAFO是為截癱者設計、可站立行走的KAFO。要控制「膝」穩定,跨到「髖」的「髖膝踝足矯具(HKAFO)」過度且累贅、非必要——HKAFO用於需控制髖部(如高位截癱、髖不穩),對單純膝無力者最不合適。故答HKAFO。","options":{"A":"膝矯具可提供膝伸直穩定→合適。","B":"KAFO鎖膝伸直→合適。","C":"Scott-Craig KAFO可站立行走→合適。","D":"HKAFO跨到髖,對單純膝無力過度累贅→最不合適,正解。"},"sources":["Braddom PM&R, Lower limb orthoses (KO/KAFO/HKAFO)"]}},"106020-62":{"quick":"對頭頸椎活動限制「最差」=軟式頸圈(soft collar)(答B)。","detail":{"background":"頸椎矯具限制活動度由弱到強:軟式頸圈(soft collar,主要提供本體感覺提醒與保暖,幾乎不限制動作)<硬式頸圈(Philadelphia collar,限制屈伸尚可)<四柱式(4-poster)/SOMI支架(加強限制)<暈輪式背心(halo vest,剛性最強、限制最完全,用於不穩定頸椎骨折)。故限制效果「最差」者為軟式頸圈。","options":{"A":"費城頸圈限制屈伸中等。","B":"軟式頸圈幾乎不限制活動→最差,正解。","C":"四柱式支架限制較強。","D":"暈輪式背心限制最強。"},"sources":["Braddom PM&R, Cervical orthoses (immobilization hierarchy)"]}},"106080-70":{"quick":"「不適用」小型鍵盤者=上肢顫抖(tremor)者;顫抖者需「大鍵+鍵盤護板/keyguard」以免誤觸(答B)。","detail":{"background":"電腦輔助科技的鍵盤調整:小型(縮小)鍵盤適合「上肢關節活動範圍受限者」(縮短手移動距離)、口含筆(mouth stick)操作者、單手打字者(集中按鍵)。但「上肢顫抖(tremor)」者用小鍵盤反而易誤觸鄰鍵——應用「較大鍵距鍵盤+鍵盤護板(keyguard)、延遲接受(filter keys)」來提高準確。故小型鍵盤不適用顫抖者。","options":{"A":"關節活動受限者用小鍵盤縮短移動→適用。","B":"上肢顫抖者用小鍵盤易誤觸→不適用,正解。","C":"口含筆操作者用小鍵盤集中→適用。","D":"單手打字者用小鍵盤集中按鍵→適用。"},"sources":["Braddom PM&R, Assistive technology (keyboard adaptations)"]}},"107020-60":{"quick":"上肢裝具「不是」常見目的者:提供無力肌肉的「肌力訓練」→矯具是支撐/保護/防變形,不訓練肌力(答A)。","detail":{"background":"上肢矯具(upper limb orthotics)的常見目的:限制活動或受力以保護受傷/患病部位、預防變形或矯正攣縮、替代喪失功能或增進功能(如tenodesis splint、連接副木輔助ADL)、固定不穩定關節。矯具屬「外部被動支撐」,不能「訓練無力肌肉的肌力」(肌力需主動運動)。故A非矯具目的。","options":{"A":"矯具不提供肌力訓練(被動支撐)→正解(非目的)。","B":"限制活動/受力以保護→是目的。","C":"預防變形/矯正攣縮→是目的。","D":"連接輔具增進ADL功能→是目的。"},"sources":["Braddom PM&R, Goals of upper limb orthoses"]}},"107020-61":{"quick":"脊椎裝具「不適當」適應症:強化核心肌力→裝具是外部支撐,不會強化腹背核心肌力(反而長期穿戴可能致肌肉廢用)(答C)。","detail":{"background":"脊椎矯具(spinal orthoses)常見適應症:骨折或術後穩定脊柱、限制脊椎動作以減痛(扭傷/疼痛)、支撐姿勢與預防/矯正變形(如脊柱側彎)。脊椎矯具屬外部被動支撐,「不能強化腹肌背肌的核心肌力」——核心肌力需主動運動訓練,且長期依賴背架反而可能造成軀幹肌肉廢用弱化。故C不適當。","options":{"A":"骨折/術後穩定脊柱→適當適應症。","B":"限制動作減痛→適當。","C":"強化核心肌力非裝具能達成(被動支撐)→不適當,正解。","D":"支撐姿勢、防變形→適當。"},"sources":["Braddom PM&R, Indications for spinal orthoses"]}},"107080-61":{"quick":"T12(胸腰段)壓迫性骨折→「全背架(Knight-Taylor/TLSO)」最合適(答A)。","detail":{"background":"同102030-65。T12位於胸腰交界,壓迫性骨折需控制胸腰段屈伸與側彎,用「Knight-Taylor全背架(TLSO型,含胸椎墊與肩帶)」或Jewett過伸背架。短腰背架(Knight,LSO)控制下腰段、束腹(corset)僅軟性支撐減痛、Milwaukee用於脊柱側彎,皆不適合控制胸腰段骨折。故答全背架。","options":{"A":"全背架(Knight-Taylor/TLSO)控制胸腰段→T12壓迫骨折最合適→正解。","B":"短腰背架控制下腰段,過低。","C":"束腹僅軟性支撐,穩定不足。","D":"Milwaukee背架用於脊柱側彎。"},"sources":["Braddom PM&R, Thoracolumbar orthoses (Knight-Taylor for T12)"]}},"108030-61":{"quick":"助行器敘述「錯誤」:助行器「只能提供力量支撐、無法提供感覺回饋」→錯,助行器也提供本體感覺/平衡回饋(答B)。","detail":{"background":"助行器(walker)是提供最大穩定度的步行輔具,目的含:改善平衡、重新分配下肢承重(off-loading)、減少下肢疼痛、提供「本體感覺與安全的回饋」(可視為上肢的延伸,增加感覺輸入幫助平衡)。選擇何種助行器取決於所需平衡能力與承重協助。故B「無法提供感覺回饋」錯誤——助行器確實提供感覺/平衡回饋。","options":{"A":"助行器可改善平衡、分配承重、減痛→正確。","B":"助行器「無法提供感覺回饋」→錯誤(它提供本體感覺/平衡回饋),即答案。","C":"依平衡與承重需求選擇助行器→正確。","D":"助行器可視為上肢延伸→正確。"},"sources":["Braddom PM&R, Walkers (provide proprioceptive feedback)"]}},"110020-66":{"quick":"燒燙傷矯具敘述「錯誤」:腋下燒傷用飛機副木維持「內收」→錯,飛機副木(airplane splint)是維持肩「外展約90度」以防腋下攣縮(答D)。","detail":{"background":"燒燙傷後肢體傾向擺在「屈曲/內收」的舒適但易攣縮位(A正確);矯具目的在維持抗攣縮位、避免關節攣縮變形(B正確);壓力衣可抑制肥厚性疤痕增生(C正確)。腋下(腋窩)燒傷易致肩內收攣縮,須以「飛機副木(airplane splint)」把肩維持「外展(約90度)+些微前屈」以「拉開腋窩、防止內收攣縮」。故D說「維持內收姿勢」與目的相反→錯誤(應為外展)。","options":{"A":"燒傷後肢體喜歡屈曲舒適位→正確。","B":"矯具目的避免攣縮變形→正確。","C":"壓力衣抑制肥厚疤痕→正確。","D":"飛機副木是維持肩「外展」(非內收)→此敘述錯誤,即答案。"},"sources":["Braddom PM&R, Burn orthoses (airplane splint = abduction)"]}},"111020-64":{"quick":"AFO敘述「不適當」:行走時「不會影響距骨下關節活動」→錯,AFO跨越踝與距下關節,會限制其內外翻動作(答C)。","detail":{"background":"踝足矯具(AFO)是「最常被使用的下肢矯具」,用來控制足踝動作(背屈/蹠屈與內外翻)、穩定踝關節、改善垂足與站立期膝穩定(透過調整地面反作用力向量可間接穩定膝)。AFO跨越踝關節與距骨下關節(subtalar joint),會「限制距下關節的內外翻動作」。故C「不會影響距骨下關節活動」錯誤(AFO確實會影響/限制距下關節)。","options":{"A":"AFO用來控制足踝動作→正確。","B":"AFO是最常用的下肢矯具→正確。","C":"AFO「不會影響距下關節」→錯誤(會限制距下內外翻),即答案。","D":"AFO可透過力學間接穩定膝關節→正確。"},"sources":["Braddom PM&R, AFO biomechanics (affects subtalar motion)"]}},"111020-70":{"quick":"手動輪椅後輪外傾(camber)的「非」優點:避免輪胎不均勻磨損→錯,camber反而使輪胎接觸面斜、增加不均勻磨損(答A)。","detail":{"background":"手動輪椅後輪外傾角(camber,後輪上窄下寬)的優點:增加「側向穩定度(下方輪距變寬)」、過窄門時手部位置內收受保護不易擦傷、推行時手臂較接近身體可減少肩外展角度與省力、轉向靈活。缺點:整體輪椅變寬、輪胎接觸地面角度傾斜「易造成不均勻磨損」、增加滾動阻力。故「避免輪胎不均勻磨損」並非camber的優點(反而是缺點)→答A。","options":{"A":"camber反致輪胎不均勻磨損,非優點→正解。","B":"過窄門保護雙手→camber優點。","C":"減少肩外展角度→camber優點。","D":"增加側向穩定度→camber優點。"},"sources":["Braddom PM&R, Wheelchair camber angle"]}},"112020-70":{"quick":"無障礙環境評估「最不適當」:只有復健科醫師方可評估→錯,職能/物理治療師等團隊皆可進行(答D)。","detail":{"background":"住家無障礙環境評估與介入由「跨專業團隊」進行,尤以「職能治療師」最常負責居家評估(辨識妨礙或支持日常活動的環境因素、預防意外、提升安全舒適與生活品質、依需求改造)。其評估與介入並非僅限復健科醫師。深化:居家無障礙評估範圍含出入口/門寬、地面平整與防滑、照明、扶手(浴廁/樓梯)、廚浴高度與動線、緊急呼叫、輪椅迴轉半徑(直徑約150cm)、坡道斜率(1:12)等;評估應在「出院前」即規劃以便返家可用,並考量病人身體尺寸、經濟能力與家屬期待。理論架構為ICF(身體功能、活動、參與與環境因子),強調以環境改造支持病人最大獨立與社會參與。","options":{"A":"辨識妨礙/支持日常活動的環境因素→正確。","B":"預防住宅意外→正確目的。","C":"提升安全舒適與生活品質→正確目的。","D":"「只有復健科醫師可評估」→錯誤(職能/物理治療師等團隊皆可),即答案。"},"sources":["Braddom PM&R, Home accessibility assessment (interdisciplinary)"]}},"112080-71":{"quick":"輪椅扶手敘述「最不適當」:扶手高度與「推動施力難易無關」→錯,扶手高度會影響推行時肩部姿勢與施力效率(答B)。","detail":{"background":"輪椅扶手(armrest):高度定義為手肘屈曲90度時座椅面到前臂下緣的距離;高度設定影響上肢支撐與推行姿勢——太低無法提供上肢/肩適當支撐、易駝背;太高則推手推圈時肩過度外展易致肩關節傷害。故扶手高度「與施力難易『有關』」。B說「無關」錯誤。","options":{"A":"扶手高度定義(肘屈90度時座面到前臂)→正確。","B":"扶手高度與推動施力難易「無關」→錯誤(有關),即答案。","C":"手臂越過扶手致肩過度外展可傷肩→正確。","D":"扶手太低無法提供上肢肩支撐→正確。"},"sources":["Braddom PM&R, Wheelchair armrest"]}},"113070-69":{"quick":"無障礙環境評估「最不適當」:須「出院返家後」才評估→錯,應在出院「前」即評估規劃,使返家即可安全使用(答A)。","detail":{"background":"無障礙環境評估時機:應在病人「出院之前(住院期間)」即進行居家環境評估與改造規劃(可由家屬提供照片/丈量、家訪),使病人返家當下即有安全可用的環境,而非等返家後出問題再補救。評估項目含病人身體尺寸(身高體重寬度手腳長)、經濟能力、病人與家屬對生活照顧的期待。故A「需出院返家後才評估」最不適當。","options":{"A":"評估應在出院「前」進行(非返家後)→最不適當,即答案。","B":"病人身體尺寸是評估項目→正確。","C":"須考量經濟能力→正確。","D":"須了解病人/家屬期待→正確。"},"sources":["Braddom PM&R, Pre-discharge home evaluation"]}},"113070-70":{"quick":"輪椅訂製「最不適當」:使用者心肺功能「非」評估項目→錯,推行手動輪椅耗能,心肺功能是評估項目(答A)。","detail":{"background":"輪椅訂製需綜合評估:使用者體型與關節活動度(髖膝踝)、肌力與動作協調(手控/頭控介面選擇)、皮膚狀況(神經性疾病/感覺缺損者需防壓瘡的座墊)、平衡與軀幹控制、認知、生活環境與「心肺耐力」(推行手動輪椅是有氧負荷,心肺功能差者可能需電動輪椅)。故A說「心肺功能非評估項目」錯誤。","options":{"A":"心肺功能「非評估項目」→錯誤(推行耗能,需評估),即答案。","B":"神經性疾病者觀察皮膚狀況(防壓瘡)→正確。","C":"手協調差者用頭控輪椅→正確。","D":"髖膝踝關節活動度是評估項目→正確。"},"sources":["Braddom PM&R, Wheelchair prescription factors"]}},"114020-70":{"quick":"無障礙介入「最不適當」:常用必需品放「地板上」→錯,應放在易取的腰-肩高度,放地板增加彎腰跌倒風險(答A)。","detail":{"background":"無障礙環境/省力原則:常用物品應放在「方便取用的高度(約腰到肩之間)」,避免過低(彎腰)或過高(伸取失衡)。把常用必需品放「地板上」會增加彎腰、蹲取與跌倒風險,對下肢無力/平衡差者尤其危險→最不適當。加寬門、樓梯與馬桶旁加裝扶手皆為適當介入。","options":{"A":"常用必需品放地板上增加彎腰跌倒風險→最不適當,即答案。","B":"加寬出入口門→適當。","C":"樓梯加扶手→適當。","D":"馬桶旁加扶手助獨立如廁→適當。"},"sources":["Braddom PM&R, Home modification principles"]}},"114020-71":{"quick":"輪椅敘述「最適當」:使用手動輪椅要注意造成肩關節的傷害(反覆推行致肩部過度使用)(答B)。","detail":{"background":"手動輪椅使用者長期反覆推行,肩關節承受高負荷與反覆動作,易致肩袖肌腱病變/夾擠等「過度使用傷害」,須注意保護(正確推行技巧、調整輪軸、座椅設定)。選項辨析:C5脊髓損傷者「可」用特製手動輪椅(非完全無法);中風偏癱者「可」用單手單腳驅動的半側式輪椅(非無法);後輪手推圈直徑「越大越省力」(非越小越好)。故最適當為B(注意肩關節傷害)。","options":{"A":"C5 SCI可用特製手動輪椅,非完全無法→不正確。","B":"手動輪椅推行易致肩關節過度使用傷害→正解。","C":"中風偏癱者可用單手操控輪椅,非無法→不正確。","D":"手推圈直徑越大越省力,非越小越好→不正確。"},"sources":["Braddom PM&R, Manual wheelchair (shoulder overuse)"]}},"114070-71":{"quick":"中風可獨立行走者的居家改造「最不適當」:要求家屬辭職/請看護全程照顧→與病人能獨立、家屬要上班的需求相違(答A)。","detail":{"background":"本題以個案為導向(中風左偏癱、能自行走但偶絆倒、ADL僅需監督/輕度協助、希望自理洗澡如廁與用微波爐、家屬要上班)。復健環境改造應「支持其獨立」:去除不平地毯減少絆倒(B)、浴室/馬桶旁裝扶手(C)、樓梯兩側扶手並在每階前緣漆白漆增加辨識(D)——皆適當。A建議「家屬不應讓他獨處、應請看護或辭職在家照顧」與病人「能獨立、家屬希望上班」的目標相違、過度保護、剝奪自主→最不適當。","options":{"A":"要求家屬辭職/請看護全程照顧,違背病人可獨立與家屬上班需求→最不適當,即答案。","B":"去除不平地毯減少絆倒→適當。","C":"浴廁裝扶手→適當。","D":"樓梯扶手+階緣漆白增辨識→適當。"},"sources":["Braddom PM&R, Patient-centered home modification"]}},"115020-70":{"quick":"省力/工作簡化原則「不是」者:常用物品放「離病人較遠以讓他多行動」→錯,工作簡化應把常用物品放「最近、最易取」(答A)。","detail":{"background":"省力與工作簡化(energy conservation & work simplification)原則:常用物品放在「最近、最易取得」處以減少移動與耗能;善用槓桿與重力省力;在關節中立位(neutral position)下執行活動以減少負荷;以機械/設備取代人力;安排休息、坐著工作、減少不必要步驟。A把常用物品放「較遠以讓病人多行動復健」違反工作簡化(那是運動訓練目標,非省力原則)→不是省力原則。","options":{"A":"常用物品放遠以多行動,違反省力簡化→正解(不是)。","B":"用槓桿與重力省力→是原則。","C":"在中立位執行活動→是原則。","D":"用機械取代人力→是原則。"},"sources":["Braddom PM&R, Energy conservation / work simplification"]}},"115020-71":{"quick":"輪椅敘述「最不適當」:椅背高度落在「肩胛骨上緣」有利上身活動→錯,椅背過高至肩胛上緣會限制肩胛與上肢活動,應落在肩胛下緣(答D)。","detail":{"background":"輪椅設定:全身痙攣強/軀幹控制差的腦性麻痺者,傳統輪椅支撐不足、宜用特製擺位輪椅(A正確);C5者於手推圈加橡膠/突起握把利自行推動(B正確);大輪一般22-26吋,過大對上肢活動差者較費力(C正確)。關於椅背高度:主動推行者椅背應落在「肩胛骨下緣以下」,讓肩胛與上肢有足夠活動空間以利推行;若椅背高至「肩胛骨上緣」會卡住肩胛、「妨礙(而非有利)」上身與上肢活動。故D錯誤。","options":{"A":"痙攣強/軀幹差的CP宜用特製擺位輪椅→正確。","B":"C5者手推圈加握把利推動→正確。","C":"大輪22-26吋,過大對上肢差者費力→正確。","D":"椅背高至肩胛上緣會妨礙(非有利)上身活動→此敘述最不適當,即答案。"},"sources":["Braddom PM&R, Wheelchair seating (backrest height)"]}},"115020-61":{"quick":"輪椅敘述「最不適當」:後輪輪軸「偏後」更省力且防肩傷→錯,輪軸偏「前」(靠近肩部下方)才省力且減少肩部負荷(答B)。","detail":{"background":"手動輪椅力學:偏癱者無法雙手同時抓兩側手推圈,適合「單手操控(同側手腳驅動/雙手推圈聯動)」輪椅(A正確);上肢無法推行者可用「足驅動」輪椅(C正確);同重量下後輪手推圈直徑「越大越省力」(D正確)。關於後輪「輪軸位置」:輪軸往「前」移(更接近使用者肩部正下方)可縮短推行時手臂伸展、增加每次推行的有效角度與效率、減少肩部過度伸展負荷而「省力且保護肩關節」;輪軸偏「後」反而推行費力、肩部負荷大、但較不易後翻(穩定)。故B「輪軸偏後更省力且防肩傷」錯誤(應為偏前)。","options":{"A":"偏癱者適合單手操控輪椅→正確。","B":"後輪輪軸「偏後」更省力防肩傷→錯誤(偏前才省力護肩),即答案。","C":"上肢無法推行者可用足驅動輪椅→正確。","D":"手推圈直徑越大越省力→正確。"},"sources":["Braddom PM&R, Wheelchair rear axle position (anterior = efficient)"]}},"101030-70":{"quick":"乳癌術後肩復健「錯誤」:術後疼痛「立即」做患側肩「主動」全活動→錯,應在傷口/引流允許下「漸進」被動到主動,不可立即劇烈主動以免裂開(答B)。","detail":{"background":"乳癌乳房切除(尤合併腋下淋巴廓清)後易致患側肩活動度受限與淋巴水腫;手術範圍越大、肩活動度越易受影響(A正確);復健原則是「循序漸進」增加肩活動角度(C正確),傷口癒合後不需特別限制(D正確)。但術後早期(引流管未拔、傷口未癒)應做「輕度、漸進的被動/輔助運動」,不可「立即做患側肩主動全範圍運動以解除疼痛」——過早劇烈主動運動會牽扯傷口致裂開、積液、影響癒合。故B錯誤。","options":{"A":"手術範圍越大肩活動度越受影響→正確。","B":"術後「立即」做患側肩主動全活動→錯誤(應漸進),即答案。","C":"肩活動角度應逐漸增加→正確。","D":"傷口癒合後不需特別限制→正確。"},"sources":["Braddom PM&R, Post-mastectomy shoulder rehabilitation"]}},"102030-59":{"quick":"急性腰椎間盤突出伴坐骨神經痛的復健→「下背熱敷+骨盆牽引(pelvic traction)」最適合(答A)。","detail":{"background":"腰椎間盤突出(HIVD)壓迫神經根致下背痛合併下肢放射麻痛(坐骨神經痛)。復健保守治療:相對休息、止痛、衛教姿勢、核心運動;物理治療中「熱敷(淺層熱)緩解肌肉痙攣+骨盆牽引(pelvic traction)」可暫時減少椎間盤壓力、放鬆椎旁肌、緩解神經根壓迫症狀,常用於急性HIVD。電刺激、超音波、水療為輔助、非首選對症。故選熱敷+骨盆牽引。","options":{"A":"熱敷+骨盆牽引→緩解HIVD神經根壓迫→正解。","B":"電刺激僅輔助止痛。","C":"超音波(深層熱)用於局部軟組織,非HIVD首選。","D":"水療為輔助運動環境,非對症。"},"sources":["Braddom PM&R, Lumbar disc herniation conservative treatment (traction)"]}},"102030-61":{"quick":"肩外展痛+夜間痛+外展肌力降+X光1cm白斑→棘上肌「鈣化性肌腱炎」(calcific supraspinatus tendinitis)(答C)。","detail":{"background":"肩痛鑑別:鈣化性肌腱炎(calcific tendinitis)好發棘上肌,X光可見肌腱內鈣化白斑(本題1cm白斑),急性期劇痛、夜間加重、外展時痛(60-120度疼痛弧)。黏連性關節囊炎(冰凍肩)以「被動」活動度全面受限為特徵(本題被動屈曲正常,不符);旋轉肌撕裂以無力與特定誘發測試陽性、X光不一定有鈣化;二頭肌肌腱炎痛在肱二頭肌溝。本題X光鈣化白斑+外展痛+夜間痛→鈣化性肌腱炎。","options":{"A":"冰凍肩以被動活動度全面受限為主,本題被動屈曲正常,不符。","B":"旋轉肌撕裂無典型鈣化白斑。","C":"棘上肌鈣化性肌腱炎(X光鈣化白斑)→正解。","D":"二頭肌肌腱炎痛在二頭肌溝,無鈣化。"},"sources":["Braddom PM&R, Calcific tendinitis of shoulder"]}},"102030-62":{"quick":"跳躍者膝(jumpers knee)=髕肌腱炎(patellar tendinitis)(答B)。","detail":{"background":"跳躍者膝(jumpers knee)是反覆跳躍(籃球、排球)造成的「髕骨肌腱病變/肌腱炎(patellar tendinopathy)」,痛點在髕骨下緣髕腱起點,跳躍/起跳落地時加重。髕骨軟化症是髕骨後軟骨退化(膝前痛、上下樓痛);ACL裂傷與半月板破裂為外傷性。故跳躍者膝=髕肌腱炎。","options":{"A":"髕骨軟化症是髕後軟骨退化,非跳躍者膝。","B":"髕肌腱炎(patellar tendinitis)=jumpers knee→正解。","C":"ACL裂傷為外傷扭轉傷。","D":"半月板破裂為扭轉/退化傷。"},"sources":["Braddom PM&R, Patellar tendinopathy (jumpers knee)"]}},"103030-63":{"quick":"「不屬於」旋轉肌袖(rotator cuff)者=肱二頭肌(biceps);旋轉肌袖=棘上、棘下、小圓、肩胛下肌(SITS)(答A)。","detail":{"background":"旋轉肌袖(rotator cuff)由四條肌肉組成,記憶為SITS:棘上肌(Supraspinatus,外展起始)、棘下肌(Infraspinatus,外旋)、小圓肌(Teres minor,外旋)、肩胛下肌(Subscapularis,內旋)。它們穩定肱骨頭於肩盂。肱二頭肌(biceps brachii)是上臂屈肌、其長頭通過肩關節但「不屬於旋轉肌袖」。故答肱二頭肌。","options":{"A":"肱二頭肌不屬旋轉肌袖→正解。","B":"棘上肌是旋轉肌袖成員。","C":"棘下肌是旋轉肌袖成員。","D":"肩胛下肌是旋轉肌袖成員。"},"sources":["Anatomy; Rotator cuff = SITS muscles"]}},"103100-61":{"quick":"退化性關節炎復健最正確:好發承重關節,病人應避免提重物(減少關節負荷)(答B)。","detail":{"background":"退化性關節炎(骨關節炎OA)是關節軟骨退化、好發於「承重關節(膝、髖)」與手部DIP/PIP/拇指腕掌關節。復健治療目標是「減痛、維持/改善活動度與肌力、保護
