A":"準備病人單位及所需設備","B":"迎接新病人,給予入院護理","C":"提醒病人住院不習慣時可以轉出之醫院","D":"協助病人財物的處理"},"img":""},{"id":"112180-N2-48","code":"112180","roc":"112","cat":"N2","catname":"基本護理學與護理行政","num":48,"stem":"有關問題解決的過程,下列敘述何者正確?","opts":{"A":"問題發生時,應單刀直入針對最大問題立即處理","B":"透過團隊腦力激盪,評估各方案優缺點再做選擇","C":"為達問題解決的目標,不須回應護理同仁的疑問","D":"方案評值時只要達成目標,無須再調整解決步驟"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"7護理功能角色出院計畫與其他","topic_code":"B1-7","q_num":48,"roc_year":"112","exam_code":"112180","src":"民國112年","options":{"A":"問題發生時,應單刀直入針對最大問題立即處理","B":"透過團隊腦力激盪,評估各方案優缺點再做選擇","C":"為達問題解決的目標,不須回應護理同仁的疑問","D":"方案評值時只要達成目標,無須再調整解決步驟"},"img":""},{"id":"113180-N2-43","code":"113180","roc":"113","cat":"N2","catname":"基本護理學與護理行政","num":43,"stem":"下列何項屬於護理時數中的直接護理項目?","opts":{"A":"書寫護理紀錄","B":"準備小量針劑","C":"與病人及家屬會談","D":"通知醫師病人病情"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"7護理功能角色出院計畫與其他","topic_code":"B1-7","q_num":43,"roc_year":"113","exam_code":"113180","src":"民國113年","options":{"A":"書寫護理紀錄","B":"準備小量針劑","C":"與病人及家屬會談","D":"通知醫師病人病情"},"img":""},{"id":"115030-N2-37","code":"115030","roc":"115","cat":"N2","catname":"基本護理學與護理行政","num":37,"stem":"某護理師本月工作180小時,月薪45,000元。今天使用90分鐘寫護理紀錄,估計該項活動花費護理 人力成本多少元?","opts":{"A":"250","B":"375","C":"425","D":"500"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"7護理功能角色出院計畫與其他","topic_code":"B1-7","q_num":37,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"250","B":"375","C":"425","D":"500"},"img":""}],E={"101030-N2-7":{"quick":"開始期重點是建立信任感、協助接受診斷檢查,「促使接受疾病事實」是接受期任務。","detail":{"background":"疾病病程心理反應常分三期:開始期(transition,病人剛得知患病,充滿震驚、否認、焦慮,護理重點為建立信任關係、提供安全感、協助接受必要檢查與診斷,而非急於要病人「接受疾病事實」);接受期(acceptance,病人承認生病並願配合,最適合鼓勵其參與護理計畫、學習自我照顧);恢復期(convalescence,著重恢復獨立、教導自我照顧能力與出院準備)。各期護理重點需對應病人心理階段,過早要求接受易引發抗拒。","options":{"A":"正確。開始期病人焦慮震驚,首要是建立信任、給予支持。","B":"錯誤(本題答案)。促使病人「接受疾病事實」是接受期的任務,開始期過早施加易引發否認與抗拒。","C":"正確。接受期病人願配合,最適合鼓勵參與護理計畫。","D":"正確。教導自我照顧、為獨立做準備是恢復期重點。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"102110-N2-4":{"quick":"病人主動關心檢查結果與用藥、配合治療=已承認生病並積極處理→接受期。","detail":{"background":"依疾病病程心理分期,黃先生「非常注意身體變化、主動詢問檢查結果與用藥情形」顯示他已承認患病事實並積極參與自身照護,屬接受期(acceptance stage)的典型表現。開始期病人多否認逃避;接受期病人面對疾病、配合並主動求知;恢復期著重恢復功能與獨立。主動關注病情與治療正是接受期「願意配合、參與決策」的特徵。","options":{"A":"開始期病人多震驚否認,不會主動深入關切治療。","B":"正確(本題答案)。主動關注檢查與用藥=接受並積極處理疾病。","C":"恢復期重點在恢復獨立功能,非僅關注檢查結果。","D":"復健期著重殘障功能重建,與此情境不符。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"106111-N2-6":{"quick":"「請告訴我生病後如何照顧自己」=願面對並學習自我照顧→接受期。","detail":{"background":"接受期(acceptance)病人已承認患病、情緒趨穩,願意主動學習自我照顧與配合治療。選項C「護理師你可以告訴我生病後應該如何照顧自己」正是面對疾病、尋求知識的接受期語言。A「為什麼是我」為憤怒;B「上帝處罰」屬磋商/罪惡感;D「沒什麼好說、不要再問」為否認退縮,皆非接受期。","options":{"A":"「為什麼是我」是憤怒期(anger)反應。","B":"歸因為上帝處罰屬磋商或罪惡感,非接受。","C":"正確(本題答案)。主動求問如何自我照顧=接受疾病。","D":"拒絕談論為否認/退縮防衛。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"112180-N2-3":{"quick":"開始期是建立信任、協助接受檢查,「儘速讓病人接受疾病事實」最不適當。","detail":{"background":"疾病病程三階段理論:開始期(過渡期)病人剛面臨疾病,充滿不確定與焦慮,護理重點是與病人及家屬建立信任感、提供心理支持與安全感,而非「儘速讓病人接受疾病事實」(過早強迫接受會引發抗拒);接受期鼓勵病人參與照護計畫;恢復期加強自我照顧能力。選項A把接受期任務錯置到開始期,故最不適當。","options":{"A":"最不適當(本題答案)。開始期不應急於要病人接受疾病,首重建立信任。","B":"正確。開始期與病人、家屬建立信任感。","C":"正確。接受期鼓勵參與護理計畫。","D":"正確。恢復期加強自我照顧。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"110110-N2-16":{"quick":"乳癌化療中主動關心血液檢查結果、配合治療→接受期。","detail":{"background":"張女士因乳癌住院化療,「非常關心血液檢查結果」顯示她已面對疾病並積極參與治療監測,屬接受期。化療期病人需配合監測白血球等血球數值以評估骨髓抑制,病人主動關注代表願意配合與學習,符合接受期「面對並處理」的特徵。病程心理:接受期病人面對疾病、主動求知與配合治療(關心血球數值以監測化療骨髓抑制);開始期多否認震驚,恢復期著重功能恢復與出院準備。","options":{"A":"開始期多震驚否認,不會主動關注數據。","B":"正確(本題答案)。主動關心檢查結果=接受並參與治療。","C":"恢復期著重功能恢復與出院準備。","D":"結束期非疾病病程分期之標準用語。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"103030-N2-7":{"quick":"壓力程度與致病性呈「正相關」(壓力愈大愈易致病),非負相關。","detail":{"background":"壓力與疾病關係:個體感受的壓力程度與致病性呈正相關(壓力愈大愈易致病);壓力源持續愈久、嚴重度愈高愈可能致病;且短時間內累積許多微小壓力源(生活改變單位LCU)也可能致病。Selye壓力學說與Holmes-Rahe生活壓力量表皆支持此觀點。選項A稱「呈負相關」與事實相反,為錯誤敘述。","options":{"A":"錯誤(本題答案)。壓力程度與致病性呈正相關,非負相關。","B":"正確。累積微小壓力源(LCU)也可能致病。","C":"正確。壓力源持續愈久愈易致病。","D":"正確。壓力源愈嚴重愈易致病。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"109030-N2-2":{"quick":"壓力源性質與致病性「有關」(性質、強度、持續時間都影響),非無關。","detail":{"background":"壓力與疾病:壓力愈大愈可能致病、個體感受壓力程度與致病性呈正相關、短時間累積微小壓力源也可能致病;且壓力源的「性質」(如可控性、可預測性、是否威脅生命)亦影響致病性。選項B稱「壓力源性質與致病性無關」錯誤——性質正是影響因子之一。重點:壓力源的性質(可控性、可預測性、是否威脅生命)、強度與持續時間皆影響致病性;個體感受壓力程度與致病性呈正相關,累積微小壓力源也可能致病。","options":{"A":"正確。壓力愈大愈易致病。","B":"錯誤(本題答案)。壓力源性質與致病性有關。","C":"正確。感受壓力程度與致病性呈正相關。","D":"正確。累積微小壓力源也可能致病。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"103100-N2-2":{"quick":"GAS全身適應症候群三期:警覺期→抵抗期→耗竭期。","detail":{"background":"Selye提出之全身適應症候群(General Adaptation Syndrome, GAS)描述身體對持續壓力的生理反應,分三期:警覺期(alarm,交感神經與腎上腺活化,出現戰或逃反應)→抵抗期(resistance,身體動員資源試圖適應、維持恆定)→耗竭期(exhaustion,長期壓力使資源耗盡,出現疾病甚至死亡)。順序為警覺→抵抗→耗竭。","options":{"A":"正確(本題答案)。警覺期→抵抗期→耗竭期。","B":"「反應期、復原期」非GAS分期名稱。","C":"順序顛倒,警覺應在抵抗之前。","D":"順序錯誤且名稱不符。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"106110-N2-6":{"quick":"健康-疾病是動態連續且相對的概念,個體位置受內外環境影響。","detail":{"background":"健康與疾病概念:現代觀點視健康與疾病為一條動態連續線(health-illness continuum),兩者並非絕對二分,而是相對且不斷變動;個體在此連續線上的位置會受內在(基因、生理、心理)與外在(環境、社會、文化)因素影響,且健康定義因人、因文化而異,並無單一明確、客觀可測量的標準。WHO定義健康為身體、心理與社會的完全安適,而非僅無疾病。","options":{"A":"兩者是動態但「相對」關係,非絕對。","B":"正確(本題答案)。位置受內外在環境影響而變動。","C":"健康非單一明確客觀可測量的狀態。","D":"兩者並無明確且一致的定義。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"111110-N2-1":{"quick":"社會學觀點談角色功能;「與生態環境和諧」是生態學/整體觀,非社會學。","detail":{"background":"健康的多元觀點:生理學觀點認為疾病是身體系統或功能異常;流行病學觀點以宿主-病原-環境三角分析易感性;消費者觀點視健康為可購買的商品/服務;社會學觀點強調健康是個體能履行社會角色與功能的能力。選項A把「人與生態環境達和諧」(屬生態學/適應觀)歸為社會學觀點,故錯誤。","options":{"A":"錯誤(本題答案)。「與生態環境和諧」屬生態/適應觀,非社會學觀點。","B":"正確。消費者觀點視健康為商品。","C":"正確。生理學觀點:疾病為功能異常。","D":"正確。流行病學以宿主對病原的易感性看疾病。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"113180-N2-4":{"quick":"WHO定義健康為「身、心、社會完全安適」,非僅「沒有疾病或虛弱」。","detail":{"background":"WHO(1948)對健康的定義為「生理、心理與社會三方面的完全安適狀態,不僅是沒有疾病或不虛弱」。健康與疾病無清楚界線、為不斷改變的連續狀態,個體位置受生活事件影響,多數人處於連續線中間。選項B僅以「沒有疾病或虛弱」描述,正是WHO定義所要超越的狹隘觀點,故為錯誤敘述。","options":{"A":"正確。健康疾病無清楚界線、不斷改變。","B":"錯誤(本題答案)。WHO定義是身心社會完全安適,不只是無疾病。","C":"正確。位置改變受生活事件影響。","D":"正確。多數人處於連續線中間。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"114030-N2-1":{"quick":"疾病自然史「易感染期」去除危險因子=初段預防之「促進健康」。","detail":{"background":"三段五級預防(Leavell & Clark)對應疾病自然史:第一段(初段預防)含第一級「促進健康」(衛教、營養、運動、去除危險因子)與第二級「特殊保護」(預防接種、消毒);第二段(次段預防)第三級「早期診斷早期治療」(篩檢);第三段(三段預防)第四級「限制殘障」與第五級「復健」。易感染期去除危險因子屬第一段第一級的促進健康。","options":{"A":"早期診斷早期治療屬第二段第三級。","B":"正確(本題答案)。易感期去除危險因子=初段預防促進健康。","C":"限制殘障屬第三段第四級。","D":"復健屬第三段第五級。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"105030-N2-6":{"quick":"子宮頸抹片、胸部X光篩檢=早期診斷早期治療→第二段第三級。","detail":{"background":"社區辦理子宮頸抹片檢查與胸部X光篩檢,目的是在無症狀或早期偵測疾病、及早治療,屬三段五級中的第二段(次段預防)第三級「早期診斷、早期治療」。第一段為促進健康(衛教)與特殊保護(疫苗);篩檢屬次段預防。三段五級對應:第一段(促進健康衛教、特殊保護疫苗)、第二段(早期診斷治療=篩檢)、第三段(限制殘障、復健)。抹片與X光屬篩檢=第二段第三級。","options":{"A":"第一段第一級是促進健康(衛教/營養)。","B":"正確(本題答案)。篩檢=第二段第三級早期診斷治療。","C":"第一段第三級用語不符(第一段含第一、二級)。","D":"第二段對應第三級,「第二段第三級」才正確。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"110110-N2-13":{"quick":"雇主提供定期身體檢查=早期診斷早期治療→第二段第三級。注意本題官方答案為A。","detail":{"background":"本題官方答案為A(第一段第一級)。健康檢查在分類上可從兩角度看:若視為篩檢早期發現疾病屬第二段第三級;惟部分教材將「雇主提供定期健康檢查」歸為職場健康促進、維護健康之初段預防(第一段第一級促進健康)。本題依官方答案採「第一段第一級」。作答時須留意命題者對健康檢查屬「促進健康」或「早期診斷」之歸類差異。","options":{"A":"本題答案。視定期健檢為職場促進健康之初段預防(第一段第一級)。","B":"第一段第二級為特殊保護(疫苗/消毒)。","C":"第二段第三級為篩檢早期診斷(另一種歸類)。","D":"第三段第四級為限制殘障。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"107110-N2-3":{"quick":"韓德森(Henderson)提14項基本需要;「治療性人際關係」是Peplau的理論。","detail":{"background":"護理理論家定義:南丁格爾強調護理是藝術與科學的結合、重視環境;羅伊(Roy)提適應模式;歐倫/奧倫(Orem)提自我照顧需求理論;韓德森(Henderson)提出14項基本需要與「協助個體達到獨立」;Peplau才是提出「治療性人際關係過程」者。選項D把Peplau的理論誤掛在Henderson身上,故錯誤。","options":{"A":"正確。南丁格爾:護理是藝術與科學結合。","B":"正確。Roy發展適應模式。","C":"正確。Orem發展自我照顧需求理論。","D":"錯誤(本題答案)。治療性人際關係是Peplau的理論,非Henderson。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"106030-N2-68":{"quick":"「協助病人重獲自我照護能力、恢復健康」=歐倫(Orem)自我照顧理論。","detail":{"background":"護理理論家:歐倫(Orem)自我照顧缺失理論強調護理目標在滿足病人自我照護需求、協助病人重獲自我照顧能力以恢復健康;紐曼(Neuman)系統模式;羅伊(Roy)適應模式;羅傑士(Rogers)單一整體人科學。題幹「滿足自我照護需求、協助重獲正常健康」正是Orem理論核心。","options":{"A":"紐曼=系統模式(防線/壓力源)。","B":"羅伊=適應模式(四種適應形式)。","C":"正確(本題答案)。歐倫=自我照顧需求理論。","D":"羅傑士=整體人科學。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"112030-N2-1":{"quick":"羅氏適應模式以全人為中心,需了解並協助病人心理社會調適,非只看生理痊癒。","detail":{"background":"羅伊(Roy)適應模式視人為整體適應系統,涵蓋生理、自我概念、角色功能、相互依賴四種適應方式;健康是成功適應的狀態。王先生雖闌尾炎痊癒(生理適應),但心情欠佳代表心理-社會適應未達成,尚未達Roy模式之「健康與安適」。護理應了解其心情欠佳原因並協助調適,才符合以全人為中心的Roy模式照顧範圍。","options":{"A":"生理痊癒不等於Roy模式整體適應達成。","B":"只獲生理健康不等於以病人為中心之全人照護目標。","C":"心情欠佳代表心理適應未達成,非已達安適。","D":"正確(本題答案)。了解並協助心理調適才符合Roy全人照顧範圍。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"114100-N2-3":{"quick":"南丁格爾:以自然法則提供合宜環境,協助個體恢復健康。","detail":{"background":"南丁格爾(環境理論)主張護理是「將病人置於最佳狀態,使自然(自然法則)得以發揮作用恢復健康」,強調操控環境(清潔空氣、陽光、安靜、營養、衛生)以促進病人自癒力。選項B為Orem自我照顧、C為Neuman系統平衡、D為Roy適應,皆非南丁格爾。","options":{"A":"正確(本題答案)。南丁格爾:以自然法則提供合宜環境恢復健康。","B":"屬Orem自我照顧/能量提升觀。","C":"屬Neuman系統內外功能調和。","D":"屬Roy適應與平衡。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"105030-N2-5":{"quick":"運用護理過程解決健康問題屬護理的「獨立性功能」,非相互依賴功能。","detail":{"background":"護理專業特性:以「人、環境、健康、護理」為核心構面(後設典範);視人為身、心、靈、社會的複合整體;強調「care(關懷照護)」而非「cure(治療)」。運用護理過程獨立評估、診斷並解決病人健康問題,屬護理的獨立性(自主性)功能,而非「相互依賴功能」(需與醫療團隊協同者)。選項A歸類錯誤。","options":{"A":"錯誤(本題答案)。運用護理過程解決健康問題屬獨立性功能。","B":"正確。人環境健康護理為核心構面。","C":"正確。視人為身心靈社會複合體。","D":"正確。護理強調care而非cure。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"101110-N2-11":{"quick":"護理過程五步驟由「評估(收集資料)」開始。","detail":{"background":"護理過程(nursing process)為系統性解決問題的方法,五步驟依序為:評估(assessment,收集主客觀資料)→診斷(diagnosis)→計畫(planning,訂目標與措施)→執行(implementation)→評值(evaluation)。任何個案照護都從「評估收集資料」起步,故照顧肝硬化病人也由評估開始。護理過程具動態、循環、持續性。","options":{"A":"計畫在評估、診斷之後。","B":"正確(本題答案)。護理過程由評估開始。","C":"診斷在評估之後。","D":"評值是最後步驟。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"104100-N2-10":{"quick":"護理過程以「病人/家屬為中心」,具持續性與循環性。","detail":{"background":"護理過程特性:以病人或家屬為中心(全人照護);具持續性與循環性(評值結果可回饋修正前面步驟);始於「評估」而非「目標」、終於評值;目的是滿足病人基本需求、解決健康問題(以照護care為主,非以治療cure為主)。選項D正確點出「以病人或家屬為中心」。","options":{"A":"護理過程始於評估,非始於目標。","B":"護理過程兼具持續性「與」循環性。","C":"以照護(care)為主而非以治療為主要目的。","D":"正確(本題答案)。以病人或家屬為中心。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"104100-N2-11":{"quick":"護理過程目的是滿足全人基本需求、促進安適,而非「治癒疾病」。","detail":{"background":"護理過程強調重點:以整體性(全人)收集護理對象身心靈社會基本需求資料;運用護理處方並協同醫療處方滿足全人需求;目的在促進病人健康安適。「治癒疾病(cure)」屬醫療目標而非護理過程的核心強調(護理強調care)。選項B「治癒疾病」與護理過程重點不符,為錯誤敘述。","options":{"A":"正確。以整體性收集全人基本需求資料。","B":"錯誤(本題答案)。治癒疾病非護理過程重點(護理強調care)。","C":"正確。護理處方並協同醫療處方滿足需求。","D":"正確。促進健康安適需求。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"112110-N2-13":{"quick":"護理過程是以「病人健康需求/目標」為中心,非「以疾病治癒」為中心。","detail":{"background":"護理過程特點:依病人健康需求修訂護理計畫;以目標為指引、具時效性;是雙向溝通的人際互動;以滿足病人全人需求、促進安適為導向。選項B「以疾病治癒為中心」錯誤——疾病治癒是醫療目標,護理過程以病人需求與護理目標為中心(care導向)。核心:護理過程以「病人健康需求與護理目標」為中心、依需求修訂計畫、具時效性、是雙向人際互動;以「疾病治癒」為中心是醫療觀(cure),非護理(care)。","options":{"A":"正確。依病人健康需求修訂計畫。","B":"錯誤(本題答案)。護理過程以病人需求為中心,非以疾病治癒為中心。","C":"正確。以目標為指引、具時效性。","D":"正確。是雙向溝通的人際互動。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"105030-N2-15":{"quick":"護理過程以「全人(身心靈社會)需求」為依據,非以生物化學模式。","detail":{"background":"護理過程特性:收集全人基本需求資料、針對身心靈社會各方面現存或潛在健康問題進行護理處置並協助醫療處置。其理論依據是「全人整體(holism)」而非「生物化學/生物醫學模式」。選項A稱「以生物化學模式為依據」與護理整體觀相違,故為錯誤敘述。核心:護理以「全人整體觀(holism)」為依據,涵蓋身心靈社會現存與潛在問題,並協助醫療處置;以生物醫學/生化模式為依據是醫療觀,非護理過程。","options":{"A":"錯誤(本題答案)。護理過程以全人整體觀為依據,非生物化學模式。","B":"正確。收集全人基本需求資料。","C":"正確。含現存與潛在的身心靈社會問題。","D":"正確。護理處置並協助醫療處置。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"103030-N2-8":{"quick":"心悸是病人「自覺」的感受,屬主觀症狀(symptom)。","detail":{"background":"主觀資料/症狀(subjective data/symptoms)是病人自覺、他人無法直接觀察測量的感受,如疼痛、噁心、頭暈、心悸;客觀資料/徵象(objective data/signs)是可被觀察或測量者,如呼吸數值、臉色蒼血、血壓、看護墊血量。心悸屬病人主訴的自覺感受,為主觀症狀。","options":{"A":"正確(本題答案)。心悸為病人自覺感受=主觀症狀。","B":"呼吸數值可測量,屬客觀。","C":"臉色蒼白可觀察,屬客觀。","D":"血液看護墊可觀察,屬客觀。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"104030-N2-6":{"quick":"護理師觀察到的傷口紅腫是可見可測的徵象=客觀資料。","detail":{"background":"主觀資料是病人自述(如主訴疼痛);客觀資料是護理師透過視、觸、聽、嗅或儀器/檢驗所得、可觀察測量者(如面部潮紅、傷口紅腫、檢驗報告)。選項D「觀察病人傷口紅腫」屬客觀資料,正確。A病人主訴疼痛應屬主觀;B觀察潮紅應屬客觀;C檢驗報告屬客觀資料(非主觀)。","options":{"A":"病人主訴疼痛應屬「主觀」資料。","B":"觀察面部潮紅應屬「客觀」資料。","C":"檢驗報告屬「客觀」資料,非主觀。","D":"正確(本題答案)。觀察傷口紅腫屬客觀資料。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"104030-N2-7":{"quick":"「身體僵硬、不願下床」是護理師觀察所得=客觀資料。","detail":{"background":"「病人身體僵硬、無法放鬆、不願下床活動」是護理師經由觀察(視診)得到、可被他人察覺的表現,屬客觀資料。主觀資料需是病人自述的內在感受;此處是外顯行為觀察,故為客觀資料。判別口訣:資料是否「可被他人觀察或測量」——可者為客觀(O),病人自覺感受才是主觀(S)。「身體僵硬、不願下床」是護理師以視診觀察到的外顯行為,任何人都能看見,故為客觀資料;若病人說「我全身緊繃放鬆不了」才屬主觀。","options":{"A":"主觀資料須為病人自述感受,此為觀察所得。","B":"正確(本題答案)。觀察到的外顯行為=客觀資料。","C":"非實驗室數據。","D":"非醫療紀錄。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"104100-N2-13":{"quick":"護理師測量的血壓、心跳是客觀數據→「24」。","detail":{"background":"客觀資料是可觀察測量者。題中:1家屬轉述(間接、屬主觀來源描述)、2護理師觀察病人「喜歡吃肉甜食」(觀察行為,客觀)、3病人主訴「青菜難咬」(主觀)、4護理師測量血壓160/90、心跳80(儀器測量,客觀)。屬客觀資料者為2與4,選「24」。","options":{"A":"1為家屬轉述、3為病人主訴,皆主觀。","B":"3為病人主訴,屬主觀。","C":"正確(本題答案)。2觀察與4測量數據皆客觀。","D":"3屬主觀。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"107030-N2-14":{"quick":"客觀資料=可測量觀察者:腸蠕動次數、臉色蒼白、體溫;主訴與轉述屬主觀→「124」。","detail":{"background":"客觀資料須可觀察測量。題中:1腸蠕動15次/分(聽診測量,客觀)、2臉色蒼白(觀察,客觀)、3家屬說「痛到沒睡」(轉述主觀)、4體溫39°C(測量,客觀)、5主訴口渴(主觀)。客觀者為1、2、4,選「124」。判別:可被觀察測量者為客觀(腸蠕動次數、臉色、體溫);病人或家屬口述之感受(口渴、痛到沒睡)為主觀。注意家屬「轉述」即使描述現象仍歸主觀。","options":{"A":"含3(轉述主觀),不正確。","B":"正確(本題答案)。1腸蠕動、2臉色、4體溫皆客觀。","C":"含5主訴口渴(主觀)。","D":"含3、5皆主觀。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"107030-N2-12":{"quick":"家屬轉述病人飲食習慣=主觀資料(他人陳述的感受/描述)。","detail":{"background":"主觀資料指當事人或家屬陳述、無法直接測量者。家屬說「青菜都不吃、很少喝水」是家屬描述病人習慣,屬主觀資料;護理師「觀察」陳先生喜歡吃肉甜食屬客觀觀察;BP、HR、血糖325為測量值,皆客觀。故主觀資料為家屬轉述。口訣:「○○說、主訴、覺得」=主觀;「觀察、測量、檢驗」=客觀。家屬轉述飲食習慣屬主觀;護理師觀察喜好、量得BP/HR/血糖則屬客觀。","options":{"A":"有主觀資料(家屬轉述),非「無主觀資料」。","B":"正確(本題答案)。家屬轉述飲食習慣=主觀資料。","C":"護理師「觀察」所得屬客觀。","D":"BP/HR為測量值,屬客觀。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"103100-N2-9":{"quick":"動脈血氧值80 mmHg是「儀器檢驗測量」所得,非「護理觀察」技巧。","detail":{"background":"「護理觀察」指運用視、聽、嗅、觸等感官直接察覺病人狀態收集到的客觀資料(如皮膚蒼白=視、水果味口氣=嗅、脈搏快弱=觸)。動脈血氧值80 mmHg須靠血液氣體分析儀檢驗測得,屬「測量/檢驗」而非感官「觀察」所得,故不是運用護理觀察技巧收集到的資料。","options":{"A":"皮膚蒼白=視覺觀察。","B":"正確(本題答案)。血氧值須儀器檢驗,非感官觀察。","C":"水果味口氣=嗅覺觀察。","D":"脈搏快弱=觸覺觀察。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"106110-N2-7":{"quick":"閉眼皺眉(觀察)、心跳血壓(測量)皆為徵象(signs);頭暈為主觀症狀。","detail":{"background":"徵象(signs)是可觀察或測量的客觀表現;症狀(symptoms)是病人自覺的主觀感受。題中:臉色蒼白、閉眼皺眉、呼吸急促、血壓142/96、心跳102皆可觀察測量=徵象;頭暈為病人自覺=症狀。選項C「閉眼皺眉及心跳為徵象」正確(皆可觀察測量)。A血壓與頭暈混淆;B呼吸與臉色其實是客觀但稱「客觀症狀」用語不當;D含呼吸急促正確但與C比C更精確。","options":{"A":"頭暈為主觀症狀,非主觀「症狀」與血壓並列描述不當。","B":"臉色蒼白屬徵象,但稱「客觀症狀」用語不當。","C":"正確(本題答案)。閉眼皺眉與心跳皆可觀察測量=徵象。","D":"血壓為徵象,但呼吸急促亦為徵象、敘述不夠精確。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"110110-N2-25":{"quick":"觀察到臉色蒼白、盜汗(可見)屬客觀資料。","detail":{"background":"客觀資料是護理師可觀察測量者。A觀察臉色蒼白、盜汗=客觀(正確);B家屬轉述「很少喝水」=主觀;C 24小時I/O為測量數據=客觀(非主觀);D觀察淚流滿面、抱肚=客觀(非主觀)。故正確為A。重點:護理師「觀察、測量、檢驗」所得皆客觀資料;病人或家屬「口述」感受才是主觀。臉色蒼白、盜汗、淚流、抱肚皆可觀察=客觀;24小時I/O為測量數據亦客觀;唯家屬轉述「很少喝水」屬主觀。常見陷阱:把「觀察到的情緒表現(流淚)」誤判為主觀。","options":{"A":"正確(本題答案)。觀察臉色蒼白盜汗=客觀資料。","B":"家屬轉述屬主觀。","C":"I/O為測量數據,應屬客觀。","D":"觀察到的淚流、抱肚屬客觀,非主觀。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"111030-N2-14":{"quick":"主觀資料=病人/家屬陳述:「肚子痛皺眉」「呼吸會喘」→「12」。","detail":{"background":"主觀資料是病人或家屬「陳述」之感受。題中:1家屬描述「他說肚子痛、皺眉」(轉述病人主訴=主觀)、2護生說「病人說他呼吸會喘」(轉述病人主訴=主觀)、3護理師觀察解黑便(客觀)、4血紅素8.8(檢驗,客觀)。主觀者為1、2,選「12」。判別:「○○說/主訴」是陳述=主觀(家屬說他肚子痛、護生說病人說會喘);護理師觀察解黑便、檢驗血紅素值則為客觀。轉述他人的話仍屬主觀資料。","options":{"A":"正確(本題答案)。1、2皆為陳述的主訴=主觀。","B":"3觀察、4檢驗皆客觀。","C":"3為客觀觀察。","D":"4為客觀檢驗。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"111030-N2-7":{"quick":"陳施氏(陳-施)呼吸是可觀察的呼吸型態=客觀徵象,非主觀症狀。","detail":{"background":"主觀症狀是病人自覺者(全身發癢、口渴、心悸);陳施氏呼吸(Cheyne-Stokes,呼吸由淺漸深再漸淺至暫停的週期變化)是護理師可觀察測量的呼吸型態,屬客觀徵象。故「不是主觀症狀」者為陳施氏呼吸。補充:呼吸「型態」異常(陳施氏Cheyne-Stokes週期深淺、庫斯毛耳Kussmaul深快、畢歐氏Biot不規則)皆是護理師可觀察測量的徵象,屬客觀;而病人自覺的發癢、口渴、心悸、噁心、疼痛才是主觀症狀。判別關鍵在「能否被外人直接觀察/儀器測得」。","options":{"A":"全身發癢為自覺=主觀症狀。","B":"口渴為自覺=主觀症狀。","C":"正確(本題答案)。陳施氏呼吸為可觀察的客觀徵象。","D":"心悸為自覺=主觀症狀。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"114030-N2-6":{"quick":"護理師測得白血球10,000/mm3是檢驗數據=客觀資料。","detail":{"background":"客觀資料(O)是可觀察、測量或檢驗者。選項C「護理師:白血球10,000/mm3」為檢驗測量數據,屬客觀;A家屬說血壓偏低、B病人說入睡時間、D看護說一直叫痛,皆為他人陳述或病人主訴=主觀資料。判別重點:檢驗數據(白血球、血壓、體溫、血糖)為儀器測量所得=客觀資料(O);凡「○○說、○○主訴、○○覺得」皆為陳述=主觀資料(S)。本題A家屬說、B病人說、D看護說皆主觀,僅C白血球值為客觀檢驗值。","options":{"A":"家屬陳述=主觀。","B":"病人陳述=主觀。","C":"正確(本題答案)。白血球檢驗值=客觀資料。","D":"看護轉述=主觀。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"113180-N2-6":{"quick":"家屬描述「昨天就開始喘」是轉述=主觀資料;測量值與觀察為客觀。","detail":{"background":"主觀資料是病人或家屬「口述」之感受/病史。題中:病人呼吸喘、冒冷汗(觀察=客觀)、家屬描述「昨天就開始喘了」(轉述病史=主觀)、SpO2 89%、BP、HR、R皆測量值(客觀)。主觀資料為家屬描述。補充:急診常見資料判別——病人/家屬「口述病史」(如家屬說昨天開始喘)屬主觀資料;護理師觀察(呼吸喘、冷汗)與儀器測量(SpO2、BP、HR、R)皆客觀資料。注意:即使是家屬「描述客觀現象」,只要是口述轉達,仍歸主觀來源資料。","options":{"A":"觀察到的喘、冷汗屬客觀。","B":"正確(本題答案)。家屬口述病史=主觀資料。","C":"SpO2為測量值,屬客觀。","D":"有主觀資料(家屬描述),非「無」。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"113100-N2-26":{"quick":"病人「抱怨左頸抽痛感」是自覺感受=主觀症狀。","detail":{"background":"主觀症狀是病人自覺、他人無法直接測得者。A病人抱怨「左頸腫瘤處有抽痛感」是自覺疼痛=主觀症狀(正確);B閉眼皺眉、C用手扶頸、D四處走動坐立難安皆為護理師觀察到的外顯行為=客觀徵象。判別:病人「抱怨、主訴」其自覺感受(抽痛、痠麻、噁心)=主觀症狀(symptom);護理師觀察到的外顯行為(皺眉、扶頸、坐立難安、走動)=客觀徵象(sign)。本題僅A「抱怨抽痛感」為病人自覺,屬主觀症狀,其餘皆觀察所得。","options":{"A":"正確(本題答案)。抱怨抽痛感=主觀症狀。","B":"閉眼皺眉=觀察到的客觀徵象。","C":"用手扶頸=客觀行為。","D":"走動不安=客觀行為。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"112030-N2-11":{"quick":"客觀資料來源:儀器檢查、運用觀察技巧→「24」。","detail":{"background":"取得客觀資料的方法是可被觀察或測量者:2運用儀器檢查、4運用觀察技巧皆得客觀資料;1病人主訴、3家屬親友描述屬主觀資料(他人陳述)。故客觀資料方法為「24」。補充:取得「客觀」資料的方法是可被外部驗證者——運用儀器/檢驗、運用感官觀察技巧(視觸叩聽嗅);而病人主訴、家屬親友描述屬「主觀」資料(他人陳述)。護理評估須兼收主客觀資料,但本題僅問取得「客觀」資料之方法。","options":{"A":"1主訴為主觀。","B":"正確(本題答案)。2儀器檢查、4觀察技巧皆得客觀資料。","C":"3家屬描述為主觀。","D":"1、3皆主觀。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"104100-N2-8":{"quick":"配偶提供資料屬「次級來源」、且為「她已哭好幾天」之觀察陳述=客觀。","detail":{"background":"資料來源:初級來源(primary source)為病人本人;次級來源(secondary source)為家屬、病歷、醫療團隊等。盧女士先生提供資料屬次級來源;其陳述「她已哭好幾天」是描述可觀察的行為(哭泣)=客觀資料。故為「次級來源、客觀資料」。(病人自述「我不是女人了」才屬主觀)。","options":{"A":"先生非病人本人,非初級來源。","B":"先生為次級來源,非初級。","C":"描述可觀察的哭泣行為屬客觀,但來源判定為次級正確;惟資料性質為客觀→看D。","D":"正確(本題答案)。先生=次級來源;「哭好幾天」描述可觀察行為=客觀資料。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"114170-N2-5":{"quick":"護理評估=收集病人過去與現在的身心靈社會等健康資料。","detail":{"background":"護理評估(assessment)是護理過程第一步,系統收集病人過去與現在之身、心、靈、社會、認知、發展等全人健康資料,作為診斷依據。初級資料來源(primary)為病人本人(含無法言語者的哭泣等反應);次級來源(secondary)為家屬、醫療人員、病歷,其提供「客觀」資料而非主觀意見。選項B正確描述評估的全人資料收集。","options":{"A":"評估是第一步,非最後一步。","B":"正確(本題答案)。收集過去與現在的身心靈社會等健康資料。","C":"病人本身反應(哭泣)應屬初級來源,敘述本身C將其歸類正確,但題問「最適當」選B更全面。","D":"次級來源提供客觀資料,非「主觀意見」。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"102110-N2-15":{"quick":"間接觀察法是不直接接觸病人(由病歷/家屬取得);「觀察病患外觀」屬直接觀察。","detail":{"background":"資料收集分直接觀察法(直接接觸病人、以感官觀察其外觀行為)與間接觀察法(不直接接觸病人,由病歷、檢驗報告、家屬或其他醫療人員間接取得)。選項C「可觀察病患外觀獲得」屬「直接」觀察,故為描述間接觀察法之錯誤敘述。口訣:間接觀察=不接觸病人(查病歷、問家屬、看檢驗報告);直接觀察=以感官直接察覺病人外觀行為。觀察外觀屬「直接」是常見陷阱。","options":{"A":"正確。間接觀察不需接觸病患。","B":"正確。可由病歷獲得。","C":"錯誤(本題答案)。觀察病患外觀屬直接觀察,非間接。","D":"正確。可透過家屬取得。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"101030-N2-13":{"quick":"護理師觀察角色不含「依資料變更醫療處置」(變更醫囑屬醫師職權)。","detail":{"background":"護理師在觀察過程中應:運用各種觀察技能收集資料、分析判斷個案問題、以報告及記錄與團隊溝通。但「依據資料變更醫療處置(改醫囑)」屬醫師職權,非護理師可自行為之;護理師可發現異常並通報醫師。故C不是護理師觀察過程中扮演的角色。考點:護理師可「發現異常並通報醫師」,但不可自行變更醫囑/醫療處置——區分護理自主範疇與醫療職權是常考界線。","options":{"A":"正確。須使用各種觀察技能。","B":"正確。分析資料判斷個案問題。","C":"錯誤(本題答案)。變更醫療處置屬醫師職權,非護理師角色。","D":"正確。以報告與記錄和他人溝通。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"105090-N2-12":{"quick":"護理評估「可」作為執行後評值的比較基礎;稱「不可作為評值」錯誤。","detail":{"background":"護理評估需包含主、客觀資料;收集方法含身體評估與檢查;資料來源含病人、家屬、醫療小組成員與病歷。評估所得的基準資料(baseline)正可作為日後護理計畫執行後評值比較的依據。選項A稱「不可作為護理計畫執行後之評值」錯誤——基準評估資料正是評值的比較基礎。","options":{"A":"錯誤(本題答案)。評估基準資料可作為執行後評值之比較。","B":"正確。需含主客觀資料。","C":"正確。方法含身體評估與檢查。","D":"正確。來源含醫療小組成員。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"113030-N2-6":{"quick":"發現主訴與病歷不符而再次向照顧者「確認資料」,屬護理評估步驟。","detail":{"background":"護理評估包含資料收集與「驗證資料正確性」。護理師發現病人主訴與病歷家庭樹不符,向主要照顧者再次確認,正是評估階段中「驗證/確認資料」的工作,屬護理評估(assessment)。補充:護理評估(assessment)不只收集資料,還包含「驗證資料正確性」。當主訴與病歷紀載(家庭樹)不一致時,向主要照顧者再次確認,正是評估階段的資料驗證工作,確保後續診斷與計畫建立在正確資料上,避免錯誤推論。","options":{"A":"評值是判斷目標達成程度,非此。","B":"診斷是分析資料形成問題陳述。","C":"正確(本題答案)。確認資料正確性屬護理評估。","D":"計畫是訂目標與措施。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"102110-N2-7":{"quick":"「每班監測疼痛部位強度性質」是要做的處置=護理措施。","detail":{"background":"護理計畫包含護理目標(預期結果,病人導向、可測量)與護理措施(nursing intervention,護理師要執行的活動)。「每班監測病患疼痛部位、強度與性質」是護理師要執行的動作,屬護理措施。護理問題是診斷陳述;護理評值是判斷目標達成。","options":{"A":"護理問題是問題陳述,非此。","B":"護理目標是病人預期結果。","C":"正確(本題答案)。要執行的監測活動=護理措施。","D":"護理評值是判斷達成程度。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"106030-N2-9":{"quick":"使用冰枕後20分鐘詢問病人感覺=評值措施成效→護理評值。","detail":{"background":"護理過程中,在執行護理措施(使用冰枕)後一段時間評估病人反應與成效(詢問感覺如何),是判斷措施是否達到預期目標,屬護理評值(evaluation)。補充:護理過程中「執行措施後再評估病人反應與成效」即護理評值(evaluation)。使用冰枕(措施)後20分鐘詢問病人感覺,是判斷降溫/舒適措施是否達到預期目標,屬評值。評值結果可回饋修正診斷與計畫,具持續循環性。","options":{"A":"護理評估是收集基準資料。","B":"護理目標是預期結果。","C":"護理活動是執行措施本身。","D":"正確(本題答案)。執行後評估成效=護理評值。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"112180-N2-6":{"quick":"執行期(implementation)=實際提供病人個別性照護活動。","detail":{"background":"護理過程執行期(implementation)是依護理計畫實際提供病人個別化的照護活動(執行護理措施)。A確認資料正確性屬評估;B確立問題優先順序屬診斷/計畫;D重新設定目標屬計畫修訂。提供個別性照護活動才是執行期工作。記憶:護理過程執行期(implementation)=實際提供個別化照護活動;確認資料正確屬評估、確立優先序屬診斷/計畫、重設目標屬計畫修訂。","options":{"A":"確認資料正確性屬評估期。","B":"確立優先順序屬診斷/計畫期。","C":"正確(本題答案)。提供個別性照護活動=執行期。","D":"重新設定目標屬計畫期。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"114100-N2-5":{"quick":"安寧病人自拔鼻胃管,合宜的是「計畫:與病人共同討論可行方法」。","detail":{"background":"護理過程以病人為中心、尊重自主。安寧緩和病人自拔鼻胃管、想由口進食,合宜的護理紀錄應反映尊重病人意願並共同協商:護理計畫「跟病人共同討論可行的方法」最適當。A把自拔貼上「不遵從」標籤、B強加「維持理想體重」目標、D評值「導致營養不足」皆未尊重病人意願,不適當。","options":{"A":"貼「不遵從」標籤未尊重安寧病人自主,不當。","B":"強加維持體重目標違背病人想由口進食的意願。","C":"正確(本題答案)。與病人共同討論可行方法,尊重自主。","D":"以「營養不足」評值帶價值判斷,不當。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"102030-N2-9":{"quick":"護理目標須是「病人導向、可測量」;「停止呻吟皺眉」太籠統不適當。注意答案A。","detail":{"background":"護理目標(預期結果)書寫原則:以病人為主詞、具體可測量、有時間性、在病人能力範圍內。「10/17疼痛指數達0分」「手術當天能操作PCA」「術後第一天說出兩種減痛方法」皆具體可評值。選項A「疼痛能緩解並停止出現呻吟皺眉等行為」措辭較籠統、難以客觀量化「停止」程度,為本題不適當者。","options":{"A":"不適當(本題答案)。「疼痛緩解、停止呻吟皺眉」籠統,缺乏可量化指標。","B":"適當。有日期與量化(疼痛指數0分)。","C":"適當。具體可觀察(能操作PCA)。","D":"適當。可評值(說出兩種方法)。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"102030-N2-10":{"quick":"「能列舉三項增加母乳的食物」=知識記憶層面→認知目標。","detail":{"background":"護理目標依學習領域分:認知目標(cognitive,知識理解,如能說出、列舉、解釋)、情意目標(affective,態度情感,如能主動分享、表達感受)、技能目標(psychomotor,動作操作,如能正確執行)。「能正確列舉三項增加母乳的食物」屬知識記憶=認知目標。B分享感覺=情意;C執行哺餵=技能;D參與團體=情意/行為。","options":{"A":"正確(本題答案)。列舉食物=認知(知識)目標。","B":"主動分享感覺=情意目標。","C":"正確執行哺餵=技能目標。","D":"參與支持團體=情意/社會行為。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"113030-N2-9":{"quick":"「能解釋血糖控制與併發症關係」=知識理解→認知目標。","detail":{"background":"「病人能解釋血糖控制與預防糖尿病合併症之關係」要求病人理解並說明概念,屬認知(cognitive)領域目標。情意目標涉態度情感、技能目標涉動作操作、互動目標非標準分類。能「解釋關係」是知識理解,故為認知目標。分類:認知目標(知識理解,能解釋/說出/列舉)、情意目標(態度情感,能分享/表達)、技能目標(動作操作,能正確執行)。「解釋…關係」屬認知。","options":{"A":"情意目標涉態度情感。","B":"技能目標涉動作操作。","C":"正確(本題答案)。能解釋概念=認知目標。","D":"「互動目標」非標準目標分類。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"106111-N2-13":{"quick":"護理目標「需」醫療照護小組成員認同支持;稱「不需」錯誤。","detail":{"background":"護理目標設定原則:針對問題解決而設定(目標達成意味問題解決)、建立在病人能力所及範圍、護理師有能力執行並達預期效果,且需獲醫療照護小組成員的認同與支持以利團隊協同執行。選項D稱「不需醫療照護小組成員認同支持」錯誤。原則:護理目標須針對問題、在病人能力範圍、護理師可執行,並獲醫療團隊認同支持以利協同;稱「不需團隊認同」忽略照護的團隊協作本質,錯誤。","options":{"A":"正確。針對問題解決而設定。","B":"正確。建立在病人能力範圍內。","C":"正確。護理師可執行並達效果。","D":"錯誤(本題答案)。護理目標需團隊成員認同與支持。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"115030-N2-9":{"quick":"護理目標應「以病人能力與狀況」設定,非以護理師專業經驗為主。","detail":{"background":"護理目標(預期結果)設定原則:以病人為中心、符合病人能力與狀況、護理師有能力執行並達預期效果、獲醫療團隊認同支持。選項A「主要以護理師的專業經驗來設定」錯誤——目標應以病人需求與能力為依歸,而非以護理師經驗為主。原則:護理目標以「病人能力與狀況」設定、護理師可執行並達效果、獲團隊認同;以護理師「專業經驗」為主而非病人需求,違背以病人為中心的目標設定原則。","options":{"A":"錯誤(本題答案)。目標應以病人能力狀況設定,非以護理師經驗為主。","B":"正確。符合病人能力與狀況。","C":"正確。護理師可執行並達效果。","D":"正確。團隊成員認同與支持。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"103030-N2-13":{"quick":"目標「下床3次每次30分」只達成1次5分=部分達成,須修改計畫。","detail":{"background":"護理評值依目標達成程度處理:完全達成→銷案;部分達成或未達成→分析原因並修改護理計畫(調整目標或措施)。目標「三天內每日下床3次、每次30分」而病人僅下床1次5分,屬「部分達成」且明顯落差大,應檢討並修改計畫使其更符合病人能力,故選「部分達成,應修改計畫」。","options":{"A":"未完全達成,不可銷案。","B":"落差大,僅「追蹤」不足,需修改計畫。","C":"正確(本題答案)。部分達成且落差大,應修改計畫。","D":"已下床1次5分屬部分達成,非完全未達成。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"114030-N2-5":{"quick":"優先順序依「威脅生命、馬斯洛需求層次」排,非依護理師主觀認定。","detail":{"background":"護理問題優先順序排列原則:威脅生命者最優先、依馬斯洛需要層次(生理>安全>愛與隸屬>自尊>自我實現)、相關問題盡量排一起、考量病人認知與意願。選項B「護理人員覺得最重要的優先解決」錯誤——應以病人需求與危急程度為準,而非護理師主觀。原則:問題優先序依威脅生命程度與馬斯洛需要層次(生理>安全>愛與隸屬>自尊>自我實現)排,相關問題排一起;不可依護理師個人主觀認定優先。","options":{"A":"正確。威脅生命者優先。","B":"錯誤(本題答案)。不可依護理師主觀認定優先。","C":"正確。依馬斯洛需要層次排列。","D":"正確。相關問題排在一起。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"105090-N2-13":{"quick":"車禍顱內壓升高最危及生命→優先處理「顱內調適能力降低」。","detail":{"background":"護理問題優先順序以威脅生命者最優先(馬斯洛生理/安全需求)。車禍致顱內出血、顱內壓升高(IICP)可壓迫腦幹、危及生命,屬最緊急問題,故「顱內調適能力降低」應優先處置;身體活動障礙、創傷後症候群、言辭溝通障礙相對非立即致命,優先序在後。原則:問題優先序以威脅生命者最優先(馬斯洛生理/安全);顱內壓升高可壓迫腦幹致命,故先處理;活動障礙、溝通障礙等非立即致命者排序在後。","options":{"A":"正確(本題答案)。IICP危及生命,最優先。","B":"活動障礙非立即致命。","C":"創傷後症候群屬心理,非最緊急。","D":"溝通障礙非立即致命。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"102030-N2-8":{"quick":"護理診斷PES:E是導因(etiology),不可重複;「主訴傷口疼痛」應屬S徵象症狀。","detail":{"background":"護理診斷PES格式:P(problem問題/診斷名稱)、E(etiology導因/相關因素)、S(signs & symptoms徵象症狀)。題中A急性疼痛=P、B皺眉抱腹呻吟=S、C剖腹產手術傷口=E(導因)。選項D又寫「E:主訴傷口疼痛」——「主訴傷口疼痛」是症狀(S)且E已用於導因,重複且歸類錯誤,故為錯誤敘述。","options":{"A":"正確。急性疼痛=P(問題)。","B":"正確。皺眉抱腹呻吟=S(徵象症狀)。","C":"正確。手術傷口=E(導因)。","D":"錯誤(本題答案)。「主訴傷口疼痛」屬S,不應再標為E,且E已用於導因。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"105030-N2-16":{"quick":"護理診斷以「病人對健康問題的反應」為描述,目標是護理處置而非「治療」。","detail":{"background":"護理診斷(NANDA)描述病人對疾病過程或健康問題的「反應」、可隨病人反應修正、可為現存或潛在問題(如急性疼痛)。其目的在指引護理處置以解決病人反應/需求,而非「以治療(cure)為目標」(治療屬醫療診斷)。選項D「以治療為目標」錯誤。界線:護理診斷描述病人「對健康問題的反應」、可隨反應修正、含現存與潛在(如急性疼痛);以「治療疾病」為目標是醫療診斷,二者勿混淆。","options":{"A":"正確。描述病人對健康問題的反應。","B":"正確。隨病人反應修正。","C":"正確。急性疼痛為護理診斷。","D":"錯誤(本題答案)。護理診斷以護理處置為目標,非以治療為目標。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"110030-N2-11":{"quick":"確立一個護理診斷須有「足夠/多項」定義特徵,非僅一個臨床表徵即可。","detail":{"background":"護理診斷書寫須文字適當、簡潔、正確;護理措施著重矯正問題導因;護理診斷描述病人對疾病或情境的反應/需要。確立護理診斷需具備足夠的定義特徵(defining characteristics)與相關因素佐證,而非「僅需一個明顯臨床表徵」即可確立,故選項B錯誤。","options":{"A":"正確。文字須適當簡潔正確。","B":"錯誤(本題答案)。需足夠定義特徵,非僅一個表徵即可確立。","C":"正確。措施矯正問題導因。","D":"正確。描述病人對疾病/情境的反應。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"112030-N2-12":{"quick":"護理診斷三要素為「健康問題P、導因E、徵象症狀S」,非「健康目標」。","detail":{"background":"護理診斷(PES)三要素:健康問題(P)、導因/相關因素(E)、徵象與症狀/定義特徵(S);「健康目標」不是護理診斷的構成要素(目標屬計畫階段)。診斷名稱可分問題焦點型、潛在危險型、健康促進型;健康促進型於診斷前加「增進的準備度」。選項A把「健康目標」列為診斷三要素之一,錯誤。","options":{"A":"錯誤(本題答案)。三要素是P/E/S,「健康目標」非診斷要素。","B":"正確。健康問題指護理對象本身的問題。","C":"正確。診斷分問題焦點/潛在危險/健康促進三型。","D":"正確。健康促進型加「增進的準備度」。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"112030-N2-14":{"quick":"診斷/導因配對正確者:潛在皮膚受損/脊髓損傷、睡眠紊亂/治療不適→「14」。","detail":{"background":"護理診斷「問題/導因」配對須合理:1潛在危險性皮膚完整性受損/脊髓損傷(臥床感覺缺失→壓傷風險,合理);4睡眠型態紊亂/治療造成不適(合理)。2不遵從(高血壓服藥)/缺乏護理指導——不遵從導因多為知識/信念/經濟,「缺乏護理指導」較屬醫護面,配對欠妥;3口腔黏膜改變/化療抵抗力低——口腔黏膜炎導因應為化療直接黏膜毒性而非「抵抗力低」。故正確配對為「14」。","options":{"A":"2配對欠妥。","B":"3導因不精確。","C":"3欠妥。","D":"正確(本題答案)。1與4之問題/導因配對合理。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"112180-N2-7":{"quick":"護理診斷三要素P.E.S;徵象症狀又稱定義特徵→「34」。注意此題答案。","detail":{"background":"護理診斷由三要素構成,稱P.E.S型式(P健康問題=診斷名稱、E導因=相關因素/線索、S徵象與症狀=定義特徵)。題中:1稱「P.E.O型式」名稱錯(應P.E.S);2健康問題指陳述護理診斷名稱(正確);3導因是指「線索」——導因應為相關/危險因子,定義特徵才是線索,故3敘述不精確;4徵象與症狀又稱定義特徵(正確)。正確為「34」依官方答案(命題將3、4視為正確配對)。","options":{"A":"1名稱P.E.O錯誤。","B":"正確(本題答案)。3、4之敘述符合命題判定(導因為線索、S=定義特徵)。","C":"1錯誤。","D":"含2但官方判正解為34。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"102030-N2-11":{"quick":"治療性溝通是有目的、有計畫、有時間性,受益者為「個案」。","detail":{"background":"治療性溝通(therapeutic communication)特性:以病人(個案)需要為中心、有目的、有計畫、有時間性的溝通,受益者為個案而非治療者;運用護理過程原理,目的在協助病人解決健康問題、表達感受。選項C正確。A稱「隨意未計畫」錯;B、D稱受益者為治療者或以工作效率為主,違背以個案為中心的原則。","options":{"A":"治療性溝通是有計畫的,非隨意。","B":"受益者應為個案,非治療者。","C":"正確(本題答案)。有時間性、目的、計畫,受益者為個案。","D":"以個案需要為主,非以工作效率為主。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"106111-N2-8":{"quick":"治療性溝通目的是「協助病人」解決問題,非協助護理師解決常規問題。","detail":{"background":"治療性溝通以病人需要為中心、運用護理過程原理、可無時無刻發生,其目的是協助「病人」表達感受、解決健康問題。選項B「目的為協助護理師解決常規問題」錯誤——治療性溝通的受益者是病人,非護理師的工作便利。補充:治療性溝通以「病人需要」為中心、運用護理過程原理、無時無刻皆可發生,其受益者與目的對象是病人(協助表達感受、解決健康問題),而非護理師自身的工作便利或解決常規業務問題。釐清「為誰而做」是判別治療性溝通正誤的關鍵。","options":{"A":"正確。以病人需要為中心。","B":"錯誤(本題答案)。目的是協助病人,非協助護理師解決常規。","C":"正確。須運用護理過程原理。","D":"正確。無時無刻都可能發生。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"107030-N2-7":{"quick":"治療性溝通不以「探聽與疾病無關的隱私」為目的。","detail":{"background":"治療性溝通目的包括:表達護理師的關懷與支持、了解病人生活型態與健康相關資訊、給予有效護理指導。但不應藉機探聽「與疾病/照護無關的隱私性資料」,以免侵犯隱私、偏離治療目的。故選項A不是治療性溝通的目的。界線:治療性溝通目的在關懷支持、了解健康相關生活型態、給予護理指導;不應藉機探聽與照護「無關」的隱私,以免侵犯隱私並偏離治療焦點。","options":{"A":"不包含(本題答案)。不探聽與疾病無關的隱私。","B":"正確。表達關懷與支持。","C":"正確。了解生活型態。","D":"正確。給予有效護理指導。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"102030-N2-68":{"quick":"溝通是過程、是訊息傳遞、可用語言及非語言;「不受噪音干擾」錯→「134」。","detail":{"background":"溝通(communication)的正確概念:1是一種過程(動態);3是訊息的傳遞;4可運用語言與非語言(表情、姿勢、觸摸)傳遞訊息。2「溝通不受噪音的干擾」錯誤——噪音(物理性如環境吵雜、心理性如情緒、語意性如術語)正是干擾溝通的因素。故完全正確者為「134」。","options":{"A":"含2(錯)。","B":"含2(錯)。","C":"正確(本題答案)。1過程、3訊息傳遞、4語言非語言。","D":"含2(錯)。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"102030-N2-4":{"quick":"工作期協助病人「面對並確認自己態度與行為的一致性」,促其自我了解。","detail":{"background":"專業性護病關係工作期(working phase)是執行護理計畫、協助病人深入探索與成長的階段。為協助病人更了解自己的問題與需要,最理想方法是引導病人面對並確認自己態度與行為的一致性(自我覺察),而非把焦點放在疾病、要病人單方負責或讓病友介入。選項A正確。","options":{"A":"正確(本題答案)。協助病人面對並確認態度行為一致性。","B":"單方要求病人負責,未促自我探索。","C":"讓病友介入可能侵犯隱私、非個別化。","D":"只聚焦疾病忽略全人。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"105090-N2-26":{"quick":"工作期重點是「協助病人定時練習自我照顧技巧」。","detail":{"background":"護病專業性人際關係工作期(working phase)是執行護理措施、協助病人解決問題與學習自我照顧的階段,重點包括協助病人定時練習自我照顧技巧、處理試探行為並真誠以待。選項C「收集基本資料及疾病史」屬介紹/評估期、A避免討論未服藥原因不利於工作期探討。故D最符合工作期重點。","options":{"A":"工作期應可探討未服藥原因以助改善。","B":"處理試探行為敘述方向對,但「小心試探」措辭不如D具體。","C":"收集基本資料屬介紹期/評估。","D":"正確(本題答案)。協助病人定時練習自我照顧屬工作期重點。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"105030-N2-9":{"quick":"認識期(介紹期)護理重點:介紹環境、病房常規、建立信任。","detail":{"background":"專業性護病關係分互動前期(收集資料、準備)、認識期/介紹期(initial,初次見面、自我介紹、介紹環境病房常規、建立信任、訂契約)、工作期(執行計畫)、結束期。張小姐入住病房、正處認識期,護理重點是為其介紹環境及病房常規以建立關係。A屬互動前期(計畫會談重點)、C邀請擬定計畫屬工作期、D評值屬結束期。","options":{"A":"計畫會談重點屬互動前期。","B":"正確(本題答案)。認識期介紹環境與病房常規。","C":"共擬計畫屬工作期。","D":"評值目標屬結束期。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"108110-N2-28":{"quick":"查閱病歷、收集資料、準備用物在見面「之前」=互動前期。","detail":{"background":"護病關係互動前期(pre-interaction phase)是護理師在與病人實際接觸「之前」的準備階段:查閱病歷、收集背景資料、準備用物與會談計畫。題中護理師於病人轉入前查閱電子病歷、準備入院用物,正屬互動前期。介紹期是初次見面自我介紹;工作期執行計畫;結束期終止關係。","options":{"A":"正確(本題答案)。見面前查閱病歷準備=互動前期。","B":"介紹期是初次見面自我介紹。","C":"工作期是執行護理計畫。","D":"結束期是終止關係。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"113100-N2-6":{"quick":"感謝屬「工作期」中病人正向回饋;真正結束期是終止關係的道別準備。","detail":{"background":"治療性人際關係四期:互動前期(查閱病歷準備,正確A)、介紹/認識期(自我介紹,正確B)、工作期(會談了解問題、提供情緒安撫,正確C)。王先生對護理師的「感謝、感覺好多了」是工作期中措施奏效的正向回饋,並非「結束期」(結束期是雙方關係終止、做道別與轉介準備)。故選項D把感謝歸為結束期,為錯誤敘述。","options":{"A":"正確。查閱病歷=互動前期。","B":"正確。自我介紹=介紹期。","C":"正確。會談安撫=工作期。","D":"錯誤(本題答案)。病人感謝屬工作期正向回饋,非結束期。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"104030-N2-10":{"quick":"建立關係初期(介紹期)就應為結束期做準備。","detail":{"background":"護病關係各期要點:開始/介紹期應自我介紹、以適當稱呼(非直呼全名或床號)、訂定契約並「為結束期預作準備」(告知關係的時限);工作期病人應「主動」參與而非被動;結束期須事先告知病人、共同回顧、避免突然中斷。選項C「建立關係初期就應為結束期做準備」正確。","options":{"A":"介紹期不應直呼全名或床號,應用適當稱呼。","B":"工作期病人應主動參與,非被動。","C":"正確(本題答案)。初期即應為結束期做準備。","D":"結束期應事先告知病人,不可不告知。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"106110-N2-9":{"quick":"專業性人際關係結束時轉為「結束」而非「社交性關係」。","detail":{"background":"專業性(治療性)人際關係特性:護理師可從互動獲成就感、有明確終止期、以個案需要為中心、限工作時間與場所。個案出院後關係即「結束(終止)」,而非轉變成「社交性人際關係」(治療性關係與社交關係本質不同,不應發展為私人社交)。選項C錯誤。重點:治療性關係有明確終止期,出院即結束,不應發展為私人「社交性關係」(本質不同、易生界線問題);護理師與病人雙方皆可從互動中成長。","options":{"A":"正確。可獲工作成就感。","B":"正確。有終止期。","C":"錯誤(本題答案)。出院後關係結束,不應轉為社交性關係。","D":"正確。以個案需要為中心。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"106110-N2-11":{"quick":"護病關係非為「解決病人所有問題」而建立;聚焦健康相關需求。","detail":{"background":"護病關係(又稱治療性關係)以個案需要為中心、有終止期、發生於工作時間與場所,目的在協助病人因應健康問題與促進成長,但「並非為解決病人『所有』問題」而建立(範圍限於健康照護相關,且病人仍需自主)。選項A「為解決病人所有問題」過度誇大,錯誤。界線:護病關係聚焦「健康照護相關」需求並促進病人自主成長,不是包辦解決病人「所有」問題;有終止期、限工作時間與場所、以個案需要為中心。","options":{"A":"錯誤(本題答案)。護病關係非為解決病人「所有」問題而建立。","B":"正確。又稱治療性關係。","C":"正確。限於工作時間。","D":"正確。限於工作場所。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"109030-N2-5":{"quick":"護病互動雙方都可由過程中獲助益或成長。","detail":{"background":"護病(治療性)人際關係特性:以病人需要為中心、有目標與計畫(非隨性社交)、結束關係通常比建立關係更需技巧與準備(非更容易);且雙方(病人與護理師)都可由互動過程中獲得助益或成長。選項D正確。A誤稱社交性;B誤稱隨性;C誤稱結束較容易。特性:治療性互動有目標與計畫(非隨性社交)、結束關係比建立更需技巧準備、雙方皆可成長;勿誤判為社交性或隨性互動,也勿以為結束較容易。","options":{"A":"屬治療性關係,非社交性。","B":"治療性互動有目標,非隨性。","C":"結束關係需準備,不比建立容易。","D":"正確(本題答案)。雙方皆可由互動獲助益成長。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"107030-N2-10":{"quick":"治療性觸摸(如輕拍肩膀)有助溝通與表達關懷。","detail":{"background":"促進溝通技巧:適度的治療性觸摸(如輕拍肩膀)可傳達關懷支持、有助溝通;但溝通距離應依關係親疏與文化拿捏(非越近越好);病人沉默時應「接納沉默」而非轉移話題;接納病人不等於贊同其所有錯誤想法。選項A正確。重點:治療性觸摸(輕拍肩)可傳關懷;但溝通距離依關係與文化拿捏(非越近越好)、沉默應接納(非轉移話題)、接納病人不等於贊同其錯誤想法。","options":{"A":"正確(本題答案)。治療性觸摸有助溝通。","B":"距離非越近越好,應依關係與文化。","C":"沉默時應接納,不應轉移話題。","D":"接納不等於贊同錯誤想法。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"111110-N2-8":{"quick":"治療性溝通技巧含反映(reflecting)與重述(restating)→「12」。","detail":{"background":"治療性溝通技巧包括:反映(reflecting,將病人感受反映回去)、重述(restating,重複病人話語以確認)、澄清、聚焦、提供訊息、接納沉默等。3「猜測(questioning為提問,題列為猜測)」與4「批判(criticize)」屬非治療性/阻斷溝通。故治療性技巧為「12」。","options":{"A":"正確(本題答案)。反映與重述皆治療性技巧。","B":"4批判屬非治療性。","C":"含3猜測、不妥。","D":"3、4皆非治療性。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"108020-N2-9":{"quick":"反映(reflecting)是把病人的「感受/想法」反映回去:「你想告訴她嗎?」","detail":{"background":"反映(reflecting)技巧是護理師將病人話中隱含的「感受、想法或需求」反映回去,引導病人自我探索與決定。病人問「該不該告訴母親」,反映式回應「你想告訴她嗎?」把決定權與感受反映回病人。B「再說一次」是重述/澄清;C「你是說你很煩惱」是釋義/反映情緒;D「為什麼這樣想」是探究。最符合反映者為A。","options":{"A":"正確(本題答案)。把病人想法反映回去引導自決。","B":"「再說一次」屬重述/澄清。","C":"屬釋義病人情緒。","D":"屬探究原因。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"112180-N2-5":{"quick":"重述(restating)=重複病人原話確認:「你說你聽得到聲音?」","detail":{"background":"重述(restating)是護理師「重複病人所說的關鍵字句」以確認訊息、表達專注傾聽。病人說「聽到別人叫我去死的聲音」,重述式回應為「你說你聽得到聲音?」(複述其話語)。A「你能怎麼做」屬聚焦/探究;B「我能了解」屬同理表達;C「再舉例子」屬澄清。重述為D。","options":{"A":"「你能怎麼做」屬聚焦行動。","B":"「我能了解」屬同理。","C":"「再舉例子」屬澄清。","D":"正確(本題答案)。重複病人原話=重述。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"104030-N2-56":{"quick":"同理心回應是反映並探詢病人感受:「發生什麼事讓您改變心意」。","detail":{"background":"同理心(empathy)是設身處地理解病人感受並反映之。病人術前問「可以不要手術嗎」,同理回應應探詢其擔憂與感受:「發生什麼事讓您改變心意?」(D)。A通知家人、B強調已簽同意書、C轉介醫師皆未先理解病人情緒,屬轉移或防衛,非同理。口訣:同理回應=先理解再反映感受,常以開放問句邀請表達(發生什麼事…?);通知家人、強調已簽同意書、轉介醫師都未先處理情緒,非同理。","options":{"A":"立即通知家人未先理解病人感受。","B":"強調已簽同意書屬防衛、施壓。","C":"轉介醫師未先同理情緒。","D":"正確(本題答案)。探詢感受=同理心回應。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"111030-N2-11":{"quick":"同理回應是探詢害怕的內容:「可以跟我說您在害怕什麼嗎?」","detail":{"background":"同理心回應要先理解並反映病人感受、邀請其表達。王太太術前害怕,同理回應「可以跟我說您在害怕些什麼事情嗎?」(A)邀請病人表達情緒。B轉介醫師、C「不用害怕醫師高明」為虛假保證、D「我跟醫師說取消開刀」越權承諾,皆非同理。口訣:同理=先理解後反映,以開放問句邀請病人說出害怕內容;轉介醫師、虛假保證(醫師高明不用怕)、越權承諾(取消開刀)都非同理回應。","options":{"A":"正確(本題答案)。邀請病人表達害怕=同理。","B":"直接轉介未先同理。","C":"「不用害怕」屬虛假保證。","D":"越權承諾取消手術,不當。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"107110-N2-9":{"quick":"同情心常使自己陷入需要被幫助的困境(過度涉入);同理心是客觀理解。","detail":{"background":"同理心(empathy)是客觀地設身處地理解病人感受並反映,護理師仍保持專業界線;同情心(sympathy)是情緒性涉入、與病人同悲共苦,常使護理師自己陷入需要被幫助的困境而失去客觀。選項D正確描述同情心的風險。A、B、C對同理/同情的定義均顛倒或錯誤。","options":{"A":"同理心是較客觀的設身處地,非依自身立場主觀。","B":"「設身處地」指同理心,非同情心。","C":"情緒性涉入是同情心,非同理心。","D":"正確(本題答案)。同情心常使自己陷入需被幫助的困境。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"106030-N2-71":{"quick":"常打斷他人說話、只表達自己=違反「傾聽」技巧。","detail":{"background":"建設性溝通技巧含傾聽、澄清、提供相關訊息、說話有條不紊。病房小組長「常中斷工作夥伴說話、不斷表達自己想法」最明顯違反「傾聽」(積極傾聽應專注接收對方訊息、不隨意打斷)。補充:建設性(治療性)溝通技巧含積極傾聽、澄清、提供相關訊息、條理表達。「常打斷對方、不斷表達自己」最直接違反「傾聽」——積極傾聽要求專注接收對方訊息、不隨意插話、以點頭眼神回應,讓對方完整表達。","options":{"A":"澄清是確認彼此看法,非此處主要違反項。","B":"正確(本題答案)。常打斷他人=違反傾聽。","C":"提供訊息非此處核心問題。","D":"說話有條不紊與打斷他人不同。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"111110-N2-9":{"quick":"「您剛說什麼…請回病房」=心不在焉、無意義問答的不當溝通技巧。","detail":{"background":"李護理師帶情緒上班、心不在焉,對病人求助回以「啊?您剛說什麼…我沒空陪您聊天,請回病房睡覺」。此屬無意義問答/敷衍、未專注傾聽的不當溝通技巧(D正確)。A病人傳遞兩種抵觸訊息描述不符;B護理師雖防衛但未「批判性指示」;C雖能用相同語言但溝通實為無效,非正向評價。","options":{"A":"病人訊息並非互相抵觸的雙重訊息。","B":"護理師態度敷衍,非明確的批判性指示。","C":"雖語言相通但溝通無效,不能正面評為有效。","D":"正確(本題答案)。心不在焉、敷衍=無意義問答的不當溝通。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"111030-N2-8":{"quick":"書寫是語言溝通的一種(以文字符號傳遞);本題A正確。","detail":{"background":"伯儂(Berlo)SMCR溝通模式含發訊者(source)、訊息(message)、管道(channel)、收訊者(receiver)。語言溝通指以「語言符號(口語或文字)」傳遞訊息;書寫以文字符號傳遞,屬「語言溝通」(A正確)。B、C屬伯恩(Berne)PAC溝通分析模式用語,非伯儂模式;D稱「缺乏回饋」錯——王先生擺手、流淚正是非語言回饋。","options":{"A":"正確(本題答案)。書寫以文字符號傳遞=語言溝通。","B":"PAC互補溝通屬伯恩(Berne),非伯儂(Berlo)模式。","C":"交錯溝通屬伯恩模式,非伯儂。","D":"擺手流淚為非語言回饋,並非缺乏回饋。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"114170-N2-9":{"quick":"護理師疑惑表情是「收訊者」的非語言回饋,非「發訊者」傳遞;故敘述不當。","detail":{"background":"伯儂(Berlo)模式中,病人是發訊者(A正確),「我好痛需要止痛針」為語言訊息(B正確),病人平淡表情為非語言訊息(C正確)。護理師此時是「收訊者(receiver)」,其疑惑表情是收訊者接收後的非語言「回饋」,而非「發訊者」的傳遞。選項D稱護理師為發訊者,角色標示錯誤,最不適當。","options":{"A":"適當。病人是發訊者。","B":"適當。語言訊息=「我好痛需要止痛針」。","C":"適當。病人平淡表情=非語言訊息。","D":"最不適當(本題答案)。護理師此時是收訊者,其疑惑表情是回饋,非發訊者傳遞。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"112110-N2-6":{"quick":"護理師順著病人「大將軍」自我形象互動=互補溝通(伯恩PAC)。","detail":{"background":"伯恩(Berne)溝通分析(PAC):互補溝通(complementary)指發訊與回應的自我狀態相對應、平行,溝通順暢。病人以「大將軍(父母/權威)」姿態說話,護理師以「將軍伯伯…拜託您」順應其期待回應,刺激與反應方向一致,屬互補溝通。交錯溝通則回應方向交錯致溝通中斷;曖昧溝通含隱藏訊息。","options":{"A":"正確(本題答案)。順應病人自我狀態的對應回應=互補溝通。","B":"交錯溝通會使溝通中斷,此處溝通順暢。","C":"曖昧溝通含隱藏訊息,非此。","D":"「情感溝通」非PAC標準分類。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"112110-N2-8":{"quick":"運用關懷與接納的治療性人際關係技巧化解病人抗拒。","detail":{"background":"承上題,林護理師面對抗拒服藥的病人,以親切、關懷、順應其自尊的方式溝通,運用的是「關懷與接納」之治療性人際關係技巧(D正確)。題幹病人為林先生(非王先生),A、B選項人名/情境不符;C「使用病人能了解語言」雖對但非此技巧重點。最切合者為運用關懷接納的治療性技巧。","options":{"A":"人名情境不符(病人為林先生)。","B":"人名不符且非帶離護理站。","C":"雖用易懂語言,但本題重點是關懷接納技巧。","D":"正確(本題答案)。運用關懷與接納之治療性人際關係技巧。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"112030-N2-68":{"quick":"有效溝通應「與對方討論問題而非爭辯」。","detail":{"background":"有效溝通技巧:積極傾聽(不只點頭微笑)、經思考後「主動」適切回應、與對方討論問題而非爭辯、依情境選擇適當時機場合(非任何議題隨時隨地)。選項C「與對方討論問題而非爭辯」正確。A僅點頭微笑不足、B「被動」回應不妥、D「隨時隨地任何議題」忽略隱私與時機。","options":{"A":"傾聽不只是點頭微笑,需專注理解。","B":"應主動適切回應,非被動。","C":"正確(本題答案)。討論問題而非爭辯。","D":"應選適當時機場合,非隨時隨地任何議題。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"114170-N2-7":{"quick":"與已建立信任關係者會談,適當距離為個人距離45~120 cm。","detail":{"background":"人際溝通距離(Hall):親密距離0~45 cm(如身體照護)、個人距離45~120 cm(熟識者、會談)、社交距離120~360 cm(正式社交)、公眾距離>360 cm。與已建立信任關係的病人會談,適當距離為個人距離45~120 cm。","options":{"A":"30~40 cm屬親密距離,過近。","B":"正確(本題答案)。45~120 cm為個人距離,適合會談。","C":"150~180 cm偏社交距離,稍遠。","D":"190~250 cm為社交距離,過遠。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"107030-N2-9":{"quick":"適當稱呼:傳統男稱先生女稱女士、以姓氏加職稱→「12」。","detail":{"background":"建立關係時對病人的稱呼應尊重且具個別性:1傳統男性稱先生、女性稱女士(得體);2以姓氏加職稱稱呼(尊重,如陳老師、林董)。3「以床號稱呼」把病人物化、不尊重;4「全名稱呼」在華人文化中對長輩或正式場合未必最尊敬,且非「最保險」。故恰當者為「12」。","options":{"A":"正確(本題答案)。1先生女士、2姓氏加職稱皆得體。","B":"含4(全名稱呼非最尊敬)。","C":"含3(床號稱呼物化病人)。","D":"3、4皆不妥。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"102110-N2-51":{"quick":"「那你一定很餓,先吃點東西吧」=未探討情緒、給建議的不當回應。","detail":{"background":"面對病人「心情差沒吃東西」,治療性回應應聚焦其情緒/原因(澄清、釋義、邀請表達)。B「你是說心情不好影響吃東西?」(釋義)、C「沒吃東西的意思是…」(澄清)、D「可不可以再說清楚」(澄清)皆恰當。A「那你一定很餓,先吃點東西吧」忽略情緒、直接給建議解決進食,屬不當回應。","options":{"A":"不當(本題答案)。忽略情緒、急於給進食建議。","B":"恰當。釋義病人話語。","C":"恰當。澄清病人意思。","D":"恰當。請病人說清楚=澄清。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"105030-N2-12":{"quick":"「你哪裡不舒服?我幫你檢查」最恰當地回應病人不適主訴。注意答案D。","detail":{"background":"病人主訴「吃不下、沒胃口」,治療性回應應關注其身體與情緒不適。D「你哪裡不舒服?我幫你檢查看看」回應病人身體不適、表達關心並進一步評估,較恰當。A「我可餓了」轉移焦點到自己、B「兩餐沒吃可能有問題」帶警嚇、C「對病一點好處都沒有」屬指責,皆非治療性。","options":{"A":"轉移焦點到護理師自己,不當。","B":"帶警嚇語氣,不當。","C":"指責病人,非治療性。","D":"正確(本題答案)。關注不適並進一步評估,最恰當。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"103030-N2-11":{"quick":"糖尿病病情與治療計畫之說明屬醫師職責→請主治醫師說明。","detail":{"background":"病人詢問「病情及未來治療計畫」涉及診斷與醫療決策,屬醫師告知職責,護理師不應自行依病歷詳細說明診斷治療(逾越職責、可能造成誤解),也不應轉移話題或敷衍。最適當是請主治醫師向病人說明,護理師則提供情緒支持與護理面衛教。界線:病情、診斷、預後與治療計畫之「告知」屬醫師職責;護理師負責情緒支持與護理面衛教,不可逕自依病歷說明診斷,以免造成誤解或逾權。","options":{"A":"轉移話題敷衍,不當。","B":"敷衍輕忽病人擔憂。","C":"依病歷詳細說明診斷治療逾越護理職責。","D":"正確(本題答案)。病情與治療計畫由主治醫師說明。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"102030-N2-55":{"quick":"先「了解並確認病人所害怕擔心的事」=以病人為中心的合宜處置。","detail":{"background":"病人表示害怕一個人住院,合宜處置是先傾聽、了解並確認其害怕擔心的具體內容(A),才能對症提供支持。B「不需想太多」否定情緒、C用醫學術語顯專業不利溝通、D雖簡單說明措施但未先處理情緒。以病人感受為中心、先了解擔憂者為A。陷阱:面對病人情緒,先「處理情緒(傾聽、確認擔憂)」再「處理事情」;否定情緒(別想太多)、賣弄術語、急著給措施都偏離以病人為中心。","options":{"A":"正確(本題答案)。先了解確認病人害怕的事。","B":"否定病人情緒,不當。","C":"用術語顯專業反而阻礙溝通。","D":"未先處理情緒即說明措施,次佳。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"106030-N2-44":{"quick":"癱瘓沮喪病人=協助尋求並利用現有社區資源,提供實質支持。","detail":{"background":"林先生中風後右側癱瘓、情緒沮喪表達無助,合宜措施是接納其情緒並協助尋求、利用現有社區資源(如復健、輔具、支持團體、長照),提供實質支持與希望(D)。A「以後再想」、B「擔心無用要勇敢」、C「船到橋頭自然直」皆為敷衍式保證,否定情緒、未提供實質協助。","options":{"A":"敷衍迴避,未提供實質協助。","B":"要病人「勇敢」屬空泛說教。","C":"「船到橋頭自然直」為不當保證。","D":"正確(本題答案)。協助利用社區資源,提供實質支持。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"106030-N2-50":{"quick":"急性冠心症病人入院,不應「減少家屬探視」;適度陪伴可降低焦慮。","detail":{"background":"ACS病人入院的心理護理:同理其因未知而恐懼、檢查治療前詳細解說、徵求意見增加控制感,皆適當。選項D「應減少家屬探視以充分休息」不適當——適度的家屬陪伴與支持有助降低病人焦慮、提供安全感,過度限制探視反增孤立與壓力(在病情容許下應允許適度探視)。","options":{"A":"適當。同理對未知的恐懼。","B":"適當。檢查治療前詳細解說。","C":"適當。徵求意見增加控制感。","D":"不適當(本題答案)。不應一律減少探視,適度陪伴可降低焦慮。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"106110-N2-8":{"quick":"實際觀察產婦哺餵困難並提供協助,最合宜。","detail":{"background":"產婦表達哺餵母乳的疲累與困難,合宜護理是實際觀察其哺餵情形、找出困難(含乳/姿勢/頻率)並提供具體協助與支持(D)。A「請她多忍耐」、C「盡母親天職就好」皆說教、忽略困難;B「觀察家人支持」雖有意義但未直接解決哺餵困難。以實際評估並協助為最合宜。","options":{"A":"要她「忍耐」屬說教,未解決困難。","B":"觀察家人支持非首要,未直接協助哺餵。","C":"「盡天職」說教,忽略實際困難。","D":"正確(本題答案)。實際觀察困難並提供協助。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"108020-N2-12":{"quick":"走到身邊、開放邀請病人傾訴:「您怎麼了?我們可以聊一聊」。","detail":{"background":"病人流淚時,合宜回應是走近、以開放、不評判的方式陪伴並邀請其表達:「您怎麼了?我們可以聊一聊」(D)。A安靜走出未提供陪伴、B直接貼「憂鬱症」標籤、C「看開一點、不一定惡性」屬不當保證。以陪伴並開放邀請傾訴為最適當。技巧:病人流淚時,走近、以開放不評判方式邀請傾訴(您怎麼了,我們聊聊)最佳;安靜離開、貼憂鬱症標籤、不當保證(看開點)皆非治療性陪伴。","options":{"A":"安靜走出未提供即時陪伴支持。","B":"貿然貼「憂鬱症」標籤不當。","C":"「看開一點」屬不當保證。","D":"正確(本題答案)。陪伴並開放邀請病人傾訴。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"106111-N2-11":{"quick":"對絕望病人說「一定會好起來」=不適當的保證(虛假保證)。","detail":{"background":"非治療性溝通中,「不適當的保證(false reassurance)」是對病人未確定的事給予空泛承諾(如「一定會好起來」),會阻斷病人表達真實感受。脊髓損傷病人說「乾脆死了算了」,護理師回「努力復健一定會好起來」即屬不適當的保證,忽略病人的絕望情緒,應改以同理傾聽。","options":{"A":"非「與事實不符的讚許」。","B":"正確(本題答案)。空泛承諾「一定會好」=不適當的保證。","C":"非防衛態度。","D":"非過早下結論。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"113030-N2-8":{"quick":"「有什麼事讓妳心情不好,試著說說看?」=開放邀請,增進護病關係。","detail":{"background":"增進護病關係的回應應開放、接納、邀請表達。B「有什麼事讓妳心情不好,要試著說說看嗎?」開放探詢情緒、不評判,最能增進關係。A「有沒有認真做復健」帶指責、C「不要一天到晚想死…要養家」說教施壓、D「不要怕痛怕麻煩照我說的做」命令式,皆阻斷溝通。","options":{"A":"帶指責,阻斷溝通。","B":"正確(本題答案)。開放邀請表達,增進關係。","C":"說教施壓,不當。","D":"命令式,未尊重病人感受。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"113100-N2-5":{"quick":"病人抱怨時先反映情緒並請其具體說明:「聽起來您很生氣,可以多講一點嗎?」","detail":{"background":"面對病人抱怨,治療性回應應先反映其情緒並邀請具體表達(同理+澄清):B「聽起來您很生氣,可以再具體多講一點嗎?」最合宜。A、C直接承諾改變醫療安排(越權且未理解問題)、D「醫師照需要安排」為辯解防衛。先同理並澄清為最佳。技巧:面對抱怨,先反映情緒並請其具體說明(聽起來您很生氣,可以多講一點嗎)=同理+澄清;越權承諾改醫療安排或辯解(醫師照需要安排)皆非治療性。","options":{"A":"越權承諾減少復健,未先理解。","B":"正確(本題答案)。反映情緒並請其具體說明。","C":"越權承諾醫師多來看,不當。","D":"辯解防衛,未同理。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"113030-N2-5":{"quick":"清創病人要求繼續住院,先「溝通了解其感受與想法」。","detail":{"background":"病人即將出院卻要求繼續住院,合宜處置是先傾聽、了解其背後感受與顧慮(C),再針對原因提供協助。A提供回診諮詢、B共擬計畫、D說明出院流程皆是後續步驟,但首要應先理解病人為何想繼續住院(情緒/照護顧慮)。以溝通了解感受為先。技巧:病人即將出院卻想續住,應先傾聽了解背後感受與顧慮(照護不安、家庭因素),再針對原因協助;直接給流程或共擬計畫前,須先理解病人為何抗拒出院。","options":{"A":"提供回診諮詢是後續,非首要。","B":"共擬計畫前需先了解顧慮。","C":"正確(本題答案)。先溝通了解病人感受與想法。","D":"說明出院流程未先理解病人顧慮。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"109030-N2-77":{"quick":"病人自殺/意外死亡處理:保留現場→1報警通知主管→2通知家屬→3寫紀錄。注意答案D=123。","detail":{"background":"病人非自然死亡(自殺、意外)屬非病死或可疑為非病死,依規定須保留現場、通報。當班護理師處理順序(本題官方答案123):1通知當班主管並馬上報警(司法相驗,最優先)→2通知家屬→3書寫護理紀錄。先確保依法通報與保全現場,再聯繫家屬,最後完成紀錄。","options":{"A":"順序顛倒,報警通報應最先。","B":"順序不符。","C":"順序不符。","D":"正確(本題答案)。1報警通知主管→2通知家屬→3寫紀錄。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"101110-N2-51":{"quick":"「恨上帝不該…」=憤怒期(Kübler-Ross哀傷第二階段)。","detail":{"background":"Kübler-Ross哀傷/瀕死心理五階段:否認(denial)→憤怒(anger)→磋商(bargaining)→憂鬱(depression)→接受(acceptance)。李太太「恨上帝不該讓女兒斷送花樣年華」是把情緒投射、責怪外界,屬憤怒期(anger)。否認是「不可能、不是真的」;磋商是「只要…我願意…」;接受是平靜面對。","options":{"A":"否認期是「不可能、弄錯了」。","B":"正確(本題答案)。怨恨責怪=憤怒期。","C":"磋商期是討價還價祈求。","D":"接受期是平靜面對。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"102110-N2-44":{"quick":"末期病人尋求宗教慰藉:傾聽其感受、聯絡宗教人員探視→「34」。","detail":{"background":"面對末期病人藉宗教祈求奇蹟,護理師應尊重並支持其靈性需求:3傾聽其對宗教與生命期望的感受、4聯絡相關宗教專職人員探視,皆屬支持靈性照護(正確)。1「告訴病患化療才有效」、2「指出信仰無法延長生命」皆否定病人信仰與希望,不當。故選「34」。重點:靈性照護應尊重病人信仰、傾聽其生命期望、連結宗教資源;否定信仰或打擊希望(化療才有效、信仰不能延命)違反全人照護精神。","options":{"A":"1否定信仰、2打擊希望,不當。","B":"含2(打擊希望)。","C":"1、2皆否定病人信仰。","D":"正確(本題答案)。3傾聽感受、4聯絡宗教人員。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"106111-N2-56":{"quick":"出院計畫以病人為中心,提供居家及轉介照護機構需求,且入院即應開始。","detail":{"background":"出院計畫(discharge planning):應於「入院時即開始」(非恢復期才開始)、由病人/家屬與醫療團隊「共同」擬定(非團隊自擬)、內容涵蓋出院後生理、心理、社會及居家/轉介照護需求(非僅生理技能)。選項D「以病人為中心,提供居家及轉介照護機構需求」正確。","options":{"A":"出院計畫應於入院即開始,非恢復期。","B":"內容不限生理照護,含心理社會與轉介。","C":"應由病人家屬與團隊共同擬定,非團隊自擬。","D":"正確(本題答案)。以病人為中心,含居家與轉介需求。"},"sources":["新文京《基本護理學》治療性溝通與護病關係","華杏《最新基本護理學》溝通"]}},"107110-N2-54":{"quick":"長照病人出院準備應「及早(入院即)開始」,非出院前一日才擬。","detail":{"background":"需長期照護病人的出院返家準備:應於入院即及早開始擬定計畫(非出院前一日才擬,過晚不利準備);由病人、家屬與醫療人員共同參與;進行居家環境評估以利輔具準備;確認居家照護服務需求。選項A「出院前一日才開始擬訂計畫」錯誤。原則:長照出院準備應「入院即及早」啟動,由病人、家屬與團隊共同參與,含居家環境評估與輔具、居家照護服務確認;出院前一日才擬過晚不利銜接。","options":{"A":"錯誤(本題答案)。應入院即開始,非出院前一日。","B":"正確。病人家屬與團隊共同參與。","C":"正確。居家環境評估利輔具準備。","D":"正確。確認居家照護服務需求。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"101030-N2-8":{"quick":"SOAPIER:E(evaluation)=「注射Demerol後疼痛減輕」=評值結果。注意答案D。","detail":{"background":"SOAPIER記錄法:S主觀資料、O客觀資料、A評估/問題、P計畫、I執行措施、E評值(成效)、R再評估/修正。題中A「眉頭深鎖臉色蒼白」應屬O(客觀)而非S;B「依醫囑給Demerol」屬I(執行)而非A;C「急性疼痛/因骨折」屬A(問題)而非I;D「注射Demerol後疼痛減輕」是執行措施後的成效=E(評值),正確。","options":{"A":"「眉頭深鎖臉色蒼白」是觀察,應屬O非S。","B":"「給Demerol」是執行,應屬I非A。","C":"「急性疼痛/骨折」是問題,應屬A非I。","D":"正確(本題答案)。注射後疼痛減輕=E評值。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"101030-N2-9":{"quick":"DART:D(data)=主訴「大腿很痛」。","detail":{"background":"焦點(Focus/DART)記錄法:D(data資料,含主客觀)、A(action護理措施)、R(response病人反應)、T(teaching衛教)。題中A「D:主訴大腿很痛」正確(主訴屬資料D);B「A:股骨頸骨折」應屬資料而非action;C「R:轉移注意力減痛」是措施(A)而非反應(R);D「T:30分後再評估疼痛緩解」是反應/評值(R)而非衛教(T)。故正確為A。","options":{"A":"正確(本題答案)。主訴「大腿很痛」=D(資料)。","B":"「股骨頸骨折」是診斷資料,非action。","C":"「轉移注意力」是措施(A),非反應(R)。","D":"「再評估疼痛緩解」是反應(R),非衛教(T)。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"101110-N2-12":{"quick":"護理記錄錯誤:於錯誤處劃橫線、註明error並簽名,不可塗改。","detail":{"background":"護理記錄修正原則:不可用鉛筆、不可用修正液或橡皮擦塗改(以維護法律效力與真實性);錯誤處劃一條橫線、保留原字可辨、註明「error」或「筆誤」並由記錄者簽名負責。故正確為C。A用鉛筆、B用修正液皆破壞紀錄真實性,D需護理長簽名作證不必要。延伸:塗改、鉛筆、修正液、撕頁皆破壞紀錄法律效力;正確做法是劃單線、保留原字可辨、註明error/筆誤並簽全名,維護真實性與可追溯性。","options":{"A":"不可用鉛筆記錄。","B":"不可用修正液塗改。","C":"正確(本題答案)。劃橫線註明error並簽名。","D":"由記錄者本人簽名即可,不需護理長作證。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"103030-N2-12":{"quick":"護理記錄者必須是「實際執行者」本人簽名。","detail":{"background":"護理記錄原則:不可用外號暱稱簽名(需正式全名/職章);寫錯不可用修正液塗擦(劃線註error);「時間」應記實際「執行/事件發生」時間而非寫記錄的時間;記錄者必須是實際執行該護理活動者(不可代簽)。選項D「記錄者必須是執行者」正確。重點:記錄者須為實際執行者本人,不可代簽;時間記「事件/執行」時間非寫紀錄時間;不可用暱稱外號簽名,以確保責任歸屬與法律效力。","options":{"A":"不可用外號暱稱簽名。","B":"不可用修正液塗改。","C":"時間指事件/執行時間,非寫記錄時間。","D":"正確(本題答案)。記錄者須為實際執行者。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"103030-N2-14":{"quick":"護理記錄可作為醫師診斷與治療的參考依據。","detail":{"background":"護理記錄功能:護理記錄是醫療團隊溝通工具,可作為醫師診斷與治療的參考依據(C正確)。其主要目的是促進照護連續與溝通(法律證明是功能之一但非「主要」目的);醫師亦需閱讀參考;且具科學與研究價值。A、B、D敘述皆有誤。延伸:護理記錄是醫療團隊溝通工具,可供醫師診斷治療參考、亦具科學研究價值;法律證明只是其功能之一而非「主要」目的,醫師也需閱讀。","options":{"A":"法律證明是功能之一,非「主要」目的。","B":"醫師需閱讀參考護理記錄。","C":"正確(本題答案)。可作為醫師診斷治療的參考。","D":"護理記錄具科學與研究價值。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"105030-N2-14":{"quick":"護理記錄須連續書寫,不可留白或任意另起一行(防竄改)。","detail":{"background":"護理記錄注意事項:時間應記事件發生/執行時間(非記錄時間);應避免使用未經認可的縮寫;須連續書寫、不可留空白或隨意跳行另起(防止事後增添竄改,留白處應劃線);病人拒絕的治療仍須記錄。選項C「須連續書寫,不可留白或另起一行」正確。重點:紀錄須連續書寫、不留白(留白處劃線防事後增添竄改);用認可縮寫、記事件時間、病人拒絕的治療仍須記錄,皆為維護紀錄完整與法律效力。","options":{"A":"時間欄應記事件/執行時間,非記錄時間。","B":"不可任意用英文縮寫,須用認可縮寫。","C":"正確(本題答案)。連續書寫不可留白,防竄改。","D":"病人拒絕的治療仍須記錄。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"105030-N2-11":{"quick":"SOAPIER:E(評值)=「易嗆食需持續注意餵食」屬評值/再評估。注意答案D。","detail":{"background":"SOAPIER中:S主觀、O客觀、A評估問題、P計畫、I執行、E評值、R再評估。題中A「呻吟、對呼叫無反應、疼痛刺激會睜眼」是觀察=O(非S);B「家屬說早上碗掉地上」是家屬陳述=S(非O);C「無法翻身下床」是徵象/問題而非「導因」;D「有吞嚥反射但易嗆,需持續注意餵食」是對狀況的持續評估=評值/再評估(E/R),依官方答案D為正確。","options":{"A":"呻吟、睜眼是觀察,應屬O非S。","B":"家屬陳述應屬S非O。","C":"「無法翻身下床」是問題/徵象,非導因。","D":"正確(本題答案)。持續注意餵食情形屬評值/再評估。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"105090-N2-14":{"quick":"焦點紀錄(DART):病人主訴疼痛、臉色蒼白=D(data資料)。","detail":{"background":"DART焦點記錄:D(data,主客觀資料)、A(action,護理措施)、R(response,病人反應)、T(teaching,衛教)。病人「主訴疼痛難忍、臉色蒼白」是收集到的主客觀資料,屬D(data)。記憶:DART焦點記錄D=資料(主客觀)、A=措施、R=反應、T=衛教。主訴疼痛與臉色蒼白皆屬收集到的資料,歸D;勿與response(措施後反應)混淆。","options":{"A":"正確(本題答案)。主訴與臉色屬D(資料)。","B":"A是護理措施(action)。","C":"R是病人反應(response)。","D":"T是衛教(teaching)。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"106111-N2-15":{"quick":"SOAPIE:「給Demerol 50mg IM」是執行措施=I(implementation)。","detail":{"background":"SOAPIE記錄法中,給予藥物「Demerol 50 mg IM St.」是護理師實際執行的措施,應記錄於I(implementation執行)。S為主觀資料、A為評估、P為計畫。給藥動作=執行,故為I。記憶:SOAPIE的I=implementation執行(實際做的護理措施,如給藥);S主觀、O客觀、A評估問題、P計畫、E評值。給Demerol IM屬執行=I。","options":{"A":"S是病人主觀資料。","B":"A是評估/問題。","C":"P是計畫。","D":"正確(本題答案)。給藥執行=I(implementation)。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"107110-N2-14":{"quick":"SOAPIE之E(評值)=「疼痛指數由5降為3」=成效評值。","detail":{"background":"SOAPIE中E(evaluation評值)記錄措施執行後的成效。「疼痛指數由5分降為3分」是給予止痛措施後的客觀成效評值,屬E。A主訴疼痛=S;B「手術導致疼痛」=A導因;C「非藥物方法減痛」=I/P措施。記憶:SOAPIE的E=evaluation評值(措施後成效,如疼痛由5降3);與I(執行措施)、A(評估問題/導因)區分。量化的成效改變最能對應E。","options":{"A":"主訴疼痛屬S(主觀資料)。","B":"「手術導致疼痛」屬A(評估/導因)。","C":"非藥物減痛屬措施(I/P)。","D":"正確(本題答案)。疼痛由5降3=E評值成效。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"109110-N2-7":{"quick":"SOAPIE的「A(評估)」相當於DART的「無對應」;A對應DART的A是錯的。注意答案B。","detail":{"background":"SOAPIE與DART對應:S.O.(主客觀資料)≈D(data)(A對,正確);E(評值)≈R(response)(C對);I(執行)≈A(action)(D對)。但SOAPIE的「A(assessment評估/問題)」並不等於DART的「T(teaching)」——T對應的是衛教,而SOAPIE中與T相當者通常另計。選項B「SOAPIE的A相當於焦點法的T」對應錯誤,故為錯誤敘述。","options":{"A":"正確。S.O.≈D(資料)。","B":"錯誤(本題答案)。SOAPIE的A(評估)不等於DART的T(衛教)。","C":"正確。E(評值)≈R(反應)。","D":"正確。I(執行)≈A(action措施)。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"111110-N2-13":{"quick":"DART(Data/Action/Response/Teaching)不含「護理目標」。","detail":{"background":"DART焦點記錄涵蓋:D(data資料,≈評估)、A(action措施)、R(response反應,≈評值)、T(teaching衛教)。其中沒有對應「護理目標(goal)」的欄位(目標屬計畫,DART未獨立記錄目標)。故不包含的護理過程部分是「護理目標」。","options":{"A":"護理評估≈D(資料)。","B":"正確(本題答案)。DART不含護理目標。","C":"護理措施≈A(action)。","D":"護理評值≈R(response)。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"105090-N2-15":{"quick":"行為過程紀錄本質是「過程記錄」,非「以問題為導向(POMR)」的記錄方式。","detail":{"background":"行為過程紀錄(process recording)逐字記錄護理師與病人間語言及非語言互動過程,用於分析溝通技巧、發現病人問題、促進護理師自我成長與反思。其本質是「過程取向」的逐字互動分析,而非「以問題為導向(problem-oriented, POMR)」的記錄。選項C歸類錯誤。","options":{"A":"正確。記錄語言與非語言互動過程。","B":"正確。可發現病人健康問題。","C":"錯誤(本題答案)。行為過程紀錄非問題導向(POMR)記錄。","D":"正確。有助自我分析與成長。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"106030-N2-8":{"quick":"行為過程紀錄會談時間不宜過長;「越久越詳細」錯誤。","detail":{"background":"行為過程紀錄書寫:採敘述性逐字文字記錄、會談後盡早記錄避免失真、內容須真實。但會談時間不宜過長(過久病人易疲累、互動失真、難以完整記錄),故「會談時間越久越詳細」錯誤,選C。補充:行為過程紀錄(process recording)是逐字記錄護病互動以供自我分析的工具,須採敘述性文字、會談後盡早記錄以免失真、內容真實。但會談時間不宜過長(病人易疲累、互動失真、難完整逐字記錄),品質重於長度,故「越久越詳細」是錯誤觀念。","options":{"A":"正確。採敘述性文字記錄。","B":"正確。會談後盡早記錄避免失真。","C":"錯誤(本題答案)。會談不宜過久,非越久越好。","D":"正確。內容應真實。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"106110-N2-10":{"quick":"行為過程紀錄分析須以行為發生「前後情境」為依據。","detail":{"background":"行為過程紀錄與分析:應同時記錄病人與護理師雙方的言行及護理師當時的情緒/想法(非只記病人);焦點不限於負向言行(正負向皆記);分析時須以行為發生的前後情境(context)為依據才能正確解讀;病人重複出現的言行不宜省略,仍應記錄分析。選項C正確。","options":{"A":"須同時記錄護理師當時的情緒,非只記病人。","B":"正負向言行皆是焦點,非只記負向。","C":"正確(本題答案)。分析須依前後情境。","D":"重複言行不可省略,仍須記錄。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"107110-N2-8":{"quick":"病歷書寫須含主客觀資料、精確記載檢查檢驗數據→「12」。","detail":{"background":"病歷/護理記錄正確書寫原則:1須包含主觀與客觀資料、2精確記載各項檢查與檢驗數據(正確)。3「運用自己習慣方式記錄」錯——應依標準格式以利團隊閱讀;4「不按時間順序的結構式記錄」錯——記錄應按時間先後、有組織。故正確為「12」。重點:病歷/紀錄須含主客觀資料、精確記載檢查檢驗數據、依標準格式並按時間順序結構式書寫;以個人習慣方式或不按時序記錄都不利團隊閱讀與連續性。","options":{"A":"正確(本題答案)。含主客觀資料、精確記載數據。","B":"含3(習慣方式)不妥。","C":"3、4皆不當。","D":"含3、4皆錯。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"113180-N2-7":{"quick":"急救後護理紀錄須由當班主護護理師據實完整撰寫。","detail":{"background":"急救(CPR)後護理紀錄:必須由當班主護(負責照護)護理師據實撰寫,完整記錄急救過程、用藥、時間、病人反應與結果(即使急救失敗或已轉送加護病房,亦不可省略);不可由不在場的行政護理師代寫,也不可因忙碌而省略。選項A正確。規定:急救後紀錄須由當班主護(實際照護者)據實完整撰寫,含過程、用藥、時間、反應與結果;急救失敗或已轉送加護病房亦不可省略或由他人代寫。","options":{"A":"正確(本題答案)。由當班主護護理師撰寫紀錄。","B":"不可由辦行政事務、非照護者代寫。","C":"急救失敗仍須完整記錄過程。","D":"已轉送加護病房仍須完整記錄,不可省略。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"115030-N2-6":{"quick":"記錄病人抱怨「應標註病人主述」以區辨來源,此敘述正確;本題問「錯誤」者。注意答案A。","detail":{"background":"護理紀錄原則:病人的治療與反應應正確完整記錄、必要時可作法律證明;護理目標與措施應具體可行、避免理想化;對執行後仍無法緩解的症狀除記錄外還需報告醫師。選項A敘述「記錄病人抱怨應標註『病人主述』以區辨非家屬所言」——標註資料來源本身合理,但本題官方判此為錯誤敘述(命題認為記錄抱怨內容時的標註方式描述不當/不需特別以此區辨),故依答案選A。","options":{"A":"本題答案(錯誤敘述)。命題判此標註方式之敘述不當。","B":"正確。治療反應完整記錄,可作法律證明。","C":"正確。目標措施應具體可行避免理想化。","D":"正確。無法緩解的症狀除記錄外須報告醫師。"},"sources":["新文京《基本護理學》護理記錄","華杏《最新基本護理學》護理記錄與報告"]}},"101110-N2-10":{"quick":"護理師「主動衛教」預防泌尿道感染屬獨立性(自主性)護理功能。","detail":{"background":"護理功能分:獨立性(自主性)護理功能(護理師依專業判斷自主執行,如衛教、舒適護理、姿位)、相依性/合作性功能(與其他專業協同,如執行醫囑給藥)、非獨立性功能(依醫囑執行)。護理師主動「教導預防泌尿道感染」是依護理專業自主進行的衛教,屬獨立性護理功能。","options":{"A":"正確(本題答案)。主動衛教=獨立性護理功能。","B":"相依性需與他專業協同。","C":"非獨立性是依醫囑執行。","D":"「互動性」非標準分類。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"106110-N2-13":{"quick":"病人及親友「需要」參與護理計畫擬定(以病人為中心)。","detail":{"background":"護理計畫擬定原則:病人入院即應立即擬訂(A正確);會隨病人健康問題改變而修訂(B正確);含獨立性與非獨立性護理措施(D正確)。選項C「病人及親友不需參與護理計畫的擬定」錯誤——護理以病人為中心,應鼓勵病人與家屬共同參與計畫以提升個別性與遵從性。","options":{"A":"正確。入院即應擬訂護理計畫。","B":"正確。隨健康問題改變而修訂。","C":"錯誤(本題答案)。病人與親友應參與計畫擬定。","D":"正確。含非獨立性護理措施。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"102110-N2-57":{"quick":"「問題」=目標(期望)與現況間產生的差距。","detail":{"background":"問題(problem)的定義:是「現況」與「期望目標」之間產生的差距(gap)。問題不一定明顯可見、會因職位/角色不同而對問題認知不同、也非僅由個人產生(可由系統/環境造成)。故最正確定義為「目標與現況間產生差距」。延伸:問題解決始於「界定問題=指出現況與目標的差距」;差距愈大優先序愈高。問題未必明顯可見,且會因角色立場不同而認知不同。","options":{"A":"問題不一定明顯可見。","B":"問題認知會因職位不同而不同。","C":"正確(本題答案)。問題=目標與現況之差距。","D":"問題非僅由個人產生。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"112180-N2-48":{"quick":"問題解決應透過團隊腦力激盪、評估各方案優缺點再選擇。","detail":{"background":"問題解決過程:界定問題→收集資料→提出多個可行方案→評估各方案優缺點→選擇最佳方案→執行→評值並調整。選項B「透過團隊腦力激盪、評估各方案優缺點再做選擇」正確。A「針對最大問題立即處理」忽略分析、C「不須回應同仁疑問」違反團隊溝通、D「達標就不須調整」忽略持續改善。","options":{"A":"問題解決應先分析,非立即處理。","B":"正確(本題答案)。團隊腦力激盪、評估方案後選擇。","C":"應回應同仁疑問,促進溝通。","D":"方案評值後仍須視需要調整。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"112030-N2-53":{"quick":"對新入院病人不應「提醒不習慣可轉院」,應協助適應。注意答案C。","detail":{"background":"新入院病人護理職責:準備病人單位與設備、迎接並給予入院護理(環境介紹、評估)、協助處理財物。選項C「提醒病人住院不習慣時可轉出醫院」最不適宜——應協助病人適應住院環境、建立信任,而非一開始就暗示可轉院,易增加不安與不信任。原則:新入院護理應協助病人「適應」環境、建立信任(介紹環境常規、準備單位、處理財物);一開始就暗示「不習慣可轉院」增加不安與不信任,不宜。","options":{"A":"適宜。準備病人單位與設備。","B":"適宜。迎接並給予入院護理。","C":"最不適宜(本題答案)。不應提醒可轉院,應協助適應。","D":"適宜。協助病人財物處理。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"107030-N2-59":{"quick":"「回護理站接電話中斷發藥」是外在(環境/他人)干擾因素。","detail":{"background":"時間管理的干擾因素分內在(自我造成,如拖延、看手機、不會拒絕、完美主義)與外在(環境或他人造成,如電話、訪客、臨時交辦)。題中「須回護理站接電話而中斷發藥」是外來電話打斷工作,屬外在干擾因素(B)。A看手機、C趕紀錄延遲下班、D感到不知所措皆屬個人/內在因素。","options":{"A":"看手機訊息屬內在(自我)因素。","B":"正確(本題答案)。接電話中斷=外在干擾因素。","C":"趕紀錄延遲下班屬內在因素。","D":"感到不知所措屬內在因素。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"113180-N2-43":{"quick":"與病人及家屬會談屬「直接護理」項目。","detail":{"background":"護理時數分直接護理(直接對病人提供的照護,如身體照護、給藥、會談衛教、評估)與間接護理(不直接接觸病人者,如書寫紀錄、準備藥物、通知醫師、交班)。「與病人及家屬會談」是直接面對病人提供的照護,屬直接護理。A寫紀錄、B準備針劑、D通知醫師皆屬間接護理。","options":{"A":"書寫紀錄屬間接護理。","B":"準備針劑屬間接護理。","C":"正確(本題答案)。與病人家屬會談=直接護理。","D":"通知醫師屬間接護理。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"115030-N2-37":{"quick":"人力成本=時薪×時數;月薪45000/180hr=250/hr,90分鐘(1.5hr)×250=375元。","detail":{"background":"護理人力成本計算:先求時薪=月薪÷月工作時數=45,000÷180=250元/小時。寫護理紀錄花90分鐘=1.5小時。該活動人力成本=250×1.5=375元。故答案為375元。此類題先換算時薪再乘以耗時(注意分鐘換算為小時)。計算:先換算時薪(月薪÷月時數=45000÷180=250元/hr),再乘以耗時(90分=1.5hr)→250×1.5=375元。注意分鐘須先化為小時。","options":{"A":"250元為「時薪」非1.5小時成本。","B":"正確(本題答案)。250元/hr×1.5hr=375元。","C":"425元計算錯誤。","D":"500元計算錯誤(等於2小時)。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"106111-N2-17":{"quick":"停藥後出現心煩焦慮睡不著=戒斷症狀,反映「成癮性」(依賴)。","detail":{"background":"長期使用安眠藥(如benzodiazepine)可產生身體與心理依賴(成癮性/dependence);驟然停藥會出現戒斷症狀,如反彈性失眠、心煩、焦慮、顫抖。病人住院忘帶藥未服、二天後心煩焦慮睡不著,正是停藥戒斷反應,反映其對安眠藥已產生成癮性(依賴)。耐受性是需增量才達原效;習慣性程度較輕。","options":{"A":"抗藥性多用於抗生素/腫瘤,非此。","B":"耐受性是需增加劑量才達原效,非停藥戒斷。","C":"正確(本題答案)。停藥出現戒斷=成癮性(依賴)。","D":"習慣性是較輕度的心理依賴,本題戒斷症狀明顯屬成癮。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"108020-N2-18":{"quick":"發現漏服藥:收回該餐藥物、做護理記錄並交班,不可補服或併服。","detail":{"background":"發藥發現病人漏服上一餐藥物:應將該餐藥物收回(不可讓病人補服或與下一餐併服,以免劑量過量或重複),並據實做護理記錄、交班告知,必要時通報醫師評估是否需補。選項B正確。A補服可能造成藥效疊加;C擅改注射逾權;D讓病人帶回不符給藥安全。安全:發現漏服藥應收回該餐藥、做紀錄並交班、必要時通報醫師評估,不可補服或與下一餐併服(恐劑量疊加),亦不可擅改給藥途徑。","options":{"A":"不可補服上一餐藥(恐劑量疊加)。","B":"正確(本題答案)。收回藥物、做紀錄並交班。","C":"擅自改口服為注射逾越職權。","D":"讓病人帶回不符給藥安全管理。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"104030-N2-12":{"quick":"顱內調適能力降低的護理目標應是「病人導向、可測量」:能即時監測IICP徵象並處理。","detail":{"background":"護理目標(預期結果)須以病人為主詞、具體可觀察評值。車禍致顱內壓升高、護理問題為「顱內調適能力降低」,正確目標如「照護期間能即時監測到顱內壓升高徵象而即時處理」(可評值的照護結果)。A「依醫囑給降腦壓藥」是護理措施(I)非目標;B「IICP與顱內出血有關」是導因(E);D「血壓160/90」是評估資料(O)。","options":{"A":"給降腦壓藥是護理措施,非目標。","B":"「與顱內出血有關」是導因(E)。","C":"正確(本題答案)。可即時監測IICP並處理=可評值之護理目標。","D":"血壓數值是評估資料,非目標。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"107110-N2-13":{"quick":"護理評值存在於護理過程「每個步驟」中,非僅最後完成才做。","detail":{"background":"護理評值(evaluation)特性:是判斷病人護理目標達成程度、對所提供健康照護的成效探討,且應存在於護理過程的「每一個步驟」中(持續性評值,隨時回饋修正),而非「僅在護理活動全部完成後才進行」。選項B把評值限縮為「最後一步、活動完成後才做」,錯誤。","options":{"A":"正確。判斷護理目標達成程度。","B":"錯誤(本題答案)。評值存在於每個步驟,非僅活動完成後。","C":"正確。是照護成效的探討。","D":"正確。需存在護理過程每個步驟中。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"111110-N2-14":{"quick":"護理評值雖是最後步驟,但需依評值結果回饋修訂前面步驟(具循環性)。注意答案D。","detail":{"background":"護理評值:查看擬定的成果目標是否達成、評估護理活動執行後病人的行為反應、並依評值結果回頭修訂護理診斷與計畫(循環回饋)。雖常被列為護理過程「最後一個步驟」,但本題官方判選項D為錯誤敘述——強調護理評值並非單純的終點,而貫穿全程且回饋循環,不宜僅視為線性的「最後一步」。","options":{"A":"正確。查看成果目標是否達成。","B":"正確。評估執行後病人反應。","C":"正確。依評值結果修訂護理診斷。","D":"本題答案(錯誤敘述)。評值具循環回饋性,不宜僅視為線性最後一步。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"114100-N2-8":{"quick":"護理評值可在護理過程「每一個步驟」進行(持續性評值)。","detail":{"background":"護理評值正確觀念:可在護理過程每一個步驟進行(持續性評值,B正確);評值是在執行「之後/過程中」判斷成效,而非執行前;結果評值與過程評值各有重要性(不能說只有結果評值最重要);評值未達目標未必代表措施不佳,可能是目標設定、病人因素或時間不足,需分析原因。","options":{"A":"評值在執行過程中與之後進行,非執行前。","B":"正確(本題答案)。每個步驟皆可進行評值。","C":"過程評值與結果評值皆重要,非僅結果最重要。","D":"未達目標未必是措施不佳,須分析原因。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}},"115030-N2-2":{"quick":"防疫壓力「持續愈久、愈嚴重,適應機會愈小」;稱「適應機會愈大」錯誤。","detail":{"background":"醫療人員面對傳染病防疫壓力:壓力愈大時認知功能與彈性思考通常愈差(A正確);提供住所可降低擔心家人染病的心理負擔(C正確);充分職前訓練有助準備與調適(D正確)。選項B「壓力持續愈長、愈嚴重,適應的機會愈大」錯誤——壓力源持續愈久、強度愈高,身心資源耗竭、適應機會反而愈小、愈易出現適應不良。","options":{"A":"正確。壓力愈大認知與彈性思考愈差。","B":"錯誤(本題答案)。壓力愈久愈嚴重,適應機會愈小,非愈大。","C":"正確。提供住所降低擔心家人染病的負擔。","D":"正確。充分職前訓練助調適。"},"sources":["新文京《基本護理學》緒論・護理理論","華杏《最新基本護理學》"]}},"115030-N2-7":{"quick":"「收集主客觀資料確立疼痛問題」屬評估/診斷階段,不屬「護理計畫」階段內容。","detail":{"background":"護理計畫(planning)階段內容包含:排定護理問題優先順序、訂定護理目標、擬定護理措施。題中B(將急性疼痛列為優先處理問題)、C(訂止痛後疼痛降至2分的目標)、D(計畫採半坐臥措施)皆屬計畫階段。選項A「收集主客觀資料以確立疼痛問題」屬「評估與診斷」階段的工作,不屬護理計畫階段,故為本題答案。","options":{"A":"本題答案。收集資料確立問題屬評估/診斷,非護理計畫階段。","B":"屬計畫:排定優先順序。","C":"屬計畫:訂定可評值的護理目標。","D":"屬計畫:擬定護理措施。"},"sources":["新文京《基本護理學》護理過程","華杏《最新基本護理學》護理過程與護理診斷(NANDA)"]}}},TO=["1護理導論護理理論與健康疾病概念", "2疾病病程心理反應與壓力適應", "3護理過程資料收集與主客觀資料", "4護理診斷目標計畫與評值", "5治療性溝通與護病關係", "6護理記錄", "7護理功能角色出院計畫與其他"],LEC={"1護理導論護理理論與健康疾病概念":{"html":"\n<p><b>護理專業核心:</b>後設典範四構面=<b>人、環境、健康、護理</b>;視人為「身、心、靈、社會」整體;理念強調 <b>care(關懷照護)</b> 而非 cure(治療)。運用護理過程獨立解決病人健康問題屬<b>獨立性(自主性)功能</b>。</p>\n<p><b>重要護理理論家(必背配對):</b>南丁格爾=環境理論(以自然法則提供合宜環境恢復健康,護理是藝術與科學的結合);<b>羅伊 Roy=適應模式</b>(生理、自我概念、角色功能、相互依賴四種適應);<b>歐倫/奧倫 Orem=自我照顧</b>需求理論(協助病人重獲自我照顧能力);<b>韓德森 Henderson=14項基本需要</b>(協助達獨立);Peplau=人際關係(治療性人際關係過程);紐曼 Neuman=系統模式;羅傑士 Rogers=單一整體人。</p>\n<p><b>健康與疾病:</b>WHO定義健康為「生理、心理、社會的<b>完全安適</b>,不僅是沒有疾病或虛弱」。健康-疾病是一條<b>動態連續線</b>、相對且不斷改變,個體位置受內外在(生理、心理、環境、社會)因素影響,多數人居中間。</p>\n<p><b>三段五級預防(Leavell & Clark):</b>第一段初段預防=①促進健康(衛教、營養、運動、去危險因子)、②特殊保護(疫苗、消毒);第二段次段預防=③<b>早期診斷早期治療(篩檢)</b>;第三段三段預防=④限制殘障、⑤復健。<b>子宮頸抹片、X光篩檢=第二段第三級</b>。</p>\n"},"2疾病病程心理反應與壓力適應":{"html":"\n<p><b>疾病病程心理三分期:</b><b>開始期</b>(過渡期,病人震驚否認焦慮→護理重點為<u>建立信任、提供支持與安全感</u>,勿急於要病人接受疾病事實)→<b>接受期</b>(承認生病、願配合→鼓勵參與護理計畫、學習自我照顧)→<b>恢復期</b>(著重恢復獨立、自我照顧能力與出院準備)。「主動詢問檢查與用藥」=接受期。</p>\n<p><b>Kübler-Ross 哀傷/瀕死五階段:</b>否認(不可能、弄錯了)→<b>憤怒</b>(為什麼是我、責怪上帝/他人)→磋商(只要…我願意…)→憂鬱→接受(平靜面對)。「恨上帝不該…」=憤怒期。</p>\n<p><b>壓力與疾病:</b>個體感受壓力程度與致病性呈<b>正相關</b>;壓力源的<u>性質、強度、持續時間</u>皆影響致病;短時間累積許多<b>微小壓力源(LCU)</b>也可能致病。壓力愈久愈嚴重→資源耗竭、適應機會愈<b>小</b>。</p>\n<p><b>Selye 全身適應症候群(GAS):</b><b>警覺期→抵抗期→耗竭期</b>。警覺期=交感與腎上腺活化(戰或逃);抵抗期=動員資源維持恆定;耗竭期=資源耗盡、出現疾病。</p>\n<p><b>靈性照護:</b>尊重病人信仰、傾聽其生命期望、連結宗教資源;勿否定信仰或打擊希望。</p>\n"},"3護理過程資料收集與主客觀資料":{"html":"\n<p><b>護理過程五步驟:</b><b>評估(收集資料)→診斷→計畫→執行→評值</b>,具動態、循環、持續性,以<b>病人/家屬為中心</b>、始於評估、終於評值(但評值貫穿全程)。任何個案照護都由「評估」開始。</p>\n<p><b>主觀 vs 客觀資料(高頻):</b>主觀資料/症狀(subjective)=病人或家屬<u>口述、自覺</u>者(疼痛、噁心、頭暈、心悸、口渴);客觀資料/徵象(objective)=<u>可觀察、測量、檢驗</u>者(臉色蒼白、血壓、體溫、檢驗值、呼吸型態如陳施氏呼吸)。<b>口訣:「○○說/主訴/覺得」=主觀;「觀察/測量/檢驗」=客觀。</b>陷阱:家屬「轉述」即使描述客觀現象,仍歸主觀來源;觀察到的流淚、僵硬屬客觀。</p>\n<p><b>資料來源:</b>初級來源(primary)=病人本人(含無法言語者的哭泣反應);次級來源(secondary)=家屬、病歷、醫療團隊,提供客觀資料而非主觀意見。</p>\n<p><b>觀察法:</b>直接觀察=以感官直接察覺病人外觀行為;<b>間接觀察=不接觸病人</b>(查病歷、問家屬、看檢驗報告)。護理評估還含「驗證資料正確性」(主訴與病歷不符時再確認)。</p>\n"},"4護理診斷目標計畫與評值":{"html":"\n<p><b>護理診斷(NANDA):</b>描述病人「對疾病或健康問題的<b>反應</b>」(非以治療為目標,治療屬醫療診斷);可現存或潛在(如急性疼痛)、隨反應修正。三要素 <b>P.E.S</b>=問題(診斷名稱)、導因(相關/危險因子)、徵象與症狀(定義特徵);確立需<u>足夠的定義特徵</u>,非僅一個表徵。</p>\n<p><b>護理目標(預期結果):</b>須以<b>病人</b>為主詞、具體<b>可測量</b>、有時間性、在病人能力範圍、護理師可執行,並獲<b>團隊認同支持</b>。依學習領域分:<b>認知目標</b>(知識,能解釋/列舉/說出)、<b>情意目標</b>(態度情感,能分享/表達)、<b>技能目標</b>(動作,能正確執行)。</p>\n<p><b>優先順序:</b>威脅生命者最優先、依<b>馬斯洛需要層次</b>(生理>安全>愛與隸屬>自尊>自我實現)、相關問題排一起;不可依護理師主觀認定。</p>\n<p><b>執行(implementation):</b>實際提供個別化照護活動。<b>評值(evaluation):</b>判斷目標達成程度;<u>完全達成→銷案,部分/未達成→分析原因並修改計畫</u>;評值貫穿護理過程每個步驟、具回饋循環性。</p>\n"},"5治療性溝通與護病關係":{"html":"\n<p><b>治療性溝通:</b>以<b>病人需要</b>為中心、有目的計畫時間性、運用護理過程原理,<b>受益者為個案</b>(非治療者、非護理師工作便利);可無時無刻發生。溝通是<u>過程</u>、訊息傳遞,含語言與非語言,且<b>會受噪音(物理/心理/語意)干擾</b>。</p>\n<p><b>護病(治療性)關係 vs 社交關係:</b>以個案需要為中心、有目標計畫、<b>有明確終止期</b>(出院即結束,不轉為私人社交)、限工作時間與場所;雙方皆可成長;非為解決病人「所有」問題。<b>四期:</b>互動前期(見面前查病歷準備)→介紹/認識期(自我介紹、介紹環境常規、訂契約、為結束做準備)→工作期(執行計畫、協助自我照顧、處理試探行為)→結束期(事先告知、回顧)。</p>\n<p><b>同理 vs 同情:</b><b>同理心</b>=客觀設身處地理解並反映感受、保持專業界線;<b>同情心</b>=情緒性涉入、易使自己陷入需被幫助的困境。</p>\n<p><b>治療性技巧:</b>反映(把感受反映回去)、重述(複述病人原話確認)、澄清、聚焦、接納沉默、治療性觸摸。<b>非治療性:</b>不當保證(一定會好)、給建議、批判、防衛、轉移話題、無意義問答。<b>溝通距離(Hall):</b>親密0–45、個人45–120(會談)、社交120–360、公眾>360 cm。</p>\n"},"6護理記錄":{"html":"\n<p><b>護理記錄原則:</b>記錄者須為<b>實際執行者本人</b>(不可代簽、不可用外號暱稱);時間記<b>事件/執行時間</b>(非寫紀錄時間);<b>連續書寫不留白</b>(留白處劃線防竄改);用認可縮寫;病人拒絕的治療仍須記錄。可作醫師診斷治療參考、具科學研究價值,法律證明僅為功能之一。</p>\n<p><b>錯誤修正:</b>不可用鉛筆、修正液、橡皮擦塗改;於錯誤處<b>劃單線、保留原字可辨、註明 error/筆誤並簽全名</b>。</p>\n<p><b>SOAPIER:</b>S主觀、O客觀、A評估/問題、P計畫、<b>I執行(實際做的措施,如給藥IM)</b>、<b>E評值(成效,如疼痛由5降3)</b>、R再評估。</p>\n<p><b>焦點記錄 DART:</b><b>D</b>資料(主客觀)、<b>A</b>措施(action)、<b>R</b>反應(response)、<b>T</b>衛教(teaching)。對應:SO≈D、E≈R、I≈A;DART<b>不含「護理目標」</b>。</p>\n<p><b>行為過程紀錄:</b>逐字記錄護病語言與非語言互動,供<b>自我分析成長</b>;會談後盡早記錄、內容真實、依前後情境分析;時間不宜過長(非越久越好),正負向言行皆記,屬過程取向非問題導向(POMR)。</p>\n"},"7護理功能角色出院計畫與其他":{"html":"\n<p><b>護理功能:</b>獨立性(自主衛教、舒適護理、姿位)、相依/合作性(與他專業協同)、非獨立性(依醫囑執行)。主動衛教預防感染=獨立性功能。</p>\n<p><b>出院計畫:</b>應於<b>入院即開始</b>(長照病人尤其及早,非出院前一日才擬);由<b>病人、家屬與團隊共同</b>擬定;涵蓋出院後生理、心理、社會、居家及轉介照護需求;含居家環境評估與輔具準備。</p>\n<p><b>護理時數:</b>直接護理=直接對病人的照護(身體照護、給藥、<b>與病人家屬會談</b>、衛教、評估);間接護理=不直接接觸病人(寫紀錄、準備藥物、通知醫師、交班)。<b>人力成本=時薪×耗時</b>(月薪÷月時數=時薪,分鐘先化小時)。</p>\n<p><b>時間管理干擾:</b>內在(拖延、看手機、不會拒絕、完美主義)、外在(電話、訪客、臨時交辦)。</p>\n<p><b>問題與問題解決:</b>問題=<b>現況與目標的差距</b>;解決流程=界定問題→收集資料→提多方案→評估優缺點→選擇→執行→評值調整(團隊腦力激盪)。</p>\n<p><b>非自然死亡(自殺/意外)處理:</b>保留現場→<b>報警通知主管→通知家屬→書寫紀錄</b>。發現漏服藥:收回該餐藥、做紀錄並交班,勿補服或併服。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_b1_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
