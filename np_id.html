灶廣泛/特殊部位）」，「並非確診後一律儘速給予」——故此敘述最不適當。故答案為 (D)。處置重點在隔離（至結痂脫落）、接觸者管理與通報。", "options": {"A": "正確。人畜共通，可經密切接觸體液/病灶傳染。", "B": "正確。潛伏期約 1–21 天（通常 6–13 天）。", "C": "正確。發燒、皮膚病灶與淋巴腺腫大。", "D": "最不適當（為答案）。tecovirimat 用於重症/高風險，非一律儘速給予。"}, "sources": ["Harrison 21e；CDC Mpox guidance"]}}, "113-進階-內科-46": {"quick": "水痘重症好發 1 歲以下幼兒、免疫低下、成人及孕婦，故 (C)。", "detail": {"background": "水痘（varicella，水痘帶狀疱疹病毒 VZV 初次感染）：(A) 主要經「空氣/飛沫」傳染，「水疱液與黏膜分泌物『具傳染性』」（接觸亦可傳染）——故「沾染水疱液器械無傳染之虞」錯誤。(B) 可傳染期是「出疹『前 1–2 天』開始，到所有病灶『結痂』為止」——故「出紅疹時才開始」不完整/錯誤。(C) 「重症好發族群為 1 歲以下幼兒、免疫低下/缺陷者、成人及孕婦」——正確（成人與孕婦得水痘較易重症，孕婦另有胎兒風險）。(D) 併發症致死原因：兒童常見「續發性細菌感染/腦炎」，成人常見「水痘肺炎」——選項所述方向不準確。故正確為 (C)。預防接種水痘疫苗（活減毒，孕婦/嚴重免疫低下禁忌）。", "options": {"A": "錯。水疱液與黏膜分泌物具傳染性（接觸可傳染）。", "B": "錯。可傳染期自出疹前 1–2 天起至全部結痂為止。", "C": "正確。重症好發 1 歲以下、免疫低下、成人及孕婦。", "D": "錯。致死併發症方向不準確（成人以水痘肺炎為重要死因）。"}, "sources": ["Harrison 21e（Varicella-zoster virus）", "CDC"]}}, "113-進階-內科-73": {"quick": "麻疹為法定傳染病，應於「24 小時內」通報（非 48 小時），故敘述 (A) 不適當。", "detail": {"background": "本例「高燒、咳嗽、鼻炎、結膜炎（3C：cough, coryza, conjunctivitis）」＋「口腔『柯氏斑點（Koplik spots）』」＋耳後開始的斑丘疹——是「麻疹（measles）」的典型。(A) 麻疹為「第二類法定傳染病」，須於「24 小時內」通報衛生主管機關——故「48 小時內通報」不適當（答案）。(B) 皮疹由頭頸（耳後/髮際）向下擴散覆蓋全身，持續數日——正確。(C) 麻疹經「空氣傳染」，須採空氣傳染防護，隔離至「出疹後 4 天」——正確。(D) 接種「MMR 活性減毒疫苗」可使 95% 以上產生主動免疫——正確。故不適當者為 (A)。麻疹傳染力極強（R0 高），群體免疫需高接種率。", "options": {"A": "不適當（為答案）。麻疹須於 24 小時內通報，非 48 小時。", "B": "正確。皮疹自頭頸向下擴散覆蓋全身。", "C": "正確。採空氣傳染防護，隔離至出疹後 4 天。", "D": "正確。MMR 活減毒疫苗 95% 以上產生主動免疫。"}, "sources": ["Harrison 21e（Measles; Koplik spots）；台灣傳染病防治法"]}}, "114-進階-內科-53": {"quick": "麻疹在「出疹前」即具傳染力（出疹前後各約 4 天），故敘述 (D) 錯。", "detail": {"background": "麻疹（measles）：(A) 經「空氣、飛沫或直接接觸鼻咽分泌物」傳染（傳染力極強）——正確。(B) 前驅期症狀為「高燒≥3 天、結膜炎、流鼻水、咳嗽（3C）」與柯氏斑點，之後出疹——正確。(C) 為法定傳染病須「24 小時內」通報——正確。(D) 麻疹的可傳染期為「出疹『前』約 4 天到出疹『後』約 4 天」，「在出疹前（前驅期）即具高度傳染力」——故「要在出現疹子後才有傳染力」錯誤（這也是麻疹難防堵的原因）。故錯誤者為 (D)。", "options": {"A": "正確。經空氣/飛沫/接觸鼻咽分泌物傳染。", "B": "正確。前驅期高燒、結膜炎、流鼻水、咳嗽。", "C": "正確。24 小時內通報。", "D": "錯誤（為答案）。出疹「前」即具傳染力（出疹前後各約 4 天）。"}, "sources": ["Harrison 21e（Measles; infectious period）", "CDC"]}}, "105-TNPA-通論-68": {"quick": "導管消毒以 2% chlorhexidine-酒精優於碘酒加酒精，故敘述 (D) 不適當。", "detail": {"background": "中央靜脈導管相關血流感染（CLABSI）的預防套組（bundle）：(A) 置放時採「最大無菌面防護（maximal sterile barrier，全身覆蓋無菌單、操作者帽口罩無菌衣手套）」——正確。(B) 確實「手部衛生＋皮膚消毒＋最大無菌覆蓋」——正確。(C) 應「避免使用鼠蹊部（股靜脈）」置放（感染與血栓風險較高，首選鎖骨下/上腔路徑）——正確。(D) 皮膚消毒以「>0.5% chlorhexidine 加酒精（CHG-alcohol）」效果「優於」碘酒（povidone-iodine）；故「碘酒加酒精比 2% chlorhexidine 為佳」不正確——為答案。其他 bundle 要素：每日評估導管必要性、儘早移除。", "options": {"A": "正確。置放時採最大無菌面防護。", "B": "正確。手部衛生＋消毒＋最大無菌覆蓋。", "C": "正確。應避免鼠蹊部（股靜脈）置放。", "D": "不適當（為答案）。2% chlorhexidine-酒精消毒優於碘酒，非碘酒較佳。"}, "sources": ["CDC CLABSI prevention; chlorhexidine-alcohol skin antisepsis"]}}, "105-TNPA-通論-69": {"quick": "呼吸器相關肺炎（VAP）的口腔抗菌照護應「規律多次」，僅「每天一次」較不適當，故 (B)。", "detail": {"background": "降低呼吸器相關肺炎（VAP）的照護套組（bundle）：(A) 床頭抬高 30–45 度（除非禁忌），降低吸入——正確。(C) 每日評估鎮靜與「儘早脫離呼吸器（每日喚醒/自主呼吸試驗）」——正確。(D) 適時排空呼吸器管路積水、避免冷凝水倒流——正確。(B) 「以 chlorhexidine（CHG）漱口水執行口腔抗菌照護」是 VAP bundle 的一環，但應「規律、多次（如每數小時/每班）」執行而非「每天一次」——故「每天一次」較不適當（口腔清潔頻率不足）。其他 bundle 要素：手部衛生、維持氣囊壓力、避免不必要的更換管路。故答案為 (B)。", "options": {"A": "正確。床頭抬高 30–45 度降低吸入。", "B": "不適當（為答案）。口腔抗菌照護應規律多次，非每天一次。", "C": "正確。每日評估儘早脫離呼吸器。", "D": "正確。適時排空管路積水。"}, "sources": ["VAP prevention bundle（IHI/感染管制）"]}}, "106-106b-內科-42": {"quick": "口服輪狀病毒疫苗為活性減毒疫苗，故 (A)。", "detail": {"background": "疫苗依製程分為「活性減毒（live attenuated）」與「不活化/次單位/類毒素」等。活性減毒疫苗（含活但減弱的病原，免疫力強且持久，但免疫低下/孕婦多禁忌）包括：「口服輪狀病毒疫苗、MMR（麻疹腮腺炎德國麻疹）、水痘、卡介苗 BCG、口服小兒麻痺(OPV)、黃熱病、鼻噴流感」。本題 (A) 「口服輪狀病毒疫苗」為活減毒——正確。對照：(B) 「注射型流感疫苗」為不活化、(C) 「b 型嗜血桿菌（Hib）」為結合型多醣（不活化）、(D) 「肺炎鏈球菌疫苗」為多醣/結合型（不活化），皆非活減毒。故選 (A)。", "options": {"A": "正確。口服輪狀病毒疫苗為活性減毒疫苗。", "B": "注射型流感疫苗為不活化疫苗。", "C": "Hib 為結合型多醣疫苗（不活化）。", "D": "肺炎鏈球菌疫苗為多醣/結合型（不活化）。"}, "sources": ["ACIP vaccine classification；Harrison 21e"]}}, "106-106a-通論-56": {"quick": "一般外科手術預防性抗生素使用時間上限為「術後 24 小時」，故 (D)。", "detail": {"background": "外科照護改善計畫（Surgical Care Improvement Project, SCIP）對「預防性抗生素」的建議：(1) 於「劃刀前 60 分鐘內」給第一劑（vancomycin/fluoroquinolone 120 分鐘內）；(2) 選擇對應手術部位常見菌的抗生素；(3) 「術後在 24 小時內停用」（心臟手術可放寬至 48 小時）。故一般無併發症的外科手術預防性抗生素「時間上限為術後 24 小時」（D）。延長使用（如至不發燒、至出院）「無益且增加抗藥性與 C. difficile 風險」——A、B 錯；48 小時（C）為心臟手術之上限，非一般手術。故選 (D)。", "options": {"A": "錯。不應持續至不發燒/白血球正常（無益、增抗藥性）。", "B": "錯。不應持續口服至出院。", "C": "48 小時為心臟手術上限，非一般手術。", "D": "正確。一般手術預防性抗生素上限為術後 24 小時。"}, "sources": ["SCIP guidelines；ASHP surgical prophylaxis"]}}, "107-TNPA-內科-51": {"quick": "B 型肝炎疫苗的保護性抗體 anti-HBs 應 ≥10 mIU/mL，故 (C)。", "detail": {"background": "B 型肝炎疫苗接種後，評估是否產生「保護力」是看「表面抗體（anti-HBs）」濃度——「≥10 mIU/mL」即視為有足夠保護力（達成免疫）。未達 10 者為無/不足反應，視情況補種。完成三劑後 1–2 個月可檢測。對高風險族群（醫護、洗腎、免疫低下）特別重要。故答案為 (C) >10 mIU/mL。B 肝疫苗為基因重組（不活化）疫苗，台灣自 1986 年起新生兒全面接種，大幅降低 B 肝帶原與肝癌。", "options": {"A": ">0.1 mIU/mL 不足以判定保護力。", "B": ">1 mIU/mL 不足。", "C": "正確。anti-HBs ≥10 mIU/mL 為足夠保護力。", "D": ">100 mIU/mL 非門檻（10 即足夠）。"}, "sources": ["Harrison 21e（Hepatitis B vaccine; anti-HBs ≥10）"]}}, "108a-TNPA-內科-35": {"quick": "20–50 歲的健康成年人較不需要常規接種流感疫苗，故 (C)。", "detail": {"background": "流感疫苗的「優先/建議」接種對象為「併發症高風險族群」：65 歲以上長者、6 個月～嬰幼兒與學童、孕婦、慢性病患（心肺腎肝、糖尿病）、「重度肥胖（BMI≥30/≥40）」、免疫功能不全者、長期照護機構住民、醫護人員等。相對地，「20–50 歲、無慢性病的健康成年人」併發重症風險較低，是「較不需要（非優先）」常規公費接種的族群（C）——雖然流感疫苗對全民皆有益、亦鼓勵自費接種，但就「最不需要/非高風險」而言為健康青壯年。故選 (C)。其餘 A（重度肥胖）、B（流行期孕婦）、D（免疫不全）皆為高風險、應優先接種。", "options": {"A": "重度肥胖（BMI≥40）為高風險，應接種。", "B": "流行期孕婦為高風險，應接種。", "C": "正確（較不需要）。20–50 歲健康成年人非高風險族群。", "D": "免疫功能不全者為高風險，應接種。"}, "sources": ["ACIP/CDC 流感疫苗優先對象"]}}, "108b-TNPA-通論-77": {"quick": "撲殺所有受感染禽類是針對「傳染窩（reservoir）」的管制，故 (C)。", "detail": {"background": "傳染鏈（chain of infection）的環節包括：病原體、傳染窩/宿主（reservoir）、傳染窩出口、傳染途徑、宿主入口、感受性宿主。防疫策略對應切斷某一環。「禽流感期間撲殺所有受感染的鵝雞」是消滅「動物傳染窩（reservoir/感染源）」——直接移除病毒的動物宿主庫，屬「傳染窩管制（source/reservoir control）」（C）。對照：阻隔傳染途徑（如戴口罩、隔離、消毒環境）、減少傳染窩出口（如咳嗽禮節、傷口覆蓋）為不同環節。撲殺病禽是從源頭消除宿主，故為傳染窩管制。", "options": {"A": "「撲殺致病原」用詞不精確；撲殺的是宿主（禽），非病原本身。", "B": "阻隔傳染途徑指阻斷傳播路徑（如消毒、隔離），非撲殺宿主。", "C": "正確。撲殺受感染禽類＝管制動物傳染窩（reservoir）。", "D": "減少傳染窩出口指控制病原排出（如咳嗽禮節），非撲殺。"}, "sources": ["流行病學：傳染鏈（chain of infection）"]}}, "109-通論-其他-65": {"quick": "預防導管相關血流感染不建議「常規使用預防性抗生素」，故敘述 (B) 錯。", "detail": {"background": "導管相關血流感染（CRBSI/CLABSI）的預防核心是「無菌與照護套組」，「不包括常規預防性抗生素」（B 錯——常規預防性全身抗生素無助於預防 CLABSI，反增抗藥性，不建議）。正確的預防方式：(A) 正確手部衛生；(C) 以「酒精性 chlorhexidine（>0.5% CHG-alcohol）」消毒皮膚；(D) 嚴守無菌操作技術；另含最大無菌面防護、避免股靜脈、每日評估導管必要性並儘早移除、導管維護（換藥、接頭消毒）。故錯誤者為 (B)。", "options": {"A": "正確。正確手部衛生為基本預防。", "B": "錯誤（為答案）。不建議常規預防性抗生素（無益、增抗藥性）。", "C": "正確。以酒精性 chlorhexidine 消毒皮膚。", "D": "正確。嚴守無菌操作技術。"}, "sources": ["CDC CLABSI prevention guidelines"]}}, "110-通論-其他-12": {"quick": "「病人用藥整合與管理」屬用藥安全，非感染管制執行策略，故 (B)。", "detail": {"background": "衛福部醫院醫療品質及病人安全工作目標中，「落實感染管制」相關的執行策略包括：(A) 定期環境清潔及監控清潔品質、(C) 加強「抗生素使用管理（antimicrobial stewardship）」機制、(D) 落實工作人員健康管理（含疫苗、暴露後處置），以及手部衛生、導管/手術/呼吸器照護套組、多重抗藥菌監測等。(B) 「執行病人用藥整合與管理（medication reconciliation）」屬「用藥安全」目標，「不屬於感染管制」執行策略——故為答案。各年度病安工作目標分項管理，本題在辨識哪一項不屬感染管制範疇。", "options": {"A": "屬感染管制。定期環境清潔及監控。", "B": "錯（為答案）。用藥整合屬「用藥安全」，非感染管制。", "C": "屬感染管制。加強抗生素使用管理。", "D": "屬感染管制。落實工作人員健康管理。"}, "sources": ["衛福部醫療品質及病人安全工作目標"]}}, "110-通論-其他-76": {"quick": "本題官方鍵定 COVID 咽喉/鼻咽拭子採檢「必須由醫師完成」，故 (D)。", "detail": {"background": "本題考 COVID-19 咽喉/鼻咽拭子採檢的執行權責。依當時的規範與本題官方答案，鍵定為「必須由醫師完成（D）」。深部鼻咽採檢具一定侵入性與感染暴露風險，於該規範脈絡下被歸為應由醫師執行的項目。實務上各機構對檢體採集的人員授權、訓練與防護（個人防護裝備 PPE、負壓/通風環境）規定不同，專科護理師執行醫療業務須在「醫師監督下、且屬其法定業務範圍與受訓項目」內進行；本題以法規/規範字面之答案為準（D）。臨床操作時務必落實 PPE 與感染管制以保護採檢者。", "options": {"A": "非本題鍵定答案。", "B": "非本題鍵定答案。", "C": "非本題鍵定答案。", "D": "正確（依本題官方鍵）。COVID 咽喉/鼻咽拭子採檢必須由醫師完成。"}, "sources": ["本題依官方公告答案；醫療機構感染管制與採檢規範"]}}, "110-進階-外科-77": {"quick": "脾切除病人（>2 歲）應於手術「前 2–3 週」接種肺炎鏈球菌疫苗，故 (A)。", "detail": {"background": "脾切除（或功能性無脾）病人對「莢膜細菌（肺炎鏈球菌、Hib、腦膜炎雙球菌）」易發生猛爆性感染（OPSI），故須「預防接種」：理想是「擇期脾切除『前至少 2 週』接種」相關疫苗（肺炎鏈球菌 PCV13/PPV23、Hib、腦膜炎雙球菌疫苗）以產生足夠抗體（若為緊急手術未及接種，則術後 ≥2 週補種）。故 (A)「>2 歲者手術前 2–3 週接種肺炎鏈球菌疫苗」正確。肺炎鏈球菌疫苗並非「每 10 年」固定重種（PPV23 視情況追加一次）、腦膜炎雙球菌也非「每年」重種，故 C、D 不正確；術後 3–4 週才接種（B）非首選（應術前接種）。並衛教發燒即就醫、必要時備用抗生素。", "options": {"A": "正確。>2 歲者手術前 2–3 週接種肺炎鏈球菌疫苗。", "B": "非首選。應術前接種；僅緊急未及才術後補種。", "C": "錯。肺炎鏈球菌疫苗非固定每 10 年重種。", "D": "錯。腦膜炎雙球菌疫苗非每年重種。"}, "sources": ["Harrison 21e（Asplenia; vaccination timing）；ACIP"]}}, "112-通論-其他-36": {"quick": "帶狀疱疹疫苗不需「有病史才接種」，無病史者亦建議接種，故敘述 (C) 不適當。", "detail": {"background": "65 歲以上長者的疫苗接種建議：(A) 間隔適當時間接種「PCV13 與 PPV23」肺炎鏈球菌疫苗——正確。(B) 每 10 年追加一劑「破傷風、減量白喉（Td/Tdap）」——正確。(D) 每年接種一劑流感疫苗——正確。(C) 「帶狀疱疹疫苗」的接種「不以是否曾得過帶狀疱疹為前提」——50 歲以上（尤 ≥65）「無論有無帶狀疱疹病史」皆建議接種（重組型 RZV 為佳）以預防帶狀疱疹及神經痛；故「無帶狀疱疹病史者毋需接種」不適當（答案 C）。曾得過帶狀疱疹者痊癒後仍可接種以降低復發。", "options": {"A": "正確。間隔接種 PCV13 與 PPV23。", "B": "正確。每 10 年追加 Td。", "C": "不適當（為答案）。無帶狀疱疹病史者仍建議接種帶狀疱疹疫苗。", "D": "正確。每年接種流感疫苗。"}, "sources": ["ACIP/CDC 成人疫苗建議（zoster, pneumococcal, Td, influenza）"]}}, "112-通論-其他-38": {"quick": "「維護孕產兒安全」為 111–112 年度醫院版病安工作目標新增目標，故 (B)。", "detail": {"background": "我國醫療品質及病人安全工作目標逐年滾動修訂。「111–112 年度【醫院版】」「新增」的目標為「維護孕產兒安全（B）」（強化孕產婦與新生兒照護安全）。其餘 (A) 提升手術安全、(C) 落實感染管制、(D) 提升管路安全，皆為既有/延續之目標而非該年度新增。此類題目須留意各年度版本的新增/異動項目。故答案為 (B)。", "options": {"A": "提升手術安全為既有目標，非該年度新增。", "B": "正確。維護孕產兒安全為 111–112 年度新增目標。", "C": "落實感染管制為既有目標。", "D": "提升管路安全為既有目標。"}, "sources": ["衛福部 111–112 年度醫院版醫療品質及病人安全工作目標"]}}, "112-通論-其他-40": {"quick": "無明顯髒污時可用酒精性乾洗手維護手部衛生，故 (A)。", "detail": {"background": "手部衛生原則：(A) 「執行醫療作業時，若手部『無明顯髒污』，可用酒精性乾洗手（alcohol-based hand rub）」維護手部衛生——正確且為多數情境的首選（快速有效）。(B) 「手上有傷口或『明顯髒污/沾到體液』時」應「先以肥皂與清水『濕洗手』」，不可只用乾洗手——故 B 錯。(C) 對「產孢菌（如 C. difficile 孢子）、無套膜病毒（如諾羅）」酒精「效果較差」，應「以肥皂濕洗手（物理沖除）」——但敘述「濕洗後再乾洗手」並非標準（重點在濕洗手物理移除，加乾洗手非必要/非重點），表述不精確。(D) 「戴手套『不能取代』洗手」，且脫手套後仍須執行手部衛生——故「可取代洗手」錯誤。故最正確為 (A)。落實「洗手五時機」。", "options": {"A": "正確。無明顯髒污時可用酒精性乾洗手。", "B": "錯。有傷口/明顯髒污應先以肥皂清水濕洗手。", "C": "表述不精確。產孢菌/無套膜病毒應以濕洗手物理移除（非「濕洗後再乾洗」之必要）。", "D": "錯。戴手套不能取代洗手，脫手套後仍須手部衛生。"}, "sources": ["WHO Hand Hygiene Guidelines；CDC"]}}, "113-通論-5分科-19": {"quick": "依傳染病防治法，隔離治療與強制送醫「不須」徵得病人同意，故 (C)。", "detail": {"background": "依「傳染病防治法」，為防止特定傳染病擴散，主管機關「得」對傳染病病人或疑似病人施行「隔離治療、強制隔離、強制送醫」等處置——這是基於公共衛生的「強制性公權力」，「不須徵得病人本人同意」（C 正確），也不以家屬同意為前提（B 錯）。主管機關「得」依法「限制」病人之活動/處所（A 「不得限制」錯）。執行不以「須通知社工共同執行」為要件（D 非法定要件）。此體現「公共衛生利益優先於個人自由」的法律設計，但仍須符合比例原則與正當程序、保障被隔離者基本權益。故正確為 (C)。", "options": {"A": "錯。主管機關「得」依法限制病人。", "B": "錯。不以徵得家屬同意為前提。", "C": "正確。隔離治療與強制送醫不須徵得病人同意（公權力）。", "D": "錯。非以通知社工共同執行為法定要件。"}, "sources": ["傳染病防治法（隔離治療、強制送醫）"]}}}, L={"抗微生物製劑與抗藥性": {"title": "抗微生物製劑與抗藥性", "html": "<p><b>核心概念：</b>掌握抗生素的「作用機轉、涵蓋範圍、代表毒性、特殊族群（孕婦/腎肝）」與手術預防原則。</p><p><b>機轉分類：</b>β-lactam（penicillin/cephalosporin/carbapenem）抑制「細胞壁交叉連結（transpeptidation/PBP）」；aminoglycoside、tetracycline 抑制「30S 蛋白質合成」；macrolide 抑制 50S；fluoroquinolone 抑制「DNA gyrase」；vancomycin 結合 D-Ala-D-Ala（細胞壁）。</p><p><b>涵蓋與選藥：</b>綠膿桿菌→抗綠膿 β-lactam（cefepime、pip-tazo、carbapenem）、ciprofloxacin/levofloxacin；MRSA→vancomycin/daptomycin（daptomycin 不可用於肺炎）/linezolid（口服吸收近100%）；腸球菌對「頭孢天生抗藥」用 ampicillin/vancomycin；李斯特菌對頭孢抗藥用 ampicillin；<b>aminoglycoside 對厭氧菌無效</b>（需氧運輸）。立克次體→doxycycline；C. difficile→口服 vancomycin（clindamycin 反而會引起）。</p><p><b>代表毒性：</b>aminoglycoside＝腎毒+耳毒；vancomycin＝腎毒+紅人症；carbapenem（imipenem）＝抽搐；fluoroquinolone＝肌腱+QT；macrolide/azole＝QT；clindamycin＝C. difficile；tetracycline＝光敏+牙染。<b>孕婦避免</b>：sulfonamide（核黃疸）、tetracycline、fluoroquinolone、aminoglycoside。ceftriaxone 不可與含鈣輸液混合。</p><p><b>手術預防：</b>劃刀前 60 分鐘內給（vanco/FQ 120 分），對「乾淨-污染手術」效益最大，術後 ≤24 小時停（心臟 48 小時）。SSI 整體最常見病原為「革蘭氏陽性球菌（S. aureus）」。抗生素管理（stewardship）以減抗藥性（MRSA/VRE/CRE/ESBL）。</p>"}, "敗血症不明熱與感染性心內膜炎": {"title": "敗血症不明熱與感染性心內膜炎", "html": "<p><b>核心概念：</b>本節高度集中於「Surviving Sepsis（拯救敗血症）」指引與心內膜炎、不明熱。</p><p><b>敗血症（Sepsis-3 / SSC bundle）：</b>定義＝感染＋SOFA↑≥2（床邊 qSOFA：呼吸≥22、收縮壓≤100、意識改變）。SOFA 六項＝呼吸(PaO2/FiO2)、凝血(<b>血小板</b>，非 PT/PTT)、肝(bilirubin)、心血管(MAP)、中樞(GCS)、腎(creatinine)。敗血性休克＝<b>分布性休克</b>。Bundle：抽血培養→<b>1 小時內</b>給抗生素＋控制感染源→測「<b>乳酸</b>」→前 3 小時 <b>30 mL/kg 晶體液</b>→升壓首選 <b>norepinephrine</b> 維持 <b>MAP≥65</b>。要點：低劑量 dopamine「無腎臟保護」；vasopressin 為輔助非單獨第一線；血糖目標 <b>≤180</b>；限制性輸血（Hb 閾值約 7，非 10）；ARDS 用 6 mL/kg 肺保護通氣；不常規放肺動脈導管/類固醇（僅頑固性休克用）。</p><p><b>感染性心內膜炎（IE）：</b>持續發燒＋<b>新心雜音</b>＋周邊徵象（Osler 結節痛性指尖結節、Janeway、瘀點、指甲下出血）＋貧血。診斷用「改良 Duke 準則」（血培＋超音波贅生物），長程靜脈抗生素±手術。</p><p><b>不明熱（FUO）：</b>體溫>38.3℃、持續「≥3 週」、適當檢查仍查不出原因。四大類：感染、惡性腫瘤、結締組織病、其他（藥物熱）。不應一律給經驗性廣效抗生素。術後發燒「5 W」：POD#1–2 多為肺擴張不全（深呼吸/胸腔護理）。</p>"}, "中樞神經系統感染": {"title": "中樞神經系統感染", "html": "<p><b>核心概念：</b>CSF 判讀是本節靈魂，務必背熟三型對照表。</p><p><b>CSF 對照：</b>①<b>細菌性</b>—混濁、壓力↑↑、WBC↑↑（<b>中性球</b>為主，數百~數千）、葡萄糖↓↓、蛋白↑↑。②<b>病毒性</b>—清澈、壓力正常/輕升、WBC 10–500（<b>淋巴球</b>）、<b>葡萄糖正常</b>、蛋白輕升。③<b>結核/隱球菌</b>—亞急性、淋巴球為主、<b>葡萄糖很低</b>、蛋白很高、壓力高（隱球菌壓力常極高）。</p><p><b>致病菌與治療：</b>社區成人經驗性＝<b>vancomycin＋第三代頭孢</b>（高危[>50歲/免疫低下/孕婦]加 ampicillin 涵蓋李斯特菌）＋dexamethasone。腦膜炎雙球菌＝革蘭氏陰性雙球菌＋瘀斑紫斑，飛沫隔離 24h、<b>24 小時內通報</b>、接觸者 rifampin 預防。免疫低下＋極高壓淋巴球性低糖＝隱球菌。亞急性老人淋巴球性低糖＝結核。</p><p><b>腦炎：</b>影響「腦實質」（行為/意識改變、癲癇、局部神經學）。<b>HSV 腦炎</b>好侵顳葉、EEG 週期性顳葉棘波，一懷疑就「儘早靜脈 acyclovir」（不可只支持治療）。腦膜刺激徵：頸僵、Kernig、Brudzinski。腸病毒是病毒性腦膜炎最常見病因。</p>"}, "呼吸道感染與肺部病原": {"title": "呼吸道感染與肺部病原", "html": "<p><b>核心概念：</b>本節聚焦「病原鑑定」——非典型肺炎、退伍軍人症、流感與 COVID。</p><p><b>非典型肺炎：</b>年輕、乾咳、痰革蘭氏染色與培養「陰性」＝黴漿菌/披衣菌/退伍軍人菌（細胞內或無細胞壁），用<b>巨環內酯/呼吸型喹諾酮/四環</b>（β-lactam 無效）。<b>退伍軍人症</b>＝污染水源氣霧（冷卻水塔），不人傳人，尿抗原診斷，巨環/喹諾酮治療，第三代頭孢無效，為法定通報。</p><p><b>流感：</b><b>RNA 病毒</b>（A/B/C 型，A 易變異/重組產生大流行）；併發症肺炎、心肌炎、腦炎、GBS；流感後續發細菌性肺炎常見 <b>金黃色葡萄球菌</b>；治療神經胺酸酶抑制劑（oseltamivir 口服、zanamivir 吸入[插管/氣喘禁用]、peramivir 靜脈）、baloxavir；amantadine 抗藥性高不用。重症應通報不必等 PCR。</p><p><b>COVID-19：</b>SARS-CoV-2（RNA 病毒）；重症因子肥胖/孕/糖尿病/慢病；需氧重症用 <b>dexamethasone</b> 降死亡；remdesivir 早中期較有效；長新冠多系統症狀、<b>女性</b>較易。急性會厭炎「拇指徵象」見於頸部「側位」X 光（非胸部），為呼吸道急症優先確保氣道。老人低血氧重症肺炎應住院＋靜脈抗生素（CURB-65）。</p>"}, "泌尿道與腹腔內感染": {"title": "泌尿道與腹腔內感染", "html": "<p><b>核心概念：</b>涵蓋腸道感染（食物中毒/腹瀉病原）、腹腔內膿瘍與泌尿道感染。</p><p><b>腸道感染分型：</b>「侵襲性（發燒+血便）」＝沙門氏菌/志賀/曲狀桿菌/EHEC（潛伏期較長）；「毒素型（嘔吐為主、無發燒、潛伏期 1–6h）」＝金黃色葡萄球菌/仙人掌桿菌；病毒（諾羅/輪狀）水瀉。<b>機構群聚嘔吐腹瀉+培養陰性＝諾羅病毒</b>（肥皂洗手+漂白水）。<b>偽膜性結腸炎＝C. difficile</b>（抗生素後，口服 vancomycin/fidaxomicin；clindamycin 會引起）。生魚片後發燒血便＝沙門氏菌。</p><p><b>腹腔/泌尿：</b>憩室炎併局限膿瘍→先經皮引流穩定再手術，緩解後做大腸鏡排除癌。脾膿瘍：脾腫大非典型、<b>CT 為首選診斷</b>、免疫低下+多發死亡率>50%。UTI/攝護腺炎：fluoroquinolone「攝護腺穿透良好」為攝護腺炎第一線；aminoglycoside 腎功能不全須調量。</p>"}, "皮膚軟組織與骨關節感染": {"title": "皮膚軟組織與骨關節感染", "html": "<p><b>核心概念：</b>從一般蜂窩組織炎到致命的壞死性筋膜炎，辨識紅旗徵象是重點。</p><p><b>蜂窩組織炎：</b>真皮/皮下感染，主要菌為「金黃色葡萄球菌與 A 群鏈球菌」（化膿/膿瘍偏 S. aureus，瀰漫非化膿偏鏈球菌）。為「臨床診斷」，血液/傷口培養常陰性（故培養非可靠鑑別點）。與皮膚炎鑑別：痛 vs 癢、WBC 升 vs 正常、發燒 vs 無。</p><p><b>壞死性筋膜炎（外科急症）：</b>紅旗＝<b>出血性水泡、疼痛與外觀不成比例（後疼痛消失）、皮下氣腫/捻髮音、全身毒性休克</b>。處置＝<b>緊急廣泛清創</b>＋廣效抗生素（含 clindamycin 抑毒素）＋支持。<b>Fournier’s gangrene</b>＝會陰陰囊壞死性筋膜炎（糖尿病、多菌含厭氧），須徹底清創（睪丸多可保留）。深頸部感染（多牙源性）需住院靜脈抗生素±引流、可延伸至縱膈腔、注意氣道。</p><p><b>其他：</b>下肢潰瘍部位辨型（內踝=靜脈性、肢端打洞=動脈性、足底壓力點=神經病變）。動物咬傷感染高風險＝宿主免疫低下（酗酒/糖尿病）、深穿刺傷；貓狗咬傷急性軟組織感染常見 Pasteurella multocida（與「貓抓病 Bartonella」不同）。SSI 最常見革蘭氏陽性球菌。</p>"}, "性傳染病與骨盆腔感染": {"title": "性傳染病與骨盆腔感染", "html": "<p><b>核心概念：</b>以「分泌物/病灶型態」鑑別病原，並掌握骨盆腔發炎與梅毒血清學。</p><p><b>生殖器病灶：</b><b>梅毒</b>第一期＝「無痛硬性下疳」（T. pallidum）；HSV＝成群「疼痛」水泡/潰瘍；<b>HPV</b>＝菜花/尖圭濕疣（多 6/11 型，疫苗為預防非治療）；LGV＝腹股溝化膿淋巴結。</p><p><b>尿道炎/陰道炎：</b>男性尿道「黃綠膿性分泌物」＝<b>淋病（N. gonorrhoeae）</b>；稀薄量少＝披衣菌（非淋菌性，常合併淋病須同治）。淋病用頭孢（ceftriaxone IM，口服 cefixime）。披衣菌感染「柱狀上皮（子宮頸內口）」、用 azithromycin/doxycycline。陰道分泌物：滴蟲（濕抹片）、念珠菌（KOH）、細菌性陰道炎（<b>革蘭氏染色 clue cells，Gardnerella</b>）。</p><p><b>PID 與梅毒血清學：</b>PID 多由淋病+披衣菌上行，<b>多數可門診</b>治療（需涵蓋兩者+厭氧），性伴侶同治，症狀未改善 72 小時內回診；TOA/孕婦/重症才住院。梅毒血清：<b>非螺旋體（VDRL/RPR）反映活性、治療後轉陰</b>；<b>螺旋體（FTA-ABS/TPHA）終生陽性</b>。VDRL 轉陰+FTA-ABS 陽性＝已治療、未再感染。HPV 疫苗孕婦/超齡不建議。</p>"}, "HIV與伺機性感染": {"title": "HIV與伺機性感染", "html": "<p><b>核心概念：</b>HIV 的診斷流程、AIDS 定義、伺機性感染與保密倫理。</p><p><b>診斷與定義：</b>HIV 為「反轉錄 RNA 病毒」，經血液/體液傳染。篩檢用 <b>ELISA（第四代抗原/抗體）</b>，確認用西方墨點/抗體區分/核酸；病毒量用於監測療效。<b>AIDS 定義＝HIV 陽性且 CD4<200</b>，或出現 AIDS 定義性疾病（PCP、食道念珠菌、卡波西肉瘤、弓蟲腦炎等）。</p><p><b>伺機性感染（依 CD4）：</b>PCP（<200）、弓蟲腦炎（<100）、CMV 視網膜炎與 MAC（<50）、隱球菌腦膜炎。<b>CMV 最常以視網膜炎表現</b>；愛滋病患最常見「細菌性」腹瀉為 <b>C. difficile</b>。疫苗：可打不活化（HBV/HAV/流感/肺炎鏈球菌），<b>避免活減毒（水痘/MMR/BCG）於嚴重免疫低下</b>。免疫低下+極高壓淋巴球性低糖 CSF＝隱球菌腦膜炎。</p><p><b>倫理與法律：</b>HIV 資訊嚴格保密，醫療人員「不得對非醫療人員擅自透漏」，但應強烈輔導感染者向伴侶坦露並防護（U=U：測不到=不具傳染力）。例外：醫護「針扎職業暴露」時得採來源病人檢體檢驗「無須同意」。隔離治療/強制送醫依傳染病防治法不須病人同意。</p>"}, "蟲媒人畜共通與輸入性感染": {"title": "蟲媒人畜共通與輸入性感染", "html": "<p><b>核心概念：</b>以「接觸史/旅遊史＋特徵性徵象」快速辨識病原，立克次體與螺旋體是重點。</p><p><b>病媒蚊：</b>「斑蚊（Aedes）」＝登革熱、茲卡、屈公、黃熱；「家蚊（Culex）」＝日本腦炎。<b>登革熱</b>＝埃及斑蚊/白線斑蚊（非三斑家蚊）、白血球+血小板下降、重症警示徵象。</p><p><b>立克次體與螺旋體：</b><b>恙蟲病</b>（Orientia tsutsugamushi，恙蟎）＝野外+「無痛焦痂 eschar」+相對緩脈+肝指數升+血小板低，<b>doxycycline</b>（β-lactam 無效）。<b>鉤端螺旋體</b>＝淡水/污泥/鼠尿+「腓腸肌痛+結膜充血+黃疸+急性腎損傷（Weil）」，penicillin/doxycycline。Q 熱＝牛羊畜牧。漢他＝鼠。貓抓病＝Bartonella（淋巴結腫；貓「咬」傷急性感染才是 Pasteurella）。</p><p><b>其他：</b>旅遊者腹瀉首選 fluoroquinolone（東南亞改 azithromycin）。中東旅遊＝MERS。<b>毒性休克症候群</b>＝月經期棉條+高燒+低血壓+瀰漫紅疹+多器官（金黃色葡萄球菌毒素），移除棉條+輸液+clindamycin。禽流感撲殺病禽＝傳染窩管制。</p>"}, "病毒與黴菌感染": {"title": "病毒與黴菌感染", "html": "<p><b>核心概念：</b>常見可預防病毒（麻疹/水痘/流感）、皰疹病毒群與抗黴菌藥涵蓋。</p><p><b>抗黴菌涵蓋：</b><b>fluconazole 對麴菌（Aspergillus）無效</b>（只覆蓋念珠菌/隱球菌）；治麴菌用 voriconazole（首選）/posaconazole/itraconazole/isavuconazole、amphotericin B、棘白素（caspofungin）。</p><p><b>可預防病毒：</b><b>麻疹</b>＝3C（咳嗽/鼻炎/結膜炎）+柯氏斑點+耳後向下擴散皮疹，空氣傳染、<b>出疹前即具傳染力（前後各 4 天）</b>、<b>24 小時內通報</b>、隔離至出疹後 4 天、MMR 活減毒疫苗 95% 有效；回國>3 週無症狀可排除。<b>水痘</b>＝可傳染期自出疹前 1–2 天至全結痂、重症好發 <1 歲/免疫低下/成人/孕婦。流感為 RNA 病毒、可基因重組。猴痘＝人畜共通+淋巴腺腫，多自限，tecovirimat 留給重症/高危。</p><p><b>其他病原：</b>EBV＝傳染性單核球增多症，<b>anti-VCA IgM=急性、anti-EBNA=過去感染</b>，與 Burkitt 淋巴瘤/鼻咽癌相關。<b>肉毒桿菌</b>＝厭氧保存食品、毒素阻斷突觸前 ACh 釋放→「下行性弛緩麻痺+呼吸肌麻痺需呼吸器」，治療抗毒素（非抗生素）。</p>"}, "疫苗旅遊醫學與感染管制": {"title": "疫苗旅遊醫學與感染管制", "html": "<p><b>核心概念：</b>疫苗分類與族群建議、醫療照護相關感染（HAI）的預防套組、手部衛生與法規。</p><p><b>疫苗：</b><b>活減毒</b>（口服輪狀、MMR、水痘、BCG、OPV、黃熱）—免疫低下/孕婦多禁忌；其餘為不活化/類毒素/次單位。HBV 疫苗保護力看 <b>anti-HBs ≥10 mIU/mL</b>。流感優先對象＝老幼孕、慢病、肥胖、免疫低下（健康青壯年較不需要）。65 歲以上：PCV13+PPV23、每 10 年 Td、每年流感、<b>帶狀疱疹疫苗不需有病史即建議</b>。脾切除（>2 歲）術前 2–3 週接種肺炎鏈球菌/Hib/腦膜炎雙球菌疫苗。</p><p><b>感染管制套組：</b><b>CLABSI</b>＝手部衛生+最大無菌面防護+<b>chlorhexidine-酒精消毒（優於碘酒）</b>+避免股靜脈+每日評估移除；<b>不用</b>常規預防性抗生素。<b>VAP</b>＝床頭抬高 30–45 度+規律 CHG 口腔護理（非每天一次）+每日評估脫離呼吸器+排空管路積水。手術預防抗生素術後 ≤24 小時（SCIP）。</p><p><b>手部衛生與法規：</b>無明顯髒污可酒精乾洗手；<b>有傷口/明顯髒污/產孢菌(C. difficile)/無套膜病毒(諾羅)須肥皂濕洗手</b>；戴手套不可取代洗手。傳染病通報：麻疹/腦膜炎雙球菌 24 小時內；退伍軍人症、恙蟲病為法定通報。隔離治療/強制送醫不須病人同意。撲殺病禽＝傳染窩管制。</p>"}};
const TORDER=["抗微生物製劑與抗藥性", "敗血症不明熱與感染性心內膜炎", "中樞神經系統感染", "呼吸道感染與肺部病原", "泌尿道與腹腔內感染", "皮膚軟組織與骨關節感染", "性傳染病與骨盆腔感染", "HIV與伺機性感染", "蟲媒人畜共通與輸入性感染", "病毒與黴菌感染", "疫苗旅遊醫學與感染管制"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if((q.answer_status||'').indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if((q.answer_status||'').indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if((q.answer_status||'').indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if((q.answer_status||'').indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 let opts='';
 for(const k of ['A','B','C','D','E']){ if(q.options[k]!==undefined) opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='np_id_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render); fKw.oninput=render;
expandBtn=$('#expand'); expandBtn.onclick=()=>{expand=!expand;expandBtn.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
