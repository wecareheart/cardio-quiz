112, "subject_group": "專科護理通論", "branch": "其他", "q_num": 40, "stem": "有關執行正確手部衛生方式之敘述,下列何者正確?", "options": {"A": "執行醫療作業時,若沒有明顯髒污可以酒精性乾洗手維護手部衛生", "B": "當手上有傷口或明顯髒污時,建議先以乾洗手清潔,無法清潔再濕洗手", "C": "對於產孢菌、無套膜的病毒等,酒精性乾洗手效果較差,應以濕洗手後再乾洗手為宜", "D": "戴手套可取代洗手,但移除手套後仍建議進行手部衛生"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "112_通論_其他_Q.pdf", "exam_tag": "112", "source": "MOHW", "topic": "疫苗旅遊醫學與感染管制", "topic_code": "I11", "topic_num": 11, "correction_note": ""}, {"id": "113-通論-5分科-19", "roc_year": 113, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 19, "stem": "依據民國112 年6 月28 日修正「傳染病防治法」對於傳染病病人隔離治療與強制送醫之 規定,下列敘述何者正確?", "options": {"A": "主管機關不得限制病人", "B": "須徵得家屬同意", "C": "不須徵得病人同意", "D": "須通知社工共同執行"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_通論_5分科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "疫苗旅遊醫學與感染管制", "topic_code": "I11", "topic_num": 11, "correction_note": ""}], E={"105-TNPA-外科-34": {"quick": "人工關節（植入物）置換術後「一年內」的感染都視為手術部位感染（SSI），故 (A)。", "detail": {"background": "手術部位感染（SSI）是最常見的院內感染之一。定義時間窗：一般手術為術後「30 天內」，若有「植入物（implant，如人工關節）」則延長至「術後一年內」與手術相關的感染都算 SSI。預防 SSI 的核心是「預防性抗生素於劃刀前 60 分鐘內（vancomycin/fluoroquinolone 則 120 分鐘內）給予」，使切皮時組織達有效濃度，而非提前一天或劃刀後才給；多數乾淨手術不需術後持續給藥（≤24 小時）。骨科 SSI 最常見菌為「金黃色葡萄球菌（S. aureus，含 MRSA）」，S. epidermidis 雖常見於「植入物相關」生物膜感染但非整體最常見。與「細菌生物膜（biofilm）」相關的人工關節感染特徵是「慢性、低度、難以根除」（細菌包覆於膜內抗藥、需移除植入物），常不是猛爆全身症狀。故 (A) 正確。", "options": {"A": "正確。有植入物（人工關節）者，術後「一年內」相關感染都視為 SSI。", "B": "錯。預防性抗生素應於「劃刀前 60 分鐘內」給予，非前一天。", "C": "錯。骨科感染最常見為 S. aureus；S. epidermidis 多見於植入物生物膜感染但非整體最常見。", "D": "錯。生物膜相關感染多為慢性、低度、難根除，未必造成嚴重全身症狀。"}, "sources": ["CDC/NHSN SSI 定義", "Harrison 21e（Health care-associated infections; surgical prophylaxis）"]}}, "107-TNPA-外科-33": {"quick": "β-lactam 類藉抑制細胞壁胜肽交叉連結（transpeptidation）而殺菌，故 (B)。", "detail": {"background": "抗生素依作用機轉分類是高頻考點。β-lactam 類（penicillins、cephalosporins、carbapenems、monobactams）與 PBP（penicillin-binding protein，即 transpeptidase）結合，抑制細胞壁肽聚醣（peptidoglycan）的「交叉連結（transpeptidation）」，使細胞壁缺損而菌體溶解死亡，屬殺菌性。對照其他機轉：aminoglycosides 與 tetracyclines 抑制「蛋白質合成」（分別作用於 30S 核糖體，aminoglycoside 殺菌、tetracycline 抑菌）；quinolones 抑制「DNA gyrase/topoisomerase」干擾 DNA 複製（殺菌）；glycopeptide（vancomycin）也抑制細胞壁但機轉是結合 D-Ala-D-Ala 前驅物（非 transpeptidation）。故抑制細胞壁交叉連結者為 β-lactam。", "options": {"A": "aminoglycosides 抑制 30S 核糖體蛋白質合成。", "B": "正確。β-lactam 抑制細胞壁胜肽交叉連結（transpeptidation／PBP）。", "C": "quinolones 抑制 DNA gyrase／topoisomerase。", "D": "tetracyclines 抑制 30S 核糖體蛋白質合成。"}, "sources": ["Harrison 21e（Mechanisms of antibacterial action）"]}}, "107-TNPA-外科-39": {"quick": "綠膿桿菌腦膜炎需用具抗綠膿且能透過血腦障壁的 cefepime，故 (A)。", "detail": {"background": "治療中樞神經感染需選擇「能透過血腦障壁（CNS 穿透性佳）且涵蓋致病菌」的抗生素。綠膿桿菌（Pseudomonas aeruginosa）是難治、多重抗藥的革蘭氏陰性桿菌，對多數第一、二代頭孢無效。第四代頭孢「cefepime」具強抗綠膿活性且 CNS 穿透良好，是綠膿桿菌腦膜炎的適當選擇（另如 ceftazidime、meropenem 亦可）。對照：cephalothin（第一代）、cefoxitin（第二代頭黴素）、cefuroxime（第二代）皆「無抗綠膿活性」且 CNS 穿透不足，不適合。故選 cefepime。", "options": {"A": "正確。cefepime（第四代）抗綠膿且 CNS 穿透佳，適合綠膿桿菌腦膜炎。", "B": "cephalothin（第一代）無抗綠膿活性、CNS 穿透差。", "C": "cefoxitin（第二代頭黴素）無抗綠膿活性。", "D": "cefuroxime（第二代）無抗綠膿活性、不適合 CNS 綠膿感染。"}, "sources": ["Harrison 21e（Bacterial meningitis; antipseudomonal cephalosporins）", "IDSA Meningitis Guideline"]}}, "107-TNPA-內科-61": {"quick": "沙門氏菌血症應用 ceftriaxone/fluoroquinolone，cefazolin（第一代）不適當，故 (D)。", "detail": {"background": "抗生素須對應致病菌的特性。(A) 立克次體（rickettsia，如恙蟲病、斑疹傷寒）為細胞內菌，首選「doxycycline」——正確。(B) 偽膜性腸炎（C. difficile）以「metronidazole（輕症）或口服 vancomycin」治療——正確。(C) 李斯特菌（Listeria，孕婦、老人、免疫低下之腦膜炎）對頭孢「天生抗藥」，首選「ampicillin（±gentamicin）」——正確。(D) 沙門氏菌血症（侵襲性沙門氏菌、傷寒）需用能涵蓋並有細胞內活性的「ceftriaxone（第三代）或 fluoroquinolone」；「cefazolin（第一代）」對腸道革蘭氏陰性桿菌與細胞內菌活性不足、CNS/組織穿透差，不適當——故 (D) 為最不適當的配對。", "options": {"A": "適當。立克次體感染首選 doxycycline。", "B": "適當。偽膜性腸炎（C. difficile）用 metronidazole（或口服 vancomycin）。", "C": "適當。李斯特菌對頭孢抗藥，首選 ampicillin。", "D": "不適當（為答案）。沙門氏菌血症需 ceftriaxone／fluoroquinolone，cefazolin（第一代）不足。"}, "sources": ["Harrison 21e（Salmonella, Listeria, Rickettsia, C. difficile treatment）"]}}, "107-TNPA-通論-67": {"quick": "眼科手術預防性抗生素首選 gentamicin（局部），故 (A)。", "detail": {"background": "外科預防性抗生素原則：(1) 給藥時機為「劃刀前 60 分鐘內」（vancomycin/fluoroquinolone 120 分鐘內）使切皮時組織濃度足夠——不是劃刀「後」給；(2) 多數手術只需單劑或 ≤24 小時，不常規於術後 48 小時追加；(3) 藥物依手術部位常見菌選擇：多數乾淨／乾淨-污染手術用第一代 cefazolin；膽道手術預防也以 cefazolin/cefoxitin 為主（非 vancomycin，vancomycin 保留給 MRSA 高風險或 β-lactam 過敏）；眼科手術以局部抗生素（如 gentamicin、fluoroquinolone 眼用）預防眼內炎。故本題 (A)「眼睛手術預防性抗生素首選 gentamicin」為正確敘述。", "options": {"A": "正確。眼科手術預防以局部抗生素（gentamicin 等）為首選。", "B": "錯。多數手術不常規於術後 48 小時追加抗生素（≤24 小時即可）。", "C": "錯。膽道手術預防首選 cefazolin/cefoxitin，非 vancomycin。", "D": "錯。預防性抗生素應於「劃刀前」60 分鐘內給予，非劃刀後。"}, "sources": ["Surgical antimicrobial prophylaxis guidelines (ASHP/IDSA)", "Harrison 21e"]}}, "108b-TNPA-外科-15": {"quick": "Carbapenem（尤 imipenem）最易降低癲癇閾值引發抽搐，故 (A)。", "detail": {"background": "抗生素的神經毒性中，「carbapenem 類（尤其 imipenem-cilastatin）」最為人知會「降低癲癇閾值、引發抽搐（seizure）」，尤其在高劑量、腎功能不良未調量、既有中樞病變或癲癇病史者風險更高（meropenem 風險較低）。其機轉與拮抗 GABA-A 受體有關。其他抗生素的代表毒性：quinolone（肌腱炎/斷裂、QT 延長、CNS 興奮但抽搐較少）、aminoglycosides（腎毒性、耳毒性）、cephalosporin（過敏，高劑量 cefepime 在腎功能不良時也可致腦病變/抽搐但整體不如 carbapenem 典型）。故最易抽搐者為 carbapenem。", "options": {"A": "正確。carbapenem（尤 imipenem）拮抗 GABA、降低癲癇閾值，最易抽搐。", "B": "quinolone 以肌腱病變、QT 延長為主，抽搐較少。", "C": "aminoglycosides 以腎毒性、耳毒性為主。", "D": "cephalosporin 以過敏為主（cefepime 高劑量腎功能差時可致腦病變，但非最典型）。"}, "sources": ["Harrison 21e（Adverse effects of antibiotics; carbapenem neurotoxicity）"]}}, "108b-TNPA-內科-38": {"quick": "孕婦應避免 sulfonamides（核黃疸、近足月與神經管風險），故 (B)。", "detail": {"background": "孕婦抗生素安全性是重要考量。相對安全：β-lactam（penicillins、cephalosporins）、erythromycin（避 estolate 鹽）、azithromycin、clindamycin、metronidazole（多數研究未顯著致畸，第一孕期仍謹慎）。應避免：(1) sulfonamides（磺胺）——近足月使用可置換膽紅素致新生兒「核黃疸（kernicterus）」，且與葉酸拮抗（早孕期神經管缺損疑慮）；(2) tetracyclines（牙齒染色、抑制骨生長）；(3) fluoroquinolones（動物軟骨毒性）；(4) aminoglycosides（耳毒性風險）。本題選項中致畸／不建議用於孕婦者為「sulfonamides（B）」。", "options": {"A": "cephalosporins 屬孕婦相對安全的抗生素。", "B": "正確。sulfonamides 有核黃疸與葉酸拮抗（神經管）風險，孕婦應避免。", "C": "metronidazole 多數證據未顯著致畸（仍謹慎），非本題最該避免者。", "D": "erythromycin 屬孕婦相對安全（避 estolate）。"}, "sources": ["Harrison 21e（Antimicrobials in pregnancy）"]}}, "108a-TNPA-外科-42": {"quick": "第一代預防性抗生素對「乾淨-污染性手術」最有助益，故 (B)。", "detail": {"background": "手術依污染程度分四類，決定預防策略：(1) 乾淨手術（clean，未進入感染或空腔黏膜，如疝氣、甲狀腺）感染率低（<2%），多不需常規預防（除非植入物）；(2) 乾淨-污染（clean-contaminated，進入呼吸/消化/泌尿生殖道但控制良好，如膽道、腸道擇期手術）——預防性第一代頭孢（cefazolin）「最有助益」、效益最明確；(3) 污染（contaminated，新鮮外傷、明顯內容物溢出）；(4) 感染性/骯髒（dirty，已存在感染、穿孔化膿）——後兩類已需「治療性」而非單純預防性抗生素。故第一代預防性抗生素效益最大的是「乾淨-污染性手術」。", "options": {"A": "乾淨手術感染率低，多不需常規預防（除非植入物）。", "B": "正確。乾淨-污染性手術使用第一代預防性抗生素效益最明確。", "C": "污染性手術已需治療性抗生素。", "D": "感染性手術已存在感染，需治療而非預防。"}, "sources": ["Surgical wound classification; ASHP surgical prophylaxis", "Harrison 21e"]}}, "108a-TNPA-內科-64": {"quick": "gentamicin 的毒性是腎毒性與耳毒性，非「低血鉀」，故配對 (C) 最不適當。", "detail": {"background": "抗生素副作用配對：(A) vancomycin——腎毒性（尤與其他腎毒性藥併用或濃度過高）、紅人症候群（輸注過快），配對「腎毒性」正確。(B) clindamycin——最著名為「腹瀉與偽膜性腸炎（C. difficile）」，正確。(D) tetracycline——光敏感性（photosensitivity）、牙齒染色，正確。(C) gentamicin（aminoglycoside）的劑量限制毒性是「腎毒性與耳毒性（前庭/聽力）」，並可致低血鎂；「低血鉀」並非其典型代表毒性，故此配對最不適當（答案 C）。臨床用 aminoglycosides 須監測腎功能與藥物濃度、注意聽力。", "options": {"A": "適當。vancomycin 有腎毒性（及紅人症候群）。", "B": "適當。clindamycin 易致腹瀉與偽膜性腸炎。", "C": "不適當（為答案）。gentamicin 的代表毒性是腎毒性與耳毒性，非低血鉀。", "D": "適當。tetracycline 有光敏感性。"}, "sources": ["Harrison 21e（Aminoglycoside toxicity; antibiotic adverse effects）"]}}, "111-進階-內科-57": {"quick": "cefepime（頭孢）較不造成 QT 延長，故 (B)。", "detail": {"background": "藥物引起的 QT 延長會增加致命性心律不整（torsades de pointes）風險，多種抗微生物製劑與之相關：fluoroquinolones（ciprofloxacin、levofloxacin、moxifloxacin，後者最明顯）、macrolides（azithromycin、erythromycin、clarithromycin）、azole 抗黴菌（fluconazole、voriconazole）。相對地，β-lactam 類（包含頭孢 cefepime）「不顯著延長 QT」。故四者中較不易造成 QT 延長者為 cefepime。臨床上對已有 QT 延長、低血鉀低血鎂、併用其他延長 QT 藥物者，選擇抗生素應避開上述高風險藥並監測心電圖。", "options": {"A": "ciprofloxacin（fluoroquinolone）可延長 QT。", "B": "正確。cefepime（β-lactam）較不造成 QT 延長。", "C": "azithromycin（macrolide）可延長 QT。", "D": "fluconazole（azole）可延長 QT。"}, "sources": ["Harrison 21e（Drug-induced QT prolongation）"]}}, "113-進階-內科-35": {"quick": "流感併發重症者可口服 baloxavir，故 (A)。", "detail": {"background": "抗流感病毒藥物：(1) 神經胺酸酶抑制劑——oseltamivir（口服）、zanamivir（吸入，因可致支氣管痙攣「不」用於氣喘/慢性肺病及插管病人）、peramivir（「靜脈」注射，用於無法口服者；oseltamivir 並無靜脈劑型）；(2) baloxavir marboxil（cap-dependent endonuclease 抑制劑，口服單劑），可用於流感（含部分重症）治療；(3) amantadine/rimantadine（M2 離子通道抑制劑，「非」神經胺酸酶抑制劑），因抗藥性極高已「不建議」用於季節性流感。故 (A)「重症可口服 baloxavir」正確；(B) 插管病人不可用吸入 zanamivir；(C) oseltamivir 無靜脈劑型（無法口服改 peramivir IV）；(D) amantadine 機轉錯誤且抗藥性高。", "options": {"A": "正確。baloxavir（口服 endonuclease 抑制劑）可用於流感（含重症）。", "B": "錯。zanamivir 為吸入劑、可致支氣管痙攣，不用於插管／氣喘病人。", "C": "錯。oseltamivir 僅口服；無法口服者改用 peramivir 靜脈注射。", "D": "錯。amantadine 為 M2 抑制劑（非神經胺酸酶抑制劑）且抗藥性高，不建議。"}, "sources": ["Harrison 21e（Antiviral drugs for influenza）", "CDC Influenza Antiviral Guidance"]}}, "113-進階-內科-36": {"quick": "ciprofloxacin 對綠膿桿菌有良好療效，故 (A)。", "detail": {"background": "抗微生物藥理重點：(A) ciprofloxacin（fluoroquinolone）對綠膿桿菌（P. aeruginosa）有良好活性，是少數可口服抗綠膿的藥——正確。(B) clindamycin「會引起」C. difficile 偽膜性腸炎，並「不能」用來治療它（治療用口服 vancomycin/fidaxomicin/metronidazole）——錯。(C) linezolid「口服生體可用率近 100%」，可口服或靜脈，不需限定靜脈——錯。(D) rifampin 的代表副作用是「體液（尿、淚、汗）染橙紅色、肝毒性、與多種藥物的交互作用（強效 CYP 誘導劑）」，並非以噁心嘔吐最常見——錯。故正確為 (A)。", "options": {"A": "正確。ciprofloxacin 對綠膿桿菌有良好療效（可口服抗綠膿）。", "B": "錯。clindamycin 會「引起」C. difficile 腸炎，不能用來治療。", "C": "錯。linezolid 口服吸收率近 100%，不需限定靜脈。", "D": "錯。rifampin 代表副作用為體液染橙紅、肝毒性與藥物交互作用。"}, "sources": ["Harrison 21e（Antimicrobial pharmacology）"]}}, "114-進階-內科-57": {"quick": "aminoglycosides（gentamicin）對「厭氧菌無效」，故敘述 (A) 錯。", "detail": {"background": "抗生素涵蓋範圍：(A) gentamicin（aminoglycoside）主要對「需氧革蘭氏陰性桿菌」有效，對革蘭氏陽性菌活性有限（常與 β-lactam 合用產生協同），且因藥物進入菌體需「氧氣依賴的運輸」，對「厭氧菌無效」——故「對革蘭氏陽性、陰性與厭氧菌均有良好效果」為錯誤。(B) levofloxacin（呼吸型 fluoroquinolone）可治綠膿桿菌——正確。(C) 「口服」vancomycin 用於 C. difficile 腸炎（不吸收、腸道局部作用）——正確。(D) ceftriaxone 與「含鈣」輸液混合會形成鈣鹽沈澱（新生兒尤危險），不可同管混合——正確。故錯誤者為 (A)。", "options": {"A": "錯誤（為答案）。aminoglycosides 對厭氧菌無效、對革蘭氏陽性菌有限。", "B": "正確。levofloxacin 可治療綠膿桿菌。", "C": "正確。口服 vancomycin 用於 C. difficile 腸炎。", "D": "正確。ceftriaxone 不可與含鈣輸液混合（鈣鹽沈澱）。"}, "sources": ["Harrison 21e（Aminoglycosides spectrum; ceftriaxone-calcium incompatibility）"]}}, "105-TNPA-外科-35": {"quick": "念珠菌血症療程須「血培養轉陰且症狀消失後再加 14 天（2 週）」，非 7 天，故敘述 (C) 錯。", "detail": {"background": "念珠菌血症（candidemia）常見於糖尿病、術後、中央靜脈導管、長期廣效抗生素、加護病房病人，可由皮膚/腸道/導管侵入血流。治療：(1) 抗黴菌——血流動力穩定且非抗藥者可用 azole（fluconazole），危急或不穩定者用棘白素（echinocandin，現為許多指引首選）或 amphotericin B；(2) 務必「移除可能感染的中央靜脈導管」；(3) 做眼底檢查排除念珠菌眼內炎；(4) 療程為「血液培養轉陰性『且』症狀緩解之日起『再加 14 天（2 週）』」——故選項 (C)「再加 7 天」為錯誤。本例術後糖尿病導管/皮膚屏障受損為合理感染途徑。", "options": {"A": "正確。穩定、非抗藥者可用 fluconazole。", "B": "正確。amphotericin B 為可選抗黴菌藥（重症/不穩定）。", "C": "錯誤（為答案）。療程為血培轉陰且症狀消失後再加「14 天」，非 7 天。", "D": "正確。皮膚/黏膜屏障受損、導管是念珠菌入血常見途徑。"}, "sources": ["IDSA Candidiasis Guideline 2016", "Harrison 21e（Candidemia）"]}}, "105-TNPA-通論-55": {"quick": "敗血性休克屬「分布性休克（distributive shock）」，故 (B)。", "detail": {"background": "休克依血行動力分四類：(1) 低血容性（hypovolemic，失血/脫水，前負荷↓）；(2) 心因性（cardiogenic，幫浦衰竭，心輸出↓）；(3) 阻塞性（obstructive，如心包填塞、張力性氣胸、大塊肺栓塞，循環受機械阻塞）；(4) 分布性（distributive，血管張力喪失、周邊血管擴張使血液「分布異常」）。敗血性休克屬「分布性休克」——感染引發全身發炎與血管擴張、微循環異常、血管通透性增加，特徵是「暖休克」期心輸出正常或增加、全身血管阻力（SVR）下降。其他分布性休克還包括過敏性、神經性休克。治療核心為早期輸液、norepinephrine 升壓與控制感染源。", "options": {"A": "心因性休克為幫浦衰竭，非敗血性休克機轉。", "B": "正確。敗血性休克為分布性休克（血管擴張、SVR 下降）。", "C": "阻塞性休克為循環受機械阻塞（填塞/氣胸/PE）。", "D": "低血容性休克為前負荷不足（失血/脫水）。"}, "sources": ["Harrison 21e（Classification of shock）"]}}, "105-TNPA-內科-67": {"quick": "敗血性休克可先用 norepinephrine 作第一線升壓劑，故 (B)。", "detail": {"background": "敗血性休克的血行動力處置（Surviving Sepsis）：(1) 早期晶體液復甦（前 3 小時 30 mL/kg）；(2) 升壓劑首選「norepinephrine」（第一線），目標「平均動脈壓（MAP）≥65 mmHg」（非 55）；(3) 不再建議「低劑量 dopamine 保護腎臟」（已證實無腎臟保護效果且增心律不整）；(4) vasopressin 為「輔助/第二線」加在 norepinephrine 上以減其用量，不單獨作為第一線升壓劑；(5) 抗生素於辨識休克後 1 小時內給、清除感染源、監測乳酸。故正確為 (B)。", "options": {"A": "錯。MAP 目標為 ≥65 mmHg，非 55。", "B": "正確。norepinephrine 為第一線升壓劑。", "C": "錯。低劑量 dopamine 無腎臟保護效果（已不建議）。", "D": "錯。vasopressin 為輔助/第二線，不單獨作第一線升壓劑。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "105-TNPA-內科-78": {"quick": "PT/PTT 不屬於 SOFA 分數，故 (B)。", "detail": {"background": "SOFA（Sequential Organ Failure Assessment）評估六大器官系統失調，是新版 Sepsis-3 定義的核心（感染＋SOFA 增加 ≥2 分＝敗血症）。六項為：呼吸（PaO2/FiO2）、凝血（「血小板數」，非 PT/PTT）、肝（bilirubin）、心血管（MAP 或所需升壓劑劑量）、中樞神經（Glasgow coma score）、腎（creatinine 或尿量）。故 (B)「PT/PTT」不屬於 SOFA（凝血項目用的是「血小板」）。床邊快速篩檢可用 qSOFA（呼吸≥22、收縮壓≤100、意識改變，≥2 項提示高風險）。", "options": {"A": "屬於 SOFA（中樞神經：Glasgow coma score）。", "B": "正確（不屬於）。SOFA 凝血項目用「血小板」，非 PT/PTT。", "C": "屬於 SOFA（肝：bilirubin）。", "D": "屬於 SOFA（心血管：MAP/升壓劑）。"}, "sources": ["Sepsis-3 (JAMA 2016); SOFA score", "Harrison 21e"]}}, "106-106a-內科-17": {"quick": "敗血性休克血糖控制目標為「不高於 180 mg/dL」，故 (C)。", "detail": {"background": "重症與敗血症病人的血糖管理：避免高血糖也避免低血糖。Surviving Sepsis 建議在血糖連續兩次 >180 mg/dL 時開始胰島素治療，「目標上限 ≤180 mg/dL」（不採過去 NICE-SUGAR 前的嚴格控制 80–110，因會增加低血糖與死亡）。故答案為 180。過嚴（如 ≤110）易低血糖、過鬆（250）則高血糖併發感染與滲透性利尿。臨床以連續監測血糖、靜脈胰島素滴定維持 140–180 為宜。", "options": {"A": "110 過嚴（NICE-SUGAR 後不採），易低血糖。", "B": "140 偏嚴，非指引建議上限。", "C": "正確。血糖控制目標上限為不高於 180 mg/dL。", "D": "250 過高，易併發高血糖相關問題。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "106-106a-內科-49": {"quick": "FUO 定義為發燒持續「≥3 週」，「持續 2 星期」不符，故 (C)。", "detail": {"background": "不明熱（FUO）的經典 Petersdorf-Beeson（1961）定義三要件：(1) 體溫多次 >38.3°C（>38°C）；(2) 發燒「持續 ≥3 週」；(3) 經「住院 ≥1 週（後修訂為適當門診/住院檢查）」仍找不出原因。故 (C)「持續 2 星期」不符（應為 3 週）。FUO 病因分四大類：感染（結核、膿瘍、心內膜炎）、惡性腫瘤（淋巴瘤等）、結締組織/自體免疫疾病、其他（藥物熱等）。診斷需詳細病史（旅遊、接觸、用藥）、系統性檢查與影像。", "options": {"A": "屬定義（多次發燒）。", "B": "屬定義（體溫 >38°C/38.3°C）。", "C": "不符（為答案）。應為持續「≥3 週」，非 2 星期。", "D": "屬定義（經住院/適當檢查 ≥1 週仍查不出原因）。"}, "sources": ["Petersdorf & Beeson 1961; Harrison 21e（FUO）"]}}, "106-106a-內科-50": {"quick": "ARDS 病人採肺保護策略，潮氣量 6 mL/kg 預測體重，故 (D)。", "detail": {"background": "敗血性休克處置的「該與不該」：(A) 類固醇「非一開始常規」，僅在「充分輸液與升壓劑仍頑固性低血壓」時才考慮低劑量氫化可體松——不是一開始就同時給。(B) 「低劑量 dopamine 保護腎臟」是已被推翻的迷思，不建議。(C) 不再「常規」放置肺動脈導管（PAC）監測，因未改善預後且有風險。(D) 若併發 ARDS，採「肺保護性通氣」——潮氣量「6 mL/kg 預測體重（PBW）」、限制吐氣末平台壓 <30 cmH2O——正確。故 (D) 為正確敘述。", "options": {"A": "錯。類固醇僅用於頑固性休克，非一開始同時給。", "B": "錯。低劑量 dopamine 無腎臟保護效果。", "C": "錯。不常規放置肺動脈導管。", "D": "正確。ARDS 採肺保護通氣，潮氣量 6 mL/kg 預測體重。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）；ARDSNet lung-protective ventilation"]}}, "106-106a-內科-58": {"quick": "嚴重敗血症/敗血性休克應於辨識後「1 小時內」給予抗生素，故 (C)。", "detail": {"background": "「抗生素給藥時機」是敗血症存活的關鍵——每延遲一小時死亡率上升。Surviving Sepsis 強調在辨識敗血性休克（及嚴重敗血症）後「1 小時內」盡快給予經驗性廣效抗生素，且「給藥前先抽血液培養」（但不可因等培養而延誤）。同時要找出並控制感染源（引流膿瘍、移除感染導管）、監測乳酸、早期晶體液 30 mL/kg、必要時升壓。故答案為 1 小時。", "options": {"A": "15 分鐘非指引明訂之黃金時限（雖越快越好）。", "B": "30 分鐘非指引時限。", "C": "正確。應於辨識後 1 小時內給予抗生素。", "D": "2 小時過長，延遲增加死亡率。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "107-TNPA-內科-11": {"quick": "「儘快放置肺動脈導管」不屬早期目標導向治療（EGDT），故 (B)。", "detail": {"background": "早期目標導向治療（EGDT，Rivers 2001）與後續 Surviving Sepsis 的復甦目標包括：維持「MAP ≥65 mmHg」、「尿量 >0.5 mL/kg/hr」、「中心靜脈血氧飽和度 ScvO2 ≥70%」（或乳酸清除）、CVP 8–12 mmHg（早期版本）。這些以晶體液、升壓劑、必要時輸血/強心達成。「肺動脈導管（PAC）」並非 EGDT 內容，且後續研究（ProCESS/ARISE/ProMISe）顯示不需常規侵入性監測。故不適合用來處置敗血症者為 (B)。", "options": {"A": "屬目標。維持 MAP ≥65 mmHg。", "B": "正確（不適合）。EGDT 不含「儘快放置肺動脈導管」。", "C": "屬目標。維持尿量 >0.5 mL/kg/hr。", "D": "屬目標。維持 ScvO2 ≥70%。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）；Rivers EGDT NEJM 2001"]}}, "108a-TNPA-通論-6": {"quick": "敗血症的代謝性酸中毒與「乳酸（lactic acid）」最相關，故 (C)。", "detail": {"background": "敗血症/敗血性休克因組織灌流不足與細胞缺氧，無氧代謝增加產生大量「乳酸」，造成「乳酸性代謝酸中毒（高陰離子間隙）」。血中乳酸是組織灌流與嚴重度的重要指標，也是 Surviving Sepsis bundle 監測項目（初始乳酸升高者應追蹤其清除）。故與敗血症代謝酸中毒最相關者為乳酸。對照：酮酸與糖尿病酮酸中毒相關、肌酐反映腎功能、胺基酸非主要。乳酸 >2 mmol/L（尤 >4）提示組織低灌流、預後較差。", "options": {"A": "酮酸與糖尿病酮酸中毒相關，非敗血症主因。", "B": "胺基酸非敗血症代謝酸中毒主因。", "C": "正確。敗血症組織缺氧→乳酸堆積→乳酸性代謝酸中毒。", "D": "肌酐反映腎功能，非酸中毒直接指標。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "108a-TNPA-內科-15": {"quick": "EGDT 目標是 ScvO2「≥70%」，故「低於 70%」不符目標，為 (B)。", "detail": {"background": "承前，敗血症復甦的量化目標：CVP 8–12 mmHg、MAP ≥65 mmHg、尿量 ≥0.5 mL/kg/hr、中心靜脈血氧飽和度 ScvO2「≥70%」（反映氧供需平衡，過低代表組織攝氧增加/灌流不足）。故 (B)「維持 SvO2 低於 70%」與目標相反，為「不符合」的選項。其餘 (A)(C)(D) 皆為正確目標。臨床現多以乳酸清除輔助/取代 ScvO2 監測。", "options": {"A": "符合。CVP 8–12 mmHg。", "B": "不符合（為答案）。目標為 ScvO2「≥70%」，非低於 70%。", "C": "符合。尿量 ≥0.5 mL/kg/hr。", "D": "符合。MAP >65 mmHg。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "108b-TNPA-內科-33": {"quick": "此為「對 penicillin 抗藥但其他抗生素均有效」的 MSSA，首選 oxacillin，故 (C)。", "detail": {"background": "金黃色葡萄球菌依對 methicillin/oxacillin 的感受性分為 MSSA（甲氧西林敏感）與 MRSA（抗藥）。本例「對 penicillin 抗藥但其他抗生素均有效」＝典型 MSSA（產 penicillinase 故對 penicillin 抗藥，但對抗 penicillinase 的 β-lactam 敏感）。MSSA 的首選是「抗葡萄球菌 β-lactam」——oxacillin、nafcillin 或 cefazolin，療效優於 vancomycin（vancomycin 殺菌較慢、組織穿透與療效略遜，保留給 MRSA 或 β-lactam 過敏者）。故首選 oxacillin（C）。血液培養為 S. aureus 應視為真陽性（非污染）、需找感染源並評估是否心內膜炎。", "options": {"A": "ceftazidime（抗綠膿第三代）對 MSSA 非首選。", "B": "血培 S. aureus 多為真陽性，不應假設污染；imipenem 非 MSSA 首選。", "C": "正確。MSSA 首選抗葡萄球菌 β-lactam（oxacillin/nafcillin/cefazolin）。", "D": "vancomycin 保留給 MRSA 或 β-lactam 過敏，對 MSSA 療效略遜 oxacillin。"}, "sources": ["Harrison 21e（Staphylococcal infections; MSSA treatment）"]}}, "108a-TNPA-外科-45": {"quick": "術後第 1–2 天發燒最常見原因是肺擴張不全，應加強胸腔護理、鼓勵深呼吸，故 (A)。", "detail": {"background": "術後發燒的時間軸（記憶「5 W」）：手術當天至 POD#1–2 最常見是「肺擴張不全（atelectasis）」（Wind，肺），處置為「肺部護理、鼓勵深呼吸、誘發性肺量計、早期下床」；POD#3–5 多為泌尿道感染（Water）、肺炎；POD#5+ 傷口感染（Wound）、靜脈炎/導管感染（Walking/DVT、Wonder drug 藥物熱）。本例剖腹肝葉切除術後第 2 天輕度發燒（38.3°C），最可能是肺擴張不全，最適當處理是「加強胸腔護理、鼓勵深呼吸」（A），而非立即更換所有導管、拆線或盲目換抗生素（過度且非首要）。若發燒持續或有定位症狀再進一步檢查。", "options": {"A": "正確。POD#1–2 發燒多為肺擴張不全，先加強胸腔護理、深呼吸。", "B": "過度。輕度早期術後發燒不需立即增液、會診換抗生素。", "C": "過度。不需常規更換所有導管。", "D": "過度。無傷口感染證據前不需拆線、培養。"}, "sources": ["Harrison 21e（Postoperative fever; 5 Ws）"]}}, "108b-TNPA-內科-61": {"quick": "敗血性休克可先用 norepinephrine 作第一線升壓劑，故 (B)。", "detail": {"background": "本題與 105-TNPA-內科-67 為同一情境（急性腹膜炎併敗血性休克）。重點同前：晶體液早期復甦、升壓劑首選「norepinephrine」、MAP 目標 ≥65 mmHg（非 55）、低劑量 dopamine 無腎臟保護（不建議）、vasopressin 為輔助非單獨第一線。故正確為 (B)。處置流程：盡早抗生素（1 小時內）＋控制感染源（腹膜炎需手術/引流）＋30 mL/kg 晶體液＋norepinephrine 維持 MAP≥65＋監測乳酸與尿量。", "options": {"A": "錯。MAP 目標 ≥65 mmHg，非 55。", "B": "正確。norepinephrine 為第一線升壓劑。", "C": "錯。低劑量 dopamine 無腎臟保護。", "D": "錯。vasopressin 為輔助，不單獨作第一線。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "108b-TNPA-內科-66": {"quick": "敗血症早期處置強調監測血中「乳酸（lactic acid）」濃度，故 (A)。", "detail": {"background": "敗血症的早期「組合式照護（bundles）」核心包括：抽血液培養（給抗生素前）、「測量血中乳酸」、1 小時內給廣效抗生素、低血壓或乳酸 ≥4 時給 30 mL/kg 晶體液、輸液後仍低血壓用升壓劑維持 MAP≥65，並「追蹤乳酸清除」評估復甦反應。乳酸是組織灌流與嚴重度指標，故兩大要件強調監測乳酸（A）。troponin、creatinine、氧合雖也評估器官功能，但 bundle 特別強調的代謝灌流指標是乳酸。", "options": {"A": "正確。bundle 強調監測血中乳酸（灌流/嚴重度指標）。", "B": "氧合重要但非 bundle 特別強調之代謝指標。", "C": "creatinine 反映腎功能，非 bundle 核心監測物質。", "D": "troponin-I 為心肌指標，非敗血症 bundle 核心。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "108b-TNPA-內科-67": {"quick": "敗血症復甦不建議用膠體（HES）取代晶體液，故敘述 (B) 錯。", "detail": {"background": "敗血症體液復甦原則：(A) 「晶體液（crystalloid，如生理食鹽水/平衡鹽液）」為初始首選——正確。(B) 「不建議」使用羥乙基澱粉（hydroxyethyl starch, HES）等膠體取代晶體液——因 HES 增加急性腎損傷與死亡風險（VISEP/6S/CHEST 試驗），故此敘述「以膠體取代晶體液」為錯誤。(C) 輸注紅血球濃縮液要謹慎（過量與 TRALI/ARDS、循環過載相關），採限制性輸血（Hb 閾值約 7）——正確。(D) 合併急性肺損傷時採較保守的液體策略、維持較低 CVP——正確。故錯誤者為 (B)。", "options": {"A": "正確。晶體液為初始復甦首選。", "B": "錯誤（為答案）。不建議以 HES 等膠體取代晶體液（增 AKI/死亡）。", "C": "正確。輸 PRBC 需謹慎（ARDS/循環過載風險），採限制性輸血。", "D": "正確。合併 ALI 時採保守液體、維持較低 CVP。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）；CHEST/6S trials (HES harm)"]}}, "109-進階-其他-61": {"quick": "下腹痛、發燒、低血壓、WBC 與 CRP 顯著升高、疑腹部急症＝敗血性休克，故 (D)。", "detail": {"background": "本例 60 歲女性下腹痛、體溫 38.5°C、血壓 75/40（低血壓）、心跳 100、WBC 18000、CRP 239（顯著發炎），疑腹腔急症（如穿孔/腹膜炎/膿瘍）併感染——是「感染源導致的分布性休克＝敗血性休克」。鑑別：低血容性休克需有失血/大量體液流失證據；心因性休克有幫浦衰竭證據；過敏性休克有過敏原暴露與蕁麻疹/喘鳴/血管性水腫。本例以感染（發炎指標高＋疑腹腔感染源）為主因，故為敗血性休克。處置：早期抗生素＋手術控制感染源＋晶體液＋norepinephrine。", "options": {"A": "低血容性休克需失血/脫水證據，本例以感染為主。", "B": "心因性休克需幫浦衰竭證據。", "C": "過敏性休克需過敏原與過敏徵象。", "D": "正確。腹腔感染源＋發炎指標高＋低血壓＝敗血性休克。"}, "sources": ["Harrison 21e（Septic shock）"]}}, "109-進階-內科-80": {"quick": "不應「單獨」使用 vasopressin 增壓（屬輔助），故 (B) 最不適當。", "detail": {"background": "敗血性休克血行動力支持：(A) 晶體液為初始灌注首選——適當。(B) vasopressin 是「輔助/第二線」，加在 norepinephrine 上以減少其用量並改善血壓，「不」單獨作為第一線升壓劑——故為最不適當。(C) dopamine 相較 norepinephrine 確實「較易引起心律不整」，故首選 norepinephrine——敘述正確。(D) 重症升壓中放置動脈導管可連續精準監測血壓——適當。故最不適當者為 (B)。", "options": {"A": "適當。晶體液為初始灌注輸液。", "B": "最不適當（為答案）。vasopressin 為輔助，不單獨增壓。", "C": "適當。dopamine 較 norepinephrine 易致心律不整（故首選 norepinephrine）。", "D": "適當。放置動脈導管連續監測血壓。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "111-進階-內科-62": {"quick": "腸球菌（Enterococcus）對 cephalosporin 天生抗藥，cefazolin 配對錯誤，故 (B)。", "detail": {"background": "致病菌與抗生素配對：(A) 腦膜炎雙球菌（N. meningitidis）→ceftriaxone（第三代頭孢，CNS 穿透佳）——正確。(B) 腸球菌（Enterococcus）對「所有 cephalosporin 天生抗藥（intrinsic resistance）」，治療用 ampicillin（敏感者）或 vancomycin，嚴重時加 aminoglycoside 協同；故「enterococcus-cefazolin」為錯誤配對。(C) MRSA→daptomycin（或 vancomycin、linezolid）——正確（daptomycin 不可用於肺炎，因被表面活性劑去活）。(D) 厭氧菌→metronidazole——正確。故錯誤者為 (B)。", "options": {"A": "正確。腦膜炎雙球菌用 ceftriaxone。", "B": "錯誤（為答案）。腸球菌對 cephalosporin 天生抗藥，不可用 cefazolin。", "C": "正確。MRSA 可用 daptomycin（非肺炎）。", "D": "正確。厭氧菌用 metronidazole。"}, "sources": ["Harrison 21e（Enterococcal intrinsic resistance; antimicrobial spectrum）"]}}, "112-進階-內科-56": {"quick": "敗血症採限制性輸血（Hb 閾值約 7），不需維持 Hb ≥10，故敘述 (C) 錯。", "detail": {"background": "敗血症/敗血性休克治療：(A) 盡快給適當抗生素「並控制感染源」（清創、引流膿、移除感染導管）——正確且關鍵。(B) 合併低血壓者早期給 30 mL/kg 晶體液——正確。(C) 採「限制性輸血策略」，在無活動性出血/心肌缺血下，輸血閾值為 Hb <7 g/dL，目標約 7–9，「不需」維持 Hb ≥10——故此敘述錯誤。(D) 升壓劑第一線為 norepinephrine——正確。故錯誤者為 (C)。限制性輸血（TRISS 試驗）在敗血性休克不劣於自由輸血且避免輸血併發症。", "options": {"A": "正確。盡快抗生素並控制感染源。", "B": "正確。低血壓者早期 30 mL/kg 晶體液。", "C": "錯誤（為答案）。採限制性輸血（Hb 閾值約 7），非維持 ≥10。", "D": "正確。第一線升壓劑為 norepinephrine。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）；TRISS trial NEJM 2014"]}}, "113-進階-家庭-9": {"quick": "搖頭丸（MDMA）中毒引起的發燒會合併血壓升高、心跳加快、瞳孔放大（擬交感），故 (C)。", "detail": {"background": "不明熱（FUO）相關概念與鑑別：(A) FUO 的定義是「經適當檢查仍『查不出原因』」，並非「可分離出病原菌」——錯（能分離病原就不算 FUO）。(B) 「藥物熱（drug fever）」的白血球未必 >10000（可正常甚至伴嗜酸性球增多）——錯。(C) 搖頭丸（MDMA）等「擬交感神經興奮劑（sympathomimetic）」中毒會造成高熱合併「血壓升高、心跳加快、瞳孔放大、躁動、出汗」（交感風暴），可致惡性高溫——正確。(D) FUO 不應「一律」投予經驗性廣效抗生素（除非血行不穩/嗜中性球低下等特殊情況），盲目給藥會干擾診斷、助長抗藥——錯。故正確為 (C)。", "options": {"A": "錯。FUO 是查不出原因；能分離病原即非 FUO。", "B": "錯。藥物熱白血球未必 >10000。", "C": "正確。MDMA（擬交感）中毒：高熱＋血壓升高＋心跳快＋瞳孔放大。", "D": "錯。FUO 不應一律給經驗性廣效抗生素。"}, "sources": ["Harrison 21e（FUO; sympathomimetic toxidrome）"]}}, "113-進階-內科-25": {"quick": "敗血性休克前 3 小時應給每公斤至少 30 mL 晶體液，故 (C)。", "detail": {"background": "2021 Surviving Sepsis 重點：(A) MAP 目標「≥65 mmHg」（非 55）——錯。(B) 對「敗血性休克」應在「1 小時內」給抗生素（無休克的敗血症可在 3 小時內）——「3 小時內」對休克而言太慢，敘述不夠精確。(C) 前 3 小時給「至少 30 mL/kg 晶體液」復甦——正確。(D) 第一線升壓劑為 norepinephrine（非 dopamine）；合併心因性成分可加 dobutamine——故 D 錯。故正確為 (C)。", "options": {"A": "錯。MAP 目標 ≥65 mmHg。", "B": "欠精確。敗血性休克應 1 小時內給抗生素。", "C": "正確。前 3 小時給 ≥30 mL/kg 晶體液。", "D": "錯。第一線升壓劑為 norepinephrine，非 dopamine。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "113-通論-5分科-48": {"quick": "2 週發燒＋心雜音＋指尖紅痛（Osler 結節）＋口腔黏膜瘀點＋貧血＝細菌性心內膜炎，故 (D)。", "detail": {"background": "感染性心內膜炎（IE）的典型表現：持續發燒、「新出現或變化的心雜音」（瓣膜贅生物與逆流）、周邊免疫/栓塞現象——「Osler 結節（指尖痛性結節）」、Janeway 病灶（手掌無痛紅斑）、瘀點（口腔黏膜、結膜）、Roth spots、指甲下線狀出血，以及貧血。本例 2 週發燒、心雜音、「指尖發紅疼痛（Osler 結節）」、口腔黏膜紫紅斑點（瘀點）、貧血（Hb 8.8）——高度符合 IE。診斷用「改良 Duke 準則」（血液培養陽性＋心臟超音波贅生物為主要條件），治療為長程靜脈抗生素±手術。鑑別：肺炎雖有 crackles/浸潤但無 Osler 結節與心雜音此組合；血管炎與心包炎不符此栓塞徵象組合。", "options": {"A": "亞急性心包炎以胸痛、心包摩擦音為主，無 Osler 結節等栓塞徵象。", "B": "自體免疫血管炎不會有贅生物性心雜音此組合。", "C": "社區型肺炎可有 crackles/浸潤，但無心雜音＋Osler 結節＋口腔瘀點之 IE 特徵。", "D": "正確。發燒＋心雜音＋Osler 結節＋瘀點＋貧血＝細菌性心內膜炎。"}, "sources": ["Harrison 21e（Infective endocarditis; Duke criteria）"]}}, "114-進階-內科-55": {"quick": "敗血性休克前 3 小時應給每公斤至少 30 mL 晶體液，故 (B)。", "detail": {"background": "2021 Surviving Sepsis 重點（同 113-進階-內科-25）：(A) MAP 目標 ≥65 mmHg（非 55）——錯。(B) 前 3 小時給「≥30 mL/kg 晶體液」復甦——正確。(C) 對嚴重 ARDS 之難治性低氧，「可」考慮葉克膜（ECMO）作為救援治療——故「不建議使用 ECMO」錯誤。(D) 第一線升壓劑為 norepinephrine，非 dopamine——錯。故正確為 (B)。整體 bundle：1 小時抗生素＋血培＋乳酸＋30 mL/kg 晶體液＋norepinephrine 維持 MAP≥65＋控制感染源。", "options": {"A": "錯。MAP 目標 ≥65 mmHg。", "B": "正確。前 3 小時給 ≥30 mL/kg 晶體液。", "C": "錯。嚴重難治 ARDS 可考慮 ECMO 救援。", "D": "錯。第一線升壓劑為 norepinephrine。"}, "sources": ["Surviving Sepsis Campaign Guidelines (2016/2021)；Harrison 21e（Sepsis and septic shock）"]}}, "105-TNPA-通論-30": {"quick": "CSF 淋巴球為主、葡萄糖正常、蛋白正常＝病毒性腦膜炎，故 (C)。", "detail": {"background": "病毒性腦膜炎是最常見的腦膜炎，致病原以腸病毒（enterovirus）為大宗，好發於夏秋、兒童與年輕族群，軍營/宿舍等群聚環境易流行。其 CSF 典型為「外觀清澈、開放壓正常或輕升、白血球數十至數百以『淋巴球（單核球）』為主、葡萄糖『正常』（CSF/血糖比值正常）、蛋白僅輕度上升」。本例 20 歲現役軍人、WBC 400 但淋巴球佔 85%、葡萄糖 92（血糖 110，比值正常）、蛋白 20（正常），完全符合病毒性；若為細菌性會是中性球為主、低糖高蛋白，結核/隱球菌雖也淋巴球為主但會「低糖、高蛋白」，可資鑑別。臨床多自限性、支持療法為主，需與單純疱疹腦炎（HSV，需 acyclovir）區別。", "options": {"A": "隱球菌：淋巴球為主但葡萄糖很低、蛋白很高，不符（本例葡萄糖正常）。", "B": "結核菌：淋巴球為主但葡萄糖很低、蛋白很高，不符。", "C": "正確。淋巴球為主＋葡萄糖正常＋蛋白正常＝病毒性。", "D": "細菌性：嗜中性球為主、葡萄糖低、蛋白高，不符。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "106-106b-內科-72": {"quick": "克沙奇病毒（腸病毒）可引起心肌炎等嚴重併發症，故 (B)。", "detail": {"background": "腸病毒（enterovirus，含克沙奇 Coxsackie、伊科 Echo、腸病毒 71 型等）是夏秋常見、糞口/飛沫傳染。臨床多樣：手足口病、「疱疹性咽峽炎（herpangina，特徵為軟顎/咽峽部小水泡與潰瘍，非牙齦出血）」、無菌性（病毒性）腦膜炎（腸病毒是「最常見」病因）、心肌炎/心包炎（克沙奇 B 群可致嚴重心肌炎）、腸病毒 71 型重症（腦幹腦炎、肺水腫）。也可有呼吸道症狀。故正確為 (B) 克沙奇病毒可致心肌炎等嚴重併發症。", "options": {"A": "錯。疱疹性咽峽炎為軟顎/咽峽部水泡潰瘍，非牙齦腫脹出血。", "B": "正確。克沙奇病毒可引起心肌炎等嚴重併發症。", "C": "錯。腸病毒可有呼吸道症狀，非僅嘔吐腹瀉。", "D": "錯。腸病毒是病毒性腦膜炎「最常見」病因。"}, "sources": ["Harrison 21e（Enteroviruses）"]}}, "106-106b-內科-75": {"quick": "社區型細菌性腦膜炎在菌種未明前，經驗用 vancomycin＋第三代頭孢，故 (C)。", "detail": {"background": "社區型細菌性腦膜炎成人最常見致病菌為肺炎鏈球菌與腦膜炎雙球菌。在菌種未確定前的經驗性治療為「vancomycin＋第三代頭孢（ceftriaxone 或 cefotaxime）」——第三代頭孢涵蓋腦膜炎雙球菌與多數肺炎鏈球菌且 CNS 穿透佳，vancomycin 涵蓋對頭孢抗藥的肺炎鏈球菌。若為 >50 歲、免疫低下、孕婦、酗酒等李斯特菌高風險者，「再加 ampicillin」。並建議在第一劑抗生素前/同時給 dexamethasone（降低肺炎鏈球菌腦膜炎之神經後遺症）。故選 (C)。", "options": {"A": "單用 vancomycin 不涵蓋腦膜炎雙球菌等革蘭氏陰性菌。", "B": "第二代頭孢 CNS 穿透與涵蓋不足。", "C": "正確。vancomycin＋第三代頭孢為經驗性首選（高危再加 ampicillin）。", "D": "第二代頭孢不適用於細菌性腦膜炎經驗治療。"}, "sources": ["IDSA Bacterial Meningitis Guideline", "Harrison 21e"]}}, "107-TNPA-內科-58": {"quick": "病毒性腦膜炎 CSF 以「淋巴球」為主，「中性球為主」最不可能，故 (B)。", "detail": {"background": "此題考「病毒性腦膜炎 CSF 各項數值的典型範圍」並找出不符者。病毒性腦膜炎的 CSF：開放壓可正常或輕度上升（約 100–350 mmH₂O 仍屬合理）、革蘭氏染色陰性（無細菌可見）、蛋白輕度上升（約 20–80 mg/dL）、葡萄糖正常，白血球以『淋巴球（單核球）』為主而非中性球。因此「以中性白血球（PMN）為主」是細菌性腦膜炎的特徵，最不符合病毒性。需注意一個陷阱：腸病毒性腦膜炎『極早期（數小時內）』偶可短暫呈 PMN 為主，但很快轉為淋巴球，典型仍以淋巴球為主，故仍以中性球為主為「最不可能」的答案。", "options": {"A": "可能。病毒性開放壓可輕度上升。", "B": "正確（最不可能）。病毒性以淋巴球為主，非中性球為主。", "C": "可能。病毒性革蘭氏染色陰性（無細菌）。", "D": "可能。病毒性蛋白輕度上升（20–80）。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "107-TNPA-內科-65": {"quick": "糖尿病、亞急性病程、CSF 淋巴球為主＋葡萄糖極低＋蛋白高＝隱球菌腦膜炎，故 (C)。", "detail": {"background": "隱球菌腦膜炎（Cryptococcus neoformans）好發於『免疫低下宿主』——HIV/AIDS、糖尿病、長期類固醇、器官移植者，本例 57 歲糖尿病即為典型族群。病程多『亞急性』（數天至數週的頭痛、嗜睡、發燒），CSF 呈「開放壓高、淋巴球為主、葡萄糖『很低』、蛋白『很高』」的型態（與結核性相似）。本例壓力 26 cmH₂O、淋巴球 86%、葡萄糖僅 12（血糖 352，比值極低）、蛋白 184，最符合隱球菌。診斷靠『印度墨汁染色、血/CSF 隱球菌抗原（CrAg）、真菌培養』；治療為 amphotericin B＋flucytosine 誘導，續以 fluconazole 鞏固，並積極處理高顱內壓（反覆腰椎引流可降死亡率）。", "options": {"A": "病毒性腦炎葡萄糖正常、以淋巴球為主但不會極低糖。", "B": "細菌性為中性球為主、急性病程，不符淋巴球性。", "C": "正確。糖尿病＋亞急性＋淋巴球性＋極低糖＋高蛋白＝隱球菌腦膜炎。", "D": "寄生蟲腦炎型態不符此 CSF。"}, "sources": ["Harrison 21e（Cryptococcal meningitis）"]}}, "108a-TNPA-內科-2": {"quick": "茲卡病毒（Zika）由「斑蚊（Aedes）」傳播，非家蚊，故配對 (C) 較不可能。", "detail": {"background": "蟲媒病毒與病媒蚊的配對是公衛重點：「斑蚊（Aedes，白線斑蚊/埃及斑蚊）」傳播登革熱、茲卡（Zika）、屈公病、黃熱病；「家蚊（Culex，三斑家蚊/熱帶家蚊）」傳播日本腦炎、西尼羅熱、淋巴絲蟲。故 (C)「茲卡病毒：家蚊」錯誤——茲卡由「斑蚊」傳播。其餘配對正確：日本腦炎-家蚊、登革熱-斑蚊、黃熱病-斑蚊。防治重點在清除孳生源、防蚊叮咬。", "options": {"A": "正確配對。日本腦炎病毒由家蚊（Culex）傳播。", "B": "正確配對。登革熱病毒由斑蚊（Aedes）傳播。", "C": "較不可能（為答案）。茲卡病毒由「斑蚊（Aedes）」傳播，非家蚊。", "D": "正確配對。黃熱病病毒由斑蚊（Aedes）傳播。"}, "sources": ["Harrison 21e（Arboviruses; mosquito vectors）", "CDC"]}}, "108b-TNPA-外科-9": {"quick": "發燒頭痛頸僵＋皮膚出血點＋CSF 革蘭氏陰性雙球菌＝腦膜炎雙球菌，故 (A)。", "detail": {"background": "本例為急性細菌性腦膜炎合併「瘀斑/紫斑（petechiae/purpura）」與 CSF「革蘭氏陰性雙球菌」——典型「腦膜炎雙球菌（Neisseria meningitidis）」感染。腦膜炎雙球菌好發年輕族群與群聚（軍營、宿舍），可猛爆進展為腦膜炎雙球菌血症（暴發性紫斑、華佛氏症候群 Waterhouse-Friderichsen 腎上腺出血休克）。處置：立即第三代頭孢（ceftriaxone）、飛沫隔離至少 24 小時、24 小時內通報、密切接觸者給 rifampin/ciprofloxacin/ceftriaxone 預防。對照：肺炎鏈球菌為革蘭氏陽性雙球菌、Klebsiella 為革蘭氏陰性桿菌、H. influenzae 為革蘭氏陰性球桿菌。", "options": {"A": "正確。革蘭氏陰性雙球菌＋瘀斑＝腦膜炎雙球菌（Neisseria meningitidis）。", "B": "肺炎鏈球菌為革蘭氏「陽性」雙球菌。", "C": "Klebsiella 為革蘭氏陰性「桿菌」。", "D": "H. influenzae 為革蘭氏陰性球桿菌。"}, "sources": ["Harrison 21e（Meningococcal disease）"]}}, "108b-TNPA-通論-57": {"quick": "發燒頭痛意識障礙＋Kernig sign 陽性（腦膜刺激徵）＝腦膜炎，故 (D)。", "detail": {"background": "腦膜刺激徵（meningeal signs）是腦膜發炎的臨床表現：「頸部僵硬（nuchal rigidity）」、「Kernig sign（屈髖後伸膝引起疼痛抵抗）」、「Brudzinski sign（被動屈頸引起髖膝反射性屈曲）」。本例發燒、頭痛、意識障礙合併 Kernig 陽性，最符合「腦膜炎（meningitis）」。腦瘤多為漸進性局部神經學缺損與顱內壓徵象、不以急性發燒腦膜刺激徵表現；腦膿瘍為局部佔位（發燒＋局部神經學缺損±癲癇）；腦炎以「腦實質」受損（意識/行為改變、癲癇）為主。確診需腰椎穿刺 CSF 分析（先排除顱內壓升高/佔位）。", "options": {"A": "腦炎以腦實質受損（行為/意識改變、癲癇）為主，非典型腦膜刺激徵。", "B": "腦瘤為漸進局部神經缺損與顱壓徵象，非急性發燒腦膜刺激徵。", "C": "腦膿瘍為局部佔位（發燒＋局部缺損），非單純腦膜刺激徵。", "D": "正確。發燒＋頭痛＋Kernig 陽性（腦膜刺激徵）＝腦膜炎。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "108a-TNPA-內科-67": {"quick": "老人、兩週亞急性、CSF 淋巴球為主＋葡萄糖很低＋蛋白高＝結核性腦膜炎，故 (D)。", "detail": {"background": "結核性腦膜炎（Mycobacterium tuberculosis）病程『亞急性』（常 1–3 週的發燒、頭痛、意識改變），好發於老人、營養不良或免疫低下者，本例 70 歲、症狀逾兩週即典型。其特徵是好侵犯『顱底』，易併發顱神經麻痺、血管炎性梗塞與交通性水腦。CSF 為「開放壓高、淋巴球為主、葡萄糖『很低』、蛋白『很高』」——本例壓力 230、淋巴球 90%、葡萄糖 26（血糖 83）、蛋白 180，完全符合。診斷靠抗酸染色（陽性率低）、結核培養（較慢）、CSF TB-PCR；治療為抗結核四合一（HRZE）併用『類固醇（dexamethasone）』以降低後遺症與死亡率。對照：肺炎鏈球菌/腦膜炎雙球菌為急性中性球性、腸病毒則葡萄糖正常。", "options": {"A": "肺炎鏈球菌為急性、中性球為主。", "B": "腦膜炎雙球菌為急性、中性球為主。", "C": "腸病毒（病毒性）葡萄糖正常，不符極低糖。", "D": "正確。亞急性＋淋巴球性＋低糖＋高蛋白＝結核性腦膜炎。"}, "sources": ["Harrison 21e（Tuberculous meningitis）"]}}, "109-進階-內科-65": {"quick": "李斯特菌腦膜炎首選 ampicillin（±gentamicin），故 (C)。", "detail": {"background": "李斯特菌（Listeria monocytogenes）是革蘭氏陽性桿菌，好發「新生兒、孕婦、>50 歲、免疫低下」者，可致腦膜炎/腦幹腦炎，常經由未滅菌乳製品、即食食品傳染。關鍵：李斯特菌「對所有 cephalosporin 天生抗藥」，故經驗性治療這些高危族群的腦膜炎時要「加上 ampicillin」涵蓋之。確診李斯特菌腦膜炎的首選治療是「ampicillin（或 penicillin G）＋gentamicin（協同殺菌）」。故選 (C)。含 ceftriaxone 的方案（B、D）對李斯特菌無效；carbapenem（meropenem）雖有活性但非首選。", "options": {"A": "vancomycin＋meropenem 非李斯特菌首選（meropenem 有活性但非首選）。", "B": "含 ceftriaxone，對李斯特菌無效。", "C": "正確。ampicillin＋gentamicin 為李斯特菌腦膜炎首選。", "D": "含 ceftriaxone，對李斯特菌無效。"}, "sources": ["Harrison 21e（Listeria meningitis treatment）"]}}, "110-進階-內科-58": {"quick": "CSF 革蘭氏陰性雙球菌＋瘀斑紫斑＝腦膜炎雙球菌，故 (D)。", "detail": {"background": "本例與 108b-TNPA-外科-9 同型：急性發燒頭痛頸僵＋皮膚「瘀點與紫斑」＋CSF「革蘭氏陰性雙球菌」＝腦膜炎雙球菌（Neisseria meningitidis）。瘀斑/暴發性紫斑是腦膜炎雙球菌血症的重要警訊，可快速進展為敗血性休克與 DIC。處置：立即 ceftriaxone（第三代頭孢）、飛沫隔離 24 小時、24 小時內法定通報、密切接觸者預防性投藥。對照：肺炎鏈球菌＝革蘭氏陽性雙球菌、Klebsiella＝陰性桿菌、H. influenzae＝陰性球桿菌。", "options": {"A": "肺炎鏈球菌為革蘭氏「陽性」雙球菌。", "B": "H. influenzae 為革蘭氏陰性球桿菌。", "C": "Klebsiella 為革蘭氏陰性「桿菌」。", "D": "正確。革蘭氏陰性雙球菌＋瘀斑＝腦膜炎雙球菌。"}, "sources": ["Harrison 21e（Meningococcal disease）"]}}, "110-進階-內科-59": {"quick": "腦膜炎雙球菌腦膜炎應用第三代頭孢，「高劑量第一代頭孢＋aminoglycoside」錯誤，故 (A)。", "detail": {"background": "腦膜炎雙球菌腦膜炎處置：(A) 治療首選「第三代頭孢（ceftriaxone/cefotaxime）」或 penicillin G（敏感者）；「第一代頭孢 CNS 穿透差、不涵蓋」，且 aminoglycoside 不透 CNS、對腦膜炎雙球菌非適當——故此處置「錯誤」。(B) 屬第二類法定傳染病，應「24 小時內通報」——正確。(C) 住院初期採「飛沫（呼吸道）隔離」至少 24 小時——正確。(D) 密切接觸者（同住家人）應盡速給「rifampin（或 ciprofloxacin/ceftriaxone）預防」——正確。故錯誤者為 (A)。", "options": {"A": "錯誤（為答案）。應用第三代頭孢；第一代頭孢＋aminoglycoside 不透 CNS、不涵蓋。", "B": "正確。24 小時內法定通報。", "C": "正確。初期飛沫隔離至少 24 小時。", "D": "正確。密切接觸者給 rifampin 等預防性投藥。"}, "sources": ["Harrison 21e（Meningococcal disease; chemoprophylaxis）"]}}, "110-進階-內科-66": {"quick": "細菌性腦膜炎 CSF 為白血球顯著上升（如 4000/mm³），故 (B)。", "detail": {"background": "急性細菌性腦膜炎為內科急症，理學上常見發燒、頸部僵硬與腦膜刺激徵——Brudzinski 徵象（被動屈頸引起髖膝反射性屈曲）與 Kernig 徵象（屈髖伸膝受限疼痛）陽性即提示腦膜炎。其 CSF 典型為「外觀混濁、開放壓顯著上升、白血球『顯著增多（數百至數千，以中性球為主）』、葡萄糖『下降』（CSF/血糖<0.4）、蛋白『上升』(>100)」。本題四選項中只有 (B) WBC 4000/mm³ 符合「白血球顯著上升」；(A) 清澈、(C) 蛋白 0.2 g/L 偏低、(D) 葡萄糖 150 偏高皆與細菌性相反。確診後須立即經驗性抗生素加 dexamethasone，不可因等待檢查而延誤。", "options": {"A": "錯。細菌性 CSF 外觀混濁，非清澈。", "B": "正確。細菌性 WBC 顯著上升（如 4000/mm³，中性球為主）。", "C": "錯。細菌性蛋白上升，非 0.2 g/L 之低值。", "D": "錯。細菌性葡萄糖下降，非 150（升高）。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "110-通論-其他-73": {"quick": "CSF 中性球為主（PMN 80%）＋低糖＋高蛋白＝細菌性腦膜炎，故 (C)。", "detail": {"background": "此題為急性細菌性腦膜炎的 CSF 判讀。細菌性的核心型態是「高壓＋高白血球（中性球為主）＋低葡萄糖＋高蛋白」，與病毒性（淋巴球為主、糖正常）、結核/隱球菌（淋巴球為主但低糖高蛋白、病程亞急性）對比即可區分。本例 25 歲、四天病程、壓力 30 cmH₂O、WBC 180 但『PMN 80%（中性球為主）』、葡萄糖 35（血糖 110，比值低）、蛋白 300（很高），符合急性細菌性。臨床處置重點：疑似細菌性腦膜炎應『立即』給經驗性抗生素（vancomycin＋第三代頭孢菌素，>50 歲或免疫低下加 ampicillin 涵蓋 Listeria）併 dexamethasone（首劑於抗生素前或同時），切勿因腰椎穿刺/影像而延誤給藥。", "options": {"A": "隱球菌為淋巴球為主，不符中性球性。", "B": "結核為淋巴球為主，不符。", "C": "正確。中性球為主＋低糖＋高蛋白＝細菌性腦膜炎。", "D": "病毒性為淋巴球為主、葡萄糖正常，不符。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "111-進階-內科-59": {"quick": "葡萄糖正常（100）且細胞數低（10）最不可能是急性細菌性腦膜炎，故 (D)。", "detail": {"background": "此題考細菌性腦膜炎 CSF 四大指標的「逐項判讀法」。急性細菌性腦膜炎 CSF 的特徵組合是『開放壓高、白血球高（中性球為主，常數百至數千）、葡萄糖低（CSF/血糖<0.4）、蛋白高(>100)』，判讀時只要任一數值明顯違背此組合即為「最不可能」。逐項檢視：(A) 壓力 22 高、葡萄糖 20 低→符合；(B) 細胞 120 高、蛋白 80 高→符合；(C) 蛋白 100 高、壓力 28 高→符合；(D) 葡萄糖 100『正常』且細胞僅 10『很低』→與細菌性的低糖高細胞完全相反，最不可能。此種「糖正常、細胞低」的型態較像正常 CSF、非感染性或極早期/已部分治療過的情況。", "options": {"A": "符合細菌性（壓力升、葡萄糖低）。", "B": "符合細菌性（細胞高、蛋白高）。", "C": "符合細菌性（蛋白高、壓力高）。", "D": "正確（最不可能）。葡萄糖正常＋細胞低與細菌性相反。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "111-進階-內科-69": {"quick": "淋巴球性、葡萄糖正常、染色皆陰性，後出現幻覺行為改變不自主運動＝病毒性腦炎，故 (C)。", "detail": {"background": "本例 CSF「淋巴球增多、葡萄糖正常」且「革蘭氏染色、抗酸染色、墨汁染色皆陰性」——排除細菌、結核、隱球菌；接著出現「幻覺、行為改變、四肢不自主運動」即「腦實質」受侵犯的表現＝「病毒性腦炎（viral encephalitis）」（最重要可治者為單純疱疹病毒 HSV 腦炎，好發顳葉，表現人格/行為改變、癲癇）。腦膜炎主要是腦膜發炎（頭痛頸僵），腦炎則影響腦實質（意識/行為/局部神經學）。HSV 腦炎須「儘早經驗性靜脈 acyclovir」（延誤增死亡與後遺症）；診斷以 CSF HSV PCR、MRI 顳葉變化、EEG。神經囊蟲病（neurocysticercosis）多為癲癇與影像囊腫，型態不符。", "options": {"A": "細菌性腦膜炎為中性球性、低糖，不符。", "B": "隱球菌墨汁染色多可見、且葡萄糖低，本例染色陰性、糖正常。", "C": "正確。淋巴球性＋糖正常＋腦實質症狀＝病毒性腦炎（疑 HSV）。", "D": "神經囊蟲病以癲癇與影像囊腫為主，型態不符。"}, "sources": ["Harrison 21e（Viral encephalitis; HSV encephalitis）"]}}, "112-進階-內科-59": {"quick": "野外操練後高燒＋焦痂（eschar）＝恙蟲病，嚴重可併間質性肺炎與腦炎，故 (D)。", "detail": {"background": "本例軍人「野外操練、相對心搏過緩、鼠蹊部焦痂（eschar）」是「恙蟲病（scrub typhus，Orientia tsutsugamushi，恙蟎叮咬）」的典型，焦痂為叮咬處特徵。臨床：高燒、頭痛、肌痛、淋巴結腫、皮疹、相對緩脈；嚴重者可併「間質性肺炎、腦膜腦炎、急性腎損傷、多重器官衰竭」（D 正確）。檢驗多見「白血球正常/低、血小板低下、肝指數上升」（B「血小板增加」錯）。病原為 Orientia tsutsugamushi（非地方性斑疹傷寒 R. typhi，A 錯）。治療首選「doxycycline」（azithromycin 替代）；β-lactam/carbapenem 對立克次體無效（C 含 meropenem 錯）。", "options": {"A": "錯。病原為 Orientia tsutsugamushi（恙蟲病），非 R. typhi。", "B": "錯。應為血小板「低下」、肝指數上升。", "C": "錯。立克次體用 doxycycline/azithromycin；meropenem 無效。", "D": "正確。嚴重恙蟲病可併間質性肺炎與腦炎。"}, "sources": ["Harrison 21e（Scrub typhus）"]}}, "112-進階-內科-65": {"quick": "較低開放壓（90–200）與較低白血球（10–300）較像病毒性腦膜炎，故 (A)。", "detail": {"background": "此題比較「病毒性 vs 細菌性腦膜炎」CSF 的量化差異。重點在開放壓與白血球數的高低：病毒性『開放壓正常或輕升（約 90–200 mmH₂O）、白血球較少（約 10–300/μL，以淋巴球為主）、葡萄糖正常』；細菌性『開放壓高（常 200–300 以上）、白血球高（數百至數千/μL，以中性球為主）、葡萄糖低』。故 (A)「開放壓 90–200、WBC 10–300」最像病毒性；(B)(C) 高壓且高白血球偏細菌性；(D) WBC 0–5/μL 屬『正常 CSF 參考值（0–5）』，代表沒有腦膜炎，並非病毒性的表現。記得正常 CSF：壓力 70–180 mmH₂O、WBC 0–5（淋巴球）、糖 ≈血糖的 2/3、蛋白 15–45 mg/dL。", "options": {"A": "正確。較低開放壓＋較低 WBC＝較像病毒性腦膜炎。", "B": "高壓＋高 WBC 偏細菌性。", "C": "高壓＋高 WBC 偏細菌性。", "D": "WBC 0–5 為正常 CSF（非腦膜炎）。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "113-進階-家庭-10": {"quick": "頸部僵硬時應優先檢查腦膜刺激徵 Brudzinski sign，故 (A)。", "detail": {"background": "病人發燒＋頸部僵硬，懷疑腦膜炎，應優先評估「腦膜刺激徵」以支持臨床診斷——「Brudzinski sign（被動屈頸引起髖膝反射性屈曲）」與 Kernig sign 皆為腦膜刺激徵。其餘選項與腦膜炎評估非首要：手指對鼻測試評估小腦協調、肌力評估運動系統、角膜反射評估腦幹/顱神經。確認腦膜刺激徵後，盡速安排腰椎穿刺 CSF 分析（必要時先影像排除顱內壓升高），並儘早給經驗性抗生素＋dexamethasone。", "options": {"A": "正確。Brudzinski sign 為腦膜刺激徵，應優先評估。", "B": "手指對鼻測試評估小腦協調，非腦膜炎評估首要。", "C": "肌力評估運動系統，非腦膜刺激徵。", "D": "角膜反射評估腦幹/顱神經，非首要。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "113-進階-家庭-12": {"quick": "病毒性腦膜炎診斷以 CSF 分析為主，MRI 不應優先於 CSF，故敘述 (D) 錯。", "detail": {"background": "病毒性腦膜炎：(A) 症狀與細菌性類似（發燒、頭痛、頸僵）但「嚴重度較低、多自限」——正確。(B) CSF 白血球以淋巴球為主，可達數百（如 300/μL）——正確。(C) 最常見致病原為「腸病毒」，其次疱疹病毒等——正確。(D) 診斷的關鍵是「腰椎穿刺 CSF 分析（細胞、生化、PCR）」，影像（MRI）非優先於 CSF（影像用於排除佔位/併發症或疑腦炎時）——故「MRI 應優先於 CSF」錯誤。多數病毒性腦膜炎支持治療即可，疑 HSV 則給 acyclovir。", "options": {"A": "正確。症狀類似細菌性但較輕、多自限。", "B": "正確。CSF 淋巴球為主，可達數百。", "C": "正確。最常見為腸病毒（及疱疹病毒）。", "D": "錯誤（為答案）。診斷以 CSF 分析為主，MRI 不應優先於 CSF。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "113-進階-內科-43": {"quick": "腦炎（尤 HSV）需抗病毒治療（acyclovir），「不需抗微生物以支持治療為主」錯誤，故 (D)。", "detail": {"background": "腦膜炎 vs 腦炎：(A) 腦膜炎主要影響「腦膜」、腦炎影響「腦實質」——正確。(B) 兩者腰椎穿刺 CSF 多有異常發現（細胞、蛋白、PCR）——正確。(C) 腦炎因腦實質受損，「更易出現癲癇、意識/行為改變、局部神經學缺損」——正確。(D) 腦炎「並非」都只支持治療——最重要的「單純疱疹病毒（HSV）腦炎」必須儘早給「靜脈 acyclovir」，延誤治療死亡率與後遺症大增；故「腦炎通常不需抗微生物、以支持為主」錯誤。其他如水痘帶狀疱疹腦炎亦用 acyclovir。故錯誤者為 (D)。", "options": {"A": "正確。腦膜炎影響腦膜、腦炎影響腦實質。", "B": "正確。兩者 CSF 多有異常。", "C": "正確。腦炎更易癲癇、意識變化。", "D": "錯誤（為答案）。HSV 腦炎需儘早靜脈 acyclovir，非僅支持治療。"}, "sources": ["Harrison 21e（Encephalitis; HSV）"]}}, "114-進階-內科-56": {"quick": "腦膜炎雙球菌為法定傳染病，須「24 小時內」通報（非 72 小時），故敘述 (C) 錯。", "detail": {"background": "本例 CSF「革蘭氏陰性雙球菌」＋瘀斑紫斑＝腦膜炎雙球菌感染。(A) 最可能為 Neisseria meningitidis——正確。(B) 治療用「高劑量 ceftriaxone（第三代頭孢）」——正確。(C) 流行性腦脊髓膜炎為「第二類法定傳染病」，須於「24 小時內」通報衛生主管機關——故「72 小時內」錯誤。(D) 採飛沫（呼吸道）隔離至有效抗生素治療滿 24 小時——正確。密切接觸者須預防性投藥。故錯誤者為 (C)。", "options": {"A": "正確。最可能致病菌為腦膜炎雙球菌。", "B": "正確。治療用高劑量 ceftriaxone。", "C": "錯誤（為答案）。應「24 小時內」通報，非 72 小時。", "D": "正確。飛沫隔離至抗生素治療滿 24 小時。"}, "sources": ["Harrison 21e；台灣傳染病防治法（流行性腦脊髓膜炎 24 小時通報）"]}}, "114-進階-內科-60": {"quick": "CSF 中性球為主（90%）＋低糖＋高蛋白＝細菌性腦膜炎，故 (C)。", "detail": {"background": "此題除了 CSF 判讀，還考「腰椎穿刺前要不要先做腦部 CT」。本例無慢病史、急性 3 天發燒頭痛、意識混亂＋頸僵，CSF 為 WBC 300『中性球 90%』、葡萄糖 25（血糖 85，比值<0.3）、蛋白 250、紅血球僅 2（非外傷性血液污染），是「中性球性、低糖、高蛋白」的急性型態，診斷為細菌性腦膜炎。關鍵觀念：腦部 CT『正常』並不能排除腦膜炎——CT 的目的是在腰椎穿刺前排除佔位病灶/顱內壓升高（避免腦疝），適應症為免疫低下、中樞神經病史、新發癲癇、視乳頭水腫或局部神經學缺損者；若需先 CT，應『先抽血培養並給經驗性抗生素＋dexamethasone』，再做 CT 與腰椎穿刺，不可延誤治療。", "options": {"A": "真菌（隱球菌）為淋巴球性，不符中性球性。", "B": "病毒性為淋巴球性、糖正常，不符。", "C": "正確。中性球為主＋低糖＋高蛋白＝細菌性腦膜炎。", "D": "結核性為淋巴球性、亞急性，不符急性中性球性。"}, "sources": ["Harrison 21e（Acute meningitis; CSF analysis）"]}}, "114-進階-內科-63": {"quick": "發燒頭痛頸僵＋行為改變＋EEG 顳葉週期性棘波＝HSV 腦炎，首選 acyclovir，故 (A)。", "detail": {"background": "本例「發燒、頭痛、頸部僵硬、行為改變」＋CSF「淋巴球上升」＋EEG「在緩慢低振幅背景出現週期性『局部顳葉』棘波（PLEDs）」——是「單純疱疹病毒（HSV）腦炎」的經典表現（HSV 好侵犯顳葉，致人格/行為改變、癲癇）。治療首選「靜脈 acyclovir」，且因延誤治療死亡率高，臨床上「一懷疑就先給 acyclovir」不等 PCR 結果。對照：benzathine penicillin G 用於梅毒、ceftriaxone 用於細菌性腦膜炎/淋病、doxycycline 用於立克次體——皆非 HSV 腦炎治療。故選 (A)。", "options": {"A": "正確。HSV 腦炎（顳葉、行為改變、EEG 週期棘波）首選靜脈 acyclovir。", "B": "benzathine penicillin G 用於梅毒。", "C": "ceftriaxone 用於細菌性腦膜炎/淋病，非 HSV 腦炎。", "D": "doxycycline 用於立克次體感染。"}, "sources": ["Harrison 21e（HSV encephalitis; acyclovir）"]}}, "105-TNPA-通論-33": {"quick": "肺炎後尖銳、隨呼吸加劇的胸痛＝肋膜痛（pleuritic pain），故 (B)。", "detail": {"background": "肺炎可侵犯到臟層肋膜引起肋膜發炎，造成「肋膜性胸痛（pleuritic chest pain）」——特徵是「尖銳、局部、隨深呼吸/咳嗽加劇」，因呼吸時發炎的肋膜層相互摩擦。鑑別：心絞痛為悶/壓榨痛、與用力相關、不隨呼吸變化（雖糖尿病心臟病史要警覺，但本例疼痛性質為呼吸相關尖銳痛）；氣胸為突發單側胸痛＋呼吸困難＋患側呼吸音消失；食道逆流為胸骨後灼熱、與姿勢/進食相關。本例肺炎病史＋呼吸相關尖銳胸痛，最符合肋膜痛（可能併發肋膜炎/肺膜旁積液）。", "options": {"A": "心絞痛為壓榨悶痛、與用力相關、不隨呼吸變化。", "B": "正確。肺炎波及肋膜→尖銳、隨呼吸加劇的肋膜性胸痛。", "C": "氣胸為突發胸痛＋呼吸困難＋患側呼吸音消失。", "D": "食道逆流為胸骨後灼熱、與進食/姿勢相關。"}, "sources": ["Harrison 21e（Pleuritic chest pain; pneumonia）"]}}, "105-TNPA-內科-53": {"quick": "退伍軍人菌為細胞內菌，第三代頭孢無效（需巨環/喹諾酮），故敘述 (C) 不正確。", "detail": {"background": "退伍軍人症（Legionellosis，Legionella pneumophila）：(A) 為嗜氧革蘭氏陰性桿菌，主要由 L. pneumophila 致病——正確。(B) 經「吸入受污染水源產生的氣霧（aerosol）」感染（冷卻水塔、熱水系統、噴霧），潛伏期 2–10 天，「非人傳人」——正確。(C) 因 Legionella 是「細胞內菌」，β-lactam（含第三代頭孢）無法有效殺滅，治療需用「巨環內酯（azithromycin）或呼吸型喹諾酮（levofloxacin）」——故「第三代頭孢可有效治療」為不正確。(D) 院內供水驗出時可用二氧化氯、銅銀離子、高溫沖洗等消毒——正確。故 (C) 為答案。診斷可用尿液抗原（針對血清型 1）。", "options": {"A": "正確。嗜氧革蘭氏陰性桿菌，主要為 L. pneumophila。", "B": "正確。吸入受污染水源氣霧致病，潛伏期 2–10 天，非人傳人。", "C": "不正確（為答案）。細胞內菌，需巨環/喹諾酮；第三代頭孢無效。", "D": "正確。供水系統可用二氧化氯或銅銀離子消毒。"}, "sources": ["Harrison 21e（Legionella infection）"]}}, "106-106a-通論-23": {"quick": "退伍軍人菌「不」人傳人，主要經污染水源氣霧傳播，故敘述 (D) 錯。", "detail": {"background": "退伍軍人症傳染鏈：(A) 嗜肺性退伍軍人菌為嗜氧革蘭氏陰性桿菌——正確。(B) 「水」是其天然生長環境（溫水 25–45°C 易繁殖）——正確。(C) 院內感染常來自空調「冷卻水塔」、熱水系統、加濕器等產生的含菌氣霧——正確。(D) 傳播途徑是「吸入受污染水源的氣霧」，「並非人與人之間互相傳染」——故此敘述錯誤。防治重點在水系統的維護與消毒，而非人際隔離。診斷靠尿液抗原與痰培養（特殊培養基）。", "options": {"A": "正確。嗜氧革蘭氏陰性桿菌。", "B": "正確。水是其天然生長處。", "C": "正確。院內來源可為空調冷卻水塔。", "D": "錯誤（為答案）。主要經污染水源氣霧傳播，非人傳人。"}, "sources": ["Harrison 21e（Legionella; transmission）"]}}, "106-106a-內科-56": {"quick": "痰中有膿細胞但革蘭氏染色與培養皆陰性＝非典型肺炎，用巨環內酯（erythromycin），故 (B)。", "detail": {"background": "本例 28 歲、發燒、流鼻水、雙下肺支氣管肺炎浸潤，痰液「合格檢體（白血球多、上皮細胞少）」卻「革蘭氏染色看不到細菌、培養陰性」——典型「非典型肺炎（atypical pneumonia）」，常見病原為黴漿菌（Mycoplasma pneumoniae）、披衣菌（Chlamydophila）、退伍軍人菌——這些為「細胞內/無細胞壁」病原，無法以一般革蘭氏染色與常規培養顯現。治療用「巨環內酯（erythromycin/azithromycin）或四環/呼吸型喹諾酮」。故選 (B) erythromycin。β-lactam（ampicillin-sulbactam、cefazolin、ceftriaxone）對這些非典型病原「無效」（無細胞壁或細胞內）。年輕、乾咳、肺外症狀、影像比理學嚴重也支持黴漿菌。", "options": {"A": "ampicillin-sulbactam（β-lactam）對非典型病原無效。", "B": "正確。非典型肺炎用巨環內酯（erythromycin/azithromycin）。", "C": "cefazolin（第一代頭孢）對非典型病原無效。", "D": "ceftriaxone（第三代頭孢）對非典型病原無效。"}, "sources": ["Harrison 21e（Atypical pneumonia; Mycoplasma）"]}}, "110-通論-其他-46": {"quick": "法定傳染病疫調為阻斷傳播鏈、保護公眾，非不當洩漏隱私，故 (D)。", "detail": {"background": "病人隱私權並非絕對——當涉及「重大公共衛生利益」時，法律授權主管機關進行疫情調查與必要的接觸者追蹤、告知。新冠肺炎（嚴重特殊傳染性肺炎）為法定傳染病，疫調人員為「阻斷傳播鏈、保護接觸者與公眾健康」而通知相關接觸場所（家人、餐廳、公司）以利匡列採檢與環境消毒，屬法律授權的正當公衛行為，「並非不當洩漏隱私」。故選 (D)。當然，疫調應在「必要最小範圍」內揭露、避免汙名化（隱私與公益需衡平），但本題核心是公衛責任高於個人隱私的正當性。", "options": {"A": "錯。雖可能受異樣眼光，但疫調為公衛正當行為，非不當洩漏。", "B": "錯。餐廳停業消毒是防疫必要，非隱私侵害理由。", "C": "錯。病人仍有隱私權，揭露須在必要範圍；說法過當。", "D": "正確。為阻斷傳播鏈、保護公眾，屬法律授權之正當疫調。"}, "sources": ["傳染病防治法；公共衛生倫理（隱私與公益衡平）"]}}, "111-通論-5分科-57": {"quick": "盛行率愈高，陽性預測值（PPV）愈「高」，故敘述 (D) 錯。", "detail": {"background": "診斷檢驗特性：敏感性（sensitivity）＝真正患病者被驗出陽性的比例；專一性（specificity）＝真正未患病者被驗出陰性的比例。(A) 實際結果受採檢部位、技術、檢體處理影響——正確。(B) 專一性 99%＝100 位未感染者有 1 位偽陽性——正確。(C) 敏感性 85%＝100 位真感染者有 85 位驗為陽性——正確。(D) 「陽性預測值（PPV）」隨「盛行率上升而上升」（盛行率高時陽性結果更可能是真陽性），故「盛行率愈高 PPV 愈低」為錯誤（方向相反）。臨床意義：低盛行率時即使高專一性，PPV 仍可能偏低（偽陽性占比增加）。", "options": {"A": "正確。結果受採檢部位、技術、檢體處理影響。", "B": "正確。專一性 99%＝100 位未感染者 1 位偽陽性。", "C": "正確。敏感性 85%＝100 位真感染者 85 位驗為陽性。", "D": "錯誤（為答案）。盛行率愈高，PPV 愈「高」（非愈低）。"}, "sources": ["Harrison 21e（Diagnostic test characteristics; PPV and prevalence）"]}}, "111-進階-內科-60": {"quick": "流感病毒是「RNA」病毒，非 DNA，故敘述 (A) 錯。", "detail": {"background": "流行性感冒：(A) 流感病毒屬正黏液病毒科，是「單股 RNA」病毒（非 DNA），分 A、B、C（及 D）型，A 型最易變異（抗原漂移/移型）造成流行與大流行——故「DNA 病毒」錯誤。(B) 流感後「續發性細菌性肺炎」最常見病原為「金黃色葡萄球菌（含 MRSA）、肺炎鏈球菌、H. influenzae」——正確。(C) 併發症包括肺炎、心肌炎、腦炎、Guillain-Barré 症候群、肌炎等——正確。(D) oseltamivir（神經胺酸酶抑制劑）可治 A、B 型流感——正確。故錯誤者為 (A)。", "options": {"A": "錯誤（為答案）。流感為 RNA 病毒，非 DNA。", "B": "正確。流感後續發細菌性肺炎常見金黃色葡萄球菌。", "C": "正確。併發症含心肌炎、腦炎、Guillain-Barré 等。", "D": "正確。oseltamivir 可治 A、B 型流感。"}, "sources": ["Harrison 21e（Influenza）"]}}, "112-進階-內科-38": {"quick": "退伍軍人症（尿抗原陽性）為法定傳染病，須於法定時間內通報，故 (A)。", "detail": {"background": "本題考「哪一個是法定傳染病需通報」。退伍軍人症（Legionellosis）為我國「第四類法定傳染病」，確診（含尿液抗原陽性）須於法定時間內通報，以利水源環境調查、防止群聚——故 (A) 為須通報者。對照：(B) 一般肺炎鏈球菌肺炎「非」法定通報（侵襲性肺炎鏈球菌感染症另有規範，但單純痰培養陽性非）；(C) 一般 A 型流感非通報，僅「流感併發重症」才通報；(D) 非結核分枝桿菌（NTM）「非」法定傳染病（結核才是）。故答案為 (A)。", "options": {"A": "正確。退伍軍人症為法定傳染病，尿抗原陽性須通報。", "B": "一般肺炎鏈球菌肺炎非法定通報。", "C": "一般 A 型流感非通報，僅流感併發重症才通報。", "D": "非結核分枝桿菌非法定傳染病（結核才是）。"}, "sources": ["台灣傳染病防治法（法定傳染病分類）"]}}, "112-進階-內科-55": {"quick": "病原正確名稱為「SARS-CoV-2」（非 SARS-CoV-2019），故敘述 (A) 錯。", "detail": {"background": "COVID-19：(A) 致病原的「正確名稱是 SARS-CoV-2」（所致疾病為 COVID-19），它確實是 RNA 病毒；題目寫「SARS-CoV-2019」為錯誤命名，故此敘述被列為錯誤。(B) 重症危險因子包含高齡、肥胖、懷孕、糖尿病、慢性肺/心/腎病、免疫低下等——正確。(C) 對需氧氣的嚴重肺炎病人，dexamethasone（RECOVERY 試驗）可降低死亡率——正確。(D) remdesivir（瑞德西韋）在「中度、早期、未插管」病人效益較明顯（重症晚期效益有限）——正確。故錯誤者為 (A)（命名錯誤）。", "options": {"A": "錯誤（為答案）。正確名稱為 SARS-CoV-2（非 SARS-CoV-2019）；它是 RNA 病毒。", "B": "正確。重症危險因子含肥胖、懷孕、糖尿病等。", "C": "正確。嚴重肺炎用 dexamethasone 可降死亡率（RECOVERY）。", "D": "正確。remdesivir 在中度/早期病人效益較明顯。"}, "sources": ["Harrison 21e（COVID-19）；RECOVERY trial"]}}, "112-進階-內科-57": {"quick": "人類流感病毒不只 A、B 型（尚有 C 型可感染人），敘述 (A) 不完整故錯，故 (A)。", "detail": {"background": "流感病毒：(A) 流感病毒分 A、B、C、D 型，其中「A、B、C 型皆可感染人類」（C 型症狀輕微；D 型主要感染牛）；A、B 型引起季節性流行，A 型可致大流行。題目「人類流感病毒分 A、B 兩種型別」不完整（漏 C 型），故為錯誤敘述。(B) 年長者、COPD 等慢性肺病者是流感併發次發性細菌肺炎的高風險——正確。(C) 流感併發重症（類流感後兩週內因併發症需加護或死亡）應通報，「不需等快篩/PCR 陽性」——正確。(D) 神經胺酸酶抑制劑（oseltamivir 等）為主要抗流感藥——正確。故錯誤者為 (A)。", "options": {"A": "錯誤（為答案）。人類流感尚有 C 型可感染，非僅 A、B 型。", "B": "正確。年長者、COPD 是流感併發細菌性肺炎高風險。", "C": "正確。流感併發重症應通報，不需等快篩/PCR 陽性。", "D": "正確。神經胺酸酶抑制劑為主要抗流感藥。"}, "sources": ["Harrison 21e（Influenza virus types）；CDC"]}}, "112-通論-其他-65": {"quick": "會厭炎的「拇指徵象」見於「頸部側位 X 光」而非胸部 X 光，故敘述 (A) 較不適當。", "detail": {"background": "急性會厭炎（acute epiglottitis）是會厭與上聲門組織的蜂窩性發炎，屬「呼吸道急症」（可快速腫脹致氣道阻塞）。(A) 影像特徵「拇指徵象（thumb sign，腫脹的會厭）」見於「頸部『側位』X 光」，不是「胸部 X 光」——故此敘述不適當。(B) 典型「3D」：流口水（drooling）、吞嚥困難（dysphagia）、呼吸窘迫（distress），常端坐前傾——正確。(C) 致病菌過去以 b 型嗜血桿菌（Hib）為主，疫苗後成人以鏈球菌、葡萄球菌、H. influenzae 等為主——正確。(D) 治療給經驗性抗生素（涵蓋上述）±類固醇減腫，並「優先確保氣道」（必要時插管/氣切，準備困難氣道）——正確。故 (A) 為答案。檢查咽喉時要極小心，避免刺激致氣道痙攣。", "options": {"A": "不適當（為答案）。拇指徵象見於「頸部側位 X 光」，非胸部 X 光。", "B": "正確。典型有流口水、吞嚥困難、呼吸窘迫。", "C": "正確。致病菌含鏈球菌、葡萄球菌、H. influenzae。", "D": "正確。給經驗性抗生素±類固醇，並優先確保氣道。"}, "sources": ["Harrison 21e（Acute epiglottitis）"]}}, "113-進階-家庭-71": {"quick": "長新冠（long COVID）「女性」較易發生，非男性，故敘述 (D) 錯。", "detail": {"background": "長新冠（post-COVID condition / long COVID，WHO 定義）：(A) 主要症狀為疲勞、呼吸困難、認知障礙（腦霧/健忘）、睡眠障礙、心悸、嗅味覺異常等多系統症狀——正確。(B) 通常發生在「感染後 3 個月內」出現、症狀「持續至少 2 個月」且無法以其他診斷解釋——正確。(C) 危險群包括重症、血栓傾向、先天免疫缺陷、神經系統異常、慢性病者——正確。(D) 流行病學顯示「女性」較男性容易出現長新冠症狀，故「男性更容易」為錯誤。故答案為 (D)。處置以多專科症狀管理與復健為主。", "options": {"A": "正確。主要症狀為疲勞、呼吸困難、健忘、睡眠障礙等。", "B": "正確。感染後 3 個月內發生、症狀持續 ≥2 個月。", "C": "正確。血栓、免疫缺陷、神經異常者較易發生。", "D": "錯誤（為答案）。女性較易出現長新冠，非男性。"}, "sources": ["WHO post-COVID-19 condition definition"]}}, "114-進階-內科-51": {"quick": "流感病毒是 RNA 病毒，非 DNA，故敘述 (B) 錯。", "detail": {"background": "流行性感冒重點（同 111-進階-內科-60）：(A) 流感後「續發細菌性肺炎」常見金黃色葡萄球菌（含 MRSA）、肺炎鏈球菌——正確。(B) 流感病毒為「單股 RNA」病毒（正黏液病毒科），非 DNA——故此敘述錯誤。(C) 常見併發症含肺炎、心肌炎、腦炎、Guillain-Barré、肌炎等——正確。(D) oseltamivir、peramivir（神經胺酸酶抑制劑）可治 A、B 型流感（peramivir 為靜脈劑型，用於無法口服者）——正確。故錯誤者為 (B)。", "options": {"A": "正確。流感後續發細菌性肺炎常見金黃色葡萄球菌。", "B": "錯誤（為答案）。流感為 RNA 病毒，非 DNA。", "C": "正確。併發症含肺炎、心肌炎、腦炎。", "D": "正確。oseltamivir、peramivir 可治 A、B 型流感。"}, "sources": ["Harrison 21e（Influenza）"]}}, "114-進階-家庭-52": {"quick": "老人、呼吸過速、低血氧、肺囉音＝重症肺炎，應立即住院並靜脈抗生素，故 (B)。", "detail": {"background": "本例 78 歲養護所住民，體溫 38.7°C、「呼吸 32 次/分（呼吸過速）」、「血氧 91%（低血氧）」、虛弱、右下肺囉音——是「重症社區/醫療照護相關肺炎」。依嚴重度評分（CURB-65：意識、尿素氮、呼吸≥30、血壓、年齡≥65；或 qSOFA）本例至少有「年齡≥65、呼吸≥30」且低血氧，屬高風險，應「立即轉診住院、給予靜脈抗生素」並氧氣支持、評估是否加護。對年老、低血氧、生命徵象不穩者，門診口服抗生素追蹤（A、C）或先觀察（D）都不安全、會延誤。故選 (B)。養護機構住民還需涵蓋可能的抗藥菌與吸入性肺炎病原。", "options": {"A": "錯。老人低血氧重症肺炎不宜門診口服追蹤。", "B": "正確。重症肺炎（老人、呼吸快、低血氧）應立即住院＋靜脈抗生素。", "C": "錯。口服抗生素追蹤不適用於低血氧之重症。", "D": "錯。先觀察會延誤重症肺炎治療。"}, "sources": ["Harrison 21e（Community-acquired pneumonia; CURB-65）；IDSA/ATS CAP"]}}, "105-TNPA-通論-77": {"quick": "脾臟腫大「並非」脾膿瘍的典型症狀，故 (C) 正確。", "detail": {"background": "脾臟膿瘍（splenic abscess）少見，多源於血行性散播（心內膜炎、菌血症）、鄰近感染蔓延、外傷或脾梗塞續發感染，好發免疫低下者。臨床表現常「不典型」——發燒、左上腹痛、左側肋膜積液，「脾臟腫大並非典型/恆見症狀」（A 罕見、非常見且致命之說法不符；脾腫大非典型）。診斷以「電腦斷層（CT）」最敏感為首選。治療：單發小膿瘍可用「經皮引流＋抗生素」，多發或脾破裂風險高者才考慮脾切除（並非「一律」需切脾）。預後上「多發性膿瘍＋免疫低下」死亡率高（>50%），故「多發比單發死亡率低」錯。故正確為 (C)。", "options": {"A": "錯。脾膿瘍少見，非「常見」。", "B": "錯。多發性膿瘍死亡率「高」於單發，非較低。", "C": "正確。脾臟腫大並非脾膿瘍的典型症狀。", "D": "錯。可用引流＋抗生素，未必須脾切除根除。"}, "sources": ["Harrison 21e（Splenic abscess）"]}}, "106-106a-內科-53": {"quick": "偽膜性結腸炎由艱難梭狀桿菌（C. difficile）引起，故 (B)。", "detail": {"background": "偽膜性結腸炎（pseudomembranous colitis）由「艱難梭狀桿菌（Clostridioides difficile）」產生的毒素（toxin A/B）造成，典型在「使用廣效抗生素（如 clindamycin、頭孢、fluoroquinolone）破壞腸道正常菌叢後」過度增生，表現水瀉、腹痛、發燒、白血球上升，內視鏡見黃白色偽膜。診斷以糞便 C. difficile 毒素/PCR。治療：停用誘發抗生素，給「口服 vancomycin 或 fidaxomicin（首選），metronidazole（輕症替代）」，嚴重者注意中毒性巨結腸。注意 clindamycin 等「會引起」而非治療。其餘：E. coli（部分致腹瀉但非偽膜性）、Salmonella（侵襲性腸炎）、肉毒桿菌（神經毒素致軟癱，非腸炎）。", "options": {"A": "大腸桿菌部分株致腹瀉，但非偽膜性結腸炎病原。", "B": "正確。偽膜性結腸炎由 C. difficile 毒素引起。", "C": "沙門氏菌致侵襲性腸炎，非偽膜性結腸炎。", "D": "肉毒桿菌產神經毒素致軟性麻痺，非腸炎。"}, "sources": ["Harrison 21e（Clostridioides difficile infection）"]}}, "108b-TNPA-外科-11": {"quick": "吃生魚片後發燒、血絲便的侵襲性腸炎，最常見為沙門氏菌，故 (A)。", "detail": {"background": "食物中毒/腸道感染依潛伏期與症狀區分病原：(1) 「侵襲性細菌性腸炎」——沙門氏菌（Salmonella）、志賀氏菌（Shigella）、曲狀桿菌（Campylobacter）、腸出血性大腸桿菌等，潛伏期較長（數小時至 1–3 天），表現「發燒、腹痛、血絲/黏液便」（侵犯腸黏膜）。(2) 「毒素型」——金黃色葡萄球菌、仙人掌桿菌（B. cereus）潛伏期極短（1–6 小時）以「嘔吐」為主、「無發燒、無血便」。(3) 病毒（輪狀、諾羅）水瀉為主。本例吃生魚片後「次日（潛伏期較長）發燒、腹瀉、血絲便」＝侵襲性細菌性腸炎，最常見「沙門氏菌（Salmonella enteritidis）」。多數支持治療（補水），侵襲性/高危才用抗生素。", "options": {"A": "正確。潛伏期較長＋發燒＋血絲便＝沙門氏菌（侵襲性腸炎）。", "B": "金黃色葡萄球菌為毒素型（潛伏期短、嘔吐為主、無發燒血便）。", "C": "輪狀病毒以水瀉為主（多見幼兒），非血絲便。", "D": "仙人掌桿菌（B. cereus）為毒素型，嘔吐為主、無血便。"}, "sources": ["Harrison 21e（Acute infectious diarrhea; Salmonella）"]}}, "109-進階-外科-78": {"quick": "Fluoroquinolone 對攝護腺穿透「良好」、是攝護腺炎第一線，故敘述 (B) 錯。", "detail": {"background": "泌尿道感染治療：(A) aminoglycosides 經腎排除，腎功能不全須調整劑量並監測——正確。(B) 「fluoroquinolone（如 ciprofloxacin、levofloxacin）對攝護腺穿透『良好』」，正是「細菌性攝護腺炎的第一線」治療（連同 trimethoprim-sulfamethoxazole）——故「穿透不佳、非第一線」為錯誤。(C) 謹慎選藥與療程以減抗藥性（antibiotic stewardship）——正確。(D) 第一代頭孢（cefazolin/cephalexin）對革蘭氏陽性菌佳，對部分腸道革蘭氏陰性（E. coli、Proteus mirabilis、Klebsiella）也有效，可用於單純 UTI——大致正確。故錯誤者為 (B)。", "options": {"A": "正確。aminoglycosides 腎功能不全須調量。", "B": "錯誤（為答案）。fluoroquinolone 攝護腺穿透良好，為攝護腺炎第一線。", "C": "正確。謹慎選藥與療程以減抗藥性。", "D": "正確。第一代頭孢對革蘭氏陽性及部分腸道陰性菌有效。"}, "sources": ["Harrison 21e（UTI and prostatitis treatment）"]}}, "112-進階-外科-49": {"quick": "憩室炎併侷限性骨盆腔膿瘍應「先引流膿瘍、穩定後再手術」，故 (A)。", "detail": {"background": "本例糖尿病、乙狀結腸憩室炎併「侷限性骨盆腔膿瘍」、腹膜炎徵象（壓痛、反彈痛）。憩室炎併膿瘍的處理原則：(A) 對「可引流的侷限性膿瘍（通常 >3–4 cm）」，先「經皮膿瘍引流＋靜脈抗生素」控制感染、穩定病情，再擇期手術（如需要）——正確且為現代主流（避免急性發炎期手術併發症）。(B) 並非一律「緊急手術優先」（除非游離穿孔、瀰漫性腹膜炎、敗血性休克）。(C) 「不考慮手術」過於絕對——膿瘍大、引流失敗、反覆發作或合併症仍需手術。(D) 急性緩解後仍「應安排大腸鏡」排除大腸癌（憩室炎與癌可並存/混淆）——故「非必要」錯誤。故正確為 (A)。", "options": {"A": "正確。先經皮引流膿瘍＋抗生素，穩定後再手術。", "B": "錯。非一律緊急手術（除非游離穿孔/瀰漫腹膜炎/休克）。", "C": "錯。「不考慮手術」過於絕對，引流失敗/反覆/合併症仍需手術。", "D": "錯。緩解後仍應安排大腸鏡排除大腸癌。"}, "sources": ["Harrison 21e（Diverticulitis; complicated management）"]}}, "113-進階-外科-37": {"quick": "脾膿瘍診斷首選為「電腦斷層（CT）」而非超音波，故敘述 (B) 錯。", "detail": {"background": "脾臟膿瘍：(A) 「通常不會有脾臟腫大」（脾腫大非典型）——正確。(B) 診斷「首選為電腦斷層（CT）」（敏感度與定位最佳），超音波雖可輔助但「非首選/敏感度較低」——故「超音波是首選」錯誤。(C) 膿瘍可為單發或多發（成人約 1/3 多發、兒童約 1/3 單發之分布）——依題敘述為正確。(D) 免疫功能低下合併多發性膿瘍死亡率「超過五成」——正確。故錯誤者為 (B)。治療：單發可經皮引流＋抗生素，多發/破裂風險高考慮脾切除。", "options": {"A": "正確。脾膿瘍通常不會有脾臟腫大（非典型）。", "B": "錯誤（為答案）。診斷首選為 CT，非超音波。", "C": "正確（依題敘述之分布）。", "D": "正確。免疫低下＋多發性膿瘍死亡率 >50%。"}, "sources": ["Harrison 21e（Splenic abscess; diagnosis）"]}}, "114-進階-內科-54": {"quick": "機構群聚噁心嘔吐腹瀉、糞便細菌培養陰性＝諾羅病毒，故 (B)。", "detail": {"background": "人口密集機構（學校、醫院、安養院、郵輪）爆發的「急性腸胃炎群聚」，若以「噁心、嘔吐、水瀉」為主、潛伏期短（12–48 小時）、病程自限（1–3 天）、且「細菌培養陰性」——最可能為「諾羅病毒（Norovirus）」。諾羅病毒極具傳染力（少量病毒即可感染）、糞口及嘔吐物氣霧傳播、對酒精乾洗手抵抗力較強（需肥皂洗手與漂白水消毒）。輪狀病毒主要侵犯嬰幼兒；大腸桿菌與霍亂弧菌為細菌（培養可陽性，且霍亂為大量米湯樣水瀉）。故最可能為 (B) 諾羅病毒。防治重點：手部衛生、環境漂白水消毒、患者隔離。", "options": {"A": "輪狀病毒主要感染嬰幼兒，非成人機構群聚主因。", "B": "正確。機構群聚嘔吐腹瀉＋細菌培養陰性＝諾羅病毒。", "C": "大腸桿菌為細菌，培養可陽性。", "D": "霍亂弧菌為細菌（大量米湯樣便），培養可陽性。"}, "sources": ["Harrison 21e（Norovirus gastroenteritis）", "CDC"]}}, "105-TNPA-外科-76": {"quick": "細菌培養「不是」可靠的蜂窩組織炎/皮膚炎鑑別點（蜂窩組織炎培養常陰性），故 (B)。", "detail": {"background": "蜂窩組織炎（cellulitis，真皮與皮下組織的細菌感染）與皮膚炎（dermatitis，發炎/過敏性皮膚反應）的臨床鑑別：(A) 症狀——蜂窩組織炎以「痛、紅、腫、熱」為主，皮膚炎以「癢」為主——可鑑別。(C) 抽血——蜂窩組織炎常見「白血球上升、發炎指標升高」，皮膚炎多正常——可鑑別。(D) 體溫——蜂窩組織炎常「發燒」，皮膚炎通常無——可鑑別。(B) 「細菌培養」並非可靠鑑別點——蜂窩組織炎多為「臨床診斷」，血液/傷口培養「常為陰性或不常規執行」（陽性率低），無法以培養可靠區分；故 (B) 為「不是」鑑別診斷的項目（答案）。", "options": {"A": "是鑑別點。蜂窩組織炎以痛為主、皮膚炎以癢為主。", "B": "正確（不是鑑別點）。蜂窩組織炎培養常陰性，非可靠鑑別依據。", "C": "是鑑別點。蜂窩組織炎白血球上升、皮膚炎正常。", "D": "是鑑別點。蜂窩組織炎發燒、皮膚炎體溫正常。"}, "sources": ["Harrison 21e（Cellulitis; clinical diagnosis）"]}}, "106-106a-通論-44": {"quick": "深頸部感染需住院、靜脈抗生素±引流，非門診口服治療，故敘述 (A) 錯。", "detail": {"background": "深頸部感染（deep neck infection）是頸部筋膜間隙的化膿性感染（如咽旁、咽後、Ludwig’s angina），(B) 多源於「牙源性（odontogenic）感染」或扁桃腺/咽部感染——正確；(D) 好發秋冬——依題敘述為正確。臨床表現發燒、頸痛、吞嚥困難/疼痛、張口困難。(C) 「嚴重者可致死」——正確（可致氣道阻塞、縱膈炎、頸動脈鞘侵犯、敗血症）。(A) 因進展快、可致命，需「住院、靜脈廣效抗生素，並評估膿瘍切開引流與氣道」，「不」適合門診口服第一線治療——故 (A) 錯誤。糖尿病者更須積極。", "options": {"A": "錯誤（為答案）。深頸部感染需住院靜脈抗生素±引流，非門診口服。", "B": "正確。牙源性感染為主因。", "C": "正確。嚴重者可致死（氣道阻塞、縱膈炎）。", "D": "正確（依題敘述）。好發秋冬季節。"}, "sources": ["Harrison 21e（Deep neck space infections）"]}}, "106-106a-外科-52": {"quick": "會陰陰囊壞死、惡臭分泌物＝Fournier 壞死性筋膜炎，需「徹底清創切除所有感染組織」，故 (C)。", "detail": {"background": "本例糖尿病、痔瘡術後、「會陰陰囊紅腫疼痛、皮膚發紺、惡臭分泌物」——是「Fournier’s gangrene（會陰部壞死性筋膜炎）」，屬外科急症，多為「多菌種（需氧＋厭氧）」協同感染沿筋膜快速蔓延、組織壞死、產氣，糖尿病為重要危險因子。治療關鍵是「立即、徹底的外科清創——切除所有壞死的皮膚、皮下、筋膜（必要時重複清創）」，並給廣效抗生素（涵蓋革蘭氏陽性、陰性與厭氧）與支持治療、必要時高壓氧。單純抗生素（A）或僅切開引流（B）不足以控制沿筋膜擴散的壞死。睪丸通常因有獨立血供而「可保留」，不需常規切除睪丸或結腸造口（D 過度）。故選 (C)。", "options": {"A": "單純抗生素不足，須立即外科清創。", "B": "僅切開引流不足以清除沿筋膜擴散的壞死組織。", "C": "正確。Fournier 壞死性筋膜炎須徹底清創切除所有感染壞死組織。", "D": "過度。睪丸多可保留（獨立血供），不需常規切睪丸/結腸造口。"}, "sources": ["Harrison 21e（Necrotizing fasciitis; Fournier gangrene）"]}}, "106-106a-內科-55": {"quick": "出血性水泡、疼痛消失＋休克、皮下氣腫提示壞死性筋膜炎，故 1、3、4＝(C)。", "detail": {"background": "蜂窩組織炎病人若出現以下「危險徵象」應警覺已進展為「壞死性筋膜炎（necrotizing fasciitis）」並緊急照會外科清創：①患部快速擴大、出現「出血性水泡（hemorrhagic bullae）」與皮膚壞死變色；③「疼痛與全身狀況不成比例」——劇痛後「原患部疼痛反而消失（神經被破壞）」，合併持續高燒、低血壓（敗血症）；④輕壓患部有「皮下氣腫/捻髮音（crepitation，產氣菌）」。這些是 NF 的紅旗。②「鼠蹊部淋巴腺腫大致跛行」是一般淋巴反應，「非」NF 特異徵象。故為 1、3、4＝(C)。NF 治療為緊急廣泛清創＋廣效抗生素（含 clindamycin 抑制毒素）＋支持。", "options": {"A": "1 2 3——含②淋巴腺腫（非 NF 特異徵象），不選。", "B": "1 2 4——含②，不選。", "C": "正確。①出血性水泡 ③疼痛消失＋休克 ④皮下氣腫＝壞死性筋膜炎徵象。", "D": "2 3 4——含②，不選。"}, "sources": ["Harrison 21e（Necrotizing fasciitis; warning signs）"]}}, "106-106a-通論-64": {"quick": "絕對風險下降＝14%−7%＝7%，NNT＝1/0.07≈14，故 (B)。", "detail": {"background": "益一需治數（number needed to treat, NNT）＝1 / 絕對風險下降（absolute risk reduction, ARR）。本題：未用預防性抗生素的傷口感染率 14%（0.14），使用後降至 7%（0.07），故 ARR＝0.14−0.07＝0.07（7%）。NNT＝1/0.07≈14.3，取 14——代表「平均每給 14 位狗咬傷病人預防性抗生素，可避免 1 例傷口感染」。NNT 愈小代表介入效益愈大。注意不要用相對風險下降（本例相對下降 50%）來算 NNT。故答案為 (B)。", "options": {"A": "7 為錯誤（誤用其他數值）。", "B": "正確。ARR＝14%−7%＝7%，NNT＝1/0.07≈14。", "C": "21 為錯誤。", "D": "28 為錯誤。"}, "sources": ["Evidence-based medicine: NNT = 1/ARR"]}}, "107-TNPA-外科-73": {"quick": "手術部位感染（SSI）最常見病原為革蘭氏陽性球菌（金黃色葡萄球菌），故 (A)。", "detail": {"background": "手術部位感染（SSI）的病原依手術部位與是否進入空腔而異，但「整體最常見」為「革蘭氏陽性球菌——金黃色葡萄球菌（S. aureus，含 MRSA）、凝固酶陰性葡萄球菌」（來自皮膚菌叢），故 (A) 正確。需注意各選項細節：下腸胃道/結直腸手術因進入腸道，病原以「革蘭氏陰性桿菌『與厭氧菌（如 Bacteroides）』混合」為主（故 B 不完整、C 把腔內手術說成「以厭氧菌最常見」過於片面）；頭頸/咽喉手術因經口咽，常為「口咽鏈球菌與厭氧菌之混合」（故 D「以 S. aureus 為主」不準確）。整體最常見仍是革蘭氏陽性球菌，故選 (A)。", "options": {"A": "正確。SSI 整體最常見病原為革蘭氏陽性球菌（S. aureus）。", "B": "下腸胃道手術為革蘭氏陰性桿菌「合併厭氧菌」，敘述不完整。", "C": "腔內手術病原為混合菌，非「以厭氧菌最常見」之片面說法。", "D": "咽喉手術為口咽鏈球菌與厭氧菌混合，非以 S. aureus 為主。"}, "sources": ["Harrison 21e（Surgical site infections; microbiology）"]}}, "108b-TNPA-外科-6": {"quick": "糖尿病、內踝部位、邊緣不規則的慢性難癒傷口＝靜脈性潰瘍，故 (A)。", "detail": {"background": "下肢慢性潰瘍依機轉鑑別（部位是關鍵線索）：(A) 「靜脈性潰瘍」——好發「內踝（medial malleolus）周圍」，邊緣不規則、滲液多、周圍有色素沈著與脂性硬皮，因靜脈高壓/瓣膜功能不全，是最常見的下肢潰瘍。(B) 動脈性潰瘍——好發肢端/趾尖與壓力點，邊緣整齊「打洞狀」、乾、劇痛、周邊脈搏弱。(C) 神經病變性潰瘍——好發足底壓力點（蹠骨頭），無痛、周圍厚繭。(D) 「糖尿病足潰瘍」常是神經病變＋缺血＋感染的綜合，但本題以「內踝、邊緣不規則、滲液」之部位與型態最符合「靜脈性潰瘍」。本例合併發燒/紅潤/滲液提示續發感染，需傷口照護＋必要時抗生素。", "options": {"A": "正確。內踝周圍、邊緣不規則、滲液多＝靜脈性潰瘍。", "B": "動脈性潰瘍好發肢端、邊緣整齊打洞狀、乾而劇痛。", "C": "神經病變性潰瘍好發足底壓力點、無痛、周圍厚繭。", "D": "糖尿病足為綜合機轉，但此部位型態最符靜脈性潰瘍。"}, "sources": ["Harrison 21e（Chronic leg ulcers classification）"]}}, "108b-TNPA-外科-17": {"quick": "長期酗酒（免疫低下）是動物咬傷傷口感染的高風險因子，故 (C)。", "detail": {"background": "動物咬傷傷口感染的風險因子包括：宿主免疫低下（「長期酗酒、糖尿病、肝硬化、脾切除、免疫抑制」）、傷口型態（「穿刺型/深部」較難清潔、貓咬尤甚）、特定部位（手、關節、生殖器，但「頭皮/臉」因血供豐富感染率『較低』）、延遲就醫與清創。本例「長期酗酒」是明確的宿主免疫低下因子，為傷口感染高風險（C）。傷口位於頭皮（血供佳，感染率較低，非高風險）、年齡 45 歲（非特別風險）、鄰家養的狗（已知來源、可評估狂犬風險但非感染高風險本身）。處置：徹底沖洗清創、評估狂犬病與破傷風預防、依情況給預防性抗生素（amoxicillin-clavulanate 涵蓋 Pasteurella 等）。", "options": {"A": "頭皮血供豐富，傷口感染率「較低」，非高風險。", "B": "45 歲非特別感染風險因子。", "C": "正確。長期酗酒（免疫低下）為傷口感染高風險因子。", "D": "狗為已知來源（評估狂犬風險），非感染高風險本身。"}, "sources": ["Harrison 21e（Animal bite wounds; infection risk）"]}}, "108a-TNPA-內科-42": {"quick": "無傷口的下肢蜂窩組織炎最常見致病菌為金黃色葡萄球菌（與 A 群鏈球菌並列），本題鍵 (A)。", "detail": {"background": "蜂窩組織炎（真皮與皮下感染）的兩大致病菌為「金黃色葡萄球菌（Staphylococcus aureus）」與「A 群 β-溶血性鏈球菌（Streptococcus pyogenes）」。一般而言：有膿/膿瘍/穿刺傷者偏向 S. aureus（含 MRSA）；瀰漫性、無明顯入口的非化膿性蜂窩組織炎則 β-溶血性鏈球菌也很常見。本題「下肢紅腫熱痛、外表無傷口」之蜂窩組織炎，官方鍵定為「金黃色葡萄球菌（A）」為最可能（S. aureus 是皮膚最常見致病菌）；A 群鏈球菌（C）亦為重要病原，臨床經驗治療常須同時涵蓋此兩者（如 cephalexin、oxacillin；疑 MRSA 加 vancomycin）。表皮葡萄球菌（D）為皮膚常在菌、多為導管/植入物感染；肺炎鏈球菌（B）非蜂窩組織炎典型病原。", "options": {"A": "正確（本題鍵）。金黃色葡萄球菌為皮膚最常見致病菌。", "B": "肺炎鏈球菌非蜂窩組織炎典型病原。", "C": "A 群鏈球菌亦為重要病原（常須一併涵蓋），但非本題所鍵。", "D": "表皮葡萄球菌多為導管/植入物感染。"}, "sources": ["Harrison 21e（Cellulitis; S. aureus and group A streptococcus）"]}}, "111-進階-外科-71": {"quick": "Fournier 壞死性筋膜炎為多菌（含厭氧）感染；「綠膿桿菌為厭氧菌」錯誤，故 (C)。", "detail": {"background": "本例糖尿病、會陰陰囊「疼痛壞死腫大、發燒寒顫、皮下氣腫」＝Fournier’s gangrene（會陰壞死性筋膜炎）。處置：(A) 立即外科清創——正確且關鍵。(B) 培養報告前先給廣效抗生素（涵蓋革蘭氏陽性、陰性與厭氧）——正確。(C) 病原為「多菌種協同感染」，常見需氧菌如 E. coli、Klebsiella、腸球菌，厭氧菌如 Bacteroides、Clostridium、Peptostreptococcus；「綠膿桿菌（Pseudomonas）是『需氧』革蘭氏陰性桿菌，並非厭氧菌」——故此敘述錯誤。(D) 高壓氧為「輔助」治療、成效仍有爭議——正確。故錯誤者為 (C)。", "options": {"A": "正確。應立即清創手術。", "B": "正確。培養前先給廣效抗生素（含厭氧涵蓋）。", "C": "錯誤（為答案）。綠膿桿菌是「需氧」菌；Fournier 厭氧菌應為 Bacteroides/Clostridium 等。", "D": "正確。高壓氧為輔助治療，成效仍有爭議。"}, "sources": ["Harrison 21e（Necrotizing fasciitis; polymicrobial）"]}}, "113-進階-外科-56": {"quick": "深頸部感染「可」延伸至縱膈腔（致縱膈炎），故敘述 (C) 錯。", "detail": {"background": "深頸部感染：(A) 常見發燒、頸部疼痛、吞嚥困難（±張口困難、頸部腫脹）——正確。(B) 治療包括靜脈廣效抗生素「以及膿瘍切開清創引流」——正確。(C) 頸部筋膜間隙彼此「相通」，感染「可沿筋膜向下延伸至縱膈腔」造成「下行性壞死性縱膈炎（descending necrotizing mediastinitis）」，死亡率高——故「感染通常侷限、不會延伸至縱膈腔」錯誤。(D) 腫脹可壓迫氣道造成阻塞，必要時須建立人工氣道（插管/氣切）——正確。故錯誤者為 (C)。深頸部感染是可致命的急症，須積極處理氣道與感染源。", "options": {"A": "正確。常見發燒、頸痛、吞嚥困難。", "B": "正確。治療含抗生素與清創引流。", "C": "錯誤（為答案）。感染可沿筋膜延伸至縱膈腔（縱膈炎）。", "D": "正確。可致氣道阻塞，必要時建立人工氣道。"}, "sources": ["Harrison 21e（Deep neck infections; mediastinitis）"]}}, "106-106b-外科-65": {"quick": "大多數骨盆腔發炎（PID）可「門診」治療，不需住院，故敘述 (A) 錯。", "detail": {"background": "骨盆腔發炎（PID）是上生殖道感染（子宮內膜炎、輸卵管炎），多由性傳染病原「淋病雙球菌（N. gonorrhoeae）與披衣菌（C. trachomatis）」上行感染引起。(A) 「大多數 PID 可門診口服/肌注抗生素治療」，僅在特定情況才住院——輸卵管卵巢膿瘍（TOA）、懷孕、嚴重病容/高燒嘔吐、無法排除外科急症、門診治療失敗或無法配合者；故「大部分需住院徹底治療」錯誤。(B) 性伴侶也應一併治療（避免再感染）——正確。(C) 多數較小的輸卵管卵巢膿瘍可用抗生素有效治療（大型或無反應者才引流/手術）——依題敘述為正確。(D) 經驗治療須「同時涵蓋淋病與披衣菌」（如 ceftriaxone＋doxycycline±metronidazole）——正確。故錯誤者為 (A)。", "options": {"A": "錯誤（為答案）。大多數 PID 可門診治療，特定情況才住院。", "B": "正確。性伴侶應一併治療。", "C": "正確（依題敘述）。多數較小 TOA 抗生素可有效治療。", "D": "正確。須同時涵蓋淋病與披衣菌。"}, "sources": ["CDC STI Treatment Guidelines（PID）", "Harrison 21e"]}}, "107-TNPA-婦產科-39": {"quick": "子宮頸抹片 ASC-US 者可用 HPV DNA 檢測分流，陽性再做陰道鏡，故 (B)。", "detail": {"background": "人類乳突病毒（HPV）與子宮頸癌：高危型 HPV（16、18 等）持續感染是子宮頸癌的主因。(A) 現行「預防性 HPV 疫苗」是以病毒外殼蛋白 L1 自組成的「類病毒顆粒（VLP）」蛋白疫苗（非 DNA 疫苗），targeting 的是 L1（E6/E7 是『治療性』疫苗的研究標的）——故敘述錯誤。(B) 子宮頸抹片為「ASC-US（意義不明的非典型鱗狀細胞）」者，可用「HPV DNA 檢測分流（reflex HPV testing）」，陽性者再安排陰道鏡——正確（標準處置）。(C) 抹片正常但高危 HPV 陽性者，多建議「一年後共同檢測追蹤」或依型別處理，非「一律立即陰道鏡」——敘述過於絕對。(D) HPV 疫苗是「預防」非「治療」ASC-US——錯誤。故正確為 (B)。", "options": {"A": "錯。預防性 HPV 疫苗為 L1 蛋白 VLP 疫苗（非 DNA 疫苗、非 targeting E6/E7）。", "B": "正確。ASC-US 可用 HPV DNA 檢測分流，陽性再陰道鏡。", "C": "過於絕對。抹片正常＋HPV 陽性多先追蹤共測，非一律立即陰道鏡。", "D": "錯。HPV 疫苗為預防，非治療 ASC-US。"}, "sources": ["CDC/ASCCP 子宮頸癌篩檢處置指引", "Harrison 21e"]}}, "108a-TNPA-內科-63": {"quick": "龜頭無痛、邊緣清楚、無分泌物無壓痛的平坦丘疹/硬結＝梅毒硬性下疳，故 (D)。", "detail": {"background": "生殖器病灶的鑑別：(D) 「梅毒（第一期）」的特徵是「無痛性硬性下疳（chancre）」——邊緣清楚、質地硬、單一、無壓痛、可自行癒合，由梅毒螺旋體（Treponema pallidum）經性接觸感染；「無痛」是關鍵。對照：(A) 生殖器疱疹（HSV）為「成群疼痛性小水泡/潰瘍」、會痛、易復發。(B) 人類乳突病毒（HPV）造成「菜花（尖圭濕疣）」——多發、菜花/疣狀突起。(C) 性病性淋巴肉芽腫（LGV，特定血清型披衣菌）為短暫小丘疹後「腹股溝淋巴結化膿腫大」。本例「無痛、邊緣清楚、無分泌物無壓痛」最符合梅毒硬性下疳。診斷用暗視野/血清學（VDRL/RPR＋TPHA/FTA-ABS），治療為長效 penicillin G。", "options": {"A": "疱疹為成群「疼痛性」小水泡/潰瘍，本例無痛不符。", "B": "HPV 菜花為多發疣狀突起，非單一平坦無痛丘疹。", "C": "LGV 以腹股溝化膿性淋巴結腫大為特徵。", "D": "正確。無痛硬性下疳＝第一期梅毒。"}, "sources": ["Harrison 21e（Syphilis; primary chancre）"]}}, "108b-TNPA-內科-63": {"quick": "尿道分泌物＋膿尿＋淋病雙球菌 DNA 陽性＝淋病，可用口服 cefixime（頭孢），故 (D)。", "detail": {"background": "本例年輕男性、無防護性行為後排尿困難、尿道大量分泌物、膿尿、N. gonorrhoeae DNA 陽性＝「淋菌性尿道炎（gonorrhea）」。治療為「頭孢類」——首選肌注 ceftriaxone（並因常合併披衣菌而加 doxycycline/azithromycin）；口服替代可用「cefixime（第三代口服頭孢）」。選項中唯一適當的抗淋菌藥是「oral cefixime（D）」。對照：clindamycin（厭氧/革蘭氏陽性，非淋菌首選）、isoniazid（抗結核）、amphotericin B（抗黴菌）皆不適用。注意淋病常合併披衣菌，臨床上多「同時治療兩者」並通知性伴侶就醫。", "options": {"A": "clindamycin 非淋菌治療首選。", "B": "isoniazid 為抗結核藥，與淋病無關。", "C": "amphotericin B 為抗黴菌藥，與淋病無關。", "D": "正確。淋病用頭孢類，口服可用 cefixime（首選 ceftriaxone IM＋涵蓋披衣菌）。"}, "sources": ["CDC STI Treatment Guidelines（Gonorrhea）", "Harrison 21e"]}}, "109-通論-其他-24": {"quick": "龜頭白色凸起斑塊＋多重性伴侶＝菜花（尖圭濕疣），與 HPV 感染有關，故 (A)。", "detail": {"background": "本例多重性伴侶、龜頭「白色凸起斑塊（疣狀）」＝「尖圭濕疣（condyloma acuminatum，俗稱菜花）」，是「人類乳突病毒（HPV）」感染所致的病毒疣，主要由「低危型 HPV 第 6、11 型」引起（非 16、18，後者與子宮頸癌等惡性病變相關）。(A) 正確——菜花是病毒疣的一種、與 HPV 有關。(B) 醫學名為「尖圭濕疣（condyloma acuminatum）」，而「扁平濕疣（condyloma lata）」是『第二期梅毒』的表現——故 B 錯。(C) 菜花多為 HPV 6/11，非 16/18——C 錯。(D) HPV 疫苗為「預防」非「治療」既有菜花——D 錯。治療菜花用局部藥物（podophyllotoxin、imiquimod）、冷凍、電燒等。", "options": {"A": "正確。菜花為病毒疣，與 HPV（多為 6/11 型）有關。", "B": "錯。醫學名為尖圭濕疣；「扁平濕疣」是第二期梅毒表現。", "C": "錯。菜花多為 HPV 6/11，非 16/18。", "D": "錯。HPV 疫苗為預防，非治療既有菜花。"}, "sources": ["Harrison 21e（HPV; condyloma acuminatum）"]}}, "109-進階-婦產科-77": {"quick": "陰道分泌物革蘭氏染色用於診斷細菌性陰道炎（嗜血/Gardnerella，clue cells），故 (D)。", "detail": {"background": "陰道感染的檢驗方法各異：(A) 陰道滴蟲（Trichomonas vaginalis）——以「濕抹片（wet mount）」看到會動的鞭毛原蟲診斷，非革蘭氏染色。(B) 白色念珠菌（Candida）——以「KOH 製片」看到菌絲/芽孢診斷。(C) 單純疱疹（HSV）——以病毒培養/PCR/Tzanck 抹片，非革蘭氏染色。(D) 細菌性陰道炎（與 Gardnerella vaginalis〔舊稱嗜血桿菌 Haemophilus vaginalis〕等過度增生有關）——「革蘭氏染色」可見「線索細胞（clue cells，表面附滿球桿菌的上皮細胞）」與正常乳酸桿菌減少（Nugent score），是其診斷方法。故革蘭氏染色目的在診斷「嗜血桿菌/Gardnerella（細菌性陰道炎）」＝(D)。", "options": {"A": "陰道滴蟲以濕抹片診斷，非革蘭氏染色。", "B": "白色念珠菌以 KOH 製片診斷。", "C": "單純疱疹以培養/PCR/Tzanck 診斷。", "D": "正確。革蘭氏染色（clue cells）用於診斷細菌性陰道炎（Gardnerella/嗜血桿菌）。"}, "sources": ["Harrison 21e（Vaginitis; bacterial vaginosis Gram stain）"]}}, "110-通論-其他-43": {"quick": "懷孕婦女與已超過建議年齡的停經婦女不建議接種 HPV 疫苗，故 (B)、(C) 均給分。", "detail": {"background": "HPV 疫苗為「預防性」疫苗，建議於「開始性行為前（青少年）」接種效益最大，男女皆可（預防菜花、子宮頸/肛門/口咽相關病變）。不建議/不適合接種的情況：(B) 「懷孕婦女」——孕期不建議接種（安全資料不足，應延後至產後）；(C) 「48 歲停經婦女」——已超過疫苗主要建議年齡（成本效益低、多已暴露 HPV，公費與多數建議涵蓋至約 26–45 歲，48 歲且停經之效益有限）。(A) 男性高三學生、(D) 女性高三學生皆為建議接種對象。因 (B)、(C) 皆為「不建議接種」之合理答案，官方判 (B)(C) 均給分。", "options": {"A": "男性高三學生為建議接種對象。", "B": "給分。懷孕婦女不建議接種，應延後至產後。", "C": "給分。48 歲停經婦女已超過主要建議年齡、效益有限。", "D": "女性高三學生為建議接種對象。"}, "sources": ["CDC/ACIP HPV vaccine recommendations"]}}, "111-進階-婦產科-59": {"quick": "披衣菌感染的是「柱狀/立方上皮（子宮頸內口）」而非鱗狀上皮，故敘述 (A) 較不適當。", "detail": {"background": "砂眼披衣菌（Chlamydia trachomatis）子宮頸炎：(A) 披衣菌是「絕對細胞內寄生菌」，但其感染的標的是子宮頸內口的「柱狀（columnar）/立方上皮」（及尿道、直腸、結膜），「並非鱗狀上皮細胞」——故此敘述較不適當（答案）。(B) 是性傳染病，常與淋病「共同感染（約 20–40%）」——大致正確。(C) 治療用「口服 azithromycin 單劑或 doxycycline 7 天」——正確。(D) 可用核酸探針/NAAT（probe test）與 ELISA 等診斷——正確。披衣菌感染常無症狀，是 PID 與不孕的重要原因，需同時治療性伴侶。", "options": {"A": "較不適當（為答案）。披衣菌感染柱狀/立方上皮（子宮頸內口），非鱗狀上皮。", "B": "大致正確。為性傳染病，常與淋病共同感染。", "C": "正確。口服 azithromycin 或 doxycycline 治療。", "D": "正確。可用核酸探針與 ELISA 診斷。"}, "sources": ["Harrison 21e（Chlamydia trachomatis infections）"]}}, "113-進階-婦產科-25": {"quick": "會陰肛門多發軟疣（菜花）＝人類乳突病毒（HPV）感染，故 (C)。", "detail": {"background": "會陰、肛門周圍「多個軟疣（soft warts，菜花/尖圭濕疣）」是「人類乳突病毒（HPV，主要第 6、11 型）」感染的典型表現，經性接觸傳染。對照：(A) 梅毒螺旋體致無痛硬性下疳（第一期）或扁平濕疣/全身疹（第二期）；(B) HIV 不造成疣；(D) 陰道滴蟲造成陰道炎（泡沫狀分泌物、草莓樣子宮頸）。故軟疣（菜花）為 HPV（C）。治療以局部藥物（imiquimod、podophyllotoxin）、冷凍、電燒等清除疣體，並評估其他性傳染病與性伴侶。", "options": {"A": "梅毒為無痛硬下疳或扁平濕疣/全身疹，非多發軟疣。", "B": "HIV 不造成生殖器疣。", "C": "正確。多發軟疣（菜花）＝HPV 感染。", "D": "陰道滴蟲造成陰道炎，非軟疣。"}, "sources": ["Harrison 21e（Genital warts; HPV）"]}}, "113-進階-婦產科-64": {"quick": "PID 門診治療若症狀未改善，應於治療後 72 小時內回診，故 (B)。", "detail": {"background": "骨盆腔發炎（PID）門診治療的追蹤原則：應在「治療後 72 小時內」評估臨床反應；若症狀「未改善（持續發燒、疼痛）」，須回診重新評估——考慮診斷是否正確、是否有輸卵管卵巢膿瘍需引流、或改靜脈抗生素/住院。(A) 「持續疼痛或發燒超過 5 天再回診」太慢、延誤處置。(C) 並非「治療 2 週後」才複檢病原（依指引可在數週後做 reinfection 的再篩，但追蹤臨床反應是 72 小時）。(D) PID 的 ceftriaxone 為「單劑」治療（搭配 doxycycline±metronidazole），「並非 1 週後打第 2 劑」。故最適當為 (B)。並應治療性伴侶、衛教安全性行為。", "options": {"A": "太慢。不應等持續 5 天才回診。", "B": "正確。症狀未改善應在治療後 72 小時內回診評估。", "C": "追蹤臨床反應為 72 小時，非治療 2 週後才複檢。", "D": "ceftriaxone 為單劑治療，非 1 週後打第 2 劑。"}, "sources": ["CDC STI Treatment Guidelines（PID follow-up）"]}}, "113-進階-婦產科-66": {"quick": "VDRL 轉陰、FTA-ABS 仍陽性＝梅毒已適當治療、未再感染，故 (D)。", "detail": {"background": "梅毒血清學分兩類：(1) 「非螺旋體試驗（non-treponemal，VDRL/RPR）」——反映疾病活性，「治療成功後會下降至陰性」，也用於追蹤療效與再感染（再感染時會再上升）。(2) 「螺旋體試驗（treponemal，FTA-ABS/TPHA/TPPA）」——一旦感染後「終生維持陽性（即使治癒）」，用於確認曾經感染。本例治療一年後「VDRL 轉為陰性（non-reactive）」代表治療成功、目前無活性感染；「FTA-ABS 仍陽性」是曾經感染的終生印記，屬正常現象——故「有適當治療、沒有再度感染」最適當（D）。若 VDRL 由陰轉陽或效價上升才表示再感染或治療失敗。", "options": {"A": "錯。VDRL 轉陰代表治療成效良好，非不彰。", "B": "錯。VDRL 陰性、無效價上升，不支持再度感染。", "C": "錯。FTA-ABS 陽性是梅毒終生印記，非其他感染偽陽性。", "D": "正確。VDRL 轉陰＋FTA-ABS 終生陽性＝已適當治療、未再感染。"}, "sources": ["Harrison 21e（Syphilis serology; treponemal vs non-treponemal）"]}}, "114-通論-5分科-58": {"quick": "尿道口黃綠色膿性分泌物＋排尿灼痛＝淋病雙球菌感染，故 (B)。", "detail": {"background": "男性尿道炎依分泌物性質鑑別病原：「淋菌性尿道炎（N. gonorrhoeae）」——分泌物「量多、黃綠色、膿性」、排尿灼痛、潛伏期短（2–5 天）；「非淋菌性尿道炎（多為披衣菌 C. trachomatis）」——分泌物「較稀薄、清/白、量少」、症狀較輕、潛伏期較長。本例「尿道口黃綠色膿性分泌物」最符合「淋病雙球菌（B）」。診斷用核酸增幅（NAAT）、革蘭氏染色（細胞內革蘭氏陰性雙球菌）。治療為 ceftriaxone（並因常合併披衣菌而加 doxycycline）。陰道滴蟲、梅毒不以男性尿道膿性分泌表現。應通知性伴侶就醫。", "options": {"A": "披衣菌（非淋菌性尿道炎）分泌物較稀薄量少，與膿性黃綠不符。", "B": "正確。黃綠色膿性分泌物＝淋病雙球菌感染。", "C": "陰道滴蟲主要造成女性陰道炎，非男性膿性尿道炎典型。", "D": "梅毒以無痛硬下疳表現，非膿性尿道分泌。"}, "sources": ["Harrison 21e（Urethritis; gonococcal vs nongonococcal）"]}}, "105-TNPA-通論-64": {"quick": "醫護針扎暴露時，得採集疑似 HIV 病人檢體檢驗，無須病人同意，故 (D)。", "detail": {"background": "依我國「人類免疫缺乏病毒傳染防治及感染者權益保障條例」，HIV 檢驗原則上需告知並取得同意；但有「例外」——當「醫事人員『針扎/職業暴露』於可能感染之血液/體液」時，為保護暴露者健康、決定是否給予暴露後預防（PEP），「得採集來源病人之檢體進行 HIV 檢驗，無須事先取得其同意」。故 (D) 正確。此例外是在權衡感染者隱私與暴露醫事人員健康權後，法律明定的特殊情形。實務上仍應保密檢驗結果、僅用於必要之暴露後處置（盡速評估、必要時 PEP 於數小時內開始）。", "options": {"A": "錯。職業針扎暴露屬法定例外，不以病人同意為前提。", "B": "錯。非僅依醫院內規，法律已明定此例外。", "C": "錯。不需請求法院裁定（法律已授權採檢）。", "D": "正確。針扎暴露時得採集來源病人檢體檢驗，無須其同意。"}, "sources": ["人類免疫缺乏病毒傳染防治及感染者權益保障條例"]}}, "105-TNPA-通論-66": {"quick": "若 HIV 感染者不願讓伴侶知情，應尊重其意願（保密），同時積極衛教與輔導告知，故 (C)。", "detail": {"background": "本題涉及 HIV 感染者的「隱私保密」與對伴侶的「保護」之間的張力。依我國 HIV 條例，感染者醫療資訊受嚴格保密，「醫療人員不得任意對非醫療人員揭露」；同時感染者「本人有義務告知性伴侶並採取防護」。臨床倫理與法律實務上，醫療人員應「尊重感染者意願（不擅自告知第三人）」，但須「強烈輔導、衛教感染者主動向伴侶坦露並使用保險套、規則服藥（U=U，測不到＝不具傳染力）」。本題選項以「如果王先生不想讓約翰知道，應尊重其意願（C）」為最適當——強調保密原則。實務上若感染者持續拒絕且有明確重大傳染風險，仍有依法處理的機制，但首要是尊重保密並積極輔導。", "options": {"A": "醫療人員不應擅自（基於不傷害）逕自告知第三人，違反保密。", "B": "同理，不應逕自（基於行善）擅自告知伴侶。", "C": "正確。尊重感染者意願（保密），並積極輔導其主動告知與防護。", "D": "交由倫理委員會非首要；首要是尊重保密並衛教輔導。"}, "sources": ["人類免疫缺乏病毒傳染防治及感染者權益保障條例；醫學倫理（保密）"]}}, "107-TNPA-內科-59": {"quick": "金黃色葡萄球菌菌血症不屬於 AIDS 的伺機性感染，故 (D)。", "detail": {"background": "AIDS（後天免疫不全症候群）的「伺機性感染」是因 CD4 細胞嚴重耗損（多 <200）而發生、健康免疫者少見的感染，常為「AIDS 定義性疾病」，包括：弓蟲腦炎/腦膿瘍（toxoplasma，CD4<100）、瀰漫性禽型分枝桿菌（MAC，CD4<50）、巨細胞病毒（CMV）視網膜炎（CD4<50）、肺囊蟲肺炎（PCP，CD4<200）、隱球菌腦膜炎、食道念珠菌、卡波西氏肉瘤等。「金黃色葡萄球菌菌血症」是「一般細菌感染」，免疫正常者也常見，「不屬於 AIDS 伺機性感染」——故為答案 (D)。其餘 A、B、C 皆為典型 AIDS 伺機性感染。", "options": {"A": "弓蟲腦膿瘍為 AIDS 伺機性感染（CD4<100）。", "B": "禽型分枝桿菌（MAC）為 AIDS 伺機性感染（CD4<50）。", "C": "CMV 視網膜炎為 AIDS 伺機性感染（CD4<50）。", "D": "正確（非伺機性）。金黃色葡萄球菌菌血症為一般細菌感染。"}, "sources": ["Harrison 21e（HIV; opportunistic infections by CD4 count）"]}}, "107-TNPA-內科-60": {"quick": "水痘疫苗為活性減毒疫苗，HIV 病人（免疫低下）不常規施打，故 (C)。", "detail": {"background": "HIV 感染者的疫苗建議：應接種「去活化/次單位疫苗」以預防可預防疾病——B 型肝炎、A 型肝炎、流感（不活化）、肺炎鏈球菌、Tdap、HPV、COVID 等。需「謹慎/避免」的是「活性減毒疫苗」——如「水痘（varicella）、MMR、BCG、口服小兒麻痺、黃熱病」等，在「嚴重免疫抑制（CD4 低，尤 <200）」時可能致疫苗株感染，屬禁忌；CD4 足夠時部分活疫苗（MMR、水痘）可個別評估。本題「水痘疫苗（活減毒，C）」為「不屬於常規建議施打」者。故選 (C)。", "options": {"A": "B 型肝炎疫苗（不活化）為 HIV 病人常規建議。", "B": "A 型肝炎疫苗（不活化）為建議接種。", "C": "正確（不常規）。水痘疫苗為活性減毒，免疫低下者避免。", "D": "流感疫苗（不活化）為建議接種。"}, "sources": ["Harrison 21e；ACIP（vaccination in HIV; live vaccines caution）"]}}, "108b-TNPA-內科-37": {"quick": "愛滋病患最常見的細菌性腹瀉病原為艱難梭狀桿菌（C. difficile），故 (C)。", "detail": {"background": "愛滋病患腹瀉病因多元（細菌、病毒、原蟲、藥物）。就「細菌性」而言，因常住院、頻繁使用抗生素，「艱難梭狀桿菌（Clostridioides difficile）」是「最常見」的細菌性腹瀉病原（C）；其他細菌如沙門氏菌、曲狀桿菌、志賀氏菌、MAC 亦可見。對照選項：(A) 巨細胞病毒（CMV）是「病毒」（可致大腸炎，CD4<50），非細菌；(D) 結核桿菌（分枝桿菌）非典型腸炎主因；(B) Klebsiella 非腹瀉主因。原蟲（隱孢子蟲 Cryptosporidium、microsporidia）在重度免疫低下也常致慢性水瀉。故細菌性最常見為 (C) C. difficile。", "options": {"A": "CMV 為病毒（可致大腸炎），非細菌。", "B": "Klebsiella 非愛滋病患腹瀉主因。", "C": "正確。C. difficile 為愛滋病患最常見的細菌性腹瀉病原。", "D": "結核桿菌非典型腸炎主因。"}, "sources": ["Harrison 21e（Diarrhea in HIV; C. difficile）"]}}, "108a-TNPA-內科-62": {"quick": "HIV 感染初步篩檢用酵素免疫分析法（ELISA），故 (A)。", "detail": {"background": "HIV 診斷流程：初步「篩檢」用敏感度高的「酵素免疫分析法（ELISA/EIA）」，現多為第四代抗原/抗體合一免疫分析（可同時測 p24 抗原與抗體，縮短空窗期）。篩檢陽性者再以「確認試驗」確診——傳統為西方墨點法（western blot），現多用「HIV-1/2 抗體區分免疫分析」或核酸檢測（NAAT）。病毒核酸（RNA）量（viral load）用於確診後的「病情監測與療效評估」、及空窗期/新生兒診斷，非一般初步篩檢。病毒培養不用於臨床常規。故初步篩檢為 (A) ELISA。", "options": {"A": "正確。HIV 初步篩檢用 ELISA（第四代抗原/抗體）。", "B": "西方墨點法為「確認」試驗，非初步篩檢。", "C": "病毒 RNA 量用於監測/療效，非一般初步篩檢。", "D": "病毒培養不用於臨床常規診斷。"}, "sources": ["Harrison 21e（HIV diagnosis; screening algorithm）"]}}, "110-進階-內科-54": {"quick": "AIDS 的免疫學定義為 CD4 < 200（非 400），故敘述 (A) 錯。", "detail": {"background": "HIV/AIDS：(A) 「AIDS 的定義」為 HIV 陽性且「CD4＋ T 細胞 < 200 cells/μL」（或出現 AIDS 定義性疾病/伺機性感染），「非 <400」——故此敘述錯誤。(B) HIV 是「反轉錄（retrovirus）RNA 病毒」（透過反轉錄酶將 RNA 轉為 DNA 嵌入宿主基因）——正確。(C) HIV 病人發生 CMV 感染時，「最常以視網膜炎表現」（CD4<50）——正確。(D) 傳染途徑以「血液與體液（性接觸、血液、母嬰垂直）」為主——正確。故錯誤者為 (A)。CD4<200 是開始 PCP 預防與定義 AIDS 的重要閾值。", "options": {"A": "錯誤（為答案）。AIDS 定義為 CD4 < 200（非 400）。", "B": "正確。HIV 是反轉錄 RNA 病毒。", "C": "正確。HIV 病人 CMV 感染最常以視網膜炎表現。", "D": "正確。傳染途徑以血液及體液為主。"}, "sources": ["Harrison 21e（HIV/AIDS definition; CD4<200）"]}}, "111-通論-5分科-56": {"quick": "免疫低下（口腔念珠菌）＋CSF 高壓、淋巴球性、極低糖、高蛋白＝隱球菌腦膜炎，故 (B)。", "detail": {"background": "本例 31 歲女性、漸進性頭痛發燒、「口腔念珠菌感染」提示免疫低下（疑 HIV）。CSF：開放壓「極高（380 mmH2O）」、WBC 27（「淋巴球為主 L/N 19/8」）、蛋白「很高 98」、葡萄糖「極低 13」（血糖 128，比值極低）——是「淋巴球性、極低糖、高蛋白、極高壓」的亞急性型態，在免疫低下者最符合「隱球菌腦膜炎（Cryptococcus neoformans）」。隱球菌腦膜炎特徵之一是「顱內壓顯著升高」（需反覆腰椎引流降壓）。診斷用墨汁染色、隱球菌抗原（CrAg）、培養。治療 amphotericin B＋flucytosine 引導，續 fluconazole。對照：病毒性葡萄糖正常；流行性腦脊髓膜炎（細菌性）為中性球為主、急性；Klebsiella 腦膜炎亦中性球性。", "options": {"A": "病毒性腦膜炎葡萄糖正常，不符極低糖。", "B": "正確。免疫低下＋淋巴球性＋極低糖＋極高壓＝隱球菌腦膜炎。", "C": "流行性腦脊髓膜炎為中性球為主、急性，不符。", "D": "Klebsiella 腦膜炎為中性球性，不符淋巴球性。"}, "sources": ["Harrison 21e（Cryptococcal meningitis in HIV）"]}}, "111-進階-內科-58": {"quick": "HIV 抗體陽性且 CD4 < 200（如 150）符合 AIDS 診斷標準，故 (A)。", "detail": {"background": "AIDS 的診斷標準：HIV 感染（抗體/核酸陽性）「且」符合下列之一——(1) CD4＋ T 細胞「< 200 cells/mm³」；或 (2) 出現「AIDS 定義性疾病（伺機性感染/腫瘤，如 PCP、食道念珠菌、卡波西氏肉瘤、弓蟲腦炎等）」。(A) HIV 抗體陽性＋CD4 150（<200）——符合 AIDS（正確）。(B) CD4 300（>200）且僅病毒量高——「未達」AIDS 標準（仍為 HIV 感染期）。(C) 「HIV 抗體陰性」——依定義無 HIV 感染證據則不能診斷 AIDS（即使有 PCP/Kaposi，須先確認 HIV 感染；抗體陰性可能空窗期需核酸佐證，但題述為陰性故不符）。(D) 「口腔念珠菌」本身「非」AIDS 定義性疾病（食道念珠菌才是），不足以診斷 AIDS。故答案為 (A)。", "options": {"A": "正確。HIV 陽性＋CD4<200（150）符合 AIDS。", "B": "CD4 300（>200）未達 AIDS 標準。", "C": "HIV 抗體陰性無感染證據，不能診斷 AIDS。", "D": "口腔念珠菌非 AIDS 定義性疾病（食道念珠菌才是）。"}, "sources": ["Harrison 21e；CDC AIDS case definition"]}}, "113-通論-家庭-19": {"quick": "依法應對病情保密（不對非醫療人員透漏），但應強烈建議病人主動向妻子坦露，故 (A)。", "detail": {"background": "依我國 HIV 條例，感染者的醫療資訊受「嚴格保密」，「醫療人員不得向非醫療人員（含配偶）擅自透漏」。但感染者本人對性伴侶有告知與防護義務。臨床處理：(A) 「基於保密原則不可對非醫療人員透漏，但應『強烈建議/輔導』病人主動向妻子坦露」——最符合法規與倫理（兼顧保密與保護），為最適當。(C) 「醫療人員主動告知妻子」違反保密規定，不適當（即便伴侶為高風險，仍須循感染者本人告知與公衛機制，醫療人員不宜逕自揭露）。(B) 同意隱瞞且僅給防護衛教，未積極促其坦露，較不足。(D) 「U=U（測不到＝不具傳染力）」雖正確，但以「普查之名」迂迴讓妻子受檢、且仍未促坦露，作法不妥。故最適當為 (A)。", "options": {"A": "正確。依法保密（不對非醫療人員透漏），但強烈建議病人主動坦露。", "B": "不足。僅給防護衛教而未積極促其向伴侶坦露。", "C": "錯。醫療人員逕自告知妻子違反保密規定。", "D": "不妥。以普查之名迂迴受檢、未促坦露，作法不當。"}, "sources": ["人類免疫缺乏病毒傳染防治及感染者權益保障條例；U=U 概念"]}}, "113-通論-家庭-73": {"quick": "免疫低下＋CSF 高壓、淋巴球性、極低糖、高蛋白＝隱球菌腦膜炎，故 (B)。", "detail": {"background": "本題與 111-通論-5分科-56 為同一情境（漸進性頭痛發燒、CSF 開放壓極高 380、WBC 27 淋巴球為主、蛋白高 98、葡萄糖極低 13、血糖 128）。此「淋巴球性、極低糖、高蛋白、極高壓」型態，在疑免疫低下者最符合「隱球菌腦膜炎」。隱球菌腦膜炎以顯著顱內高壓為特徵（需反覆引流），診斷用墨汁染色/CrAg/培養，治療 amphotericin B＋flucytosine 續以 fluconazole。鑑別同前：病毒性葡萄糖正常、細菌性（流行性腦脊髓膜炎、Klebsiella）為中性球性。故選 (B)。", "options": {"A": "病毒性腦膜炎葡萄糖正常，不符。", "B": "正確。淋巴球性＋極低糖＋極高壓＝隱球菌腦膜炎。", "C": "流行性腦脊髓膜炎為中性球性、急性。", "D": "Klebsiella 腦膜炎為中性球性。"}, "sources": ["Harrison 21e（Cryptococcal meningitis）"]}}, "106-106a-內科-8": {"quick": "中東旅遊對應新型冠狀病毒（MERS-CoV），故 (C)。", "detail": {"background": "旅遊接觸史與疾病的配對：(A) 「恙蟲病」由「恙蟎（chigger mite）叮咬」傳播，非一般蚊蟲——錯。(B) 「水災後赤腳清理污泥」對應「鉤端螺旋體病（leptospirosis，經污水中鼠尿的螺旋體經皮膚黏膜侵入）」，非登革熱——錯。(C) 「中東旅遊」對應「中東呼吸症候群冠狀病毒（MERS-CoV）」——正確（駱駝為宿主）。(D) 「台灣山區旅遊」較對應「恙蟲病」；鉤端螺旋體與「水/污泥/鼠尿」相關——配對不妥。故正確為 (C)。旅遊史對感染症鑑別極重要，須詳問地點、活動、動物/水/蟲接觸與潛伏期。", "options": {"A": "錯。恙蟲病由恙蟎叮咬傳播，非一般蚊蟲。", "B": "錯。水災赤腳污泥對應鉤端螺旋體，非登革熱。", "C": "正確。中東旅遊對應 MERS 新型冠狀病毒。", "D": "錯。台灣山區較對應恙蟲病；鉤端螺旋體與污水鼠尿相關。"}, "sources": ["Harrison 21e（Travel medicine; zoonoses）", "CDC"]}}, "108a-TNPA-內科-19": {"quick": "貓抓病的致病菌是 Bartonella henselae，非 Pasteurella multocida，故敘述 (B) 錯。", "detail": {"background": "貓抓病（cat-scratch disease）：(B) 致病菌是「Bartonella henselae」（經貓抓/咬或貓蚤傳播），「不是 Pasteurella multocida」——故此敘述錯誤（Pasteurella multocida 是「貓/狗『咬傷』後急性軟組織感染/蜂窩組織炎」的常見菌，與貓抓病不同）。(A) 多數病人為「區域性淋巴結腫」、全身症狀輕、發燒未必明顯（大致正確）。(C) 臨床特徵是「抓咬處附近的區域性淋巴結腫大」——正確。(D) 病程可持續數週至數月、多自限——正確。免疫低下者可較嚴重。治療多支持性，嚴重或免疫低下用 azithromycin。故錯誤者為 (B)。", "options": {"A": "大致正確。多數全身症狀輕、發燒未必明顯。", "B": "錯誤（為答案）。致病菌為 Bartonella henselae，非 Pasteurella multocida（後者為貓狗咬傷軟組織感染）。", "C": "正確。常見區域性淋巴結腫大。", "D": "正確。病程可持續數週至數月。"}, "sources": ["Harrison 21e（Cat-scratch disease; Bartonella henselae）"]}}, "108b-TNPA-內科-52": {"quick": "鉤端螺旋體與鼠類分泌物有關、Q 熱與牛羊畜牧相關，故 1、2＝(C)。", "detail": {"background": "動物與人畜共通感染：①「鉤端螺旋體（leptospirosis）」存在於「鼠類等動物的尿液」，經污水/污泥接觸皮膚黏膜感染——正確。②「Q 熱（Coxiella burnetii）」與「牛、羊等畜牧業」相關（接觸受感染動物的生產物/排泄物或吸入氣霧）——正確。③「漢他病毒（Hantavirus）」的宿主是「囓齒類（鼠）」，經其尿液/糞便/唾液氣霧傳播，「非牛羊」——錯。④「登革熱」由「斑蚊（Aedes）」傳播，與「養豬業無關」（日本腦炎才與豬/家蚊相關）——錯。故正確組合為 ①②＝(C)。", "options": {"A": "13——含③漢他病毒（宿主為鼠非牛羊），錯。", "B": "23——含③，錯。", "C": "正確。①鉤端螺旋體-鼠 ②Q 熱-牛羊畜牧。", "D": "24——含④登革熱（斑蚊，非養豬），錯。"}, "sources": ["Harrison 21e（Zoonoses: leptospirosis, Q fever, hantavirus）"]}}, "109-通論-其他-64": {"quick": "旅遊者腹瀉的首選抗生素為 fluoroquinolone，故 (A)。", "detail": {"background": "旅遊者腹瀉（traveler’s diarrhea）多由「腸毒性大腸桿菌（ETEC）」等細菌引起。多數為自限，以「補充水分電解質」為主；中重度（影響行程、發燒、血便）才用抗生素。傳統首選為「fluoroquinolone（如 ciprofloxacin）」（A），可縮短病程；但在「東南亞/南亞」因「曲狀桿菌（Campylobacter）對 fluoroquinolone 抗藥性高」，該地區改以「azithromycin」為首選。本題鍵定 fluoroquinolone（A）為首選抗生素。可搭配 loperamide 緩解症狀（無血便/高燒時）。預防重點：飲食衛生（喝瓶裝水、熟食）。", "options": {"A": "正確。旅遊者腹瀉首選抗生素為 fluoroquinolone（東南亞因抗藥性改 azithromycin）。", "B": "erythromycin 非旅遊者腹瀉首選。", "C": "ampicillin 抗藥性高，非首選。", "D": "tetracycline 非首選（抗藥性）。"}, "sources": ["Harrison 21e（Traveler’s diarrhea）", "CDC Yellow Book"]}}, "109-進階-內科-71": {"quick": "恙蟲病首選治療為 doxycycline，「ampicillin」最不可能，故 (D)。", "detail": {"background": "本例山區旅遊後「發燒、頭痛、皮膚疹、大腿內側焦痂」＝「恙蟲病（scrub typhus，Orientia tsutsugamushi）」。(A) 病原為立克次體（Orientia tsutsugamushi）——正確。(B) 早期可出現「相對性緩脈（relative bradycardia）」——正確（立克次體/傷寒類常見）。(C) 經恙蟎（chigger）叮咬後潛伏期約 6–21 天——正確。(D) 「首選治療為 doxycycline」（azithromycin 替代）；「ampicillin（β-lactam）對立克次體無效」——故「首選 ampicillin」最不可能/錯誤。故答案為 (D)。", "options": {"A": "正確。病原為 Orientia tsutsugamushi（立克次體）。", "B": "正確。早期可見相對性緩脈。", "C": "正確。潛伏期約 6–21 天（恙蟎叮咬後）。", "D": "最不可能（為答案）。首選為 doxycycline，非 ampicillin。"}, "sources": ["Harrison 21e（Scrub typhus treatment）"]}}, "113-進階-家庭-7": {"quick": "恙蟲病可見肝功能（ALT）與膽紅素上升，故 (B)。", "detail": {"background": "恙蟲病（scrub typhus）：(A) 典型有高燒、頭痛、淋巴結腫、叮咬處焦痂——但焦痂是「無痛性」，故「疼痛性焦痂」錯誤。(B) 血清生化常見「肝功能（ALT/AST）上升、膽紅素上升」（可有輕度黃疸）——正確。(C) 治療首選「doxycycline」（azithromycin 替代），「非 cephalosporin」——錯。(D) 恙蟲病為「第四類法定傳染病」需通報，但「不會人傳人」，故「需住院接觸隔離」不正確（不需接觸隔離）。故正確為 (B)。檢驗也常見血小板低下、白血球正常/低。", "options": {"A": "錯。焦痂為「無痛性」，非疼痛性。", "B": "正確。可見 ALT 與膽紅素上升（輕度黃疸）。", "C": "錯。首選 doxycycline，非 cephalosporin。", "D": "錯。恙蟲病不人傳人，不需接觸隔離（雖為第四類法定傳染病需通報）。"}, "sources": ["Harrison 21e（Scrub typhus）"]}}, "113-進階-家庭-8": {"quick": "溪邊露營後發燒＋小腿肌痛＋結膜充血＋黃疸＋急性腎損傷＝鉤端螺旋體病，故 (D)。", "detail": {"background": "本例「淡水（溪邊）接觸、發燒、『腓腸肌（小腿肚）痛』、『結膜充血（conjunctival suffusion）』、黃疸、急性腎損傷」——是「鉤端螺旋體病（leptospirosis）」的經典表現。鉤端螺旋體存在於鼠等動物尿液，經污染的水/土壤經皮膚黏膜侵入（洪水、泛舟、農作、污水暴露為風險）。嚴重型「Weil’s disease」有黃疸、急性腎損傷、出血傾向。「結膜充血＋腓腸肌壓痛」是高度提示性的臨床線索。診斷用血清學（MAT）、PCR；治療用 penicillin G 或 doxycycline。對照：Q 熱以非典型肺炎/肝炎、貓抓病以淋巴結腫、疥瘡為皮膚搔癢，皆不符此「肝腎＋肌痛＋結膜充血」組合。", "options": {"A": "Q 熱以非典型肺炎/肝炎為主，不符此組合。", "B": "疥瘡為皮膚劇癢與隧道病灶，與發燒肝腎無關。", "C": "貓抓病以區域淋巴結腫為主。", "D": "正確。淡水暴露＋腓腸肌痛＋結膜充血＋黃疸＋AKI＝鉤端螺旋體病。"}, "sources": ["Harrison 21e（Leptospirosis; Weil disease）"]}}, "114-進階-內科-52": {"quick": "登革熱病媒蚊為埃及斑蚊與白線斑蚊（斑蚊屬），非三斑家蚊，故敘述 (D) 錯。", "detail": {"background": "登革熱（dengue）：(A) 潛伏期約 4–10 天，以發燒、噁心嘔吐、肌肉與關節痛（「斷骨熱」）、後眼窩痛為特徵——正確。(B) 皮疹常於發燒第 3–7 日出現——大致正確。(C) 抽血可見「白血球減少、血小板減少」（及紅血球容積上升提示血漿滲漏）——正確。(D) 台灣登革熱病媒蚊為「埃及斑蚊（Aedes aegypti）與白線斑蚊（Aedes albopictus）」（斑蚊屬），「不是三斑家蚊（Culex，那是日本腦炎病媒）」——故此敘述錯誤。重症警示徵象（腹痛、持續嘔吐、黏膜出血、嗜睡、肝腫大、血比容上升併血小板驟降）需警覺登革出血熱/休克。", "options": {"A": "正確。潛伏期 4–10 天，發燒、肌肉關節痛為特徵。", "B": "大致正確。皮疹於發燒第 3–7 日出現。", "C": "正確。可見白血球與血小板減少。", "D": "錯誤（為答案）。病媒蚊為埃及斑蚊與白線斑蚊（斑蚊屬），非三斑家蚊。"}, "sources": ["Harrison 21e（Dengue）", "CDC"]}}, "114-通論-5分科-56": {"quick": "月經期使用衛生棉條＋高燒低血壓＋瀰漫紅疹＋多器官異常＝毒性休克症候群，故 (B)。", "detail": {"background": "本例「月經期、使用衛生棉條、高燒、低血壓、瀰漫性紅斑性皮疹、白血球上升、肝腎功能異常、肌痛頭暈」——是「毒性休克症候群（toxic shock syndrome, TSS）」的典型，多由「金黃色葡萄球菌（TSST-1 毒素）」（與長時間置放衛生棉條相關）或 A 群鏈球菌引起，屬「毒素媒介的分布性休克」。診斷要件包括發燒、瀰漫紅疹（後脫皮）、低血壓與多器官（≥3 系統）侵犯。處置：立即「移除棉條/感染源」、大量輸液、廣效抗生素（含抑制毒素的 clindamycin±抗葡萄球菌藥）、支持治療。對照：腎盂腎炎以腰痛膿尿、PID 以下腹痛、萊姆病以遊走性紅斑與蜱叮咬史，皆不符此「棉條＋紅疹脫皮＋多器官休克」組合。", "options": {"A": "急性腎盂腎炎以發燒腰痛膿尿為主，不符瀰漫紅疹休克。", "B": "正確。棉條相關＋高燒低血壓＋瀰漫紅疹＋多器官＝毒性休克症候群。", "C": "PID 以下腹痛、子宮頸搖痛為主。", "D": "萊姆病以遊走性紅斑與蜱叮咬史為主。"}, "sources": ["Harrison 21e（Staphylococcal toxic shock syndrome）"]}}, "106-106a-內科-43": {"quick": "肉毒桿菌中毒可致呼吸肌麻痺，嚴重時需呼吸器支持，故 (A)。", "detail": {"background": "肉毒桿菌中毒（botulism）由「肉毒桿菌神經毒素」阻斷「神經肌肉接合處『突觸前』乙醯膽鹼（ACh）的釋放」，造成「對稱性、由上而下的『鬆弛性（弛緩性）麻痺』」——典型先有顱神經症狀（複視、眼瞼下垂、構音/吞嚥困難、口乾、瞳孔對光反射差），再向下進展至四肢與「呼吸肌」。(A) 嚴重時「呼吸肌麻痺需呼吸器支持」——正確且為主要死因預防。(B) 治療關鍵是「肉毒抗毒素（antitoxin）」與支持治療，「不是抗生素」（clindamycin 等對成人食因型無益，傷口型才需清創＋抗生素）。(C) 不會「熱痙攣」。(D) 作用在「周邊神經肌肉接合處（突觸前）」，「非中樞神經」。常見來源為「真空包裝/罐頭/醃漬」等厭氧保存食品。故正確為 (A)。", "options": {"A": "正確。嚴重肉毒桿菌中毒致呼吸肌麻痺，需呼吸器支持。", "B": "錯。治療為抗毒素＋支持，非常規抗生素（clindamycin 無益）。", "C": "錯。不會發生熱痙攣。", "D": "錯。作用於周邊神經肌肉接合處（突觸前），非中樞神經。"}, "sources": ["Harrison 21e（Botulism）"]}}, "106-106a-內科-60": {"quick": "fluconazole 對麴菌（Aspergillus）無效，故 (B)。", "detail": {"background": "抗黴菌藥的涵蓋範圍：「fluconazole」對念珠菌（多數）與隱球菌有效，但「對麴菌（Aspergillus）『無活性』」——故為答案 (B)。對麴菌有效者包括：「voriconazole（侵襲性麴菌病首選）、isavuconazole、posaconazole、itraconazole（azole 中具抗麴菌活性者）」、「amphotericin B（廣效，含麴菌）」、「棘白素 echinocandin（caspofungin、micafungin，對麴菌有活性，多作輔助/補救）」。故選項中唯一對麴菌無效者是 fluconazole。記憶：fluconazole「沒有麴菌覆蓋」。", "options": {"A": "amphotericin B 廣效，對麴菌有效。", "B": "正確（無效）。fluconazole 對麴菌無活性。", "C": "voriconazole 為侵襲性麴菌病首選。", "D": "caspofungin（棘白素）對麴菌有活性。"}, "sources": ["Harrison 21e（Antifungal agents; Aspergillus coverage）"]}}, "106-106b-內科-76": {"quick": "人流感與禽流感可經基因重組產生新病毒株，故 (D)。", "detail": {"background": "兒童流感：(A) 兒童流感常見併發症「肺炎『與中耳炎』」（中耳炎在兒童常見，非少見）——錯。(B) 克流感（oseltamivir/Tamiflu）標準用法為「一天兩次（BID），共 5 天」——故「一天一次共三天」錯。(C) 不活化流感疫苗適用於「6 個月以上」（非 1 歲以上）——錯。(D) 流感病毒（尤 A 型）可發生「抗原移型（antigenic shift）」——當人流感與禽流感病毒「共同感染」同一宿主時，基因節段「重組（reassortment）」可產生具大流行潛力的新病毒株——正確。故 (D) 正確。流感病毒分節段 RNA 是其能重組的結構基礎。", "options": {"A": "錯。兒童流感併發中耳炎常見，非少見。", "B": "錯。oseltamivir 為一天兩次共 5 天。", "C": "錯。流感疫苗適用 6 個月以上，非 1 歲以上。", "D": "正確。人流感與禽流感可經基因重組（reassortment）產生新病毒株。"}, "sources": ["Harrison 21e（Influenza; antigenic shift/reassortment）", "CDC"]}}, "107-TNPA-內科-32": {"quick": "回國已 3 週仍無症狀（超過最長潛伏期）最能排除麻疹境外感染，故 (D)。", "detail": {"background": "麻疹（measles）潛伏期約「7–14 天（最長可至 21 天）」，傳染力極強（空氣傳染）。要「排除」某次暴露是否已感染，最可靠的是「超過最長潛伏期仍無症狀」——本例「回國已經 3 週（21 天）」仍無症狀，最能排除此次境外感染（D）。其餘：(A) 幼時接種疫苗可「降低」風險但不能完全排除（疫苗保護非 100%、可能消退）；(B) 戴口罩降低風險但不能保證未感染；(C) 「曾接觸疑似個案」反而是「增加」風險的因素。故最能排除者為 (D)。麻疹防治靠 MMR 疫苗群體免疫。", "options": {"A": "幼時接種疫苗降低風險但不能完全排除。", "B": "戴口罩降低風險，不能保證未感染。", "C": "接觸疑似個案反而增加風險。", "D": "正確。回國 3 週（超過最長潛伏期）仍無症狀，最能排除感染。"}, "sources": ["Harrison 21e（Measles; incubation period）", "CDC"]}}, "109-進階-內科-67": {"quick": "fluconazole 無法治療麴菌感染，故 (D)。", "detail": {"background": "承前（同 106-106a-內科-60 的概念）：可治療侵襲性麴菌病（aspergillosis）的 azole 為「voriconazole（首選）、isavuconazole、posaconazole、itraconazole」——這些「具抗麴菌活性」。而「fluconazole『對麴菌無活性』」（其覆蓋以念珠菌、隱球菌為主），故「無法治療麴菌感染」者為 (D) fluconazole。其他可治麴菌者尚有 amphotericin B 與棘白素（caspofungin/micafungin，輔助）。臨床侵襲性麴菌病（好發嚴重免疫低下、嗜中性球低下、移植病人）首選 voriconazole。", "options": {"A": "voriconazole 為侵襲性麴菌病首選。", "B": "posaconazole 具抗麴菌活性（亦用於預防）。", "C": "itraconazole 具抗麴菌活性。", "D": "正確（無法治療）。fluconazole 對麴菌無活性。"}, "sources": ["Harrison 21e（Aspergillosis; antifungal coverage）"]}}, "111-進階-內科-61": {"quick": "anti-EBNA 抗體出現代表「過去/恢復期」感染而非急性期，故敘述 (C) 錯。", "detail": {"background": "EB 病毒（Epstein-Barr virus, EBV）：(A) 成人 >90% 曾感染並產生抗體（多數幼時無症狀感染）——正確。(B) 典型「傳染性單核球增多症（infectious mononucleosis）」表現為發燒、咽峽炎、頸部淋巴結腫大（±脾腫大、非典型淋巴球增多）——正確。(C) 「anti-EBNA（EBV nuclear antigen 抗體）」於感染後「數週至數月才出現並終生存在」，代表「過去/恢復期」感染；「急性期」的標記是「anti-VCA IgM（與 IgG）」——故「anti-EBNA 表示急性感染期」錯誤。(D) EBV 與多種癌症相關，如 Burkitt 淋巴瘤、鼻咽癌、霍奇金淋巴瘤、移植後淋巴增生——正確。故錯誤者為 (C)。", "options": {"A": "正確。成人 >90% 曾感染 EBV 並有抗體。", "B": "正確。常見發燒、咽峽炎、淋巴結腫（傳染性單核球增多症）。", "C": "錯誤（為答案）。anti-EBNA 代表過去/恢復期感染；急性期看 anti-VCA IgM。", "D": "正確。EBV 與 Burkitt 淋巴瘤等癌症相關。"}, "sources": ["Harrison 21e（EBV; serology）"]}}, "113-進階-內科-28": {"quick": "抗病毒藥 tecovirimat 用於重症/高風險，並非確診後「一律儘速」給予，故 (D) 最不適當。", "detail": {"background": "猴痘（Mpox）：(A) 屬人畜共通傳染病，亦可經「密切接觸病人的皮膚病灶、體液、呼吸道分泌物或污染物」傳染（含性接觸）——正確。(B) 潛伏期約 1–21 天（通常 6–13 天）——正確。(C) 典型症狀為發燒、皮膚病灶（斑疹→丘疹→水泡→膿皰→結痂）、淋巴腺腫大（淋巴結腫是與天花的區別點之一）——正確。(D) 多數猴痘為「自限性，以支持治療為主」；抗病毒藥「tecovirimat（TPOXX）」保留給「重症或高風險族群（免疫低下、孕婦、兒童、病
