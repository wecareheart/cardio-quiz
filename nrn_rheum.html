N3","catname":"內外科護理學","num":31,"stem":"為降低排斥反應,下列何者為器官移植前進行組織配對的常見檢驗?1C型肝炎檢驗 2人類白血球抗原(HLA) 3混和性淋巴細胞反應 4交叉配對試驗 5人類免疫缺乏病毒(HIV)篩檢","opts":{"A":"123","B":"145","C":"234","D":"345"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"system_code":"S8","system_name":"免疫風濕","topic":"R9器官移植與免疫抑制","topic_code":"R9","q_num":31,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"123","B":"145","C":"234","D":"345"},"img":""},{"id":"114170-N3-25","code":"114170","roc":"114","cat":"N3","catname":"內外科護理學","num":25,"stem":"有關器官移植後發生急性排斥反應,下列敘述何者最適當?","opts":{"A":"常見於移植後12~24 小時內","B":"T 淋巴球與巨噬細胞活性增加","C":"常見於手術中,移植器官再度恢復血循前","D":"無法治療,須立刻移除植入之器官"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"system_code":"S8","system_name":"免疫風濕","topic":"R9器官移植與免疫抑制","topic_code":"R9","q_num":25,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"常見於移植後12~24 小時內","B":"T 淋巴球與巨噬細胞活性增加","C":"常見於手術中,移植器官再度恢復血循前","D":"無法治療,須立刻移除植入之器官"},"img":""}],E={"101030-N3-65":{"quick":"猩紅熱是A群鏈球菌(化膿性鏈球菌)外毒素引起的「感染性」疾病,非自體免疫。","detail":{"background":"自體免疫疾病是免疫系統喪失對「自我抗原」的耐受性(self-tolerance),產生自體抗體或致敏T細胞攻擊自身組織所致。常見自體免疫疾病包括:全身性紅斑性狼瘡(SLE,抗核抗體攻擊多器官)、類風濕性關節炎(RA,攻擊滑膜)、僵直性脊椎炎(與HLA-B27相關的脊椎關節病變)、橋本氏甲狀腺炎、第一型糖尿病、重症肌無力等。猩紅熱(scarlet fever)則是A群β溶血性鏈球菌(Streptococcus pyogenes)感染後,其紅疹外毒素(erythrogenic toxin)造成全身紅疹與草莓舌的「急性感染症」,以抗生素(penicillin)治療,屬感染而非自體免疫。注意:鏈球菌感染「後」的風濕熱與急性腎絲球腎炎才是免疫媒介的後遺症,但猩紅熱本身是感染。","options":{"A":"SLE是典型自體免疫疾病,抗核抗體攻擊多器官。","B":"正解。猩紅熱是A群鏈球菌外毒素引起的感染性疾病,非自體免疫。","C":"類風濕性關節炎為自體免疫攻擊滑膜的疾病。","D":"僵直性脊椎炎屬HLA-B27相關的自體免疫脊椎關節病變。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"101030-N3-66":{"quick":"輔助T(helper T,CD4⁺/T4)淋巴球表面CD4抗原最多,是HIV主要攻擊標的。","detail":{"background":"CD4是輔助型T淋巴球(helper T cell,又稱T4)表面的標記抗原,負責辨識抗原呈現細胞(APC)經由第二類主要組織相容複合體(MHC class II)呈現的抗原,並協調活化B細胞產生抗體、活化毒殺T細胞與巨噬細胞,是後天免疫的「總指揮」。雖然單核球/巨噬細胞表面也帶有少量CD4,但「含CD4最多」的細胞是輔助T淋巴球。臨床上HIV病毒正是以CD4分子為受體入侵並破壞輔助T細胞,使CD4數目下降、免疫崩解,故CD4計數是監測HIV病程的重要指標(<200/μL易發生伺機性感染)。毒殺T細胞(細胞毒性T)表面標記則是CD8。","options":{"A":"正解。輔助T(T4)淋巴球表面CD4抗原最多,為HIV主要標的。","B":"B淋巴球主要表面標記為CD19/CD20,非CD4最多。","C":"巨噬細胞僅帶少量CD4,非含量最多者。","D":"單核球表面CD4量少,不及輔助T細胞。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"101110-N3-36":{"quick":"特異性(後天/適應性)免疫由淋巴球(T、B細胞)媒介,能辨識特定抗原並產生記憶。","detail":{"background":"免疫可分為「非特異性(先天/天生)免疫」與「特異性(後天/適應性)免疫」。非特異性免疫包括皮膚黏膜屏障、胃酸、發炎反應、補體、干擾素、吞噬細胞(中性球、巨噬細胞)與自然殺手細胞,對所有病原一視同仁、無記憶性。特異性免疫則由「淋巴球」主導:T淋巴球負責細胞性免疫、B淋巴球分化為漿細胞產生專一抗體(體液性免疫),能精準辨識特定抗原、具免疫記憶(再次接觸反應更快更強),是疫苗保護力的基礎。本題補體、干擾素屬非特異性免疫的可溶性分子;「體液」一詞太籠統(體液性免疫的關鍵是B淋巴球/抗體),故與「人類特異性免疫」最直接相關者為淋巴球。","options":{"A":"補體屬非特異性免疫的可溶性蛋白系統,無抗原專一記憶。","B":"正解。淋巴球(T、B細胞)主導特異性免疫,能辨識特定抗原。","C":"干擾素是先天免疫的抗病毒細胞激素,非特異性。","D":"「體液」泛指血漿組織液,非特異性免疫的關鍵應是B淋巴球/抗體。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"102110-N3-70":{"quick":"疫苗接種讓人體「自己」產生抗體與記憶,屬主動後天免疫,非被動。","detail":{"background":"後天(適應性)免疫依抗體來源可分:主動後天免疫=人體「自己」接觸抗原後製造抗體與致敏淋巴球,包括自然主動(得過該病)與人工主動(接種疫苗/類毒素);其特性是產生較慢但持久、有記憶。被動後天免疫=直接「接受現成抗體」,包括自然被動(母體經胎盤傳IgG、母乳傳IgA)與人工被動(注射免疫球蛋白、抗毒素血清);其特性是立即見效但短暫、無記憶。疫苗接種是讓免疫系統認識減毒/去活性抗原而「自行」產生抗體,屬人工「主動」後天免疫,故B敘述錯誤。後天免疫的確針對特定病原入侵而啟動,並產生抗體與致敏化淋巴球。","options":{"A":"後天免疫確可分主動與被動兩類,敘述正確。","B":"正解(錯誤敘述)。疫苗使人體自行產生抗體,屬「主動」非被動後天免疫。","C":"後天免疫針對特定病原體入侵而引發,具專一性。","D":"對抗病原過程確會產生抗體與致敏化(記憶)淋巴球。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"104100-N3-49":{"quick":"新生兒易感染主因是「免疫系統未成熟」且母體抗體漸消失,非肝臟未發展。","detail":{"background":"影響免疫力的因素眾多:年齡(新生兒免疫系統尚未成熟、補體與抗體製造不足,出生後依賴母體經胎盤而來的IgG與母乳IgA,隨母體抗體消退而出現易感空窗;老年人因胸腺萎縮、T細胞功能下降、荷爾蒙減少而免疫衰退)、營養(蛋白質為抗體與淋巴組織原料,攝取不足致淋巴組織萎縮、免疫低下)、壓力與睡眠(壓力荷爾蒙皮質醇抑制免疫,睡眠不足降低免疫)。本題A錯在歸因為「肝臟未完全發展」——新生兒易感染是「免疫系統(淋巴球、抗體、補體)未成熟」及母體被動抗體漸失所致,與肝臟發育無直接關聯。","options":{"A":"正解(錯誤敘述)。新生兒易感染主因是免疫系統未成熟、母體抗體漸失,非肝臟未發展。","B":"老年人胸腺退化、荷爾蒙減少確使免疫力下降,正確。","C":"蛋白質不足致淋巴組織萎縮、感染機率增加,正確。","D":"睡眠不足與壓力會抑制免疫,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"105030-N3-49":{"quick":"能通過胎盤的是IgG(分子最小、唯一可過胎盤),IgE不能通過胎盤。","detail":{"background":"五類免疫球蛋白特性須熟記:IgG為血中含量最多(約75%)、分子量適中、是「唯一能通過胎盤」者,提供新生兒出生後數月的被動保護,也是再次免疫反應(記憶)的主力。IgA存在於黏膜分泌液、初乳/母乳中,保護呼吸道與腸胃道黏膜。IgM分子最大(五聚體),是「初次免疫反應最先出現」的抗體,也是辨識新近感染的指標。IgD主要在B細胞表面,與B細胞的分化、活化有關。IgE含量最少,附著於肥大細胞與嗜鹼性球上,媒介第一型立即性過敏反應與抗寄生蟲反應。本題A錯在「IgE可通過胎盤」——能過胎盤的是IgG。","options":{"A":"正解(錯誤敘述)。能通過胎盤的是IgG,IgE不能通過胎盤。","B":"IgD與B細胞的分化活化有關,正確。","C":"IgA可經母乳/初乳提供新生兒黏膜免疫保護,正確。","D":"IgM是感染後最先出現的抗體,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"107110-N3-52":{"quick":"胃酸與消化酶屬「非特異性(先天)」免疫的化學屏障,非特異性免疫。","detail":{"background":"人體免疫第一道防線屬「非特異性(先天)免疫」的屏障,包括:物理屏障(皮膚、黏膜、纖毛)、化學屏障(胃酸的強酸環境、消化酶、溶菌酶、皮脂酸性、陰道乳酸桿菌維持酸性)及正常菌叢競爭。這些對所有病原一視同仁、無抗原專一性與記憶,屬非特異性免疫。特異性(後天)免疫則由淋巴球辨識特定抗原、具記憶,如抗體與致敏T細胞。本題C錯在把「胃酸及消化酶」歸為特異性免疫——它們是非特異性化學屏障。皮膚黏膜為第一道防線、陰道乳酸桿菌防止致病菌、口攝入生物體被胃酸消化酶破壞,皆為正確的非特異屏障描述。","options":{"A":"陰道乳酸桿菌維持酸性環境防止致病菌,屬非特異屏障,正確。","B":"皮膚與黏膜是抵禦微生物的第一道防線,正確。","C":"正解(錯誤敘述)。胃酸與消化酶屬非特異性化學屏障,非特異性免疫。","D":"口攝入的微生物會被胃酸與消化酶破壞,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"108020-N3-50":{"quick":"細胞性免疫由T細胞主導,須透過主要組織相容複合體(MHC)呈現抗原才能辨識。","detail":{"background":"特異性免疫分為體液性免疫(由B細胞分化為漿細胞產生抗體,對抗細胞外病原與毒素)與細胞性免疫(由T細胞主導,對抗細胞內病原如病毒、結核菌、黴菌,並負責移植排斥與遲發型過敏)。細胞性免疫的關鍵:T細胞「不能」直接辨識游離抗原,須經抗原呈現細胞把抗原片段裝載在主要組織相容複合體(MHC)分子上呈現,T細胞受體(TCR)才能辨識(輔助T辨識MHC-II、毒殺T辨識MHC-I)。細胞性免疫形成反應所需時間「較體液性長」(遲發型)。本題D正確;A錯(主導為T非B);B過於籠統(細胞免疫對抗的是細胞內病原);C錯(時間較長非較短)。","options":{"A":"細胞性免疫主導細胞為T細胞,非B細胞。","B":"細胞性免疫主要對抗「細胞內」病原,敘述過於籠統且非最佳。","C":"細胞性免疫(遲發型)形成所需時間較體液性免疫「長」,非短。","D":"正解。T細胞須藉MHC呈現抗原才能辨識,為細胞性免疫核心特徵。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"108110-N3-31":{"quick":"干擾素常見副作用為頭痛、發燒、肌肉痠痛、食慾降低等類似感冒症狀。","detail":{"background":"干擾素(interferon)是細胞受病毒感染或刺激後分泌的細胞激素,具抗病毒、調節免疫與抗腫瘤作用,臨床用於慢性B/C型肝炎、某些惡性腫瘤(如黑色素瘤、腎細胞癌)與多發性硬化症等。給藥途徑常為皮下或肌肉注射(依劑型),最常見副作用是「類流感症候群」:發燒、寒顫、頭痛、肌肉關節痠痛、疲倦、食慾不振,通常於用藥初期出現、可給予解熱鎮痛劑緩解;其他副作用包括骨髓抑制、肝功能異常、憂鬱。干擾素是調節既有免疫反應、增強自然殺手與毒殺T細胞活性,而非「使人體產生抗癌抗體(主動免疫)」,也非「高劑量必增加抗體合成」。本題D正確。","options":{"A":"干擾素是調節免疫/抗病毒細胞激素,非使人體產生抗癌抗體的主動免疫。","B":"干擾素常採皮下或肌肉注射,「深部肌肉注射」非其特定必要方式。","C":"干擾素並非靠高劑量增加抗體合成,作用機轉為調節免疫與抗病毒。","D":"正解。常見副作用為頭痛、發燒、食慾降低等類似感冒症狀。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"108110-N3-46":{"quick":"注射含抗體的血清或免疫球蛋白是「直接給予現成抗體」,屬被動性後天免疫。","detail":{"background":"後天免疫依抗體是否由自身製造分主動/被動。主動性後天免疫:人體接觸抗原後「自行」製造抗體與致敏淋巴球,如得過某病(自然主動)、接種疫苗或類毒素(人工主動),產生慢但持久有記憶。被動性後天免疫:直接「接受現成抗體」,如母體經胎盤傳IgG給胎兒、母乳傳IgA(自然被動)、注射免疫球蛋白或抗血清/抗毒素(人工被動),立即生效但短暫無記憶。本題C錯在把「注射含抗體血清或免疫球蛋白」歸為主動——這是給予現成抗體,屬「被動」性後天免疫。其餘A(後天免疫須接觸特定病原)、B(主動性自製抗體)、D(胎盤母乳屬被動)皆正確。","options":{"A":"後天免疫經與特定病原接觸而啟動,具專一性,正確。","B":"主動性後天免疫是人體自行製造抗體或淋巴球,正確。","C":"正解(錯誤敘述)。注射現成抗體血清/免疫球蛋白屬「被動」非主動。","D":"胎盤傳IgG、母乳傳免疫力屬被動性後天免疫,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"108110-N3-47":{"quick":"抗核抗體(ANA)是篩檢自體免疫(尤其SLE)的血清學檢查。","detail":{"background":"自體免疫疾病的血清學檢查以「自體抗體」為核心。抗核抗體(ANA)是針對細胞核成分的抗體,為篩檢全身性紅斑性狼瘡(SLE)及多種結締組織病(硬皮症、乾燥症、混合結締組織病等)的首要血清學檢查,SLE病人ANA幾乎都呈陽性(高敏感度);進一步可驗抗dsDNA、抗Sm(對SLE專一性高)。本題其他選項:紅血球沉降率(ESR)與C反應蛋白(CRP)是「非特異性」發炎指標,可在感染、發炎、惡性腫瘤皆升高,並非自體免疫專屬;滑膜液檢查用於分析關節炎(如痛風找尿酸結晶、感染找細菌),非血清自體抗體檢查。故屬「自體免疫血清反應」的是ANA。","options":{"A":"紅血球沉降率(ESR)是非特異性發炎指標,非自體免疫專屬血清檢查。","B":"正解。抗核抗體(ANA)是篩檢自體免疫(SLE)的血清學檢查。","C":"滑膜液分析用於關節炎鑑別(結晶/感染),非血清自體抗體。","D":"C反應蛋白(CRP)為非特異性發炎指標,非自體免疫血清檢查。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"110110-N3-49":{"quick":"初級(初次)免疫反應最先合成的抗體是分子最大的IgM。","detail":{"background":"初級(初次)免疫反應:抗原首次入侵後,B細胞活化、分化為漿細胞,「最先」產生的抗體是IgM(五聚體、分子量最大),約7~10天達高峰後下降;之後因類別轉換(class switching)逐漸以IgG為主。次級(再次)免疫反應:因有記憶B細胞,再次接觸同抗原時反應更快、量更多,以高親和力的IgG為主導。因此「初次反應最先出現」與「辨識新近/急性感染」的指標是IgM,而IgG代表既往感染或免疫記憶。本題答案為IgM。IgA主黏膜免疫、IgD與B細胞分化有關、IgG含量最多且能過胎盤但非初次最先出現者。","options":{"A":"IgA主要在黏膜分泌液,非初次免疫反應最先合成者。","B":"IgD與B細胞分化活化有關,非初次反應主要抗體。","C":"IgG是次級免疫反應主力與含量最多者,非初次最先出現。","D":"正解。初次免疫反應最先合成的抗體是IgM。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"112110-N3-47":{"quick":"接種疫苗使人體「自行」產生抗體,屬人工主動性後天免疫。","detail":{"background":"主動性後天免疫的判準是「抗體由人體自己製造」:得過該疾病(自然主動)或接種疫苗、類毒素(人工主動),特點是反應較慢但持久、具免疫記憶。被動性後天免疫則是「接受現成抗體」:注射免疫球蛋白/抗血清(人工被動)、母體經胎盤傳IgG或母乳傳IgA(自然被動),立即見效但短暫無記憶。「由遺傳而來的抵抗力」屬先天(非後天)免疫範疇。本題接種疫苗讓人體自行產生抗體,屬「主動性」後天免疫,為正解;注射免疫球蛋白與母親經胎盤傳IgG皆為被動。","options":{"A":"由遺傳而來的抵抗力屬先天免疫,非後天主動。","B":"注射免疫球蛋白是接受現成抗體,屬被動後天免疫。","C":"正解。接種疫苗使人體自行產生抗體,屬主動性後天免疫。","D":"母親經胎盤傳IgG給胎兒屬被動性後天免疫。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"112110-N3-49":{"quick":"IgE可附著於肥大細胞與嗜鹼性球,媒介第一型立即性過敏反應。","detail":{"background":"免疫球蛋白特性:IgG含量「最多」(非最少)、是唯一能通過胎盤者、為次級免疫主力;IgA存在黏膜與母乳,保護呼吸道與腸胃道;IgM分子最大、初次免疫「最先」出現;IgD主要在B細胞表面、與B細胞分化有關(非T細胞);IgE含量最少,可附著在肥大細胞與嗜鹼性球表面,當再次接觸過敏原時引發脫顆粒、釋放組織胺,媒介第一型立即性過敏反應與抗寄生蟲。本題C正確;A錯(IgG含量最多而非最少);B錯(與B細胞分化有關的是IgD,且IgD作用對象是B細胞);D錯(IgM最先出現而非最後)。","options":{"A":"IgG含量「最多」(非最少),能通過胎盤,敘述錯誤。","B":"與B細胞分化有關的是IgD,且其對象為B淋巴球非T淋巴球。","C":"正解。IgE可附著於肥大細胞,引發過敏反應。","D":"IgM是感染後「最先」出現的抗體,非最後。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"113180-N3-29":{"quick":"IgA存在於黏膜分泌液與母乳,可預防呼吸道及腸胃道感染。","detail":{"background":"免疫球蛋白特性整理:IgG含量最多、能過胎盤、再次免疫主力;IgA存在淚液、唾液、初乳/母乳及呼吸道、腸胃道黏膜分泌液,形成黏膜局部防線,「預防呼吸道與腸胃道感染」,母乳哺餵可把分泌型IgA傳給嬰兒;IgM分子最大、初次免疫最先出現;IgD與B細胞分化有關;IgE最少、媒介第一型過敏。本題B正確。A錯(含量最多並能透過母乳的應改為——含量最多是IgG、透過母乳的是IgA,故A把IgD混為一談是錯的);C錯(影響B細胞分化的是IgD非IgE);D錯(IgM最先出現非最後)。","options":{"A":"含量最多的是IgG,透過母乳提供保護的是IgA,非IgD,敘述錯誤。","B":"正解。IgA存在黏膜與母乳,可預防呼吸道及腸胃道感染。","C":"影響B細胞分化的是IgD,非IgE。","D":"IgM是免疫反應中「最先」出現的抗體,非最後。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Roitt 免疫學"]}},"101110-N3-37":{"quick":"塵蟎過敏由IgE媒介、接觸後立即發作,屬第I型立即性過敏反應。","detail":{"background":"對塵蟎、花粉、藥物、食物等過敏原引發的立即性過敏屬「第I型(IgE媒介)」——過敏原與肥大細胞上IgE結合，釋放組織胺造成過敏性鼻炎、氣喘、蕁麻疹甚至過敏性休克，反應於數分鐘內發生。","options":{"A":"正解。塵蟎過敏為IgE媒介、接觸即發作的第I型立即性過敏。","B":"細胞溶解型(II型)為抗體攻擊細胞表面抗原,如輸血溶血。","C":"遲發性(IV型)為T細胞媒介、24~72小時才發作,如接觸性皮膚炎。","D":"免疫複合體型(III型)為抗原抗體複合體沉積,如SLE、血清病。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"102110-N3-52":{"quick":"輸血血型不合(溶血)為IgG/IgM抗體+補體破壞紅血球,屬第II型細胞溶解性過敏。","detail":{"background":"輸血ABO血型不合引發的溶血性反應屬「第II型(細胞毒殺型)」——抗體(IgG/IgM)與紅血球表面抗原結合、活化補體使紅血球溶解，臨床出現發燒、血紅素尿、腰背痛甚至休克。","options":{"A":"第I型立即性過敏由IgE媒介,如過敏性休克、氣喘,非輸血溶血。","B":"正解。輸血血型不合屬第II型細胞溶解性過敏反應。","C":"第III型免疫複合體為複合體沉積,如SLE、血清病。","D":"第IV型遲發型為T細胞媒介,如接觸性皮膚炎、移植排斥。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"103030-N3-50":{"quick":"靜脈抗生素後搔癢與蕁麻疹為IgE媒介的第I型(立即性)過敏反應。","detail":{"background":"靜脈注射抗生素後出現搔癢與蕁麻疹屬「第I型立即性過敏反應」——藥物作為過敏原使IgE活化肥大細胞釋放組織胺；嚴重者可進展為過敏性休克，須立即停藥並備epinephrine急救。","options":{"A":"正解。抗生素引起的搔癢蕁麻疹為第I型立即性過敏反應。","B":"第II型細胞毒性如輸血溶血,非藥物蕁麻疹。","C":"第III型免疫補體如血清病、SLE。","D":"第IV型遲發型如接觸性皮膚炎,24~72小時才出現。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"103100-N3-47":{"quick":"第一型過敏「初次接觸」是致敏化階段(產生IgE),由B細胞分化漿細胞而非T細胞認出過敏原描述有誤。","detail":{"background":"第I型(立即性、過敏性)反應由IgE媒介、肥大細胞與嗜鹼性球去顆粒釋放組織胺，於再次接觸過敏原後數分鐘發生；典型疾病為氣喘、過敏性鼻炎、蕁麻疹、過敏性休克。其機轉與抗體類別敘述錯誤即為答案。","options":{"A":"第I型為立即性,引起血管擴張、黏膜水腫、平滑肌收縮,正確。","B":"正解(錯誤敘述)。第一型主軸為B細胞產生IgE致敏,描述敏感性T細胞協助有誤。","C":"病理變化為肥大細胞去顆粒釋放組織胺與白三烯素,正確。","D":"初次接觸IgE量少、症狀輕(致敏期),正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"104030-N3-50":{"quick":"過敏性休克會引起嚴重「支氣管收縮(痙攣)」與低血壓,非支氣管擴張。","detail":{"background":"過敏性休克(anaphylaxis)是最嚴重的第I型立即性過敏反應:再次接觸過敏原後,大量IgE媒介肥大細胞脫顆粒,釋放組織胺等血管活性物質,造成全身血管擴張(→低血壓、休克)、血管通透性增加(→水腫)、以及「支氣管平滑肌收縮(痙攣)」→喘鳴、呼吸困難、喉頭水腫。常見誘因為藥物(盤尼西林最典型)、食物、昆蟲叮咬、顯影劑。處置首選立即肌肉注射腎上腺素(epinephrine)。本題D錯在「嚴重支氣管擴張」——應為支氣管「收縮/痙攣」才會呼吸困難。","options":{"A":"過敏性休克反應非常快速(數分鐘內),正確。","B":"主要媒介抗體為IgE,正確。","C":"藥物過敏最常見於盤尼西林,正確。","D":"正解(錯誤敘述)。過敏性休克是支氣管「收縮」與低血壓,非擴張。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"105090-N3-49":{"quick":"過敏處置不會「注射IgE抗體」;IgE正是致敏元兇,注射只會加重過敏。","detail":{"background":"第I型過敏性疾病處置原則:首要為「避免接觸過敏原」(環境控制);藥物可用抗組織胺(緩解組織胺引起的癢、鼻水)、類固醇(抑制發炎)、白三烯素拮抗劑、嚴重時用腎上腺素;另有「減敏療法(免疫療法)」逐步皮下注射「微量過敏原」誘導耐受並產生IgG阻斷抗體、使IgE下降。本題D錯在「定期注射IgE抗體減輕過敏」——IgE是引發過敏的元兇,注射IgE只會加重而非減輕;減敏療法注射的是「過敏原」而非IgE。其餘避免過敏原、抗組織胺、類固醇皆為正確處置。","options":{"A":"避免接觸過敏原是過敏處置的首要原則,正確。","B":"抗組織胺可緩解組織胺造成的過敏症狀,正確。","C":"類固醇可抑制發炎反應緩解症狀,正確。","D":"正解(錯誤敘述)。IgE是過敏元兇,不可注射IgE;減敏療法注射的是過敏原。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"106030-N3-47":{"quick":"皮膚過敏試驗前至少48小時應停服抗組織胺,以免抑制反應造成偽陰性。","detail":{"background":"異位性過敏(atopy)有明顯「遺傳傾向」,病人常合併過敏性鼻炎、氣喘、異位性皮膚炎、蕁麻疹(過敏進行曲),這些可同時或先後出現。臨床檢查引起立即性過敏的是「IgE」(非IgM),可測血清總IgE、特異性IgE或做皮膚試驗(點刺/皮內)。做皮膚過敏試驗前須停用會抑制反應的藥物,尤其「抗組織胺應停藥至少48~72小時」(長效者更久),否則會抑制風疹塊反應造成偽陰性;類固醇亦可能影響。本題D正確;A錯(有遺傳傾向)、B錯(鼻炎與蕁麻疹可並存)、C錯(過敏由IgE非IgM引起)。","options":{"A":"異位性過敏有明顯遺傳傾向,敘述錯誤。","B":"過敏性鼻炎與蕁麻疹可同時發生(同屬異位性體質),敘述錯誤。","C":"皮膚試驗檢查的是IgE引起的過敏反應,非IgM。","D":"正解。皮膚試驗前至少48小時停服抗組織胺,以免偽陰性。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"106030-N3-50":{"quick":"類風濕性關節炎為抗原-抗體免疫複合體沉積引起,屬第III型免疫複合體過敏反應。","detail":{"background":"免疫複合體型為「第III型」——抗原抗體複合物沉積於組織活化補體引起發炎，典型如全身性紅斑性狼瘡、血清病、鏈球菌感染後腎絲球腎炎、類風濕性關節炎。","options":{"A":"異位性皮膚炎屬第I型(IgE媒介)立即性過敏。","B":"ABO血型不合屬第II型細胞溶解性過敏。","C":"正解。類風濕性關節炎為第III型免疫複合體過敏反應。","D":"器官移植排斥屬第IV型遲發型(T細胞媒介)。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"106110-N3-48":{"quick":"過敏疾病時嗜伊紅球(嗜酸性球)會「上升」;白血球下降為錯誤敘述。","detail":{"background":"過敏性疾病的實驗室特徵:血清IgE濃度上升(第I型過敏標記);周邊血「嗜伊紅球(嗜酸性球)增多」(eosinophilia,過敏與寄生蟲感染的指標);第III型免疫複合體相關疾病(如SLE)會見補體C3、C4「下降」(被消耗)。本題D「白血球下降」是錯誤敘述——過敏時嗜酸性球升高使白血球分類異常,但不會以「白血球下降」為特徵。注意:嗜酸性球上升、IgE上升是過敏的典型實驗室發現。","options":{"A":"過敏時血清IgE濃度上升,正確。","B":"免疫複合體型過敏會消耗補體致C3、C4下降,正確。","C":"過敏時嗜伊紅球(嗜酸性球)上升,正確。","D":"正解(錯誤敘述)。過敏不以白血球下降為特徵,嗜酸性球反而上升。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"106111-N3-48":{"quick":"溶血性輸血反應為抗體+補體破壞紅血球,屬第II型細胞毒性過敏反應。","detail":{"background":"溶血性輸血反應屬「第II型(抗體依賴細胞毒殺)」——受血者抗體與供血紅血球抗原結合、活化補體使紅血球破壞溶解，出現發燒、寒顫、血紅素尿與腎損傷。","options":{"A":"免疫複合體性為第III型(複合體沉積),非溶血反應。","B":"過敏性休克為第I型立即性反應。","C":"遲發性為第IV型T細胞媒介。","D":"正解。溶血性輸血反應屬第II型細胞毒性過敏反應。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"107030-N3-49":{"quick":"羽絨被易藏塵蟎與羽毛過敏原,過敏病人應「避免」使用,非建議使用。","detail":{"background":"過敏性疾病(尤其塵蟎、過敏性鼻炎、氣喘)居家環境控制重點:減少塵蟎孳生與過敏原暴露——使用防蟎寢具、避免地毯/絨毛玩具/填充家具/草蓆榻榻米;寢具定期55℃以上熱水清洗;濕度控制<50%;避免飼養有毛寵物;外出風大或花粉季戴口罩。本題B「羽絨被」錯誤——羽絨/羽毛被易藏塵蟎且羽毛本身可能是過敏原,應避免改用防蟎材質。其餘尼龍枕頭(不易藏蟎,可)、風大戴口罩、避免絨毛玩具皆正確。","options":{"A":"尼龍枕頭較不易藏塵蟎,適合過敏病人,正確。","B":"正解(錯誤敘述)。羽絨被易藏塵蟎/羽毛過敏原,應避免使用。","C":"風大天氣戴口罩可減少過敏原吸入,正確。","D":"避免絨毛玩具可減少塵蟎,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"108020-N3-48":{"quick":"溶血性輸血反應為IgG與IgM抗體結合紅血球抗原、活化補體所致(第II型)。","detail":{"background":"第II型細胞毒性過敏反應由「IgG或IgM」抗體結合細胞表面抗原,進而活化補體系統造成細胞溶解。溶血性輸血反應(血型不合)即由受血者血漿中的IgM(天然抗A/抗B)與IgG抗體結合捐血者紅血球抗原,活化補體導致血管內溶血。故參與此反應的免疫球蛋白是「IgG與IgM」。IgE媒介的是第I型立即性過敏(與補體溶血無關);IgA主要在黏膜。本題答案為IgG、IgM。","options":{"A":"IgA不參與補體媒介的輸血溶血反應。","B":"IgE媒介第I型過敏,非補體溶血。","C":"IgE不參與第II型細胞溶解反應。","D":"正解。溶血性輸血反應由IgG與IgM結合補體所致。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"109030-N3-44":{"quick":"過敏性休克的血管活性介質由「肥大細胞/嗜鹼性球」釋放,非嗜酸性細胞。","detail":{"background":"過敏性休克為第I型立即性過敏:再次接觸過敏原後,過敏原交聯附著於「肥大細胞與嗜鹼性球」表面的IgE,使其脫顆粒釋放組織胺、白三烯素、前列腺素等血管活性介質,造成數分鐘內全身血管擴張、低血壓、支氣管痙攣甚至死亡;誘因包括藥物、花粉、灰塵、食物、蜂螫。本題C錯在「由嗜酸性細胞釋出血管活性介質」——釋放介質的是肥大細胞與嗜鹼性球;嗜酸性球(嗜伊紅球)在過敏中數量增多,但非脫顆粒釋放組織胺的主角。其餘A、B、D皆正確。","options":{"A":"過敏性休克數分鐘內發生,可能致命,正確。","B":"由接觸外來過敏原(藥物、花粉、灰塵)引起,正確。","C":"正解(錯誤敘述)。釋放血管活性介質的是肥大細胞/嗜鹼性球,非嗜酸性細胞。","D":"再次接觸過敏原會產生大量IgE,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"109030-N3-78":{"quick":"減敏(免疫)療法目的是「降低」IgE並誘導IgG阻斷抗體與耐受,非增加IgE。","detail":{"background":"過敏性休克的治療與預防:目標為緩解急性症狀(腎上腺素、抗組織胺、類固醇、支氣管擴張劑、維持呼吸道與血壓)並預防再發(避免接觸過敏原與致敏食物);給予可能致敏的藥物或生物製劑前宜做皮膚試驗。「減敏感療法(過敏原免疫療法)」是逐步皮下注射微量過敏原,使免疫系統產生耐受、誘導IgG「阻斷抗體」並「降低IgE」反應,以減輕過敏。本題D錯在「目的在增加IgE濃度」——恰相反,減敏療法是要「降低」IgE。其餘A、B、C皆正確。","options":{"A":"治療目標是緩解症狀,正確。","B":"避免接觸過敏原與致敏食物,正確。","C":"給予易致敏藥物/生物製劑前需先做皮膚試驗,正確。","D":"正解(錯誤敘述)。減敏療法目的是降低IgE、誘導IgG阻斷抗體,非增加IgE。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"109110-N3-47":{"quick":"「抗體與抗原形成免疫複合體沉積」是第III型;遲發型(第IV型)由T細胞媒介、無抗體。","detail":{"background":"遲發型為「第IV型(細胞媒介)」，由致敏T淋巴球而非抗體媒介，於再次接觸抗原後24~72小時達高峰，典型如結核菌素試驗、接觸性皮膚炎、移植排斥；其時程與媒介細胞敘述錯誤即為答案。","options":{"A":"正解(錯誤敘述)。免疫複合體沉積是第III型機轉,非遲發型(IV型)。","B":"器官移植排斥反應屬第IV型遲發型,正確。","C":"接觸化學物質、染劑、藥物可引發第IV型,正確。","D":"病毒細菌刺激T細胞引發細胞性免疫,屬遲發型,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"109110-N3-51":{"quick":"溶血性反應屬第II型細胞毒性,不屬於第III型免疫複合體過敏反應。","detail":{"background":"第III型(免疫複合體型)包括SLE、血清病、感染後腎絲球腎炎、類風濕性關節炎等；不屬於者通常為其他型代表(如氣喘屬第I型、輸血溶血屬第II型、接觸性皮膚炎屬第IV型)。","options":{"A":"全身性紅斑狼瘡屬第III型免疫複合體過敏。","B":"類風濕性關節炎屬第III型免疫複合體過敏。","C":"正解。溶血性反應屬第II型細胞毒性,非第III型。","D":"血清病屬第III型免疫複合體過敏。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"110110-N3-44":{"quick":"伍氏螢光檢查(Wood’s light)是用紫外光照射檢查皮膚黴菌/色素病變,非過敏試驗。","detail":{"background":"皮膚過敏試驗用於找出過敏原或測藥物過敏:貼布試驗(patch test,測第IV型接觸性過敏,如染劑、金屬)、皮內試驗(intradermal test,注射微量過敏原於真皮)、點刺/刮畫試驗(prick/scratch test,測第I型立即性過敏)、盤尼西林(青黴素)皮膚試驗(測藥物過敏)。伍氏燈/伍氏螢光檢查(Wood’s light)則是以長波紫外光照射皮膚,用於診斷黴菌感染(如頭癬)、色素異常(白斑、汗斑)等,「不是過敏試驗」。本題問何者「不是」皮膚過敏試驗,答案為伍氏螢光檢查。","options":{"A":"貼布試驗測第IV型接觸性過敏,屬皮膚過敏試驗。","B":"皮內試驗注射微量過敏原,屬皮膚過敏試驗。","C":"盤尼西林試驗測藥物過敏,屬皮膚過敏試驗。","D":"正解。伍氏螢光檢查用於查黴菌/色素,非過敏試驗。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"110110-N3-51":{"quick":"接觸性皮膚炎是T細胞媒介的第IV型遲發型過敏,不屬於第I型立即性過敏。","detail":{"background":"第I型(立即性、IgE媒介)包括過敏性鼻炎、氣喘、蕁麻疹、食物或藥物過敏、過敏性休克；不屬於者為其他型(如輸血溶血屬第II型、SLE屬第III型、接觸性皮膚炎或移植排斥屬第IV型)。","options":{"A":"正解。接觸性皮膚炎屬第IV型遲發型,非第I型。","B":"氣喘屬第I型立即性過敏。","C":"枯草熱(花粉熱)屬第I型立即性過敏。","D":"異位性皮膚炎屬第I型立即性過敏。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"111030-N3-79":{"quick":"輸血中出現過敏反應應「立即停止輸血」並改打生理食鹽水,不可只暫停5分鐘再續打。","detail":{"background":"輸血反應的緊急處置:一旦出現過敏(蕁麻疹、搔癢、哮喘)、溶血(發燒寒顫腰痛血紅素尿)或其他反應,應「立即停止輸血」(而非暫停後再續),保留靜脈通路改以生理食鹽水維持,監測生命徵象、維持呼吸道暢通、通知醫師,並依症狀給藥(輕度過敏給抗組織胺;支氣管痙攣/過敏性休克給腎上腺素、Aminophylline、類固醇),保留血袋送驗。本題B錯在「暫停輸血5分鐘再繼續進行輸血」——過敏反應發生時應停止該袋血而非續打,以免加重。其餘A、C、D皆正確。","options":{"A":"需密切監測生命徵象變化,正確。","B":"正解(錯誤敘述)。出現過敏反應應立即停止輸血,不可暫停後再續打。","C":"維持呼吸道暢通,正確。","D":"給予Epinephrine及Aminophylline緩解過敏與支氣管痙攣,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"111110-N3-48":{"quick":"填充家具(布沙發、草蓆、榻榻米)易積塵蟎,過敏病人應避免,非建議使用。","detail":{"background":"過敏(尤其塵蟎)居家衛教:減少塵蟎孳生與過敏原——避免布沙發/填充家具/地毯/絨毛玩具/草蓆/榻榻米(都易藏塵蟎),改用皮革或木質、可擦拭家具;防蟎寢具並以熱水清洗;定期清掃但避免揚塵與噴霧式清潔劑;控制濕度;避免養有毛寵物;對花粉過敏可關窗並用空調過濾循環。本題B「建議使用填充家具如布沙發、椰子墊、草蓆、榻榻米」為錯誤——這些都是塵蟎溫床應避免。其餘A、C、D皆正確的過敏護理指導。","options":{"A":"關窗隔離戶外過敏原並用空調過濾循環,正確。","B":"正解(錯誤敘述)。填充家具/草蓆/榻榻米易藏塵蟎,應避免使用。","C":"定期清理且不用噴霧清潔劑(避免刺激),正確。","D":"避免養寵物與致敏食物,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"111110-N3-51":{"quick":"第一型立即性過敏反應由IgE媒介,IgE附著肥大細胞引發脫顆粒。","detail":{"background":"與第I型立即性過敏反應密切相關的免疫球蛋白為「IgE」——IgE結合於肥大細胞與嗜鹼性球表面，再接觸過敏原時交聯引發去顆粒、釋放組織胺等媒介物造成立即過敏症狀。","options":{"A":"IgA主要在黏膜分泌液,與第I型過敏無直接關聯。","B":"正解。第一型立即性過敏由IgE媒介。","C":"IgG媒介第II/III型,非第I型立即過敏的主角。","D":"IgM為初次免疫最先出現,媒介第II型而非第I型。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"112030-N3-47":{"quick":"第II型細胞毒性過敏會破壞紅血球、白血球、血小板,故「不受影響」為錯誤。","detail":{"background":"第II型(細胞毒殺型)由IgG/IgM抗體與細胞表面抗原結合、活化補體或吞噬作用破壞細胞，典型如ABO不合溶血、新生兒溶血、自體免疫溶血性貧血、Graves病；其抗體類別與機轉敘述錯誤即為答案。","options":{"A":"第II型過敏的抗體是IgG或IgM,正確。","B":"Rh血型不合屬第II型細胞溶解反應,正確。","C":"參與細胞包括吞噬細胞與殺手(NK)細胞,正確。","D":"正解(錯誤敘述)。紅、白血球與血小板正是第II型攻擊破壞的標的。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"114170-N3-20":{"quick":"輸血後皮膚癢、蕁麻疹、哮喘屬「過敏反應」(IgE媒介的第I型)。","detail":{"background":"輸血反應分類:過敏反應(對血漿蛋白過敏,出現皮膚癢、蕁麻疹、哮喘、血管性水腫,屬第I型,處置停輸血、給抗組織胺,嚴重給腎上腺素);發熱性非溶血反應(熱原反應,因白血球抗體致發燒寒顫);溶血反應(血型不合,發燒、腰背痛、血紅素尿、休克);細菌污染反應(高燒、敗血性休克)。本題以「皮膚癢、蕁麻疹、哮喘」為主,無溶血或高燒敗血表現,最符合「過敏反應」。","options":{"A":"正解。皮膚癢、蕁麻疹、哮喘是輸血過敏反應(第I型)的典型表現。","B":"熱原反應以發燒寒顫為主,無蕁麻疹哮喘。","C":"溶血反應以發燒、腰背痛、血紅素尿、休克為主。","D":"細菌污染反應呈高燒、敗血性休克。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"114170-N3-29":{"quick":"過敏生活指導應避免接觸二手菸與刺鼻清潔劑等刺激物與過敏原。","detail":{"background":"過敏(氣喘、過敏性鼻炎)的環境與生活指導:避免過敏原與刺激物——避免二手菸、刺鼻味道清潔劑、香水、油漆等刺激性氣體;避免地毯/地氈、棉絨厚重窗簾(易積塵蟎);善用除濕機、有HEPA濾網的空調與「有集塵袋/HEPA的吸塵器」、濕拖把(減少揚塵)。本題逐一檢視:A使用地氈與棉質窗簾(易積塵)不當;B避免除濕機與濾網空調(錯,反而應使用)不當;C避免濕拖把與集塵袋吸塵器(錯,反而應使用減少揚塵)不當;D「避免接觸二手菸與刺鼻味道清潔劑」最適當。","options":{"A":"地氈與棉質厚窗簾易積塵蟎,不適當。","B":"除濕機與有濾網空調有助控制過敏原,不應避免。","C":"濕拖把與有集塵袋吸塵器可減少揚塵,不應避免。","D":"正解。避免二手菸與刺鼻清潔劑等刺激物,最適當。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"115030-N3-27":{"quick":"刮畫(scratch)/點刺試驗可測出對「特定過敏原」的第I型立即過敏反應。","detail":{"background":"要找出「哪種過敏原」引起第I型立即性過敏,最合適的是「皮膚過敏原試驗」:刮畫試驗(scratch test)或點刺試驗(prick test)——把多種可疑過敏原萃取液點在皮膚上輕劃/點刺,15~20分鐘觀察是否出現風疹塊與紅暈,可同時測多種過敏原並判定致敏來源。伍氏燈用於查黴菌/色素;免疫螢光試驗用於自體抗體/組織抗原檢測;皮膚切片用於皮膚病理診斷,皆無法快速找出特定吸入/食物過敏原。本題答案為刮畫試驗。","options":{"A":"伍氏燈用於查黴菌、色素病變,非找過敏原。","B":"免疫螢光試驗用於自體抗體/組織抗原,非過敏原篩檢。","C":"正解。刮畫(scratch)試驗可測出特定過敏原引起的立即過敏。","D":"皮膚切片用於皮膚病理診斷,非找過敏原。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"115030-N3-47":{"quick":"過敏性休克為支氣管「收縮」致呼吸困難(非擴張);其餘1、3、4皆正確,故選134。","detail":{"background":"過敏性休克(anaphylaxis)是嚴重第I型過敏:①過敏原可來自藥物、食物、昆蟲叮咬、顯影劑等(正確);②會發生支氣管「收縮/痙攣」造成喘鳴與呼吸困難——敘述2說「嚴重支氣管擴張」是錯誤(應為收縮);③因血管擴張致血壓下降、代償性脈搏增快,血壓可能正常或降低(正確);④首選立即肌肉注射epinephrine(腎上腺素)以收縮血管、擴張支氣管、抑制介質釋放,可迅速改善(正確)。故正確組合為1、3、4=選項C。","options":{"A":"123含錯誤的2(支氣管擴張),不選。","B":"124含錯誤的2,不選。","C":"正解。1(多種過敏原)、3(脈搏增快血壓可降)、4(立即注射epinephrine)皆正確。","D":"234含錯誤的2,不選。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","Gell & Coombs 過敏反應分類"]}},"101030-N3-64":{"quick":"SLE可見發燒、關節腫脹、疲憊;血液學是白血球「減少」、ANA「陽性」,故選124。","detail":{"background":"SLE為自體免疫疾病，好發於育齡女性；常見臨床有發燒、疲憊、對稱性關節腫痛、蝶形紅斑、光敏感、口腔潰瘍、漿膜炎與腎炎；血檢可見白血球與血小板「減少」、抗核抗體(ANA)陽性。","options":{"A":"正解。發燒、關節腫脹、疲憊皆為SLE常見表徵。","B":"含3(白血球增加)錯誤,SLE為白血球減少。","C":"含3、5皆錯(白血球減少、ANA陽性)。","D":"含5錯誤(ANA為陽性而非正常)。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"101110-N3-39":{"quick":"帶有特定HLA基因只是「增加易感性」,並非帶有者大半會發病。","detail":{"background":"全身性紅斑性狼瘡為慢性多系統自體免疫病，好發20~40歲女性，病程反覆緩解與惡化；典型蝶形紅斑、光敏感、關節炎、腎炎，ANA與anti-dsDNA陽性、補體下降；陽光、感染、壓力可誘發惡化。","options":{"A":"SLE好發於年輕及育齡期女性,正確。","B":"正解(錯誤敘述)。帶有HLA基因僅增加易感性,非大半會發病。","C":"臉部紅疹照光部位特別嚴重(光敏感),正確。","D":"血清學可見抗核抗體(ANA)陽性,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"102030-N3-49":{"quick":"血管新生抑制劑用於抗腫瘤/眼疾,不是SLE的治療藥物。","detail":{"background":"SLE藥物：抗瘧藥(hydroxychloroquine)控制皮膚關節症狀並監測視網膜毒性、類固醇與免疫抑制劑(如cyclophosphamide)用於重症與腎炎、NSAID緩解關節痛；應避免會誘發或加重狼瘡的藥物。","options":{"A":"類固醇是SLE控制發炎的主力,適宜。","B":"免疫抑制劑用於狼瘡腎炎等重症,適宜。","C":"正解。血管新生抑制劑用於腫瘤/眼疾,非SLE治療藥物。","D":"抗瘧疾藥(奎寧類)是SLE治療基石,適宜。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"103030-N3-49":{"quick":"類固醇不可自行驟然停藥,須在醫師指示下逐漸減量,以免腎上腺危象與病情反彈。","detail":{"background":"SLE照護：避免日曬與紫外線(外出防曬、長袖帽子)、預防感染、規律服藥不可自行停類固醇、監測腎功能與血球；衛教辨識惡化徵象(發燒、紅疹、水腫、血尿)及維持均衡作息。","options":{"A":"正解(錯誤敘述)。類固醇須逐漸減量,不可立即停藥。","B":"服奎寧類應每4~6個月檢查眼睛與視力,正確。","C":"免疫抑制劑可延緩狼瘡性腎炎惡化,正確。","D":"免疫低下易感染,使用抗感染藥預防,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"103100-N3-49":{"quick":"服用類固醇會鈉滯留,應採「低鈉」飲食(非低鉀高鈉),以免水腫與高血壓。","detail":{"background":"SLE為自體免疫多系統疾病，可侵犯皮膚、關節、腎臟(狼瘡腎炎)、血液(全血球減少)、心肺漿膜與中樞神經；anti-dsDNA與anti-Sm具專一性、補體C3C4下降反映活性；其疾病性質或檢驗敘述錯誤即為答案。","options":{"A":"正解(錯誤敘述)。服類固醇應低鈉並注意補鉀,非低鉀高鈉。","B":"避免慢跑以減輕關節壓力,正確。","C":"長期奎寧類可能導致視網膜病變,正確。","D":"SLE為抗原抗體結合刺激補體的發炎反應(第III型),正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"104030-N3-49":{"quick":"SLE是內科自體免疫疾病,以藥物控制免疫發炎,期待「外科醫師開刀治癒」顯示認知錯誤,需衛教。","detail":{"background":"SLE病人自我照護須避免日曬、規律服藥、預防感染與懷孕前諮詢；若病人表達錯誤觀念(如自行停類固醇、刻意曬太陽、忽略發燒紅疹)即為「需要進一步護理諮詢」之指標。","options":{"A":"避免曬太陽(光敏感),認知正確。","B":"SLE常合併關節炎,認知正確。","C":"正解(需衛教)。SLE靠內科藥物控制,非外科手術治癒。","D":"免疫低下易得到感染,認知正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"105030-N3-51":{"quick":"SLE可見對稱性關節腫脹壓痛與活動時疼痛;蝴蝶斑在「臉頰」、心病變以「心包炎」為主。","detail":{"background":"SLE臨床表徵：蝶形紅斑、盤狀紅斑、光敏感、口腔潰瘍、非侵蝕性關節炎、漿膜炎、腎炎、血液異常(溶血性貧血、白血球或血小板減少)、神經精神症狀及ANA陽性，符合分類標準多項可診斷。","options":{"A":"正解。SLE可見關節腫脹壓痛及活動時疼痛。","B":"最常見皮膚症狀是臉頰蝴蝶斑,非頸部胸部。","C":"SLE最常見心臟病變是心包炎,非心肌梗塞。","D":"SLE中樞神經侵犯多為神經精神症狀,非僅運動神經。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"106030-N3-49":{"quick":"SLE病情控制良好時「可」計畫懷孕,並非一律建議不要懷孕。","detail":{"background":"SLE以類固醇緩解後仍須長期照護：不可自行停藥(避免腎上腺危象與復發)、持續防曬與預防感染、監測長期類固醇副作用(骨鬆、血糖、感染、體重)、規律回診；錯誤觀念如「已痊癒可停藥曬太陽」即為答案。","options":{"A":"類固醇治療目的為降低炎症反應,正確。","B":"避免含雌激素口服避孕藥(可能誘發惡化),正確。","C":"正解(錯誤敘述)。病情控制良好可計畫懷孕,非一律不要懷孕。","D":"避免直接暴露陽光(光敏感),正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"106110-N3-49":{"quick":"SLE活動期紅血球沉降率(ESR)會「升高」,故「ESR降低」為錯誤。","detail":{"background":"SLE實驗室：ANA高敏感(篩檢用)、anti-dsDNA與anti-Sm高專一(反映活性與腎炎)、補體C3C4「下降」、可見全血球減少、ESR上升；若敘述補體上升或抗體陰性等與活性矛盾即為錯誤。","options":{"A":"抗DNA抗體升高,與SLE活性相關,正確。","B":"ANA效價大於1:80陽性,正確。","C":"正解(錯誤敘述)。SLE活動期ESR升高,非降低。","D":"補體C3、C4因被消耗而下降,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"106111-N3-49":{"quick":"藥物誘發性狼瘡「較少」侵犯腎臟與中樞神經,故「通常會影響腎臟或中樞神經」為錯誤。","detail":{"background":"藥物誘發性狼瘡(drug-induced lupus)由某些藥物引起,典型者如procainamide、hydralazine、isoniazid(抗結核藥)、某些抗生素與抗癲癇藥等,可出現發燒、關節痛、肌痛、漿膜炎(心包/肋膜炎)、紅疹及抗組蛋白抗體(anti-histone)陽性。其特點:停用致病藥物後症狀「多會消退」,且「較少」侵犯腎臟與中樞神經(與原發性SLE不同)。本題D「通常會影響腎臟或中樞神經系統」錯誤——藥物性狼瘡通常不太侵犯腎與CNS。其餘A、B、C皆正確。","options":{"A":"藥物性狼瘡可由抗生素或抗結核藥(如isoniazid)引起,正確。","B":"停用致病藥物後症狀通常消失,正確。","C":"可有漿膜炎、發燒、紅疹等症狀,正確。","D":"正解(錯誤敘述)。藥物性狼瘡較少侵犯腎臟與中樞神經。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"107030-N3-50":{"quick":"停用抗瘧藥後視網膜病變「不一定即消失」,藥物已沉積者病變可能持續,故須定期追蹤。","detail":{"background":"SLE處置：避免日曬與誘發因子、抗瘧藥維持治療、類固醇與免疫抑制劑控制活性與器官侵犯、NSAID緩解關節症狀、預防與積極處理感染；錯誤處置如停藥、鼓勵日曬或忽略腎炎監測即為答案。","options":{"A":"SLE無法治癒,只能降低炎症與損傷,正確。","B":"可用NSAID減輕關節疼痛,正確。","C":"類固醇可治療全身性症狀的急性惡化,正確。","D":"正解(錯誤敘述)。停藥後視網膜病變不一定消失,可能不可逆,須追蹤。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"107110-N3-51":{"quick":"年輕女性發燒、疲倦、體重減輕、口腔潰瘍、對稱關節炎且ANA陽性,最符合SLE。","detail":{"background":"此案例為典型SLE——年輕女性出現疲倦、發燒、體重減輕、口腔潰瘍、對稱性關節炎及ANA陽性，符合SLE分類標準；應進一步查anti-dsDNA、補體、尿液檢查以評估器官侵犯與疾病活性。","options":{"A":"類風濕性關節炎以小關節晨僵為主,無此全身ANA陽性表現。","B":"正解。育齡女性多系統症狀+口腔潰瘍+對稱關節炎+ANA陽性,符合SLE。","C":"骨性關節炎是退化性、無全身發炎與ANA陽性。","D":"AIDS以免疫低下伺機感染為主,非此免疫亢進表現。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"108020-N3-49":{"quick":"狼瘡腎炎(腎受侵犯)應採「低鈉、低蛋白」飲食,不是低鈉高鉀高蛋白。","detail":{"background":"SLE護理：防曬避免紫外線誘發、皮膚口腔護理、預防感染、規律服藥監測副作用、評估腎與血液侵犯、心理支持；錯誤措施如鼓勵日光浴、自行停類固醇、忽略發燒等即為答案。","options":{"A":"告知避免直接暴露陽光,正確。","B":"一般情況提供高蛋白、高維生素、高鐵均衡飲食,正確。","C":"正解(錯誤敘述)。狼瘡腎炎應採低鈉、低蛋白,且須限鉀。","D":"關節炎症急性期予冷敷,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"109030-N3-45":{"quick":"女性光敏感、對稱關節痛、口腔潰瘍、補體下降、ANA陽性、ESR升高、血小板減少,診斷為SLE。","detail":{"background":"此案例符合SLE——光敏感、對稱性關節痛、口腔潰瘍合併補體C3C4下降與ANA陽性，提示活動性自體免疫；補體下降反映免疫複合物消耗、是疾病活性的重要指標。","options":{"A":"痛風是尿酸結晶引起的急性單關節炎,無此免疫指標。","B":"AIDS以免疫低下伺機感染為主,非補體消耗。","C":"正解。多系統症狀+補體下降+ANA陽性+血小板減少,符合SLE。","D":"RA以小關節晨僵為主,補體不一定下降。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"109110-N3-50":{"quick":"SLE致病機轉是人體產生「對抗自身抗原」的自體抗體,屬第III型免疫複合體反應。","detail":{"background":"SLE致病機轉：B、T淋巴球失調產生大量自體抗體(如anti-dsDNA)，抗原抗體免疫複合物沉積於組織、活化補體引起發炎(屬第III型過敏反應)，造成皮膚、關節、腎臟等多器官損傷。","options":{"A":"SLE非遲發型T細胞媒介(第IV型),機轉錯誤。","B":"正解。SLE是人體產生對抗自身抗體的自體免疫反應。","C":"SLE主介質非IgE(IgE為第I型過敏)。","D":"SLE攻擊的是自身抗原,非外在過敏原。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"110030-N3-51":{"quick":"SLE的白血球與血小板是「下降」(血液學異常),故「升高」為錯誤敘述。","detail":{"background":"SLE診斷依臨床加實驗室：ANA篩檢、anti-dsDNA/anti-Sm專一、補體下降、全血球減少、尿蛋白與紅血球圓柱反映腎炎；若敘述補體上升、抗體與活性方向相反等即為錯誤。","options":{"A":"抗核抗體(ANA)呈陽性,正確。","B":"血清補體C3、C4下降,正確。","C":"正解(錯誤敘述)。SLE的白血球與血小板是減少,非升高。","D":"免疫球蛋白濃度升高,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"111030-N3-45":{"quick":"出現血尿、蛋白尿(狼瘡腎炎)時應「休息」,不是多下床活動。","detail":{"background":"SLE護理重點：避免日曬與感染、規律服藥不可自行停類固醇、監測腎功能與血壓、皮膚口腔護理、衛教辨識惡化；錯誤措施如曬太陽促進維生素D、停藥或忽略蛋白尿即為答案。","options":{"A":"出門穿長袖、戴寬邊帽防曬,正確。","B":"正解(錯誤敘述)。出現血尿蛋白尿(腎炎活動)應休息,非多活動。","C":"慢性疲勞時可漸進式活動(步行、游泳),正確。","D":"病情控制良好6個月後再討論懷孕,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"112030-N3-49":{"quick":"SLE病人應避免含雌激素的口服避孕藥(可能誘發惡化與血栓),宜用保險套等非荷爾蒙避孕。","detail":{"background":"SLE病人衛教：嚴格防曬、預防感染、按時服藥與回診、懷孕須於疾病穩定期並諮詢、均衡飲食適度休息；錯誤指導如鼓勵日光浴、自行調整類固醇、忽略發燒紅疹水腫等即為答案。","options":{"A":"外出戴太陽眼鏡、帽子、著長袖長褲防曬,正確。","B":"正解(錯誤敘述)。SLE應避免含雌激素口服避孕藥,宜用保險套等。","C":"壓力、生病或感染時應告知醫師調整藥物,正確。","D":"關節疼痛可冷熱敷緩解,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"112030-N3-68":{"quick":"18歲女性紅疹、口腔潰瘍、關節痛、頭痛、血紅素與血小板降低、ANA升高,診斷為SLE。","detail":{"background":"年輕女性出現皮膚紅疹、口腔潰瘍、關節疼痛合併血紅素與血小板降低、ANA升高，最符合SLE；其多系統侵犯(皮膚、關節、血液)與自體抗體陽性為診斷重點。","options":{"A":"痛風為尿酸結晶急性單關節炎,無此多系統與ANA表現。","B":"正解。年輕女性多系統症狀+血液學異常+ANA升高,符合SLE。","C":"AIDS以免疫低下伺機感染為主。","D":"RA以對稱小關節晨僵為主,非此急性多系統表現。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"112180-N3-33":{"quick":"SLE的抗核抗體(ANA)呈陽性;白血球與ESR、補體的變化分別為下降。","detail":{"background":"SLE實驗室特徵：ANA陽性(高敏感)、anti-dsDNA與anti-Sm陽性(高專一、反映活性)、補體C3C4下降、可見溶血性貧血與白血球血小板減少、ESR上升；這些是判讀疾病活性的依據。","options":{"A":"SLE白血球數目減少,非增加。","B":"SLE的紅血球沉降速率(ESR)上升,非下降。","C":"正解。抗核性抗體(ANA)呈陽性反應。","D":"補體C3、C4被消耗而下降,非高於正常。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"113030-N3-31":{"quick":"SLE肺部受侵犯以「肋膜炎(漿膜炎)」最常見,而非肺炎。","detail":{"background":"SLE臨床：蝶形紅斑、光敏感、口腔潰瘍、對稱性非侵蝕性關節炎、漿膜炎、狼瘡腎炎、血液異常與神經精神症狀；好發育齡女性、病程反覆；若敘述侵蝕性關節破壞或男性好發等即為錯誤。","options":{"A":"蝴蝶斑為SLE主要典型皮膚症狀,正確。","B":"正解(錯誤敘述)。SLE肺部受侵犯以肋膜炎(漿膜炎)最常見,非肺炎。","C":"可出現蛋白尿、血尿(狼瘡腎炎),正確。","D":"神經系統可出現人格改變或精神疾病,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"113100-N3-29":{"quick":"長期使用奎寧類應每4~6個月監測「眼睛/視網膜(視力)」,而非聽力。","detail":{"background":"SLE醫療處置：抗瘧藥為基礎用藥、類固醇與免疫抑制劑控制活性與器官侵犯、避免誘發因子、積極處理感染；狼瘡腎炎需免疫抑制治療；錯誤處置如以抗生素為主或鼓勵日曬即為答案。","options":{"A":"SLE無法治癒,以降低炎症與損傷為治療目標,正確。","B":"類固醇可使炎症反應降低,正確。","C":"正解(錯誤敘述)。奎寧類須監測「眼睛/視網膜」,非聽力。","D":"免疫抑制劑可抑制自體免疫、延緩腎損傷,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"113180-N3-31":{"quick":"SLE為抗原-抗體免疫複合體沉積活化補體的疾病,屬第III型過敏反應。","detail":{"background":"全身性紅斑性狼瘡屬「第III型(免疫複合體型)」過敏反應——自體抗原與抗體形成免疫複合物沉積於皮膚、關節、腎絲球等組織，活化補體引發發炎與多器官損傷。","options":{"A":"第I型立即性為IgE媒介(如過敏性休克),非SLE。","B":"第II型細胞毒性如輸血溶血,非SLE。","C":"正解。SLE屬第III型免疫複合物過敏反應。","D":"第IV型遲發型為T細胞媒介(如接觸性皮膚炎、移植排斥)。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"114100-N3-30":{"quick":"SLE病人避孕「不宜」採含雌激素的口服避孕藥,故為不適當處置。","detail":{"background":"SLE護理：防曬避紫外線、預防與及早治療感染、規律服藥監測副作用、評估腎與血液侵犯、心理支持與懷孕諮詢；「不適當」者常為鼓勵日曬、自行停類固醇、忽略蛋白尿或發燒等。","options":{"A":"病情控制良好3~6個月後可討論懷孕計畫,適當。","B":"腎受侵犯時採低鈉、低鉀、低蛋白飲食,適當。","C":"關節炎急性期可冷敷緩解,適當。","D":"正解(不適當)。SLE避孕不宜用含雌激素的口服避孕藥。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"115030-N3-31":{"quick":"SLE「會」侵犯中樞神經(神經精神性狼瘡),須留意認知與精神問題,故C錯誤。","detail":{"background":"SLE為多系統自體免疫病，表現蝶形紅斑、光敏感、口腔潰瘍、對稱關節炎、漿膜炎、腎炎、血液三系減少與ANA陽性；病程反覆、好發育齡女性；與此矛盾的敘述(如侵犯方式或好發族群)即為錯誤。","options":{"A":"關節症狀包括發炎、疼痛、腫脹、僵硬,正確。","B":"心包炎、肋膜炎等對預後影響大,正確。","C":"正解(錯誤敘述)。SLE會侵犯中樞神經,須留意認知與精神問題。","D":"腎功能下降應限制蛋白質、水分與鹽分,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","ACR/EULAR SLE 分類與治療準則"]}},"102030-N3-52":{"quick":"RA是「對稱性」發生,故「不對稱」為錯誤敘述。","detail":{"background":"類風濕性關節炎為自體免疫慢性多關節炎，好發女性、對稱性侵犯「小關節」(掌指、近端指間、腕)，晨僵>1小時、活動後減輕；可致關節破壞變形(尺側偏斜、天鵝頸)；類風濕因子與anti-CCP陽性。","options":{"A":"30~60歲女性為好發高峰,正確。","B":"晨間關節僵硬與疼痛較嚴重(晨僵),正確。","C":"正解(錯誤敘述)。RA是對稱性發生,非不對稱。","D":"類風濕結節多見於前臂伸側、尺側、鷹嘴突,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"103030-N3-48":{"quick":"「每天俯臥兩次預防脊椎壓力」是僵直性脊椎炎的指導,非RA疼痛處置。","detail":{"background":"RA疼痛處置：急性發炎期休息、冷敷消腫；慢性期溫熱敷、適度關節活動防僵硬；藥物用NSAID、DMARD(methotrexate)、必要時類固醇與生物製劑；「不適當」者如急性紅腫熱痛期熱敷或完全不活動致僵硬。","options":{"A":"教導放鬆技巧有助減緩疼痛,適當。","B":"活動之間休息以防關節過度負荷,適當。","C":"急性期冷敷可減緩疼痛,適當。","D":"正解(不適當)。每天俯臥兩次是僵直性脊椎炎指導,非RA。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"104100-N3-50":{"quick":"RA是「結締組織的自體免疫疾病」,屬全身性、女多於男、無法治癒。","detail":{"background":"類風濕性關節炎為對稱性、侵犯小關節的自體免疫慢性炎，晨僵>1小時、活動後改善；X光見關節腔變窄、骨侵蝕；類風濕因子與anti-CCP陽性、ESR/CRP升高；治療以DMARD早期介入防變形。","options":{"A":"RA是全身性疾病,可有關節外表現,非侷限關節。","B":"RA無法治癒,規律治療是控制非50%治癒。","C":"RA女性發生率約男性3倍,非男多。","D":"正解。RA是結締組織的自體免疫疾病。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"105090-N3-50":{"quick":"RA是「早晨」與休息後僵硬(晨僵),活動後改善,故「不活動就僵硬特別晚上睡覺」描述有誤。","detail":{"background":"RA臨床：對稱性侵犯手腕、掌指與近端指間「小關節」、晨僵>1小時、活動後減輕、可有皮下結節與全身倦怠；晚期關節變形(尺側偏斜、天鵝頸、鈕釦指)；若敘述侵犯遠端指間或晨僵短即為錯誤。","options":{"A":"可出現疲累、倦怠、厭食等全身症狀,正確。","B":"症狀通常兩側對稱性發生,正確。","C":"正解(錯誤敘述)。RA以早晨晨僵為特徵,非特別在晚上睡覺時。","D":"活動時疼痛、後來休息也會痛,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"106030-N3-48":{"quick":"手部尺側偏斜、近端指間關節變形是類風濕性關節炎的典型晚期變形。","detail":{"background":"手部「尺側偏斜」與近端指間關節過度伸展(天鵝頸變形)為類風濕性關節炎晚期典型的關節破壞變形，源於滑膜炎(血管翳pannus)侵蝕軟骨與骨、破壞韌帶肌腱所致。","options":{"A":"骨性關節炎以遠端指間Heberden結節為主,無尺側偏斜。","B":"骨質疏鬆是骨量減少,非關節變形。","C":"正解。尺側偏斜、PIP變形是RA典型晚期變形。","D":"痛風以第一蹠趾關節急性紅腫為主。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"108110-N3-48":{"quick":"RA女性發生率約為男性3倍,故「男性是女性3倍」為錯誤敘述。","detail":{"background":"類風濕性關節炎好發於30~50歲、女性約為男性的2~3倍，具遺傳(HLA-DR4)與環境(吸菸)因子；為全身性自體免疫疾病；若敘述好發男性、僅侵犯單關節或無全身症狀等即為錯誤。","options":{"A":"正解(錯誤敘述)。RA是女性約男性3倍,非男多。","B":"30~50歲是發生高峰,正確。","C":"冬天發生率/症狀高於夏天,正確。","D":"可能發生於80歲老人(各年齡皆可),正確。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"109030-N3-46":{"quick":"利尿劑furosemide治療水腫/高血壓,並非RA用藥(且利尿劑反而會升尿酸誘發痛風)。","detail":{"background":"RA藥物：早期使用DMARD(methotrexate為首選)延緩關節破壞、NSAID緩解症狀、低劑量類固醇橋接、生物製劑用於頑固型；methotrexate須補葉酸並監測肝與血球；「不適當」者如只給止痛而不用DMARD。","options":{"A":"水楊酸(aspirin)等NSAID緩解RA症狀,適當。","B":"免疫抑制劑methotrexate為DMARD,延緩關節破壞,適當。","C":"糖皮質類固醇prednisone控制發炎,適當。","D":"正解(不適當)。利尿劑furosemide非RA用藥,且可誘發痛風。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"110030-N3-50":{"quick":"抗瘧疾製劑(奎寧類)有視網膜毒性,使用時應定期檢查眼睛,故D正確。","detail":{"background":"RA醫療處置原則：早期診斷、儘早使用DMARD(methotrexate)控制發炎防變形，急性期休息冷敷、緩解期運動與溫熱敷，配合復健維持關節功能；生物製劑用於對傳統DMARD反應不佳者。","options":{"A":"NSAID皆有腸胃腎風險,非Ibuprofen特別需擔心肝腎,敘述不當。","B":"DMARDs(如MTX)有致畸性,非育齡婦女首選且須避孕。","C":"COX-2抑制劑不抑制血小板,不延長出血時間。","D":"正解。奎寧類有視網膜毒性,應定期檢查眼睛。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"111030-N3-50":{"quick":"RA手部尺側偏斜(1)、X光關節腔變窄(3)正確;晨僵在休息後/早晨、且關節炎為對稱性,故選13。","detail":{"background":"RA正確特徵：手部關節出現尺側偏斜、X光呈現關節腔變窄與骨侵蝕、可有皮下結節；晨僵在「休息後」加重、活動後減輕(與退化性關節炎活動後加重相反)，為重要鑑別點。","options":{"A":"12含錯誤的2(RA是休息後/晨僵非活動後)。","B":"正解。尺側偏斜(1)與X光關節腔變窄(3)為RA正確表現。","C":"24皆錯(活動後僵硬、不對稱)。","D":"34含錯誤的4(RA為對稱性)。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"112110-N3-48":{"quick":"選擇性COX-2抑制劑「不抑制血小板」、不延長出血時間,故此敘述錯誤。","detail":{"background":"RA藥物：DMARD(methotrexate)為核心、需監測肝腎與血球並補葉酸；NSAID與類固醇控制症狀；生物製劑(抗TNF)用於頑固型須注意感染與結核再活化；若敘述用藥目的或監測重點錯誤即為答案。","options":{"A":"正解(錯誤敘述)。COX-2抑制劑不抑制血小板,不延長出血時間。","B":"aspirin降低前列腺素合成可減輕炎症疼痛,正確。","C":"NSAIDs是緩解症狀的傳統第一線用藥,正確。","D":"育齡婦女接受DMARDs須避孕(致畸),正確。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"113100-N3-30":{"quick":"關節「發生感染」時不可在關節腔內注射類固醇(會加重感染);應引流並抗生素治療。","detail":{"background":"RA處置：早期DMARD防關節破壞、急性期休息冷敷、緩解期溫熱敷與關節運動、復健維持功能、衛教保護關節(用大關節、避免過度負重)；錯誤處置如急性紅腫期熱敷或長期臥床不活動即為答案。","options":{"A":"發炎活動期冷敷、勿按摩關節,正確。","B":"Omega-3脂肪酸可改善RA症狀,正確。","C":"正解(錯誤敘述)。關節感染時不可注射類固醇,應引流加抗生素。","D":"抗TNF藥可使關節紅腫熱痛在1~2週改善,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"113180-N3-30":{"quick":"RA是對稱性、休息後晨僵、侵犯「小關節」、可致腕隧道症候群;故「活動後僵硬」與「侵犯大關節」錯誤,選23。","detail":{"background":"RA臨床：兩側「對稱性」侵犯、休息後(晨間)僵硬而活動後減輕、通常侵犯「小關節」、可造成關節變形與皮下結節；若敘述「侵犯大關節」或「活動後僵硬」即與RA特徵不符而為錯誤。","options":{"A":"12中1正確,不符「挑錯誤」。","B":"14皆為正確敘述,不符。","C":"正解。2(活動後僵硬)與3(侵犯大關節)為錯誤敘述。","D":"34中4正確,不符。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"114100-N3-31":{"quick":"RA復健可進行園藝、編織等促進手部關節活動的活動;運動以主動運動為主、用溫水、避免長期臥床。","detail":{"background":"RA復健：急性發炎期關節休息、副木保護以維持功能位；緩解期進行關節活動度與肌力運動、溫熱敷減僵硬、保護關節原則(用大關節分散負荷、避免長時間同一姿勢)；目標為維持功能、預防變形。","options":{"A":"運動治療應以主動運動為主,非被動運動為主。","B":"水療應在溫水池進行以放鬆減痛,非冷水池。","C":"正解。可進行園藝、編織等維持手功能的活動。","D":"不建議長期臥床,應維持適度活動防僵硬。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}},"102110-N3-10":{"quick":"痛風與血中尿酸(uric acid)相關,選項中可確立診斷者為尿酸。","detail":{"background":"確立痛風的「黃金診斷」為關節腔抽吸滑液於偏光顯微鏡下見「負雙折射的針狀尿酸鈉結晶」；血清尿酸雖常升高，但急性發作時可正常，故不能單以血尿酸確診。","options":{"A":"抗核抗體用於SLE等自體免疫,非痛風。","B":"鹼性磷酸酶與骨、肝膽相關,非痛風。","C":"鈣磷與副甲狀腺、骨代謝相關,非痛風。","D":"正解。尿酸(uric acid)與痛風診斷相關。"},"sources":["新文京《內外科護理學》","華杏《內外科護理學》","ACR 痛風治療指引"]}},"103030-N3-20":{"quick":"遠端指間關節的希伯登(Heberden)結節是「骨性關節炎」表現,非痛風。","detail":{"background":"痛風由普林代謝異常致高尿酸血症、尿酸鈉結晶沉積關節引發急性發炎，典型急性侵犯第一蹠趾關節(腳大拇趾)、紅腫熱痛劇烈；確診靠滑液結晶；急性期用秋水仙素/NSAID，降尿酸用allopurinol。","options":{"A":"好發男性、停經前婦女少見,正確。","B":"常發生在四肢遠端關節(如大腳趾),正確。","C":"aspirin會使尿酸留置而誘發痛風,正確。","D":"正解(錯誤敘述)。Heberden結節屬骨性關節炎,非痛風。"},"sources":["新文京《內外科護理學》","華杏《內外科護理學》","ACR 痛風治療指引"]}},"106110-N3-19":{"quick":"痛風急性期可用「護架」避免被褥壓迫患部以減痛;急性期應冰敷、休息,不開始降尿酸藥。","detail":{"background":"痛風急性期護理：患肢休息抬高、冷敷減痛消腫(非熱敷)、大量飲水促尿酸排出、避免高普林食物與酒精；急性期給秋水仙素或NSAID止痛消炎，「急性期不開始降尿酸藥」以免誘發或延長發作。","options":{"A":"allopurinol為降尿酸藥非抗炎,且急性期不新增。","B":"正解。使用護架避免被褥壓迫患部可減輕疼痛。","C":"急性發炎期應冰敷,非熱敷。","D":"急性期應休息抬高,不做全關節運動。"},"sources":["新文京《內外科護理學》","華杏《內外科護理學》","ACR 痛風治療指引"]}},"110110-N3-19":{"quick":"秋水仙素(colchicine)常見副作用為腹瀉,出現嚴重腹瀉時應停藥。","detail":{"background":"秋水仙素(Colchicine)用於痛風急性發作，抑制白血球趨化與發炎；常見副作用為「腸胃道症狀(噁心、嘔吐、腹瀉)」，出現腹瀉常為達治療劑量的指標，須注意脫水並依醫囑調整劑量。","options":{"A":"秋水仙素主要副作用非低血壓,敘述不當。","B":"需定期檢查眼睛的是奎寧類藥物,非秋水仙素。","C":"正解。秋水仙素易致腹瀉,嚴重腹瀉應停藥。","D":"秋水仙素不會導致血液凝結,敘述錯誤。"},"sources":["新文京《內外科護理學》","華杏《內外科護理學》","ACR 痛風治療指引"]}},"110110-N3-20":{"quick":"痛風應減少肉類、海鮮、啤酒等高普林與酒精攝取,以預防發作。","detail":{"background":"痛風長期護理：多喝水(每日2000~3000mL)促尿酸排出、避免高普林食物(內臟、海產、肉汁)與酒精(尤其啤酒)、控制體重、規律服降尿酸藥(allopurinol)；急性期休息冷敷止痛。","options":{"A":"睡覺維持肢體屈曲不當,患肢應抬高休息。","B":"水楊酸會使尿酸滯留,不宜按時服用。","C":"急性期應冰敷減痛,非避免冰熱敷。","D":"正解。減少肉類、海鮮、啤酒攝取以預防發作。"},"sources":["新文京《內外科護理學》","華杏《內外科護理學》","ACR 痛風治療指引"]}},"111030-N3-20":{"quick":"Probenecid(Benemid)是「促尿酸排泄劑」,主要作用為增加尿酸由腎排出。","detail":{"background":"Probenecid(Benemid)為「促尿酸排泄」藥物，作用於腎小管抑制尿酸再吸收以增加尿酸排出、降低血尿酸；用藥期間須多喝水並鹼化尿液以防尿酸結石，腎功能不佳者效果差。","options":{"A":"抑制尿酸形成的是allopurinol,非probenecid。","B":"正解。Probenecid增加尿酸由腎排出。","C":"probenecid作用於尿酸排泄,非降低普林排出。","D":"抑制炎症是NSAID/秋水仙素的作用,非probenecid。"},"sources":["新文京《內外科護理學》","華杏《內外科護理學》","ACR 痛風治療指引"]}},"114030-N3-11":{"quick":"痛風病人應避免aspirin(會使尿酸滯留升高血中尿酸),以預防發作。","detail":{"background":"痛風護理：急性期休息冷敷止痛，平時多飲水、限高普林食物與酒精、控制體重與三高、規律服藥；降尿酸藥(allopurinol)於急性期過後才開始且不可中途自停，避免血尿酸波動誘發發作。","options":{"A":"正解。避免aspirin以防尿酸滯留升高。","B":"應採均衡低脂飲食,高脂不利尿酸排出。","C":"尿酸結石宜鹼化尿液+多喝水,小紅莓汁酸化尿液不利。","D":"肉汁、海鮮高普林應減少,非多攝取。"},"sources":["新文京《內外科護理學》","華杏《內外科護理學》","ACR 痛風治療指引"]}},"107030-N3-9":{"quick":"志賀桿菌(Shigella)等腸道感染後可引發「反應性關節炎」(脊椎關節病的一種)。","detail":{"background":"反應性關節炎(reactive arthritis,屬血清陰性脊椎關節病)是在「腸道或泌尿道感染後1~4週」出現的無菌性關節炎,常見誘發病原為腸道的志賀桿菌(Shigella)、沙門氏菌(Salmonella)、耶辛尼氏菌(Yersinia)、曲狀桿菌(Campylobacter)及泌尿道的披衣菌(Chlamydia),與HLA-B27相關,可合併結膜炎與尿道炎(Reiter三聯徵)。本題引起「急性感染性腹瀉後關節炎」的微生物是Shigella。C. difficile以偽膜性結腸炎為主、E. coli與輪狀病毒(Rotavirus)雖致腹瀉但非典型反應性關節炎誘因(本題選Shigella為最佳)。","options":{"A":"C. difficile以偽膜性結腸炎為主,非典型反應性關節炎誘因。","B":"E. coli致腹瀉但非本題反應性關節炎的典型病原。","C":"輪狀病毒(Rotavirus)致病毒性腸炎,非典型反應性關節炎誘因。","D":"正解。志賀桿菌(Shigella)腸炎後可引發反應性關節炎。"},"sources":["新文京《內外科護理學》肌肉骨骼","華杏《內外科護理學》","Kelley & Firestein Rheumatology"]}},"112030-N3-18":{"quick":"類風濕性關節炎「急性發炎期」應休息、勿做等張運動,以免加重關節破壞。","detail":{"background":"不同關節炎照護:RA急性發炎期應「休息、固定」並冷敷,「不可」做負荷大的等張(抗阻)運動,待緩解期再以主動關節活動度與低衝擊運動維持功能;痛風應戒酒(尤其啤酒)、限高普林;退化性(骨性)關節炎應維持理想體重以減輕負重關節壓力、適度運動強化肌力。本題問何者錯誤,A「類風濕性關節炎,急性期採等張運動」錯誤——急性期應休息而非等張運動。其餘B(痛風不可飲酒)、D(退化性關節炎維持理想體重)正確;C所述俯臥姿勢屬維持伸展之輔助,非本題挑出之錯誤項。","options":{"A":"正解(錯誤敘述)。RA急性期應休息,不可採等張運動。","B":"痛風病人應教導不可飲酒,正確。","C":"維持伸展姿勢為輔助措施,非本題挑出的錯誤項。","D":"退化性關節炎應維持理想體重以減輕負重,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼","華杏《內外科護理學》","Kelley & Firestein Rheumatology"]}},"113030-N3-12":{"quick":"骨性關節炎典型是「活動後加劇、休息後緩解」的退化性局部關節病變。","detail":{"background":"骨性(退化性)關節炎(OA)是軟骨退化磨損的「局部、非炎症性」關節病變,好發負重關節(膝、髖)與手部遠端指間關節(Heberden結節),典型疼痛「活動/負重後加劇、休息後緩解」,晨僵短(<30分鐘)。RA則是「全身性、對稱性、炎症性自體免疫」病變,好發手腕掌指等小關節、晨僵>1小時、活動後改善。本題A正確(OA活動後加劇、休息緩解);B錯(RA晨僵在早晨/休息後,非「不活動後又出現」的描述);C錯(全身性炎症是RA非OA);D錯(最先侵犯周邊小關節的是RA,OA好發負重關節與遠端指間)。","options":{"A":"正解。骨性關節炎活動後加劇、休息後緩減。","B":"RA晨僵在早晨/休息後出現,敘述不當。","C":"慢性全身性炎症性關節病變是RA,非骨性關節炎。","D":"最先侵犯周邊小關節的是RA,非骨性關節炎。"},"sources":["新文京《內外科護理學》肌肉骨骼","華杏《內外科護理學》","Kelley & Firestein Rheumatology"]}},"115030-N3-12":{"quick":"痛風好發於男性,典型急性發作於四肢遠端關節(第一蹠趾關節)。","detail":{"background":"各關節炎比較:RA是自體免疫炎症,與「老化無關」;退化性(骨性)關節炎是軟骨退化磨損,「非嘌呤代謝異常」(嘌呤代謝異常的是痛風);痛風是高尿酸結晶,好發「男性」、急性發作於「四肢遠端關節(大腳趾)」;退化性關節炎好發中老年、負重大關節(膝髖)與手部遠端指間關節。本題C「痛風性關節炎好發於男性四肢遠端關節」正確。A錯(RA與老化無關)、B錯(退化性非嘌呤代謝異常,那是痛風)、D錯(退化性好發負重關節,且不限55歲以上女性周邊小關節的單一描述)。","options":{"A":"RA是自體免疫疾病,與老化無關。","B":"嘌呤代謝異常的是痛風,非退化性關節炎。","C":"正解。痛風好發男性、急性發作於四肢遠端關節。","D":"退化性關節炎好發負重關節,此描述不夠正確。"},"sources":["新文京《內外科護理學》肌肉骨骼","華杏《內外科護理學》","Kelley & Firestein Rheumatology"]}},"111030-N3-51":{"quick":"硬皮症常見「雷諾氏症候群」,好發女性、面部表情缺失(面具臉)。","detail":{"background":"硬皮症(進行性系統性硬化症)為自體免疫結締組織病，特徵為皮膚與內臟纖維化變硬；可見雷諾氏現象、皮膚緊繃、吞嚥困難、肺纖維化、腎危象；好發女性，抗Scl-70與抗著絲點抗體陽性。","options":{"A":"硬皮症好發女性,非男性。","B":"正解。硬皮症常發生雷諾氏症候群。","C":"γ球蛋白增加非主要為IgA,敘述錯誤。","D":"皮膚硬化致面部表情缺失(面具臉),非表情豐富。"},"sources":["新文京《內外科護理學》免疫/結締組織","華杏《內外科護理學》","Kelley & Firestein Rheumatology"]}},"113030-N3-30":{"quick":"硬皮症主要侵犯食道、肺、腎、皮膚,「肝衰竭」非其典型後續發展。","detail":{"background":"硬皮症臨床：雷諾氏現象常為早期表現、手指皮膚緊繃增厚(硬指)、面具臉與張口受限、食道蠕動下降致吞嚥困難與逆流、肺纖維化與肺高壓、腎危象；若敘述皮膚變薄鬆弛等與纖維化相反即為錯誤。","options":{"A":"食道侵犯致上腹飽脹、胸骨後灼痛,正確。","B":"雷諾氏現象為常見表現,正確。","C":"面部表情缺失(面具臉),正確。","D":"正解(錯誤敘述)。硬皮症不以肝衰竭為典型後續發展。"},"sources":["新文京《內外科護理學》免疫/結締組織","華杏《內外科護理學》","Kelley & Firestein Rheumatology"]}},"113100-N3-32":{"quick":"硬皮症有食道逆流,餐後應避免立即平躺(宜抬高床頭),故「餐後立即臥床」為錯誤指導。","detail":{"background":"硬皮症護理：保暖避寒與戒菸以減少雷諾氏發作、皮膚保濕與保護避免破損、少量多餐並抬高床頭減逆流、關節活動維持功能、監測血壓與腎功能(腎危象)；錯誤指導如鼓勵接觸冷水或忽略血壓即為答案。","options":{"A":"多穿衣、戴手套襪子保暖避免冷空氣(防雷諾),正確。","B":"每1~2小時深呼吸加強肺擴張(防肺纖維化影響),正確。","C":"正解(錯誤敘述)。硬皮症易逆流,餐後應避免立即平躺,宜抬高床頭。","D":"攝取高纖維食物以防便秘,正確。"},"sources":["新文京《內外科護理學》免疫/結締組織","華杏《內外科護理學》","Kelley & Firestein Rheumatology"]}},"101030-N3-67":{"quick":"HIV經血液傳染,故協助處理擦傷或刀傷(接觸血液)時須注意防護預防感染。","detail":{"background":"HIV傳染途徑僅性接觸、血液與母嬰垂直；日常同住的握手、擁抱、共餐、共用馬桶不會傳染。須注意者為可能接觸「血液或體液」之情況，如處理傷口、共用刮鬍刀或牙刷時應戴手套、避免血液接觸傷口。","options":{"A":"清洗內衣褲不會傳染HIV,不需特別防護。","B":"共用馬桶或澡盆不會傳染HIV。","C":"蚊蟲叮咬不會傳染HIV。","D":"正解。處理擦傷刀傷會接觸血液,須注意預防感染。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"101110-N3-35":{"quick":"HIV可經母乳傳染,哺餵母乳是母嬰垂直傳染途徑之一。","detail":{"background":"HIV母嬰垂直傳染可發生於懷孕(經胎盤)、生產(產道血液體液)與「哺餵母乳」(母乳含病毒)；感染HIV的母親應以配方奶取代母乳、孕期接受抗病毒治療並評估剖腹產以降低垂直感染率。","options":{"A":"共用餐具不會傳染HIV。","B":"共同淋浴不會傳染HIV。","C":"正解。HIV可經母乳傳染給嬰兒。","D":"抱著入睡共眠不會傳染HIV。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"101110-N3-38":{"quick":"HIV不經游泳傳染,「設置愛滋專用游泳池」是錯誤的歧視性且無意義措施。","detail":{"background":"預防HIV：安全性行為與使用保險套、不共用針具、輸血與器官篩檢、母嬰垂直傳染阻斷(孕婦抗病毒治療、剖腹產、停母乳)、針扎後預防性投藥；錯誤策略常為誤信日常接觸傳染或忽略體液防護。","options":{"A":"減少性伴侶可降低性傳染風險,正確。","B":"不與他人共用針頭可防血液傳染,正確。","C":"性交全程使用保險套可預防性傳染,正確。","D":"正解(錯誤)。游泳不傳染HIV,設專用泳池無意義且歧視。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"102030-N3-47":{"quick":"新生兒預防性抗病毒投藥應出生後盡速開始並持續約「6星期」,故「4星期」為錯誤。","detail":{"background":"阻斷HIV母子垂直傳染：孕期規律抗反轉錄病毒治療降低病毒量、評估剖腹產、新生兒預防性投藥、「以配方奶取代母乳」；錯誤措施如鼓勵哺餵母乳或停止抗病毒治療即為答案。","options":{"A":"孕期給予抗病毒藥物降低母體病毒量,正確。","B":"(高病毒量者)剖腹產可降低垂直感染,正確。","C":"正解(錯誤)。新生兒預防性投藥應持續約6星期,非4星期。","D":"以配方奶/牛奶取代母乳,避免母乳傳染,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"102030-N3-48":{"quick":"預防伺機性感染應從「確定感染HIV時」即開始,愈早愈好。","detail":{"background":"為避免AIDS病人發生伺機性感染，預防工作應「從感染早期(CD4尚高、無症狀期)即開始」——監測CD4、依數值給預防性投藥(如PCP預防)、接種疫苗與衛教，而非等到出現伺機感染才介入。","options":{"A":"正解。確定感染HIV時即應開始預防伺機性感染。","B":"等到全身性淋巴病變才開始已嫌晚。","C":"等到愛滋複合病症出現太遲。","D":"等到CD4<200才開始,免疫已嚴重受損。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"102030-N3-50":{"quick":"didanosine(DDI)會造成肝功能障礙、胰臟炎及尿酸增加。","detail":{"background":"抗反轉錄病毒藥物部分具肝毒性與代謝副作用，其中蛋白酶抑制劑等可造成肝功能障礙、血脂異常與「尿酸/血糖上升」；用藥須監測肝功能、血脂、血糖與尿酸並注意藥物交互作用。","options":{"A":"AZT主要副作用為骨髓抑制(貧血),非尿酸增加。","B":"DDC主要為周邊神經病變。","C":"正解。DDI(didanosine)會致肝功能障礙與尿酸增加。","D":"3TC(lamivudine)耐受性佳,非本題答案。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"102110-N3-29":{"quick":"HIV腹瀉應補充適量水分與電解質,避免脫水。","detail":{"background":"HIV病人腹瀉常因伺機感染或藥物，護理：補充水分電解質防脫水、少量多餐、低渣低油易消化飲食、避免乳糖與刺激性食物、肛周皮膚護理、留意感染控制與血便/發燒等惡化徵象。","options":{"A":"不需立即上靜脈營養,優先口服補充水分電解質。","B":"腹瀉可能與病程惡化或伺機感染有關,不應輕忽。","C":"腹瀉時不宜高脂飲食,會加重腹瀉。","D":"正解。補充適量水分及電解質以防脫水。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"102110-N3-30":{"quick":"CD4(T4)細胞數目愈低、占比愈小,伺機性感染機率愈高,故100/mm³、6%最高。","detail":{"background":"HIV病程中CD4(T4)淋巴球愈低，伺機性感染風險愈高；當CD4「<200 cells/mm3」(或占淋巴球比率明顯下降)時，PCP等伺機感染與AIDS定義疾病的風險最高，須開始預防性投藥。","options":{"A":"1000/mm³、45%屬正常,風險最低。","B":"600/mm³、30%尚佳。","C":"300/mm³、17%風險中等。","D":"正解。100/mm³、6%最低,伺機性感染機率最高。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"102110-N3-51":{"quick":"HIV陽性孕婦不應「建議人工流產」;可透過預防措施降低垂直感染,由孕婦自主決定。","detail":{"background":"HIV孕婦護理：孕期持續抗病毒治療降病毒量、評估剖腹產、避免不必要的侵入性產前檢查、新生兒投藥、產後改配方奶；錯誤措施如停藥、鼓勵母乳哺餵或不必要的侵入性操作即為答案。","options":{"A":"建議配偶儘快接受HIV檢查,正確。","B":"正解(錯誤)。不應建議人工流產,應尊重孕婦自主。","C":"教導預防母子垂直感染的方法,正確。","D":"轉介生育諮詢,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"102110-N3-53":{"quick":"AIDS病人皮膚出現紅到紫黑色斑塊與「卡波西氏肉瘤」有關。","detail":{"background":"AIDS病人皮膚出現紅色至紫黑色斑塊與「卡波西氏肉瘤(Kaposi sarcoma)」有關——與人類疱疹病毒第8型(HHV-8)相關的血管腫瘤，是AIDS定義性疾病之一，好發於皮膚黏膜。","options":{"A":"念珠菌感染呈白色偽膜(鵝口瘡),非紫黑斑塊。","B":"巨細胞病毒網膜炎影響視力,非皮膚斑塊。","C":"正解。紅到紫黑色斑塊為卡波西氏肉瘤。","D":"淋巴腺腫脹是淋巴結腫大,非皮膚斑塊。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"103030-N3-51":{"quick":"沙雷氏菌(Serratia)非AIDS典型伺機性感染病原,故為錯誤敘述。","detail":{"background":"AIDS伺機性感染依CD4下降出現：肺囊蟲肺炎(PCP)、念珠菌食道炎、結核、巨細胞病毒、弓漿蟲腦炎、隱球菌腦膜炎、卡波西氏肉瘤等；其中PCP最常見；若敘述病原或好發CD4階段錯誤即為答案。","options":{"A":"肺囊蟲肺炎是AIDS最常見伺機感染,正確。","B":"正解(錯誤)。沙雷氏菌非AIDS典型伺機性感染病原。","C":"巨細胞病毒是AIDS常見伺機感染,正確。","D":"人類乳突病毒感染常見於AIDS,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"103100-N3-48":{"quick":"HIV不會經由擁抱、接吻(日常接觸)傳染,此衛教最不適宜。","detail":{"background":"HIV經性接觸、血液與母嬰傳染，日常接觸不傳染；護理指導應衛教安全性行為、不共用針具與牙刷刮鬍刀、傷口處理戴手套；「最不適宜」者常為過度隔離、誤信共餐握手會傳染等錯誤觀念。","options":{"A":"血液、精液中含大量病毒,正確。","B":"正解(最不適宜)。擁抱、接吻等日常接觸不會傳染HIV。","C":"不會透過眼淚或汗水傳染,正確。","D":"空窗期病人傳染力強,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"104100-N3-48":{"quick":"AIDS致死主因是嚴重伺機性感染(如肺囊蟲肺炎),非卡波西氏肉瘤。","detail":{"background":"HIV感染分急性期、無症狀潛伏期與AIDS期；AIDS期CD4<200、出現伺機感染與惡性腫瘤、體重減輕、慢性腹瀉與發燒；潛伏期可數年無症狀但仍具傳染力；若敘述病程或表徵錯誤即為答案。","options":{"A":"會發燒、出現夜間盜汗,正確。","B":"呼吸功能減退、持續乾咳(PCP),正確。","C":"腹瀉造成水及電解質不平衡,正確。","D":"正解(錯誤)。致死主因是伺機性感染,非卡波西氏肉瘤。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"105030-N3-50":{"quick":"AIDS腹瀉者不宜「高纖」飲食(會加重腹瀉),且免疫低下宜避免生食高纖,故B為錯誤。","detail":{"background":"HIV病人護理：規律服抗病毒藥維持病毒抑制、預防與監測伺機感染、營養支持、心理與隱私維護、安全性行為衛教、標準防護(體液防護)；錯誤指導如過度隔離、誤信日常接觸傳染或自行停藥即為答案。","options":{"A":"提高服藥遵從性是預防治療失敗的重要措施,正確。","B":"正解(錯誤)。AIDS易腹瀉,不宜高纖;應高熱量高蛋白低渣。","C":"儘量避免侵入性治療以減少感染,正確。","D":"刷牙後用漱口水減少念珠菌感染,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"106110-N3-46":{"quick":"HIV抗體「無中和保護力」,不能阻止HIV感染的發展,故A錯誤。","detail":{"background":"HIV病程：急性感染期(似感冒、病毒量高)→無症狀潛伏期(CD4緩降、仍具傳染力)→AIDS期(CD4<200、伺機感染與腫瘤)；病毒量與CD4呈反向變化；若敘述進展順序或指標方向錯誤即為答案。","options":{"A":"正解(錯誤)。HIV抗體無保護力,不能阻止病程發展。","B":"CD4<200/μL易發生伺機性感染,正確。","C":"首次感染2~4週約半數出現類流感症狀,正確。","D":"卡波西氏肉瘤是AIDS最常見的惡性腫瘤,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"106111-N3-47":{"quick":"AIDS病人最常見的伺機性感染是肺囊蟲肺炎(PCP)。","detail":{"background":"AIDS病人最常見的伺機性感染為「肺囊蟲肺炎(Pneumocystis jirovecii, PCP)」——多於CD4<200時發生，表現漸進性呼吸困難、乾咳、低血氧，須預防性投藥(如Bactrim)。","options":{"A":"正解。肺囊蟲肺炎(PCP)是AIDS最常見的伺機性感染。","B":"弓形蟲腦炎較少見於最常見之列。","C":"隱球菌症常見但非最常見。","D":"念珠菌口腔炎常見,但伺機性肺炎以PCP最具代表。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"107030-N3-47":{"quick":"針扎血液暴露傳染風險為 HBV>HCV>HIV,故「HBV>HIV>HCV」排序錯誤。","detail":{"background":"抽血針扎暴露於HIV/HBV/HCV皆陽性的病人血液後，應立即擠血、清水沖洗、通報並評估：HIV於數小時內(愈早愈好、24~72小時內)開始預防性抗病毒投藥，HBV依抗體狀況給疫苗/免疫球蛋白，HCV則追蹤。","options":{"A":"急性HIV空窗期約6~12週、可達12個月,正確。","B":"針扎後24小時內開始PEP可降HIV感染,正確。","C":"正解(錯誤)。正確風險為HBV>HCV>HIV。","D":"應定期檢驗並追蹤至一年,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"107110-N3-50":{"quick":"全面性(標準)防護是將「所有人」的血液體液視為具感染性,以預防未篩出的疾病。","detail":{"background":"HIV防治：安全性行為與保險套、不共用針具、暴露前/後預防性投藥、母嬰垂直阻斷、血品器官篩檢、定期篩檢與及早治療(病毒測不到即不具性傳染力)；日常接觸不會傳染。","options":{"A":"正解。全面性防護把所有人血液體液視為感染性。","B":"不可把捐血當篩檢,且有空窗期,錯誤。","C":"高病毒量孕婦仍建議剖腹產,非一律自然產。","D":"預防性藥物不能取代不共用針具等防護。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"108020-N3-47":{"quick":"血液污染環境應以「1:10」漂白水消毒,1:1000濃度不足,故C錯誤。","detail":{"background":"對HIV感染或狀況不明者一律採「標準防護(全面性防護)」——視所有血液體液為具感染性，接觸時戴手套、避免針扎、防護黏膜噴濺；錯誤敘述如僅對已知感染者防護或過度的接觸隔離即為答案。","options":{"A":"接觸血液或可能帶血的體液應戴手套,正確。","B":"母乳含病毒,感染婦女不應哺乳,正確。","C":"正解(錯誤)。血液污染應以1:10漂白水消毒,非1:1000。","D":"急救時避免口對口人工呼吸,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"108110-N3-49":{"quick":"HIV抗體陽性但CD4達650、占35%,免疫尚佳,屬無症狀「潛伏期」。","detail":{"background":"CD4(T4)650 cells/mm3、占淋巴球35%屬「無症狀潛伏期」——CD4仍接近正常(>500)、病人多無症狀但具傳染力；隨CD4逐漸下降至<200才進入AIDS期出現伺機感染。","options":{"A":"空窗期是抗體尚未產生,此題抗體已陽性,不符。","B":"正解。CD4正常、無症狀、抗體陽性,屬潛伏期。","C":"急性感染期為感染後2~4週類流感期,不符。","D":"伺機性感染期CD4多<200,此題CD4達650,不符。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"108110-N3-5":{"quick":"與HIV感染者共同生活但無性行為,不易感染HIV。","detail":{"background":"HIV同住衛教：日常握手、擁抱、共餐、共用馬桶不會傳染；應採血液體液防護(傷口戴手套、不共用牙刷刮鬍刀針具)、安全性行為、規律服藥與回診；不需與家人隔離餐具或過度防護。","options":{"A":"口交仍有風險,非安全性行為,錯誤。","B":"正解。共同生活無性行為不易感染HIV。","C":"免疫低下宜避免生食,且飲食方向描述不當。","D":"未經同意不可告知他人診斷,違反保密。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"109030-N3-47":{"quick":"愛滋病人肺囊蟲肺炎初期主要症狀為乾咳(伴漸進性呼吸困難)。","detail":{"background":"愛滋病人肺囊蟲肺炎(PCP)初期主要症狀為「漸進性呼吸困難、乾咳與發燒」，活動後喘且低血氧明顯，胸部X光可見雙側間質浸潤；常於CD4<200發生，需及早診斷與治療。","options":{"A":"體重下降是AIDS全身消耗,非PCP初期特異症狀。","B":"皮疹非PCP典型症狀。","C":"氣喘非PCP典型表現。","D":"正解。PCP初期主要症狀為乾咳。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"109110-N3-49":{"quick":"照護愛滋病人,衣物被分泌物污染應以漂白水浸泡後再清洗。","detail":{"background":"照護HIV病人採標準防護：接觸血液體液戴手套、避免針扎(針頭不回套、利器盒)、黏膜噴濺戴口罩護目鏡、手部衛生；HIV不經空氣或日常接觸傳染，不需負壓隔離；針扎後立即通報與評估預防投藥。","options":{"A":"針頭不可回套或硬拔,應整支投入利器盒。","B":"接觸糞便不需口服AZT,PEP用於血液/針扎暴露。","C":"正解。污染衣物以漂白水浸泡後再清洗。","D":"針扎後應追蹤至6個月~1年,3個月不足以排除。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"110030-N3-48":{"quick":"西方墨點試驗(Western blot)是HIV的確診檢驗法。","detail":{"background":"HIV檢驗：先以篩檢(ELISA/快篩抗體或抗原抗體合一)，陽性再以西方墨點法或核酸檢測確認；空窗期抗體可能未產生，須隔一段時間複檢；CD4與病毒量用於評估病程與治療反應。","options":{"A":"AIDS時CD4/CD8比值下降(<1),非大於1。","B":"CD4<200/μL才易伺機感染,非400。","C":"HIV有空窗期(抗體未產生),非沒有。","D":"正解。西方墨點試驗是HIV確診檢驗。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"110110-N3-48":{"quick":"與家人共同生活、無危險性行為「不易」傳染HIV,故A錯誤。","detail":{"background":"AIDS出院衛教：規律服抗病毒藥維持病毒抑制與CD4、預防伺機感染(避免生食、人多場所與感染源)、營養支持、安全性行為與不共用針具、定期回診監測；情緒支持與維護隱私。","options":{"A":"正解(錯誤)。共同生活無危險性行為不易傳染HIV。","B":"出現發燒、呼吸喘、咳嗽、腹瀉應儘速就醫,正確。","C":"食物煮熟、水煮沸以防腸道感染,正確。","D":"避免收留流浪動物、定期消毒環境,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"110110-N3-50":{"quick":"HIV不會經「飲食」傳染,故為錯誤的傳染途徑。","detail":{"background":"HIV傳染途徑為性接觸、血液(共用針具、輸血)與母嬰垂直(懷孕、生產、母乳)；不會經由空氣、飛沫、握手、擁抱、共餐、蚊蟲叮咬或共用馬桶傳染；若敘述上述日常接觸會傳染即為錯誤。","options":{"A":"垂直(母嬰)傳染是正確途徑。","B":"血液傳染是正確途徑。","C":"性行為傳染是正確途徑。","D":"正解(錯誤)。HIV不會經飲食傳染。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"111030-N3-48":{"quick":"AIDS病人免疫低下,不可接種MMR等「活性減毒疫苗」,故D錯誤。","detail":{"background":"AIDS由HIV攻擊CD4淋巴球致細胞免疫崩解，當CD4<200或出現伺機感染/特定腫瘤即為AIDS期；傳染途徑為性、血液、母嬰；潛伏期具傳染力；若敘述病程、傳染或診斷標準錯誤即為答案。","options":{"A":"不會經握手、擁抱、共餐、游泳、蚊蟲傳染,正確。","B":"有皮膚疾患或懷孕者不直接照護,正確。","C":"易伺機感染應避免人多擁擠場所,正確。","D":"正解(錯誤)。MMR是活疫苗,免疫低下者禁用。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"111110-N3-49":{"quick":"HIV病人免疫低下,應避免與剛接種(活)疫苗或受感染的家人接觸。","detail":{"background":"HIV病人護理指導：按時服抗病毒藥不可自行中斷、預防伺機感染與接種適當疫苗、均衡營養、安全性行為與血液體液防護、規律回診監測CD4與病毒量；日常生活可正常社交、不需與家人隔離。","options":{"A":"免疫低下應避免生食,不鼓勵多吃生菜。","B":"正解。避免接觸剛接種活疫苗或受感染的家人。","C":"zidovudine主要副作用是骨髓抑制,非末梢神經痛。","D":"握手、共餐、共浴不傳染,過度限制且歧視。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"112030-N3-50":{"quick":"AIDS伺機感染中肺囊蟲肺炎造成乾咳、用力咳,敘述正確。","detail":{"background":"AIDS伺機感染隨CD4下降而異：CD4<200易PCP與念珠菌食道炎、<100弓漿蟲與隱球菌、<50巨細胞病毒與非典型分枝桿菌；治療兼顧抗微生物與恢復免疫(抗病毒治療提升CD4)及預防性投藥。","options":{"A":"CD4<200/μL才容易發生伺機感染,非350。","B":"口腔念珠菌常見,但敘述非本題最佳正解。","C":"CMV治療用ganciclovir,非Zovirax(acyclovir)。","D":"正解。肺囊蟲肺炎造成乾咳、用力咳嗽。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"112110-N3-50":{"quick":"AIDS營養不足者不宜高纖飲食(易加重腹瀉),故D為錯誤。","detail":{"background":"AIDS病人營養不良護理：高熱量高蛋白少量多餐、處理口腔/食道念珠菌與吞嚥困難、控制腹瀉與噁心、補充營養品、監測體重；錯誤措施如限制蛋白質、忽略口腔病灶或腹瀉脫水即為答案。","options":{"A":"提供高熱量、高蛋白飲食補充營養,正確。","B":"口腔念珠菌感染用nystatin含漱,正確。","C":"檸檬水或小蘇打水漱口促進食慾,正確。","D":"正解(錯誤)。AIDS易腹瀉,不宜高纖,應採低渣飲食。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"112180-N3-31":{"quick":"被血液體液污染的物品應以漂白水處理,此防護措施正確。","detail":{"background":"照護AIDS病人採標準防護(視血液體液具感染性)：戴手套處理體液、針頭不回套用利器盒、黏膜噴濺戴護目口罩、手部衛生；HIV不經空氣傳染、不需負壓隔離；針扎立即通報評估預防投藥。","options":{"A":"防護重點為標準防護,非僅針對孕婦特別處理。","B":"針頭不可回套,以免刺傷。","C":"正解。血液體液污染物品以漂白水處理。","D":"非所有技術皆需口罩護目鏡,僅有噴濺風險時才需。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"113180-N3-14":{"quick":"AIDS時輔助T/毒殺T(CD4/CD8)比值「下降」,故「上升」為錯誤。","detail":{"background":"AIDS為HIV破壞CD4輔助T淋巴球致免疫崩解；傳染途徑限性、血液與母嬰；CD4<200或伺機感染為AIDS期；抗病毒治療可長期抑制病毒；若敘述傳染途徑、病程或治療目標錯誤即為答案。","options":{"A":"正解(錯誤)。AIDS時CD4/CD8比值下降,非上升。","B":"CD4<200/μL易出現伺機性感染,正確。","C":"最常見續發惡性腫瘤是卡波西氏肉瘤,正確。","D":"zidovudine(AZT)適用於預防母體垂直感染,正確。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"114030-N3-30":{"quick":"AIDS口腔病變以念珠菌(鵝口瘡)、毛狀白斑、卡波西肉瘤為主,「口腔紅斑症」非其典型表徵。","detail":{"background":"AIDS臨床：持續發燒、夜汗、體重減輕、慢性腹瀉、全身淋巴結腫大及各種伺機感染與腫瘤(PCP、念珠菌、卡波西氏肉瘤)；潛伏期可無症狀但具傳染力；若敘述表徵或病程錯誤即為答案。","options":{"A":"急性HIV感染可出現類流感症狀,正確。","B":"臨床潛伏期可持續10年或更長,正確。","C":"卡波西氏肉瘤是最常見惡性腫瘤,正確。","D":"正解(錯誤)。AIDS口腔病變以念珠菌/白斑/卡波西為主,非口腔紅斑症。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"114170-N3-30":{"quick":"共用餐具不會傳染HIV,故「共用餐具」最不屬於AIDS危險因子。","detail":{"background":"HIV感染危險因子：不安全性行為(多重性伴侶、無保護)、共用針具、輸入未篩檢血品、母嬰垂直傳染、針扎暴露；「最不適當」者為日常接觸(握手、共餐、蚊蟲叮咬)被誤列為危險因子。","options":{"A":"不安全性行為是HIV危險因子。","B":"注射藥癮者共用針頭是危險因子。","C":"接受輸血者列為風險(血液途徑)。","D":"正解(非危險因子)。共用餐具不會傳染HIV。"},"sources":["新文京《內外科護理學》免疫系統","華杏《內外科護理學》","疾管署 HIV/AIDS 防治指引"]}},"102030-N3-12":{"quick":"免疫抑制劑主要抑制的是「T淋巴球」媒介的細胞性排斥,非B淋巴球,故B錯誤。","detail":{"background":"器官移植排斥分超急性(數分鐘至小時、預存抗體)、急性(數天至數月、細胞媒介、可用免疫抑制劑逆轉)與慢性(數月至數年、漸進性功能衰退、難逆轉)；肝移植後須監測肝功能與排斥徵象；若敘述排斥分型或時程錯誤即為答案。","options":{"A":"移植肝會被免疫系統視為外來抗原,正確。","B":"正解(錯誤)。免疫抑制劑主抑制T淋巴球,非B淋巴球。","C":"cyclosporine與corticosteroids是常用免疫抑制劑,正確。","D":"可用肝活體切片與超音波偵測排斥,正確。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"102030-N3-60":{"quick":"器官移植接受免疫抑制劑者為細胞免疫缺損,是肺囊蟲肺炎的高危險群。","detail":{"background":"肺囊蟲肺炎(PCP)好發於細胞免疫低下者——AIDS(CD4<200)、器官移植或長期使用免疫抑制劑/類固醇、化療與惡性血液疾病病人；此類高危群常需預防性投藥(如Bactrim)。","options":{"A":"正解。器官移植服免疫抑制劑者細胞免疫缺損,為PCP高危群。","B":"單純80歲老人非PCP主要高危群。","C":"5歲以下幼童非PCP典型高危群。","D":"心臟衰竭非PCP高危因子。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"107110-N3-60":{"quick":"急性排斥以T細胞媒介、可加強免疫抑制劑治療逆轉,預後最佳。","detail":{"background":"腎移植排斥中「急性排斥」(數天至數月、由T細胞媒介)若及早診斷並加強免疫抑制治療多可逆轉、預後最佳；超急性排斥須立即移除移植腎、慢性排斥則漸進性失能難逆轉。","options":{"A":"慢性排斥漸進纖維化、難治療,預後差。","B":"正解。急性排斥可治療逆轉,預後最佳。","C":"超急性排斥須立即移除器官,預後最差。","D":"加速型排斥預後亦差。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"108020-N3-66":{"quick":"移植後免疫抑制劑須「終身」服用,腎功能穩定也不可自行停藥,故D錯誤。","detail":{"background":"Cyclosporine為移植後抗排斥免疫抑制劑，抑制T淋巴球；副作用含腎毒性、高血壓、牙齦增生、多毛、肝毒性與感染風險增加；須監測血中濃度與腎功能、避免與葡萄柚汁併用；不可自行停藥以免排斥。","options":{"A":"避免出入公共場所以防感染,正確。","B":"cyclosporine可能出現肝、腎毒性,正確。","C":"長期服用免疫抑制劑易致癌,正確。","D":"正解(錯誤)。免疫抑制劑須終身服用,不可自行停藥。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"111030-N3-49":{"quick":"移植後免疫抑制下應「避免日曬」(防皮膚癌與感染),不可鼓勵多曬太陽,故A錯誤。","detail":{"background":"器官移植後護理：終身規律服免疫抑制劑不可自行停藥、嚴格預防感染(避免人多場所與感染源、注意手部衛生)、監測排斥徵象(發燒、移植器官功能下降)、定期回診監測藥物濃度；錯誤指導如自行停藥或忽略感染預防即為答案。","options":{"A":"正解(錯誤)。移植後應避免日曬(防皮膚癌/感染),非多曬太陽。","B":"避免出入公共場所、外出戴口罩,正確。","C":"出現副作用不可自行停藥,回診由醫師調整,正確。","D":"需暫時避孕,準備懷孕先與醫師討論,正確。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"111110-N3-42":{"quick":"血小板>150,000/mm³屬正常,並非造血幹細胞移植的禁忌症。","detail":{"background":"造血幹細胞移植禁忌多與病人無法耐受治療相關(如嚴重器官功能不全、無法控制的感染、體能極差)；「不是禁忌症」者通常為可矯正或本即需移植治療的情況(如疾病本身為移植適應症)。","options":{"A":"正解。血小板>15萬屬正常,非禁忌症。","B":"有肺栓塞/深部靜脈栓塞病史屬禁忌/須謹慎。","C":"懷孕或哺乳婦女屬禁忌。","D":"自體免疫疾病者須評估,屬禁忌/謹慎。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"112030-N3-48":{"quick":"梅毒血清檢查屬「感染篩檢」,非降低排斥的「組織配對」項目,故不包含。","detail":{"background":"器官移植前組織配對以降低排斥，項目包括ABO血型相容、人類白血球抗原(HLA)配對、交叉試驗(crossmatch)、混合淋巴球反應；「不包含」者通常為與配對無關的檢驗(如腫瘤標記)。","options":{"A":"ABO及Rh血型是組織配對項目,需檢查。","B":"人類白血球抗原(HLA)是核心配對項目。","C":"交叉配對試驗(crossmatch)是組織配對項目。","D":"正解(不包含)。梅毒血清檢查屬感染篩檢,非組織配對。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"112180-N3-32":{"quick":"移植後免疫抑制下應避免日曬(防皮膚癌),不可鼓勵多曬太陽,故A錯誤。","detail":{"background":"移植後護理：終身服免疫抑制劑、預防感染、自我監測排斥與感染徵象、避免活疫苗與生食、防曬(免疫抑制增皮膚癌風險)、規律回診；錯誤指導如停藥、接種活疫苗或忽略感染徵象即為答案。","options":{"A":"正解(錯誤)。移植後應避免日曬(防皮膚癌),非多曬太陽。","B":"避免出入公共場所、外出戴口罩,正確。","C":"出現藥物副作用不可自行停藥,正確。","D":"需暫時避孕、準備懷孕先與醫師討論用藥,相對正確。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"114030-N3-31":{"quick":"移植前組織配對常見檢驗為HLA、混合淋巴細胞反應、交叉配對(234);C/HIV肝炎屬感染篩檢。","detail":{"background":"移植前為降低排斥常做：人類白血球抗原(HLA)配對、混合淋巴球反應、ABO血型與交叉試驗；C型肝炎檢驗屬感染篩檢、非組織配對項目；故正確組合不含C肝檢驗。","options":{"A":"123含1(C肝為感染篩檢非組織配對)。","B":"145含1、5(皆感染篩檢)。","C":"正解。HLA(2)、混合淋巴細胞反應(3)、交叉配對(4)為組織配對。","D":"345含5(HIV為感染篩檢)。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"114170-N3-25":{"quick":"急性排斥由T淋巴球與巨噬細胞活性增加(細胞性免疫)媒介。","detail":{"background":"急性排斥多發生於移植後數天至數月，由T細胞媒介，表現發燒、移植器官腫痛與功能下降(如腎移植尿量減少、肌酸酐上升)；及早以加強免疫抑制治療多可逆轉，是最常見且可處理的排斥型態。","options":{"A":"12~24小時內屬超急性/加速型,非急性典型時間。","B":"正解。急性排斥由T淋巴球與巨噬細胞活性增加媒介。","C":"手術中恢復血循前發生的是超急性排斥(既存抗體)。","D":"急性排斥可治療逆轉,非須立刻移除器官。"},"sources":["新文京《內外科護理學》免疫/移植","華杏《內外科護理學》","移植免疫學"]}},"115030-N3-30":{"quick":"本題為送分題(各答案均給分)。RA藥物核心:DMARDs(如methotrexate)才能延緩疾病進程與防關節破壞;選擇性COX-2腸胃道副作用較少;奎寧類主要副作用為視網膜病變。","detail":{"background":"本題經考選部公告「一律給分(送分)」。就藥理而言:A「Aspirin能改變疾病過程或防止關節破壞」嚴格說有誤——能「改變疾病病程、延緩關節破壞」的是疾病調節抗風濕藥(DMARDs,如methotrexate),aspirin/NSAID僅緩解症狀;B「選擇性COX-2抑制劑適用於有腸胃道潰瘍病史的高危病人」相對正確——COX-2抑制劑較不抑制COX-1胃黏膜保護,腸胃道出血風險較低,適合腸胃高危者(但仍須留意心血管風險);C「DMARDs為第一線用藥」在現代風濕治療觀念中,早期使用DMARDs確為趨勢(舊教材以NSAID為症狀第一線),敘述見解分歧;D「奎寧類主要副作用在聽力損傷」錯誤——應為「視網膜病變(視力)」。因選項對錯認定有爭議,故本題送分。重點記憶:DMARDs延緩破壞、COX-2腸胃較安全、奎寧類傷眼睛。","options":{"A":"aspirin僅緩解症狀,能延緩關節破壞的是DMARDs(此選項嚴格說有誤)。","B":"COX-2抑制劑腸胃道風險較低,適合腸胃潰瘍高危者(相對正確)。","C":"DMARDs現代觀念為早期使用,舊教材以NSAID為症狀第一線(見解分歧)。","D":"奎寧類主要副作用為視網膜病變(視力),非聽力損傷。"},"sources":["新文京《內外科護理學》肌肉骨骼/免疫","華杏《內外科護理學》","ACR/EULAR RA 治療準則"]}}},TO=["R1免疫學基礎與後天免疫", "R2過敏反應與過敏性疾病", "R3全身性紅斑性狼瘡SLE", "R4類風濕性關節炎RA", "R5痛風與晶體性關節炎", "R6退化性關節炎與其他關節炎", "R7硬皮症與結締組織病", "R8愛滋病HIV感染", "R9器官移植與免疫抑制"],LEC={"R1免疫學基礎與後天免疫":{"title":"R1 免疫學基礎與後天免疫 複習講義","html":"\n<h3>一、非特異性 vs 特異性免疫</h3>\n<p><b>非特異性(先天)免疫</b>:對所有病原一視同仁、無記憶。包括物理屏障(皮膚、黏膜、纖毛)、化學屏障(<b>胃酸、消化酶、溶菌酶、陰道乳酸桿菌酸性</b>)、補體、干擾素、吞噬細胞、自然殺手細胞。<b>特異性(後天/適應性)免疫</b>:由「淋巴球」主導,能辨識特定抗原、具記憶(再次接觸更快更強),是疫苗保護力基礎。考點:胃酸、消化酶屬<b>非特異</b>性化學屏障(常被誤考成特異性)。</p>\n<h3>二、體液性 vs 細胞性免疫</h3>\n<p><b>體液性免疫</b>:B淋巴球→漿細胞→產生抗體,對抗細胞外病原與毒素。<b>細胞性免疫</b>:T淋巴球主導,對抗細胞內病原(病毒、結核、黴菌)、移植排斥、遲發型過敏;T細胞須透過<b>主要組織相容複合體(MHC)</b>呈現抗原才能辨識,形成反應較慢(遲發)。CD4=輔助T(含CD4最多、HIV標的、辨識MHC-II);CD8=毒殺T(辨識MHC-I)。</p>\n<h3>三、主動 vs 被動後天免疫(高頻)</h3>\n<p><b>主動</b>=人體「自己製造」抗體:自然主動(得過病)、人工主動(<b>接種疫苗/類毒素</b>)→慢但持久有記憶。<b>被動</b>=「接受現成抗體」:自然被動(母體胎盤傳IgG、母乳傳IgA)、人工被動(<b>注射免疫球蛋白/抗血清</b>)→立即見效但短暫無記憶。</p>\n<h3>四、五類免疫球蛋白(必背)</h3>\n<p><b>IgG</b>:含量最多、<b>唯一能通過胎盤</b>、次級免疫主力。<b>IgA</b>:黏膜分泌液與母乳,防呼吸道腸胃道感染。<b>IgM</b>:分子最大、<b>初次免疫最先出現</b>、急性感染指標。<b>IgD</b>:在B細胞表面,與<b>B細胞分化</b>有關。<b>IgE</b>:含量最少、附著肥大細胞、媒介<b>第I型過敏</b>與抗寄生蟲。</p>\n<h3>五、自體免疫與檢驗</h3>\n<p>自體免疫=喪失對自我抗原的耐受。常見:SLE、RA、僵直性脊椎炎、橋本氏甲狀腺炎、第一型糖尿病、重症肌無力。<b>猩紅熱</b>是鏈球菌「感染症」(非自體免疫)。自體免疫血清篩檢首推<b>抗核抗體(ANA)</b>;ESR、CRP僅為非特異發炎指標。干擾素為抗病毒/調節免疫細胞激素,副作用為類流感症狀。</p>\n"},"R2過敏反應與過敏性疾病":{"title":"R2 過敏反應與過敏性疾病 複習講義","html":"\n<h3>一、四型過敏反應(Gell-Coombs,最高頻)</h3>\n<p><b>第I型 立即性(IgE)</b>:肥大細胞/嗜鹼性球脫顆粒釋放組織胺、白三烯素。例:過敏性休克、氣喘、過敏性鼻炎、枯草熱、異位性皮膚炎、蕁麻疹、塵蟎/食物/藥物過敏。<br>\n<b>第II型 細胞毒性/溶解(IgG或IgM+補體)</b>:例:ABO/Rh輸血溶血、新生兒溶血、自體免疫溶血、Graves氏病。<br>\n<b>第III型 免疫複合體</b>:抗原-抗體複合體沉積活化補體。例:<b>SLE、類風濕性關節炎、血清病、鏈球菌後腎絲球腎炎</b>。<br>\n<b>第IV型 遲發型(T細胞、無抗體,24~72hr)</b>:例:結核菌素試驗、接觸性皮膚炎、<b>器官移植排斥</b>。</p>\n<h3>二、過敏性休克(anaphylaxis)</h3>\n<p>最嚴重第I型:全身血管擴張→低血壓;<b>支氣管「收縮/痙攣」</b>→呼吸困難(非擴張!)。誘因:藥物(盤尼西林最典型)、食物、蜂螫、顯影劑。<b>處置首選立即肌肉注射 epinephrine(腎上腺素)</b>,加抗組織胺、類固醇、維持呼吸道與血壓。</p>\n<h3>三、實驗室與檢查</h3>\n<p>過敏時:<b>血清IgE上升、嗜伊紅球(嗜酸性球)上升</b>;免疫複合體型補體C3/C4下降。找過敏原:<b>點刺/刮畫試驗(scratch/prick,測第I型)、皮內試驗、貼布試驗(測第IV型接觸過敏)</b>;<b>伍氏燈(Wood's light)不是過敏試驗</b>(查黴菌/色素)。做皮膚試驗前<b>停抗組織胺至少48小時</b>防偽陰性。</p>\n<h3>四、減敏(免疫)療法與環境控制</h3>\n<p>減敏療法=逐步注射「微量過敏原」誘導耐受、產生IgG阻斷抗體、<b>降低IgE</b>(注射的是過敏原而非IgE)。環境:避免過敏原與刺激物(二手菸、刺鼻清潔劑)、防蟎寢具熱水洗、<b>避免地毯/絨毛玩具/填充家具/草蓆榻榻米/羽絨被</b>、控制濕度、避免養有毛寵物。</p>\n<h3>五、輸血反應</h3>\n<p>過敏反應(皮膚癢、蕁麻疹、哮喘,第I型);發熱性非溶血(熱原反應);溶血反應(血型不合,第II型,發燒腰痛血紅素尿);細菌污染(高燒敗血)。<b>任何輸血反應一律「立即停止輸血」</b>、改打生理食鹽水、監測生命徵象,不可暫停後續打同袋血。</p>\n"},"R3全身性紅斑性狼瘡SLE":{"title":"R3 全身性紅斑性狼瘡(SLE) 複習講義","html":"\n<h3>一、本質與致病機轉</h3>\n<p>SLE是慢性、全身性<b>自體免疫</b>疾病,屬<b>第III型免疫複合體</b>過敏:產生對抗自身抗原的自體抗體,免疫複合體沉積多器官活化補體致發炎。好發<b>育齡期年輕女性</b>(女:男約9:1),與遺傳(HLA僅增易感性)、雌激素、紫外線、感染、藥物有關。</p>\n<h3>二、臨床表徵(多系統)</h3>\n<p>臉頰<b>蝴蝶斑(顴部)</b>、<b>光敏感</b>、口腔潰瘍、對稱性關節炎、<b>漿膜炎(心包炎、肋膜炎)</b>、<b>狼瘡腎炎(蛋白尿、血尿)</b>、神經精神症狀(癲癇、精神病、認知障礙)、血液學異常(<b>白血球↓、淋巴球↓、血小板↓、溶血性貧血</b>)。心臟病變以「心包炎」最常見、肺以「肋膜炎」最常見(非心肌梗塞、非肺炎)。</p>\n<h3>三、檢驗</h3>\n<p><b>ANA陽性(高敏感、篩檢)</b>、抗dsDNA與抗Sm(高專一、與活性相關)、<b>補體C3/C4下降</b>(消耗)、<b>ESR上升</b>、免疫球蛋白(γ球蛋白)升高。注意:白血球、血小板、補體是「下降」,ESR是「上升」。</p>\n<h3>四、藥物治療</h3>\n<p>無法根治,以降低發炎與器官損傷為目標:NSAID、<b>抗瘧藥(hydroxychloroquine/奎寧,治療基石,須定期查眼睛/視網膜——主要毒性是「視力」非聽力)</b>、類固醇(急性惡化)、免疫抑制劑(狼瘡腎炎)。<b>血管新生抑制劑不用於SLE</b>。類固醇須逐漸減量、不可驟停。</p>\n<h3>五、護理重點</h3>\n<p><b>嚴格防曬</b>(長袖、寬邊帽、太陽眼鏡)、預防感染、<b>低鈉飲食</b>(類固醇與腎炎時)、<b>狼瘡腎炎採「低蛋白」、出現血尿蛋白尿應「休息」</b>、<b>避免含雌激素口服避孕藥</b>(用保險套)、病情穩定控制良好(≥6個月)後再計畫懷孕。SLE是內科藥物控制疾病,非外科手術治癒。</p>\n"},"R4類風濕性關節炎RA":{"title":"R4 類風濕性關節炎(RA) 複習講義","html":"\n<h3>一、本質</h3>\n<p>RA是慢性、全身性<b>自體免疫</b>疾病(第III型),自體抗體(類風濕因子RF、抗CCP)攻擊<b>滑膜</b>→滑膜增生(血管翳pannus)→軟骨與骨破壞。好發<b>30~50歲女性(女:男約3:1)</b>,冬季症狀較重,任何年齡皆可(含老人)。</p>\n<h3>二、臨床表徵</h3>\n<p><b>對稱性、多關節</b>,好發<b>手腕、掌指(MCP)、近端指間(PIP)等小關節</b>;<b>晨間僵硬>1小時、休息後僵硬、活動後改善</b>;晚期<b>尺側偏斜、天鵝頸/鈕扣指變形</b>;關節外:皮下類風濕結節(前臂伸側、尺側、鷹嘴突)、腕隧道症候群、疲倦厭食等全身症狀。X光見關節腔變窄、骨侵蝕。</p>\n<h3>三、與骨性關節炎(OA)鑑別</h3>\n<p>RA=自體免疫、全身炎症、對稱小關節、晨僵>1hr、活動後改善、女多、與老化無關。<br>OA=軟骨退化、局部非炎症、負重關節(膝髖)與遠端指間Heberden結節、<b>活動後加劇休息後緩解</b>、晨僵<30分鐘。</p>\n<h3>四、藥物治療</h3>\n<p><b>NSAID/COX-2</b>緩解症狀(COX-2不抑制血小板、不延長出血、腸胃較安全但心血管風險);<b>DMARDs(methotrexate等)延緩關節破壞,育齡婦女須避孕(致畸)</b>;類固醇;生物製劑(<b>抗TNF,1~2週改善紅腫熱痛</b>)。奎寧類須查眼睛。<b>關節感染時不可關節內注射類固醇</b>(應引流+抗生素)。利尿劑非RA用藥。</p>\n<h3>五、復健與護理</h3>\n<p>急性發炎期<b>休息、冷敷、勿做等張(抗阻)運動、勿按摩</b>;緩解期以<b>主動關節活動</b>維持功能、<b>溫水池</b>運動、可做園藝編織等手功能活動,避免長期臥床。活動與休息平衡防關節過度負荷。</p>\n"},"R5痛風與晶體性關節炎":{"title":"R5 痛風與晶體性關節炎 複習講義","html":"\n<h3>一、病生理</h3>\n<p>痛風是<b>普林(嘌呤)代謝異常</b>→高尿酸血症→尿酸鈉結晶沉積關節引起急性發炎。好發<b>中年男性</b>與停經後女性。典型急性發作於<b>第一蹠趾關節(大腳趾)</b>、夜間紅腫熱痛。痛風石(tophi)可沉積耳廓、關節周圍(與骨性關節炎的Heberden結節不同)。</p>\n<h3>二、診斷</h3>\n<p>最確定=<b>關節液抽吸見針狀尿酸鈉結晶</b>;血清尿酸可參考(急性發作時可能正常)。</p>\n<h3>三、藥物</h3>\n<p><b>急性期</b>:NSAID、<b>秋水仙素(colchicine,主要副作用腹瀉,嚴重腹瀉應停藥)</b>、類固醇。<b>降尿酸藥用於發作間期(急性期不新增)</b>:<b>allopurinol</b>抑制尿酸生成、<b>probenecid</b>促進尿酸排出(須多喝水、鹼化尿液防結石)。<b>避免aspirin/低劑量水楊酸與利尿劑</b>(使尿酸滯留)。</p>\n<h3>四、急性期護理與飲食</h3>\n<p>患部<b>休息、抬高、冰敷、用護架避免被褥壓迫</b>;急性期勿做全關節運動。飲食:<b>多喝水</b>、<b>限制高普林(內臟、海鮮、肉湯)與酒精(尤其啤酒)</b>、避免高脂、避免aspirin。</p>\n<h3>五、反應性關節炎(脊椎關節病)</h3>\n<p>腸道/泌尿道感染後1~4週的無菌性關節炎,與HLA-B27相關。腸道誘因:<b>志賀桿菌(Shigella)</b>、沙門氏菌、耶辛尼氏菌、曲狀桿菌;泌尿道:披衣菌。可合併結膜炎+尿道炎(Reiter三聯徵)。</p>\n"},"R6退化性關節炎與其他關節炎":{"title":"R6 退化性關節炎與其他關節炎 複習講義","html":"\n<h3>一、骨性(退化性)關節炎 OA</h3>\n<p>軟骨退化磨損的<b>局部、非炎症性</b>關節病變,好發<b>負重關節(膝、髖)與手部遠端指間關節(Heberden結節)、近端指間(Bouchard結節)</b>。典型疼痛<b>「活動/負重後加劇、休息後緩解」</b>,晨僵短(<30分鐘)。處置:<b>維持理想體重</b>減負重、適度運動強化肌力、止痛(acetaminophen/NSAID)、輔具。</p>\n<h3>二、三種關節炎快速鑑別</h3>\n<p><b>RA</b>:自體免疫炎症、對稱小關節、晨僵>1hr、活動後改善、女多、與老化無關。<br>\n<b>OA(退化性)</b>:退化磨損、負重關節與遠端指間、活動後加劇休息緩解、年長。<br>\n<b>痛風</b>:嘌呤代謝異常、男性、急性發作於四肢遠端(大腳趾)、尿酸結晶。</p>\n<h3>三、各關節炎照護要點</h3>\n<p>RA急性期休息勿等張運動;痛風戒酒限高普林;OA控制體重。記住「嘌呤代謝異常」是痛風(非OA);「與老化有關」是OA(非RA)。</p>\n"},"R7硬皮症與結締組織病":{"title":"R7 硬皮症與結締組織病 複習講義","html":"\n<h3>一、硬皮症(鞏皮症/進行性系統性硬化症)</h3>\n<p>慢性自體免疫結締組織病,以<b>皮膚與內臟纖維化、血管病變</b>為特徵,好發<b>女性</b>。</p>\n<h3>二、臨床表徵</h3>\n<p><b>雷諾氏現象</b>(遇冷手指變白→紫→紅,常為最早表現)、皮膚緊繃增厚使<b>面部表情缺失(面具臉)、張口受限</b>、手指硬化潰瘍;內臟:<b>食道蠕動下降(吞嚥困難、逆流、上腹飽脹胸骨後灼痛)</b>、肺纖維化與肺動脈高壓、腎危象(高血壓)。<b>不以肝衰竭為典型併發症</b>。</p>\n<h3>三、護理重點</h3>\n<p><b>保暖防雷諾</b>(戴手套襪子、避冷空氣)、<b>加強肺擴張</b>(每1~2小時深呼吸)、<b>防胃食道逆流</b>(少量多餐、抬高床頭、<b>餐後勿立即平躺</b>)、高纖防便秘、皮膚保濕。</p>\n"},"R8愛滋病HIV感染":{"title":"R8 愛滋病(HIV/AIDS) 複習講義","html":"\n<h3>一、病毒與傳染途徑(必背)</h3>\n<p>HIV攻擊<b>CD4輔助T淋巴球</b>→免疫崩解。傳染途徑只有三種:<b>性接觸、血液(共用針頭/輸血)、母嬰垂直(懷孕、生產、母乳)</b>。<b>不會</b>經握手、擁抱、(社交)接吻、共餐、共用餐具/馬桶/游泳池、蚊蟲、汗水淚水傳染。</p>\n<h3>二、病程分期</h3>\n<p>急性感染期(2~4週,約半數類流感)→<b>空窗期(抗體未產生、傳染力強)</b>→無症狀潛伏期(可達10年,CD4仍正常)→<b>愛滋病期(CD4<200/μL易伺機感染與惡性腫瘤)</b>。<b>CD4/CD8(輔助T/毒殺T)比值下降(<1)</b>。診斷:篩檢ELISA/快篩,<b>確診西方墨點法(Western blot)</b>。</p>\n<h3>三、伺機性感染與腫瘤</h3>\n<p>最常見伺機感染=<b>肺囊蟲肺炎(PCP,乾咳、漸進呼吸困難、低血氧)</b>,其他念珠菌、CMV、弓形蟲、隱球菌、結核。最常見惡性腫瘤=<b>卡波西氏肉瘤(紅到紫黑斑塊)</b>。口腔病變:念珠菌(白色鵝口瘡)、毛狀白斑。<b>致死主因是伺機性感染</b>(非卡波西)。</p>\n<h3>四、防護與護理</h3>\n<p><b>全面性(標準)防護</b>:把所有人血液體液視為感染性;<b>血液污染用1:10漂白水</b>;<b>針頭不可回套</b>,投入利器盒;<b>針扎後24小時內(數小時內)PEP</b>、追蹤至6個月~1年;急救避免口對口。<b>免疫低下禁活疫苗(MMR)</b>,流感疫苗可打。母嬰預防:孕期抗病毒藥、(高病毒量)剖腹產、配方奶取代母乳、新生兒出生後盡速投藥約6週。</p>\n<h3>五、營養與生活</h3>\n<p>常腹瀉/吸收不良→採<b>高熱量、高蛋白、「低渣/低纖」、煮熟</b>飲食,<b>避免生食、高纖、高脂</b>(加重腹瀉);腹瀉補充水分電解質;念珠菌用nystatin含漱;避免人多場所與感染源、避免接觸剛打活疫苗者;一旦確診即開始預防伺機感染;尊重隱私,未經同意不可告知他人診斷。</p>\n"},"R9器官移植與免疫抑制":{"title":"R9 器官移植與免疫抑制 複習講義","html":"\n<h3>一、排斥三型(高頻)</h3>\n<p><b>超急性</b>:數分鐘~小時,既存抗體(如ABO不合)、手術中恢復血循前發生,<b>無法治療須立即移除</b>。<br>\n<b>急性</b>:數天~數月,以<b>T淋巴球與巨噬細胞(細胞性免疫)</b>為主,可加強免疫抑制<b>治療逆轉、預後最佳</b>。<br>\n<b>慢性</b>:數月~數年,纖維化致功能漸失,難治療。</p>\n<h3>二、移植前組織配對(降低排斥)</h3>\n<p><b>ABO與Rh血型、人類白血球抗原(HLA)、交叉配對試驗(crossmatch)、混合淋巴細胞反應(MLC)</b>。注意:<b>HIV/肝炎/梅毒等是「感染篩檢」,不屬組織相容性配對項目</b>。</p>\n<h3>三、免疫抑制劑</h3>\n<p>cyclosporine、tacrolimus、corticosteroids、mycophenolate等,主要抑制<b>T淋巴球</b>(非B淋巴球)。<b>須終身服用、不可自行停藥</b>(即使功能穩定)。副作用:感染風險增加、肝腎毒性、<b>長期致癌(尤其皮膚癌、淋巴瘤)</b>。免疫抑制者也是肺囊蟲肺炎高危群。</p>\n<h3>四、移植後護理</h3>\n<p>不可自行停藥;<b>避免出入公共場所、外出戴口罩</b>防感染;<b>避免日曬、做好防曬</b>(防皮膚癌與光敏,「不可」鼓勵多曬太陽);暫時避孕、準備懷孕先與醫師討論換安全用藥;規律回診監測藥物濃度與器官功能。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^R(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n3_rheum_v1';

try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
