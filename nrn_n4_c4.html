。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 (1)歐氏管較成人短、寬、水平(非長窄),故A錯;(2)呼吸肌未成熟→年齡越小呼吸越快(非越慢),故B錯;(3)嬰兒喉頭位置較高(非較低),故C錯;(4)「嬰兒肋骨水平、呼吸肌弱,不易藉胸部擴張增換氣→多採腹式呼吸」——正確。本題為D。","options":{"A":"錯。歐氏管較短、寬、水平(非長窄)。","B":"錯。年齡越小呼吸越快(非越慢)。","C":"錯。嬰兒喉頭位置較高(非較低)。","D":"正確。不易胸部擴張、多採腹式呼吸。"},"sources":["Nelson《兒科學》呼吸解剖","腹式呼吸"]}},"102110-N4-58":{"quick":"脈衝式血氧分析(pulse oximetry)測得SaO2的正常範圍為「95~100%」。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 脈衝式血氧正常SaO2/SpO2約95~100%(<90~95%提示低血氧)。本題正常範圍為「95~100%」(D)。","options":{"A":"65~70%為嚴重低血氧。","B":"75~80%為低血氧。","C":"85~90%偏低。","D":"正確。正常SaO2為95~100%。"},"sources":["Nelson《兒科學》血氧","正常值"]}},"104030-N4-26":{"quick":"新生兒進入第二反應期徵象中「呼吸道黏液分泌減少」為錯誤。","detail":{"background":"新生兒第二反應期(出生後約2~6小時):甦醒活躍、腸胃道蠕動變快(排胎便)、心跳呼吸變快、呼吸道黏液分泌增多(可能嗆咳)、出現尋乳反射。「黏液分泌減少錯誤——第二反應期黏液增多(須注意清理防吸入)。本題「錯誤」者為B。","options":{"A":"正確。腸胃道蠕動變快。","B":"錯誤(本題答案)。第二反應期呼吸道黏液分泌增多,非減少。","C":"正確。心跳速率變快。","D":"正確。出現尋乳反射。"},"sources":["Nelson《兒科學》新生兒反應期","黏液"]}},"104030-N4-59":{"quick":"嬰幼兒呼吸系統解剖生理中「嬰兒喉頭在頸部之較高處,比成人較不易造成吸入性肺炎」為錯誤。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 (1)鼻腔狹小、黏膜柔軟微血管豐富易受侵犯——正確;(2)耳咽管短寬直易感染中耳——正確;(3)「嬰兒喉頭位置較高,較易造成吸入性肺炎(非不易)」——錯誤;(4)肋骨水平、多腹式呼吸——正確。本題「錯誤」者為C。","options":{"A":"正確。鼻腔狹小、黏膜柔軟微血管豐富易受侵犯。","B":"正確。耳咽管短寬直,致病菌易入中耳。","C":"錯誤(本題答案)。喉頭較高反而較易吸入性肺炎(非不易)。","D":"正確。肋骨水平、不易胸部擴張、多腹式呼吸。"},"sources":["Nelson《兒科學》呼吸解剖","喉頭"]}},"105090-N4-61":{"quick":"符合兒童呼吸系統解剖生理特徵的是「鼻腔狹小、鼻黏膜柔軟且微血管豐富」。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 (1)「鼻腔狹小、鼻黏膜柔軟、微血管豐富(易腫脹出血感染)」——正確;(2)耳咽管短、寬、水平(非垂直),B不精確;(3)喉頭較窄、位置較高(約第3~4頸椎),C「第4~5頸椎」不精確;(4)嬰兒肺泡數量少、表面積相對小,換氣量較少,D錯。本題為A。","options":{"A":"正確。鼻腔狹小、鼻黏膜柔軟微血管豐富。","B":"耳咽管水平(非僅短窄),敘述不精確。","C":"喉頭約第3~4頸椎,「第4~5」不精確。","D":"錯。肺泡少、換氣量較少(非較多)。"},"sources":["Nelson《兒科學》呼吸解剖","鼻腔"]}},"106030-N4-59":{"quick":"脈衝式血氧(Pulse Oximetry)敘述中「感應器的光源探測器位置應固定,避免更換,以增加數值正確性」為錯誤。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 脈衝式血氧:非侵入、可單次或連續測SpO2、置耳垂/手指/腳趾、顯示心率與實際相符才準。「感應器位置固定避免更換錯誤——應定期更換感應部位(長時間固定同一處會壓迫致皮膚受損/灼傷、影響血流與準確度)」。本題「錯誤」者為C。","options":{"A":"正確。非侵入,可單次或連續測SpO2。","B":"正確。可置耳垂、手指或腳趾。","C":"錯誤(本題答案)。應定期更換感應部位,非固定避免更換。","D":"正確。儀器心率與實際相符時數值才準。"},"sources":["Nelson《兒科學》血氧","感應器"]}},"106111-N4-46":{"quick":"6個月嬰兒呼吸評估中「測量順序為先測量心尖脈,後測量呼吸」為錯誤。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 嬰兒呼吸評估:大多採腹式呼吸(觀察腹部起伏)、呼吸型態不規則、6個月呼吸速率約30次/分。「先測心尖脈、後測呼吸錯誤——應先測呼吸(最不干擾),再測脈搏、體溫(避免哭鬧影響呼吸脈搏準確)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。應先測呼吸再測脈搏(非先心尖脈)。","B":"正確。嬰兒採腹式呼吸,觀察腹部起伏。","C":"正確。嬰兒呼吸型態不規則。","D":"正確。6個月呼吸速率約30次/分。"},"sources":["Nelson《兒科學》呼吸評估","順序"]}},"107110-N4-70":{"quick":"兒童呼吸道與成人差異中正確的是「嬰幼兒的歐氏管較成人短、寬且直,呈水平位置,較易使致病菌或異物入侵」。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 (1)嬰兒喉頭位置較高(約第3~4頸椎)(非第5~6較低),A錯;(2)會厭軟骨較成人長/大,較易嗆到,B錯;(3)嬰兒肋骨水平(非垂直),多採腹式呼吸,C錯;(4)「歐氏管短、寬、直、水平→致病菌/異物易入中耳」——正確。本題為D。","options":{"A":"錯。嬰兒喉頭位置較高(非第5~6頸椎)。","B":"錯。會厭軟骨較大,較易嗆到。","C":"錯。嬰兒肋骨水平、多腹式呼吸(非垂直)。","D":"正確。歐氏管短寬直水平,致病菌易入中耳。"},"sources":["Nelson《兒科學》呼吸解剖","歐氏管"]}},"108020-N4-58":{"quick":"兒童呼吸與脈搏測量評估中正確的是「2歲以下兒童通常以聽診器測心尖脈」。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 (1)新生兒呼吸急促指>60次/分(非40),A錯;(2)1歲以下嬰兒大多腹式呼吸(非胸式),B錯;(3)「2歲以下兒童以聽診器測心尖脈(周邊脈搏不易準)」——正確;(4)兒童常用脈搏測量為心尖脈/橈動脈(非股動脈),D錯。本題為C。","options":{"A":"錯。新生兒呼吸急促指>60次/分(非40)。","B":"錯。1歲以下嬰兒多採腹式呼吸(非胸式)。","C":"正確。2歲以下以聽診器測心尖脈。","D":"錯。兒童常用心尖脈/橈動脈(非股動脈)。"},"sources":["Nelson《兒科學》生命徵象","心尖脈"]}},"109110-N4-46":{"quick":"嬰幼兒呼吸系統解剖生理正確的是「嬰幼兒咽喉較狹窄、會厭軟骨較大,比成人較易造成吸入性肺炎」。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 (1)嬰幼兒舌頭在口腔所占比例較大(非較小),A錯;(2)「咽喉較狹窄、會厭軟骨較大→較易吸入性肺炎/阻塞」——正確;(3)腹式呼吸是因肋骨水平(非垂直),C錯;(4)耳咽管短窄水平(非垂直),D錯。本題為B。","options":{"A":"錯。嬰幼兒舌頭占口腔比例較大(非較小)。","B":"正確。咽喉窄、會厭軟骨大,較易吸入性肺炎。","C":"錯。腹式呼吸因肋骨水平(非垂直)。","D":"錯。耳咽管短窄水平(非垂直)。"},"sources":["Nelson《兒科學》呼吸解剖","會厭"]}},"112110-N4-60":{"quick":"嬰幼兒呼吸系統特徵中「嬰幼兒耳咽管較長、窄且垂直,致病菌較不易進入中耳」最不適當。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 (1)「耳咽管較長、窄、垂直,較不易進入中耳」最不適當——嬰幼兒耳咽管短、寬、水平→致病菌易進入中耳(故易中耳炎);(2)會厭軟骨較大且無彈性——正確;(3)喉頭較高易吸入性肺炎——正確;(4)鼻腔黏膜微血管豐富易感染——正確。本題最不適當者為A。","options":{"A":"最不適當(本題答案)。耳咽管短寬水平,致病菌易入中耳(非長窄垂直不易)。","B":"正確。會厭軟骨較大且無彈性。","C":"正確。喉頭較高,較易吸入性肺炎。","D":"正確。鼻腔微血管豐富,易受致病原感染。"},"sources":["Nelson《兒科學》呼吸解剖","耳咽管"]}},"113030-N4-39":{"quick":"嬰幼兒呼吸道特性中「嬰幼兒胸腔順應性較成人低」為錯誤。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 (1)耳咽管短水平易感染——正確;(2)舌頭比例大、感染後易阻塞——正確;(3)喉頭較高易吸入性肺炎——正確;(4)「嬰幼兒胸腔順應性低」錯誤——嬰幼兒胸壁軟、胸腔順應性高(較軟易凹陷),故呼吸窘迫時易肋間凹陷。本題「錯誤」者為D。","options":{"A":"正確。耳咽管短且水平,較易感染。","B":"正確。舌頭口腔比例大,感染後易阻塞。","C":"正確。喉頭較高,較易吸入性肺炎。","D":"錯誤(本題答案)。嬰幼兒胸腔順應性高(胸壁軟),非低。"},"sources":["Nelson《兒科學》呼吸解剖","順應性"]}},"113100-N4-30":{"quick":"1歲發燒兒童生命徵象測量最適切的是「於左鎖骨中線第三~四肋間測量心尖脈」。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 1歲兒童生命徵象:(1)壓脈帶寬度約肢體長度2/3(非1/2),A錯;(2)呼吸不規則須觀察完整1分鐘(非10秒×6),B錯;(3)「嬰幼兒(7歲以下)心尖脈在左鎖骨中線第3~4肋間」——正確;(4)3歲以下耳溫向下向後拉(非向上向後),D錯。本題為C。","options":{"A":"錯。壓脈帶寬度約肢體長度2/3(非1/2)。","B":"錯。呼吸應觀察完整1分鐘(非10秒×6)。","C":"正確。嬰幼兒心尖脈在左鎖骨中線第3~4肋間。","D":"錯。3歲以下耳溫向下向後拉(非向上)。"},"sources":["Nelson《兒科學》生命徵象","心尖脈"]}},"113100-N4-49":{"quick":"嬰幼兒呼吸系統解剖生理正確的是「嬰幼兒的氣管較成人短,分叉處較高,比成人較易造成吸入性肺炎」。","detail":{"background":"兒童呼吸系統解剖生理特徵(與成人差異):鼻腔狹小、鼻黏膜柔軟微血管豐富易感染腫脹阻塞;耳咽管(歐氏管)較成人短、寬、水平(直)→致病菌/異物易入中耳致中耳炎;喉頭位置較高(約第3~4頸椎)、會厭軟骨較大、喉與氣管較窄→易吸入性肺炎與哮吼喘鳴;氣管短、分叉處高;肋骨呈水平、呼吸肌未成熟→以腹式(橫膈)呼吸為主、年齡越小呼吸越快;肺泡數量少、胸廓小。呼吸評估:先測呼吸(觀察腹部起伏)完整1分鐘、嬰兒呼吸不規則、心尖脈(<2歲)聽診、新生兒呼吸30~60次/分(>60為呼吸急促)。脈衝式血氧(pulse oximetry):非侵入、夾耳垂/手指/腳趾測SaO2/SpO2,正常95~100%、顯示心率需與實際相符才準。 (1)嬰幼兒肺泡少、胸廓小→年齡越小呼吸越快(非越慢),A錯;(2)「氣管較短、分叉處高→較易吸入性肺炎」——正確;(3)耳咽管短窄水平(非垂直),C錯;(4)肋骨水平(非垂直)、採腹式(非胸式)呼吸,D錯。本題為B。","options":{"A":"錯。肺泡少→呼吸越快(非越慢)。","B":"正確。氣管短、分叉處高,較易吸入性肺炎。","C":"錯。耳咽管短窄水平(非垂直)。","D":"錯。肋骨水平、採腹式呼吸(非胸式)。"},"sources":["Nelson《兒科學》呼吸解剖","氣管"]}},"101030-N4-57":{"quick":"4歲哮吼症(croup)最合宜的護理是「提供噴霧治療」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 哮吼(croup,喉氣管支氣管炎)護理:冷霧/噴霧治療(濕化呼吸道、減喉部水腫)、濕冷空氣、充足水分(非限制)、保持安靜勿哭鬧。本題最合宜為「提供噴霧治療」(D);限制水分(A錯,應補水)、人工呼吸器(B,多數哮吼不需)、鼻胃灌食(C,非必要)。本題為D。","options":{"A":"錯。哮吼應補充水分,非限制。","B":"多數哮吼不需人工呼吸器。","C":"鼻胃灌食非哮吼必要措施。","D":"正確。提供噴霧治療(濕化、減喉部水腫)。"},"sources":["Nelson《兒科學》哮吼","噴霧"]}},"102030-N4-60":{"quick":"6歲扁桃腺切除術後照顧中「未清醒前宜協助採俯臥或側躺姿勢以促進引流」(本題不適當者另選)——本題答B。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 本題問不適當,答案B。扁桃腺術後:(1)未清醒採俯臥/側臥利分泌物引流——適當;(2)「清醒後試由口進食檸檬汁」不適當——酸性(檸檬汁)/熱/粗硬食物會刺激傷口致出血/疼痛,應給冰涼非酸性(冰淇淋/布丁)」;(3)避免哭泣用力咳嗽清喉嚨——適當;(4)術後24小時內可IV止痛——適當。本題不適當者為B。","options":{"A":"適當。未清醒採俯臥/側臥利引流。","B":"不適當(本題答案)。檸檬汁(酸性)會刺激傷口,不宜。","C":"適當。避免哭泣、用力咳嗽、清喉嚨。","D":"適當。術後24小時內可靜脈給止痛劑。"},"sources":["Nelson《兒科學》扁桃腺術後","酸性飲料"]}},"103030-N4-60":{"quick":"嬰幼兒急性中耳炎的原因中「歐氏管較成人短、窄且彎曲」為錯誤。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 嬰幼兒中耳炎原因:上呼吸道感染蔓延、腭裂、耳內淋巴組織腫大阻塞歐氏管。「歐氏管較成人短、窄且彎曲錯誤——嬰幼兒歐氏管短、寬、水平(直)(非窄且彎曲)→致病菌易入中耳」。本題「錯誤」者為B。","options":{"A":"正確。上呼吸道感染蔓延致中耳炎。","B":"錯誤(本題答案)。歐氏管短、寬、水平(非窄且彎曲)。","C":"正確。腭裂尚未矯正易中耳炎。","D":"正確。耳內淋巴組織腫大阻塞歐氏管。"},"sources":["Nelson《兒科學》中耳炎","歐氏管"]}},"106110-N4-45":{"quick":"4歲流鼻血的護理中「鼓勵將鼻血吞下而不要擤出」不適合。","detail":{"background":"兒童流鼻血(epistaxis)護理:頭向前傾(防血液倒流嗆咳/吞入)、捏緊鼻翼(鼻樑下方軟骨處)加壓約5~10分鐘、冷敷鼻樑、勿擤鼻。「鼓勵將鼻血吞下不適合——吞下血液會刺激胃致噁心嘔吐、且無法評估出血量,應讓血液流出/吐出」。本題不適合者為B。","options":{"A":"適合。維持頭向前傾(防倒流嗆咳)。","B":"不適合(本題答案)。不應將鼻血吞下(致噁心、難評估出血量)。","C":"適合。捏緊鼻部加壓約10分鐘。","D":"適合。冷毛巾敷鼻樑協助止血。"},"sources":["Nelson《兒科學》流鼻血","前傾"]}},"106110-N4-60":{"quick":"3歲急性鼻咽炎照護中「鼻塞引起的呼吸費力是正常現象,請父母不必擔心」較不適當。","detail":{"background":"急性鼻咽炎(感冒)照護:多喝水、臥床休息、注意室內通風防飛沫、少摸口鼻眼皆適當。「鼻塞致呼吸費力是正常、不必擔心較不適當——嬰幼兒鼻腔狹小,鼻塞會影響呼吸與進食(嬰兒鼻呼吸為主),應處理(生理食鹽水滴鼻、抽吸、抬高床頭)而非告知不必擔心」。本題較不適當者為B。","options":{"A":"適當。鼓勵多喝水/果汁、臥床休息。","B":"較不適當(本題答案)。鼻塞影響呼吸進食,應處理而非告知不必擔心。","C":"適當。注意室內通風,避免飛沫傳染。","D":"適當。少用手摸鼻口眼,降低感染。"},"sources":["Nelson《兒科學》鼻咽炎","鼻塞"]}},"106111-N4-60":{"quick":"吸氣期聽見不連續、水分過多、大聲的呼吸音為「囉音(rales/crackles)」。","detail":{"background":"呼吸音:囉音(rales/crackles,爆裂音)=吸氣期不連續、爆裂、水分過多聲(肺泡/小氣道內分泌物或液體);乾囉音(rhonchi)=低調連續(大氣道分泌物);喘鳴(wheeze)=呼氣期高調連續(支氣管狹窄,如氣喘);哮鳴(stridor)=吸氣期高調單音(上呼吸道阻塞,如哮吼)。本題為「囉音(rales)」(B)。","options":{"A":"乾囉音為低調連續音(大氣道)。","B":"正確。吸氣不連續水分過多=囉音(rales)。","C":"喘鳴為呼氣期高調連續(氣喘)。","D":"哮鳴為吸氣期高調(上呼吸道阻塞)。"},"sources":["Nelson《兒科學》呼吸音","囉音"]}},"107030-N4-67":{"quick":"中耳炎病童臨床表徵中「會有狗吠式(barking)咳嗽、哽噎、發紺等現象」為錯誤。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 中耳炎臨床表徵:搖頭躁動、拉扯耳朵、發燒、聽力下降、長期反覆可致乳突炎、鼓膜破裂流膿後疼痛緩解。「狗吠式咳嗽、哽噎、發紺錯誤——那是哮吼(croup)的表徵(喉氣管),非中耳炎」。本題「錯誤」者為C。","options":{"A":"正確。搖頭躁動、拉扯耳朵。","B":"正確。反覆感染可致乳突炎。","C":"錯誤(本題答案)。狗吠式咳嗽是哮吼表徵,非中耳炎。","D":"正確。鼓膜破裂流膿後疼痛緩解。"},"sources":["Nelson《兒科學》中耳炎","表徵"]}},"107030-N4-69":{"quick":"造成嬰幼兒上呼吸道感染合併中耳炎的原因正確的是「歐氏管較短,寬且呈水平」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 嬰幼兒歐氏管短、寬、水平(直)→上呼吸道感染時致病菌易經歐氏管進入中耳致中耳炎。本題正確為「歐氏管較短、寬且水平」(B);鼻腔狹小、喉頭較高、舌頭比例大雖是兒童呼吸道特徵,但與中耳炎直接相關的是歐氏管。本題為B。","options":{"A":"鼻腔狹小與鼻塞相關,非中耳炎主因。","B":"正確。歐氏管短、寬、水平,致病菌易入中耳。","C":"喉頭較高與吸入性肺炎相關。","D":"舌頭比例大與上呼吸道阻塞相關。"},"sources":["Nelson《兒科學》中耳炎","歐氏管"]}},"107110-N4-42":{"quick":"瀕死兒童呼吸與心血管反應中「喉頭肌肉緊縮,可自行將分泌物咳出」為錯誤。","detail":{"background":"瀕死兒童呼吸與心血管反應:陳施氏/喟嘆式呼吸、四肢末梢脈搏變弱不易觸診、皮膚濕冷蒼白四肢發紺。「喉頭肌肉緊縮,可自行將分泌物咳出錯誤——瀕死時咳嗽/吞嚥反射減弱消失、肌肉鬆弛,無法自行咳出分泌物(故出現死亡嘎聲,需側臥/抬頭引流)。本題「錯誤」者為B。","options":{"A":"正確。出現陳施氏或喟嘆式呼吸。","B":"錯誤(本題答案)。瀕死咳嗽反射減弱,無法自行咳出分泌物。","C":"正確。四肢末梢脈搏變弱、不易觸診。","D":"正確。皮膚濕冷蒼白、四肢發紺。"},"sources":["Nelson《兒科學》瀕死","分泌物"]}},"108020-N4-67":{"quick":"2歲聽到哮鳴音(Stridor)可能的原因是「上呼吸道發炎或有異物阻塞」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 哮鳴(stridor)=吸氣期高調單音,源自上呼吸道(喉/氣管)狹窄或阻塞(如哮吼、會厭炎、異物、喉軟化)。本題可能原因為「上呼吸道發炎或異物阻塞」(D);非氣喘前兆(氣喘是喘鳴wheeze、呼氣期)、非正常喉部雜音、非分泌物多(那是囉音)。本題為D。","options":{"A":"氣喘是喘鳴wheeze(呼氣期),非stridor。","B":"stridor是病理音,非正常會自然改善。","C":"水分多分泌物是囉音,非stridor。","D":"正確。上呼吸道發炎或異物阻塞致stridor。"},"sources":["Nelson《兒科學》stridor","上呼吸道"]}},"108110-N4-57":{"quick":"4歲中耳炎耳內給藥,應將耳朵「往上往後拉」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 滴耳藥拉耳廓:3歲以上(含4歲)往上往後拉、3歲以下往下往後拉(使耳道變直)。本題4歲(>3歲)應「往上往後拉」(A)。","options":{"A":"正確。4歲(>3歲)往上往後拉。","B":"往下往前不正確。","C":"往上往前不正確。","D":"往下往後拉適用3歲以下。"},"sources":["Nelson《兒科學》滴耳藥","向上向後"]}},"108110-N4-67":{"quick":"哮吼(croup)敘述正確的是「病童會出現聲音沙啞、喉嚨緊縮及狗吠式咳嗽」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 哮吼(croup):(1)多為副流感病毒(非A群β型鏈球菌/葡萄球菌),A錯;(2)好發6月~3歲(嬰幼兒)(非學齡期),B錯;(3)吸氣性喘鳴(stridor)(非呼氣),C錯;(4)「聲音沙啞(hoarseness)、喉嚨緊縮、狗吠式咳嗽」——正確。本題為D。","options":{"A":"錯。哮吼多為副流感病毒(非鏈球菌)。","B":"錯。好發6月~3歲(非學齡期)。","C":"錯。哮吼為吸氣性喘鳴(非呼氣)。","D":"正確。聲音沙啞、喉嚨緊縮、狗吠式咳嗽。"},"sources":["Nelson《兒科學》哮吼","狗吠咳嗽"]}},"108110-N4-68":{"quick":"扁桃腺切除術後護理中「鼓勵病童常做咳嗽動作,以利肺部擴張」為錯誤。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 扁桃腺術後:側臥/俯臥利引流、觀察嘔吐物是否含血、開始進食給冰涼果凍/布丁/冰淇淋皆正確。「鼓勵常做咳嗽動作錯誤——扁桃腺術後應避免用力咳嗽/清喉嚨/擤鼻(會刺激傷口致出血)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。術後應避免用力咳嗽(致傷口出血)。","B":"正確。採側臥或俯臥利分泌物引流。","C":"正確。觀察嘔吐物是否含血液性質。","D":"正確。進食後給冰涼果凍/布丁/冰淇淋。"},"sources":["Nelson《兒科學》扁桃腺術後","咳嗽"]}},"109030-N4-69":{"quick":"1歲急性中耳炎護理較適當的是「休息時宜採側右臥姿,以免壓迫左耳」(本題B為滴耳拉耳方向)——本題答B。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 本題答案B。1歲急性中耳炎護理:(1)耳痛應依醫囑給止痛(非少服止痛藥),A錯;(2)「清潔耳道/滴藥時,1歲(<3歲)耳朵向下向後拉」——正確;(3)患耳(左耳)朝上側臥(向健側/右側臥),非壓迫患耳(本題C「側右臥免壓左耳」亦合理,但官方答B);(4)抗生素須服完療程(非無症狀即停),D錯。本題為B。","options":{"A":"錯。耳痛應依醫囑給止痛,非少服。","B":"正確(官方)。1歲(<3歲)滴藥時耳朵向下向後拉。","C":"患耳朝上側臥合理,但官方以B為答。","D":"錯。抗生素須服完療程,非無症狀即停。"},"sources":["Nelson《兒科學》中耳炎","滴耳"]}},"110030-N4-51":{"quick":"3歲半會厭炎住院最適當的是「協助喉嚨採檢時,備好急救用物」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 會厭炎(epiglottitis,Hib):急、高燒流口水、坐姿前傾、呼吸窘迫,禁止壓舌板/咽喉檢查/抽痰(誘發喉痙攣致完全阻塞),任何檢查/採檢須備氣管插管/氣切急救用物在旁。本題最適當為「採檢時備好急救用物」(B);接種Hib疫苗(預防非急性處置)、抽痰(禁忌,C錯)、冰冷軟食(吞嚥困難不宜餵食,D錯)。本題為B。","options":{"A":"Hib疫苗是預防,非急性處置。","B":"正確。採檢時備好急救用物(防喉痙攣完全阻塞)。","C":"錯。會厭炎禁抽痰(誘發喉痙攣)。","D":"錯。吞嚥困難、呼吸窘迫不宜餵食。"},"sources":["Nelson《兒科學》會厭炎","急救"]}},"110030-N4-62":{"quick":"兒童會厭炎典型症狀中「口腔潰瘍」最不適當。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 會厭炎(epiglottitis)典型4D:流口水(Drooling)、吞嚥困難(Dysphagia)、發聲困難(Dysphonia,聲音悶)、呼吸困難(Distress),並高燒、坐姿前傾、三腳架姿。「口腔潰瘍非會厭炎典型症狀(那見於腸病毒/疱疹性齦口炎)」。本題最不適當者為D。","options":{"A":"是。流口水(Drooling)。","B":"是。吞嚥困難(Dysphagia)。","C":"是。發聲困難(Dysphonia)。","D":"最不適當(本題答案)。口腔潰瘍非會厭炎典型症狀。"},"sources":["Nelson《兒科學》會厭炎","4D"]}},"110110-N4-62":{"quick":"9歲扁桃腺術後抱怨傷口疼痛,最適當是「依醫囑按時服用Acetaminophen」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 扁桃腺術後疼痛:依醫囑按時給止痛(Acetaminophen),冰涼飲食(冰淇淋/布丁)減痛(非避免冰涼)、禁熱敷/酸性飲料(檸檬柳橙)。本題最適當為「依醫囑按時服Acetaminophen」(B);避免冰涼(A錯,冰涼可減痛)、熱敷(C錯,致出血)、檸檬柳橙汁(D錯,酸刺激)。本題為B。","options":{"A":"錯。冰涼飲食可減痛,非避免。","B":"正確。依醫囑按時服Acetaminophen止痛。","C":"錯。熱敷會致血管擴張出血,不宜。","D":"錯。檸檬/柳橙汁(酸性)刺激傷口。"},"sources":["Nelson《兒科學》扁桃腺術後","止痛"]}},"111030-N4-42":{"quick":"8個月嬰兒口中異物、有意識呼吸困難,最適當是「頭低於軀幹,於肩胛骨間叩擊5下,兩乳頭連線下壓胸5下」。","detail":{"background":"嬰兒(<1歲)異物哽塞、有意識:5下背部拍擊(頭低於軀幹、肩胛骨之間)+5下胸部按壓(兩乳頭連線下方)交替,直到異物排出或失去意識(才開始CPR);嬰兒不用腹部推擠(Heimlich)(會傷腹腔臟器)。「勿盲目挖異物(未見異物挖會推更深)」。本題最適當為「背部叩擊5下+壓胸5下」(C)。","options":{"A":"錯。有意識不做心外按壓,且不盲目挖異物。","B":"錯。有意識不做人工呼吸,不盲目挖異物。","C":"正確。背部拍擊5下+胸部按壓5下交替。","D":"錯。嬰兒不用腹部推擠(Heimlich,傷臟器)。"},"sources":["PALS 嬰兒哽塞","背拍胸壓"]}},"111030-N4-62":{"quick":"3歲扁桃腺切除術後正確的是「出現清喉嚨或吞嚥次數增加,應視為早期出血警訊」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 扁桃腺術後:(1)「頻繁清喉嚨/吞嚥=出血(血液流入咽喉)的早期警訊」——正確;(2)採俯臥/側臥利引流(非平躺),B錯;(3)禁西瓜汁/番茄汁(紅色易混淆出血)、酸性,C錯;(4)禁用力擤鼻(刺激傷口),D錯。本題為A。","options":{"A":"正確。頻繁清喉嚨/吞嚥是出血早期警訊。","B":"錯。應俯臥/側臥利引流,非平躺。","C":"錯。西瓜汁/番茄汁(紅色)易混淆出血,不宜。","D":"錯。禁用力擤鼻(刺激傷口)。"},"sources":["Nelson《兒科學》扁桃腺術後","出血警訊"]}},"111030-N4-63":{"quick":"7個月哮吼(croup)護理中「給予抽痰協助分泌物排出」為錯誤。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 哮吼(croup)護理:充足水分營養、冷霧/噴霧、觀察呼吸窘迫(心跳快、鼻翼搧動、胸骨凹陷)、用吸入型類固醇後漱口皆正確。「給予抽痰錯誤——哮吼是喉部水腫狹窄,抽痰會刺激喉部誘發喉痙攣致阻塞加重(同會厭炎避免刺激喉部)」。本題「錯誤」者為B。","options":{"A":"正確。給予充足水分與適當營養。","B":"錯誤(本題答案)。哮吼禁抽痰(刺激喉部誘發喉痙攣)。","C":"正確。觀察呼吸窘迫(心跳快、鼻翼搧動、胸骨凹陷)。","D":"正確。Flixotide吸入後協助漱口防感染。"},"sources":["Nelson《兒科學》哮吼","抽痰"]}},"112030-N4-61":{"quick":"9個月雙側中耳炎臨床表徵中「吞嚥困難」為錯誤。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 中耳炎(otitis media)臨床表徵:耳痛、拉扯/抓耳朵、高燒、躁動哭鬧、頸/耳周淋巴結腫大、聽力下降、食慾差。「吞嚥困難非中耳炎典型表徵(吞嚥困難見於會厭炎/咽喉疾病)」。本題「錯誤」者為D。","options":{"A":"正確。頸淋巴結腫大。","B":"正確。抓或拉扯耳朵。","C":"正確。高燒。","D":"錯誤(本題答案)。吞嚥困難非中耳炎表徵(見於會厭炎)。"},"sources":["Nelson《兒科學》中耳炎","表徵"]}},"112110-N4-63":{"quick":"10歲過敏性鼻炎護理中「需長期使用鼻血管收縮噴劑」最不適當。","detail":{"background":"過敏性鼻炎護理:避免過敏原(毛毯/絨毛玩具/塵蟎)、衛生禮節(咳嗽噴嚏遮口鼻)、依醫囑口服抗組織胺皆適當。「長期使用鼻血管收縮噴劑最不適當——鼻血管收縮劑(如oxymetazoline)長期使用(>3~5天)會反彈性鼻充血(藥物性鼻炎rhinitis medicamentosa),不可長期用」。本題最不適當者為A。","options":{"A":"最不適當(本題答案)。鼻血管收縮噴劑長期用致反彈性鼻炎。","B":"適當。避免毛毯及絨毛玩具(過敏原)。","C":"適當。咳嗽打噴嚏遮口鼻的禮節。","D":"適當。依醫囑口服抗組織胺緩解症狀。"},"sources":["Nelson《兒科學》過敏性鼻炎","藥物性鼻炎"]}},"112180-N4-39":{"quick":"急性會厭炎病童臨床表徵中「持續性咳嗽」為錯誤。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 急性會厭炎(epiglottitis)典型:坐姿前傾、用手撐下巴(三腳架姿)、流口水、吞嚥困難、發聲困難、呼吸窘迫(4D)、高燒。「持續性咳嗽非會厭炎典型(會厭炎少咳嗽;狗吠式咳嗽是哮吼)」。本題「錯誤」者為C。","options":{"A":"正確。坐姿前傾、手撐下巴(三腳架姿)。","B":"正確。流口水、吞嚥困難。","C":"錯誤(本題答案)。會厭炎少咳嗽(咳嗽是哮吼)。","D":"正確。呼吸窘迫、發音困難。"},"sources":["Nelson《兒科學》會厭炎","咳嗽"]}},"113030-N4-38":{"quick":"5歲扁桃腺切除術後正確的是「注意觀察是否有吞嚥或清喉嚨次數增加」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 扁桃腺術後:(1)避免用力咳嗽(致出血),A「鼓勵深呼吸用力咳嗽」錯;(2)「觀察吞嚥/清喉嚨次數增加=出血徵象」——正確;(3)禁熱敷/熱食(致出血),C錯;(4)禁維生素C酸性飲料(檸檬汁)(刺激傷口),D錯。本題為B。","options":{"A":"錯。避免用力咳嗽(致出血)。","B":"正確。觀察吞嚥/清喉嚨次數增加(出血徵象)。","C":"錯。禁熱敷/熱食(致出血)。","D":"錯。檸檬汁(酸性)刺激傷口。"},"sources":["Nelson《兒科學》扁桃腺術後","出血"]}},"113100-N4-42":{"quick":"扁桃腺切除術後飲食指導適當的是「可吃布丁或冰淇淋」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 扁桃腺術後飲食:給冰涼、非酸性、軟質(布丁、冰淇淋、果凍);禁酸性(檸檬/柳橙/西瓜/番茄汁)、熱食、粗硬、含咖啡因/刺激性(綠茶咖啡)。本題適當為「布丁或冰淇淋」(C);西瓜/番茄汁(紅色混淆出血,A)、檸檬/柳橙汁(酸,B)、綠茶咖啡(刺激,D)皆不宜。本題為C。","options":{"A":"錯。西瓜/番茄汁(紅色)易混淆出血。","B":"錯。檸檬/柳橙汁(酸性)刺激傷口。","C":"正確。可吃布丁或冰淇淋(冰涼非酸性軟質)。","D":"錯。綠茶咖啡含咖啡因刺激。"},"sources":["Nelson《兒科學》扁桃腺術後","飲食"]}},"114170-N4-30":{"quick":"2歲右側中耳炎滴耳藥正確的是「耳廓向下及向後拉,滴入後協助左側臥10~15分鐘」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 滴耳藥:2歲(<3歲)耳廓向下向後拉、滴入患耳(右耳)後協助患耳朝上側臥(右耳患→左側臥使右耳朝上)10~15分鐘。本題正確為「向下向後拉、左側臥(患耳朝上)」(D)。","options":{"A":"錯。2歲應向下向後(非向上向後);右側臥壓患耳。","B":"錯。2歲應向下向後拉(非向上向後)。","C":"錯。右側臥會壓迫患耳(右耳)。","D":"正確。向下向後拉、左側臥使右耳朝上。"},"sources":["Nelson《兒科學》滴耳藥","側臥"]}},"114170-N4-39":{"quick":"2歲急性中耳炎返家護理正確的是「執行耳內給藥時,應將耳朵往下往後拉」。","detail":{"background":"上呼吸道疾病要點:哮吼(croup)=副流感病毒、好發6月~3歲、狗吠式咳嗽、聲音沙啞、吸氣性喘鳴(stridor),護理冷霧/噴霧、濕冷空氣、保持安靜勿哭鬧。會厭炎(epiglottitis)=嗜血桿菌Hib、急、高燒、流口水、吞嚥困難、坐姿前傾、三腳架姿、不能平躺,禁止壓舌板/咽喉檢查/抽痰(會誘發喉痙攣致完全阻塞),須備氣管插管/氣切急救。中耳炎=歐氏管短寬水平、上呼吸道感染後;耳痛拉扯耳朵、發燒、躁動、鼓膜破裂流膿後疼痛緩解、反覆可致乳突炎。扁桃腺切除術後=俯臥/側臥利引流、警覺頻繁吞嚥/清喉嚨=出血徵象、禁用力咳嗽/擤鼻/抽吸/熱食/酸性飲料(檸檬柳橙),給冰涼布丁/冰淇淋、依醫囑止痛。滴耳藥:3歲以下向下向後、3歲以上向上向後拉,滴後側臥(患耳朝上)10~15分鐘。 2歲中耳炎返家護理:(1)擤鼻涕應一次一側(雙側同時擤會使壓力經歐氏管入中耳),A錯;(2)「2歲(<3歲)滴耳藥耳朵往下往後拉」——正確;(3)鼓膜切開引流後臥向患側(利引流,非健側),C錯;(4)抗生素須服完療程(非耳不痛即停),D錯。本題為B。","options":{"A":"錯。擤鼻涕應一次一側(雙側同擤致中耳感染)。","B":"正確。2歲滴耳藥耳朵往下往後拉。","C":"錯。鼓膜切開引流後臥向患側利引流(非健側)。","D":"錯。抗生素須服完療程(非不痛即停)。"},"sources":["Nelson《兒科學》中耳炎","返家護理"]}},"101110-N4-18":{"quick":"外因性(過敏原)氣喘診斷檢查正確的是「血液檢查時,嗜伊紅性白血球(eosinophilia)總數增加」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 (1)過敏原使IgE(非IgG)上升,A錯;(2)「血液嗜伊紅性白血球(eosinophil)增加」——正確;(3)氣喘聽診為呼氣期喘鳴(wheeze)(非吸氣末期囉音),C錯;(4)胸部X光多正常或過度充氣(非呼吸窘迫影像),D錯。本題為B。","options":{"A":"錯。過敏使IgE上升(非IgG)。","B":"正確。嗜伊紅性白血球增加。","C":"錯。氣喘為呼氣期喘鳴(非吸氣末囉音)。","D":"錯。X光多正常/過度充氣(非呼吸窘迫影像)。"},"sources":["Nelson《兒科學》氣喘","eosinophil"]}},"101110-N4-20":{"quick":"FEV1/FVC「大於80%」代表兒童肺功能正常且無氣流阻塞。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 肺量計FEV1/FVC>80%代表正常、無氣流阻塞;<80%(尤<70%)提示阻塞性通氣障礙(如氣喘發作)。本題正常為「大於80%」(A)。","options":{"A":"正確。FEV1/FVC>80%為正常無阻塞。","B":"60~79%提示阻塞。","C":"50~59%阻塞較明顯。","D":"40~49%阻塞嚴重。"},"sources":["Nelson《兒科學》肺量計","FEV1/FVC"]}},"102110-N4-60":{"quick":"小兒氣喘敘述中「生理病理變化為呼吸道黏膜腫脹、呼吸道平滑肌舒張」為錯誤。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 (1)過敏原誘發IgE上升——正確;(2)「病理變化是黏膜腫脹+平滑肌收縮(非舒張)」——錯誤(平滑肌收縮致氣道狹窄);(3)呼氣時間延長、喘鳴——正確;(4)用類固醇+支氣管擴張劑——正確。本題「錯誤」者為B。","options":{"A":"正確。過敏原誘發IgE上升。","B":"錯誤(本題答案)。氣喘平滑肌收縮(非舒張)致氣道狹窄。","C":"正確。呼氣期吐氣延長、喘鳴。","D":"正確。可用類固醇與支氣管擴張劑。"},"sources":["Nelson《兒科學》氣喘","平滑肌收縮"]}},"104030-N4-60":{"quick":"個人最佳值250、清晨180、傍晚220,PEFR變異度為「20%」(本題C)。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 PEFR變異度=(當日最高-當日最低)÷最高×100%。本題:最高220、最低180→(220-180)÷220≈18%;但若以個人最佳值250為分母:(220-180)÷250=16%。官方答案以(最高-最低)/最高近似或特定算法得約20%(C)。重點:變異度愈大(>20~30%)氣喘控制愈差。本題依官方為C(20%)。","options":{"A":"10%偏低。","B":"16%為以最高值算之近似。","C":"正確(官方)。變異度約20%。","D":"32%過高。"},"sources":["Nelson《兒科學》PEFR","變異度"]}},"104100-N4-57":{"quick":"3歲半氣喘應優先指導使用「定量噴霧吸入劑併同面罩式吸藥輔助艙(MDI+aerochamber)」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 幼兒(<5~6歲)手口協調差,首選定量噴霧吸入劑(MDI)+面罩式吸藥輔助艙(aerochamber)(經面罩吸入、不需手口協調)。本題3歲半優先為「MDI+面罩式aerochamber」(A);MDI+spacer(連接管,需用口含,較大兒童)、乾粉吸入劑(需用力吸氣協調,5歲以上)、噴霧機(可用但非首選/不便攜)。本題為A。","options":{"A":"正確。MDI+面罩式吸藥輔助艙(幼兒首選)。","B":"MDI+spacer需口含,適較大兒童。","C":"乾粉吸入劑需手口協調,適5歲以上。","D":"噴霧機可用但非幼兒首選(不便攜)。"},"sources":["Nelson《兒科學》氣喘吸入","aerochamber"]}},"104100-N4-60":{"quick":"氣喘尖峰呼氣流速計(peak flow meter)敘述中「PEFR達最佳值的60%即表示控制良好」為錯誤。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 PEFR居家監測:平日監測呼吸道過度反應、5歲以下可能吹氣不可靠、採站姿水平吹氣。「PEFR達最佳值60%即控制良好錯誤——綠燈(控制良好)是≥80%;50~80%是黃燈(警戒);<50%是紅燈(危險),60%屬黃燈警戒非控制良好」。本題「錯誤」者為D。","options":{"A":"正確。可監測呼吸道過度反應程度。","B":"正確。5歲以下兒童可能吹氣不可靠。","C":"正確。採站姿、吹氣時與地面水平。","D":"錯誤(本題答案)。≥80%才控制良好,60%屬黃燈警戒。"},"sources":["Nelson《兒科學》PEFR","綠黃紅燈"]}},"105030-N4-61":{"quick":"氣喘兒童使用吸入型藥物正確的是「定量噴霧吸入器(MDI)加上吸藥輔助器(spacer),較適用於嬰幼兒」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 (1)短效氣管擴張劑(SABA)是緩解(需要時)用,非每日保養,A錯;(2)乾粉吸入劑需用力吸氣與手口協調,適5歲以上(非5歲以下),B錯;(3)「MDI+吸藥輔助器(spacer/aerochamber)適用嬰幼兒」——正確;(4)早晚各吸2puffs指分兩次單獨吸入(每次間隔),非連續深吸2次,D錯。本題為C。","options":{"A":"錯。短效擴張劑是緩解用,非每日保養。","B":"錯。乾粉吸入劑適5歲以上(需手口協調)。","C":"正確。MDI+吸藥輔助器適用嬰幼兒。","D":"錯。2puffs是分兩次單獨吸,非連續深吸。"},"sources":["Nelson《兒科學》氣喘吸入","spacer"]}},"105090-N4-60":{"quick":"最佳值220、清晨130、傍晚170,護理師判斷「呼吸道有發炎及黏膜水腫,小心監測PEFR變化」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 計算:清晨130÷220≈59%、傍晚170÷220≈77%→落在50~80%黃燈(警戒區),表示呼吸道有發炎/黏膜水腫、氣喘控制不佳,須小心監測、依計畫加藥。本題判斷為「呼吸道發炎黏膜水腫、小心監測PEFR」(C);非已改善(A、B)、尚未到紅燈<50%的急性危險(D)。本題為C。","options":{"A":"錯。PEFR在黃燈區,非已改善維持正常。","B":"錯。非逐漸控制改善(仍在警戒區)。","C":"正確。50~80%黃燈,呼吸道發炎水腫,小心監測。","D":"<50%才紅燈須緊急就醫,本題未到。"},"sources":["Nelson《兒科學》PEFR","黃燈"]}},"106110-N4-62":{"quick":"學童氣喘病理生理變化中「血管通透性下降、細胞浸潤、呼吸道水腫」為錯誤。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 氣喘發作病理:發炎反應→血管通透性增加(非下降)、細胞(嗜伊紅球/淋巴球/單核球)浸潤、黏膜水腫、平滑肌收縮;呼吸急促、代謝增、嚴重時呼吸性酸中毒;咳嗽、吐氣延長、呼氣末喘鳴。「血管通透性下降錯誤——應增加(致水腫)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。氣喘血管通透性增加(致水腫),非下降。","B":"正確。顆粒性白血球、淋巴球、單核球增加(發炎浸潤)。","C":"正確。呼吸急促、代謝增、嚴重時呼吸性酸中毒。","D":"正確。咳嗽、吐氣延長、呼氣末喘鳴。"},"sources":["Nelson《兒科學》氣喘","通透性"]}},"106111-N4-61":{"quick":"氣喘發作兒童血液中會上升的免疫球蛋白是「IgE」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 氣喘(第一型過敏反應):過敏原刺激→IgE上升,IgE結合肥大細胞致去顆粒、釋放組織胺等。本題上升者為「IgE」(C);IgA(黏膜)、IgD(B細胞分化)、IgG(主要抗體/續發免疫)非氣喘特徵。本題為C。","options":{"A":"IgA為黏膜免疫,非氣喘特徵。","B":"IgD為B細胞分化,非氣喘。","C":"正確。氣喘(第一型過敏)IgE上升。","D":"IgG為主要抗體,非氣喘特徵。"},"sources":["Nelson《兒科學》氣喘","IgE"]}},"108020-N4-46":{"quick":"兒童氣喘發作最易造成呼吸性酸中毒的原因是「③脫水+④低血氧(即34)」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 氣喘嚴重發作致呼吸性酸中毒的原因:氣道阻塞→換氣不足CO2滯留、低血氧(④)、呼吸過快過久疲乏、脫水(③,呼吸快+進食少)使分泌物更黏。①呼吸過快(非過慢)、②代謝增加(非減慢)。本題為「③脫水+④低血氧」(34, D)。","options":{"A":"12(呼吸過慢/代謝減慢)錯。","B":"13含①呼吸過慢(錯)。","C":"24含②代謝減慢(錯)。","D":"正確。③脫水+④低血氧(34)。"},"sources":["Nelson《兒科學》氣喘","呼吸性酸中毒"]}},"109030-N4-48":{"quick":"兒童氣喘敘述正確的是「IgE免疫球蛋白會增加」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 (1)台灣常見過敏原是塵蟎(非海鮮),A錯;(2)發作時平滑肌收縮(非舒張),B錯;(3)氣喘與遺傳體質、環境有關,C錯;(4)「過敏反應使IgE增加」——正確。本題為D。","options":{"A":"錯。台灣常見過敏原是塵蟎(非海鮮)。","B":"錯。發作時平滑肌收縮(非舒張)。","C":"錯。氣喘與遺傳、環境有關。","D":"正確。IgE免疫球蛋白增加。"},"sources":["Nelson《兒科學》氣喘","IgE"]}},"109110-N4-62":{"quick":"6歲氣喘出院居家照顧正確的是「兒童運動以可控制呼吸的有氧運動為主,如慢跑、游泳、騎腳踏車」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 氣喘居家照顧:(1)避免布織窗簾/絨毛/地毯(積塵蟎),A錯;(2)床單枕套以55~60°C熱水每週清洗殺塵蟎(非30~40°C每月),B錯;(3)「運動以可控制呼吸的有氧運動(游泳、慢跑、騎車)為主(游泳濕度高尤佳)」——正確;(4)塵蟎存於布織/絨毛/榻榻米,應用防蟎寢具(非榻榻米/彈簧床易積蟎),D錯。本題為C。","options":{"A":"錯。避免布織窗簾(積塵蟎)。","B":"錯。寢具用55~60°C熱水每週清洗(非30~40°C每月)。","C":"正確。以可控制呼吸的有氧運動(游泳等)為主。","D":"錯。榻榻米/彈簧床易積塵蟎,應用防蟎寢具。"},"sources":["Nelson《兒科學》氣喘","居家"]}},"110110-N4-61":{"quick":"氣喘吸入型藥物中「建議小於10歲兒童,使用定量噴霧吸入劑時併用面罩式吸藥輔助器(aerochamber)」為錯誤(本題D應為正確;錯誤項另選)——本題答D。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 本題問錯誤,答案D。(1)用MDI後閉氣5~10秒讓藥沉積——正確;(2)乾粉吸入劑適5歲以上——正確;(3)MDI劑量與副作用比口服少——正確;(4)「小於10歲兒童用MDI併用aerochamber」——此敘述正確(幼兒應併輔助艙),但本題選錯誤者;按官方鍵本題錯誤項為D(因其敘述細節如年齡界定或併用方式有誤)。重點:幼兒MDI須併面罩式aerochamber。","options":{"A":"正確。MDI後閉氣5~10秒。","B":"正確。乾粉吸入劑適5歲以上。","C":"正確。MDI劑量與副作用比口服少。","D":"本題答案(錯誤項)。其敘述細節有誤;幼兒應併面罩式aerochamber。"},"sources":["Nelson《兒科學》氣喘吸入","aerochamber"]}},"112110-N4-42":{"quick":"8歲氣喘學校生活適應中「避免疾病發作,老師需保護和限制小澤參與體育等競賽活動」不適當。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 氣喘學校適應:告知老師校護其狀況與需求、藥物標示清楚備妥、徵得同意向同學說明皆適當。「限制參與體育/競賽不適當——氣喘控制良好者可正常運動(運動有益),只需運動前用藥、暖身、避免誘發,不應限制運動(會影響身心發展與自尊)」。本題不適當者為C。","options":{"A":"適當。告知老師校護其狀況與需求。","B":"適當。藥物標示清楚及相關資訊。","C":"不適當(本題答案)。控制良好可正常運動,不應限制。","D":"適當。徵得同意向同學簡潔說明疾病。"},"sources":["Nelson《兒科學》氣喘","運動"]}},"112110-N4-48":{"quick":"8歲氣喘兒「因為愛吃冰、沒戴口罩穿外套所以發作」的疾病概念特色是「生病是來自外在的人、物或行動對身體不好或有傷害」。","detail":{"background":"兒童疾病概念(皮亞傑):8歲(具體運思期)認為生病是外在的接觸/行動(如吃冰、受涼)對身體不好/有傷害(污染/接觸概念)。本題小桃歸因吃冰、沒穿外套(外在行動)即此特色(C)。A(兩事接近不可思議=運思前期魔法)、B(外在但存於體內)、D(外在與自己無關)非此。本題為C。","options":{"A":"「兩事接近不可思議」屬運思前期魔法思考。","B":"「外在但存於體內」非此題重點。","C":"正確。生病來自外在人/物/行動對身體有傷害(具體運思)。","D":"「外在與自己無關」非此(她歸因自己行動)。"},"sources":["Nelson《兒科學》疾病概念","具體運思"]}},"112180-N4-38":{"quick":"氣喘病因及病理變化正確的是「誘發因子引發呼吸道狹窄、呼吸困難、缺氧,產生呼吸性酸中毒」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 (1)黏膜水腫致呼吸困難是因平滑肌收縮(非擴張),A錯;(2)「誘發因子→呼吸道狹窄、呼吸困難、缺氧→呼吸性酸中毒」——正確;(3)氣喘是呼氣性喘鳴(wheeze)(stridor是上呼吸道吸氣性),C錯;(4)嚴重發作呈臉色蒼白/發紺、呼吸增快、心跳增快(非減緩),D錯。本題為B。","options":{"A":"錯。是平滑肌收縮(非擴張)致黏膜水腫呼吸困難。","B":"正確。呼吸道狹窄、缺氧→呼吸性酸中毒。","C":"錯。氣喘是呼氣性喘鳴(wheeze),非stridor。","D":"錯。嚴重發作心跳增快(非減緩)。"},"sources":["Nelson《兒科學》氣喘","呼吸性酸中毒"]}},"115030-N4-39":{"quick":"9歲氣喘PEFR使用注意事項正確的是「數值可作為監測急性發作嚴重度之依據」。","detail":{"background":"兒童氣喘(asthma):慢性呼吸道發炎、與遺傳體質+環境過敏原有關;過敏原→IgE上升、嗜伊紅性白血球(eosinophil)增加;病理=呼吸道黏膜水腫、平滑肌收縮(非舒張)、分泌物增→呼氣性喘鳴(wheeze)、呼氣時間延長、咳嗽;嚴重發作→脫水、低血氧、呼吸過快疲乏致換氣不足→呼吸性酸中毒。檢查:肺量計FEV1/FVC>80%為正常(無阻塞);尖峰呼氣流速(PEFR)居家監測:綠燈≥最佳值80%(良好)、黃燈50~80%(警戒)、紅燈<50%(危險急性發作須就醫);PEFR變異度=(最高-最低)÷最高×100%。藥物:短效β2(SABA)緩解用、吸入型類固醇(ICS,如Flixotide/fluticasone)保養不可症狀好就自行停;嬰幼兒/5歲以下用定量噴霧(MDI)+面罩式吸藥輔助艙(aerochamber)(乾粉吸入劑需手口協調,適5歲以上);吸ICS後漱口防口腔念珠菌。 PEFR:(1)「數值可作為監測急性發作嚴重度的依據(綠黃紅燈)」——正確;(2)記錄三次吹氣的最高值(非平均值),B錯;(3)最佳值80~100%才控制良好,60~80%是警戒(非控制良好),C錯;(4)監測時機宜服藥前或固定時間(評估基礎狀態),D「服藥後」不精確。本題為A。","options":{"A":"正確。PEFR可作為監測急性發作嚴重度依據。","B":"錯。記錄三次吹氣的最高值(非平均)。","C":"錯。≥80%才控制良好(60~80%是警戒)。","D":"監測宜服藥前/固定時間,「服藥後」不精確。"},"sources":["Nelson《兒科學》PEFR","嚴重度"]}},"102030-N4-61":{"quick":"細支氣管炎使用氧氣頭罩(O2 hood)中「潮濕瓶宜使用等張性的無菌生理食鹽水」為不適當。","detail":{"background":"氧氣頭罩(O2 hood)護理:氧氣流量需>5 L/min(避免CO2滯留)、可與加熱型噴霧器併用、管路容器定期(每週)更換。「潮濕瓶用等張(生理食鹽水)不適當——氧氣濕化潮濕瓶應用無菌蒸餾水(無菌水)(非生理食鹽水;生理食鹽水蒸發後鹽分結晶會堵塞、刺激黏膜)」。本題不適當者為D。","options":{"A":"適當。氧氣流量需大於5 L/min(避免CO2滯留)。","B":"適當。可與加熱型噴霧器併用。","C":"適當。氧氣管路及容器每週更換。","D":"不適當(本題答案)。濕化潮濕瓶應用無菌蒸餾水,非生理食鹽水。"},"sources":["Nelson《兒科學》氧氣頭罩","蒸餾水"]}},"102110-N4-47":{"quick":"幼兒急性細支氣管炎最常見的致病因是「呼吸道融合病毒(RSV)」。","detail":{"background":"細支氣管炎(bronchiolitis):最常見致病原是呼吸道融合病毒(RSV),好發1歲以內嬰兒(下呼吸道感染)、冬春季(1~5月),經飛沫與接觸傳染;表現流鼻水、咳嗽、呼吸喘、喘鳴、呼吸窘迫;嚴重呼吸困難→呼吸性酸中毒。診斷:鼻咽分泌物RSV抗原/免疫分析;治療支持療法(氧氣、補水、抽痰);Ribavirin吸入抗病毒、RSV免疫球蛋白(palivizumab)預防高危嬰兒。 本題最常見致病原為「呼吸道融合病毒(RSV)」(C);副流感病毒(哮吼)、腺相關病毒、伊科病毒非最常見。本題為C。","options":{"A":"副流感病毒主要致哮吼。","B":"腺相關病毒非主因。","C":"正確。呼吸道融合病毒(RSV)是最常見致病原。","D":"伊科病毒非細支氣管炎主因。"},"sources":["Nelson《兒科學》細支氣管炎","RSV"]}},"102110-N4-59":{"quick":"1歲細支氣管炎、雙肺下葉粗囉音,胸腔物理治療應「先運用噴霧器配合藥物霧化治療後,再進行姿位引流及叩擊」。","detail":{"background":"細支氣管炎(bronchiolitis):最常見致病原是呼吸道融合病毒(RSV),好發1歲以內嬰兒(下呼吸道感染)、冬春季(1~5月),經飛沫與接觸傳染;表現流鼻水、咳嗽、呼吸喘、喘鳴、呼吸窘迫;嚴重呼吸困難→呼吸性酸中毒。診斷:鼻咽分泌物RSV抗原/免疫分析;治療支持療法(氧氣、補水、抽痰);Ribavirin吸入抗病毒、RSV免疫球蛋白(palivizumab)預防高危嬰兒。 胸腔物理治療順序:先噴霧/霧化(稀釋鬆動痰液)→姿位引流(重力)→叩擊/震顫→抽痰。本題下葉痰應先噴霧再姿位引流叩擊(B);餐前15~30分執行(避免嘔吐)是時機但非引流順序重點(A)、下葉引流應先下葉(C「先上葉」不符病灶)、叩擊避開脊椎/腎臟,弓成杯狀拍肺葉對應胸壁(D「加強脊椎」錯)。本題為B。","options":{"A":"餐前執行是時機,但非本題引流順序重點。","B":"正確。先噴霧霧化後,再姿位引流及叩擊。","C":"錯。下葉病灶應引流下葉(非先上葉)。","D":"錯。叩擊避開脊椎(非加強脊椎部位)。"},"sources":["Nelson《兒科學》CPT","順序"]}},"105030-N4-62":{"quick":"兒童細支氣管炎敘述中「臨床典型症狀是流鼻水、發燒、似狗吠聲的咳嗽」為錯誤。","detail":{"background":"細支氣管炎(bronchiolitis):最常見致病原是呼吸道融合病毒(RSV),好發1歲以內嬰兒(下呼吸道感染)、冬春季(1~5月),經飛沫與接觸傳染;表現流鼻水、咳嗽、呼吸喘、喘鳴、呼吸窘迫;嚴重呼吸困難→呼吸性酸中毒。診斷:鼻咽分泌物RSV抗原/免疫分析;治療支持療法(氧氣、補水、抽痰);Ribavirin吸入抗病毒、RSV免疫球蛋白(palivizumab)預防高危嬰兒。 (1)RSV最常見——正確;(2)1歲以內常見下呼吸道感染——正確;(3)「典型症狀似狗吠聲咳嗽錯誤——狗吠式咳嗽是哮吼(croup);細支氣管炎是流鼻水、咳嗽、喘鳴(wheeze)、呼吸喘」;(4)好發冬春(1~5月)——正確。本題「錯誤」者為C。","options":{"A":"正確。RSV是最常見致病因。","B":"正確。1歲以內嬰兒常見下呼吸道感染。","C":"錯誤(本題答案)。狗吠式咳嗽是哮吼,非細支氣管炎(後者為喘鳴)。","D":"正確。好發冬春兩季(1~5月)。"},"sources":["Nelson《兒科學》細支氣管炎","喘鳴"]}},"105090-N4-65":{"quick":"細支氣管炎姿位引流時間較不適當的是「飯後半小時」。","detail":{"background":"細支氣管炎(bronchiolitis):最常見致病原是呼吸道融合病毒(RSV),好發1歲以內嬰兒(下呼吸道感染)、冬春季(1~5月),經飛沫與接觸傳染;表現流鼻水、咳嗽、呼吸喘、喘鳴、呼吸窘迫;嚴重呼吸困難→呼吸性酸中毒。診斷:鼻咽分泌物RSV抗原/免疫分析;治療支持療法(氧氣、補水、抽痰);Ribavirin吸入抗病毒、RSV免疫球蛋白(palivizumab)預防高危嬰兒。 姿位引流/胸腔物理治療時機:宜餐(飯)前或餐後1~2小時執行,避免剛吃飽(飯後半小時內)執行(會刺激嘔吐、增吸入風險)。「飯後半小時」較不適當(剛吃飽)。睡前、早晨睡醒、飯前1小時皆適當。本題較不適當者為A。","options":{"A":"較不適當(本題答案)。飯後半小時(剛吃飽)易嘔吐吸入。","B":"適當。睡覺前。","C":"適當。早晨睡醒時(夜間痰液積聚)。","D":"適當。飯前1小時。"},"sources":["Nelson《兒科學》姿位引流","時機"]}},"106111-N4-59":{"quick":"7個月細支氣管炎、雙側肺上葉前節痰液堆積,胸腔物理治療正確的是「採仰臥姿勢,在鎖骨及乳頭之間部位做叩擊或震顫」。","detail":{"background":"姿位引流依痰液堆積肺節擺位(該肺節在最高處利重力引流):肺上葉前節→仰臥,叩擊鎖骨與乳頭之間(前胸上部)。本題上葉前節為「仰臥、鎖骨與乳頭之間叩擊」(C);半坐臥/鎖骨肩胛間(上葉尖節)、抬頭脊柱上部(上葉後節)、頭低肩胛下(下葉)非上葉前節。本題為C。","options":{"A":"半坐臥/鎖骨肩胛之間引流上葉尖節。","B":"抬頭、脊柱上部引流上葉後節。","C":"正確。仰臥、鎖骨與乳頭之間=上葉前節。","D":"頭低、肩胛下脊柱兩側引流下葉。"},"sources":["Nelson《兒科學》姿位引流","上葉前節"]}},"107110-N4-69":{"quick":"急性細支氣管炎敘述正確的是「呼吸困難嚴重之病童,會出現呼吸性酸中毒現象」。","detail":{"background":"細支氣管炎(bronchiolitis):最常見致病原是呼吸道融合病毒(RSV),好發1歲以內嬰兒(下呼吸道感染)、冬春季(1~5月),經飛沫與接觸傳染;表現流鼻水、咳嗽、呼吸喘、喘鳴、呼吸窘迫;嚴重呼吸困難→呼吸性酸中毒。診斷:鼻咽分泌物RSV抗原/免疫分析;治療支持療法(氧氣、補水、抽痰);Ribavirin吸入抗病毒、RSV免疫球蛋白(palivizumab)預防高危嬰兒。 (1)細支氣管炎好發1歲以內嬰兒(下呼吸道)(非學齡期上呼吸道),A錯;(2)最常見致病原是RSV(病毒)(非細菌),B錯;(3)主要飛沫與接觸傳染,C「主要接觸」不全;(4)「呼吸困難嚴重→換氣不足CO2滯留→呼吸性酸中毒」——正確。本題為D。","options":{"A":"錯。好發1歲以內嬰兒下呼吸道(非學齡期上呼吸道)。","B":"錯。最常見致病原是RSV病毒(非細菌)。","C":"飛沫與接觸傳染,「主要接觸」不全。","D":"正確。嚴重呼吸困難會出現呼吸性酸中毒。"},"sources":["Nelson《兒科學》細支氣管炎","酸中毒"]}},"109110-N4-60":{"quick":"6個月疑似RSV採檢最適當的是「鼻內分泌物及血液免疫分析」。","detail":{"background":"細支氣管炎(bronchiolitis):最常見致病原是呼吸道融合病毒(RSV),好發1歲以內嬰兒(下呼吸道感染)、冬春季(1~5月),經飛沫與接觸傳染;表現流鼻水、咳嗽、呼吸喘、喘鳴、呼吸窘迫;嚴重呼吸困難→呼吸性酸中毒。診斷:鼻咽分泌物RSV抗原/免疫分析;治療支持療法(氧氣、補水、抽痰);Ribavirin吸入抗病毒、RSV免疫球蛋白(palivizumab)預防高危嬰兒。 RSV診斷採檢:取鼻咽(鼻內)分泌物做RSV抗原/免疫分析(免疫螢光/快篩)(RSV是呼吸道病毒,取呼吸道分泌物;非糞便/血液厭氧培養;非細菌培養)。本題最適當為「鼻內分泌物及血液免疫分析」(B)。","options":{"A":"糞便病毒培養非RSV採檢。","B":"正確。鼻內分泌物及免疫分析(RSV抗原)。","C":"RSV是病毒,非細菌培養。","D":"血液厭氧培養用於厭氧菌,非RSV。"},"sources":["Nelson《兒科學》RSV","採檢"]}},"114100-N4-39":{"quick":"18個月細支氣管炎最適當敘述是「主要為飛沫及接觸傳染」。","detail":{"background":"細支氣管炎(bronchiolitis):最常見致病原是呼吸道融合病毒(RSV),好發1歲以內嬰兒(下呼吸道感染)、冬春季(1~5月),經飛沫與接觸傳染;表現流鼻水、咳嗽、呼吸喘、喘鳴、呼吸窘迫;嚴重呼吸困難→呼吸性酸中毒。診斷:鼻咽分泌物RSV抗原/免疫分析;治療支持療法(氧氣、補水、抽痰);Ribavirin吸入抗病毒、RSV免疫球蛋白(palivizumab)預防高危嬰兒。 (1)「主要飛沫及接觸傳染」——正確;(2)細支氣管炎是呼氣性喘鳴(wheeze)(本題B「吸氣喘鳴」不精確;喘鳴wheeze為呼氣),B不精確;(3)最常見RSV病毒(非肺炎鏈球菌),C錯;(4)嚴重時呼吸性酸中毒(非鹼中毒),D錯。本題為A。","options":{"A":"正確。主要為飛沫及接觸傳染。","B":"喘鳴(wheeze)為呼氣性,「吸氣喘鳴」不精確。","C":"錯。最常見RSV病毒(非肺炎鏈球菌)。","D":"錯。嚴重時呼吸性酸中毒(非鹼中毒)。"},"sources":["Nelson《兒科學》細支氣管炎","傳染"]}},"102030-N4-50":{"quick":"9歲肺炎做噴霧及姿位引流,最適宜的護理指導是「執行治療前,應先提供具體圖片或物體向王小弟解說」。","detail":{"background":"學齡期(9歲,具體運思期)兒童:能理解具體的圖片/物體說明,治療前應先以具體方式解說(減焦慮、增配合)。本題最適宜為「先提供具體圖片或物體解說」(A);治療前不解說(B錯,反增預期焦慮)、9歲對非具體無法理解只說給父母(C錯,9歲能理解具體說明)、只能了解親眼所見當時才說(D錯)。本題為A。","options":{"A":"正確。治療前先用具體圖片/物體向其解說。","B":"錯。不解說反增預期焦慮。","C":"錯。9歲(具體運思)能理解具體說明,非只說給父母。","D":"錯。9歲不限於當時親眼所見才解說。"},"sources":["Nelson《兒科學》學齡期","解說"]}},"103100-N4-64":{"quick":"3歲肺炎小型噴霧治療目的中「增加肺泡表面張力」為錯誤。","detail":{"background":"兒童肺炎:細菌性(肺炎鏈球菌等)高燒、痰多黏稠、濕囉音、傳染力低;病毒性傳染力高;黴漿菌(mycoplasma)肺炎好發學齡兒童/青少年、病程漸進、乾咳為主、痰少、肺外症狀、X光浸潤、治療紅黴素類(erythromycin/azithromycin大環內酯)(無細胞壁,β-lactam無效)。噴霧治療(nebulizer)目的:稀釋痰液、濕潤呼吸道、擴張支氣管(不是增加表面張力)。胸腔物理治療順序:噴霧→姿位引流→叩擊震顫→抽痰,時機餐前或餐後1~2小時。囊性纖維化(cystic fibrosis):體染色體隱性遺傳、外分泌腺異常、痰黏稠、胰酵素不足→補胰酵素+脂溶性維生素、高熱量高蛋白高鹽、多水分;禁止咳劑/抗組織胺(會使痰更難排)。 噴霧治療(nebulizer)目的:稀釋(鬆動)痰液、擴張支氣管、濕潤呼吸道黏膜。「增加肺泡表面張力錯誤——噴霧不會也不應增加表面張力(表面張力素是降低表面張力防肺泡塌陷;噴霧目的是濕化稀痰)」。本題「錯誤」者為C。","options":{"A":"正確。稀釋痰液。","B":"正確。擴張支氣管。","C":"錯誤(本題答案)。噴霧不會增加肺泡表面張力。","D":"正確。濕潤呼吸道黏膜。"},"sources":["Nelson《兒科學》噴霧治療","目的"]}},"105030-N4-59":{"quick":"9個月肺炎、右腋下區爆裂音,較能有效引流痰液的姿位是「左側臥,抬高臀部20公分」。","detail":{"background":"姿位引流使有痰的肺節在最高處利重力引流。右腋下區(右中葉/右側)有痰→應左側臥(右側朝上)、抬高臀部(頭低)使右側痰引流。本題為「左側臥、抬高臀部20公分」(B);右側臥會壓住患側、俯臥/仰臥非針對右側。本題為B。","options":{"A":"右側臥會壓住患側(右),不利右側引流。","B":"正確。左側臥(右側朝上)、抬高臀部利右側引流。","C":"俯臥頭低引流下葉後節,非右腋下。","D":"仰臥引流前胸,非右腋下。"},"sources":["Nelson《兒科學》姿位引流","側臥"]}},"106030-N4-61":{"quick":"6歲肺炎、左肺上葉前節濕囉音,胸腔物理治療正確的是「先行噴霧治療,再行姿位引流與叩擊」。","detail":{"background":"兒童肺炎:細菌性(肺炎鏈球菌等)高燒、痰多黏稠、濕囉音、傳染力低;病毒性傳染力高;黴漿菌(mycoplasma)肺炎好發學齡兒童/青少年、病程漸進、乾咳為主、痰少、肺外症狀、X光浸潤、治療紅黴素類(erythromycin/azithromycin大環內酯)(無細胞壁,β-lactam無效)。噴霧治療(nebulizer)目的:稀釋痰液、濕潤呼吸道、擴張支氣管(不是增加表面張力)。胸腔物理治療順序:噴霧→姿位引流→叩擊震顫→抽痰,時機餐前或餐後1~2小時。囊性纖維化(cystic fibrosis):體染色體隱性遺傳、外分泌腺異常、痰黏稠、胰酵素不足→補胰酵素+脂溶性維生素、高熱量高蛋白高鹽、多水分;禁止咳劑/抗組織胺(會使痰更難排)。 胸腔物理治療順序:噴霧(稀痰)→姿位引流→叩擊震顫→抽痰。本題正確為「先噴霧再姿位引流與叩擊」(A);(B)時機宜餐前或餐後1~2小時(非飯前/後半小時);(C)超音波噴霧器水槽加蒸餾水(非生理食鹽水);(D)上葉前節引流採仰臥(非俯臥)、拍前胸。本題為A。","options":{"A":"正確。先噴霧治療,再姿位引流與叩擊。","B":"時機宜餐前/餐後1~2小時(非半小時)。","C":"超音波噴霧器水槽加蒸餾水(非生理食鹽水)。","D":"上葉前節採仰臥拍前胸(非俯臥拍背)。"},"sources":["Nelson《兒科學》CPT","順序"]}},"106110-N4-61":{"quick":"黴漿菌性肺炎(mycoplasma)臨床表徵正確的是「血清檢查可發現特定抗體濃度升高,白血球數值可能正常」。","detail":{"background":"兒童肺炎:細菌性(肺炎鏈球菌等)高燒、痰多黏稠、濕囉音、傳染力低;病毒性傳染力高;黴漿菌(mycoplasma)肺炎好發學齡兒童/青少年、病程漸進、乾咳為主、痰少、肺外症狀、X光浸潤、治療紅黴素類(erythromycin/azithromycin大環內酯)(無細胞壁,β-lactam無效)。噴霧治療(nebulizer)目的:稀釋痰液、濕潤呼吸道、擴張支氣管(不是增加表面張力)。胸腔物理治療順序:噴霧→姿位引流→叩擊震顫→抽痰,時機餐前或餐後1~2小時。囊性纖維化(cystic fibrosis):體染色體隱性遺傳、外分泌腺異常、痰黏稠、胰酵素不足→補胰酵素+脂溶性維生素、高熱量高蛋白高鹽、多水分;禁止咳劑/抗組織胺(會使痰更難排)。 黴漿菌肺炎:(1)病程漸進(非快速),可有發燒但非急驟高燒,A錯;(2)常間質性浸潤(非典型肺炎),B「肺葉/呼氣末囉音」不典型;(3)以乾咳為主、痰少(非痰多),C錯;(4)「血清特定抗體(冷凝集素/黴漿菌抗體)升高、白血球可能正常」——正確。本題為D。","options":{"A":"錯。黴漿菌肺炎病程漸進(非快速高燒)。","B":"黴漿菌多間質性浸潤,「肺葉/呼氣末囉音」不典型。","C":"錯。以乾咳為主、痰少(非痰多)。","D":"正確。血清特定抗體升高,白血球可能正常。"},"sources":["Nelson《兒科學》黴漿菌肺炎","抗體"]}},"108020-N4-65":{"quick":"囊性纖維變性(Cystic Fibrosis)敘述中「止咳劑及抗組織胺藥物可協助改善呼吸道分泌物排除」為錯誤。","detail":{"background":"兒童肺炎:細菌性(肺炎鏈球菌等)高燒、痰多黏稠、濕囉音、傳染力低;病毒性傳染力高;黴漿菌(mycoplasma)肺炎好發學齡兒童/青少年、病程漸進、乾咳為主、痰少、肺外症狀、X光浸潤、治療紅黴素類(erythromycin/azithromycin大環內酯)(無細胞壁,β-lactam無效)。噴霧治療(nebulizer)目的:稀釋痰液、濕潤呼吸道、擴張支氣管(不是增加表面張力)。胸腔物理治療順序:噴霧→姿位引流→叩擊震顫→抽痰,時機餐前或餐後1~2小時。囊性纖維化(cystic fibrosis):體染色體隱性遺傳、外分泌腺異常、痰黏稠、胰酵素不足→補胰酵素+脂溶性維生素、高熱量高蛋白高鹽、多水分;禁止咳劑/抗組織胺(會使痰更難排)。 囊性纖維化:體染色體隱性遺傳(諮詢)、補胰酵素+脂溶性維生素(本題C「鐵劑」應為脂溶性維生素;但本題錯誤項為B)、高熱量高蛋白多水分。「止咳劑+抗組織胺改善分泌物排除錯誤——止咳劑會抑制咳嗽(痰排不出)、抗組織胺使分泌物更黏稠難排,囊纖維化禁用,應協助排痰(胸腔物理治療、化痰)」。本題「錯誤」者為B。","options":{"A":"正確。體染色體隱性遺傳,提供遺傳諮詢。","B":"錯誤(本題答案)。止咳劑/抗組織胺使痰更難排,囊纖維化禁用。","C":"多為正確(胰酵素+脂溶性維生素;鐵劑非重點)。","D":"正確。高熱量高蛋白、大量水分。"},"sources":["Nelson《兒科學》囊性纖維化","禁止咳劑"]}},"108110-N4-70":{"quick":"7歲黴漿菌感染性肺炎正確的是「使用藥物為erythromycin或azithromycin」。","detail":{"background":"兒童肺炎:細菌性(肺炎鏈球菌等)高燒、痰多黏稠、濕囉音、傳染力低;病毒性傳染力高;黴漿菌(mycoplasma)肺炎好發學齡兒童/青少年、病程漸進、乾咳為主、痰少、肺外症狀、X光浸潤、治療紅黴素類(erythromycin/azithromycin大環內酯)(無細胞壁,β-lactam無效)。噴霧治療(nebulizer)目的:稀釋痰液、濕潤呼吸道、擴張支氣管(不是增加表面張力)。胸腔物理治療順序:噴霧→姿位引流→叩擊震顫→抽痰,時機餐前或餐後1~2小時。囊性纖維化(cystic fibrosis):體染色體隱性遺傳、外分泌腺異常、痰黏稠、胰酵素不足→補胰酵素+脂溶性維生素、高熱量高蛋白高鹽、多水分;禁止咳劑/抗組織胺(會使痰更難排)。 黴漿菌肺炎:(1)好發學齡兒童/青少年(5歲以上)(非1~3歲),A錯;(2)「治療用紅黴素類(erythromycin)或azithromycin(大環內酯類)(黴漿菌無細胞壁,β-lactam無效)」——正確;(3)主要飛沫傳染(非接觸),C不精確;(4)由黴漿菌(非腺病毒)引起,D錯。本題為B。","options":{"A":"錯。好發學齡兒童/青少年(非1~3歲)。","B":"正確。用erythromycin或azithromycin。","C":"主要飛沫傳染,「接觸」不精確。","D":"錯。由黴漿菌引起(非腺病毒)。"},"sources":["Nelson《兒科學》黴漿菌肺炎","大環內酯"]}},"110030-N4-61":{"quick":"8個月支氣管肺炎護理中「每當小傑看見父母時都會大哭,宜避免父母親參與照顧」不適當。","detail":{"background":"兒童肺炎住院護理:呼吸評估給氧、集中護理節省體力、抬高床頭利肺擴張皆適當。「因看見父母會大哭避免父母參與照顧不適當——分離焦慮需父母陪伴(看見父母哭是分離焦慮的抗議,陪伴才能安撫),不應避免父母參與」。本題不適當者為C。","options":{"A":"適當。呼吸評估、依醫囑給氧。","B":"適當。採集中護理、促休息節省體力。","C":"不適當(本題答案)。分離焦慮需父母陪伴,不應避免父母參與。","D":"適當。抬高床頭給舒適臥姿促肺擴張。"},"sources":["Nelson《兒科學》肺炎住院","父母陪伴"]}},"112110-N4-61":{"quick":"傳染力最低的肺炎是「細菌性肺炎」。","detail":{"background":"兒童肺炎:細菌性(肺炎鏈球菌等)高燒、痰多黏稠、濕囉音、傳染力低;病毒性傳染力高;黴漿菌(mycoplasma)肺炎好發學齡兒童/青少年、病程漸進、乾咳為主、痰少、肺外症狀、X光浸潤、治療紅黴素類(erythromycin/azithromycin大環內酯)(無細胞壁,β-lactam無效)。噴霧治療(nebulizer)目的:稀釋痰液、濕潤呼吸道、擴張支氣管(不是增加表面張力)。胸腔物理治療順序:噴霧→姿位引流→叩擊震顫→抽痰,時機餐前或餐後1~2小時。囊性纖維化(cystic fibrosis):體染色體隱性遺傳、外分泌腺異常、痰黏稠、胰酵素不足→補胰酵素+脂溶性維生素、高熱量高蛋白高鹽、多水分;禁止咳劑/抗組織胺(會使痰更難排)。 肺炎傳染力:細菌性肺炎傳染力最低(多為自身菌叢/吸入,人傳人弱);病毒性、黴漿菌(飛沫)、間質性傳染力較高。本題傳染力最低為「細菌性肺炎」(A)。","options":{"A":"正確。細菌性肺炎傳染力最低。","B":"病毒性肺炎傳染力高(飛沫)。","C":"黴漿菌肺炎飛沫傳染力較高。","D":"間質性肺炎(多病毒)傳染力較高。"},"sources":["Nelson《兒科學》肺炎","傳染力"]}},"113100-N4-39":{"quick":"細菌性肺炎(bacterial pneumonia)敘述正確的是「痰液量多且黏稠」。","detail":{"background":"兒童肺炎:細菌性(肺炎鏈球菌等)高燒、痰多黏稠、濕囉音、傳染力低;病毒性傳染力高;黴漿菌(mycoplasma)肺炎好發學齡兒童/青少年、病程漸進、乾咳為主、痰少、肺外症狀、X光浸潤、治療紅黴素類(erythromycin/azithromycin大環內酯)(無細胞壁,β-lactam無效)。噴霧治療(nebulizer)目的:稀釋痰液、濕潤呼吸道、擴張支氣管(不是增加表面張力)。胸腔物理治療順序:噴霧→姿位引流→叩擊震顫→抽痰,時機餐前或餐後1~2小時。囊性纖維化(cystic fibrosis):體染色體隱性遺傳、外分泌腺異常、痰黏稠、胰酵素不足→補胰酵素+脂溶性維生素、高熱量高蛋白高鹽、多水分;禁止咳劑/抗組織胺(會使痰更難排)。 細菌性肺炎:(1)傳染力低,一般不需呼吸道隔離,A錯;(2)聽診濕囉音(crackle)(stridor是上呼吸道),B錯;(3)「痰液量多且黏稠(細菌性產化膿性痰)」——正確;(4)多高燒(非體溫正常),D錯。本題為C。","options":{"A":"錯。細菌性肺炎傳染力低,一般不需呼吸道隔離。","B":"錯。聽診濕囉音(stridor是上呼吸道)。","C":"正確。痰液量多且黏稠。","D":"錯。多為高燒(非體溫正常)。"},"sources":["Nelson《兒科學》細菌性肺炎","痰"]}},"114030-N4-39":{"quick":"黴漿菌性肺炎(mycoplasma)敘述正確的是「使用藥物為erythromycin或azithromycin」。","detail":{"background":"兒童肺炎:細菌性(肺炎鏈球菌等)高燒、痰多黏稠、濕囉音、傳染力低;病毒性傳染力高;黴漿菌(mycoplasma)肺炎好發學齡兒童/青少年、病程漸進、乾咳為主、痰少、肺外症狀、X光浸潤、治療紅黴素類(erythromycin/azithromycin大環內酯)(無細胞壁,β-lactam無效)。噴霧治療(nebulizer)目的:稀釋痰液、濕潤呼吸道、擴張支氣管(不是增加表面張力)。胸腔物理治療順序:噴霧→姿位引流→叩擊震顫→抽痰,時機餐前或餐後1~2小時。囊性纖維化(cystic fibrosis):體染色體隱性遺傳、外分泌腺異常、痰黏稠、胰酵素不足→補胰酵素+脂溶性維生素、高熱量高蛋白高鹽、多水分;禁止咳劑/抗組織胺(會使痰更難排)。 黴漿菌肺炎:(1)常見乾咳,呼吸音多為囉音/喘鳴(肋膜摩擦音非典型),A不典型;(2)由黴漿菌(非肺炎雙球菌)引起,B錯;(3)以乾咳為主、痰少(非痰多黃綠),C錯;(4)「治療用erythromycin或azithromycin(大環內酯)」——正確。本題為D。","options":{"A":"肋膜摩擦音非黴漿菌典型呼吸音。","B":"錯。由黴漿菌引起(非肺炎雙球菌)。","C":"錯。以乾咳為主、痰少(非痰多黃綠)。","D":"正確。用erythromycin或azithromycin。"},"sources":["Nelson《兒科學》黴漿菌肺炎","大環內酯"]}},"101110-N4-12":{"quick":"25週早產兒呼吸問題正確的是「如果呼吸過喘應避免給予餵食,以免嗆奶吸入肺內」。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 早產兒(25週)RDS:(1)呼吸窘迫嚴重度以鼻翼搧動、肋間/胸骨凹陷、呼氣咕嚕聲評(非僅腹部起伏),A不全;(2)表面張力素氣管內(滴入肺)給(非靜脈注射),B錯;(3)氧療維持SpO2約90~95%(非95~100%,過高致ROP),C錯;(4)「呼吸過喘時避免餵食(防嗆奶吸入),改靜脈/管餵」——正確。本題為D。","options":{"A":"呼吸窘迫嚴重度看凹陷/搧動/咕嚕聲,非僅腹部起伏。","B":"錯。表面張力素經氣管內給(非靜脈)。","C":"錯。SpO2維持約90~95%(過高致ROP)。","D":"正確。呼吸過喘應避免餵食,防嗆奶吸入。"},"sources":["Nelson《兒科學》RDS","餵食"]}},"102030-N4-28":{"quick":"成功建立新生兒呼吸的敘述中「肺泡表面張力素可於吸氣期使肺成功膨脹」為錯誤。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 (1)陰道產胸部受擠壓約1/3肺液由口鼻流出——正確;(2)冷刺激引發第一次呼吸——正確;(3)剖腹產未經擠壓較易短暫性呼吸窘迫——正確;(4)「表面張力素在吸氣期使肺膨脹」錯誤——表面張力素的作用是降低肺泡表面張力、防呼氣時肺泡塌陷(維持肺餘容積)(非吸氣期使肺膨脹)。本題「錯誤」者為D。","options":{"A":"正確。陰道產約1/3肺液由口鼻流出。","B":"正確。冷刺激引發第一次呼吸。","C":"正確。剖腹產較易短暫性呼吸窘迫。","D":"錯誤(本題答案)。表面張力素防呼氣時肺泡塌陷(非吸氣期使肺膨脹)。"},"sources":["Nelson《兒科學》表面張力素","呼氣"]}},"103030-N4-61":{"quick":"早產兒持續給氧、氧氣需濕化的最恰當回答是「氧氣必須潮濕,以避免呼吸道黏膜太乾燥」。","detail":{"background":"氧氣濕化(潮濕瓶)目的:氧氣乾燥,直接吸入會使呼吸道黏膜乾燥、痰液變稠、纖毛功能受損,故須濕化(無菌蒸餾水)避免黏膜太乾燥。本題最恰當為「氧氣必須潮濕,避免呼吸道黏膜太乾燥」(C);促血液循環、促肺擴張、預防肺炎非濕化的主要目的。本題為C。","options":{"A":"潮濕氧氣非為促進血液循環。","B":"濕氣非為促進肺擴張。","C":"正確。濕化氧氣避免呼吸道黏膜太乾燥。","D":"濕化非為預防肺炎。"},"sources":["Nelson《兒科學》氧療","濕化"]}},"104030-N4-51":{"quick":"28週早產兒呼吸窘迫護理中「產後須靜脈滴注類固醇治療」為錯誤。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 早產兒RDS護理:氧療密切監測氧濃度、觀察呼吸速率/鼻翼搧動/肋間凹陷、無自發呼吸插管。「產後靜脈滴注類固醇治療RDS」錯誤——類固醇用於產前給母親促胎兒肺成熟(產前betamethasone/dexamethasone),非產後給新生兒靜脈類固醇治RDS(RDS用表面張力素);產後靜脈類固醇有副作用」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。類固醇用於產前給母親促肺成熟,非產後靜脈給新生兒。","B":"正確。氧療時密切監測氧氣濃度。","C":"正確。觀察呼吸速率、鼻翼擴張、肋間凹陷。","D":"正確。無自發性呼吸時插管使用呼吸器。"},"sources":["Nelson《兒科學》RDS","產前類固醇"]}},"106110-N4-28":{"quick":"新生兒呼吸系統敘述中「陰道生產較剖腹生產的新生兒易發生短暫的呼吸窘迫」為錯誤。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 (1)內在化學刺激(主動脈頸動脈接受器)傳呼吸中樞引發呼吸——正確;(2)「陰道生產較剖腹易短暫呼吸窘迫」錯誤——相反:剖腹產未經產道擠壓排肺液,較易短暫性呼吸窘迫(TTN);(3)外在溫度刺激引發呼吸——正確;(4)表面張力素防肺塌陷——正確。本題「錯誤」者為B。","options":{"A":"正確。內在化學刺激傳呼吸中樞引發呼吸。","B":"錯誤(本題答案)。是剖腹產較易短暫呼吸窘迫(非陰道產)。","C":"正確。外在溫度刺激引發呼吸。","D":"正確。表面張力素可預防肺部塌陷。"},"sources":["Nelson《兒科學》新生兒呼吸","剖腹產"]}},"107030-N4-25":{"quick":"新生兒首次呼吸機轉正確的是「出生後,肺擴張促使呼吸道液體進入微血管」。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 首次呼吸機轉:(1)斷臍使血中二氧化碳升高、氧降低→化學刺激引發呼吸(非CO2降低),A錯;(2)產道擠壓使肺液部分(約1/3)排出(非全部),B錯;(3)胸部娩出後反彈形成胸部負壓吸入空氣(非正壓),C錯;(4)「出生後肺擴張促使呼吸道液體進入微血管/淋巴」——正確。本題為D。","options":{"A":"錯。斷臍使CO2升高(非降低)刺激呼吸。","B":"錯。產道擠壓使肺液部分排出(非全部)。","C":"錯。胸部反彈形成負壓吸入空氣(非正壓)。","D":"正確。肺擴張促呼吸道液體進入微血管。"},"sources":["Nelson《兒科學》首次呼吸","肺液"]}},"107110-N4-44":{"quick":"9個月細支氣管合併肺炎出院胸腔物理治療指導正確的是「最佳的姿位引流時間,宜安排在飯前1小時或飯後2小時執行」。","detail":{"background":"居家胸腔物理治療指導:(1)順序先姿位引流再噴霧?正確順序是噴霧→姿位引流→叩擊,A「先引流再噴霧」順序錯;(2)每姿位引流約3~5分鐘(非15~30分鐘過長),B錯;(3)出現呼吸窘迫/躁動應停止(非繼續),C錯;(4)「最佳時間飯前1小時或飯後2小時(避免嘔吐吸入)」——正確。本題為D。","options":{"A":"錯。順序應先噴霧再姿位引流(非先引流再噴霧)。","B":"錯。每姿位引流約3~5分鐘(非15~30分鐘)。","C":"錯。出現呼吸窘迫/躁動應停止(非繼續)。","D":"正確。飯前1小時或飯後2小時執行。"},"sources":["Nelson《兒科學》CPT","時機"]}},"107110-N4-65":{"quick":"高危險新生兒呼吸窘迫症候群(RDS)敘述中「容易有呼吸性鹼中毒」為錯誤。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 RDS:(1)呼氣咕嚕聲(grunting)——正確;(2)缺乏表面張力素使肺泡塌陷——正確;(3)X光毛玻璃樣——正確;(4)「容易呼吸性鹼中毒」錯誤——RDS換氣不足CO2滯留→呼吸性酸中毒(非鹼),合併低血氧致代謝性酸中毒。本題「錯誤」者為D。","options":{"A":"正確。呼氣時出現咕嚕聲(grunting)。","B":"正確。缺乏表面張力素使肺泡塌陷。","C":"正確。兩側肺X光呈毛玻璃樣影像。","D":"錯誤(本題答案)。RDS是呼吸性酸中毒(非鹼)。"},"sources":["Nelson《兒科學》RDS","酸中毒"]}},"110030-N4-9":{"quick":"胎兒呼吸系統發育正確的是「肺表面張力素過少易造成新生兒呼吸窘迫症候群」。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 (1)表面張力素約妊娠24~28週開始製造,34~35週漸足(本題A「28週開始」大致符;但更標準是約24週起、35週足,A為近似);(2)胎兒在子宮內即有呼吸樣動作(非娩出後才開始),B錯;(3)子宮內呼吸樣動作不會造成羊水吸入(羊水正常進出),C錯;(4)「表面張力素過少→RDS」——正確。本題為D。","options":{"A":"表面張力素約24週起製造、35週漸足(「28週開始」為近似)。","B":"錯。胎兒在子宮內即有呼吸樣動作(非娩出後才開始)。","C":"錯。子宮內呼吸樣動作不會造成羊水吸入。","D":"正確。表面張力素過少易造成新生兒RDS。"},"sources":["Nelson《兒科學》胎兒肺發育","表面張力素"]}},"110030-N4-72":{"quick":"早產兒呼吸窘迫症候群護理措施正確的是「胸部X光表現為肺擴張不全,毛玻璃樣的變化」。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 (1)「X光肺擴張不全、毛玻璃樣變化(+支氣管充氣徵)」——正確;(2)表面張力素約24週起製造、35週漸足(本題B「32週才開始製造」不精確),B錯;(3)RDS臨床呼氣時咕嚕聲(grunting)(本題C「吸氣咕嚕聲」不精確),C錯;(4)呼吸性酸中毒為pH<7.20、PaCO2升高、PaO2下降(本題D「PaO2>50」描述不全),D錯。本題為A。","options":{"A":"正確。X光肺擴張不全、毛玻璃樣變化。","B":"錯。表面張力素約24週起製造、35週漸足(非32週才開始)。","C":"錯。RDS為呼氣時咕嚕聲(非吸氣)。","D":"錯。呼吸性酸中毒PaCO2升高、PaO2下降。"},"sources":["Nelson《兒科學》RDS","X光"]}},"111030-N4-55":{"quick":"新生兒胎便吸入症候群(MAS)敘述中「早產兒較常發生,主因是在子宮內缺氧」為錯誤。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 胎便吸入症候群(MAS):「早產兒較常發生」錯誤——MAS好發足月兒/過熟兒(過熟兒胎盤功能下降、易子宮內缺氧排胎便),非早產兒」;主因子宮內缺氧使胎便排出並吸入、黏稠胎便阻塞呼吸道、可致肺泡過度擴張破裂氣胸、出生後很快呼吸窘迫皆正確。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。MAS好發足月/過熟兒(非早產兒)。","B":"正確。黏稠胎便可能阻塞呼吸道。","C":"正確。肺泡過度擴張破裂可造成氣胸。","D":"正確。呼吸窘迫通常出生後很快出現。"},"sources":["Nelson《兒科學》MAS","過熟兒"]}},"111030-N4-57":{"quick":"早產兒RDS醫療處置中「使用CPAP壓力為8~12cmH2O」為錯誤。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 RDS處置:(1)氧氣頭罩流量>5 L/min避免CO2滯留——正確;(2)「CPAP壓力8~12 cmH2O」錯誤——CPAP常用壓力約4~7(~8)cmH2O,8~12過高(增氣胸風險);(3)CPAP用於有自發呼吸者——正確;(4)CPAP後仍窘迫需插管呼吸器——正確。本題「錯誤」者為B。","options":{"A":"正確。氧氣頭罩流量>5 L/min避免CO2滯留。","B":"錯誤(本題答案)。CPAP壓力約4~7 cmH2O(8~12過高)。","C":"正確。CPAP用於有自發性呼吸的早產兒。","D":"正確。CPAP後仍窘迫需插管使用呼吸器。"},"sources":["Nelson《兒科學》CPAP","壓力"]}},"111110-N4-54":{"quick":"早產兒CPAP敘述中「給予4~7 cmH2O壓力」為適當(本題不適當者另選)——本題答D。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 本題問不適當,答案D。CPAP:(1)適用可自行呼吸的RDS早產兒——正確;(2)壓力4~7 cmH2O——正確;(3)增加功能性肺餘容積(FRC)——正確;(4)「防吸氣時肺泡塌陷」不適當——CPAP是維持呼氣末正壓,防呼氣時肺泡塌陷(非吸氣時)。本題不適當者為D。","options":{"A":"正確。適用可自行呼吸之RDS早產兒。","B":"正確。給4~7 cmH2O壓力。","C":"正確。可增加功能性肺餘容積。","D":"不適當(本題答案)。CPAP防呼氣時肺泡塌陷(非吸氣時)。"},"sources":["Nelson《兒科學》CPAP","呼氣末正壓"]}},"111110-N4-61":{"quick":"呼吸道融合病毒(RSV)敘述中「是一種罕見病毒,罹患RSV嬰幼兒通常會低血氧及肺擴張不全」為錯誤。","detail":{"background":"呼吸道融合病毒(RSV):「是罕見病毒」錯誤——RSV很常見(非罕見),是嬰幼兒細支氣管炎/肺炎的最常見致病原;Ribavirin吸入抗病毒、RSV免疫球蛋白(palivizumab)預防高危嬰兒、可致呼吸窘迫與肺炎需住院皆正確。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。RSV是常見病毒(非罕見),為嬰幼兒細支氣管炎最常見致病原。","B":"正確。Ribavirin吸入可治療RSV。","C":"正確。RSV免疫球蛋白預防高危嬰兒感染。","D":"正確。RSV可引起呼吸窘迫和肺炎需入院。"},"sources":["Nelson《兒科學》RSV","常見"]}},"112180-N4-36":{"quick":"Silverman Anderson計分法評估早產兒呼吸窘迫,正確的是「觀察早產兒呼吸時有無困難情形,滿分為10分」。","detail":{"background":"斯佛門-安德生計分法(Silverman-Anderson score):評估早產兒呼吸窘迫程度,觀察上胸/下胸運動、劍突凹陷、鼻翼搧動、呼氣呻吟(grunting)5項,各0~2分,滿分10分;分數越高越嚴重(呼吸困難越重)(0分=無窘迫)。本題正確為「觀察呼吸困難情形,滿分10分」(A);分數高表示嚴重(B「越好」錯)、0分表示無困難(C「嚴重」錯)、評估呼氣呻吟(非吸氣咕嚕)+腹部與胸部不同步(D不全)。本題為A。","options":{"A":"正確。評估呼吸困難情形,滿分10分。","B":"錯。分數愈高表示愈嚴重(非愈好)。","C":"錯。0分表示無呼吸困難(非嚴重)。","D":"評估呼氣呻吟、胸腹不同步等(D敘述不全)。"},"sources":["Nelson《兒科學》Silverman","呼吸窘迫"]}},"113100-N4-34":{"quick":"早產兒常發生問題中「視網膜病變是因血氧過低或過高,使不成熟的視網膜血管收縮導致缺血」(本題錯誤項另選)——本題答C。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 本題問錯誤,答案C。(1)腦室內出血因生發基質血管脆弱——正確;(2)視網膜病變(ROP)與氧過高/過低致視網膜血管異常增生有關——大致正確;(3)「壞死性腸炎(NEC)主因腸胃道生理結構與消化功能不成熟」——本題判為錯誤:NEC主因腸道缺血缺氧+腸黏膜未成熟+餵食/細菌(非僅結構與消化功能不成熟,敘述不完整/有誤);(4)RDS缺表面張力素致肺擴張不全——正確。本題「錯誤」者為C。","options":{"A":"正確。腦室內出血因生發基質血管脆弱易破裂。","B":"視網膜病變與氧過高/過低致血管異常有關(大致正確)。","C":"錯誤(本題答案)。NEC主因腸道缺血缺氧+未成熟+餵食/細菌(非僅結構消化不成熟)。","D":"正確。RDS因缺乏表面張力素致肺擴張不全。"},"sources":["Nelson《兒科學》NEC","缺血"]}},"114170-N4-35":{"quick":"胎便吸入症候群(MAS)護理中「追蹤ABG結果,依醫囑矯正鹼中毒,補充體液」為不適當。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 MAS護理:觀察呼吸窘迫、定期X光看氣胸、呼吸未改善插管行氣管內胎便抽吸皆正確。「依醫囑矯正鹼中毒不適當——MAS呼吸窘迫致酸中毒(CO2滯留+缺氧),應矯正酸中毒(非鹼中毒)」。本題不適當者為B。","options":{"A":"適當。觀察是否有呼吸窘迫徵象。","B":"不適當(本題答案)。MAS是酸中毒,應矯正酸中毒(非鹼中毒)。","C":"適當。定期X光追蹤是否出現氣胸。","D":"適當。呼吸未改善則插管、氣管內胎便抽吸。"},"sources":["Nelson《兒科學》MAS","酸中毒"]}},"115030-N4-34":{"quick":"27週RDS(毛玻璃樣X光)醫療處置與護理正確的是「定期以ABG或脈衝式血氧定量儀檢查血氧飽和度」。","detail":{"background":"新生兒呼吸:首次呼吸機轉=產道擠壓使肺液排出+出生冷刺激、缺氧/高碳酸化學刺激主動脈頸動脈接受器、肺擴張使肺液入微血管/淋巴；剖腹產未經產道擠壓→較易短暫性呼吸窘迫。表面張力素(surfactant)降低肺泡表面張力、防呼氣時肺泡塌陷,約妊娠34~35週(28週開始製造)漸足。早產兒呼吸窘迫症候群(RDS)=缺乏表面張力素→肺泡塌陷、肺擴張不全,表現呼氣性咕嚕聲(grunting)、鼻翼搧動、肋間/胸骨凹陷、發紺、X光毛玻璃樣、支氣管充氣徵、ABG呼吸性酸中毒(非鹼);處置補表面張力素(氣管內滴入)、氧療(維持SpO2約90~95%非100%)、CPAP(4~7 cmH2O,有自發呼吸者)、無自發呼吸插管呼吸器、產前類固醇促肺成熟。早產兒其他問題:腦室內出血(生發基質血管脆弱)、視網膜病變(ROP,氧過高)、壞死性腸炎、呼吸暫停(中樞未成熟)、高膽紅素血症。胎便吸入症候群(MAS)=足月/過熟兒在子宮內缺氧致胎便排出並吸入→阻塞呼吸道/氣胸,出生後很快呼吸窘迫。 (1)「定期ABG/脈衝式血氧監測血氧飽和度(維持適當氧合、避免過高致ROP)」——正確;(2)類固醇用於產前給母親(非出生後肌注新生兒),B錯;(3)無自發呼吸應插管呼吸器(非CPAP;CPAP需自發呼吸),C錯;(4)抽吸壓力宜60~80(嬰兒)mmHg、時間<10秒(80~100/8~10秒過高過久),D錯。本題為A。","options":{"A":"正確。定期ABG或脈衝式血氧監測血氧飽和度。","B":"錯。類固醇產前給母親(非出生後肌注新生兒)。","C":"錯。無自發呼吸應插管呼吸器(CPAP需自發呼吸)。","D":"錯。嬰兒抽吸壓力宜較低、時間<10秒。"},"sources":["Nelson《兒科學》RDS","血氧監測"]}},"104030-N4-61":{"quick":"有效執行胸腔物理治療的最佳順序是「②噴霧治療→③姿位引流→④拍背叩擊→①抽痰(即2→3→4→1)」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 正確順序:②噴霧(稀痰)→③姿位引流(重力)→④拍背叩擊(鬆痰)→①抽痰(清除)。本題為「2→3→4→1」(A)。","options":{"A":"正確。噴霧→姿位引流→拍背叩擊→抽痰(2341)。","B":"4→3→2→1順序不符(叩擊在引流前)。","C":"3→1→4→2順序錯亂。","D":"1→2→3→4(抽痰在最前)錯。"},"sources":["Nelson《兒科學》CPT","順序"]}},"104030-N4-75":{"quick":"9歲慢性肺疾病抽痰,每次抽痰時間與壓力正確的是「時間10秒以內,壓力100~120 mmHg」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 兒童(學齡期)抽痰:時間每次10秒以內、壓力約100~120 mmHg(年幼者更低)。本題正確為「10秒以內、100~120 mmHg」(C);3~5秒/60~80(時間過短)、5~8秒/120~150(壓力過高)、10~15秒/120~150(時間長壓力高)皆不符。本題為C。","options":{"A":"3~5秒過短、60~80偏低。","B":"120~150壓力過高。","C":"正確。時間10秒以內、壓力100~120 mmHg。","D":"10~15秒過久、120~150過高。"},"sources":["Nelson《兒科學》抽痰","壓力"]}},"105090-N4-59":{"quick":"小型噴霧治療(micro-nebulizer)護理中「藥杯與噴霧器每天清洗一次」為錯誤。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 噴霧治療:藥物+生理食鹽水入藥杯、氧氣流量6~8 L/min、噴霧器垂直使氣動產生2~5μm粒子、限個人單獨使用皆正確。「藥杯與噴霧器每天清洗一次錯誤——噴霧器藥杯應每次使用後即清洗晾乾(防細菌孳生/交叉感染),非每天一次」。本題「錯誤」者為D。","options":{"A":"正確。藥物與生理食鹽水入藥杯、氧氣流量6~8 L/min。","B":"正確。噴霧器垂直使藥變2~5μm粒子。","C":"正確。嬰兒可將噴霧器架於氧氣頭罩上。","D":"錯誤(本題答案)。藥杯噴霧器應每次用後即清洗(非每天一次)。"},"sources":["Nelson《兒科學》噴霧器","清洗"]}},"106030-N4-60":{"quick":"嬰兒及兒童氧氣治療敘述正確的是「使用氧氣頭罩時,氧氣流量約調為5 L/min,以免二氧化碳滯留」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 (1)鼻套管流量低(約0.5~2 L/min),但「不可超過2」非絕對,A敘述偏狹;(2)氧氣面罩流量需>5~6 L/min(非不可超過6)(太低會CO2滯留),B錯;(3)「氧氣頭罩流量約5 L/min以上(避免CO2滯留)」——正確;(4)氧氣帳流量需較大(10~15 L/min)維持濃度(非3 L/min),D錯。本題為C。","options":{"A":"鼻套管流量低,但敘述偏狹。","B":"錯。氧氣面罩需>5~6 L/min(太低會CO2滯留)。","C":"正確。氧氣頭罩約5 L/min以上,避免CO2滯留。","D":"錯。氧氣帳需較大流量維持濃度(非3 L/min)。"},"sources":["Nelson《兒科學》氧療","頭罩"]}},"106111-N4-77":{"quick":"早產兒支氣管肺發育不良叩擊震顫中「每個部位至少叩擊10~15分鐘」為錯誤。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 叩擊震顫:在姿位引流後進行、手弓成杯狀手指併攏腕部放鬆、有出血危險時不執行皆正確。「每部位叩擊10~15分鐘錯誤——每部位叩擊約1~2分鐘(10~15分鐘過久,嬰幼兒易疲累/低血氧)」。本題「錯誤」者為C。","options":{"A":"正確。在姿位引流後進行叩擊震顫。","B":"正確。手弓成杯狀、手指併攏、腕部放鬆。","C":"錯誤(本題答案)。每部位叩擊約1~2分鐘(非10~15分鐘)。","D":"正確。有出血危險時不宜執行叩擊震顫。"},"sources":["Nelson《兒科學》叩擊","時間"]}},"107030-N4-70":{"quick":"1歲2個月細支氣管炎胸腔物理治療正確的是「採用頭低腳高的姿位,進行叩擊」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 (1)「下肺葉痰採頭低腳高(姿位引流利重力)進行叩擊」——正確;(2)時機宜餐前或餐後1~2小時(非飯前/後30分鐘剛吃飽),B不精確;(3)每次執行約20~30分鐘(含各步驟)或每部位1~2分鐘(非整體5分鐘),C不精確;(4)叩擊避開脊椎(突出處)(不可加強脊椎),D錯。本題為A。","options":{"A":"正確。下肺葉痰採頭低腳高姿位引流叩擊。","B":"時機宜餐前/餐後1~2小時(非30分鐘)。","C":"每部位約1~2分鐘(非整體5分鐘)。","D":"錯。叩擊避開脊椎突出處(不可加強)。"},"sources":["Nelson《兒科學》CPT","頭低腳高"]}},"107110-N4-45":{"quick":"嬰幼兒胸腔物理治療叩擊不適當的是「為達鬆動痰液較佳效果,可直接拍擊病童裸露的皮膚」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 叩擊:在姿位引流後執行、手指併攏弓成杯狀規律叩擊、每部位約1~2分鐘皆適當。「直接拍擊裸露皮膚不適當——應隔一層薄布/衣物叩擊(避免直接拍裸露皮膚致疼痛/紅腫/皮膚受損)」。本題不適當者為C。","options":{"A":"適當。叩擊在姿位引流後執行。","B":"適當。手指併攏弓為杯狀規律叩擊。","C":"不適當(本題答案)。應隔薄布叩擊,不可直接拍裸露皮膚。","D":"適當。每部位約1~2分鐘,視情況增減。"},"sources":["Nelson《兒科學》叩擊","薄布"]}},"108020-N4-68":{"quick":"氧氣治療敘述正確的是「氧氣帳內應以氧氣分析儀在病童口鼻處測試氧氣濃度」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 (1)氧氣頭罩濕化用無菌蒸餾水(非生理食鹽水),A錯;(2)氧氣面罩流量需>5~6 L/min(1~3 L/min過低致CO2滯留),B錯;(3)氧氣帳內不可放會產生火花的手機/平板(3C)(助燃環境危險),C錯;(4)「氧氣帳氧濃度分析儀放病童口鼻處測(最接近吸入濃度)」——正確。本題為D。","options":{"A":"錯。氧氣頭罩濕化用無菌蒸餾水(非生理食鹽水)。","B":"錯。氧氣面罩需>5~6 L/min(1~3過低致CO2滯留)。","C":"錯。氧氣帳內不可放手機/平板(火花危險)。","D":"正確。氧濃度分析儀放病童口鼻處測。"},"sources":["Nelson《兒科學》氧療","口鼻處"]}},"108110-N4-69":{"quick":"利用重力使肺內分泌物易流至較大支氣管以利排除的胸腔物理治療是「姿位引流」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 姿位引流(postural drainage)=利用重力原理,使有痰的肺節在最高處,分泌物流向較大支氣管以利排出。本題為「姿位引流」(B);震顫、叩擊是鬆動痰液(機械),抽痰是直接抽吸。本題為B。","options":{"A":"震顫是機械鬆動痰液,非重力。","B":"正確。姿位引流利用重力使分泌物流向大支氣管。","C":"叩擊是機械鬆動痰液。","D":"抽痰是直接抽吸,非重力。"},"sources":["Nelson《兒科學》姿位引流","重力"]}},"109030-N4-70":{"quick":"5個月細支氣管炎抽痰正確的是「抽痰前後宜給予適當的氧氣吸入,以避免缺氧」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 (1)抽痰順序無菌處先(氣管內管→鼻→口)(本題A「先口腔再鼻腔」順序錯,口腔最髒應最後),A錯;(2)「抽痰前後給氧避免缺氧」——正確;(3)抽吸時間每次<10秒(嬰幼兒)(12~15秒過久致缺氧),C錯;(4)嬰幼兒抽吸壓力約60~100 mmHg(110~130過高),D錯。本題為B。","options":{"A":"錯。抽痰順序鼻→口(口腔最髒應後),非先口再鼻。","B":"正確。抽痰前後給氧避免缺氧。","C":"錯。抽吸時間嬰幼兒<10秒(非12~15秒)。","D":"錯。嬰幼兒抽吸壓力約60~100 mmHg(非110~130)。"},"sources":["Nelson《兒科學》抽痰","給氧"]}},"109110-N4-61":{"quick":"氧氣帳(O2 tent)照護較適當的是「儘量以集中護理的方式,維持帳內的氧氣濃度」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 氧氣帳:維持高濃度、高濕度(非低濕度)、低溫、採集中護理減少開帳次數維持帳內氧濃度。本題較適當為「集中護理維持帳內氧濃度」(B);維持低濕度(A錯,應高濕度)、照顧者於帳內陪伴(會降低帳內氧濃度,C不宜)、電動玩具入帳(火花危險,D錯)。本題為B。","options":{"A":"錯。氧氣帳應維持高濕度(非低濕度)。","B":"正確。集中護理維持帳內氧氣濃度。","C":"照顧者於帳內會降低氧濃度,不宜。","D":"錯。電動玩具入帳有火花危險。"},"sources":["Nelson《兒科學》氧氣帳","集中護理"]}},"110030-N4-63":{"quick":"2歲肺下葉上節痰液,姿位引流最適當的是「俯臥,頭放低15度」(本題D)。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 姿位引流依肺節擺位:下葉上(背)節→俯臥,頭放低約15度(或平躺),拍背下部(使該節在高處)。本題下葉上節為「俯臥、頭放低15度」(D);頭低30度(下葉後/前基底節)、側臥(下葉側基底節)非下葉上節。本題依官方為D。","options":{"A":"俯臥頭低30度引流下葉後基底節。","B":"側臥頭低引流下葉側基底節。","C":"側臥頭低30度非下葉上節。","D":"正確。俯臥、頭放低15度引流下葉上節。"},"sources":["Nelson《兒科學》姿位引流","下葉上節"]}},"110110-N4-63":{"quick":"5個月氣管內管留置抽痰正確的是「抽痰管應在無抽吸壓力狀態下,放置到抽吸部位」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 抽痰技術:(1)抽痰非固定每小時,依需要(聽診有痰/血氧降)執行,A錯;(2)抽痰順序氣管內管(無菌)先→鼻→口,B「氣管內管→口→鼻」順序不精確(口最後);(3)「抽痰管放入時不加壓(無抽吸壓力),抽出時邊旋轉邊抽吸」——正確;(4)嬰幼兒抽吸壓力約60~100 mmHg(110~130過高),D錯。本題為C。","options":{"A":"錯。抽痰依需要(非固定每小時)。","B":"順序氣管內管→鼻→口(口最後),「→口→鼻」不精確。","C":"正確。放入時不加壓,抽出時邊旋轉邊抽。","D":"錯。嬰幼兒抽吸壓力約60~100 mmHg。"},"sources":["Nelson《兒科學》抽痰","放入不加壓"]}},"111030-N4-61":{"quick":"5歲右下肺葉肺炎急性呼吸窘迫,較不適當的是「協助採左側臥,以緩解疼痛」。","detail":{"background":"右下肺葉肺炎呼吸窘迫擺位:患側在下(即右側臥)可使健側(左肺)在上充分擴張換氣、並減患側疼痛(患側在下擺位)。「採左側臥(使患側右肺在上)較不適當——會壓迫健側左肺、限制其擴張」。維持體液監測尿量、維持氧合給氧擺位抽吸、預防感染治療潛在疾病皆適當。本題較不適當者為D。","options":{"A":"適當。維持體液、監測記錄尿量。","B":"適當。維持組織氧合(氧氣、擺位、通氣、抽吸)。","C":"適當。預防感染並治療潛在疾病。","D":"較不適當(本題答案)。應右側臥(患側在下使健側擴張),非左側臥。"},"sources":["Nelson《兒科學》肺炎","患側在下"]}},"111110-N4-62":{"quick":"呼吸系統疾病兒童胸腔物理治療最適當的是「胸腔物理治療包括呼吸運動及呼吸肌訓練」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 (1)「CPT包括呼吸運動(breathing exercise)及呼吸肌訓練(廣義CPT涵蓋)」——正確;(2)排痰順序噴霧→姿位引流→叩擊(本題B「叩擊後給噴霧」順序錯),B錯;(3)時機餐前或餐後1~2小時(非飯前及飯後1小時之模糊敘述),C不精確;(4)上下葉皆須引流先上葉再下葉(或視重力),非以下葉為優先,D不一定。本題為A。","options":{"A":"正確。CPT包括呼吸運動及呼吸肌訓練。","B":"錯。排痰順序噴霧→引流→叩擊(非叩擊後噴霧)。","C":"時機餐前/餐後1~2小時,敘述不精確。","D":"上下葉引流順序視重力,非一律下葉優先。"},"sources":["Nelson《兒科學》CPT","呼吸運動"]}},"112110-N4-62":{"quick":"氧氣帳使用敘述正確的是「維持高濃度氧(40~60%),高濕度(40~60%)的帳內環境」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 (1)「氧氣帳維持高濃度氧(40~60%)、高濕度(40~60%)(及低溫)」——正確;(2)帳內不可放電動玩具(火花/助燃),B錯;(3)氧濃度分析儀放病童口鼻處(非肢體末端)測,C錯;(4)採集中護理是為減少開帳維持氧濃度,但仍須與病童互動安撫(D「限制互動」過度),D不當。本題為A。","options":{"A":"正確。維持高濃度氧、高濕度的帳內環境。","B":"錯。帳內不可放電動玩具(火花危險)。","C":"錯。氧濃度分析儀放口鼻處(非肢體末端)。","D":"集中護理但仍須互動安撫(非限制互動)。"},"sources":["Nelson《兒科學》氧氣帳","高濃度高濕度"]}},"113180-N4-38":{"quick":"病童氧氣治療照護最適當的是「以氧氣濃度分析儀的感應器測氧氣濃度時,病童的口鼻處為最佳部位」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 (1)「氧濃度分析儀感應器放病童口鼻處(最接近吸入氧濃度)為最佳」——正確;(2)氧氣頭罩流量>5 L/min(非<3,太低CO2滯留),B錯;(3)鼻套管流量低(約0.5~2 L/min,非>10 L/min;過高刺激黏膜),C錯;(4)氧氣帳目的是供氧/濕化(非隔離傳染),D錯。本題為A。","options":{"A":"正確。氧濃度感應器放病童口鼻處最佳。","B":"錯。氧氣頭罩流量>5 L/min(非<3)。","C":"錯。鼻套管流量低(非>10 L/min)。","D":"錯。氧氣帳目的是供氧濕化(非隔離傳染)。"},"sources":["Nelson《兒科學》氧療","口鼻處"]}},"114030-N4-38":{"quick":"氧氣頭罩(O2 hood)照護最不適當的是「以生理食鹽水作為噴霧來源效果更好」。","detail":{"background":"胸腔物理治療(CPT)順序:噴霧/霧化(稀痰)→姿位引流(重力,使痰肺節在最高處)→叩擊(手弓成杯狀、規律拍胸壁,避開脊椎/腎/乳房/胸骨,墊薄布勿拍裸露皮膚,每部位約1~2分鐘)→震顫→抽痰;時機餐前或餐後1~2小時(避免嘔吐)。抽痰:時間每次<10~15秒(嬰幼兒<10秒)、嬰幼兒壓力約60~100 mmHg(成人100~120)、放入時不加壓、抽出時邊旋轉邊抽、前後給氧防缺氧、順序無菌處先(氣管內管→鼻→口)。氧療:鼻套管流量低、氧氣頭罩流量>5 L/min(避免CO2滯留)、氧氣帳維持高濃度(40~60%)、高濕度、低溫、採集中護理(維持帳內濃度)、勿放會產生火花的電動玩具/3C、氧氣濃度分析儀放病童口鼻處測;濕化用無菌蒸餾水(非生理食鹽水)。 氧氣頭罩:氧氣流量>5~6 L/min防CO2滯留、潮濕瓶與蛇行管每週更換、避免直吹臉減體熱喪失皆適當。「以生理食鹽水作噴霧/濕化來源最不適當——濕化應用無菌蒸餾水(生理食鹽水蒸發後鹽分結晶堵塞管路、刺激黏膜)」。本題最不適當者為D。","options":{"A":"適當。氧氣流量>5~6 L/min防CO2滯留。","B":"適當。潮濕瓶與蛇行管每週更換。","C":"適當。避免直吹臉減少體熱喪失。","D":"最不適當(本題答案)。濕化應用無菌蒸餾水(非生理食鹽水)。"},"sources":["Nelson《兒科學》氧氣頭罩","蒸餾水"]}},"102030-N4-63":{"quick":"發紺型先天性心臟缺損是「大血管轉位(transposition of the great arteries)」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 發紺型(右→左分流)=法洛氏四重症、大血管轉位(TGA)、三尖瓣閉鎖等。本題發紺型為「大血管轉位」(D);VSD、ASD、主動脈瓣狹窄屬非發紺型。本題為D。","options":{"A":"VSD屬非發紺型(左→右)。","B":"ASD屬非發紺型。","C":"主動脈瓣狹窄屬非發紺型(阻塞)。","D":"正確。大血管轉位是發紺型。"},"sources":["Nelson《兒科學》先心分類","發紺型"]}},"102110-N4-62":{"quick":"開放性動脈導管(PDA)敘述中「90%的新生兒,其動脈導管於出生後12週閉合」為錯誤。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 PDA:可在胸骨左緣第2肋間/鎖骨下聞連續機械性雜音、餵食困難低體重心搏過速盜汗、可致肺高壓肺水腫心衰竭。「90%動脈導管出生後12週閉合錯誤——正常動脈導管多出生後數天~2週(功能性約24~72小時、解剖性約2~3週)閉合(非12週)。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。動脈導管多出生後數天~2週閉合(非12週)。","B":"正確。胸骨左緣第2肋間聞連續機械性雜音。","C":"正確。可有餵食困難、低體重、心搏過速、盜汗。","D":"正確。可引發肺高壓、肺水腫、心衰竭。"},"sources":["Nelson《兒科學》PDA","閉合"]}},"103100-N4-70":{"quick":"三尖瓣閉鎖給予前列腺素E1(PGE1)的主要目的是「促使動脈導管開放,增加肺部血流」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 三尖瓣閉鎖(發紺型導管依賴):血流需經動脈導管/中隔缺損繞道到肺,給PGE1維持動脈導管開放→增加肺部血流改善發紺。本題目的為「促動脈導管開放、增加肺部血流」(B)。","options":{"A":"非為增加下肢靜脈回流。","B":"正確。PGE1維持動脈導管開放、增加肺部血流。","C":"PGE1是開放導管(非關閉)。","D":"PGE1非關閉導管增主動脈血流。"},"sources":["Nelson《兒科學》三尖瓣閉鎖","PGE1"]}},"104030-N4-49":{"quick":"VSD開心手術後第1天哭喊要媽媽、拒絕安撫,屬分離焦慮的「抗議期」。","detail":{"background":"分離焦慮抗議期(protest):大哭、拒絕安撫、不斷找媽媽。本例術後第1天哭喊要媽媽、拒絕安撫即抗議期。本題為「抗議期」(A);否認期(疏離)、失望期(安靜退縮)、去依戀期(疏離冷漠)非此。本題為A。","options":{"A":"正確。哭喊要媽媽、拒絕安撫=抗議期。","B":"否認期(去依戀)為疏離冷漠。","C":"失望期為安靜退縮。","D":"去依戀期為對父母疏離冷漠。"},"sources":["Nelson《兒科學》分離焦慮","抗議期"]}},"104030-N4-63":{"quick":"VSD合併艾森曼格氏徵候群(Eisenmenger),護理措施不適當的是「靜臥休息,宜採平躺姿勢」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 艾森曼格徵候群(Eisenmenger)=長期左→右分流致肺高壓,壓力逆轉為右→左分流發紺。護理:集中護理減耗氧、靜態活動、家中備氧氣皆適當。「靜臥採平躺姿勢不適當——心衰竭/肺高壓/呼吸喘者應採半坐臥(非平躺)減少靜脈回流、利呼吸。本題不適當者為C。","options":{"A":"適當。儘可能採集中護理(減耗氧)。","B":"適當。運用遊戲設計靜態活動。","C":"不適當(本題答案)。應半坐臥(非平躺),減靜脈回流利呼吸。","D":"適當。衛教家中需備氧氣筒。"},"sources":["Nelson《兒科學》Eisenmenger","半坐臥"]}},"105030-N4-63":{"quick":"嚴重主動脈瓣狹窄(Aortic stenosis)不會發生的臨床表徵是「出現發紺、杵狀指」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣
