狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 主動脈瓣狹窄(AS)屬非發紺型(阻塞型):左心室出口阻塞→脈搏微弱、心跳加快、收縮性心雜音、血氧不足易疲倦、運動耐受差。「發紺、杵狀指不會發生——那是發紺型(右→左分流,如法洛)的表徵;AS是非發紺型,無慢性低血氧/杵狀指」。本題不會發生者為B。","options":{"A":"會。脈搏微弱、心跳加快。","B":"本題答案(不會)。發紺、杵狀指是發紺型表徵,AS不會。","C":"會。出現收縮性心雜音。","D":"會。血氧不足、容易疲倦。"},"sources":["Nelson《兒科學》主動脈瓣狹窄","非發紺"]}},"106030-N4-63":{"quick":"大動脈轉位(TGA)新生兒護理評估中「上下肢血壓相差約20mmHg」為錯誤。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 TGA(發紺型):主肺動脈位置互換→發紺、紅血球增多(代償缺氧)、低血氧、第二心音加重。「上下肢血壓相差約20mmHg錯誤——上下肢血壓差異是主動脈狹窄(coarctation)的特徵(上肢高下肢低),非TGA。本題「錯誤」者為C。","options":{"A":"正確。紅血球增多(代償慢性缺氧)。","B":"正確。低血氧及發紺症狀。","C":"錯誤(本題答案)。上下肢血壓差是主動脈狹窄特徵,非TGA。","D":"正確。心臟聽診第二心音加重。"},"sources":["Nelson《兒科學》TGA","血壓"]}},"106030-N4-65":{"quick":"心房中隔缺損(ASD)護理指導不恰當的是「按時服用前列腺素E1(Prostaglandin E1)」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 ASD(非發紺型):一般不發紺、約1歲內近半自動閉合、減少呼吸道感染。「按時服PGE1不恰當——PGE1是維持動脈導管開放,用於發紺型導管依賴先心(如TGA/三尖瓣閉鎖);ASD不需PGE1(無導管依賴)」。本題不恰當者為D。","options":{"A":"恰當。ASD一般不會出現發紺。","B":"恰當。1歲以內近半會自動閉合。","C":"恰當。減少呼吸道感染。","D":"不恰當(本題答案)。ASD不需PGE1(那用於發紺型導管依賴先心)。"},"sources":["Nelson《兒科學》ASD","PGE1"]}},"106110-N4-65":{"quick":"5歲TGA完全矯正手術前,對其解釋方式較適當的是「畫出心臟四個腔室的外形,並解釋手術後心臟會如何把血打出去」。","detail":{"background":"學齡前/學齡兒童(5歲)術前解釋:以具體、簡單、視覺化(畫圖)方式說明。本題較適當為「畫出心臟四腔室外形、解釋手術後如何把血打出去」(具體圖示)(C);以父母認知為主(A,忽略兒童)、說「發出規律蹦蹦聲」(B,過於抽象/不具體)、討論靜脈動脈血液循環功能(D,5歲太抽象)。本題為C。","options":{"A":"錯。應對兒童說明(非只以父母認知為主)。","B":"「發出規律蹦蹦聲」過於抽象不具體。","C":"正確。畫心臟四腔室、具體解釋手術後如何把血打出。","D":"討論靜脈動脈循環功能對5歲太抽象。"},"sources":["Nelson《兒科學》術前解釋","具體"]}},"107030-N4-72":{"quick":"先天性心臟病嬰兒餵食護理中「選擇小一點的奶嘴洞餵食,避免嗆奶」為錯誤。","detail":{"background":"先天性心臟病嬰兒餵食:心臟負荷大、易疲累,應選柔軟、洞口稍大的奶嘴(減少吸吮費力與耗氧)、少量多餐、每次<30分鐘、必要時鼻胃管灌食。「選小一點的奶嘴洞」錯誤——洞太小吸吮費力增耗氧與疲累,應洞稍大」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。應選洞口稍大的奶嘴(減吸吮費力),非小洞。","B":"正確。可3小時餵一次,每次不超過30分鐘。","C":"正確。吸吮力欠佳者以奶瓶餵食較親餵省力。","D":"正確。吸吮力欠佳必要時鼻胃管灌食。"},"sources":["Nelson《兒科學》先心餵食","大洞奶嘴"]}},"109030-N4-49":{"quick":"13歲上肢血壓高、鼠蹊脈搏較上肢弱、頭痛、腳冰冷,可能罹患「主動脈狹窄(coarctation)」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 主動脈狹窄(coarctation of aorta):縮窄處近端(上半身)血壓高、遠端(下半身)血壓低→上肢血壓>下肢、股/鼠蹊脈搏微弱遲於上肢、上半身高血壓頭痛、下肢冰冷。本題符合「主動脈狹窄」(B);VSD、肺動脈瓣狹窄、TGA非此特徵。本題為B。","options":{"A":"VSD無上下肢血壓差特徵。","B":"正確。上肢血壓高、鼠蹊脈弱、腳冰冷=主動脈狹窄。","C":"肺動脈瓣狹窄無上下肢血壓差。","D":"TGA以發紺為主,非上下肢血壓差。"},"sources":["Nelson《兒科學》主動脈狹窄","上下肢"]}},"109030-N4-73":{"quick":"開放性動脈導管(PDA)病童較不會出現的症狀是「紅血球增多症」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 PDA(非發紺型(左→右分流)):肺血流增加→心搏過快、肺動脈高壓、餵食困難、心衰竭、寬脈壓、連續性雜音。「紅血球增多症較不會出現——紅血球增多是發紺型(慢性低血氧代償)的表現;PDA是非發紺型(無慢性低血氧),較不會紅血球增多」。本題較不會出現者為C。","options":{"A":"會。心搏過快(肺血流增加)。","B":"會。肺動脈高壓。","C":"本題答案(較不會)。紅血球增多是發紺型表現,PDA非發紺型。","D":"會。餵食困難。"},"sources":["Nelson《兒科學》PDA","紅血球"]}},"110110-N4-66":{"quick":"30週早產PDA以Indomethacin治療,正確的是「尿量<1mL/kg/hr時應通知醫師調整藥物劑量」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 早產兒PDA:Indomethacin(前列腺素合成抑制劑)關閉導管,副作用腎血流下降→尿量減少(腎毒性)、出血傾向(抑血小板)。(1)「尿量<1mL/kg/hr通知醫師調整/停藥」——正確;(2)治療前因左→右分流有連續性雜音(非較少),B錯;(3)關閉導管後肺血流正常化(PDA是非發紺型,不致發紺),C錯;(4)Indomethacin副作用是出血(抑血小板),非血栓,D錯。本題為A。","options":{"A":"正確。尿量<1mL/kg/hr應通知醫師(腎毒性)。","B":"錯。治療前PDA有連續性雜音(非較少)。","C":"錯。PDA是非發紺型,不致發紺。","D":"錯。Indomethacin副作用是出血(非血栓)。"},"sources":["Nelson《兒科學》PDA","Indomethacin"]}},"112110-N4-66":{"quick":"重度主動脈瓣狹窄(AS)敘述中「須執行布萊洛-陶西分流術(Blalock-Taussig shunt)」為錯誤。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 重度AS(非發紺型阻塞):易充血性心衰竭(限水)、活動致缺氧/暈厥限制活動、觀察心跳末梢循環、足夠休息。「須執行Blalock-Taussig分流術錯誤——Blalock-Taussig分流是用於發紺型(法洛氏四重症增加肺血流),AS不用此分流(AS用瓣膜整形/置換、球囊擴張)」。本題「錯誤」者為D。","options":{"A":"正確。AS易充血性心衰竭,需限制水分。","B":"正確。活動易缺氧,需活動限制。","C":"正確。觀察心跳末梢循環、提供休息。","D":"錯誤(本題答案)。Blalock-Taussig分流用於法洛(發紺型),非AS。"},"sources":["Nelson《兒科學》主動脈瓣狹窄","非分流"]}},"112180-N4-40":{"quick":"疑似心臟病抽ASLO(抗鏈球菌素O)主要是診斷「急性風濕熱」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 ASLO(anti-streptolysin O,抗鏈球菌溶血素O)升高提示近期A群β型鏈球菌感染,用於診斷風濕熱(rheumatic fever)(風濕熱是鏈球菌咽炎後自體免疫侵犯心臟瓣膜/關節)。本題ASLO主要診斷「急性風濕熱」(D);川崎症、法洛、PDA非以ASLO診斷。本題為D。","options":{"A":"川崎症非以ASLO診斷。","B":"法洛非以ASLO診斷。","C":"PDA非以ASLO診斷。","D":"正確。ASLO升高診斷急性風濕熱(鏈球菌感染後)。"},"sources":["Nelson《兒科學》風濕熱","ASLO"]}},"114170-N4-41":{"quick":"大血管轉位(TGA)服用前列腺素(PGE1)的使用目的是「維持動脈導管開放」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 TGA(發紺型導管依賴):主肺動脈位置互換→體循環與肺循環平行不交通,須靠動脈導管/中隔缺損混合血維生,故給PGE1維持動脈導管開放(維持混合血、改善發紺)直到手術。本題目的為「維持動脈導管開放」(B)。","options":{"A":"PGE1非增加心肌收縮力。","B":"正確。PGE1維持動脈導管開放(混合血改善發紺)。","C":"非增加下肢靜脈回流。","D":"非降低體循環氧飽和度。"},"sources":["Nelson《兒科學》TGA","PGE1"]}},"101030-N4-65":{"quick":"法洛氏四重症長期用毛地黃,出現「厭食、噁心、嘔吐」時應暫停給藥就醫。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 毛地黃(digoxin)中毒症狀:厭食、噁心、嘔吐(最早)、心搏過慢、視覺異常、心律不整。本題應暫停就醫者為「厭食、噁心、嘔吐」(C);心跳>100(毛地黃使心跳慢非快)、皮膚紅疹搔癢(過敏非毛地黃毒性)、哭鬧難入睡(非毒性)。本題為C。","options":{"A":"毛地黃使心跳變慢,>100非毒性表現。","B":"皮膚紅疹搔癢是過敏,非毛地黃毒性。","C":"正確。厭食、噁心、嘔吐是毛地黃中毒症狀,應暫停就醫。","D":"哭鬧難入睡非毛地黃毒性。"},"sources":["Nelson《兒科學》毛地黃","中毒"]}},"102030-N4-64":{"quick":"法洛氏四重症造成發紺的最主要因素是「肺動脈狹窄的程度」。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 法洛四特徵中,肺動脈狹窄的程度決定右→左分流與發紺嚴重度(狹窄越嚴重→肺血流越少→缺氧血越多→發紺越重)。本題最主要因素為「肺動脈狹窄的程度」(A);VSD大小、右心室肥厚、主動脈跨位非決定發紺的主因。本題為A。","options":{"A":"正確。肺動脈狹窄程度決定發紺嚴重度。","B":"VSD大小非決定發紺主因。","C":"右心室肥厚是結果,非發紺主因。","D":"主動脈跨位非決定發紺主因。"},"sources":["Nelson《兒科學》法洛","肺動脈狹窄"]}},"103030-N4-65":{"quick":"法洛氏四重症護理評估會發現「可能出現杵狀指(clubbing finger)」。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 法洛(發紺型)評估:慢性低血氧→杵狀指(clubbing)、紅血球增多(非過少)、肺動脈狹窄使肺動脈壓低、無肺發育不全(肺血流少但肺本身發育)。本題會發現者為「杵狀指」(B);紅血球過少(A錯,是增多)、肺發育不全(C不符)、肺動脈壓低雖部分對但非評估發現重點。本題為B。","options":{"A":"錯。法洛是紅血球增多(非過少)。","B":"正確。慢性低血氧致杵狀指。","C":"法洛非合併肺發育不全。","D":"肺動脈壓低非評估的代表症狀。"},"sources":["Nelson《兒科學》法洛","杵狀指"]}},"104030-N4-45":{"quick":"1個月法洛四重症手術矯正前護理不適當的是「每3小時餵1次,每次餵食不可少於30分鐘,以減少耗氧量」。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 法洛餵食:心臟負荷大易缺氧→少量多餐、柔軟大洞奶嘴(減吸吮費力)、每次餵食不超過30分鐘(過久增耗氧疲累)。「每次餵食不少於30分鐘不適當——應不超過30分鐘(餵太久反增耗氧)」。發紺發作膝胸臥姿、避免便秘哭泣皆適當。本題不適當者為B。","options":{"A":"適當。柔軟大洞奶嘴、少量多餐。","B":"不適當(本題答案)。應每次不超過30分鐘(非不少於,餵久增耗氧)。","C":"適當。發紺發作時膝胸臥姿(膝向腹)。","D":"適當。避免便秘、減少哭泣(減耗氧與發作)。"},"sources":["Nelson《兒科學》法洛","餵食"]}},"104030-N4-64":{"quick":"法洛氏四重症呼吸困難發作時,最可能採取「蹲坐(squatting)」姿勢。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 法洛兒童缺氧/呼吸困難時本能採蹲踞(squatting)/膝胸臥姿——增加體循環阻力、減少右→左分流、增肺血流改善缺氧。本題為「蹲坐」(A);垂頭仰臥、半坐臥、左側臥非法洛特徵姿勢。本題為A。","options":{"A":"正確。法洛缺氧時本能採蹲坐(squatting)。","B":"垂頭仰臥非法洛姿勢。","C":"半坐臥非法洛缺氧發作姿勢。","D":"左側臥非法洛特徵。"},"sources":["Nelson《兒科學》法洛","蹲踞"]}},"104100-N4-63":{"quick":"4歲法洛四重症心導管追蹤檢查前後護理中「檢查前需禁食4~6小時,但毛地黃藥物需按時持續給予」為錯誤。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 心導管檢查護理:檢查前禁食4~6小時、用遊戲畫圖提供資訊、檢查後穿刺處加壓肢體平直、密切注意肢體顏色溫度生命徵象。「檢查前禁食,但毛地黃按時持續給予錯誤——檢查前毛地黃應暫停/依醫囑停一次(避免麻醉/檢查中毛地黃與心律交互作用、心律不整風險)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。檢查前毛地黃應暫停(非按時持續給予)。","B":"正確。檢查前用遊戲畫圖提供資訊。","C":"正確。檢查後穿刺處加壓、肢體平直不彎曲。","D":"正確。密切注意肢體顏色溫度及生命徵象。"},"sources":["Nelson《兒科學》心導管","毛地黃"]}},"105030-N4-64":{"quick":"1歲法洛抽血後發紺厲害、呼吸困難,應優先「讓小明採膝胸臥姿(Knee-chest position)休息」。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 法洛缺氧發作(blue spell)處置優先膝胸臥姿(膝向腹/蹲踞)——增體循環阻力、減右→左分流、增肺血流改善缺氧(立即見效);再給氧、必要時嗎啡。本題優先為「膝胸臥姿」(A);測生命徵象、給氧、餵牛奶非最優先(膝胸臥姿是第一步)。本題為A。","options":{"A":"正確。缺氧發作優先採膝胸臥姿(減右→左分流)。","B":"測生命徵象非最優先(先擺位)。","C":"給氧重要但膝胸臥姿是第一步。","D":"發作時不宜餵牛奶(增耗氧)。"},"sources":["Nelson《兒科學》缺氧發作","膝胸臥姿"]}},"105090-N4-62":{"quick":"足月PDA護理評估較不會出現的臨床表徵是「餵食時容易出現發紺的缺氧發作」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 PDA(非發紺型(左→右分流)):肺血流增加→肺水腫、寬脈壓、胸骨左緣第2肋間連續機械性雜音、心搏快、餵食困難。「餵食時發紺的缺氧發作較不會出現——缺氧發作(blue spell)是發紺型(法洛)的特徵;PDA是非發紺型(左→右),一般不發紺」。本題較不會出現者為A。","options":{"A":"本題答案(較不會)。缺氧發作是法洛(發紺型)特徵,PDA不會。","B":"會。肺血流增加致肺水腫。","C":"會。寬廣的脈搏壓(寬脈壓)。","D":"會。胸骨左側第2肋間連續性機械雜音。"},"sources":["Nelson《兒科學》PDA","非發紺"]}},"105090-N4-63":{"quick":"法洛氏四重症發紺敘述中「主要是血液有由左至右的分流」為錯誤。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 法洛發紺:(1)是血中含氧量過低的結果——正確;(2)缺氧發作常在早晨/餵奶/哭泣/排便時——正確;(3)「主要是左至右分流」錯誤——法洛是右至左分流(缺氧血入體循環→發紺)(非左至右);(4)主要肺動脈狹窄所致——正確。本題「錯誤」者為C。","options":{"A":"正確。發紺是血液含氧量過低的結果。","B":"正確。缺氧發作常在早晨、餵奶、哭泣、排便時。","C":"錯誤(本題答案)。法洛是右至左分流(非左至右)。","D":"正確。主要是肺動脈狹窄所致。"},"sources":["Nelson《兒科學》法洛","右至左"]}},"106110-N4-64":{"quick":"5歲法洛缺氧發作(blue spells)臨床表徵不包括「皮膚彈性減少呈黃色」。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 法洛缺氧發作(blue spell)表徵:哭泣後發紺、嘴唇/口腔黏膜暗藍色、鞏膜血管鼓大呈灰色、呼吸困難、意識改變。「皮膚彈性減少呈黃色不是缺氧發作表徵——皮膚彈性減少是脫水、黃色是黃疸,與缺氧發作(發紺=藍紫色)無關」。本題不包括者為B。","options":{"A":"是。哭泣後出現發紺。","B":"本題答案(不包括)。皮膚彈性減少呈黃色是脫水/黃疸,非缺氧發作。","C":"是。鞏膜血管鼓大呈灰色。","D":"是。嘴唇口腔黏膜呈暗藍色。"},"sources":["Nelson《兒科學》缺氧發作","表徵"]}},"106111-N4-62":{"quick":"2歲法洛缺氧發作護理措施中「依醫囑給予濃縮紅血球」為錯誤。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 缺氧發作(blue spell)處置:曲膝蹲姿/膝胸臥姿、給氧、必要時嗎啡(morphine)鎮靜+降肺漏斗部痙攣、補液、依醫囑β-blocker。「依醫囑給濃縮紅血球錯誤——缺氧發作急性處置不是輸濃縮紅血球(法洛本就紅血球增多);輸血非缺氧發作的急性措施」。本題「錯誤」者為D。","options":{"A":"正確。將病童擺曲膝蹲姿(減右→左分流)。","B":"正確。依醫囑給予氧氣。","C":"正確。依醫囑給Morphine(鎮靜、降漏斗部痙攣)。","D":"錯誤(本題答案)。缺氧發作不給濃縮紅血球(法洛本就紅血球增多)。"},"sources":["Nelson《兒科學》缺氧發作","嗎啡"]}},"106111-N4-63":{"quick":"不屬於發紺型先天性心臟病的是「心房中隔缺損(ASD)」。","detail":{"background":"先天性心臟病分類:非發紺型(左→右分流或阻塞)=心室中隔缺損(VSD)、心房中隔缺損(ASD)、開放性動脈導管(PDA)、主動脈狹窄(coarctation/AS)、肺動脈瓣狹窄;發紺型(右→左分流)=法洛氏四重症(TOF)、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常、總動脈幹(口訣4T)。PDA=胸骨左緣第2肋間連續機械性心雜音、寬脈壓、心搏快盜汗餵食困難;足月兒約12週內多自動關閉;早產兒PDA先用Indomethacin/ibuprofen(前列腺素抑制劑)關閉(注意尿量<1mL/kg/hr通知醫師),無效再結紮;發紺型(導管依賴)用PGE1維持導管開放增肺血流。主動脈狹窄(coarctation)=上肢血壓>下肢、上肢高血壓頭痛、下肢脈弱冰冷。大血管轉位(TGA)=發紺、紅血球增多、需PGE1維持導管/中隔缺損混合血、矯正手術。ASD多無發紺、約1歲內半數自閉、減少呼吸道感染。風濕熱查ASLO(抗鏈球菌素O)升高。 發紺型(右→左)=法洛氏四重症、大血管轉位、三尖瓣閉鎖;心房中隔缺損(ASD)屬非發紺型(左→右分流)。本題不屬於發紺型者為「心房中隔缺損」(D)。","options":{"A":"法洛氏四重畸形是發紺型。","B":"大血管轉位是發紺型。","C":"三尖瓣閉鎖是發紺型。","D":"正確。心房中隔缺損(ASD)屬非發紺型。"},"sources":["Nelson《兒科學》先心分類","ASD"]}},"108020-N4-71":{"quick":"3歲法洛每天9點服毛地黃,服藥時間3小時後發現遺漏,正確處置是「立即補服一劑,下一劑維持晚上9點服用」(本題B)。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 毛地黃漏服處置:漏服未超過規定時間(常以6小時為界)可補服一劑,下一劑仍按原時間服。本例遺漏3小時(未超過6小時)→立即補服一劑,下一劑維持晚上9點。本題為「立即補服、下一劑維持晚上9點」(B);補服又延後下一劑(A錯)、不補服(C/D)非本情境。本題為B。","options":{"A":"錯。補服後下一劑仍維持原時間(非延到12點)。","B":"正確。未超6小時補服一劑,下一劑維持晚上9點。","C":"錯。未超6小時應補服(非不補服)。","D":"錯。不應晚上9點服兩劑。"},"sources":["Nelson《兒科學》毛地黃","漏服"]}},"108110-N4-46":{"quick":"法洛病嬰發紺嚴重時採膝胸臥式可改善症狀的原理是「減少下肢回心血量,增加肺部血流」。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 膝胸臥式(膝向腹)改善法洛發紺的原理:減少下肢靜脈回心血量(膝彎曲壓迫下肢靜脈)+增體循環阻力→減少右→左分流→增加肺部血流與左心充氧血。本題原理為「減少下肢回心血量,增加肺部血流」(B);減全身阻力提高血壓(A錯,是增阻力)、減上肢回血增腦供血(C不符)、減循環距離(D不符)。本題為B。","options":{"A":"錯。膝胸臥式是增體循環阻力(非減)。","B":"正確。減少下肢回心血量,增加肺部血流。","C":"非減上肢回血增腦供血。","D":"非減血液循環距離。"},"sources":["Nelson《兒科學》膝胸臥式","原理"]}},"109110-N4-64":{"quick":"8個月法洛哭鬧發紺,給氧並擺膝胸臥式的目的是「減少回流至心臟之血量」。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 膝胸臥式(膝向腹)目的:減少下肢靜脈回流至心臟之血量(膝彎壓迫下肢靜脈)+增體循環阻力減右→左分流,改善缺氧。本題目的為「減少回流至心臟之血量」(A);減全身血管阻力(B錯,是增阻力)、減右心流向肺動脈(C不符,反而要增肺血流)、減耗氧(D非膝胸臥式直接目的)。本題為A。","options":{"A":"正確。減少回流至心臟之血量(減右→左分流)。","B":"錯。膝胸臥式是增體循環阻力(非減)。","C":"錯。目的是增肺血流(非減右心流向肺動脈)。","D":"減耗氧非膝胸臥式直接目的。"},"sources":["Nelson《兒科學》膝胸臥式","回心血量"]}},"111110-N4-66":{"quick":"增加法洛(TOF)肺循環血流以增左心充氧血,照護處置中「口服給予Aspirin」為錯誤。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 增加法洛肺血流的處置:缺氧發作膝胸臥姿、靜脈滴注PGE1(維持導管開放增肺血流)、Blalock-Taussig分流術(增肺血流)皆是。「口服Aspirin錯誤——Aspirin非增加肺血流的處置(它是抗血小板,與增肺血流無關;且兒童病毒感染期用aspirin有雷氏症候群風險)」。本題「錯誤」者為B。","options":{"A":"正確。缺氧發作時予膝胸臥姿(增肺血流)。","B":"錯誤(本題答案)。Aspirin非增加肺血流的處置。","C":"正確。靜脈滴注PGE1維持導管開放增肺血流。","D":"正確。Blalock-Taussig分流術增加肺血流。"},"sources":["Nelson《兒科學》法洛","增肺血流"]}},"112030-N4-65":{"quick":"2歲法洛每12小時服毛地黃,護理指導錯誤的是「若忘記給藥超過6小時應補給一劑」。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 毛地黃護理:給藥前測心尖脈1分鐘(過慢暫停)、飯前1小時或飯後2小時給、勿與果汁/食物混合(影響吸收)。「忘記給藥超過6小時應補給一劑錯誤——漏服超過6小時應略過(不補)(以免下一劑時間接近造成過量中毒);未超過6小時才補」。本題「錯誤」者為D。","options":{"A":"正確。給藥前須完整測量心尖脈1分鐘。","B":"正確。飯前1小時或飯後2小時給藥。","C":"正確。勿將藥物與果汁混合(影響吸收)。","D":"錯誤(本題答案)。漏服超過6小時應略過不補(非補給)。"},"sources":["Nelson《兒科學》毛地黃","漏服"]}},"113100-N4-40":{"quick":"3歲法洛矯正手術前給PGE1的理由是「使動脈導管維持開放,增加肺動脈的血量」。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 法洛(發紺型,肺血流不足):PGE1維持動脈導管開放→讓主動脈血經導管分流到肺動脈增加肺血流改善缺氧(術前過渡)。本題理由為「動脈導管維持開放,增加肺動脈血量」(B);增主動脈血量(A不符)、關閉導管(C/D錯,PGE1是開放)。本題為B。","options":{"A":"非增主動脈血量(是增肺動脈血量)。","B":"正確。維持動脈導管開放,增加肺動脈血量。","C":"錯。PGE1是維持開放(非關閉)。","D":"錯。PGE1是開放導管(非關閉)。"},"sources":["Nelson《兒科學》法洛","PGE1"]}},"115030-N4-40":{"quick":"安撫法洛病童採膝胸臥式/蹲姿,彎曲腿部的理由中「減少上肢靜脈的回心血量」為錯誤。","detail":{"background":"法洛氏四重症(Tetralogy of Fallot, TOF,發紺型)四特徵:①肺動脈狹窄(決定發紺嚴重度的主要因素)、②心室中隔缺損(VSD)、③主動脈跨位(騎跨)、④右心室肥厚。病生理:肺動脈狹窄→右→左分流(缺氧血入體循環)→發紺、低血氧。表現:發紺、杵狀指、紅血球增多、缺氧發作(blue spell)(哭鬧/餵食/排便/早晨時突發發紺呼吸困難)、蹲踞(squatting)/膝胸臥姿。缺氧發作/蹲踞處置原理=膝胸臥姿(膝向腹)/蹲踞增加體循環血管阻力(SVR)→減少右→左分流→增加肺血流與左心充氧血、同時減少下肢靜脈回心血量,並給氧、必要時嗎啡(morphine)鎮靜降肺漏斗部痙攣、補液。治療:姑息Blalock-Taussig分流(增肺血流)→完全矯正手術。長期使用毛地黃者厭食噁心嘔吐、心搏過慢=毒性暫停就醫。 膝胸臥式/蹲姿彎曲腿部的理由:減少下肢(非上肢)靜脈回心血量(壓迫下肢靜脈)、增全身血管阻力→減右→左分流→增肺動脈至肺的血量、減右心低氧血。「減少上肢靜脈回心血量」錯誤——彎曲下肢(非上肢),減下肢回心血量」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。是減少下肢(非上肢)靜脈回心血量。","B":"正確。增加肺動脈至肺臟的血量。","C":"正確。增加全身血管的血流阻力。","D":"正確。減少右心低氧濃度的血量。"},"sources":["Nelson《兒科學》膝胸臥式","下肢"]}},"103030-N4-63":{"quick":"2個月先天性心臟病居家照護中「每次餵食時間宜超過30分鐘」為錯誤。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 先心嬰兒餵食:母乳擠出餵/灌食、柔軟大洞奶嘴、少量多餐高熱量皆正確。「每次餵食超過30分鐘錯誤——心臟病嬰兒易疲累耗氧,每次餵食不超過30分鐘(餵太久增耗氧疲累)」。本題「錯誤」者為C。","options":{"A":"正確。母乳擠出再餵食或灌食。","B":"正確。選柔軟洞口稍大的奶嘴(減吸吮費力)。","C":"錯誤(本題答案)。每次餵食應不超過30分鐘(非超過)。","D":"正確。少量多餐、高熱量飲食。"},"sources":["Nelson《兒科學》先心餵食","30分鐘"]}},"103100-N4-66":{"quick":"4歲氣喘長期用Flixotide(fluticasone, MDI)的適當護理指導是「衛教合併使用面罩型吸藥輔助艙(aerochamber)吸入器裝置之技巧」。","detail":{"background":"Flixotide(fluticasone propionate)=吸入型類固醇(ICS):(1)是類固醇,長期用可能影響生長(需監測),A錯;(2)ICS是抗發炎保養藥(非擴張支氣管,那是β2),B錯;(3)「幼兒MDI合併面罩型吸藥輔助艙(aerochamber)提高藥物到達」——正確;(4)ICS保養藥不可症狀減輕即自行減/停(須依醫囑漸減),D錯。本題為C。","options":{"A":"錯。Flixotide是類固醇,長期用需注意生長。","B":"錯。ICS是抗發炎保養(非擴張支氣管)。","C":"正確。衛教合併面罩型aerochamber的吸入技巧。","D":"錯。ICS保養藥不可症狀減輕即自行停。"},"sources":["Nelson《兒科學》ICS","aerochamber"]}},"104100-N4-64":{"quick":"充血性心衰竭嬰兒徵象不包括「高血壓,眼眶周圍水腫」。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 CHF徵象:心跳快有奔馬律、呼吸喘持續乾咳、四肢冰冷盜汗、肝腫大下肢/眼眶水腫、血壓正常或偏低。「高血壓,眼眶周圍水腫不包括——CHF血壓正常或偏低(非高血壓)(眼眶周圍水腫是CHF徵象,但高血壓不是)」。本題不包括者為C。","options":{"A":"是。心跳快、有奔馬狀節律。","B":"是。呼吸喘、有持續性乾咳。","C":"本題答案(不包括)。CHF血壓正常或偏低(非高血壓)。","D":"是。四肢冰冷、有盜汗現象。"},"sources":["Nelson《兒科學》CHF","血壓"]}},"105030-N4-65":{"quick":"充血性心衰竭嬰兒臨床徵象不包括「心輸出量減少,心跳速率變慢」。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 CHF徵象:周邊靜脈充血(肝腫大下肢水腫)、肺水腫咳嗽呼吸快、臉色蒼白四肢冰冷血壓低盜汗。「心輸出量減少,心跳速率變慢不包括——CHF時心輸出量不足→交感代償心搏過快(非變慢)。本題不包括者為A。","options":{"A":"本題答案(不包括)。CHF心搏過快(代償),非變慢。","B":"是。周邊靜脈充血、肝腫大、下肢水腫。","C":"是。肺水腫、咳嗽、呼吸困難、呼吸增快。","D":"是。臉色指甲蒼白、四肢冰冷、血壓低、盜汗。"},"sources":["Nelson《兒科學》CHF","心搏過快"]}},"106110-N4-63":{"quick":"2個月VSD因肺炎引發鬱血性心衰竭,不屬於臨床表徵的是「心跳過慢」。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 鬱血性心衰竭(CHF)表徵:心搏過快、大量流汗(盜汗)、四肢冰冷、呼吸過速。「心跳過慢不屬於——CHF是心搏過快(代償),非過慢」。本題不屬於者為A。","options":{"A":"本題答案(不屬於)。CHF是心搏過快,非過慢。","B":"屬於。大量流汗(盜汗)。","C":"屬於。四肢冰冷。","D":"屬於。呼吸過速。"},"sources":["Nelson《兒科學》CHF","過快"]}},"106110-N4-66":{"quick":"不是毛地黃中毒症狀的是「心跳變慢」(本題D應為毒性;非毒性者另選)——本題答D。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 毛地黃中毒症狀:心跳變慢(D其實是毒性)、噁心嘔吐、頭痛嗜睡視覺異常、心律不整。本題問不是中毒症狀,答案D抽搐、痙攣——抽搐痙攣不是毛地黃典型中毒症狀(毛地黃中毒以腸胃道(噁心嘔吐)、心律(過慢/心律不整)、神經(嗜睡視覺異常)為主,抽搐痙攣非典型)。本題不是中毒症狀者為D。","options":{"A":"是毒性。心跳變慢。","B":"是毒性。噁心、嘔吐。","C":"是毒性。頭痛、嗜睡。","D":"本題答案(非中毒症狀)。抽搐、痙攣非毛地黃典型中毒。"},"sources":["Nelson《兒科學》毛地黃","中毒"]}},"107030-N4-73":{"quick":"心臟病童藥物使用正確的是「使用PGE1靜脈滴注,要注意呼吸窘迫的問題」。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 (1)鈣片不能增加血紅素載氧量(載氧靠鐵/血紅素,非鈣),A錯;(2)毛地黃勿與食物併用(影響吸收;但口服可在飯前後;不與奶/果汁混),B不精確;(3)「PGE1靜脈滴注副作用呼吸窘迫/呼吸暫停,須注意」——正確;(4)Propranolol(β-blocker)使心跳過慢(非過速),D錯。本題為C。","options":{"A":"錯。鈣片不增加血紅素載氧量(載氧靠鐵/血紅素)。","B":"毛地黃勿與食物併用影響吸收,「應併用」不精確。","C":"正確。PGE1靜滴注意呼吸窘迫(呼吸暫停)。","D":"錯。Propranolol使心跳過慢(非過速)。"},"sources":["Nelson《兒科學》心臟藥","PGE1"]}},"107110-N4-71":{"quick":"PGE1維持動脈導管開放增肺血流,不適合使用的先天性心臟病是「主動脈狹窄」。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 PGE1維持動脈導管開放、增肺血流,用於肺血流不足的發紺型導管依賴先心(肺動脈瓣狹窄、三尖瓣閉鎖、大血管轉位)。「主動脈狹窄(coarctation)不適合以「增肺血流」為目的——主動脈狹窄是體循環(下半身)血流不足,PGE1雖也用於維持下半身灌流(導管依賴體循環),但非增肺血流的適應症。本題不適合增肺血流者為「主動脈狹窄」(B)。","options":{"A":"肺動脈瓣狹窄需PGE1增肺血流(適合)。","B":"正確(不適合增肺血流)。主動脈狹窄是體循環血流不足,非增肺血流適應症。","C":"三尖瓣閉鎖需PGE1增肺血流(適合)。","D":"大血管轉位需PGE1維持混合血(適合)。"},"sources":["Nelson《兒科學》PGE1","適應症"]}},"108020-N4-70":{"quick":"TGA合併VSD敘述中「合併心室中隔缺損會讓發紺更嚴重,應立即給予100%氧氣」為錯誤。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 TGA(發紺型導管/中隔依賴):PGE1維持導管開放注意呼吸窘迫血管炎、合併嚴重中隔缺損注意CHF、紅血球增多皆正確。「合併VSD讓發紺更嚴重,應立即給100%氧氣錯誤——TGA合併VSD/中隔缺損反而有助血液混合改善發紺(非更嚴重);且TGA發紺對純氧反應有限(導管依賴,靠混合血),非100%氧氣能矯正。本題「錯誤」者為B。","options":{"A":"正確。PGE1注意呼吸窘迫與血管炎副作用。","B":"錯誤(本題答案)。合併VSD反有助混合血改善發紺(非更嚴重);TGA發紺對純氧反應有限。","C":"正確。合併嚴重中隔缺損注意CHF症狀。","D":"正確。注意血液是否有紅血球增多。"},"sources":["Nelson《兒科學》TGA","混合血"]}},"109110-N4-63":{"quick":"心臟病嬰兒護理照護最適當的是「必要時使用鼻(口)胃管餵食,減少心臟負荷」。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 (1)奶瓶餵食時間不超過30分鐘(本題A「不少於30分鐘」反了),A錯;(2)CHF嬰兒不一定以低鈉配方取代母乳(母乳鈉低且最佳,A/B非常規),B不適當;(3)「必要時鼻(口)胃管餵食減少吸吮心臟負荷」——正確;(4)鈣不增血紅素載氧量,D錯。本題為C。","options":{"A":"錯。餵食時間應不超過30分鐘(非不少於)。","B":"不適當。母乳鈉低最佳,不需以低鈉配方取代母乳。","C":"正確。必要時鼻(口)胃管餵食,減少心臟負荷。","D":"錯。補鈣不增血紅素載氧量。"},"sources":["Nelson《兒科學》先心餵食","管餵"]}},"111030-N4-65":{"quick":"VSD出現充血性心衰竭、呼吸喘費力,較舒適的姿勢是「半坐臥」。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 CHF呼吸喘費力:採半坐臥(法樂氏臥位/Fowler)減少靜脈回心血量、降橫膈壓迫利肺擴張、減呼吸費力。本題較舒適為「半坐臥」(D);趴睡、側睡、垂頭俯臥非CHF呼吸喘的舒適臥位。本題為D。","options":{"A":"趴睡非CHF呼吸喘舒適臥位。","B":"側睡非最舒適。","C":"垂頭俯臥不利呼吸。","D":"正確。半坐臥減靜脈回流、利肺擴張、減呼吸費力。"},"sources":["Nelson《兒科學》CHF","半坐臥"]}},"111110-N4-65":{"quick":"早產兒開放性動脈導管(PDA)醫療處置中「給予前列腺素E1(PGE1)是優先的治療方式」為錯誤。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 早產兒PDA:無症狀者可12週內自閉、左側第2肋間連續性雜音、體重<1000g有心衰竭宜提早結紮皆正確。「給PGE1是優先治療錯誤——PGE1是維持導管開放(用於發紺型導管依賴);PDA要關閉導管,應用Indomethacin/ibuprofen(前列腺素抑制劑)(非PGE1)」。本題「錯誤」者為B。","options":{"A":"正確。無症狀者可12週內自動關閉。","B":"錯誤(本題答案)。PDA應用Indomethacin關閉導管,PGE1是維持開放。","C":"正確。<1000g有心衰竭宜提早結紮。","D":"正確。左側第2肋間連續性雜音,未關閉考慮導管栓塞術。"},"sources":["Nelson《兒科學》PDA","Indomethacin"]}},"113180-N4-40":{"quick":"2歲先天性心臟病用毛地黃(一天兩次)正確的是「若忘了服藥,六小時內可補給原劑量」。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 毛地黃:(1)飯前1小時或飯後2小時給(非餐後半小時內),A錯;(2)勿與牛奶/果汁併服(影響吸收),B錯;(3)「漏服6小時內可補給原劑量(超過則略過)」——正確;(4)給藥前測心尖脈(非給藥後),D錯。本題為C。","options":{"A":"錯。飯前1小時或飯後2小時給(非餐後半小時內)。","B":"錯。勿與牛奶或果汁併服(影響吸收)。","C":"正確。漏服6小時內可補給原劑量。","D":"錯。給藥前測心尖脈(非給藥後)。"},"sources":["Nelson《兒科學》毛地黃","漏服"]}},"114100-N4-41":{"quick":"先天性心臟病藥物護理中「使用Spironolactone(Aldactone)可能造成血鉀過低」為錯誤。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 先心藥物:PGE1注意呼吸窘迫、Propranolol注意心搏過慢、Digoxin心搏過慢可能是毒性皆正確。「Spironolactone(Aldactone)造成血鉀過低錯誤——Spironolactone是保鉀利尿劑,副作用是高血鉀(非低血鉀)。本題「錯誤」者為D。","options":{"A":"正確。PGE1需注意呼吸窘迫。","B":"正確。Propranolol需注意心跳過慢。","C":"正確。Digoxin心跳過慢可能是毒性反應。","D":"錯誤(本題答案)。Spironolactone是保鉀利尿劑,造成高血鉀(非過低)。"},"sources":["Nelson《兒科學》利尿劑","保鉀"]}},"114170-N4-40":{"quick":"8歲先天性心臟病用毛地黃服藥注意事項中「如忘記服藥大於6小時,仍需補給一劑」為錯誤。","detail":{"background":"充血性心衰竭(CHF)嬰兒臨床徵象:心輸出量不足→心搏過快(代償,非變慢)、奔馬律、周邊/靜脈充血→肝腫大、頸靜脈怒張、下肢/眼眶周圍水腫、肺充血→呼吸喘/快、持續乾咳、肺水腫、臉色蒼白、四肢冰冷、血壓低、盜汗(交感代償)、餵食困難體重不增。血壓多正常或偏低(非高血壓)。處置:毛地黃(digoxin)增心肌收縮、利尿劑(furosemide)、限鈉、半坐臥、少量多餐高熱量、減少耗氧。毛地黃(digoxin)護理:給藥前測心尖脈1分鐘(嬰<90~100、幼兒<70暫停)、飯前1小時或飯後2小時、勿與奶/果汁混合、漏服未超6小時可補、超過則略過、補鉀(低血鉀增毒性)、中毒=厭食噁心嘔吐+心搏過慢+心律不整。心臟病用藥:PGE1注意呼吸窘迫;Propranolol(Inderal)注意心搏過慢;Spironolactone(保鉀利尿)注意高血鉀;Furosemide低血鉀。 毛地黃:多補含鉀食物(香蕉/深綠蔬菜防低血鉀增毒性)、每日定時空腹給藥效果好、給藥前心尖脈<70暫停皆正確。「忘記服藥大於6小時仍需補給錯誤——漏服超過6小時應略過(不補)(以免與下一劑接近造成過量中毒)」。本題「錯誤」者為D。","options":{"A":"正確。多補含鉀食物(香蕉、深綠蔬菜)防低血鉀。","B":"正確。每日定時、空腹給藥效果好。","C":"正確。給藥前心尖脈<70次/分應暫停。","D":"錯誤(本題答案)。漏服大於6小時應略過不補(非補給)。"},"sources":["Nelson《兒科學》毛地黃","漏服"]}},"101030-N4-50":{"quick":"4歲先心病心導管檢查準備,較適當的是「安排玲玲與母親參與指導性遊戲」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 4歲(運思前期)兒童檢查準備:以指導性遊戲(玩偶/模型/圖片具體示範流程)讓兒童與母親參與、理解、減焦慮。本題較適當為「參與指導性遊戲」(C);不解說(A錯,應準備)、影片(B,4歲理解有限且非互動)、衛教單張請母親轉述(D,4歲需具體遊戲而非文字單張)。本題為C。","options":{"A":"錯。4歲檢查前仍需具體解說準備。","B":"影片對4歲理解有限且非互動。","C":"正確。安排與母親參與指導性遊戲(具體示範)。","D":"錯。衛教單張過抽象,4歲需具體遊戲。"},"sources":["Nelson《兒科學》心導管","指導性遊戲"]}},"101030-N4-63":{"quick":"VSD心導管檢查後護理不適當的是「需禁食直到排氣後,方可進食」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 心導管檢查後:穿刺後第1小時每15分鐘測生命徵象、評估肢端溫度顏色與足背動脈搏動、臥床約6小時穿刺側肢體平直皆適當。「禁食直到排氣後方可進食不適當——心導管非腸道手術,清醒後即可進食(不需等排氣)(等排氣是腹部手術的指標)。本題不適當者為D。","options":{"A":"適當。穿刺後第1小時每15分鐘評估生命徵象。","B":"適當。評估肢端溫度顏色及足背動脈搏動。","C":"適當。臥床6小時,穿刺側肢體平直。","D":"不適當(本題答案)。清醒後即可進食(不需等排氣;非腸道手術)。"},"sources":["Nelson《兒科學》心導管","進食"]}},"101110-N4-24":{"quick":"兒童由全身各組織循環回心臟之血液含氧量大約為「70~75%」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 靜脈血(回心臟,如腔靜脈/右心房)含氧飽和度約70~75%(組織用氧後);動脈血(肺靜脈/左心/主動脈)約95~98%。本題回心臟靜脈血約「70~75%」(B)。","options":{"A":"60~65%偏低。","B":"正確。回心臟靜脈血含氧約70~75%。","C":"80~85%偏高(非靜脈血)。","D":"90~95%接近動脈血。"},"sources":["Nelson《兒科學》含氧量","靜脈"]}},"103100-N4-45":{"quick":"5歲心導管檢查前解釋方法較不恰當的是「運用解剖圖片說明」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 學齡前(5歲)檢查前解釋:用第三人稱說故事、繪本、角色扮演遊戲(具體、貼近其經驗)。「用解剖圖片說明較不恰當——解剖圖過於抽象/專業,5歲(運思前期)難以理解解剖圖,應用具體遊戲/繪本」。本題較不恰當者為B。","options":{"A":"恰當。運用第三人稱說故事。","B":"較不恰當(本題答案)。解剖圖過於抽象,5歲難理解。","C":"恰當。運用繪本說明。","D":"恰當。運用角色扮演遊戲。"},"sources":["Nelson《兒科學》心導管","解釋"]}},"103100-N4-67":{"quick":"2歲左心導管檢查返室後較不適當的是「告知家屬王小妹需等排氣後才能進食」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 心導管後:觀察導管插入肢體末端脈搏、患肢平直不彎曲、第1小時每15分鐘量血壓皆適當。「需等排氣後才能進食較不適當——心導管非腸道手術,清醒後即可進食(不需等排氣)」。本題較不適當者為B。","options":{"A":"適當。觀察導管插入肢體之末端脈搏強度。","B":"較不適當(本題答案)。清醒後即可進食(不需等排氣)。","C":"適當。患肢保持平直不可彎曲(止血)。","D":"適當。檢查後第1小時每15分鐘量血壓。"},"sources":["Nelson《兒科學》心導管","進食"]}},"103100-N4-69":{"quick":"心導管檢查報告不能收集到的資料是「心臟的電衝動傳導」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 心導管檢查可測:各腔室壓力、各腔室含氧飽和度、血流(分流)變化、心輸出量、血管攝影顯影。「心臟的電衝動傳導不能由心導管報告收集——電傳導是心電圖(ECG)/電生理檢查測的,非心導管(測壓力/血氧/血流)」。本題不能收集者為D。","options":{"A":"可。心臟腔室的壓力。","B":"可。心臟腔室的含氧飽和度。","C":"可。心臟的血流變化。","D":"本題答案(不能)。電衝動傳導由心電圖測,非心導管。"},"sources":["Nelson《兒科學》心導管","資料"]}},"106110-N4-46":{"quick":"9歲VSD心導管檢查後,最大的壓力源是「擔心身體受傷及疼痛」。","detail":{"background":"學齡期(9歲)兒童住院/侵入性檢查的壓力源:學齡期最害怕身體完整性受損(身體受傷、疼痛)(學齡期重視身體完整與能力)。本題最大壓力源為「擔心身體受傷及疼痛」(C);暑假作業(課業擔憂存在但非最大)、不能跟朋友玩、禁食活動受限非9歲檢查後的最大壓力。本題為C。","options":{"A":"暑假作業擔憂存在但非最大壓力源。","B":"不能跟朋友玩非最大壓力源。","C":"正確。學齡期最怕身體受傷及疼痛(身體完整性)。","D":"禁食活動受限非最大壓力源。"},"sources":["Nelson《兒科學》學齡期","壓力源"]}},"107030-N4-71":{"quick":"胎血循環血流方向正確的是「動脈導管血液流入主動脈」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 胎兒循環:(1)臍靜脈血(含氧高)→靜脈導管→下腔靜脈(非臍動脈→靜脈導管),A錯;(2)「動脈導管血液(右心室→肺動脈)→流入主動脈(繞過未張開的肺)」——正確;(3)肺動脈血經動脈導管入主動脈(肺未張開,血流不主要入肺),C錯;(4)經卵圓孔血是右心房→左心房(右→左)(非左心室→右心室),D錯。本題為B。","options":{"A":"錯。是臍靜脈經靜脈導管(非臍動脈)。","B":"正確。動脈導管血液流入主動脈。","C":"錯。肺未張開,血經動脈導管入主動脈(非入肺)。","D":"錯。卵圓孔是右心房→左心房(非左心室→右心室)。"},"sources":["Nelson《兒科學》胎兒循環","動脈導管"]}},"108110-N4-47":{"quick":"5歲右心導管檢查後護理錯誤的是「砂袋加壓穿刺部位,彎曲肢體防止砂袋掉落」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 心導管後:臥床6小時清醒後即可進食、評估檢查側肢體循環與對側比較、觸診兩側足背/脛後動脈做對稱比較皆正確。「砂袋加壓穿刺部位,彎曲肢體防砂袋掉落錯誤——穿刺肢體應平直不可彎曲(彎曲會使穿刺處出血/血腫),不可為防砂袋掉而彎曲肢體」。本題「錯誤」者為C。","options":{"A":"正確。臥床6小時,清醒後即可進食。","B":"正確。評估檢查側肢體循環並與對側比較。","C":"錯誤(本題答案)。穿刺肢體須平直不可彎曲(非彎曲)。","D":"正確。觸診兩側足背/脛後動脈對稱比較。"},"sources":["Nelson《兒科學》心導管","平直"]}},"109030-N4-71":{"quick":"正常情況下,兒童心臟血管含氧量最高處是「肺靜脈」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 肺靜脈攜帶肺氧合後的動脈血回左心房，含氧飽和度最高(約95~100%)(肺動脈/腔靜脈/右心房是靜脈血約70~75%)。本題含氧最高為「肺靜脈」(A)。","options":{"A":"正確。肺靜脈攜氧合血,含氧最高(約95~100%)。","B":"肺動脈是靜脈血(約70~75%)。","C":"上腔靜脈是靜脈血。","D":"右心房是靜脈血。"},"sources":["Nelson《兒科學》含氧","肺靜脈"]}},"109030-N4-72":{"quick":"5歲ASD心導管檢查後護理正確的是「右心導管檢查後需臥床4~6小時」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 心導管後:(1)「右心導管後臥床4~6小時(止血、防出血)」——正確;(2)穿刺肢體平直不可彎曲(非彎曲止血),B錯;(3)清醒後即可進食(不需禁食6小時),C錯;(4)返家穿刺處約24小時不弄濕(非3天不洗澡),D不精確。本題為A。","options":{"A":"正確。右心導管後臥床4~6小時。","B":"錯。穿刺肢體保持平直(非彎曲)。","C":"錯。清醒後即可進食(不需禁食6小時)。","D":"穿刺處約24小時不弄濕,「3天不洗澡」不精確。"},"sources":["Nelson《兒科學》心導管","臥床"]}},"109110-N4-65":{"quick":"胎血循環敘述錯誤的是「經過卵圓孔的血液是由左心房流向右心房」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 胎兒循環:(1)臍靜脈血經靜脈導管流向下腔靜脈——正確;(2)「經卵圓孔的血是左心房流向右心房錯誤——胎兒卵圓孔是右心房→左心房(右→左)(因胎兒右心房壓>左心房)」;(3)右心室血多經肺動脈幹→動脈導管→主動脈——正確;(4)臍靜脈血氧>臍動脈——正確。本題「錯誤」者為B。","options":{"A":"正確。臍靜脈血經靜脈導管流向下腔靜脈。","B":"錯誤(本題答案)。卵圓孔是右心房→左心房(非左→右)。","C":"正確。右心室血經肺動脈幹、動脈導管入主動脈。","D":"正確。臍靜脈血氧高於臍動脈。"},"sources":["Nelson《兒科學》胎兒循環","卵圓孔"]}},"111030-N4-66":{"quick":"心導管各腔室含氧飽和度異常的是「肺靜脈含氧飽和度70~75%」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血);右心房/右心室/肺動脈70~75%(靜脈血)。「肺靜脈含氧70~75%異常——肺靜脈是氧合後動脈血,應95~98%,70~75%(靜脈血值)過低=異常(提示左右分流混合)」。本題異常者為B。","options":{"A":"正常。右心房含氧70~75%(靜脈血)。","B":"本題答案(異常)。肺靜脈應95~98%,70~75%過低異常。","C":"正常。主動脈含氧95~98%。","D":"正常。左心房含氧95~98%。"},"sources":["Nelson《兒科學》含氧","肺靜脈"]}},"112110-N4-64":{"quick":"足月新生兒出生後循環變化正確的是「全身血管阻力增加,肺動脈阻力降低」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 出生後循環變化:(1)血氧升高使動脈導管收縮關閉(非血氧降低),A錯;(2)臍靜脈關閉成靜脈韌帶(非立即,約數天~週),B不精確;(3)「肺擴張→肺動脈阻力降低、臍帶結紮→全身(體循環)血管阻力增加」——正確;(4)卵圓孔關閉是因左心房壓>右心房壓(非右>左),D錯。本題為C。","options":{"A":"錯。血氧升高使動脈導管收縮(非降低)。","B":"臍靜脈關閉成靜脈韌帶非「立即」。","C":"正確。全身血管阻力增加,肺動脈阻力降低。","D":"錯。卵圓孔關閉因左心房壓>右心房(非右>左)。"},"sources":["Nelson《兒科學》出生循環","阻力"]}},"112110-N4-65":{"quick":"5歲VSD長期服毛地黃、右心導管檢查,最正確的是「檢查後維持穿刺肢體平直,須臥床休息」。","detail":{"background":"心導管檢查護理:檢查前禁食4~6小時、毛地黃暫停(依醫囑)、用遊戲/畫圖/繪本/角色扮演(具體)提供資訊(勿用解剖圖過於抽象給幼兒);檢查後:穿刺處砂袋加壓止血、穿刺肢體平直不可彎曲、臥床休息約4~6小時、觀察穿刺肢體末端脈搏、顏色、溫度並與對側比較、密切監測生命徵象(第1小時每15分鐘)、清醒後即可進食(不需等排氣,非腸道手術)。心導管可測各腔室壓力、含氧飽和度、血流變化(不能測電傳導(那是心電圖))。正常含氧飽和度:肺靜脈/左心房/左心室/主動脈95~98%(動脈血,含氧最高);腔靜脈/右心房/右心室/肺動脈70~75%(靜脈血)。胎兒循環:臍靜脈(含氧高)→靜脈導管→下腔靜脈→右心房→卵圓孔→左心房(右→左)→左心室→主動脈;右心室→肺動脈→動脈導管→主動脈;臍動脈(含氧低)回胎盤;出生後肺擴張、肺血管阻力降、全身阻力升、左心房壓>右心房→卵圓孔關;血氧升使動脈導管收縮關閉;臍血管關閉成韌帶。 (1)檢查前禁食4~6小時,毛地黃暫停(非改靜脈注射),A錯;(2)檢查後生命徵象第1小時每15分鐘(非持續4小時每15分鐘),B不精確;(3)「檢查後穿刺肢體平直、臥床休息」——正確;(4)右心導管多由股靜脈進入右心房(非股動脈),D錯。本題為C。","options":{"A":"錯。毛地黃檢查前暫停(非改靜脈注射)。","B":"生命徵象第1小時每15分鐘(非持續4小時)。","C":"正確。檢查後穿刺肢體平直、臥床休息。","D":"錯。右心導管由股靜脈進入(非股動脈)。"},"sources":["Nelson《兒科學》心導管","靜脈"]}},"101110-N4-36":{"quick":"顱內壓升高病童護理中「靜脈輸注glycerol時,應在20分鐘內輸畢」為錯誤。","detail":{"background":"顱內壓(IICP)升高護理:抬高床頭30度、減少聲光刺激、限水但維持電解質平衡、避免背部叩擊(增IICP)。「靜脈輸注glycerol20分鐘內輸畢錯誤——高滲透壓利尿劑(glycerol/mannitol)須緩慢輸注(約30~60分鐘),過快(20分鐘)會血壓波動/反彈。本題「錯誤」者為C。","options":{"A":"正確。減少病童周圍環境聲光刺激。","B":"正確。限水但維持體液電解質平衡。","C":"錯誤(本題答案)。高滲透壓利尿劑應緩慢輸注(非20分鐘內輸畢)。","D":"正確。避免背部叩擊(增IICP)。"},"sources":["Nelson《兒科學》IICP","glycerol"]}},"102030-N4-16":{"quick":"前列腺素(PGE2)引產敘述正確的是「會出現子宮強直性的收縮」。","detail":{"background":"前列腺素(PGE2)引產:(1)主要作用促子宮頸軟化、變薄(成熟)(非變厚),A錯;(2)可陰道塞劑/口服(非肛門塞劑較安全),B錯;(3)常配合催產素(oxytocin)使用,C錯;(4)「副作用子宮強直性收縮(過度刺激)」——正確(須監測胎心與宮縮)。本題為D。","options":{"A":"錯。PGE2促子宮頸軟化變薄(非變厚)。","B":"錯。多陰道塞劑(非肛門塞劑)。","C":"錯。常配合催產素使用。","D":"正確。可能出現子宮強直性收縮(過度刺激)。"},"sources":["新文京《產科護理學》引產","PGE2"]}},"102030-N4-37":{"quick":"壓力性尿失禁秤護墊法(pad weighting test),不包括的活動是「仰臥起坐」。","detail":{"background":"秤護墊法(pad test)評估壓力性尿失禁:讓個案進行增加腹壓的日常動作(走路、彎腰撿物、坐站交替、咳嗽、上下樓)後秤護墊重量變化評漏尿量。「仰臥起坐不包括——非日常增加腹壓的站立性活動(秤護墊測站立/活動時漏尿)。本題不包括者為C。","options":{"A":"包括。彎腰撿拾物品(增腹壓)。","B":"包括。走路。","C":"本題答案(不包括)。仰臥起坐非秤護墊測試活動。","D":"包括。坐/站交替。"},"sources":["新文京《婦科》尿失禁","pad test"]}},"102110-N4-57":{"quick":"出血性登革熱病童護理不適當的是「給予indomethacin或acetylsalicylic acid(aspirin)減輕疼痛發燒」。","detail":{"background":"出血性登革熱護理:監測生命徵象/血比容/體液電解質、高熱量高蛋白飲食+靜脈輸液、必要時輸血小板/新鮮血漿並注意體液過多/心衰竭皆適當。「給indomethacin/aspirin(acetylsalicylic acid)止痛退燒不適當——登革熱有出血傾向(血小板低),aspirin/NSAID抑制血小板加重出血,退燒應用acetaminophen」。本題不適當者為B。","options":{"A":"適當。監測生命徵象、血比容、體液電解質。","B":"不適當(本題答案)。登革熱禁aspirin/NSAID(抑血小板加重出血),用acetaminophen。","C":"適當。高熱量高蛋白飲食、必要時靜脈輸液。","D":"適當。必要時輸血小板/血漿,注意體液過多或心衰竭。"},"sources":["疾管署 登革熱","禁aspirin"]}},"103030-N4-74":{"quick":"2歲半(14kg)插鼻胃管正確的是「插管時,協助亮亮側躺向右側」(本題B)。","detail":{"background":"兒童鼻胃管(N-G tube):(1)2歲半約用較大尺寸(非10~12Fr過小;依體型),A不精確;(2)「插管時協助側躺(向右側)(利導管進入、防誤入氣管/利胃排空)」——官方答B;(3)插管中若咳嗽、嗆到、發紺是誤入氣管異常(非正常),C錯;(4)測量長度鼻尖→耳垂→劍突(非肚臍),D錯。本題依官方為B。","options":{"A":"2歲半鼻胃管尺寸依體型,「10~12Fr」不精確。","B":"正確(官方)。插管時協助側躺(向右側)。","C":"錯。咳嗽嗆到發紺是誤入氣管(異常,非正常)。","D":"錯。長度測量鼻尖→耳垂→劍突(非肚臍)。"},"sources":["Nelson《兒科學》鼻胃管","測量"]}},"103100-N4-5":{"quick":"妊娠期物質使用護理指導中「吸菸時菸草燃燒產生二氧化碳,會影響胎兒氧氣量供應」為錯誤。","detail":{"background":"妊娠物質使用:酒精→乙醛蓄積致神經傷害(胎兒酒精症候群)、尼古丁使子宮血管收縮降胎盤灌流、尼古丁進母乳產異味皆正確。「吸菸菸草燃燒產生二氧化碳影響胎兒氧氣錯誤——吸菸產生一氧化碳(CO),CO與血紅素結合(親和力高)減少攜氧→影響胎兒供氧(非二氧化碳)」。本題「錯誤」者為D。","options":{"A":"正確。胎兒無法快速排除酒精,乙醛蓄積致神經傷害。","B":"正確。尼古丁使子宮血管收縮,影響胎盤灌流。","C":"正確。尼古丁進入母乳產生異味。","D":"錯誤(本題答案)。吸菸產生一氧化碳(非二氧化碳)減少胎兒供氧。"},"sources":["新文京《產科護理學》物質使用","一氧化碳"]}},"103100-N4-41":{"quick":"我國1~14歲兒童主要死亡原因前3位不包括「氣喘」。","detail":{"background":"我國1~14歲兒童主要死因前三位:事故傷害(意外)、惡性腫瘤、先天性畸形/染色體異常(順序略有變動)。「氣喘不在前三位主要死因(氣喘多可控制,致死率低)」。本題不包括者為「氣喘」(A)。","options":{"A":"本題答案(不包括)。氣喘非1~14歲兒童前三大死因。","B":"是。事故傷害(意外)為兒童首要死因。","C":"是。惡性腫瘤。","D":"是。先天性畸形。"},"sources":["國健署 兒童死因","前三位"]}},"104030-N4-33":{"quick":"安胎婦女使用Yutopar(ritodrine)正確的是「鼓勵婦女左側臥增加子宮胎盤血液灌流」。","detail":{"background":"安胎藥Yutopar(ritodrine,β2-agonist子宮鬆弛劑):(1)胎兒可能心率過快(母β2刺激;非過緩),A錯;(2)孕婦副作用心搏過速+血壓下降(非升高)、肺水腫、低血鉀、高血糖,B「血壓升高」錯;(3)「鼓勵左側臥增子宮胎盤血液灌流」——正確;(4)其拮抗無特定Indocin是前列腺素抑制劑(另一類安胎藥),非Yutopar拮抗劑,D錯。本題為C。","options":{"A":"錯。胎兒可能心率過快(非過緩)。","B":"錯。孕婦血壓下降(非升高)。","C":"正確。鼓勵左側臥增加子宮胎盤血液灌流。","D":"錯。Indocin是另一類安胎藥,非Yutopar拮抗劑。"},"sources":["新文京《產科護理學》安胎","Yutopar"]}},"104100-N4-7":{"quick":"胎盤結構及功能正確的是「母體面含基底蛻膜,呈粗糙暗紅色;胎兒面被羊膜覆蓋呈光滑灰色」。","detail":{"background":"胎盤:(1)「母體面基底蛻膜粗糙暗紅;胎兒面羊膜覆蓋光滑灰色」——正確;(2)胎盤重約500~600g,約占胎兒體重1/6(非800~1500g/1/3),B錯;(3)胎盤不交換紅血球/球蛋白(分子大)(交換氧/養分/小分子),C錯;(4)胎盤分泌hCG/雌激素/黃體素/胎盤泌乳素(前列腺素是子宮/蛻膜分泌促收縮,非胎盤主功能),D不精確。本題為A。","options":{"A":"正確。母體面基底蛻膜粗糙暗紅,胎兒面羊膜光滑灰色。","B":"錯。胎盤約500~600g、占胎兒1/6(非800~1500g/1/3)。","C":"錯。胎盤不交換紅血球/球蛋白(分子大)。","D":"前列腺素主由子宮/蛻膜分泌,非胎盤主功能。"},"sources":["新文京《產科護理學》胎盤","構造"]}},"104100-N4-32":{"quick":"RU486的墮胎原理是「黃體素」的拮抗劑。","detail":{"background":"RU486(mifepristone):黃體素(progesterone)受體拮抗劑,阻斷黃體素→子宮內膜剝落、胚胎著床無法維持,合併前列腺素引產終止早孕。本題為「黃體素」(B)。 補充:RU486為黃體素受體拮抗劑,阻斷黃體素對子宮內膜的支持,使內膜剝落、蛻膜壞死、胚胎著床無法維持;臨床用於懷孕約7週(49天)內終止妊娠,常合併前列腺素(misoprostol)促子宮收縮排出,須在醫師監督下使用並追蹤。","options":{"A":"動情素非RU486拮抗對象。","B":"正確。RU486是黃體素拮抗劑。","C":"前列腺素是合併使用藥,非拮抗對象。","D":"hCG非RU486拮抗對象。"},"sources":["藥理 RU486","黃體素拮抗"]}},"104100-N4-34":{"quick":"經前緊張症候群(PMS)相關因素中「泌乳素過低」為錯誤。","detail":{"background":"經前症候群(PMS)相關因素:雌激素與黃體素不平衡、前列腺素過多、嚴重生活壓力、血清素/維生素B6不足。「泌乳素過低錯誤——PMS與泌乳素過高(非過低)相關(高泌乳素影響黃體功能)」。本題「錯誤」者為B。","options":{"A":"正確。雌激素與黃體素的不平衡。","B":"錯誤(本題答案)。是泌乳素過高(非過低)。","C":"正確。前列腺素過多。","D":"正確。嚴重生活壓力。"},"sources":["新文京《婦科》PMS","泌乳素"]}},"105030-N4-39":{"quick":"導致經前症候群(PMS)的可能因素正確的是「前列腺素過多」。","detail":{"background":"PMS可能因素:前列腺素過多(致痙攣不適)、雌激素黃體素不平衡、血清素低、維生素B6不足、壓力。本題正確為「前列腺素過多」(C);缺鈉與B6(B6不足是,缺鈉非主因)、缺泌乳素(是過高非缺)、血管加壓素減少(非主因)。本題為C。","options":{"A":"維生素B6不足是,但「缺鈉」非PMS主因。","B":"錯。PMS與泌乳素過高有關(非缺乏)。","C":"正確。前列腺素過多。","D":"血管加壓素減少非PMS主因。"},"sources":["新文京《婦科》PMS","前列腺素"]}},"105030-N4-77":{"quick":"橫膈疝氣(Diaphragmatic hernia)臨床表徵與處置中「當嬰兒呼吸窘迫時應立即以甦醒球(Ambu bag)擠壓急救」為錯誤。","detail":{"background":"先天性橫膈疝氣(CDH):腹腔臟器疝入胸腔→胸腔聞腸蠕動音、聽不到呼吸音、X光胸腔內充氣腸道+塌陷肺、呼吸窘迫;處置插鼻胃管減胃腸脹氣、禁面罩甦醒球(Ambu bag)正壓通氣(會使腸氣脹大更壓迫肺加重窘迫,應氣管插管通氣)。「以甦醒球(Ambu bag)面罩擠壓急救」錯誤。本題「錯誤」者為C。","options":{"A":"正確。插鼻胃管減輕胃腸壓力。","B":"正確。胸腔可聽見腸蠕動聲、聽不到呼吸聲。","C":"錯誤(本題答案)。CDH禁面罩甦醒球正壓(使腸氣脹更壓肺),應氣管插管。","D":"正確。X光胸腔內有充氣腸道與塌陷的肺。"},"sources":["Nelson《兒科學》橫膈疝氣","禁Ambu"]}},"105030-N4-79":{"quick":"1歲熱性痙攣出院護理指導不恰當的是「高燒時,可提供酒精拭浴以降低體溫」。","detail":{"background":"熱性痙攣(febrile convulsion)出院指導:抽搐時側臥維持呼吸道通暢、移除危險物、勿強塞物入口、發燒以溫水拭浴+退燒藥降溫。「高燒以酒精拭浴降溫不恰當——酒精拭浴禁用(酒精經皮膚/吸入中毒、血管收縮反致畏寒抖顫升溫、刺激),應用溫水拭浴」。本題不恰當者為A。","options":{"A":"不恰當(本題答案)。禁酒精拭浴(中毒/反升溫),應溫水拭浴。","B":"恰當。抽搐時側臥維持呼吸道通暢。","C":"恰當。痙攣時移除床上易致傷害物品。","D":"恰當。發作時不可強塞物品入口。"},"sources":["Nelson《兒科學》熱性痙攣","禁酒精"]}},"105090-N4-36":{"quick":"口服黃體素治療月經量過多的主要目的是「維持卵巢濾泡期功能」(本題C)。","detail":{"background":"月經量過多(menorrhagia)以黃體素治療:黃體素使子宮內膜轉為分泌期穩定、防內膜過度增生剝落出血、調節週期。本題依官方為C(維持卵巢/週期功能、穩定內膜);非增子宮收縮(A)、抑制前列腺素(B,那是NSAID)、抑制子宮內膜形成(D,黃體素是穩定非完全抑制)。本題為C。","options":{"A":"非增子宮收縮(那是麥角/前列腺素)。","B":"抑制前列腺素是NSAID,非黃體素。","C":"正確(官方)。維持/穩定卵巢週期與內膜功能。","D":"黃體素是穩定內膜(非完全抑制形成)。"},"sources":["新文京《婦科》月經過多","黃體素"]}},"105090-N4-39":{"quick":"54歲咳嗽或大笑時滲尿,最可能是「壓力性尿失禁」。","detail":{"background":"尿失禁分型:壓力性=腹壓增加(咳嗽、大笑、打噴嚏、提重物)時漏尿(骨盆底鬆弛);急迫性=突發強烈尿意忍不住;滿溢性=膀胱過脹點滴漏出;混合性=壓力+急迫。本題「咳嗽大笑時滲尿」為壓力性尿失禁(A)。","options":{"A":"正確。咳嗽大笑(增腹壓)時漏尿=壓力性尿失禁。","B":"滿溢性是膀胱過脹點滴漏出。","C":"急迫性是突發強烈尿意忍不住。","D":"混合性是壓力+急迫並存。"},"sources":["Nelson 尿失禁","壓力性"]}},"105090-N4-71":{"quick":"32週早產兒(1500g)口胃管餵食正確的是「灌食速度要緩慢,約5mL/5~10分鐘,以預防胃部過度膨脹」。","detail":{"background":"早產兒口胃管餵食:(1)測量長度鼻尖→耳垂→劍突(非劍突與肚臍中點),A不精確;(2)插入無咳嗽嗆到不能單憑此確認位置(須抽胃內容物/測pH/聽氣過水聲),B錯;(3)「灌食緩慢(約5mL/5~10分鐘)防胃過度膨脹/溢奶」——正確;(4)餵食後右側臥、頭抬高約30度(利胃排空、防吸入,非左側臥45度),D錯。本題為C。","options":{"A":"長度測量鼻尖→耳垂→劍突,「劍突肚臍中點」不精確。","B":"錯。無咳嗽不能單憑此確認位置(須抽吸/測pH)。","C":"正確。緩慢灌食(5mL/5~10分鐘)防胃過度膨脹。","D":"錯。餵食後右側臥、頭抬高約30度(非左側臥45度)。"},"sources":["Nelson《兒科學》早產兒餵食","緩慢"]}},"105090-N4-77":{"quick":"裘馨氏肌失養症(Duchenne)護理指導不適當的是「避免讓王小弟游泳,以防溺水意外」。","detail":{"background":"裘馨氏肌失養症(DMD,X染色體隱性、進行性肌肉無力):鼓勵適度體能活動避免攣縮變形、游泳是適合(水中浮力減負荷、維持關節活動)的運動(不應避免)、家中加裝輔具防意外、胸腔物理治療防肺炎。「避免游泳防溺水不適當——DMD鼓勵在安全監督下游泳(良好運動),不應因怕溺水而避免」。本題不適當者為B。","options":{"A":"適當。鼓勵體能活動避免肢體攣縮變形。","B":"不適當(本題答案)。游泳是DMD適合的運動,不應避免(應安全監督下進行)。","C":"適當。家中添加輔助設施減少意外。","D":"適當。每日胸腔物理治療預防肺炎。"},"sources":["Nelson《兒科學》DMD","游泳"]}},"105090-N4-80":{"quick":"14歲疑似腦膜炎、有顱內壓升高,正確的是「攝取高纖維食物,以避免便秘」。","detail":{"background":"腦膜炎+顱內壓(IICP)升高照護:(1)維持頭部抬高30度中位(非屈膝仰臥增IICP),A錯;(2)避免背部叩擊(增IICP),B錯;(3)避免深呼吸用力咳嗽/閉氣(Valsalva增IICP),C錯;(4)「攝取高纖食物避免便秘(用力解便增IICP)」——正確。本題為D。","options":{"A":"錯。屈膝仰臥增IICP(應頭抬高中位)。","B":"錯。避免背部叩擊(增IICP)。","C":"錯。避免用力咳嗽/閉氣(Valsalva增IICP)。","D":"正確。高纖食物避免便秘(防用力解便增IICP)。"},"sources":["Nelson《兒科學》IICP","便秘"]}},"106111-N4-7":{"quick":"不是胎兒造血器官的是「胰臟」。","detail":{"background":"胎兒造血器官(隨孕期演變):卵黃囊(最早)→肝臟(及脾)→骨髓(後期至出生後主要)。「胰臟不是造血器官(胰臟是消化/內分泌器官)」。本題不是造血器官者為「胰臟」(D)。 補充:胎兒造血部位隨孕期變化——最早為卵黃囊(約2~8週),其後為肝臟(及脾臟,約6週至出生前主要),骨髓自妊娠後期接手並成為出生後主要造血器官;胰臟屬消化與內分泌器官,不參與造血。","options":{"A":"卵黃囊是胎兒早期造血器官。","B":"肝臟是胎兒主要造血器官。","C":"骨髓是後期至出生後主要造血器官。","D":"本題答案(不是)。胰臟是消化/內分泌器官,非造血。"},"sources":["Nelson《兒科學》造血","胎兒"]}},"106111-N4-66":{"quick":"預防鐮刀狀細胞貧血危機,處置錯誤的是「定期輸注全血」。","detail":{"background":"鐮刀狀細胞貧血(sickle cell)危機預防:多飲水(防脫水血栓)、呼吸道感染立即治療(防組織缺氧誘發)、臥床休息減耗氧皆正確。「定期輸注全血錯誤——鐮刀細胞貧血若需輸血應輸濃縮紅血球(packed RBC)(非全血;定期輸全血會鐵過量/體液負荷,且非常規定期)。本題「錯誤」者為D。","options":{"A":"正確。多飲水預防血栓(脫水誘發鐮刀化)。","B":"正確。呼吸道感染立即治療,預防組織缺氧。","C":"正確。臥床休息減少體力消耗(耗氧)。","D":"錯誤(本題答案)。應輸濃縮紅血球(非定期輸全血,致鐵過量)。"},"sources":["Nelson《兒科學》鐮刀貧血","輸血"]}},"109030-N4-25":{"quick":"RU486(mifepristone)臨床治療中「在懷孕6週前服用,成功率最高」(本題錯誤項另選)——本題答C。","detail":{"background":"RU486(mifepristone,黃體素拮抗劑):(1)是黃體素拮抗劑、須醫師處方——正確;(2)懷孕早期(約7週/49天內)服用成功率高——大致正確;(3)「可帶藥回家服用,1~2週內回診」錯誤——RU486須在醫療院所醫師監督下服用與觀察(不可帶回家自行服用,有出血等風險)」;(4)合併前列腺素成功率約95%——正確。本題「錯誤」者為C。","options":{"A":"正確。是黃體素拮抗劑,須醫師處方。","B":"懷孕早期服用成功率高(大致正確)。","C":"錯誤(本題答案)。RU486須在醫療監督下服用,不可帶回家自行服用。","D":"正確。與前列腺素合併使用成功率約95%。"},"sources":["藥理 RU486","監督"]}},"109110-N4-74":{"quick":"腸套疊(intussusception)臨床表徵正確的是「解草莓果醬般大便(currant jelly stool)」。","detail":{"background":"腸套疊(intussusception):好發嬰幼兒、陣發性腹痛哭鬧(雙腿屈向腹)、嘔吐、草莓/紅醋栗果醬般血便(currant jelly stool)、右上腹香腸狀腫塊(非左下)。本題正確為「解草莓果醬般大便」(B);咳嗽哽塞發紺(非腸套疊)、左下腹腫塊(應右上腹)、暗茶色尿(非腸套疊)。本題為B。","options":{"A":"咳嗽哽塞發紺非腸套疊表徵。","B":"正確。解草莓/紅醋栗果醬般血便。","C":"錯。腫塊在右上腹(非左下象限)。","D":"暗茶色尿非腸套疊表徵。"},"sources":["Nelson《兒科學》腸套疊","果醬便"]}},"110030-N4-79":{"quick":"5個月水腦症預防顱內壓升高,護理措施不適當的是「術後每2小時協助叩擊與抽痰,以預防吸入性肺炎」。","detail":{"background":"水腦症(hydrocephalus)預防IICP:觀察囟門鼓脹/噴射狀嘔吐、抬高床頭30~45度降IICP、安撫減哭泣不安皆適當。「每2小時叩擊與抽痰不適當——背部叩擊/抽痰刺激會增加顱內壓(IICP),IICP升高者應避免」。本題不適當者為C。","options":{"A":"適當。觀察囟門鼓脹或噴射狀嘔吐(IICP徵象)。","B":"適當。抬高床頭30~45度降腦壓。","C":"不適當(本題答案)。叩擊抽痰會增IICP,應避免。","D":"適當。安撫奶嘴減少哭泣不安(哭鬧增IICP)。"},"sources":["Nelson《兒科學》水腦","叩擊"]}},"110110-N4-46":{"quick":"自閉症類群障礙(ASD)身心表徵錯誤的是「動作協調困難」。","detail":{"background":"自閉症類群障礙症(ASD,DSM-5):核心社會互動障礙(孤立人際互動)、溝通/語言障礙、固著重複(堅持固定習慣/玩法)、對改變敏感。「動作協調困難不是ASD核心診斷表徵(那較屬發展協調障礙);ASD核心是社交溝通+固著行為」。本題錯誤(非ASD核心)者為B。","options":{"A":"是。孤立的人際互動(社交障礙)。","B":"本題答案(錯誤/非核心)。動作協調困難非ASD核心表徵。","C":"是。堅持固定的習慣或玩法(固著)。","D":"是。語言和溝通能力障礙。"},"sources":["DSM-5 ASD","核心"]}},"111030-N4-58":{"quick":"嬰兒猝死症候群(SIDS)預防措施最不適當的是「小於3個月的嬰兒,最好與父母同床睡眠」。","detail":{"background":"嬰兒猝死症候群(SIDS)預防:仰睡(非趴睡)、嬰兒床避免鬆軟物件(枕頭棉被填充玩具)、奶嘴不懸掛頸部/衣物、同房不同床(與父母同床增窒息/壓迫風險)、避免過熱、母乳哺餵、勿吸菸。「<3個月與父母同床睡眠最不適當——應同房不同床(同床增SIDS/窒息風險)」。本題最不適當者為D。","options":{"A":"適當。嬰兒睡眠採仰睡。","B":"適當。嬰兒床避免放置鬆軟物件。","C":"適當。奶嘴不懸掛在頸部或衣物上。","D":"最不適當(本題答案)。應同房不同床(同床增SIDS/窒息風險)。"},"sources":["AAP SIDS","同房不同床"]}},"111030-N4-80":{"quick":"10歲腦膜炎、顱內壓增高(IICP),護理措施不適當的是「執行背部扣擊或抽痰,以利呼吸道通暢」。","detail":{"background":"腦膜炎+IICP升高:監測便秘(防用力解便增IICP)、監測噴射式嘔吐/認知改變、避免頭低腳高姿位引流(增IICP)皆適當。「執行背部叩擊或抽痰不適當——叩擊/抽痰刺激會增IICP,IICP升高者應避免」。本題不適當者為D。","options":{"A":"適當。監測有無便秘(防用力解便增IICP)。","B":"適當。監測噴射式嘔吐、認知改變(IICP徵象)。","C":"適當。避免頭低腳高姿位引流(增IICP)。","D":"不適當(本題答案)。叩擊/抽痰刺激會增IICP,應避免。"},"sources":["Nelson《兒科學》IICP","叩擊"]}},"111110-N4-23":{"quick":"各種避孕方法作用原理正確的是「陰道避孕環可抑制排卵,使子宮頸黏液變黏稠」。","detail":{"background":"避孕方法原理:(1)迷你丸(progestin-only)使子宮頸黏液變稠阻精(非使內膜炎症),A錯;(2)子宮內避孕器(IUD)引發子宮內膜無菌性炎症干擾著床(非使子宮頸黏液變稠),B錯;(3)避孕貼片(含雌+黃體素)抑制排卵(非前列腺素干擾著床),C錯;(4)「陰道避孕環(含荷爾蒙)抑制排卵+使子宮頸黏液變稠」——正確。本題為D。","options":{"A":"錯。迷你丸使子宮頸黏液變稠阻精(非內膜炎症)。","B":"錯。IUD引發內膜炎症干擾著床(非子宮頸黏液)。","C":"錯。避孕貼片抑制排卵(非前列腺素)。","D":"正確。陰道避孕環抑制排卵、使子宮頸黏液變稠。"},"sources":["新文京《婦科》避孕","陰道環"]}},"112030-N4-38":{"quick":"打噴嚏、咳嗽、大笑引起無法自主控制的漏尿,是「壓力性尿失禁」。","detail":{"background":"尿失禁分型:壓力性=腹壓增加(打噴嚏、咳嗽、大笑)時漏尿(骨盆底/尿道括約肌鬆弛);急迫性=突發強烈尿意;姿勢性=姿勢改變漏尿;滿流性=膀胱過脹溢出。本題「打噴嚏咳嗽大笑漏尿」為壓力性尿失禁(C)。","options":{"A":"急迫性是突發強烈尿意忍不住。","B":"姿勢性是姿勢改變時漏尿。","C":"正確。打噴嚏咳嗽大笑(增腹壓)漏尿=壓力性。","D":"滿流性是膀胱過脹溢出。"},"sources":["Nelson 尿失禁","壓力性"]}},"112180-N4-33":{"quick":"29週早產兒(1310g)各系統生理特徵正確的是「中樞神經系統不成熟,易發生呼吸暫停現象」。","detail":{"background":"早產兒生理特徵:(1)可經胎盤獲得IgG(非IgA;IgA由母乳獲得),A錯;(2)β-葡萄糖醛酸酶活性高(使結合膽紅素解離再吸收)致高膽紅素(本題B「量不足」方向錯),B錯;(3)早產兒最常見心臟問題是開放性動脈導管(PDA)(非VSD),C錯;(4)「中樞神經未成熟→呼吸暫停(apnea)」——正確。本題為D。","options":{"A":"錯。經胎盤獲得IgG(IgA由母乳獲得)。","B":"錯。β-葡萄糖醛酸酶活性高致高膽紅素(非量不足)。","C":"錯。早產兒最常見心臟問題是PDA(非VSD)。","D":"正確。中樞神經未成熟,易發生呼吸暫停。"},"sources":["Nelson《兒科學》早產兒","呼吸暫停"]}},"114100-N4-20":{"quick":"妊娠糖尿病母親所產新生兒常見合併症錯誤的是「高血鈣」。","detail":{"background":"妊娠糖尿病(GDM)母親新生兒合併症:低血糖(出生後母體高糖供應中斷+自身高胰島素)、低血鈣(非高血鈣)、紅血球增多症、高膽紅素血症、巨嬰、呼吸窘迫症候群(高胰島素延遲肺成熟)。「高血鈣錯誤——GDM新生兒是低血鈣(非高血鈣)。本題「錯誤」者為B。","options":{"A":"正確。低血糖(母體高糖中斷+高胰島素)。","B":"錯誤(本題答案)。是低血鈣(非高血鈣)。","C":"正確。紅血球增多症。","D":"正確。呼吸窘迫症候群(高胰島素延遲肺成熟)。"},"sources":["Nelson《兒科學》GDM新生兒","低血鈣"]}}},TO=["1呼吸系統解剖生理與評估", "2上呼吸道疾病", "3氣喘", "4細支氣管炎", "5肺炎與囊性纖維化", "6新生兒早產兒呼吸窘迫", "7胸腔物理治療氧療抽痰", "8先天性心臟病分類與非發紺型", "9法洛氏四重症", "10充血性心衰竭與毛地黃", "11心導管檢查與胎兒循環", "12母嬰產科與其他借題"],LEC={"1呼吸系統解剖生理與評估":{"html":"<p><b>兒童呼吸道特徵</b>:鼻腔狹小黏膜易腫;<b>耳咽管(歐氏管)短、寬、水平</b>→易中耳炎;喉頭位置較高、會厭軟骨大→易吸入性肺炎;肋骨水平、呼吸肌弱→<b>腹式呼吸</b>、年齡越小呼吸越快;胸腔順應性高(胸壁軟易凹陷)。</p><p><b>評估</b>:先測呼吸(觀腹部起伏)<b>完整1分鐘</b>→脈搏(<2歲心尖脈,左鎖骨中線第3~4肋間)→體溫。脈衝式血氧SaO2正常<b>95~100%</b>,感應部位需定期更換。</p>"},"2上呼吸道疾病":{"html":"<p><b>哮吼croup</b>:副流感病毒、6月~3歲、<b>狗吠咳嗽、聲音沙啞、吸氣性喘鳴(stridor)</b>;冷霧/噴霧、勿抽吸刺激喉部。<b>會厭炎</b>:Hib、高燒流口水坐姿前傾、<u>禁壓舌板/咽喉檢查/抽痰</u>、備插管急救。</p><p><b>中耳炎</b>:歐氏管短寬水平、拉扯耳朵發燒;鼓膜破裂流膿後痛緩;反覆致乳突炎。滴耳藥<b>3歲以下向下向後/以上向上向後</b>拉、患耳朝上側臥。<b>扁桃腺術後</b>:側臥利引流、<b>頻繁吞嚥/清喉嚨=出血徵象</b>、<u>禁用力咳嗽/熱食/酸性飲料</u>、給冰涼布丁冰淇淋。流鼻血:頭前傾、捏鼻翼、勿吞血。</p>"},"3氣喘":{"html":"<p><b>氣喘</b>:慢性發炎,過敏原→<b>IgE↑、嗜伊紅球↑</b>;病理=黏膜水腫+<b>平滑肌收縮</b>→<b>呼氣性喘鳴(wheeze)</b>、吐氣延長;嚴重→<b>呼吸性酸中毒</b>。檢查:<b>FEV1/FVC>80%正常</b>;PEFR綠燈≥80%/黃燈50~80%/紅燈<50%。</p><p><b>藥物</b>:短效β2緩解用、<b>吸入型類固醇(ICS,Flixotide)保養不可自停</b>、吸後漱口;<b>幼兒MDI+面罩式aerochamber</b>(乾粉吸入劑適5歲以上)。居家:避布織/絨毛、寢具熱水週洗、可游泳等有氧運動、不限制運動。</p>"},"4細支氣管炎":{"html":"<p><b>細支氣管炎</b>:<b>RSV最常見</b>、好發1歲以內冬春、飛沫接觸傳染;流鼻水咳嗽喘鳴呼吸喘,嚴重→<b>呼吸性酸中毒</b>;診斷取<b>鼻咽分泌物RSV抗原</b>;治療支持(氧氣、補水、抽痰),Ribavirin、RSV免疫球蛋白(palivizumab)預防高危嬰兒。氧氣頭罩濕化用<b>無菌蒸餾水</b>。</p>"},"5肺炎與囊性纖維化":{"html":"<p><b>肺炎</b>:細菌性(高燒痰多黏稠、<b>傳染力低</b>)、病毒性(傳染力高);<b>黴漿菌</b>好發學齡兒、漸進乾咳痰少、<b>用erythromycin/azithromycin</b>(無細胞壁β-lactam無效)。噴霧目的=稀痰/濕潤/擴張支氣管(非增表面張力)。</p><p><b>囊性纖維化</b>:體染色體隱性、痰黏稠、補胰酵素+脂溶性維生素、高熱量高蛋白多水分;<u>禁止咳劑/抗組織胺(痰更難排)</u>。</p>"},"6新生兒早產兒呼吸窘迫":{"html":"<p><b>首次呼吸</b>:產道擠壓排肺液+冷/化學刺激;<b>剖腹產</b>較易短暫呼吸窘迫。<b>表面張力素</b>降低肺泡表面張力、防<b>呼氣時肺泡塌陷</b>,約34~35週足。<b>RDS</b>:缺表面張力素→肺塌陷,X光毛玻璃樣、<b>呼吸性酸中毒</b>;補表面張力素(氣管內)、氧療(SpO2約90~95%)、CPAP(4~7cmH2O)、產前類固醇給母親。</p><p><b>胎便吸入(MAS)</b>:<b>足月/過熟兒</b>子宮內缺氧;<b>SIDS</b>仰睡、<u>同房不同床</u>;早產兒問題:腦室內出血、ROP(氧過高)、NEC、呼吸暫停。</p>"},"7胸腔物理治療氧療抽痰":{"html":"<p><b>CPT順序</b>:噴霧→<b>姿位引流(重力,痰肺節在最高處)</b>→叩擊(<b>杯狀手、墊薄布勿拍裸露皮膚、避脊椎、每部位1~2分鐘</b>)→抽痰;時機餐前或餐後1~2小時。<b>抽痰</b>:<10秒、嬰幼兒壓力60~100mmHg、放入不加壓抽出旋轉、前後給氧、順序鼻→口。</p><p><b>氧療</b>:氧氣頭罩流量>5L/min(防CO2滯留)、<b>濕化用無菌蒸餾水</b>;氧氣帳高濃度(40~60%)高濕度低溫、集中護理、<u>禁放電動玩具(火花)</u>、氧濃度儀放口鼻處。</p>"},"8先天性心臟病分類與非發紺型":{"html":"<p><b>分類</b>:非發紺型(左→右/阻塞)=<b>VSD、ASD、PDA、主動脈狹窄</b>;發紺型(右→左)=<b>法洛、TGA、三尖瓣閉鎖(4T)</b>。<b>PDA</b>:連續機械性雜音、寬脈壓;足月12週內多自閉;<b>早產兒PDA用Indomethacin關閉</b>(注意尿量),發紺型用<b>PGE1維持導管開放增肺血流</b>。</p><p><b>主動脈狹窄</b>:上肢血壓>下肢、頭痛、下肢脈弱冰冷。<b>TGA</b>:發紺、紅血球增多、PGE1維持混合血。ASD多無發紺、1歲內半數自閉。風濕熱查<b>ASLO↑</b>。</p>"},"9法洛氏四重症":{"html":"<p><b>法洛(TOF,發紺型)四特徵</b>:①<b>肺動脈狹窄(決定發紺嚴重度)</b>②VSD③主動脈跨位④右心室肥厚;<b>右→左分流</b>致發紺、杵狀指、紅血球增多。</p><p><b>缺氧發作(blue spell)</b>:哭鬧/餵食/排便/早晨突發發紺,<b>採膝胸臥姿/蹲踞</b>(膝向腹)→<b>增體循環阻力、減右→左分流、增肺血流、減下肢回心血量</b>;給氧、必要時嗎啡。治療:Blalock-Taussig分流→完全矯正。毛地黃中毒=厭食噁心嘔吐+心搏過慢。</p>"},"10充血性心衰竭與毛地黃":{"html":"<p><b>CHF嬰兒</b>:<b>心搏過快(代償非變慢)</b>、奔馬律、肝腫大水腫、肺水腫呼吸快、四肢冰冷盜汗、<b>血壓正常或偏低(非高血壓)</b>;處置毛地黃+利尿劑+限鈉+半坐臥+少量多餐。</p><p><b>毛地黃</b>:給藥前測<b>心尖脈1分鐘</b>(嬰<90~100/幼兒<70暫停)、飯前1h或飯後2h、勿與奶/果汁混、<b>漏服未超6小時可補(超過略過)</b>、補鉀。Propranolol注意心搏過慢;<b>Spironolactone保鉀→高血鉀</b>;Furosemide低血鉀。</p>"},"11心導管檢查與胎兒循環":{"html":"<p><b>心導管</b>:檢查前禁食4~6h、<b>毛地黃暫停</b>、用遊戲/繪本(具體);檢查後<b>穿刺肢體平直不可彎曲</b>、砂袋加壓、臥床4~6h、觀察末端脈搏顏色溫度與對側比較、<b>清醒後即可進食(不需等排氣)</b>。可測壓力/含氧飽和度/血流,<b>不測電傳導(那是心電圖)</b>。</p><p><b>含氧飽和度</b>:肺靜脈/左心/主動脈95~98%(動脈血最高)、腔靜脈/右心/肺動脈70~75%。<b>胎兒循環</b>:臍靜脈(含氧高)→靜脈導管→下腔→右心房→<b>卵圓孔→左心房(右→左)</b>;右心室→肺動脈→<b>動脈導管→主動脈</b>;出生後肺擴張、左心房壓>右心房→卵圓孔關、血氧升→動脈導管關。</p>"},"12母嬰產科與其他借題":{"html":"<p><b>顱內壓(IICP)升高</b>:抬高床頭30度、高纖防便秘、<u>避免叩擊/抽痰/頭低姿位引流/用力咳嗽(增IICP)</u>;高滲透壓利尿劑緩慢輸注。</p><p><b>其他</b>:橫膈疝氣<u>禁面罩甦醒球正壓</u>(腸氣脹更壓肺)、應插管;熱性痙攣<u>禁酒精拭浴</u>;腸套疊<b>草莓果醬便+右上腹香腸狀腫塊</b>;SIDS同房不同床;登革熱<u>禁aspirin</u>;GDM新生兒<b>低血糖低血鈣</b>;吸菸產生<b>一氧化碳</b>影響胎兒供氧;RU486是黃體素拮抗劑;壓力性尿失禁=咳嗽大笑漏尿。</p>"}};

 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+

}

function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
