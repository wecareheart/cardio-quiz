:"錯。嬰兒喉頭位置較高(非較低)。","D":"正確。胸廓擴張差,多採腹式(橫膈)呼吸。"},"sources":["新文京《兒科護理學》呼吸解剖","腹式"]}},"102110-N4-58":{"quick":"脈衝式血氧分析(pulse oximetry)測得兒童血氧飽和度(SaO2)正常範圍是「95~100%」(D)。","detail":{"background":"脈衝式血氧儀(SpO2)正常值約95~100%;<90~92%表示低血氧須處理。65~70、75~80、85~90皆過低,代表缺氧。","options":{"A":"65~70%過低(嚴重缺氧)。","B":"75~80%過低。","C":"85~90%偏低(已是低血氧)。","D":"正確。SaO2正常範圍95~100%。"},"sources":["新文京《兒科護理學》血氧","95~100"]}},"104030-N4-26":{"quick":"新生兒進入「第二反應期」徵象錯誤的是「呼吸道黏液分泌減少」(B)。","detail":{"background":"新生兒出生後第二反應期(出生數小時後再活躍期)特徵:心跳加快、腸蠕動活躍(可能排便)、「呼吸道黏液分泌增加」(易嗆奶,須注意清除)、出現尋乳反射。故「黏液分泌減少」錯誤。","options":{"A":"是。腸胃道蠕動變快。","B":"錯誤(本題答案)。第二反應期呼吸道黏液分泌增加(非減少)。","C":"是。心跳速率變快。","D":"是。出現尋乳反射。"},"sources":["新文京《兒科護理學》第二反應期","黏液增"]}},"104030-N4-59":{"quick":"嬰幼兒呼吸系統解剖生理特徵錯誤的是「嬰兒的喉頭在頸部之較高處,比成人較不易造成吸入性肺炎」(C)。","detail":{"background":"嬰兒喉頭位置「較高」反而「較易」嗆入造成吸入性肺炎,故「較不易」錯誤。其餘正確:鼻腔狹小、鼻黏膜柔軟微血管豐富易感染;耳咽管短寬直使病菌易入中耳;肋骨水平、多採腹式呼吸。","options":{"A":"正確。鼻腔狹小、鼻黏膜柔軟微血管豐富易感染。","B":"正確。耳咽管短寬直,病菌易入中耳。","C":"錯誤(本題答案)。喉頭較高反而較易吸入性肺炎(非較不易)。","D":"正確。肋骨水平、多採腹式呼吸。"},"sources":["新文京《兒科護理學》呼吸解剖","喉頭高"]}},"105090-N4-61":{"quick":"符合兒童呼吸系統解剖生理特徵的是「鼻腔狹小、鼻黏膜柔軟且微血管豐富」(A)。","detail":{"background":"兒童鼻腔狹小、鼻黏膜柔軟、微血管豐富,易因感染腫脹而阻塞、易流鼻血。耳咽管短寬「平」(非水平之外還短寬);喉頭較窄較高約在第3~4頸椎(非第4~5之外位置敘述);肺泡表面積相對「少」(非多),換氣儲備差。","options":{"A":"正確。鼻腔狹小、鼻黏膜柔軟、微血管豐富。","B":"耳咽管短、寬,但敘述細節不完全(非最佳)。","C":"喉頭位置/頸椎敘述不精確。","D":"錯。兒童肺泡表面積相對少(換氣儲備差)。"},"sources":["新文京《兒科護理學》呼吸解剖","鼻腔"]}},"106030-N4-59":{"quick":"5歲疑似細菌性支氣管炎,脈衝式血氧分析(Pulse Oximetry)錯誤的是「感應器的光源探測器位置應固定,避免更換,以增加數值之正確性」(C)。","detail":{"background":"脈衝式血氧儀感應器若長時間固定同一部位會壓迫致皮膚受損與循環不良,應「定時更換部位」,故「避免更換」錯誤。其餘正確:非侵入性可單次或連續測SpO2、可置耳垂手指腳趾、儀器顯示心跳與實際相符時數值才準。","options":{"A":"正確。非侵入性,可單次或連續測SpO2。","B":"正確。可於耳垂、手指、腳趾放置感應器。","C":"錯誤(本題答案)。感應器應定時更換部位(避免壓迫受損)。","D":"正確。顯示心跳與實際相符時數值才準確。"},"sources":["新文京《兒科護理學》血氧儀","換部位"]}},"106111-N4-46":{"quick":"6個月嬰兒呼吸評估錯誤的是「測量順序為先測量心尖脈,後測量呼吸」(A)。","detail":{"background":"幼兒評估順序應「先測呼吸(觀察安靜時腹部起伏)再測脈搏(心尖脈)」,因先碰觸或哭鬧會影響呼吸速率,故「先測心尖脈後測呼吸」錯誤。其餘正確:嬰兒多腹式呼吸觀察腹部起伏、呼吸型態不規則、6個月呼吸速率約30次/分屬正常範圍。","options":{"A":"錯誤(本題答案)。應先測呼吸再測脈搏(避免干擾呼吸速率)。","B":"正確。多採腹式呼吸,觀察腹部起伏。","C":"正確。嬰兒呼吸型態呈不規則。","D":"正確。6個月呼吸速率約30次/分。"},"sources":["新文京《兒科護理學》生命徵象","先測呼吸"]}},"107110-N4-70":{"quick":"兒童呼吸道與成人差異正確的是「嬰幼兒的歐氏管(耳咽管)較成人短、寬且直,呈水平位置,較易使致病菌或異物入侵」(D)。","detail":{"background":"嬰幼兒耳咽管短、寬、平直(水平),使鼻咽分泌物與病菌易進入中耳,故易併中耳炎。嬰兒喉頭位置「較高」約第3~4頸椎(非第5~6);會厭軟骨「較長軟」相對較易嗆;肋骨較水平多採腹式呼吸(非垂直)。","options":{"A":"錯。嬰兒喉頭較高(約第3~4頸椎,非第5~6低處)。","B":"錯。會厭軟骨較長軟相對較易嗆(非不易)。","C":"錯。肋骨較水平多採腹式呼吸(非垂直少用腹式)。","D":"正確。耳咽管短寬平直,病菌異物易入侵中耳。"},"sources":["新文京《兒科護理學》呼吸解剖","耳咽管"]}},"108020-N4-58":{"quick":"兒童呼吸與脈搏測量評估正確的是「2歲以下的兒童通常以聽診器測心尖脈」(C)。","detail":{"background":"2歲以下幼兒橈動脈不易觸診,通常以「聽診器測心尖脈(1分鐘)」較準確。新生兒呼吸急促是「>60次/分」(非40);1歲以下嬰兒多採「腹式」呼吸(非胸式);兒童最常測脈搏部位是橈動脈或心尖脈(非股動脈)。","options":{"A":"新生兒呼吸急促是>60次/分(非40)。","B":"錯。1歲以下嬰兒多採腹式呼吸(非胸式)。","C":"正確。2歲以下以聽診器測心尖脈。","D":"兒童最常測橈動脈/心尖脈(非股動脈)。"},"sources":["新文京《兒科護理學》脈搏","心尖脈"]}},"109110-N4-46":{"quick":"嬰幼兒呼吸系統解剖生理特徵正確的是「嬰幼兒的咽喉較狹窄,會厭軟骨較大,比成人較易造成吸入性肺炎」(B)。","detail":{"background":"嬰幼兒咽喉狹窄、會厭軟骨相對較大且喉頭位置較高,使其「較易嗆入造成吸入性肺炎」。舌頭在口腔所占比例「比成人大」(非小);採腹式呼吸是因肋骨較「水平」(非垂直);耳咽管短窄呈「水平」(非垂直)。","options":{"A":"錯。舌頭占口腔比例比成人大(非小)。","B":"正確。咽喉狹窄、會厭軟骨較大,較易吸入性肺炎。","C":"錯。肋骨較水平(非垂直)故採腹式呼吸。","D":"錯。耳咽管短窄呈水平(非垂直)。"},"sources":["新文京《兒科護理學》呼吸解剖","會厭"]}},"112110-N4-60":{"quick":"嬰幼兒呼吸系統特徵最不適當的是「嬰幼兒耳咽管較長、窄且垂直,致病菌較不易進入中耳」(A)。","detail":{"background":"嬰幼兒耳咽管「較短、寬、平直(水平)」,使致病菌「較易」進入中耳,故「長窄垂直、較不易進入」錯誤。其餘正確:會厭軟骨占比大且無彈性、喉頭較高較易吸入性肺炎、鼻黏膜微血管豐富易感染。","options":{"A":"最不適當(本題答案)。耳咽管短寬平直,病菌較易入中耳(非長窄垂直不易)。","B":"正確。會厭軟骨占比大且無彈性。","C":"正確。喉頭較高,較易吸入性肺炎。","D":"正確。鼻黏膜微血管豐富,易感染。"},"sources":["新文京《兒科護理學》呼吸解剖","耳咽管"]}},"113030-N4-39":{"quick":"嬰幼兒呼吸道特性錯誤的是「嬰幼兒胸腔順應性較成人低」(D)。","detail":{"background":"嬰幼兒胸壁柔軟、「胸腔順應性較成人高(較易塌陷)」,而肺順應性相對低,故「順應性較低」錯誤。其餘正確:耳咽管短且水平易感染、舌頭占口腔比例大感染後易阻塞、喉頭較高易吸入性肺炎。","options":{"A":"正確。耳咽管較短且水平,較易感染。","B":"正確。舌頭占口腔比例大,感染後易阻塞。","C":"正確。喉頭較高,較易吸入性肺炎。","D":"錯誤(本題答案)。嬰幼兒胸壁柔軟、胸腔順應性較高(非較低)。"},"sources":["新文京《兒科護理學》呼吸解剖","順應性"]}},"113100-N4-30":{"quick":"1歲發燒入院生命徵象測量最適切的是「於左鎖骨中線第三~四肋間測量心尖脈」(C)?——本題答C。","detail":{"background":"本題官方答案為C。嬰幼兒心尖脈測量位置約在「左鎖骨中線第3~4肋間」(年齡越小心尖位置越高外側)。壓脈帶寬度應為上臂長約2/3(非1/2);測呼吸應觀察腹部起伏滿「1分鐘」(嬰兒呼吸不規則,非10秒乘六);耳溫測量3歲以下耳朵應「向下向後」拉(非向上向後)。","options":{"A":"壓脈帶寬度約上臂的2/3(非1/2)。","B":"嬰兒呼吸不規則,應測滿1分鐘(非10秒乘六)。","C":"正確(本題答案)。心尖脈於左鎖骨中線第3~4肋間。","D":"3歲以下耳溫應耳朵向下向後拉(非向上向後)。"},"sources":["新文京《兒科護理學》心尖脈","3-4肋間"]}},"113100-N4-49":{"quick":"嬰幼兒呼吸系統解剖生理特徵正確的是「嬰幼兒的氣管較成人短,分叉處較高,比成人較易造成吸入性肺炎」(B)。","detail":{"background":"嬰幼兒氣管短、分叉(隆突)位置較高,且右主支氣管較直,異物與分泌物易吸入致吸入性肺炎。肺泡少胸廓小使年齡越小呼吸越「快」(非慢);耳咽管短寬呈「水平」(非垂直);肋骨較「水平」採腹式呼吸(非垂直胸式)。","options":{"A":"錯。年齡越小呼吸速率越快(非越慢)。","B":"正確。氣管短、分叉高,較易吸入性肺炎。","C":"錯。耳咽管短寬呈水平(非垂直)。","D":"錯。肋骨較水平採腹式呼吸(非垂直胸式)。"},"sources":["新文京《兒科護理學》呼吸解剖","氣管短"]}},"101030-N4-57":{"quick":"4歲哮吼症(croup)最合宜的護理措施是「提供噴霧治療」(D)。","detail":{"background":"哮吼(croup,喉氣管支氣管炎)致上呼吸道(喉部)水腫、吸氣哮鳴與狗吠咳,護理以「噴霧(冷霧/蒸氣)濕化呼吸道、減輕喉部水腫」與密切觀察呼吸窘迫為主。應「鼓勵多喝水」(非限水);多數不需立即上呼吸器或鼻胃灌食(除非嚴重)。","options":{"A":"錯。應鼓勵多喝水(非限制水分)。","B":"多數不需立即用呼吸器(除非嚴重呼吸衰竭)。","C":"多數不需鼻胃灌食(可進食)。","D":"正確。提供噴霧治療濕化、減輕喉部水腫。"},"sources":["新文京《兒科護理學》哮吼","噴霧"]}},"102030-N4-60":{"quick":"扁桃腺切除術後照顧「不適當」者＝清醒後試食「檸檬汁」等酸性飲料(會刺激傷口;應給冰涼、非酸性流質)。","detail":{"background":"本題官方答案為D。扁桃腺切除術後止痛應避免「阿斯匹靈(增出血)」,且本題以D為不適當(就「術後24小時內靜脈止痛」之給法/時機官方判定不當)。其餘為適當的術後照護:未清醒前採俯臥/側臥利分泌物引流、清醒無嘔吐出血可進食冰涼布丁、避免哭泣用力咳嗽清喉嚨(防出血)。","options":{"A":"未清醒前採俯臥/側臥利分泌物引流，適當。","B":"不適當(本題答案)。檸檬汁為「酸性」會刺激傷口，術後應給冰涼、非酸性流質(冰水、布丁可，檸檬汁不宜)。","C":"避免哭泣、用力咳嗽、清喉嚨以防出血，適當。","D":"術後24小時內可靜脈給止痛劑(避免阿斯匹靈)，適當。"},"sources":["新文京《兒科護理學》扁桃腺術後","止痛"]}},"103030-N4-60":{"quick":"嬰幼兒急性中耳炎的原因錯誤的是「歐氏管較成人短、窄且彎曲」(B)。","detail":{"background":"嬰幼兒耳咽管(歐氏管)是「短、寬、平直(水平)」而非「窄且彎曲」,使鼻咽病菌易上行入中耳致中耳炎,故B敘述錯誤。其餘正確:上呼吸道感染、腭裂未矯正(影響耳咽管功能)、耳內淋巴組織腫大阻塞耳咽管皆是中耳炎成因。","options":{"A":"正確。上呼吸道感染是中耳炎原因。","B":"錯誤(本題答案)。歐氏管是短、寬、平直(非窄且彎曲)。","C":"正確。腭裂尚未矯正影響耳咽管功能。","D":"正確。耳內淋巴組織腫大阻塞歐氏管。"},"sources":["新文京《兒科護理學》中耳炎","耳咽管"]}},"106110-N4-45":{"quick":"4歲反覆流鼻血,護理指導不適合的是「鼓勵將鼻血吞下而不要擤出」(B)。","detail":{"background":"流鼻血時應「頭向前傾、捏緊鼻翼加壓約10分鐘、冷敷鼻樑」止血;「鼓勵把鼻血吞下」不適合(吞入血液刺激胃致噁心嘔吐、且無法評估出血量),應讓血液流出或吐出。","options":{"A":"適合。維持頭向前傾(防血液倒流入咽)。","B":"不適合(本題答案)。不應把鼻血吞下(刺激胃、無法評估出血量)。","C":"適合。捏緊鼻翼/鼻樑加壓約10分鐘。","D":"適合。冷毛巾敷鼻樑協助止血。"},"sources":["新文京《兒科護理學》流鼻血","頭前傾"]}},"106110-N4-60":{"quick":"3歲急性鼻咽炎照護較不適當的是「鼻塞引起的呼吸費力是正常現象,請父母不必擔心」(B)。","detail":{"background":"幼兒鼻腔狹小,鼻塞可明顯影響呼吸與進食(尤嬰幼兒以鼻呼吸為主),不應輕忽說「正常不必擔心」,應教導清潔鼻腔、抬高頭部、必要時就醫,故B較不適當。其餘適當:多喝水臥床休息、注意通風防飛沫、少摸口鼻眼降低感染。","options":{"A":"適當。鼓勵多喝水或果汁、臥床休息。","B":"較不適當(本題答案)。鼻塞影響呼吸進食,不應輕忽不處理。","C":"適當。注意室內通風,避免飛沫傳染。","D":"適當。少用手摸口鼻眼降低感染風險。"},"sources":["新文京《兒科護理學》鼻咽炎","鼻塞"]}},"106111-N4-60":{"quick":"吸氣期可聽見不連續性、水分過多且大聲的呼吸音是「囉音(rales)」(B)。","detail":{"background":"囉音(rales/crackles)是吸氣時聽到的「不連續性、爆裂(水泡)音」,代表小氣道/肺泡有分泌物或液體(如肺炎、肺水腫)。乾囉音(rhonchi)是大氣道分泌物的低沈連續音;喘鳴(wheeze)是呼氣相高調哨音(氣道狹窄/氣喘);哮鳴(stridor)是上呼吸道阻塞的吸氣相高調音。","options":{"A":"乾囉音是大氣道分泌物的連續低沈音。","B":"正確。囉音(rales)是吸氣不連續爆裂音。","C":"喘鳴是呼氣相高調哨音(氣道狹窄)。","D":"哮鳴是上呼吸道阻塞的吸氣高調音。"},"sources":["新文京《兒科護理學》呼吸音","囉音"]}},"107030-N4-67":{"quick":"中耳炎病童臨床表徵錯誤的是「會有狗吠式(barking)咳嗽、哽噎、發紺等現象」(C)。","detail":{"background":"「狗吠式咳嗽、哽噎、發紺」是哮吼(croup)/喉部疾病的表現,非中耳炎,故C錯誤。中耳炎表現:搖頭躁動、拉扯耳朵、耳痛發燒、反覆感染可致乳突炎、鼓膜破裂流膿後疼痛緩解。","options":{"A":"正確。搖頭躁動、不斷拉扯耳朵。","B":"正確。長期反覆感染可引起乳突炎。","C":"錯誤(本題答案)。狗吠咳嗽哽噎發紺是哮吼(非中耳炎)。","D":"正確。鼓膜破裂分泌物流出後疼痛改善。"},"sources":["新文京《兒科護理學》中耳炎","拉耳"]}},"107030-N4-69":{"quick":"造成嬰幼兒上呼吸道感染合併中耳炎的原因正確的是「歐氏管較短,寬且呈水平」(B)。","detail":{"background":"嬰幼兒耳咽管(歐氏管)「短、寬、平直(水平)」,鼻咽分泌物與病菌易上行進入中耳,故易合併中耳炎。鼻腔狹小、喉頭較高、舌頭比例大雖是兒童呼吸道特徵,但「合併中耳炎」最直接的原因是耳咽管的構造。","options":{"A":"鼻腔狹小與上呼吸道感染相關(非中耳炎最直接原因)。","B":"正確。歐氏管短、寬、水平,病菌易入中耳。","C":"喉頭較高與吸入性肺炎相關(非中耳炎)。","D":"舌頭比例大與阻塞相關(非中耳炎)。"},"sources":["新文京《兒科護理學》中耳炎","歐氏管"]}},"107110-N4-42":{"quick":"瀕死兒童的呼吸與心臟血管生理反應錯誤的是「喉頭肌肉緊縮,可自行將分泌物咳出」(B)。","detail":{"background":"瀕死期肌肉張力下降、咳嗽與吞嚥反射減弱,「無法自行咳出分泌物」(出現death rattle瀕死喉鳴),故B錯誤。其餘正確:出現陳施氏或喟嘆式呼吸、四肢末梢脈搏變弱不易觸診、皮膚濕冷蒼白四肢發紺。","options":{"A":"正確。出現陳施氏呼吸或喟嘆式呼吸。","B":"錯誤(本題答案)。瀕死期無法自行咳出分泌物(死亡喉鳴)。","C":"正確。四肢末梢脈搏變弱且不易觸診。","D":"正確。皮膚濕冷、蒼白、四肢發紺。"},"sources":["新文京《兒科護理學》瀕死","喉鳴"]}},"108110-N4-57":{"quick":"4歲中耳炎執行耳內給藥,耳朵應「往上往後拉」(A)。","detail":{"background":"耳內給藥拉耳廓使外耳道變直以利藥物進入:「3歲以上(含成人)往上往後拉」、「3歲以下往下往後拉」。本題4歲,故往上往後拉。","options":{"A":"正確。4歲(≥3歲)耳朵往上往後拉。","B":"往下往前拉非正確方向。","C":"往上往前拉非正確方向。","D":"往下往後拉適用於3歲以下(非4歲)。"},"sources":["新文京《兒科護理學》耳藥","往上後"]}},"108110-N4-67":{"quick":"哮吼(croup)正確的是「病童會出現聲音沙啞(hoarseness)、喉嚨緊縮及狗吠式咳嗽(barking cough)」(D)。","detail":{"background":"哮吼典型:聲音沙啞、吸氣哮鳴(stridor,非呼氣)、狗吠式咳嗽、喉部緊縮,常見於6個月~3歲(非學齡期),致病原多為「副流行性感冒病毒」(非A群β型葡萄球菌)。","options":{"A":"錯。致病原多為副流行性感冒病毒(非A群β型葡萄球菌)。","B":"錯。較常發生於6個月~3歲(非學齡期)。","C":"錯。哮鳴是吸氣時聽見(非呼氣)。","D":"正確。聲音沙啞、喉嚨緊縮、狗吠式咳嗽。"},"sources":["新文京《兒科護理學》哮吼","狗吠咳"]}},"108110-N4-68":{"quick":"扁桃腺切除術後護理措施錯誤的是「鼓勵病童常做咳嗽動作,以利肺部擴張」(A)。","detail":{"background":"扁桃腺切除術後應「避免用力咳嗽、清喉嚨」(會牽扯傷口致出血),故A錯誤。其餘正確:採側臥或俯臥利分泌物引流、觀察嘔吐物是否含血(出血警訊)、可進食冰涼果凍布丁冰淇淋(減痛止血、避免紅色易混淆出血的飲料)。","options":{"A":"錯誤(本題答案)。應避免用力咳嗽(會牽扯傷口出血)。","B":"正確。採側臥或俯臥利分泌物引流。","C":"正確。觀察嘔吐物是否含血液(出血警訊)。","D":"正確。可提供冰涼果凍、布丁、冰淇淋。"},"sources":["新文京《兒科護理學》扁桃腺術後","勿咳"]}},"109030-N4-69":{"quick":"1歲急性中耳炎較適當的護理措施是「清潔耳道時,耳朵宜向下向後拉」(B)。","detail":{"background":"1歲(3歲以下)清潔耳道或給耳藥,耳廓應「向下向後拉」拉直外耳道。中耳炎耳痛應「適當給止痛」(非少服);患耳痛可採「患側朝下(向左,本題左耳)」利引流(此處應依醫囑);抗生素須「服完整療程」不可無症狀就自行停藥。","options":{"A":"錯。中耳炎耳痛應適當給止痛(非少服)。","B":"正確。1歲清潔耳道耳朵向下向後拉。","C":"臥姿應依醫囑(患側朝下利引流),非一律右臥。","D":"錯。抗生素須服完整療程(非無症狀就自行停)。"},"sources":["新文京《兒科護理學》中耳炎","向下後"]}},"110030-N4-51":{"quick":"3歲半會厭炎住院最適當的護理措施是「協助喉嚨採檢時,備好急救用物」(B)。","detail":{"background":"急性會厭炎(會厭腫脹)隨時可能完全阻塞呼吸道,任何刺激咽喉(壓舌板、採檢)都可能誘發喉痙攣窒息,故檢查/採檢時必須「備妥插管與急救用物」。不可常規抽痰或用壓舌板刺激咽喉;Hib疫苗是「預防」(非急性期治療);應避免刺激,不一定給冰冷食物(以氣道安全優先)。","options":{"A":"Hib疫苗是預防(非急性期處置)。","B":"正確。採檢時備好急救用物(防誘發喉痙攣窒息)。","C":"錯。不可常規抽痰刺激咽喉(誘發喉痙攣)。","D":"急性期以氣道安全優先(非以給食物為重點)。"},"sources":["新文京《兒科護理學》會厭炎","備急救"]}},"110030-N4-62":{"quick":"兒童會厭炎(Epiglottitis)典型症狀最不適當的是「口腔潰瘍」(D)。","detail":{"background":"會厭炎典型「4D」:流口水(Drooling)、吞嚥困難(Dysphagia)、發聲困難(Dysphonia)、呼吸窘迫(Distress),常見高燒、身體前傾三腳架姿勢。「口腔潰瘍」非會厭炎表現(那是疱疹性齦口炎等),故最不適當。","options":{"A":"是典型。流口水(Drooling)。","B":"是典型。吞嚥困難(Dysphagia)。","C":"是典型。發聲困難(Dysphonia)。","D":"最不適當(本題答案)。口腔潰瘍非會厭炎表現。"},"sources":["新文京《兒科護理學》會厭炎","4D"]}},"110110-N4-62":{"quick":"9歲扁桃腺切除術後傷口疼痛最適當的護理是「為緩解疼痛,依醫囑按時服用Acetaminophen」(B)。","detail":{"background":"扁桃腺術後疼痛可「依醫囑按時給acetaminophen(普拿疼)」止痛(避免阿斯匹靈增出血)。應「鼓勵吃冰涼飲食」(冰涼止血止痛,非避免);「不可熱敷」(熱會擴張血管致出血);避免「檸檬/柳橙等酸性或紅色飲料」(刺激傷口、混淆出血),故B正確。","options":{"A":"錯。應吃冰涼飲食(止血止痛,非避免)。","B":"正確。依醫囑按時服用Acetaminophen止痛。","C":"錯。不可熱敷(熱擴張血管致出血)。","D":"錯。避免檸檬柳橙等酸性飲料(刺激傷口)。"},"sources":["新文京《兒科護理學》扁桃腺術後","普拿疼"]}},"111030-N4-42":{"quick":"8個月嬰兒口中異物、有意識、呼吸困難,最適當的是「頭低於軀幹,於肩胛骨間叩擊5下,兩乳頭連線下壓胸5下」(C)。","detail":{"background":"嬰兒(<1歲)異物哽塞且有意識時,採「背部拍擊5下(頭低於軀幹、肩胛骨間)+胸部壓擠5下(兩乳頭連線下方)」交替,直到異物排出或失去意識。嬰兒「不可做哈姆立克腹部推擠」(易傷腹腔臟器);有意識且呼吸困難時「不應盲目挖異物或人工呼吸」。","options":{"A":"有意識時非立即心外按壓(且挖異物可能更深)。","B":"有意識且呼吸困難非立即人工呼吸。","C":"正確。背部拍擊5下+胸部壓擠5下(嬰兒哽塞處置)。","D":"錯。嬰兒不可做腹部哈姆立克推擠(易傷臟器)。"},"sources":["新文京《兒科護理學》異物哽塞","嬰兒"]}},"111030-N4-62":{"quick":"3歲扁桃腺切除術後護理措施正確的是「出現清喉嚨或吞嚥次數增加,應視為早期出血警訊」(A)。","detail":{"background":"扁桃腺術後若「頻繁清喉嚨或吞嚥次數增加」,常是傷口出血、血液流入咽部被吞下的早期警訊,須立即評估。應採「側臥/俯臥」利引流(非平躺);避免紅色/酸性冰冷飲料如西瓜汁番茄汁(混淆出血、刺激);不可用力擤鼻涕(增壓出血)。","options":{"A":"正確。清喉嚨/吞嚥次數增加是早期出血警訊。","B":"錯。應採側臥/俯臥利引流(非平躺)。","C":"錯。避免紅色/酸性冰冷飲料(混淆出血、刺激)。","D":"錯。不可用力擤鼻涕(增壓致出血)。"},"sources":["新文京《兒科護理學》扁桃腺術後","出血警訊"]}},"111030-N4-63":{"quick":"7個月哮吼(croup)護理措施錯誤的是「給予抽痰協助分泌物排出」(B)。","detail":{"background":"哮吼是喉部水腫狹窄,「抽痰會刺激喉部誘發喉痙攣、加重阻塞」,故不應常規抽痰,B錯誤。其餘正確:給足夠水分與營養、觀察呼吸窘迫(心跳快鼻翼搧動胸骨凹陷)、用吸入型類固醇後漱口防口腔念珠菌。","options":{"A":"正確。給予充足水分與適當營養。","B":"錯誤(本題答案)。抽痰會刺激喉部誘發喉痙攣(不應常規抽痰)。","C":"正確。觀察呼吸窘迫(心跳快、鼻翼搧動、胸骨凹陷)。","D":"正確。吸入Flixotide後漱口預防感染(念珠菌)。"},"sources":["新文京《兒科護理學》哮吼","勿抽痰"]}},"112030-N4-61":{"quick":"9個月雙側中耳炎臨床表徵錯誤的是「吞嚥困難」(D)。","detail":{"background":"中耳炎表現:耳痛(嬰兒拉扯耳朵)、高燒、頸部淋巴結腫大、躁動哭鬧、聽力下降、鼓膜紅腫。「吞嚥困難」是咽喉/會厭疾病的表現,非中耳炎特徵,故D錯誤。","options":{"A":"是表徵。頸淋巴結腫大。","B":"是表徵。抓或拉扯耳朵(耳痛)。","C":"是表徵。高燒。","D":"錯誤(本題答案)。吞嚥困難非中耳炎表現(是咽喉疾病)。"},"sources":["新文京《兒科護理學》中耳炎","非吞嚥困難"]}},"112110-N4-63":{"quick":"10歲過敏性鼻炎護理措施最不適當的是「需長期使用鼻血管收縮噴劑」(A)。","detail":{"background":"鼻血管收縮噴劑(去充血劑)若「長期使用會反彈性鼻充血(藥物性鼻炎)」,故不應長期使用,A最不適當。其餘適當:避免毛毯絨毛玩具(塵蟎過敏原)、教導咳嗽打噴嚏遮口鼻禮節、依醫囑口服抗組織胺緩解過敏症狀。","options":{"A":"最不適當(本題答案)。鼻血管收縮噴劑長期用會反彈性鼻充血。","B":"適當。避免毛毯及絨毛玩具(塵蟎過敏原)。","C":"適當。咳嗽打噴嚏遮口鼻的禮節。","D":"適當。依醫囑給口服抗組織胺緩解過敏。"},"sources":["新文京《兒科護理學》過敏性鼻炎","勿長期"]}},"112180-N4-39":{"quick":"急性會厭炎(acute epiglottitis)臨床表徵錯誤的是「持續性咳嗽」(C)。","detail":{"background":"會厭炎以「流口水、吞嚥困難、發聲困難、呼吸窘迫、身體前傾三腳架姿、高燒、喉嚨痛」為主,因會厭腫脹疼痛,病童「不太能咳嗽、聲音悶啞」,而非「持續性咳嗽」(持續咳嗽較像哮吼),故C錯誤。","options":{"A":"正確。坐姿身體前傾、手撐下巴(三腳架姿)。","B":"正確。流口水、吞嚥困難。","C":"錯誤(本題答案)。會厭炎非持續性咳嗽(咳嗽是哮吼)。","D":"正確。呼吸窘迫、發音困難。"},"sources":["新文京《兒科護理學》會厭炎","非咳嗽"]}},"113030-N4-38":{"quick":"5歲扁桃腺切除手術術後護理正確的是「注意觀察是否有吞嚥或清喉嚨次數增加」(B)。","detail":{"background":"扁桃腺術後「吞嚥/清喉嚨次數增加」是出血警訊須觀察。應「避免用力咳嗽深呼吸」(牽扯傷口);「禁熱敷熱食」(熱致出血);避免「檸檬等酸性/紅色飲料」(刺激、混淆出血),宜冰涼飲食。","options":{"A":"錯。應避免用力咳嗽(牽扯傷口出血)。","B":"正確。觀察吞嚥/清喉嚨次數增加(出血警訊)。","C":"錯。禁熱敷熱食(熱致出血)。","D":"錯。避免檸檬等酸性飲料(刺激傷口)。"},"sources":["新文京《兒科護理學》扁桃腺術後","出血警訊"]}},"113100-N4-42":{"quick":"扁桃腺切除術後飲食護理指導適當的是「可吃布丁或冰淇淋」(C)。","detail":{"background":"扁桃腺術後宜「冰涼、軟質、不刺激」飲食(布丁、冰淇淋)止血止痛。避免「紅色飲料(西瓜汁、番茄汁)」混淆出血、避免「酸性飲料(檸檬汁、柳橙汁)」刺激傷口、避免「茶/咖啡」等刺激性。","options":{"A":"錯。西瓜汁/番茄汁是紅色(混淆出血)。","B":"錯。檸檬汁/柳橙汁酸性刺激傷口。","C":"正確。可吃布丁或冰淇淋(冰涼軟質)。","D":"錯。無糖綠茶及咖啡有刺激性。"},"sources":["新文京《兒科護理學》扁桃腺術後","冰涼軟質"]}},"114170-N4-30":{"quick":"2歲右側中耳炎滴耳藥正確的是「將幼童耳廓向下及向後拉,滴入耳藥後協助右側臥...」?——本題答D「向下向後拉、滴後左側臥」。","detail":{"background":"本題官方答案為D。3歲以下幼兒滴耳藥耳廓「向下向後」拉直外耳道;滴右耳後應「健側(左側)在下、患耳(右)朝上」側臥10~15分鐘讓藥液停留進入,故「向下向後拉、滴後左側臥」正確。","options":{"A":"錯。3歲以下應向下向後拉(非向上向後)。","B":"錯。向上向後是3歲以上。","C":"方向對但滴右耳應左側臥(患耳朝上),非右側臥。","D":"正確(本題答案)。向下向後拉、滴後左側臥(患耳朝上停留)。"},"sources":["新文京《兒科護理學》耳藥","向下後"]}},"114170-N4-39":{"quick":"2歲急性中耳炎返家護理照護正確的是「執行耳內給藥時,應將耳朵往下往後拉」(B)。","detail":{"background":"2歲(3歲以下)耳內給藥耳廓「往下往後」拉直外耳道。擤鼻涕應「一次壓一側鼻孔」分別擤(非兩側一起,以免壓力把分泌物推入中耳);鼓膜切開引流宜臥向「患側」利引流(非健側);抗生素須「服完整療程」(非耳不痛就停)。","options":{"A":"錯。擤鼻涕應一次壓一側(非兩側一起)。","B":"正確。2歲耳內給藥耳朵往下往後拉。","C":"鼓膜切開引流宜臥向患側利引流(非健側)。","D":"錯。抗生素須服完療程(非耳不痛就停)。"},"sources":["新文京《兒科護理學》中耳炎","向下後"]}},"108020-N4-67":{"quick":"2歲聽到哮鳴音(Stridor)可能的原因是「上呼吸道發炎或有異物阻塞的情形」(D)。","detail":{"background":"哮鳴音(stridor)是上呼吸道(喉、氣管)阻塞或狹窄時於「吸氣相」聽到的高調粗糙聲,常見於哮吼、會厭炎、異物吸入、喉部水腫等。它代表上呼吸道阻塞,需評估呼吸窘迫,並非氣喘前兆(氣喘是呼氣相喘鳴wheeze)、非正常喉部聲、也非分泌物多的囉音。","options":{"A":"氣喘是呼氣相喘鳴(wheeze),非哮鳴音(stridor)。","B":"哮鳴音是異常上呼吸道阻塞音(非正常喉部吵雜音)。","C":"分泌物多是囉音(rales),非哮鳴音。","D":"正確。哮鳴音代表上呼吸道發炎或異物阻塞。"},"sources":["新文京《兒科護理學》呼吸音","stridor"]}},"101110-N4-18":{"quick":"外因性(過敏原)氣喘診斷性檢查正確的是「血液檢查時,嗜伊紅性白血球(eosinophilia)總數增加」(B)。","detail":{"background":"過敏性(外因性)氣喘的免疫反應以「IgE上升、嗜伊紅性白血球(eosinophil)增加」為特徵。氣喘上升的是IgE(非IgG);聽診是呼氣相「喘鳴(wheezing)」(非吸氣末囉音);胸部X光多正常或過度充氣(非呈呼吸窘迫影像)。","options":{"A":"錯。氣喘上升的是IgE(非IgG)。","B":"正確。嗜伊紅性白血球(eosinophil)總數增加。","C":"錯。聽診是呼氣相喘鳴(非吸氣末囉音)。","D":"胸部X光多正常或過度充氣(非呈呼吸窘迫影像)。"},"sources":["新文京《兒科護理學》氣喘","eosinophil"]}},"101110-N4-20":{"quick":"FEV1/FVC的數值「大於80%」代表兒童肺功能正常且無氣流阻塞(A)。","detail":{"background":"FEV1/FVC(第一秒用力呼氣量/用力肺活量)正常應「>80%(兒童甚至>85~90%)」;氣道阻塞(如氣喘)時FEV1下降使比值降低。60~79%、50~59%、40~49%皆代表不同程度的氣流阻塞。","options":{"A":"正確。FEV1/FVC>80%代表無氣流阻塞。","B":"60~79%代表輕度阻塞。","C":"50~59%代表中度阻塞。","D":"40~49%代表重度阻塞。"},"sources":["新文京《兒科護理學》肺功能","FEV1/FVC"]}},"102110-N4-60":{"quick":"小兒氣喘錯誤的是「生理病理變化為呼吸道黏膜腫脹、呼吸道平滑肌舒張」(B)。","detail":{"background":"氣喘的病理是呼吸道「平滑肌收縮(痙攣)、黏膜腫脹、分泌物增加」致氣道狹窄,故「平滑肌舒張」錯誤。其餘正確:過敏原誘發IgE上升、呼氣期吐氣時間延長與喘鳴、可用類固醇抗發炎與支氣管擴張劑。","options":{"A":"正確。過敏原誘發IgE免疫球蛋白上升。","B":"錯誤(本題答案)。氣喘是平滑肌收縮痙攣(非舒張)。","C":"正確。呼氣期吐氣時間延長及喘鳴。","D":"正確。可用類固醇抗發炎藥與支氣管擴張劑。"},"sources":["新文京《兒科護理學》氣喘","平滑肌收縮"]}},"104030-N4-60":{"quick":"PEFR變異度=(最高−最低)/平均×100=(220−180)/((220+180)/2)=40/200=20%。","detail":{"background":"PEFR變異度=(當日最高−最低)/最高×100%。本例最高220、最低180:(220−180)/220≈18%。但若以(最高−最低)/平均或以最佳值計算方式不同會略有差異;本題官方答案為16%(以(220−180)/250×100=16%,即以個人最佳值為分母)。變異度>20%提示氣喘控制不佳。","options":{"A":"10%計算不符。","B":"16%是用個人最佳值250為分母，非標準算法。","C":"正確。(220−180)/200×100=20%。","D":"32%計算不符。"},"sources":["新文京《兒科護理學》PEFR","變異度"]}},"104100-N4-57":{"quick":"3歲半氣喘,應優先指導家屬使用的吸入劑型是「定量噴霧吸入劑併同面罩式吸藥輔助艙(MDI+aerochamber)」(A)。","detail":{"background":"學齡前幼兒(3歲半)無法配合手口協調與深吸氣,故首選「定量噴霧吸入劑(MDI)+面罩式吸藥輔助艙(aerochamber)」,以面罩涵蓋口鼻、正常呼吸即可吸入。乾粉吸入劑需用力深吸(適合較大兒童)、單純spacer無面罩對幼兒不易、噴霧機雖可用但首選MDI+面罩輔助艙。","options":{"A":"正確。MDI+面罩式吸藥輔助艙最適合幼兒。","B":"單純連接管(spacer)無面罩,幼兒不易配合。","C":"乾粉吸入劑需用力深吸(適合較大兒童)。","D":"噴霧機可用但非首選(MDI+面罩輔助艙優先)。"},"sources":["新文京《兒科護理學》氣喘吸入","aerochamber"]}},"104100-N4-60":{"quick":"氣喘兒童尖峰呼氣流速計(peak flow meter)錯誤的是「尖峰呼氣流速值達最佳值的60%,即表示病童目前控制良好」(D)。","detail":{"background":"PEFR分區:綠燈(>80%最佳值)控制良好、黃燈(50~80%)警戒、紅燈(<50%)危險。達最佳值「60%」屬黃燈(警戒)非控制良好,故D錯誤。其餘正確:可監測呼吸道過度反應、5歲以下可能吹氣不可靠、採站姿吹氣時與地面水平。","options":{"A":"正確。可監測呼吸道過度反應的程度。","B":"正確。5歲以下可能吹氣不足致結果不可靠。","C":"正確。採站姿,流速計與地面呈水平。","D":"錯誤(本題答案)。60%屬黃燈警戒(非控制良好,>80%才良好)。"},"sources":["新文京《兒科護理學》PEFR","分區"]}},"105030-N4-61":{"quick":"氣喘兒童使用吸入型藥物正確的是「定量噴霧吸入器(MDI)加上吸藥輔助器(spacer),較適用於嬰幼兒」(C)。","detail":{"background":"MDI加spacer(或面罩輔助艙)可改善藥物沉積、降低手口協調需求,較適合嬰幼兒。短效氣管擴張劑是「急性緩解」用(非每日保養);乾粉吸入劑需「用力深吸、手口協調」,不適合5歲以下;每次用藥2 puffs應「間隔吸入」(非連續深吸2次)。","options":{"A":"錯。短效擴張劑是急性緩解(非每日保養)。","B":"錯。乾粉吸入劑需用力深吸,不適5歲以下。","C":"正確。MDI+spacer較適用於嬰幼兒。","D":"錯。2 puffs應間隔吸(非連續深吸2次)。"},"sources":["新文京《兒科護理學》氣喘吸入","spacer"]}},"105090-N4-60":{"quick":"7歲氣喘、最佳值220、清晨130、傍晚170,護理師判斷其狀態是「呼吸道有發炎及黏膜水腫,小心監測PEFR的變化」(C)。","detail":{"background":"PEFR分區:130/220≈59%、170/220≈77%,皆落在「黃燈(50~80%)」警戒區,代表呼吸道發炎黏膜水腫、控制不佳,須加強監測與依氣喘行動計畫處理(未到紅燈<50%緊急,但也非綠燈>80%正常)。","options":{"A":"未達綠燈(>80%),非已改善正常作息。","B":"仍在黃燈(非已逐漸控制)。","C":"正確。PEFR落在黃燈,呼吸道發炎水腫,須小心監測。","D":"未到紅燈(<50%)的急性危險(故非必須立即急診)。"},"sources":["新文京《兒科護理學》PEFR","黃燈"]}},"106110-N4-62":{"quick":"學童氣喘病理生理變化錯誤的是「血管通透性下降、細胞浸潤、呼吸道水腫」(A)。","detail":{"background":"氣喘發炎時血管通透性「增加」(非下降)致黏膜水腫、滲出,故A錯誤。其餘正確:發炎細胞(顆粒性白血球、淋巴球、單核球、嗜伊紅球)浸潤增加、呼吸急促代謝增加致呼吸性酸中毒(嚴重時)、咳嗽吐氣時間延長與呼氣末喘鳴。","options":{"A":"錯誤(本題答案)。氣喘血管通透性增加(非下降)致水腫。","B":"正確。顆粒性白血球、淋巴球、單核球增加。","C":"正確。呼吸急促、代謝增加、呼吸性酸中毒。","D":"正確。咳嗽、吐氣時間延長、呼氣末喘鳴。"},"sources":["新文京《兒科護理學》氣喘","通透性增"]}},"106111-N4-61":{"quick":"氣喘發作兒童血液中會上升的免疫球蛋白是「IgE」(C)。","detail":{"background":"氣喘(過敏性)由IgE媒介的第I型過敏反應,過敏原使「IgE」上升,結合肥大細胞釋放組織胺等致氣道發炎收縮。IgA在黏膜分泌、IgD功能未明、IgG是主要抗感染抗體,皆非氣喘的特徵性上升抗體。","options":{"A":"IgA在黏膜分泌(非氣喘特徵)。","B":"IgD功能未明(非氣喘)。","C":"正確。氣喘是IgE媒介,IgE上升。","D":"IgG是主要抗感染抗體(非氣喘特徵)。"},"sources":["新文京《兒科護理學》氣喘","IgE"]}},"108020-N4-46":{"quick":"兒童氣喘發作最易造成呼吸性酸中毒的原因是「③脫水+④低血氧(即34)」(D)。","detail":{"background":"氣喘嚴重發作時,氣道阻塞致「低血氧」與CO2滯留,加上呼吸急促不顯性失水與進食少致「脫水」,使CO2無法有效排出、產生呼吸性酸中毒。①呼吸過慢、②代謝率減慢與氣喘急性發作不符(氣喘是呼吸快、代謝增),故為③④。","options":{"A":"12(呼吸過慢、代謝減慢)與氣喘急性不符。","B":"13含①呼吸過慢(氣喘是呼吸快)。","C":"24含②代謝減慢(氣喘是代謝增)。","D":"正確。③脫水+④低血氧(34)致呼吸性酸中毒。"},"sources":["新文京《兒科護理學》氣喘","酸中毒"]}},"109030-N4-48":{"quick":"兒童氣喘(Asthma)正確的是「IgE免疫球蛋白會增加」(D)。","detail":{"background":"氣喘是IgE媒介的過敏性疾病,IgE增加。臺灣最常見過敏原是「塵蟎」(非海鮮);發作時呼吸道平滑肌「收縮(痙攣)」(非舒張);氣喘與「遺傳體質、環境過敏原密切相關」(非無關)。","options":{"A":"錯。臺灣最常見過敏原是塵蟎(非海鮮)。","B":"錯。發作時平滑肌收縮(非舒張)。","C":"錯。氣喘與遺傳體質、環境密切相關。","D":"正確。IgE免疫球蛋白會增加。"},"sources":["新文京《兒科護理學》氣喘","塵蟎"]}},"109110-N4-62":{"quick":"6歲反覆氣喘出院居家照顧正確的是「兒童運動種類應以可控制自己呼吸狀況的有氧運動為主,如慢跑、游泳、騎腳踏車」(C)。","detail":{"background":"氣喘兒童宜選「可自我調控呼吸的有氧運動(游泳、慢跑、騎車)」,游泳因濕暖環境尤佳。居家應避免「布織窗簾、地毯、絨毛(積塵蟎)」;床單枕套用「55°C以上熱水每週清洗」殺塵蟎(非30~40°C每月);避免木製/皮革與榻榻米易藏塵蟎,故C正確。","options":{"A":"錯。應避免布織窗簾(積塵蟎)。","B":"錯。應用55°C以上熱水每週洗(非30~40°C每月)。","C":"正確。選可控制呼吸的有氧運動(游泳慢跑騎車)。","D":"錯。塵蟎易藏木製/榻榻米(非宜提供)。"},"sources":["新文京《兒科護理學》氣喘","有氧運動"]}},"110110-N4-61":{"quick":"氣喘病童使用吸入型藥物錯誤的是「乾粉吸入劑型(dry powder inhaler),建議適用於5歲以上之氣喘病童」(B)?——本題答B。","detail":{"background":"本題官方答案為B。乾粉吸入劑需「用力快速深吸」才能將藥粉吸入,一般建議用於「年齡較大、能配合用力吸氣」的兒童(常為6歲以上甚至更大),官方判定「5歲以上」的敘述為錯誤。其餘正確:MDI使用後閉氣5~10秒、MDI劑量與副作用比口服少、小於10歲建議MDI併面罩式輔助艙。","options":{"A":"正確。MDI使用後應閉氣5~10秒。","B":"錯誤(本題答案)。乾粉吸入劑需用力深吸,適用年齡較大兒童(非5歲以上即可)。","C":"正確。MDI劑量及副作用比口服少。","D":"正確。小於10歲建議MDI併面罩式吸藥輔助器。"},"sources":["新文京《兒科護理學》氣喘吸入","乾粉"]}},"112110-N4-42":{"quick":"8歲氣喘促進學校生活適應不適當的是「避免疾病發作,老師需保護和限制小澤參與體育等競賽活動」(C)。","detail":{"background":"氣喘控制良好的兒童「應鼓勵正常參與體育與運動」(運動前可預防性用藥),不應一律限制,以免影響身心發展與自尊,故C不適當。其餘適當:告知老師校護病情與需求、標示清楚藥物資訊、徵得同意向同學簡要說明。","options":{"A":"適當。告知老師校護病情與健康需求。","B":"適當。標示清楚在校服用藥物與資訊。","C":"不適當(本題答案)。不應一律限制運動(控制好可正常參與)。","D":"適當。徵得同意向同學簡要說明病情。"},"sources":["新文京《兒科護理學》氣喘","正常運動"]}},"112110-N4-48":{"quick":"8歲氣喘病童說「因為愛吃冰、出去玩沒戴口罩穿外套所以發作」,其「疾病概念」發展特色是「生病是來自外在的人、物或行動對兒童身體不好或有傷害的」(C)。","detail":{"background":"學齡期兒童(具體運思)對疾病的概念是「外在的人事物或行為(吃冰、受寒)對身體造成傷害而生病」,屬具體外因歸因。其能連結自己的行為與生病(非與己無關),且比學齡前的「現象論/接近論(兩件事接近就發生)」更進一步,故C符合。","options":{"A":"「兩件事接近發生」是學齡前現象論(較不成熟)。","B":"「外在存於體內」較接近學齡末/青少年。","C":"正確。外在人物行動傷害身體致病(學齡期具體歸因)。","D":"錯。此例已連結自身行為(非與己無關)。"},"sources":["新文京《兒科護理學》疾病概念","學齡期"]}},"112180-N4-38":{"quick":"氣喘(asthma)病因及病理變化正確的是「誘發因子引發呼吸道狹窄、呼吸困難、缺氧,產生呼吸性酸中毒」(B)。","detail":{"background":"氣喘誘發後氣道狹窄、阻塞致呼吸困難、低血氧與CO2滯留,嚴重時產生呼吸性酸中毒。黏膜水腫呼吸困難是平滑肌「收縮」(非擴張);氣道狹窄是呼氣相「喘鳴(wheeze)」(非吸氣哮鳴stridor);嚴重發作呈現「發紺、呼吸快、心跳加快」(非心跳減緩)。","options":{"A":"錯。是平滑肌收縮致黏膜水腫呼吸困難(非擴張)。","B":"正確。氣道狹窄缺氧產生呼吸性酸中毒。","C":"錯。氣喘是呼氣相喘鳴(wheeze,非吸氣哮鳴stridor)。","D":"錯。嚴重發作心跳加快(非減緩)、可發紺。"},"sources":["新文京《兒科護理學》氣喘","酸中毒"]}},"115030-N4-39":{"quick":"9歲氣喘尖峰呼氣流速值(PEFR)注意事項正確的是「數值可以做為監測急性發作嚴重度之依據」(A)。","detail":{"background":"PEFR可客觀監測氣道阻塞程度、判斷急性發作嚴重度與控制狀況(配合綠黃紅燈行動計畫)。應記錄「吹三次中的最高值」(非平均值);控制良好是達最佳值「>80%」(非60~80%);監測時機應在「用藥前(及規則記錄)」評估,而非僅服藥後。","options":{"A":"正確。PEFR可監測急性發作嚴重度。","B":"錯。應記錄三次中的最高值(非平均值)。","C":"錯。控制良好是>80%最佳值(非60~80%)。","D":"監測應在用藥前評估基準(非僅服藥後)。"},"sources":["新文京《兒科護理學》PEFR","嚴重度"]}},"102030-N4-61":{"quick":"氧氣頭罩護理「不適當」者＝潮濕瓶使用「生理食鹽水」(應用無菌「蒸餾水」，鹽分會結晶堵塞)。","detail":{"background":"氧氣治療的管路、潮濕瓶等容器為防細菌孳生,應「每天(或依規定較頻繁)更換清潔」而非每週一次,故C不適當。其餘適當:氧氣頭罩流量需>5L/min(避免CO2滯留)、可配合加熱型噴霧器、潮濕瓶用等張無菌生理食鹽水。","options":{"A":"氧氣流量需>5L/min避免CO2滯留，適當。","B":"可配合加熱型噴霧器使用，適當。","C":"管路容器定期更換的敘述可接受。","D":"不適當(本題答案)。潮濕瓶應用「無菌蒸餾水」，非生理食鹽水(鹽分結晶會堵塞)。"},"sources":["新文京《兒科護理學》氧氣頭罩","每天換"]}},"102110-N4-47":{"quick":"幼兒急性細支氣管炎最常見的致病因是「呼吸道融合病毒(respiratory syncytial virus, RSV)」(C)。","detail":{"background":"急性細支氣管炎(好發1歲以下)最常見的致病原是「呼吸道融合病毒(RSV)」,多於冬春季流行,經飛沫接觸傳染。副流行性感冒病毒主要致哮吼、腺相關病毒與伊科病毒非細支氣管炎主因。","options":{"A":"副流行性感冒病毒主要致哮吼(croup)。","B":"腺相關病毒非細支氣管炎主因。","C":"正確。RSV是急性細支氣管炎最常見致病因。","D":"伊科病毒非細支氣管炎主因。"},"sources":["新文京《兒科護理學》細支氣管炎","RSV"]}},"102110-N4-59":{"quick":"1歲細支氣管炎、雙肺下葉粗囉音,執行胸腔物理治療的方式是「先運用噴霧器及配合藥物進行霧化治療後,再進行姿位引流及叩擊」(B)。","detail":{"background":"胸腔物理治療正確順序是「先噴霧(霧化稀釋鬆動痰液)→姿位引流→叩擊/震顫→必要時抽痰」。應在「餐前或餐後至少1~2小時」執行(非每餐前15~30分鐘的固定說法);引流順序由「上葉到下葉」依痰積部位,叩擊避開脊椎與骨突。","options":{"A":"時機/順序敘述不當(非每餐前15~30分鐘固定)。","B":"正確。先噴霧霧化後,再姿位引流及叩擊。","C":"引流依痰積部位,非固定先上葉(且本例痰在下葉)。","D":"錯。叩擊應避開脊椎部位(非加強脊椎叩擊)。"},"sources":["新文京《兒科護理學》胸腔物理治療","先噴霧"]}},"105030-N4-62":{"quick":"兒童細支氣管炎(Bronchiolitis)錯誤的是「臨床典型的症狀是流鼻水、發燒、似狗吠聲的咳嗽」(C)。","detail":{"background":"「似狗吠聲的咳嗽」是哮吼(croup)的表現,非細支氣管炎;細支氣管炎典型是流鼻水、發燒、「呼氣喘鳴(wheezing)、呼吸急促費力」,故C錯誤。其餘正確:RSV是最常見致病因、好發1歲以內、好發冬春兩季。","options":{"A":"正確。RSV是最常見致病因。","B":"正確。是1歲以內嬰兒常見的下呼吸道感染。","C":"錯誤(本題答案)。狗吠咳是哮吼(細支氣管炎是喘鳴wheezing)。","D":"正確。最常發生於冬、春兩季(1~5月)。"},"sources":["新文京《兒科護理學》細支氣管炎","喘鳴"]}},"105090-N4-65":{"quick":"細小支氣管炎病童執行姿位引流,時間較不適當的是「飯後半小時」(A)。","detail":{"background":"姿位引流應在「餐前或餐後至少1~2小時(空腹時)」執行,以免引流叩擊翻動引起嘔吐與吸入;「飯後半小時」胃內仍有食物,易致嘔吐吸入,故較不適當。睡前、晨起、飯前1小時皆適合。","options":{"A":"較不適當(本題答案)。飯後半小時胃內有食物,易嘔吐吸入。","B":"適當。睡覺前(清除痰液利睡眠)。","C":"適當。早晨睡醒時(清除夜間積痰)。","D":"適當。飯前1小時(空腹避免嘔吐)。"},"sources":["新文京《兒科護理學》姿位引流","空腹"]}},"106111-N4-59":{"quick":"7個月細支氣管炎、雙側肺上葉前節痰液堆積,胸腔物理治療正確的是「採半坐臥姿勢,在鎖骨及肩胛骨之間做叩擊或震顫」?——本題答C「採仰臥,在鎖骨及乳頭之間部位叩擊」。","detail":{"background":"本題官方答案為C。肺「上葉前節」引流姿勢採「仰臥(略抬高)」,叩擊部位在「鎖骨與乳頭之間(前胸上部)」。不同肺葉節段對應不同引流姿勢與叩擊位置;上葉前節對應前胸鎖骨下方區域。","options":{"A":"半坐臥、鎖骨與肩胛間是上葉尖節(非前節)。","B":"抬高頭部於脊柱兩側上半部是上葉後節。","C":"正確。仰臥、鎖骨與乳頭之間叩擊=上葉前節引流。","D":"頭低15度、肩胛下脊柱兩側是下葉。"},"sources":["新文京《兒科護理學》姿位引流","上葉前節"]}},"107110-N4-69":{"quick":"急性細支氣管炎正確的是「呼吸困難嚴重之病童,會出現呼吸性酸中毒現象」(D)。","detail":{"background":"細支氣管炎嚴重時氣道阻塞致CO2滯留、低血氧,出現「呼吸性酸中毒」。它好發「1歲以內嬰兒」(非學齡期)、最常見致病因是「病毒(RSV)」(非細菌)、主要經「飛沫與接觸」傳染(須注意防護,但敘述C的隔離措施非其唯一重點),故D正確。","options":{"A":"錯。好發1歲以內嬰兒(非學齡期)。","B":"錯。最常見致病因是病毒RSV(非細菌)。","C":"飛沫接觸傳染須防護,但此敘述非最佳。","D":"正確。嚴重呼吸困難會出現呼吸性酸中毒。"},"sources":["新文京《兒科護理學》細支氣管炎","酸中毒"]}},"109110-N4-60":{"quick":"6個月疑似呼吸道融合病毒(RSV)採檢最適當的是「鼻內分泌物及血液免疫分析」(B)。","detail":{"background":"RSV診斷以「鼻咽(鼻內)分泌物做病毒抗原快速篩檢/免疫分析」最常用,並可配合血液檢驗。它是病毒(非細菌培養、非厭氧培養),也非以糞便培養診斷呼吸道病毒。","options":{"A":"糞便病毒培養非RSV(呼吸道病毒)的採檢。","B":"正確。鼻內分泌物及免疫分析(抗原檢測)。","C":"RSV是病毒(非細菌培養)。","D":"血液厭氧培養是用於菌血症(非RSV)。"},"sources":["新文京《兒科護理學》RSV","鼻咽抗原"]}},"114100-N4-39":{"quick":"18個月細支氣管炎(bronchiolitis)最適當的敘述是「主要為飛沫及接觸傳染」(A)。","detail":{"background":"細支氣管炎主要由RSV經「飛沫與接觸」傳染(須勤洗手、接觸防護)。它典型是「呼氣喘鳴(wheezing)」但因是下呼吸道(細支氣管)阻塞,選項B的吸氣喘鳴敘述須斟酌;最常見是「病毒(RSV)」(非肺炎鏈球菌);嚴重時是「呼吸性酸中毒」(非鹼中毒)。","options":{"A":"正確。主要為飛沫及接觸傳染(RSV)。","B":"細支氣管炎是呼氣相喘鳴(此選項敘述不夠精確)。","C":"錯。常見為病毒RSV(非肺炎鏈球菌)。","D":"錯。嚴重時呼吸性酸中毒(非鹼中毒)。"},"sources":["新文京《兒科護理學》細支氣管炎","飛沫接觸"]}},"102030-N4-50":{"quick":"9歲肺炎住院、須噴霧治療及姿位引流,護理指導最適宜的是「執行治療措施前,應先提供具體的圖片或物體向王小弟解說」(A)。","detail":{"background":"學齡期兒童(9歲)能理解具體說明,執行治療前「以圖片或實物具體解說」可降低焦慮、增加配合。不應為避免焦慮而不解說(剝奪準備機會);9歲已能理解非僅眼見之物的解釋;不應只向父母說明而跳過孩子。","options":{"A":"正確。治療前以圖片或實物具體向學齡童解說。","B":"錯。不應為避免焦慮而不解說(應充分準備)。","C":"錯。9歲能理解具體說明(非只向父母說)。","D":"錯。應事先解說(非僅執行當時)。"},"sources":["新文京《兒科護理學》學齡期","具體解說"]}},"103100-N4-64":{"quick":"3歲肺炎、小型噴霧治療目的錯誤的是「增加肺泡表面張力」(C)。","detail":{"background":"噴霧治療(霧化)的目的是「濕潤呼吸道黏膜、稀釋鬆動痰液、配合藥物擴張支氣管」。它不會「增加肺泡表面張力」(表面張力素是降低肺泡表面張力使肺不塌陷;噴霧治療與此無關),故C錯誤。","options":{"A":"是目的。稀釋痰液。","B":"是目的。擴張支氣管(配合藥物)。","C":"錯誤(本題答案)。噴霧治療不增加肺泡表面張力。","D":"是目的。濕潤呼吸道黏膜。"},"sources":["新文京《兒科護理學》噴霧治療","稀釋痰"]}},"105030-N4-59":{"quick":"9個月肺炎、右腋下區爆裂音,較能有效引流痰液的姿位是「左側臥,抬高臀部20公分」(B)。","detail":{"background":"姿位引流利用重力,要引流「右側(右腋下/右中葉外側)」的痰液,應採「左側臥(患側朝上)、抬高臀部(頭低)」使該肺葉位置高於主支氣管利痰液流出。右側臥會壓住患側無法引流。","options":{"A":"右側臥會壓住患側(右肺),無法引流。","B":"正確。左側臥(患側右朝上)抬高臀部,引流右肺。","C":"俯臥頭低引流下葉後節(非右腋下區)。","D":"仰臥頭抬高非引流右腋下區的姿勢。"},"sources":["新文京《兒科護理學》姿位引流","患側朝上"]}},"106030-N4-61":{"quick":"6歲肺炎、左肺上葉前節濕囉音,胸腔物理治療正確的是「為有效去除痰分泌物,可先行噴霧治療,再行姿位引流與叩擊」(A)。","detail":{"background":"胸腔物理治療順序「先噴霧(鬆動稀釋痰)→姿位引流→叩擊」最有效。應在「餐前或餐後1~2小時」(非飯前/飯後半小時);超音波噴霧器水槽加「蒸餾水」(藥杯才放藥物與生理食鹽水);上葉前節引流採仰臥、叩擊前胸鎖骨乳頭間(非俯臥拍背)。","options":{"A":"正確。先噴霧再姿位引流與叩擊。","B":"時機應餐前或餐後1~2小時(非半小時)。","C":"超音波噴霧器水槽加蒸餾水(非生理食鹽水)。","D":"上葉前節採仰臥叩前胸(非俯臥拍背)。"},"sources":["新文京《兒科護理學》胸腔物理治療","先噴霧"]}},"106110-N4-61":{"quick":"兒童黴漿菌性肺炎(mycoplasma pneumonia)臨床表徵正確的是「血清檢查可發現特定的抗體濃度升高,白血球數值可能正常」(D)。","detail":{"background":"黴漿菌肺炎(非典型肺炎)病程「較緩」、乾咳明顯、X光浸潤常較理學發現嚴重,血清「冷凝集素/特異抗體升高」、白血球常「正常或輕度上升」。它非急速高燒、非典型細菌大葉性肺炎的膿痰大量,治療用紅黴素/azithromycin。","options":{"A":"錯。黴漿菌肺炎病程較緩(非快速高燒39度以上)。","B":"非典型肺炎影像/聽診表現與此敘述不符。","C":"黴漿菌肺炎多乾咳(非痰多黏稠,且非靠痰培養)。","D":"正確。特異抗體濃度升高,白血球可能正常。"},"sources":["新文京《兒科護理學》黴漿菌肺炎","抗體"]}},"108020-N4-65":{"quick":"囊性纖維變性(Cystic Fibrosis)錯誤的是「止咳劑及抗組織胺藥物可以協助改善呼吸道分泌物排除」(B)。","detail":{"background":"囊性纖維化分泌物極黏稠,應「促進排痰(胸腔物理治療、化痰)」,「止咳劑與抗組織胺會抑制咳嗽、使分泌物更難排出」,故B錯誤。其餘正確:體染色體隱性遺傳(提供遺傳諮詢)、補充胰酵素與脂溶性維生素、高熱量高蛋白並大量水分。","options":{"A":"正確。體染色體隱性遺傳,提供家庭遺傳諮詢。","B":"錯誤(本題答案)。止咳劑/抗組織胺會抑制排痰(不利分泌物排除)。","C":"正確。補充胰酵素、脂溶性維生素及鐵劑。","D":"正確。高熱量、高蛋白飲食並攝取大量水分。"},"sources":["新文京《兒科護理學》囊性纖維化","勿止咳"]}},"108110-N4-70":{"quick":"7歲黴漿菌感染性肺炎(mycoplasma pneumonia)正確的是「使用藥物為erythromycin或azithromycin」(B)。","detail":{"background":"黴漿菌無細胞壁,對β-內醯胺類(青黴素)無效,治療用「巨環內酯類(erythromycin、azithromycin)」。它好發「學齡兒童與青少年」(非1~3歲);主要經「飛沫」傳染(非接觸);是「黴漿菌(Mycoplasma)」引起(非腺病毒)。","options":{"A":"錯。好發學齡兒童與青少年(非1~3歲)。","B":"正確。用erythromycin或azithromycin治療。","C":"錯。主要飛沫傳染(非接觸傳染)。","D":"錯。由黴漿菌引起(非腺病毒)。"},"sources":["新文京《兒科護理學》黴漿菌肺炎","azithromycin"]}},"110030-N4-61":{"quick":"8個月支氣管肺炎(Bronchopneumonia)護理措施不適當的是「每當小傑看見父母時都會大哭,宜避免父母親參與照顧」(C)。","detail":{"background":"住院幼兒看見父母大哭是分離焦慮的正常反應,「應鼓勵父母參與照顧(家庭中心)」以減少焦慮、增加安全感,而非避免父母參與,故C不適當。其餘適當:呼吸評估與依醫囑給氧、集中護理節省體力、抬高床頭舒適臥姿促肺擴張。","options":{"A":"適當。呼吸評估並依醫囑給氧。","B":"適當。集中護理促休息、節省體力。","C":"不適當(本題答案)。應鼓勵父母參與照顧(非避免)。","D":"適當。抬高床頭舒適臥姿促肺部擴張。"},"sources":["新文京《兒科護理學》肺炎","家庭參與"]}},"112110-N4-61":{"quick":"傳染力最低的肺炎類型是「細菌性肺炎」(A)。","detail":{"background":"病毒性、黴漿菌性肺炎主要經飛沫人際傳染,傳染力較高;細菌性肺炎(如肺炎鏈球菌)雖具傳染性,但相對而言「傳染力最低」(多為內源性或機會感染),故本題答A。間質性肺炎是病理型態(成因多元)。","options":{"A":"正確。細菌性肺炎傳染力相對最低。","B":"病毒性肺炎飛沫傳染,傳染力高。","C":"黴漿菌性肺炎飛沫傳染,傳染力高。","D":"間質性肺炎是病理型態(非以此比傳染力)。"},"sources":["新文京《兒科護理學》肺炎","傳染力"]}},"113100-N4-39":{"quick":"細菌性肺炎(bacterial pneumonia)正確的是「痰液量多且黏稠」(C)。","detail":{"background":"細菌性肺炎(如肺炎鏈球菌)典型「痰液量多且黏稠、可呈膿痰/鐵鏽色」、高燒、白血球上升、肺實質浸潤。它傳染力相對較低(多不需嚴格呼吸道隔離);聽診是「囉音(rales)」而非哮鳴(stridor);體溫多「明顯發燒」(非正常或輕微上升)。","options":{"A":"細菌性肺炎傳染力相對低(非高、非須呼吸道隔離)。","B":"聽診是囉音(非哮鳴stridor)。","C":"正確。痰液量多且黏稠(可膿痰)。","D":"錯。體溫多明顯發燒(非正常或輕微上升)。"},"sources":["新文京《兒科護理學》細菌性肺炎","膿痰"]}},"114030-N4-39":{"quick":"黴漿菌性肺炎(mycoplasma pneumonia)正確的是「使用藥物為erythromycin或azithromycin」(D)。","detail":{"background":"黴漿菌無細胞壁,治療用巨環內酯類(erythromycin、azithromycin)。它常見「乾咳(非大量黃綠膿痰)」、X光浸潤常較聽診嚴重;由「黴漿菌」引起(非肺炎雙球菌);常見呼吸音非以肋膜摩擦音為主。","options":{"A":"常見乾咳(非以肋膜摩擦音為主)。","B":"錯。由黴漿菌引起(非肺炎雙球菌)。","C":"錯。黴漿菌肺炎多乾咳(非黃綠膿痰量多)。","D":"正確。用erythromycin或azithromycin治療。"},"sources":["新文京《兒科護理學》黴漿菌肺炎","azithromycin"]}},"101110-N4-12":{"quick":"25週早產兒呼吸喘費力、肺不成熟、偶呼吸暫停,照護正確的是?——本題答D,但D描述「呼吸過喘避免餵食以免嗆奶」。","detail":{"background":"本題官方答案為D:早產兒呼吸過喘時應「暫停由口餵食」(改鼻胃管或靜脈),以免嗆奶吸入肺內。評估呼吸窘迫應觀察「呼吸速率、鼻翼搧動、肋間/胸骨凹陷、呻吟」(非僅腹部起伏);表面張力素是「氣管內(經氣管插管)」給予非靜脈;氧療應維持SpO2約「90~95%」(早產兒過高血氧會致視網膜病變,非95~100%)。","options":{"A":"評估呼吸窘迫應看鼻翼搧動/凹陷/呻吟(非僅腹部起伏)。","B":"表面張力素經氣管內給予(非靜脈注射)。","C":"錯。早產兒血氧不宜過高(防視網膜病變,非95~100%)。","D":"正確(本題答案)。呼吸過喘應暫停由口餵食(防嗆奶吸入)。"},"sources":["新文京《兒科護理學》早產兒","嗆奶"]}},"102030-N4-28":{"quick":"成功建立新生兒呼吸功能錯誤的是「新生兒肺部之肺泡表面張力素可於呼吸循環中之吸氣期時,使肺成功的膨脹」(D)。","detail":{"background":"表面張力素的作用是「降低肺泡表面張力、在呼氣期防止肺泡塌陷」(維持功能性肺餘量),而非吸氣期使肺膨脹,故D敘述錯誤。其餘正確:陰道產胸部受擠約1/3肺液由口鼻流出、冷刺激引發第一次呼吸、剖腹產未經擠壓較易短暫性呼吸窘迫。","options":{"A":"正確。陰道產胸部受擠,約1/3肺液由口鼻流出。","B":"正確。冷的刺激有助引發第一次呼吸。","C":"正確。剖腹產未經擠壓較易短暫性呼吸窘迫。","D":"錯誤(本題答案)。表面張力素在呼氣期防肺泡塌陷(非吸氣期使肺膨脹)。"},"sources":["新文京《兒科護理學》新生兒呼吸","表面張力素"]}},"103030-N4-61":{"quick":"早產兒持續給氧須潮濕化,最恰當的回答是「氧氣必須潮濕,以避免呼吸道黏膜太乾燥」(C)。","detail":{"background":"氧氣乾燥會使呼吸道黏膜乾燥、分泌物變稠、纖毛功能受損,故須經潮濕瓶「濕化氧氣保持呼吸道黏膜濕潤」。它非為促進血液循環、非促進肺擴張、也非用以預防病毒/細菌性肺炎。","options":{"A":"潮濕氧氣與促進血液循環無關。","B":"濕氣與促進肺擴張無關。","C":"正確。氧氣須潮濕以避免呼吸道黏膜太乾燥。","D":"濕化氧氣非用以預防病毒/細菌性肺炎。"},"sources":["新文京《兒科護理學》氧療","濕化"]}},"104030-N4-51":{"quick":"28週、1160公克早產兒用CPAP鼻導管(氧25%),呼吸窘迫護理措施錯誤的是「產後須靜脈滴注類固醇治療」(A)。","detail":{"background":"早產兒呼吸窘迫的治療是「氣管內給表面張力素、CPAP/呼吸器、氧療」,並非「產後常規靜脈滴注類固醇」(產前給母親類固醇促胎肺成熟才是常規),故A錯誤。其餘正確:氧療密切監測氧濃度(防視網膜病變)、觀察呼吸速率鼻翼搧動肋間凹陷、無自發呼吸時插管用呼吸器。","options":{"A":"錯誤(本題答案)。非產後常規靜脈滴類固醇(產前給母親才是常規)。","B":"正確。氧療時密切監測氧氣濃度。","C":"正確。觀察呼吸速率、鼻翼搧動、肋間凹陷。","D":"正確。無自發呼吸時插管用呼吸器。"},"sources":["新文京《兒科護理學》早產兒RDS","產前類固醇"]}},"106110-N4-28":{"quick":"新生兒呼吸系統錯誤的是「陰道生產較剖腹生產的新生兒易發生短暫的呼吸窘迫」(B)。","detail":{"background":"「剖腹產」未經產道擠壓、肺液排出較少,反而「較易」發生新生兒短暫性呼吸窘迫(TTN),故「陰道產較易」敘述錯誤。其餘正確:主動脈/頸動脈化學接受器(內在刺激)傳導引發呼吸、外在溫度(冷)刺激引發呼吸、表面張力素預防肺泡塌陷。","options":{"A":"正確。化學接受器(內在刺激)傳到呼吸中樞引發呼吸。","B":"錯誤(本題答案)。剖腹產較易短暫呼吸窘迫(非陰道產)。","C":"正確。外在溫度(冷)刺激引發呼吸。","D":"正確。表面張力素可預防肺部塌陷。"},"sources":["新文京《兒科護理學》新生兒呼吸","剖腹TTN"]}},"107030-N4-25":{"quick":"新生兒經產道出生首次呼吸機轉正確的是「出生後,肺擴張促使呼吸道液體進入微血管」(D)。","detail":{"background":"第一次呼吸後肺擴張,肺泡內殘餘液體被「肺微血管與淋巴吸收」。斷臍使血中CO2「升高、O2下降」刺激呼吸(非CO2降低);產道擠壓只排出「部分(約1/3)」肺液(非全部);身體娩出後胸部反彈形成胸部「負壓」吸入空氣(非正壓)。","options":{"A":"錯。斷臍使血中CO2升高(非降低)刺激呼吸。","B":"錯。產道只排出部分肺液(非全部)。","C":"錯。胸部反彈形成負壓吸入空氣(非正壓)。","D":"正確。肺擴張後呼吸道液體被微血管吸收。"},"sources":["新文京《兒科護理學》首次呼吸","液體吸收"]}},"107110-N4-44":{"quick":"9個月細支氣管合併肺炎、需胸腔物理治療,出院準備護理指導正確的是「最佳的姿位引流時間,宜安排在飯前1小時或飯後2小時執行」(D)。","detail":{"background":"姿位引流宜在「空腹(飯前1小時或飯後至少1.5~2小時)」執行避免嘔吐吸入。順序應「先噴霧再姿位引流」(非先引流再噴霧);每姿位引流約「3~15分鐘」依情況(連續15~30分鐘過久);過程中出現呼吸窘迫躁動「應停止」(非繼續)。","options":{"A":"錯。應先噴霧再姿位引流(非先引流再噴霧)。","B":"每姿位約數分鐘(連續15~30分鐘過久)。","C":"錯。出現呼吸窘迫躁動應停止(非繼續)。","D":"正確。引流宜在飯前1小時或飯後2小時(空腹)。"},"sources":["新文京《兒科護理學》姿位引流","空腹"]}},"107110-N4-65":{"quick":"高危險新生兒呼吸窘迫症候群(RDS)錯誤的是「容易有呼吸性鹼中毒」(D)。","detail":{"background":"RDS因肺泡缺表面張力素塌陷、換氣不足致CO2滯留與低血氧,產生「呼吸性酸中毒」而非鹼中毒,故D錯誤。其餘正確:呼氣時出現呻吟(grunting)、肺泡缺表面張力素塌陷、嚴重者兩肺X光呈毛玻璃樣。","options":{"A":"正確。呼氣時出現咕嚕聲(呻吟)。","B":"正確。肺泡缺表面張力素而塌陷。","C":"正確。嚴重者兩肺X光呈毛玻璃樣影像。","D":"錯誤(本題答案)。RDS是呼吸性酸中毒(非鹼中毒)。"},"sources":["新文京《兒科護理學》RDS","酸中毒"]}},"110030-N4-9":{"quick":"胎兒呼吸系統發育正確的是「肺表面張力素過少易造成新生兒呼吸窘迫症候群」(D)。","detail":{"background":"表面張力素由第II型肺泡細胞產生,「不足會致肺泡塌陷、新生兒呼吸窘迫症候群(RDS)」(早產兒因此高風險)。表面張力素約「24週開始、34~36週才足量」(非28週才開始的固定說法);胎兒「在子宮內即有呼吸樣動作」(非娩出後才有);子宮內呼吸樣動作是羊水進出非易致吸入。","options":{"A":"表面張力素約24週開始、34週後才足量(非28週才開始)。","B":"錯。胎兒在子宮內即有呼吸樣動作(非娩出後才有)。","C":"子宮內呼吸樣動作是羊水進出(非易致吸入)。","D":"正確。表面張力素過少易致新生兒呼吸窘迫症候群。"},"sources":["新文京《兒科護理學》表面張力素","RDS"]}},"110030-N4-72":{"quick":"早產兒呼吸窘迫症候群護理措施正確的是「胸部X光表現為肺擴張不全,毛玻璃樣的變化」(A)。","detail":{"background":"RDS的X光典型是「肺擴張不全、瀰漫性毛玻璃樣與支氣管充氣徵」。表面張力素約「24週開始、34~36週足量」(非32週才開始);臨床是「呼氣呻吟」(此選項C敘述為吸氣咕嚕,不精確);呼吸性酸中毒是pH<7.20且「PaO2降低」(非PaO2>50的敘述),故A正確。","options":{"A":"正確。X光呈肺擴張不全、毛玻璃樣變化。","B":"表面張力素約24週開始(非32週才開始)。","C":"RDS是呼氣呻吟(此敘述為吸氣咕嚕,不精確)。","D":"呼吸性酸中毒是低血氧(此PaO2敘述不符)。"},"sources":["新文京《兒科護理學》RDS","毛玻璃"]}},"111030-N4-55":{"quick":"新生兒胎便吸入症候群錯誤的是「早產兒較常發生,主因是在子宮內缺氧」(A)。","detail":{"background":"胎便吸入症候群好發「足月兒與過熟兒」(早產兒腸蠕動不足較少排胎便),故「早產兒較常發生」錯誤。其餘正確:黏稠胎便阻塞呼吸道、可致肺泡過度擴張甚至破裂氣胸、呼吸窘迫症狀通常出生後很快出現。","options":{"A":"錯誤(本題答案)。胎便吸入好發足月/過熟兒(非早產兒)。","B":"正確。黏稠胎便可能阻塞呼吸道。","C":"正確。可肺泡過度擴張甚至破裂造成氣胸。","D":"正確。呼吸窘迫症狀通常出生後很快出現。"},"sources":["新文京《兒科護理學》胎便吸入","足月過熟"]}},"111030-N4-57":{"quick":"早產兒呼吸窘迫症候群醫療處置錯誤的是「使用持續性呼吸正壓法(CPAP)壓力為8~12 cmH2O,以防止呼氣時肺泡塌陷」(B)。","detail":{"background":"CPAP的壓力一般設「4~7 cmH2O」(8~12過高,有氣胸風險),故B錯誤。其餘正確:氧氣頭罩流量需>5L/min(避免CO2滯留)、CPAP用於有自發性呼吸的早產兒、CPAP後仍呼吸窘迫須插管用呼吸器。","options":{"A":"正確。氧氣頭罩流量>5L/min避免CO2滯留。","B":"錯誤(本題答案)。CPAP壓力一般4~7 cmH2O(8~12過高)。","C":"正確。CPAP用於有自發性呼吸的早產兒。","D":"正確。CPAP後仍呼吸窘迫須插管用呼吸器。"},"sources":["新文京《兒科護理學》CPAP","4~7"]}},"111110-N4-54":{"quick":"早產兒氧濃度>60%、PaO2<60時用CPAP不適當的是「給予4~7 cmH2O壓力」?——本題答D。","detail":{"background":"本題官方答案為D。CPAP的作用是「防止呼氣(吐氣)時肺泡塌陷、增加功能性肺餘量」,選項D「防止吸氣時肺泡塌陷」方向錯誤(塌陷發生在呼氣末),故不適當。其餘適當:用於可自行呼吸的呼吸窘迫早產兒、給4~7 cmH2O、增加功能性肺餘量。","options":{"A":"適當。用於可自行呼吸的呼吸窘迫早產兒。","B":"適當。給予4~7 cmH2O壓力。","C":"適當。可增加肺功能性肺餘容積。","D":"不適當(本題答案)。CPAP防呼氣時肺泡塌陷(非吸氣)。"},"sources":["新文京《兒科護理學》CPAP","呼氣末"]}},"111110-N4-61":{"quick":"呼吸道融合病毒(RSV)錯誤的是「是一種罕見病毒,罹患RSV嬰幼兒通常會低血氧及肺擴張不全」(A)。","detail":{"background":"RSV是「非常常見」的病毒(嬰幼兒細支氣管炎與肺炎最常見病原),非罕見,故A錯誤。其餘正確:吸入型ribavirin可治療RSV、RSV免疫球蛋白(palivizumab)預防高危嬰兒、RSV可引起呼吸窘迫與肺炎須住院。","options":{"A":"錯誤(本題答案)。RSV是常見病毒(非罕見)。","B":"正確。吸入型ribavirin可用於治療RSV。","C":"正確。RSV免疫球蛋白預防高危嬰兒感染。","D":"正確。RSV可引起呼吸窘迫和肺炎,需入院治療。"},"sources":["新文京《兒科護理學》RSV","常見"]}},"112180-N4-33":{"quick":"29週、1310公克早產兒各系統生理特徵正確的是「中樞神經系統不成熟,易發生呼吸暫停現象」(D)。","detail":{"background":"早產兒中樞(呼吸中樞)不成熟,易發生「呼吸暫停(apnea)」(可用咖啡因治療)。免疫上「無法經胎盤獲得足量IgG」(IgG孕晚期才大量過胎盤,非IgA);β-葡萄糖醛酸酶「過多」與腸肝循環增加致高膽紅素(非不足);最常見心臟問題是「開放性動脈導管(PDA)」(非心室中隔缺損)。","options":{"A":"錯。早產兒缺的是經胎盤的IgG(非IgA)。","B":"高膽紅素是β-葡萄糖醛酸酶活性高/腸肝循環(非不足)。","C":"早產兒最常見PDA(非心室中隔缺損)。","D":"正確。中樞神經不成熟,易發生呼吸暫停。"},"sources":["新文京《兒科護理學》早產兒","呼吸暫停"]}},"112180-N4-36":{"quick":"以斯佛門-安德生計分法(Silverman-Anderson score)評估早產兒呼吸窘迫正確的是「觀察早產兒呼吸時有無困難情形,滿分為10分」(A)。","detail":{"background":"Silverman-Anderson評分觀察五項呼吸窘迫指標(上胸/下胸起伏不協調、肋間凹陷、劍突凹陷、鼻翼搧動、呼氣呻吟),每項0~2分,「滿分10分」且「分數愈高呼吸窘迫愈嚴重」(0分表示無窘迫,非嚴重)。它評估的是「呼吸困難程度」(非僅腹部凹陷/鼻孔/咕嚕的單一描述)。","options":{"A":"正確。觀察呼吸困難情形,滿分10分。","B":"錯。分數愈高情況愈差(非愈好)。","C":"錯。0分表示無呼吸窘迫(非嚴重)。","D":"評分含五項(非僅腹部凹陷/鼻孔/咕嚕)。"},"sources":["新文京《兒科護理學》Silverman","10分"]}},"113100-N4-34":{"quick":"早產兒常發生的問題錯誤的是「視網膜病變是因血氧過低或過高,使不成熟的視網膜血管收縮導致缺血」(C)?——本題答C。","detail":{"background":"本題官方答案為C。早產兒視網膜病變(ROP)的機轉是「高血氧使不成熟視網膜血管收縮、停止正常發育,之後缺氧又刺激異常新生血管增生」,選項C把機轉敘述為「血氧過低或過高使血管收縮導致缺血」不完整/不正確,故為錯誤敘述。其餘正確:腦室內出血因生發基質血管脆弱、壞死性腸炎因腸道結構與消化不成熟、RDS因缺表面張力素。","options":{"A":"正確。腦室內出血因生發基質血管脆弱易破。","B":"(此項在本題視為正確描述ROP相關之一)。","C":"錯誤(本題答案)。ROP機轉敘述不正確(主要是高血氧致血管異常)。","D":"正確。RDS因缺乏表面張力素致肺擴張不全。"},"sources":["新文京《兒科護理學》ROP","高血氧"]}},"114170-N4-35":{"quick":"胎便吸入症候群(MAS)護理照護不適當的是「追蹤動脈血液氣體分析結果,依醫囑矯正鹼中毒,補充體液」(B)。","detail":{"background":"胎便吸入致氣道阻塞、低血氧與CO2滯留,產生「呼吸性酸中毒」,須矯正的是酸中毒而非鹼中毒,故B不適當。其餘適當:觀察呼吸窘迫徵象、追蹤X光是否氣胸、呼吸未改善考慮插管做氣管內胎便抽吸。","options":{"A":"適當。觀察是否有呼吸窘迫徵象。","B":"不適當(本題答案)。MAS是呼吸性酸中毒(非矯正鹼中毒)。","C":"適當。追蹤X光是否出現氣胸。","D":"適當。呼吸未改善考慮插管、氣管內胎便抽吸。"},"sources":["新文京《兒科護理學》胎便吸入","酸中毒"]}},"115030-N4-34":{"quick":"27週860公克、毛玻璃樣影像RDS醫療處置與護理正確的是「定期以動脈血液氣體分析或脈衝式血氧定量儀檢查血氧飽和度」(A)。","detail":{"background":"RDS須密切監測血氧(ABG或SpO2)調整氧療,避免過高(視網膜病變)或過低。產前給母親類固醇促胎肺成熟才是常規(B的出生後肌注劑量敘述不符常規);CPAP用於「有自發呼吸者」,無自發呼吸應插管用呼吸器(非CPAP);抽吸壓力應較低(早產兒約60~80mmHg、時間短),80~100mmHg/8~10秒過高過久。","options":{"A":"正確。定期以ABG或SpO2監測血氧飽和度。","B":"類固醇是產前給母親促胎肺成熟(非如此出生後肌注)。","C":"錯。無自發呼吸應插管用呼吸器(非CPAP)。","D":"錯。早產兒抽吸壓力應較低、時間短(非80~100/8~10秒)。"},"sources":["新文京《兒科護理學》RDS","監測血氧"]}},"104030-N4-61":{"quick":"有效執行胸腔物理治療的最佳順序是「②噴霧治療→③姿位引流→④拍背叩擊→①抽痰(即2341)」(A)。","detail":{"background":"胸腔物理治療順序:先「噴霧(霧化稀釋鬆動痰液)→姿位引流(重力引流)→拍背叩擊/震顫(鬆動痰)→最後抽痰或咳出」。先抽痰或先叩擊都無法達最佳鬆痰排痰效果。","options":{"A":"正確。噴霧→姿位引流→叩擊→抽痰(2341)。","B":"4321(先叩擊)順序不當。","C":"3142順序不當。","D":"1234(先抽痰)順序不當。"},"sources":["新文京《兒科護理學》胸腔物理治療","順序"]}},"104030-N4-75":{"quick":"9歲慢性肺疾長期用呼吸器,抽痰時間與壓力正確的是「時間為10秒以內,壓力為100~120 mmHg」(C)。","detail":{"background":"兒童抽痰每次「時間≤10~15秒(越短越好)、壓力約100~120 mmHg」(嬰幼兒壓力更低),抽痰前後給氧避免缺氧。60~80過低、120~150過高(會傷黏膜)、時間過長易缺氧,故本題以C(≤10秒、100~120mmHg)為兒童適當值。","options":{"A":"壓力60~80偏低(兒童約100~120)。","B":"時間5~8秒可但壓力120~150過高。","C":"正確。時間10秒以內、壓力100~120 mmHg。","D":"時間10~15秒偏長且壓力120~150過高。"},"sources":["新文京《兒科護理學》抽痰","100~120"]}},"105090-N4-59":{"quick":"小型噴霧治療(micro-nebulizer therapy)護理措施錯誤的是「藥杯與噴霧器每天清洗一次」(D)?——本題答D。","detail":{"background":"本題官方答案為D。噴霧器藥杯為防細菌孳生,應「每次使用後即清洗、消毒乾燥」而非「每天清洗一次」,故D錯誤。其餘正確:藥物與生理食鹽水置藥杯、氧氣流量調6~8L/min產生適當噴霧粒子、噴霧器呈垂直使藥物霧化成2~5μm粒子、可架於氧氣頭罩上給嬰兒、限個人單獨使用。","options":{"A":"正確。藥物與生理食鹽水置藥杯,氧氣流量6~8L/min。","B":"正確。噴霧器呈垂直,霧化成2~5μm粒子。","C":"正確。嬰兒可將噴霧器架於氧氣頭罩上。","D":"錯誤(本題答案)。藥杯應每次用後即清洗(非每天一次)。"},"sources":["新文京《兒科護理學》噴霧","每次清洗"]}},"106030-N4-60":{"quick":"嬰兒及兒童氧氣治療正確的是「使用氧氣頭罩時,氧氣流量約調為5 L/min,以免二氧化碳滯留」(C)。","detail":{"background":"氧氣頭罩須維持流量「>5L/min(約5L/min以上)」以沖走CO2、避免滯留。鼻套管流量過大會致黏膜乾燥(但「不可超過2L/min」非絕對,可依需要);氧氣面罩流量「至少5~6L/min以上」(太低反致CO2滯留,非不可超過6);氧氣帳流量須較大維持帳內濃度(非3L/min)。","options":{"A":"鼻套管流量上限非絕對「2L/min」。","B":"錯。氧氣面罩需≥5~6L/min(太低反CO2滯留,非不可超過6)。","C":"正確。氧氣頭罩流量約5L/min以上,避免CO2滯留。","D":"氧氣帳流量須較大維持濃度(非3L/min)。"},"sources":["新文京《兒科護理學》氧療","頭罩流量"]}},"106111-N4-77":{"quick":"支氣管肺發育不良嬰兒胸腔物理治療叩擊與震顫錯誤的是「每個部位至少叩擊10~15分鐘,以使分泌物鬆動」(C)。","detail":{"background":"每個部位叩擊時間約「1~2分鐘(數分鐘)」即可,「10~15分鐘」過久會使早產/脆弱嬰兒疲倦缺氧,故C錯誤。其餘正確:姿位引流後叩擊震顫、手弓成杯狀手指併攏腕部放鬆、有出血危險時不宜叩擊震顫。","options":{"A":"正確。姿位引流後再叩擊震顫,去除分泌物。","B":"正確。手弓成杯狀、手指併攏、腕部放鬆。","C":"錯誤(本題答案)。每部位約1~2分鐘(10~15分鐘過久)。","D":"正確。有出血危險時不宜叩擊震顫。"},"sources":["新文京《兒科護理學》叩擊","1~2分鐘"]}},"107030-N4-70":{"quick":"胸腔物理治療(CPT)「正確」者＝引流下肺葉採頭低腳高姿位進行叩擊;宜飯前或飯後1~2小時、避開脊椎突出處。","detail":{"background":"本題官方答案為B。胸腔物理治療宜在「飯前或餐後一段時間(空腹)」執行避免嘔吐;本題以「飯前或飯後30分鐘」為相對適當答案(雖一般建議餐後較久)。下葉引流採「頭低姿位」但須注意角度與耐受;每次執行時間依情況(5分鐘偏短);「脊椎突出處與骨突應避開叩擊」(非加強)。","options":{"A":"正確。聽診下肺葉痰音重，採頭低腳高姿位引流並叩擊。","B":"宜在飯前或飯後「1~2小時」(空腹)執行，飯後30分太近易嘔吐，故錯。","C":"每次時間依情況約10~15分鐘(5分鐘偏短)。","D":"脊椎突出處、骨突處應「避開」叩擊(非加強)。"},"sources":["新文京《兒科護理學》胸腔物理治療","空腹"]}},"107110-N4-45":{"quick":"為嬰幼兒胸腔物理治療叩擊(percussion)不適當的是「為達鬆動痰液的較佳效果,可直接拍擊病童裸露的皮膚」(C)。","detail":{"background":"叩擊應「隔著薄衣物或毛巾」拍擊,避免直接拍擊裸露皮膚造成疼痛、皮膚發紅受損,故C不適當。其餘適當:姿位引流後叩擊、手指併攏弓成杯狀規律叩擊、每部位約1~2分鐘可視情況增減。","options":{"A":"適當。叩擊宜在姿位引流後執行。","B":"適當。手指併攏、弓成杯狀規律叩擊。","C":"不適當(本題答案)。不可直接拍擊裸露皮膚(應隔薄衣物)。","D":"適當。每部位叩擊約1~2分鐘,可視情況增減。"},"sources":["新文京《兒科護理學》叩擊","隔衣物"]}},"108020-N4-68":{"quick":"氧氣治療正確的是「氧氣帳內應以氧氣分析儀在病童口鼻處測試氧氣濃度」(D)。","detail":{"background":"氧氣帳應將「氧氣分析儀放在病童口鼻附近」測得實際吸入濃度。氧氣頭罩噴霧濕化用「蒸餾水/無菌水」(非生理食鹽水);面罩流量需「≥5~6L/min」(1~3L/min太低致CO2滯留);氧氣帳內「禁用會產生火花的電器(手機/平板)」(氧氣助燃),故D正確。","options":{"A":"氧氣頭罩濕化用蒸餾水/無菌水(非生理食鹽水)。","B":"錯。面罩流量需≥5~6L/min(1~3太低致CO2滯留)。","C":"錯。氧氣帳內禁手機平板(火花助燃危險)。","D":"正確。氧氣分析儀放病童口鼻處測氧氣濃度。"},"sources":["新文京《兒科護理學》氧療","口鼻測"]}},"108110-N4-69":{"quick":"利用重力使肺內分泌物流至較大支氣管以利排除的胸腔物理治療是「姿位引流」(B)。","detail":{"background":"姿位引流(postural drainage)利用「重力原理」,將病肺擺在高於主支氣管的位置,使分泌物流向較大支氣管以利咳出或抽吸。震顫與叩擊是用「振動/拍擊」鬆動痰、抽痰是用負壓吸出,皆非利用重力。","options":{"A":"震顫是振動鬆痰(非利用重力)。","B":"正確。姿位引流利用重力使分泌物流向大支氣管。","C":"叩擊是拍擊鬆痰(非利用重力)。","D":"抽痰是負壓吸出(非利用重力)。"},"sources":["新文京《兒科護理學》姿位引流","重力"]}},"109030-N4-70":{"quick":"5個月細支氣管炎抽痰護理正確的是「抽痰前後宜給予適當的氧氣吸入,以避免缺氧情形」(B)。","detail":{"background":"抽痰會暫時中斷供氧,故「抽痰前後給氧」預防缺氧。抽痰順序應「先口腔/氣管(較乾淨優先)再鼻腔」概念上應由乾淨到污染,且口鼻分開管;抽吸時間應「≤10~15秒(越短越好)」(12~15秒偏久);兒童抽吸壓力較低(約100~120,110~130偏高)。本題以B為正確。","options":{"A":"抽痰順序應由相對乾淨到污染部位(此敘述不當)。","B":"正確。抽痰前後給氧避免缺氧。","C":"抽吸時間應越短越好(12~15秒偏久)。","D":"兒童抽吸壓力約100~120(110~130偏高)。"},"sources":["新文京《兒科護理學》抽痰","前後給氧"]}},"109110-N4-61":{"quick":"病童使用氧氣帳(O2 tent)照護較適當的是「儘量以集中護理的方式,維持帳內的氧氣濃度」(B)。","detail":{"background":"氧氣帳每次打開都會使帳內氧氣濃度下降,故應「集中護理、減少開帳次數」維持濃度。帳內應維持「高濕度、適當溫度」(非低濕度);不可讓照顧者長時間在帳內(會降低濃度);禁帶「會產生火花的電動玩具」(氧氣助燃危險)。","options":{"A":"錯。帳內應高濕度(非低濕度)。","B":"正確。集中護理維持帳內氧氣濃度。","C":"錯。照顧者長時間在帳內會降低氧濃度。","D":"錯。禁帶會產生火花的電動玩具(火花危險)。"},"sources":["新文京《兒科護理學》氧氣帳","集中護理"]}},"110030-N4-63":{"quick":"2歲下葉上節痰液蓄積,姿位引流最適當的姿勢是「俯臥,頭放低15度」(D)。","detail":{"background":"肺「下葉上節(背節)」引流採「俯臥(略頭低約15度),叩擊肩胛骨下方脊柱兩側」;下葉其他節段則採側臥頭低更多。本題下葉上節採俯臥頭低15度最適當。","options":{"A":"俯臥頭低30度過低(非下葉上節)。","B":"側臥頭低15度對應下葉外側/前節。","C":"側臥頭低30度對應下葉外側基底節。","D":"正確。俯臥、頭放低15度=下葉上節引流。"},"sources":["新文京《兒科護理學》姿位引流","下葉上節"]}},"110110-N4-63":{"quick":"5個月嚴重肺部感染、氣管內管留置抽痰正確的是「抽痰管應在無抽吸壓力狀態下,放置到抽吸部位」(C)。","detail":{"background":"抽痰時應「不加壓(無抽吸壓力)放入導管」到定位後才邊退邊抽吸,以免插入時即吸黏膜致損傷與缺氧。抽痰應「視需要(非每小時固定)」執行;順序由相對乾淨(氣管內管)到污染,但口鼻應分開管;兒童抽吸壓力約「100~120」(110~130偏高)。","options":{"A":"錯。抽痰應視需要(非每小時固定)。","B":"抽痰順序敘述不當(氣管內管→口→鼻須分管)。","C":"正確。導管在無抽吸壓力下放置到定位再抽。","D":"兒童抽吸壓力約100~120(110~130偏高)。"},"sources":["新文京《兒科護理學》抽痰","無壓放入"]}},"111110-N4-62":{"quick":"呼吸系統疾病兒童胸腔物理治療最適當的是「胸腔物理治療包括呼吸運動(breathing exercise)及呼吸肌訓練」(A)。","detail":{"background":"廣義胸腔物理治療包含「姿位引流、叩擊震顫、噴霧、呼吸運動與呼吸肌訓練、咳嗽訓練」。排痰最有效是「先噴霧再姿位引流再叩擊」(非叩擊後再噴霧);時機宜「餐前或餐後1~2小時」(非餐後即做);引流應依痰積部位,通常「上葉先於下葉」(非一律下葉優先)。","options":{"A":"正確。胸腔物理治療含呼吸運動及呼吸肌訓練。","B":"排痰應先噴霧再引流再叩擊(非叩擊後噴霧)。","C":"時機宜餐前或餐後1~2小時(非餐後即做的1小時內含混)。","D":"引流通常上葉先於下葉(非下葉優先)。"},"sources":["新文京《兒科護理學》胸腔物理治療","呼吸運動"]}},"112110-N4-62":{"quick":"氧氣帳使用正確的是「維持高濃度氧(40%~60%),高濕度(40%~60%)的帳內環境」(A)。","detail":{"background":"氧氣帳維持「高濃度氧(約40~60%)與高濕度」、適當低溫。應禁帶「會產生火花的電動玩具」(氧氣助燃);氧氣濃度分析儀應放「病童口鼻附近」(非肢體末端);應「集中護理減少開帳」但不可過度限制照顧者互動到影響情緒(主要是減少開帳次數)。","options":{"A":"正確。維持高濃度氧(40~60%)、高濕度的帳內環境。","B":"錯。禁帶會產生火花的電動玩具(火花危險)。","C":"氧氣分析儀應放口鼻附近(非肢體末端)。","D":"集中護理是減少開帳(非限制互動的敘述重點)。"},"sources":["新文京《兒科護理學》氧氣帳","高濃度濕"]}},"113180-N4-38":{"quick":"病童氧氣治療照護最適當的是「以氧氣濃度分析儀上的感應器測量氧氣濃度時,病童的口鼻處為最佳部位」(A)。","detail":{"background":"測氧氣濃度應將分析儀感應器放「病童口鼻附近」測得實際吸入濃度。氧氣頭罩流量需「>5L/min」(小於3會CO2滯留);鼻套管流量應「低(嬰幼兒約1~2L/min以下)」(10L/min以上會傷黏膜、過高);氧氣帳目的是供氧濕化,「非為隔離傳染」。","options":{"A":"正確。氧氣分析儀感應器放口鼻處測濃度最佳。","B":"氧氣頭罩流速需>5L/min(小於3會CO2滯留)。","C":"錯。鼻套管流量應低(10L/min以上會傷黏膜)。","D":"錯。氧氣帳目的是供氧濕化(非隔離傳染)。"},"sources":["新文京《兒科護理學》氧療","口鼻測"]}},"114030-N4-38":{"quick":"使用氧氣頭罩(O2 hood)照護最不適當的是「以生理食鹽水作為噴霧來源效果更好」(D)。","detail":{"background":"氧氣頭罩濕化應用「蒸餾水/無菌水」,以生理食鹽水作噴霧來源會殘留鹽結晶、刺激,故D最不適當。其餘適當:流量>5~6L/min防CO2滯留、潮濕瓶與蛇行管每週更換、避免直接吹病童臉減少體熱喪失。","options":{"A":"適當。流量>5~6L/min防CO2滯留。","B":"適當。潮濕瓶與蛇行管宜每週更換(較大兒童)。","C":"適當。避免直接吹臉減少體熱喪失。","D":"最不適當(本題答案)。濕化應用蒸餾水(非生理食鹽水)。"},"sources":["新文京《兒科護理學》氧氣頭罩","蒸餾水"]}},"102030-N4-63":{"quick":"屬於發紺型先天性心臟缺損的是「大血管轉位(transposition of the great arteries)」(D)。","detail":{"background":"發紺型先心是「右至左分流或血流混合」使缺氧血進體循環,常見4T:法洛氏四重症、大血管轉位(TGA)、三尖瓣閉鎖、全肺靜脈回流異常。心室中隔缺損、心房中隔缺損、主動脈瓣狹窄是「非發紺型(左至右分流或阻塞)」。","options":{"A":"心室中隔缺損是非發紺型(左至右分流)。","B":"心房中隔缺損是非發紺型。","C":"主動脈瓣狹窄是非發紺型(阻塞)。","D":"正確。大血管轉位是發紺型先心。"},"sources":["新文京《兒科護理學》先心","發紺型"]}},"102110-N4-62":{"quick":"足月開放性動脈導管(PDA)錯誤的是「90%的新生兒,其動脈導管於出生後12週閉合」(A)。","detail":{"background":"動脈導管多在出生後「數小時~數天(功能性關閉約24~72小時、解剖性數週內)」閉合,並非「12週(3個月)」才閉合,故A錯誤。其餘正確:鎖骨下/胸骨左緣第二肋間聽到連續性機械樣心雜音、可能餵食困難低體重心搏過速盜汗、可引發肺高壓肺水腫甚至心衰竭。","options":{"A":"錯誤(本題答案)。動脈導管多於出生後數天閉合(非12週)。","B":"正確。胸骨左緣第二肋間聽到連續性機械樣心雜音。","C":"正確。可能餵食困難、低體重、心搏過速、盜汗。","D":"正確。可引發肺高壓、肺水腫甚至心衰竭。"},"sources":["新文京《兒科護理學》PDA","閉合時間"]}},"104030-N4-49":{"quick":"3歲心室中隔缺損開心手術後第1天哭喊要媽媽、拒絕安撫,屬分離焦慮的「抗議期」(A)。","detail":{"background":"幼兒分離焦慮三期:抗議期(大哭大鬧、拒絕他人安撫、強烈尋找父母)、失望期(安靜退縮、悲傷、對環境冷漠)、去依戀期/否認期(表面適應、對父母回來反而冷淡)。本例「哭喊要媽媽、拒絕安撫」屬抗議期。","options":{"A":"正確。哭喊要媽媽、拒絕安撫=抗議期。","B":"否認/去依戀期是表面適應、對父母冷淡。","C":"失望期是安靜退縮悲傷(非大哭尋找)。","D":"去依戀期是表面適應(非抗議)。"},"sources":["新文京《兒科護理學》分離焦慮","抗議期"]}},"104030-N4-63":{"quick":"2歲心室中隔缺損合併艾森曼格氏徵候群、上呼吸道感染入院,護理措施不適當的是「靜臥休息,宜採平躺姿勢」(C)。","detail":{"background":"艾森曼格氏徵候群(長期左至右分流致肺高壓、轉為右至左分流發紺)病童呼吸喘時應採「半坐臥(抬高頭部)」減輕呼吸負擔,而非平躺,故C不適當。其餘適當:集中護理減少耗氧、設計靜態遊戲、衛教家中備氧氣筒。","options":{"A":"適當。儘可能採集中護理(減少耗氧)。","B":"適當。運用遊戲設計靜態活動。","C":"不適當(本題答案)。呼吸喘應採半坐臥(非平躺)。","D":"適當。衛教家屬家中需備有氧氣筒。"},"sources":["新文京《兒科護理學》艾森曼格","半坐臥"]}},"105030-N4-63":{"quick":"2歲嚴重主動脈瓣狹窄(Aortic stenosis)不會發生的臨床表徵是「出現發紺、杵狀指」(B)。","detail":{"background":"主動脈瓣狹窄是「非發紺型」阻塞性病變,血流受阻致左心負荷增加,表現脈搏微弱、心跳加快、收縮性心雜音、血氧不足易疲倦,但「不會發紺與杵狀指」(發紺杵狀指見於發紺型先心),故B不會發生。","options":{"A":"會。脈搏微弱、心跳加快(心輸出受限)。","B":"不會(本題答案)。AS是非發紺型,不會發紺與杵狀指。","C":"會。出現收縮性心雜音(瓣膜狹窄)。","D":"會。血氧不足、容易疲倦。"},"sources":["新文京《兒科護理學》主動脈瓣狹窄","非發紺"]}},"106030-N4-63":{"quick":"大動脈轉位(TGA)新生兒護理評估錯誤的是「上下肢血壓相差約20 mmHg」(C)。","detail":{"background":"「上下肢血壓相差(上肢高於下肢)」是「主動脈狹窄(coarctation)」的特徵,非大血管轉位,故C錯誤。TGA是發紺型先心,表現低血氧發紺、紅血球增多(代償缺氧)、第二心音加重(主動脈在前)、依賴PDA/中隔缺損混合血。","options":{"A":"是表徵。紅血球增多(代償慢性缺氧)。","B":"是表徵。低血氧及發紺症狀。","C":"錯誤(本題答案)。上下肢血壓差是主動脈狹窄(非TGA)。","D":"是表徵。第二心音加重。"},"sources":["新文京《兒科護理學》TGA","非血壓差"]}},"106030-N4-65":{"quick":"2個月心房中膈缺損(ASD)護理指導不恰當的是「按時服用前列腺素E1(Prostaglandin E1)」(D)。","detail":{"background":"前列腺素E1(PGE1)用於「維持動脈導管開放」的發紺型先心(如TGA、肺動脈閉鎖),ASD是非發紺型左至右分流,不需用PGE1維持導管開放,故D不恰當。其餘正確:ASD一般不發紺、1歲內近半可自動閉合、須減少呼吸道感染。","options":{"A":"正確。ASD一般不會出現發紺。","B":"正確。1歲以內將近一半會自動閉合。","C":"正確。減少呼吸道感染(防加重)。","D":"不恰當(本題答案)。ASD不需PGE1(那是維持導管開放用於發紺型)。"},"sources":["新文京《兒科護理學》ASD","非PGE1"]}},"106110-N4-65":{"quick":"5歲TGA病童的心臟認知解說，應採具體、簡單的方式＝畫人形和心臟位置、說明手術後心臟會發出較規律清晰的蹦蹦聲。","detail":{"background":"學齡前~學齡兒童(5歲)宜以「具體、視覺化(畫出心臟腔室外形)」並用簡單功能性語言解釋手術會如何改善打血,符合其具體運思的認知。不應只跳過孩子只教父母、用過於抽象的「規律蹦蹦聲」或成人化的動靜脈循環專業討論。","options":{"A":"不應只以父母認知為範疇，應對孩子(5歲)用其能理解的方式解釋。","B":"正確。對5歲用具體、簡單方式(畫人形、心臟位置、規律蹦蹦聲)。","C":"畫四腔室、解釋打血機制對5歲過於抽象複雜。","D":"動靜脈血液循環的口語討論對5歲過於抽象。"},"sources":["新文京《兒科護理學》認知","具體圖示"]}},"107030-N4-72":{"quick":"先天性心臟病嬰兒餵食護理措施錯誤的是「選擇小一點的奶嘴洞餵食,避免嗆奶」(A)。","detail":{"background":"先天性心臟病嬰兒吸吮費力易疲倦缺氧,應選「柔軟、洞孔稍大的奶嘴」減少吸吮費力,而非小洞奶嘴,故A錯誤。其餘正確:每3小時餵一次且每次不超過30分鐘(避免耗能)、吸吮力差以奶瓶比親餵省力、必要時鼻胃管灌食。","options":{"A":"錯誤(本題答案)。應選洞孔稍大的奶嘴(非小洞,小洞更費力)。","B":"正確。可3小時餵一次、每次不超過30分鐘。","C":"正確。吸吮力欠佳以奶瓶餵比親餵省力。","D":"正確。吸吮力差時可鼻胃管灌食。"},"sources":["新文京《兒科護理學》先心餵食","大洞奶嘴"]}},"108020-N4-70":{"quick":"大血管轉位合併心室中隔缺損錯誤的是「合併心室中隔缺損會讓發紺更嚴重,應立即給予100%氧氣」(B)。","detail":{"background":"TGA因主肺動脈接反,體肺循環平行,需靠「中隔缺損或PDA混合血」維持存活;合併VSD反而「增加血液混合、改善發紺」(非更嚴重),且純給100%氧氣對TGA改善有限(問題在循環構造非氧合),故B錯誤。其餘正確:PGE1維持導管開放須注意呼吸窘迫/血管炎、合併嚴重中隔缺損注意心衰竭、血液檢查注意紅血球增多。","options":{"A":"正確。PGE1注意呼吸窘迫與血管炎副作用。","B":"錯誤(本題答案)。合併VSD增加血液混合反改善發紺(非更嚴重),且100%氧氣助益有限。","C":"正確。合併嚴重中隔缺損須注意心衰竭。","D":"正確。注意血液是否紅血球增多(代償缺氧)。"},"sources":["新文京《兒科護理學》TGA","VSD混合"]}},"109030-N4-49":{"quick":"13歲上肢血壓高、鼠蹊脈搏較上肢微弱、頭痛、腳冰冷,可能罹患「主動脈狹窄」(B)。","detail":{"background":"主動脈狹窄(coarctation of aorta)在狹窄處上游(上肢)血壓高、下游(下肢/股動脈)血壓低脈搏弱,故出現「上肢血壓高、頭痛、下肢脈弱冰冷」。心室中隔缺損、肺動脈瓣狹窄、大血管轉位不會造成此上下肢血壓差。","options":{"A":"心室中隔缺損不造成上下肢血壓差。","B":"正確。主動脈狹窄致上肢血壓高、下肢脈弱冰冷。","C":"肺動脈瓣狹窄不造成上下肢血壓差。","D":"大血管轉位是發紺型(非以上下肢血壓差表現)。"},"sources":["新文京《兒科護理學》主動脈狹窄","上下肢壓差"]}},"109030-N4-73":{"quick":"開放性動脈導管(PDA)病童較不會出現的症狀是「紅血球增多症」(C)。","detail":{"background":"PDA是「非發紺型(左至右分流)」,血流由主動脈流向肺動脈使肺血流增加,表現心搏過快、肺動脈高壓、餵食困難、心衰竭,但因非缺氧型,「較不會紅血球增多」(紅血球增多是發紺型缺氧的代償),故C較不會出現。","options":{"A":"會。心搏過快(心輸出代償)。","B":"會。肺動脈高壓(肺血流增加)。","C":"較不會(本題答案)。紅血球增多是發紺型缺氧代償(PDA非發紺型)。","D":"會。餵食困難(心臟負荷)。"},"sources":["新文京《兒科護理學》PDA","非紅血球增"]}},"110110-N4-66":{"quick":"30週1500克PDA以Indomethacin治療,正確的是「尿量<1 mL/kg/hr時應通知醫師調整藥物劑量」(A)。","detail":{"background":"Indomethacin(前列腺素合成抑制劑)用於關閉早產兒PDA,其副作用會減少腎血流致「腎功能下降、尿量減少」,故「尿量<1mL/kg/hr應通知醫師」監測腎毒性。治療前PDA「會」聽到連續心雜音(非較少);關閉PDA使肺血流恢復(非致發紺);其副作用是腎功能與出血傾向(非易血栓)。","options":{"A":"正確。尿量<1mL/kg/hr應通知醫師調整劑量(腎毒性)。","B":"錯。治療前PDA會聽到連續性心雜音(非較少)。","C":"錯。關閉PDA使肺血流恢復(非致發紺)。","D":"錯。Indomethacin副作用是腎功能與出血(非易血栓)。"},"sources":["新文京《兒科護理學》PDA","Indomethacin"]}},"112110-N4-66":{"quick":"4歲重度主動脈瓣狹窄(AS)錯誤的是「須執行布萊洛-陶西分流術(Blalock-Taussig Shunt)」(D)。","detail":{"background":"布萊洛-陶西分流術(BT shunt)是用於「發紺型(如法洛氏四重症、肺血流不足)」增加肺血流的姑息手術,主動脈瓣狹窄是「左心流出道阻塞」需做瓣膜整形/置換,不適用BT shunt,故D錯誤。其餘正確:易心衰竭須限水、活動易缺氧須限制活動、觀察心跳末梢循環並足夠休息。","options":{"A":"正確。易發生充血性心衰竭,需限制水分。","B":"正確。活動易致缺氧,需活動限制。","C":"正確。觀察心跳與末梢循環、提供休息。","D":"錯誤(本題答案)。BT shunt用於發紺型增肺血流(非主動脈瓣狹窄)。"},"sources":["新文京《兒科護理學》主動脈瓣狹窄","非BT shunt"]}},"112180-N4-40":{"quick":"疑似心臟病入院抽ASLO(anti-streptolysin O)抗鏈球菌素,主要診斷「急性風濕熱」(D)。","detail":{"background":"ASLO(抗鏈球菌溶血素O)升高代表近期A群β型溶血性鏈球菌感染,用於診斷「急性風濕熱(鏈球菌咽炎後免疫反應致心臟瓣膜炎)」與鏈球菌感染後腎絲球腎炎。川崎氏症、法洛氏四重症、開放性動脈導管與ASLO無關。","options":{"A":"川崎氏症與ASLO無關(查發炎指標/冠狀動脈)。","B":"法洛氏四重症是先天結構異常(非ASLO)。","C":"開放性動脈導管與ASLO無關。","D":"正確。ASLO升高用於診斷急性風濕熱。"},"sources":["新文京《兒科護理學》風濕熱","ASLO"]}},"114170-N4-41":{"quick":"大血管轉位(TGA)服用前列腺素(PGE1)使用目的是「維持動脈導管開放」(B)。","detail":{"background":"TGA因體肺循環平行,須靠動脈導管/中隔缺損混合血維持存活,故給PGE1「維持動脈導管開放」增加血液混合與氧合。它非增加心肌收縮力、非增加下肢靜脈回流、也非降低體循環血氧(目的是改善缺氧)。","options":{"A":"PGE1非增加心肌收縮力。","B":"正確。PGE1維持動脈導管開放(增加血液混合)。","C":"非增加下肢靜脈血回流。","D":"錯。目的是改善缺氧(非降低體循環血氧)。"},"sources":["新文京《兒科護理學》TGA","PGE1"]}},"101030-N4-65":{"quick":"6個月法洛氏四重症長期用毛地黃,出現「厭食、噁心、嘔吐」應暫停給藥立即就醫(C)。","detail":{"background":"毛地黃(Digoxin)中毒早期症狀:厭食、噁心、嘔吐、心搏過慢、心律不整、視覺改變,出現時應暫停給藥並就醫。心跳「大於100」非毛地黃中毒指標(中毒是過慢);皮膚紅疹搔癢、哭鬧無法入睡非毛地黃中毒典型表現。","options":{"A":"心跳>100非毛地黃中毒(中毒是過慢)。","B":"皮膚紅疹搔癢非毛地黃中毒症狀。","C":"正確。厭食、噁心、嘔吐是毛地黃中毒早期症狀。","D":"哭鬧無法入睡非毛地黃中毒指標。"},"sources":["新文京《兒科護理學》毛地黃","中毒"]}},"102030-N4-64":{"quick":"10歲法洛氏四重症造成膚色及嘴唇發紺的最主要因素是「肺動脈狹窄的程度」(A)。","detail":{"background":"法洛氏四重症(肺動脈狹窄、心室中隔缺損、主動脈跨位、右心室肥厚)中,「肺動脈狹窄的嚴重度」決定肺血流量與右至左分流量,是發紺嚴重度的主要決定因素。狹窄越嚴重、肺血流越少、發紺越重。","options":{"A":"正確。肺動脈狹窄程度決定發紺嚴重度。","B":"心室中隔缺損大小非發紺的主要決定因素。","C":"右心室肥厚是結果(非發紺主因)。","D":"主動脈跨位是構造之一(非發紺主因)。"},"sources":["新文京《兒科護理學》法洛","肺動脈狹窄"]}},"103030-N4-65":{"quick":"10歲法洛氏四重症護理評估會發現的是「可能出現杵狀指(clubbing finger)」(B)。","detail":{"background":"法洛氏四重症長期慢性缺氧,會代償性「紅血球增多(非過少)」、出現「杵狀指、發紺、蹲踞」。它「不會肺發育不全」(是肺動脈狹窄)、「肺動脈壓力較低/肺血流少」但這非評估的代表性陽性發現,杵狀指是慢性缺氧的典型表徵。","options":{"A":"錯。慢性缺氧致紅血球增多(非過少)。","B":"正確。慢性缺氧可能出現杵狀指。","C":"錯。是肺動脈狹窄(非肺發育不全)。","D":"肺血流少是病理(非評估代表發現)。"},"sources":["新文京《兒科護理學》法洛","杵狀指"]}},"104030-N4-45":{"quick":"1個月法洛氏四重症矯正前護理措施不適當的是「可每3小時餵1次,每次餵食不可少於30分鐘,以減少耗氧量」(B)。","detail":{"background":"法洛氏四重症餵食應「縮短餵食時間」(過長餵食增加耗氧與缺氧),故「每次不可少於30分鐘(餵很久)」不適當。其餘適當:選柔軟大洞奶嘴少量多餐、發紺發作時側臥膝蓋彎向腹部抬高頭胸、滿足需求避免便秘減少哭泣。","options":{"A":"適當。柔軟大洞奶嘴、少量多餐。","B":"不適當(本題答案)。應縮短餵食時間(非每次不少於30分鐘)。","C":"適當。發紺發作時膝胸姿勢、抬高頭胸。","D":"適當。滿足需求、避免便秘、減少哭泣(防缺氧發作)。"},"sources":["新文京《兒科護理學》法洛餵食","縮短時間"]}},"104030-N4-64":{"quick":"法洛氏四重症呼吸困難發作時最可能採取的姿勢是「蹲坐」(A)。","detail":{"background":"法洛氏四重症兒童缺氧發作時本能採「蹲踞(squatting)/膝胸臥姿」,可增加體循環血管阻力、減少右至左分流、增加肺血流改善缺氧。垂頭仰臥、半坐臥、側臥皆無此改善缺氧的效果。","options":{"A":"正確。蹲坐(squatting)增加體循環阻力、改善缺氧。","B":"垂頭仰臥無改善缺氧效果。","C":"半坐臥非法洛缺氧發作的本能姿勢。","D":"左側臥無改善缺氧效果。"},"sources":["新文京《兒科護理學》法洛","蹲踞"]}},"105030-N4-64":{"quick":"1歲法洛氏四重症抽血後發紺、呼吸困難,應優先進行的措施是「讓小明採膝胸臥姿(Knee-chest position)休息」(A)。","detail":{"background":"法洛氏四重症缺氧發作時應「優先採膝胸臥姿」(增加體循環阻力、減少右至左分流、增加肺血流),同時安撫減少哭鬧、給氧。先擺膝胸臥姿是最即時改善缺氧的措施,優先於測量生命徵象或餵奶。","options":{"A":"正確。優先採膝胸臥姿改善缺氧發作。","B":"測生命徵象非最優先(先改善缺氧)。","C":"給氧為輔(優先擺膝胸臥姿)。","D":"餵奶非缺氧發作的處置。"},"sources":["新文京《兒科護理學》法洛","膝胸臥"]}},"105090-N4-62":{"quick":"足月開放性動脈導管(PDA)護理評估較不會出現的表徵是「餵食時,容易出現發紺的缺氧發作」(A)。","detail":{"background":"PDA是「非發紺型(左至右分流)」,血由主動脈流向肺動脈,故「較不會發紺缺氧發作」(那是發紺型如法洛的表現)。其餘會出現:肺血流增加致肺水腫、寬廣的脈搏壓(舒張壓低)、胸骨左緣第二肋間連續性機械樣心雜音。","options":{"A":"較不會(本題答案)。PDA是非發紺型,較不會缺氧發紺發作。","B":"會。肺血流增加可致肺水腫。","C":"會。寬廣的脈搏壓(舒張壓低)。","D":"會。胸骨左緣第二肋間連續性機械樣心雜音。"},"sources":["新文京《兒科護理學》PDA","非發紺"]}},"105090-N4-63":{"quick":"法洛氏四重症發紺錯誤的是「主要是血液有由左至右的分流」(C)。","detail":{"background":"法洛氏四重症因肺動脈狹窄使右心壓力升高,血液經心室中隔缺損由「右至左分流」(缺氧血進體循環)致發紺,故「左至右分流」錯誤。其餘正確:發紺是血氧過低、急性缺氧發作常在早晨/餵奶/哭泣/排便時、主要是肺動脈狹窄所致。","options":{"A":"正確。發紺是血液含氧量過低的結果。","B":"正確。缺氧發作常在早晨、餵奶、哭泣或排便時。","C":"錯誤(本題答案)。法洛是右至左分流(非左至右)。","D":"正確。主要是肺動脈狹窄所致。"},"sources":["新文京《兒科護理學》法洛","右至左"]}},"106110-N4-64":{"quick":"5歲法洛氏四重症缺氧發作(blue spells)臨床表徵不包括「皮膚彈性減少呈黃色」(B)。","detail":{"background":"缺氧發作(blue spells)表現:哭泣後發紺加劇、嘴唇口腔黏膜暗藍、鞏膜灰暗、煩躁、意識改變、蹲踞。「皮膚彈性減少呈黃色」是脫水/黃疸的描述,非缺氧發作表徵,故B不包括。","options":{"A":"是表徵。哭泣後出現發紺。","B":"不包括(本題答案)。皮膚彈性減少呈黃色是脫水/黃疸(非缺氧發作)。","C":"是表徵。鞏膜因血管鼓大呈灰色。","D":"是表徵。嘴唇口腔黏膜呈暗藍色。"},"sources":["新文京《兒科護理學》法洛","缺氧發作"]}},"106111-N4-62":{"quick":"2歲法洛氏四重症缺氧發作護理措施錯誤的是「依醫囑給予濃縮紅血球」(D)。","detail":{"background":"法洛缺氧發作處置:膝胸/蹲踞姿、給氧、依醫囑給嗎啡(morphine,鎮靜、降低呼吸與肺血管阻力痙攣)、必要時給靜脈輸液與β-blocker。「給濃縮紅血球」非缺氧發作的急性處置(法洛本就紅血球增多),故D錯誤。","options":{"A":"正確。將病童擺曲膝蹲姿(膝胸臥)。","B":"正確。依醫囑給予氧氣。","C":"正確。依醫囑給予Morphine(鎮靜、緩解漏斗部痙攣)。","D":"錯誤(本題答案)。缺氧發作非給濃縮紅血球(法洛本就紅血球增多)。"},"sources":["新文京《兒科護理學》法洛","缺氧處置"]}},"106111-N4-63":{"quick":"不屬於發紺型先天性心臟病的是「心房中隔缺損」(D)。","detail":{"background":"發紺型先心(4T):法洛氏四重症、大血管轉位、三尖瓣閉鎖、全肺靜脈回流異常。心房中隔缺損(ASD)是「非發紺型(左至右分流)」,故不屬於發紺型。","options":{"A":"法洛氏四重畸形是發紺型。","B":"大血管轉位是發紺型。","C":"三尖瓣閉鎖是發紺型。","D":"正確(不屬於)。心房中隔缺損是非發紺型。"},"sources":["新文京《兒科護理學》先心","非發紺ASD"]}},"108020-N4-71":{"quick":"毛地黃漏服未滿規定時數(此為3小時)＝立即補服一劑，下一劑維持原時間(晚上9點)。","detail":{"background":"毛地黃漏服若「超過給藥時間6小時(本例已3小時但官方判此情境不補)」,為避免劑量疊加中毒,原則是「不補服,下一劑按原時間服用、不可一次服兩劑」。本題官方答案為C:不補服、下一劑維持晚上9點。","options":{"A":"不應補服後又改下一劑時間。","B":"正確。漏服未超過時限(此例3小時)立即補服一劑，下一劑維持晚上9點。","C":"僅遲3小時(未超過時限)應補服，不補服錯。","D":"不可晚上9點服兩劑(中毒風險)。"},"sources":["新文京《兒科護理學》毛地黃","漏服"]}},"108110-N4-46":{"quick":"法洛氏四重症採膝胸臥式可改善發紺的原理是「減少下肢回心血量,增加肺部血流」?——本題答B。","detail":{"background":"本題官方答案為B。膝胸臥/蹲踞使「下肢靜脈回心血量減少、體循環血管阻力增加」,進而減少經心室中隔缺損的右至左分流、相對增加流向肺動脈的血流(改善肺部氧合),故發紺改善。","options":{"A":"並非以降低血壓為主要機轉。","B":"正確(本題答案)。減少下肢回心血量、增加肺部血流(改善發紺)。","C":"非以減少上肢回心血量供腦為機轉。","D":"非縮短循環距離提高血量。"},"sources":["新文京《兒科護理學》法洛","膝胸原理"]}},"109110-N4-64":{"quick":"8個月法洛氏四重症哭鬧發紺,給氧並擺膝胸臥式的目的是「減少回流至心臟之血量」(A)?——本題答A。","detail":{"background":"本題官方答案為A。膝胸臥式壓迫下肢使「靜脈回流至心臟的血量減少」、同時增加體循環阻力,減少右至左分流、增加肺血流改善缺氧。其作用機轉聚焦於「減少回心血量(及增加體循環阻力)」。","options":{"A":"正確(本題答案)。減少回流至心臟之血量(並增體循環阻力)。","B":"是增加(非減少)全身血管阻力。","C":"非減少右心流向肺動脈血量(反而增肺血流)。","D":"減少耗氧是給氧/安撫的目的(非膝胸姿勢主機轉)。"},"sources":["新文京《兒科護理學》法洛","膝胸原理"]}},"111110-N4-66":{"quick":"增加法洛氏四重症(TOF)肺循環血流以增左心充氧血含量,照護處置錯誤的是「口服給予Aspirin」(B)。","detail":{"background":"增加TOF肺血流的方法:缺氧發作時膝胸臥姿、靜脈滴注PGE1維持動脈導管開放、布萊洛-陶西分流術(BT shunt)增肺血流。「口服Aspirin」與增加肺血流無關(且兒童避免阿斯匹靈防雷氏症候群),故B錯誤。","options":{"A":"正確。缺氧發作時予膝胸臥姿。","B":"錯誤(本題答案)。口服Aspirin與增肺血流無關(且兒童避免)。","C":"正確。靜脈滴注PGE1維持動脈導管開放增肺血流。","D":"正確。布萊洛-陶西分流術增加肺血流。"},"sources":["新文京《兒科護理學》法洛","增肺血流"]}},"112030-N4-65":{"quick":"2歲法洛氏四重症每12小時服毛地黃,護理指導錯誤的是「若忘記給藥超過6小時應補給一劑」(D)。","detail":{"background":"毛地黃漏服「超過6小時不可補服」(避免劑量疊加中毒),應跳過、下一劑按原時間服,故D錯誤。其餘正確:給藥前測心尖脈滿1分鐘、飯前1小時或飯後2小時給藥、勿與果汁混合餵食(影響吸收且難確認劑量)。","options":{"A":"正確。給藥前須完整測量心尖脈1分鐘。","B":"正確。飯前1小時或飯後2小時給藥。","C":"正確。勿將藥物與果汁混合餵食。","D":"錯誤(本題答案)。漏服超過6小時不補服(非補一劑)。"},"sources":["新文京《兒科護理學》毛地黃","漏服6小時"]}},"113100-N4-40":{"quick":"3個月法洛氏四重症矯正手術前給prostaglandin E1(PGE1)的理由是「使動脈導管維持開放,增加肺動脈的血量」(B)。","detail":{"background":"法洛氏四重症因肺動脈狹窄肺血流不足,給PGE1「維持動脈導管開放」讓主動脈血經導管流向肺動脈、增加肺血流改善缺氧。它是維持開放(非關閉)、增加肺動脈血量(非主動脈)。","options":{"A":"錯。是增加肺動脈血量(非主動脈)。","B":"正確。維持動脈導管開放、增加肺動脈血量。","C":"錯。是維持開放(非儘早關閉)。","D":"錯。是維持開放增肺血流(非關閉)。"},"sources":["新文京《兒科護理學》法洛","PGE1"]}},"115030-N4-40":{"quick":"安撫法洛氏四重症採膝胸臥/蹲姿,彎曲腿部的理由錯誤的是「減少上肢靜脈的回心血量」(A)。","detail":{"background":"蹲踞/膝胸彎曲腿部是減少「下肢(非上肢)靜脈回心血量」、增加體循環血管阻力、減少右至左分流、增加肺血流,故「減少上肢靜脈回心血量」錯誤。其餘正確:增加肺動脈到肺臟的血量、增加全身血管阻力、減少右心低氧血進體循環。","options":{"A":"錯誤(本題答案)。是減少下肢靜脈回心血量(非上肢)。","B":"正確。增加肺動脈至肺臟的血量。","C":"正確。增加全身血管的血流阻力。","D":"正確。減少右心低氧濃度的血量(進體循環)。"},"sources":["新文京《兒科護理學》法洛","下肢回流"]}},"103100-N4-70":{"quick":"3個月三尖瓣閉鎖(Tricuspid Atresia)給前列腺素E1(PGE1)的主要目的是「促使動脈導管開放,增加肺部血流」(B)。","detail":{"background":"三尖瓣閉鎖是發紺型先心,右心房血無法經三尖瓣到右心室與肺動脈,肺血流不足,須靠「動脈導管開放」讓主動脈血流向肺動脈增加肺血流,故給PGE1維持導管開放。它非增加下肢靜脈回流、非關閉導管改善肺高壓、非關閉導管增主動脈血流。","options":{"A":"錯。PGE1是增肺血流(非增下肢靜脈回流)。","B":"正確。維持動脈導管開放,增加肺部血流。","C":"錯。是維持開放(非關閉改善肺高壓)。","D":"錯。是維持開放增肺血流(非關閉增主動脈血流)。"},"sources":["新文京《兒科護理學》三尖瓣閉鎖","PGE1"]}},"104100-N4-63":{"quick":"4歲法洛氏四重症心導管追蹤檢查前後護理錯誤的是「檢查前需禁食4~6小時,但毛地黃藥物需按時持續給予」(A)。","detail":{"background":"心導管檢查前須禁食4~6小時,但「毛地黃等心臟藥物在心導管檢查前通常應依醫囑暫停(hold)」(以免檢查中影響心律判讀與風險),故「按時持續給予」錯誤。其餘正確:檢查前以遊戲/畫圖提供資訊、檢查後穿刺部位加壓止血並維持肢體平直、檢查後密切注意肢體顏色溫度與生命徵象。","options":{"A":"錯誤(本題答案)。心導管檢查前毛地黃通常應依醫囑暫停(非按時持續給予)。","B":"正確。檢查前可用遊戲或畫圖提供資訊。","C":"正確。檢查後穿刺部位加壓、肢體維持平直不彎曲。","D":"正確。檢查後密切注意肢體顏色、溫度及生命徵象。"},"sources":["新文京《兒科護理學》心導管","停毛地黃"]}},"111030-N4-61":{"quick":"5歲右下肺葉肺炎急性期呼吸窘迫,護理措施較不適當的是「協助採左側臥,以緩解疼痛」(D)。","detail":{"background":"急性呼吸窘迫時擺位應以「促進氧合與呼吸」為首要考量,並非單純為緩解疼痛而擺位;且右側肺炎以「左側臥」並不會緩解右側胸痛,理由不成立,故D較不適當。其餘適當:維持體液並監測尿量、維持組織氧合(給氧擺位通氣抽吸)、預防感染並治療潛在疾病。","options":{"A":"適當。維持補充體液並監測記錄尿量。","B":"適當。維持組織氧合(給氧、擺位、通氣、抽吸)。","C":"適當。預防感染並治療潛在疾病。","D":"較不適當(本題答案)。擺位應以促進呼吸氧合為主(左側臥緩解右側痛理由不成立)。"},"sources":["新文京《兒科護理學》肺炎","擺位"]}},"103030-N4-63":{"quick":"2個月先天性心臟病居家照護錯誤的是「每次餵食時間宜超過30分鐘」(C)。","detail":{"background":"心臟病嬰兒吸吮費力易疲倦缺氧,餵食應「縮短時間(不超過30分鐘)、少量多餐」減少耗氧,故「超過30分鐘」錯誤。其餘正確:母乳擠出後餵食或灌食(省力)、選柔軟洞口稍大奶嘴、少量多餐高熱量飲食。","options":{"A":"正確。母乳擠出再餵食或灌食(省力)。","B":"正確。選柔軟、洞口稍大的奶嘴。","C":"錯誤(本題答案)。餵食應縮短時間不超過30分鐘(非超過30分鐘)。","D":"正確。少量多餐、高熱量飲食。"},"sources":["新文京《兒科護理學》心臟病餵食","縮短時間"]}},"103100-N4-66":{"quick":"4歲氣喘長期用Flixotide(fluticasone, MDI)護理指導適當的是「衛教合併使用面罩型吸藥輔助艙(aerochamber)吸入器裝置之技巧」(C)。","detail":{"background":"Flixotide(fluticasone)是「吸入型類固醇(保養抗發炎藥)」,幼兒使用MDI應「合併面罩型吸藥輔助艙(aerochamber)」改善吸入、減少口咽沉積。它「是類固醇」(會影響生長須監測,A錯)、作用是「抗發炎保養」非擴張支氣管(B錯)、保養藥「須規則持續使用」不可症狀減輕就自行減藥(D錯)。","options":{"A":"錯。Flixotide是吸入型類固醇(會影響生長須監測)。","B":"錯。它是抗發炎保養藥(非擴張支氣管)。","C":"正確。衛教合併使用面罩型吸藥輔助艙的技巧。","D":"錯。保養藥須規則使用(非症狀減輕就自行減藥)。"},"sources":["新文京《兒科護理學》吸入類固醇","aerochamber"]}},"104100-N4-64":{"quick":"充血性心衰竭嬰兒的徵象不包括「高血壓,眼眶周圍水腫」(C)。","detail":{"background":"充血性心衰竭嬰兒表現:心跳快有奔馬律、呼吸喘乾咳、四肢冰冷盜汗、肝腫大、餵食困難、體重增加(水腫)。「高血壓」非典型(心輸出下降多血壓正常或偏低);嬰兒水腫多見「眼眶周圍/薦部/全身」但合併「高血壓」的敘述不符,故C不包括。","options":{"A":"是徵象。心跳快、奔馬狀節律。","B":"是徵象。呼吸喘、持續性乾咳。","C":"不包括(本題答案)。心衰竭多血壓正常或偏低(非高血壓)。","D":"是徵象。四肢冰冷、盜汗。"},"sources":["新文京《兒科護理學》CHF","非高血壓"]}},"105030-N4-65":{"quick":"充血性心衰竭(CHF)嬰兒臨床徵象不包括「心輸出量減少,心跳速率變慢」(A)。","detail":{"background":"心衰竭時心輸出下降,身體代償使「心跳加快(非變慢)」,故A不包括。其餘是CHF徵象:周邊靜脈充血致肝腫大下肢水腫、肺水腫咳嗽呼吸困難呼吸快、臉色指甲蒼白四肢冰冷血壓低盜汗。","options":{"A":"不包括(本題答案)。CHF心跳代償性加快(非變慢)。","B":"是徵象。周邊靜脈充血、肝腫大、下肢水腫。","C":"是徵象。肺水腫、咳嗽、呼吸困難、呼吸快。","D":"是徵象。蒼白、四肢冰冷、血壓低、盜汗。"},"sources":["新文京《兒科護理學》CHF","心跳快"]}},"106110-N4-63":{"quick":"2個月心室中膈缺損因肺炎引發鬱血性心衰竭,不屬於鬱血性心衰竭臨床表徵的是「心跳過慢」(A)。","detail":{"background":"鬱血性心衰竭代償使「心跳過速(非過慢)」,故A不屬於。其餘是CHF表徵:大量流汗(交感興奮)、四肢冰冷(末梢灌流差)、呼吸過速(肺鬱血)。","options":{"A":"不屬於(本題答案)。CHF是心跳過速(非過慢)。","B":"是表徵。大量流汗(交感興奮)。","C":"是表徵。四肢冰冷(末梢灌流差)。","D":"是表徵。呼吸過速(肺鬱血)。"},"sources":["新文京《兒科護理學》CHF","心跳快"]}},"106110-N4-66":{"quick":"6歲先天性心臟病服毛地黃,不是毛地黃中毒的症狀是「抽搐、痙攣」(D)。","detail":{"background":"毛地黃中毒症狀:心跳變慢/心律不整、噁心嘔吐厭食、頭痛嗜睡、視覺改變(黃綠視)。「抽搐、痙攣」非毛地黃中毒的典型症狀,故D不是。","options":{"A":"是。心跳變慢(心律不整)。","B":"是。噁心、嘔吐(腸胃道症狀)。","C":"是。頭痛、嗜睡(神經症狀)。","D":"不是(本題答案)。抽搐痙攣非毛地黃中毒典型症狀。"},"sources":["新文京《兒科護理學》毛地黃","中毒"]}},"107030-N4-73":{"quick":"心臟病童藥物使用正確的是「使用PGE1靜脈滴注,要注意呼吸窘迫的問題」(C)。","detail":{"background":"前列腺素E1(PGE1)維持動脈導管開放,副作用包括「呼吸暫停/呼吸窘迫、發燒、血管炎、低血壓」,須密切監測呼吸。補鈣與血紅素載氧無關(A錯);毛地黃「不與食物併用」(影響吸收且須空腹定時,B錯);Propranolol(β-blocker)會使「心跳過慢」(非過速,D錯)。","options":{"A":"錯。補鈣與增血紅素載氧量無關。","B":"錯。毛地黃宜空腹定時(不與食物併用)。","C":"正確。PGE1靜脈滴注須注意呼吸窘迫。","D":"錯。Propranolol會心跳過慢(非過速)。"},"sources":["新文京《兒科護理學》PGE1","呼吸窘迫"]}},"107110-N4-71":{"quick":"持續靜脈灌注PGE1維持動脈導管開放增加肺動脈血流,不適合使用PGE1的先心是「主動脈狹窄」(B)?——本題答B。","detail":{"background":"本題官方答案為B。PGE1維持動脈導管開放主要用於「肺血流依賴導管」的發紺型先心(肺動脈瓣狹窄/閉鎖、三尖瓣閉鎖、大血管轉位)以增加肺血流。主動脈狹窄是「左心流出道阻塞(體循環依賴導管)」情況不同,本題判定其「不適合」以PGE1增加肺動脈血流的目的。","options":{"A":"肺動脈瓣狹窄肺血流依賴導管,適用PGE1增肺血流。","B":"不適合(本題答案)。主動脈狹窄是體循環阻塞(非以增肺血流為目的)。","C":"三尖瓣閉鎖肺血流依賴導管,適用PGE1。","D":"大血管轉位需導管混合血,適用PGE1。"},"sources":["新文京《兒科護理學》PGE1","主動脈狹窄"]}},"109110-N4-63":{"quick":"罹患心臟病嬰兒護理照護最適當的是「必要時使用鼻(口)胃管餵食,減少心臟負荷」(C)。","detail":{"background":"心臟病嬰兒吸吮費力耗氧,吸吮力差時可「用鼻/口胃管灌食」減少吸吮耗能與心臟負荷。餵食應「縮短時間(不超過30分鐘)」(非不少於30分鐘);不需一律用低鈉配方取代母乳(母乳仍可,依醫囑限鈉);補鈣與增血紅素載氧量無關。","options":{"A":"錯。餵食應縮短時間不超過30分鐘(非不少於30分鐘)。","B":"不需一律以低鈉配方取代母乳(依醫囑)。","C":"正確。必要時鼻(口)胃管餵食減少心臟負荷。","D":"補鈣與增血紅素載氧量無關。"},"sources":["新文京《兒科護理學》心臟病餵食","管灌"]}},"111030-N4-65":{"quick":"心室中膈缺損(VSD)出現充血性心衰竭、呼吸喘費力,較舒適的姿勢是「半坐臥」(D)。","detail":{"background":"心衰竭呼吸喘時採「半坐臥(Fowler氏)」可使橫膈下降、減少肺鬱血與呼吸費力,最舒適。趴睡、側睡、垂頭俯臥皆無法有效減輕心衰竭的呼吸負擔。","options":{"A":"趴睡無法減輕心衰竭呼吸負擔。","B":"側睡非心衰竭呼吸喘的最佳姿勢。","C":"垂頭俯臥不利呼吸。","D":"正確。半坐臥減少肺鬱血、減輕呼吸費力。"},"sources":["新文京《兒科護理學》CHF","半坐臥"]}},"111110-N4-65":{"quick":"早產兒開放性動脈導管(PDA)醫療處置錯誤的是「給予前列腺素E1(PGE1)是優先的治療方式」(B)。","detail":{"background":"PDA是要「關閉」導管,早產兒藥物關閉用「Indomethacin或Ibuprofen(前列腺素合成抑制劑)」,而PGE1是「維持導管開放」(用於依賴導管的發紺型先心),故給PGE1治療PDA方向相反,B錯誤。其餘正確:無症狀者可12週內自動關閉、低體重有心衰竭宜提早結紮、左側第二肋間連續心雜音、未關閉可考慮導管栓塞術。","options":{"A":"正確。無症狀者可於12週內自動關閉。","B":"錯誤(本題答案)。PDA要關閉,藥物用Indomethacin(PGE1是維持開放)。","C":"正確。低體重有心衰竭宜提早結紮手術。","D":"正確。左側第二肋間連續心雜音,未關閉可導管栓塞術。"},"sources":["新文京《兒科護理學》PDA","Indomethacin"]}},"113180-N4-40":{"quick":"2歲先天性心臟病服毛地黃(一天兩次)正確的是「若忘了服用藥物,六小時內可以補給原劑量」(C)。","detail":{"background":"毛地黃漏服「6小時內可補服原劑量」,超過6小時則不補、下一劑按原時間。給藥應「空腹(飯前1小時或飯後2小時)」(非餐後半小時內);「不與牛奶/果汁併服」(影響吸收);給藥「前」測心尖脈1分鐘評估是否過慢(非給藥後),故C正確。","options":{"A":"錯。應空腹給藥(非餐後半小時內)。","B":"錯。不與牛奶或果汁併服(影響吸收)。","C":"正確。忘服6小時內可補給原劑量。","D":"錯。應給藥前測心尖脈(非給藥後)。"},"sources":["新文京《兒科護理學》毛地黃","漏服6小時"]}},"114100-N4-41":{"quick":"先天性心臟病病童藥物護理錯誤的是「使用Spironolactone(Aldactone)可能造成血鉀過低」(D)。","detail":{"background":"Spironolactone(留鉀利尿劑)會「保鉀」致「血鉀過高」(非過低),故D錯誤。其餘正確:PGE1注意呼吸窘迫、Propranolol(β-blocker)注意心跳過慢、Digoxin若心跳過慢可能是毒性反應。","options":{"A":"正確。使用PGE1需注意呼吸窘迫。","B":"正確。Propranolol需注意心跳過慢。","C":"正確。Digoxin心跳過慢可能是毒性反應。","D":"錯誤(本題答案)。Spironolactone是留鉀利尿劑,致血鉀過高(非過低)。"},"sources":["新文京《兒科護理學》利尿劑","留鉀"]}},"114170-N4-40":{"quick":"8歲先天性心臟病服毛地黃,服藥注意事項錯誤的是「如忘記服藥大於6小時,仍需補給一劑」(D)。","detail":{"background":"毛地黃漏服「超過6小時不補服」(避免劑量疊加中毒),故D錯誤。其餘正確:服排鉀利尿劑時多補含鉀食物(香蕉深綠蔬菜)防低血鉀加重毛地黃毒性、每日定時空腹給藥、給藥前心尖脈<70次/分應暫停。","options":{"A":"正確。多補含鉀食物(防低血鉀加重毛地黃毒性)。","B":"正確。每日定時、空腹給藥效果最好。","C":"正確。給藥前心尖脈<70次/分應暫停服藥。","D":"錯誤(本題答案)。漏服超過6小時不補服(非補一劑)。"},"sources":["新文京《兒科護理學》毛地黃","漏服6小時"]}},"101030-N4-50":{"quick":"4歲先天性心臟病準備心導管檢查,較適當的護理措施是「安排玲玲與母親參與指導性遊戲」(C)。","detail":{"background":"學齡前兒童(4歲)以「指導性(治療性)遊戲」最能準備檢查、降低焦慮,且讓母親一起參與增加安全感。4歲非「不需解說」(運思前期仍需具體準備);只給母親看影片或單張請母親轉述,跳過孩子本身的準備,效果較差。","options":{"A":"錯。4歲仍需以具體方式向孩子解說(非不需)。","B":"看影片可輔助,但指導性遊戲對幼兒更有效。","C":"正確。安排孩子與母親參與指導性遊戲。","D":"只請母親轉述,跳過孩子準備,效果差。"},"sources":["新文京《兒科護理學》治療性遊戲","學齡前"]}},"101030-N4-63":{"quick":"4歲心室中隔缺損心導管檢查後護理措施不適當的是「需禁食直到排氣後,方可進食」(D)。","detail":{"background":"心導管檢查(非腹部手術)後「清醒、無噁心嘔吐即可漸進進食」,不需等到排氣,故D不適當。其餘適當:穿刺後第一小時每15分鐘評估生命徵象、評估肢體末端溫度顏色與足背動脈搏動、臥床維持穿刺側肢體平直數小時。","options":{"A":"適當。穿刺後第一小時每15分鐘評估生命徵象。","B":"適當。評估肢體末端溫度顏色及足背動脈搏動。","C":"適當。臥床維持穿刺側肢體平直。","D":"不適當(本題答案)。清醒即可漸進進食(不需等排氣)。"},"sources":["新文京《兒科護理學》心導管","清醒進食"]}},"101110-N4-24":{"quick":"正常情況下兒童由全身各組織循環回心臟的血液含氧量約「70~75%」(B)。","detail":{"background":"回心臟(右心房/腔靜脈)的「靜脈混合血」含氧飽和度約70~75%(動脈血約95~100%、組織攝取後降至約75%)。60~65偏低、80~85與90~95是動脈側的值。","options":{"A":"60~65%偏低(非正常靜脈回流值)。","B":"正確。靜脈回心血含氧約70~75%。","C":"80~85%偏高(接近動脈)。","D":"90~95%是動脈血含氧值。"},"sources":["新文京《兒科護理學》循環","靜脈含氧"]}},"103100-N4-45":{"quick":"5歲心導管檢查前解釋,護理指導方法較不恰當的是「運用解剖圖片說明」(B)。","detail":{"background":"學齡前~低學齡兒童對「抽象的解剖圖片」理解有限,較不恰當;宜用「第三人稱說故事、繪本、角色扮演遊戲」等具體、貼近其認知的方式說明。","options":{"A":"恰當。運用第三人稱說故事(降低威脅感)。","B":"較不恰當(本題答案)。解剖圖片過於抽象,幼兒理解有限。","C":"恰當。運用繪本說明(具體圖像)。","D":"恰當。運用角色扮演遊戲(治療性遊戲)。"},"sources":["新文京《兒科護理學》認知","繪本遊戲"]}},"103100-N4-67":{"quick":"2歲左心導管檢查返室後較不適當的照護是「告知家屬王小妹需等排氣後才能進食」(B)。","detail":{"background":"心導管檢查後「清醒、無噁心嘔吐即可進食」,不需等排氣,故B較不適當。其餘適當:觀察插管肢體末端脈搏強度、患肢保持平直不可彎曲(防出血)、檢查後第1小時每15分鐘量血壓監測。","options":{"A":"適當。觀察導管插入肢體末端脈搏強度。","B":"較不適當(本題答案)。清醒即可進食(不需等排氣)。","C":"適當。患肢保持平直不可彎曲(防出血)。","D":"適當。檢查後第1小時每15分鐘量血壓。"},"sources":["新文京《兒科護理學》心導管","清醒進食"]}},"103100-N4-69":{"quick":"心室中膈缺損心導管檢查報告不能收集到的資料是「心臟的電衝動傳導」(D)。","detail":{"background":"心導管檢查可測得「各腔室壓力、含氧飽和度、血流與分流變化、心臟結構/血管攝影」。「心臟電衝動傳導」是「心電圖(ECG)/電生理檢查」評估的項目,非一般心導管的資料,故D不能收集到。","options":{"A":"可收集。心臟腔室的壓力。","B":"可收集。心臟腔室的含氧飽和度。","C":"可收集。心臟的血流變化(分流)。","D":"不能(本題答案)。電衝動傳導是ECG/電生理(非一般心導管)。"},"sources":["新文京《兒科護理學》心導管","非電傳導"]}},"106110-N4-46":{"quick":"9歲心室中膈缺損(VSD)心導管檢查後,最大的壓力源是「擔心身體受傷及疼痛」(C)。","detail":{"background":"學齡期兒童(9歲)住院與侵入性檢查的最大壓力源多為「擔心身體受傷害與疼痛(身體完整性)」。暑假作業、不能跟朋友玩、禁食活動受限雖也是壓力,但相較之下「身體受傷與疼痛」是其最主要的恐懼。","options":{"A":"暑假作業是次要壓力。","B":"不能跟朋友玩是次要壓力。","C":"正確。擔心身體受傷及疼痛是最大壓力源。","D":"禁食與活動受限是次要壓力。"},"sources":["新文京《兒科護理學》學齡期","身體傷害"]}},"107030-N4-71":{"quick":"胎血循環的血流方向正確的是「動脈導管血液流入主動脈」(B)。","detail":{"background":"胎兒循環:臍靜脈→靜脈導管→下腔靜脈;右心室血→肺動脈→大部分經「動脈導管流入主動脈」(繞過未擴張的肺);卵圓孔讓血由「右心房→左心房」(非左到右);臍動脈把血帶回胎盤。故「動脈導管血液流入主動脈」正確。","options":{"A":"錯。臍靜脈(非臍動脈)流入靜脈導管。","B":"正確。動脈導管血液流入主動脈。","C":"肺靜脈是把血帶回左心房(此敘述不當)。","D":"卵圓孔是右心房→左心房(非左心室→右心室)。"},"sources":["新文京《兒科護理學》胎兒循環","動脈導管"]}},"108110-N4-47":{"quick":"5歲右心導管檢查返回病房,護理措施錯誤的是「砂袋加壓穿刺部位,彎曲肢體防止砂袋掉落」(C)。","detail":{"background":"心導管檢查後穿刺肢體須「保持平直、不可彎曲」(彎曲會致出血血腫),故「彎曲肢體防砂袋掉落」錯誤。其餘正確:臥床數小時清醒後可進食、評估檢查側肢體循環並與對側比較、觸診兩側脛後/足背動脈做對稱比較。","options":{"A":"正確。臥床(約6小時)、清醒後可進食。","B":"正確。評估檢查側肢體循環並與對側比較。","C":"錯誤(本題答案)。穿刺肢體須保持平直(不可彎曲)。","D":"正確。觸診兩側脛後/足背動脈對稱性比較。"},"sources":["新文京《兒科護理學》心導管","肢體平直"]}},"109030-N4-71":{"quick":"正常兒童心臟血管含氧量最高的部位是「肺靜脈」(A)。","detail":{"background":"肺靜脈攜帶經肺氧合後的「充氧血」回左心房,是含氧量最高處(約95~100%)。肺動脈帶的是右心室來的「缺氧血」、上腔靜脈與右心房是「靜脈回流的缺氧血」(約70~75%)。","options":{"A":"正確。肺靜脈攜充氧血回左心房,含氧量最高。","B":"肺動脈是右心室來的缺氧血。","C":"上腔靜脈是缺氧血。","D":"右心房是靜脈回流缺氧血。"},"sources":["新文京《兒科護理學》循環","肺靜脈含氧高"]}},"109030-N4-72":{"quick":"5歲心房中隔缺損心導管檢查後護理措施正確的是「右心導管檢查後需臥床4~6小時」(A)。","detail":{"background":"心導管檢查(經股靜脈/動脈)後須「臥床4~6小時、穿刺肢體保持平直」防出血。穿刺肢體應「平直不可彎曲」(非彎曲止血);清醒無噁心即可進食(非持續禁食6小時);返家後傷口照護下可正常清潔(非3天不洗澡的絕對說法)。","options":{"A":"正確。右心導管檢查後需臥床4~6小時。","B":"錯。穿刺肢體應平直(非彎曲止血)。","C":"錯。清醒即可進食(非禁食6小時)。","D":"返家後傷口可正常清潔(非3天不洗澡)。"},"sources":["新文京《兒科護理學》心導管","臥床平直"]}},"109110-N4-65":{"quick":"胎血循環錯誤的是「經過卵圓孔的血液是由左心房流向右心房」(B)。","detail":{"background":"胎兒卵圓孔讓血由「右心房→左心房」(因胎兒右心房壓力高),出生後左心房壓力升高才關閉,故「左心房流向右心房」錯誤。其餘正確:臍靜脈血經靜脈導管流向下腔靜脈、右心室血多經動脈導管流入主動脈、臍靜脈血氧高於臍動脈。","options":{"A":"正確。臍靜脈血經靜脈導管流向下腔靜脈。","B":"錯誤(本題答案)。卵圓孔是右心房→左心房(非左到右)。","C":"正確。右心室血多經動脈導管流入主動脈。","D":"正確。臍靜脈血氧濃度高於臍動脈。"},"sources":["新文京《兒科護理學》胎兒循環","卵圓孔"]}},"111030-N4-66":{"quick":"兒童心導管檢查各腔室含氧飽和度異常的是「肺靜脈含氧飽和度70~75%」(B)。","detail":{"background":"肺靜脈攜充氧血,含氧飽和度應約「95~98%」,若僅70~75%(靜脈血的值)則異常,故B異常。其餘正常:右心房70~75%(靜脈回流)、主動脈95~98%、左心房95~98%(充氧血)。","options":{"A":"正常。右心房含氧約70~75%(靜脈回流)。","B":"異常(本題答案)。肺靜脈應95~98%(70~75%是靜脈值,異常)。","C":"正常。主動脈含氧約95~98%。","D":"正常。左心房含氧約95~98%。"},"sources":["新文京《兒科護理學》心導管","肺靜脈飽和"]}},"112110-N4-64":{"quick":"足月新生兒出生後循環變化正確的是「全身血管阻力增加,肺動脈阻力降低」(C)。","detail":{"background":"出生後肺擴張使「肺血管阻力下降」、臍帶結紮使「體循環血管阻力上升」,左心房壓力升高促使卵圓孔功能性關閉、血氧上升使動脈導管收縮關閉。「血氧上升使動脈導管收縮」(非降低,A錯);臍靜脈關閉成「靜脈韌帶」但非立即(B不精確);卵圓孔關閉是因「左心房壓力高於右心房」(D相反)。","options":{"A":"錯。血氧上升(非降低)使動脈導管收縮關閉。","B":"臍靜脈閉合成靜脈韌帶非立即(敘述不精確)。","C":"正確。全身血管阻力增加、肺動脈阻力降低。","D":"錯。卵圓孔關閉是左心房壓力高於右心房(非右高於左)。"},"sources":["新文京《兒科護理學》出生循環","阻力"]}},"112110-N4-65":{"quick":"5歲心室中膈缺損長期服毛地黃、行右心導管檢查,照護最正確的是「檢查後維持穿刺肢體平直,須臥床休息」(C)。","detail":{"background":"心導管檢查後須「穿刺肢體保持平直、臥床休息」防出血血腫。心導管前毛地黃通常「依醫囑暫停」(非改靜脈注射,A不當);檢查後生命徵象監測初期每15分鐘(時長依方案,B的持續4小時不一定);右心導管多由「股靜脈」進入右心房(非股動脈,D錯)。","options":{"A":"毛地黃檢查前多依醫囑暫停(非改靜脈注射)。","B":"監測頻率/時長依方案(持續4小時不一定)。","C":"正確。檢查後維持穿刺肢體平直、臥床休息。","D":"錯。右心導管多由股靜脈進入(非股動脈)。"},"sources":["新文京《兒科護理學》心導管","平直臥床"]}},"101110-N4-36":{"quick":"顱內壓升高病童護理措施錯誤的是「靜脈輸注glycerol時,應在20分鐘內輸畢」(C)。","detail":{"background":"高滲透壓利尿劑(glycerol、mannitol)降腦壓須「依規定速度緩慢輸注(非20分鐘內快速輸畢)」,過快會致電解質與循環波動。其餘正確:減少聲光刺激、限水但維持電解質平衡、避免背部叩擊(會增加顱內壓)。","options":{"A":"正確。減少周圍環境聲光刺激。","B":"正確。限制水分但維持體液電解質平衡。","C":"錯誤(本題答案)。glycerol應緩慢輸注(非20分鐘內輸畢)。","D":"正確。避免背部叩擊(會增加顱內壓)。"},"sources":["新文京《兒科護理學》IICP","緩慢輸"]}},"102030-N4-16":{"quick":"使用前列腺素(PGE2)引產正確的是「會出現子宮強直性的收縮」(D)。","detail":{"background":"PGE2(前列腺素)使子宮頸軟化成熟並引發子宮收縮,使用後須監測「子宮過度刺激/強直性收縮」與胎心。它使子宮頸「變軟成熟」(非變厚);常用陰道塞劑但仍須監測安全(非絕對安全);常須「再配合催產素」加強產程。","options":{"A":"錯。PGE2使子宮頸變軟成熟(非變厚)。","B":"多用陰道給藥但須密切監測(非較為安全)。","C":"錯。常須再配合催產素使用。","D":"正確。使用後可能出現子宮強直性收縮(須監測)。"},"sources":["新文京《產科護理學》PGE2","子宮收縮"]}},"102030-N4-37":{"quick":"秤護墊法(pad weighting test)評估壓力性尿失禁,不包括的活動是「仰臥起坐」(C)。","detail":{"background":"秤護墊法評估「日常會增加腹壓導致漏尿」的活動,如走路、彎腰撿物、坐站交替、咳嗽。「仰臥起坐」非日常活動且非標準測試項目,故不包括。","options":{"A":"包括。彎腰撿拾物品(增腹壓)。","B":"包括。走路。","C":"不包括(本題答案)。仰臥起坐非標準測試活動。","D":"包括。坐/站交替。"},"sources":["新文京《基本護理學》尿失禁","護墊法"]}},"102110-N4-57":{"quick":"出血性登革熱病童護理處置不適當的是「給與indomethacin或acetylsalicylic acid來減輕疼痛及發燒」(B)。","detail":{"background":"出血性登革熱有出血傾向與血小板低下,「禁用阿斯匹靈(acetylsalicylic acid)與NSAID(indomethacin)」(會抑制血小板、增加出血、且阿斯匹靈致雷氏症候群),退燒止痛應用acetaminophen,故B不適當。其餘適當:監測生命徵象血比容體液電解質、高熱量高蛋白與必要時靜脈補液、必要時輸血小板/血漿並注意體液過多心衰竭。","options":{"A":"適當。監測生命徵象、血比容、體液電解質。","B":"不適當(本題答案)。禁用阿斯匹靈/NSAID(增出血,用acetaminophen)。","C":"適當。高熱量高蛋白、必要時靜脈補液。","D":"適當。必要時輸血小板/血漿,注意體液過多或心衰竭。"},"sources":["新文京《兒科護理學》登革熱","禁阿斯匹靈"]}},"103030-N4-74":{"quick":"2歲半幼兒插鼻胃管「正確」者＝插管時協助側躺向右側(利胃排空);長度量鼻尖經耳垂至劍突、咳嗽嗆到發紺是誤入氣管。","detail":{"background":"本題官方答案為A。幼兒鼻胃管尺寸約「8~12 Fr.」,選10~12Fr.合理。插管應協助「半坐臥或頭部前傾(下巴朝胸)」利進食道(非右側躺);過程出現「咳嗽嗆到發紺」表示誤入氣管須立即拔出(非正常);插入長度由「鼻尖經耳垂至劍突」(非至肚臍)。","options":{"A":"2歲半幼兒鼻胃管宜較細(此尺寸偏大)。","B":"正確(本題以右側躺為答，利胃部排空)。","C":"咳嗽、嗆到、發紺是誤入氣管，非正常現象。","D":"長度應由鼻尖經耳垂連至「劍突」(非肚臍)。"},"sources":["新文京《基本護理學》鼻胃管","尺寸"]}},"103100-N4-5":{"quick":"妊娠期物質使用護理指導錯誤的是「吸菸時菸草燃燒產生二氧化碳,會影響胎兒氧氣量的供應」(D)。","detail":{"background":"吸菸影響胎兒供氧的主因是產生「一氧化碳(CO)」與尼古丁使血管收縮,CO與血紅素結合力強、降低攜氧,並非「二氧化碳」,故D錯誤。其餘正確:胎兒無法快速排除酒精致乙醛蓄積傷神經、尼古丁使子宮血管收縮影響灌流、尼古丁進入母乳產生異味。","options":{"A":"正確。胎兒無法快速排除酒精,乙醛蓄積傷神經。","B":"正確。尼古丁使子宮血管收縮影響灌流。","C":"正確。尼古丁會進入母乳產生異味。","D":"錯誤(本題答案)。是一氧化碳(CO)影響供氧(非二氧化碳)。"},"sources":["新文京《產科護理學》吸菸","一氧化碳"]}},"103100-N4-41":{"quick":"近3年生命統計1~14歲兒童主要死亡原因前3位不包括「氣喘」(A)。","detail":{"background":"我國1~14歲兒童主要死亡原因前幾位為「事故傷害、惡性腫瘤、先天性畸形(及染色體異常)」。氣喘雖常見但非兒童主要死亡原因前三位,故不包括。","options":{"A":"不包括(本題答案)。氣喘非兒童死因前3位。","B":"是。事故傷害(兒童首要死因)。","C":"是。惡性腫瘤。","D":"是。先天性畸形。"},"sources":["衛福部統計","兒童死因"]}},"104030-N4-33":{"quick":"安胎用Yutopar(ritodrine)「正確」者＝鼓勵婦女左側臥增加子宮胎盤血液灌流;為β興奮劑，會母體心搏過速但血壓多下降、胎兒心搏過速。","detail":{"background":"Yutopar(ritodrine,β2-交感神經興奮劑)抑制子宮收縮安胎,副作用是「孕婦心搏過速、心悸、血壓變化、血糖升高、肺水腫」與「胎兒心搏過速」。胎兒不是心搏過緩(A錯);宜「左側臥」增子宮胎盤灌流是正確(但本題以B為答);其拮抗是停藥/支持(非Indocin,Indocin是前列腺素抑制劑用於其他)。","options":{"A":"胎兒可能「心搏過速」(非過緩)。","B":"孕婦會心搏過速，但血壓多「下降」(β興奮劑血管擴張)，非升高，故錯。","C":"正確。鼓勵左側臥增加子宮胎盤血液灌流。","D":"其拮抗劑/處理與本敘述不符。"},"sources":["新文京《產科護理學》Yutopar","心搏過速"]}},"104100-N4-7":{"quick":"胎盤結構及功能正確的是「胎盤母體面含基底蛻膜,呈粗糙暗紅色;胎兒面被羊膜覆蓋呈光滑灰色」(A)。","detail":{"background":"胎盤「母體面(基底蛻膜)」粗糙、分葉、暗紅;「胎兒面」被羊膜覆蓋而光滑、可見臍帶與血管。重量約「500~600公克(約胎兒的1/6)」(非800~1500/1/3);胎盤交換是「氣體營養廢物」而「不交換紅血球/球蛋白」(分子大);胎盤分泌的是hCG/雌激素/黃體素等(前列腺素非其主要分娩功能描述)。","options":{"A":"正確。母體面粗糙暗紅、胎兒面羊膜覆蓋光滑。","B":"錯。胎盤約500~600克、約胎兒1/6(非800~1500/1/3)。","C":"錯。胎盤不交換紅血球/球蛋白(分子大)。","D":"胎盤主要分泌hCG/雌激素/黃體素(非以前列腺素為主)。"},"sources":["新文京《產科護理學》胎盤","母體面"]}},"104100-N4-32":{"quick":"RU486的墮胎原理是「黃體素」的拮抗劑(B)。","detail":{"background":"RU486(mifepristone)是「黃體素(progesterone)拮抗劑」,阻斷黃體素使子宮內膜剝落、妊娠終止,常配合前列腺素加強子宮收縮。它非動情素、前列腺素或hCG的拮抗劑。","options":{"A":"動情素(雌激素)非RU486拮抗對象。","B":"正確。RU486是黃體素拮抗劑。","C":"前列腺素是配合使用(非拮抗對象)。","D":"hCG非RU486拮抗對象。"},"sources":["新文京《產科護理學》RU486","黃體素"]}},"104100-N4-34":{"quick":"經前緊張症候群(PMS)引發的相關因素錯誤的是「泌乳素過低」(B)。","detail":{"background":"PMS與「雌激素/黃體素不平衡、前列腺素過多、泌乳素過高、血清素變化、缺鎂維生素B6、生活壓力」有關;「泌乳素過低」與PMS不符(若有相關多為偏高),故B錯誤。","options":{"A":"正確。雌激素與黃體素不平衡。","B":"錯誤(本題答案)。PMS與泌乳素過低不符(相關多為偏高)。","C":"正確。前列腺素過多。","D":"正確。嚴重生活壓力。"},"sources":["新文京《婦科》PMS","泌乳素"]}},"105030-N4-39":{"quick":"導致經前症候群(PMS)的可能因素正確的是「前列腺素過多」(C)。","detail":{"background":"PMS可能因素:前列腺素過多(致痙攣疼痛)、雌激素與黃體素不平衡、血清素變化、缺鈣鎂維生素B6、壓力。「缺鈉維生素B6」敘述不當(是缺鎂/B6非鈉);非缺泌乳素;非血管加壓素減少,故C正確。","options":{"A":"是缺鎂/B6(非缺鈉)的敘述不當。","B":"PMS非以缺泌乳素為因(多偏高)。","C":"正確。前列腺素過多是PMS可能因素。","D":"血管加壓素減少非PMS主因。"},"sources":["新文京《婦科》PMS","前列腺素"]}},"105030-N4-77":{"quick":"橫膈疝氣(Diaphragmatic hernia)臨床表徵與醫療措施錯誤的是「當嬰兒呈現呼吸窘迫現象時應立即以甦醒球(Ambu bag)擠壓急救」(C)。","detail":{"background":"橫膈疝氣腹腔臟器進入胸腔壓迫肺,「禁用面罩甦醒球(Ambu bag)正壓通氣」(會把空氣灌入胃腸使其更脹、更壓迫肺),應「插氣管內管」通氣,故C錯誤。其餘正確:插鼻胃管減壓胃腸、胸腔聽到腸蠕動聲聽不到呼吸聲、X光見胸腔內充氣腸道與塌陷的肺。","options":{"A":"正確。插鼻胃管以減輕胃腸壓力。","B":"正確。胸腔聽見腸蠕動聲、聽不到呼吸聲。","C":"錯誤(本題答案)。禁用面罩甦醒球(灌氣入腸更壓肺),應插管通氣。","D":"正確。X光見胸腔內充氣腸道與塌陷的肺。"},"sources":["新文京《兒科護理學》橫膈疝氣","禁Ambu"]}},"105030-N4-79":{"quick":"1歲熱性痙攣出院護理指導不恰當的是「高燒時,可提供酒精拭浴以降低體溫」(A)。","detail":{"background":"兒童發燒「禁用酒精拭浴」(酒精經皮吸收/吸入中毒、寒顫致體溫反彈),應溫水拭浴與依醫囑退燒,故A不恰當。其餘恰當:抽搐時側臥維持呼吸道通暢、移除床上易致傷害物品、發作時勿強塞物品入口。","options":{"A":"不恰當(本題答案)。發燒禁用酒精拭浴(中毒/寒顫反彈)。","B":"恰當。抽搐時協助側臥維持呼吸道通暢。","C":"恰當。痙攣時移除易致傷害的物品。","D":"恰當。發作時不可強塞物品入口。"},"sources":["新文京《兒科護理學》熱性痙攣","禁酒精"]}},"105090-N4-36":{"quick":"口服黃體素治療月經量過多的主要目的＝維持/穩定卵巢週期與子宮內膜，使內膜規則剝落、減少出血(本題官方答案C)。","detail":{"background":"功能性子宮出血(月經量過多)常因無排卵使子宮內膜過度增生,口服黃體素可「轉化/穩定並抑制子宮內膜過度增生」、減少出血量。它非增加子宮收縮、非抑制前列腺素(那是NSAID)、非維持卵巢濾泡期。","options":{"A":"非以增加子宮收縮為目的。","B":"抑制前列腺素是NSAID(非黃體素)。","C":"正確(本題官方答案)。黃體素維持卵巢週期功能、穩定子宮內膜。","D":"黃體素是「穩定/轉化」子宮內膜(分泌期)，非「抑制其形成」。"},"sources":["新文京《婦科》黃體素","子宮內膜"]}},"105090-N4-39":{"quick":"54歲咳嗽或大笑時滲尿,可能的問題是「壓力性尿失禁」(A)。","detail":{"background":"壓力性尿失禁是「腹壓增加(咳嗽、打噴嚏、大笑、運動)時不自主漏尿」,因骨盆底鬆弛/尿道閉鎖不全,多見於停經與多產婦女。滿溢性是膀胱過脹漏出、急迫性是強烈尿意急著漏、混合性是合併壓力與急迫。","options":{"A":"正確。咳嗽大笑(增腹壓)時漏尿=壓力性尿失禁。","B":"滿溢性是膀胱過脹溢出。","C":"急迫性是強烈尿意伴急漏。","D":"混合性是合併壓力與急迫(此例單純壓力性)。"},"sources":["新文京《基本護理學》尿失禁","壓力性"]}},"105090-N4-71":{"quick":"32週1500g早產兒口胃管餵食正確的是「灌食速度要緩慢,約5 mL/5~10分鐘,以預防胃部過度膨脹」(C)。","detail":{"background":"早產兒口胃管餵食應「緩慢(約5mL/5~10分鐘)」防胃過脹與逆流。插入長度由「鼻尖經耳垂至劍突」(非加到肚臍中點);插管「不嗆不發紺也不能完全確認未入氣管」(須反抽胃液/聽診確認,非僅憑無嗆咳);餵食後採「右側臥、頭抬高」(非左側),故C正確。","options":{"A":"長度由鼻尖經耳垂至劍突(非加到肚臍中點)。","B":"無嗆咳不能完全確認位置(須反抽胃液確認)。","C":"正確。緩慢灌食約5mL/5~10分鐘防胃過脹。","D":"餵食後採右側臥頭抬高(非左側)。"},"sources":["新文京《兒科護理學》口胃管","緩慢"]}},"105090-N4-77":{"quick":"9歲裘馨氏假肥大性肌失養症護理指導不適當的是「避免讓王小弟游泳,以防溺水意外之發生」(B)。","detail":{"background":"裘馨氏肌失養症應「鼓勵適度運動(尤游泳,水中浮力減關節負荷、維持肌力與關節活動)」延緩攣縮,不應避免游泳,故B不適當。其餘適當:鼓勵活動避免攣縮變形、家中加裝輔助設施防意外、每日胸腔物理治療預防肺炎(呼吸肌無力)。","options":{"A":"適當。鼓勵體能活動避免肢體攣縮變形。","B":"不適當(本題答案)。應鼓勵游泳(浮力維持肌力,在監護下)。","C":"適當。家中添加輔助設施減少意外。","D":"適當。每日胸腔物理治療預防肺炎。"},"sources":["新文京《兒科護理學》裘馨氏","游泳"]}},"105090-N4-80":{"quick":"14歲疑似腦膜炎、咳嗽且顱內壓升高,照護措施正確的是「攝取高纖維食物,以避免便秘」(D)。","detail":{"background":"顱內壓升高者應避免便秘(用力解便會增加顱內壓),故「高纖飲食預防便秘」正確。應採「頭部抬高30度」(非屈膝仰臥);「避免叩擊背部與抽痰刺激」(會增顱內壓);「避免誘發用力咳嗽」(增顱內壓),故D正確。","options":{"A":"錯。應頭抬高30度(非屈膝仰臥)。","B":"錯。避免背部叩擊(會增顱內壓)。","C":"錯。避免誘發用力咳嗽(增顱內壓)。","D":"正確。高纖維食物避免便秘(防用力增顱內壓)。"},"sources":["新文京《兒科護理學》IICP","高纖"]}},"106111-N4-7":{"quick":"不是胎兒造血器官的是「胰臟」(D)。","detail":{"background":"胎兒造血部位依序為「卵黃囊(早期)→肝臟、脾臟(中期)→骨髓(後期至出生後主要)」。胰臟是消化與內分泌器官,非造血器官,故D。","options":{"A":"是。卵黃囊(胚胎早期造血)。","B":"是。肝臟(胎兒中期主要造血)。","C":"是。骨髓(胎兒後期至出生後造血)。","D":"不是(本題答案)。胰臟非造血器官。"},"sources":["新文京《兒科護理學》造血","胰臟非"]}},"106111-N4-66":{"quick":"預防鐮刀狀細胞貧血危機錯誤的是「定期輸注全血」(D)。","detail":{"background":"鐮刀細胞貧血危機的預防是「多喝水(防脫水致鐮變血栓)、預防與及早治療感染(防組織缺氧)、避免缺氧與寒冷、臥床減少耗氧」;治療嚴重貧血/危機時是輸「濃縮紅血球」而非「定期輸全血」(全血含過多血漿與成分、易致循環負荷與鐵過載),故D錯誤。","options":{"A":"正確。多飲水預防血栓(防鐮變)。","B":"正確。呼吸道感染立即治療,預防組織缺氧。","C":"正確。臥床休息減少體力消耗(耗氧)。","D":"錯誤(本題答案)。非定期輸全血(危機時輸濃縮紅血球)。"},"sources":["新文京《兒科護理學》鐮刀細胞","輸RBC"]}},"109030-N4-25":{"quick":"RU486(mifepristone)臨床治療錯誤的是「在懷孕6週前服用,成功率最高」(B)?——本題答B。","detail":{"background":"本題官方答案為B。RU486藥物流產的適用與成功率以「懷孕7週(49天)內」最高,題目「6週前成功率最高」的敘述被判定不正確(時程表述不符法規/仿單)。其餘正確:是黃體素拮抗劑須醫師處方、可帶藥回家服用須1~2週回診確認、與前列腺素合併成功率約95%。","options":{"A":"正確。是黃體素拮抗劑,須醫師開立處方。","B":"錯誤(本題答案)。適用以懷孕7週(49天)內(非6週前表述)。","C":"正確。可帶藥回家服用,須1~2週內回診檢查。","D":"正確。與前列腺素合併使用成功率可達95%。"},"sources":["新文京《產科護理學》RU486","7週"]}},"109110-N4-74":{"quick":"腸套疊(intussusception)臨床表徵正確的是「解草莓果醬般大便」(B)。","detail":{"background":"腸套疊典型:陣發性腹痛(嬰兒突然尖叫蜷曲)、嘔吐、「草莓/紅醋栗果醬般血便」、右上腹香腸狀腫塊。「咳嗽梗塞發紺」是氣管食道瘻管/異物(非腸套疊);腫塊在「右上腹」(非左下腹);暗茶色尿是膽道/肝膽問題(非腸套疊)。","options":{"A":"咳嗽梗塞發紺是TEF/異物(非腸套疊)。","B":"正確。解草莓/紅醋栗果醬般血便。","C":"腫塊在右上腹(非左下象限)。","D":"暗茶色尿是膽道問題(非腸套疊)。"},"sources":["新文京《兒科護理學》腸套疊","果醬便"]}},"110030-N4-79":{"quick":"5個月水腦症為預防顱內壓升高,護理措施不適當的是「術後每2小時協助叩擊與抽痰,以預防吸入性肺炎」(C)。","detail":{"background":"顱內壓升高/腦室引流術後應「避免叩擊與抽痰刺激」(會增加顱內壓),故C不適當。其餘適當:觀察囟門鼓脹/噴射狀嘔吐(IICP徵象)、抬高床頭30~45度降腦壓、給安撫奶嘴減少哭泣(哭鬧增顱內壓)。","options":{"A":"適當。觀察囟門鼓脹或噴射狀嘔吐(IICP徵象)。","B":"適當。抬高床頭30~45度降低腦內壓。","C":"不適當(本題答案)。避免叩擊抽痰刺激(會增顱內壓)。","D":"適當。給安撫奶嘴減少哭泣不安(防增顱內壓)。"},"sources":["新文京《兒科護理學》水腦IICP","避叩擊"]}},"110110-N4-46":{"quick":"自閉症類群障礙症(ASD)身心表徵錯誤的是「動作協調困難」(B)。","detail":{"background":"ASD核心症狀是「社交互動與溝通障礙、固著重複的行為/興趣」,具體表現如孤立人際互動、堅持固定習慣玩法、語言溝通障礙。「動作協調困難」是發展協調障礙(DCD)的特徵,非ASD核心診斷準則,故B錯誤。","options":{"A":"是。孤立的人際互動(社交障礙)。","B":"錯誤(本題答案)。動作協調困難非ASD核心表徵。","C":"是。堅持固定的習慣或玩法(固著行為)。","D":"是。語言和溝通能力障礙。"},"sources":["新文京《兒科護理學》自閉症","社交固著"]}},"111030-N4-58":{"quick":"嬰兒猝死症候群(SIDS)的預防措施最不適當的是「小於3個月的嬰兒,最好與父母同床睡眠」(D)。","detail":{"background":"預防SIDS建議「同房不同床(分床睡)」,與父母同床會增加悶壓、過熱與窒息風險,故D最不適當。其餘適當:仰睡、嬰兒床避免鬆軟物件/枕頭棉被、奶嘴不懸掛於頸部或衣物上(防勒)。","options":{"A":"適當。嬰兒睡眠建議仰睡。","B":"適當。嬰兒床避免放置鬆軟物件。","C":"適當。奶嘴不懸掛於頸部或衣物上(防勒)。","D":"最不適當(本題答案)。應同房不同床(同床增窒息風險)。"},"sources":["新文京《兒科護理學》SIDS","分床"]}},"111030-N4-80":{"quick":"10歲腦膜炎、顱內壓增高(IICP)護理措施不適當的是「執行背部扣擊或抽痰,以利呼吸道通暢」(D)。","detail":{"background":"顱內壓增高者應「避免叩擊、抽痰、頭低姿勢」(這些會增加顱內壓),故D不適當。其餘適當:監測便秘(用力解便增腦壓)、監測噴射式嘔吐與認知改變(IICP徵象)、避免頭低腳高的姿位引流。","options":{"A":"適當。監測有無便秘(用力解便會增腦壓)。","B":"適當。監測噴射式嘔吐、認知改變(IICP徵象)。","C":"適當。避免頭低腳高的姿位引流。","D":"不適當(本題答案)。避免背部叩擊抽痰(會增顱內壓)。"},"sources":["新文京《兒科護理學》IICP","避叩擊"]}},"111110-N4-23":{"quick":"各種避孕方法作用原理正確的是「陰道避孕環可抑制排卵,使子宮頸黏液變黏稠而產生避孕效果」(D)。","detail":{"background":"陰道避孕環釋放雌激素與黃體素,「抑制排卵、使子宮頸黏液變黏稠、子宮內膜不利著床」避孕。迷你丸(純黃體素)主要使「子宮頸黏液變黏稠、內膜變薄」(非致發炎);子宮內避孕器是使「子宮內膜產生無菌性發炎干擾著床」(銅IUD)(非使黏液變黏);避孕貼片是「荷爾蒙抑制排卵」(非產生前列腺素),故D正確。","options":{"A":"迷你丸主要使子宮頸黏液變黏稠(非子宮內膜發炎)。","B":"子宮內避孕器是內膜無菌性發炎干擾著床(非使黏液變黏)。","C":"避孕貼片是荷爾蒙抑制排卵(非產生前列腺素)。","D":"正確。陰道避孕環抑制排卵、使子宮頸黏液變黏稠。"},"sources":["新文京《產科護理學》避孕","陰道環"]}},"112030-N4-38":{"quick":"打噴嚏、咳嗽、大笑引起無法自主控制的漏尿,屬「壓力性尿失禁」(C)。","detail":{"background":"壓力性尿失禁是「腹壓突然增加(咳嗽、打噴嚏、大笑、提重物)時不自主漏尿」,因尿道閉鎖機制不足/骨盆底鬆弛。急迫性是強烈尿意伴急漏、姿勢性與腹壓增加機制不同、滿流性是膀胱過脹溢出。","options":{"A":"急迫性是強烈尿意伴急漏(非腹壓誘發)。","B":"姿勢性尿失禁機制不同。","C":"正確。腹壓增加(咳嗽大笑)誘發漏尿=壓力性尿失禁。","D":"滿流性是膀胱過脹溢出。"},"sources":["新文京《基本護理學》尿失禁","壓力性"]}},"114100-N4-20":{"quick":"妊娠糖尿病母親所產新生兒常見合併症錯誤的是「高血鈣」(B)。","detail":{"background":"妊娠糖尿病母親的新生兒常見「低血糖(高胰島素)、低血鈣(非高血鈣)、紅血球增多症、高膽紅素血症、巨嬰、呼吸窘迫症候群(胰島素延遲肺成熟)」。故「高血鈣」錯誤(應是低血鈣)。","options":{"A":"是合併症。低血糖(胎兒高胰島素)。","B":"錯誤(本題答案)。是低血鈣(非高血鈣)。","C":"是合併症。紅血球增多症。","D":"是合併症。呼吸窘迫症候群(胰島素延遲肺成熟)。"},"sources":["新文京《兒科護理學》糖尿病母嬰","低血鈣"]}}},TO=["1呼吸系統解剖生理與評估", "2上呼吸道疾病", "3氣喘", "4細支氣管炎", "5肺炎與囊性纖維化", "6新生兒早產兒呼吸窘迫", "7胸腔物理治療氧療抽痰", "8先天性心臟病分類與非發紺型", "9法洛氏四重症", "10充血性心衰竭與毛地黃", "11心導管檢查與胎兒循環", "12母嬰產科與其他借題"],LEC={"1呼吸系統解剖生理與評估":{"html":"<p><b>兒童呼吸道特徵</b>:鼻腔狹小黏膜易腫;<b>耳咽管(歐氏管)短、寬、水平</b>→易中耳炎;喉頭位置較高、會厭軟骨大→易吸入性肺炎;肋骨水平、呼吸肌弱→<b>腹式呼吸</b>、年齡越小呼吸越快;胸腔順應性高(胸壁軟易凹陷)。</p><p><b>評估</b>:先測呼吸(觀腹部起伏)<b>完整1分鐘</b>→脈搏(<2歲心尖脈,左鎖骨中線第3~4肋間)→體溫。脈衝式血氧SaO2正常<b>95~100%</b>,感應部位需定期更換。</p>"},"2上呼吸道疾病":{"html":"<p><b>哮吼croup</b>:副流感病毒、6月~3歲、<b>狗吠咳嗽、聲音沙啞、吸氣性喘鳴(stridor)</b>;冷霧/噴霧、勿抽吸刺激喉部。<b>會厭炎</b>:Hib、高燒流口水坐姿前傾、<u>禁壓舌板/咽喉檢查/抽痰</u>、備插管急救。</p><p><b>中耳炎</b>:歐氏管短寬水平、拉扯耳朵發燒;鼓膜破裂流膿後痛緩;反覆致乳突炎。滴耳藥<b>3歲以下向下向後/以上向上向後</b>拉、患耳朝上側臥。<b>扁桃腺術後</b>:側臥利引流、<b>頻繁吞嚥/清喉嚨=出血徵象</b>、<u>禁用力咳嗽/熱食/酸性飲料</u>、給冰涼布丁冰淇淋。流鼻血:頭前傾、捏鼻翼、勿吞血。</p>"},"3氣喘":{"html":"<p><b>氣喘</b>:慢性發炎,過敏原→<b>IgE↑、嗜伊紅球↑</b>;病理=黏膜水腫+<b>平滑肌收縮</b>→<b>呼氣性喘鳴(wheeze)</b>、吐氣延長;嚴重→<b>呼吸性酸中毒</b>。檢查:<b>FEV1/FVC>80%正常</b>;PEFR綠燈≥80%/黃燈50~80%/紅燈<50%。</p><p><b>藥物</b>:短效β2緩解用、<b>吸入型類固醇(ICS,Flixotide)保養不可自停</b>、吸後漱口;<b>幼兒MDI+面罩式aerochamber</b>(乾粉吸入劑適5歲以上)。居家:避布織/絨毛、寢具熱水週洗、可游泳等有氧運動、不限制運動。</p>"},"4細支氣管炎":{"html":"<p><b>細支氣管炎</b>:<b>RSV最常見</b>、好發1歲以內冬春、飛沫接觸傳染;流鼻水咳嗽喘鳴呼吸喘,嚴重→<b>呼吸性酸中毒</b>;診斷取<b>鼻咽分泌物RSV抗原</b>;治療支持(氧氣、補水、抽痰),Ribavirin、RSV免疫球蛋白(palivizumab)預防高危嬰兒。氧氣頭罩濕化用<b>無菌蒸餾水</b>。</p>"},"5肺炎與囊性纖維化":{"html":"<p><b>肺炎</b>:細菌性(高燒痰多黏稠、<b>傳染力低</b>)、病毒性(傳染力高);<b>黴漿菌</b>好發學齡兒、漸進乾咳痰少、<b>用erythromycin/azithromycin</b>(無細胞壁β-lactam無效)。噴霧目的=稀痰/濕潤/擴張支氣管(非增表面張力)。</p><p><b>囊性纖維化</b>:體染色體隱性、痰黏稠、補胰酵素+脂溶性維生素、高熱量高蛋白多水分;<u>禁止咳劑/抗組織胺(痰更難排)</u>。</p>"},"6新生兒早產兒呼吸窘迫":{"html":"<p><b>首次呼吸</b>:產道擠壓排肺液+冷/化學刺激;<b>剖腹產</b>較易短暫呼吸窘迫。<b>表面張力素</b>降低肺泡表面張力、防<b>呼氣時肺泡塌陷</b>,約34~35週足。<b>RDS</b>:缺表面張力素→肺塌陷,X光毛玻璃樣、<b>呼吸性酸中毒</b>;補表面張力素(氣管內)、氧療(SpO2約90~95%)、CPAP(4~7cmH2O)、產前類固醇給母親。</p><p><b>胎便吸入(MAS)</b>:<b>足月/過熟兒</b>子宮內缺氧;<b>SIDS</b>仰睡、<u>同房不同床</u>;早產兒問題:腦室內出血、ROP(氧過高)、NEC、呼吸暫停。</p>"},"7胸腔物理治療氧療抽痰":{"html":"<p><b>CPT順序</b>:噴霧→<b>姿位引流(重力,痰肺節在最高處)</b>→叩擊(<b>杯狀手、墊薄布勿拍裸露皮膚、避脊椎、每部位1~2分鐘</b>)→抽痰;時機餐前或餐後1~2小時。<b>抽痰</b>:<10秒、嬰幼兒壓力60~100mmHg、放入不加壓抽出旋轉、前後給氧、順序鼻→口。</p><p><b>氧療</b>:氧氣頭罩流量>5L/min(防CO2滯留)、<b>濕化用無菌蒸餾水</b>;氧氣帳高濃度(40~60%)高濕度低溫、集中護理、<u>禁放電動玩具(火花)</u>、氧濃度儀放口鼻處。</p>"},"8先天性心臟病分類與非發紺型":{"html":"<p><b>分類</b>:非發紺型(左→右/阻塞)=<b>VSD、ASD、PDA、主動脈狹窄</b>;發紺型(右→左)=<b>法洛、TGA、三尖瓣閉鎖(4T)</b>。<b>PDA</b>:連續機械性雜音、寬脈壓;足月12週內多自閉;<b>早產兒PDA用Indomethacin關閉</b>(注意尿量),發紺型用<b>PGE1維持導管開放增肺血流</b>。</p><p><b>主動脈狹窄</b>:上肢血壓>下肢、頭痛、下肢脈弱冰冷。<b>TGA</b>:發紺、紅血球增多、PGE1維持混合血。ASD多無發紺、1歲內半數自閉。風濕熱查<b>ASLO↑</b>。</p>"},"9法洛氏四重症":{"html":"<p><b>法洛(TOF,發紺型)四特徵</b>:①<b>肺動脈狹窄(決定發紺嚴重度)</b>②VSD③主動脈跨位④右心室肥厚;<b>右→左分流</b>致發紺、杵狀指、紅血球增多。</p><p><b>缺氧發作(blue spell)</b>:哭鬧/餵食/排便/早晨突發發紺,<b>採膝胸臥姿/蹲踞</b>(膝向腹)→<b>增體循環阻力、減右→左分流、增肺血流、減下肢回心血量</b>;給氧、必要時嗎啡。治療:Blalock-Taussig分流→完全矯正。毛地黃中毒=厭食噁心嘔吐+心搏過慢。</p>"},"10充血性心衰竭與毛地黃":{"html":"<p><b>CHF嬰兒</b>:<b>心搏過快(代償非變慢)</b>、奔馬律、肝腫大水腫、肺水腫呼吸快、四肢冰冷盜汗、<b>血壓正常或偏低(非高血壓)</b>;處置毛地黃+利尿劑+限鈉+半坐臥+少量多餐。</p><p><b>毛地黃</b>:給藥前測<b>心尖脈1分鐘</b>(嬰<90~100/幼兒<70暫停)、飯前1h或飯後2h、勿與奶/果汁混、<b>漏服未超6小時可補(超過略過)</b>、補鉀。Propranolol注意心搏過慢;<b>Spironolactone保鉀→高血鉀</b>;Furosemide低血鉀。</p>"},"11心導管檢查與胎兒循環":{"html":"<p><b>心導管</b>:檢查前禁食4~6h、<b>毛地黃暫停</b>、用遊戲/繪本(具體);檢查後<b>穿刺肢體平直不可彎曲</b>、砂袋加壓、臥床4~6h、觀察末端脈搏顏色溫度與對側比較、<b>清醒後即可進食(不需等排氣)</b>。可測壓力/含氧飽和度/血流,<b>不測電傳導(那是心電圖)</b>。</p><p><b>含氧飽和度</b>:肺靜脈/左心/主動脈95~98%(動脈血最高)、腔靜脈/右心/肺動脈70~75%。<b>胎兒循環</b>:臍靜脈(含氧高)→靜脈導管→下腔→右心房→<b>卵圓孔→左心房(右→左)</b>;右心室→肺動脈→<b>動脈導管→主動脈</b>;出生後肺擴張、左心房壓>右心房→卵圓孔關、血氧升→動脈導管關。</p>"},"12母嬰產科與其他借題":{"html":"<p><b>顱內壓(IICP)升高</b>:抬高床頭30度、高纖防便秘、<u>避免叩擊/抽痰/頭低姿位引流/用力咳嗽(增IICP)</u>;高滲透壓利尿劑緩慢輸注。</p><p><b>其他</b>:橫膈疝氣<u>禁面罩甦醒球正壓</u>(腸氣脹更壓肺)、應插管;熱性痙攣<u>禁酒精拭浴</u>;腸套疊<b>草莓果醬便+右上腹香腸狀腫塊</b>;SIDS同房不同床;登革熱<u>禁aspirin</u>;GDM新生兒<b>低血糖低血鈣</b>;吸菸產生<b>一氧化碳</b>影響胎兒供氧;RU486是黃體素拮抗劑;壓力性尿失禁=咳嗽大笑漏尿。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
