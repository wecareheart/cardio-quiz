"Tinel’s Sign Test"},"img":""},{"id":"110030-N3-21","code":"110030","roc":"110","cat":"N3","catname":"內外科護理學","num":21,"stem":"下列何者為費林氏測驗(Phalen’s test)陽性反應的描述?","opts":{"A":"雙手維持手腕掌側屈曲、手背相對60 秒,手指感到麻木","B":"敲擊正中神經,手指感到刺痛、麻木感","C":"緊握足踝做內旋,再慢慢伸直,無法伸直膝關節","D":"手握腳底做內外旋動作,聽到關節內有聲響"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"system_code":"S9","system_name":"肌肉骨骼","topic":"M12肌肉骨骼評估理學檢查與腕隧道症候群","topic_code":"M12","q_num":21,"roc_year":"110","exam_code":"110030","src":"民國110年","options":{"A":"雙手維持手腕掌側屈曲、手背相對60 秒,手指感到麻木","B":"敲擊正中神經,手指感到刺痛、麻木感","C":"緊握足踝做內旋,再慢慢伸直,無法伸直膝關節","D":"手握腳底做內外旋動作,聽到關節內有聲響"},"img":""},{"id":"111030-N3-18","code":"111030","roc":"111","cat":"N3","catname":"內外科護理學","num":18,"stem":"有關腕隧道症候群的敘述,下列何者正確?","opts":{"A":"是指腕部正中神經受到壓迫所造成的現象","B":"主要發生在男性,以50~60 歲居多","C":"臨床症狀是疼痛且腕部無法伸直","D":"可藉由膨脹徵象(Bulge sign)與霍曼氏徵象(Homan’s sign)確定診斷"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"system_code":"S9","system_name":"肌肉骨骼","topic":"M12肌肉骨骼評估理學檢查與腕隧道症候群","topic_code":"M12","q_num":18,"roc_year":"111","exam_code":"111030","src":"民國111年","options":{"A":"是指腕部正中神經受到壓迫所造成的現象","B":"主要發生在男性,以50~60 歲居多","C":"臨床症狀是疼痛且腕部無法伸直","D":"可藉由膨脹徵象(Bulge sign)與霍曼氏徵象(Homan’s sign)確定診斷"},"img":""},{"id":"112030-N3-19","code":"112030","roc":"112","cat":"N3","catname":"內外科護理學","num":19,"stem":"有關腕隧道症候群病人之身體檢查評估結果,下列何者正確?","opts":{"A":"湯瑪斯試驗(Thomas test)陽性反應","B":"浮動試驗(ballottement test)陽性反應","C":"麥默雷氏試驗(McMurray’s test)陽性反應","D":"費林氏徵象(Phalen’s sign)陽性反應"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"system_code":"S9","system_name":"肌肉骨骼","topic":"M12肌肉骨骼評估理學檢查與腕隧道症候群","topic_code":"M12","q_num":19,"roc_year":"112","exam_code":"112030","src":"民國112年","options":{"A":"湯瑪斯試驗(Thomas test)陽性反應","B":"浮動試驗(ballottement test)陽性反應","C":"麥默雷氏試驗(McMurray’s test)陽性反應","D":"費林氏徵象(Phalen’s sign)陽性反應"},"img":""},{"id":"114030-N3-12","code":"114030","roc":"114","cat":"N3","catname":"內外科護理學","num":12,"stem":"有關肌肉骨骼系統身體檢查評估結果之敘述,下列何者正確?","opts":{"A":"湯瑪斯試驗(Thomas test)陽性反應表示病人對側髖關節攣縮","B":"浮動試驗(Ballottement test)陽性表示病人膝半月板有損傷","C":"抽拉試驗(Drawer test)若能將小腿向後牽引6mm表示副韌帶鬆弛","D":"廷內爾氏徵象(Tinel’s sign)陽性反應表示後十字韌帶鬆弛"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"system_code":"S9","system_name":"肌肉骨骼","topic":"M12肌肉骨骼評估理學檢查與腕隧道症候群","topic_code":"M12","q_num":12,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"湯瑪斯試驗(Thomas test)陽性反應表示病人對側髖關節攣縮","B":"浮動試驗(Ballottement test)陽性表示病人膝半月板有損傷","C":"抽拉試驗(Drawer test)若能將小腿向後牽引6mm表示副韌帶鬆弛","D":"廷內爾氏徵象(Tinel’s sign)陽性反應表示後十字韌帶鬆弛"},"img":""}],E={"101110-N3-73":{"quick":"椎板切除術後背架是暫時性輔助(約3~6個月),非「永遠」穿戴,故A錯誤。","detail":{"background":"椎間盤突出(Herniated Intervertebral Disc, HIVD)好發於活動度大、承重最重的下頸椎(C5-C7)與下腰椎(L4-L5、L5-S1)。當髓核(nucleus pulposus)經破裂的纖維環(annulus fibrosus)突出壓迫神經根,腰椎部位會造成沿坐骨神經分布的下背痛輻射至臀部、大腿後側、小腿(坐骨神經痛)。椎板切除術(laminectomy)/椎間盤切除術後護理重點:①維持脊椎正中對齊,翻身採「圓滾木翻身法(log rolling)」整體一起翻,避免脊椎扭轉;②睡「硬板床」維持脊椎支撐;③下床前先在床上穿好背架,背架提供暫時性外固定與支撐,通常穿戴3~6個月待傷口與骨融合穩定後即可漸停,並非終身穿戴;④避免彎腰、提重物、久坐久站;⑤教導正確身體力學與威廉氏運動(Williams flexion exercise)強化腹背肌。","options":{"A":"正解(錯誤敘述)。背架為暫時性支撐(約3~6個月),非永遠穿戴。","B":"圓滾木翻身可維持脊椎對齊,避免扭轉受傷,正確。","C":"睡硬板床維持脊椎支撐,為正確指導。","D":"避免彎腰可減少椎間盤與傷口壓力,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"103030-N3-6":{"quick":"直舉腿(SLR)試驗才會牽扯坐骨神經引發疼痛;「大腳趾試驗」測的是L5肌力,C敘述張冠李戴故錯誤。","detail":{"background":"椎間盤突出好發於男性、勞力工作者,以下頸椎與下腰椎最常見。腰椎椎間盤突出(L4-L5/L5-S1)壓迫坐骨神經根,疼痛沿大腿後側、小腿外後側向下放射(坐骨神經痛);頸椎椎間盤突出則疼痛由肩膀放射至手臂、手部並伴感覺異常。診斷理學檢查中,「直舉腿試驗(straight leg raising test, Lasègue sign)」是將下肢伸直抬高,牽扯坐骨神經,陽性者在30~70度即誘發下背及下肢放射痛,是腰椎椎間盤突出的重要徵象。題目C的「大腳趾試驗(大腳趾背屈力量)」評估的是L5神經根的運動功能(伸拇長肌肌力),並非藉牽扯坐骨神經誘發疼痛,故C敘述錯誤。","options":{"A":"椎間盤突出好發男性、勞力者,常見於頸椎及腰椎,正確。","B":"腰椎突出疼痛沿坐骨神經向大腿後側放射,正確。","C":"正解(錯誤敘述)。牽扯坐骨神經誘痛的是直舉腿試驗;大腳趾試驗測L5肌力。","D":"頸椎突出疼痛由肩膀延伸至手臂手部,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"104030-N3-19":{"quick":"下背痛應避免趴睡(會增加腰椎前凸與背部張力),宜仰臥屈膝或側臥,故C錯誤。","detail":{"background":"下背痛(low back pain)多與腰椎退化、椎間盤突出或姿勢不良有關,腰椎間盤突出時可出現沿坐骨神經放射至大腿小腿後方的尖銳疼痛。護理指導重點:①睡「硬板床」維持脊椎支撐,姿勢採仰臥屈膝(膝下墊枕,減少腰椎前凸)或側臥屈膝,避免「趴睡(俯臥)」——俯臥會使腰椎過度前凸、增加背肌與小面關節張力而加重疼痛;②急性期適度休息、之後漸進活動;③強化腹肌與背肌(如威廉氏屈曲運動)穩定脊椎;④維持理想體重、正確搬抬姿勢(屈膝蹲下、物品貼近身體);⑤避免久坐久站與彎腰提重物。","options":{"A":"睡硬板床維持脊椎支撐,可減輕疼痛,正確。","B":"腰椎間盤突出會有放射至大腿小腿後方的尖銳痛,正確。","C":"正解(錯誤敘述)。趴睡增加腰椎前凸與背部張力,應避免;宜仰臥屈膝。","D":"強化背肌腹肌可穩定脊椎、減少復發,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"107110-N3-1":{"quick":"背架不可穿著洗澡(會弄濕變形且皮膚需清潔評估),故B錯誤。","detail":{"background":"腰椎椎間盤突出術後依醫囑穿戴背架(brace)約6個月,提供脊椎外固定支撐。護理指導:①穿背架前先穿一件薄棉內衣,保護皮膚、吸汗、避免背架直接摩擦;②在床上先穿好背架再下床,維持脊椎對齊;③洗澡時可暫時取下背架(背架不可碰水,會變形、潮濕引發皮膚問題,且需趁機評估與清潔皮膚);④避免坐太軟太深的沙發,選擇椅背平直有扶手的椅子;⑤觀察背架邊緣皮膚有無壓紅破損。故「穿著背架洗澡」是錯誤指導。","options":{"A":"先穿薄內衣再穿背架可保護皮膚,正確。","B":"正解(錯誤敘述)。洗澡時應取下背架,不可穿背架洗澡。","C":"在床上穿好背架再下床維持脊椎對齊,正確。","D":"避免坐太軟太深的沙發,減少腰椎壓力,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"108110-N3-2":{"quick":"椎板切除術後背架需戴3~6個月,僅睡覺與洗澡時取下,B正確。","detail":{"background":"腰椎椎板切除術(laminectomy)後護理:①早期(視醫囑)即可在背架保護下漸進下床活動,並非絕對臥床3日;②背架提供脊椎支撐,穿戴約3~6個月,「只有睡覺(臥床有床支撐)及洗澡時可取下」,其餘下床活動時都應穿戴;③出院後仍須避免彎腰、提重物、久坐久站,不可立即恢復正常活動;④睡「硬板床」而非柔軟床鋪(軟床使脊椎下陷、失去支撐、加重疼痛);⑤採圓滾木翻身、正確身體力學、漸進強化腹背肌。故B為正確敘述。","options":{"A":"術後通常在背架保護下早期漸進下床,非絕對臥床3日,錯誤。","B":"正解。背架戴3~6個月,僅睡覺及洗澡時取下。","C":"出院後仍須限制彎腰提重物,不可立即恢復正常活動,錯誤。","D":"應睡硬板床而非柔軟床鋪,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"109030-N3-80":{"quick":"背架是下床活動時的脊椎支撐,不應每兩小時取下,故C錯誤。","detail":{"background":"腰椎椎間盤突出術後穿硬背架約3個月。護理指導:①可教導威廉氏運動(Williams flexion exercise)在傷口癒合後漸進強化下背與腹部肌力、穩定脊椎;②拆線後可沐浴,以「淋浴」為宜(避免泡澡浸濕傷口);③背架在「下床活動」時都應穿戴以支撐脊椎、限制過度彎曲扭轉,「不應每兩小時取下讓背部休息」——臥床時因有床面支撐可取下,但活動時需持續穿戴;④下床前先在床上穿好背架。故C為錯誤敘述。","options":{"A":"威廉氏運動可加強下背肌力,正確。","B":"拆線後可淋浴,正確。","C":"正解(錯誤敘述)。下床活動時應持續穿背架,不可每兩小時取下。","D":"在床上穿好背架後再下床,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111030-N3-3":{"quick":"直舉腿試驗陽性者在抬高至70度前即誘發放射痛、無法伸展到90度,故B錯誤。","detail":{"background":"腰椎椎間盤突出俗稱「下背痛」,疼痛沿坐骨神經向臀部、大腿後側、小腿放射,咳嗽、提重物、彎腰、久站久坐(增加椎間盤內壓)都會加劇。診斷:①「直舉腿試驗(SLR)」陽性者抬高患肢至30~70度即誘發下背及下肢放射痛,因坐骨神經受牽扯而疼痛,「無法」伸展到90度,故B「可伸展到90度」為錯誤;②可合併Kernig sign陽性(屈髖後伸膝受阻且劇痛)。神經學檢查可見受壓神經根對應的感覺、肌力、反射改變。","options":{"A":"疼痛向臀部、大腿後側、小腿放射,正確。","B":"正解(錯誤敘述)。SLR陽性在70度前即誘痛,無法伸展到90度。","C":"Kernig sign陽性會在伸小腿時有阻力與劇痛,正確。","D":"咳嗽、提重物、彎腰、久站久坐都會加劇疼痛,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111110-N3-3":{"quick":"傷口癒合後可做威廉氏運動加強下背肌力,B正確。","detail":{"background":"椎間盤突出手術方式:①傳統椎板切除/椎間盤切除術;②微創經皮內視鏡椎間盤切除術(percutaneous endoscopic discectomy)——傷口小、組織損傷少、出血少、住院時間短,通常不需住院一週以上。術後護理:傷口癒合後可進行「威廉氏屈曲運動(Williams flexion exercise)」漸進強化下背及腹部肌力以穩定脊椎(B正確);穿背架前先穿「薄」內衣(非厚內衣,以免悶熱與支撐不貼合);術後活動須漸進、避免彎腰提重物,不可二週即恢復原活動型態。","options":{"A":"內視鏡椎間盤切除術住院時間短,非需住院一週以上,錯誤。","B":"正解。傷口癒合後可做威廉氏運動加強下背肌力。","C":"背架內應穿薄內衣,非厚內衣,錯誤。","D":"術後活動須漸進,不可二週即恢復原活動型態,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111110-N3-8":{"quick":"內視鏡椎間盤切除術適用於單純椎間盤突出,不適用於嚴重位移或脊椎滑脫,故C錯誤。","detail":{"background":"內視鏡椎間盤切除術(endoscopic discectomy)為微創手術:①可採局部麻醉;②傷口小、局部組織損傷少、可減少硬腦膜撕裂與術後沾黏;③手術及住院時間均較傳統開放手術短、恢復快。其適應症為「單純的椎間盤突出壓迫神經根」,「不適用」於嚴重椎間盤位移、脊椎不穩定或脊椎滑脫(spondylolisthesis)等需要更大範圍減壓或融合固定的病況,這類病人應採傳統手術或脊椎融合固定術,故C為錯誤敘述。","options":{"A":"可採用局部麻醉,正確。","B":"傷口小、局部損傷少、減少硬腦膜撕裂,正確。","C":"正解(錯誤敘述)。嚴重椎間盤位移或脊椎滑脫不適用內視鏡切除,須開放或融合手術。","D":"手術及住院時間均比傳統手術短,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"112110-N3-1":{"quick":"脊椎術後應避免俯臥與睡高枕(會使脊椎彎曲),故C錯誤。","detail":{"background":"腰椎椎板切除術後護理:①使用中硬度床墊維持脊椎正常排列;②背架使用3~6個月,下床時須穿著,只有洗澡時可取下;③姿勢應維持脊椎「正中對齊」,「避免俯臥及睡高枕」——俯臥使腰椎過度前凸、睡高枕使頸/脊椎彎曲,都會破壞脊椎中立位、增加傷口與神經張力,故C為錯誤;宜仰臥膝下墊枕或側臥屈膝;④可在可耐受範圍進行俯臥抬頭、抬腿等背肌強化運動(屬復健運動,與「持續俯臥睡姿」不同),並採圓滾木翻身。","options":{"A":"中硬度床墊維持脊椎排列,正確。","B":"背架使用3~6個月、下床穿著、洗澡可取下,正確。","C":"正解(錯誤敘述)。術後應避免俯臥及睡高枕,以免脊椎彎曲。","D":"可進行俯臥抬頭、抬腿之背肌運動,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"112180-N3-4":{"quick":"脊椎術後解便應採圓滾木翻身並用「扁平(骨折)便盆」,使用一般便盆需抬臀彎曲脊椎故B錯誤。","detail":{"background":"脊椎手術後48小時內護理重點:①密切評估神經功能改變,尤其四肢的感覺與運動功能(判斷有無神經損傷或血腫壓迫);②採用「中硬度床墊」維持脊椎排列;③注意傷口有無腦脊髓液(CSF)滲漏(清澈液體、暈染halo徵象、頭痛);④翻身與解便都要採「圓滾木翻身(log rolling)」維持脊椎一直線。解便時應使用「扁平的骨折便盆(fracture bedpan)」,因一般便盆較高,放置時須病人抬臀、屈曲脊椎,易造成脊椎扭轉與傷口張力,故B「使用一般便盆」為錯誤。","options":{"A":"評估四肢感覺運動功能可早期發現神經損傷,正確。","B":"正解(錯誤敘述)。應採圓滾木翻身並用扁平骨折便盆,非一般便盆。","C":"中硬度床墊維持脊椎排列,正確。","D":"注意傷口有無腦脊髓液滲漏,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"113030-N3-13":{"quick":"骨盆牽引時抬高床尾,利用體重產生反牽引力可增加牽引效果,B正確。","detail":{"background":"骨盆牽引(pelvic traction)是治療下背痛的「皮膚牽引(非骨骼牽引)」:以骨盆帶束於髂嵴上,連接重錘向足端拉,藉牽引拉開腰椎間隙、減輕神經根壓迫與肌肉痙攣。原則:①屬皮膚牽引(A錯,非骨骼牽引);②為產生足夠「反牽引力(countertraction)」,常將「床尾(足側)抬高」,使病人身體因重力略向頭端滑,提供反向拉力以維持有效牽引(B正確);③維持身體於床正中、保持牽引繩與重錘自由懸空不受阻;④骨盆牽引重量通常較輕(約體重的1/7左右,非1/2)。膝、第二腳趾、滑輪成一直線的對位原則主要用於下肢直線牽引。","options":{"A":"骨盆牽引屬皮膚牽引,非骨骼牽引,錯誤。","B":"正解。抬高床尾利用體重產生反牽引力,可增加牽引效果。","C":"此對位描述屬下肢直線牽引,非骨盆牽引重點,且非最佳答案。","D":"骨盆牽引拉力通常較輕,非達體重1/2,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"101030-N3-39":{"quick":"血管翳(pannus)是類風濕性關節炎(RA)滑膜增生侵蝕關節的病變,非退化性關節炎,故B錯誤。","detail":{"background":"退化性關節炎(骨性關節炎, Osteoarthritis, OA)是「關節軟骨退化磨損」為主的非發炎性病變,病理變化包括:關節軟骨破壞變薄、軟骨下骨硬化、關節邊緣骨質增生形成「骨贅(osteophyte)/骨刺(spur)」、遠端指間關節(DIP)的希伯登氏結節(Heberden’s nodes)與近端指間關節(PIP)的蒲夏氏結節(Bouchard’s nodes)。而「血管翳(pannus)」是「類風濕性關節炎(RA)」的特徵:發炎的滑膜過度增生形成富含血管與發炎細胞的肉芽組織,侵蝕軟骨與骨,造成關節破壞與變形;OA並不會形成pannus,故B為退化性關節炎「不會」出現的病理變化。","options":{"A":"蒲夏氏結節為OA近端指間關節骨質增生,正確的OA病變。","B":"正解(錯誤敘述)。血管翳(pannus)是RA的滑膜增生病變,非OA。","C":"骨贅是OA關節邊緣骨質增生,正確。","D":"骨刺(spur)即骨贅,為OA病變,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"101110-N3-69":{"quick":"退化性關節炎的紅血球沉降速率(ESR)為「正常」,不會「下降」,故D敘述錯誤。","detail":{"background":"手部退化性關節炎臨床表徵:①關節僵硬通常在清晨或休息一段時間後出現,但時間「短暫(<30分鐘)」、活動後即緩解(與RA清晨僵硬常>1小時不同);②遠端指間關節(DIP)出現「希伯登氏結節(Heberden’s nodes)」,近端指間關節(PIP)出現蒲夏氏結節;③關節活動時因軟骨磨損粗糙而出現「輾軋音(crepitus)」;④OA為「非發炎性」退化病變,發炎指標如紅血球沉降速率(ESR)、C反應蛋白(CRP)多在「正常」範圍。題目D稱「ESR會下降」不正確——OA的ESR是正常(既非升高也非下降),故為錯誤敘述。","options":{"A":"OA僵硬於清晨或休息後出現(但短暫),正確。","B":"遠端指間關節出現Heberden’s nodes,正確。","C":"軟骨磨損會出現輾軋音,正確。","D":"正解(錯誤敘述)。OA的ESR為正常,不會下降。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"104030-N3-20":{"quick":"骨性關節炎是與老化、關節磨損有關的「非發炎性」退化病變,B正確。","detail":{"background":"骨性關節炎(OA)的核心:①病因非自體免疫(自體免疫為RA),而是與年齡老化、肥胖、關節過度使用或外傷有關的「機械性軟骨磨損退化」;②屬「非發炎性」關節病變(雖可有續發輕度滑膜反應,但非原發性免疫發炎);③主要病理是「軟骨破壞、變薄、消失」而非滑液過多;④好發於「負重關節」(膝、髖、脊椎)及手部DIP/PIP。故B「與老化有關的非發炎性關節病變」正確;A(自體免疫)是RA;C(滑液過多致破壞)因果顛倒;D應是破壞「負重」關節而非非負重關節。","options":{"A":"自體免疫機轉是RA的病因,非OA,錯誤。","B":"正解。OA為與老化有關的非發炎性退化病變。","C":"OA是軟骨破壞為主,非滑液過多所致,因果顛倒,錯誤。","D":"OA好發於「負重」關節,非非負重關節,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"106030-N3-18":{"quick":"希伯登氏結節出現在「遠端指間關節」,不在膝關節,故C錯誤。","detail":{"background":"退化性關節炎臨床表徵:①受損關節可有少量「液體積存(關節積液)」;②關節邊緣骨質「增生反應」形成骨贅;③好發於膝、髖、脊椎等「負重關節」與手指關節;④「希伯登氏結節(Heberden’s nodes)」是手「遠端指間關節(DIP)」的骨性結節,而非「膝關節」;膝關節OA的表徵是疼痛、僵硬、輾軋音、骨贅與關節間隙變窄。故C「膝關節處會形成希伯登氏結節」屬部位錯置,為錯誤敘述。","options":{"A":"OA關節腔內可有少量液體積存,正確。","B":"關節邊緣骨質增生(骨贅),正確。","C":"正解(錯誤敘述)。希伯登氏結節在遠端指間關節,非膝關節。","D":"好發於膝、髖等負重關節,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"107110-N3-18":{"quick":"關節僵硬時整天站立會加重負重關節負荷,屬錯誤認知、需再指導,故B。","detail":{"background":"骨性關節炎病人衛教成效評值:①OA是「局部、非炎症性」的退化關節病變(A正確認知);②使用手杖、助行器可分擔背部與髖、膝關節負重壓力(C正確);③以「溫水浴/熱敷」緩解晨間僵硬與疼痛(D正確,熱可放鬆肌肉、增加血流);④應「平衡休息與活動」,避免關節過度負重與長時間維持同一姿勢。題目B「關節僵硬時試著整天站立」會持續壓迫負重關節、加重磨損與疼痛,屬「錯誤認知」,顯示需進一步護理指導,故為答案。","options":{"A":"OA是局部非炎症性關節病變,認知正確。","B":"正解(需再指導)。整天站立加重關節負重,是錯誤觀念。","C":"用手杖可緩解背部及髖關節壓力,認知正確。","D":"溫水浴可緩解晨間僵硬,認知正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"108110-N3-17":{"quick":"OA建議的運動是低衝擊的等張/有氧(如游泳、騎車)及關節活動度運動,「日常活動只採等長運動」不適當,故C。","detail":{"background":"退化性關節炎護理指導:①急性發炎期可「冰敷」減輕炎症與疼痛(A適當,慢性僵硬期則用熱敷);②使用aspirin/NSAID止痛應「避免空腹」以減少腸胃刺激(B適當);③「鼓勵減重」以減輕膝、髖負重關節負荷(D適當);④運動原則為「低衝擊的等張/有氧運動(游泳、騎腳踏車、水中運動)+關節活動度運動+肌力訓練」,維持關節活動與肌力。選項C主張日常活動「儘量採等長運動」以減少負重——這會過度限制關節活動、導致僵硬與肌肉萎縮,且OA的運動處方核心是「低衝擊等張有氧」而非以等長取代日常活動,故C不適當。","options":{"A":"急性發炎期冰敷減輕炎症疼痛,適當。","B":"aspirin避免空腹服用減少腸胃刺激,適當。","C":"正解(不適當)。OA宜低衝擊等張/有氧運動,不應以等長運動取代日常活動。","D":"減重減輕膝關節負荷,適當。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"109030-N3-17":{"quick":"退化性關節炎是局部關節病變,不影響其他系統(無全身性表現),B正確。","detail":{"background":"退化性關節炎(OA)與類風濕性關節炎(RA)的最大區別在「全身性」:OA是「局部、非全身性」的退化病變,「不會」影響其他器官系統,無發燒、倦怠、貧血、血管炎等全身表現,也不會合併乾燥症(Sjögren)。相對地,RA是「全身性自體免疫疾病」,可有全身倦怠、發燒、體重減輕、貧血、皮下結節、血管炎(致腳趾壞死、小腿潰瘍)、肺纖維化、合併乾燥症等關節外表現。故本題正確敘述為B(OA不影響其他系統);A、C、D所述乾燥症、血管炎、全身症狀皆為RA等全身性疾病的特徵。","options":{"A":"合併乾燥症為RA等自體免疫病的關節外表現,非OA,錯誤。","B":"正解。OA是局部病變,不影響其他系統。","C":"血管炎致腳趾壞死、小腿潰瘍是RA的關節外表現,非OA,錯誤。","D":"倦怠、發燒、貧血是全身性疾病(如RA)的表現,非OA,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"109030-N3-19":{"quick":"中年肥胖、ESR正常、晨僵短暫(活動數分鐘即緩解)最符合骨性關節炎,故B。","detail":{"background":"本題鑑別:55歲、BMI 30(肥胖)、ESR正常、「晨間關節疼痛僵硬,活動幾分鐘即緩解」。①骨性關節炎(OA):好發中老年、肥胖,晨僵「短暫(<30分鐘,常數分鐘)、活動後緩解」,發炎指標(ESR/CRP)正常——完全符合,故選B。②類風濕性關節炎(RA):晨僵常「>1小時」、ESR/CRP升高、對稱小關節侵犯、有全身症狀。③乾癬性關節炎:伴皮膚乾癬、指甲變化。④痛風:急性紅腫熱痛、尿酸高。故最符合者為骨性關節炎。","options":{"A":"乾癬性關節炎伴皮膚乾癬病灶,本題無,不符。","B":"正解。中年肥胖、ESR正常、晨僵短暫即緩解,符合骨性關節炎。","C":"RA晨僵常>1小時且ESR升高,與本題ESR正常不符。","D":"痛風為急性紅腫熱痛發作、尿酸升高,不符。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"109110-N3-18":{"quick":"OA為退化性病變,X光呈骨贅形成與關節腔(間隙)變窄,B正確。","detail":{"background":"骨性關節炎的診斷檢查:①「X光」是主要影像診斷,典型表現為「關節間隙(腔)變窄、骨贅(osteophyte)形成、軟骨下骨硬化(sclerosis)、軟骨下囊腫」——B正確;②OA為非發炎/非自體免疫病變,故抗核抗體(ANA,A)、C反應蛋白(CRP,C)多正常,ANA升高見於SLE,CRP升高見於發炎性關節炎;③OA的關節滑液為「非發炎性」——清澈、黏稠度高、白血球數低;而「混濁、黏性低、蛋白增加、白血球高」是發炎性/感染性關節炎(如RA、化膿性關節炎)的滑液,故D錯誤。","options":{"A":"ANA升高見於SLE,非OA診斷依據,錯誤。","B":"正解。X光呈骨贅形成及關節腔變窄,為OA典型表現。","C":"CRP上升見於發炎性關節炎,OA多正常,錯誤。","D":"混濁低黏性高蛋白滑液屬發炎性關節炎,OA滑液為清澈高黏性,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"109110-N3-19":{"quick":"肥胖(BMI高)、重複關節受傷、停經後婦女皆為OA高危險群;長期類固醇主要致骨質疏鬆,故選134(C)。","detail":{"background":"退化性關節炎高危險因子:①肥胖(BMI高,如35 kg/m²):增加負重關節機械負荷,是膝OA重要危險因子(①是);②重複性關節受傷史(如反覆右膝外傷):軟骨累積損傷致退化(③是);③停經後婦女:雌激素下降、軟骨保護減少,加上年齡,OA風險上升(④是)。而「②長期服用腎上腺皮質類固醇」主要造成的是「骨質疏鬆、缺血性骨壞死」,並非退化性關節炎的典型危險因子。故OA高危險群為1、3、4,答案C(134)。","options":{"A":"123含類固醇(②),類固醇主要致骨鬆非OA,錯誤。","B":"124含類固醇(②),錯誤。","C":"正解。1肥胖+3重複受傷+4停經後婦女皆為OA高危險群。","D":"234含類固醇(②)且缺①肥胖,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"110030-N3-19":{"quick":"希伯登氏結節(遠端指間關節骨性結節)是OA的臨床表徵,故A。","detail":{"background":"骨性關節炎(OA)臨床表徵以「局部、機械性」為主:疼痛(活動加重、休息緩解)、短暫晨僵、輾軋音、關節腫大變形,手部出現「希伯登氏結節(Heberden’s nodes,遠端指間關節)」與蒲夏氏結節(近端指間關節)——故A正確。其餘為其他疾病特徵:B「發燒」是全身性發炎/感染表現,OA無;C「尺側偏斜(ulnar deviation)」是類風濕性關節炎(RA)的掌指關節變形;D「Felty’s症候群(RA+脾腫大+白血球低下)」是RA的關節外表現。故OA表徵選A。","options":{"A":"正解。希伯登氏結節為OA遠端指間關節表徵。","B":"發燒為全身性發炎/感染表現,OA無,錯誤。","C":"尺側偏斜是RA的掌指關節變形,非OA。","D":"Felty’s症候群是RA的關節外表現,非OA。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111110-N3-18":{"quick":"慢跑屬高衝擊負重運動,會加重OA負重關節磨損,故為不適合(錯誤)的運動,選A。","detail":{"background":"骨性關節炎的運動原則是「低衝擊、減少負重關節衝擊」以維持關節活動度與肌力又不加重磨損:適合「水中有氧運動、游泳(浮力減負重)、騎腳踏車(非負重、活動膝關節)、平地走路」等低衝擊運動。「慢跑(jogging)」屬於高衝擊、反覆撞擊負重關節(膝、髖)的運動,會增加軟骨磨損、加重疼痛與退化,故為「不適合」的運動,本題選A為錯誤(不適合)選項。運動處方亦應搭配股四頭肌等肌力訓練以穩定關節。","options":{"A":"正解(不適合)。慢跑為高衝擊負重運動,加重OA關節磨損。","B":"水中有氧運動低衝擊,適合OA。","C":"騎腳踏車為非負重、低衝擊運動,適合OA。","D":"平地走路屬低衝擊運動,適合OA。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"112030-N3-30":{"quick":"中年男性、X光見關節間隙減少及骨贅形成,是骨性關節炎的典型,故D。","detail":{"background":"本題鑑別各選項屬何種關節炎:A「雙手尺側偏移及天鵝頸變形」是類風濕性關節炎(RA)的典型手部變形;B「全身倦怠、肌肉痠痛、發燒、體重減輕」是全身性發炎疾病(如RA或結締組織病)的表現;C「30歲女性、對稱性關節侵犯」是RA的特徵(年輕女性、對稱);D「40歲男性、X光顯示關節間隙減少及骨贅形成」正是骨性關節炎(OA)的影像特徵(關節間隙變窄+骨贅)。故符合骨性關節炎的症狀徵象為D。","options":{"A":"尺側偏移與天鵝頸變形是RA手部變形,非OA。","B":"全身倦怠發燒體重減輕是全身性發炎病表現,非OA。","C":"年輕女性對稱性關節侵犯為RA特徵,非OA。","D":"正解。X光關節間隙減少及骨贅形成是OA典型影像。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"113180-N3-11":{"quick":"單側膝、晨僵熱敷可改善、上下樓有輾軋音,最符合退化性關節炎,故B。","detail":{"background":"本題:60歲女性、「左側」膝關節晨間僵硬、「熱敷後可改善」、上下樓梯有「輾軋音(crepitus)」。①退化性關節炎(OA):好發中老年負重關節(膝)、常單側或不對稱、晨僵短暫且熱敷/活動後改善、軟骨磨損致輾軋音——完全符合,選B。②骨質疏鬆症:以骨密度下降、易骨折為主,無典型關節僵硬輾軋音。③RA:多為對稱性小關節、晨僵長(>1小時)、有全身症狀。④痛風:急性紅腫熱痛發作、尿酸高。故最可能診斷為退化性關節炎。","options":{"A":"骨質疏鬆以骨密度下降易骨折為主,無關節輾軋僵硬,不符。","B":"正解。單側膝、晨僵熱敷改善、輾軋音符合退化性關節炎。","C":"RA為對稱多關節、晨僵>1小時,與本題單膝不符。","D":"痛風為急性紅腫熱痛發作,不符。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"113180-N3-12":{"quick":"退化性關節炎宜做低衝擊「等張」運動如騎腳踏車、游泳,故A最適宜。","detail":{"background":"承上題(退化性關節炎)護理措施:①最適宜的運動是「低衝擊的等張/有氧運動,如騎腳踏車、游泳」——可維持關節活動度與肌力又不增加負重關節衝擊(A正確);②B「Plaquenil(奎寧類,hydroxychloroquine)」是治療RA/SLE的疾病修飾抗風濕藥(DMARD),非OA用藥;③C「避免高嘌呤食物(內臟、肉汁)」是「痛風」的飲食指導,與尿酸有關,非OA;④D「負重運動如散步、跑步」中跑步屬高衝擊會加重膝關節磨損(散步可,但跑步不宜),故不是最適宜。綜合最適宜為A。","options":{"A":"正解。等張低衝擊運動(騎車、游泳)適合退化性關節炎。","B":"Plaquenil用於RA/SLE,非OA用藥,錯誤。","C":"避免高嘌呤是痛風飲食指導,非OA,錯誤。","D":"跑步屬高衝擊會加重膝關節磨損,不適宜。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"101030-N3-41":{"quick":"高蛋白會增加尿鈣排出、高纖會結合鈣質而「降低」鈣吸收,故D錯誤。","detail":{"background":"骨質疏鬆症(osteoporosis)是骨密度下降、骨微結構破壞致易骨折的疾病。預防護理指導:①攝取足量鈣質(成人約1000~1200 mg/日),「乳製品、小魚乾、豆製品、深綠色蔬菜」是良好鈣質來源(A正確);②藥物如抑鈣素(calcitonin,可經鼻噴或非腸道注射)抑制蝕骨細胞、減少骨流失(B正確);③規律「負重運動(走路、慢跑、重量訓練)」刺激成骨、增加骨密度(C正確);④搭配維生素D與日曬促進鈣吸收。但「高蛋白」會增加尿鈣排泄、「高纖」食物會在腸道結合鈣質而「減少」鈣吸收,故D「高蛋白高纖促進鈣吸收」為錯誤敘述。","options":{"A":"乳製品提供鈣質,正確。","B":"抑鈣素可非腸道(注射)給予,抑制骨流失,正確。","C":"規律負重運動增加骨密度,正確。","D":"正解(錯誤敘述)。高蛋白增加尿鈣、高纖結合鈣質,反降低鈣吸收。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"102030-N3-22":{"quick":"雙磷酸鹽類是「抑制蝕骨細胞」減少骨吸收,並非刺激成骨細胞成熟,故D錯誤。","detail":{"background":"骨質疏鬆症藥物依機轉分兩大類:①「抑制骨吸收(抗骨流失)」:降鈣素(calcitonin)抑制蝕骨細胞活性、雌激素、選擇性雌激素受體調節劑(SERM)、以及「雙磷酸鹽類(bisphosphonates)」——後者抑制「蝕骨細胞(osteoclast)」活性與促其凋亡,「減少骨吸收」;②「促進骨生成」:副甲狀腺素類似物(teriparatide,間歇性給予可增加成骨細胞數目與活性)、氟化鈉(促骨骼形成)。故D「雙磷酸鹽刺激成骨細胞成熟」描述錯誤——其作用對象是蝕骨細胞(抑制),而非成骨細胞(刺激)。","options":{"A":"降鈣素抑制蝕骨細胞、抑制骨量流失,正確。","B":"副甲狀腺素(間歇給予)增加成骨細胞數目活性,正確。","C":"氟化鈉可促進骨骼形成,正確。","D":"正解(錯誤敘述)。雙磷酸鹽是抑制蝕骨細胞減少骨吸收,非刺激成骨細胞。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"102110-N3-74":{"quick":"骨質疏鬆最易骨折部位為脊椎、腕部(橈骨遠端)、髖部,故A。","detail":{"background":"骨質疏鬆症因骨量減少、骨脆性增加,在輕微外力下即易發生「脆性骨折(fragility fracture)」。最常見的三大好發部位是:①「脊椎(椎體)」——壓迫性骨折,造成駝背、身高變矮、背痛;②「腕部(橈骨遠端,Colles’氏骨折)」——跌倒時手撐地所致;③「髖部(股骨頸/轉子間)」——老年人跌倒,死亡率與失能率高。故答案為A(脊椎、腕部、髖部)。腳踝、膝、肩、鎖骨等非骨質疏鬆典型骨折部位。","options":{"A":"正解。脊椎、腕部、髖部為骨質疏鬆三大好發骨折部位。","B":"含頸部,非典型骨鬆骨折部位,錯誤。","C":"含膝蓋、腳踝,非典型,錯誤。","D":"含肩部、鎖骨,非典型,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"104030-N3-21":{"quick":"規律的負重運動可刺激成骨、增加骨密度,是最適當的預防措施,故A。","detail":{"background":"預防骨質疏鬆的核心:①「規律負重運動(weight-bearing exercise,如走路、慢跑、重量訓練)」藉機械應力刺激成骨細胞、增加骨密度,是最適當措施(A正確);②鈣質攝取應達「每日約1000~1200 mg」而非僅250 mg(B量太少);③有益骨骼的是富含鈣與維生素D的食物(乳品、小魚乾、深綠色蔬菜),「紅黃色蔬菜」主要提供維生素A/β-胡蘿蔔素,與補鈣無直接關係(C不對);④「飲酒」過量反而抑制成骨、增加骨流失與跌倒風險,不應鼓勵(D不對)。故最適當為A。","options":{"A":"正解。規律負重運動增加骨密度,最適當。","B":"每日250 mg鈣量不足(應約1000~1200 mg),錯誤。","C":"紅黃色蔬菜非補鈣重點,錯誤。","D":"飲酒反增骨流失與跌倒風險,不應鼓勵,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"105090-N3-19":{"quick":"雄性激素具保護骨質作用,「分泌增加」不會導致骨質疏鬆,故D錯誤。","detail":{"background":"荷爾蒙與骨代謝:①「副甲狀腺素(PTH)分泌增加(如副甲狀腺機能亢進)」會促進蝕骨、釋出鈣,長期致骨質流失(A正確);②「降血鈣素(calcitonin)分泌減少」則少了抑制蝕骨的作用,骨流失增加(B正確);③「動情素(雌激素)分泌減少」(如停經後)會使蝕骨活性增加、骨快速流失,是停經後骨質疏鬆主因(C正確);④「雄性激素(androgen)」對骨骼具「保護」作用,可促進骨形成、維持骨密度,故「雄性激素分泌增加」「不會」導致骨質疏鬆(反而是雄性激素「不足」才致骨鬆),故D為錯誤敘述。","options":{"A":"副甲狀腺素增加促進蝕骨、致骨流失,正確。","B":"降血鈣素減少,抑制蝕骨作用減弱,致骨流失,正確。","C":"動情素(雌激素)減少是停經後骨鬆主因,正確。","D":"正解(錯誤敘述)。雄性激素保護骨質,分泌增加不會致骨鬆。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"106030-N3-21":{"quick":"骨質疏鬆好發脆性骨折於腕、椎、髖部,「踝部」最不常見,故D。","detail":{"background":"老年骨質疏鬆症的脆性骨折好發於「腕部(橈骨遠端Colles’骨折)、脊椎(椎體壓迫性骨折)、髖部(股骨頸/轉子間)」三大部位——這些部位富含海綿骨(代謝活躍、流失快)且承受跌倒衝擊。相對地,「踝部(腳踝)」骨折多與外傷、扭傷機轉有關,並非骨質疏鬆的典型脆性骨折部位,故為「最不常見」者,答案D。","options":{"A":"腕部(Colles’骨折)為骨鬆常見骨折部位。","B":"腰椎(椎體壓迫性骨折)為骨鬆常見部位。","C":"髖部為骨鬆常見且嚴重的骨折部位。","D":"正解。踝部多為外傷性骨折,非骨鬆典型部位,最不常見。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"107030-N3-20":{"quick":"骨質疏鬆背痛(椎體壓迫性骨折)多可因「休息而緩解」,故C敘述錯誤。","detail":{"background":"骨質疏鬆症臨床現象:①早期無症狀,常在「跌倒骨折後」才被診斷出(A正確);②椎體壓迫性骨折累積造成「駝背(駝背畸形kyphosis)、身高變矮」(B正確);③背痛部分——椎體壓迫性骨折的背痛通常在「站立、負重、活動時加重,平躺休息時減輕」,故「無法以休息緩解」為錯誤敘述(C錯);④骨質流失致血鈣與尿鈣變化,可能與泌尿道結石有關(D正確)。故錯誤敘述為C。","options":{"A":"骨鬆常於骨折後才被發現,正確。","B":"駝背、身高減少是椎體壓迫性骨折表現,正確。","C":"正解(錯誤敘述)。骨鬆背痛多可因休息緩解,非無法緩解。","D":"骨鬆相關鈣代謝改變可能與泌尿道結石有關,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"108020-N3-20":{"quick":"葡萄糖胺是用於退化性關節炎軟骨保養,非減緩骨質流失,故D錯誤。","detail":{"background":"骨質疏鬆症與骨密度檢查:①「雙能量X光吸收儀(DXA/DEXA)骨密度檢查」是診斷骨質疏鬆的「主要依據」(T-score ≤ -2.5為骨質疏鬆)(A正確);②「定量超音波(QUS)」測量跟骨等,屬「初步篩檢工具」、無輻射、可攜帶(B正確);③停經後雌激素下降,常造成「脊椎壓迫性骨折」(C正確);④「葡萄糖胺(glucosamine)」是用於「退化性關節炎」幫助軟骨保養的補充品,「並非」用來減緩骨質流失的骨鬆用藥(骨鬆用鈣、維生素D、雙磷酸鹽等),故D為錯誤敘述。","options":{"A":"DXA骨密度檢查為診斷骨鬆主要依據,正確。","B":"定量超音波為骨鬆初步篩檢工具,正確。","C":"停經後骨鬆常致脊椎壓迫性骨折,正確。","D":"正解(錯誤敘述)。葡萄糖胺用於退化性關節炎軟骨,非減緩骨質流失。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"110030-N3-18":{"quick":"30歲男性、偶爾飲酒、BMI 28(過重),骨鬆風險最低,故C。","detail":{"background":"骨質疏鬆危險因子包括:女性、高齡、停經(雌激素低)、長期使用類固醇、低體重、抗癲癇藥(如Dilantin/phenytoin影響維生素D代謝)、制動、吸菸酗酒等。逐項分析:A「67歲女性、停經15年」(高齡+停經,高風險);B「45歲男性、服用腎上腺皮質醇6個月」(類固醇致骨鬆,高風險);C「30歲男性、偶爾飲酒、BMI 28」(年輕、男性、體重較重——較高體重對骨骼有保護機械應力,僅偶爾飲酒,風險最「低」);D「35歲女性、服用Dilantin」(抗癲癇藥影響維生素D致骨鬆風險)。故風險最低者為C。","options":{"A":"高齡停經女性,骨鬆風險高。","B":"長期使用類固醇,骨鬆風險高。","C":"正解。年輕男性、體重較重、僅偶爾飲酒,骨鬆風險最低。","D":"長期服Dilantin影響維生素D,骨鬆風險增加。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"112030-N3-20":{"quick":"多吃小魚乾、豆類補充鈣質是正確認知,故C表示已清楚指導。","detail":{"background":"骨質疏鬆飲食衛教評值:①「高蛋白」會增加尿鈣排泄,不利保鈣(A錯誤認知);②「網球、保齡球」雖屬負重活動,但網球的急停跳躍與保齡球的扭轉、提重對骨鬆者有跌倒與骨折風險,並非首選(B不適宜,應選散步、太極等較安全的負重運動);③「小魚乾、豆類」富含鈣質,是良好補鈣食物(C正確,表示已理解);④「高纖食物」會在腸道結合鈣質而「降低」鈣吸收,故不應與高鈣食物同時大量攝取(D錯誤認知)。故表示已清楚指導內容者為C。","options":{"A":"高蛋白增加尿鈣排泄,屬錯誤認知。","B":"網球、保齡球有跌倒扭傷風險,非首選,不適宜。","C":"正解。小魚乾、豆類補鈣,認知正確。","D":"高纖會結合鈣降低吸收,不應與高鈣同時大量攝取,屬錯誤認知。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"112110-N3-17":{"quick":"負重活動才能刺激成骨強化骨骼,「非負重比負重好」是錯誤,故A。","detail":{"background":"骨質疏鬆症護理指導:①運動應採「負重運動(weight-bearing,如走路、太極)」藉機械應力刺激成骨、維持骨密度,「非負重活動並不優於負重活動」,故A為錯誤敘述;②下床活動可使用骨科支架/背架支撐、減輕脊椎壓迫疼痛(B正確);③每天日曬至少約15分鐘促進皮膚合成維生素D、增加鈣吸收(C正確);④高纖食物會結合鈣質,不宜與高鈣食物同時大量攝取以免影響鈣吸收(D正確)。故錯誤者為A。","options":{"A":"正解(錯誤敘述)。負重活動才能強化骨骼,非負重並不優於負重。","B":"下床用骨科支架支撐減輕疼痛,正確。","C":"每日日曬15分鐘增加維生素D合成,正確。","D":"高纖與高鈣不宜同時大量攝取,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"113100-N3-19":{"quick":"副甲狀腺機能「亢進」才致骨流失;副甲狀腺機能「低下」不是骨鬆危險因子,故C。","detail":{"background":"骨質疏鬆症危險因子:①「卵巢切除」→雌激素驟降,加速骨流失(A是危險因子);②「中風癱瘓長期臥床」→制動使骨缺乏負重應力、加速骨流失(B是危險因子);③「過度飲用咖啡」→咖啡因增加尿鈣排泄,過量是危險因子(D是危險因子);④「副甲狀腺機能『低下』」→PTH分泌不足,蝕骨作用『減弱』,反而傾向「低血鈣、高血磷」,並「不是」骨質疏鬆的危險因子——會致骨鬆的是副甲狀腺機能「亢進」(PTH過多促進蝕骨)。故「不是」危險因子者為C。","options":{"A":"卵巢切除致雌激素下降,是骨鬆危險因子。","B":"長期臥床制動加速骨流失,是危險因子。","C":"正解。副甲狀腺機能「低下」非骨鬆危險因子(亢進才是)。","D":"過量咖啡因增加尿鈣排泄,是危險因子。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"114030-N3-13":{"quick":"日曬與補充維生素D可促進鈣吸收,B正確。","detail":{"background":"骨質疏鬆症處置正確原則:①日曬與攝取維生素D促進腸道鈣吸收與骨鈣化(B正確);②「碳酸鈣(calcium carbonate)」需胃酸幫助溶解,應「隨餐或飯後」服用以增加吸收(A錯,非飯前);③「雙磷酸鹽類(bisphosphonates)」須「空腹、起床後清晨以大量開水配服、服後保持直立30分鐘」以利吸收並避免食道刺激,「不是飯後」服用(C錯);④「副甲狀腺素類似物(teriparatide)」是「皮下注射」劑型,「不是鼻噴劑」(鼻噴劑型的是抑鈣素calcitonin),故D錯。綜合正確為B。","options":{"A":"碳酸鈣應隨餐/飯後服用以利吸收,非飯前,錯誤。","B":"正解。日曬及補充維生素D促進鈣吸收。","C":"雙磷酸鹽應空腹清晨服用並保持直立,非飯後,錯誤。","D":"teriparatide為皮下注射,非鼻噴劑(鼻噴是抑鈣素),錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"114100-N3-11":{"quick":"大量咖啡茶、靜態久臥、日曬不足為骨鬆危險因子(245),停經前與規律運動非危險因子,故C。","detail":{"background":"骨質疏鬆危險因子分析:①「停經『前』婦女」——雌激素仍正常,非危險因子(停經「後」才是);②「攝取大量咖啡、茶」——咖啡因增加尿鈣排泄,是危險因子;③「規律運動」——負重運動增加骨密度,是「保護」因子,非危險因子;④「靜態生活或長期臥床」——制動缺乏負重應力,加速骨流失,是危險因子;⑤「日曬時間不足」——維生素D合成減少、鈣吸收下降,是危險因子。故危險因子為2、4、5,答案C(245)。","options":{"A":"123含①停經前(非危險)、③規律運動(保護因子),錯誤。","B":"134含①③(非危險因子),錯誤。","C":"正解。245(大量咖啡茶、靜態久臥、日曬不足)為危險因子。","D":"345含③規律運動(保護因子),錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","骨質疏鬆症臨床治療指引(中華民國骨質疏鬆症學會)"]}},"102110-N3-13":{"quick":"海綿骨血流豐富、癒合較快,緻密骨癒合「較慢」,故A敘述錯誤。","detail":{"background":"骨折癒合的影響因素:①骨的種類——「海綿骨(cancellous/spongy bone)」血流豐富、表面積大,癒合「較快」;「緻密骨(compact/cortical bone)」血流相對少、結構緻密,癒合「較慢」,故A「緻密骨較海綿骨快」為錯誤;②年齡——兒童代謝旺盛、骨膜活性高,癒合「較老年人快」(B正確);③部位/血流——指骨血流佳癒合快,「橈骨較指骨慢」(C正確);④「適當的制動(固定)」可維持骨折端對位、避免反覆移動干擾癒合(D正確)。其他影響:血液供應、感染、營養、是否有軟組織嵌入等。","options":{"A":"正解(錯誤敘述)。海綿骨血流豐富癒合較快,緻密骨較慢。","B":"兒童骨膜活性高,癒合較老年人快,正確。","C":"橈骨癒合較指骨慢,正確。","D":"適當制動有助維持對位、促進癒合,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"103030-N3-21":{"quick":"受傷關節為「非負重關節」不會延緩癒合,故B。","detail":{"background":"會「延緩骨折癒合」的因素:①「血液供應減少」——血流不足使骨痂生成原料與細胞不足(A會延緩);②「骨碎片不適當的移動」——反覆移位破壞新生骨痂(C會延緩);③「軟組織嵌入骨折處」——阻隔骨端接合(D會延緩);其他如感染、高齡、營養不良、糖尿病、抽菸、類固醇等。而「受傷關節為非負重關節」與癒合快慢無直接負面關係,「不會」延緩癒合,故B為答案。","options":{"A":"血液供應減少使癒合原料不足,會延緩癒合。","B":"正解。非負重關節不會延緩骨折癒合。","C":"骨碎片不當移動破壞骨痂,會延緩癒合。","D":"軟組織嵌入阻隔骨端接合,會延緩癒合。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"106110-N3-17":{"quick":"「6個月仍見骨折線、骨痂緩慢」較符合「延遲癒合」,稱「不癒合」並不精確,故B錯誤。","detail":{"background":"骨折癒合與治療:①成人骨折癒合時間「約10~18週(2~4個月)」(A正確,部位而異);②「復位(reduction)」可將骨折端恢復正常解剖位置(D正確);③術後使用Aircast加壓冷療可消腫止痛(C正確,冷療減少出血腫脹);④癒合異常的名詞辨析:「延遲癒合(delayed union)」指癒合時間「超過預期但仍在進行」、骨痂緩慢、骨折線仍可見;「不癒合(nonunion)」指癒合「完全停止、無進展」(常需手術)。題目B描述「6個月仍見骨折線、骨痂生長緩慢」其實較符合「延遲癒合」,稱為「骨折不癒合」並不精確,故B為錯誤敘述。","options":{"A":"成人骨折癒合約10~18週,正確。","B":"正解(錯誤敘述)。骨痂緩慢、骨折線仍見較屬「延遲癒合」,非「不癒合」。","C":"Aircast加壓冷療可減輕腫脹疼痛,正確。","D":"復位可使骨折端恢復解剖位置,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"106110-N3-18":{"quick":"鈍力挫傷急性期應「冰敷」減少出血腫脹,立即熱敷會加重出血,故A錯誤。","detail":{"background":"軟組織損傷(挫傷、扭傷、拉傷)的處置原則「PRICE」:Protection(保護)、Rest(休息)、Ice(冰敷)、Compression(壓迫)、Elevation(抬高)。①急性期(受傷48~72小時內)應「冰敷」使血管收縮、減少出血與腫脹,「立即熱敷」會使血管擴張、加重出血腫脹,故A為錯誤(應冰敷而非熱敷;熱敷用於亞急性/慢性期促進吸收);②應先X光排除骨折再行PRICE處置(B正確);③可用止痛劑緩解疼痛並漸進式增加活動(C正確);④部分韌帶撕裂以彈性繃帶固定壓迫、預防進一步傷害(D正確)。","options":{"A":"正解(錯誤敘述)。鈍力挫傷急性期應冰敷,立即熱敷會加重出血腫脹。","B":"先X光排除骨折,再用PRICE處置,正確。","C":"可用止痛劑並漸進增加活動,正確。","D":"部分韌帶撕裂用彈繃固定預防再傷害,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"106111-N3-17":{"quick":"患肢(固定中)應做「等長」運動、健肢做主動「等張」運動,題目D前後顛倒故錯誤。","detail":{"background":"預防骨折病人因身體活動障礙(制動)產生合併症:①每2小時深呼吸及咳嗽——預防肺炎、肺擴張不全(A正確);②每天至少做主動全關節活動——預防關節攣縮(B正確);③每天攝水2500~3000 c.c.——預防泌尿道結石與感染、稀釋尿液(C正確);④運動原則:「患肢(石膏/牽引固定中,不能移動關節)」應做「等長收縮運動(isometric,肌肉收縮但關節不動)」維持肌力;「健肢」可做主動「等張運動(isotonic)」與全關節活動。題目D寫成「患肢作等張、健肢作等長」前後顛倒,故為錯誤敘述。","options":{"A":"每2小時深呼吸咳嗽預防肺部合併症,正確。","B":"每天主動全關節活動預防關節攣縮,正確。","C":"每天攝水2500~3000 c.c.預防結石與感染,正確。","D":"正解(錯誤敘述)。應患肢做等長、健肢做等張,題目前後顛倒。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"110110-N3-77":{"quick":"八字(figure-of-eight)繃帶常用於「鎖骨骨折」固定,故D。","detail":{"background":"「八字繃帶法(figure-of-eight bandage)」是繞過雙肩、於背後交叉成「8字形」的固定方式,能將雙肩往後拉、維持鎖骨對位,主要用於「鎖骨骨折(clavicle fracture)」的保守固定(亦稱clavicle strap/鎖骨帶)。前臂手腕骨折用石膏或副木;骨盆骨折以骨盆黏合帶/外固定;股骨骨折以牽引或內固定。故最適合八字繃帶的是鎖骨骨折,答案D。","options":{"A":"前臂手腕骨折用石膏/副木固定,非八字繃帶。","B":"骨盆骨折用骨盆帶或外固定,非八字繃帶。","C":"股骨骨折用牽引或內固定,非八字繃帶。","D":"正解。八字繃帶用於鎖骨骨折固定。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111030-N3-21":{"quick":"骨折癒合順序為血腫→細胞增生→骨痂形成→骨化→重塑,即13524,故B。","detail":{"background":"骨折癒合五階段(順序):①「血腫形成期(hematoma formation)」——骨折端出血形成血腫,提供修復細胞與纖維蛋白網;②「細胞增生期(cellular proliferation,纖維軟骨痂)」——纖維母細胞、成骨細胞增生,形成肉芽與纖維軟骨;③「骨痂形成期(callus formation)」——骨痂橋接骨折端;④「骨化期(ossification)」——骨痂鈣化成硬骨;⑤「重塑期(remodeling)」——多餘骨痂吸收、依應力重塑恢復原形。故正確順序為1→3→5→2→4,即「13524」,答案B。","options":{"A":"12345順序錯誤(骨化排在細胞增生前)。","B":"正解。血腫→細胞增生→骨痂形成→骨化→重塑(13524)。","C":"23145順序錯誤。","D":"54321為相反順序,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111110-N3-76":{"quick":"骨折到院前急救最優先是「固定骨折部位」以防再傷害,故C。","detail":{"background":"骨折到院前急救處理:在確保ABC(呼吸道、呼吸、循環)與止血後,針對骨折本身的「最優先」處置是「固定(immobilization)」患肢——以副木、夾板固定骨折部位及其上下關節,防止骨折端移動造成神經血管二度損傷、減輕疼痛與出血。「不可」在現場貿然「復位」(B,易造成血管神經損傷,屬醫療處置)、急救時不宜「熱敷」(D,會增加出血腫脹,應冰敷),止痛(A)非最優先。故最優先處置為固定,答案C。","options":{"A":"疼痛處理非最優先,應先固定。","B":"現場不可貿然復位,以免神經血管損傷。","C":"正解。固定骨折部位防止再傷害,為最優先。","D":"熱敷會加重出血腫脹,且非急救優先。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"113030-N3-11":{"quick":"骨痂形成期應補充足夠營養以利骨痂生成,C正確。","detail":{"background":"骨折癒合各階段照護:①「血腫形成期、細胞增生期(早期)」骨折端尚未穩定,患肢應「制動、避免移動」,「不宜」做等張(關節活動)運動以免破壞新生組織(A、B錯;此期患肢可做等長收縮維持肌力);②「骨痂形成期」骨痂正在橋接，需「充足營養(蛋白質、鈣、維生素C/D)」以提供骨痂生成原料(C正確);③「鞏固化與再塑造期(remodeling)」雖骨折癒合,但「仍需」漸進負重與運動,依Wolff定律使骨依應力重塑、恢復肌力與功能,「並非不需運動」(D錯)。故正確為C。","options":{"A":"血腫形成期患肢應制動,不宜做等張運動,錯誤。","B":"細胞增生期患肢仍應制動,不宜等張運動,錯誤。","C":"正解。骨痂形成期應補充足夠營養以利骨痂生成。","D":"再塑造期仍需漸進運動使骨重塑,並非不需運動,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"101110-N3-68":{"quick":"脂肪栓塞是多重(長骨)骨折釋出脂肪球進入血流所致,A正確。","detail":{"background":"脂肪栓塞症候群(Fat Embolism Syndrome, FES):①病因——「多發性骨折或長骨(尤其股骨)骨折」時,骨髓腔內脂肪球與脂肪球蛋白釋入血流,栓塞肺、腦等微血管(A正確);②時間——多在骨折後「24~72小時(常24~48小時)」「快速」發生,並非緩慢72小時後才出現(B錯);③臨床——以「呼吸窘迫(低血氧)、神經症狀(意識混亂)、皮膚瘀斑(petechiae)、發燒、心搏過速」為主,並非心絞痛(C錯);④好發於「長骨/骨盆骨折、年輕男性」,與高血容積無關(D錯)。故正確為A。","options":{"A":"正解。脂肪栓塞是多重(長骨)骨折釋出脂肪球蛋白所致。","B":"多在24~72小時內快速發生,非緩慢72小時後,錯誤。","C":"造成的是呼吸窘迫與神經症狀,非心絞痛,錯誤。","D":"好發於長骨骨折,與高血容積無關,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"103100-N3-19":{"quick":"多發性骨折後2天突發意識混亂、呼吸困難、發燒,最可能是脂肪栓塞症候群,故B。","detail":{"background":"本題:多發性骨折病人「兩天後」突發「意識混亂、呼吸困難、發燒38.5°C」——這是脂肪栓塞症候群(FES)的典型三聯徵:呼吸窘迫(低血氧)、神經症狀(意識改變)、皮膚瘀斑/發燒,好發於長骨或多發骨折後24~72小時。①低血容積性休克(A)會有低血壓、心搏過速、皮膚濕冷,但不會以發燒、意識混亂為主;②無菌性壞死(C)是慢性缺血性骨壞死,非急性;③血栓性栓塞(深部靜脈栓塞/肺栓塞,D)雖也致呼吸困難,但發燒+意識混亂+多發骨折背景最符合脂肪栓塞。故選B。","options":{"A":"低血容積休克以低血壓、心搏過速為主,不以發燒意識混亂為主,不符。","B":"正解。多發骨折後呼吸困難、意識混亂、發燒符合脂肪栓塞症候群。","C":"無菌性壞死為慢性缺血骨壞死,非急性,不符。","D":"血栓性栓塞不會以發燒、意識混亂為主要表現。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"104030-N3-34":{"quick":"脂肪栓塞最常見於「長骨(股骨)骨折」而非骨盆骨折,故A敘述錯誤。","detail":{"background":"脂肪栓塞(fat embolism)的特性:①最常發生於「長骨(尤其股骨)骨折、多發性骨折」,因長骨骨髓腔脂肪含量高,「骨盆骨折」雖也可能但非最常見/最典型,故A「常發生於骨盆骨折之後」為錯誤敘述;②症狀「發展快速」,常於24~48小時內出現(B正確);③臨床表現(呼吸窘迫、低血氧)「與肺栓塞不易區別」(C正確);④脂肪球可引發血管內「血小板凝集、發炎反應」(D正確)。故錯誤敘述為A。","options":{"A":"正解(錯誤敘述)。脂肪栓塞最常見於長骨(股骨)骨折,非骨盆骨折。","B":"脂肪栓塞症狀發展快速,正確。","C":"臨床表現與肺栓塞不易區別,正確。","D":"會引發血管內血小板凝集反應,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"104100-N3-18":{"quick":"股骨骨折最易造成脂肪栓塞,故B。","detail":{"background":"脂肪栓塞症候群好發於「長骨骨折」,因長骨(尤其「股骨(femur)」)骨髓腔含大量脂肪,骨折時脂肪球易釋入血流。選項中「股骨」是最長、骨髓脂肪最多的長骨,最易造成脂肪栓塞(B);髖骨、骨盆骨雖也可能但風險次之;腕骨為小骨、脂肪少,風險最低。故答案B。","options":{"A":"髖骨骨折也可能但非最易,股骨風險更高。","B":"正解。股骨為最長、骨髓脂肪最多,最易造成脂肪栓塞。","C":"骨盆骨折可能但非最易。","D":"腕骨為小骨、脂肪少,風險最低。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"104100-N3-19":{"quick":"6P不包括Petechiae(瘀斑);6P為痛、蒼白、感覺異常、麻痺、無脈、冰冷,故A。","detail":{"background":"腔室症候群(compartment syndrome)的監測指標「6P」:Pain(疼痛,尤其被動牽張時劇痛、止痛劑難緩解)、Pallor(蒼白)、Paresthesia(感覺異常,常為最早出現)、Paralysis(麻痺/無力)、Pulselessness(脈搏消失,為晚期徵象)、Poikilothermia/Polar(患肢冰冷)。題目選項中「Petechiae(瘀斑/點狀出血)」並非6P之一(瘀斑反而是脂肪栓塞的特徵),故「不包括」者為A。","options":{"A":"正解。Petechiae(瘀斑)不屬6P,是脂肪栓塞特徵。","B":"Paralysis(麻痺)屬6P。","C":"Paresthesia(感覺異常)屬6P,常最早出現。","D":"Pulselessness(無脈)屬6P,為晚期徵象。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"105090-N3-17":{"quick":"腔室症候群是腔室內壓升高所致,並非「長期臥床不動」造成,故A錯誤。","detail":{"background":"腔室症候群(compartment syndrome):①定義——肢體「肌肉、血管、神經被緻密筋膜包裹的封閉腔室」,因腔室內壓升高(骨折、出血、水腫、石膏過緊、壓砸傷)致血流受阻、組織缺血(C正確);②病因為「壓力升高/外傷/石膏過緊」,「並非」長期臥床不動造成,故A錯誤;③若不及時處理,持續缺血會致神經肌肉壞死、肢體永久失去功能(B正確,屬骨科急症);④處置必要時行「筋膜切開術(fasciotomy)」減壓、釋放腔室壓力與水腫(D正確)。故錯誤敘述為A。","options":{"A":"正解(錯誤敘述)。腔室症候群是腔室內壓升高所致,非長期臥床造成。","B":"不處理會致肢體失去功能,正確(骨科急症)。","C":"是被筋膜包裹的封閉腔室受壓迫,正確。","D":"必要時可行筋膜切開術減壓,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"108020-N3-19":{"quick":"腔室症候群時患肢應維持「與心臟同高」,不可抬高於心臟(會減少動脈灌流),故C錯誤。","detail":{"background":"腔室症候群的評估與處置:①「感覺異常(paresthesia)」常是「最早」出現的症狀(A正確);②一旦發生應「立即解除壓迫來源」(鬆開或剖開石膏、移除敷料夾板)(B正確);③患肢應維持在「與心臟同高(heart level)」,「不可抬高於心臟」——抬高會降低動脈灌流壓、加重缺血,故C為錯誤;④缺血致皮膚蒼白、微血管充填時間延長(>3秒)(D正確)。處置以筋膜切開術減壓為確定治療。故錯誤敘述為C。","options":{"A":"感覺異常常為最早出現的症狀,正確。","B":"應立即解除壓迫來源,正確。","C":"正解(錯誤敘述)。患肢應與心臟同高,不可抬高於心臟以免加重缺血。","D":"皮膚蒼白、微血管充填>3秒,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"108110-N3-14":{"quick":"骨盆骨折後第2天突發意識改變、呼吸心跳加速、瘀斑、發燒,最可能是脂肪栓塞症候群,故B。","detail":{"background":"本題:骨盆骨折後「第2天」突發「意識改變、呼吸與心跳加速、瘀斑、發燒」——典型脂肪栓塞症候群(FES)三聯徵:神經症狀(意識改變)、呼吸窘迫(呼吸心跳加速、低血氧)、皮膚「瘀斑(petechiae)」,加上發燒,好發於骨折後24~72小時。①腔隙症候群(A)是局部肢體缺血(劇痛、蒼白、無脈),不會有意識改變與瘀斑;②骨頭感染敗血症(C)需數天至週、以高燒寒顫為主;③動脈損傷內出血(D)以低血容積休克(低血壓、蒼白濕冷)表現,不會有瘀斑為特徵。故最可能為B脂肪栓塞症候群。","options":{"A":"腔隙症候群為局部肢體缺血,無意識改變與瘀斑,不符。","B":"正解。骨盆骨折後意識改變、呼吸心跳加速、瘀斑、發燒符合脂肪栓塞症候群。","C":"骨感染致敗血症以高燒寒顫為主,非此急性多系統表現。","D":"動脈損傷內出血以低血容積休克表現,非瘀斑為特徵。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"109030-N3-18":{"quick":"脂肪栓塞症狀為呼吸急促、意識混亂、體溫上升(124),無排尿增加,故B。","detail":{"background":"脂肪栓塞症候群的症狀與徵象:①「呼吸急促/呼吸窘迫」——脂肪球栓塞肺微血管致低血氧(①是);②「意識混亂/神經症狀」——腦部微栓塞與低血氧(②是);④「體溫上升(發燒)」——發炎反應(④是);另有典型「皮膚瘀斑(petechiae)」、心搏過速。題目③「排尿增加」並非脂肪栓塞的表現(低血氧、休克時反而尿量可能減少)。故正確為1、2、4,答案B(124)。","options":{"A":"123含③排尿增加,非脂肪栓塞表現,錯誤。","B":"正解。呼吸急促、意識混亂、體溫上升(124)為脂肪栓塞表現。","C":"134含③排尿增加,錯誤。","D":"234含③排尿增加,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"110110-N3-18":{"quick":"腔隙症候群處置應「去除敷料、夾板或石膏」解除壓迫,故D正確。","detail":{"background":"腔室症候群是骨科急症,處置目標為「立即解除腔室壓力、恢復灌流」:①應「去除一切外在壓迫」——拆除或剖開石膏、移除夾板、鬆開敷料與彈繃(D正確);②患肢維持「與心臟同高」,「不可抬高於心臟」(抬高降低動脈灌流加重缺血,A錯);③不冷敷(冷會血管收縮加重缺血)也不熱敷(B錯);④不可加壓包紮(會更壓迫腔室,C錯);⑤確定治療為「筋膜切開術(fasciotomy)」。故正確處置為D。","options":{"A":"抬高超過心臟會減少灌流加重缺血,錯誤。","B":"冷熱敷都不適當(冷致血管收縮),錯誤。","C":"加壓包紮會加重腔室壓力,錯誤。","D":"正解。去除敷料、夾板或石膏解除壓迫。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111110-N3-21":{"quick":"脂肪栓塞的脂肪球來自「骨髓腔」(長骨骨折)而非皮下組織,故A敘述錯誤。","detail":{"background":"骨科手術合併症:①「脂肪栓塞」的脂肪球是由「骨髓腔(bone marrow)」釋出(長骨/多發骨折時),「並非由皮下組織釋出」,故A為錯誤敘述;②開放性骨折復位手術因鄰近神經血管,最常見合併症為「神經血管損傷」(B正確);③手術肢體長時間固定不動易致靜脈血流滯留→「血栓性靜脈炎/深部靜脈栓塞」(C正確);④術後突發胸痛、呼吸困難要警覺「肺栓塞」,需緊急治療(D正確)。故錯誤敘述為A。","options":{"A":"正解(錯誤敘述)。脂肪栓塞脂肪球來自骨髓腔,非皮下組織。","B":"開放性骨折復位最常見神經血管合併症,正確。","C":"長時間固定不動易致血栓性靜脈炎,正確。","D":"術後突發胸痛呼吸困難可能是肺栓塞,需緊急處理,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"112030-N3-17":{"quick":"脂肪栓塞多在骨折後「24~48小時」內發生,非72小時,故B敘述錯誤。","detail":{"background":"骨折後脂肪栓塞:①好發於「長骨骨折(股骨)」與多發骨折病人(A正確);②發生時間多在骨折後「24~48小時內(72小時內)」「快速」出現,題目B「多發生在骨折後72小時(之後)」不正確,故B為錯誤敘述;③獨特表徵是「皮膚瘀斑(petechiae)」,常見於前胸、腋窩、結膜(C正確);④脂肪球栓塞肺臟致「呼吸衰竭/急性呼吸窘迫」,是常見死因(D正確)。故錯誤敘述為B。","options":{"A":"好發於長骨骨折病人,正確。","B":"正解(錯誤敘述)。脂肪栓塞多在24~48小時內發生,非72小時後。","C":"獨特表徵是皮膚瘀斑(petechiae),正確。","D":"呼吸衰竭是脂肪栓塞常見死因,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"113180-N3-25":{"quick":"腔隙症候群表現為患肢緊縮感、脈搏減弱、比健肢冰冷(124);疼痛劇烈、止痛藥難緩解,故B。","detail":{"background":"腔室症候群的臨床表徵(6P):①「患肢有緊縮感、腫脹緊繃」(①正確);②「脈搏減弱或消失(pulselessness)」——腔室壓迫動脈(②正確);④「患肢比健肢冰冷(poikilothermia)」——灌流不足(④正確)。題目③「止痛藥物能緩解疼痛」是錯的——腔室症候群的疼痛特徵是「與傷勢不成比例的劇痛、被動牽張時更痛、止痛劑『難以』緩解」,這正是早期重要警訊。故正確表徵為1、2、4,答案B(124)。","options":{"A":"123含③止痛藥能緩解(錯,腔室症候群止痛劑難緩解),錯誤。","B":"正解。緊縮感、脈搏減弱、比健肢冰冷(124)。","C":"134含③,錯誤。","D":"234含③,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"113180-N3-49":{"quick":"「腫脹」不是骨折監測的6P之一,故A。","detail":{"background":"骨折病人神經血管監測的「6P」用以早期偵測腔室症候群與循環障礙:Pain(疼痛)、Pallor(蒼白)、Paresthesia(感覺異常/麻痺感)、Paralysis(麻痺無力)、Pulselessness(無脈)、Poikilothermia/Polar(患肢冰冷)。題目選項中「腫脹(swelling)」雖是骨折常見現象,但「並非6P正式項目」,故「不是6P」者為A。蒼白(B)、疼痛(C)、麻痺(D)皆屬6P。","options":{"A":"正解。腫脹不屬6P正式項目。","B":"蒼白(Pallor)屬6P。","C":"疼痛(Pain)屬6P。","D":"麻痺(Paralysis/Paresthesia)屬6P。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"102030-N3-19":{"quick":"石膏內發熱是熟石膏乾燥放熱(正常現象),仍可做等長收縮,故D敘述錯誤。","detail":{"background":"ORIF後長腿石膏返房照護:①持續評估患肢遠端「神經血管功能(顏色、溫度、感覺、活動、脈搏、微血管充填)」並與健側比較(A正確);②以「透氣枕頭」支托石膏並抬高至「高於心臟」以減少腫脹(B正確);③搬動未乾石膏時用「手掌(掌面)」支托、勿用指尖,以免造成凹痕壓迫皮膚(C正確);④熟石膏乾燥時會發生「放熱反應(exothermic)」使石膏發熱,屬「正常現象」,且此時仍應教導病人做患肢「等長收縮運動」維持肌力,故D「教導勿執行等長收縮」為錯誤。","options":{"A":"評估患肢遠端循環感覺並與健側比較,正確。","B":"石膏抬高高於心臟減少腫脹,正確。","C":"用手掌支托未乾石膏,避免指尖造成凹痕,正確。","D":"正解(錯誤敘述)。石膏發熱是乾燥放熱屬正常,仍應做等長收縮維持肌力。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"102030-N3-20":{"quick":"石膏固定的患肢「應做等長運動」維持肌力,「不可做任何運動」是錯誤,故B。","detail":{"background":"石膏乾後護理指導:①以膠布修整石膏邊緣(petalling),避免粗糙邊緣壓迫摩擦皮膚(A正確);②鼓勵「健肢(左腿)」多運動、維持肌力以利日後支撐下床(C正確);③勿將外物伸入石膏內(避免破壞石膏內襯平滑、刮傷皮膚或引發感染)(D正確);④石膏固定的「患肢」雖關節不能動,但「應做等長收縮運動(isometric)」維持肌力、促進循環,並非「不可做任何運動」,故B為錯誤敘述。","options":{"A":"膠布修整石膏邊緣避免壓迫皮膚,正確。","B":"正解(錯誤敘述)。患肢應做等長運動維持肌力,非不可做任何運動。","C":"鼓勵健肢運動以利下床支撐,正確。","D":"勿把外物伸入石膏內,保持內部平滑,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"103100-N3-78":{"quick":"不可將任何物品(即使鈍端)伸入石膏內抓癢,易刮傷皮膚致感染,B屬錯誤認知需再指導。","detail":{"background":"石膏固定病人衛教評值:①手指變冷且無法移動(循環/神經障礙警訊)應立即告知醫護(A正確);②手指腫脹時抬高患肢高於心臟以促進靜脈回流消腫(C正確);③定期抬高手臂活動以防肩關節僵硬(D正確);④「皮膚發癢」時「絕不可」將任何物品(即使鈍端)伸入石膏內抓癢,以免刮傷皮膚、破壞內襯、造成感染或壓瘡——可改用「冷風(吹風機冷風)」吹石膏口緩解搔癢。故B「用鈍端物品伸入抓癢」為錯誤認知,顯示需進一步護理指導。","options":{"A":"手指變冷無法移動立即告知,正確認知。","B":"正解(需再指導)。不可將物品伸入石膏內抓癢,易刮傷感染。","C":"手指腫脹抬高患肢消腫,正確認知。","D":"定期抬高活動防肩關節僵硬,正確認知。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"105030-N3-19":{"quick":"不可用抓癢器伸入石膏內抓癢(易刮傷皮膚致感染),故B錯誤。","detail":{"background":"下肢骨折石膏固定:①石膏「邊緣」粗糙處易壓迫摩擦致壓瘡,須以膠布修整、棉墊防護(A正確);②肢體遠端呈「淡藍/發紺」表示「靜脈循環受阻」,蒼白冰冷則為動脈受阻(C正確);③鼓勵患肢做「等長運動」、健肢全關節活動,避免廢用症候群(肌肉萎縮、關節攣縮)(D正確);④「不可」使用抓癢器或任何物品伸入石膏內抓癢,以免刮傷皮膚、損壞內襯、造成感染,故B為錯誤敘述。","options":{"A":"石膏邊緣易致壓瘡須防護,正確。","B":"正解(錯誤敘述)。不可用抓癢器伸入石膏內抓癢。","C":"遠端淡藍表示靜脈循環受阻,正確。","D":"鼓勵等長運動避免廢用症候群,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"107110-N3-21":{"quick":"石膏固定肢體因關節不能動,以「等長運動」維持肌力,故C。","detail":{"background":"上石膏的肢體因關節被固定無法活動,為「預防肌肉萎縮、肌力變差(廢用)」,應執行「等長運動(isometric exercise)」——肌肉用力收縮但「關節不動」(如繃緊大腿股四頭肌、不移動膝關節),可維持肌力與促進靜脈回流。全關節運動(A)、等張運動(B)都需「移動關節」,石膏固定下無法執行;故石膏肢體的肌力維持運動為「等長運動」,答案C。健肢則可做等張及全關節運動。","options":{"A":"全關節運動需移動關節,石膏固定下無法執行。","B":"等張運動需關節活動,石膏肢體無法做。","C":"正解。等長運動肌肉收縮但關節不動,維持石膏肢體肌力。","D":"同時等張等長,石膏肢體無法做等張,不適。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"109030-N3-20":{"quick":"石膏表面出現「灼熱點(hot spot)」常表示石膏下有壓迫或感染,應立即處置,故A。","detail":{"background":"上石膏後24小時內的評估,需立即處置的危險徵象:「石膏表面出現灼熱點(hot spot)」——表示石膏下局部有壓迫性損傷或感染、壓瘡正在形成,需立即剖開石膏檢視處置(A為答案)。相較之下:石膏肢體遠端「輕微水腫」可抬高觀察(B);石膏內皮膚「搔癢」可用冷風緩解、非緊急(C);石膏「酸味/異味」雖也提示感染,但24小時內感染腐味通常尚未形成,且非如灼熱點般急需立即剖石膏處置(D)。故最需立即處置者為A。","options":{"A":"正解。石膏灼熱點提示下方壓迫或感染,須立即處置。","B":"輕微水腫可抬高觀察,非立即處置。","C":"皮膚搔癢可用冷風緩解,非緊急。","D":"酸味提示感染,但24小時內較少出現且非最急需剖石膏者。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"109110-N3-21":{"quick":"長期石膏固定後肌肉「萎縮、張力下降」,「肌肉張力增加」不會出現,故B。","detail":{"background":"右大腿骨折上石膏3個月後拆除石膏的表現:①長期未清潔的皮膚「布滿黃棕色皮屑/鱗片」(死皮、皮脂堆積,正常現象)(A會看到);②肢體因長期固定而「僵硬」、關節活動度下降(C會看到);③長期未承重使本體感覺與「平衡感改變」(D會看到);④因「廢用」肌肉「萎縮、肌張力下降、肌力變差」——故「肌肉張力增加」是「不會」看到的(B為答案)。拆石膏後需漸進復健恢復肌力、關節活動度與平衡。","options":{"A":"皮膚布滿黃棕色皮屑為正常現象,會看到。","B":"正解。長期固定肌肉萎縮、張力下降,不會見「張力增加」。","C":"肢體因長期固定而僵硬,會看到。","D":"長期未承重致平衡感改變,會看到。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111110-N3-20":{"quick":"石膏異味的判讀中,本題以D為錯誤選項;A、B、C皆為正確的循環與壓迫警訊判讀。","detail":{"background":"上石膏病人的警訊判讀:①遠端皮膚「蒼白或冰冷」→「動脈循環受阻(供血不足)」(A正確);②遠端「不尋常腫脹」→「靜脈回流受阻」(B正確);③石膏表面出現「灼熱點(hot spot)」→石膏下局部壓迫或「感染」(C正確);④石膏散發異味——感染/組織壞死時石膏會出現「腐臭/霉臭味」並常伴隨滲液染色、發燒;但「酸味」也可能僅來自汗液與潮氣積聚於新石膏內,不一定代表組織壞死,故本題將D列為(相對)不正確的判讀。臨床上聞到「持續惡臭並伴滲液、發燒」才是感染壞死的可靠指標。","options":{"A":"遠端蒼白冰冷表示動脈循環受阻,正確。","B":"遠端不尋常腫脹表示靜脈回流受阻,正確。","C":"石膏表面灼熱點表示下方壓迫或感染,正確。","D":"正解(本題列為錯誤)。酸味可能僅來自汗濕,不一定代表組織壞死;惡臭伴滲液發燒才是感染可靠指標。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"112110-N3-18":{"quick":"石膏遠端出現「感覺異常」是神經血管受壓的早期警訊,需立即處理,故B。","detail":{"background":"右小腿上石膏病人,需「立即處理」的臨床表徵是神經血管受損的警訊。①「右腳小腿末端感覺異常(paresthesia)」——是腔室症候群/神經受壓的「早期重要警訊」,需立即處置(B為答案);②大拇趾甲床「微血管充填2秒」為正常(<3秒)(A正常);③石膏內皮膚「發癢」非緊急(C);④足背動脈脈搏「2+」為正常強度(D正常)。故需立即處理者為B(感覺異常)。","options":{"A":"微血管充填2秒為正常,不需立即處理。","B":"正解。遠端感覺異常是神經血管受壓早期警訊,須立即處理。","C":"石膏內皮膚發癢非緊急。","D":"足背動脈脈搏2+為正常強度。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"112110-N3-19":{"quick":"遠端感覺異常提示石膏過緊壓迫,最適當處置是「去除(剖開)石膏」解除壓迫,故D。","detail":{"background":"承上題(石膏遠端出現感覺異常,疑神經血管受壓/腔室症候群),最適當的處置是「立即解除壓迫」——「去除或剖開(bivalve)右小腿石膏」以降低腔室壓力、恢復灌流(D正確)。其餘錯誤:①「抬高於心臟」會降低動脈灌流、加重缺血(A錯,應與心臟同高);②「冷敷」使血管收縮加重缺血(B錯);③「彈繃加壓」會更增壓迫(C錯)。故最適當處置為D去除石膏。","options":{"A":"抬高於心臟會減少灌流加重缺血,錯誤。","B":"冷敷使血管收縮加重缺血,錯誤。","C":"加壓包紮會增加壓迫,錯誤。","D":"正解。去除(剖開)石膏解除壓迫。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"114100-N3-13":{"quick":"拆石膏後肌力與平衡未恢復,不可立即下床行走,故A不適當。","detail":{"background":"移除下肢石膏後的護理指導:①因長期固定肌肉萎縮、關節僵硬、平衡感下降,「不可鼓勵立即下床行走」,應漸進活動、必要時用助行器,以防跌倒(A不適當,為答案);②剛拆石膏的皮膚脆弱,應「避免過度曝曬」(B適當);③行走時患肢可用「彈性繃帶包紮」支撐、減輕腫脹(C適當);④皮膚表面布滿「黃棕色鱗片(死皮)」是正常現象,溫水清潔、勿用力刮(D適當)。故不適當者為A。","options":{"A":"正解(不適當)。拆石膏後肌力平衡未恢復,不可立即下床行走。","B":"剛拆石膏皮膚脆弱應避免過度曝曬,適當。","C":"行走時用彈繃支撐減輕腫脹,適當。","D":"皮膚布滿黃棕色鱗片是正常現象,適當。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"115030-N3-11":{"quick":"皮膚瘀斑與「低血容性休克」無直接關係,故D敘述錯誤。","detail":{"background":"左股骨骨折石膏制動:①上石膏前皮膚應以「石膏襪套(stockinette)及棉墊」包覆保護皮膚(A正確);②石膏「乾燥過程中不要覆蓋衣物/被單」,以利水分蒸發、散熱乾燥(B正確);③患肢出現「6P(疼痛、蒼白、感覺異常、麻痺、無脈、冰冷)」表示可能有「腔隙(腔室)症候群」(C正確);④皮膚出現「瘀斑(ecchymosis)」是局部軟組織出血/挫傷或腔室出血表現,與「低血容性休克」無直接關係(休克表現為低血壓、心搏過速、皮膚濕冷蒼白),故D為錯誤敘述。","options":{"A":"上石膏前以襪套及棉墊保護皮膚,正確。","B":"石膏乾燥時不覆蓋衣物以利散熱乾燥,正確。","C":"患肢出現6P表示可能有腔隙症候群,正確。","D":"正解(錯誤敘述)。皮膚瘀斑是局部出血/挫傷,與低血容性休克無直接關係。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"101110-N3-67":{"quick":"平衡懸吊式牽引讓患肢懸吊,病人床上活動範圍反而「較不受限」,故C敘述錯誤。","detail":{"background":"平衡懸吊式牽引(balanced suspension traction,如Thomas夾板+Pearson吊架)用於股骨骨折:①患部承受牽引拉力以維持對位、復位(A正確);②以「吊架(suspension)、夾板(Thomas splint/Pearson attachment)」懸吊維持患肢位置(B正確);③因患肢被「懸吊浮起」,病人可在牽引維持的前提下抬臀、活動上身,床上活動範圍「較不受限」、方便翻身與背部護理,故C「活動範圍受到較多限制」為錯誤;④懸吊使患肢隨身體移動仍維持牽引,增加基本照護(如鋪床、便盆)的方便性(D正確)。","options":{"A":"患部承受牽引拉力維持復位對位,正確。","B":"使用吊架或夾板維持患肢位置,正確。","C":"正解(錯誤敘述)。患肢懸吊使床上活動較不受限,非受較多限制。","D":"懸吊設計增加基本照護的方便性,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"104100-N3-20":{"quick":"Halo(環圈式顱骨)牽引是「骨骼牽引」,不屬皮膚牽引,故B。","detail":{"background":"牽引依施力方式分兩大類:①「皮膚牽引(skin traction)」——藉黏貼帶、束帶將拉力經皮膚傳至骨骼,重量輕(一般<5公斤)、暫時性,如「勃克氏(Buck’s)牽引、骨盆牽引(pelvic)、勒塞爾氏(Russell’s)牽引、骨盆吊帶」;②「骨骼牽引(skeletal traction)」——以骨釘/鋼針/顱骨環直接固定於骨骼,可承受較大重量、較持久,如「環圈式顱骨牽引(Halo traction)、Gardner-Wells tongs、Steinmann pin、Kirschner wire、平衡懸吊牽引」。故「不屬皮膚牽引」者是「Halo環圈式顱骨牽引」,屬骨骼牽引,答案B。","options":{"A":"勃克氏牽引屬皮膚牽引。","B":"正解。Halo環圈式顱骨牽引是骨骼牽引,不屬皮膚牽引。","C":"骨盆牽引屬皮膚牽引。","D":"勒塞爾氏牽引屬皮膚牽引。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"107030-N3-5":{"quick":"骨骼牽引移除須採漸進方式、不可一次完全移除砂袋,故D正確。","detail":{"background":"頸椎滑脫使用Gardner-Wells tongs(顱骨鉗骨骼牽引)復位的護理:①牽引重量須「依醫囑」逐步增加,「並非越重越好」——過重會造成過度牽張、神經血管損傷(A錯);②裝上牽引後應「立即」照X光確認對位與復位情形,而非第2天才照(B錯);③骨釘(pin)處護理依無菌原則,消毒頻率與藥劑依醫囑,而非一律每天優碘3次(C不夠精確);④牽引移除時須「漸進(逐步減重)」,不可一次完全移除全部砂袋,以免頸椎瞬間失去支撐而再脫位或神經受損(D正確)。故正確敘述為D。","options":{"A":"重量須依醫囑漸增,非越重越好,錯誤。","B":"裝上牽引後應立即照X光確認復位,非第2天,錯誤。","C":"骨釘處護理依醫囑,非一律每天優碘3次,不精確。","D":"正解。牽引移除須漸進、不可一次完全移除砂袋。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"107110-N3-17":{"quick":"勃克氏牽引中腳跟應「離床懸空防壓瘡」而非為避免循環受阻,且小腿置於床面,D敘述不正確。","detail":{"background":"勃克氏牽引(Buck’s traction)是「直線式皮膚牽引」(A正確),常用於「髖部或股骨骨折手術前的暫時制動、緩解肌肉痙攣與下背疼痛」(B、C正確)。護理要點:小腿/患肢平置於床面,「腳跟應離開床面(懸空)以防腳跟壓瘡」,並避免壓迫膝後「膝窩(腓總神經)」造成神經損傷。題目D敘述「膝窩及腳跟應懸空以避免血液循環受阻」不正確——腳跟懸空的主要目的是「預防壓瘡」(非為血液循環),且勃克氏牽引並非懸吊式、患肢是平置床面而非整段懸空,故D為錯誤敘述。","options":{"A":"勃克氏牽引是直線式皮膚牽引,正確。","B":"可緩解下背部肌肉痙攣或疼痛,正確。","C":"常用於髖部或股骨骨折術前制動,正確。","D":"正解(錯誤敘述)。腳跟離床是為防壓瘡而非循環,且患肢平置非整段懸空。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"114170-N3-12":{"quick":"骨外固定器病人應「鼓勵早期下床活動」,避免下床的說法不適當,故D。","detail":{"background":"骨外固定器(external fixator)處置:①依醫囑使用抗生素並觀察插針處有無感染(A適當);②插針處(pin site)以「外科無菌傷口消毒法」護理,預防針道感染(B適當);③指導患肢做「肌肉等長運動」維持肌力、促進循環(C適當);④外固定器的「優點正是可早期活動與下床負重(視骨折穩定度與醫囑)」,以促進癒合、預防併發症,故「避免下床以防外固定器鬆脫」是「最不適當」的敘述(D為答案)——外固定器穩固,鼓勵在安全範圍內早期活動。","options":{"A":"依醫囑用抗生素預防感染,適當。","B":"插針處以無菌消毒法護理,適當。","C":"指導肌肉等長運動維持肌力,適當。","D":"正解(最不適當)。外固定器可早期活動,應鼓勵下床而非避免。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"114170-N3-13":{"quick":"牽引重力垂直懸空不擺動、摩擦力小拉力大、牽引力與骨長軸平行(125)最適當,故C。","detail":{"background":"股骨骨折牽引的護理原則:①「牽引重力(砂袋)應垂直懸空、不可擺動或落地」,維持穩定拉力(①正確);②「摩擦力愈小,有效牽引拉力愈大」——保持滑輪順暢、繩索不卡,減少摩擦損失(②正確);⑤「牽引力應與骨頭長軸平行」,使拉力沿骨幹方向達到復位與制動(⑤正確)。錯誤者:③「以罩單覆蓋牽引繩」並無減少感染作用且妨礙觀察(③錯);④牽引重量由「醫囑設定」,「不可隨意/隨時自行調整」(④錯)。故最適當為1、2、5,答案C(125)。","options":{"A":"123含③覆蓋牽引繩減感染(無此作用),錯誤。","B":"234含③④,錯誤。","C":"正解。重力垂直懸空、摩擦小拉力大、與骨長軸平行(125)。","D":"345含③④,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"101110-N3-11":{"quick":"床上伏地挺身是強化「上肢/三頭肌」以利拄拐、轉位,並非增加股四頭肌力量,故D錯誤。","detail":{"background":"下肢截肢病人護理指導重點在「預防關節攣縮、強化肌力以利日後使用義肢與輔具」:①殘肢做伸展運動強化肌力、預防屈曲攣縮(A屬可做的肌力訓練);②「避免」髖、膝關節長時間外展、外旋及屈曲姿勢,以免造成攣縮畸形(B正確);③俯臥時於腹部與殘肢下放枕頭,維持髖關節伸直、預防屈曲攣縮(C正確);④「床上伏地挺身(push-ups)」訓練的是「上肢與三頭肌」肌力,目的是強化雙臂以利日後使用枴杖、自行轉位移位,「並非增加股四頭肌(四頭肌)力量」,故D敘述錯誤。","options":{"A":"殘肢伸展運動可強化肌力、預防攣縮,屬適當訓練。","B":"避免髖膝外展外旋屈曲以防攣縮畸形,正確。","C":"俯臥腹部殘肢下放枕頭維持髖伸直防屈曲攣縮,正確。","D":"正解(錯誤敘述)。伏地挺身強化上肢/三頭肌(利拄拐),非增加股四頭肌力量。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"103100-N3-21":{"quick":"殘肢不可塗抹乳液(使皮膚軟化、影響義肢密合與皮膚完整),故B錯誤。","detail":{"background":"截肢殘肢(stump)護理:①可用「鏡子」從各角度檢視殘肢有無壓紅、破皮、傷口(自我檢查)(A正確);②殘肢「不可塗抹乳液/乳霜」——會使皮膚軟化、浸潤、影響義肢套接密合與皮膚完整性、增加破皮風險,故B為錯誤;③傷口癒合後可做「殘肢硬化(stump conditioning)」,如用枕頭按壓、逐步增加殘肢承壓,以增強皮膚耐受度,利於日後負重穿義肢(C正確);④起床後盡早穿上義肢(減少殘肢腫脹、維持塑形),不要任意脫下(D正確)。故錯誤敘述為B。","options":{"A":"用鏡子檢視殘肢各角度,正確。","B":"正解(錯誤敘述)。殘肢不可塗乳液,以免皮膚軟化影響義肢密合。","C":"癒合後用枕頭按壓做殘肢硬化、增強耐受,正確。","D":"起床後立即穿義肢、不任意脫下,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"107030-N3-18":{"quick":"兩腿間放枕頭維持「外展」會造成外展攣縮,應避免,故B錯誤。","detail":{"background":"下肢截肢術後護理:①患肢抬高僅限「24~48小時」消腫,之後不宜持續抬高,以免造成屈曲「攣縮」(A正確);②「不可」在兩腿間放枕頭維持「外展」姿勢——會造成髖外展攣縮,妨礙日後義肢使用,故B為錯誤(應維持中立位、避免外展外旋);③術後立即以「彈性繃帶」由遠端向近端「8字形」加壓包紮,控制水腫、塑形殘肢(C正確);④膝上截肢(AKA)為「預防髖關節屈曲攣縮」,鼓勵每日採「俯臥姿」一段時間(D正確)。故錯誤敘述為B。","options":{"A":"患肢抬高勿超過24~48小時以免攣縮,正確。","B":"正解(錯誤敘述)。兩腿間放枕頭維持外展會致外展攣縮,應避免。","C":"術後立即用彈性繃帶加壓控制水腫、塑形,正確。","D":"膝上截肢鼓勵俯臥防髖屈曲攣縮,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"107110-N3-20":{"quick":"長時間用枕頭抬高殘肢反而造成「屈曲攣縮」,故A錯誤。","detail":{"background":"截肢病人照護:①「不可」長時間用枕頭墊高殘肢——超過24~48小時的持續抬高會使髖/膝維持屈曲位,反而造成「屈曲攣縮」,故A敘述錯誤;②殘肢縫線周圍可由外向縫線方向、由淺漸進按摩,促進血循、減敏與防沾黏(B正確);③起床後盡早穿義肢可加壓減輕殘肢腫脹、維持塑形(C正確);④術後立即以彈性繃帶8字加壓包紮控制水腫(D正確)。故錯誤敘述為A。","options":{"A":"正解(錯誤敘述)。長時間枕頭抬高殘肢反而造成屈曲攣縮。","B":"縫線周圍由外向縫線按摩促循環防沾黏,正確。","C":"起床後盡早穿義肢減輕腫脹,正確。","D":"術後立即用彈性繃帶控制水腫,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"112180-N3-13":{"quick":"膝上截肢殘肢應以彈性繃帶加壓控制水腫並塑形,故B最適當。","detail":{"background":"骨腫瘤行右膝上截肢(AKA)的照護:①最適當的是以「彈性繃帶8字形加壓包紮殘肢」,控制水腫、促進靜脈回流並塑形殘肢以利日後裝義肢(B正確);②「不可」維持外展姿勢——應避免外展、外旋,以免攣縮(A錯,且應維持中立、預防屈曲攣縮);③殘肢應「鼓勵運動」(等長收縮、肌力訓練、防攣縮),非禁止運動(C錯);④膝上截肢應「鼓勵俯臥」以伸展髖關節、預防髖屈曲攣縮,而非禁止俯臥(D錯)。故最適當為B。","options":{"A":"應避免外展(以防外展攣縮),非保持外展,錯誤。","B":"正解。殘肢用彈性繃帶加壓控制水腫並塑形。","C":"殘肢應鼓勵運動防攣縮,非禁止運動,錯誤。","D":"膝上截肢應鼓勵俯臥防髖屈曲攣縮,非不可俯臥,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"101030-N3-42":{"quick":"股骨頸骨折術後應「多喝水」預防泌尿道感染、結石與便祕,故C錯誤。","detail":{"background":"右股骨頸骨折術後護理(髖部術後保護原則):①坐時「避免交叉雙腿(避免內收)」以防髖脫位(A正確);②維持環境「無障礙」、移除地毯雜物、防滑,以防跌倒再骨折(B正確);③必要時將「馬桶座墊高(raised toilet seat)」以避免髖關節屈曲超過90度(D正確);④應「鼓勵多喝水」以預防臥床所致的泌尿道感染、結石與便祕、並避免脫水致血栓,「少喝水以免頻尿」是錯誤指導(C為答案)。","options":{"A":"坐時避免交叉雙腿防髖脫位,正確。","B":"環境無障礙防跌倒再骨折,正確。","C":"正解(錯誤敘述)。應多喝水預防泌尿道感染結石便祕,非少喝水。","D":"必要時墊高馬桶座避免髖屈曲過度,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"103030-N3-23":{"quick":"THR後髖關節屈曲不可「大於」90度;說成「不可小於90度」方向相反,屬錯誤認知需再指導,故A。","detail":{"background":"全髖關節置換術(THR)後預防脫位的姿勢原則:①「髖關節屈曲不可『超過(大於)』90度」——病人陳述「不可『小於』90度」方向相反、是錯誤認知,顯示需再指導(A為答案);②患肢早期以「等長收縮(isometric)」運動為主,避免某些大幅度主動動作,陳述「不可做等張收縮」屬可接受認知(B);③坐時「不可交叉雙腿(避免內收)」(C正確);④術後約6週內避免開車(D正確)。故顯示需進一步指導者為A。","options":{"A":"正解(需再指導)。髖屈曲不可「大於」90度,說成「不可小於90度」方向相反。","B":"患肢早期以等長為主、避免大幅主動動作,屬可接受認知。","C":"坐時不交叉雙腿避免內收脫位,正確認知。","D":"術後6週內不開車,正確認知。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"105030-N3-21":{"quick":"THR後髖屈曲「不可大於90度」,本選項說「不可小於90度」方向相反,故B錯誤。","detail":{"background":"全髖關節置換術(THR)出院護理指導以「預防脫位」為核心:①「兩腿不可交叉、雙膝保持分開(外展)」,避免內收致後脫位(A正確);②「髖關節屈曲不可『超過(大於)』90度」(避免深坐、彎腰、蹲下),題目B寫「屈曲不可『小於』90度」方向相反,為錯誤敘述;③避免坐「軟而深的沙發或低矮椅子」(會使髖屈曲>90度)(C正確);④避免提重物、跑、跳及患部過度用力(D正確)。故錯誤敘述為B。","options":{"A":"兩腿不交叉、雙膝分開避免內收脫位,正確。","B":"正解(錯誤敘述)。髖屈曲不可「大於」90度,非「小於」。","C":"避免坐軟深沙發或低矮椅(防髖屈曲過度),正確。","D":"避免提重物、跑跳及患部過度用力,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"105090-N3-18":{"quick":"THR最常見的長期併發症是「非感染性(無菌性)鬆脫」,故D正確。","detail":{"background":"全髖關節置換術(THR):①最常見的「適應症/原因」是「退化性關節炎(OA)」等慢性關節破壞,而非「髖關節骨折」(骨折多採半髖置換或內固定),故A錯;②術後側臥時患側髖應維持「外展(abduction)」中立位,「不可內收」以防脫位,故B錯(內收易致後脫位);③坐姿時髖關節屈曲應「小於90度」,不可大於90度,故C錯;④「非感染性(無菌性)鬆脫(aseptic loosening)」是人工關節長期使用後最常見的併發症(假體與骨界面磨損鬆動),故D正確。","options":{"A":"THR最常見適應症是退化性關節炎,非髖關節骨折,錯誤。","B":"側臥患側髖應外展,不可內收(防脫位),錯誤。","C":"坐姿髖屈曲應<90度,非>90度,錯誤。","D":"正解。非感染性(無菌性)鬆脫是THR最常見的長期併發症。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"106110-N3-20":{"quick":"THR出院應雙膝分開、避免兩腿交叉(防內收脫位),故B正確。","detail":{"background":"全髖關節置換術(THR)出院護理:①早期患肢以「等長收縮(isometric)」運動維持肌力,「等張運動」會大幅活動髖關節、增加脫位風險,故A不宜;②「坐著時保持雙膝分開、避免兩腿交叉(避免內收)」以防髖脫位(B正確);③撿拾地上物品「不應蹲下或彎腰」(兩者都使髖屈曲>90度),應使用「長柄夾取器」,故C錯;④性生活、駕車等通常建議「約6週後」再恢復(視醫囑),非4週,故D錯。故正確為B。","options":{"A":"早期應做等長運動,等張運動增加脫位風險,錯誤。","B":"正解。坐時雙膝分開、避免交叉以防內收脫位。","C":"撿物不可蹲下或彎腰(髖屈>90度),應用長柄夾,錯誤。","D":"性生活、駕車多建議約6週後恢復,非4週,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"106111-N3-20":{"quick":"髖關節置換術後脫位時關節活動度「減少/受限」,「活動度增加」是錯誤表徵,故C。","detail":{"background":"人工髖關節置換術後「脫位(dislocation)」的臨床表徵:①「患肢疼痛加劇」(A正確);②「患肢變短」(脫位致股骨頭離開髖臼)(B正確);③「患肢呈內旋或外旋畸形」(視脫位方向)(D正確);④脫位後關節結構錯位、疼痛痙攣,關節「活動度『受限/減少』」而非增加,故C「關節活動度增加」為錯誤表徵(答案)。發現脫位徵象(患肢突然變短、旋轉、劇痛、無法活動)應立即通報處理。","options":{"A":"脫位致患肢疼痛加劇,正確表徵。","B":"脫位使患肢變短,正確表徵。","C":"正解(錯誤表徵)。脫位時關節活動度受限/減少,非增加。","D":"患肢呈內或外旋畸形,正確表徵。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"107030-N3-19":{"quick":"TKR術後應「抬高患肢」以促進靜脈回流、減輕腫脹,故A錯誤。","detail":{"background":"全膝關節置換術(TKR)後護理:①術後應「抬高患肢」以促進靜脈回流、減輕腫脹,並非「不得抬高」,故A為錯誤敘述;②使用「持續被動運動機(CPM)」可維持關節活動度、刺激軟骨修復、預防沾黏(B正確);③CPM角度依病人耐受度「每日漸增5~10度」(C正確);④術後可能併發「深部靜脈血栓(DVT)、腓總神經麻痺(腓神經受壓)」等(D正確)。故錯誤敘述為A。","options":{"A":"正解(錯誤敘述)。TKR術後應抬高患肢促進回流減輕腫脹,非不得抬高。","B":"CPM有助維持關節活動度、刺激軟骨癒合,正確。","C":"CPM依耐受度每日增加5~10度,正確。","D":"DVT、腓神經麻痺為TKR可能併發症,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"110110-N3-21":{"quick":"THR翻身應夾「外展枕」維持外展,「內展枕」說法錯誤(內收易脫位),故A。","detail":{"background":"全髖關節置換術(THR)後護理指導:①翻身時雙腿中間應夾「外展枕(abduction pillow)」維持髖關節「外展」位以防脫位,題目寫「夾著『內展枕』」是錯誤(內收/adduction會增加後脫位風險),故A為錯誤敘述;②鼓勵患肢做「等長收縮運動」維持肌力(B正確);③強調髖關節屈曲「不可超過90度」(C正確);④「未併用骨泥(非骨水泥型)」者,骨需長入假體,故約「6週後」才可漸進承重(D正確;骨水泥型則可較早負重)。故錯誤敘述為A。","options":{"A":"正解(錯誤敘述)。應夾「外展枕」維持外展,「內展枕」會內收致脫位。","B":"鼓勵患肢做等長收縮運動,正確。","C":"髖屈曲不可超過90度,正確。","D":"非骨泥型約6週後方可承重,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111110-N3-19":{"quick":"術後突發胸痛、呼吸短促、皮膚蒼白冰冷,最可能是肺栓塞,故C。","detail":{"background":"全髖關節置換術後病人活動少、血流滯留,易形成深部靜脈栓塞(DVT),血栓脫落隨血流到肺動脈即造成「肺栓塞(pulmonary embolism, PE)」。本題「胸痛、呼吸短促(呼吸困難)、皮膚蒼白冰冷」是肺栓塞的典型急性表現(突發胸痛+呼吸困難+低氧),屬危及生命的急症,需緊急處置(C為答案)。①關節脫位(A)表現為患肢變短旋轉劇痛,非胸痛呼吸困難;②出血(B)以低血壓、心搏過速、傷口/引流血量增加為主;③DVT(D)以患肢腫脹、疼痛、Homan’s徵象為主,尚未到「胸痛呼吸困難」——當出現胸痛呼吸困難即已進展為「肺栓塞」。故最可能為C。","options":{"A":"關節脫位表現為患肢變短旋轉劇痛,非胸痛呼吸困難。","B":"出血以低血壓、傷口出血量增加為主。","C":"正解。胸痛、呼吸短促、皮膚蒼白冰冷是肺栓塞典型表現。","D":"DVT以患肢腫脹疼痛為主;進展致胸痛呼吸困難時即為肺栓塞。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"112110-N3-20":{"quick":"關節腔鏡檢查後不可立即恢復日常活動,需休息、漸進活動,A屬錯誤認知需再指導。","detail":{"background":"關節腔鏡(arthroscopy)檢查後護理衛教:①檢查後關節仍需「休息、限制活動、漸進恢復」,並非「無不舒服即可立即恢復日常活動」,故A顯示需進一步護理指導(答案);②應注意關節有無「血腫(hemarthrosis)」(B正確);③檢視「神經、血管功能」是否受影響(肢體遠端循環、感覺、活動)(C正確);④注意有無「發燒、紅腫熱痛」等感染徵象(D正確)。故需再指導者為A。","options":{"A":"正解(需再指導)。關節腔鏡後不可立即恢復日常活動,需休息漸進。","B":"注意關節有無血腫,正確認知。","C":"檢視神經血管功能是否受影響,正確認知。","D":"注意有無發燒、紅腫等感染徵象,正確認知。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"113100-N3-38":{"quick":"使用骨泥(骨水泥)的THR可「較早(通常隔天)」下床,不需1星期,故D屬錯誤認知需再指導。","detail":{"background":"全髖關節置換術(THR)後衛教評值:①彎腰穿鞋襪時使用「長柄輔助物」或請人協助,避免髖屈曲>90度(A正確);②兩腿間夾枕頭、翻向「健側」以維持外展防脫位(B正確);③坐時「髖屈曲不可大於90度」(C正確);④「併用骨泥(骨水泥固定)」的人工髖關節,假體即刻穩固,通常「術後隔天即可在保護下漸進下床負重」,「不需等1星期」,故D「需1星期後才能下床」是錯誤認知(需再指導);非骨水泥型才需較長時間待骨長入。故答案D。","options":{"A":"用長柄輔助物穿鞋襪避免髖屈曲過度,正確認知。","B":"雙腿間夾枕翻向健側維持外展,正確認知。","C":"坐時髖屈曲不可大於90度,正確認知。","D":"正解(需再指導)。骨泥型THR通常隔天即可漸進下床,不需1星期。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"114100-N3-12":{"quick":"TKR返家後不宜「多上下樓梯、走遠路」(過度負荷新關節),故D最不適當。","detail":{"background":"全膝關節置換術(TKR)術後照護:①術後可用枕頭「抬高患肢」促進靜脈回流、減輕腫脹(A適當);②術後1~2天即可使用「持續被動運動機(CPM)」漸進活動關節、預防沾黏(B適當);③助行器手把高度「與病人腰部/手腕同高、手肘可彎曲≦30度」以利支撐(C適當);④返家後應「漸進、適度」活動,「多上下樓梯、走遠路」會過度負荷尚在恢復的人工膝關節、增加腫脹疼痛與磨損,故D「最不適當」(答案)。","options":{"A":"抬高患肢促進血液循環、減輕腫脹,適當。","B":"術後1~2天用CPM漸進活動關節,適當。","C":"助行器高度與腰同高、手肘彎≦30度,適當。","D":"正解(最不適當)。不宜多上下樓梯、走遠路過度負荷新關節。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"114170-N3-11":{"quick":"THR患肢應「外展、避免外旋與內收」,題目「保持外旋、避免外展」方向相反,故B最不適當。","detail":{"background":"全髖關節置換術(THR)術後護理:①選擇「椅背平直、高度適當、有扶手」的椅子,避免低矮軟深座椅(防髖屈曲>90度與起身困難)(A適當);②患肢正確姿勢應為「外展(abduction)、維持中立、避免內收與外旋(避免過度旋轉)」以防脫位;題目B「保持外旋、避免外展」方向完全相反,會增加脫位風險,故B「最不適當」(答案);③坐姿髖屈曲不可超過90度(C適當);④6週內避免性生活與駕車(D適當)。故最不適當為B。","options":{"A":"選椅背平直、有扶手的椅子,適當。","B":"正解(最不適當)。應外展、避免外旋與內收;「保持外旋避免外展」方向相反易脫位。","C":"坐姿髖屈曲不可超過90度,適當。","D":"6週內避免性生活與駕車,適當。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"103030-N3-22":{"quick":"MRI對軟組織與骨髓變化敏感,最適於骨髓炎「早期診斷」,故B。","detail":{"background":"骨髓炎(osteomyelitis)是骨與骨髓的感染。診斷檢查比較:①「核磁共振(MRI)」對骨髓水腫、軟組織膿瘍等早期變化最敏感且能顯示範圍,是「早期診斷」的最佳影像(B為答案);②「骨掃描(bone scan)」雖也敏感但專一性低、早期未必能與其他病灶區別;③「紅血球沉降速率(ESR)、CRP」會升高但「非專一性」,只能輔助判斷發炎程度;④「骨切片/培養(bone biopsy)」是「確定診斷與找出致病菌」的標準,但屬侵入性、非用於最早期篩查。故早期診斷最適者為MRI,答案B。","options":{"A":"骨掃描敏感但專一性低,非早期最佳。","B":"正解。MRI對骨髓與軟組織早期變化最敏感,適於早期診斷。","C":"ESR非專一性,僅輔助判斷發炎程度。","D":"骨切片是確定診斷標準但屬侵入性,非最早期篩查。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"103100-N3-18":{"quick":"骨掃描為靜脈注射放射性同位素、檢查時平臥、病變骨吸收較多同位素(24),故D。","detail":{"background":"骨骼掃描(bone scan)是核醫檢查:①以「靜脈注射」放射性同位素(如Tc-99m),「並非口服顯影劑」(①錯);②檢查進行時病人「平臥(仰臥)」於掃描台保持不動(②正確);③使用劑量極低,檢查後僅需多喝水促進排出,「不需隔離病人」(③錯);④「有病變(感染、轉移、骨折)的骨頭代謝活躍,會『吸收較多』放射性同位素」而呈現熱區(hot spot)(④正確)。故正確為2、4,答案D(24)。","options":{"A":"13含①口服顯影劑(錯,是靜脈注射),錯誤。","B":"14含①,錯誤。","C":"23含③需隔離(錯,劑量低不需),錯誤。","D":"正解。平臥(②)+病變骨吸收較多同位素(④)=24。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"103100-N3-20":{"quick":"骨髓炎最常見致病菌是金黃色葡萄球菌,故C。","detail":{"background":"骨髓炎(osteomyelitis)最常見的致病菌是「金黃色葡萄球菌(Staphylococcus aureus)」,約佔多數成人與兒童病例,可經血行性散播、鄰近感染蔓延或開放性骨折/手術直接污染進入骨骼。其他致病菌依情況而異:綠膿桿菌(Pseudomonas)常見於穿刺傷、靜脈藥癮者;鏈球菌、克雷白氏菌、念珠菌等較少見。故最常見菌種為金黃色葡萄球菌,答案C。","options":{"A":"克雷白氏菌較少見,非骨髓炎最常見菌。","B":"念珠菌(黴菌)罕見於骨髓炎。","C":"正解。金黃色葡萄球菌是骨髓炎最常見致病菌。","D":"鏈球菌可致骨髓炎但非最常見。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"105090-N3-16":{"quick":"軟骨肉瘤(chondrosarcoma)是「惡性」骨腫瘤,非良性,故D錯誤。","detail":{"background":"骨腫瘤分良性與惡性:①最常見的「良性」骨腫瘤是「骨軟骨瘤(osteochondroma)」(A正確);②「骨肉瘤(osteosarcoma)」是最常見的原發性惡性骨腫瘤,好發於「長骨的幹骺端(metaphysis)」,如膝關節周圍(B正確);③「巨細胞瘤(giant cell tumor)」屬良性但「侵襲性強、較易復發或惡性轉變」(C正確);④「軟骨肉瘤(chondrosarcoma)」是源自軟骨的「惡性」骨腫瘤,「並非良性」,故D敘述錯誤。","options":{"A":"最常見良性骨腫瘤是骨軟骨瘤,正確。","B":"骨肉瘤好發於長骨幹骺端,正確。","C":"巨細胞瘤良性但較易轉惡性,正確。","D":"正解(錯誤敘述)。軟骨肉瘤是惡性骨腫瘤,非良性。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"106111-N3-19":{"quick":"骨髓炎最常見致病菌為金黃色葡萄球菌,故B。","detail":{"background":"引起骨髓炎最常見的致病菌是「金黃色葡萄球菌(Staphylococcus aureus)」。骨髓炎依感染途徑分:血行性(細菌經血流到骨,常見於兒童長骨幹骺端)、鄰近蔓延(蜂窩組織炎、開放性骨折、手術)、與血管功能不全相關(如糖尿病足)。不論途徑,致病菌以金黃色葡萄球菌最常見;綠膿桿菌見於穿刺傷/藥癮、大腸桿菌與克雷伯氏菌較少見。故答案B。","options":{"A":"克雷伯氏菌較少見,非最常見。","B":"正解。金黃色葡萄球菌是骨髓炎最常見致病菌。","C":"綠膿桿菌常見於穿刺傷/藥癮,非最常見。","D":"大腸桿菌較少見於骨髓炎。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"107030-N3-17":{"quick":"骨髓炎分泌物多為黃色膿性,「綠色分泌物」較屬綠膿桿菌、非常見表現,故D錯誤。","detail":{"background":"急性骨髓炎常見症狀:①「體溫升高、發燒、寒顫」等全身感染表現(A正確);②局部「疼痛、紅腫熱、壓痛」(B正確);③為減輕疼痛,病人常將患肢維持在「屈曲、保護(guarding)姿勢」、拒絕活動(C正確);④若有膿性分泌物,金黃色葡萄球菌感染多為「黃色膿性」分泌物;「綠色分泌物」是綠膿桿菌(Pseudomonas)感染的特徵,並非骨髓炎的「常見」表現,故D為(相對)錯誤敘述。","options":{"A":"體溫升高是骨髓炎全身感染表現,正確。","B":"局部疼痛是常見症狀,正確。","C":"病人常呈屈曲保護姿勢以減痛,正確。","D":"正解(錯誤敘述)。骨髓炎多黃色膿性分泌物;綠色分泌物屬綠膿桿菌、非常見。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"108020-N3-17":{"quick":"骨髓炎以抗生素、手術、高壓氧治療為主,「放射線治療」最少用,故D。","detail":{"background":"骨髓炎的治療:①「抗生素」是首要、長期(常4~6週以上)足量給藥(B為主要治療);②「手術療法」清創、引流膿瘍、移除死骨(sequestrum)(C常用);③「高壓氧治療(HBO)」可提高組織氧分壓、輔助殺菌與促進癒合,用於難治性或慢性骨髓炎(A可用);④「放射線治療」用於惡性腫瘤,對「感染性」骨髓炎並無治療作用,故「最為少見/不適用」,答案D。","options":{"A":"高壓氧可輔助治療慢性/難治性骨髓炎,會使用。","B":"抗生素是骨髓炎首要治療。","C":"手術清創引流移除死骨是常用治療。","D":"正解(最少見)。放射線治療用於腫瘤,對感染性骨髓炎無效。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"108110-N3-29":{"quick":"骨掃描是靜脈注射放射性同位素,可診斷骨轉移,故D正確。","detail":{"background":"骨掃描(bone scan)為核醫造影:①「靜脈注射放射性同位素(如Tc-99m-MDP)」,代謝活躍的骨(感染、腫瘤、轉移、骨折)吸收較多而顯影,可「診斷骨轉移、骨髓炎、隱匿性骨折」(D正確);②檢查「不需禁食」(A錯,禁食是某些腹部檢查);③「偵測細胞葡萄糖代謝」是PET(正子掃描)的原理,非一般骨掃描(B錯);④「注入標記放射性物質的腫瘤抗體」是免疫造影,非骨掃描(C錯)。故正確為D。","options":{"A":"骨掃描不需禁食,錯誤。","B":"偵測葡萄糖代謝是PET原理,非骨掃描,錯誤。","C":"注入腫瘤抗體是免疫造影,非骨掃描,錯誤。","D":"正解。靜脈注射放射線同位素,可診斷骨轉移。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"110030-N3-20":{"quick":"骨髓炎常用「抗生素」控制感染加「解熱鎮痛劑」緩解發燒疼痛,故B。","detail":{"background":"骨髓炎為骨骼細菌感染,治療用藥核心是「抗生素」——須長期(數週)足量,依培養與藥敏選擇;並以「解熱鎮痛劑(antipyretic analgesics)」緩解發燒與疼痛。故常見用藥組合為「抗生素+解熱鎮痛劑」(B正確)。其他選項:利尿劑/鈣離子阻斷劑(心血管用藥,A不對)、骨骼肌肉鬆弛劑/皮質類固醇(類固醇會抑制免疫不利感染控制,C不對)、抗組織胺/軟便劑(過敏與便祕用藥,D不對)皆非骨髓炎核心用藥。","options":{"A":"利尿劑、鈣離子阻斷劑是心血管用藥,非骨髓炎用藥。","B":"正解。抗生素+解熱鎮痛劑是骨髓炎常見用藥。","C":"類固醇抑制免疫不利感染控制,不適合。","D":"抗組織胺、軟便劑非骨髓炎核心用藥。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"111030-N3-19":{"quick":"開放性骨折後發燒寒顫、患肢持續性劇痛、拒絕觸碰移動,最可能是骨髓炎,故B。","detail":{"background":"本題:開放性骨折出院後「發燒、寒顫、躁動不安、患肢持續性疼痛、拒絕移動關節或觸碰患肢」——開放性骨折使細菌直接進入骨骼,典型併發「骨髓炎(osteomyelitis)」:全身感染(發燒寒顫)+局部持續劇痛、壓痛、拒動拒觸。①肺栓塞(A)、脂肪栓塞(C)以胸痛、呼吸困難、意識改變為主,非局部患肢劇痛拒觸;②低血容積休克(D)以低血壓、心搏過速、皮膚濕冷為主。故最可能為B骨髓炎。","options":{"A":"肺栓塞以胸痛呼吸困難為主,非局部患肢劇痛拒觸。","B":"正解。開放性骨折後發燒寒顫、患肢持續劇痛拒觸,符合骨髓炎。","C":"脂肪栓塞以呼吸困難、意識改變、瘀斑為主,不符。","D":"低血容積休克以低血壓心搏過速為主,不符。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"112180-N3-12":{"quick":"骨髓炎最準確的確定診斷是骨骼組織切片(加培養),故D。","detail":{"background":"骨髓炎「最準確(確定)」的診斷方法是「骨骼組織切片(bone biopsy)」並做「組織病理與細菌培養」——可直接證實感染、找出致病菌與藥敏,是診斷的黃金標準(D正確)。其他:骨密度測量(A)用於骨質疏鬆;關節穿刺術(B)抽關節液用於關節炎/化膿性關節炎;關節腔鏡(C)是關節內視鏡檢查,皆非診斷骨髓炎的最準確方法。影像(MRI)雖利於早期偵測,但「確定診斷」仍以骨切片培養為準。故答案D。","options":{"A":"骨密度測量用於骨質疏鬆,非診斷骨髓炎。","B":"關節穿刺術用於關節液分析,非骨髓炎確診。","C":"關節腔鏡是關節內視鏡,非骨髓炎確診方法。","D":"正解。骨骼組織切片(加培養)是骨髓炎最準確的確定診斷。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"113100-N3-11":{"quick":"骨髓炎手術傷口癒合前應制動患肢,「多做全關節運動」會加重疼痛與擴散,故B錯誤。","detail":{"background":"骨髓炎護理指導:①抗生素須「按時、足療程服用,不可自行中斷」以免感染復發或抗藥(A正確);②「手術傷口癒合前應『制動』患肢」——減輕疼痛、避免感染擴散與病理性骨折,「不可多做全關節運動」,故B為錯誤敘述(癒合後再漸進復健);③接受高壓氧治療時可做「耳壓平衡(吞嚥、捏鼻鼓氣)」動作以平衡中耳壓力、預防氣壓傷(C正確);④抬高患肢以減輕腫脹與疼痛(D正確)。故錯誤敘述為B。","options":{"A":"抗生素按時服用不可中斷,正確。","B":"正解(錯誤敘述)。傷口癒合前應制動患肢,不可多做全關節運動。","C":"高壓氧治療時做耳壓平衡動作,正確。","D":"抬高患肢減輕疼痛,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","Lewis Medical-Surgical Nursing"]}},"101030-N3-43":{"quick":"助行器高度應調至使用者手肘彎曲「小於或等於30度」,故C正確。","detail":{"background":"助行器(walker)使用原則:①高度調整以「手腕橫紋(股骨大轉子)同高」、握把時「手肘自然彎曲約20~30度(≦30度)」為宜,可提供最佳支撐與推進力(C正確);②調與「下腹部同高(A)」或「大腿同高(B)」皆過低,會使身體前傾、重心不穩;③手肘彎曲「大於30度(D)」表示助行器過高,推進費力、支撐不良。使用時將助行器前移一步、四腳同時著地穩固後再向前踏步。故正確為C。","options":{"A":"與下腹部同高過低,身體前傾不穩,錯誤。","B":"與大腿同高過低,錯誤。","C":"正解。助行器高度使手肘彎曲≦30度,支撐推進最佳。","D":"手肘彎曲>30度表示助行器過高,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","復健護理(輔具與步態訓練)"]}},"102030-N3-21":{"quick":"拐杖的重量應由「雙手掌」承受,不可撐住腋窩(壓迫腋神經血管致拐杖麻痺),故B錯誤。","detail":{"background":"使用拐杖的護理指導:①站立時「拐杖頂面距腋下2~3指幅(約5公分)」,避免腋窩直接受壓(A正確);②行走或休息時「身體重量應由『雙手掌(握把)』承受」,「絕不可」用拐杖頂面撐住腋窩——長時間壓迫腋窩會壓迫腋神經與血管,造成「拐杖麻痺(crutch palsy)」,故B為錯誤;③上樓梯「好腳(健肢)先上」、下樓梯「壞腳(患肢)與拐杖先下」(健肢上、患肢下的原則),選項C、D描述上下樓梯的腳與拐杖移動順序。故錯誤敘述為B。","options":{"A":"拐杖頂面距腋下2~3指幅,正確。","B":"正解(錯誤敘述)。重量應由雙手掌承受,撐住腋窩會致拐杖麻痺。","C":"上樓梯先以雙手撐拐、健肢先上,描述正確。","D":"下樓梯患肢與拐杖先下、再移健肢,描述正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","復健護理(輔具與步態訓練)"]}},"102110-N3-60":{"quick":"患肢不可負重時,最適宜「三點式步態」,故B。","detail":{"background":"拐杖步態依負重能力選擇:①「三點式步態(three-point gait)」——「雙拐與患肢(不可/不宜負重的腳)同時前進,再由健肢跟上」,適用於「一腳完全不能或不宜負重」者(如本題右腳石膏、不宜負重),故選B;②「二點式步態」適用雙腳皆可部分負重(一拐+對側腳同時前進);③「四點式步態」適用雙腳皆可負重但需最大穩定(最慢最穩);④「搖擺式步態」適用雙下肢癱瘓者(雙拐前移、身體擺盪向前)。故最適宜為三點式步態,答案B。","options":{"A":"二點式適用雙腳可部分負重,不符不宜負重者。","B":"正解。患肢不宜負重時用三點式步態(雙拐與患肢先進,健肢跟上)。","C":"四點式適用雙腳皆可負重,不符。","D":"搖擺式適用雙下肢癱瘓者,不符。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","復健護理(輔具與步態訓練)"]}},"104100-N3-21":{"quick":"「雙拐與患肢同時前進,健肢再跟上平行」是三點式步態,故C。","detail":{"background":"拐杖步態定義:「雙側拐杖和患肢同時前進,健肢再行進至與其平行位置」——這是「三點式步態(three-point gait)」,用於一腳不宜或不能負重者(體重由雙拐與健肢三點支撐)。①搖擺式(swing-to/through):雙拐前移、身體擺盪跟進,用於雙下肢癱瘓;②二點式:一拐與對側腳同時前進(雙腳可部分負重);③四點式:依「右拐→左腳→左拐→右腳」交替前進(雙腳可負重、最穩)。故答案C三點式步態。","options":{"A":"搖擺式是身體擺盪跟進,用於雙下肢癱瘓,不符。","B":"二點式是一拐與對側腳同時前進,不符。","C":"正解。雙拐與患肢同時前進、健肢跟上=三點式步態。","D":"四點式是四點交替前進,不符。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","復健護理(輔具與步態訓練)"]}},"108110-N3-15":{"quick":"拐杖的身體重心應放在「雙手掌」而非腋下(防拐杖麻痺),故B錯誤。","detail":{"background":"左脛骨骨折使用拐杖指導:①「三點式步態:雙拐與左下肢(患肢)同時向前,再由右下肢(健肢)跟上」——描述正確(A正確,適用患肢不宜負重);②「拐杖頂部距腋下約二橫指」正確,但「身體重心應放於『雙手掌(握把)』」,「不可放於腋下」——壓迫腋下會致拐杖麻痺,故B「身體重心放於腋下」為錯誤;③上樓梯「健肢(右下肢)先上、再帶拐杖與患肢」(C正確);④當左下肢(患肢)可承受重量時,可改用「二點式步態」(D正確)。故錯誤敘述為B。","options":{"A":"三點式步態描述(雙拐與患肢先進、健肢跟上)正確。","B":"正解(錯誤敘述)。身體重心應放在雙手掌,不可放於腋下。","C":"上樓梯健肢先上、再帶拐杖與患肢,正確。","D":"患肢可承重時改用二點式步態,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","復健護理(輔具與步態訓練)"]}},"109110-N3-20":{"quick":"手杖持於「健側(對側)手」,右腳無力應左手持杖、置於左腳尖前外側約6吋,故C。","detail":{"background":"手杖(cane)使用原則:①手杖應持於「健側(較強)手」,即與患肢「對側」——右側下肢無力,應「左手」持手杖;②手杖置於「健側腳尖前外側約6吋(15公分)」處,提供支撐基底;③行走時「手杖與患肢同時前進」,以分擔患肢負重。本題右側下肢無力,正確方式為「左手持手杖,放於左腳尖前外側6吋處」,故選C。A、D位置/持手不符;B以患側(右手)持杖會使重心偏向患側、保護作用差,錯誤。","options":{"A":"手杖應置於腳尖前外側(非正前方),且未述位置,不夠正確。","B":"右手(患側)持杖保護作用差,錯誤。","C":"正解。健側(左手)持手杖,放於左腳尖前外側6吋處。","D":"右手(患側)持杖不符對側原則,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","復健護理(輔具與步態訓練)"]}},"101030-N3-40":{"quick":"膨出徵象(Bulge sign)用於檢測膝關節內有無液體積存,故C。","detail":{"background":"膝關節與肢體理學檢查的特殊試驗辨識:①「膨出徵象(Bulge sign)」——擠壓膝關節內側使液體移至外側、再輕壓外側看內側有無膨出,用於偵測膝關節「少量積液」(C為答案);②「費林氏測試(Phalen’s test)」——雙腕掌屈相對測「腕隧道症候群(正中神經)」;③「湯瑪斯測試(Thomas test)」——測「髖關節屈曲攣縮」;④「麥默雷氏測試(McMurray’s test)」——測「膝半月板(meniscus)損傷」。故檢測膝關節積液者為膨出徵象,答案C。","options":{"A":"Phalen’s test測腕隧道症候群,非膝積液。","B":"Thomas test測髖關節屈曲攣縮,非膝積液。","C":"正解。膨出徵象(Bulge sign)檢測膝關節液體積存。","D":"McMurray’s test測膝半月板損傷,非積液。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"105030-N3-20":{"quick":"髖關節骨折典型表現為患肢「外旋且變短」,故A。","detail":{"background":"髖關節骨折(尤其股骨頸/轉子間骨折)的典型身體檢查發現是患肢「外旋(external rotation)且縮短(shortening)」——因骨折端移位與肌肉牽拉,患肢呈外旋、變短姿勢,並有疼痛、無法負重。故A正確。B「內旋變短」方向錯誤(髖骨折多為外旋,後脫位才內旋);C、D描述足背動脈搏動與膚色,若無合併血管損傷,遠端循環通常正常,並非髖骨折的典型診斷依據。故答案A。","options":{"A":"正解。髖關節骨折患肢典型呈外旋與變短。","B":"內旋變短方向錯誤(髖骨折多外旋),錯誤。","C":"足背動脈變弱發紅非髖骨折典型表現,錯誤。","D":"足背動脈正常蒼白非髖骨折診斷依據,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"105030-N3-22":{"quick":"McMurray’s test評估「膝半月板」損傷,非前十字韌帶,故B敘述錯誤。","detail":{"background":"肢體理學檢查的對應:①「Bulge sign(膨出徵象)」評估「膝關節積液(液體積存)」(A正確);②「McMurray’s test(麥默雷氏試驗)」評估「膝『半月板(meniscus)』損傷」,而「前十字韌帶(ACL)」是用「Lachman test、前抽屜試驗(anterior drawer test)」評估,故B「McMurray測前十字韌帶」為錯誤;③「Phalen’s test」評估「腕隧道症候群」(C正確);④「Thomas test」評估「髖關節屈曲攣縮」(D正確)。故錯誤敘述為B。","options":{"A":"Bulge sign評估膝關節積液,正確。","B":"正解(錯誤敘述)。McMurray’s test評估膝半月板,前十字韌帶用Lachman/前抽屜試驗。","C":"Phalen’s test評估腕隧道症候群,正確。","D":"Thomas test評估髖關節屈曲攣縮,正確。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"106030-N3-19":{"quick":"評估膝關節「少量」液體積存的方法是膨出徵象(Bulge Sign),故A。","detail":{"background":"評估膝關節積液的方法依積液量不同:①「膨出徵象(Bulge sign)」對「少量」積液較敏感——推擠內側液體再輕壓外側,看內側膨起(A為答案);②「浮動試驗/髕骨輕拍(Ballottement test/patellar tap)」適合偵測「中至大量」積液(向下壓髕骨有浮動撞擊感);③「費林氏徵象(Phalen’s sign)」測腕隧道症候群;④「拉克曼檢查(Lachman test)」測前十字韌帶。故偵測膝關節「少量」積液者為膨出徵象,答案A。","options":{"A":"正解。膨出徵象(Bulge Sign)評估膝關節少量積液。","B":"浮動試驗適合中至大量積液,非少量。","C":"Phalen’s sign測腕隧道症候群,非膝積液。","D":"Lachman test測前十字韌帶,非積液。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"106030-N3-20":{"quick":"肌力2分(去除地心引力下可全範圍活動)應給予「協助性主動運動」,故B。","detail":{"background":"徒手肌力分級(0~5分):0分=無收縮;1分=可觸及肌肉收縮但無關節動作;2分=「在去除地心引力下可完成全關節活動」(無法對抗重力);3分=可對抗「地心引力」完成全關節活動(但不能抗阻力);4分=可對抗部分阻力;5分=正常(可對抗最大阻力)。肌力「2分」者只能在無重力協助下活動,故適合的運動是「協助性主動運動(active-assisted exercise)」——由護理人員或器械協助、病人主動參與,逐步增進肌力(B正確)。被動運動(A)適用0~1分;主動運動(C)適用≥3分;加阻力運動(D)適用4~5分。","options":{"A":"被動運動適用肌力0~1分,本題2分嫌不足挑戰。","B":"正解。肌力2分宜給協助性主動運動。","C":"主動運動適用肌力≥3分(可抗重力),本題2分尚不足。","D":"加阻力運動適用4~5分,本題2分過強。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"106111-N3-18":{"quick":"可全關節活動但無法對抗阻力,肌力為3分,故C。","detail":{"background":"徒手肌力(muscle power)分級:3分(Fair)=「可對抗地心引力完成全關節活動範圍,但『無法對抗任何外加阻力』」。本題「病人可完成全關節活動但無法對抗阻力」正符合3分定義,故選C。對照:2分=去除地心引力下才能完成全關節活動;4分(Good)=可對抗部分阻力;5分(Normal)=可對抗完全阻力。故答案C(3分)。","options":{"A":"1分僅可觸及收縮、無關節動作,不符。","B":"2分需去除地心引力才能活動,不符。","C":"正解。可全關節活動但不能抗阻力為3分。","D":"4分可對抗部分阻力,本題不能抗阻力,不符。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"108020-N3-18":{"quick":"Tinel’s sign用於神經壓迫(腕隧道),非膝關節損傷評估,故D錯誤。","detail":{"background":"膝關節損傷的評估方法:①「前抽屜試驗(Anterior Drawer Test)」、②「Lachman test」評估「前十字韌帶(ACL)」;③「McMurray’s test」評估「半月板(meniscus)」。而「Tinel’s sign(廷內爾氏徵象)」是「敲擊神經」誘發遠端刺麻感,用於評估「神經受壓(如腕隧道症候群的正中神經、肘隧道的尺神經)」,「並非」膝關節損傷的評估方法,故D為錯誤(非膝關節評估)。故答案D。","options":{"A":"前抽屜試驗評估前十字韌帶,屬膝關節評估。","B":"Lachman test評估前十字韌帶,屬膝關節評估。","C":"McMurray’s test評估半月板,屬膝關節評估。","D":"正解(錯誤)。Tinel’s sign評估神經壓迫(腕隧道),非膝關節損傷。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"110030-N3-21":{"quick":"費林氏測驗:雙腕掌屈、手背相對60秒,手指麻木為陽性,故A。","detail":{"background":"各特殊試驗的陽性描述:①「費林氏測驗(Phalen’s test)」——「雙手腕掌側屈曲、手背互相對貼維持約60秒,正中神經支配區(拇、食、中指)出現麻木刺痛」為陽性,用於診斷腕隧道症候群(A為答案);②「敲擊正中神經、手指刺痛麻木」是「Tinel’s sign」(B);③「緊握足踝內旋再伸直、無法伸直膝關節」描述膝關節相關試驗(C,非Phalen);④「手握腳底內外旋、聽到關節聲響」近似McMurray半月板試驗(D)。故Phalen’s test陽性描述為A。","options":{"A":"正解。雙腕掌屈手背相對60秒、手指麻木為Phalen’s test陽性。","B":"敲擊正中神經致刺麻是Tinel’s sign,非Phalen。","C":"此描述非Phalen’s test。","D":"內外旋聽關節聲響近McMurray,非Phalen。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"111030-N3-18":{"quick":"腕隧道症候群是腕部「正中神經」受壓所致,故A正確。","detail":{"background":"腕隧道症候群(carpal tunnel syndrome):①是腕部「正中神經(median nerve)」於腕隧道內受到壓迫所致(A正確),症狀為拇、食、中指及無名指橈側「麻木、刺痛、感覺異常」,夜間加重,嚴重者大魚際肌萎縮;②「主要好發於女性、約30~50歲、常與重複手腕動作有關」,並非「男性、50~60歲」(B錯);③症狀是「麻木刺痛」,並非「腕部無法伸直」(C錯);④診斷以「Phalen’s test、Tinel’s sign」為主,「Bulge sign(測膝積液)、Homan’s sign(測深部靜脈栓塞)」與腕隧道無關(D錯)。故正確為A。","options":{"A":"正解。腕隧道症候群是腕部正中神經受壓所致。","B":"主要好發女性、約30~50歲,非男性50~60歲,錯誤。","C":"症狀是麻木刺痛,非腕部無法伸直,錯誤。","D":"診斷用Phalen’s/Tinel’s,Bulge與Homan’s與腕隧道無關,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"112030-N3-19":{"quick":"腕隧道症候群病人「費林氏徵象(Phalen’s sign)」陽性,故D。","detail":{"background":"腕隧道症候群(正中神經壓迫)的身體檢查:陽性的是「費林氏徵象(Phalen’s sign,雙腕掌屈相對誘發手指麻木)」與「Tinel’s sign(敲擊腕部正中神經誘發刺麻)」,故D正確。其餘為其他部位試驗:①Thomas test(湯瑪斯)→髖關節屈曲攣縮;②Ballottement test(浮動試驗)→膝關節積液;③McMurray’s test→膝半月板損傷,皆與腕隧道無關。故答案D。","options":{"A":"Thomas test測髖屈曲攣縮,與腕隧道無關。","B":"Ballottement test測膝積液,與腕隧道無關。","C":"McMurray’s test測膝半月板,與腕隧道無關。","D":"正解。腕隧道症候群Phalen’s sign陽性。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"114030-N3-12":{"quick":"Thomas test陽性表示「對側髖關節屈曲攣縮」,故A正確。","detail":{"background":"肌肉骨骼特殊試驗的正確判讀:①「Thomas test(湯瑪斯試驗)」——仰臥屈一側髖膝至胸,若「對側(伸直側)大腿翹起離床」,表示該「對側髖關節有屈曲攣縮」,故A正確;②「Ballottement test(浮動試驗)」評估膝關節「積液」而非半月板損傷(半月板用McMurray),故B錯;③「抽屜試驗(Drawer test)」將小腿「向後」牽引異常表示「『後』十字韌帶」鬆弛(向前異常為前十字韌帶),非「副韌帶」,故C錯;④「Tinel’s sign」陽性表示「神經受壓(如腕隧道正中神經)」,非後十字韌帶,故D錯。故正確為A。","options":{"A":"正解。Thomas test陽性表示對側髖關節屈曲攣縮。","B":"Ballottement test評估膝積液,非半月板損傷,錯誤。","C":"小腿向後牽引異常表示後十字韌帶鬆弛,非副韌帶,錯誤。","D":"Tinel’s sign陽性表示神經受壓,非後十字韌帶,錯誤。"},"sources":["新文京《內外科護理學》肌肉骨骼系統","華杏《新編內外科護理學》","身體檢查與評估"]}},"107110-N3-19":{"quick":"腔室症候群的缺血指標：肢端「蒼白、變冷」(灌流不足)。","detail":{"background":"骨筋膜腔室症候群是肢體腔室內壓上升超過微血管灌流壓，造成神經肌肉缺血的急症，常見於骨折、壓砸傷、石膏過緊。評估以「6P」為主：疼痛(Pain，被動牽張痛、止痛劑難緩解，最早出現)、感覺異常(Paresthesia)、蒼白(Pallor)、無脈(Pulselessness，晚期)、麻痺(Paralysis)、患肢冰冷(Poikilothermia/cold)。其中「肢端蒼白、變冷」直接反映動脈灌流不足，是可能發生腔室症候群的警訊。相對地，周邊脈搏2+(正常)、微血管充填<3秒(正常)、單純瘀斑(軟組織挫傷常見、非特異)都不代表腔室缺血。處置須鬆開外固定、患肢平放(不抬高)、儘速筋膜切開術。","options":{"A":"周邊脈搏2+屬正常灌流，非腔室症候群指標。","B":"微血管充填<3秒屬正常，非缺血表現。","C":"正確。肢端蒼白、變冷反映灌流不足，是腔室症候群警訊。","D":"皮膚瘀斑為軟組織挫傷常見表現、非特異，不代表腔室缺血。"},"sources":["新文京《內外科護理學》肌肉骨骼急症","骨筋膜腔室症候群(compartment syndrome)6P評估"]}},"113100-N3-12":{"quick":"錯誤者：「皮膚出現出血斑點(4)」不是腔室症候群的症狀。","detail":{"background":"骨筋膜腔室症候群的症狀環繞「神經血管缺血」展開：感覺方面會「失去尖鈍辨識或兩點辨識力」(感覺異常，1)；循環方面患肢末梢「脈搏減弱」(2，晚期)、「微血管充填時間延長>3秒」(3)；加上被動牽張劇痛、患肢蒼白冰冷麻痺(6P)。而「皮膚上出現出血斑點(瘀點/瘀斑)」屬軟組織挫傷或凝血異常的表現，並非腔室症候群的特徵，故為「錯誤(不是症狀)」的選項。臨床一旦懷疑須緊急測腔室壓、鬆開束縛、筋膜切開減壓，以免肌肉神經壞死。","options":{"A":"正確(本題答案，指「非症狀」者)。皮膚出血斑點不是腔室症候群症狀。","B":"微血管充填>3秒是腔室症候群症狀(灌流不足)。","C":"患肢末梢脈搏減弱是腔室症候群(晚期)症狀。","D":"失去兩點辨識力(感覺異常)是腔室症候群症狀。"},"sources":["新文京《內外科護理學》肌肉骨骼急症","骨筋膜腔室症候群(compartment syndrome)6P評估"]}}},TO=["M1椎間盤突出下背痛與脊椎手術", "M2退化性關節炎", "M3骨質疏鬆症", "M4骨折癒合與急救處置", "M5骨折併發症脂肪栓塞與腔室症候群", "M6石膏固定護理", "M7牽引與外固定器護理", "M8截肢與義肢護理", "M9關節置換術與關節腔鏡", "M10骨髓炎與骨腫瘤", "M11拐杖助行器與輔具步態", "M12肌肉骨骼評估理學檢查與腕隧道症候群"],LEC={"M1椎間盤突出下背痛與脊椎手術":{"title":"M1 椎間盤突出、下背痛與脊椎手術 複習講義","html":"\n<h3>一、椎間盤突出(HIVD)概念</h3>\n<p>髓核經破裂纖維環突出壓迫神經根。<b>好發男性、勞力者</b>,部位以<b>下頸椎(C5-C7)、下腰椎(L4-L5、L5-S1)</b>最常見。腰椎突出→疼痛沿坐骨神經放射至臀部、大腿後側、小腿(坐骨神經痛);頸椎突出→疼痛由肩膀放射至手臂、手部。咳嗽、提重物、彎腰、久坐久站(↑椎間盤內壓)會加劇。</p>\n<h3>二、診斷理學檢查</h3>\n<p><b>直舉腿試驗(SLR/Lasègue)</b>:伸直抬腿牽扯坐骨神經,陽性者30~70度即誘發放射痛、<b>無法到90度</b>。<b>Kernig sign</b>:屈髖後伸小腿受阻劇痛。大腳趾背屈力量測的是L5肌力(非牽扯坐骨神經)。</p>\n<h3>三、下背痛/術後護理</h3>\n<ul>\n<li><b>睡硬板床</b>;姿勢宜仰臥屈膝(膝下墊枕)或側臥屈膝,<b>避免趴睡(俯臥)</b>(增加腰椎前凸)。</li>\n<li>椎板切除術後:<b>圓滾木翻身(log rolling)</b>維持脊椎對齊;先在床上穿好背架再下床;解便用<b>扁平骨折便盆</b>。</li>\n<li><b>背架戴3~6個月</b>,下床活動時都要穿、<b>洗澡時取下、不可穿著洗澡、不可每兩小時取下</b>;內穿薄內衣保護皮膚。</li>\n<li>傷口癒合後做<b>威廉氏屈曲運動(Williams flexion exercise)</b>強化腹背肌;避免彎腰、提重物、久坐久站。</li>\n<li>術後注意四肢感覺運動功能、傷口有無<b>腦脊髓液滲漏</b>。</li>\n</ul>\n<h3>四、手術方式</h3>\n<p>內視鏡椎間盤切除術:傷口小、住院短、可局麻;<b>僅適用單純突出,不適用嚴重位移或脊椎滑脫</b>(需開放或融合手術)。骨盆牽引(皮膚牽引)治下背痛時<b>抬高床尾</b>產生反牽引力。</p>\n"},"M2退化性關節炎":{"title":"M2 退化性關節炎(骨性關節炎 OA) 複習講義","html":"\n<h3>一、本質與病理</h3>\n<p>OA=<b>關節軟骨退化磨損</b>為主的「<b>非發炎性、局部性</b>」病變(與老化、肥胖、過度使用、外傷有關,<b>非自體免疫</b>)。病理:軟骨破壞變薄、軟骨下骨硬化、<b>骨贅/骨刺(osteophyte/spur)</b>、Heberden’s nodes(遠端指間關節DIP)、Bouchard’s nodes(近端指間關節PIP)。<b>無pannus血管翳(那是RA)</b>。</p>\n<h3>二、臨床與鑑別(OA vs RA)</h3>\n<ul>\n<li>OA:好發中老年、<b>負重關節(膝、髖、脊椎)</b>、常單側/不對稱;<b>晨僵短暫(<30分、活動後緩解)</b>;輾軋音(crepitus);<b>ESR/CRP正常、ANA正常</b>;<b>不影響其他系統</b>(無全身症狀)。</li>\n<li>RA:年輕女性、對稱小關節、<b>晨僵>1小時</b>、ESR/CRP升高、尺側偏斜、天鵝頸、全身症狀(發燒倦怠貧血)、Felty’s症候群、血管炎、合併乾燥症。</li>\n</ul>\n<h3>三、診斷與治療護理</h3>\n<ul>\n<li>X光:<b>關節間隙(腔)變窄、骨贅形成、軟骨下骨硬化</b>。滑液為清澈、高黏稠、白血球低(非發炎性)。</li>\n<li>運動:<b>低衝擊等張/有氧運動(游泳、騎腳踏車、水中運動、平地走路)</b>+肌力訓練;<b>避免慢跑、跑步等高衝擊</b>。</li>\n<li>急性發炎期冰敷、慢性僵硬期熱敷/溫水浴;NSAID/aspirin避免空腹;<b>減重</b>減輕膝髖負荷;使用手杖分擔負重。</li>\n<li>高危險群:肥胖(高BMI)、重複關節受傷、停經後婦女(類固醇是骨鬆危險,非OA)。</li>\n</ul>\n"},"M3骨質疏鬆症":{"title":"M3 骨質疏鬆症 複習講義","html":"\n<h3>一、概念與好發骨折</h3>\n<p>骨密度下降、骨脆性增加(DXA骨密度<b>T-score ≤ -2.5</b>)。脆性骨折三大部位:<b>脊椎(椎體壓迫性骨折→駝背、身高變矮、背痛)、腕部(橈骨遠端Colles’骨折)、髖部</b>。踝部非典型。</p>\n<h3>二、危險因子 vs 保護因子</h3>\n<ul>\n<li>危險:女性、高齡、<b>停經(雌激素↓)</b>、卵巢切除、長期類固醇、<b>長期臥床制動</b>、低體重、抗癲癇藥(Dilantin)、<b>大量咖啡/茶、日曬不足</b>、抽菸酗酒、<b>副甲狀腺機能亢進(非低下)</b>。</li>\n<li>保護:<b>規律負重運動</b>、足量鈣(1000~1200 mg/日)、維生素D與日曬、男性、體重較重。</li>\n</ul>\n<h3>三、飲食與藥物</h3>\n<ul>\n<li>補鈣食物:乳製品、小魚乾、豆類、深綠色蔬菜。<b>高蛋白↑尿鈣排泄、高纖結合鈣質→反而降低吸收</b>(勿同時大量攝取)。</li>\n<li>抑制骨吸收:降鈣素(calcitonin,鼻噴/注射)、雌激素、SERM、<b>雙磷酸鹽(抑制蝕骨細胞;空腹晨起大量開水配服、直立30分)</b>。</li>\n<li>促進骨生成:<b>副甲狀腺素類似物teriparatide(皮下注射、非鼻噴)</b>、氟化鈉。碳酸鈣<b>隨餐/飯後</b>服用利吸收。</li>\n<li>葡萄糖胺是用於退化性關節炎軟骨,<b>非</b>骨鬆用藥。</li>\n</ul>\n"},"M4骨折癒合與急救處置":{"title":"M4 骨折癒合與急救處置 複習講義","html":"\n<h3>一、骨折癒合五階段(順序)</h3>\n<p><b>血腫形成期 → 細胞增生期(纖維軟骨痂) → 骨痂形成期 → 骨化期 → 重塑期</b>(口訣:血→增→痂→骨化→重塑)。各期照護:早期患肢制動、做等長運動;骨痂形成期補充足夠營養(蛋白質、鈣、維生素C/D);重塑期仍需漸進運動。</p>\n<h3>二、影響癒合因素</h3>\n<ul>\n<li>較快:<b>海綿骨>緻密骨</b>、兒童>老年、血流佳處、適當制動。</li>\n<li>延緩:血液供應減少、骨碎片不當移動、軟組織嵌入、感染、營養不良、糖尿病、抽菸、類固醇。<b>非負重關節不會延緩癒合</b>。</li>\n<li>名詞:延遲癒合(延長但仍進行、骨折線仍見)vs 不癒合(完全停止)。</li>\n</ul>\n<h3>三、軟組織損傷與急救</h3>\n<ul>\n<li><b>PRICE</b>:Protection休息、Rest、<b>Ice冰敷(急性期48~72h內,勿立即熱敷)</b>、Compression、Elevation。</li>\n<li>到院前急救:確保ABC後<b>「固定骨折部位」為最優先</b>(防神經血管二度損傷);現場勿復位、勿熱敷。</li>\n<li><b>八字繃帶(figure-of-eight)→鎖骨骨折</b>。</li>\n</ul>\n"},"M5骨折併發症脂肪栓塞與腔室症候群":{"title":"M5 骨折併發症(脂肪栓塞與腔室症候群) 複習講義","html":"\n<h3>一、脂肪栓塞症候群(FES)</h3>\n<ul>\n<li>病因:<b>長骨(股骨)或多發性骨折</b>,骨髓腔脂肪球釋入血流(<b>非皮下組織</b>)。好發年輕男性。</li>\n<li>時間:骨折後<b>24~48小時(72小時內)快速</b>發生。</li>\n<li>三聯徵:<b>呼吸窘迫(低血氧)、神經症狀(意識混亂)、皮膚瘀斑(petechiae)</b>+發燒、心搏過速;呼吸衰竭是常見死因。<b>無排尿增加</b>。</li>\n</ul>\n<h3>二、腔室(腔隙)症候群 compartment syndrome</h3>\n<ul>\n<li>本質:封閉筋膜腔內壓升高(骨折、出血、水腫、<b>石膏過緊</b>、壓砸傷)→血流受阻、組織缺血(<b>非長期臥床造成</b>),屬骨科急症。</li>\n<li><b>6P</b>:Pain(與傷勢不成比例的劇痛、止痛劑難緩解)、Pallor、<b>Paresthesia(常最早)</b>、Paralysis、Pulselessness(晚期)、Poikilothermia(患肢冰冷)。注意Petechiae、腫脹<b>不屬6P</b>。</li>\n<li>處置:<b>立即解除壓迫(剖開/拆除石膏、移除敷料夾板)</b>;患肢維持<b>與心臟同高(不可抬高於心臟、不可冷熱敷、不可加壓)</b>;確定治療為<b>筋膜切開術(fasciotomy)</b>。</li>\n</ul>\n"},"M6石膏固定護理":{"title":"M6 石膏固定護理 複習講義","html":"\n<h3>一、上石膏與乾燥期</h3>\n<ul>\n<li>上石膏前皮膚以<b>石膏襪套(stockinette)及棉墊</b>包覆。熟石膏乾燥時<b>放熱(發熱屬正常)</b>,<b>勿覆蓋衣物</b>以利散熱乾燥;搬動未乾石膏用<b>手掌</b>支托(勿指尖,以免凹痕壓迫)。</li>\n<li>抬高患肢<b>高於心臟</b>減少腫脹(腔室症候群時則維持與心臟同高)。</li>\n</ul>\n<h3>二、神經血管監測與警訊</h3>\n<ul>\n<li>遠端<b>蒼白冰冷→動脈受阻</b>;<b>淡藍/腫脹→靜脈回流受阻</b>;<b>感覺異常(paresthesia)、微血管充填>3秒→須立即處置</b>。</li>\n<li>石膏表面<b>灼熱點(hot spot)</b>→下方壓迫或感染,須立即剖石膏檢視。</li>\n</ul>\n<h3>三、衛教重點</h3>\n<ul>\n<li><b>絕不可將任何物品(即使鈍端)伸入石膏內抓癢</b>(刮傷皮膚致感染);搔癢可用<b>冷風</b>吹。</li>\n<li>石膏固定的患肢做<b>等長運動</b>維持肌力(關節不動),健肢做等張/全關節運動,預防廢用症候群。</li>\n<li>拆石膏後皮膚布滿黃棕色皮屑為正常;肌肉<b>萎縮、張力下降</b>、肢體僵硬、平衡感改變,<b>不可立即下床行走</b>(漸進、防跌倒)。</li>\n</ul>\n"},"M7牽引與外固定器護理":{"title":"M7 牽引與外固定器護理 複習講義","html":"\n<h3>一、牽引分類</h3>\n<ul>\n<li><b>皮膚牽引(skin traction)</b>:拉力經皮膚傳至骨、重量輕(<5kg)、暫時。例:勃克氏(Buck’s)、骨盆(pelvic)、勒塞爾氏(Russell’s)。</li>\n<li><b>骨骼牽引(skeletal traction)</b>:骨釘/鋼針/顱骨環直接固定骨骼、可較重、較持久。例:<b>Halo環圈式顱骨牽引、Gardner-Wells tongs、平衡懸吊牽引</b>。</li>\n</ul>\n<h3>二、牽引護理原則</h3>\n<ul>\n<li>砂袋(重力)<b>垂直懸空不可擺動落地</b>;<b>摩擦力愈小拉力愈大</b>(滑輪順暢);牽引力<b>與骨長軸平行</b>;重量由醫囑設定<b>不可自行調整</b>。</li>\n<li>勃克氏牽引:直線皮膚牽引,用於髖/股骨術前制動、緩解下背痙攣;<b>腳跟離床(防壓瘡)</b>、避免壓迫膝後腓神經。</li>\n<li>平衡懸吊牽引:患肢懸吊,床上活動<b>較不受限</b>、方便照護。</li>\n<li>骨骼牽引移除須<b>漸進減重、不可一次完全移除</b>;裝上後立即照X光確認復位。</li>\n</ul>\n<h3>三、外固定器(external fixator)</h3>\n<p>插針處(pin site)以<b>外科無菌消毒法</b>護理防針道感染;指導肌肉<b>等長運動</b>;優點是可<b>早期活動下床</b>(鼓勵在安全範圍活動,非避免下床)。</p>\n"},"M8截肢與義肢護理":{"title":"M8 截肢與義肢護理 複習講義","html":"\n<h3>一、預防攣縮(核心)</h3>\n<ul>\n<li>避免長時間屈曲、外展、外旋;患肢抬高僅限<b>24~48小時</b>消腫,之後勿持續抬高(會致<b>屈曲攣縮</b>)。</li>\n<li>兩腿間<b>勿放枕頭維持外展</b>(會外展攣縮)。</li>\n<li>膝上截肢(AKA)鼓勵每日<b>俯臥</b>,俯臥時腹部與殘肢下放枕頭,伸展髖關節、<b>預防髖屈曲攣縮</b>。</li>\n</ul>\n<h3>二、殘肢護理</h3>\n<ul>\n<li>術後立即以<b>彈性繃帶8字形加壓包紮</b>控制水腫、塑形殘肢。</li>\n<li><b>殘肢不可塗抹乳液</b>(皮膚軟化影響義肢密合);用鏡子檢視各角度;癒合後做<b>殘肢硬化(枕頭按壓、漸進承壓)</b>。</li>\n<li>起床後盡早穿義肢(減腫脹、維持塑形),不任意脫下。</li>\n<li>上肢肌力訓練(伏地挺身)是強化<b>上肢/三頭肌</b>以利拄拐、轉位(非股四頭肌)。</li>\n</ul>\n"},"M9關節置換術與關節腔鏡":{"title":"M9 關節置換術與關節腔鏡 複習講義","html":"\n<h3>一、全髖關節置換術(THR)防脫位原則</h3>\n<ul>\n<li><b>髖屈曲不可>90度</b>(避免深坐、彎腰、蹲下、低矮軟深沙發);用長柄輔助物穿鞋襪。</li>\n<li><b>避免內收與內旋</b>:兩腿不交叉、<b>雙膝分開、夾外展枕(abduction pillow)</b>;翻向健側、雙腿間夾枕;患肢維持<b>外展、中立(避免外旋)</b>。</li>\n<li>早期做<b>等長收縮運動</b>;非骨水泥型約<b>6週後</b>才漸進承重,<b>骨水泥(骨泥)型隔天即可漸進下床</b>;6週內避免開車/性生活。</li>\n<li>最常見適應症=<b>退化性關節炎</b>;最常見長期併發症=<b>無菌性(非感染性)鬆脫</b>。</li>\n<li><b>脫位徵象</b>:患肢疼痛加劇、變短、內/外旋畸形、活動度<b>受限</b>(非增加)。</li>\n</ul>\n<h3>二、全膝關節置換術(TKR)</h3>\n<p>術後<b>抬高患肢</b>消腫;1~2天用<b>持續被動運動機(CPM)</b>每日增5~10度刺激軟骨癒合;併發DVT、腓神經麻痺;返家漸進活動,<b>勿多上下樓梯/走遠路</b>過度負荷。</p>\n<h3>三、關節腔鏡(arthroscopy)</h3>\n<p>檢查後需<b>休息、限制活動、漸進恢復(勿立即恢復日常活動)</b>;觀察關節血腫、神經血管功能、發燒紅腫等感染徵象。術後突發<b>胸痛、呼吸困難、蒼白冰冷→肺栓塞</b>。</p>\n"},"M10骨髓炎與骨腫瘤":{"title":"M10 骨髓炎與骨腫瘤 複習講義","html":"\n<h3>一、骨髓炎(osteomyelitis)</h3>\n<ul>\n<li>最常見致病菌:<b>金黃色葡萄球菌(Staphylococcus aureus)</b>。途徑:血行性、鄰近蔓延、開放性骨折/手術直接污染。</li>\n<li>症狀:發燒寒顫、局部劇痛壓痛、患肢呈<b>屈曲保護姿勢拒動拒觸</b>(黃色膿性分泌物;綠色分泌物屬綠膿桿菌、非常見)。</li>\n<li>診斷:<b>MRI最適早期診斷</b>;<b>骨組織切片+培養為確定診斷(黃金標準)</b>;ESR/CRP非專一。</li>\n<li>治療:<b>長期足量抗生素(首要)</b>+解熱鎮痛劑、手術清創引流移除死骨、高壓氧;<b>放射線治療無效(最少用)</b>。</li>\n<li>護理:抗生素按時不中斷;<b>傷口癒合前制動患肢(勿多做全關節運動)</b>;抬高患肢減痛;高壓氧時做耳壓平衡。</li>\n</ul>\n<h3>二、骨腫瘤</h3>\n<ul>\n<li>最常見<b>良性</b>骨腫瘤=<b>骨軟骨瘤(osteochondroma)</b>;巨細胞瘤良性但易轉惡性。</li>\n<li>最常見原發<b>惡性</b>=<b>骨肉瘤(osteosarcoma)</b>,好發長骨<b>幹骺端(膝周圍)</b>;<b>軟骨肉瘤(chondrosarcoma)為惡性</b>。</li>\n</ul>\n<h3>三、骨掃描(bone scan)</h3>\n<p><b>靜脈注射放射性同位素</b>(非口服顯影劑)、檢查時平臥、不需禁食或隔離;病變骨(感染/腫瘤/轉移/骨折)代謝活躍<b>吸收較多同位素</b>呈熱區,可診斷骨轉移。(偵測葡萄糖代謝是PET。)</p>\n"},"M11拐杖助行器與輔具步態":{"title":"M11 拐杖、助行器與輔具步態 複習講義","html":"\n<h3>一、助行器(walker)</h3>\n<p>高度與<b>手腕橫紋(股骨大轉子)同高</b>、握把時<b>手肘彎曲≦30度</b>;前移一步、四腳著地穩固後再踏步。</p>\n<h3>二、拐杖(crutch)使用</h3>\n<ul>\n<li>拐杖頂面距<b>腋下2~3指幅</b>;<b>體重由「雙手掌」承受,絕不可撐住腋窩</b>(壓迫腋神經血管→<b>拐杖麻痺crutch palsy</b>)。</li>\n<li>上下樓梯:<b>上樓「健肢先上」,下樓「患肢與拐杖先下」</b>(健肢上、患肢下)。</li>\n</ul>\n<h3>三、拐杖步態</h3>\n<ul>\n<li><b>三點式</b>:雙拐+患肢同時前進、健肢跟上,用於<b>一腳不宜/不能負重</b>(如石膏不負重)。</li>\n<li><b>二點式</b>:一拐與對側腳同時前進(雙腳可部分負重)。</li>\n<li><b>四點式</b>:四點交替前進(雙腳可負重、最穩最慢)。</li>\n<li><b>搖擺式</b>:雙拐前移、身體擺盪跟進,用於雙下肢癱瘓。</li>\n</ul>\n<h3>四、手杖(cane)</h3>\n<p>持於<b>健側(對側)手</b>(右腳無力→左手持杖),置於健側腳尖<b>前外側約6吋</b>,與患肢同時前進。</p>\n"},"M12肌肉骨骼評估理學檢查與腕隧道症候群":{"title":"M12 肌肉骨骼評估、理學檢查與腕隧道症候群 複習講義","html":"\n<h3>一、特殊試驗對應(高頻考點)</h3>\n<ul>\n<li><b>膝關節積液</b>:少量→<b>膨出徵象(Bulge sign)</b>;中大量→浮動試驗/髕骨輕拍(Ballottement test)。</li>\n<li><b>膝半月板</b>→<b>McMurray’s test</b>;<b>前十字韌帶(ACL)</b>→Lachman test、前抽屜試驗;後十字韌帶→後抽屜(小腿向後)。</li>\n<li><b>髖關節屈曲攣縮</b>→<b>Thomas test</b>(陽性=對側髖屈曲攣縮)。</li>\n<li><b>腕隧道症候群(正中神經)</b>→<b>Phalen’s test</b>(雙腕掌屈手背相對60秒、手指麻木)、<b>Tinel’s sign</b>(敲擊神經誘發刺麻)。</li>\n</ul>\n<h3>二、徒手肌力分級(0~5分)</h3>\n<ul>\n<li>0=無收縮;1=可觸收縮無動作;<b>2=去除地心引力下可全關節活動</b>(宜協助性主動運動);<b>3=可抗地心引力全關節活動、但不能抗阻力</b>;4=可抗部分阻力;5=正常。</li>\n<li>運動處方:0~1分→被動運動;2分→協助性主動運動;≥3分→主動運動;4~5分→加阻力運動。</li>\n</ul>\n<h3>三、腕隧道症候群 & 髖骨折評估</h3>\n<ul>\n<li>腕隧道:腕部<b>正中神經受壓</b>,好發<b>女性、30~50歲</b>、重複手腕動作;拇食中指麻木刺痛、夜間加重、大魚際肌萎縮。</li>\n<li>髖關節骨折:患肢<b>外旋且縮短</b>、疼痛無法負重。</li>\n</ul>\n"}};
const $=s=>document.querySelector(s);
