on) 時動作受限", "B": "X光檢查時常見關節腔變窄", "C": "常出現髖關節外觀之變形", "D": "若出現疼痛,常會從鼠蹊部蔓延至臀部"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "109_通論_其他_Q.pdf", "exam_tag": "109", "source": "MOHW", "topic": "骨關節炎與軟組織風濕", "topic_code": "R5", "topic_num": 5, "correction_note": ""}, {"id": "109-通論-其他-39", "roc_year": 109, "subject_group": "專科護理通論", "branch": "其他", "q_num": 39, "stem": "有關纖維肌痛 (fibromyalgia) 症候群,下列敘述何者正確?", "options": {"A": "通常病情會持續進展,嚴重者將來甚至可能會需要輔具協助才能行走", "B": "是一種自體免疫疾病", "C": "患者通常會主訴「全身都很痛」,且容易疲勞", "D": "好發族群,大部分是60歲以上的女性"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "109_通論_其他_Q.pdf", "exam_tag": "109", "source": "MOHW", "topic": "骨關節炎與軟組織風濕", "topic_code": "R5", "topic_num": 5, "correction_note": ""}, {"id": "111-通論-5分科-73", "roc_year": 111, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 73, "stem": "有關纖維肌痛症候群 ( fibromyalgia ) 的敘述,下列何者正確?", "options": {"A": "壓力、創傷或暴露於低溫環境中,易使病情惡化", "B": "常會伴隨關節發炎與皮膚紅斑之出現", "C": "通常會與患者的飲酒過量行為相關", "D": "老年女性是最常見的好發族群"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "111_通論_5分科_Q.pdf", "exam_tag": "111", "source": "MOHW", "topic": "骨關節炎與軟組織風濕", "topic_code": "R5", "topic_num": 5, "correction_note": ""}, {"id": "112-通論-其他-76", "roc_year": 112, "subject_group": "專科護理通論", "branch": "其他", "q_num": 76, "stem": "51 歲男性,平日務農,農暇時為兼職木工師傅。主訴右手掌疼痛約 3 個月,休息時會較 緩解。最近木工工作較多,無法休息,疼痛症狀愈來愈嚴重。身體診察時,右手遠端指骨 關節沒有發現希伯登氏結節 ( Heberden' s nodes ) ,其他指骨關節也無疼痛或腫脹,但在食指 及中指彎曲時,在手掌掌骨的區域有出現摩擦音及明顯疼痛。下列選項何者為最有可能 的診斷?", "options": {"A": "手部退化性關節炎 ( osteoarthritis )", "B": "右手掌屈指肌之腱鞘炎 ( tenosynovitis )", "C": "C 7 的神經根病變 ( radiculopathy )", "D": "右手之腕隧道症候群 ( carpal tunnel syndrome )"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "112_通論_其他_Q.pdf", "exam_tag": "112", "source": "MOHW", "topic": "骨關節炎與軟組織風濕", "topic_code": "R5", "topic_num": 5, "correction_note": ""}, {"id": "113-進階-家庭-11", "roc_year": 113, "subject_group": "進階專科護理", "branch": "家庭", "q_num": 11, "stem": "有關感染性關節炎的敘述,下列何者錯誤?", "options": {"A": "典型的病毒性關節炎是多關節,類似類風濕性關節炎", "B": "分枝桿菌性關節炎常侵犯多個關節,且以遠端關節為主", "C": "一旦懷疑是敗血性關節炎,就應該抽取關節液做檢查", "D": "細菌性關節炎最好發於膝關節,以疼痛、腫脹表現為主"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "113_進階_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "骨關節炎與軟組織風濕", "topic_code": "R5", "topic_num": 5, "correction_note": ""}, {"id": "113-進階-家庭-28", "roc_year": 113, "subject_group": "進階專科護理", "branch": "家庭", "q_num": 28, "stem": "85 歲病人,主訴右側膝蓋疼痛,強度約 6 - 7 分,感覺關節很腫脹,口服止痛藥可緩解部分 疼痛,平時大部分都以坐輪椅代步,可行走,但站或走久一點膝蓋就會更痛,最有可能的 診斷為?", "options": {"A": "乾癬性關節炎 ( psoriatic arthritis )", "B": "類風濕關節炎 ( rheumatoid arthritis )", "C": "退化性關節炎 ( osteoarthritis )", "D": "僵直性脊椎炎 ( ankylosing spondylitis )"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_進階_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "骨關節炎與軟組織風濕", "topic_code": "R5", "topic_num": 5, "correction_note": ""}, {"id": "113-進階-外科-76", "roc_year": 113, "subject_group": "進階專科護理", "branch": "外科", "q_num": 76, "stem": "關於下肢關節病變及其治療方式,下列敘述何者正確?", "options": {"A": "退化性關節炎之 X 光評估,可見軟骨下骨質硬化變形", "B": "類風濕性關節炎內翻變形 ( varus deformity ) ,可以採高位脛骨截骨術矯正", "C": "ficat and arlet stage III 股骨頭缺血性壞死,核心減壓術 ( core decompression ) 是最好的 治療方法", "D": "人工關節置換術後,發生急性感染最多的病源菌為鏈球菌 ( Streptococci )"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "113_進階_外科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "骨關節炎與軟組織風濕", "topic_code": "R5", "topic_num": 5, "correction_note": ""}, {"id": "110-進階-內科-75", "roc_year": 110, "subject_group": "進階專科護理", "branch": "內科", "q_num": 75, "stem": "有關蕁麻疹的相關敘述,下列何者正確?", "options": {"A": "侵犯皮膚包括表皮、真皮及皮下組織", "B": "絕大多數都可以找出過敏原", "C": "優先考慮使用高劑量類固醇注射治療", "D": "常見血液 IgE 參與"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "110_進階_內科_Q.pdf", "exam_tag": "110", "source": "MOHW", "topic": "免疫風濕治療與過敏免疫學", "topic_code": "R6", "topic_num": 6, "correction_note": ""}, {"id": "111-進階-內科-73", "roc_year": 111, "subject_group": "進階專科護理", "branch": "內科", "q_num": 73, "stem": "致命性全身嚴重過敏反應 ( anaphylaxis ) ,下列何者錯誤?", "options": {"A": "可能由食物、藥物、昆蟲叮咬引發", "B": "支氣管氣喘病史是主要的危險因子", "C": "大多數經由 IgG 引發", "D": "急救的第一步驟是肌肉注射 0.3 - 0.5 ml 腎上腺素 ( epinephrine )"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "111_進階_內科_Q.pdf", "exam_tag": "111", "source": "MOHW", "topic": "免疫風濕治療與過敏免疫學", "topic_code": "R6", "topic_num": 6, "correction_note": ""}, {"id": "112-進階-外科-32", "roc_year": 112, "subject_group": "進階專科護理", "branch": "外科", "q_num": 32, "stem": "免疫抑制劑之敘述,下列何者正確?", "options": {"A": "basiliximab ( Simulect ® ) 會結合 B 細胞上的受體,常用在誘導治療 ( induction therapy )", "B": "Tacrolimus ® 具有嚴重肝毒性,在肝臟移植病人無法使用", "C": "mycophenolic acid 是一種 mTOR 抑制劑,會阻斷 T 細胞的傳導", "D": "長期使用類固醇會造成高血醣、高血壓、傷口癒合不良等副作用"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "112_進階_外科_Q.pdf", "exam_tag": "112", "source": "MOHW", "topic": "免疫風濕治療與過敏免疫學", "topic_code": "R6", "topic_num": 6, "correction_note": ""}, {"id": "113-進階-家庭-24", "roc_year": 113, "subject_group": "進階專科護理", "branch": "家庭", "q_num": 24, "stem": "有關過敏性休克處置之敘述,下列何者錯誤?", "options": {"A": "呼吸道處置是第一優先", "B": "需要給予大量點滴時,膠體 ( colloid ) 溶液為首選", "C": "可給予 hydrocortisone 來防止雙相反應", "D": "epinephrine 是治療過敏性休克的首選藥物"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "113_進階_家庭_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "免疫風濕治療與過敏免疫學", "topic_code": "R6", "topic_num": 6, "correction_note": ""}, {"id": "113-進階-外科-77", "roc_year": 113, "subject_group": "進階專科護理", "branch": "外科", "q_num": 77, "stem": "關於免疫抑制劑的敘述,下列何者正確?", "options": {"A": "使用 mycophenolate mofetil ( MMF ) 不會發生腸胃不適的症狀", "B": "tacrolimus ( FK - 506 ) 常造成肝臟毒性,故不使用於肝臟移植", "C": "類固醇也是一種常見的免疫抑制劑,但長期使用容易造成高血糖", "D": "everolimus 是一種 mTOR 抑制劑,會阻斷 T 細胞的傳導"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_進階_外科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic": "免疫風濕治療與過敏免疫學", "topic_code": "R6", "topic_num": 6, "correction_note": ""}], E={"105-TNPA-通論-41": {"quick": "急性單一關節炎（飲酒、高尿酸）最合宜的檢查是「抽取關節液」鑑別痛風與化膿性關節炎，故 (C)。", "detail": {"background": "急性單一關節腫痛（acute monoarthritis）的標準處置是「關節穿刺抽取關節液（arthrocentesis）」分析——做細胞數、革蘭氏染色與培養（排除化膿性關節炎，這是不可漏掉的急症）、以及「偏光顯微鏡看結晶」（痛風＝尿酸鈉、負雙折射針狀；假性痛風＝焦磷酸鈣、正雙折射菱形）。本例 32 歲男性、飲酒、血尿酸 8–9（高）、突發右膝劇痛腫脹無發燒，臨床雖高度懷疑痛風，但「血尿酸值在急性發作期可正常或偏低，且不能單以尿酸高就診斷」，更重要的是「不能只靠臆測而漏掉化膿性關節炎」，故最合宜是抽關節液。ANA、RF 是針對 SLE/RA 的抗體，與急性單關節晶體性關節炎診斷無直接幫助；骨骼掃描非首選。", "options": {"A": "ANA 用於 SLE 等，對急性單關節晶體炎診斷無直接幫助。", "B": "RF 用於 RA，非急性單關節炎首選。", "C": "正確。抽關節液看結晶並排除化膿性關節炎，是急性單關節炎標準檢查。", "D": "骨骼掃描非急性單關節炎首選。"}, "sources": ["Harrison 21e（Approach to monoarticular arthritis; gout）"]}}, "107-TNPA-通論-45": {"quick": "急性單一關節（PIP）紅腫熱痛最不可能是「類風濕性關節炎」（RA 為慢性對稱多關節），故 (A)。", "detail": {"background": "急性「單一關節」紅腫熱痛的鑑別以「外傷、化膿性（敗血性）關節炎、晶體性關節炎（痛風/假性痛風）」為主——這些都可造成突發的單關節炎。「類風濕性關節炎（RA）」則是「慢性、對稱、多關節（小關節 MCP/PIP）」的發炎，典型是「逐漸」起病而非「這兩天突然」單一關節發作，故 RA「最不可能」是本例突發單一 PIP 關節痛的主因（答案 A）。雖然 RA 可侵犯 PIP，但其表現型態（慢性、對稱、多關節）與本題「突然、單一」不符。臨床上遇急性單關節炎仍應抽關節液排除化膿性與晶體性。", "options": {"A": "正確（最不可能）。RA 為慢性對稱多關節，非突發單關節。", "B": "外傷可造成急性單關節腫痛。", "C": "敗血性關節炎可造成急性單關節紅腫熱痛（須排除）。", "D": "痛風可造成急性單關節炎（如 PIP/MTP）。"}, "sources": ["Harrison 21e（Monoarthritis differential）"]}}, "108a-TNPA-內科-20": {"quick": "痛風急性發作但合併消化道潰瘍出血，NSAID 禁用，較適當選 colchicine，故 (B)。", "detail": {"background": "本例關節液「針狀、負雙折射結晶」＝尿酸鈉結晶＝痛風急性發作。痛風急性發作的治療三選一：NSAID、秋水仙素（colchicine）、皮質類固醇。選藥需依共病：本例「十二指腸潰瘍併上消化道出血」——NSAID「禁用」（加重胃腸道出血），故 (C) 不適當；皮質類固醇雖可用（尤多關節或腎功能差時），但本題鍵定較適當為「秋水仙素 colchicine（B）」（急性期低劑量）。抗生素（D）用於化膿性關節炎，本例革蘭氏染色無異常、為晶體性，不需。長期則需降尿酸（allopurinol/febuxostat），但急性期不貿然開始/停用降尿酸藥。故選 (B)。", "options": {"A": "類固醇可用但本題鍵定 colchicine；關節內或全身類固醇為合併禁忌時選項。", "B": "正確。合併消化道出血不能用 NSAID，急性痛風較適當用 colchicine。", "C": "NSAID 在消化道潰瘍出血者禁用。", "D": "抗生素用於化膿性關節炎；本例為晶體性，不需。"}, "sources": ["Harrison 21e（Acute gout treatment）；ACR Gout Guideline"]}}, "113-通論-家庭-67": {"quick": "強負偏光性結晶＝痛風，葡萄糖胺（用於退化性關節炎）最不適當，故 (D)。", "detail": {"background": "關節液「強負偏光性（negative birefringent）針狀結晶」＝尿酸鈉結晶＝痛風急性發作（對照：焦磷酸鈣為正雙折射、菱形＝假性痛風）。痛風急性期治療為 NSAID（A）、秋水仙素 colchicine（C）、或皮質類固醇 glucocorticoids（B）三選一。「葡萄糖胺（glucosamine）」是用於「退化性關節炎（OA）」的軟骨保健補充品，對痛風急性發作「無治療效果」，故最不適當（答案 D）。緩解後依適應症長期降尿酸（allopurinol/febuxostat）並維持 NSAID/colchicine 預防。", "options": {"A": "NSAID 為痛風急性期治療選項之一。", "B": "皮質類固醇為痛風急性期治療選項之一。", "C": "秋水仙素為痛風急性期治療選項之一。", "D": "最不適當（為答案）。葡萄糖胺用於退化性關節炎，對痛風無效。"}, "sources": ["Harrison 21e（Gout; crystal analysis）"]}}, "114-進階-家庭-31": {"quick": "秋水仙素副作用以腹瀉、肌病（茶色尿/橫紋肌溶解）、神經肌肉與意識變化為主，「頭痛」不典型，故 (C)。", "detail": {"background": "秋水仙素（colchicine）治療痛風，其毒性在「腎功能不全（如本例 CKD 第 4 期）會蓄積而增加」，須減量並監測。常見/重要副作用：(A)「腹瀉、噁心」等腸胃道症狀（最常見，常為過量的早期警訊）；(B)「肌肉病變（myopathy）／橫紋肌溶解」——肌肉痠痛、無力、肌酸激酶上升、肌紅蛋白尿（茶色尿），尤在腎功能差或併用 statin/CYP3A4 抑制劑時；(D) 嚴重中毒可有骨髓抑制與「多重器官／意識變化」。而「頭痛（C）」並非 colchicine 的典型副作用，故為答案。CKD 病人用 colchicine 須特別謹慎劑量。", "options": {"A": "腹瀉為 colchicine 最常見副作用（過量早期警訊）。", "B": "肌病/橫紋肌溶解（茶色尿）為重要副作用，腎功能差時風險增。", "C": "正確（不包括）。頭痛非 colchicine 典型副作用。", "D": "嚴重中毒可有意識變化（多重器官毒性）。"}, "sources": ["Harrison 21e（Colchicine toxicity）"]}}, "105-TNPA-通論-29": {"quick": "類風濕性關節炎為「對稱、多關節」侵犯，非單一大關節，故敘述 (A) 錯。", "detail": {"background": "類風濕性關節炎（RA）是慢性、自體免疫性、「對稱性、多關節」的滑膜發炎，典型侵犯「手部小關節（MCP、PIP）與腕關節」，並「不侵犯遠端指間關節（DIP）」（這點與退化性關節炎、乾癬性關節炎不同）。(A)「常為單一關節發作如膝關節」錯誤——那較像晶體性或化膿性單關節炎；RA 是多關節對稱。(B) 常有關節外表現（皮下結節、間質性肺病、漿膜炎、鞏膜炎、血管炎、Felty 等）——正確。(C) 侵犯手部時「較不影響 DIP」——正確。(D) 血中類風濕因子（RF）與 anti-CCP 常陽性——正確。故錯誤者為 (A)。", "options": {"A": "錯誤（為答案）。RA 為對稱多關節侵犯，非單一大關節。", "B": "正確。RA 常有關節外表現。", "C": "正確。RA 侵犯手部時較不影響遠端指間關節（DIP）。", "D": "正確。RF（及 anti-CCP）常呈陽性。"}, "sources": ["Harrison 21e（Rheumatoid arthritis）"]}}, "110-進階-內科-76": {"quick": "晨僵>1 小時、對稱小關節（PIP/MCP/腕）腫痛＝類風濕性關節炎，RF 最可能陽性，故 (D)。", "detail": {"background": "本例 50 歲女性、「晨僵每天>2 小時且持續 6 個月」、對稱性「PIP、MCP、腕關節」壓痛腫脹——是類風濕性關節炎（RA）的典型（慢性、對稱、小關節、長時間晨僵>1 小時）。最可能陽性/異常上升的檢查是「類風濕因子（RF）」（及 anti-CCP，後者特異度更高）。對照：anti-dsDNA 是 SLE 的特異抗體（A）；CPK（肌酸激酶）上升見於發炎性肌病（B）；HLA-B27 與脊椎關節病變相關（C）。故 RA 最可能 RF 陽性（D）。診斷依 2010 ACR/EULAR 分類標準（關節數、血清學、急性期反應物、症狀時程）。", "options": {"A": "anti-dsDNA 為 SLE 特異抗體，非 RA。", "B": "CPK 上升見於發炎性肌病（多發性肌炎/皮肌炎）。", "C": "HLA-B27 與脊椎關節病變相關，非 RA。", "D": "正確。RA 的 RF（及 anti-CCP）最可能陽性。"}, "sources": ["Harrison 21e；2010 ACR/EULAR RA criteria"]}}, "111-進階-內科-72": {"quick": "RA 早期典型侵犯「手足小關節（MCP/PIP/MTP）」對稱發作，「早期典型侵犯手腕」非其最具代表的臨床表徵，故 (C)。", "detail": {"background": "類風濕性關節炎（RA）的重要臨床表徵：(A) 晨僵（morning stiffness，常>1 小時）——是。(B) 關節炎多為「對稱性」分佈——是。(D) 血清中類風濕因子（RF，及 anti-CCP）升高——是。(C) RA 早期最典型是「手與足的小關節——掌指關節（MCP）、近端指間關節（PIP）、蹠趾關節（MTP）」對稱發作（DIP 通常不侵犯）；腕關節雖也常受侵犯，但題目以「早期典型常侵犯手腕關節」作為「不是重要臨床表徵」的選項——相較於 MCP/PIP/MTP 小關節，把「手腕」列為早期典型代表並不貼切，故 (C) 為答案。重點記憶：RA＝對稱、小關節（MCP/PIP/MTP）、晨僵>1 小時、RF/anti-CCP 陽性、不侵犯 DIP。", "options": {"A": "是重要表徵。晨僵（常>1 小時）。", "B": "是重要表徵。關節炎對稱分佈。", "C": "為答案。RA 早期典型侵犯 MCP/PIP/MTP 小關節，以「手腕」為早期典型代表不貼切。", "D": "是重要表徵。RF（及 anti-CCP）升高。"}, "sources": ["Harrison 21e（Rheumatoid arthritis; clinical features）"]}}, "112-進階-內科-76": {"quick": "甲狀腺機能低下不是類風濕性關節炎的關節外表現，故 (C)。", "detail": {"background": "類風濕性關節炎（RA）的「關節外表現（extra-articular）」反映其全身性發炎/自體免疫本質，包括：(A) 骨質疏鬆（慢性發炎＋類固醇使用）；(B) 腎臟病變（如續發性澱粉樣變性、藥物相關，或膜性腎病變）；(D) 間質性肺病（ILD，RA 重要肺部表現）；另有皮下類風濕結節、漿膜炎（心包/肋膜炎）、鞏膜炎、血管炎、Felty 症候群（RA＋脾腫＋嗜中性球低下）、貧血等。(C)「甲狀腺機能低下」是另一種自體免疫疾病（橋本氏甲狀腺炎），「並非 RA 的關節外表現」（雖自體免疫疾病間可共病，但非 RA 直接的關節外表現），故為答案。", "options": {"A": "是。骨質疏鬆為 RA 關節外表現。", "B": "是。可有腎病變（膜性/澱粉樣/藥物相關）。", "C": "正確（不是）。甲狀腺機能低下非 RA 關節外表現。", "D": "是。間質性肺病為 RA 重要關節外表現。"}, "sources": ["Harrison 21e（RA extra-articular manifestations）"]}}, "114-進階-內科-71": {"quick": "類風濕性關節炎最主要的遺傳風險因子位於 HLA-DRB1（shared epitope），故 (A)。", "detail": {"background": "類風濕性關節炎（RA）有遺傳易感性，最主要的遺傳風險因子位於「第 6 對染色體的 MHC class II——HLA-DRB1」基因，特定等位基因帶有「共同抗原決定位（shared epitope）」者罹病與重症風險增加（與 anti-CCP 陽性相關）。其他基因（如 PTPN22、PADI4）影響較小。對照：IL-6（B）、TNF-α（C）是 RA 發炎路徑的「治療標靶（生物製劑）」而非主要遺傳風險基因；TP53（D）是腫瘤抑制基因，與 RA 遺傳無關。故主要遺傳風險區域為 HLA-DRB1（A）。", "options": {"A": "正確。HLA-DRB1（shared epitope）為 RA 最主要遺傳風險因子。", "B": "IL-6 是發炎路徑與治療標靶，非主要遺傳風險基因。", "C": "TNF-α 是治療標靶（生物製劑），非主要遺傳風險基因。", "D": "TP53 為腫瘤抑制基因，與 RA 遺傳無關。"}, "sources": ["Harrison 21e（RA genetics; HLA-DRB1 shared epitope）"]}}, "106-106b-內科-78": {"quick": "過敏性紫斑（HSP）的紫斑好發於下肢/臀部等重力部位，故 (B)。", "detail": {"background": "過敏性紫斑（Henoch-Schönlein purpura, HSP；即 IgA 血管炎）是兒童最常見的小血管炎，常於上呼吸道感染後發生，四聯表現：「可觸性紫斑（palpable purpura）、關節痛、腹痛、腎炎」。(A) 血管壁免疫螢光找到的是「IgA」沉積（非 IgG）——故 A 錯。(B) 紫斑/紅疹好發於「下肢與臀部等重力相依（gravity-dependent）部位」對稱分布——正確。(C) 腸胃道症狀（腹痛、嘔吐、腸套疊、出血）相當常見（約 50–75%，非僅 10%）——故 C 錯。(D) 多數自限、預後佳，「復發率約 1/3（非 90%）」——故 D 錯。故正確為 (B)。腎臟侵犯（IgA 腎病變型）是長期預後關鍵，需追蹤尿液。", "options": {"A": "錯。免疫螢光為 IgA 沉積，非 IgG。", "B": "正確。紫斑好發下肢/臀部等重力相依部位。", "C": "錯。腸胃道症狀常見（約 50–75%），非僅 10%。", "D": "錯。復發率約 1/3，非 90% 以上。"}, "sources": ["Harrison 21e（IgA vasculitis / Henoch-Schönlein purpura）"]}}, "108a-TNPA-通論-62": {"quick": "SLE 造成白血球「減少」，故「白血球上升」不應出現，為 (D)。", "detail": {"background": "本例年輕女性「關節痛、光敏感、臉部蝴蝶斑、ANA 陽性」＝全身性紅斑性狼瘡（SLE）。SLE 的血液與多系統表現包括：(A)「血小板低下」、(B)「自體免疫溶血性貧血」、白血球/淋巴球「減少（leukopenia/lymphopenia）」、(C)「腎炎—尿中細胞圓柱體（cast）、蛋白尿、血尿」、漿膜炎、神經精神症狀等。SLE 的血球變化是「全血球『減少』」傾向，故「白血球『上升』（D）」不應出現（白血球上升反而提示感染等其他原因）。診斷依 2019 EULAR/ACR 分類標準（ANA 為入門條件，加臨床與免疫學項目計分）。", "options": {"A": "可出現。SLE 常見血小板低下。", "B": "可出現。SLE 可有自體免疫溶血性貧血。", "C": "可出現。狼瘡腎炎可見尿中細胞圓柱體。", "D": "正確（不應出現）。SLE 造成白血球「減少」，非上升。"}, "sources": ["Harrison 21e（SLE; cytopenias）；2019 EULAR/ACR SLE criteria"]}}, "113-進階-家庭-27": {"quick": "SLE 病人不應「減少運動」，反而應維持適度活動以保關節功能，故衛教 (C) 最不適當。", "detail": {"background": "本例蝴蝶斑、關節痛、發燒、血尿（疑狼瘡腎炎）＝SLE。護理衛教：(A) 接受免疫抑制治療者免疫力下降，須「避免感染」（手部衛生、避免人潮、注意發燒）——適當。(B) SLE 好發育齡女性，懷孕有疾病惡化與胎兒風險，「懷孕計畫須與醫師討論、選擇疾病穩定期並調整用藥」——適當。(D) 使用免疫抑制劑者「避免接種活性減毒疫苗」（可接種不活化疫苗）——適當。(C) 「減少運動量來改善關節疼痛」不適當——應「維持適度規律運動／關節活動與肌力訓練」以保持關節功能、避免僵硬與肌肉萎縮，並注意防曬（光敏感）、均衡作息；過度減少活動反致失能。故最不適當為 (C)。", "options": {"A": "適當。免疫抑制治療者須避免感染。", "B": "適當。懷孕風險高，計畫須配合醫師。", "C": "最不適當（為答案）。應維持適度運動以保關節功能，非減少運動。", "D": "適當。免疫抑制劑使用者不建議施打活性減毒疫苗。"}, "sources": ["Harrison 21e（SLE management）；病人衛教原則"]}}, "113-進階-家庭-58": {"quick": "橫紋肌溶解的治療是「鹼化尿液」而非「酸化」，故配對 (D) 最不適當。", "detail": {"background": "本例同前（蝴蝶斑、關節痛、發燒、血尿、腰痛），鑑別診斷與處置配對：(A) 泌尿道感染→抗生素——合理。(B) 尿路結石→點滴輸液（促排石、止痛）——合理。(C) 紅斑性狼瘡（狼瘡腎炎）→皮質類固醇（±免疫抑制劑）——合理。(D) 「橫紋肌溶解症」的治療是「大量輸液＋『鹼化尿液（urine alkalinization，給碳酸氫鈉）』」以促進肌紅蛋白排出、保護腎臟，「並非『血液/尿液酸化』」——故此配對最不適當（答案 D）。酸化反而促進肌紅蛋白沉澱、加重腎損傷。故選 (D)。", "options": {"A": "合理。泌尿道感染給抗生素。", "B": "合理。尿路結石給點滴輸液。", "C": "合理。狼瘡腎炎給皮質類固醇。", "D": "最不適當（為答案）。橫紋肌溶解應「鹼化尿液」，非酸化。"}, "sources": ["Harrison 21e（Rhabdomyolysis; urine alkalinization）"]}}, "113-進階-內科-76": {"quick": "SLE 分類標準不含「白血球增高」（SLE 是白血球減少），故 (A)。", "detail": {"background": "2019 EULAR/ACR 的 SLE 分類標準以「ANA 陽性」為入門條件，再就臨床與免疫學各領域計分，臨床項目包括：發燒、「血液學—白血球減少（leukopenia）、血小板低下、自體免疫溶血」、「皮膚黏膜—非疤痕性掉髮（non-scarring alopecia，B）、口腔潰瘍、急性皮膚狼瘡」、「神經精神—譫妄（delirium，C）、精神病、癲癇」、「漿膜—急性心包炎/積液（D）、肋膜積液」、「腎—蛋白尿、腎炎」、關節炎；免疫學項目含抗磷脂抗體、補體下降、anti-dsDNA/anti-Sm。其中血液學是「白血球『減少』」，故「白血球『增高』（A）」「不」屬於 SLE 分類標準（答案）。", "options": {"A": "正確（不包含）。SLE 為白血球「減少」，非增高。", "B": "包含。非疤痕性掉髮為皮膚黏膜項目。", "C": "包含。譫妄為神經精神項目。", "D": "包含。急性心包炎為漿膜項目。"}, "sources": ["2019 EULAR/ACR SLE classification criteria；Harrison 21e"]}}, "111-通論-5分科-72": {"quick": "僵直性脊椎炎為「血清陰性」脊椎關節病變，類風濕因子通常「陰性」，故敘述 (C) 錯。", "detail": {"background": "僵直性脊椎炎（ankylosing spondylitis, AS）屬「血清陰性脊椎關節病變（seronegative spondyloarthropathy）」，與「HLA-B27」高度相關。(A) 「附著點炎（enthesitis）」是其特徵，常見阿基里斯腱與跟骨接觸處發炎——正確。(B) 屬血清陰性脊椎關節病變——正確。(C) 「類風濕因子（RF）通常為『陰性』」（故稱血清陰性），題目寫「通常為陽性」——錯誤（答案）。(D) 常合併「前葡萄膜炎/虹膜炎（uveitis）」——正確。AS 典型為年輕男性、發炎性下背痛（晨僵、活動後改善）、薦腸關節炎、脊椎竹竿狀融合；治療用 NSAID、運動復健、TNF/IL-17 抑制劑。故錯誤者為 (C)。", "options": {"A": "正確。附著點炎（阿基里斯腱跟骨處）為特徵。", "B": "正確。屬血清陰性脊椎關節病變。", "C": "錯誤（為答案）。AS 的 RF 通常為陰性（血清陰性）。", "D": "正確。常合併虹膜炎/前葡萄膜炎。"}, "sources": ["Harrison 21e（Ankylosing spondylitis）"]}}, "112-進階-內科-73": {"quick": "軸心型脊椎關節炎的急性期反應物以「CRP 升高」為診斷特徵；「ESR 升高」非其分類條件，故 (C)。", "detail": {"background": "軸心型脊椎關節炎（axial spondyloarthritis, axSpA）的 ASAS 分類標準：以「影像顯示薦腸關節炎（D，X 光或 MRI）」或「HLA-B27 陽性（A）」為起點，加上 SpA 特徵（發炎性下背痛、關節炎、附著點炎、「指炎 dactylitis（B）」、葡萄膜炎、乾癬、發炎性腸病、對 NSAID 反應良好、家族史、「CRP 升高」）。其中急性期反應物列的是「CRP 升高」，而「ESR 升高（C）」並非 ASAS 標準明列項目，故為「不是診斷條件之一」（答案 C）。臨床上 ESR、CRP 都可反映發炎，但分類標準採 CRP。", "options": {"A": "是條件。HLA-B27 陽性為起點之一。", "B": "是條件。指炎（dactylitis）為 SpA 特徵。", "C": "正確（不是）。ASAS 標準列 CRP 升高，非 ESR。", "D": "是條件。影像薦腸關節炎為起點之一。"}, "sources": ["ASAS axial SpA classification criteria；Harrison 21e"]}}, "113-進階-內科-77": {"quick": "軸心型脊椎關節炎的特徵是「對 NSAID 反應良好」而非 acetaminophen，故 (C)。", "detail": {"background": "軸心型脊椎關節炎（axSpA）ASAS 分類標準的 SpA 特徵包括：(A) 前葡萄膜炎（anterior uveitis）、(B) 乾癬（psoriasis）、發炎性腸病、發炎性下背痛、關節炎、附著點炎、指炎、(D) 家族史有脊椎關節炎、HLA-B27、CRP 升高，以及「對『NSAID（非類固醇抗發炎藥）』反應良好」。(C) 寫「對 acetaminophen 治療反應良好」——錯誤，特徵是對「NSAID」反應良好（acetaminophen 對發炎性脊椎關節炎效果有限），故為「不包含」的項目（答案 C）。axSpA 的發炎性下背痛特點：年輕起病、晨僵、活動後改善、休息不緩解、夜間痛。", "options": {"A": "包含。前葡萄膜炎為 SpA 特徵。", "B": "包含。乾癬為 SpA 特徵。", "C": "正確（不包含）。特徵為「對 NSAID 反應良好」，非 acetaminophen。", "D": "包含。家族史有脊椎關節炎。"}, "sources": ["ASAS axial SpA criteria；Harrison 21e"]}}, "114-進階-內科-72": {"quick": "發炎性下背痛（晨重、活動改善）＋周邊關節炎、anti-CCP 陰性、無乾癬/腸症＝僵直性脊椎炎，故 (D)。", "detail": {"background": "本例「持續性下背痛、清晨更嚴重、活動後減輕（＝發炎性下背痛）」＋右膝右踝腫脹（周邊關節炎）、「皮膚指甲正常（無乾癬）」、「無腸道症狀」、anti-CCP 陰性——最符合「僵直性脊椎炎（ankylosing spondylitis，軸心型脊椎關節炎）」。鑑別：乾癬性關節炎（A）需有乾癬皮膚/指甲變化（本例無）；未分化周邊脊椎關節炎（B）以周邊為主、無明顯軸心（本例軸心下背痛明顯）；類風濕性關節炎（C）為對稱小關節、anti-CCP 常陽性（本例陰性、且為軸心下背痛）。發炎性下背痛＋軸心為主＝AS。故選 (D)。HLA-B27 與影像薦腸關節炎可進一步支持。", "options": {"A": "乾癬性關節炎需乾癬皮膚/指甲變化，本例無。", "B": "未分化周邊 SpA 以周邊為主，本例軸心下背痛明顯。", "C": "RA 為對稱小關節、anti-CCP 常陽性（本例陰性、軸心痛）。", "D": "正確。發炎性下背痛＋軸心為主＋anti-CCP 陰性＝僵直性脊椎炎。"}, "sources": ["Harrison 21e（Axial spondyloarthritis / ankylosing spondylitis）"]}}, "114-進階-內科-73": {"quick": "腸道（沙門氏菌）感染後 2 週出現關節炎＋結膜炎＝反應性關節炎，故 (B)。", "detail": {"background": "「反應性關節炎（reactive arthritis，舊稱 Reiter 症候群）」是在「腸道（Salmonella、Shigella、Campylobacter、Yersinia）或泌尿生殖道（Chlamydia）感染後 1–4 週」出現的「無菌性」關節炎，典型三聯為「關節炎＋尿道炎＋結膜炎」（「不能爬、不能尿、不能看」），屬血清陰性脊椎關節病變、與 HLA-B27 相關。本例「沙門氏菌腸炎後 2 週出現右膝關節炎＋結膜炎」正符合反應性關節炎（B）。鑑別：化膿性關節炎（A）是關節「直接」細菌感染（關節液培養陽性），非感染後無菌性；痛風（C）為晶體性；退化性關節炎（D）為慢性退化。故選 (B)。治療以 NSAID 為主，多自限。", "options": {"A": "化膿性關節炎為關節直接感染（培養陽性），非感染後無菌性反應。", "B": "正確。腸道感染後關節炎＋結膜炎＝反應性關節炎。", "C": "痛風為晶體性關節炎，與感染後無關。", "D": "退化性關節炎為慢性退化，非急性感染後。"}, "sources": ["Harrison 21e（Reactive arthritis）"]}}, "106-106a-通論-50": {"quick": "肩痛、夜間痛、主動與被動活動範圍均受限、X 光無異常＝沾黏性關節囊炎（冰凍肩），故 (C)。", "detail": {"background": "本例 50 歲女性、左肩「痠痛、無法舉高、夜間痛到無法側睡、肩關節活動範圍受限、X 光無特別發現」——是「沾黏性關節囊炎（adhesive capsulitis，俗稱冰凍肩 frozen shoulder）」的典型：關節囊發炎纖維化攣縮，造成「主動與被動」活動範圍都受限、夜間痛、無外傷感染、影像多正常，好發 40–60 歲（女性、糖尿病者較多）。對照：RA（A）為對稱多關節；退化性關節炎（B）肩部較少且影像會有退化變化；肱（題誤植三頭）肌腱炎（D）多為特定動作誘發的局部肌腱痛、被動活動範圍相對保留。故選 (C)。治療：止痛、物理治療（關節活動）、必要時關節內注射。", "options": {"A": "RA 為對稱多關節炎，非單肩活動受限。", "B": "退化性關節炎影像多有退化變化，肩部較少見此表現。", "C": "正確。主被動活動皆受限＋夜間痛＋影像正常＝沾黏性關節囊炎（冰凍肩）。", "D": "肌腱炎多為特定動作誘發局部痛，被動活動相對保留。"}, "sources": ["Harrison 21e（Adhesive capsulitis / frozen shoulder）"]}}, "106-106a-外科-69": {"quick": "石膏固定後腳趾發紺、被動牽動劇痛＝腔室症候群，應立即剪開石膏減壓並抬高，故 (D)。", "detail": {"background": "本例術後「長腿石膏固定」後出現「腳趾麻痺、發紺、被動搬動腳趾時劇痛」——是「腔室症候群（compartment syndrome）」的警訊（6P：劇痛 pain，尤其『被動牽張痛 pain on passive stretch』最早、感覺異常 paresthesia、蒼白/發紺 pallor、無脈 pulselessness 為晚期、麻痺 paralysis）。第一步處置是「立即解除外部壓迫——將石膏與棉墊『完全剪開』減壓」並抬高患肢，緊急會診，必要時測腔室壓、行筋膜切開術（fasciotomy）；延誤會造成不可逆的肌肉神經壞死。故 (D) 最適當。其餘：血管攝影（A）耗時延誤；只給止痛抬高（B）未解除壓迫；冰敷＋抗凝（C）會加重缺血、且非處置方向。", "options": {"A": "血管攝影耗時，延誤腔室症候群處置。", "B": "僅止痛抬高未解除外部壓迫，不足。", "C": "冰敷＋抗凝會加重缺血，方向錯誤。", "D": "正確。立即剪開石膏減壓並抬高，必要時筋膜切開。"}, "sources": ["Harrison 21e（Compartment syndrome）"]}}, "109-通論-其他-37": {"quick": "退化性髖關節炎較少出現「明顯外觀變形」，故敘述 (C) 錯。", "detail": {"background": "退化性（骨）關節炎（osteoarthritis, OA）侵犯髖關節時：(A) 「最早出現的徵候常是『內旋（internal rotation）受限』」——正確（髖 OA 早期內旋與外展先受限）。(B) X 光可見「關節腔變窄（軟骨流失）」、軟骨下骨硬化、骨刺、軟骨下囊腫——正確。(D) 髖 OA 的疼痛常「從鼠蹊部（groin）」開始並可轉移至臀部、大腿前側甚至膝——正確。(C) 髖 OA 「較少出現明顯的外觀變形」（不像 RA 晚期或發炎性關節炎會有明顯變形；髖部深在，外觀變形不明顯）——故此敘述錯誤（答案）。OA 為退化性、非對稱、活動後加重休息緩解、晨僵<30 分鐘。", "options": {"A": "正確。早期常內旋受限。", "B": "正確。X 光見關節腔變窄。", "C": "錯誤（為答案）。髖 OA 較少出現明顯外觀變形。", "D": "正確。疼痛常從鼠蹊部蔓延至臀部。"}, "sources": ["Harrison 21e（Osteoarthritis of the hip）"]}}, "109-通論-其他-39": {"quick": "纖維肌痛症候群以「全身廣泛疼痛＋易疲勞」為特徵，故 (C)。", "detail": {"background": "纖維肌痛症候群（fibromyalgia）是一種「中樞痛覺處理異常（central sensitization）」的慢性廣泛疼痛症候群，「非自體免疫、非發炎性、無關節破壞」。(C) 患者典型主訴「全身到處都痛（廣泛性肌肉骨骼疼痛）」並伴「疲勞、睡眠障礙、認知（腦霧）、頭痛、腸躁」——正確。(A) 「不會進行性破壞關節、不會致殘需輔具」（與 RA 不同，無結構破壞）——故 A 錯。(B) 「不是自體免疫疾病」——故 B 錯。(D) 好發族群是「中年女性（約 30–50 歲）」，非 60 歲以上——故 D 錯。故正確為 (C)。診斷靠廣泛疼痛指數與症狀量表（非實驗室/影像），治療以運動、衛教、睡眠、抗鬱/抗癲癇藥（如 duloxetine、pregabalin）。", "options": {"A": "錯。纖維肌痛不破壞關節、不致殘需輔具。", "B": "錯。非自體免疫疾病。", "C": "正確。全身廣泛疼痛＋易疲勞為特徵。", "D": "錯。好發中年女性（30–50 歲），非 60 歲以上。"}, "sources": ["Harrison 21e（Fibromyalgia）"]}}, "111-通論-5分科-73": {"quick": "壓力、創傷或寒冷易使纖維肌痛惡化，故 (A)。", "detail": {"background": "纖維肌痛症候群（fibromyalgia）：(A) 「壓力、創傷、寒冷、睡眠不足、情緒」等會誘發或惡化症狀——正確（與中樞敏感化、自律神經與睡眠失調有關）。(B) 「不伴隨關節發炎與皮膚紅斑」（無發炎、無關節破壞、檢驗影像正常）——故 B 錯。(C) 「與飲酒過量無因果關係」——故 C 錯。(D) 好發「中年女性（30–50 歲）」而非老年女性——故 D 錯。故正確為 (A)。治療強調「有氧運動、睡眠衛生、認知行為治療」與藥物（duloxetine、milnacipran、pregabalin、amitriptyline），避免只用鴉片。", "options": {"A": "正確。壓力、創傷、寒冷易使纖維肌痛惡化。", "B": "錯。不伴關節發炎與皮膚紅斑。", "C": "錯。與飲酒過量無因果關係。", "D": "錯。好發中年女性，非老年女性。"}, "sources": ["Harrison 21e（Fibromyalgia）"]}}, "112-通論-其他-76": {"quick": "手掌掌骨區彎曲手指時有摩擦音與疼痛、無 Heberden 結節＝屈指肌腱腱鞘炎（板機指），故 (B)。", "detail": {"background": "本例反覆手部用力（木工）、「右手掌疼痛、休息緩解、彎曲食指中指時於『掌骨區（掌指關節掌側）』出現『摩擦音與疼痛』、遠端指間關節『無 Heberden 結節』、其他指關節無腫痛」——最符合「屈指肌之腱鞘炎（flexor tenosynovitis，即板機指 trigger finger 的病理）」：反覆使用致屈指肌腱與腱鞘發炎、增厚，肌腱滑動時卡頓、有摩擦音/喀嗒感與疼痛。對照：手部退化性關節炎（A）會有 Heberden（DIP）/Bouchard（PIP）結節（本例「無」）；C7 神經根病變（C）為頸源放射痛/特定皮節麻木無力；腕隧道症候群（D）為正中神經分布（拇食中指）麻木、夜間加劇、Tinel/Phalen 陽性，非掌側肌腱摩擦音。故選 (B)。治療：休息、副木、NSAID、局部類固醇注射，必要時手術。", "options": {"A": "手部 OA 會有 Heberden/Bouchard 結節，本例無。", "B": "正確。掌側肌腱摩擦音＋彎曲痛＋無結節＝屈指肌腱腱鞘炎（板機指）。", "C": "C7 神經根病變為放射痛/皮節症狀，非掌側肌腱摩擦音。", "D": "腕隧道症候群為正中神經麻木（拇食中指），非肌腱摩擦音。"}, "sources": ["Harrison 21e（Soft-tissue rheumatism; tenosynovitis）"]}}, "113-進階-家庭-11": {"quick": "分枝桿菌（結核）性關節炎多為「單一關節、侵犯大的負重關節（脊椎/髖）」，故敘述 (B) 錯。", "detail": {"background": "感染性關節炎：(A) 「病毒性關節炎」常為「多關節、對稱、類似 RA」（如 parvovirus B19、HBV、rubella、chikungunya），多自限——正確。(B) 「分枝桿菌（結核）性關節炎」典型是「『單一關節』、慢性、侵犯『大的負重關節（脊椎 Pott’s disease、髖、膝）』」，而非「多關節且以遠端關節為主」——故此敘述錯誤（答案）。(C) 一旦懷疑「敗血性（化膿性）關節炎」就應「立即抽關節液」做細胞數、染色、培養（是不可延誤的急症）——正確。(D) 細菌性（化膿性）關節炎最好發於「膝關節」，以急性疼痛、腫脹、發燒表現——正確。故錯誤者為 (B)。", "options": {"A": "正確。病毒性關節炎多為對稱多關節（類似 RA）。", "B": "錯誤（為答案）。結核性關節炎多為單一關節、侵犯大負重關節（脊椎/髖）。", "C": "正確。疑敗血性關節炎應立即抽關節液檢查。", "D": "正確。細菌性關節炎最好發於膝關節。"}, "sources": ["Harrison 21e（Infectious arthritis; tuberculous arthritis）"]}}, "113-進階-家庭-28": {"quick": "85 歲、負重時加劇的膝關節疼痛腫脹＝退化性關節炎，故 (C)。", "detail": {"background": "本例 85 歲、右膝疼痛腫脹、「站或走久（負重活動）就更痛、休息與止痛藥可部分緩解」——是「退化性（骨）關節炎（osteoarthritis, OA）」的典型：高齡、負重大關節（膝、髖）、「活動後加重、休息緩解」、晨僵短（<30 分鐘）、可有關節積液與骨擦音，X 光見關節腔變窄、骨刺、軟骨下硬化。對照：乾癬性關節炎（A）需乾癬皮膚變化；類風濕性關節炎（B）為對稱小關節、晨僵>1 小時、RF/anti-CCP 陽性；僵直性脊椎炎（D）為年輕人的軸心發炎性下背痛。故高齡負重型膝痛＝OA（C）。治療：運動/減重、physical therapy、acetaminophen/NSAID、關節內注射，末期人工關節置換。", "options": {"A": "乾癬性關節炎需乾癬皮膚/指甲變化。", "B": "RA 為對稱小關節、長晨僵、血清陽性。", "C": "正確。高齡＋負重加劇膝痛＝退化性關節炎。", "D": "僵直性脊椎炎為年輕人軸心發炎性下背痛。"}, "sources": ["Harrison 21e（Osteoarthritis）"]}}, "113-進階-外科-76": {"quick": "退化性關節炎 X 光可見「軟骨下骨質硬化」，故 (A) 正確。", "detail": {"background": "下肢關節病變與治療：(A) 「退化性關節炎（OA）」的 X 光四大特徵＝「關節腔變窄、軟骨下『骨質硬化（subchondral sclerosis）』、骨刺（osteophyte）、軟骨下囊腫」——正確。(B) 「高位脛骨截骨術（HTO）」是矯正「膝『內翻（varus）』合併內側單室 OA」的手術，用於「退化性關節炎」而非「類風濕性關節炎」（RA 為發炎破壞、多用藥物/全人工關節）——故 B 錯。(C) 股骨頭缺血性壞死「Ficat stage III（已塌陷）」時「核心減壓術效果差」，核心減壓僅適用於「早期（stage I–II，未塌陷）」，stage III 多需人工關節置換——故 C 錯。(D) 人工關節置換術後「急性感染最常見病原為『葡萄球菌（Staphylococcus，含表皮葡萄球菌/金黃色葡萄球菌）』」，非鏈球菌——故 D 錯。故正確為 (A)。", "options": {"A": "正確。OA 的 X 光見軟骨下骨質硬化（及關節腔變窄、骨刺）。", "B": "錯。高位脛骨截骨術用於 OA 內翻變形，非 RA。", "C": "錯。Ficat III（已塌陷）核心減壓效果差，僅早期適用。", "D": "錯。人工關節術後急性感染最常見為葡萄球菌，非鏈球菌。"}, "sources": ["Harrison 21e（Osteoarthritis; prosthetic joint infection）"]}}, "110-進階-內科-75": {"quick": "蕁麻疹常有血液 IgE 參與（IgE 媒介肥大細胞釋放組織胺），故 (D)。", "detail": {"background": "蕁麻疹（urticaria）是肥大細胞釋放組織胺等介質造成的「真皮淺層」風疹塊（wheal），特徵為「會癢、24 小時內消退、此起彼落」。(A) 蕁麻疹侵犯「表皮與真皮（淺層）」；若深及「真皮深層與皮下」則為「血管性水腫（angioedema）」——故 A 將其描述為含皮下不妥。(B) 「慢性蕁麻疹『大多找不到』明確過敏原」（多為自發性/自體免疫）——故 B 錯。(C) 治療「第一線為第二代 H1 抗組織胺」，「不是」優先高劑量類固醇注射（類固醇僅短期用於嚴重急性發作）——故 C 錯。(D) 「常見血液 IgE 參與」（IgE 媒介的第一型過敏，活化肥大細胞）——正確。故選 (D)。嚴重合併血管性水腫/過敏性休克時才用腎上腺素。", "options": {"A": "蕁麻疹侵犯表皮與真皮（淺層）；深層皮下為血管性水腫。", "B": "錯。慢性蕁麻疹多找不到明確過敏原。", "C": "錯。第一線為抗組織胺，非優先高劑量類固醇注射。", "D": "正確。常有血液 IgE 參與（IgE 媒介肥大細胞）。"}, "sources": ["Harrison 21e（Urticaria and angioedema）"]}}, "111-進階-內科-73": {"quick": "過敏性休克大多經「IgE」媒介，非 IgG，故敘述 (C) 錯。", "detail": {"background": "致命性全身嚴重過敏反應（anaphylaxis）：(A) 常見誘因為「食物、藥物、昆蟲叮咬」（及顯影劑、乳膠）——正確。(B) 「氣喘病史」是發生嚴重/致命過敏反應的主要危險因子（氣道反應性高）——正確。(C) 典型過敏性休克是「第一型過敏反應，由『IgE』媒介」肥大細胞/嗜鹼性球大量釋放介質——故「大多經 IgG 引發」錯誤（答案）。(D) 急救「第一步是『立即肌肉注射腎上腺素（epinephrine）0.3–0.5 mL（1:1000）於大腿外側』」，並維持呼吸道、給氧、平躺抬腿、大量晶體液、H1/H2 抗組織胺與類固醇為輔助——正確。故錯誤者為 (C)。腎上腺素是唯一能逆轉的救命藥，不可延遲。", "options": {"A": "正確。可由食物、藥物、昆蟲叮咬引發。", "B": "正確。氣喘病史為主要危險因子。", "C": "錯誤（為答案）。過敏性休克大多由 IgE 媒介，非 IgG。", "D": "正確。第一步為肌肉注射腎上腺素 0.3–0.5 mL。"}, "sources": ["Harrison 21e（Anaphylaxis）"]}}, "112-進階-外科-32": {"quick": "長期使用類固醇會造成高血糖、高血壓、傷口癒合不良等副作用，故 (D) 正確。", "detail": {"background": "免疫抑制劑（移植/自體免疫常用）：(A) 「basiliximab（Simulect）」是抗「IL-2 受體（CD25，在『T 細胞』上）」的單株抗體，用於移植「誘導治療」——故「結合 B 細胞受體」錯誤。(B) 「tacrolimus（FK-506，鈣調磷酸酶抑制劑）」「常用於」肝臟移植（並非因肝毒性而不能用）——故 B 錯。(C) 「mycophenolic acid（MMF）」是「IMPDH（嘌呤合成）抑制劑」，「不是 mTOR 抑制劑」（mTOR 抑制劑是 sirolimus/everolimus）——故 C 錯。(D) 「長期使用類固醇」會造成高血糖、高血壓、傷口癒合不良、骨質疏鬆、感染、庫欣外觀、白內障等——正確。故選 (D)。", "options": {"A": "錯。basiliximab 結合 T 細胞上的 IL-2 受體（CD25），非 B 細胞。", "B": "錯。tacrolimus 常用於肝臟移植。", "C": "錯。mycophenolic acid 是 IMPDH 抑制劑，非 mTOR 抑制劑。", "D": "正確。長期類固醇致高血糖、高血壓、傷口癒合不良等。"}, "sources": ["Harrison 21e（Immunosuppressive agents）"]}}, "113-進階-家庭-24": {"quick": "過敏性休克需大量輸液時以「晶體溶液」為首選，非膠體，故敘述 (B) 錯。", "detail": {"background": "過敏性休克（anaphylactic shock）處置：(A) 「呼吸道處置為第一優先」（評估與維持氣道，喉頭水腫可能需提早插管）——正確（同時立即給腎上腺素）。(B) 需大量輸液時「以『晶體溶液（crystalloid，如生理食鹽水/平衡鹽液）』為首選」，「膠體並非首選」——故此敘述錯誤（答案）。(C) 可給「hydrocortisone（類固醇）」作為輔助，有助減少「雙相反應（biphasic reaction，數小時後再發）」——大致正確。(D) 「epinephrine（腎上腺素）是治療過敏性休克的首選藥物」（肌肉注射，可逆轉血管擴張與支氣管痙攣）——正確。故錯誤者為 (B)。處置順序：腎上腺素＋呼吸道/氧氣＋平躺抬腿＋大量晶體液＋抗組織胺/類固醇輔助＋觀察雙相反應。", "options": {"A": "正確。呼吸道處置為第一優先（同時給腎上腺素）。", "B": "錯誤（為答案）。大量輸液以晶體溶液為首選，非膠體。", "C": "大致正確。類固醇輔助以減少雙相反應。", "D": "正確。腎上腺素為治療過敏性休克的首選藥物。"}, "sources": ["Harrison 21e（Anaphylaxis management）"]}}, "113-進階-外科-77": {"quick": "類固醇是常見免疫抑制劑，長期使用易致高血糖，故 (C) 正確。", "detail": {"background": "免疫抑制劑：(A) 「mycophenolate mofetil（MMF）」常見「腸胃道不適（腹瀉、噁心）」副作用——故「不會發生腸胃不適」錯誤。(B) 「tacrolimus（FK-506）」「常用於」肝臟移植（並非因肝毒性而不用）——故 B 錯。(C) 「類固醇是常見的免疫抑制劑，長期使用容易造成高血糖」（及高血壓、骨鬆、感染、傷口癒合不良等）——正確。(D) 「everolimus 是 mTOR 抑制劑」此句本身正確，但其作用是「抑制 mTOR 進而阻斷 T 細胞對 IL-2 的『增生反應』」，敘述為「阻斷 T 細胞的『傳導』」用詞不夠精確，故本題以「敘述明確正確」的 (C) 為答案。臨床上選 (C)。", "options": {"A": "錯。MMF 常見腸胃不適（腹瀉、噁心）。", "B": "錯。tacrolimus 常用於肝臟移植。", "C": "正確。類固醇為常見免疫抑制劑，長期使用易致高血糖。", "D": "everolimus 確為 mTOR 抑制劑，但「阻斷 T 細胞傳導」用詞不精確（實為抑制增生反應），故本題以 C 為答案。"}, "sources": ["Harrison 21e（Immunosuppressive agents）"]}}}, L={"痛風與晶體性關節病": {"title": "痛風與晶體性關節病", "html": "<p><b>核心概念：</b>急性單一關節炎的鑑別與晶體分析，痛風的診治。</p><p><b>急性單關節炎：</b>突發紅腫熱痛單關節，務必「抽關節液」——做細胞數、革蘭氏染色／培養（不可漏掉<b>化膿性關節炎</b>急症）與偏光顯微鏡看結晶。<b>痛風＝尿酸鈉、針狀、強負雙折射</b>；<b>假性痛風＝焦磷酸鈣、菱形、正雙折射</b>。急性發作期血尿酸可正常，不能單以尿酸高診斷。</p><p><b>痛風治療：</b>急性期 NSAID／<b>colchicine</b>／皮質類固醇三選一，依共病選藥（<b>消化道潰瘍出血→禁 NSAID，改 colchicine／類固醇</b>；腎功能差→colchicine 須減量）。colchicine 副作用：<b>腹瀉</b>（最常見/過量警訊）、肌病/橫紋肌溶解（茶色尿）、嚴重中毒意識變化（頭痛非典型）。緩解後降尿酸（allopurinol/febuxostat）。葡萄糖胺是用於退化性關節炎，對痛風無效。</p>"}, "類風濕性關節炎與自體抗體": {"title": "類風濕性關節炎與自體抗體", "html": "<p><b>核心概念：</b>RA 的型態、自體抗體、關節外表現與遺傳。</p><p><b>型態：</b>RA＝慢性、<b>對稱、多關節</b>、侵犯手足<b>小關節（MCP/PIP/MTP）與腕</b>、<b>不侵犯 DIP</b>、晨僵<b>>1 小時</b>。對照退化性關節炎（負重大關節、活動加重、晨僵<30 分、有 Heberden 結節）。</p><p><b>抗體與基因：</b><b>RF 與 anti-CCP</b> 常陽性（anti-CCP 特異度高）；主要遺傳風險為 <b>HLA-DRB1（shared epitope）</b>。對照：anti-dsDNA→SLE、CPK→肌炎、HLA-B27→脊椎關節病。</p><p><b>關節外表現：</b>皮下結節、<b>間質性肺病</b>、漿膜炎、鞏膜炎、血管炎、Felty（脾腫＋嗜中性球低）、骨質疏鬆、腎病變、貧血。甲狀腺低下是另一種自體免疫病，非 RA 關節外表現。診斷依 2010 ACR/EULAR 標準；治療早期用 DMARD（methotrexate 為基石）±生物製劑（抗 TNF/IL-6）。</p>"}, "全身性紅斑性狼瘡與血管炎": {"title": "全身性紅斑性狼瘡與血管炎", "html": "<p><b>核心概念：</b>SLE 多系統表現與分類標準，以及小血管炎（HSP）。</p><p><b>SLE：</b>好發育齡女性，多系統：蝴蝶斑、光敏感、口腔潰瘍、非疤痕性掉髮、關節炎、漿膜炎（心包/肋膜）、<b>狼瘡腎炎（尿圓柱、蛋白尿、血尿）</b>、神經精神（譫妄/癲癇/精神病）、血液學<b>「減少」（白血球↓、血小板↓、溶血性貧血）</b>。故 SLE「白血球上升」不應出現（上升提示感染）。免疫學：ANA（入門）、<b>anti-dsDNA、anti-Sm（特異）</b>、補體 C3/C4 下降、抗磷脂抗體。2019 EULAR/ACR 分類標準不含「白血球增高」。衛教：避免感染、防曬、<b>維持適度運動</b>（非減少）、懷孕計畫須與醫師討論、免疫抑制中避活疫苗。橫紋肌溶解治療是<b>鹼化尿液</b>（非酸化）。</p><p><b>過敏性紫斑（HSP/IgA 血管炎）：</b>兒童最常見小血管炎，常 URI 後發生；四聯＝<b>可觸性紫斑（下肢/臀部重力部位）＋關節痛＋腹痛＋腎炎</b>；血管壁<b>IgA</b>沉積（非 IgG）；腸胃道症狀常見（約 50–75%）；多自限、復發約 1/3，需追蹤腎臟。</p>"}, "脊椎關節病變與反應性關節炎": {"title": "脊椎關節病變與反應性關節炎", "html": "<p><b>核心概念：</b>血清陰性脊椎關節病變的共通特徵與分類，以及反應性關節炎。</p><p><b>共通特徵：</b>「血清陰性（<b>RF 陰性</b>）」、與 <b>HLA-B27</b> 相關、<b>發炎性下背痛</b>（年輕起病、晨僵、活動後改善、夜間痛、休息不緩解）、薦腸關節炎、附著點炎（enthesitis，如阿基里斯腱跟骨處）、指炎（dactylitis）、前葡萄膜炎、乾癬、發炎性腸病、<b>對 NSAID 反應良好</b>、家族史、CRP 升高。</p><p><b>僵直性脊椎炎（AS）：</b>年輕男性、軸心為主、薦腸關節炎、脊椎竹竿狀融合、虹膜炎。anti-CCP 陰性＋軸心發炎性下背痛＋無乾癬腸症＝AS。<b>ASAS 軸心型 SpA 分類</b>以影像薦腸關節炎或 HLA-B27 為起點＋SpA 特徵；急性期反應物列 <b>CRP（非 ESR）</b>，藥物反應列 <b>NSAID（非 acetaminophen）</b>。</p><p><b>反應性關節炎：</b>腸道（沙門/志賀/曲狀桿菌）或泌尿生殖（披衣菌）感染後 1–4 週的<b>無菌性</b>關節炎，三聯＝<b>關節炎＋尿道炎＋結膜炎</b>，與 HLA-B27 相關，NSAID 治療多自限。對照化膿性關節炎為關節直接感染（培養陽性）。</p>"}, "骨關節炎與軟組織風濕": {"title": "骨關節炎與軟組織風濕", "html": "<p><b>核心概念：</b>退化性關節炎、軟組織風濕（冰凍肩/板機指/纖維肌痛）與感染性關節炎、腔室症候群急症。</p><p><b>退化性關節炎（OA）：</b>高齡、負重大關節（膝/髖）、<b>活動加重休息緩解</b>、晨僵<30 分、Heberden(DIP)/Bouchard(PIP) 結節；X 光＝<b>關節腔變窄、軟骨下骨硬化、骨刺、軟骨下囊腫</b>。髖 OA 早期內旋受限、痛從鼠蹊蔓延至臀、外觀變形少見。高位脛骨截骨術矯正 OA 內翻；人工關節術後急性感染最常見<b>葡萄球菌</b>（非鏈球菌）；股骨頭壞死核心減壓僅早期(I–II)有效。</p><p><b>軟組織風濕：</b>沾黏性關節囊炎（<b>冰凍肩</b>）＝主被動 ROM 皆受限＋夜間痛＋影像正常；屈指肌腱腱鞘炎（<b>板機指</b>）＝掌側摩擦音＋彎曲卡頓痛；纖維肌痛＝<b>全身廣泛疼痛＋疲勞</b>（非自體免疫、不破壞關節、好發中年女性，壓力/創傷/寒冷惡化）。</p><p><b>關節炎與急症：</b>感染性關節炎—病毒性多為對稱多關節（似 RA）、結核性多為<b>單一大負重關節（脊椎/髖）</b>、細菌性最好發膝關節（疑似即抽關節液）。<b>腔室症候群</b>：石膏固定後肢端發紺、<b>被動牽張劇痛</b>→立即「完全剪開石膏減壓＋抬高」，必要時筋膜切開。</p>"}, "免疫風濕治療與過敏免疫學": {"title": "免疫風濕治療與過敏免疫學", "html": "<p><b>核心概念：</b>免疫抑制劑要點、蕁麻疹與過敏性休克處置。</p><p><b>免疫抑制劑：</b><b>類固醇</b>長期→高血糖、高血壓、骨鬆、感染、傷口癒合不良、庫欣。basiliximab＝抗 IL-2 受體（CD25，T 細胞）誘導治療；tacrolimus（鈣調磷酸酶抑制劑）<b>常用於肝移植</b>；MMF＝IMPDH（嘌呤）抑制劑、常見腸胃不適；sirolimus/everolimus＝mTOR 抑制劑。</p><p><b>蕁麻疹：</b>真皮淺層風疹塊、會癢、24 小時內消退；<b>IgE 媒介</b>肥大細胞釋放組織胺；慢性蕁麻疹<b>多找不到過敏原</b>；第一線為<b>抗組織胺</b>（非高劑量類固醇）。深層皮下＝血管性水腫。</p><p><b>過敏性休克（anaphylaxis）：</b>IgE 媒介第一型過敏（非 IgG）；誘因食物/藥物/蜂螫；氣喘為危險因子。處置：<b>呼吸道優先＋立即肌肉注射腎上腺素 0.3–0.5 mL（首選救命藥）</b>、平躺抬腿、<b>大量晶體液（非膠體）</b>、抗組織胺/類固醇輔助（減少雙相反應）、觀察雙相反應。</p>"}};
const TORDER=["痛風與晶體性關節病", "類風濕性關節炎與自體抗體", "全身性紅斑性狼瘡與血管炎", "脊椎關節病變與反應性關節炎", "骨關節炎與軟組織風濕", "免疫風濕治療與過敏免疫學"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if((q.answer_status||'').indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if((q.answer_status||'').indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if((q.answer_status||'').indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if((q.answer_status||'').indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 let opts='';
 for(const k of ['A','B','C','D','E']){ if(q.options[k]!==undefined) opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='np_rheum_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'\U0001F44B 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render); fKw.oninput=render;
expandBtn=$('#expand'); expandBtn.onclick=()=>{expand=!expand;expandBtn.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
