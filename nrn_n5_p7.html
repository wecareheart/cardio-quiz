察病人狀況","B":"滿足基本生理需求","C":"不需要醫囑","D":"打開監視器觀察,不須現場探視"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"器質性精神疾患兒少老年精神治療與精神衛生法","topic_num":"器質性精神疾患兒少老年精神治療與精神衛生法","q_num":10,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"每30分鐘觀察病人狀況","B":"滿足基本生理需求","C":"不需要醫囑","D":"打開監視器觀察,不須現場探視"},"img":""},{"id":"115030-N5-16","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":16,"stem":"有關人格障礙症的敘述,下列何者最適切?","opts":{"A":"妄想型人格障礙症病人總是選擇孤單的活動","B":"邊緣型人格障礙症病人常見有不穩定的人際關係及明顯的衝動性","C":"孤僻型人格障礙症病人常見具有強烈的自大,對他人缺乏同理心","D":"依賴型人格障礙症病人常見漠視且侵犯他人權益的行為"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"器質性精神疾患兒少老年精神治療與精神衛生法","topic_num":"器質性精神疾患兒少老年精神治療與精神衛生法","q_num":16,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"妄想型人格障礙症病人總是選擇孤單的活動","B":"邊緣型人格障礙症病人常見有不穩定的人際關係及明顯的衝動性","C":"孤僻型人格障礙症病人常見具有強烈的自大,對他人缺乏同理心","D":"依賴型人格障礙症病人常見漠視且侵犯他人權益的行為"},"img":""},{"id":"115030-N5-19","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":19,"stem":"小華的媽媽抱怨,小華很聰明、人緣好,但就是認字很差,文章表達不清楚。下列何項是小華最可能出現的診斷?","opts":{"A":"抽搐症","B":"行為規範障礙症","C":"閱讀障礙症","D":"自閉症"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"器質性精神疾患兒少老年精神治療與精神衛生法","topic_num":"器質性精神疾患兒少老年精神治療與精神衛生法","q_num":19,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"抽搐症","B":"行為規範障礙症","C":"閱讀障礙症","D":"自閉症"},"img":""},{"id":"115030-N5-22","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":22,"stem":"承上題,有關身體約束的相關護理措施,下列敘述何者正確?","opts":{"A":"依照醫囑執行約束,不需簽署同意書","B":"約束中應觀察四肢之血液循環及臉部膚色、溫度與感覺","C":"為保護病人,不可等到足夠人力,需立即執行約束,以免產生嚴重傷害","D":"在執行約束之後應協助病人補充大量水分"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"器質性精神疾患兒少老年精神治療與精神衛生法","topic_num":"器質性精神疾患兒少老年精神治療與精神衛生法","q_num":22,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"依照醫囑執行約束,不需簽署同意書","B":"約束中應觀察四肢之血液循環及臉部膚色、溫度與感覺","C":"為保護病人,不可等到足夠人力,需立即執行約束,以免產生嚴重傷害","D":"在執行約束之後應協助病人補充大量水分"},"img":""}],E={"101030-N5-1":{"quick":"國小無法專心、衝動、話多、坐立不安、遺失文具、無法完成指令＝注意力缺陷過動症(ADHD)。","detail":{"background":"王小弟近3個月在學校『無法專心、衝動、干擾同學、話多、坐立不安、常遺失文具、無法完成指令』——符合『注意力缺陷過動症(ADHD)』的核心症狀(注意力不足+過動/衝動，於多情境出現、影響功能)。智能不足以認知能力顯著低下為主;兒童憂鬱以情緒低落為主;妥瑞氏症以動作及聲語型抽動(tic)為主。本題是注意力不足+過動衝動，故為 ADHD。故 C 正確。","options":{"A":"智能不足以認知能力顯著低下為主。","B":"兒童憂鬱以情緒低落為主。","C":"正確。注意力不足+過動衝動，是 ADHD。","D":"妥瑞氏症以動作及聲語型抽動(tic)為主。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR"]}},"101030-N5-3":{"quick":"暴力處置：運用同理心，傾聽病人的問題與需要，以化解不必要的暴力。","detail":{"background":"暴力處置應注意:(C)『運用同理心，傾聽病人的問題與需要，以化解不必要的暴力(在升高階段以言語安撫、了解需求預防暴力)』。其他錯誤:A『不鼓勵打沙袋、打枕頭』錯誤(適度的「能量宣洩」活動可協助疏導);B『絕對避免會談或互動』錯誤(適當的會談、了解需求有助預防，並非絕對避免);D『鋰鹽與抗痙攣藥物無此療效』錯誤(情緒穩定劑如鋰鹽、抗痙攣藥也可用於控制衝動/攻擊)。故 C 正確。預防暴力以同理、傾聽、了解需求、適當設限為要。","options":{"A":"適度的能量宣洩活動(打沙袋、枕頭)可協助疏導。","B":"適當會談、了解需求有助預防暴力，非絕對避免。","C":"正確。運用同理心、傾聽病人的問題與需要。","D":"鋰鹽、抗痙攣藥也可用於控制衝動/攻擊。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"101030-N5-4":{"quick":"台灣精神衛生連續性照護網現況：醫院與社區間的服務仍缺乏連續性。","detail":{"background":"台灣精神衛生連續性照護網的現況，正確的是(A)『醫院與社區間的服務仍「缺乏連續性」(銜接不足)』。其他敘述過於樂觀、不符現況:B『社區復健資源已臻完善』、C『社區精神衛生資源已具相當整合性』、D『社區精神衛生照護人力已達供需平衡』——這些都尚未達成(社區資源、整合與人力仍不足)。故 A 正確。台灣精神衛生照護在醫院與社區的銜接、社區資源與人力上仍有不足。","options":{"A":"正確。醫院與社區間的服務仍缺乏連續性。","B":"社區復健資源尚未臻完善。","C":"社區精神衛生資源整合性尚不足。","D":"社區精神衛生照護人力尚未供需平衡。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"101030-N5-5":{"quick":"病人持梳子攻擊他人：先安撫被攻擊者、再以治療性溝通與攻擊者會談給予表達機會(直接強奪武器易激化、傷及醫護)。","detail":{"background":"張小姐拿水杯潑、並持梳子追打朱小姐(立即的暴力與傷人危險)。最適切的護理處置是(A)『立即上前直接將張小姐手上的梳子取走(移除可能造成傷害的物品、阻止立即的攻擊)』——當有立即傷人危險時，移除武器、阻止攻擊、確保安全是首要(必要時搭配人力支援)。B『請圍觀病友協助』會使病友受傷;C『隔離約束』是後續(先制止當下攻擊);D『安撫朱小姐後再與張小姐會談』未即時制止當下的攻擊。故 A 正確。對持物攻擊的立即危險，先移除武器、制止攻擊。","options":{"A":"直接上前強行奪取手上的梳子，易「激化衝突、使醫護或病人受傷」，非最適切。","B":"請圍觀病友協助會使病友受傷、且非專業處置。","C":"隔離保護室約束過於侷限，且非當下第一處置。","D":"正確。先安撫被攻擊者(朱小姐)，再與張小姐會談、提供表達/辯解的機會，以治療性溝通疏導情緒。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"101030-N5-8":{"quick":"精神科居家護理：服務對象含病人及家屬①、教導家屬照顧方法②、增進病人獨立生活③(由護理師單獨提供④錯)。","detail":{"background":"精神科居家護理的正確敘述:(1)服務對象包含「病人及家屬」;(2)可「教導家屬照顧病人的方法」;(3)可「增進病人獨立生活的能力」。而(4)『由護理師「單獨」提供服務』錯誤——精神科居家護理是『「團隊(醫師、護理師、社工、職能治療師等)」合作』提供，而非護理師單獨。故正確為①②③(選 A)。精神科居家護理以團隊合作，服務病人與家屬、促進獨立生活。","options":{"A":"正確。服務對象含病人及家屬①、教導家屬②、增進病人獨立生活③。","B":"124：含④(護理師單獨提供)，錯誤。","C":"134：含④，錯誤。","D":"234：含④、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"101030-N5-15":{"quick":"約束隔離：進行隔離時，需仔細檢查病人身上是否攜帶危險物品。","detail":{"background":"約束隔離的正確護理措施是(C)『進行隔離時，需仔細「檢查病人身上是否有攜帶危險物品(如打火機、利器、繩索)」，以維護安全』。其他錯誤:A『由兩位護理師「單獨」處理最好』錯誤(暴力處置需足夠的支援人力);B『隔離室的門「不需上鎖」』錯誤(隔離通常需上鎖以防病人擅自外出，但須密切觀察);D『約束隔離通常需「超過4小時」才能習得教訓』錯誤(約束/隔離不是懲罰或「教訓」，應在必要的最短時間內、定期評估解除)。故 C 正確。","options":{"A":"暴力處置需足夠的支援人力，非兩人單獨。","B":"隔離室通常需上鎖防擅自外出(並密切觀察)。","C":"正確。隔離時需仔細檢查病人身上是否攜帶危險物品。","D":"約束隔離非懲罰/教訓，應在最短時間、定期評估解除。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"101030-N5-20":{"quick":"與失智症病人溝通：說話速度放慢、留心語氣、內容具體直接。","detail":{"background":"與老年失智症病人溝通，較適當的是(D)『說話速度放慢、留心語氣、內容「具體、直接、簡單」(一次一個簡單訊息)』——配合其理解力下降。其他錯誤:A『使用詳盡、重疊的字句、如對待小孩』錯誤(用語應「簡短」，且不應「幼兒化(elderspeak)」對待，那會傷尊嚴);B『請病人以畫圖代替言語』不適合失智者的溝通需求;C『重覆詢問直到回答』會造成壓力、挫折。故 D 正確。對失智者宜慢、簡單、具體、尊重地溝通。","options":{"A":"用語應簡短、不應幼兒化對待(傷尊嚴)。","B":"請失智者畫圖代替言語不適合。","C":"重覆詢問直到回答會造成壓力、挫折。","D":"正確。說話速度放慢、留心語氣、內容具體直接。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"101030-N5-25":{"quick":"失智公公多疑(存款被領)：傾聽李太太的訴說，並教導其失智症的相關症狀。","detail":{"background":"李太太的失智公公多疑(覺得存款被家人領走)。最合宜的處置是(B)『傾聽李太太的訴說，並教導其「失智症的相關症狀(多疑、被偷妄想是失智常見的症狀)」』——讓家屬理解這是疾病的表現、學習如何因應(不爭辯、轉移、確保安全)。A『教李太太說「沒有人拿你的錢」』是直接爭辯、否定(對失智妄想宜不爭辯);C『可以不要理會』忽視家屬的困擾與病人的需求;D『以決定是否「強制住院」』言之過早、不符(多疑症狀未達強制住院要件)。故 B 正確。","options":{"A":"直接否認「沒人拿錢」是爭辯，對失智妄想不宜。","B":"正確。傾聽李太太訴說、教導失智症的相關症狀。","C":"「不要理會」忽視家屬的困擾與病人需求。","D":"多疑症狀未達強制住院要件，言之過早。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"101030-N5-31":{"quick":"生命回顧的原則：再度檢視整合過去記憶②、尋找生命的意義③、能面對死亡的議題④(只有正向經驗才回顧①錯)。","detail":{"background":"生命回顧(life review)的原則:(2)再度檢視、整合過去的記憶(統整人生);(3)尋找生命的意義;(4)能面對死亡的議題(達到自我統整、接納人生)。而(1)『對老年人「只有正向」的經驗才回顧』錯誤——生命回顧是『「整合正向與負向」的經驗、接納完整的人生』，而非只回顧正向經驗。故正確為②③④(選 C)。生命回顧協助老人統整人生、尋找意義、面對死亡(對應 Erikson 的自我統整 vs 絕望)。","options":{"A":"123：含①(只回顧正向)，錯誤。","B":"124：含①，錯誤。","C":"正確。整合過去記憶②、尋找生命意義③、面對死亡議題④。","D":"134：含①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·老年精神護理"]}},"101030-N5-33":{"quick":"智商60(輕度智能不足)：可訓練/教育至約10至11歲的程度。","detail":{"background":"小英智商(IQ)60，屬『輕度智能不足(mild，IQ 約50~70)』——可教育性(educable)，經訓練可達『相當於「國小高年級(約10~11歲)」』的學業與生活自理程度，能學習基本讀寫算、從事簡單工作、大致獨立生活。中度智能不足(IQ 35~49)約達6~8歲;重度更低。故 D 正確。輕度智能不足經適當教育訓練，可達約10~11歲(國小)的功能水準。","options":{"A":"2至3歲對應重度/極重度智能不足。","B":"4至6歲對應中重度智能不足。","C":"7至8歲對應中度智能不足。","D":"正確。智商60(輕度)可訓練至約10至11歲程度。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","智能不足"]}},"101030-N5-35":{"quick":"老年精神病人跌倒防範：監測藥物①、姿勢改變放慢③、注意環境結構設計④(以約束預防跌倒②錯)。","detail":{"background":"老年精神病人的跌倒防範措施:(1)監測使用的藥物(鎮靜、降壓藥等易致跌倒);(3)指導姿勢改變時(如起身)動作宜放慢(防姿勢性低血壓致跌);(4)注意環境結構及設計(照明、扶手、防滑、移除障礙)。而(2)『給予「約束」以預防跌倒』錯誤——約束不僅不能有效預防跌倒，反而增加損傷、譫妄、失能與尊嚴傷害(約束是最後手段，不應作為防跌的常規)。故正確為①③④(選 B)。","options":{"A":"123：含②(約束預防跌倒)，錯誤。","B":"正確。監測藥物①、姿勢改變放慢③、注意環境結構設計④。","C":"234：含②、缺①，錯誤。","D":"124：含②，錯誤。"},"sources":["精神科護理學(新文京/華杏)·老年精神護理"]}},"101110-N5-4":{"quick":"抗憂鬱劑衛教：避免空腹服 Fluoxetine②、Imipramine 口乾少量多次喝水③、Trazodone 助眠不宜白天服④(Moclobemide 不可吃酪胺酸①較不適用)。","detail":{"background":"抗憂鬱劑的衛教:(2)避免空腹服用 Fluoxetine(SSRI，減少腸胃刺激);(3)服用 Imipramine(三環抗憂鬱劑 TCA)出現口乾(抗膽鹼副作用)時，可少量多次喝水;(4)Trazodone 有助眠效果，宜「睡前」服用、不宜白天服(以免嗜睡)。而(1)『Moclobemide(Aurorix)不可吃含酪胺酸的食物』——moclobemide 是『「可逆性」單胺氧化酶 A 抑制劑(RIMA)』，其飲食限制較傳統(不可逆)MAOI「寬鬆」，故「嚴格限制酪胺酸」較不適用於 moclobemide。故正確為②③④(選 A)。","options":{"A":"正確。避免空腹服 Fluoxetine②、Imipramine 口乾少量多次喝水③、Trazodone 不宜白天服④。","B":"123：含①(moclobemide 嚴格限酪胺酸較不適用)，錯誤。","C":"124：含①，錯誤。","D":"134：含①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","抗憂鬱劑"]}},"101110-N5-5":{"quick":"需規律返診抽血監測顆粒性白血球的藥物＝Clozapine(Clozaril)。","detail":{"background":"服用後需衛教病人「規律返診抽血、監測顆粒性(嗜中性)白血球數目」的藥物是(A)『Clozapine(Clozaril)』——clozapine 可能引起『「顆粒性白血球缺乏症(agranulocytosis)」』這個嚴重副作用，故須定期監測白血球(尤其嗜中性球)。Risperidone、Quetiapine(非典型抗精神病藥)、Alprazolam(BZD)無此嚴格的白血球監測要求。故 A 正確。clozapine 的特殊監測重點就是定期抽血查白血球。","options":{"A":"正確。Clozapine 可能致顆粒性白血球缺乏，須規律抽血監測。","B":"Risperidone 無此嚴格的白血球監測要求。","C":"Alprazolam 是 BZD，無此監測要求。","D":"Quetiapine 無此嚴格的白血球監測要求。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","Clozapine"]}},"101110-N5-15":{"quick":"病人持菜刀威脅砍人：由警方支援，協助就醫。","detail":{"background":"陳小姐手持菜刀威脅砍人(立即的傷人危險)。社區精神衛生護理師與警方前去處理，合適的處置是(B)『由「警方支援」，協助(安全地)就醫』——面對持刀、有立即傷人危險者，須借助警方的人力與安全管控，在確保安全下協助送醫(必要時依精神衛生法緊急安置)。A『作精神鑑定強制住院』是後續流程(非當下);C『協助警方設定警戒線』非護理的專業處置重點;D『立即向前拿下菜刀』危險(護理師不應徒手向持刀者搶刀)。故 B 正確。對持刀威脅者，由警方支援、確保安全、協助就醫。","options":{"A":"精神鑑定/強制住院是後續流程，非當下處置。","B":"正確。由警方支援，協助(安全地)就醫。","C":"設定警戒線非護理的專業處置重點。","D":"徒手向持刀者搶刀危險，不應立即向前。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"101110-N5-20":{"quick":"失智症的虛談症(confabulation)＝記憶力障礙，以(虛構)方式掩飾、彌補遺漏的空檔。","detail":{"background":"失智症的『虛談症(confabulation)』是(A)『因「記憶力障礙」，病人「以虛構的內容來掩飾、彌補記憶遺漏的空檔(不自覺地編造，並非說謊)」』。B『注意力不集中、語無倫次』是其他問題;C『語言表達障礙、天馬行空』不符虛談的定義;D『空間建構能力不佳』與虛談無關。故 A 正確。虛談症是失智/柯沙寇夫等記憶障礙者，以虛構填補記憶空缺的現象(無欺騙意圖)。","options":{"A":"正確。記憶障礙，以虛構方式掩飾、彌補記憶遺漏的空檔。","B":"注意力不集中、語無倫次非虛談的定義。","C":"語言表達障礙、天馬行空非虛談的定義。","D":"空間建構能力不佳與虛談無關。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"101110-N5-21":{"quick":"藉回憶過去事物增進語言、人際、改善情緒、延緩病情＝懷舊治療。","detail":{"background":"藉由『對過去事物及經驗的回憶』，增加患者語言表達、人際互動、改善情緒、延緩病情的治療是(C)『懷舊治療(reminiscence therapy)』——常用於失智/老年，透過老照片、老物件、舊歌曲喚起回憶，促進表達與互動、提升情緒與自我認同。心理分析治療著重潛意識衝突;感官刺激治療是多感官刺激;認知治療是修正不合理認知。本題核心是「回憶過去」，故為懷舊治療。故 C 正確。","options":{"A":"心理分析治療著重潛意識衝突。","B":"感官刺激治療是多感官刺激。","C":"正確。藉回憶過去增進表達互動、延緩病情，是懷舊治療。","D":"認知治療是修正不合理認知。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","懷舊治療"]}},"101110-N5-23":{"quick":"創傷個案的照護：運用認知治療，引導學習因應與調適機制。","detail":{"background":"針對林小姐(創傷相關)的照護處置，正確的是(B)『運用「認知治療」，引導林小姐學習「因應與調適機制」』——協助修正對創傷的扭曲認知、學習因應壓力與情緒的方法。其他錯誤:A『藥物以抗精神病藥為主』不符(創傷/壓力相關以 SSRI、心理治療為主，非抗精神病藥);C『避免回到現場、再度受創』在治療上反而可能用「漸進暴露」處理(完全迴避不利復原);D『心理治療以心理分析為主』不符(創傷以認知行為治療為主，非心理分析)。故 B 正確。","options":{"A":"藥物以 SSRI 為主，非抗精神病藥。","B":"正確。運用認知治療，引導學習因應與調適機制。","C":"完全迴避不利復原，治療上可用漸進暴露。","D":"創傷以認知行為治療為主，非心理分析。"},"sources":["精神科護理學(新文京/華杏)·創傷及壓力相關疾患"]}},"101110-N5-27":{"quick":"譫妄病患的護理：與激動的病患互動時，保持堅定(冷靜、清楚)的態度。","detail":{"background":"譫妄(delirium)病患的護理，較優先考量的是(C)『與激動的病患互動時，保持「堅定、冷靜、清楚」的態度(以穩定、簡單、一致的態度安撫，提供現實導向)』。其他:A『以約束保護』是「最後手段」(過度約束反而加重譫妄、躁動);B『擺設熟悉物品』有助定向(是重要措施，但非「最優先」於互動態度);D『戴走失手鍊』是「失智(走失)」的措施，譫妄是急性意識混亂、須找病因。本題以「互動時保持堅定態度」為較優先的護理原則。故 C 正確。","options":{"A":"約束是最後手段，過度約束反加重譫妄。","B":"擺設熟悉物品有助定向，但非最優先。","C":"正確。與激動病患互動時，保持堅定(冷靜、清楚)的態度。","D":"戴走失手鍊是失智(走失)的措施，非譫妄。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","譫妄"]}},"101110-N5-29":{"quick":"60歲、常忘記約談時間、常做錯誤判斷(認知退化)＝失智症。","detail":{"background":"郭先生60歲、近3年『常忘記與客戶約談的時間、常做錯誤的判斷(記憶與判斷力等認知功能退化、影響職業功能)』——符合『失智症(dementia)』的核心(認知功能逐漸退化、影響日常/職業功能)。躁鬱症以情緒起伏為主;精神分裂症(思覺失調)以妄想幻覺為主;身體化症以身體症狀為主。本題以「漸進的記憶、判斷力退化」為核心，故為失智症。故 A 正確。","options":{"A":"正確。記憶、判斷力漸進退化、影響職業功能，是失智症。","B":"躁鬱症以情緒起伏為主。","C":"精神分裂症(思覺失調)以妄想幻覺為主。","D":"身體化症以身體症狀為主。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"101110-N5-30":{"quick":"失智者出門爭吵、記不得回家路：協助申請走失手鍊或衛星定位協尋器材。","detail":{"background":"郭先生失智、出門與菜販爭吵、『記不得回家的路、多次被警察送回』(有走失風險)。護理師協助的方式是(C)『協助申請「走失手鍊」或「衛星定位協尋器材」(防走失、便於協尋)』——在不過度限制其活動與尊嚴下，以輔助工具確保安全。A『限制活動範圍、必要時約束』、B『禁止外出』過度限制、剝奪其活動與尊嚴;D『提供住家社區所有路線圖』對失智者無效(記憶與定向已受損)。故 C 正確。對有走失風險的失智者，以防走失輔具(手鍊、定位)維護安全。","options":{"A":"限制活動、約束過度，剝奪活動與尊嚴。","B":"禁止外出過度限制、不利其功能維持。","C":"正確。協助申請走失手鍊或衛星定位協尋器材。","D":"提供路線圖對失智者(定向受損)無效。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"101110-N5-31":{"quick":"老人 3D 疾病＝譫妄(delirium)①、失智症(dementia)②、憂鬱(depression)③。","detail":{"background":"老人「3D」疾病是指三個易混淆、需鑑別的常見問題:(1)譫妄(Delirium)、(2)失智症(Dementia)、(3)憂鬱(Depression)。三者都可能出現認知或情緒的變化，臨床上須仔細鑑別(如憂鬱可致「假性失智」、譫妄是急性可逆)。而(4)『睡眠異常(dyssomnias)』不在「3D」之列。故正確為①②③(選 A)。老人 3D(譫妄、失智、憂鬱)是老年精神評估的重要鑑別。","options":{"A":"正確。3D＝譫妄①、失智症②、憂鬱③。","B":"234：含④(睡眠異常)、缺①，錯誤。","C":"134：含④，錯誤。","D":"124：含④，錯誤。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","老人3D"]}},"101110-N5-34":{"quick":"服抗精神病藥、嗜睡、如廁後跌倒：檢視藥物交互作用①、教導坐姿站起動作慢②、監測血壓變化④(增加體適能活動③非當下)。","detail":{"background":"莊先生服抗精神病藥10天、明顯嗜睡、如廁後突然跌倒——抗精神病藥可能致「姿勢性低血壓、過度鎮靜」而跌倒。護理措施:(1)檢視藥物之交互作用(及鎮靜、降壓副作用);(2)教導坐姿站起時動作要慢(防姿勢性低血壓);(4)監測血壓的變化(尤其姿勢性血壓)。而(3)『增加體適能的活動』非「當下(剛跌倒、嗜睡)」的措施(應先確保安全、找跌倒原因)。故正確為①②④(選 C)。","options":{"A":"123：含③(增加體適能)，非當下的措施。","B":"234：含③、缺①，錯誤。","C":"正確。檢視藥物交互作用①、坐站動作慢②、監測血壓④。","D":"134：含③，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","姿勢性低血壓"]}},"101110-N5-80":{"quick":"失智者返家居住環境「錯誤」者＝牆壁地面加裝各種飾物以增加環境刺激。","detail":{"background":"失智症病人返家的居住環境，「錯誤」者為(B)『牆壁和地面加裝各種飾物，「增加環境刺激」』——錯誤，失智者宜『「減少過度、雜亂的刺激」(過多飾物會造成混亂、跌倒風險、誤判)』，環境應簡單、安全、熟悉。其他正確:A 原本熟悉的房間、空間應儘量保持原樣(維持熟悉感、減少混亂);C 浴室、走道設扶手(防跌);D 在活動空間提供人、時、地定向感的指示(如時鐘、日曆、標示)。故本題選錯誤者為 B。","options":{"A":"保持熟悉的空間原樣(減少混亂)，正確。","B":"正確(本題選錯誤者)。失智者宜減少過度刺激，非加裝各種飾物。","C":"浴室、走道設扶手(防跌)，正確。","D":"提供人時地定向感的指示，正確。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"102030-N5-1":{"quick":"服用後最易產生顆粒性白血球缺乏症的藥物＝clozapine(CLZ)。","detail":{"background":"精神病人服用後最易產生『顆粒性白血球缺乏症(agranulocytosis)』的藥物是(A)『clozapine(CLZ)』——這是 clozapine 最須警惕的嚴重副作用，故服用期間須「定期監測白血球(尤其嗜中性球)」。haloperidol(典型抗精神病藥)、risperidone、ziprasidone(非典型抗精神病藥)無此特別高的白血球缺乏風險。故 A 正確。clozapine 雖對難治型思覺失調有效，但因顆粒性白血球缺乏的風險，須嚴格的血液監測。","options":{"A":"正確。clozapine 最易產生顆粒性白血球缺乏症。","B":"haloperidol 無此特別高的白血球缺乏風險。","C":"risperidone 無此特別高的風險。","D":"ziprasidone 無此特別高的風險。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","Clozapine"]}},"102030-N5-2":{"quick":"精神衛生法病人權益「錯誤」者＝設置監看設備不需告知病人。","detail":{"background":"精神衛生法有關病人權益保障，「錯誤」者為(D)『精神照護機構為保障病人安全之必要範圍內設置監看設備，「不需告知病人」』——錯誤，設置監看設備『「應告知病人(及家屬)」』(尊重病人的知的權利與隱私)。其他正確:A 未經病人同意，不得對病人錄音、錄影或攝影，並不得報導其姓名或住居所(隱私保護);B 對病人不得遺棄、身心虐待;C 不得對病人或利用病人為犯罪或不正當之行為。故本題選錯誤者為 D。","options":{"A":"未經同意不得錄音錄影攝影、報導姓名住所，正確。","B":"不得遺棄、身心虐待，正確。","C":"不得利用病人為犯罪或不正當行為，正確。","D":"正確(本題選錯誤者)。設置監看設備應告知病人，非不需告知。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"102030-N5-5":{"quick":"與有暴力傾向病人說話：保持一個手臂以上的距離。","detail":{"background":"與有暴力傾向的病人說話，為保持雙方放鬆、安全的領域，正確的是(D)『保持「一個手臂以上」的距離(留有安全空間，避免侵犯其個人領域而激化、也利於自保)』。其他錯誤:A『護理師選擇靠「內(裡面)」的位置』錯誤(應靠近「出口」、保持自己可退出的動線);B『與病人並肩而坐』未必適合(面對面但保持距離較能觀察);C『握住病人雙手』錯誤(肢體接觸對暴力傾向者可能被視為威脅、激化)。故 D 正確。對暴力傾向者保持安全距離、留出口動線、避免肢體碰觸。","options":{"A":"應靠近出口、保有可退出的動線，非靠內。","B":"並肩而坐未必適合，面對面保持距離較能觀察。","C":"握住病人雙手對暴力傾向者可能激化。","D":"正確。保持一個手臂以上的距離。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"102030-N5-7":{"quick":"抗精神病藥物惡性症候群(NMS)：會有突然高燒以及意識改變。","detail":{"background":"抗精神病藥物惡性症候群(NMS)的正確敘述:(C)『會有「突然高燒」以及「意識改變」(及嚴重肌肉僵直、自律神經不穩、CPK 上升)』。其他錯誤:A『常出現顆粒性白血球缺乏症』錯誤(那是 clozapine 的副作用，非 NMS);B『多發生於長期服用「鋰鹽」』錯誤(NMS 是「抗精神病藥(多巴胺拮抗劑)」引起);D『自主神經功能不受影響、心跳血壓穩定』錯誤(NMS 有顯著的「自律神經不穩定」:心跳快、血壓波動、大汗)。故 C 正確。NMS 四大特徵:高燒、肌肉僵直、意識改變、自律神經不穩(CPK 升高)。","options":{"A":"顆粒性白血球缺乏是 clozapine 的副作用，非 NMS。","B":"NMS 由抗精神病藥引起，非長期服鋰鹽。","C":"正確。NMS 會有突然高燒以及意識改變。","D":"NMS 有顯著的自律神經不穩，非心跳血壓穩定。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","NMS"]}},"102030-N5-8":{"quick":"最易出現史帝文-強生症候群(SJS)的藥物＝carbamazepine(Tegretol)。","detail":{"background":"最易出現「史帝文-強生症候群(Stevens-Johnson syndrome, SJS，嚴重皮膚黏膜藥物過敏反應)」的藥物是(C)『carbamazepine(Tegretol)』——carbamazepine 是引發 SJS/TEN 的經典藥物(尤其帶有 HLA-B*1502 基因者風險高，故用藥前建議篩檢)。lamotrigine(若快速加量)也可能 SJS，但本題以 carbamazepine 為答;clonazepam(BZD)、valproic acid 較少 SJS。故 C 正確。使用 carbamazepine 須衛教病人留意皮疹、黏膜病變等過敏徵象。","options":{"A":"lamotrigine 快速加量也可能 SJS，但本題以 carbamazepine 為答。","B":"clonazepam(BZD)較少 SJS。","C":"正確。carbamazepine 是引發 SJS 的經典藥物。","D":"valproic acid 較少 SJS。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","SJS"]}},"102030-N5-10":{"quick":"paroxetine(SSRI)+clozapine 合用：增加痙攣(癲癇發作)的危險性。","detail":{"background":"憂鬱病人同時服用 SSRI(paroxetine)與抗精神病藥 clozapine，可能的交互作用是(B)『增加痙攣(癲癇發作)的危險性』——clozapine 本身會「降低癲癇閾值」，而 paroxetine(SSRI)會「抑制肝臟代謝酵素、使 clozapine 血中濃度上升」，兩者合用會增加 clozapine 濃度與痙攣風險。其他選項(循環減弱、骨髓抑制加成、增加中樞抑制)非此組合最主要、典型的交互作用。故 B 正確。clozapine 與會升高其濃度的藥物合用，須留意痙攣與其他副作用。","options":{"A":"循環功能減弱非此組合最主要的交互作用。","B":"正確。SSRI 升高 clozapine 濃度、clozapine 降低癲癇閾值，增加痙攣危險。","C":"骨髓抑制加成非此組合最典型的交互作用。","D":"增加中樞抑制非此組合最主要的交互作用。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","Clozapine"]}},"102030-N5-12":{"quick":"最容易產生錐體外症候群(EPS)的藥物＝haloperidol(Haldol)。","detail":{"background":"最容易產生「錐體外症候群(EPS)」副作用的藥物是(C)『haloperidol(Haldol)』——haloperidol 是「典型(第一代)、高效價」抗精神病藥，強力阻斷多巴胺 D2 受體，EPS(急性肌張力不全、類巴金森、靜坐不能、遲發性運動異常)風險最高。chlorpromazine、sulpiride EPS 風險較低;olanzapine(非典型/第二代)EPS 風險低。故 C 正確。高效價典型抗精神病藥(如 haloperidol)的 EPS 風險最高。","options":{"A":"chlorpromazine 是低效價典型藥，EPS 風險較低。","B":"sulpiride EPS 風險相對較低。","C":"正確。haloperidol(高效價典型藥)最易產生 EPS。","D":"olanzapine(非典型藥)EPS 風險低。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","EPS"]}},"102030-N5-25":{"quick":"反社會人格(antisocial)的特徵＝欺騙、操控、缺乏罪惡感、不遵從規範。","detail":{"background":"反社會人格(antisocial personality disorder)的行為特徵是(A)『欺騙、操控、缺乏罪惡感、不遵從(漠視)社會規範與他人權益(衝動、攻擊、不負責任)』。B『誇大、自我膨脹、優越感』是「自戀型」人格;C『行為僵化、不會變通、責怪他人』偏向「強迫型/偏執型」;D『害怕分離、難以獨立與做決定』是「依賴型」人格。故 A 正確。反社會人格的核心是漠視與侵犯他人權益、缺乏悔意、不守規範。","options":{"A":"正確。欺騙、操控、缺乏罪惡感、不遵從規範，是反社會人格。","B":"誇大、自我膨脹、優越感是自戀型人格。","C":"行為僵化、責怪他人偏向強迫型/偏執型。","D":"害怕分離、難以獨立是依賴型人格。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"102030-N5-29":{"quick":"7歲、智商45(中度智能不足)：屬於「可訓練的(trainable)」。","detail":{"background":"林小弟7歲、智商45，屬『中度智能不足(moderate，IQ 約35~49)』——從教育立場屬『「可訓練的(trainable)」』:可訓練基本的生活自理、簡單的社交與職業技能(在監督下工作)，但學業學習能力有限。「可教育的(educable)」是輕度(IQ 50~70，可達國小程度);「在他人協助下維持簡單生活」是重度;「完全需他人協助」是極重度。故 B 正確。","options":{"A":"「可教育的」是輕度智能不足(IQ 50~70)。","B":"正確。智商45(中度)屬可訓練的(trainable)。","C":"「在他人協助下維持簡單生活」是重度智能不足。","D":"「完全需他人協助」是極重度智能不足。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","智能不足"]}},"102030-N5-33":{"quick":"暴力行為：過度擁擠及刺激的環境會增加病人的暴力行為。","detail":{"background":"暴力行為的正確敘述:(B)『過度擁擠及刺激的環境會「增加」病人的暴力行為(環境因素是誘發暴力的重要因子)』。其他錯誤:A 預測暴力行為的「最佳指標」是『「過去的暴力史」』，而非「診斷」;C『嚴格的病房規定是控制暴力的「最佳方法」』錯誤(過於嚴格反而可能激化，宜以治療性環境、同理、設限為主);D『護理人員與病人的「肢體碰觸」可緩解暴力』錯誤(對激動病人，肢體碰觸可能被視為威脅而激化)。故 B 正確。","options":{"A":"預測暴力的最佳指標是過去的暴力史，非診斷。","B":"正確。過度擁擠及刺激的環境會增加暴力行為。","C":"過於嚴格的規定可能激化，非控制暴力的最佳方法。","D":"對激動病人肢體碰觸可能被視為威脅而激化。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"102030-N5-34":{"quick":"男童被關、沒洗澡、撿垃圾泡麵填飽肚子＝兒童疏忽(neglect)。","detail":{"background":"男童「三度被母親關在套房、沒洗澡、撿垃圾桶的泡麵調味包泡水填飽肚子、身體發臭」——這是『「未提供」兒童基本的照顧需求(飲食、衛生、安全、監督)』，屬『兒童「疏忽(neglect)」』。兒童虐待(身體虐待)是「主動施加」身體傷害;兒童暴力是攻擊行為;兒童剝削是利用兒童牟利(如童工、性剝削)。本題核心是「未提供基本照顧(疏於照顧)」，故為兒童疏忽。故 B 正確。","options":{"A":"兒童虐待(身體虐待)是主動施加身體傷害。","B":"正確。未提供基本照顧(飲食、衛生、監督)，是兒童疏忽。","C":"兒童暴力是攻擊行為。","D":"兒童剝削是利用兒童牟利。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","兒少保護"]}},"102030-N5-36":{"quick":"病人觸摸女性、屢勸不止：告知不被允許、再犯則行為設限(限菸減量)。","detail":{"background":"黃姓病人習慣抽菸、近日常觸摸女性、屢勸不止。較適宜的作法是(A)『告知病人「任意觸摸女性是不被允許的」，並設定「明確的後果(若再犯則將每日限菸由10支減為5支)」——以「清楚的界限+一致的後果」進行行為設限』。B『就進保護室約束』過度(觸摸非暴力，約束不應作為制止此行為的手段);C『等症狀緩解就會消失、不處理』是放任;D『行為限定「不需告知」其他工作人員』錯誤(行為設限須「團隊一致、所有人員都知道並執行」)。故 A 正確。對不當行為，以清楚界限+一致後果+團隊一致來設限。","options":{"A":"正確。告知不被允許、再犯則行為設限(限菸減量)。","B":"觸摸非暴力，進保護室約束過度。","C":"「等症狀緩解就會消失、不處理」是放任。","D":"行為設限須團隊一致、告知所有人員，非不需告知。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"102110-N5-1":{"quick":"約束的使用：保護病人不傷害自己①、保護病人不傷害他人②、執行約束需每15分鐘探視④(緊急時不需告知就約束③錯)。","detail":{"background":"精神科約束措施的正確敘述:(1)保護病人「不傷害自己」;(2)保護病人「不傷害他人」;(4)執行約束時，需「每15分鐘探視病人(密切觀察安全、循環、約束部位)」。而(3)『緊急時「不需告知病人」就可約束』錯誤——約束前(即使緊急)仍應「向病人說明理由」，並須有醫囑(緊急時可先執行、再立即補醫囑)，不可逕行約束而不告知。故正確為①②④(選 C)。","options":{"A":"123：含③(緊急不需告知)，錯誤。","B":"234：含③、缺①，錯誤。","C":"正確。保護不傷害自己①、不傷害他人②、每15分鐘探視④。","D":"134：含③，錯誤。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"102110-N5-4":{"quick":"67歲、心導管術後第二天混亂、定向障礙、夜間加重(把護理師當媳婦)＝譫妄。","detail":{"background":"陳先生67歲、心智功能原本正常、『心導管術後第二天「突然」出現混亂、慌張、不安、定向障礙、夜間加重(大夜班把護理師當媳婦、責罵)』——這是『譫妄(delirium)』:急性發作、意識/注意力障礙、定向感混亂、症狀「波動(夜間加重，sundowning)」，多由身體疾病、手術、藥物等誘發。恐慌、焦慮是焦慮疾患;妄想是固著的錯誤信念(本題是急性意識混亂)。本題是「術後急性、波動的意識混亂」，故為譫妄。故 B 正確。譫妄須找出並處理潛在病因。","options":{"A":"恐慌是突發的恐懼發作，非急性意識混亂。","B":"正確。術後急性、波動的意識混亂與定向障礙，是譫妄。","C":"焦慮是過度擔憂，非急性意識混亂。","D":"妄想是固著的錯誤信念，本題是急性意識混亂。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"102110-N5-5":{"quick":"錐體外症候群(EPS)：遲發性運動不能多發生於長期服用抗精神病藥物後。","detail":{"background":"錐體外症候群(EPS)的正確敘述:(C)『遲發性運動不能/運動異常(tardive dyskinesia)，多發生於「長期(數月至數年)」服用抗精神病藥物後(且常不可逆，故須早期辨識)』。其他錯誤:A 急性肌張力不全(acute dystonia)的處置是『給予抗膽鹼藥(如 benztropine)，「不」建議自行暫時停藥』;B 類巴金森(流口水、手抖)通常在服藥『「數週至數月」』發生，非「服藥初期(數天)」;D 靜坐不能(akathisia)多發生於『「數天至數週」』，「4~5天內」的說法太絕對。故 C 正確。EPS 中遲發性運動異常是長期用藥的併發症。","options":{"A":"急性肌張力不全應給抗膽鹼藥處置，不建議自行停藥。","B":"類巴金森通常數週至數月發生，非服藥初期。","C":"正確。遲發性運動不能多發生於長期服用抗精神病藥物後。","D":"靜坐不能多發生於數天至數週，非「4~5天內」絕對。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","EPS"]}},"102110-N5-8":{"quick":"譫妄與失智的區別：譫妄患者的意識障礙波動大。","detail":{"background":"譫妄(delirium)與失智症(dementia)的區別，正確的是(B)『譫妄患者的「意識障礙波動大」(意識/注意力時好時壞、急性發作、常夜間加重)』。其他錯誤:A 失智症『以記憶與認知功能退化為主，「觸幻覺」並非其最常見症狀』;C 失智症『主要以「認知(記憶、判斷、執行功能)」障礙為主』，而非情感障礙;D『失語症或執行功能障礙』是「失智症」的特徵，而非譫妄(譫妄的核心是急性、波動的意識/注意力障礙)。故 B 正確。譫妄=急性、波動、意識障礙;失智=慢性、進行性、認知退化。","options":{"A":"失智以認知退化為主，觸幻覺非其最常見症狀。","B":"正確。譫妄患者的意識障礙波動大。","C":"失智以認知障礙為主，非情感障礙。","D":"失語症、執行功能障礙是失智的特徵，非譫妄。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"102110-N5-13":{"quick":"NMS 的臨床症狀：腎衰竭①、CPK 上升②、肌肉僵硬③(牙關緊閉④非典型)。","detail":{"background":"抗精神病藥物惡性症候群(NMS)的臨床症狀:(1)腎衰竭(因肌肉壞死、肌球蛋白尿致急性腎損傷);(2)血清肌酸酐磷酸酶(CPK)上升(肌肉壞死的指標);(3)肌肉僵硬(嚴重的鉛管樣僵直)。再加上高燒、意識改變、自律神經不穩。而(4)『牙關緊閉(trismus)』並非 NMS 的典型核心症狀(NMS 是「全身性」的鉛管樣肌肉僵直)。故正確為①②③(選 A)。NMS 的核心:高燒、僵直、意識改變、自律神經不穩、CPK 升高、腎衰竭。","options":{"A":"正確。腎衰竭①、CPK 上升②、肌肉僵硬③。","B":"234：含④(牙關緊閉)、缺①，錯誤。","C":"124：含④，錯誤。","D":"134：含④，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","NMS"]}},"102110-N5-17":{"quick":"酒精中毒的「支持性療法」＝補充維他命 B 群以減低神經系統症狀。","detail":{"background":"酒精中毒治療的「支持性療法」是指(D)『補充「維他命 B 群(尤其 B1)」以減低神經系統症狀(預防/治療 Wernicke 腦病、補充營養)』——支持性療法著重「維持生理機能、補充營養、矯正脫水電解質」。其他選項是「針對特定症狀的藥物治療」:A 抗巴金森藥治顫抖;B 抗精神病藥治譫妄幻覺;C 戒酒發泡錠(disulfiram)減弱飲酒慾望(嫌惡療法)——這些都不是「支持性療法」。故 D 正確。支持性療法的核心是補充營養(B 群)、維持生理穩定。","options":{"A":"抗巴金森藥治顫抖是針對性藥物治療，非支持性療法。","B":"抗精神病藥治譫妄幻覺是針對性治療。","C":"戒酒發泡錠是嫌惡療法，非支持性療法。","D":"正確。補充維他命 B 群以減低神經系統症狀，是支持性療法。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙"]}},"102110-N5-27":{"quick":"老年精神醫學的三個「D」＝憂鬱①、譫妄③、失智④(妄想②非)。","detail":{"background":"老年精神醫學常提到的三個「D」是:(1)憂鬱(Depression)、(3)譫妄(Delirium)、(4)失智(Dementia)——三者都可能出現認知或情緒變化、易混淆，臨床須仔細鑑別。而(2)『妄想(Delusion)』不在「3D」之列(妄想是症狀，非此三大鑑別診斷之一)。故正確為①③④(選 B)。老人 3D(憂鬱、譫妄、失智)是老年精神評估的重要鑑別。","options":{"A":"123：含②(妄想)，錯誤。","B":"正確。3D＝憂鬱①、譫妄③、失智④。","C":"234：含②、缺①，錯誤。","D":"124：含②，錯誤。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","老人3D"]}},"102110-N5-28":{"quick":"自閉症最常見的行為症狀＝行為刻板(重複、固著)。","detail":{"background":"自閉症(autism，自閉症類群障礙 ASD)最常見的核心行為症狀是(B)『行為刻板(重複、固著的行為、興趣與堅持同一性，如重複動作、固定routine、抗拒改變)』——這是 ASD 的兩大核心之一(另一是社交溝通缺損)。坐立不安偏向 ADHD;排斥上學偏向焦慮/拒學;睡眠障礙是常見的合併問題但非核心特徵。本題問「自閉症最常見的行為症狀」，以「行為刻板」最對應。故 B 正確。ASD 的核心:社交溝通缺損+侷限重複的行為興趣。","options":{"A":"坐立不安偏向 ADHD。","B":"正確。行為刻板(重複、固著)是自閉症的核心行為症狀。","C":"排斥上學偏向焦慮/拒學。","D":"睡眠障礙是常見合併問題，非核心特徵。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","自閉症"]}},"102110-N5-35":{"quick":"強制鑑定/強制社區治療審查會的組成：專科醫師②、護理師③、心理師④、病人權益促進團體代表⑤、法律專家⑥(病患本人①非成員)。","detail":{"background":"依精神衛生法，「強制鑑定、強制社區治療審查會」的組成成員包括:(2)專科醫師、(3)護理師、(4)心理師、(5)病人權益促進團體代表、(6)法律專家(及社會工作師等)——以「多元專業+權益代表」組成，以保障病人權益。而(1)『病患本人』不是「審查會的組成成員」(病患是被審查/保障的對象，審查會「得通知」其到場陳述，但非委員)。故正確為②③④⑤⑥(選 C)。","options":{"A":"12346：含①(病患本人)，病患非審查會成員。","B":"12345：含①，錯誤。","C":"正確。專科醫師②、護理師③、心理師④、病權團體代表⑤、法律專家⑥。","D":"12356：含①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"102110-N5-36":{"quick":"精神病攻擊強制住院者的優先照護＝確認過去暴力的原因與徵兆，積極觀察以防範。","detail":{"background":"王先生思覺失調、因攻擊父親而強制住院。優先的照護活動是(D)『確認王先生「過去暴力的原因與徵兆」，積極觀察以利防範(再發)』——了解暴力的前驅徵兆與誘因，是預防再度暴力、維護安全的關鍵。A『一入院就立即「預防性約束」』錯誤(約束須有適應症、是最後手段，不應預防性使用);B『面質個案的憤怒、探討暴力導因』在入院初、症狀明顯時不是優先(且面質可能激化);C『立即請人處理個人清潔』非當下優先(先確保安全)。故 D 正確。對暴力住院者，先評估暴力史與徵兆、積極觀察防範。","options":{"A":"約束須有適應症、是最後手段，不應預防性使用。","B":"入院初、症狀明顯時面質非優先，且可能激化。","C":"立即處理清潔非當下優先(先確保安全)。","D":"正確。確認過去暴力的原因與徵兆，積極觀察防範。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"102110-N5-39":{"quick":"失智者夜裡走錯房間：在房門上放置大而明顯的標記。","detail":{"background":"方老太太失智、常夜裡走錯房間、闖入家人臥房。最恰當的建議是(B)『在(她自己的)房門上放置大而明顯的「標記(如名字、照片、特定顏色)」』——以明顯的視覺線索協助失智者「定向、辨認自己的房間」，減少走錯。A『白天多帶出門散步活動』有助但未直接解決「夜裡走錯房間」;C『給藥助眠』非首選(先用非藥物方式);D『將老太太反鎖在房間內』錯誤(剝奪自由、有安全/火災風險、不人道)。故 B 正確。對失智者的定向問題，以明顯的環境標記輔助。","options":{"A":"白天散步有助，但未直接解決夜裡走錯房間。","B":"正確。在房門上放置大而明顯的標記，協助定向。","C":"給藥助眠非首選，先用非藥物方式。","D":"反鎖在房間內剝奪自由、有安全風險、不人道。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"103030-N5-1":{"quick":"96年版精神衛生法的強制住院：以「審查會鑑定機制」執行(可通知當事人到場、或派員查訪)。","detail":{"background":"96年版精神衛生法為保障嚴重病人權益，強制住院的方式是(C)『以「審查會(精神疾病強制住院、強制社區治療審查會)鑑定機制」執行;審查會議得通知當事人或利害關係人到場陳述，或主動派員查訪』——將強制住院的決定權由「醫師單方」改為「審查會」把關，以保障病人權益。其他錯誤:A、D『不需經當事人同意/不需詢問其意見』、B『一位醫師鑑定即可執行』——都不符96年版「經審查會審查、保障病人意見與權益」的精神。故 C 正確。","options":{"A":"仍應保障當事人/保護人的意見與權益，非完全不需。","B":"非「一位醫師鑑定即可」，須經審查會審查。","C":"正確。以審查會鑑定機制執行(可通知當事人到場或派員查訪)。","D":"須詢問並保障嚴重病人的意見，非不需詢問。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"103030-N5-7":{"quick":"長期服抗精神病藥、突然高燒、肌肉僵直、心跳快、白血球高、肌球蛋白尿＝抗精神病藥惡性症候群(NMS)。","detail":{"background":"朱先生長期服抗精神病藥、『突然發高燒、意識呆僵、全身肌肉僵直、心跳136(自律神經不穩)、白血球20000、肌球蛋白尿(myoglobulinuria，肌肉壞死)』——完全符合『抗精神病藥惡性症候群(NMS)』:高燒+鉛管樣肌肉僵直+意識改變+自律神經不穩(心跳快)+CPK 升高/肌球蛋白尿(肌肉壞死、可致腎衰竭)。錐體外症候群是運動障礙(無高燒);血清張力素(血清素)症候群是 SSRI 過量(反射亢進、陣攣);代謝內分泌副作用不符。NMS 是醫療急症，須立即停藥、降溫、支持治療。故 D 正確。","options":{"A":"錐體外症候群是運動障礙，無高燒、肌肉壞死。","B":"血清素症候群是 SSRI 相關，反射亢進、陣攣。","C":"代謝內分泌副作用不符此急性危症。","D":"正確。高燒+僵直+意識改變+肌肉壞死，是抗精神病藥惡性症候群(NMS)。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","NMS"]}},"103030-N5-17":{"quick":"ECT：須病人/家屬同意書①、用短效麻醉藥 methohexital②、可用 atropine 減少唾液③(服銀杏恢復記憶④錯)。","detail":{"background":"電氣痙攣療法(ECT)的正確敘述:(1)此項治療「必須有病人或家屬的同意書」才可施行(知情同意);(2)治療過程使用「短效麻醉藥物(如 methohexital)」;(3)治療過程可使用「atropine 以減少唾液分泌(防吸入、保護呼吸道)」。而(4)『衛教病人有記憶障礙副作用，故「必須服用銀杏以恢復記憶力」』錯誤——ECT 後的記憶障礙多為「暫時性、會自行恢復」，並無「服用銀杏恢復記憶」的實證做法。故正確為①②③(選 A)。","options":{"A":"正確。須同意書①、短效麻醉藥②、可用 atropine 減少唾液③。","B":"234：含④(服銀杏恢復記憶)、缺①，錯誤。","C":"134：含④，錯誤。","D":"124：含④，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","ECT"]}},"103030-N5-18":{"quick":"長期濫用安非他命、暴力、製造事端：態度一致，予以行為設限。","detail":{"background":"王先生長期濫用安非他命、有多次暴力史、住院常製造事端。較適當的處理是(D)『「態度一致」，予以「行為設限」(清楚的界限+一致的後果，團隊一致執行)』——對有暴力、操縱、製造事端傾向者，一致的態度與明確的行為界限是關鍵。A『試著說服、激發道德心』效果有限(對反社會/物質濫用傾向者);B『以暴治暴』錯誤(會升高衝突、不專業);C『順其自然、任其發洩』是放任。故 D 正確。對製造事端、暴力傾向者，以團隊一致的態度與行為設限處理。","options":{"A":"「激發道德心」對物質濫用/反社會傾向者效果有限。","B":"「以暴治暴」會升高衝突、不專業。","C":"「順其自然、任其發洩」是放任。","D":"正確。態度一致，予以行為設限。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"103030-N5-21":{"quick":"失智增加定向感「最不適宜」＝依病人需求更換喜歡之床位。","detail":{"background":"王老先生失智、四處遊走、進錯房間。為增加定向感，「最不適宜」者為(C)『依病人需求「更換」喜歡之床位』——錯誤，「更換床位/環境」會「打亂熟悉感、降低定向」，對失智者反而有害，應「維持固定、熟悉的環境」。其他適宜:A 在病房門口貼上姓名並提醒(視覺定向線索);B 維持相同的病房布置、固定照顧者(熟悉、可預期);D 鼓勵家人探訪、攜帶熟悉衣物(增加熟悉感與安全感)。故本題選最不適宜者為 C。對失智者，環境的「一致與熟悉」是維持定向的關鍵。","options":{"A":"門口貼姓名提醒，是定向線索，適宜。","B":"維持相同布置、固定照顧者，適宜。","C":"正確(本題選最不適宜者)。更換床位會打亂熟悉感、降低定向。","D":"家人探訪、攜帶熟悉衣物，適宜。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"103030-N5-24":{"quick":"出院後自行停藥、病情惡化：持續追蹤，評估停藥原因與症狀穩定情形。","detail":{"background":"張先生出院後不配合服藥、自行停藥而病情惡化。最適當的護理處置是(B)『持續追蹤個案，評估「停藥的原因(副作用?病識感?)」與症狀穩定情形』——找出停藥原因、評估病情，是處理服藥不順從的關鍵(可據以衛教、調整、加強支持)。A『尊重停藥的自主權』錯誤(病情惡化、有風險，不能僅以自主權放任);C『安排日間照護減輕家屬負擔』、D『轉介長期收容機構』都言之過早、非當下首要(且非建立病識感的方式)。故 B 正確。對自行停藥者，先持續追蹤、評估原因與病情。","options":{"A":"病情惡化、有風險，不能僅以自主權放任。","B":"正確。持續追蹤，評估停藥原因與症狀穩定情形。","C":"安排日間照護非當下首要。","D":"轉介長期收容機構言之過早。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR"]}},"103030-N5-35":{"quick":"智商45、督導下能自我照顧、可在庇護工作坊執行簡單工作＝中度智能不足。","detail":{"background":"小華智商45、『在督導下能自我照顧、能在庇護性工作坊執行簡單工作』——屬『中度智能不足(moderate，IQ 約35~49)』:可訓練基本自理與簡單工作技能(在監督/庇護環境下)，但需協助。輕度(IQ 50~70)可達國小程度、可半獨立;重度(IQ 20~34)生活大多需協助;極重度(IQ<20)完全需照顧。本題「督導下自理、庇護工作坊簡單工作」對應中度。故 B 正確。","options":{"A":"輕度(IQ 50~70)可達國小程度、可半獨立。","B":"正確。智商45、督導下自理、庇護工作坊簡單工作，是中度智能不足。","C":"重度智能不足生活大多需協助。","D":"極重度智能不足完全需照顧。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","智能不足"]}},"103030-N5-38":{"quick":"完美主義、講秩序、固執、注意細節、工作狂＝強迫型人格疾患。","detail":{"background":"「完美主義、講秩序、重效能、固執、注意細節、愛批判、工作狂」是『強迫型人格疾患(obsessive-compulsive personality disorder, OCPD)』的特質——過度追求秩序、完美、控制，僵化、缺乏彈性(注意:OCPD 是人格特質，與「強迫症 OCD」的強迫思考/行為不同)。畏縮(畏避)型是怕被否定而退縮;依賴型是過度依賴他人;邊緣型是情緒不穩、人際劇烈、怕被遺棄。本題是「完美、秩序、固執」，故為強迫型人格。故 C 正確。","options":{"A":"畏縮(畏避)型人格是怕被否定而退縮。","B":"依賴型人格是過度依賴他人。","C":"正確。完美主義、講秩序、固執、工作狂，是強迫型人格疾患。","D":"邊緣型人格是情緒不穩、人際劇烈、怕被遺棄。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"103030-N5-40":{"quick":"出院精神病患在社區怒罵、潑食物、攻擊他人：立即協助聯絡警消人員送醫治療。","detail":{"background":"剛出院的精神病患在社區大樓怒罵、潑食物、攻擊他人(有立即的傷人危險、且在社區)。社區精神科護理師接到家屬求助電話，需立即採取的是(A)『協助聯絡「警消人員」送醫治療』——面對有立即傷人危險者，須借助警消的人力與安全管控，將病人安全送醫(必要時依法緊急安置)。B『引導到密閉房間隔離』家屬無法安全執行、有風險;C『向社區宣導避免被攻擊』非當下緊急處置;D『將藥物磨粉偷偷加入食物』錯誤(欺騙、剝奪知情權、不當)。故 A 正確。對社區中有立即危險者，協助聯絡警消送醫。","options":{"A":"正確。立即協助聯絡警消人員送醫治療。","B":"引導到密閉房間隔離，家屬無法安全執行、有風險。","C":"向社區宣導非當下的緊急處置。","D":"偷偷加藥入食物是欺騙、剝奪知情權，不當。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"103100-N5-2":{"quick":"精神疾病強制住院「錯誤」者＝直轄市由「一位」精神專科醫師鑑定並決定住院。","detail":{"background":"依精神衛生法，精神疾病強制住院的敘述，「錯誤」者為(B)『直轄市需由「一位」精神專科醫師進行強制鑑定並決定是否住院』——錯誤，強制住院的鑑定須由『「二位以上」指定的專科醫師鑑定』(且經審查會審查)，並非「一位」。其他正確:A 精神症狀嚴重、有傷害自己或他人之虞，保護人應協助就醫辦理住院;C 緊急安置期間不得逾5日;D 強制住院以60天為限(舊版規定)。故本題選錯誤者為 B。(註:現行法規定數可能調整，本題依當時版本。)","options":{"A":"保護人應協助嚴重病人就醫辦理住院，正確。","B":"正確(本題選錯誤者)。須二位以上專科醫師鑑定，非一位。","C":"緊急安置不得逾5日，正確(當時版本)。","D":"強制住院以60天為限，正確(當時版本)。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"103100-N5-9":{"quick":"代幣制(token economy)：可依病人需求而靈活應用。","detail":{"background":"代幣制(token economy)的正確敘述:(A)『可依病人需求而「靈活應用」(個別化設計增強物與目標行為)』。其他錯誤:B 代幣制是『「行為改變技術」、用於增進「目標行為」』，並非「主要為社交技巧訓練」;C『代幣本身「是」一種增強物(次級/條件增強物)』，並非不是;D 代幣『「不只」用來換取次級增強物，「主要」用來換取「初級/實質的增強物或特權(如外出、零食)」』，「只可換取次級增強物」的敘述不正確。故 A 正確。代幣制以累積代幣兌換增強物，可個別化、靈活應用。","options":{"A":"正確。代幣制可依病人需求而靈活應用。","B":"代幣制用於增進目標行為，非「主要為社交技巧訓練」。","C":"代幣本身是一種(次級)增強物，非不是。","D":"代幣可兌換初級/實質增強物，非只可換次級增強物。"},"sources":["精神科護理學(新文京/華杏)·行為治療"]}},"103100-N5-19":{"quick":"Alprazolam(Xanax，BZD)：注意暈眩並預防跌倒。","detail":{"background":"Alprazolam(Xanax)的正確敘述:(C)『屬 BZD，有鎮靜作用，須「注意暈眩並預防跌倒(尤其老人)」』。其他錯誤:A alprazolam『「是」BZD 類藥物』，並非非 BZD;B 主要用於『「抗焦慮(及助眠)」』，並非抗精神病症狀;D alprazolam 是『「短效」BZD，半衰期短(約6~12小時)』，並非超過24小時。故 C 正確。老年人服用 BZD 須特別留意鎮靜、暈眩、跌倒與依賴風險。","options":{"A":"alprazolam 是 BZD 類藥物，非非 BZD。","B":"主要用於抗焦慮(及助眠)，非抗精神病。","C":"正確。注意暈眩並預防跌倒(BZD 的鎮靜作用)。","D":"alprazolam 是短效 BZD，半衰期短，非超過24小時。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","BZD"]}},"103100-N5-22":{"quick":"老年人譫妄的發生原因：新陳代謝失調①、藥物引起中樞副作用③、酒精中毒④(重鬱症②非)。","detail":{"background":"老年人「譫妄」的發生原因(多為「生理/外在」因素誘發的急性意識障礙):(1)新陳代謝失調(電解質、血糖、缺氧、感染、脫水等);(3)藥物引起的中樞神經副作用(尤其抗膽鹼藥、鎮靜藥);(4)酒精中毒(及戒斷)。而(2)『重鬱症』是「情緒障礙」，並非「譫妄」的直接原因(憂鬱與譫妄都是老人 3D 之一，但憂鬱不是引發譫妄的生理病因)。故正確為①③④(選 B)。譫妄須找出並處理潛在的生理病因。","options":{"A":"123：含②(重鬱症)，非譫妄的直接原因。","B":"正確。新陳代謝失調①、藥物中樞副作用③、酒精中毒④。","C":"124：含②，錯誤。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","譫妄"]}},"103100-N5-28":{"quick":"「不是」廣泛發展障礙(PDD)核心障礙者＝重度智能不足。","detail":{"background":"廣泛發展障礙(PDD，如自閉症類群)的「核心障礙(三大核心)」是:A 社交互動障礙、B 語言溝通障礙、C 重複刻板的行為模式。而(D)『重度智能不足』「不是」PDD 的核心障礙——智能不足可能「合併」存在，但並非 PDD 的「定義性核心(有些 PDD/ASD 個案智能正常甚至優異)」。故本題選不是者為 D。PDD/ASD 的核心是社交溝通缺損+侷限重複的行為，智能障礙是可能的合併、非核心。","options":{"A":"社交互動障礙是 PDD 的核心障礙。","B":"語言溝通障礙是 PDD 的核心障礙。","C":"重複刻板的行為模式是 PDD 的核心障礙。","D":"正確(本題選不是者)。重度智能不足是可能合併，非 PDD 的核心障礙。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","自閉症"]}},"103100-N5-29":{"quick":"向 ADHD 患童母親說明：是注意力欠缺所致，須學習適當的管教方法。","detail":{"background":"王小弟7歲、ADHD(調皮、干擾同學、無法安靜、成績差)。護理師應向母親說明(C)『這是「注意力欠缺(及過動衝動)所致(是一種疾病，非故意搗蛋)」，須學習「適當的管教方法(行為管理、結構化、正向引導)」』——讓家長理解這是 ADHD 的症狀、並學習有效的管教與支持策略。A『此年齡正常調皮、耐心教導』否認 ADHD;B『為反抗性行為』誤判(ADHD 非對立反抗為核心);D『個性急躁衝動所致、教自我控制』描述偏頗(未點出注意力不足的核心、且僅「教自我控制」不足)。故 C 正確。","options":{"A":"否認 ADHD、當作正常調皮，不恰當。","B":"誤判為反抗性行為(ADHD 非對立反抗為核心)。","C":"正確。是注意力欠缺所致，須學習適當的管教方法。","D":"僅「個性衝動、教自我控制」描述偏頗、不足。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD"]}},"103100-N5-33":{"quick":"暴力行為：依行為學派，暴力是透過內在及外在的社會化過程「學習」而來。","detail":{"background":"暴力行為的正確敘述:(B)『依「行為(學習)學派」的理念，暴力行為是透過「內在及外在的社會化過程「學習」而來(觀察學習、模仿、增強)」』。其他錯誤:A 神經傳導物質「GABA」是「抑制性」，與「降低(非增加)攻擊」有關(增加攻擊與血清素「低」、正腎上腺素高有關);C 與暴力相關的腦部是「額葉、邊緣系統」，而非「枕葉」;D 病房暴力通常產生在「結構鬆散、過度擁擠、規範不清」的環境，而非「結構較彈性」。故 B 正確。暴力是多因素(生物、心理、社會學習)的結果。","options":{"A":"GABA 是抑制性，與降低攻擊有關，非增加。","B":"正確。依行為學派，暴力是透過社會化過程學習而來。","C":"與暴力相關的是額葉、邊緣系統，非枕葉。","D":"病房暴力產生於結構鬆散的環境，非結構彈性。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"103100-N5-34":{"quick":"精神科居家護理：服務對象含病患及家屬②、教導家屬照顧與相處③、增進病患獨立生活與病共處④(護理師單獨決定治療方針①錯)。","detail":{"background":"精神科居家護理治療的正確敘述:(2)服務對象包含「病患及家屬」;(3)可教導家屬「照顧病患及與病患相處的方法」;(4)可增進病患「獨立生活及與病共處的能力」。而(1)『由護理師「單獨執行並決定治療方針」』錯誤——居家護理是「團隊合作」，治療方針由「醫療團隊(含醫師)」共同決定，護理師不單獨決定治療方針。故正確為②③④(選 D)。","options":{"A":"123：含①(護理師單獨決定治療方針)，錯誤。","B":"124：含①，錯誤。","C":"134：含①，錯誤。","D":"正確。服務對象含病患家屬②、教導家屬照顧相處③、增進病患獨立生活④。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"103100-N5-37":{"quick":"精神醫療安全照護環境：住院病人若持有剪刀、美工刀，可能造成威脅。","detail":{"background":"精神醫療安全照護環境的正確敘述:(A)『住院精神病人若持有「剪刀、美工刀」等利器，可能造成病房或工作人員的威脅(危險物品須妥善管理)』。其他錯誤:B『意外事件防範屬醫療業務，「與工務或硬體環境無關」』錯誤(硬體環境設計，如防撞、防自傷設施，是安全防範的重要一環);C『精神科用藥多為鎮靜安眠藥，因此「無須特別防範」』錯誤(這些藥物若囤積、過量也有風險，仍須防範);D『病況穩定、恢復現實感後即可「不需再觀察」』錯誤(仍須持續觀察，尤其自殺風險在恢復期更高)。故 A 正確。","options":{"A":"正確。住院病人持有利器可能造成威脅，須妥善管理。","B":"硬體環境設計是安全防範的重要一環，非無關。","C":"鎮靜安眠藥若囤積過量也有風險，仍須防範。","D":"恢復期仍須持續觀察(自殺風險更高)，非不需。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"104030-N5-2":{"quick":"護理師提醒醫師向病人解釋臨床試驗、請病人簽同意書＝代言者(advocate)。","detail":{"background":"護理師提醒醫師「應向病人解釋相關資訊、請病人填寫臨床試驗同意書」——這是『維護病人的「知情同意」權益、為病人發聲』，扮演『代言者(advocate)』的角色(保障病人權益)。教育者是提供衛教知識;個案管理者是協調整合照護;諮商者是提供心理支持與輔導。本題核心是「維護病人的知情同意權益」，故為代言者。故 D 正確。護理師作為病人的代言者，須確保病人的權益(如知情同意)受到保障。","options":{"A":"教育者是提供衛教知識。","B":"個案管理者是協調整合照護。","C":"諮商者是提供心理支持與輔導。","D":"正確。維護病人的知情同意權益、為病人發聲，是代言者。"},"sources":["精神科護理學(新文京/華杏)·護理角色","醫療倫理"]}},"104030-N5-5":{"quick":"行為契約的內容：問題行為次數紀錄①、增強物種類②、病人姓名及同意後簽名④(處罰物種類③非)。","detail":{"background":"運用行為修正、與病人訂定行為契約，內容應包括:(1)問題行為(目標行為)次數的紀錄;(2)增強物的種類(達成目標的正向獎勵);(4)病人的姓名和同意後的簽名(雙方同意、共同參與)。而(3)『「處罰物」的種類』不是行為契約的必要/適當內容——行為修正「強調「正增強」」，以鼓勵正向行為為主，而非以「處罰」為手段。故正確為①②④(選 D)。行為契約以正增強、雙方同意、明確的目標與紀錄為核心。","options":{"A":"123：含③(處罰物種類)，行為契約強調正增強，非處罰。","B":"234：含③、缺①，錯誤。","C":"134：含③，錯誤。","D":"正確。問題行為次數紀錄①、增強物種類②、病人姓名及簽名④。"},"sources":["精神科護理學(新文京/華杏)·行為治療"]}},"104030-N5-26":{"quick":"「不是」MMSE 評估重點者＝價值觀。","detail":{"background":"簡短智能評估表(MMSE)是評估「認知功能」的量表，評估重點包括:A 記憶力(立即/短期記憶)、B 定向感(時間、地點)、D 計算力(連續減7)，以及注意力、語言(命名、複誦、理解、書寫)、視覺空間建構等。而(C)『價值觀』「不是」MMSE 的評估重點——價值觀屬於個人信念/態度，非認知功能的評估項目。故本題選不是者為 C。MMSE 評估的是認知功能(定向、記憶、注意計算、語言、建構)，非價值觀。","options":{"A":"記憶力是 MMSE 的評估重點。","B":"定向感是 MMSE 的評估重點。","C":"正確(本題選不是者)。價值觀不是 MMSE 的評估項目。","D":"計算力是 MMSE 的評估重點。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","MMSE"]}},"104030-N5-28":{"quick":"阿茲海默症的發病原因：有家族遺傳傾向②、過去曾有腦損傷③、年齡與發病率成正比④(乙醯膽鹼分泌過量①錯)。","detail":{"background":"阿茲海默症(Alzheimer disease)的發病原因:(2)有家族遺傳傾向(部分與基因如 APOE-e4、早發性家族型有關);(3)過去曾有腦損傷(頭部外傷史是危險因子);(4)年齡與發病率成正比(年齡越大、盛行率越高，是最重要的危險因子)。而(1)『腦部「乙醯膽鹼」分泌「過量」』錯誤——阿茲海默症是乙醯膽鹼「「不足/減少」」(膽鹼性神經元退化)，故以「乙醯膽鹼酶抑制劑」治療(增加乙醯膽鹼)。故正確為②③④(選 D)。","options":{"A":"124：含①(乙醯膽鹼過量)，阿茲海默是乙醯膽鹼不足。","B":"123：含①，錯誤。","C":"134：含①，錯誤。","D":"正確。家族遺傳②、過去腦損傷③、年齡與發病率成正比④。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","阿茲海默症"]}},"104030-N5-29":{"quick":"初期失智症的照顧原則：鼓勵適當運動(如體操、太極拳)。","detail":{"background":"初期失智症的照顧原則，最適宜的是(C)『鼓勵適當運動(如體操、太極拳)』——適度運動有助維持身體功能、改善情緒與睡眠、延緩退化。其他不適宜:A『安排「不同」的照護人員』錯誤(應安排「固定」照顧者以增加熟悉與信任，不同人員反而降低定向);B『採用「開放式」問句』對失智者較難回答(宜用「簡單、具體、封閉式」問句);D『協助學習「新事物」增強認知』對失智者可能造成挫折、超出負荷(宜維持既有功能、不過度要求學新)。故 C 正確。","options":{"A":"應安排固定照顧者增加熟悉，非不同人員。","B":"失智者宜用簡單具體的封閉式問句，非開放式。","C":"正確。鼓勵適當運動(如體操、太極拳)。","D":"協助學習新事物可能造成挫折、超出負荷。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"104030-N5-30":{"quick":"ADHD 患童的遊戲與生活安排「不適宜」者＝強調專注力訓練的靜態活動。","detail":{"background":"ADHD 患童的遊戲與生活安排，「不適宜」者為(B)『強調「專注力訓練的靜態活動」』——ADHD 患童「難以長時間靜態、專注」，安排長時間的靜態專注活動會造成挫折、不切實際(宜安排「短時、有結構、可活動」的活動)。其他適宜:A 安排感覺統合治療;C 選擇活動量不高的玩伴(避免過度刺激、衝突);D 安排不具攻擊性的活動(減少衝動攻擊的機會)。故本題選不適宜者為 B。對 ADHD 患童宜安排結構化、短時、不過度刺激的活動。","options":{"A":"安排感覺統合治療，適宜。","B":"正確(本題選不適宜者)。ADHD 難長時間靜態專注，強調靜態專注活動不適宜。","C":"選擇活動量不高的玩伴，適宜。","D":"安排不具攻擊性的活動，適宜。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD"]}},"104030-N5-37":{"quick":"暴力強制送急診的危機處理：先以堅決冷靜的態度安撫失控行為，再考慮約束治療。","detail":{"background":"伍先生情緒激躁、暴力攻擊被強制送急診。急診危機處理正確的是(B)『先以「堅決、冷靜」的態度「安撫」伍先生的失控行為，「再考慮約束治療(約束是後續、必要時的手段)」』——先以言語/態度安撫(較少限制的方式)，無效或仍有危險時才用約束。其他錯誤:A『強調未來需求的照護方向』非急性危機當下的重點;C『以細膩會談評估誘因』是「穩定後」的後續，非當下;D『不需告知家屬以維護自主性』錯誤(應與家屬溝通、知會)。故 B 正確。危機處理由「較少限制(安撫)」漸進到「約束」。","options":{"A":"強調未來需求非急性危機當下的重點。","B":"正確。先以堅決冷靜態度安撫失控行為，再考慮約束治療。","C":"細膩會談評估誘因是穩定後的後續，非當下。","D":"應與家屬溝通知會，非不需告知。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"104030-N5-38":{"quick":"暴力：是個體為某種原因對自己/他人的強烈語言或行動②、自我控制差及症狀干擾者易暴力③(暴力是疾病/醫學診斷①、單一因素只能控制④皆錯)。","detail":{"background":"暴力的正確敘述:(2)暴力是「個體為了某種原因，對自己或他人採取的強烈語言或行動」(是一種「行為」);(3)「自我控制差及症狀干擾中」的精神科個案容易產生暴力。其他錯誤:(1)『暴力是「一種疾病或醫學診斷」』錯誤——暴力是「行為/症狀」，並非疾病診斷;(4)『暴力是「單一因素」的病態行為、「只能加以控制」』錯誤——暴力是「多因素(生物、心理、社會、環境)」的結果，且可「預防」(非只能控制)。故正確為②③(選 B)。","options":{"A":"12：含①(暴力是疾病/診斷)，暴力是行為非診斷。","B":"正確。暴力是對自己/他人的強烈語言或行動②、自控差及症狀干擾者易暴力③。","C":"34：含④(單一因素只能控制)，錯誤。","D":"14：含①④，皆錯。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"104030-N5-39":{"quick":"暴力預防：意識未混亂時可治療性會談化解①、移除危險物品疏散非必要人員建立無威脅環境③(不需密切觀察立即約束②、儘快閃動蹲屈④皆錯)。","detail":{"background":"陳先生幻聽干擾、情緒不穩、暴力住院。暴力預防的正確處置:(1)當情緒不穩、有焦慮行為但「意識尚未混亂」時，可運用「治療性會談」化解暴力危機(較少限制的方式);(3)「移除周圍危險物品、疏散現場非必要人員、建立無威脅性的治療環境」(環境安全管控)。其他錯誤:(2)『情緒行為「不需再密切觀察」、有攻擊就「立即約束隔離」』錯誤(須持續密切觀察，且約束是最後手段);(4)『儘快「閃動或蹲屈」以掌握行蹤』描述怪異、不符標準的安全處置(應保持安全距離、留意動線)。故正確為①③(選 D)。","options":{"A":"12：含②(不需觀察、立即約束)，錯誤。","B":"23：含②，錯誤。","C":"34：含④(閃動蹲屈)，描述不符標準處置。","D":"正確。意識未混亂可治療性會談①、移除危險物品疏散非必要人員③。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"104100-N5-1":{"quick":"拒絕住院的嚴重病人緊急安置強制住院＝由主管機關指定「二位以上」專科醫師鑑定。","detail":{"background":"依精神衛生法，臺北市王先生為拒絕住院的嚴重病人、需緊急安置強制住院，須經(B)『直轄市、縣(市)主管機關指定「二位以上」專科醫師鑑定』——強制住院的鑑定須由「二位以上」指定的專科醫師為之(以慎重、保障病人權益)，而非「一位」或「任一醫師」。緊急醫療醫師、任一醫師都不符規定。故 B 正確。強制住院的鑑定須由二位以上指定專科醫師、並經審查會審查，以保障病人權益。","options":{"A":"須二位以上專科醫師鑑定，非一位。","B":"正確。由主管機關指定二位以上專科醫師鑑定。","C":"須指定的「精神科專科醫師」，非緊急醫療醫師。","D":"非「任一醫師」即可，須指定的二位以上專科醫師。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"104100-N5-13":{"quick":"ECT：病人電擊後若無過多分泌物且呼吸順暢，可不必抽痰。","detail":{"background":"電氣痙攣療法(ECT)的正確敘述:(B)『病人電擊後，若「沒有過多分泌物、且呼吸順暢」，可「不必抽痰」(依實際需要而定，非常規一律抽痰)』。其他錯誤:A『若沒取下活動假牙，可不必置放壓舌板』錯誤(活動假牙「必須取下」，且須置放「牙墊/壓舌板」防咬傷舌頭、牙齒);C『成年且急性住院中可不必再簽同意書』錯誤(ECT 是侵入性治療，每次/療程仍須知情同意);D『皮膚油垢多、導電佳、可不必給電膠液』錯誤(電極處須清潔並塗「導電膠」以良好導電、避免灼傷，油垢反而影響)。故 B 正確。","options":{"A":"活動假牙必須取下，且須置放牙墊/壓舌板防咬傷。","B":"正確。無過多分泌物且呼吸順暢時，可不必抽痰。","C":"ECT 是侵入性治療，仍須知情同意簽署。","D":"電極處須清潔並塗導電膠，油垢會影響導電、增加灼傷風險。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","ECT"]}},"104100-N5-22":{"quick":"檢查失智者定向、注意、記憶、語言、理解、行動＝簡短智能評估量表(MMSE)。","detail":{"background":"欲檢查蔣先生(失智)的「定向感、注意力、記憶力、語言、口語理解及行動能力(認知功能)」，應使用(D)『簡短智能評估量表(MMSE)』——是評估認知功能的常用篩檢工具(含定向、記憶、注意計算、語言、複誦、理解、書寫、建構)。A 阿茲海默生活功能分期量表(FAST)是評估「功能分期/退化程度」;B 老人憂鬱量表(GDS)、C 貝克憂鬱量表(BDI)是評估「憂鬱」。本題評估的是認知功能，故用 MMSE。故 D 正確。","options":{"A":"FAST 是評估功能分期/退化程度。","B":"GDS 是評估老人憂鬱。","C":"BDI 是評估憂鬱。","D":"正確。評估認知功能(定向、記憶、語言等)用 MMSE。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","MMSE"]}},"104100-N5-26":{"quick":"錐體外症候群(EPS)：類巴金森氏症最容易出現在用藥3個月內。","detail":{"background":"錐體外症候群(EPS)的正確敘述:(C)『類巴金森氏症(pseudo-Parkinsonism，如手抖、僵硬、面具臉)最容易出現在「用藥數週至3個月內」』。其他錯誤:A 斜頸、牙關緊閉是「急性肌張力不全(acute dystonia)」，最易出現在「用藥「初期(數小時至數天)」」，而非長期用藥後;B 坐立不安、來回走動是「靜坐不能(akathisia)」，多出現在「用藥數天至數週」(「初期幾天內」太絕對);D 不斷眨眼、鼓嘴咀嚼是「遲發性運動異常(tardive dyskinesia)」，出現在「長期(數月至數年)」用藥後，而非「3個月內」。故 C 正確。","options":{"A":"斜頸、牙關緊閉是急性肌張力不全，出現在用藥初期，非長期。","B":"靜坐不能多在數天至數週，「初期幾天內」太絕對。","C":"正確。類巴金森氏症最容易出現在用藥3個月內。","D":"遲發性運動異常出現在長期用藥後，非3個月內。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","EPS"]}},"104100-N5-28":{"quick":"協助 ADHD 患童改善打人行為：建議家長用「虛擬的人物」與患童討論其行為。","detail":{"background":"ADHD 患童在校打同學，協助改善的建議是(D)『用「虛擬的人物(如故事、布偶、第三人稱)」與患童討論其行為』——以間接、遊戲化、不指責的方式，讓孩子較能放鬆地理解與覺察自己的行為(對年幼/衝動的孩子，間接的方式比直接質問有效)。A『直接問「為什麼打人」』孩子常說不清楚、且帶質問;B『玩電動時討論』分心、不專注;C『再犯就送警察局』是威脅恐嚇。故 D 正確。對 ADHD 患童，以遊戲化、間接的方式討論行為較有效。","options":{"A":"直接問「為什麼打人」孩子常說不清、且帶質問。","B":"玩電動時討論會分心、不專注。","C":"「送警察局」是威脅恐嚇。","D":"正確。用虛擬人物(遊戲化、間接)與患童討論其行為。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD"]}},"104100-N5-31":{"quick":"智能不足個案所占比例最高＝輕度。","detail":{"background":"智能不足(智能障礙)各程度中，所占比例「最高」的是(A)『輕度(mild，IQ 約50~70)』——約佔智能不足者的「85%」(絕大多數);中度約10%;重度約3~4%;極重度約1~2%。故 A 正確。輕度智能不足者最多，且功能相對較好(可教育、可半獨立生活)，常到學齡期才被發現。","options":{"A":"正確。輕度智能不足所占比例最高(約85%)。","B":"中度約佔10%。","C":"重度約佔3~4%。","D":"極重度約佔1~2%。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","智能不足"]}},"104100-N5-34":{"quick":"減少精神病患機構化＝進行出院準備服務之相關計畫。","detail":{"background":"我國精神衛生工作為「減少精神病患的機構化現象」，應(A)『進行「出院準備服務」之相關計畫(協助病人由機構順利返回社區、銜接社區資源)』——去機構化的核心是促進病人回歸社區、強化社區照護。其他錯誤:B『擴增「急性病床」』、C『擴增「慢性病床」』都會增加機構化(住院化);D『「減少」設置社區心理衛生中心』與去機構化背道而馳(應「增加」社區資源)。故 A 正確。去機構化以出院準備、強化社區照護為策略。","options":{"A":"正確。進行出院準備服務，協助病人回歸社區，減少機構化。","B":"擴增急性病床會增加機構化。","C":"擴增慢性病床會增加機構化。","D":"減少社區心理衛生中心與去機構化背道而馳。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"104100-N5-37":{"quick":"暴力的生理因素：抗精神病藥副作用(靜坐不能)致焦躁，有時以肢體攻擊取代語言表達。","detail":{"background":"暴力行為的生理因素，正確敘述是(D)『因抗精神病藥物的副作用，而導致「焦躁不安、靜坐不能(akathisia)」，有時也可能以「肢體攻擊取代語言」的表達(病人因藥物引起的躁動而出現攻擊)』。其他敘述較不精確:A 與暴力相關的腦區主要是「額葉、邊緣系統(杏仁核)」(顳葉、下視丘的描述不夠精確);B『Steroid、Aminophylline 「都」容易讓衝動失調導致暴力』過於概括;C 暴力與「血清素「低」、多巴胺活性異常」有關，「多巴胺「降低」是成因」的說法不精確。故 D 正確。藥物副作用(如靜坐不能)致躁動是臨床上不可忽略的暴力因素。","options":{"A":"與暴力相關主要是額葉、邊緣系統，顳葉下視丘的描述不精確。","B":"「Steroid、Aminophylline 都致暴力」過於概括。","C":"暴力與血清素低有關，「多巴胺降低是成因」不精確。","D":"正確。靜坐不能等藥物副作用致躁動，有時以肢體攻擊取代語言。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"105030-N5-2":{"quick":"媒體報導精神病人姓名或居住地(未經同意)＝違反精神衛生法。","detail":{"background":"媒體報導張姓男子精神病發、並寫出其「居住地(彰化縣田中鎮)、姓名」且未經病人同意——(A)『違反精神衛生法，因為「傳播媒體不得報導精神病人之姓名或居住(所在)地」(保護病人隱私與名譽)』。其他錯誤:B、C 都主張「為社會安危可公布居住地/姓名」，違反法規(精神衛生法明文保護病人隱私);D『精神衛生法沒有相關規範』錯誤(明文有規範)。故 A 正確。精神衛生法保護病人隱私，媒體不得報導其姓名、住居所。","options":{"A":"正確。違反精神衛生法，媒體不得報導精神病人之姓名或居住地。","B":"公布居住地違反法規(隱私保護)。","C":"公布姓名與居住地違反法規。","D":"精神衛生法有明文規範，非沒有。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"105030-N5-4":{"quick":"每天飯前固定到大門口擺物、向人跪拜的怪異儀式行為＝作態行為(Mannerism)。","detail":{"background":"王先生『每天早上飯前固定走到大門口、將書水果衛生紙放地上、有人進來就跪拜』——這是「重複、固定、怪異、具個人意義的儀式化動作」，屬『作態行為(Mannerism)』(怪異、做作、刻板的動作)。回音性動作(Echopraxia)是不自主模仿他人的動作;拒絕現象(Negativism)是抗拒指令、做相反動作;靜坐不能(Akathisia)是坐立難安、來回走動的藥物副作用。本題是「固定的怪異儀式動作」，故為作態行為。故 C 正確。","options":{"A":"回音性動作是不自主模仿他人的動作。","B":"拒絕現象是抗拒指令、做相反動作。","C":"正確。固定、怪異的儀式化動作，是作態行為(Mannerism)。","D":"靜坐不能是藥物副作用的坐立難安。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學"]}},"105030-N5-9":{"quick":"SSRI 常見副作用：噁心①、睡眠障礙②、性慾降低③(體重增加④非典型)。","detail":{"background":"選擇性血清素再吸收抑制劑(SSRI，如 fluvoxamine)的常見副作用:(1)噁心(腸胃道，尤其初期);(2)睡眠障礙(失眠或嗜睡);(3)性慾降低/性功能障礙(SSRI 常見)。而(4)『體重增加』並非 SSRI「早期、典型」的副作用——SSRI 初期常因噁心、食慾下降而「體重持平或減輕」(體重增加較常見於部分其他抗憂鬱劑或長期使用)。故正確為①②③(選 A)。SSRI 常見副作用:腸胃道(噁心)、失眠、性功能障礙。","options":{"A":"正確。噁心①、睡眠障礙②、性慾降低③。","B":"124：含④(體重增加)，非 SSRI 早期典型副作用。","C":"134：含④，錯誤。","D":"234：含④、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","SSRI"]}},"105030-N5-12":{"quick":"邊緣型人格的家庭治療「最不適宜」＝處理母女間的「三角關係」(本題僅母女二人)。","detail":{"background":"曾小姐邊緣型人格、與母親的關係問題。家庭治療原則中，「最不適宜」者為(D)『處理母女間的「三角關係(triangles)」』——三角關係(三角化)需要「第三方」捲入(如父親、其他家人)，而本題的核心是「母女「二人」的關係(撒嬌、威脅、依賴)」，並無明顯的第三方，故「三角關係」的概念在此最不適用。其他適宜:A 處理母女關係的自我界域(ego-boundary，界限不清);B 雙重束縛(矛盾訊息);C 假性和諧關係(表面和諧、迴避衝突)。故本題選最不適宜者為 D。","options":{"A":"處理母女關係的自我界域(界限不清)，適宜。","B":"處理母女關係的雙重束縛(矛盾訊息)，適宜。","C":"處理假性和諧關係(表面和諧)，適宜。","D":"正確(本題選最不適宜者)。三角關係需第三方，本題僅母女二人。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR","家庭治療"]}},"105030-N5-15":{"quick":"妄想症病人不想吃藥(怕副作用)：以「我們可以一起討論並聽聽妳的想法」回應。","detail":{"background":"楊小姐妄想症、不想吃藥(認為藥物害她行動不便、昏睡)。最適切的回應是(A)『「我們可以一起討論並聽聽妳的想法」』——以開放、合作、尊重的態度，了解其對藥物的擔憂，建立信任、共同決策(可增進服藥順從)。B『別擔心、抗精神病藥多少有些副作用』輕忽其擔憂;C『我會請醫師開另一種藥』未先了解、跳到換藥;D『副作用是大家都會有的』否定其個別感受。故 A 正確。對拒藥的病人，先傾聽、了解擔憂、合作討論。","options":{"A":"正確。「我們可以一起討論並聽聽妳的想法」，了解擔憂、合作。","B":"「別擔心、多少有些副作用」輕忽其擔憂。","C":"未先了解就跳到換藥，不當。","D":"「大家都會有的」否定其個別感受。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR"]}},"105030-N5-21":{"quick":"失智症與譫妄的比較：譫妄是急性發作，而失智症是緩慢進行。","detail":{"background":"失智症與譫妄的比較，正確的是(A)『「譫妄」是「急性」發作(數小時至數天)，而「失智症」是「緩慢、漸進」進行(數月至數年)』。其他錯誤:B 譫妄與失智「不是只發生在65歲老人」(各年齡皆可能，譫妄常見於各年齡的急性病人);C 在病程上，譫妄是「短暫(可逆)」、失智是「長期(進行性)」，「病程一樣長」錯誤;D 譫妄的病人「意識「障礙、波動」」，並非「清楚正常」。故 A 正確。譫妄=急性、波動、意識障礙、可逆;失智=慢性、漸進、認知退化。","options":{"A":"正確。譫妄是急性發作，失智症是緩慢進行。","B":"譫妄、失智非只發生在65歲老人。","C":"譫妄短暫(可逆)、失智長期進行，病程不一樣長。","D":"譫妄的病人意識障礙、波動，非清楚正常。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"105030-N5-26":{"quick":"老年人譫妄「較不可能」的病因＝夜眠片斷。","detail":{"background":"老年人譫妄(急性混亂)的病因多為「生理/外在」誘因。其中「較不可能」是病因者為(C)『夜眠片斷(睡眠中斷)』——夜眠片斷是睡眠問題，可能是譫妄的「結果或伴隨現象」，而非「引發譫妄的主要病因」。其他較可能是病因:A 手術後創傷(術後譫妄常見);B 酒癮(及酒精中毒/戒斷);D 體液電解質不平衡(代謝失調)。故本題選較不可能者為 C。譫妄的主要病因是感染、代謝、藥物、缺氧、手術、物質等。","options":{"A":"手術後創傷(術後譫妄)是常見病因。","B":"酒癮(中毒/戒斷)是常見病因。","C":"正確(本題選較不可能者)。夜眠片斷較可能是結果，非主要病因。","D":"體液電解質不平衡(代謝失調)是常見病因。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","譫妄"]}},"105030-N5-38":{"quick":"與老人討論過去成功的經驗以提升自尊＝懷舊治療。","detail":{"background":"與老人討論其「過去成功的經驗」，進而提升其自尊與自信的治療活動，稱為(A)『懷舊治療(reminiscence therapy)』——透過回憶過去(尤其正向、成功的經驗)，促進自我統整、提升自尊與自信、改善情緒。現實治療著重「此時此地」的責任與選擇;家庭治療處理家庭系統;動機治療(動機式晤談)用於促進改變動機。本題核心是「回憶過去成功經驗」，故為懷舊治療。故 A 正確。","options":{"A":"正確。與老人討論過去成功經驗以提升自尊，是懷舊治療。","B":"現實治療著重此時此地的責任與選擇。","C":"家庭治療處理家庭系統。","D":"動機治療(動機式晤談)用於促進改變動機。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","懷舊治療"]}},"105090-N5-1":{"quick":"ECT 只說「睡一覺起來就好」、未充分說明就簽同意書＝違反「知情同意」原則。","detail":{"background":"護理師對 ECT 病人「只說這治療會讓他睡一覺、起來就好多了」，未充分說明治療的性質、風險、副作用就請病人簽同意書——這違反『「知情同意(informed consent)」』倫理原則:病人有權在「充分了解(治療目的、過程、風險、替代方案)」後「自主決定」是否接受治療。行善是促進福祉;不傷害是避免傷害;公平是公平分配。本題核心是「未充分告知就取得同意」，故違反知情同意。故 A 正確。","options":{"A":"正確。未充分說明就簽同意書，違反知情同意原則。","B":"行善是促進病人福祉。","C":"不傷害是避免造成傷害。","D":"公平是公平分配資源。"},"sources":["精神科護理學(新文京/華杏)·醫療倫理"]}},"105090-N5-22":{"quick":"幫助失智者溝通：注意病人的音調、姿勢，以推測其感覺。","detail":{"background":"幫助老年失智症病人溝通的正確技巧是(C)『注意病人的「音調、姿勢(非語言訊息)」，以推測其感覺(失智者言語表達受限，須由非語言線索理解其需求與情緒)』。其他錯誤:A『儘量要求病人「清楚說出」想說的事』會造成壓力、挫折(其表達能力已受損);B『向他「澄清事實、增強認知」』對失智者(認知退化)不切實際、易引起挫折;D『儘量使用「開放性問句」』對失智者較難回答(宜用簡單、具體、封閉式問句)。故 C 正確。對失智者，多觀察非語言訊息、用簡單具體的溝通。","options":{"A":"要求清楚說出會造成壓力、挫折(表達能力已受損)。","B":"澄清事實、增強認知對失智者不切實際。","C":"正確。注意病人的音調、姿勢，以推測其感覺。","D":"開放性問句對失智者較難回答，宜用封閉式。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"105090-N5-23":{"quick":"19歲車禍頭部外傷、加護病房中拔管、躁動、胡言亂語、時躺時坐＝譫妄。","detail":{"background":"蘇同學19歲、車禍頭部外傷、入加護病房、『入院二天後「突然」出現拔管、躁動、胡言亂語、時躺時坐、激躁不安』——這是『譫妄(delirium)』:急性發作、意識/注意力障礙、行為躁動混亂，由「頭部外傷、加護病房環境、可能的代謝/藥物因素」誘發。思覺失調、雙相是原發精神疾病(本題是急性、有明確生理誘因的意識混亂);失智是慢性認知退化(本題是急性)。本題是「急性、有生理誘因的意識混亂躁動」，故為譫妄。故 D 正確。","options":{"A":"思覺失調是原發精神疾病，非急性生理誘因的意識混亂。","B":"失智症是慢性認知退化，非急性。","C":"雙相情緒障礙是原發情緒疾病。","D":"正確。頭部外傷、加護病房中急性的意識混亂躁動，是譫妄。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"105090-N5-25":{"quick":"約定「未出現攻擊行為滿一週、便解除禁止外出限制」＝負向增強。","detail":{"background":"護理師約定「若未出現攻擊行為且維持一週，便「解除『禁止外出』的限制(移除嫌惡刺激/限制)」」——藉由「移除一個嫌惡的刺激(禁止外出)」來「增強(鼓勵)」良好行為(不攻擊)，屬『負向增強(negative reinforcement)』。正向增強是「給予」愉快的刺激(獎勵);處罰是給予嫌惡刺激或移除愉快刺激以「減少」行為;消除(消弱)是「不再給予」原本的增強而使行為減少。本題是「移除限制以增強良好行為」，故為負向增強。故 B 正確。","options":{"A":"正向增強是給予愉快刺激(獎勵)以增強行為。","B":"正確。移除嫌惡刺激(禁止外出)以增強良好行為，是負向增強。","C":"處罰是用以減少行為。","D":"消除(消弱)是不再給予增強而使行為減少。"},"sources":["精神科護理學(新文京/華杏)·行為治療"]}},"105090-N5-27":{"quick":"失智症：被害妄想、易怒是較常出現的精神行為症狀。","detail":{"background":"失智症的正確敘述:(C)『被害妄想、易怒是失智症較常出現的「精神行為症狀(BPSD)」(失智常合併妄想、幻覺、躁動、易怒、遊走、憂鬱等行為心理症狀)』。其他錯誤:A『「遠期」記憶缺失是最早出現的症狀』錯誤——失智「「近期(短期)」記憶」最早受損，遠期記憶相對保留較久;B『「地點」的定向感障礙較早於人物與時間』錯誤——「「時間」定向」最早喪失，其次地點、再人物;D『通常能「清楚確認」何時開始出現症狀』錯誤——失智「隱匿、漸進」，常難以確認明確的發病時間。故 C 正確。","options":{"A":"失智最早是近期記憶缺失，非遠期。","B":"時間定向最早喪失，非地點先於時間。","C":"正確。被害妄想、易怒是失智較常出現的精神行為症狀。","D":"失智隱匿、漸進，常難確認明確發病時間。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"105090-N5-29":{"quick":"最能強化精神病人適應社區生活能力的方案＝庇護性工廠。","detail":{"background":"李先生接受社區精神醫療，最能「強化其適應社區生活能力」的方案是(A)『庇護性工廠(庇護工場)』——提供有支持、督導的工作環境，訓練其工作技能、人際與生活適應，是促進社區適應與獨立生活的重要復健資源。居家服務是到宅照顧;門診復健是定期回診;急性醫療是處理急性病情。本題強調「強化適應社區生活能力」，庇護工場(職業復健)最對應。故 A 正確。","options":{"A":"正確。庇護性工廠訓練工作與生活適應，最能強化社區生活能力。","B":"居家服務是到宅照顧。","C":"門診復健是定期回診。","D":"急性醫療是處理急性病情。"},"sources":["精神科護理學(新文京/華杏)·社區精神復健"]}},"105090-N5-37":{"quick":"古怪思考、奇異幻覺、心電感應、身體飄飛錯覺、社交焦慮不因熟悉而下降、短暫精神症狀＝思覺失調型人格障礙症(A群)。","detail":{"background":"夏小姐『長期古怪思考、談話含糊繞圈、奇異幻覺、多疑、自認有心電感應、身體飄飛的錯覺、社交焦慮不因情境熟悉而下降、壓力下出現短暫精神症狀』——符合『「A群」思覺失調型(分裂病型)人格障礙症(schizotypal personality disorder)』:古怪的思考知覺(魔術性思考、不尋常知覺經驗)、怪異言行、社交焦慮與人際疏離(A群是「古怪、孤僻」群)。反社會型、自戀型是 B群;依賴型是 C群。本題是「古怪思考知覺+社交疏離」，故為思覺失調型人格障礙。故 A 正確。","options":{"A":"正確。古怪思考知覺、心電感應、社交焦慮，是思覺失調型(A群)人格障礙症。","B":"反社會型是 B群(漠視他人權益)。","C":"依賴型是 C群(過度依賴)。","D":"自戀型是 B群(誇大、優越感)。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"105090-N5-38":{"quick":"思覺失調型人格障礙的照護：使用抗精神病藥、觀察反應，並定期會談了解壓力源、進行心理治療。","detail":{"background":"夏小姐思覺失調型人格障礙的照護，正確的是(B)『使用抗精神病藥物、觀察用藥反應，並定期與其會談、了解壓力源、進行心理治療』——以「低劑量抗精神病藥(緩解古怪思考/短暫精神症狀)+支持性心理治療+壓力管理」為主。其他錯誤:A『對其怪異言行「予以面質」』錯誤(面質會升高焦慮、破壞關係，宜支持為主);C『治療者採「權威角色」、試圖控制一切』錯誤(權威控制不利建立關係);D『此類病人「多數有病識感、可自省」』錯誤(其病識感與自省能力有限，不宜「嚴謹控制」)。故 B 正確。","options":{"A":"對怪異言行面質會升高焦慮、破壞關係，不宜。","B":"正確。使用抗精神病藥、觀察反應，並定期會談、了解壓力源、心理治療。","C":"採權威角色、試圖控制一切不利建立關係。","D":"此類病人病識感與自省能力有限，不宜嚴謹控制。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"105090-N5-39":{"quick":"暴力後四肢約束於隔離室的護理：透過監視器密切觀察、透過麥克風與病人會談。","detail":{"background":"張先生暴力後被四肢約束於隔離室。暴力處置「後」的護理，最適切的是(A)『主要透過「監視器」對張先生進行「密切觀察」、透過「麥克風」與其會談(在病人仍激動、不宜近身接觸時，以監視器/麥克風持續觀察與溝通，並定時近身評估)』。其他錯誤:B『與會談、鼓勵表達感受、學習因應』是「病人情緒平穩「之後」」的後續處置，非剛約束、仍激動時的當下;C『應持續至少約束4小時以上』錯誤(約束應在必要的最短時間、定期評估解除，非固定4小時);D『約束帶應「牢靠不留縫隙」』錯誤(約束帶與肢體間應「可容納1~2指」，過緊會傷害循環與皮膚)。故 A 正確。","options":{"A":"正確。透過監視器密切觀察、透過麥克風與病人會談。","B":"鼓勵表達感受是情緒平穩後的後續，非剛約束時。","C":"約束應在最短時間、定期評估解除，非固定4小時以上。","D":"約束帶與肢體間應可容納1~2指，非牢靠不留縫隙。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"105090-N5-40":{"quick":"10歲自閉症、撞頭拉頭髮(自傷)頻繁：給予頭盔及手套保護病人。","detail":{"background":"李同學10歲自閉症、入院後「撞頭和拉扯頭髮(自傷行為)」平均每30分鐘一次(頻繁的自傷)。最適當的護理措施是(C)『給予「頭盔以及手套」保護病人(以防護用具減少自傷造成的傷害)』——對頻繁自傷的孩子，先以「保護性裝備」確保安全(同時找原因、處理)。A『罰站 time out 兩小時』過久、不當(time out 應短);B『出現撞頭就四肢約束』過度(約束是最後手段、且對自閉童不人道);D『每次撞頭就立即給針劑鎮定』錯誤(不應一出現就用藥鎮定)。故 C 正確。對頻繁自傷者，先以保護裝備確保安全，是較人道、適當的處置。","options":{"A":"time out 兩小時過久、不當(應短)。","B":"一出現就四肢約束過度、不人道。","C":"正確。給予頭盔及手套保護病人，減少自傷傷害。","D":"不應一出現撞頭就立即給針劑鎮定。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","自閉症·自傷"]}},"105090-N5-43":{"quick":"身心障礙者鑑定「錯誤」者＝身心障礙證明無需區分嚴重等級。","detail":{"background":"身心障礙者權益保障法的鑑定規範，「錯誤」者為(B)『身心障礙證明「無需區分嚴重等級」』——錯誤，身心障礙證明「「須區分障礙的嚴重等級(輕、中、重、極重度)」」，以對應不同的福利與服務。其他正確:A 以「功能導向(ICF)」鑑定(評估身體功能、活動與參與);C 社會參與及環境需求之評估為鑑定項目之一(ICF 的需求評估);D 須透過醫事、社會工作、特殊教育等多專業人員，對生活、社會參與等層面進行鑑定。故本題選錯誤者為 B。","options":{"A":"以功能導向(ICF)鑑定，正確。","B":"正確(本題選錯誤者)。身心障礙證明須區分嚴重等級，非無需。","C":"社會參與及環境需求之評估為鑑定項目，正確。","D":"須透過多專業人員鑑定生活、社會參與等層面，正確。"},"sources":["身心障礙者權益保障法"]}},"105090-N5-62":{"quick":"智障家庭、家訪冷漠：應優先設法與張家建立信任關係。","detail":{"background":"張家有多名子女、含智能障礙、未療育未就學、與社區疏離、對護理師家訪冷漠。應「優先」採取的護理活動是(D)『設法與張家「建立信任關係」』——家庭抗拒、冷漠時，「先建立信任關係」是後續一切介入(療育、避孕、社區連結)的基礎，沒有信任就無法推動其他措施。安排療育、介紹避孕、鼓勵社區互動都是「建立關係之後」的後續介入。故 D 正確。對抗拒的家庭，先建立信任是首要。","options":{"A":"安排療育是建立關係後的後續介入。","B":"介紹避孕是後續介入(且家庭冷漠時推不動)。","C":"鼓勵社區互動是後續介入。","D":"正確。應優先設法與張家建立信任關係。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"106030-N5-1":{"quick":"精神衛生法的「保護人」可為：監護人①、配偶③、父母④、家屬⑤、法定代理人⑦(同居人②、心理輔導專家⑥非)。","detail":{"background":"依精神衛生法，嚴重病人應置「保護人」1人，保護人可為:(1)監護人、(3)配偶、(4)父母、(5)家屬、(7)法定代理人(以與病人有法定/親屬關係、能維護其利益者擔任)。而(2)『同居人』、(6)『心理輔導專家』不在保護人的法定範圍。故正確為①③④⑤⑦(選 C)。保護人須是與病人有法定或親屬關係、能維護其利益的人。","options":{"A":"①②④⑤⑥：含②(同居人)、⑥(心理輔導專家)，非保護人範圍。","B":"①②③⑤⑥：含②⑥，錯誤。","C":"正確。監護人①、配偶③、父母④、家屬⑤、法定代理人⑦。","D":"②③④⑥⑦：含②⑥，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"106030-N5-4":{"quick":"精神障礙病人的權利：病人有權查閱自己的病歷及護理紀錄，安全考量下可給法定同意人或律師。","detail":{"background":"精神障礙病人權利的正確敘述:(B)『病人有權查閱自己的病歷及護理紀錄，在安全的考量下，可給病人的「法定同意人或律師」(保障病人知的權利與法律權益)』。其他錯誤:A『嚴重妄想/幻聽病人「不需經病人同意」即可進行 ECT』錯誤(ECT 仍須知情同意，無同意能力者須經法定代理人/保護人同意);C『「強制規定每個入院病人都要簽署約束/隔離同意書」』錯誤(約束/隔離須有適應症、依規定執行，非一律簽署);D『重複入院的酒癮病人「不需給予太多心理社會支持」』錯誤(任何病人都應獲得適當的支持，不可歧視)。故 B 正確。","options":{"A":"ECT 仍須知情同意，無能力者須經法定代理人同意。","B":"正確。病人有權查閱自己的病歷，安全考量下可給法定同意人或律師。","C":"約束/隔離須有適應症、依規定執行，非一律簽署。","D":"任何病人都應獲得適當支持，不可歧視。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"106030-N5-12":{"quick":"情緒起伏、割腕史、以「不來就撞牆」威脅父母達成要求＝操縱行為(manipulation)。","detail":{"background":"周小姐情緒起伏大、有割腕史(邊緣型人格傾向)、住院後要求父母帶外出，「要求未果就威脅『去撞牆』」——以「自我傷害的威脅」來「操弄他人(父母)、達成自己的目的(外出)」，屬『操縱行為(manipulative behavior)』。衝動行為是無預謀的突發行為;破壞行為是破壞物品;攻擊行為是攻擊他人。本題核心是「以威脅操弄他人達成目的」，故為操縱行為。故 B 正確。對操縱行為，宜團隊一致、設立明確界限。","options":{"A":"衝動行為是無預謀的突發行為。","B":"正確。以威脅操弄他人達成目的，是操縱行為。","C":"破壞行為是破壞物品。","D":"攻擊行為是攻擊他人。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"106030-N5-13":{"quick":"SSRI：治療憂鬱症①、建議早飯後服②、常見噁心睡眠障礙副作用③(抑制突觸「後」回收④錯)。","detail":{"background":"SSRI(如 fluoxetine、sertraline)的正確敘述:(1)用於治療「憂鬱症」(及焦慮、強迫等);(2)建議「早(白天)飯後」服用(隨餐減少腸胃刺激，且 SSRI 較具活化作用、白天服減少失眠);(3)常見「噁心、睡眠障礙(失眠)、性功能障礙」等副作用。而(4)『抑制「突觸後」神經細胞對血清素之回收』錯誤——SSRI 是抑制「「突觸前(presynaptic)」」神經細胞對血清素的「再回收(reuptake)」，使突觸間隙的血清素增加。故正確為①②③(選 A)。","options":{"A":"正確。治療憂鬱症①、早飯後服②、常見噁心睡眠障礙③。","B":"124：含④(抑制突觸後回收)，應為突觸前。","C":"134：含④，錯誤。","D":"234：含④、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","SSRI"]}},"106030-N5-31":{"quick":"青少年精神病人照護：第一次評估需同時包含病人和家屬，才能澄清就診原因。","detail":{"background":"青少年精神病人的照護原則，正確的是(D)『第一次評估「需同時包含病人和家屬」，才能澄清就診原因(青少年常由家長帶來、且其問題與家庭密切相關，須兼顧雙方觀點)』。其他錯誤:A『不能以圖畫引導表達情緒』錯誤(對青少年/兒童，圖畫、遊戲是有用的表達媒介);B『不要推薦閱讀書籍以免增加思考負荷』錯誤(適當的閱讀、衛教可協助);C『有自殺危險時仍須遵從「不向家人告知」的保密約定』錯誤(當有「危及生命安全(自殺)」之虞時，保密原則「應被打破」，須告知家屬以維護安全)。故 D 正確。","options":{"A":"圖畫、遊戲是青少年/兒童有用的表達媒介。","B":"適當的閱讀、衛教可協助，非增加負荷。","C":"有自殺危險時保密應被打破，須告知家屬維護安全。","D":"正確。第一次評估需同時包含病人和家屬，澄清就診原因。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR"]}},"106030-N5-33":{"quick":"強制社區治療於社區復健機構期間的醫療費用＝由中央主管機關給付。","detail":{"background":"依精神衛生法，嚴重病人經審查會決定須接受社區治療，於社區復健機構治療期間的「醫療費用」，是(A)『由「中央主管機關」給付』——強制社區治療屬國家依法強制的處置，其費用由中央主管機關負擔(以保障病人權益、減輕家庭負擔)。並非由地方主管機關、醫院或家屬負擔。故 A 正確。強制社區治療的醫療費用由中央主管機關給付。","options":{"A":"正確。強制社區治療期間的醫療費用由中央主管機關給付。","B":"非由地方主管機關給付。","C":"非由醫院給付。","D":"非由家屬給付。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"106030-N5-34":{"quick":"精神病人居家照護：評估內容需是整體性的範圍。","detail":{"background":"精神病人居家照護服務的正確敘述:(B)『居家照護的評估內容，需是「整體性(全人，含生理、心理、社會、家庭、環境等)」的範圍』。其他錯誤:A『居家訪視的服務「依家屬需求而定」』錯誤(應依「病人與家庭的整體需求、專業評估」而定，非僅依家屬需求);C『受限人力物力、採「間接服務」為主』錯誤(居家照護是「直接到宅」的服務);D『服務對象「不包含」無病識感且拒絕服藥的病人』錯誤——這類病人「正是」居家照護的重要服務對象(透過到宅訪視維持治療連結)。故 B 正確。","options":{"A":"應依病人與家庭的整體需求、專業評估，非僅依家屬需求。","B":"正確。居家照護的評估內容需是整體性的範圍。","C":"居家照護是直接到宅的服務，非間接服務。","D":"無病識感、拒藥的病人正是居家照護的重要對象。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"106030-N5-35":{"quick":"嚴重病人拒治療：經指定專科醫師診斷評估，若有必要仍須強制社區治療。","detail":{"background":"依精神衛生法第45條，嚴重病人出院後無病識感、拒藥、症狀不穩、拒絕回院也拒絕社區治療。正確的是(B)『經主管機關指定的專科醫師「診斷、評估有無接受社區強制治療的必要性，若有必要仍須強制之」』(以保障病人與社會安全)。其他錯誤:A『強制社區治療期間「不得超過3個月」』錯誤(初次以「6個月(180日)」為限);C『可「先安排強制社區治療、再送診斷資料」』錯誤(須先經診斷評估、依程序);D『強制社區治療項目「不含」藥物的血液或尿液濃度檢驗』錯誤(包含藥物濃度檢驗以監測服藥)。故 B 正確。","options":{"A":"強制社區治療初次以6個月(180日)為限，非3個月。","B":"正確。經指定專科醫師評估，若有必要仍須強制社區治療。","C":"須先經診斷評估、依程序，非先安排再送資料。","D":"強制社區治療項目包含藥物濃度檢驗，非不含。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"106030-N5-40":{"quick":"隔離措施：隔離期間需協助病人如廁、喝水，滿足病人的生理需求。","detail":{"background":"章先生非自願住院、踹門威脅，須採取隔離。隔離措施的正確描述是(D)『隔離期間需協助病人「如廁、喝水」，滿足病人的「生理需求」(隔離不可剝奪其基本生理照顧)』。其他錯誤:A『情況緊急應「立刻」進入隔離室』錯誤(隔離須有醫囑/依規定，且應先檢查危險物品、向病人說明);B『「每小時」密切觀察一次』錯誤(隔離須「至少每15分鐘」密切觀察);C『採取隔離「不需向病人解釋與說明」』錯誤(應向病人說明隔離的理由)。故 D 正確。隔離期間仍須滿足病人基本生理需求、密切觀察、並說明理由。","options":{"A":"隔離須有醫囑、檢查危險物品、說明理由，非立刻進入。","B":"隔離須至少每15分鐘觀察，非每小時。","C":"應向病人說明隔離的理由，非不需說明。","D":"正確。隔離期間需協助如廁、喝水，滿足生理需求。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"106110-N5-11":{"quick":"ECT：治療前應確認病人排空膀胱與除去活動假牙。","detail":{"background":"電氣痙攣療法(ECT)護理照護的正確敘述:(D)『病人接受 ECT 治療前，應確認病人「排空膀胱」與「除去活動假牙(防痙攣時鬆脫、誤吸或咬傷)」』。其他錯誤:A 目前 ECT 最常見的適應症是「「嚴重憂鬱症(尤其藥物無效、強烈自殺意圖)」」，而非焦慮症;B 痙攣是「先「強直性(tonic)」、再「陣攣性(clonic)」」，而非先陣發後強直;C『不需事先洗頭、油垢有利電傳導』錯誤(電極處須清潔、塗導電膠以良好導電，油垢反而影響、增加灼傷風險)。故 D 正確。ECT 前準備:禁食、排空膀胱、除假牙、取下飾物、簽同意書。","options":{"A":"ECT 最常見適應症是嚴重憂鬱症，非焦慮症。","B":"痙攣是先強直性、再陣攣性，非先陣發後強直。","C":"電極處須清潔塗導電膠，油垢會影響傳導、增灼傷風險。","D":"正確。治療前應確認排空膀胱與除去活動假牙。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","ECT"]}},"106110-N5-17":{"quick":"減少阿茲海默症病人問題行為：安排病人熟悉的環境。","detail":{"background":"減少阿茲海默症病人問題行為的護理處理，最適宜的是(D)『安排病人「熟悉的環境」(熟悉、一致、可預期的環境可減少混亂、焦慮與問題行為)』。其他選項:A『尊重病人自主性』是原則但非「減少問題行為」最直接的措施;B『安排安靜環境』有助但「熟悉的環境」對失智者的定向與安全感更關鍵;C『改善病人記憶力』對失智(進行性退化)不切實際(無法逆轉記憶退化)。故 D 正確。對失智者，提供熟悉、一致、安全的環境是減少問題行為的關鍵。","options":{"A":"尊重自主性是原則，非減少問題行為最直接的措施。","B":"安靜環境有助，但「熟悉環境」對失智者更關鍵。","C":"改善記憶力對失智(進行性退化)不切實際。","D":"正確。安排病人熟悉的環境，減少混亂與問題行為。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"106110-N5-18":{"quick":"譫妄病人最常出現的幻覺＝視幻覺。","detail":{"background":"譫妄(delirium)病人最常出現的幻覺是(A)『視幻覺(visual hallucination)』——譫妄常見生動、可怕的視幻覺(如看到蟲、蛇、人影)，這與「思覺失調以「聽幻覺」為主」不同，是鑑別的重點之一。嗅幻覺、聽幻覺、觸幻覺較少見於譫妄。故 A 正確。譫妄(及酒精戒斷譫妄)以「視幻覺、觸幻覺」為主;思覺失調以「聽幻覺」為主。","options":{"A":"正確。譫妄病人最常出現視幻覺。","B":"嗅幻覺少見於譫妄(常見於顳葉癲癇)。","C":"聽幻覺以思覺失調為主，非譫妄最常見。","D":"觸幻覺較視幻覺少見於譫妄。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"106110-N5-19":{"quick":"Aricept(donepezil)：抑制「膽鹼酯酶」，以增加乙醯膽鹼。","detail":{"background":"Aricept(donepezil)用於治療阿茲海默症初/中期，主要機轉是(B)『「抑制膽鹼酯酶(acetylcholinesterase inhibitor)」——減少乙醯膽鹼的「分解」，使腦中乙醯膽鹼「增加」，改善認知/記憶』。阿茲海默症是乙醯膽鹼不足，故以膽鹼酯酶抑制劑提升乙醯膽鹼。其他錯誤:A『改善腦部血循環』非其機轉;C『「增加乙醯膽鹼代謝」』錯誤(它是「減少」乙醯膽鹼的分解/代謝);D『改善體液電解質』非其機轉。故 B 正確。","options":{"A":"改善腦部血循環非 donepezil 的機轉。","B":"正確。抑制膽鹼酯酶，減少乙醯膽鹼分解、使其增加。","C":"它是減少乙醯膽鹼的代謝/分解，非增加代謝。","D":"改善體液電解質非其機轉。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","失智用藥"]}},"106110-N5-21":{"quick":"譫妄病人的護理目標：優先維持生命徵象之穩定、促進康復。","detail":{"background":"處於譫妄狀態的病人，護理目標應「優先」處理的是(B)『維持病人「生命徵象之穩定」、促進康復(找出並處理潛在的生理病因，維持生理安全)』——譫妄是急性、有生理病因的意識障礙，維持生理穩定、處理病因是首要。其他:A『增加感官刺激』錯誤(對譫妄者應「適度減少過度刺激」、提供安靜環境);C『參與定向感訓練、增進認知』、D『增進病識感』是後續或非當下優先(急性混亂時難以進行認知訓練)。故 B 正確。譫妄的首要是維持生理穩定、找出並處理病因。","options":{"A":"對譫妄者應適度減少過度刺激，非增加感官刺激。","B":"正確。優先維持生命徵象穩定、促進康復(處理病因)。","C":"定向感訓練是後續，急性混亂時難進行。","D":"增進病識感非當下優先。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"106110-N5-24":{"quick":"黃昏症候群(sundown syndrome)＝病人黃昏後混亂、激動的情形惡化。","detail":{"background":"老年失智症病人的「黃昏症候群(sundowning syndrome)」是指(C)『病人在「黃昏/傍晚之後，混亂、激動、躁動、行為問題的情形「惡化」(daytime較穩定、傍晚夜間加重)』——與生理時鐘、光線變化、疲倦、環境刺激等有關。A『黃昏後視覺變化、幻覺』、B『夜間生理時鐘受損、入睡困難』、D『夜間昏昏欲睡、干擾降低』都不符黃昏症候群的定義(其特徵是「傍晚後混亂躁動加重」)。故 C 正確。","options":{"A":"黃昏症候群是行為混亂惡化，非單純視覺變化幻覺。","B":"非單純入睡困難，而是傍晚後行為惡化。","C":"正確。黃昏症候群是病人黃昏後混亂、激動的情形惡化。","D":"黃昏症候群是傍晚後加重，非昏昏欲睡、干擾降低。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"106110-N5-32":{"quick":"強制社區治療的初始階段以＝180日為限。","detail":{"background":"依民國102年修正的精神衛生法，個案接受「強制社區治療」時，初始階段以(C)『「180日(6個月)」為限』——強制社區治療一次的期間以6個月(180日)為限，期滿如有必要可依程序延長。7日是緊急安置/某些期限;30日、365日不符。故 C 正確。強制社區治療的初次期限為180日(6個月)。","options":{"A":"7日非強制社區治療的初始期限。","B":"30日非強制社區治療的初始期限。","C":"正確。強制社區治療初始階段以180日為限。","D":"365日非強制社區治療的初始期限。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"106111-N5-3":{"quick":"邱小姐辦理強制住院：需先經強制鑑定後始可申請強制住院。","detail":{"background":"依精神衛生法，邱小姐(幻聽、攻擊路人)要辦理強制住院，須符合(D)『需「先經強制鑑定」後，始可申請強制住院(由二位以上指定專科醫師鑑定、並經審查會審查)』。其他錯誤:A『需經「二位家屬」同意』不符(強制住院的程序是專業鑑定+審查，非家屬同意);B『需「一位」專科醫師認定』錯誤(須「二位以上」);C『強制住院不得逾「四十日」』錯誤(以60天為限，當時版本)。故 D 正確。強制住院須先經強制鑑定(二位以上專科醫師)、經審查會審查的程序。","options":{"A":"強制住院是專業鑑定+審查，非二位家屬同意。","B":"須二位以上專科醫師，非一位。","C":"強制住院以60天為限(當時版本)，非40日。","D":"正確。需先經強制鑑定後始可申請強制住院。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"106111-N5-4":{"quick":"邱小姐被強制住院的理由＝傷害他人的行為。","detail":{"background":"依精神衛生法，強制住院的要件是「嚴重病人「有傷害自己或他人之虞」」。邱小姐「拿掃把揮打、攻擊路人(傷害他人的行為)」——符合(A)『「傷害他人的行為(危險性)」』，故可強制住院。B『具有奇異思想』、C『出現脫離現實的行為』、D『不能處理自己事務』雖是精神症狀，但「不」是強制住院的要件(強制住院的關鍵是「有傷害自己或他人之虞」)。故 A 正確。強制住院的核心要件是「有傷害自己或他人之虞」。","options":{"A":"正確。傷害他人的行為(有傷害他人之虞)，是強制住院的要件。","B":"具有奇異思想不是強制住院的要件。","C":"脫離現實的行為不是強制住院的要件。","D":"不能處理自己事務不是強制住院的要件。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"106111-N5-15":{"quick":"Clozapine 與 SSRI 合併使用：可能增加痙攣的危險。","detail":{"background":"抗精神病藥 Clozapine 與 SSRI 合併使用，臨床上可能的藥物交互作用是(C)『增加痙攣(癲癇發作)的危險』——clozapine 本身會「降低癲癇閾值」，而 SSRI 會「抑制肝臟酵素、升高 clozapine 的血中濃度」，兩者合用會增加 clozapine 濃度與痙攣風險。循環/呼吸抑制、骨髓抑制加成、中樞抑制加成非此組合最主要、典型的交互作用。故 C 正確(與前述同類題一致)。clozapine 與升高其濃度的藥物合用，須留意痙攣風險。","options":{"A":"循環功能減弱、呼吸抑制非此組合最主要的交互作用。","B":"骨髓抑制加成非此組合最典型的交互作用。","C":"正確。增加痙攣的危險(SSRI 升高 clozapine 濃度、clozapine 降癲癇閾值)。","D":"中樞神經抑制加成非此組合最主要的交互作用。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","Clozapine"]}},"106111-N5-16":{"quick":"阿茲海默症的多發性認知缺損「除外」者＝失眠症。","detail":{"background":"阿茲海默症會造成「多發性「認知」功能缺損」，包括:A 失語症(aphasia，語言能力喪失)、B 失用症(apraxia，動作執行能力喪失)、C 失認症(agnosia，辨識能力喪失)，以及記憶障礙、執行功能障礙。而(D)『失眠症』「除外」——失眠是「睡眠障礙」，並非「認知」功能缺損(雖失智可能合併睡眠問題，但失眠不屬於「認知缺損」)。故本題選除外者為 D。阿茲海默的認知缺損:記憶障礙+失語/失用/失認/執行功能障礙(「3A1E」)。","options":{"A":"失語症是阿茲海默的認知缺損之一。","B":"失用症是阿茲海默的認知缺損之一。","C":"失認症是阿茲海默的認知缺損之一。","D":"正確(本題選除外者)。失眠症是睡眠障礙，非認知缺損。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","阿茲海默症"]}},"106111-N5-31":{"quick":"ADHD 在家教養：使用肯定句(如「該上床了!」)，而非「上床了，好不好?」","detail":{"background":"ADHD 患童在家教養的正確方法是(D)『使用「肯定(明確、指令式)句」，例如「該上床了!」，而不是「上床了，好不好?」(用商量式問句)』——對 ADHD 患童，「明確、簡短、一致的指令」比「開放/商量式」更有效(減少分心與討價還價)。其他錯誤:A『不能給孩子「任何選擇」的機會』錯誤(適度給「有限的選擇」反而有助合作);B『每次衝動就「立刻處罰」較有效』錯誤(過度處罰無效且傷關係，應以正向引導為主);C『因疾病而「不分配家事」』錯誤(應給予適齡、可完成的責任，培養能力與自尊)。故 D 正確。","options":{"A":"適度給有限的選擇有助合作，非不能給任何選擇。","B":"過度處罰無效且傷關係，應以正向引導為主。","C":"應給予適齡、可完成的責任，非不分配家事。","D":"正確。使用肯定句(如「該上床了!」)，而非商量式問句。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD"]}},"106111-N5-32":{"quick":"基本自理可獨力完成、可完成國中學業、可受職業培訓(常被騙)＝輕度智能不足。","detail":{"background":"李小明10歲診斷智能不足、『基本自我照顧可獨力完成、接受教育後完成國中學業、有溝通能力但常被騙、即將朝木工技能培訓』——符合『輕度智能不足(mild，IQ 約50~70)』:可教育(達國小至國中程度)、能自理、可半獨立生活、可從事簡單職業(但社會判斷較弱、易受騙、需協助)。中度約達小學低年級;重度、極重度更低。本題「完成國中學業、可職業培訓」對應輕度。故 A 正確。","options":{"A":"正確。可自理、完成國中、可職業培訓，是輕度智能不足。","B":"中度智能不足約達小學低年級程度。","C":"重度智能不足生活大多需協助。","D":"極重度智能不足完全需照顧。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","智能不足"]}},"106111-N5-35":{"quick":"暴力擴張期(escalation)的護理處置「錯誤」者＝「你的情緒又來囉!別忘了我們的約定哦!」","detail":{"background":"暴力週期「擴張期(escalation，情緒升高但尚未爆發)」的護理處置，「錯誤」者為(B)『「你的情緒又來囉!別忘了我們的約定哦!」』——這句話「帶輕蔑、嘲諷(你又來了)」，會「激怒、升高」病人的情緒，不利化解。其他適當(擴張期宜同理、設限、提供選擇、引導冷靜):A 設限「對人使用肢體暴力是不適宜的」;C 提供選擇「需要回房間冷靜一下嗎?」;D 同理並引導表達「你看起來很生氣，願意跟我談談嗎?」。故本題選錯誤者為 B。擴張期宜以同理、冷靜、設限、提供選擇來降低情緒。","options":{"A":"設限「肢體暴力是不適宜的」，適當。","B":"正確(本題選錯誤者)。「你的情緒又來囉」帶輕蔑、會激怒病人。","C":"提供選擇「需要回房間冷靜嗎?」，適當。","D":"同理並引導表達「願意跟我談談嗎?」，適當。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"106111-N5-36":{"quick":"精神病人居家治療的服務內容＝身體與精神之健康評估。","detail":{"background":"精神病人「居家治療」標準所列的服務內容，正確的是(A)『身體與精神之「健康評估」(到宅進行整體性的身心評估、給藥、衛教、支持)』。其他錯誤:B『「新藥試驗」之評估』不是居家治療的服務內容;C『「住院」復健活動』是住院/機構的服務，非居家;D『「團體」心理治療』是在機構/門診進行，非居家治療(居家是「個別、到宅」的服務)。故 A 正確。居家治療以到宅的個別身心評估、給藥、衛教、家屬指導與支持為主。","options":{"A":"正確。身體與精神之健康評估，是居家治療的服務內容。","B":"新藥試驗之評估不是居家治療的服務。","C":"住院復健活動是住院/機構服務，非居家。","D":"團體心理治療在機構/門診進行，非居家。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"107030-N5-4":{"quick":"精神衛生法保障的權益：除非能證明沒有勝任能力，不得以罹患精神疾病為由拒絕入學、應考或僱用。","detail":{"background":"精神衛生法所保障的精神病人權益，正確的是(D)『除非能證明「沒有勝任能力」，否則「不得以罹患精神疾病為由」拒絕入學、應考或僱用(反歧視，保障平等權)』。其他錯誤:A 住院精神病人『「應」充分享有隱私、通訊、宗教及信仰自由』，而非「不一定需要」;B『慢性精神病患「應協助回歸社區」』，而非「置於慢性療養機構、避免回歸社區」(去機構化);C 約束前『「仍須」向病人說明、取得知情同意(緊急時亦應告知)』，而非「不需」。故 D 正確。","options":{"A":"住院病人應充分享有隱私、通訊、宗教信仰自由，非「不一定需要」。","B":"應協助慢性病患回歸社區，非置於機構避免回歸。","C":"約束前仍須說明、告知，非不需知情同意。","D":"正確。不得以罹患精神疾病為由拒絕入學、應考或僱用。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"107030-N5-15":{"quick":"車禍頭部外傷、加護病房中躁動、胡言亂語、自行拔管＝譫妄。","detail":{"background":"劉先生20歲、車禍頭部外傷、入加護病房後『躁動不安、胡言亂語、高聲喊叫、自行拔管』——這是『譫妄(delirium)』:急性發作、意識/注意力障礙、行為躁動混亂，由頭部外傷、加護病房環境、代謝/藥物等因素誘發。雙相、思覺失調是原發精神疾病;失智是慢性退化。本題是「急性、有生理誘因的意識混亂躁動」，故為譫妄。故 B 正確。","options":{"A":"雙相情緒障礙是原發情緒疾病。","B":"正確。頭部外傷後急性的意識混亂躁動，是譫妄。","C":"失智症是慢性認知退化，非急性。","D":"思覺失調是原發精神疾病。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"107030-N5-32":{"quick":"methylphenidate(Ritalin)：可促進多巴胺的釋放。","detail":{"background":"治療 ADHD 的藥物 methylphenidate(Ritalin，中樞神經興奮劑)的正確描述是(A)『可「促進多巴胺(及正腎上腺素)的釋放、抑制其回收」，提升前額葉的多巴胺/正腎上腺素濃度，改善注意力與衝動控制』。其他錯誤:B 常見副作用是『血壓「升高」、心跳加快』(興奮劑作用)，而非降低;C 並非「每2個月計畫性停藥一次」(可依需要安排藥物假期 drug holiday，但非固定每2個月);D『刺激三酸甘油酯代謝』非其作用。故 A 正確。Methylphenidate 透過提升多巴胺/正腎上腺素來改善 ADHD。","options":{"A":"正確。可促進多巴胺的釋放(提升多巴胺/正腎上腺素)。","B":"常見副作用是血壓升高，非降低。","C":"非每2個月固定停藥一次。","D":"刺激三酸甘油酯代謝非其作用。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD用藥"]}},"107030-N5-37":{"quick":"老年人記憶力衰退較容易發生＝近期記憶喪失。","detail":{"background":"老年人(及失智早期)記憶力衰退，較容易發生的是(A)『「近期(短期)」記憶喪失(剛發生的事、新學的資訊記不住)』——「近期記憶」最先、最易受損，而「遠期(久遠)記憶」相對保留較久。記憶力不受影響、選擇性記憶喪失不符老化/失智的記憶退化特徵。故 A 正確。老化與失智的記憶退化以「近期記憶先喪失、遠期記憶保留較久」為特徵。","options":{"A":"正確。老年記憶衰退較容易發生近期記憶喪失。","B":"遠期記憶相對保留較久，非先喪失。","C":"老年/失智的記憶會受影響，非不受影響。","D":"選擇性記憶喪失不符老化/失智的特徵。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"107030-N5-39":{"quick":"街頭揮舞水果刀、持刀威脅醫師、無法立即診斷：可通知警察機關前來處理。","detail":{"background":"王先生在街頭揮舞水果刀、持刀威脅醫師、否認有問題(有立即傷人危險、且身分/就醫需求不明、無法立即診斷)。此時急診護理師最適切的措施是(D)『「醫師無法立即診斷，可通知警察機關前來處理」(借助警力確保人員與病人安全，並依法處理)』。其他錯誤:A『讓王先生離開急診』錯誤(有持刀傷人危險，不能讓他離開);B『直接先約束與隔離』在「持刀」狀態下護理師不應徒手約束(危險、且須先確保武器移除、人力支援);C『通知家人帶到門診』未處理當下的立即危險。故 D 正確。對持刀威脅、難以掌控者，通知警察協助確保安全。","options":{"A":"有持刀傷人危險，不能讓他離開急診。","B":"持刀狀態下不應徒手約束，須先移除武器、人力支援。","C":"通知家人帶到門診未處理當下的立即危險。","D":"正確。無法立即診斷，可通知警察機關前來處理。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"107030-N5-40":{"quick":"約束的醫囑內容應包含：方式①、理由②、評估頻率④、起訖時間⑤(病人的意願③非醫囑內容)。","detail":{"background":"依精神衛生法施行細則，拘束病人身體或限制行動自由(約束/隔離)應依醫囑為之，醫囑內容應包含:(1)方式(如何約束/隔離);(2)理由(為何約束);(4)評估頻率(多久評估一次);(5)起訖時間(何時開始、何時結束/評估)。而(3)『病人的意願』不是「醫囑」的規定內容(醫囑是醫療指示，雖須向病人說明，但病人意願非醫囑的法定記載項目)。故正確為①②④⑤(選 B)。","options":{"A":"1234：含③(病人意願)、缺⑤，錯誤。","B":"正確。方式①、理由②、評估頻率④、起訖時間⑤。","C":"1345：含③、缺②，錯誤。","D":"2345：含③、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法","約束規定"]}},"107110-N5-13":{"quick":"Clozapine 的副作用：顆粒性白血球缺乏症①、口水分泌過多③、代謝症候群④(低血糖②非，是高血糖)。","detail":{"background":"第二代抗精神病藥 clozapine(clozaril)的副作用評估:(1)「顆粒性白血球缺乏症(agranulocytosis)」(須定期監測白血球);(3)「口水分泌過多(流涎，尤其夜間)」;(4)「代謝症候群(體重增加、高血糖、高血脂)」。而(2)『「低血糖」』錯誤——clozapine(及多種非典型抗精神病藥)會造成『「高血糖」、增加糖尿病風險』，而非低血糖。故正確為①③④(選 C)。clozapine 的重要副作用:顆粒性白血球缺乏、流涎、代謝症候群、癲癇、鎮靜。","options":{"A":"123：含②(低血糖)，clozapine 致高血糖。","B":"124：含②，錯誤。","C":"正確。顆粒性白血球缺乏①、口水分泌過多③、代謝症候群④。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","Clozapine"]}},"107110-N5-27":{"quick":"對多疑、誤解致憤怒攻擊的病人：觀察其藏東西之處，當她找不到時幫忙找。","detail":{"background":"李太太「對事物常有誤解或懷疑(多疑)、導致憤怒攻擊」。較適當的處理是(D)『觀察病人藏東西之處，當她找不到(誤以為被偷)時「幫忙找出來」(化解其被偷的懷疑、減少衝突、建立信任)』。其他錯誤:A『在病人面前「壓低聲音」說話』錯誤(多疑者會以為「在說她壞話」，反而增加懷疑);B『對病人的指控予以「指正」』錯誤(爭辯會升高對立);C『凡事「詳細說明解釋」』對多疑者未必有效、可能過度刺激。故 D 正確。對多疑、被偷妄想者，協助找出物品、不爭辯、建立信任。","options":{"A":"在病人面前壓低聲音會讓多疑者以為在說她，增加懷疑。","B":"對指控予以指正是爭辯，會升高對立。","C":"凡事詳細解釋對多疑者未必有效、可能過度刺激。","D":"正確。觀察藏東西處，找不到時幫忙找，化解懷疑。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"107110-N5-29":{"quick":"失智者(李太太)的護理：提供現實導向的支持性環境、適度感官刺激活動，避免功能退化。","detail":{"background":"照護失智的李太太，較適當的是(B)『提供「現實導向」的支持性環境、安排「適度的感官刺激活動」，以「避免功能退化」(維持其認知、社交、生活功能)』。其他錯誤:A『每日生活作息「多變化、多選擇性」』錯誤(失智者需「規律、一致、簡化」的作息與選擇);C『每日安排「不同」的照顧者』錯誤(應安排「固定」照顧者以增加熟悉與安全感);D『白天「儘量安排消耗體力的活動」以促進睡眠』過度(宜「適度」活動，過度消耗會疲憊、增加跌倒風險)。故 B 正確。對失智者，提供現實導向、規律、適度刺激的環境以維持功能。","options":{"A":"失智者需規律、一致、簡化的作息，非多變化多選擇。","B":"正確。提供現實導向環境、適度感官刺激活動，避免功能退化。","C":"應安排固定照顧者增加熟悉，非每日不同。","D":"宜適度活動，過度消耗體力會疲憊、增加跌倒風險。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"107110-N5-30":{"quick":"遺尿症(enuresis)：指兒童在「五歲」後仍重複地尿濕衣服。","detail":{"background":"遺尿症(enuresis)是指兒童在『「五歲(發展上膀胱控制應已成熟的年齡)」之後，仍重複地不自主尿濕衣服/床鋪(白天或夜間)』，且非由生理疾病或藥物所致。故定義的年齡界限為五歲(選 D)。(對照:遺糞症 encopresis 的年齡界限為四歲。)五歲後仍持續尿濕、達一定頻率與時間，才符合遺尿症的診斷。","options":{"A":"二歲膀胱控制尚未成熟，非遺尿症的年齡界限。","B":"三歲非遺尿症的年齡界限。","C":"四歲是遺糞症的年齡界限，非遺尿症。","D":"正確。遺尿症指五歲後仍重複地尿濕衣服。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","遺尿症"]}},"107110-N5-33":{"quick":"methylphenidate(Ritalin)＝中樞神經興奮劑。","detail":{"background":"治療 ADHD 的藥物 methylphenidate(Ritalin)屬於(A)『中樞神經「興奮劑(stimulant)」』——透過提升前額葉的多巴胺/正腎上腺素，改善注意力與衝動控制(這是 ADHD 第一線用藥)。它不是情緒穩定劑、抗癲癇劑或抗憂鬱劑。故 A 正確。Methylphenidate 是中樞神經興奮劑，常見副作用為食慾下降、失眠、心跳血壓上升。","options":{"A":"正確。methylphenidate 是中樞神經興奮劑。","B":"非情緒穩定劑。","C":"非抗癲癇劑。","D":"非抗憂鬱劑。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD用藥"]}},"107110-N5-39":{"quick":"約束的密切觀察項目：個人衛生①、病人的生理需求②、脈搏及呼吸④(有無人陪伴③非)。","detail":{"background":"對約束病人進行密切觀察，主要項目應包含:(1)個人衛生(維持清潔、皮膚完整);(2)病人的生理需求(如廁、飲水、進食);(4)脈搏及呼吸(生命徵象，及約束部位的循環、膚色)。而(3)『有無人陪伴』不是「約束密切觀察」的主要項目(觀察的是病人的安全、生理狀態與需求)。故正確為①②④(選 B)。約束觀察重點:生命徵象、約束部位循環、生理需求、個人衛生、心理狀態。","options":{"A":"123：含③(有無人陪伴)，非主要觀察項目。","B":"正確。個人衛生①、生理需求②、脈搏及呼吸④。","C":"234：含③、缺①，錯誤。","D":"134：含③，錯誤。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"107110-N5-40":{"quick":"暴力危險因子：評估病人入院前是否曾出現暴力行為，可預測入院後的暴力危險性。","detail":{"background":"依 Blomhoff 等學者的暴力危險因子評估，最適當的描述是(A)『評估病人「入院前是否曾出現暴力行為(過去暴力史)」，可「預測」病人入院後的暴力危險性(過去暴力史是預測暴力最重要的指標)』。其他錯誤:B 急性病房中『最容易暴力的「不是焦慮症」病人(較常見於思覺失調、躁症、物質使用、人格障礙等)』;C 暴力『「須」評估年齡、症狀等影響因素』，並非「不須評估」;D 暴力的影響因素『「包含」意識狀態(如譫妄、中毒時暴力風險高)』，並非不包含。故 A 正確。過去的暴力史是預測暴力最重要的危險因子。","options":{"A":"正確。過去暴力史可預測入院後的暴力危險性。","B":"最容易暴力的非焦慮症病人。","C":"暴力須評估年齡、症狀等因素，非不須。","D":"暴力的影響因素包含意識狀態，非不包含。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"108110-N5-3":{"quick":"曾因精神疾患住院者被以精神疾患為由解聘＝不符精神衛生法(除非能證明無法勝任工作)。","detail":{"background":"25歲張小姐曾因精神疾患住院、返回原工作卻被以精神疾患為由解聘——(B)『此「不符合」精神衛生法:「除非該公司能證明張小姐「無法勝任」所要求的工作任務」，否則「不能因有精神疾患之就醫紀錄而解聘」(反歧視、保障就業平等)』。其他錯誤:A『私人公司可解聘、公家機關不可』錯誤(私人與公家都受此規範);C『即使能勝任、因是不定時炸彈可以其他理由解聘』錯誤(歧視);D『合約有列即可解聘、不違法』錯誤(此類歧視條款違法)。故 B 正確。精神衛生法禁止以罹患精神疾病為由的就業歧視。","options":{"A":"私人與公家機關都受反歧視規範，非僅公家不可。","B":"正確。不符精神衛生法，除非能證明無法勝任，不能以就醫紀錄解聘。","C":"「不定時炸彈」是歧視，不能以其他理由規避。","D":"歧視性的解聘條款違法，非合約有列即可。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"108110-N5-13":{"quick":"逃家兒童、母親激動表示「弄錯對象」：以「讓我們一起來幫助小賀」回應。","detail":{"background":"小賀逃家、醫師建議家庭治療、母親激動表示「弄錯對象」(抗拒、防衛)。護理師較適切的回應是(A)『「讓我們一起來幫助小賀」』——以「合作、聚焦孩子、不指責」的方式，化解母親的防衛、邀請其一起參與(家庭治療強調全家合作，但不指責)。B『「小孩的病通常是大人的問題」』是「指責父母」，會激化防衛;C『「來看家庭治療師可預防精神疾病」』不精確、未回應母親的情緒;D『「做母親幫助孩子是責任義務」』帶說教、施壓。故 A 正確。對抗拒的家長，以合作、聚焦孩子、不指責的方式邀請參與。","options":{"A":"正確。「讓我們一起來幫助小賀」，合作、不指責。","B":"「小孩的病是大人的問題」是指責父母、激化防衛。","C":"「可預防精神疾病」不精確、未回應情緒。","D":"「是責任義務」帶說教、施壓。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR"]}},"108110-N5-14":{"quick":"失智者發生譫妄：使用藥物時須避免 benzodiazepine(BZD)，以免使譫妄更嚴重。","detail":{"background":"失智症病人發生譫妄時，使用藥物須「避免」的是(B)『benzodiazepine(BZD)』——BZD 會「加重意識混亂、鎮靜過度、跌倒、反常激動」，使譫妄「更嚴重」(故老人譫妄一般不用 BZD，除非是「酒精/BZD 戒斷」引起的譫妄)。譫妄的躁動若需藥物，多以「低劑量的非典型抗精神病藥(如 quetiapine、aripiprazole、olanzapine)」短期使用。故本題須避免者為 B。對老人/失智的譫妄，避免使用 BZD(會加重混亂)。","options":{"A":"quetiapine 是處理譫妄躁動可短期使用的抗精神病藥。","B":"正確。須避免 BZD，會加重譫妄。","C":"aripiprazole 是可短期使用的抗精神病藥。","D":"olanzapine 是可短期使用的抗精神病藥。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","譫妄用藥"]}},"108110-N5-19":{"quick":"阿茲海默症：記憶力的喪失依序為立即→近期→遠期(由新到舊)。","detail":{"background":"阿茲海默症的正確敘述:(B)『記憶力的喪失依序為「立即(最新)→近期→遠期(久遠)」(由「新到舊」喪失，即最近、新學的記憶先喪失，久遠的記憶保留最久)』。其他錯誤:A 定向感障礙的順序是『「時間」最早，其次「地點」，最後「人物」』(非「先對人、時、地依序\");C 記憶障礙是『「慢性、漸進、隱匿」出現』，並非急性期出現;D 失智的症狀「「黃昏/夜間」較混亂(黃昏症候群)」，並非白天較混亂。故 B 正確。失智的記憶喪失「由新到舊」、定向「時間先、人物最後」。","options":{"A":"定向感障礙是時間最早、人物最後，非先對人時地。","B":"正確。記憶喪失依序立即→近期→遠期(由新到舊)。","C":"記憶障礙是慢性、漸進、隱匿出現，非急性期。","D":"失智是黃昏/夜間較混亂，非白天。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","阿茲海默症"]}},"108110-N5-22":{"quick":"與高齡老人翻家族相簿、回憶美好與成功經驗以提升自尊＝懷舊治療。","detail":{"background":"與高齡老人「一同翻閱家族相簿、回憶美好時光與成功經驗」，提升其自尊與自信的治療是(D)『懷舊治療(reminiscence therapy)』——透過回憶過去(尤其正向經驗)，促進自我統整、提升自尊、改善情緒。理情治療(REBT)是修正不合理信念;動機治療(動機式晤談)用於促進改變動機;現實治療著重此時此地的責任與選擇。本題核心是「回憶過去美好經驗」，故為懷舊治療。故 D 正確。","options":{"A":"理情治療是修正不合理信念。","B":"動機治療用於促進改變動機。","C":"現實治療著重此時此地的責任與選擇。","D":"正確。翻相簿、回憶美好與成功經驗，是懷舊治療。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","懷舊治療"]}},"108110-N5-26":{"quick":"病人於護生與護理師交班時出現焦慮(疑分離焦慮)：以時間軸引導個案討論症狀發生的可能原因。","detail":{"background":"朱小姐與護生互動良好、但「每天下午3點多『護生與護理師交班(可能感受到關係的變動/分離)』時出現焦慮、要求入保護室」。可列入照護計畫的是(A)『以「時間軸(time line)」引導個案討論「症狀發生的可能原因(覺察焦慮與交班/分離的關聯)」』——協助病人覺察其焦慮的觸發點(分離焦慮)、進而處理。B『訂行為契約減少使用保護室』未處理根本原因;C『建議調藥』言之過早(先探討心理因素);D『每次出現就帶回病室』未處理根本、可能強化。故 A 正確。對情境性焦慮，先協助覺察症狀與情境的關聯。","options":{"A":"正確。以時間軸引導討論症狀發生的可能原因(覺察觸發點)。","B":"訂行為契約減少使用保護室未處理根本原因。","C":"建議調藥言之過早，先探討心理因素。","D":"每次帶回病室未處理根本、可能強化。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患"]}},"108110-N5-29":{"quick":"完美主義、重視細節、固執而缺乏彈性＝強迫型人格障礙症。","detail":{"background":"人格違常中，主要特徵為「完美主義、重視細節、固執而缺乏彈性」者，是(B)『強迫型人格障礙症(OCPD)』——過度追求秩序、完美、控制，僵化、缺乏彈性、工作狂。邊緣型是情緒不穩、人際劇烈、怕被遺棄;孤僻(分裂型/思覺失調型)型是社交疏離、情感淡漠;反社會型是漠視他人權益、衝動攻擊。本題是「完美、細節、固執」，故為強迫型人格障礙症。故 B 正確。","options":{"A":"邊緣型是情緒不穩、人際劇烈、怕被遺棄。","B":"正確。完美主義、重視細節、固執缺彈性，是強迫型人格障礙症。","C":"孤僻型是社交疏離、情感淡漠。","D":"反社會型是漠視他人權益、衝動攻擊。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"108110-N5-30":{"quick":"行為規範障礙症(conduct disorder)兒童的護理：對其非適應性行為給予設限。","detail":{"background":"行為規範障礙症(conduct disorder，違反規範、攻擊、破壞、欺騙、偷竊)兒童的護理，正確的是(C)『對個案的「非適應性行為(違規、攻擊)」給予「設限(明確的界限與後果，團隊一致)」』。其他錯誤:A『請家屬「容許」病童因挫折/失敗的干擾行為』錯誤(容許不當行為會強化它，應適當設限);B『「主要以處罰」改善攻擊行為』錯誤(單靠處罰無效且傷關係，應以正向引導、設限、行為治療為主);D『病童有智能不足、無法進行遊戲治療』錯誤(行為規範障礙非等同智能不足，且遊戲治療對兒童有用)。故 C 正確。對行為規範障礙兒童，以明確的界限、一致的後果、正向引導為主。","options":{"A":"容許不當行為會強化它，應適當設限。","B":"單靠處罰無效且傷關係，應以正向引導、設限為主。","C":"正確。對其非適應性行為給予設限。","D":"行為規範障礙非等同智能不足，遊戲治療對兒童有用。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","行為規範障礙症"]}},"109030-N5-1":{"quick":"現行精神衛生法：拒絕住院的嚴重病人緊急安置強制住院，得由主管機關指定「一位」專科醫師鑑定。","detail":{"background":"依「現行」精神衛生法，澎湖縣王先生為拒絕住院的嚴重病人、需「緊急安置強制住院」，得由(A)『主管機關指定「一位」專科醫師鑑定(緊急安置階段)』——緊急安置時，為爭取時效，由「一位」指定專科醫師鑑定即可先行緊急安置(後續強制住院則須經更嚴謹的鑑定與審查)。並非「三位以上」、「緊急醫療醫師」或「任一醫師」。故 A 正確。(註:法規版本不同，緊急安置與強制住院的鑑定人數規定有別，本題依現行緊急安置。)","options":{"A":"正確。緊急安置得由主管機關指定一位專科醫師鑑定。","B":"非須三位以上專科醫師。","C":"非緊急醫療醫師，須精神科專科醫師。","D":"非該縣市任一醫師即可。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"109030-N5-3":{"quick":"將出院精神病人的出院護理計畫：教導壓力調適①、提供健康指導與諮詢③、討論緩解藥物副作用的方法④(建議依症狀自行調藥②錯)。","detail":{"background":"急性期症狀穩定、將出院的精神病人，出院護理計畫宜包括:(1)教導壓力調適策略;(3)提供健康指導與諮詢;(4)討論緩解藥物副作用的方法(增進服藥順從)。而(2)『建議可「依症狀自行調藥」』錯誤——藥物的調整「須遵照醫囑」，「不可由病人自行依症狀調藥」(自行調藥易導致復發或副作用)。故正確為①③④(選 B)。出院計畫強調規則服藥、壓力因應、健康指導，不可自行調藥。","options":{"A":"123：含②(自行調藥)，錯誤。","B":"正確。教導壓力調適①、健康指導與諮詢③、討論緩解藥物副作用④。","C":"124：含②，錯誤。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR"]}},"109030-N5-14":{"quick":"失智者(蕭太太)的護理：每天安排固定的照護人員，增加安全感及熟悉度。","detail":{"background":"蕭太太74歲失智的護理，適當的是(C)『為增加安全感及熟悉度，「每天安排固定的照護人員」』——固定、熟悉的照顧者可增進信任、安全感與定向，是失智照護的重要原則。其他錯誤:A『照顧者「不可稱呼病人的名字」、必須稱「蕭奶奶」』錯誤(可依其喜好稱呼，重點是尊重，並非不可稱名字);B『病人單位「不要擺設家人相片」』錯誤(擺設熟悉的家人相片有助情感連結與定向、安全感);D『將窗簾拉起以避免日落症候群』錯誤(白天應「保持充足光線」以維持日夜節律、減少黃昏症候群，拉窗簾使光線不足反而不利)。故 C 正確。","options":{"A":"可依其喜好尊重地稱呼，非不可稱名字。","B":"擺設熟悉的家人相片有助情感連結與定向。","C":"正確。每天安排固定的照護人員，增加安全感與熟悉度。","D":"白天應保持充足光線以減少黃昏症候群，非拉窗簾。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"109030-N5-19":{"quick":"約束病人的注意事項：疏散圍觀病友①、攻擊時勿單獨處理③、依醫囑入保護室並上鎖、打開監視器④(先約束再開醫囑②錯)。","detail":{"background":"約束病人時需注意:(1)疏散圍觀病友(維護現場安全與隱私);(3)出現攻擊行為時「勿單獨處理(須足夠人力支援)」;(4)依醫囑帶病人入保護室並上鎖、打開監視器(密切觀察)。而(2)『為了安全「先予約束、再由醫師開醫囑」』錯誤——約束「須有醫囑」才能執行(原則上應「先有醫囑」;雖緊急狀況可先處置再立即補醫囑，但本題以「須先有醫囑」為正解)。故正確為①③④(選 C)。","options":{"A":"123：含②(先約束再開醫囑)，錯誤。","B":"124：含②、缺③，錯誤。","C":"正確。疏散圍觀病友①、攻擊時勿單獨處理③、依醫囑入保護室上鎖打開監視器④。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"109030-N5-24":{"quick":"藥物治療焦慮：BZD 對焦慮的療效是阻斷大腦藍斑(Locus coeruleus)的過度活躍。","detail":{"background":"藥物治療焦慮症狀，最正確的是(A)『BZD 對焦慮的療效，是透過增強 GABA 抑制、「阻斷/抑制大腦藍斑(Locus coeruleus)的過度活躍(藍斑是正腎上腺素的主要來源，與焦慮、警覺有關)」』。其他錯誤:B BZD 治療焦慮是透過「GABA」，「強迫症」主要以「SSRI(血清素)」治療，非 BZD;C TCA 的藥效『「不」比其餘抗憂鬱劑快』(抗憂鬱劑都需數週起效)，恐慌「急性發作」當下以 BZD 緩解，而非 TCA;D『BZD 是老年焦慮的「首選」』錯誤——老年人應「避免/謹慎」使用 BZD(易跌倒、混亂、依賴)。故 A 正確。","options":{"A":"正確。BZD 透過增強 GABA、抑制藍斑的過度活躍而抗焦慮。","B":"強迫症主要以 SSRI 治療，非 BZD。","C":"TCA 藥效不比其餘抗憂鬱劑快，恐慌急性發作以 BZD 緩解。","D":"老年焦慮應避免/謹慎用 BZD，非首選。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","抗焦慮劑"]}},"109030-N5-26":{"quick":"邊緣型人格、割痕、對母親謾罵：根據行為治療與其訂定不自傷約定。","detail":{"background":"李同學邊緣型人格、手臂多割痕、對母親謾罵(自傷+情緒失控)。最適切的處置是(B)『根據行為治療，與李同學訂定「不自傷約定(不自傷契約)」(承諾不自傷、有衝動時求助)，並關注其安全』。其他錯誤:A『安慰媽媽說是短暫現象、請放心』輕忽問題、未處理病人;C『請媽媽不要探視』切斷支持、不當;D『評估為作態性自殺、不必注意割痕』錯誤(任何自傷都須認真評估、注意安全，不可輕忽)。故 B 正確。對邊緣型人格的自傷，以不自傷約定、確保安全、行為治療為基礎。","options":{"A":"安慰媽媽、說是短暫現象，輕忽問題、未處理病人。","B":"正確。根據行為治療與其訂定不自傷約定。","C":"請媽媽不要探視切斷支持，不當。","D":"任何自傷都須認真評估、注意安全，不可輕忽。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"109030-N5-31":{"quick":"DSM-5「認知障礙症」的認知功能範疇＝學習和記憶。","detail":{"background":"DSM-5 對「認知障礙症(神經認知障礙)」所提出的「認知功能範疇(六大領域)」包括:複雜性注意力、執行功能、「學習和記憶(C)」、語言、知覺動作、社會認知。其他選項:A『睡眠障礙』是睡眠問題，非認知領域;B『認知偏誤』是認知扭曲(認知治療的概念)，非 DSM-5 的認知領域;D『人格障礙』是人格問題，非認知領域。故 C 正確。DSM-5 神經認知障礙的六大認知領域:注意、執行、學習記憶、語言、知覺動作、社會認知。","options":{"A":"睡眠障礙是睡眠問題，非認知領域。","B":"認知偏誤是認知扭曲，非 DSM-5 的認知領域。","C":"正確。學習和記憶是 DSM-5 的認知功能範疇。","D":"人格障礙是人格問題，非認知領域。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"109030-N5-32":{"quick":"幼稚園分心、注意力不集中、話多、干擾同學、丟三落四、無法完成指令＝ADHD。","detail":{"background":"楊小弟在幼稚園『容易分心、注意力不集中、無法乖乖坐好、話多、干擾同學、丟三落四、無法完成指令，且「在家裡也有類似行為(跨情境)」』——符合『注意力不足/過動症(ADHD)』:注意力不足+過動/衝動，於「兩個以上情境(學校與家裡)」出現、影響功能。智能不足以認知能力低下為主;躁鬱症以情緒起伏為主;妥瑞氏症以抽動(tic)為主。故 C 正確。ADHD 的症狀須跨情境(學校、家裡)出現。","options":{"A":"智能不足以認知能力低下為主。","B":"躁鬱症以情緒起伏為主。","C":"正確。跨情境的注意力不足+過動衝動，是 ADHD。","D":"妥瑞氏症以動作及聲語型抽動為主。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD"]}},"109030-N5-33":{"quick":"自閉症類群障礙症「錯誤」者＝多數病童成年後就可恢復正常。","detail":{"background":"自閉症類群障礙症(ASD)的敘述，「錯誤」者為(D)『多數病童「成年後就可恢復正常」』——錯誤，ASD 是「「終生」的神經發展障礙」，多數人成年後「仍有不同程度的症狀」(雖經療育可改善功能，但非「恢復正常」)。其他正確:A 病童於學校學習(療育)後，多數兒童的社會行為及語言溝通會明顯改善;B 預後會受病童的智商程度影響(智商較高者預後較好);C 學齡前經早期療育，仍有可能在普通班就讀。故本題選錯誤者為 D。","options":{"A":"療育後多數兒童的社會行為及語言溝通會改善，正確。","B":"預後受智商程度影響，正確。","C":"學齡前經療育仍有可能在普通班就讀，正確。","D":"正確(本題選錯誤者)。ASD 是終生的，非成年後恢復正常。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","自閉症"]}},"109030-N5-36":{"quick":"精神護理之家提升住民日常生活照顧功能＝自我管理。","detail":{"background":"陳護理師在精神護理之家，要協助住民「提升其日常生活照顧功能」，最適切的護理處置是(D)『「自我管理(self-management)」訓練——協助住民學習並執行日常生活的自我照顧、管理(進食、衛生、作息、服藥等)，提升其功能與獨立性』。資源連結是連結外部資源;家庭護理是針對家庭;危機處置是處理急性危機。本題核心是「提升日常生活照顧功能」，故為自我管理。故 D 正確。","options":{"A":"資源連結是連結外部資源。","B":"家庭護理是針對家庭的照護。","C":"危機處置是處理急性危機。","D":"正確。提升日常生活照顧功能，是自我管理訓練。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"109030-N5-37":{"quick":"病人不願接受居家治療：最適合「強制社區治療」。","detail":{"background":"戴先生出院後、原計畫居家治療但「病人不願接受」。此情境下最適合的精神醫療服務是(B)『「強制社區治療」(在符合要件下，依法強制其於社區接受治療，如服藥、追蹤，以維持治療連結、防止病情惡化)』。其他:A『強制住院』須達「有傷害自己或他人之虞」(本題未達);C『危機處置』是處理急性危機;D『急性住院治療』也須達住院要件。對「不願接受治療但須維持治療」者，強制社區治療是適當的選項。故 B 正確。","options":{"A":"強制住院須達有傷害自己或他人之虞(本題未達)。","B":"正確。不願接受治療但須維持治療者，最適合強制社區治療。","C":"危機處置是處理急性危機。","D":"急性住院治療也須達住院要件。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"109110-N5-2":{"quick":"精神障礙病人的權利：不得對未經知情同意的病人進行臨床試驗。","detail":{"background":"精神障礙病人權利的正確敘述:(A)『「不得對未經(充分)知情同意的病人進行臨床試驗」(保障病人的自主與研究倫理)』。其他錯誤:B『對出現退化行為的病人「應予以約束」』錯誤(退化行為不是約束的適應症，約束須有傷人/自傷之虞且為最後手段);C『病人「無權」查閱自己的病歷及護理紀錄』錯誤(病人「有權」查閱自己的病歷);D『慢性精神病人最好進入機構療養、避免回到社區』錯誤(應協助回歸社區，去機構化)。故 A 正確。","options":{"A":"正確。不得對未經知情同意的病人進行臨床試驗。","B":"退化行為不是約束的適應症，不應因此約束。","C":"病人有權查閱自己的病歷及護理紀錄。","D":"應協助慢性病人回歸社區，非進入機構。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"109110-N5-6":{"quick":"服藥副作用：服 chlorpromazine 者最需注意光過敏反應，應提醒避免直接日曬。","detail":{"background":"評估精神科藥物副作用，正確的是(B)『服用 chlorpromazine 者最需注意「光過敏反應」，應提醒「避免直接日曬(及做好防曬)」』(chlorpromazine 是低效價典型抗精神病藥，光敏感是其特徵副作用)。其他錯誤:A clozapine 最需注意的是「顆粒性白血球缺乏(及流涎、代謝症候群)」，「靜坐不能(EPS)」較少(clozapine EPS 低);C haloperidol 最需注意的是「EPS(及高泌乳素)」，「體重增加」非其最主要副作用;D sulpiride 並非以「顆粒性白血球缺乏」為主(那是 clozapine 的特徵)，sulpiride 較常致高泌乳素。故 B 正確。","options":{"A":"clozapine 最需注意顆粒性白血球缺乏，EPS(靜坐不能)較少。","B":"正確。chlorpromazine 最需注意光過敏，應避免直接日曬。","C":"haloperidol 最需注意 EPS，體重增加非其最主要副作用。","D":"顆粒性白血球缺乏是 clozapine 的特徵，非 sulpiride。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR"]}},"109110-N5-8":{"quick":"家庭治療的主要目的：改善家庭功能②、協助家庭改善問題③、改善家庭成員的互動④(矯正個人性格偏差①非)。","detail":{"background":"阿雄因父母離婚、母親再婚後出現翹課、退縮、鬱寡，接受家庭治療。家庭治療的主要目的:(2)改善家庭功能;(3)協助家庭改善問題;(4)改善家庭成員的互動(溝通、關係)。而(1)『「矯正個人性格的偏差」』不是家庭治療的目的——家庭治療著眼於「「家庭系統(關係、互動、功能)」」，而非矯正「個人」的性格(那是個別治療的範疇)。故正確為②③④(選 D)。家庭治療以改善家庭系統的功能、互動與問題為目的。","options":{"A":"123：含①(矯正個人性格偏差)，非家庭治療目的。","B":"124：含①，錯誤。","C":"134：含①，錯誤。","D":"正確。改善家庭功能②、協助家庭改善問題③、改善家庭成員互動④。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","家庭治療"]}},"109110-N5-16":{"quick":"布洛伊勒(Bleuler)4A 的「自閉(Autism)」症狀＝坐在大廳自言自語且自笑。","detail":{"background":"布洛伊勒(Bleuler)的思覺失調 4A 症狀:聯想鬆弛(Association)、情感障礙(Affect)、矛盾情感(Ambivalence)、自閉/退縮(Autism)。其中「自閉(Autism)」是指「「沉浸在自己的內在世界、與現實脫離、退縮」」——(A)『李小姐坐在大廳「自言自語且自笑(沉浸自我世界)」』即屬之。B『談母親去世卻又流淚又大笑』是「情感不適切(Affect)」;C『外觀髒亂』是自我照顧問題;D『認為附近有高壓電傷腦』是妄想(思考內容)。故 A 正確。","options":{"A":"正確。坐在大廳自言自語且自笑(沉浸自我世界)，是 4A 的自閉(Autism)。","B":"又哭又笑是情感不適切(Affect)。","C":"外觀髒亂是自我照顧問題。","D":"認為附近有高壓電傷腦是妄想(思考內容)。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學"]}},"109110-N5-18":{"quick":"躁期的性脫抑制(濃妝、清涼、進異性房間)：了解行為原因、引導轉移注意力。","detail":{"background":"丁小姐濃妝、著清涼服飾、主動進異性房間找異性聊天(躁期的性脫抑制行為)。最適宜的措施是(C)『「了解行為原因、引導轉移注意力(以了解與轉移、適度設限的方式處理)」』。其他錯誤:A『帶入保護室隔離』過度(脫抑制非暴力);B『收回化妝品與衣物』剝奪、像懲罰;D『四肢約束1小時』過度且不當(脫抑制行為不應以約束處理)。故 C 正確。對躁期脫抑制行為，以了解、轉移注意力、適度設限處理(與前述同類題一致)。","options":{"A":"帶入保護室隔離過度(脫抑制非暴力)。","B":"收回化妝品衣物是剝奪、像懲罰。","C":"正確。了解行為原因、引導轉移注意力。","D":"四肢約束過度且不當。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙"]}},"109110-N5-31":{"quick":"智能不足兒童暴力的行為修正約定：1天未攻擊即可獲得娛樂點數(正增強)。","detail":{"background":"李同學智能不足、有暴力行為。學校護理師擬定行為修正約定「如果1天都未出現肢體攻擊」的處置，最適當的是(A)『可以獲得「3張小小兵的娛樂點數(給予正向獎勵)」』——這是「正增強」:當出現良好行為(不攻擊)時，「給予」喜歡的獎勵，以增強該行為。對智能不足兒童，「立即、明確、正向」的獎勵最有效。其他錯誤:B『不用罰寫』、C『取消整理課桌椅』是「移除嫌惡」(負增強，較不直接);D『紀錄3天才給獎勵』間隔太長(對智能不足兒童，獎勵應「即時」)。故 A 正確。","options":{"A":"正確。1天未攻擊即給娛樂點數(正增強，即時、明確的獎勵)。","B":"「不用罰寫」是移除嫌惡(負增強)，較不直接。","C":"「取消整理課桌椅」是移除嫌惡，較不直接。","D":"「3天才給」間隔太長，對智能不足兒童獎勵應即時。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","行為治療"]}},"109110-N5-34":{"quick":"精神科居家護理：醫院體系的居家護理服務，多以護理師提供家庭訪視為主。","detail":{"background":"精神科居家護理的正確敘述:(B)『「醫院體系」的居家護理服務，多以「護理師提供家庭訪視」為主(到宅進行身心評估、給藥、衛教、家屬指導)』。其他錯誤:A『社區體系的居家護理「開放社工師和心理師「一同」擔任照護工作」』敘述不精確(居家「護理」以護理人員為主);C 收案條件之一是「病情「穩定」、症狀「未明顯干擾」、且「未拒絕就醫(或無病識感、拒藥需維持治療)」者」，「症狀明顯干擾家庭及社區生活」的描述與一般收案不符;D『健保提供給付、依偏遠另有交通補助』的描述未必正確(細節依規定)。故 B 正確。","options":{"A":"居家「護理」以護理人員為主，敘述不精確。","B":"正確。醫院體系的居家護理，多以護理師提供家庭訪視為主。","C":"收案條件的描述與一般不符。","D":"交通補助等細節依規定，描述未必正確。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"109110-N5-37":{"quick":"約束2小時、情緒穩定：團隊評估後可解除約束。","detail":{"background":"張先生暴力後已約束2小時，醫療團隊討論是否解除。關於解除約束的評估，最適切的是(B)『張先生「目前情緒穩定」，團隊評估(其已無傷人/自傷之虞)後「可解除約束」』——約束應「在病人「情緒穩定、不再有危險」時，經評估即「儘早解除」(約束應在必要的最短時間內)」。其他錯誤:A『因被害妄想對象是同房病友而「需要持續約束」』錯誤(可調整環境/分開，不應以此持續約束);C『因夜班人力少而約束到白班』錯誤(不可因人力因素延長約束);D『因已約束2小時就「應該解除」』錯誤(解除的依據是「病情/危險性評估」，而非固定時間)。故 B 正確。","options":{"A":"可調整環境/分開，不應以此持續約束。","B":"正確。情緒穩定、團隊評估後可解除約束。","C":"不可因人力因素延長約束。","D":"解除的依據是病情/危險性評
