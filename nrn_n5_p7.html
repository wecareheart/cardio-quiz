估，非固定時間。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"109110-N5-38":{"quick":"言語謾罵、挑釁、打護理師＝暴力(violence)。","detail":{"background":"李先生在門診「言語謾罵、挑釁、隨即「打護理師(肢體攻擊)」」——已出現「對他人的「肢體攻擊」行為」，屬『暴力(violence)』。焦慮是過度擔憂;激躁(agitation)是躁動不安(尚未到肢體攻擊);焦躁不安(irritable)是易怒情緒。本題已有「打人(肢體攻擊)」，故為暴力。故 D 正確。暴力是已實際對他人/自己造成或試圖造成傷害的行為。","options":{"A":"焦慮是過度擔憂。","B":"激躁是躁動不安，尚未到肢體攻擊。","C":"焦躁不安是易怒情緒。","D":"正確。已出現打人(肢體攻擊)，是暴力。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"109110-N5-39":{"quick":"病人打護理師(情緒失控)：較優先＝尋求人力支援，維持病人及他人安全。","detail":{"background":"李先生情緒失控、打護理師。較優先的護理措施是(D)『「尋求人力支援，維持李先生及他人的安全」』——面對立即的暴力，「足夠的人力支援、確保安全」是第一優先。A『立即將其約束』錯誤(約束須有醫囑、是後續手段，且需足夠人力才能安全執行);B『安撫情緒、提供安靜環境、說明叫號原則』在其正攻擊、失控的當下不是首要(待安全控制後);C『請進另一診間優先看診』是縱容、且未處理當下的暴力。故 D 正確。對立即暴力，先尋求人力支援、確保安全。","options":{"A":"約束須有醫囑、需足夠人力，非立即第一步。","B":"安撫、說明叫號原則在正攻擊時非首要。","C":"優先看診是縱容、未處理當下的暴力。","D":"正確。尋求人力支援，維持病人及他人安全。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"110030-N5-1":{"quick":"精神衛生法的「保護人」可為：監護人①、法定代理人②、配偶④、父母⑤、家屬⑥(同居人③、心理師⑦非)。","detail":{"background":"依現行精神衛生法，嚴重病人應置「保護人」1人，保護人可為:(1)監護人、(2)法定代理人、(4)配偶、(5)父母、(6)家屬(與病人有法定/親屬關係、能維護其利益者)。而(3)『同居人』、(7)『心理師』不在保護人的法定範圍。故正確為①②④⑤⑥(選 C)。保護人須是與病人有法定或親屬關係、能維護其利益的人(與前述同類題一致)。","options":{"A":"13457：含③(同居人)、⑦(心理師)，非保護人範圍。","B":"12356：含③(同居人)，錯誤。","C":"正確。監護人①、法定代理人②、配偶④、父母⑤、家屬⑥。","D":"23467：含③⑦，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"110030-N5-2":{"quick":"需教導病人注意「體重增加」副作用的藥物＝Olanzapine(Zyprexa)。","detail":{"background":"需教導病人注意「體重增加」副作用的藥物是(C)『Olanzapine(Zyprexa)』——olanzapine 是非典型(第二代)抗精神病藥中「代謝副作用(體重增加、高血糖、高血脂、代謝症候群)」最顯著者之一。Alprazolam(BZD)、Propranolol(乙型阻斷劑)、Venlafaxine(SNRI)的「體重增加」並非其最須衛教的特徵副作用。故 C 正確。olanzapine(及 clozapine)的代謝副作用(體重增加)是重要的衛教與監測重點。","options":{"A":"Alprazolam(BZD)以鎮靜、依賴為主，非顯著的體重增加。","B":"Propranolol(乙型阻斷劑)非以體重增加為特徵。","C":"正確。Olanzapine 的體重增加(代謝副作用)顯著，須衛教。","D":"Venlafaxine(SNRI)非以體重增加為特徵。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR"]}},"110030-N5-4":{"quick":"兒童精神疾病：侵擾行為、衝動控制及行為規範障礙症是在「與同儕互動中」被發現。","detail":{"background":"兒童精神疾病的正確敘述:(D)『「侵擾行為、衝動控制及行為規範障礙症」是在「與同儕(及他人)互動中」被發現(透過其對立、攻擊、違規的行為表現)』。其他錯誤:A 語言障礙症『通常在「學齡前(更早)」就被發現』，非上小學後;B 輕度智能不足『常在「上學後(學業要求顯現)」才被發現』，非幼稚園時(輕度因功能較好，常較晚發現);C 精神疾病的病徵『「與」兒童的年齡、發展階段「有密切關係」』，並非沒有關係。故 D 正確。","options":{"A":"語言障礙症通常在學齡前(更早)被發現，非上小學後。","B":"輕度智能不足常在上學後才被發現，非幼稚園。","C":"病徵與年齡、發展階段有密切關係，非沒有關係。","D":"正確。侵擾行為、行為規範障礙是在與同儕互動中被發現。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR"]}},"110030-N5-8":{"quick":"錐體外症候群(EPS)：坐立不安、來回走動、原地踏步是靜坐不能(akathisia)。","detail":{"background":"抗精神病藥的錐體外症候群(EPS)的正確敘述:(C)『出現「坐立不安、來回走動或原地踏步」是「靜坐不能(akathisia)」的現象』。其他錯誤:A『體溫升高至41℃以上、肌肉僵硬』是「抗精神病藥惡性症候群(NMS)」，非 EPS;B『斜頸、牙關緊閉、舌頭收縮』是「急性肌張力不全(acute dystonia)」，而非「遲發性不自主運動」;D『鼓嘴、不斷眨眼、做鬼臉』是「遲發性運動異常(tardive dyskinesia)」，而非「急性肌張力不全」。故 C 正確。EPS 四型:急性肌張力不全、靜坐不能、類巴金森、遲發性運動異常。","options":{"A":"體溫>41℃+肌肉僵硬是 NMS，非 EPS。","B":"斜頸、牙關緊閉是急性肌張力不全，非遲發性運動。","C":"正確。坐立不安、來回走動是靜坐不能(akathisia)。","D":"鼓嘴、眨眼、做鬼臉是遲發性運動異常，非急性肌張力不全。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","EPS"]}},"110030-N5-22":{"quick":"做作型人格障礙症(histrionic)的行為：利用外觀吸引注意①、快速轉變膚淺的情緒②、以不適當的性挑逗交往④(衝動易怒攻擊③非)。","detail":{"background":"做作型(戲劇型)人格障礙症(histrionic personality disorder)的特徵行為:(1)利用自己的身體外觀來吸引他人注意;(2)展現快速轉變和膚淺(誇張、戲劇化)的情緒;(4)常以不適當的「性挑逗、誘惑」與他人交往(過度尋求注意)。而(3)『衝動、易怒、具攻擊性』偏向「反社會型/邊緣型」人格，非做作型的核心特徵。故正確為①②④(選 D)。做作型人格的核心是「過度尋求注意、情緒戲劇化、外觀與誘惑」。","options":{"A":"123：含③(衝動易怒攻擊)，偏向反社會/邊緣型。","B":"234：含③、缺①，錯誤。","C":"134：含③，錯誤。","D":"正確。利用外觀吸引注意①、快速轉變膚淺情緒②、不適當性挑逗④。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"110030-N5-23":{"quick":"身體症狀障礙症的附帶收穫：應儘量不要太關注病人的身體症狀，以避免不當增強附帶收穫。","detail":{"background":"照顧身體症狀及相關障礙症病人，關於附帶收穫(secondary gain)，較適當的是(B)『應「儘量不要過度關注病人的身體症狀」，以避免「不當地增強附帶收穫(避免病人因症狀獲得過多關注而強化症狀)」』。其他錯誤:A『附帶收穫是表現身體症狀便可「直接避免」面對心理衝突』——這是「原發性獲益(primary gain)」的描述，附帶收穫是「藉症狀獲得「外在」好處(關注、免責)」;C『以抗精神病藥進行催眠會談』不符(身體症狀障礙非以抗精神病藥/催眠為主);D『鼓勵病人持續關注身體症狀、以此為主要護理』錯誤(反而強化症狀)。故 B 正確。","options":{"A":"「直接避免面對心理衝突」是原發性獲益，非附帶收穫。","B":"正確。不要過度關注身體症狀，以避免增強附帶收穫。","C":"身體症狀障礙非以抗精神病藥/催眠為主。","D":"鼓勵持續關注身體症狀會強化症狀，錯誤。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙"]}},"110030-N5-28":{"quick":"譫妄(DSM-5)：所產生的認知困擾包含失去定向感、語言、視覺空間能力。","detail":{"background":"依 DSM-5，譫妄(delirium)的正確敘述:(C)『所產生的認知困擾，包含「失去定向感、語言、視覺空間能力(及記憶、知覺等)」』。其他錯誤:A 譫妄診斷的「基本要件」是「「注意力與意識」的障礙(及急性發作、波動)」，而非「記憶障礙」(記憶障礙是失智的核心);B 譫妄是「「急性」發作、症狀「波動」」，而非「慢性化、逐漸惡化」(那是失智);D 譫妄「移除致病導因後，「通常可完全恢復」(可逆)」，並非無法恢復。故 C 正確。譫妄=急性、波動、注意力/意識障礙、可逆。","options":{"A":"譫妄的基本要件是注意力/意識障礙，記憶障礙是失智的核心。","B":"譫妄是急性發作、波動，非慢性化逐漸惡化。","C":"正確。認知困擾包含失去定向感、語言、視覺空間能力。","D":"譫妄移除導因後通常可完全恢復，非無法恢復。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"110030-N5-29":{"quick":"認知障礙症：語言功能部分可能出現語言整合、理解及表達能力減退，或出現失語症。","detail":{"background":"認知障礙症(失智)病人的臨床症狀，正確的是(D)『語言功能部分，可能出現「語言整合、理解及表達能力減退，或出現失語症(aphasia)」』。其他錯誤:A 定向感障礙通常「先發生對「時間」的定向感障礙」，其次地點、最後人物(非先對人物);B 記憶力減退通常「先發生「近期(短期)」記憶障礙」，遠期記憶保留較久(非先遠期);C 失智者「「常」出現日落症候群(黃昏症候群)」，並非較少。故 D 正確。失智的語言障礙(失語)是認知缺損之一。","options":{"A":"定向感障礙通常先發生時間，非人物。","B":"記憶減退通常先發生近期記憶障礙，非遠期。","C":"失智者常出現日落症候群，非較少。","D":"正確。語言功能可能出現整合理解表達減退或失語症。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"110030-N5-31":{"quick":"自閉症類群障礙症的護理「錯誤」者＝每天關心、以期待他能有正向情感回饋。","detail":{"background":"王小弟5歲自閉症的護理，「錯誤」者為(C)『每天關心王小弟，「以期待他能有正向情感回饋」』——錯誤，自閉症兒童「社會情感互動有缺損、情感回饋有限」，「期待其有正向情感回饋」是不切實際的期望(照護應「不以情感回饋為目的」，而是持續、結構化地支持其發展)。其他正確:A 評估其情緒、認知及日常生活功能，並鼓勵發展適齡技能;B 安排規律的治療、吃飯與就寢時間(結構化、可預期);D 溝通必須清楚、具體及簡單化。故本題選錯誤者為 C。","options":{"A":"評估功能、鼓勵發展適齡技能，正確。","B":"安排規律的作息(結構化)，正確。","C":"正確(本題選錯誤者)。自閉症情感回饋有限，期待正向情感回饋不切實際。","D":"溝通清楚、具體、簡單化，正確。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","自閉症"]}},"110030-N5-32":{"quick":"反覆住院的思覺失調病人：入院時即須開始進行出院準備服務。","detail":{"background":"黃先生思覺失調、反覆惡化、剛出院兩個月又因拒藥、自我照顧差、暴力入院。正確的是(A)『「入院時」即須開始進行「出院準備服務」(及早規劃出院後的社區銜接、服藥、復健、家庭支持，以預防再住院)』。其他錯誤:B『入院時「立即主動約束」以防暴力』錯誤(約束須有適應症、是最後手段，不可預防性使用);C『出院前幾天才開始出院準備』錯誤(應入院時即開始);D『反覆住院故建議「長期住院」』錯誤(與去機構化、回歸社區的方向相違)。故 A 正確。出院準備服務應在入院時即開始規劃。","options":{"A":"正確。入院時即須開始進行出院準備服務。","B":"約束須有適應症、是最後手段，不可預防性使用。","C":"出院準備應入院時即開始，非出院前幾天。","D":"建議長期住院與去機構化、回歸社區相違。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"110030-N5-35":{"quick":"獨居、自我照顧差、自言自語、倒垃圾到鄰居家：通報衛生局連結資源、由精神專科醫師到場評估。","detail":{"background":"王女士獨居、自我照顧差、自言自語、倒垃圾到鄰居家(疑似精神問題、影響社區、警方無法處理)。社區心理衛生護理師較適當的處置是(C)『「通報衛生局、連結醫療資源，由精神專科醫師到場評估，以進行確診及下一步處置」(依正當程序評估、診斷、處理)』。其他錯誤:A『立即聯合警消啟動「強制住院」』錯誤(尚未經評估、未確認達強制住院要件);B『非登記的精神病人故「不須處理」』錯誤(有疑似精神問題、影響社區，仍須處理);D『為避免衝突「不予處理」』是失職。故 C 正確。對疑似個案，依程序通報、連結資源、由專科醫師評估。","options":{"A":"尚未評估、未確認達要件，不應立即強制住院。","B":"有疑似精神問題、影響社區，仍須處理。","C":"正確。通報衛生局、連結資源，由精神專科醫師到場評估。","D":"「不予處理」是失職。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"110030-N5-40":{"quick":"身體約束隔離：保護病人不傷害自己及他人①、每15分鐘探視評估生理需求③、疏散現場圍觀者④(無須告知目的和時間②錯)。","detail":{"background":"身體約束隔離的正確敘述:(1)身體約束的目的是「以具體的身體控制，保護病人不傷害自己及他人」;(3)執行時「每15分鐘探視病人、評估生理狀況與需求」;(4)疏散現場圍觀者(維護安全與隱私)。而(2)『執行過程中「無須告知病人執行目的和時間」，只要確保人員安全即可』錯誤——約束「仍須向病人「告知目的與時間」」(尊重、減少恐懼)，不可只顧人員安全而不告知。故正確為①③④(選 C)。","options":{"A":"123：含②(無須告知)，錯誤。","B":"234：含②、缺①，錯誤。","C":"正確。保護不傷害自己及他人①、每15分鐘探視評估需求③、疏散圍觀者④。","D":"124：含②，錯誤。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"110110-N5-1":{"quick":"強制社區治療期間不能超過＝6個月。","detail":{"background":"依現行精神衛生法，嚴重病人經審查會許可的「強制社區治療」，「此次」接受治療的期間「不能超過(B)6個月」——強制社區治療一次的期間以6個月(180日)為限，期滿如仍有必要，可依程序「再申請延長」。故 B 正確。強制社區治療的單次期限為6個月(180日)，與前述「初始階段180日」一致。","options":{"A":"3個月非強制社區治療的單次期限。","B":"正確。強制社區治療期間不能超過6個月。","C":"9個月非單次期限。","D":"12個月非單次期限。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"110110-N5-8":{"quick":"「特別性 D2/D3 接受器阻斷劑」＝Amisulpride(Solian)。","detail":{"background":"抗精神病藥物中，藥理作用最能歸屬於「第二型及第三型多巴胺特別性接受器阻斷劑(specific D2/D3 antagonist)」的是(A)『Amisulpride(Solian)』——amisulpride 是「選擇性地阻斷 D2/D3 受體」的非典型抗精神病藥(低劑量時阻斷突觸前自體受體、有改善負性症狀的作用)。Olanzapine、Risperidone、Ziprasidone 則是「多重受體(D2+5-HT2 等)」作用的非典型藥(非「特別性/選擇性 D2/D3」)。故 A 正確。amisulpride 的特點是選擇性作用於 D2/D3 受體。","options":{"A":"正確。Amisulpride 是選擇性 D2/D3 接受器阻斷劑。","B":"Olanzapine 是多重受體(D2+5-HT2 等)作用。","C":"Risperidone 是多重受體作用。","D":"Ziprasidone 是多重受體作用。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR"]}},"110110-N5-9":{"quick":"EPS：開始用藥的前3個月就可能產生類巴金森氏症(運動不能、表情呆板、手抖)。","detail":{"background":"錐體外症候群(EPS)的正確敘述:(D)『開始使用抗精神病藥物的「前3個月(數週至3個月)」，就可能產生「類巴金森氏症(運動不能、表情呆板/面具臉、手抖)」的副作用』。其他錯誤:A 治療「最初3~4天」最常產生的是「急性肌張力不全(acute dystonia，斜頸、牙關緊閉)」，而非靜坐不能;B 急性肌張力不全多在「「初期(數小時至數天)」」，而非「1個月後」;C「遲發性運動異常(TD)」是「「長期(數月至數年)」」用藥才出現，而非「1個月內」。故 D 正確。EPS 出現時序:急性肌張力不全(數天)→靜坐不能(數天~數週)→類巴金森(數週~3個月)→遲發性運動異常(數月~數年)。","options":{"A":"最初3~4天最常是急性肌張力不全，非靜坐不能。","B":"急性肌張力不全多在初期(數天)，非1個月後。","C":"遲發性運動異常是長期用藥才出現，非1個月內。","D":"正確。前3個月就可能產生類巴金森氏症。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","EPS"]}},"110110-N5-11":{"quick":"行為治療：選擇對個案有影響的增強物，以增強適當的行為。","detail":{"background":"護理人員應用行為治療原則，最適當的是(D)『「選擇對個案「有影響(有意義)的增強物」，以增強(鼓勵)適當的行為」(增強物須個別化、對病人有吸引力才有效)』。其他錯誤:A『一出現不適當行為就「一律立即懲罰」』錯誤(行為治療以正增強為主，不以懲罰為主);B『醫護「分別扮黑白臉、態度不同」』錯誤(團隊態度應「一致」，不同態度會被分化、削弱效果);C『出現攻擊行為後「取消禁止外出購物」』邏輯錯誤(攻擊後反而「給予」外出機會，等於獎勵了攻擊行為，不符增強原則)。故 D 正確。行為治療以個別化的正增強、團隊一致為原則。","options":{"A":"行為治療以正增強為主，非一律立即懲罰。","B":"團隊態度應一致，不同態度會被分化。","C":"攻擊後給予外出機會等於獎勵攻擊，邏輯錯誤。","D":"正確。選擇對個案有影響的增強物，以增強適當行為。"},"sources":["精神科護理學(新文京/華杏)·行為治療"]}},"110110-N5-19":{"quick":"幻聽病人的護理「錯誤」者＝直接向病人說「不要胡思亂想!」","detail":{"background":"沈女士慢性精神病、規則服藥但仍受幻聽干擾。護理措施「錯誤」者為(C)『直接向病人說「不要胡思亂想!」』——錯誤，這是「否定、命令」病人的經驗，無助於處理幻聽、且傷害關係。其他正確:A 同理病人的感受(接納情緒);B 詢問「聲音說些什麼?」(了解幻聽內容、評估安全，尤其有無命令性幻覺);D 鼓勵運用可行的「阻斷幻聽的方法(如聽音樂、與人交談、轉移注意力)」。故本題選錯誤者為 C。對幻聽宜同理、了解內容、教導因應，不否定。","options":{"A":"同理病人的感受，正確。","B":"詢問「聲音說些什麼」以了解內容、評估安全，正確。","C":"正確(本題選錯誤者)。「不要胡思亂想」是否定、命令，無助處理。","D":"鼓勵運用阻斷幻聽的方法，正確。"},"sources":["精神科護理學(新文京/華杏)·思覺失調症"]}},"110110-N5-26":{"quick":"人格障礙症：與自我(ego)功能薄弱有關，導致自我控制力較差。","detail":{"background":"人格障礙症的特性與病因，較適當的是(A)『與「自我(ego)的功能薄弱」有關，導致「自我控制力較差」(衝動、適應不良)』。其他錯誤:B『與遺傳「無關」』錯誤(人格障礙與遺傳「有關」，是先天氣質+後天環境);C『與血清素代謝物(5-HIAA)「過高」有關』錯誤——衝動、自殺與血清素/5-HIAA「「過低(不足)」」有關，非過高;D『與青春期或成年早期的發展「無關」』錯誤(人格障礙的形成「與」早期(青春期/成年早期)的發展有關，且須成年後才診斷)。故 A 正確。","options":{"A":"正確。與自我(ego)功能薄弱有關，導致自我控制力較差。","B":"人格障礙與遺傳有關，非無關。","C":"衝動/自殺與 5-HIAA 過低有關，非過高。","D":"與青春期/成年早期的發展有關，非無關。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"110110-N5-30":{"quick":"自閉症類群障礙症的核心障礙「錯誤」者＝重度智能不足。","detail":{"background":"自閉症類群障礙症(ASD)的「核心障礙」是:B 社交互動障礙、C 語言溝通障礙、D 重複刻板的行為模式(這三者是 ASD 的核心)。而(A)『重度智能不足』「不是」ASD 的核心障礙——智能不足可能「合併」(部分 ASD 個案智能正常甚至優異)，但非核心(定義性)障礙。故本題選錯誤者為 A(與前述同類題一致)。ASD 的核心是社交溝通缺損+侷限重複的行為興趣。","options":{"A":"正確(本題選錯誤者)。重度智能不足是可能合併，非 ASD 的核心障礙。","B":"社交互動障礙是 ASD 的核心障礙。","C":"語言溝通障礙是 ASD 的核心障礙。","D":"重複刻板的行為模式是 ASD 的核心障礙。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","自閉症"]}},"110110-N5-31":{"quick":"阿茲海默氏症重度認知障礙：傍晚和前半夜會較嚴重，出現日落症候群。","detail":{"background":"阿茲海默氏症引起的重度認知障礙，最適當的是(B)『在「傍晚和前半夜」會較嚴重，出現「日落症候群(sundowning)」(混亂、躁動加重)』。其他錯誤:A『日常生活「不受影響」』錯誤(重度認知障礙者日常生活嚴重受影響、大多需協助);C『「遠期」記憶減退通常是最先出現』錯誤——「近期記憶」最先減退，遠期保留較久;D『情緒變化與以前差別不大』錯誤(失智常有明顯的情緒與人格改變)。故 B 正確。失智常見日落症候群(傍晚後混亂躁動加重)。","options":{"A":"重度認知障礙者日常生活嚴重受影響，非不受影響。","B":"正確。傍晚和前半夜較嚴重，出現日落症候群。","C":"近期記憶最先減退，非遠期。","D":"失智常有明顯的情緒與人格改變，非差別不大。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"110110-N5-34":{"quick":"ADHD 學齡兒童的治療「錯誤」者＝中樞神經興奮劑宜長期服用、絕對不可停藥。","detail":{"background":"ADHD 學齡兒童治療計畫的敘述，「錯誤」者為(B)『為避免復發，中樞神經興奮劑宜「長期服用、絕對不可停藥」』——錯誤，ADHD 用藥「可依個別狀況安排「藥物假期(drug holiday，如假日/暑假暫停)」、並定期評估調整」，並非「絕對不可停藥」。其他正確:A 可使用中樞神經興奮劑(Ritalin)改善衝動及活動量過高;C 可合併藥物治療及感覺統合治療;D 急性住院期間宜安排不具攻擊性的活動。故本題選錯誤者為 B。","options":{"A":"可使用 Ritalin 改善衝動及過動，正確。","B":"正確(本題選錯誤者)。可安排藥物假期、定期評估，非絕對不可停藥。","C":"可合併藥物及感覺統合治療，正確。","D":"急性住院宜安排不具攻擊性的活動，正確。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD"]}},"110110-N5-35":{"quick":"反覆住院、家屬可同住、有工作及復健潛能：出院前轉介日間型精神復健機構。","detail":{"background":"許小姐情感性精神病、剛轉慢性病房、「家屬可接受返家同住、且有工作及復健潛能」。較適當的出院準備是(B)『出院前轉介「日間型精神復健機構(日間留院/日間病房)」』——病人「晚上回家(家屬可同住)、白天到機構接受復健與職能訓練(發揮其工作與復健潛能)」，最符合其狀況。其他:A 精神護理之家、C 住宿型精神復健機構、D 康復之家都是「住宿型(離家居住)」的安置，不符「家屬可同住、返家」的情況。故 B 正確。對可返家、有復健潛能者，日間型復健機構最適合。","options":{"A":"精神護理之家是住宿型，給功能退化、需長期照護者。","B":"正確。家屬可同住、有復健潛能，宜轉介日間型精神復健機構。","C":"住宿型精神復健機構是離家居住，不符返家同住。","D":"康復之家是住宿型，不符家屬可同住。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"110110-N5-39":{"quick":"精神科住院病人暴力的護理「錯誤」者＝約束病人前需取得病人同意。","detail":{"background":"精神科住院病人出現暴力行為的護理措施，「錯誤」者為(A)『約束病人前，需「取得病人同意」』——錯誤，約束是「依「醫囑」執行(緊急時可先處置再立即補醫囑)」，「不是」以「取得病人同意」為前提(暴力失控者無法、也不會同意;但仍須「向病人「說明/告知」約束的理由」)。其他正確:B 執行約束後，至少每15分鐘探視病人1次;C 可依照醫囑給予注射抗精神病藥物;D 病人情況穩定後，讓其有機會說明自己的行為。故本題選錯誤者為 A。","options":{"A":"正確(本題選錯誤者)。約束依醫囑執行、須告知病人，非取得病人同意。","B":"執行約束後至少每15分鐘探視，正確。","C":"可依醫囑給予注射抗精神病藥物，正確。","D":"病人穩定後讓其說明自己的行為，正確。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"110110-N5-40":{"quick":"遭暴力攻擊的護理人員輔導：暴力事件後，提升護理人員面對暴力行為的處理能力。","detail":{"background":"遭精神病人暴力攻擊的護理人員輔導，較適當的是(D)『暴力事件後，「提升護理人員面對暴力行為的處理能力(透過檢討、訓練、支持，增進日後處理暴力的能力)」』。其他錯誤:A『被攻擊後可能感到羞愧，「避免直接與其會談」』錯誤(應「給予支持與會談」，協助其抒發情緒、處理創傷，而非迴避);B『「現場立即檢討是否護理人員處置不當」』錯誤(立即的檢討、歸咎會造成二度傷害，應先支持、事後再檢討學習);C『加強通報系統「以杜絕」病房暴力』理想化(通報重要，但「杜絕」暴力不切實際)。故 D 正確。對遭暴力者，先支持、再透過檢討與訓練提升處理能力。","options":{"A":"應給予支持與會談，協助抒發情緒，而非迴避。","B":"立即現場檢討、歸咎會造成二度傷害。","C":"通報重要，但「杜絕」暴力不切實際。","D":"正確。暴力事件後，提升護理人員面對暴力行為的處理能力。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"110110-N5-80":{"quick":"病主法：意願人簽署「預立醫療決定」前，須先經醫療機構「預立醫療照護諮商」。","detail":{"background":"依病人自主權利法，輕度認知障礙者事先預立醫療決定的正確敘述:(B)『意願人簽署「預立醫療決定(AD)」前，須先經醫療機構「預立醫療照護諮商(ACP)」(由醫療團隊、意願人、二親等內親屬等進行諮商)』。其他錯誤:A『18歲以上「都可以」簽署』不精確(須具「完全行為能力」的意願人，且須符合相關規定);C『家屬「可全權代理」簽署 AD』錯誤(預立醫療決定須「意願人本人」簽署，不可由家屬代理);D『有認知障礙者「不能」簽立 AD』錯誤(「輕度」認知障礙、仍有意思能力者，仍可簽署)。故 B 正確。簽署 AD 前須先經 ACP。","options":{"A":"須具完全行為能力的意願人，「18歲以上都可」不精確。","B":"正確。簽署 AD 前須先經預立醫療照護諮商(ACP)。","C":"AD 須意願人本人簽署，不可由家屬全權代理。","D":"輕度認知障礙、仍有意思能力者仍可簽署。"},"sources":["病人自主權利法"]}},"111030-N5-3":{"quick":"精神衛生法：傳播媒體的報導，不得使用與精神疾病有關的歧視性稱呼或描述。","detail":{"background":"最符合現行精神衛生法精神病人保護及權益保障的是(D)『傳播媒體的報導，「不得使用與精神疾病有關的歧視性稱呼或描述」(反污名、保障人格尊嚴)』。其他錯誤:A『為保護安全「不可以有會客權利」』錯誤(住院病人「有」通訊、會客等權利);B『學校「得拒絕」曾罹患精神疾病者入學』錯誤(不得以罹患精神疾病為由拒絕入學，反歧視);C『慢性病患「應長期安置於醫療機構」』錯誤(應協助回歸社區，去機構化)。故 D 正確。精神衛生法保障病人的權益、反歧視、反污名。","options":{"A":"住院病人有通訊、會客等權利，非不可會客。","B":"不得以罹患精神疾病為由拒絕入學。","C":"應協助慢性病患回歸社區，非長期安置機構。","D":"正確。媒體報導不得使用與精神疾病有關的歧視性稱呼或描述。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"111030-N5-5":{"quick":"譫妄「錯誤」者＝觸幻覺是最常見的知覺障礙(應為視幻覺)。","detail":{"background":"譫妄(delirium)的敘述，「錯誤」者為(A)『「觸幻覺」是最常見的知覺障礙』——錯誤，譫妄最常見的知覺障礙是「「視幻覺」」(生動、可怕的視幻覺)，而非觸幻覺。其他正確:B 譫妄「任何年齡皆有可能發生」(尤其老人、重病者);C 譫妄會出現認知困擾(定向、注意、記憶等);D 電解質不平衡(代謝失調)與譫妄的發生有關。故本題選錯誤者為 A。譫妄以視幻覺為主，須找出並處理生理病因。","options":{"A":"正確(本題選錯誤者)。譫妄最常見的是視幻覺，非觸幻覺。","B":"譫妄任何年齡皆可能發生，正確。","C":"譫妄會出現認知困擾，正確。","D":"電解質不平衡與譫妄發生有關，正確。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"111030-N5-22":{"quick":"反社會人格「最不適當」者＝認為自己很重要、希望他人自動順從自己的意願(那是自戀型)。","detail":{"background":"依 DSM-5，反社會人格(ASPD)的敘述，「最不適當」者為(B)『認為自己很重要、希望他人自動順從自己的意願』——這是「「自戀型」人格」的特徵(誇大、優越感、要求他人順從)，而非反社會型。反社會型的核心是「漠視、侵犯他人權益」:A 無法遵從社會規範、遊走於法律邊緣;C 不負責任、無法維持工作或亂開空頭支票;D 不知悔恨、合理化對他人造成的傷害。故本題選最不適當者為 B。","options":{"A":"無法遵從社會規範、遊走法律邊緣，是反社會人格的特徵。","B":"正確(本題選最不適當者)。「希望他人順從、自認重要」是自戀型，非反社會型。","C":"不負責任、無法維持工作，是反社會人格的特徵。","D":"不知悔恨、合理化傷害，是反社會人格的特徵。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"111030-N5-24":{"quick":"治療強迫症強迫行為常用＝抗憂鬱劑 SSRI(如 fluvoxamine)。","detail":{"background":"常用於治療強迫症(OCD)強迫行為的藥物是(B)『抗憂鬱劑—選擇性血清素再回收抑制劑(SSRI)，例如 fluvoxamine(Luvox)』——OCD 與血清素失調有關，SSRI(及 clomipramine)是其第一線藥物(常需較高劑量、較長時間)。短效 BZD(alprazolam)是抗焦慮藥(非 OCD 主要用藥);中樞神經興奮劑(methylphenidate)是 ADHD 用藥;抗精神病藥(aripiprazole)是「輔助」用藥(難治型 OCD 才加上)。故 B 正確。SSRI 是強迫症的主要治療藥物。","options":{"A":"短效 BZD 是抗焦慮藥，非 OCD 的主要用藥。","B":"正確。抗憂鬱劑 SSRI(如 fluvoxamine)常用於治療強迫症。","C":"中樞神經興奮劑是 ADHD 用藥。","D":"抗精神病藥是難治型 OCD 的輔助用藥，非主要。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","強迫症用藥"]}},"111030-N5-26":{"quick":"假性失智 vs 失智：假性失智有較清楚的發病時間①、常抱怨認知障礙②、失智行為與認知障礙嚴重度吻合③(失智老是答「不知道」④錯)。","detail":{"background":"評估假性失智(pseudodementia，多由憂鬱引起)與失智的差異:(1)「假性失智」多半有「比較清楚的發病時間(可指出何時開始)」;(2)「假性失智」「常「抱怨」自己的認知障礙(誇大、強調記不住)」;(3)「失智症」的「行為表現與認知障礙的嚴重度「吻合(一致)」」。而(4)『「失智症」對問話老是回答「不知道、忘記了」』錯誤——「老是回答不知道/忘記了(放棄作答)」是「「假性失智(憂鬱)」」的特徵;「失智症」病人反而會「努力回答、或以「虛談」掩飾」。故正確為①②③(選 D)。","options":{"A":"134：含④(失智老是答不知道)，那是假性失智的特徵。","B":"234：含④、缺①，錯誤。","C":"124：含④，錯誤。","D":"正確。假性失智有清楚發病時間①、常抱怨認知障礙②、失智行為與嚴重度吻合③。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR","假性失智"]}},"111030-N5-30":{"quick":"ADHD 治療「最不適當」者＝活動無法持續時應立即終止，以減少挫折。","detail":{"background":"ADHD 的治療原則，「最不適當」者為(B)『活動無法持續時「應立即終止」，以減少挫折』——錯誤，當 ADHD 兒童活動無法持續時，宜「「協助轉換、調整、給予結構與引導」」，而非「立即終止」(立即終止會強化其放棄、無法培養持續力)。其他適當:A 安排活動以疏導其過多的活動力;C 儘量避免選擇需非常專注的靜態活動(他們難以長時間專注);D 不宜安排過度攻擊的活動，以防造成傷害。故本題選最不適當者為 B。","options":{"A":"安排活動以疏導過多的活動力，適當。","B":"正確(本題選最不適當者)。應協助轉換、調整，而非立即終止。","C":"避免選擇需非常專注的靜態活動，適當。","D":"不宜安排過度攻擊的活動，適當。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD"]}},"111030-N5-31":{"quick":"失智者因身體不適(發燒、咳痰)而打人：將其帶離現場、協助痰液排出(處理生理不適)。","detail":{"background":"張先生阿茲海默症、「因不明原因發燒、咳嗽有痰不舒服」、要回家、打了媳婦——其攻擊行為的「根本原因是「身體不適(發燒、咳痰)」」。最適當的護理是(B)『「將張先生帶離現場(降低衝突)、協助痰液排出(處理其生理不適)」——找出並處理引發躁動的「生理原因」』。其他錯誤:A『立即給抗精神病針劑』未處理根本原因、過度用藥;C『告知打人是不被允許的』對失智者(認知退化)效果有限;D『帶入保護室約束』過度、未處理生理不適。故 B 正確。失智者的躁動/攻擊常源於身體不適或需求未滿足，應先找出並處理。","options":{"A":"立即給針劑未處理根本原因、過度用藥。","B":"正確。帶離現場、協助痰液排出，處理其生理不適。","C":"告知「打人不被允許」對失智者效果有限。","D":"帶入保護室約束過度、未處理生理不適。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"111030-N5-36":{"quick":"精神護理之家的失智住民：協助發揮其尚存的優勢和能力。","detail":{"background":"照顧精神護理之家的失智住民，最適當的是(A)『協助「發揮其尚存的優勢和能力(著重保留功能、維持自尊與參與)」』。其他錯誤:B『與聽障住民互動「只能提高音量、大聲說話」』錯誤(除了適度音量，更應「面對面、清楚、慢、輔以非語言/書寫」，不是「只能」大聲);C『有視、聽幻覺時宜「忽略」』錯誤(應評估、了解、確保安全，而非忽略);D『避免跌倒「不宜安排活動」』錯誤(應安排「適當、安全」的活動以維持功能，不是不安排)。故 A 正確。失智照護著重發揮尚存的能力、維持功能與尊嚴。","options":{"A":"正確。協助發揮其尚存的優勢和能力。","B":"除音量外更應面對面、清楚、慢，非「只能大聲」。","C":"有幻覺時應評估、確保安全，非忽略。","D":"應安排適當安全的活動以維持功能，非不安排。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"111030-N5-37":{"quick":"約束密切觀察的主要項目「不包含」＝是否有娛樂設施。","detail":{"background":"對保護室內約束病人的密切觀察，主要項目「不包含」(A)『是否有娛樂設施』——約束觀察的重點是「病人的「安全、生理與心理狀態」」，而非「娛樂設施」。其他屬於觀察項目:B 病人的言行反應(情緒、行為、意識);C 個人的生理需求(如廁、飲水、進食);D 脈搏及呼吸(生命徵象，及約束部位的循環)。故本題選不包含者為 A。約束觀察:生命徵象、約束部位循環、生理需求、言行反應、心理狀態。","options":{"A":"正確(本題選不包含者)。娛樂設施不是約束觀察的項目。","B":"病人的言行反應是觀察項目。","C":"個人的生理需求是觀察項目。","D":"脈搏及呼吸是觀察項目。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"111030-N5-38":{"quick":"clozapine 引起代謝症候群最適當＝先釐清代謝症候群是遺傳性或非遺傳性(評估成因再處置)。","detail":{"background":"王小姐服 clozapine 後出現代謝症候群。最適當的是(D)『「先測量病人的(代謝相關)基準值(baseline)」，有利後續持續追蹤(在用藥前/初期建立基準值，是監測代謝副作用的正確做法)』(代謝症候群監測的核心指標為腰圍、血壓、空腹血糖、血脂)。其他錯誤:A clozapine 的「嚴重流口水、白血球缺乏」是「「其他副作用」」，並非「代謝症候群」的症狀(代謝症候群是肥胖、高血糖、高血脂、高血壓);B『立即停藥是最好策略』錯誤(不應因代謝副作用就立即停藥，須評估、處理);C『先釐清是遺傳或非遺傳』非當下處理代謝症候群的優先。故 D 正確(以「建立基準值、持續追蹤」為原則)。","options":{"A":"流口水、白血球缺乏是 clozapine 的其他副作用，非代謝症候群的症狀。","B":"不應因代謝副作用就立即停藥(須權衡精神症狀控制)。","C":"正確。先釐清代謝症候群為遺傳性或非遺傳性，以利後續處置方向。","D":"尿酸非代謝症候群的診斷指標(應測腰圍、血壓、空腹血糖、三酸甘油酯、HDL)，故非最適當。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","Clozapine"]}},"111030-N5-39":{"quick":"clozapine 致代謝症候群的護理：了解其對體重上升的影響，持續提供病人營養及運動諮詢。","detail":{"background":"王小姐因 clozapine 副作用產生代謝症候群，最適當的護理是(D)『了解 clozapine「對體重上升的影響」，「開始服藥後即需「持續提供病人營養及運動諮詢」(生活型態介入是處理代謝副作用的核心)』。其他錯誤:A『只需追蹤服藥後「1年」的空腹血糖』錯誤(應「定期、自用藥初期即」監測，非只追蹤1年一次);B『建議採「低普林飲食」』錯誤(低普林是針對「痛風/高尿酸」，非代謝症候群的核心處理);C『流口水是「代謝症候群」問題之一、建議變更藥物』錯誤(流口水非代謝症候群，且不應因此就變更藥物)。故 D 正確。對藥物引起的代謝症候群，以營養、運動的生活型態諮詢與定期監測為主。","options":{"A":"應定期、自用藥初期即監測，非只追蹤1年的空腹血糖。","B":"低普林飲食是針對痛風/高尿酸，非代謝症候群。","C":"流口水非代謝症候群，不應因此變更藥物。","D":"正確。了解其對體重上升的影響，持續提供營養及運動諮詢。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","代謝症候群"]}},"111110-N5-6":{"quick":"抗精神病藥副作用：可能引起血壓下降，臥姿改立姿動作應緩慢及注意安全。","detail":{"background":"抗精神病藥物副作用，最適當的是(A)『可能引起「(姿勢性)血壓下降」，病人「由臥姿改為立姿時動作應緩慢及注意安全(防姿勢性低血壓致跌倒)」』。其他錯誤:B『靜坐不能主要發生在服藥「兩年以上」』錯誤(靜坐不能多在「初期數天至數週」，遲發性運動異常才是長期);C『「第一代」較「第二代」容易發生代謝症候群』錯誤(「第二代(非典型)」較易發生代謝症候群);D『發生類巴金森氏症的 EPS「應立即停藥」』錯誤(應「給予抗膽鹼藥處置/調整劑量」，而非立即停藥)。故 A 正確。抗精神病藥的姿勢性低血壓須衛教病人緩慢起身、防跌。","options":{"A":"正確。可能引起血壓下降，臥改立姿動作應緩慢、注意安全。","B":"靜坐不能多在初期，非兩年以上。","C":"第二代較易發生代謝症候群，非第一代。","D":"類巴金森氏症應給抗膽鹼藥處置/調整劑量，非立即停藥。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR"]}},"111110-N5-9":{"quick":"服藥反應處置：服 Haloperidol 出現遲發性不自主運動(TD)，應建議立即停藥或換藥。","detail":{"background":"病人服藥反應的處置，最適當的是(D)『服 Haloperidol 出現「遲發性不自主運動(tardive dyskinesia, TD)」時，應建議「立即停藥或換藥(改用 EPS 風險較低的第二代藥)」——TD 可能不可逆，須及早處置』。其他錯誤:A 服 Venlafaxine 初期的「噁心」是「常見、暫時」的副作用，「不應立即停藥/換藥」(多會適應);B 服 Mirtazapine 的「鎮靜」是其「常見作用(可助眠)」，「不應立即停藥」;C 服 SSRI 不應「衛教自我限制熱量、因為體重隨時會增加」(SSRI 初期多體重持平/減輕，且不應如此衛教)。故 D 正確。對 TD 應及早停藥/換藥;對暫時性副作用則衛教適應。","options":{"A":"Venlafaxine 初期噁心是暫時的，不應立即停藥/換藥。","B":"Mirtazapine 的鎮靜是常見作用(可助眠)，不應立即停藥。","C":"SSRI 不應如此衛教(初期多體重持平/減輕)。","D":"正確。Haloperidol 出現遲發性不自主運動，應建議立即停藥或換藥。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","EPS"]}},"111110-N5-30":{"quick":"與神經障礙症兒童溝通「最不適當」者＝初次評估必須運用身體接觸技巧。","detail":{"background":"與神經發展障礙症(如自閉症、智能不足)兒童溝通，「最不適當」者為(B)『初次評估「必須運用身體接觸技巧」』——錯誤，許多神經障礙(尤其自閉症)兒童「對身體接觸敏感、排斥」，「初次評估、未建立關係前不宜貿然以身體接觸」(且不應「必須」)。其他適當:A 簡短具體的結構性語句;C 避免太抽象的語句;D 強調正向的回饋。故本題選最不適當者為 B。對神經障礙兒童，溝通宜簡單、具體、正向，並尊重其對身體接觸的敏感。","options":{"A":"簡短具體的結構性語句，適當。","B":"正確(本題選最不適當者)。神經障礙兒童多排斥身體接觸，初次評估不宜「必須」用身體接觸。","C":"避免太抽象的語句，適當。","D":"強調正向的回饋，適當。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR"]}},"111110-N5-31":{"quick":"譫妄病人的護理：溝通時應簡短扼要、重複告知人事時地物的訊息。","detail":{"background":"針對譫妄病人的護理，正確的是(D)『溝通時應「簡短扼要、重複告知人、事、時、地、物的訊息(提供現實導向 reality orientation)」』——譫妄者意識/定向混亂，須以簡單、重複的訊息協助其定向。其他錯誤:A『限制飲水以減少尿失禁』錯誤(應「維持水分、找出尿失禁原因」，限水有害);B『環境布置多元豐富、增加感官刺激』錯誤(對譫妄者應「減少過度刺激、提供安靜環境」);C『睡眠紊亂時「優先給安眠藥」』錯誤(應先以「非藥物方式(光線、作息、安靜)」，且 BZD 安眠藥會加重譫妄)。故 D 正確。譫妄護理:現實導向、減少過度刺激、找病因、維持安全。","options":{"A":"應維持水分、找尿失禁原因，限水有害。","B":"對譫妄者應減少過度刺激，非增加。","C":"睡眠紊亂應先用非藥物方式，安眠藥會加重譫妄。","D":"正確。溝通簡短扼要、重複告知人事時地物(現實導向)。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"111110-N5-32":{"quick":"老年精神病人的藥物：第二代抗精神病藥物較第一代不會引發老年人的錐體外症候群(EPS)。","detail":{"background":"老年精神病人的藥物治療，最適當的是(A)『「第二代(非典型)」抗精神病藥物，較「第一代(典型)」「不易」引發老年人的錐體外症候群(EPS)』——第二代藥的 EPS 風險較低，故老人多優先考慮(但須留意代謝副作用)。其他錯誤:B『三環抗憂鬱劑(TCA)治老人憂鬱「較不會」心血管副作用』錯誤——TCA 有明顯的「心血管(姿勢性低血壓、心律不整)、抗膽鹼」副作用，老人「應謹慎/避免」;C『情緒穩定劑「不建議」老年躁症使用』錯誤(可使用，但須減量、監測);D『老年病人抗精神病藥應「從高劑量開始」』錯誤——老人應「「從低劑量開始、緩慢調整(start low, go slow)」」。故 A 正確。","options":{"A":"正確。第二代抗精神病藥較第一代不易引發老年人的 EPS。","B":"TCA 有明顯心血管/抗膽鹼副作用，老人應謹慎/避免。","C":"情緒穩定劑可用於老年躁症，但須減量、監測。","D":"老人用藥應從低劑量開始、緩慢調整，非高劑量。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR"]}},"111110-N5-35":{"quick":"智能不足嚴重度的分類「最不適當」者＝依據智力測驗分數區分。","detail":{"background":"依 DSM-5，智能不足(智能障礙)嚴重度的分類，「最不適當」者為(A)『依據「智力測驗分數」區分』——DSM-5 已將嚴重度的分類「「主要依據「適應功能(adaptive functioning，概念、社會、實務領域)」」」，而非「只依智力測驗分數(IQ)」(因適應功能更能反映所需的支持程度)。其他正確:B 依據適應功能做區分;C 嚴重度分為輕、中、重及極重度;D 智力與適應功能缺損須在「發展期間」發生。故本題選最不適當者為 A。DSM-5 的智能障礙嚴重度以「適應功能」為主要分類依據。","options":{"A":"正確(本題選最不適當者)。DSM-5 主要依適應功能分類，非只依智力測驗分數。","B":"依據適應功能做區分，正確。","C":"嚴重度分為輕、中、重、極重度，正確。","D":"智力與適應功能缺損須在發展期間發生，正確。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","智能不足"]}},"111110-N5-37":{"quick":"精神護理之家護理人員的角色：聯繫者②、策畫者③、協調者④、個案管理者⑤(醫療疾病診斷者①非)。","detail":{"background":"精神護理之家的護理人員，以住民為中心提供連續性照顧，其角色功能包括:(2)聯繫者、(3)策畫者、(4)協調者、(5)個案管理者(整合、協調、規劃、連結資源)。而(1)『「醫療疾病診斷者」』不是護理人員的角色——「疾病診斷」是「醫師」的職責，護理人員不做醫療診斷。故正確為②③④⑤(選 D)。護理人員是聯繫、協調、規劃、個案管理者，而非疾病診斷者。","options":{"A":"僅123：含①(醫療疾病診斷者)，非護理角色。","B":"僅234：缺⑤，不完整。","C":"1345：含①，錯誤。","D":"正確。聯繫者②、策畫者③、協調者④、個案管理者⑤。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"111110-N5-38":{"quick":"停藥復發的思覺失調病人出院準備：引導病人與家屬了解規則服藥的重要性。","detail":{"background":"陳女士思覺失調、因「擅自停藥」復發、即將出院。最適當的出院準備護理是(D)『「引導病人與家屬了解「規則服藥的重要性」(增進病識感與服藥順從，預防復發)』。其他錯誤:A『要求家屬「完全負起」監督服藥的責任』錯誤(應「協助病人「自我管理」服藥」，家屬是支持而非完全代管);B『安排「職業訓練」、出院後謀生』非此「服藥問題」的優先;C『教導家屬「凡事皆予代勞」』錯誤(代勞會助長依賴、退化)。故 D 正確。對停藥復發者，出院準備首重「規則服藥的衛教與支持」。","options":{"A":"應協助病人自我管理服藥，家屬是支持而非完全代管。","B":"職業訓練非此「服藥問題」的優先。","C":"凡事代勞會助長依賴、退化。","D":"正確。引導病人與家屬了解規則服藥的重要性。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"111110-N5-40":{"quick":"慢性精神病四段七級健康促進：第六級策略為轉介居家治療與精神長照機構。","detail":{"background":"慢性精神病人「四段七級」健康促進模式的主要策略中，正確的是(D)『「第六級」策略為「轉介居家治療與精神長照機構(針對失能、需長期照護者，連結居家/長照資源)」』——較後段(第六級)的策略對應「失能後的長期照護與資源連結」。前段策略對應健康促進、篩檢、早期治療;後段對應復健、長照。故 D 正確(依四段七級的架構，第六級為長照/居家資源的轉介)。","options":{"A":"第一級偏向健康促進，「急性症狀控制」屬較後段的治療，配對不符。","B":"居家護理、社區方案非第三級的對應。","C":"健康檢查、高風險篩檢偏向前段(篩檢)，非第五級。","D":"正確。第六級策略為轉介居家治療與精神長照機構。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"112030-N5-3":{"quick":"強制鑑定與住院：有傷害他人或自己之虞者，皆可通知主管機關協助強制鑑定與住院。","detail":{"background":"嚴重精神病人的強制鑑定與住院，正確的是(C)『強制住院雖違反病人自主權，但「有傷害他人或自己之虞」者，皆可通知當地主管機關協助強制鑑定與住院(以維護病人與社會安全，依法定程序)』。其他錯誤:A『不需對病人「解釋強制約束的理由」』錯誤(仍須說明);B『強制鑑定只需「一位」指定專科醫師』錯誤(強制鑑定須「二位以上」指定專科醫師);D『若病人拒絕住院「不能強制」』錯誤(符合要件、經程序，可依法強制住院)。故 C 正確。對有傷害自己或他人之虞者，可依法定程序強制鑑定與住院。","options":{"A":"仍須對病人說明強制/約束的理由，非不需解釋。","B":"強制鑑定須二位以上指定專科醫師，非一位。","C":"正確。有傷害他人或自己之虞者，可通知主管機關協助強制鑑定與住院。","D":"符合要件、經程序可依法強制住院，非不能強制。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"112030-N5-4":{"quick":"護理師爭取病人福利、提供法案訊息＝代言者(advocate)。","detail":{"background":"護理人員「協助與鼓勵病人與家屬爭取應有的福利與權益、在制定精神衛生法案與政策時提供有利於病人與家屬的訊息」——這是「為病人發聲、維護其權益」，扮演『代言者(advocate)』的角色。決策者是做決定的人;轉介者是連結資源;教育者是提供知識。本題核心是「為病人爭取權益、發聲」，故為代言者。故 A 正確。護理師作為代言者，維護病人權益、為弱勢發聲。","options":{"A":"正確。爭取病人福利、為病人權益發聲，是代言者。","B":"決策者是做決定的人。","C":"轉介者是連結資源。","D":"教育者是提供知識。"},"sources":["精神科護理學(新文京/華杏)·護理角色"]}},"112030-N5-7":{"quick":"ECT 的併發症：頭痛①、呼吸暫停③、短暫記憶喪失④(腦出血②非)。","detail":{"background":"電氣痙攣治療(ECT)的併發症主要為:(1)頭痛(治療後常見);(3)呼吸暫停(麻醉與肌肉鬆弛劑的作用，故須監測呼吸、給氧);(4)短暫記憶喪失(治療後常見、多會恢復)。而(2)『腦出血』「不是」ECT 的典型併發症(ECT 不會直接造成腦出血)。故正確為①③④(選 C)。ECT 的常見併發症:頭痛、肌肉痠痛、暫時性記憶障礙、麻醉相關(呼吸抑制/暫停)。","options":{"A":"123：含②(腦出血)，非 ECT 的典型併發症。","B":"124：含②，錯誤。","C":"正確。頭痛①、呼吸暫停③、短暫記憶喪失④。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","ECT"]}},"112030-N5-24":{"quick":"中度焦慮的照護：觀察並辨識病人不同焦慮程度的表現。","detail":{"background":"中度焦慮的照護原則，最適宜的是(A)『「觀察並辨識病人不同焦慮程度的表現(評估焦慮的程度，以提供對應的處置)」』。其他錯誤:B『告訴病人「焦慮是多餘且過分的」』是否定其感受;C『安排病人學習「挑戰新的活動」』錯誤(對中度焦慮者，新挑戰會增加焦慮，宜「熟悉、簡單」的活動);D『安檢後執行「保護性約束」』過度(中度焦慮無須約束，約束用於暴力/安全之虞)。故 A 正確。對焦慮病人，先評估、辨識焦慮程度，再提供對應的支持與處置。","options":{"A":"正確。觀察並辨識病人不同焦慮程度的表現。","B":"「焦慮是多餘且過分」是否定其感受。","C":"挑戰新活動會增加焦慮，宜熟悉簡單的活動。","D":"中度焦慮無須約束，約束用於暴力/安全之虞。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患"]}},"112030-N5-25":{"quick":"強迫性人格障礙症的臨床表現＝缺乏彈性的行為模式。","detail":{"background":"強迫性人格障礙症(OCPD)的臨床表現，最適切的是(A)『「缺乏彈性的行為模式(僵化、固執、追求完美與秩序、缺乏變通)」』。其他錯誤:B『「能夠反思」自己的行為』錯誤(OCPD 病人「自我和諧 ego-syntonic、缺乏病識感」，認為自己的固執是對的，較難反思);C『常伴隨「宗教妄想」』錯誤(OCPD 是人格特質，「無妄想等精神病症狀」);D『「喜歡從事冒險活動」』錯誤(OCPD 傾向謹慎、控制，「不」喜歡冒險)。故 A 正確。OCPD 的核心是僵化、缺乏彈性、追求完美與控制。","options":{"A":"正確。缺乏彈性的行為模式(僵化、固執)。","B":"OCPD 自我和諧、缺乏病識感，較難反思。","C":"OCPD 無妄想等精神病症狀。","D":"OCPD 傾向謹慎、控制，不喜歡冒險。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"112030-N5-26":{"quick":"人格障礙症(DSM-5)「最不適宜」者＝最早可追溯到「成人晚期」才顯現。","detail":{"background":"依 DSM-5，人格障礙症的描述，「最不適宜」者為(B)『最早可追溯到「成人晚期」才顯現』——錯誤，人格障礙的特徵「「最早可追溯到青春期或成年早期」就已穩定存在」，並非「成人晚期才顯現」。其他正確:A 會表現在認知、情感、人際功能或衝動控制(至少兩個領域);C 是持久、無彈性、遍及廣泛的個人及社會狀況;D 會引起社會、職業或其他重要領域功能的減損或痛苦。故本題選最不適宜者為 B。人格障礙是長期、穩定的模式，可追溯到青春期/成年早期。","options":{"A":"表現在認知、情感、人際或衝動控制，正確。","B":"正確(本題選最不適宜者)。可追溯到青春期或成年早期，非成人晚期。","C":"持久、無彈性、遍及廣泛狀況，正確。","D":"會引起功能減損或痛苦，正確。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"112030-N5-29":{"quick":"智能不足：智能不足兒童仍可能出現精神症狀。","detail":{"background":"智能不足的治療原則與預後，正確的是(D)『智能不足兒童「仍可能出現精神症狀(如合併情緒、行為、精神病等問題，須評估與處理)」』。其他錯誤:A『治療目標應設定在「維持現有能力」』錯誤(治療目標應是「「提升」其適應功能、發展潛能、學習技能」，非只維持);B『「藥物為主要治療、用於「增加個案智能」」』錯誤(藥物無法增加智能，主要是教育訓練、行為治療，藥物用於處理合併症);C『「重度」智能不足兒童接受教育後「可具有職業技能」』不正確(重度智能不足者多需「持續協助」，較難具獨立職業技能;「輕度」者才較可能)。故 D 正確。","options":{"A":"治療目標應提升適應功能、發展潛能，非只維持。","B":"藥物無法增加智能，主要靠教育訓練。","C":"重度智能不足者多需持續協助，較難具獨立職業技能。","D":"正確。智能不足兒童仍可能出現精神症狀。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","智能不足"]}},"112030-N5-32":{"quick":"與老年精神病人溝通：一次只談一個問題。","detail":{"background":"與老年精神病人溝通，最適宜的是(C)『「一次只談一個問題(簡單、聚焦，配合其理解與注意力)」』。其他錯誤:A『多運用「身體接觸」來溝通』錯誤(身體接觸須謹慎、尊重，不宜過度);B『溝通要「簡潔快速」』錯誤(應「簡潔但「放慢」速度」，給老人足夠的反應時間，非「快速」);D『「避免直視」老人、減少威脅感』錯誤(適當的「眼神接觸」傳達關注與尊重，而非避免直視)。故 C 正確。與老人溝通宜慢、簡單、一次一個問題、適當的眼神接觸。","options":{"A":"身體接觸須謹慎、尊重，不宜過度。","B":"應簡潔但放慢速度，給足反應時間，非快速。","C":"正確。一次只談一個問題(簡單、聚焦)。","D":"適當的眼神接觸傳達關注，非避免直視。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"112030-N5-35":{"quick":"約束處置注意：口水多者維持側躺①、超過2小時翻身②、注射 Haloperidol 後密切觀察血壓③(不說明原因④、約束後不宜會談⑤錯)。","detail":{"background":"護理師執行身體約束處置應注意:(1)口水多的病人應「維持側躺(防吸入、窒息)」;(2)約束「超過2小時應為病人翻身(防壓瘡、維持循環)」;(3)若約束前注射 Haloperidol，應「密切觀察血壓變化(防姿勢性低血壓等)」。而(4)『病人通常抗拒約束，「不一定要說明約束的原因」』錯誤(「仍須向病人說明約束的原因」);(5)『約束後應讓病人休息，「不宜再與個案會談」』錯誤(約束後/穩定後「應與病人會談、讓其表達、檢討」)。故正確為①②③(選 A)。","options":{"A":"正確。口水多者側躺①、超過2小時翻身②、注射 Haloperidol 後觀察血壓③。","B":"135：含⑤(不宜會談)，錯誤。","C":"234：含④、缺①，錯誤。","D":"245：含④⑤，皆錯。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"112030-N5-37":{"quick":"隔離與約束的醫囑「不包含」＝病人的意願。","detail":{"background":"隔離與約束的醫囑內容，「不包含」(B)『病人的意願』——醫囑(醫療指示)應記載:A 方式(如何約束/隔離)、C 起訖時間(何時開始、結束/評估)、D 理由(為何約束)，以及評估頻率等。而「病人的意願」「不是「醫囑」的記載項目」(雖須向病人說明，但約束依醫囑與病情需要執行，非以病人意願為醫囑內容)。故本題選不包含者為 B(與前述同類題一致)。約束醫囑:方式、理由、起訖時間、評估頻率。","options":{"A":"方式是約束醫囑的內容。","B":"正確(本題選不包含者)。病人的意願不是醫囑的記載項目。","C":"起訖時間是約束醫囑的內容。","D":"理由是約束醫囑的內容。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法","約束規定"]}},"112030-N5-40":{"quick":"鼓勵精神病人重返社區後最可能產生的影響＝家屬照護負荷增加。","detail":{"background":"鼓勵精神病人重返社區後，最可能產生的影響是(D)『「家屬照護負荷增加」(去機構化後，照護責任回到家庭，家屬須承擔照顧、監督服藥、應對症狀等，負荷增加)』。其他選項是「對精神病人的污名化迷思」:A『容易再次發病/再住院』、B『易形成遊民問題』、C『易成為社會危險分子』——這些是「污名化的負面刻板印象」，並非「重返社區的必然/最可能影響」(在適當的社區支持下，多數病人可穩定生活)。故 D 正確。去機構化後，家屬照護負荷增加是須正視與支持的實際問題。","options":{"A":"「容易再次發病/再住院」是污名化迷思，非必然。","B":"「易形成遊民」是污名化迷思。","C":"「易成為社會危險分子」是污名化的負面刻板印象。","D":"正確。家屬照護負荷增加，是重返社區後最可能的影響。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"112110-N5-2":{"quick":"醫師暗示新藥試驗、未清楚告知風險就請病人簽同意書＝違反醫療倫理(未充分告知)。","detail":{"background":"醫師「暗示有新藥臨床試驗、藥效較好」、病人基於信任就簽人體試驗同意書——(C)『醫師行為「違反醫療倫理，因為「並未清楚告知參與新藥之可能風險」(未做到充分知情同意)」』。臨床試驗的知情同意須完整告知：目的、方法、可能的風險與利益、替代方案、可隨時退出等。其他錯誤:A、B 認為「為病人著想/醫療需進步」就不違反倫理是錯的(仍須充分告知);D『臨床醫師「不能」進行人體試驗』錯誤(可進行，但須符合倫理規範與知情同意)。故 C 正確。","options":{"A":"「為病人著想」不能免除充分告知的義務。","B":"「醫療需進步」不能免除知情同意的義務。","C":"正確。違反醫療倫理，因為未清楚告知參與新藥的可能風險。","D":"臨床醫師可進行人體試驗，但須符合倫理與知情同意。"},"sources":["精神科護理學(新文京/華杏)·醫療倫理"]}},"112110-N5-5":{"quick":"抗精神病藥：藥力效果越強(高效價)者，錐體外症候群(EPS)越明顯。","detail":{"background":"抗精神病藥物的正確敘述:(A)『藥力效果越強(「高效價 high-potency」，如 haloperidol)者，「錐體外症候群(EPS)」作用越明顯(強力阻斷 D2 受體)』。其他錯誤:B『高效價者「自主神經(抗膽鹼、姿勢性低血壓)」副作用越明顯』錯誤——那是「「低效價(low-potency)」」藥(如 chlorpromazine)的特徵;C『強度越強、每日口服治療劑量越高』錯誤——高效價藥的「劑量「越低」就有效」;D『作用越強、鎮靜作用越強』錯誤——「鎮靜」作用以「低效價」藥較強。故 A 正確。高效價藥:EPS 高、鎮靜/抗膽鹼低、劑量低;低效價藥相反。","options":{"A":"正確。高效價(藥力強)者，EPS 越明顯。","B":"自主神經副作用以低效價藥較明顯，非高效價。","C":"高效價藥的劑量越低就有效，非越高。","D":"鎮靜作用以低效價藥較強，非高效價。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","抗精神病藥"]}},"112110-N5-23":{"quick":"邊緣型人格將護理師理想化或貶損＝以全好/全壞二分法看待人際關係(分裂 splitting)。","detail":{"background":"邊緣型人格障礙症病人「一下將護理師理想化、一下又貶損護理師」——這是『「分裂(splitting)」防衛機轉:以「全好和全壞」的「二分法」觀點看待人際關係(無法整合一個人同時有好與壞的面向)』。其他選項是別的人格特徵:A『無法感受對懲罰/痛苦的恐懼』、B『冷漠無情、不在乎傷害他人』偏向「反社會型」;C『強烈自大、缺乏同理心』偏向「自戀型」。本題核心是「理想化/貶損的二分」，故為分裂。故 D 正確。對邊緣型人格的分裂，須團隊一致、保持穩定的界限與態度。","options":{"A":"「無法感受懲罰/痛苦的恐懼」偏向反社會型。","B":"「冷漠無情、不在乎傷害他人」偏向反社會型。","C":"「強烈自大、缺乏同理心」偏向自戀型。","D":"正確。以全好/全壞二分法看待人際關係，是分裂(splitting)。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"112110-N5-30":{"quick":"閱讀障礙(Dyslexia)「錯誤」者＝通常因智力偏低導致全面性的學習障礙。","detail":{"background":"閱讀障礙(Dyslexia)的敘述，「錯誤」者為(B)『通常因「智力偏低」、導致「全面性」的學習障礙』——錯誤，閱讀障礙是「「特定型(specific)」學習障礙」，病人「智力「正常」(甚至優異)」，只是在「閱讀(及書寫)」這個「特定領域」有困難，而非「智力偏低、全面性」。其他正確(屬閱讀障礙的表現):A 理解文字有困難;C 書寫表達錯誤;D 閱讀有錯誤。故本題選錯誤者為 B。閱讀障礙是智力正常下的特定學習障礙。","options":{"A":"理解文字有困難，是閱讀障礙的表現。","B":"正確(本題選錯誤者)。閱讀障礙者智力正常，是特定(非全面性)學習障礙。","C":"書寫表達錯誤，是閱讀障礙的表現。","D":"閱讀有錯誤，是閱讀障礙的表現。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","學習障礙"]}},"112110-N5-31":{"quick":"幼稚園、眨眼、嘴角抽動、搖頭、頸部晃動(多種動作型抽動)＝妥瑞氏症(Tourette’s disorder)。","detail":{"background":"林小弟『眼睛眨個不停、嘴角不自主抽動、搖頭、頸部晃動(多種「不自主、重複的動作型抽動 tics)」』——符合『妥瑞氏症(Tourette disorder)』:出現「多種「動作型」抽動」與「至少一種「聲語型」抽動」、持續超過一年。智能不足以認知低下為主;雙相以情緒起伏為主;ADHD 以注意力不足/過動為主(雖常與妥瑞共病)。本題以「多種不自主抽動」為核心，故為妥瑞氏症。故 D 正確。","options":{"A":"智能不足以認知能力低下為主。","B":"雙相情緒障礙以情緒起伏為主。","C":"ADHD 以注意力不足/過動為主(雖常與妥瑞共病)。","D":"正確。多種不自主、重複的動作型抽動，是妥瑞氏症。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","妥瑞氏症"]}},"112110-N5-32":{"quick":"譫妄與失智：失智症初期會有立即性及短期記憶力障礙。","detail":{"background":"關於譫妄及失智症，最適切的是(D)『失智症「初期」會有「立即性及短期(近期)記憶力障礙」(近期記憶最先受損)』。其他錯誤:A 譫妄是「「急性」發作」，而非漸進性;B『譫妄通常「腦回萎縮、腦室擴大」』錯誤——腦回萎縮、腦室擴大是「「失智(如阿茲海默)」」的影像表現，譫妄的腦結構多無此變化;C『「失智症」病人的意識「經常日夜波動變化大」』錯誤——「意識日夜波動大」是「「譫妄」」的特徵(失智的意識相對清醒、穩定)。故 D 正確。","options":{"A":"譫妄是急性發作，非漸進性。","B":"腦回萎縮、腦室擴大是失智的影像表現，非譫妄。","C":"意識日夜波動大是譫妄的特徵，非失智。","D":"正確。失智症初期會有立即性及短期記憶力障礙。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"112110-N5-37":{"quick":"急性病房暴力：口頭攻擊常是暴力行為的先兆。","detail":{"background":"急性精神科病房暴力的正確敘述:(A)『「口頭攻擊(謾罵、威脅)」常是「暴力行為的先兆(前驅徵兆)」(在此「擴張期」即早介入可預防肢體暴力)』。其他錯誤:B『「女性」工作人員最常遭暴力攻擊』不正確(暴力攻擊與工作人員的接觸頻率、處置技巧等有關，非單純以性別論);C『「藥物處置」是處理暴力「最有效」的方法』錯誤(暴力處置以「預防、言語安撫、設限、環境管控」為先，藥物是輔助);D『約束病人後至少「每一小時」評估一次』錯誤(約束後至少「每15分鐘」評估)。故 A 正確。口頭攻擊是暴力的先兆，應及早介入。","options":{"A":"正確。口頭攻擊常是暴力行為的先兆。","B":"暴力攻擊與接觸頻率、處置技巧有關，非單純以性別論。","C":"暴力處置以預防、言語安撫、設限為先，藥物是輔助。","D":"約束後至少每15分鐘評估，非每一小時。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"112110-N5-39":{"quick":"clozapine 致血糖高、體重上升、但症狀改善：不宜驟然停藥。","detail":{"background":"王先生服 clozapine、第8週體重上升10%、第12週血糖130(代謝副作用)、但「精神症狀及認知明顯改善、已回職場」。最適切的是(D)『病人的精神症狀及認知功能已改善，雖出現血糖問題，「不宜驟然停藥」(應在「持續治療」下，「處理代謝副作用(營養、運動、監測、必要時調整)」)』。其他錯誤:A『血糖高「不需追蹤處理」』錯誤(須監測處理);B『血糖高與「藥物無關」』錯誤(clozapine 確會致高血糖);C『clozapine 屬「第一代」、致代謝症候群可能性低』錯誤——clozapine 是「「第二代(非典型)」」，代謝症候群風險「高」。故 D 正確。對有效但有代謝副作用的藥，宜續用並積極處理副作用。","options":{"A":"血糖高須監測處理，非不需追蹤。","B":"血糖高與藥物有關(clozapine 致高血糖)。","C":"clozapine 是第二代，代謝症候群風險高，非低。","D":"正確。症狀已改善，雖有血糖問題，不宜驟然停藥。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","Clozapine"]}},"112110-N5-40":{"quick":"服 clozapine 的首要健康風險控制＝營養、運動諮詢與追蹤代謝症候群相關數據。","detail":{"background":"王先生服 clozapine、出現代謝副作用，首要的健康風險控制預防措施是(A)『「營養、運動諮詢」與「追蹤代謝症候群相關數據(腰圍、血壓、空腹血糖、血脂)」(以生活型態介入+定期監測來預防/控制代謝症候群)』。其他:B『蛋白質控制飲食』是針對腎病/痛風;C『低鈉飲食控制血壓』只處理單一面向;D『危機管理』是處理急性危機(非此情境)。故 A 正確。對抗精神病藥的代謝副作用，以營養運動諮詢與定期監測代謝指標為首要。","options":{"A":"正確。營養、運動諮詢與追蹤代謝症候群相關數據。","B":"蛋白質控制飲食是針對腎病/痛風。","C":"低鈉飲食只處理血壓單一面向。","D":"危機管理是處理急性危機，非此情境。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","代謝症候群"]}},"112180-N5-8":{"quick":"抗精神病藥副作用處理：使用 biperiden(Akineton，抗膽鹼藥)緩解錐體外症候群。","detail":{"background":"抗精神病藥物副作用處理，相對正確的是(D)『使用 biperiden(Akineton，「抗膽鹼藥」)緩解錐體外症候群(用於急性肌張力不全、類巴金森，亦用於靜坐不能)』。其他錯誤:A propranolol(乙型阻斷劑)是用於「「靜坐不能(akathisia)」」，而非緩解「類巴金森」(類巴金森用抗膽鹼藥);B 急性肌張力不全應以「「抗膽鹼藥(如 biperiden)」」緩解，而非抗痙攣藥;C「遲發性運動不能(TD)」「不可用抗膽鹼藥(會「加重」TD)」，應減藥/換藥。故 D 正確(以「biperiden 緩解 EPS」為相對正確的配對)。","options":{"A":"propranolol 用於靜坐不能，類巴金森用抗膽鹼藥。","B":"急性肌張力不全應以抗膽鹼藥緩解，非抗痙攣藥。","C":"遲發性運動不能不可用抗膽鹼藥(會加重)，應減藥/換藥。","D":"正確。biperiden(抗膽鹼藥)用於緩解錐體外症候群。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","EPS"]}},"112180-N5-10":{"quick":"認知障礙症：常使用虛談(confabulation)掩飾記憶障礙。","detail":{"background":"認知障礙症(失智)病人特性的正確敘述:(B)『常使用「虛談(confabulation)」來「掩飾記憶障礙(以虛構的內容填補記憶空缺，無欺騙意圖)」』。其他錯誤:A『失智「通常出現「遠期」記憶的問題」』錯誤——失智「「近期」記憶最先受損」，遠期保留較久;C『「柯氏性格量表」能評估記憶受損』錯誤(柯氏性格量表評估「人格特質」，評估記憶/認知應用 MMSE 等);D『「立即記憶」障礙是指無法回憶「近1星期」的事』錯誤——「立即記憶(immediate memory)」是「即時(數秒至數分)」的記憶，「近1星期」屬「近期記憶」。故 B 正確。","options":{"A":"失智近期記憶最先受損，非遠期。","B":"正確。常使用虛談(confabulation)掩飾記憶障礙。","C":"柯氏性格量表評估人格，非記憶。","D":"立即記憶是即時(數秒至數分)的記憶，非近1星期。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"112180-N5-11":{"quick":"clozapine(Clozaril)：須評估病人「白血球下降」的症狀。","detail":{"background":"服用 clozapine 的正確敘述:(D)『須「評估病人白血球下降的症狀(如發燒、喉嚨痛、感染徵象)」，並定期監測白血球(防顆粒性白血球缺乏)』。其他錯誤:A clozapine 最常見的「嚴重致命副作用」是「「顆粒性白血球缺乏症」」，而非史蒂文強森症候群(SJS);B 用藥後病人血糖會「「上升(高血糖)」」，而非下降;C 停藥後「「不可立即停止抽血監測血球數」」，須持續監測一段時間(白血球缺乏的風險可能延續)。故 D 正確。clozapine 的核心監測是定期抽血查白血球、留意感染徵象。","options":{"A":"clozapine 最嚴重的副作用是顆粒性白血球缺乏，非 SJS。","B":"用藥後血糖會上升，非下降。","C":"停藥後須持續監測一段時間，非立即停止抽血。","D":"正確。須評估病人白血球下降的症狀。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","Clozapine"]}},"112180-N5-12":{"quick":"carbamazepine：發現病人黏膜潰爛，需確認是否為 Stevens-Johnson 症候群(SJS)。","detail":{"background":"情緒穩定劑 carbamazepine 的正確敘述:(C)『發現病人「黏膜潰爛(皮膚黏膜病變)」，需確認是否為「Stevens-Johnson 症候群(SJS)」(carbamazepine 是引發 SJS/TEN 的經典藥物，須及早辨識)』。其他錯誤:A 常見副作用「「包含」皮膚疹、複視、頭暈、共濟失調」，並非「皮膚疹或複視很少出現」;B 劑量數值不符(carbamazepine 的有效成人劑量遠高於60~120mg);D carbamazepine 的監測重點是「肝功能、血液(白血球、血小板)、血中濃度」，而非「腎毒性、每週抽血監測腎功能」。故 C 正確。使用 carbamazepine 須警覺 SJS 等嚴重皮膚反應。","options":{"A":"皮膚疹、複視是常見副作用，非很少出現。","B":"劑量數值不符(有效劑量遠高於60~120mg)。","C":"正確。發現黏膜潰爛，需確認是否為 SJS。","D":"監測重點是肝功能、血液、血中濃度，非腎功能。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","情緒穩定劑"]}},"112180-N5-13":{"quick":"高劑量 haloperidol、生命徵象不穩、吞嚥困難、冒汗(NMS)：建議立即停藥，加上支持療法(補充體液)。","detail":{"background":"28歲男性、高劑量 haloperidol(每天20~30mg)、出現「生命徵象極不穩定、吞嚥困難、全身冒汗」——這是「抗精神病藥惡性症候群(NMS)」。最適切的是(D)『建議「立即停藥」，並加上「支持療法(如補充體液、降溫、維持生理穩定)」』。其他錯誤:A『體溫「降低」』錯誤(NMS 是「高燒」);B『CPK(肌酸酐酶)濃度會「驟降」』錯誤(NMS 因肌肉壞死，CPK「「上升」」);C『生命徵象不穩定但「意識能維持清楚」』錯誤(NMS 有「意識改變」)。故 D 正確。NMS 是醫療急症，須立即停藥、支持治療。","options":{"A":"NMS 是高燒，非體溫降低。","B":"NMS 的 CPK 會上升(肌肉壞死)，非驟降。","C":"NMS 有意識改變，非意識清楚。","D":"正確。建議立即停藥，並加上支持療法(補充體液)。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","NMS"]}},"112180-N5-21":{"quick":"術後譫妄(混亂、定向障礙、看到蟑螂)：提供病人安全、安靜、舒適的環境。","detail":{"background":"邵女士67歲、術後第二天出現混亂、定向障礙、視幻覺(看到蟑螂)——譫妄。最適宜的護理是(D)『提供病人「安全、安靜、舒適的環境(減少過度刺激、確保安全、利於康復)」』。其他錯誤:A『儘可能採「約束隔離」』錯誤(約束反而會加重譫妄的混亂、躁動，是最後手段);B『參與「定向感訓練、增進認知」』錯誤(急性混亂時難以進行認知訓練);C『「增加感官刺激」活動』錯誤(對譫妄者應「減少」過度刺激)。故 D 正確。譫妄護理:安全、安靜、減少過度刺激、現實導向、找病因。","options":{"A":"約束會加重譫妄的混亂躁動，是最後手段。","B":"急性混亂時難以進行定向感/認知訓練。","C":"對譫妄者應減少過度刺激，非增加。","D":"正確。提供病人安全、安靜、舒適的環境。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"112180-N5-49":{"quick":"輕型認知障礙者轉介社區據點延緩失能＝三段預防的限制殘障。","detail":{"background":"張先生「已被診斷為輕型認知障礙症(已患病)」，轉介至社區「巷弄(C級)據點」進行活動以「延緩失能」——這是對「「已患病者」進行「復健、延緩退化、減少失能」」，屬『三段(級)預防的「限制殘障(disability limitation)」/復健』。初段預防是預防發生(健康促進);次段是早期篩檢/早期治療。本題對「已診斷者」延緩失能，屬三段預防。故 D 正確。對已患病者延緩失能、維持功能，屬三段預防(限制殘障)。","options":{"A":"初段預防是對健康者預防發生(健康促進)。","B":"次段預防的早期篩檢是對未診斷者篩檢。","C":"次段預防的早期治療是早期發現後的治療。","D":"正確。對已患病者延緩失能，是三段預防的限制殘障。"},"sources":["精神科護理學(新文京/華杏)·三段五級預防"]}},"113030-N5-7":{"quick":"日落症候群(sundown syndrome)較常見於＝失智症。","detail":{"background":"日落症候群(sundown syndrome，傍晚/夜間混亂、躁動加重)較常見於(A)『失智症』——尤其阿茲海默症等失智病人，常在傍晚後出現混亂、激動、行為問題的惡化。恐慌症、雙相情緒障礙不以日落症候群為特徵;譫妄雖也可能有夜間加重，但「日落症候群」一詞最常用於「失智症」。故 A 正確。日落症候群是失智症常見的精神行為症狀(傍晚後加重)。","options":{"A":"正確。日落症候群較常見於失智症。","B":"恐慌症不以日落症候群為特徵。","C":"雙相情緒障礙不以日落症候群為特徵。","D":"譫妄雖可能夜間加重，但日落症候群一詞最常用於失智症。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"113030-N5-13":{"quick":"佛洛伊德學說：肛門期受過度管教約束→日後行為傾向一板一眼、缺乏彈性。","detail":{"background":"依佛洛伊德學說，人格在「肛門期(anal stage，約1.5~3歲，與如廁訓練、控制有關)」若受到「過度的管教約束」，會影響心性發展，日後形成(C)『「肛門性格」:行為傾向「一板一眼、缺乏彈性、固執、過度整潔/吝嗇」(即強迫型人格特質)』。其他選項:A『對異性父母產生性吸引』是「性器期(伊底帕斯情結)」;B『追求愉悅、避免痛苦』是「本我」的享樂原則(口腔期傾向);D『大小事都要他人承擔責任』偏向依賴型人格(口腔期固著)。故 C 正確。肛門期固著與「強迫、固執、缺乏彈性」的性格有關。","options":{"A":"對異性父母產生性吸引是性器期(伊底帕斯情結)。","B":"追求愉悅、避免痛苦是享樂原則(口腔期傾向)。","C":"正確。肛門期過度管教→一板一眼、缺乏彈性的性格。","D":"大小事要他人承擔偏向依賴型(口腔期固著)。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR","心性發展"]}},"113030-N5-16":{"quick":"以玩玩具轉移注意力、練習不繼續洗手＝暴露與反應阻止法(ERP)。","detail":{"background":"李同學強迫性洗手(手破皮仍洗)，護理師「藉由玩喜歡的玩具「轉移注意力」、並「練習不繼續洗手(阻止強迫反應)」」——這是『「暴露與反應阻止法(exposure and response prevention, ERP)」』:讓病人面對引發焦慮的情境，同時「阻止其執行強迫行為(不洗手)」，藉此逐步降低焦慮與強迫行為(是 OCD 行為治療的核心)。沙箱療法、非指引性遊戲治療是遊戲治療;生理回饋是以儀器回饋調節生理。本題核心是「阻止強迫反應(不洗手)」，故為 ERP。故 C 正確。","options":{"A":"沙箱療法是遊戲治療的一種。","B":"非指引性遊戲治療讓兒童自由遊戲。","C":"正確。阻止強迫反應(不繼續洗手)，是暴露與反應阻止法(ERP)。","D":"生理回饋是以儀器回饋調節生理。"},"sources":["精神科護理學(新文京/華杏)·行為治療"]}},"113030-N5-20":{"quick":"「不屬於」神經發展障礙症者＝遺尿症。","detail":{"background":"神經發展障礙症(neurodevelopmental disorders)包括:A 智能不足(智能障礙)、B 自閉症類群障礙症、C 注意力不足/過動症(ADHD)，以及溝通障礙、特定學習障礙、動作障礙(如妥瑞氏症)。而(D)『遺尿症(enuresis)』「不屬於」神經發展障礙症——遺尿症在 DSM-5 中歸類於「「排泄障礙症(elimination disorders)」」，而非神經發展障礙症。故本題選不屬於者為 D。神經發展障礙是早年起病、影響發展的疾病群;遺尿症屬排泄障礙。","options":{"A":"智能不足屬神經發展障礙症。","B":"自閉症類群障礙症屬神經發展障礙症。","C":"ADHD 屬神經發展障礙症。","D":"正確(本題選不屬於者)。遺尿症屬排泄障礙症，非神經發展障礙症。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR"]}},"113030-N5-21":{"quick":"協助病人發展經濟及就業，護理師須具有＝資源連結的實務能力。","detail":{"background":"孫先生出院後規則服藥、病情穩定，但面臨「經濟困境及就業需求」。護理師為協助其發展經濟及就業，必須具有(D)『「資源連結(resource linkage)」的實務能力(連結就業服務、職業訓練、社會福利、補助等外部資源)』。其他:A 建構自我是協助自我概念;B 疾病管理是協助管理疾病/服藥;C 精神衛生需求評估是評估其精神健康需求。本題核心是「協助發展經濟及就業(連結外部資源)」，故為資源連結。故 D 正確。協助病人就業、經濟，須具備連結社區資源的能力。","options":{"A":"建構自我是協助自我概念，非連結資源。","B":"疾病管理是協助管理疾病/服藥。","C":"精神衛生需求評估是評估精神健康需求。","D":"正確。協助發展經濟及就業，須具有資源連結的實務能力。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"113100-N5-8":{"quick":"病人以「威脅撞牆」操弄達成需求：提供病人界限清楚的環境、設限。","detail":{"background":"趙女士「未滿足其需求時就威脅要撞牆(以自傷威脅操弄)」。最適宜的護理是(B)『「提供病人界限清楚的環境、「設限」(以明確、一致的界限與後果處理操縱行為，同時確保其安全)」』。其他錯誤:A『配合病人要求以減少傷害』是「屈服於操縱、強化此行為」;C『忽視撞牆行為』錯誤(自傷威脅不可忽視，須評估安全);D『限制病人行動』過度(設限不等於限制行動，且非首選)。故 B 正確。對以自傷威脅操弄者，以清楚的界限設限、團隊一致、確保安全。","options":{"A":"配合要求是屈服於操縱、強化此行為。","B":"正確。提供界限清楚的環境、設限。","C":"自傷威脅不可忽視，須評估安全。","D":"限制行動過度，非首選。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"113100-N5-20":{"quick":"7歲自閉症、暴力攻擊：可運用消弱法等技巧，改善不當行為。","detail":{"background":"林小弟7歲自閉症、出現暴力攻擊而入院。正確的是(B)『可運用「消弱(消除 extinction)法」等「行為治療技巧」，改善其不當行為(透過「不再增強」不當行為，使其減少)』。其他錯誤:A『抗精神病藥(Haloperidol)「臨床上不建議使用」』錯誤(自閉症的嚴重躁動/攻擊「可」在評估下使用藥物，如 risperidone、aripiprazole);C『為避免傷人「給予長時間隔離」』錯誤(長時間隔離不人道、且非處理之道);D『藥物用1個月未改善「可再增加劑量持續用1個月」』敘述不當(應評估、調整，非固定如此)。故 B 正確。對自閉症的不當行為，以行為治療(消弱、正增強等)為主。","options":{"A":"自閉症的嚴重躁動/攻擊可在評估下使用藥物，非不建議。","B":"正確。可運用消弱法等行為治療技巧，改善不當行為。","C":"長時間隔離不人道，非處理之道。","D":"應評估、調整，非固定「未改善就增加劑量再用1個月」。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","自閉症"]}},"113100-N5-21":{"quick":"老年憂鬱症治療「最不適切」者＝目前第一線藥物為三環抗憂鬱劑。","detail":{"background":"老年憂鬱症治療的敘述，「最不適切」者為(A)『目前「第一線」藥物為「三環抗憂鬱劑(TCA)」』——錯誤，老年憂鬱症的「第一線」藥物是「「SSRI(選擇性血清素回收抑制劑)」」(副作用較少、較安全);TCA 因「抗膽鹼、心血管、姿勢性低血壓」等副作用，「不適合」作為老人的第一線。其他正確:B 從最小的有效劑量開始調整(start low, go slow);C 電痙攣治療(ECT)可治療嚴重的老年憂鬱症;D 要注意抗憂鬱劑停藥後的焦慮、失眠等(停藥症狀)。故本題選最不適切者為 A。","options":{"A":"正確(本題選最不適切者)。老年憂鬱第一線是 SSRI，非三環抗憂鬱劑。","B":"從最小有效劑量開始調整，正確。","C":"ECT 可治療嚴重的老年憂鬱症，正確。","D":"要注意停藥後的焦慮、失眠等，正確。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","老年憂鬱"]}},"113100-N5-24":{"quick":"暴力行為導因：幼年期常受父母忽視或虐待，可能導致孩子暴力傾向。","detail":{"background":"暴力行為導因的正確敘述:(D)『幼年期常受父母「忽視或虐待」，可能導致孩子日後的「暴力傾向(早期受暴/受虐的學習與創傷影響)」』。其他錯誤:A『血清素「增加」、多巴胺減少會增強暴力』錯誤——暴力/衝動與血清素「「減少(過低)」」有關，非增加;B『腦器質性病變「較不容易」發生暴力』錯誤(腦器質性病變「會「增加」暴力風險);C『電視經常報導暴力「不會」對個人產生影響』錯誤(暴力的媒體內容會透過「觀察學習/模仿」影響個人)。故 D 正確。暴力是生物(血清素低)、心理(早期受虐)、社會(暴力學習)多因素的結果。","options":{"A":"暴力與血清素減少有關，非增加。","B":"腦器質性病變會增加暴力風險，非較不容易。","C":"媒體暴力會透過觀察學習影響個人，非不會。","D":"正確。幼年期常受忽視或虐待，可能導致暴力傾向。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"113180-N5-2":{"quick":"約束時告知每15分鐘探視並確實按時探視＝守信(信實)倫理原則。","detail":{"background":"護理人員告知病人「每15分鐘會來探視」，並「確實按時探視」——這是「「信守承諾、言行一致」」，符合『守信(信實 fidelity)』倫理原則。知情同意是充分告知後自主決定;行善是促進福祉;自主是尊重病人的自主決定。本題核心是「信守對病人的承諾」，故為守信。故 C 正確。守信(fidelity)是信守承諾、忠於對病人的責任。","options":{"A":"知情同意是充分告知後自主決定。","B":"行善是促進病人的福祉。","C":"正確。信守「每15分鐘探視」的承諾，是守信(信實)原則。","D":"自主是尊重病人的自主決定。"},"sources":["精神科護理學(新文京/華杏)·醫療倫理"]}},"113180-N5-5":{"quick":"重複別人問句的最後幾個字(幾歲?什麼工作?)＝回音性言語(echolalia)。","detail":{"background":"護理師問王先生問題，他都「重複問句的最後幾個字(問「幾歲?」答「幾歲?」;問「做什麼工作?」答「什麼工作?」)」——這是『回音性言語(echolalia):不自主地「重複別人說的話」』(常見於妥瑞氏症、自閉症、思覺失調等)。音韻連結是以諧音串聯;言語貧乏是話很少、內容空洞;言語持續(perseveration)是不斷重複「自己」說過的同一句話/動作。本題是「重複「別人」的話」，故為回音性言語。故 B 正確。","options":{"A":"音韻連結是以相似讀音串聯。","B":"正確。重複別人說的話，是回音性言語(echolalia)。","C":"言語貧乏是話少、內容空洞。","D":"言語持續是不斷重複自己說過的話/動作。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學"]}},"113180-N5-15":{"quick":"畏避型人格障礙症：害怕被批評或被拒絕，避免涉及人際接觸的工作場合。","detail":{"background":"畏避型(畏縮型)人格障礙症(avoidant personality disorder)的臨床特徵是(A)『「害怕被批評或被拒絕」，因而「避免涉及人際接觸的工作/活動、社交退縮(渴望關係卻因怕被否定而迴避)」』。其他選項是別的人格:B『害怕失去支持、努力討好順從』是「依賴型」;C『利用外觀吸引注意』是「做作型」;D『需要過度讚美、認為自己有特權』是「自戀型」。故 A 正確。畏避型的核心是「因怕被批評/拒絕而社交退縮」。","options":{"A":"正確。害怕被批評或拒絕、避免人際接觸，是畏避型人格。","B":"害怕失去支持、討好順從是依賴型。","C":"利用外觀吸引注意是做作型。","D":"需要過度讚美、認為有特權是自戀型。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"113180-N5-18":{"quick":"自閉症類群障礙症：可能會出現刻板或重複的動作。","detail":{"background":"自閉症類群障礙症(ASD)的正確描述:(C)『可能會出現「刻板或重複的動作(如拍手、搖晃、轉圈，及侷限重複的興趣)」(這是 ASD 兩大核心之一)』。其他錯誤:A『會「為了獲得情緒喜悅而與同伴交往」』錯誤(ASD「社交情感互動有缺損」，不主動為情感而交往);B『對一成不變的生活常規「顯得不耐煩」』錯誤(ASD「「堅持同一性、抗拒改變」」，對常規改變反而焦慮);D『語言溝通方面「通常沒有問題」』錯誤(ASD「常有語言溝通的缺損\")。故 C 正確。ASD 核心:社交溝通缺損+侷限重複的行為(刻板動作、堅持同一性)。","options":{"A":"ASD 社交情感互動有缺損，不主動為情感而交往。","B":"ASD 堅持同一性、抗拒改變，對常規改變焦慮，非不耐煩。","C":"正確。可能會出現刻板或重複的動作。","D":"ASD 常有語言溝通缺損，非通常沒問題。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","自閉症"]}},"113180-N5-20":{"quick":"6歲、不自主眨眼、裝鬼臉、聳肩、發出「哼哼」聲(動作+聲語型抽動)＝妥瑞氏症。","detail":{"background":"洪小弟6歲、一年多來『不自主的眨眼睛、裝鬼臉、聳肩膀(多種「動作型」抽動)、發出「哼哼哼」的聲音(「聲語型」抽動)』——同時有「多種動作型抽動」與「聲語型抽動」、持續超過一年，符合『妥瑞氏症(Tourette disorder)』。ADHD 以注意力不足/過動為主;行為規範障礙以違規攻擊為主;智能不足以認知低下為主。本題有「動作型+聲語型抽動」，故為妥瑞氏症。故 D 正確。妥瑞氏症=多種動作型抽動+至少一種聲語型抽動，持續>1年。","options":{"A":"ADHD 以注意力不足/過動為主，非抽動。","B":"行為規範障礙以違規攻擊為主。","C":"智能不足以認知能力低下為主。","D":"正確。動作型+聲語型抽動持續一年多，是妥瑞氏症。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","妥瑞氏症"]}},"113180-N5-21":{"quick":"阿茲海默症出院、家屬焦慮不知如何照顧：傾聽家屬的感受，介紹社會照顧資源。","detail":{"background":"陳女士阿茲海默症出院、家屬焦慮、不知如何照顧、頻問他人意見。最適切的護理是(C)『「傾聽家屬的感受(接納其焦慮)」，並「介紹社會照顧資源(如長照、日照、喘息服務、家屬支持團體)」(提供情緒支持+實質的資源連結)』。其他錯誤:A『強調「自我照顧能力足夠、不必焦慮」』是否定家屬的擔憂、且不實(失智者需照顧);B『避免太多家屬參與』錯誤(家庭支持有助);D『「不需聽取他人意見」』是否定、未提供支持。故 C 正確。對焦慮的照顧者，先傾聽支持、再連結資源。","options":{"A":"「自我照顧能力足夠、不必焦慮」是否定家屬擔憂、且不實。","B":"避免家屬參與錯誤，家庭支持有助。","C":"正確。傾聽家屬的感受，介紹社會照顧資源。","D":"「不需聽取他人意見」是否定、未提供支持。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"113180-N5-23":{"quick":"精神護理之家的失智照護：維持作息常規化①、維持最大生活功能②、安排與同輩團體活動③(經常改變佈置④、每天不同人員⑤錯)。","detail":{"background":"精神護理之家的失智住民照護原則:(1)維持「病房生活作息的常規化(規律、一致、可預期)」;(2)儘可能「維持住民的最大生活功能」;(3)安排其與同輩進行「團體活動(社交、刺激、參與)」。而(4)『「經常改變病房佈置」以強化定向感訓練』錯誤——失智者宜「「維持熟悉、一致」的環境」，「經常改變佈置」反而會「降低定向、增加混亂」;(5)『「每天由不同人員照顧」以強化記憶』錯誤——應「「安排固定照顧者」」以增加熟悉與安全感。故正確為①②③(選 A)。","options":{"A":"正確。維持作息常規化①、維持最大生活功能②、安排同輩團體活動③。","B":"145：含④⑤，皆錯。","C":"234：含④、缺①，錯誤。","D":"345：含④⑤，皆錯。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"114030-N5-4":{"quick":"抗精神病藥：clozapine 與 fluvoxamine 產生交互作用，會誘發非預期的癲癇痙攣。","detail":{"background":"抗精神病藥物的正確敘述:(B)『clozapine 和 fluvoxamine(SSRI)產生交互作用，「會誘發非預期的癲癇痙攣」(fluvoxamine 升高 clozapine 濃度、clozapine 降低癲癇閾值)』。其他錯誤:A『躁症急性發作期、已用情緒穩定劑，「則不建議併用」抗精神病藥』錯誤——躁症急性期「常「併用」抗精神病藥(控制激躁、精神病性症狀)」;C『長效針劑 risperidone(Consta)本質「水性」、多採「淺層」肌注』錯誤——長效針劑應採「「深層」肌肉注射(Z 字法)」;D『鋰鹽為治療「譫妄」的首選』錯誤(鋰鹽是治療躁症/雙相，非譫妄)。故 B 正確。","options":{"A":"躁症急性期常併用抗精神病藥，非不建議。","B":"正確。clozapine 與 fluvoxamine 交互作用會誘發癲癇痙攣。","C":"長效針劑應深層肌注(Z字法)，非淺層。","D":"鋰鹽治療躁症/雙相，非譫妄首選。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR"]}},"114030-N5-9":{"quick":"思覺失調、丟東西、要攻擊哥哥、剛入院：最優先＝確認環境與物品安全、進行暴力評估與預防。","detail":{"background":"胡先生思覺失調、丟東西、要攻擊哥哥、剛入急性病房。最優先的護理處置是(A)『「確認胡先生身邊環境與物品的安全性，進行暴力行為的評估與預防(評估暴力危險性、移除危險物品、確保安全)」』。其他錯誤:B『直接進保護室「預防性約束」』錯誤(約束須有適應症、是最後手段，不可預防性使用);C『警告「再攻擊就無法出院」』是威脅;D『先「單獨」與病人會談』錯誤(對有暴力之虞者，不宜單獨會談、應確保安全與人力)。故 A 正確。對有暴力之虞的新入院病人，先評估暴力危險性、確保環境安全。","options":{"A":"正確。確認環境與物品安全、進行暴力評估與預防。","B":"約束是最後手段，不可預防性使用。","C":"「再攻擊就無法出院」是威脅。","D":"對有暴力之虞者不宜單獨會談，應確保安全與人力。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"114030-N5-14":{"quick":"對自戀行為的應對：了解其自誇行為並持續包容，但避免過度讚美。","detail":{"background":"林先生自戀(自覺優越、看不起醫護、認為自己最重要、有特權)。針對自戀行為的應對，最適切的是(D)『「了解病人的自誇行為並持續提供包容(接納、不對立)」，但「避免過度讚美(以免強化其誇大)」』。其他錯誤:A『持續讚美、滿足其自誇需求』會「強化其誇大、不利治療」;B『利用幽默、開玩笑』對自戀、敏感的病人可能被視為被貶低、不尊重;C『接受病人對醫護的貶低』錯誤(不應放任其貶低、應維持專業界限)。故 D 正確。對自戀行為，以理解、包容、維持界限、不過度讚美來應對。","options":{"A":"持續讚美會強化其誇大、不利治療。","B":"開玩笑對自戀敏感者可能被視為被貶低。","C":"不應接受/放任其對醫護的貶低，應維持界限。","D":"正確。了解其自誇行為並包容，但避免過度讚美。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"114030-N5-19":{"quick":"上課分心、坐不住、喜歡往外跑、不受控＝注意力不足/過動症(ADHD)。","detail":{"background":"陳小弟『上課容易分心、坐不住、喜歡往外跑、不受控制』——符合『注意力不足/過動症(ADHD)』的核心(注意力不足+過動/衝動、影響學校功能)。智能不足以認知低下為主;雙相以情緒起伏為主;妥瑞氏症以不自主抽動為主。本題以「分心+過動(坐不住、往外跑)」為核心，故為 ADHD。故 D 正確。","options":{"A":"智能不足以認知能力低下為主。","B":"雙相情緒障礙以情緒起伏為主。","C":"妥瑞氏症以不自主抽動為主。","D":"正確。分心、坐不住、過動，是 ADHD。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD"]}},"114030-N5-25":{"quick":"解除肢體約束「最不適宜」者＝避免提及約束之事，以免激怒病人。","detail":{"background":"解除肢體約束時，「最不適宜」者為(A)『「避免提及約束之事」，以免激怒病人』——錯誤，解除約束時「應「與病人討論約束的經歷、了解其感受與需要(讓病人表達、檢討、修復關係)」」，而非迴避不談(迴避無助於關係與學習)。其他適宜:B 瞭解病人在約束中的感受及需要;C 與其他工作人員「共同(足夠人力)」解除約束;D 觀察約束部位的膚色狀況(評估循環、皮膚)。故本題選最不適宜者為 A。解除約束後應與病人會談、了解感受。","options":{"A":"正確(本題選最不適宜者)。應與病人討論約束經歷、了解感受，而非迴避不談。","B":"瞭解病人在約束中的感受及需要，適宜。","C":"與其他工作人員共同解除約束，適宜。","D":"觀察約束部位的膚色狀況，適宜。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"114100-N5-1":{"quick":"嚴重病人：與事實脫節之精神狀態①、不能處理自己事務②、需專科醫師診斷認定④(被認定即「必須」強制住院③錯)。","detail":{"background":"依精神衛生法，「嚴重病人」的敘述:(1)病人呈現出「與事實脫節之精神狀態(如妄想、幻覺、語言或行為紊亂)」;(2)致「不能處理自己事務」;(4)須經「專科醫師診斷認定」。而(3)『若被認定為嚴重病人「就必須強制住院」』錯誤——「被認定為嚴重病人「不等於必須強制住院」」，強制住院須另符合「「有傷害自己或他人之虞、且拒絕住院」」等要件並經程序。故正確為①②④(選 C)。嚴重病人的定義不等同強制住院的要件。","options":{"A":"123：含③(必須強制住院)，錯誤。","B":"234：含③、缺①，錯誤。","C":"正確。與事實脫節①、不能處理自己事務②、需專科醫師診斷認定④。","D":"134：含③，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神醫療法規","精神衛生法"]}},"114100-N5-5":{"quick":"自閉症類群障礙症「錯誤」者＝對主要照顧者有強烈的依戀行為。","detail":{"background":"自閉症類群障礙症(ASD)的敘述，「錯誤」者為(C)『對主要照顧者有「強烈的依戀行為」』——錯誤，ASD 病人「「社交情感互動有缺損」」，對照顧者的「「依戀薄弱、缺乏目光接觸與情感連結」」(不會像一般幼兒那樣對照顧者有強烈依戀)。其他正確:A 男性發生率高於女性;B 通常在3歲前發病(早年起病);D 與同儕缺乏社交互動。故本題選錯誤者為 C。ASD 的核心是社交情感缺損，對照顧者的依戀不像一般幼兒。","options":{"A":"男性發生率高於女性，正確。","B":"通常在3歲前發病，正確。","C":"正確(本題選錯誤者)。ASD 社交情感缺損，對照顧者依戀薄弱，非強烈依戀。","D":"與同儕缺乏社交互動，正確。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","自閉症"]}},"114100-N5-20":{"quick":"早期失智症的主要症狀表現＝出現日落症候群(其餘為中晚期表現)。","detail":{"background":"早期失智症的主要症狀，選項中以(D)『出現「日落症候群(傍晚後混亂、躁動加重)」』為相對早期的「精神行為症狀」表現(失智早期即可能出現)。其他選項是「中晚期」的表現:A『臥床無法行動』是末期;B『日常生活無法自理』是中晚期;C『認字不能或失語症』是中期(語言功能明顯退化)。(註:早期失智最核心的是「近期記憶障礙」，但本題選項中以日落症候群為相對早期者。)故 D 正確。早期失智以近期記憶障礙為主，本題選項中日落症候群為相對早期的行為症狀。","options":{"A":"臥床無法行動是末期失智的表現。","B":"日常生活無法自理是中晚期表現。","C":"認字不能或失語症是中期表現。","D":"正確。出現日落症候群為相對早期的症狀(其餘為中晚期)。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"114170-N5-4":{"quick":"ADHD 患童的處置「最不適當」者＝安排靜坐於教室角落練習控制衝動。","detail":{"background":"張小弟 ADHD(走動、多話、無法遵守規定、與同學吵架)的處置，「最不適當」者為(D)『安排「靜坐於教室角落」讓他「練習控制衝動」』——錯誤，ADHD 患童「難以長時間靜坐」，「強迫靜坐」會造成挫折、且像「處罰/排除」，無助於改善。其他適當:A 協助認識自己的優點、強化正向行為;B 運用行為修正方法、教導合宜的社交行為;C 轉介父母參與親職講座與家長支持團體。故本題選最不適當者為 D。對 ADHD 患童宜以正向引導、行為修正、結構化，而非強迫靜坐。","options":{"A":"協助認識優點、強化正向行為，適當。","B":"運用行為修正、教導社交行為，適當。","C":"轉介父母參與親職講座與支持團體，適當。","D":"正確(本題選最不適當者)。ADHD 難靜坐，強迫靜坐造成挫折、像處罰。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","ADHD"]}},"114170-N5-16":{"quick":"逃避被拋棄、空虛感、人際敏感、情緒不穩、過度消費、割腕＝邊緣型人格障礙症。","detail":{"background":"22歲女性『瘋狂逃避被拋棄(害怕被遺棄)、經常空虛感、對人際關係極度敏感、情緒不穩定、過度消費與割腕等衝動/自傷行為』——完全符合『邊緣型人格障礙症(borderline personality disorder, BPD)』:害怕被遺棄、不穩定且強烈的人際關係、情緒不穩、衝動(消費、自傷)、慢性空虛感。自戀型是誇大優越;做作型是過度尋求注意;反社會型是漠視他人權益。本題以「怕被遺棄+情緒不穩+衝動自傷」為核心，故為邊緣型。故 D 正確。","options":{"A":"自戀型是誇大、優越感。","B":"做作型是過度尋求注意。","C":"反社會型是漠視他人權益、衝動攻擊。","D":"正確。怕被遺棄、情緒不穩、衝動自傷，是邊緣型人格障礙症。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"114170-N5-25":{"quick":"日間留院照護：具開放性及自主性，可訓練病人自我管理。","detail":{"background":"日間留院(日間照護)的正確敘述:(A)『「具開放性及自主性(病人白天到院、晚上回家)」，「可訓練病人自我管理(生活、服藥、社交、職能)」』——日間留院是介於住院與門診之間的部分住院/復健形式，強調復健與自我管理。其他錯誤:B『病人能「自行決定停用抗精神病藥物」』錯誤(藥物須遵醫囑，不可自行停);C『「不需要」學習自我了解及人際互動』錯誤(這正是日間留院的重要內容);D『「不需要」處理病人與家人間的衝突』錯誤(家庭關係的處理是復健的一環)。故 A 正確。日間留院強調開放、自主、自我管理與復健。","options":{"A":"正確。具開放性及自主性，可訓練病人自我管理。","B":"藥物須遵醫囑，不可自行停用。","C":"學習自我了解及人際互動是日間留院的重要內容。","D":"處理病人與家人的衝突是復健的一環。"},"sources":["精神科護理學(新文京/華杏)·社區精神護理"]}},"114170-N5-47":{"quick":"失智症照護目標「最不適當」者＝提供多元且多變化的照護環境與模式。","detail":{"background":"失智症個案照護目標，「最不適當」者為(C)『提供「多元且多變化」的照護環境與模式』——錯誤，失智者宜「「一致、熟悉、結構化、可預期」的環境」，「多變化」反而會「增加混亂、降低定向與安全感」。其他適當:A 維持個案最佳的生活狀態(維持功能);B 提供安全的生活環境(防跌、防走失);D 提供有尊嚴的生活(尊重、維護自尊)。故本題選最不適當者為 C。失智照護強調環境的一致與熟悉，而非多變化。","options":{"A":"維持個案最佳的生活狀態，適當。","B":"提供安全的生活環境，適當。","C":"正確(本題選最不適當者)。失智者宜一致、熟悉的環境，非多元多變化。","D":"提供有尊嚴的生活，適當。"},"sources":["精神科護理學(新文京/華杏)·器質性精神疾患(失智/譫妄)","DSM-5-TR"]}},"115030-N5-6":{"quick":"第一代抗精神病藥：抗精神病作用越強(高效價)者，鎮靜作用較低。","detail":{"background":"第一代(典型)抗精神病藥物的正確敘述:(B)『抗精神病作用越強(「高效價」，如 haloperidol)者，其「鎮靜作用較低」(高效價藥的鎮靜、抗膽鹼、姿勢性低血壓副作用較少，但 EPS 高)』。其他錯誤:A 主要作用機轉是「多巴胺受體的「阻斷(拮抗)」」，而非促進;C『作用越強(高效價)、EPS 越「低」』錯誤——高效價藥的 EPS「越「高」」;D『相較於 haloperidol，chlorpromazine 較會「靜坐不能」』錯誤——「靜坐不能(EPS)」以「高效價的 haloperidol」較常見，而 chlorpromazine 是低效價(EPS 較少、鎮靜較多)。故 B 正確。高效價:EPS 高、鎮靜低;低效價:相反。","options":{"A":"主要機轉是阻斷多巴胺受體，非促進。","B":"正確。高效價(作用強)者，鎮靜作用較低。","C":"高效價藥的 EPS 越高，非越低。","D":"靜坐不能以高效價的 haloperidol 較常見，非 chlorpromazine。"},"sources":["精神科護理學(新文京/華杏)·精神科藥物治療","DSM-5-TR","抗精神病藥"]}},"115030-N5-10":{"quick":"保護約束隔離期間的護理：滿足基本生理需求。","detail":{"background":"病人保護約束隔離期間的護理措施，正確的是(B)『「滿足基本生理需求(如協助如廁、飲水、進食、維持清潔)」』。其他錯誤:A『每「30分鐘」觀察病人狀況』錯誤(約束/隔離期間應「至少每15分鐘」密切觀察);C『「不需要醫囑」』錯誤(約束/隔離須「依醫囑」執行);D『「打開監視器觀察、不須現場探視」』錯誤(除監視器外，「仍須定時「現場」探視評估」，不可只靠監視器)。故 B 正確。約束隔離期間須:依醫囑、每15分鐘觀察、現場探視、滿足生理需求、確保安全。","options":{"A":"約束/隔離期間應至少每15分鐘觀察，非每30分鐘。","B":"正確。滿足基本生理需求。","C":"約束/隔離須依醫囑執行，非不需要醫囑。","D":"除監視器外仍須定時現場探視，不可只靠監視器。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}},"115030-N5-16":{"quick":"人格障礙症：邊緣型人格病人常見不穩定的人際關係及明顯的衝動性。","detail":{"background":"人格障礙症的正確敘述:(B)『「邊緣型」人格障礙症病人常見「不穩定的人際關係及明顯的衝動性(情緒不穩、怕被遺棄、自傷)」』。其他錯誤:A『「總是選擇孤單的活動」』是「「孤僻型(schizoid)」」人格的特徵，非妄想型;C『「強烈的自大、對他人缺乏同理心」』是「「自戀型」」人格，非孤僻型;D『「漠視且侵犯他人權益」』是「「反社會型」」人格，非依賴型。故 B 正確。邊緣型人格的核心是不穩定的人際與情緒、衝動、怕被遺棄。","options":{"A":"總是選擇孤單活動是孤僻型，非妄想型。","B":"正確。邊緣型人格常見不穩定的人際關係及明顯的衝動性。","C":"強烈自大、缺乏同理是自戀型，非孤僻型。","D":"漠視且侵犯他人權益是反社會型，非依賴型。"},"sources":["精神科護理學(新文京/華杏)·人格障礙","DSM-5-TR"]}},"115030-N5-19":{"quick":"聰明、人緣好，但認字差、文章表達不清＝閱讀障礙症。","detail":{"background":"小華「很聰明、人緣好(智力與社交正常)，但「認字很差、文章表達不清楚(特定的閱讀與書寫困難)」」——符合『閱讀障礙症(dyslexia，特定學習障礙)』:在「智力正常」下，於「閱讀、認字、書寫表達」這個「特定領域」有顯著困難。抽搐症(妥瑞)是不自主抽動;行為規範障礙是違規攻擊;自閉症是社交溝通缺損(但小華人緣好、社交正常)。本題是「智力正常下的特定閱讀困難」，故為閱讀障礙症。故 C 正確。","options":{"A":"抽搐症(妥瑞)是不自主抽動。","B":"行為規範障礙是違規攻擊。","C":"正確。智力正常下的認字差、表達不清，是閱讀障礙症。","D":"自閉症是社交溝通缺損，但小華人緣好、社交正常。"},"sources":["精神科護理學(新文京/華杏)·兒童青少年精神","DSM-5-TR","學習障礙"]}},"115030-N5-22":{"quick":"身體約束的護理：約束中應觀察四肢的血液循環及臉部膚色、溫度與感覺。","detail":{"background":"身體約束的相關護理措施，正確的是(B)『約束中應「觀察四肢的血液循環(及約束部位)」及「臉部的膚色、溫度與感覺」(評估循環、避免約束過緊造成傷害)』。其他錯誤:A『依醫囑執行約束「不需簽署同意書」』——須「告知並依規定(部分情形須知情同意/告知)」，不可逕行;C『「不可等到足夠人力、需立即執行約束」』錯誤(約束須有「足夠的人力」才能安全執行，貿然執行會傷及病人與人員);D『約束之後應協助病人「補充大量水分」』錯誤(應「滿足基本的水分需求」，而非「大量」)。故 B 正確。約束中須密切觀察循環、膚色、溫度與感覺。","options":{"A":"約束須告知並依規定，不可逕行(部分情形須知情同意)。","B":"正確。約束中應觀察四肢血液循環及臉部膚色、溫度與感覺。","C":"約束須有足夠人力才能安全執行，非立即貿然執行。","D":"應滿足基本水分需求，而非補充大量水分。"},"sources":["精神科護理學(新文京/華杏)·暴力行為處置"]}}},TO=["器質性精神疾患兒少老年精神治療與精神衛生法"],LEC={"器質性精神疾患兒少老年精神治療與精神衛生法":{"title":"器質性兒少老年精神與精神衛生法　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「器質性精神疾患兒少老年精神治療與精神衛生法」的歷屆考題共 272 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_p7_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
