內頸高」不正確。","detail":{"background":"中央靜脈導管置放。(A)錯誤(本題答案):內頸靜脈(尤右側、超音波導引)是常用且成功率高的路徑;外頸靜脈表淺易見但因匯入鎖骨下靜脈處角度大、瓣膜阻擋,導管常難推進到中央,成功率「低於」內頸,故敘述顛倒。(B)正確:需長期使用時,鎖骨下靜脈置放比股靜脈感染率與血栓率低、較舒適固定,較適當(股靜脈感染/血栓風險高)。(C)正確:頭低腳高(Trendelenburg)使上半身靜脈鼓脹利於穿刺成功,並升高中心靜脈壓減少空氣栓塞風險。(D)正確:併發症含氣胸、血胸、乳糜胸(左側傷胸管)、動脈穿刺、空氣栓塞、心律不整、感染、血栓。臨床:現以超音波導引降低併發症。","options":{"A":"正解(錯誤)。內頸靜脈成功率高於外頸靜脈,敘述顛倒。","B":"正確。長期使用鎖骨下優於股靜脈(感染/血栓較少)。","C":"正確。頭低腳高使靜脈鼓脹、減少空氣栓塞。","D":"正確。可併發氣胸、乳糜胸等。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"103030-02":{"quick":"脊椎側彎矯正術中「清醒測試(wake-up test)」是暫時減淺麻醉喚醒病人,請其活動「下肢」以確認脊髓「運動」功能未受矯正器械損傷;故測下肢運動功能。","detail":{"background":"Wake-up test(Stagnara 喚醒測試)用於脊椎側彎矯正等脊柱手術:在置入矯正器械後,暫時減淺麻醉(停揮發劑/減 opioid、確保肌鬆已反轉)使病人能依指令活動,先請其握手(確認已達可指令層級、上肢正常),再請其「移動雙腳/腳趾」確認「下肢運動功能」完好——若無法動下肢,提示脊髓前柱(運動)受壓/缺血,須立即放鬆矯正。它直接測「下肢運動(motor)」功能(本題答案 C)。現多以連續 SSEP(感覺後柱)+MEP(運動)即時監測取代或輔助,但 wake-up test 仍是確認運動完整的金標準對照。","options":{"A":"wake-up test 測運動而非感覺。","B":"測下肢非上肢(上肢握手只是確認病人清醒可配合)。","C":"正解。請病人活動下肢以測下肢運動功能(脊髓前柱)。","D":"測下肢運動,非上肢感覺。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"103100-05":{"quick":"使 PCWP 高估 LVEDP 者(134):正壓呼吸(尤 PEEP,肺泡壓傳入)、二尖瓣狹窄(瓣口壓差使左房/楔壓>左室舒張壓)、慢性阻塞性肺疾(West zone/胸內壓影響)。左心室肥大(②)使 LVEDP 本身升高,非「高估」來源。","detail":{"background":"肺微血管楔壓(PCWP)用以間接估計左心室舒張末壓(LVEDP),前提是肺血管—左房—左室在舒張末期相通且無阻力差。會使 PCWP「高估」LVEDP 的情況:①正壓呼吸/PEEP:肺泡壓增加傳遞到肺微血管,使楔壓高於真正左室壓(尤導管位於 West zone 1/2);③二尖瓣狹窄:瓣口存在壓差,左房壓(≈楔壓)高於左室舒張壓,故楔壓高估 LVEDP;④慢性阻塞性肺疾:胸內壓變動大、肺泡壓與肺血管壓關係改變、PEEPi,使楔壓不準而偏高。②左心室肥大(順應性下降)會使 LVEDP「本身」升高,但楔壓仍大致反映之,屬「真實升高」非「高估誤差」。故答案 134。臨床:判讀楔壓須考慮呼吸週期(呼氣末讀值)、PEEP、瓣膜病與導管位置。","options":{"A":"正解(134)。正壓呼吸、二尖瓣狹窄、COPD 使楔壓高估 LVEDP。","B":"124 納入②左室肥大(屬真實升高,非高估),排除③,錯。","C":"234 排除①正壓呼吸,錯。","D":"123 排除④COPD,錯。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"103100-06":{"quick":"C 為錯誤:肺動脈壓突升(疑肺血管收縮/缺氧/高碳酸)時,「增加潮氣容積」可能過度擴張肺泡、壓迫肺微血管反增肺血管阻力與壓力,並非正確處置;應加深麻醉、適度增加呼吸速率(降 CO2)、給 PDE III 抑制劑(milrinone 降肺血管阻力)。","detail":{"background":"CABG 術中肺動脈壓(PAP)突升而體循環血壓正常,提示肺血管阻力(PVR)上升(肺血管收縮),常見誘因:缺氧、高碳酸血症、酸中毒、麻醉過淺/疼痛交感興奮、低體溫。正確處置(降 PVR):(A)加深麻醉(減交感興奮)——正確;(B)適度增加呼吸速率以降低 PaCO2/糾正高碳酸(高 CO2 是強力肺血管收縮因子)——正確;(D)給 PDE III 抑制劑(milrinone)或其他肺血管擴張劑(吸入 NO、prostacyclin)降低 PVR——正確。(C)「增加潮氣容積」錯誤(本題答案):過大潮氣量使肺泡過度擴張(over-distension)會壓迫肺泡微血管、增加 West zone 1、反而升高 PVR 與 PAP,並有氣壓傷風險;應維持適當而非過大的潮氣量。整合:降 PVR 的策略=避免缺氧/高碳酸/酸中毒、足夠麻醉、肺血管擴張劑、適當(非過度)的肺擴張。","options":{"A":"正確處置。加深麻醉減少交感興奮、降肺血管阻力。","B":"正確處置。增加呼吸速率降 CO2(高碳酸是肺血管收縮因子)。","C":"正解(錯誤)。增加潮氣容積會過度擴張肺泡、反增肺血管阻力。","D":"正確處置。PDE III 抑制劑降肺血管阻力。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"104090-02":{"quick":"A 為錯誤:脈搏血氧(SpO2)監測的是「氧合(oxygenation)」,「不能」用來監測通氣量(ventilation)是否足夠——通氣要看二氧化碳(EtCO2/PaCO2);SpO2 不受 CO2 直接影響。其餘限制(低體溫/低灌流/光干擾)皆正確。","detail":{"background":"脈搏血氧飽和度(SpO2)的原理是兩波長光對氧合/去氧血紅素吸收差異,反映「動脈血氧合」。它的使用限制:(B)低體溫、低心輸出、血管收縮致周邊低灌流會使訊號弱、估值不準——正確;(C)病人移動與低灌流是估值誤差最常見原因(新科技已改善)——正確;(D)外界強光(手術燈)、塗指甲油、染料(亞甲藍)會干擾——正確。(A)錯誤(本題答案):SpO2 是「氧合」指標,「不能」評估「通氣(ventilation)是否足夠」——通氣以二氧化碳(EtCO2/PaCO2)評估;且在給高濃度氧時,病人可能已通氣不足(高 CO2)但 SpO2 仍正常,故 SpO2 正常不代表通氣足夠。這是臨床重要陷阱:氧合與通氣須分別監測(SpO2 看氧合、capnography 看通氣)。","options":{"A":"正解(錯誤)。SpO2 監測氧合,不能評估通氣是否足夠(通氣看 CO2)。","B":"正確。低體溫、低心輸出、血管收縮影響準確性。","C":"正確。肢體移動與低灌流是最常見誤差原因。","D":"正確。強光會干擾估值,須避免。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"104090-76":{"quick":"C 為最不適當:EtCO2 12.5 mmHg 在 CPR 中代表「灌流/心輸出偏低」(復甦品質不足),但「不」表示氣管內管放到食道——食道插管時 EtCO2 應「幾乎為零/無波形」,有 12.5 的持續 CO2 反而證明管在氣管內。","detail":{"background":"潮氣末二氧化碳(EtCO2)在心肺復甦(CPR)的用途:(A)監測 CPR 品質——EtCO2 反映肺血流即心輸出,壓胸有效時 EtCO2 上升,可即時回饋按壓品質——正確;(B)確認氣管內管位置——插管後有持續 CO2 波形代表管在氣管(食道插管則 CO2≈0/無波形)——正確;(D)EtCO2 突然升至 ~40 mmHg(明顯回升)常代表自發循環恢復(ROSC)——正確。(C)錯誤(本題答案):CPR 中 EtCO2 12.5 mmHg 代表「血流/心輸出偏低、按壓灌流不足」(品質可改善),但「並不表示氣管內管在食道」——若管真在食道,EtCO2 應接近 0、無持續波形;能測到 12.5 的持續 CO2 本身就證明管在氣管。故把「低 EtCO2」誤解為「食道插管」是錯誤判讀。臨床:CPR 中 EtCO2<10 提示預後差/按壓不力,須加強按壓。","options":{"A":"正確。EtCO2 反映肺血流,可監測 CPR 品質。","B":"正確。持續 CO2 波形確認氣管內管在氣管。","C":"正解(最不適當)。EtCO2 12.5 代表灌流低,非食道插管(食道插管 CO2≈0)。","D":"正確。EtCO2 突升至 40 提示自發循環恢復(ROSC)。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"105020-01":{"quick":"D 為錯誤:術中心電圖(即使簡化導程)「可以」偵測大部分心律不整與心肌缺血(II 導看心律/下壁、V5 看前側壁缺血),並非「無法診斷」。ECG 是標準監測、偵測電氣障礙、有助診斷處置皆正確。","detail":{"background":"術中心電圖(ECG)監測。(A)ECG 是麻醉標準基本監測之一(ASA standards)——正確。(B)其主要目的是偵測會影響心臟機械功能的「電氣性障礙」(心律不整、傳導阻滯、心肌缺血的 ST 變化)——正確。(C)正確診斷心律不整與心肌缺血有助臨床處置——正確。(D)錯誤(本題答案):術中雖用簡化導程(常 3 或 5 導),仍「能」偵測「大部分」心律不整與心肌缺血——標準配置以「II 導」監測心律與下壁缺血、以「V5」監測前側壁心肌缺血(II+V5 可偵測約 80% 缺血,加 V4 更高),故說「大部分無法由 ECG 監測診斷」是錯誤。臨床:高缺血風險者用 5 導(含 V5)並開啟 ST 段自動分析。","options":{"A":"正確。ECG 是術中標準基本監測。","B":"正確。主要偵測影響心臟機械功能的電氣障礙。","C":"正確。有助心律不整與缺血的診斷與處置。","D":"正解(錯誤)。簡化導程仍能偵測大部分心律不整與缺血(II+V5)。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"105100-02":{"quick":"EtCO2「突發性銳減」的原因:呼吸管脫落(無氣流)、肺栓塞或心輸出突減(肺血流驟降使 CO2 運送到肺減少)、呼吸道完全阻塞。「過度換氣」會使 EtCO2「逐漸」下降(非突發銳減),故為最不可能的「突發」原因。","detail":{"background":"EtCO2 = 肺泡通氣排出的 CO2,反映「代謝產生→循環運送→肺通氣排出」整條路徑。「突發性(abrupt)銳減/趨近零」多為災難性事件:呼吸迴路脫落/食道插管(完全無氣流交換)、氣管內管完全阻塞、心臟驟停或心輸出突減/大塊肺栓塞(肺血流驟降,CO2 無法運送到肺泡)、設備故障。「過度換氣(hyperventilation)」雖會降低 EtCO2,但屬「漸進(gradual)」下降而非「突發銳減」,故為「最不可能」造成突發銳減者(本題答案 B)。記憶:EtCO2 突降鑑別=通氣中斷(管路問題)或灌流驟降(栓塞/心輸出);漸降=過度通氣、低代謝/低體溫。","options":{"A":"呼吸管脫落使氣流中斷,EtCO2 突發銳減。","B":"正解。過度換氣使 EtCO2「漸進」下降,非突發銳減。","C":"心輸出突減使肺血流驟降,EtCO2 突降。","D":"呼吸道完全阻塞使無 CO2 排出,EtCO2 突降。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"105100-03":{"quick":"本題多重答案(A、B、C、D 給分)。脊椎手術神經監測的選擇:MEP(運動)、SSEP(感覺)、EMG、wake-up test 各有角色;wake-up test 是確認運動的金標準對照,但題目認列四者皆給分。","detail":{"background":"脊椎側彎矯正術中神經功能監測方法各有所長:SSEP 監測脊髓「後柱(感覺)」上行傳導;MEP(motor evoked potentials)監測「前柱(運動)/皮質脊髓束」,對脊髓缺血最敏感、能更早偵測運動損傷;EMG(肌電圖)用於監測神經根刺激/損傷(尤椎弓螺釘置放);wake-up test(喚醒測試)是直接讓病人活動下肢、確認運動完整的「金標準對照」,但只能間斷做、無法即時連續。現代標準是「多模式(SSEP+MEP±EMG)連續監測」並以 wake-up test 佐證。本題因問「最可靠」有歧義(各法互補,wake-up 是直接運動測試最確切,但連續性差),考選部最終認定 A、B、C、D 四者皆給分。學習重點:理解各監測的對應神經路徑與限制(尤 MEP/SSEP 受麻醉與肌鬆劑影響)。","options":{"A":"給分。MEP 監測運動(前柱),對脊髓缺血最敏感。","B":"給分。SSEP 監測感覺(後柱)上行傳導。","C":"給分。EMG 監測神經根刺激/損傷。","D":"給分。wake-up test 直接確認下肢運動,是金標準對照(但不連續)。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"106020-02":{"quick":"B 為錯誤:術中清醒(awareness)的發生率在「淺麻醉、全靜脈、肌鬆下、心臟/產科/外傷手術、藥物耐受」者較高;與「低體溫」無明確正相關(低體溫反而降低 MAC/腦代謝)。其餘關於 EEG 指標、監測降低但不保證、穩定濃度有助皆正確。","detail":{"background":"麻醉深度監測。(A)以 EEG 或其衍生指標(BIS、entropy)監測麻醉深度,因其與鎮靜、失憶、意識喪失及腦代謝率下降相關——正確。(B)錯誤(本題答案):術中清醒(intraoperative awareness)危險因子包括麻醉過淺、全靜脈麻醉(無揮發劑「氣味」提醒、且難以呼氣末濃度監測)、使用肌鬆劑(病人無法以動作示警)、特定高風險手術(心臟、產科剖腹、外傷急救因須維持血流動力而給藥保守)、藥物耐受(長期飲酒/用藥);「低體溫」並非術中清醒的危險因子(低體溫降低 MAC 與腦代謝,理論上更不易清醒)。(C)監測可降低、但不能保證完全避免術中清醒——正確。(D)維持適當穩定的麻醉氣體濃度有助減少清醒——正確。","options":{"A":"正確。EEG 衍生指標與鎮靜、失憶、意識喪失、腦代謝相關。","B":"正解(錯誤)。術中清醒與淺麻醉/肌鬆/高風險手術有關,與低體溫無正相關。","C":"正確。深度監測降低但不保證完全避免術中清醒。","D":"正確。維持穩定適當的麻醉濃度有助減少清醒。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"106020-03":{"quick":"靜脈空氣栓塞偵測敏感度由高到低:經食道超音波(TEE)④ > 心前區都卜勒(precordial Doppler)② > capnometer(EtCO2)① > oximeter(SpO2)③,即 4213。","detail":{"background":"靜脈空氣栓塞(VAE)好發於坐姿神經外科、頭頸高於心臟的手術。各監測對 VAE 的敏感度由高到低:經食道超音波(TEE,可見心腔內氣泡,最敏感、可偵測極少量氣體並定量、也看右心反常栓塞)> 心前區都卜勒(precordial Doppler,聽到氣泡「磨輪聲」,很敏感且非侵入,臨床常用)> 潮氣末二氧化碳(capnometer/EtCO2:氣栓使肺死腔增加、EtCO2 下降,敏感度中等)> 肺動脈壓(升高)> 脈搏血氧(SpO2 下降,屬晚期、敏感度低)。本題排序 4(TEE)>2(Doppler)>1(capnometer)>3(oximeter)= 4213(答案 D)。臨床:坐姿手術常規用 precordial Doppler + EtCO2 監測,並備中央導管抽氣。","options":{"A":"1234 順序錯。","B":"2134 把 TEE 排太後。","C":"2314 順序錯(oximeter 不應在 capnometer 前)。","D":"正解。4213:TEE>Doppler>capnometer>oximeter。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"106080-01":{"quick":"D「肘前靜脈(antecubital vein)置放發生臂神經叢損傷」最不可能——肘前靜脈穿刺屬周邊,不會傷臂神經叢。右內頸/左內頸/左鎖骨下置放發生氣胸、乳糜胸皆可能。","detail":{"background":"中央靜脈置放併發症與路徑相關。(A)右內頸靜脈鄰近肺尖,穿刺可致氣胸——可能。(B)左內頸靜脈側胸管(thoracic duct)匯入左鎖骨下/內頸交界處,穿刺左側可傷胸管致乳糜胸——可能。(C)左鎖骨下靜脈鄰肺尖,可致氣胸——可能。(D)最不可能(本題答案):經「肘前靜脈(antecubital vein)」置放屬周邊/PICC 路徑,穿刺點在手肘前淺靜脈,「不會傷及位於頸根部/鎖骨上的臂神經叢」;臂神經叢損傷見於鎖骨上/鎖骨下深部穿刺(如腋路/鎖骨上),非肘前淺靜脈。故肘前靜脈置放發生臂神經叢損傷最不可能。","options":{"A":"右內頸鄰肺尖,可發生氣胸,屬可能。","B":"左側鄰胸管,可發生乳糜胸,屬可能。","C":"左鎖骨下鄰肺尖,可發生氣胸,屬可能。","D":"正解。肘前靜脈屬周邊穿刺,不會傷臂神經叢,最不可能。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"109020-02":{"quick":"B 正確:SpO2 靠氧合(660 nm 紅光)與去氧血紅素(940 nm 紅外光)吸收差異區分。A 錯(會受指甲油影響)、C 錯(CO 中毒時 SpO2 假性「正常/偏高」而非偏低)、D 錯(SpO2>90% 不保證組織無缺氧)。","detail":{"background":"Pulse oximetry 原理與限制。(A)錯誤:SpO2「會」受指甲顏色/指甲油(尤藍黑色)影響,並非不受影響。(B)正確(本題答案):利用氧合血紅素(O2Hb)在 940 nm 紅外光吸收較多、去氧血紅素(deO2Hb)在 660 nm 紅光吸收較多的差異,計算其比值得 SpO2。(C)錯誤:一氧化碳中毒時 carboxyhemoglobin(COHb)的吸收特性近似 O2Hb,使傳統雙波長 SpO2「假性偏高(看起來正常)」、高估真正 SaO2,造成「低估缺氧」的危險(故須 co-oximetry 測 COHb),題目說「使 SpO2 低於 SaO2」方向錯。(D)錯誤:SpO2>90%(對應 PaO2≈60 mmHg,氧解離曲線轉折)不代表「組織一定無缺氧」——組織氧合還取決於血紅素量、心輸出、灌流與氧解離;貧血/低灌流時 SpO2 正常仍可組織缺氧。","options":{"A":"錯誤。SpO2 會受指甲顏色/指甲油影響。","B":"正解。利用 O2Hb 與 deO2Hb 對 660/940 nm 光吸收差異區分。","C":"錯誤。CO 中毒時 SpO2 假性偏高(高估 SaO2),非偏低。","D":"錯誤。SpO2>90% 不保證組織無缺氧(還看血紅素/灌流)。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"109080-02":{"quick":"C 為錯誤:ketamine 與 barbiturates 對腦波影響「不同」——barbiturate(及 propofol)劑量依賴抑制 EEG 致 burst suppression,ketamine 反而活化腦電、增加 θ/γ 活性。其餘關於神經監測早期偵測、維持恆定增效度、SSEP/MEP/EMG 用於脊椎手術皆正確。","detail":{"background":"術中神經監測。(A)神經監測可早期偵測潛在神經傷害並及早處置(如放鬆牽引、提升血壓灌流)——正確。(B)維持穩定的生理恆定(血壓、體溫、PaCO2、氧合)與適當穩定的麻醉深度,可提高監測訊號品質與效度——正確(訊號易受麻醉/生理波動干擾)。(C)錯誤(本題答案):ketamine 與 barbiturates「對腦波影響不同」——barbiturate/propofol 劑量依賴抑制 EEG、可致爆發抑制(burst suppression),而 ketamine 不抑制反而「活化」EEG(增加高頻 γ 與 θ 活性),且 ketamine 增大 MEP/SSEP 振幅(有利監測),兩者影響相反,故說「類似」錯誤。(D)SSEP、MEP、EMG 皆用於脊柱/脊髓手術監測(感覺、運動、神經根)——正確。","options":{"A":"正確。神經監測可早期偵測傷害並處置。","B":"正確。維持生理恆定與適當麻醉可增加監測效度。","C":"正解(錯誤)。ketamine 活化腦電,barbiturate 抑制腦電致 burst suppression,兩者不同。","D":"正確。SSEP/MEP/EMG 皆用於脊柱與脊髓手術監測。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"109080-03":{"quick":"B 正確:混合靜脈血氧飽和度(SvO2,經肺動脈導管測)反映全身氧供需平衡,術中 SvO2 下降與術後不良預後相關。A 錯(SpO2>90% 不保證器官無缺氧)、C/D 錯(發燒/疼痛增加耗氧,使 SvO2「下降」而非升高)。","detail":{"background":"氧氣輸送(DO2 = 心輸出 × 動脈血氧含量)與組織氧合監測。(A)錯誤:SpO2>90% 只代表動脈氧合尚可,「不保證器官無缺氧」——還取決於血紅素、心輸出/灌流、氧解離與組織需氧。(B)正確(本題答案):混合靜脈血氧飽和度(SvO2,由肺動脈導管抽肺動脈血測得)反映「全身氧供應相對於消耗」是否足夠;SvO2 下降(<65%)代表氧供不足或耗氧增加(心輸出低、貧血、低氧、高代謝),術中 SvO2 降低與術後併發症/預後相關。(C)(D)錯誤:發燒、疼痛/麻醉不足會「增加組織耗氧」,使氧攝取增加、SvO2「下降」(非升高);SvO2 升高見於敗血(組織無法利用氧)、低代謝、左向右分流、氰化物中毒。臨床:SvO2/ScvO2 是重要的全身氧平衡指標。","options":{"A":"錯誤。SpO2>90% 不保證器官無缺氧。","B":"正解。SvO2 反映全身氧供需,術中下降與術後不良預後相關。","C":"錯誤。發燒增加耗氧,使 SvO2 下降而非升高。","D":"錯誤。疼痛控制不佳增加耗氧,SvO2 下降而非升高。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"110020-02":{"quick":"EtCO2「突然降低」原因:氣管內管彎折(通氣受阻)、呼吸迴路鬆脫(無氣流)、急性肺栓塞(肺血流驟降)。「病人發燒」會增加代謝產 CO2 使 EtCO2「升高」,故不是 EtCO2 降低的原因。","detail":{"background":"EtCO2 反映 CO2 的產生、運送與排出。「突然降低」的原因:通氣中斷(氣管內管彎折/阻塞、迴路鬆脫脫落、食道插管)使排出中斷;灌流驟降(大塊肺栓塞、心輸出突減、心臟驟停)使 CO2 運送到肺減少;過度換氣(漸降)。題目問「不包括(不是降低原因)」者:「病人發燒」屬代謝率上升、CO2 「產生增加」,會使 EtCO2「升高」(其他升高原因:惡性高熱、腹腔鏡 CO2 吸收、通氣不足、碳酸氫鈉),故發燒不是 EtCO2 降低的原因(本題答案 C)。記憶:EtCO2 升高=產生增加(發燒/MH/CO2 吸收)或排出減少(低通氣);EtCO2 降低=通氣增加或運送中斷(管路/栓塞)。","options":{"A":"氣管內管彎折使通氣受阻,EtCO2 降低。","B":"呼吸迴路鬆脫使無氣流交換,EtCO2 降低。","C":"正解。發燒增加 CO2 產生,使 EtCO2「升高」,不是降低原因。","D":"急性肺栓塞使肺血流驟降,EtCO2 降低。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"111020-01":{"quick":"A 為錯誤:確認氣管內管位置不靠「後頸部超音波」;標準方法是 EtCO2 持續方波、雙側胸部呼吸音+上腹無音、必要時光纖鏡或胸部 X 光、目視通過聲帶。","detail":{"background":"確認氣管內管在氣管內的方法。(B)聽診:雙側胸部呼吸音對稱、上腹部(胃)聽不到氣過水聲——正確輔助。(C)EtCO2:呼氣呈現連續的二氧化碳「方波(square wave)」是確認在氣管的最可靠即時方法(食道插管則無持續波形)——正確。(D)光纖支氣管鏡可直接看到氣管環/隆突確認——正確。(A)錯誤(本題答案):「後頸部超音波掃描」不是標準確認方法——超音波若用於氣道,是放在「前頸部(氣管上方)」即時看氣管/食道有無雙重影像或氣管內動態,「後頸部」掃描無法確認;標準仍以 EtCO2 為主。故 A 為錯誤敘述。","options":{"A":"正解(錯誤)。後頸部超音波非確認方法(超音波須放前頸部),標準是 EtCO2。","B":"正確。雙側胸部呼吸音、上腹無音是確認輔助。","C":"正確。EtCO2 持續方波是最可靠的即時確認。","D":"正確。光纖支氣管鏡可直接確認位置。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"111020-02":{"quick":"C 正確:監測前負荷與輸液反應性,「動態指標」(如每搏量變異 SVV)比「靜態指標」(CVP)更能預測容積反應性。A 錯(Allen test 未證實能預防併發症)、B 錯(肺動脈導管未證實改善預後)、D 錯(CVP 與循環血量非簡單正比)。","detail":{"background":"侵入性血流動力監測。(A)錯誤:橈動脈置管前做 Allen test 評估尺動脈側枝循環是傳統做法,但「未被證實能預防」導管相關缺血併發症(預測力差)。(B)錯誤:常規使用肺動脈導管(PAC/Swan-Ganz)在重症病人「未被證實改善預後」(多項 RCT 為中性甚至有害),故不再常規建議。(C)正確(本題答案):評估前負荷與輸液反應性,「動態指標」——每搏量變異(SVV)、脈壓變異(PPV)、被動抬腿等——利用正壓通氣造成的心搏量週期變化,比「靜態指標」(CVP、PCWP)更能預測病人對輸液的反應性(volume responsiveness)。(D)錯誤:CVP 數值受心臟順應性、瓣膜、胸內壓、肺動脈壓等影響,與循環血量「非簡單正比」,單一 CVP 值不可靠地反映容積狀態。整合:現代血流動力評估重「動態」與「趨勢」而非單點靜態壓力。","options":{"A":"錯誤。Allen test 未證實能預防導管後遺症。","B":"錯誤。肺動脈導管未證實改善臨床預後。","C":"正解。動態指標(SVV)比靜態(CVP)更能預測輸液反應性。","D":"錯誤。CVP 與循環血量非簡單正比。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"111080-02":{"quick":"A 為錯誤:正常混合靜脈血氧飽和度(SvO2)約「65–75%」,不是 30–50%。其餘關於 TEE 用途、動態指標優於靜態、CVP/PAC 最常見問題是數值誤判皆正確。","detail":{"background":"心血管監測。(A)錯誤(本題答案):SvO2(肺動脈血)正常值約「65–75%」(ScvO2 略高);題目寫「30–50%」過低(那已是嚴重氧供不足)。SvO2 反映全身氧供需平衡。(B)正確:經食道超音波(TEE)可即時評估心室功能/容積、瓣膜、心包填塞、導管/氣栓位置等,也用於「非開心手術」高危病人的監測。(C)正確:評估前負荷/容積反應性,動態指標(PPV)優於靜態(PCWP/CVP)。(D)正確:CVP 與肺動脈導管「最常見的問題」是對數值的誤用與誤判(忽略胸內壓、瓣膜、順應性等干擾),而非單純機械併發症。整合:記住 SvO2 正常 65–75%、動態優於靜態、PAC 重在正確判讀。","options":{"A":"正解(錯誤)。正常 SvO2 約 65–75%,非 30–50%。","B":"正確。TEE 可監測心臟/瓣膜/容積/導管,亦用於非開心手術。","C":"正確。動態指標(PPV)優於靜態(PCWP)預測輸液反應性。","D":"正確。CVP/PAC 最常見問題是數值的誤用與誤判。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"111080-07":{"quick":"經食道超音波(TEE)可評估左心室舒張功能、心輸出量、瓣膜(主動脈瓣狹窄)等;但「冠狀動脈狹窄程度」無法由 TEE 直接評估(需冠狀動脈攝影),故為正解(不能獲得)。","detail":{"background":"經食道超音波(TEE)能提供豐富的心臟結構與功能資訊:左/右心室收縮與「舒張功能」、心輸出量(經 LVOT 速度時間積分計算)、各「瓣膜」狹窄/逆流程度(含主動脈瓣狹窄)、心室容積與前負荷、區域室壁運動異常(間接提示缺血)、心包填塞、心內血栓/贅生物、主動脈剝離、空氣栓塞、導管/裝置位置等,是心臟手術與重症血流動力監測的利器。但「冠狀動脈狹窄程度」無法由 TEE 直接顯影評估(冠脈細小、走行於心外膜,須冠狀動脈攝影或 CT 冠脈評估;TEE 僅能由區域室壁運動異常「間接」推測缺血),故本題答案 D(不能獲得)。","options":{"A":"TEE 可評估左心室舒張功能。","B":"TEE 可計算心輸出量。","C":"TEE 可評估主動脈瓣膜狹窄程度。","D":"正解。冠狀動脈狹窄程度無法由 TEE 直接評估(須冠脈攝影)。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"112080-02":{"quick":"真正的「混合靜脈血(mixed venous)」是上下腔靜脈與冠狀竇血在右心室/肺動脈完全混合後的血,故抽 SvO2 須由「肺動脈導管」抽肺動脈血最精確。","detail":{"background":"混合靜脈血氧飽和度(SvO2)代表全身各部位回流靜脈血「完全混合」後的氧飽和度,反映全身氧供需平衡。真正混合處在右心室/肺動脈(上腔、下腔靜脈與冠狀竇血在此匯合混勻),故抽取最精確的位置是「肺動脈導管(pulmonary artery catheter)」抽肺動脈血(本題答案 D)。對照:中央靜脈導管抽到的是「中心靜脈血氧飽和度(ScvO2)」(主要上腔靜脈血,未含下腔與冠狀竇,數值略高於 SvO2,臨床常作替代但非「混合」);外頸靜脈、橈動脈(動脈血)都不對。臨床:無 PAC 時以 ScvO2 趨勢替代評估氧供需。","options":{"A":"外頸靜脈是周邊靜脈,非混合靜脈血。","B":"橈動脈是動脈血,非靜脈。","C":"中央靜脈導管抽的是 ScvO2(上腔靜脈),非完全混合的 SvO2。","D":"正解。肺動脈導管抽肺動脈血是真正的混合靜脈血,測 SvO2 最精確。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"112080-03":{"quick":"D 為錯誤:EtCO2 與動脈血 CO2(PaCO2)之間有差距(PaCO2−EtCO2 梯度,正常約 2–5 mmHg),且此梯度「會隨死腔/灌流改變」,故 EtCO2「不能完全」反映 PaCO2。其餘:監測含氧合與換氣、pulse oximetry 必要、capnography 確認管位皆正確。","detail":{"background":"麻醉基礎呼吸監測。(A)呼吸監測須涵蓋「氧合(oxygenation,以 SpO2/血氣)」與「換氣(ventilation,以 EtCO2/呼吸量)」兩面向——正確。(B)pulse oximetry 是 ASA 標準必要監測——正確。(C)capnography(二氧化碳波形)監測通氣,並可確認氣管內管在氣管(有持續波形)——正確。(D)錯誤(本題答案):EtCO2 通常「略低於」PaCO2,兩者存在「動脈-潮氣末 CO2 梯度(a-ET CO2 gradient,正常約 2–5 mmHg)」,此梯度受肺泡死腔、肺血流/灌流、V/Q 不均影響而「會變動」(如肺栓塞、低心輸出、COPD 時梯度增大),故 EtCO2「不能完全」反映 PaCO2 的真實變化——須以動脈血氣校正。臨床:EtCO2 是趨勢與通氣監測利器,但精準 PaCO2 仍須抽血氣。","options":{"A":"正確。呼吸監測須含氧合與換氣。","B":"正確。pulse oximetry 是必要呼吸監測。","C":"正確。capnography 監測通氣並可確認氣管內管位置。","D":"正解(錯誤)。EtCO2 與 PaCO2 有可變梯度,不能完全反映 PaCO2。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"113020-02":{"quick":"D 為最不適當:氣管內管過深進入「右」主支氣管時,常仍維持單肺(右肺)通氣,SpO2 不一定「快速下降」(可能緩慢或維持),故說「會快速下降」不適當。其餘:SpO2 波形看心律不整、振幅低提示灌流不足、不能作為插管位置早期確認皆正確。","detail":{"background":"Pulse oximetry 在麻醉的應用。(A)正確:SpO2 體積描記波形(plethysmograph)的節律可反映心律不整(如心房顫動波形不規則)。(B)正確:波形振幅偏低代表周邊灌流不足(低血壓、血管收縮、低心輸出)。(C)正確:SpO2 對「氣管插管位置正確與否」反應慢,「不能」作為早期確認工具(早期確認用 EtCO2),因有氧儲備,插錯管初期 SpO2 仍可維持。(D)最不適當(本題答案):氣管內管過深進入右主支氣管(右側單肺通氣)時,左肺不通氣但仍可能維持氧合(右肺較大、若 V/Q 尚可),SpO2「不一定快速下降」——尤其給高 FiO2 時可延遲;故「會快速下降」是過度肯定、不適當。臨床:單側插管多先以聽診不對稱、氣道壓上升、EtCO2 變化發現,SpO2 下降常為較晚徵象。","options":{"A":"正確。SpO2 波形可發現心律不整。","B":"正確。波形振幅低代表灌流不足。","C":"正確。SpO2 不能作為插管位置的早期確認工具(用 EtCO2)。","D":"正解(最不適當)。插管過深致單肺通氣時 SpO2 不一定快速下降。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"113070-02":{"quick":"C 為錯誤:腦波出現「爆發抑制(burst suppression)」代表非常深的麻醉,BIS 數值通常「<20(趨近 0)」,而非 40。BIS 100=清醒、40–60=適當手術麻醉減少清醒、BIS 為意識監測不完全等於麻醉深度皆正確。","detail":{"background":"BIS(bispectral index,0–100)由 EEG 衍生,監測鎮靜/意識層級。(A)BIS 100=完全清醒——正確。(B)BIS 40–60=適當的全身麻醉深度,術中清醒/記憶(recall)機率低,維持此區間可降低 awareness——正確。(C)錯誤(本題答案):當 EEG 出現「爆發抑制(burst suppression,腦電活動與等電位交替,代表極深抑制)」時,BIS 數值通常「很低(<20,趨近 0)」,而非 40;BIS 40 代表中深度麻醉、尚無 burst suppression。(D)正確:BIS 主要監測「意識/鎮靜層級(hypnosis)」,「不能完全代表麻醉深度」——麻醉深度還含止痛(antinociception)面向,BIS 不反映疼痛/體動;且 ketamine、N2O 等可使 BIS 失準。臨床:BIS 40–60 為目標,但須結合臨床判斷。","options":{"A":"正確。BIS 100 代表清醒。","B":"正確。BIS 40–60 減少術中清醒(recall)風險。","C":"正解(錯誤)。burst suppression 時 BIS 通常<20(趨近 0),非 40。","D":"正確。BIS 監測意識層級,不能完全代表麻醉深度(不含止痛面向)。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"113070-03":{"quick":"插管後 EtCO2 波形(圖)若呈「無持續方波/迅速歸零」→ 提示「食道插管」,應立即重新插管。〔本題附 capnography 波形圖〕","detail":{"background":"插管後接上 capnography,正常應見連續、規則的「方波(矩形 plateau)」二氧化碳波形(代表每次呼氣都有肺泡 CO2 排出，氣管內管在氣管)。本題波形圖呈現「沒有持續性 CO2 方波(或數次後迅速消失/趨零、無正常 plateau)」——這是「食道插管(esophageal intubation)」的典型表現:食道內無肺泡氣體交換、無持續 CO2 排出(初期可能因胃內殘氣有幾次小波後歸零),即使 SpO2 一時尚有 97%(氧儲備),也必須立即拔除重插。故最適宜處置為 B(懷疑食道插管，準備重新插管)。對照:(A)氣管內管阻塞會見氣道壓升高、波形低平但通常仍有些 CO2;(C)soda lime 耗盡是「吸氣基線抬高(rebreathing，EtCO2 基線>0)」而非無波形;(D)插管過深單肺通氣 EtCO2 仍有正常波形。本題以「無 CO2 波形=食道插管」為考點;capnography 是確認氣管內管位置的金標準。","options":{"A":"氣管內管阻塞會見氣道壓升高、波形低平,但通常仍有 CO2,非本圖無波形。","B":"正解。無持續 CO2 方波提示食道插管,應立即重新插管。","C":"soda lime 耗盡表現為吸氣基線抬高(rebreathing),非無波形。","D":"插管過深單肺通氣時 EtCO2 波形仍正常,非無波形。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"114020-02":{"quick":"C 為錯誤:ketamine 與 propofol 對 EEG 影響「不同」——propofol 抑制 EEG(意識喪失時呈低頻高振幅、可致 burst suppression);ketamine 反而活化腦電(高頻活性),且使 BIS 不準/可能偏高。其餘 BIS 90–100 清醒、0 深昏迷、propofol 致低頻高振幅皆正確。","detail":{"background":"BIS 監測麻醉深度。(A)BIS 90–100=清醒——正確。(B)BIS 0=等電位/深度無意識——正確。(C)錯誤(本題答案):ketamine 與 propofol 對 EEG 影響「不同」——propofol(GABA 增強)劑量依賴抑制 EEG,意識喪失時呈現「低頻(δ)、高振幅」並可進展為爆發抑制,BIS 隨之下降;ketamine(NMDA 拮抗)反而「活化」EEG(增加高頻 β/γ 活性),會使 BIS「不降反升或維持較高」、與意識狀態不符(BIS 對 ketamine、N2O 失準)。(D)正確:propofol 達意識喪失時 EEG 趨向「低頻率、高振幅」(δ 波)。整合:BIS 對 GABA 型藥(propofol、揮發劑)較準,對 ketamine/N2O/dexmedetomidine 判讀須謹慎。","options":{"A":"正確。BIS 90–100 代表清醒。","B":"正確。BIS 0 代表深度無意識/等電位。","C":"正解(錯誤)。ketamine 活化 EEG、propofol 抑制 EEG,兩者影響不同。","D":"正確。propofol 致意識喪失時 EEG 呈低頻高振幅。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"114020-03":{"quick":"A 正確:SpO2 原理是氧合與去氧血紅素對不同波長光(660 nm 紅光、940 nm 紅外光)有不同吸收比值。B 錯(不監測通氣/酸鹼)、C 錯(測動脈搏動血)、D 錯(與 PaO2 非線性,呈 S 形氧解離曲線)。","detail":{"background":"Pulse oximetry 原理與限制。(A)正確(本題答案):利用氧合血紅素(O2Hb)與去氧血紅素(deO2Hb)對 660 nm 紅光與 940 nm 紅外光的不同吸收比值,計算 SpO2。(B)錯誤:SpO2 監測「氧合」,「不能」評估通氣是否足夠或體內酸鹼平衡(那要看 CO2/血氣)。(C)錯誤:pulse oximetry 偵測「搏動(pulsatile)」訊號以擷取「動脈」血成分,主要測動脈血而非靜脈血。(D)錯誤:SpO2(SaO2)與 PaO2 的關係是「S 形氧合血紅素解離曲線」,非線性——PaO2 60 mmHg 對應 SpO2≈90%,之後曲線變平坦(PaO2 大幅升高 SpO2 僅微增),故 SpO2 在高 PaO2 時對 PaO2 變化不敏感。臨床:SpO2 正常不代表 PaO2/通氣正常。","options":{"A":"正解。利用 O2Hb 與 deO2Hb 對不同波長光的吸收比值。","B":"錯誤。SpO2 不監測通氣與酸鹼平衡。","C":"錯誤。pulse oximetry 測動脈搏動血,非靜脈血。","D":"錯誤。SpO2 與 PaO2 呈 S 形(非線性)氧解離曲線關係。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"114020-07":{"quick":"D 為最不適當:植物人(persistent vegetative state)的腦波並非「近似正常睡眠腦波」——其 EEG 多為瀰漫性異常(慢波、α 昏迷或低電壓等),與正常睡眠週期不同。全麻 δ/α 到 burst suppression、恢復期 α/β 增加、腦死等電位皆正確。","detail":{"background":"各意識狀態的腦波。(A)正確:全身麻醉漸深時 EEG 由 α 過渡到 δ(高振幅慢波),更深可達「爆發抑制(burst suppression)」。(B)正確:麻醉恢復(變淺)過程中,α 與 β(較快)活性增加,趨向清醒型態。(C)正確:腦幹死/全腦死呈「等電位(electrocerebral silence,等電位平線)」EEG。(D)最不適當(本題答案):植物狀態(vegetative state)雖有睡醒週期外觀,但其 EEG 多呈「瀰漫性異常」(廣泛慢波、α 昏迷型、低電壓、反應性差等),「不」近似正常人正常睡眠的腦波結構;故說植物人腦波近似正常睡眠是錯誤。整合:EEG 由淺到深=快波→慢波(δ)→burst suppression→等電位。","options":{"A":"正確。全麻可呈 δ/α 活性到爆發抑制。","B":"正確。麻醉恢復過程 α/β 活性增加。","C":"正確。腦幹死呈等電位狀態。","D":"正解(最不適當)。植物人腦波多為瀰漫異常,非近似正常睡眠腦波。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"115020-03":{"quick":"D 最適當:EtCO2 在通氣固定下與肺血流(心輸出)相關,可被用來反映/監測心輸出量的變化趨勢。A 錯(Allen test 未證實減少後遺症)、B 錯(週邊動脈脈壓因波反射比主動脈「高」非低)、C 錯(CVP 非最準確的循環血量測量)。","detail":{"background":"重大手術循環監測。(A)錯誤:橈動脈置管前 Allen test「未被證實」可減少導管相關後遺症(預測缺血的價值有限)。(B)錯誤:因「脈波反射(pulse wave reflection)」,愈往周邊的動脈所測「脈壓(pulse pressure)/收縮壓」愈「高」(放大現象,如股/橈動脈收縮壓常高於主動脈),故說周邊測得脈壓「比主動脈低」方向錯。(C)錯誤:CVP「不是」最準確的循環血量測量——單一 CVP 受心臟順應性、瓣膜、胸內壓影響,與血容量關係不可靠(現代以動態指標評估)。(D)最適當(本題答案):在通氣與代謝穩定時,EtCO2 與肺血流(即心輸出)相關——心輸出下降時肺血流減少、EtCO2 下降,故 EtCO2 的變化「可被用來反映/監測心輸出量的趨勢變化」(亦用於 CPR 監測按壓品質與 ROSC)。","options":{"A":"錯誤。Allen test 未證實減少導管後遺症。","B":"錯誤。周邊動脈脈壓因波反射比主動脈「高」,非低。","C":"錯誤。CVP 非最準確的循環血量測量。","D":"正解。EtCO2 在通氣固定下與肺血流相關,可監測心輸出變化趨勢。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"101030-11":{"quick":"硬膜外(神經軸)麻醉前最關注的是「出血/凝血」風險(硬膜外血腫);此題情境為尿毒症病人——尿毒致血小板功能異常,故建議檢查「出血時間(bleeding time)」評估血小板功能。","detail":{"background":"本題承上(尿毒症病人擬行硬膜外麻醉)。神經軸麻醉(硬膜外/脊髓)最嚴重的併發症之一是「硬膜外/脊髓血腫(epidural hematoma)」壓迫脊髓致癱瘓,故術前須評估凝血功能。尿毒症(uremia)會因尿毒素影響「血小板功能(qualitative platelet dysfunction)」(黏附/聚集障礙、von Willebrand 因子作用受損),即使血小板數量與 PT/PTT 正常,仍可能出血傾向。評估血小板「功能」的傳統指標是「出血時間(bleeding time, BT)」(本題答案 C);PT 評估外在途徑、PTT 評估內在途徑、TT 評估纖維蛋白原→纖維蛋白,皆評估「凝血因子」而非血小板功能。故尿毒病人行硬膜外麻醉前,出血時間是針對其特有血小板功能障礙的建議檢查。(註:現代 BT 敏感性受質疑,臨床多綜合評估,但本題考點為「尿毒→血小板功能→出血時間」。)","options":{"A":"PT 評估外在凝血途徑(凝血因子),非血小板功能。","B":"PTT 評估內在凝血途徑,非血小板功能。","C":"正解。尿毒症致血小板功能異常,以出血時間評估血小板功能。","D":"TT 評估纖維蛋白原轉纖維蛋白,非血小板功能。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"102110-03":{"quick":"現行麻醉風險的術前身體狀況分級是「ASA physical status classification(美國麻醉醫學會身體狀態分級 I–VI)」。","detail":{"background":"麻醉前以「ASA physical status classification(ASA-PS)」評估病人整體身體狀況與麻醉風險:I=健康;II=輕度全身性疾病(控制良好的高血壓/糖尿病、吸菸、肥胖);III=嚴重全身性疾病但非持續威脅生命(控制不良 DM/HTN、COPD、穩定心絞痛);IV=嚴重全身性疾病且持續威脅生命(近期 MI/中風、嚴重瓣膜病、敗血);V=瀕死、不手術即難存活(破裂主動脈瘤、大量顱內出血);VI=腦死器官捐贈者;緊急手術加「E」。ASA-PS 與圍術期併發症/死亡率相關,是溝通與風險分層的通用語言。對照:APACHE 是 ICU 重症評分、Apgar 是新生兒評估、RISK 非標準分級。本題答案 B。","options":{"A":"APACHE 是 ICU 重症評分系統,非術前麻醉分級。","B":"正解。ASA physical status classification 是現行麻醉風險評估系統。","C":"Apgar score 評估新生兒,非麻醉風險。","D":"RISK 非標準麻醉分級系統。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"104090-06":{"quick":"A 為錯誤:惡性高溫(malignant hyperthermia)「不是過敏反應」,而是遺傳性骨骼肌「鈣離子調節異常」(RYR1 基因突變),觸發後肌漿網大量釋鈣致高代謝;非「鈣釋放到血液」也非過敏。其餘:過敏性休克與 IgE 有關、全麻可低/高體溫、低血壓需考慮心輸出與血管阻力皆正確。","detail":{"background":"全身麻醉併發症。(A)錯誤(本題答案):惡性高溫(MH)是「遺傳性骨骼肌疾病」(多為 RYR1 或 CACNA1S 基因突變),由揮發性麻醉劑或 succinylcholine 觸發,使「肌漿網(sarcoplasmic reticulum)」內鈣離子失控大量釋放到「肌漿(細胞內)」,造成持續肌肉收縮、高代謝(高 CO2、高溫、酸中毒、肌僵直、橫紋肌溶解、高血鉀),是「藥物觸發的代謝危機」而「非過敏(免疫)反應」,且鈣是釋放到細胞質內非血液。治療為立即停觸發藥、給 dantrolene、降溫、支持。(B)正確:全麻過敏性休克(anaphylaxis,常因肌鬆劑、抗生素、乳膠)機轉與 IgE 媒介有關。(C)正確:全麻多致低體溫,少數高體溫(MH、過度保溫、敗血)。(D)正確:全麻低血壓須同時考慮心輸出量(心肌抑制/前負荷)與血管阻力(血管擴張)。","options":{"A":"正解(錯誤)。惡性高溫是遺傳性肌肉鈣調節異常,非過敏;鈣釋入細胞質非血液。","B":"正確。全麻過敏性休克機轉與 IgE 有關。","C":"正確。全麻可發生低體溫或高體溫。","D":"正確。全麻低血壓須同時考慮心輸出與血管阻力。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"105100-07":{"quick":"當日(門診)手術後出現嚴重噁心嘔吐、血壓不穩、嚴重疼痛未控制、或預期外手術後遺症,皆應考慮延遲出院或住院;故①②③④全部。","detail":{"background":"當日手術(ambulatory/day surgery)的出院須符合安全標準(常用 PADSS:生命徵象穩定、行動/意識恢復、疼痛可控、噁心嘔吐輕微、無明顯出血、有人陪同)。出現下列任一狀況應「延遲出院或住院觀察」:①嚴重持續的噁心、嘔吐(無法進食/脫水/誤吸風險);②不穩定的血壓(高或低,提示出血、心血管問題);③嚴重疼痛尚未獲得控制(需靜脈止痛或評估外科原因);④預期外的手術後遺症/併發症(出血、神經學異常、呼吸問題等)。故四者皆是延遲出院指標(本題答案 C,1234)。門診手術安全的關鍵是嚴格的出院準則,避免回家後發生併發症。","options":{"A":"僅 24 遺漏①噁心嘔吐與③疼痛。","B":"僅 23 遺漏①與④。","C":"正解(1234)。四種狀況皆應考慮延遲出院或住院。","D":"僅 34 遺漏①②。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"107080-01":{"quick":"本題一律給分(送分)。核磁共振(MRI)室為強磁場環境,鐵磁性設備(如一般 Macintosh 喉鏡含鐵、傳統電擊器)有飛射與干擾危險,須用 MRI 相容設備;因選項設計爭議,考選部認定一律給分。","detail":{"background":"MRI 室麻醉的安全核心是「強磁場(常 1.5–3 Tesla)」環境:任何鐵磁性(ferromagnetic)物品會被磁場吸引成「飛射物(projectile)」造成傷害,且金屬會干擾影像與被射頻加熱。須使用「MRI 相容(MR-conditional/safe)」設備:非鐵磁血壓壓脈帶與連接、MRI 相容的監測線/血氧探頭(避免燒燙傷)、MRI 相容麻醉機與喉鏡;傳統含鐵的 Macintosh 喉鏡、標準電擊器(defibrillator)不可帶入磁場核心區(電擊須將病人移出至安全區或用 MRI 相容/區域外設備)。本題列出血壓壓脈帶、Macintosh 喉鏡、電擊器、血氧探頭何者「可安全使用」,因各項是否安全取決於是否為 MRI 相容版本、題目選項設計有歧義,考選部最終「一律給分」。學習重點:MRI 麻醉須全面使用 MRI 相容設備、嚴格管控鐵磁物、注意監測線燒傷與遠端監測。","options":{"A":"一律給分。","B":"一律給分。","C":"一律給分。","D":"一律給分。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"107080-06":{"quick":"D 為錯誤:術後譫妄的危險因子與「男性」較相關(或性別非主要),而「女性發生率較高」不正確。視聽障礙、骨科/大手術、疼痛控制不良皆為譫妄危險因子。","detail":{"background":"術後譫妄(postoperative delirium)在高齡病人常見,危險因子:高齡、術前認知功能障礙/失智、視覺或聽覺障礙(感覺剝奪)、多重共病與多重用藥、酒精/苯二氮平依賴、骨科手術(尤髖部骨折)與大手術、急診手術、術後疼痛控制不良、睡眠剝奪、感染、電解質異常、低氧、某些藥物(抗膽鹼藥、benzodiazepine、meperidine)。題目問「錯誤」者:(D)「女性發生率較高」不正確——一般而言譫妄與性別關係不大或「男性」風險略高,並非女性較高(本題答案)。其餘(A 視聽障礙、B 骨科/大手術、C 疼痛控制不良)皆為已知危險因子。預防:多元介入(定向、感官輔具、早期活動、適當止痛避免過度鎮靜、維持睡眠、避免誘發藥物)。","options":{"A":"正確。視覺/聽覺障礙者譫妄發生率較高。","B":"正確。骨科或大手術者發生率較高。","C":"正確。疼痛控制不良增加譫妄。","D":"正解(錯誤)。並非女性發生率較高(與男性較相關或性別非主要因子)。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"108080-01":{"quick":"D 為錯誤:不只全身麻醉,「區域麻醉(神經軸)也應監測體溫」——神經軸麻醉阻斷交感、抑制中樞溫度調節與血管收縮,同樣會低體溫,故須監測,並非可不必監測。其餘核心溫度部位、低體溫多於高體溫、直腸溫反應較慢皆正確。","detail":{"background":"麻醉中體溫監測。(A)正確:核心溫度較穩定,常用測量部位含鼻咽(nasopharynx)、食道、鼓膜、肺動脈、膀胱。(B)正確:麻醉中體溫異常以「低體溫(hypothermia)」多於高體溫(全麻+暴露+冷環境+輸冷液)。(C)正確:直腸溫(rectal)反映較慢、在體外循環等快速溫度變化時落後於核心溫度。(D)錯誤(本題答案):「區域麻醉(尤神經軸/脊髓硬膜外)也會發生低體溫並應監測」——神經軸麻醉阻斷下半身交感,抑制溫度調節性血管收縮與寒顫、並使體熱由核心向周邊再分布,病人常低體溫(且因感覺被阻斷較不自覺寒冷),故同樣需監測與保溫;說「區域麻醉可不必監測體溫」不正確。臨床:術中應主動保溫(暖風毯、加溫輸液)維持核心>36°C。","options":{"A":"正確。核心溫度常測鼻咽等部位。","B":"正確。麻醉中低體溫多於高體溫。","C":"正確。直腸溫在體外循環時反應較核心溫度慢。","D":"正解(錯誤)。區域(神經軸)麻醉也會低體溫,應監測,非可不必。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"108080-02":{"quick":"手術室外麻醉指引要求:足夠的麻醉照護空間、可靠氧氣供應、適合的生理監測;且「必須」備有電擊器等急救設備,故「勿需準備電擊器」錯誤——正確組合為僅①②③。","detail":{"background":"ASA「手術室外麻醉地點(non-operating room anesthetizing locations)」指引,要求這些遠離開刀房的場所(內視鏡室、導管室、放射科、MRI 等)須具備與開刀房相當的安全條件:①足夠的空間供麻醉照護與人員操作;②可靠的氧氣供應(及備用氧氣);③適合的監測儀器(SpO2、EtCO2、ECG、血壓、體溫);足夠的電源/照明/吸引;以及完整的「急救與復甦設備——包括電擊器(defibrillator)、急救車、藥物」與訓練人員、術後恢復照護。題目④「勿需準備電擊器」是錯誤(急救須備電擊器),故正確組合為「僅①②③」(本題答案 A)。重點:手術室外麻醉風險不低於開刀房,安全標準不可打折,急救設備必備。","options":{"A":"正解(僅123)。須足夠空間、可靠氧氣、適當監測;且必須備電擊器。","B":"1234 把④(勿需電擊器)納入,錯誤。","C":"僅14 遺漏②③。","D":"僅234 遺漏①、且納入④,錯誤。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"109020-03":{"quick":"B 為錯誤:在 pacemaker 上放磁鐵只是讓它轉為「非同步固定頻率起搏」,「不能完全避免」電燒(electrocautery)干擾與危害;仍須用雙極電燒/短脈衝、備外部起搏與廠商諮詢。其餘術前重新檢查、關 ECG filter、加 SpO2 皆正確。","detail":{"background":"裝心臟節律器/植入式去顫器(CIED)病人圍術期管理。(A)正確:非心臟常規手術前應重新確認裝置型號、功能、依賴度與設定(諮詢心臟科/廠商)。(B)錯誤(本題答案):於 pacemaker 上放磁鐵會使其轉為「非同步固定頻率起搏(asynchronous pacing)」(避免電燒被誤判為自身心跳而抑制起搏),但這「不能完全避免」電燒干擾與危害(對 ICD 放磁鐵則是暫停抗心搏過速治療,作用不同),故說「即可完全避免」是錯誤;仍須採取多重措施(雙極電燒、短脈衝、燒灼板遠離裝置、備經皮/經靜脈起搏與去顫)。(C)正確:術中應關閉 ECG 監視器的 filter,以免濾掉而看不到節律器放電棘波(pacing spikes),影響判讀。(D)正確:術中除 ECG 外,應併用 pulse oximetry(及動脈導管/觸脈)確認「機械性」心搏輸出(因電燒干擾 ECG 時,SpO2 波形/脈搏可確認實際灌流)。","options":{"A":"正確。術前應重新檢查節律器功能與設定。","B":"正解(錯誤)。放磁鐵轉為非同步起搏,不能「完全」避免電燒干擾。","C":"正確。關閉 ECG filter 以免看不到起搏棘波。","D":"正確。併用 pulse oximetry 確認機械性心搏輸出。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"109020-06":{"quick":"C 為錯誤:碎石(lithotomy)姿勢過度屈髖外展拉扯,增加的是「閉孔/坐骨/腓總神經」等受損風險,而非「股神經」(髖過度屈/外旋牽拉與壓迫);題目把過度拉扯腿後肌歸為股神經受損,不符 ASA 建議。其餘擺位耐受、胸捲軸、手肘屈曲傷尺神經皆正確。","detail":{"background":"ASA 預防術中周邊神經損傷建議(positioning)。(A)正確:術前評估病人能否耐受預期擺位(尤清醒時測試極端體位耐受度)。(B)正確:側臥時於腋下放胸捲軸(chest roll/axillary roll)以避免壓迫下方臂神經叢與腋動脈。(D)正確:手肘過度屈曲或壓迫肘內側會傷尺神經(肘隧道),須墊護並避免屈曲>90°、避免內上髁受壓。(C)錯誤(本題答案):碎石位(lithotomy)過度屈髖、外展外旋與小腿支架壓迫,增加的是「腓總神經(腓骨頭受壓,足下垂)、坐骨神經、閉孔/隱神經」損傷風險,以及「股神經」可因過度屈髖牽拉/壓迫而受損——但題目把「過度拉扯腿後肌群增加股神經受損」這一因果敘述設為與 ASA 建議不符的選項(碎石位股神經損傷主要是過度屈髖外旋牽拉,而非「拉扯 hamstring」),故為非建議/錯誤敘述。重點:擺位須維持中立、避免過度牽拉與壓迫、墊護易受傷部位。","options":{"A":"正確。術前確認病人能否耐受預期擺位。","B":"正確。側臥用胸捲軸降低臂神經叢受損。","C":"正解(不是建議/錯誤)。碎石位主要增加腓總/坐骨等神經受損;敘述股神經因拉扯腿後肌不符。","D":"正確。手肘屈曲增加尺神經受損風險。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"110020-03":{"quick":"C 為錯誤:區域(神經軸)麻醉「也會」影響中樞溫度調節並致低體溫,「仍須體溫監測」;說「不須監測」錯誤。低體溫致寒顫增代謝、>30 分鐘全麻須監測維持>36°C、老人血管收縮閾值較低易失溫皆正確。","detail":{"background":"麻醉體溫監測。(A)正確:術後低體溫引發寒顫(shivering),成人可增加代謝產熱 50–100%,使耗氧與心肌負荷增加,對心血管病人不利(增心肌缺血風險)。(B)正確:超過 30 分鐘的全身麻醉應常規監測體溫,目標維持核心溫度≥36°C(避免圍術期低體溫的併發症:出血增加、傷口感染、藥物代謝變慢、心臟事件、甦醒延遲)。(C)錯誤(本題答案):「區域(神經軸)麻醉只影響周邊溫度控制、不須體溫監測」不正確——神經軸麻醉阻斷交感與感覺,會抑制「中樞」溫度調節性血管收縮與寒顫、並使體熱再分布,同樣造成低體溫,故仍須監測與保溫;且雖然神經軸麻醉本身與惡性高熱無關,但低體溫風險真實存在。(D)正確:老年人血管收縮的溫度閾值較低(調節遲鈍),較易失溫。","options":{"A":"正確。寒顫增加代謝產熱,對心血管病人有風險。","B":"正確。>30 分鐘全麻應監測體溫並維持≥36°C。","C":"正解(錯誤)。區域麻醉也影響中樞溫度調節、會低體溫,仍須監測。","D":"正確。老人血管收縮閾值較低,更易失溫。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"110020-06":{"quick":"B 為錯誤:頭低腳高(Trendelenburg)姿勢用於「下腹部/骨盆」手術(使腸往頭側、利於骨盆視野),「上腹部」手術反而用「反 Trendelenburg(頭高腳低)」;故說上腹部手術採頭低腳高錯誤。其餘喉頭水腫、升 CVP/ICP/IOP、FRC 下降皆正確。","detail":{"background":"頭低腳高(Trendelenburg)姿勢的生理影響與適應。(A)正確:長時間頭低使頭頸部靜脈回流受阻、淤血,可致喉頭/顏面水腫,拔管後上呼吸道阻塞風險(故術後須評估漏氣試驗、謹慎拔管)。(B)錯誤(本題答案):Trendelenburg(頭低腳高)用於「下腹部/骨盆腔」手術(如骨盆腔腹腔鏡、攝護腺切除),使腸子滑向頭側、改善骨盆視野;「上腹部」手術應採「反 Trendelenburg(頭高腳低)」使腹腔內容下移、改善上腹視野與膈肌位置——故說上腹部採頭低腳高是錯誤。(C)正確:頭低使靜脈回流增加,升高中央靜脈壓、顱內壓與眼內壓(機器人攝護腺手術尤須注意眼壓)。(D)正確:腹內容物與膈肌上推,功能性肺餘容量(FRC)下降、增加肺塌陷(atelectasis)與通氣障礙風險。","options":{"A":"正確。長時間頭低可致喉頭水腫、上呼吸道阻塞。","B":"正解(錯誤)。上腹部手術用反 Trendelenburg(頭高腳低),非頭低腳高。","C":"正確。頭低腳高升高 CVP、顱內壓與眼內壓。","D":"正確。FRC 下降,增加肺塌陷風險。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"111020-03":{"quick":"A 正確:麻醉開始後最常見的低體溫是「重分布性低體溫(redistribution hypothermia)」——麻醉致血管擴張使核心熱量向周邊重分布,核心溫第 1 小時即降約 0.5–1.5°C。B/C/D 皆錯。","detail":{"background":"圍術期低體溫的三相:第一相「重分布(redistribution)」——麻醉誘導使血管擴張(全麻抑制溫度調節性血管收縮、神經軸阻斷交感),核心的熱往周邊組織重分布,「核心溫在第 1 小時即下降約 0.5–1.5°C」,這是最主要且最快的初始失溫機轉(A 正確,本題答案);第二相「線性散熱(輻射/對流)」緩慢下降;第三相「平台期」(達到血管收縮閾值後核心溫趨穩)。(B)錯誤:「體表加溫(預先暖身 pre-warming)」雖能減少重分布(先暖周邊縮小核心-周邊溫度梯度),但「單純術中體表加溫對第 1 小時的重分布低體溫預防效果有限」——最有效是「術前預暖(pre-warming)」;故說「體表加溫可有效預防第 1 小時低體溫」不正確。(C)錯誤:呼吸道加溫加濕對「小兒」相對較有效(小兒經呼吸道散熱比例較高),非對成人較有效。(D)錯誤:區域(神經軸)麻醉「會」影響中樞溫度調節並致低體溫,並非較不會。","options":{"A":"正解。麻醉後最常見是重分布性低體溫,核心溫第 1 小時降 0.5–1.5°C。","B":"錯誤。術中體表加溫對第 1 小時重分布低體溫預防有限(預暖較有效)。","C":"錯誤。呼吸道加溫加濕對小兒相對較有效,非成人。","D":"錯誤。區域麻醉也影響中樞溫度調節、會低體溫。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"111020-05":{"quick":"預防術後噁心嘔吐(PONV)可用 dexamethasone(類固醇,作用機轉未全明但確有預防效果)。edrophonium(膽鹼酯酶抑制)、fentanyl(opioid,反致 PONV)、atracurium(肌鬆劑)皆非止吐。","detail":{"background":"術後噁心嘔吐(PONV)的預防用藥(多模式、多受體):5-HT3 拮抗劑(ondansetron)、類固醇 dexamethasone(誘導後給,預防效果佳、機轉未完全明)、NK-1 拮抗劑(aprepitant)、抗多巴胺(droperidol、metoclopramide)、抗組織胺、抗膽鹼(scopolamine 貼片)、以及減少誘因(用 propofol TIVA、減少揮發劑與 opioid、足夠輸液)。Apfel 風險因子:女性、不吸菸、暈車/PONV 病史、術後使用 opioid。本題選項中「dexamethasone」是預防 PONV 的藥(答案 A);edrophonium 是抗膽鹼酯酶(逆轉肌鬆,反增腸蠕動/噁心)、fentanyl 是 opioid(反「增加」PONV)、atracurium 是肌鬆劑(無止吐)。","options":{"A":"正解。dexamethasone 可預防性降低術後噁心嘔吐。","B":"edrophonium 是抗膽鹼酯酶,非止吐,且可能增加噁心。","C":"fentanyl 是 opioid,反而增加 PONV。","D":"atracurium 是肌鬆劑,無止吐作用。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"111020-07":{"quick":"B 為錯誤:PACU(恢復室)「不是幾乎都高血壓」——低血壓也常見(出血、低血容、殘餘麻醉、心因性);故說「不會有低血壓」不正確。噁心嘔吐常見、標準監測含呼吸循環體溫清醒度、某些抗生素延長肌鬆劑作用皆正確。","detail":{"background":"麻醉恢復室(PACU)觀察重點。(A)正確:噁心嘔吐(PONV)是 PACU 常見問題。(B)錯誤(本題答案):PACU 的血壓異常「高血壓與低血壓都常見」——高血壓(疼痛、躁動、膀胱脹、高碳酸、原有高血壓)與「低血壓(出血/低血容、殘餘麻醉與血管擴張、心律不整、心肌缺血、過敏)」皆須警覺;說「幾乎都高血壓、不會有低血壓」不正確。(C)正確:PACU 標準監測含呼吸(SpO2、呼吸型態)、循環(血壓、心律 ECG)、體溫、清醒度/意識,並評估疼痛、噁心、出血、引流。(D)正確:某些抗生素(胺基糖苷類 aminoglycosides、clindamycin、多黏菌素)有神經肌肉阻斷增強作用,可延長/再現肌鬆劑作用(再箭毒化 recurarization),須注意術後無力/呼吸抑制。","options":{"A":"正確。噁心嘔吐是 PACU 常見問題。","B":"正解(錯誤)。PACU 低血壓也常見,並非幾乎都高血壓。","C":"正確。標準監測含呼吸、循環、體溫、清醒度。","D":"正確。部分抗生素可延長肌鬆劑作用。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"112020-02":{"quick":"D 為錯誤:神經軸(neuraxial)麻醉「會」發生體溫過低(阻斷交感與溫度調節、體熱再分布),並非不會。全麻降低保溫閾值、低室溫加重、初始失溫主要為再分布皆正確。","detail":{"background":"圍術期低體溫機轉。(A)正確:全身麻醉劑降低身體啟動「血管收縮」與「寒顫」等保溫反應的「閾值(threshold)」(調節區間變寬),使病人更易失溫。(B)正確:開刀房低室溫(冷環境)經輻射/對流加速散熱。(C)正確:絕大部分「初始」失溫導因於麻醉致血管擴張、核心熱往周邊「再分布(redistribution)」。(D)錯誤(本題答案):「神經軸麻醉不會發生體溫過低」不正確——脊髓/硬膜外麻醉阻斷下半身交感,抑制溫度調節性血管收縮與寒顫、並使體熱再分布,同樣會低體溫(且病人因感覺被阻斷較不覺冷、寒顫被抑制),故須監測與保溫。整合:無論全麻或區域麻醉,圍術期低體溫都常見且須主動預防(預暖、暖風毯、加溫輸液)。","options":{"A":"正確。全麻劑降低血管收縮與寒顫的保溫閾值。","B":"正確。低室溫加重散熱。","C":"正確。初始失溫主因是體熱由核心向周邊再分布。","D":"正解(錯誤)。神經軸麻醉也會發生體溫過低。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"112080-41":{"quick":"腹腔鏡 CO2 氣體栓塞處置:停氣腹/抽出腹內 CO2、頭低左側臥(Durant 姿勢,使氣泡留在右心尖避免阻塞肺動脈出口)、由中央導管抽氣、支持循環與通氣。「右側臥」較少考慮(應為「左側臥」),故 B 較不適當。","detail":{"background":"腹腔鏡灌注的 CO2 若進入靜脈(經破損血管)造成氣體栓塞,大量時氣泡卡在右心室流出道/肺動脈形成「氣鎖(air lock)」致循環衰竭。處置原則:(1)立即停止灌氣、解除氣腹、由腹腔抽出 CO2(A 適當);(2)100% 氧、停 N2O(避免氣泡擴大)、過度通氣排 CO2;(3)擺位「頭低 + 左側臥(left lateral decubitus, Durant maneuver)」使氣泡浮聚於右心尖、遠離肺動脈出口,避免氣鎖;(4)經中央靜脈導管(若已置入,導管尖在右房)抽吸氣體(C 適當);(5)支持循環(升壓、輸液、必要時 CPR)。題目問「較少考慮」者:(B)「右側躺(right lateral decubitus)」方向錯誤——應為「左側臥」,故 B 最不恰當(本題答案)。注意:CO2 溶解度高,小量栓塞常可被吸收,但大量仍致命。","options":{"A":"適當。停氣腹並抽出腹腔內 CO2。","B":"正解(較少考慮)。應為「左側臥」(Durant),非右側臥。","C":"適當。經大孔徑中央靜脈導管抽吸氣體。","D":"適當。頭低(右心房高於頭)有助氣泡聚於右心尖。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"114020-06":{"quick":"Aldrete score 評估離開恢復室,五項各 0–2 分:活動(activity)、呼吸(respiration)、循環(circulation)、意識(consciousness)、血氧(oxygen saturation);「疼痛(pain)」不在原始 Aldrete 項目中(在改良 PADSS 才納入),故為正解(不包含)。","detail":{"background":"Aldrete scoring system 用於評估病人能否安全離開麻醉恢復室(PACU),五大項各評 0、1、2 分(滿分 10,≥9 分可轉出):(1)Activity 活動(能自主或依指令移動四肢);(2)Respiration 呼吸(能深呼吸與咳嗽/呼吸受限/呼吸暫停);(3)Circulation 循環(血壓與術前相差幅度);(4)Consciousness 意識(完全清醒/可喚醒/無反應);(5)Oxygen saturation 血氧飽和度(室內空氣 SpO2>92%/需氧/<90%)。題目問「不包含」者:「疼痛(pain)」不在原始 Aldrete 五項內(本題答案 D)——疼痛、噁心嘔吐、出血、行走、進食/排尿等是「改良出院準則(PADSS,門診手術出院評分)」才納入的項目。學習:Aldrete=活動/呼吸/循環/意識/血氧;PADSS 另含疼痛、PONV、出血、活動、生命徵象。","options":{"A":"意識(consciousness)是 Aldrete 項目之一。","B":"循環(血壓相差)是 Aldrete 項目之一。","C":"血氧飽和度是 Aldrete 項目之一。","D":"正解。疼痛(pain)不在原始 Aldrete 五項(屬改良 PADSS)。"},"sources":["Miller's Anesthesia 9e, Preoperative Evaluation & Perioperative Complications","Morgan & Mikhail's Clinical Anesthesiology 6e","ASA Physical Status Classification; PACU/Aldrete"]}},"101030-08":{"quick":"癌症疼痛治療的理想給藥模式是「口服(oral)」——簡單、非侵入、可居家、維持穩定血中濃度,符合 WHO 癌痛三階梯「by mouth」原則。","detail":{"background":"WHO 癌症疼痛處置三大原則:by mouth(優先口服)、by the clock(依時定時給藥而非疼痛才給)、by the ladder(依疼痛強度階梯式:非鴉片→弱鴉片→強鴉片±輔助藥)。「口服」是理想給藥途徑——非侵入、方便、可居家自我管理、成本低、能維持穩定血中濃度(尤緩釋劑型),適合慢性癌痛長期使用。當病人無法口服(吞嚥困難、嘔吐、末期)才改穿皮貼片、皮下、靜脈或脊椎內給藥。靜脈(B)起效快但需管路、肌肉注射(D)疼痛且吸收不穩定(已不建議常規)、脊椎內(A)為侵入性保留給難治性疼痛。本題答案 C(口服)。","options":{"A":"脊椎內給藥屬侵入性,保留給難治性癌痛,非理想常規模式。","B":"靜脈給藥起效快但需管路,非居家長期理想模式。","C":"正解。口服是癌痛理想給藥模式(WHO by mouth)。","D":"肌肉注射疼痛且吸收不穩定,已不建議常規使用。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"101030-09":{"quick":"2 歲以內小兒疝氣修補術後止痛,最廣泛使用的是「尾椎(薦管)阻斷(caudal block)」——薦裂易定位、單次注射即可涵蓋下腹/會陰、安全有效。","detail":{"background":"Caudal block(尾椎/薦管硬膜外阻斷)是小兒下腹部、會陰、下肢手術(疝氣、包皮、下尿道)最廣泛使用的術後止痛方式:幼兒薦裂(sacral hiatus)由薦角易觸定位、單次注射局麻藥(±佐劑)即可提供下半身鎮痛數小時,技術相對簡單、安全、避免全身性 opioid 的呼吸抑制與術後噁心,且可在全麻誘導後施行。對照:硬脊膜外導管(B)較複雜、PCA(C)需病人配合(幼兒無法操作)、全身 opioid(D)有呼吸抑制與 PONV 風險。本題答案 A(caudal block)。","options":{"A":"正解。尾椎(薦管)阻斷是 2 歲以內小兒疝氣術後最廣泛使用的止痛方式。","B":"硬脊膜外阻斷技術較複雜,非此年齡最廣泛使用。","C":"PCA 需病人自行操作,幼兒無法使用。","D":"全身 opioid 有呼吸抑制與 PONV 風險,非首選。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"102110-02":{"quick":"口服 opioid 中半衰期最長的是 methadone(美沙冬,半衰期長且個體差異大,易蓄積)。","detail":{"background":"Methadone(美沙冬)是合成的長效 µ-opioid 致效劑(兼 NMDA 拮抗、血清素/正腎再回收抑制),其血漿半衰期長(約 15–60 小時,個體差異大)且鎮痛作用時間與半衰期不一致(鎮痛 6–8 小時但藥物蓄積久),反覆給藥易蓄積致延遲性呼吸抑制,並有 QT 延長與複雜藥物交互作用,故須由有經驗者謹慎滴定。相較:codeine、morphine、oxycodone 半衰期約 2–4 小時(較短)。本題問口服 opioid 半衰期「最長」者為 methadone(答案 D)。臨床用於鴉片成癮替代治療與難治癌痛/鴉片輪替。","options":{"A":"codeine 半衰期約 2–4 小時。","B":"morphine 半衰期約 2–4 小時。","C":"oxycodone 半衰期約 3–4 小時。","D":"正解。methadone 半衰期最長(約 15–60 小時),易蓄積。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"102110-05":{"quick":"長期口服嗎啡者須同時給予「軟便劑」——opioid 引起便秘(腸蠕動抑制)是不會耐受的持久副作用,必須預防性處理。","detail":{"background":"Opioid 的多數副作用(鎮靜、噁心、呼吸抑制)會隨時間產生耐受,但「便秘(opioid-induced constipation)」是「不會耐受」的持久副作用——opioid 作用於腸道 µ 受體抑制蠕動、增加水分吸收,長期使用幾乎必然便秘,故開立長期 opioid 時應「常規預防性併用軟便劑/緩瀉劑(stool softener/laxative,如 senna、docusate、polyethylene glycol;頑固者用 PAMORA 如 methylnaltrexone)」並衛教飲食/水分。本題答案 D(軟便劑)。其餘:鎮靜劑/止癢劑/止瀉劑非常規併用(止瀉更不該,opioid 本身致便秘)。","options":{"A":"鎮靜劑非常規併用(opioid 本身有鎮靜)。","B":"止癢劑僅在搔癢時用,非常規預防。","C":"止瀉劑錯誤,opioid 本身致便秘。","D":"正解。長期 opioid 須併用軟便劑預防便秘(不會耐受的副作用)。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"103030-07":{"quick":"A 為錯誤:此長期用嗎啡(opioid 耐受)的股骨骨折病人,「半身麻醉(神經軸/區域)優於全身麻醉」——可提供良好止痛、減少全身 opioid 需求、降低呼吸抑制與術後併發症;故「全麻較佳」不正確。NSAID、opioid、PCA 皆可用。","detail":{"background":"長期服用嗎啡(opioid 耐受/依賴)的病人行股骨骨折手術。(A)錯誤(本題答案):這類下肢手術,「半身麻醉(脊髓/硬脊膜外或周邊神經阻斷)通常優於全身麻醉」——提供完善的術中與術後止痛、減少全身 opioid 用量與呼吸抑制風險、降低血栓與肺部併發症;故說「全身麻醉較半身麻醉為佳」不正確(且須注意 opioid 耐受者圍術期需求量增加、避免戒斷)。(B)正確:術後可加 NSAID(多模式止痛,減少 opioid)。(C)正確:可續用/使用 opioid(且因耐受需較高劑量,不可貿然減量以免戒斷與止痛不足)。(D)正確:可用 PCA 讓病人依需求自控止痛(背景劑量須涵蓋其平日用量)。整合:opioid 耐受者圍術期應維持其基礎 opioid、加多模式止痛與區域麻醉。","options":{"A":"正解(錯誤)。下肢手術半身麻醉通常優於全身麻醉(止痛佳、減少 opioid 與併發症)。","B":"正確。術後可使用 NSAID 多模式止痛。","C":"正確。可使用 opioid(耐受者需較高劑量)。","D":"正確。可使用 PCA 自控止痛。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"103100-07":{"quick":"腎衰竭病人急性疼痛不適合用 meperidine(pethidine)——其代謝物 normeperidine 經腎排除,腎衰時蓄積致中樞興奮、抽搐。","detail":{"background":"Meperidine(pethidine,配西汀)代謝產生「normeperidine(去甲哌替啶)」,具中樞興奮/致痙攣性、經腎排除,在「腎衰竭」病人會蓄積,導致顫抖、肌陣攣、躁動、抽搐(且 naloxone 無法逆轉此神經毒性、反可能加重),故腎衰竭(及老人、長期使用)病人「不適合」用 meperidine 止痛(本題答案 C)。對照:remifentanil 經血漿/組織酯酶水解、不依賴腎(安全);fentanyl 經肝代謝、活性代謝物少(相對安全,可用);codeine 須經 CYP2D6 代謝為嗎啡且其代謝物經腎、腎衰時須謹慎,但相對 meperidine 在本題中較適合。臨床:腎衰竭止痛避免 meperidine 與 morphine(M6G 蓄積),偏好 fentanyl/hydromorphone 並減量。","options":{"A":"remifentanil 經酯酶水解、不依賴腎,腎衰竭安全。","B":"codeine 須經肝代謝;相對 meperidine 較適合(非本題答案)。","C":"正解。meperidine 代謝物 normeperidine 經腎排除,腎衰竭蓄積致抽搐,不適合。","D":"fentanyl 經肝代謝、無明顯活性腎排代謝物,腎衰竭相對安全。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"104030-06":{"quick":"C 為錯誤:病人自控止痛(PCA)「適用」於癌症病患(尤難治、爆發痛),並非不適用。可立即給嗎啡、加抗癲癇藥(神經病變痛)、脊椎內嗎啡皆為正確的癌痛處置。","detail":{"background":"肺癌骨轉移、重度疼痛(8/10)且僅用 acetaminophen 的病人(止痛明顯不足)。(A)正確:依 WHO 階梯,重度癌痛應「立即升級給強 opioid(嗎啡)」,不必拘泥逐階。(B)正確:骨轉移痛常合併神經病變成分,可加「抗癲癇藥(gabapentin/pregabalin)、抗憂鬱(TCA/SNRI)、雙磷酸鹽、類固醇、放療」等輔助治療。(C)錯誤(本題答案):「PCA 不適用於癌症病患」不正確——PCA(靜脈或皮下、含背景輸注+病人自控追加)非常適合癌症病患的持續性與爆發性疼痛控制,提供即時個別化止痛。(D)正確:難治癌痛可用「脊椎內(intrathecal/epidural)嗎啡」(植入式幫浦),以極小劑量達強效鎮痛、減少全身副作用。整合:癌痛應積極階梯升級+多模式+介入性(神經阻斷/脊椎內幫浦)。","options":{"A":"正確。重度癌痛可立即給嗎啡。","B":"正確。可加抗癲癇藥處理神經病變痛。","C":"正解(錯誤)。PCA 適用於癌症病患,非不適用。","D":"正確。脊椎內嗎啡是癌痛止痛方式之一。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"105020-07":{"quick":"D 為錯誤:慢性非癌症疼痛須「多專科團隊(復健、心理、職能、藥物、介入)整合治療」;麻醉醫師「不只是」用神經阻斷與藥物,還參與多模式團隊照護。","detail":{"background":"慢性非癌症疼痛(如慢性下背痛)強調「生物-心理-社會(biopsychosocial)」的多專科團隊整合治療,而非單一手段。(A)正確:心理/行為治療(認知行為治療 CBT)對慢性下背痛有幫助(處理疼痛相關認知、情緒、失能行為)。(B)正確:復健以「主動運動(active exercise)」較「被動按摩」對慢性疼痛長期效果佳(增強核心肌力、功能與自我效能)。(C)正確:職能治療(改善日常功能、人體工學、能量管理)對疼痛治療有幫助。(D)錯誤(本題答案):「麻醉醫師就只是利用神經阻斷與藥物」不正確——疼痛專科(含麻醉背景的疼痛科醫師)是多模式團隊一員,除介入性治療(神經阻斷、脊髓刺激、注射)與藥物外,還整合復健、心理、職能、教育等;慢性疼痛不應只靠藥物與阻斷。","options":{"A":"正確。心理行為治療(CBT)可幫助慢性下背痛。","B":"正確。主動運動較被動按摩對慢性疼痛效果好。","C":"正確。職能治療對疼痛治療有幫助。","D":"正解(錯誤)。應多專科團隊整合,麻醉醫師不只用神經阻斷與藥物。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"107080-07":{"quick":"B 正確:「疼痛的解除是病人的基本人權」。A、C、D 皆錯——慢性非癌痛在審慎評估下仍可用 opioid、藥癮病史者疼痛仍應處理(非必先照會精神科)、癌痛 opioid 應依需求充分給予(不應一味求最小劑量而止痛不足)。","detail":{"background":"疼痛處置的倫理與原則。(B)正確(本題答案):「免於疼痛、獲得疼痛解除是病人的基本人權」是現代疼痛醫學的核心理念。(A)錯誤:非癌症慢性疼痛在審慎評估風險效益、規範化監測下「仍可使用 opioid」(雖須謹慎、優先非 opioid 與多模式),並非「絕對不可」。(C)錯誤:有藥物濫用病史的病人若有真實疼痛「仍應即時處理疼痛」(可同時審慎管理成癮風險、必要時跨科合作),而非「須先照會精神科才可處理」——延誤止痛不符人權。(D)錯誤:癌症病人需要 opioid 時應「依疼痛程度充分滴定給予以達有效止痛」,不應一味追求「劑量愈少愈好」而導致止痛不足;癌痛病人對成癮的擔憂不應妨礙適當鎮痛(成癮在癌痛規範使用下少見)。整合:有效止痛是人權,opioid 在癌痛與審慎評估的非癌痛皆有角色。","options":{"A":"錯誤。非癌症慢性疼痛在審慎評估下仍可用 opioid。","B":"正解。疼痛的解除是病人的基本人權。","C":"錯誤。藥癮病史者疼痛仍應即時處理,非必先照會精神科。","D":"錯誤。癌痛 opioid 應依需求充分給予,不應一味求最小劑量。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"108030-07":{"quick":"C 為「除外(非優點)」:PCA 的優點是止痛佳、滿意度高、可依疼痛自控劑量,但「並非任何病患皆可使用」——需病人有認知與操作能力(幼兒、意識不清、無法理解者不適用)。","detail":{"background":"病人自控止痛(patient-controlled analgesia, PCA)相對傳統定時/必要時肌肉注射的優點:(A)止痛效果較佳(血中濃度穩定、減少疼痛波動);(B)病患滿意度較高(自主、即時);(D)病人可依自身疼痛強度按鈕追加劑量(個別化、即時)。安全機制含 lockout interval(鎖定時間)、4 小時/1 小時上限,負回饋設計使疼痛緩解後病人就不再按(故較少過量)。但 PCA「並非任何病患皆可使用」(本題答案 C,除外):需病人具備足夠的認知理解與肢體操作能力——幼兒、意識障礙、嚴重失智、無法理解操作者不適用(可由受訓護理人員或家屬代為的 NCA 須謹慎)。故 C 不是 PCA 的優點。","options":{"A":"正確優點。PCA 提供較佳止痛效果。","B":"正確優點。病患滿意度較高。","C":"正解(除外/非優點)。並非任何病患皆可使用(需認知與操作能力)。","D":"正確優點。病人可依疼痛強度自控劑量。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"108080-08":{"quick":"C 為錯誤:「神經肌肉阻斷劑(肌鬆劑)沒有止痛作用」——它只造成肌肉麻痺,不止痛。opioid、類固醇、抗癲癇藥皆可用於止痛。","detail":{"background":"止痛藥物類別。(A)正確:opioid 用於術後與非術後(癌痛、急慢性)止痛。(B)正確:類固醇(glucocorticoid)用於發炎性疼痛、神經壓迫、骨轉移、顱內壓相關頭痛等輔助止痛。(D)正確:抗癲癇藥(gabapentin、pregabalin、carbamazepine)用於神經病變性疼痛。(C)錯誤(本題答案):「神經肌肉阻斷劑(肌鬆劑,如 rocuronium、cisatracurium)具止痛作用」是錯誤——肌鬆劑只阻斷神經肌肉接合致骨骼肌麻痺,「完全不止痛、不鎮靜、不失憶」(見 A3);單用肌鬆劑而止痛/麻醉不足會造成「清醒但麻痺」的可怕情境。故肌鬆劑無止痛作用。","options":{"A":"正確。opioid 用於術後與非術後止痛。","B":"正確。類固醇可用於止痛治療。","C":"正解(錯誤)。神經肌肉阻斷劑只致肌肉麻痺,無止痛作用。","D":"正確。抗癲癇藥用於神經病變性疼痛。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"109020-05":{"quick":"C 為錯誤:嗎啡引起的呼吸抑制主要經由「µ(mu)受體」(尤 µ2),而非 kappa 受體。opioid 受體含 µ/κ/δ(及 sigma 分類爭議)、皆 G 蛋白偶聯、naloxone 為拮抗劑皆正確。","detail":{"background":"Opioid 受體藥理。(A)正確:opioid 受體包含 µ(mu)、κ(kappa)、δ(delta)(及曾歸類的 sigma,現多不視為典型 opioid 受體)。(B)正確:這些受體皆為「G 蛋白偶聯受體(GPCR)」,活化後抑制腺苷酸環化酶、開鉀通道(過極化)、關鈣通道,抑制神經傳遞。(C)錯誤(本題答案):嗎啡(µ 致效劑)引起的「呼吸抑制、鎮痛、欣快、依賴、便秘、縮瞳」主要經「µ 受體(µ2 介導呼吸抑制與便秘,µ1 介導鎮痛)」,而非 kappa 受體(κ 介導脊髓鎮痛、鎮靜、不悅 dysphoria、利尿)。(D)正確:naloxone 是 opioid 受體競爭性拮抗劑,逆轉 opioid 過量(呼吸抑制)。整合:µ=嗎啡主要作用(含呼吸抑制)。","options":{"A":"正確。opioid 受體含 µ、κ、δ(及 sigma 分類爭議)。","B":"正確。opioid 受體皆與 G 蛋白偶聯。","C":"正解(錯誤)。嗎啡呼吸抑制主要經 µ 受體,非 kappa。","D":"正確。naloxone 是 opioid 受體拮抗劑。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"109080-08":{"quick":"C 為錯誤:PCA「可使用嗎啡以外的多種藥物」(fentanyl、hydromorphone、oxycodone、tramadol 等),並非不宜。其餘:即時有效止痛、降低總劑量、負回饋自控皆正確。","detail":{"background":"PCA 的特性。(A)正確:提供更即時、有效率的止痛(病人感到疼痛即可按鈕追加,血中濃度維持穩定)。(B)正確:相較傳統定時注射,PCA 常「降低止痛藥總劑量」(只在需要時給、避免過量、減少波動)。(C)錯誤(本題答案):「PCA 不宜使用嗎啡以外的藥物」不正確——PCA 可使用多種 opioid(morphine、fentanyl、hydromorphone、oxycodone)甚至非 opioid 或合併局麻藥(硬膜外 PCEA),藥物選擇依病人狀況(腎功能不全避免 morphine 改 fentanyl)。(D)正確:PCA 是「負回饋(negative-feedback)」系統——疼痛時病人按鈕、疼痛緩解(或鎮靜)後就不再按,加上 lockout 與上限,使其相對安全(過度鎮靜的病人不會再按)。","options":{"A":"正確。PCA 提供更即時有效的止痛。","B":"正確。PCA 可降低止痛藥總劑量。","C":"正解(錯誤)。PCA 可用嗎啡以外多種藥物。","D":"正確。PCA 是負回饋自控系統,相對安全。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"110020-05":{"quick":"D 為錯誤:remifentanil 經「組織/紅血球非特異性酯酶」水解,「不」依賴血漿假性膽鹼酯酶,故「pseudocholinesterase 缺乏者不可使用」不正確(其代謝不受影響,可正常使用)。其餘酯酶代謝、半衰期<10 分、不蓄積皆正確。","detail":{"background":"Remifentanil 是超短效 µ-opioid。(A)正確:經「血液中(紅血球)與組織的非特異性酯酶(esterase)」快速水解,不依賴肝腎。(B)正確:其情境敏感半衰期(context-sensitive half-time)恆定約 3–4 分鐘、終端排除半衰期不到 10 分鐘,停藥後作用迅速消失(利於需快速甦醒/可調控的麻醉,但停藥後須提早給長效止痛防爆發痛)。(C)正確:因酯酶快速代謝,即使長時間輸注也「不會蓄積」(無論輸注多久,停藥恢復時間相近)。(D)錯誤(本題答案):remifentanil 代謝靠「非特異性酯酶」而「非血漿假性膽鹼酯酶(pseudocholinesterase)」,故「假性膽鹼酯酶缺乏(影響 succinylcholine、mivacurium 代謝)」的病人「仍可正常使用 remifentanil」,代謝不受影響;說「不可使用」是錯誤。臨床:remifentanil 適合需精準調控與快速甦醒的麻醉,假性膽鹼酯酶異常者不影響其使用。","options":{"A":"正確。remifentanil 經紅血球與組織酯酶水解。","B":"正確。終端排除半衰期不到 10 分鐘。","C":"正確。較不易蓄積(情境敏感半衰期恆定)。","D":"正解(錯誤)。其代謝不依賴假性膽鹼酯酶,該缺乏者仍可使用。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"110020-08":{"quick":"全膝關節置換(TKA)術後止痛中,「坐骨神經阻斷(sciatic nerve block)」止痛效果最差——膝前內側(股神經/隱神經支配)是主要疼痛來源,坐骨神經只管膝後外側部分,單獨阻斷涵蓋不足。","detail":{"background":"TKA 術後疼痛主要來自膝關節前、內側(由股神經 femoral nerve 及其分支隱神經 saphenous 支配),後側僅部分由坐骨神經(sciatic)支配。各止痛技術:硬膜外止痛(A)涵蓋完整、效果佳;股神經阻斷(B)針對主要疼痛區、效果好(但致股四頭肌無力、跌倒風險);內收肌管阻斷(adductor canal block, D)阻斷隱神經(感覺為主、保留股四頭肌力量),止痛效果好且利於早期復健,是現代偏好。坐骨神經阻斷(C)只涵蓋膝後外側,單獨用於 TKA「止痛效果最差」(本題答案)——常作為股神經/內收肌管阻斷的「補充」處理後側痛,而非單獨主力。整合:TKA 多模式止痛常用內收肌管阻斷+局部浸潤(LIA)±IPACK,兼顧鎮痛與運動功能。","options":{"A":"硬膜外止痛涵蓋完整,效果佳。","B":"股神經阻斷針對主要疼痛區(膝前內側),效果好。","C":"正解。坐骨神經阻斷僅涵蓋膝後外側,單獨用於 TKA 止痛效果最差。","D":"內收肌管阻斷(隱神經)止痛佳且保留肌力,效果好。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"111020-08":{"quick":"B 為「非優點」:硬膜外止痛是「阻斷(降低)交感神經外流」,而非「增加 sympathetic outflow」;它的優點是降低全身 opioid、減少腸胃道與肺部併發症。","detail":{"background":"硬膜外止痛(epidural analgesia)用於術後疼痛的優點:(A)提供完善節段性鎮痛,「降低全身性 opioid 用量」與其副作用(呼吸抑制、噁心、腸阻塞);(C)因阻斷交感、改善腸蠕動恢復,「降低術後腸胃道併發症(術後腸麻痺)」;(D)改善咳嗽/深呼吸、減少肺塌陷與肺炎,「降低肺部併發症」(尤胸腹大手術)。題目問「不是優點」者:(B)「增加 sympathetic outflow 提升自我防禦」錯誤(本題答案)——硬膜外局麻藥「阻斷(降低)交感神經外流」(故可能致低血壓、心搏過慢),這是其作用而非「增加交感」;且「降低」手術應激交感反應反而是其益處(減少心肌耗氧、改善預後),所以「增加交感外流」既不正確也不是優點。","options":{"A":"是優點。降低全身性 opioid 使用。","B":"正解(非優點)。硬膜外是「阻斷/降低」交感外流,非增加。","C":"是優點。降低術後腸胃道併發症(腸麻痺)。","D":"是優點。降低術後肺部併發症。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"111080-04":{"quick":"Naloxone 是 opioid 受體專一性競爭拮抗劑,逆轉 opioid 過量造成的呼吸抑制。flumazenil 拮抗 benzodiazepine、dexmedetomidine/ketamine 非拮抗劑。","detail":{"background":"Naloxone 是純 opioid 受體競爭性拮抗劑(對 µ 親和力高),靜脈給予可迅速逆轉 opioid 過量的呼吸抑制、鎮靜與鎮痛。給法:小劑量分次滴定(如 0.04–0.4 mg)以逆轉呼吸抑制而盡量保留鎮痛、避免急性戒斷(高血壓、心搏過速、肺水腫、疼痛反彈、戒斷)。注意作用時間短(30–60 分鐘),常短於長效 opioid(如美沙冬、緩釋劑),須重複給或持續輸注並觀察「再麻醉(renarcotization)」。本題答案 A(naloxone)。對照:flumazenil 拮抗 benzodiazepine;dexmedetomidine(α2 致效)、ketamine(NMDA 拮抗)非 opioid 拮抗劑。","options":{"A":"正解。naloxone 是 opioid 受體專一拮抗劑,逆轉呼吸抑制。","B":"flumazenil 拮抗 benzodiazepine,非 opioid。","C":"dexmedetomidine 是 α2 致效劑,非拮抗劑。","D":"ketamine 是 NMDA 拮抗的麻醉劑,不拮抗 opioid。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"111080-08":{"quick":"D 為錯誤:頸椎硬膜外注射(cervical epidural injection)臨床「有在使用」(治頸神經根痛),只是風險較高須影像導引謹慎執行,並非「未使用」。其餘適應症、影像導引、類固醇加局麻較佳皆正確。","detail":{"background":"慢性疼痛的硬膜外類固醇注射(epidural steroid injection, ESI)。(A)正確:適用於神經根壓迫(椎間盤突出/椎管狹窄)所致的「神經根性疼痛(radicular pain)」,尤輕中度、保守治療無效者。(B)正確:現代常規在「影像導引(尤 X 光透視 fluoroscopy,或 CT)」下進行以確認針位與藥物分布、提升安全與療效。(C)正確:合併「類固醇+局部麻醉藥」較單用局麻藥效果好(抗發炎+止痛)。(D)錯誤(本題答案):「頸椎硬膜外注射風險太高、臨床未使用」不正確——頸椎硬膜外/選擇性神經根注射「臨床有在使用」治療頸神經根病變,只是風險(脊髓/椎動脈損傷、栓塞)較高,須由有經驗者在影像導引、避免顆粒型類固醇經頸椎椎間孔等謹慎措施下執行。故「未使用」敘述錯誤。","options":{"A":"正確。適用於神經根壓迫所致 radicular pain。","B":"正確。通常需影像(透視)導引。","C":"正確。類固醇加局麻藥較單用局麻藥效果好。","D":"正解(錯誤)。頸椎硬膜外注射有在使用(風險較高、須謹慎),非未使用。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"112020-04":{"quick":"B 為錯誤:opioid 是「關閉鈣離子通道、開啟鉀離子通道」(使細胞過極化、抑制神經傳遞),而非「啟動鈣通道、抑制鉀通道」。過極化、內生腦內啡、fentanyl 經皮吸收皆正確。","detail":{"background":"Opioid 細胞訊號。(A)正確:opioid 受體(GPCR)活化使神經元「過極化(hyperpolarization)」、抑制神經傳遞與痛覺。(B)錯誤(本題答案):機轉是「開啟鉀(K+)通道(K+ 外流致過極化)+ 關閉(抑制)電壓門控鈣(Ca2+)通道(減少神經傳遞物釋放)」——題目寫「啟動鈣通道、抑制鉀通道」方向完全相反。(C)正確:endorphins(腦內啡)、enkephalins、dynorphins 是結合 opioid 受體的「內源性肽(endogenous opioid peptides)」。(D)正確:fentanyl 分子量小、高脂溶性,有利經皮吸收,故有 fentanyl 穿皮貼片(用於慢性穩定癌痛)。整合:opioid=開鉀關鈣→過極化→抑制痛覺傳遞。","options":{"A":"正確。opioid 使細胞膜過極化。","B":"正解(錯誤)。opioid 開鉀通道、關鈣通道,題目方向相反。","C":"正確。endorphins 是內源性 opioid 肽。","D":"正確。fentanyl 低分子量高脂溶性,利於經皮吸收。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"112020-08":{"quick":"C 為錯誤:ERAS 多模式止痛「鼓勵使用周邊神經阻斷(peripheral nerve block)」與區域麻醉以減少 opioid、加速恢復,並非「儘量不使用」。NSAID 可能傷腎、PCA 提滿意度、減少鼻胃管皆正確。","detail":{"background":"ERAS(術後加速康復)的多模式止痛(multimodal analgesia)理念:合併多種機轉藥物與「區域麻醉/周邊神經阻斷」以減少 opioid 用量、副作用(腸麻痺、噁心、呼吸抑制)、加速復原。(A)正確:NSAIDs 是多模式一環,但可能造成腎功能損害(尤低血容/老人/腎功能不全),須謹慎。(B)正確:PCA 提高病患滿意度。(C)錯誤(本題答案):ERAS「鼓勵積極使用周邊神經阻斷與區域止痛」(節省 opioid、利早期活動),而非「儘量不使用以加速恢復」——說法相反。(D)正確:ERAS 主張「儘量不置放/早期移除鼻胃管」(即使腸胃道手術,常規鼻胃管不利恢復、增加肺部併發症),搭配早期進食與活動。整合:ERAS=多模式止痛(含區域阻斷)+減少 opioid+早期進食活動+避免不必要管路。","options":{"A":"正確。NSAIDs 是多模式一環,但可能傷腎。","B":"正確。PCA 提高病患滿意度。","C":"正解(錯誤)。ERAS 鼓勵使用周邊神經阻斷,非儘量不用。","D":"正確。ERAS 主張儘量不置放鼻胃管。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"112080-05":{"quick":"C 為錯誤:opioid 長期使用可能產生「痛覺過敏(hyperalgesia,opioid-induced hyperalgesia)」而非「痛覺減退(hypoalgesia)」。肝衰竭嗎啡代謝物蓄積、快速大劑量致胸壁僵直、大劑量抑制 catecholamine 上升皆正確。","detail":{"background":"Opioid 進階藥理。(A)正確:肝衰竭時嗎啡代謝物「morphine-6-glucuronide(活性、有鎮痛與呼吸抑制)、morphine-3-glucuronide」清除下降而蓄積,可致昏迷與呼吸抑制(腎衰竭亦同)。(B)正確:快速施打大劑量 opioid(尤 fentanyl 類)可引起「胸壁僵硬(chest wall/glottic rigidity)」致通氣困難(處置:肌鬆劑或 naloxone)。(C)錯誤(本題答案):opioid 長期使用可能產生「痛覺過敏(opioid-induced hyperalgesia, OIH)」——對疼痛更敏感(與耐受不同),而非「痛覺減退(hypoalgesia)」;題目方向相反。(D)正確:大劑量 opioid(如高劑量 fentanyl)可抑制手術引起的應激交感/catecholamine 上升(故曾用於心臟麻醉以維持血流動力穩定)。整合:OIH 是長期 opioid 的重要概念(增加劑量反而更痛,須考慮輪替/減量/加佐劑)。","options":{"A":"正確。肝衰竭嗎啡代謝物蓄積致昏迷與呼吸抑制。","B":"正確。快速大劑量 opioid 可致胸壁僵硬。","C":"正解(錯誤)。長期 opioid 可致痛覺「過敏」(OIH),非痛覺減退。","D":"正確。大劑量 opioid 抑制手術引起的 catecholamine 上升。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"112080-08":{"quick":"癌症疼痛長期用藥「不適合」靜脈 meperidine(配西汀)——其代謝物 normeperidine 蓄積致神經毒性/抽搐,且作用短、不適合慢性給藥。穿皮 fentanyl、口服 morphine/oxycodone 皆適合長期癌痛。","detail":{"background":"癌症疼痛的長期(慢性)用藥宜選「長效、可口服或穿皮、代謝安全」的 opioid:穿皮 fentanyl(transdermal,適合穩定癌痛、無法口服者)、口服 morphine(緩釋)、口服 oxycodone(緩釋)都是長期癌痛的恰當選擇。「靜脈 meperidine(pethidine)」不適合長期用藥(本題答案 C):其代謝物 normeperidine 具中樞興奮/致痙攣性、蓄積(尤腎功能差、反覆給藥)致顫抖/抽搐;作用時間短(2–3 小時)、效力弱,不適合慢性持續性疼痛;靜脈途徑也不便居家長期。臨床:meperidine 應限於極短期/單次特殊用途(如術後寒顫),不用於慢性癌痛。","options":{"A":"穿皮 fentanyl 適合穩定癌痛長期使用。","B":"口服 morphine(緩釋)是癌痛長期用藥標準。","C":"正解。靜脈 meperidine 代謝物蓄積致神經毒性、作用短,不適合長期癌痛。","D":"口服 oxycodone 適合長期癌痛。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"113070-08":{"quick":"C 為錯誤:analgesia 是「對疼痛刺激無痛覺反應(無痛)」,並非「對所有知覺皆無反應」(那是麻醉/anesthesia)。allodynia、hyperalgesia、paresthesia 定義皆正確。","detail":{"background":"疼痛名詞定義。(A)allodynia(觸誘發痛/異感性疼痛):對「非傷害性(nonnoxious)」刺激(如輕觸、微風)感受為疼痛——正確。(B)hyperalgesia(痛覺過敏):對「傷害性(noxious)」刺激的疼痛反應「加劇/放大」——正確。(C)錯誤(本題答案):analgesia(無痛/止痛)指「在正常會痛的傷害性刺激下沒有疼痛感」,而非「對所有知覺皆無反應」——「對所有知覺皆無反應」是 anesthesia(麻醉,失去所有感覺)的概念。(D)paresthesia(感覺異常):在「無明顯刺激」下卻感受到異樣知覺(如麻、刺、針扎、螞蟻爬),可為非疼痛性。整合:allodynia=非痛刺激變痛;hyperalgesia=痛刺激更痛;analgesia=無痛(非無所有感覺);paresthesia=無刺激的異常感。","options":{"A":"正確。allodynia 是對非傷害性刺激感受為疼痛。","B":"正確。hyperalgesia 是對傷害性刺激反應加劇。","C":"正解(錯誤)。analgesia 是無痛覺,非對所有知覺皆無反應(那是麻醉)。","D":"正確。paresthesia 是無刺激下的異樣知覺。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"114020-08":{"quick":"C 為最不適當:化療藥造成的「周邊神經病變性疼痛(chemotherapy-induced neuropathic pain)」「仍屬癌症相關疼痛」,應比照處理(可用抗癲癇/抗憂鬱輔助藥);說「不算癌症疼痛」不正確。其餘穿皮貼片、骨轉移加類固醇、惡病質皮下嗎啡皆適當。","detail":{"background":"癌症疼痛處置。(A)適當:病人無法口服時,穿皮貼片(transdermal fentanyl)是合理選擇(適合穩定的持續性疼痛)。(B)適當:末期骨轉移嚴重疼痛可合併「類固醇(glucocorticoids)」(抗發炎、消腫、止痛、改善食慾),並可加雙磷酸鹽/放療。(C)最不適當(本題答案):化療藥(如紫杉醇、鉑類、長春花鹼)造成的「周邊神經病變性疼痛(CIPN)」「仍是癌症治療相關的疼痛、應視為癌痛範疇積極處理」(以抗癲癇 gabapentin/pregabalin、抗憂鬱 duloxetine 等神經病變痛藥物為主);說它「不算是癌症疼痛」不正確、會導致延誤處置。(D)適當:癌症惡病質明顯消瘦者,「皮下嗎啡注射」仍可有效止痛(皮下途徑適合無法口服/靜脈的末期病人)。整合:癌痛含傷害性與神經病變性成分,皆應積極多模式處理。","options":{"A":"適當。無法口服時穿皮貼片是合理選擇。","B":"適當。骨轉移嚴重痛可合併類固醇。","C":"正解(最不適當)。化療所致神經病變痛仍屬癌症疼痛,應積極處理。","D":"適當。惡病質消瘦者皮下嗎啡仍可有效止痛。"},"sources":["Miller's Anesthesia 9e, Acute & Chronic Pain Management; Opioids","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.47-48 Pain","WHO Cancer Pain Ladder"]}},"101030-07":{"quick":"PaCO2 11(極低)→呼吸性鹼;但 pH 僅 7.47(僅輕鹼)、HCO3 7.7、鹼缺失 -14.6(代謝性酸)→合併「原發性呼吸性鹼中毒 + (原發性)代謝性酸中毒」。若僅代償應使 pH 更接近正常或偏酸,故為混合型。","detail":{"background":"此嬰兒 ABG:PaCO2 11 mmHg(極低,提示明顯呼吸性鹼中毒/過度換氣)、pH 7.47(僅輕度鹼)、HCO3 7.7 mEq/L 與鹼缺失 -14.6(明顯代謝性酸中毒)。判讀:若只是呼吸性鹼「代償性」降 HCO3,代償不會降到 7.7 這麼低(慢性呼鹼每降 10 mmHg PaCO2,HCO3 約降 4–5);如此低的 HCO3 與大的鹼缺失代表「同時存在原發代謝性酸中毒」。又若是代謝性酸「代償性」過度換氣,pH 應偏酸或接近正常,但此處 pH 反而偏鹼(7.47),代表呼吸性鹼也是「原發」(過度通氣超過代償需求,常見於麻醉中呼吸器設定過度換氣)。故為「合併原發性呼吸性鹼中毒 + 代謝性酸中毒」的混合型酸鹼障礙(本題答案 D)。關鍵判讀法:pH 偏鹼但 HCO3 極低、PaCO2 極低 → 兩個原發病程(呼鹼+代酸)並存;單純代償不會使對立方向都「原發化」。臨床:此例呼吸器過度換氣致呼鹼,合併代謝性酸(可能組織灌流/乳酸或手術相關)。","options":{"A":"兩者皆代償無法解釋如此低 HCO3 與偏鹼 pH。","B":"代謝性酸是原發非僅代償(HCO3 過低),且呼鹼也是原發。","C":"若代謝性酸為原發+呼吸代償,pH 應偏酸,與 7.47 偏鹼不符。","D":"正解。原發呼吸性鹼+原發代謝性酸的混合型(pH 偏鹼、PaCO2 與 HCO3 皆極低)。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"103100-03":{"quick":"C 為錯誤:輸血反應(溶血、過敏、發燒、TRALI 等)「在全身麻醉下仍會發生」,且因病人被麻醉、症狀被掩蓋而更難察覺(可能只見低血壓、血紅素尿、滲血)。成分輸血、大量輸血補 FFP、與耶證討論皆正確。","detail":{"background":"術中輸血。(A)正確:成分輸血(packed RBC、FFP、血小板、冷凍沉澱品)的原則於術中仍適用,依缺什麼補什麼。(B)正確:大量輸血(massive transfusion,如 24 小時內換血量、或 1–2 小時內輸>50% 血容量)會稀釋凝血因子與血小板、致凝血病變、低鈣(檸檬酸鹽)、低體溫、高血鉀,須適量補充新鮮冷凍血漿(FFP)與血小板(現多採 1:1:1 比例策略),並監測 ionized Ca、體溫、鉀。(C)錯誤(本題答案):「輸血反應在手術麻醉下不會發生」不正確——溶血性輸血反應、過敏、發燒、TRALI、TACO 等「仍會發生」,而且在全身麻醉下病人無法主訴(發冷、背痛、胸悶被掩蓋),只能靠客觀徵象(不明原因低血壓、心搏過速、血紅素尿、傷口異常滲血/瀰漫性出血、SpO2 下降)察覺,故更危險、須警覺。(D)正確:耶和華見證人(拒絕輸血)病患術前應充分討論其可接受/拒絕的血品與替代方案(自體血、止血策略),尊重其自主並做好計畫。","options":{"A":"正確。成分輸血原則於術中適用。","B":"正確。大量輸血須適量補充新鮮冷凍血漿。","C":"正解(錯誤)。輸血反應在麻醉下仍會發生,且症狀被掩蓋更難察覺。","D":"正確。耶和華見證人病患術前應討論輸血問題。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"103100-08":{"quick":"本題多重答案(A、B、C 任一或組合給分)。ARDS 處置:高 PEEP 的「最適壓力與方法」尚未定論、未確定改善死亡率(A 敘述過度肯定為錯);俯臥可改善血氧、用於頑固低血氧(C 對),而其對死亡率的影響各研究不一(B 敘述需商榷),故認列多重給分。","detail":{"background":"ARDS 臨床處置。(A)錯誤:「較高 PEEP 提升血氧的策略已確認最適壓力與方法、能改善死亡率」過度肯定——高 vs 低 PEEP 的最佳設定「尚無定論」,僅在中重度 ARDS 個別化滴定(肺保護),整體高 PEEP 未一致證實降死亡率。(B)「俯臥改善血氧但沒有影響死亡率」——此敘述與後來 PROSEVA 試驗(重度 ARDS 早期長時間俯臥『可降低死亡率』)有出入,故 B 也被視為可爭議。(C)正確方向:俯臥(prone)用於持續低血氧的中重度 ARDS。(D)正確:吸入 NO 可暫時改善頑固低血氧,但「不改善死亡率」。因 A、B 敘述皆有問題、且題意「何者錯誤」有多種可成立解讀,考選部最終認列 A 或 B 或 C 或其組合皆給分。學習重點:ARDS 治療核心是「肺保護通氣(低潮氣量 6 mL/kg、限制平台壓<30、容許性高碳酸)」,俯臥(重度,PROSEVA 降死亡率)、神經肌肉阻斷(早期重度)、保守輸液;高 PEEP/NO/ECMO 為個別化救援。","options":{"A":"給分。高 PEEP「最適壓力與方法已確認且改善死亡率」過度肯定,屬錯誤。","B":"給分。俯臥對死亡率的影響(PROSEVA 顯示重度可降死亡率)使此敘述可爭議。","C":"給分。俯臥用於持續低血氧 ARDS(方向正確,但題意認列給分)。","D":"吸入 NO 改善血氧但不改善死亡率(屬正確敘述)。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"104090-08":{"quick":"本題一律給分(送分)。創傷性腦損傷處置:外科清除血腫、避免次發性損傷(維持腦灌注壓、避免低氧低血壓)、類固醇有害(CRASH 試驗增死亡);「低溫療法已確認降死亡率」並未被證實(多為陰性),故 C 敘述錯誤,但本題送分。","detail":{"background":"創傷性腦損傷(TBI)重症處置原則:(A)有壓迫性血腫(硬膜上/下、腦內)以「外科手術清除」為主——正確。(B)顱內高壓時開顱減壓可降顱內壓(對死亡率的助益視情況,DECRA/RESCUEicp 結果不一)。(D)「類固醇治療 TBI 會增加致病與死亡率」——CRASH 試驗證實類固醇在 TBI 有害,正確。(C)「低溫療法已確認可有效降低 TBI 死亡率」——錯誤:治療性低溫在 TBI 的多中心試驗(如 NABIS:H、POLAR、Eurotherm 對顱內高壓)「未證實降低死亡率」,甚至無益或有害,故不作常規;此選項是錯誤敘述。題目問「何者錯誤」,C 為錯誤;但因選項設計與爭議,考選部「一律給分」。核心:TBI 治療在「預防次發性腦損傷」——維持腦灌注壓(CPP 60–70)、避免低血壓/低氧/高低 CO2、控制顱內壓、外科清除血腫;類固醇禁用、低溫非常規。","options":{"A":"一律給分。","B":"一律給分。","C":"一律給分(此為錯誤敘述:低溫療法未證實降 TBI 死亡率)。","D":"一律給分。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"105020-08":{"quick":"本題考選部公告答案為D(PSVT)。注意:題述adenosine後P波持續160/min、僅QRS暫停,臨床上較符合心房頻脈(atrial tachycardia);作答以官方答案D為準。","detail":{"background":"Adenosine 經短暫阻斷「房室結(AV node)」傳導來鑑別窄 QRS 心搏過速。給藥後反應判讀:(1)若是「房室結折返(AVNRT)或房室折返(AVRT)」(PSVT)——心律「終止(恢復竇性)」,因房室結是折返環的一部分。(2)若是「心房頻脈(atrial tachycardia)或心房撲動」——房室結被擋住使 QRS 暫停,但「心房(P 波)的快速活動不受影響、仍持續」,之後又恢復原速。本題給 adenosine 後「QRS 暫時消失,但 P 波仍規則以 160/min 持續、之後又回到原狀」——代表心房本身在 160/min 自行跳動(不依賴房室結折返),故是「心房頻脈(atrial tachycardia)」(本題答案 C)。對照:PSVT(AVNRT/AVRT,選項 D)應被 adenosine「終止」;VT 是寬 QRS;AF 是 P 波不規則。學習:adenosine 既是診斷也是治療工具——「終止=折返性 PSVT;暴露持續心房活動=房性心搏過速/撲動」。","options":{"A":"室性心搏過速為寬QRS,與本例窄QRS不符。","B":"心房顫動之心房活動不規則,與規則P波160/min不符。","C":"心房頻脈:adenosine阻斷房室結後心房仍規則放電(P波持續)——此表現其實較符合C;惟官方答案為D。","D":"★官方答案。窄QRS規則心搏過速、對adenosine有反應者歸類為陣發性室上心搏過速(PSVT)。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"105100-08":{"quick":"D 為錯誤:異體輸血(allogeneic)有感染傳播、輸血反應、免疫調節等風險,其安全性「並非較高」,故對異體輸血的適應症不應「更寬鬆自由」;反而應更嚴格。Hb<6 幾乎都需輸、>10 通常不需、6–10 依風險決定皆正確。","detail":{"background":"ASA 2006(及後續)圍術期輸血指引的觸發閾值(restrictive 策略):(A)Hb<6 g/dL——幾乎所有病人(尤急性貧血)都需要輸血。(B)Hb>10 g/dL——原則上幾乎不需輸血。(C)Hb 6–10 g/dL——「依病人發生缺氧/缺血併發症的風險(如冠心病、持續出血、氧合狀態)」個別決定是否輸紅血球(非單看數值)。(D)錯誤(本題答案):「異體輸血(allogeneic)的適應症應較自體輸血(autologous)更寬鬆自由,因前者較安全」——完全相反:異體輸血有感染傳播(肝炎、HIV、細菌)、輸血反應、TRALI、免疫調節(增感染/腫瘤復發)、配對錯誤等風險,「安全性並非較高」,故對異體輸血的適應症應「更嚴格」、儘量減少不必要輸血(血液保存/自體輸血優先)。整合:現代採限制性輸血策略(Hb 7–8 g/dL 為多數穩定病人的閾值),並推動病人血液管理(PBM)。","options":{"A":"正確。Hb<6 g/dL 幾乎都需輸血(尤急性貧血)。","B":"正確。Hb>10 g/dL 原則上不需輸血。","C":"正確。Hb 6–10 依缺氧併發症風險決定。","D":"正解(錯誤)。異體輸血風險較高、安全性非較高,適應症不應更寬鬆。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"106080-07":{"quick":"本題一律給分(送分)。失血性休克的麻醉考量涉及 no-reflow、腎血流重分布、ARDS(發炎性)、目標血壓等;因選項組合敘述爭議(尤④「收縮壓 70–100 即可」屬允許性低血壓復甦概念但敘述細節有歧義),考選部一律給分。","detail":{"background":"失血性休克的麻醉與重症考量。①休克致腸道缺血再灌流可出現「no-reflow」現象,是多重器官衰竭(MOSF)的重要環節(腸道屏障破壞、菌/毒素移位驅動全身發炎)——大致正確。②休克初期腎臟自我調節仍可維持 GFR 一段時間,血流會由皮質向髓質/或重分布(題述「傾向表層皮質」與一般認知「血流離開皮質、重分布」有出入,故有歧義)。③ARDS 在創傷/休克後主要由「全身發炎反應」驅動(非單純出血),正確。④「維持收縮壓 70–100 mmHg 為目標、進行輸液」——呼應「允許性低血壓(permissive hypotension/damage control resuscitation)」概念(在出血未控制前避免過度復甦以免沖走血栓、稀釋凝血),但表述細節與適用對象有爭議。因各選項敘述細節爭議,考選部最終「一律給分」。核心學習:失血性休克復甦=控制出血(damage control)、允許性低血壓(未控制出血前)、平衡比例輸血(1:1:1)、避免低體溫/酸中毒/凝血病變(致命三角)。","options":{"A":"一律給分。","B":"一律給分。","C":"一律給分。","D":"一律給分。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"107020-03":{"quick":"有實證可預防中央導管相關感染(CLABSI)的措施:①最大無菌屏障、②chlorhexidine 皮膚消毒、③抗生素塗層導管,即 123。④超音波導引「減少機械併發症」但「非以降感染為實證重點」。","detail":{"background":"預防中央導管相關血流感染(CLABSI)的實證集束(bundle):①置放時採「最大無菌屏障(maximal sterile barrier:口罩帽子無菌衣手套大鋪單)」;②以「chlorhexidine(2% 含酒精)」消毒皮膚(優於 povidone-iodine);③高風險/長期使用考慮「抗生素或 chlorhexidine/silver 塗層導管(antimicrobial-impregnated catheter)」;另含手部衛生、首選鎖骨下而非股靜脈、每日評估必要性及早移除。故有實證預防「感染」者為 ①②③(本題答案 A)。④「超音波導引置放」的實證主要在「減少機械性併發症(誤穿動脈、氣胸)與提高成功率」,而非直接以「降低感染」為主要證據,故不列入此題的感染預防集束。","options":{"A":"正解(123)。最大無菌屏障、chlorhexidine 消毒、抗生素塗層導管有實證預防感染。","B":"234 納入④(超音波導引,主減機械併發症非感染)。","C":"134 納入④、遺漏②。","D":"124 納入④、遺漏③。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"108030-08":{"quick":"ARDS 的肺保護通氣建議理想潮氣量為「6 mL/kg(預測體重)」——低潮氣量可降低呼吸器引起的肺損傷與死亡率(ARDSNet)。","detail":{"background":"ARDS 的「肺保護性通氣(lung-protective ventilation)」是改善預後的核心:依 ARMA(ARDSNet)試驗,使用「低潮氣量 6 mL/kg 預測體重(predicted body weight)」(對照 12 mL/kg)可降低死亡率;同時限制平台壓(plateau pressure)<30 cmH2O、容許性高碳酸血症(permissive hypercapnia,接受較高 PaCO2 與較低 pH 以保護肺)、適當 PEEP 維持肺泡開放、目標 SpO2 88–95%。本題答案 A(6 mL/kg)。記憶:ARDS 通氣=低潮氣量(6)、限制平台壓(<30)、適當 PEEP、容許性高碳酸;中重度加俯臥(PROSEVA 降死亡率)、神經肌肉阻斷(早期)、保守輸液;頑固者 ECMO。","options":{"A":"正解。ARDS 肺保護通氣建議潮氣量 6 mL/kg 預測體重。","B":"10 mL/kg 過大,增加呼吸器引起的肺損傷。","C":"12 mL/kg 是傳統高潮氣量,死亡率較高。","D":"15 mL/kg 過大,有害。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"108080-09":{"quick":"D 為錯誤:急性肝衰竭並非以「高血鈉>150」列為換肝禁忌;高血鈉可矯正,非絕對禁忌。acetaminophen 為歐美最常見病因、預防性抗生素可減感染、腦水腫/顱內壓增高是不良預後指標皆正確。","detail":{"background":"急性肝衰竭(ALF)重症照護。(A)正確:歐美最常見病因是「acetaminophen(乙醯胺酚)過量肝毒性」(可用 N-acetylcysteine 治療);其他含病毒性肝炎、藥物、自體免疫、缺血、Wilson。(B)正確:ALF 病人感染風險高,「預防性抗生素/抗黴菌」可減少感染並改善等待換肝的存活(部分指引建議)。(C)正確:「腦水腫與顱內壓增高(肝性腦病第 III–IV 級)」是 ALF 不良預後與死亡的重要指標(腦疝是主要死因),須監測與處理(滲透治療、控氨、必要時顱內壓監測)。(D)錯誤(本題答案):「高血鈉>150 mmol/L 列為換肝禁忌」不正確——高血鈉是可矯正的電解質異常,非肝移植的絕對禁忌(肝移植真正禁忌如無法控制的敗血、嚴重心肺疾病、活動性顱外惡性腫瘤、無法戒除的物質濫用、嚴重不可逆腦損傷等)。ALF 是肝移植的緊急適應症,須依 King's College 等準則評估移植時機。","options":{"A":"正確。歐美 ALF 最常見病因是 acetaminophen 肝毒性。","B":"正確。預防性抗生素可減少 ALF 感染率。","C":"正確。腦水腫與顱內壓增高是不良預後指標。","D":"正解(錯誤)。高血鈉>150 可矯正,非換肝禁忌。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"109020-09":{"quick":"呼吸器脫離/拔管指標中,「淺快呼吸指標(RSBI = 呼吸速率/潮氣量(L))>105」代表脫離可能「失敗」,故最不適合拔管。其餘(足夠潮氣量/肺活量、MIP 夠負、低 PEEP/FiO2 下 SaO2>90%)皆是有利拔管的指標。","detail":{"background":"呼吸器脫離(weaning)與拔管的預測指標:(A)潮氣量>5 mL/kg、肺活量>10 mL/kg——足夠的自主呼吸力量,有利拔管。(B)「淺快呼吸指標(rapid shallow breathing index, RSBI)= 呼吸頻率(次/分) ÷ 潮氣量(公升)」——RSBI <105 預測脫離成功;「>105」預測脫離失敗(呼吸淺而快),故「最不適合考慮拔管」(本題答案 B)。(C)最大吸氣壓力(MIP/NIF)<−25 cmH2O(夠負,代表吸氣肌力足)——有利拔管。(D)在 FiO2 40–50%、PEEP<5 cmH2O 下 SaO2>90%(氧合好、低支持需求)——有利拔管。其他拔管前提:原發病因改善、血流動力穩定、清醒能保護氣道與排痰、通過自主呼吸試驗(SBT)。本題以 RSBI>105 為「不適合拔管」的指標。","options":{"A":"有利拔管。足夠潮氣量與肺活量代表呼吸力量足。","B":"正解(最不適合)。RSBI>105 預測脫離失敗,不適合拔管。","C":"有利拔管。MIP<−25 cmH2O 代表吸氣肌力足夠。","D":"有利拔管。低支持下 SaO2>90% 代表氧合良好。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"109020-35":{"quick":"敗血症致肺泡-微血管膜受損、通透性增加引起的非心因性肺水腫與低血氧,稱為「急性呼吸窘迫症候群(ARDS)」。","detail":{"background":"敗血症(及其他發炎刺激)使「肺泡-微血管膜(alveolar-capillary membrane)」受損、通透性增加,富含蛋白的液體滲入肺間質與肺泡,造成「非心因性肺水腫」、瀰漫性肺泡損傷、嚴重低血氧與雙側浸潤——即「急性呼吸窘迫症候群(ARDS)」(本題答案 D)。它與「心因性肺水腫(pulmonary edema,A)」不同(後者因左心衰竭、靜水壓升高,通常 PCWP 高、心臟擴大);與肺動脈高壓(B)、單純通透性概念(C)也不同。ARDS 是「通透性(高蛋白滲漏)」肺水腫。診斷依柏林定義(見 112080-09、114020-09)。臨床:婦科/腹腔感染後敗血是 ARDS 常見誘因,治療以肺保護通氣為主。","options":{"A":"心因性肺水腫因左心衰竭/靜水壓升高,非通透性損傷。","B":"肺動脈高壓是肺血管壓力問題,非肺泡膜通透性損傷。","C":"非標準診斷名稱。","D":"正解。敗血致肺泡-微血管膜通透性增加的非心因性肺水腫即 ARDS。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"109020-75":{"quick":"小兒心室顫動(VF)去顫劑量(PALS):首次 2 J/kg,第二次 4 J/kg,之後≥4 J/kg(可至 10 J/kg 或不超過成人劑量)。故「第三次 4 J/kg」正確,起初 4、再次 6/8 J/kg 皆錯。","detail":{"background":"兒童去顫(可電擊心律 VF/無脈搏 VT)依 PALS 指引:首次電擊「2 J/kg」,第二次「4 J/kg」,後續電擊「≥4 J/kg」(可逐步增加至 10 J/kg,但不超過成人最大劑量)。本題選項:(A)「起初 4 J/kg」錯(應 2);(B)「再次 6 J/kg」、(C)「再次 8 J/kg」皆與標準 4 J/kg 不同;(D)「第三次 4 J/kg」正確(第二次起即 4 J/kg、第三次仍可 4 J/kg 或更高),為本題答案。整合記憶:小兒去顫 2→4→≥4 J/kg;同步整流(SVT/有脈 VT)用 0.5–1 J/kg 起、可增至 2 J/kg。腎上腺素 0.01 mg/kg、可電擊心律第二次電擊後給藥+amiodarone/lidocaine。","options":{"A":"錯誤。小兒首次去顫劑量是 2 J/kg,非 4。","B":"錯誤。第二次是 4 J/kg,非 6。","C":"錯誤。標準為 4 J/kg(可逐增),非固定 8。","D":"正解。第三次去顫 4 J/kg(第二次起即 ≥4 J/kg)符合 PALS。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"109080-09":{"quick":"C 為錯誤:「敗血性休克病人越早給營養支持預後越好」不正確——休克未穩定(血流動力不穩、需大量升壓)時應「延後/謹慎」啟動腸道營養(避免腸缺血),待復甦穩定後再開始。其餘禁食 7 天、及早腸道灌食、十二指腸管減吸入皆合理。","detail":{"background":"重症營養支持原則。(A)正確:營養狀況良好者,術後給適當水分電解質,可容忍短期(約 7 天內)未給營養支持(超過則須介入)。(B)正確:腸胃道手術病人多可「及早開始腸道營養(early enteral nutrition)」(維持腸黏膜屏障、減少菌移位與感染、改善預後),優先於腸道靜脈營養。(C)錯誤(本題答案):「敗血性休克病人越早給營養支持預後越好」不正確——「血流動力不穩定/休克未復甦(仍需大量升壓劑、乳酸高)」時,應「延後或僅以滋養性(trophic)低速腸道營養」,因腸道灌流不足時積極腸道營養可能誘發「非阻塞性腸缺血(NOMI)」;待休克穩定後再逐步增加。故並非越早越好。(D)正確:胃排空差/高吸入風險者可放「幽門後(十二指腸/空腸)管」灌食以減少吸入(aspiration)。整合:重症營養首選腸道、及早(穩定後)、休克未穩時謹慎,血流動力穩定後啟動。","options":{"A":"合理。營養良好者可容許短期(約 7 天)禁食。","B":"合理。腸胃道手術可及早開始腸道營養。","C":"正解(錯誤)。敗血性休克未穩定時應延後/謹慎營養,非越早越好。","D":"合理。幽門後灌食可減少吸入風險。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"110020-09":{"quick":"敗血性休克在足夠輸液後仍低血壓時,第一線升壓劑是「norepinephrine(正腎上腺素)」(Surviving Sepsis 建議首選)。","detail":{"background":"Surviving Sepsis Campaign:敗血性休克復甦先給「晶體液(30 mL/kg,3 小時內)」,若仍低血壓(MAP<65)則加升壓劑,「第一線首選 norepinephrine(正腎上腺素)」——α1 為主、適度 β1,有效升 MAP 且心律不整較少。第二線:若 MAP 不足可加 vasopressin(0.03 U/min,減少 norepinephrine 用量)或 epinephrine;心輸出不足/心因性成分加 dobutamine。Dopamine 已不建議常規(心律不整多、未證實腎保護);epinephrine 為次選(心律不整、乳酸升高);vasopressin 為輔助而非單獨首選。本題答案 C(norepinephrine)。並同時給經驗性抗生素(1 小時內)、找感染源控制、監測乳酸與灌注。","options":{"A":"dopamine 已不建議常規(心律不整多)。","B":"epinephrine 為次選(心律不整、升乳酸)。","C":"正解。norepinephrine 是敗血性休克第一線升壓劑。","D":"vasopressin 是輔助(第二線加用),非單獨首選。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"110080-02":{"quick":"B 正確:GFR 測量較術後血漿肌酸酐(creatinine)更敏感、更專一地反映腎功能變化(creatinine 滯後、受肌肉量/體液影響)。A 錯(術後尿量減少非正常、與 AKI 相關)、C 錯(creatinine 升高與 GFR 降低相關)、D 錯(NGAL 是更「早期」biomarker,術後數小時即可測得,非 24 小時才)。","detail":{"background":"圍術期急性腎損傷(AKI)的監測。(A)錯誤:術中與術後「尿量減少」與術後 AKI「相關」,不能說「術後尿量減少是正常、不影響腎功能」(少尿是 AKI 的重要警訊,雖部分非少尿型 AKI 存在)。(B)正確(本題答案):直接測 GFR(或其精準估算)比「血漿肌酸酐濃度」更敏感、專一地反映腎功能變化——creatinine 變化「滯後」(GFR 下降後 1–2 天才升、受肌肉量/年齡/體液稀釋影響),早期不敏感。(C)錯誤:血漿 creatinine 升高與 GFR 降低「呈反向相關(有關聯)」(GFR 下降則 creatinine 累積升高),說「無關聯」錯。(D)錯誤:NGAL(嗜中性球明膠酶相關脂質運載蛋白)是 AKI 的「早期」生物標記,「在腎損傷後數小時(約 2–6 小時)即可測得」,比 creatinine 更早，並非「最早術後 24 小時才測得」。整合:圍術期腎保護核心是「維持血流動力與腎灌流(心輸出、血容、灌注壓)、避免腎毒性與低血壓」;早期 biomarker(NGAL、KIM-1、cystatin C)較 creatinine 早。","options":{"A":"錯誤。術後尿量減少與 AKI 相關,非正常現象。","B":"正解。GFR 較血漿 creatinine 更敏感、專一地反映腎功能變化。","C":"錯誤。creatinine 升高與 GFR 降低相關(反向),非無關。","D":"錯誤。NGAL 是更早期 biomarker(數小時即可測),非 24 小時才。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"110080-09":{"quick":"C 為錯誤:不論 TPN 或腸道營養,「減量/停用時都須注意血糖與低血糖」——突然停止含糖的營養支持(尤 TPN)會因殘餘胰島素分泌致低血糖,腸道營養減量同樣需監測,並非「腸道營養減量不需注意」。其餘腸道營養致腹瀉/逆流、周邊靜脈營養致靜脈炎、靜脈營養致導管血流感染皆正確。","detail":{"background":"重症營養支持併發症。(A)正確:腸道營養(enteral)常致腹瀉(配方、滲透、感染、藥物),也可能因胃排空差致胃脹、逆流與吸入。(B)正確:周邊靜脈營養(PPN)因高滲透壓溶液刺激周邊靜脈,易致靜脈炎。(C)錯誤(本題答案):「TPN 減量停用時須注意胰島素與低血糖,腸道營養減量則不需注意」不正確——任何含醣營養支持(尤 TPN,常合併胰島素或刺激內生胰島素)在「突然減量/停用」時都可能因胰島素相對過量致「低血糖」,「腸道營養」同樣提供葡萄糖、減量時也須監測血糖避免低血糖;故說腸道營養減量不需注意是錯誤。(D)正確:接受靜脈營養的重症病人出現敗血/發燒,應高度懷疑「導管相關血流感染(CLABSI)」(中央/周邊導管)。整合:營養支持的代謝監測(血糖、電解質、磷/鉀/鎂——再餵食症候群 refeeding)與導管感染防治都重要。","options":{"A":"正確。腸道營養常致腹瀉、可能胃脹逆流。","B":"正確。周邊靜脈營養增加靜脈炎風險。","C":"正解(錯誤)。腸道營養減量同樣需注意血糖與低血糖,非不需。","D":"正確。靜脈營養病人敗血應考慮導管相關血流感染。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"111020-09":{"quick":"D 為錯誤:肺壓力性創傷(barotrauma)主要與「高平台壓/跨肺壓(常>30–35 cmH2O)、過度擴張」相關,「10 cmH2O 即明顯增加 barotrauma」不正確(10 cmH2O 屬常規安全範圍)。其餘過度擴張增死腔/減回流/增肺血管阻力皆正確。","detail":{"background":"正壓通氣壓力過高致肺泡過度擴張的生理影響。(A)正確:過度擴張使肺泡微血管受壓、形成「West zone 1(死腔)」增加,降低有效通氣(相對低換氣/高 V/Q)。(B)正確:肺泡過度擴張壓迫肺泡微血管、增加「肺血管阻力(PVR)與右心室後負荷」(過低肺容積也增 PVR,呈 U 形)。(C)正確:高胸腔內壓減少靜脈回流→降低右心前負荷與左心前負荷→「降低心輸出量」(正壓通氣/PEEP 的血流動力副作用)。(D)錯誤(本題答案):「壓力達 10 cmH2O 即可能明顯增加 barotrauma 危險」不正確——氣壓傷/容積傷主要發生在「高平台壓(plateau pressure >30–35 cmH2O)、高跨肺壓、肺泡過度擴張」時;10 cmH2O 是常規安全的氣道壓/PEEP 範圍,不會明顯增加 barotrauma。肺保護策略即限制平台壓<30 以避免 VILI。","options":{"A":"正確。過度擴張增加死腔、減少有效通氣。","B":"正確。增加肺血管阻力與右心後負荷。","C":"正確。減少靜脈回流與前負荷,降低心輸出量。","D":"正解(錯誤)。barotrauma 與高平台壓(>30–35)相關,10 cmH2O 屬安全範圍。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"111080-03":{"quick":"C 正確:麻醉中確保腎功能最有效的方式是「維持血流動力穩定」(心輸出、血容量、灌注壓、足夠組織灌流),保障腎臟灌流。A 錯(尿量是常用但不可靠的腎功能指標)、B 錯(creatinine 與 GFR 非線性關係)、D 錯(IL-18 是 AKI biomarker、與腎小管損傷相關)。","detail":{"background":"麻醉中腎功能監測與保護。(A)錯誤:術中尿量是「最常用」的監測,但「不可靠」——尿量正常不保證 GFR 正常,且受 ADH、利尿劑、血糖、手術應激影響,不能準確反映腎絲球過濾。(B)錯誤:血漿 creatinine 與 GFR 呈「非線性(雙曲線)」反向關係——GFR 下降初期 creatinine 變化小(早期不敏感),GFR 大幅下降後 creatinine 才明顯上升;非線性正比。(C)正確(本題答案):麻醉中「保護腎功能最有效的方式是維持良好的血流動力學」——確保心臟功能、足夠的血管內容積與灌注壓、足夠的組織/腎灌流與氧合,並避免低血壓、低血容與腎毒性藥物;沒有特效的「腎保護藥」(低劑量 dopamine、furosemide、mannitol 皆未證實能預防 AKI)。(D)錯誤:介白素-18(IL-18)是 AKI 的尿液生物標記,「與腎小管損傷相關」(腎小管細胞釋放),說「無相關」錯。整合:圍術期腎保護=維持腎灌流(血流動力)、避免腎毒性與低血壓。","options":{"A":"錯誤。尿量是常用但不可靠的腎功能指標。","B":"錯誤。creatinine 與 GFR 呈非線性反向關係,非線性正比。","C":"正解。維持血流動力穩定、確保腎灌流是麻醉中最有效的腎保護。","D":"錯誤。IL-18 是 AKI biomarker,與腎小管損傷相關。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"111080-09":{"quick":"A 為錯誤:敗血性休克因「胰島素抗性」與應激會導致「高血糖(hyperglycemia)」,而非低血糖。血小板低下(早期病徵)、DIC、壓力性潰瘍上消化道出血皆正確。","detail":{"background":"敗血性休克的多重器官併發症。(A)錯誤(本題答案):敗血/危重狀態因壓力荷爾蒙(catecholamine、cortisol、glucagon)與發炎細胞激素造成「胰島素抗性」與肝醣分解/糖質新生增加,「導致高血糖(stress hyperglycemia)」,而非低血糖(末期或肝衰時才可能低血糖);故「胰島素抗性常導致低血糖」方向錯。(B)正確:敗血常致「血小板低下(thrombocytopenia)」(消耗、骨髓抑制),是早期病徵之一。(C)正確:敗血常併發「瀰漫性血管內凝血(DIC)」(凝血活化與消耗、微血栓與出血)。(D)正確:危重病人「壓力性潰瘍(stress ulcer)」致上消化道出血,故 ICU 常給壓力性潰瘍預防(PPI/H2 阻斷)。整合:敗血休克→高血糖(控制<180)、血小板低下/DIC、壓力性潰瘍、AKI、ARDS、多重器官衰竭。","options":{"A":"正解(錯誤)。敗血因胰島素抗性導致「高血糖」,非低血糖。","B":"正確。血小板低下是敗血早期病徵之一。","C":"正確。常併發瀰漫性血管內凝血(DIC)。","D":"正確。壓力性潰瘍致上消化道出血。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"112020-09":{"quick":"已給足量輸液(3000 mL)後血壓仍低(90/45)、需考慮升壓劑→「對輸液反應不足、需升壓劑維持灌流」即「敗血性休克(septic shock)」。","detail":{"background":"此例肺炎+意識改變、發燒、低血壓——感染源明確且有器官功能障礙(意識改變),已是「敗血症(sepsis,Sepsis-3:感染+SOFA≥2 器官功能障礙)」。經「足量晶體液復甦(已給 3000 mL≈30 mL/kg 以上)」後,血壓仍偏低(90/45)、需考慮升壓劑以維持灌流——符合「敗血性休克(septic shock)」的定義:即「敗血症經足量輸液復甦後仍需升壓劑維持 MAP≥65 mmHg、且乳酸>2 mmol/L」(Sepsis-3)。故答案 D(septic shock)。對照:SIRS(A)是舊定義的全身發炎(已淡出);sepsis(B)是感染+器官障礙但未到需升壓的休克;severe sepsis(C)是舊 Sepsis-2 用語(Sepsis-3 已取消)。臨床:此病人應給經驗性抗生素、繼續復甦並啟動升壓劑(norepinephrine)、監測乳酸與灌注。","options":{"A":"SIRS 是舊定義的全身發炎反應,不足以描述此休克狀態。","B":"sepsis 是感染+器官障礙,但本例已輸液後仍低血壓需升壓。","C":"severe sepsis 是舊 Sepsis-2 用語,Sepsis-3 已取消。","D":"正解。足量輸液後仍低血壓需升壓劑=敗血性休克。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"112080-09":{"quick":"A 正確(柏林定義):ARDS 須在「一週內」發生的已知誘因或新/惡化的呼吸症狀。B 錯(PaO2/FiO2≤300 是輕度,≤100 才重度)、C 錯(須排除心因性肺水腫,非合併左心衰)、D 錯(X 光是「雙側」浸潤,非單側)。","detail":{"background":"ARDS 柏林定義(Berlin 2012)四要件:(1)時間——「一週內」發生的已知臨床誘因或新出現/惡化的呼吸症狀(A 正確,本題答案);(2)影像——胸部 X 光/CT 呈「雙側(bilateral)」浸潤,無法完全以積液、肺塌陷或結節解釋(D 錯,非單側);(3)肺水腫來源——呼吸衰竭「無法完全以心臟衰竭或體液過多解釋」(須排除心因性,必要時客觀評估如超音波;C 錯,非「常合併左心衰擴大」);(4)氧合(在 PEEP/CPAP≥5 下,以 PaO2/FiO2 分級)——輕度 200<P/F≤300、中度 100<P/F≤200、重度 P/F≤100(B 錯,≤300 是「輕度」非重度)。故 A 為正確敘述。學習:柏林定義=一週內、雙側浸潤、非心因、依 P/F(300/200/100)分輕中重。","options":{"A":"正解。一週內發生的臨床誘因或新/惡化呼吸症狀(柏林定義時間要件)。","B":"錯誤。P/F≤300 是輕度,≤100 才是重度。","C":"錯誤。ARDS 須排除心因性肺水腫,非合併左心衰。","D":"錯誤。X 光呈雙側浸潤,非單側。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"113020-09":{"quick":"吸入性一氧化氮(NO)治療 ARDS 的機轉是「選擇性肺血管擴張」——只擴張「有通氣」的肺泡周邊血管,改善通氣-灌流匹配與氧合,且因吸入後快速被血紅素結合而不致全身性低血壓。","detail":{"background":"吸入性一氧化氮(inhaled NO, iNO)是「選擇性肺血管擴張劑」:NO 經吸入到達「有通氣」的肺泡,擴張該區域的肺血管,使血流重新導向通氣良好的肺泡、改善「通氣-灌流(V/Q)匹配」與氧合,並降低肺動脈壓/肺血管阻力;一旦進入血流即被血紅素迅速結合去活化,故「不造成全身性血管擴張/低血壓」(具肺選擇性)。本題答案 C(選擇性肺血管擴張)。臨床:iNO 用於 ARDS 與肺高壓可暫時改善血氧/降肺壓,但「不改善死亡率」(屬救援/橋接,並有高鐵血紅素與腎毒性疑慮),非常規。對照:全身血管擴張(A)會降血壓,非 iNO 特性;NO 不造成血管收縮。","options":{"A":"iNO 不造成全身性血管擴張(進血流即被血紅素去活化)。","B":"NO 是血管擴張劑,非收縮。","C":"正解。iNO 選擇性擴張有通氣肺泡的血管,改善 V/Q 與氧合。","D":"NO 擴張而非收縮肺血管。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"113070-09":{"quick":"B 正確:敗血症以「加強胰島素治療控制血糖(目標<180 mg/dL)」對預後有幫助(避免高血糖)。A 錯(EGDT 與目標 MAP>90 過高,後續試驗未證實 EGDT 優於常規,目標 MAP≥65)、C 錯(高劑量類固醇無益甚至有害)、D 錯(腎性劑量 dopamine 無腎保護效果)。","detail":{"background":"敗血症實證治療。(A)錯誤:Rivers 的「早期目標導向治療(EGDT)」雖強調早期復甦,但後續大型試驗(ProCESS、ARISE、ProMISe)顯示「EGDT 並未優於常規早期照護」;且「維持平均血壓>90 mmHg」目標過高(指引目標 MAP≥65 mmHg);過度輸液有害,故此敘述不正確。(B)正確(本題答案):血糖控制——避免高血糖(目標血糖<180 mg/dL,以胰島素控制),改善預後;但須避免「過嚴格(<110)」造成低血糖(NICE-SUGAR 顯示嚴格控糖增死亡),故目標約 140–180。(C)錯誤:「高劑量類固醇」對敗血無益甚至有害(早年試驗陰性);僅在「對輸液與升壓劑反應不佳的敗血性休克」考慮「低劑量氫化可體松(hydrocortisone 200 mg/day)」,非高劑量。(D)錯誤:「腎性劑量(low-dose)dopamine」已證實「無腎保護效果」、不減少洗腎或死亡,且增心律不整,不應使用。整合:敗血實證=早期抗生素、適度復甦(目標 MAP≥65、乳酸導向)、norepinephrine、血糖<180、低劑量類固醇(難治休克)、肺保護通氣。","options":{"A":"錯誤。EGDT 未證實優於常規,且目標 MAP≥65(非>90)。","B":"正解。控制血糖<180 mg/dL(加強胰島素治療)對預後有幫助。","C":"錯誤。高劑量類固醇無益甚至有害(僅難治休克用低劑量)。","D":"錯誤。腎性劑量 dopamine 無腎保護效果。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"114020-09":{"quick":"本題多重答案(B、C 給分)。ARDS 依柏林定義以 PaO2/FiO2(在 PEEP≥5)分級:輕度 P/F≤300、中度≤200、重度≤100。題問「ARDS 診斷」之 P/F 定義,因輕度門檻≤300(B)與「氧合異常」常以≤200(C)表述,兩者皆給分。","detail":{"background":"ARDS 柏林定義依氧合指數 PaO2/FiO2(在 PEEP 或 CPAP≥5 cmH2O 下測):輕度(mild)200<P/F≤300、中度(moderate)100<P/F≤200、重度(severe)P/F≤100。本題問「ARDS 診斷的 P/F 數值定義」:整體「診斷門檻(含輕度)」是 P/F≤300(選項 B);而臨床上有意義的低血氧/中重度常以≤200(選項 C)為界。因題意可指「進入 ARDS 診斷的上限(≤300)」或「明顯氧合受損(≤200)」,考選部最終認列 B、C 皆給分。學習:記住 300/200/100 對應輕/中/重,且須在 PEEP≥5 下測量、合併雙側浸潤、非心因性、一週內發生。","options":{"A":"<400 不符 ARDS 任何分級門檻。","B":"給分。P/F≤300 是 ARDS 診斷的整體門檻(含輕度)。","C":"給分。P/F≤200 對應中度以上(明顯氧合受損)。","D":"<100 是重度 ARDS,非診斷的最低門檻。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"115020-09":{"quick":"本題多重答案(B、C、D 給分)。腎前性氮血症因腎灌流不足。「直接作用於腎血管造成低灌流」者:升壓收縮藥(A);NSAID(抑制 COX→抑制擴張腎血流的前列腺素,B)、ACEI(抑制出球小動脈收縮→降腎絲球壓,C)雖影響腎血流動力但機轉與「直接收縮腎血管」不同,低劑量硝化甘油(D)為擴張劑。因「直接作用腎血管」定義有歧義,B、C、D 皆給分。","detail":{"background":"腎前性氮血症(prerenal azotemia)源於腎灌流/腎絲球濾過壓不足。各藥對腎血流動力的影響:(A)norepinephrine/vasopressin 等「血管收縮劑」直接收縮腎血管、降腎血流(此為「直接作用於腎血管造成低灌流」最典型者)。(B)NSAID(如 ketorolac)抑制環氧酶(COX)→減少「擴張入球小動脈」的前列腺素→在低灌流狀態下使腎血流下降(間接、經前列腺素機轉,非直接收縮)。(C)ACEI 抑制血管收縮素 II →使「出球小動脈擴張」、降低腎絲球內壓與 GFR(尤雙側腎動脈狹窄/低血容時致腎前性惡化;機轉是改變腎絲球內血流動力,非直接收縮腎血管)。(D)低劑量「硝化甘油(nitroglycerin)」是血管「擴張劑」,不會直接收縮腎血管致低灌流。題問「不會直接作用於腎血管造成低灌流」者——D(擴張劑)最明確不是,B(經前列腺素)、C(經 RAAS、作用於出球小動脈而非直接收縮)就「直接作用於腎血管」的嚴格定義也可成立,故考選部認列 B、C、D 皆給分。學習:腎前性 AKI 的藥物因子=血管收縮劑、NSAID(抑前列腺素)、ACEI/ARB(出球小動脈)、利尿過度致低血容、calcineurin 抑制劑等。","options":{"A":"norepinephrine/vasopressin 直接收縮腎血管致低灌流(最典型)。","B":"給分。NSAID 經抑制前列腺素降腎血流(非直接收縮血管)。","C":"給分。ACEI 作用於出球小動脈降腎絲球壓(非直接收縮腎血管)。","D":"給分。低劑量硝化甘油是擴張劑,不會直接致腎低灌流。"},"sources":["Miller's Anesthesia 9e, Critical Care & Resuscitation","Surviving Sepsis Campaign 2021","ARDS Berlin Definition; ARDSNet","AHA/PALS Guidelines"]}},"101030-10":{"quick":"尿毒症(慢性腎衰竭)病人因「貧血(erythropoietin 不足)」使氧輸送下降、心臟長期高輸出代償並有尿毒性心肌病/容積負荷,易致心臟陣發性衰竭;故與貧血相關。","detail":{"background":"慢性尿毒症(長期透析)病人合併多系統問題,其「心臟陣發
