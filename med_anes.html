性衰竭(episodic cardiac failure)」與多因素相關,但本題強調「貧血」:腎衰竭使紅血球生成素(EPO)不足→慢性貧血→組織氧輸送下降、心臟代償性高輸出長期負荷,加上尿毒性心肌病變、容積過載(透析間期)、高血壓、加速性動脈硬化、電解質波動,使心臟儲備差、易在應激(手術、輸液、貧血)時失代償而陣發性心衰。題目問「因為合併哪種病症」→貧血(本題答案 A)。其他選項:尿毒症常「高血壓」非低血壓(B 錯)、易「高血鉀」但那致心律不整/停搏而非「陣發性心衰」的直接機轉(C)、尿毒症常「低血鈣/高血磷」非高血鈣(D 錯)。臨床:尿毒病人麻醉須評估貧血、容積、電解質(尤鉀)、心血管狀態,並安排適當透析時機。","options":{"A":"正解。尿毒症因 EPO 不足致貧血,氧輸送下降、心臟長期負荷,易陣發性心衰。","B":"尿毒症常合併高血壓,非低血壓。","C":"高血鉀致心律不整/停搏,非「陣發性心衰」的直接機轉。","D":"尿毒症常低血鈣/高血磷,非高血鈣。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"102030-24":{"quick":"C 正確:新生兒「心輸出量主要依賴心率(heart rate-dependent)」——其心肌順應性差、每搏量相對固定,故心搏過慢即心輸出驟降。A、B、D 皆錯。","detail":{"background":"小兒(尤新生兒)生理特點與麻醉相關。(A)錯誤:新生兒「體表面積對體重比值『高』」(非低),加上皮下脂肪少、體溫調節差,故「容易失溫」——原因是比值「高」,題述「比值低」錯。(B)錯誤:新生兒「不能靠顫抖(shivering)產熱」(肌肉與神經未成熟),其產熱主要靠「非顫抖性產熱(non-shivering thermogenesis,棕色脂肪代謝)」。(C)正確(本題答案):新生兒心肌收縮成分少、順應性差、每搏量相對固定,「心輸出量主要依賴心率」,故心搏過慢(常因缺氧、迷走刺激)會使心輸出與血壓驟降——這也是小兒麻醉強調維持心率、缺氧時心搏過緩須立即供氧/處理的原因。(D)錯誤:新生兒「體液(尤其細胞外液)占體重比率『高』於成人」(新生兒總體水約 75–80%),非低。整合:小兒易失溫(高表面積比、無顫抖產熱)、心輸出依賴心率、體液比例高、藥物分布與劑量須調整。","options":{"A":"錯誤。新生兒體表面積/體重比值「高」才易失溫。","B":"錯誤。新生兒靠「非顫抖性產熱(棕色脂肪)」,不能顫抖產熱。","C":"正解。新生兒心輸出主要依賴心率(每搏量相對固定)。","D":"錯誤。新生兒體液占比「高」於成人。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"102110-06":{"quick":"C 為錯誤:燒傷病人因皮膚屏障破壞、體溫調節差,術中極易失溫,「手術室室溫應『提高(保暖)』」而非降低;低溫會加重凝血病變、感染與代謝負擔。其餘吸入傷清醒插管、大管徑靜脈、燒傷後 succinylcholine 致高血鉀皆正確。","detail":{"background":"燒傷病人麻醉。(A)正確:有吸入性燒傷(氣道熱傷/水腫)時須仔細評估氣道,必要時在「清醒下以光纖內視鏡插管」(趁氣道尚可、保留自主呼吸),因水腫進展快、後續可能無法插管。(B)正確:大面積燒傷清創/植皮可大量失血與體液流失,須建立「大管徑靜脈導管」以快速輸液輸血。(C)錯誤(本題答案):燒傷病人皮膚屏障喪失、體溫調節差、暴露面積大,術中「極易低體溫」,故「手術室室溫應『提高/保暖』」(暖房、暖風毯、加溫輸液),而非「降低室溫」;低體溫會加重凝血病變、心律不整、感染與代謝壓力。(D)正確:燒傷(及去神經、擠壓傷)後約 24–48 小時起,接合外乙醯膽鹼受體上調,使用去極化肌鬆劑「succinylcholine」會致致命「高血鉀」,應避免(改用非去極化肌鬆劑)。整合:燒傷麻醉=保暖、充分輸液(Parkland)、氣道警覺(早插管)、避免 succinylcholine、肌鬆劑需求常增加。","options":{"A":"正確。吸入傷者必要時清醒光纖插管。","B":"正確。大量失血須大管徑靜脈導管。","C":"正解(錯誤)。燒傷易失溫,室溫應提高保暖,非降低。","D":"正確。燒傷後 succinylcholine 致高血鉀,應避免。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"103030-06":{"quick":"B 為錯誤:腎功能不佳病人「不應絕對限制水分」——術中維持足夠的血管內容積與腎灌流(避免低血容)是預防術後腎衰竭的關鍵;過度限水反而加重腎前性損傷。其餘低血容是術後腎衰因子、mannitol/furosemide 對 AKI 幫助不大、監測尿量>0.5 mL/kg/h 皆正確。","detail":{"background":"腎功能受損(GFR 25–40)病人行全髖置換的麻醉考量。(A)正確:術中低血容(低血壓、出血、灌流不足)是術後腎衰竭的重要危險因子。(B)錯誤(本題答案):「腎功能不佳故應『絕對限制水分』」不正確——保護殘餘腎功能的關鍵反而是「維持足夠的血管內容積與腎灌流」、避免低血容與低血壓;過度限水會造成腎前性灌流不足、惡化腎功能。應「適當補液、目標導向」,而非一味限水(除非合併寡尿/容積過載/透析依賴另議)。(C)正確:mannitol、furosemide 等利尿劑「對已發生的急性腎衰竭(預防或改善預後)幫助不大」(未證實能預防 AKI 或改善結局,僅可能把寡尿型轉為非寡尿型便於管理)。(D)正確:放導尿管監測術中尿量,維持>0.5 mL/kg/h 作為灌流/容積的參考指標。整合:腎保護=維持灌流/容積、避免低血壓與腎毒性,而非限水或依賴利尿劑。","options":{"A":"正確。術中低血容是術後腎衰竭的重要因素。","B":"正解(錯誤)。不應絕對限水;維持足夠腎灌流/容積才護腎。","C":"正確。mannitol/furosemide 對 AKI 幫助不大。","D":"正確。應監測尿量並維持>0.5 mL/kg/h。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"103100-04":{"quick":"正確組合 234:②過度換氣降腦壓的效果約 6–24 小時後因 CSF pH 緩衝而漸消失、③PaCO2<20 致腦血管過度收縮可致腦缺血、④嚴重腦腫脹可暫不關顱(去骨瓣減壓)。①錯(過度換氣使腦脊髓液偏「鹼」非酸)。","detail":{"background":"神經麻醉以過度換氣(hyperventilation)降低 PaCO2、使腦血管收縮、降腦血流與顱內壓(急救橋接)。各敘述:①錯誤:過度換氣排出 CO2,使血與腦脊髓液偏「鹼性(alkalosis)」(非酸性)——CO2 下降、碳酸減少、pH 上升,是腦血管收縮的機轉。②正確:即使持續過度換氣,因脈絡叢調整 CSF 中碳酸氫鹽使 pH 緩衝回正常,腦血流會在約「6–24 小時(數小時至一天)」逐漸回到原值(降腦壓效果是暫時的、會「逃逸」),故不宜長時間依賴,且驟停過度換氣會反彈性腦血管擴張。③正確:過度的過度換氣(PaCO2<20–25 mmHg)使腦血管過度收縮、腦血流不足,可造成「受傷腦組織缺血」,故 PaCO2 一般控制在 30–35 mmHg(不可過低)。④正確:腦腫脹非常嚴重時,可採「去骨瓣減壓(decompressive craniectomy,暫不關顱)」以容納腫脹、降顱內壓。故答案 234(本題 B)。整合:過度換氣是暫時降腦壓手段(目標 PaCO2 30–35,避免<20),會逃逸與反彈;嚴重腫脹考慮去骨瓣。","options":{"A":"123 納入①(過度換氣使 CSF 偏鹼非酸,①錯)。","B":"正解(234)。②效果數小時後逃逸、③過度致腦缺血、④嚴重腫脹去骨瓣減壓。","C":"僅14 納入①(錯)。","D":"僅34 遺漏②。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"104030-08":{"quick":"A 正確:末期腎病常合併嚴重動脈硬化與心血管疾病,術前須詳細評估心血管狀況。B、C、D 皆有錯誤敘述。","detail":{"background":"器官移植麻醉。(A)正確(本題答案):末期腎病(ESRD)病人因長期高血壓、糖尿病、鈣磷代謝異常等,常合併「嚴重加速性動脈硬化與冠心病、左心室肥大」,圍術期心血管事件風險高,術前須詳細評估心血管狀況(並安排適當透析、矯正電解質尤鉀與容積)。(B)錯誤:肝移植病人雖有凝血、腦功能、腎功能異常,但「並非一律不可在手術室拔管」(條件允許可早期拔管 fast-track),且「可使用 narcotics(opioid)術後止痛」(須依肝功能調整);說「不可拔管、不宜用 narcotics」過於絕對。(C)錯誤:胰臟移植「常與腎臟移植(SPK)合併」而非肝臟移植;且須嚴格監測與管理血糖(移植後胰島功能變化),藥物劑量須依腎功能調整;敘述「常合併肝移植、不應減少藥物」不正確。(D)錯誤:腦死器官捐贈者術中常見血流動力不穩;其心搏過慢「對 atropine 反應差」(因延腦/迷走核已死、缺乏中樞迷走張力,atropine 無效),須用直接作用的 β 致效劑(isoproterenol/epinephrine)或起搏,故 atropine 「非首選」。整合:各移植麻醉重點——腎移植(心血管/鉀/容積)、肝移植(凝血/血流動力/再灌流)、捐贈者(維持灌流、atropine 對腦死心搏過緩無效)。","options":{"A":"正解。末期腎病常合併嚴重動脈硬化,術前須詳細評估心血管。","B":"錯誤。肝移植可早期拔管、可用 opioid 止痛(依肝功能調整)。","C":"錯誤。胰臟移植常合併「腎」移植(SPK),藥物須依腎功能調整。","D":"錯誤。腦死捐贈者心搏過緩對 atropine 反應差,非首選(用直接β致效劑)。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"105020-05":{"quick":"B 正確:肺葉切除術前以肺功能評估,「預計術後 FEV1(ppoFEV1)>原有的 40%」者通常可在手術室拔管(肺儲備足夠)。A、C、D 皆錯。","detail":{"background":"肺葉切除的術前肺功能評估與單肺通氣。(A)錯誤:對術後肺功能(FEV1)影響最大的是切除「功能最多的肺組織」——右肺中葉體積小、功能占比低,切除它對 FEV1 影響「最小」而非最多(影響最大的是切除右上葉或全肺/下葉等大功能單位)。(B)正確(本題答案):以「預計術後 FEV1(predicted postoperative FEV1, ppoFEV1)」評估——ppoFEV1 >原有的 40%(或 >40% 預測值、>0.8 L)通常代表術後肺儲備足夠,可在手術室「早期拔管」;<30–40% 則術後呼吸衰竭風險高,須加強評估(DLCO、運動測試)。(C)錯誤:胸腔/肺手術「術中與術後心律不整(尤心房顫動)常見」(縱隔操作、自主神經、低氧),非少見。(D)錯誤:單肺通氣(OLV)時應用「保護性、較小潮氣量(約 4–6 mL/kg 通氣肺)」並加 PEEP,「較大潮氣量會造成通氣肺過度擴張、急性肺損傷」,而非增加含氧、減少傷害;說用大潮氣量增氧減傷錯誤。整合:肺切除評估看 ppoFEV1/DLCO;OLV 用低潮氣量肺保護。","options":{"A":"錯誤。右肺中葉功能占比小,切除對 FEV1 影響最小非最多。","B":"正解。ppoFEV1>原有 40% 通常可在手術室拔管。","C":"錯誤。肺手術術中/術後心律不整常見(尤 AF)。","D":"錯誤。單肺通氣應用小潮氣量肺保護,大潮氣量會致肺損傷。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"105020-06":{"quick":"C 正確:脫離體外循環後若處理右心室衰竭,可提高吸入氧濃度、並把 PaCO2 調至約 25–30 mmHg(輕度過度換氣)以「擴張肺血管、降低肺血管阻力與右心後負荷」(防肺動脈收縮)。A、B、D 皆有錯誤。","detail":{"background":"二尖瓣置換(開心手術)麻醉。(A)錯誤:開心手術以「心肺體外循環機(cardiopulmonary bypass, CPB)」維持循環與氧合而打開心臟,「ECMO(體外膜氧合)」是不同的器械/情境(用於心肺衰竭支持),不是常規開心手術的體外循環方式;敘述把 ECMO 當成打開心臟的必須,不正確。(B)錯誤:吸入麻醉劑雖有心肌抑制作用,但「臨床上仍用於開心手術麻醉」(且具缺血預適應 cardioprotection 作用),說「不使用於開心手術」錯誤。(C)正確(本題答案):脫離 CPB 後若出現「右心室衰竭/肺高壓」,可「提高吸入氧濃度(O2 是肺血管擴張劑)、並輕度過度換氣使 PaCO2 約 25–30 mmHg(鹼化降低肺血管阻力)」以擴張肺血管、降右心後負荷(必要時加吸入 NO/前列環素、milrinone);因二尖瓣病變常合併肺高壓,此處理很重要。(D)錯誤:「術前腎功能異常的心臟手術病人死亡率為腎功能正常者的『兩倍』」——實際上術前腎功能不全使心臟手術死亡率上升「數倍(遠不只兩倍,依嚴重度)」,「兩倍」低估(此選項為錯誤敘述)。整合:開心手術用 CPB(非 ECMO)、可用吸入麻醉、脫離 CPB 後降肺血管阻力護右心、腎功能不全大幅增死亡率。","options":{"A":"錯誤。開心手術用 CPB(體外循環機),非 ECMO 才能打開心臟。","B":"錯誤。吸入麻醉劑仍用於開心手術(且有心肌保護)。","C":"正解。脫離 CPB 後處理右心衰:提高 O2、PaCO2 25–30 降肺血管阻力。","D":"錯誤。術前腎功能異常使死亡率上升數倍,「兩倍」低估。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"106020-06":{"quick":"D 為錯誤:TURP 症候群(經尿道攝護腺切除時大量低張沖洗液吸收致水中毒/稀釋性低血鈉)血壓「不一定下降」——初期常因循環容積過載而『高血壓』、合併心搏過緩,之後才可能低血壓;故「血壓一定下降」不正確。其餘架腳影響 FRC、半身麻醉仍須評估心肺、意識變化查血氧/血鈉皆正確。","detail":{"background":"經尿道攝護腺切除(TURP)麻醉。(A)正確:碎石/架腳(lithotomy)位使腹內容上推、膈肌上移,降低功能性肺餘容量(FRC),增加肺塌陷與低血氧風險(尤肥胖/老人)。(B)正確:TURP 常用「半身麻醉(脊髓/硬膜外)」(利於早期察覺 TURP 症候群與膀胱穿孔的清醒症狀、減少出血),但術前仍須評估老人的心肺功能。(C)正確:術中若出現「意識變化」,應警覺「TURP 症候群」與低血氧,抽血查「血氧與血鈉(稀釋性低血鈉)」。(D)錯誤(本題答案):TURP 症候群是大量「低張沖洗液(如 glycine、sterile water)」經前列腺靜脈竇吸收,造成「容積過載+稀釋性低血鈉、低滲透壓(水中毒)」,臨床「初期常因循環過載而『高血壓』、反射性『心搏過緩』、躁動、視覺障礙(glycine)、抽搐」,之後嚴重時才可能心衰/低血壓;故「血壓一定下降」不正確(早期反而高血壓)。處置:停手術、限水、利尿、高張食鹽水矯正嚴重低血鈉(緩慢)。整合:TURP 症候群=低鈉+容積過載+(glycine 神經毒),血壓變化非單純下降。","options":{"A":"正確。架腳(lithotomy)位降低 FRC。","B":"正確。常用半身麻醉,但仍須術前評估心肺。","C":"正確。意識變化應查血氧與血鈉。","D":"正解(錯誤)。TURP 症候群初期常高血壓+心搏過緩,非血壓「一定下降」。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"106080-06":{"quick":"C 為錯誤:肝硬化/肝移植病人「可以使用吸入性麻醉劑」(如 isoflurane、sevoflurane、desflurane,維持肝血流尚可),並非不適合;說「吸入麻醉不適合」不正確。其餘大量腹水採 RSI、選 cisatracurium/atracurium(Hofmann 代謝)、補凝血因子並監測皆正確。","detail":{"background":"肝硬化合併大量腹水、腎功能不良、凝血異常的肝移植麻醉。(A)正確:大量腹水增加腹內壓與吸入胃液(誤吸)風險,且肝病常胃排空差,應視為飽胃、採「快速順序誘導(RSI)」保護氣道。(B)正確:肌鬆劑宜選「cisatracurium 或 atracurium」(經 Hofmann 消除,不依賴肝腎),優於主要經肝代謝的 vecuronium(肝衰竭作用延長)。(C)錯誤(本題答案):「吸入性麻醉劑不適合用於此病人」不正確——現代吸入麻醉劑(isoflurane、sevoflurane、desflurane)對肝血流維持尚可、代謝率低、肝毒性低(避免 halothane),「可用於肝病/肝移植麻醉」;故說不適合錯誤。(D)正確:肝病凝血異常可輸「新鮮冷凍血漿(補凝血因子)、血小板、冷凍沉澱品(補纖維蛋白原)」並「監測凝血功能(PT/INR、血栓彈力圖 TEG/ROTEM)」導向輸血。整合:肝移植麻醉=RSI(飽胃)、Hofmann 代謝肌鬆劑、可用現代吸入劑、凝血導向輸血、注意再灌流症候群與血流動力。","options":{"A":"正確。大量腹水誤吸風險高,採 RSI。","B":"正確。選 cisatracurium/atracurium(Hofmann 代謝)優於 vecuronium。","C":"正解(錯誤)。現代吸入麻醉劑可用於肝病/肝移植,非不適合。","D":"正確。可輸 FFP/血小板/冷凍沉澱並監測凝血。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"106080-26":{"quick":"心臟病孕婦生產,麻醉最佳選擇是「硬脊膜外麻醉」——可緩慢分段給藥、漸進阻斷,血流動力穩定(避免脊椎麻醉的驟然交感阻斷低血壓,也避免全身麻醉的插管應激與心肌抑制)。","detail":{"background":"心臟病孕婦的分娩/剖腹麻醉,首要是「維持血流動力穩定、避免前後負荷與心率劇烈波動」。「硬脊膜外麻醉(epidural)」是最佳選擇(本題答案 B):可「緩慢、分段(titrated)」給藥,使交感阻斷與血壓下降「漸進可控」,並提供良好鎮痛降低分娩疼痛引起的心臟負荷;對多數心臟病(瓣膜病、心衰)較安全。對照:「脊椎(腰椎)麻醉(C)」單次注射使交感「驟然」廣泛阻斷、血壓急遽下降,對固定心輸出的病變(如嚴重主動脈/二尖瓣狹窄)危險;「全身麻醉(D)」有插管時的高血壓/心搏過速應激、麻醉劑心肌抑制、誤吸風險,僅在凝血異常、抗凝、緊急或硬膜外禁忌時選用;「局部麻醉(A,會陰浸潤)」鎮痛不足以應付產程/剖腹。整合:心臟病孕婦分娩鎮痛/麻醉首選「可分段控制的硬脊膜外」。","options":{"A":"局部(會陰)麻醉鎮痛不足,無法應付產程或剖腹。","B":"正解。硬脊膜外可分段給藥、血流動力穩定,最適合心臟病孕婦。","C":"腰椎(脊椎)麻醉驟然交感阻斷低血壓,對固定心輸出病變危險。","D":"全身麻醉有插管應激、心肌抑制與誤吸風險,非首選。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"107020-07":{"quick":"正確組合 123:①缺血再灌流常致低心輸出症候群(LCOS,CI<2.4)、②SvO2 反映心輸出與全身氧供需平衡、③須依生理多方調整前後負荷與收縮力。④「術後降低體溫」非標準(術後應「復溫」避免低體溫併發症),故排除。","detail":{"background":"心臟手術心肌缺血-再灌流的圍術期管理。①正確:可出現「低心輸出症候群(LCOS)」,心臟指數(cardiac index)<2.0–2.4 L/min/m²,須以正性肌力藥/機械輔助支持。②正確:肺動脈導管測得的「混合靜脈血氧飽和度(SvO2)」反映「心輸出量與全身氧供/耗的平衡」(SvO2 下降=氧供不足或耗氧增)。③正確:麻醉醫師須依生理變化「多方調整心室前負荷、後負荷與收縮力」(優化血流動力)。④「為降低全身氧耗,術後須鎮靜並『降低體溫』」——不正確:心臟手術後雖需鎮靜止痛,但「應主動復溫至正常體溫」(體外循環常致低體溫,術後低體溫會致寒顫增耗氧、凝血病變、心律不整),並非刻意降低體溫;故④排除。正確組合 123(本題答案 A)。整合:術後 LCOS 管理=正性肌力/IABP、SvO2 監測氧供需、優化前後負荷與收縮力、復溫而非降溫。","options":{"A":"正解(123)。①LCOS、②SvO2 反映氧供需平衡、③多方調整前後負荷與收縮力。","B":"124 納入④(術後應復溫非降溫)。","C":"134 納入④。","D":"234 排除①。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"107080-05":{"quick":"D 為錯誤:降腦壓的過度換氣「PaCO2 不是愈低愈好」——過低(<25–30)會使腦血管過度收縮致腦缺血,故目標約 30–35 mmHg。降 PaCO2 至 30–33、mannitol 滲透利尿、furosemide 減水分與 CSF 生成皆正確。","detail":{"background":"神經麻醉降腦壓策略。(A)正確:適度過度換氣把 PaCO2 降到約 30–33 mmHg,使腦血管收縮、降腦血流與顱內壓(暫時手段)。(B)正確:mannitol(0.25–0.5 g/kg)是滲透性利尿劑,「藉提高血漿滲透壓」把腦組織水分拉入血管內(完整血腦屏障處)而降腦壓(並降血黏度改善流變)。(C)正確:furosemide(loop 利尿劑)輔助降腦壓,機轉含「減少腦組織水分與抑制脈絡叢『腦脊髓液生成』」,並與 mannitol 協同。(D)錯誤(本題答案):「PaCO2 維持愈低愈好」不正確——PaCO2 過低(<25–30 mmHg)會使腦血管「過度收縮」致「腦缺血」(尤受傷腦組織),故過度換氣目標是約 30–35 mmHg(短期、必要時),不可一味追求極低 PaCO2。整合:降腦壓=床頭抬高、適度過度換氣(30–35,非愈低愈好)、滲透治療(mannitol/高張食鹽水)、furosemide、維持腦灌注壓、必要時去骨瓣。","options":{"A":"正確。PaCO2 降至 30–33 使腦血管收縮降腦壓。","B":"正確。mannitol 經提高血漿滲透壓降腦壓。","C":"正確。furosemide 減少腦水分與 CSF 生成。","D":"正解(錯誤)。PaCO2 非愈低愈好,過低(<25–30)致腦缺血;目標 30–35。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"108030-05":{"quick":"B 為錯誤:老人因藥物分布、清除率下降與標的器官敏感度增加,「麻醉藥效力(需求量)是『增加敏感、需減量』」而非「藥效減少」;且老人白蛋白下降使「游離藥增多、作用增強」,故說「蛋白結合下降故藥效減少」方向錯。其餘年齡為次要因子、無證據半身麻醉併發症較少、POCD 較高皆正確。","detail":{"background":"老人麻醉。(A)正確:術前風險評估須綜合多項因子,「單純年齡」本身是「次要因子(minor factor)」——真正決定風險的是共病、功能狀態與手術別,不應只看年齡。(B)錯誤(本題答案):老人白蛋白可能下降→與藥物結合減少→「游離(活性)藥物『增加』→作用『增強』」;加上分布容積改變、肝腎清除下降與中樞敏感度增加,老人對麻醉藥「更敏感、需求量(劑量)下降」;故「蛋白結合下降『故麻醉藥效力減少』」是錯誤(應為作用增強、須減量)。(C)正確:目前「無一致證據顯示老人圍術期『半身麻醉的併發症少於全身麻醉』」(兩者整體結局相近,依情況選擇)。(D)正確:老人「術後認知功能障礙(POCD)、術後譫妄」發生率較高。整合:老人麻醉須「減量、滴定」(對藥物更敏感)、重視 POCD/譫妄預防,風險取決於共病而非年齡本身。","options":{"A":"正確。單純年齡是次要因子,須綜合共病評估。","B":"正解(錯誤)。老人白蛋白下降使游離藥增、作用增強須減量,非藥效減少。","C":"正確。無證據顯示老人半身麻醉併發症較全身麻醉少。","D":"正確。老人術後認知功能障礙發生率較高。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"108080-06":{"quick":"B 為錯誤:肥胖病患因代謝與耗氧增加、胸壁/腹部負荷大,「每分鐘呼吸次數與分鐘通氣量『增加』(以代償耗氧),且 FRC 下降」,並非「不變」。其餘循環血量/心輸出/耗氧增加致心臟易缺血、易胃食道逆流、困難插管機會高皆正確。","detail":{"background":"肥胖病患(BMI>30)生理與術前評估。(A)正確:肥胖使循環血量、心搏輸出與耗氧量增加,長期致左心室肥大、心臟負荷重、易缺血(及高血壓、心衰、睡眠呼吸中止相關肺高壓)。(B)錯誤(本題答案):肥胖者因代謝/耗氧與 CO2 產生增加、胸腹脂肪負荷使呼吸功增加,「每分鐘呼吸次數與分鐘通氣量會『增加』(代償)」,且「功能性肺餘容量(FRC)下降、易低血氧、呼吸儲備差」;說「呼吸次數與通氣量不變」不正確。(C)正確:肥胖者腹內壓高、易「胃食道逆流」與飽胃,誤吸風險高(誘導須警覺)。(D)正確:肥胖者頸短、軟組織多、Mallampati 高,「困難插管與困難面罩通氣機會較高」,且氧儲備差(FRC 低)使呼吸暫停耐受時間短。整合:肥胖麻醉=困難氣道準備、預給氧+頭高位(ramp)、誤吸預防、依瘦體重/校正體重給藥、FRC 低易缺氧、合併 OSA。","options":{"A":"正確。肥胖致循環血量/心輸出/耗氧增加,心臟易缺血。","B":"正解(錯誤)。肥胖者呼吸次數與分鐘通氣量「增加」、FRC 下降,非不變。","C":"正確。肥胖者易胃食道逆流(誤吸風險高)。","D":"正確。肥胖者困難插管機會較高。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"108080-07":{"quick":"C 為錯誤:「手術引起高血糖為正常生理變化、血糖控制在 250 即可」不正確——圍術期應避免明顯高血糖(目標多<180 mg/dL),高血糖增加感染、傷口癒合不良與滲透性利尿;250 過高。其餘 DM 器官傷害隱匿、自主神經病變徵候、術日停皮下胰島素皆正確。","detail":{"background":"糖尿病(DM)病人麻醉。(A)正確:DM 相關器官傷害(冠心病、腎病、神經病變、視網膜病變)常「症狀不明顯」而被忽略(無痛心肌缺血),術前須主動評估。(B)正確:「高血壓、無痛性心肌梗塞、姿態性低血壓、靜止性心搏過速」等是 DM「自主神經病變」的徵候(也增加圍術期心血管風險與胃輕癱誤吸)。(C)錯誤(本題答案):「手術引起高血糖是正常生理、血糖控制在 250 mg/dL 即可」不正確——手術應激確會升血糖,但「圍術期應控制高血糖(一般目標<180 mg/dL,避免>200–250)」,因明顯高血糖增加感染、傷口癒合不良、滲透性利尿/脫水、電解質紊亂與不良結局;「250 即可」過於寬鬆。(D)正確:術前使用胰島素者,若手術當天禁食、未靜脈給葡萄糖,「一般應暫停/減量原本的皮下胰島素(尤短效/餐前)」、保留基礎並監測血糖、必要時給胰島素葡萄糖點滴調控,避免低血糖。整合:DM 圍術期=評估隱匿器官傷害與自主神經病變、控制血糖<180(避免高低血糖)、調整胰島素/口服降糖藥、注意胃輕癱誤吸。","options":{"A":"正確。DM 器官傷害常隱匿被忽略。","B":"正確。無痛心梗、姿態性低血壓是自主神經病變徵候。","C":"正解(錯誤)。圍術期應控制高血糖(目標<180),250 過高、非正常可接受。","D":"正確。術日禁食且無靜脈葡萄糖時應暫停/調整皮下胰島素。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"110080-07":{"quick":"B 為錯誤:顱內血腫(顱內高壓)麻醉誘導「不宜用 ketamine」——傳統認為其升高腦血流與顱內壓;應選降腦代謝/腦壓的藥(propofol、etomidate)。其餘避免腦血管舒張藥、narcotic 為基礎+肌鬆劑維持、CPP<60 有再損傷風險皆正確。","detail":{"background":"顱內血腫急診手術麻醉(顱內高壓)。(A)正確:誘導宜「避免具腦血管舒張作用的藥物」(如氯胺酮、過量揮發劑、過度的血管擴張),以免增加腦血流與顱內壓。(B)錯誤(本題答案):「ketamine 是理想的誘導選擇」不正確——ketamine 傳統上「升高腦血流與顱內壓」(且升血壓),在顱內高壓/顱內血腫應「避免/謹慎」;理想誘導應選「降腦代謝、降腦血流與顱內壓」的 propofol 或血流動力穩定的 etomidate(並以 opioid 鈍化插管反應、lidocaine 輔助)。(C)正確:術後若需維持氣管插管送 ICU,以「narcotic(opioid)為基礎的麻醉輔以肌鬆劑」維持(避免嗆咳/掙扎升顱內壓、便於控制通氣)是良好選擇。(D)正確:腦灌注壓(CPP=MAP−ICP)若<60 mmHg,腦灌流不足、有「再度缺血損傷」風險,須維持足夠 CPP(一般目標 60–70)。整合:顱內高壓麻醉=維持 CPP、降顱內壓、避免 ketamine/腦血管舒張藥、平順誘導(propofol/etomidate+opioid)、控制 PaCO2 30–35、術後鎮靜控制通氣。","options":{"A":"正確。避免使用具腦血管舒張作用的藥物。","B":"正解(錯誤)。顱內高壓不宜用 ketamine(升腦血流/顱內壓);應選 propofol/etomidate。","C":"正確。術後 opioid 為基礎+肌鬆劑維持是良好選擇。","D":"正確。CPP<60 mmHg 有腦部再損傷風險。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"112080-06":{"quick":"A 為錯誤:孕婦麻醉「不宜用 permissive hypercapnia(容許性高碳酸)」維持——高 PaCO2 會致胎兒酸中毒、子宮胎盤血流改變;孕婦應維持接近正常(略偏鹼)的 PaCO2(約 30 mmHg,孕期生理性過度換氣)。其餘氣腹壓勿太高、避免極端體位、監測胎心音皆正確。","detail":{"background":"懷孕中期(25 週)非產科手術(腹腔鏡闌尾切除)的麻醉。(A)錯誤(本題答案):「術中用 permissive hypercapnia 維持麻醉」不正確——孕婦正常生理是「過度換氣、PaCO2 略低(約 30 mmHg)、輕度呼吸性鹼」;若容許高碳酸(permissive hypercapnia),母體高 PaCO2 會經胎盤致「胎兒酸中毒」、並影響子宮胎盤血流與胎兒氧合,故孕婦腹腔鏡(CO2 氣腹本就增加 CO2 吸收)更須「維持母體 PaCO2 接近正常(以 EtCO2 監測、適度增加通氣)」,不可容許高碳酸。(B)正確:腹腔鏡氣腹壓「儘量不要太高」(降低對子宮胎盤灌流與母體靜脈回流的影響,一般≤12–15 mmHg 且偏低)。(C)正確:避免過度頭低腳高或頭高腳低(極端體位影響母體血流動力與子宮灌流)。(D)正確:可行時「監測胎心音(fetal heart rate)」評估胎兒狀況。整合:孕婦非產科手術=維持子宮胎盤灌流與正常 PaCO2(勿高碳酸)、左傾避免腔靜脈壓迫、適當時機(中期較安全)、監測胎兒、預防早產。","options":{"A":"正解(錯誤)。孕婦不宜容許性高碳酸(致胎兒酸中毒);維持 PaCO2 接近正常(約 30)。","B":"正確。氣腹壓儘量不要太高。","C":"正確。避免過度頭低腳高或頭高腳低。","D":"正確。術中宜監測胎心音。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"112080-07":{"quick":"B 為錯誤:現代產科鎮痛「不須等子宮頸開到 3 cm 才施打」硬脊膜外止痛——研究顯示早期(潛伏期)施打「不會延長產程或增加剖腹產率」,只要產婦要求即可給;故「必須等開 3 cm」說法已過時、不正確。其餘 T10–L1 第一產程、可能延長第二產程、給 test dose 皆正確。","detail":{"background":"產婦硬脊膜外止痛(labor epidural)。(A)正確:第一產程疼痛(子宮收縮、子宮頸擴張)經 T10–L1 交感傳入,硬脊膜外止痛主要作用於此節段。(B)錯誤(本題答案):過去曾認為須等子宮頸開 3–4 cm 才施打硬脊膜外以免延長產程/增加剖腹產;但現代實證(多項 RCT 與 ACOG 立場)顯示「早期(潛伏期、產婦一要求即可)施打『不會』延長第一產程或增加剖腹產率」,故「必須等開 3 cm 以上才能施打」是錯誤、過時的觀念——應依產婦需求即時提供。(C)正確:持續用於第二產程「可能略延長第二產程」(運動阻滯減弱用力),但可調整濃度(低濃度走動式 walking epidural)減輕,並不增加剖腹產;此為可接受的權衡。(D)正確:置入導管後先給「test dose(含腎上腺素的局麻藥)」確認導管未誤入「蛛網膜下腔(會快速廣泛阻斷)或血管(心搏加快)」,確保安全。整合:現代產科鎮痛=產婦要求即可給(不必等宮口大小)、低濃度局麻藥+opioid、test dose 確認位置、注意低血壓與胎心。","options":{"A":"正確。第一產程疼痛經 T10–L1,硬脊膜外作用於此節段。","B":"正解(錯誤)。不須等開 3 cm,早期施打不延長產程/不增剖腹產率。","C":"正確。持續用於第二產程可能略延長(可調整濃度)。","D":"正確。置管後給 test dose 確認未誤入脊髓腔/血管。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"113020-07":{"quick":"B 為錯誤:剖腹產全身麻醉「仍可用 succinylcholine」——它分子大、游離少、不易通過胎盤,『不會』明顯影響新生兒呼吸;且是 RSI 快速插管(孕婦飽胃)的標準肌鬆劑。其餘視為飽胃給制酸劑、娩出後再給 opioid、娩出後 0.5 MAC 維持皆正確。","detail":{"background":"剖腹產插管全身麻醉。(A)正確:足月孕婦因胃排空慢、腹內壓高、食道下括約肌張力低,皆視為「飽胃(full stomach)」,術前給「不含顆粒的口服制酸劑(nonparticulate antacid,如 sodium citrate)」中和胃酸、預防誤吸性肺炎(Mendelson),並採 RSI+環狀軟骨壓迫。(B)錯誤(本題答案):「不宜用 succinylcholine 以免影響嬰兒呼吸」不正確——succinylcholine 是「高度離子化、分子量小但脂溶性低、且被母體血漿膽鹼酯酶快速水解」,「幾乎不通過胎盤、不影響新生兒呼吸」,是剖腹產 RSI 的標準快速肌鬆劑;故說不宜使用是錯誤。(C)正確:為避免新生兒被 opioid 抑制呼吸,「opioid 通常在胎兒娩出後(夾臍帶後)才給」(誘導前避免大量 opioid,除非有重度高血壓/心臟病等指徵需鈍化插管反應)。(D)正確:胎兒娩出後,若用揮發劑維持,建議「約 0.5 MAC」即可(過高揮發劑會抑制子宮收縮致產後出血;娩出後可加 opioid/N2O 補足麻醉深度並給子宮收縮劑)。整合:剖腹產全麻=飽胃 RSI(succinylcholine 可用、環狀軟骨壓迫、制酸劑)、娩出前避免 opioid、娩出後低 MAC 揮發劑+opioid 並給宮縮劑。","options":{"A":"正確。足月孕婦視為飽胃,給不含顆粒制酸劑預防誤吸。","B":"正解(錯誤)。succinylcholine 不通過胎盤、不影響嬰兒呼吸,可用於剖腹產 RSI。","C":"正確。胎兒娩出後再給 opioid 避免抑制新生兒呼吸。","D":"正確。娩出後揮發劑維持約 0.5 MAC(避免抑制子宮收縮)。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"114020-05":{"quick":"D 最適當:分娩硬脊膜外止痛使用「低濃度 bupivacaine」可達到良好鎮痛而「較少運動阻滯」,允許產婦下床走動(walking epidural)。A、B、C 皆錯。","detail":{"background":"產婦分娩硬脊膜外止痛用藥。(A)錯誤:在局麻藥中「添加類鴉片(opioid,如 fentanyl)」是常規且有益——可增強鎮痛、「降低局麻藥用量與濃度」、減少運動阻滯與低血壓,故「不建議添加 opioid」說法錯誤(實際應添加以協同)。(B)錯誤:bupivacaine 雖作用時間長,但「具心臟毒性」(誤入血管可致頑固心律不整、心臟停止),故分娩鎮痛用「低濃度」並謹慎(產科曾因 0.75% bupivacaine 致死而禁用高濃度);說「不具心臟毒性」錯誤。(C)錯誤:現代分娩鎮痛用「低濃度局麻藥+opioid」(如 0.0625–0.125% bupivacaine + fentanyl)以「鎮痛佳但運動阻滯少」;「常用較高濃度局麻藥」不正確(高濃度增運動阻滯、低血壓、毒性)。(D)正確(本題答案):用「低濃度 bupivacaine」可提供良好鎮痛且「較少運動阻滯」,使產婦保留下肢肌力、可下床走動(walking epidural / ambulatory analgesia),提升舒適與滿意度。整合:現代分娩硬脊膜外=低濃度局麻藥+opioid、運動阻滯少、可走動、注意低血壓與毒性。","options":{"A":"錯誤。應添加 opioid 協同鎮痛、降低局麻藥用量與副作用。","B":"錯誤。bupivacaine 具心臟毒性,須用低濃度謹慎。","C":"錯誤。現代用低濃度局麻藥,非高濃度。","D":"正解。低濃度 bupivacaine 鎮痛佳且運動阻滯少,可下床走動。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"114070-04":{"quick":"D 為最不適當:重症肌無力(MG)病人對「非去極化」肌鬆劑「異常敏感(須大幅減量)」;對「去極化的 succinylcholine 則『阻抗』(需『增加』劑量)」,故「去極化肌鬆劑應減少劑量」不正確。其餘 AChR 破壞減少、術前評估抗膽鹼酯酶劑量、TOF 監測皆正確。","detail":{"background":"重症肌無力(MG)病人麻醉。(A)正確:MG 是自體免疫疾病,抗體破壞神經肌肉接合處「乙醯膽鹼受體(AChR)」,使「功能性受體數量減少」→肌肉無力、易疲乏。(B)正確:術前須評估「抗膽鹼酯酶劑(pyridostigmine)」的使用劑量與時機(圍術期管理影響肌力與肌鬆劑反應;過量可致膽鹼能危象、不足致肌無力危象)。(C)正確:MG 病人「術後呼吸衰竭風險高」,圍術期應以「周邊神經刺激器 TOF」客觀監測肌鬆程度與恢復,謹慎拔管。(D)最不適當(本題答案):MG 病人對「『非去極化』肌鬆劑異常敏感(極小量即深度延長阻斷,須『大幅減量』或避免)」;但對「『去極化』的 succinylcholine 反而呈『阻抗(resistance)』,需『增加』劑量才達效(因功能性受體少)」——故「使用『去極化』肌鬆劑時應『減少』劑量」是錯誤(應為相對阻抗、需求增加;惟須注意其代謝與第 II 相阻斷)。整合:MG 麻醉=避免/極少量非去極化肌鬆劑(敏感)、succinylcholine 相對阻抗、TOF 監測、術後可能需延長呼吸支持、維持抗膽鹼酯酶治療。","options":{"A":"正確。MG 為自體免疫致 AChR 破壞、受體數量減少。","B":"正確。術前須評估抗膽鹼酯酶劑(pyridostigmine)劑量。","C":"正確。術後呼吸衰竭風險高,應 TOF 監測。","D":"正解(最不適當)。MG 對去極化肌鬆劑「阻抗、需增量」,非減少劑量;對非去極化才須減量。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}},"115020-06":{"quick":"A 最適合:血小板 100,000(×10⁶/L,即 100×10⁹/L)仍在可接受範圍,適合施打硬脊膜外。B(穿刺部位感染)、C(嚴重主動脈狹窄,神經軸阻斷致交感擴張危險)、D(腦瘤致顱內高壓,神經軸穿刺有腦疝/CSF 壓力風險)皆為相對/絕對禁忌。","detail":{"background":"減痛分娩硬脊膜外導管的適應與禁忌篩選。神經軸麻醉(硬脊膜外/脊髓)的禁忌:病人拒絕、「穿刺部位感染」、「未矯正凝血異常/血小板過低」、「未矯正低血容/休克」、「嚴重固定心輸出的瓣膜病(嚴重主動脈狹窄、二尖瓣狹窄)」、「顱內高壓/占位病灶(穿刺致 CSF 壓力改變有腦疝風險)」、嚴重脊柱畸形等。逐一評估:(A)血小板 100,000(=100×10⁹/L)仍在「可安全施行神經軸麻醉的範圍」(一般>70–80×10⁹/L 且功能正常即可),最適合(本題答案 A)。(B)背部穿刺部位「有滲液、疑感染」→感染可能擴散致硬膜外膿瘍/腦膜炎,為禁忌。(C)「嚴重主動脈瓣狹窄」→神經軸阻斷致交感擴張、前後負荷驟降,固定心輸出無法代償,危險,屬禁忌/須極謹慎。(D)「腦部腫瘤(顱內占位/可能顱內高壓)」→神經軸穿刺改變 CSF 壓力動力,有「腦疝(herniation)」風險,屬禁忌。故最適合者為 A。整合:神經軸麻醉前評估凝血/血小板、穿刺部位感染、心臟瓣膜固定病變、顱內壓/占位。","options":{"A":"正解。血小板 100×10⁹/L 仍在可接受範圍,最適合施打硬脊膜外。","B":"穿刺部位疑感染,有硬膜外膿瘍/腦膜炎風險,為禁忌。","C":"嚴重主動脈狹窄者神經軸阻斷致交感擴張危險,為禁忌/須極謹慎。","D":"腦部腫瘤(顱內占位)神經軸穿刺有腦疝風險,為禁忌。"},"sources":["Miller's Anesthesia 9e, Anesthesia for Special Populations & Subspecialty","Morgan & Mikhail's Clinical Anesthesiology 6e","Chestnut's Obstetric Anesthesia; Neuroanesthesia/Cardiac/Thoracic chapters"]}}},TO=["吸入性麻醉劑", "靜脈麻醉劑與鎮靜", "神經肌肉阻斷劑與拮抗", "局部麻醉與區域神經阻斷", "呼吸道處置與氣管插管", "圍術期監測", "麻醉前評估與圍術期併發症", "疼痛醫學", "重症醫學與心肺復甦", "特殊族群與器官移植麻醉"],LEC={"吸入性麻醉劑":{"title":"吸入性麻醉劑","html":"<p><b>核心概念。</b>吸入麻醉劑的三大物化參數決定其臨床表現:<b>血/氣分配係數(λ,溶解度)</b>決定誘導/甦醒快慢(λ 愈低愈快);<b>油/氣分配係數(脂溶性)</b>決定效價(脂溶性高→MAC 低→效價強,Meyer-Overton);<b>MAC</b> 量化效價並代表「腦中(≈呼氣末)濃度」即麻醉深度。</p>\n<p><b>誘導速率(FA/FI 上升)。</b>愈快平衡(誘導快)的因素:低溶解度、高吸入濃度(over-pressure)、高通氣、減少再吸入、<b>低心輸出</b>(uptake 少 FA 升快)。拖慢者:高迴路容量(緩衝)、高溶解度、高心輸出。注意「uptake 大→FA 升慢→誘導慢」(uptake 與誘導速度反向)。</p>\n<p><b>各劑 MAC/λ 排序(必背)。</b>MAC:halothane 0.75 < iso 1.15 < sevo 2 < des 6 < N2O 104%。λ:des 0.42 < N2O 0.46 < sevo 0.65 < iso 1.4 < halothane 2.5。→ des/N2O 誘導甦醒最快、效價最弱;halothane 效價最強、最慢。</p>\n<p><b>MAC 調節。</b>↑MAC:發燒、甲亢、慢性酗酒、嬰幼兒、中樞興奮劑。↓MAC:高齡、低體溫、懷孕、急性酒精/中樞抑制劑(opioid/benzo/α2/<b>靜脈或局部麻醉藥</b>)、嚴重低血壓/貧血/缺氧、reserpine。不影響:血壓(範圍內)、麻醉時間、性別。</p>\n<p><b>特性陷阱。</b>① des 刺激性最大→不可吸入誘導;sevo 無刺激→吸入誘導首選。② 快速加 des 致<b>交感興奮</b>(心率/血壓/catecholamine 短暫上升)。③ halothane 致心律不整閾值最低(對腎上腺素最敏感)。④ N2O 是唯一<b>增加</b>腦代謝/腦血流者;鹵化劑降腦代謝但擴腦血管。⑤ 化學降解:sevo 遇吸收劑→compound A(腎毒);乾燥吸收劑使 des/iso→CO。sevo、des 只含氟不含氯。⑥ 效價與年齡有關(MAC 隨年齡下降)。</p>"},"靜脈麻醉劑與鎮靜":{"title":"靜脈麻醉劑與鎮靜","html":"<p><b>機轉。</b>多數靜脈劑增強 <b>GABA-A</b>(thiopental/巴比妥、propofol、benzodiazepine);例外:<b>ketamine</b> 拮抗 NMDA、<b>dexmedetomidine</b> 為 α2 致效。</p>\n<p><b>Thiopental。</b>弱酸、高蛋白結合、強鹼配製(用生理食鹽水勿用 LR);降腦代謝/腦壓(護腦);<b>無止痛</b>(低劑量反痛覺過敏);低血容/低白蛋白/酸中毒須減量(鹼中毒不必)。</p>\n<p><b>Propofol。</b>快誘導快甦醒、抑制氣道反射(氣喘可用)、止吐;脂肪乳劑<b>利於細菌生長</b>(無菌、限時);抑制呼吸與血壓;降腦壓。</p>\n<p><b>Ketamine。</b>解離性麻醉(睜眼、眼震、保留反射、流涎),<b>強止痛、支氣管擴張、維持血壓(交感興奮)、呼吸抑制最少</b>→休克/氣喘插管首選;但升腦血流/顱內壓、致甦醒幻覺(benzo 預防)→<b>顱內高壓慎用</b>。</p>\n<p><b>Etomidate。</b>心血管最穩定(休克/心臟病誘導);但<b>抑制腎上腺皮質醇合成(11β-hydroxylase)</b>,持續輸注增敗血死亡,腎上腺功能障礙慎用;注射痛、肌陣攣、PONV 高。</p>\n<p><b>拮抗。</b>flumazenil 拮抗 benzodiazepine(作用短、可再鎮靜);naloxone 拮抗 opioid。Dexmedetomidine:可喚醒鎮靜、幾乎不抑制呼吸、節省 opioid、減譫妄,但低血壓/心搏過緩。</p>"},"神經肌肉阻斷劑與拮抗":{"title":"神經肌肉阻斷劑與拮抗","html":"<p><b>分類。</b>去極化:<b>succinylcholine</b>(唯一,起效最快 30–60 秒、作用最短,經血漿膽鹼酯酶水解)。非去極化:aminosteroid(rocuronium、vecuronium、pancuronium)與 benzyl-isoquinolinium(atracurium、cisatracurium、mivacurium、d-tubocurarine)。</p>\n<p><b>關鍵藥。</b>① <b>cisatracurium</b>:經 Hofmann 消除(不依賴肝腎)、不釋組織胺、血壓穩→嚴重肝腎衰首選。② vecuronium/rocuronium 經肝;pancuronium 經腎且致心搏過速。③ benzyl-isoquinolinium(尤 d-tubocurarine、mivacurium)易釋組織胺致低血壓。</p>\n<p><b>Succinylcholine 禁忌/副作用。</b>燒傷(>24–48h)、去神經(脊髓損傷/中風)、擠壓傷、長期臥床→接合外受體上調→<b>高血鉀(致命)</b>,應避免改 rocuronium;另:惡性高熱觸發、橫紋肌溶解、升顱內壓/眼壓/胃內壓、兒童心搏過緩(先給 atropine);肌束顫動可先給小劑量非去極化劑(defasciculate)。</p>\n<p><b>監測與拮抗。</b><b>TOF(四連刺激)</b>是評估非去極化恢復最客觀指標;T4 再現=開始恢復,<b>TOFR≥0.9</b>(定量)才足夠拔管(0.8 不足、潮氣量/呼吸速率不可靠)。拮抗:<b>neostigmine</b>(抗膽鹼酯酶,須 TOF≥2 才給、併 atropine/glycopyrrolate);<b>sugammadex</b> 專一包覆 steroidal(rocuronium>vecuronium),可深度/緊急反轉,對 cisatracurium 無效。NMBD <b>只致肌肉麻痺、無鎮靜止痛失憶</b>。MG 病人對非去極化異常敏感、對 succinylcholine 阻抗。</p>"},"局部麻醉與區域神經阻斷":{"title":"局部麻醉與區域神經阻斷","html":"<p><b>機轉與物性。</b>阻斷<b>電壓門控鈉通道</b>(use-dependent);脂溶性↔效價、pKa↔起效(加碳酸氫鈉鹼化加速起效)、蛋白結合↔作用時間。差異阻斷順序:自主→痛溫→觸壓→運動。</p>\n<p><b>分類。</b>amide(<b>li-do-ca-i-ne</b> 等「兩個 i」,肝代謝、過敏罕見)vs ester(procaine/tetracaine/cocaine,血漿膽鹼酯酶水解、產 PABA 較易過敏)。lidocaine 短效、bupivacaine 長效且<b>心臟毒性最強</b>。</p>\n<p><b>全身毒性(LAST)。</b>全身吸收順序 IV>肋間>caudal>epidural>叢>皮下(肋間最易中毒)。表現:口周/舌麻、耳鳴、頭暈→抽搐→昏迷呼吸抑制;心臟毒性(bupivacaine)。處置:停藥、給氧、benzo 止痙、<b>20% 脂肪乳劑</b>救援;避免再給 lidocaine/鈣阻斷/大量 vasopressin。lidocaine 上限約 4.5(加 epinephrine 7)mg/kg;epinephrine 佐劑=α1 血管收縮(延長、減吸收、標記血管內),非 α2 止痛。</p>\n<p><b>神經軸解剖。</b>硬脊膜外「落空感」=穿過<b>黃韌帶</b>進硬脊膜外腔;脊椎麻醉見 CSF=穿過<b>蜘蛛網膜</b>進蛛網膜下腔。caudal=經薦裂注入薦部硬脊膜外腔。脊麻平面受比重/姿勢/劑量/身高/腹內壓(肥胖懷孕↑平面)影響;給藥速度影響最小。脊麻最常見併發症=低血壓(交感阻斷)。</p>\n<p><b>PDPH。</b>術後 1–2 天<b>姿勢性頭痛</b>(坐起加劇、平躺改善),CSF 滲漏致顱內低壓;用細的筆尖型針可降低;頑固者硬脊膜外血液貼片。禁忌:拒絕、部位感染、凝血異常、低血容、嚴重主動脈/二尖瓣狹窄、顱內高壓。</p>"},"呼吸道處置與氣管插管":{"title":"呼吸道處置與氣管插管","html":"<p><b>核心原則:維持氧合優先於完成插管</b>(病人死於缺氧)。困難氣道四原則中「充分充氧(預給氧+嘗試間面罩通氣)」優先性最高。</p>\n<p><b>氣道評估。</b>核心三項=張口、下顎前挺、頭頸伸展。<b>Mallampati</b>:I 見軟顎/懸壅垂/咽門柱;II 見軟顎/懸壅垂;III 僅見軟顎+懸壅垂基部;IV 僅見硬顎(III/IV 困難)。<b>3-3-2</b>:張口 3 指、頦-舌骨 3 指、舌骨-甲狀軟骨 2 指。<b>LEMON</b>(Look/Evaluate 3-3-2/Mallampati/Obstruction/Neck)。困難面罩通氣(MOANS):Mask seal(<b>大鬍鬚</b>)、Obese、Age>55、No teeth、Stiff/Snore。</p>\n<p><b>插管要點。</b>喉鏡由口右側進、撥舌向左、上提非槓桿(勿壓牙);須備抽吸。確認位置=<b>EtCO2 持續方波</b>(金標準)+雙側呼吸音+上腹無音±光纖/X 光(X 光看深度非即時確認)。<b>RSI</b>(飽胃):預給氧、快速誘導+快速肌鬆(succinylcholine 或高劑量 rocuronium)、環狀軟骨壓迫、最小化面罩通氣;禁忌=預期困難氣道(嚴重臉部外傷,恐 CICV)。</p>\n<p><b>困難氣道處置。</b>面罩通氣困難:抬下頜把臉扣進面罩(勿用力下壓)、口/鼻咽呼吸道、雙手扣罩。<b>清醒纖維插管</b>:預期困難氣道首選(局麻下保留自主呼吸);阻斷舌咽/喉上/經喉神經,<b>不阻斷喉返神經</b>(致雙側聲帶麻痺)。CICV→環甲膜切開(<b>6 歲以下禁用</b>,改針式經氣管噴射);長期氣道→氣管切開(減死腔/減喉傷)。cuff 壓力 20–30 cmH2O。</p>"},"圍術期監測":{"title":"圍術期監測","html":"<p><b>ASA 標準基本監測。</b>氧合(<b>SpO2</b>)、通氣(<b>EtCO2/capnography</b>)、循環(ECG、血壓)、體溫。氧合與通氣須分開監測:SpO2 看氧合(不評估通氣/CO2/酸鹼);EtCO2 看通氣。</p>\n<p><b>SpO2 原理/陷阱。</b>O2Hb(940nm)與 deO2Hb(660nm)吸收差異;受指甲油/低灌流/低體溫/強光影響;<b>CO 中毒時假性正常偏高</b>;與 PaO2 呈 S 形(>90% 不保證組織無缺氧);測動脈搏動血。</p>\n<p><b>EtCO2。</b>與 PaCO2 有可變梯度(不能完全反映)。<b>突發銳減</b>=管路脫落/食道插管、肺栓塞、心輸出驟減(過度換氣是漸降)。<b>升高</b>=發燒/MH/CO2 吸收(產生↑)或低通氣。CPR 中監測按壓品質與 ROSC(突升至 40)。<b>食道插管=無持續方波</b>(本主題附圖)。</p>\n<p><b>侵入性監測。</b>動態指標(SVV/PPV)優於靜態(CVP/PCWP)預測輸液反應性;CVP 與血量非簡單正比;肺動脈導管未證實改善預後。<b>SvO2</b>(肺動脈導管抽,正常 65–75%)反映全身氧供需(發燒/疼痛耗氧↑使 SvO2 降)。PCWP 高估 LVEDP:正壓/PEEP、二尖瓣狹窄、COPD。TEE 評估心功能/瓣膜/容積但<b>不能看冠脈狹窄</b>。</p>\n<p><b>神經/深度監測。</b>SSEP(感覺後柱,受揮發劑/低體溫抑制)、MEP(運動前柱,對麻醉/肌鬆敏感)、wake-up test(測下肢運動);ketamine 活化 EEG(BIS 失準)、propofol/巴比妥抑制 EEG(深至 burst suppression,BIS<20)。<b>BIS</b> 40–60=適當麻醉減少術中清醒、100=清醒;只測意識不含止痛。</p>"},"麻醉前評估與圍術期併發症":{"title":"麻醉前評估與圍術期併發症","html":"<p><b>術前評估。</b><b>ASA-PS 分級</b>(I 健康–VI 腦死,E 緊急)是麻醉風險通用語言。神經軸麻醉前評估凝血(尿毒病人查出血時間=血小板功能)。pacemaker 病人:術前查功能、放磁鐵轉非同步起搏(不能「完全」避免電燒干擾)、關 ECG filter、併 SpO2。手術室外/MRI 麻醉須同等安全標準(備電擊器;MRI 用相容設備防飛射)。</p>\n<p><b>體溫。</b>圍術期低體溫常見且全麻與<b>區域麻醉皆須監測保溫</b>(>30 分鐘全麻常規,目標核心>36°C)。最主要初始失溫=麻醉致血管擴張的<b>重分布性低體溫</b>(第 1 小時降 0.5–1.5°C,預暖最有效);低體溫致寒顫增耗氧、凝血病變、感染、甦醒延遲。</p>\n<p><b>PONV/惡性高熱/譫妄。</b>PONV 危險因子(Apfel):女性、不吸菸、PONV/暈車史、術後 opioid;預防用 dexamethasone、5-HT3 拮抗、droperidol、propofol TIVA。<b>惡性高熱</b>=遺傳性肌肉鈣調節異常(RYR1),揮發劑/succinylcholine 觸發,EtCO2 突升+高溫+肌僵直,治療 dantrolene。術後譫妄危險:高齡、認知障礙、視聽障礙、大手術、疼痛控制不良(非女性)。</p>\n<p><b>姿勢/恢復。</b>頭低腳高(Trendelenburg)用於下腹/骨盆(上腹用反 Trendelenburg),升 CVP/ICP/IOP、降 FRC、致喉頭水腫。預防周邊神經損傷:評估擺位耐受、胸捲軸護臂神經叢、勿過度屈肘(尺神經)。PACU 高低血壓都有;<b>Aldrete</b>(活動/呼吸/循環/意識/血氧,≥9 轉出),疼痛不在 Aldrete(在 PADSS)。</p>"},"疼痛醫學":{"title":"疼痛醫學","html":"<p><b>WHO 癌痛三原則。</b>by mouth(<b>口服優先</b>)、by the clock(定時)、by the ladder(階梯:非鴉片→弱→強 opioid±輔助);重度可直接給強 opioid。多模式(NSAID/acetaminophen/抗癲癇/抗憂鬱/類固醇/區域阻斷)減 opioid。</p>\n<p><b>Opioid 藥理。</b>受體 µ/κ/δ(GPCR,開鉀關鈣→過極化);<b>嗎啡呼吸抑制經 µ(非 κ)</b>。便秘<b>不會耐受</b>→長期用須併軟便劑。長期可致<b>痛覺過敏(OIH)</b>。methadone 半衰期最長易蓄積。remifentanil 經酯酶水解、不蓄積、不依賴假性膽鹼酯酶。腎衰避免 <b>meperidine</b>(normeperidine 蓄積致抽搐)與 morphine,選 fentanyl;naloxone 拮抗(作用短防再麻醉)。快速大量 opioid 致胸壁僵直。</p>\n<p><b>PCA。</b>優點:止痛佳、滿意度高、可自控、負回饋(疼痛緩解就不按,相對安全)、降總劑量;<b>非任何病患皆可用</b>(需認知/操作能力,幼兒/意識障礙不適用);可用多種 opioid(非僅嗎啡)。</p>\n<p><b>區域/慢性。</b>TKA 術後:內收肌管/股神經阻斷佳(膝前內側為主),<b>坐骨神經阻斷單獨最差</b>。硬膜外止痛:降 opioid/腸胃/肺併發症,是<b>降低</b>交感外流(非增加)。慢性疼痛多專科整合(復健主動運動>被動按摩、心理 CBT、職能)。名詞:allodynia(非痛刺激變痛)、hyperalgesia(痛刺激更痛)、<b>analgesia(無痛≠無所有感覺)</b>、paresthesia(無刺激異常感)。止痛是基本人權。</p>"},"重症醫學與心肺復甦":{"title":"重症醫學與心肺復甦","html":"<p><b>ARDS。</b>柏林定義:一週內、<b>雙側</b>浸潤、非心因性肺水腫、P/F(PEEP≥5)分級(輕≤300/中≤200/重≤100)。處置=<b>肺保護通氣:低潮氣量 6 mL/kg 預測體重、平台壓<30、容許性高碳酸、適當 PEEP、SpO2 88–95%</b>;中重度加俯臥(PROSEVA 降死亡率)、早期神經肌肉阻斷、保守輸液;頑固者 ECMO。吸入 NO=選擇性肺血管擴張(改善血氧不改善死亡率)。</p>\n<p><b>敗血症(Sepsis-3)。</b>sepsis=感染+器官障礙(SOFA≥2);<b>敗血性休克</b>=足量輸液後仍需升壓劑維持 MAP≥65 且乳酸>2。集束:早期抗生素(1h)、晶體液 30 mL/kg、<b>norepinephrine 第一線升壓</b>(vasopressin/epinephrine 第二線)、血糖<180、難治休克加低劑量類固醇。並發:高血糖(胰島素抗性)、血小板低下/DIC、壓力性潰瘍、AKI。EGDT/高劑量類固醇/腎性劑量 dopamine 均無實證益處。</p>\n<p><b>復甦/通氣/腎。</b>小兒去顫 VF:2→4→≥4 J/kg。正壓通氣過高(平台壓>30–35)致 barotrauma、增死腔、減回流降心輸出、增肺血管阻力。脫離呼吸器:<b>RSBI=呼吸頻率/潮氣量(L),>105 預測失敗</b>。腎保護=維持血流動力/灌流(尿量、creatinine 不可靠;NGAL 是早期 biomarker)。輸血閾值限制策略(Hb 7–8);大量輸血補 FFP/血小板(1:1:1);輸血反應在麻醉下仍會發生且被掩蓋。</p>"},"特殊族群與器官移植麻醉":{"title":"特殊族群與器官移植麻醉","html":"<p><b>產科。</b>心臟病孕婦分娩首選<b>可分段控制的硬脊膜外</b>(避免脊麻驟然低血壓、全麻插管應激)。剖腹全麻:視為<b>飽胃</b>(RSI、非顆粒制酸劑、環狀軟骨壓迫;<b>succinylcholine 可用</b>不過胎盤)、娩出後才給 opioid、娩出後 0.5 MAC(高揮發劑抑制宮縮)。分娩硬膜外:作用 T10–L1、<b>不必等宮口 3cm</b>(早給不延長產程/不增剖腹)、低濃度 bupivacaine 可走動、給 test dose。孕婦非產科手術:維持正常 PaCO2(<b>不可容許性高碳酸</b>致胎兒酸中毒)、左傾、監測胎心。神經軸禁忌篩選:血小板過低/部位感染/嚴重主動脈狹窄/顱內占位。</p>\n<p><b>器官/系統。</b>末期腎病:嚴重動脈硬化須評估心血管、貧血(EPO 不足)致心衰、勿絕對限水(維持腎灌流)、利尿劑對 AKI 幫助小。肝移植:RSI(腹水誤吸)、cisatracurium(Hofmann)、可用吸入劑、凝血導向輸血。腦死捐贈者心搏過緩對 <b>atropine 無效</b>(用直接 β 致效)。</p>\n<p><b>小兒/老人/肥胖/燒傷/MG。</b>新生兒:高表面積比易失溫、非顫抖產熱、<b>心輸出依賴心率</b>、體液比例高。老人:對藥物更敏感須減量(白蛋白↓游離藥↑)、POCD/譫妄高、年齡為次要風險因子。肥胖:呼吸/通氣量增、FRC↓、易逆流、困難氣道。燒傷:<b>提高室溫保暖</b>、大量輸液、早插管、避免 succinylcholine。<b>MG</b>:對非去極化肌鬆劑異常敏感(減量)、對 succinylcholine 阻抗(增量)、TOF 監測、術後呼吸衰竭風險。</p>\n<p><b>神經/心臟/胸腔。</b>降腦壓:過度換氣 PaCO2 30–35(<b>非愈低愈好</b>,<25 致缺血、6–24h 逃逸)、mannitol(滲透)、furosemide(減水分/CSF)、嚴重腫脹去骨瓣;顱內高壓誘導避免 ketamine,維持 CPP>60。心臟手術:CPB(非 ECMO)、可用吸入劑、脫離 CPB 後降肺血管阻力護右心(O2、PaCO2 25–30)、LCOS(CI<2.4)以正性肌力/SvO2 監測、術後復溫。肺切除:ppoFEV1>40% 可拔管;單肺通氣用小潮氣量肺保護。</p>"}};
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=(q.answer_status&&q.answer_status.indexOf('送分')>=0)?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">直接看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
const TOTAL=Q.length, KEY='medanes_progress_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){
 const p=PROG[qEl.dataset.id]; if(!p)return;
 fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));
}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);          // 只顯示 ✓/✗，不自動展開詳解
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
