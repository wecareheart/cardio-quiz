治療(intensive insulin therapy)」,來控制血糖低於180 mg/dL","C":"給與高劑量類固醇,可抑制全身性發炎反應,降低90天死亡率","D":"給與腎性劑量(renal-dose)的dopamine,可增加尿量,減少住院洗腎率"},"img":""},{"id":"114020-09","code":"114020","num":9,"roc":114,"ad":2025,"round":"第一次","stem":"關於急性呼吸窘迫症候群(acute respiratory distress syndrome)的診斷,其PaO2/FiO2數值的定義為何?","opts":{"A":"<400","B":"<300","C":"<200","D":"<100"},"answer":"C","answer_status":"多重答案","accepted_answers":["B","C"],"correction_note":"第9題答Ｂ或Ｃ者均給分","topic":"重症醫學與心肺復甦","topic_num":"重症醫學與心肺復甦","q_num":9,"src":"民國114年第一次","roc_year":114,"exam_code":"114020","options":{"A":"<400","B":"<300","C":"<200","D":"<100"},"img":""},{"id":"115020-09","code":"115020","num":9,"roc":115,"ad":2026,"round":"第一次","stem":"腎臟低灌流(hypoperfusion)是腎前性氮血症(prerenal azotemia)的主因,下列藥物何者不會直接作用在腎血管造成腎臟低灌流?","opts":{"A":"使用norepinephrine 或vasopressin 等血管收縮藥物","B":"使用ketololac 等抑制環氧酶(cyclooxygenase)的止痛藥","C":"使用抑制血管收縮素轉化酶(angiotensin converting enzyme)的抗高血壓藥物","D":"使用低劑量硝化甘油輸注(nitroglycerin infusion)"},"answer":"D","answer_status":"多重答案","accepted_answers":["B","C","D"],"correction_note":"第9題答Ｂ或Ｃ或Ｄ或BC或BD或CD或BCD者均給分","topic":"重症醫學與心肺復甦","topic_num":"重症醫學與心肺復甦","q_num":9,"src":"民國115年第一次","roc_year":115,"exam_code":"115020","options":{"A":"使用norepinephrine 或vasopressin 等血管收縮藥物","B":"使用ketololac 等抑制環氧酶(cyclooxygenase)的止痛藥","C":"使用抑制血管收縮素轉化酶(angiotensin converting enzyme)的抗高血壓藥物","D":"使用低劑量硝化甘油輸注(nitroglycerin infusion)"},"img":""}],E={"101030-05":{"quick":"吸入麻醉誘導速率取決於「肺泡分壓(FA)上升速度」;凡能加快 FA 接近 FI 者都加速誘導——低溶解度、低心輸出、高吸入濃度、減少再吸入皆是。高「迴路氣體容量」會稀釋並延遲 FA 上升,反而拖慢誘導。","detail":{"background":"吸入性麻醉劑的誘導速率由肺泡氣麻醉分壓(FA)上升至吸入分壓(FI)的速度決定,因為 FA≈腦中分壓,而麻醉深度取決於腦中分壓。FA/FI 上升速度受三大因素影響:(1)輸送進肺泡(ventilation、吸入濃度 FI、迴路特性)——增加肺泡通氣、提高 FI(over-pressure/濃度效應)、減少呼吸迴路無效死腔與再吸入,都加快 FA 上升;(2)由肺泡被血液帶走(uptake = 血/氣分配係數 λ × 心輸出量 × 肺泡-靜脈分壓差)——uptake 愈大,FA 上升愈慢;故低溶解度(低 λ,如 desflurane、N2O)、低心輸出量(如休克、低心搏)會使 FA 快速上升、誘導快;(3)組織攝取。題目反過來問「不會加速」者:選項中「高麻醉機迴路氣體容量(high circuit volume)」會像一個緩衝槽稀釋進入肺的麻醉氣濃度,延遲 FA 達到 FI,故拖慢而非加快誘導。其餘三者(減少再吸入、高腦血流、低溶解度)皆加快或與快速平衡相關。臨床應用:對需快速誘導者選低溶解度劑、提高新鮮氣體流量與吸入濃度;肥胖、脂溶性組織多者甦醒可能延遲。","options":{"A":"減少再吸入(rebreathing)使吸入的麻醉氣不被呼出氣稀釋,FI 維持較高、FA 上升快——會加速誘導。","B":"正解(不會加速)。高迴路氣體容量像緩衝槽,稀釋並延遲肺泡分壓上升,反而拖慢誘導速率。","C":"高腦血流量使麻醉劑更快輸送到腦、腦分壓更快平衡——加速作用起始。","D":"肺泡溶解度(血/氣分配係數)降低 → uptake 變少 → FA/FI 上升快 → 加速誘導,是低溶解度劑(desflurane、N2O)誘導快的根本原因。"},"sources":["Miller's Anesthesia 9e, Inhaled Anesthetic Uptake & Distribution","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"102030-22":{"quick":"吸入麻醉的「深度」取決於麻醉劑在「腦中的分壓(濃度)」,而非呼吸速率、藥物效能或心輸出本身;這些只是影響腦中分壓上升「速度」的因素。","detail":{"background":"麻醉「深度」的直接決定因子是作用部位(腦/脊髓)的麻醉劑分壓。吸入麻醉達到平衡時,腦分壓≈肺泡分壓(FA)≈動脈分壓,因此臨床以呼氣末濃度(end-tidal,等同 FA)代表麻醉深度,並以 MAC 倍數量化。要區分「深度」與「達到該深度的速度」:藥物效能(potency,以 MAC 表示——MAC 愈低效能愈強)、呼吸速率(通氣)、心輸出量都影響 FA「上升的快慢」(uptake/distribution),但在任一時刻決定病人有多深的,是當下腦中(≈肺泡)的麻醉劑濃度。本題答案 C「麻醉藥物腦中濃度」正是此概念。提醒:potency 決定「需要多少濃度」,但同一藥不同病人若 end-tidal 相同,深度即相當。","options":{"A":"呼吸速率影響 FA 上升速度(通氣愈大誘導愈快),但非決定「深度」的因子。","B":"效能(potency,即 1/MAC)決定達到某深度所需的濃度大小,不是即時深度本身。","C":"正解。麻醉深度由腦中(≈肺泡 end-tidal)麻醉劑濃度決定,平衡時 brain≈alveolar partial pressure。","D":"心輸出量影響 uptake(高心輸出帶走多、FA 上升慢),只改變達到深度的速度,非深度本身。"},"sources":["Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"103030-04":{"quick":"吸入麻醉劑效能(potency)與脂溶性(油/氣分配係數)成正比,MAC 愈低效能愈強。四者中 desflurane 的 MAC 最高(約 6%),效能最弱。","detail":{"background":"吸入麻醉劑的效能以 MAC(minimum alveolar concentration,能使 50% 受試者在切皮刺激下不動的肺泡濃度)表示,MAC 愈低代表效能愈強。效能與脂溶性(Meyer-Overton 相關:油/氣分配係數)高度正相關。常見藥物約略 MAC:halothane 0.75%、isoflurane 1.15%、sevoflurane 2%、desflurane 6%、nitrous oxide 104%。因此 desflurane 在四個鹵化醚/烷中 MAC 最高、效能最弱(N2O 更弱但非選項);這也是 desflurane 需用較高濃度、且因低溶解度而誘導甦醒快的特性。考點:potency↔脂溶性↔MAC 的反向關係,以及記住各劑 MAC 排序。","options":{"A":"isoflurane MAC≈1.15%,效能中等偏強。","B":"正解。desflurane MAC≈6%,四者中最高、效能最弱;脂溶性最低故誘導/甦醒最快。","C":"halothane MAC≈0.75%,效能最強(脂溶性最高)。","D":"sevoflurane MAC≈2%,效能介於中間。"},"sources":["Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"103030-05":{"quick":"MAC 會被「同時給予的中樞抑制藥」降低;靜脈注射局部麻醉藥(如 lidocaine)具中樞抑制與止痛作用,可降低 MAC。發燒、慢性酗酒、年輕都使 MAC 升高。","detail":{"background":"MAC 反映吸入麻醉劑需求量,受多種生理與藥物因素調節。降低 MAC(需求減少)者:高齡、低體溫、懷孕、急性酒精中毒、低鈉血症、貧血/嚴重低血壓致 O2 輸送下降、同時使用其他中樞抑制劑(opioids、benzodiazepines、α2 致效劑、靜脈/局部麻醉藥、鋰鹽)。升高 MAC(需求增加)者:嬰幼兒(6 個月達高峰)、發燒/高體溫、慢性酗酒(交叉耐受)、甲狀腺亢進、中樞興奮劑(amphetamine 急性)、高鈉血症、紅髮。不影響 MAC 者:性別、麻醉維持時間長短、血壓在一定範圍內、PaCO2 在一定範圍、代謝性酸鹼。本題「靜脈注射局部麻醉藥」屬中樞抑制+止痛,可降低 MAC,為正解。","options":{"A":"發燒(體溫升高)使 MAC 升高。","B":"慢性酗酒因交叉耐受使 MAC 升高(急性酒精中毒反而降低)。","C":"正解。靜脈注射局部麻醉藥(lidocaine)有中樞抑制與止痛作用,降低 MAC。","D":"麻醉維持時間長短不影響 MAC。"},"sources":["Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"104030-02":{"quick":"FA/FI 上升最快者 = 血/氣溶解度最低者。desflurane 血/氣分配係數最低(0.42),FA/FI 上升最快。","detail":{"background":"FA/FI 比值上升速度直接反映誘導快慢,主要由血/氣分配係數(λ,溶解度)決定:λ 愈低,血中能「溶走」的麻醉劑愈少、肺泡分壓愈快追上吸入分壓。常見 λ:desflurane 0.42 < nitrous oxide 0.46 < sevoflurane 0.65 < isoflurane 1.4 < halothane 2.5。故四選項中 desflurane FA/FI 上升最快、誘導與甦醒最迅速,適合需快速調整深度或門診/長時間手術需快甦醒者。其低溶解度也使呼氣末濃度能緊密追蹤吸入設定。對照:halothane λ 最高、平衡最慢。","options":{"A":"isoflurane λ≈1.4,上升中等偏慢。","B":"正解。desflurane λ≈0.42 最低,FA/FI 上升最快、誘導/甦醒最迅速。","C":"halothane λ≈2.5 最高,平衡最慢。","D":"sevoflurane λ≈0.65,比 desflurane 略慢。"},"sources":["Miller's Anesthesia 9e, Inhaled Anesthetic Uptake & Distribution","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"104030-04":{"quick":"快速大幅提高 desflurane 濃度會刺激交感神經,造成短暫心跳加速、血壓上升、血中 catecholamine 升高(較 isoflurane 明顯);故 C 正確。","detail":{"background":"Desflurane 因氣道刺激性與其快速濃度變化可引發交感神經興奮(sympathetic activation):當在短時間內把吸入濃度大幅提高(尤其超過 1 MAC,約 6%)時,會出現短暫(transient)的心跳加快、血壓上升、血漿 catecholamine(去甲腎上腺素)升高,此現象在 desflurane 比 isoflurane 更顯著,也與其氣道刺激(嗆咳、屏氣、喉痙攣)相關,故誘導不以面罩 desflurane 為宜。臨床對策:緩慢加量、合併 opioid(fentanyl)或 β 阻斷劑可鈍化此反應;對缺血性心臟病者尤須避免突然加深 desflurane。本題 C「血中 catecholamine 比 isoflurane 高」為正確敘述。其餘選項(心率不變、血壓降低、心輸出不變)與此短暫交感興奮不符。","options":{"A":"錯誤。快速加 desflurane 會短暫心率「上升」而非不變。","B":"錯誤。短暫交感興奮使血壓上升,而非降低。","C":"正解。desflurane 快速加量引起交感興奮,血漿 catecholamine 較 isoflurane 高。","D":"錯誤。交感興奮會改變心輸出/心率,非不變。"},"sources":["Miller's Anesthesia 9e, Inhaled Anesthetics: Cardiovascular/Sympathetic effects of desflurane","Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"104090-04":{"quick":"四個鹵化吸入劑中 desflurane 對呼吸道刺激性最大(易嗆咳、屏氣、喉痙攣、分泌物增加),故不適合用於吸入式麻醉誘導;sevoflurane 刺激性最小、最適合面罩誘導。","detail":{"background":"吸入麻醉劑的氣道刺激性(pungency)影響其能否用於吸入誘導。刺激性由大到小約為 desflurane > isoflurane > (enflurane) > halothane > sevoflurane。Desflurane 與 isoflurane 因刺激性強,快速吸入易引起嗆咳(coughing)、屏氣(breath-holding)、喉痙攣(laryngospasm)、唾液與支氣管分泌增加及血氧下降,故臨床不以面罩吸入做誘導,僅用於插管後維持。Sevoflurane 氣味甜、刺激性低,加上低血/氣溶解度,是成人與小兒「吸入誘導(inhalational/mask induction)」首選,常以 8% 高濃度 single-breath 或階梯式誘導。Halothane 過去也用於小兒誘導(刺激性低)但已因肝毒性/心律不整少用。本題答案 C(desflurane)刺激最大。","options":{"A":"halothane 刺激性低,過去可用於小兒吸入誘導。","B":"isoflurane 有刺激性但低於 desflurane。","C":"正解。desflurane 氣道刺激性最大,不適合吸入誘導。","D":"sevoflurane 刺激性最小,是吸入(面罩)誘導首選。"},"sources":["Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"105020-04":{"quick":"吸入麻醉造成「不動(immobility)」主要作用在脊髓(而非大腦),且機轉以抑制離子通道/NMDA、glycine 等為主,並非透過 GABA-A 受體——故 C「主要透過 GABA 受體」為錯誤敘述。","detail":{"background":"吸入麻醉劑的不同成分由不同部位與機轉介導:意識喪失(unconsciousness/amnesia)主要在大腦皮質與視丘,涉及 GABA-A 受體增強;而「對傷害刺激不動(immobility)」主要由脊髓(spinal cord)介導,是麻醉深度與切皮反應(MAC 定義的基礎)的關鍵。研究(如脊髓離斷、選擇性灌注實驗)顯示,使動物不動所需的麻醉濃度高於使其失去意識者,且此 immobility 與抑制脊髓的傷害性屈曲反射弧(nocifensive withdrawal reflex arc)有關,主要分子標的包含抑制 NMDA 受體、增強 glycine 受體、抑制鈉/鉀通道等,GABA-A 受體在 immobility 中角色相對次要(以揮發性麻醉劑而言)。本題 C 把 immobility 歸因於 GABA 受體,為錯誤。","options":{"A":"正確。immobility 主要由脊髓介導,而非大腦。","B":"正確。產生 immobility 所需濃度高於失去意識所需濃度。","C":"正解(錯誤敘述)。揮發劑的 immobility 主要非經 GABA-A,而與抑制 NMDA、增強 glycine、抑制離子通道等有關。","D":"正確。immobility 與抑制脊髓 nocifensive withdrawal reflex arc 有關。"},"sources":["Miller's Anesthesia 9e, Mechanisms of Anesthetic Action; Sonner et al. Anesth Analg 2003"]}},"105100-04":{"quick":"加速吸入麻醉攝取(uptake)的因素:高脂溶性、增加心輸出、加大肺泡-靜脈分壓差。提高體溫不會加速 uptake——D 為正解。","detail":{"background":"Uptake(麻醉劑由肺泡被血液帶走的量)= λ(血/氣分配係數)× Q(心輸出量)× (PA−Pv)/大氣壓。注意 uptake 大會「拖慢」FA/FI 上升(誘導變慢);但題目問「加速 uptake」本身。增加 uptake 的因素:溶解度(脂溶性/λ)較高、心輸出量增加、肺泡與靜脈分壓差大(剛開始誘導或組織攝取多時)。體溫升高對 uptake 影響甚微,且發燒主要使 MAC 上升(需求增加)、降低溶解度(溫度上升使氣體在液體中溶解度略下降),並不會「加速 uptake」,故 D「增高體溫」是無法加速 uptake 者。臨床須分清「加速 uptake」≠「加速誘導」:uptake 大時 FA 上升慢、誘導反而慢。","options":{"A":"高脂溶性(λ 大)使更多麻醉劑被血液溶走,uptake 增加。","B":"心輸出量增加,單位時間帶走的麻醉劑增多,uptake 增加。","C":"肺泡-靜脈分壓差增大,擴散梯度大,uptake 增加。","D":"正解。升高體溫不會加速 uptake(反使溶解度略降),且 uptake 與 FA 上升速度為反向關係。"},"sources":["Miller's Anesthesia 9e, Inhaled Anesthetic Uptake & Distribution","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"105100-05":{"quick":"吸入麻醉合併腎上腺素誘發心律不整的機轉與心肌 α1/β 腎上腺受體「有關」;故 D「與 α1A 及 β 受體無關」為錯誤。halothane 致心律不整閾值最低。","detail":{"background":"揮發性麻醉劑使心肌對 catecholamine(尤其外源性腎上腺素,如局部注射含 epinephrine)更敏感,易誘發心室期外收縮/心律不整,此即「epinephrine arrhythmogenic threshold」。各劑敏感化由強到弱:halothane(閾值最低、最易致心律不整)>> enflurane > isoflurane ≈ sevoflurane ≈ desflurane(後三者閾值較高且彼此相近)。機轉與心肌的 α1(尤 α1A)及 β-腎上腺受體訊號、以及對心臟傳導/再極化的影響有關,故說「與 α1A 及 β 受體無關」是錯誤。臨床:用 halothane 時,局部注射含腎上腺素溶液須限量(如成人 1:100,000 不超過 ~1–1.5 µg/kg/10 min);現多以 sevoflurane/desflurane 取代,較安全。本題答案 D。","options":{"A":"正確。halothane 腎上腺素致心律不整閾值最低、最危險。","B":"正確。sevoflurane 與 desflurane 所需誘發濃度相近且較高。","C":"正確。isoflurane 比 sevoflurane 略易誘發此類心律不整(閾值較低)。","D":"正解(錯誤)。機轉與心肌 α1A、β 腎上腺受體有關,並非無關。"},"sources":["Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"106020-05":{"quick":"MAC 不受血壓(在 50–150 mmHg 內)、麻醉時間、性別影響;高血壓本身不影響 MAC。缺氧(PaO2<40)、降低 catecholamine 的 reserpine、合併藥物等則會降低 MAC。","detail":{"background":"MAC 的不影響因子:高血壓(收縮壓在約 50 mmHg 以上的範圍)、麻醉維持時間、性別、體重、代謝性酸鹼、PaCO2(在 15–95 mmHg 內)、甲狀腺功能本身(有爭議)。會降低 MAC 者:嚴重低血壓/嚴重貧血/低氧(PaO2<40 mmHg,O2 輸送不足抑制中樞)、高齡、低體溫、懷孕、急性酒精/中樞抑制劑、降低中樞 catecholamine 的藥(reserpine、α-methyldopa、clonidine 等 α2 作用)、鋰鹽。會升高 MAC 者:發燒、慢性酗酒、嬰幼兒、升高中樞 catecholamine 者(急性 amphetamine、MAOI+間接擬交感)。本題「高血壓」不影響 MAC,為正解 A。注意:選項 B「肌肉鬆弛拮抗劑」本身不直接改變 MAC——但本題以「不影響」為答,A 高血壓最明確;肌肉鬆弛劑/拮抗劑作用於神經肌肉接合而非中樞,亦不改變 MAC,惟出題以 A 為標準答案。","options":{"A":"正解。血壓在生理範圍內(及高血壓)不影響 MAC。","B":"肌肉鬆弛拮抗劑作用於神經肌肉接合,本身不改變中樞 MAC(干擾項)。","C":"嚴重缺氧 PaO2<40 mmHg 會抑制中樞、降低 MAC。","D":"reserpine 耗竭中樞 catecholamine,降低 MAC。"},"sources":["Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"106080-04":{"quick":"大多數揮發性麻醉劑降低腦代謝率(CMRO2),唯有 nitrous oxide(N2O)會「增加」腦代謝率與腦血流,具興奮性。","detail":{"background":"吸入麻醉劑對腦代謝與腦血流的影響:鹵化揮發劑(halothane、isoflurane、sevoflurane、desflurane)抑制腦代謝率(降低 CMRO2),同時因直接血管舒張作用增加腦血流(CBF)、可能升高顱內壓(此即「uncoupling」——代謝降但血流增,程度 halothane>iso≈sevo≈des)。Nitrous oxide(N2O)則相反:它是輕度中樞興奮劑,會「增加」腦代謝率(CMRO2)與腦血流,並可能升高顱內壓,故在顱內順應性差/腦壓高的神經外科病人應謹慎或避免單獨大量使用 N2O。本題問「會增加腦部代謝率」者,答案 B nitrous oxide。臨床:神經麻醉常以 propofol(降 CMRO2、CBF、ICP)為主、限制揮發劑與 N2O。","options":{"A":"halothane 抑制腦代謝率(但顯著增加腦血流、升 ICP)。","B":"正解。nitrous oxide 為興奮性,增加腦代謝率與腦血流。","C":"desflurane 降低腦代謝率。","D":"sevoflurane 降低腦代謝率(對 CBF/ICP 影響相對溫和)。"},"sources":["Miller's Anesthesia 9e, Neuroanesthesia; Cottrell & Patel Neuroanesthesia"]}},"106080-05":{"quick":"本題列為多重答案(A、B 均給分)。sevoflurane 與「二氧化碳吸收劑(soda lime/baralyme)」反應降解產生 compound A(腎毒性疑慮)、遇乾燥強鹼亦可放熱;選項 A(降解出 HCl/路易士酸)與 B(需特殊塑膠瓶包裝,實際是 desflurane 需加壓蒸發器)皆有問題,故 A、B 給分。","detail":{"background":"Sevoflurane 的化學穩定性考點:它與二氧化碳吸收劑(尤其乾燥、含強鹼 KOH/NaOH 的 soda lime 或 Baralyme)反應,降解產生 compound A(一種乙烯醚,動物實驗有腎毒性),故傳統建議低流量麻醉時新鮮氣體流量≥1–2 L/min、避免吸收劑過度乾燥;乾燥吸收劑與 sevoflurane 反應可放熱甚至起火(罕見)。Sevoflurane 不需如 desflurane 般的加溫加壓蒸發器或特殊塑膠瓶(desflurane 沸點 22.8°C 接近室溫,需 Tec 6 加熱蒸發器)。本題敘述把「需特殊塑膠瓶」與「降解出 HCl/路易士酸」混入 sevoflurane,均不確切——考選部最終認定 A、B 兩者皆可給分(多重答案)。臨床重點:sevoflurane 主要降解產物是 compound A 與 CO(乾燥吸收劑時),預防之道為保持吸收劑濕潤、適當流量。","options":{"A":"給分。sevoflurane 主要與吸收劑反應生 compound A,而非降解出 HCl/路易士酸——敘述有誤。","B":"給分。需特殊加壓/特殊瓶包裝者是 desflurane(沸點近室溫),非 sevoflurane。","C":"若有酸性降解產物可能傷黏膜(理論);非最佳答案。","D":"製程加微量水以穩定、抑制降解,屬正確敘述。"},"sources":["Miller's Anesthesia 9e, Inhaled Anesthetic Degradation; sevoflurane compound A"]}},"107020-06":{"quick":"吸入麻醉劑肝毒性(如 halothane hepatitis)的危險因子包括肥胖、年齡(中年)、女性、多次暴露、基因/酵素誘導等;「身高」與肝毒性無關,為正解 C。","detail":{"background":"揮發性麻醉劑肝損傷以 halothane hepatitis 為典型(免疫媒介、與其氧化代謝產生 trifluoroacetyl(TFA)蛋白加成物有關),屬罕見但可致猛爆性肝衰竭。危險因子:多次/近期重複暴露 halothane、中年、肥胖、女性、家族或個人曾有麻醉後不明原因肝炎史、酵素誘導(如服用誘導 CYP 的藥)、基因易感性(產生抗 TFA 抗體)。新一代揮發劑因氧化代謝率低(desflurane<isoflurane<<halothane,sevoflurane 走不同代謝且少 TFA),肝毒性風險低很多。題目問「不是」危險因子者:身高與藥物代謝/免疫致敏無關,故 C 為答案。其餘肥胖(脂溶性蓄積與代謝)、年齡、基因遺傳皆為相關因素。","options":{"A":"肥胖(脂肪蓄積、代謝改變)為相關危險因子。","B":"年齡(中年)為相關因子。","C":"正解。身高與吸入麻醉肝毒性無關。","D":"基因遺傳(對 TFA 加成物的免疫反應易感性)為相關因子。"},"sources":["Miller's Anesthesia 9e, Inhaled Anesthetic Metabolism & Toxicity; halothane hepatitis"]}},"108030-03":{"quick":"甲狀腺亢進屬代謝/交感亢進狀態,使 MAC「升高」;高齡、嚴重低血壓、懷孕則降低 MAC。故 D 甲狀腺亢進為正解。","detail":{"background":"本題與 MAC 調節因子互補。升高 MAC(增加需求):發燒/高體溫、甲狀腺機能亢進(代謝率上升、交感興奮)、慢性酗酒、嬰幼兒、升高中樞 catecholamine 的興奮劑。降低 MAC(減少需求):高齡(每 10 歲約降 6%)、低體溫、懷孕(黃體素與內生 endorphin)、嚴重低血壓/貧血/低氧、急性酒精中毒及其他中樞抑制劑、α2 致效劑、低鈉。本題問「可增加 MAC」者,選項 A 高齡、B 嚴重低血壓、C 懷孕皆降低 MAC,只有 D 甲狀腺亢進升高 MAC,為正解。臨床:甲亢未控制者麻醉風險高(甲狀腺風暴),需先控制再擇期手術。","options":{"A":"高齡降低 MAC。","B":"嚴重低血壓(O2 輸送下降)降低 MAC。","C":"懷孕降低 MAC(約降 30–40%)。","D":"正解。甲狀腺亢進(代謝/交感亢進)升高 MAC。"},"sources":["Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"109080-04":{"quick":"C 為錯誤:迅速增加 desflurane 濃度會「短暫心率上升(交感興奮)」而非下降。MAC 定義(防 50% 病人切皮動作)、desflurane 低溶解度快誘導、sevoflurane 無刺激快誘導皆正確。","detail":{"background":"綜合題。(A)MAC 定義:能防止 50% 病人在手術切皮(surgical skin incision)刺激下產生肢體移動的最低肺泡濃度——正確。(B)desflurane 血/組織溶解度低,FA/FI 上升快,誘導與甦醒迅速——正確。(C)迅速增加 desflurane 濃度時,因其氣道刺激性與交感興奮,會出現短暫「心率上升、血壓上升、血漿 catecholamine 升高」,不是心率下降,故 C 錯誤(本題答案)。(D)sevoflurane 無刺激性、肺泡濃度迅速上升,是平穩快速吸入誘導的絕佳選擇——正確。臨床整合:desflurane 適合需快速甦醒(肥胖、長手術)但不用於吸入誘導;sevoflurane 適合面罩誘導。","options":{"A":"正確。MAC = 防 50% 病人切皮動作的最低肺泡濃度。","B":"正確。desflurane 低溶解度 → 快速誘導。","C":"正解(錯誤)。快速加 desflurane 引起交感興奮,心率「上升」非下降。","D":"正確。sevoflurane 無刺激 → 適合平穩快速吸入誘導。"},"sources":["Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"110080-04":{"quick":"B 為錯誤:sevoflurane 是含氟「醚」但分子「不含氯」;desflurane 亦不含氯——稱「皆為氯化物」錯誤。desflurane 低溶解度快甦醒、可被乾燥吸收劑降解為 CO、sevoflurane 降解為 compound A 皆正確。","detail":{"background":"揮發性麻醉劑化學:現代藥多為氟化醚。sevoflurane(fluoromethyl hexafluoroisopropyl ether)與 desflurane 皆「只含氟、不含氯」(halothane 才含溴與氯;isoflurane、enflurane 含氯)。因此 B「sevoflurane 與 desflurane 皆為氯化物」錯誤(本題答案)。其他正確敘述:(A)desflurane 低血/組織溶解度→快速甦醒;(C)desflurane(及 iso、enflurane,含 CHF2 結構)與「乾燥」二氧化碳吸收劑(尤含強鹼)反應可降解產生一氧化碳(CO),臨床上週一第一台手術、吸收劑久未換而乾燥時風險高,可致 COHb 升高;(D)sevoflurane 與吸收劑反應降解為 compound A(腎毒性疑慮)。預防:保持吸收劑濕潤、定期更換、足夠新鮮氣流。","options":{"A":"正確。desflurane 低溶解度 → 快速甦醒。","B":"正解(錯誤)。sevoflurane 與 desflurane 只含氟、不含氯,非氯化物。","C":"正確。乾燥吸收劑可使 desflurane(及 iso/enflurane)降解產生 CO。","D":"正確。sevoflurane 與乾燥吸收劑反應生成 compound A。"},"sources":["Miller's Anesthesia 9e, Inhaled Anesthetic Chemistry & Degradation (CO, compound A)"]}},"113070-05":{"quick":"D 為錯誤:MAC「會」隨年齡改變——隨年齡增加而下降(嬰幼兒最高,之後遞減)。效能與脂溶性相關、揮發劑多有血管舒張、desflurane 適合低流量皆正確。","detail":{"background":"吸入麻醉劑通則:(A)效能(potency)與脂溶性(油/氣分配係數)良好正相關(Meyer-Overton),脂溶性高者 MAC 低——正確。(B)揮發性麻醉劑大多具血管舒張作用(降低全身血管阻力、增加腦/皮膚血流),isoflurane/desflurane/sevoflurane 尤明顯——正確。(C)desflurane 因穩定、代謝率極低、可用於低流量(low-flow)麻醉以節省藥量——正確。(D)MAC「不受年齡影響」是錯誤(本題答案):MAC 隨年齡變化明顯,嬰兒(約 6 個月)最高,之後每約 10 年下降約 6%,高齡者 MAC 顯著較低,故老人麻醉劑量須下修。臨床:依年齡與合併藥(opioid、N2O)調整呼氣末濃度。","options":{"A":"正確。potency 與脂溶性正相關。","B":"正確。多數揮發劑造成血管舒張。","C":"正確。desflurane 穩定、可用於低流量麻醉。","D":"正解(錯誤)。MAC 隨年齡下降,並非不受年齡影響。"},"sources":["Miller's Anesthesia 9e, Ch. Inhaled Anesthetics: Mechanisms & MAC","Morgan & Mikhail's Clinical Anesthesiology 6e"]}},"102110-08":{"quick":"Thiopental 高度與白蛋白結合且作用受游離型影響;低血容休克(分布容積小→腦中濃度高)、低白蛋白(游離藥多)、酸中毒(非離子化增加、進腦多)都須「減量」;鹼中毒則相反,不必減量。","detail":{"background":"Thiopental(超短效巴比妥)為弱酸(pKa≈7.6),高度與血漿白蛋白結合(約 80%),其誘導作用取決於游離(unbound、非離子化)藥物進入腦部的量。影響須否減量的因素:(1)低血容/休克:有效循環血量少、初始分布容積小,使同劑量在腦中達到更高濃度,且 thiopental 本身抑制心肌與擴張靜脈,易致嚴重低血壓 → 須大幅減量。(2)低白蛋白血症(肝病、營養不良、腎病):結合減少、游離藥增加 → 作用增強,須減量。(3)酸中毒(acidosis):使更多 thiopental 呈非離子化(脂溶)形式,容易進入腦,作用增強 → 須減量。(4)鹼中毒(alkalosis):反使更多藥呈離子化、較難進腦,作用減弱,「不必減量」(本題答案 D)。臨床:危重、低蛋白、酸中毒、休克病人 thiopental/propofol 都應減量慢推。","options":{"A":"低血容休克使分布容積小、腦中濃度高且心血管抑制重,須減量。","B":"低白蛋白使游離藥增加,作用增強,須減量。","C":"酸中毒使非離子化藥增加、進腦多,作用增強,須減量。","D":"正解。鹼中毒使藥較離子化、難進腦,作用減弱,不必減量。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"102110-76":{"quick":"頑固癲癇兒童骨折復位的程序性鎮靜,首選兼具鎮靜與止痛、且不誘發癲癇者:fentanyl(止痛)+midazolam(鎮靜)。ketamine 雖好用但對癲癇病人相對謹慎;單用 midazolam 無足夠止痛;oxycodone 口服不適合急性復位。","detail":{"background":"小兒骨折復位需「鎮靜+止痛(sedation + analgesia)」。理想組合提供疼痛控制與制動且安全可逆。本題在頑固癲癇(intractable epilepsy)兒童的情境下,fentanyl(短效強效 opioid,提供止痛)合併 midazolam(benzodiazepine,提供鎮靜、抗焦慮、且本身為抗癲癇藥)是合理首選——midazolam 對癲癇病人安全甚至有益。Ketamine 雖能提供「解離性麻醉+鎮痛」、維持呼吸與血壓,常用於小兒程序鎮靜,但傳統上對癲癇/顱內壓疑慮者較謹慎(雖近代證據顯示其抗痙攣),故在此癲癇情境下出題以 fentanyl+midazolam 為首選。單用 midazolam 無止痛效果,無法應付復位疼痛;oxycodone 為口服 opioid,起效慢、無法即時止痛且不適合急性程序。答案 C。","options":{"A":"ketamine+midazolam 雖常用於小兒程序鎮靜,但本題癲癇情境下出題不選為首選。","B":"單用 midazolam 只有鎮靜、無止痛,不足以復位。","C":"正解。fentanyl(止痛)+midazolam(鎮靜,且為抗癲癇藥)兼顧止痛鎮靜且對癲癇安全。","D":"oxycodone 口服 opioid 起效慢,不適合急性骨折復位。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"103030-03":{"quick":"B 為錯誤:thiopental「沒有止痛效果」,低劑量反而可能痛覺過敏(antanalgesia)。其餘:低劑量鎮靜/高劑量催眠、降腦壓護腦、鹼性製劑須以生理食鹽水配製(勿與 LR/酸性藥混)皆正確。","detail":{"background":"Thiopental 藥理:(A)劑量依賴——低劑量鎮靜、較高劑量催眠/意識喪失——正確。(B)thiopental 無止痛(analgesic)作用,低濃度時甚至呈現抗止痛/痛覺過敏(hyperalgesia),故「2.5 mg/kg 有良好止痛」是錯誤(本題答案)。(C)抑制腦代謝(CMRO2)、收縮腦血管降低腦血流與顱內壓,具腦保護,用於腦創傷/顱內高壓——正確。(D)thiopental 鈉鹽為強鹼性溶液(pH≈10–11),須以生理食鹽水(isotonic NaCl)或無菌水配製,不可與酸性藥物或 Ringer's lactate(含鈣、偏酸)同管,以免沉澱;與酸性肌鬆劑(如某些)混合會析出——正確。臨床:thiopental 現多被 propofol 取代,但其護腦特性與配製禁忌仍是考點。","options":{"A":"正確。低劑量鎮靜、高劑量催眠。","B":"正解(錯誤)。thiopental 無止痛作用,低劑量甚至痛覺過敏。","C":"正確。降腦代謝與腦壓,具神經保護,用於腦創傷。","D":"正確。強鹼製劑須以生理食鹽水配製,勿用 Ringer's lactate/酸性藥。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"104030-03":{"quick":"意識喪失但「眼睛睜開、眼球震顫」且仍有鎮靜止痛 → 解離性麻醉(dissociative anesthesia),為 ketamine 的典型表現。","detail":{"background":"Ketamine 是 NMDA 受體拮抗劑,產生「解離性麻醉(dissociative anesthesia)」:病人意識與外界分離,常見特徵為眼睛睜開、凝視、眼球震顫(nystagmus)、角膜與光反射保留、肌張力維持甚至增加、流涎,並提供強力止痛(somatic 痛尤佳)。它維持(甚至增加)交感張力 → 升血壓、心率,並有支氣管擴張作用,故適合休克/氣喘/低血壓需插管者;但會升高腦血流(傳統認為升顱內壓,惟近代證據在控制通氣下爭議)、引起甦醒期幻覺(emergence delirium,可用 benzodiazepine 預防)、增加分泌物(可加 atropine)。本題以「睜眼+眼震+鎮靜止痛」對應 ketamine,答案 B。thiopental/midazolam 不會睜眼眼震;flumazenil 是拮抗劑無麻醉作用。","options":{"A":"thiopental 造成閉眼的催眠,無此解離表現,也無止痛。","B":"正解。ketamine 解離性麻醉:睜眼、眼球震顫、保留反射並有強止痛。","C":"midazolam 鎮靜催眠、無止痛,不會睜眼眼震。","D":"flumazenil 是 benzodiazepine 拮抗劑,無麻醉作用。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"104090-03":{"quick":"Dexmedetomidine 是高選擇性 α2-腎上腺受體致效劑,提供鎮靜、抗焦慮與止痛,且呼吸抑制極輕。","detail":{"background":"Dexmedetomidine 為高選擇性 α2-adrenergic agonist(α2:α1≈1600:1),作用於腦幹藍斑核(locus coeruleus)降低交感外流並在脊髓背角產生止痛。特色:可產生「類自然睡眠(可喚醒)的鎮靜」、抗焦慮、節省 opioid、減少術後譫妄,且幾乎不抑制呼吸,適合 ICU 鎮靜、清醒纖維插管、程序鎮靜與術中輔助。副作用:因交感抑制與 α2 心血管作用,可致低血壓與心搏過緩(快速注射初期可能短暫高血壓);須注意 bradycardia。對照其他選項機轉:GABA 增強(propofol、benzodiazepine、barbiturate)、µ 受體致效(opioids)、NMDA 拮抗(ketamine)。本題答案 B(α2 致效)。","options":{"A":"GABA 抑制/增強是 propofol、benzodiazepine、barbiturate 的機轉,非 dexmedetomidine。","B":"正解。dexmedetomidine 為 α2-腎上腺受體致效劑。","C":"µ 受體致效是 opioids 的機轉。","D":"NMDA 拮抗是 ketamine 的機轉。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"105100-76":{"quick":"本題多重答案(A、C、D 給分)。程序性鎮靜分輕/中/深度;依各藥常用程度與題敘瑕疵,考選部認定 A、C、D 三選項皆給分。重點:ketamine 提供中度以上鎮靜止痛、propofol 屬中-深度鎮靜、etomidate 可用於程序鎮靜但會抑制腎上腺。","detail":{"background":"程序性鎮靜與止痛(procedural sedation and analgesia, PSA)依鎮靜深度分為:輕度(minimal,僅抗焦慮)、中度(moderate/「清醒鎮靜」,可對口令與觸覺反應、呼吸自主)、深度(deep,僅對疼痛刺激反應、可能需呼吸支持)、全身麻醉。常用藥:midazolam(輕-中度鎮靜、抗焦慮、無止痛)、ketamine(解離性,提供鎮靜+止痛,適合小兒)、propofol(中-深度鎮靜、需監測呼吸/血壓、無止痛)、etomidate(短效催眠、心血管穩定,常用於程序鎮靜如電擊整流,但單次即可短暫抑制腎上腺皮質醇合成)、fentanyl(止痛)。本題敘述把各藥對應到特定鎮靜深度,因分類描述有歧義,考選部最終認定 A、C、D 皆給分(B 也屬合理)。學習重點:掌握各藥屬性與深度分級,並牢記 etomidate 的腎上腺抑制與 propofol 的呼吸/血壓抑制。","options":{"A":"給分。midazolam 確可用於輕度鎮靜止痛(惟其本身無止痛)。","B":"ketamine 用於中度技術鎮靜止痛,屬合理。","C":"給分。etomidate 可用於程序鎮靜(如電擊整流),惟須注意腎上腺抑制;敘述有歧義故給分。","D":"給分。propofol 用於中-深度鎮靜,須監測呼吸與血壓。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"106020-04":{"quick":"巴比妥類(thiopental)主要機轉:增強 GABA-A 受體作用(延長氯離子通道開放),產生中樞抑制與鎮靜/催眠。","detail":{"background":"Barbiturates(如 thiopental)作用於 GABA-A 受體的巴比妥位點:低濃度時增強內生 GABA 結合(延長 Cl- 通道開放時間),高濃度時甚至可不需 GABA 直接開啟氯離子通道(故過量易致深度呼吸/循環抑制,治療指數窄)。氯離子內流使神經細胞過極化、抑制興奮,產生鎮靜、催眠、抗痙攣。對照:鈉通道阻斷是局部麻醉劑;NMDA 抑制是 ketamine;α2 致效是 dexmedetomidine。本題答案 B(增強 GABA-A)。臨床:thiopental 降腦代謝/腦壓(護腦)、誘導快(脂溶性高、再分布快而甦醒快),但無止痛、心血管抑制、強鹼配製注意。","options":{"A":"鈉通道阻斷是局部麻醉劑機轉,非巴比妥。","B":"正解。barbiturate 增強 GABA-A 受體作用(延長 Cl- 通道開放)。","C":"NMDA 抑制是 ketamine。","D":"α2 致效是 dexmedetomidine。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"107020-05":{"quick":"Etomidate 會抑制 11β-hydroxylase 而抑制腎上腺皮質醇合成,即使單次劑量也可短暫抑制;對腎上腺功能障礙/敗血症病人須謹慎。","detail":{"background":"Etomidate 為咪唑類靜脈催眠劑,作用於 GABA-A,特色是「心血管穩定」(對血壓影響極小),故常用於心臟病、休克、低血容病人的誘導。但其重要副作用是抑制腎上腺皮質類固醇合成:抑制 11β-hydroxylase(及 17α-hydroxylase),即使「單次誘導劑量」也可使腎上腺對 ACTH 反應下降約 6–24 小時;「持續輸注」用於 ICU 鎮靜曾被證實增加敗血症死亡率而禁用。因此對腎上腺功能不全、敗血性休克病人須謹慎(避免持續輸注;單次使用仍可,但須警覺相對腎上腺功能不全)。其他副作用:注射痛、肌陣攣、術後噁心嘔吐高。本題答案 B(etomidate)。對照:thiopental/ketamine/dexmedetomidine 無此腎上腺抑制特性。","options":{"A":"thiopental 無腎上腺抑制(但心血管抑制明顯)。","B":"正解。etomidate 抑制 11β-hydroxylase,抑制皮質醇合成,腎上腺功能障礙者須小心。","C":"dexmedetomidine 無腎上腺抑制。","D":"ketamine 無腎上腺抑制(反增交感)。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"108080-04":{"quick":"本題多重答案(B、C 給分)。具支氣管擴張作用者:ketamine(交感興奮、直接鬆弛支氣管平滑肌)為典型;propofol 也能抑制氣道反射、降低支氣管收縮,故 B、C 皆給分。thiopental 反可能誘發支氣管痙攣。","detail":{"background":"靜脈麻醉劑對氣道平滑肌的影響:Ketamine 是公認的支氣管擴張劑(經交感興奮釋放 catecholamine、直接鬆弛平滑肌、抑制迷走),是氣喘急性發作/重積性氣喘插管的首選誘導藥。Propofol 也能抑制氣道反射、減少支氣管收縮(較 thiopental 平順,適合氣道高反應者),臨床上插喉罩/插管時氣道反應較少,故本題 B、C 皆給分。相對地,thiopental(及巴比妥)可能誘發喉/支氣管痙攣與組織胺釋放,氣喘病人應避免作為誘導;midazolam 對氣道平滑肌無明顯擴張作用。臨床整合:氣喘/COPD 病人誘導首選 ketamine 或 propofol,避免 thiopental。","options":{"A":"thiopental 可能誘發支氣管痙攣,非支氣管擴張。","B":"給分。ketamine 為典型支氣管擴張劑,氣喘插管首選。","C":"給分。propofol 抑制氣道反射、減少支氣管收縮。","D":"midazolam 無明顯支氣管擴張作用。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"109020-04":{"quick":"Flumazenil 是 benzodiazepine 受體(GABA-A 上 BZD 位點)的競爭性拮抗劑,可逆轉 midazolam 過量造成的鎮靜與呼吸抑制。","detail":{"background":"Flumazenil 為 benzodiazepine 的特異性競爭性拮抗劑,結合 GABA-A 受體上的 BZD 位點而不啟動,藉以逆轉 benzodiazepine(如 midazolam、diazepam)造成的鎮靜、意識/呼吸抑制。給法:靜脈分次小劑量(如 0.2 mg,可重複至 1 mg)。注意:作用時間短(約 30–60 分鐘),常短於長效 benzodiazepine,故可能「再鎮靜(resedation)」需重複給藥或觀察;長期使用 benzodiazepine 者或合併 TCA/促癲癇情況下,flumazenil 可能誘發癲癇與戒斷,須謹慎。對照:naloxone 拮抗 opioid;dexmedetomidine、ketamine 非拮抗劑。本題答案 A。","options":{"A":"正解。flumazenil 競爭性拮抗 BZD 受體,逆轉 midazolam 鎮靜/呼吸抑制。","B":"dexmedetomidine 是 α2 致效劑,非拮抗劑。","C":"ketamine 是 NMDA 拮抗的麻醉劑,不拮抗 midazolam。","D":"naloxone 拮抗 opioid 受體,不逆轉 benzodiazepine。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"109080-05":{"quick":"C 為錯誤:benzodiazepine 與多數靜脈麻醉劑一樣「降低」腦耗氧量(CMRO2)與腦血流,而非增加。flumazenil 拮抗 BZD、benzodiazepine 抑制呼吸對 CO2 敏感性、ketamine 抑制 NMDA 皆正確。","detail":{"background":"靜脈麻醉劑綜合題。(A)flumazenil 是 benzodiazepine 受體拮抗劑——正確。(B)benzodiazepine 抑制呼吸中樞對 CO2 的敏感性(降低通氣反應),與 opioid 併用更易呼吸抑制——正確。(C)benzodiazepine 與 propofol、barbiturate 一樣「降低」腦代謝率(CMRO2)與腦血流(屬 GABA 增強型抑制劑),並非增加腦耗氧,故 C 錯誤(本題答案);唯一增加 CMRO2/CBF 的靜脈劑是 ketamine(及吸入的 N2O)。(D)ketamine 抑制(拮抗)NMDA 受體通道——正確。臨床整合:除 ketamine 外,靜脈麻醉劑普遍降腦代謝、腦血流與腦壓,故神經麻醉偏好 propofol。","options":{"A":"正確。flumazenil 為 BZD 受體拮抗劑。","B":"正確。benzodiazepine 降低呼吸中樞對 CO2 的敏感性。","C":"正解(錯誤)。benzodiazepine 降低腦耗氧量,而非增加。","D":"正確。ketamine 抑制 NMDA 通道。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"111080-05":{"quick":"D 為錯誤:barbiturate 主要經由「GABA-A 受體」起作用(增強/直接開啟氯通道),不是與 NMDA 受體結合。其餘:BZD 致呼吸暫停、propofol 乳劑利於細菌生長、barbiturate 抑制網狀活化系統皆正確。","detail":{"background":"靜脈麻醉劑綜合題。(A)benzodiazepine 大劑量或合併 opioid 可致呼吸暫停(apnea)——正確。(B)propofol 為脂肪乳劑(含大豆油、卵磷脂、甘油),是良好細菌培養基,開封後須在 6 小時(或依規範)內使用、嚴格無菌,污染曾致敗血爆發——正確。(C)barbiturate(thiopental)抑制腦幹網狀活化系統(reticular activating system)而致意識喪失——正確。(D)barbiturate 的作用機轉是經 GABA-A 受體(增強 GABA 並於高濃度直接開氯通道),「與 NMDA 受體結合」是錯誤(本題答案);拮抗 NMDA 的是 ketamine。臨床:propofol 無菌操作極重要;thiopental 走 GABA。","options":{"A":"正確。benzodiazepine 可致呼吸暫停。","B":"正確。propofol 脂肪乳劑利於細菌生長,須無菌、限時使用。","C":"正確。barbiturate 抑制腦幹網狀活化系統。","D":"正解(錯誤)。barbiturate 經 GABA-A 受體作用,非 NMDA;NMDA 拮抗是 ketamine。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"112020-05":{"quick":"C 為錯誤:ketamine 會「升高」動脈血壓與心率(交感興奮),不是降低。barbiturate 收縮腦血管降腦血流、benzodiazepine 可致呼吸停止、etomidate 抑制腎上腺皮質皆正確。","detail":{"background":"靜脈麻醉劑綜合題。(A)barbiturate(thiopental)收縮腦血管、降低腦血流與腦代謝、降腦壓(護腦)——正確。(B)benzodiazepine 大劑量可致呼吸停止(apnea)——正確。(C)ketamine 透過中樞交感興奮使血漿 catecholamine 上升,通常「升高」血壓、心率與心輸出(故適合休克/低血壓插管),而非降低,故 C 錯誤(本題答案);惟須注意對 catecholamine 已耗竭的危重病人,ketamine 可能因直接心肌抑制而降壓。(D)etomidate 抑制 11β-hydroxylase → 抑制腎上腺皮質醇合成——正確。整合:各靜脈劑心血管特性——thiopental/propofol 降壓、etomidate 穩定但抑腎上腺、ketamine 升壓。","options":{"A":"正確。barbiturate 收縮腦血管、降腦血流。","B":"正確。benzodiazepine 可致呼吸停止。","C":"正解(錯誤)。ketamine 通常升高血壓與心率(交感興奮)。","D":"正確。etomidate 抑制腎上腺皮質醇合成。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"112020-06":{"quick":"四者中 ketamine 對呼吸抑制最少(維持呼吸驅動與氣道反射、且支氣管擴張)。thiopental、propofol、fentanyl 都明顯抑制呼吸。","detail":{"background":"各藥對呼吸的抑制程度:thiopental(巴比妥)與 propofol 皆顯著抑制呼吸驅動、易致呼吸暫停;fentanyl(opioid)劑量依賴抑制呼吸(降低對 CO2 反應、可致呼吸停止);ketamine 則相對「保留呼吸驅動與上呼吸道反射、維持自主呼吸」,並擴張支氣管,故在需保留自主呼吸的程序鎮靜、氣喘、困難氣道情境較安全(惟仍可能因快速大量注射或合併用藥而呼吸抑制、且分泌物增加)。因此本題「呼吸抑制最少」者為 ketamine(C)。臨床提醒:ketamine 雖呼吸抑制少,仍非完全無風險,須監測。","options":{"A":"thiopental 顯著抑制呼吸,易致呼吸暫停。","B":"fentanyl 為 opioid,劑量依賴呼吸抑制。","C":"正解。ketamine 對呼吸抑制最少,保留呼吸驅動與氣道反射。","D":"propofol 明顯抑制呼吸,常致呼吸暫停。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"112080-75":{"quick":"氣喘+休克(低血壓)+缺氧需插管 → 誘導藥首選 ketamine:支氣管擴張、維持交感張力穩定血壓、保留呼吸驅動。propofol/midazolam/barbiturate 會降壓、barbiturate 還可能誘發支氣管痙攣。","detail":{"background":"此情境為「血流動力學不穩(血壓 86/54)、氣喘病史、嚴重缺氧需緊急氣管插管」。誘導藥選擇原則:避免進一步降壓、避免誘發支氣管痙攣、最好能支氣管擴張。Ketamine 兼具支氣管擴張(交感興奮+直接鬆弛平滑肌)與維持/提升血壓(交感興奮)的特性,是氣喘合併低血壓/休克插管的首選誘導藥;劑量約 1–2 mg/kg IV(休克時減量)。Propofol 與 barbiturate 皆抑制心肌、擴張血管而降壓,barbiturate 還可能誘發支氣管痙攣與組織胺釋放;midazolam 起效慢、亦可降壓且鎮靜深度不易掌握。Etomidate 雖心血管穩定(此題未列)也是危重病人選項,但本題以氣喘+低血壓綜合考量,ketamine(B)最適合。","options":{"A":"midazolam 起效慢、可降壓,非首選。","B":"正解。ketamine 支氣管擴張且維持血壓,適合氣喘合併休克插管。","C":"propofol 抑制心肌、擴張血管,會加重低血壓。","D":"barbiturate 降壓且可能誘發支氣管痙攣,氣喘禁忌。"},"sources":["Miller's Anesthesia 9e, Intravenous Anesthetics","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.9 Intravenous Anesthetics","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"107020-02":{"quick":"避免術後殘存肌鬆:用「四連刺激(TOF)監測」並以拮抗劑反轉,且拮抗劑(neostigmine)須在 TOF 至少出現 2 個以上抽動(尚有部分恢復)時才給,效果才可靠。C 正確。","detail":{"background":"術後殘餘神經肌肉阻斷(residual NMB,TOFR<0.9)會增加缺氧、上呼吸道阻塞、吸入性肺炎、再插管等風險。預防原則:(1)優先選用中/短效非去極化肌鬆劑(rocuronium、vecuronium、cisatracurium),避免長效(pancuronium)累積——故 A(刻意用長效)錯誤。(2)避免過度阻斷:不需把 TOF 全部抽動壓制(total twitch suppression)才算足夠,深度阻斷反增殘餘風險——B 錯誤。(3)以客觀定量 TOF 監測並常規給予拮抗:neostigmine(乙醯膽鹼酯酶抑制劑)只能在神經肌肉接合已有部分自發恢復(TOF≥2 個抽動、最好≥T4 出現)時給予,過深阻斷時 neostigmine 無效甚至有反矛盾「天花板效應」——故 C 正確(本題答案);若深度阻斷需即時反轉,改用 sugammadex(對 rocuronium/vecuronium)。(4)TOF「沒有 fade」並不保證無殘餘——主觀觸覺/目視評估會高估恢復,須用定量(加速度肌動描記)確認 TOFR≥0.9——故 D 錯誤。","options":{"A":"錯誤。應避免長效肌鬆劑(易累積殘餘),改用中短效並監測。","B":"錯誤。不需把 TOF 全部抽動壓制;過深阻斷增加殘餘風險。","C":"正解。以拮抗劑反轉,且 neostigmine 須在 TOF 至少 2 個抽動以上才給才有效。","D":"錯誤。主觀無 fade 仍可能殘餘,須定量確認 TOFR≥0.9。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"107080-08":{"quick":"術後肌鬆劑作用異常延長(TOF 全壓制需 ICU 呼吸器、數天才恢復)→ 最可能是潛在的重症肌無力(myasthenia gravis):對非去極化肌鬆劑異常敏感。","detail":{"background":"本題情境:手術用標準劑量非去極化肌鬆劑後,TOF 顯示完全壓制、術後無法脫離呼吸器、需 ICU 數天才逐漸恢復而拔管——典型「對非去極化肌鬆劑異常敏感、作用延長」。重症肌無力(myasthenia gravis, MG)因自體抗體破壞神經肌肉接合處乙醯膽鹼受體,術前可能未被診斷,對「非去極化」肌鬆劑高度敏感(少量即深度且延長阻斷),而對「去極化」的 succinylcholine 則相對阻抗(需較大劑量)。故 MG 病人麻醉須大幅減量或避免肌鬆劑、以 TOF 嚴密監測、預期術後可能需延長呼吸支持。對照:GBS 也可呼吸衰竭但不會單純表現為肌鬆劑作用延長且兩天即恢復;脊髓損傷/腦膜炎與肌鬆劑代謝無關。本題答案 C(MG)。","options":{"A":"脊髓損傷不會造成肌鬆劑作用異常延長。","B":"Guillain-Barré 也致呼吸衰竭,但與本情境(肌鬆劑作用延長、兩天恢復)不符。","C":"正解。重症肌無力對非去極化肌鬆劑異常敏感,致術後阻斷延長、需呼吸支持。","D":"腦膜炎與肌鬆劑作用延長無關。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"108080-05":{"quick":"Cis-atracurium 屬 benzyl-isoquinolinium 類,但「不釋放組織胺」,故較無組織胺引起的低血壓;且經 Hofmann 降解(不依賴肝腎)。mivacurium、d-tubocurarine 會釋放組織胺,pancuronium 是 steroidal 且致心搏過速。","detail":{"background":"非去極化肌鬆劑依結構分兩類:benzyl-isoquinolinium(atracurium、cisatracurium、mivacurium、d-tubocurarine)與 aminosteroid(pancuronium、vecuronium、rocuronium)。組織胺釋放(致低血壓、潮紅、支氣管收縮)以 benzyl-isoquinolinium 較常見——尤 d-tubocurarine、mivacurium、(大劑量 atracurium);但 cisatracurium 是 atracurium 的順式異構物,效價高、用量小,「幾乎不釋放組織胺」,血流動力學穩定。cisatracurium 還經 Hofmann 消除(體溫、pH 依賴的自發降解,不依賴肝腎),適合肝腎功能不全者(見 113020-04)。Pancuronium 為長效 aminosteroid,具迷走阻斷/擬交感作用→心搏過速、依賴腎排除。本題問 benzyl-isoquinolinium 且不釋放組織胺者 = cis-atracurium(B)。","options":{"A":"mivacurium 屬 benzyl-isoquinolinium 但會釋放組織胺。","B":"正解。cis-atracurium 屬 benzyl-isoquinolinium 且不釋放組織胺,血壓穩定;經 Hofmann 降解。","C":"d-tubocurarine 釋放組織胺明顯,易低血壓。","D":"pancuronium 是 aminosteroid(非 benzyl-isoquinolinium),且致心搏過速。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"109080-06":{"quick":"評估非去極化肌鬆劑恢復程度,最客觀可量化的是「四連刺激(TOF)」;TOFR≥0.9 才代表足夠恢復。潮氣容積、呼吸速率、吸氣負壓敏感度與特異度不足。","detail":{"background":"評估神經肌肉功能恢復的方法分臨床指標與客觀監測。臨床指標(抬頭 5 秒、握力、潮氣容積、肺活量、吸氣負壓)敏感度差:即使 TOFR 僅 0.5–0.7,潮氣容積/呼吸速率/吸氣負壓也可能「看似正常」,故無法可靠排除殘餘阻斷。客觀的「四連刺激(TOF)」以連續 4 次刺激比較第四與第一抽動幅度(TOF ratio),是評估「非去極化」阻斷恢復程度的最佳定量指標:T4 出現代表開始恢復,TOFR≥0.9(最好以加速度肌動描記定量)才代表足夠恢復、可安全拔管。本題答案 D(TOF)。注意:去極化阻斷(succinylcholine)不顯 fade,須以其他方式評估。","options":{"A":"潮氣容積即使在殘餘阻斷時也常正常,敏感度差。","B":"呼吸速率不能反映肌力恢復程度。","C":"吸氣負壓(MIP)敏感度不足,殘餘阻斷時可能仍可達標。","D":"正解。TOF 是評估非去極化阻斷恢復最客觀的指標(TOFR≥0.9 為足夠)。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"113020-03":{"quick":"B 正確:neostigmine 抑制乙醯膽鹼酯酶、增加接合處 ACh 以反轉非去極化阻斷,須在病人已有自發恢復跡象(TOF≥2)時給才有效。A、C、D 各有錯誤。","detail":{"background":"NMBD 使用與監測。(A)錯誤:恢復室 TOFR「大於 0.9」代表「足夠恢復」,風險低;TOFR<0.9 才增加缺氧/呼吸道阻塞風險,題目把 >0.9 說成高風險,顛倒。(B)正確(本題答案):neostigmine 為乙醯膽鹼酯酶抑制劑,增加神經肌肉接合處 ACh 與肌鬆劑競爭,反轉非去極化阻斷,但有天花板效應,須在已有自發恢復(至少 TOF 出現 2 個抽動、最好更多)時給予才可靠,並須併 atropine/glycopyrrolate 對抗蕈毒鹼副作用。(C)錯誤:sugammadex 是環糊精,專一包覆「steroidal NMBD(rocuronium、vecuronium)」,對 benzyl-isoquinolinium 的「cisatracurium 無效」,故不能用以反轉 cisatracurium。(D)錯誤:殘餘阻斷風險主要與肌鬆劑種類/劑量/監測有關;吸入麻醉(揮發劑)反而會「增強」肌鬆作用、增加殘餘風險,故「靜脈麻醉比氣體麻醉更易殘餘」說法不正確。","options":{"A":"錯誤。TOFR>0.9 代表足夠恢復、風險低;<0.9 才高風險,題敘顛倒。","B":"正解。neostigmine 增加接合處 ACh,須在已有自發恢復(TOF≥2)時給。","C":"錯誤。sugammadex 只對 steroidal NMBD 有效,不能反轉 cisatracurium。","D":"錯誤。揮發性(氣體)麻醉會增強肌鬆、增加殘餘風險,非靜脈麻醉較易殘餘。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"113020-04":{"quick":"Cisatracurium 經 Hofmann 消除(溫度/pH 依賴的自發降解,不依賴肝腎代謝),最適合嚴重肝功能異常(及腎衰竭)病人。","detail":{"background":"各肌鬆劑代謝/排除途徑決定其在器官衰竭時的選擇:cisatracurium 與 atracurium 主要經「Hofmann elimination」——在生理體溫與 pH 下自發非酵素性降解,不依賴肝、腎,故肝腎衰竭時作用時間不延長,是嚴重肝/腎功能不全的首選(cisatracurium 又不釋組織胺、無 atracurium 代謝物 laudanosine 累積疑慮)。對照:vecuronium、rocuronium 主要經肝(膽汁)代謝/排除,肝衰竭會延長作用;succinylcholine 經血漿假性膽鹼酯酶水解(肝合成此酶,嚴重肝病可能延長)且有高血鉀等諸多禁忌;pancuronium 依賴腎排除。本題答案 A(cisatracurium)。","options":{"A":"正解。cisatracurium 經 Hofmann 消除,不依賴肝腎,適合嚴重肝病。","B":"vecuronium 主要經肝代謝/膽汁排除,肝衰竭作用延長。","C":"rocuronium 主要經肝(膽汁)排除,肝衰竭作用延長。","D":"succinylcholine 經血漿膽鹼酯酶(肝合成)水解,且禁忌多。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"113070-04":{"quick":"Sugammadex 是修飾型 γ-環糊精,專一包覆並中和「steroidal(aminosteroid)非去極化肌鬆劑」——rocuronium(親和力最高)、vecuronium;對 benzyl-isoquinolinium(cisatracurium、mivacurium)及 pancuronium 親和力低或無效。","detail":{"background":"Sugammadex 為環糊精類選擇性鬆弛結合劑(selective relaxant binding agent),以包覆方式螯合血漿中的 rocuronium/vecuronium,使其無法作用於接合處,可在任意深度(包括深度阻斷與「無法插管無法通氣」緊急狀況)快速完全反轉,且不需併用抗膽鹼酯酶藥/抗膽鹼藥。親和力:rocuronium > vecuronium >> pancuronium(弱),對 benzyl-isoquinolinium 類(cisatracurium、mivacurium、atracurium)無效。劑量依阻斷深度(2/4/16 mg/kg)。注意:可能過敏、與口服避孕藥交互作用(降效需額外避孕)、罕見心搏過緩。本題答案 A(rocuronium)。","options":{"A":"正解。sugammadex 對 rocuronium 親和力最高,專一反轉。","B":"cisatracurium 屬 benzyl-isoquinolinium,sugammadex 無效。","C":"mivacurium 屬 benzyl-isoquinolinium,sugammadex 無效。","D":"pancuronium 雖為 steroidal,但親和力低,反轉效果差。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"114070-02":{"quick":"D 為錯誤:TOF ratio 達 0.8「尚未」完全恢復;須 TOFR≥0.9(最好以定量監測)才代表足夠恢復、安全拔管。T4 再現代表進入恢復、TOFR<0.4 無法抬頭、0.7–0.75 可咳嗽抬頭皆正確。","detail":{"background":"TOF ratio(第四抽動/第一抽動幅度)反映非去極化阻斷恢復程度:T4 再次出現(即 4 個抽動都可見)代表進入恢復階段(A 正確);TOFR<0.4 病人通常無法抬頭/舉手(B 正確);TOFR 0.7–0.75 約可咳嗽、抬頭 5 秒、握力部分恢復(C 正確,屬舊標準)。但近代研究指出 TOFR 0.7–0.9 之間仍可能有咽部協調障礙、誤吸與低血氧風險,故「足夠恢復」的標準已上修為 TOFR≥0.9(且須客觀定量監測,主觀觸覺會高估)。因此「TOFR 達 0.8 即完全恢復」是錯誤(本題答案 D)。臨床:拔管前確認 TOFR≥0.9,或以 sugammadex/適當 neostigmine 反轉。","options":{"A":"正確。T4 抽動再現代表進入神經肌肉阻斷恢復階段。","B":"正確。TOFR<0.4 通常無法抬頭或舉手。","C":"正確。TOFR 0.7–0.75 約可咳嗽、抬頭至少 5 秒(舊標準)。","D":"正解(錯誤)。TOFR 0.8 尚未完全恢復;須≥0.9 才算足夠。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"114070-05":{"quick":"C 為錯誤:succinylcholine 在燒傷(及擠壓傷、去神經、長期臥床)病人會引發「高血鉀(hyperkalemia)」而非低血鉀,可致心律不整/心跳停止,故這類病人應避免使用。","detail":{"background":"Succinylcholine(琥珀膽鹼)為唯一去極化肌鬆劑,起效最快(30–60 秒)、作用最短(經血漿膽鹼酯酶水解),用於快速順序插管。重要副作用/禁忌:(A)兒童反覆給藥可致嚴重「心搏過緩」(蕈毒鹼樣作用,尤迷走張力高的小兒)——正確,可先給 atropine。(B)先給小劑量非去極化肌鬆劑(defasciculating dose)可減輕 succinylcholine 引起的肌束顫動(fasciculation)與肌痛——正確。(C)燒傷、擠壓傷、去神經病變(脊髓損傷、中風)、長期臥床、嚴重感染等,因接合外乙醯膽鹼受體(upregulation)大量去極化釋鉀,造成「高血鉀」(可致心跳停止),這類病人應避免 succinylcholine——故「引發低血鉀」是錯誤(本題答案 C)。(D)succinylcholine 是惡性高熱的觸發劑——正確。","options":{"A":"正確。兒童反覆使用易致嚴重心搏過緩,可先給 atropine。","B":"正確。預給小劑量非去極化肌鬆劑可減輕肌束顫動與肌痛。","C":"正解(錯誤)。燒傷病人使用會引發「高血鉀」而非低血鉀,應避免。","D":"正確。succinylcholine 是惡性高熱的觸發劑。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"114070-77":{"quick":"B 為錯誤:燒燙傷病人應避免 succinylcholine(高血鉀風險),此時 rocuronium 較合適;故「succinylcholine 比 rocuronium 合適」不正確。succinylcholine 致橫紋肌溶解、升顱內壓/眼壓/胃內壓皆正確。","detail":{"background":"頭部外傷快速順序插管(RSI)用 succinylcholine 的考量。(A)succinylcholine 可致橫紋肌溶解(尤潛在肌肉病變者)、高血鉀——正確。(B)「若合併燒燙傷,succinylcholine 比 rocuronium 合適」錯誤(本題答案):燒傷(通常傷後 24–48 小時起,持續至傷後約 1 年)因接合外受體上調,succinylcholine 會致致命性高血鉀,應「避免」,改用非去極化的 rocuronium(高劑量 1.2 mg/kg 可達近似快速起效,且可用 sugammadex 反轉)。(C)succinylcholine 的肌束顫動可短暫升高顱內壓(ICP)、眼內壓(IOP)與胃內壓——對頭部外傷/開放性眼球傷須警覺(可先給 defasciculating 劑量或改 rocuronium)——正確。(D)升胃內壓(同時升食道下括約肌張力,故吸入風險爭議),敘述屬正確。整合:燒傷/去神經/脊髓損傷/擠壓傷者 RSI 選 rocuronium 而非 succinylcholine。","options":{"A":"正確。succinylcholine 可造成橫紋肌溶解。","B":"正解(錯誤)。燒燙傷者應避免 succinylcholine(高血鉀),rocuronium 較合適。","C":"正確。可能短暫升高顱內壓與眼內壓。","D":"正確。可能升高胃內壓。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"115020-05":{"quick":"Cisatracurium(非去極化肌鬆劑)只提供「肌肉鬆弛(制動)」,「不」提供意識喪失、止痛或記憶缺失;故僅①。","detail":{"background":"神經肌肉阻斷劑(NMBD,如 cisatracurium)只作用於神經肌肉接合處的乙醯膽鹼受體,造成骨骼肌麻痺(肌肉鬆弛、制動),「完全不影響中樞」——不提供意識喪失(hypnosis)、止痛(analgesia)或記憶缺失(amnesia)。這是麻醉安全的關鍵概念:單獨給肌鬆劑而麻醉/止痛不足,會造成「術中清醒但無法動彈」(awareness with paralysis)的可怕情境。因此 NMBD 必須與足夠的催眠劑(吸入/丙泊酚)與止痛劑(opioid)合併,並監測麻醉深度。本題答案 A(僅①肌肉鬆弛)。臨床:使用肌鬆劑時務必確保意識與止痛足夠,並以 TOF 監測肌鬆程度。","options":{"A":"正解。cisatracurium 僅提供肌肉鬆弛/制動。","B":"錯誤。不提供意識喪失與記憶缺失。","C":"錯誤。不提供意識喪失與止痛。","D":"錯誤。不提供止痛與記憶缺失。"},"sources":["Miller's Anesthesia 9e, Neuromuscular Blocking Drugs & Reversal","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.11 Neuromuscular Blocking Agents","Stoelting's Pharmacology & Physiology in Anesthetic Practice 5e"]}},"102030-17":{"quick":"硬脊膜外推完含腎上腺素的 lidocaine 後出現頭暈、嘴麻、耳鳴(中樞前驅症狀)、心搏過速/血壓上升(腎上腺素血管內標記)、進而全身抽搐 → 典型「意外血管內注射致局麻全身毒性(LAST)」。","detail":{"background":"此題是局部麻醉全身毒性(local anesthetic systemic toxicity, LAST)的經典表現。硬脊膜外/神經阻斷時若導管或針誤入血管,大量局麻藥快速進入循環:中樞神經先興奮後抑制——前驅症狀為口周/舌麻木、金屬味、耳鳴(tinnitus)、頭暈、視覺模糊、躁動,進而肌肉抽搐、全身強直陣攣抽搐(seizure),再惡化為意識喪失、呼吸抑制;心血管則先因含 epinephrine 之測試劑量出現心搏過速、血壓上升(血管內標記陽性),嚴重局麻藥(尤 bupivacaine)會致頑固心律不整與心臟停止。本例 17 mL 2% lidocaine(340 mg)若入血即超過毒性閾值。處置:停藥、求救、確保氣道與供氧、benzodiazepine 止痙、若進展為心臟毒性給 20% lipid emulsion(脂肪乳劑救援)、避免大劑量 vasopressin/鈣阻斷/局麻藥(lidocaine)。預防:分次給藥、回抽、用測試劑量、上限劑量。答案 C。","options":{"A":"癲癇通常無此「嘴麻耳鳴」前驅與血管內標記,且無誘因。","B":"中風不會在注藥後立即以耳鳴嘴麻起始且伴心搏過速。","C":"正解。誤入血管致局麻全身毒性(LAST):中樞前驅症狀→抽搐,合併腎上腺素標記。","D":"電解質不平衡不會在注藥三分鐘內急性發作如此。"},"sources":["ASRA Practice Advisory on Local Anesthetic Systemic Toxicity (LAST) 2020","Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"103100-02":{"quick":"局麻藥的全身吸收(→毒性風險)與注射部位血管豐富度成正比。各部位吸收由高到低:intercostal > caudal > epidural > brachial plexus > 皮下。故肋間(intercostal)吸收最快、最易中毒。","detail":{"background":"相同劑量局麻藥在不同部位的全身吸收速率取決於該部位的血管豐富程度,吸收愈快、血中峰值愈高、愈易發生全身毒性。經典吸收速率排序(IV > )intercostal > caudal > epidural > brachial plexus > sciatic/femoral > subcutaneous(口訣可記「I Can Eat Bananas Slowly」)。因此肋間神經阻斷(intercostal block)因肋間血管密布,全身吸收最快、血中濃度最高,毒性風險最大,須特別注意累積劑量(尤多節肋間阻斷)。本題答案 A(intercostals)。臨床:在血管豐富部位阻斷時加入 epinephrine 可延緩吸收、降低峰值並延長作用。","options":{"A":"正解。肋間血管豐富,局麻藥吸收最快、最易全身毒性。","B":"caudal 吸收次於肋間。","C":"epidural 吸收再次之。","D":"brachial plexus 吸收較慢,毒性風險相對低。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"104030-05":{"quick":"正確組合 134:坐姿肩手術因感壓反射致心搏過慢/低血壓(②正確),但題列 ②於 124 組;標準答案 134——①坐骨+股神經阻斷足夠膝以下、③脂肪栓塞但嚴重症候群<1%、④脊髓或硬脊膜外都適合全髖置換但須監測失血。","detail":{"background":"骨科麻醉綜合題(答案 134)。①坐骨神經(sciatic)+股神經(femoral)阻斷可涵蓋膝以下手術的感覺與運動,對小腿/足踝手術足夠——正確。③骨盆與股骨手術(尤髓內釘、關節置換)常釋出脂肪進入循環,但發展成有臨床症狀的嚴重「脂肪栓塞症候群(呼吸窘迫、神經症狀、皮膚瘀點三聯)」機率小(約<1%)——正確。④全髖關節置換以脊髓麻醉或硬脊膜外麻醉皆適當(可減少失血、血栓、譫妄),但仍須監測失血量與血流動力——正確。②「肩關節手術常坐姿(beach chair),因感壓反射致心搏過慢、低血壓」本身是真實現象(Bezold-Jarisch reflex),但標準答案組合為 134,顯示出題者將②排除於最佳組合外(或視為非「骨科手術麻醉」核心正確敘述之一);應記住正解 134。","options":{"A":"正解(134)。①神經阻斷足夠膝下、③脂肪栓塞嚴重<1%、④脊髓/硬脊膜外適合全髖但監測失血。","B":"124 把②納入而排除③,非標準答案。","C":"123 排除④,非標準答案。","D":"234 排除①,非標準答案。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"104090-05":{"quick":"B 為錯誤:半身麻醉(脊髓/硬脊膜外)的禁忌不只「拒絕、凝血異常、腦壓上升」三項;尚包括注射部位感染、未矯正的低血容/休克、嚴重主動脈瓣狹窄、顱內高壓、敗血、某些神經病變等,故「只有」三項說法錯誤。","detail":{"background":"老人疝氣修補麻醉考量。(A)半身麻醉(神經軸麻醉/脊髓、硬脊膜外)或周邊神經阻斷適合此類手術,可避免全身麻醉風險——正確。(B)半身麻醉的禁忌「不只」病人拒絕、凝血異常、顱內壓上升三項——還包括:穿刺部位感染、菌血症/敗血、未矯正的低血容或休克(交感阻斷會致嚴重低血壓)、嚴重主動脈瓣或二尖瓣狹窄(固定心輸出無法代償血管擴張)、嚴重脊柱畸形、病人無法配合等,故「只有」此三項是錯誤(本題答案)。(C)脊椎麻醉造成血壓下降,主因是交感神經(T1–L2)被阻斷致動靜脈擴張、前負荷與後負荷下降——正確。(D)若阻斷平面高(T1–4 心臟交感)或前負荷劇降引發 Bezold-Jarisch,可致心搏過慢——正確。","options":{"A":"正確。半身麻醉或神經阻斷適合老人疝氣手術。","B":"正解(錯誤)。禁忌不只三項,還有部位感染、低血容、主動脈狹窄、敗血等。","C":"正確。脊椎麻醉低血壓源於交感神經阻斷致血管擴張。","D":"正確。高位阻斷或前負荷劇降可致心搏過慢。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"105020-03":{"quick":"局部麻醉劑作用機轉:阻斷神經細胞膜上「電壓門控鈉離子通道」,抑制鈉內流而阻斷動作電位傳導。","detail":{"background":"局部麻醉劑(lidocaine 等)以非離子化形式穿過神經細胞膜,於細胞內以離子化形式結合「電壓門控鈉離子通道(voltage-gated Na+ channel)」的內側,使通道穩定於不活化狀態,阻止去極化所需的鈉內流,動作電位無法產生/傳導,神經訊號被阻斷。對通道呈「使用/狀態依賴(use-dependent)」阻斷——通道愈頻繁開啟(高頻放電的痛覺纖維)愈易被阻斷。神經纖維被阻斷的順序大致:自主(B、C)→痛溫覺→觸壓→運動(細、無/薄髓鞘者先被阻)。本題答案 A(鈉)。對照:鈣通道阻斷是某些止痛輔助/鈣阻斷劑;鉀通道與再極化有關但非局麻主標的。","options":{"A":"正解。阻斷電壓門控鈉離子通道,抑制鈉內流而阻斷傳導。","B":"鈣通道非局麻主要標的。","C":"鉀通道與再極化相關,非局麻主標的。","D":"氯通道是 GABA/glycine 抑制機轉,非局麻標的。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"106080-03":{"quick":"剖腹產硬脊膜外給 lidocaine 後出現舌麻、頭暈(局麻全身毒性前驅症狀)→ 是「局麻藥被血管吸收/誤入血管」使血中濃度升高所致。應停藥、警覺抽搐與心臟毒性。","detail":{"background":"硬脊膜外大劑量 lidocaine 後出現「舌麻、頭暈」是局麻藥全身毒性(LAST)的早期中樞神經前驅症狀,代表血中局麻藥濃度升高——多因藥物經硬脊膜外腔豐富靜脈叢吸收,或導管/針誤入血管(intravascular)。處置:立即停止注藥、給氧、監測、準備處理抽搐(benzodiazepine)與心臟毒性(lipid emulsion);切勿續推。本題答案 B(被血管吸收產生)。對照:(A)若是阻斷平面過高,表現為呼吸困難、低血壓、上肢麻、而非舌麻耳鳴;(C)此時不應再給升壓劑為「改善」(治標非治因),且加重病情判讀;(D)左側臥可改善的是孕婦「主動脈腔靜脈壓迫(仰臥低血壓)」,與局麻毒性無關。","options":{"A":"阻斷平面過高表現為呼吸困難/上肢麻,而非舌麻耳鳴。","B":"正解。舌麻頭暈是局麻藥被血管吸收致血中濃度升高(LAST 前驅)。","C":"升壓劑無法處理局麻毒性,不是此現象的解釋或正確處置。","D":"左側臥改善的是仰臥腔靜脈壓迫,與局麻吸收無關。"},"sources":["ASRA Practice Advisory on Local Anesthetic Systemic Toxicity (LAST) 2020","Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"107020-04":{"quick":"C 為錯誤:過敏較常見於「ester 類」局麻藥(代謝產生 PABA),amide 類過敏罕見;故「amide 較易過敏」不正確。","detail":{"background":"局部麻醉藥真正的免疫媒介過敏「非常罕見」,臨床上的「過敏」多為腎上腺素引起的心悸、血管迷走反應或全身毒性誤判。真要區分:ester 類(procaine、tetracaine、benzocaine、chloroprocaine、cocaine)代謝產生對胺基苯甲酸(PABA),較易引起過敏(IgE 媒介或接觸性);amide 類(lidocaine、bupivacaine、ropivacaine、mepivacaine)過敏極罕見。此外多劑量瓶含保存劑 methylparaben(結構似 PABA)與抗氧化劑 metabisulfite,可能才是致敏原。故 C「amide 較易引起過敏」是錯誤(本題答案);正確應為「ester 較易過敏」。臨床:疑局麻過敏者可選另一類藥、用不含保存劑製劑。","options":{"A":"正確。局麻過敏罕見,可涉 IgE 與細胞免疫。","B":"正確。ester 類代謝產生 PABA,較易引起過敏。","C":"正解(錯誤)。amide 類過敏罕見,並非較易過敏。","D":"正確。保存劑 methylparaben、metabisulfite 可能誘發過敏反應。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"107080-04":{"quick":"Lidocaine 是「amide 類」局麻藥(名稱含兩個 i:lid-o-ca-i-ne);cocaine、tetracaine、procaine 都是 ester 類。故不屬 ester 的是 lidocaine。","detail":{"background":"局部麻醉藥依連接芳香環與胺基的鍵結分為兩類:ester 類(procaine、chloroprocaine、tetracaine、benzocaine、cocaine)——由血漿假性膽鹼酯酶水解、代謝產生 PABA(較易過敏)、作用時間多較短;amide 類(lidocaine、bupivacaine、ropivacaine、mepivacaine、prilocaine、etidocaine)——由肝臟微粒體酵素代謝、過敏罕見。記憶法:amide 類藥名「在 -caine 前還有一個 i」(li-do-ca-i-ne、bupiva-ca-i-ne),且常有「二個 i」。本題 lidocaine 為 amide,不屬 ester(答案 A);cocaine、tetracaine、procaine 皆 ester。","options":{"A":"正解。lidocaine 是 amide 類,不屬 ester。","B":"cocaine 是 ester 類。","C":"tetracaine 是 ester 類。","D":"procaine 是 ester 類。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"108030-04":{"quick":"C 為錯誤:神經阻斷使用的局部麻醉藥「可能」造成全身毒性(誤入血管或吸收過量致 LAST),並非「不會」。其餘:可用超音波/神經刺激器/感覺定位、病患不同意為絕對禁忌、針可能傷神經皆正確。","detail":{"background":"神經阻斷術(周邊神經/神經叢)原則。(A)神經定位可用超音波導引、周邊神經刺激器或依病人異感(paresthesia,較少用)——正確。(B)病患不同意/拒絕是絕對禁忌(任何麻醉皆然)——正確;其他禁忌含穿刺部位感染、凝血異常(對深部不可壓迫處)、對局麻藥過敏。(C)「使用的局部麻醉藥不會造成全身毒性」錯誤(本題答案):神經阻斷正是 LAST 的高風險場景,誤入血管或在血管豐富部位吸收過量會致中樞與心臟毒性,須限劑量、回抽、分次給、備脂肪乳劑。(D)穿刺針可能直接刺傷或注入神經內(intraneural injection)造成神經損傷,故避免在有異感或高阻力時注藥——正確。","options":{"A":"正確。可用超音波、神經刺激器或病人感覺定位。","B":"正確。病患不同意為絕對禁忌。","C":"正解(錯誤)。局麻藥可能造成全身毒性(LAST),非不會。","D":"正確。針可能傷神經,須避免神經內注射。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"108080-03":{"quick":"D 為錯誤:epinephrine 加入局麻藥的好處是「血管收縮」(經 α1)——延長作用、增強阻斷、減少全身吸收與出血;它並非作用於 α2 產生「直接止痛」。","detail":{"background":"Epinephrine 作為局麻藥佐劑(常 1:200,000),主要經血管平滑肌 α1 受體造成局部血管收縮,益處:(A)延長作用時間(藥物滯留時間長)——正確;(B)增強/加深阻斷品質——正確;(C)減少全身吸收(降低血中峰值、減毒、減出血)並可作為血管內注射的標記(心搏加快提示誤入血管)——正確;(D)「epinephrine 經 α2 有直接止痛」是錯誤(本題答案):雖然 α2 致效劑(clonidine、dexmedetomidine)加入局麻可延長/增強鎮痛,但 epinephrine 在此的機制是 α1 血管收縮,而非 α2 直接止痛。臨床:末梢循環(手指、足趾、陰莖、耳)傳統避免加 epinephrine(缺血疑慮,現有爭議)。","options":{"A":"正確。epinephrine 血管收縮延長 lidocaine 作用時間。","B":"正確。可增強神經阻斷品質。","C":"正確。減少全身吸收、降低毒性與出血。","D":"正解(錯誤)。其機制為 α1 血管收縮,非 α2 直接止痛。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"110020-04":{"quick":"A 為錯誤:局部麻醉劑主要阻斷「鈉離子通道」(voltage-gated Na+),不是鈣離子通道。神經敏感性受軸突直徑/髓鞘影響、過量致心血管抑制、高脂溶性作用時間長皆正確。","detail":{"background":"局麻劑通則。(A)機轉是阻斷電壓門控「鈉」離子通道,非鈣通道,故 A 錯誤(本題答案)。(B)神經纖維對局麻劑敏感性受軸突直徑與髓鞘影響:細、有髓的 Aδ 與無髓 C 纖維(痛溫、自主)較易被阻,粗的 Aα 運動纖維較抗(臨床差異阻斷),且髓鞘 Ranvier 結需連續阻斷數節——正確。(C)過量(LAST)除中樞抽搐外,可致心血管抑制(心肌收縮力下降、傳導阻滯、心律不整、低血壓),bupivacaine 心臟毒性尤強——正確。(D)脂溶性高者效價強、與蛋白結合多、作用時間長(bupivacaine、tetracaine、ropivacaine)——正確。局麻藥三大物化參數:脂溶性↔效價、pKa↔起效、蛋白結合↔作用時間。","options":{"A":"正解(錯誤)。局麻劑主要阻斷鈉通道,非鈣通道。","B":"正確。敏感性受軸突直徑與髓鞘影響(差異阻斷)。","C":"正確。過量造成心血管抑制。","D":"正確。高脂溶性者作用時間較長。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"110020-07":{"quick":"臂神經叢阻斷注射 bupivacaine 後發生心室頻脈 → 局麻全身毒性(LAST)的心臟毒性。最不恰當的是「給 lidocaine」(亦為鈉通道阻斷局麻藥,會加重心臟毒性);正確處置為停藥、脂肪乳劑、抗痙攣、支持。","detail":{"background":"Bupivacaine 是心臟毒性最強的局麻藥(高親脂、與心肌鈉通道結合緊、解離慢,易致頑固性心室心律不整與心臟停止)。臂神經叢阻斷時出現心室頻脈(VT)即 LAST 的心臟毒性表現。正確處置(ASRA):(C)立即停止注藥;氣道/供氧/呼救;(D)注意/處理抽搐(用 benzodiazepine 如 midazolam,避免大量 propofol 於循環不穩時);(A)給 20% lipid emulsion(脂肪乳劑救援,bolus 1.5 mL/kg 後輸注),為 bupivacaine 心臟毒性的關鍵解毒;若需升壓用小劑量 epinephrine(≤1 µg/kg)。最不恰當者(B)是「給 lidocaine」——lidocaine 本身也是鈉通道阻斷局麻藥,在 LAST 心臟毒性時再給局麻藥會加重傳導抑制與心律不整;且傳統抗心律不整中,應避免再用鈉通道阻斷劑與鈣通道阻斷劑/β阻斷劑/vasopressin。本題答案 B(最不恰當)。","options":{"A":"恰當。給脂肪乳劑(lipid emulsion)是 bupivacaine 心臟毒性的關鍵救援。","B":"正解(最不恰當)。lidocaine 也是鈉通道阻斷局麻藥,會加重心臟毒性。","C":"恰當。立即停止注射 bupivacaine。","D":"恰當。警覺並處理抽搐,可用 midazolam。"},"sources":["ASRA Practice Advisory on Local Anesthetic Systemic Toxicity (LAST) 2020","Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"110020-77":{"quick":"含 epinephrine 時 lidocaine 最高劑量約 7 mg/kg;72 公斤×7≈500 mg。故上限約 500 mg。","detail":{"background":"局麻藥最大安全劑量(避免全身毒性)隨藥物與是否加 epinephrine 而異。Lidocaine:不加 epinephrine 約 4–4.5 mg/kg;加 epinephrine(血管收縮減緩吸收)可提高到約 7 mg/kg。本例 72 kg × 7 mg/kg ≈ 504 mg ≈ 500 mg(答案 C)。對照:bupivacaine 上限約 2–3 mg/kg(加 epinephrine 略增),其心臟毒性閾值低須更謹慎。注意:此為「單次浸潤」概略上限,實際須考量注射部位血管豐富度、病人體型/共病、是否分次給藥;血管豐富部位(肋間)即使未達上限也可能中毒。臨床務必計算累積劑量、回抽、分次給。","options":{"A":"100 mg 過低,遠低於含 epinephrine 之上限。","B":"250 mg 偏低。","C":"正解。約 7 mg/kg×72 kg≈500 mg(含 epinephrine)。","D":"700 mg 超過安全上限,有毒性風險。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"110080-05":{"quick":"局麻藥中樞神經毒性的「興奮期」症狀:口周麻木、舌頭感覺異常、頭暈耳鳴、視覺障礙、肌肉抽搐、抽搐;「幻覺」並非典型局麻中樞毒性表現,故 D 為正解(不是)。","detail":{"background":"局麻藥全身毒性(LAST)的中樞神經表現呈雙相:先「興奮期」(因先抑制抑制性神經元)——口周/舌麻木與異感、金屬味、頭暈、耳鳴(tinnitus)、視力模糊、言語不清、肌肉抽動、躁動,進而全身強直陣攣抽搐;血中濃度更高則進入「抑制期」——意識喪失、昏迷、呼吸抑制與停止。「幻覺(hallucination)」不是局麻中樞毒性的典型症狀(較屬 ketamine 等其他藥物),故本題問「不是」者選 D。臨床:出現上述前驅症狀即須停藥、給氧、備抗痙攣與脂肪乳劑。","options":{"A":"口周麻木是局麻中樞毒性早期典型症狀。","B":"舌頭感覺異常是典型早期症狀。","C":"眩暈(頭暈)是典型中樞毒性症狀。","D":"正解。幻覺不是局麻劑中樞毒性的典型表現。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"110080-06":{"quick":"硬脊膜外穿刺「落空感(loss of resistance)」發生在針尖穿過「黃韌帶(ligamentum flavum)」進入硬脊膜外腔的瞬間。","detail":{"background":"硬脊膜外麻醉(epidural)以「落空感(loss of resistance)」技術定位:由後往前穿刺,針依序通過皮膚→皮下→棘上韌帶(supraspinous lig.)→棘間韌帶(interspinous lig.)→黃韌帶(ligamentum flavum,緻密富彈性、阻力最大)→進入硬脊膜外腔,當針尖「穿透黃韌帶」進入硬脊膜外腔時,原本注射器活塞遇到的高阻力突然消失(loss of resistance to saline/air),即定位成功;此時針尖位於硬脊膜外腔(尚未穿破硬脊膜)。若再前進穿過硬脊膜+蜘蛛網膜則進入蛛網膜下腔、見腦脊髓液(那是脊髓麻醉)。本題答案 C(黃韌帶)。對照下一題(113070-06):脊髓麻醉見 CSF 是穿過蜘蛛網膜後。","options":{"A":"豎脊肌不在中線穿刺路徑上(正中入路經韌帶)。","B":"棘間韌帶在黃韌帶之前,穿過它尚未落空。","C":"正解。穿過黃韌帶進入硬脊膜外腔時產生落空感。","D":"穿過硬脊膜是進入更深的蛛網膜下腔(脊髓麻醉),非硬脊膜外落空感。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"111020-04":{"quick":"C 為錯誤:局麻藥中加入 epinephrine 會使注射部位「血管收縮」(α1),而非血管擴張。Na 通道三態、過量先現神經症狀、中樞可受毒性皆正確。","detail":{"background":"局麻劑通則。(A)電壓門控鈉通道存在 resting(靜止/關閉可活化)、activated(開放)、inactivated(不活化)三種狀態,局麻藥對開放/不活化態親和力高(use-dependent block)——正確。(B)LAST 過量時通常「先」出現中樞神經症狀(口麻、耳鳴、抽搐),心血管毒性多在更高濃度才出現(bupivacaine 例外,心臟毒性可較早/同時)——正確。(C)加入 epinephrine 經 α1 致「血管收縮」(延長作用、減少吸收),非血管擴張,故 C 錯誤(本題答案)。(D)中樞神經系統可受局麻毒性影響(抽搐、昏迷)——正確。整合:epinephrine 佐劑=血管收縮;局麻=鈉通道阻斷。","options":{"A":"正確。鈉通道有 resting、activated、inactivated 三態。","B":"正確。過量通常先表現神經系統症狀。","C":"正解(錯誤)。epinephrine 使注射部位血管收縮,非擴張。","D":"正確。中樞神經可受局麻劑毒性影響。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"112020-07":{"quick":"D 為錯誤:肥胖「會」影響脊椎麻醉阻斷皮節高度(腹內壓高、硬膜外脂肪/靜脈叢使蛛網膜下腔容積變小,藥物易擴散得較高),故「無影響」不正確。","detail":{"background":"脊椎(蛛網膜下)麻醉阻斷平面(皮節高度)的影響因素眾多:(A)局麻藥比重(baricity)——高比重(hyperbaric,加葡萄糖)藥隨重力沉降,平面受姿勢影響大——是重要因素;(B)劑量與體積——劑量愈大平面愈高;(C)病人姿勢/擺位——坐姿/側臥/頭低腳高影響高比重藥分佈;其他:注射部位高低、病人身高(脊柱長度)、腹內壓(懷孕、肥胖、腹水使下腔靜脈受壓、硬膜外靜脈叢怒張、CSF 容積減少→平面升高)、注射速度/barbotage 等。故(D)「肥胖對阻斷皮節高度無影響」是錯誤(本題答案):肥胖與懷孕一樣會使平面升高,劑量須下修。","options":{"A":"正確。藥劑比重影響平面(高比重隨重力沉降)。","B":"正確。劑量與體積影響阻斷高度。","C":"正確。病人姿勢影響高比重藥的分布。","D":"正解(錯誤)。肥胖會使阻斷平面升高,並非無影響。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"112080-04":{"quick":"A 為錯誤:amide 類局麻藥主要由「肝臟」微粒體酵素代謝,而非血漿假性膽鹼酯酶(那是 ester 類)。吸收與血管豐富度相關、非離子化影響起效、bupivacaine 入血致心臟毒性皆正確。","detail":{"background":"局麻劑通則。(A)代謝途徑:ester 類由血漿假性膽鹼酯酶(pseudocholinesterase)水解;amide 類由「肝臟」微粒體 CYP 酵素代謝。故說 amide 經血漿膽鹼酯酶代謝是錯誤(本題答案)——肝功能不全會延長 amide 作用。(B)全身吸收率與注射部位血管豐富度成正比(肋間>caudal>epidural>叢>皮下)——正確。(C)局麻藥為弱鹼,僅非離子化(脂溶)形式能穿膜,故組織 pH 與藥物 pKa 決定非離子化比例、影響起效快慢(pKa 接近生理 pH 者起效快;鹼化/加碳酸氫鈉可加速起效;感染酸性組織起效慢)——正確。(D)誤注 bupivacaine 入血管可致嚴重心臟毒性——正確。","options":{"A":"正解(錯誤)。amide 類由肝臟代謝,非血漿假性膽鹼酯酶(那是 ester)。","B":"正確。全身吸收與注射部位血管豐富度相關。","C":"正確。非離子化比例影響起效快慢。","D":"正確。bupivacaine 入血管可致嚴重心臟毒性。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"113020-05":{"quick":"A 為錯誤:脊椎麻醉中 lidocaine 是「短效」、bupivacaine 是「長效」,故 lidocaine 作用時間「較短」而非較長。morphine 比 fentanyl 長效、椎管內 opioid 致尿滯留、脊麻最常見併發症為低血壓皆正確。","detail":{"background":"脊椎(蛛網膜下)麻醉藥理。(A)局麻藥作用時間:procaine/lidocaine(短效)< bupivacaine/tetracaine/ropivacaine(長效)。lidocaine 脊麻較短(且曾因高濃度致暫時性神經症狀 TNS/馬尾症候群疑慮而減少使用),bupivacaine 長效;故「lidocaine 較 bupivacaine 長」是錯誤(本題答案)。(B)椎管內 opioid:morphine 親水性、停留 CSF 久、作用時間長(但起效慢、可遲發呼吸抑制),fentanyl 親脂、起效快但作用短;故 morphine 比 fentanyl 作用時間長——正確。(C)椎管內(脊椎/硬脊膜外)opioid 常見副作用包括尿滯留(逼尿肌抑制)、搔癢、噁心、呼吸抑制——正確。(D)脊椎麻醉最常見併發症是交感阻斷致低血壓(及心搏過慢)——正確,處置為輸液、升壓劑(ephedrine/phenylephrine)、左傾(孕婦)。","options":{"A":"正解(錯誤)。lidocaine 是短效,bupivacaine 才長效。","B":"正確。morphine(親水)作用時間較 fentanyl(親脂)長。","C":"正確。椎管內 opioid 可致尿滯留。","D":"正確。脊椎麻醉最常見併發症為低血壓。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"113070-06":{"quick":"脊椎麻醉時,穿刺針最後穿過「蜘蛛網膜(arachnoid mater)」才進入蛛網膜下腔、見腦脊髓液流出。","detail":{"background":"脊椎(蛛網膜下)麻醉穿刺路徑(正中入路):皮膚→皮下→棘上韌帶→棘間韌帶→黃韌帶→硬脊膜外腔→硬脊膜(dura mater)→蜘蛛網膜(arachnoid mater)→蛛網膜下腔(含 CSF)。針尖「穿過蜘蛛網膜」進入蛛網膜下腔時,腦脊髓液(CSF)流出,即定位成功並注入局麻藥。注意:硬脊膜與蜘蛛網膜緊貼,臨床上常合稱穿過「硬脊膜-蜘蛛網膜」,但題目強調「最後穿過那一層才見 CSF」——答案是蜘蛛網膜(B,軟腦膜 pia 緊貼脊髓,不在穿刺路徑見 CSF 的界面)。對照硬脊膜外麻醉只到黃韌帶後的硬脊膜外腔(落空感)、不穿硬脊膜。","options":{"A":"硬脊膜在蜘蛛網膜之前,穿過它尚未見 CSF(緊貼蜘蛛網膜)。","B":"正解。穿過蜘蛛網膜進入蛛網膜下腔,見 CSF 流出。","C":"軟腦膜緊貼脊髓表面,不是見 CSF 的界面。","D":"黃韌帶是硬脊膜外麻醉落空感的界面,更淺層。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"113070-07":{"quick":"D 正確:臂神經叢阻斷以 lidocaine 加少量碳酸氫鈉(鹼化)可加速起效(增加非離子化比例)。A interscalene 對手腕/尺側涵蓋不足;B 短時間手術應選短效,bupivacaine 是長效;C lidocaine 神經叢阻斷起效約 10–20 分鐘而非 5 分鐘內。","detail":{"background":"高齡手腕骨折以區域麻醉(臂神經叢阻斷)避免全身麻醉風險的考量。(A)interscalene(肌間溝)阻斷適合肩/上臂手術,但對下幹(C8–T1,尺神經/前臂尺側)常涵蓋不足,手腕手術應選 supraclavicular/infraclavicular/axillary 路徑——故 A 不正確。(B)45 分鐘短手術應選「短-中效」局麻藥(lidocaine、mepivacaine),不是長效 bupivacaine;且為術後早期評估神經學功能,反而希望阻斷不要太久——故 B 不正確。(C)以 lidocaine 行臂神經叢阻斷,起效約 10–20 分鐘(不像脊椎/浸潤那麼快),「5 分鐘內」過於樂觀——故 C 不正確。(D)正確(本題答案):在 lidocaine 中加少量碳酸氫鈉鹼化溶液,提高非離子化(脂溶)比例,可加速起效(onset)、並減少注射痛。臨床:鹼化、加溫、加 epinephrine 或佐劑可改善阻斷品質與起效。","options":{"A":"interscalene 對手腕(尺側 C8–T1)涵蓋不足,不適合腕部手術。","B":"45 分鐘短手術宜用短-中效局麻藥,非長效 bupivacaine。","C":"lidocaine 臂神經叢阻斷起效約 10–20 分鐘,非 5 分鐘內。","D":"正解。加少量碳酸氫鈉鹼化可加速 lidocaine 起效。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"114020-04":{"quick":"D 為「最不會」影響:脊髓麻醉阻斷皮節高度受姿勢、身高、藥劑比重等影響,但「給藥速度」對最終平面影響很小(影響不大)。","detail":{"background":"脊髓麻醉阻斷平面的主要決定因素:藥劑比重(baricity)與病人姿勢的交互作用(高比重藥隨重力沉降,平面受體位影響最大)、劑量/濃度、注射部位、病人身高與脊柱長度、腹內壓(懷孕/肥胖/腹水使平面升高)。相對而言,「注射速度(injection speed)」與是否 barbotage 對最終阻斷平面影響「最小」(臨床上影響不顯著、結果不可靠),故本題問「最不會影響」者選 D(給藥速度)。注意此與 112020-07 互補:該題以「肥胖無影響(錯)」為答,本題以「給藥速度最不影響」為答。","options":{"A":"姿勢/擺位顯著影響(尤高比重藥)。","B":"身高(脊柱長度)影響藥物擴散範圍。","C":"藥劑比重是關鍵影響因素。","D":"正解。給藥速度對最終阻斷平面影響最小。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"115020-04":{"quick":"剖腹產脊椎(半身)麻醉後出現「姿勢性頭痛」(坐起加劇、平躺改善),典型為硬脊膜穿刺後頭痛(post-dural puncture headache, PDPH)。","detail":{"background":"硬脊膜穿刺後頭痛(PDPH)是神經軸麻醉(尤脊椎麻醉、或硬脊膜外不慎穿破硬膜)後的併發症,因 CSF 經穿刺孔滲漏致顱內壓下降、腦下垂牽扯痛覺結構與代償性腦血管擴張。特徵:術後 1–2 天出現「姿勢性(positional)」頭痛——坐/站立時加劇、平躺數分鐘內緩解,部位多在額/枕並可放射至頸肩,可伴頸僵、畏光、耳鳴、複視(展神經牽扯)。高危:年輕、女性、孕產婦、大口徑或切割型(Quincke)針(用細的、筆尖型 pencil-point 針可降低風險)。處置:臥床、補水、咖啡因、止痛;頑固或嚴重者行硬脊膜外血液貼片(epidural blood patch,療效佳)。本題答案 D。鑑別:腦膜炎(發燒、頸僵、非姿勢性)、顱內壓增高(臥位更痛、視乳突水腫)、張力性頭痛(非姿勢性)。","options":{"A":"腦膜炎為發燒、頸部僵硬、非姿勢性頭痛,且生命徵象多異常。","B":"顱內壓增高通常平躺更痛、有局灶或視乳突水腫,與本例相反。","C":"張力性頭痛非姿勢性,與坐起加劇不符。","D":"正解。姿勢性頭痛(坐起加劇、平躺改善)為硬脊膜穿刺後頭痛 PDPH。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"115020-08":{"quick":"Caudal block(薦椎/尾椎阻斷)是經薦裂(sacral hiatus)把局麻藥注入薦部「硬脊膜外腔(epidural space)」,屬硬脊膜外麻醉的一種。","detail":{"background":"Caudal block(尾椎/薦管阻斷)是經薦裂(sacral hiatus,由薦角定位、穿過薦尾韌帶)將局麻藥注入薦部硬脊膜外腔(caudal epidural space),藥物在硬脊膜外腔分布,阻斷薦神經與下位腰神經,常用於小兒下腹部、會陰、下肢手術的術後止痛(如疝氣、包皮),以及成人慢性疼痛注射。故答案 B(epidural space)。注意:它是「硬脊膜外」而非蛛網膜下腔(intrathecal),也非硬膜下(subdural);小兒因薦裂易定位、硬脊膜囊終止位置較高(須避免穿入蛛網膜下腔),是常見的區域止痛技術。","options":{"A":"硬膜下空間(subdural)不是 caudal block 的目標,且為潛在腔隙。","B":"正解。caudal block 把藥注入薦部硬脊膜外腔(epidural space)。","C":"intrathecal(蛛網膜下腔)是脊椎麻醉,不是 caudal。","D":"薦尾韌帶上方空間描述不正確;目標是硬脊膜外腔。"},"sources":["Miller's Anesthesia 9e, Local Anesthetics & Spinal/Epidural Anesthesia","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.16 Local Anesthetics & Ch.45 Spinal/Epidural","Stoelting's Pharmacology 5e, Local Anesthetics"]}},"101030-06":{"quick":"C 正確:喉鏡(Macintosh)由病人口腔「右側」進入、把舌頭撥向左方,以保留中線視野顯露聲門。A 不靠槓桿(避免壓牙)、B 須備抽吸、D 躁動/飽胃反而是 RSI 適應症。","detail":{"background":"氣管插管基本操作。(A)使用喉鏡時應「上提(lift)」沿手柄軸線向前上方提起、不可以上門牙為支點作「槓桿(撬)」動作,否則會壓斷/損傷牙齒——故 A 錯誤。(B)插管前務必準備抽吸(suction)以清除分泌物/嘔吐物,避免吸入——故 B 錯誤。(C)正確(本題答案):Macintosh 直柄/彎葉喉鏡由口腔「右側」置入、葉片把舌頭推向「左」並集中於中線,葉片尖端置於會厭谷(vallecula)上提以顯露聲門。(D)病人躁動、飽胃、吸入高風險者正是「快速順序插管(RSI)」的適應症(快速給誘導+肌鬆、環狀軟骨壓迫、不正壓通氣以降吸入),而非避免 RSI——故 D 錯誤。","options":{"A":"錯誤。喉鏡是上提非槓桿,以門牙為支點會傷牙。","B":"錯誤。插管前必須備妥抽吸設備。","C":"正解。喉鏡由口腔右側進入,將舌頭撥向左側,保留中線視野。","D":"錯誤。躁動/飽胃反而是 RSI 的適應症。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"102110-01":{"quick":"D 正確:RSI 前任何病人都須「預給氧(preoxygenation)」。A 須給誘導+肌鬆劑、B 不放鼻胃管(避免刺激/延誤)、C 須備齊人員藥物裝備——皆為 RSI 原則。","detail":{"background":"快速順序插管(rapid sequence intubation, RSI)用於飽胃/吸入高風險者,目標是把誘導到插管之間的時間與正壓通氣最小化以降低吸入。原則:(D)所有病人插管前皆須充分「預給氧(preoxygenation)」(3 分鐘潮氣呼吸或 8 次深呼吸,建立氧氣儲備、延長安全呼吸暫停時間)——正確(本題答案)。(A)RSI 須同時快速給予「誘導劑+快速起效肌鬆劑」(如 propofol/etomidate/ketamine + succinylcholine 或高劑量 rocuronium),不是「不給任何鎮靜麻醉」——A 錯誤。(B)RSI 不常規先放鼻胃管(刺激、延誤、且管路反使括約肌功能受損);若已有鼻胃管可先抽空胃內容——B 錯誤。(C)RSI 仍須在人員、藥物、抽吸與困難氣道裝備到齊、監測就緒後再執行,不可為省時而省略——C 錯誤。經典 RSI 還含環狀軟骨壓迫(Sellick,現有爭議)、避免/最小化面罩正壓通氣。","options":{"A":"錯誤。RSI 須快速給予誘導劑與肌鬆劑。","B":"錯誤。RSI 不常規先放鼻胃管。","C":"錯誤。仍須等人員、藥物、裝備到齊。","D":"正解。任何病人插管前都須預給氧。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"103030-01":{"quick":"維持咽喉軟組織氣道開放最有效的「單一」手法是「伸展頭部(head extension)」(配合抬下巴/推下頷的 head-tilt chin-lift);可拉開塌陷的咽部軟組織。","detail":{"background":"無意識/麻醉病人上呼吸道阻塞多因舌根與咽部軟組織塌陷。最有效維持氣道開放的基本手法是「頭後仰-抬下巴(head tilt–chin lift)」,其中「伸展頭部(head extension)」是維持咽喉軟組織氣道開放最重要的單一動作——它拉緊並前移舌根與咽壁附著結構,打開氣道(常合併推下頜 jaw thrust)。對照:單純張口(mouth opening)幫助有限;甲狀軟骨壓迫(非標準氣道手法)與環狀軟骨壓迫(Sellick,用於防胃內容反流、不是開氣道,反可能使氣道變形)都不是開放咽部氣道的手法。本題答案 C(head extension)。注意:懷疑頸椎損傷者改用「下頜推前(jaw thrust)不後仰頭」。","options":{"A":"張口本身對維持咽部氣道開放幫助有限。","B":"甲狀軟骨壓迫非標準開放氣道手法。","C":"正解。伸展頭部最能維持咽喉軟組織氣道開放。","D":"環狀軟骨壓迫是防胃內容反流,非開放氣道(反可能變形氣道)。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"104090-01":{"quick":"B 為錯誤:緊急「無法插管無法通氣」時,因環甲膜切開術(cricothyrotomy)快速、出血少、易定位,應「優先於」緊急氣管切開術,而非相反。","detail":{"background":"緊急經皮(侵入性)氣道。當 cannot intubate, cannot ventilate(CICV)且嚴重缺氧持續惡化(A 正確:此即啟動時機),應立即建立外科氣道。技術選擇上,「環甲膜切開術(cricothyrotomy)」比「氣管切開術(tracheotomy)」更快、定位容易(環甲膜淺、無重要血管甲狀腺覆蓋)、出血少,是緊急首選;氣管切開術較費時、出血多,屬非緊急/長期氣道之計畫性術式。故 B「氣管切開應優先於環甲膜切開」是錯誤(本題答案,應相反)。(C)解剖正確:氣切貫穿氣管前壁,環甲膜切開貫穿環甲膜(位甲狀軟骨與環狀軟骨之間)。(D)正確:啟動時機由缺氧程度與惡化速度決定,不能單用某一血氧數值界定。注意:環甲膜切開不建議用於 6 歲以下兒童(環甲膜太小,改用針式經氣管噴射通氣)。","options":{"A":"正確。CICV 且嚴重缺氧惡化時應立即行緊急經皮氣道。","B":"正解(錯誤)。緊急時環甲膜切開應優先於氣管切開(較快、出血少)。","C":"正確。氣切貫穿氣管前壁;環甲膜切開貫穿環甲膜。","D":"正確。啟動時機取決於缺氧程度與惡化速度,非單一血氧值。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"105020-76":{"quick":"確認氣管內管位置最可靠的是潮氣末二氧化碳(EtCO2,持續波形)、五點聽診、直接目視管通過聲帶;「照胸部 X 光」可看深度但「不是」AHA 用以即時確認是否在氣管內的方法(無法區分氣管 vs 食道高位)。","detail":{"background":"依 2010 AHA ECC 指引,確認氣管內管(ETT)位置的方法:臨床確認(目視管通過聲帶、雙側胸部+上腹「五點聽診」、看胸廓起伏、見管內霧氣)+客觀確認(以「持續性二氧化碳波形圖 capnography/EtCO2」為最可靠的金標準,確認在氣管且持續監測;或食道偵測器)。胸部 X 光「可評估插管『深度』(管尖位置、是否進右支氣管)」但「不能即時可靠地確認管在氣管而非食道」(高位食道插管 X 光可能難分辨,且耗時),故不是 AHA 用以「確認是否置於氣管內」的方法,為本題答案 B(除了)。臨床:插管後立即以 EtCO2 確認,X 光稍後確認深度。","options":{"A":"五點聽診是確認方法之一。","B":"正解。照胸部 X 光用以看深度,不是 AHA 即時確認在氣管內的方法。","C":"EtCO2 持續波形是確認氣管內管位置的最可靠方法。","D":"直接目視氣管內管通過聲帶是確認方法。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"105100-01":{"quick":"插管四大原則中,優先性最高的是「充分充氧(oxygenation)」——預給氧、插管嘗試之間以面罩通氣維持氧合;確保氧合永遠優先於完成插管。","detail":{"background":"困難氣道處置的核心原則是「維持氧合(oxygenation)優先於完成插管」——病人死於缺氧,不是死於插不上管。因此四大原則中「充分充氧」優先性最高:插管前充分預給氧(建立氧儲備、延長安全呼吸暫停)、每次插管嘗試之間回到面罩(或聲門上裝置)通氣供氧、限制嘗試次數與時間、SpO2 下降即停手回到通氣。其餘原則(預防外傷、備份計畫、儘速求救)都重要,但都服膺於「先保住氧合」。本題答案 B(oxygenation)。臨床:ASA/DAS 困難氣道流程的主軸即維持氧合並依序升級(面罩→聲門上→外科氣道),避免反覆插管致缺氧與創傷。","options":{"A":"預防外傷重要,但非最優先(氧合優先)。","B":"正解。充分充氧(預給氧+嘗試間面罩通氣)優先性最高。","C":"備份計畫重要,但服膺於維持氧合。","D":"儘速求救重要,但核心仍是先維持氧合。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"106020-76":{"quick":"RSI 的禁忌是「預期困難氣道」如嚴重臉部外傷——因 RSI 給肌鬆後若插管失敗又無法面罩通氣將陷入 CICV;此時應改清醒插管/外科氣道。躁動、癲癇、藥物過量(意識不清、需保護氣道)反而是 RSI 適應症。","detail":{"background":"RSI 的精神是「給予誘導+肌鬆使病人快速麻痺以利插管」,前提是有把握能插上或能面罩通氣救援。禁忌/須謹慎者:「預期困難氣道」——嚴重臉部/上呼吸道外傷、嚴重變形、預期面罩通氣與插管皆困難者(B、C、D 等),一旦給肌鬆使自主呼吸消失而又插不上、罩不住,將陷入致命的「無法插管無法通氣(CICV)」,故這類病人應採清醒插管(awake fiberoptic)或備外科氣道,而非貿然 RSI。本題嚴重臉部外傷(D)為 RSI 禁忌(答案)。對照:躁動、癲癇發作、藥物過量(意識改變、誤吸高風險、需保護氣道)是 RSI 的常見「適應症」。","options":{"A":"躁動是 RSI 適應症(需快速控制氣道)。","B":"癲癇發作需保護氣道,是 RSI 適應症。","C":"藥物過量意識不清,是 RSI 適應症。","D":"正解。嚴重臉部外傷屬預期困難氣道,是 RSI 禁忌(恐陷 CICV)。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"106080-02":{"quick":"本題多重答案(A、B、C 給分)。氣管內管 cuff 壓力建議維持在約 20–30 cmH2O(<毛細血管灌流壓),以防漏氣/吸入又不致黏膜缺血;故 18、28、38 之中 20–30 範圍內者給分,48 過高(致缺血)為非。","detail":{"background":"氣管內管的 cuff(氣囊)壓力管理:壓力須足以密封氣道(防漏氣、防胃內容/分泌物吸入),又不能超過氣管黏膜微血管灌流壓(約 30–35 cmH2O),否則壓迫黏膜致缺血、潰瘍、狹窄甚至氣管軟化。建議維持約 20–30 cmH2O,並以 cuff 壓力計監測(尤長時間手術、用 N2O 時 cuff 內壓會上升)。本題選項 18、28、38、48 cmH2O 中,落在 20–30 區間最理想為 28;但 18(接近下限、仍可接受)與 38(略高)也被考選部認列給分(A、B、C),48 過高致缺血為唯一明確不當。臨床:常規以 cuff 壓力計校至 20–30 cmH2O。","options":{"A":"給分。18 cmH2O 接近下限、尚可接受。","B":"給分。28 cmH2O 落在 20–30 理想區間,最佳。","C":"給分。38 cmH2O 略高,被認列給分。","D":"48 cmH2O 過高,超過黏膜灌流壓致缺血,為不當。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"107020-01":{"quick":"核心呼吸道評估的三大理學項目:張口程度、下顎前挺、頭頸伸展;「頭圍大小」不在其中,為正解(不包括)。","detail":{"background":"術前「核心氣道評估(core airway assessment)」用以預測困難氣道,三個關鍵理學項目:張口程度(mouth opening,反映喉鏡能否置入、≥3 指佳)、下顎前挺能力(jaw protrusion/下顎下牙能否前突過上牙,反映下顎活動度,差者困難)、頭頸伸展(head/neck extension,反映能否擺至嗅花位 sniffing position 對齊軸線)。其他輔助:Mallampati 分級、甲頦距(thyromental distance)、頸圍、牙齒/暴牙、頸椎活動度。「頭圍大小(head circumference)」不是評估項目(本題答案 B)。整合:臨床常以 LEMON、3-3-2 法則綜合評估困難氣道。","options":{"A":"張口程度是核心評估項目。","B":"正解。頭圍大小不是核心氣道評估項目。","C":"下顎前挺程度是核心評估項目。","D":"頭部伸展程度是核心評估項目。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"109020-01":{"quick":"風濕性「心臟」病影響的是心臟瓣膜,不影響氣道/通氣,故最不可能是預期困難通氣者。唐氏症(巨舌、小下頷)、類風濕性關節炎(寰樞椎不穩、顳顎/環杓關節僵)、阻塞性睡眠呼吸中止症皆預示困難氣道。","detail":{"background":"困難通氣/插管的常見預測族群:唐氏綜合症(巨舌、小口、小下頷、寰樞椎不穩、聲門下狹窄)、類風濕性關節炎(寰樞椎半脫位致頸椎不穩與插管擺位風險、顳顎關節與環杓關節受累致張口/聲門受限)、阻塞性睡眠呼吸中止症(肥胖、咽部軟組織多、面罩通氣與插管皆易困難)、肢端肥大症、頭頸放療/腫瘤、燒傷瘢痕、孕婦等。風濕性「心臟」病(rheumatic heart disease)是鏈球菌後遺的心臟瓣膜病變(二尖瓣狹窄等),影響循環而「不影響氣道解剖/通氣」,故為「最不可能」是預期困難通氣者(本題答案 A)。","options":{"A":"正解。風濕性心臟病影響瓣膜,不影響氣道,最不可能困難通氣。","B":"唐氏症有巨舌、小下頷、寰樞椎不穩,困難氣道風險高。","C":"類風濕性關節炎有寰樞椎不穩、環杓/顳顎關節受累,困難氣道。","D":"阻塞性睡眠呼吸中止症面罩通氣與插管皆易困難。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"109080-01":{"quick":"全身麻醉甦醒拔管期常見併發症:上呼吸道阻塞、吸入性肺炎、喉/支氣管痙攣、喉痙攣致「負壓性(陰壓性)肺水腫」;但「正壓性肺水腫」不是此期典型併發症,為正解(不是)。","detail":{"background":"全身麻醉甦醒/拔管期的氣道與呼吸併發症:上呼吸道阻塞(殘餘麻醉/肌鬆、舌根後墜、喉頭水腫)、喉痙攣(laryngospasm)、支氣管痙攣、吸入性肺炎(保護反射未恢復誤吸)、低換氣/呼吸抑制(殘餘 opioid/肌鬆)、以及「負壓性(陰壓性)肺水腫(negative-pressure pulmonary edema)」——拔管後喉痙攣/上呼吸道阻塞時用力吸氣產生極大胸腔內負壓,使液體滲入肺泡。題目問「不是」併發症者:「正壓性肺水腫」並非拔管期的典型機轉(肺水腫此期多為負壓性),故答案 A。臨床:拔管應在保護反射恢復、肌鬆完全反轉、TOFR≥0.9、清醒或深麻醉下適時為之,並備好再插管。","options":{"A":"正解。拔管期肺水腫多為「負壓性」,正壓性肺水腫非此期典型併發症。","B":"上呼吸道阻塞是拔管期常見併發症。","C":"吸入性肺炎(保護反射未復)是常見併發症。","D":"支氣管痙攣是拔管期常見併發症。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"110020-01":{"quick":"Modified Mallampati 分級:能看到軟顎、懸壅垂、咽門柱=Class I;只見軟顎與懸壅垂=II;只見軟顎(及懸壅垂基部)=III;「只見硬顎、看不到軟顎」=Class IV。","detail":{"background":"Modified Mallampati 分級(坐姿、最大張口、伸舌不發聲)依可見咽部結構評估插管難易:Class I=可見軟顎(soft palate)、咽門(fauces)、懸壅垂(uvula)、咽門柱(pillars);Class II=可見軟顎、咽門、懸壅垂(柱被遮);Class III=僅見軟顎與懸壅垂基部;Class IV=僅見硬顎(hard palate),連軟顎都看不到。分級愈高(III、IV)預測插管/喉部顯露愈困難。本題「只見硬顎、不見軟顎」=Class IV(答案 A)。臨床:Mallampati 須與張口、甲頦距、頸活動度等合併判斷(單一指標預測力有限)。","options":{"A":"正解。只見硬顎、看不到軟顎為 Class IV。","B":"Class II 可見軟顎與懸壅垂。","C":"Class I 可見軟顎、懸壅垂、咽門柱。","D":"Class III 可見軟顎與懸壅垂基部。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"110080-01":{"quick":"Venturi mask(凡德里面罩)是「固定濃度給氧」的開放式氧氣面罩,不能提供密封正壓通氣;喉罩、氣管內管、麻醉面罩(密封)皆可施行正壓通氣。","detail":{"background":"正壓通氣(positive pressure ventilation)需要能在氣道與裝置間形成密封以傳遞壓力的介面。Venturi mask(凡德里面罩)是利用空氣捲入比例提供「精準固定氧濃度(FiO2 24–60%)」的開放式給氧面罩,病人自主呼吸、面罩有大量側孔不密封,無法施行正壓通氣(本題答案 A)。可作正壓通氣者:喉頭罩(LMA,聲門上密封)、氣管內管(氣囊密封氣管)、麻醉面罩(緊扣口鼻可手控/機械正壓通氣)。臨床:Venturi mask 用於需精準控制 FiO2 的病人(如 COPD 避免 CO2 滯留),非通氣工具。","options":{"A":"正解。Venturi mask 是開放式固定濃度給氧面罩,不能作正壓通氣。","B":"喉頭罩(LMA)可施行正壓通氣。","C":"氣管內管可施行正壓通氣。","D":"密封的麻醉面罩可施行正壓通氣。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"110080-20":{"quick":"需「長期」氣道繞道照護(長期呼吸器/氣道保護)者,最恰當的是「氣管切開術(tracheostomy)」;氣管內插管適合短期、環甲膜切開為緊急、噴射通氣為暫時。","detail":{"background":"人工氣道選擇依時程:短期(數小時–約 1–2 週)用經口/經鼻氣管內插管;但長時間留置氣管內管有喉/聲門/氣管黏膜損傷、潰瘍、狹窄、不適、口腔護理難、呼吸器脫離不便等問題。需「長期」氣道繞道(長期機械通氣、長期氣道保護、上呼吸道阻塞)者,最恰當為「氣管切開術(tracheostomy)」——減少喉部傷害、降低死腔與呼吸功、利於口腔護理與脫離呼吸器、舒適度高、可放較大管徑。環甲膜切開術是「緊急」暫時氣道,不作長期;高壓噴射通氣為特殊短暫情境。本題答案 B(氣管切開術)。一般在插管約 1–2 週仍無法脫離時考慮氣切。","options":{"A":"氣管內插管適合短期,長期留置易致喉/氣管損傷。","B":"正解。長期氣道照護以氣管切開術最恰當。","C":"環甲膜切開術是緊急暫時氣道,不作長期。","D":"高壓噴射通氣為特殊暫時通氣,非長期照護。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"111020-76":{"quick":"Mallampati Class III(僅見軟顎)預示插管困難。其餘為「容易」指標:甲頦/舌骨距大、張口>3 指、無活動假牙(假牙取下反而利於通氣)。","detail":{"background":"困難插管的預測。本題以「3-3-2 法則」與 Mallampati 為基礎:(A)Mallampati Class III(僅見軟顎、咽部結構顯露差)預示喉部顯露/插管困難——故 A 為「會導致困難」者(本題答案)。(B)「下巴(頦)離舌骨>3 指幅」屬正常/有利(甲頦距與頦舌骨距足夠代表下頷空間大、易顯露),非困難;若<3 指才困難。(C)「張口>3 指幅」正常、有利插管(<3 指才困難)。(D)配戴活動式假牙——插管前會取下,本身不致插管困難(反而取下後面罩通氣可能略漏氣,但非插管困難主因)。故會「導致困難」的是 A(Mallampati III)。整合:3-3-2=張口 3 指、頦舌骨距 3 指、舌骨甲狀軟骨距 2 指,任一不足提示困難。","options":{"A":"正解。Mallampati Class III 預示插管困難。","B":"頦-舌骨距>3 指屬正常有利,非困難。","C":"張口>3 指屬正常有利,非困難。","D":"活動假牙插管前取下,非插管困難主因。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"111080-06":{"quick":"面罩通氣困難時,「用力往下壓緊面罩」改善效果最差(反把下頜往後推、加重舌根塌陷);應改善的是放置口/鼻咽呼吸道、頭後仰抬下巴/推下頜、雙手扣罩等。","detail":{"background":"面罩通氣困難的處置:確保正確擺位(嗅花位 sniffing position)、頭後仰-抬下巴(head tilt–chin lift)或推下頜(jaw thrust)、放置口咽(oral airway)或鼻咽(nasal airway)呼吸道以撐開塌陷的咽部、雙人雙手扣罩(two-hand technique)、調整面罩大小與密合、考慮聲門上裝置。其中「用力往下壓緊面罩(force the mask down)」改善效果最差(本題答案 A):單純向下壓會把下頜往後推、反而加重舌根與軟組織塌陷阻塞,且不能解決氣道未開放的根本問題;正確是「向上提下頜把臉扣進面罩(lift the jaw into the mask)」而非把面罩壓向臉。","options":{"A":"正解。用力往下壓面罩會把下頜後推、加重塌陷,效果最差。","B":"放置口咽呼吸道可撐開塌陷咽部,有效。","C":"放置鼻咽呼吸道有效改善。","D":"壓額抬下巴(head tilt–chin lift)開放氣道,有效。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"111080-77":{"quick":"頭部外傷、顱內壓高、血壓 220/116 的病人 RSI,ketamine 須特別小心——傳統認為其升高腦血流與顱內壓(且升血壓,此例已嚴重高血壓)。","detail":{"background":"此例為頭部外傷、瞳孔不等大(疑腦疝)、嚴重高血壓的 RSI 用藥選擇。Ketamine 傳統上在「顱內高壓/頭部外傷」須特別小心(本題答案 B):它增加腦血流、被認為升高顱內壓(雖近代在控制通氣下證據有爭議),且其交感興奮會升高血壓(此例血壓已 220/116,再升高不利、增加再出血/腦灌注壓波動風險)。相對地:(A)lidocaine 於插管前給可鈍化插管時的顱內壓上升反應(輔助);(C)etomidate 血流動力穩定、降腦代謝,適合顱內高壓誘導;(D)propofol 降腦代謝、腦血流與顱內壓,適合(但須注意低血壓致腦灌注下降)。故須特別小心者為 ketamine。臨床:神經外傷誘導常用 etomidate/propofol + opioid,並控制血壓與通氣。","options":{"A":"lidocaine 可鈍化插管引起的顱內壓上升,屬輔助,非須特別小心。","B":"正解。ketamine 升高腦血流/顱內壓且升血壓,顱內高壓+高血壓者須特別小心。","C":"etomidate 血流動力穩定、降腦代謝,適合此情境。","D":"propofol 降腦代謝/顱內壓,適合(注意勿過度低血壓)。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"112020-01":{"quick":"A 為錯誤:外科環甲膜切開術「不」適用於 6 歲以下兒童(環甲膜太小、易傷環狀軟骨致狹窄),小兒緊急氣道改用針式經氣管噴射通氣。定位、併發症、非永久氣道之敘述皆正確。","detail":{"background":"環甲膜切開術(cricothyrotomy)是 CICV 緊急外科氣道。(A)錯誤(本題答案):「不」適用於 6 歲以下兒童——幼兒環甲膜極小、環狀軟骨是唯一完整軟骨環,切開易致損傷與聲門下狹窄,故小兒緊急氣道改用「針式經氣管導管+噴射通氣(needle cricothyrotomy/jet ventilation)」作為暫時手段。(B)正確:平躺、伸展頸部,觸摸甲狀軟骨下緣,於甲狀軟骨與環狀軟骨之間的環甲膜定位切開。(C)正確:併發症含出血、感染、假道、氣管/食道損傷、聲音改變、日後狹窄。(D)正確:環甲膜切開是「暫時」救命氣道,不作為永久通氣道,病情穩定後應轉為正式氣管切開或拔除。","options":{"A":"正解(錯誤)。環甲膜切開不適用於 6 歲以下兒童,改用針式經氣管噴射通氣。","B":"正確。於甲狀軟骨與環狀軟骨之間的環甲膜定位。","C":"正確。併發症包括出血與感染。","D":"正確。屬暫時氣道,不作為永久通氣道。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"112080-01":{"quick":"面罩通氣困難最可能的預測因子是「有大量鬍鬚的男性」(鬍鬚使面罩漏氣難密封)。其餘:青少年、BMI<20、Mallampati II 皆非困難通氣的危險因子。","detail":{"background":"困難面罩通氣(difficult mask ventilation)的危險因子(經典 OBESE/MOANS 助記):O–Obese(BMI>26)、B–Bearded(大鬍鬚,難密封漏氣)、E–Elderly(>55 歲)、S–Snorers/OSA、E–Edentulous(無牙,臉頰塌陷漏氣);MOANS=Mask seal(鬍鬚/變形)、Obese/Obstruction、Age>55、No teeth、Stiff/Snore。本題「有大量鬍鬚的男性」因面罩無法密封而最易通氣困難(答案 A)。對照:青少年、BMI<20(偏瘦)、Mallampati II(屬偏容易)皆非困難通氣的危險因子(Mallampati 主要預測困難「插管」而非通氣,且 II 級偏低)。臨床:有鬍鬚者可塗凡士林、覆膜或刮除以改善密封。","options":{"A":"正解。大量鬍鬚使面罩漏氣難密封,最易困難面罩通氣。","B":"青少年非困難通氣危險因子。","C":"BMI<20(偏瘦)非困難通氣危險因子(肥胖才是)。","D":"Mallampati II 偏容易,且 Mallampati 主要預測困難插管而非通氣。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"112080-24":{"quick":"氣管切開術的優點是「減少」呼吸道無效腔(死腔)、減少 ICU/住院時程、降低喉/聲門/氣管傷害、可放較大管徑;「增加無效腔」不是優點,為正解(不是)。","detail":{"background":"氣管切開術(相對長期氣管內插管)的優點:(1)「減少」解剖死腔(bypass 上呼吸道),降低呼吸功、利於脫離呼吸器;(2)降低對聲帶、聲門下與氣管黏膜的長期壓迫傷害;(3)病人較舒適、可進食/說話(發聲閥)、口腔護理容易、鎮靜需求低,縮短 ICU 與住院時程;(4)管路較短較粗、抽痰容易、阻力低。題目問「不是」優點者:「增加呼吸道無效腔」——氣切其實是「減少」死腔,故 A(增加無效腔)為錯誤敘述(本題答案)。","options":{"A":"正解。氣管切開「減少」死腔,增加無效腔不是其優點。","B":"正確。可減少 ICU 與住院時程。","C":"正確。降低對聲帶、聲門下及氣管的傷害。","D":"正確。可放置較大管徑、利於抽痰與通氣。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"113020-01":{"quick":"B 正確:軟式光纖支氣管鏡可在不移動頸椎下插管,適合「不穩定頸椎骨折」病人。其可經口或經鼻、可用於清醒(清醒纖維插管)或已麻醉病人,故 A、C、D 皆錯。","detail":{"background":"軟式光纖(纖維)支氣管鏡輔助插管是困難氣道的重要技術。(A)錯誤:可經鼻「也可」經口插管(經口需用氣道引導器)。(B)正確(本題答案):因可在頭頸維持中立、不需後仰擺位下直接導入氣管,特別適合「不穩定頸椎骨折/頸椎不穩」、張口受限、上呼吸道腫瘤變形等困難氣道。(C)錯誤:「清醒纖維插管(awake fiberoptic intubation)」正是其經典適應症——在局部麻醉(表面麻醉/神經阻斷)下保留自主呼吸完成插管,用於預期困難氣道。(D)錯誤:亦可用於已麻醉病人。臨床:清醒纖維插管是預期困難氣道(尤無法面罩通氣風險者)的安全選擇。","options":{"A":"錯誤。可經鼻也可經口插管。","B":"正解。可在不移動頸椎下插管,適合不穩定頸椎骨折。","C":"錯誤。清醒纖維插管正是其經典適應症。","D":"錯誤。已麻醉病人也可使用。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"113070-01":{"quick":"A 為錯誤:就發生「機率」而言,吸入性肺炎(誤吸)在「麻醉誘導期」風險最高(飽胃、保護反射喪失之際),而非拔管後恢復期較高;故「拔管後與恢復期高於誘導期」不正確。","detail":{"background":"高風險氣道情境。(A)錯誤(本題答案):吸入(aspiration)風險「最高」在麻醉誘導與插管之際(意識/保護反射剛喪失而氣道尚未以氣囊保護、飽胃),其次是拔管後恢復期(反射未完全恢復);題目說「拔管後恢復期機率高於誘導期」與一般認知相反(誘導期通常最高)。(B)正確:預期困難插管者可在表面麻醉下行清醒插管,保留自主呼吸與保護反射,最安全。(C)正確:即使做過術前氣道評估,仍可能遇非預期困難插管,故須事先備妥困難氣道流程(algorithm)與裝備。(D)正確:CICV 指「無法以非侵入方法通氣、又無法插管」的致命緊急,須立即外科氣道。","options":{"A":"正解(錯誤)。吸入性肺炎風險在麻醉誘導期最高,非拔管恢復期高於誘導期。","B":"正確。預期困難插管可在表面麻醉下行清醒插管。","C":"正確。須事先備妥困難插管應變流程。","D":"正確。CICV 指無法通氣且無法插管的緊急狀況。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"114020-01":{"quick":"清醒插管的局部神經阻斷常用:舌咽神經阻斷(咽部)、喉上神經阻斷(聲門上喉部)、經喉/環甲膜注射(translaryngeal,聲門下與氣管表面麻醉);「喉返神經阻斷」不做(會致雙側聲帶麻痺、氣道阻塞),為正解(不包括)。","detail":{"background":"清醒纖維插管須對氣道分區表面麻醉/神經阻斷以抑制反射、減少不適:(A)舌咽神經(glossopharyngeal)阻斷——抑制口咽/舌後 1/3 的咽反射;(B)喉上神經(superior laryngeal nerve)阻斷——麻醉會厭至聲帶上方喉黏膜(感覺由喉上神經內支供應);(C)經喉/環甲膜穿刺注射局麻藥(translaryngeal block)——麻醉聲門下與上段氣管黏膜(咳出後分布);加上鼻/口咽表面麻醉。題目問「不包括」者:「喉返神經(recurrent laryngeal nerve)阻斷」絕不施行(本題答案 D)——喉返神經支配除環甲肌外的所有喉內肌(聲帶外展/內收),雙側阻斷會致雙側聲帶麻痺、聲門關閉或失去氣道控制,危險。故清醒插管不阻斷喉返神經。","options":{"A":"舌咽神經阻斷麻醉咽部,是清醒插管常用阻斷。","B":"喉上神經阻斷麻醉聲門上喉黏膜,是常用阻斷。","C":"經喉(translaryngeal)阻斷麻醉聲門下/氣管表面,是常用方法。","D":"正解。喉返神經阻斷不施行(會致雙側聲帶麻痺、氣道阻塞)。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"114070-01":{"quick":"RSI 的精神是「快速」建立氣道並避免正壓通氣;「使用光纖內視鏡輔助插管」最不適合(費時、分泌物/出血視野差、不符快速),其餘預給氧、快速起效肌鬆劑(去極化或高劑量非去極化)皆為 RSI 要素。","detail":{"background":"RSI 強調快速:預給氧→快速給誘導劑+快速起效肌鬆劑→(環狀軟骨壓迫)→不做或最小化面罩正壓通氣→直接喉鏡/影像喉鏡快速插管。(B)預先給氧(preoxygenation)建立氧儲備——必要。(C/D)使用「快速作用」的肌鬆劑:去極化的 succinylcholine(起效 30–60 秒,經典 RSI 用藥)或高劑量 rocuronium(1.2 mg/kg,快速起效的非去極化選項,可用 sugammadex 反轉)——皆適合 RSI。(A)「使用光纖內視鏡輔助插管」最不適合 RSI(本題答案):纖維鏡插管費時、需技術、遇分泌物/出血視野差、且通常用於「清醒」保留自主呼吸的困難氣道,與 RSI「快速、病人已麻痺呼吸暫停、爭分奪秒」的情境不符。RSI 首選直接或影像喉鏡。","options":{"A":"正解(最不適合)。光纖內視鏡插管費時、視野易受分泌物影響,不符 RSI 的快速要求。","B":"預先給氧是 RSI 必要步驟。","C":"快速起效非去極化肌鬆劑(高劑量 rocuronium)適合 RSI。","D":"快速起效去極化肌鬆劑(succinylcholine)是經典 RSI 用藥。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"115020-01":{"quick":"Modified Mallampati:可見軟顎+懸壅垂基部、但看不見咽門柱(pillars)/咽門(fauces)→ 屬 Class III。","detail":{"background":"Modified Mallampati 分級回顧:I=軟顎、咽門柱(pillars)、懸壅垂全可見;II=軟顎、咽門、懸壅垂可見(柱被遮);III=僅見軟顎與懸壅垂「基部(base of uvula)」,看不到咽門柱與咽門;IV=僅見硬顎。本題敘述「可見 soft palate、base of the uvula,看不到 tonsillar pillars、fauces」正符合 Class III(本題答案 D)。分級愈高(III、IV)插管/喉部顯露愈困難,須合併張口、甲頦距、頸活動度與 3-3-2 法則綜合評估。","options":{"A":"Class I 可見軟顎、懸壅垂、咽門柱。","B":"Class II 可見軟顎、咽門、懸壅垂。","C":"Class IV 僅見硬顎。","D":"正解。僅見軟顎與懸壅垂基部、看不到咽門柱=Class III。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"115020-75":{"quick":"B 為錯誤:LEMON 的「3-3-2」是張口≥3 指、頦至舌骨(下頷)≥3 指、舌骨至甲狀軟骨切跡≥2 指;題目把第二個 3 寫成「牙齒到下巴下緣」、單位描述也錯,故不適當。","detail":{"background":"LEMON 困難插管評估法:L–Look externally(外觀:短下巴、暴牙、肥胖、短頸、臉部畸形/外傷);E–Evaluate 3-3-2 rule(以手指評估:張口能容「3 指」、頦下緣到舌骨「3 指」、舌骨到甲狀軟骨切跡「2 指」,代表下頷空間與喉部位置適當,不足者困難);M–Mallampati(張口伸舌看咽部結構,III/IV 困難);O–Obstruction/Obesity(氣道阻塞、會厭炎、腫瘤、肥胖);N–Neck mobility(頸活動度,僵硬/固定者困難)。本題 B 把 3-3-2 第二項描述為「牙齒到下巴下緣 3 指幅」並不正確(正確是「頦下緣到舌骨 3 指」,評估下頷下空間;第三項才是舌骨到甲狀軟骨 2 指),故 B 最不適當(本題答案)。A、C、D 描述均正確。","options":{"A":"正確。Look externally 評估短下巴、短脖子、肥胖等外觀。","B":"正解(最不適當)。3-3-2 第二個 3 應為「頦下緣到舌骨」3 指,非「牙齒到下巴下緣」。","C":"正確。Mallampati 評估懸壅垂與舌根位置。","D":"正確。Neck mobility 評估頸部活動度。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"115020-76":{"quick":"吸入性燒傷(臉燒、炭渣、鼻毛燒焦、聲沙、喘鳴)有氣道水腫進展致阻塞之虞,應「早期插管保護氣道」、給 100% 濕氧、驗 COHb;「給大量輸液」最不適當——此例皮膚無明顯燒傷,過量輸液反加重氣道/肺水腫。","detail":{"background":"密閉空間火場吸入性傷害:臉部燒傷、口鼻炭渣、鼻毛燒焦、聲音沙啞、喘鳴(stridor/wheezing)是上呼吸道熱傷與即將氣道阻塞的警訊。處置:(A)及早「預防性氣管內插管」保護氣道——因黏膜水腫會在數小時內快速進展致無法插管,故有上述徵象應早插管(正確必要)。(B)給 100% 濕氧——治療一氧化碳中毒(縮短 COHb 半衰期)並供氧(正確)。(D)檢驗血中一氧化碳(COHb)濃度——脈搏血氧無法分辨 COHb,須抽血/co-oximetry(正確)。(C)「給大量輸液」最不適當(本題答案):此病人「其他皮膚無明顯燒傷」,並無大面積皮膚燒傷的體液流失需大量輸液(Parkland 公式用於大面積皮膚燒傷);此處過度輸液反會加重氣道與肺水腫、惡化氧合。輸液應依實際燒傷面積與血流動力給予,而非一律大量。","options":{"A":"恰當。有氣道水腫進展風險,應早期插管保護氣道。","B":"恰當。給 100% 濕氧治療一氧化碳中毒並供氧。","C":"正解(最不適當)。皮膚無明顯燒傷,給大量輸液反加重氣道/肺水腫。","D":"恰當。應檢驗血中一氧化碳濃度(脈搏血氧無法分辨 COHb)。"},"sources":["Miller's Anesthesia 9e, Airway Management","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.19 Airway Management","ASA Difficult Airway Algorithm 2022"]}},"101030-04":{"quick":"D 為錯誤:體感覺誘發電位(SSEP)「會」受吸入性麻醉劑與低體溫顯著影響(振幅下降、潛時延長),故監測時需維持穩定淺的麻醉與正常體溫。EP 含 AEP/SSEP/MEP、SSEP 用於脊椎手術、AEP 用於 CPA 腫瘤皆正確。","detail":{"background":"術中誘發電位(evoked potentials, EP)監測神經傳導完整性:(A)常用 EP 含聽覺(AEP)、體感覺(SSEP)、運動(MEP)、視覺等——正確。(B)SSEP 刺激周邊感覺神經、記錄沿脊髓背柱上行至皮質的訊號,用於脊椎側彎矯正、脊髓手術監測後柱感覺傳導——正確。(C)AEP(尤腦幹聽覺誘發電位 BAEP)用於小腦橋腦角(CPA)腫瘤(如聽神經瘤)手術,監測聽神經/腦幹功能——正確。(D)錯誤(本題答案):SSEP「對吸入性麻醉劑與低體溫敏感」——揮發劑與 N2O 劑量依賴地降低 SSEP 振幅、延長潛時,低體溫、低血壓、缺氧也影響;故術中須維持穩定且較淺的麻醉(常用全靜脈 TIVA + 少量揮發劑)、正常體溫與灌流,以保訊號可判讀。MEP 對麻醉更敏感(尤忌肌鬆劑與揮發劑)。","options":{"A":"正確。常用 EP 含聽覺、體感覺、運動等。","B":"正確。SSEP 用於脊椎手術監測上行感覺傳導。","C":"正確。AEP/BAEP 用於小腦橋腦角腫瘤手術。","D":"正解(錯誤)。SSEP 會受吸入麻醉劑與低體溫影響(振幅降、潛時延長)。"},"sources":["Miller's Anesthesia 9e, Anesthetic Monitoring","Morgan & Mikhail's Clinical Anesthesiology 6e, Ch.5-6 Patient Monitors","ASA Standards for Basic Anesthetic Monitoring"]}},"102030-21":{"quick":"A 為錯誤:中央靜脈置放成功率,經「內頸靜脈」高於「外頸靜脈」(外頸靜脈匯入鎖骨下處角度大、易卡),故說外頸成功率「遠比
