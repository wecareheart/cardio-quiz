肉蛋乳酪。","D":"進餐或飯前服氫氧化鋁結合腸道磷,適當。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"115030-N3-42":{"quick":"副甲狀腺功能低下(低血鈣)可能急性抽搐致咬傷舌頭與呼吸道阻塞;Chvostek由低血鈣引起,鹼中毒會加重抽搐。","detail":{"background":"副甲狀腺功能低下(PTH不足→低血鈣、高血磷)重點:①低血鈣使神經肌肉興奮性增加,可能發生「急性手足搐搦/全身抽搐」,嚴重時咬傷舌頭、喉痙攣致「呼吸道阻塞」(本題正解C),故須備氣切包與靜脈鈣劑;②Chvostek徵象是「低血鈣」引起(非高血鈣),A錯;③本症為「高血磷、低血磷之手指顫抖」描述錯誤(B應為高血磷、抽搐源於低血鈣);④「鹼中毒」會使游離鈣下降「加重」抽搐、酸中毒反而緩解,故D「酸中毒導致手足抽搐惡化」錯誤。本題正確者為 C。","options":{"A":"Chvostek 徵象由低血鈣引起,非高血鈣。","B":"副甲低為高血磷,手足抽搐源於低血鈣,非低血磷致手指顫抖。","C":"正解。低血鈣可致急性抽搐、咬傷舌頭與呼吸道阻塞。","D":"鹼中毒會降游離鈣加重抽搐,酸中毒反而緩解,故此項錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"101030-N3-1":{"quick":"庫欣氏症候群(皮質醇過多)會「高血壓」(非低血壓);並有中央性肥胖、圓月臉、水牛肩。","detail":{"background":"庫欣氏症候群(Cushing's syndrome)為糖皮質醇(cortisol)過多:皮質醇兼具醣皮質與礦物皮質作用,造成水鈉滯留與血管對兒茶酚胺敏感性增加→「高血壓」(非低血壓);脂肪重新分布→中央(軀幹)性肥胖、圓月臉、水牛肩;蛋白質分解→肌肉無力、皮膚變薄、紫色條紋、瘀斑、骨質疏鬆;醣質新生增加→高血糖;礦物皮質作用→低血鉀、高血鈉;免疫抑制與傷口癒合差。本題找「錯誤」者:A「低血壓」錯誤——Cushing應為高血壓。","options":{"A":"正解(錯誤敘述)。庫欣氏症候群為高血壓,非低血壓。","B":"中央性肥胖是Cushing典型表現,正確。","C":"圓月臉是Cushing典型表現,正確。","D":"水牛肩是Cushing典型表現,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"101110-N3-3":{"quick":"庫欣氏症候群是「糖皮質酮(cortisol)」分泌過多所致。","detail":{"background":"庫欣氏症候群(Cushing's syndrome)的核心是「糖皮質類固醇(cortisol/糖皮質酮)」過量,來源可為腦下垂體ACTH瘤(庫欣氏病)、腎上腺腫瘤、異位ACTH分泌或長期外源性類固醇治療。過量皮質醇造成中央性肥胖、圓月臉、水牛肩、高血壓、高血糖、低血鉀、皮膚紫紋、骨質疏鬆與免疫抑制。本題問「何荷爾蒙過多」,答案為糖皮質酮(A)。抗利尿激素過多致SIADH、正腎上腺素過多見於嗜鉻細胞瘤、副甲狀腺素過多致高血鈣,皆非Cushing。","options":{"A":"正解。庫欣氏症候群由糖皮質酮(cortisol)分泌過多造成。","B":"抗利尿激素過多造成SIADH,非Cushing。","C":"正腎上腺素過多見於嗜鉻細胞瘤。","D":"副甲狀腺素過多造成高血鈣,非Cushing。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"101110-N3-8":{"quick":"嗜鉻細胞瘤分泌過量兒茶酚胺,可測「尿中香草杏仁酸(VMA)」協助診斷。","detail":{"background":"嗜鉻細胞瘤(pheochromocytoma)源自腎上腺「髓質」嗜鉻細胞,分泌過量兒茶酚胺(腎上腺素/正腎上腺素),造成陣發性高血壓與「5P」症狀。診斷主要測尿中兒茶酚胺代謝產物——「香草杏仁酸(VMA)」與尿/血中metanephrines(本題正解B)。ACTH是腦下垂體激素、cortisol反映腎上腺皮質、尿酮體反映糖尿病/飢餓,皆非嗜鉻細胞瘤的診斷指標。檢查前須避免咖啡、香蕉、香草等影響VMA的食物與藥物。","options":{"A":"ACTH是腦下垂體前葉激素,非嗜鉻細胞瘤診斷指標。","B":"正解。可測尿中香草杏仁酸(VMA)協助診斷嗜鉻細胞瘤。","C":"皮質醇反映腎上腺皮質功能,非嗜鉻細胞瘤。","D":"酮體反映糖尿病/飢餓代謝,與嗜鉻細胞瘤無關。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"102030-N3-77":{"quick":"長期使用類固醇者易腸胃道出血,應「觀察大便性質和顏色」;並限鈉、補鉀、不可自行停藥。","detail":{"background":"長期使用類固醇(糖皮質醇)的護理指導:①類固醇刺激胃酸、抑制胃黏膜保護→易消化性潰瘍與「腸胃道出血」,故須「觀察大便性質與顏色(有無黑便/血便)」、飯後或合併制酸劑服用(本題正解C);②類固醇有礦物皮質作用→留鈉排鉀,故應「限制鈉」(非多攝取高鈉)、「補充鉀」(非避免高鉀水果);③不可自行減量或停藥(會引發腎上腺危象),須遵醫囑漸減、壓力時增量。本題正確者為 C。","options":{"A":"類固醇留鈉,應限制鈉與水分,非多攝取高鈉。","B":"不可自行減藥/停藥,以免引發腎上腺危象。","C":"正解。類固醇易致腸胃道出血,須觀察大便性質與顏色。","D":"類固醇排鉀易低血鉀,應補鉀(高鉀水果),非避免。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"102110-N3-45":{"quick":"腎上腺危機(Addison危象)因皮質醇與醛固酮驟缺→嚴重「低血壓」、休克。","detail":{"background":"腎上腺危機/愛迪生氏危象(Addisonian crisis)是急性腎上腺皮質功能不全,皮質醇與醛固酮嚴重不足,造成:「低血壓/循環衰竭休克」(本題正解B)、低血鈉、高血鉀、低血糖、脫水、發燒、虛弱。常因感染、壓力、突然停用類固醇誘發。處置為「立即靜脈注射氫氧化可體松(hydrocortisone)、大量生理食鹽水補液、補糖」。其餘選項與危象相反:A高血糖(應低血糖)、C高血鈉(應低血鈉)、D低血鉀(應高血鉀)。本題答案為 B(低血壓)。","options":{"A":"腎上腺危機為低血糖,非高血糖。","B":"正解。腎上腺危機出現嚴重低血壓(休克)。","C":"危機為低血鈉,非高血鈉。","D":"危機為高血鉀,非低血鉀。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"103030-N3-73":{"quick":"庫欣氏症候群(皮質醇過多)實驗室呈低血鉀;並高血糖、高血鈉、嗜伊紅性白血球減少。","detail":{"background":"庫欣氏症候群(皮質醇過多)的實驗室變化:①醣質新生增加→「高血糖」;②礦物皮質作用→「高血鈉、低血鉀(本題正解C)」、代謝性鹼中毒;③免疫調節→嗜中性白血球增加,但「淋巴球與嗜伊紅性白血球減少」;④皮質醇高也使骨鈣流失。本題正確者為C「低血鉀」。其餘:A「低血糖」錯(應高血糖)、B「低血鈉」錯(應高血鈉)、D「嗜伊紅增多」錯(應減少)。","options":{"A":"Cushing為高血糖,非低血糖。","B":"Cushing為高血鈉,非低血鈉。","C":"正解。Cushing皮質醇過多致低血鉀。","D":"Cushing使嗜伊紅性白血球減少,非增多。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"103030-N3-74":{"quick":"愛迪生氏危象因醛固酮不足→高血鉀;並低血鈉、低血糖、低血壓。","detail":{"background":"愛迪生氏危象(Addisonian crisis)為急性腎上腺皮質功能不全,皮質醇與醛固酮嚴重缺乏:醛固酮不足使腎保鈉排鉀失常→「高血鉀(本題正解C)、低血鈉」;皮質醇不足→「低血糖」、血管張力差「低血壓/休克」。處置為靜脈氫化可體松、生理食鹽水補液、補糖、矯正高血鉀。本題正確者為C(高血鉀)。其餘A高血糖、B高血鈉、D高血壓皆與危象相反。","options":{"A":"危象為低血糖,非高血糖。","B":"危象為低血鈉,非高血鈉。","C":"正解。醛固酮不足致高血鉀。","D":"危象為低血壓,非高血壓。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"103030-N3-75":{"quick":"嗜鉻細胞瘤源自腎上腺髓質、兒茶酚胺過量→高血壓、高血糖與尿糖、交感神經過度活動。","detail":{"background":"嗜鉻細胞瘤(pheochromocytoma)源自腎上腺「髓質」嗜鉻細胞,分泌過量兒茶酚胺(腎上腺素/正腎上腺素)。兒茶酚胺促糖原分解與糖質新生、抑制胰島素→「高血糖與尿糖」(本題正解B);使血管收縮→陣發性「高血壓」(非低血壓);屬「交感神經」過度活動(非副交感)。發生部位為腎上腺「髓質」(非皮質)。本題正確者為 B。","options":{"A":"嗜鉻細胞瘤致陣發性高血壓,非低血壓。","B":"正解。兒茶酚胺過量致高血糖與尿糖。","C":"發生部位為腎上腺髓質,非皮質。","D":"屬交感神經過度活動,非副交感。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"103100-N3-70":{"quick":"愛迪生氏病的病理是腎上腺皮質分泌不足,含「雄性素(腎上腺性類固醇)不足」。","detail":{"background":"愛迪生氏病(Addison's disease,原發性腎上腺皮質功能不全)為腎上腺皮質「破壞」,使皮質三大類產物——糖皮質醇、礦物皮質醇(醛固酮)、與「腎上腺性雄性素」皆「分泌不足」。本題選項中只有D「雄性素不足」符合病理(腎上腺皮質低下含雄性素不足,女性可致腋毛陰毛減少);A「糖皮質固醇過多」、B「留鹽激素過多」方向相反(應為不足);C「生長激素不足」屬腦下垂體,與腎上腺皮質無關。本題正確者為 D。","options":{"A":"愛迪生氏病糖皮質醇是不足,非過多。","B":"醛固酮(留鹽激素)是不足,非過多。","C":"生長激素屬腦下垂體,與腎上腺皮質病理無關。","D":"正解。腎上腺皮質低下含雄性素不足。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"103100-N3-72":{"quick":"嗜鉻細胞瘤(腎上腺髓質)會使尿中香草扁桃酸(VMA)增加。","detail":{"background":"內分泌24小時尿液檢查與疾病對應:①「嗜鉻細胞瘤(腎上腺髓質)→尿VMA增加」(本題正解D);②庫欣氏症候群→尿游離皮質醇、17-OHCS、17-KS增加(透納氏症候群是性染色體異常,與尿皮質醇增加無關,故A錯);③腦下垂體功能亢進(ACTH多→Cushing)會使17-KS、17-KGS「增加」非減少(B錯);④愛迪生氏症(皮質醇不足)會使17-OHCS「減少」非增加(C錯)。本題正確者為 D。","options":{"A":"透納氏症候群與尿皮質醇增加無關,敘述錯誤。","B":"腦下垂體亢進使17-KS/17-KGS增加,非減少。","C":"愛迪生氏症皮質醇不足,17-OHCS應減少,非增加。","D":"正解。嗜鉻細胞瘤使尿香草扁桃酸(VMA)增加。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"104100-N3-52":{"quick":"長期類固醇突然停藥→腎上腺功能不全/危象,出現低血鈉與高血鉀(醛固酮、皮質醇驟缺)。","detail":{"background":"長期使用類固醇會「抑制下視丘-腦下垂體-腎上腺軸(HPA軸)」,使內源性皮質醇分泌受抑、腎上腺萎縮。若「突然停藥」,身體無法立即恢復自身皮質醇與醛固酮分泌→急性腎上腺功能不全(類腎上腺危象):醛固酮不足使保鈉排鉀失常→「低血鈉、高血鉀(本題正解B)」、低血糖、低血壓、虛弱、噁心。故長期類固醇必須「漸進式減量」、壓力時增量,不可驟停。其餘選項與停藥危象不符。本題答案為 B。","options":{"A":"停藥危象為低血糖,非高血糖及糖尿。","B":"正解。突然停藥致腎上腺功能不全,出現低血鈉及高血鉀。","C":"腸胃道出血是長期「使用」類固醇的副作用,非停藥危象特徵。","D":"焦躁抽筋非停藥危象的典型電解質後果。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"105030-N3-30":{"quick":"測24小時尿液香草杏仁酸(VMA)可協助確立「嗜鉻細胞瘤」診斷。","detail":{"background":"香草杏仁酸(VMA)是兒茶酚胺(腎上腺素/正腎上腺素)的代謝產物。「嗜鉻細胞瘤」分泌過量兒茶酚胺,因此測「24小時尿液VMA(及metanephrines)增加」可協助確立診斷(本題正解B)。庫欣氏症候群測尿游離皮質醇;慢性腎盂腎炎靠尿液培養/影像;單胺氧化酶抑制劑中毒非以VMA診斷。檢查前須避免咖啡、香蕉、香草、柑橘等影響VMA的食物與部分藥物。本題答案為 B。","options":{"A":"庫欣氏症候群以尿游離皮質醇診斷,非VMA。","B":"正解。尿VMA增加用於確立嗜鉻細胞瘤診斷。","C":"慢性腎盂腎炎以尿培養/影像診斷,非VMA。","D":"單胺氧化酶抑制劑中毒非以VMA診斷。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"105030-N3-71":{"quick":"原發性醛固酮過多症(Conn氏)→低血鉀;並高血鈉、高血容積、高血壓。","detail":{"background":"原發性醛固酮過多症(primary aldosteronism / Conn氏症候群)因醛固酮分泌過量,促腎遠端「保鈉排鉀排氫」→「高血鈉、低血鉀(本題正解B)、代謝性鹼中毒」、水鈉滯留致「高血容積、高血壓」。低血鉀使肌肉軟弱無力、心律不整、多尿夜尿、抽搐。本題正確者為B(低血鉀)。其餘:A低血鈉錯(應高鈉)、C低血容積錯(應高血容積)、D低血壓錯(應高血壓)。治療:醛固酮拮抗劑(spironolactone)、限鈉、手術切除腺瘤。","options":{"A":"醛固酮過多為高血鈉,非低血鈉。","B":"正解。醛固酮過多排鉀致低血鉀。","C":"水鈉滯留致高血容積,非低血容積。","D":"醛固酮過多致高血壓,非低血壓。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"106030-N3-74":{"quick":"原發性醛固酮過多症→低血鉀;並高血鈉、代謝性鹼中毒、高血容積(高血壓)。","detail":{"background":"原發性醛固酮過多症(Conn氏症候群)的臨床表徵:醛固酮過量促保鈉排鉀排氫→「高血鈉、低血鉀(本題正解B)、代謝性鹼中毒」、水鈉滯留致高血壓與高血容積。低血鉀造成肌肉無力、心律不整、多尿夜尿、感覺異常。本題正確者為B(低血鉀)。其餘:A低血鈉錯(應高鈉)、C代謝性酸中毒錯(應鹼中毒)、D低血容積錯(應高血容積)。","options":{"A":"醛固酮過多為高血鈉,非低血鈉。","B":"正解。醛固酮過多致低血鉀。","C":"醛固酮過多排氫離子致代謝性鹼中毒,非酸中毒。","D":"水鈉滯留致高血容積,非低血容積。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"106111-N3-70":{"quick":"愛迪生氏危機:高血鉀、低血容積、低血糖致痙攣;血壓低、血糖低、可發燒。","detail":{"background":"愛迪生氏危機(Addisonian crisis)的症狀:皮質醇與醛固酮嚴重缺乏→「高血鉀(陳述1)」、低血鈉、「低血容積/脫水(陳述4)」、低血壓休克、低血糖(可致「痙攣/意識改變」陳述6)、虛弱、噁心、常伴發燒。陳述2「高血壓」錯誤(應低血壓)、陳述3「高血糖」錯誤(應低血糖)、陳述5「體溫降低」錯誤(危象常發燒)。故正確組合為1、4、6(B)。處置:靜脈氫化可體松、生理食鹽水、補糖、矯正高血鉀。","options":{"A":"含陳述2(高血壓)、3(高血糖)錯誤。","B":"正解。高血鉀(1)+低血容積(4)+痙攣(6)為危象表現。","C":"含陳述2、5錯誤。","D":"含陳述3、5錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"106111-N3-72":{"quick":"庫欣氏症候群是「高血糖」(糖質新生增加),故「低血糖」的機轉敘述為錯誤。","detail":{"background":"庫欣氏症候群症狀的病理機轉:A「肌肉無力」——皮質醇促蛋白質分解致肌肉質塊流失(正確);B「水腫」——皮質醇的礦物皮質作用使水鈉滯留(正確);C「傷口癒合慢」——皮質醇抑制免疫、使淋巴球下降、膠原合成減少(正確);D「低血糖」——錯誤!庫欣氏是「高血糖」:皮質醇「促進」肝糖質新生並造成胰島素阻抗(胰島素利用下降),血糖上升(類固醇糖尿病)。本題找「錯誤」者為 D(把高血糖機轉寫反)。","options":{"A":"蛋白質過度分解致肌肉流失,正確。","B":"礦物皮質醇活化使水鈉滯留致水腫,正確。","C":"皮質醇抑制免疫、淋巴球下降致傷口癒合慢,正確。","D":"正解(錯誤敘述)。Cushing為高血糖(糖質新生增加、胰島素阻抗),非低血糖。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"106111-N3-73":{"quick":"嗜鉻細胞瘤切除後易因兒茶酚胺驟降而「低血壓」,故術後「注意高血壓並用α阻斷劑」的敘述錯誤。","detail":{"background":"嗜鉻細胞瘤切除手術前後管理:術前須先用「α腎上腺素阻斷劑(如phenoxybenzamine)」控制血壓、擴充血容量,之後再加β阻斷劑控制心率。「術後」腫瘤移除使兒茶酚胺驟降,病人易發生「低血壓」與低血糖(而非高血壓),故須密切監測血壓、補充靜脈輸液維持血容量、必要時升壓而非降壓。本題找「錯誤」者:A「注意高血壓、必要時用α阻斷劑」錯誤——術後應警覺「低血壓」。其餘B(尿量<30 mL/hr為異常)、C(觀察出血與腸蠕動)、D(靜脈輸液維持體液)皆正確。","options":{"A":"正解(錯誤敘述)。術後兒茶酚胺驟降易低血壓,應防低血壓而非高血壓。","B":"監測每小時尿量,<30 mL/hr為異常,正確。","C":"觀察術後出血與腸蠕動狀態,正確。","D":"依醫囑靜脈輸液維持體液容積,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"107030-N3-71":{"quick":"嗜鉻細胞瘤典型「5P」為高血壓、頭痛、心悸、流汗、蒼白;不包括「高血鉀」。","detail":{"background":"嗜鉻細胞瘤(腎上腺髓質、兒茶酚胺過量)典型的陣發性發作以「5P」表現:Pressure(高血壓)、Pain(頭痛)、Palpitation(心悸)、Perspiration(流汗)、Pallor(臉色蒼白)。此外可有高血糖、體重減輕、焦慮。本題問「不包括」者:B「高血鉀」——並非5P之一(高血鉀反而是腎上腺皮質功能低下/醛固酮不足的表現),故為答案。其餘高血壓、疼痛(頭痛)、心悸皆屬5P。本題答案為 B。","options":{"A":"高血壓(Pressure)是5P之一。","B":"正解。高血鉀不屬嗜鉻細胞瘤5P。","C":"疼痛(頭痛 Pain)是5P之一。","D":"心悸(Palpitation)是5P之一。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"107110-N3-73":{"quick":"康氏症候群(Conn,醛固酮過多)→低血鉀;並高血鈉、代謝性鹼中毒、高血壓。","detail":{"background":"康氏症候群(Conn's syndrome,原發性醛固酮過多症)因醛固酮分泌過量,促腎保鈉排鉀排氫→「高血鈉、低血鉀(本題正解B)、代謝性鹼中毒」、水鈉滯留致高血壓。低血鉀造成肌肉軟弱無力、心律不整、多尿夜尿。本題正確者為B(低血鉀)。其餘:A「男性女乳」與醛固酮過多無直接關係(較見於某些藥物/肝病/性腺問題)、C「低血鈉」錯(應高鈉)、D「代謝性酸中毒」錯(應鹼中毒)。治療:spironolactone、限鈉、手術。","options":{"A":"男性女乳與原發性醛固酮過多無直接關係。","B":"正解。康氏症候群醛固酮過多致低血鉀。","C":"為高血鈉,非低血鈉。","D":"排氫致代謝性鹼中毒,非酸中毒。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"107110-N3-74":{"quick":"長期服prednisolone會升血糖,「不宜高醣飲食」,故鼓勵高蛋白、高醣、高鉀的敘述錯誤。","detail":{"background":"長期服用prednisolone(糖皮質類固醇)的護理:①刺激胃酸易潰瘍出血,應「飯後服用或合併制酸劑」(A正確);②會「升高血糖(類固醇糖尿病)」,故飲食「不宜高醣」,應採高蛋白(對抗蛋白質分解)、限制醣與鈉、補充鉀與鈣,因此「鼓勵高蛋白、高醣、高鉀」中的「高醣」不適當(本題錯誤項B);③遇重大壓力(感染、手術)須告知醫師「增加」劑量(C正確);④病情穩定後須「漸進式減量停藥」,不可驟停(D正確)。本題找「錯誤」者為 B。","options":{"A":"飯後服用或合併制酸劑以防胃潰瘍,正確。","B":"正解(錯誤敘述)。類固醇升血糖,不宜高醣飲食。","C":"重大壓力時應告知醫師增加劑量,正確。","D":"病情穩定後依醫囑漸進式停藥,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"108020-N3-72":{"quick":"診斷庫欣氏症候群最具特異性的是「24小時尿液游離皮質醇」排泄量。","detail":{"background":"庫欣氏症候群(皮質醇過多)的診斷檢查:篩檢與確診常用①「24小時尿液游離皮質醇(UFC)」測量——直接反映一整天的皮質醇分泌量,「特異性高」(本題正解A);②隔夜低劑量地塞米松(dexamethasone)抑制試驗;③深夜唾液皮質醇。影像(腎上腺掃描、蝶鞍MRI)用於「定位」病灶(確診後找來源),而非首選的功能確診。標準二天類固醇抑制試驗也可用,但本題問「最具特異性」者為24小時尿游離皮質醇。本題答案為 A。","options":{"A":"正解。24小時尿液游離皮質醇排泄量最具特異性。","B":"核醫腎上腺皮質掃描用於定位病灶,非功能確診首選。","C":"類固醇抑制試驗可用,但特異性不及24小時尿游離皮質醇。","D":"蝶鞍MRI用於定位腦下垂體病灶,非功能診斷。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"108110-N3-70":{"quick":"長期口服或注射類固醇最可能出現「高血糖」(類固醇糖尿病)。","detail":{"background":"長期使用類固醇(糖皮質醇)的副作用(醫源性庫欣氏):①醣質新生增加、胰島素阻抗→「高血糖(類固醇糖尿病)」(本題正解B);②礦物皮質作用→「高血鈉、水鈉滯留、高血壓、低血鉀」(故A低血鈉、C高血鉀、D低血壓皆相反);③骨質疏鬆、消化性潰瘍出血、感染風險增加、傷口癒合差、中央性肥胖圓月臉、情緒改變;④抑制HPA軸,不可驟停。本題最可能副作用為 B(高血糖)。","options":{"A":"類固醇留鈉,為高血鈉,非低血鈉。","B":"正解。長期類固醇致高血糖(類固醇糖尿病)。","C":"類固醇排鉀致低血鉀,非高血鉀。","D":"類固醇留鈉水致高血壓,非低血壓。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"109030-N3-65":{"quick":"長期類固醇導致的是「續發性」腎上腺功能不全,ACTH低→「不會」有皮膚黏膜色素沉著(那是原發性Addison的特徵)。","detail":{"background":"長期使用類固醇後若停藥或壓力時,因HPA軸受抑、自身皮質醇不足,出現「續發性(次發性)腎上腺皮質功能不全」,表現:漸進性疲累無力、體重減輕(B正確)、姿位性低血壓與脫水(C正確)、低血糖、女性腎上腺雄性素不足致腋毛陰毛減少(D正確)。但「色素沉著」是「原發性愛迪生氏病」的特徵(腎上腺被破壞→ACTH/MSH代償升高→皮膚黏膜變黑);長期類固醇造成的續發性者ACTH「低下」,故「不會」有色素沉著。本題找「錯誤」者:A「皮膚與黏膜褐色色素沉著」錯誤。","options":{"A":"正解(錯誤敘述)。續發性(類固醇引起)ACTH低,不會色素沉著(色素沉著是原發性Addison特徵)。","B":"漸進性疲累、無力、體重減輕,正確。","C":"姿位性低血壓與脫水,正確。","D":"腎上腺雄性素不足致女性腋毛陰毛減少,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"109110-N3-68":{"quick":"庫欣氏症候群皮質醇過多→免疫受抑制(嗜中性球增多但淋巴球、單核球下降);高血壓因礦物皮質醇活化增加、高血糖因糖質新生增加。","detail":{"background":"庫欣氏症候群(皮質醇過多)各症狀機轉的正確描述:C「免疫受抑制」——皮質醇使嗜中性白血球「增多」,但抑制單核球功能、使「淋巴球與嗜伊紅性球下降」→整體免疫受抑、易感染、傷口癒合差(本題正解C)。其餘為錯誤:B「高血壓」應為「礦物皮質醇活化『增加』致水鈉滯留」(原句寫「降低」活化,錯);D「高血糖」應為「肝糖質新生『增加』、胰島素阻抗(利用下降)」(原句寫糖質新生「降低」,錯)。A「軀幹性肥胖由糖皮質素影響脂肪蛋白代謝」概念雖屬實,但本題公布之最正確選項為C。","options":{"A":"糖皮質素確造成中央性肥胖,概念屬實,但本題公布正解為C。","B":"高血壓應為礦物皮質醇活化「增加」致水鈉滯留,原句「降低」錯誤。","C":"正解。皮質醇使嗜中性球增多但淋巴球/單核球下降,免疫受抑制。","D":"高血糖應為糖質新生「增加」、胰島素阻抗,原句「降低」錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"110030-N3-68":{"quick":"愛迪生氏危機(腎上腺危象)特徵為低血鈉;並高血鉀、低血糖、低血壓。","detail":{"background":"愛迪生氏危機(Addisonian crisis)是急性腎上腺皮質功能不全:醛固酮不足→「低血鈉(本題正解D)、高血鉀」;皮質醇不足→「低血糖、低血壓/休克」、脫水、虛弱、發燒。處置:立即靜脈氫化可體松、大量生理食鹽水、補糖、矯正高血鉀。本題正確者為D(低血鈉)。其餘A高血壓、B高血糖、C低血鉀皆與危象相反(危象為低血壓、低血糖、高血鉀)。","options":{"A":"危象為低血壓,非高血壓。","B":"危象為低血糖,非高血糖。","C":"危象為高血鉀,非低血鉀。","D":"正解。腎上腺危象出現低血鈉。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"110030-N3-69":{"quick":"嗜鉻細胞瘤的杏仁酸(VMA)應檢測「尿液」而非血液,故「檢測血液中VMA」為錯誤。","detail":{"background":"嗜鉻細胞瘤(腎上腺髓質、兒茶酚胺過量)重點:A「因情緒激動/壓力使腫瘤突然釋放大量兒茶酚胺」正確(陣發性發作誘因);B「過量腎上腺素與正腎上腺素引起交感神經過度活動」正確;C「5P症狀:心悸、盜汗、疼痛、臉色蒼白及高血壓」正確。D「透過檢測『血液』中的杏仁酸(VMA)確立診斷」錯誤——VMA是兒茶酚胺代謝產物,經腎排出,應檢測「24小時尿液VMA(及尿/血metanephrines)」,而非血中VMA。本題找「錯誤」者為 D。","options":{"A":"情緒激動使腫瘤釋放兒茶酚胺,正確。","B":"兒茶酚胺過量引起交感神經過度活動,正確。","C":"5P症狀(心悸、盜汗、疼痛、蒼白、高血壓)正確。","D":"正解(錯誤敘述)。VMA應檢測尿液,非血液。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"110110-N3-70":{"quick":"康氏症候群(醛固酮過多)為水鈉滯留致「高血容積」,故「低血容積」為錯誤;並有低血鉀致呼吸抑制、心律不整、多尿夜尿。","detail":{"background":"康氏症候群(原發性醛固酮過多症)的臨床表徵:醛固酮過量保鈉排鉀→「高血鈉、低血鉀、代謝性鹼中毒」、水鈉滯留致「高血容積、高血壓」。低血鉀造成:肌肉無力甚至「呼吸肌無力/呼吸抑制」(A正確)、「心律不整」(B正確)、腎濃縮力下降致「多尿、夜尿」(D正確)。本題找「錯誤」者:C「低血容積」錯誤——醛固酮過多是水鈉滯留致「高血容積」。本題答案為 C。","options":{"A":"低血鉀可致呼吸肌無力/呼吸抑制,正確。","B":"低血鉀致心律不整,正確。","C":"正解(錯誤敘述)。醛固酮過多為高血容積,非低血容積。","D":"低血鉀致腎濃縮力下降,多尿夜尿,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"111110-N3-69":{"quick":"庫欣氏症候群因蛋白質分解、肌肉流失,飲食應「高蛋白」,故「低蛋白」為錯誤(其餘高鈣、高鉀、低熱量正確)。","detail":{"background":"庫欣氏症候群(皮質醇過多)的飲食指導:①因皮質醇促蛋白質分解致肌肉流失,應採「高蛋白」(對抗負氮平衡)→故「低蛋白」是錯誤的(本題錯誤項D);②骨質流失→「高鈣」(A正確);③礦物皮質作用排鉀致低血鉀→「補鉀(高鉀)」(B正確);④高血糖與向心性肥胖→「低熱量、限醣、限鈉」(C低熱量正確)。本題找「錯誤(不適當)」者為 D(低蛋白)。","options":{"A":"骨質流失應高鈣,正確。","B":"低血鉀應補鉀(高鉀),正確。","C":"肥胖與高血糖應低熱量,正確。","D":"正解(錯誤敘述)。肌肉流失應高蛋白,非低蛋白。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"112030-N3-69":{"quick":"康氏症候群(Conn)是「醛固酮」分泌過多所致。","detail":{"background":"康氏症候群(Conn's syndrome,原發性醛固酮過多症)的核心是腎上腺皮質「醛固酮(aldosterone)」分泌過多(本題正解B),造成保鈉排鉀→高血鈉、低血鉀、代謝性鹼中毒、高血壓、高血容積。糖皮質酮過多→庫欣氏症候群;腎上腺素過多→嗜鉻細胞瘤;抗利尿激素過多→SIADH。本題問致康氏症候群的荷爾蒙,答案為醛固酮(B)。","options":{"A":"糖皮質酮過多造成庫欣氏症候群,非康氏。","B":"正解。醛固酮過多造成康氏症候群。","C":"腎上腺素過多見於嗜鉻細胞瘤。","D":"抗利尿激素過多造成SIADH。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"112110-N3-67":{"quick":"皮質醇(cortisol)有晝夜節律,血漿濃度以「清晨6~8點」最高;它升血糖、增強抗壓與抗發炎。","detail":{"background":"皮質醇(cortisol)的特性:①是腎上腺皮質「主要的糖皮質類固醇」(分泌量最多,非最少);②分泌有「晝夜節律」,血漿濃度「清晨起床後6~8點最高」、午夜最低(本題正解B,故抽血測皮質醇須注意時間);③屬升糖激素,促糖質新生「升高血糖」(非降血糖);④皮質醇是身體對抗壓力、抑制發炎/免疫的重要激素(「增強」抗壓與抗發炎作用,而非降低)。本題正確者為 B。","options":{"A":"皮質醇是腎上腺皮質分泌「最多」的類固醇,非最少。","B":"正解。皮質醇有晝夜節律,以清晨6~8點濃度最高。","C":"皮質醇升血糖(糖質新生),非降血糖。","D":"皮質醇增強抗壓與抗發炎作用,非降低。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"112110-N3-68":{"quick":"嗜鉻細胞瘤代謝亢進、消耗大,應給「高熱量、高維生素」飲食,故「低維他命低蛋白低礦物質低熱量」不適當。","detail":{"background":"嗜鉻細胞瘤(兒茶酚胺過量)的護理:①注意陣發性高血壓引起的「頭痛、視力改變、胸痛、意識混亂」等危象徵象(A正確);②讓病人「充分休息、避免壓力/刺激」(觸診、情緒、運動會誘發發作,B正確);③因兒茶酚胺使代謝亢進、消耗大,飲食應「高熱量、高維生素、足量營養」,故「鼓勵低維他命、低蛋白、低礦物質、低熱量」是錯誤的(本題不適當項C);④避免咖啡、茶等含咖啡因/誘發交感的飲料(D正確)。本題找「錯誤」者為 C。","options":{"A":"注意頭痛、視力改變、胸痛、意識混亂等危象徵象,正確。","B":"讓病人充分休息、避免壓力誘發發作,正確。","C":"正解(錯誤敘述)。代謝亢進應高熱量高維生素,非低熱量低維他命。","D":"避免咖啡、茶等誘發交感的飲料,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"112110-N3-69":{"quick":"愛迪生氏危機因醛固酮/皮質醇不足而脫水、低血鈉,須「補水補鈉」,故「限水<1000cc」錯誤。","detail":{"background":"愛迪生氏危機(腎上腺危象)的護理措施:①「監測生命徵象、輸出入量、電解質」(A正確,須警覺低血壓、低血鈉、高血鉀);③因醛固酮不足致失鈉脫水,應「鼓勵攝取含鈉及高蛋白食物」、靜脈補生理食鹽水擴容(C正確);④因高血鉀,應「避免高鉀食物(香蕉、南瓜)」(D正確)。本題找「錯誤」者:B「執行限水計畫、每天攝水量<1000cc」錯誤——危象是脫水、低血容積,需「補充水分與鈉」而非限水(限水是SIADH的處置,別搞混)。本題答案為 B。","options":{"A":"監測生命徵象、輸出入量、電解質,正確。","B":"正解(錯誤敘述)。危象脫水需補水補鈉,非限水。","C":"鼓勵含鈉及高蛋白食物,正確。","D":"高血鉀應避免香蕉、南瓜等高鉀食物,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"112180-N3-43":{"quick":"庫欣氏症候群是「高血糖」(糖質新生增加),故「肝糖質新生降低、胰島素利用增加」的機轉敘述錯誤。","detail":{"background":"庫欣氏症候群症狀病理機轉:A「蛋白質過度分解致肌肉流失」正確;C「水分與鈉離子滯留致水腫」正確(礦物皮質作用);D「皮質醇上升致淋巴球下降、傷口癒合差」正確(免疫抑制)。B錯誤——庫欣氏是「高血糖」:皮質醇「促進(增加)肝糖質新生」並造成胰島素阻抗(胰島素利用「下降」),血糖上升;原句寫「糖質新生降低、胰島素利用增加」與事實相反。本題找「錯誤」者為 B。","options":{"A":"蛋白質過度分解致肌肉質塊流失,正確。","B":"正解(錯誤敘述)。Cushing糖質新生增加、胰島素阻抗,致高血糖。","C":"水鈉滯留致水腫,正確。","D":"皮質醇上升致淋巴球下降、傷口癒合差,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"113030-N3-42":{"quick":"原發性醛固酮過多症(高血鈉、高血壓)應「限鈉」,故教導多補充高鈉食物為錯誤。","detail":{"background":"原發性醛固酮過多症(Conn氏)護理:①醛固酮過多致低血鉀,須觀察「肌肉軟弱無力、疲倦、麻痹、心律不整」等低血鉀徵象(A正確);②低血鉀亦可致「強直性痙攣、呼吸抑制」,須觀察(B正確);③因高血鈉、水鈉滯留致高血壓,飲食應「限制鈉」、補充鉀,故「教導多補充高鈉食物(火腿、香腸、起司)」是錯誤的(本題錯誤項C);④須注意「血壓過高」並控制(D正確)。本題找「錯誤」者為 C。","options":{"A":"觀察低血鉀的肌肉無力、疲倦、麻痹、心律不整,正確。","B":"觀察強直性痙攣與呼吸抑制,正確。","C":"正解(錯誤敘述)。高血鈉高血壓應限鈉,非多補充高鈉食物。","D":"注意血壓過高,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"113100-N3-42":{"quick":"腎上腺皮質功能低下症通常須「破壞約90%以上」才出現明顯症狀,故「10%被破壞即出現症狀」為錯誤。","detail":{"background":"腎上腺皮質功能低下症:①「原發性(愛迪生氏病)」常因腎上腺皮質的慢性破壞(自體免疫、結核等)(A正確);②腎上腺皮質有相當儲備,通常需「破壞約90%以上」才出現明顯症狀(故B「至少10%被破壞即出現症狀」錯誤,本題答案);③原發性因皮質醇低、負回饋使ACTH與「促黑色細胞素(MSH)」過度分泌→皮膚黏膜色素沉著變深(C正確);④下視丘CRF不足或腦下垂體ACTH不足會造成「續發/三發性」腎上腺皮質功能低下(D正確)。本題找「錯誤」者為 B。","options":{"A":"原發性常因腎上腺皮質慢性破壞所致,正確。","B":"正解(錯誤敘述)。須破壞約90%以上才出現明顯症狀,非10%。","C":"原發性ACTH/MSH過多致皮膚色素沉著,正確。","D":"下視丘CRF不足亦會致腎上腺皮質功能低下,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"113180-N3-42":{"quick":"愛迪生危機(腎上腺危象)特徵為「高血鉀」(醛固酮不足);並低血鈉、低血糖、低血壓。","detail":{"background":"愛迪生危機(Addisonian crisis)的電解質與代謝特徵:醛固酮不足→保鈉排鉀失常→「高血鉀(本題正解A)、低血鈉」;皮質醇不足→「低血糖、低血壓/休克」、脫水、發燒。本題正確者為A(高血鉀)。其餘:B高血壓錯(應低血壓)、C高血糖錯(應低血糖)、D高血鈉錯(應低血鈉)。處置:靜脈氫化可體松、生理食鹽水、補糖、矯正高血鉀。","options":{"A":"正解。腎上腺危象醛固酮不足致高血鉀。","B":"危象為低血壓,非高血壓。","C":"危象為低血糖,非高血糖。","D":"危象為低血鈉,非高血鈉。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"113180-N3-45":{"quick":"庫欣氏症候群(皮質醇過多)呈「低血鉀性鹼中毒」;皮膚變薄(非變厚)、多毛(非減少)、糖質新生增加。","detail":{"background":"庫欣氏症候群(皮質醇過多)的臨床表徵:①礦物皮質作用排鉀排氫→「低血鉀性代謝鹼中毒」(本題正解A);②皮質醇使膠原合成減少→皮膚「變薄」、易瘀斑、紫色條紋(故B「皮膚變厚成水牛肩」錯,水牛肩是脂肪堆積但皮膚是變薄);③雄性素效應使女性「多毛(hirsutism)」(故C「體毛鬢毛減少」錯);④糖質新生「增加」致高血糖(故D「葡萄糖新生減少」錯)。本題正確者為 A(低血鉀性鹼中毒)。","options":{"A":"正解。Cushing排鉀排氫致低血鉀性鹼中毒。","B":"Cushing皮膚變薄(非變厚),水牛肩是脂肪堆積。","C":"Cushing雄性素效應致多毛,非體毛減少。","D":"Cushing糖質新生增加致高血糖,非減少。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"114170-N3-43":{"quick":"原發性多醛固酮症(醛固酮過多)→低血鉀;與代謝率、血糖、血鈣無直接相關。","detail":{"background":"原發性多醛固酮症(primary aldosteronism)因醛固酮過量,促腎保鈉排鉀排氫→「高血鈉、低血鉀(本題正解D)、代謝性鹼中毒」、高血壓、高血容積。低血鉀引起肌肉無力、心律不整、多尿夜尿。本題正確者為D(低血鉀)。其餘:A「低代謝率」屬甲狀腺低下、B「低血糖」與醛固酮無關、C「高血鈣」屬副甲狀腺亢進,皆非醛固酮過多的表現。","options":{"A":"低代謝率屬甲狀腺功能低下,與醛固酮過多無關。","B":"低血糖與醛固酮過多無關。","C":"高血鈣屬副甲狀腺亢進,非醛固酮過多。","D":"正解。醛固酮過多致低血鉀。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"115030-N3-43":{"quick":"嗜鉻細胞瘤切除後須維持尿量「≥30 mL/小時」,故「維持尿量20~25 mL/小時」為錯誤。","detail":{"background":"嗜鉻細胞瘤切除術後護理:①腫瘤移除後兒茶酚胺驟降,易發生低血壓與腎上腺功能不全,故「注意腎上腺功能不全徵象、必要時靜脈輸注皮質醇(hydrocortisone)」(A正確)、「靜脈輸液維持體液容積」(D正確);②須「監測每小時尿量,維持尿量≥30 mL/小時」以確保腎灌流(故B「維持20~25 mL/小時」錯誤,過低代表灌流不足);③觀察術後出血與腸蠕動狀態(C正確)。本題找「錯誤」者為 B。","options":{"A":"注意腎上腺功能不全,必要時靜脈輸注皮質醇,正確。","B":"正解(錯誤敘述)。術後應維持尿量≥30 mL/小時,非20~25。","C":"觀察術後出血與腸蠕動狀態,正確。","D":"靜脈輸液維持體液容積,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腎上腺)","Endocrine Society 腎上腺疾病指引"]}},"101110-N3-4":{"quick":"肢端肥大症發生於成人(骨骺已閉合),骨骼「不再縱向變長」,而是肢端與軟組織增大;故「長骨過度生長」為錯誤。","detail":{"background":"生長激素(GH)過多:發生於「青春期前(骨骺未閉合)」造成「巨人症(縱向長高)」;發生於「成人(骨骺已閉合)」則造成「肢端肥大症(acromegaly)」——骨骼無法再縱向變長,改為「肢端(手腳)增大、顏面骨增厚(眶上嵴突出、下巴/額骨肥大、鼻唇增厚)、軟組織增生」、皮膚油膩多汗、聲音低粗、內臟肥大(心臟肥大)、葡萄糖耐受不良。本題找「錯誤」者:C「長骨、骨骼及軟組織過度生長」——成人長骨已不能縱向生長,故錯誤。","options":{"A":"眶上嵴突出、下巴肥大為肢端肥大症典型,正確。","B":"皮膚油膩、多汗為肢端肥大症表現,正確。","C":"正解(錯誤敘述)。成人骨骺已閉合,長骨不再縱向生長。","D":"聲音粗厚、心臟肥大(內臟肥大),正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"105090-N3-6":{"quick":"腦下垂體腫瘤向上壓迫「視神經交叉」,典型造成「雙顳側偏盲」。","detail":{"background":"腦下垂體位於蝶鞍,其上方為「視神經交叉(optic chiasm)」。當腦下垂體腫瘤向上長大壓迫視交叉時,會壓到來自兩眼「鼻側視網膜」的交叉纖維(負責「顳側」視野),造成典型的「雙顳側偏盲(bitemporal hemianopia)」(雙眼外側視野缺損,如「隧道視覺」)(本題正解B)。這是腦下垂體腫瘤的經典視野缺損。本題答案為 B。","options":{"A":"雙鼻側視野缺損非視交叉壓迫的典型表現。","B":"正解。壓迫視交叉造成雙顳側偏盲。","C":"單顳側偏盲非視交叉中央壓迫的典型。","D":"單鼻側視野缺損非視交叉壓迫表現。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"105090-N3-72":{"quick":"腦下垂體功能亢進常見腺瘤為泌乳素瘤、生長激素瘤、ACTH瘤;「黃體促素腺瘤」罕見。","detail":{"background":"腦下垂體前葉腺瘤依分泌的激素分類,常見者為:①「泌乳素瘤(Prolactinoma)」(最常見,致溢乳閉經/性功能低下);②「生長激素瘤(Somatotropic adenoma)」(致巨人症/肢端肥大);③「促腎上腺皮質瘤(Corticotropic adenoma,ACTH瘤)」(致庫欣氏病);④無功能腺瘤。而「黃體促素(LH)腺瘤」極為罕見(本題問「不是」常見者,答案為A)。本題答案為 A。","options":{"A":"正解。黃體促素(LH)腺瘤罕見,非常見腦下垂體腺瘤。","B":"泌乳素瘤是最常見的腦下垂體腺瘤。","C":"生長激素瘤常見,致巨人症/肢端肥大。","D":"促皮質腺瘤(ACTH瘤)常見,致庫欣氏病。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"105090-N3-73":{"quick":"巨人症是生長激素過多,生長激素「升血糖」,故「有低血糖症狀」為錯誤。","detail":{"background":"巨人症(gigantism)是生長激素(GH)在「青春期前(骨骺未閉合)」過量分泌,造成全身骨骼縱向過度生長、身材異常高大(A、B正確)。生長激素屬「升糖激素」,會拮抗胰島素、造成葡萄糖耐受不良與「高血糖」,故「有低血糖症狀」是錯誤的(本題錯誤項C);長期巨大的腦下垂體腫瘤壓迫可致促性腺激素不足→末期第二性徵發育延遲(D正確)。本題找「錯誤」者為 C。","options":{"A":"巨人症由生長素分泌過多造成,正確。","B":"發生於青春期前(骨骺未閉合),正確。","C":"正解(錯誤敘述)。生長激素升血糖,巨人症為高血糖而非低血糖。","D":"腫瘤壓迫致促性腺激素不足、第二性徵延遲,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"105090-N3-74":{"quick":"蝶骨腺瘤切除術後「仍可能復發」,故「可根治不再復發」為錯誤。","detail":{"background":"肢端肥大症(成人GH過多,多因腦下垂體生長激素瘤)的治療:①「經蝶骨腺瘤切除術(transsphenoidal)」是首選,但腫瘤可能殘留或「復發」,故「不能保證根治不再復發」(本題錯誤項C),術後需追蹤GH/IGF-1;②腫瘤侷限於蝶鞍內者可採放射線治療(B正確);③藥物如「Octreotide(體制素類似物 Sandostatin)」可抑制GH分泌並縮小腫瘤(D正確);A「生長素分泌過多」為其病因(正確)。本題找「錯誤」者為 C。","options":{"A":"生長素分泌過多是肢端肥大症病因,正確。","B":"腫瘤侷限蝶鞍可採放射線治療,正確。","C":"正解(錯誤敘述)。蝶骨腺瘤切除仍可能復發,非根治不再復發。","D":"Octreotide(體制素類似物)可縮小腫瘤,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"106110-N3-68":{"quick":"催產素(oxytocin)由腦下垂體「後葉」釋放,不屬前葉分泌的激素。","detail":{"background":"腦下垂體「前葉」分泌六種激素:生長激素(GH)、泌乳素(PRL)、甲狀腺刺激素(TSH)、促腎上腺皮質素(ACTH)、濾泡刺激素(FSH)、黃體生成素(LH)。「後葉」則儲存釋放下視丘製造的「抗利尿激素(ADH)」與「催產素(oxytocin)」。本題問「腦下垂體前葉分泌之激素不包括」者:C「催產素」屬後葉,故為答案。其餘生長素、促乳素、黃體促素皆為前葉激素。本題答案為 C。","options":{"A":"生長素由前葉分泌。","B":"促乳素(泌乳素)由前葉分泌。","C":"正解。催產素由後葉釋放,不屬前葉。","D":"黃體促素(LH)由前葉分泌。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"106110-N3-69":{"quick":"肢端肥大症因生長激素過多代謝亢進,皮膚「多汗、油膩」,故「少汗症」不是其症狀。","detail":{"background":"肢端肥大症(成人GH過多)的症狀:肢端(手腳)增大、顏面骨增厚、皮膚增厚「油膩多汗」、「多毛」、聲音低粗、關節痛、腕隧道症候群、葡萄糖耐受性降低(高血糖傾向)、心臟肥大、睡眠呼吸中止。本題問「不是」其症狀者:B「少汗症」——肢端肥大應為「多汗」而非少汗,故為答案。其餘葡萄糖耐受性降低、多毛、關節痛皆是肢端肥大症的表現。本題答案為 B。","options":{"A":"葡萄糖耐受性降低(GH拮抗胰島素)是肢端肥大症症狀。","B":"正解。肢端肥大症為多汗,「少汗症」不是其症狀。","C":"多毛症是肢端肥大症表現。","D":"關節痛是肢端肥大症常見表現。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"107110-N3-76":{"quick":"肢端肥大症由「生長激素(GH)」分泌過多造成(成人骨骺閉合後)。","detail":{"background":"生長激素(GH)過多在「成人(骨骺已閉合)」造成「肢端肥大症」——肢端與顏面骨增大、軟組織增生、皮膚增厚多汗、內臟肥大、葡萄糖耐受不良;在青春期前則造成巨人症。本題問「何種荷爾蒙分泌過多會導致肢端肥大症」,答案為「生長激素(D)」。腎上腺素、甲狀腺激素、性腺激素過多皆不致肢端肥大症。本題答案為 D。","options":{"A":"腎上腺素過多見於嗜鉻細胞瘤,非肢端肥大。","B":"甲狀腺激素過多致甲亢,非肢端肥大。","C":"性腺激素過多非肢端肥大病因。","D":"正解。生長激素分泌過多造成肢端肥大症。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"108110-N3-73":{"quick":"下視丘分泌的調節因子經「下視丘-垂體門脈血管系統」直接送達腦下垂體前葉。","detail":{"background":"下視丘(hypothalamus)與腦下垂體的關係:①下視丘位於腦下垂體「之上」(視丘下方、間腦的一部分);②下視丘製造「釋放/抑制因子(如TRH、CRH、GnRH、GHRH、體制素、多巴胺)」經「下視丘-垂體門脈血管系統」直接運送到腦下垂體「前葉」,調控前葉激素分泌(本題正解C);③下視丘藉「神經軸突(神經衝動)」直接控制腦下垂體「後葉」釋放ADH與催產素。本題正確者為C(調節因子經血管叢直接送達)。其餘:A位置寫反、B「刺激後葉」應為前葉、D「神經衝動控制前葉」應為控制後葉。","options":{"A":"下視丘位於腦下垂體之上,非之下。","B":"下視丘調節因子作用於前葉(經門脈),非刺激後葉。","C":"正解。下視丘分泌的調節因子經門脈血管叢直接送達前葉。","D":"下視丘藉神經衝動控制的是後葉,非前葉。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"109110-N3-7":{"quick":"經蝶骨腦下垂體切除術後鼻部流出水樣液體,應「用尿糖試紙檢測」是否含葡萄糖以辨識腦脊髓液(CSF)滲漏。","detail":{"background":"經蝶骨(transsphenoidal)腦下垂體切除術後,若鼻部有「水樣清澈液體」流出,須警覺「腦脊髓液(CSF)滲漏」(手術經鼻蝶通路,可能傷及鞍膈/硬膜)。因CSF「含葡萄糖」,可「用尿糖試紙(葡萄糖試紙)檢測分泌物」,若呈葡萄糖陽性即提示CSF漏(本題正解A;另可看「暈圈徵halo sign」)。處置應通報、抬高床頭、避免擤鼻、咳嗽、用力,「不可用棉球塞鼻或抽吸鼻腔」(會增加感染/壓力)、不可填塞。本題正確者為 A。","options":{"A":"正解。以尿糖試紙檢測分泌物有無葡萄糖,辨識CSF滲漏。","B":"懷疑CSF漏應抬高床頭,但首要是「辨識」分泌物性質(A);本項非最適當。","C":"不可用抽吸管吸鼻腔(增加感染與顱內壓變化風險)。","D":"不可用棉球塞住鼻孔(可能逆行感染),應通報處理。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"110110-N3-3":{"quick":"腦下垂體腫瘤造成「雙顳側」視野缺損,壓迫部位為「視交叉」。","detail":{"background":"腦下垂體腫瘤向上生長會壓迫位於其上方的「視神經交叉(視交叉,optic chiasm)」,壓到兩眼鼻側視網膜的交叉纖維,造成典型「雙顳側偏盲(雙眼外側視野缺損)」與視力變差(本題正解C)。故出現雙顳側視野缺損時,壓迫部位即為視交叉。頂葉、枕葉、第III/IV/VI腦神經病變造成的視野/眼動障礙型態與此不同。本題答案為 C。","options":{"A":"頂葉病變造成的視野缺損型態與雙顳側偏盲不同。","B":"枕葉病變致對側同名偏盲,非雙顳側偏盲。","C":"正解。雙顳側視野缺損為視交叉受壓所致。","D":"第III/IV/VI腦神經管眼球運動,非造成雙顳側偏盲。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"110110-N3-71":{"quick":"蝶骨切除腦下垂體腫瘤術後「不可用力擤鼻涕、打噴嚏、咳嗽、解便」,以防CSF漏與出血。","detail":{"background":"經蝶骨腦下垂體腫瘤切除術後護理:①「避免增加顱內壓/鼻竇壓力的動作」——不可用力擤鼻涕、打噴嚏、咳嗽、彎腰、用力解便(便秘須軟便劑),以防傷口出血與「腦脊髓液(CSF)滲漏」(本題正解A);②術後因可能影響ADH分泌,須警覺「尿崩症」——出現「多尿、劇渴、低尿比重」(故D「表示血糖上升」錯,那是尿崩而非高血糖);③若有腎上腺功能不足需補充類固醇(Cortisone),口服應「飯後」服用減少胃刺激(故B「飯前」錯);④避免彎腰是術後早期持續注意事項,而非「二個月後才切勿彎腰」(C時序敘述不當)。本題正確者為 A。","options":{"A":"正解。術後不可用力擤鼻涕、打噴嚏、咳嗽、解便,防CSF漏與出血。","B":"Cortisone類藥物應飯後服用減少胃刺激,非飯前。","C":"術後早期即須避免彎腰,非「二個月後才切勿彎腰」。","D":"多尿劇渴是尿崩症徵象,非血糖上升。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"113180-N3-46":{"quick":"腦下垂體中風(pituitary apoplexy)以頭痛、頸僵、畏光、視力受損、荷爾蒙失調為主,不會造成「肢體半側偏癱」。","detail":{"background":"腦下垂體中風(pituitary apoplexy)是腦下垂體腫瘤突然出血或梗塞的急症:典型「突發劇烈頭痛、頸部僵硬、畏光(似腦膜刺激)、視力受損/視野缺損與眼肌麻痺(壓迫視交叉/海綿竇)、急性垂體功能低下(荷爾蒙失調,尤其ACTH不足致腎上腺危象)」。它影響的是垂體與鄰近視路/海綿竇,「不會造成肢體半側偏癱」(偏癱屬大腦半球或腦幹的腦血管病變)(本題錯誤項D)。本題找「錯誤」者為 D。","options":{"A":"急性垂體功能低下致荷爾蒙失調,正確。","B":"突發頭痛、頸部僵硬,正確。","C":"壓迫視路致畏光、視力受損,正確。","D":"正解(錯誤敘述)。腦下垂體中風不致肢體半側偏癱。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"114030-N3-44":{"quick":"肢端肥大症不會造成「低血鈣症」;其影響為關節痛/肌肉無力、腕隧道症候群、皮膚增厚多油。","detail":{"background":"肢端肥大症(成人GH過多)的多系統影響:①骨骼肌肉——關節痛、肌肉無力(B正確);②神經——軟組織增生壓迫致「腕隧道症候群」、嗜睡/睡眠呼吸中止(C正確);③皮膚——增厚、油脂多、多汗(D正確);④代謝——葡萄糖耐受不良(高血糖傾向)。它「不會造成低血鈣與腎結石」(本題錯誤項A)——低血鈣屬副甲狀腺低下;若合併MEN-1才可能有副甲狀腺亢進「高血鈣」結石,但非肢端肥大本身的泌尿系統表現。本題找「錯誤」者為 A。","options":{"A":"正解(錯誤敘述)。肢端肥大症不會造成低血鈣症與腎結石。","B":"關節痛、肌肉無力是肢端肥大症表現,正確。","C":"腕隧道症候群、嗜睡是肢端肥大症表現,正確。","D":"皮膚增厚、油脂增多是肢端肥大症表現,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"114100-N3-42":{"quick":"腦下垂體「前葉」分泌生長素與泌乳素;催產素與抗利尿素由「後葉」釋放。","detail":{"background":"腦下垂體前葉與後葉分工:前葉分泌生長素(GH)、泌乳素(PRL)、TSH、ACTH、FSH、LH;後葉儲存釋放下視丘製造的抗利尿激素(ADH)與催產素(oxytocin)。本題問前葉分泌者:陳述1「生長素」、陳述2「泌乳素」屬前葉(正確);陳述3「催產素」、陳述4「抗利尿素」屬後葉。故正確組合為1與2(A)。","options":{"A":"正解。生長素(1)+泌乳素(2)由前葉分泌。","B":"含陳述4(抗利尿素,後葉)錯誤。","C":"含陳述3(催產素,後葉)錯誤。","D":"兩者皆屬後葉,錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"115030-N3-44":{"quick":"席漢氏症候群(Sheehan's syndrome)是「產後大出血」致腦下垂體前葉缺血壞死,非發生於腦下垂體切除者。","detail":{"background":"腦下垂體前葉功能低下:①「席漢氏症候群(Sheehan's syndrome)」是「產後大出血/休克」造成腦下垂體前葉缺血壞死、功能低下,並「非」發生於腦下垂體切除的病人(本題錯誤項A);②前葉功能低下中以「生長激素(GH)缺乏最早、最常見」(B正確);③ACTH/皮質醇不足致「軟弱無力、低血糖、低血壓」(C正確);④TSH不足致甲狀腺低下,可有「黏液水腫」症狀(D正確)。本題找「錯誤」者為 A。","options":{"A":"正解(錯誤敘述)。席漢氏症候群因產後大出血致前葉壞死,非腦下垂體切除。","B":"前葉功能低下以生長素缺乏最常見,正確。","C":"ACTH不足致軟弱無力、血糖偏低,正確。","D":"TSH不足致甲狀腺低下可有黏液水腫,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(腦下垂體)","實用內外科護理學"]}},"101030-N3-78":{"quick":"SIADH須限水、防低血鈉水中毒;若便秘「不可用清水灌腸」(清水會被吸收加重低血鈉),其餘高纖、評估意識、限水皆正確。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH)因ADH過多→水分滯留、「稀釋性低血鈉」、低血漿滲透壓、水中毒。護理核心是「限制液體」(B、D方向正確:鼓勵高纖維防便秘、評估神經功能與意識變化、限制水分)。本題找「錯誤」者:A「便秘最好以清水灌腸」——「清水(低張)灌腸」會經腸道吸收大量自由水,「加重低血鈉與水中毒」,故禁用;SIADH若需灌腸應用等張溶液並優先以高纖飲食、軟便劑處理便秘。本題答案為 A。","options":{"A":"正解(錯誤敘述)。清水灌腸會吸收自由水加重低血鈉,SIADH禁用。","B":"鼓勵高纖維食物防便秘(因限水),正確。","C":"評估神經功能及意識程度變化(防腦水腫),正確。","D":"限制液體攝入是SIADH的核心處置,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"102030-N3-8":{"quick":"頭部外傷後每小時尿量>200mL且尿色很淡,提示「尿崩症」(ADH不足→大量稀釋尿)。","detail":{"background":"頭部外傷、神經外科手術或腦下垂體病變,可能影響下視丘/腦下垂體後葉的抗利尿激素(ADH)分泌,造成「中樞性尿崩症(DI)」:ADH不足使腎無法濃縮尿液→「大量(每小時可>200 mL、每日數公升)、稀釋(尿色很淡、尿比重低)的尿」、煩渴、高血鈉、高血漿滲透壓、脫水。本例「每小時尿量>200 mL且尿色很淡」是尿崩症的典型表現(本題正解C)。相對地SIADH是ADH過多→少尿、濃縮尿、低血鈉。本題答案為 C。","options":{"A":"腦水腫不會造成大量稀釋尿。","B":"腦膜炎非以多尿、尿色淡為表現。","C":"正解。大量稀釋尿提示尿崩症(ADH不足)。","D":"SIADH是少尿、濃縮尿、低血鈉,與本例多尿相反。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"102030-N3-75":{"quick":"尿崩症(中樞性)因抗利尿激素分泌「下降」;並血鈉升高、尿量增多、血漿滲透壓升高。","detail":{"background":"尿崩症(diabetes insipidus, DI):中樞性者「抗利尿激素(ADH)分泌下降」(本題正解C)、腎原性者腎對ADH無反應。結果腎無法回收水分→「多尿(大量稀釋尿)、尿比重與尿滲透壓低」、煩渴、因失水過多致「血清鈉升高、血漿滲透壓升高」、脫水。本題正確者為C(ADH分泌下降)。其餘:A「血清鈉降低」錯(應升高)、B「尿量下降」錯(應多尿)、D「血漿滲透壓下降」錯(應升高)。","options":{"A":"尿崩症失水致血清鈉升高,非降低。","B":"尿崩症是多尿(尿量增多),非下降。","C":"正解。中樞性尿崩症抗利尿激素分泌下降。","D":"尿崩症血漿滲透壓升高,非下降。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"102110-N3-34":{"quick":"SIADH(ADH過多、水滯留、低血鈉)最重要處置是「限水」。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH):ADH過多→水分滯留、稀釋性「低血鈉」、「低」血漿滲透壓、尿液濃縮、水中毒。醫療與護理重點是「限制水分(限水)」(本題正解D),嚴重低血鈉可用3%高張食鹽水並加利尿劑(furosemide)。其餘錯誤:A「矯治高血漿滲透壓」錯——SIADH是「低」滲透壓;B「限鈉」錯——應補鈉而非限鈉;C「禁用利尿劑」錯——可用furosemide協助排水。本題正確者為 D(限水)。","options":{"A":"SIADH是低血漿滲透壓,非高滲透壓。","B":"SIADH是低血鈉,應補鈉而非限鈉。","C":"SIADH可用利尿劑(furosemide)協助排水,非禁用。","D":"正解。SIADH最重要處置是限水。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"103100-N3-69":{"quick":"SIADH須限水、宜攝取高纖維飲食防便秘;不可多喝水、不限鈉、不給低張輸液。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH)的處置原則:①「限制水分」是核心;②嚴重低血鈉給「高張(3%)食鹽水」而非低張輸液;③不應「限鈉」(反而需補鈉);④因限水易便秘,宜「攝取高纖維飲食」防便秘(本題正解D)。本題其餘錯誤:A「鼓勵多喝水」錯(應限水)、B「限鈉飲食」錯(應補鈉)、C「給低張輸液」錯(會加重低血鈉,應給高張)。本題正確者為 D。","options":{"A":"SIADH應限水,非鼓勵多喝水。","B":"SIADH應補鈉,非限鈉飲食。","C":"低張輸液會加重低血鈉,應給高張食鹽水。","D":"正解。限水易便秘,宜攝取高纖維飲食。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"104100-N3-75":{"quick":"SIADH為稀釋性「低血鈉」,故「血鈉增高」為錯誤;其特徵是CVP上升、尿比重與尿滲透壓增加。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH):ADH過多→水分滯留致血容量增加(「中心靜脈壓CVP可能上升」A正確)、尿液濃縮(「尿比重增加」B正確、「尿滲透壓上升」D正確)、但血液被稀釋→「稀釋性低血鈉、低血漿滲透壓」。本題找「錯誤」者:C「血鈉增高」錯誤——SIADH是「低血鈉」(<135),這也是其神經症狀(意識改變、抽搐)的主因。本題答案為 C。","options":{"A":"水滯留致血容量增加,CVP可能上升,正確。","B":"尿液濃縮致尿比重增加,正確。","C":"正解(錯誤敘述)。SIADH為稀釋性低血鈉,非血鈉增高。","D":"尿液濃縮致尿滲透壓上升,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"105090-N3-71":{"quick":"尿崩症尿液稀釋,尿比重「低(常<1.005)」,故「尿比重1.010~1.030」為錯誤;並多尿煩渴、可低血容積休克。","detail":{"background":"尿崩症(DI)臨床表徵:ADH不足/腎無反應→腎無法濃縮尿→「大量稀釋尿」、「尿滲透壓低(可<65~100 mOsm/kg)」(A正確)、尿比重「低(常<1.005)」、「多尿、煩渴(多飲)」(B正確);若補水不及,失水過多致脫水、血鈉升高、血容量不足甚至「低血容積休克」(D正確)。本題找「錯誤」者:C「尿比重1.010~1.030」錯誤——那是接近正常/濃縮的範圍,尿崩症尿比重應「偏低(<1.005)」。本題答案為 C。","options":{"A":"尿滲透壓低(可<65 mOsm/kg),正確。","B":"多尿、煩渴是尿崩症典型,正確。","C":"正解(錯誤敘述)。尿崩症尿比重偏低(<1.005),非1.010~1.030。","D":"失水過多可致低血容積休克,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"106030-N3-5":{"quick":"腦下垂體切除術後尿崩症為失水致「高血鈉」,故「血清鈉<125」為錯誤(那是SIADH的低血鈉)。","detail":{"background":"經蝶骨腦下垂體切除術後可能因影響後葉/下視丘而出現「中樞性尿崩症」:ADH不足→「尿色很淡(A正確)、尿比重<1.005(B正確)」、多尿、煩渴,若不治療則因大量失水而「脫水(D正確)」、血鈉「升高」、血漿滲透壓升高。本題找「錯誤」者:C「血清鈉<125 mEq/L」錯誤——尿崩症失水應為「高血鈉」(>145),「血鈉<125」是SIADH的稀釋性低血鈉。本題答案為 C。","options":{"A":"尿崩症尿色很淡(稀釋尿),正確。","B":"尿比重<1.005(稀釋尿),正確。","C":"正解(錯誤敘述)。尿崩症失水致高血鈉,非血鈉<125。","D":"不治療大量失水會脫水,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"106030-N3-40":{"quick":"腫瘤引起的SIADH須「限水」,故「鼓勵增加水分攝取」為錯誤;應評估意識、監測尿滲透壓與血鈉。","detail":{"background":"某些腫瘤(如小細胞肺癌)會異位分泌ADH造成「SIADH」:ADH過多→水滯留、稀釋性低血鈉、水中毒。護理應「限制水分」、監測血鈉(B、C、D方向正確:評估意識程度、監測尿液滲透壓、監測血中鈉離子濃度)。本題找「錯誤」者:A「鼓勵增加水分攝取」錯誤——SIADH須限水,增加水分會加重低血鈉與水中毒。本題答案為 A。","options":{"A":"正解(錯誤敘述)。SIADH須限水,不可鼓勵增加水分攝取。","B":"評估意識程度(防腦水腫),正確。","C":"監測尿液滲透壓,正確。","D":"監測血中鈉離子濃度,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"106111-N3-5":{"quick":"尿崩症應每小時監測I/O、尿比重、尿色;SIADH是ADH「增加」、尿崩是ADH「不足」,尿崩為高血鈉。","detail":{"background":"頭部外傷/術後抗利尿激素失調的鑑別:①「SIADH」是ADH「分泌增加(過多)」→水滯留、低血鈉(故A「SIADH是ADH分泌減少」錯);②「尿崩症」是ADH「分泌不足(過少)」→多尿、高血鈉(故B「尿崩是ADH太多」錯);③「尿崩症」因大量多尿,須「每小時監測輸出入量(I/O)、尿比重、尿液顏色」與生命徵象(本題正解C);④尿崩症失水致「高血鈉」(故D「尿崩注意低血鈉嗜睡」錯——低血鈉是SIADH)。本題正確者為 C。","options":{"A":"SIADH是ADH分泌「增加」,非減少。","B":"尿崩症是ADH分泌「不足」,非太多。","C":"正解。尿崩症應每小時監測I/O、尿比重、尿色。","D":"尿崩症為高血鈉;低血鈉嗜睡是SIADH表現。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"106111-N3-74":{"quick":"SIADH嚴重低血鈉時可「補充高張(3%)氯化鈉溶液」矯正;它是低張水滯留、最常見症狀為食慾不振。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH):ADH過多→水分滯留致「血容量增加但血液被稀釋(低張、低血鈉)」(故A「體液高張」錯,應為低張稀釋)。處置:輕度限水;嚴重低血鈉(尤其有神經症狀)可「緩慢補充高張氯化鈉(3% NaCl)」矯正低血鈉(本題正解B,須緩慢以防滲透性脫髓鞘);症狀為「食慾不振、噁心、頭痛、意識改變、抽搐」(故C「食慾增加與口渴」錯);臥姿不需頭低腳高(D錯)。本題正確者為 B。","options":{"A":"SIADH是低張(稀釋)水滯留,非體液高張。","B":"正解。嚴重低血鈉可補充高張氯化鈉溶液矯正。","C":"最常見症狀為食慾不振、噁心,非食慾增加與口渴。","D":"不需頭低腳高臥姿。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"107030-N3-72":{"quick":"中樞性尿崩症「不可限制水分」(會脫水),故「限制每日水分以避免代償性體液調節」不適當。","detail":{"background":"尿崩症(DI)照護:①「腎原性(nephrogenic)」尿崩可用「限制飲食鹽分」配合thiazide利尿劑緩解症狀(A適當);②「DDAVP(desmopressin)鼻噴劑」是補充抗利尿素的常用、適合途徑(B適當);③須「密集監測生命徵象、每日體重、尿比重、電解質」(D適當);④「中樞性尿崩症」因大量多尿失水,應「鼓勵足量補水以配合尿量」、絕「不可限制水分」(限水會迅速脫水、高血鈉),故C「限制每日水分以避免代償性體液調節」不適當(本題答案)。本題找「不適當」者為 C。","options":{"A":"腎原性尿崩可限鹽配合thiazide緩解症狀,適當。","B":"DDAVP鼻噴劑是補充抗利尿素的適合途徑,適當。","C":"正解(不適當)。中樞性尿崩不可限水,限水會脫水。","D":"密集監測生命徵象、體重、尿比重、電解質,適當。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"108020-N3-74":{"quick":"SIADH是稀釋性「低血鈉」,護理應防「低血鈉」相關傷害,故「預防與高血鈉有關的潛在傷害」為錯誤。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH)護理:①「遵守限制液體措施」(A正確);②「監測血壓、中心靜脈壓(CVP)及血漿滲透壓」(B正確);③低血鈉致腦水腫,須「監測有無肌肉抽搐或昏迷等中樞神經傷害」(C正確);④SIADH是稀釋性「低血鈉」,應預防「低血鈉」相關傷害(如抽搐、意識改變),故D「預防與高血鈉有關的潛在傷害」錯誤(把方向寫反)。本題找「錯誤」者為 D。","options":{"A":"遵守限制液體措施,正確。","B":"監測血壓、CVP及血漿滲透壓,正確。","C":"監測肌肉抽搐、昏迷等中樞神經傷害,正確。","D":"正解(錯誤敘述)。SIADH是低血鈉,應防低血鈉相關傷害,非高血鈉。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"108110-N3-74":{"quick":"水分剝削試驗用於診斷尿崩症,主要監測「滲透壓、尿比重、體重、生命徵象」,而非檢測鈣鉀離子。","detail":{"background":"水分剝削試驗(water deprivation test)是診斷「尿崩症」的標準試驗:讓病人「限制飲水」後,定時監測「血漿與尿液滲透壓、尿比重、尿量、體重、生命徵象」——正常人禁水後尿液會濃縮(尿滲透壓上升),尿崩症者仍排大量稀釋尿(尿滲透壓不上升);之後給予desmopressin可區分中樞性(有反應)與腎原性(無反應)。本題找「錯誤」者:C「檢測檢體中滲透壓、鈣離子與鉀離子濃度」——此試驗主要看「滲透壓/尿比重/鈉與水分平衡」,而非鈣、鉀離子,故錯誤。其餘A、B、D皆正確。本題答案為 C。","options":{"A":"主要用來診斷尿崩症,正確。","B":"限制飲水後定時採血液與尿液檢體,正確。","C":"正解(錯誤敘述)。主要測滲透壓/尿比重,非鈣、鉀離子。","D":"觀察生命徵象、尿量、血滲透壓與體重,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"111030-N3-70":{"quick":"SIADH常因中樞神經病變、肺部疾病(如肺癌)或藥物引發,「非」通常由泌尿道疾病引發。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH)的成因與表徵:常見原因為「中樞神經病變(頭部外傷、腦瘤、腦炎)、肺部疾病(肺炎、小細胞肺癌異位分泌ADH)、藥物、術後」等,「並非泌尿道疾病」(本題錯誤項A)。表徵:ADH過多→水滯留、稀釋性低血鈉,「最常出現食慾不振、噁心」(B正確)、「血鈉<135」(C正確)、因水分擴張使尿酸排出增加致「低尿酸血症」(D正確)、嚴重時水中毒抽搐。本題找「錯誤」者為 A。","options":{"A":"正解(錯誤敘述)。SIADH常因CNS/肺部疾病/藥物引發,非泌尿道疾病。","B":"最常出現食慾不振,正確。","C":"稀釋性低血鈉,血鈉<135,正確。","D":"水分擴張致低尿酸血症,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"111110-N3-70":{"quick":"SIADH用四環素(demeclocycline)是「阻斷ADH對腎的作用」以排水,非「預防感染」,故為錯誤。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH)護理指導:①「限制液體(如每天<500 mL)」(A正確);②藥物方面用「demeclocycline(去甲基金黴素,一種四環素)」可「拮抗ADH對腎集尿管的作用」、促進排水以矯正低血鈉,並非「預防感染」(本題錯誤項B);③低血鈉致腦水腫,可採「頭部平躺/避免頭高」減少腦部缺血,並監測神經症狀(C方向正確);④限水易便秘,宜「高纖、含適量鈉」食物改善便秘(D正確)。本題找「錯誤」者為 B。","options":{"A":"限制液體(每天<500 mL),正確。","B":"正解(錯誤敘述)。四環素(demeclocycline)是拮抗ADH作用排水,非預防感染。","C":"頭部保持平躺以防腦缺血/水腫,方向正確。","D":"攝取高纖、含鈉食物改善便秘,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"112030-N3-4":{"quick":"腦腫瘤術後尿崩症因「ADH分泌不足」(中樞性)→多尿、稀釋尿、血漿滲透壓升高、高血鈉。","detail":{"background":"腦腫瘤(尤其鞍區)手術後可能傷及下視丘/腦下垂體後葉,造成「中樞性尿崩症」:ADH分泌「不足」(本題正解C)→腎無法濃縮尿→「多尿、尿比重低(比正常人低)、尿色淡」,大量失水致「血漿滲透壓升高、血鈉升高(高血鈉)」、脫水。本題正確者為C(ADH分泌不足)。其餘:A「尿比重比正常人高」錯(應低)、B「尿量多、血漿滲透壓下降」錯(應升高)、D「低血鈉導致抽搐」錯(尿崩是高血鈉;低血鈉抽搐是SIADH)。","options":{"A":"尿崩症尿比重比正常人低,非高。","B":"尿量多但血漿滲透壓升高,非下降。","C":"正解。中樞性尿崩因抗利尿素(ADH)分泌不足所致。","D":"尿崩症為高血鈉;低血鈉抽搐屬SIADH。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"112030-N3-63":{"quick":"SIADH因ADH過多使尿液濃縮,尿比重「升高」,故「低尿比重」為錯誤;其特徵為低血鈉、低尿量、低血漿滲透壓。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH)的臨床表徵:ADH過多→水分滯留、尿液濃縮減量→「低尿量(B正確)」、血液被稀釋致「低血清鈉(A正確)、低血漿滲透壓(C正確)」;但尿液濃縮使「尿比重與尿滲透壓『升高』」。本題找「錯誤」者:D「低尿比重」錯誤——SIADH尿液濃縮,尿比重應「升高」。記憶:SIADH=血液稀釋(低鈉低滲)、尿液濃縮(高比重)。本題答案為 D。","options":{"A":"稀釋性低血清鈉,正確。","B":"水滯留致低尿量,正確。","C":"低血漿滲透壓,正確。","D":"正解(錯誤敘述)。SIADH尿液濃縮,尿比重升高,非低尿比重。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"112180-N3-44":{"quick":"中樞性尿崩症因「抗利尿激素分泌不足」導致;表現多尿、稀釋尿(尿比重低)、無水腫。","detail":{"background":"中樞性尿崩症(central DI)的核心是下視丘/腦下垂體後葉病變使「抗利尿激素(ADH)分泌不足」(本題正解D)→腎無法回收水分→「多尿、尿比重低(<1.005)、尿滲透壓低」、大量失水致「血漿滲透壓升高、高血鈉」、脫水(無水腫)。本題正確者為D(ADH分泌不足)。其餘:A「尿比重>1.030」錯(應低)、B「尿量少、血漿滲透壓下降」錯(應多尿、滲透壓升高)、C「全身水腫」錯(尿崩是脫水非水腫)。","options":{"A":"尿崩症尿比重低(<1.005),非>1.030。","B":"尿崩症多尿、血漿滲透壓升高,非尿少滲透壓下降。","C":"尿崩症為脫水,無全身水腫。","D":"正解。中樞性尿崩因抗利尿激素分泌不足導致。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"113030-N3-43":{"quick":"SIADH因限水易便秘,應鼓勵「高纖維」食物,故「鼓勵多攝取低纖食物」為錯誤;可給3%NS+furosemide、限水、監測抽搐。","detail":{"background":"抗利尿激素分泌不當症候群(SIADH)臨床照護:①嚴重低血鈉可「依醫囑補充3%高張食鹽水並注射furosemide(Lasix)」協助排除多餘自由水(A正確);②因低血鈉腦水腫,「監測肌肉抽搐與昏迷」(C正確);③核心是「限制水分(每日<1000 cc)」(D正確);④因限水容易便秘,飲食應鼓勵「高纖維」而非低纖,故B「鼓勵多攝取低纖食物」錯誤。本題找「錯誤」者為 B。","options":{"A":"補充3%高張食鹽水+furosemide,正確。","B":"正解(錯誤敘述)。限水易便秘,應鼓勵高纖維而非低纖食物。","C":"監測肌肉抽搐與昏迷徵象,正確。","D":"限制水分每日<1000 cc,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"113100-N3-44":{"quick":"尿崩症因大量失水→脫水、體液容積「不足」,故「體液容積過剩」為錯誤;表現多尿、煩渴、尿比重降低。","detail":{"background":"尿崩症(DI)臨床表徵:ADH不足/腎無反應→腎無法濃縮尿→「多尿(A正確)、煩渴(B正確)、尿比重降低(C正確、稀釋尿)」,大量失水致脫水、血鈉升高、血漿滲透壓升高、「體液容積『不足』(低血容積)」。本題找「錯誤」者:D「體液容積過剩」錯誤——尿崩症是失水脫水、體液「不足」(體液過剩是SIADH)。本題答案為 D。","options":{"A":"尿崩症多尿,正確。","B":"尿崩症煩渴(代償多飲),正確。","C":"尿崩症尿比重降低(稀釋尿),正確。","D":"正解(錯誤敘述)。尿崩症失水致體液不足,非體液過剩。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"113180-N3-43":{"quick":"desmopressin(DDAVP)鼻噴劑經「鼻黏膜」吸收,不是吸入肺部,故「確認藥劑吸入肺部」為錯誤。","detail":{"background":"尿崩症病人(中樞性)用「desmopressin(DDAVP)」補充抗利尿素的出院衛教:①避免咖啡、茶、酒等「利尿」飲料食物(A正確);②DDAVP「鼻噴霧劑」是經「鼻腔黏膜」吸收,使用時頭部稍前傾、不需用力吸入肺部,「確認藥劑吸入肺部」是錯誤的(本題錯誤項B,藥劑進肺反而無效且不當);③睡前少喝水減少夜尿(C正確);④教導用藥方式、劑量、時間與副作用並定期返診(D正確)。本題找「錯誤」者為 B。","options":{"A":"避免食用利尿的飲料與食物,正確。","B":"正解(錯誤敘述)。DDAVP鼻噴劑經鼻黏膜吸收,非吸入肺部。","C":"睡前少喝水減少夜尿,正確。","D":"教導用藥方式、劑量、時間、副作用並定期追蹤,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"114030-N3-45":{"quick":"desmopressin鼻噴劑經鼻黏膜吸收,不需「吸氣增加藥效」(吸氣會把藥吸入肺反而無效),故為錯誤。","detail":{"background":"尿崩症護理處置:①「中樞性尿崩症」因大量多尿失水,應「鼓勵多喝開水以維持水分與電解質平衡」(A正確,中樞尿崩不可限水);②使用「desmopressin鼻噴劑」時藥物經「鼻腔黏膜」吸收,「不應用力吸氣」(吸氣會把藥吸進肺部反而降低療效),故B「吸氣以增加藥效」錯誤(本題答案);③「腎因性尿崩」可給「Thiazide利尿劑配合限鹽」緩解(C正確);④「Vasopressin Tannate(油性懸浮液)」抽藥前須「溫熱並搖勻」使均勻(D正確)。本題找「錯誤」者為 B。","options":{"A":"中樞性尿崩應鼓勵多喝水維持平衡,正確。","B":"正解(錯誤敘述)。desmopressin鼻噴劑經鼻黏膜吸收,不應吸氣入肺。","C":"腎因性尿崩給Thiazide及限鹽,正確。","D":"Vasopressin Tannate油性懸浮液抽藥前須溫熱搖勻,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"114100-N3-44":{"quick":"尿崩症脫水時心搏「加快」(代償),故「心搏下降」為錯誤;並有黏膜乾燥、眼眶凹陷、絲脈。","detail":{"background":"尿崩症(DI)因大量多尿失水致脫水與低血容積,理學評估呈:「黏膜乾燥(A正確)、眼眶凹陷(B正確)、皮膚張力差、脈搏細弱(絲脈)(D正確)」,並因血容量不足代償而「心搏『加快』(心搏過速)」、血壓下降。本題找「錯誤」者:C「心搏下降」錯誤——脫水低血容積會使心搏「加快」代償,而非下降。本題答案為 C。","options":{"A":"脫水致黏膜乾燥,正確。","B":"脫水致眼眶凹陷,正確。","C":"正解(錯誤敘述)。脫水低血容積代償使心搏加快,非下降。","D":"低血容積致脈搏細弱(絲脈),正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}},"114170-N3-41":{"quick":"中樞性尿崩症表現「多尿、劇渴、心搏過速(脫水代償)」;尿比重低、血漿滲透壓高、體液不足。","detail":{"background":"中樞性尿崩症(central DI)的最適當描述:ADH不足→腎無法濃縮尿→「多尿(大量稀釋尿)、劇渴(代償多飲)」,大量失水致脫水低血容積、代償性「心搏過速」(本題正解C)。檢驗:尿比重「低(<1.005,非1.050)」、血漿滲透壓「升高(>295,非290偏低)」、體液容積「不足(非過多)」、血鈉升高。本題正確者為C(多尿、劇渴、心搏過速)。其餘A尿比重過高、B血漿滲透壓偏低、D體液過多皆與尿崩相反。","options":{"A":"尿崩症尿比重低(<1.005),非1.050。","B":"尿崩症血漿滲透壓升高(>295),290偏低不符。","C":"正解。中樞性尿崩有多尿、劇渴、脫水致心搏過速。","D":"尿崩症體液容積不足(脫水),非過多。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(後葉/水鈉平衡)","實用內外科護理學"]}}},TO=["E1糖尿病診斷分型與內分泌生理", "E2糖尿病藥物治療與胰島素", "E3糖尿病飲食運動足部與慢性併發症", "E4糖尿病急症與低血糖", "E5甲狀腺疾病", "E6副甲狀腺與鈣磷代謝", "E7腎上腺疾病與類固醇治療", "E8腦下垂體與下視丘疾病", "E9尿崩症與抗利尿激素分泌不當症候群"],LEC={"E1糖尿病診斷分型與內分泌生理":{"title":"E1 糖尿病診斷分型與內分泌生理 複習講義","html":"<h3>一、內分泌腺體與激素對應(必背)</h3>\n<p>胰島:<b>β細胞→胰島素(降血糖)、α細胞→升糖素(升血糖)、δ細胞→體制素</b>。腎上腺「皮質」分泌類固醇(皮質醇、醛固酮、性類固醇)、「髓質」分泌兒茶酚胺。腦下垂體「前葉」分泌 GH/PRL/TSH/ACTH/FSH/LH、「後葉」釋放 ADH 與催產素。降鈣素由甲狀腺 C 細胞、PTH 由副甲狀腺。</p>\n<h3>二、血糖調節激素</h3>\n<p><b>唯一降血糖</b>=胰島素;升糖(反調節)=升糖素、皮質醇、生長激素、腎上腺素。故壓力、感染、類固醇會升血糖。升糖素升糖靠「肝醣分解 glycogenolysis」與「糖質新生 gluconeogenesis(由非醣前驅物)」,兩者不同。</p>\n<h3>三、第一型 vs 第二型糖尿病</h3>\n<p><b>第一型</b>:自體免疫破壞β細胞→胰島素絕對缺乏;血中可測得胰島細胞抗體(ICA)、C-peptide 測不到;好發兒童/學齡;急症以 <b>DKA</b> 為主;須終身注射胰島素。<b>第二型</b>:胰島素阻抗+分泌相對不足;與自體免疫無關;多成年/肥胖;初期常無症狀;急症以 <b>HHS</b> 為主;可先飲食/口服藥。第二型遺傳傾向更強。</p>\n<h3>四、診斷標準(任一,無症狀需重複確認)</h3>\n<p>① 空腹血糖(FPG)<b>≧126</b> mg/dL ② OGTT 2h <b>≧200</b> ③ HbA1c <b>≧6.5%</b> ④ 典型症狀+隨機血糖≧200。前期:FPG 100~125(IFG)、OGTT 140~199(IGT)。</p>\n<h3>五、糖化血色素(HbA1c)</h3>\n<p>反映<b>過去約2~3個月</b>平均血糖(紅血球壽命約120天);<b>抽血不需禁食、不受抽血時間影響</b>;正常<5.7%、目標<7%、≧6.5%可診斷。HbA1c 13% 代表控制極差(約平均血糖326)。缺鐵、溶血、輸血會干擾。尿糖受腎糖閾(約180)限制,不能作診斷或反映平均血糖。</p>"},"E2糖尿病藥物治療與胰島素":{"title":"E2 糖尿病藥物治療與胰島素 複習講義","html":"<h3>一、口服降血糖藥</h3>\n<p><b>雙胍類(metformin)</b>:第二型首選;抑制肝糖質新生、增敏;不致低血糖、不增重;副作用=腸胃刺激、長期致<b>維生素B12缺乏</b>;<b>腎/肝功能不良、缺氧、顯影劑前後慎用/停用(乳酸中毒)</b>;隨餐或飯後服。<b>磺醯脲類(sulfonylurea,如glipizide)</b>:刺激β細胞分泌胰島素;飯前30分服;易<b>低血糖</b>、增重。<b>α-葡萄糖苷酶抑制劑(acarbose)</b>:延緩腸道醣吸收;<b>與第一口飯一起嚼服</b>;脹氣。<b>GLP-1促效劑(exenatide)</b>:皮下注射。</p>\n<h3>二、胰島素作用時間</h3>\n<p>速效(lispro/aspart,高峰1~2h)、短效(RI,高峰2~4h)、中效(<b>NPH,高峰6~12h</b>、持續18~24h)、長效(glargine,無明顯高峰)。低血糖最易發生在「藥效高峰」未進食時。</p>\n<h3>三、胰島素注射與保存</h3>\n<p>皮下吸收速率:<b>腹部最快>上臂>大腿>臀部</b>;<b>運動、按摩、發燒(體溫升高)會加速吸收</b>(故勿注射在即將運動的肢體)。注射前30分回溫;混濁(NPH)型滾動勿搖晃;推入後停3~5秒、輕壓勿搓揉;部位輪替。<b>未開封冷藏2~8°C(勿結凍)、使用中可室溫約28天;出國隨身攜帶勿放行李艙(會結凍失效)</b>;結塊變色不可用。</p>\n<h3>四、生病日(sick day)劑量調整</h3>\n<p>感染、外傷、壓力(升糖)→血糖升高,常需<b>增加</b>胰島素;<b>食慾不振、進食減少→血糖偏低,不宜增加</b>胰島素。手術前禁食應暫停口服降糖藥,改依血糖處理並持續觀察低血糖。</p>"},"E3糖尿病飲食運動足部與慢性併發症":{"title":"E3 糖尿病飲食運動足部與慢性併發症 複習講義","html":"<h3>一、飲食原則</h3>\n<p>三大營養素:醣類<b>50~60%</b>、蛋白質<b>15~20%</b>、脂肪<b><30%</b>(飽和脂肪<7%)、<b>膽固醇<300 mg/天</b>、高纖維、限酒少鹽、定時定量。<b>升糖指數(GI)</b>:選低GI(全穀、豆類、多數蔬菜),避免高GI(白飯、白麵包、根莖瓜果、含糖飲料);乳品GI偏低。</p>\n<h3>二、運動原則</h3>\n<p>時機<b>飯後1~2小時</b>(避免空腹/飯前低血糖);運動前暖身、後緩和;選大肌肉群有氧、避免高衝擊(舉重短跑會升血壓傷眼底);隨身帶糖果;血糖>250~300且尿酮陽性或<100暫緩。運動會<b>提高</b>胰島素敏感性而降血糖;剛在腿部注射胰島素勿立即跑步(加速吸收致低血糖)。</p>\n<h3>三、糖尿病足護理</h3>\n<p>因周邊神經病變感覺遲鈍:<b>禁用熱水袋/電毯/烤燈</b>(易燙傷),洗腳前以手肘/手背測水溫(<40°C);不赤足、穿鞋前檢查異物;<b>趾甲平剪勿剪入甲溝、不自行剝除硬繭雞眼</b>;適度保濕(趾縫除外);穿合腳吸汗棉襪(不過大不過緊);<b>戒菸</b>;每日檢視;傷口儘速就醫。評估:神經病變使<b>跟腱反射減弱</b>(非亢進)、震動覺消失、皮膚乾裂。</p>\n<h3>四、慢性併發症(大血管 vs 小血管)</h3>\n<p><b>大血管(動脈粥狀硬化)</b>:冠心病/心肌梗塞、腦中風、周邊動脈疾病。<b>小(微)血管</b>:視網膜病變、腎病變、周邊神經病變(手腳麻木)。<b>視網膜病變</b>與血糖控制不良高度相關:非增殖性(微血管瘤/出血/滲出)→增殖性(新生血管→玻璃體出血/牽引性剝離);雷射/抗VEGF可<b>防惡化但無法恢復已失視力</b>。</p>"},"E4糖尿病急症與低血糖":{"title":"E4 糖尿病急症與低血糖 複習講義","html":"<h3>一、低血糖(<70 mg/dL)</h3>\n<p>症狀兩類:<b>交感興奮</b>(心悸、冒冷汗、皮膚<b>濕冷蒼白</b>、發抖、飢餓、手指發麻)與<b>神經低血糖</b>(頭痛、複視、注意力差、意識改變、抽搐)。處理「<b>15-15法則</b>」:清醒者立即口服<b>15g快速吸收醣</b>(果汁120~180cc、方糖3~4顆、葡萄糖錠),15分後復測;昏迷者靜脈推50%葡萄糖或肌注glucagon。常因藥物過量、進食減少、運動增加、飲酒。</p>\n<h3>二、糖尿病酮酸中毒(DKA)</h3>\n<p>多見<b>第一型</b>、胰島素中斷或感染誘發。胰島素絕對缺乏→脂解生酮→<b>代謝性酸中毒</b>。表現:高血糖(常300~600)、<b>Kussmaul深快呼吸+爛蘋果(酮)味</b>、皮膚溫暖潮紅乾燥、脫水心搏過速低血壓、初期多尿、噁心腹痛、意識改變。檢驗:pH↓、HCO3↓、酮體陽性。處置:<b>0.9%NS輸液→靜脈持續低劑量RI→補鉀(尿量足)→血糖降至約200~300加糖→pH<6.9~7.0才給NaHCO3</b>。</p>\n<h3>三、高血糖高滲透壓狀態(HHS)</h3>\n<p>多見<b>第二型老年人</b>;仍有少量胰島素抑制脂解→<b>無酮酸、無Kussmaul</b>。血糖極高(常>600)、血漿滲透壓>320、嚴重脫水(滲透性利尿)、意識障礙甚至休克。誘因:感染、利尿劑/類固醇、TPN、急性病。處置以<b>大量補液</b>為先+胰島素+補鉀(無需NaHCO3)。</p>\n<h3>四、Somogyi 效應 vs 黎明現象</h3>\n<p><b>Somogyi</b>:夜間胰島素過量→低血糖→反彈性「晨間高血糖」;處理是<b>減少</b>夜間胰島素。<b>黎明現象</b>:凌晨升糖激素致晨間高血糖,需<b>增加</b>夜間長效胰島素。測凌晨2~3點血糖鑑別。</p>"},"E5甲狀腺疾病":{"title":"E5 甲狀腺疾病 複習講義","html":"<h3>一、甲狀腺機能亢進(Grave氏病最常見)</h3>\n<p>代謝與交感亢進:怕熱多汗、心搏過速/心房顫動、<b>食慾增加但體重減輕</b>、腸蠕動增加(腹瀉)、神經質手抖、突眼、甲狀腺腫、脛前黏液水腫、月經減少、脈壓增大;反射亢進。檢驗 <b>T3/T4↑、TSH↓</b>。飲食<b>高熱量、高蛋白、高碳水、低纖維</b>(易腹瀉)、限咖啡因、補水;環境安靜限訪客。</p>\n<h3>二、抗甲狀腺治療</h3>\n<p><b>硫醯胺類(PTU/methimazole)</b>:抑制合成;先大劑量再減量、需服1~2年、症狀消失不可即停;藥效數週顯現;副作用<b>顆粒性白血球減少(發燒喉痛即就醫)、肝毒性</b>。<b>碘製劑(Lugol/SSKI)</b>:抑制釋放與合成、減血流,術前用;<b>以開水/果汁稀釋、用吸管</b>(防染牙)、<b>不宜超過2週</b>(甲狀腺逸脫)。<b>放射碘(131I)</b>:破壞濾泡細胞;空腹服、服後多喝水、輻射防護(限訪客、避孕婦幼兒);多年後易<b>甲狀腺低下</b>。</p>\n<h3>三、甲狀腺機能低下/黏液水腫</h3>\n<p>代謝下降:怕冷、體重增加、嗜睡、皮膚乾、<b>便秘、高血脂、心搏過緩、反射延遲</b>、稀釋性低血鈉、<b>非凹陷性黏液水腫</b>;女性多。<b>原發性 T4↓、TSH↑</b>。<b>黏液水腫昏迷</b>:低體溫、昏迷、低血鈉低血糖高膽固醇,治療靜脈補甲狀腺素+保暖。飲食<b>低熱量、高纖維、低脂低膽固醇</b>;保暖勿用電毯(易燙傷)。L-thyroxine 半衰期約7天、<b>每日一次空腹服、終身不可自停</b>、會升血糖與增強warfarin/digoxin、新生兒須儘早高劑量。</p>\n<h3>四、甲狀腺風暴 & 甲狀腺切除術後</h3>\n<p><b>風暴</b>:高燒、譫妄、心搏過速、free T4↑/TSH↓;處置抗甲狀腺藥+碘劑+β阻斷劑+類固醇+降溫補液,<b>退燒禁用aspirin</b>(置換T4升游離T4)。<b>切除術後</b>:採半坐臥、頭頸枕頭支托;鼓勵深呼吸咳嗽(支托頸部)、給冰涼流質;備氣切包與鈣劑;觀察<b>出血/喉頭水腫(最危急)、喉返神經受損(聲嘶)、低血鈣(副甲狀腺受損→Chvostek/Trousseau)、風暴</b>。</p>"},"E6副甲狀腺與鈣磷代謝":{"title":"E6 副甲狀腺與鈣磷代謝 複習講義","html":"<h3>一、副甲狀腺素(PTH)作用</h3>\n<p>PTH <b>升血鈣、降血磷</b>:①促<b>骨鈣釋出(溶骨)</b>②腎遠端<b>鈣再吸收、排磷</b>③活化維生素D→促<b>腸道鈣吸收</b>。</p>\n<h3>二、副甲狀腺機能亢進(PTH↑)</h3>\n<p>生化:<b>高血鈣、低血磷、高鈣尿、高磷尿</b>。臨床:骨鈣流失(骨痛、骨質疏鬆、纖維性骨炎、病理性骨折)、腎結石、<b>多尿煩渴</b>、便秘噁心、消化性潰瘍(高鈣→胃泌素↑)、心律不整(QT縮短)、倦怠。護理:<b>限鈣、大量喝水(>2500~3000mL)防結石、蔓越莓酸化尿液、高纖防便秘</b>。</p>\n<h3>三、副甲狀腺機能低下(PTH↓)</h3>\n<p>生化:<b>低血鈣、高血磷</b>。低血鈣使神經肌肉興奮性↑→手足搐搦、口周指端麻刺、<b>Chvostek徵象(叩面神經面肌抽動)、Trousseau徵象(壓脈帶致腕痙攣)陽性</b>、喉痙攣、抽搐、白內障(慢性)。<b>急性抽搐靜脈緩注10%葡萄糖酸鈣</b>(勿給磷/重碳酸鹽,會更降鈣)、<b>床邊備氣切包</b>;飲食<b>高鈣、低磷</b>(避免乳酪奶蛋黃等高磷)、可飯前服氫氧化鋁結合磷;補充鈣與維生素D。<b>鹼中毒會加重抽搐、酸中毒緩解</b>。</p>\n<h3>四、Chvostek/Trousseau 速記</h3>\n<p>兩徵象皆陽性=<b>低血鈣</b>(最常見病因為副甲狀腺功能低下、甲狀腺切除誤傷副甲狀腺)。</p>"},"E7腎上腺疾病與類固醇治療":{"title":"E7 腎上腺疾病與類固醇治療 複習講義","html":"<h3>一、庫欣氏症候群(皮質醇過多)</h3>\n<p>中央性肥胖、圓月臉、水牛肩、皮膚變薄/紫紋/瘀斑、肌肉無力(蛋白分解)、骨質疏鬆;<b>高血壓、高血糖、高血鈉、低血鉀性鹼中毒</b>;免疫抑制(嗜中性球↑但淋巴球/嗜伊紅↓)、傷口癒合差、多毛。診斷:<b>24小時尿游離皮質醇</b>、地塞米松抑制試驗、深夜唾液皮質醇。飲食:<b>高蛋白、高鉀、高鈣、低鈉、低熱量</b>。</p>\n<h3>二、愛迪生氏病/危象(皮質醇+醛固酮+雄性素不足)</h3>\n<p>原發性:<b>低血鈉、高血鉀、低血糖、低血壓</b>、體重減輕、<b>皮膚黏膜色素沉著(ACTH/MSH↑)</b>。<b>危象</b>:嚴重低血壓休克、低血鈉高血鉀低血糖、脫水、發燒→<b>立即靜脈hydrocortisone+大量NS+補糖</b>;護理補水補鈉、避高鉀食物。續發性(類固醇停藥)ACTH低→<b>無色素沉著</b>。</p>\n<h3>三、嗜鉻細胞瘤(腎上腺髓質、兒茶酚胺過多)</h3>\n<p><b>5P</b>:高血壓(Pressure)、頭痛(Pain)、心悸(Palpitation)、流汗(Perspiration)、蒼白(Pallor);<b>高血糖/尿糖</b>。診斷<b>尿VMA/metanephrines</b>(非血)。術前先<b>α阻斷劑</b>再β阻斷劑、擴容;<b>術後兒茶酚胺驟降易低血壓與低血糖</b>,維持尿量≥30 mL/hr、補液、必要時補皮質醇。</p>\n<h3>四、原發性醛固酮過多症(Conn/康氏)</h3>\n<p>醛固酮過多保鈉排鉀排氫→<b>高血鈉、低血鉀、代謝性鹼中毒、高血壓、高血容積</b>;低血鉀致肌肉無力、心律不整、多尿夜尿。<b>限鈉</b>、spironolactone、手術。</p>\n<h3>五、長期類固醇用藥</h3>\n<p>副作用=醫源性庫欣:<b>高血糖、低血鉀、留鈉水(高血壓)、骨鬆、消化性潰瘍出血、易感染</b>。護理:<b>飯後/合併制酸劑、觀察大便顏色、限鈉補鉀補鈣、高蛋白</b>、<b>不可自行停藥(漸減)、壓力時增量</b>(驟停→腎上腺危象)。</p>"},"E8腦下垂體與下視丘疾病":{"title":"E8 腦下垂體與下視丘疾病 複習講義","html":"<h3>一、下視丘-腦下垂體解剖</h3>\n<p>下視丘位於腦下垂體「<b>之上</b>」。下視丘的釋放/抑制因子經「<b>下視丘-垂體門脈血管系統</b>」直接送達「前葉」調控其激素;藉「<b>神經軸突(神經衝動)</b>」控制「後葉」釋放 ADH 與催產素。前葉:GH/PRL/TSH/ACTH/FSH/LH;後葉:ADH、催產素。</p>\n<h3>二、腦下垂體腫瘤</h3>\n<p>常見腺瘤:<b>泌乳素瘤(最常見)、生長激素瘤、ACTH瘤</b>(LH瘤罕見)。向上壓迫<b>視交叉→雙顳側偏盲</b>。經蝶骨切除術後:<b>避免擤鼻、打噴嚏、咳嗽、彎腰、用力解便</b>(防出血與CSF漏);鼻部清澈水樣液以<b>尿糖試紙測葡萄糖</b>辨識CSF漏;警覺術後<b>尿崩症</b>(多尿劇渴低尿比重)、必要時補皮質醇(飯後服)。<b>腦下垂體中風(apoplexy)</b>:突發頭痛、頸僵、畏光、視力受損、急性垂體功能低下,<b>不致肢體偏癱</b>。</p>\n<h3>三、生長激素過多</h3>\n<p><b>青春期前(骨骺未閉合)→巨人症</b>(縱向長高);<b>成人(骨骺已閉合)→肢端肥大症</b>(肢端與顏面骨增大、軟組織增生、皮膚增厚<b>多汗多毛</b>、聲粗、內臟肥大、關節痛、腕隧道症候群、<b>葡萄糖耐受不良/高血糖</b>)。生長激素屬升糖激素(不會低血糖)。治療:經蝶骨切除(可能復發)、放射線、<b>Octreotide(體制素類似物)</b>。</p>\n<h3>四、腦下垂體前葉功能低下</h3>\n<p><b>席漢氏症候群(Sheehan)</b>:產後大出血致前葉缺血壞死;以 <b>GH 缺乏最早最常見</b>;ACTH不足→無力低血糖低血壓;TSH不足→黏液水腫。</p>"},"E9尿崩症與抗利尿激素分泌不當症候群":{"title":"E9 尿崩症與抗利尿激素分泌不當症候群 複習講義","html":"<h3>一、抗利尿激素(ADH)生理</h3>\n<p>ADH 由下視丘製造、腦下垂體後葉釋放,作用於腎集尿管使其<b>回收水分(濃縮尿)</b>。ADH 過多/不足分別造成 SIADH 與尿崩症,是水鈉平衡的兩個對立疾病。</p>\n<h3>二、尿崩症(DI,ADH不足或腎無反應)</h3>\n<p>中樞性=ADH分泌不足(頭部外傷、腦瘤、垂體手術);腎原性=腎對ADH無反應。結果:<b>大量稀釋尿(每日數公升、尿比重<1.005、尿滲透壓低)、煩渴多飲</b>;失水致<b>高血鈉、高血漿滲透壓、脫水、低血容積、心搏過速、可低血容積休克</b>。診斷:<b>水分剝削試驗</b>(限水後測血/尿滲透壓、尿比重、體重、生命徵象;尿崩者尿不濃縮)。治療:中樞性給 <b>desmopressin(DDAVP)鼻噴劑(經鼻黏膜吸收,勿用力吸入肺)</b>;腎原性給 <b>thiazide+限鹽</b>;<b>中樞性尿崩不可限水</b>(會脫水),須鼓勵補水配合尿量。每小時監測 I/O、尿比重、尿色。</p>\n<h3>三、抗利尿激素分泌不當症候群(SIADH,ADH過多)</h3>\n<p>常因 CNS 病變、<b>肺癌(異位ADH)</b>、藥物、術後。ADH過多→<b>水分滯留</b>→<b>血液稀釋(低血鈉<135、低血漿滲透壓)、尿液濃縮(尿比重與尿滲透壓高、尿量少)、CVP上升、水中毒</b>(食慾不振、噁心、頭痛、意識改變、抽搐)。處置核心:<b>限水(每日<500~1000 mL)</b>;嚴重低血鈉緩慢補 <b>3%高張食鹽水+furosemide</b>;<b>demeclocycline(四環素)拮抗ADH</b>排水;限水易便秘→<b>高纖飲食</b>。<b>勿補鈉不足而限鈉、勿給低張輸液、勿清水灌腸(加重低血鈉)</b>。</p>\n<h3>四、DI vs SIADH 速記</h3>\n<p><b>尿崩症</b>=多尿、稀釋尿(低比重)、<b>高血鈉</b>、脫水→補水/DDAVP。<b>SIADH</b>=少尿、濃縮尿(高比重)、<b>低血鈉</b>、水中毒→限水/高張鈉。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^E(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n3_endo_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
