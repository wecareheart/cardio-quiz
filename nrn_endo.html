眶凹陷","C":"心搏下降","D":"脈搏呈絲脈"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"system_code":"S6","system_name":"內分泌與代謝","topic":"E9尿崩症與抗利尿激素分泌不當症候群","topic_code":"E9","q_num":44,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"黏膜乾燥","B":"眼眶凹陷","C":"心搏下降","D":"脈搏呈絲脈"},"img":""},{"id":"114170-N3-41","code":"114170","roc":"114","cat":"N3","catname":"內外科護理學","num":41,"stem":"有關中樞性尿崩症,下列敘述何者最適當?","opts":{"A":"尿比重1.050","B":"血漿滲透壓290 mOsm/kg","C":"多尿、劇渴、心搏過速","D":"體液容積過多"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"system_code":"S6","system_name":"內分泌與代謝","topic":"E9尿崩症與抗利尿激素分泌不當症候群","topic_code":"E9","q_num":41,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"尿比重1.050","B":"血漿滲透壓290 mOsm/kg","C":"多尿、劇渴、心搏過速","D":"體液容積過多"},"img":""}],E={"101030-N3-74":{"quick":"體重未減又無自我監測紀錄→用糖化血色素(HbA1c)客觀回看過去2~3個月平均血糖。","detail":{"background":"糖化血色素(HbA1c)反映「過去2~3個月」紅血球壽命期間血糖與血色素非酵素性糖化的平均值,不受單次飲食、抽血時間或當下情緒壓力影響,故抽血前不需禁食。它是評估長期血糖控制最客觀的指標,ADA 以 HbA1c≧6.5% 作為糖尿病診斷標準之一,一般控制目標<7%。本題病人主訴有遵從飲食但體重未減、又未帶血糖紀錄,主觀資料不可靠,護理師應優先取得「能客觀回顧長期控制」的 HbA1c,以判斷自述是否屬實。飯後血糖、尿糖、OGTT 只反映「當下或單點」狀態,無法評估這3個月的整體控制。","options":{"A":"飯後血糖只反映單次餐後狀態,無法回顧過去數月控制成效。","B":"尿糖受腎糖閾(約180 mg/dL)影響、敏感度低,不能反映平均血糖。","C":"正解。HbA1c 客觀反映過去2~3個月平均血糖,最適合驗證病人自述的控制情形。","D":"OGTT 主要用於「診斷」糖尿病或妊娠糖尿病的篩檢,不用於追蹤已確診者的長期控制。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"101110-N3-6":{"quick":"尿糖受腎糖閾(約180 mg/dL)限制,輕度糖尿病血糖未達閾值時可無尿糖,故尿糖不可作診斷標準。","detail":{"background":"正常腎小管會把濾過的葡萄糖幾乎完全再吸收,只有血糖超過「腎糖閾(renal threshold,約180 mg/dL)」時,超量葡萄糖才會出現在尿中(糖尿)。因此尿糖陽性代表血糖曾高於約180,但血糖126~180 之間(已達糖尿病診斷126的程度)仍可能驗不到尿糖→輕度糖尿病不一定出現尿糖。尿糖也受腎糖閾個體差異(老人閾值升高、孕婦閾值下降)、藥物與留尿時間影響,敏感度與特異度都不足,僅能作粗略居家輔助參考,不能作為糖尿病的診斷標準(診斷依血糖/HbA1c)。尿糖與當下血糖之間有時間落差,兩者不會「同時」變動。","options":{"A":"血糖須超過腎糖閾約180 才會出現尿糖,而非126,故敘述錯誤。","B":"正解。血糖未達腎糖閾時驗不到尿糖,輕度糖尿病可無尿糖。","C":"尿糖敏感/特異度不足,不能作為糖尿病診斷標準,診斷依血糖或HbA1c。","D":"尿糖反映「先前」超過腎糖閾的血糖,與當下血糖有落差,不會同時上升。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"101110-N3-7":{"quick":"第二型糖尿病有明顯家族遺傳傾向,病人罹病風險確實較高,應誠實衛教並建議定期血糖檢驗。","detail":{"background":"第二型糖尿病的遺傳傾向比第一型更強,具有家族史者罹病風險明顯升高(同卵雙胞胎一致率高),屬多基因遺傳合併肥胖、缺乏運動等環境因子共同作用。面對「會不會被遺傳」的擔憂,護理師應提供誠實、不誇大也不否認的衛教:有家族史代表風險較高,但可透過維持理想體重、規律運動、健康飲食「降低或延後」發病,並建議定期篩檢血糖以早期發現。錯誤的安慰(如保證一定能預防、或說只有第一型才遺傳)會誤導病人。第一型糖尿病雖也有 HLA 相關遺傳但盛行率低,「具遺傳危險的是第二型較顯著」。","options":{"A":"維持體重與運動可降低風險但「不能保證預防」,過度保證屬不實衛教。","B":"恰相反,第二型的家族遺傳傾向比第一型更明顯。","C":"父母任一方有第二型糖尿病皆會增加子代風險,非僅限父親。","D":"正解。誠實告知風險較高並建議定期血糖檢驗,是合宜的衛教。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"103030-N3-69":{"quick":"腎上腺皮質分泌糖皮質類固醇(cortisol);胰島素由β細胞、催產素由後葉、降鈣素由甲狀腺C細胞。","detail":{"background":"內分泌腺體與其分泌激素須清楚對應:胰臟胰島中,β(beta)細胞分泌胰島素、α(alpha)細胞分泌升糖素、δ細胞分泌體制素;腎上腺「皮質」由外而內分泌糖皮質類固醇(cortisol)、礦物皮質醇(aldosterone)與少量性類固醇,腎上腺「髓質」分泌兒茶酚胺(腎上腺素/正腎上腺素);腦下垂體「前葉」分泌 GH、PRL、TSH、ACTH、FSH、LH,「後葉」儲存釋放抗利尿激素(ADH)與催產素(oxytocin);降鈣素由甲狀腺濾泡旁(C)細胞分泌,副甲狀腺則分泌副甲狀腺素(PTH)。本題只有 B 對應正確。","options":{"A":"胰島素由胰島β細胞分泌,α細胞分泌的是升糖素。","B":"正解。腎上腺皮質分泌糖皮質類固醇(cortisol)。","C":"催產素由腦下垂體「後葉」釋放,非前葉。","D":"降鈣素由甲狀腺C細胞分泌;副甲狀腺分泌的是副甲狀腺素(PTH)。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"103030-N3-71":{"quick":"第一型糖尿病為自體免疫破壞胰島β細胞,血中可測得胰島細胞抗體(ICA),胰島素絕對缺乏。","detail":{"background":"第一型糖尿病的核心病理是「自體免疫」破壞胰島β細胞:T 細胞媒介攻擊加上自體抗體(胰島細胞抗體 ICA、抗 GAD、抗胰島素抗體等)導致β細胞進行性破壞,造成胰島素「絕對缺乏」,故病人血中常可驗到 ICA,且因無法自行分泌足量胰島素而「終身需注射胰島素」、易發生酮酸中毒(DKA)。多發於兒童及青少年(學齡期),體型多偏瘦。相對地,第二型糖尿病以胰島素阻抗合併分泌相對不足為主、與自體免疫無關、多成年發病、初期常無症狀。本題 A 正確描述自體免疫機轉。","options":{"A":"正解。第一型為自體抗體攻擊β細胞的自體免疫反應。","B":"第一型病人血中「常可」測得胰島細胞抗體(ICA),非很少。","C":"第一型β細胞被破壞,幾乎喪失分泌胰島素能力,非保有。","D":"第一型是胰島素「絕對缺乏」,非僅相對不足(相對不足為第二型描述)。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"104030-N3-72":{"quick":"第二型糖尿病核心是胰島素阻抗合併分泌相對不足;占DM約90~95%,空腹≥126確診。","detail":{"background":"第二型糖尿病占所有糖尿病約 90~95%,病理機轉為「胰島素阻抗」合併胰島素分泌「相對」不足,多在成年/肥胖者發病,初期常無症狀而是健檢或併發症時才發現,急性併發症以高血糖高滲透壓狀態(HHS)為主、較少酮酸中毒(DKA 主要見於第一型)。糖尿病診斷標準:空腹血漿葡萄糖(FPG)≧126 mg/dL、OGTT 2 小時≧200、HbA1c≧6.5%、或有典型症狀加隨機血糖≧200,無症狀者須不同日重複確認。本題 C 正確描述其病因。","options":{"A":"第二型占糖尿病約90~95%,占5~10%者是第一型。","B":"易發生酮酸中毒的是第一型;第二型急性併發症以HHS為主。","C":"正解。第二型病因為胰島素分泌相對不足合併胰島素作用阻抗。","D":"空腹血糖診斷閾值為≧126 mg/dL(且需重複確認),非110。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"104030-N3-73":{"quick":"留鹽激素(aldosterone)由腎上腺皮質分泌;LH來自前葉、胰島素來自β細胞、腎上腺素升血糖。","detail":{"background":"本題考內分泌腺體與激素對應:醛固酮(留鹽激素 aldosterone)由腎上腺「皮質」最外層(球狀帶)分泌,促進腎遠端小管保鈉排鉀。黃體生成素(LH)與濾泡刺激素(FSH)由腦下垂體「前葉」分泌(非後葉)。胰島素由胰島「β細胞」分泌(沒有γ細胞分泌胰島素的說法)。腎上腺素(epinephrine)屬升糖激素之一,藉糖原分解與糖質新生使「血糖上升」而非下降。故只有 A 正確。記憶要點:皮質醇/醛固酮/性類固醇=皮質,兒茶酚胺=髓質。","options":{"A":"正解。留鹽激素(醛固酮)由腎上腺皮質球狀帶分泌。","B":"黃體生成素由腦下垂體前葉分泌,非後葉。","C":"胰島素由胰島β細胞分泌,胰島並無分泌胰島素的γ細胞。","D":"腎上腺素為升糖激素,使血糖上升而非下降。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"104030-N3-75":{"quick":"HbA1c 13% 代表血糖長期控制「很差」,而非良好,需加強衛教與治療。","detail":{"background":"糖化血色素(HbA1c)反映過去約3個月的平均血糖,正常約<5.7%、糖尿病診斷≧6.5%、一般控制目標<7%。HbA1c 與平均血糖約略對應:6%≈126、7%≈154、8%≈183、每上升1%平均血糖約增29 mg/dL,因此 13% 約相當於平均血糖 326 mg/dL,代表血糖控制「非常差」。HbA1c 抽血不需禁食、可不限時間,應建議病人規律(約每3個月)追蹤、並加強飲食/運動/藥物衛教。本題要找「錯誤」敘述,選項C說13%表示控制良好,明顯錯誤。","options":{"A":"建議定期(約每3月)檢查HbA1c正確。","B":"HbA1c 抽血不需禁食,敘述正確。","C":"正解(為錯誤敘述)。HbA1c 13% 表示血糖控制極差,非良好。","D":"控制不佳須加強糖尿病衛教,敘述正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"104100-N3-70":{"quick":"OGTT 前須禁食、避免壓力與劇烈活動、檢查中不可進食喝含糖/咖啡飲料,以免影響結果。","detail":{"background":"口服葡萄糖耐量試驗(OGTT)是診斷糖尿病/糖尿病前期與妊娠糖尿病的標準試驗:檢查前「至少禁食8小時」(僅可喝白開水)、檢查前3天維持正常飲食(每日醣類≧150g)、檢查前避免壓力、感染、劇烈運動與會影響血糖的藥物;空腹抽血後喝下75g葡萄糖水,於指定時間(常為2小時)再抽血。檢查「過程中」應靜坐休息、不可進食、不可喝咖啡或抽菸(咖啡因/尼古丁會影響血糖),也不應鼓勵活動。各項影響血糖的生理因素(壓力、運動、咖啡因)都要排除,以確保結果準確。本題 D 正確。","options":{"A":"OGTT 前須禁食至少8小時,敘述錯誤。","B":"檢查中不可喝咖啡(咖啡因影響血糖),敘述錯誤。","C":"檢查過程應靜坐休息,不應鼓勵活動,敘述錯誤。","D":"正解。檢查前應避免壓力,以免應激升糖影響結果。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"104100-N3-72":{"quick":"糖尿病診斷:空腹血糖連續兩次≧126 mg/dL 為確診標準之一。","detail":{"background":"糖尿病診斷標準(任一項,無典型症狀者須不同日重複確認):①空腹血漿葡萄糖(FPG)≧126 mg/dL;②OGTT 2小時血糖≧200 mg/dL;③HbA1c≧6.5%;④有典型高血糖症狀(多吃多喝多尿體重減輕)且隨機血糖≧200 mg/dL。空腹血糖100~125 為「空腹血糖偏高(IFG)」、OGTT 2h 140~199 為「葡萄糖耐受不良(IGT)」屬糖尿病前期。本題 C「飯前(空腹)血糖連續兩次≧126」符合確診標準(重複確認)。隨機血糖須「≧200且有症狀」,單純一次抽血≥200而無症狀不足以確診。","options":{"A":"空腹100~126 屬糖尿病前期(IFG),非診斷標準。","B":"OGTT 140~200 屬葡萄糖耐受不良(糖尿病前期),診斷需2h≧200。","C":"正解。空腹血糖連續兩次≧126 mg/dL 可確診糖尿病。","D":"隨機一次≧200 須「合併典型症狀」才算,單次無症狀不足確診。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"105030-N3-68":{"quick":"胰島素是唯一能直接降低血糖的激素;皮質醇、生長激素、腎上腺素皆為升糖激素。","detail":{"background":"血糖調節由「降糖」與「升糖」激素拮抗維持:能「降低血糖」的激素只有胰島素(insulin),它促進細胞攝取葡萄糖、肝醣合成、抑制肝糖質新生。其餘升糖(反調節)激素包括升糖素(glucagon)、腎上腺皮質醇(cortisol,促糖質新生)、生長激素(GH,降低周邊葡萄糖利用)、腎上腺素(epinephrine,促糖原分解)。這也是為何壓力、感染、類固醇治療會升高血糖。本題問「造成血糖降低」的激素,只有胰島素 A 正確。","options":{"A":"正解。胰島素是唯一直接降低血糖的激素。","B":"皮質醇促進糖質新生,屬升糖激素。","C":"生長激素降低周邊葡萄糖利用,屬升糖激素。","D":"腎上腺素促糖原分解,使血糖上升。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"105030-N3-70":{"quick":"接受胰島素治療的糖尿病病人應每天自我監測血糖(SMBG)約2~4次,以利劑量調整。","detail":{"background":"自我血糖監測(SMBG)頻率依治療方式調整:使用胰島素(尤其多次注射或第一型)者血糖波動大、低血糖風險高,需「每天監測約2~4次」(常於三餐前及睡前)以利劑量調整與低血糖偵測;僅口服藥或飲食控制良好者可降低頻率。監測時機應涵蓋餐前(評估基礎)與餐後2小時(評估餐後高峰),依需要也測睡前與半夜。SMBG 與 HbA1c 互補:前者反映即時與每日波動、後者反映長期平均。本題 B 對應胰島素治療者的建議頻率。","options":{"A":"胰島素治療者血糖波動大,每週2~3次太少,應每天監測。","B":"正解。接受胰島素治療者建議每天自我監測約2~4次。","C":"餐前須打胰島素者應「餐前」測以決定劑量,非僅飯後2h。","D":"監測應涵蓋餐前與餐後,不是只在兩餐之間。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"105030-N3-74":{"quick":"胰島α細胞分泌升糖素;皮質分泌的不是腎上腺素、後葉不分泌LH、降鈣素來自甲狀腺C細胞。","detail":{"background":"胰島內分泌細胞分工:α細胞分泌升糖素(glucagon,升血糖)、β細胞分泌胰島素(降血糖)、δ細胞分泌體制素。腎上腺「皮質」分泌類固醇(皮質醇、醛固酮、性類固醇),腎上腺素由「髓質」分泌。黃體生成素(LH)由腦下垂體「前葉」分泌,後葉只儲存釋放 ADH 與催產素。降鈣素由甲狀腺濾泡旁(C)細胞分泌,副甲狀腺分泌的是 PTH。本題只有 A(α細胞→升糖素)正確。","options":{"A":"正解。胰島α細胞分泌升糖素。","B":"腎上腺素由腎上腺髓質分泌,皮質分泌的是類固醇。","C":"黃體生成素由腦下垂體前葉分泌,非後葉。","D":"降鈣素由甲狀腺C細胞分泌,副甲狀腺分泌PTH。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"105090-N3-70":{"quick":"第一型糖尿病為自體免疫致β細胞破壞,多發於兒童/學齡期,須終身注射胰島素。","detail":{"background":"第一型糖尿病為自體免疫破壞胰島β細胞、胰島素絕對缺乏,好發於兒童及青少年(學齡期),典型以多吃多喝多尿與體重減輕急性表現,甚至以酮酸中毒(DKA)首發。因β細胞功能幾乎喪失,口服降血糖藥無效,必須終身注射胰島素;急性併發症以 DKA 為主(HHS 主要見於第二型老年人)。本題只有 B「大多發生於學齡期」正確,其餘三項皆是把第一型誤描述成第二型或顛倒。","options":{"A":"第一型與自體免疫高度相關,非無關。","B":"正解。第一型糖尿病大多發生於兒童/學齡期。","C":"第一型β細胞缺乏,口服藥無效,須注射胰島素。","D":"第一型常見急性併發症為DKA;HHS主要見於第二型。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"106030-N3-73":{"quick":"HbA1c 是葡萄糖與血色素「已結合」的反應,反映過去約3個月血糖,5.5~6%代表控制良好。","detail":{"background":"糖化血色素(HbA1c)是葡萄糖分子與紅血球血色素發生「非酵素性、不可逆」結合後的產物比例,因紅血球壽命約120天,故反映「過去約2~3個月」的平均血糖,而非1週。抽血「不需禁食」、不限時間。正常約<5.7%,5.5~6% 屬正常/控制良好,糖尿病診斷≧6.5%,一般治療目標<7%。注意缺鐵性貧血、溶血、近期輸血、血色素變異會干擾數值。本題 D「HbA1c 5.5~6%表控制良好」正確。","options":{"A":"HbA1c 抽血不需禁食。","B":"HbA1c 是葡萄糖與血色素「已結合」之產物,非結合前的反應值。","C":"HbA1c 反映過去約3個月,非1週。","D":"正解。HbA1c 5.5~6% 代表血糖控制良好。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"106110-N3-67":{"quick":"第二型糖尿病多成年發病、以胰島素阻抗為主、與自體免疫無關、不一定終生依賴胰島素。","detail":{"background":"第二型糖尿病多在成年(尤其中老年、肥胖)發病,核心是周邊組織「胰島素阻抗」合併分泌相對不足(常伴胰島素接受器數目/功能下降而非增加),與自體免疫無關。初期常先以飲食運動、口服降血糖藥控制,並非一開始就終身依賴胰島素(惟病程久、控制不佳或急性壓力時可能需要胰島素)。本題只有 A「多發生於成年期」正確,其餘把第二型誤描述成第一型或顛倒接受器變化。","options":{"A":"正解。第二型糖尿病多發生於成年期。","B":"第二型與自體免疫無關(自體免疫為第一型)。","C":"第二型不一定終生依賴胰島素,初期常以飲食/口服藥控制。","D":"第二型常見胰島素接受器數目/敏感度「下降」,非增加。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"108020-N3-69":{"quick":"評估過去約3個月血糖控制的指標是糖化血色素(HbA1c)。","detail":{"background":"評估糖尿病控制的不同檢查反映不同時間窗:空腹血糖、飯後2小時血糖反映「當下/單點」狀態;糖化血色素(HbA1c)因紅血球壽命約120天,反映「過去約2~3個月」平均血糖,抽血不需禁食、不限時間,是長期控制的標準指標;口服葡萄糖耐量試驗(OGTT)用於診斷而非追蹤。果糖胺(fructosamine)反映約2~3週。本題問「過去3個月」血糖控制,答案為 HbA1c。","options":{"A":"空腹血糖只反映抽血當下,非過去3個月。","B":"正解。糖化血色素反映過去約3個月平均血糖。","C":"OGTT 用於診斷糖尿病,非追蹤長期控制。","D":"飯後2小時血糖只反映單次餐後狀態。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"109030-N3-69":{"quick":"重症病人因應激反應分泌大量升糖激素、促進糖質新生,造成壓力性高血糖。","detail":{"background":"重症/急性壓力(感染、手術、創傷)病人常出現高血糖,即使原本無糖尿病,稱「壓力性高血糖」。機轉為應激下交感神經與下視丘-腦下垂體-腎上腺軸活化,大量分泌皮質醇、升糖素、兒茶酚胺、生長激素等反調節(升糖)激素,促進肝糖質新生與糖原分解、並造成周邊胰島素阻抗,使血糖上升。這與住院偶然發現糖尿病、胰島素分泌不足或活動量改變不同,核心是「壓力誘發的糖質新生」。重症高血糖與不良預後相關,須適度血糖監測與控制。本題 C 正確。","options":{"A":"住院偶發現糖尿病非「重症普遍高血糖」的共同主因。","B":"重症高血糖主因是升糖激素增加與阻抗,而非單純胰島素分泌不足。","C":"正解。應激下升糖激素促進糖質新生,造成壓力性高血糖。","D":"活動量減少非重症高血糖的主要病理機轉。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"109110-N3-72":{"quick":"第一型糖尿病可測得胰島細胞抗體(ICA);其餘三項把第一型/第二型特性顛倒。","detail":{"background":"區分兩型糖尿病:第一型為自體免疫破壞β細胞,血中可測得胰島細胞抗體(ICA)、抗GAD等,胰島素絕對缺乏、好發兒童青少年、易發生酮酸中毒(DKA)、須終身注射胰島素。第二型以胰島素阻抗合併分泌相對不足為主、與自體免疫無關、多成年發病、仍保有部分分泌能力、急性併發症以HHS為主、初期可用口服藥/飲食控制。本題只有 A(第一型出現ICA)正確,其餘把兩型特性對調。","options":{"A":"正解。第一型糖尿病血中可出現胰島細胞抗體(ICA)。","B":"「仍保有分泌能力但不足」是第二型描述,第一型為絕對缺乏。","C":"易發生酮酸中毒的是第一型,非第二型。","D":"第二型多成年發病但不一定終身依賴胰島素。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"110030-N3-71":{"quick":"HbA1c≧6.5% 已是糖尿病診斷標準之一;不能取代日常血糖監測,也不用於缺鐵貧血評估。","detail":{"background":"糖化血色素(HbA1c)自2010年起被納入糖尿病「診斷標準之一」(≧6.5%,須標準化方法),這是本題正解。但HbA1c 反映平均值、無法呈現每日血糖波動與低血糖,不能取代日常自我血糖監測(SMBG);它評估的是血糖控制,不是缺鐵性貧血(後者看鐵蛋白/血色素)。控制目標一般<7%,13% 代表控制極差而非良好。缺鐵性貧血、溶血、輸血等會干擾 HbA1c。本題 D 正確。","options":{"A":"HbA1c 不能取代日常血糖與尿糖監測(無法顯示波動與低血糖)。","B":"HbA1c 評估血糖控制,不是缺鐵性貧血的指標。","C":"HbA1c 13% 表示控制極差,非良好。","D":"正解。HbA1c≧6.5% 為糖尿病診斷標準之一。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"111030-N3-72":{"quick":"HbA1c 不受禁食、抽血時間影響;反映過去約3個月、正常約<5.7%、目標<7%。","detail":{"background":"糖化血色素(HbA1c)是糖化的血色素比例,反映過去約2~3個月平均血糖,因屬累積性結合,抽血「不受禁食與抽血時間影響」,是它相較於空腹血糖最大的便利性與穩定性優點(本題正解C)。正常人約<5.7%(非4~9%),糖尿病診斷≧6.5%、控制目標<7%、<7%視為控制良好;「<10%控制良好」明顯過寬。會受紅血球壽命/血色素變異影響,故溶血、缺鐵、輸血時需謹慎判讀。","options":{"A":"<10% 仍屬控制不良,控制良好目標為<7%。","B":"HbA1c 反映過去約3個月,非6個月。","C":"正解。HbA1c 不受禁食與驗血時間影響。","D":"正常人約<5.7%,4~9% 範圍敘述錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"111110-N3-74":{"quick":"HbA1c 是葡萄糖與血色素結合的反應,反映過去約3個月、抽血不需禁食、<7%為控制目標。","detail":{"background":"糖化血色素(HbA1c)為葡萄糖分子與紅血球血色素發生非酵素性結合形成的糖化血色素比例(本題正解D),反映過去約2~3個月平均血糖,抽血「不需禁食」、不限時間。一般控制目標<7%(<7% 代表控制良好,而非不好),糖尿病診斷≧6.5%。它無法反映過去「1年」,也不需禁食12小時。臨床用於評估長期血糖控制與調整治療。","options":{"A":"HbA1c 抽血不需禁食。","B":"HbA1c 反映過去約3個月,非1年。","C":"<7% 是控制良好的目標,非控制不好。","D":"正解。HbA1c 是葡萄糖分子與血色素結合的反應產物。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"112110-N3-73":{"quick":"第一型糖尿病與自體免疫有關、C-peptide測不到、易DKA;「慢慢出現無症狀高血糖」是第二型特徵。","detail":{"background":"第一型糖尿病的特徵:自體免疫破壞β細胞→胰島素絕對缺乏,因β細胞幾乎不分泌,內生胰島素的指標「C-胜肽(C-peptide)」常測不到或極低;發病較急、多以多吃多喝多尿與體重減輕、甚至酮酸中毒(DKA)表現,故常見併發症為 DKA。相對地,「慢慢出現、無症狀的高血糖」是第二型糖尿病的典型(初期常無症狀、健檢才發現)。本題要選「錯誤」者,C 把第二型特性套在第一型,故為答案。","options":{"A":"第一型病因與自體免疫反應有關,正確。","B":"第一型β細胞缺乏,空腹C-peptide常測不到,正確。","C":"正解(錯誤敘述)。慢慢無症狀高血糖是第二型特徵,非第一型。","D":"第一型常見急性併發症為DKA,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"112180-N3-45":{"quick":"升糖素將肝醣分解成葡萄糖是「肝醣分解(glycogenolysis)」,不是糖質新生;糖質新生是由非醣類前驅物生成葡萄糖。","detail":{"background":"胰臟激素作用:胰島素(β細胞)促進葡萄糖進入細胞儲存、合成肝醣/脂肪/蛋白,降血糖;升糖素(α細胞)升血糖,機轉是促進「肝醣分解(glycogenolysis)」把肝醣轉成葡萄糖、以及促進「糖質新生(gluconeogenesis)」由乳酸、胺基酸、甘油等非醣類前驅物合成葡萄糖——這兩者是不同途徑。體制素(somatostatin,δ細胞)抑制胰島素與升糖素分泌、延緩腸道蠕動與葡萄糖吸收。本題要選「錯誤」者:B 把「肝醣轉葡萄糖」誤稱為糖質新生(應為肝醣分解),故為答案。","options":{"A":"胰島素確實參與脂肪與蛋白質代謝調控,正確。","B":"正解(錯誤敘述)。肝醣轉葡萄糖是「肝醣分解」,糖質新生是由非醣類前驅物生成葡萄糖。","C":"胰島素加速葡萄糖由血液進入細胞儲存,正確。","D":"體制素抑制胰島素分泌、延緩腸道蠕動與葡萄糖吸收,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"113180-N3-15":{"quick":"HbA1c 7%(≧6.5%)可診斷糖尿病;FPG110、OGTT159 屬糖尿病前期,單次隨機240無症狀不足診斷。","detail":{"background":"糖尿病診斷標準(任一,無症狀者需重複確認):FPG≧126、OGTT 2h≧200、HbA1c≧6.5%、典型症狀+隨機≧200。逐一檢視:FPG 110 屬空腹血糖偏高(IFG,100~125)非診斷;OGTT 2h 159 屬葡萄糖耐受不良(IGT,140~199)非診斷;HbA1c 7%(≧6.5%)可診斷(本題正解C);隨機240 雖>200,但須「合併典型高血糖症狀」才算,單純一次數值不足診斷。故只有 HbA1c 7% 符合確診標準。","options":{"A":"FPG 110 屬空腹血糖偏高(糖尿病前期),診斷需≧126。","B":"OGTT 2h 159 屬葡萄糖耐受不良,診斷需≧200。","C":"正解。HbA1c 7%(≧6.5%)符合糖尿病診斷標準。","D":"單次隨機240 須合併典型症狀才能診斷,本題無症狀資訊不足。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"114170-N3-44":{"quick":"抑制素(inhibin)由性腺分泌、抑制FSH,與血糖調節無關;腎上腺素、皮質醇、生長激素皆為升糖激素。","detail":{"background":"血糖調節相關激素:降糖的胰島素,以及升糖(反調節)的升糖素、皮質醇、腎上腺素、生長激素。其中腎上腺素促糖原分解、皮質醇與生長激素促糖質新生/降低周邊葡萄糖利用,都會「升高血糖」,與血糖調節有關。抑制素(inhibin)由性腺(睪丸 Sertoli 細胞、卵巢顆粒細胞)分泌,負回饋「抑制腦下垂體前葉 FSH 分泌」,屬生殖內分泌,與血糖調節「無關」。本題問與血糖調整無關者,答案為抑制素 A。","options":{"A":"正解。抑制素抑制FSH分泌,屬生殖內分泌,與血糖調節無關。","B":"腎上腺素促糖原分解升血糖,與血糖調節有關。","C":"皮質醇促糖質新生升血糖,與血糖調節有關。","D":"生長激素降低周邊葡萄糖利用、升血糖,與血糖調節有關。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology","ADA Standards of Care in Diabetes"]}},"102110-N3-3":{"quick":"雙胍類(metformin)主要副作用是腸胃不適,腎功能不良時易乳酸中毒,需注意腎毒性風險。","detail":{"background":"口服降血糖藥各有用法與副作用:①α-葡萄糖苷酶抑制劑(acarbose)抑制小腸雙醣分解、延緩葡萄糖吸收,須「與第一口飯一起嚼服」(飯前/隨餐),單用不致低血糖,副作用為脹氣腹瀉;②磺醯脲類(sulfonylureas)刺激β細胞分泌胰島素,飯前30分服用,進食不足時易「低血糖」(非高血糖);③雙胍類(metformin)抑制肝糖質新生、增加胰島素敏感性,本身少致低血糖,但腎功能不良或缺氧時易「乳酸中毒」,顯影劑檢查前後需暫停;④類固醇是升糖激素,與磺醯脲類併用會「升高」血糖、削弱降糖效果。本題 C 正確。","options":{"A":"acarbose 應隨餐(與第一口飯)服用而非餐後,且單用不致低血糖。","B":"磺醯脲類進食不足時易「低血糖」而非高血糖。","C":"正解。雙胍類需注意乳酸中毒與腎毒性,腎功能不良者慎用。","D":"類固醇升血糖,與磺醯脲類併用會「升高」血糖,非降低。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"102110-N3-46":{"quick":"NPH 為中效胰島素,作用高峰約在注射後6~12小時,早上7點注射最可能在下午發生低血糖。","detail":{"background":"胰島素依作用時間分類:速效(lispro/aspart,15分起效、高峰1~2h)、短效(RI,30分起效、高峰2~4h)、中效(NPH,1~2h起效、「高峰6~12h」、持續約18~24h)、長效(glargine/detemir,無明顯高峰)。低血糖最易發生在「藥效高峰」且未及時進食時。本題早上7點注射 NPH,高峰約落在中午到下午(7AM+6~12h≈13:00~19:00),選項中「下午4點(4PM)」最符合高峰時段,故最可能發生低血糖。護理上應於高峰前後安排點心並衛教辨識低血糖。","options":{"A":"10AM(注射後3h)NPH 尚未到高峰,低血糖機會較低。","B":"正解。4PM 約為注射後9h,落在NPH高峰(6~12h),最易低血糖。","C":"10PM(注射後15h)已過高峰、藥效漸退。","D":"2AM 接近藥效末期,非NPH高峰時段。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"103030-N3-68":{"quick":"口服降血糖藥的病人術前禁食後須「暫停口服藥」,改依血糖變化處理,並持續觀察低血糖。","detail":{"background":"糖尿病病人手術前因午夜後禁食,進食停止但口服降血糖藥(尤其磺醯脲類)仍會降血糖→易發生低血糖,故術前應「暫停口服降血糖藥」,改以監測血糖、必要時靜脈輸液或胰島素處置,待術後可進食、血糖穩定後再恢復用藥;雙胍類(metformin)更須因手術/顯影劑/禁食風險於術前停用以防乳酸中毒。禁食期間仍須密切觀察低血糖徵象(冒冷汗、發抖、心悸、意識改變),出現時應立即驗血糖並依醫囑給糖,而非僅安撫情緒。本題 A 正確。","options":{"A":"正解。術前禁食應暫停口服降血糖藥,改依血糖變化處置。","B":"禁食下仍給口服藥會造成低血糖,應暫停而非繼續給予。","C":"即使停藥,禁食期間仍須觀察低血糖,不可不觀察。","D":"冒冷汗為低血糖徵象,應立即驗血糖給糖,而非僅安撫。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"106030-N3-71":{"quick":"治療性溝通應先「同理並探索病人的擔憂」,而非說教或直接否定,故回應「您擔心的是什麼?」最適切。","detail":{"background":"此題考治療性溝通技巧。病人對改用胰島素有疑慮(自覺口服控制良好),護理師回應應「以病人為中心」:先肯定胰島素目前對其病情的幫助,再用開放式問句探索病人真正的擔憂(怕打針?怕成癮?怕一輩子?),建立信任後才衛教。選項A「一旦打就終生」會強化恐懼且不正確;B用糟糕的數據指責病人易引發防衛;D替病人下「怕打針」的結論並承諾改藥,屬安撫式假保證。C先點出胰島素的益處再以開放式問句邀請病人說出擔憂,符合同理與治療性溝通原則。","options":{"A":"「一旦開始就終生注射」會加深恐懼,且不完全正確。","B":"以「控制很差」指責病人易引發防衛、破壞關係。","C":"正解。先肯定胰島素益處,再以開放式問句探索病人擔憂,最適切。","D":"替病人下結論並承諾改藥,屬安撫式假保證,未探索真正擔憂。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"106110-N3-64":{"quick":"Metformin(雙胍類)常見腸胃道刺激副作用(噁心、食慾減退、腹瀉),宜隨餐或飯後服用。","detail":{"background":"Metformin(雙胍類)是第二型糖尿病「首選」口服藥,主要作用為抑制肝臟糖質新生、增加周邊胰島素敏感性,並「不刺激胰島素分泌」、單用不致低血糖、不增加體重。最常見副作用是腸胃道刺激(噁心、食慾不振、腹瀉、金屬味),故建議「隨餐或飯後立即」服用以減輕不適;長期使用可致維生素B12缺乏。禁忌/慎用於腎功能不全、肝病、缺氧、酗酒及顯影劑檢查前後(乳酸中毒風險)。本題 D 正確。","options":{"A":"metformin 宜隨餐或飯後服用以減輕腸胃不適,非飯前最佳。","B":"肝臟疾病者乳酸中毒風險升高,不可「安心」服用,屬慎用。","C":"metformin 主要作用非刺激胰島素分泌(那是磺醯脲類)。","D":"正解。metformin 易引起噁心、食慾減退等腸胃道刺激副作用。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"106111-N3-68":{"quick":"磺醯脲類(sulfonylurea)作用為刺激胰臟β細胞分泌胰島素而降血糖。","detail":{"background":"磺醯脲類(sulfonylurea,如 glipizide、glibenclamide)藉結合β細胞膜上的 SUR 受體、關閉鉀離子通道→細胞去極化→鈣內流→促進「胰臟β細胞分泌胰島素」而降血糖,屬「促胰島素分泌劑」。因此其降糖作用需β細胞仍有功能(第一型無效),且進食不足時易「低血糖」、可能增加體重。相對地:升糖素與肝臟釋出葡萄糖屬升糖、雙胍類抑制肝糖質新生、TZD 增加接受器敏感性。本題 D 正確描述其機轉。","options":{"A":"磺醯脲類促胰島素分泌(降糖),非促升糖素。","B":"促進肝臟釋出葡萄糖是升糖作用,與磺醯脲類降糖機轉相反。","C":"磺醯脲類不減少胰島素接受器。","D":"正解。磺醯脲類刺激胰臟β細胞分泌胰島素。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"107110-N3-69":{"quick":"運動的肢體血流增加會「加速」胰島素吸收,故運動肢體吸收快於非運動肢體。","detail":{"background":"影響皮下胰島素吸收速率的因素:①注射部位:腹部最快>上臂>大腿>臀部最慢;②局部血流:血流增加則吸收加快——「運動」會使該肢體血流增加而加速吸收(運動肢體>非運動肢體)、按摩或局部活動也加速吸收、體溫升高(熱敷、泡熱水)同樣加速;③相反地體溫下降、注射處不動則吸收較慢。臨床建議運動前不要注射在即將大量運動的肢體,以免吸收過快導致低血糖,並規律輪替部位。本題 B 正確。","options":{"A":"吸收速率為腹部最快,大腿並非最快;此排序錯誤。","B":"正解。運動肢體血流增加,胰島素吸收快於非運動肢體。","C":"注射處局部活動會加速吸收,故「局部活動>不動」,本項顛倒。","D":"體溫升高會加速吸收,故應為「體溫升高>下降」,本項顛倒。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"109030-N3-67":{"quick":"metformin 是第二型糖尿病首選,肝腎功能異常者須慎用(乳酸中毒風險)。","detail":{"background":"各類降血糖藥重點:①metformin(雙胍類)為第二型糖尿病「首選」,抑制肝糖質新生,肝腎功能異常、缺氧者「慎用」(乳酸中毒風險)——本題正解A;②glipizide(磺醯脲類)刺激β細胞分泌胰島素,應「飯前30分」服用(非飯後),易低血糖;③acarbose(α-葡萄糖苷酶抑制劑)抑制小腸澱粉分解、延緩吸收,須「隨餐(與第一口飯)」嚼服而非飯前;④exenatide(GLP-1受體促效劑)促胰島素分泌、抑制升糖素並延緩胃排空,採「皮下注射」而非肌肉注射。本題 A 正確。","options":{"A":"正解。metformin 為第二型糖尿病首選,肝腎功能異常者須慎用。","B":"glipizide 應飯前30分服用,非飯後。","C":"acarbose 須隨餐(與第一口飯)服用,非飯前。","D":"exenatide(GLP-1促效劑)為皮下注射,非肌肉注射。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"109110-N3-75":{"quick":"食慾不振、進食減少時血糖會偏低,此時不宜增加胰島素劑量,以免低血糖。","detail":{"background":"胰島素劑量需依「升糖壓力」調整:感染、發燒、嚴重外傷、手術、情緒壓力等會啟動升糖激素、升高血糖與增加阻抗,此時血糖偏高、常需「增加」胰島素劑量(生病日 sick day 管理)。相反地,「食慾不振、進食減少」時碳水化合物攝取下降、血糖會偏低,若仍照常或增加胰島素劑量則易發生低血糖,故此情況「不宜增加」劑量,反而需監測血糖並可能減量。本題問不宜增加劑量者,答案為 B 食慾不振。","options":{"A":"全身感染屬升糖壓力,血糖升高常需增加胰島素。","B":"正解。食慾不振進食減少,血糖偏低,不宜增加胰島素劑量。","C":"嚴重外傷為應激,血糖升高,常需增加劑量。","D":"情緒壓力使升糖激素上升、血糖升高,可能需增加劑量。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"112110-N3-70":{"quick":"胰島素出國旅遊勿放飛機行李艙(會結凍失效),應隨身攜帶於客艙。","detail":{"background":"胰島素保存原則:①未開封者冷藏於 2~8°C(冰箱冷藏室,勿放冷凍庫,結凍會變性失效);②「使用中」的胰島素可置於室溫(避光、約<30°C)約28天,以減少注射冰冷胰島素的不適;③出國搭機時行李艙溫度過低會使胰島素「結凍失效」,故應「隨身攜帶於客艙」而非託運放行李艙——本題正解C;④若藥瓶內出現結塊、顆粒、變色代表已變質,「不可使用」更不可搖勻硬用。澄清型(速效/短效/長效glargine)應清澈,中效(NPH)為均勻混濁,使用前輕輕滾動勿劇烈搖晃以免氣泡。","options":{"A":"未開封胰島素應冷藏2~8°C,非常溫保存。","B":"「使用中」的胰島素可置於室溫,不必冷藏。","C":"正解。出國旅遊應隨身攜帶,勿置於會結凍的飛機行李艙。","D":"藥瓶內出現顆粒代表變質,應丟棄不可使用,非搖勻。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"112110-N3-71":{"quick":"發燒(體溫升高)會加速胰島素吸收;部位吸收應為腹部最快、運動肢體與局部活動加速吸收。","detail":{"background":"皮下胰島素吸收速率重點:①部位:腹部最快>上臂>大腿>臀部最慢(本題A把腹>臀>大腿>上臂排錯);②血流/體溫:體溫升高(發燒、熱敷)、運動、按摩、局部活動皆「加速」吸收——故糖尿病人發燒時胰島素藥效吸收加快(本題正解D),且不建議注射在即將大量運動的肢體以免低血糖;③注射部位應規律「輪替」,同一處間隔約1指幅(2~3公分),同一大區域約間隔數週再回到原點以防脂肪增生/萎縮,而非固定隔2~3週才換大區。","options":{"A":"吸收速率正確排序是腹部最快>上臂>大腿>臀部,本項錯誤。","B":"注射於即將運動的肢體會「加速」吸收致低血糖,應避免。","C":"部位輪替原則是相鄰點間隔約一指幅、定期換區,非固定隔2~3週。","D":"正解。感染發燒體溫升高會加速胰島素吸收。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"113030-N3-44":{"quick":"Metformin 長期使用造成的是維生素B12缺乏,而非B6;其餘敘述皆正確。","detail":{"background":"Metformin(雙胍類)為第二型糖尿病首選,主要作用是減少肝臟葡萄糖輸出(抑制糖質新生)以降低空腹血糖,並增加胰島素敏感性,單用不致低血糖。為減輕腸胃道刺激(噁心、腹瀉),宜「與食物一起或飯後立即」服用。長期使用會干擾迴腸對「維生素B12」的吸收→造成B12缺乏(可致貧血/周邊神經病變),而非B6。腎功能不良、缺氧、酗酒、顯影劑檢查前後須小心或暫停(乳酸中毒風險)。本題找「錯誤」者,C 把B12誤寫成B6,為答案。","options":{"A":"metformin 減少肝臟葡萄糖輸出以降空腹血糖,正確。","B":"與食物一起或飯後立即服用以減輕腸胃刺激,正確。","C":"正解(錯誤敘述)。長期使用造成的是維生素B12缺乏,非B6。","D":"腎功能不良者乳酸中毒風險升高,需小心使用,正確。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"113100-N3-45":{"quick":"皮下胰島素吸收速率為腹部最快,正確排序是腹部>上臂>大腿>臀部,選項顛倒故為錯誤。","detail":{"background":"胰島素皮下注射要點:①注射前30分鐘自冰箱取出回溫,避免注射冰冷胰島素引起疼痛與吸收不穩;②抽取混濁型(NPH)前應將藥瓶置手掌「滾動」混勻,「不可劇烈搖晃」以免產生氣泡;③推入皮下後停留約3~5秒再拔針並以乾棉球「輕壓勿搓揉」(搓揉加速吸收易低血糖);④吸收速率「腹部最快>上臂>大腿>臀部最慢」,選項D把順序寫成「上臂>大腿>臀部>腹部」是錯誤的。本題找錯誤者,答案為 D。","options":{"A":"注射前30分取出回溫避免注射冷胰島素,正確。","B":"混濁型應滾動勿搖晃以防氣泡,正確。","C":"推入後靜待3~5秒再拔針並輕壓勿搓揉,正確。","D":"正解(錯誤敘述)。吸收速率應為腹部最快,本項順序顛倒。"},"sources":["新文京《內外科護理學》內分泌系統","實用藥理學","ADA Standards of Care in Diabetes"]}},"101030-N3-76":{"quick":"糖尿病運動最好在「飯後1~2小時」進行以避免低血糖,飯前運動易低血糖,故飯前1小時運動為錯誤。","detail":{"background":"糖尿病運動原則:①時機以「飯後1~2小時」為宜,此時血糖較高,可降低運動誘發低血糖的風險;空腹或飯前(尤其使用胰島素/磺醯脲類者)運動易低血糖。②隨身攜帶糖果/方糖以備低血糖。③運動量與強度應「循序漸進」、規律進行(每週至少150分鐘中等強度有氧)。④若有額外或長時間運動,運動前、中、後酌量補充碳水化合物。⑤血糖>250~300且尿酮陽性、或<100時暫緩運動。本題找「錯誤」者,A 建議飯前1小時運動易致低血糖,為答案。","options":{"A":"正解(錯誤敘述)。應於飯後1~2小時運動,飯前運動易低血糖。","B":"運動時隨身攜帶糖果以備低血糖,正確。","C":"運動內容與強度循序漸進,正確。","D":"額外運動前、中補充食物以防低血糖,正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"101110-N3-1":{"quick":"糖尿病足因周邊神經病變感覺遲鈍,使用烤燈/熱水袋/電毯易燙傷而不自覺,應避免。","detail":{"background":"糖尿病足護理核心是「保護感覺遲鈍、血循不良的足部」:①因周邊神經病變痛/溫覺減退,禁用熱水袋、電毯、烤燈、暖暖包等局部熱源(本題錯誤項B 烤燈),洗腳前須以手肘或溫度計測水溫(<40°C)以防燙傷;②不可赤足走路、不穿過緊或夾腳鞋,穿鞋前檢查鞋內異物;③每日檢視足部有無傷口、水泡、變色;④戒菸(尼古丁使血管收縮、惡化末梢循環);⑤趾甲平剪、勿自行修剪雞眼硬繭。本題找「錯誤」者為 B 使用烤燈保暖。","options":{"A":"避免熱水袋、電毯等熱源以防燙傷,正確。","B":"正解(錯誤敘述)。感覺遲鈍者用烤燈易燙傷而不自覺,應禁用。","C":"不可赤足走路以免受傷,正確。","D":"戒菸以改善末梢循環,正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"102110-N3-35":{"quick":"糖尿病「大血管」病變指心、腦、周邊大動脈粥狀硬化,中風屬之;視網膜/腎/神經屬微血管病變。","detail":{"background":"糖尿病慢性血管併發症分兩類:①「大血管病變(macrovascular)」=大動脈粥狀硬化加速,包括冠心病/心肌梗塞、腦中風、周邊動脈疾病(間歇性跛行、糖尿病足缺血);②「小(微)血管病變(microvascular)」=糖尿病視網膜病變、糖尿病腎病變、糖尿病周邊神經病變(手腳麻木、感覺異常)。本題問「大血管」相關者,只有「中風」屬之(D);視網膜病變、腎衰竭、手腳麻木皆為微血管病變。記憶:大血管=心腦周邊(動脈硬化),微血管=眼腎神經。","options":{"A":"視網膜病變屬微血管病變,非大血管。","B":"糖尿病腎病變屬微血管病變。","C":"手腳麻木為周邊神經病變,屬微血管病變。","D":"正解。中風屬大血管(腦動脈粥狀硬化)病變。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"103100-N3-67":{"quick":"糖尿病足襪子應「合腳、不過大不過緊」;趾甲平剪、避免熱水浸泡、宜穿吸汗棉襪。","detail":{"background":"糖尿病足保護要點:①襪子須「合腳、不過大也不過緊」(過緊壓迫循環、過大易摩擦起水泡),選吸汗透氣的棉/羊毛襪、淺色以利察覺滲液、每日更換(本題正解D);②趾甲應「平剪、勿剪入兩側甲溝、勿剪過短」以防甲溝炎;③避免每日熱水浸泡(易乾裂、燙傷),洗腳水溫<40°C並先測溫、洗後擦乾尤其趾縫;④每日檢視足部、不赤足、穿鞋前檢查異物。本題正確者為 D。","options":{"A":"趾甲應平剪、不宜剪短於足趾末端(易甲溝炎),敘述錯誤。","B":"每日熱水浸泡易使皮膚乾裂且有燙傷風險,不建議。","C":"尼龍襪較不吸汗,宜選棉質吸汗襪;每日更換概念對但材質敘述不佳。","D":"正解。襪子不能過大或過緊,以免摩擦或壓迫循環。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"104030-N3-71":{"quick":"糖尿病足不可用含酒精乳液(使皮膚乾裂),應保濕但趾縫間勿過濕;其餘檢查/戒菸/避熱源皆正確。","detail":{"background":"糖尿病足皮膚照護:應保持皮膚適度滋潤以防乾裂(乾裂處是細菌入口),使用「不含酒精」的乳液;含酒精的產品會使皮膚更乾燥、龜裂(本題錯誤項A)。乳液塗抹於足背與足底,但「趾縫間勿塗抹」以免潮濕滋生黴菌。其他正確措施:每天檢視足部、戒菸(改善循環)、避免熱水袋/電器保暖(防燙傷)、平剪趾甲、不赤足。本題找「錯誤」者為 A。","options":{"A":"正解(錯誤敘述)。含酒精乳液會使皮膚乾裂,不宜用於糖尿病足。","B":"每天執行足部檢查,正確。","C":"戒菸改善末梢循環,正確。","D":"避免熱水袋或電熱器以防燙傷,正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"104100-N3-25":{"quick":"糖尿病視網膜病變致視力缺損與黃斑部水腫、視網膜缺氧、玻璃體出血有關;乾性黃斑部退化屬老化,非糖尿病所致。","detail":{"background":"糖尿病視網膜病變(微血管病變)致視力受損的機轉:①視網膜微血管受損、滲漏造成「黃斑部水腫」(視力下降主因);②微血管阻塞致「視網膜缺氧」,刺激血管內皮生長因子(VEGF)→新生血管;③新生血管脆弱破裂→「玻璃體出血」、纖維化牽引→牽引性視網膜剝離。而「乾性(萎縮性)黃斑部退化(dry AMD)」是與年齡相關的退化,非糖尿病引起。本題找「錯誤」者,D 乾性黃斑部退化非糖尿病視網膜病變所致,為答案。","options":{"A":"黃斑部水腫是糖尿病視網膜病變致視力下降的主因,正確。","B":"微血管阻塞致視網膜缺氧,正確。","C":"新生血管破裂致玻璃體出血,正確。","D":"正解(錯誤敘述)。乾性黃斑部退化屬年齡相關退化,非糖尿病所致。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"104100-N3-68":{"quick":"糖尿病運動前應做暖身、運動後做緩和,並選擇合腳保護性鞋具、避免高衝擊運動。","detail":{"background":"糖尿病運動衛教:①運動前「暖身」、運動後「緩和」可減少心血管與肌肉骨骼傷害(本題正解C);②時機宜「飯後1~2小時」而非飯前(防低血糖);③鞋具應選合腳、保護性佳的運動鞋,避免涼鞋/拖鞋(足部易受傷且糖尿病足風險高);④建議規律中等強度有氧(快走、游泳、騎車),避免舉重、短跑等高衝擊或閉氣用力(會升高血壓、視網膜病變者易眼底出血);⑤隨身攜帶糖果防低血糖。本題正確者為 C。","options":{"A":"運動時機宜在飯後1~2小時,非飯前。","B":"鞋具應選合腳保護性運動鞋,涼鞋易使足部受傷。","C":"正解。運動前暖身、運動後緩和,可減少傷害。","D":"舉重、短跑等高衝擊運動不建議,易升血壓、傷眼底。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"104100-N3-73":{"quick":"口腔癌術後管灌的糖尿病人,出院準備應含高/低血糖辨識與居家血糖監測、並照會營養師指導管灌配方。","detail":{"background":"本題病人口腔癌術後、需鼻胃管灌食、且糖尿病(術前HbA1c 9.5%控制差、現用胰島素一天4次)。合宜的出院準備計畫:①指導高/低血糖的原因、預防與處理,並教導居家血糖監測方法(因使用胰島素,監測尤其重要)→陳述1正確;③照會營養師指導返家「管灌配方」的準備(病人仍需管灌)→陳述3正確。陳述2「討論口服降血糖藥」不適當(病人現用胰島素,且口服藥多需經口、與管灌、術後狀況不符);陳述4「返家改為由口進食」與口腔癌術後須管灌的事實衝突。故正確組合為1與3(A)。","options":{"A":"正解。指導高/低血糖與居家監測(1)+照會營養師指導管灌(3)最適切。","B":"含陳述4「改由口進食」與口腔癌術後須管灌衝突,不適當。","C":"含陳述2「討論口服藥」不適當(病人現用胰島素)。","D":"含陳述2與4,皆不適當。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"106030-N3-69":{"quick":"糖尿病飲食:膽固醇每日<300 mg;醣類約占50~60%、蛋白質約15~20%、脂肪<30%。","detail":{"background":"糖尿病飲食控制原則(三大營養素比例):碳水化合物約占每日總熱量50~60%(以全穀、低升糖指數為主)、蛋白質約15~20%(腎病變者再降)、脂肪<30%(其中飽和脂肪<7~10%)、「膽固醇每日攝取量<300 mg」(本題正解A)、增加膳食纖維、限酒少鹽、定時定量。本題其餘選項數值皆錯:蛋白質不應高達20~30%、脂肪不應達50%、醣類不應低到30~40%。","options":{"A":"正解。膽固醇每日攝取量應低於300 mg。","B":"蛋白質約占15~20%,20~30%偏高。","C":"脂肪應<30%,50%過高。","D":"醣類應占50~60%,30~40%過低。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"106111-N3-21":{"quick":"糖尿病視網膜病變與「血糖控制不良」高度相關,血糖控制越差風險越高,故「與控制無關」為錯誤。","detail":{"background":"糖尿病視網膜病變是最常見的糖尿病微血管併發症,也是成人後天失明主因之一。其發生與「病程長短」及「血糖、血壓控制不良」高度相關——血糖控制越差、罹病越久,風險越高(本題錯誤項B「與血糖控制無關」)。機轉為長期高血糖損傷視網膜微血管、造成滲漏(黃斑部水腫)、缺血與新生血管(增殖性),新生血管破裂出血、纖維化牽引可致牽引性視網膜剝離與失明。良好控制血糖血壓、定期眼底檢查、必要時雷射/抗VEGF治療可延緩惡化。本題找「錯誤」者為 B。","options":{"A":"嚴重者會造成失明,正確。","B":"正解(錯誤敘述)。視網膜病變與血糖控制不良高度相關,並非無關。","C":"高血糖損傷視網膜血管致損傷或阻塞,正確。","D":"纖維增生牽引可致牽引性視網膜剝離,正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"107110-N3-72":{"quick":"糖尿病足洗澡前應「以前臂或手肘測水溫」防燙傷;不可自行用刀片切除或修剪雞眼硬繭。","detail":{"background":"糖尿病足自我照護:①因足部感覺遲鈍,洗澡/泡腳前須以「前臂或手肘(感覺較準的部位)或溫度計」測水溫(<40°C)以防燙傷(本題正解D);②不可自行用刀片切硬繭或雞眼(易造成傷口感染),也不宜用浮石用力磨(會傷皮膚),硬繭雞眼應請專業處理;③趾甲平剪、不剪入兩側甲溝、不在腳趾邊緣挖皮(防甲溝炎);④每日檢視、不赤足、穿合腳鞋。本題正確者為 D。","options":{"A":"不可自行用刀片切除硬繭或雞眼,易造成傷口感染。","B":"用浮石用力磨硬繭會傷及皮膚,不建議自行處理。","C":"剪指甲不可剪入甲溝或挖邊緣皮,易致甲溝炎。","D":"正解。洗澡前以前臂或手肘測水溫,避免燙傷。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"108020-N3-68":{"quick":"腿部剛注射胰島素後應避免立即跑步,因運動加速吸收易低血糖;不在胰島素高峰運動、血糖過高暫緩運動。","detail":{"background":"糖尿病運動安全:①避免在「胰島素作用高峰」運動(易低血糖);②剛在腿部注射胰島素後立即跑步,會因運動肢體血流增加而「加速吸收」→低血糖,故應避免(本題正解B),宜將注射部位避開即將運動的肢體;③運動型態應選穩定、規律的有氧運動,避免急速變化或高衝擊(易受傷、升血壓、傷眼底);④血糖過高(>250~300且尿酮陽性)時不應運動更不應延長,以免酮酸惡化,應先控制血糖。本題正確者為 B。","options":{"A":"胰島素高峰運動易低血糖,不是最佳時間。","B":"正解。腿部剛注射胰島素後避免立即跑步,以免加速吸收致低血糖。","C":"運動應穩定規律,急速變化易受傷,不建議。","D":"血糖>300(尤其尿酮陽性)應暫緩運動,不可延長。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"110030-N3-73":{"quick":"糖尿病足出門前要「檢視鞋內有無異物」;應適度保濕、不用熱源保暖、不穿涼鞋。","detail":{"background":"糖尿病足保護:①因感覺遲鈍,穿鞋前務必檢視鞋內有無小石子、異物以防壓傷不自覺(本題正解D);②皮膚應「適度保濕」防乾裂(趾縫除外),而非完全不擦乳液;③禁用熱水袋、電毯等熱源(防燙傷);④不穿涼鞋/拖鞋(腳趾外露易受傷、香港腳防治靠保持乾爽與治療而非穿涼鞋)。本題正確者為 D。","options":{"A":"皮膚應適度保濕防乾裂(趾縫除外),非完全不擦乳液。","B":"禁用熱水袋、電毯保暖,以防燙傷。","C":"不宜穿涼鞋,腳趾外露易受傷。","D":"正解。穿鞋前要檢視鞋內有無異物,以防壓傷。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"110110-N3-75":{"quick":"雷射光凝固治療目的是「防止視網膜病變惡化、保住現有視力」,無法「恢復已喪失的視力」。","detail":{"background":"糖尿病視網膜病變分期與處置:①非增殖性(NPDR):眼底可見微血管瘤、點狀出血、硬性滲出物;增殖性(PDR):出現新生血管、玻璃體出血、牽引性剝離。②區分增殖/非增殖可藉「直接眼底鏡觀察視網膜(及螢光血管攝影)」確診。③新生血管破裂出血、液體滲漏可致黃斑部水腫。④治療(全視網膜雷射光凝固、抗VEGF)目的在「抑制新生血管、防止惡化、保留現有視力」,「無法使已喪失的視力恢復」(本題錯誤項D)。本題找錯誤者為 D。","options":{"A":"微血管瘤屬非增殖性視網膜病變表現,正確。","B":"藉眼底觀察可區分增殖/非增殖,正確。","C":"新生血管出血滲漏致黃斑部水腫,正確。","D":"正解(錯誤敘述)。雷射可防惡化但無法恢復已失去的視力。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"111030-N3-71":{"quick":"糖尿病足:趾甲應「直線修剪」、足部傷口沖洗消毒後儘速就醫;不宜長時間熱水浸泡、宜穿淺色襪。","detail":{"background":"糖尿病足正確護理:陳述1「直線修剪趾甲緣」(平剪不剪入甲溝)正確;陳述4「足部傷口沖洗後消毒敷料覆蓋、紙膠固定並儘速就醫」正確(糖尿病足傷口易惡化感染,須及早就醫)。陳述2「每日溫水浸泡30分鐘」錯誤(長時間浸泡使皮膚軟化乾裂、且有燙傷風險,洗腳宜快速並先測水溫);陳述3「穿色深柔軟尼龍襪」錯誤(應穿「淺色」吸汗棉襪以利察覺滲液,尼龍較不吸汗)。故正確為1與4(B)。","options":{"A":"含陳述2「每日浸泡30分鐘」錯誤。","B":"正解。直線修剪趾甲(1)+傷口處理後儘速就醫(4)正確。","C":"含陳述2、3皆不適當。","D":"含陳述3「深色尼龍襪」不適當。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"112110-N3-3":{"quick":"糖尿病運動宜在飯後1~2小時、採用大肌肉群的有氧運動;運動會「提高」胰島素敏感性而降血糖。","detail":{"background":"糖尿病運動衛教:陳述2「飯後1~2小時運動」正確(此時血糖較高,降低低血糖風險);陳述3「使用大肌肉群的有氧運動(快走、游泳、騎車)」正確(有效降血糖、心肺受益)。陳述1錯誤——運動是「提高(而非降低)細胞對胰島素的敏感性」進而降血糖;陳述4錯誤——剛注射完胰島素後立即運動會加速吸收易「低血糖(非高血糖)」,故應避免立即運動。正確組合為2與3(C)。","options":{"A":"含陳述1「降低胰島素敏感性」錯誤(運動是提高敏感性)。","B":"含陳述1、4皆錯誤。","C":"正解。飯後1~2小時(2)+大肌肉群有氧(3)正確。","D":"含陳述4「以免高血糖」錯誤(應為避免低血糖)。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"112110-N3-72":{"quick":"升糖指數(GI)反映食物升血糖速度;全穀類屬低GI,糖尿病人宜選低GI食物。","detail":{"background":"升糖指數(Glycemic Index, GI)指人體食用含醣食物後,血中葡萄糖反應的「速度與強度」(陳述1正確)。GI 越高,血糖上升越快。糖尿病人飲食應「選擇低GI食物」以減緩血糖波動(故陳述2「選高GI以免低血糖」錯誤)。陳述3錯誤——全脂奶等乳品因含脂肪與蛋白,GI 其實「偏低」而非偏高。陳述4「全穀類(如全麥穀片)屬低GI」正確。故正確組合為1與4(B)。低GI食物如全穀、豆類、多數蔬菜;高GI如白飯、白麵包、含糖飲料。","options":{"A":"含陳述2「選高GI」錯誤,糖尿病人應選低GI。","B":"正解。GI 定義(1)+全穀類低GI(4)正確。","C":"含陳述3「乳品GI高」錯誤(乳品GI偏低)。","D":"含陳述3錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"112180-N3-46":{"quick":"糖尿病飲食宜避免油炸、多用清蒸水煮等少油烹調;根莖瓜果屬高GI、藥酒含糖不宜、膽固醇應<300mg。","detail":{"background":"糖尿病飲食控制:本題正解B「避免油炸,多採清蒸、水煮、清燉、滷、涼拌等少油烹調」正確,可減少脂肪與熱量。其餘為錯誤:A「根莖類、瓜果類」實為「高GI」食物(如馬鈴薯、南瓜、西瓜),不宜當低GI選項;C 各式藥酒(五加皮、蔘茸酒、玫瑰露)含糖與酒精,糖尿病人應避免、不宜小酌挑這些;D 脂肪占比20~30%尚可但「膽固醇每日應<300 mg」而非<500 mg。故正確者為 B。","options":{"A":"根莖類、瓜果類多屬高GI,不宜作為低GI首選。","B":"正解。避免油炸,多採清蒸、水煮等少油烹調方式。","C":"藥酒含糖與酒精,糖尿病人應避免飲用。","D":"膽固醇每日攝取應<300 mg,非<500 mg。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"113100-N3-43":{"quick":"足部神經麻木(周邊神經病變)與糖尿病腎病變皆屬「小(微)血管」病變;心肌梗塞、腦血管梗塞屬大血管。","detail":{"background":"糖尿病慢性併發症分大、小血管:小(微)血管病變=視網膜病變、腎病變、周邊神經病變(足部神經麻木、感覺異常);大血管病變=冠心病/心肌梗塞、腦中風、周邊動脈疾病。本題問與「小血管病變」相關者:陳述1「足部神經麻木(神經病變)」與陳述2「糖尿病腎病變」皆屬微血管病變;陳述3「心肌梗塞」、陳述4「腦血管梗塞」屬大血管病變。故正確組合為1與2(A)。","options":{"A":"正解。足部神經麻木(1)+糖尿病腎病變(2)屬微血管病變。","B":"含陳述3心肌梗塞(大血管)錯誤。","C":"含陳述4腦血管梗塞(大血管)錯誤。","D":"兩者皆為大血管病變,錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"113180-N3-44":{"quick":"糖尿病足:洗腳前以手背測水溫防燙傷、不可自行剝除硬繭雞眼;趾甲平剪勿過短、趾縫間勿塗乳液。","detail":{"background":"糖尿病足正確護理:陳述1「每日溫水清洗前以手背測水溫防燙傷」正確(感覺遲鈍須先測溫,手背或手肘較準);陳述4「不可擅自用手或剪刀剝除硬繭或雞眼」正確(易致傷口感染,應由專業處理)。陳述2錯誤——趾甲應「平剪、不剪過短於足趾末端」(剪太短易嵌甲/甲溝炎);陳述3錯誤——乳液可塗足背足底防乾裂,但「趾縫間應避免塗抹」(潮濕易滋生黴菌)。故正確組合為1與4(B)。","options":{"A":"含陳述2「剪短於足趾末端」錯誤。","B":"正解。手背測水溫(1)+不自行剝除硬繭雞眼(4)正確。","C":"含陳述2、3皆不適當。","D":"含陳述3「趾縫間塗乳液」不適當。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"114030-N3-46":{"quick":"糖尿病足運動時務必「穿襪保護」,不可不穿襪;鞋楦頭要寬、穿前檢查異物、選棉質吸汗襪。","detail":{"background":"糖尿病足運動時鞋襪選擇:①楦頭要寬,讓腳趾自由伸展、避免擠壓變形(正確);②穿鞋前檢查鞋內有無異物以防壓傷(正確);③襪子選棉質、吸汗、淺色、合腳(正確);④運動時「務必穿襪」保護雙足、減少摩擦水泡與直接受傷,「偶爾不穿襪」會增加摩擦與受傷風險、不可接受(本題錯誤項D)。糖尿病足任何小傷口都可能演變成潰瘍與感染,故保護措施不能間斷。本題找「錯誤」者為 D。","options":{"A":"楦頭寬讓腳趾自由伸展,正確。","B":"穿鞋前檢查鞋內異物,正確。","C":"選棉質吸汗襪,正確。","D":"正解(錯誤敘述)。運動時務必穿襪保護,不可偶爾不穿襪。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"114100-N3-45":{"quick":"糖尿病周邊神經病變使深部肌腱反射「減弱或消失」,故跟腱反射+++(亢進)為不可能的評估結果。","detail":{"background":"糖尿病足身體評估常見「異常」結果:①足部外形改變(爪狀趾、夏柯氏關節變形)②皮膚乾燥、龜裂(自主神經病變使汗腺分泌減少)③趾端震動覺、輕觸覺、本體感覺消失(大纖維神經病變);④保護性感覺喪失(單股纖維 10g 測不到);⑤足背動脈搏動減弱(周邊動脈疾病)。神經病變屬「下運動神經元型」表現,深部肌腱反射(如跟腱反射)應「減弱或消失」,故「跟腱反射+++(亢進)」與糖尿病神經病變不符(本題錯誤項D,亢進屬上運動神經元病變)。本題找錯誤者為 D。","options":{"A":"足部外形改變(夏柯氏足、爪狀趾)為常見評估結果,正確。","B":"自主神經病變致皮膚乾燥裂隙,正確。","C":"腳趾震動覺消失為周邊神經病變表現,正確。","D":"正解(錯誤敘述)。神經病變使跟腱反射減弱,+++(亢進)不符。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"115030-N3-45":{"quick":"糖尿病飲食:醣50~60%、脂肪約20~30%、蛋白約15~20%。脂肪5~10%太低、蛋白30~35%太高,不適宜。","detail":{"background":"糖尿病飲食三大營養素比例:碳水化合物約占總熱量50~60%(陳述1正確)、脂肪約20~30%(其中飽和脂肪<7%—陳述3正確)、蛋白質約15~20%。本題問「不適宜」者:陳述2「脂肪5~10%」過低(會使醣或蛋白比例失衡、必需脂肪酸與脂溶性維生素不足);陳述4「蛋白質30~35%」過高(一般15~20%,腎病變者更需限制)。故不適宜的組合為2與4(C)。","options":{"A":"含陳述1(醣50~60%)正確,非不適宜組合。","B":"含陳述1、3皆適宜。","C":"正解。脂肪5~10%太低(2)+蛋白30~35%太高(4)不適宜。","D":"含陳述3(飽和脂肪<7%)適宜。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes","糖尿病衛教核心教材"]}},"101030-N3-6":{"quick":"低血糖屬交感神經興奮+神經低血糖症狀(心悸、冒汗、發抖、發麻);庫斯莫耳(Kussmaul)呼吸是DKA酸中毒的代償,非低血糖。","detail":{"background":"低血糖(血糖<70 mg/dL)症狀分兩類:①「交感神經興奮(自律神經)」反應——心跳加快、心悸、冒冷汗、皮膚濕冷、發抖、飢餓、口唇與手指發麻刺痛;②「神經低血糖(腦缺糖)」反應——頭痛、視力模糊複視、注意力不集中、意識改變甚至抽搐昏迷。而「庫斯莫耳氏(Kussmaul)呼吸」(深而快的代償性呼吸排出CO2)是「糖尿病酮酸中毒(DKA)」代謝性酸中毒的表現,不是低血糖症狀。本題找「錯誤」者為 C。","options":{"A":"心跳加快為交感神經興奮反應,屬低血糖徵象。","B":"皮膚濕冷(冒冷汗)為低血糖典型表現。","C":"正解(錯誤敘述)。Kussmaul 呼吸是DKA酸中毒的代償,非低血糖症狀。","D":"口唇與手指發麻刺痛屬低血糖的神經感覺表現。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"101110-N3-2":{"quick":"DKA因高血糖滲透性利尿與脫水、代謝亢進,皮膚特徵為「溫暖、潮紅、乾燥」。","detail":{"background":"糖尿病酮酸中毒(DKA)的皮膚與外觀:因高血糖造成滲透性利尿、嚴重脫水,加上酸中毒下血管擴張與代謝產熱,典型呈「皮膚溫暖、潮紅、乾燥」、黏膜乾、眼眶凹陷、皮膚張力差(脫水),並有Kussmaul深快呼吸與爛蘋果(酮體)味。相對地,「低血糖」因交感神經興奮使皮膚「濕冷、蒼白、冒汗」。兩者皮膚表現相反,是鑑別重點。本題 DKA 皮膚應為「溫暖、潮紅」,選 C。","options":{"A":"濕冷、蒼白是低血糖(交感興奮)的皮膚表現,非DKA。","B":"DKA皮膚是溫暖而非乾冷。","C":"正解。DKA因脫水與代謝亢進,皮膚溫暖、潮紅、乾燥。","D":"DKA皮膚潮紅而非蒼白(蒼白是低血糖)。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"102030-N3-72":{"quick":"清醒的輕度低血糖應立即口服約15g「快速吸收」醣類,純果汁180cc最適合;含脂肪的牛奶吸收慢、糖果顆數不易控量。","detail":{"background":"低血糖(本例血糖45 mg/dL、清醒可吞嚥)處理採「15-15法則」:立即給15g快速吸收的單醣(如120~180cc純果汁或含糖飲料、3~4顆方糖、葡萄糖錠),15分鐘後復測,若仍<70再給一次,血糖回升後補充含蛋白/澱粉的點心防再降。選項中「純果汁180cc」約含15g醣、吸收快又好估量,最適合;牛奶含脂肪與蛋白,醣吸收較慢、不適合急救;糖果8~10顆量過多且為固體吸收較慢、含量難估;葡萄糖錠1錠常僅約4~5g,可能不足15g。本題最適宜為 B。","options":{"A":"葡萄糖錠1錠常僅約4~5g,不足15g,效果可能不夠。","B":"正解。純果汁180cc 約含15g快速吸收醣類,最適合輕度低血糖急救。","C":"糖果8~10顆量過多、固體吸收較慢且含糖量難估。","D":"牛奶含脂肪與蛋白,醣吸收較慢,不適合低血糖急救。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"102030-N3-73":{"quick":"胰島素/口服藥未減而「進食減少又運動量增加」,熱量入少耗多,是低血糖最常見原因。","detail":{"background":"低血糖常見促因:①胰島素或磺醯脲類劑量過多;②「進食減少、延誤或漏餐」;③「運動量增加」而未補充食物或減藥;④飲酒(抑制糖質新生)。本例病人按時注射/服藥,但「食量減少而健走運動時間/量增加」,等於降糖藥物作用不變、葡萄糖攝入減少且消耗增加,血糖自然下降→低血糖。選項B「準時服用正餐及點心」反而是預防低血糖的正確行為;早上RI不足或NPH注射本身不會在午睡後造成低血糖的最佳解釋。本題最可能原因為 C。","options":{"A":"早上RI量不足會使血糖偏高,不會造成下午低血糖。","B":"準時進食正餐與點心是預防低血糖的正確行為,非原因。","C":"正解。進食減少加上運動量增加,熱量入少耗多,最易低血糖。","D":"中餐前注射NPH非本例下午低血糖的最佳解釋。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"102030-N3-76":{"quick":"HHS無明顯酮酸中毒,不會出現庫斯莫耳(Kussmaul)呼吸;其餘高血糖、極度脫水、電解質失衡皆正確。","detail":{"background":"高血糖高滲透壓狀態(HHS)特徵:多見於「第二型」糖尿病老年人,血糖極高(常>600,可達800~1000以上)、血漿滲透壓顯著升高(>320 mOsm/kg)、嚴重脫水、皮膚黏膜乾燥、電解質不平衡與意識改變,但因仍有少量胰島素可抑制脂肪分解,故「無明顯酮體生成、無明顯酸中毒」→「不會出現Kussmaul深快呼吸」(本題錯誤項D)。Kussmaul呼吸是DKA代謝性酸中毒的代償表現。本題找「錯誤」者為 D。","options":{"A":"HHS主要發生於第二型糖尿病病人,正確。","B":"HHS血糖通常高至800 mg/dL以上,正確。","C":"HHS有脫水、皮膚黏膜乾燥、電解質不平衡,正確。","D":"正解(錯誤敘述)。HHS無明顯酮酸,不會出現Kussmaul呼吸。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"103030-N3-72":{"quick":"DKA是高血糖,清醒者不可給糖果、昏迷者不可推注葡萄糖;治療應補液、靜脈胰島素、補鉀、嚴重酸中毒才給NaHCO3。","detail":{"background":"糖尿病酮酸中毒(DKA)治療原則:①「大量等張(0.9%生理食鹽水)輸液」矯正脫水;②「靜脈持續低劑量正規(短效)胰島素」降血糖、抑制酮體生成,血糖降至約200~250時改補含糖溶液避免低血糖;③監測並「補鉀」(尿量足夠時,因胰島素與酸中毒矯正會使鉀移入細胞);④pH<6.9~7.0等嚴重酸中毒才考慮重碳酸鈉。DKA是「高血糖」狀態,清醒者「絕不可給糖果」、昏迷者「不可推注50%葡萄糖」(那是低血糖的處理),本題錯誤項為 B。","options":{"A":"尿量充足時補充鉀離子,正確(防降糖過程低血鉀)。","B":"正解(錯誤敘述)。DKA是高血糖,給糖果/推葡萄糖是低血糖的處理,錯誤。","C":"DKA需以胰島素降血糖、抑制酮體,正確。","D":"pH<7.0嚴重酸中毒才給重碳酸鈉,正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"103100-N3-66":{"quick":"HHS常因感染、壓力、利尿劑、類固醇誘發,後期出現少尿與嚴重脫水、BUN/Cr上升。","detail":{"background":"高血糖高滲透壓狀態(HHS)逐一分析:陳述1「最易發生在第1型」錯誤(HHS主要見於「第二型」老年人);陳述2「早期腹瀉」錯誤(非典型早期表現);陳述3「常見於感染、壓力、服用利尿劑、類固醇」正確(這些升糖或脫水因子是常見誘因);陳述4「後期會出現少尿和嚴重脫水」正確(初期滲透性利尿多尿,血容量耗竭後轉少尿);陳述5「尿素氮、肌酸酐上升」正確(脫水致腎前性氮血症)。故正確為3、4、5(D)。","options":{"A":"含陳述1(第1型)與2(早期腹瀉)皆錯誤。","B":"含陳述1錯誤。","C":"含陳述2(早期腹瀉)錯誤。","D":"正解。誘因(3)+後期少尿脫水(4)+BUN/Cr上升(5)正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"104030-N3-70":{"quick":"HHS仍有少量胰島素可抑制脂解,高血糖主因是胰島素「相對不足+反調節激素+脫水」,非完全未分泌。","detail":{"background":"高血糖高滲透壓狀態(HHS)病理:見於第二型糖尿病,體內仍有「少量胰島素」,足以抑制脂肪分解(故不生酮、無明顯酸中毒),但「不足以」控制血糖,加上感染/壓力下反調節激素升高與脫水濃縮,使血糖極高(常>600)、血漿滲透壓>320,造成意識障礙與嚴重脫水。本題找「錯誤」者:D「高血糖主因是胰島素未分泌所致」錯誤——HHS並非完全無胰島素分泌(完全缺乏會生酮成DKA),而是相對不足。A、B、C 皆為HHS正確特徵。","options":{"A":"意識障礙因血漿高滲透壓所致,正確。","B":"HHS有少量胰島素抑制脂解,血中可能測不到酮體,正確。","C":"HHS有嚴重脫水,正確。","D":"正解(錯誤敘述)。HHS仍有少量胰島素分泌,非完全未分泌。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"104030-N3-74":{"quick":"低血糖因交感興奮使皮膚「濕冷、蒼白、冒汗」,而非溫暖乾燥;故該描述為錯誤。","detail":{"background":"低血糖(<70 mg/dL)的判斷與處理:①典型交感神經興奮表現為心跳加快、冒冷汗、「皮膚濕冷蒼白」、發抖、飢餓(非溫暖乾燥);②嚴重時出現神經低血糖症狀(意識改變、抽搐);③輕度且清醒者立即給15g快速吸收醣(果汁、方糖);④可在「胰島素作用高峰時段」前補充點心預防低血糖。本題找「錯誤」者:B 把低血糖皮膚誤寫成「溫暖、乾燥」(那是DKA),應為「濕冷」。其餘A(<60~70)、C(給果汁糖果)、D(高峰補點心)皆正確。","options":{"A":"低血糖一般指血糖低於約60~70 mg/dL,正確。","B":"正解(錯誤敘述)。低血糖皮膚為濕冷蒼白,非溫暖乾燥。","C":"輕度低血糖立即給果汁、糖果,正確。","D":"可在胰島素作用高峰前補充點心預防低血糖,正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"104100-N3-71":{"quick":"DKA因脫水與酸中毒,呈「心搏過速」而非過緩;同時血壓下降、Kussmaul快深呼吸、呼吸有水果(酮)味。","detail":{"background":"糖尿病酮酸中毒(DKA)的臨床表徵:①脫水與血容量不足→「心搏過速(代償)」、血壓下降、皮膚黏膜乾;②代謝性酸中毒→「Kussmaul呼吸(深而快)」代償排CO2、呼吸有爛蘋果/水果(丙酮)味;③多吃多喝多尿、噁心嘔吐腹痛、意識改變。本題找「錯誤」者:A「心搏過緩」錯誤——DKA應為心搏「過速」。B(血壓下降)、C(呼吸快而深)、D(水果味)皆為DKA正確表現。","options":{"A":"正解(錯誤敘述)。DKA因脫水代償為心搏過速,非過緩。","B":"脫水致血壓下降,正確。","C":"酸中毒代償呈Kussmaul深快呼吸,正確。","D":"酮體使呼吸有水果(丙酮)味,正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"105030-N3-72":{"quick":"HHS無酮酸中毒,不會出現深快的代償呼吸(Kussmaul);其餘高血糖、滲透壓上升致休克、無酮體皆正確。","detail":{"background":"高血糖高滲透壓狀態(HHS)與DKA的關鍵鑑別在「有無酸中毒/Kussmaul呼吸」:HHS因仍有少量胰島素抑制脂解,故「無或僅微量酮體、無明顯酸中毒」,因此「不會出現深快(Kussmaul)呼吸」(本題錯誤項B);血糖極高(可>800)、血漿滲透壓顯著上升、嚴重脫水,血容量不足甚至導致「休克」。本題找「錯誤」者為 B(呼吸加速且深度增加=Kussmaul,屬DKA而非HHS)。","options":{"A":"HHS血糖可>800 mg/dL,正確。","B":"正解(錯誤敘述)。HHS無酸中毒,不會出現深快的Kussmaul呼吸。","C":"血漿滲透壓上升、嚴重脫水可致休克,正確。","D":"HHS血中無或僅微量酮體,正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"105090-N3-5":{"quick":"HHS好發於「第二型」糖尿病老年人,非第一型;常因藥物不當、TPN、急性疾病誘發。","detail":{"background":"高血糖高滲透壓狀態(HHS)好發族群與誘因:多見於「第二型」糖尿病老年人(尤其失能、口渴感差、水分攝取不足者),體內尚有少量胰島素故不生酮。常見誘因包括感染、急性疾病、服藥不當(利尿劑、類固醇)、接受全靜脈高營養(TPN含高糖)、脫水等。本題找「錯誤」者:A「好發於第1型」錯誤(應為第二型;第一型胰島素絕對缺乏,急症以DKA為主)。B、C、D 皆為HHS可能誘因。","options":{"A":"正解(錯誤敘述)。HHS好發於第二型糖尿病,非第一型。","B":"服藥不當(利尿劑、類固醇)可誘發HHS,正確。","C":"TPN含高糖可誘發HHS,正確。","D":"急性疾病為HHS常見誘因,正確。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"105090-N3-67":{"quick":"低血糖會出現神經低血糖症狀如頭痛、複視;心搏加快(非過慢)、皮膚濕冷(非潮紅)、無Kussmaul呼吸。","detail":{"background":"低血糖臨床表徵:①交感神經興奮——心跳「加快」、冒冷汗、皮膚「濕冷蒼白」、發抖、飢餓;②神經低血糖(腦缺糖)——「頭痛、視力模糊或複視」、注意力不集中、行為改變、意識障礙、抽搐。本題正確者為 B「頭痛、複視」(神經低血糖症狀)。A「心搏過慢」錯(應加快);C「皮膚溫暖潮紅」錯(應濕冷蒼白,溫暖潮紅是DKA/HHS脫水);D「Kussmaul呼吸」錯(屬DKA酸中毒)。","options":{"A":"低血糖心搏加快而非過慢。","B":"正解。頭痛、複視為腦缺糖(神經低血糖)症狀。","C":"低血糖皮膚濕冷蒼白,非溫暖潮紅。","D":"Kussmaul呼吸屬DKA酸中毒,非低血糖。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"106030-N3-70":{"quick":"DKA出現Kussmaul深快呼吸(代謝性酸中毒代償);皮膚溫暖乾燥、屬代謝性酸中毒,症狀數小時至1~2天發展。","detail":{"background":"糖尿病酮酸中毒(DKA)常見徵象:核心是「代謝性酸中毒」,身體以「Kussmaul深而快的呼吸」代償排出CO2(本題正解C),並有爛蘋果(酮)味。皮膚因脫水呈「溫暖、潮紅、乾燥」(非濕冷出汗,濕冷是低血糖)。DKA是「代謝性」酸中毒(非呼吸性)。發展速度相對HHS較快(數小時至1~2天),但說「非常快速」並非其最佳描述。本題正確者為 C。","options":{"A":"皮膚濕冷出汗是低血糖表現,DKA皮膚溫暖乾燥。","B":"DKA是代謝性酸中毒,非呼吸性。","C":"正解。DKA出現Kussmaul深快呼吸代償酸中毒。","D":"DKA症狀數小時至1~2天發展,「非常快速」非最佳描述。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"107030-N3-27":{"quick":"蘇莫吉效應(Somogyi)是夜間低血糖後反彈性「高血糖」,常因晚間胰島素過量(高劑量)後發生。","detail":{"background":"晨間高血糖的兩種機轉:①「蘇莫吉效應(Somogyi effect)」——夜間(常因睡前胰島素「過量」)發生低血糖,身體釋放反調節升糖激素而「反彈性高血糖」,故晨間血糖偏高;處理是「減少」夜間胰島素或睡前加點心,而非增加。②「黎明現象(dawn phenomenon)」——凌晨生長激素/皮質醇分泌使晨間血糖上升,與夜間低血糖無關,需「增加」夜間長效胰島素。鑑別需測凌晨2~3點血糖(Somogyi 該時段低)。本題D「常發生在使用高劑量胰島素之後」正確;A把它說成「反彈性低血糖」錯誤(它是反彈性高血糖)。","options":{"A":"蘇莫吉效應是反彈性「高血糖」,非低血糖。","B":"是因夜間胰島素過「多」非過少。","C":"治療應「減少」夜間胰島素,非逐漸增加。","D":"正解。常發生在使用高劑量胰島素導致夜間低血糖之後。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"107030-N3-68":{"quick":"DKA初期因高血糖滲透性利尿,尿量「增多」;同時血壓下降、Kussmaul快深呼吸、代謝性酸中毒。","detail":{"background":"糖尿病酮酸中毒(DKA)臨床表徵:①血糖高→滲透性利尿→「初期多尿(尿量增多)」、口渴、繼而脫水;②脫水血容量不足→血壓「下降」、心搏過速(非高血壓);③代謝性酸中毒→「Kussmaul深而快」呼吸代償(非慢淺)、呼吸有酮味;④是「代謝性酸中毒」(非鹼中毒)。本題正確者為 D「症狀初期尿量增多」。其餘A(高血壓)、B(呼吸慢淺)、C(代謝性鹼中毒)皆與DKA相反。","options":{"A":"DKA脫水致血壓下降,非高血壓。","B":"DKA呼吸快而深(Kussmaul),非慢淺。","C":"DKA是代謝性酸中毒,非鹼中毒。","D":"正解。DKA初期高血糖滲透性利尿,尿量增多。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"107110-N3-71":{"quick":"昏迷、血糖600、呼吸有濃腐壞水果(酮)味→糖尿病酮酸中毒(DKA)。","detail":{"background":"本例:昏迷、心跳120(過速)、血壓85/50(偏低)、呼吸35(快)、「呼吸有很濃的腐壞水果味」、血糖600。關鍵在「水果(酮體)味+快速呼吸(Kussmaul)」→代謝性酸中毒,符合「糖尿病酮酸中毒(DKA)」。低血糖昏迷血糖應低、無酮味;乳酸中毒無酮味;HHS血糖更高(常>600~1000)但「無酮味、無Kussmaul」、滲透壓更高。本例有明顯酮味與快呼吸,故為 DKA(C)。","options":{"A":"乳酸中毒無水果(酮)味,且常見於metformin/缺氧,非本例。","B":"低血糖昏迷血糖應偏低,非600,也無酮味。","C":"正解。血糖600+呼吸酮味+快速呼吸,為DKA。","D":"HHS無酮味、無Kussmaul呼吸,與本例酮味不符。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"108020-N3-70":{"quick":"昏迷+呼吸快而深(Kussmaul)+血糖400且滲透壓僅300→以酸中毒為主,診斷為糖尿病酮酸中毒(DKA)。","detail":{"background":"鑑別高血糖危症:①「呼吸快而深(Kussmaul)」是代謝性酸中毒代償,指向DKA;②血漿有效滲透壓僅「300 mOsm/kg」(HHS通常>320),且血糖400(HHS常>600)→不符HHS的極高滲透壓與血糖。綜合「快深呼吸+滲透壓未達HHS標準」最符合「糖尿病酮酸中毒(DKA)」。蘇莫吉效應是反彈高血糖現象(非昏迷急症);急性肝昏迷無此代謝參數。本題答案為 C。","options":{"A":"蘇莫吉效應是反彈性高血糖現象,非昏迷急症。","B":"急性肝昏迷不符此高血糖+酸中毒的代謝表現。","C":"正解。Kussmaul快深呼吸+酸中毒表現,為DKA。","D":"HHS滲透壓常>320、血糖更高且無Kussmaul,與本例不符。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"108110-N3-67":{"quick":"DKA的胰島素應採「靜脈持續低劑量正規(短效)胰島素」,而非皮下注射大劑量;其餘輸液、補糖、監測鉀皆正確。","detail":{"background":"糖尿病酮酸中毒(DKA)標準處置:①「0.9%生理食鹽水」大量輸液矯正脫水(初期等張);②「靜脈持續低劑量正規(短效)胰島素」滴注(約0.1 U/kg/hr),平穩降糖並抑制酮體,不採皮下注射大劑量(吸收不穩、易血糖驟降與低血鉀);③當血糖降至約200~300時加入「含葡萄糖溶液」避免低血糖、持續清酮;④密切監測「血鉀」(治療會使鉀移入細胞致低血鉀)。本題找「錯誤」者:B「皮下注射大劑量短效胰島素」錯誤。","options":{"A":"建立靜脈輸液給0.9%生理食鹽水,正確。","B":"正解(錯誤敘述)。DKA應靜脈持續低劑量胰島素,非皮下大劑量。","C":"血糖降至300補充葡萄糖溶液防低血糖,正確。","D":"監測血鉀變化,正確(防低血鉀)。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"109030-N3-66":{"quick":"HHS血糖極高、嚴重脫水使皮膚潮紅溫暖乾燥;無酸中毒、無Kussmaul呼吸。","detail":{"background":"高血糖高滲透壓狀態(HHS)正確描述:①血糖「極高」(常>600,較DKA更高,故A「較DKA輕微」錯);②因仍有少量胰島素抑制脂解,「血液pH正常、無酮酸中毒」(故B錯);③「嚴重脫水」,皮膚呈潮紅、溫暖、乾燥(本題正解C);④無酸中毒故「無Kussmaul呼吸」(故D錯)。HHS與DKA最大鑑別在「有無酸中毒/酮體/Kussmaul」。本題正確者為 C。","options":{"A":"HHS血糖通常比DKA更高,非較輕微。","B":"HHS無酸中毒,血液pH正常,不呈酮酸中毒。","C":"正解。HHS嚴重脫水,皮膚潮紅、溫暖、乾燥。","D":"HHS無酸中毒,不會出現Kussmaul呼吸。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"109030-N3-68":{"quick":"DKA多發生於「第一型」糖尿病病人胰島素治療中斷或感染等誘因時。","detail":{"background":"糖尿病酮酸中毒(DKA)流行病學與誘因:典型發生於「第一型」糖尿病(胰島素絕對缺乏),最常見誘因為「胰島素治療中斷/漏打」與感染、初次發病、急性壓力等(本題正解B)。胰島素缺乏使脂肪大量分解生成酮體→代謝性酸中毒。第二型偶在嚴重壓力下也可能DKA,但「攝入過多食物」或「胰島素過多」並非DKA機轉(胰島素過多反而是低血糖)。本題正確者為 B。","options":{"A":"DKA非特別好發於女性老年人(那較像HHS老年族群)。","B":"正解。DKA多見於第一型糖尿病胰島素治療中斷。","C":"DKA主要見於第一型而非第二型攝食過多。","D":"胰島素「過多」造成低血糖,非DKA(DKA為胰島素缺乏)。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"109110-N3-71":{"quick":"低血糖出現出汗、震顫、心跳過快等交感興奮症狀;它可快速致命、危險性不低。","detail":{"background":"低血糖的特性:①典型交感興奮表現——「出汗、震顫、心跳過快」、飢餓、皮膚濕冷(本題正解D);②常因胰島素/磺醯脲類過量、漏餐進食不足、運動過量或飲酒所致(而非急性感染/壓力——那是升糖造成高血糖/DKA);③低血糖會迅速影響中樞、嚴重時致抽搐昏迷甚至死亡,「危險性不低」(C錯,不可說比DKA危險性低);④易發生在「空腹、延誤進食或胰島素作用高峰」(B的「餐後」描述不準確)。本題正確者為 D。","options":{"A":"急性感染或重大壓力造成的是高血糖/DKA,非低血糖。","B":"低血糖多在空腹/延誤進食或胰島素高峰,「餐後」描述不準確。","C":"低血糖可快速致命,危險性不低,此敘述錯誤。","D":"正解。低血糖出現出汗、震顫、心跳過快等交感症狀。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"109110-N3-73":{"quick":"HHS脫水的最常見原因是「高血糖造成滲透性利尿」,大量水分隨葡萄糖排出。","detail":{"background":"高血糖高滲透壓狀態(HHS)脫水機轉:血糖極高,超過腎糖閾後大量葡萄糖進入腎小管,造成「滲透性利尿」——水分與電解質隨葡萄糖被拉入尿中大量排出,加上老年人口渴感差、水分補充不足,導致嚴重脫水、血漿滲透壓升高。本題最常見原因為D「高血糖造成滲透壓性利尿」。噁心嘔吐、缺乏ADH(尿崩症)、腎臟無法濃縮尿液雖也會脫水,但非HHS脫水的主要機轉。","options":{"A":"噁心嘔吐非HHS脫水的最主要原因。","B":"HHS非缺乏ADH(那是尿崩症),機轉是滲透性利尿。","C":"HHS腎臟仍能受高血糖驅動利尿,非無法濃縮尿液為主因。","D":"正解。高血糖造成滲透性利尿是HHS脫水最常見原因。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"109110-N3-74":{"quick":"本題經考選部公告「一律給分」。DKA為代謝性酸中毒(pH↓、HCO3↓)且滲透壓多<320,故原訂組合為pH7.2(1)+HCO3 14(3)+滲透壓<320(6)。","detail":{"background":"本題公告為「送分(一律給分)」,各選項皆視為正確。就學理而言,糖尿病酮酸中毒(DKA)的檢驗:①血液pH下降(酸中毒,如7.2,陳述1);③血中碳酸氫根(HCO3)下降(如14 mEq/L,陳述3,正常22~26);⑥血漿滲透壓多<320 mOsm/kg(陳述6;若>320則偏向HHS)。故原設計的正解組合為1、3、6(A)。相對地pH7.5(鹼中毒)、HCO3 25(正常)、滲透壓>320(偏HHS)皆不符DKA。因題目爭議而一律給分。","options":{"A":"原設計正解:pH7.2(1)+HCO3 14(3)+滲透壓<320(6)符合DKA;本題一律給分。","B":"含陳述4(HCO3 25正常)不符DKA酸中毒。","C":"含陳述2(pH7.5鹼中毒)、5(滲透壓>320偏HHS)不符DKA。","D":"含陳述2、4、5多與DKA不符;惟本題已一律給分。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"110030-N3-23":{"quick":"DKA為「代謝性」酸中毒、易發生於第一型;昏迷前出現Kussmaul深快呼吸,急性期不可補葡萄糖。","detail":{"background":"糖尿病酮酸中毒(DKA)重點:①是「代謝性酸中毒」(酮體堆積),非呼吸性;②「易發生於第一型」糖尿病(胰島素絕對缺乏,本題正解B);③昏迷前出現「Kussmaul深快呼吸」代償酸中毒(非陳施氏Cheyne-Stokes週期性呼吸);④急性期治療以等張輸液+靜脈胰島素+補鉀為主,血糖須先降,「不可一開始就補葡萄糖」(待血糖降至約200~300才加糖)。本題正確者為 B。","options":{"A":"DKA是代謝性酸中毒,非原發性呼吸性酸中毒。","B":"正解。DKA易發生於第一型糖尿病病人。","C":"昏迷前呈Kussmaul深快呼吸,非陳施氏呼吸。","D":"急性期應先降血糖,不可立即補葡萄糖。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"110030-N3-72":{"quick":"DKA治療目標包含矯正脫水、降血糖、補鉀及「矯正血液pH值(酸中毒)」;它是高血糖、脫水狀態,不需處理低血糖或水分過載。","detail":{"background":"糖尿病酮酸中毒(DKA)治療要矯正三大問題:脫水(等張輸液)、高血糖與酮體(靜脈胰島素)、電解質與酸鹼(補鉀、嚴重酸中毒時矯正血液pH)。本題正解D「矯正血液pH值」正確(DKA是代謝性酸中毒)。A「處理低血糖」錯——DKA是高血糖;B「矯正水分過度負荷」錯——DKA是嚴重「脫水」需補水;C補鈉非治療核心(主要補水、胰島素與鉀)。本題正確者為 D。","options":{"A":"DKA是高血糖,非低血糖,不需處理低血糖。","B":"DKA是嚴重脫水,需補水而非矯正水分過載。","C":"治療核心是補水、胰島素與補鉀,非補鈉。","D":"正解。DKA為代謝性酸中毒,需矯正血液pH值。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"110110-N3-73":{"quick":"58歲第二型糖尿病、血糖極高650、呼吸20(無快深)→診斷為高血糖高滲透壓狀態(HHS)。","detail":{"background":"本例:58歲、第二型糖尿病(口服藥控制)、昏迷、心跳118、血壓85/50、「呼吸20次/分(未明顯快深)」、血糖「650」。關鍵:血糖極高且「無Kussmaul快深呼吸、無酮味」、第二型老年→符合「高血糖高滲透壓狀態(HHS)」。DKA會有快深呼吸與酮味且多見第一型;低血糖血糖應低;乳酸中毒無此高血糖。本題答案為 D。","options":{"A":"乳酸中毒不會有如此極高血糖,且多與缺氧/metformin相關。","B":"低血糖昏迷血糖應偏低,非650。","C":"DKA會有Kussmaul快深呼吸與酮味,本例呼吸僅20且第二型,不符。","D":"正解。第二型、血糖極高、無快深呼吸,為HHS。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"111030-N3-74":{"quick":"與DKA相比,HHS脫水更嚴重需補「更多」水、無酸中毒不需NaHCO3、仍需補鉀;血糖更高故仍需以胰島素降糖。","detail":{"background":"DKA 與 HHS 處置比較:①脫水程度HHS通常「更嚴重」,需補充的水分「更多」(故A「HHS補水較少」錯);②HHS「無酸中毒」,不需重碳酸鈉(故C「HHS更需NaHCO3」錯);③HHS治療仍須監測並「補鉀」(故D「不需補鉀」錯);④HHS血糖通常比DKA更高,仍須以「胰島素」治療降糖。經逐項排除A、C、D皆錯,本題正解為 B(HHS需要以胰島素治療,因其血糖更高)。臨床上兩者皆以輸液為先、胰島素並行、補鉀。","options":{"A":"HHS脫水更嚴重,需補的水分更多,非較少。","B":"正解(消去法)。HHS血糖更高需以胰島素降糖;A、C、D皆明顯錯誤。","C":"HHS無酸中毒,不需(更不會更需)重碳酸鈉。","D":"HHS治療仍須監測並補充鉀離子。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"111110-N3-71":{"quick":"DKA呼吸特徵為「深、快、有果(酮)香味」的Kussmaul呼吸。","detail":{"background":"糖尿病酮酸中毒(DKA)的呼吸是經典考點:因代謝性酸中毒,身體以「Kussmaul呼吸——深而快」的方式代償排出CO2;同時呼氣中含丙酮,帶有「爛蘋果/水果(酮)香味」。故DKA呼吸=「深、快、有果香味」(本題正解A)。尿騷味屬尿毒症;淺慢呼吸見於鹼中毒或呼吸抑制,皆非DKA。本題答案為 A。","options":{"A":"正解。DKA呼吸為深、快、有果(酮)香味的Kussmaul呼吸。","B":"淺慢且尿騷味不符DKA(尿騷味屬尿毒)。","C":"DKA呼吸是「快」非慢。","D":"DKA呼吸是深而快,且為果香味非尿騷味。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"111110-N3-72":{"quick":"HHS血中呈「無或微量酮體」(因仍有少量胰島素抑制脂解);好發第二型、無Kussmaul快深呼吸。","detail":{"background":"高血糖高滲透壓狀態(HHS)正確敘述:因體內「仍有少量胰島素」可抑制脂肪分解,故「血中無或僅微量酮體、無酸中毒」(本題正解C),也因此「不會出現深快呼吸(Kussmaul)」(故B錯);好發於「第二型」老年人(故A「第一型」錯);並非「完全無胰島素分泌」(故D錯,完全缺乏會成DKA)。HHS核心是血糖極高、滲透壓高、嚴重脫水。本題正確者為 C。","options":{"A":"HHS好發於第二型糖尿病,非第一型。","B":"HHS無酸中毒,不會呼吸加速且加深(Kussmaul)。","C":"正解。HHS血中無或微量酮體。","D":"HHS仍有少量胰島素分泌,非完全無分泌。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"112030-N3-67":{"quick":"磺醯脲類(Glipizide)服用過量會刺激胰島素分泌過多→低血糖;運動減少、壓力、感染反而升血糖。","detail":{"background":"造成糖尿病人「血糖過低」的促因:①降糖藥過量——「Glipizide(磺醯脲類)服用過量」刺激β細胞分泌過多胰島素→低血糖(本題正解A);②進食減少、漏餐;③運動量「增加」;④飲酒。相對地,「運動時間減少、工作壓力增加、上呼吸道感染」都會「升高」血糖(活動消耗減少、應激升糖激素上升),屬高血糖促因,不會造成低血糖。本題正確者為 A。","options":{"A":"正解。Glipizide(磺醯脲類)過量刺激胰島素分泌,造成低血糖。","B":"健走運動時間「減少」會使血糖偏高,非過低。","C":"工作壓力增加使升糖激素上升、血糖偏高。","D":"上呼吸道感染為應激,血糖偏高。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"113030-N3-45":{"quick":"HHS:呼吸代償加快(26次/分)、血糖極高(750);但血壓多偏低(非高)、尿酮陰性或微量(非明顯陽性)。","detail":{"background":"高血糖高滲透壓狀態(HHS)的徵象判讀:陳述1「呼吸速率26次/分」可能(脫水/輕度代償使呼吸略快,但無DKA的深快Kussmaul);陳述4「血糖750 mg/dL」符合HHS極高血糖。陳述2「血壓166/84」不符——HHS嚴重脫水多呈「低血壓」;陳述3「尿酮明顯陽性升高」不符——HHS無或僅微量酮體。故正確組合為1與4(B)。本例病人口服藥控制、昏倒、診斷HHS,呈血糖極高與脫水表現。","options":{"A":"含陳述2(血壓166/84偏高)不符HHS脫水。","B":"正解。呼吸略快(1)+血糖750(4)符合HHS。","C":"含陳述2、3皆不符。","D":"含陳述3(尿酮明顯陽性)不符HHS。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"114030-N3-42":{"quick":"DKA處置:由低劑量胰島素開始、尿量恢復後補鉀正確;初期應給0.9%(非0.45%)NS,pH<7.0~7.1才考慮NaHCO3。","detail":{"background":"糖尿病酮酸中毒(DKA)處置逐項:陳述1「建立靜脈輸液、由低劑量胰島素開始」正確(靜脈持續低劑量正規胰島素);陳述3「等尿液排出量恢復正常後補充鉀離子」正確(防降糖過程低血鉀,需尿量足夠再補鉀)。陳述2「最初2小時給0.45%生理食鹽水」錯誤——初期脫水應先給「0.9%等張」NS擴容,待血鈉/血壓穩定後才視情況改0.45%;陳述4「血液pH>7.1即給NaHCO3」錯誤——一般pH<6.9~7.0嚴重酸中毒才考慮,pH>7.1不需。故正確組合為1與3(B)。","options":{"A":"含陳述2(初期給0.45%NS)錯誤,初期應給0.9%。","B":"正解。低劑量胰島素開始(1)+尿量恢復後補鉀(3)正確。","C":"含陳述2、4皆錯誤。","D":"含陳述4(pH>7.1給NaHCO3)錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"114170-N3-45":{"quick":"「食量減少而運動時間增加」會使血糖「下降」,故它不是造成高血糖的促因,屬本題最不適當者。","detail":{"background":"造成糖尿病人「血糖過高」的促因:①胰島素/降糖藥劑量不足(如NPH或Lente量過少);②感染/發炎(如下肢蜂窩性組織炎為應激+感染);③精神壓力增加(升糖激素上升);④進食過多、運動減少。本題問「最不適當(非高血糖促因)」者:D「食量減少而健走運動時間增加」——熱量入少、消耗增加會使血糖「下降」,反而是低血糖促因,故為高血糖促因中「最不適當」的答案。其餘A、B、C 皆會升高血糖。","options":{"A":"胰島素量過少會使血糖升高,屬高血糖促因。","B":"蜂窩性組織炎(感染應激)會升高血糖。","C":"工作壓力增加使升糖激素上升、血糖升高。","D":"正解。食量減少且運動增加會降血糖,非高血糖促因,最不適當。"},"sources":["新文京《內外科護理學》內分泌系統","ADA Standards of Care in Diabetes(高血糖危症)","糖尿病急症照護指引"]}},"101030-N3-4":{"quick":"甲狀腺風暴降溫應用acetaminophen,「不可用aspirin」——水楊酸會置換結合的甲狀腺素、升高游離T4加重病情。","detail":{"background":"甲狀腺風暴(thyroid storm)是甲狀腺機能亢進的致命急症,以高燒、心搏過速/心律不整、躁動譫妄、嘔吐腹瀉脫水為特徵,需積極處置:①補液(生理食鹽水)與葡萄糖、補充維生素;②β-腎上腺素阻斷劑(如propranolol)控制心率與交感症狀;③抗甲狀腺藥(PTU/methimazole)抑制合成,之後給碘劑抑制釋放;④降溫——退燒應用「acetaminophen」加物理降溫,「禁用aspirin(水楊酸)」,因水楊酸會與甲狀腺結合蛋白競爭、置換出甲狀腺素使「游離T4上升」而加重風暴。本題找「錯誤」者為 B。","options":{"A":"靜脈補充生理食鹽水及維生素,正確。","B":"正解(錯誤敘述)。風暴退燒不可用aspirin,水楊酸會升高游離T4加重病情。","C":"β-腎上腺素阻斷劑降低心搏速率,正確。","D":"口服或靜脈給抗甲狀腺藥物抑制合成,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"101030-N3-8":{"quick":"放射碘(131I)破壞甲狀腺濾泡細胞、減少甲狀腺素;高劑量者多年後易出現甲狀腺功能低下。","detail":{"background":"放射碘(131I)治療甲狀腺機能亢進:碘被甲狀腺攝取後放出β射線「破壞甲狀腺濾泡細胞」、減少甲狀腺素合成(非增加),屬非手術治療。常見遲發合併症是「甲狀腺功能低下」——多數接受治療者數年至十年後甲狀腺功能逐漸低下,需長期追蹤、必要時補充甲狀腺素(本題正解B)。服用注意:宜「空腹」服用(食物延遲吸收)、服後「多喝水並多排尿/排便」加速放射碘排出、做好輻射防護(限制與孕婦幼兒接觸、分開使用衛浴、沖水2~3次)。本題正確者為 B。","options":{"A":"放射碘破壞濾泡細胞、減少甲狀腺素合成,非增加。","B":"正解。高劑量者多年後多會出現甲狀腺功能低下。","C":"宜空腹服用(食物會延遲吸收),非服用前進食。","D":"服後應多喝水加速放射碘排出,非限制液體。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"101110-N3-5":{"quick":"黏液水腫(成人嚴重甲狀腺功能低下)呈全身性「非凹陷性」水腫,代謝率下降;女性多見。","detail":{"background":"黏液水腫(myxedema)是成人嚴重甲狀腺功能低下的表現:甲狀腺素不足使親水性黏多醣堆積於組織間隙,造成全身「非凹陷性水腫」(臉部浮腫、眼瞼眶周腫、舌大、聲音低沉),並因代謝率「下降」而怕冷、體重增加、便秘、嗜睡、心搏過緩、高血脂。好發於「女性」(女多於男)、成人;發生於嬰兒先天甲狀腺低下者稱「克汀病(呆小症)」。本題正確者為 A(全身性非凹陷性水腫)。","options":{"A":"正解。黏液水腫為全身組織間隙「非凹陷性」水腫。","B":"黏液水腫女性多於男性,非男性5倍。","C":"成人甲狀腺素減少稱黏液水腫;嬰兒先天低下稱克汀病。","D":"甲狀腺低下使代謝率下降,非增加。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"101110-N3-9":{"quick":"甲狀腺切除術後最可能因「誤傷或切除副甲狀腺」而出現低血鈣(手足抽搐)。","detail":{"background":"甲狀腺切除術後須警覺的合併症:①出血/血腫壓迫氣道(術後早期最危急);②喉返神經受損→聲音嘶啞;③「副甲狀腺被誤切或受損→低血鈣」,出現口周與手足麻刺、手足抽搐、Chvostek/Trousseau徵象陽性、嚴重時喉痙攣;④甲狀腺風暴。本題問「最可能」合併症為「低血鈣(D)」,因副甲狀腺位於甲狀腺後方,術中易受影響,故術後須監測血鈣、床邊備鈣劑與氣切包。","options":{"A":"低血鈉非甲狀腺切除術的典型直接合併症。","B":"低血糖非甲狀腺切除的典型合併症。","C":"低血壓非此手術最相關之特異合併症。","D":"正解。副甲狀腺受損致低血鈣是甲狀腺切除術的重要合併症。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"102030-N3-74":{"quick":"甲亢高代謝→宜高蛋白、高熱量飲食;並限制訪客減少刺激。高纖維會加重腹瀉、限飲水不適當。","detail":{"background":"甲狀腺機能亢進照護:因代謝亢進、消耗大,飲食應「高熱量、高蛋白、高碳水化合物、高維生素」以補充消耗(陳述1高蛋白正確);因交感亢進、易激動,環境宜安靜、「限制訪客、減少刺激」(陳述3正確)。陳述2「高纖維」不宜——甲亢常腹瀉/排便次數增加,高纖維會加重;陳述4「限飲水」不宜——甲亢多汗、代謝高,需「補充足夠水分」。並應避免含咖啡因飲料。故正確組合為1與3(B)。","options":{"A":"含陳述2(高纖維)不適當(甲亢易腹瀉)。","B":"正解。高蛋白(1)+限訪客減少刺激(3)正確。","C":"含陳述2、4皆不適當。","D":"含陳述4(限飲水)不適當,甲亢多汗需補水。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"102110-N3-36":{"quick":"Grave氏病屬甲狀腺機能亢進:神經質、皮膚潮紅多汗、排便次數增加皆為交感與代謝亢進表現。","detail":{"background":"Grave氏病(瀰漫性毒性甲狀腺腫)是甲狀腺機能亢進最常見原因(自體免疫,TSH受體抗體刺激),臨床因代謝與交感亢進而有:神經質/易怒/焦慮(陳述1)、怕熱不耐熱、多汗、皮膚溫暖潮紅(陳述4)、腸蠕動增加→排便次數增加/腹瀉(陳述5)、心悸心搏過速、脈搏壓「增大」、體重減輕、突眼、甲狀腺腫。陳述3「熱耐受力佳」錯誤(應為怕熱);陳述6「脈搏壓下降」錯誤(應增大)。故正確組合為1、4、5(B)。","options":{"A":"含陳述6(脈搏壓下降)錯誤,甲亢脈壓增大。","B":"正解。神經質(1)+皮膚潮紅多汗(4)+排便增加(5)為甲亢表現。","C":"含陳述3(熱耐受力佳)錯誤,甲亢怕熱。","D":"含陳述3、6皆錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"102110-N3-37":{"quick":"甲狀腺功能低下者服甲狀腺素製劑後須觀察心絞痛/心律不整(過快補充會增加心臟負荷)。","detail":{"background":"甲狀腺功能低下護理:①因代謝率低、產熱少而怕冷,但不可用電毯/熱敷墊(皮膚乾燥、感覺與循環差易燙傷),應以增添衣被保暖;②飲食宜「低熱量(防體重增加)、高纖維(防便秘)、低脂低膽固醇」,而非高熱量高蛋白高纖維;③情緒低落屬疾病表現,治療甲狀腺素後改善,不應隨意給鎮靜藥(會加重嗜睡、抑制中樞);④補充甲狀腺素(L-thyroxine)應「由小劑量漸增」,並觀察有無「心絞痛、心律不整、心悸」(甲狀腺素增加心臟耗氧),尤其老人與心臟病者(本題正解D)。","options":{"A":"甲狀腺低下宜低熱量、高纖維、低脂,非高熱量高蛋白。","B":"感覺與循環差,用電毯/熱敷易燙傷,應避免。","C":"情緒問題隨甲狀腺素治療改善,不應隨意給鎮靜藥。","D":"正解。服甲狀腺素後須觀察有無心絞痛或心律不整。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"103030-N3-70":{"quick":"甲狀腺功能低下因代謝率下降:高血脂、便秘、深腱反射「鬆弛延遲」、無凸眼。","detail":{"background":"甲狀腺功能低下(代謝率下降)的臨床表徵:怕冷、體重增加、嗜睡、皮膚乾燥粗糙、聲音低沉、「便秘(腸蠕動減慢)」、心搏過緩、「高血脂(膽固醇上升)」、深部肌腱反射「鬆弛期延長/減弱」、月經異常。本題正確者為B「高血脂」。A「凸眼」屬甲亢(Grave氏病);C「腹瀉」屬甲亢(低下是便秘);D「深腱反射增加」屬甲亢(低下是反射延遲減弱)。","options":{"A":"凸眼是甲狀腺機能亢進(Grave氏病)表現,非低下。","B":"正解。甲狀腺低下代謝下降致高血脂。","C":"甲狀腺低下是便秘(腸蠕動減慢),非腹瀉。","D":"甲狀腺低下深腱反射延遲/減弱,非增加。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"103100-N3-68":{"quick":"左旋甲狀腺素(L-Thyroxine)半衰期長(約7天),每日「服用一次」即可,不需一日三次。","detail":{"background":"左旋甲狀腺素(L-Thyroxine/Levothyroxine)是合成的T4製劑,用於矯治甲狀腺素缺乏(甲狀腺功能低下),「半衰期長(約7天)」,故「每日只需服用一次」(空腹、晨起、固定時間,與制酸劑/鈣鐵間隔),需「終身、規律」服用、不可自行停藥或更改劑量。劑量需由小漸增並監測TSH與心臟症狀。本題找「錯誤」者:B「一般每日服用三次或多次」錯誤(應每日一次)。","options":{"A":"L-Thyroxine 是合成的甲狀腺素,正確。","B":"正解(錯誤敘述)。半衰期長,每日服用一次即可,非三次以上。","C":"半衰期約7~8天,正確。","D":"可矯治甲狀腺素缺乏症(甲狀腺功能低下),正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"103100-N3-73":{"quick":"黏液水腫昏迷:血清T4降低(嚴重甲狀腺低下);並伴低血鈉、低血糖、低體溫與高膽固醇。","detail":{"background":"黏液水腫昏迷(myxedema coma)是嚴重甲狀腺功能低下的致命急症,常因感染、寒冷、鎮靜劑誘發,表現低體溫、意識昏迷、低血壓、心搏過緩、低通氣致CO2滯留。檢查結果:血清「T4降低」(本題正解D)、TSH(原發性者)升高、「低血鈉(稀釋性)」、「低血糖」、「高膽固醇/高血脂」。處理:靜脈補充甲狀腺素、保暖、支持呼吸循環、矯正電解質、治療誘因。本題正確者為D(血清T4降低)。","options":{"A":"黏液水腫昏迷多為低血鈉,非血鈉升高。","B":"多為低血糖,非血糖升高。","C":"甲狀腺低下膽固醇升高,非降低。","D":"正解。血清T4降低反映嚴重甲狀腺功能低下。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"104030-N3-68":{"quick":"甲狀腺功能低下因代謝率下降→腸蠕動減慢(便秘);並有體重增加、怕冷、低體溫。","detail":{"background":"甲狀腺功能低下因甲狀腺素不足、代謝率下降,各系統「變慢」:腸蠕動減慢→「便秘」(本題正解C)、體重「增加」(非減輕)、怕冷與體溫「偏低」(非上升)、心搏過緩、嗜睡、皮膚乾冷、高血脂。血壓多正常或舒張壓略升但非典型「上升」表現。本題問正確者為C(腸蠕動減慢)。記憶:甲低=全身代謝「慢、冷、胖、便秘」。","options":{"A":"甲狀腺低下血壓非典型上升表現。","B":"甲狀腺低下體重增加,非減輕。","C":"正解。代謝下降致腸蠕動減慢(便秘)。","D":"甲狀腺低下產熱少、體溫偏低,非上升。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"104030-N3-69":{"quick":"Grave氏病突眼與「眼瞼退縮」有關;球後脂肪與眼外肌是增生/水腫(非萎縮/減少),組織為水腫非脫水。","detail":{"background":"Grave氏病的眼病變(甲狀腺相關眼病)機轉:自體免疫使「眼窩後脂肪組織增生、眼外肌肥大與水腫、淋巴浸潤」,將眼球往前推→突眼(exophthalmos);交感亢進使「上眼瞼退縮(eyelid retraction)」、眼裂變大、瞬目減少(凝視外觀)。本題選項中:A「眼瞼退縮」是造成外觀突眼/眼裂大的因素(正解);B「眼外肌萎縮」錯(應肥大)、C「組織脫水」錯(應水腫)、D「眼窩脂肪減少」錯(應增生)。本題正確者為 A。","options":{"A":"正解。眼瞼退縮使眼裂變大、外觀突眼。","B":"眼外肌是肥大/水腫,非萎縮。","C":"球後組織是水腫,非脫水。","D":"眼窩脂肪是增生,非減少。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"104100-N3-74":{"quick":"甲狀腺功能低下代謝率下降→高血脂(血清脂質增加);腸蠕動與食慾下降。","detail":{"background":"甲狀腺功能低下因代謝率降低:脂質代謝變慢→膽固醇與三酸甘油酯堆積→「血清脂質增加(高血脂)」(本題正解D),也是甲低病人易動脈硬化的原因之一。其他表現:腸蠕動「減慢」便秘(非增加)、食慾「下降」但體重反增(代謝低)、腸胃道分泌「減少」、怕冷、嗜睡、皮膚乾。本題正確者為 D。","options":{"A":"甲狀腺低下腸蠕動減慢,非增加。","B":"食慾下降(但體重增加),非增加。","C":"腸胃道分泌減少,非增加。","D":"正解。代謝下降致血清脂質增加(高血脂)。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"105030-N3-69":{"quick":"黏液水腫(甲低)病人皮膚乾燥脆弱,洗澡水溫勿過熱;怕冷需溫暖環境但禁用電毯防燙傷。","detail":{"background":"成人甲狀腺功能低下/黏液水腫的護理:①皮膚乾燥、粗糙、脆弱,「洗澡水溫勿過熱」(過熱使皮膚更乾、且感覺差易燙傷)、洗後擦保濕乳液(本題正解B);②因產熱少、怕冷,環境應「溫暖」(非提供涼爽環境),但保暖以添衣被為主,「禁用電毯/熱水袋」(感覺與循環差易燙傷);③飲食「低熱量(防肥)、高纖維(防便秘)、低脂」,非高熱量。本題正確者為 B。","options":{"A":"甲低宜低熱量飲食(防體重增加),非高熱量。","B":"正解。皮膚乾燥脆弱,洗澡水溫不宜過熱。","C":"甲低怕冷,環境應溫暖,非提供涼爽環境。","D":"感覺與循環差,用電毯易燙傷,應避免。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"105090-N3-69":{"quick":"甲狀腺功能低下宜低膽固醇飲食(本身高血脂),並低熱量、高纖維、低脂。","detail":{"background":"甲狀腺功能低下的飲食指導:因代謝率低、易體重增加且伴高血脂,飲食原則為「低熱量(控制體重)、低脂、低膽固醇」(本題正解D)、「高纖維」(改善便秘)、足量水分。應避免高脂、高熱量、高膽固醇飲食(會加重高血脂與肥胖)。低纖維反而加重便秘,故不宜。本題正確者為 D(低膽固醇)。","options":{"A":"甲低伴高血脂,應低脂而非高脂。","B":"甲低易體重增加,應低熱量而非高熱量。","C":"甲低便秘,應高纖維而非低纖維。","D":"正解。甲低伴高血脂,宜低膽固醇飲食。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"106030-N3-67":{"quick":"甲狀腺風暴是甲亢急性惡化:高燒、譫妄、心搏過速、甲狀腺素(T3/T4)升高。","detail":{"background":"甲狀腺風暴(thyroid storm)為甲狀腺機能亢進的致命惡化,典型表現:「體溫過高(高燒)」、躁動譫妄甚至昏迷、「心搏過速/心律不整(如心房顫動)」、嘔吐腹瀉脫水、心衰竭;檢驗呈甲狀腺素(T3、T4、游離T4)「升高」、TSH降低。本題正確者為B「體溫過高、譫妄」。A(T3T4下降)、C(游離T4下降)、D(心搏過慢)皆與風暴相反。處理:抗甲狀腺藥+碘劑+β阻斷劑+類固醇+降溫補液。","options":{"A":"甲狀腺風暴T3、T4升高,非下降。","B":"正解。體溫過高、譫妄是甲狀腺風暴典型表現。","C":"游離T4升高,非下降。","D":"風暴是心搏過速,非過慢。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"106030-N3-72":{"quick":"飽和碘化鉀溶液(SSKI)應以「開水或果汁稀釋、用吸管」服用以減少胃刺激與牙齒染色,故「絕不可與果汁服用」為錯誤。","detail":{"background":"甲狀腺機能亢進服用「飽和碘化鉀溶液(Lugol/SSKI)」的衛教:碘可抑制甲狀腺素的合成與釋放(用於術前準備或風暴)。服用法應「以開水、果汁或牛奶稀釋」後「用吸管飲用」,以減少胃腸刺激與「避免牙齒染色」,飯後服用。故「絕不可與果汁一起服用」是錯誤的(本題錯誤項B)——加果汁正是為了稀釋遮味。其餘:A抑制合成、C切除術後一週評估Chvostek/Trousseau(觀察低血鈣)、D多汗提供清涼環境,皆正確。本題找「錯誤」者為 B。","options":{"A":"飽和碘化鉀可抑制甲狀腺素合成,正確。","B":"正解(錯誤敘述)。應以果汁/開水稀釋並用吸管服用,非絕不可與果汁。","C":"切除術後觀察Chvostek/Trousseau以察低血鈣,正確。","D":"多汗提供清涼舒適環境,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"106110-N3-65":{"quick":"碘製劑(溶液)應「以吸管飲用」避免牙齒染色,並以開水/果汁稀釋減少刺激;放射碘後應多喝水。","detail":{"background":"碘製劑(飽和碘化鉀/Lugol溶液)服用注意:①應「以吸管飲用」並可用開水、果汁、牛奶稀釋,以「避免牙齒染色」與減少胃腸刺激、遮蓋金屬味(本題正解B);②碘溶液具腐蝕性,「不可貯存於紙杯」(會滲漏變質),應以玻璃杯盛裝;③服「放射性碘」後應「多喝水、多排尿」加速排出,而非限制飲水;④可與果汁/牛奶「混合稀釋」,並非不可。本題正確者為 B。","options":{"A":"碘溶液不可貯存於紙杯(易滲漏),應用玻璃杯。","B":"正解。應以吸管飲用,避免牙齒染色。","C":"服放射碘後應多喝水加速排出,非限制飲水。","D":"碘製劑可與果汁/牛奶稀釋服用以遮味減刺激。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"106110-N3-66":{"quick":"黏液性水腫昏迷是嚴重甲狀腺功能「低下」,血清甲狀腺素降低,治療需「補充」甲狀腺素。","detail":{"background":"黏液性水腫昏迷(myxedema coma)是嚴重甲狀腺功能「低下」的急症,血清「甲狀腺素(T4)降低」(本題正解B),原發性者TSH升高。表現低體溫、意識昏迷、低血糖、低血鈉、心搏過緩、低通氣。治療是「靜脈補充甲狀腺素」、保暖、支持呼吸循環、矯正電解質與血糖、找出並治療誘因——而非用「抗甲狀腺藥」(那是治甲亢)。它是甲狀腺低下的急症,與副甲狀腺亢進無關。本題正確者為 B。","options":{"A":"黏液水腫昏迷多為低血糖,非高血糖。","B":"正解。血清甲狀腺素降低反映嚴重甲狀腺功能低下。","C":"治療需補充甲狀腺素,非用抗甲狀腺藥。","D":"與副甲狀腺機能亢進無關。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"106111-N3-67":{"quick":"甲狀腺機能亢進因代謝與交感亢進→心跳過速;食慾增加、腸蠕動增加、T3/T4上升。","detail":{"background":"甲狀腺機能亢進(代謝率上升)的臨床表徵:「心跳過速/心悸」(本題正解B)、怕熱多汗、體重減輕但「食慾增加」、腸蠕動「增加」(排便次數多/腹瀉)、神經質手抖、突眼、甲狀腺腫,檢驗T3、T4(游離T4)「上升」、TSH下降。本題正確者為B(心跳過速)。其餘A(食慾下降)、C(腸蠕動減慢)、D(T3下降)皆與甲亢相反,屬甲狀腺低下的描述。","options":{"A":"甲亢食慾增加,非下降。","B":"正解。甲亢代謝與交感亢進致心跳過速。","C":"甲亢腸蠕動增加(排便多),非減慢。","D":"甲亢T3、T4上升,非下降。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"106111-N3-69":{"quick":"甲狀腺切除後宜採「半坐臥、頭頸以枕頭支托固定」,減少傷口牽扯與腫脹不適。","detail":{"background":"甲狀腺切除術後的姿勢與護理:採「半坐臥(semi-Fowler)」抬高床頭以利靜脈回流、減輕傷口腫脹,並「以枕頭/沙袋支托固定頭頸」、移動時用雙手托住頭部後方避免頸部過度後仰或前屈,以防傷口縫合處過度牽扯出血(本題正解D)。同時備氣切包與鈣劑於床邊,觀察出血、呼吸道阻塞(喉頭水腫)、聲音嘶啞(喉返神經)、低血鈣(副甲狀腺受損)。俯臥或平躺都不利。本題正確者為 D。","options":{"A":"俯臥頭轉側邊不利傷口與呼吸道觀察,不適當。","B":"仰臥頭頸下墊枕仍可能牽扯傷口,非最佳。","C":"側臥非甲狀腺術後減少牽扯的標準姿勢。","D":"正解。半坐臥、頭頸枕頭支托固定可減少牽扯與腫脹。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"107030-N3-69":{"quick":"甲狀腺素會「增強」抗凝血劑(warfarin)效應、增強毛地黃毒性,需監測;新生兒甲低應「儘早高劑量」治療。","detail":{"background":"甲狀腺素(L-thyroxine)的藥物交互作用與用藥原則:①會「增強口服抗凝血劑(warfarin)的效應」(加速凝血因子代謝),併用時需監測INR、慎防出血(本題正解B);②會增加組織對毛地黃(digoxin)的反應/代謝,需注意毒性;③先天性甲狀腺低下(克汀病)的新生兒應「儘早、足量(較高劑量)」治療,以免智能與生長發育遲滯,而非低劑量延遲;④有心絞痛/心臟病的成人則應「由小劑量開始」漸增,以免誘發心絞痛、心律不整。本題正確者為 B。","options":{"A":"甲狀腺素會增加(非降低)毛地黃的作用/毒性。","B":"正解。甲狀腺素會增強抗凝血劑的效應,需監測。","C":"新生兒先天甲低應儘早高劑量治療,非低劑量。","D":"心絞痛病人應由小劑量開始,非大劑量。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"107110-N3-70":{"quick":"抗甲狀腺硫醯胺類(thionamides)用法為「先用大劑量再逐漸減量」維持;需長期服用,效果約數週顯現,副作用為顆粒性白血球「減少」。","detail":{"background":"抗甲狀腺藥(thionamides:PTU、methimazole)抑制甲狀腺素合成:①用法「先用較大劑量控制,症狀改善後逐漸減量維持」(本題正解A);②因僅抑制新合成、體內已合成的甲狀腺素仍會釋放,故藥效約「數週(2~4週起)」才顯現,需服用「1~2年」療程,「症狀消失不可立即停藥」(易復發);③最嚴重副作用是「顆粒性白血球減少(agranulocytosis)」與肝毒性,出現發燒喉嚨痛須立即就醫驗白血球。本題正確者為 A。","options":{"A":"正解。抗甲狀腺藥先用大劑量再逐漸減量維持。","B":"症狀消失不可即停藥,需服用1~2年療程。","C":"藥效約數週顯現,非2~3個月。","D":"副作用是顆粒性白血球「減少」,非增多。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"107110-N3-75":{"quick":"甲狀腺機能亢進因代謝亢進「食慾增加」(但體重減輕);眼球突出、甲狀腺腫、心搏過速皆為典型。","detail":{"background":"甲狀腺機能亢進的臨床表徵:眼球突出(Grave氏病)、瀰漫性甲狀腺腫、心搏過速/心悸/心律不整、怕熱多汗、神經質手抖、腸蠕動增加,以及代謝亢進使「食慾增加但體重反而減輕」。本題找「錯誤」者:C「食慾不振」錯誤——甲亢應為「食慾增加」(吃多卻變瘦是典型矛盾)。A(眼球突出)、B(甲狀腺腫)、D(心搏過速)皆為甲亢正確表現。","options":{"A":"眼球突出是甲亢(Grave氏病)表現,正確。","B":"甲狀腺腫是甲亢表現,正確。","C":"正解(錯誤敘述)。甲亢食慾增加,非食慾不振。","D":"甲亢心搏過速,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"108020-N3-67":{"quick":"甲狀腺機能低下可出現低血鈉(稀釋性);並怕冷、非凹陷性黏液水腫、食慾下降但體重增加。","detail":{"background":"甲狀腺機能低下的臨床表徵:代謝率下降致怕冷(對熱不敏感)、體重增加(雖食慾下降)、嗜睡、皮膚乾、便秘、心搏過緩、高血脂;水分代謝異常與自由水排出減少可致「稀釋性低血鈉」(本題正解A);水腫為「非凹陷性」黏液水腫(非凹陷性)。本題正確者為A(低血鈉)。其餘:B「對熱敏感」錯(甲低怕冷),C「凹陷性水腫」錯(應非凹陷性),D「食慾降低且體重減輕」錯(體重應增加)。","options":{"A":"正解。甲狀腺低下可出現稀釋性低血鈉。","B":"甲低怕冷,對「冷」敏感而非對熱敏感。","C":"甲低水腫為非凹陷性黏液水腫,非凹陷性。","D":"甲低雖食慾下降但體重增加,非減輕。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"108020-N3-71":{"quick":"甲狀腺切除可能傷及「喉返神經」造成聲音嘶啞;副甲狀腺受損會低血鈣(非高血鈣)。","detail":{"background":"甲狀腺切除術後合併症:①出血/血腫壓迫氣道;②「喉返神經(返喉神經)受損」→聲音嘶啞、雙側受損可致呼吸道阻塞(本題正解D);③副甲狀腺被誤切/受損→「低血鈣」(非高血鈣)、手足抽搐;④甲狀腺風暴;⑤喉頭水腫。本題正確者為D(喉返神經受損)。其餘:A「高血鈣」錯(應低血鈣)、B「低血磷」錯(低血鈣常伴高血磷)、C「體溫過低」非典型直接合併症(風暴反而高燒)。","options":{"A":"副甲狀腺受損致低血鈣,非高血鈣。","B":"低血鈣常伴高血磷,非低血磷。","C":"體溫過低非甲狀腺切除典型合併症(風暴為高燒)。","D":"正解。可能傷及喉返神經造成聲音嘶啞。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"108110-N3-68":{"quick":"黏液性水腫是「甲狀腺」機能低下造成的;甲狀腺素不足使黏多醣堆積於組織間隙。","detail":{"background":"黏液性水腫(myxedema)是成人嚴重「甲狀腺」功能低下的特徵性表現:甲狀腺素不足使親水性黏多醣(glycosaminoglycan)堆積在皮膚與組織間隙,形成全身性「非凹陷性」水腫(臉浮腫、眼瞼腫、舌大、聲沉),並伴怕冷、嗜睡、便秘、高血脂、心搏過緩。本題問「何內分泌機能低下會造成黏液水腫」,答案為「甲狀腺(A)」。副甲狀腺低下致低血鈣抽搐、腎上腺低下致Addison、腦下垂體前葉低下致多腺體功能不足,皆非黏液水腫的直接成因。","options":{"A":"正解。黏液水腫由甲狀腺機能低下(甲狀腺素不足)造成。","B":"副甲狀腺低下造成低血鈣手足抽搐,非黏液水腫。","C":"腎上腺皮質低下造成Addison氏病,非黏液水腫。","D":"腦下垂體前葉低下造成多腺體功能不足,非直接致黏液水腫。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"108110-N3-69":{"quick":"甲狀腺切除後應注意聲音嘶啞(喉返神經)、觀察口部刺麻感(低血鈣);鼓勵深呼吸咳嗽、喝溫開水。","detail":{"background":"甲狀腺切除術後護理:陳述1「注意有無聲音嘶啞」正確(評估喉返神經有無受損);陳述4「觀察口部刺麻感」正確(評估副甲狀腺受損致低血鈣的早期徵象——口周與指端麻刺)。陳述2「禁止深呼吸、咳嗽運動」錯誤——應「鼓勵」深呼吸與有效咳嗽以清痰防肺部合併症(咳嗽時以雙手支托頸部減輕牽扯);陳述3「喝溫開水」錯誤——術後吞嚥不適宜給「冰涼」流質減輕腫脹疼痛(非溫開水)。故正確組合為1與4(B)。","options":{"A":"含陳述2(禁深呼吸咳嗽)錯誤。","B":"正解。注意聲音嘶啞(1)+觀察口部刺麻感(4)正確。","C":"含陳述2、3皆不適當。","D":"含陳述3(喝溫開水)不適當,宜冰涼流質。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"109030-N3-64":{"quick":"甲亢可有月經減少/停經、指甲遠心端鬆脫(甲床分離)、脛前黏液水腫;深腱反射「亢進」、皮膚潮濕。","detail":{"background":"甲狀腺機能亢進的臨床表徵組合:陳述1「月經減少或停經」正確(甲亢致月經量減少/稀發);陳述3「指甲遠心端鬆脫(甲床分離 onycholysis,Plummer指甲)」正確;陳述5「脛前黏液水腫(pretibial myxedema)」是Grave氏病特徵之一,正確。陳述2「深肌腱反射減弱」錯誤——甲亢反射「亢進、放鬆期變快」;陳述4「皮膚潮紅乾裂」錯誤——甲亢皮膚溫暖「潮濕多汗」(非乾裂);陳述6「指尖刺麻」非甲亢典型。故正確組合為1、3、5(B)。","options":{"A":"含陳述2(反射減弱)錯誤,甲亢反射亢進。","B":"正解。月經減少(1)+指甲鬆脫(3)+脛前黏液水腫(5)為甲亢表現。","C":"含陳述2、4、6皆錯誤。","D":"含陳述4、6錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"109030-N3-70":{"quick":"Grave氏病是甲狀腺素分泌過多(甲亢);好發中年女性、血脂下降(代謝快),與副甲狀腺低下無關。","detail":{"background":"Grave氏病(瀰漫性毒性甲狀腺腫)是「甲狀腺素分泌過多」的甲狀腺機能亢進最常見原因(自體免疫,TSH受體刺激抗體 TSI)(本題正解C),好發於「中年女性」(非老年);代謝率上升使血清脂質「下降」(非增加);主要表現為甲亢三聯——甲狀腺腫、突眼、脛前黏液水腫,與副甲狀腺機能低下無關。本題正確者為 C(甲狀腺素分泌過多)。","options":{"A":"甲亢代謝快,血清脂質下降,非增加。","B":"Grave氏病好發中年女性,非老年。","C":"正解。Grave氏病為甲狀腺素分泌過多所引起。","D":"與副甲狀腺機能低下無關。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"109110-N3-69":{"quick":"黏液性水腫由「甲狀腺激素(甲狀腺素)」分泌不足造成。","detail":{"background":"黏液性水腫(myxedema)是甲狀腺功能低下的特徵,根本原因是「甲狀腺激素(甲狀腺素 T3/T4)」分泌不足,使黏多醣堆積於組織間隙形成非凹陷性水腫,並伴怕冷、嗜睡、便秘、高血脂、心搏過緩。本題問「何種荷爾蒙不足會導致黏液性水腫」,答案為「甲狀腺激素」(選項B,雖標示TSH,題意指甲狀腺素分泌不足)。生長激素不足致侏儒、ACTH不足致腎上腺低下、性腺激素不足致性腺功能低下,皆非黏液水腫成因。","options":{"A":"生長激素不足造成生長遲緩/侏儒,非黏液水腫。","B":"正解。甲狀腺激素(甲狀腺素)不足造成黏液性水腫。","C":"腎上腺皮質素不足造成腎上腺功能低下,非黏液水腫。","D":"性腺激素不足造成性腺功能低下,非黏液水腫。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"110110-N3-68":{"quick":"甲狀腺機能亢進可將飽和碘化鉀「混牛奶/果汁稀釋」並用吸管服用;睡眠抬高床頭、飲食宜高熱量高蛋白「低纖」。","detail":{"background":"甲狀腺機能亢進護理處置:服用「飽和碘化鉀溶液」可用「牛奶、果汁或開水稀釋」並用吸管飲用,以減少胃腸刺激與牙齒染色(本題正解D)。其餘錯誤:A「睡覺平躺」不利突眼(應抬高床頭以利眼眶靜脈回流、減輕眼瞼水腫);B「限制鉀」與保護角膜無關(保護角膜靠人工淚液、睡眠戴眼罩/膠帶閉合眼瞼);C 飲食應「高熱量、高蛋白」但「低纖維」(甲亢易腹瀉,高纖維會加重),故「高纖維」不對。本題正確者為 D。","options":{"A":"突眼者應抬高床頭利眼眶回流,非平躺。","B":"保護角膜靠人工淚液與閉眼,與限制飲食鉀無關。","C":"甲亢宜高熱量高蛋白但「低纖維」(易腹瀉),非高纖維。","D":"正解。飽和碘化鉀可混牛奶/果汁稀釋並用吸管服用。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"110110-N3-69":{"quick":"甲狀腺素製劑會「升高血糖」(屬升糖作用),糖尿病人需監測血糖;故「使血糖下降」為錯誤。","detail":{"background":"甲狀腺素(L-thyroxine)製劑使用原則:①需「終身規律服用,不可自行停藥或更改劑量」;②會「增強」毛地黃、ketamine、口服抗凝血劑等藥物作用(交互作用需注意);③先天甲狀腺低下的新生兒/嬰幼兒應「儘早高劑量」治療以避免智能與發育遲滯;④甲狀腺素會促進代謝、屬升糖作用→「使血糖上升」,故糖尿病病人服用後須監測血糖、可能需調整降糖藥。本題找「錯誤」者:D「服用甲狀腺素會使血糖下降」錯誤(應上升)。","options":{"A":"甲狀腺素需終身服用、不可自行停藥,正確。","B":"甲狀腺素增強毛地黃、ketamine、抗凝血劑作用,正確。","C":"新生兒/嬰幼兒應儘早高劑量治療避免發育遲滯,正確。","D":"正解(錯誤敘述)。甲狀腺素升高血糖,非下降。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"111030-N3-69":{"quick":"原發性甲狀腺低下/黏液水腫昏迷時,T4下降但「TSH升高」(負回饋),故「TSH下降」為錯誤。","detail":{"background":"黏液水腫昏迷是嚴重甲狀腺功能低下急症,檢查結果:血清「T4下降」(陳述A正確),由於是原發性甲狀腺低下,腦下垂體負回饋使「TSH升高」(故陳述B「TSH下降」為錯誤)、低血鈉(陳述C正確)、低血糖(陳述D正確)、低體溫。本題找「錯誤」者為 B(TSH下降)。記憶:原發性甲低=T4↓而TSH↑;若是次發性(腦下垂體問題)才會TSH低。","options":{"A":"血清T4下降,正確。","B":"正解(錯誤敘述)。原發性甲低TSH應升高,非下降。","C":"可有稀釋性低血鈉(血鈉下降),正確。","D":"可有低血糖(血糖下降),正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"111030-N3-73":{"quick":"甲狀腺功能低下使用甲狀腺素須監測血糖(升糖作用);甲狀腺素宜空腹服用、保暖勿用電毯、飲食低熱量高纖維。","detail":{"background":"甲狀腺功能低下護理:①甲狀腺素(L-thyroxine)宜「空腹(晨起飯前)」服用、與制酸劑/鈣鐵間隔,而非飯後;②甲狀腺素屬升糖作用,糖尿病病人服用後須「監測血糖」之變化(本題正解B);③怕冷保暖應添衣被,「禁用電毯/熱水袋」(感覺與循環差易燙傷);④飲食宜「低熱量(防肥)、高纖維(防便秘)、低脂」,而非高熱量低纖維。本題正確者為 B。","options":{"A":"甲狀腺素宜空腹服用,非飯後。","B":"正解。甲狀腺素有升糖作用,須監測血糖變化。","C":"感覺循環差用電毯易燙傷,應以衣被保暖。","D":"甲低宜低熱量、高纖維、低脂,非高熱量低纖維。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"111110-N3-68":{"quick":"甲狀腺風暴檢驗為游離T4「升高」而TSH「下降」,故「free T4與TSH皆上升」為錯誤。","detail":{"background":"甲狀腺風暴(thyroid storm)是甲亢致命惡化,檢驗結果應為「游離T4(free T4)升高、TSH下降」(原發性甲亢的負回饋),故選項A「free T4與TSH上升」錯誤(TSH應下降)。臨床評估發燒、心搏過速、脫水、暴躁不安、譫妄(B正確);處置給β-腎上腺素阻斷劑(propranolol)降心率(C正確)、抗甲狀腺藥(methimazole/PTU)抑制合成、碘劑抑制釋放、類固醇(D正確)。本題找「錯誤」者為 A。","options":{"A":"正解(錯誤敘述)。風暴時free T4升高但TSH下降,非皆上升。","B":"評估發燒、心搏過速、脫水、暴躁不安,正確。","C":"給β-阻斷劑(propranolol)降心率,正確。","D":"給Methimazole抑制甲狀腺素合成,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"111110-N3-73":{"quick":"甲狀腺機能亢進代謝亢進、消耗大,飲食宜高熱量、高碳水化合物、高蛋白,並低纖維(防腹瀉)。","detail":{"background":"甲狀腺機能亢進飲食指導:因代謝率升高、能量消耗大,應採「高熱量、高碳水化合物(高醣)、高蛋白、高維生素」以補充消耗、防止體重持續下降(本題正解B「高碳水化合物」);並「低纖維」(甲亢易腹瀉,高纖維會加重)、限制咖啡因(咖啡、茶)以減少興奮、補充足夠水分。故A低蛋白、C低熱量、D高纖維皆與甲亢需求相反。本題正確者為 B。","options":{"A":"甲亢應高蛋白補充消耗,非低蛋白。","B":"正解。甲亢宜高碳水化合物(高熱量)飲食。","C":"甲亢代謝高需高熱量,非低熱量。","D":"甲亢易腹瀉宜低纖維,非高纖維。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"112030-N3-70":{"quick":"碘製劑使用「不宜超過2週」,以免甲狀腺逸脫(escape)使大量甲狀腺素釋出而加重症狀。","detail":{"background":"甲狀腺機能亢進藥物治療:①抗甲狀腺藥(硫醯胺類 thioamides:PTU/methimazole)抑制甲狀腺素合成,須隨T3/T4下降漸減「但需長期(1~2年)」、症狀正常「不可立即停藥」(易復發);其副作用為「顆粒性白血球減少」與肝毒性。②碘製劑(Lugol/SSKI)抑制甲狀腺素「釋放與合成」並「減少腺體血管分布」(用於術前準備),但「使用不宜超過約2週」,否則發生「甲狀腺逸脫(escape)」——甲狀腺對碘的抑制適應後反而大量釋出甲狀腺素加重症狀(本題正解D)。A、B、C 把兩藥特性對調或錯誤。本題正確者為 D。","options":{"A":"抗甲狀腺藥需長期服用,症狀正常不可立即停藥。","B":"顆粒球/血小板減少是「硫醯胺類」的副作用,非碘製劑。","C":"減少腺體血管分布是「碘製劑」的作用,非硫醯胺類。","D":"正解。碘製劑使用不宜超過2週,以免甲狀腺逸脫加重症狀。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"112030-N3-71":{"quick":"甲狀腺手術多採「次全切除」維持功能;術後常見出血、聲門水腫、急性呼吸道阻塞等合併症。","detail":{"background":"甲狀腺切除術重點:陳述1「為維持正常甲狀腺功能,一般採次全(部分)甲狀腺切除」正確(保留部分腺體維持功能);陳述2「出血、聲門(喉頭)水腫、急性呼吸道阻塞為常見術後合併症」正確(術後早期最危急,須床邊備氣切包)。陳述3錯誤——術後聲音沙啞多因「單側」喉返神經受傷,「雙側」受傷較少且會致嚴重呼吸道阻塞;陳述4錯誤——術後需評估有無肌肉抽搐之「低血鈣(副甲狀腺受損)」,而非「甲狀腺功能低下」表徵。故正確組合為1與2(A)。","options":{"A":"正解。次全切除維持功能(1)+出血/聲門水腫/呼吸道阻塞(2)正確。","B":"含陳述3(雙側喉返神經受傷)不準確。","C":"含陳述4(甲狀腺功能低下表徵)錯誤,應為低血鈣。","D":"含陳述3、4皆有誤。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"112030-N3-72":{"quick":"甲狀腺術後鼓勵攝取「冰涼流質」減輕傷口腫脹不適;採半坐臥、鼓勵深呼吸咳嗽、飲食高蛋白足碘量適中。","detail":{"background":"甲狀腺切除術後護理:①鼓勵攝取「冰涼的流質食物」可減輕傷口腫脹、疼痛與止血(本題正解C);②姿勢採「半坐臥」抬高床頭利回流、減腫脹(非平躺);③應「鼓勵」深呼吸與有效咳嗽清痰(咳嗽時雙手支托頸部),非避免;④飲食宜高熱量「高蛋白」(非低蛋白),碘攝取依術式與後續治療由醫囑決定,不宜一律高碘。本題正確者為 C。","options":{"A":"術後採半坐臥,非平躺。","B":"應鼓勵深呼吸咳嗽清痰(支托頸部),非避免。","C":"正解。攝取冰涼流質食物可減輕傷口腫脹不適。","D":"飲食宜高蛋白,「低蛋白、高碘」不適當。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"112110-N3-74":{"quick":"甲狀腺功能低下使葡萄糖吸收「減慢」(代謝下降),故「葡萄糖吸收增加」為錯誤。","detail":{"background":"甲狀腺功能低下(代謝率下降)的全身表現:周邊血管阻力「增加」(代償保溫,舒張壓可略升)、心搏過緩、心收縮力下降甚至心包積液致「心音遙遠/分裂音」、腸蠕動慢致便秘、葡萄糖在腸道「吸收減慢」、可伴惡性(巨球性)貧血(常合併自體免疫胃炎/B12缺乏)。本題找「錯誤」者:C「葡萄糖吸收增加」錯誤——甲低使腸道葡萄糖吸收「減少/減慢」。A、B、D 皆為甲低可能的表現。","options":{"A":"甲低周邊血管阻力增加,正確。","B":"甲低可有心包積液致心音分裂/遙遠,正確。","C":"正解(錯誤敘述)。甲低使葡萄糖吸收減慢,非增加。","D":"甲低可合併惡性(巨球性)貧血,正確。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"112180-N3-47":{"quick":"甲狀腺機能亢進飲食宜高熱量、高碳水、高蛋白,但「高纖維」不適當(易加重腹瀉)。","detail":{"background":"甲狀腺機能亢進飲食:因代謝亢進需「高熱量、高碳水化合物、高蛋白、高維生素」補充消耗。本題問「不適當」者:D「高纖維」——甲亢腸蠕動增加、易腹瀉,高纖維飲食會加重腹瀉,故不適當,應採「低纖維」並限制咖啡因。A、B、C(高熱量、高碳水、高蛋白)皆適當。本題答案為 D。","options":{"A":"高熱量補充代謝消耗,適當。","B":"高碳水化合物補充能量,適當。","C":"高蛋白補充組織耗損,適當。","D":"正解(不適當)。甲亢易腹瀉,應低纖維而非高纖維。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"113030-N3-46":{"quick":"飽和碘化鉀可「降低甲狀腺素的釋放與合成」,屬術前準備或風暴用藥,短期使用即可。","detail":{"background":"飽和碘化鉀溶液(SSKI/Lugol)在甲狀腺機能亢進的作用:大量碘可抑制甲狀腺素的「釋放與合成(Wolff-Chaikoff效應)」並減少腺體血流與大小,故用於甲狀腺手術前準備或甲狀腺風暴(本題正解C)。使用注意:應「以開水/果汁/牛奶稀釋並用吸管」服用(減刺激、避免染牙),非「絕不可與牛奶」;它「不只是抑制T4轉T3」(那是propranolol/PTU的次要作用);且效果快、屬「短期」使用(長期會甲狀腺逸脫),不需服用超過一個月才評估。本題正確者為 C。","options":{"A":"可用牛奶/果汁稀釋並以吸管服用,非絕不可與牛奶。","B":"主要抑制甲狀腺素的釋放與合成,非僅抑制T4轉T3。","C":"正解。飽和碘化鉀可降低甲狀腺素的釋放及合成。","D":"碘製劑屬短期使用,不需超過一個月才評估(久用會逸脫)。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"114030-N3-43":{"quick":"服治療劑量放射碘(131I)者須做輻射防護:限制訪客、第一週單獨睡、避免接觸孕婦與幼兒。","detail":{"background":"放射碘(131I)治療甲狀腺機能亢進的衛教,核心是「輻射防護」:服治療劑量者體內放射碘會放出輻射,故應「限制訪客、第一週最好單獨睡、避免近距離接觸孕婦與嬰幼兒」、分開使用衛浴、勤洗手(本題正解B)。其餘:A 雖空腹服用可利吸收,但其禁食細節非重點;C「一週後才經尿糞排出」時間不準(放射碘主要於服用後數日內經尿液排出,非一週後);D 錯誤——高劑量者多年後易出現甲狀腺功能「低下」(非亢進),需追蹤甲狀腺功能。本題正確者為 B。","options":{"A":"空腹服用利吸收概念對,但其禁食細節非本題重點且描述不精確。","B":"正解。服治療劑量者應限制訪客、單獨睡、避免接觸孕婦,做輻射防護。","C":"放射碘主要於服用後數日經尿排出,「一週後才排出」時間不準。","D":"高劑量者多年後易甲狀腺功能「低下」,非亢進。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"115030-N3-46":{"quick":"Grave氏病(甲亢)表現:神經質、眼球突出、手指顫抖;怕熱(非怕冷)、脛前為「非凹陷性」黏液水腫。","detail":{"background":"Grave氏病(甲狀腺機能亢進)的臨床表徵:陳述1「神經質(易怒焦慮)」正確、陳述2「眼球突出(甲狀腺相關眼病)」正確、陳述4「手指顫抖(細顫)」正確。陳述3「怕冷」錯誤——甲亢代謝亢進應「怕熱、多汗」;陳述5「脛前凹陷性水腫」錯誤——Grave氏病的脛前黏液水腫是「非凹陷性」。故正確組合為1、2、4(A)。","options":{"A":"正解。神經質(1)+眼球突出(2)+手指顫抖(4)為甲亢表現。","B":"含陳述3(怕冷)錯誤,甲亢怕熱。","C":"含陳述3、5錯誤。","D":"含陳述3、5錯誤(脛前黏液水腫為非凹陷性)。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(甲狀腺)","ATA 甲狀腺機能亢進/低下指引"]}},"101030-N3-7":{"quick":"副甲狀腺功能低下→低血鈣(高血磷),Chvostek徵象陽性、手足抽搐。","detail":{"background":"副甲狀腺素(PTH)使血鈣上升、血磷下降(促骨鈣釋出、腎遠端鈣再吸收與排磷、活化維生素D促腸道吸收鈣)。「副甲狀腺功能低下」時PTH不足→「低血鈣、高血磷」,低血鈣使神經肌肉興奮性增加,出現手足抽搐、口周與指端麻刺、喉痙攣、Chvostek徵象「陽性(+)」(輕敲面神經致面肌抽動)、Trousseau徵象陽性。本題正確者為D「低血鈣」。A「Chvostek(-)」錯(低血鈣應陽性)、B「Allen test(+)」與副甲無關(那是評估手部尺/橈動脈循環)、C「低血磷」錯(應高血磷)。","options":{"A":"副甲狀腺低下低血鈣時 Chvostek 徵象應為陽性(+),非陰性。","B":"Allen test 評估手部尺/橈動脈循環,與副甲狀腺無關。","C":"副甲狀腺低下為高血磷,非低血磷。","D":"正解。副甲狀腺功能低下出現低血鈣。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"104100-N3-69":{"quick":"副甲狀腺功能亢進→高血鈣、低血磷,並因鈣磷由尿排出而高鈣尿、高磷尿。","detail":{"background":"副甲狀腺功能亢進(PTH過多)的生化:PTH促骨鈣釋出、腎鈣再吸收、活化維生素D增加腸道吸收→「高血鈣」;同時促腎排磷→「低血磷」;濾過的鈣磷增加使尿中鈣磷上升→「高鈣尿、高磷尿」(易腎結石)。診斷檢查結果為「高血鈣」(本題正解A)。其餘:B「高血磷」錯(應低血磷)、C「低鈣尿」錯(應高鈣尿)、D「低磷尿」錯(應高磷尿)。臨床:骨痛骨折、腎結石、便秘、消化性潰瘍、倦怠、多尿。","options":{"A":"正解。副甲狀腺功能亢進呈高血鈣。","B":"副甲狀腺亢進為低血磷(腎排磷增加),非高血磷。","C":"尿鈣增加(高鈣尿),非低鈣尿。","D":"尿磷增加(高磷尿),非低磷尿。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"105090-N3-68":{"quick":"副甲狀腺切除後因PTH驟降→低血鈣,出現手與嘴唇周圍針刺感、手足抽搐。","detail":{"background":"副甲狀腺切除(或甲狀腺切除誤傷副甲狀腺)後,PTH分泌驟減→「低血鈣」,血鈣下降使神經肌肉興奮性增加,出現口周與手指針刺麻木、手足抽搐(carpopedal spasm)、Chvostek與Trousseau徵象陽性,嚴重者喉痙攣、抽搐。故術後須密切監測血鈣、床邊備「10%葡萄糖酸鈣」與氣切包,出現低血鈣徵象立即處理。本題病人術後手與嘴唇針刺感及手足抽搐,原因為A「低血鈣」。","options":{"A":"正解。副甲狀腺切除後PTH驟降致低血鈣,引發針刺感與手足抽搐。","B":"低血鎂雖也可致抽搐,但本題術後最直接原因是低血鈣。","C":"低血鈉非副甲狀腺切除後手足抽搐的主因。","D":"副甲狀腺低下為「高」血磷,低血磷不符。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"107030-N3-67":{"quick":"副甲狀腺機能亢進(高血鈣)→便秘、骨質疏鬆、心律不整;血鈣高、血磷低。","detail":{"background":"副甲狀腺機能亢進(PTH↑→高血鈣、低血磷)的臨床表徵:①骨骼——骨鈣釋出致「骨質疏鬆/纖維性骨炎、骨痛、病理性骨折」(陳述3);②腸胃——高血鈣使腸蠕動減慢「便秘」、噁心、消化性潰瘍(陳述1);③心血管——高血鈣致「心律不整」、QT縮短(陳述4);④腎——高鈣尿致腎結石、多尿。陳述2「低血鈣」錯誤(應高血鈣)、陳述5「高血磷」錯誤(應低血磷)。故正確組合為1、3、4(B)。","options":{"A":"含陳述2(低血鈣)錯誤,副甲亢為高血鈣。","B":"正解。便秘(1)+骨質疏鬆(3)+心律不整(4)為副甲亢表現。","C":"含陳述2、5皆錯誤。","D":"含陳述5(高血磷)錯誤,副甲亢為低血磷。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"108110-N3-71":{"quick":"副甲狀腺機能亢進(高血鈣、易腎結石)宜攝取蔓越莓製品(酸化尿液),並限鈣、多喝水。","detail":{"background":"副甲狀腺機能亢進(高血鈣、高鈣尿)的護理指導:①因易形成「腎結石」(多為磷酸鈣結石,鹼性尿利於形成),宜攝取「蔓越莓(蔓越莓汁)」等酸化尿液的食物以減少結石、並大量喝水(>2500~3000 mL/天)沖洗泌尿道(本題正解D);②飲食應「限制鈣」(避免乳製品、高鈣食物,以免加重高血鈣);③鼓勵高纖維防便秘(非低纖維);④適度活動防骨鈣再流失。本題正確者為 D。","options":{"A":"高血鈣者應限制乳製品(高鈣),非鼓勵。","B":"高血鈣者應限制高鈣食物,非鼓勵高鈣。","C":"宜高纖維防便秘,非低纖維。","D":"正解。攝取蔓越莓酸化尿液,有助減少腎結石。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"109110-N3-70":{"quick":"副甲狀腺功能低下(低血鈣)床旁應備氣切包、氣管內管、喉頭鏡,以防喉痙攣致呼吸道阻塞。","detail":{"background":"副甲狀腺功能低下(低血鈣)處置與護理:①「急性低血鈣抽搐」應「靜脈緩慢注射10%葡萄糖酸鈣」(非口服,口服緩不濟急);②手足抽搐時應「補充鈣」,不可注射重碳酸鹽或磷酸鹽(磷會與鈣結合更降血鈣、鹼化更加重抽搐);③因嚴重低血鈣可致「喉痙攣、呼吸道阻塞」,故床旁應「備氣切包、氣管內管、喉頭鏡」以防窒息(本題正解C);④飲食宜「高鈣、低磷」,應「避免」乳酪奶類蛋黃等高磷食物。本題正確者為 C。","options":{"A":"急性低血鈣抽搐應靜脈注射鈣,非口服(緩不濟急)。","B":"手足抽搐應補鈣,注射磷酸鹽會更降血鈣加重抽搐。","C":"正解。床旁備氣切包等以防低血鈣致喉痙攣阻塞呼吸道。","D":"乳酪、奶類、蛋黃為高磷食物,副甲低應避免。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"110110-N3-72":{"quick":"副甲狀腺機能亢進(高血鈣)→噁心、心律不整;並多尿(非少尿)、骨鈣流失(非沉積)。","detail":{"background":"副甲狀腺機能亢進(高血鈣、低血磷)臨床表徵:①腸胃——「噁心、嘔吐、便秘、消化性潰瘍」(陳述2噁心正確);②心血管——高血鈣致「心律不整」、QT縮短(陳述3正確);③腎——高血鈣致腎濃縮功能受損→「多尿、煩渴」、腎結石(故陳述1「少尿」錯誤);④骨骼——「骨鈣流失、骨質疏鬆、纖維性骨炎」(故陳述4「骨鈣沉積」錯誤,應為流失)。故正確組合為2、3(C)。","options":{"A":"含陳述1(少尿)錯誤,高血鈣為多尿。","B":"含陳述1錯誤。","C":"正解。噁心(2)+心律不整(3)為副甲亢表現。","D":"含陳述4(骨鈣沉積)錯誤,應為骨鈣流失。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"111110-N3-75":{"quick":"副甲狀腺功能低下→低血鈣,沃斯特克氏徵象(Chvostek's sign)呈陽性。","detail":{"background":"副甲狀腺功能低下造成「低血鈣」,使神經肌肉興奮性增加,出現兩個經典低血鈣徵象:①「沃斯特克氏徵象(Chvostek's sign)」——輕叩耳前的面神經處,引發同側面肌(嘴角)抽動為陽性(本題正解D);②「特魯索氏徵象(Trousseau's sign)」——血壓計加壓上臂超過收縮壓3分鐘,引發腕部與手指痙攣(腕足痙攣)為陽性。其餘選項與低血鈣無關:黎明現象(血糖)、洛夫辛徵象(闌尾炎)、腔室症候群(肢體腫脹缺血)。本題正確者為 D。","options":{"A":"黎明現象是凌晨血糖上升,與低血鈣無關。","B":"洛夫辛徵象用於闌尾炎評估,與副甲狀腺無關。","C":"腔室症候群是肢體腫脹致缺血,與低血鈣無關。","D":"正解。低血鈣使 Chvostek 徵象呈陽性反應。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"112030-N3-73":{"quick":"副甲狀腺功能低下→低血鈣、高血磷;可有嗜睡與長期低血鈣致白內障。","detail":{"background":"副甲狀腺功能低下(PTH不足→低血鈣、高血磷)的臨床表徵:陳述1「嗜睡」(低血鈣可致中樞與情緒症狀)、陳述4「白內障」(長期慢性低血鈣使晶狀體鈣化)、陳述5「高血磷」皆正確。陳述2「高血鈣」錯誤(應低血鈣);陳述3「骨質耗損加劇」錯誤(那是副甲狀腺機能「亢進」的表現,副甲低反而骨質代謝降低)。故正確組合為1、4、5(B)。","options":{"A":"含陳述2(高血鈣)、3(骨質耗損)皆錯誤。","B":"正解。嗜睡(1)+白內障(4)+高血磷(5)為副甲低表現。","C":"含陳述2、3錯誤。","D":"含陳述2、3錯誤。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"112030-N3-74":{"quick":"特魯索氏與沃斯德克氏徵象皆陽性反映「低血鈣」,常見於副甲狀腺功能低下症。","detail":{"background":"Trousseau(特魯索)與Chvostek(沃斯德克)徵象「皆陽性」是「低血鈣」的典型表現——低血鈣使神經肌肉興奮性增加而出現潛在性手足搐搦。造成低血鈣最相關的內分泌病因是「副甲狀腺功能低下症」(PTH不足)。本題陳述1「低血鈣」與陳述4「副甲狀腺功能低下症」皆會使兩徵象陽性,故正確組合為1與4(B)。陳述2「低血鉀」、陳述3「低血糖」與這兩個徵象無直接關係。","options":{"A":"含陳述2(低血鉀)無關,Trousseau/Chvostek反映低血鈣。","B":"正解。低血鈣(1)+副甲狀腺功能低下(4)使兩徵象陽性。","C":"含陳述2、3皆無關。","D":"含陳述3(低血糖)無關。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"113100-N3-46":{"quick":"副甲狀腺功能亢進(高血鈣)→骨痛、便秘;並多尿、高血鈣致胃泌素增加(消化性潰瘍),非凸眼。","detail":{"background":"副甲狀腺功能亢進(高血鈣、低血磷)臨床表徵:①骨骼——骨鈣流失致「骨痛、骨質疏鬆、病理性骨折」;②腸胃——高血鈣使腸蠕動慢致「便秘」、噁心,並刺激「胃泌素分泌增加→消化性潰瘍」(本題正解A骨痛便秘);③腎——高血鈣致腎濃縮力下降→「多尿、煩渴」、腎結石。本題其餘錯誤:B「少尿、尿比重上升」錯(應多尿);C「胃泌素減少萎縮性胃炎」錯(高鈣使胃泌素增加致潰瘍);D「鈣沉積眼睛凸眼」錯(凸眼是甲亢)。本題正確者為 A。","options":{"A":"正解。副甲亢高血鈣致骨痛與便秘。","B":"高血鈣致多尿,非少尿、尿比重上升。","C":"高血鈣使胃泌素「增加」致消化性潰瘍,非減少致萎縮性胃炎。","D":"凸眼是甲狀腺亢進(Grave氏病)的表現,非副甲亢。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"113180-N3-9":{"quick":"副甲狀腺功能亢進(高血鈣)會多尿、尿比重下降、腎結石;應多喝水、限鈣,血磷偏低。","detail":{"background":"副甲狀腺功能亢進(高血鈣、低血磷)的臨床與護理:高血鈣損害腎濃縮功能→「多尿、尿比重下降」,高鈣尿易形成「腎結石」(本題正解B)。護理應「限制鈣攝取(避免奶類製品)」、「大量喝水(>2500~3000 mL)防結石」(不可限制在1500 mL以下)、酸化尿液(蔓越莓)。血生化為「低血磷」(腎排磷增加),非高血磷。本題正確者為 B。","options":{"A":"高血鈣者應限制奶類製品(高鈣),非鼓勵。","B":"正解。高血鈣致多尿、尿比重下降與腎結石。","C":"應大量喝水防結石,不可限水在1500 mL以下。","D":"副甲亢為低血磷,非高血磷。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"114100-N3-46":{"quick":"副甲狀腺機能亢進(PTH過多)促「骨鈣釋出(溶骨)」而非骨鈣形成;並促腸道鈣吸收、活化維生素D、增加腎鈣再吸收。","detail":{"background":"副甲狀腺素(PTH)升高血鈣的三大途徑:①「促進腎小管(遠端)對鈣的再吸收」(同時排磷);②「活化維生素D(刺激腎1α-羥化酶)→促進腸道鈣吸收」;③作用於骨骼促進「破骨細胞活化、骨鈣釋出(溶骨/骨吸收)」。故副甲狀腺機能亢進會使骨鈣「流失」(纖維性骨炎、骨質疏鬆)。本題找「錯誤」者:D「促進骨鈣形成」錯誤——PTH是促「骨鈣釋出(溶骨)」而非形成。A、B、C 皆為PTH正確作用。","options":{"A":"PTH經活化維生素D促進腸道鈣吸收,正確。","B":"PTH促進維生素D活化,正確。","C":"PTH促進腎小管鈣再吸收,正確。","D":"正解(錯誤敘述)。PTH促骨鈣釋出(溶骨),非促骨鈣形成。"},"sources":["新文京《內外科護理學》內分泌系統","Williams Textbook of Endocrinology(副甲狀腺與鈣磷)","實用內外科護理學"]}},"114170-N3-42":{"quick":"副甲狀腺功能低下(高血磷)應「低磷飲食」,故「多攝取高磷食物(肉蛋乳酪)」不適當。","detail":{"background":"副甲狀腺功能低下(低血鈣、高血磷)的處置:①「補充鈣鹽與維生素D」促進血鈣回升(正確);②急性期低血鈣抽搐須「密切觀察呼吸道是否通暢」(防喉痙攣窒息,正確);③飲食應「高鈣、低磷」,故「多攝取高磷食物(肉類、蛋、乳酪)」是錯誤的——高磷會更降血鈣(本題不適當項C);④可於「進餐時或飯前服用氫氧化鋁(磷結合劑)」減少腸道磷吸收(正確)。本題問「最不適當」者為 C(攝取高磷食物)。","options":{"A":"補充鈣鹽及維生素D,適當。","B":"急性期密切觀察呼吸道是否通暢,適當。","C":"正解(不適當)。應低磷飲食,不可多攝取高磷的
