壓的『認知、態度』,屬『前傾因素』(A)。","options":{"A":"認知、態度為前傾(predisposing)因素—正解。","B":"增強因素為行為後的回饋獎勵。","C":"使能因素為資源/技能/可近性。","D":"「教育因素」非PRECEDE三類因素之一。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_108030-48":{"quick":"解釋高危險群是否使用癌症篩檢服務,最適用「健康信念模式」。","detail":{"background":"「『健康信念模式(health belief model, HBM)』」用於解釋『個人『是否採取預防性健康行為(如篩檢、接種)』』,核心構念為:『自覺『罹患性』、自覺『嚴重性』、自覺『行動利益』、自覺『行動障礙』、行動線索、自我效能』。本題「『有罹癌高危險群中,為何有些人去用癌症『篩檢』、有些人不去』」——正是HBM最適合解釋的『預防(篩檢)行為』採用與否。跨理論模式(階段)、社會行銷、創新擴散切入點不同。故為健康信念模式。","options":{"A":"跨理論模式描述行為改變階段。","B":"社會行銷為推廣策略。","C":"健康信念模式解釋是否採用篩檢等預防行為—正解。","D":"創新擴散理論描述新事物擴散。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_108100-47":{"quick":"提供桌球室(實體設施/資源)讓鄰居運動,屬「工具性(實質)支持」。","detail":{"background":"社會支持(social support)分四類:①「『工具性(實質)支持(instrumental support)』」——『提供『實質資源、金錢、勞務、設施或物品』』(如『提供桌球室、幫忙做事、借錢』);②「情感性支持」——關懷、傾聽、同理;③「資訊性支持」——提供建議、資訊;④「評價性支持」——給予肯定、回饋以利自我評價。本題『提供家裡的桌球室(實體設施)』屬『工具性支持』。故為工具性支持。","options":{"A":"提供桌球室(實體設施)為工具性支持—正解。","B":"情感性支持為關懷傾聽。","C":"資訊性支持為提供建議資訊。","D":"評價性支持為給予肯定回饋。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_108100-48":{"quick":"評估參與率、資源運用、執行者投入等執行面問題,屬「過程評價」。","detail":{"background":"衛生計畫的評價分:①「『過程評價(process evaluation)』」——評估『計畫『執行過程』:民眾『參與率』、『資源運用』是否理想、『執行者投入/角色』是否符合、活動是否依規劃進行』;②「『衝擊評價(impact)』」——評估『短期/中期的『知識、態度、行為』改變』;③「『結果評價(outcome)』」——評估『長期的『健康狀態(發病率、死亡率)』改變』。本題評估『參與率、資源運用、執行者投入』屬『過程評價』(A)。","options":{"A":"評估參與率/資源/執行投入=過程評價—正解。","B":"結果評價評估長期健康結果。","C":"衝擊評價評估知識態度行為改變。","D":"「形式評價」非主要的過程/結果分類。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_109020-47":{"quick":"依吸菸者所處的不同階段給予不同戒菸策略,屬「跨理論模式」。","detail":{"background":"「『跨理論模式(transtheoretical model, TTM / 改變階段模式)』」把行為改變分為『『懵懂期(無意圖)、沉思期、準備期、行動期、維持期』』等階段,並依『個人所處『階段』提供『不同的介入策略』』。本題「『若『缺乏戒菸意願』→教導吸菸害處以強化動機(對應懵懂/沉思期);若『打算近期戒菸』→提供戒菸計畫與方法(對應準備/行動期)』」——正是依階段給予不同策略的『跨理論模式』。故為跨理論模式。","options":{"A":"社會學習理論強調觀察學習與楷模。","B":"健康信念模式強調自覺罹患性/嚴重性等。","C":"操作制約強調獎懲塑造行為。","D":"依不同階段採不同策略=跨理論模式—正解。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_110020-44":{"quick":"尚未行動但有意願=沉思期;已開始準備(買裝備)=準備期。","detail":{"background":"跨理論模式(改變階段):①「『懵懂期(pre-contemplation)』」——『無改變意圖』;②「『沉思期(contemplation)』」——『有意改變但『尚未行動』』;③「『準備期(preparation)』」——『已『開始小步驟準備』、打算近期(一個月內)行動』;④「行動期(action)」——已改變行為(<6個月);⑤維持期。本題:I「大部分員工『有想運動只是尚未行動』」=『沉思期』;II「少數員工『已開始買裝備』(準備)」=『準備期』。故為沉思期、準備期(C)。","options":{"A":"I非懵懂期(有意願)。","B":"I非準備期(尚未行動)。","C":"I沉思期、II準備期—正解。","D":"II為準備期(剛買裝備)、非行動期。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_110020-46":{"quick":"長期觀看媒體暴力使青少年認為其反映社會真實而仿效,屬「涵化理論」。","detail":{"background":"「『涵化理論(cultivation theory)』」主張『『長期、大量接觸媒體(電視、電影、社群)』會『潛移默化地形塑閱聽人對『社會真實』的認知』』——重度觀看者傾向認為『媒體呈現的世界(如充滿暴力)就是真實世界』,進而影響其態度與行為。本題「青少年長期觀看媒體暴力英雄鏡頭→認為反映社會真實→產生暴力行為」即涵化理論。創新擴散、媒體倡導、知溝理論切入點不同。故為涵化理論。","options":{"A":"創新擴散描述新事物如何擴散。","B":"媒體倡導為運用媒體推動政策。","C":"長期媒體接觸形塑社會真實認知=涵化理論—正解。","D":"知溝理論描述資訊取得的社經差距。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_111020-45":{"quick":"教育與所得提升通常使醫療保健需求「增加」,「需求降低」最不恰當。","detail":{"background":"社會變遷對公共衛生的影響:①「『國民教育水準與所得『提升』,健康意識與可近性增加,『醫療保健服務需求『隨之『增加』(而非降低)』』」(故A「需求隨之降低」最不恰當);②「『人口老化』使醫療需求增加」(B正確);③「地區社經發展『異質性增加』使衛生問題複雜化」(C正確);④「『婦女就業率提高』,兒童預防保健更須仰賴學校/育幼機構」(D正確)。故A最不恰當。","options":{"A":"教育所得提升使醫療需求增加、非降低—錯誤(正解)。","B":"人口老化使醫療需求增加,正確。","C":"社經異質性增加使衛生問題複雜,正確。","D":"婦女就業率提高使兒童保健更仰賴機構,正確。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_111100-44":{"quick":"健康城市是「持續的過程」而非「健康促進的結果」,B最不恰當。","detail":{"background":"Hancock與Duhl(1986)對「健康城市(healthy city)」的定義強調:它是『『持續不斷『創造與改善『物理環境』與『社會環境』、並『擴展社區資源』,使市民能相互支持、發揮最大潛能』的『過程』』』。故「『健康城市是健康促進的『結果』』」最不恰當(健康城市是『過程』,非終點結果);而『擴展社區資源(A)、改善物理環境(C)、改善社會環境(D)』皆屬其定義。故B最不恰當。","options":{"A":"健康城市擴展社區資源,正確。","B":"健康城市是過程而非健康促進的結果—錯誤(正解)。","C":"健康城市改善物理環境,正確。","D":"健康城市改善社會環境,正確。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_111100-46":{"quick":"邀偶像歌手拍拒菸影片供青少年仿效,主要應用「社會學習(觀察學習)理論」。","detail":{"background":"「『社會學習理論(social learning theory,Bandura)』」核心是『『觀察學習(observational learning)/楷模(modeling)』』——人會『觀察並模仿『楷模(尤其崇拜的偶像)』的行為』。本題「邀『當紅偶像歌手』拍拒菸宣導影片,讓青少年『仿效偶像』以提升拒菸信念與行為」——正是運用偶像作為『楷模』的社會學習(觀察學習)。創新擴散、風險溝通、同儕壓力切入點不同。故為社會學習。","options":{"A":"創新擴散描述新事物擴散過程。","B":"風險溝通為風險訊息交換。","C":"同儕壓力為同儕影響(非偶像楷模)。","D":"邀偶像供仿效=社會學習(觀察學習)—正解。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_112020-44":{"quick":"青少年仿效偶像明星拒吸電子煙,屬社會學習理論的「觀察學習」。","detail":{"background":"本題「請『當紅偶像明星』拍拒吸電子煙影片,『青少年『仿效偶像明星』的拒吸行動』而降低吸電子煙比率」——是『觀察『楷模(偶像)』行為並模仿』,即社會學習理論的「『觀察學習(observational learning / modeling)』」。社會支持(提供協助)、自我監測(記錄自身行為)、訊息回饋切入點不同。故為觀察學習。","options":{"A":"社會支持為提供協助資源。","B":"自我監測為記錄自身行為。","C":"訊息回饋為提供回饋。","D":"仿效偶像=觀察學習—正解。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_112020-45":{"quick":"健康不只是沒有疾病,「健康就是身體沒有疾病」最不恰當。","detail":{"background":"WHO對健康的定義:『健康是『身體、心理與社會的『完全安適狀態』』,而『『不僅是『沒有疾病或虛弱』』』』。故A「『健康的定義就是身體沒有疾病』」最不恰當(過於狹隘);其餘:「社會角色與功能健全是健康要素」(B正確)、「聯合國人權宣言視健康為基本人權」(C正確)、「Lalonde報告強調健康行為與生活型態的重要、不應過度依賴醫療」(D正確)。故A最不恰當。","options":{"A":"健康非僅身體無疾病(應含身心社會安適)—錯誤(正解)。","B":"社會角色與功能健全是健康要素,正確。","C":"健康是基本人權,正確。","D":"Lalonde報告強調生活型態、不應過度依賴醫療,正確。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_112020-46":{"quick":"先以危害恐怖影片再告知戒菸好處,屬訴諸情緒/利益的「情感(利益)訴求」。","detail":{"background":"說服(衛教)訴求類型:①「『理性訴求』」——以邏輯、數據、事實說服;②「『情感(情緒)訴求』」——訴諸情緒(恐懼、希望、利益感受);③「『恐懼訴求』」——單純強調可怕後果。本題『先以恐怖影片(引發負面情緒)、再『告知戒菸的『好處(正面利益)』』』——『結合情緒與利益感受』,屬『情感(利益)訴求』(B)。(若只強調可怕後果才是純『恐懼訴求』。)","options":{"A":"恐懼訴求僅強調可怕後果(本題另含好處)。","B":"結合情緒與利益感受=情感(利益)訴求—正解。","C":"啟發性訴求非此情境。","D":"理性訴求以邏輯數據說服。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_112020-47":{"quick":"依長期照顧服務法,團體家屋(group home)屬「社區式服務」。","detail":{"background":"《長期照顧服務法》依服務提供方式分:①「『居家式』」——到『個案家中』提供服務;②「『社區式』」——『於『社區』據點提供(如日間照顧、家庭托顧、『團體家屋(group home,失智者社區生活照顧)』)』;③「『機構住宿式』」——24小時住宿型機構;④綜合式;⑤家庭照顧者支持服務。「『團體家屋』」屬『『社區式服務』』(讓失智長者在社區小型家庭式單元生活)。故為社區式服務。","options":{"A":"家庭照顧者支持服務為對照顧者的支持。","B":"團體家屋屬社區式服務—正解。","C":"居家式為到家中服務。","D":"機構住宿式為24小時住宿機構。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_113090-45":{"quick":"風險溝通成敗的影響因素含風險知覺、樂觀偏誤、信任;「知識」不在其列。","detail":{"background":"「風險溝通(risk communication)」是個人/團體/組織就風險訊息交換意見的過程。影響其成敗的主要因素包括:「『風險知覺(risk perception)』、『樂觀偏誤(optimistic bias,低估自身風險)』、『信任(trust,對訊息來源的信任)』、情緒、不確定性」等心理與社會因素。本題問『不包括』者,即「『知識(knowledge)』」(知識量並非影響風險溝通成功與否的『主要列舉因素』)。故不包括者為知識(D)。","options":{"A":"風險知覺為影響因素。","B":"樂觀偏誤為影響因素。","C":"信任為影響因素。","D":"知識不在主要影響因素之列—正解。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_113090-46":{"quick":"只比較計畫前後體重變化(無對照、單一指標)最不恰當。","detail":{"background":"評估社區減重計畫成效:①招募(海報、電台、鄰里長協助)合理(A);②設計獎勵措施提高參與合理(B);③介入前先評估基線飲食運動行為並提供專業諮詢合理(C);④「『若『只比較計畫前後體重變化』』來判斷成效『最不恰當』」——『缺乏『對照組』,無法排除『時間趨勢、季節、其他因素』』,且應納入『飲食/運動行為、腰圍、代謝指標等多元成效指標』。故D最不恰當。","options":{"A":"多管道招募參與者,合理。","B":"設計獎勵提高參與,合理。","C":"介入前評估基線並提供諮詢,合理。","D":"只比前後體重(無對照/單一指標)—最不恰當(正解)。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_114020-43":{"quick":"策略規劃仍須將個人素質等決定因素納入考量,「不需納入」最不恰當。","detail":{"background":"健康促進與衛生教育介入策略:①「事先規劃並選擇想改變的『個人、人際、組織、社區』各層級決定因素」(A正確);②「『單一策略』難對健康行為產生『重大而持久』的影響,須多元策略」(B正確);③「『計畫須運用『多元策略』,且策略規劃時『仍應『將特定個人素質(決定因素)納入考量』』』」——故C「『不需』將特定個人素質因素納入考量」最不恰當;④「成功的計畫須選擇適當策略以達成目標」(D正確)。故C最不恰當。","options":{"A":"事先規劃選擇各層級決定因素,正確。","B":"單一策略難有持久影響、須多元,正確。","C":"策略規劃仍須納入個人素質因素、非不需—錯誤(正解)。","D":"須選擇適當策略達成目標,正確。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_114020-44":{"quick":"健康促進計畫評價面向以「忠誠、涵蓋、達及」等執行品質指標為主(本題答案為248)。","detail":{"background":"健康促進計畫的『過程/執行評價』常見面向包括:「『忠誠度(fidelity)』——計畫是否『依原設計『忠實執行』、員工與夥伴是否善盡責任』;『涵蓋(inclusion)/達及(reach)』——『目標族群的『涵蓋與觸及』情形』;『參與、滿意度、劑量(dose)』」等,用以確認介入『是否確實、完整地被執行與接受』。本題依各敘述的正確配對,正解組合為『2、4、8』(248)。","options":{"A":"2、4、8為正確配對組合—正解。","B":"148組合不符。","C":"356組合不符。","D":"678組合不符。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_114020-45":{"quick":"氣候行動已是健康醫院認證的標準項目,「非標準項目」錯誤。","detail":{"background":"我國自2006年起推動「健康促進醫院」與「健康醫院」認證,鼓勵醫院由治療思維轉向健康促進:①「健康醫院認證已進入『2.0版』」(A正確);②「我國已加入WHO『健康促進醫院國際網絡』、成為國家/區域網絡會員」(B正確);③「『『氣候行動/綠色永續(environmental sustainability)』『已是』『健康醫院認證的標準項目』之一』」——故C「氣候行動『非』認證標準項目」錯誤;④「醫院須在願景目標呈現具承諾性的臨床健康促進政策」(D正確)。故C錯誤。","options":{"A":"健康醫院認證已邁入2.0版,正確。","B":"已加入WHO健康促進醫院國際網絡,正確。","C":"氣候行動已是健康醫院認證標準項目、非不是—錯誤(正解)。","D":"須呈現具承諾性的臨床健康促進政策,正確。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_114020-46":{"quick":"進入社區做健康營造者不宜扮演「考核者」(應為促成/協調/執行者)。","detail":{"background":"進入社區進行『健康營造』的工作者,理想角色是「『促成者(facilitator)、協調者(coordinator)、執行者(implementer)、教育者、資源連結者』」——『以『夥伴、賦能(empowerment)』的姿態『協助社區自主』』。而「『考核者(評鑑者)』」帶有『由上而下監督、評斷』的權威色彩,『與社區營造『賦能、平等合作』的精神相違,最不宜扮演』。故最不宜者為考核者(B)。","options":{"A":"促成者為適宜角色。","B":"考核者(由上而下監督)最不宜—正解。","C":"協調者為適宜角色。","D":"執行者為適宜角色。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_114090-44":{"quick":"初為父母(新生兒到來)是家庭壓力『較大』的時期,「壓力最小」最不恰當。","detail":{"background":"Duvall家庭生命週期八階段,各有發展任務:①「『初為父母(新婚生育)』階段,『新生兒到來『帶來重大調適與『壓力』』(角色轉變、睡眠剝奪、經濟負擔)』,『並非『壓力最小』的時期』」(故A最不恰當);②「子女學齡階段須建立與學校/社區連結、平衡家庭與工作」(B正確);③「子女青少年階段須防止危害健康行為(如抽菸)」(C正確);④「老齡化家庭須因應老化疾病與醫療需求」(D正確)。故A最不恰當。","options":{"A":"初為父母階段壓力大、非最小—錯誤(正解)。","B":"學齡階段須建立學校/社區連結並平衡家庭工作,正確。","C":"青少年階段須防範危害健康行為,正確。","D":"老齡化家庭須因應老化疾病與醫療,正確。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_114090-46":{"quick":"中央統籌各部會共同投入傳染病防治,屬渥太華的「建立健康的公共政策」。","detail":{"background":"WHO渥太華憲章五大策略中,「『建立健康的公共政策(build healthy public policy)』」強調『健康議題應納入『各部門(跨部會)』的政策,由政府統籌、各部門共同負起健康責任』。本題「『由中央政府統籌、明訂『各部會(內政、衛福、教育、勞動、文化、經濟等)』共同合作投入傳染病防治』」——正是跨部門協作的『健康公共政策』。其餘(調整健康服務方向、強化社區行動、發展個人技能)層次不同。故為建立健康的公共政策。","options":{"A":"調整健康服務方向針對醫療體系重新定位。","B":"強化社區行動針對社區動員。","C":"發展個人技能針對個人能力。","D":"各部會統籌合作=建立健康的公共政策—正解。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_114090-49":{"quick":"現行菸害防制法為「未滿20歲不得吸菸」,「滿18歲方可吸菸」最不適當。","detail":{"background":"我國《菸害防制法》(2023年修正)重點:①「『禁止『未滿『20』歲』者吸菸』(供應菸品予未滿20歲者亦處罰)」——故A「『滿『18』歲』方可吸菸」最不適當(應為滿20歲);②「『孕婦或未滿『3』歲兒童在場之『室內』場所『不得吸菸』』」(B正確);③「『菸品容器健康警示『圖文』面積『不得低於50%』』」(C正確);④「『攜帶『已點燃』的菸品『視同吸菸行為』』」(D正確)。故A最不適當。","options":{"A":"現行法為未滿20歲不得吸菸、非滿18歲方可—錯誤(正解)。","B":"孕婦或未滿3歲兒童在場室內不得吸菸,正確。","C":"警示圖文不得低於50%面積,正確。","D":"攜帶已點燃菸品視同吸菸,正確。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_115020-45":{"quick":"設計思考的第一步驟是「同理(empathize)」而非「定義」,故B最不恰當。","detail":{"background":"「設計思考(design thinking)」是以人為本的創意問題解決方法,典型五步驟為『『同理(empathize)→定義(define)→發想(ideate)→原型(prototype)→測試(test)』』:①核心是『以人為本、了解『使用者經驗』』(A、C正確);②『『第一步驟是『同理(empathize)』(深入了解使用者),『定義(define)』是『第二步』(把資料收斂成問題)』』——故B「『第一步驟為「定義」』」最不恰當;③定義問題後在『發想(發展)』階段尋找創新解方(D正確)。故B最不恰當。","options":{"A":"設計思考以人為本、強調創意解決,正確。","B":"第一步驟是同理(empathize)、非定義—錯誤(正解)。","C":"核心任務之一是了解使用者經驗,正確。","D":"定義問題後於發想階段尋找解方,正確。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_115020-46":{"quick":"健康識能較佳者,做出適當健康決策的能力較佳,最為恰當。","detail":{"background":"「健康識能(health literacy)」指『個人『取得、理解、評估與運用健康資訊』以做出適當健康決策的能力』:①「『健康識能『較佳』者,『做出適當健康決策的能力『較佳』』、自我照護與服藥順從性較好」(A正確最恰當);②「健康識能『不足』與慢性病控制不良/結果較差『正相關』(非與『發生』負向關係,B敘述不當);③健康識能高者『預防性服務利用度『較高』(故與利用度『有關』,C「無關」錯誤);④健康識能受『教育、認知、資訊可近性等多因素』影響,『非僅取決於『積極程度』』(D不當)。故A最恰當。","options":{"A":"健康識能較佳者健康決策能力較佳—正解。","B":"健康識能不足與慢性病控制不良相關(非與發生負向)—不恰當。","C":"健康識能與預防性服務利用度有關(非無關)—不恰當。","D":"健康識能非僅取決於積極程度—不恰當。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_115020-49":{"quick":"由專人發掘個案、評估、擬計畫、引進與監測服務的制度稱「照顧管理」。","detail":{"background":"「『照顧管理(care management / case management)』」是長期照顧的核心機制:由『專責的『照顧(個案)管理員』』負責『『發掘社區中需服務的個案→『需求評估』→『擬定照顧服務計畫』→『連結/引進適當服務』→『監測服務提供』→『評估成效並調整』』』,確保資源有效配置、服務適切連續。居家照護、居家醫療是『服務型態』、連續照護是『理念』,非此管理制度名稱。故為照顧管理。","options":{"A":"發掘/評估/擬計畫/連結/監測服務=照顧管理—正解。","B":"居家照護為到宅服務型態。","C":"居家醫療為到宅醫療服務。","D":"連續照護為照護連續性的理念。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_108030-37":{"quick":"狂犬病屬我國第一類傳染病(須立即/24小時內通報)。","detail":{"background":"我國法定傳染病依嚴重度與傳播力分『五類』,通報時限不同:「『第一類』」(如『狂犬病、鼠疫、嚴重急性呼吸道症候群SARS、天花』)『最嚴重,須『立即(24小時內)通報』並強制隔離』;第二類(登革熱、結核、傷寒等)24小時內;第三類(日本腦炎、瘧疾、梅毒、淋病等)一週內;第四、五類另訂。本題『狂犬病屬第一類(立即通報)』;日本腦炎、瘧疾、梅毒屬第三類。故為狂犬病。","options":{"A":"狂犬病屬第一類(立即通報)—正解。","B":"日本腦炎屬第三類。","C":"瘧疾屬第三類。","D":"梅毒屬第三類。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_108030-44":{"quick":"登革熱由埃及斑蚊與白線斑蚊傳播。","detail":{"background":"「登革熱(dengue fever)」由登革病毒引起,病媒蚊為「『埃及斑蚊(Aedes aegypti)』與『白線斑蚊(Aedes albopictus)』」(斑蚊白天叮咬、孳生於積水容器)。台灣南部以埃及斑蚊為主。熱帶家蚊(Culex,傳日本腦炎/絲蟲)、瘧蚊(Anopheles,傳瘧疾)、白腹叢蚊、小黑蚊非登革熱病媒。故為埃及斑蚊與白線斑蚊。","options":{"A":"熱帶家蚊傳日本腦炎/絲蟲、非登革熱。","B":"埃及斑蚊與白線斑蚊傳登革熱—正解。","C":"小黑蚊非登革熱病媒。","D":"瘧蚊傳瘧疾、非登革熱。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_108100-46":{"quick":"員工就職時的肺部X光是職業性肺結核認定的重要比較資料,敘述正確。","detail":{"background":"職業性肺結核(醫護人員)的認定:①「『員工『就職時(基線)』的『胸部X光與結核篩檢』』是日後判斷『是否為『工作期間『新感染』(職業性)』』的『重要比較基準資料』」(A正確);②肺結核雖為法定傳染病,但『若因執行職務感染,『仍可『同時認定為職業病』並獲勞保職災給付』』(故B錯誤);③『不同部門員工『暴露風險『不相同』(接觸結核病人多的單位風險高)』(故C「皆相同」錯誤);④『並非『所有』醫護的肺結核『都是』職業病』(須評估暴露與因果)(故D錯誤)。故A正確。","options":{"A":"就職時肺部X光為職業性肺結核認定的重要比較資料—正解。","B":"因執行職務感染仍可認定職業病並獲給付—B錯誤。","C":"各部門員工感染風險不同—C錯誤。","D":"非所有醫護肺結核都是職業病—D錯誤。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_109020-42":{"quick":"「雞肉必須煮熟食用」屬HACCP的「決定(管制)重點」(設定關鍵管制點)。","detail":{"background":"食品安全管制系統(HACCP)七大原則:①危害分析;②「『決定『關鍵管制點(critical control points, CCP)』』」;③設定每個CCP的『管制界限(critical limit)』;④建立『監測系統』;⑤矯正措施;⑥確認(驗證);⑦記錄。本題「『雞肉『必須煮熟』食用』」是針對『加熱(烹煮)』這個『關鍵管制點』設定的控制(殺滅沙門氏菌等),屬『『決定管制重點(CCP)』』的原則。故為決定管制重點(B)。","options":{"A":"危害評估(分析)為辨識危害的第一原則。","B":"煮熟=針對關鍵管制點的管制=決定管制重點—正解。","C":"設置管制程序與標準為設定管制界限(下一步)。","D":"建立管制監測系統為監測原則。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_109100-35":{"quick":"恙蟎(幼蟎)傳播叢林斑疹傷寒(恙蟲病,scrub typhus)。","detail":{"background":"「恙蟎(chigger mite,其『幼蟎』階段)」叮咬傳播「『叢林斑疹傷寒(scrub typhus / 恙蟲病,Orientia tsutsugamushi)』」(叮咬處焦痂、發燒、淋巴腺腫)。對照:落磯山斑疹熱(硬蜱傳)、流行性斑疹傷寒(體蝨傳)、地方性(鼠型)斑疹傷寒(鼠蚤傳)。故恙蟎傳播者為叢林斑疹傷寒。","options":{"A":"落磯山斑疹熱由硬蜱傳。","B":"流行性斑疹傷寒由體蝨傳。","C":"地方性斑疹傷寒由鼠蚤傳。","D":"叢林斑疹傷寒(恙蟲病)由恙蟎傳—正解。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_109100-43":{"quick":"傳染病監測金字塔人數由多到少:感染人數>症狀個案>臨床診療>確診陽性(4231)。","detail":{"background":"「傳染病監測金字塔(surveillance pyramid)」由底層到頂層、人數由多到少:①底層「『④感染人數(含無症狀者,最多)』」;②「『②有症狀個案數』」(部分感染者出現症狀);③「『③就醫(臨床醫師診療)個案數』」(部分有症狀者就醫);④頂層「『①醫檢確定陽性的『確診』個案數』(經採檢確診,最少)」。故人數由多到少排序為『4→2→3→1(4231)』。","options":{"A":"1234順序相反。","B":"感染>症狀>診療>確診=4231—正解。","C":"4213順序錯誤。","D":"1423順序錯誤。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_110020-37":{"quick":"各年齡層流感率不同、不應合併估計母體機率,故D最不恰當。","detail":{"background":"本題以隨機抽樣估計流感罹患率:①「估計值須假設『各觀察『獨立』且機率相同(同質)』才成立」(B正確);②「若老年樣本來自『同一安養中心(可能群聚傳染)』,則『不宜視為獨立樣本』」(C正確);③「『年輕人(0.42)與老年人(0.22)的『流感率『不同』』,『不應『合併』200人用64/200=0.32去估計『人口』得流感機率』』」——因兩群是『異質』的(D最不恰當);④隨機抽樣不必然要排除可能互相傳染者(A敘述不當但D更直接違反統計原則)。故D最不恰當。","options":{"A":"隨機抽樣不必排除可能互相傳染者,A敘述不當。","B":"估計值須假設獨立且機率相同,正確。","C":"安養中心樣本有群聚效應、不宜視為獨立,正確。","D":"年輕與老年率不同、不應合併估計母體機率—錯誤(正解)。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_111020-39":{"quick":"屆滿潛伏期後的發病率分母應為「仍具感染風險者」,故為2/621。","detail":{"background":"本題郵輪3,711人全部船上隔離檢疫,要計算某『次群體(分母621人)』在『屆滿潛伏期觀察期間』內『新發病』的『發生率(attack rate)』。發生率 = 『觀察期間新發病例數 ÷ 期初『仍具風險(at-risk)』的人數』。依題意該風險群為621人、其中2人新發病,故『發生率 = 『2/621』』(分母採該風險群人數,非全船3711)。故為2/621。","options":{"A":"2/24分母錯誤。","B":"2/621(該風險群中新發病)—正解。","C":"2/3711分母應為風險群、非全船。","D":"2/(621-2)分母扣法不符發生率定義。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_111100-39":{"quick":"潛伏期(incubation period)指從被感染到開始出現臨床症狀的期間。","detail":{"background":"傳染病的時間定義:①「『潛伏期(incubation period)』」——『從『被『感染(病原入侵)』』到『開始『出現『臨床症狀』』』』的期間』;②「潛隱期(latent period)」——從感染到『開始具傳染力』的期間;③「世代間隔(serial interval)」——指標病例與續發病例發病的時間間隔。本題潛伏期即『被感染→出現臨床症狀』(B)。","options":{"A":"從接觸到被感染非潛伏期定義。","B":"從被感染到出現臨床症狀=潛伏期—正解。","C":"從症狀到就醫非潛伏期。","D":"從接觸到就醫非潛伏期。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_112020-49":{"quick":"中藥藥品查驗屬「中醫藥司」權責(非食藥署),故C最不恰當。","detail":{"background":"我國衛生福利行政組織:①「衛生行政組織分『中央(衛福部)』與『地方(直轄市、縣市)』二級」(A正確);②「我國衛生行政體系『並非『一條鞭制』』(地方衛生局受地方政府與中央雙重指揮)」(B正確);③「『『中藥(中醫藥)』的管理與查驗屬『『中醫藥司』』權責,『而『非『食品藥物管理署(食藥署)』』』(食藥署管西藥、食品、醫材)」——故C「中藥查驗屬食藥署」最不恰當;④「國民健康署主責國民健康(慢性病、健康促進、婦幼等),『傳染病防疫屬『疾病管制署』』(故國健署不含防疫)」(D正確)。故C最不恰當。","options":{"A":"衛生行政分中央與地方二級,正確。","B":"我國衛生行政非一條鞭制,正確。","C":"中藥查驗屬中醫藥司、非食藥署—錯誤(正解)。","D":"國健署主責國民健康、不含傳染病防疫(屬疾管署),正確。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_113090-34":{"quick":"隱孢子蟲在糞便排出的是卵囊(oocyst)而非滋養體,故D錯誤(本題B、D均給分)。","detail":{"background":"隱孢子蟲(Cryptosporidium):①「『人隱孢子蟲(C. hominis)與小隱孢子蟲(C. parvum)』最常感染人類」(A正確);②寄生於『腸道上皮『刷狀緣(細胞內、膜下)』』,但『在免疫低下者『可播散至呼吸道、膽道等『腸道以外』』』(故B「『僅』存在於腸道上皮刷狀緣」判錯);③「隱孢子蟲症『主要經『水』傳播』(卵囊抗氯)」(C正確);④「『糞便中排出的是『卵囊(oocyst)』』,『而『非『大量活動體(滋養體trophozoites)』』(滋養體在腸上皮細胞內,不大量出現在糞便)』」(故D錯誤)。本題公告「B、D均給分」。","options":{"A":"C. hominis與C. parvum最常感染人類,正確。","B":"不僅限腸道刷狀緣(可播散)—判錯(給分)。","C":"隱孢子蟲症主要經水傳播,正確。","D":"糞便排出卵囊而非大量滋養體—錯誤(正解)。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_114020-40":{"quick":"本題公告「一律給分」;考毒性化學物質的四類分級。","detail":{"background":"我國《毒性及關注化學物質管理法》把列管毒性化學物質分『四類』:①第一類——『難分解物質』;②第二類——『慢毒性物質(致腫瘤/生殖/遺傳等慢性危害)』;③第三類——『急毒性物質』;④第四類——『疑似毒性化學物質』。本題選項對各類的定義配對經評定後「一律給分(送分)」。","options":{"A":"第一類定義(本題送分)。","B":"第二類慢毒性物質(本題送分)。","C":"第三類急毒性物質(本題送分)。","D":"第四類疑似毒化物(本題送分)。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_114020-42":{"quick":"白喉桿菌經生物氣膠致病的主要機制是其「外毒素」毒性。","detail":{"background":"「白喉(diphtheria)」由白喉桿菌(Corynebacterium diphtheriae)引起,可經『飛沫/生物氣膠』傳播。其致病的『主要機制是『分泌『外毒素(diphtheria exotoxin)』』』——外毒素抑制宿主細胞蛋白質合成(ADP-ribosylation of EF-2),造成『咽喉偽膜、心肌炎、神經病變』等;故防治以『類毒素(toxoid)疫苗』誘導抗毒素抗體。並非靠侵襲力、過敏或內毒素。故主要機制為外毒素毒性。","options":{"A":"白喉桿菌致病非靠侵襲力為主。","B":"非過敏機制。","C":"非內毒素(其為革蘭氏陽性、以外毒素致病)。","D":"白喉桿菌外毒素毒性為主要致病機制—正解。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_114020-49":{"quick":"國際消除愛滋目標2030為95-95-95;說「2030達90-90-90」最不適當。","detail":{"background":"我國愛滋病(HIV)防治:①「『主要法源之一為『人類免疫缺乏病毒傳染防治及感染者權益保障條例』,並依『傳染病防治法』』」(A正確);②「『UNAIDS的『消除愛滋目標』:『2020年達『90-90-90』、『2030年達『95-95-95』』』(『90%感染者知道自己狀態-90%確診者接受治療-90%治療者病毒量受抑制』升級為95)」——故B「『2030年前達『90-90-90』』」最不適當(2030應為95-95-95);③「提高『感染者知道自己感染狀態』的比率是目標指標之一」(C正確);④「鼓勵高風險者於暴露前『預防性投藥(PrEP)』」(D正確)。故B最不適當。","options":{"A":"法源含傳染病防治法,正確。","B":"2030目標為95-95-95、非90-90-90—錯誤(正解)。","C":"提高知道感染狀態比率為指標,正確。","D":"鼓勵暴露前預防性投藥(PrEP),正確。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_114090-43":{"quick":"並非各種疫苗都適合全民接種,「都全民接種最符合公眾利益」最不適當。","detail":{"background":"疫苗接種:①「有些疫苗『終生只需一劑(或基礎劑次後即足)』」(A合理);②「『B型肝炎疫苗』可預防B肝『並間接預防『肝癌(HBV相關肝細胞癌)』』」(B正確);③「『並非『各種疫苗『都『全民接種』最符合公眾利益』』』——須依『疾病流行病學、高風險族群、成本效益』決定接種策略(有些僅針對高風險群或特定年齡)」(故C最不適當);④「經正常核准(非緊急授權)上市的疫苗,安全性資料較完整、過敏等較少見」(D合理)。故C最不適當。","options":{"A":"有些疫苗一生一劑即足,合理。","B":"B肝疫苗可預防B肝並間接預防肝癌,正確。","C":"非各種疫苗都全民接種最符合公益—錯誤(正解)。","D":"正常核准疫苗較少發生過敏,合理。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_114090-47":{"quick":"我國食品中毒定義為「2人以上」攝食相同食品有相似症狀,「至少三人」最不適當。","detail":{"background":"我國「食品中毒(食源性疾病)」的定義:①「『『2人(含)以上』』攝取『相同食品』而發生『相似症狀』,即可列為一件食品中毒事件」(『但『肉毒桿菌中毒、化學性中毒』『1人』即算』)——故A「『必須『至少三人』以上』」最不適當(應為2人);②「沙門氏桿菌中毒屬『細菌性』病因」(B正確);③「『仙人掌桿菌(Bacillus cereus)』中毒常見於『米飯等澱粉類』(嘔吐型)」(C正確);④「『病原性大腸桿菌』可經『糞便污染的食品/水源』引起」(D正確)。故A最不適當。","options":{"A":"我國定義為2人以上、非三人以上—錯誤(正解)。","B":"沙門氏桿菌屬細菌性食品中毒,正確。","C":"仙人掌桿菌來源常為米飯等澱粉類,正確。","D":"病原性大腸桿菌可經糞便污染食品/水源,正確。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_114090-48":{"quick":"全國食安專線為「1919」。","detail":{"background":"我國「『全國食安專線為『1919』』」(諧音「要動要動」/「吃要動」),整合跨部會,提供『食品安全『檢舉與諮詢』』的單一服務窗口。對照其他常見專線:1966(長照服務專線)、1922(防疫專線/疾病管制署)、1950(消費者服務專線)。故全國食安專線為1919。","options":{"A":"1919為全國食安專線—正解。","B":"1966為長照服務專線。","C":"1922為防疫專線。","D":"1950為消費者服務專線。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_115020-41":{"quick":"埃及斑蚊偏好棲息於「室內」,「喜歡棲息在戶外」最不符合其生態。","detail":{"background":"埃及斑蚊(Aedes aegypti,台灣登革熱主要病媒,分布南部)的生態習性:①「『偏好棲息於『室內(戶內)』』陰暗處(如窗簾、衣物後),『而非戶外』」(故A「喜歡棲息戶外」最不符合);②「氣溫『17°C以下『活性低』』(故台灣冬季傳播減弱、埃及斑蚊主要在南部)」(B正確);③「『警覺性高、易受驚動』(吸血易被打斷)」(C正確);④「『『中斷式(多次)吸血』』(一次產卵週期叮咬多人,增加傳播)」(D正確)。故A最不符合。","options":{"A":"埃及斑蚊偏好室內棲息、非戶外—錯誤(正解)。","B":"17°C以下活性低,正確。","C":"警覺性高、易受驚動,正確。","D":"中斷式吸血(叮咬多人),正確。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_115020-48":{"quick":"第二類傳染病應於「24小時內」通報,「3天內通報」最不恰當。","detail":{"background":"我國法定傳染病五類的通報時限:①「『第一類』——『立即(24小時內)通報』」(A正確);②「『第二類』——『『24小時內』通報』(『而非『3天』』)」(故B「3天內通報」最不恰當);③「『第三類』——『一週內通報』,必要時中央主管機關得調整」(C正確);④「『第四、五類』——『依中央主管機關『公告』之期限與規定』」(D正確)。故B最不恰當(第二類應24小時內)。","options":{"A":"第一類須立即通報,正確。","B":"第二類應24小時內通報、非3天內—錯誤(正解)。","C":"第三類一週內通報(必要時可調整),正確。","D":"第四類依公告期限規定,正確。"},"sources":["傳染病學與防疫","傳染病防治法規","流行病學"]}},"med2_107100-49":{"quick":"全民健保免部分負擔對象含重大傷病/分娩/山地離島,中低收入戶不在此範圍。","detail":{"background":"依《全民健康保險法》第48條,『『免依規定『自行負擔(部分負擔)費用』』的對象包括:『『重大傷病、分娩、『山地離島地區『就醫』』(及兵役/替代役、3歲以下兒童預防保健等)』。而『『中低收入戶』』『是『『『健保『保險費(保費)的『補助』對象』』,『『『而『非『『免『部分負擔』』,『故『不在『第48條『免部分負擔『範圍』』。故不在範圍者為中低收入戶。","options":{"A":"重大傷病免部分負擔,在範圍內。","B":"分娩免部分負擔,在範圍內。","C":"中低收入戶為保費補助對象、非免部分負擔—不在範圍(正解)。","D":"山地離島就醫免部分負擔,在範圍內。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_107100-50":{"quick":"醫院非依「主治醫師雇用方式」分開放/閉鎖性,故B為錯誤分類描述。","detail":{"background":"醫療機構/醫院的法定分類:①「『依『所有權』分『公立、私立、醫療法人、法人附設』」(A正確);②「『依『服務項目』分『醫院、診所、其他醫療機構』」(C正確);③「『依『是否具教學功能』分『教學醫院、非教學醫院』」(D正確)。而『『B『以『主治醫師『雇用方式』分『開放性/閉鎖性醫院』』『敘述『錯誤』』——『『開放性(open)/閉鎖性(closed)醫院『是『以『『是否『開放給『非編制內(社區)醫師『使用設施』』區分,『且非醫療法的法定分類』』。故B錯誤。","options":{"A":"依所有權分四類,正確。","B":"非依主治醫師雇用方式分開放/閉鎖性—錯誤(正解)。","C":"依服務項目分三類,正確。","D":"依教學功能分兩類,正確。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_108100-49":{"quick":"垂直整合屬成長策略(非穩定策略),故B錯誤。","detail":{"background":"醫院的整體(總體)策略:①「『可分『成長策略、穩定策略、緊縮策略、混合策略』」(A正確);②「『『垂直整合(向上下游擴張,如醫院併設長照/檢驗)『屬於『『成長『策略』』(『擴大規模/範疇),『『『而『非『『穩定『策略』』」——故B錯誤;③「『作業流程『再造/合理化『屬『穩定策略(維持現有規模下『提升效率)』」(C正確);④「『混合策略可『各部門『採『不同策略』」(D正確)。故B錯誤。","options":{"A":"含成長/穩定/緊縮/混合策略,正確。","B":"垂直整合屬成長策略(非穩定)—錯誤(正解)。","C":"流程再造合理化屬穩定策略,正確。","D":"混合策略可各部門不同,正確。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_109020-50":{"quick":"SWOT分析的O指opportunity(機會)。","detail":{"background":"「『SWOT分析』」是『策略管理『常用的『內外部『環境分析』工具:『『S=Strengths(優勢)、W=Weaknesses(劣勢)『屬『『內部』因素;『『O=『『Opportunity(機會)』』、T=Threats(威脅)『屬『『外部』環境』』。故『O』指『opportunity(機會)』』。opponent、optimum、operation非SWOT的O。故為opportunity。","options":{"A":"SWOT的O為opportunity(機會)—正解。","B":"opponent非SWOT的O。","C":"optimum非SWOT的O。","D":"operation非SWOT的O。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_109100-46":{"quick":"電弧焊接最易造成紫外線物理性危害(電光性眼炎)。","detail":{"background":"「『電弧焊接(arc welding)』」產生『強烈『『紫外線(UV)』輻射』,『『最易造成『『紫外線『物理性危害』』——『『『電光性『眼炎(welder’s flash/光性角膜炎)、皮膚『曬傷與皮膚癌』』(故須戴『焊接面罩』防護)。微波、紅外線、射頻輻射非電弧焊接的主要物理危害。故為紫外線。","options":{"A":"微波非電弧焊接主要危害。","B":"紅外線非主要(雖有少量熱輻射)。","C":"紫外線為電弧焊接最易造成的物理危害—正解。","D":"射頻輻射非電弧焊接主要危害。"},"sources":["職業衛生與職業醫學教科書","勞動部職業安全衛生法規"]}},"med2_109100-48":{"quick":"社會認知理論屬健康行為的人際互動層面理論。","detail":{"background":"健康行為科學理論依『影響『層面』分:①「『『個人(intrapersonal)層面』」——『健康信念模式、跨理論模式(改變階段)、計畫行為理論』;②「『『人際(interpersonal)層面』」——『『『社會認知理論(social cognitive theory,『含『觀察學習、自我效能、『交互決定論』)、社會網絡/社會支持』』」;③「『『社區/組織層面』」——『生態模式、組織發展、創新擴散』。故人際層面理論為社會認知理論。","options":{"A":"跨理論模式屬個人層面。","B":"社會認知理論屬人際互動層面—正解。","C":"生態模式屬多層面(社區/政策)。","D":"組織發展理論屬組織層面。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_109100-49":{"quick":"醫師利用資訊不對等誘導病人多消費,稱供給者誘發需求。","detail":{"background":"醫療市場因『『資訊不對稱(病人『醫療知識『遠少於『醫療『供給者)』』,『醫師『主導『醫療服務『項目的『決定』;『若『醫師『利用此『優勢『『誘導『病人『『多消費(過度醫療)』』』,『稱為『『供給者『誘發『需求(supplier-induced demand, SID)』』』。消費者誘發需求、引伸需求(derived demand)、資訊需求非此概念。故為供給者誘發需求。","options":{"A":"供給者誘發需求(醫師誘導多消費)—正解。","B":"消費者誘發需求非此概念。","C":"引伸需求指因健康而衍生的醫療需求。","D":"資訊需求非此。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_109100-50":{"quick":"台灣全民健保特色為公共單一支付制度。","detail":{"background":"臺灣『全民健康保險』的特色:①「『『強制(全民『強制』納保)』』(故A『自由納保』錯誤);②「『『『公共『單一『支付『制度(single-payer,『由健保署『單一保險人『統籌支付)』』」(B正確);③「『台灣『醫療保健『支出『佔GDP『比率『比『美國『低』,『『且『也『低於『英國等(非『高於英國)』」(故C錯誤);④「『健保『改善但『『未『完全『消弭『不同社經『族群『健康差距』」(故D錯誤)。故B正確。","options":{"A":"為強制納保(非自由納保)—錯誤。","B":"公共單一支付制度—正解。","C":"醫療支出佔GDP比美國低、也低於英國(非高於英國)—錯誤。","D":"未完全消弭健康差距—錯誤。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_110020-50":{"quick":"平衡計分卡的財務構面是落後(結果)指標,非領先指標,故C不恰當。","detail":{"background":"平衡計分卡(balanced scorecard, BSC):①「『基本精神是『將『策略『轉換成『具體『行動/衡量指標』」(A恰當);②「『含『財務、顧客、企業『內部『流程、學習與成長』四構面」(B恰當);③「『『『財務『構面『屬『『落後/結果『指標(lagging indicator,反映過去績效)』』,『『『學習成長『等才是『『領先『指標(leading)』』,『『『故『C『財務『為『領先『指標』『最不恰當』」——C錯誤;④「『非營利單位『可『增加『第五構面(如員工授權)』」(D恰當)。故C不恰當。","options":{"A":"將策略轉換成具體行動,恰當。","B":"含財務/顧客/內部流程/學習成長四構面,恰當。","C":"財務構面為落後(非領先)指標—不恰當(正解)。","D":"非營利可增第五構面,恰當。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_111020-46":{"quick":"學校單獨知識/情感教育對防制青少年藥物濫用效果有限,故A不恰當。","detail":{"background":"藥物濫用的預防/治療策略:①「『『『學校『『單獨『進行『知識傳遞『或情感性『教育』,『『『『效果『『有限(『無法『有效『延遲/降低『使用)』』,『須『結合『『社會技能『與『抗拒『技巧(social/resistance skills)訓練』』,『『故『A『只『單獨『知識/情感教育『就『有效』『最不恰當』」——A錯誤;②「『社會控制(司法、藥檢、反毒政策)」(B恰當);③「『藥物治療含『替代(美沙冬)與『拮抗劑(naltrexone、戒酒發泡錠disulfiram)」(C恰當);④「『提供『乾淨針頭『屬『減害(harm reduction)』」(D恰當)。故A不恰當。","options":{"A":"單獨知識/情感教育效果有限(非就有效)—不恰當(正解)。","B":"社會控制角度介入,恰當。","C":"替代與拮抗劑藥物治療,恰當。","D":"乾淨針頭屬減害觀點,恰當。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_111020-47":{"quick":"物質使用疾患自然史起始點是初次接觸/暴露(非已濫用依賴),故A不恰當。","detail":{"background":"物質使用疾患的『自然史』:①「『『『起始點是『『『初次『接觸/暴露(experimentation/exposure)』』,『『『而『非『『已『物質『濫用『或『依賴』』(濫用/依賴是『後期』階段),『『故『A『起始點『因『濫用『或『依賴』『最不恰當』」——A錯誤;②「『降低『暴露『機會『可『避免』」(B恰當);③「『過量等傷害『可『透過『可近性『降低『或『情境『改變『緩解』」(C恰當);④「『診斷『應考量『較長『時間『使用『型態(非單次)』」(D恰當)。故A不恰當。","options":{"A":"自然史起始點為初次接觸(非已濫用依賴)—不恰當(正解)。","B":"降低暴露機會可避免,恰當。","C":"傷害可透過可近性降低緩解,恰當。","D":"診斷應考量長時間型態,恰當。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_111020-48":{"quick":"醫療儲蓄帳戶的所得重分配與社會互助作用最小。","detail":{"background":"健康照護『財源制度』的『所得『重分配/社會『互助』作用:①「『『一般稅、社會保險費、指定用途稅』」——『屬『『社會『集資(pooling)』,『有『『重分配/互助』作用(健康者補助生病者、高所得補助低所得)』;②「『『『醫療『儲蓄『帳戶(medical saving account)』」——『『『是『『個人『帳戶『自付『自用』』,『『『『『無『跨個人『風險『分攤』,『『『故『『重分配『與『社會『互助『作用『『最『小』』。故最小者為醫療儲蓄帳戶。","options":{"A":"一般稅有重分配作用。","B":"社會保險費有互助作用。","C":"指定用途稅有集資作用。","D":"醫療儲蓄帳戶為個人帳戶、重分配互助最小—正解。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_111020-49":{"quick":"價值極大化不是常用來解釋醫院市場行為的模式。","detail":{"background":"解釋『醫院『市場行為(生產決策)』的『常見『模式』:『『『利潤『極大化(profit max)、效用『極大化(utility max,如管理者效用)、服務量『極大化(quantity/output max)』』(及收入極大化、成本最小化)』。而『『『價值『極大化(value maximization)』』『『『不是『學者『常『提出『解釋『醫院『市場『行為『的『典型『模式』』。故不是者為價值極大化。","options":{"A":"價值極大化非常用醫院行為模式—正解(不是)。","B":"利潤極大化為常用模式。","C":"效用極大化為常用模式。","D":"服務量極大化為常用模式。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_111020-50":{"quick":"洗衣屬工具性日常生活活動(IADL),不屬基本ADL。","detail":{"background":"『日常生活『活動』分:①「『『基本『ADL(activities of daily living)』」——『『『洗澡、穿衣、進食、如廁、移位、大小便控制』』(『基本『自我『照顧)』;②「『『『工具性『IADL(instrumental ADL)』」——『『『『洗衣、煮飯、購物、理財、使用電話、交通、服藥管理』』(『較複雜、需『工具/社區『功能)』。故『『洗衣』』『屬『IADL,『『不屬『『基本『ADL』』。故不屬ADL者為洗衣。","options":{"A":"洗澡屬基本ADL。","B":"穿衣屬基本ADL。","C":"洗衣屬工具性IADL、不屬基本ADL—正解。","D":"進食屬基本ADL。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_111100-50":{"quick":"外科口罩對懸浮氣膠(飛沫)傳染途徑的預防最有效。","detail":{"background":"『戴『外科『口罩』的『防護『機轉是『『阻擋『『飛沫/『懸浮『氣膠(droplet/aerosol)』』』:『故『『對『『『經『『懸浮『氣膠/『飛沫『傳染』』(如流感、結核飛沫核、COVID)『的『預防『『最『有效』』。血液傳染(經血液體液)、蟲媒傳染(病媒)、食入污染水/食物(糞口)非口罩主要防護途徑。故為懸浮氣膠傳染。","options":{"A":"血液傳染非口罩主要防護。","B":"蟲媒傳染非口罩防護。","C":"外科口罩對懸浮氣膠(飛沫)傳染最有效—正解。","D":"食入污染水/食物(糞口)非口罩防護。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_112020-50":{"quick":"平衡計分卡屬醫院管理的策略管理方法。","detail":{"background":"「『平衡計分卡(balanced scorecard)』」是『一種『『策略『管理(strategic management)』工具:『『將『組織『願景與『策略『轉換成『財務、顧客、內部流程、學習成長『四構面的『具體『衡量指標與行動』』,『『追蹤『策略『執行『成效』』。並非單純的財務管理、人力資源管理或資材管理。故為策略管理。","options":{"A":"平衡計分卡屬策略管理—正解。","B":"非單純財務管理。","C":"非人力資源管理。","D":"非資材管理。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_112100-47":{"quick":"醫師法「交付藥劑」與藥事法「調劑」不應等同視之,故D不恰當。","detail":{"background":"醫藥分業:①「『醫師『在『醫療『急迫『或『無『藥事人員『執業的『偏鄉』可『調劑』」(A恰當);②「『醫藥分業=『醫師『專司『診斷/處置/開立『處方箋『而『不調劑』」(B恰當);③「『藥事人員『調劑『應符『優良『藥品『調劑『作業規範』」(C恰當);④「『『『醫師法的『『交付『藥劑』『『『與『藥事法的『『調劑』『『『『不『應『『等同『視之』』,『『『不能『作為『醫師『普遍『調劑權『的法源』』,『『故『D『等同『視之、為『醫師『調劑權『法源』『最不恰當』」——D錯誤。故D不恰當。","options":{"A":"急迫或偏鄉醫師可調劑,恰當。","B":"醫師專司診斷處方不調劑,恰當。","C":"藥事人員調劑符合作業規範,恰當。","D":"交付藥劑≠調劑、非醫師調劑權法源—不恰當(正解)。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_112100-48":{"quick":"對無症狀者做胸部X光篩檢屬第二段預防(早期發現)。","detail":{"background":"預防醫學『三段五級』:①「『『第一段『預防』」——『『健康促進(均衡飲食/規律運動)『與『特殊保護(不吸菸/接種卡介苗)』(故A、B、D屬第一段);②「『『『第二段『預防』」——『『『早期『發現、早期『治療(『『『針對『『無症狀者『進行『篩檢』,如『胸部X光『篩肺結核/肺癌)』』(C屬第二段);③「『第三段=限制殘障與復健」。故屬第二段預防者為C(無症狀者胸部X光篩檢)。","options":{"A":"均衡飲食規律運動屬第一段(健康促進)。","B":"不吸菸戒菸屬第一段(健康促進)。","C":"無症狀者胸部X光篩檢屬第二段預防(早期發現)—正解。","D":"接種卡介苗屬第一段(特殊保護)。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_112100-49":{"quick":"「可接受性」最符合衛生資源的可近性、可用性與民眾認知。","detail":{"background":"衛生計畫的『評估準則』:『『『可接受性(acceptability)』』『最符合『『『衛生『資源的『『可近性(accessibility)、『可用性(availability)『及『民眾『對『衛生服務的『認知/接受程度』』』(即服務是否被民眾『接近、取得並願意使用』)。合法性、重要性、充分性(adequacy,資源量是否足夠)的定義不同。故為可接受性。","options":{"A":"合法性指計畫的法律依據。","B":"可接受性符合可近性/可用性/民眾認知—正解。","C":"重要性指問題的優先程度。","D":"充分性指資源量是否足夠。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_112100-50":{"quick":"人口推估是估計未來(非某一時間點觀察),不是橫斷型人口統計指標。","detail":{"background":"人口統計指標依時間分:①「『『某一『時間點『觀察(『橫斷/靜態)』」——『『『人口『數量、人口『組成(性別年齡結構)、人口『分布(地理)』』;②「『『『人口『推估(population projection)』」——『『『是『『『『估計『『未來』『人口『變化(『動態『預測)』』,『『『『而『非『『某『一『時間點『觀察『所得』』,『『故『不是『此類型(橫斷)『指標』』。故不是者為人口推估。","options":{"A":"人口分布為橫斷指標。","B":"人口推估為未來估計、非某時間點觀察—正解(不是)。","C":"人口組成為橫斷指標。","D":"人口數量為橫斷指標。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_113090-48":{"quick":"台灣醫院已廣泛引入平衡計分卡,「尚未引入」錯誤,故D不恰當。","detail":{"background":"平衡計分卡(BSC):①「『基本精神『將『策略『轉換『具體『行動』以達願景策略」(A恰當);②「『含『財務、顧客、內部流程、學習成長『四構面」(B恰當);③「『非營利『單位『應考量『員工『授權『程度』構面」(C恰當);④「『『『臺灣『醫院『『已『『廣泛『引入『平衡計分卡『作為『醫院『管理『工具』』,『『『故『D『臺灣『尚未『引入』『最不恰當』」——D錯誤。故D不恰當。","options":{"A":"將策略轉換成具體行動,恰當。","B":"含四個構面,恰當。","C":"非營利應考量員工授權構面,恰當。","D":"台灣已引入BSC(非尚未)—不恰當(正解)。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_113090-49":{"quick":"講求個人自由公平不是社會保險的基本原理特質,故A。","detail":{"background":"『社會『保險』的『基本『原理『特質』:『『『風險/危險『共同『分擔、避免『道德『危害(moral hazard)、大數『法則、『強制『納保、互助『共濟』』。而『『『講求『『個人『的『自由『公平』』『『『『不是『社會『保險『的『基本『特質(社會『保險『強調『『強制『與『社會『連帶/互助』,『『而『非『『個人『自由)』』。故不是者為講求個人自由公平。","options":{"A":"講求個人自由公平非社會保險特質—正解(不是)。","B":"風險共同分擔為社會保險特質。","C":"避免道德危害為社會保險特質。","D":"大數法則為社會保險原理。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_113090-50":{"quick":"台灣醫院家數以私立醫院居多,A最恰當。","detail":{"background":"臺灣『醫療『照護『供給『體系』:①「『『『醫院『家數『『『以『『私立『醫院『『居多(『公立『醫院『佔『少數)』』」(A最恰當);②「『『醫院『『數目『『逐年『『『『減少(『中小型『醫院『退場/合併)』』」(故B『逐年增加』錯誤);③「『每萬人口『醫師數『約『『2-3人(非8人)』」(故C錯誤);④「『每萬人口『一般病床『數『遠『高於『20床(約40-50床以上)』」(故D錯誤)。故A最恰當。","options":{"A":"醫院家數以私立醫院居多—正解。","B":"醫院數目逐年減少(非增加)—錯誤。","C":"每萬人醫師約2-3人(非8人)—錯誤。","D":"每萬人病床遠高於20床—錯誤。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}},"med2_114090-50":{"quick":"傳染病疫苗接種具外部性(個人接種使他人也受益)。","detail":{"background":"醫療服務的『外部性(externality)』指『『個人的『行為『『影響『到『『他人(社會)的『利益/成本』』。『『『傳染病『『疫苗『接種』』具『『『正『外部性』』——『『個人『接種『不僅『保護『自己,『『也『『『降低『他人『被『感染『的『機會(群體免疫)』』』。而『資訊不對稱、代理人問題、疾病不確定性』是醫療市場的其他特性(非外部性)。故具外部性者為疫苗接種。","options":{"A":"資訊不對稱為醫療市場特性(非外部性)。","B":"代理人問題非外部性。","C":"傳染病疫苗接種具外部性(利及他人)—正解。","D":"疾病治療不確定性非外部性。"},"sources":["台灣衛生福利部《全民健康保險法》與醫療法","公共衛生學(陳拱北預防醫學基金會)","衛生行政與醫務管理教科書"]}}},TO=["H1生物統計學", "H2流行病學研究設計與測量", "H3篩檢與診斷檢驗效度", "H4環境衛生", "H5職業衛生與職業病", "H6健康促進與衛生教育", "H7衛生政策與醫療經濟", "H8傳染病防治與疾病監測"],LEC={"H1生物統計學":{"title":"生物統計學","html":"<p><b>檢定選擇</b>:兩組連續比較→獨立t檢定;前後/配對連續→配對t檢定;三組以上連續→變異數分析(ANOVA,F分配、須變異數同質);兩類別→卡方檢定(細格期望值<5用費雪恰當檢定;配對2×2用McNemar)。多重比較Bonferroni校正=α÷比較對數。</p><p><b>誤差與檢定力</b>:型一錯誤(α)=無差異卻判有差異(偽陽性,=顯著水準);型二錯誤(β)=有差異卻沒測到;檢定力=1−β,增樣本數可提高。中央極限定理:樣本平均分布趨近常態、SE=σ/√n。</p><p><b>相關與迴歸</b>:r介於−1~1、與斜率b同號;可解釋變異=R²=r²;相關/迴歸不證因果。X、Y互換r不變但b改變。測量尺度:名目<序位<等距(無絕對零,如攝氏)<等比(有絕對零,如膽固醇)。右偏資料用中位數+四分位距;跨單位比較變異用變異係數CV。信賴區間:重複抽樣95%區間涵蓋母數(非95%個體落入);寬度∝1/√n。</p>"},"H2流行病學研究設計與測量":{"title":"流行病學研究設計與測量","html":"<p><b>研究設計</b>:世代研究(依暴露前瞻追蹤→時序明確、可算發生率/RR、適合稀有暴露);病例對照(由結果回溯暴露→省時省樣本、適合稀有疾病/長潛伏、只能算OR、易選擇/回憶偏差);橫斷(同時點);生態研究(群體聚集資料→注意生態謬誤)。</p><p><b>測量與偏誤</b>:RR=暴露組危險/對照組危險;OR=病例暴露勝算/對照暴露勝算。干擾因子(與暴露相關+疾病獨立危險因子+不在因果路徑,控制後關聯改變);效應修飾(分層關聯強度不同)。生態謬誤(群體推個體);粗死亡率受年齡結構影響→須年齡標準化。隨機誤差(忽大忽小,降精確度)。配對可用於病例對照/世代/病例交叉,被配對因子主效果無法估計。</p>"},"H3篩檢與診斷檢驗效度":{"title":"篩檢與診斷檢驗效度","html":"<p><b>效度指標</b>:敏感度=有病者中陽性比例;特異度=無病者中陰性比例;陽性預測值(PPV)=陽性者中真有病比例(受盛行率影響,盛行率低→PPV低、偽陽性占比高);陰性預測值。提高切點→偽陽率下降、敏感度下降(trade-off)。</p><p><b>組合檢定</b>:平行(任一陽性即陽性)→敏感度增、特異度降;系列(全陽性才陽性)→特異度增、敏感度降。篩檢只區分可能有病/沒病(非診斷)、適用無症狀者、高盛行率族群效率高。Wilson準則:重要疾病+有效療法+好工具+成本效益。新生兒篩檢屬三段五級的第三級(早期診斷治療)。我國成人肥胖BMI切點27。</p>"},"H4環境衛生":{"title":"環境衛生","html":"<p><b>水與空氣</b>:藍嬰症=硝酸鹽;加氯消毒副產物=氯+有機物→三鹵甲烷;梨形鞭毛蟲/隱孢子蟲囊體抗氯需過濾。PSI=SO2/CO/O3/NO2/PM10;PM2.5=粒徑<2.5μm。臭氧為二級(光化學)污染物、夏季午後高;酸雨=硫氧化物+氮氧化物。AQI最嚴重=褐紅色。VOCs為氣狀(非粒狀)。</p><p><b>輻射/全球變遷/重金屬</b>:游離輻射(α/β/γ/X/宇宙射線),非游離(紅外/微波/可見光);rad=吸收劑量、rem=等效劑量(含品質因數)。溫室氣體CO2/CH4/N2O(NH3非);UV-C被臭氧層吸收到不了地表(地表以UV-B為害);臭氧洞最早在南極、CFC的氯原子破壞。重金屬:汞→水俁病(振顫/運動失調);鎘→痛痛病(骨軟化);鉻酸→鼻中膈穿孔;砷→烏腳病/多種癌(長期暴露用毛髮指甲指標)。風險評估:致癌物無閾值(斜率因子,單位(mg/kg-day)⁻¹)、非致癌物有閾值(RfD、HQ/HI,HI>1有危害)。</p>"},"H5職業衛生與職業病":{"title":"職業衛生與職業病","html":"<p><b>容許濃度與換氣</b>:日時量平均(PEL-TWA)=每日8小時/每週40小時;短時間時量平均(STEL)=15分鐘;最高容許濃度=任何時間。TWA=Σ(濃度×時間)/總時間。局部排氣用於高毒/高濃度;整體換氣稀釋低毒污染(不用於調氣壓)。</p><p><b>職業性疾病</b>:苯→血癌;氯乙烯→肝血管肉瘤;石棉→間皮瘤/石棉肺;矽塵→矽肺;鉻酸→鼻中膈穿孔/肺癌;有機磷→膽鹼酯酶下降;振動→白指病;有機硝化物→週一心絞痛;鎘→痛痛病;PCB→油症事件;噪音非聽覺影響→心血管。人因工程危害=姿勢/搬運/重複性。高溫油炸澱粉→丙烯醯胺;肉品高溫→異環胺。職業病認定:種類表正面表列為原則,表外須經鑑定;過勞促發腦出血/職業相關精神疾病可認定。</p>"},"H6健康促進與衛生教育":{"title":"健康促進與衛生教育","html":"<p><b>理論模式</b>:渥太華憲章五策略(健康公共政策/支持性環境/社區行動/個人技能/調整健康服務方向)。PRECEDE三因素:前傾(知識態度信念)/增強(行為後回饋)/使能(資源技能可近性)。健康信念模式(自覺罹患性/嚴重性/利益/障礙→是否採預防行為)。跨理論模式階段(懵懂→沉思[有意未行動]→準備[已開始準備]→行動→維持,依階段給策略)。社會學習/觀察學習(偶像楷模仿效)。涵化理論(長期媒體形塑社會真實認知)。</p><p><b>社會支持與其他</b>:社會支持=工具性(實物/設施)/情感性/資訊性/評價性。評價:過程(參與率/資源/執行)、衝擊(知態行)、結果(健康狀態)。健康定義=身心社會完全安適(非只無病)。Lalonde:生活型態影響健康最大。健康城市=持續過程(非結果)。健康識能佳→健康決策能力佳。設計思考第一步=同理。長照服務:團體家屋=社區式;照顧管理=發掘/評估/擬計畫/連結/監測。菸害防制法:未滿20歲不得吸菸、警示圖文≥50%。</p>"},"H7衛生政策與醫療經濟":{"title":"衛生政策與醫療經濟","html":"<p><b>全民健保與支付</b>:全民健保=社會保險(強制納保、量能負擔、非商業)。支付制度基準單位由小到大、節約誘因漸增:論量計酬(缺節約誘因、誘發過度服務)<論日<論病例(DRG)<論人計酬(節約誘因最大、但挑輕症)。論質計酬(P4P)缺點=挑選輕症病人。總額預算:協商因子(新藥新科技/支付改革/品質獎勵金)vs非協商因子(醫療服務成本/人口結構)。健保財源=被保險人保費+雇主分擔+政府稅收(罰款非財源)。</p><p><b>經濟評估與制度</b>:成本效用分析(產出以QALY衡量)vs成本效益(以金錢衡量產出)。醫療費用成長主因=人口老化/所得/科技進步。強制衛生政策倫理:有效、比例、最小侵害(非毫無例外)。英國1848年首部公共衛生法。WHO最高權力=世界衛生大會、為聯合國專門機構、含技術合作。健康不平等=社會/地理造成的不公平健康差異(如偏鄉vs都會壽命)。心理衛生主要法源=精神衛生法。</p>"},"H8傳染病防治與疾病監測":{"title":"傳染病防治與疾病監測","html":"<p><b>法定傳染病與通報</b>:五類分級。第一類(狂犬病/鼠疫/SARS)立即24小時通報;第二類(登革熱/結核)24小時內;第三類(日本腦炎/瘧疾/梅毒)一週內;第四五類依公告。監測金字塔人數由多到少:感染人數>症狀>就醫>確診。潛伏期=感染到出現症狀。發生率(attack rate)=新病例/期初風險人數。</p><p><b>病媒與防治</b>:登革熱=埃及斑蚊+白線斑蚊(埃及斑蚊偏室內、17°C以下活性低、中斷式吸血);恙蟎幼蟎→恙蟲病;白喉以外毒素致病。食品中毒定義=2人以上攝食相同食品有相似症狀(肉毒/化學1人即算);仙人掌桿菌→米飯;沙門氏菌=細菌性。全國食安專線1919、防疫1922、長照1966。HACCP:危害分析→決定關鍵管制點(CCP,如雞肉須煮熟)→管制界限→監測→矯正→驗證→記錄。職業性肺結核:就職X光為比較基準、可認定職業病。愛滋目標2030為95-95-95、鼓勵PrEP。</p>"}};

 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}

 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='med2_ph_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
