,B 研究者自母體隨機抽取225 位大學生得其平均BMI 為22.5。A、B 研究者利用自己收集之資料 計算母體平均BMI 之95%信賴區間(confidence interval, CI),下列敘述何者最恰當?","options":{"A":"A 研究者計算之95% CI 意義為約95%的大學生之BMI 可能出現之範圍","B":"A 研究者計算之95% CI 寬度會是B 研究者計算之95% CI 寬度的1.5 倍","C":"因信心水準皆為95%,故A 研究者計算之95% CI 寬度會與B 研究者計算之95% CI 寬度相同","D":"A 研究者計算之95% CI 中點會與B 研究者計算之95% CI 中點相同"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_114090-37","q_num":37,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"H1生物統計學","stem":"已知抽菸可導致肺活量降低,亦即香菸攝取量越高,則未來肺活量下降越多,兩者之間有因果關係。若某一 研究者想要檢定抽菸與肺活量無關的虛無假說(H0:抽菸與肺活量獨立),隨機抽樣30 人並完成一次試驗 後,由於統計檢定未達顯著水準,P 值(p-value)大於0.05,統計決策是不拒絕虛無假說,並總結抽菸與肺 活量並無統計上顯著的相關性。則此試驗結果為下列那一項?","options":{"A":"型一錯誤(Type I error)","B":"型二錯誤(Type II error)","C":"真陰性(True Negative)","D":"真陽性(True Positive)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_106100-39","q_num":39,"roc_year":"106","exam_code":"106100","src":"民國106年","topic":"H2流行病學研究設計與測量","stem":"一個臨床試驗評估密集運動計畫擬探討初次發病存活至少30天的心肌梗塞病人的有效性,初次發病存活至少 30天的心肌梗塞病人被隨機分配至密集運動計畫或一般照護(usual care)。在100名一般照護的病人中,30 名病人在三年的追蹤期間死亡;在100名密集運動計畫的病人中,50名病人在三年的追蹤期間死亡。密集運動 計畫組相較於一般照護組的死亡相對危險性(relative risk of death)為何?","options":{"A":"0.60","B":"0.03","C":"0.50","D":"1.67"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_106100-40","q_num":40,"roc_year":"106","exam_code":"106100","src":"民國106年","topic":"H2流行病學研究設計與測量","stem":"有一臨床研究,預計二年內收集200名病例及200名對照,進行某生長激素研究,醫師甲提議每收集一個病例 即開具檢驗單,由檢驗室測量血中該生長激素的量;醫師乙提議先冷凍貯存病人血液樣本,再由檢驗室根據 其日處理80個檢體的能量,於5個工作日全數測量完畢。下列何者正確?","options":{"A":"醫師甲的計畫較容易出現選擇偏差","B":"醫師乙的計畫較容易出現選擇偏差","C":"醫師甲的計畫較容易出現測量誤差","D":"醫師乙的計畫較容易出現測量誤差"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_107100-39","q_num":39,"roc_year":"107","exam_code":"107100","src":"民國107年","topic":"H2流行病學研究設計與測量","stem":"病例對照研究中,吸菸對口腔癌發生之勝算比值(odds ratio)為 2.0 倍。若健康對照個案之中有 25% 個案 吸菸,則 400 名罹患口腔癌病患之中有多少名病患吸菸?","options":{"A":"100","B":"160","C":"200","D":"240"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_107100-40","q_num":40,"roc_year":"107","exam_code":"107100","src":"民國107年","topic":"H2流行病學研究設計與測量","stem":"關於篩檢的描述何者錯誤?","options":{"A":"公費篩檢政策實施當年,癌症的發生率通常會較往年上升","B":"推行子宮頸抹片篩檢會有效降低子宮頸癌死亡率","C":"癌症盛行率會高於發生率","D":"為減少癌症死亡率,應對各種癌症進行公費篩檢"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_107100-48","q_num":48,"roc_year":"107","exam_code":"107100","src":"民國107年","topic":"H2流行病學研究設計與測量","stem":"社會流行病學強調疾病多層次的社會機制,研究設計時常需同時考慮「個體」與「群體」分析單位。此種同 時考慮「個體」與「群體」的研究設計,可以避免下述何種研究上的謬誤或偏誤?","options":{"A":"辛普森詭論(Simpson’s paradox)","B":"生態謬誤(ecological fallacy)","C":"選擇偏誤(selection bias)","D":"干擾偏誤(confounding bias)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_108030-41","q_num":41,"roc_year":"108","exam_code":"108030","src":"民國108年","topic":"H2流行病學研究設計與測量","stem":"研究臺灣各鄉鎮市區空氣污染與癌症發生之關係,空氣污染資料來自環保署,而癌症發生資料來自衛生福利 部,這些資料除了性別與年齡外無個人生活相關資料,則該研究屬何種?","options":{"A":"個案報告(case report)","B":"生態學研究(ecological study)","C":"病例對照研究(case-control study)","D":"世代研究(cohort study)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_108030-50","q_num":50,"roc_year":"108","exam_code":"108030","src":"民國108年","topic":"H2流行病學研究設計與測量","stem":"原開發廠的新藥成本較高,售價昂貴的原因,以下那一項因素的影響較小?","options":{"A":"研究及發展費用","B":"專利權的保護","C":"臨床試驗的花費","D":"生產製造的成本"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_108100-41","q_num":41,"roc_year":"108","exam_code":"108100","src":"民國108年","topic":"H2流行病學研究設計與測量","stem":"若甲乙兩地各年齡層年齡別死亡率完全相同,下列敘述何者最正確?","options":{"A":"甲乙兩地之粗死亡率必定相同","B":"甲乙兩地之年齡標準化死亡率必定相同","C":"甲地人口比乙地老化,則甲地之粗死亡率必小於乙地","D":"甲乙兩地間年齡標準化死亡率之差異,不會隨標準人口年齡組成不同而有變異"},"answer":"B","accepted_answers":["B","D"],"answer_status":"多重答案","img":""},{"id":"med2_109020-39","q_num":39,"roc_year":"109","exam_code":"109020","src":"民國109年","topic":"H2流行病學研究設計與測量","stem":"有一研究發現具有AA基因型的病人相較於其他基因型病人,對相同治療藥物的反應較佳,則AA基因型扮演 下列何種角色?","options":{"A":"干擾因子","B":"拮抗因子","C":"修飾因子","D":"分化因子"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_109020-48","q_num":48,"roc_year":"109","exam_code":"109020","src":"民國109年","topic":"H2流行病學研究設計與測量","stem":"下列那一項不是世界衛生組織所提出的健康城市的健康指標?","options":{"A":"低出生體重比率","B":"嬰兒死亡率","C":"墮胎率(相對於每一個活產數)","D":"總死亡率"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_109100-38","q_num":38,"roc_year":"109","exam_code":"109100","src":"民國109年","topic":"H2流行病學研究設計與測量","stem":"一項研究持續觀察 1400 名無肺癌者 5 年後,其中 700 名抽菸者 70 位罹患肺癌, 另 700 名不抽菸者中 26 位 罹患肺癌,這屬於下列那一種研究法?","options":{"A":"世代研究","B":"病例對照研究","C":"生態研究","D":"橫斷式研究"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_109100-40","q_num":40,"roc_year":"109","exam_code":"109100","src":"民國109年","topic":"H2流行病學研究設計與測量","stem":"某項針對臺灣各縣市進行的調查研究發現:民眾年平均香菸攝取量越高的縣市,該縣市居民的冠心症發生率 就越高,欲解釋此一現象時應特別注意是否有下列那項情形?","options":{"A":"生態謬誤","B":"家族聚集","C":"共同感染","D":"世代效應"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_109100-41","q_num":41,"roc_year":"109","exam_code":"109100","src":"民國109年","topic":"H2流行病學研究設計與測量","stem":"以水銀血壓計測量病人血壓,某醫師操作袖帶解壓(cuff deflation)的速度,有時快過2毫米汞柱/秒,有時卻 慢於2毫米汞柱/秒。下列敘述何者正確?","options":{"A":"可能發生選擇偏差,無法得到真正血壓值","B":"可能發生回憶偏差,無法得到真正血壓值","C":"可能發生隨機誤差,得到真正血壓值的機會大","D":"可能發生隨機誤差,無法保證得到真正的血壓值"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_110020-36","q_num":36,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"H2流行病學研究設計與測量","stem":"相較於世代追蹤研究,下列何者為病例對照研究的缺點?","options":{"A":"容易產生選擇性偏差","B":"需要更長研究時間","C":"需要更多樣本數","D":"無法探討多重病因"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_111100-38","q_num":38,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"H2流行病學研究設計與測量","stem":"相較於病例對照研究法,下列何者是世代研究的最大優點?","options":{"A":"適用於稀有疾病","B":"研究時間較短","C":"較可建構時序關係","D":"所需族群樣本數較少"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_111100-47","q_num":47,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"H2流行病學研究設計與測量","stem":"有關青少年成癮性物質的使用,下列敘述何者最恰當?","options":{"A":"物質成癮的發展與遺傳因子應無關聯性","B":"青少年的藥物濫用防制策略,首重減少青少年菸酒的使用","C":"男性與女性青少年使用成癮性物質的盛行率差距越來越大","D":"父母親的社經地位與青少年使用菸品的盛行率無關"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_112020-38","q_num":38,"roc_year":"112","exam_code":"112020","src":"民國112年","topic":"H2流行病學研究設計與測量","stem":"一研究發現各國的乳癌發生率與女性高血脂盛行率呈現正向關係,因此判定女性若高血脂容易導致乳癌。此 推論最可能犯下何種問題?","options":{"A":"型一錯誤(type I error)","B":"生態謬誤(ecological fallacy)","C":"訊息偏差(information bias)","D":"干擾(confounding)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_112100-37","q_num":37,"roc_year":"112","exam_code":"112100","src":"民國112年","topic":"H2流行病學研究設計與測量","stem":"甲地的心血管疾病粗發生率(crude incidence rate)高於乙地,但年齡標準化發生率(age-standardized incidence rate)卻是低於乙地,下列敘述何者最恰當?","options":{"A":"甲地心血管疾病的危險因子比乙地多","B":"甲地心血管疾病的死亡分率高於乙地","C":"甲地的人口老化程度高於乙地","D":"甲地心血管疾病的盛行率高於乙地"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_112100-39","q_num":39,"roc_year":"112","exam_code":"112100","src":"民國112年","topic":"H2流行病學研究設計與測量","stem":"下列何者是公共衛生評估一個國家健康水平常用的指標?","options":{"A":"流產率","B":"嬰兒死亡率","C":"總生育率","D":"離婚率"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_112100-45","q_num":45,"roc_year":"112","exam_code":"112100","src":"民國112年","topic":"H2流行病學研究設計與測量","stem":"「個體取向」的預防疾病策略,是找出高風險的個體給予預防性介入。相較下,針對整個群體的「群體取 向」觀點,則是試圖改變整體族群的暴露風險,可能更為有效。關於「群體取向」,下列敘述何者最不恰 當?","options":{"A":"減少整體人群的鹽分攝取量來減少心血管疾病","B":"找出高血脂的病人,給予治療,減少心血管疾病死亡率","C":"增加學童戶外活動時間以降低近視發生","D":"目前我國菸害防制採取禁止菸品廣告的政策,是群體取向的一種作法"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_112100-50","q_num":50,"roc_year":"112","exam_code":"112100","src":"民國112年","topic":"H2流行病學研究設計與測量","stem":"對於人口特質的描述,常應用某一時間點觀察所得的指標,下列那一項不是此類型的人口統計指標?","options":{"A":"人口分布","B":"人口推估","C":"人口組成","D":"人口數量"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_114090-36","q_num":36,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"H2流行病學研究設計與測量","stem":"配對(matching)是臨床流行病學方法學中常用的技巧,下列何項是使用配對時可能會出現的錯誤?","options":{"A":"在病例對照研究中,將病例和對照的年齡性別加以配對,能增加研究效率","B":"採用密度配對(density matching)時,是指除了配對年齡性別等因子外,還會加入時間做配對","C":"配對是使病例和對照的特性(如年齡性別)具有可比性的研究技巧,不適用於世代研究與病例交叉研究 (case crossover design)","D":"病例組和對照組的年齡被配對後,年齡對於疾病風險的主效果就會被降低"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_114090-38","q_num":38,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"H2流行病學研究設計與測量","stem":"某研究探討吸菸與腎臟癌症間的相關性,研究者從多家醫院蒐集腎臟癌症新發生個案,並進行性別、年齡(± 5 歲)、種族以及居住所在鄰里等變項之匹配,選取無任何癌症病史的其他住院病人為對照組個案。該研究 之研究數據如下表所示。下列有關吸菸與腎臟癌症相關性的相關分析數據中何者最恰當?","options":{"A":"曾經吸菸的人,腎臟癌的發生率為800/1513","B":"腎臟癌症病人曾經吸菸的勝算(odds)為800/1157","C":"腎臟癌症病人曾經吸菸的勝算大於沒有任何癌症病史住院病人的吸菸勝算,也就是(800/357)> (713/444)","D":"吸菸與腎臟癌症發生的相對危險性估計值為(800/1513)/(357/801)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_114090-39","q_num":39,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"H2流行病學研究設計與測量","stem":"分析抽菸與口腔癌的關係,針對有酗酒者,抽菸的相對危險性(relative risk)為4;無酗酒者,抽菸的相 對危險性為2,若將有或無酗酒者合併則抽菸的相對危險性為1。有關酗酒與抽菸及口腔癌關係的敘述,下列 何者最恰當?","options":{"A":"是干擾因子而非修飾因子","B":"是修飾因子而非干擾因子","C":"既是干擾因子也是修飾因子","D":"既非干擾因子也非修飾因子"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_115020-36","q_num":36,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"H2流行病學研究設計與測量","stem":"某大型汽車公司的3,000 名員工從1980 年就開始接受了初步健康檢查。從1980 年後該公司每三年提供一次 員工健康檢查,並可透過健康檢查結果與追蹤結果找出員工是否有罹患肝癌。研究者使用該公司之上述相關 數據來探討肝癌與該公司工廠中接觸油漆之間的相關性。上述描述最有可能是下列何種研究設計?","options":{"A":"隨機對照試驗","B":"世代研究","C":"病例對照研究","D":"橫斷性研究"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_115020-37","q_num":37,"roc_y 14090","src":"民國114年","topic":"H8傳染病防治與疾病監測","stem":"下列有關食品中毒的敘述,何者最不適當?","options":{"A":"必須至少有三人或三人以上攝取相同的食品而發生相似的症狀","B":"沙門氏桿菌造成的食品中毒屬於細菌性病因","C":"引起仙人掌桿菌食品中毒的來源食品可能為米飯等澱粉類製品","D":"受糞便污染的食品或水源可能引起病原性大腸桿菌食品中毒"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_114090-48","q_num":48,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"H8傳染病防治與疾病監測","stem":"下列何者是全國食安專線,提供整合跨部會的食安檢舉與諮詢的服務窗口?","options":{"A":"1919","B":"1966","C":"1922","D":"1950"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_115020-41","q_num":41,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"H8傳染病防治與疾病監測","stem":"埃及斑蚊為臺灣登革熱主要病媒蚊,下列何者最不符合埃及斑蚊之生態習性描述?","options":{"A":"喜歡棲息在戶外","B":"在攝氏17 度以下活性低","C":"警覺性高,易受驚動","D":"中斷式吸血"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_115020-48","q_num":48,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"H8傳染病防治與疾病監測","stem":"臺灣針對傳染病訂有五類傳染病通報的分級,其中有關通報時間的敘述何者最不恰當?","options":{"A":"第一類傳染病必須立刻通報","B":"第二類傳染病應於3 天內通報","C":"第三類傳染病應於1 週內通報,必要時中央主管機關得調整之","D":"第四類傳染病依中央主管機關公告之期限及規定"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""}],E={"med2_106100-36":{"quick":"小樣本2×2列聯表(細格期望值<5)比較兩組併發症比例,用費雪恰當檢定。","detail":{"background":"比較「兩個類別變項(2×2列聯表)」的關聯時:①樣本量足夠(各細格期望值≥5)用「卡方檢定(Chi-square)」;②「樣本太小(任一細格期望值<5)」則卡方近似不準,應改用「『費雪恰當檢定(Fisher’s exact test)』」(以超幾何分布精確計算)。本題僅10人(術前準備好6人、差4人),樣本極小、期望值必<5,故用Fisher恰當檢定。獨立t檢定用於兩組『連續』變項平均比較;McNemar用於『配對』的2×2。故選費雪恰當檢定。","options":{"A":"小樣本2×2用費雪恰當檢定—正解。","B":"獨立t檢定用於連續變項平均比較。","C":"卡方檢定樣本太小(期望值<5)不適用。","D":"McNemar用於配對資料。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_106100-37":{"quick":"同一批大鼠服藥前後配對測量血壓,用配對t檢定。","detail":{"background":"比較「同一受試者(或配對)在『前後兩次』的連續測量值」時,因兩次測量『非獨立(來自同一個體)』,應使用「『配對t檢定(paired t-test)』」(分析前後差值)。本題對20隻大鼠『餵藥前、餵藥後』各測血壓比較,屬「前後配對」設計,故用配對t檢定。獨立樣本t檢定用於『兩個獨立組別』、線性迴歸探討連續變項關係、列聯表分析類別變項,皆不符。","options":{"A":"線性迴歸探討變項關係、非前後比較。","B":"獨立t檢定用於兩獨立組。","C":"同鼠前後配對用配對t檢定—正解。","D":"列聯表用於類別變項。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_106100-38":{"quick":"比較不同單位/量級資料的相對變異,用變異係數(CV=SD/平均)。","detail":{"background":"「變異係數(coefficient of variation, CV = 標準差 ÷ 平均值，常以%表示)」是『無單位的相對離散度』指標,適合「比較『不同單位或不同量級』資料的變異程度」。本題比較『血鉛(μg/dl)』與『尿古丁尼(ng/ml)』兩種不同單位資料何者變異較大,標準差/變異數/全距皆有單位、無法直接比較,須用『CV』。故選變異係數。","options":{"A":"標準差有單位、不能跨不同單位比較。","B":"變異數有單位平方、不能跨比較。","C":"變異係數無單位、適合跨不同單位比較變異—正解。","D":"全距受極端值影響且有單位。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_107100-36":{"quick":"樣本平均的抽樣分布趨近常態(非布阿松),故B不是中央極限定理涵義。","detail":{"background":"中央極限定理(central limit theorem, CLT)的涵義:①當樣本數夠大時,『樣本平均值的抽樣分布『趨近常態分布(normal)』』(不論母體分布為何);②『樣本平均的期望值等於母體平均』;③『標準誤(SE)= 母體標準差 ÷ √n』,取決於母體標準差與樣本數。故B「樣本平均分布接近『布阿松(Poisson)分布』」與CLT(趨近常態)矛盾,不是CLT涵義。","options":{"A":"樣本平均分布趨近常態,為CLT涵義。","B":"樣本平均分布趨近常態而非布阿松—非CLT涵義(正解)。","C":"樣本平均期望值等於母體平均,為CLT涵義。","D":"標準誤取決於母體標準差與樣本數,為CLT涵義。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_107100-37":{"quick":"無母數分析對極端值不敏感(用秩次),「對極端值較敏感」錯誤(本題A、C均給分)。","detail":{"background":"無母數(nonparametric)分析:①「『不需假設資料呈常態分布』」(適用偏態、序位資料);②多以「『秩次(rank)』」運算,故「『對極端值『不』敏感(較穩健)』」——A「對極端數值較敏感」錯誤;③「適合『小樣本』或不符常態假設的資料」;④當資料符合常態時,無母數的「統計檢定力『略低於』有母數分析」(本題C「檢定力較低」亦判給分,因敘述脈絡)。本題公告「A、C均給分」。","options":{"A":"無母數用秩次、對極端值不敏感、非較敏感—錯誤(正解)。","B":"不需假設常態分布,正確。","C":"檢定力較有母數低(本題判給分)。","D":"適合小樣本分析,正確。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_107100-41":{"quick":"相關係數0.7為正,迴歸斜率b一定大於零。","detail":{"background":"皮爾森相關係數r與簡單線性迴歸斜率b的關係:①「r與b『同號』」——r為正(0.7>0)則斜率「b一定大於零」(A正確);②「『可被解釋的變異比例』是『判定係數R²=r²』」,r=0.7則『R²=0.49(49%)』,故「血壓變異有70%可被年齡解釋」錯誤(應為49%);③斜率b的數值大小取決於X、Y的單位/標準差,『不等於』r,故「每增一歲收縮壓增0.7mmHg」不成立(r=0.7不代表斜率=0.7);④截距a的正負不一定。故A正確。","options":{"A":"相關為正、迴歸斜率b一定大於零—正解。","B":"截距a正負不一定。","C":"可解釋變異為r²=49%、非70%—錯誤。","D":"r=0.7不等於斜率、非每歲增0.7mmHg—錯誤。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_108030-36":{"quick":"膽固醇值(mg/dl)有絕對零點,為等比尺度,敘述正確。","detail":{"background":"測量尺度四型:①「名目(nominal)」——分類無順序(如血型A/B/O,故血型為名目非序位);②「序位(ordinal)」——有順序但間距不等(如癌症分期I-IV、疾病嚴重度);③「等距(interval)」——間距相等但『無絕對零點』(如攝氏溫度,0°C非「無溫度」);④「等比(ratio)」——間距相等且『有絕對零點』,可做倍數比較(如『膽固醇mg/dl、體重、身高』)。故「膽固醇值為等比尺度」正確(B);血型=名目、攝氏溫度=等距、癌症分期=序位。","options":{"A":"血型為名目尺度、非序位—錯誤。","B":"膽固醇值(有絕對零點)為等比尺度—正解。","C":"攝氏體溫為等距尺度(無絕對零點)—錯誤。","D":"癌症分期為序位尺度—錯誤。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_108030-38":{"quick":"型一與型二錯誤機率無「相加為1」的關係,故D錯誤。","detail":{"background":"統計檢定誤差:①「型一錯誤(α)」=『實際無差異卻判定有差異(偽陽性)』,其機率即研究者設定的『顯著水準』(A、C正確);②「型二錯誤(β)」=實際有差異卻沒測到(偽陰性),『檢定力=1−β』;③「在顯著水準不變下,『增加樣本數可提高檢定力(降低β)』」(B正確);④「α與β『沒有相加為1』的關係」(1−β才是檢定力,且α、β可獨立調整)——故D「型一+型二=1」錯誤。","options":{"A":"型一錯誤機率=設定的顯著水準,正確。","B":"增樣本數可提高檢定力,正確。","C":"型一錯誤=無差異卻判有差異,正確。","D":"型一+型二錯誤機率「和為1」是錯誤的—錯誤(正解)。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_108030-40":{"quick":"比較五組(吸菸狀況)的肺功能平均值是否不同,用單因子變異數分析(ANOVA)。","detail":{"background":"比較「『三組(含)以上』獨立組別的『連續』變項『平均值』是否有差異」,應使用「『單因子變異數分析(one-way ANOVA)』」(以F檢定),而非重複做多次t檢定(會膨脹型一錯誤)。本題依吸菸狀況分『五組』、比較各組『肺功能平均值』,故用單因子ANOVA。獨立/配對t檢定用於兩組、卡方用於類別變項。","options":{"A":"獨立t檢定用於兩組比較。","B":"配對t檢定用於前後/配對。","C":"卡方檢定用於類別變項。","D":"五組連續平均比較用單因子變異數分析—正解。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_108100-36":{"quick":"型一錯誤=兩組實際無差異,卻分析推翻虛無假說(偽陽性)。","detail":{"background":"統計假說檢定中,「虛無假說(H0)」通常設「兩組無差異」:①「『型一錯誤(type I error,α)』」=『實際上『無差異(H0為真)』,但分析結果『推翻H0(誤判有差異)』』——即偽陽性;②「型二錯誤(β)」=實際有差異(H0為假),卻未能推翻H0(偽陰性)。故型一錯誤為「兩組實際無差異、結果推翻虛無假說」(A)。","options":{"A":"無差異卻推翻虛無假說=型一錯誤—正解。","B":"無差異且支持H0為正確判斷。","C":"有差異且推翻H0為正確判斷(檢定力)。","D":"有差異卻支持H0=型二錯誤。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_108100-37":{"quick":"單尾與雙尾檢定的顯著水準(α)相同(只是分配方式不同),敘述正確。","detail":{"background":"單尾(one-tailed)與雙尾(two-tailed)假說檢定:①「『顯著水準α相同』(如皆設0.05)」,差別在α如何分配——雙尾把α分到兩側(各α/2)、單尾全放一側(C正確);②因此「在『同一側』,單尾的臨界值較小,『單尾『較容易』拒絕虛無假說』」(故B「較不易拒絕」錯誤);③兩者「p值算法不同」(A錯誤);④「『雙尾較常被使用』(較保守,除非有明確方向假設)」(D錯誤)。故C正確。","options":{"A":"單雙尾p值算法不同—錯誤。","B":"單尾較『容易』拒絕H0、非較不易—錯誤。","C":"單尾與雙尾顯著水準α相同—正解。","D":"雙尾較常被使用、非單尾—錯誤。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_108100-38":{"quick":"X與Y角色互換後r不變但斜率b會改變,「b與r仍相同」錯誤。","detail":{"background":"簡單線性迴歸斜率b與相關係數r:①「大的|b|或|r|『不能確認因果』」(相關非因果,A正確);②「r一定介於−1與1之間」(B正確);③「b與r『同號』(b = r × Sy/Sx,Sx、Sy為標準差皆正)」(C正確);④若把「X、Y角色『互換』(以X當依變項)」,「『r『不變』』但『斜率b『會改變』(b = r × Sx/Sy ≠ 原b)』」——故D「互換仍有相同的b與r」錯誤(b會變)。","options":{"A":"大的|b||r|不確認因果,正確。","B":"r介於−1與1之間,正確。","C":"b與r同號,正確。","D":"X、Y互換後r不變但b會改變—錯誤(正解)。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_108100-39":{"quick":"四組兩兩比較共6對,Bonferroni校正後每個檢定的顯著水準為0.05/6。","detail":{"background":"多重比較會膨脹整體型一錯誤,「Bonferroni校正」把總顯著水準α平均分配到每個比較:校正後每個檢定的顯著水準 = 『α ÷ 比較對數』。四組「兩兩比較」的對數 = C(4,2) = 『6對』,故每個檢定的顯著水準 = 『0.05 ÷ 6』。(0.05/4、0.05/12為錯誤的對數計算。)故選0.05/6。","options":{"A":"0.05為未校正、會膨脹型一錯誤。","B":"0.05/4比較對數錯誤。","C":"四組6對、0.05/6—正解。","D":"0.05/12比較對數錯誤。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_108100-40":{"quick":"病例對照2×2列聯表的關聯檢定,用費雪恰當檢定(或卡方;小細格用Fisher)。","detail":{"background":"病例對照研究中,「吸菸(有/無)」與「疾病(病例/對照)」皆為類別變項,構成2×2列聯表,檢定其關聯應用「卡方檢定」;若樣本小、細格期望值<5則用「『費雪恰當檢定(Fisher’s exact test)』」(本題以Fisher為解,適用列聯表關聯檢定)。獨立/配對t檢定用於連續變項、McNemar用於『配對』2×2(本題為非配對病例對照,故非McNemar)。故選費雪恰當檢定。","options":{"A":"獨立t檢定用於連續變項。","B":"配對t檢定用於連續配對資料。","C":"McNemar用於配對2×2(本題非配對)。","D":"病例對照2×2關聯用費雪恰當檢定—正解。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_111020-36":{"quick":"單因子ANOVA須假設各組母體「變異數相等(同質性)」,敘述最恰當。","detail":{"background":"單因子變異數分析(ANOVA)的假設與性質:①「各組『母體變異數相等(homogeneity of variance)』、常態、獨立」(A正確);②若以兩兩t檢定取代,三組有『3對』比較,Bonferroni校正應為『α/3』(非α/6)(B錯誤);③ANOVA的檢定統計量服從『F分配』(非t分配)(C錯誤);④以迴歸取代時,『三個類別組別應以『虛擬(dummy)變數』表示,不可把1、2、3當成連續數值』(否則假設了等距與線性)(D錯誤)。故A最恰當。","options":{"A":"ANOVA須假設各組母體變異數相等—正解。","B":"三組兩兩比較為3對、應α/3非α/6—錯誤。","C":"ANOVA統計量服從F分配、非t分配—錯誤。","D":"類別組別應用虛擬變數、不可當連續1/2/3—錯誤。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_109020-37":{"quick":"北中南三組男大學生平均身高比較,用變異數分析(ANOVA)。","detail":{"background":"比較「三個(含)以上獨立組別的連續變項平均值」應用「變異數分析(ANOVA)」。本題比較『北、中、南三組』男大學生的『平均身高』,屬三組連續平均比較,故用ANOVA。Z檢定/配對t檢定用於兩組或配對、列聯表用於類別。故選ANOVA。補充:此屬環境衛生監測與標準的範疇,實務上須對照法規容許值(如空氣品質標準、飲用水水質標準、噪音管制標準)綜合判定,並考量暴露時間與敏感族群。","options":{"A":"Z檢定用於單/兩組(已知母體變異)。","B":"三組連續平均比較用變異數分析—正解。","C":"配對t檢定用於配對資料。","D":"列聯表用於類別變項。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_109020-38":{"quick":"配對的病例對照(各配1名對照)比較基因型2×2,用McNemar卡方檢定。","detail":{"background":"本題每位口腔癌『病例』都『配對1名健康對照』,屬「『配對(matched)』設計」,比較『配對組間』的類別(基因型)差異,應使用「『McNemar卡方檢定』」(分析配對的不一致細格)。獨立樣本卡方用於『非配對』2×2;線性迴歸/配對t檢定用於連續變項。故選McNemar。","options":{"A":"線性迴歸用於連續變項。","B":"獨立卡方用於非配對(本題為配對)。","C":"配對t檢定用於連續配對資料。","D":"配對病例對照類別比較用McNemar卡方—正解。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_109020-40":{"quick":"第50百分位數(中位數)適合描述連續資料的集中趨勢,敘述正確。","detail":{"background":"描述統計指標的適用:①「標準誤(SE)」描述『樣本平均的估計精確度』,『不是』描述資料分散(分散用標準差)——A錯誤;②「幾何平均」適合『比率、對數常態(右偏)』連續資料,『不適合類別』——B錯誤;③「標準差」描述『連續資料的分散』,『不能描述類別資料集中趨勢』(類別用眾數/比例)——C錯誤;④「第50百分位數=『中位數(median)』」是『連續資料(尤其偏態)集中趨勢』的穩健指標——D正確。","options":{"A":"標準誤描述估計精確度、非資料分散—錯誤。","B":"幾何平均適合右偏連續、非類別—錯誤。","C":"標準差描述連續分散、非類別集中—錯誤。","D":"第50百分位數(中位數)描述連續資料集中趨勢—正解。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_109020-41":{"quick":"NH3(氨)不屬於溫室效應氣體;N2O、CO2、CH4皆為溫室氣體。","detail":{"background":"主要的「溫室效應氣體(greenhouse gases)」包括:二氧化碳(CO2)、甲烷(CH4)、氧化亞氮/笑氣(N2O)、氟氯碳化物(CFCs/HFCs)、臭氧(O3)與水氣等——它們能吸收紅外線、造成全球暖化。「氨(NH3)」是『鹼性氣體、空氣污染物(惡臭、形成PM)』,『不屬於溫室氣體』。故不屬溫室氣體者為NH3。","options":{"A":"N2O(氧化亞氮)為溫室氣體。","B":"CO2為溫室氣體。","C":"CH4(甲烷)為溫室氣體。","D":"NH3(氨)不屬溫室氣體—正解。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_109100-36":{"quick":"2×2列聯表有細格期望值<5時,用費雪恰當檢定。","detail":{"background":"分析2×2列聯表:①期望值足夠(各細格≥5)用「卡方檢定」;②「『任一細格期望值<5』」時卡方近似不準,應改用「『費雪恰當檢定(Fisher’s exact test)』」精確計算;③Yates校正用於『細格期望值略偏小』的近似修正(現多直接用Fisher);④McNemar用於『配對』2×2。本題期望值<5,故選費雪恰當檢定。","options":{"A":"期望值<5時卡方近似不準。","B":"期望值<5用費雪恰當檢定—正解。","C":"Yates校正為近似修正、Fisher更精確。","D":"McNemar用於配對資料。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_109100-37":{"quick":"女性五年存活率95%CI(0.028,0.202)涵蓋男性的0.15,故男女差異未達統計顯著。","detail":{"background":"以「信賴區間(CI)」判斷顯著性:若要檢定「女性五年存活率是否與男性(已知=15%=0.15)不同」,看『女性的95% CI是否包含0.15』:女性CI為(0.028, 0.202),『0.15落在此區間內』,代表『無法拒絕「兩者相同」的虛無假說』,即「男女五年存活率差異『未達統計顯著』」(B)。CI是『重複抽樣95%會涵蓋母數』,非「5%機率小於下限」;此為比例比較,非用ANOVA。故B正確。","options":{"A":"差異達顯著為錯誤(0.15在CI內)。","B":"0.15在女性CI內、差異未達統計顯著—正解。","C":"CI解讀錯誤(非5%機率小於下限)。","D":"比例比較非用ANOVA。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_109100-39":{"quick":"顯性遺傳每子女得病機率1/2,兩子女皆得病=1/2×1/2=1/4。","detail":{"background":"本題疾病為顯性遺傳,患病親代(雜合子Aa)×正常親代(aa),「每位子女得病機率=1/2」、各子女『獨立』。兩個小孩『皆得病』的機率 = 1/2 × 1/2 = 『1/4』(乘法律,獨立事件)。故為1/4。補充:統計檢定的選擇取決於資料尺度(類別/連續)、組數與是否符合常態與變異數同質假設;違反假設時改用無母數方法,並注意第一型錯誤(α)與檢定力(1-β)的權衡。","options":{"A":"0不正確。","B":"1/2為單一子女得病機率、非兩個皆得病。","C":"兩子女皆得病=1/2×1/2=1/4—正解。","D":"1/8為三個子女皆得病。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_110020-38":{"quick":"A校(94-98)與C校(100-106)的95%信賴區間不重疊,兩校智商有顯著差異。","detail":{"background":"以「95%信賴區間是否重疊」粗略判斷兩組差異:若兩組CI『不重疊』,通常代表差異達統計顯著(p<0.05)。各校CI:A(94-98)、B(98-106)、C(100-106)、D(104-108)。比較:①A vs B(98-106)『邊界相接』、A vs C(100-106)『不重疊』→『A與C有顯著差異』(B選項);②B vs D(104-108)與C vs D皆『重疊』。故有顯著差異者為A校與C校。","options":{"A":"A(94-98)與B(98-106)邊界相接、未明顯不重疊。","B":"A(94-98)與C(100-106)不重疊、有顯著差異—正解。","C":"B(98-106)與D(104-108)重疊。","D":"C(100-106)與D(104-108)重疊。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_110020-43":{"quick":"健康城市重視「過程」而非只看結果,「是結果與過程無關」最不恰當。","detail":{"background":"「健康城市(healthy city)」是WHO推動的健康促進策略:①強調「『是一個『持續的過程』』而非僅是結果——不斷創造與改善物理及社會環境、擴展社區資源」(故A「是結果、與過程無關」最不恰當);②「行動方案依『城市自己的優先次序』」制定;③「城市間相互支持、合作、學習與文化交流」;④「關心世界資源的『公平分配』與永續」。故A最不恰當。","options":{"A":"健康城市是持續過程、非只看結果—錯誤(正解)。","B":"依城市自身優先次序制定方案,正確。","C":"城市間相互支持合作學習,正確。","D":"關心資源公平分配,正確。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_110020-45":{"quick":"使用毒品被查獲非「一律起訴」(可觀察勒戒/緩起訴),故C最不恰當。","detail":{"background":"我國非法藥物(毒品)防制:①毒品危害防制條例分四級,「K他命(愷他命)為『第三級』毒品」(A正確);②「人格特質『外向、追求刺激新奇』的青少年接觸毒品機會較高」(B正確);③「『施用(使用)』第一、二級毒品『初犯』者,『先送『觀察勒戒/戒治』而非一律起訴』(採『醫療/除罪化』導向處遇)』,故C『一律起訴』最不恰當;④「『美沙冬(methadone)替代療法』用於海洛因成癮戒治」(D正確)。故C最不恰當。","options":{"A":"K他命為第三級毒品,正確。","B":"外向追求刺激者接觸毒品機會較高,正確。","C":"施用毒品非一律起訴(可觀察勒戒)—錯誤(正解)。","D":"美沙冬為替代性藥物療法,正確。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_111020-37":{"quick":"迴歸/相關只顯示線性關聯,「可說明因果關係」最不恰當。","detail":{"background":"簡單線性迴歸:①「探討X與Y之間是否有『線性關係』」(A正確);②「依變項Y通常假設為『常態分布』(誤差常態)」(B正確);③「『迴歸(與相關)只能顯示『關聯』,『不能據以說明因果關係』』」(因果需研究設計與時序、排除干擾等)——故C「可說明X與Y的線性『因果』關係」最不恰當;④「『簡單』線性迴歸只處理『單一』自變項」(D正確)。故C最不恰當。","options":{"A":"探討X與Y的線性關係,正確。","B":"依變項Y通常為常態分布,正確。","C":"迴歸不能說明因果關係—錯誤(正解)。","D":"簡單線性迴歸只處理單一自變項,正確。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_111100-36":{"quick":"卡方統計量大小與勝算比大小無必然關係,「卡方越大則OR越大」最不恰當。","detail":{"background":"檢定兩類別變項(吸菸/肺功能)是否相關:①可用「卡方檢定」(A正確);②也可「檢定『勝算比(OR)是否等於1』」(OR=1表無關聯)(B正確);③或「建立OR的95%信賴區間,看是否包含1」(C正確);④但「『卡方統計量的大小』反映『關聯的統計顯著性(受樣本數影響)』,『與OR(關聯強度)的大小『沒有必然的對應』』」——大樣本即使OR接近1也可能卡方很大;故D「卡方越大→OR越大」最不恰當。","options":{"A":"可用卡方檢定關聯,正確。","B":"可檢定OR是否為1,正確。","C":"可用OR的95%CI檢定,正確。","D":"卡方大小與OR大小無必然關係—錯誤(正解)。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_111100-37":{"quick":"相關係數0.6需配合樣本數與檢定才能談顯著,「即可推論顯著正相關」最不恰當。","detail":{"background":"相關係數(correlation coefficient):①「『係數值大小(如0.6)≠統計顯著』——『是否顯著需配合樣本數做假設檢定(看p值)』」,故A「相關0.6即可推論顯著正相關」最不恰當;②「衡量『連續(體重)與序位(薪資低中高)』相關可用『Spearman等級相關』」(B正確);③「Pearson相關=0 表示『無『線性』相關』(可能仍有非線性關係)」(C正確);④「Pearson相關介於−1到1之間」(D正確)。故A最不恰當。","options":{"A":"相關係數值大小不等於顯著(需檢定)—錯誤(正解)。","B":"連續與序位相關用Spearman,正確。","C":"Pearson=0表示無線性相關,正確。","D":"Pearson介於−1到1之間,正確。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_112020-36":{"quick":"本題公告「一律給分」;涉及PCB與IQ的相關/迴歸概念(Pearson、依/自變項、R²)。","detail":{"background":"本題以「100名兒童的IQ(範圍80-140)與產前PCB暴露」資料,考相關與迴歸概念:在因果/暴露研究中,通常以『暴露(PCB)為自變項X、結果(IQ)為依變項Y』;「判定係數R²」表示『可被X解釋的Y變異比例』(R²=0.4則40%可解釋、60%無法解釋);Pearson相關係數的正負反映方向、斜率反映每單位X對應的Y變化。本題經評定後「一律給分(送分)」(選項敘述有歧義)。","options":{"A":"Pearson相關係數正負反映方向(本題送分)。","B":"依/自變項角色(暴露為自變項)。","C":"斜率反映每單位變化(本題送分)。","D":"R²=0.4表40%可被解釋、60%無法解釋(本題送分)。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_112020-37":{"quick":"控制X2後X1與胰臟癌關聯消失,代表X2是干擾因子(confounder)。","detail":{"background":"「干擾因子(confounder)」須同時:①與『暴露(X1)』相關;②是『疾病(胰臟癌)』的獨立危險因子;③不在X1→疾病的因果路徑上。本題:X1暴露者也有較高的X2暴露(X2與X1相關)、X2已知是胰臟癌危險因子,『在統計上『控制X2』後,X1與胰臟癌的關聯『消失』』——表示原本X1的表面關聯是『由X2『干擾』造成』,故X2為「干擾因子」。","options":{"A":"致病因子應在控制後仍有關聯。","B":"X2為干擾因子(控制後X1關聯消失)—正解。","C":"隨機因子非此情境。","D":"促使因子(中介)應在因果路徑上、控制後關聯部分消失但機制不同。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_112020-39":{"quick":"明顯右偏分布用「中位數+四分位距(IQR)」描述集中與分散最適合。","detail":{"background":"資料分布偏態時的描述:①「『右偏(偏態)』分布」中,平均值受『極端大值』拉高、標準差/標準誤亦被影響,『不具代表性』;②應改用『穩健(robust)』指標——「集中趨勢用『中位數(median)』、分散用『四分位距(IQR,Q3−Q1)』」(不受極端值影響)。全距(range)受極端值影響大、標準誤是估計精確度指標。故選「中位數,四分位距」。","options":{"A":"平均值/標準差受右偏極端值影響、不適合。","B":"平均值/標準誤不適合偏態描述。","C":"中位數+四分位距適合右偏資料—正解。","D":"全距受極端值影響大。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_112100-36":{"quick":"預期標準差由12增到16會「增加」所需樣本數(其餘條件則減少樣本)。","detail":{"background":"估算RCT所需樣本數的影響因素:①「『型一誤差α』增大(0.05→0.1)」→所需樣本『減少』;②「『效應值(預期平均差異)』增大(5→10 mmHg)」→『減少』;③「『檢定力power』降低(0.9→0.85)」→『減少』;④「『資料『標準差(變異)』』增大(12→16 mmHg)」→『需要『更多』樣本(變異大、較難偵測差異)』。本題問會使所需樣本『增加』(或不減少)者,即『標準差增加(C)』。故C。","options":{"A":"α增大使所需樣本減少。","B":"效應值增大使所需樣本減少。","C":"標準差增大使所需樣本增加—正解。","D":"檢定力降低使所需樣本減少。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_112100-38":{"quick":"相關係數反映X與Y的「線性相關程度」,最為恰當。","detail":{"background":"相關係數(r):①「反映X與Y的『線性相關程度與方向』」(D正確);②「r『介於−1到+1』(最小為−1非0)」(故C「最小為0」錯誤);③「r為正(0.8>0)時『X越大Y越大』」(故A「X越大Y越小」錯誤,那是負相關);④「『相關不等於因果』,r=0.8不代表X導致Y」(B錯誤)。故D最恰當。","options":{"A":"r=0.8為正、X大Y大(非Y小)—錯誤。","B":"相關不代表因果—錯誤。","C":"r最小為−1、非0—錯誤。","D":"相關係數反映X與Y線性相關程度—正解。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_113090-36":{"quick":"95%CI是「重複抽樣有95%區間涵蓋母數」,非「95%樣本落入該區間」,故B錯誤。","detail":{"background":"信賴區間(confidence interval, CI):①是「『區間估計』方法」(A正確);②「『95% CI』的正確解讀是『若重複抽樣,約95%的『CI區間』會『涵蓋母數真值』』」,『而非「95%的『樣本/觀察值』落在該區間」』——故B錯誤;③「信心水準越低(90%<95%),『區間越窄』」(C正確);④「CI可用來『檢定假說』(看區間是否包含虛無值)」(D正確)。故B最不恰當。","options":{"A":"CI是區間估計方法,正確。","B":"95%CI非「95%樣本落入」、應為95%區間涵蓋母數—錯誤(正解)。","C":"90%CI比95%CI窄,正確。","D":"CI可用於檢定假說,正確。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_113090-37":{"quick":"同一批病人治療前後的疼痛分數比較,用配對t檢定。","detail":{"background":"本題收集『同100位下背痛病人』在『復健治療『前、後』』的疼痛分數(連續變項0-100),評估治療是否改善——屬「『同一受試者前後配對』的連續資料」,應使用「『配對t檢定(paired t-test)』」(分析前後差值)。卡方/McNemar用於類別、雙樣本t檢定用於兩『獨立』組。故選配對t檢定。","options":{"A":"卡方檢定用於類別變項。","B":"McNemar用於配對的類別資料。","C":"雙樣本t檢定用於兩獨立組。","D":"同病人前後比較用配對t檢定—正解。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_113090-39":{"quick":"新藥廣告無對照組,無法宣稱療效,故D最恰當(宣稱可能不恰當因無對照組)。","detail":{"background":"評讀療效宣稱的研究設計:廣告稱「2000名喉嚨痛病人服新藥後第4天94%症狀緩解」——『喉嚨痛多為自限性疾病(不治療也常會自行緩解)』,該研究「『沒有『對照組(安慰劑/不治療)』』」,『無法區分緩解是『藥效』還是『自然病程』』,故『宣稱『可能不恰當,因為缺乏對照組』』(D)。此為比例(緩解率)、非率(rate)/人年的問題。故D最恰當。","options":{"A":"無對照組、宣稱不恰當—錯誤。","B":"問題非缺乏人年的「率」計算。","C":"問題核心非長期反應。","D":"缺乏對照組、無法歸因於藥效—正解。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_113090-40":{"quick":"殘量為原暴露0.125倍=(1/2)³,經過3個半衰期=24×3=72小時。","detail":{"background":"依「半衰期(half-life)」計算:每經過一個半衰期,體內殘量減為原來的1/2。殘量為原暴露量的『0.125 = 1/8 = (1/2)³』,代表「『經過3個半衰期』」;半衰期=24小時,故時間 = 24 × 3 = 『72小時』。補充:環境與職業暴露評估須結合環境監測(濃度)與生物偵測(體內負荷),並以劑量-反應關係與閾值(如PEL/TLV)判定健康風險,必要時採工程控制優先於個人防護。","options":{"A":"42小時不符。","B":"48小時=2個半衰期(殘量1/4)。","C":"0.125=(1/2)³、3個半衰期=72小時—正解。","D":"96小時=4個半衰期(殘量1/16)。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_114020-36":{"quick":"檢定力0.27 = 對立假說為真時,檢定p值小於α(1%)而拒絕H0的機率。","detail":{"background":"統計檢定力(power):①「『檢定力 = 在『對立假說(H1)為真』的情況下,正確『拒絕虛無假說(p<α)』的機率』」——本題power=0.27,即「對立假說為真時,p值<1%(α=0.01)而拒絕H0的機率為0.27」(B正確);②本題「顯著水準是『1%(α=0.01)』」(故A「5%」錯誤);③「『型二錯誤β = 1 − power = 1 − 0.27 = 0.73』」(故D「型二錯誤=0.27」錯誤);④檢定力非「虛無假設的可能性」(C錯誤)。故B正確。","options":{"A":"顯著水準為1%(α=0.01)、非5%—錯誤。","B":"對立假說為真時p<1%而拒絕H0的機率=0.27(檢定力)—正解。","C":"檢定力非虛無假設的可能性—錯誤。","D":"型二錯誤=1−0.27=0.73、非0.27—錯誤。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_114020-37":{"quick":"信賴區間寬度∝1/√n,n=100與225,A的CI寬度為B的1.5倍。","detail":{"background":"信賴區間(CI)寬度與樣本數:CI半寬 ∝ 『標準誤 = σ/√n』,故『寬度與√n成反比』。A抽『n=100』、B抽『n=225』(同母體σ=2、同信心水準),寬度比 = 『√225 / √100 = 15/10 = 1.5』,即「『A的95% CI寬度是B的1.5倍』」(A樣本少、區間較寬)(B正確)。CI是『母數估計區間』而非「95%大學生BMI範圍」(A選項錯);兩者『樣本平均(中點)『不一定相同』』(D錯誤)。故B正確。","options":{"A":"CI是母數估計區間、非「95%個體範圍」—錯誤。","B":"A的CI寬度為B的1.5倍(∝1/√n)—正解。","C":"樣本數不同、CI寬度不會相同—錯誤。","D":"兩研究樣本平均(中點)不一定相同—錯誤。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_114090-37":{"quick":"抽菸與肺活量實際有關(H0獨立為假),若檢定未能拒絕H0則犯型二錯誤。","detail":{"background":"已知抽菸與肺活量『實際有因果關聯(虛無假說H0「兩者獨立」其實為『假』)』。若研究者用小樣本(n=30)做檢定,「若『未能拒絕H0(結論為無關)』」,則是「『實際有差異(H0為假)卻未偵測到』」——即「『型二錯誤(Type II error,偽陰性)』」。型一錯誤是『H0為真卻拒絕』;真陰性/真陽性為正確判斷。故為型二錯誤。","options":{"A":"型一錯誤為H0為真卻拒絕(本題H0為假)。","B":"H0實為假卻未拒絕=型二錯誤—正解。","C":"真陰性為正確判斷。","D":"真陽性為正確判斷。"},"sources":["基礎生物統計學","流行病學原理與方法","Rosner《Fundamentals of Biostatistics》"]}},"med2_106100-39":{"quick":"死亡相對危險性RR =（50/100）/（30/100）= 1.67。","detail":{"background":"相對危險性(relative risk, RR)= 暴露(處理)組的危險 ÷ 對照組的危險。本題密集運動組死亡率=50/100=0.5,一般照護組死亡率=30/100=0.3。「RR = 0.5 / 0.3 = 1.67」——表示密集運動組死亡風險為一般照護的1.67倍(此情境運動組反而較高)。0.60是反向(0.3/0.5)、0.50/0.03為率本身或誤算。故RR=1.67。","options":{"A":"0.60為反向比值(對照/處理)。","B":"0.03非RR。","C":"0.50為運動組死亡率本身。","D":"RR=0.5/0.3=1.67—正解。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_106100-40":{"quick":"逐一即時送驗(甲)因各檢體測量條件/批次不同,較易出現測量誤差。","detail":{"background":"在生物標記研究中,「『同一批檢體在『相同條件下一次批次測量』』可減少『實驗室批次間變異』」造成的測量誤差。醫師乙「先冷凍貯存全部檢體,再於連續幾日由同一批次測完」——測量條件較一致;醫師甲「每收一個病例即『逐次』開單即時檢驗」——『不同時間、不同批次、可能不同試劑/操作』,『較易產生『測量(分類)誤差』』(且病例對照逐次測量也可能引入差異)。選擇偏差關乎研究對象的選取(本題收案方式相同),非測量時機。故甲較易測量誤差(C)。","options":{"A":"甲的收案方式不必然較易選擇偏差。","B":"乙的收案方式不必然較易選擇偏差。","C":"甲逐次即時檢驗、批次條件不一、較易測量誤差—正解。","D":"乙批次統一測量、較不易測量誤差。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_107100-39":{"quick":"OR=2、對照吸菸25%,病例吸菸比例=0.4,400名病例中160名吸菸。","detail":{"background":"病例對照研究中,勝算比(OR)=「病例的暴露勝算 ÷ 對照的暴露勝算」。對照吸菸率25%→對照吸菸勝算=0.25/0.75=1/3。設病例吸菸比例為p,病例吸菸勝算=p/(1−p)。由 OR=[p/(1−p)] ÷ (1/3)=2 → p/(1−p)=2/3 → 3p=2(1−p) → 5p=2 → p=0.4。故400名病例中吸菸者=400×0.4=『160名』。","options":{"A":"100對應吸菸率25%(非病例)。","B":"病例吸菸率0.4、160名—正解。","C":"200對應50%。","D":"240對應60%。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_107100-40":{"quick":"並非所有癌症都適合公費篩檢,「應對各種癌症進行公費篩檢」錯誤。","detail":{"background":"篩檢(screening)觀念:①「公費篩檢『實施當年』,因把潛在(未診斷)病例提早找出,『該癌症發生率通常較往年上升』」(A正確);②「子宮頸抹片可有效『降低子宮頸癌死亡率』」(B正確,符合篩檢效益);③「慢性病的『盛行率 > 發生率』(盛行率=發生率×病程)」(C正確);④「『並非所有癌症都適合篩檢』——須符合Wilson準則(重要疾病、有有效療法、有準確可接受的篩檢工具、符合成本效益等),『不應對「各種」癌症一律公費篩檢』」(D錯誤)。故D錯誤。","options":{"A":"篩檢首年發生率通常上升,正確。","B":"子宮頸抹片降低子宮頸癌死亡率,正確。","C":"盛行率高於發生率,正確。","D":"非各種癌症都應公費篩檢—錯誤(正解)。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_107100-48":{"quick":"同時納入「個體」與「群體」分析單位(多層次)可避免生態謬誤。","detail":{"background":"「生態謬誤(ecological fallacy)」是『以『群體(聚集)』層級的關聯,錯誤推論到『個體』』的偏誤(群體相關不等於個體相關)。社會流行病學的「『多層次(multilevel)』研究設計」同時納入「『個體』與『群體』的分析單位」,可分別估計個體與脈絡效應,從而『避免生態謬誤』。辛普森詭論、選擇偏誤、干擾偏誤是其他問題。故為生態謬誤。","options":{"A":"辛普森詭論為分層合併的矛盾,非此設計主要避免者。","B":"多層次設計避免生態謬誤—正解。","C":"選擇偏誤關乎對象選取。","D":"干擾偏誤需控制干擾因子。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_108030-41":{"quick":"以鄉鎮市區的群體聚集資料(無個人資料)分析空污與癌症,屬生態學研究。","detail":{"background":"「生態學研究(ecological study)」的『分析單位是『群體(如鄉鎮、縣市、國家)』而非個人』,使用『聚集(aggregate)資料』比較群體層級的暴露與疾病關聯。本題以「各鄉鎮市區」的空污(環保署)與癌症發生(衛福部)『群體資料、無個人生活資料』分析關聯,正是生態學研究(其結論不可直接推論到個體,以免生態謬誤)。個案報告、病例對照、世代研究皆以個人為分析單位。","options":{"A":"個案報告為單一/少數病例描述。","B":"以群體聚集資料分析、屬生態學研究—正解。","C":"病例對照以個人暴露回溯。","D":"世代研究以個人前瞻追蹤。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_108030-50":{"quick":"新藥昂貴的影響因素中,「生產製造成本」相對較小。","detail":{"background":"原開發廠新藥售價昂貴的主因:①龐大的「研究與發展(R&D)費用」(含大量失敗藥物的成本);②「臨床試驗花費」(三期試驗極昂貴);③「專利權保護」期間的『獨占訂價』(回收研發成本)。相對而言,「『實際生產製造的成本』通常較低」,對訂價的影響『較小』(這也是專利到期後學名藥可大幅降價的原因)。故影響較小者為生產製造成本。","options":{"A":"研發費用影響大。","B":"專利保護(獨占)影響大。","C":"臨床試驗花費影響大。","D":"生產製造成本影響較小—正解。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_108100-41":{"quick":"年齡別死亡率相同則年齡標準化死亡率必相同(本題B、D均給分)。","detail":{"background":"死亡率比較:①「『年齡別(各年齡層)死亡率完全相同』」時,『年齡『標準化』死亡率必相同』(以同一標準人口加權,各層率相同則加權結果相同)(B正確);②「『粗死亡率』受『人口年齡結構』影響,『不一定相同』」(故A「必定相同」錯誤;人口較老的地方粗死亡率較高,故C「甲較老則粗率小於乙」也錯誤——應較大);③兩地年齡別率既完全相同,則『標準化死亡率差異恆為0,不隨標準人口組成而變』(D亦正確)。本題公告「B、D均給分」。","options":{"A":"粗死亡率受年齡結構影響、不一定相同—錯誤。","B":"年齡別率相同則標準化死亡率必相同—正解。","C":"甲較老化則粗死亡率較大(非較小)—錯誤。","D":"差異恆為0、不隨標準人口而變(本題判給分)。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_109020-39":{"quick":"AA基因型使藥物反應不同,扮演「效應修飾因子(effect modifier)」。","detail":{"background":"「效應修飾因子(effect modifier)」是『會使『暴露-結果關聯的強度因該因子層級不同而改變』』的變項。本題「具AA基因型者『對相同藥物的反應較佳(藥效在不同基因型間不同)』」——基因型『修飾』了藥物的效果,屬「修飾因子(effect modifier)」(藥物基因體學的概念)。干擾因子是會扭曲關聯需控制者、與此不同。故為修飾因子。","options":{"A":"干擾因子會扭曲關聯需控制、非此。","B":"拮抗因子非標準流行病學名詞。","C":"AA基因型修飾藥物效應、為修飾因子—正解。","D":"分化因子非此情境名詞。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_109020-48":{"quick":"墮胎率不是WHO健康城市的健康指標;低出生體重、嬰兒死亡率、總死亡率是。","detail":{"background":"WHO「健康城市」的健康指標多反映人口健康與環境品質,例如『總死亡率、嬰兒死亡率、低出生體重比率、平均餘命、可避免死亡、空氣品質、綠地比例』等。「墮胎率(相對於活產)」並非WHO健康城市的標準健康指標。故不是者為墮胎率。補充:健康行為改變理論在衛生教育介入設計中,須對應目標族群所處的改變階段與影響層面(個人/人際/社區/政策),選擇合適策略以提升介入成效並維持行為。","options":{"A":"低出生體重比率為健康城市指標。","B":"嬰兒死亡率為健康城市指標。","C":"墮胎率非WHO健康城市健康指標—正解。","D":"總死亡率為健康城市指標。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_109100-38":{"quick":"持續觀察無肺癌者、依暴露(吸菸與否)前瞻追蹤發病,屬世代研究。","detail":{"background":"「世代(cohort)研究」是『依『暴露狀態』選取一群『尚無結果(無肺癌)』的人,『前瞻追蹤』一段時間,比較不同暴露組的『發生率』』。本題「觀察1400名『無肺癌者』5年,比較『700名吸菸者』與『700名不吸菸者』的肺癌發生」——正是世代研究(可算發生率與相對危險)。病例對照(由結果回溯暴露)、生態研究(群體資料)、橫斷式(同一時點)皆不符。","options":{"A":"依暴露前瞻追蹤發病、屬世代研究—正解。","B":"病例對照由結果回溯暴露。","C":"生態研究用群體資料。","D":"橫斷式於同一時點調查。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_109100-40":{"quick":"以縣市群體資料推論個體香菸與冠心症關係,須注意生態謬誤。","detail":{"background":"本題以「『各縣市(群體)』的『年平均香菸攝取量』與『冠心症發生率』」的群體層級正相關,『推論到個體』(高香菸攝取者較易冠心症)——須特別注意「『生態謬誤(ecological fallacy)』」:群體層級的關聯『不一定』反映個體層級的真實關係(可能受縣市人口結構等混雜)。家族聚集、共同感染、世代效應非此群體推論的核心問題。故為生態謬誤。","options":{"A":"以群體資料推論個體、須注意生態謬誤—正解。","B":"家族聚集非此核心問題。","C":"共同感染非此核心問題。","D":"世代效應非此核心問題。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_109100-41":{"quick":"解壓速度時快時慢屬隨機誤差,無法保證得到真正血壓值。","detail":{"background":"測量誤差分:①「系統誤差(偏差bias)」——有方向性、可重現(如儀器固定偏高);②「『隨機誤差(random error)』」——『無方向、忽大忽小、不可預測』,降低『精確度(precision)』。本題醫師袖帶解壓速度「『有時快、有時慢(不一致)』」屬『隨機誤差』,使單次測值『無法保證得到真正血壓值』(雖多次平均可趨近真值,但單次不保證)。選擇偏差/回憶偏差關乎研究對象與資料蒐集、非此。故D正確。","options":{"A":"非選擇偏差(關乎對象選取)。","B":"非回憶偏差。","C":"隨機誤差使單次未必得真值(非「機會大」)。","D":"解壓速度不一致為隨機誤差、無法保證得真值—正解。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_110020-36":{"quick":"病例對照研究相較世代研究,較易產生選擇(與回憶)偏差。","detail":{"background":"病例對照(case-control)vs世代(cohort)研究:病例對照「由『結果(病例/對照)』回溯『暴露』」,優點是『省時、省樣本、適合稀有疾病與長潛伏期』;但缺點是「『較易產生『選擇偏差(對照選取不當)』與『回憶偏差(回溯暴露)』』,且不易直接算發生率」。需要『更長時間、更多樣本』的是『世代研究』。故病例對照的缺點為易產生選擇偏差(A)。","options":{"A":"病例對照較易產生選擇偏差—正解。","B":"需更長時間者為世代研究。","C":"需更多樣本者為世代研究。","D":"病例對照可探討多重病因(無此缺點)。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_111100-38":{"quick":"世代研究相較病例對照,最大優點是較能建構暴露在前、疾病在後的時序關係。","detail":{"background":"世代(cohort)研究「由『暴露』前瞻追蹤到『結果』」,因此「『暴露『先於』疾病的『時序關係(temporality)』明確』」——這是判斷因果的重要條件,也是世代研究『相對病例對照的最大優點』;此外可直接算發生率與相對危險、可同時看多種結果。病例對照才『適合稀有疾病、時間短、樣本少』。故世代研究最大優點為「較可建構時序關係」。","options":{"A":"適用稀有疾病為病例對照優點。","B":"研究時間短為病例對照優點。","C":"世代研究較可建構時序關係—正解。","D":"樣本較少為病例對照優點。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_111100-47":{"quick":"青少年藥物濫用防制首重減少菸酒使用(入門物質),最為恰當。","detail":{"background":"青少年成癮性物質使用:①「物質成癮『與遺傳因子『有』關聯』」(故A「應無關聯」錯誤);②「『菸、酒常為『入門(gateway)物質』』,『防制策略首重減少青少年菸酒的使用』」(B正確);③「男女青少年使用成癮物質的盛行率『差距『縮小』』」(故C「差距越來越大」錯誤);④「『父母社經地位『與』青少年菸品使用盛行率『有關』』」(故D「無關」錯誤)。故B最恰當。","options":{"A":"物質成癮與遺傳因子有關—錯誤。","B":"防制首重減少青少年菸酒使用—正解。","C":"男女盛行率差距縮小、非擴大—錯誤。","D":"父母社經與青少年菸品使用有關—錯誤。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_112020-38":{"quick":"以各國群體的乳癌率與高血脂率正相關推論個體因果,屬生態謬誤。","detail":{"background":"本題以「『各國(群體)』的『乳癌發生率』與『女性高血脂盛行率』正相關」,『推論『個體』:女性高血脂容易導致乳癌』——這是把『群體層級的關聯錯誤推論到個體』的「『生態謬誤(ecological fallacy)』」(群體相關可能受人口結構、其他因子混雜,不代表個體因果)。型一錯誤、訊息偏差、干擾雖可能存在,但此推論最核心的問題是『以群體資料推論個體』的生態謬誤。","options":{"A":"型一錯誤為偽陽性、非此推論核心。","B":"以群體資料推論個體=生態謬誤—正解。","C":"訊息偏差關乎測量分類。","D":"干擾為混雜因子、非此推論的核心命名。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_112100-37":{"quick":"甲粗發生率高但年齡標準化後較低,代表甲地人口較老化。","detail":{"background":"「粗發生率」受『人口年齡結構』影響,「年齡標準化發生率」則排除年齡結構影響後比較。本題「甲地『粗』發生率 > 乙地,但『年齡標準化』發生率 甲 < 乙」——表示『甲地粗率高是因為『人口較老化(老年人多、心血管疾病本就多)』,而非各年齡層的真實風險較高;標準化(校正年齡)後甲反而較低』。故甲地『人口老化程度高於乙地』(C)。","options":{"A":"標準化後甲較低、危險因子不必然較多—錯誤。","B":"死亡分率非此題重點。","C":"甲地人口老化程度高於乙地—正解。","D":"盛行率非此題比較重點。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_112100-39":{"quick":"評估一個國家健康水平最常用的指標之一是嬰兒死亡率。","detail":{"background":"「嬰兒死亡率(infant mortality rate,未滿1歲死亡數/活產數×1000)」是『反映一個國家整體健康水平、醫療照護、營養與社會經濟狀況的『敏感且常用指標』』(與平均餘命並列為國際健康比較的核心指標)。流產率、總生育率(反映生育水準)、離婚率非評估『健康水平』的標準指標。故為嬰兒死亡率。","options":{"A":"流產率非評估國家健康水平的標準指標。","B":"嬰兒死亡率為評估國家健康水平常用指標—正解。","C":"總生育率反映生育水準、非健康水平。","D":"離婚率為社會指標、非健康水平。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_112100-45":{"quick":"「找出高血脂病人給予治療」屬個體(高風險)取向,非群體取向,最不恰當。","detail":{"background":"預防策略兩取向:①「『個體(高風險)取向』」——『找出『高風險個體』給予個別介入』(如找高血脂病人治療);②「『群體取向(Rose的人群策略)』」——『移動『整個族群』的暴露分布(風險因子平均值)』,如『減少全人群鹽分攝取、增加學童戶外活動、禁止菸品廣告』等政策。本題問『群體取向』的例子,而「『找出高血脂病人給予治療』屬『個體/高風險取向』」,故B最不恰當(不屬群體取向)。","options":{"A":"減少整體人群鹽分攝取為群體取向。","B":"找出高血脂病人治療屬個體取向、非群體取向—錯誤(正解)。","C":"增加學童戶外活動為群體取向。","D":"禁止菸品廣告為群體取向政策。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_114090-36":{"quick":"配對技巧可用於世代研究與病例交叉設計,「不適用於世代與病例交叉」錯誤。","detail":{"background":"配對(matching):①「病例對照研究中把病例與對照的『年齡、性別』配對,可『提高研究效率(控制這些因子)』」(A正確);②「『密度配對(density matching)』除年齡性別等外,『另加入『時間(風險集合中同時點)』做配對』」(B正確);③「配對使病例與對照在配對因子上『具可比性』——『此技巧『亦可用於世代研究與病例交叉設計』』」(故C「不適用於世代與病例交叉」錯誤);④「『被配對的因子(如年齡)的『主效果無法再估計(被移除)』,只能估計其他因子』」(D正確)。故C錯誤。","options":{"A":"病例對照配對年齡性別可增效率,正確。","B":"密度配對加入時間配對,正確。","C":"配對亦可用於世代與病例交叉、非不適用—錯誤(正解)。","D":"配對後該因子主效果無法估計,正確。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_114090-38":{"quick":"病例對照只能算暴露勝算,腎癌病例吸菸勝算(800/357)大於對照(713/444)最恰當。","detail":{"background":"病例對照研究『由結果(病例/對照)回溯暴露』,『不能直接計算發生率或相對危險(RR)』,只能算「勝算(odds)與勝算比(OR)」。「『暴露勝算 = 暴露人數 / 未暴露人數』」:腎癌病例吸菸勝算=800/357(非800/1157=吸菸占全部的『比例』);對照(無癌住院者)吸菸勝算=713/444。若『病例的吸菸勝算 > 對照的吸菸勝算 即(800/357)>(713/444)』,表示吸菸與腎癌正相關(C正確)。A、D把資料當成可算發生率/RR為錯;B把勝算寫成比例(800/1157)為錯。故C最恰當。","options":{"A":"病例對照不能算發生率—錯誤。","B":"勝算為800/357(非800/1157的比例)—錯誤。","C":"病例吸菸勝算(800/357)>對照(713/444)—正解。","D":"病例對照不能算相對危險—錯誤。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_114090-39":{"quick":"酗酒在分層的RR不同(修飾)、且合併後RR改變(干擾),故既是干擾也是修飾因子。","detail":{"background":"判斷酗酒對「抽菸-口腔癌」關聯的角色:①「『效應修飾(effect modification)』」——在不同分層中『關聯強度不同』:有酗酒者抽菸RR=4、無酗酒者RR=2(『分層RR不同』→酗酒是『修飾因子』);②「『干擾(confounding)』」——『合併(忽略分層)後的RR(=1)與分層RR(4、2)『明顯不同(被扭曲)』』→酗酒也是『干擾因子』。故酗酒「『既是干擾因子,也是修飾因子』」(C)。","options":{"A":"分層RR不同代表也是修飾因子(非僅干擾)。","B":"合併RR與分層不同代表也是干擾因子(非僅修飾)。","C":"酗酒既是干擾因子也是修飾因子—正解。","D":"兩者皆符合、非「皆非」。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_115020-36":{"quick":"依職場暴露前瞻追蹤員工發生肝癌,屬世代研究。","detail":{"background":"本題「某公司3000名員工自1980年起『定期(每三年)健康檢查並追蹤』,以找出是否罹患肝癌,並探討『肝癌與接觸油漆暴露』的關係」——是『依暴露(接觸油漆)『前瞻追蹤』一群人到結果(肝癌)』,屬「『世代研究(cohort study)』」(職業世代)。隨機對照試驗需『隨機分配介入』、病例對照『由結果回溯』、橫斷性研究『單一時點』,皆不符。故為世代研究。","options":{"A":"隨機對照試驗須隨機分配介入。","B":"依暴露前瞻追蹤發病、屬世代研究—正解。","C":"病例對照由結果回溯暴露。","D":"橫斷性研究於單一時點。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_115020-37":{"quick":"探討交互作用的主要目的是看疾病發生率是否受「兩個以上危險因子」共同影響。","detail":{"background":"「交互作用(interaction / effect modification)」指『兩個(以上)因子『共同作用』時,對疾病的效果『不等於各自單獨效果的相加(或相乘)』』——即一個因子的效果『隨另一因子的層級而改變』。因此探討交互作用的『最主要目的』是『了解疾病發生率是否受『兩個以上危險因子』的『共同(交互)』影響』(C)。干擾因子、中介因子是不同概念(干擾需控制、中介在因果路徑上)。","options":{"A":"干擾因子影響非交互作用的主旨。","B":"中介因子在因果路徑上、非交互作用主旨。","C":"探討兩個以上危險因子的共同(交互)影響—正解。","D":"非同時針對危險/干擾/中介。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_115020-38":{"quick":"「每百名學童齲齒人數」是盛行率而非發生率,推論發生率不適當。","detail":{"background":"「發生率(incidence)」是『一段期間內『新發生』病例數 / 風險人口』,需『追蹤觀察新病例』;「盛行率(prevalence)」是『某時點『現有(新+舊)』病例數 / 總人口』,為『橫斷式調查所得』。本題「對一年級學童『調查』發現『每百名男童24人、女童12人有齲齒』」——這是『某時點的『盛行率』』(現存齲齒,含過去累積),『不是發生率』,故『推論「男童齲齒『發生率』是女童2倍」不適當』(B)。是否年齡調整、總人數、統計檢定非此推論的最主要問題。","options":{"A":"比例本身已給(每百名)、非主因。","B":"此為盛行率而非發生率—錯誤推論的主因(正解)。","C":"同為一年級、年齡調整非主因。","D":"是否統計檢定非此推論不當的核心。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_115020-39":{"quick":"要釐清基因型與口腔癌關聯是否因抽菸而不同,應檢定抽菸與基因型的交互作用。","detail":{"background":"研究者懷疑「『基因型-口腔癌』的關聯『因『抽菸狀態』不同而不一樣』」——這正是「『效應修飾/交互作用(interaction)』」的問題。最能解決此疑問的處理是「『檢定『抽菸 × 基因型』對口腔癌的『交互作用』(如在迴歸模型中加入交互作用項,或做分層分析)』」(A)。『把抽菸只當『調整變項』放入模型』是控制『干擾』、無法回答『效應是否被修飾』(B不足);基因型判讀偏差、增加樣本數非此問題核心。故A最能解決。","options":{"A":"檢定抽菸與基因型的交互作用—正解。","B":"只把抽菸當調整變項是控制干擾、不能回答交互作用—不足。","C":"基因型判讀偏差非此問題核心。","D":"增加樣本數不能回答效應修飾問題。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_107100-38":{"quick":"敏感度=「有該疾病的人中,檢查結果為陽性」的比例。","detail":{"background":"診斷檢驗效度指標:①「『敏感度(sensitivity)』= 『有病者中檢查為『陽性』的比例』(真陽性率,抓出病人的能力)」;②「特異度(specificity)= 無病者中檢查為陰性的比例」;③「陽性預測值(PPV)= 檢查陽性者中真正有病的比例」;④陰性預測值(NPV)= 檢查陰性者中真正無病的比例。本題問敏感度,即「有病者中檢查陽性的機率」(C)。","options":{"A":"陽性者中有病的機率為陽性預測值。","B":"陰性者中無病的機率為陰性預測值。","C":"有病者中檢查陽性的機率=敏感度—正解。","D":"無病者中檢查陰性的機率為特異度。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_108030-39":{"quick":"平行(同時)檢定任一陽性即陽性,使淨敏感度增加(但特異度下降)。","detail":{"background":"多項檢驗的組合:①「『平行(同時)檢定(simultaneous/parallel testing)』——『任一項陽性即判為陽性』」,使「『淨敏感度『增加』(較不易漏掉病人)』」,但『淨特異度『下降』、偽陽性率『增加』』;②「『系列(連續)檢定(serial testing)』——『全部陽性才判陽性』」,使『淨特異度增加、敏感度下降』。本題平行檢定→『淨敏感度增加』(A);選項B(特異度增加)、C/D方向需一致判斷:平行檢定使特異度『減少』、偽陽性率『增加』,故正解為A(淨敏感度增加)。","options":{"A":"平行檢定使淨敏感度增加—正解。","B":"平行檢定使淨特異度減少(非增加)。","C":"淨特異度減少敘述方向對、但題以A為正解(敏感度增加)。","D":"偽陽性率增加敘述方向對、但本題標準答案為A。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_108030-47":{"quick":"我國衛福部定義成人肥胖的BMI切點為27(BMI≥27為肥胖)。","detail":{"background":"我國衛生福利部對成人(18歲以上)體位的BMI(kg/m²)分類:『過輕 <18.5、正常 18.5-24、過重 24-27、『肥胖 ≥27』』(24-27為過重、≥27為肥胖;另腰圍男≥90/女≥80cm為腹部肥胖)。故我國成人『肥胖』BMI切點為『27』。(此與WHO的≥30略有不同,因亞洲族群在較低BMI即有較高代謝風險。)","options":{"A":"25為WHO過重切點、非我國肥胖切點。","B":"我國成人肥胖BMI切點為27—正解。","C":"29非定義切點。","D":"31非定義切點。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_109020-36":{"quick":"把判定切點由7提高到8.5,偽陽率下降、敏感度也下降。","detail":{"background":"以某連續指標(古丁尼)『大於切點』判為陽性(抽菸):①『切點『提高(7→8.5)』』使判為陽性的門檻變嚴,『被判陽性的人變少』;②對『無病(不抽菸)者』,較少被誤判陽性→『偽陽性率『下降』、特異度上升』;③對『有病(抽菸)者』,也較多被漏判(判為陰性)→『敏感度『下降』』。故提高切點使『偽陽率下降、敏感度下降』(A)(敏感度與特異度的取捨trade-off)。","options":{"A":"提高切點使偽陽率下降、敏感度下降—正解。","B":"敏感度應下降(非上升)。","C":"偽陽率應下降(非上升)。","D":"兩者方向皆相反。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_111020-38":{"quick":"體脂率越高乳癌風險越高,符合因果判斷的「劑量效應」條件。","detail":{"background":"Bradford Hill因果判斷準則中,「『劑量效應(dose-response / biological gradient)』」指『暴露量(劑量)越高,疾病風險越高(呈梯度關係)』。本題「『女性『體脂率『越高』』則乳癌風險『越高』』」正符合『劑量(體脂率)-效應(乳癌風險)梯度』。相關特異性、時序性(暴露先於疾病)、生物學合理性是其他不同的準則。故為劑量效應。","options":{"A":"相關特異性指一因一果的專一性。","B":"時序性指暴露先於疾病。","C":"劑量越高風險越高=劑量效應—正解。","D":"生物學合理性指機轉合理。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_113090-38":{"quick":"兩種檢驗任一陽性即判陽性(平行檢定),主要目的是增加檢驗敏感度。","detail":{"background":"「『任一次檢驗陽性即定義為陽性』」屬「『平行(同時)檢定(parallel testing)』」:其效果是「『增加淨敏感度(較不易漏掉真正感染者)』」,代價是『特異度下降、偽陽性增加』。在『新興傳染病爆發初期』,優先『不要漏掉病例(高敏感度以利防疫)』,故採此策略主要目的是『增加檢驗敏感度』(A)。若要同時增敏感度與特異度需更好的檢驗本身,單靠組合無法。故為增加敏感度。","options":{"A":"任一陽性即陽性(平行)增加敏感度—正解。","B":"平行檢定使特異度下降(非增加)。","C":"組合無法同時增敏感度與特異度。","D":"並非維持不變(會改變)。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_114020-38":{"quick":"A族群偽陽性占陽性比例較高(陽性預測值較低),最可能因A族群乳癌盛行率較低。","detail":{"background":"「『陽性預測值(PPV)= 陽性者中真正有病的比例』」受『疾病盛行率』影響:『盛行率越低,PPV越低,『偽陽性占陽性的比例越高』』(即使敏感度、特異度相同)。本題「A族群『偽陽性占所有陽性的比例』明顯高於B族群」(即A的PPV較低),在篩檢工具相同(敏感度特異度相近)、年齡類似下,『最可能是『A族群的乳癌『盛行率』明顯低於B族群』』(C)。特異度/敏感度是篩檢工具本身性質(同工具不因族群而異);發生率高反而會使PPV升高。故C最恰當。","options":{"A":"同一篩檢工具特異度不因族群而異—不恰當。","B":"同一工具敏感度不因族群而異—不恰當。","C":"A族群乳癌盛行率較低使偽陽性占比高(PPV低)—正解。","D":"發生率高會使PPV升高(與題述相反)—不恰當。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_114020-47":{"quick":"新生兒篩檢屬三段五級中的第三級(早期診斷、早期治療)。","detail":{"background":"三段五級預防:①『初段預防』含『第一級(健康促進)』與『第二級(特殊保護,如疫苗)』;②『次段預防』即『第三級(早期診斷、早期治療,如篩檢)』;③『三段預防』含『第四級(限制殘障)』與『第五級(復健)』。「『新生兒篩檢(如先天代謝異常、聽力篩檢)』」目的是『早期發現、早期治療以避免不可逆損害』,屬『『第三級(早期診斷早期治療)』』預防。故為第三級。","options":{"A":"第一級為健康促進。","B":"第二級為特殊保護(疫苗)。","C":"新生兒篩檢屬第三級(早期診斷早期治療)—正解。","D":"第四級為限制殘障。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_115020-43":{"quick":"篩檢陽性者中真正有病的比例稱「陽性預測值」(非敏感度),故C最不適當。","detail":{"background":"篩檢(screening)觀念:①「對『盛行率高』的族群篩檢,效率(PPV)較高」(A正確);②「篩檢『只把受檢者初步『區分為『可能有病/可能沒病』』』,『不是診斷』(陽性者須進一步確診)」(B正確);③「『篩檢陽性者中『真正有病』的比例』是『『陽性預測值(PPV)』』,『不是『敏感度』』(敏感度是『有病者中陽性的比例』)」——故C錯誤;④「篩檢『較適用於『無明顯相關症狀』的人(早期發現)』」(D正確)。故C最不適當。","options":{"A":"對盛行率高族群篩檢效率較高,正確。","B":"篩檢只區分可能有病/沒病、非診斷,正確。","C":"陽性者真正有病比例為陽性預測值、非敏感度—錯誤(正解)。","D":"篩檢適用於無明顯症狀者,正確。"},"sources":["流行病學原理與方法","Gordis《Epidemiology》","公共衛生學"]}},"med2_106100-41":{"quick":"水中「硝酸鹽(nitrate)」會造成嬰幼兒藍嬰症(變性血紅素血症)。","detail":{"background":"「藍嬰症(methemoglobinemia,變性血紅素血症)」由飲水中過高的「『硝酸鹽(nitrate, NO3⁻)』」造成:嬰幼兒腸道細菌把硝酸鹽還原為『亞硝酸鹽(nitrite)』,後者把血紅素的Fe²⁺氧化成Fe³⁺形成『變性血紅素(methemoglobin)』,失去攜氧能力,造成組織缺氧、發紺(皮膚發藍)。常見於受農業施肥/化糞池污染的井水。硫酸鹽、磷酸鹽、碳酸鹽不致藍嬰症。故為硝酸鹽。","options":{"A":"硫酸鹽不致藍嬰症。","B":"硝酸鹽(經還原為亞硝酸鹽)致藍嬰症—正解。","C":"磷酸鹽不致藍嬰症。","D":"碳酸鹽不致藍嬰症。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_106100-42":{"quick":"紅外線屬非游離輻射;宇宙射線、X光、γ射線為游離輻射。","detail":{"background":"輻射依能量能否使原子游離分:①「『游離輻射(ionizing radiation)』」——能量高,可打掉電子使原子游離、破壞DNA(致癌),如『α、β、γ射線、X光、宇宙射線』與中子;②「『非游離輻射(non-ionizing radiation)』」——能量低,不足以游離,如『紅外線、可見光、紫外線(較低能)、微波、無線電波』。本題『紅外線(infrared)』屬非游離輻射;宇宙射線、X光、γ射線皆游離輻射。故非游離輻射為紅外線。","options":{"A":"宇宙射線為游離輻射。","B":"X光為游離輻射。","C":"γ射線為游離輻射。","D":"紅外線為非游離輻射—正解。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_106100-43":{"quick":"離子交換屬化學處理;過濾、浮除、磁性分離為物理處理。","detail":{"background":"廢棄物/廢水處理分:①「『物理處理』」——以物理方法分離,如『過濾(filtration)、沉澱、浮除(flotation)、磁性分離(magnetic separation)、篩分、吸附』;②「『化學處理』」——以化學反應去除,如『中和、氧化還原、混凝、『離子交換(ion exchange)』、化學沉澱』;③「生物處理」——活性污泥、厭氧消化等。「離子交換」以樹脂交換離子,屬『化學處理』,不屬物理處理。故為離子交換。","options":{"A":"離子交換屬化學處理、非物理處理—正解。","B":"過濾為物理處理。","C":"浮除為物理處理。","D":"磁性分離為物理處理。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_107100-42":{"quick":"自來水加氯消毒的副產物主要為氯與水中「有機物」作用所生成。","detail":{"background":"自來水以「加氯(chlorination)消毒」可殺菌、並維持配水管網的『殘餘氯』保護;但氯會與水中的「『天然有機物(腐植質等)』」反應,生成「『消毒副產物』如三鹵甲烷(THMs)、鹵乙酸(HAAs)」等(部分為疑似致癌物)。砷、鉛、硝酸鹽是其他水污染物,非消毒副產物的前驅物。故消毒副產物主要來自氯與『有機物』作用。","options":{"A":"氯與水中有機物作用產生消毒副產物—正解。","B":"砷為水中污染物、非消毒副產物前驅物。","C":"鉛為金屬污染物。","D":"硝酸鹽致藍嬰症、非消毒副產物前驅物。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_107100-43":{"quick":"空氣污染指標PSI由SO2、CO、O3、NO2、PM10五種污染物濃度計算。","detail":{"background":"舊版「空氣污染指標(Pollutant Standards Index, PSI)」依五種污染物的濃度換算最大值:「『SO2(二氧化硫)、CO(一氧化碳)、O3(臭氧)、NO2(二氧化氮)、PM10(懸浮微粒)』」。現行已改為「空氣品質指標(AQI)」,另納入『PM2.5』。故PSI對應SO2、CO、O3、NO2、PM10(D)。","options":{"A":"SO3/不含正確組合。","B":"含CO2、O2非PSI污染物。","C":"含O2、NO3、PM1.0非PSI污染物。","D":"SO2、CO、O3、NO2、PM10—正解。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_107100-44":{"quick":"臭氧是光化學反應生成的二級污染物,「直接排放的一級污染物」錯誤(本題A、D均給分)。","detail":{"background":"近地面(對流層)臭氧(O3):①「是『二級(衍生)污染物』——由『一級污染物(NOx、VOCs)』在『陽光照射』下經『光化學反應』生成』」,『非污染源直接排放』(故A錯誤);②「『夏天午後』日照強、光化學反應旺盛,臭氧濃度較高,『工業/都會區』更明顯」(B正確);③「『平流層』臭氧層稀薄會使更多紫外線到地表(增加UV暴露)」(C正確);④臭氧本身對呼吸道有害,『不應用於室內空氣品質改善(臭氧機反而有害)』(故D亦判錯誤)。本題公告「A、D均給分」。","options":{"A":"臭氧為二級污染物、非直接排放的一級污染物—錯誤(正解)。","B":"夏天午後臭氧濃度較高,正確。","C":"平流層臭氧稀薄增加UV暴露,正確。","D":"臭氧有害、不應用於室內空品(本題判給分)。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_107100-45":{"quick":"IARC將「人類流病資料不足、動物資料有限」的可能致癌物列為第2B類。","detail":{"background":"國際癌症研究機構(IARC)致癌物分類:①「『Group 1』——確定對人類致癌(人類證據充分)」;②「『Group 2A』——很可能致癌(人類證據有限、動物充分)」;③「『Group 2B』——『可能致癌(人類證據有限或不足、動物有限)』」;④「『Group 3』——無法分類(證據不足)」。本題「『流病資料不充分『且』動物資料『有限』』」對應『Group 2B』。故為2B。","options":{"A":"Group 1為人類證據充分。","B":"Group 2A為動物充分、人類有限。","C":"Group 2B(人類不足、動物有限)—正解。","D":"Group 3為無法分類。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_107100-46":{"quick":"致癌(基因毒性)效應假設「無閾值」,「致癌與非致癌皆有閾值」錯誤。","detail":{"background":"劑量反應評估:①「『致癌性』與『非致癌性』效應應『分開描述』」(A正確);②「『致癌(尤基因毒性)效應『假設『無閾值(non-threshold)』』』——即任何劑量都有風險,以『斜率因子』量化『風險』」(C正確);「『非致癌效應『有閾值(threshold)』』——『閾值以下不致顯著損害』,以『參考劑量(RfD)』評估」(D正確);③故B「『致癌『與非致癌』效應『皆』有閾值」錯誤(致癌假設無閾值)。故B錯誤。","options":{"A":"致癌與非致癌分開描述,正確。","B":"致癌效應假設無閾值、非皆有閾值—錯誤(正解)。","C":"致癌效應以風險呈現,正確。","D":"(非致癌)閾值以下不致顯著損害,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_108030-42":{"quick":"造成酸雨的主要是「硫氧化物與氮氧化物」(③④)。","detail":{"background":"「酸雨(acid rain)」主要由「『硫氧化物(SOx,如SO2)』與『氮氧化物(NOx)』」在大氣中與水氣反應生成『硫酸與硝酸』、隨降水落下(pH<5.6)所致;來源為燃煤、工業與車輛排放。一氧化碳(CO,有毒但非酸雨主因)、臭氧(二級污染物)非酸雨成因。故為③硫氧化物④氮氧化物(僅34)。","options":{"A":"①CO②臭氧非酸雨主因。","B":"含①②不正確。","C":"③硫氧化物④氮氧化物造成酸雨—正解(僅34)。","D":"含②臭氧不正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_108030-43":{"quick":"非致癌物風險評估「假設有閾值」;斜率因子、10⁻⁶比較用於致癌物。","detail":{"background":"風險評估中,『非致癌物』與『致癌物』的劑量反應假設不同:①「『非致癌物』——『假設『有閾值(threshold)』』,以『參考劑量(RfD)』與『危害商數(HQ)/危害指數(HI)』評估(HI<1視為可接受)」(A正確);②「『致癌物(基因毒性)』——假設『無閾值』,以『斜率因子(slope factor)』計算終生致癌風險,並與『10⁻⁶(可接受風險)』比較」(B、C屬致癌物);③兩者皆可做不確定性分析(D錯誤)。故描述非致癌物者為「假設有閾值」(A)。","options":{"A":"非致癌物假設有閾值—正解。","B":"斜率因子用於致癌物。","C":"與10⁻⁶比較用於致癌物。","D":"非致癌物亦適合不確定性分析。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_108100-42":{"quick":"揮發性有機物(VOCs)屬氣狀污染物,非粒狀污染物。","detail":{"background":"空氣污染物依物理型態分:①「『粒狀污染物(particulate matter)』」——固體/液體微粒,如『黑煙(soot)、酸霧(acid mist)、油煙(oil smoke)、粉塵、PM10/PM2.5』;②「『氣狀污染物(gaseous)』」——如『SO2、NOx、CO、O3、『揮發性有機物(VOCs)』』。「VOCs」為氣狀(揮發性),『不屬粒狀污染物』。故非粒狀者為VOCs。","options":{"A":"黑煙為粒狀污染物。","B":"酸霧為粒狀(液滴)污染物。","C":"油煙為粒狀污染物。","D":"揮發性有機物為氣狀、非粒狀—正解。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_108100-43":{"quick":"危害商數(hazard quotient)用於風險評估的「風險特徵描述」步驟。","detail":{"background":"健康風險評估四步驟:①「危害辨識(hazard identification)」;②「劑量反應評估(dose-response)」;③「暴露評估(exposure assessment)」;④「『風險特徵描述(risk characterization)』」——『整合前三步,量化風險』:對非致癌物計算「『危害商數(HQ)= 暴露劑量 ÷ 參考劑量(RfD)』」(HQ>1表示可能有危害),對致癌物算終生致癌風險。故HQ用於『風險特徵描述』。","options":{"A":"危害辨識為第一步、非用HQ。","B":"劑量反應評估為第二步。","C":"暴露評估為第三步。","D":"危害商數用於風險特徵描述—正解。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_109020-43":{"quick":"汞(甲基汞)過量暴露造成振顫與運動失調等水俁病症狀。","detail":{"background":"「汞(尤其『甲基汞(methylmercury)』)」中毒造成「『水俁病(Minamata disease)』」:甲基汞具神經毒性、易透過血腦障壁,損害小腦與感覺皮質,造成「『振顫(tremor)、運動失調(ataxia)、感覺異常、視野縮小、聽力與言語障礙』」;日本水俁灣居民食用受工業汞污染的魚貝而集體中毒。鉈(脫髮、神經)、鎘(痛痛病、腎)、鋁(透析腦病)症狀不同。故為汞。","options":{"A":"汞(甲基汞)致水俁病(振顫、運動失調)—正解。","B":"鉈中毒致脫髮、周邊神經病變。","C":"鎘致痛痛病(骨軟化)、腎損傷。","D":"鋁與透析腦病/失智相關。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_109020-46":{"quick":"鉻酸(六價鉻)暴露最可能造成鼻中膈穿孔。","detail":{"background":"「鉻酸/六價鉻(chromic acid/Cr⁶⁺)」具強腐蝕與刺激性,『電鍍、製革業』工人吸入其霧滴,長期可造成「『鼻黏膜潰瘍與『鼻中膈穿孔(nasal septum perforation)』』、皮膚潰瘍(鉻瘡)、過敏性皮膚炎」,並為肺癌的職業致癌物。四氯化碳(肝毒)、二甲基甲醯胺(肝毒)、有機磷(抑制膽鹼酯酶)不致鼻中膈穿孔。故為鉻酸。","options":{"A":"四氯化碳致肝毒性。","B":"二甲基甲醯胺致肝毒性。","C":"鉻酸(六價鉻)致鼻中膈穿孔—正解。","D":"有機磷抑制膽鹼酯酶。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_109100-44":{"quick":"本題公告「一律給分」;考我國環境影響評估法的精神(事先預防、開發否決等)。","detail":{"background":"我國「環境影響評估法」的主要精神在於『「事先預防(預防原則)」開發行為對環境的不良影響』,透過環評審查機制,『主管機關得『否決(駁回)』對環境有重大不利影響的開發案』,並要求開發單位承諾減輕對策與後續監督;公眾(含居民)參與亦為重要環節。本題經評定後「一律給分(送分)」。","options":{"A":"事先預防為環評精神之一。","B":"開發承諾(減輕對策)相關。","C":"開發否決(駁回不良開發)為環評精神。","D":"本題一律給分(送分)。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_110020-39":{"quick":"懸浮微粒(氣膠)多有降溫效應,與CO2增溫「相反」,「一致且加成」最不恰當。","detail":{"background":"全球暖化:①「除水蒸氣外,『二氧化碳(CO2)』是最重要的溫室氣體」(A正確);②「『懸浮微粒(aerosol)』對氣溫的影響『多為『反射陽光致『降溫(冷卻)』』』,與CO2的『增溫』作用『方向相反』,『並非一致或加成』」(故B最不恰當);③全球暖化是重要的環境變遷健康議題(C正確);④「京都議定書」以削減溫室氣體排放為宗旨(D正確)。故B最不恰當。","options":{"A":"除水蒸氣外CO2為最重要溫室氣體,正確。","B":"懸浮微粒多致降溫、與CO2增溫相反、非加成—錯誤(正解)。","C":"全球暖化為重要健康議題,正確。","D":"京都議定書旨在削減溫室氣體,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_110020-40":{"quick":"本題公告「一律給分」;考砷暴露與台灣烏腳病及多種癌症。","detail":{"background":"砷(arsenic)暴露:①台灣『西南沿海』曾因飲用『含砷的深井水』流行「『烏腳病(blackfoot disease,末梢血管阻塞性壞疽)』」;②慢性砷暴露增加『膀胱癌、肺癌、皮膚癌、肝癌、腎癌』等多種癌症風險;③『毛髮、指甲』砷含量可作為長期暴露的生物指標;④提供自來水後,深井砷暴露風險『下降』。本題經評定後「一律給分(送分)」(選項敘述判定有歧義)。","options":{"A":"西南沿海烏腳病與含砷井水有關(本題送分)。","B":"砷暴露增加膀胱/肝/肺/腎癌風險(本題送分)。","C":"毛髮指甲可作砷暴露指標(本題送分)。","D":"提供自來水後砷暴露風險下降(本題送分)。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_110020-47":{"quick":"傷害防制涵蓋蓄意與非蓄意傷害,「只預防蓄意傷害」最不恰當。","detail":{"background":"傷害防制(injury prevention and control):①『涵蓋『非蓄意(事故,如車禍、跌倒、溺水、中毒)』與『蓄意(自殺、暴力、兒虐)』兩大類傷害』,『不只預防蓄意傷害』(故A把範圍限縮為「蓄意」最不恰當);②須『跨領域合作(醫學、公衛、交通、警政、教育、媒體)』(B正確);③可用『流行病學疾病三角(宿主-作因-環境)』分析危險因子、擬定策略(C正確);④目的是找出事故原因、把傷害控制在最小(D正確)。故A最不恰當。","options":{"A":"傷害防制涵蓋蓄意與非蓄意、非只蓄意—錯誤(正解)。","B":"須跨多專業領域共同參與,正確。","C":"可用疾病三角模式分析,正確。","D":"找原因並把傷害控制在最小,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_111020-40":{"quick":"高溫會加速光化學反應使二次空污(臭氧)增加,「不會增加」最不恰當。","detail":{"background":"氣候變遷對台灣公衛的衝擊:①「可改變『病媒(蚊)與病原微生物』的地理分布與繁殖(如登革熱北移)」(A正確);②「『高溫『會加速大氣光化學反應』,使『二次空氣污染物(如臭氧)『濃度『增加』』』」——故B「二次空污濃度『不會增加』」最不恰當(自相矛盾);③「可改變降雨量與分布(極端降雨/乾旱)」(C正確);④「二次空污升高會增加呼吸道與心血管疾病住院風險」(D正確)。故B最不恰當。","options":{"A":"可改變病媒與病原的生存繁殖,正確。","B":"高溫加速反應使二次空污增加、非不會增加—錯誤(正解)。","C":"可改變降雨量及分布,正確。","D":"二次空污升高增加呼吸/心血管住院,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_111020-41":{"quick":"UV-C能量最大但被臭氧層吸收、到不了地表,「對地表生物傷害最大」最不恰當。","detail":{"background":"紫外線(UV)分波段:①「『UV-C(波長最短、能量最大)』」——殺菌力強,但『幾乎被『平流層臭氧層『完全吸收』』、到不了地表』,故『對地表生物的傷害『並非最大』』(A最不恰當);②「UV-A波長最長(能量最低)、可達地表致曬黑老化」(B正確);③「過度暴露『UV-B』會增加『皮膚癌』(UV-B可達地表、致曬傷與DNA損傷)」(C正確);④「臭氧層稀薄→更多紫外線進入對流層、並使對流層臭氧增加」(D正確)。故A最不恰當。","options":{"A":"UV-C被臭氧層吸收、到不了地表、對地表傷害非最大—錯誤(正解)。","B":"UV-A波長最長,正確。","C":"過度UV-B增加皮膚癌,正確。","D":"臭氧層稀薄使更多UV進入對流層,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_111020-43":{"quick":"細懸浮微粒PM2.5指粒徑小於2.5微米(μm)的空氣微粒。","detail":{"background":"「細懸浮微粒(PM2.5)」指『空氣動力直徑『小於或等於2.5微米(μm,micrometer)』』的微粒(PM10為≤10μm)。PM2.5極細小,可深入『肺泡』甚至進入血流,與呼吸道、心血管疾病及肺癌風險相關,是空氣品質的重要指標。2.5奈米(nm,過小)、2.5公分/公釐皆非正確單位。故PM2.5為粒徑<2.5微米。","options":{"A":"PM2.5指粒徑小於2.5微米—正解。","B":"2.5奈米過小、非PM2.5定義。","C":"2.5公分過大。","D":"2.5公釐過大。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_111020-44":{"quick":"社會資本是「集體」屬性;「居民的個人知識」非社會資本/集體效能的構念。","detail":{"background":"「社會資本(social capital)」與「集體效能(collective efficacy)」是『社會(群體)層級』的概念,描述社區內的『人際連結與集體行動能力』,構念包括:「『社會凝聚力(social cohesion)』、『人們的互信程度(trust)』、『非正式社會控制(informal social control,社區成員約束偏差行為)』、互惠規範與參與」。而「『居民的『個人』知識』」是『個體層級屬性』,『不屬於『社會資本/集體效能』(集體層級)』的構念。故最不恰當者為「居民的個人知識」。","options":{"A":"非正式社會控制為集體效能構念。","B":"居民個人知識為個體屬性、非社會資本構念—錯誤(正解)。","C":"社會凝聚力為社會資本構念。","D":"人們的互信程度為社會資本構念。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_111100-40":{"quick":"rem(侖目)才考慮生物效應;rad(雷德)是吸收劑量,題把兩者關係寫反,故B錯誤。","detail":{"background":"游離輻射劑量單位:①「『吸收劑量』——『雷德(rad)』或戈雷(Gy),指『單位質量吸收的能量(1 rad=100 erg/g)』,『不考慮生物效應差異』」;②「『等效劑量』——『侖目(rem)』或西弗(Sv),『= 吸收劑量(rad)× 輻射『品質因數(quality factor)』』,『考慮『不同輻射的生物效應差異』』」。本題B把『rad』與『rem』關係寫反(以「1侖目γ/X的生物效應作為1雷德」),故B最不恰當。其餘:游離化破壞分子(A正確)、大劑量抑制細胞分裂甚至致死(C正確)、長期暴露誘發癌症且分裂活躍細胞更易受害(D正確)。","options":{"A":"游離輻射使原子離子化、破壞分子,正確。","B":"考慮生物效應的是rem、非以rad為基準(關係寫反)—錯誤(正解)。","C":"大劑量抑制細胞分裂甚至致死,正確。","D":"分裂能力強的細胞較易致癌,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_111100-41":{"quick":"極小微粒(<0.1μm)反而易隨氣流呼出,「微粒越小沉積肺泡比例越高」最不恰當。","detail":{"background":"環境毒物對呼吸道:①「『二氧化硫(SO2)』水溶性高,『多在『上呼吸道』被吸收』、引起刺激」(A正確);②微粒在呼吸道的沉積與粒徑有關——『約PM2.5-PM10較大者多沉積上呼吸道,而<2.5μm可深入肺泡』;但『『極小(<0.1μm)的奈米微粒因布朗運動,部分『隨氣流被呼出』』,『並非『粒徑越小、沉積肺泡比例就越高』(非單調)』』(故B最不恰當);③吸入花粉/孢子致氣喘為『過敏(IgE)反應致支氣管收縮』(C正確);④長期臭氧/NOx破壞肺泡與支氣管彈力纖維、減弱換氣(D正確)。故B最不恰當。","options":{"A":"SO2水溶性高、多在上呼吸道吸收,正確。","B":"極小微粒反而易被呼出、非越小沉積肺泡比例越高—錯誤(正解)。","C":"花粉孢子致過敏性支氣管收縮,正確。","D":"臭氧/NOx破壞肺泡彈力纖維、減弱換氣,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_111100-42":{"quick":"週一早上心絞痛由「有機硝化物」職業暴露(週末無暴露致代償性血管收縮)引起。","detail":{"background":"「週一早上心絞痛(Monday morning angina)」見於『炸藥/火藥廠接觸『有機硝化物(如硝化甘油nitroglycerin、EGDN)』的工人』:工作日持續吸收硝化物使血管『慢性擴張』、身體『代償性增加血管收縮張力』;『週末休息『脫離暴露』後血中硝化物濃度『下降(最低)』,代償性的血管收縮失去拮抗,造成『冠狀動脈痙攣→週一(回工作前/當天)發生心絞痛甚至心肌梗塞(『戒斷』效應)』』。二硫化碳、氟氯碳化物、一氧化碳機轉不同。故為有機硝化物。","options":{"A":"二硫化碳致動脈硬化/神經病變、非此戒斷機轉。","B":"氟氯碳化物與此無關。","C":"有機硝化物戒斷致週一心絞痛—正解。","D":"一氧化碳致缺氧但非此週末戒斷機轉。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_111100-43":{"quick":"鎘(cadmium)過量暴露造成骨軟化症,即日本「痛痛病」。","detail":{"background":"「『鎘(cadmium)』」慢性中毒:①損害『腎近曲小管』致蛋白尿、腎功能異常;②干擾鈣磷代謝與維生素D,造成『『骨軟化症(osteomalacia)與骨質疏鬆』』,病人全身骨痛、易骨折——即日本富山縣因『食用受鎘污染稻米』流行的「『痛痛病(itai-itai disease)』」。鉛(神經/貧血)、鉻(鼻中膈穿孔/肺癌)、汞(水俁病)症狀不同。故痛痛病為鎘。","options":{"A":"鎘致骨軟化症(痛痛病)—正解。","B":"鉛致神經病變與貧血。","C":"鉻致鼻中膈穿孔/肺癌。","D":"汞致水俁病。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_112020-40":{"quick":"溫室效應(高溫)可使地表(對流層)臭氧濃度增加,最為恰當。","detail":{"background":"臭氧的全球環境議題分兩層:①「『平流層臭氧層』」——稀薄(臭氧洞)使紫外線增加,主因是『氟氯碳化物(CFCs)中的『氯原子』與臭氧的連鎖反應』,『最早在『南極』發現臭氧洞』;②「『對流層(地表)臭氧』」——是光化學二級污染物,「『溫室效應(高溫)『加速光化學反應』,可使地表臭氧濃度『增加』』」(B最恰當)。故A(臭氧層稀薄使地表臭氧降低)、C(最早在北極)、D(氟原子)皆錯誤,B正確。","options":{"A":"臭氧層稀薄與地表臭氧無此直接降低關係—錯誤。","B":"溫室效應(高溫)可使地表臭氧增加—正解。","C":"臭氧洞最早在南極(非北極)發現—錯誤。","D":"破壞臭氧的是氯原子(非氟原子)—錯誤。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_112100-40":{"quick":"致癌化學物經腎排出可影響輸尿管、膀胱、尿道,「不會影響」最不恰當。","detail":{"background":"腎臟易受化學毒性的原因:①「腎臟『血流量大(占心輸出約20-25%)』,接觸毒物機會多」(A正確);②「『鎘、汞』中毒易致『急性腎小管壞死』」(B正確);③「腎臟的『濃縮作用』使毒物在腎小管濃度升高、聚集」(C正確);④「『化學物(尤致癌物如芳香胺、砷、環磷醯胺代謝物)經腎排入尿液後,『會持續接觸並影響『輸尿管、膀胱、尿道』(致膀胱癌、出血性膀胱炎等)』』」——故D「不會影響輸尿管膀胱尿道」最不恰當。故D最不恰當。","options":{"A":"腎臟相對血流量大,正確。","B":"鎘汞致急性腎小管壞死,正確。","C":"腎臟濃縮作用可聚集毒物,正確。","D":"排入尿液的毒物會影響輸尿管/膀胱/尿道—錯誤(正解)。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_112100-41":{"quick":"測量長期砷暴露宜用毛髮/指甲;「血中砷較毛髮適宜」最不恰當。","detail":{"background":"砷(arsenic)危害:①「砷化氫/砷化鎵等是『半導體晶圓與光電產業』的重要『職業危害』」(A正確);②「台灣過去『煉銅廠周遭』曾有砷的『環境暴露』危害」(B正確);③「『血中砷濃度』反映『近期(短期)』暴露(半衰期短),『要評估『長期』暴露應用『毛髮或指甲』中砷濃度(可記錄較長期累積)』」——故C「血中砷較毛髮適宜作『長期』指標」最不恰當(寫反);④「砷暴露增加『肺癌、膀胱癌、皮膚癌』等風險」(D正確)。故C最不恰當。","options":{"A":"砷為半導體/光電產業職業危害,正確。","B":"煉銅廠周遭曾有砷環境暴露,正確。","C":"長期砷暴露宜用毛髮/指甲、非血中砷—錯誤(正解)。","D":"砷暴露增加肺癌風險,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_112100-43":{"quick":"血中膽鹼酯酶活性下降最可能因暴露於有機磷(農藥)。","detail":{"background":"「『有機磷(organophosphate)』與氨基甲酸鹽類農藥」會「『抑制『乙醯膽鹼酯酶(acetylcholinesterase)』』」,使乙醯膽鹼堆積,造成毒蕈鹼樣(流涎、流淚、瞳孔縮小、支氣管分泌、腹瀉)與菸鹼樣(肌肉抽搐、無力)及中樞症狀;臨床可測「『血中(紅血球或血漿)膽鹼酯酶活性『下降』』」作為暴露/中毒指標,解毒用aralidoxime+atropine。四氯化碳/二甲基甲醯胺(肝毒)、鉻酸(鼻中膈穿孔)不抑制膽鹼酯酶。故為有機磷。","options":{"A":"四氯化碳致肝毒性、不抑制膽鹼酯酶。","B":"二甲基甲醯胺致肝毒性。","C":"鉻酸致鼻中膈穿孔/肺癌。","D":"有機磷抑制膽鹼酯酶、使其活性下降—正解。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_113090-35":{"quick":"地方性斑疹傷寒由鼠蚤傳播,病媒不是體蝨;其餘三者由體蝨傳。","detail":{"background":"體蝨(body louse)媒介的疾病:①「流行性斑疹傷寒(epidemic typhus, Rickettsia prowazekii)」;②「流行性回歸熱(epidemic relapsing fever, Borrelia recurrentis)」;③「戰壕熱(trench fever, Bartonella quintana)」——三者皆由『體蝨』傳播(戰亂、擁擠、衛生不良時流行)。而「『地方性(鼠型)斑疹傷寒(endemic/murine typhus, Rickettsia typhi)』由『鼠蚤(Xenopsylla)』傳播」,『非體蝨』。故病媒不是體蝨者為地方性斑疹傷寒。","options":{"A":"流行性斑疹傷寒由體蝨傳。","B":"(流行性)回歸熱可由體蝨傳。","C":"地方性斑疹傷寒由鼠蚤傳、非體蝨—正解。","D":"戰壕熱由體蝨傳。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_113090-41":{"quick":"AQI最嚴重等級以「褐紅色(危害)」表示。","detail":{"background":"我國「空氣品質指標(AQI)」以顏色分級(對應健康影響):『綠色(良好0-50)→黃色(普通51-100)→橘色(對敏感族群不健康101-150)→紅色(對所有族群不健康151-200)→紫色(非常不健康201-300)→『褐紅色/咖啡色(危害hazardous,>300)』』。故『最嚴重』等級為『褐紅色(咖啡色)』。","options":{"A":"褐紅色(咖啡色)為AQI最嚴重(危害)等級—正解。","B":"紫色為非常不健康(次嚴重)。","C":"紅色為對所有族群不健康。","D":"橙色為對敏感族群不健康。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_113090-42":{"quick":"鄰苯二甲酸酯(塑化劑)易代謝降解,最不可能是持久性有機污染物。","detail":{"background":"「持久性有機污染物(POPs)」具『環境中『難分解(持久)』、『生物累積(脂溶性、食物鏈濃縮)』、『可長距離傳輸』、『毒性』』等特性,斯德哥爾摩公約列管者包括『DDT、戴奧辛(dioxins)、多氯聯苯(PCBs)、有機氯農藥』等。「『鄰苯二甲酸酯類(phthalates,塑化劑)』」雖為環境荷爾蒙,但『在環境與生物體內『相對容易代謝降解、半衰期短、不易生物累積』』,『最不可能屬POPs』。故為phthalates。","options":{"A":"DDT為持久性有機污染物。","B":"鄰苯二甲酸酯易降解、最不可能是POPs—正解。","C":"戴奧辛為持久性有機污染物。","D":"多氯聯苯為持久性有機污染物。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_113090-43":{"quick":"危害指數HI>1代表「可能有危害」,「HI>1預期不會造成危害」最不恰當。","detail":{"background":"環境毒物的閾值與非致癌風險:①「若有『閾值(threshold)』,可由『無明顯有害作用劑量(NOAEL)』推估『參考劑量(RfD)』」(A正確);②「可由『動物實驗或流行病學資料』判斷物質是否有閾值」(B正確);③「若『無閾值(致癌物)』,則查『斜率因子(slope factor)』計算終生致癌風險」(C正確);④「『危害指數(hazard index, HI)= Σ各HQ』,『HI『>1』代表『可能有危害』(超過可接受);HI『<1』才視為『不致危害』』」——故D「HI>1預期『不會』造成危害」最不恰當(寫反)。故D最不恰當。","options":{"A":"有閾值可推估參考劑量RfD,正確。","B":"可由動物/流病資料判斷閾值,正確。","C":"無閾值用斜率因子計算風險,正確。","D":"HI>1代表可能有危害、非不會造成危害—錯誤(正解)。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_113090-44":{"quick":"現代公共心理衛生強調去機構化回歸社區,「留置病人於醫院療養院」最不恰當。","detail":{"background":"公共(社區)心理衛生的重點:①「強調『社會環境(壓力、貧窮、歧視等)對精神疾病成因』的影響」(A正確);②「『以『社區』為基礎——對精神病患『保護、諮商與治療』,並協助其『去機構化、回歸社區』生活與復健』」(C正確);③「目標是『全體民眾的心理健康(促進)』」(D正確)。而「『把病人『長期留置於醫院或療養院』(機構化)』」與『去機構化、社區照護』的現代精神衛生方向『相反』,故B最不恰當。","options":{"A":"強調社會環境對疾病成因的影響,正確。","B":"長期留置機構與去機構化方向相反—錯誤(正解)。","C":"強調保護諮商治療並回歸社區,正確。","D":"目標為全體民眾心理健康,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_113090-47":{"quick":"安全帶/氣囊/安全帽屬第一段「第2級(特殊保護)」,「第1級安全促進」錯誤。","detail":{"background":"傷害防制對應三段五級:①「『第一段(初段)』」含『第1級(健康促進、安全教育)』與『第2級(特殊保護)』——「『安全帶、安全氣囊、安全帽』等『被動防護裝置(減少事故發生時的傷害)』屬『第一段『第2級(特殊保護)』』」(故B「第1級安全促進」錯誤);②「『送醫前急救與緊急救護(EMS)效率』屬『第二段(早期處置、限制傷害)』」(A正確);③工程介入(設計/材質修飾)可減少傷害(C正確);④立法規範玩具安全標準屬第一段預防(D正確)。故B最不恰當。","options":{"A":"急救/EMS效率屬第二段預防,正確。","B":"安全帶/氣囊/安全帽屬第一段第2級(特殊保護)、非第1級—錯誤(正解)。","C":"工程介入可減少傷害,正確。","D":"玩具安全立法屬第一段預防,正確。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_114020-41":{"quick":"肉品高溫(燒烤、油炸)處理最可能產生致癌的「異環胺」。","detail":{"background":"「肉品『高溫(燒烤、煎炸、炭烤)』處理」時,肉中的『胺基酸、肌酸與糖類』經高溫反應,最可能產生「『異環胺(heterocyclic amines, HCAs)』」(及多環芳香烴PAHs),屬致癌物(與大腸癌等相關),故建議避免過度燒焦。砷(環境/水)、黃麴毒素(發霉穀物/堅果)、三聚氰胺(摻假乳品)來源不同。故為異環胺。","options":{"A":"肉品高溫處理產生異環胺(致癌)—正解。","B":"砷來自環境/地下水。","C":"黃麴毒素來自發霉穀物/堅果。","D":"三聚氰胺為摻假乳製品污染物。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_114090-41":{"quick":"光化學評估監測站主要監測臭氧及其前驅物(VOCs、NOx)。","detail":{"background":"「光化學評估監測站(Photochemical Assessment Monitoring Stations, PAMS)」設立目的是監測「『臭氧(O3)』及其『前驅物——揮發性有機物(VOCs)與氮氧化物(NOx)』」的濃度與變化,以了解光化學煙霧(臭氧)生成機制、評估管制成效。二氧化硫、鉛、戴奧辛各有專屬監測,非PAMS主標的。故主要監測臭氧及其前驅物。","options":{"A":"光化學評估監測站主要監測臭氧及其前驅物—正解。","B":"二氧化硫非PAMS主標的。","C":"鉛非PAMS主標的。","D":"戴奧辛非PAMS主標的。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_114090-45":{"quick":"當今影響健康最大的因素是生活型態(占比最高)。","detail":{"background":"Lalonde健康場域(health field)概念把影響健康的因素分四大類:「『生活型態(lifestyle)、環境因素、人的生物特性(遺傳)、健康照護體系』」。其中對健康影響『占比最大的是『生活型態(約43-50%)』』(如吸菸、飲食、運動、飲酒),其次為環境與生物特性,醫療照護體系所占比例相對較小。故影響最大者為生活型態。","options":{"A":"人的生物特性(遺傳)影響次之。","B":"環境因素影響次之。","C":"健康照護體系所占比例相對較小。","D":"生活型態影響健康最大—正解。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_115020-40":{"quick":"加氯消毒對梨形鞭毛蟲(囊體抗氯)效果最不理想;細菌易被氯殺滅。","detail":{"background":"自來水「加氯消毒」對細菌(大腸桿菌、沙門氏菌、志賀桿菌)殺滅效果良好;但對「『原蟲『囊體(cyst/oocyst)』』——如『梨形鞭毛蟲(Giardia)、隱孢子蟲(Cryptosporidium)』」,因其『囊體外壁對『氯抵抗力強』』,『加氯消毒效果『最不理想』,須靠『過濾(沉澱、混凝、過濾)』去除』。故效果最不理想者為梨形鞭毛蟲。","options":{"A":"梨形鞭毛蟲囊體抗氯、加氯效果最不理想—正解。","B":"大腸桿菌易被氯殺滅。","C":"沙門氏菌易被氯殺滅。","D":"志賀桿菌易被氯殺滅。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_115020-42":{"quick":"汞主要經食物鏈(甲基汞在魚貝累積)中毒,「土壤汞由植物吸收致中毒」最不恰當。","detail":{"background":"汞(mercury):①「早期牙科以『汞齊(amalgam)』填補齲齒(含汞材料)」(A正確);②「日本『水俁病』即工業『甲基汞』污染海灣、經魚貝食物鏈濃縮致中毒的重大公害」(B正確);③「『腦部(尤皮質)』是慢性汞暴露的敏感部位,可致『皮質海綿狀退化』與神經症狀」(C正確);④「汞中毒『主要經『食物鏈生物濃縮(甲基汞在魚體累積)』』,人『食用受污染的魚貝』而中毒;『經植物吸收土壤汞、人食莖葉果實致中毒』『並非主要途徑』」(故D最不恰當)。故D最不恰當。","options":{"A":"早期牙醫以含汞汞齊補牙,正確。","B":"水俁病為汞污染公害事件,正確。","C":"腦皮質海綿狀退化為慢性汞暴露表現,正確。","D":"汞主要經食物鏈(魚貝)中毒、非經植物吸收—錯誤(正解)。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_112100-42":{"quick":"加氯消毒最主要缺點是與水中有機物作用產生鹵化有機物(消毒副產物)。","detail":{"background":"飲用水「加氯消毒」可有效殺滅細菌、且有『殘餘氯』在配水管網提供持續保護(故C「對配水管再污染無保護」反而是『臭氧消毒』的缺點,非加氯)。加氯消毒的『最主要缺點』是「『氯會與水中『天然有機物(腐植質)』反應,生成『鹵化有機物(消毒副產物,如三鹵甲烷THMs、鹵乙酸)』』」,其中部分為疑似致癌物。故最主要缺點為D。","options":{"A":"加氯成本相對低、非主要缺點。","B":"處理費時為臭氧/其他法的考量、非加氯主要缺點。","C":"無殘餘保護力為臭氧消毒缺點(加氯反而有殘餘氯)。","D":"氯與有機物作用生成鹵化有機物(消毒副產物)—正解。"},"sources":["環境衛生學","職業與環境醫學","公共衛生學"]}},"med2_106100-44":{"quick":"日時量平均容許暴露濃度(PEL-TWA)係指每日工作「8小時」的平均容許濃度。","detail":{"background":"我國「勞工作業場所容許暴露標準」定義:①「『日(八小時)時量平均容許濃度(PEL-TWA)』」——『每日工作『8小時』(或每週40小時)內,『反覆暴露其平均濃度『大部分勞工終生不致受害』的濃度』』;②「『短時間時量平均容許濃度(PEL-STEL)』」——任何『15分鐘』內的平均不得超過;③「『最高容許濃度(PEL-Ceiling)』」——任何時間均不得超過。故日時量平均為每日8小時。","options":{"A":"最高15分鐘為短時間時量平均的時段。","B":"每日4小時非定義。","C":"日時量平均為每日8小時—正解。","D":"每週40小時為等效,但定義以每日8小時表述。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_106100-45":{"quick":"白指病(雷諾現象)由長期使用振動工具(振動暴露)引起。","detail":{"background":"「白指病(white finger / 振動性白指,vibration-induced white finger)」屬「手臂振動症候群(HAVS)」:長期使用『振動工具(鏈鋸、鑿岩機、研磨機等)』的工人,手部血管與神經受損,遇冷時手指『陣發性蒼白、發紺、麻木(雷諾現象)』。苯(血癌)、甲苯(神經)、微波(熱效應)非白指病病因。故白指病為振動工作所致。","options":{"A":"白指病由振動工作引起—正解。","B":"苯作業致血癌、非白指病。","C":"甲苯作業致神經毒性。","D":"微波作業致熱效應。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_108030-45":{"quick":"每小時前10分鐘60ppm、後50分鐘0,八小時時量平均=10ppm。","detail":{"background":"時量平均濃度(TWA)= Σ(各時段濃度×時間) ÷ 總時間。本題每一小時:前10分鐘暴露60 ppm、後50分鐘0 ppm,該小時平均 = (60×10 + 0×50)/60 = 600/60 = 『10 ppm』;八小時的暴露型態相同,故『八小時TWA = 10 ppm』。","options":{"A":"八小時TWA=10 ppm—正解。","B":"15 ppm計算錯誤。","C":"20 ppm計算錯誤。","D":"60 ppm為瞬時暴露濃度、非TWA。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_108030-46":{"quick":"長期暴露於苯最可能造成血癌(白血病)。","detail":{"background":"「苯(benzene)」是確定的人類致癌物(IARC第1類),其骨髓毒性造成「『再生不良性貧血』與『急性骨髓性白血病(血癌)』」,故石化、油漆、橡膠業工人長期苯暴露須監測血球。肝癌(氯乙烯/黃麴毒素)、腎癌、皮膚癌(砷/紫外線)非苯的典型癌症。故苯最可能致血癌。","options":{"A":"苯最可能致血癌(白血病)—正解。","B":"肝癌與氯乙烯/黃麴毒素相關。","C":"腎癌非苯典型癌症。","D":"皮膚癌與砷/紫外線相關。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_108100-44":{"quick":"整體換氣可控制溫濕度與稀釋污染,但「不適用於調整氣壓」。","detail":{"background":"「整體換氣(general/dilution ventilation)」以大量新鮮空氣『稀釋』作業環境的污染物,並可調節『溫度、濕度』、改善舒適度,適用於『低毒性、低濃度、均勻散布』的污染物。但它『不用於『調整(控制)工作環境的氣壓』』(氣壓控制屬特殊製程/潔淨室的正負壓設計,非整體換氣目的);高毒性/局部高濃度污染應用『局部排氣』。故較不適合用整體換氣者為「調整氣壓」。","options":{"A":"整體換氣可調節濕度。","B":"整體換氣可稀釋污染物濃度。","C":"整體換氣可降低環境溫度。","D":"整體換氣不適用於調整氣壓—正解。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_108100-45":{"quick":"台灣中部油症兒事件由多氯聯苯(PCB)污染米糠油所引起。","detail":{"background":"1979年台灣中部「『油症(米糠油中毒)事件』」:食用油在脫臭製程中因熱媒管破裂,『『多氯聯苯(PCB)』及其加熱裂解產生的多氯呋喃(PCDF)』污染米糠油,受害者出現氯痤瘡、色素沉著、神經與肝損傷;『孕婦受害者所生的『油症兒(嬰兒)』』出現皮膚色素沉著、發育與神經影響。靈丹(有機氯農藥)、甲苯、有機汞非此事件原因。故為多氯聯苯。","options":{"A":"靈丹為有機氯農藥、非油症原因。","B":"油症兒事件由多氯聯苯(PCB)污染米糠油—正解。","C":"甲苯為有機溶劑、非此事件。","D":"有機汞致水俁病、非油症。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_109020-44":{"quick":"報社印刷接觸紙屑纖維不致塵肺;矽塵與石棉作業才是塵肺危險族群。","detail":{"background":"「塵肺症(pneumoconiosis)」是『吸入『無機礦物性粉塵』在肺部沉積引起的纖維化』,危險族群:①『矽肺(silicosis)』——噴砂、採礦、鑄造、隧道工(『二氧化矽粉塵』);②『石棉肺(asbestosis)』——耐火磚製造、造船、保溫材料工(『石棉』);③煤肺、鈹肺等。而「『報社印刷工人接觸的『紙屑纖維(有機)』『不致典型塵肺症』』」(有機粉塵或致過敏性肺炎,非礦物塵肺)。故不屬塵肺危險族群者為報社印刷紙屑暴露。","options":{"A":"報社印刷紙屑纖維不致塵肺—正解(非危險族群)。","B":"噴砂暴露二氧化矽致矽肺,屬危險族群。","C":"耐火磚製造暴露石棉致石棉肺,屬危險族群。","D":"造船暴露石棉致石棉肺,屬危險族群。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_109020-45":{"quick":"三場所甲苯暴露的時量平均濃度TWA=（40×2.5+150×3+20×2.5）/8 = 75 ppm。","detail":{"background":"時量平均濃度(TWA)= Σ(各時段濃度×時間) ÷ 總時間。本題:甲場所40 ppm×2.5h + 乙場所150 ppm×3h + 丙場所20 ppm×2.5h = 100 + 450 + 50 = 600;總時間 = 2.5+3+2.5 = 8h。『TWA = 600 ÷ 8 = 75 ppm』。","options":{"A":"70 ppm計算錯誤。","B":"74 ppm計算錯誤。","C":"TWA=600/8=75 ppm—正解。","D":"80 ppm計算錯誤。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_109100-42":{"quick":"高溫油炸的澱粉食品最可能產生丙烯醯胺(acrylamide)。","detail":{"background":"「澱粉類食品經『高溫(>120°C)油炸或烘烤(如薯條、洋芋片)』」時,『天門冬醯胺(asparagine)與還原糖』經『梅納反應』生成「『丙烯醯胺(acrylamide)』」(IARC列為2A可能人類致癌物、具神經毒性),故建議避免過度油炸/焦化。苯甲酸鹽(防腐劑)、多氯聯苯(工業污染)、黃麴毒素(發霉穀物)來源不同。故為丙烯醯胺。","options":{"A":"苯甲酸鹽為防腐劑、非高溫產生。","B":"多氯聯苯為工業污染物。","C":"黃麴毒素來自發霉穀物/堅果。","D":"高溫油炸澱粉產生丙烯醯胺—正解。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_109100-45":{"quick":"惡性間皮細胞瘤最常見的職業暴露因子為石棉。","detail":{"background":"「惡性間皮細胞瘤(malignant mesothelioma)」是侵犯胸膜/腹膜的惡性腫瘤,『最常見、最確定的職業暴露因子是『石棉(asbestos)』』(造船、保溫、煞車片、建材業);暴露後潛伏期可達20-40年,即使少量暴露亦可能致病。鎘(腎/前列腺)、矽塵(矽肺/肺癌)、甲苯(神經)非間皮瘤主因。故為石棉。","options":{"A":"石棉為惡性間皮瘤最常見職業暴露因子—正解。","B":"鎘與腎/前列腺相關。","C":"矽塵致矽肺/肺癌。","D":"甲苯致神經毒性。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_110020-41":{"quick":"肝血管肉瘤最可能的職業暴露為氯乙烯(石化業)。","detail":{"background":"「肝血管肉瘤(hepatic angiosarcoma)」是罕見的肝臟惡性血管腫瘤,其『最具特徵性的職業致癌物是『氯乙烯單體(vinyl chloride monomer, VCM)』』(『石化/PVC塑膠製造業』暴露),此外砷、二氧化釷(Thorotrast)亦相關。二異氰酸甲苯(TDI,氣喘)、錳(神經/帕金森樣)、鉛(神經/貧血)非肝血管肉瘤病因。故為氯乙烯。","options":{"A":"二異氰酸甲苯(TDI)致職業性氣喘。","B":"錳熔煉致神經(帕金森樣)病變。","C":"石化廠氯乙烯暴露致肝血管肉瘤—正解。","D":"鉛致神經病變與貧血。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_110020-42":{"quick":"8小時日時量平均容許濃度以「每週工作40小時、每週5天」為基準。","detail":{"background":"「8小時日時量平均容許濃度(PEL-TWA)」的定義基準是『『正常工時——每日8小時、『每週40小時(每週5天)』』下,大部分勞工『終其工作生涯反覆暴露於此平均濃度『不致發生不良健康效應』』的濃度』。若工時超過此標準(加班),須另做修正(降低容許值)。故基準為每週40小時、每週5天(C)。","options":{"A":"每週48小時非PEL-TWA基準。","B":"每週44小時非標準基準。","C":"每週40小時、每週5天為PEL-TWA基準—正解。","D":"每週42小時非標準基準。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_111020-42":{"quick":"毒性物質進入人體的常見途徑為呼吸、皮膚吸收、食入;「滲入」較不常見。","detail":{"background":"職業環境中毒性物質進入人體的『主要(常見)途徑』:①「『呼吸道吸入(inhalation)』」(最重要、最常見,氣狀/粉塵);②「『皮膚吸收(skin absorption)』」(脂溶性溶劑);③「『食入攝取(ingestion)』」(經污染的手/食物)。「『滲入(infiltration)』」並非職業毒物進入人體的標準途徑(較不常見/非正規分類)。故較不常見者為滲入。","options":{"A":"呼吸道吸入為最常見途徑。","B":"皮膚吸收為常見途徑。","C":"食入攝取為常見途徑。","D":"滲入較不常見、非標準途徑—正解。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_111100-45":{"quick":"職業位階屬「個人層次」的社經地位指標;失業率、低收入戶比率、公共資源為群體層次。","detail":{"background":"社會經濟地位(SES)指標分層次:①「『個人(individual)層次』」——『個人的『教育程度、職業位階(occupational class)、所得』』;②「『群體(area/group)層次』」——區域的『失業率、低收入戶比率、公共資源(社區設施)』等聚集指標。本題問『個人層次』指標,『職業位階(occupational rank)』屬個人層次(C);失業率、低收入戶比率、公共資源皆為群體層次。故為職業位階。","options":{"A":"失業率為群體層次指標。","B":"低收入戶比率為群體層次指標。","C":"職業位階為個人層次社經指標—正解。","D":"公共資源為群體層次指標。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_112020-41":{"quick":"急性中樞神經中毒(幻覺)主要見於「有機鉛」;A把有機/無機鉛寫反,最不恰當。","detail":{"background":"鉛中毒:①「『有機鉛(如四乙基鉛)』急性中毒『主要侵犯『中樞神經』』,可有『失眠、躁動、幻覺、譫妄』」;「『無機鉛』急性中毒『多為腹絞痛、貧血』,慢性才出現『周邊神經病變(垂腕)與腦病變』」——故A「『無機鉛』急性中毒主要在中樞神經、嚴重幻覺」把有機/無機『寫反』,最不恰當;②鉛中毒預防重點在職業衛生(避免鉛粉塵作業)(B正確);③劣質玩具色料、老舊水管含鉛是兒童/居家鉛暴露來源(C、D正確)。故A最不恰當。","options":{"A":"急性中樞神經/幻覺見於有機鉛、非無機鉛(寫反)—錯誤(正解)。","B":"預防重點在職業衛生(避免鉛粉塵),正確。","C":"劣質玩具色料可為兒童鉛暴露來源,正確。","D":"老舊建築含鉛水管可為來源,正確。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_112020-42":{"quick":"人因工程危害防制與搬運、姿勢、重複性有關;「避免肢體語言暴力」最無相關。","detail":{"background":"「人因工程(ergonomics)危害」指因『不良姿勢、重複性動作、過度施力、不當物料搬運、長時間靜態負荷』等造成的『肌肉骨骼傷害(下背痛、腕隧道症候群等)』。預防措施與「『良好物料搬運習慣、正確姿勢、避免重複性工作』」有關。而「『避免同儕間的肢體與語言暴力』」屬『職場暴力/心理社會危害』,『與人因工程危害『最無相關』』。故最無關者為D。","options":{"A":"良好物料搬運習慣與人因工程相關。","B":"正確姿勢與人因工程相關。","C":"避免重複性工作與人因工程相關。","D":"避免職場暴力屬心理社會危害、與人因工程最無關—正解。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_112020-43":{"quick":"短時間時量平均容許濃度(STEL)以「15分鐘」為評估時段。","detail":{"background":"「短時間時量平均容許濃度(PEL-STEL)」是指『在任何『15分鐘』內的時量平均濃度『不得超過』的標準』(防止短時間高濃度暴露的急性危害),且一日內超過PEL-TWA但低於STEL的次數與間隔亦有限制。故STEL最常使用的評估時段為『15分鐘』。","options":{"A":"1分鐘非STEL評估時段。","B":"短時間時量平均以15分鐘評估—正解。","C":"30分鐘非STEL標準時段。","D":"60分鐘非STEL標準時段。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_114020-39":{"quick":"種類表外的疾病須經「鑑定」程序、非單憑醫師認定即可補償,故B最不適當。","detail":{"background":"我國職業病認定:①「以『勞工保險職業病種類表』『正面表列』為原則,表列疾病符合即認定」(A正確);②「『表中未列』的疾病,『不能僅憑「醫師認定由工作引起」就直接補償』,須經『職業病『鑑定(認定)』程序』(由專業審查因果關係)才可能視為職業病」——故B「未列疾病經醫師認定即可接受勞保職災補償」最不適當;③「『精神疾病』與執行職務有相當因果(如職場過勞、創傷)者,可認定為職業病」(C正確);④「原有高血壓者因『短期過度超時工作(過勞)』促發腦出血,可認定為職業促發疾病」(D正確)。故B最不適當。","options":{"A":"以種類表正面表列為原則,正確。","B":"表外疾病須經鑑定、非僅醫師認定即補償—錯誤(正解)。","C":"精神疾病有因果可認定為職業病,正確。","D":"過勞促發腦出血可認定為職業病,正確。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_114090-40":{"quick":"噪音的「非聽覺」健康影響以心血管疾病(高血壓)最為相關。","detail":{"background":"噪音的健康影響分:①「『聽覺影響』」——『耳鳴、噪音性聽力損失、聽覺毛細胞(內耳)喪失』;②「『非聽覺影響』」——長期噪音暴露引發『壓力反應、交感神經活化』,與『『心血管疾病(高血壓、心肌梗塞)』、睡眠障礙、認知與情緒影響』相關。本題問『非聽覺』影響,故為『心血管疾病』(D);耳鳴、聽力損失、毛細胞喪失皆屬聽覺影響。","options":{"A":"耳鳴為聽覺影響。","B":"聽力損失為聽覺影響。","C":"聽覺毛細胞喪失為聽覺影響。","D":"心血管疾病為噪音的非聽覺影響—正解。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_114090-42":{"quick":"苯為致癌物,採無閾值模式,斜率因子單位為(mg/kg-day)⁻¹。","detail":{"background":"苯(benzene)為『已知人類致癌物』,致癌風險評估採「『無閾值(non-threshold)模式』」(假設任何劑量都有風險):以「『斜率因子(slope factor, SF)』」描述『單位劑量對應的終生致癌風險』,『風險 = 暴露劑量(mg/kg-day) × 斜率因子』,故『斜率因子的單位為『(mg/kg-day)⁻¹』』(劑量單位的倒數)。具閾值模式(參考劑量RfD)用於非致癌物。故D正確。","options":{"A":"致癌物用無閾值模式(非具閾值)、斜率因子單位也錯。","B":"無閾值正確、但斜率因子單位應為劑量的倒數。","C":"致癌物用無閾值模式(非具閾值)。","D":"無閾值模式、斜率因子單位(mg/kg-day)⁻¹—正解。"},"sources":["職業與環境醫學","職業衛生學","勞工健康保護"]}},"med2_106100-49":{"quick":"全民健保本質為「社會保險」,「社會性與商業性並重」錯誤。","detail":{"background":"台灣全民健康保險:①「規劃確立其本質為『『社會保險』(社會性)』——『強制納保、量能負擔(依薪資繳費)、不以營利為目的』,『而非『商業性並重』』」(故A錯誤);②「逐步推動『以診斷關聯群(DRG)為基礎的『住院論病例計酬』』支付」(B正確);③「保險介入前,『醫療供給者相對病人有資訊優勢、主導醫療利用(供給誘發需求)』」(C正確);④「『總額預算制』是控制醫療支出成長的策略之一」(D正確)。故A錯誤。","options":{"A":"全民健保為社會保險、非社會與商業並重—錯誤(正解)。","B":"逐步推動DRG論病例計酬,正確。","C":"供給者保險前主導醫療利用,正確。","D":"總額預算制控制支出成長,正確。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_106100-50":{"quick":"成本效用分析以「效用(QALY)」衡量產出;「以金錢衡量產出」是成本效益分析,故C較不正確。","detail":{"background":"經濟評估方法:①「『成本效用分析(cost-utility analysis, CUA)』」——『產出以『效用(品質調整生命年QALY)』衡量』,常以『每QALY成本』比較;②「成本效益分析(cost-benefit analysis, CBA)」——『產出以『金錢價值』衡量』;③「成本效果分析(cost-effectiveness analysis, CEA)」——產出以自然單位(如延長壽命年數)衡量,CUA是CEA的特殊型。故C「(成本效用分析)以『金錢』價值衡量產出」較不正確(那是成本效益分析);A(以QALY)、B(屬CEA特殊型)、D(評估治療成效方法)皆正確。","options":{"A":"常以QALY測量結果,正確。","B":"屬成本效益(效果)分析的特殊型,正確。","C":"以金錢衡量產出為成本效益分析、非成本效用—錯誤(正解)。","D":"為評估治療成效的方法,正確。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_107100-47":{"quick":"我國心理衛生工作的主要法源為「精神衛生法」。","detail":{"background":"我國推動心理衛生與精神疾病防治工作的『主要法源依據是『精神衛生法』』(規範精神疾病的預防、醫療、保護、社區復健與病人權益,並設強制住院/社區治療等機制)。並無「心理衛生法」「公共心理衛生法」「社區精神醫療保健法」作為主要法源。故為精神衛生法。","options":{"A":"並無「心理衛生法」作為主要法源。","B":"並無「公共心理衛生法」。","C":"我國心理衛生主要法源為精神衛生法—正解。","D":"並無「社區精神醫療保健法」。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_108030-49":{"quick":"醫療費用成長與「醫病資訊不對稱」關聯較小;人口老化、所得、科技進步關聯大。","detail":{"background":"醫療費用成長率的主要驅動因素:①「『人口老化』」(老人醫療需求高);②「『所得增加』」(醫療為正常財,需求隨所得上升);③「『醫療科技進步』」(新藥/新技術昂貴,是費用成長的最大推力)。而「『醫病資訊不對稱』」雖造成供給誘發需求等問題,但相對於上述三者,『對『費用『成長率』』的『關聯性較小』』(較屬結構性效率問題)。故關聯較小者為醫病資訊不對稱。","options":{"A":"人口老化與費用成長關聯大。","B":"所得增加與費用成長關聯大。","C":"醫療科技進步與費用成長關聯大。","D":"醫病資訊不對稱與費用「成長率」關聯較小—正解。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_109020-49":{"quick":"強制衛生政策應符合比例、最小侵害等原則,「毫無例外地推動」錯誤。","detail":{"background":"以公權力推動『強制性衛生政策』(如強制隔離、強制接種)的倫理原則:①「『有效性』——手段須能達成政策目的」(A正確);②「『比例原則』——所獲公共利益與所犧牲個人利益相稱」(B正確);③「『最小侵害(必要性)』——即使須犧牲個人利益,也應採『侵害最小』的手段」(C正確);④故『不能『毫無例外地推動』』——須在『個人自由與公共利益間權衡、符合上述倫理約束』,『不可一概強制』(故D「應毫無例外地推動」錯誤)。故D錯誤。","options":{"A":"手段須能達到政策目的,正確。","B":"須符合比例原則,正確。","C":"應採最小侵害手段,正確。","D":"應權衡而非毫無例外地強制推動—錯誤(正解)。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_110020-48":{"quick":"論人計酬(capitation)的基準單位最大,對醫療提供者的節約誘因最大。","detail":{"background":"醫療支付制度依『給付基準單位由小到大』,『節約誘因(控制成本的動機)隨之增強、但也可能誘發『減少必要服務』』:①「『論量(論項)計酬』」單位最小(每項服務付費)、『缺乏節約誘因(誘發過度服務)』;②「論日計酬」;③「論病例計酬(如DRG,每一住院病例包裹給付)」;④「『論人計酬(capitation,『每人每期』固定給付)』」單位『最大』,『提供者節約誘因『最大』』(但有挑選輕症、減少服務之虞)。故節約誘因最大者為論人計酬。","options":{"A":"論量計酬單位最小、缺節約誘因。","B":"論日計酬節約誘因中等。","C":"論病例計酬節約誘因較大但小於論人。","D":"論人計酬單位最大、節約誘因最大—正解。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_110020-49":{"quick":"WHO的主要功能「包含」技術合作,「不包含技術合作」最不恰當。","detail":{"background":"世界衛生組織(WHO):①「『最高權力(決策)單位是『世界衛生大會(World Health Assembly, WHA)』』」(A正確);②「『WHO的主要功能『包含』對會員國的『技術合作(技術援助)』、訂定國際衛生標準與規約、協調全球衛生事務、疾病監測與緊急應變』」——故B「主要功能『不包含』技術合作」最不恰當(WHO本就提供技術合作);③「WHO是『聯合國體系內的『專門機構』』」(C正確);④「『經費短缺與組織效率』是WHO面臨的挑戰」(D正確)。故B最不恰當。","options":{"A":"最高權力單位為世界衛生大會,正確。","B":"WHO主要功能包含技術合作、非不包含—錯誤(正解)。","C":"WHO為聯合國專門機構,正確。","D":"經費與效率為WHO挑戰,正確。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_111100-48":{"quick":"Andersen健康服務利用模式的因素為前置、能力、需要;「心理因素」不屬之。","detail":{"background":"Andersen「健康服務利用行為模式(1968)」把影響個人是否利用醫療服務的因素分三大類:①「『前置(傾向)因素(predisposing factors)』」——年齡、性別、教育、信念等利用前既存特質;②「『能力(使能)因素(enabling factors)』」——所得、保險、醫療可近性等;③「『需要因素(need)』」——感知的與評估的健康需要(疾病嚴重度)。「『心理因素(psychological factors)』」並非此模式的『獨立三大類因素』之一。故不屬於者為心理因素。","options":{"A":"前置因素屬Andersen模式。","B":"能力(使能)因素屬Andersen模式。","C":"心理因素不屬Andersen模式三大因素—正解。","D":"需要因素屬Andersen模式。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_111100-49":{"quick":"論量計酬的主要缺點是缺乏節約誘因(易誘發過度服務)。","detail":{"background":"「論量(論項)計酬(fee-for-service)」按提供的『每一項服務』付費:其『主要缺點是『缺乏節約成本的誘因』』——提供越多服務領越多錢,易『誘發過度醫療、檢查、用藥(供給誘發需求)』,推升醫療費用。其『優點是易反映服務量、容易被醫療提供者接受』。A(減少必要服務)、B(不反映複雜度)是『論人/論病例』等包裹支付的缺點。故論量計酬主要缺點為「缺乏節約誘因」。","options":{"A":"減少必要服務為包裹支付(論人/論病例)的缺點。","B":"不反映複雜度為論病例/論人的問題。","C":"論量計酬缺乏節約誘因(易過度服務)—正解。","D":"易被醫療提供者接受是論量計酬的優點。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_112020-48":{"quick":"論質計酬(P4P)的主要缺點是誘使提供者「挑選輕症病人」(以達績效指標)。","detail":{"background":"「論質計酬(pay for performance, P4P)」依『醫療『品質/成效指標』』給付獎勵,鼓勵提升照護品質。但其『主要缺點是『誘發『挑選病人(cream skimming / risk selection)』』』——為達成績效指標(如控制率、併發症率),提供者可能『傾向收治『較輕症/依從性好的病人』,迴避重症或複雜個案』,反致醫療不公。缺乏節約誘因是論量計酬的缺點;生產力降低非P4P主要問題。故P4P主要缺點為「提供挑選輕症病人的誘因」。","options":{"A":"缺乏節約誘因為論量計酬缺點。","B":"不易被接受非P4P主要缺點。","C":"生產力降低非P4P主要缺點。","D":"P4P誘發挑選輕症病人(cream skimming)—正解。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_112100-44":{"quick":"英國於1848年訂定全球首部「公共衛生法(Public Health Act)」。","detail":{"background":"公共衛生史上,「『英國』於『1848年』通過全球首部『公共衛生法(Public Health Act)』」(在Edwin Chadwick等推動下,因應工業化都市的衛生與傳染病問題,設立衛生主管機關、改善供水排污),被視為現代公共衛生制度化的里程碑。日本、美國、德國非1848年該法的訂定國。故為英國。","options":{"A":"日本非1848公共衛生法訂定國。","B":"美國非1848公共衛生法訂定國。","C":"英國1848年訂公共衛生法—正解。","D":"德國非1848公共衛生法訂定國。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_114020-48":{"quick":"醫療服務成本屬「非協商因子」;新藥新科技、支付改革、品質獎勵金為協商因子。","detail":{"background":"全民健保『總額預算』的成長率公式分:①「『非協商因子』」——『客觀、自動計算』的部分,如『『投保人口成長』、『人口結構(老化)』、『醫療服務成本(投入成本物價)指數』』等;②「『協商因子』」——須由付費者與醫界『協商』決定的部分,如『『新藥/新醫療科技』、『推動支付制度改革』、『品質獎勵金(品質保證保留款)』、政策推動項目』等。本題問『不屬協商因子』者,即『醫療服務成本(非協商因子)』(C)。","options":{"A":"新藥新科技為協商因子。","B":"推動支付制度改革為協商因子。","C":"醫療服務成本為非協商因子—正解(不屬協商因子)。","D":"品質獎勵金為協商因子。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_114020-50":{"quick":"發展臨床路徑與參加ISO認證為醫療機構自主作為,非政府主管機關規範辦理。","detail":{"background":"由『政府衛生主管機關規範或辦理』的醫療品質提升制度:①「『訂立『醫療機構設置標準』』」(A);②「『辦理『醫院評鑑』』」(C);③「『建立『醫事人員執業登記及繼續教育』辦法』」(D)——皆由主管機關規範。而「『發展臨床路徑(clinical pathway)與參加ISO品質認證』」屬『醫療機構『自主』推動的品質管理作為』,『非由政府主管機關規範或辦理』。故不是政府辦理者為B。","options":{"A":"訂立醫療機構設置標準為政府辦理。","B":"發展臨床路徑與參加ISO認證為機構自主、非政府辦理—正解。","C":"辦理醫院評鑑為政府辦理。","D":"建立執業登記與繼續教育辦法為政府辦理。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_115020-44":{"quick":"偏鄉平均壽命低於都會,是社會/地理造成的不公平差異,屬「健康不平等」。","detail":{"background":"「『健康不平等(health inequality / inequity)』」特指『因『社會、經濟、地理等可避免、不公平的因素』造成『不同社會群體間的健康差異』』(具社會不正義意涵)。本題:①「『偏鄉地區平均壽命低於都會』」——因『醫療可近性、社經資源等地理/社會因素』造成,屬『健康不平等』(B);②「老年人新冠死亡率高於年輕人(年齡的生物差異)」、「吸菸者肺癌率高於非吸菸者(行為因果)」屬『生物/行為差異』,非社會不公;③「高學歷者收入高於低學歷(收入差異)」非『健康』差異。故為偏鄉vs都會壽命差異。","options":{"A":"老vs年輕死亡率差異為年齡(生物)差異、非健康不平等。","B":"偏鄉壽命低於都會為社會/地理不公平差異(健康不平等)—正解。","C":"學歷與收入差異非「健康」不平等。","D":"吸菸與肺癌為行為因果、非健康不平等。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_115020-47":{"quick":"社會救助及社工司隨衛福部成立(2013),非民國106年之後成立。","detail":{"background":"衛生福利部(2013年/民國102年成立)下設6處10司。其中多數司隨組織成立或之後設立;而部分司為『民國106年後新增/調整成立』(如長期照顧司2018、心理健康司、口腔健康司等近年因應業務新增)。「『社會救助及社工司』」是隨衛福部『成立之初(2013)即設立』,『並非民國106年之後才成立』。故不是106年後成立者為社會救助及社工司(B)。","options":{"A":"長期照顧司為較晚(106年後)成立。","B":"社會救助及社工司隨衛福部成立、非106年後—正解。","C":"心理健康司為近年成立。","D":"口腔健康司為近年成立。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_115020-50":{"quick":"民眾繳納的罰款不是全民健保財源;政府稅收、雇主分擔、被保險人保費才是。","detail":{"background":"我國全民健保的『主要財源』:①「『被保險人(民眾)繳納的保險費』」;②「『雇主(投保單位)分擔的保險費』」;③「『政府的一般稅收補助』」(政府負擔部分保費與補助弱勢);此外尚有『補充保費、菸品健康福利捐挹注』等。「『民眾繳納的『罰款』』」並非健保的財源來源。故不是財源者為民眾繳納的罰款(B)。","options":{"A":"政府一般稅收為健保財源。","B":"民眾繳納的罰款不是健保財源—正解。","C":"雇主保險費分擔為健保財源。","D":"被保險人保險費為健保財源。"},"sources":["衛生政策與管理","醫療經濟學","公共衛生學"]}},"med2_106100-46":{"quick":"把「拒絕技巧」遷移運用到勸酒、邀毒等類似情境,屬學習的「類化原理」。","detail":{"background":"學習理論中,「『類化(generalization)』」指『在某情境學會的反應,能『遷移、應用到『類似』的新情境』』。本題學生透過價值澄清、角色扮演等學會『拒絕技巧』,日後遇到『別人勸酒、邀約吸毒』等『類似情境』也能運用——即把所學反應『類化』到相似刺激情境。互相抵制、逐減敏感(減敏)、增強原理是不同的學習概念。故為類化原理。","options":{"A":"互相抵制非此遷移概念。","B":"逐減敏感用於消除焦慮/恐懼反應。","C":"拒絕技巧遷移到類似情境=類化原理—正解。","D":"增強原理指以獎懲塑造行為。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_106100-47":{"quick":"「重視醫療技能」不是渥太華健康促進憲章的五大行動策略。","detail":{"background":"WHO「渥太華健康促進憲章(1986)」提出『五大行動策略』:①「『建立健康的公共政策』」;②「『創造(建立)支持性的環境』」;③「『強化社區行動(community action)』」;④「『發展個人技能』」;⑤「『調整(重新定位)健康服務方向』(從治療轉向預防與健康促進)」。「『重視『醫療技能』』」並非渥太華憲章的策略(其精神是『超越醫療、強調健康促進』)。故不是者為重視醫療技能。","options":{"A":"建立支持性環境為渥太華策略。","B":"強化社區健康行動為渥太華策略。","C":"擬定健康(公共)政策為渥太華策略。","D":"重視醫療技能非渥太華健康促進策略—正解。"},"sources":["健康促進與衛生教育","行為科學與健康行為理論","公共衛生學"]}},"med2_106100-48":{"quick":"PRECEDE模式中,評估病人對疾病的認知、態度屬「前傾(predisposing)因素」。","detail":{"background":"「PRECEDE-PROCEED模式」把影響健康行為的因素分三類:①「『前傾(傾向)因素(predisposing factors)』」——『行為發生『前』既存的『個人『知識、態度、信念、價值、認知』』』;②「『增強因素(reinforcing factors)』」——行為後來自他人(家屬、醫護)的回饋與獎勵;③「『使能因素(enabling factors)』」——使行為得以實現的『資源、技能、可近性』。本題評估病人對高血
