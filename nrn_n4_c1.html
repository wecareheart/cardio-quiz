註:依官方答案D=14。)","options":{"A":"(23)含先抽鼻腔(錯)。","B":"(14)? 此為D選項內容,本題D=14。","C":"(24)含先抽鼻腔(錯)。","D":"正確。抗生素眼膏預防淋菌結膜炎(1)+頭圍量法(4)。"},"sources":["Nelson《兒科學》新生兒護理","頭圍"]}},"111110-N4-28":{"quick":"新生兒臍帶照護中「酒精性優碘亦可使用於臍帶消毒且乾燥效果較酒精佳」為不適當。","detail":{"background":"臍帶照護:『出生24–48小時去除臍夾避免壓迫、『尿布反摺避免覆蓋促乾燥防感染』、『酒精消毒由根部『環狀向外』約直徑5公分』』皆適當。「『『酒精性優碘』用於臍帶消毒且『乾燥效果較酒精佳』』『不適當』——臍帶消毒『以『75%酒精』為主(優碘易使皮膚染色、可能經皮吸收影響甲狀腺、且乾燥效果非較佳)』」。本題不適當者為D。","options":{"A":"適當。出生24~48小時去除臍夾避免壓迫。","B":"適當。尿布反摺避免覆蓋臍帶促乾燥。","C":"適當。酒精由臍根部環狀向外消毒約5公分。","D":"不適當(本題答案)。臍帶消毒以75%酒精為主,非酒精性優碘。"},"sources":["Nelson《兒科學》臍帶照護","酒精"]}},"111110-N4-29":{"quick":"新生兒『晚期』飢餓暗示行為(late hunger cues)是「不斷哭泣」。","detail":{"background":"新生兒飢餓暗示行為分期:『早期(early)』——『吸吮嘴唇、舌頭伸出、尋乳動作、把手放進嘴巴、轉頭』;『晚期(late)』——『『不斷哭泣、煩躁不安、身體扭動激烈』(哭泣是『最晚』的飢餓訊號,此時已較難安撫含乳)』。應在『早期暗示即餵奶』,勿等到大哭。本題晚期飢餓暗示為「不斷哭泣」(B)。","options":{"A":"吸吮嘴唇為早期暗示。","B":"正確。不斷哭泣為晚期飢餓暗示(最晚訊號)。","C":"手放進嘴巴為早期暗示。","D":"尋乳動作為早期暗示。"},"sources":["Nelson《兒科學》飢餓暗示","早晚期"]}},"113100-N4-15":{"quick":"產婦「等寶寶哭才餵奶」,最適當指導是「寶寶有轉頭、舌頭伸出、吸吮動作出現就可以準備餵奶」。","detail":{"background":"依需求哺餵與飢餓暗示:應『在『早期飢餓暗示(轉頭尋乳、舌頭伸出、吸吮動作、手放嘴裡)』就準備餵奶』,『不要『等寶寶『大哭(晚期暗示)』』才餵』(哭時較難含乳、易吞氣)。最適當指導為「寶寶有轉頭、舌頭伸出、吸吮動作就準備餵奶」(B);非固定每2–3小時(應依需求)、非等大哭、非哭了先安撫睡著再餵。本題為B。","options":{"A":"錯。應依需求(早期暗示)餵,非固定每2~3小時。","B":"正確。轉頭、舌頭伸出、吸吮動作出現即準備餵奶。","C":"錯。不應等大哭才餵(哭是晚期暗示)。","D":"錯。哭了不應先安撫睡著(應依暗示餵奶)。"},"sources":["Nelson《兒科學》依需求哺餵","飢餓暗示"]}},"113100-N4-38":{"quick":"為病童執行抽吸技術,最適當的是「早產兒抽吸時間宜在6~8秒」。","detail":{"background":"抽吸(suction)技術:(1)『新生兒抽吸『先『口』後鼻』(先鼻刺激吸氣將口腔物吸入)』,故A錯;(2)『常規抽吸『不』需先滴生理食鹽水入氣管內管(僅特定濃痰時謹慎使用)』,故B不適當;(3)『嬰幼兒抽痰壓力約『60–100 mmHg』』(110–120過高),故C錯;(4)「『早產兒『單次抽吸時間宜短(約『5–10秒,6–8秒』)』』(過久致缺氧、心搏過緩)」——本題以D為最適當。本題最適當為「早產兒抽吸時間宜在6~8秒」(D)。","options":{"A":"錯。應先抽口腔再抽鼻腔。","B":"不適當。不常規滴生理食鹽水入氣管內管。","C":"錯。嬰幼兒抽痰壓力約60~100mmHg(非110~120)。","D":"正確。早產兒抽吸時間宜短(約6~8秒)。"},"sources":["Nelson《兒科學》抽吸技術","時間"]}},"101110-N4-59":{"quick":"產後第2天由關心自己轉移到新生兒、主動學習照顧,屬魯賓「緊執期(Taking-hold)」。","detail":{"background":"魯賓(Rubin)產後母性角色三期:接受期(Taking-in,產後1–2天,依賴被動、談論生產、注意力在自己)、緊執期(Taking-hold,產後3–10天,主動學習照顧新生兒與恢復身體功能)、放手期(Letting-go,接受孩子為獨立個體、重設家庭角色)。 本例『由『關心自己』『轉移到新生兒身上』、『主動參與學習照顧』』即典型『緊執期(Taking-hold)』。本題為「緊執期」(B)。","options":{"A":"接受期為依賴被動、注意力在自己。","B":"正確。轉移到新生兒、主動學習=緊執期。","C":"放手期為接受孩子獨立個體。","D":"獨立期非魯賓三期標準名稱。"},"sources":["新文京《產科護理學》魯賓","緊執期"]}},"101110-N4-66":{"quick":"含子宮蛻膜殘留、上皮細胞、紅白血球、偶有胎便胎脂胎毛的是「紅惡露(lochia rubra)」。","detail":{"background":"惡露成分與分期:『紅惡露(lochia rubra,產後1–3天)』——『含『血液、子宮蛻膜殘留、上皮細胞、紅白血球、『偶有胎便/胎脂/胎毛(殘留羊水成分)』』』、鮮紅;漿液性(粉紅褐,4–10天)血少含較多血清滲液;白惡露(白/淡黃,10天後)含白血球與黏液。本題為「紅惡露」(C)。","options":{"A":"漿性惡露血少、血清滲液多。","B":"粉紅惡露為過渡。","C":"正確。含蛻膜上皮血球偶有胎便胎脂胎毛=紅惡露。","D":"白惡露含白血球黏液,無胎便胎脂。"},"sources":["新文京《產科護理學》惡露","紅惡露"]}},"102030-N4-14":{"quick":"LOA(左枕前)內診時會發現「前囟門在孕婦薦骨的右側」。","detail":{"background":"胎方位LOA(Left Occiput Anterior,左枕前):胎兒『枕骨(後囟門)朝母體左前』,則『前囟門(額部)朝母體『右後(薦骨側)』』。內診觸診以『後囟門(枕)』為指標定位;LOA時枕在母體左前、前囟門相對在右後(薦骨右側)。本題LOA內診發現「前囟門在孕婦薦骨的右側」(C)。","options":{"A":"前囟門在恥骨左側對應枕後位類型,不符LOA。","B":"前囟門在恥骨右側不符。","C":"正確。LOA時前囟門在母體薦骨右側。","D":"前囟門在薦骨左側對應ROA。"},"sources":["新文京《產科護理學》胎方位","LOA"]}},"103100-N4-1":{"quick":"我國當前婦女健康政策與婦嬰照護理念正確的是「將生產主導權重新歸還產婦及其家庭成員」。","detail":{"background":"現代婦嬰照護理念(人性化/家庭中心):『『將生產主導權歸還產婦與家庭』、尊重自主與生產計畫、家庭參與、減少不必要醫療介入、『待產-分娩-恢復『同一單位(LDR)』』』。選項A(縮短住院避免浪費為主)、B(鼓勵居家生產)、D(三單位分開)皆不符現代理念。本題正確為「將生產主導權重新歸還產婦及其家庭成員」(C)。","options":{"A":"非以「避免醫療浪費」為縮短住院的主訴求。","B":"不鼓勵居家生產(安全考量)。","C":"正確。將生產主導權歸還產婦及家庭。","D":"錯。現代主張待產分娩恢復同一單位(LDR)。"},"sources":["新文京《產科護理學》婦嬰照護理念","家庭中心"]}},"104030-N4-22":{"quick":"親子同室特點說明中「減輕護理師照護嬰兒的負擔」為錯誤。","detail":{"background":"親子同室(rooming-in)特點:『及早讓父母了解新生兒作息、家庭式照顧、增加父母學習照顧技巧的機會、促進依附與哺乳』。「『減輕護理師照護負擔』『不是』親子同室的目的/特點——護理師仍須提供支持與衛教(非為省人力)」。本題「錯誤」者為C。","options":{"A":"正確。及早讓父母了解新生兒生活作息。","B":"正確。有利提供家庭式照顧。","C":"錯誤(本題答案)。減輕護理師負擔不是親子同室特點。","D":"正確。增加父母學習照顧技巧的機會。"},"sources":["新文京《產科護理學》親子同室","特點"]}},"104030-N4-28":{"quick":"產後與先生討論新生兒名字,是達成母性角色中的「提出所有權(claiming)」。","detail":{"background":"依附/母性角色行為:『認同行為(identification)』——指出寶寶像家庭某成員;『提出所有權(claiming)』——『以「『我的』寶寶」、『為寶寶『命名(取名字)』』等表達『寶寶屬於家庭/自己』』。本例『討論新生兒名字』屬『提出所有權(claiming)』。本題為「提出所有權」(D)。","options":{"A":"分極作用非此情境。","B":"確認行為(orienting)為熟悉新生兒外觀。","C":"認同行為為指出寶寶像誰。","D":"正確。討論命名=提出所有權(claiming)。"},"sources":["新文京《產科護理學》母性角色","claiming"]}},"104100-N4-1":{"quick":"「以家庭為中心」母育護理理念正確的是「婦女在整個待產、生產與產後過程都在同一個單位」。","detail":{"background":"家庭為中心母育護理:『『待產-生產-產後『同一單位(LDR/LDRP)』』、鼓勵家人參與生產與育兒、產後即刻親子接觸與同室、依需求哺餵、減少不必要分離與限制』。選項B(新生兒先在嬰兒室24小時)、C(限制親友與手足陪產)、D(住滿3天才出院)皆不符。本題正確為「整個待產生產產後在同一單位」(A)。","options":{"A":"正確。待產生產產後在同一單位(LDR)。","B":"錯。鼓勵產後即刻親子接觸與同室,非先送嬰兒室24小時。","C":"錯。鼓勵家人與手足參與,非限制。","D":"錯。低風險者可早期出院,非規定住滿3天。"},"sources":["新文京《產科護理學》家庭中心","LDR"]}},"105030-N4-1":{"quick":"婦嬰生命統計敘述中「嬰兒死亡率係指每年一千個活產嬰兒中未滿『28天』的死亡數」為錯誤。","detail":{"background":"婦嬰生命統計:『嬰兒死亡率=一年內『未滿『1歲(1年)』』嬰兒死亡數÷活產數×1000』(故「未滿28天」錯,那是『新生兒死亡率』);『新生兒死亡率=未滿28天(4週)』;『粗出生率=每千人口活產數』;『孕產婦死亡率=每十萬活產中懷孕期或產後42天內婦女死亡數』。本題「錯誤」者為「嬰兒死亡率指未滿28天」(D,應為未滿1歲)。","options":{"A":"正確。總生育率為育齡婦女平均生育子女數。","B":"正確。粗出生率為每千人口平均活產數。","C":"正確。孕產婦死亡率為每十萬活產中產後42天內死亡數。","D":"錯誤(本題答案)。嬰兒死亡率指未滿『1歲』,未滿28天是新生兒死亡率。"},"sources":["公共衛生 婦嬰統計","嬰兒死亡率"]}},"105030-N4-26":{"quick":"產後第3天主動學習新生兒沐浴技術,屬魯賓「緊執期(Taking-hold)」。","detail":{"background":"魯賓(Rubin)產後母性角色三期:接受期(Taking-in,產後1–2天,依賴被動、談論生產、注意力在自己)、緊執期(Taking-hold,產後3–10天,主動學習照顧新生兒與恢復身體功能)、放手期(Letting-go,接受孩子為獨立個體、重設家庭角色)。 本例『產後第3天、『主動學習新生兒沐浴(照顧技術)』』即典型『緊執期(Taking-hold,主動學習照顧)』。本題為「緊執期」(B)。","options":{"A":"接受期為依賴被動、談論生產。","B":"正確。主動學習新生兒沐浴=緊執期。","C":"放手期為接受孩子獨立個體。","D":"恢復期非魯賓三期標準名稱。"},"sources":["新文京《產科護理學》魯賓","緊執期"]}},"106030-N4-29":{"quick":"潛在適應不良徵兆是「看寶寶時皺著眉,哭著說『他看起來好可怕!』」。","detail":{"background":"親子依附/適應評估:正向——談論生產過程、撫摸寶寶、輕聲說話、眼對眼;『潛在『適應不良』徵兆』——『對寶寶『負面情緒/排斥(如「他看起來好可怕」)、皺眉、迴避接觸、冷漠』』,提示依附困難或產後情緒問題,需關注。本題潛在適應不良者為「皺眉、說寶寶可怕」(A)。","options":{"A":"正確(適應不良)。對寶寶負面情緒「他看起來好可怕」。","B":"與友人談論生產過程屬正常(接受期)。","C":"撫摸寶寶屬正向依附。","D":"觸摸並輕聲說話屬正向依附。"},"sources":["新文京《產科護理學》依附","適應不良"]}},"106111-N4-2":{"quick":"產後立即性肌膚接觸正確的是「讓新生兒嘗試用手去觸摸乳頭」。","detail":{"background":"產後立即肌膚接觸(skin-to-skin):『產後『立即(一小時內,不延遲)』讓新生兒『趴在母親胸腹、皮膚對皮膚』,『讓新生兒『自己尋乳、用手觸摸、爬向乳房含乳(乳爬)』』』——順應新生兒自發行為。「『讓新生兒『用手去觸摸乳頭』(自發尋乳)」正確;不應『硬把乳房塞入嘴、把新生兒直接壓在乳房上、延遲到1小時後』。本題正確為B。","options":{"A":"非「直接放置在乳房上」硬塞,應讓其自發尋乳。","B":"正確。讓新生兒用手觸摸乳頭(自發尋乳)。","C":"錯。應立即(一小時內)進行,非1小時之後。","D":"錯。不應努力把乳房塞入嘴(應讓其自發)。"},"sources":["新文京《產科護理學》肌膚接觸","乳爬"]}},"106111-N4-22":{"quick":"母親與新生兒親子連結進入『互惠期』的行為是「了解新生兒的飢餓飽食行為」。","detail":{"background":"親子連結(bonding)發展:初期『以指尖觸摸→手掌環抱→眼對眼→呼喚名字→表達看法』(認識熟悉階段);『互惠期(reciprocity/相互期)』——『母親能『解讀並『回應』新生兒的訊號(如『了解其『飢餓、飽食』等行為與需求』)』,形成雙向互動』。本題進入互惠期者為「了解新生兒的飢餓飽食行為」(C)。","options":{"A":"手指觸摸臉頰為初期認識階段。","B":"呼喚名字為初期。","C":"正確。了解並回應飢餓飽食行為=互惠期。","D":"表達對新生兒看法為初期。"},"sources":["新文京《產科護理學》親子連結","互惠期"]}},"106111-N4-26":{"quick":"親子同室護理指導正確的是「母親非常疲憊時可將嬰兒推回嬰兒室」。","detail":{"background":"親子同室:應『尊重母親狀態——『母親『非常疲憊』時『可彈性將嬰兒『暫送嬰兒室』讓母親休息』』(非僵化要求24小時不離)』;『祖父母等家人『洗手後『可』接觸寶寶(非避免)』』;『新生兒應『仰睡(非趴睡)』防猝死』;『出生『即刻』開始親子同室(非6小時後)』。本題正確為「母親非常疲憊時可將嬰兒推回嬰兒室」(C)。","options":{"A":"錯。出生即刻可開始親子同室,非6小時後。","B":"錯。祖父母洗手後可接觸寶寶。","C":"正確。母親非常疲憊時可暫將嬰兒推回嬰兒室休息。","D":"錯。應仰睡防猝死,非趴睡。"},"sources":["新文京《產科護理學》親子同室","彈性"]}},"107030-N4-1":{"quick":"我國婦嬰生命統計正確的是「粗出生率是指一年內每千位年中人口的平均活產數」。","detail":{"background":"婦嬰統計定義:『粗出生率=一年內『活產數÷年中人口×1000』(每千人口活產數)』——正確;『孕產婦死亡率=每『十萬『活產』』中懷孕期或產後42天內婦女死亡數』(非每一萬婦女);『新生兒死亡率=未滿28天死亡(非小於一年)』;『周產期=妊娠28週(或一定週數)至產後7天(非生產當日到產後一年)』。本題正確為「粗出生率為每千年中人口的活產數」(A)。","options":{"A":"正確。粗出生率為每千年中人口的平均活產數。","B":"錯。孕產婦死亡率以每十萬活產計,非每一萬婦女。","C":"錯。新生兒死亡率指未滿28天,非小於一年。","D":"錯。周產期約妊娠後期至產後7天,非到產後一年。"},"sources":["公共衛生 婦嬰統計","粗出生率"]}},"107030-N4-11":{"quick":"Apgar 7/8、即刻護理已完成、產婦會陰縫合中,首次親子互動最適當時機是「立即將新生兒放到產婦胸腹部進行親子接觸」。","detail":{"background":"產後即刻親子接觸:新生兒『Apgar良好(7/8)、狀態穩定』時,應『『立即(會陰縫合『同時』即可)』將新生兒放到產婦胸腹部『肌膚接觸』』(穩定體溫、促哺乳依附),『不需延後或先送嬰兒室』。會陰縫合可與肌膚接觸『同時』進行,不需等縫合後。本題最適當為「立即放到產婦胸腹部親子接觸」(D)。","options":{"A":"錯。新生兒狀態穩定,不需延後親子接觸。","B":"錯。不需先送嬰兒室(可立即肌膚接觸)。","C":"不需等會陰縫合後(可同時進行)。","D":"正確。立即放到產婦胸腹部進行親子接觸。"},"sources":["新文京《產科護理學》即刻接觸","肌膚接觸"]}},"108110-N4-54":{"quick":"「2025衛生福利政策白皮書」婦幼健康促進長程指標中「低出生體重比率降到2.0%」為錯誤。","detail":{"background":"政策指標數值判讀(2025白皮書婦幼健康長程指標方向):降低孕產婦死亡率、降低嬰兒死亡率、『提升6個月以下純母乳哺育率』、『降低『低出生體重』比率』。「『低出生體重比率『降到2.0%』』為要選出的『錯誤(數值不符)』」——我國低出生體重率約8–9%,目標『不可能降至2.0%』(數值過低不切實際)。本題「錯誤」者為C。","options":{"A":"符合方向。降低孕產婦死亡率。","B":"符合方向。降低嬰兒死亡率至約2.0‰。","C":"錯誤(本題答案)。低出生體重比率降到2.0%數值不切實際。","D":"符合方向。提升6個月以下純母乳哺育率。"},"sources":["衛福部政策白皮書","婦幼指標"]}},"109030-N4-13":{"quick":"產婦待產時的危險徵象是「羊水中有胎便」。","detail":{"background":"待產危險徵象(需警覺胎兒窘迫/異常):『羊水『胎便染色(綠/棕)』提示胎兒曾窘迫/缺氧』、晚期減速、變異性減速、胎心過慢、陰道大量出血。「『羊水中有胎便』為危險徵象」。子宮頸4cm破水、現血增加(產兆)、臍繞頸一圈(常見、未必危險)非『待產危險徵象』。本題危險徵象為「羊水中有胎便」(D)。","options":{"A":"子宮頸4cm破水屬產程進展,非危險徵象。","B":"現血增加為產兆。","C":"臍繞頸一圈常見,未必危險。","D":"正確。羊水有胎便提示胎兒曾窘迫,為危險徵象。"},"sources":["新文京《產科護理學》待產","胎便染色"]}},"109110-N4-22":{"quick":"父親初次不敢抱新生兒,最適當的是「鼓勵循序漸進,先撫觸嬰兒後再教導抱嬰兒技巧」。","detail":{"background":"促進父親依附:面對父親害怕抱新生兒,應『『同理其感受並『循序漸進』——『先鼓勵『撫觸』嬰兒、再『示範與教導『抱嬰兒技巧』』,逐步建立信心與依附』。不應只說「習慣就好」(未提供協助)、不應「改由產婦全權照顧」(剝奪父親參與)、不應只丟衛教而不顧其情緒。本題最適當為「先撫觸後教導抱嬰兒技巧」(B)。","options":{"A":"只說「習慣就好」未提供具體協助。","B":"正確。循序漸進:先撫觸後教導抱嬰兒技巧。","C":"錯。不應改由產婦全權照顧(剝奪父親參與)。","D":"只丟衛教而忽略其害怕情緒,不夠周全。"},"sources":["新文京《產科護理學》父親依附","循序漸進"]}},"109110-N4-23":{"quick":"母嬰分離(寶寶住院照光)時,『較不適當』於依附建立的是「為避免感染,新生兒住院期間不鼓勵媽媽探訪」。","detail":{"background":"母嬰分離時促進依附:『評估母親對復原與照護的擔心、運用支持資源、『鼓勵母親『探訪』並與新生兒『眼對眼、身體接觸』』』。「『為避免感染『不鼓勵媽媽探訪』』『較不適當』——適當的探訪與接觸『有助』依附,不應以感染為由阻止(教導手部衛生即可)」。本題較不適當者為B。","options":{"A":"適當。評估母親對復原與照護的擔心。","B":"較不適當(本題答案)。不應以感染為由不鼓勵母親探訪。","C":"適當。運用支持資源讓母親專注新生兒。","D":"適當。鼓勵母嬰眼對眼及身體接觸。"},"sources":["新文京《產科護理學》依附","母嬰分離"]}},"110030-N4-48":{"quick":"兒童疼痛概念敘述中「早產兒、新生兒不會覺得疼痛,因為傳導慢」為錯誤。","detail":{"background":"兒童疼痛認知:『早產兒與新生兒『『會』感受疼痛』(疼痛傳導路徑已存在,甚至對疼痛更敏感),『須給予減痛措施』』,故「早產兒新生兒不會覺得疼痛」錯誤。其餘:16個月幼兒對疼痛有記憶(看到針頭就哭)、5歲用語言與肢體表達疼痛、7歲可能將疼痛視為懲罰(學齡期認知)皆正確。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。早產兒新生兒『會』感受疼痛,須減痛。","B":"正確。16個月幼兒對疼痛有記憶。","C":"正確。5歲用語言與肢體表達疼痛。","D":"正確。7歲可能將疼痛視為錯誤行為的懲罰。"},"sources":["Nelson《兒科學》兒童疼痛","新生兒疼痛"]}},"111030-N4-17":{"quick":"第四產程護理措施中「將新生兒放置保溫箱讓產婦休息」為不適宜。","detail":{"background":"第四產程(產後1–2小時)護理:『監測產婦生命徵象與出血、子宮收縮;『鼓勵『親子『眼對眼接觸、肌膚接觸、觸摸寶寶』』、延後維生素K等非急迫處置先肌膚接觸、儘早哺乳』』。「『將新生兒『放置保溫箱』讓產婦休息』『不適宜』——此期應『促進親子接觸與肌膚接觸(母嬰同室)』,而非把新生兒隔離至保溫箱」。本題不適宜者為D。","options":{"A":"適宜。鼓勵產婦與寶寶眼對眼接觸。","B":"適宜。包布覆蓋保暖並鼓勵觸摸寶寶。","C":"適宜。延後維生素K先進行肌膚接觸。","D":"不適宜(本題答案)。應促親子接觸,非放保溫箱隔離。"},"sources":["新文京《產科護理學》第四產程","親子接觸"]}},"111110-N4-36":{"quick":"更年期熱潮紅敘述中「與『黃體素』的減少有關」為錯誤——主要與『雌激素(動情素)』減少有關。","detail":{"background":"更年期熱潮紅(hot flash):『主要與『『雌激素(動情素)』『減少』』致『下視丘體溫調節中樞不穩、血管『舒縮(舒張與收縮)不穩定』』有關』,表現突發潮紅、發熱、流汗(藉流汗發熱降溫);『體重過輕者(脂肪少、雌激素更低)症狀更嚴重』。「『與『黃體素』減少有關』錯誤——主要是『雌激素』減少」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。熱潮紅主要與『雌激素』減少有關,非黃體素。","B":"正確。起因於血管舒張與收縮間不穩定。","C":"正確。藉流汗、發熱來降低體溫。","D":"正確。體重過輕者熱潮紅症狀更嚴重。"},"sources":["新文京《產科護理學》更年期","熱潮紅"]}},"112030-N4-9":{"quick":"OHSS住院安胎、忍受不適配合治療、覺得值得,屬懷孕期母性發展任務「確保自己及胎兒安全(1)＋學習貢獻自己(3)」,即13。","detail":{"background":"懷孕期母性發展任務(Rubin):『(1)確保自己與胎兒在懷孕中『安全順利』度過』、『(2)使重要家人『接受』新生兒』、『(3)『學習『貢獻(奉獻)自己』』(願為胎兒犧牲忍受不適)』、『(4)與胎兒『連成一體(依附)』』。本例『忍受OHSS不適、努力配合治療、覺得值得』=『(1)確保安全』＋『(3)學習貢獻自己』即13(C)。","options":{"A":"(12)缺「學習貢獻自己」。","B":"(23)缺「確保安全」。","C":"正確。確保自己及胎兒安全(1)+學習貢獻自己(3)。","D":"(34)缺「確保安全」。"},"sources":["新文京《產科護理學》懷孕母性任務","Rubin"]}},"112110-N4-1":{"quick":"嬰兒死亡率為「一年內未滿1歲之嬰兒死亡數÷當年出生活嬰總數×1,000」。","detail":{"background":"嬰兒死亡率(infant mortality rate)=『一年內『未滿『1歲(1年)』』的嬰兒死亡數÷當年活產嬰兒總數×1000』。『未滿4週(28天)是『新生兒』死亡率』。本題嬰兒死亡率為「未滿1歲死亡數÷活嬰×1000」(D)。","options":{"A":"未滿4週是新生兒死亡率。","B":"未滿42天非標準嬰兒死亡率定義。","C":"未滿6個月非標準。","D":"正確。未滿1歲嬰兒死亡數÷活嬰×1000。"},"sources":["公共衛生 嬰兒死亡率","定義"]}},"112180-N4-1":{"quick":"婦嬰生命統計正確的是「孕產婦死亡率為每十萬活產嬰兒中,於妊娠期間或妊娠終止後42天內死亡之婦女人數」。","detail":{"background":"婦嬰統計:『孕產婦死亡率=每『十萬『活產』』中,『妊娠期間或妊娠終止後『42天』內』死亡的婦女數』——正確;『粗出生率=每『千』人口活產數(非十萬)』;『新生兒死亡率=未滿『28天(4週)』死亡(非未滿1歲)』;『周產期死亡率=妊娠『28週(一定週數)以上死胎＋活產後『7天(1週)』內死亡』(非40週以上、產後4週)』。本題正確為B。","options":{"A":"錯。粗出生率為每『千』人口(非十萬)。","B":"正確。孕產婦死亡率為每十萬活產中妊娠或產後42天內死亡婦女。","C":"錯。新生兒死亡率指未滿28天,非未滿1歲。","D":"錯。周產期約妊娠28週以上死胎+產後7天內死亡,非40週/產後4週。"},"sources":["公共衛生 婦嬰統計","孕產婦死亡率"]}},"113100-N4-18":{"quick":"新生兒過渡期執行即刻母嬰肌膚接觸的最佳時機是「第一反應期,新生兒清醒且吸吮反射強」。","detail":{"background":"新生兒過渡期反應:『第一反應期(出生–約30分鐘)』——『新生兒『清醒、活躍、『吸吮反射強』』』,『是執行『即刻母嬰肌膚接觸與第一次哺乳』的『最佳時機』』(把握其清醒尋乳);相對不反應期(隨後睡眠);第二反應期(2–6小時再活躍)。本題最佳時機為「第一反應期,新生兒清醒且吸吮反射強」(B)。","options":{"A":"相對不反應期新生兒睡眠,非最佳。","B":"正確。第一反應期清醒、吸吮反射強,為最佳肌膚接觸時機。","C":"第二反應期非即刻接觸的首選。","D":"「絕對反應期」非標準名稱。"},"sources":["Nelson《兒科學》過渡期","第一反應期"]}},"113100-N4-33":{"quick":"30週早產兒於NICU,強化親子依附較適當的是「劉小弟病情穩定時,鼓勵雙親參與照顧」。","detail":{"background":"早產兒(NICU)親子依附:應『『鼓勵雙親『參與照顧(在病情穩定下)』、袋鼠式護理、撫觸、誠實說明病況、回答疑問』』。「『病情穩定時『鼓勵雙親參與照顧』』最適當。不應只說「醫療團隊很強放心」(未促進親子參與)、不應迴避回答儀器疑問、不應嚴格限制探視(適當參與有助依附)。本題較適當為C。","options":{"A":"只說「放心」未促進親子參與。","B":"錯。不應迴避回答醫療儀器疑問。","C":"正確。病情穩定時鼓勵雙親參與照顧。","D":"錯。不應嚴格限制探視(適當參與有助依附)。"},"sources":["新文京《產科護理學》早產兒依附","參與照顧"]}},"114170-N4-5":{"quick":"懷孕16週對大寶說未來可一起溜滑梯,屬魯賓母性任務「使重要家人接受新生兒」。","detail":{"background":"懷孕期母性任務(Rubin):『確保自己與胎兒安全』、『『使重要家人(含手足)『接受』新生兒』』、『學習貢獻自己』、『與胎兒連成一體』。本例『對『大寶(手足)』描述未來可與小寶一起玩』=『『協助家人(手足)接受新生兒』』。本題為「使重要家人接受新生兒」(B)。","options":{"A":"確保安全為孕期關注自身與胎兒安危。","B":"正確。對大寶描述未來=使重要家人(手足)接受新生兒。","C":"學習貢獻自己為願為胎兒犧牲。","D":"與寶寶連成一體為依附胎兒。"},"sources":["新文京《產科護理學》懷孕母性任務","家人接受"]}},"115030-N4-15":{"quick":"屬於魯賓「接受期(taking-in)」的行為是「注意力集中在自己身上」。","detail":{"background":"魯賓(Rubin)產後母性角色三期:接受期(Taking-in,產後1–2天,依賴被動、談論生產、注意力在自己)、緊執期(Taking-hold,產後3–10天,主動學習照顧新生兒與恢復身體功能)、放手期(Letting-go,接受孩子為獨立個體、重設家庭角色)。 『接受期(Taking-in,產後1–2天)』特色:『『依賴、被動』、『注意力『集中在自己』』、反覆談論生產經驗、需被照顧與休息』。本題接受期行為為「注意力集中在自己身上」(B);主動關心新生兒(A)、接受孩子是獨立個體(C)、積極尋求意見(D)較屬緊執期或放手期。本題為B。","options":{"A":"主動關心新生兒屬緊執期。","B":"正確。注意力集中在自己=接受期。","C":"接受孩子是獨立個體屬放手期。","D":"積極尋求意見偏緊執期(主動學習)。"},"sources":["新文京《產科護理學》魯賓","接受期"]}},"115030-N4-30":{"quick":"兒童健康評估中顯示『發展異常』的是「1.5歲已長齊20顆乳牙」。","detail":{"background":"兒童發展正常 vs 異常:(1)『出生3個月仍有生理性斜視(眼外肌協調未成熟)『正常』』;(2)「『1.5歲(18個月)『長齊20顆乳牙』」『異常』——乳牙約『6個月開始萌出,『2.5–3歲』才長齊20顆』,1.5歲就長齊過早(發展異常/須評估)」;(3)『3–4歲生理性膝外翻/內翻屬正常發展階段』;(4)『前囟門約12–18個月關閉,4歲已關閉正常』。本題發展異常者為「1.5歲已長齊20顆乳牙」(B)。","options":{"A":"正常。出生3個月仍有生理性斜視。","B":"正確(異常)。乳牙約2.5~3歲才長齊20顆,1.5歲過早。","C":"正常。3~4歲生理性膝部變化。","D":"正常。前囟門約12~18個月關閉,4歲已關閉。"},"sources":["Nelson《兒科學》兒童發展","乳牙萌出"]}}},TO=["1新生兒過渡期與心臟血管循環調適", "2Apgar評分與新生兒即刻護理", "3新生兒體溫調節與保溫", "4新生兒黃疸", "5新生兒身體評估反射與皮膚", "6新生兒成熟度評估與早產足月特徵", "7早產兒照護與併發症", "8新生兒產傷", "9新生兒餵養營養與體重", "10新生兒疾病感染與篩檢", "11新生兒沐浴臍帶安全與暗示行為", "12母嬰照護理念母性適應與婦嬰統計政策"],LEC={"1新生兒過渡期與心臟血管循環調適":{"html":"<p><b>出生後循環轉換</b>:第一次呼吸→<b>肺擴張、肺血管阻力『下降』、肺血流增</b>;臍帶結紮→<b>體循環阻力『上升』、主動脈壓增</b>;左心房壓>右心房→<b>卵圓孔功能性關閉</b>;血氧『上升』→<b>動脈導管收縮關閉</b>。殘餘構造:臍『靜脈』→肝圓韌帶、靜脈導管→靜脈韌帶、動脈導管→動脈韌帶。動脈導管約2~4天功能性、1~3月解剖性關閉。</p><p><b>胎兒循環</b>:臍帶=2條臍『動脈』(缺氧血,胎兒→胎盤)+1條臍『靜脈』(充氧血);卵圓孔在左右『心房』間。</p><p><b>第一次呼吸影響因素</b>:化學刺激(CO₂↑O₂↓pH↓)、溫度觸覺、肺液清除、肺彈性、<b>表面張力素(surfactant)</b>。</p><p><b>過渡期(出生–6小時)</b>:第一反應期(清醒活躍、吸吮反射強=肌膚接觸/首次哺乳最佳時機)→相對不反應期(睡)→第二反應期(2~6h再活躍、腸蠕動增、解胎便)。<u>黃疸在24小時內出現為異常(病理性)</u>。睡眠-活動狀態:安靜睡眠期(無表情、呼吸規律、偶驚嚇/吸吮)、安靜清醒期(眼亮、注意環境、呼吸規律=互動最佳)。</p>"},"2Apgar評分與新生兒即刻護理":{"html":"<p><b>Apgar評分</b>五項各0~2分(總0~10):<b>心跳、呼吸、肌肉張力、反射激惹性、膚色</b>(<u>不含體溫、體重、血氧</u>);出生<b>第1、5分鐘</b>評估。判讀7~10正常、4~6中度窘迫、0~3嚴重需急救。膚色「中央粉紅末梢發紺」=1分。</p><p><b>即刻護理</b>:保暖擦乾、清呼吸道(先口後鼻)、<b>肌注維生素K1防出血</b>、<b>點紅黴素眼膏防淋菌結膜炎</b>(含碘消毒會影響『甲狀腺』篩檢非PKU)、Apgar評估、身分手圈、母嬰肌膚接觸。</p>"},"3新生兒體溫調節與保溫":{"html":"<p><b>體熱喪失四機轉與預防</b>:<b>傳導</b>(接觸冰冷物→預熱物品/磅秤紙)、<b>對流</b>(冷空氣流動→避風調室溫)、<b>輻射</b>(冷牆窗→嬰兒床遠離)、<b>蒸發</b>(體表水分→擦乾羊水、延後沐浴)。新生兒體表面積大、皮下脂肪少、以<b>棕色脂肪(非顫抖)</b>產熱,易低體溫。</p><p><b>保溫措施</b>:<b>母嬰肌膚接觸(首選)</b>、戴帽(頭部散熱大)、預熱布單、保溫箱/輻射台、極早早產兒<b>提高濕度</b>(>60%減蒸發散熱)、塑膠膜覆蓋。輕度低溫(36°C末梢冷)首選肌膚接觸。</p>"},"4新生兒黃疸":{"html":"<p><b>生理性黃疸</b>:出生<b>2~3天後</b>出現、3~4天高峰、足月7~10天消退(早產兒久、發生率高)、上升<5mg/dL/天。因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。增加哺餵促排出。</p><p><b>病理性黃疸</b>:<b>24小時內出現</b>、上升過快、過高過久,常因<b>血型不合溶血</b>(ABO:母O型胎兒A/B型,可第一胎;Rh:母陰胎陽,多第二胎)、感染、G6PD。過高未結合膽紅素→<b>核黃疸</b>腦損(聽損、發展遲緩)。</p><p><b>母乳相關黃疸</b>:早發型(哺餵性,第1週內,哺餵不足)→<u>增加哺餵</u>;晚發型(母乳性,1週後)。<u>皆不需停母乳</u>。</p><p><b>照光療法</b>:使未結合膽紅素<b>光異構化</b>成水溶性排出;護理=<b>戴不透光眼罩、遮生殖器、增加約25%水分</b>(防脫水)、定時翻身、副作用(體溫升、腹瀉、紅疹,<u>非便秘</u>)、採血/餵奶可暫停。</p><p><b>換血</b>:新鮮血或<72小時血(防鉀高)、加溫35~37°C、每換100mL注射1mL 10%葡萄糖酸『鈣』防低血鈣、白蛋白於換血『前』給、導管入臍『靜脈』、Rh不合用O型Rh『陰性』血。</p>"},"5新生兒身體評估反射與皮膚":{"html":"<p><b>生命徵象</b>:體溫36.5~37.5°C、心跳120~160、呼吸30~60(<b>腹式</b>、不規律、可<5秒呼吸暫停)。心尖聽診於<b>左鎖骨中線第3~4肋間</b>。</p><p><b>原始反射</b>:尋乳(觸嘴角轉向張嘴)、吸吮、<b>摩洛/擁抱(姿勢改變致四肢對稱外展伸直C字形)</b>、抓握、巴賓斯基。<b>終生反射</b>:眨眼、吞嚥、作嘔、咳嗽。</p><p><b>囟門</b>:前囟門菱形(二額二頂骨)約<b>12~18個月</b>關閉;後囟門三角形(二頂+枕骨)約<b>2~3個月</b>關閉。<u>凹陷=脫水、凸出=顱內壓升</u>。</p><p><b>頭部</b>:矢狀縫合(兩頂骨間連前後囟門)、冠狀縫合(額骨與頂骨間);molding(頭骨重疊,數天~數週恢復)。</p><p><b>皮膚</b>:正常=胎脂、蒙古斑(薦臀,兒童早期消退)、毒性紅斑(自限不需治療)、<b>肢端發紺(末梢循環未成熟)</b>;異常=<b>葡萄酒色斑(血管畸形,恐Sturge-Weber)、24小時內黃疸、對光不反應</b>。新生兒淚腺未成熟哭時無淚、暫時性斜視為正常。</p>"},"6新生兒成熟度評估與早產足月特徵":{"html":"<p><b>New Ballard Score</b>(神經肌肉+身體成熟度),最佳評估<b>出生24小時內</b>。</p><p><b>愈成熟(足月)</b>:姿勢屈曲、<b>方形窗角度愈小(0°最成熟)</b>、膝膕角小、圍巾徵象手肘<b>不過</b>中線、足跟<b>不易</b>到耳、足底皺褶滿佈、乳暈突起有乳核、耳軟骨硬可回彈、皮膚厚不透明、大陰唇覆蓋陰蒂、睪丸下降陰囊皺褶多。</p><p><b>早產兒</b>:四肢低張伸展、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、<b>胎毛多(27~28週最多)</b>、乳暈平坦、陰蒂突出大陰唇平坦。</p><p><b>出生體重分類</b>:AGA(第10~90百分位)、SGA(<10)、LGA(>90);LBW<2500g、VLBW<1500g、ELBW<1000g。<b>L/S ratio≥2+磷脂甘油(PG)</b>評估胎兒肺成熟。</p>"},"7早產兒照護與併發症":{"html":"<p><b>體溫</b>:保溫箱(較高溫、<b>高濕度>60%</b>)、塑膠膜、戴帽、集中護理減離箱、<b>袋鼠式護理(穩定者鼓勵)</b>。</p><p><b>呼吸窘迫症候群(RDS)</b>:表面張力素缺乏,出生30分~2小時內漸現:呼吸>60、鼻翼搧動、肋間凹陷、<b>呼氣呻吟</b>、發紺。</p><p><b>呼吸暫停(apnea)</b>:≥20秒/伴心搏過緩→先<b>觸覺刺激(輕揉背部足底)</b>,無效再給氧/通氣;<u>不常規給高濃度氧(增ROP)</u>。</p><p><b>ROP(視網膜病變)</b>:<32週、<b>長期高濃度氧</b>致視網膜血管異常增生;矯正胎齡31~34週或出生4~6週起篩檢。</p><p><b>NEC(壞死性小腸結腸炎)</b>:餵食後<b>腹脹、吐奶(含膽汁)、血便</b>→禁食胃減壓抗生素。</p><p><b>發展性照護</b>:袋鼠式、包巾築巢(屈曲向中線/寧握)、減光減噪、夜間覆布罩調日夜節律、集中護理。抽吸先口後鼻、管徑5~8Fr、壓力60~100mmHg、單次≤5~10秒。</p>"},"8新生兒產傷":{"html":"<p><b>產瘤(胎頭腫塊,caput succedaneum)</b>:頭皮<b>軟組織水腫</b>、界線不清、<b>可越骨縫線</b>、出生時最明顯、<b>數天</b>消退。</p><p><b>頭血腫(cephalohematoma)</b>:<b>骨膜下出血</b>、界線清楚、<b>不越骨縫線</b>、可單/雙側、出生後數小時~數天才漸明顯、數週~數月吸收、<b>可致黃疸</b>。</p><p><b>臂神經叢麻痺(Erb,C5~6)</b>:肩難產/巨嬰,患肢內收內旋(侍者手)、<b>Moro反射不對稱、抓握反射存在</b>;維持外展外轉肘屈前臂後旋腕背屈的功能姿勢。</p><p><b>顏面神經麻痺(產鉗)</b>:患側臉無力、<b>眼瞼不能閉合(單眼眼罩護角膜)</b>、口角歪;哺乳<b>患側</b>靠近乳房、用軟而洞大奶嘴。</p><p><b>鎖骨骨折(巨嬰/難產)</b>:患側Moro不對稱、局部腫痛、雙臂不等長肩不等高。</p>"},"9新生兒餵養營養與體重":{"html":"<p><b>生理性體重減輕</b>:出生3~4天降<b>5~10%(<10%)</b>(無感水分喪失、排胎便尿、初期吸奶少),約<b>7~10天恢復</b>出生體重;增加哺餵即可,<u>降>10%為異常</u>。</p><p><b>奶量計算</b>:每日熱量約110~120kcal/kg,配方奶約67kcal/100mL(0.67kcal/mL);每日量=熱量÷0.67÷餵食次數。</p><p><b>消化生理</b>:<b>賁門括約肌鬆易溢奶</b>(餵後拍嗝、右側臥/頭高,<u>非左側臥</u>)、胃排空快(2~3h少量多餐)、消化酶不足、<b>出生24小時內解胎便</b>(24~48小時未解須查)、3~4個月才自主控制吞嚥。</p><p><b>初乳</b>:黃黏稠、蛋白質礦物質IgA高、脂肪醣較低、輕瀉促胎便排出減黃疸。<b>維生素K缺乏</b>(腸道無菌不能合成、不易過胎盤、肝未成熟)→肌注維生素K1。</p>"},"10新生兒疾病感染與篩檢":{"html":"<p><b>新生兒篩檢</b>(足跟血):<b>出生滿48小時+完全腸道進食24小時後</b>採;穿刺<b>足跟外側兩側</b>(避跟骨神經)、熱敷3~10分、<b>擦去第一滴取第二滴</b>、<u>不可用力擠壓</u>。項目:PKU、先天甲狀腺低下、半乳糖血症、G6PD、CAH、MMA…(<u>唐氏症屬產前染色體篩檢,非代謝篩檢</u>)。</p><p><b>代謝疾病飲食</b>:PKU限高蛋白(苯丙胺酸);半乳糖血症<b>禁母乳/乳糖,用無乳糖配方</b>;先天甲狀腺低下用L-thyroxine(終生);CAH失鹽型<b>補鹽</b>+皮質醇。<b>G6PD(蠶豆症)</b>=X性聯隱性(母傳男嬰),避蠶豆/樟腦/aspirin。</p><p><b>感染</b>:B肝母帶原(尤e抗原陽性)→出生24小時內HBIG+疫苗;淋病母→新生兒眼炎(紅黴素眼膏);<b>鵝口瘡</b>(念珠菌,白膜不易刮除)用nystatin;<b>IgM升高提示子宮內感染</b>。巨嬰/糖尿病母兒→<b>低血糖</b>(儘早測血糖餵食)。</p><p><b>胎便吸入症候群(MAS)</b>:足月/過期、羊水胎便、皮膚指甲染色;<u>須先抽吸清除胎便『再』正壓通氣,不可立即加壓給氧</u>。<b>先天巨結腸症</b>:24小時內無胎便、嘔吐含膽汁、慢性便秘絲帶狀糞便。</p>"},"11新生兒沐浴臍帶安全與暗示行為":{"html":"<p><b>沐浴</b>:餵奶前或餵後1小時(防溢吐)、控制室溫、<b>由乾淨到污染、先臉(眼內眥往外)→頭→軀幹→四肢→會陰</b>;女嬰會陰由上往下(前往後);臍帶用<b>75%酒精</b>非優碘。</p><p><b>臍帶照護</b>:保持<b>清潔乾燥、暴露空氣</b>、尿布反摺於臍下、<b>75%酒精由根部環狀向外</b>、自然脫落(<u>勿手移除</u>)、膿性紅腫異味才是感染。</p><p><b>安全</b>:不離視線、核對<b>身分手圈</b>、不明人士按警示鈴。</p><p><b>暗示行為</b>:投入性(注視微笑想互動)、脫離性(<b>臉轉開</b>、屈曲僵硬、想休息);飢餓<b>早期</b>(轉頭尋乳、舌伸出、手放嘴)→<b>晚期(哭泣)</b>;吃飽(睡著、推開、臉放鬆、吸吮減少)。<u>依早期暗示餵奶,勿等大哭</u>。</p>"},"12母嬰照護理念母性適應與婦嬰統計政策":{"html":"<p><b>魯賓(Rubin)母性角色三期</b>:接受期(1~2天,依賴被動、談生產、注意力在自己)、緊執期(3~10天,主動學習照顧與恢復身體)、放手期(接受孩子獨立個體)。<b>懷孕期母性任務</b>:確保安全、使家人接受新生兒、學習貢獻自己、與胎兒連成一體。</p><p><b>依附(bonding)</b>:認同行為(寶寶像誰)、提出所有權(我的寶寶、命名)、互惠期(解讀並回應飢餓飽食訊號);<u>負面情緒/迴避接觸=潛在適應不良</u>。促父親依附:先撫觸後教抱嬰兒。</p><p><b>家庭中心/人性化照護</b>:待產-生產-產後同一單位(LDR)、生產主導權歸還產婦家庭、即刻肌膚接觸、24h母嬰同室、依需求哺餵、減少不必要介入。</p><p><b>婦嬰生命統計</b>:粗出生率=每『千』人口活產數;孕產婦死亡率=每『十萬』活產中妊娠或產後42天內死亡婦女;<b>新生兒死亡率=未滿28天</b>;<b>嬰兒死亡率=未滿1歲</b>;周產期=妊娠28週以上死胎+產後7天內死亡。</p><p><b>更年期熱潮紅</b>:<b>雌激素減少</b>致血管舒縮不穩(非黃體素)。新生兒/早產兒<b>會感受疼痛</b>須減痛。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c1_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
