s":"normal","accepted_answers":["B"],"topic":"12母嬰照護理念母性適應與婦嬰統計政策","topic_num":"新生兒照護與新生兒疾病","topic_code":"C1","q_num":15,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"主動關心新生兒的需要","B":"注意力集中在自己身上","C":"接受新生兒是一獨立個體","D":"積極尋求別人的意見"},"img":""},{"id":"115030-N4-30","code":"115030","roc":"115","cat":"N4","catname":"產兒科護理學","num":30,"stem":"有關兒童之健康評估結果,下列敘述何者顯示發展異常?","opts":{"A":"出生3 個月大仍有生理性斜視","B":"1.5 歲已長齊20 顆乳牙","C":"3 至4 歲時有膝內翻","D":"4 歲兒童的前囟門已關閉"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"12母嬰照護理念母性適應與婦嬰統計政策","topic_num":"新生兒照護與新生兒疾病","topic_code":"C1","q_num":30,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"出生3 個月大仍有生理性斜視","B":"1.5 歲已長齊20 顆乳牙","C":"3 至4 歲時有膝內翻","D":"4 歲兒童的前囟門已關閉"},"img":""}],E={"101110-N4-23":{"quick":"胎兒出生後心臟血管改變錯誤的是「肺臟血管阻力增加」(A)。","detail":{"background":"出生後肺擴張、血氧上升,「肺血管阻力下降」(非增加)使肺血流增加,故A錯誤。其餘正確:臍帶結紮使全身(體循環)血管阻力增高、臍靜脈閉合形成肝圓韌帶、左心房壓升高使卵圓孔功能性閉合。　補充：出生後肺臟擴張使肺血管阻力「下降」、肺血流增加；左心房壓上升致卵圓孔功能性關閉，臍帶結紮後體循環阻力上升，動脈導管於出生後數小時至數天收縮閉合，靜脈導管亦閉鎖。","options":{"A":"錯誤(本題答案)。出生後肺血管阻力下降(非增加)。","B":"正確。臍帶結紮使全身血管阻力增高。","C":"正確。臍靜脈閉合形成肝圓韌帶。","D":"正確。卵圓孔出生後功能性閉合。"},"sources":["新文京《兒科護理學》出生循環","肺阻力降"]}},"102110-N4-25":{"quick":"胎兒出生後心臟血管變化正確的是「切斷臍帶,致肝臟及下腔靜脈血液減少,出生1週內靜脈導管功能性閉合」(C)。","detail":{"background":"臍帶結紮使臍靜脈血流停止,肝臟與下腔靜脈血流減少,「靜脈導管於出生後約1週功能性閉合」(後形成靜脈韌帶)。卵圓孔閉合是「左心房壓升高」(非右側壓上升,A錯);主動脈壓「上升」(B錯);動脈導管約「出生後10~15小時~數天」功能性閉合(D的15小時是肺動脈導管敘述不精確),故C正確。","options":{"A":"錯。卵圓孔閉合是左心房壓升高(非右側上升)。","B":"錯。主動脈壓上升(非下降)。","C":"正確。臍帶切斷後靜脈導管約1週功能性閉合。","D":"動脈導管閉合時程敘述不精確(此題以C為答)。"},"sources":["新文京《兒科護理學》出生循環","靜脈導管"]}},"103030-N4-28":{"quick":"不是影響新生兒第一次呼吸因素的是「肺微血管彈性」(A)。","detail":{"background":"影響第一次呼吸的因素:肺黏液稠度(影響清除)、肺(胸廓)容量彈性、表面張力素的製造能力、化學(CO2上升O2下降)與物理(冷、觸覺)刺激。「肺微血管彈性」非影響第一次呼吸的關鍵因素,故A不是。　補充：影響新生兒第一次呼吸的因素包括化學性(低氧、高二氧化碳、酸中毒刺激呼吸中樞)、機械性(產道擠壓排出肺液)、溫度與感覺刺激；肺微血管彈性並非啟動因素。","options":{"A":"不是(本題答案)。肺微血管彈性非影響第一次呼吸的因素。","B":"是。肺黏液稠度(影響清除與擴張)。","C":"是。肺(胸廓)容量彈性。","D":"是。製造肺泡表面張力素的能力。"},"sources":["新文京《兒科護理學》首次呼吸","表面張力素"]}},"104030-N4-25":{"quick":"新生兒出生後循環系統變化正確的是「主動脈血壓增加」(A)。","detail":{"background":"出生後體循環阻力增加使「主動脈(體循環)血壓上升」。肺血管阻力「下降」(非增加,B錯);動脈導管未閉時血是「主動脈→肺動脈(左至右)」(非肺動脈→主動脈,C錯);肺血流回左心房使「左心房壓上升、右心房壓下降」(非右心房壓增加,D錯),故A正確。","options":{"A":"正確。主動脈(體循環)血壓增加。","B":"錯。肺部血管阻力下降(非增加)。","C":"錯。動脈導管血流是主動脈→肺動脈(非肺動脈→主動脈)。","D":"錯。右心房壓下降(非增加)。"},"sources":["新文京《兒科護理學》出生循環","主動脈壓"]}},"105090-N4-48":{"quick":"不是胎兒動脈導管發展變化的是「出生後,肺動脈壓上升導致動脈導管收縮而關閉」(A)。","detail":{"background":"動脈導管關閉是因「出生後血氧分壓(PaO2)上升」使導管平滑肌收縮,加上前列腺素下降,而非「肺動脈壓上升」(出生後肺血管阻力與肺動脈壓是下降),故A錯誤。其餘正確:約出生後2~4天功能性關閉、1~3個月解剖性關閉、之後萎縮成動脈韌帶。","options":{"A":"不是(本題答案)。動脈導管關閉是血氧上升所致(非肺動脈壓上升)。","B":"是。出生後約2~4天功能性關閉。","C":"是。出生後約1~3個月解剖性關閉。","D":"是。出生3個月後萎縮成動脈韌帶。"},"sources":["新文京《兒科護理學》動脈導管","血氧上升"]}},"106111-N4-30":{"quick":"正常新生兒生理調適正確的是「新生兒出生後3~5個月鐵質足夠,不需要補充鐵質」(B)。","detail":{"background":"新生兒體內有母體儲存的鐵,約「出生後4~6個月(3~5個月)鐵質足夠」,之後才需從副食品補鐵。腸道無菌致維生素K低(此敘述方向對但B更正確);糖尿病母親新生兒易「低血糖」(非高血糖,C錯);IgG(非IgA)可通過胎盤(D錯),故B正確。","options":{"A":"未進食前腸道無菌、維生素K低(此敘述部分對但非最佳)。","B":"正確。出生後3~5個月儲存鐵足夠,暫不需補鐵。","C":"錯。糖尿病母親新生兒易低血糖(非高血糖)。","D":"錯。可過胎盤的是IgG(非IgA)。"},"sources":["新文京《兒科護理學》新生兒","儲存鐵"]}},"107110-N4-28":{"quick":"新生兒出生2~6小時過渡期常出現的生理現象異常的是「黃疸出現」(D)。","detail":{"background":"出生2~6小時(第一/第二反應期)正常出現「心跳呼吸速率變化大、腸蠕動增加、解胎便」。「黃疸」若在出生「24小時內」出現屬病理性黃疸(異常),故D(過渡期即出現黃疸)異常。　補充：新生兒出生2~6小時為過渡期，可見短暫呼吸心跳加快、肢端發紺、腸蠕動音出現、口腔分泌物增多等；「黃疸」於24小時內出現屬病理性、非過渡期正常現象。","options":{"A":"正常。過渡期心跳及呼吸速率變化大。","B":"正常。腸蠕動增加。","C":"正常。解胎便。","D":"異常(本題答案)。24小時內出現黃疸是病理性(異常)。"},"sources":["新文京《兒科護理學》過渡期","黃疸"]}},"108020-N4-10":{"quick":"胎血循環正確的是「臍動脈內含缺氧血」(C)。","detail":{"background":"胎兒循環:「臍靜脈(1條)含充氧血」回胎兒,「臍動脈(2條)含缺氧血」送回胎盤。臍帶含「2條動脈1條靜脈」(非2靜脈1動脈,A錯);卵圓孔是連接「左右心房」(非心室,D錯),故C正確。　補充：胎兒循環中臍「靜脈」攜帶來自胎盤的「含氧血」回胎兒，臍「動脈」(兩條)攜帶「缺氧血」回胎盤；靜脈導管、卵圓孔、動脈導管使血流繞過肝與肺。","options":{"A":"錯。臍帶含2條動脈、1條靜脈(非2靜脈1動脈)。","B":"臍靜脈血進右心房前是充氧血(此選項敘述方向對但本題以C為答)。","C":"正確。臍動脈內含缺氧血(送回胎盤)。","D":"錯。卵圓孔連接左右心房(非心室)。"},"sources":["新文京《兒科護理學》胎兒循環","臍動脈缺氧"]}},"108020-N4-30":{"quick":"出生第2天無臉部表情、呼吸規律、偶有驚嚇與吸吮動作,屬「安靜睡眠期」(A)。","detail":{"background":"新生兒睡眠-活動週期:「安靜睡眠期(深睡)」表現規律呼吸、無臉部表情與眼動、偶有驚嚇或吸吮反射。半睡半醒期有眼動;安靜清醒期眼睛明亮注意環境;活動清醒期肢體活動多,故A(規律呼吸無表情)是安靜睡眠期。","options":{"A":"正確。規律呼吸、無表情、偶有驚嚇吸吮=安靜睡眠期。","B":"半睡半醒期有眼動與不規則呼吸。","C":"安靜清醒期眼睛明亮、注意環境。","D":"活動清醒期肢體活動多。"},"sources":["新文京《兒科護理學》睡眠週期","安靜睡眠"]}},"108110-N4-60":{"quick":"新生兒各系統生理特徵正確的是「女嬰出生後,陰道出現紅色分泌物,此徵象乃是受母親雌激素中斷所影響」(B)。","detail":{"background":"女嬰受母體雌激素影響使子宮內膜增生,出生後母體雌激素中斷、內膜剝落,造成「假性月經(陰道紅色分泌物)」,屬正常。IgG「會」過胎盤(A錯);肺血流增加使「動脈導管」相關變化,靜脈導管關閉是臍靜脈血流停止(C敘述不當);新生兒黃疸是「葡萄糖醛酸轉移酶不足致未結合型膽紅素無法代謝」(D敘述錯),故B正確。","options":{"A":"錯。IgG會通過胎盤到新生兒。","B":"正確。假性月經是母體雌激素中斷所致。","C":"靜脈導管關閉是臍靜脈血流停止(此敘述不當)。","D":"黃疸是未結合型膽紅素代謝不足(D敘述錯)。"},"sources":["新文京《兒科護理學》新生兒","假性月經"]}},"110030-N4-66":{"quick":"胎兒出生後心臟血管變化錯誤的是「臍動脈閉合,形成肝圓韌帶」(B)。","detail":{"background":"「臍靜脈閉合形成肝圓韌帶」;臍動脈閉合形成的是「臍側韌帶」,故「臍動脈形成肝圓韌帶」錯誤。其餘正確:左心房壓大於右心房使卵圓孔瓣膜關閉、左心房左心室壓力增加、動脈導管出生後1~3個月閉塞形成動脈韌帶。","options":{"A":"正確。左心房壓大於右心房,卵圓孔瓣膜關閉。","B":"錯誤(本題答案)。肝圓韌帶由臍靜脈形成(非臍動脈)。","C":"正確。左心房與左心室壓力增加。","D":"正確。動脈導管出生後1~3個月閉塞形成動脈韌帶。"},"sources":["新文京《兒科護理學》出生循環","臍靜脈肝圓韌帶"]}},"111110-N4-30":{"quick":"不是新生兒「安靜清醒期」行為表徵的是「呼吸不規律」(D)。","detail":{"background":"安靜清醒期(quiet alert)表現「眼睛張大明亮有精神、注意周圍環境、對照顧者有反應、呼吸較規則」,是互動與餵食的好時機。「呼吸不規律」是睡眠期/活動期的表現,非安靜清醒期,故D不是。　補充：新生兒安靜清醒期(quiet alert)眼睛明亮專注、呼吸規律、活動少、對外界反應佳，是互動與餵食的最佳時機；「呼吸不規律」不屬此期表徵。","options":{"A":"是。注意周圍環境。","B":"是。眼睛張大、明亮、有精神。","C":"是。對照顧者有反應。","D":"不是(本題答案)。呼吸不規律非安靜清醒期表徵。"},"sources":["新文京《兒科護理學》睡眠週期","安靜清醒"]}},"112180-N4-17":{"quick":"促使新生兒出生後動脈導管功能性關閉的最主要原因是「肺擴張後血氧分壓上升」(B)。","detail":{"background":"動脈導管平滑肌對「血氧分壓(PaO2)」敏感,出生後肺擴張使血氧上升,加上前列腺素濃度下降,促使動脈導管收縮關閉。左心房壓減少(與卵圓孔較相關)、肝臟血液增加、下腔靜脈血液減少(與靜脈導管相關)皆非動脈導管關閉主因,故B正確。","options":{"A":"肺擴張使左心房壓增加(與卵圓孔關閉相關,非動脈導管)。","B":"正確。肺擴張後血氧分壓上升促使動脈導管關閉。","C":"肝臟血液增加與靜脈導管相關(非動脈導管)。","D":"下腔靜脈血液減少與靜脈導管相關(非動脈導管)。"},"sources":["新文京《兒科護理學》動脈導管","血氧上升"]}},"101110-N4-68":{"quick":"阿帕嘉計分(Apgar Score)錯誤的是「依據5個指標評估新生兒,包括體溫、心跳、呼吸、膚色以及體重」(A)。","detail":{"background":"Apgar的五指標是「心跳、呼吸、肌肉張力、反射激惹性、膚色」,不含「體溫與體重」,故A錯誤。其餘正確:第1分鐘可顯示是否需CPR、各項記0/1/2分、第5分鐘≥7分存活率較高。　補充：Apgar五項評估心跳、呼吸、肌肉張力、反射激惹性與膚色(各0~2分、滿分10)，於出生後1與5分鐘評估，不含體溫與體重；7~10分正常、4~6中度窘迫、0~3嚴重窒息需急救。","options":{"A":"錯誤(本題答案)。Apgar五指標不含體溫與體重(是心跳呼吸張力反射膚色)。","B":"正確。第1分鐘可顯示是否需實行CPR。","C":"正確。各項記0、1或2分。","D":"正確。第5分鐘≥7分存活率較高。"},"sources":["新文京《兒科護理學》Apgar","五指標"]}},"102030-N4-27":{"quick":"Apgar：心跳≥100=2、呼吸慢不規則=1、肌張力四肢彎曲有自發運動=2、反射抽吸咳嗽=2、膚色軀幹粉紅四肢藍(肢端發紺)=1，合計8分。","detail":{"background":"Apgar計分:心跳100次/分(<100為1分,=100算1分?此題官方給:心跳1分?)實際逐項:心跳100(<100是1分,≥100是2分→100算2分)、呼吸慢不規則(1分)、肌張力四肢彎曲有自發運動(2分)、反射咳嗽(2分)、膚色軀幹粉紅四肢藍(1分);本題官方判總分7分。","options":{"A":"7分計算不符。","B":"正確。2+1+2+2+1=8分。","C":"9分計算不符。","D":"10分需全身粉紅(此例肢端發紺扣1分)。"},"sources":["新文京《兒科護理學》Apgar","計分"]}},"104100-N4-26":{"quick":"新生兒立即護理正確的是「施打維生素K1,目的是預防新生兒出血」(D)。","detail":{"background":"新生兒腸道菌叢未建立、肝臟未成熟使維生素K不足,須肌注「維生素K1預防新生兒出血性疾病」。Apgar即使≥7分仍須「1與5分鐘各評一次」(A錯);避免碘消毒是怕影響「甲狀腺功能篩檢」(非苯酮尿症,B不精確);預防淋菌性眼炎點「紅黴素/四環黴素眼膏」,但目的是淋菌非梅毒(C錯),故D正確。","options":{"A":"錯。Apgar須1與5分鐘各評一次(非只一次)。","B":"避免碘消毒是怕影響甲狀腺篩檢(非苯酮尿症)。","C":"點抗生素眼膏是預防淋菌性眼炎(非梅毒)。","D":"正確。施打維生素K1預防新生兒出血。"},"sources":["新文京《兒科護理學》即刻護理","維生素K"]}},"106030-N4-27":{"quick":"新生兒5分鐘Apgar除心跳呼吸膚色刺激反射外,尚須評估「肌肉張力是否有力」(C)。","detail":{"background":"Apgar五項是「心跳、呼吸、膚色、反射激惹、肌肉張力」。題目已列心跳呼吸膚色刺激反射,故第五項是「肌肉張力」。外觀完整、大小便、身高體重皆非Apgar項目,故C正確。　補充：Apgar五項為心跳、呼吸、肌肉張力、反射激惹性與膚色；肌肉張力評估四肢屈曲與活動力(有力屈曲為2分)，是反映新生兒適應與神經肌肉狀態的指標之一。","options":{"A":"外觀完整非Apgar項目。","B":"大小便非Apgar項目。","C":"正確。第五項是肌肉張力(是否有力)。","D":"身高體重非Apgar項目。"},"sources":["新文京《兒科護理學》Apgar","肌張力"]}},"107030-N4-46":{"quick":"Apgar：心跳170=2、呼吸哭聲宏亮=2、肌張力四肢屈曲彈性好=2、反射抽吸時臉部扭曲(grimace)=1、膚色軀幹粉紅手腳微紫=1，合計8分。","detail":{"background":"逐項:心跳170(≥100,2分)、呼吸哭聲宏亮(2分)、肌張力四肢屈曲彈性好(2分)、反射抽吸臉部扭曲(2分)、膚色軀幹粉紅但手腳微紫(肢端發紺,1分);合計9分,故B。　補充：Apgar評分膚色僅軀幹粉紅、四肢發紺(acrocyanosis)給1分，全身粉紅給2分；反射以抽吸時臉部扭曲(grimace)給1分、哭泣或咳嗽給2分，需逐項加總判讀。","options":{"A":"10分需全身粉紅且反射為咳嗽/打噴嚏。","B":"9分需反射為咳嗽/打噴嚏(=2);本題「臉部扭曲(grimace)」=1分，故為8分。","C":"正確。2+2+2+1+1=8分。","D":"7分計算不符。"},"sources":["新文京《兒科護理學》Apgar","計分"]}},"108110-N4-56":{"quick":"不是阿帕嘉評分(Apgar score)計分項目的是「排泄情況」(D)。","detail":{"background":"Apgar五項是「心跳速率、呼吸、肌肉張力、反射激惹、膚色」。「排泄情況(大小便)」不是Apgar項目,故D。　補充：Apgar評分項目為心跳、呼吸、肌肉張力、反射激惹性與膚色(各0~2分)，於1與5分鐘評估，反映立即適應；「排泄情況」非評分項目。","options":{"A":"是。心跳速率。","B":"是。膚色。","C":"是。肌肉張力。","D":"不是(本題答案)。排泄情況非Apgar計分項目。"},"sources":["新文京《兒科護理學》Apgar","五項"]}},"109030-N4-26":{"quick":"Apgar score計分表不包含的項目是「血氧濃度」(D)。","detail":{"background":"Apgar五項是「心跳速率、呼吸、肌肉張力、反射激惹、皮膚顏色」。「血氧濃度(SpO2)」是另以脈衝式血氧儀測量,非Apgar項目,故D不包含。　補充：Apgar評分項目為心跳、呼吸、肌肉張力、反射激惹性、膚色(各0~2分)；「血氧濃度(SpO2)」並非Apgar計分項目，雖臨床常並行監測。","options":{"A":"包含。心跳速率。","B":"包含。肌肉張力。","C":"包含。皮膚顏色。","D":"不包含(本題答案)。血氧濃度非Apgar項目。"},"sources":["新文京《兒科護理學》Apgar","非血氧"]}},"111030-N4-26":{"quick":"哭聲宏亮、呼吸規則、心跳128、四肢略屈曲、身體粉紅四肢藍,Apgar是「8分」(B)。","detail":{"background":"逐項:心跳128(≥100,2分)、呼吸規則哭聲宏亮(2分)、肌張力四肢略屈曲(1分)、反射(本題未特別扣,計2分)、膚色身體粉紅四肢藍(肢端發紺,1分);合計約8分,故B(四肢略屈曲未完全屈曲扣1分、膚色扣1分)。","options":{"A":"7分計算偏低。","B":"正確。各項合計8分(肌張力與膚色各扣1分)。","C":"9分計算偏高。","D":"10分需全身粉紅且完全屈曲。"},"sources":["新文京《兒科護理學》Apgar","計分"]}},"102030-N4-30":{"quick":"出生第1天四肢末梢冰冷、體溫36°C,最恰當的處置是「直接讓母親與新生兒有肌膚的接觸,以增加體溫」(A)。","detail":{"background":"新生兒體溫36°C偏低(正常36.5~37.5°C),「母嬰肌膚接觸(skin-to-skin)」是最自然有效且促進親子依附的保溫方式。單純包巾保暖效果不如肌膚接觸(B);輕度體溫低可先肌膚接觸,不需立即入保溫箱(C);體溫36°C偏低不是正常不需處理(D),故A正確。","options":{"A":"正確。母嬰肌膚接觸保溫(自然有效且促依附)。","B":"單純包巾效果不如肌膚接觸。","C":"輕度體溫低先肌膚接觸(不需立即保溫箱)。","D":"錯。36°C偏低須處理(非正常不需處理)。"},"sources":["新文京《兒科護理學》保溫","肌膚接觸"]}},"104100-N4-25":{"quick":"將新生兒抱至加溫台並以乾毛巾擦乾,運用的體溫喪失機轉預防是「蒸發及傳導」(A)。","detail":{"background":"「乾毛巾擦乾羊水」預防「蒸發(evaporation)散熱」;「抱至加溫台(預熱的接觸面)」預防「傳導(conduction)散熱」。對流是空氣流動、輻射是向冷物體輻射,此例主要是蒸發與傳導,故A正確。","options":{"A":"正確。擦乾防蒸發、加溫台防傳導。","B":"對流非此例(加溫台是傳導)。","C":"傳導對,但擦乾是防蒸發(非輻射)。","D":"對流輻射皆非此例的主要機轉。"},"sources":["新文京《兒科護理學》散熱","蒸發傳導"]}},"105030-N4-29":{"quick":"預防新生兒體熱散失方法錯誤的是「以溫熱過的毛毯包裹新生兒為傳導作用」(A)?——本題答A。","detail":{"background":"本題官方答案為A。「用溫熱毛毯包裹」減少的是「傳導」散熱,但官方判此敘述為錯誤(包裹減少對流/輻射;或敘述機轉對應不當)。其餘正確:體溫穩定前勿洗澡防對流(及蒸發)、嬰兒床遠離牆壁防輻射、立即擦乾羊水防蒸發。","options":{"A":"錯誤(本題答案)。溫熱毛毯包裹的機轉對應敘述不當(官方判錯)。","B":"正確。體溫穩定前勿洗澡(防散熱)。","C":"正確。床遠離冷牆壁防輻射。","D":"正確。立即擦乾羊水防蒸發。"},"sources":["新文京《兒科護理學》散熱","機轉"]}},"103100-N4-31":{"quick":"新生兒戴棉紗帽的主要功用是「減少體溫的散失」(C)。","detail":{"background":"新生兒頭部表面積大、是散熱的主要部位,戴帽子主要為「減少頭部體熱散失、維持體溫」(尤即刻護理後)。非避免皮膚損傷、非美觀、非避免胎脂染污母親,故C正確。　補充：新生兒體表面積大、皮下脂肪薄，頭部佔體表面積比例高，是散熱的重要部位；戴棉紗帽可減少由頭部經輻射與蒸發散失的體熱，預防低體溫。","options":{"A":"非避免頭部皮膚損傷。","B":"非為增加美觀。","C":"正確。減少頭部體溫散失(維持體溫)。","D":"非為避免胎脂染污母親。"},"sources":["新文京《兒科護理學》保溫","戴帽"]}},"112030-N4-30":{"quick":"維持新生兒出生即刻體溫穩定的措施不適當的是「新生兒出生後應立即沐浴維持體溫」(D)。","detail":{"background":"新生兒「體溫穩定前不可立即沐浴」(沐浴會因蒸發與環境散熱致體溫下降),應延後至體溫穩定後,故D不適當。其餘適當:布單事先預熱(防傳導散熱)、擦乾後母嬰肌膚接觸保溫、用空調/加溫設備維持室溫。　補充：維持新生兒即刻體溫應立即擦乾、移除濕巾、肌膚接觸、戴帽、預熱用物；「出生後立即沐浴」會因蒸發與對流大量散熱致低體溫，並不適當，應延後沐浴。","options":{"A":"適當。接觸新生兒的布單事先預熱。","B":"適當。擦乾後進行母嬰肌膚接觸。","C":"適當。用空調或加溫設備維持室溫。","D":"不適當(本題答案)。體溫穩定前不可立即沐浴(會散熱)。"},"sources":["新文京《兒科護理學》保溫","勿立即沐浴"]}},"114030-N4-18":{"quick":"沐浴前置於有磅秤紙的體重計、沐浴後乾毛巾擦乾,運用預防體熱喪失的機制是「傳導及蒸發」(B)。","detail":{"background":"「磅秤紙(墊在冷體重計上)」減少身體與冷表面接觸的「傳導散熱」;「乾毛巾擦乾」減少「蒸發散熱」。對流(空氣流動)、輻射(向冷物輻射)非此例主要機轉,故B(傳導及蒸發)正確。　補充：新生兒散熱機制：傳導(接觸冰冷磅秤紙/體重計)、對流(冷空氣)、輻射(向周圍冷物體)、蒸發(體表水分蒸發)；置於磅秤紙與擦乾身體分別預防「傳導」與「蒸發」散熱。","options":{"A":"對流非此例(磅秤紙是傳導)。","B":"正確。磅秤紙防傳導、擦乾防蒸發。","C":"傳導對,但擦乾是防蒸發(非輻射)。","D":"對流輻射皆非此例主要機轉。"},"sources":["新文京《兒科護理學》散熱","傳導蒸發"]}},"101030-N4-10":{"quick":"純母奶哺餵、出生第3天黃疸無病理問題,最合宜的護理指導是「這是正常現象,不必擔心」(A)。","detail":{"background":"出生「2~3天出現、無病理因素」的黃疸多屬「生理性黃疸」,屬正常,鼓勵「持續且增加哺餵母乳次數」促膽紅素排出,只需觀察。不需減少哺餵(B錯,應增加);母乳性黃疸持續較久但此例第3天先以生理性處理(C不精確);黃疸不需停餵母乳(D錯),故A正確。","options":{"A":"正確。出生3天無病理問題的黃疸多屬生理性,觀察即可。","B":"錯。應增加哺餵次數(非減少)。","C":"第3天先以生理性處理(母乳性黃疸敘述不精確)。","D":"錯。黃疸不需停餵母乳(應持續哺餵)。"},"sources":["新文京《兒科護理學》生理性黃疸","觀察"]}},"101030-N4-54":{"quick":"3.3kg、出生36小時、膽紅素20須換血,護理措施不適當的是「換血後1小時內給予點滴注射白蛋白,可以提高換血的成效」(D)?——本題答D。","detail":{"background":"本題官方答案為D。白蛋白若要用是在「換血前」給予(結合游離膽紅素利於移除、提高換血成效),非換血後給,故D不適當。其餘適當:用新鮮血、加溫35~37°C、換血維持1~2小時、每換100c.c.補10%葡萄糖酸鈣防低血鈣。","options":{"A":"適當。用新鮮血並加溫至35~37°C。","B":"適當。換血進行時間維持1~2小時。","C":"適當。每換100c.c.補10%葡萄糖鈣防低血鈣。","D":"不適當(本題答案)。白蛋白應換血前給(非換血後)。"},"sources":["新文京《兒科護理學》換血","白蛋白"]}},"101110-N4-10":{"quick":"足月第4天膽紅素17接受照光治療,護理措施正確的是「體溫會微上升,需增加25%的水分」(C)?——本題答C。","detail":{"background":"本題官方答案為C。照光治療會使「體溫上升、不顯性水分流失增加」,故須「增加水分攝取(約增25%)」防脫水。照光應「定時翻身、可短暫中斷餵食」(非全天不可中斷,A錯);照光時不需停母乳(B錯);照光不需常規給Luminal鎮靜(D錯),故C正確。","options":{"A":"錯。照光可短暫中斷餵食/採血(非全天不可中斷)。","B":"錯。照光時不需停母乳。","C":"正確。照光致體溫上升、不顯性失水增,須增水分。","D":"錯。照光不需常規給Luminal。"},"sources":["新文京《兒科護理學》照光","補水"]}},"103100-N4-29":{"quick":"新生兒生理性黃疸正確的是「於出生3~4天達高峰,足月兒一週內總膽紅素上升速率<5mg/dL」(A)?——本題答A。","detail":{"background":"生理性黃疸特徵:出生「2~3天出現、3~5天達高峰、一週內漸退」,膽紅素上升速率「<5mg/dL/天」。它不會持續到21天才下降(B錯,持續過久要查病理);足月兒發生率「低於」早產兒(C錯,早產兒較高);因肝臟代謝「不成熟」致膽紅素堆積(非代謝太快,D錯),故A正確。","options":{"A":"正確。出生3~4天達高峰,膽紅素上升速率<5mg/dL/天。","B":"錯。生理性黃疸約一週內退(非持續到21天)。","C":"錯。足月兒發生率低於早產兒(早產兒較高)。","D":"錯。是肝臟代謝不成熟(非代謝太快)。"},"sources":["新文京《兒科護理學》生理性黃疸","3-4天高峰"]}},"105030-N4-55":{"quick":"新生兒黃疸照光療法副作用錯誤的是「便秘」(D)。","detail":{"background":"照光治療常見副作用:「腹瀉(膽紅素代謝物刺激腸道)」(非便秘)、皮膚紅疹、體溫不穩、不顯性失水增加脫水、化膿性結膜炎(眼罩保護)。故「便秘」錯誤(應是腹瀉)。　補充：黃疸照光療法副作用包括稀水便/腹瀉(膽紅素分解物刺激腸道)、皮疹、體溫不穩、脫水與不顯性失水增加，須遮眼護生殖器並補充水分；便秘並非其副作用。","options":{"A":"是副作用。易形成化膿性結膜炎(故須眼罩)。","B":"是副作用。皮膚會出現廣泛紅疹。","C":"是副作用。體溫不穩定。","D":"錯誤(本題答案)。照光常見腹瀉(非便秘)。"},"sources":["新文京《兒科護理學》照光","腹瀉"]}},"105090-N4-50":{"quick":"出生48小時全身黃疸、血型不合溶血性黃疸的原因正確的是「母親血型是O型,胎兒血型是A或B型」(B)。","detail":{"background":"ABO血型不合溶血:「母親O型(含anti-A、anti-B抗體)、胎兒A或B型」,母體抗體攻擊胎兒紅血球致溶血(可發生於第一胎)。母A胎O、母AB胎O不會溶血;Rh不合是「母Rh陰性、胎Rh陽性」(非母Rh+胎Rh−,D錯),故B正確。","options":{"A":"母A胎O不會ABO溶血。","B":"正確。母O型、胎A或B型→ABO血型不合溶血。","C":"母AB胎O不會溶血。","D":"錯。Rh不合是母Rh−、胎Rh+(非母+胎−)。"},"sources":["新文京《兒科護理學》溶血","母O胎AB"]}},"106030-N4-30":{"quick":"純母乳、食慾好、第3天臉黃膽紅素12,正確的解釋是「可能是一般的生理性黃疸,持續注意食慾與膚色變化即可」(D)。","detail":{"background":"出生「2~3天出現、膽紅素12、食慾好、無病理因素」符合「生理性黃疸」,觀察食慾與膚色即可。膽紅素12且第3天非典型病理性黃疸(A過度);未達核黃疸前驅(膽紅素未極高,B過度);母乳性黃疸通常較晚(第4~7天後)且不需停餵(C不精確),故D正確。","options":{"A":"膽紅素12、第3天非典型病理性黃疸(A過度)。","B":"未達核黃疸前驅(膽紅素未極高,B過度)。","C":"母乳性黃疸較晚發生且不需停餵(C不精確)。","D":"正確。屬生理性黃疸,觀察食慾與膚色即可。"},"sources":["新文京《兒科護理學》生理性黃疸","觀察"]}},"106030-N4-51":{"quick":"足月2800g、第3天總膽紅素16照光,最重要的護理目標是「提供眼罩及確保小維有足夠的水分攝取」(B)。","detail":{"background":"照光治療最重要護理:「戴不透光眼罩保護視網膜、確保足夠水分(照光致不顯性失水增加防脫水)」。不需準備居家照光(A非首要);不需每小時採腳跟血(過度,C);照光「有」副作用不能說沒有(D錯),故B正確。","options":{"A":"準備居家照光非住院照光的首要目標。","B":"正確。提供眼罩保護、確保足夠水分攝取。","C":"不需每小時採腳跟血(過度)。","D":"錯。照光有副作用(不能說沒有)。"},"sources":["新文京《兒科護理學》照光","眼罩補水"]}},"106110-N4-30":{"quick":"新生兒黃疸正確的是?——本題答C「足月兒生理性黃疸發生率低於早產兒發生率」。","detail":{"background":"本題官方答案為C。「生理性黃疸早產兒發生率高於足月兒」(早產兒肝臟更不成熟),故「足月兒發生率低於早產兒」正確。生理性黃疸是「出生24小時後(2~3天)出現」(非24小時內,A錯);多數黃疸是生理性非母乳性且不需停母乳(B錯);Rh/ABO血型不合溶血是「病理性黃疸」主因(非生理性,D錯),故C正確。","options":{"A":"錯。生理性黃疸是出生2~3天出現(非24小時內)。","B":"錯。多數是生理性黃疸,不需停母乳。","C":"正確。足月兒生理性黃疸發生率低於早產兒。","D":"錯。血型不合溶血是病理性黃疸(非生理性)主因。"},"sources":["新文京《兒科護理學》黃疸","早產率高"]}},"106110-N4-52":{"quick":"足月、出生第2天膚色深黃、膽紅素12,護理評估判斷是「小維有生理性黃疸,為新生兒常見的問題」(D)。","detail":{"background":"足月兒「出生第2天(>24小時)出現、膽紅素12、無病理因素」符合「生理性黃疸」,是新生兒常見問題,觀察並持續哺餵即可。膽紅素12未達嚴重病理性換血標準(A過度);未達核黃疸(B過度);非典型母乳性黃疸(較晚發生,C不精確),故D正確。","options":{"A":"膽紅素12未達需換血的嚴重病理性(A過度)。","B":"未達核黃疸(B過度)。","C":"母乳性黃疸較晚發生(C不精確)。","D":"正確。屬生理性黃疸,新生兒常見問題。"},"sources":["新文京《兒科護理學》生理性黃疸","常見"]}},"107110-N4-29":{"quick":"新生兒黃疸正確的是「②黃疸由頭往下、由身體中心向外發展至四肢+④可輕壓鼻尖觀察皮膚黃疸+⑤照光保護眼睛與生殖器(即245)」(D)。","detail":{"background":"黃疸進展是「由頭→軀幹→四肢、由中心→末梢(頭尾與向心離心方向)」(②正確);評估可「輕壓鼻尖/前額觀察皮膚黃染」(④正確);照光時須「遮眼罩與生殖器」(⑤正確)。①黃疸最先出現多在「臉/鞏膜」(額頭敘述不精確);③出生第3天膽紅素>14mg/dL須評估處理(非不需處理),故為②④⑤(245)。","options":{"A":"125含①③(①不精確、③錯)。","B":"235含③(膽紅素>14須處理,非不需)。","C":"145含①③。","D":"正確。②由頭往下+④壓鼻尖觀察+⑤照光護眼與生殖器(245)。"},"sources":["新文京《兒科護理學》黃疸","由頭往下"]}},"108020-N4-27":{"quick":"新生兒黃疸錯誤的是「母乳引起的黃疸通常於出生後1個月發生」(B)。","detail":{"background":"母乳性黃疸通常在「出生後1週左右(5~7天)出現並可持續數週」,而非「1個月後才發生」,故B錯誤(時間描述不當;另有早發性母乳哺餵不足黃疸在第一週)。其餘正確:生理性黃疸出生2~3天出現、增加哺餵次數改善母乳不足性黃疸、皮膚發黃由頭往下由中心向外。","options":{"A":"正確。生理性黃疸通常出現於出生2~3天。","B":"錯誤(本題答案)。母乳性黃疸約出生1週出現(非1個月後)。","C":"正確。增加母乳哺餵次數改善母乳不足性黃疸。","D":"正確。皮膚發黃由頭往下、由中心向外。"},"sources":["新文京《兒科護理學》母乳性黃疸","1週"]}},"108110-N4-26":{"quick":"出生第3天早發性母乳黃疸,產婦擔心是否繼續哺餵,適當的是「應該繼續哺餵母乳」(A)。","detail":{"background":"早發性母乳黃疸(母乳哺餵不足性黃疸)是因「攝取不足、胎便排出慢、膽紅素腸肝循環增加」,處置是「增加哺餵次數、繼續哺餵母乳」促排便排膽紅素,而非暫停或減少哺餵或禁食,故A正確。　補充：早發性母乳性黃疸(出生2~4天)多與哺乳量不足、腸肝循環增加有關，處置為「增加哺餵次數」促進排便排膽紅素，不需停母乳；應評估含乳與奶量是否足夠。","options":{"A":"正確。早發性母乳黃疸應繼續(並增加)哺餵母乳。","B":"錯。不需暫停哺餵母乳。","C":"錯。應增加(非減少)哺餵次數。","D":"錯。不需暫停由口進食。"},"sources":["新文京《兒科護理學》母乳黃疸","繼續哺餵"]}},"108110-N4-64":{"quick":"足月3050g、出生24小時膽紅素27欲換血,正確的是「採用之血液最好為新鮮血液或不超過72小時之血庫血袋,以防止血袋中鉀離子過高」(A)。","detail":{"background":"換血宜用「新鮮血或保存<72小時的血」,因久放血品「鉀離子過高」會致高血鉀危險。檸檬酸抗凝劑會與鈣結合致「低血鈣」(非高血鈣,且補鈣非抑鈣激素,B錯);備血量約嬰兒血量「2倍」(非3倍,C錯);Rh不合溶血應備「O型Rh陰性」血(非Rh陽性,D錯),故A正確。","options":{"A":"正確。用新鮮或<72小時血,防血袋鉀離子過高。","B":"錯。檸檬酸致低血鈣須補鈣(非高血鈣/抑鈣激素)。","C":"錯。備血量約2倍(非3倍)。","D":"錯。Rh不合應備O型Rh陰性血(非Rh陽性)。"},"sources":["新文京《兒科護理學》換血","新鮮血"]}},"109030-N4-28":{"quick":"新生兒黃疸照光治療的原理是「能將未結合型膽紅素異構化使其容易排出體外」(B)。","detail":{"background":"照光(藍光)使皮膚的「未結合型(脂溶性)膽紅素光異構化成水溶性異構物」,不需經肝臟結合即可由膽汁與尿液排出。它非靠熱能排出(A錯)、非在肝臟解體(C錯)、非加速肝臟合成轉化酶(D錯),故B正確。　補充：黃疸照光治療原理為藍光使皮膚中「未結合(間接)型膽紅素」發生光異構化與光氧化，轉為水溶性異構物經膽汁與尿排出，降低血中膽紅素、預防核黃疸。","options":{"A":"錯。是光異構化(非靠熱能排出)。","B":"正確。未結合型膽紅素光異構化成水溶性而排出。","C":"錯。非在肝臟解體。","D":"錯。非加速肝臟合成轉化酶。"},"sources":["新文京《兒科護理學》照光","光異構化"]}},"112030-N4-55":{"quick":"B型嬰兒與O型母親ABO血型不合溶血：嚴重高膽紅素血症可致核黃疸，有較高機會發生聽力損傷、發展遲緩等後遺症。","detail":{"background":"本題官方答案為B(就選項相對而言)。註:實際上「ABO血型不合可發生於第一胎」(母O型本就有anti-A/B抗體),而「Rh不合」才典型發生於第二胎以後;本題以B為答係比較各選項後的相對選擇。其餘:ABO不合黃疸通常比Rh不合「輕」(A錯,Rh較嚴重);ABO不合後遺症較少(C過度);換血用「O型(與母同)紅血球」(非B型,D錯)。","options":{"A":"ABO血型不合的黃疸通常比Rh因子不合「輕」(Rh較嚴重)。","B":"ABO血型不合「可發生於第一胎」(Rh才典型第二胎以後)，故錯。","C":"正確。嚴重溶血/高膽紅素可致核黃疸，有較高機會聽力損傷、發展遲緩。","D":"換血應使用「O型」紅血球(非B型)。"},"sources":["新文京《兒科護理學》ABO溶血","血型"]}},"112110-N4-55":{"quick":"35週早產兒高膽紅素血症傳統照光治療護理錯誤的是「照光的光源與病童皮膚保持30~40公分距離」(D)?——本題答D。","detail":{"background":"本題官方答案為D。傳統照光燈與皮膚的距離應約「45~50公分(或依機型)」,「30~40公分」過近(本題判為錯誤敘述)。其餘正確:照光常致體溫升高脫水、採血前暫停照光、戴不透光眼罩並遮蓋生殖器。　補充：黃疸照光治療護理：眼罩護眼、遮生殖器、裸露增加照射面積、定時翻身、監測體溫與水分、光源距離依機型(常約45~50cm)；「光源距皮膚30~40公分」過近、為錯誤敘述。","options":{"A":"正確。照光常出現體溫升高、脫水副作用。","B":"正確。每日採血前須暫停照光。","C":"正確。戴不透光眼罩、貼隔光紙於生殖器。","D":"錯誤(本題答案)。光源與皮膚距離應約45~50公分(30~40過近)。"},"sources":["新文京《兒科護理學》照光","距離"]}},"113100-N4-36":{"quick":"高膽紅素血症新生兒護理措施最適當的是「可即早餵食,使膽紅素正常排泄」(A)。","detail":{"background":"即早與增加餵食可「促進腸蠕動排便、減少膽紅素腸肝循環再吸收」,有助黃疸消退。照光應「定時翻身(非每4小時,需更頻繁均勻照射)」(B不精確);光源距離約45~50公分(C的30~45偏近);黃疸時「不需立即停母乳」應持續哺餵(D錯),故A正確。","options":{"A":"正確。即早餵食促進膽紅素排泄(減少腸肝循環)。","B":"照光翻身應更頻繁均勻(B不精確)。","C":"光源距離約45~50公分(C偏近)。","D":"錯。黃疸不需立即停母乳(應持續哺餵)。"},"sources":["新文京《兒科護理學》黃疸","即早餵食"]}},"114030-N4-36":{"quick":"35週2400g高膽紅素血症、膽紅素26換血治療正確的是「換血後需追蹤總膽紅素值,觀察期間繼續照光治療」(D)。","detail":{"background":"換血後膽紅素可能反彈,須「持續追蹤總膽紅素並繼續照光」。白蛋白應在換血「前」給(非後2小時,A錯);換血導管插「臍靜脈」(非臍動脈/橈動脈,B錯);每換100c.c.補10%葡萄糖酸鈣(非每200mL補葡萄糖,C錯),故D正確。","options":{"A":"白蛋白應換血前給(非換血後2小時)。","B":"換血導管插臍靜脈(非臍動脈/橈動脈)。","C":"每換100c.c.補葡萄糖酸鈣(非每200mL補葡萄糖溶液)。","D":"正確。換血後追蹤膽紅素並繼續照光治療。"},"sources":["新文京《兒科護理學》換血","追蹤照光"]}},"101030-N4-14":{"quick":"新生兒生命徵象需立即通知醫師處理的是「36.5°C、90、20」(A)。","detail":{"background":"新生兒正常:心跳120~160次/分、呼吸30~60次/分、體溫36.5~37.5°C。選項A「心跳90(過慢,<100)」屬心搏過緩須立即通知醫師;其餘心跳120~150、呼吸30~60皆在正常範圍,故A異常。","options":{"A":"正確(本題答案)。心跳90過慢(<100心搏過緩),須通知醫師。","B":"心跳120、呼吸30在正常範圍。","C":"心跳130、呼吸45在正常範圍。","D":"心跳150、呼吸60在正常範圍上限。"},"sources":["新文京《兒科護理學》生命徵象","心搏過緩"]}},"101110-N4-67":{"quick":"新生兒皮膚特徵錯誤的是「毒性紅斑常見於軀幹、手臂和包尿布的部位,通常局部治療即可」(C)。","detail":{"background":"毒性紅斑(erythema toxicum)是新生兒常見的良性皮疹,「會自行消退、不需治療」(非局部治療),故C錯誤。其餘正確:足月兒胎脂在皺褶處明顯有保護保溫作用、蒙古斑在薦/臀部兒童早期自行消失、黃疸由頭往下由中心向外發展。","options":{"A":"正確。足月兒胎脂在皺褶處明顯,有保護保溫作用。","B":"正確。蒙古斑在薦/臀部,兒童早期自行消失。","C":"錯誤(本題答案)。毒性紅斑會自行消退(不需局部治療)。","D":"正確。黃疸由頭往下、由中心向外發展。"},"sources":["新文京《兒科護理學》皮膚","毒性紅斑"]}},"105030-N4-27":{"quick":"新生兒評估錯誤的是「頭血腫為界線不明顯的腫脹,腫脹通常是單側或雙側」(A)。","detail":{"background":"頭血腫(cephalohematoma)是骨膜下出血,「界線明顯(不越過骨縫線)、多為單側」,故「界線不明顯」錯誤(界線不明顯越過骨縫的是產瘤)。其餘正確:產瘤胎頭受壓水腫數天吸收、新生兒軀幹長四肢短、前囟門較後囟門晚關閉。","options":{"A":"錯誤(本題答案)。頭血腫界線明顯、不越骨縫(界線不明顯的是產瘤)。","B":"正確。產瘤胎頭受壓水腫,數天可吸收。","C":"正確。新生兒軀幹長而四肢短。","D":"正確。前囟門較後囟門晚關閉。"},"sources":["新文京《兒科護理學》頭血腫","界線明顯"]}},"105030-N4-48":{"quick":"新生兒視覺評估不正常的是「對光不會反應」(B)。","detail":{"background":"新生兒應有「瞳孔對光反射、眨眼反射」,「對光不會反應」屬異常(可能視神經/腦部問題)。出現斜視(眼肌協調未成熟,3~6個月內正常)、哭泣沒眼淚(淚腺未成熟,正常)、眨眼反射(正常)皆是正常現象,故B不正常。","options":{"A":"出現斜視在3~6個月內屬正常(眼肌未協調)。","B":"不正常(本題答案)。對光不會反應(異常,瞳孔反射應存在)。","C":"哭泣沒眼淚屬正常(淚腺未成熟)。","D":"會產生眨眼反射屬正常。"},"sources":["新文京《兒科護理學》視覺","對光反射"]}},"105090-N4-2":{"quick":"輕觸新生兒嘴角,將臉和嘴轉向刺激並張開嘴,是「尋乳反射(Rooting reflex)」(A)。","detail":{"background":"尋乳反射(rooting)是觸碰嘴角/臉頰時,新生兒「頭轉向刺激側並張口尋找」,助哺乳。吸吮反射是放入口中即吸吮;摩洛(Moro)是驚嚇時四肢外展;巴賓斯基是劃足底腳趾上翹,故A正確。　補充：尋乳反射(rooting)為觸碰嘴角或臉頰時新生兒轉向刺激並張口尋找乳頭，有助哺乳；與吸吮反射共同構成餵食反射，約3~4個月後消失。","options":{"A":"正確。觸嘴角頭轉向並張口=尋乳反射。","B":"吸吮反射是放入口中即吸吮。","C":"摩洛反射是驚嚇時四肢外展。","D":"巴賓斯基反射是劃足底腳趾上翹。"},"sources":["新文京《兒科護理學》反射","尋乳"]}},"105090-N4-25":{"quick":"足月新生兒泌尿道特徵錯誤的是「出生後第1天尿量為25 ml/kg/day」(C)?——本題答C。","detail":{"background":"本題官方答案為C。新生兒出生後第1天尿量較少但「正常約1~3 mL/kg/hr(約24~72 mL/kg/day)」,「25 mL/kg/day」偏低/敘述不當(官方判錯)。其餘正確:腎小管對水分再吸收能力不足、對電解質排除能力不足、腎絲球過濾率較成人低。","options":{"A":"正確。腎小管對水分再吸收能力不足。","B":"正確。腎小管對電解質排除能力不足。","C":"錯誤(本題答案)。第1天尿量敘述不當(正常約1~3mL/kg/hr)。","D":"正確。新生兒腎絲球過濾率較成人低。"},"sources":["新文京《兒科護理學》泌尿","尿量"]}},"106111-N4-31":{"quick":"新生兒出生時皮膚狀況代表潛在性異常的是「臉部偏黃,疑似黃疸」(C)。","detail":{"background":"出生「24小時內(出生時)即出現黃疸」屬「病理性黃疸」的警訊,代表潛在異常(如溶血),須評估。皮膚略帶粉紅、皮膚完整無破損、手腳肢端發紺(出生初期周邊循環未建立的生理現象)皆屬正常,故C潛在異常。　補充：新生兒常見正常皮膚現象有蒙古斑、粟粒疹、毒性紅斑、生理性脫皮；「臉部偏黃疑似黃疸」若於出生24小時內出現或進展快則屬病理性，需評估膽紅素。","options":{"A":"皮膚略帶粉紅屬正常。","B":"皮膚完整無破損屬正常。","C":"潛在異常(本題答案)。出生時即黃疸疑病理性(須評估)。","D":"手腳肢端發紺是出生初期生理現象(正常)。"},"sources":["新文京《兒科護理學》皮膚","早發黃疸"]}},"108110-N4-25":{"quick":"新生兒囟門敘述正確的是「①前囟門為菱形,由二塊額骨及二塊頂骨組成+③囟門凹陷代表脫水(即13)」(D)。","detail":{"background":"①前囟門呈「菱形」,由兩塊額骨與兩塊頂骨交會形成(正確);③囟門「凹陷代表脫水」、凸出代表顱內壓上升(正確)。②後囟門呈三角形但約「出生後6~8週(2個月)」關閉(非18週);④胎頭塑型(molding)約「數天~數週」恢復(非1個月),故為①③(13)。","options":{"A":"12含②(後囟約2個月關閉,非18週)。","B":"34含②④敘述錯。","C":"24含②④(時程錯)。","D":"正確。①前囟菱形(額骨頂骨)+③囟門凹陷代表脫水(13)。"},"sources":["新文京《兒科護理學》囟門","菱形脫水"]}},"110030-N4-27":{"quick":"新生兒囟門敘述錯誤的是「後囟門為三角形,一般在新生兒出生後8~12週時關閉」(B)?——本題答B?","detail":{"background":"本題官方答案為B。後囟門(三角形)一般在「出生後約6~8週(2個月)」關閉,「8~12週」的敘述被官方判為錯誤。其餘正確:前囟門菱形約12~18個月關閉、脫水時前囟凹陷、顱內壓上升時前囟凸出。　補充：新生兒前囟門呈菱形、約12~18個月關閉；後囟門呈三角形、約出生後6~8週(2個月)關閉；囟門凹陷提示脫水、膨出提示顱內壓上升。","options":{"A":"正確。前囟門菱形,約12~18個月關閉。","B":"錯誤(本題答案)。後囟門約6~8週關閉(8~12週敘述不符)。","C":"正確。脫水時前囟門凹陷。","D":"正確。顱內壓上升時前囟門凸出。"},"sources":["新文京《兒科護理學》囟門","後囟8週"]}},"110030-N4-28":{"quick":"新生兒皮膚評估異常的是「出生時臉部有葡萄色酒斑」(D)。","detail":{"background":"葡萄色酒斑(port-wine stain,焰色痣)是永久不退的微血管畸形,可能合併Sturge-Weber症候群,屬異常須評估。蒙古斑(薦臀部,會自行消退)、毒性紅斑(自癒)、先露部位瘀點(產程壓力,自癒)皆屬良性正常,故D異常。","options":{"A":"正常。臀部蒙古斑(會自行消退)。","B":"正常。毒性紅斑(自癒)。","C":"正常。先露部位瘀點(產程壓力,自癒)。","D":"異常(本題答案)。臉部葡萄色酒斑(永久,可能合併症)。"},"sources":["新文京《兒科護理學》皮膚","酒斑"]}},"110110-N4-28":{"quick":"聽診新生兒心跳速率的部位正確的是「左鎖骨中線第3至第4肋間交會點」(B)。","detail":{"background":"新生兒(嬰兒)因心臟位置較高橫,心尖(聽心跳)位置在「左鎖骨中線第3~4肋間」(7歲以上才下移到第5肋間)。鎖骨內側、第2~3肋間皆非新生兒心尖位置,故B正確。　補充：新生兒心尖搏動位於「左鎖骨中線第3~4肋間」(心臟位置較水平且偏高)，聽診心跳速率應於此處測量1分鐘；隨年齡增長心尖位置逐漸下移至第5肋間。","options":{"A":"第2~3肋間偏高(非新生兒心尖)。","B":"正確。左鎖骨中線第3~4肋間=新生兒心尖。","C":"鎖骨內側非心尖位置(應鎖骨中線)。","D":"第2~3肋間偏高。"},"sources":["新文京《兒科護理學》心尖","第3-4肋間"]}},"111110-N4-19":{"quick":"新生兒蒙古斑錯誤的是「一般於12~18歲會逐漸消失」(C)。","detail":{"background":"蒙古斑多在「兒童早期(約4~7歲、學齡前)」逐漸消退,而非12~18歲,故C錯誤。其餘正確:是胎記的一種、多分布於臀背大腿、邊緣界線不明顯、青灰色斑。　補充：蒙古斑為真皮層黑色素細胞聚積形成的藍灰色斑，好發薦尾與臀部，屬良性，多於幼兒期(約2~5歲)自行消退；「12~18歲才消失」之敘述錯誤。","options":{"A":"正確。蒙古斑是胎記的一種。","B":"正確。多分布於臀部、背部和大腿。","C":"錯誤(本題答案)。蒙古斑多在兒童早期(學齡前)消退(非12~18歲)。","D":"正確。邊緣界線不明顯。"},"sources":["新文京《兒科護理學》蒙古斑","學齡前退"]}},"112180-N4-30":{"quick":"6個月嬰兒頭頂中間軟軟的,最適當的回應是「這是前囟門,約於12至18個月大時會完全關閉」(A)。","detail":{"background":"頭頂中間「軟軟可摸到搏動」的是「前囟門(菱形)」,正常約「12~18個月關閉」。後囟門約2個月已關(非最近2個月才關,C錯);前囟門非3個月關閉(B錯);此屬正常不需轉診神經外科(D錯),故A正確。　補充：前囟門呈菱形、約12~18個月關閉，觸診平軟為正常；凹陷提示脫水、膨出提示顱內壓上升；故對母親「頭頂軟軟」的疑問應說明此為正常前囟門及其關閉時間。","options":{"A":"正確。這是前囟門,約12~18個月完全關閉。","B":"錯。前囟門非出生後3個月關閉。","C":"錯。後囟門約2個月已關(非最近2個月才關)。","D":"錯。此屬正常(不需轉診神經外科)。"},"sources":["新文京《兒科護理學》囟門","前囟12-18月"]}},"113030-N4-17":{"quick":"放入磅秤時四肢對稱外展伸直、拇指與食指呈C字形,是「擁抱反射(moro reflex)」(A)。","detail":{"background":"擁抱反射(Moro)是突然改變姿勢/失去支撐時,新生兒「四肢對稱性外展伸直、手指張開(拇指與食指呈C形)再內收」。驚嚇反射(startle)是對突發聲響、手肘屈曲;手掌抓握、退縮反射皆非此動作,故A正確。","options":{"A":"正確。四肢對稱外展伸直、手指C形=擁抱反射(Moro)。","B":"驚嚇反射是對突發聲響、手肘屈曲。","C":"手掌抓握反射是觸掌心即握。","D":"退縮反射是疼痛刺激時肢體回縮。"},"sources":["新文京《兒科護理學》反射","Moro"]}},"113100-N4-17":{"quick":"出生第二天親子同室,護理師應進一步評估的狀況是「整天尿布都沒有濕」(A)。","detail":{"background":"新生兒「整天尿布沒濕(無尿)」可能脫水或泌尿問題,屬異常須評估。半夜醒來2次(正常需求餵食)、大便綠色(過渡便,正常)、哭時沒眼淚(淚腺未成熟,正常)皆屬正常現象,故A須進一步評估。　補充：新生兒親子同室須觀察排泄：出生後應於24小時內排尿與解胎便，「整天尿布都沒濕(無尿)」提示脫水或泌尿問題，需進一步評估餵食量與腎功能。","options":{"A":"正確(本題答案)。整天尿布沒濕(無尿)須進一步評估。","B":"半夜醒來2次屬正常(需求餵食)。","C":"大便綠色是過渡便(正常)。","D":"哭時沒眼淚是淚腺未成熟(正常)。"},"sources":["新文京《兒科護理學》新生兒","無尿"]}},"114100-N4-18":{"quick":"新生兒頭部評估正確的是「胎頭變形(molding)為順應產道分娩而形成的頭骨重疊,約出生後數天或數週會恢復」(C)。","detail":{"background":"胎頭變形(molding)是顱骨在產道受擠「重疊」,出生後數天~數週恢復,屬正常。頭血腫「不越過骨縫線」(C的A項說頭血腫超過骨縫線錯);產瘤是「頭皮軟組織水腫、越過骨縫線」(B說產瘤不越過且是骨膜下血液錯);前囟門約「12~18個月」關閉(非12~18週,D錯),故C正確。","options":{"A":"錯。頭血腫不越過骨縫線(此敘述相反)。","B":"錯。產瘤是軟組織水腫、會越過骨縫線(非骨膜下血液)。","C":"正確。胎頭變形是顱骨重疊,數天至數週恢復。","D":"錯。前囟門約12~18個月關閉(非12~18週)。"},"sources":["新文京《兒科護理學》頭部","molding"]}},"114100-N4-19":{"quick":"長大後不會消失、持續一生的反射是「①眨眼反射+③吞嚥反射+⑤作嘔反射(即135)」(A)。","detail":{"background":"保護性反射「眨眼(blinking)、吞嚥(swallowing)、作嘔(gag)」終生存在(保護功能)。②吸吮反射(約4~6個月消失)、④巴賓斯基反射(約2歲消失)、⑥擁抱反射(約4~6個月消失)是原始反射會消失,故終生存在的是①③⑤(135)。","options":{"A":"正確。眨眼①+吞嚥③+作嘔⑤反射終生存在(135)。","B":"156含⑥擁抱反射(會消失)。","C":"234含②④(會消失)。","D":"346含④⑥(會消失)。"},"sources":["新文京《兒科護理學》反射","保護性"]}},"115030-N4-18":{"quick":"正常新生兒呼吸特徵錯誤的是「採胸式呼吸」(B)。","detail":{"background":"新生兒因肋骨水平、肋間肌弱,「採腹式(橫膈)呼吸」而非胸式,故B錯誤。其餘正確:呼吸速率30~60次/分、呼吸不規律、有時出現<5~15秒的短暫呼吸暫停(週期性呼吸)。　補充：正常新生兒呼吸為「腹式(橫膈)呼吸」、速率約30~60次/分、可有短暫週期性呼吸；「採胸式呼吸」之敘述錯誤，胸式呼吸於幼兒期後才漸發展。","options":{"A":"正確。呼吸速率30~60次/分。","B":"錯誤(本題答案)。新生兒採腹式呼吸(非胸式)。","C":"正確。呼吸不規律。","D":"正確。有時出現5秒以內的呼吸暫停。"},"sources":["新文京《兒科護理學》呼吸","腹式"]}},"114170-N4-9":{"quick":"足月胎兒頭部錯誤的是「冠狀縫合為位於兩個頂骨間的膜性組織」(B)。","detail":{"background":"「矢狀縫合」才是位於兩塊頂骨之間;「冠狀縫合」是位於額骨與兩頂骨之間,故「冠狀縫合在兩頂骨間」錯誤。其餘正確:矢狀縫合連接前後囟門、雙頂徑是胎頭最大橫徑(可作生長遲滯指標)、後囟門三角形位於兩頂骨與枕骨交接處。","options":{"A":"正確。矢狀縫合連結前後兩個囟門。","B":"錯誤(本題答案)。兩頂骨間是矢狀縫合(冠狀縫合在額骨與頂骨間)。","C":"正確。雙頂徑為胎頭最大橫徑,可作生長遲滯指標。","D":"正確。後囟門三角形,位於兩頂骨與枕骨交接處。"},"sources":["新文京《兒科護理學》頭部","縫合"]}},"104030-N4-27":{"quick":"新貝拉德計分法(New Ballard Score)神經肌肉成熟度分數最高(最成熟)的是「方形窗角度為0度」(B)。","detail":{"background":"方形窗(手腕屈曲角度)「角度越小(越接近0度)表示越成熟(關節越緊)」,0度是最成熟。平躺四肢伸展(肌張力低=不成熟)、膝膕角160度(角度大=不成熟)、手肘可拉超過身體中線(圍巾徵鬆=不成熟)皆是早產特徵,故B最成熟。","options":{"A":"四肢伸展是肌張力低(不成熟)。","B":"正確。方形窗0度=最成熟(關節最緊)。","C":"膝膕角160度大=不成熟。","D":"手肘可拉超過中線(圍巾徵鬆)=不成熟。"},"sources":["新文京《兒科護理學》Ballard","方形窗"]}},"104100-N4-4":{"quick":"評估胎兒肺成熟度,配合L/S ratio宜加測「磷脂甘油(phosphatidyl glycerol)」(B)。","detail":{"background":"胎兒肺成熟度以「卵磷脂/抱合髓磷脂比值(L/S ratio≥2)」評估,但易偽陽性,配合測「磷脂甘油(PG,出現代表肺成熟)」可更準確。膽紅素、雌三醇、肌酸酐評估其他面向(非肺成熟),故B正確。　補充：L/S比值≥2提示胎兒肺成熟，但糖尿病母親可能偽陽性；加測「磷脂甘油(PG)」可提高判讀準確性——PG出現代表表面張力素系統成熟、發生呼吸窘迫機率低。","options":{"A":"膽紅素評估溶血(非肺成熟)。","B":"正確。配合磷脂甘油(PG)評估肺成熟度。","C":"雌三醇評估胎盤功能(非肺成熟)。","D":"肌酸酐評估腎成熟(非肺成熟)。"},"sources":["新文京《產科護理學》肺成熟","PG"]}},"104100-N4-24":{"quick":"不是妊娠39週女嬰生理成熟度特徵的是「陰蒂突出,陰唇平坦」(C)。","detail":{"background":"足月(39週)女嬰生殖器成熟特徵是「大陰唇覆蓋小陰唇與陰蒂」;「陰蒂突出、陰唇平坦」是早產特徵,故不是足月特徵。其餘是足月特徵:乳暈突起0.5~1公分、身體幾乎無胎毛、整個腳底有皺褶。　補充：足月女嬰生理成熟特徵為「大陰唇覆蓋陰蒂及小陰唇」；「陰蒂突出、陰唇平坦」屬早產兒特徵，反映皮下脂肪與生殖器發育尚未成熟。","options":{"A":"是足月特徵。乳暈突起0.5~1公分。","B":"是足月特徵。身體幾乎無胎毛。","C":"不是(本題答案)。陰蒂突出陰唇平坦是早產特徵(足月是大陰唇覆蓋)。","D":"是足月特徵。整個腳底都有皺摺。"},"sources":["新文京《兒科護理學》成熟度","女嬰生殖器"]}},"104100-N4-52":{"quick":"屬於早產兒成熟度特徵的是「手腕方型窗所形成的角度小於45度」?——本題答C「足跟能觸及耳朵」。","detail":{"background":"本題官方答案為C。早產兒關節鬆弛、肌張力低,「足跟能輕易觸及耳朵(heel to ear鬆)」是早產特徵。方形窗角度「大(>45度)」才是早產(A的<45度是成熟);手肘「易」越過中線是早產(B的無法越過是足月);膝膕角「大(>90度)」是早產(D的<90度是成熟),故C正確。","options":{"A":"方形窗<45度是較成熟(早產角度大)。","B":"手肘無法越過中線是足月(早產易越過)。","C":"正確。足跟能觸及耳朵(關節鬆)=早產特徵。","D":"膝膕角<90度是較成熟(早產角度大)。"},"sources":["新文京《兒科護理學》成熟度","足跟觸耳"]}},"105030-N4-56":{"quick":"比較早產兒與足月兒臨床特徵正確的是「躺姿:早產兒呈放鬆伸展,而足月兒呈彎曲姿勢」(B)。","detail":{"background":"早產兒肌張力低「躺姿放鬆伸展」,足月兒肌張力佳「呈屈曲姿勢」。抓握反射足月兒比早產兒「明顯」(A相反);足跟碰耳早產兒「易完成(關節鬆)」(C相反);肌張力評估早產兒手肘「易」越過胸部(D相反),故B正確。","options":{"A":"抓握反射足月兒較明顯(非早產兒明顯)。","B":"正確。早產兒躺姿伸展、足月兒屈曲。","C":"足跟碰耳早產兒易完成(關節鬆,非不易)。","D":"手肘越過胸部早產兒較易(非不容易)。"},"sources":["新文京《兒科護理學》成熟度","躺姿"]}},"106110-N4-29":{"quick":"女性新生兒生殖器成熟度評估最成熟的是「大陰唇覆蓋陰蒂及小陰唇」(A)。","detail":{"background":"足月(最成熟)女嬰大陰唇豐滿「覆蓋陰蒂與小陰唇」。陰蒂小陰唇均突出、陰蒂突出小陰唇平坦是「早產(不成熟)」;大陰唇變大小陰唇變小是過渡,故A最成熟。　補充：女嬰生殖器成熟度以「大陰唇覆蓋陰蒂及小陰唇」為最成熟；隨成熟大陰唇漸豐厚並覆蓋小陰唇，早產則陰蒂與小陰唇突出、大陰唇未發育。","options":{"A":"正確。大陰唇覆蓋陰蒂及小陰唇=最成熟(足月)。","B":"陰蒂小陰唇均突出=最不成熟(早產)。","C":"大陰唇變大小陰唇變小是過渡期。","D":"陰蒂突出小陰唇平坦=早產(不成熟)。"},"sources":["新文京《兒科護理學》成熟度","大陰唇覆蓋"]}},"106111-N4-28":{"quick":"新生兒成熟度：①早產兒方形窗角度大(可達100度)、④早產兒肌張力低腳易拉到頭(跟耳徵)正確;②足月兒膝膕角小③早產兒圍巾徵手肘「可」超過中線，皆錯。","detail":{"background":"本題官方答案為A(13)。①早產兒關節鬆、方形窗角度「大(可達100度)」(正確);③此題敘述早產兒圍巾徵象「手肘無法超過中線」(實務上早產兒圍巾徵較鬆易越過,但本題以官方13為準)。②足月兒膝膕角「<90度(小)」(非大於90度);④早產兒腳「易」拉到頭部,故官方判①③為正解。","options":{"A":"13：含③(早產兒圍巾徵手肘「可」過中線，故③敘述錯)。","B":"正確。①方形窗可達100度＋④早產兒腳易拉到頭(跟耳徵)。","C":"23：含②(足月兒膝膕角小，>90錯)。","D":"34：含③，錯誤。"},"sources":["新文京《兒科護理學》成熟度","方形窗"]}},"107030-N4-27":{"quick":"新貝拉德(New Ballard Score)神經肌肉成熟度評估方法正確的是「評估手臂反彈力,將新生兒雙手肘彎曲5秒後再讓兩手臂伸展放鬆,觀察反彈後肘部角度」(C)。","detail":{"background":"手臂反彈(arm recoil):先屈曲手肘5秒,再伸展放鬆,觀察「手臂回彈到屈曲的角度」(回彈快、角度小越成熟)。評估姿勢觀察「靜止時屈曲程度」(非哭泣時伸展,A錯);方形窗是手腕「向前臂內側」屈曲(B方向不精確);圍巾徵是手拉向對側肩看手肘與「身體中線」關係(D敘述為乳頭中線不精確),故C正確。","options":{"A":"姿勢評估觀察靜止屈曲(非哭泣時伸展)。","B":"方形窗是手腕向前臂內側屈曲(B方向不精確)。","C":"正確。手臂反彈:屈曲5秒後伸展放鬆,觀察反彈肘角度。","D":"圍巾徵看手肘與身體中線關係(D敘述不精確)。"},"sources":["新文京《兒科護理學》Ballard","手臂反彈"]}},"107110-N4-30":{"quick":"屬於早產兒神經成熟度特徵的是「手肘可以超過身體中線」(D)。","detail":{"background":"早產兒關節鬆弛、肌張力低,圍巾徵「手肘可越過身體中線」是早產特徵。四肢高張性屈曲(足月)、方形窗0度(足月最成熟)、腳跟無法拉到耳朵(足月關節緊)皆是足月特徵,故D是早產。　補充：早產兒神經成熟度未成熟，肌肉張力低、關節活動角度大；「手肘可超過身體中線(圍巾徵象陽性)」反映張力不足，為早產特徵；足月兒手肘無法越過中線。","options":{"A":"四肢高張性屈曲是足月(早產肌張力低)。","B":"方形窗0度是足月最成熟。","C":"腳跟無法拉到耳朵是足月(關節緊)。","D":"正確。手肘可超過身體中線(圍巾徵鬆)=早產。"},"sources":["新文京《兒科護理學》成熟度","圍巾徵"]}},"107110-N4-43":{"quick":"30週、2400g女嬰,體重與妊娠週數關係屬「LGA:大於妊娠週數應有體重」(A)。","detail":{"background":"30週早產兒的平均體重約1300~1500g,2400g明顯「大於該妊娠週數應有體重」,屬「LGA(large for gestational age)」。AGA(符合)、SGA(小於)、VLBW(<1500g非常低體重)皆不符(2400g且大於週數),故A正確。","options":{"A":"正確。30週2400g大於該週數應有體重=LGA。","B":"AGA是體重符合週數(此例偏大,非AGA)。","C":"SGA是小於週數(此例偏大,非SGA)。","D":"VLBW是<1500g(2400g非VLBW)。"},"sources":["新文京《兒科護理學》LGA","大於週數"]}},"109110-N4-28":{"quick":"足月新生兒身體成熟度評估錯誤的是「乳暈平坦無突起」(B)。","detail":{"background":"足月兒乳暈「突起、可摸到乳核(乳腺組織)約0.5~1公分」,「乳暈平坦無突起」是早產特徵,故B錯誤(足月應突起)。其餘是足月特徵:皮膚乾裂幾乎看不見血管、耳軟骨堅硬成形彎凹後立即反彈、眼瞼張開。　補充：足月新生兒成熟特徵包括乳暈突起、乳核可觸及、足底紋路多、耳軟骨回彈佳；「乳暈平坦無突起」屬早產特徵，反映乳腺與皮下組織發育未成熟。","options":{"A":"正確(足月)。皮膚乾裂、幾乎看不見血管。","B":"錯誤(本題答案)。足月兒乳暈突起(乳暈平坦無突起是早產)。","C":"正確(足月)。耳軟骨堅硬成形、彎凹後立即反彈。","D":"正確(足月)。眼瞼張開。"},"sources":["新文京《兒科護理學》成熟度","乳暈"]}},"112110-N4-29":{"quick":"使用New Ballard Score評估足月兒成熟度與妊娠週數的最佳時間是「出生後24小時內」(A)。","detail":{"background":"New Ballard Score建議在「出生後24小時內(尤12~24小時)」評估最準確(神經肌肉成熟度隨時間變化,過久準確度下降)。出生2~3天後、3~7天、8天後評估皆過晚,故A正確。　補充：New Ballard Score評估神經肌肉與身體成熟度以推估妊娠週數，最佳評估時間為「出生後12~24小時內」(過早張力未穩、過晚特徵改變)，可用於極早產兒。","options":{"A":"正確。出生後24小時內評估最佳。","B":"出生後2~3天偏晚。","C":"出生後3~7天過晚。","D":"出生後8天至滿月前過晚。"},"sources":["新文京《兒科護理學》Ballard","24小時內"]}},"113180-N4-17":{"quick":"四位出生3小時新生兒中可能為早產兒的是「林小妹,膝膕間角度為140°,全身胎毛豐富」(B)。","detail":{"background":"早產兒特徵:膝膕角「大(140°,關節鬆)」、全身胎毛豐富(早產胎毛多)。方形窗0°+手臂反彈60°(成熟,A是足月);圍巾徵手肘不越中線+乳暈突起5mm(成熟,C);足底前2/3有皺褶+皮膚乾燥看不見血管(成熟,D)皆是足月特徵,故B是早產。","options":{"A":"方形窗0°、手臂反彈角小=足月(非早產)。","B":"正確。膝膕角140°大、胎毛豐富=早產兒。","C":"圍巾徵不越中線、乳暈突起=足月。","D":"足底皺褶多、皮膚乾燥看不見血管=足月。"},"sources":["新文京《兒科護理學》Ballard","早產"]}},"114100-N4-35":{"quick":"早產兒身體外觀特徵錯誤的是「腳底皮膚皺摺比足月兒多且清晰可見」(C)。","detail":{"background":"早產兒腳底皺褶「少(僅前1/3或更少)」,足月兒才是「整個腳底皺褶多且清晰」,故C錯誤(早產應皺褶少)。其餘是早產特徵:皮膚缺皮下脂肪透明易見血管、耳翼軟骨未骨化扁平易摺疊、27~28週胎毛量最多。　補充：早產兒外觀特徵：皮膚薄紅、胎毛多、皮下脂肪少、耳軟骨軟、足底紋路「少而淺」；「腳底皺摺比足月兒多且清晰」與早產特徵相反、為錯誤敘述(足月兒紋路才多而深)。","options":{"A":"正確(早產)。皮膚缺皮下脂肪、透明易見血管。","B":"正確(早產)。耳翼軟骨未骨化、扁平易摺疊。","C":"錯誤(本題答案)。早產兒腳底皺褶少(非比足月多)。","D":"正確。27~28週胎毛量最多。"},"sources":["新文京《兒科護理學》早產","腳底皺褶"]}},"101110-N4-11":{"quick":"36週又1天、2475g晚早產兒,描述及照顧正確的是「晚早產兒罹病率高,應密切照顧,並支持其各種感官及腦部的發展」(D)。","detail":{"background":"晚早產兒(34~36+6週)雖接近足月,但「各系統未完全成熟、罹病率(呼吸窘迫、餵食、體溫、黃疸、感染)仍較高」,須密切照顧並支持感官腦部發展。不能因接近足月就掉以輕心(A、B、C皆低估其風險),故D正確。","options":{"A":"錯。晚早產兒未必能進一般嬰兒室(仍需觀察)。","B":"錯。晚早產兒各系統未完全成熟(非已成熟)。","C":"錯。死亡率雖較低但罹病率仍高(不可掉以輕心)。","D":"正確。晚早產兒罹病率高,須密切照顧支持發展。"},"sources":["新文京《兒科護理學》晚早產","罹病率"]}},"103100-N4-60":{"quick":"28週早產兒在加護病房,雙親探視最合適的護理指導是「清楚說明凱凱在早產兒加護病房的健康狀況及其醫療處置」(C)。","detail":{"background":"家庭中心照護應「誠實清楚向雙親說明病情與醫療處置」,降低焦慮、促進參與。不應避免回答儀器疑問(A);不應只說「沒問題」報喜不報憂(B);應「鼓勵適當接觸(如袋鼠護理)」而非避免碰觸(D),故C正確。　補充：對早產兒父母的護理指導應提供清楚的病情與治療說明、鼓勵參與照顧與肌膚接觸、給予情緒支持與促進依附；以誠實具體的資訊降低焦慮、建立信任。","options":{"A":"錯。不應避免回答醫療儀器疑問(應說明)。","B":"錯。不應只說沒問題(應誠實說明狀況)。","C":"正確。清楚說明健康狀況及醫療處置。","D":"錯。應鼓勵適當接觸(如袋鼠護理),非避免碰觸。"},"sources":["新文京《兒科護理學》早產","家庭中心"]}},"104100-N4-50":{"quick":"極度早產兒、體溫35.6°C,保溫措施不包括「減低保溫箱內的濕度」(A)。","detail":{"background":"早產兒保溫應「維持較高濕度(減少皮膚蒸發散熱與失水)」,「減低濕度」反而增加散熱,故不包括(不適當)。其餘是保溫措施:用輻射加熱處理台、戴毛線帽、接觸物品事先加溫。　補充：極度早產兒體溫調節差，保溫措施包括使用保溫箱並「提高濕度」減少蒸發散熱、戴帽、減少暴露、預熱用物；降低保溫箱濕度反而增加蒸發散熱，並不適當。","options":{"A":"不包括(本題答案)。應維持高濕度(減低濕度會增散熱)。","B":"是措施。輻射加熱處理台的使用。","C":"是措施。為早產兒戴毛線帽。","D":"是措施。接觸早產兒的物品事先加溫。"},"sources":["新文京《兒科護理學》早產保溫","高濕度"]}},"104100-N4-53":{"quick":"呼吸窘迫症候群(RDS)早產兒臨床表徵不包括「吸氣時有咕嚕聲,為最早出現的徵兆」(A)。","detail":{"background":"RDS最早出現的是「呼氣呻吟(grunting)(呼氣時咕嚕聲)」,而非「吸氣時咕嚕聲」,故A敘述錯誤(時相錯)。其餘是RDS表徵:呼吸>60次/分、鼻翼搧動肋間凹陷、出生時尚可但30分鐘~2小時內出現症狀。","options":{"A":"不包括(本題答案)。RDS是呼氣呻吟(非吸氣咕嚕)。","B":"是表徵。呼吸速率>60次/分。","C":"是表徵。鼻翼搧動、肋間肌凹陷。","D":"是表徵。出生時正常,30分鐘~2小時內出現症狀。"},"sources":["新文京《兒科護理學》RDS","呼氣呻吟"]}},"106030-N4-54":{"quick":"25週又5天、680g保溫箱中體溫36°C,維持正常體溫措施錯誤的是「維持保溫箱濕度40%,以避免體熱流失」(A)。","detail":{"background":"極度早產兒應維持「高濕度(約60~80%)」減少皮膚蒸發散熱與失水,「濕度40%」過低,故A錯誤。其餘正確:呼吸器加熱潮濕器維持氧氣溫度、塑膠膜覆蓋減少對流散熱、戴帽與毛毯保暖。　補充：極早早產兒(25週、680g)體溫維持應使用保溫箱並「提高濕度(常達70~80%)」以減少不顯性水分與蒸發散熱；維持濕度40%偏低、無法有效避免體熱與水分流失。","options":{"A":"錯誤(本題答案)。早產兒應維持高濕度(40%過低)。","B":"正確。呼吸器加熱潮濕器維持氧氣溫度。","C":"正確。塑膠膜覆蓋減少對流熱喪失。","D":"正確。戴帽及毛毯包裹保持體溫。"},"sources":["新文京《兒科護理學》早產保溫","高濕度"]}},"106110-N4-53":{"quick":"出生兩天早產兒呼吸暫停警鈴響,護理措施正確的是「以手掌輕揉背部」(A)。","detail":{"background":"早產兒呼吸暫停(apnea)時,第一步「給予溫和的觸覺刺激(輕揉背部/腳底)」誘發呼吸。抽吸口鼻是有分泌物時才做(非首要);高濃度氧須避免(視網膜病變);俯臥非處置呼吸暫停的首步,故A正確。　補充：早產兒呼吸暫停(>20秒或伴心搏過緩、發紺)護理：先以輕柔觸覺刺激(輕揉背部或足底)誘發呼吸，無效再給氧或正壓；避免劇烈搖晃，並查找誘因(低血糖、感染、低體溫)。","options":{"A":"正確。以手掌輕揉背部(觸覺刺激誘發呼吸)。","B":"抽吸口鼻是有分泌物才做(非首要)。","C":"高濃度氧須避免(防視網膜病變)。","D":"直接俯臥非呼吸暫停的處置首步。"},"sources":["新文京《兒科護理學》呼吸暫停","觸覺刺激"]}},"108020-N4-62":{"quick":"早產兒在保溫箱中的感官刺激護理措施正確的是「晚上可在保溫箱上覆蓋布罩,以調節日夜光線變化」(B)。","detail":{"background":"早產兒須「調節日夜光線(晚上遮光)」模擬子宮環境、促進生理節律。聽覺刺激不宜過早過強(應減少噪音,A錯);姿勢應「屈曲(寧握)」非伸展(C錯);護理應「集中(非分段過多打擾)」給足夠休息(D敘述不當),故B正確。","options":{"A":"錯。應減少噪音(非最早給強聽覺刺激)。","B":"正確。晚上覆蓋布罩調節日夜光線。","C":"錯。姿勢應屈曲(寧握),非伸展。","D":"護理應集中減少打擾(分段過多不當)。"},"sources":["新文京《兒科護理學》早產","遮光"]}},"108110-N4-59":{"quick":"早產兒視網膜病變(ROP)正確的是「與過度或長期給高氧、光線刺激有關」(B)。","detail":{"background":"ROP與「高濃度/長期氧氣暴露、光線刺激」使不成熟視網膜血管異常增生有關。它主要發生於「妊娠32週以下/低出生體重早產兒」(非35週以上,A錯);是視網膜血管「收縮後異常增生」(C的舒張不精確);應於「出生後4~6週或矯正年齡32週」開始篩檢(D的4個月太晚),故B正確。","options":{"A":"錯。主要發生於32週以下早產兒(非35週以上)。","B":"正確。與過度/長期高氧、光線刺激有關。","C":"是血管收縮後異常增生(C的舒張不精確)。","D":"篩檢約出生4~6週開始(非4個月)。"},"sources":["新文京《兒科護理學》ROP","高氧"]}},"109110-N4-56":{"quick":"早產兒腸胃系統功能不適當的是「消化乳糖能力至妊娠32週以後才成熟」(D)?——本題答D。","detail":{"background":"本題官方答案為D。早產兒乳糖酶等消化酶不足,「消化乳糖能力的成熟」並非單純「32週後才成熟」的明確界線(乳糖酶約足月才較成熟),官方判此敘述不適當。其餘正確:胃容量小且腸蠕動弱、心跳呼吸快新陳代謝快、對脂肪消化能力有限。","options":{"A":"正確。早產兒胃容量小且胃腸蠕動弱。","B":"正確。心跳呼吸快、新陳代謝快。","C":"正確。對脂肪消化能力有限。","D":"不適當(本題答案)。乳糖消化成熟時程敘述不當(官方判錯)。"},"sources":["新文京《兒科護理學》早產","消化"]}},"110110-N4-53":{"quick":"早產兒體溫調節護理措施不適當的是「低出生體重早產兒絕對不能執行袋鼠式護理,以免造成低體溫」(B)。","detail":{"background":"袋鼠式護理(母嬰肌膚接觸)對「穩定的低出生體重早產兒」反而「有助維持體溫、穩定生理、促進依附」,並非絕對禁止,故B不適當。其餘適當:集中護理避免離開保溫箱、透明膠膜覆蓋減散熱、抱出保溫箱時給保暖。　補充：早產兒體溫調節差，護理應使用保溫箱/輻射保暖、戴帽、減少暴露，並可執行袋鼠式(肌膚接觸)護理以穩定體溫；「絕對不能執行袋鼠式護理」之敘述錯誤。","options":{"A":"適當。集中護理,避免早產兒離開保溫箱。","B":"不適當(本題答案)。穩定的低體重早產兒可做袋鼠護理(非絕對禁止)。","C":"適當。透明膠膜覆蓋減少體熱散失。","D":"適當。抱出保溫箱時提供保暖(帽子包被)。"},"sources":["新文京《兒科護理學》袋鼠護理","可做"]}},"111030-N4-54":{"quick":"早產兒抽吸分泌物正確的是「抽吸管大小為5~8 Fr.」(B)。","detail":{"background":"早產兒抽吸管選「5~8 Fr.(細小)」。抽吸順序應「先口腔再鼻腔(口→鼻,避免刺激鼻部誘發吸氣把分泌物吸入)」(A的先鼻錯);抽吸壓力約「60~100 mmHg(早產兒較低)」(C的不可超過60過嚴);每次抽吸時間「≤5~10秒(越短越好)」(D的20秒過久),故B正確。","options":{"A":"抽吸順序應先口後鼻(A的先鼻不當)。","B":"正確。早產兒抽吸管大小5~8 Fr.。","C":"抽吸壓力約60~100mmHg(C的不可超過60過嚴)。","D":"每次抽吸時間≤5~10秒(20秒過久)。"},"sources":["新文京《兒科護理學》抽吸","5-8Fr"]}},"111110-N4-53":{"quick":"早產兒安全擺位不適當的是「口胃管灌食後,維持頭部抬高45度約10分鐘」(A)?——本題答A。","detail":{"background":"本題官方答案為A。早產兒口胃管灌食後宜「右側臥、頭部抬高並維持較久(約30分鐘)」減少逆流,「抬高45度約10分鐘」時間不足且角度敘述不當(官方判不適當)。其餘適當:休息時肩朝前雙手屈曲朝中線近嘴(寧握)、屈曲髖膝預留活動空間、呼吸暫停時頸部微仰勿過度屈曲伸展。","options":{"A":"不適當(本題答案)。灌食後應右側臥、抬高維持較久(約30分鐘,非10分鐘45度)。","B":"適當。肩朝前、雙手屈曲朝中線近嘴(寧握)。","C":"適當。屈曲髖膝,預留四肢活動空間。","D":"適當。呼吸暫停時頸部微仰,勿過度屈曲伸展。"},"sources":["新文京《兒科護理學》早產","擺位"]}},"112030-N4-54":{"quick":"早產兒視網膜病變(ROP)高危險群與症狀不適當的是「視網膜完全剝離,可經由鞏膜扣壓術、玻璃體內切除術獲得治癒」(D)。","detail":{"background":"ROP第五期「視網膜完全剝離」即使手術(鞏膜扣壓、玻璃體切除)也「難以恢復視力(預後差,非治癒)」,故D不適當。其餘正確:好發出生體重<1500g、長期高氧暴露為危險因子、第一二期輕度多自行好轉。　補充：早產兒視網膜病變(ROP)高危群為低妊娠週數、低出生體重、長時間高濃度氧療；輕者可自行消退，重者雷射或冷凝治療；「視網膜完全剝離可經手術治癒」過於樂觀、不適當。","options":{"A":"正確。通常出生體重<1500公克。","B":"正確。長期用呼吸器與高濃度氧暴露為危險因子。","C":"正確。第一二期輕度多自行好轉。","D":"不適當(本題答案)。完全剝離(第五期)手術也難治癒(預後差)。"},"sources":["新文京《兒科護理學》ROP","剝離"]}},"112110-N4-52":{"quick":"26週早產兒維持體溫照護不適當的是「保溫箱溫度設定於28~30°C,濕度45~50%」(B)。","detail":{"background":"極度早產兒保溫箱溫度應較高(約32~35°C依體重),濕度應「高(60~80%)」,「28~30°C、濕度45~50%」過低,故B不適當。其餘適當:毛毯戴帽手腳套、塑膠單覆蓋減散熱、置預熱的輻射加溫台執行處置。","options":{"A":"適當。毛毯包裹、戴帽、四肢穿戴手腳套。","B":"不適當(本題答案)。保溫箱溫度濕度設定過低(應更高)。","C":"適當。塑膠單/套覆蓋減少散熱。","D":"適當。置預熱的輻射加溫台執行醫療處置。"},"sources":["新文京《兒科護理學》早產保溫","高溫濕"]}},"112180-N4-35":{"quick":"促進早產兒統整化行為不適當的是「絕對避免觸摸或抱起早產兒,以免引起驚嚇反射之刺激」(C)。","detail":{"background":"早產兒應「以寧握、袋鼠護理等溫和接觸促進統整與安定」,「絕對避免觸摸或抱起」會剝奪正向感官與依附經驗,故C不適當。其餘適當:袋鼠式護理皮膚接觸、清醒時播放輕柔音樂、用包巾築巢提供子宮般安全感。　補充：促進早產兒統整化行為應提供合宜的觸覺、減少過度刺激、集中護理、維持屈曲姿勢與袋鼠式護理；「絕對避免觸摸或抱起」並不適當，適度肌膚接觸有助穩定生理與發展。","options":{"A":"適當。袋鼠式護理(皮膚接觸)。","B":"適當。清醒時播放輕柔音樂。","C":"不適當(本題答案)。不應絕對避免觸摸抱起(應溫和接觸如寧握)。","D":"適當。包巾築巢提供類似子宮的安全感。"},"sources":["新文京《兒科護理學》早產","寧握"]}},"114170-N4-33":{"quick":"32週早產兒餵食出現腹脹、吐奶和血便,最可能的併發症是「壞死性小腸結腸炎(NEC)」(B)。","detail":{"background":"早產兒餵食後出現「腹脹、吐奶(含膽汁)、血便」是「壞死性小腸結腸炎(NEC)」的典型表現(腸道缺血缺氧+餵食+細菌)。新生兒黃疸(皮膚黃)、RDS(呼吸窘迫)、ROP(視網膜)皆非以腹脹血便表現,故B正確。","options":{"A":"新生兒黃疸是皮膚黃(非腹脹血便)。","B":"正確。腹脹吐奶血便=壞死性小腸結腸炎(NEC)。","C":"RDS是呼吸窘迫(非腹脹血便)。","D":"ROP是視網膜病變(非腹脹血便)。"},"sources":["新文京《兒科護理學》NEC","血便"]}},"102110-N4-50":{"quick":"上臂神經叢麻痺(Erb麻痺)：抓握反射「存在」(C8-T1未受損)、患肢呈「服務生小費」姿勢;照護維持肩外展外轉、肘屈、前臂後旋、腕微背屈。","detail":{"background":"本題官方答案為A。上臂神經叢麻痺(Erb麻痺,C5-C6)典型「患側手臂無力、內收內旋、Moro反射不對稱」;本題以A(無抓握反射、手腕下垂)為徵象描述。照護應「維持患肢功能位、避免過度牽拉,約1~2週後開始溫和被動關節活動」(B的姿勢、C的每2小時全關節運動、D的一個月後復健皆不精確),故A正確。","options":{"A":"Erb麻痺抓握反射「存在」(C8-T1未受損)，非無抓握、腕內縮下垂(那是下臂叢/Klumpke)，此敘述錯。","B":"正確。維持肩外展、外轉、肱屈曲、前臂後旋、腕微背屈的抗攣縮擺位。","C":"急性期不宜過早每2小時全關節運動。","D":"復健時機敘述不精確。"},"sources":["新文京《兒科護理學》臂神經叢","Erb"]}},"103100-N4-30":{"quick":"胎頭腫塊(Caput succedaneum,產瘤)特性錯誤的是「約6週後會自然消失,無需治療」(D)。","detail":{"background":"產瘤(caput succedaneum)是頭皮「軟組織水腫」,「出生後數天(數小時至3~4天)即吸收消退」,並非6週才消失(6週是頭血腫的消退時程),故D錯誤。其餘正確:頭皮軟組織水腫、會越過顱骨縫合線、因頭皮受壓形成。","options":{"A":"正確。為胎兒頭皮上軟組織水腫。","B":"正確。通常會超過顱骨縫合線。","C":"正確。是因頭皮受壓形成之水腫。","D":"錯誤(本題答案)。產瘤約數天消失(6週是頭血腫的時程)。"},"sources":["新文京《兒科護理學》產瘤","數天"]}},"103100-N4-54":{"quick":"40週又3天、4350g自然產,不是鎖骨骨折現象的是「方形窗測試角度大於90度」(D)。","detail":{"background":"方形窗測試是評估「神經肌肉成熟度」,與鎖骨骨折無關,故D不是鎖骨骨折現象。鎖骨骨折(常見於巨嬰肩難產)徵象:驚嚇反射兩手臂動作不對稱、患側觸痛或腫脹、雙手臂不等長肩部不等高,故A、B、C是鎖骨骨折表現。","options":{"A":"是鎖骨骨折現象。驚嚇反射兩手臂動作不對稱。","B":"是。患側局部觸痛或腫脹。","C":"是。雙手臂不等長、肩部不等高。","D":"不是(本題答案)。方形窗測角度是成熟度評估(與鎖骨骨折無關)。"},"sources":["新文京《兒科護理學》鎖骨骨折","不對稱"]}},"103100-N4-58":{"quick":"39週又5天、產鉗、產後左臉扭抽嘴角下垂、左半臉無活動(顏面神經麻痺),護理措施不適當的是「若眼瞼無法閉合,宜使用單眼眼罩保護」(C)?——本題答C。","detail":{"background":"本題官方答案為C。顏面神經麻痺若眼瞼無法閉合,應「用人工淚液與紗布/敷料保護濕潤角膜」,「單眼眼罩」可能壓迫或不足以保濕(官方判不適當)。其餘適當:奶瓶餵食用質軟大洞奶嘴、吞嚥受損依醫囑鼻胃管灌食、餵母奶健側靠近乳房利吸吮。","options":{"A":"適當。奶瓶餵食用質軟、奶嘴洞大的奶頭。","B":"適當。吞嚥能力受損依醫囑鼻胃管灌食。","C":"不適當(本題答案)。眼瞼無法閉合應人工淚液+敷料保濕(非單眼眼罩)。","D":"適當。餵母奶健側靠近乳房利吸奶。"},"sources":["新文京《兒科護理學》顏面神經","保護角膜"]}},"104100-N4-27":{"quick":"產後第2天右側頭上有界限紅色軟腫塊、比第1天變大,是「頭血腫」(C)。","detail":{"background":"頭血腫(cephalohematoma)是「骨膜下出血、界限明顯不越骨縫線、可能於出生後逐漸變大(出血持續)、數週才吸收」。產瘤是「軟組織水腫、出生即最明顯、越骨縫、數天退」。本例「界限清楚、變大」符合頭血腫,故C正確。","options":{"A":"胎頭畸形(molding)是顱骨重疊(非腫塊變大)。","B":"產瘤出生即最明顯、數天退(非變大)。","C":"正確。界限清楚、逐漸變大=頭血腫。","D":"腦水腫非此局部界限性腫塊的描述。"},"sources":["新文京《兒科護理學》頭血腫","變大"]}},"104100-N4-43":{"quick":"可評估是否有臂神經叢受損的新生兒反射是「擁抱反射(Moro reflex)」(B)。","detail":{"background":"擁抱反射(Moro)需「雙側手臂對稱外展」,若一側臂神經叢受損(Erb麻痺),該側手臂「反應不對稱/無法外展」,故Moro反射可評估臂神經叢損傷。手掌抓握、頸部強直、踏步反射皆非評估臂神經叢的指標,故B正確。","options":{"A":"手掌抓握反射評估手部抓握(非臂神經叢損傷)。","B":"正確。Moro反射不對稱可評估臂神經叢受損。","C":"頸部強直反射非評估臂神經叢。","D":"踏步反射評估下肢(非臂神經叢)。"},"sources":["新文京《兒科護理學》Moro","臂神經叢"]}},"106030-N4-28":{"quick":"胎頭腫塊(Caput,產瘤)最適宜的解釋是「這腫塊出生後數天會自行消失,不用擔心」(B)。","detail":{"background":"產瘤(caput succedaneum)是產道擠壓致頭皮軟組織水腫,「出生後數天自行吸收消失,屬正常」,可向家屬說明不用擔心。它非器械造成(自然產也有,A);界限「不清楚、越骨縫」(C的界限清楚是頭血腫);產瘤不會有顱內出血黃疸合併症(D是過度,那較像頭血腫),故B正確。","options":{"A":"產瘤是產道擠壓(非器械造成,且應給予衛教非推給醫師)。","B":"正確。產瘤出生後數天自行消失,不用擔心。","C":"產瘤界限不清、越骨縫(界限清楚是頭血腫)。","D":"產瘤無顱內出血合併症(D過度)。"},"sources":["新文京《兒科護理學》產瘤","數天消"]}},"108110-N4-28":{"quick":"頭頂部局部軟組織腫脹、組織鬆軟外緣界線不清楚,正確的是「是胎頭腫塊,為頭皮上軟組織水腫」(B)。","detail":{"background":"「界線不清楚、軟組織水腫、越過骨縫」是「胎頭腫塊(產瘤,caput succedaneum)」——頭皮上軟組織水腫。產瘤非骨膜與顱骨間血液(A的骨膜下血液是頭血腫);頭血腫「界線清楚、不越骨縫、數週才退」(C、D描述頭血腫且時程錯),故B正確。","options":{"A":"骨膜與顱骨間血液聚集是頭血腫(非產瘤)。","B":"正確。界線不清、軟組織水腫=胎頭腫塊(產瘤)。","C":"頭血腫不越過縫合線(C敘述錯)。","D":"頭血腫數週才退(非24~48小時消失)。"},"sources":["新文京《兒科護理學》產瘤","軟組織水腫"]}},"115030-N4-17":{"quick":"新生兒頭顱血腫(cephalohematoma)錯誤的是「通常於出生當時最明顯,隨後逐漸變小」(D)。","detail":{"background":"頭血腫是骨膜下出血,「出生後數小時~數天逐漸變大(出血持續),之後數週才吸收」,並非出生當時最明顯隨後變小(那是產瘤),故D錯誤。其餘正確:可能引發生理性黃疸(紅血球分解)、可能單側或雙側、與顱頂骨與骨膜間血管破裂有關。","options":{"A":"正確。可能引發生理性黃疸(血腫吸收分解)。","B":"正確。可能為單側或雙側。","C":"正確。與顱頂骨與骨膜間血管破裂有關。","D":"錯誤(本題答案)。頭血腫出生後逐漸變大(非當時最明顯隨後變小)。"},"sources":["新文京《兒科護理學》頭血腫","變大"]}},"101110-N4-69":{"quick":"3000g、第3天降為2850g,最恰當的回答是「新生兒出生後3~4天內會有5~10%生理性體重喪失,目前減輕的重量在正常範圍內,不需特別處理」(C)。","detail":{"background":"新生兒出生後3~4天因排泄、水分流失、進食少,有「生理性體重減輕約5~10%」,約7~10天恢復。本例減150g(5%)在正常範圍。不需懷疑乳汁不足而加代用品(A);非單純睡多(B不精確);不需特別測血糖(此例非低血糖徵象,D),故C正確。","options":{"A":"錯。不需懷疑乳汁不足而加母乳代用品。","B":"體重減輕是生理性(非單純睡多,B不精確)。","C":"正確。生理性體重喪失5~10%,在正常範圍不需特別處理。","D":"此例非低血糖徵象(不需特別測血糖)。"},"sources":["新文京《兒科護理學》體重","生理性喪失"]}},"102110-N4-27":{"quick":"新生兒餵食後溢奶,最正確的處理是「使嬰兒身體及頭頸部側臥,協助清除口腔分泌物或黏液」(C)。","detail":{"background":"溢奶時應「將頭側向一邊(側臥),使奶水/分泌物流出、清除口腔,防吸入」。立即直立抱起拍背(可能使奶水嗆入,A非首步);平放搖高床頭45度暫勿移動(無法防誤吸,B);用甦醒器給100%氧是嚴重缺氧才需(D過度),故C正確。","options":{"A":"立即直立抱起非首步(溢奶當下先側臥防嗆)。","B":"平放搖高床頭無法即時防誤吸。","C":"正確。側臥、協助清除口腔分泌物防吸入。","D":"用甦醒器給氧是嚴重缺氧才需(D過度)。"},"sources":["新文京《兒科護理學》溢奶","側臥"]}},"103100-N4-32":{"quick":"足月、第2天、3000g、1天哺餵8次,每次平均奶量符合熱量需求是「62~68 c.c」(B)。","detail":{"background":"新生兒熱量需求約「100~120 kcal/kg/天」,配方奶約「20 kcal/oz(約0.67 kcal/mL)」。3000g需約330~360kcal/天≈500~540mL/天,分8次約「每次62~68mL」,故B正確。","options":{"A":"50~55c.c.偏少(總量不足熱量需求)。","B":"正確。每次約62~68c.c.符合熱量需求。","C":"70~76c.c.偏多。","D":"80~86c.c.過多。"},"sources":["新文京《兒科護理學》奶量","100-120kcal"]}},"103100-N4-51":{"quick":"嬰幼兒腸胃道生理功能正確的是「嬰兒因澱粉酶、脂肪酶、胰蛋白酶不足,而增加腹脹與腹瀉機會」(D)。","detail":{"background":"嬰兒消化酶(澱粉酶約3~4個月才足、脂肪酶與胰蛋白酶亦不足)未成熟,故過早或不當餵食易腹脹腹瀉。胃排空「快」但腸蠕動「快」(A的腸蠕動緩慢錯);胎便應「出生24小時內」解出(B的24小時後錯);新生兒腸道長度約身長「6倍」(C的10倍不精確),故D正確。","options":{"A":"錯。嬰兒腸蠕動快(非緩慢)。","B":"錯。胎便應出生24小時內解出(非24小時後)。","C":"腸道長度約身長6倍(C的10倍不精確)。","D":"正確。消化酶不足,增加腹脹與腹瀉機會。"},"sources":["新文京《兒科護理學》消化","酶不足"]}},"104030-N4-74":{"quick":"嬰幼兒消化系統生理特性錯誤的是「新生兒1~2週大時即會嘗試自主控制吞嚥,故有生理性流涎的現象」(A)。","detail":{"background":"嬰兒「約3~4個月」才漸發展自主控制吞嚥、且唾液腺成熟而有「生理性流涎」,並非1~2週,故A錯誤。其餘正確:賁門括約肌鬆弛易溢奶、3個月前缺澱粉酶對澱粉消化差、2歲前胃呈圓形水平餵後採直立姿勢防溢奶。","options":{"A":"錯誤(本題答案)。約3~4個月才漸自主吞嚥/流涎(非1~2週)。","B":"正確。賁門括約肌鬆弛,餵後常溢奶。","C":"正確。3個月前缺澱粉酶,澱粉消化吸收差。","D":"正確。2歲前胃呈圓形水平,餵後採直立姿勢。"},"sources":["新文京《兒科護理學》消化","流涎"]}},"106110-N4-27":{"quick":"2個月、5kg、每4小時餵配方奶一次,每次應餵「150」c.c.(B)。","detail":{"background":"嬰兒每日奶量約「150 mL/kg/天」。5kg×150=750mL/天,每4小時餵一次(一天6次),每次750÷6≈「125~150mL」,故每次約150c.c.(B)。　補充：嬰兒每日約需餵食量120~150 mL/kg；5公斤嬰兒每日約600~750 mL，分6餐(每4小時)則每次約100~150 mL，故每次約150 c.c.。","options":{"A":"120c.c.×6=720mL略低。","B":"正確。150c.c.×6≈750mL符合150mL/kg/天。","C":"180c.c.×6=1080mL過多。","D":"210c.c.過多。"},"sources":["新文京《兒科護理學》奶量","150mL/kg"]}},"106110-N4-73":{"quick":"嬰兒吞嚥攝食生理特性錯誤的是「嬰兒3~4週大時即會嘗試自主控制吞嚥動作」(B)。","detail":{"background":"嬰兒約「3~4個月」才漸自主控制吞嚥(非3~4週),故B錯誤。其餘正確:新生兒藉吸吮與吞嚥反射攝食、下食道括約肌鬆弛易溢奶、約4個月大自發性(原始)吸吮反射消失。　補充：嬰兒吞嚥攝食特性：具尋乳與吸吮反射、賁門括約肌鬆弛易溢奶、胃容量小；自主控制吞嚥約於4~6個月隨神經成熟發展，並非3~4週即能自主控制。","options":{"A":"正確。新生兒藉吸吮反射及吞嚥反射攝食。","B":"錯誤(本題答案)。約3~4個月才漸自主吞嚥(非3~4週)。","C":"正確。下食道括約肌鬆弛,易溢奶。","D":"正確。約4個月大自發性吸吮反射消失。"},"sources":["新文京《兒科護理學》吞嚥","3-4個月"]}},"107030-N4-26":{"quick":"出生3天、3000g純母乳,營養評估異常的是「體重為2,500公克」(A)。","detail":{"background":"生理性體重減輕約「5~10%」,3000g減10%約2700g是下限;「2500g(減約17%)」超過正常範圍,屬異常須評估。大便鬆軟黃綠(正常)、一天換3次厚重尿片(攝取足夠)、吃飽後尋乳反射變弱(正常飽足)皆正常,故A異常。","options":{"A":"異常(本題答案)。降至2500g(減約17%)超過生理性5~10%範圍。","B":"正常。大便鬆軟、黃綠色。","C":"正常。一天更換3次厚重尿片(攝取足夠)。","D":"正常。吃飽後尋乳反射變弱(飽足)。"},"sources":["新文京《兒科護理學》體重","5-10%"]}},"110110-N4-19":{"quick":"產後第1天擔心初乳不好想擠掉,正確的是「初乳可以促進胎便排出,減少膽紅素再吸收,所以可以減少黃疸的機率」(A)。","detail":{"background":"初乳有輕瀉作用「促進胎便排出、減少膽紅素腸肝循環再吸收、減少黃疸」,且富含「抗體IgA(非IgM)」、蛋白質與脂溶性維生素,應鼓勵哺餵不可擠掉。初乳含脂肪較成熟乳少但仍有(B不精確);主要抗體是IgA(C的IgM錯);維生素K不足故新生兒須補打(D敘述不當),故A正確。","options":{"A":"正確。初乳促胎便排出、減少膽紅素再吸收、降黃疸。","B":"初乳含脂肪少但仍有(B不精確)。","C":"錯。初乳主要抗體是IgA(非IgM)。","D":"新生兒維生素K不足須補打(D敘述不當)。"},"sources":["新文京《兒科護理學》初乳","降黃疸"]}},"110110-N4-29":{"quick":"新生兒腸胃系統及排泄錯誤的是「新生兒出生後12小時內未解胎便,應通知小兒科醫師檢查」(B)。","detail":{"background":"胎便應於「出生後24小時內」解出,若「24小時(或48小時)仍未解」才須通知醫師(疑腸阻塞/巨結腸),「12小時內未解就通知」過早,故B錯誤。其餘正確:出生3~4天體重降5~10%生理性脫水、3~4天後解過渡便、賁門括約肌未成熟避免餵太飽。","options":{"A":"正確。出生3~4天體重降5~10%(生理性)。","B":"錯誤(本題答案)。胎便24小時內未解才通知(非12小時)。","C":"正確。3~4天後解出過渡便。","D":"正確。賁門括約肌未成熟,避免餵太飽。"},"sources":["新文京《兒科護理學》胎便","24小時"]}},"111030-N4-51":{"quick":"正常新生兒消化系統特徵錯誤的是「胃排空時間約6小時」(C)。","detail":{"background":"新生兒胃排空時間「約2~3小時(較短)」,而非6小時,故C錯誤(故需少量多餐)。其餘正確:唾液分泌量少、賁門括約肌不成熟(易溢奶)、出生後24小時內排出胎便。　補充：新生兒消化系統特徵：賁門括約肌鬆弛易溢奶、胃容量小、胃排空快(約2~3小時)、腸道菌叢未建立、消化酶部分不足；「胃排空約6小時」過長、為錯誤敘述。","options":{"A":"正確。唾液的分泌量少。","B":"正確。賁門括約肌不成熟(易溢奶)。","C":"錯誤(本題答案)。胃排空約2~3小時(非6小時)。","D":"正確。出生後24小時內排出胎便。"},"sources":["新文京《兒科護理學》胃排空","2-3小時"]}},"112030-N4-20":{"quick":"母乳營養素對新生兒成長作用錯誤的是「酪蛋白可加強脂溶性維生素在腸胃道吸收的比例」(D)。","detail":{"background":"母乳以「乳清蛋白為主(易消化)、酪蛋白較少」,酪蛋白「不是加強脂溶性維生素吸收」的成分,故D錯誤(脂溶性維生素吸收靠膽鹽與脂肪)。其餘正確:寡糖避免致病菌黏附腸道、中長鏈不飽和脂肪酸助視網膜發展、乳鐵蛋白與鐵結合避免被腸道細菌利用。","options":{"A":"正確。寡糖避免致病菌黏附腸胃道。","B":"正確。中長鏈不飽和脂肪酸助視網膜發展。","C":"正確。乳鐵蛋白與鐵結合,避免鐵被腸道細菌利用。","D":"錯誤(本題答案)。酪蛋白非加強脂溶性維生素吸收。"},"sources":["新文京《兒科護理學》母乳","乳清蛋白"]}},"112030-N4-29":{"quick":"正常新生兒出生4~6小時內最主要的能量來源是「葡萄糖」(A)。","detail":{"background":"新生兒出生後最初的能量主要來自「肝糖分解的葡萄糖」(及母體儲存),之後才動用脂肪。胺基酸、脂肪酸、棕色脂肪(產熱為主)非出生最初4~6小時的主要能量來源,故A正確。　補充：新生兒出生後4~6小時主要能量來源為「葡萄糖」(肝醣分解與葡萄糖)，因儲備有限且體溫調節耗能，故須早期哺餵以防低血糖；之後逐漸以脂肪與乳汁能量為主。","options":{"A":"正確。出生4~6小時內主要能量來源是葡萄糖。","B":"胺基酸非最初主要能量來源。","C":"脂肪酸是之後才動用。","D":"棕色脂肪主要用於產熱(非主要能量來源)。"},"sources":["新文京《兒科護理學》能量","葡萄糖"]}},"112110-N4-23":{"quick":"初乳敘述不適當的是「脂肪和醣類的含量較高,少量但熱量足」(B)。","detail":{"background":"初乳「脂肪與醣(乳糖)含量較成熟乳低」,但富含蛋白質、礦物質與抗體,少量即可滿足新生兒小胃容量,故「脂肪醣類含量較高」錯誤(應較低)。其餘正確:蛋白質礦物質含量較成熟乳高、水分含量較低適合小胃容量、含豐富益菌生促腸道好菌。","options":{"A":"正確。蛋白質和礦物質含量較成熟乳高。","B":"不適當(本題答案)。初乳脂肪與醣含量較低(非較高)。","C":"正確。水分含量較低,適合新生兒胃容量。","D":"正確。含豐富促腸道好菌的益菌生。"},"sources":["新文京《兒科護理學》初乳","脂肪低"]}},"113180-N4-19":{"quick":"較無法改善新生兒溢奶的措施是「餵食後採左側臥」(C)。","detail":{"background":"減少溢奶宜「餵食後採右側臥或頭高半坐臥」促進胃排空(胃出口在右側),「左側臥」較無法改善溢奶,故C。其餘有效:漸進式增加奶量(避免過量)、餵食後排氣(拍嗝)、避免過度餵食。　補充：改善新生兒溢奶措施包括少量多餐、餵後拍嗝、餵後採「右側臥或頭高位」促胃排空；「餵後採左側臥」較無助於減少胃食道逆流溢奶。","options":{"A":"有效。餵食採漸進式奶量增加(避免過量)。","B":"有效。餵食後協助排氣(拍嗝)。","C":"較無法(本題答案)。應右側臥(非左側臥)促胃排空。","D":"有效。避免過度餵食。"},"sources":["新文京《兒科護理學》溢奶","右側臥"]}},"114030-N4-19":{"quick":"3900g、第3天降3700g,最適合的護理指導是「此為正常新生兒生理性體重流失現象,增加哺餵次數體重會慢慢恢復,不必太過擔憂」(D)。","detail":{"background":"減200g約「5%」屬「生理性體重流失(正常5~10%)」,約7~10天恢復,鼓勵增加哺餵次數即可。非腸胃吸收不佳(A);非生理性黃疸所致須抽血(B);非母乳分泌不足(C,5%在正常範圍),故D正確。","options":{"A":"錯。減5%是生理性(非吸收不佳須檢查)。","B":"錯。非生理性黃疸所致(不需立即抽血)。","C":"錯。減5%在正常範圍(非母乳不足)。","D":"正確。生理性體重流失,增加哺餵會恢復。"},"sources":["新文京《兒科護理學》體重","生理性流失"]}},"114100-N4-17":{"quick":"新生兒出生後一週內生理性體重減輕的常見原因除外「吐奶次數增加」(D)。","detail":{"background":"生理性體重減輕(5~10%)的原因:無感性水分喪失、糞便與尿液排出、剛出生吸奶量少。「吐奶次數增加」是病理/餵食問題(非生理性體重減輕的常見原因),故D除外。　補充：生理性體重減輕(出生一週內可減5~10%)原因為排出胎便與尿液、不顯性失水、攝入量少於排出；屬正常現象，多於10~14天回復出生體重；吐奶次數增加非常見主因。","options":{"A":"是原因。無感性水分喪失。","B":"是原因。糞便及尿液的排出。","C":"是原因。剛出生吸奶量少。","D":"除外(本題答案)。吐奶次數增加非生理性體重減輕的常見原因。"},"sources":["新文京《兒科護理學》體重","生理性"]}},"115030-N4-19":{"quick":"新生兒出生時維生素K缺乏的原因錯誤的是「腸道的吸收能力尚未成熟」(D)。","detail":{"background":"新生兒維生素K缺乏主因是「腸道菌叢未建立(維生素K需腸道細菌合成)、肝臟功能未成熟、維生素K不易經胎盤」,故須出生即補打維生素K。「腸道吸收能力尚未成熟」非維生素K缺乏的主因(維生素K問題在合成不足與來源),故D錯誤。","options":{"A":"正確。腸道相關菌叢不足(維生素K需腸道菌合成)。","B":"正確。肝臟功能尚未成熟。","C":"正確。維生素K不易經由胎盤進入胎兒。","D":"錯誤(本題答案)。維生素K缺乏主因非腸道吸收不成熟(是合成不足)。"},"sources":["新文京《兒科護理學》維生素K","腸道菌"]}},"101030-N4-60":{"quick":"母為B肝帶原e抗原陽性,新生兒於出生「24小時內」注射B型肝炎免疫球蛋白(A)。","detail":{"background":"母親B肝帶原(尤e抗原陽性高傳染性),新生兒應在「出生24小時內(越早越好)」注射「B型肝炎免疫球蛋白(HBIG)」並同時接種B肝疫苗,阻斷垂直感染。24~48小時、一週後、滿一個月皆過晚,故A正確。","options":{"A":"正確。出生24小時內注射B肝免疫球蛋白(越早越好)。","B":"24~48小時偏晚(應24小時內)。","C":"一週後過晚。","D":"滿一個月過晚。"},"sources":["新文京《兒科護理學》B肝","HBIG"]}},"101030-N4-70":{"quick":"先天性甲狀腺功能低下正確的是「須觀察甲狀腺素之副作用,如躁動不安、心搏過速等」(D)。","detail":{"background":"治療用甲狀腺素(L-thyroxine)過量會出現「躁動不安、心搏過速、腹瀉」等似甲亢的副作用,須觀察。出生時身高體重多「正常(不一定較低)」(A);新生兒篩檢應「滿48小時後」採血(B的24小時內太早);須「終身」服L-thyroxine(C的改善後一週為止錯),故D正確。","options":{"A":"出生時身高體重多正常(非一定較低)。","B":"篩檢應滿48小時後採血(非24小時內)。","C":"須終身服L-thyroxine(非改善後一週停)。","D":"正確。觀察甲狀腺素過量副作用(躁動、心搏過速)。"},"sources":["新文京《兒科護理學》先天性甲低","藥物副作用"]}},"102030-N4-54":{"quick":"32又4/7週、滿48小時進食良好需肌注B肝疫苗及扎足跟血,早產兒疼痛處理正確的是「應提供適合的減痛措施,如非營養性吸吮、口服蔗糖溶液及寧握」(B)。","detail":{"background":"早產兒對疼痛敏感,處置性疼痛應用「非藥物減痛:非營養性吸吮(安撫奶嘴)、口服蔗糖、寧握(facilitated tucking)、袋鼠護理」。短暫處置性疼痛不需常規給止痛藥(A過度);餵奶後立即採血易溢奶(C);選熟睡時注射會驚醒且不減痛(D),故B正確。","options":{"A":"短暫處置疼痛不需常規止痛藥(A過度)。","B":"正確。用非營養性吸吮、口服蔗糖、寧握減痛。","C":"餵奶後立即採血易溢奶(C不當)。","D":"熟睡時注射會驚醒(非減痛,D不當)。"},"sources":["新文京《兒科護理學》早產疼痛","蔗糖寧握"]}},"102110-N4-24":{"quick":"出生體重4500公克(巨嬰)應特別注意「低血糖」(B)。","detail":{"background":"巨嬰(>4000g,常見於糖尿病母親)因胎兒期高胰島素,出生後母體葡萄糖供應中斷而易「低血糖」,須監測。非高血糖、高血壓;低體溫雖須注意但巨嬰最須優先注意的是低血糖,故B正確。　補充：巨嬰(>4000g)多見於妊娠糖尿病母親，胎兒因高血糖致高胰島素，出生後母體血糖中斷易發生低血糖，須早期餵食並監測血糖，亦留意低血鈣、紅血球增多與產傷。","options":{"A":"巨嬰出生後易低血糖(非高血糖)。","B":"正確。巨嬰應特別注意低血糖(高胰島素)。","C":"高血壓非巨嬰特別注意項目。","D":"低體溫須注意但首要是低血糖。"},"sources":["新文京《兒科護理學》巨嬰","低血糖"]}},"103030-N4-27":{"quick":"孕婦妊娠糖尿病,新生兒應優先注意「低血糖」(B)。","detail":{"background":"妊娠糖尿病母親的新生兒,因胎兒期高血糖刺激胰島素分泌,出生後葡萄糖供應中斷而易「低血糖」,須優先監測。黃疸、貧血、體溫過低為次要,故B正確。　補充：妊娠糖尿病母親之胎兒長期暴露高血糖使胰島素分泌增加，出生後臍帶血糖供應中斷，於數小時內易發生低血糖(<40~45mg/dL)，須早期哺餵並密切監測血糖。","options":{"A":"黃疸為次要監測項目。","B":"正確。妊娠糖尿病新生兒應優先注意低血糖。","C":"貧血非優先(較常見紅血球增多)。","D":"體溫過低為次要。"},"sources":["新文京《兒科護理學》糖尿病母嬰","低血糖"]}},"103030-N4-30":{"quick":"出生第10天舌與兩頰白色無法刮除、拒奶,最適當回應是「可能為鵝口瘡,應立即就醫診治,配合藥物治療」(D)。","detail":{"background":"舌與口腔黏膜「白色斑塊、不易刮除、刮除後黏膜發紅、拒奶」是「鵝口瘡(口腔念珠菌感染)」,須就醫用抗黴菌藥(nystatin)。它非奶垢(奶垢可輕易擦掉,A錯);非暫時過敏(B錯);雖加強清潔消毒重要但仍須藥物治療(C不足),故D正確。","options":{"A":"奶垢可輕易擦掉(此例不易刮除,非奶垢)。","B":"非暫時性過敏反應。","C":"清潔消毒重要但仍須藥物治療(C不足)。","D":"正確。可能鵝口瘡,應就醫配合抗黴菌藥治療。"},"sources":["新文京《兒科護理學》鵝口瘡","nystatin"]}},"103030-N4-57":{"quick":"新生兒胎便吸入症候群錯誤的是「在胎頭與肩部娩出後,立刻給予氧氣袋加壓協助呼吸」(D)。","detail":{"background":"胎便吸入時若立即「正壓給氧(氧氣袋加壓)」會把胎便推入更深的氣道,故應「先抽吸清除胎便再通氣」,D錯誤。其餘正確:皮膚指甲臍帶有胎便染色呈黃綠、多發生於足月或過期產、出生時即呼吸急促困難。　補充：胎便吸入症候群處置：娩出後若羊水有胎便且嬰兒無活力，應先「氣管內抽吸」清除胎便再給正壓，避免在尚未清除前加壓送氣將胎便推入下呼吸道加重阻塞與化學性肺炎。","options":{"A":"正確。皮膚指甲臍帶有胎便染色呈黃綠色。","B":"正確。絕大多數發生在足月或過期產者。","C":"正確。出生時即有呼吸急促、困難徵象。","D":"錯誤(本題答案)。應先抽吸清除胎便再通氣(非立即加壓給氧)。"},"sources":["新文京《兒科護理學》胎便吸入","先抽吸"]}},"103100-N4-33":{"quick":"孕婦感染淋病未治療,新生兒出生時可能感染「新生兒眼炎」(A)。","detail":{"background":"母親淋病經產道使新生兒感染,典型造成「新生兒淋菌性結膜炎(新生兒眼炎)」,可致失明,故出生後點抗生素眼藥膏預防。鵝口瘡(念珠菌)、肺炎、皮膚炎非淋病經產道感染的典型,故A正確。　補充：孕婦感染淋病未治療，生產經產道可使新生兒感染「新生兒眼炎(淋菌性結膜炎)」，嚴重可致角膜潰瘍失明；故新生兒出生後常規點抗生素眼藥膏預防。","options":{"A":"正確。母親淋病經產道致新生兒眼炎(淋菌性結膜炎)。","B":"鵝口瘡是念珠菌(非淋病)。","C":"肺炎非淋病經產道的典型新生兒感染。","D":"皮膚炎非淋病典型。"},"sources":["新文京《兒科護理學》淋病","新生兒眼炎"]}},"104100-N4-74":{"quick":"兒童A型肝炎錯誤的是「飲食宜採高蛋白和低脂肪飲食」(D)?——本題答D。","detail":{"background":"本題官方答案為D。急性肝炎飲食一般「均衡、適量蛋白、足夠熱量」,「高蛋白」對肝功能受損者不一定適宜(肝性腦病變時須限蛋白),官方判此敘述不當。其餘正確:A肝糞口傳染、急性期症狀如感冒(發燒倦怠)、早期可出現黃疸。","options":{"A":"正確。A型肝炎經糞口途徑傳染。","B":"正確。急性期症狀如同感冒。","C":"正確。早期會出現黃疸現象。","D":"錯誤(本題答案)。急性肝炎飲食宜均衡(非一律高蛋白)。"},"sources":["新文京《兒科護理學》A肝","飲食"]}},"105030-N4-54":{"quick":"妊娠42週、羊水有胎便,維持呼吸道通暢正確的是「胎頭娩出時即用導管(DeLee’s tube)對新生兒鼻咽及口腔進行抽吸」(A)。","detail":{"background":"羊水有胎便時,應在「胎頭一娩出(肩部尚未娩出前)即用DeLee導管抽吸鼻咽口腔」清除胎便,減少吸入。完全產出後立即加壓給氧(會把胎便推入深處,B錯);注入生理食鹽水清洗(C不當);常規插管正壓(僅嚴重時,D非首步),故A正確。","options":{"A":"正確。胎頭娩出時即用DeLee導管抽吸鼻咽口腔。","B":"錯。完全產出立即加壓給氧會推胎便入深處。","C":"注入生理食鹽水清洗不當。","D":"插管正壓僅嚴重時(非首步)。"},"sources":["新文京《兒科護理學》胎便吸入","DeLee抽吸"]}},"105090-N4-66":{"quick":"G-6-PD缺乏症(蠶豆症)錯誤的是「此疾病主要由父親傳給小孩,以女嬰居多」(A)。","detail":{"background":"G-6-PD缺乏症是「性聯(X染色體)隱性」遺傳,「由母親(帶因)傳給兒子,以男嬰居多」,故「由父親傳、女嬰居多」錯誤。其餘正確:易溶血性貧血與高膽紅素血症、發燒避免用aspirin、哺乳母親避免吃蠶豆。","options":{"A":"錯誤(本題答案)。性聯隱性,母傳子、男嬰居多(非父傳女)。","B":"正確。易發生溶血性貧血及高膽紅素血症。","C":"正確。發燒時避免使用Aspirin。","D":"正確。母親哺乳期間避免食用蠶豆。"},"sources":["新文京《兒科護理學》G6PD","性聯男嬰"]}},"106030-N4-52":{"quick":"妊娠糖尿病母親、38週3800g女嬰,出生後照顧錯誤的是「出生後4小時應測第一次血糖」(B)。","detail":{"background":"糖尿病母親新生兒易低血糖,應「出生後儘早(約30分鐘~1小時內)測第一次血糖」並儘早餵食,「4小時才測」太晚,故B錯誤。其餘正確:評估盜汗呼吸喘嗜睡(低血糖徵象)、血糖<36~40mg/dL應處置、儘早餵母奶或配方奶。","options":{"A":"正確。評估盜汗、呼吸喘、嗜睡(低血糖徵象)。","B":"錯誤(本題答案)。應儘早(30分~1小時內)測血糖(非4小時)。","C":"正確。血糖低於36~40mg/dL應採取措施。","D":"正確。應儘早餵母奶或配方奶。"},"sources":["新文京《兒科護理學》糖尿病母嬰","儘早測血糖"]}},"106110-N4-69":{"quick":"39週又4天健康新生兒篩檢時間正確的是「於出生滿48小時,或已完全由腸道進食24小時後」(C)。","detail":{"background":"新生兒代謝篩檢應在「出生滿48小時、且已餵奶(完全由腸道進食)24小時後」採血,以免偽陰/偽陽。24小時、36小時、72小時的組合皆不符標準,故C正確。　補充：新生兒先天代謝疾病篩檢應於「出生滿48小時、且已餵奶滿24小時後」採檢，以免過早或未進食造成偽陰性(如苯酮尿症需攝入蛋白後代謝物才會上升)。","options":{"A":"出生滿24小時太早(應48小時)。","B":"36小時不符標準。","C":"正確。出生滿48小時、進食24小時後採檢。","D":"72小時/進食12小時不符標準。"},"sources":["新文京《兒科護理學》篩檢","48小時"]}},"106111-N4-69":{"quick":"G-6-PD缺乏症誘發因子錯誤的是「抗痙攣藥物」(D)?——本題答D。","detail":{"background":"本題官方答案為D。G-6-PD缺乏症的溶血誘發因子是「氧化性物質」:樟腦丸(萘)、蠶豆、解熱鎮痛劑(磺胺、aspirin)、部分抗瘧/抗生素;一般「抗痙攣藥物」非典型誘發因子,故D錯誤。　補充：G-6-PD缺乏症為性聯遺傳，紅血球缺乏抗氧化酶，接觸氧化性物質(蠶豆、樟腦丸/萘丸、磺胺類、解熱鎮痛劑、抗瘧藥)易誘發溶血；一般抗痙攣藥非典型誘發因子。","options":{"A":"是誘發因子。樟腦丸(萘)。","B":"是誘發因子。蠶豆。","C":"是誘發因子。解熱鎮痛劑(氧化性)。","D":"錯誤(本題答案)。一般抗痙攣藥物非典型誘發因子。"},"sources":["新文京《兒科護理學》G6PD","誘發因子"]}},"108020-N4-74":{"quick":"新生兒篩檢半乳糖血症陽性的飲食原則錯誤的是「維持完全母乳哺餵以維持足夠營養」(D)。","detail":{"background":"半乳糖血症因缺酵素無法代謝半乳糖(乳糖分解產物),「母乳與一般配方奶含乳糖,須改用不含乳糖/半乳糖的特殊配方(如豆奶/無乳糖配方)」,故「維持完全母乳」錯誤。其餘正確:禁市售一般配方奶、避免乳酪製品、依醫囑補維生素礦物質。","options":{"A":"正確。禁止餵食市售一般兒童配方奶(含乳糖)。","B":"正確。應避免餵食乳酪製品。","C":"正確。依醫囑補充維生素與礦物質。","D":"錯誤(本題答案)。半乳糖血症須停母乳改無乳糖配方(非維持母乳)。"},"sources":["新文京《兒科護理學》半乳糖血症","無乳糖"]}},"109110-N4-52":{"quick":"不屬於新生兒篩檢項目的是「唐氏症」(B)。","detail":{"background":"我國新生兒篩檢項目是「先天代謝異常」如G-6-PD缺乏症、苯酮尿症、先天性甲狀腺低下、半乳糖血症、甲基丙二酸血症等。「唐氏症」是染色體異常,屬「產前(孕期)篩檢」而非新生兒代謝篩檢,故B不屬於。　補充：我國新生兒篩檢針對先天代謝與內分泌疾病(如苯酮尿症、先天甲狀腺低能症、G-6-PD缺乏、先天腎上腺增生症等)；唐氏症屬染色體疾病、產前篩檢項目，非新生兒代謝篩檢。","options":{"A":"屬於。G-6-PD缺乏症。","B":"不屬於(本題答案)。唐氏症是產前篩檢(非新生兒代謝篩檢)。","C":"屬於。苯酮尿症。","D":"屬於。甲基丙二酸血症(MMA)。"},"sources":["新文京《兒科護理學》篩檢","非唐氏症"]}},"111030-N4-72":{"quick":"新生兒篩檢錯誤的是「於新生兒出生滿24小時,或已完全由腸道進食12小時後採檢」(C)。","detail":{"background":"新生兒篩檢應「出生滿48小時、完全由腸道進食24小時後」採檢,故「24小時/進食12小時」錯誤。其餘正確:可早期發現治療先天代謝異常、採血位置兩腳後足跟外側、疑陽性由採集機構通知複檢。　補充：新生兒代謝疾病篩檢應於「出生滿48小時且已腸道進食滿24小時後」採檢；過早(如滿24小時、進食12小時)採檢易因代謝物未累積而偽陰性。","options":{"A":"正確。可早期發現和治療先天代謝異常疾病。","B":"正確。採血位置為兩腳後足跟外側。","C":"錯誤(本題答案)。應滿48小時、進食24小時後(非24小時/12小時)。","D":"正確。疑陽性由採集機構通知家長複檢。"},"sources":["新文京《兒科護理學》篩檢","48小時"]}},"111030-N4-75":{"quick":"先天性巨結腸症臨床表徵錯誤的是「新生兒時有嘔吐現象且嘔吐物不含膽汁」(B)。","detail":{"background":"巨結腸症因遠端腸阻塞,嘔吐物「常含膽汁(阻塞在膽管開口下游)」,故「不含膽汁」錯誤(不含膽汁是幽門狹窄)。其餘正確:出生24小時內無法排胎便、嬰兒期難進食生長遲滯、兒童期慢性便秘與絲帶狀糞便。　補充：先天性巨結腸症(Hirschsprung)因遠端腸壁缺乏神經節細胞致腸無蠕動，新生兒可見胎便延遲(>24~48小時)、腹脹、膽汁性嘔吐；嘔吐物「不含膽汁」之敘述錯誤。","options":{"A":"正確。出生24小時內無法排出胎便。","B":"錯誤(本題答案)。巨結腸症嘔吐物含膽汁(不含膽汁是幽門狹窄)。","C":"正確。嬰兒期難以進食及生長遲滯。","D":"正確。兒童期慢性便秘且絲帶狀糞便。"},"sources":["新文京《兒科護理學》巨結腸症","含膽汁"]}},"111110-N4-33":{"quick":"臍帶血可作為胎兒子宮內感染診斷的免疫球蛋白是「IgM」(D)。","detail":{"background":"IgM「不能通過胎盤、由胎兒自行製造」,故臍帶血IgM升高代表「胎兒在子宮內已受感染(自行產生抗體)」。IgG可過胎盤(來自母體,不能判斷胎兒感染);IgA、IgE非此用途,故D正確。　補充：IgM分子大、不能通過胎盤，若臍帶血IgM升高代表胎兒「在子宮內已受感染」並自行產生抗體，可作為子宮內感染(如TORCH)的診斷指標；IgG來自母體經胎盤。","options":{"A":"IgA非診斷子宮內感染的指標。","B":"IgE非此用途。","C":"IgG可過胎盤(來自母體,不能判斷胎兒感染)。","D":"正確。IgM不過胎盤,升高代表子宮內感染。"},"sources":["新文京《兒科護理學》免疫","IgM"]}},"112030-N4-48":{"quick":"新生兒篩檢錯誤的是「手執濾紙接取穿刺後流出的第一滴血」(D)。","detail":{"background":"新生兒篩檢採血應「擦掉第一滴血,取第二滴以後的血滴在濾紙上」(第一滴可能含組織液影響結果),故「接取第一滴血」錯誤。其餘正確:出生滿48小時才採檢、採檢前熱敷足部3~10分鐘、用75%酒精消毒穿刺部位。","options":{"A":"正確。新生兒出生須滿48小時才採檢。","B":"正確。採檢前熱敷足部3~10分鐘(促血流)。","C":"正確。以75%酒精棉球消毒穿刺部位。","D":"錯誤(本題答案)。應擦掉第一滴、取第二滴血(非接取第一滴)。"},"sources":["新文京《兒科護理學》篩檢","第二滴血"]}},"112110-N4-28":{"quick":"胎兒與新生兒免疫系統正確的是「胎兒無法自行製造IgA,可由初乳而獲得」(B)。","detail":{"background":"胎兒/新生兒IgA產生能力不足,「分泌型IgA可由初乳(母乳)獲得」提供黏膜保護。可過胎盤的是「IgG(非IgM)」(A錯);出生時體內主要抗體是「IgG(來自母體,非IgA)」(C錯);胎兒「IgM升高」才顯示子宮內感染(非IgG,D錯),故B正確。","options":{"A":"錯。可過胎盤的是IgG(非IgM)。","B":"正確。胎兒無法自製IgA,可由初乳獲得。","C":"錯。出生時主要抗體是IgG(來自母體,非IgA)。","D":"錯。IgM升高才顯示子宮內感染(非IgG)。"},"sources":["新文京《兒科護理學》免疫","IgA初乳"]}},"112110-N4-30":{"quick":"新生兒篩檢檢體採集正確的是「採血的穿刺部位應選擇避開蹠神經與跟骨部位的足跟兩側」(B)。","detail":{"background":"足跟採血應「選足跟兩側(外側),避開中央的蹠神經與跟骨」防傷害。早產兒不一定34週即可採(須滿48小時且進食,A不精確);血流不順「不可用力擠壓」(會溶血/混組織液,C錯);穿刺角度非45度(D錯),故B正確。","options":{"A":"早產兒採檢須滿48小時且進食(非34週即採)。","B":"正確。穿刺足跟兩側,避開蹠神經與跟骨。","C":"錯。血流不順不可用力擠壓(會溶血)。","D":"穿刺角度敘述不當(非45度)。"},"sources":["新文京《兒科護理學》篩檢","足跟兩側"]}},"113100-N4-43":{"quick":"先天性腎上腺增生症(CAH)護理指導最不適當的是「若小琪合併醛固酮不足,應減少飲食的鹽分」(B)。","detail":{"background":"CAH失鹽型因醛固酮不足致「失鈉、低血鈉脫水」,應「補充鹽分」而非減少,故B最不適當。其餘適當:觀察脫水情形、監測身高體重、按時服皮質醇(cortisone)。　補充：先天性腎上腺增生症(CAH)多為21-羥化酶缺乏致醛固酮與皮質醇不足、雄性素過多；合併失鹽型者須「補充鹽分」與類固醇，不可減少鹽分以免低血鈉與腎上腺危象。","options":{"A":"適當。教導觀察小琪有無脫水情形。","B":"最不適當(本題答案)。失鹽型CAH應補鹽(非減少鹽分)。","C":"適當。監測身高和體重變化。","D":"適當。按時服用皮質醇(cortisone)。"},"sources":["新文京《兒科護理學》CAH","補鹽"]}},"113180-N4-18":{"quick":"新生兒篩檢正確的是「穿刺部位應選擇足跟的外面兩側」(B)。","detail":{"background":"足跟採血穿刺「足跟外側兩側」(避開中央神經與跟骨)。採血時間是「出生滿48小時」(A的12小時太早);血量不足「不可用力擠壓」(C會溶血);應用「採血針(刺血針)」非注射針頭(D錯),故B正確。　補充：新生兒篩檢採血應選「足跟外側緣」(避開足底中央血管神經與骨骼)，先溫敷促血循、棄第一滴血、自然滴血至濾紙；於滿48小時、進食24小時後採檢。","options":{"A":"錯。採血時間是出生滿48小時(非12小時)。","B":"正確。穿刺部位選足跟外面兩側。","C":"錯。血量不足不可用力擠壓(會溶血)。","D":"錯。應用採血(刺血)針非注射針頭。"},"sources":["新文京《兒科護理學》篩檢","足跟外側"]}},"113180-N4-31":{"quick":"nystatin 100,000 units/mL,每次250,000 units,應給予「2.5」mL(C)。","detail":{"background":"給藥量=醫囑劑量÷濃度=250,000 units÷100,000 units/mL=2.5 mL,故每次給2.5mL。　補充：劑量計算：醫囑每次250,000 units，藥品濃度100,000 units/mL，所需體積＝250,000÷100,000＝2.5 mL；鵝口瘡(口腔念珠菌)以nystatin塗抹口腔患處。","options":{"A":"1.5mL=150,000units(不足)。","B":"2.0mL=200,000units(不足)。","C":"正確。250,000÷100,000=2.5mL。","D":"3.0mL=300,000units(過量)。"},"sources":["給藥計算","nystatin"]}},"113180-N4-36":{"quick":"新生兒胎便吸入症候群症狀及處置錯誤的是「羊水有胎便,嬰兒娩出後,立即以甦醒球(ambu bag)加壓刺激呼吸」(C)。","detail":{"background":"羊水有胎便時若「立即用甦醒球正壓給氧」會把胎便推入深層氣道,應「先抽吸清除胎便再通氣」,故C錯誤。其餘正確:皮膚指甲臍帶有胎便沾染、可能呼吸窘迫、ABG顯示呼吸衰竭須矯正呼吸性酸中毒。　補充：胎便吸入症候群處置：娩出後若羊水染胎便且嬰兒無活力，應先氣管內抽吸清除胎便再給正壓通氣；「立即以甦醒球加壓刺激呼吸」會將胎便推入下呼吸道、為錯誤處置。","options":{"A":"正確。皮膚指甲臍帶有胎便沾染痕跡。","B":"正確。可能發生呼吸窘迫症狀。","C":"錯誤(本題答案)。應先抽吸清除胎便再通氣(非立即加壓)。","D":"正確。ABG呼吸衰竭須矯正呼吸性酸中毒。"},"sources":["新文京《兒科護理學》胎便吸入","先抽吸"]}},"101030-N4-11":{"quick":"新生兒沐浴衛教「不適當」者＝先洗頭髮再洗臉部(順序錯;應先洗臉再洗頭，由乾淨到髒)。","detail":{"background":"新生兒頭皮的「乳痂(脂漏性鱗屑)」是正常現象,不需「經常洗頭」(過度清洗反刺激皮膚),可用嬰兒油軟化後輕梳除,故B不適當。其餘適當:先洗澡再餵奶避免吐奶、控制環境溫度維持體溫、沐浴順序由頭臉到軀幹(乾淨到髒)。","options":{"A":"先洗澡再餵奶可避免吐奶，適當。","B":"乳痂(鱗屑)為正常，可清潔但本題以D為不適當。","C":"控制環境溫度維持新生兒體溫，適當。","D":"不適當(本題答案)。沐浴應「先洗臉再洗頭」、最後軀幹四肢會陰(由乾淨到髒)，先洗頭再洗臉順序錯誤。"},"sources":["新文京《兒科護理學》沐浴","乳痂"]}},"102110-N4-26":{"quick":"24小時母嬰同室、先生外出時新生兒安全護理指導較適宜的是「當有推銷員或不明人士進入病室時,應立即按下警示鈴,以協助維護新生兒安全」(D)。","detail":{"background":"防新生兒被誘拐,遇「不明人士進入病室應立即按警示鈴求助」。母嬰獨處時上廁所等也不該讓新生兒離開視線(A的敘述把「上廁所時可離開」放寬不當);不能因醫院安全就不鎖門不警覺(B錯);即使長得像也須「每次接觸都核對身分手圈」(非每天一次,C錯),故D正確。","options":{"A":"獨處時新生兒仍不應離開視線(A敘述放寬不當)。","B":"錯。不能因醫院安全就不警覺(防誘拐)。","C":"錯。應每次接觸核對身分(非每天一次)。","D":"正確。不明人士進入應立即按警示鈴維護安全。"},"sources":["新文京《兒科護理學》安全","防誘拐"]}},"105090-N4-27":{"quick":"出生第5天臍帶尚未掉落的出院護理指導正確的是「洗澡後可以75%酒精消毒,由臍帶根部進行環狀擦拭」(B)。","detail":{"background":"臍帶護理:洗澡後用「75%酒精由臍帶根部向外環狀擦拭、保持乾燥暴露於空氣」。臍帶有少量分泌物未必是感染(A過度);臍帶應「暴露不覆蓋紗布」促乾燥(C錯);臍帶脫落應「讓其自然脫落,不可用手強行移除」(D錯),故B正確。","options":{"A":"少量分泌物未必感染(A過度)。","B":"正確。洗澡後75%酒精由臍帶根部環狀擦拭。","C":"錯。臍帶應暴露於空氣促乾燥(非覆蓋紗布)。","D":"錯。臍帶應自然脫落(不可用手移除)。"},"sources":["新文京《兒科護理學》臍帶","75%酒精"]}},"106110-N4-11":{"quick":"護理師進行新生兒抽吸正確的是「過度抽吸會造成新生兒心跳速率減低」(D)。","detail":{"background":"過度抽吸刺激「迷走神經」會致「心搏過緩(心跳減低)」與缺氧,須注意。抽吸時新生兒宜「頭側一邊」(非仰臥抬頭15度,A);放入時「不加壓」、退出時才抽吸(非持續保持壓力,B);新生兒抽吸壓力約「60~100mmHg」(150~200過高,C),故D正確。","options":{"A":"抽吸時宜頭側一邊(A敘述不當)。","B":"錯。放入不加壓、退出才抽吸(非持續保持壓力)。","C":"錯。新生兒抽吸壓力約60~100mmHg(150~200過高)。","D":"正確。過度抽吸刺激迷走神經致心跳減低。"},"sources":["新文京《兒科護理學》抽吸","迷走"]}},"106111-N4-29":{"quick":"新生兒沐浴敘述正確的是「輕輕撥開陰唇由上往下清洗」(B)。","detail":{"background":"女嬰會陰清潔應「撥開陰唇由上(陰阜)往下(肛門)、由前往後」清洗防污染。沐浴應「先沐浴後餵奶」(A的先餵後浴易吐);臍帶用「75%酒精」(C的優碘不當);眼睛由「內眥往外眥」清洗(D的外往內錯),故B正確。","options":{"A":"錯。應先沐浴後餵奶(先餵後浴易吐)。","B":"正確。撥開陰唇由上往下(由前往後)清洗。","C":"錯。臍帶用75%酒精(非優碘)。","D":"錯。眼睛由內眥往外眥清洗(非外往內)。"},"sources":["新文京《兒科護理學》沐浴","由前往後"]}},"108110-N4-27":{"quick":"新生兒暗示行為錯誤的是「脫離性暗示行為:手腳屈曲,臉轉向照顧者,表示想睡覺」(B)。","detail":{"background":"脫離性(disengagement)暗示行為是「想休息/不想互動」的訊號,如「臉轉開、手腳伸展、打哈欠、皺眉」,而非「臉轉向照顧者」(那是投入性),故B錯誤。其餘正確:投入性暗示是注視微笑想互動、飢餓暗示是手放嘴裡哭泣拱背、吃飽暗示是睡著推開吸吮減少。","options":{"A":"正確。投入性暗示:注視微笑,想和人互動。","B":"錯誤(本題答案)。脫離性暗示是臉轉開(非臉轉向照顧者)。","C":"正確。飢餓暗示:手放嘴裡、哭泣、拱背。","D":"正確。吃飽暗示:睡著、推開照顧者、吸吮減少。"},"sources":["新文京《兒科護理學》暗示行為","脫離性"]}},"110110-N4-22":{"quick":"新生兒飢餓暗示行為錯誤的是「臉部放鬆」(B)。","detail":{"background":"飢餓暗示是「手伸向嘴、扭動身體、舌頭伸出、頭轉向照顧者尋乳、吸吮動作」;「臉部放鬆」是滿足/想休息的表現,非飢餓暗示,故B錯誤。　補充：新生兒飢餓暗示行為包括尋乳、吸吮動作、把手放嘴邊、身體扭動、清醒躁動，哭泣為晚期暗示；「臉部放鬆」屬滿足或睡眠狀態，非飢餓暗示。","options":{"A":"是飢餓暗示。手伸向嘴並扭動身體。","B":"錯誤(本題答案)。臉部放鬆是滿足/休息(非飢餓暗示)。","C":"是飢餓暗示。舌頭伸出來。","D":"是飢餓暗示。臉轉向照顧者(尋乳)。"},"sources":["新文京《兒科護理學》暗示行為","飢餓"]}},"110110-N4-38":{"quick":"不是預防新生兒臍帶感染護理措施的是「沐浴前先用95%的酒精消毒,再用75%的酒精促進乾燥」(A)。","detail":{"background":"臍帶消毒用「75%酒精(消毒兼促乾燥)」即可,「95%酒精」揮發太快、消毒效果反不如75%,且順序敘述不當,故A不是正確措施。其餘是預防措施:每次換尿布注意感染徵象、尿布反摺在臍部以下防尿液回滲、保持臍部清潔乾燥。","options":{"A":"不是(本題答案)。臍帶消毒用75%酒精(非95%;95%效果反差)。","B":"是措施。每次換尿布注意臍帶感染徵象。","C":"是措施。尿布在臍部以下避免尿液回滲。","D":"是措施。臍帶脫落前保持臍部清潔乾燥。"},"sources":["新文京《兒科護理學》臍帶","75%"]}},"111030-N4-27":{"quick":"初產婦照顧新生兒最不適當的是「洗澡過後全身擦上精油,預防皮膚乾裂」(A)。","detail":{"background":"新生兒皮膚嬌嫩,「不宜全身擦精油(可能刺激、過敏)」,可用嬰兒乳液,故A最不適當。其餘適當:搖籃式抱法支持頭部與臀部、餵奶前或餵奶後1小時沐浴、直立式抱法拍嗝。　補充：新生兒皮膚護理應溫和清潔、保持乾燥；不建議全身塗抹精油或乳液(可能刺激或經皮吸收)，臍部保持乾燥清潔，沐浴水溫適中並注意保暖避免散熱。","options":{"A":"最不適當(本題答案)。不宜全身擦精油(刺激/過敏)。","B":"適當。搖籃式抱法支持頭部與臀部。","C":"適當。餵奶前或餵奶後1小時沐浴。","D":"適當。直立式抱法拍嗝。"},"sources":["新文京《兒科護理學》皮膚","勿精油"]}},"111030-N4-29":{"quick":"新生兒護理正確的是「①出生後給抗生素眼藥膏預防淋病性結膜炎+③以75%酒精消毒臍斷面(即13)」(D)。","detail":{"background":"①出生後點抗生素眼藥膏(紅黴素)預防淋菌性結膜炎(正確);③臍斷面用75%酒精消毒(正確)。②吸球清除分泌物應「先口腔後鼻腔」(非先鼻腔,以免刺激鼻部誘發吸氣把分泌物吸入);④頭圍量法是「眉上經枕骨粗隆」(非經雙耳中端),故為①③(13)。","options":{"A":"23含②(應先口後鼻)。","B":"14含④(頭圍量法敘述不當)。","C":"24含②④。","D":"正確。①抗生素眼藥膏+③75%酒精消毒臍斷面(13)。"},"sources":["新文京《兒科護理學》即刻護理","眼藥膏"]}},"111110-N4-28":{"quick":"新生兒臍帶照護措施不適當的是「酒精性優碘亦可使用於臍帶消毒且乾燥效果較酒精為佳」(D)。","detail":{"background":"臍帶消毒以「75%酒精」為主(促乾燥),「酒精性優碘」會殘留染色、且乾燥效果未必較佳,並非常規優於酒精,故D不適當。其餘適當:出生24~48小時去除臍夾避免壓迫、尿布反摺避免覆蓋臍帶促乾燥、酒精由臍根部環狀向外消毒約5公分。","options":{"A":"適當。出生24~48小時去除臍夾避免壓迫傷害。","B":"適當。尿布反摺避免覆蓋臍帶,促乾燥防感染。","C":"適當。酒精由臍根部環狀向外消毒約5公分。","D":"不適當(本題答案)。臍帶消毒以75%酒精為主(優碘非更佳)。"},"sources":["新文京《兒科護理學》臍帶","酒精"]}},"111110-N4-29":{"quick":"新生兒晚期飢餓的暗示行為(late hunger cues)是「不斷哭泣」(B)。","detail":{"background":"飢餓暗示分早中晚期:早期(吸吮嘴唇、舌頭尋乳動作)、中期(手放進嘴、扭動)、「晚期(已很餓):不斷哭泣、煩躁(此時宜先安撫再餵)」。吸吮嘴唇、手放嘴、尋乳動作是早中期,故B(哭泣)是晚期。　補充：新生兒飢餓暗示分早期(尋乳、吸吮、手放嘴邊)、中期(身體扭動、伸展)與晚期；「不斷哭泣」為晚期飢餓暗示，宜在哭鬧前即回應餵食以利順利含乳。","options":{"A":"吸吮嘴唇是早期飢餓暗示。","B":"正確。不斷哭泣是晚期飢餓暗示(已很餓)。","C":"手放進嘴是中期飢餓暗示。","D":"嘴唇尋乳動作是早期飢餓暗示。"},"sources":["新文京《兒科護理學》暗示行為","晚期飢餓"]}},"113100-N4-15":{"quick":"產婦等寶寶哭才餵,最適當的指導是「寶寶有轉頭、舌頭伸出、吸吮動作出現就可以準備餵奶了」(B)。","detail":{"background":"應在「早期飢餓暗示(轉頭尋乳、舌頭伸出、吸吮動作)」時就餵奶,不必等到哭(哭是晚期飢餓暗示,此時已很餓、需先安撫才好含乳)。固定每2~3小時不如「依需求餵」(A);等大哭才餵會更難安撫含乳(C);哭時先安撫睡再等醒非適當(D),故B正確。","options":{"A":"依需求餵優於固定每2~3小時(A不精確)。","B":"正確。出現轉頭、舌伸、吸吮等早期暗示就準備餵奶。","C":"錯。等大哭(晚期暗示)才餵更難含乳。","D":"錯。不應讓寶寶哭後先睡再等醒(應依暗示餵)。"},"sources":["新文京《兒科護理學》暗示行為","早期餵"]}},"113100-N4-38":{"quick":"為病童執行抽吸(suction)技術最適當的是「新生兒宜先抽鼻腔再抽口腔」?——本題答D「早產兒抽吸時間宜在6~8秒」?","detail":{"background":"本題官方答案為D。抽吸時間應「短(早產兒尤短)」,本題以「6~8秒」為相對適當(實務上越短越好≤10秒)。抽吸順序應「先口腔後鼻腔」(A的先鼻錯);不可常規「滴生理食鹽水入氣管內管」(B不當);嬰幼兒抽痰壓力約「60~100mmHg」(C的110~120偏高),故D為官方答案。","options":{"A":"錯。抽吸應先口腔後鼻腔(非先鼻後口)。","B":"不可常規滴生理食鹽水入氣管內管(B不當)。","C":"嬰幼兒抽痰壓力約60~100mmHg(110~120偏高)。","D":"正確(本題答案)。早產兒抽吸時間宜短(約6~8秒)。"},"sources":["新文京《兒科護理學》抽吸","時間短"]}},"101110-N4-59":{"quick":"產後第2天由關心自己轉移至新生兒、主動學習照顧,屬「緊執期(taking-hold phase)」(B)。","detail":{"background":"魯賓(Rubin)產後適應:接受期(taking-in,產後1~2天,關注自己、被動依賴)→「緊執期(taking-hold,產後3~10天,主動學習照顧新生兒、關注轉向寶寶)」→放手期(letting-go,接受新角色與寶寶為獨立個體)。本例主動學習照顧屬緊執期,故B正確。","options":{"A":"接受期是關注自己、被動依賴(產後1~2天)。","B":"正確。主動學習照顧新生兒=緊執期。","C":"放手期是接受新角色與寶寶獨立個體。","D":"獨立期非Rubin標準分期。"},"sources":["新文京《產科護理學》Rubin","緊執期"]}},"101110-N4-66":{"quick":"含子宮蛻膜殘留、上皮、紅白血球、偶有胎便胎脂胎毛的惡露是「紅惡露」(C)?——本題答C。","detail":{"background":"本題官方答案為C(紅惡露)。產後惡露:「紅惡露(產後1~3天,含大量紅血球、蛻膜、上皮細胞,偶有胎便胎脂胎毛)→漿性惡露(粉紅褐,3~10天)→白惡露(白黃,10天後)」。本題描述含成分多、偶有胎便胎脂,屬紅惡露(產後初期)。","options":{"A":"漿性惡露是粉紅褐(3~10天)。","B":"粉紅惡露非標準分類用語(漿性惡露)。","C":"正確(本題答案)。含蛻膜上皮紅白血球偶胎便胎脂=紅惡露。","D":"白惡露是白黃色(10天後)。"},"sources":["新文京《產科護理學》惡露","紅惡露"]}},"102030-N4-14":{"quick":"LOA(左枕前位)內診會發現「前囟門在孕婦薦骨的右側」(C)?——本題答C。","detail":{"background":"LOA(left occiput anterior,左枕前位):枕骨在母體骨盆左前方,則「前囟門相對在右後方(薦骨右側)」。本題官方答案為C(前囟門在薦骨的右側),反映胎頭枕前位時前囟門位於對角位置。","options":{"A":"前囟門在恥骨左側不符LOA。","B":"前囟門在恥骨右側不符。","C":"正確(本題答案)。LOA時前囟門在薦骨右側。","D":"前囟門在薦骨左側不符。"},"sources":["新文京《產科護理學》胎位","LOA"]}},"103100-N4-1":{"quick":"我國當前婦女健康政策與婦嬰照護理念正確的是「將生產主導權重新歸還產婦及其家庭成員」(C)。","detail":{"background":"現代理念強調「以產婦與家庭為中心、賦權、生產主導權歸還產婦」。不應只為避免醫療浪費而縮減住院(A過度);不鼓勵居家生產(安全考量,B);應「LDR三合一同室」(非分開,D),故C正確。　補充：我國婦嬰照護理念強調以產婦與家庭為中心、尊重生產自主權、推動母嬰親善與親子同室、母乳哺育及減少不必要醫療介入，將生產主導權歸還產婦及其家庭。","options":{"A":"不應只為避免浪費而縮減住院(A過度)。","B":"錯。不鼓勵居家生產(安全考量)。","C":"正確。將生產主導權歸還產婦及家庭。","D":"錯。鼓勵LDR三合一(非分開)。"},"sources":["新文京《產科護理學》理念","賦權"]}},"104030-N4-22":{"quick":"親子同室特點錯誤的是「減輕護理師照護嬰兒的負擔」(C)。","detail":{"background":"親子同室的目的是「促進親子依附、母乳哺育、父母及早學習照顧、家庭式照顧」,實際上「增加護理師衛教與支持的工作」(非減輕負擔),故C錯誤。其餘正確:及早瞭解新生兒作息、利於家庭式照顧、增加學習照顧技巧的機會。","options":{"A":"正確。及早讓父母建立瞭解新生兒作息。","B":"正確。有利於提供家庭式照顧。","C":"錯誤(本題答案)。親子同室增加(非減輕)護理師工作。","D":"正確。增加父母學習照顧技巧的機會。"},"sources":["新文京《產科護理學》親子同室","依附"]}},"104030-N4-28":{"quick":"興高采烈與先生討論新生兒名字,屬母性角色中的「提出所有權(claiming)」(D)。","detail":{"background":"母親將新生兒「視為自己的、為其命名、討論長得像誰」是「提出所有權(claiming)」的依附行為。分極作用、確認行為、認同行為皆非「命名/視為己有」的描述,故D正確。　補充：Rubin母性角色發展中，「提出所有權(claiming/identification)」指母親將新生兒視為自己的孩子、為其命名、指認與家人相似的特徵，是接納與認同的表現。","options":{"A":"分極作用非命名的描述。","B":"確認行為(orienting)非此例。","C":"認同行為非命名。","D":"正確。為新生兒命名、視為己有=提出所有權(claiming)。"},"sources":["新文京《產科護理學》依附","claiming"]}},"104100-N4-1":{"quick":"「以家庭為中心」母育護理理念正確的是「婦女在整個待產、生產與產後的過程都在同一個單位」(A)。","detail":{"background":"家庭中心母育強調「LDR(待產生產產後同一單位)、家庭參與、早期親子接觸」。新生兒出生後宜「儘早與母親肌膚接觸」(非先送嬰兒室24小時,B);不應過度限制親友與手足陪產(C);應「鼓勵早期出院」(非住滿3天,D),故A正確。","options":{"A":"正確。待產生產產後在同一單位(LDR)。","B":"錯。新生兒應儘早與母親接觸(非先送嬰兒室24小時)。","C":"不應過度限制親友/手足陪產。","D":"錯。鼓勵早期出院(非住滿3天)。"},"sources":["新文京《產科護理學》家庭中心","LDR"]}},"105030-N4-1":{"quick":"婦嬰生命統計錯誤的是「嬰兒死亡率係指每年一千個活產嬰兒中未滿28天的死亡數」(D)。","detail":{"background":"「嬰兒死亡率」是「未滿1歲」的死亡數/千活產;「未滿28天」是「新生兒死亡率」,故D錯誤(把嬰兒死亡率與新生兒死亡率混淆)。其餘正確:總生育率(年齡別生育率加總)、粗出生率(每千人口活產數)、孕產婦死亡率(每十萬活產、懷孕或中止後42天內死亡)。","options":{"A":"正確。總生育率依年齡別生育率,每千育齡婦女子女數。","B":"正確。粗出生率為每千名人口的平均活產數。","C":"正確。孕產婦死亡率每十萬活產、42天內死亡。","D":"錯誤(本題答案)。嬰兒死亡率是未滿1歲(未滿28天是新生兒死亡率)。"},"sources":["新文京《產科護理學》統計","嬰兒死亡率"]}},"105030-N4-26":{"quick":"產後第3天主動學習新生兒沐浴技術,依Rubin屬「緊執期(Taking-hold phase)」(B)。","detail":{"background":"Rubin產後適應「緊執期(taking-hold,約產後3~10天)」特徵是「主動學習照顧新生兒技術、關注轉向寶寶」。接受期(被動依賴關注自己)、放手期(接受新角色)、恢復期(非Rubin標準),故B正確。","options":{"A":"接受期是被動依賴、關注自己。","B":"正確。主動學習新生兒沐浴=緊執期。","C":"放手期是接受新角色與寶寶獨立。","D":"恢復期非Rubin標準分期。"},"sources":["新文京《產科護理學》Rubin","緊執期"]}},"106030-N4-29":{"quick":"產後潛在適應不良的徵兆是「看寶寶時皺著眉,哭著對護理師說他看起來好可怕!」(A)。","detail":{"background":"母親對新生兒「負向情緒、排斥、嫌惡(覺得可怕)」是親子依附與產後適應不良的警訊。談論生產過程、撫摸寶寶胎頭腫塊部位、觸摸並輕聲說話皆是正常的依附行為,故A是適應不良徵兆。　補充：產後母性適應不良(依附困難)的徵兆包括對嬰兒表現負向情緒或排斥、以負面言語形容寶寶、不願接觸或眼神接觸少；如皺眉、說「他看起來好可怕」即潛在警訊。","options":{"A":"正確(本題答案)。對寶寶負向排斥情緒(覺得可怕)=適應不良徵兆。","B":"與友人談論生產過程是正常。","C":"撫摸寶寶患部是關懷依附(正常)。","D":"觸摸並輕聲說話是正常依附行為。"},"sources":["新文京《產科護理學》依附","適應不良"]}},"106111-N4-2":{"quick":"產後立即性肌膚接觸正確的是「讓新生兒嘗試用手去觸摸乳頭」(B)。","detail":{"background":"產後立即肌膚接觸應「順其自然,讓新生兒自己尋乳、用手與口探索乳頭(乳房爬行)」,促進自發含乳。不應「直接放在乳房上硬塞」(A、D太刻意);應「出生後立即(1小時內黃金時間)進行」(C的1小時之後錯),故B正確。","options":{"A":"不應直接放置乳房上(太刻意,應自然探索)。","B":"正確。讓新生兒嘗試用手觸摸乳頭(自然尋乳)。","C":"錯。應出生後立即(1小時內)進行(非1小時後)。","D":"錯。不應努力硬塞乳房入嘴(應自然含乳)。"},"sources":["新文京《產科護理學》肌膚接觸","自然尋乳"]}},"106111-N4-22":{"quick":"表示母嬰親子連結已進入互惠期的是「了解新生兒的飢餓飽食行為」(C)。","detail":{"background":"親子連結發展中,「互惠期(reciprocity)」指母嬰「相互理解與回應」——母親能讀懂並回應新生兒的需求訊號(如飢餓飽食行為)。觸摸臉頰、呼喚名字、表達看法是依附初期的「定向/認同」行為,非互惠期,故C正確。","options":{"A":"觸摸臉頰是依附初期行為(非互惠期)。","B":"呼喚名字是依附初期。","C":"正確。了解新生兒飢餓飽食行為=互惠期(相互回應)。","D":"表達看法是依附初期。"},"sources":["新文京《產科護理學》依附","互惠"]}},"106111-N4-26":{"quick":"親子同室護理指導正確的是「母親非常疲憊時可將嬰兒推回嬰兒室」(C)。","detail":{"background":"親子同室仍應「彈性、依母親狀況」,母親非常疲憊時可暫將嬰兒送回嬰兒室休息。應「出生後儘早(非6小時後才開始,A)」;祖父母在健康下「可接觸寶寶」(非一律避免,B);新生兒應「仰睡」(非趴睡,D),故C正確。","options":{"A":"錯。親子同室應儘早開始(非出生6小時後)。","B":"祖父母健康下可接觸寶寶(非一律避免)。","C":"正確。母親非常疲憊時可暫將嬰兒推回嬰兒室。","D":"錯。新生兒應仰睡(非趴睡)。"},"sources":["新文京《產科護理學》親子同室","彈性"]}},"107030-N4-1":{"quick":"我國婦嬰生命統計正確的是「粗出生率是指一年內每千位年中人口數的平均活產數」(A)。","detail":{"background":"粗出生率=一年內活產數/年中人口數×1000(每千人口的活產數)。孕產婦死亡率是「每十萬活產」(非每萬婦女,B錯);新生兒死亡率是「未滿28天」(非小於1年,C錯);周產期是「妊娠28週以上死胎+出生7天內死亡」(非到產後1年,D錯),故A正確。","options":{"A":"正確。粗出生率=每千年中人口的平均活產數。","B":"錯。孕產婦死亡率是每十萬活產(非每萬婦女)。","C":"錯。新生兒死亡率是未滿28天(非小於1年)。","D":"錯。周產期是妊娠28週後至產後7天(非到產後1年)。"},"sources":["新文京《產科護理學》統計","粗出生率"]}},"107030-N4-11":{"quick":"足月男嬰Apgar 7/8、即刻護理完成、產婦正會陰縫合,首次親子互動最適當的是「立即將新生兒放到王女士胸腹部,進行親子接觸」(D)。","detail":{"background":"新生兒狀況穩定(Apgar 7/8)、即刻護理已完成,應「立即(產後黃金1小時)進行肌膚接觸與親子互動」(即使產婦正會陰縫合,可同時進行)。不應以狀態不穩為由延後(A)、不需先送嬰兒室才接觸(B)、不需等縫合完才接觸(C),故D正確。","options":{"A":"錯。新生兒穩定(Apgar7/8),不需以不穩延後。","B":"錯。不需先送嬰兒室才決定(應儘早接觸)。","C":"錯。不需等會陰縫合後才接觸(可同時進行)。","D":"正確。立即放到胸腹部進行親子接觸(黃金1小時)。"},"sources":["新文京《產科護理學》肌膚接觸","黃金1小時"]}},"108110-N4-54":{"quick":"「2025衛生福利政策白皮書」婦幼健康促進長程指標錯誤的是「低出生體重比率降到2.0%」(C)?——本題答C。","detail":{"background":"本題官方答案為C。低出生體重(<2500g)比率現況約8~9%,「降到2.0%」不切實際(目標值設定錯誤),故C錯誤。其餘為白皮書指標方向:孕產婦死亡率、嬰兒死亡率、6個月純母乳哺育率提升等。　補充：婦幼健康促進長程指標包含降低嬰兒與孕產婦死亡率、提升母乳哺育率、降低低出生體重比率等；各指標數值須依官方文件，過低或不合理之目標值即為錯誤敘述。","options":{"A":"(白皮書指標,孕產婦死亡率目標)。","B":"(白皮書指標,嬰兒死亡率目標)。","C":"錯誤(本題答案)。低出生體重降到2.0%不切實際(目標值錯)。","D":"(白皮書指標,純母乳哺育率提升)。"},"sources":["衛福部","白皮書"]}},"109030-N4-13":{"quick":"產婦待產時的危險徵象是「羊水中有胎便」(D)。","detail":{"background":"待產時「羊水有胎便(胎便染色)」提示胎兒可能「窘迫/缺氧」,屬危險徵象須監測胎心與處置。子宮頸開4公分破水(正常產程)、現血增加(產兆)、臍繞頸一圈(常見、未必危險)非待產危險徵象,故D正確。　補充：待產危險徵象包括羊水有胎便(胎兒窘迫)、胎心音異常(過快過慢或減速)、大量陰道出血、臍帶脫垂、子宮強直收縮等；羊水染胎便提示胎兒缺氧需密切監測。","options":{"A":"子宮頸開4公分破水是正常產程。","B":"現血增加是產兆(非危險)。","C":"臍繞頸一圈常見、未必危險。","D":"正確。羊水有胎便提示胎兒窘迫(危險徵象)。"},"sources":["新文京《產科護理學》待產","胎便"]}},"109110-N4-22":{"quick":"初次當爸爸怕抱寶寶,最適當的是「鼓勵循序漸進,先撫觸嬰兒後再教導抱嬰兒技巧」(B)。","detail":{"background":"協助新手父親建立信心應「循序漸進:先撫觸→再教抱嬰兒技巧」,降低焦慮、促進依附。不應只說習慣就好(A消極);不應改由產婦全權照顧(剝奪父職參與,C);直接衛教技巧而不顧其害怕(D不夠循序),故B正確。","options":{"A":"只說習慣就好太消極(未具體協助)。","B":"正確。循序漸進:先撫觸再教抱嬰兒技巧。","C":"錯。不應改由產婦全權照顧(應促父職參與)。","D":"直接衛教技巧而不顧害怕,不夠循序。"},"sources":["新文京《產科護理學》父職","循序漸進"]}},"109110-N4-23":{"quick":"剖腹產不適、寶寶住院照光無法同出院,對親子依附較不適當的是「為避免感染,新生兒住院期間不鼓勵媽媽探訪」(B)。","detail":{"background":"母嬰分離時更應「鼓勵母親探視、接觸寶寶」維繫依附,「不鼓勵探訪」會妨礙依附,故B較不適當。其餘適當:評估產婦對復原與照護的擔心、運用支持資源讓產婦專注新生兒、鼓勵眼對眼與身體接觸。　補充：促進親子依附應鼓勵母親探視、肌膚接觸與參與照顧；「住院期間不鼓勵媽媽探訪」會阻礙依附建立，不適當；應安排探視、提供寶寶資訊與母乳哺餵支持。","options":{"A":"適當。評估產婦對復原與照護的擔心。","B":"較不適當(本題答案)。不應不鼓勵探訪(母嬰分離更應鼓勵接觸)。","C":"適當。運用支持資源讓產婦專注新生兒。","D":"適當。鼓勵產婦與新生兒眼對眼及身體接觸。"},"sources":["新文京《產科護理學》依附","探視"]}},"111030-N4-17":{"quick":"待產12小時生下健康新生兒,第四產程護理措施不適宜的是「將新生兒放置保溫箱讓產婦休息」(D)。","detail":{"background":"第四產程(產後1~2小時)應「促進母嬰肌膚接觸、親子互動與早期哺乳」,「放保溫箱讓產婦休息」會錯失黃金接觸時機,故D不適宜。其餘適宜:鼓勵眼對眼接觸、包布保暖並鼓勵觸摸寶寶、延後打維生素K1先肌膚接觸。","options":{"A":"適宜。鼓勵產婦與寶寶眼對眼接觸。","B":"適宜。包布保暖並鼓勵觸摸寶寶。","C":"適宜。延後打維生素K1,先進行肌膚接觸。","D":"不適宜(本題答案)。不應放保溫箱(錯失黃金親子接觸)。"},"sources":["新文京《產科護理學》第四產程","肌膚接觸"]}},"111110-N4-36":{"quick":"更年期熱潮紅症狀錯誤的是「與黃體素的減少有關」(A)。","detail":{"background":"更年期熱潮紅主要與「雌激素減少」致下視丘體溫調節中樞不穩定有關,而非黃體素,故A錯誤。其餘正確:起因血管舒縮不穩定、藉流汗發熱降溫、體重過輕者(脂肪少、雌激素更低)熱潮紅更嚴重。　補充：更年期熱潮紅與「雌激素」減少影響體溫調節中樞有關，非黃體素；表現為突發臉頸潮紅、發熱、出汗、心悸，夜間盜汗影響睡眠，可採荷爾蒙或生活型態調整。","options":{"A":"錯誤(本題答案)。熱潮紅與雌激素減少有關(非黃體素)。","B":"正確。起因於血管舒張與收縮之間不穩定。","C":"正確。藉由流汗、發熱來降低體溫。","D":"正確。體重過輕者熱潮紅症狀更嚴重。"},"sources":["新文京《婦科》更年期","雌激素"]}},"112030-N4-9":{"quick":"OHSS住院安胎、不舒服但說值得會配合,進行的懷孕期發展任務是「①確保自己及胎兒安全+③學習貢獻自己(即13)」(C)。","detail":{"background":"魯賓母性任務中,「①確保自己與胎兒安全通過(配合治療)」與「③學習貢獻自己(願意為胎兒犧牲承受不適、覺得值得)」最符此情境。②使家人接受新生兒、④與胎兒連成一體非此例核心,故C(13)正確。　補充：懷孕各期發展任務(Rubin)：第一期確保母胎安全、尋求接納；本例孕婦於安胎中雖不適仍願配合、覺得值得，反映「確保母胎安全」與「學習為他人付出(奉獻)」的任務。","options":{"A":"12含②(家人接受非此例核心)。","B":"23含②。","C":"正確。①確保安全+③學習貢獻自己(13)。","D":"34含④(連成一體非此例核心)。"},"sources":["新文京《產科護理學》Rubin","貢獻自己"]}},"112110-N4-1":{"quick":"嬰兒死亡率正確的是「一年內未滿1歲之嬰兒死亡數÷當年出生活嬰總數×1,000」(D)。","detail":{"background":"嬰兒死亡率=「一年內未滿1歲死亡數/當年活產數×1000」。未滿4週是新生兒死亡率(A)、未滿42天/6個月皆非嬰兒死亡率定義(B、C),故D正確。　補充：嬰兒死亡率＝一年內未滿1歲嬰兒死亡數÷當年活產數×1000，是反映婦幼衛生與醫療水準的重要指標；新生兒死亡指未滿28天，周產期死亡另有定義。","options":{"A":"未滿4週是新生兒死亡率(非嬰兒死亡率)。","B":"未滿42天非嬰兒死亡率定義。","C":"未滿6個月非嬰兒死亡率定義。","D":"正確。嬰兒死亡率是未滿1歲死亡數/活產數×1000。"},"sources":["新文京《產科護理學》統計","嬰兒死亡率"]}},"112180-N4-1":{"quick":"婦嬰生命統計正確的是「孕產婦死亡率為每十萬活產嬰兒中,於妊娠期間或妊娠終止後42天內死亡之婦女人數」(B)。","detail":{"background":"孕產婦死亡率=「每十萬活產中,妊娠期間或妊娠終止後42天內死亡的婦女數」。粗出生率是每千(非十萬)人口活產(A錯);新生兒死亡率是未滿28天(非十萬活產未滿1歲,C錯);周產期是妊娠28週後死胎+產後7天內死亡(D敘述不符),故B正確。","options":{"A":"錯。粗出生率是每千人口活產(非每十萬)。","B":"正確。孕產婦死亡率=每十萬活產、42天內死亡婦女數。","C":"錯。新生兒死亡率是未滿28天(非未滿1歲)。","D":"錯。周產期定義為妊娠28週後死胎+產後7天內死亡。"},"sources":["新文京《產科護理學》統計","孕產婦死亡率"]}},"113100-N4-18":{"quick":"即刻母嬰肌膚接觸最佳時機及理由是「第一反應期,新生兒清醒且吸吮反射強」(B)。","detail":{"background":"新生兒出生後「第一反應期(出生後約30分鐘內)」清醒、活躍、吸吮反射強,是「肌膚接觸與早期哺乳」的最佳時機。相對不反應期(睡眠)、第二反應期(再活躍但較晚)、絕對反應期(非標準用語)皆非最佳,故B正確。","options":{"A":"相對不反應期新生兒想睡(非最佳接觸時機)。","B":"正確。第一反應期清醒、吸吮反射強(最佳時機)。","C":"第二反應期較晚(非最佳)。","D":"絕對反應期非標準用語。"},"sources":["新文京《產科護理學》肌膚接觸","第一反應期"]}},"113100-N4-33":{"quick":"30週又2天早產兒在NICU,強化親子依附較適當的是「劉小弟病情穩定時,鼓勵雙親參與照顧」(C)。","detail":{"background":"NICU早產兒的親子依附應「在病情穩定時鼓勵雙親參與照顧(如袋鼠護理、餵食)、誠實溝通」。不應只說團隊很強要他們放心(A空泛);不應避免回答儀器疑問(B);不應嚴格限制探視(C比D好,D限探視妨礙依附),故C正確。","options":{"A":"只說團隊很強要放心過於空泛(非促依附)。","B":"錯。不應避免回答醫療儀器疑問。","C":"正確。病情穩定時鼓勵雙親參與照顧(促依附)。","D":"錯。嚴格限制探視妨礙依附。"},"sources":["新文京《產科護理學》依附","參與照顧"]}},"114170-N4-5":{"quick":"懷孕16週常跟大寶說未來可一起溜滑梯,屬Rubin母性任務的「使重要家人接受新生兒」(B)。","detail":{"background":"魯賓母性任務「使重要家人(含手足)接受新生兒」——母親促進大寶接納未來的弟妹(描述一起玩),屬此任務。確保安全渡過、學習貢獻自己、與胎兒連成一體皆非「促手足接納」,故B正確。　補充：Rubin母性任務之一為「使重要家人接受新生兒」——孕婦促進手足與家人接納未出生的寶寶(如告訴大寶未來可一起玩)，屬將胎兒納入家庭關係的準備。","options":{"A":"確保自己及胎兒安全渡過是另一任務。","B":"正確。促大寶接納未來弟妹=使重要家人接受新生兒。","C":"學習貢獻自己是另一任務。","D":"與胎兒連成一體是另一任務。"},"sources":["新文京《產科護理學》Rubin","家人接受"]}},"115030-N4-15":{"quick":"依Rubin,屬接受期(taking-in)行為特色的是「注意力集中在自己身上」(B)。","detail":{"background":"Rubin接受期(taking-in,產後1~2天)特徵是「被動依賴、注意力集中在自己(身體舒適、生產經驗)、回顧生產過程」。主動關心新生兒需要、接受寶寶為獨立個體、積極尋求意見是緊執期/放手期,故B正確。","options":{"A":"主動關心新生兒需要是緊執期(非接受期)。","B":"正確。注意力集中在自己身上=接受期。","C":"接受寶寶為獨立個體是放手期。","D":"積極尋求意見是緊執期。"},"sources":["新文京《產科護理學》Rubin","接受期"]}},"115030-N4-30":{"quick":"兒童健康評估顯示發展異常的是「1.5歲已長齊20顆乳牙」(B)。","detail":{"background":"乳牙20顆通常約「2~2.5歲(2歲半)」才長齊,「1.5歲就長齊20顆」過早,屬發展異常(或評估有誤)。其餘正常:出生3個月生理性斜視(眼肌未協調)、3~4歲膝內翻→生理性彎曲變化、4歲前囟門已關閉(12~18個月關),故B異常。","options":{"A":"正常。出生3個月生理性斜視(眼肌未協調)。","B":"異常(本題答案)。20顆乳牙約2~2.5歲長齊(1.5歲過早)。","C":"3~4歲膝部生理性彎曲變化(正常範圍)。","D":"正常。4歲前囟門已關閉(12~18個月關)。"},"sources":["新文京《兒科護理學》發展","乳牙"]}},"110030-N4-48":{"quick":"兒童疼痛概念與認知錯誤的是「早產兒、新生兒不會覺得疼痛,因為傳導慢」(A)。","detail":{"background":"早產兒與新生兒「已具備痛覺、會感受疼痛」(神經傳導雖未完全成熟但能感知,且對疼痛更敏感),故「不會覺得疼痛」錯誤。其餘正確:16個月對疼痛有記憶看到針頭就哭、5歲用語言與肢體表達疼痛、7歲把疼痛視為錯誤行為的懲罰。","options":{"A":"錯誤(本題答案)。早產兒/新生兒會感受疼痛(且更敏感)。","B":"正確。16個月對疼痛有記憶,看到針頭就哭。","C":"正確。5歲用語言抗議和肢體活動表達疼痛。","D":"正確。7歲將疼痛視為錯誤行為的懲罰。"},"sources":["新文京《兒科護理學》疼痛","新生兒有痛覺"]}}},TO=["1新生兒過渡期與心臟血管循環調適", "2Apgar評分與新生兒即刻護理", "3新生兒體溫調節與保溫", "4新生兒黃疸", "5新生兒身體評估反射與皮膚", "6新生兒成熟度評估與早產足月特徵", "7早產兒照護與併發症", "8新生兒產傷", "9新生兒餵養營養與體重", "10新生兒疾病感染與篩檢", "11新生兒沐浴臍帶安全與暗示行為", "12母嬰照護理念母性適應與婦嬰統計政策"],LEC={"1新生兒過渡期與心臟血管循環調適":{"html":"<p><b>出生後循環轉換</b>:第一次呼吸→<b>肺擴張、肺血管阻力下降、肺血流增</b>;臍帶結紮→<b>體循環阻力上升、主動脈壓增</b>;左心房壓>右心房→<b>卵圓孔功能性關閉</b>;血氧上升→<b>動脈導管收縮關閉</b>。殘餘構造:臍靜脈→肝圓韌帶、靜脈導管→靜脈韌帶、動脈導管→動脈韌帶。動脈導管約2~4天功能性、1~3月解剖性關閉。</p><p><b>胎兒循環</b>:臍帶=2條臍動脈(缺氧血,胎兒→胎盤)+1條臍靜脈(充氧血);卵圓孔在左右心房間。</p><p><b>第一次呼吸影響因素</b>:化學刺激(CO₂↑O₂↓pH↓)、溫度觸覺、肺液清除、肺彈性、<b>表面張力素(surfactant)</b>。</p><p><b>過渡期(出生–6小時)</b>:第一反應期(清醒活躍、吸吮反射強=肌膚接觸/首次哺乳最佳時機)→相對不反應期(睡)→第二反應期(2~6h再活躍、腸蠕動增、解胎便)。<u>黃疸在24小時內出現為異常(病理性)</u>。睡眠-活動狀態:安靜睡眠期(無表情、呼吸規律、偶驚嚇/吸吮)、安靜清醒期(眼亮、注意環境、呼吸規律=互動最佳)。</p>"},"2Apgar評分與新生兒即刻護理":{"html":"<p><b>Apgar評分</b>五項各0~2分(總0~10):<b>心跳、呼吸、肌肉張力、反射激惹性、膚色</b>(<u>不含體溫、體重、血氧</u>);出生<b>第1、5分鐘</b>評估。判讀7~10正常、4~6中度窘迫、0~3嚴重需急救。膚色「中央粉紅末梢發紺」=1分。</p><p><b>即刻護理</b>:保暖擦乾、清呼吸道(先口後鼻)、<b>肌注維生素K1防出血</b>、<b>點紅黴素眼膏防淋菌結膜炎</b>(含碘消毒會影響甲狀腺篩檢非PKU)、Apgar評估、身分手圈、母嬰肌膚接觸。</p>"},"3新生兒體溫調節與保溫":{"html":"<p><b>體熱喪失四機轉與預防</b>:<b>傳導</b>(接觸冰冷物→預熱物品/磅秤紙)、<b>對流</b>(冷空氣流動→避風調室溫)、<b>輻射</b>(冷牆窗→嬰兒床遠離)、<b>蒸發</b>(體表水分→擦乾羊水、延後沐浴)。新生兒體表面積大、皮下脂肪少、以<b>棕色脂肪(非顫抖)</b>產熱,易低體溫。</p><p><b>保溫措施</b>:<b>母嬰肌膚接觸(首選)</b>、戴帽(頭部散熱大)、預熱布單、保溫箱/輻射台、極早早產兒<b>提高濕度</b>(>60%減蒸發散熱)、塑膠膜覆蓋。輕度低溫(36°C末梢冷)首選肌膚接觸。</p>"},"4新生兒黃疸":{"html":"<p><b>生理性黃疸</b>:出生<b>2~3天後</b>出現、3~4天高峰、足月7~10天消退(早產兒久、發生率高)、上升<5mg/dL/天。因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。增加哺餵促排出。</p><p><b>病理性黃疸</b>:<b>24小時內出現</b>、上升過快、過高過久,常因<b>血型不合溶血</b>(ABO:母O型胎兒A/B型,可第一胎;Rh:母陰胎陽,多第二胎)、感染、G6PD。過高未結合膽紅素→<b>核黃疸</b>腦損(聽損、發展遲緩)。</p><p><b>母乳相關黃疸</b>:早發型(哺餵性,第1週內,哺餵不足)→<u>增加哺餵</u>;晚發型(母乳性,1週後)。<u>皆不需停母乳</u>。</p><p><b>照光療法</b>:使未結合膽紅素<b>光異構化</b>成水溶性排出;護理=<b>戴不透光眼罩、遮生殖器、增加約25%水分</b>(防脫水)、定時翻身、副作用(體溫升、腹瀉、紅疹,<u>非便秘</u>)、採血/餵奶可暫停。</p><p><b>換血</b>:新鮮血或<72小時血(防鉀高)、加溫35~37°C、每換100mL注射1mL 10%葡萄糖酸鈣防低血鈣、白蛋白於換血前給、導管入臍靜脈、Rh不合用O型Rh陰性血。</p>"},"5新生兒身體評估反射與皮膚":{"html":"<p><b>生命徵象</b>:體溫36.5~37.5°C、心跳120~160、呼吸30~60(<b>腹式</b>、不規律、可<5秒呼吸暫停)。心尖聽診於<b>左鎖骨中線第3~4肋間</b>。</p><p><b>原始反射</b>:尋乳(觸嘴角轉向張嘴)、吸吮、<b>摩洛/擁抱(姿勢改變致四肢對稱外展伸直C字形)</b>、抓握、巴賓斯基。<b>終生反射</b>:眨眼、吞嚥、作嘔、咳嗽。</p><p><b>囟門</b>:前囟門菱形(二額二頂骨)約<b>12~18個月</b>關閉;後囟門三角形(二頂+枕骨)約<b>2~3個月</b>關閉。<u>凹陷=脫水、凸出=顱內壓升</u>。</p><p><b>頭部</b>:矢狀縫合(兩頂骨間連前後囟門)、冠狀縫合(額骨與頂骨間);molding(頭骨重疊,數天~數週恢復)。</p><p><b>皮膚</b>:正常=胎脂、蒙古斑(薦臀,兒童早期消退)、毒性紅斑(自限不需治療)、<b>肢端發紺(末梢循環未成熟)</b>;異常=<b>葡萄酒色斑(血管畸形,恐Sturge-Weber)、24小時內黃疸、對光不反應</b>。新生兒淚腺未成熟哭時無淚、暫時性斜視為正常。</p>"},"6新生兒成熟度評估與早產足月特徵":{"html":"<p><b>New Ballard Score</b>(神經肌肉+身體成熟度),最佳評估<b>出生24小時內</b>。</p><p><b>愈成熟(足月)</b>:姿勢屈曲、<b>方形窗角度愈小(0°最成熟)</b>、膝膕角小、圍巾徵象手肘<b>不過</b>中線、足跟<b>不易</b>到耳、足底皺褶滿佈、乳暈突起有乳核、耳軟骨硬可回彈、皮膚厚不透明、大陰唇覆蓋陰蒂、睪丸下降陰囊皺褶多。</p><p><b>早產兒</b>:四肢低張伸展、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、<b>胎毛多(27~28週最多)</b>、乳暈平坦、陰蒂突出大陰唇平坦。</p><p><b>出生體重分類</b>:AGA(第10~90百分位)、SGA(<10)、LGA(>90);LBW<2500g、VLBW<1500g、ELBW<1000g。<b>L/S ratio≥2+磷脂甘油(PG)</b>評估胎兒肺成熟。</p>"},"7早產兒照護與併發症":{"html":"<p><b>體溫</b>:保溫箱(較高溫、<b>高濕度>60%</b>)、塑膠膜、戴帽、集中護理減離箱、<b>袋鼠式護理(穩定者鼓勵)</b>。</p><p><b>呼吸窘迫症候群(RDS)</b>:表面張力素缺乏,出生30分~2小時內漸現:呼吸>60、鼻翼搧動、肋間凹陷、<b>呼氣呻吟</b>、發紺。</p><p><b>呼吸暫停(apnea)</b>:≥20秒/伴心搏過緩→先<b>觸覺刺激(輕揉背部足底)</b>,無效再給氧/通氣;<u>不常規給高濃度氧(增ROP)</u>。</p><p><b>ROP(視網膜病變)</b>:<32週、<b>長期高濃度氧</b>致視網膜血管異常增生;矯正胎齡31~34週或出生4~6週起篩檢。</p><p><b>NEC(壞死性小腸結腸炎)</b>:餵食後<b>腹脹、吐奶(含膽汁)、血便</b>→禁食胃減壓抗生素。</p><p><b>發展性照護</b>:袋鼠式、包巾築巢(屈曲向中線/寧握)、減光減噪、夜間覆布罩調日夜節律、集中護理。抽吸先口後鼻、管徑5~8Fr、壓力60~100mmHg、單次≤5~10秒。</p>"},"8新生兒產傷":{"html":"<p><b>產瘤(胎頭腫塊,caput succedaneum)</b>:頭皮<b>軟組織水腫</b>、界線不清、<b>可越骨縫線</b>、出生時最明顯、<b>數天</b>消退。</p><p><b>頭血腫(cephalohematoma)</b>:<b>骨膜下出血</b>、界線清楚、<b>不越骨縫線</b>、可單/雙側、出生後數小時~數天才漸明顯、數週~數月吸收、<b>可致黃疸</b>。</p><p><b>臂神經叢麻痺(Erb,C5~6)</b>:肩難產/巨嬰,患肢內收內旋(侍者手)、<b>Moro反射不對稱、抓握反射存在</b>;維持外展外轉肘屈前臂後旋腕背屈的功能姿勢。</p><p><b>顏面神經麻痺(產鉗)</b>:患側臉無力、<b>眼瞼不能閉合(單眼眼罩護角膜)</b>、口角歪;哺乳<b>患側</b>靠近乳房、用軟而洞大奶嘴。</p><p><b>鎖骨骨折(巨嬰/難產)</b>:患側Moro不對稱、局部腫痛、雙臂不等長肩不等高。</p>"},"9新生兒餵養營養與體重":{"html":"<p><b>生理性體重減輕</b>:出生3~4天降<b>5~10%(<10%)</b>(無感水分喪失、排胎便尿、初期吸奶少),約<b>7~10天恢復</b>出生體重;增加哺餵即可,<u>降>10%為異常</u>。</p><p><b>奶量計算</b>:每日熱量約110~120kcal/kg,配方奶約67kcal/100mL(0.67kcal/mL);每日量=熱量÷0.67÷餵食次數。</p><p><b>消化生理</b>:<b>賁門括約肌鬆易溢奶</b>(餵後拍嗝、右側臥/頭高,<u>非左側臥</u>)、胃排空快(2~3h少量多餐)、消化酶不足、<b>出生24小時內解胎便</b>(24~48小時未解須查)、3~4個月才自主控制吞嚥。</p><p><b>初乳</b>:黃黏稠、蛋白質礦物質IgA高、脂肪醣較低、輕瀉促胎便排出減黃疸。<b>維生素K缺乏</b>(腸道無菌不能合成、不易過胎盤、肝未成熟)→肌注維生素K1。</p>"},"10新生兒疾病感染與篩檢":{"html":"<p><b>新生兒篩檢</b>(足跟血):<b>出生滿48小時+完全腸道進食24小時後</b>採;穿刺<b>足跟外側兩側</b>(避跟骨神經)、熱敷3~10分、<b>擦去第一滴取第二滴</b>、<u>不可用力擠壓</u>。項目:PKU、先天甲狀腺低下、半乳糖血症、G6PD、CAH、MMA…(<u>唐氏症屬產前染色體篩檢,非代謝篩檢</u>)。</p><p><b>代謝疾病飲食</b>:PKU限高蛋白(苯丙胺酸);半乳糖血症<b>禁母乳/乳糖,用無乳糖配方</b>;先天甲狀腺低下用L-thyroxine(終生);CAH失鹽型<b>補鹽</b>+皮質醇。<b>G6PD(蠶豆症)</b>=X性聯隱性(母傳男嬰),避蠶豆/樟腦/aspirin。</p><p><b>感染</b>:B肝母帶原(尤e抗原陽性)→出生24小時內HBIG+疫苗;淋病母→新生兒眼炎(紅黴素眼膏);<b>鵝口瘡</b>(念珠菌,白膜不易刮除)用nystatin;<b>IgM升高提示子宮內感染</b>。巨嬰/糖尿病母兒→<b>低血糖</b>(儘早測血糖餵食)。</p><p><b>胎便吸入症候群(MAS)</b>:足月/過期、羊水胎便、皮膚指甲染色;<u>須先抽吸清除胎便再正壓通氣,不可立即加壓給氧</u>。<b>先天巨結腸症</b>:24小時內無胎便、嘔吐含膽汁、慢性便秘絲帶狀糞便。</p>"},"11新生兒沐浴臍帶安全與暗示行為":{"html":"<p><b>沐浴</b>:餵奶前或餵後1小時(防溢吐)、控制室溫、<b>由乾淨到污染、先臉(眼內眥往外)→頭→軀幹→四肢→會陰</b>;女嬰會陰由上往下(前往後);臍帶用<b>75%酒精</b>非優碘。</p><p><b>臍帶照護</b>:保持<b>清潔乾燥、暴露空氣</b>、尿布反摺於臍下、<b>75%酒精由根部環狀向外</b>、自然脫落(<u>勿手移除</u>)、膿性紅腫異味才是感染。</p><p><b>安全</b>:不離視線、核對<b>身分手圈</b>、不明人士按警示鈴。</p><p><b>暗示行為</b>:投入性(注視微笑想互動)、脫離性(<b>臉轉開</b>、屈曲僵硬、想休息);飢餓<b>早期</b>(轉頭尋乳、舌伸出、手放嘴)→<b>晚期(哭泣)</b>;吃飽(睡著、推開、臉放鬆、吸吮減少)。<u>依早期暗示餵奶,勿等大哭</u>。</p>"
