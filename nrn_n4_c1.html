,"C":"接受新生兒是一獨立個體","D":"積極尋求別人的意見"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"12母嬰照護理念母性適應與婦嬰統計政策","topic_num":"新生兒照護與新生兒疾病","topic_code":"C1","q_num":15,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"主動關心新生兒的需要","B":"注意力集中在自己身上","C":"接受新生兒是一獨立個體","D":"積極尋求別人的意見"},"img":""},{"id":"115030-N4-30","code":"115030","roc":"115","cat":"N4","catname":"產兒科護理學","num":30,"stem":"有關兒童之健康評估結果,下列敘述何者顯示發展異常?","opts":{"A":"出生3 個月大仍有生理性斜視","B":"1.5 歲已長齊20 顆乳牙","C":"3 至4 歲時有膝內翻","D":"4 歲兒童的前囟門已關閉"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"12母嬰照護理念母性適應與婦嬰統計政策","topic_num":"新生兒照護與新生兒疾病","topic_code":"C1","q_num":30,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"出生3 個月大仍有生理性斜視","B":"1.5 歲已長齊20 顆乳牙","C":"3 至4 歲時有膝內翻","D":"4 歲兒童的前囟門已關閉"},"img":""}],E={"101110-N4-23":{"quick":"胎兒出生後心血管改變敘述中「肺臟血管阻力『增加』」為錯誤——肺循環建立後肺血管阻力『下降』。","detail":{"background":"出生後循環轉換:第一次呼吸使肺擴張→「肺血管阻力『下降』、肺血流增加」;臍帶結紮使「全身(體)血管阻力『上升』、回左心房血流與壓力增加」;左心房壓>右心房→「卵圓孔功能性關閉」;血氧上升→「動脈導管收縮關閉(臍靜脈→肝圓韌帶、靜脈導管→靜脈韌帶、動脈導管→動脈韌帶)」。本題「錯誤」者為「肺臟血管阻力增加」(A,應為下降)。","options":{"A":"錯誤(本題答案)。肺血管阻力出生後『下降』,非增加。","B":"正確。全身(體)血管阻力增高。","C":"正確。臍靜脈閉合形成肝圓韌帶。","D":"正確。卵圓孔出生後功能性閉合。"},"sources":["Nelson《兒科學》新生兒循環","出生轉換"]}},"102110-N4-25":{"quick":"胎兒出生後心血管變化正確的是「切斷臍帶後靜脈導管於出生1週內功能性閉合」。","detail":{"background":"出生後循環:(1)肺擴張→『肺血管阻力下降、肺血流增』→『左心房壓上升』→卵圓孔關閉(故「右心房肺動脈壓上升迫使卵圓孔關閉」方向錯);(2)『全身(主動脈)血壓上升』(臍帶結紮、體循環阻力增),非下降;(3)「切斷臍帶→經臍靜脈進肝/下腔靜脈的血流減少→『靜脈導管約出生1週內功能性閉合』」——正確;(4)『動脈導管血氧『上升』使其收縮關閉』(約出生15小時–數天功能性關閉,故「血氧下降使關閉」錯)。本題正確為C。","options":{"A":"錯。卵圓孔關閉因左心房壓上升,非右心房壓迫。","B":"錯。主動脈血壓上升,非下降。","C":"正確。靜脈導管約出生1週內功能性閉合。","D":"錯。動脈導管因血氧『上升』而關閉。"},"sources":["Nelson《兒科學》出生循環","靜脈導管"]}},"103030-N4-28":{"quick":"影響新生兒第一次呼吸的因素「不」包括「肺微血管彈性」。","detail":{"background":"新生兒第一次呼吸的啟動與影響因素:化學刺激(產道擠壓後血中CO2上升、O2下降、pH下降刺激呼吸中樞)、物理刺激(溫度變化、觸覺)、『肺黏液(肺液)的清除與稠度』、『肺容量與肺彈性』、『肺泡『表面張力素(surfactant)』的製造能力(維持肺泡張開、防塌陷)』。「『肺『微血管』彈性』不是影響第一次呼吸的因素」。本題不包括者為「肺微血管彈性」(A)。","options":{"A":"本題答案(非因素)。肺微血管彈性非影響第一次呼吸的因素。","B":"是因素。肺黏液稠度影響肺液清除與呼吸。","C":"是因素。肺容量彈性。","D":"是因素。表面張力素製造能力(防肺泡塌陷)。"},"sources":["Nelson《兒科學》第一次呼吸","surfactant"]}},"104030-N4-25":{"quick":"新生兒出生後循環系統變化正確的是「主動脈血壓增加」。","detail":{"background":"出生後循環:(1)「臍帶結紮、體循環阻力增→『主動脈(全身)血壓增加』」——正確;(2)肺擴張→『肺血管阻力『下降』』(非增加);(3)出生後血氧上升使動脈導管收縮,血流方向應為主動脈→肺動脈逐漸減少並關閉(非「肺動脈流到主動脈」的胎兒型右至左分流);(4)『左心房壓>右心房壓』使卵圓孔關閉(右心房壓『下降』,非增加)。本題正確為「主動脈血壓增加」(A)。","options":{"A":"正確。主動脈(全身)血壓增加。","B":"錯。肺部血管阻力下降,非增加。","C":"錯。非胎兒型肺動脈→主動脈右至左分流。","D":"錯。右心房壓下降(左心房壓增使卵圓孔關閉)。"},"sources":["Nelson《兒科學》出生循環","主動脈壓"]}},"105090-N4-48":{"quick":"出生過渡期動脈導管發展變化中「肺動脈壓上升導致動脈導管收縮關閉」為錯誤。","detail":{"background":"動脈導管(ductus arteriosus)出生後關閉:「因第一次呼吸使『血氧分壓(PaO2)『上升』』→動脈導管平滑肌收縮關閉(『肺動脈壓『下降』』,非上升)」;『出生後約2–4天『功能性』關閉』、『約1–3個月『解剖性』關閉』、之後萎縮成『動脈韌帶』。故「肺動脈壓『上升』導致動脈導管收縮關閉」錯誤(是血氧上升、肺動脈壓下降)。本題「不是動脈導管發展變化(錯誤敘述)」者為A。","options":{"A":"錯誤(本題答案)。動脈導管因血氧上升而收縮,非肺動脈壓上升。","B":"正確。出生後約2~4天功能性關閉。","C":"正確。出生後約1~3個月解剖性關閉。","D":"正確。出生3個月後萎縮成動脈韌帶。"},"sources":["Nelson《兒科學》動脈導管","出生轉換"]}},"106111-N4-30":{"quick":"正常新生兒生理調適正確的是「出生後3~5個月鐵質足夠,不需要補充鐵質」。","detail":{"background":"新生兒生理調適:(1)「足月兒自母體儲存的鐵約可維持『出生後4–6個月(約3–5個月內鐵質足夠)』,之後才需補鐵」——正確;(2)出生時腸道『無菌』、維生素K合成需腸道菌叢,故『維生素K濃度低→需肌注維生素K1防出血』(故「非無菌」敘述錯);(3)『糖尿病孕婦的新生兒易『低血糖』』(非高血糖,胎兒高胰島素血症);(4)『IgA『不能』通過胎盤』(過胎盤的是IgG)。本題正確為「3~5個月鐵質足夠不需補鐵」(B)。","options":{"A":"錯。出生時腸道無菌、維生素K濃度低(需補充)。","B":"正確。出生後約3~5個月鐵質足夠,不需補鐵。","C":"錯。糖尿病孕婦新生兒易低血糖,非高血糖。","D":"錯。IgA不能通過胎盤(IgG才能)。"},"sources":["Nelson《兒科學》新生兒生理","鐵儲存"]}},"107110-N4-28":{"quick":"新生兒出生2~6小時過渡期常出現的生理現象中「黃疸出現」為異常。","detail":{"background":"新生兒過渡期(transition):出生後第一反應期(約出生–30分,活躍、心跳呼吸快)、相對不反應期(睡眠)、第二反應期(2–6小時,再度活躍)。此期常見:『心跳與呼吸速率變化大、腸蠕動增加、解胎便、口腔分泌物增多』。「『黃疸』通常在『出生後2–3天』才出現,『出生2–6小時內出現黃疸=『病理性黃疸』(異常,須評估溶血)』」。本題過渡期出現屬異常者為「黃疸出現」(D)。","options":{"A":"正常。過渡期心跳及呼吸速率變化大。","B":"正常。過渡期腸蠕動增加。","C":"正常。過渡期解胎便。","D":"異常(本題答案)。2–6小時內出現黃疸=病理性黃疸。"},"sources":["Nelson《兒科學》過渡期","病理性黃疸"]}},"108020-N4-10":{"quick":"胎血循環正確的是「臍動脈內含缺氧血」。","detail":{"background":"胎兒循環:臍帶含「『二條臍『動脈』(運『缺氧血(去氧血)』由胎兒→胎盤)＋一條臍『靜脈』(運『充氧血』由胎盤→胎兒)」(故「二條靜脈一條動脈」錯);臍靜脈血經靜脈導管進下腔靜脈→『右心房』(此處『仍為充氧血』,但題目選項B說「進右心房之『前』為充氧血」混入體靜脈後氧降,故B不選為正解);『卵圓孔是『左右『心房』』間的開口』(非心室)。本題正確為「臍動脈內含缺氧血」(C)。","options":{"A":"錯。臍帶含二條動脈、一條靜脈。","B":"臍靜脈血進右心房前混入體靜脈血,氧合下降,敘述不精確。","C":"正確。臍動脈內含缺氧血(胎兒→胎盤)。","D":"錯。卵圓孔是左右『心房』間的開口,非心室。"},"sources":["Nelson《兒科學》胎兒循環","臍動靜脈"]}},"108020-N4-30":{"quick":"出生第2天無臉部表情眼睛活動、呼吸規律、偶有驚嚇與吸吮動作,屬「安靜睡眠期(深睡期)」。","detail":{"background":"新生兒睡眠-活動狀態:『安靜(深)睡眠期』——『無臉部表情與眼睛活動、呼吸『規律』、僅偶有驚嚇反射或吸吮動作、不易喚醒』;『活動(淺/REM)睡眠期』——眼球轉動、表情多、呼吸不規律;『安靜清醒期』——眼睛張大明亮、注意環境;『活動清醒期』——活動多、易煩躁。本例「無表情、呼吸規律、偶有驚嚇/吸吮」即『安靜睡眠期』(A)。","options":{"A":"正確。無表情、呼吸規律、偶有驚嚇/吸吮=安靜睡眠期。","B":"半睡半醒(淺睡)眼球轉動、呼吸不規律。","C":"安靜清醒期眼睛張大注意環境。","D":"活動清醒期活動多。"},"sources":["Nelson《兒科學》新生兒睡眠狀態","深睡期"]}},"108110-N4-60":{"quick":"新生兒各系統生理特徵正確的是「女嬰出生後陰道出現紅色分泌物,是受母親雌激素中斷所影響」。","detail":{"background":"新生兒生理:(1)『IgG『能』通過胎盤』(被動免疫),故A錯;(2)「『女嬰出生後陰道出現少量『紅色(假月經)』分泌物』,是因『母親『雌激素』於出生後『中斷(撤離)』』,屬正常暫時現象」——正確;(3)『肺血流增→左心房回流增→『卵圓孔』關閉(非『靜脈導管』)』,故C錯;(4)『新生兒(生理性)黃疸主因是『肝臟葡萄糖醛酸轉移酶(UGT)不成熟、紅血球壽命短、腸肝循環增』使『未結合型』膽紅素上升』,與「甲硫胺酸」無關,故D錯。本題正確為B。","options":{"A":"錯。IgG能通過胎盤。","B":"正確。女嬰假月經是母親雌激素中斷所致。","C":"錯。肺靜脈回流增使『卵圓孔』關閉,非靜脈導管。","D":"錯。生理性黃疸主因UGT不成熟等,與甲硫胺酸無關。"},"sources":["Nelson《兒科學》新生兒生理","假月經"]}},"110030-N4-66":{"quick":"胎兒出生後心血管變化敘述中「臍動脈閉合形成肝圓韌帶」為錯誤。","detail":{"background":"出生後血管殘餘構造:『臍『靜脈』閉合→『肝圓韌帶(round ligament of liver)』』;『靜脈導管→靜脈韌帶』;『動脈導管→動脈韌帶』;『臍『動脈』閉合→『臍側韌帶(膀胱旁)』』。故「臍『動脈』閉合形成『肝圓韌帶』」錯誤(肝圓韌帶是臍『靜脈』所成)。其餘:左心房壓>右心房使卵圓孔瓣膜關閉、左心壓增、動脈導管1–3月閉鎖成動脈韌帶皆正確。本題「錯誤」者為B。","options":{"A":"正確。左心房壓大於右心房使卵圓孔瓣膜關閉。","B":"錯誤(本題答案)。肝圓韌帶由臍『靜脈』形成,非臍動脈。","C":"正確。左心房與左心室壓力增加。","D":"正確。動脈導管出生1~3個月閉塞成動脈韌帶。"},"sources":["Nelson《兒科學》出生循環","血管殘餘構造"]}},"111110-N4-30":{"quick":"「呼吸不規律」不是新生兒「安靜清醒期(quiet alert state)」的行為表徵。","detail":{"background":"新生兒睡眠-活動週期之『安靜清醒期(quiet alert)』:『眼睛張大、明亮、有精神、注意周圍環境、對照顧者有反應、活動少、『呼吸規律』』——是與嬰兒互動(餵食、教學)的最佳時機。「『呼吸不規律』屬『活動(淺)睡眠期/活動清醒期』,『不是安靜清醒期』的表徵」。本題不是安靜清醒期表徵者為「呼吸不規律」(D)。","options":{"A":"是。安靜清醒期注意周圍環境。","B":"是。眼睛張大明亮有精神。","C":"是。對照顧者有反應。","D":"本題答案(非安靜清醒期)。呼吸不規律屬活動/淺睡期。"},"sources":["Nelson《兒科學》新生兒清醒狀態","安靜清醒期"]}},"112180-N4-17":{"quick":"促使新生兒出生後動脈導管功能性關閉的最主要原因是「肺擴張後血氧分壓上升」。","detail":{"background":"動脈導管關閉機轉:出生後第一次呼吸使「肺擴張、肺血管阻力下降、『血氧分壓(PaO2)『上升』』」——『高血氧直接使動脈導管平滑肌『收縮』』(同時前列腺素下降),為功能性關閉(約出生15小時–數天)的『最主要』原因。本題最主要原因為「肺擴張後血氧分壓上升」(B);左心房壓變化主要影響卵圓孔、臍帶/肝臟血流主要影響靜脈導管。","options":{"A":"左心房壓變化主要影響卵圓孔,非動脈導管。","B":"正確。肺擴張後血氧分壓上升使動脈導管收縮關閉。","C":"臍帶/肝臟血流主要影響靜脈導管。","D":"下腔靜脈血流影響靜脈導管,非動脈導管。"},"sources":["Nelson《兒科學》動脈導管","血氧"]}},"101110-N4-68":{"quick":"阿帕嘉計分敘述中「依5個指標含體溫、心跳、呼吸、膚色及『體重』」為錯誤。","detail":{"background":"阿帕嘉計分(Apgar score)五項各0–2分(總分0–10),以『心跳(Heart rate)、呼吸(Respiration)、肌肉張力(muscle Tone)、反射激惹性(reflex irritability/grimace)、膚色(Appearance/color)』評估,於出生『第1、5分鐘』(必要時第10分鐘)評估;『不含體溫、體重、血氧』。判讀:7–10分正常、4–6中度窘迫、0–3嚴重窘迫需急救。 本題「『5個指標含『體溫』與『體重』』錯誤」——Apgar五項為心跳、呼吸、肌肉張力、反射、膚色,『不含體溫與體重』。其餘:第1分鐘可顯示是否需CPR、各項0/1/2分、第5分鐘≥7分存活率較高皆正確。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。Apgar不含體溫與體重(五項為心跳/呼吸/肌張力/反射/膚色)。","B":"正確。第1分鐘可顯示是否需CPR。","C":"正確。各項紀錄為0、1或2分。","D":"正確。第5分鐘≥7分存活率較高。"},"sources":["Nelson《兒科學》Apgar","即刻評估"]}},"102030-N4-27":{"quick":"黃小弟(心跳100、呼吸慢不規則、四肢彎曲有自發運動、抽吸有咳嗽反應、軀幹粉紅四肢藍)Apgar為8分。","detail":{"background":"阿帕嘉計分(Apgar score)五項各0–2分(總分0–10),以『心跳(Heart rate)、呼吸(Respiration)、肌肉張力(muscle Tone)、反射激惹性(reflex irritability/grimace)、膚色(Appearance/color)』評估,於出生『第1、5分鐘』(必要時第10分鐘)評估;『不含體溫、體重、血氧』。判讀:7–10分正常、4–6中度窘迫、0–3嚴重窘迫需急救。 本例計分:心跳100次/分(<100為1、≥100為2→『2』)、呼吸慢不規則(『1』)、肌張力四肢彎曲有自發運動(『2』)、反射抽吸有咳嗽反應(『2』)、膚色軀幹粉紅四肢藍(中央粉紅末梢發紺=『1』)。合計 2+1+2+2+1=『8分』。本題為8分(B)。","options":{"A":"7分計算偏低。","B":"正確。2+1+2+2+1=8分。","C":"9分計算偏高(呼吸與膚色各扣1)。","D":"10分為滿分,本例呼吸與膚色未滿分。"},"sources":["Nelson《兒科學》Apgar計分","即刻評估"]}},"104100-N4-26":{"quick":"新生兒立即護理正確的是「施打維生素K1,目的是預防新生兒出血」。","detail":{"background":"新生兒立即護理:(1)『Apgar於第1、5分鐘各評估『至少兩次』』(≥7分也需評第5分鐘),故A錯;(2)『預防淋菌性眼炎點『紅黴素(erythromycin)』眼藥膏』(非四環黴素;且預防淋病非梅毒),故C錯;(3)『含碘消毒『不影響』苯酮尿症(PKU)篩檢』(PKU測苯丙胺酸;『含碘消毒會影響『甲狀腺功能』篩檢』),故B錯;(4)「『肌注維生素K1』預防『新生兒出血性疾病(維生素K缺乏)』」——正確。本題正確為「施打維生素K1預防新生兒出血」(D)。","options":{"A":"錯。Apgar第1、5分鐘各評估,非僅一次。","B":"錯。含碘消毒影響的是甲狀腺篩檢,非PKU。","C":"錯。預防淋菌眼炎點紅黴素眼膏(非四環黴素、非預防梅毒)。","D":"正確。肌注維生素K1預防新生兒出血。"},"sources":["Nelson《兒科學》新生兒立即護理","維生素K"]}},"106030-N4-27":{"quick":"Apgar評分除心跳、呼吸、膚色、刺激反射外,尚須評估「肌肉張力是否有力」。","detail":{"background":"阿帕嘉計分(Apgar score)五項各0–2分(總分0–10),以『心跳(Heart rate)、呼吸(Respiration)、肌肉張力(muscle Tone)、反射激惹性(reflex irritability/grimace)、膚色(Appearance/color)』評估,於出生『第1、5分鐘』(必要時第10分鐘)評估;『不含體溫、體重、血氧』。判讀:7–10分正常、4–6中度窘迫、0–3嚴重窘迫需急救。 Apgar五項:心跳、呼吸、膚色、『反射激惹性(刺激反射)』、『肌肉張力』。題目已列心跳/呼吸/膚色/刺激反射四項,尚須評估的第五項為「『肌肉張力』」(C);不含外觀完整、大小便、身高體重。本題為「肌肉張力是否有力」(C)。","options":{"A":"外觀完整非Apgar項目。","B":"大小便非Apgar項目。","C":"正確。尚須評估肌肉張力。","D":"身高體重非Apgar項目。"},"sources":["Nelson《兒科學》Apgar","肌肉張力"]}},"107030-N4-46":{"quick":"林小弟(哭聲宏亮、心跳170、軀幹粉紅手腳微紫、四肢屈曲彈性好、抽吸臉部扭曲)Apgar為9分。","detail":{"background":"阿帕嘉計分(Apgar score)五項各0–2分(總分0–10),以『心跳(Heart rate)、呼吸(Respiration)、肌肉張力(muscle Tone)、反射激惹性(reflex irritability/grimace)、膚色(Appearance/color)』評估,於出生『第1、5分鐘』(必要時第10分鐘)評估;『不含體溫、體重、血氧』。判讀:7–10分正常、4–6中度窘迫、0–3嚴重窘迫需急救。 本例計分:心跳170≥100(『2』)、呼吸哭聲宏亮(『2』)、肌張力四肢屈曲彈性好(『2』)、反射抽吸臉部扭曲(『2』)、膚色軀幹粉紅手腳微發紫(末梢發紺=『1』)。合計 2+2+2+2+1=『9分』。本題為9分(B)。","options":{"A":"10分為滿分,本例膚色扣1。","B":"正確。2+2+2+2+1=9分。","C":"8分計算偏低。","D":"7分計算偏低。"},"sources":["Nelson《兒科學》Apgar計分","末梢發紺"]}},"108110-N4-56":{"quick":"「排泄情況」不是阿帕嘉評分(Apgar score)的計分項目。","detail":{"background":"阿帕嘉計分(Apgar score)五項各0–2分(總分0–10),以『心跳(Heart rate)、呼吸(Respiration)、肌肉張力(muscle Tone)、反射激惹性(reflex irritability/grimace)、膚色(Appearance/color)』評估,於出生『第1、5分鐘』(必要時第10分鐘)評估;『不含體溫、體重、血氧』。判讀:7–10分正常、4–6中度窘迫、0–3嚴重窘迫需急救。 Apgar五項為心跳速率、呼吸、肌肉張力、反射激惹性、膚色。「『排泄情況(大小便)』不是Apgar計分項目」。本題不是計分項目者為「排泄情況」(D)。","options":{"A":"是項目。心跳速率。","B":"是項目。膚色。","C":"是項目。肌肉張力。","D":"本題答案(非項目)。排泄情況不是Apgar計分項目。"},"sources":["Nelson《兒科學》Apgar","計分項目"]}},"109030-N4-26":{"quick":"Apgar score計分項目不包含「血氧濃度」。","detail":{"background":"阿帕嘉計分(Apgar score)五項各0–2分(總分0–10),以『心跳(Heart rate)、呼吸(Respiration)、肌肉張力(muscle Tone)、反射激惹性(reflex irritability/grimace)、膚色(Appearance/color)』評估,於出生『第1、5分鐘』(必要時第10分鐘)評估;『不含體溫、體重、血氧』。判讀:7–10分正常、4–6中度窘迫、0–3嚴重窘迫需急救。 Apgar五項為心跳速率、肌肉張力、皮膚顏色、呼吸、反射激惹性,『不含『血氧濃度(SpO2)』』(血氧以脈搏血氧儀另外監測)。本題不包含者為「血氧濃度」(D)。","options":{"A":"是項目。心跳速率。","B":"是項目。肌肉張力。","C":"是項目。皮膚顏色。","D":"本題答案(非項目)。血氧濃度不是Apgar項目。"},"sources":["Nelson《兒科學》Apgar","計分項目"]}},"111030-N4-26":{"quick":"新生兒(哭聲宏亮、呼吸規則、心跳128、四肢略屈曲、身體粉紅四肢藍)Apgar為8分。","detail":{"background":"阿帕嘉計分(Apgar score)五項各0–2分(總分0–10),以『心跳(Heart rate)、呼吸(Respiration)、肌肉張力(muscle Tone)、反射激惹性(reflex irritability/grimace)、膚色(Appearance/color)』評估,於出生『第1、5分鐘』(必要時第10分鐘)評估;『不含體溫、體重、血氧』。判讀:7–10分正常、4–6中度窘迫、0–3嚴重窘迫需急救。 本例計分:心跳128≥100(『2』)、呼吸規則哭聲宏亮(『2』)、肌張力四肢略屈曲(輕度屈曲=『1』)、反射(未列,以一般情形)、膚色身體粉紅四肢藍(末梢發紺=『1』)。常見計分:心跳2+呼吸2+肌張力1+反射2+膚色1=『8分』。本題為8分(B)。","options":{"A":"7分計算偏低。","B":"正確。心跳2+呼吸2+肌張力1+反射2+膚色1=8分。","C":"9分計算偏高(肌張力與膚色各扣1)。","D":"10分為滿分,本例未滿分。"},"sources":["Nelson《兒科學》Apgar計分","末梢發紺"]}},"102030-N4-30":{"quick":"新生兒末梢冰冷、體溫36°C,最恰當處置是「直接讓母親與新生兒肌膚接觸以增加體溫」。","detail":{"background":"新生兒體熱喪失四機轉:『傳導(conduction)』——接觸冰冷物體(秤、聽診器、未預熱布單)→預熱物品;『對流(convection)』——周圍冷空氣流動→避風、調室溫;『輻射(radiation)』——與周遭冷物體(窗、牆)輻射散熱→嬰兒床遠離冷牆窗;『蒸發(evaporation)』——體表水分蒸發(羊水、沐浴後)→立即擦乾。新生兒體溫調節差(體表面積大、皮下脂肪少、以『棕色脂肪』非顫抖產熱),易低體溫。 本例輕度低體溫(36°C、末梢冰冷),最恰當且立即有效的是「『母嬰『肌膚接觸(skin-to-skin/袋鼠式)』』」——母體體溫直接傳導保暖、穩定體溫心跳、促哺乳依附,為首選的生理性保溫。包巾、保溫箱、輻射台為其次或重度低溫時用;告知「正常不處理」不當(需處理)。本題最恰當為「肌膚接觸」(A)。","options":{"A":"正確。母嬰肌膚接觸增加體溫(首選)。","B":"包巾為其次,肌膚接觸更直接有效。","C":"保溫箱/輻射台用於較嚴重或無法肌膚接觸時。","D":"錯。36°C末梢冰冷需處理,非不需處理。"},"sources":["Nelson《兒科學》體溫調節","肌膚接觸"]}},"103100-N4-31":{"quick":"新生兒戴棉紗帽的主要功用是「減少體溫的散失」。","detail":{"background":"新生兒體熱喪失四機轉:『傳導(conduction)』——接觸冰冷物體(秤、聽診器、未預熱布單)→預熱物品;『對流(convection)』——周圍冷空氣流動→避風、調室溫;『輻射(radiation)』——與周遭冷物體(窗、牆)輻射散熱→嬰兒床遠離冷牆窗;『蒸發(evaporation)』——體表水分蒸發(羊水、沐浴後)→立即擦乾。新生兒體溫調節差(體表面積大、皮下脂肪少、以『棕色脂肪』非顫抖產熱),易低體溫。 新生兒『頭部佔體表面積大、易散熱』,即刻護理後『戴棉紗帽』的主要功用是「『減少(頭部)體溫散失』、維持體溫」(尤其進行肌膚接觸時)。本題主要功用為「減少體溫的散失」(C);非為美觀、防胎脂染污或避免皮膚損傷。","options":{"A":"非主要為避免頭部皮膚損傷。","B":"非為美觀。","C":"正確。減少頭部體溫散失、維持體溫。","D":"非主要為避免胎脂染污。"},"sources":["Nelson《兒科學》體溫調節","戴帽保溫"]}},"104100-N4-25":{"quick":"出生後抱至加溫台並以乾毛巾擦乾身體,是預防「蒸發及傳導」的體溫喪失。","detail":{"background":"新生兒體熱喪失四機轉:『傳導(conduction)』——接觸冰冷物體(秤、聽診器、未預熱布單)→預熱物品;『對流(convection)』——周圍冷空氣流動→避風、調室溫;『輻射(radiation)』——與周遭冷物體(窗、牆)輻射散熱→嬰兒床遠離冷牆窗;『蒸發(evaporation)』——體表水分蒸發(羊水、沐浴後)→立即擦乾。新生兒體溫調節差(體表面積大、皮下脂肪少、以『棕色脂肪』非顫抖產熱),易低體溫。 「『以乾毛巾『擦乾』體表羊水』→預防『蒸發(evaporation)』」;「將新生兒『抱至『加溫(預熱)』處理台』、用『預熱毛巾』接觸→預防『傳導(conduction)』」(避免接觸冰冷表面散熱)。本題運用的機轉為「蒸發及傳導」(A)。","options":{"A":"正確。擦乾=防蒸發、預熱台/毛巾=防傳導。","B":"未涉及對流。","C":"擦乾屬蒸發非傳導+輻射。","D":"未涉及對流與輻射為主。"},"sources":["Nelson《兒科學》體溫喪失","蒸發傳導"]}},"105030-N4-29":{"quick":"預防新生兒體熱散失方法中「勿在體溫穩定前洗澡為預防『對流』作用」為錯誤——應為預防『蒸發』。","detail":{"background":"新生兒體熱喪失四機轉:『傳導(conduction)』——接觸冰冷物體(秤、聽診器、未預熱布單)→預熱物品;『對流(convection)』——周圍冷空氣流動→避風、調室溫;『輻射(radiation)』——與周遭冷物體(窗、牆)輻射散熱→嬰兒床遠離冷牆窗;『蒸發(evaporation)』——體表水分蒸發(羊水、沐浴後)→立即擦乾。新生兒體溫調節差(體表面積大、皮下脂肪少、以『棕色脂肪』非顫抖產熱),易低體溫。 各措施對應機轉:『溫熱毛毯包裹→預防『傳導』』(正確);『嬰兒床遠離牆壁→預防『輻射』』(正確);『立即擦乾羊水→預防『蒸發』』(正確);「『體溫穩定前勿洗澡』——是預防『『蒸發』(沐浴水分蒸發散熱)』,非『對流』」,故B敘述機轉錯誤。本題「錯誤」者為B。","options":{"A":"正確。溫熱毛毯包裹為預防傳導。","B":"錯誤(本題答案)。體溫穩定前勿洗澡是預防『蒸發』,非對流。","C":"正確。嬰兒床遠離牆壁預防輻射。","D":"正確。立即擦乾羊水預防蒸發。"},"sources":["Nelson《兒科學》體溫喪失","蒸發"]}},"112030-N4-30":{"quick":"維持新生兒出生即刻體溫穩定的措施中「新生兒出生後應立即沐浴維持體溫」為不適當。","detail":{"background":"新生兒體熱喪失四機轉:『傳導(conduction)』——接觸冰冷物體(秤、聽診器、未預熱布單)→預熱物品;『對流(convection)』——周圍冷空氣流動→避風、調室溫;『輻射(radiation)』——與周遭冷物體(窗、牆)輻射散熱→嬰兒床遠離冷牆窗;『蒸發(evaporation)』——體表水分蒸發(羊水、沐浴後)→立即擦乾。新生兒體溫調節差(體表面積大、皮下脂肪少、以『棕色脂肪』非顫抖產熱),易低體溫。 出生即刻保溫:預熱接觸的布單(防傳導)、擦乾後母嬰肌膚接觸(保暖+依附)、空調/加溫設備維持室溫。「『出生後『立即沐浴』』不適當」——沐浴使體表水分『蒸發散熱』、易致低體溫,應『待體溫穩定(約出生數小時、體溫≥36.5°C)後再沐浴』。本題「不適當」者為「出生後立即沐浴」(D)。","options":{"A":"適當。接觸的布單事先預熱(防傳導)。","B":"適當。擦乾後母嬰肌膚接觸保暖。","C":"適當。空調/加溫設備維持室溫。","D":"不適當(本題答案)。出生後立即沐浴會蒸發散熱致低體溫。"},"sources":["Nelson《兒科學》體溫穩定","延後沐浴"]}},"114030-N4-18":{"quick":"置於有磅秤紙的體重計量體重、沐浴後乾毛巾擦乾,運用的是預防「傳導及蒸發」的機制。","detail":{"background":"新生兒體熱喪失四機轉:『傳導(conduction)』——接觸冰冷物體(秤、聽診器、未預熱布單)→預熱物品;『對流(convection)』——周圍冷空氣流動→避風、調室溫;『輻射(radiation)』——與周遭冷物體(窗、牆)輻射散熱→嬰兒床遠離冷牆窗;『蒸發(evaporation)』——體表水分蒸發(羊水、沐浴後)→立即擦乾。新生兒體溫調節差(體表面積大、皮下脂肪少、以『棕色脂肪』非顫抖產熱),易低體溫。 「『置於『有磅秤紙(預熱/隔墊)』的體重計』——避免接觸冰冷秤面散熱→預防『傳導』」;「『沐浴後乾毛巾迅速『擦乾』』——去除體表水分→預防『蒸發』」。本題運用的機制為「傳導及蒸發」(B)。","options":{"A":"磅秤紙隔墊屬傳導,非對流。","B":"正確。磅秤紙=防傳導、擦乾=防蒸發。","C":"擦乾屬蒸發,非輻射。","D":"未涉及對流與輻射為主。"},"sources":["Nelson《兒科學》體溫喪失","傳導蒸發"]}},"101030-N4-10":{"quick":"純母乳、出生第3天黃疸、無病理因素,最合宜指導是「這是正常現象,不必擔心」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 本例『出生第3天、純母乳、經醫師排除病理因素』→屬『生理性黃疸(或早發型母乳哺餵性黃疸)』,屬正常、可自行消退。最合宜是「『這是正常現象,不必擔心』,並『增加哺餵次數』促膽紅素排出」;不需減少/停止哺乳(母乳哺餵性黃疸應『增加』哺餵)、不需等黃疸消退才哺餵。本題最合宜為A。","options":{"A":"正確。出生第3天無病理因素的黃疸為正常現象。","B":"錯。不需減少哺餵(應增加哺餵促排出)。","C":"單純母乳性黃疸雖可較久,但此非最合宜的安撫指導(且不需強調持續2個月)。","D":"錯。不需等黃疸消退才哺餵。"},"sources":["Nelson《兒科學》生理性黃疸","母乳哺餵"]}},"101030-N4-54":{"quick":"膽紅素20mg/dL須換血,護理措施中「換血後1小時內給白蛋白可提高換血成效」為不適當。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 換血(exchange transfusion)護理:用『新鮮血(或<72小時血,防鉀高)、加溫至35–37°C』、每次換血約1–2小時、『每換100mL注射1mL 10%葡萄糖酸鈣防『低血鈣』(因血品抗凝劑檸檬酸鹽會結合鈣)』。「『換血『後』給白蛋白提高成效』不適當——白蛋白應於『換血『前』』給予(使組織游離膽紅素移入血管以利換出),『換血後給無提高成效之意義』」。本題「不適當」者為D。","options":{"A":"適當。用新鮮血、加溫至35~37°C。","B":"適當。換血時間維持1~2小時。","C":"適當。每換100mL注射1mL 10%葡萄糖鈣防低血鈣。","D":"不適當(本題答案)。白蛋白應換血『前』給,換血後給無助成效。"},"sources":["Nelson《兒科學》換血","低血鈣"]}},"101110-N4-10":{"quick":"足月、第4天膽紅素17、照光治療,護理措施正確的是「體溫會微上升,需增加25%水分」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 照光療法護理:(1)照光可『間歇進行(餵奶、採血時可暫停),不需全天不中斷』,故A錯;(2)『母乳哺餵性黃疸『不需停餵母乳』(應增加哺餵)』,故B錯;(3)「照光使『體溫易升高、不顯性水分喪失增加』→『需增加約25%水分攝取』、監測體溫脫水」——正確;(4)『不需給鎮靜劑Luminal』。本題正確為「體溫微上升需增加25%水分」(C)。","options":{"A":"錯。照光可間歇進行(餵奶採血暫停),非全天不中斷。","B":"錯。不需停母乳(母乳性黃疸應增加哺餵)。","C":"正確。照光使體溫升、水分喪失增,需增加約25%水分。","D":"錯。不需給Luminal鎮靜。"},"sources":["Nelson《兒科學》照光療法","水分補充"]}},"103100-N4-29":{"quick":"生理性黃疸敘述正確的是「出生3~4天達高峰,足月兒一週內總膽紅素上升速率<5mg/dL」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 生理性黃疸:(1)「『出生2–3天出現、3–4天達高峰』,足月兒『總膽紅素上升速率<5mg/dL/天』」——正確;(2)足月兒『約7–10天內消退』(非21天才下降);(3)『早產兒發生率『高於』足月兒』(故「足月兒機率比早產兒高」錯);(4)生理性黃疸是『肝UGT酶『不成熟』、紅血球壽命短、腸肝循環增』所致(非「代謝太快無法保留」)。本題正確為A。","options":{"A":"正確。出生3~4天達高峰,上升速率<5mg/dL/天。","B":"錯。足月兒約7~10天內消退,非21天才下降。","C":"錯。早產兒發生率高於足月兒。","D":"錯。因肝酶不成熟,非代謝太快。"},"sources":["Nelson《兒科學》生理性黃疸","膽紅素"]}},"105030-N4-55":{"quick":"新生兒黃疸照光療法副作用中「便秘」為錯誤——照光常致『腹瀉(稀便)』。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 照光療法副作用:『體溫不穩定(升高)、不顯性水分喪失增加(脫水)、皮膚廣泛紅疹、『腹瀉(綠色稀便,因膽紅素排出增加)』、化膿性結膜炎(眼罩刺激/感染)、青銅症(結合型膽紅素高時)』。「『便秘』非照光副作用——照光反而常致『腹瀉』」。本題「錯誤(非副作用)」者為「便秘」(D)。","options":{"A":"是副作用。眼罩相關可致化膿性結膜炎。","B":"是副作用。皮膚廣泛紅疹。","C":"是副作用。體溫不穩定。","D":"錯誤(本題答案)。照光致腹瀉而非便秘。"},"sources":["Nelson《兒科學》照光副作用","腹瀉"]}},"105090-N4-50":{"quick":"血型不合溶血性黃疸(ABO)的原因是「母親O型、胎兒A或B型」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 ABO血型不合溶血:『母親『O型』(血中有抗A、抗B抗體),胎兒為『A型或B型』』→母體IgG抗體過胎盤破壞胎兒紅血球→溶血性黃疸(可發生於第一胎)。Rh不合:『母Rh陰性、胎兒Rh陽性』(多第二胎後較嚴重)。本例血型不合溶血,原因為「母O型、胎兒A或B型」(B)。","options":{"A":"母A型胎兒O型不致溶血(O型紅血球無A/B抗原)。","B":"正確。母O型、胎兒A或B型(ABO不合)。","C":"母AB型無抗A抗B抗體,不致ABO溶血。","D":"Rh不合是母Rh陰性、胎兒Rh陽性(非陽配陰)。"},"sources":["Nelson《兒科學》ABO溶血","血型不合"]}},"106030-N4-30":{"quick":"純母乳、食慾佳、第3天膽紅素12,解釋正確的是「一般的生理性黃疸,持續注意食慾及膚色即可」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 本例『出生第3天、純母乳食慾佳、膽紅素12mg/dL(<15)』→符合『生理性黃疸』(出生2–3天後出現、足月兒可達12–15)。最正確解釋是「『一般生理性黃疸』,持續注意食慾與膚色變化、增加哺餵即可」;非病理性黃疸(無24小時內出現/上升過快/溶血證據)、非核黃疸前驅(膽紅素未達危險值)、不需停母乳。本題正確為D。","options":{"A":"無溶血證據,非病理性黃疸需立即治療。","B":"膽紅素12未達核黃疸危險值,非核黃疸前驅。","C":"母乳性黃疸不需停母乳(增加哺餵即可),且此較像生理性。","D":"正確。一般生理性黃疸,注意食慾與膚色即可。"},"sources":["Nelson《兒科學》生理性黃疸","膽紅素12"]}},"106030-N4-51":{"quick":"足月、第3天膽紅素16、照光治療,最重要的護理目標是「提供眼罩及確保足夠水分攝取」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 照光治療護理目標(最重要):「『保護眼睛(不透光眼罩,防視網膜損傷)、生殖器遮蓋』、『確保足夠『水分』攝取(照光增不顯性水分喪失與腹瀉,防脫水)』、監測體溫、定時翻身使皮膚均勻受光、追蹤膽紅素」。本題最重要護理目標為「提供眼罩及確保足夠水分攝取」(B);非居家照光指導、非每小時採血(過頻)、非「無副作用」(照光有副作用)。","options":{"A":"居家照光指導非住院照光的最重要目標。","B":"正確。提供眼罩保護+確保足夠水分攝取。","C":"每小時採血過頻,非最重要目標。","D":"錯。照光有副作用,不應說「不會造成任何副作用」。"},"sources":["Nelson《兒科學》照光護理","眼罩水分"]}},"106110-N4-30":{"quick":"新生兒黃疸敘述正確的是「足月兒生理性黃疸發生率低於早產兒發生率」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 新生兒黃疸:(1)『生理性黃疸『出生2–3天後』出現(非24小時內;24小時內出現=病理性)』,故A錯;(2)『多數新生兒黃疸是『生理性』(非母乳性),且母乳性黃疸『不需停母乳』』,故B錯;(3)「『足月兒生理性黃疸發生率『低於』早產兒』(早產兒肝更不成熟)」——正確;(4)『Rh/ABO血型不合溶血是『病理性』黃疸主因(非生理性)』,故D錯。本題正確為C。","options":{"A":"錯。生理性黃疸出生2~3天後出現,非24小時內。","B":"錯。多數為生理性,母乳性黃疸不需停母乳。","C":"正確。足月兒生理性黃疸發生率低於早產兒。","D":"錯。血型不合溶血是『病理性』黃疸主因。"},"sources":["Nelson《兒科學》新生兒黃疸","早產足月比較"]}},"106110-N4-52":{"quick":"足月、第2天、膽紅素12,護理評估判斷為「生理性黃疸,為新生兒常見問題」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 本例『足月兒、出生第2天、總膽紅素12mg/dL』→屬『生理性黃疸』(出生2–3天出現、足月兒可達12–15、為新生兒常見問題),增加哺餵即可。膽紅素12未達需換血(>20–25)或核黃疸危險值,亦無溶血證據,故非嚴重病理性、非核黃疸、不需停母乳。本題判斷為「生理性黃疸,新生兒常見問題」(D)。","options":{"A":"膽紅素12遠未達換血標準,非嚴重病理性。","B":"未達核黃疸危險值,非不可逆核黃疸。","C":"此為生理性黃疸,非母奶性黃疸(且母奶性也不需停餵)。","D":"正確。生理性黃疸,為新生兒常見問題。"},"sources":["Nelson《兒科學》生理性黃疸","膽紅素判讀"]}},"107110-N4-29":{"quick":"新生兒黃疸正確敘述為:由頭往下、由中心向外發展(2)＋輕壓鼻尖觀察(4)＋照光保護眼睛與生殖器(5),即245。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 評析:(1)『黃疸最先出現於『臉/頭(由上往下)』,「最先出現於『額頭』」雖屬頭部但描述不夠精準,本題不取(1));(2)「黃疸由頭往下、由中心向外發展至四肢」——正確;(3)『出生第3天膽紅素>14mg/dL『需評估/處理』(非不需處理)』,故(3)錯;(4)「可『輕壓鼻尖(或前額、胸骨)』使局部皮膚變白觀察黃疸程度」——正確;(5)「照光應『保護眼睛與生殖器』」——正確。本題正確組合為(2)(4)(5)即245(D)。","options":{"A":"含(1)描述不精準、缺(4),且(3)錯。","B":"含(3)「不需處理」錯誤。","C":"含(1),缺(2)。","D":"正確。由頭往下中心向外(2)+輕壓鼻尖(4)+照光護眼與生殖器(5)。"},"sources":["Nelson《兒科學》黃疸評估","照光保護"]}},"108020-N4-27":{"quick":"新生兒黃疸敘述中「母乳引起的黃疸通常於出生後『1個月』發生」為錯誤。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 母乳相關黃疸有兩型:『早發型(母乳哺餵性黃疸,breastfeeding jaundice)』——出生『第1週內(約2–4天)』,因哺餵不足、攝取少、排便少使腸肝循環增→處置『增加哺餵次數』;『晚發型(母乳性黃疸,breast milk jaundice)』——出生『約1週後至數週』。「『母乳引起的黃疸通常於出生後『1個月』發生』錯誤」(早發型在第1週)。生理性黃疸出生2–3天出現、由頭往下發展皆正確。本題「錯誤」者為B。","options":{"A":"正確。生理性黃疸出生後2~3天出現。","B":"錯誤(本題答案)。母乳哺餵性黃疸於第1週內發生,非1個月。","C":"正確。增加哺餵次數改善母乳不足性黃疸。","D":"正確。皮膚發黃由頭往下、中心向外發展。"},"sources":["Nelson《兒科學》母乳性黃疸","早發晚發"]}},"108110-N4-26":{"quick":"出生第3天早發性母乳(哺餵性)黃疸,適當回答是「應該繼續哺餵母乳」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 『早發型(母乳哺餵性)黃疸』於出生第1週內,因『哺餵不足、攝取與排便少使膽紅素腸肝循環再吸收增』。處置:「『繼續並『增加』哺餵母乳次數』(讓寶寶多攝取、多排便排出膽紅素),而非暫停或減少哺餵」。本題適當回答為「應該繼續哺餵母乳」(A)。","options":{"A":"正確。早發性母乳黃疸應繼續(並增加)哺餵母乳。","B":"錯。不應暫停哺餵母乳。","C":"錯。應增加而非減少哺餵次數。","D":"錯。不應暫停由口進食。"},"sources":["Nelson《兒科學》母乳哺餵性黃疸","增加哺餵"]}},"108110-N4-64":{"quick":"足月、出生24小時膽紅素27須換血,描述正確的是「採新鮮血或<72小時血庫血,以防鉀過高」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 換血治療:(1)「用『新鮮血或不超過72小時之血品』,避免『血品儲存久『鉀離子過高』』致高血鉀」——正確;(2)『血品抗凝劑檸檬酸鹽會與嬰兒血鈣結合致『低血鈣』(非高血鈣),需補鈣(非抑鈣激素)』,故B錯;(3)『備血量約嬰兒血量『2倍』(約160mL/kg,雙倍量換血),非3倍800mL』,故C錯;(4)『Rh不合溶血換血應備『O型Rh『陰性』血』(非陽性)』,故D錯。本題正確為A。","options":{"A":"正確。用新鮮血或<72小時血,防鉀過高。","B":"錯。檸檬酸結合鈣致低血鈣,需補鈣非抑鈣激素。","C":"錯。備血約嬰兒血量2倍(雙倍量換血)。","D":"錯。Rh不合應備O型Rh陰性血。"},"sources":["Nelson《兒科學》換血","血品選擇"]}},"109030-N4-28":{"quick":"新生兒黃疸照光治療的原理是「將未結合型膽紅素異構化使其容易排出體外」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 照光療法原理:『特定波長(藍光約450–460nm)使皮膚的『『未結合(間接)型膽紅素』『光異構化(photoisomerization)』成水溶性的異構物(如lumirubin)』』,不需經肝結合即可由膽汁與尿液排出。本題原理為「將未結合型膽紅素異構化使其容易排出」(B);非靠熱能、非在肝臟解體、非加速合成轉化酶。","options":{"A":"錯。靠光異構化非「熱能」加速排出。","B":"正確。未結合型膽紅素光異構化成水溶性排出。","C":"錯。非在肝臟中解體。","D":"錯。非加速肝臟合成轉化酶。"},"sources":["Nelson《兒科學》照光原理","光異構化"]}},"112030-N4-55":{"quick":"B型嬰兒與O型母親ABO不合溶血,正確的是「有較高機會發生聽力損傷、發展遲緩等後遺症」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 ABO血型不合溶血:(1)『一般『ABO不合』溶血『較『Rh不合』『輕』』(故「ABO比Rh嚴重」錯));(2)『ABO不合『可發生於『第一胎』』(母O型本就有抗A抗B IgG),非「第二胎以後」』;(3)「若膽紅素過高未治療→『核黃疸』→可致『聽力損傷、發展遲緩、腦性麻痺』等後遺症」——正確;(4)『ABO溶血需換血時用『O型血(與母同型、無A/B抗原)』,非B型』。本題正確為「有較高機會聽力損傷、發展遲緩後遺症」(C)。","options":{"A":"錯。ABO不合一般較Rh不合『輕』。","B":"錯。ABO不合可發生於第一胎。","C":"正確。膽紅素過高致核黃疸可有聽損、發展遲緩。","D":"錯。ABO溶血換血用O型血,非B型。"},"sources":["Nelson《兒科學》ABO溶血","核黃疸後遺症"]}},"112110-N4-55":{"quick":"35週早產兒高膽紅素血症傳統照光護理中「光源與皮膚保持30~40公分距離」為錯誤的敘述(本題要選)。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 傳統照光機護理:『體溫易升高、脫水(副作用)』、『採血前暫停照光(膽紅素值才準)』、『不透光眼罩+生殖器遮光紙』、『光源與皮膚距離約『45–50公分(部分教材30–45)』、定時翻身』。本題以「『光源與皮膚保持『30~40公分』』」為要選出的不適當/有疑義敘述(多數教材建議距離約45cm左右,且須注意距離與光照強度)。本題「錯誤」者為D。(註:此題依官方答案D。)","options":{"A":"正確。照光常致體溫升高、脫水。","B":"正確。每日採血前暫停照光。","C":"正確。戴不透光眼罩、生殖器貼隔光紙。","D":"本題答案(官方)。照光距離敘述為要選出之不適當項。"},"sources":["Nelson《兒科學》照光護理","光源距離"]}},"113100-N4-36":{"quick":"高膽紅素血症新生兒護理措施最適當的是「可即早餵食,使膽紅素正常排泄」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 高膽紅素血症護理:「『即早並『增加』餵食』→促進腸蠕動與排便,減少膽紅素『腸肝循環再吸收』、加速排出」——最適當。其餘:照光時翻身應『約每2小時(更頻繁使皮膚均勻受光),非每4小時』;照光光源距離約『45–50公分(非30–45為最佳之絕對值)』;『母乳性黃疸『不需』立即停母乳(應增加哺餵)』。本題最適當為「可即早餵食使膽紅素正常排泄」(A)。","options":{"A":"正確。即早餵食促進膽紅素排泄。","B":"翻身宜更頻繁(約每2小時),非每4小時。","C":"照光距離敘述非最適當(約45~50公分)。","D":"錯。出現黃疸不需立即停母乳(應增加哺餵)。"},"sources":["Nelson《兒科學》高膽紅素血症","餵食"]}},"114030-N4-36":{"quick":"35週早產兒膽紅素26換血治療,護理正確的是「換血後需追蹤總膽紅素值,觀察期間繼續照光治療」。","detail":{"background":"新生兒黃疸:未結合(間接)型膽紅素沉積。『生理性黃疸』——出生『2–3天』後出現、3–4天達高峰、足月兒約7–10天內消退(早產兒較久、發生率較高)、總膽紅素上升<5mg/dL/天,因肝UGT酶不成熟+紅血球壽命短+腸肝循環增。『病理性黃疸』——『出生24小時內出現』、上升過快(>5mg/dL/天)、總膽紅素過高(足月>15mg/dL)、持續過久,常因『血型不合溶血(ABO:母O型胎兒A/B型;Rh:母Rh陰性胎兒Rh陽性)』、感染、G6PD。皮膚黃疸『由頭→下、由中心→四肢』發展。過高未結合膽紅素可穿過血腦屏障致『核黃疸(kernicterus)』腦損傷。照光療法使未結合膽紅素『光異構化』成水溶性排出。 換血護理:(1)『白蛋白應於換血『前』給(非後2小時)』,故A錯;(2)『換血導管置入『臍『靜脈』』(非臍動脈/橈動脈/股動脈)』,故B錯;(3)『每換100mL注射1mL 10%葡萄糖酸鈣(換200mL注射約2mL),選項「每200mL注射2mL『葡萄糖』溶液」藥物錯(應為葡萄糖酸『鈣』)』,故C錯;(4)「『換血後須持續『追蹤總膽紅素』(可能反彈),期間『繼續照光』』」——正確。本題正確為D。","options":{"A":"錯。白蛋白應於換血『前』給,非後2小時。","B":"錯。換血導管置入臍『靜脈』。","C":"錯。應注射葡萄糖酸『鈣』防低血鈣(非葡萄糖)。","D":"正確。換血後追蹤總膽紅素、繼續照光。"},"sources":["Nelson《兒科學》換血","臍靜脈"]}},"101030-N4-14":{"quick":"新生兒生命徵象「36.5°C、脈搏90、呼吸20」時需立即通知醫師。","detail":{"background":"新生兒正常生命徵象:『體溫約36.5–37.5°C、『心跳(脈搏)約120–160次/分』、『呼吸約30–60次/分』』。本題選項A「『脈搏90(過慢,<100心搏過緩)、呼吸20(過慢,<30呼吸過慢)』」明顯異常,提示可能缺氧/心肺問題,『需立即通知醫師』。其餘B/C/D的脈搏120–150、呼吸30–60皆在正常範圍。本題需通知醫師者為「36.5°C、90、20」(A)。","options":{"A":"正確。脈搏90過慢、呼吸20過慢,異常需通知醫師。","B":"脈搏120、呼吸30正常範圍。","C":"脈搏130、呼吸45正常範圍。","D":"脈搏150、呼吸60在正常範圍上限。"},"sources":["Nelson《兒科學》新生兒生命徵象","心搏過緩"]}},"101110-N4-67":{"quick":"新生兒皮膚特徵描述中「毒性紅斑常見於軀幹手臂,『通常局部治療即可』」為錯誤。","detail":{"background":"新生兒皮膚:『胎脂(vernix)』皺褶處明顯、保護保溫;『蒙古斑』薦/臀部、兒童早期自行消退;『毒性紅斑(erythema toxicum)』軀幹四肢的紅斑伴小膿皰、『良性『自限性』、『不需治療』會自行消退』(故「需局部治療」錯);黃疸由頭往下、中心向外發展。本題「錯誤」者為「毒性紅斑通常局部治療即可」(C,應為不需治療)。","options":{"A":"正確。胎脂於皺褶處明顯、具保護保溫功效。","B":"正確。蒙古斑常見於薦/臀部、兒童早期消失。","C":"錯誤(本題答案)。毒性紅斑為自限性、不需治療(非局部治療)。","D":"正確。黃疸由頭向下、中心向外發展。"},"sources":["Nelson《兒科學》新生兒皮膚","毒性紅斑"]}},"105030-N4-27":{"quick":"新生兒評估敘述中「頭血腫為界線『不明顯』的腫脹,通常單側或雙側」為錯誤。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』——『頭皮『軟組織水腫』、界線『不明顯』、『可越過骨縫線』、出生時最明顯、數天內吸收』;『頭血腫(cephalohematoma)』——『骨膜下『出血』、界線『明顯(清楚)』、『不越過骨縫線』、單或雙側、數週至數月吸收、可致黃疸』。故「頭血腫界線『不明顯』」錯誤(頭血腫界線『明顯』、產瘤才界線不明顯)。新生兒軀幹長四肢短、前囟門較後囟門晚關閉皆正確。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。頭血腫界線『明顯』(界線不明顯的是產瘤)。","B":"正確。產瘤出生12小時至數天吸收。","C":"正確。新生兒軀幹長而四肢短。","D":"正確。前囟門較後囟門晚關閉。"},"sources":["Nelson《兒科學》產瘤/頭血腫","界線"]}},"105030-N4-48":{"quick":"新生兒視覺評估中「對光不會反應」為不正常現象。","detail":{"background":"新生兒視覺:正常有『瞳孔對光反射、眨眼反射、可短暫注視、追視有限』;『出生數月內因眼外肌協調未成熟可有暫時性『斜視』(正常)』;『出生時淚腺未成熟,『哭時可無眼淚』(約1–3個月才有淚水,正常)』。「『對光『不會』反應(瞳孔對光反射消失)』為『不正常』」(提示神經/視覺問題)。本題不正常者為「對光不會反應」(B)。","options":{"A":"出現斜視為新生兒暫時性正常現象。","B":"正確(不正常)。對光不會反應(瞳孔對光反射消失)。","C":"哭泣時沒有眼淚為新生兒正常(淚腺未成熟)。","D":"會產生眨眼反射為正常。"},"sources":["Nelson《兒科學》新生兒視覺","對光反射"]}},"105090-N4-2":{"quick":"以手指輕觸新生兒嘴角,新生兒將臉嘴轉向刺激物並張嘴,是「尋乳反射(Rooting reflex)」。","detail":{"background":"新生兒原始反射:『尋乳反射(rooting)』——輕觸『嘴角/臉頰』,嬰兒『將頭臉轉向刺激側並張口尋找』(利哺乳);『吸吮反射(sucking)』——物體入口即吸吮;『摩洛(擁抱)反射(Moro)』——突發刺激致四肢外展再內收;『巴賓斯基反射(Babinski)』——劃足底外緣腳趾扇形張開。本題「輕觸嘴角轉向張嘴」為「尋乳反射」(A)。","options":{"A":"正確。輕觸嘴角轉向張嘴=尋乳反射。","B":"吸吮反射為物入口即吸吮。","C":"摩洛反射為突發刺激致四肢外展內收。","D":"巴賓斯基反射為劃足底腳趾扇形張開。"},"sources":["Nelson《兒科學》原始反射","尋乳反射"]}},"105090-N4-25":{"quick":"足月新生兒泌尿道特徵中「出生後第1天尿量為25 ml/kg/day」為錯誤。","detail":{"background":"新生兒泌尿道:『腎絲球過濾率(GFR)較成人低』、『腎小管對水分『再吸收』與電解質『排除』能力不足』(濃縮稀釋能力差);尿量『出生第1天約『『15–60 mL/kg/day』』(逐日增加)』。題目「出生後第1天尿量為『25 ml/kg/day』」——此數值就一般教材而言偏低/不精確(第1天尿量約多以總量或60mL/kg計),本題以C為要選出之錯誤敘述。本題「錯誤」者為C。","options":{"A":"正確。腎小管對水分再吸收能力不足。","B":"正確。腎小管對電解質排除能力不足。","C":"錯誤(本題答案)。出生第1天尿量敘述不正確。","D":"正確。新生兒腎絲球過濾率較成人低。"},"sources":["Nelson《兒科學》新生兒泌尿","尿量"]}},"106111-N4-31":{"quick":"新生兒出生時皮膚狀況中「臉部偏黃、疑似黃疸」代表潛在性異常。","detail":{"background":"新生兒皮膚正常 vs 異常:正常——『略帶粉紅、皮膚完整無破損、『手腳肢端發紺(acrocyanosis,末梢循環未成熟,正常暫時)』』;異常——「『出生『當時/24小時內』『臉部偏黃疑似黃疸』」提示『病理性黃疸(24小時內出現異常)』,代表潛在性異常」。本題潛在性異常者為「臉部偏黃疑似黃疸」(C)。","options":{"A":"正常。皮膚略帶粉紅色。","B":"正常。皮膚完整無破損。","C":"正確(潛在異常)。臉部偏黃疑似(早發)黃疸。","D":"正常。手腳肢端發紺為末梢循環未成熟的暫時現象。"},"sources":["Nelson《兒科學》新生兒皮膚","肢端發紺"]}},"108110-N4-25":{"quick":"新生兒囟門敘述正確的是:囟門凹陷代表脫水(3)＋前囟門為菱形由二額骨二頂骨組成(1),即13。","detail":{"background":"新生兒囟門:『前囟門(anterior fontanelle)』——『菱形,由『二塊額骨與二塊頂骨』交會而成』,約『出生後12–18個月關閉』;『後囟門(posterior)』——『三角形,由二頂骨與枕骨交會』,約『出生後6–8週(2個月)關閉』(非18週);『囟門『凹陷』=脫水』、『凸出=顱內壓上升』;『胎頭塑形(molding)約數天至數週恢復』(非1個月為固定)。本題正確組合為(1)(3)即13(D)。","options":{"A":"含(2)後囟門18週關閉(錯,應6~8週)。","B":"含(4)塑形1個月恢復(敘述不精確)。","C":"含(2)(4)皆不精確。","D":"正確。前囟門菱形二額二頂(1)+凹陷代表脫水(3)。"},"sources":["Nelson《兒科學》囟門","前後囟門"]}},"110030-N4-27":{"quick":"新生兒囟門敘述中「前囟門一般在出生後12~18『週』關閉」為錯誤——應為12~18『個月』。","detail":{"background":"囟門:『前囟門』菱形,約『出生後『12–18個月』關閉』(故「12–18週關閉」錯,週與月之差);『後囟門』三角形,約『出生後8–12週(約2–3個月)關閉』;『脫水→前囟門凹陷』;『顱內壓上升→前囟門凸出』。本題「錯誤」者為「前囟門12~18週關閉」(A,應為12–18個月)。","options":{"A":"錯誤(本題答案)。前囟門約12~18『個月』關閉,非12~18週。","B":"正確。後囟門約出生後8~12週關閉。","C":"正確。脫水時前囟門凹陷。","D":"正確。顱內壓上升時前囟門凸出。"},"sources":["Nelson《兒科學》囟門","前囟門關閉"]}},"110030-N4-28":{"quick":"新生兒皮膚評估中「出生時臉部有葡萄色酒斑」為異常。","detail":{"background":"新生兒皮膚:正常/良性——『蒙古斑(薦臀部藍灰斑,會消退)』、『毒性紅斑(出生2–3天紅斑膿皰,自限)』、『先露部位瘀點(petechiae,產道壓迫所致,少量為良性)』;異常——「『葡萄色『酒斑(port-wine stain,葡萄酒色斑)』』是『血管畸形(微血管擴張)』,『不會消退、可能合併『Sturge-Weber症候群(顏面三叉神經分布+腦血管畸形/癲癇)』』,屬異常」。本題異常者為「臉部葡萄色酒斑」(D)。","options":{"A":"良性。臀部蒙古斑會消退。","B":"良性。毒性紅斑自限性。","C":"產道壓迫的少量瘀點多為良性。","D":"正確(異常)。葡萄色酒斑為血管畸形,不消退、恐合併Sturge-Weber。"},"sources":["Nelson《兒科學》新生兒皮膚","葡萄酒色斑"]}},"110110-N4-28":{"quick":"聽診新生兒心跳速率的部位是「左鎖骨中線第3至第4肋間交會點」。","detail":{"background":"新生兒心尖搏動/聽診位置:因新生兒心臟位置較高且偏橫,心尖搏動(point of maximal impulse)約在『『左鎖骨『中線』第『3–4』肋間』』(較成人的第5肋間鎖骨中線為高、為內);可於此處聽診心尖脈計數一分鐘。本題正確為「左鎖骨中線第3至第4肋間交會點」(B)。","options":{"A":"「鎖骨內側第2–3肋間」位置不對。","B":"正確。左鎖骨中線第3~4肋間交會點。","C":"「鎖骨內側」非鎖骨中線。","D":"「第2~3肋間」過高。"},"sources":["Nelson《兒科學》新生兒心尖","聽診位置"]}},"111110-N4-19":{"quick":"新生兒蒙古斑敘述中「一般於12~18『歲』會逐漸消失」為錯誤。","detail":{"background":"蒙古斑(Mongolian spot):為『胎記(真皮黑色素細胞)』,多分布『臀部、薦部、背部、大腿』,『邊緣界線不明顯、藍灰色』,『多於『兒童早期(約學齡前、4–6歲)逐漸消退』』(非「12–18歲」)。本題「錯誤」者為「12~18歲會逐漸消失」(C,應為兒童早期)。","options":{"A":"正確。蒙古斑為胎記的一種。","B":"正確。多分布臀部、背部和大腿。","C":"錯誤(本題答案)。多於兒童早期消退,非12~18歲。","D":"正確。邊緣界線不明顯。"},"sources":["Nelson《兒科學》蒙古斑","消退"]}},"112180-N4-30":{"quick":"6個月嬰兒頭頂中間軟軟的,最適當回應是「這是前囟門,約於12至18個月大時會完全關閉」。","detail":{"background":"囟門:『前囟門(菱形)』約『出生後『12–18個月』關閉』,6個月時『仍未關閉、摸起來軟而平(或微凹隨脈搏搏動)屬『正常』』。最適當回應為「『這是前囟門,約於12–18個月大完全關閉』」(A);非「3個月應關閉」、非後囟門、無需轉診(屬正常)。本題最適當為A。","options":{"A":"正確。這是前囟門,約12~18個月關閉(6個月未關閉正常)。","B":"錯。前囟門非出生後3個月關閉。","C":"錯。後囟門約2~3個月已關閉,非此處。","D":"屬正常,無需轉診神經外科。"},"sources":["Nelson《兒科學》前囟門","關閉時間"]}},"113030-N4-17":{"quick":"抱起放入磅秤時四肢對稱外展伸直、拇指與食指呈C字形,是「擁抱反射(Moro reflex)」。","detail":{"background":"摩洛(擁抱)反射(Moro reflex):因『姿勢突然改變或突發聲響/落空感』誘發——嬰兒『四肢『對稱性外展、伸直』,手指張開(拇指與食指呈C/字形),隨後屈曲內收作擁抱狀』,約『出生即有、3–4個月消失』。本例「抱起放入磅秤(姿勢改變)→四肢對稱外展伸直、C字形」即『摩洛(擁抱)反射』。本題為「擁抱反射(Moro)」(A)。","options":{"A":"正確。姿勢改變致四肢對稱外展伸直C字形=擁抱反射。","B":"驚嚇反射(startle)為突發聲響致屈曲(肘屈),與Moro略不同,本題以擁抱反射為答。","C":"手掌抓握反射為觸掌心致抓握。","D":"退縮反射為疼痛刺激致肢體回縮。"},"sources":["Nelson《兒科學》原始反射","Moro"]}},"113100-N4-17":{"quick":"親子同室時,新生兒「整天尿布都沒有濕」應進一步評估。","detail":{"background":"新生兒攝取/排泄監測:足月新生兒『約出生後逐日增加排尿,『一天應有約6片以上濕尿布』(出生數天後)』,『尿量是評估攝取是否足夠的重要指標』。「『整天尿布都沒有濕(無尿)』提示『攝取不足或脫水/泌尿問題』,應『進一步評估』」。其餘:半夜醒來2次、大便綠色(過渡便)、哭時無眼淚(淚腺未成熟)皆屬正常。本題應進一步評估者為「整天尿布都沒有濕」(A)。","options":{"A":"正確。整天無濕尿布提示攝取不足/脫水,需評估。","B":"半夜醒來2次屬正常。","C":"大便綠色(過渡便)屬正常。","D":"哭時無眼淚為淚腺未成熟,正常。"},"sources":["Nelson《兒科學》新生兒攝取","尿量指標"]}},"114100-N4-18":{"quick":"新生兒頭部評估正確的是「胎頭變形(molding)為順應產道的頭骨重疊,約出生後數天或數週恢復」。","detail":{"background":"頭部評估:(1)『頭血腫『不』越過骨縫線、數週至數月吸收』(故A「越過骨縫線、12小時–數天吸收」錯,那是產瘤);(2)『產瘤(caput)是『軟組織『水腫』』、『可越過骨縫線』』(故B「骨膜下微血管破裂血液堆積、不越過骨縫線」是『頭血腫』的描述,錯);(3)「『胎頭變形(molding)』為順應產道的『頭骨『重疊』』,約『出生後數天–數週恢復』」——正確;(4)『前囟門菱形約『12–18個月』關閉』(故D「12–18週」錯)。本題正確為C。","options":{"A":"錯。頭血腫不越過骨縫線(越過的是產瘤)。","B":"錯。骨膜下血液堆積不越骨縫線是『頭血腫』,非產瘤。","C":"正確。胎頭變形為頭骨重疊,數天至數週恢復。","D":"錯。前囟門約12~18『個月』關閉,非週。"},"sources":["Nelson《兒科學》頭部評估","molding"]}},"114100-N4-19":{"quick":"長大後不會消失、持續一生的反射為:眨眼(1)＋吞嚥(3)＋作嘔(5),即135。","detail":{"background":"新生兒反射分『原始反射(暫時性,數月內消失)』與『保護性反射(終生存在)』:『終生存在』——『眨眼反射(blinking)、吞嚥反射(swallowing)、作嘔反射(gag)、咳嗽、打噴嚏』;『暫時性(數月消失)』——『吸吮(sucking,約4個月)、巴賓斯基(Babinski,約1–2歲)、擁抱(Moro,約3–4個月)、尋乳、抓握』。本題終生存在者為(1)眨眼+(3)吞嚥+(5)作嘔即135(A)。","options":{"A":"正確。眨眼(1)+吞嚥(3)+作嘔(5)為終生反射。","B":"含(6)擁抱反射(會消失)。","C":"含(2)吸吮、(4)巴賓斯基(會消失)。","D":"含(4)(6)會消失的反射。"},"sources":["Nelson《兒科學》反射","終生反射"]}},"114170-N4-9":{"quick":"足月胎兒頭部敘述中「冠狀縫合為位於兩個『頂骨』間的膜性組織」為錯誤。","detail":{"background":"胎頭骨縫與囟門:『矢狀縫合(sagittal)』——『連結兩『頂骨』之間,並連接前後囟門』;『冠狀縫合(coronal)』——『位於『額骨與頂骨』之間』(非兩頂骨間);『前囟門(菱形)』在額骨與頂骨交會;『後囟門(三角形)』在兩頂骨與枕骨交會;『雙頂徑(BPD)』為胎頭最大橫徑、可評估胎兒生長。故「冠狀縫合位於『兩個頂骨間』」錯誤(兩頂骨間是『矢狀』縫合)。本題「錯誤」者為B。","options":{"A":"正確。矢狀縫合連結前後兩個囟門(兩頂骨間)。","B":"錯誤(本題答案)。冠狀縫合在『額骨與頂骨』間,非兩頂骨間。","C":"正確。雙頂徑為胎頭最大橫徑、可評估胎兒生長。","D":"正確。後囟門三角形,位於兩頂骨與枕骨交接。"},"sources":["Nelson《兒科學》胎頭縫合","冠狀矢狀"]}},"115030-N4-18":{"quick":"正常新生兒呼吸特徵中「採『胸式』呼吸」為錯誤——新生兒以『腹式(橫膈)』呼吸為主。","detail":{"background":"新生兒正常呼吸特徵:『速率約30–60次/分、『腹式(橫膈)呼吸為主』(非胸式;肋間肌未成熟)、呼吸『不規律』、可有『短暫(<15–20秒,題目標準<5秒)呼吸暫停』』。故「採『胸式』呼吸」錯誤(新生兒為腹式呼吸)。本題「錯誤」者為「採胸式呼吸」(B)。","options":{"A":"正確。呼吸速率30~60次/分。","B":"錯誤(本題答案)。新生兒以腹式(橫膈)呼吸為主,非胸式。","C":"正確。新生兒呼吸不規律。","D":"正確。有時出現5秒以內的呼吸暫停。"},"sources":["Nelson《兒科學》新生兒呼吸","腹式呼吸"]}},"104030-N4-27":{"quick":"New Ballard神經肌肉成熟度分數最高(最成熟)者為「方形窗角度為0度」。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 成熟度『最高』表現:『方形窗角度『0度』(手腕可完全屈貼前臂)』。其餘為『不成熟(早產)』:平躺四肢『伸展』(成熟應屈曲)、膝膕角160度(角度大=不成熟)、手肘可拉過身體中線(圍巾徵象過中線=不成熟)。本題最成熟者為「方形窗角度為0度」(B)。","options":{"A":"四肢伸展為不成熟(成熟應屈曲)。","B":"正確。方形窗角度0度=最成熟。","C":"膝膕角160度(角度大)=不成熟。","D":"手肘過身體中線(圍巾徵象)=不成熟。"},"sources":["Nelson《兒科學》New Ballard","方形窗"]}},"104100-N4-4":{"quick":"L/S比值評估胎兒肺成熟度易偽陽性,宜配合「磷脂甘油(phosphatidyl glycerol)」評估。","detail":{"background":"胎兒肺成熟度評估(羊水):『卵磷脂/抱合髓磷脂比值(L/S ratio)≥2提示肺成熟』,但糖尿病孕婦等可有偽陽性;『加測『磷脂甘油(phosphatidyl glycerol, PG)』(肺表面張力素成熟的指標,出現代表肺成熟)』可提高準確度。本題宜配合「磷脂甘油」(B);膽紅素評估溶血、雌三醇評估胎盤功能、肌酸酐評估腎成熟,皆非肺成熟。","options":{"A":"膽紅素評估溶血,非肺成熟。","B":"正確。磷脂甘油(PG)為肺成熟指標,可加測。","C":"雌三醇評估胎盤功能。","D":"肌酸酐評估胎兒腎成熟度。"},"sources":["Nelson《兒科學》肺成熟度","L/S與PG"]}},"104100-N4-24":{"quick":"「陰蒂突出、陰唇平坦」不是妊娠39週(足月)女嬰的特性——那是『早產兒』的特徵。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 女嬰生殖器成熟度:『足月(成熟)』——『大陰唇『豐滿覆蓋』陰蒂與小陰唇』;『早產(不成熟)』——『陰蒂突出、大陰唇平坦、小陰唇與陰蒂相對突出』。本題妊娠39週(足月)應為大陰唇覆蓋;「『陰蒂突出、陰唇平坦』是『早產兒』特徵,不是足月兒特性」。其餘:乳暈突起0.5–1cm、身體無胎毛、整個腳底有皺褶皆為足月特徵。本題不是足月特性者為C。","options":{"A":"是足月特性。乳暈充盈突起約0.5~1cm。","B":"是足月特性。身體胎毛已退去。","C":"本題答案(非足月)。陰蒂突出陰唇平坦是早產兒特徵。","D":"是足月特性。整個腳底都有皺摺。"},"sources":["Nelson《兒科學》女嬰成熟度","生殖器"]}},"104100-N4-52":{"quick":"新生兒成熟度評估中「膝膕角度小於90度」為早產兒特徵(本題官方答案C)。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 一般而言『成熟(足月)』:方形窗角度小、手肘不過中線、足跟不易到耳、『膝膕角『小』』;『早產(不成熟)』:方形窗角度大、手肘易過中線、足跟易到耳、膝膕角大。題目選項A(方形窗<45度)、B(手肘無法越中線)、D(膝膕角<90度)多偏『成熟』表現;C(足跟『能』觸及耳朵)為典型『早產』徵象(關節鬆弛)。本題依官方以C(『足跟能觸及耳朵』為早產特徵)——惟本題答案標示為C「足跟能觸及耳朵」。","options":{"A":"方形窗<45度偏向成熟。","B":"手肘無法越中線偏向成熟。","C":"正確(官方)。足跟能觸及耳朵(關節鬆弛)=早產特徵。","D":"膝膕角<90度偏向成熟。"},"sources":["Nelson《兒科學》成熟度","足跟到耳"]}},"105030-N4-56":{"quick":"比較早產兒與足月兒,正確的是「躺姿:早產兒呈放鬆伸展,足月兒呈彎曲姿勢」。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 早產 vs 足月:(1)『抓握反射等原始反射『足月兒較『明顯』』(早產兒較弱)』,故A錯;(2)「『躺姿:早產兒『肌張力低、放鬆伸展』;足月兒『屈曲(彎曲)姿勢』』」——正確;(3)『足跟碰耳:早產兒『關節鬆『容易』完成』(足月兒不易)』,故C錯;(4)『圍巾徵象(手肘越胸):早產兒『容易』越過中線』(足月兒不易)』,故D錯。本題正確為B。","options":{"A":"錯。抓握反射足月兒較明顯(非早產兒)。","B":"正確。早產兒放鬆伸展、足月兒屈曲姿勢。","C":"錯。足跟碰耳早產兒較『容易』完成。","D":"錯。手肘越中線早產兒較『容易』。"},"sources":["Nelson《兒科學》早產足月","姿勢"]}},"106110-N4-29":{"quick":"女性新生兒生殖器成熟度最成熟者為「大陰唇覆蓋陰蒂及小陰唇」。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 女嬰生殖器成熟度(由不成熟到成熟):『早產——陰蒂突出、小陰唇與陰蒂突出、大陰唇平坦小』→『漸成熟——大陰唇變大、小陰唇變小』→『足月(最成熟)——『大陰唇『豐滿覆蓋』陰蒂與小陰唇』』。本題最成熟者為「大陰唇覆蓋陰蒂及小陰唇」(A)。","options":{"A":"正確。大陰唇覆蓋陰蒂及小陰唇=最成熟(足月)。","B":"陰蒂及小陰唇突出=早產(最不成熟)。","C":"大陰唇變大小陰唇變小=中等成熟。","D":"陰蒂突出小陰唇平坦=不成熟。"},"sources":["Nelson《兒科學》女嬰成熟度","大陰唇"]}},"106111-N4-28":{"quick":"新生兒成熟度評估正確的是:早產兒方形窗可能呈100度(1)＋早產兒圍巾徵象手肘無法超過中線(3)? 本題答案23.","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 評析(本題官方答案為23):(1)『早產兒方形窗角度『大』(可達90–100度以上)』——『正確(1對)』,但官方組合取23;(2)「『足月兒膝膕間角度『小於90度』(角度小=成熟)」——而選項(2)『足月兒膝膕角『大於90度』』敘述? 依官方(2)被選入正確組合23,意指足月相關敘述為對;(3)『早產兒圍巾徵象手肘『無法超過中線』』? 早產兒應『易超過中線』,故(3)若指早產手肘不過中線則為足月特徵...本題依考選部答案為(2)(3)即23(C)。(註:本題以官方答案C為準。)","options":{"A":"(13)非官方答案。","B":"(14)非官方答案。","C":"正確(官方)。組合23。","D":"(34)非官方答案。"},"sources":["Nelson《兒科學》成熟度","New Ballard"]}},"107030-N4-27":{"quick":"New Ballard神經肌肉成熟度評估方法正確的是「評估手臂反彈力:雙手肘彎曲5秒後伸展放鬆,觀察反彈後肘部角度」。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 各項評估方法:(1)『姿勢:觀察『安靜未哭時』的自然姿勢(非哭泣時伸展程度)』,故A錯;(2)『方形窗:將手腕『朝前臂『內(掌)』側』屈曲,量手掌與前臂角度』(非朝外側),故B錯;(3)「『手臂反彈(arm recoil):雙肘彎曲5秒後拉直再放鬆,觀察『反彈回屈』的肘角度(愈成熟反彈愈快、角度愈小)』」——正確;(4)『圍巾徵象:拉手臂越過胸前到對側,看『手肘與『身體中線』』的位置』(非乳頭中線之描述方式),選項D敘述不精準。本題正確為C。","options":{"A":"錯。姿勢應觀察安靜時自然屈曲,非哭泣時伸展。","B":"錯。方形窗手腕朝前臂內(掌)側屈曲。","C":"正確。手臂反彈:雙肘彎曲5秒後放鬆觀察反彈肘角。","D":"圍巾徵象的敘述不精準。"},"sources":["Nelson《兒科學》New Ballard","評估方法"]}},"107110-N4-30":{"quick":"新生兒神經成熟度評估中「手肘可以超過身體中線」是早產兒的特徵。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 早產兒(不成熟)神經肌肉特徵:『四肢『低張伸展』(非高張屈曲)、『方形窗角度『大』(非0度)』、『足跟『能』拉到耳朵(關節鬆)』、『圍巾徵象『手肘『可超過身體中線』』』。本題早產兒特徵為「手肘可以超過身體中線」(D);選項A(高張屈曲)、B(方形窗0度)、C(腳跟無法拉到耳)皆為『足月』特徵。本題為D。","options":{"A":"四肢高張屈曲為足月特徵。","B":"方形窗0度為足月(最成熟)。","C":"腳跟無法拉到耳為足月特徵。","D":"正確。手肘可超過身體中線=早產特徵。"},"sources":["Nelson《兒科學》成熟度","圍巾徵象"]}},"107110-N4-43":{"quick":"懷孕30週、2400公克,其體重與妊娠週數的關係屬於「LGA:大於妊娠週數應有體重」。","detail":{"background":"新生兒出生體重與妊娠週數關係:『AGA(適當)=體重在該週數第10–90百分位』;『SGA(小於)<第10百分位』;『LGA(大於)>第90百分位』;『LBW低出生體重<2500g、VLBW<1500g、ELBW<1000g』。30週胎兒『應有體重約1300–1500g』,本例『2400g明顯『大於』30週應有體重(>第90百分位)』→『LGA』。本題為「LGA:大於妊娠週數應有體重」(A)。","options":{"A":"正確。30週2400g遠超該週應有體重=LGA。","B":"AGA為符合週數,但2400g對30週過大。","C":"SGA為小於週數,與本例相反。","D":"VLBW<1500g,本例2400g不符。"},"sources":["Nelson《兒科學》LGA/SGA","出生體重分類"]}},"109110-N4-28":{"quick":"足月新生兒身體成熟度評估中「乳暈平坦無突起」為錯誤——足月兒乳暈『突起、可摸到乳核』。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 足月(成熟)身體特徵:『皮膚厚、乾裂脫皮、幾乎看不見血管』、『乳暈『突起』、可摸到約5–10mm乳核(乳房芽)』、『耳軟骨堅硬成形、彎折後立即回彈』、『眼瞼張開』、足底滿佈皺褶。「『乳暈『平坦無突起』』是『早產兒』特徵,非足月兒」,故為要選出的錯誤。本題「錯誤」者為「乳暈平坦無突起」(B)。","options":{"A":"正確(足月)。皮膚乾裂、幾乎看不見血管。","B":"錯誤(本題答案)。足月兒乳暈突起有乳核,乳暈平坦是早產特徵。","C":"正確(足月)。耳軟骨堅硬、彎折立即反彈。","D":"正確(足月)。眼瞼張開。"},"sources":["Nelson《兒科學》足月成熟度","乳暈"]}},"112110-N4-29":{"quick":"使用New Ballard Score評估足月兒成熟度與妊娠週數的最佳時間為「出生後24小時內」。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 New Ballard Score的評估『最佳時間為『出生後24小時內(可延至48小時內)』』——此時神經肌肉張力與反射最能反映真實成熟度(時間過久受外在環境、餵食、疾病影響而失準)。本題最佳時間為「出生後24小時內」(A)。","options":{"A":"正確。New Ballard最佳評估時間為出生後24小時內。","B":"2~3天內已偏晚、易受影響。","C":"3~7天過晚。","D":"8天至滿月前過晚。"},"sources":["Nelson《兒科學》New Ballard","評估時間"]}},"113180-N4-17":{"quick":"四位出生第3小時新生兒中,「膝膕間角度140°、全身胎毛豐富」者(林小妹)可能為早產兒。","detail":{"background":"新貝拉德計分(New Ballard Score)評估新生兒成熟度=神經肌肉成熟度(姿勢、方形窗、手臂反彈、膝膕角、圍巾徵象、足跟到耳)＋身體成熟度(皮膚、胎毛、足底紋、乳房、眼耳、生殖器)。『愈成熟(足月)』:姿勢屈曲、『方形窗角度愈小(0度最成熟)』、膝膕角愈小、圍巾徵象手肘『不過』中線、足跟『不易』到耳、足底皺褶滿佈、乳暈突起、耳軟骨硬可回彈、皮膚厚不透明。『早產兒』則相反:四肢伸展鬆弛、方形窗角度大、膝膕角大、手肘易過中線、足跟易到耳、足底光滑、皮膚薄透明見血管、胎毛多。最佳評估時間為『出生後24小時內』(48小時內)。 早產徵象:『膝膕角『大(140°)』(角度大=關節鬆=不成熟)、『全身胎毛豐富』(胎毛多=早產;足月胎毛已退)、皮膚薄透明見血管、足底光滑、乳暈平坦』。林小妹「膝膕角140°+胎毛豐富」=早產。其餘為足月特徵:方形窗0°+反彈60°(成熟)、圍巾徵象手肘不過中線+乳暈突起5mm(成熟)、足底前2/3皺褶+皮膚乾燥看不見血管(成熟)。本題早產兒為B(林小妹)。","options":{"A":"方形窗0°、手臂反彈角度小=成熟(足月)。","B":"正確。膝膕角140°+胎毛豐富=早產。","C":"圍巾徵象不過中線+乳暈突起=成熟。","D":"足底2/3皺褶+皮膚乾燥看不見血管=成熟。"},"sources":["Nelson《兒科學》成熟度判讀","早產徵象"]}},"114100-N4-35":{"quick":"早產兒身體外觀特徵中「腳底皮膚皺摺比足月兒『多』且清晰」為錯誤——早產兒足底皺褶『少』。","detail":{"background":"早產兒身體外觀:『皮膚薄、缺皮下脂肪、『透明易見血管』』、『耳翼軟骨未骨化、扁平易摺(回彈慢)』、『足底皮膚皺褶『少『而光滑(足月兒才皺褶多且清晰)』』、『胎毛多(約27–28週時胎毛最多覆蓋全身)』、乳暈平坦、生殖器不成熟。故「腳底皺摺比足月兒『多』且清晰」錯誤(早產兒足底皺褶『少』)。本題「錯誤」者為C。","options":{"A":"正確。早產兒皮膚缺皮下脂肪、透明易見血管。","B":"正確。耳翼軟骨未骨化、扁平易摺。","C":"錯誤(本題答案)。早產兒足底皺褶『少』(足月才多且清晰)。","D":"正確。約27~28週時胎毛量最多覆蓋全身。"},"sources":["Nelson《兒科學》早產外觀","足底皺褶"]}},"101110-N4-11":{"quick":"晚早產兒(36週、2475g)照顧正確的是「罹病率高,應密切照顧並支持感官與腦部發展」。","detail":{"background":"晚早產兒(late preterm, 34–36+6週):雖接近足月,但「『各系統仍未完全成熟』,『罹病率(體溫不穩、低血糖、黃疸、餵食困難、呼吸問題、感染、再住院)較足月兒『高』』」,『不可因體重接近足月就掉以輕心』。應『密切照顧並支持其感官與腦部發展』。本題正確為D;A(進一般嬰兒室)、B(各系統較成熟能適應)、C(告訴父母不需緊張)皆低估晚早產兒風險。","options":{"A":"錯。不可因穩定就進一般嬰兒室掉以輕心。","B":"錯。晚早產兒各系統仍未完全成熟。","C":"錯。罹病率高,不應叫父母不需緊張。","D":"正確。罹病率高,應密切照顧、支持感官與腦部發展。"},"sources":["Nelson《兒科學》晚早產兒","罹病率"]}},"103100-N4-60":{"quick":"28週早產兒於加護病房,雙親探視時最合適的護理指導是「清楚說明健康狀況及醫療處置」。","detail":{"background":"早產兒家庭支持:面對早產兒住NICU、雙親焦慮,護理應「『誠實、清楚地說明早產兒的『健康狀況與醫療處置』』、回答其疑問、鼓勵『參與照護與肌膚接觸(袋鼠式)』、提供情緒支持」。不應『迴避回答儀器疑問、過度保證「沒有任何問題」、或叫雙親避免碰觸(應鼓勵接觸)』。本題最合適為「清楚說明健康狀況及醫療處置」(C)。","options":{"A":"錯。不應迴避回答醫療儀器疑問。","B":"錯。不應過度保證「沒有任何問題」。","C":"正確。清楚說明健康狀況及醫療處置。","D":"錯。應鼓勵雙親接觸(非避免碰觸)。"},"sources":["Nelson《兒科學》早產兒家庭","NICU支持"]}},"104100-N4-50":{"quick":"極度早產兒保溫措施「不」包括「減低保溫箱內的濕度」。","detail":{"background":"極早早產兒保溫(防散熱):『提高保溫箱『濕度』(高濕度減少『蒸發』散熱與不顯性水分喪失)』、『輻射加熱台、戴毛線帽、預熱接觸物品、塑膠膜覆蓋』。「『『減低』保溫箱濕度』『不』是保溫措施——應『提高濕度』」(降低濕度會增蒸發散熱)。本題不包括(非保溫措施)者為「減低保溫箱內的濕度」(A)。","options":{"A":"本題答案(非保溫措施)。應提高濕度,減低濕度會增蒸發散熱。","B":"是。輻射加熱處理台保溫。","C":"是。戴毛線帽減少頭部散熱。","D":"是。接觸物品事先加溫(防傳導)。"},"sources":["Nelson《兒科學》早產兒保溫","濕度"]}},"104100-N4-53":{"quick":"呼吸窘迫症候群早產兒臨床表徵「不」包括「吸氣時有咕嚕聲,為最早出現的徵兆」。","detail":{"background":"呼吸窘迫症候群(RDS,肺表面張力素缺乏):『出生時呼吸可正常,『30分鐘–2小時內』漸出現症狀』、『呼吸>60次/分、鼻翼搧動、肋間/胸骨下凹陷、『呼氣『呻吟(grunting,呼氣時咕嚕/哼聲)』』、發紺』。「『『吸氣』時有咕嚕聲為最早徵兆』錯誤——RDS的咕嚕聲是『『呼氣』性呻吟』,且最早徵兆並非如此描述」。本題不包括(錯誤)者為A。","options":{"A":"本題答案(非典型/錯誤)。RDS呻吟是『呼氣』性,非吸氣時咕嚕為最早徵兆。","B":"是。呼吸速率>60次/分。","C":"是。鼻翼搧動、肋間肌凹陷。","D":"是。出生時正常,30分~2小時內出現症狀。"},"sources":["Nelson《兒科學》RDS","呼氣呻吟"]}},"106030-N4-54":{"quick":"25週、680g極早早產兒維持體溫措施中「維持保溫箱濕度40%」為錯誤——應『提高濕度』。","detail":{"background":"極早早產兒保溫:『提高保溫箱『濕度』(如>60–70%,減少蒸發散熱與水分喪失)』、呼吸器加熱濕化、塑膠膜覆蓋(防對流散熱)、戴帽與毛毯。「『維持保溫箱濕度『40%』』偏低,『不利』減少散熱(應提高濕度)」,故為錯誤。本題「錯誤」者為「維持保溫箱濕度40%」(A)。","options":{"A":"錯誤(本題答案)。極早早產兒應提高濕度(>60%),40%偏低。","B":"正確。呼吸器加熱濕化維持氧氣溫度。","C":"正確。塑膠膜覆蓋防對流散熱。","D":"正確。戴帽與毛毯包裹保暖。"},"sources":["Nelson《兒科學》早產兒保溫","濕度"]}},"106110-N4-53":{"quick":"早產兒呼吸暫停警鈴響時,正確護理措施是「以手掌輕揉背部」(觸覺刺激)。","detail":{"background":"早產兒呼吸暫停(apnea,≥20秒或伴心搏過緩/發紺):因呼吸中樞未成熟。處置先給『『觸覺刺激(輕揉背部、足底)』喚醒呼吸』,多數可恢復;若無效再評估給氧/正壓通氣。「先『以手掌輕揉背部』刺激」為第一步。不應直接抽吸(非首要)、不常規給高濃度氧(增ROP風險)、不宜直接俯臥不處理。本題正確為「以手掌輕揉背部」(A)。","options":{"A":"正確。先以觸覺刺激(輕揉背部)喚醒呼吸。","B":"抽吸非呼吸暫停的首要處置。","C":"不常規給高濃度氧(增ROP風險)。","D":"直接俯臥不處理不當。"},"sources":["Nelson《兒科學》早產兒呼吸暫停","觸覺刺激"]}},"108020-N4-62":{"quick":"早產兒保溫箱感官刺激護理正確的是「晚上可在保溫箱上覆蓋布罩,以調節日夜光線變化」。","detail":{"background":"早產兒發展性照護:(1)「『晚上覆蓋布罩『調節日夜光線』』(減少強光、建立日夜節律、減ROP風險)」——正確;(2)『聽覺刺激不宜『最早/過度』(NICU應『降低噪音』,過早過強聽覺刺激不利)』,故A錯;(3)『擺位應『屈曲、向中線收(寧握/築巢)』,非『伸展』』,故C錯;(4)『應『集中(批次)護理』減少干擾、給足夠休息,「分段式」若指頻繁打擾則不利』,故D敘述不當。本題正確為B。","options":{"A":"錯。NICU應降低噪音,聽覺刺激不宜最早/過度。","B":"正確。晚上覆蓋布罩調節日夜光線。","C":"錯。擺位應屈曲向中線(寧握),非伸展。","D":"應集中護理減少干擾(非頻繁分段打擾)。"},"sources":["Nelson《兒科學》發展性照護","日夜節律"]}},"108110-N4-59":{"quick":"早產兒視網膜病變(ROP)正確的是「與過度或長期給高氧、光線刺激有關」。","detail":{"background":"早產兒視網膜病變(ROP):好發於『『極低出生體重、妊娠『32週以下』』早產兒』(非35週以上)、與『長期/過度『高濃度氧氣』暴露、光線刺激』有關;機轉是『視網膜血管『異常增生(非舒張)』』;應於『矯正胎齡約31–34週或出生後4–6週起』開始眼底篩檢(非4個月才開始)。本題正確為「與過度或長期高氧、光線刺激有關」(B)。","options":{"A":"錯。主要發生於32週以下早產兒,非35週以上。","B":"正確。與過度/長期高氧、光線刺激有關。","C":"錯。是視網膜血管『異常增生』,非舒張不良。","D":"錯。應出生後4~6週起篩檢,非4個月才開始。"},"sources":["Nelson《兒科學》ROP","高氧"]}},"109110-N4-56":{"quick":"早產兒腸胃系統功能敘述中「消化乳糖能力至妊娠『32週』以後才成熟」為不適當。","detail":{"background":"早產兒腸胃:『胃容量小、胃腸蠕動弱、賁門括約肌鬆易溢吐』、『對『脂肪』消化吸收能力有限(膽鹽與脂肪酶不足)』、『代謝快』。乳糖酶(lactase)『主要在妊娠『後期(約34週後至足月)』才較成熟』——故「消化乳糖能力至『32週』後即成熟」不夠精確/不適當(乳糖酶較晚成熟,早產兒可能乳糖不耐)。本題「不適當」者為D。","options":{"A":"適當。早產兒胃容量小、胃腸蠕動弱。","B":"適當。心跳呼吸快、新陳代謝快。","C":"適當。對脂肪消化能力有限。","D":"不適當(本題答案)。乳糖酶較晚(近足月)才成熟,非32週即成熟。"},"sources":["Nelson《兒科學》早產兒腸胃","乳糖酶"]}},"110110-N4-53":{"quick":"早產兒體溫調節護理中「低出生體重早產兒絕對不能執行袋鼠式護理」為不適當。","detail":{"background":"早產兒體溫護理:採『集中護理(減少離箱)』、『加熱台用透明膠膜減散熱』、抱出時保暖(帽、包被、手套)。「『袋鼠式護理(kangaroo care,皮膚對皮膚)』『適用且鼓勵』於穩定的低出生體重早產兒——可『穩定體溫、心跳、促依附與哺乳』,『並非「絕對不能」執行』」,故B不適當。本題「不適當」者為「低出生體重早產兒絕對不能執行袋鼠式護理」(B)。","options":{"A":"適當。集中護理避免早產兒頻繁離開保溫箱。","B":"不適當(本題答案)。穩定的低出生體重早產兒可且鼓勵袋鼠式護理。","C":"適當。透明膠膜覆蓋加熱台減散熱。","D":"適當。抱出保溫箱時提供帽子、包被保暖。"},"sources":["Nelson《兒科學》袋鼠式護理","早產兒體溫"]}},"111030-N4-54":{"quick":"早產兒抽吸正確的是「抽吸管大小為5~8 Fr.」。","detail":{"background":"新生兒/早產兒抽吸:(1)『抽吸順序應『先『口』後『鼻』』(防刺激鼻部引發吸氣將口腔分泌物吸入)』,故A(先鼻)錯;(2)「『抽吸管大小約『5–8 Fr.』』」——正確;(3)『新生兒抽吸壓力約『60–100 mmHg』(不可過高;早產兒壓力宜更低約60–80)』,「不可超過60」過嚴、且常用範圍含80,本題以B為正解;(4)『氣管內管抽吸『一次≤5–10秒』(20秒過長致缺氧)』,故D錯。本題正確為「抽吸管大小5~8 Fr.」(B)。","options":{"A":"錯。抽吸順序應先口後鼻。","B":"正確。抽吸管大小約5~8 Fr.。","C":"抽吸壓力約60~100mmHg(「不可超過60」過嚴)。","D":"錯。氣管內管抽吸一次≤5~10秒,非20秒。"},"sources":["Nelson《兒科學》新生兒抽吸","管徑"]}},"111110-N4-53":{"quick":"早產兒安全擺位中「口胃管灌食後維持頭部抬高45度約10分鐘」為不適當。","detail":{"background":"早產兒擺位:『休息時肩前傾、雙手屈曲向中線靠近嘴巴(寧握)』、『屈曲髖膝、預留四肢活動空間』、『呼吸暫停時頸部『微仰』(中線位),勿過度屈曲伸展』。「『口胃管灌食後『頭抬高45度僅10分鐘』』不適當——灌食後應『右側臥或頭高約30度並維持較長時間(約30分鐘以上)』防溢吐吸入,『10分鐘過短、45度過高(不利早產兒)』」。本題「不適當」者為A。","options":{"A":"不適當(本題答案)。灌食後頭高僅10分鐘過短,易溢吐吸入。","B":"適當。肩前傾、雙手屈曲向中線(寧握)。","C":"適當。屈曲髖膝預留活動空間。","D":"適當。呼吸暫停時頸部微仰,勿過度屈伸。"},"sources":["Nelson《兒科學》早產兒擺位","灌食後"]}},"112030-N4-54":{"quick":"早產兒視網膜病變敘述中「視網膜完全剝離,可經由鞏膜扣壓術、玻璃體切除術『獲得治癒』」為不適當。","detail":{"background":"ROP:高危群為『出生體重<1500g、長期高濃度氧氣暴露』;『第一、二期多輕度、可自行好轉』;嚴重者(第四、五期視網膜剝離)可『雷射、冷凍、鞏膜扣壓、玻璃體切除手術『治療』』,但『『完全剝離(第五期)』預後差,『未必能『治癒』(恢復視力)』』。故「視網膜完全剝離可經手術『獲得治癒』」過度樂觀、不適當。本題「不適當」者為D。","options":{"A":"適當。出生體重1500g以下為高危群。","B":"適當。長期高濃度氧氣為危險因子。","C":"適當。第一、二期輕度多自行好轉。","D":"不適當(本題答案)。完全剝離手術未必能治癒(預後差)。"},"sources":["Nelson《兒科學》ROP","分期治療"]}},"112110-N4-52":{"quick":"26週早產兒維持體溫照護中「保溫箱溫度設定於28~30°C、濕度45~50%」為不適當。","detail":{"background":"極早早產兒(26週)保溫:『保溫箱溫度應設『較高(約34–36°C,依體重胎齡調整中性溫度)』、『濕度『較高(>60–70%)』』、加毛毯帽手腳套、塑膠單覆蓋、預熱輻射台。「『保溫箱『28–30°C、濕度45–50%』』『過低』——對26週極早早產兒不足以維持體溫(溫濕度都偏低)」,故不適當。本題「不適當」者為B。","options":{"A":"適當。毛毯包裹、戴帽、四肢穿戴保暖。","B":"不適當(本題答案)。26週早產兒保溫箱溫度28~30°C、濕度45~50%過低。","C":"適當。塑膠單/套覆蓋減散熱。","D":"適當。置於預熱輻射加溫台執行處置。"},"sources":["Nelson《兒科學》早產兒保溫","中性溫度"]}},"112180-N4-35":{"quick":"促進早產兒統整化行為的護理中「絕對避免觸摸或抱起早產兒,以免引起驚嚇反射」為不適當。","detail":{"background":"早產兒『發展性/統整化照護』:『袋鼠式護理(皮膚接觸)、輕柔音樂、包巾築巢(提供子宮般安全感、向中線屈曲)、減光減噪、集中護理』。「『『絕對避免觸摸或抱起』早產兒』不適當——適當的『溫柔觸摸、寧握、袋鼠式護理『有助』統整化與發展』,過度隔離反不利」。本題「不適當」者為C。","options":{"A":"適當。袋鼠式護理(皮膚接觸)。","B":"適當。清醒時播放輕柔音樂。","C":"不適當(本題答案)。不應絕對避免觸摸抱起(適當寧握/袋鼠式有助發展)。","D":"適當。包巾築巢提供子宮般安全感。"},"sources":["Nelson《兒科學》發展性照護","寧握"]}},"114170-N4-33":{"quick":"32週早產兒餵食中出現腹脹、吐奶和血便,最可能的併發症是「壞死性小腸結腸炎(NEC)」。","detail":{"background":"壞死性小腸結腸炎(NEC):早產兒(尤VLBW)腸道缺血/感染/餵食不耐所致的腸壞死,典型『餵食後『腹脹、胃殘餘量增、吐奶(含膽汁)、『血便』、腸蠕動減弱、腹壁紅、X光見腸壁積氣』』,嚴重可腸穿孔休克。本例32週早產兒餵食中腹脹吐奶血便,最可能為「壞死性小腸結腸炎(NEC)」(B)。處置:禁食、胃減壓、抗生素、必要時手術。","options":{"A":"新生兒黃疸表現為皮膚黃,非腹脹血便。","B":"正確。腹脹+吐奶+血便=壞死性小腸結腸炎(NEC)。","C":"RDS表現為呼吸窘迫,非腸胃症狀。","D":"ROP為視網膜病變,非腸胃症狀。"},"sources":["Nelson《兒科學》NEC","早產兒腸胃"]}},"102110-N4-50":{"quick":"巨嬰(4480g)左上臂神經叢麻痺症狀與照護正確的是「呈現左手無抓握? 」——本題答案B(維持外展外轉等姿勢)。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』=『頭皮『軟組織水腫』、界線不清、『可越過骨縫線』、出生時最明顯、『數天內』消退』;『頭血腫(cephalohematoma)』=『骨膜『下』『出血』、界線清楚、『『不』越過骨縫線』、可單或雙側、『出生後數小時–數天才漸明顯』、數週至數月吸收、可致黃疸』。臂神經叢麻痺(Erb麻痺)=肩難產/巨嬰致C5–6受損,患肢內收內旋、無Moro反射。顏面神經麻痺=產鉗壓迫致患側臉無力(眼不能閉、口角歪)。鎖骨骨折=巨嬰/難產,患側Moro不對稱、局部腫痛。 臂神經叢麻痺(Erb-Duchenne, C5–6):患肢『內收、內旋、肘伸直、腕屈曲(侍者小費手)』、『患側『Moro反射不對稱(消失)』,但『『抓握反射『存在』(手部正常)』』。照護:『維持患肢於『外展、外轉、肘屈曲、前臂後旋、腕微背屈』的『功能性姿勢(對抗變形)』』,並『早期溫和被動關節運動(不需等一個月)』。本題正確為「維持左側肩外展、外轉、肱屈曲、前臂後旋、腕微背屈曲姿勢」(B)。(A錯:抓握反射存在,且非腕內縮下垂為主要;C每2小時全關節運動過頻且時機;D不需等一個月。)","options":{"A":"錯。臂神經叢麻痺抓握反射『存在』(C5-6受損,手部正常)。","B":"正確。維持外展外轉肱屈曲前臂後旋腕微背屈的功能姿勢。","C":"「每2小時全關節運動」過頻,非標準。","D":"錯。應早期溫和被動運動,不需等一個月。"},"sources":["Nelson《兒科學》臂神經叢麻痺","功能姿勢"]}},"103100-N4-30":{"quick":"胎頭腫塊(Caput succedaneum,產瘤)特性敘述中「約6週後才自然消失」為錯誤——產瘤『數天內』消退。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』=『頭皮『軟組織水腫』、界線不清、『可越過骨縫線』、出生時最明顯、『數天內』消退』;『頭血腫(cephalohematoma)』=『骨膜『下』『出血』、界線清楚、『『不』越過骨縫線』、可單或雙側、『出生後數小時–數天才漸明顯』、數週至數月吸收、可致黃疸』。臂神經叢麻痺(Erb麻痺)=肩難產/巨嬰致C5–6受損,患肢內收內旋、無Moro反射。顏面神經麻痺=產鉗壓迫致患側臉無力(眼不能閉、口角歪)。鎖骨骨折=巨嬰/難產,患側Moro不對稱、局部腫痛。 產瘤(caput succedaneum):『頭皮『軟組織水腫』、『因頭皮受壓』形成、『可越過骨縫線』、『出生後『數天(約3–4天)內』自然消退』。「『約6週後才消失』錯誤——那較像『頭血腫(數週至數月)』,產瘤『數天』即消退」。本題「錯誤」者為「約6週後才自然消失」(D)。","options":{"A":"正確。產瘤為胎兒頭皮上軟組織水腫。","B":"正確。產瘤通常會越過顱骨縫合線。","C":"正確。因頭皮受壓形成水腫。","D":"錯誤(本題答案)。產瘤數天內消退,非6週。"},"sources":["Nelson《兒科學》產瘤","數天消退"]}},"103100-N4-54":{"quick":"「方形窗測試角度大於90度」不是鎖骨骨折的現象。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』=『頭皮『軟組織水腫』、界線不清、『可越過骨縫線』、出生時最明顯、『數天內』消退』;『頭血腫(cephalohematoma)』=『骨膜『下』『出血』、界線清楚、『『不』越過骨縫線』、可單或雙側、『出生後數小時–數天才漸明顯』、數週至數月吸收、可致黃疸』。臂神經叢麻痺(Erb麻痺)=肩難產/巨嬰致C5–6受損,患肢內收內旋、無Moro反射。顏面神經麻痺=產鉗壓迫致患側臉無力(眼不能閉、口角歪)。鎖骨骨折=巨嬰/難產,患側Moro不對稱、局部腫痛。 鎖骨骨折(巨嬰/肩難產)的徵象:『患側『Moro(驚嚇)反射『不對稱』(兩手臂動作不一致)』、『局部觸痛、腫脹、可摸到骨擦感』、『雙手臂不等長、肩部不等高』、患側上肢活動減少。「『方形窗測試角度>90度』是『早產兒『成熟度』』的評估,『與鎖骨骨折無關』」。本題不是鎖骨骨折現象者為D。","options":{"A":"是。驚嚇反射時兩手臂動作不對稱。","B":"是。患側局部觸痛或腫脹。","C":"是。雙手臂不等長、肩部不等高。","D":"本題答案(非鎖骨骨折)。方形窗>90度是成熟度評估。"},"sources":["Nelson《兒科學》鎖骨骨折","Moro不對稱"]}},"103100-N4-58":{"quick":"顏面神經麻痺(產鉗、左半邊臉無活動)護理措施中「若餵母奶宜將『健側』靠近乳房」為不適當。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』=『頭皮『軟組織水腫』、界線不清、『可越過骨縫線』、出生時最明顯、『數天內』消退』;『頭血腫(cephalohematoma)』=『骨膜『下』『出血』、界線清楚、『『不』越過骨縫線』、可單或雙側、『出生後數小時–數天才漸明顯』、數週至數月吸收、可致黃疸』。臂神經叢麻痺(Erb麻痺)=肩難產/巨嬰致C5–6受損,患肢內收內旋、無Moro反射。顏面神經麻痺=產鉗壓迫致患側臉無力(眼不能閉、口角歪)。鎖骨骨折=巨嬰/難產,患側Moro不對稱、局部腫痛。 顏面神經(CN VII)麻痺(產鉗壓迫):患側『臉部肌肉無力、哭時嘴歪向健側、患側『眼瞼不能閉合』、口角下垂流涎』。護理:『眼瞼不能閉合→『單眼眼罩/人工淚液保護患側眼角膜』』、『餵食宜用『軟、奶嘴洞大』的奶頭(吸吮無力)』、『吞嚥受損依醫囑鼻胃管灌食』、『哺乳時應將『『患側』靠近乳房』(讓功能較弱側貼乳房較易含住、或利於健側吸吮力)』。「『將『健側』靠近乳房』為要選出的『不適當』(應患側靠近乳房以利含乳)」。本題不適當者為C。","options":{"A":"適當。用質軟、奶嘴洞大的奶頭(吸吮無力)。","B":"適當。吞嚥受損依醫囑鼻胃管灌食。","C":"不適當(本題答案)。哺乳宜將『患側』靠近乳房(非健側)。","D":"適當。眼瞼不能閉合用單眼眼罩保護。"},"sources":["Nelson《兒科學》顏面神經麻痺","哺乳擺位"]}},"104100-N4-27":{"quick":"右側頭上界限清楚的紅色軟腫塊、產後第2天變大,是「頭血腫(cephalohematoma)」。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』=『頭皮『軟組織水腫』、界線不清、『可越過骨縫線』、出生時最明顯、『數天內』消退』;『頭血腫(cephalohematoma)』=『骨膜『下』『出血』、界線清楚、『『不』越過骨縫線』、可單或雙側、『出生後數小時–數天才漸明顯』、數週至數月吸收、可致黃疸』。臂神經叢麻痺(Erb麻痺)=肩難產/巨嬰致C5–6受損,患肢內收內旋、無Moro反射。顏面神經麻痺=產鉗壓迫致患側臉無力(眼不能閉、口角歪)。鎖骨骨折=巨嬰/難產,患側Moro不對稱、局部腫痛。 本例『界線『清楚』、『出生後逐漸『變大(出生後數小時–數天才明顯)』』』→符合『頭血腫(cephalohematoma)』(骨膜下出血、界線清楚、不越骨縫線、數週至數月吸收、可致黃疸)。『產瘤(caput)』則界線『不清、出生時最大、數天消退』。本題為「頭血腫」(C)。","options":{"A":"胎頭畸形/變形(molding)為頭骨重疊,非腫塊變大。","B":"胎頭腫塊(產瘤)界線不清、出生時最大後消退。","C":"正確。界線清楚、產後變大=頭血腫。","D":"腦水腫非此局部頭皮腫塊表現。"},"sources":["Nelson《兒科學》頭血腫","界線清楚"]}},"104100-N4-43":{"quick":"可評估是否有臂神經叢受損的新生兒反射檢查是「擁抱反射(Moro reflex)」。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』=『頭皮『軟組織水腫』、界線不清、『可越過骨縫線』、出生時最明顯、『數天內』消退』;『頭血腫(cephalohematoma)』=『骨膜『下』『出血』、界線清楚、『『不』越過骨縫線』、可單或雙側、『出生後數小時–數天才漸明顯』、數週至數月吸收、可致黃疸』。臂神經叢麻痺(Erb麻痺)=肩難產/巨嬰致C5–6受損,患肢內收內旋、無Moro反射。顏面神經麻痺=產鉗壓迫致患側臉無力(眼不能閉、口角歪)。鎖骨骨折=巨嬰/難產,患側Moro不對稱、局部腫痛。 『擁抱(摩洛)反射(Moro)』需『雙上肢『對稱』外展再內收』;『臂神經叢(Erb)麻痺』時『患側上肢無力→『Moro反射『不對稱』(患側手臂不動)』』,故『以Moro反射可評估臂神經叢是否受損』。手掌抓握、頸部強直、踏步反射非用於評估臂神經叢。本題為「擁抱反射(Moro)」(B)。","options":{"A":"手掌抓握反射評估手部抓握,臂神經叢麻痺時抓握仍在。","B":"正確。Moro反射不對稱可評估臂神經叢受損。","C":"頸部強直反射非評估臂神經叢。","D":"踏步反射評估下肢,非臂神經叢。"},"sources":["Nelson《兒科學》Moro","臂神經叢"]}},"106030-N4-28":{"quick":"對胎頭腫塊(Caput,產瘤)最適宜的解釋是「這腫塊出生後數天會自行消失,不用擔心」。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』=『頭皮『軟組織水腫』、界線不清、『可越過骨縫線』、出生時最明顯、『數天內』消退』;『頭血腫(cephalohematoma)』=『骨膜『下』『出血』、界線清楚、『『不』越過骨縫線』、可單或雙側、『出生後數小時–數天才漸明顯』、數週至數月吸收、可致黃疸』。臂神經叢麻痺(Erb麻痺)=肩難產/巨嬰致C5–6受損,患肢內收內旋、無Moro反射。顏面神經麻痺=產鉗壓迫致患側臉無力(眼不能閉、口角歪)。鎖骨骨折=巨嬰/難產,患側Moro不對稱、局部腫痛。 產瘤(caput succedaneum,胎頭腫塊):『因產道擠壓使頭皮『軟組織水腫』、界線不清、可越骨縫線』,屬『良性、『出生後數天會自行消退、不需治療』』。最適宜解釋為「『出生後數天會自行消失,不用擔心』」(B)。選項C「界限『清楚』」是頭血腫的描述(產瘤界線不清);D「可能顱內出血黃疸合併症」是頭血腫的考量(產瘤少有),不宜對產瘤如此解釋。本題最適宜為B。","options":{"A":"非器械所致(產瘤是產道擠壓),且不需推給醫生。","B":"正確。產瘤出生後數天自行消失,不用擔心。","C":"「界限清楚」是頭血腫描述,產瘤界線不清。","D":"顱內出血/黃疸合併症是頭血腫考量,非產瘤。"},"sources":["Nelson《兒科學》產瘤","衛教"]}},"108110-N4-28":{"quick":"頭頂局部軟組織腫脹、觸診鬆軟且外緣界線不清,正確判斷為「胎頭腫塊(產瘤),為頭皮上軟組織水腫」。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』=『頭皮『軟組織水腫』、界線不清、『可越過骨縫線』、出生時最明顯、『數天內』消退』;『頭血腫(cephalohematoma)』=『骨膜『下』『出血』、界線清楚、『『不』越過骨縫線』、可單或雙側、『出生後數小時–數天才漸明顯』、數週至數月吸收、可致黃疸』。臂神經叢麻痺(Erb麻痺)=肩難產/巨嬰致C5–6受損,患肢內收內旋、無Moro反射。顏面神經麻痺=產鉗壓迫致患側臉無力(眼不能閉、口角歪)。鎖骨骨折=巨嬰/難產,患側Moro不對稱、局部腫痛。 本例『軟組織腫脹、鬆軟、『外緣界線『不清』』』→符合『產瘤(胎頭腫塊, caput succedaneum)=頭皮『軟組織水腫』、可越骨縫線、數天消退』。選項A把產瘤誤為「骨膜與顱骨間血液聚集」(那是頭血腫);C/D把它當頭血腫(會越骨縫線、24–48小時消失)亦錯(頭血腫『不』越骨縫線、數週才消)。本題正確為「胎頭腫塊(產瘤),為頭皮上軟組織水腫」(B)。","options":{"A":"錯。產瘤是軟組織水腫,非骨膜與顱骨間血液聚集(那是頭血腫)。","B":"正確。界線不清的軟組織水腫=產瘤(胎頭腫塊)。","C":"錯。頭血腫『不』越過縫合線。","D":"錯。頭血腫數週才吸收,非24~48小時消失。"},"sources":["Nelson《兒科學》產瘤","界線不清"]}},"115030-N4-17":{"quick":"新生兒頭顱血腫(cephalohematoma)敘述中「通常於出生當時最明顯,隨後逐漸變小」為錯誤。","detail":{"background":"產傷頭部腫塊鑑別:『產瘤(胎頭腫塊, caput succedaneum)』=『頭皮『軟組織水腫』、界線不清、『可越過骨縫線』、出生時最明顯、『數天內』消退』;『頭血腫(cephalohematoma)』=『骨膜『下』『出血』、界線清楚、『『不』越過骨縫線』、可單或雙側、『出生後數小時–數天才漸明顯』、數週至數月吸收、可致黃疸』。臂神經叢麻痺(Erb麻痺)=肩難產/巨嬰致C5–6受損,患肢內收內旋、無Moro反射。顏面神經麻痺=產鉗壓迫致患側臉無力(眼不能閉、口角歪)。鎖骨骨折=巨嬰/難產,患側Moro不對稱、局部腫痛。 頭血腫(cephalohematoma):『顱頂骨與『骨膜』間血管破裂出血、『不』越過骨縫線、可單或雙側、可因紅血球分解致『生理性黃疸』』;「『出生『當時』最明顯』錯誤——頭血腫是『出生後『數小時至數天』才『逐漸變『大/明顯』』(因持續出血),之後數週至數月才吸收』」(出生當時最明顯、隨後變小的是『產瘤』)。本題「錯誤」者為D。","options":{"A":"正確。紅血球分解可引發生理性黃疸。","B":"正確。可能為單側或雙側。","C":"正確。與顱頂骨與骨膜間血管破裂有關。","D":"錯誤(本題答案)。頭血腫出生後數天才漸明顯,非當時最明顯後變小。"},"sources":["Nelson《兒科學》頭血腫","病程"]}},"101110-N4-69":{"quick":"純母乳、出生第3天體重由3000降為2850g(降5%),最恰當回答是「3~4天內5~10%生理性體重喪失,在正常範圍,不需特別處理」。","detail":{"background":"新生兒出生後『生理性體重減輕』:出生3–4天內因『水分喪失(無感性蒸發、排尿排便排出胎便)、初期吸奶量少』,體重下降『約5–10%(<10%)』,約『出生7–10天恢復出生體重』,屬正常生理現象,『增加哺餵次數』即可。 本例『3000→2850g(下降150g約『5%』)』,在『生理性體重喪失(5–10%)正常範圍內』,『不需特別處理』,增加哺餵即可。本題最恰當為C;不需添加母乳代用品(A)、非「沒食慾正常」的籠統說法(B)、未達需查血糖之低血糖(D)。","options":{"A":"錯。屬正常生理性體重喪失,不需添加母乳代用品。","B":"籠統且歸因不當(非沒食慾,是生理性水分喪失)。","C":"正確。5~10%生理性體重喪失,正常範圍,不需特別處理。","D":"非低血糖情境,不需查血糖。"},"sources":["Nelson《兒科學》生理性體重喪失","母乳哺餵"]}},"102110-N4-27":{"quick":"新生兒溢奶(賁門括約肌鬆)最正確處理是「使嬰兒身體及頭頸部側臥,協助清除口腔分泌物或黏液」。","detail":{"background":"新生兒溢奶/吐奶處理(防吸入):因『賁門(下食道)括約肌鬆弛』易溢奶。發生時應「『將嬰兒『側臥(身體與頭頸同向側臥)』,清除口腔分泌物/黏液』,防止溢出物吸入呼吸道」。平放搖高床頭、立即直立拍背安撫非首要(溢奶當下重點是防吸入而非安撫);不需常規甦醒器給100%氧(非缺氧情境)。本題最正確為「側臥並清除口腔分泌物」(C)。","options":{"A":"立即直立拍背非溢奶當下防吸入的首要。","B":"平放搖高床頭非防吸入首選。","C":"正確。側臥並清除口腔分泌物/黏液(防吸入)。","D":"非缺氧情境,不需甦醒器給100%氧。"},"sources":["Nelson《兒科學》溢奶","側臥"]}},"103100-N4-32":{"quick":"足月第2天3000g、1天哺餵8次配方奶,每次約需「62~68 c.c.」符合熱量需求。","detail":{"background":"新生兒奶量計算:每日熱量需求約『110–120 kcal/kg/天』,標準配方奶『約67 kcal/100mL(0.67 kcal/mL)』。本例3kg×120≈360 kcal? 應為3kg×約120=『360』? 修正:足月新生兒每日約120kcal/kg→3×120=360...實際每日總奶量≈體重×約150–180mL/kg(漸增);以熱量法:每日約『3kg×120kcal=360』? 按官方答案每次62–68cc×8次≈496–544cc/天,對應約每日165–180mL/kg(第2天漸增量)。本題每次約「62~68 c.c.」(B)。","options":{"A":"50~55cc偏低。","B":"正確。每次約62~68cc(8次/天符合熱量需求)。","C":"70~76cc偏高。","D":"80~86cc過高。"},"sources":["Nelson《兒科學》奶量計算","熱量需求"]}},"103100-N4-51":{"quick":"嬰幼兒腸胃道生理功能正確的是「因澱粉酶、脂肪酶、胰蛋白酶不足,而增加腹脹與腹瀉機會」。","detail":{"background":"嬰幼兒腸胃道:(1)『胃容量小、胃排空『快』、腸蠕動『快』→少量多餐』(故A「腸蠕動緩慢」錯);(2)『出生『24小時內』解墨綠黏稠胎便』(故B「24小時『後』」不精準);(3)『新生兒腸道長度約身長『6倍』(成人約4倍),腹瀉易脫水』(故C「10倍」錯);(4)「『嬰兒『澱粉酶、脂肪酶、胰蛋白酶『不足(尚未成熟)』』→消化能力差、增『腹脹腹瀉』機會」——正確。本題正確為D。","options":{"A":"錯。嬰幼兒胃排空與腸蠕動『快』,非緩慢。","B":"出生24小時『內』解胎便(非24小時後)。","C":"錯。腸道約身長6倍(非10倍)。","D":"正確。消化酶不足增加腹脹與腹瀉機會。"},"sources":["Nelson《兒科學》嬰幼兒腸胃","消化酶"]}},"104030-N4-74":{"quick":"嬰幼兒消化系統特性中「新生兒1~2週大時即會嘗試自主控制吞嚥,故有生理性流涎」為錯誤。","detail":{"background":"嬰幼兒消化:『賁門括約肌鬆易溢奶』、『3個月前缺胰澱粉酶,澱粉消化困難』、『2歲前胃呈圓形水平位、餵後採直立防溢奶』皆正確。「『自主控制吞嚥』約在『3–4個月(非1–2週)』才發展(伴生理性流涎),故「1–2週大即自主控制吞嚥」錯誤」(新生兒吞嚥是『反射性』)。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。自主控制吞嚥約3~4個月(非1~2週);新生兒為反射性吞嚥。","B":"正確。賁門括約肌鬆弛易溢奶。","C":"正確。3個月前缺澱粉酶,澱粉消化困難。","D":"正確。2歲前胃呈圓形水平,餵後直立防溢奶。"},"sources":["Nelson《兒科學》嬰幼兒消化","吞嚥發展"]}},"106110-N4-27":{"quick":"出生2個月、5公斤、每4小時餵一次,每次應餵「150 c.c.」。","detail":{"background":"奶量計算:每日熱量約『110–120 kcal/kg』,配方奶約67kcal/100mL。5kg×120≈600kcal÷0.67≈『895mL/天』;每4小時一次=『6次/天』,每次約895÷6≈『149≈150 mL』。本題每次約「150 c.c.」(B)。","options":{"A":"120cc偏低。","B":"正確。每次約150cc(每4小時一次,6次/天)。","C":"180cc偏高。","D":"210cc過高。"},"sources":["Nelson《兒科學》奶量計算","每日熱量"]}},"106110-N4-73":{"quick":"嬰兒吞嚥攝食生理特性中「嬰兒3~4週大時即會嘗試自主控制吞嚥動作」為錯誤。","detail":{"background":"嬰兒吞嚥攝食:『新生兒以『吸吮反射＋吞嚥反射』(反射性)攝食』、『下食道括約肌鬆易溢奶』、『自發性吸吮反射約4個月消失』皆正確。「『自主控制吞嚥』約在『3–4個『月』』才發展(非3–4『週』)」,故「3–4週即自主控制吞嚥」錯誤。本題「錯誤」者為B。","options":{"A":"正確。新生兒藉吸吮反射及吞嚥反射攝食。","B":"錯誤(本題答案)。自主控制吞嚥約3~4個『月』(非週)。","C":"正確。下食道括約肌鬆弛易溢奶。","D":"正確。自發性吸吮反射約4個月大消失。"},"sources":["Nelson《兒科學》吞嚥發展","吸吮反射"]}},"107030-N4-26":{"quick":"出生3天足月、出生3000g、純母乳,營養評估結果『異常』的是「體重為2500公克」。","detail":{"background":"新生兒出生後『生理性體重減輕』:出生3–4天內因『水分喪失(無感性蒸發、排尿排便排出胎便)、初期吸奶量少』,體重下降『約5–10%(<10%)』,約『出生7–10天恢復出生體重』,屬正常生理現象,『增加哺餵次數』即可。 本例出生3000g、第3天:正常生理性體重喪失『<10%(即不低於約2700g)』。「『體重2500g』=下降『約17%(>10%)』,『異常』(脫水/攝取不足)」。其餘正常:大便鬆軟黃綠色(母乳便)、一天≥3次厚重濕尿片(攝取足)、吃飽後尋乳反射變弱。本題異常者為「體重2500公克」(A)。","options":{"A":"正確(異常)。降至2500g(下降約17%>10%)異常。","B":"正常。大便鬆軟黃綠色(母乳便)。","C":"正常。一天3次厚重濕尿片(攝取足夠)。","D":"正常。吃飽後尋乳反射變弱。"},"sources":["Nelson《兒科學》生理性體重喪失","異常判讀"]}},"110110-N4-19":{"quick":"初乳價值正確的是「初乳可促進胎便排出、減少膽紅素再吸收,可減少黃疸機率」。","detail":{"background":"初乳(colostrum):『黃黏稠、量少但營養與免疫(IgA)豐富,『正是新生兒所需』』,不應擠掉。(1)「『初乳有『輕瀉』作用、促『胎便排出』、減少膽紅素『腸肝循環再吸收』→減少黃疸機率」——正確;(2)『初乳『含脂肪』(非不含)』,故B錯;(3)『初乳富含的抗體主要是『IgA』(非IgM)』,故C錯;(4)『初乳『維生素K含量仍少』,新生兒『仍需『肌注維生素K1』』防出血』,故D「仍有防止出血功用」不精確。本題正確為A。","options":{"A":"正確。初乳促胎便排出、減膽紅素再吸收、減少黃疸。","B":"錯。初乳含脂肪(非不含)。","C":"錯。初乳富含的抗體是IgA,非IgM。","D":"初乳維生素K少,新生兒仍需肌注維生素K1。"},"sources":["Nelson《兒科學》初乳","黃疸預防"]}},"110110-N4-29":{"quick":"新生兒腸胃系統及排泄敘述中「出生後『12小時』內未解胎便應通知醫師」為錯誤。","detail":{"background":"新生兒排泄:『出生3–4天體重降5–10%稱生理性脫水/體重喪失』、『出生3–4天後因哺餵解『過渡便』』、『賁門括約肌未成熟避免餵太飽』皆正確。胎便:『正常於『出生24小時內』解出,若『『24–48小時』仍未解胎便』才需通知醫師檢查(如先天性巨結腸、肛門閉鎖)』。故「『12小時』內未解胎便應通知醫師」錯誤(門檻為24–48小時)。本題「錯誤」者為B。","options":{"A":"正確。出生3~4天體重下降5~10%(生理性)。","B":"錯誤(本題答案)。約24~48小時未解胎便才需通知醫師,非12小時。","C":"正確。出生3~4天後因哺餵解過渡便。","D":"正確。賁門括約肌未成熟,避免餵太飽。"},"sources":["Nelson《兒科學》胎便","排泄"]}},"111030-N4-51":{"quick":"正常新生兒消化系統特徵中「胃排空時間約6小時」為錯誤——新生兒胃排空約2~3小時。","detail":{"background":"新生兒消化系統:『唾液分泌量少(澱粉酶不足)』、『賁門括約肌不成熟易溢奶』、『出生24小時內排出胎便』皆正確。「『胃排空時間約『2–3小時』(母乳更快)』,故「約6小時」錯誤」(胃排空快,故需少量多餐、約2–3小時餵一次)。本題「錯誤」者為「胃排空時間約6小時」(C)。","options":{"A":"正確。新生兒唾液分泌量少。","B":"正確。賁門括約肌不成熟。","C":"錯誤(本題答案)。新生兒胃排空約2~3小時,非6小時。","D":"正確。出生24小時內排出胎便。"},"sources":["Nelson《兒科學》新生兒消化","胃排空"]}},"112030-N4-20":{"quick":"母乳營養素作用中「酪蛋白可加強脂溶性維生素在腸胃道吸收的比例」為錯誤。","detail":{"background":"母乳營養素作用:『寡糖(益生質)避免致病菌黏附腸道』、『中長鏈不飽和脂肪酸(DHA/AA)助視網膜與腦發育』、『乳鐵蛋白與鐵結合、抑制需鐵細菌生長並助鐵吸收』皆正確。「『加強『脂溶性維生素』腸道吸收的是『『脂肪(脂肪酶/膽鹽)』』,非『酪蛋白』』」,故「酪蛋白加強脂溶性維生素吸收」錯誤。本題「錯誤」者為D。","options":{"A":"正確。寡糖避免致病菌黏附腸胃道。","B":"正確。中長鏈不飽和脂肪酸助視網膜發展。","C":"正確。乳鐵蛋白與鐵結合,避免鐵被細菌利用。","D":"錯誤(本題答案)。加強脂溶性維生素吸收的是脂肪,非酪蛋白。"},"sources":["Nelson《兒科學》母乳營養","乳鐵蛋白"]}},"112030-N4-29":{"quick":"正常新生兒出生4~6小時內,最主要的能量來源為「葡萄糖」。","detail":{"background":"新生兒出生即刻能量:出生後最初數小時,主要靠『『肝醣分解產生的『葡萄糖』』』維持血糖(故需儘早餵食防低血糖);之後動用『棕色脂肪(非顫抖產熱)』與脂肪酸。題目問『最主要『能量來源』』於出生4–6小時內為『葡萄糖(血糖)』。本題為「葡萄糖」(A);棕色脂肪主要供『產熱』而非主要能量來源。","options":{"A":"正確。出生4~6小時內最主要能量來源為葡萄糖(肝醣分解)。","B":"胺基酸非最主要能量來源。","C":"脂肪酸為後續能量,非出生即刻主要。","D":"棕色脂肪主要供產熱,非主要能量來源。"},"sources":["Nelson《兒科學》新生兒代謝","葡萄糖"]}},"112110-N4-23":{"quick":"初乳敘述中「脂肪和醣類的含量較高,少量但熱量足」為不適當。","detail":{"background":"初乳(colostrum)vs成熟乳:『初乳『蛋白質與礦物質『高』』、『脂肪與醣(乳糖)『較『低』』』、『水分較成熟乳低(濃稠、適合新生兒小胃容量)』、『富含免疫球蛋白IgA與益生質(促腸道好菌)』。「『初乳『脂肪和醣類含量較高』』『不適當/錯誤』——初乳脂肪與醣類『較成熟乳『低』』」。本題「不適當」者為B。","options":{"A":"適當。初乳蛋白質和礦物質含量較成熟乳高。","B":"不適當(本題答案)。初乳脂肪與醣類較『低』,非較高。","C":"適當。水分較成熟乳低,適合新生兒胃容量。","D":"適當。含豐富促腸道好菌的益生質。"},"sources":["Nelson《兒科學》初乳","成分"]}},"113180-N4-19":{"quick":"較『無法』改善新生兒溢奶的措施是「餵食後採左側臥」。","detail":{"background":"改善新生兒溢奶措施:『漸進式增加奶量、避免過度餵食、『餵食後協助排氣(拍嗝)』、餵後採『右側臥或頭高(促胃排空、防胃內容物逆流)』』。「『餵食後採『左側臥』』『較無法改善』溢奶——『右側臥』才促胃排空、減溢奶;左側臥不利胃排空」。本題較無法改善者為「餵食後採左側臥」(C)。","options":{"A":"可改善。漸進式增加奶量。","B":"可改善。餵食後協助排氣(拍嗝)。","C":"正確(較無法改善)。應採右側臥/頭高,左側臥不利胃排空。","D":"可改善。避免過度餵食。"},"sources":["Nelson《兒科學》溢奶","右側臥"]}},"114030-N4-19":{"quick":"純母乳、出生3900g、第3天降為3700g(降5%),最適合指導是「正常生理性體重流失,增加哺餵次數會慢慢恢復,不必太擔憂」。","detail":{"background":"新生兒出生後『生理性體重減輕』:出生3–4天內因『水分喪失(無感性蒸發、排尿排便排出胎便)、初期吸奶量少』,體重下降『約5–10%(<10%)』,約『出生7–10天恢復出生體重』,屬正常生理現象,『增加哺餵次數』即可。 本例『3900→3700g(降200g約『5%』)』,屬『生理性體重流失正常範圍』,『增加哺餵次數即會慢慢恢復(約7–10天回出生體重)』,不需過度擔憂或檢查。本題最適合為D;非腸胃吸收不佳(A)、非生理性黃疸需抽血(B)、非母乳不足需多喝水(C)。","options":{"A":"錯。屬正常生理性流失,非腸胃吸收不佳需檢查。","B":"錯。非黃疸所致,不需立即抽血。","C":"錯。非母乳不足,過度歸因。","D":"正確。生理性體重流失,增加哺餵會慢慢恢復。"},"sources":["Nelson《兒科學》生理性體重喪失","衛教"]}},"114100-N4-17":{"quick":"新生兒一週內生理性體重減輕的常見原因,「除外」的是「吐奶次數增加」。","detail":{"background":"新生兒出生後『生理性體重減輕』:出生3–4天內因『水分喪失(無感性蒸發、排尿排便排出胎便)、初期吸奶量少』,體重下降『約5–10%(<10%)』,約『出生7–10天恢復出生體重』,屬正常生理現象,『增加哺餵次數』即可。 生理性體重減輕的常見原因:『『無感性(不顯性)水分喪失』、『糞便(胎便)與尿液排出』、『出生初期吸奶量少』』。「『『吐奶(溢奶)次數增加』『不是』生理性體重減輕的常見原因」(吐奶過多屬病態,非生理性體重下降的正常機轉)。本題「除外(非原因)」者為「吐奶次數增加」(D)。","options":{"A":"是原因。無感性水分喪失。","B":"是原因。糞便及尿液排出。","C":"是原因。剛出生吸奶量少。","D":"本題答案(除外)。吐奶次數增加非生理性體重減輕常見原因。"},"sources":["Nelson《兒科學》生理性體重喪失","原因"]}},"115030-N4-19":{"quick":"新生兒出生時維生素K缺乏的原因中「腸道的吸收能力尚未成熟」為錯誤(本題要選)。","detail":{"background":"新生兒維生素K缺乏(易致新生兒出血性疾病)的原因:『出生時『腸道『無菌』、腸道菌叢未建立』→無法由腸道細菌『合成』維生素K』、『肝臟功能未成熟(凝血因子合成不足)』、『維生素K『脂溶性、不易經胎盤由母體到胎兒』(故出生時儲存少)』。「『『腸道吸收能力未成熟』』不是維生素K缺乏的主因——主因是『腸道菌叢未建立無法合成』與胎盤通透差、肝未成熟」,故為要選出的錯誤敘述。本題「錯誤」者為D。故新生兒須肌注維生素K1預防出血。","options":{"A":"是原因。腸道菌叢不足無法合成維生素K。","B":"是原因。肝臟功能尚未成熟。","C":"是原因。維生素K脂溶性不易經胎盤進入胎兒。","D":"錯誤(本題答案)。維生素K缺乏主因非腸道吸收能力未成熟。"},"sources":["Nelson《兒科學》維生素K缺乏","新生兒出血"]}},"101030-N4-60":{"quick":"母為B肝帶原且e抗原陽性,新生兒應於出生「24小時內」注射B型肝炎免疫球蛋白(HBIG)。","detail":{"background":"B型肝炎母嬰垂直傳染預防:母為HBsAg(+)尤『e抗原(HBeAg)陽性』(高傳染力),新生兒須「『出生『24小時內(愈早愈好)』『同時』注射『B肝免疫球蛋白(HBIG)』(被動免疫)＋第一劑B肝疫苗(主動免疫)』」,並依時程完成疫苗。本題HBIG注射時機為「24小時內」(A)。","options":{"A":"正確。出生24小時內注射B肝免疫球蛋白(HBIG)。","B":"24~48小時過晚(應24小時內愈早愈好)。","C":"一週後過晚。","D":"滿一個月過晚。"},"sources":["Nelson《兒科學》B肝母嬰預防","HBIG"]}},"101030-N4-70":{"quick":"先天性甲狀腺功能低下敘述正確的是「須觀察甲狀腺素副作用,如躁動不安、心搏過速等」。","detail":{"background":"先天性甲狀腺功能低下(CH):新生兒篩檢(出生48小時後採足跟血測TSH);若未及早治療→生長遲滯、智能障礙(呆小症)。(1)『出生時身高體重多『正常或略大』(非比正常低)』,故A錯;(2)『篩檢採血需『出生48小時後』(非24小時內,過早TSH生理性高易偽陽性)』,故B錯;(3)『以L-thyroxine治療『『需終生(長期)』』』(非改善後一週停),故C錯;(4)「『須觀察甲狀腺素『過量』副作用:『躁動不安、心搏過速、體溫上升、體重下降等』」——正確。本題正確為D。","options":{"A":"錯。出生時身高體重多正常,非比正常低。","B":"錯。篩檢採血應出生48小時後(非24小時內)。","C":"錯。L-thyroxine需長期(終生)治療。","D":"正確。觀察甲狀腺素副作用(躁動、心搏過速)。"},"sources":["Nelson《兒科學》先天性甲狀腺低下","L-thyroxine"]}},"102030-N4-54":{"quick":"早產兒短暫疼痛(打疫苗、扎足跟)處理正確的是「提供非營養性吸吮、口服蔗糖溶液及寧握等減痛措施」。","detail":{"background":"新生兒/早產兒疼痛處置:『早產兒『能』感受疼痛』,短暫操作性疼痛宜用『非藥物減痛:『非營養性吸吮(安撫奶嘴)、口服『蔗糖(sucrose)溶液』、『寧握(facilitated tucking)、母乳/肌膚接觸、包巾』』』(短暫疼痛不需常規給止痛藥物)。本題正確為「非營養性吸吮、口服蔗糖溶液及寧握」(B);不在餵奶後立即採血(防溢吐吸入)、不選熟睡時打擾(應減痛而非趁睡)。本題為B。","options":{"A":"短暫操作性疼痛不需常規給止痛藥物(用非藥物減痛)。","B":"正確。非營養性吸吮、口服蔗糖、寧握等減痛措施。","C":"錯。不宜餵奶後立即採血(防溢吐吸入)。","D":"錯。不應趁熟睡注射(應用減痛措施)。"},"sources":["Nelson《兒科學》新生兒疼痛","蔗糖減痛"]}},"102110-N4-24":{"quick":"巨嬰(4500公克)臨床上應特別注意「低血糖」。","detail":{"background":"巨嬰(macrosomia,≥4000g,常見於『妊娠糖尿病』母親):胎兒長期高血糖→胎兒『高胰島素血症』→『出生後母體血糖中斷、高胰島素持續→『低血糖(hypoglycemia)』』,須密切監測血糖、儘早餵食。另巨嬰易產傷(肩難產、鎖骨骨折、臂神經叢麻痺)、紅血球增多、低血鈣。本題應特別注意「低血糖」(B);非高血糖。","options":{"A":"錯。是低血糖(高胰島素血症),非高血糖。","B":"正確。巨嬰(尤糖尿病母)應特別注意低血糖。","C":"高血壓非巨嬰特別注意項目。","D":"低體溫非巨嬰的首要注意(低血糖才是)。"},"sources":["Nelson《兒科學》巨嬰","低血糖"]}},"103030-N4-27":{"quick":"妊娠糖尿病孕婦的新生兒,護理師應優先注意「低血糖」。","detail":{"background":"妊娠糖尿病母親的新生兒:胎兒長期暴露母體高血糖→『胎兒高胰島素血症』→出生後血糖來源中斷而高胰島素持續→『新生兒『低血糖』(優先注意,可致抽搐、腦損)』。另易巨嬰、產傷、紅血球增多、低血鈣、黃疸、RDS。本題應優先注意「低血糖」(B)。","options":{"A":"黃疸雖可能,但『優先』是低血糖。","B":"正確。妊娠糖尿病新生兒應優先注意低血糖。","C":"貧血非首要(反易紅血球增多)。","D":"體溫過低非首要(低血糖才是)。"},"sources":["Nelson《兒科學》糖尿病母嬰","低血糖"]}},"103030-N4-30":{"quick":"出生第10天舌頭口腔黏膜白色物無法輕易刮除、拒吸奶,最適當回應是「可能為鵝口瘡,應就醫配合藥物治療」。","detail":{"background":"鵝口瘡(oral thrush,白色念珠菌感染):『舌與口腔黏膜『白色乳凝塊狀斑膜、『不易刮除』(強行刮除會出血)』、可致拒食疼痛』。處置:『就醫,以『抗黴菌藥(nystatin懸浮液塗抹/口服)』治療』,並消毒奶嘴奶瓶。「『無法輕易刮除』與『奶垢(可輕易去除)』不同」,不應只當奶垢或過敏觀察。本題最適當為「可能鵝口瘡,就醫配合藥物治療」(D)。","options":{"A":"錯。鵝口瘡不易刮除(奶垢才可輕易去除)。","B":"非暫時性過敏,不應只觀察2天。","C":"清潔奶具雖需做,但應就醫用抗黴菌藥治療。","D":"正確。可能鵝口瘡,應就醫配合(nystatin)藥物治療。"},"sources":["Nelson《兒科學》鵝口瘡","念珠菌"]}},"103030-N4-57":{"quick":"新生兒胎便吸入症候群敘述中「胎頭與肩部娩出後,立刻給氧氣袋加壓協助呼吸」為錯誤。","detail":{"background":"胎便吸入症候群(MAS,多見足月/過期產、羊水有胎便):『皮膚指甲臍帶『胎便染色(黃綠)』、出生即呼吸急促困難』。處置原則:「『若新生兒『無活力(呼吸抑制)』,娩出後應『先抽吸清除呼吸道胎便『再』給正壓通氣』』,『不可在清除前『立即以氧氣袋『加壓』(會把胎便壓入更深致阻塞/肺炎)』」,故「胎頭肩部娩出後立刻加壓給氧」錯誤。本題「錯誤」者為D。","options":{"A":"正確。皮膚指甲臍帶有胎便染色呈黃綠色。","B":"正確。絕大多數發生在足月或過期產。","C":"正確。出生時即有呼吸急促、困難。","D":"錯誤(本題答案)。應先抽吸清除胎便再通氣,不可立即加壓給氧。"},"sources":["Nelson《兒科學》胎便吸入症候群","抽吸"]}},"103100-N4-33":{"quick":"孕婦感染淋病未治療,新生兒出生時可能感染「新生兒眼炎(淋菌性結膜炎)」。","detail":{"background":"淋病(淋病雙球菌)母嬰垂直感染:新生兒經產道時感染→『『新生兒淋菌性結膜炎(眼炎, ophthalmia neonatorum)』』,出生2–5天出現膿性分泌物,嚴重可致角膜潰瘍失明。預防:『出生後點『紅黴素(或四環黴素)眼藥膏』』。本題可能感染為「新生兒眼炎」(A)。","options":{"A":"正確。淋病母嬰感染致新生兒眼炎(淋菌性結膜炎)。","B":"鵝口瘡是念珠菌,非淋病。","C":"肺炎非淋病的典型新生兒表現(披衣菌才較常致肺炎)。","D":"皮膚炎非淋病典型表現。"},"sources":["Nelson《兒科學》淋菌性結膜炎","新生兒眼炎"]}},"104100-N4-74":{"quick":"兒童A型肝炎敘述中「早期時會出現黃疸現象」為錯誤。","detail":{"background":"A型肝炎(HAV,糞口傳染):『潛伏期約2–4週、急性期『前驅期『症狀如感冒(發燒倦怠食慾差噁心)』』,『黃疸出現於『前驅期『之後』(黃疸前期→黃疸期)』,並非『早期(一發病初期)』即出現黃疸』;飲食宜『高蛋白、低脂肪、高熱量』。故「『早期』時會出現黃疸」錯誤(黃疸在前驅症狀之後才出現)。本題「錯誤」者為C。","options":{"A":"正確。A肝為糞口途徑傳染。","B":"正確。急性(前驅)期症狀如感冒。","C":"錯誤(本題答案)。黃疸在前驅症狀之後出現,非早期即出現。","D":"正確。飲食宜高蛋白、低脂肪。"},"sources":["Nelson《兒科學》A型肝炎","病程"]}},"105030-N4-54":{"quick":"42週(過期)、羊水有胎便,維持呼吸道通暢正確的是「胎頭娩出時即用DeLee’s tube對鼻咽及口腔抽吸」。","detail":{"background":"胎便染色羊水的呼吸道處理:傳統做法『於『胎頭娩出、肩部尚未娩出時』即以『DeLee氏導管(DeLee’s tube)』抽吸『口咽與鼻咽』的胎便』(減少吸入);若新生兒無活力再氣管內抽吸。「『胎頭娩出時即用DeLee’s tube抽吸鼻咽口腔』」為正確。不可完全產出即『立即加壓給氧(會把胎便壓入深處)』、不在嬰兒室注入生理食鹽水清洗。本題正確為A。","options":{"A":"正確。胎頭娩出時即用DeLee’s tube抽吸鼻咽口腔胎便。","B":"錯。不可完全產出即立即加壓給氧(壓入胎便)。","C":"錯。不在鼻咽口腔注入生理食鹽水清洗。","D":"氣管內管正壓給氧非首要(先清除胎便)。"},"sources":["Nelson《兒科學》胎便染色","DeLee抽吸"]}},"105090-N4-66":{"quick":"G6PD缺乏症敘述中「主要由父親傳給小孩,以女嬰居多」為錯誤。","detail":{"background":"葡萄糖-6-磷酸去氫酶(G6PD)缺乏症(蠶豆症):『『X染色體性聯隱性遺傳』→『主要由『母親(帶因者)』傳給『男嬰』(男嬰只有一個X,『男性發病居多』)』』。故「『由『父親』傳給小孩、『女嬰』居多』錯誤」(應為母傳、男嬰居多)。臨床:接觸氧化物質(蠶豆、樟腦丸、磺胺/解熱鎮痛劑如aspirin、抗瘧/抗痙攣藥)→『溶血性貧血、高膽紅素血症』;發燒避免aspirin、避免蠶豆與樟腦。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。X性聯隱性,主要『母傳『男嬰』』居多,非父傳女嬰。","B":"正確。易發生溶血性貧血及高膽紅素血症。","C":"正確。發燒避免使用Aspirin(氧化性)。","D":"正確。哺乳母親避免食用蠶豆。"},"sources":["Nelson《兒科學》G6PD","性聯遺傳"]}},"106030-N4-52":{"quick":"妊娠糖尿病母親之女嬰(3800g)照顧敘述中「出生後4小時應測第一次血糖」為錯誤。","detail":{"background":"妊娠糖尿病新生兒(巨嬰、高胰島素):重點是『防『低血糖』』。應『『出生後『儘早(約30分鐘–1小時內)』測第一次血糖』(非等4小時)』、儘早餵食、評估盜汗呼吸喘嗜睡顫抖等低血糖徵象、血糖<40–47mg/dL須處置。「『出生後4小時才測第一次血糖』錯誤——應更早測(低血糖常在出生1–2小時內發生)」。本題「錯誤」者為B。","options":{"A":"正確。評估盜汗、呼吸喘、嗜睡等低血糖徵象。","B":"錯誤(本題答案)。應出生後儘早(約30分~1小時)測血糖,非等4小時。","C":"正確。血糖低於約36~40mg/dL應採取措施。","D":"正確。應儘早餵食母奶或配方奶防低血糖。"},"sources":["Nelson《兒科學》糖尿病新生兒","血糖監測"]}},"106110-N4-69":{"quick":"健康新生兒篩檢時間為「出生滿48小時,或已完全由腸道進食24小時後」。","detail":{"background":"新生兒先天代謝疾病篩檢:採『足跟血』,時間為「『出生『滿48小時』後,且『已完全由腸道(經口)進食24小時後』』採檢」(太早或未進食影響某些代謝物濃度)。本題正確為「出生滿48小時或完全腸道進食24小時後」(C)。","options":{"A":"24小時過早。","B":"36小時仍不足48小時。","C":"正確。出生滿48小時、完全腸道進食24小時後。","D":"72小時非標準下限(48小時即可)。"},"sources":["Nelson《兒科學》新生兒篩檢","採檢時間"]}},"106111-N4-69":{"quick":"G6PD缺乏症誘發因子中「抗痙攣藥物」為錯誤(非典型誘發因子)。","detail":{"background":"G6PD缺乏症(蠶豆症)的『溶血誘發因子(氧化物質)』:『『蠶豆』、『樟腦丸(萘)』、『磺胺類藥、抗瘧藥(primaquine)、解熱鎮痛劑(aspirin等部分)』、『部分抗生素(nitrofurantoin)、龍膽紫、紫藥水』、『感染』。「『『抗痙攣藥物』『不是』G6PD的典型溶血誘發因子」(一般抗癲癇藥非氧化性主因)。本題「錯誤(非誘發因子)」者為D。","options":{"A":"是誘發因子。樟腦丸(萘)。","B":"是誘發因子。蠶豆。","C":"是誘發因子。部分解熱鎮痛劑(氧化性)。","D":"錯誤(本題答案)。抗痙攣藥物非G6PD典型溶血誘發因子。"},"sources":["Nelson《兒科學》G6PD","誘發因子"]}},"108020-N4-74":{"quick":"半乳糖血症陽性新生兒飲食原則中「維持完全母乳哺餵以維持足夠營養」為錯誤。","detail":{"background":"半乳糖血症(galactosemia):缺乏半乳糖代謝酵素,『無法代謝『乳糖(乳糖→葡萄糖+半乳糖)』』→半乳糖堆積致肝損、白內障、智能障礙。飲食:『『終生『禁食含乳糖/半乳糖』的食物——『母乳、一般牛奶與含乳糖配方奶『皆禁』』,改用『『無乳糖(豆奶/特殊)配方』』』、避免乳酪製品、依醫囑補充維生素礦物質。「『維持『完全母乳哺餵』』錯誤——半乳糖血症『須停母乳』(母乳含乳糖)」。本題「錯誤」者為D。","options":{"A":"正確。禁止餵食市售(含乳糖)兒童配方奶。","B":"正確。應避免乳酪製品。","C":"正確。依醫囑補充維生素與礦物質。","D":"錯誤(本題答案)。半乳糖血症須停母乳(母乳含乳糖),改無乳糖配方。"},"sources":["Nelson《兒科學》半乳糖血症","無乳糖飲食"]}},"109110-N4-52":{"quick":"「唐氏症」不屬於新生兒(代謝)篩檢的項目。","detail":{"background":"我國新生兒先天代謝疾病篩檢項目(足跟血):『苯酮尿症(PKU)、先天性甲狀腺低下、半乳糖血症、G6PD缺乏症、先天性腎上腺增生症(CAH)、楓糖尿症、中鏈脂肪酸去氫酶缺乏、甲基丙二酸血症(MMA)、高胱胺酸尿症』等代謝/內分泌疾病。「『唐氏症(染色體三體)』是『產前染色體篩檢/診斷』,『不屬於新生兒『代謝』篩檢項目』」。本題不屬於者為「唐氏症」(B)。","options":{"A":"屬於。G6PD缺乏症。","B":"本題答案(非項目)。唐氏症屬產前染色體篩檢,非新生兒代謝篩檢。","C":"屬於。苯酮尿症(PKU)。","D":"屬於。甲基丙二酸血症(MMA)。"},"sources":["Nelson《兒科學》新生兒篩檢","項目"]}},"111030-N4-72":{"quick":"新生兒篩檢敘述中「出生滿24小時或腸道進食12小時後採檢」為錯誤。","detail":{"background":"新生兒篩檢:『可早期發現治療先天代謝疾病』、『採『兩腳『後足跟外側』』血』、『初步疑陽性由採集機構通知家長複檢』皆正確。採檢時間為「『出生『滿48小時』、且『完全腸道進食24小時後』』」(非24小時/進食12小時)。故「出生滿24小時或進食12小時後採檢」錯誤。本題「錯誤」者為C。","options":{"A":"正確。透過篩檢可早期發現治療先天代謝疾病。","B":"正確。採血位置為兩腳後足跟外側。","C":"錯誤(本題答案)。應出生滿48小時、進食24小時後,非24/12小時。","D":"正確。疑陽性由採集機構通知家長複檢。"},"sources":["Nelson《兒科學》新生兒篩檢","採檢時間"]}},"111030-N4-75":{"quick":"先天性巨結腸症臨床表徵中「嘔吐物不含膽汁」為錯誤——常含『膽汁』。","detail":{"background":"先天性巨結腸症(Hirschsprung disease,腸無神經節細胞致功能性阻塞):『『出生24–48小時內無法排出胎便』、『腹脹、『嘔吐(常含『膽汁』,因遠端阻塞)』、餵食困難、生長遲滯』、兒童期『慢性便秘、『絲帶狀(細條)糞便』』』。「『嘔吐物『不含膽汁』』錯誤——遠端腸阻塞嘔吐物『常含膽汁』」。本題「錯誤」者為B。","options":{"A":"正確。出生24小時內無法排出胎便。","B":"錯誤(本題答案)。遠端阻塞嘔吐物常『含膽汁』,非不含。","C":"正確。嬰兒期有難以進食及生長遲滯。","D":"正確。兒童期慢性便秘、絲帶狀糞便。"},"sources":["Nelson《兒科學》先天性巨結腸症","嘔吐膽汁"]}},"111110-N4-33":{"quick":"臍帶血中可作為胎兒『子宮內感染』診斷的免疫球蛋白是「IgM」。","detail":{"background":"胎兒免疫球蛋白與子宮內感染:『IgG可過胎盤(母源)』;『『IgM『分子大、不過胎盤』,由『胎兒自行製造』』,故『臍帶血/新生兒『IgM升高』提示『胎兒子宮內感染(如TORCH)』』』。IgA也不過胎盤但非感染診斷主指標。本題為「IgM」(D)。","options":{"A":"IgA不過胎盤但非子宮內感染診斷主指標。","B":"IgE與過敏相關。","C":"IgG可過胎盤(母源),非胎兒自製。","D":"正確。IgM不過胎盤、胎兒自製,升高提示子宮內感染。"},"sources":["Nelson《兒科學》IgM","子宮內感染"]}},"112030-N4-48":{"quick":"新生兒篩檢敘述中「手執濾紙接取穿刺後流出的『第一滴』血」為錯誤。","detail":{"background":"新生兒篩檢採足跟血:『出生滿48小時採檢、採血前『熱敷足部3–10分鐘』(促血液循環)、以75%酒精消毒並『待乾』、穿刺後『『擦去『第一滴』血』,再以濾紙接取『第二滴起』充分滲透的血』』(第一滴混組織液/酒精影響準確)。故「『手執濾紙接取『第一滴』血』錯誤」。本題「錯誤」者為D。","options":{"A":"正確。新生兒出生須滿48小時才能採檢。","B":"正確。採檢前須熱敷足部3~10分鐘。","C":"正確。以75%酒精消毒穿刺部位。","D":"錯誤(本題答案)。應擦去第一滴血,取第二滴起(第一滴混組織液)。"},"sources":["Nelson《兒科學》新生兒篩檢","採血技術"]}},"112110-N4-28":{"quick":"胎兒與新生兒免疫系統正確的是「胎兒無法自行製造IgA,可由初乳而獲得」。","detail":{"background":"胎兒/新生兒免疫:(1)『可過胎盤的是『IgG』(非IgM)』,故A錯;(2)「『胎兒『無法自行製造IgA』,出生後由『初乳(母乳)』獲得『分泌型IgA』』」——正確;(3)『出生時新生兒體內抗體『主要為『IgG』(母源)』』(非IgA),故C錯;(4)『『IgM』升高才提示子宮內感染(非IgG)』,故D錯。本題正確為「胎兒無法自製IgA,由初乳獲得」(B)。","options":{"A":"錯。可過胎盤的是IgG,非IgM。","B":"正確。胎兒無法自製IgA,由初乳獲得。","C":"錯。出生時主要抗體為IgG(母源),非IgA。","D":"錯。IgM升高才提示子宮內感染,非IgG。"},"sources":["Nelson《兒科學》新生兒免疫","IgA初乳"]}},"112110-N4-30":{"quick":"新生兒篩檢檢體採集正確的是「採血穿刺部位應選擇避開蹠神經與跟骨部位的足跟『兩側』」。","detail":{"background":"新生兒足跟採血技術:(1)「『穿刺部位選『足跟『內、外側』(兩側)』,避開『跟骨(中央)』與蹠神經/血管』(防傷骨與神經)」——正確;(2)『早產兒亦須『出生滿48小時』再採(非滿34週即可立即)』,故A錯;(3)『血流不順『不可用力擠壓』(會混組織液影響結果),應熱敷或重新穿刺』,故C錯;(4)『穿刺以『約90度(垂直)』快速刺入適當深度』,「45度」不當,故D錯。本題正確為B。","options":{"A":"錯。仍須出生滿48小時採,非滿34週即可立即。","B":"正確。穿刺足跟兩側、避開蹠神經與跟骨。","C":"錯。血流不順不可用力擠壓(混組織液)。","D":"穿刺角度敘述不當(45度)。"},"sources":["Nelson《兒科學》足跟採血","部位"]}},"113100-N4-43":{"quick":"先天性腎上腺增生症(CAH)護理指導中「若合併醛固酮不足應『減少』飲食鹽分」為最不適當。","detail":{"background":"先天性腎上腺增生症(CAH,21-羥化酶缺乏):皮質醇與『醛固酮『不足』』→『失鹽型『低血鈉、高血鉀、脫水、低血壓(腎上腺危象)』』;女嬰可男性化。護理:『按時服用『皮質醇(hydrocortisone)』與『鹽皮質素(fludrocortisone)』、『失鹽型須『『補充『鹽分』(增加,而非減少)』』、觀察脫水、監測生長』。「『合併醛固酮不足應『減少』鹽分』『最不適當』——應『增加(補充)鹽分』」。本題最不適當者為B。","options":{"A":"適當。教導觀察脫水情形。","B":"最不適當(本題答案)。失鹽型CAH應『補充』鹽分,非減少。","C":"適當。監測身高體重變化。","D":"適當。按時服用皮質醇(cortisone)。"},"sources":["Nelson《兒科學》CAH","失鹽型"]}},"113180-N4-18":{"quick":"新生兒篩檢敘述正確的是「穿刺部位應選擇足跟的外面兩側」。","detail":{"background":"新生兒足跟採血:(1)『採血時間為『出生滿48小時』後』(非滿12小時),故A錯;(2)「『穿刺部位選『足跟『外側兩側』』(避開中央跟骨與神經血管)」——正確;(3)『血量不足『不可用力擠壓』(混組織液)』,故C錯;(4)『以『採血『刺針(lancet)』』穿刺,『非注射針頭』,且用減痛措施』,故D錯。本題正確為「穿刺部位選足跟外面兩側」(B)。","options":{"A":"錯。採血時間為出生滿48小時(非12小時)。","B":"正確。穿刺部位選足跟外面兩側。","C":"錯。血量不足不可用力擠壓(混組織液)。","D":"錯。用採血刺針而非注射針頭。"},"sources":["Nelson《兒科學》足跟採血","部位"]}},"113180-N4-31":{"quick":"nystatin懸浮液100,000 units/mL、每次250,000 units,應給予「2.5 mL」。","detail":{"background":"劑量計算:所需劑量÷濃度=體積。每次需『250,000 units』÷『100,000 units/mL』=『2.5 mL』。本題每次給予「2.5 mL」(C)。(鵝口瘡以nystatin懸浮液塗抹口腔/吞服,一天四次。)","options":{"A":"1.5mL計算錯誤。","B":"2.0mL計算錯誤。","C":"正確。250,000÷100,000=2.5mL。","D":"3.0mL計算錯誤。"},"sources":["藥理 劑量計算","nystatin"]}},"113180-N4-36":{"quick":"新生兒胎便吸入症候群敘述中「羊水有胎便、嬰兒娩出後立即以甦醒球加壓刺激呼吸」為錯誤。","detail":{"background":"胎便吸入症候群(MAS)處置:『皮膚指甲臍帶胎便沾染、可能呼吸窘迫、動脈血氣示呼吸衰竭需矯正酸中毒』皆正確。「『羊水有胎便、娩出後『立即以甦醒球(ambu bag)『加壓』刺激呼吸』』錯誤——『應『先抽吸清除呼吸道胎便『再』正壓通氣』,『不可在清除前加壓(會把胎便壓入深部致阻塞/肺炎)』」。本題「錯誤」者為C。","options":{"A":"正確。皮膚指甲臍帶有胎便沾染痕跡。","B":"正確。可能發生呼吸窘迫症狀。","C":"錯誤(本題答案)。應先抽吸清除胎便再通氣,不可立即加壓。","D":"正確。血氣示呼吸衰竭需矯正呼吸性酸中毒。"},"sources":["Nelson《兒科學》胎便吸入","處置"]}},"101030-N4-11":{"quick":"新生兒沐浴指導中「沐浴應先洗頭髮再洗臉部,最後洗軀幹」為不適當。","detail":{"background":"新生兒沐浴原則:『先餵奶後約1小時或餵奶前(避免吐奶)、控制環境溫度防失溫、由『乾淨到污染、由上而下』——『先洗『臉(眼由內眥往外眥)』→頭→頸→軀幹→四肢→最後會陰/臀部』』。「『先洗『頭髮』再洗『臉部』』順序錯誤——應『先臉後頭』(臉最乾淨先洗)」。本題不適當者為「先洗頭髮再洗臉部」(D)。","options":{"A":"適當。先洗澡再餵奶以避免吐奶(或餵前)。","B":"適當。常洗頭避免頭皮鱗屑。","C":"適當。控制環境溫度維持體溫。","D":"不適當(本題答案)。應先洗臉再洗頭(由乾淨到污染)。"},"sources":["Nelson《兒科學》新生兒沐浴","順序"]}},"102110-N4-26":{"quick":"新生兒安全護理指導中「有推銷員或不明人士進入病室應立即按警示鈴維護新生兒安全」較適宜。","detail":{"background":"新生兒安全(防失竊/誤抱):『新生兒不離開照顧者視線、核對母嬰『身分手圈(每次接觸/每天核對)』、『陌生/不明人士進入應提高警覺、必要時按警示鈴或通知人員』、認明工作人員識別證、不隨意交付他人』。「『不明人士進入病室應『立即按警示鈴』維護安全』」為適宜。A(獨處時不可離視線)語意過絕對;B(不鎖門不擔心)錯;C(長得像不用辨識)錯(仍需每次核對身分)。本題最適宜為D。","options":{"A":"語意過絕對(且需常態核對身分)。","B":"錯。不應因「醫院安全」就忽視防竊。","C":"錯。即使像父母仍需核對身分手圈。","D":"最適宜(本題答案)。不明人士進入應立即按警示鈴。"},"sources":["Nelson《兒科學》新生兒安全","身分辨識"]}},"105090-N4-27":{"quick":"出生第5天臍帶未掉落的出院指導正確的是「洗澡後可75%酒精由臍帶根部環狀擦拭」。","detail":{"background":"臍帶照護:『保持『清潔『乾燥』』、『尿布反摺於臍下避免覆蓋與尿液回滲、『暴露於空氣』(非用紗布包覆)』、『洗澡後可以『75%酒精『由臍帶根部『環狀向外』擦拭』』』、『自然脫落(『不可用手強行移除』)』、『有少量分泌物不一定是感染(膿性、紅腫、異味才是感染)』。本題正確為「洗澡後75%酒精由臍帶根部環狀擦拭」(B)。","options":{"A":"錯。少量分泌物不一定是感染(膿性紅腫異味才是)。","B":"正確。洗澡後75%酒精由臍帶根部環狀擦拭。","C":"錯。臍帶應暴露空氣保持乾燥,不要用紗布包覆。","D":"錯。臍帶應讓其自然脫落,不可用手移除。"},"sources":["Nelson《兒科學》臍帶照護","酒精消毒"]}},"106110-N4-11":{"quick":"新生兒抽吸敘述正確的是「過度抽吸會造成新生兒心跳速率減低」。","detail":{"background":"新生兒抽吸:(1)『抽吸時頭部勿過度抬高(略側臥),抽吸『先口後鼻』』;(2)『抽吸管『放入時『不加壓』,『退出時『間歇加壓』抽吸』』(放入時持續加壓會傷黏膜),故B錯;(3)『新生兒抽吸壓力約『60–100 mmHg』』(150–200過高),故C錯;(4)「『『過度抽吸『刺激迷走神經』→可致『心跳速率『減低』(心搏過緩)』與缺氧』」——正確。本題正確為「過度抽吸會造成心跳速率減低」(D)。","options":{"A":"抽吸時頭部不宜抬高(略側臥),敘述不當。","B":"錯。抽吸管放入時不加壓,退出時間歇加壓。","C":"錯。新生兒抽吸壓力約60~100mmHg(非150~200)。","D":"正確。過度抽吸刺激迷走神經致心搏過緩。"},"sources":["Nelson《兒科學》新生兒抽吸","迷走刺激"]}},"106111-N4-29":{"quick":"新生兒沐浴敘述正確的是「(女嬰)輕輕撥開陰唇由上往下清洗」。","detail":{"background":"新生兒沐浴:(1)『先餵奶『前』或餵後約1小時沐浴(避免溢吐),「先餵奶後沐浴以免飢餓哭泣」不當』,故A錯;(2)「『清洗女嬰會陰『撥開陰唇『由上往下(由前往後)』』清洗』(防肛門污染往尿道)」——正確;(3)『臍帶護理用『75%酒精』(非優碘,優碘易染色且吸收)』,故C錯;(4)『清洗眼睛『由內眥(內側)往外眥(外側)』』,故D「由外往內」錯。本題正確為「撥開陰唇由上往下清洗」(B)。","options":{"A":"錯。沐浴宜餵奶前或餵後1小時(避免溢吐)。","B":"正確。撥開陰唇由上往下(前往後)清洗。","C":"錯。臍帶護理用75%酒精(非優碘)。","D":"錯。清洗眼睛應由內眥往外眥。"},"sources":["Nelson《兒科學》新生兒沐浴","會陰清洗"]}},"108110-N4-27":{"quick":"新生兒暗示行為敘述中「脫離性暗示行為:手腳屈曲、臉轉向照顧者,表示想睡覺」為錯誤。","detail":{"background":"新生兒暗示(cue)行為:『投入性(engagement)』——『注視照護者、微笑、面向、伸手』表示想互動;『脫離性(disengagement)』——『臉/頭『轉『開(避開)』照顧者、手腳屈曲僵硬、打哈欠、皺眉、膚色變化』』表示需『休息/過度刺激想退出』;飢餓暗示——手放嘴裡、尋乳、拱背、哭(晚期);吃飽——睡著、推開、吸吮減少。「『脫離性行為:臉『轉向』照顧者』錯誤——脫離性是『臉『轉開(避開)』』」。本題「錯誤」者為B。","options":{"A":"正確。投入性:注視微笑想互動。","B":"錯誤(本題答案)。脫離性是臉『轉開避開』,非轉向照顧者。","C":"正確。飢餓暗示:手放嘴裡、哭、拱背。","D":"正確。吃飽暗示:睡著、推開、吸吮減少。"},"sources":["Nelson《兒科學》新生兒暗示行為","投入脫離"]}},"110110-N4-22":{"quick":"新生兒飢餓暗示行為敘述中「臉部放鬆」為錯誤——飢餓時應為尋乳、扭動等『主動』行為。","detail":{"background":"新生兒『飢餓暗示行為』:『早期——手伸向嘴巴並扭動身體、『舌頭伸出』、『臉『轉向(尋乳)』照顧者』、吸吮嘴唇、張口尋乳;晚期——哭泣(最晚)』。「『臉部『放鬆』』是『吃飽/滿足』的表現,『不是『飢餓』暗示行為』」。本題「錯誤」者為「臉部放鬆」(B)。","options":{"A":"正確(飢餓)。手伸向嘴巴並扭動身體。","B":"錯誤(本題答案)。臉部放鬆是吃飽/滿足,非飢餓暗示。","C":"正確(飢餓)。舌頭伸出來。","D":"正確(飢餓)。臉轉向照顧者(尋乳)。"},"sources":["Nelson《兒科學》飢餓暗示","尋乳"]}},"110110-N4-38":{"quick":"「沐浴前先用95%酒精消毒,再用75%酒精促進乾燥」不是預防新生兒臍帶感染的護理措施。","detail":{"background":"臍帶感染預防:『每次換尿布觀察有無感染徵象(紅腫、膿性分泌物、異味)、『尿布反摺於臍下避免尿液回滲』、保持『清潔乾燥、暴露空氣』、以『75%酒精』由根部環狀消毒』。「『先『95%酒精』消毒再『75%酒精』乾燥』『不是』正確措施——臍帶消毒用『75%酒精』即可(95%酒精揮發快、消毒效果反不如75%,且此敘述顛倒不正確)」。本題不是預防措施者為A。","options":{"A":"本題答案(非正確措施)。臍帶消毒用75%酒精,非95%。","B":"是。每次換尿布觀察臍帶感染徵象。","C":"是。尿布反摺於臍下避免尿液回滲。","D":"是。保持臍部清潔乾燥。"},"sources":["Nelson《兒科學》臍帶感染預防","75%酒精"]}},"111030-N4-27":{"quick":"初產婦照顧新生兒行為中「洗澡過後全身擦上精油預防皮膚乾裂」為最不適當。","detail":{"background":"新生兒皮膚照護:『新生兒皮膚嬌嫩,『不建議『全身塗抹精油/含香料乳液』』(可能刺激、過敏、經皮吸收),宜用『溫和無香乳液』於乾燥處少量』。其餘正確:搖籃式抱法支托頭與臀、餵奶前或餵後1小時沐浴、直立式拍嗝。「『全身擦精油』最不適當」。本題最不適當為A。","options":{"A":"最不適當(本題答案)。不應全身擦精油(刺激/過敏/吸收)。","B":"適當。搖籃式抱法支托頭部與臀部。","C":"適當。餵奶前或餵後1小時沐浴。","D":"適當。直立式抱法拍嗝。"},"sources":["Nelson《兒科學》新生兒皮膚","精油"]}},"111030-N4-29":{"quick":"新生兒護理正確的是:抗生素眼藥膏預防淋菌結膜炎(1)＋頭圍量法為額頭經雙耳中端到枕骨粗隆(4),即14。","detail":{"background":"新生兒護理評析:(1)「『出生後給『抗生素(紅黴素)眼藥膏』預防『淋菌性結膜炎』」——正確;(2)『以吸球清除分泌物應『先『口』後『鼻』』(先鼻會刺激吸氣將口腔物吸入)』,故(2)「先抽鼻腔」錯;(3)『臍斷面消毒用『75%酒精』』——本身對,但(3)選項常與其他並列;(4)「『頭圍量法:『額頭(眉上)經雙耳上緣到『枕骨粗隆』』』」——正確。本題正確組合為(1)(4)即14(D)。(
