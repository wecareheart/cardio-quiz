"topic_code":"B3-7","q_num":35,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"須立即放在檢體冰箱,再送到檢驗科","B":"檢體保持近體溫狀態,於30 分鐘內送到檢驗科","C":"檢體放在護理站檢體蒐集盒,明天送到檢驗科","D":"須使用浮膠貼紙蒐集檢體,再送到檢驗科"},"img":""},{"id":"115030-N2-35","code":"115030","roc":"115","cat":"N2","catname":"基本護理學與護理行政","num":35,"stem":"血液檢查結果,下列何者異常?","opts":{"A":"紅血球:5 x 106 /mm3","B":"白血球:8,000 /mm3","C":"血紅素:14.8 g/dL","D":"血小板:80×104 /mm3"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"7血液檢體採集檢驗與其他檢體","topic_code":"B3-7","q_num":35,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"紅血球:5 x 106 /mm3","B":"白血球:8,000 /mm3","C":"血紅素:14.8 g/dL","D":"血小板:80×104 /mm3"},"img":""}],E={"101030-N2-33":{"quick":"住院3天皆>39°C、最高最低差<1°C=恆常熱(constant fever)。","detail":{"background":"發燒型態:恆常熱(constant)=體溫持續高於正常、24小時波動<1°C(如大葉性肺炎、傷寒高峰);弛張熱(remittent)=體溫持續高,但波動>1~2°C仍不回正常;間歇熱(intermittent)=發燒與正常交替出現(如瘧疾、敗血症);回歸熱(relapsing)=發燒數日與無燒數日交替。汪小姐3天皆>39°C且差<1°C=恆常熱。","options":{"A":"正確(本題答案)。持續高燒、波動<1°C=恆常熱。","B":"弛張熱波動>1°C但不回正常。","C":"間歇熱是發燒與正常交替。","D":"回歸熱是發燒期與無燒期交替數日。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"101030-N2-34":{"quick":"發熱期尿量減少、尿比重「上升」(非下降);稱尿比重下降為錯誤。","detail":{"background":"發燒過程分三期:發冷期(寒顫、脈快、皮膚蒼白冷)、發熱期(stadium/高峰,皮膚乾熱潮紅、脈率呼吸加快、焦慮、口渴、尿量減少且尿比重上升)、退熱期(出汗散熱、尿量增加)。選項D「尿比重下降」錯誤——發熱期因水分流失、尿量減少,尿比重應「上升」。","options":{"A":"正確。發熱期脈率增加。","B":"正確。發熱期呼吸變快。","C":"正確。發熱期常焦慮不安。","D":"錯誤(本題答案)。發熱期尿量少、尿比重上升,非下降。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"101110-N2-16":{"quick":"熱衰竭是「體液容積不足(脫水)」加排汗散熱失調,非體液過多;稱體液過多為錯誤。","detail":{"background":"體溫過高三型:熱痙攣=劇烈運動大量流汗,體液與氯化鈉喪失過多致肌肉痙攣;熱衰竭=長時間高溫致大量出汗、「體液容積不足(脫水)」,臉色蒼白、皮膚濕冷、血壓降、脈快弱,體溫可接近正常;中暑=體溫調節中樞失能、無法排汗散熱,體溫極高(>40°C)、皮膚乾熱、意識改變。選項C稱熱衰竭是「體液容積過多」錯誤(應為不足)。","options":{"A":"正確。熱痙攣因流汗喪失體液與氯化鈉。","B":"正確。熱衰竭臉色蒼白、皮膚濕冷、血壓降、脈快弱。","C":"錯誤(本題答案)。熱衰竭是體液容積「不足」,非過多。","D":"正確。中暑是體溫調節中樞失能無法排汗。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"101110-N2-36":{"quick":"體溫38~40.2°C間波動、持續高於正常但不回正常=弛張熱。","detail":{"background":"弛張熱(remittent fever):體溫持續高於正常,但一日內波動幅度>1~2°C、最低點仍高於正常(不回到正常基準)。林先生最低38°C、最高40.2°C,全程高於正常且波動>2°C=弛張熱。間歇熱會降回正常、恆常熱波動<1°C、回歸熱是發燒期與無燒期交替數日。","options":{"A":"回歸熱是發燒與無燒交替數日。","B":"間歇熱會降回正常。","C":"恆常熱波動<1°C。","D":"正確(本題答案)。持續高燒、波動>1°C不回正常=弛張熱。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"102110-N2-32":{"quick":"蓋被仍發抖寒顫、呼吸快深、皮膚發紺=發燒「發作(發冷)期」。","detail":{"background":"發燒(發冷)發作期:下視丘體溫調定點上移,身體為產熱而出現寒顫發抖、立毛、皮膚血管收縮(蒼白、發紺/冰冷)、自覺寒冷;發熱期(高峰)皮膚乾熱潮紅;退熱期出汗散熱。林先生蓋被仍發抖寒顫、皮膚發紺=發作(發冷)期。記憶:發燒三期=發冷(發作)期(寒顫、蒼白、血管收縮、自覺冷)→發熱(高峰)期(乾熱潮紅、脈呼吸快)→退熱期(出汗、尿量增)。蓋被仍發抖=發冷期。","options":{"A":"正確(本題答案)。寒顫發抖、皮膚發紺=發作(發冷)期。","B":"退熱期是出汗散熱。","C":"發熱期皮膚乾熱潮紅,非發抖。","D":"「休止期」非發燒分期用語。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"102110-N2-52":{"quick":"可測口溫者=鼻竇炎以外、無口鼻手術或意識/呼吸問題者;本題答案C急性腸炎。","detail":{"background":"不可測口溫的情況:意識不清、嬰幼兒、呼吸困難或張口呼吸(氣喘)、抽搐(癲癇)、口鼻手術後、無法配合者。急性腸炎病人意識清楚、能配合閉口含溫度計,可測口溫(C)。氣喘(呼吸困難)、癲癇(抽搐)、鼻竇炎剛手術後(口鼻區手術)皆不宜測口溫。記憶:不可測口溫者=意識不清、嬰幼兒、張口/呼吸困難(氣喘)、抽搐(癲癇)、口鼻手術後、無法配合者。急性腸炎意識清楚可配合,可測口溫。","options":{"A":"氣喘呼吸困難/張口呼吸,不宜口溫。","B":"癲癇有抽搐風險,不宜口溫。","C":"正確(本題答案)。急性腸炎可配合,可測口溫。","D":"鼻竇炎剛手術後不宜口溫。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"103030-N2-41":{"quick":"術後體溫時正常時發燒、交替出現=間歇熱(intermittent fever)。","detail":{"background":"間歇熱(intermittent fever):發燒與正常體溫交替出現(體溫會降回正常再升高),常見於敗血症、瘧疾、化膿性感染(如術後傷口感染、膽道感染)。林先生術後體溫高高低低、有時正常有時發燒=間歇熱。恆常熱持續高、弛張熱不回正常、回歸熱是發燒期與無燒期各持續數日交替。","options":{"A":"恆常熱持續高燒不回正常。","B":"弛張熱波動大但不回正常。","C":"正確(本題答案)。發燒與正常交替=間歇熱。","D":"回歸熱是發燒期與無燒期各數日交替。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"103100-N2-37":{"quick":"動情激素(estrogen)分泌增加會使體溫「降低」。","detail":{"background":"影響體溫的荷爾蒙:甲狀腺素、腎上腺素(代謝增加)使體溫上升;睪固酮(雄性激素)使代謝與體溫略升;動情激素(estrogen/雌激素)分泌增加時體溫「下降」(排卵前estrogen高、體溫較低;排卵後黃體素prog高、體溫上升0.3~0.6°C)。故使體溫降低者為動情激素(B)。","options":{"A":"雄性激素使代謝與體溫略升。","B":"正確(本題答案)。動情激素增加使體溫下降。","C":"甲狀腺素使體溫上升。","D":"腎上腺素使體溫上升。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"103100-N2-38":{"quick":"發燒初期(發冷期)出現寒顫。","detail":{"background":"發燒初期(onset/發冷期):體溫調定點上移,身體加速產熱以達新調定點,出現寒顫發抖、立毛、皮膚血管收縮(蒼白冰冷)、自覺寒冷。頭痛、肌肉關節痛是發燒的全身不適、皮膚發紅是發熱高峰期表現,皆非「初期」最典型。發燒初期最典型為寒顫(A)。記憶:發燒初期=發冷期,體溫調定點上移、身體加速產熱,出現寒顫、立毛、皮膚血管收縮(蒼白冰冷)、自覺寒冷;此時應保暖,高峰期才協助散熱。","options":{"A":"正確(本題答案)。發燒初期出現寒顫。","B":"頭痛是全身不適,非初期最典型。","C":"皮膚發紅是發熱高峰期表現。","D":"肌肉關節疼痛非初期最典型。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"103100-N2-44":{"quick":"BMI正常(18.5~24)者:身高150體重45→BMI 20=正常(D)。","detail":{"background":"BMI=體重(kg)÷身高(m)²,正常範圍18.5~24。A 160cm 65kg→25.4(過重);B 160cm 46kg→18.0(過輕);C 150cm 55kg→24.4(過重邊緣);D 150cm 45kg→45÷(1.5²)=45÷2.25=20.0(正常)。故正常者為李太太(D)。","options":{"A":"BMI 25.4,屬過重。","B":"BMI 18.0,屬過輕。","C":"BMI 24.4,偏過重。","D":"正確(本題答案)。BMI 20.0,屬正常範圍。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"104100-N2-42":{"quick":"血糖過低(低血糖)可能導致體溫過低。","detail":{"background":"體溫過低(hypothermia)原因:暴露寒冷環境、低血糖(產熱基質不足)、甲狀腺機能「低下」、營養不良、休克、酒精中毒、老化。選項C血糖過低會使產熱不足、體溫下降。A甲狀腺亢進、B炎症反應、D癌症多使體溫「上升」。故導致體溫過低者為血糖過低(C)。","options":{"A":"甲狀腺亢進使代謝增、體溫上升。","B":"炎症反應使體溫上升。","C":"正確(本題答案)。低血糖產熱不足致體溫過低。","D":"癌症常伴發燒,使體溫上升。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"105030-N2-42":{"quick":"嬰兒測肛溫插入深度約0.5吋(1.2cm),非2吋;稱2吋為錯誤。","detail":{"background":"體溫測量:嬰兒測肛溫時溫度計插入深度約0.5吋(約1.2~1.5cm,成人約1~1.5吋),插入過深(2吋)會傷及直腸黏膜;2歲以下兒童測耳溫應將耳朵往「下往後」拉(成人往上往後);耳溫與口溫相近;測量採內科無菌(清潔技術)。選項A「肛表插入深度2吋」錯誤(過深)。","options":{"A":"錯誤(本題答案)。嬰兒肛溫插入約0.5吋,非2吋。","B":"正確。3歲以下耳朵往下往後拉。","C":"正確。耳溫與口溫相近。","D":"正確。採內科無菌技術。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"105030-N2-45":{"quick":"耳垢過多會影響耳溫數值(阻擋紅外線致偏低)。","detail":{"background":"耳溫槍測量:3歲以下兒童耳朵往「下往後」拉(成人往上往後);耳道發炎、耳道手術側不宜測;耳垢過多會阻擋紅外線、使測值偏低、不準(C正確);耳道(鼓膜)溫度接近核心溫度,與肛溫相近而非高於肛溫。故正確為耳垢過多影響數值(C)。記憶:耳溫測量——3歲以下耳朵往下往後拉、3歲以上往上往後拉;耳垢多、耳道發炎影響數值;耳道(鼓膜)溫度接近核心,與肛溫相近。","options":{"A":"3歲以下耳朵往下往後拉,非往上往後。","B":"耳道發炎不宜測耳溫。","C":"正確(本題答案)。耳垢過多影響耳溫數值。","D":"耳道溫度與肛溫相近,非高於肛溫。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"106030-N2-2":{"quick":"脫水會導致體溫過高(產熱>散熱、循環不足散熱差)。","detail":{"background":"體溫過高原因:感染發炎、中暑、脫水(體液不足致散熱障礙、體溫上升)、甲狀腺亢進、劇烈運動。脫水時排汗散熱不足、循環血量減少,體溫升高。大出血、營養不良、酒精中毒多使體溫「下降」。故導致體溫過高者為脫水(A)。機轉:脫水使體液不足、排汗散熱障礙、循環血量減少散熱差,體溫上升;大出血、營養不良、酒精中毒、低血糖、甲狀腺低下則使體溫下降。","options":{"A":"正確(本題答案)。脫水使散熱不足、體溫上升。","B":"大出血使體溫下降。","C":"營養不良使產熱不足、體溫下降。","D":"酒精中毒使體溫下降。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"106030-N2-23":{"quick":"泡溫泉頭暈因血管擴張、血壓下降、頭部血流減少;選「23」概念(本題答案組合)。","detail":{"background":"泡溫泉時高溫使皮膚血管擴張、體溫上升、散熱增加,血液流向皮膚周邊、回心血量與頭部血流相對減少,加上久泡致血壓下降,易頭暈不適。核心機轉為血管擴張(3)、體溫升高散熱增加(2)、頭部血流減少(5);「排汗增加致血壓上升」錯(應血壓下降)。依命題判定選含血管擴張、散熱、頭部血流減少的組合。","options":{"A":"敘述不全。","B":"血管擴張致血壓下降而非上升。","C":"正確(本題答案,命題判定)。體溫升散熱增+血管擴張致頭暈。","D":"同C方向,依官方答案。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"106030-N2-37":{"quick":"返台後持續兩日高燒38.5~39.5°C、無明顯起伏=恆常熱(constant fever)。","detail":{"background":"恆常熱(constant fever):體溫持續維持高於正常、24小時波動小(<1°C),常見於大葉性肺炎、傷寒。陳先生持續兩天耳溫維持38.5~39.5°C、起伏小=恆常熱。弛張熱波動大、回歸熱是發燒與無燒期交替、間歇熱會降回正常。記憶:恆常熱=持續高於正常、24小時波動<1°C(大葉性肺炎、傷寒);與弛張熱(波動>1°C不回正常)、間歇熱(降回正常交替)、回歸熱(發燒期與無燒期數日交替)區分。","options":{"A":"正確(本題答案)。持續高燒、波動小=恆常熱。","B":"弛張熱波動>1°C但不回正常。","C":"回歸熱是發燒期與無燒期交替。","D":"間歇熱會降回正常。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"106110-N2-42":{"quick":"發燒初期:呼吸速率加快(1)、皮膚較蒼白(4)→「14」。","detail":{"background":"發燒初期(發冷期):體溫調定點上移、身體加速產熱,出現呼吸與脈率加快(代謝增)、皮膚血管收縮致皮膚「較蒼白」冰冷、寒顫。故發燒初期表現為呼吸加快(1)+皮膚蒼白(4)=「14」。皮膚發紅(6)是發熱高峰期、呼吸變慢(3)/皮膚顏色不變(5)皆非初期。","options":{"A":"正確(本題答案)。1呼吸加快+4皮膚蒼白。","B":"含5(顏色不變)不符。","C":"3呼吸變慢、6皮膚發紅為高峰期。","D":"6皮膚發紅是高峰期。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"106110-N2-43":{"quick":"影響體溫:甲狀腺素升溫、排卵後體溫上升、長期morphine降溫→「135」。","detail":{"background":"影響體溫因素:1甲狀腺素分泌使代謝增、體溫升高;3排卵後黃體素增加使體溫上升0.3~0.6°C;5吸菸(尼古丁刺激代謝)使體溫略升。錯誤項:2正常人一天體溫變動約0.5~1°C(非0.5~2.5°C);4長期使用morphine(鴉片類)會抑制體溫調節使體溫「下降」(此項命題判定為對,故依官方答案組合)。本題官方答案「135」。","options":{"A":"含2(變動範圍過大)不符。","B":"正確(本題答案)。1甲狀腺素、3排卵後、5吸菸皆升溫。","C":"含2、4之組合不符官方答案。","D":"含4方向爭議,官方選135。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"106111-N2-42":{"quick":"寒冷時釋放甲狀腺素(增加代謝產熱)以調節體溫。","detail":{"background":"寒冷時身體保溫產熱機轉:皮膚血管收縮(減少散熱)、寒顫(骨骼肌活動增加產熱)、立毛、釋放甲狀腺素與腎上腺素(增加代謝率產熱)、減少排汗。選項D「釋放甲狀腺素」正確。A增加汗腺分泌(是散熱、錯)、B減少代謝(錯,應增加)、C減少骨骼肌活動(錯,應寒顫增加)皆與保溫相反。","options":{"A":"增加汗腺分泌是散熱,與保溫相反。","B":"寒冷應增加代謝產熱,非減少。","C":"寒冷應增加骨骼肌活動(寒顫)產熱。","D":"正確(本題答案)。釋放甲狀腺素增加代謝產熱。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"107030-N2-36":{"quick":"體溫每升高1°C,新陳代謝率約增加13%。","detail":{"background":"體溫每上升1°C,基礎代謝率約增加13%(亦有教材近似12~13%),故發燒時氧耗、營養需求與水分流失增加。林女士體溫由36.2升至37.2°C(升1°C),代謝率約增13%。臨床意義:發燒病人需增加熱量與水分補充。公式:體溫每升高1°C,基礎代謝率約增加13%;故發燒病人氧耗、熱量與水分需求增加,需補充水分(≥3000 mL/day)與營養。","options":{"A":"10%偏低。","B":"正確(本題答案)。每升1°C代謝率約增13%。","C":"15%偏高。","D":"18%過高。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"107030-N2-38":{"quick":"術後傷口感染可能出現回歸熱(發燒期與無燒期交替數日)。本題答案B。","detail":{"background":"本題官方答案B。發燒型態:弛張熱波動大但不回正常(A稱「會出現正常」與弛張熱定義不符);恆常熱才是持續維持高於正常(C把恆常熱說成回歸熱,錯);瘧疾最常見「間歇熱」(D稱恆常熱,錯)。選項B「術後傷口感染可能出現回歸熱」——術後感染可呈發燒與無燒交替之回歸/間歇型,命題判為正確。記憶:回歸熱=發燒期與退燒期各持續數日交替。","options":{"A":"弛張熱波動大但不回正常,非「會出現正常」。","B":"正確(本題答案)。術後感染可能出現回歸熱。","C":"持續高於正常是恆常熱,非回歸熱。","D":"瘧疾最常見間歇熱,非恆常熱。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"107110-N2-36":{"quick":"體溫過低症狀:發冷發抖、皮膚蒼白冰冷。","detail":{"background":"體溫過低(hypothermia)症狀:發冷、寒顫發抖、皮膚蒼白冰冷、脈搏與呼吸「變慢」、尿量「減少」(腎血流降)、意識改變(體溫<35°C漸嗜睡,<30~32°C意識喪失)。選項B「發冷發抖、皮膚蒼白冰冷」正確。A「<33°C意識喪失」數值偏高、C呼吸心跳應「變慢」、D尿量應「減少」皆錯。","options":{"A":"意識喪失多在<30~32°C,非33°C。","B":"正確(本題答案)。發冷發抖、皮膚蒼白冰冷。","C":"體溫過低呼吸心跳變慢,非變快。","D":"體溫過低尿量減少,非增加。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"107110-N2-38":{"quick":"大量流汗、蒼白濕冷、血壓降脈快弱=熱衰竭;處置抬高下肢→「13」。","detail":{"background":"熱衰竭(heat exhaustion):長時間高溫運動大量流汗致脫水、循環血量不足,出現臉色蒼白、皮膚濕冷、血壓降、脈快弱、頭痛噁心(不同於中暑的皮膚乾熱、高燒、意識改變)。處置:移至陰涼處、補充水分電解質、「抬高下肢」促回心血量、平躺(非墊高頭部)。江小姐=熱衰竭(1)+抬高下肢(3)=「13」。","options":{"A":"正確(本題答案)。1熱衰竭、3抬高下肢。","B":"4墊高頭部不利回心血。","C":"2中暑皮膚乾熱高燒,與此不符。","D":"2、4皆不符。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"108110-N2-11":{"quick":"發燒初期心跳速度加快。","detail":{"background":"發燒初期(發冷期)代謝率上升,出現心跳加快、呼吸加快、寒顫、皮膚血管收縮(蒼白冰冷,非發燙)。選項B「心跳速度加快」正確。A呼吸應加快非減緩、C皮膚應蒼白冰冷非發燙(發燙是發熱高峰期)、D譫妄是高燒持續的併發症非初期。記憶:發燒初期(發冷期)代謝率上升,心跳與呼吸加快、寒顫、皮膚血管收縮(蒼白冰冷,非發燙);皮膚發燙是發熱高峰期、譫妄是高燒併發症。","options":{"A":"發燒初期呼吸加快,非減緩。","B":"正確(本題答案)。發燒初期心跳加快。","C":"初期皮膚蒼白冰冷,發燙是高峰期。","D":"譫妄是高燒併發症,非初期表現。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"108110-N2-16":{"quick":"發燒病人體溫較高,病房室溫宜較一般稍低以助散熱。","detail":{"background":"不同情境室溫調節:嬰兒體溫調節差、易失溫,嬰兒室室溫宜較一般「高」(A錯);發燒病人體溫高,病房室溫宜較一般「低」以助散熱降溫(B正確);燙傷病人皮膚屏障受損易失溫,燙傷病房室溫宜較高(C敘述其實正確,但本題以B為答);病房內外溫差宜小、避免劇烈溫差。選項B為正確。","options":{"A":"嬰兒易失溫,嬰兒室室溫宜較高。","B":"正確(本題答案)。發燒病人室溫宜較低助散熱。","C":"燙傷病房室溫應較高(此項本身正確,但非本題答案組合)。","D":"內外溫差敘述不宜固定如此。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"109030-N2-37":{"quick":"成人測耳溫應將耳朵往「上往後」拉,非往下往後;稱往下往後為錯誤。","detail":{"background":"成人耳溫測量:將耳朵往「上往後」拉(使耳道變直、對準鼓膜;3歲以下兒童才往下往後拉);耳道發炎、耳垢多、耳道手術側不適用;使用耳套避免交互感染;耳道(鼓膜)溫度接近核心溫度,高於腋溫。選項A「耳朵往下往後拉」對成人為錯誤。記憶:成人測耳溫往「上往後」拉(耳道變直對準鼓膜)、3歲以下往「下往後」拉;耳道發炎/耳垢多不適用;耳道溫度高於腋溫、接近核心。","options":{"A":"錯誤(本題答案)。成人耳溫應往上往後拉,非往下往後。","B":"正確。耳道發炎者不適用。","C":"正確。使用耳套避免交互感染。","D":"正確。耳道溫度高於腋溫。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"109030-N2-56":{"quick":"焦慮、面對壓力會使體溫「上升」(交感興奮、代謝增);稱下降為錯誤。","detail":{"background":"影響體溫:老年人代謝低、體溫偏低(A對);甲狀腺功能不足使代謝降、體溫下降(C對);排卵後黃體素增加使體溫上升(D對)。選項B「焦慮、面對壓力會使體溫下降」錯誤——壓力與焦慮使交感神經興奮、代謝率增加,體溫「上升」,故B為錯誤敘述。記憶:使體溫上升者=甲狀腺亢進、發燒、運動、排卵後、焦慮壓力(交感興奮);使體溫下降者=老年、甲狀腺低下、低血糖、營養不良、寒冷暴露。","options":{"A":"正確。老年人體溫偏低。","B":"錯誤(本題答案)。焦慮壓力使體溫上升,非下降。","C":"正確。甲狀腺功能不足體溫下降。","D":"正確。排卵後黃體素增加體溫升高。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"110110-N2-19":{"quick":"「呼吸淺而快每分鐘25次」為護理師觀察測量=客觀資料。","detail":{"background":"客觀資料(objective data)是可觀察測量者;主觀資料(subjective)是病人/家屬陳述。選項C「呼吸淺而快、每分鐘25次」是護理師測量觀察所得=客觀。A病人主訴想吐頭痛、B家屬轉述、D病人主訴(且為自我推測)皆主觀。故客觀資料為C。","options":{"A":"病人主訴=主觀。","B":"家屬轉述=主觀。","C":"正確(本題答案)。測量到呼吸25次=客觀資料。","D":"病人主訴推測=主觀。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"110110-N2-44":{"quick":"甲狀腺機能亢進最可能心搏>100次/分(心搏過速)。","detail":{"background":"心搏過速(>100次/分)常見於:甲狀腺機能亢進(代謝增、交感興奮)、發燒、運動、焦慮、貧血、出血、休克代償。毛地黃會使心跳「變慢」、低體溫使心跳慢、Propranolol(乙型阻斷劑)使心跳慢。故最可能心搏過速者為甲狀腺亢進(D)。記憶:使心搏>100(心搏過速)者=甲狀腺亢進、發燒、運動、焦慮、貧血、出血、休克代償;使心搏慢者=毛地黃、低體溫、β阻斷劑、顱內壓升高、運動員。","options":{"A":"毛地黃使心跳變慢。","B":"低體溫使心跳變慢。","C":"Propranolol(β阻斷劑)使心跳變慢。","D":"正確(本題答案)。甲狀腺亢進致心搏過速。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"111030-N2-37":{"quick":"高溫流汗、臉色蒼白皮膚濕冷、血壓略低、體溫近正常=熱衰竭。","detail":{"background":"熱衰竭(heat exhaustion):高溫大量流汗致脫水與循環血量不足,臉色蒼白、皮膚濕冷、頭暈虛弱、血壓偏低、脈快弱,「體溫接近正常或略升」(本例37.9°C)、意識清楚。中暑則體溫極高(>40°C)、皮膚乾熱無汗、意識改變。此例符合熱衰竭(B)。","options":{"A":"中暑體溫極高、皮膚乾熱、意識改變。","B":"正確(本題答案)。蒼白濕冷、體溫近正常=熱衰竭。","C":"熱痙攣以肌肉痙攣為主。","D":"「熱感冒」非臨床診斷。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"111030-N2-40":{"quick":"心搏過緩常見於毛地黃中毒、體溫過低。","detail":{"background":"心搏過緩(bradycardia,成人<60次/分)常見於:毛地黃(digoxin)中毒、體溫過低、顱內壓升高、甲狀腺功能低下、運動員、β阻斷劑、睡眠。選項A「毛地黃中毒、體溫過低」正確。B補充甲狀腺素使心跳「快」、C成人<60才稱過緩(非<72)、D登山缺氧反致心跳「加快」代償。","options":{"A":"正確(本題答案)。毛地黃中毒、體溫過低致心搏過緩。","B":"甲狀腺素使心跳加快,非過緩。","C":"成人<60次/分才稱過緩,非<72。","D":"高海拔缺氧使心跳加快代償。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"111110-N2-37":{"quick":"影響體溫:焦慮時體溫上升、排卵時(後)體溫稍高→「24」。","detail":{"background":"影響體溫因素:2焦慮、壓力使交感興奮、體溫上升;4女性排卵後黃體素增加使體溫稍高(約0.3~0.6°C)。錯誤項:1老人體溫偏「低」(非稍高);3甲狀腺功能不足體溫「偏低」(非偏高)。故正確為「24」。記憶:使體溫上升=焦慮壓力(交感)、排卵後黃體素、甲狀腺亢進、發燒;老人體溫偏低、甲狀腺功能不足體溫偏低,勿誤判為偏高。","options":{"A":"含1(老人體溫偏低)不符。","B":"含1、3皆錯。","C":"正確(本題答案)。2焦慮升溫、4排卵後升溫。","D":"含3(甲狀腺低下降溫)不符。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"111110-N2-38":{"quick":"電腦斷層檢查後不需每4小時測體溫(屬一般檢查、無特殊風險)。","detail":{"background":"需每4小時(q4h)或更密集測體溫者:發燒病人、病危病人、術後病人(觀察感染與恢復)、輸血/特殊治療中。電腦斷層檢查後若無顯影劑反應等特殊狀況,屬一般非侵入檢查,不需常規每4小時測體溫(D)。記憶:需每4小時(q4h)測體溫者=發燒、病危、術後、輸血/特殊治療者;一般非侵入檢查(如CT)後無特殊狀況不需常規q4h測體溫。","options":{"A":"發燒病人需密集測體溫。","B":"病危病人需密集監測。","C":"術後第二天仍需觀察測體溫。","D":"正確(本題答案)。CT檢查後不需每4小時測體溫。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"112030-N2-37":{"quick":"敗血症一天內體溫有時>39°C、有時降到正常以下交替=間歇熱。","detail":{"background":"間歇熱(intermittent fever):一天內體溫高燒與降回(甚至低於)正常交替出現,常見於敗血症、瘧疾、化膿性感染。林先生敗血症一天內體溫忽高(>39°C)忽低(正常以下)交替=間歇熱。恆常熱持續高、弛張熱不回正常、回歸熱以「日」為單位的發燒期與無燒期交替。","options":{"A":"恆常熱持續高燒。","B":"弛張熱波動大但不回正常。","C":"正確(本題答案)。高燒與正常以下交替=間歇熱。","D":"回歸熱是發燒期與無燒期各數日交替。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"112030-N2-38":{"quick":"溺水低體溫(34.5°C)最不可能出現「尿量增加」(應尿量減少)。","detail":{"background":"低體溫(34.5°C)表現:嗜睡、意識改變、脈搏與呼吸變慢、血壓下降、皮膚冰冷蒼白、寒顫(中度後消失)、尿量「減少」(腎血流降)。選項B「尿量增加」最不可能——低體溫腎血流減少、尿量應減少。(註:極早期冷利尿例外,但本題以一般低體溫表現判定)。","options":{"A":"低體溫可致嗜睡、意識改變。","B":"最不可能(本題答案)。低體溫尿量減少,非增加。","C":"低體溫脈搏呼吸變慢。","D":"低體溫血壓下降。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"112030-N2-42":{"quick":"左手左腳骨折、右前臂有靜脈輸液→血壓宜測「右腿」；意識混亂戴面罩，口溫不宜，宜測「耳溫(鼓膜溫)」，故選B。","detail":{"background":"本題官方答案D(右手、肛溫)。此病人前額撕裂傷、戴面罩供氧、意識混亂、左側手腳骨折:口溫不宜(意識混亂、戴面罩);耳溫可能受外傷影響;選肛溫較可靠核心溫度;血壓測量避開骨折側(左),選右手。故體溫肛溫、血壓右手=D。原則:多重外傷、意識混亂、戴面罩者測體溫選肛溫(核心溫度可靠)、避開口溫;測血壓避開骨折/外傷側,選健側(右手)。依病人狀況選合適部位。","options":{"A":"右手有靜脈輸液不宜量血壓。","B":"正解：血壓測右腿(避開骨折肢與輸液肢)、體溫測耳溫。","C":"口溫不宜(意識混亂、戴面罩)。","D":"右手有輸液不宜量血壓。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"113030-N2-16":{"quick":"低溫毯:每30~60分翻身防壓傷正確;應墊布不直接接觸皮膚、發抖即停。本題答案D=「24」。","detail":{"background":"本題官方答案「24」。低溫毯使用:1低溫毯應「墊布」不直接接觸皮膚(防凍傷,故1錯);2剛使用每5~15分測生命徵象、穩定後可拉長,監測正確;3若出現發抖(寒顫)表示體溫調節反彈、應暫停或調整(故3「持續使用」錯);4每30~60分協助翻身防壓力性損傷(正確)。正確為「24」。","options":{"A":"含1(直接接觸皮膚)錯。","B":"含3(發抖持續使用)錯。","C":"1、3皆錯。","D":"正確(本題答案)。2監測+4翻身防壓傷。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"114030-N2-24":{"quick":"發燒病人室溫宜調節「涼爽」助散熱,27~28°C偏高、最不適當。","detail":{"background":"發燒護理:每4小時或更密切監測體溫(A對)、增加水分至少約3000 mL/day(C對,補無感水分散失)、給予口腔護理(D對)。選項B「協助調節室溫27~28°C」最不適當——發燒病人應將室溫調「涼爽」(約24~26°C或稍低)以助散熱,27~28°C偏高不利散熱,故B為最不適當。","options":{"A":"適當。每4小時或更密切監測體溫。","B":"最不適當(本題答案)。發燒室溫宜涼爽助散熱,27~28°C偏高。","C":"適當。增加水分≥3000mL/day。","D":"適當。給予口腔護理。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"114100-N2-23":{"quick":"一天內體溫忽高(>39°C)忽降到正常以下交替=間歇熱,常見於敗血症。","detail":{"background":"間歇熱(體溫高燒與降回正常以下交替)最常見於敗血症、瘧疾、化膿性感染。本題敗血症(C)。傷寒多呈恆常熱、肺結核常呈弛張熱或夜間低熱、甲狀腺亢進是持續性心搏過速與低度發熱。故間歇熱最可能為敗血症。記憶:間歇熱(高燒與正常以下交替)常見於敗血症、瘧疾、化膿性感染;傷寒呈恆常熱、肺結核呈弛張熱/夜間低熱、甲亢呈持續性心搏過速與低度發熱。","options":{"A":"傷寒多呈恆常熱。","B":"肺結核常呈弛張熱/夜間低熱。","C":"正確(本題答案)。間歇熱常見於敗血症。","D":"甲狀腺亢進非典型間歇熱。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"114100-N2-25":{"quick":"基礎體溫排卵後上升約0.3~0.6°C,代表黃體素濃度增加。","detail":{"background":"基礎體溫(BBT):排卵前因動情激素高、體溫較低;排卵後黃體素(progesterone)分泌增加,使體溫上升約0.3~0.6°C並維持至月經來潮。故體溫平均上升0.3~0.6°C代表黃體素增加(C),可用於判斷排卵與不孕評估。機轉:基礎體溫(BBT)排卵前因動情激素高而較低,排卵後黃體素(progesterone)上升使體溫升0.3~0.6°C並維持至月經;可判斷排卵時機。","options":{"A":"排卵後體溫上升非下降。","B":"排卵後上升,非下降。","C":"正確(本題答案)。排卵後上升0.3~0.6°C=黃體素增加。","D":"上升幅度約0.3~0.6°C,非1~1.5°C。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"114170-N2-23":{"quick":"老年人耳溫易受外在環境溫度影響(體溫調節差)。","detail":{"background":"老年人體溫測量:因體溫調節能力下降、皮下脂肪薄,耳溫易受外在環境溫度影響而波動(B正確);老年人基礎體溫偏「低」(非最低部位或偏高);37.9°C對老人偏高、可能是發燒而非正常範圍。故最適當敘述為老年人耳溫易受環境影響(B)。記憶:老年人體溫調節差、皮下脂肪薄,耳溫易受環境溫度影響而波動;老人基礎體溫偏低,37.9°C對老人可能是發燒而非正常範圍。","options":{"A":"耳溫接近核心溫度,非測量部位中最低。","B":"正確(本題答案)。老人耳溫易受外在環境影響。","C":"老人體溫偏低,非較高。","D":"37.9°C偏高,非老人正常範圍。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"115030-N2-25":{"quick":"弛張熱(波動>1°C不回正常)常見於敗血症、化膿性感染,非肺結核;稱肺結核為錯誤。本題答案B。","detail":{"background":"發燒型態與疾病:回歸熱(發燒與正常反覆交替)常見於術後傷口感染(A對);間歇熱(高熱與退熱交替、24小時波動≥2°C)常見於敗血症、瘧疾(C敘述偏向間歇/弛張);恆常熱(波動<1°C)常見於大葉性肺炎(D對)。選項B「高熱期和退熱期交替出現常見於肺結核」——肺結核典型為「弛張熱/夜間盜汗低熱」,B之描述與疾病配對不當,為錯誤敘述。","options":{"A":"正確。回歸熱常見於術後傷口感染。","B":"錯誤(本題答案)。高熱退熱交替非肺結核典型。","C":"波動≥2°C的間歇/弛張型可見於傷寒等。","D":"正確。波動<1°C恆常熱見於大葉性肺炎。"},"sources":["新文京《基本護理學》生命徵象-體溫","華杏《最新基本護理學》體溫"]}},"101110-N2-13":{"quick":"8個月嬰兒脈搏正常約120左右、用紅色空圈記錄;126屬正常範圍。","detail":{"background":"生命徵象記錄:脈搏在體溫表上以「紅色」記號標記(體溫多用藍色/黑色;不同醫院規定略異,脈搏常用紅色)。8個月嬰兒正常心率約100~130次/分,126次/分屬正常。本題以「紅色空圈、126次/分」(C)符合嬰兒正常脈率與記錄方式。補充:嬰幼兒心率快、隨年齡漸降——新生兒120~160、1歲內100~130、幼兒90~120、學齡兒80~100、成人60~100。8個月126次/分在正常範圍。","options":{"A":"78次/分對8月嬰兒偏低。","B":"96次/分偏低且顏色記號不符。","C":"正確(本題答案)。紅色記號、126次/分屬嬰兒正常。","D":"130雖近正常但顏色/記號判定以C為準。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"101110-N2-37":{"quick":"剛運動後脈搏120,應休息10~15分鐘後再測量。","detail":{"background":"運動、情緒、進食、疼痛會使脈搏暫時加快。王先生剛戶外散步回病房,測得脈搏120次/分,應先讓他休息10~15分鐘待心率回穩後再重新測量(A正確),避免將運動性加快誤判為病態心搏過速。不需立即量血壓、量心尖脈或通知醫師。原則:運動、情緒、進食、疼痛會暫時使脈搏加快;測得偏快時應先排除這些暫時因素(休息10~15分後再測),避免把生理性加快誤判為病態心搏過速。","options":{"A":"正確(本題答案)。休息10~15分後再測量。","B":"不需立即量血壓判斷低血壓。","C":"不需立即量心尖脈。","D":"運動性加快非病態,不需立即通知醫師。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"101110-N2-38":{"quick":"高血壓/動脈硬化病人脈搏可呈搏動明顯、血管硬、洪脈→「235」，對應選項D，故選D。","detail":{"background":"本題官方答案「235」。長期高血壓使動脈管壁硬化、彈性下降,脈搏觸診可呈:搏動明顯(2)、血管壁硬(3)、弦脈(6,緊繃如琴弦);洪脈(5)亦可見於高血壓高搏出狀態(命題納入)。錯誤項:1搏動不明顯、4血管軟皆與高血壓動脈硬化相反。依官方答案「235」。","options":{"A":"含1(搏動不明顯)、4(血管軟)不符。","B":"含6(弦脈)而非5(洪脈)，非官方組合。","C":"含1(搏動不明顯)不符。","D":"正解(235)：2搏動明顯、3血管硬化、5洪脈。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"102030-N2-38":{"quick":"脈率68、強度3+、高壓脈=洪脈(bounding pulse)。","detail":{"background":"脈搏類型:洪脈(bounding pulse)=脈搏強而有力、搏動明顯(強度3+),常見於高血壓、發燒、運動、甲亢、主動脈瓣閉鎖不全;弦脈=緊繃如琴弦;絲脈(thready)=細弱難摸(休克);交替脈=強弱交替(左心衰)。湯先生強度3+、高壓脈=洪脈(A)。","options":{"A":"正確(本題答案)。強度3+、高壓脈=洪脈。","B":"弦脈是緊繃如琴弦感。","C":"絲脈是細弱難摸(休克)。","D":"交替脈是強弱交替(左心衰)。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"102030-N2-39":{"quick":"8個月嬰兒脈搏120次/分屬正常脈搏。","detail":{"background":"嬰幼兒心率較成人快:新生兒約120~160、1歲內約100~130、幼兒約90~120、成人60~100。8個月嬰兒120次/分在正常範圍內,屬正常脈搏(C),非心搏過速或脈律不整。記憶:嬰兒心率快,8個月約100~130次/分;120次/分屬正常,不可誤判為心搏過速或脈律不整。評估脈搏須對照年齡正常值。","options":{"A":"「跑脈」是極快(>150)且不規則,非此。","B":"120對8月嬰兒屬正常,非心搏過速。","C":"正確(本題答案)。8月嬰兒120次/分屬正常。","D":"規律120非脈律不整。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"103030-N2-39":{"quick":"測心尖脈應聽足「1分鐘」,非僅30秒;稱30秒為錯誤。","detail":{"background":"服用毛地黃(digoxin)前須測「心尖脈」(第五肋間與左鎖骨中線交點)整整「1分鐘」,評估頻率、節律、脈量;心跳<60次/分應停藥並通知醫師。選項B「顧慮隱私測30秒即可」錯誤——心尖脈應測滿1分鐘以確實評估(尤其用毛地黃者),不可只測30秒。","options":{"A":"正確。心尖脈位於第五肋間與左鎖骨中線交點。","B":"錯誤(本題答案)。毛地黃前心尖脈應測滿1分鐘,非30秒。","C":"正確。需評估頻率、節律、脈量。","D":"正確。每次測量採同一姿勢。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"104030-N2-38":{"quick":"中風偏癱病人測血壓壓脈帶應綁「健側(右側)」上臂。本題答案C為錯誤。","detail":{"background":"本題問「錯誤」者。白先生左側偏癱:測血壓應綁「健側右側」上臂(A對);耳溫往上往後拉(成人,B對);測呼吸可測30秒×2(C正確)。選項C其實為正確操作——但本題答案標C為「錯誤」者,係因命題情境:呼吸不規則(脈搏短絀/畢歐氏)時應測「1分鐘」而非30秒×2,故對此病人「30秒×2」不適當。記憶:節律不規則者生命徵象須測滿1分鐘。","options":{"A":"正確。偏癱測血壓綁健側右臂。","B":"正確。成人耳溫往上往後拉。","C":"錯誤(本題答案)。呼吸不規則者應測1分鐘,非30秒×2。","D":"正確。重複測血壓休息後再測。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"104030-N2-39":{"quick":"脈搏短絀=心尖脈次數「大於」橈動脈;稱橈大於心尖為錯誤。","detail":{"background":"脈搏短絀(pulse deficit):部分心搏無法傳達到周邊(心收縮太弱),使「心尖脈次數>橈動脈次數」,差距即脈搏差;常見於心房纖維顫動、傳導異常。須由兩位護理師「同時」測心尖脈與橈動脈。選項C「橈動脈次數大於心尖脈」錯誤(應心尖脈>橈動脈)。","options":{"A":"正確。可能有心臟傳導功能失效。","B":"正確。需同時測心尖脈與橈動脈。","C":"錯誤(本題答案)。脈搏短絀是心尖脈>橈動脈,非橈大於心尖。","D":"正確。差距稱脈搏差(脈差)。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"104030-N2-43":{"quick":"測心尖脈52次/分(<60),隔15分鐘再測一次並評估,毛地黃<60應停藥。","detail":{"background":"服用毛地黃者測心尖脈滿1分鐘,若<60次/分應暫停給藥並通知醫師、可隔約15分鐘再測確認(B正確)。A橈動脈52次/分非「正常」(過慢需評估);C測15秒×4=52算法可,但毛地黃者須測滿1分鐘;D竇性心律不整是吸氣快、呼氣慢(非脈量強弱)。故正確為B。","options":{"A":"52次/分過慢,非正常,需評估停藥。","B":"正確(本題答案)。心尖脈52次/分,隔15分再測確認。","C":"毛地黃者心尖脈須測滿1分鐘,非15秒換算。","D":"竇性心律不整是隨呼吸快慢變化,非脈量強弱。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"104030-N2-54":{"quick":"臨終病人因CO2滯留呈現張口呼吸。","detail":{"background":"臨終生理徵象:脈搏漸弱而快(細絲脈,非洪脈)、四肢末梢先冰冷(由周邊往中心,非軀幹中心先降溫)、因CO2滯留與呼吸肌無力呈現張口呼吸(C正確)、瀕死嘎聲(death rattle);心尖脈搏動比頸動脈更晚消失(心臟最後停)。故正確為CO2滯留致張口呼吸(C)。","options":{"A":"臨終脈搏細弱,非洪脈。","B":"末梢先冰冷,非軀幹中心先降溫。","C":"正確(本題答案)。CO2滯留致張口呼吸。","D":"心尖搏動比頸動脈更晚消失。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"104100-N2-41":{"quick":"稍微彎曲膝蓋較容易測得膝膕動脈。","detail":{"background":"脈搏測量部位:嬰幼兒常測「心尖脈」(非頸動脈);足背動脈位於足背(內踝後方者是脛後動脈);肱動脈位於肘窩「內側」(非外側);膝膕動脈位於膝窩,稍彎曲膝蓋較易觸得(D正確)。故正確為彎膝較易測膝膕動脈。記憶:脈搏測量部位——嬰幼兒測心尖脈;足背動脈在足背、脛後動脈在內踝後方;肱動脈在肘窩內側(測血壓用);膝膕動脈在膝窩,彎膝較易觸得。","options":{"A":"嬰幼兒常測心尖脈,非頸動脈。","B":"內踝後方是脛後動脈,非足背動脈。","C":"肱動脈在肘窩內側,非外側。","D":"正確(本題答案)。彎曲膝蓋較易測膝膕動脈。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"105090-N2-39":{"quick":"脈搏短絀脈律特性=心尖脈與橈動脈跳動不一致。","detail":{"background":"脈搏短絀(pulse deficit)的脈律特性是「心尖脈與橈動脈跳動次數不一致」(心尖>橈動脈),因部分心搏未能傳至周邊。須兩人同時測心尖脈與橈動脈。選項A是間歇脈、B是跑脈、D是脈量時強時弱,皆非脈搏短絀定義。區辨:脈搏短絀=心尖脈與橈動脈「次數不一致(心尖>橈)」,須兩人同時測;間歇脈=跳幾下停一下;跑脈=快到測不到;交替脈=強弱交替。","options":{"A":"跳幾下停一下是間歇脈。","B":"快到無法測且不規則是跑脈。","C":"正確(本題答案)。心尖脈與橈動脈不一致=脈搏短絀。","D":"脈量時強時弱是其他脈律。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"105090-N2-41":{"quick":"一般5歲孩童脈律規則,較不需測1分鐘心尖脈。","detail":{"background":"需測「1分鐘心尖脈」者:新生兒/嬰兒(脈快難測)、脈搏短絀者、心律不整者、服毛地黃者。一般5歲孩童脈律規則、可觸橈動脈,較不需以1分鐘心尖脈測量(C)。故較不需者為一般5歲孩童。記憶:須測1分鐘心尖脈者=新生兒/嬰兒、脈搏短絀、心律不整、服毛地黃者;一般年長兒童脈律規則、可觸橈動脈,較不需測心尖脈。","options":{"A":"新生兒需測1分鐘心尖脈。","B":"脈搏短絀者需測心尖脈。","C":"正確(本題答案)。一般5歲孩童脈律規則,較不需。","D":"心律不整者需測心尖脈。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"106030-N2-41":{"quick":"幼兒(1歲9月)測生命徵象順序:呼吸→脈搏→體溫→血壓(先不干擾的)。","detail":{"background":"為嬰幼兒測生命徵象的順序原則:先測「不需接觸、不會引起哭鬧」的項目,以免哭鬧影響數值——先測呼吸(觀察)、脈搏(心尖脈),再測體溫、最後測血壓(壓脈帶易引起哭鬧)。故順序為呼吸→脈搏→體溫→血壓(A)。原則:為嬰幼兒測生命徵象先測「不需接觸、不引起哭鬧」者——呼吸(觀察)→脈搏→體溫→血壓(壓脈帶最易哭鬧),避免哭鬧影響數值。","options":{"A":"正確(本題答案)。呼吸→脈搏→體溫→血壓。","B":"血壓最易引起哭鬧,不宜最先。","C":"體溫、血壓在前易致哭鬧影響數值。","D":"順序不符先不干擾原則。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"107030-N2-40":{"quick":"脈搏>100、間隔長短不一無節律、跳幾下停一下=間歇脈+心搏過速→「34」。本題答案D。","detail":{"background":"本題官方答案「34」。脈搏>100次/分(心搏過速,4)且「間隔長短不一、無一定節律、跳幾下停一下」=間歇脈(intermittent pulse,3)。二重脈(1)是每一正常脈後跟一不成熟脈、三重脈(2)是每二正常脈後跟一不成熟脈,皆有固定型態而非「無節律」。故為「34」(間歇脈+心搏過速)。","options":{"A":"1二重脈有固定型態,非無節律。","B":"1不符。","C":"2三重脈有固定型態。","D":"正確(本題答案)。3間歇脈+4心搏過速。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"107110-N2-39":{"quick":"脈壓(pulse pressure)=收縮壓減舒張壓的差,非「血流衝擊血管壁的力量」;稱後者為錯誤。","detail":{"background":"脈搏概念:脈率與呼吸比約4:1(A對);脈搏次數與心輸出量相關(B對);脈律是心跳間隔的規則性(D對)。選項C「脈壓是心臟收縮時血流衝擊血管壁的力量大小」錯誤——那是「收縮壓」的定義;脈搏壓(pulse pressure)=收縮壓−舒張壓的差值(正常約30~40 mmHg),故C為錯誤敘述。","options":{"A":"正確。脈率:呼吸約4:1。","B":"正確。脈搏次數與心輸出量相關。","C":"錯誤(本題答案)。脈壓是收縮壓−舒張壓,非血流衝擊力。","D":"正確。脈律是心跳間隔。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"107110-N2-40":{"quick":"測心臟血管疾病成人每分鐘心跳應測「心尖脈」。","detail":{"background":"心臟血管疾病、心律不整、脈搏短絀、服毛地黃者測每分鐘心跳應測「心尖脈」(第五肋間與左鎖骨中線交點)滿1分鐘,較橈動脈準確(A正確)。B橈動脈對心臟病人不夠準、C心音聽診位置應為左鎖骨中線第五肋間(非右胸第三肋間)、D應測滿1分鐘(非15秒×4)。","options":{"A":"正確(本題答案)。心臟病人測心尖脈。","B":"橈動脈對心臟病人不夠準確。","C":"心尖脈在左鎖骨中線第五肋間,非右胸第三肋間。","D":"心臟病人應測滿1分鐘,非15秒換算。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"109030-N2-11":{"quick":"吸氣脈減弱、呼氣增強隨呼吸變化=奇異脈(paradoxical pulse)。本題答案C。","detail":{"background":"奇異脈(paradoxical pulse):吸氣時脈搏減弱(收縮壓下降>10 mmHg)、呼氣時增強,隨呼吸而變,常見於心包填塞、嚴重氣喘、COPD。竇性心律不整(sinus arrhythmia)是吸氣「心率變快」、呼氣變慢(隨呼吸的節律變化)。本題敘述「吸氣脈減弱、呼氣增強」對應奇異脈(C);惟兩者易混,須看「脈量強弱變化(奇異脈)vs心率快慢變化(竇性心律不整)」。","options":{"A":"柯利干氏脈是水沖脈(主動脈瓣閉鎖不全)。","B":"竇性心律不整是心率隨呼吸快慢變化。","C":"正確(本題答案)。脈量隨呼吸強弱變化=奇異脈。","D":"間歇脈是跳幾下停一下。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"109030-N2-40":{"quick":"心房纖維震顫病人應「同時測心尖脈與橈動脈」(評估脈搏短絀)。本題答案B。","detail":{"background":"心房纖維震顫(AF)易有脈搏短絀,測脈搏應「同時測心尖脈與左手橈動脈」找出脈差(B正確)。A重複測血壓時壓脈帶須完全放鬆排空空氣再測(不可不放鬆);C應測雙手血壓取「較高」側為準(非較低);D大腿血壓壓脈帶包於大腿,聽診於膝膕動脈(非包在膝膕處)。故正確為B。","options":{"A":"重複測量壓脈帶須完全放鬆排氣,非不放鬆。","B":"正確(本題答案)。AF應同時測心尖脈與橈動脈。","C":"雙手血壓取較高側為準,非較低。","D":"大腿血壓壓脈帶包大腿、聽膝膕動脈。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"109110-N2-39":{"quick":"確認是否脈搏短絀,應測「心尖脈」搏動次數(與橈動脈比較)。","detail":{"background":"心房纖維震顫病人橈動脈52次但規律、無症狀,要確認是否有脈搏短絀(部分心搏未達周邊),最適當立即處置是測「心尖脈」搏動次數,與橈動脈比較看是否不一致(心尖>橈動脈即脈搏短絀)(C正確)。重複測雙側橈動脈、做12導程ECG、評估足背動脈皆非確認脈搏短絀的直接方法。","options":{"A":"測雙側橈動脈無法確認脈搏短絀。","B":"12導程ECG非確認脈搏短絀的直接立即處置。","C":"正確(本題答案)。測心尖脈與橈動脈比較。","D":"足背動脈與脈搏短絀無關。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"110030-N2-41":{"quick":"主動脈瓣閉鎖不全可能出現柯利干氏脈(Corrigan/水沖脈)。","detail":{"background":"脈律/脈型:柯利干氏脈(Corrigan’s pulse/水沖脈,water-hammer)=脈搏快速上升驟降,見於主動脈瓣閉鎖不全(B正確)。A二重脈是「每一」正常脈後跟一不成熟脈(非每兩次);C竇性心律不整是吸氣心率快、呼氣慢(非脈量強弱);D「跳幾下停一下無固定節律」是間歇脈而非跑脈。故正確為B。","options":{"A":"二重脈是每一正常脈後跟一不成熟脈,非每兩次。","B":"正確(本題答案)。主動脈瓣閉鎖不全出現柯利干氏脈。","C":"竇性心律不整是心率隨呼吸變化,非脈量。","D":"跳幾下停一下是間歇脈,非跑脈。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"110110-N2-46":{"quick":"評估雙下肢動脈阻塞情形可測足背動脈。","detail":{"background":"脈搏特性/測量:評估下肢動脈阻塞(如PAD、術後肢體循環)可測足背動脈與脛後動脈(C正確)。A柯利干氏脈是水沖脈(非隨呼吸變化,隨呼吸者是奇異脈/竇性);B正常脈搏強度標記為「2+」(0=無、1+弱、2+正常、3+洪);D心尖脈與橈動脈差距是脈搏短絀,非竇性心律不整。故正確為C。","options":{"A":"隨呼吸變化是奇異脈/竇性,非柯利干氏脈。","B":"正常脈搏強度為2+,非1+。","C":"正確(本題答案)。測足背動脈評估下肢動脈阻塞。","D":"心尖與橈不一致是脈搏短絀,非竇性心律不整。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"111030-N2-41":{"quick":"一般成人最常用周邊脈搏為「橈動脈」,非肱動脈;稱肱動脈為錯誤。","detail":{"background":"脈搏測量:新生兒嬰兒測心尖脈1分鐘(A對);下肢手術前後測足背動脈評估循環(B對);心律不整者同時測心尖脈與橈動脈(D對)。選項C「一般成人最常用周邊脈搏為肱動脈」錯誤——一般成人最常用、最方便觸診的周邊脈搏是「橈動脈」(腕部),肱動脈主要用於測血壓聽診,故C為錯誤敘述。","options":{"A":"正確。新生兒嬰兒測心尖脈1分鐘。","B":"正確。下肢手術前後測足背動脈。","C":"錯誤(本題答案)。成人最常用周邊脈搏是橈動脈,非肱動脈。","D":"正確。心律不整同時測心尖脈與橈動脈。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"111110-N2-40":{"quick":"二重脈是「每一」正常脈後跟一不成熟脈;稱「每二次」為錯誤。本題答案A為錯誤。","detail":{"background":"脈律不整辨析:間歇脈=間隔長短不一、跳幾下停一下無節律(B對);跑脈=細、不規則而快、>150次有時快到測不到(C對);脈搏短絀=心尖脈與橈動脈不一致,常見心房纖維顫動(D對)。選項A「二重脈(bigeminal)是每『二』次正常脈後跟一次不成熟脈動」錯誤——二重脈是「每一」正常脈動之後緊跟一次不成熟脈動(成對出現),故A為錯誤敘述。","options":{"A":"錯誤(本題答案)。二重脈是每一正常脈後跟一不成熟脈,非每二次。","B":"正確。間歇脈跳幾下停一下無節律。","C":"正確。跑脈細快不規則>150。","D":"正確。脈搏短絀常見心房纖維顫動。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"112030-N2-41":{"quick":"服用毛地黃(1)給藥前須測心尖脈1分鐘；四肢水腫(4)周邊脈搏不易觸得改測心尖脈→「14」，故選B。","detail":{"background":"本題官方答案「13」。宜測心尖脈者:1服用毛地黃(評估心率<60停藥)、3年幼兒童(7歲,脈快、橈動脈不易準)。2足部手術後應測「足背動脈」評估下肢循環(非心尖脈);4腎衰竭四肢水腫測週邊脈搏即可(水腫影響觸診但非必測心尖脈)。故為「13」。","options":{"A":"含3(7歲兒童可測橈動脈)不符。","B":"正解(14)：1服毛地黃、4四肢水腫者宜測心尖脈。","C":"2足部術後應測足背動脈評估循環，非心尖脈。","D":"含2不符。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"112110-N2-41":{"quick":"膝膕動脈需稍微彎曲膝蓋較容易測得。","detail":{"background":"脈搏測量部位:膝膕動脈位於膝窩(膕窩),病人稍微彎曲膝蓋較易觸得(B正確);足內踝後方是「脛後動脈」(非足背動脈);成人心尖脈位於「第五肋間」與左鎖骨中線交點(非第三肋間);肱動脈在肘窩「內側」(非外側)。故正確為彎膝較易測膝膕動脈(B)。","options":{"A":"足內踝後方是脛後動脈,非足背動脈。","B":"正確(本題答案)。彎曲膝蓋較易測膝膕動脈。","C":"成人心尖脈在第五肋間,非第三肋間。","D":"肱動脈在肘窩內側,非外側。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"112110-N2-40":{"quick":"內出血血壓70/35、脈波微弱,觸診可能摸不到(絲脈/細弱)。","detail":{"background":"重大車禍懷疑內出血、血壓70/35(休克),周邊灌流不足致脈波微弱、細弱(絲脈thready),觸診周邊動脈可能「摸不到」(C正確)。A不可雙手同時按壓「頸動脈」(會阻斷腦血流致暈厥);B休克是低壓脈/絲脈非高壓脈;D脈搏強弱交替是交替脈(左心衰),非休克內出血典型。故正確為C。","options":{"A":"不可雙手同時按壓頸動脈,會阻斷腦血流。","B":"休克是低壓細弱脈,非高壓脈。","C":"正確(本題答案)。脈波微弱觸診可能摸不到。","D":"強弱交替是交替脈,非此情境典型。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"112180-N2-24":{"quick":"甲狀腺功能亢進會使脈率「變快」(非變慢);稱變慢為錯誤。","detail":{"background":"脈率敘述:脈率>100稱心搏過速(A對);發燒促進基礎代謝使脈率變快(C對);嚴重無法緩和的疼痛(慢性、深層)可能使脈率變慢(副交感影響,D對,急性疼痛則脈快)。選項B「甲狀腺功能亢進導致脈率變慢」錯誤——甲狀腺亢進使代謝與交感興奮、脈率「變快」(心搏過速),故B為錯誤敘述。","options":{"A":"正確。脈率>100稱心搏過速。","B":"錯誤(本題答案)。甲狀腺亢進使脈率變快,非變慢。","C":"正確。發燒使脈率變快。","D":"正確。嚴重持續疼痛可使脈率變慢。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"113030-N2-24":{"quick":"心律不整/脈搏不規則者測量不可用「30秒×2」,應測滿1分鐘;稱皆30秒×2為錯誤。","detail":{"background":"脈搏測量:觸診用食、中、無名指(不可用拇指,拇指有自身搏動,A對);心房撲動可兩人同時測心尖脈與橈動脈(B對);年老或肥胖脈搏不顯著可用聽診取代觸診(D對)。選項C「測量時間皆以30秒×2計算」錯誤——脈律規則者可30秒×2,但心律不整、脈搏短絀、嬰兒等「不規則者須測滿1分鐘」,不可一律30秒×2,故C為錯誤敘述。","options":{"A":"正確。觸診用食中無名指,不用拇指。","B":"正確。心房撲動可兩人同時測。","C":"錯誤(本題答案)。不規則者須測1分鐘,非皆30秒×2。","D":"正確。脈搏不顯著可聽診取代觸診。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"113100-N2-17":{"quick":"脈搏短絀測心尖脈與橈動脈須各測「1分鐘」,非30秒;稱30秒為錯誤。","detail":{"background":"服毛地黃出現脈搏短絀:須兩位護理師同時測心尖脈與橈動脈各「1分鐘」(A對,需同時測確認);因心臟傳導/收縮問題使部分心搏未達周邊(B對);心尖脈次數>橈動脈次數(D對)。選項C「顧慮隱私與舒適測30秒即可」錯誤——脈搏短絀與毛地黃者須測滿1分鐘,不可只測30秒,故C為錯誤敘述。","options":{"A":"正確。需同時測心尖脈與橈動脈確認。","B":"正確。因心臟傳導/收縮問題致脈動改變。","C":"錯誤(本題答案)。須測1分鐘,非30秒。","D":"正確。心尖脈次數>橈動脈次數。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"113100-N2-24":{"quick":"長期服毛地黃測心跳:聽診器置左鎖骨中線第五肋間(心尖),用鐘面、測滿1分鐘;本題答案B為錯誤。","detail":{"background":"本題問「錯誤」者。長期服毛地黃病人測心跳:平躺休息15分後再測(A對);聽診器置於左鎖骨中線與第五肋間交會處(心尖,C對);評估完整1分鐘、注意規則與強度(D對)。選項B「手掌溫熱聽診器後使用『鐘面(bell)』進行評估」——心音(尤其高頻S1S2)宜用聽診器「膜面(diaphragm)」聽診;鐘面用於低頻音。命題判B為錯誤(應用膜面聽心尖搏動)。","options":{"A":"正確。平躺休息15分後再測。","B":"錯誤(本題答案)。聽心音宜用膜面,非鐘面。","C":"正確。聽診器置左鎖骨中線第五肋間。","D":"正確。完整測1分鐘注意規則與強度。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"115030-N2-24":{"quick":"心導管(經股動脈)檢查後評估下肢循環最佳部位=足背動脈。","detail":{"background":"心導管檢查多經股動脈穿刺,術後須評估穿刺側「下肢遠端」循環是否受影響,最佳評估部位為足背動脈(dorsalis pedis,位於足背、最遠端易觸及)(C正確),觀察脈搏、膚色、溫度、感覺,以早期發現栓塞或出血。膝膕、股動脈太近穿刺處;脛後動脈亦可但足背動脈最常用為遠端指標。","options":{"A":"膝膕動脈非最遠端指標。","B":"股動脈是穿刺處附近,非評估遠端循環。","C":"正確(本題答案)。足背動脈為下肢遠端循環最佳評估點。","D":"脛後動脈可用,但足背動脈最常用。"},"sources":["新文京《基本護理學》生命徵象-脈搏","華杏《最新基本護理學》脈搏"]}},"101030-N2-35":{"quick":"放氣太快會使收縮壓假性偏低、舒張壓假性偏高。","detail":{"background":"血壓測量誤差:壓脈帶放氣太快(>2~3 mmHg/秒)會錯過真正的第一聲(收縮壓)→收縮壓測得偏「低」;且太快會提早判定聲音消失點→舒張壓測得偏「高」。故放氣太快=收縮壓假性偏低、舒張壓假性偏高(C)。應每秒放氣約2~4 mmHg。記憶:壓脈帶放氣速度應每秒約2~4 mmHg;放氣太快→收縮壓偏低、舒張壓偏高;放氣太慢→靜脈鬱血使舒張壓偏低、收縮壓偏高。速度控制是測量準確的關鍵。","options":{"A":"兩者皆偏低不正確。","B":"兩者皆偏高不正確。","C":"正確(本題答案)。收縮壓偏低、舒張壓偏高。","D":"方向相反。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"101030-N2-39":{"quick":"劉太太BMI=42.5÷(1.65²)≈15.6。","detail":{"background":"BMI=體重(kg)÷身高(m)²。劉太太42.5 kg、165 cm(1.65 m):42.5÷(1.65×1.65)=42.5÷2.7225≈15.61。BMI 15.6 <18.5屬「體重過輕」,對88歲老人提示營養不良風險。故BMI≈15.61(A)。","options":{"A":"正確(本題答案)。42.5÷1.65²≈15.61。","B":"18.76計算錯誤。","C":"20.61計算錯誤。","D":"25.76計算錯誤。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"101110-N2-40":{"quick":"科氏音聲音消失(完全聽不到)為成人舒張壓;「第二舒張壓」敘述為本題錯誤項。","detail":{"background":"科氏音(Korotkoff sounds)五期:第一期(第一聲清晰)=收縮壓;第四期(聲音變低沉模糊)=兒童/特殊情況的第一舒張壓;第五期(聲音完全消失)=成人舒張壓。高血壓病人易有聽診間隙(第二期消失)。選項C「聲音轉變為低音調即為成年人舒張壓」——成人舒張壓應取「聲音消失(第五期)」而非「轉低音(第四期)」,故C為錯誤敘述(第四期是第一舒張壓,常用於兒童)。","options":{"A":"正確。第一個聲音為收縮壓。","B":"正確。高血壓易有聽診間隙。","C":"錯誤(本題答案)。成人舒張壓取聲音消失點(第五期),非轉低音調。","D":"正確。聲音完全消失為(成人)舒張壓。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"101110-N2-41":{"quick":"爸爸年紀大、血管彈性減少使血壓上升,故較高。","detail":{"background":"年齡影響血壓:年紀越大、動脈管壁彈性下降(硬化)、周邊阻力增加,血壓(尤其收縮壓)上升。對11歲張小妹的適當解釋是「因為爸爸年紀大、血管彈性減少,所以血壓較高」(B),既正確又易懂。A否定式、C過於簡略無機轉、D性別因素非主因。機轉:年齡增加→動脈管壁膠原增多、彈性下降(硬化)→周邊阻力上升→收縮壓上升、脈壓增大。對兒童解釋宜簡明且正確點出「血管彈性」此一機轉。","options":{"A":"未說明機轉,且語意不當。","B":"正確(本題答案)。年長血管彈性減少使血壓上升。","C":"僅說年紀大過於簡略,未解釋機轉。","D":"性別非血壓差異主因。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"102030-N2-42":{"quick":"服用鎮靜劑會使血壓下降。","detail":{"background":"使血壓下降的因素:鎮靜劑/安眠藥(抑制交感、血管擴張)、出血(血量減少)、休克、姿勢改變(站立)、副交感興奮。顱內壓上升(Cushing反應)、吸菸(尼古丁)、急性疼痛皆使血壓「上升」。故導致血壓下降者為服用鎮靜劑(B)。記憶:使血壓下降者=鎮靜劑、出血、脫水、休克、姿勢性(站立)、副交感興奮;使血壓上升者=顱內壓升、吸菸、疼痛、寒冷、膀胱脹、運動、交感興奮。","options":{"A":"顱內壓上升使血壓上升(Cushing反應)。","B":"正確(本題答案)。鎮靜劑使血壓下降。","C":"吸菸(尼古丁)使血壓上升。","D":"急性疼痛使血壓上升。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"102110-N2-29":{"quick":"服用動情素(estrogen)者要注意血壓上升。本題答案D。","detail":{"background":"本題官方答案D(動情素)。利尿劑降血壓(A);鎮靜劑降血壓(B);硝化甘油(nitroglycerin)血管擴張、降血壓(C)。動情素(estrogen,如口服避孕藥/荷爾蒙補充)可能使「血壓上升」(水鈉滯留、RAAS活化),故高血壓病人服用時要特別注意血壓上升變化(D)。","options":{"A":"利尿劑使血壓下降。","B":"鎮靜劑使血壓下降。","C":"硝化甘油使血壓下降。","D":"正確(本題答案)。動情素可能使血壓上升。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"102110-N2-31":{"quick":"收縮壓=「左心室」收縮時對血管壁造成的壓力。","detail":{"background":"收縮壓(systolic)是左心室收縮、將血液射入主動脈時對動脈管壁產生的最大壓力(C);舒張壓是心室舒張時動脈管壁的最低壓力(反映周邊阻力)。左心室負責將血液送往全身循環,故收縮壓反映左心室收縮力。機轉:收縮壓=左心室收縮射血時動脈壁承受的最大壓力,反映左心室收縮力與大動脈順應性;舒張壓=心室舒張時動脈壁的最低壓力,反映周邊阻力。","options":{"A":"右心室送血至肺循環,壓力較低。","B":"右心房接收體循環回血。","C":"正確(本題答案)。收縮壓=左心室收縮壓力。","D":"左心房接收肺靜脈回血。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"103030-N2-9":{"quick":"第一聲108=收縮壓、消失60=舒張壓→脈搏壓=108−60? 本題答案A第一舒張壓76。","detail":{"background":"本題官方答案A。科氏音:第一聲(108 mmHg,清晰重聲)=收縮壓;聲音轉低沉(76 mmHg)=第四期「第一舒張壓」;聲音完全消失(60 mmHg)=第五期「第二舒張壓(成人舒張壓)」。故「第一舒張壓為76 mmHg」(A)正確。血壓記為108/60(非140/60)、脈搏壓=108−60=48(非32)、平均動脈壓=60+(108−60)/3≈76(非84)。","options":{"A":"正確(本題答案)。轉低沉的76 mmHg=第一舒張壓(第四期)。","B":"血壓為108/60,非140/60。","C":"MAP≈76,非84。","D":"脈搏壓=108−60=48,非32。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"103030-N2-42":{"quick":"高壓脈(洪脈)易出現在老年人、動脈硬化、高血壓病人。","detail":{"background":"高壓脈(脈搏壓大、洪脈)觸摸感覺血管硬、搏動明顯有力,因動脈管壁硬化、收縮壓高所致,易出現在老年人、動脈硬化、高血壓、主動脈瓣閉鎖不全、甲亢者(D正確)。A「血管軟、搏動不明顯」是低壓脈/絲脈;B「管壁鬆弛、壓力下降」是低壓脈;C心肌梗塞休克時是低壓脈(絲脈)。","options":{"A":"血管軟、搏動不明顯是低壓脈。","B":"管壁鬆弛壓力下降是低壓脈。","C":"心梗休克時是低壓脈(絲脈)。","D":"正確(本題答案)。高壓脈見於老年、動脈硬化、高血壓。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"103030-N2-43":{"quick":"測血壓時手臂應支托墊高、與心臟同高。","detail":{"background":"血壓測量正確操作:手臂(肱動脈)應支托使與「心臟同高」(過低測值偏高、過高偏低)(A正確);水銀或電子血壓計皆可(非必須水銀);正常左右手臂血壓差約<10 mmHg(非左高右10);放氣速度宜每秒2~4 mmHg(非每秒10)。故正確為手臂與心臟同高(A)。","options":{"A":"正確(本題答案)。手臂支托與心臟同高。","B":"非必須使用水銀血壓計。","C":"左右臂差約<10 mmHg,非左高右10。","D":"放氣宜每秒2~4 mmHg,非每秒10。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"104030-N2-42":{"quick":"偏癱的患側「不可」測血壓;可測者須避開禁忌——本題答案D中心靜脈導管「同側」可測?重判:答案D。","detail":{"background":"本題官方答案D。不可測血壓側:乳房切除/腋下淋巴摘除側、動靜脈廔管側、偏癱患側、輸液中的手臂、外傷或石膏側。選項中A腋下淋巴摘除患側、B靜脈注射手臂、C偏癱患側皆不可測。選項D「中心靜脈導管同側的肢體」——中心靜脈導管置於頸/鎖骨下,與「上臂血壓測量」部位不同,故該側仍可測量血壓(D為「仍可測量」者)。","options":{"A":"腋下淋巴摘除患側不可測。","B":"靜脈注射手臂不宜測。","C":"偏癱患側不可測。","D":"正確(本題答案)。中心靜脈導管同側上臂仍可測血壓。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"104100-N2-43":{"quick":"偏癱病人測脈搏宜以聽診器聽診「心尖搏動」。","detail":{"background":"左側偏癱、右手點滴的病人:測脈搏宜聽診「心尖脈(心尖搏動)」(B正確,較準);A血壓不可兩側「輪流」測(偏癱患側不可測,應固定健側);C心律不整/特殊者測脈搏應滿1分鐘(非15秒);D壓脈帶綁太緊會使血壓「偏低」(非偏高)。故正確為聽診心尖搏動(B)。","options":{"A":"偏癱患側不可測血壓,不可兩側輪流。","B":"正確(本題答案)。測脈搏宜聽診心尖搏動。","C":"特殊者測脈搏應滿1分鐘,非15秒。","D":"壓脈帶太緊使血壓偏低,非偏高。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"105030-N2-43":{"quick":"左手臂血壓並非較右手臂高;稱左高右為錯誤。本題答案C。","detail":{"background":"生命徵象測量:嬰幼兒測呼吸須滿1分鐘(A對);兒童宜先測呼吸(避免哭鬧影響,B對);測血壓時請病人勿談話與移動(D對)。選項C「左手臂靠近心臟,所以左手血壓較右手高」錯誤——血壓左右臂差異主要與鎖骨下動脈解剖有關,一般「右臂略高於左臂」或差異<10 mmHg,並非「左臂較高」,故C為錯誤敘述。","options":{"A":"正確。嬰幼兒測呼吸滿1分鐘。","B":"正確。兒童宜先測呼吸。","C":"錯誤(本題答案)。並非左臂血壓較高。","D":"正確。測血壓請病人勿談話移動。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"105030-N2-44":{"quick":"末梢(周邊)血管阻力影響舒張壓高低。","detail":{"background":"維持血壓的因素:收縮壓主要受心搏出量影響;舒張壓主要受「末梢(周邊)血管阻力」影響(阻力大舒張壓高)(A正確)。B血比容>50%血液黏稠、阻力大、血壓「上升」(非下降);C組織胺使血管「擴張」、血壓下降(非收縮上升);D血管運動中樞位於「延腦」(非下視丘)。故正確為A。","options":{"A":"正確(本題答案)。末梢血管阻力影響舒張壓。","B":"血比容>50%血壓上升,非下降。","C":"組織胺使血管擴張、血壓下降。","D":"血管運動中樞在延腦,非下視丘。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"105090-N2-42":{"quick":"熱中暑病人初期血壓上升(後期失代償才下降)。","detail":{"background":"中暑(heat stroke)病人:皮膚乾熱潮紅(非蒼白濕冷,那是熱衰竭)、體溫極高>40°C、脈搏快而強、呼吸快、初期血壓上升(代償),後期失代償血壓下降、意識改變。選項B「初期血壓上升」正確。A皮膚乾熱非蒼白濕冷、C脈搏增快非減緩、D呼吸快非慢而深。","options":{"A":"中暑皮膚乾熱潮紅,非蒼白濕冷(那是熱衰竭)。","B":"正確(本題答案)。中暑初期血壓上升。","C":"中暑脈搏增快,非減緩。","D":"中暑呼吸快,非慢而深。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"106030-N2-39":{"quick":"壓脈帶包裹太鬆會造成血壓假性偏高。","detail":{"background":"血壓測量誤差:壓脈帶包太「鬆」→需更高壓力才能壓住動脈→血壓測得「假性偏高」(A正確);壓脈帶太「窄」也使血壓偏高;視線高於水銀柱→讀數偏低;手臂高於心臟→血壓偏低。故造成假性偏高者為壓脈帶太鬆(A)。記憶:血壓假性偏高=壓脈帶太鬆/太窄、手臂低於心臟、放氣太慢(舒張偏低收縮偏高);假性偏低=壓脈帶太寬、手臂高於心臟、視線高於水銀柱、放氣太快。","options":{"A":"正確(本題答案)。壓脈帶太鬆使血壓假性偏高。","B":"視線高於水銀柱使讀數偏低。","C":"壓脈帶太寬使血壓偏低(太窄才偏高)。","D":"手臂高於心臟使血壓偏低。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"106030-N2-42":{"quick":"血壓146/82,平均動脈壓=82+(146−82)/3≈103 mmHg。","detail":{"background":"平均動脈壓(MAP)=舒張壓+(收縮壓−舒張壓)/3=舒張壓+脈搏壓/3。146/82:脈搏壓=146−82=64;MAP=82+64/3=82+21.3≈103 mmHg(C)。MAP正常約70~105 mmHg,反映器官灌流壓。公式:平均動脈壓MAP=舒張壓+(收縮壓−舒張壓)/3=舒張壓+脈搏壓/3;正常約70~105 mmHg,反映器官灌流壓,MAP<60可能灌流不足。","options":{"A":"90 mmHg計算錯誤。","B":"98 mmHg計算錯誤。","C":"正確(本題答案)。82+64/3≈103 mmHg。","D":"113 mmHg計算錯誤。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"106030-N2-53":{"quick":"直腸癌末期、血壓降脈微弱、膝下冰冷=瀕死,應引導家屬道別陪伴。","detail":{"background":"安寧瀕死照護:存活以「日」計、血壓下降、脈搏微弱、四肢末梢冰冷=瀕死徵象。最適切照護是引導家屬與病人道別、陪伴在側、提供舒適與尊嚴(C),而非設定頻繁監測生命徵象(A,徒增干擾)、推急救車插管(B,違反安寧不施行心肺復甦DNR)、在床旁與家屬討論後事(D,應避免在病人面前)。","options":{"A":"瀕死頻繁監測徒增干擾,非首要。","B":"安寧病人不施行插管急救(DNR)。","C":"正確(本題答案)。引導家屬道別並陪伴在側。","D":"不宜在病人床旁討論後事。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"106110-N2-40":{"quick":"舒張壓主要由「周邊血管阻力」決定。","detail":{"background":"影響血壓的因素:收縮壓主要受心搏出量(心室收縮力)影響;舒張壓(diastolic)主要由「周邊血管阻力」決定(阻力大舒張壓高)(A正確)。全身循環血量、血液黏稠度影響整體血壓,心室收縮力主要影響收縮壓。故決定舒張壓變動的主因為周邊血管阻力(A)。","options":{"A":"正確(本題答案)。周邊血管阻力決定舒張壓。","B":"全身循環血量影響整體血壓。","C":"血液黏稠度影響整體血壓。","D":"心室收縮力主要影響收縮壓。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"106110-N2-44":{"quick":"飲酒過多使血管擴張、血壓「下降」;稱飲酒使血壓上升為錯誤。","detail":{"background":"影響血壓:膀胱脹滿(交感興奮)使血壓上升(A對);天氣寒冷(血管收縮)使血壓上升(B對);顱內壓增高(Cushing反應)使血壓上升、脈搏變慢(C對)。選項D「飲酒過多血壓上升」——「急性大量」飲酒使血管擴張、血壓「下降」(慢性長期酗酒才使血壓升高),命題判D為錯誤敘述(急性飲酒血壓下降)。","options":{"A":"正確。膀胱脹滿使血壓上升。","B":"正確。天氣寒冷使血壓上升。","C":"正確。顱內壓增高使血壓上升。","D":"錯誤(本題答案)。急性飲酒使血管擴張、血壓下降。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"106110-N2-45":{"quick":"偏癱左側、右手點滴→可測「右下肢」血壓。","detail":{"background":"此病人左側偏癱、右手點滴,雙上肢皆不宜測,故可測「右下肢(大腿)」血壓(A正確)。B重複測血壓應取數值前須間隔、壓脈帶排空,不可連測三次取最後;C放氣太慢使「舒張壓偏低/收縮壓偏高」判定須謹慎(非收縮偏高的單一說法);D聽診器應置於肱/膝膕動脈處(非尺動脈)。故正確為可測右下肢血壓(A)。","options":{"A":"正確(本題答案)。雙上肢不宜,可測右下肢血壓。","B":"不可連測三次取最後值。","C":"放氣太慢影響數值,敘述不精確。","D":"聽診器應置動脈搏動處(肱/膝膕),非尺動脈。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"106111-N2-41":{"quick":"收縮壓150、舒張壓100,脈搏壓=150−100=50 mmHg。","detail":{"background":"脈搏壓(pulse pressure)=收縮壓−舒張壓。150−100=50 mmHg(B)。正常脈搏壓約30~40 mmHg;脈搏壓增大見於主動脈瓣閉鎖不全、甲亢、動脈硬化;脈搏壓變窄見於心包填塞、休克、主動脈瓣狹窄。記憶:脈搏壓=收縮壓−舒張壓,正常約30~40 mmHg;增大見於主動脈瓣閉鎖不全、甲亢、動脈硬化;變窄見於心包填塞、休克、主動脈瓣狹窄。","options":{"A":"250是收縮+舒張之和,非脈搏壓。","B":"正確(本題答案)。150−100=50 mmHg。","C":"125是平均值算錯。","D":"25計算錯誤。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"107030-N2-39":{"quick":"正常左右手臂血壓差應<10 mmHg,非20~30;稱20~30為錯誤。","detail":{"background":"血壓測量:了解平時血壓建議固定同一部位測量(A對);聽診間隙常出現於科氏音第一期與第二期之間(C對);重複測量建議間隔1~2分鐘(讓靜脈回流恢復,D對)。選項B「正常左右臂血壓差異介於20~30 mmHg」錯誤——正常左右臂血壓差應<10 mmHg(差距>20 mmHg須懷疑主動脈剝離、鎖骨下動脈狹窄),故B為錯誤敘述。","options":{"A":"正確。了解平時血壓宜固定同一部位。","B":"錯誤(本題答案)。正常左右臂差應<10 mmHg,非20~30。","C":"正確。聽診間隙在第一、二期之間。","D":"正確。重複測量間隔1~2分鐘。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"107030-N2-41":{"quick":"收縮壓146、舒張壓82,脈搏壓=146−82=64 mmHg。","detail":{"background":"脈搏壓=收縮壓−舒張壓=146−82=64 mmHg(B)。脈搏壓反映心搏出量與大動脈順應性,正常約30~40 mmHg;脈搏壓增大(>60)見於動脈硬化、主動脈瓣閉鎖不全、甲亢。公式:脈搏壓=收縮壓−舒張壓;146−82=64 mmHg。脈搏壓反映心搏出量與大動脈順應性,>60常見於動脈硬化、主動脈瓣閉鎖不全。","options":{"A":"52計算錯誤。","B":"正確(本題答案)。146−82=64 mmHg。","C":"76計算錯誤。","D":"88計算錯誤。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"107110-N2-20":{"quick":"NTG給藥前後評估重點:血壓(2)、疼痛部位及程度(3)→「23」。","detail":{"background":"心肌梗塞胸痛給硝化甘油(NTG)前後評估重點:NTG會血管擴張、降血壓,須監測「血壓」(2,避免低血壓)與「疼痛部位及程度」(3,評估療效);瞳孔大小(1)、體溫(4)與NTG療效/副作用無直接關係。故重點為「23」。重點:NTG(硝化甘油)血管擴張、降血壓,給藥前後須監測「血壓」(防低血壓)與「疼痛部位及程度」(評估療效);與瞳孔、體溫無直接關係。","options":{"A":"含1瞳孔不相關。","B":"含1、4不相關。","C":"正確(本題答案)。2血壓、3疼痛部位程度。","D":"含4體溫不相關。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"108020-N2-38":{"quick":"血量減少會造成血壓下降。","detail":{"background":"使血壓下降的因素:血量減少(出血、脫水)、心肌收縮力減弱、血管擴張(鎮靜劑)、姿勢性。選項B「血量減少」使靜脈回流與心輸出量降低、血壓下降。A心肌收縮力增強、C動脈彈性差(硬化)、D血流速度減緩(阻力)多使血壓「上升」。故導致血壓下降者為血量減少(B)。","options":{"A":"心肌收縮力增強使血壓上升。","B":"正確(本題答案)。血量減少使血壓下降。","C":"動脈彈性差(硬化)使血壓上升。","D":"血流阻力增加使血壓上升。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"108020-N2-41":{"quick":"女性體溫略高、脈率略快、呼吸略快;稱「呼吸速率較慢」為錯誤。本題答案B。","detail":{"background":"影響生命徵象:抽菸使血壓上升、體溫偏高、呼吸加快(A對);大量出血使體溫下降、呼吸加快代償(C對);鎮靜劑使呼吸與血壓下降(D對)。選項B「女性體溫較高、脈率較高、呼吸速率較慢」錯誤——一般女性體溫略高、脈率略快,但呼吸速率並非「較慢」(性別對呼吸速率影響不顯著或女性略快),故B敘述錯誤。","options":{"A":"正確。抽菸使血壓升、體溫高、呼吸快。","B":"錯誤(本題答案)。女性呼吸速率非較慢。","C":"正確。大量出血體溫降、呼吸快。","D":"正確。鎮靜劑使呼吸與血壓下降。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"108110-N2-10":{"quick":"心跳減少+心搏出量減少+周邊阻力下降→平均動脈壓下降。","detail":{"background":"平均動脈壓(MAP)≈心輸出量×周邊血管阻力(心輸出量=心跳×心搏出量)。當「心跳減少、心搏出量減少、周邊阻力下降」三者皆降,心輸出量與阻力同降,MAP必然下降(C正確)。其餘選項有上升因子互相抵銷,不一定使MAP下降。公式:平均動脈壓≈心輸出量×周邊阻力(心輸出量=心跳×心搏出量);三者(心跳、心搏出量、周邊阻力)皆降時MAP必降;有上升因子時則互相抵銷。","options":{"A":"周邊阻力上升會抵銷,不一定降。","B":"心跳心搏出量增加會使MAP升。","C":"正確(本題答案)。三因子皆降→MAP下降。","D":"心搏出量增加、阻力上升使MAP升。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"109030-N2-36":{"quick":"左右手血壓差>20(148/76 vs 120/66),應「再測一次雙手血壓」確認。","detail":{"background":"初入院病人左側無力、右手148/76、左手120/66,左右收縮壓差28 mmHg(>20),可能為測量誤差或鎖骨下動脈狹窄/主動脈剝離。最適當處置是「再測量一次雙手血壓」確認數值是否正確(B),而非直接測下肢、不同姿位或只記左臂。確認後若仍差距大需進一步評估。","options":{"A":"先確認雙手血壓,非測下肢。","B":"正確(本題答案)。再測一次雙手血壓確認。","C":"姿位性血壓非此處首要。","D":"不可只記左臂,須先確認。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"109110-N2-40":{"quick":"大腿(膝膕動脈)收縮壓通常較上肢「高」10~40 mmHg;充氣囊寬度約肢圍40%。本題答案D壓脈帶下緣置膝膕上方。","detail":{"background":"本題官方答案D。大腿血壓測量:壓脈帶包於大腿,下緣置於「膝膕(膕窩)上方」、聽診器放膝膕動脈(D正確)。A大腿收縮壓通常較上肢「高」約10~40 mmHg(非低);B充氣囊寬度約為肢體圓周的40%(非20%);C聽診器應放「膝膕動脈」(非足背動脈)。故正確為D。","options":{"A":"大腿收縮壓較上肢高,非低20~40。","B":"充氣囊寬約肢圍40%,非20%。","C":"聽診器放膝膕動脈,非足背動脈。","D":"正確(本題答案)。壓脈帶下緣置膝膕上方。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"109110-N2-41":{"quick":"血壓140/80,平均動脈壓=80+(140−80)/3=100 mmHg。","detail":{"background":"MAP=舒張壓+(收縮壓−舒張壓)/3=80+(140−80)/3=80+60/3=80+20=100 mmHg(C)。正常MAP約70~105 mmHg,維持器官灌流;MAP<60可能灌流不足。公式:MAP=舒張壓+(收縮壓−舒張壓)/3=80+(140−80)/3=80+20=100 mmHg。正常MAP約70~105 mmHg,維持器官灌流,<60可能灌流不足。","options":{"A":"60過低,計算錯誤。","B":"130是(收縮+舒張)/...算錯。","C":"正確(本題答案)。80+60/3=100 mmHg。","D":"200是兩者之和,錯誤。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"110030-N2-4":{"quick":"警覺期(壓力)瞳孔「放大」(交感興奮),非縮小;稱縮小為錯誤。","detail":{"background":"壓力反應警覺期(alarm stage,GAS第一期)交感神經與腎上腺活化(戰或逃):心跳加快、血壓上升、血糖上升、瞳孔「放大」、支氣管擴張、消化減慢。選項B「瞳孔縮小」錯誤——交感興奮使瞳孔放大(以利視物),故B為錯誤敘述。記憶:壓力警覺期(GAS第一期)交感與腎上腺活化(戰或逃)——心跳血壓血糖上升、瞳孔「放大」、支氣管擴張、消化減慢;瞳孔縮小是副交感作用,與此相反。","options":{"A":"正確。警覺期心跳加快。","B":"錯誤(本題答案)。警覺期瞳孔放大,非縮小。","C":"正確。血壓上升。","D":"正確。血糖上升。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"110030-N2-42":{"quick":"心律不整病人應測量三次血壓取平均值。","detail":{"background":"血壓測量:心律不整(如AF)病人因每次心搏量不一,血壓波動大,應測量三次取「平均值」較具代表性(C正確)。A成人壓脈帶充氣囊寬約12~14 cm(非18~20);B不可綁在靜脈點滴注射部位上方(應避開);D半側偏癱應測「健側」(非患側)。故正確為心律不整測三次取平均(C)。","options":{"A":"成人充氣囊寬約12~14 cm,非18~20。","B":"不可綁在點滴注射部位上方。","C":"正確(本題答案)。心律不整測三次取平均。","D":"偏癱應測健側,非患側。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"110110-N2-45":{"quick":"飲酒過量使血管擴張、血壓「下降」;稱使血管收縮血壓上升為錯誤。","detail":{"background":"血壓敘述:顱內壓過高出現心跳慢、血壓上升(Cushing反應,B對);一天中午後或傍晚血壓較高(C對);姿勢影響血壓由高到低為站姿>坐姿>平躺?——實際多為平躺最高(靜脈回流好),命題D「站、坐、平躺由高到低」有爭議。選項A「飲酒過量使血管收縮致血壓上升」錯誤——急性飲酒使血管「擴張」、血壓下降,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。急性飲酒使血管擴張、血壓下降。","B":"正確。顱內壓高致心跳慢、血壓上升。","C":"正確。午後傍晚血壓較高。","D":"姿勢血壓敘述依命題,非本題答案。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"111030-N2-25":{"quick":"用熱治療全身性反應:頭暈(2)、脈搏加速(4)→「24」。","detail":{"background":"用熱治療的全身性反應:皮膚血管擴張→血壓「下降」、回心血量減少致頭暈(2)、代謝增加致脈搏「加速」(4)、呼吸加快。錯誤項:1血壓上升(應下降)、3呼吸變慢(應加快)。故正確為「24」(頭暈+脈搏加速)。記憶:用熱全身性反應=皮膚血管擴張→回心血量減少致頭暈、血壓下降、脈搏加速、呼吸加快;用冷則血管收縮、血壓略升、脈搏與代謝下降。","options":{"A":"含1(血壓上升)錯。","B":"含1、3錯。","C":"正確(本題答案)。2頭暈+4脈搏加速。","D":"含3(呼吸變慢)錯。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"111030-N2-42":{"quick":"維持血壓的因素不含「動脈長度」;心輸出量、血液黏滯性、動脈彈性才是。","detail":{"background":"維持血壓的因素:心輸出量(心跳×心搏量)、血液黏滯性(血比容)、周邊血管阻力、動脈管壁彈性、循環血量。「動脈長度」在個體內近乎固定,非影響血壓變動的生理因素(C)。故非維持血壓因素者為動脈長度(C)。記憶:維持血壓的生理因素=心輸出量、周邊血管阻力、循環血量、血液黏滯性、動脈管壁彈性;「動脈長度」在個體內固定,非影響血壓變動的因素。","options":{"A":"心輸出量是血壓因素。","B":"血液黏滯性是血壓因素。","C":"正確(本題答案)。動脈長度非血壓變動因素。","D":"動脈彈性是血壓因素。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"111110-N2-41":{"quick":"使用鎮靜劑使血管擴張、血壓下降。","detail":{"background":"影響血壓:A年齡越大血管彈性下降、血壓「上升」(非變低);B尼古丁使血管「收縮」、血壓「上升」(非放鬆下降);C平躺血壓通常較坐姿「高或相近」(靜脈回流好),敘述「平躺較坐姿高」部分情況成立但命題以D為答;D使用鎮靜劑使血管擴張、血壓下降(D正確)。故正確為D。","options":{"A":"年長血管彈性下降,血壓上升非變低。","B":"尼古丁使血管收縮、血壓上升。","C":"姿勢血壓敘述非本題正解。","D":"正確(本題答案)。鎮靜劑使血管擴張、血壓下降。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"111110-N2-42":{"quick":"測血壓充氣應高於預估收縮壓約30 mmHg;平時120,充氣至150為佳。","detail":{"background":"血壓測量:充氣壓力應高於預估(或觸診)收縮壓約20~30 mmHg,以確保壓過動脈、避免聽診間隙誤判。王小姐平時收縮壓110~120,充氣至約150 mmHg為佳(C,高於120約30)。充氣不足(120/130)可能落在聽診間隙、180則過高造成不適。","options":{"A":"120僅達平時收縮壓,充氣不足。","B":"130略高,仍可能不足。","C":"正確(本題答案)。充氣至150(高於收縮壓約30)為佳。","D":"180過高造成不適。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"112110-N2-42":{"quick":"測血壓:每次打氣不超過10 mmHg、放氣每次不超過2~4 mmHg。本題答案B。","detail":{"background":"血壓測量技術:放氣速度每秒約2~4 mmHg(過快錯過真值);選項B「每次打氣不超過10 mmHg、放氣每次不超過2~4 mmHg」符合控制速度原則(B正確)。A橡皮氣囊下緣應在肘窩上約2.5 cm(非齊平肘關節);C觸診收縮壓後應「再充氣高約30 mmHg」才聽診(非避免再充氣);D聲音「消失」(第五期)為成人舒張壓,非收縮壓。故正確為B。","options":{"A":"氣囊下緣應在肘窩上約2.5cm,非齊平肘關節。","B":"正確(本題答案)。放氣每次2~4 mmHg控制速度。","C":"觸診收縮壓後應再充氣30 mmHg再聽診。","D":"聲音消失是舒張壓,非收縮壓。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"112180-N2-25":{"quick":"脈搏壓(pulse pressure)顯示動脈管壁張力及心搏出量。","detail":{"background":"血壓各值意義:收縮壓=左心室收縮射血壓力;舒張壓=周邊血管阻力(管壁最低壓);脈搏壓(收縮壓−舒張壓)反映「動脈管壁的張力(順應性)與心搏出量」(C正確);平均動脈壓=器官灌流壓。故顯示動脈張力與心搏出量者為脈搏壓(C)。記憶:收縮壓=左心室收縮力;舒張壓=周邊阻力;脈搏壓(收縮−舒張)=動脈管壁張力與心搏出量;平均動脈壓=器官灌流壓。","options":{"A":"收縮壓反映左心室收縮力。","B":"舒張壓反映周邊阻力。","C":"正確(本題答案)。脈搏壓顯示動脈張力與心搏出量。","D":"平均動脈壓是器官灌流壓。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"113030-N2-25":{"quick":"測血壓應將手臂支托、與心臟同高。","detail":{"background":"血壓測量注意:手臂應支托使與「心臟同高」(過低偏高、過高偏低)(A正確);重複測量須間隔1~2分鐘、壓脈帶排空空氣再測(不可無間隔連測,B錯);左右臂血壓差<10 mmHg、慣用手未必較低(C不一定);上肢血壓通常比下肢「低」(下肢收縮壓較高,D錯)。故正確為手臂與心臟同高(A)。","options":{"A":"正確(本題答案)。手臂支托與心臟同高。","B":"重複測量須間隔、排空空氣,非無須間隔。","C":"慣用手血壓未必較低。","D":"下肢血壓通常較上肢高,非上肢較高。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"113180-N2-24":{"quick":"點滴滴注過快使血流量增加、血壓上升。本題答案C。","detail":{"background":"影響血壓:A心輸出量=心搏出量×心跳次數,心輸出量增加血壓「上升」(非降低,A錯);B小動脈平滑肌阻力是影響血壓的「主要」因素(B錯);C血流量增加時動脈壁壓力增大,如點滴滴注過快可能使血壓上升(C正確);D血比容增加使血液黏稠、血流阻力「上升」、血壓上升(非阻力下降、壓下降,D錯)。故正確為C。","options":{"A":"心輸出量增加血壓上升,非降低。","B":"小動脈阻力是影響血壓主要因素。","C":"正確(本題答案)。點滴過快使血流量增、血壓上升。","D":"血比容增加使阻力上升、血壓上升。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"114030-N2-26":{"quick":"科氏音140開始聽到、56消失→血壓140/56 mmHg。本題答案C。","detail":{"background":"科氏音:第一個清晰敲聲出現的壓力=收縮壓(140);聲音「完全消失」的壓力=成人舒張壓(第五期,56)。130是聲音變清脆(第二/三期)、70是轉低沉(第四期,兒童第一舒張壓)。成人血壓記錄取「第一聲/消失」=140/56 mmHg(C)。","options":{"A":"70是第四期(轉低沉),非成人舒張壓。","B":"收縮壓應取第一聲140,非130。","C":"正確(本題答案)。第一聲140/消失56=140/56。","D":"收縮壓應為140,非130。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"114100-N2-26":{"quick":"出血性休克病人是「低壓脈(絲脈)」,非高壓脈;故為非高壓脈族群。","detail":{"background":"高壓脈(脈搏壓大、洪脈)易發生族群:老年人、動脈硬化、高血壓、甲亢、主動脈瓣閉鎖不全(管壁硬、收縮壓高)。出血性休克時血量不足、血壓下降,呈現「低壓脈、絲脈(細弱)」而非高壓脈(D)。故不是高壓脈族群者為出血性休克病人(D)。記憶:高壓脈(脈搏壓大、洪脈)族群=老年人、動脈硬化、高血壓、甲亢、主動脈瓣閉鎖不全;出血性休克因血量不足呈「低壓脈、絲脈(細弱)」,非高壓脈。","options":{"A":"老年人易高壓脈。","B":"動脈硬化易高壓脈。","C":"高血壓易高壓脈。","D":"正確(本題答案)。出血性休克是低壓脈,非高壓脈。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"114170-N2-2":{"quick":"壓力反應(交感)是瞳孔「放大」、支氣管「擴張」;稱瞳孔縮小支氣管收縮為最不適當。","detail":{"background":"壓力的生理反應(交感神經/戰或逃):肌肉收縮、口乾冒汗(A對)、心跳加速、血糖升高(B對)、血壓上升、新陳代謝上升(D對)、瞳孔「放大」、支氣管平滑肌「擴張」(利於攝氧)。選項C「瞳孔縮小、支氣管平滑肌收縮」是副交感作用,與壓力反應相反,故為最不適當敘述。","options":{"A":"適當。肌肉收縮、口乾冒汗。","B":"適當。心跳加速、血糖升高。","C":"最不適當(本題答案)。壓力時瞳孔放大、支氣管擴張,非縮小收縮。","D":"適當。血壓上升、代謝上升。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"114170-N2-6":{"quick":"「感覺頭痛、悶悶的」是病人自覺=主觀資料。","detail":{"background":"主觀資料(subjective)是病人自覺、他人無法直接觀察測量者。A「感覺頭痛、悶悶的」是病人自覺=主觀;B臉色蒼白盜汗(觀察)、C痰液有血絲黃稠(觀察)、D血壓123/68(測量)皆客觀。故主觀資料為A。判別:主觀資料=病人自覺「感覺/主訴」者(頭痛、悶);客觀資料=觀察(臉色蒼白盜汗、痰液性狀)或測量(血壓)所得。感覺頭痛悶=主觀。","options":{"A":"正確(本題答案)。自覺頭痛悶=主觀資料。","B":"臉色蒼白盜汗是觀察=客觀。","C":"痰液性狀是觀察=客觀。","D":"血壓數值是測量=客觀。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"115030-N2-26":{"quick":"雙臂石膏固定者測「膝膕動脈血壓」,病人採俯臥姿勢。本題答案D。","detail":{"background":"雙側手臂石膏固定無法測上肢血壓,改測下肢(膝膕動脈)血壓。測膝膕動脈血壓:病人採「俯臥」姿勢、壓脈帶包於「大腿」(下緣在膕窩上)、聽診器放膝膕動脈,大腿收縮壓通常較上肢「高」。選項D「俯臥姿勢進行膝膕動脈血壓測量」正確。A石膏側不可測;B壓脈帶應包大腿(非大腿中段前側的氣囊敘述不符);C下肢收縮壓較上肢高(非低)。","options":{"A":"打石膏側不可測血壓。","B":"壓脈帶應包大腿、聽膝膕動脈。","C":"下肢(膝膕)收縮壓較上肢高,非低。","D":"正確(本題答案)。俯臥測膝膕動脈血壓。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"115030-N2-28":{"quick":"身高160、體重55→BMI≈21.5,屬正常範圍(18.5~24)。","detail":{"background":"BMI=55÷(1.6²)=55÷2.56≈21.5。台灣標準:過輕<18.5、正常18.5~24、過重24~27、肥胖≥27。BMI 21.5屬「正常範圍」(B)。BMI是評估體位與營養狀態的常用指標。公式:BMI=體重÷身高(m)²;55÷1.6²≈21.5。台灣標準:過輕<18.5、正常18.5~24、過重24~27、肥胖≥27。21.5屬正常範圍。","options":{"A":"21.5不屬過輕(過輕<18.5)。","B":"正確(本題答案)。BMI≈21.5屬正常範圍。","C":"未達過重(24~27)。","D":"未達肥胖。"},"sources":["新文京《基本護理學》生命徵象-血壓","華杏《最新基本護理學》血壓"]}},"102030-N2-15":{"quick":"COPD病人屬「慢而深」費力呼氣的呼吸型態,非快而淺;稱快而淺為錯誤。","detail":{"background":"呼吸型態:腦膜炎/腦壓高可出現陳施氏呼吸(A對);抽菸刺激使呼吸加快(B對);小孩呼吸速率高於成人(C對)。選項D「COPD病人屬快而淺之呼吸」錯誤——COPD(慢性阻塞性肺疾)因氣道阻塞、呼氣困難,呈現「慢而深、費力延長呼氣(噘嘴呼吸)」型態,而非快而淺,故D為錯誤敘述。","options":{"A":"正確。腦膜炎/腦壓高可出現陳施氏呼吸。","B":"正確。抽菸使呼吸加快。","C":"正確。小孩呼吸速率高於成人。","D":"錯誤(本題答案)。COPD呈慢而深費力呼氣,非快而淺。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"102030-N2-37":{"quick":"體溫38.6°C(發燒)會使呼吸加快(代謝增)。","detail":{"background":"發燒(38.6°C)使基礎代謝率上升、氧需求增加,出現呼吸加快、脈搏加快、皮膚乾熱潮紅(非蒼白發冷)、尿量減少(非增多)。選項B「呼吸加快」正確。A皮膚應潮紅乾熱非蒼白發冷(那是發冷期)、C脈搏應變快非變慢、D尿量應變少非變多。機轉:發燒(38.6°C)使基礎代謝率升高(每升1°C約增13%),氧需求增加→呼吸與脈搏加快;發熱高峰期皮膚潮紅乾熱、尿量減少(水分流失)。","options":{"A":"發熱期皮膚潮紅乾熱,非蒼白發冷。","B":"正確(本題答案)。發燒使呼吸加快。","C":"發燒脈搏變快,非變慢。","D":"發燒尿量減少,非變多。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"102030-N2-41":{"quick":"血壓突然上升時,呼吸會「變慢」(壓力反射、延腦調節)。","detail":{"background":"血壓與呼吸的反射調節:當血壓突然「上升」時,主動脈與頸動脈壓力受器反射使心跳與呼吸「變慢」(壓力反射);血壓下降時呼吸與心跳加快代償。故血壓突然上升→呼吸變慢(B)。喟嘆式呼吸是偶發深呼吸;庫斯毛耳呼吸是代謝性酸中毒的深快呼吸。機轉:壓力反射(baroreflex)——血壓上升刺激頸動脈竇與主動脈弓壓力受器,經延腦使心跳與呼吸變慢、血管擴張以降壓;血壓下降則反向使心跳呼吸加快。","options":{"A":"血壓上升呼吸變慢,非變快。","B":"正確(本題答案)。血壓突升→呼吸變慢。","C":"喟嘆式呼吸與血壓上升無直接關係。","D":"庫斯毛耳呼吸見於代謝性酸中毒。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"103030-N2-44":{"quick":"心律不整、畢歐氏呼吸者呼吸「速度及深度均不規則」。","detail":{"background":"畢歐氏呼吸(Biot’s respiration):呼吸的速度與深度「均不規則」、夾雜不定時的呼吸暫停,常見於腦部病變(腦炎、腦膜炎、顱內壓高)。張老太太呼吸呈畢歐氏=速度深度均不規則(C)。A漸增式是陳施氏前段、B深快規則是庫斯毛耳、D淺慢是呼吸抑制。","options":{"A":"漸增式是陳施氏呼吸特徵。","B":"深而快規則是庫斯毛耳呼吸。","C":"正確(本題答案)。速度深度均不規則=畢歐氏呼吸。","D":"淺而慢是呼吸抑制。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"104100-N2-38":{"quick":"張口呼吸、鼻翼外展是大量出血、疼痛、交感興奮所致;「血壓上升」不是原因,反而下降。","detail":{"background":"羅先生車禍大量出血:出現張口呼吸、鼻翼外展、使用呼吸輔助肌、心跳快——是因大量出血(C)致組織缺氧、疼痛(D)與交感神經受刺激(A)使呼吸加快代償。選項B「血壓突然上升」錯誤——大量出血時血壓「下降」(非上升),且血壓上升反而使呼吸變慢,故B不是影響呼吸加快的因素(本題答案,錯誤者)。","options":{"A":"交感神經受刺激使呼吸加快,是原因。","B":"錯誤(本題答案)。大量出血血壓下降,非上升。","C":"大量出血致缺氧,使呼吸加快。","D":"疼痛使呼吸加快。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"107110-N2-37":{"quick":"糖尿病酮酸中毒(代謝性酸中毒)出現庫斯毛耳氏呼吸(深而快)。","detail":{"background":"糖尿病酮酸中毒(DKA)是代謝性酸中毒,身體為排出CO2代償而出現「庫斯毛耳氏呼吸(Kussmaul’s respiration)」——又深又快的呼吸,並可聞到爛蘋果(酮)味。故為庫斯毛耳氏呼吸(D)。呼吸暫停、過慢、換氣不足皆與酸中毒代償方向相反。","options":{"A":"呼吸暫停非酸中毒代償表現。","B":"呼吸過慢與酸中毒代償相反。","C":"換氣不足會加重酸中毒。","D":"正確(本題答案)。DKA代謝性酸中毒呈庫斯毛耳呼吸。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"109030-N2-39":{"quick":"呼吸由淺漸深再漸淺至暫停、週期性出現=陳施氏呼吸(Cheyne-Stokes)。","detail":{"background":"陳施氏呼吸(Cheyne-Stokes):呼吸由淺漸深、再由深漸淺,然後出現一段呼吸暫停,如此週期性反覆;常見於心衰竭、腦損傷、瀕死。本題描述正是陳施氏呼吸(B)。喟嘆式是偶發深呼吸;畢歐氏是速度深度均不規則;庫斯毛耳是持續深快(酸中毒)。","options":{"A":"喟嘆式是偶發一次深呼吸。","B":"正確(本題答案)。週期性漸深漸淺至暫停=陳施氏呼吸。","C":"畢歐氏是速度深度均不規則。","D":"庫斯毛耳是持續深快(酸中毒)。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"110030-N2-40":{"quick":"大出血時呼吸速率「加快」(缺氧代償)。","detail":{"background":"影響呼吸的因素:大出血致組織缺氧,呼吸速率「加快」代償(B正確);年齡越大呼吸速率「減慢」(非加快);胸腔積水壓迫肺,呼吸「加快」變淺(非下降);急性疼痛使呼吸「加快」(非下降)。故正確為大出血呼吸加快(B)。記憶:使呼吸加快者=發燒、大出血缺氧、急性疼痛、焦慮、酸中毒、運動、缺氧;使呼吸減慢者=年長、鴉片類藥物、鹼中毒、顱內壓升高(呼吸中樞抑制)。","options":{"A":"年齡越大呼吸速率減慢,非加快。","B":"正確(本題答案)。大出血呼吸加快代償。","C":"胸腔積水使呼吸加快變淺,非下降。","D":"急性疼痛使呼吸加快,非下降。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"110110-N2-7":{"quick":"鴉片類(嗎啡)止痛劑會抑制呼吸速率及深度。","detail":{"background":"游奶奶術後用自控式嗎啡(PCA),鴉片類藥物會抑制呼吸中樞,使「呼吸速率及深度下降」(B正確),須監測呼吸(<10~12次/分警覺呼吸抑制)。A傷口疼痛使呼吸「加快」(非變慢);C術後失血使呼吸「加快」代償;D全身麻醉劑「抑制」呼吸(非刺激)。故正確為嗎啡抑制呼吸(B)。","options":{"A":"傷口疼痛使呼吸加快,非變慢。","B":"正確(本題答案)。鴉片類抑制呼吸速率及深度。","C":"術後失血使呼吸加快代償。","D":"全身麻醉劑抑制呼吸,非刺激。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"111030-N2-38":{"quick":"男性的呼吸速率較女性慢。","detail":{"background":"影響呼吸速率因素:大出血使呼吸「加快」(A錯,稱變慢);男性肺活量大、呼吸速率較女性「慢」(B正確);焦慮使呼吸「加快」(C錯,稱變慢);血壓下降使呼吸「加快」代償(D錯,稱變慢)。故正確為男性呼吸速率較女性慢(B)。記憶:男性肺活量大、呼吸速率較女性慢;影響呼吸=年齡(越小越快)、發燒/出血/疼痛/焦慮(加快)、鴉片類/鹼中毒(變慢)。","options":{"A":"大出血呼吸加快,非變慢。","B":"正確(本題答案)。男性呼吸速率較女性慢。","C":"焦慮使呼吸加快,非變慢。","D":"血壓下降呼吸加快,非變慢。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"112110-N2-38":{"quick":"男性呼吸速率比女性「慢」,非快;稱男快為錯誤。","detail":{"background":"影響呼吸速率:年齡越小呼吸越快(B對);鴉片類藥物使呼吸變慢(C對);體溫上升呼吸變快(D對)。選項A「男性呼吸速率比女性快」錯誤——男性肺容量較大、呼吸速率一般較女性「慢」,故A為錯誤敘述。記憶:影響呼吸速率=年齡(越小越快)、體溫(上升加快)、藥物(鴉片類變慢)、情緒、運動;性別上男性肺容量大、呼吸速率較女性「慢」(非快)。","options":{"A":"錯誤(本題答案)。男性呼吸速率較女性慢,非快。","B":"正確。年齡越小呼吸越快。","C":"正確。鴉片類使呼吸變慢。","D":"正確。體溫上升呼吸變快。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"112110-N2-39":{"quick":"腦部損傷可能出現畢歐氏呼吸(1)、潮式(陳施氏)呼吸(2)→「12」。","detail":{"background":"腦部損傷(腦幹/顱內壓高)可出現的特殊呼吸型態:畢歐氏呼吸(1,速度深度均不規則,腦膜炎/腦壓高)、潮式呼吸(2,即陳施氏Cheyne-Stokes,週期漸深漸淺)。庫斯毛耳氏呼吸(3)是代謝性酸中毒、喟嘆式(4)是偶發深呼吸,非腦損傷典型。故為「12」。","options":{"A":"正確(本題答案)。1畢歐氏、2潮式(陳施氏)。","B":"含3(酸中毒)不符。","C":"3、4皆非腦損傷典型。","D":"含3不符。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"112180-N2-23":{"quick":"測量呼吸時「不應讓病人知道」(以免影響自然呼吸);稱應讓病人知道為錯誤。","detail":{"background":"測量呼吸注意:應在病人「不知不覺」中測量(若讓病人知道,會不自覺改變呼吸型態,影響準確性);可在測脈搏後手仍放在腕部時順勢觀察胸廓起伏;須測速率、深度、節律與呼吸聲;生命徵象不穩定者測滿1分鐘。選項A「應該讓病人知道你正在為他測量呼吸」錯誤(會影響自然呼吸)。","options":{"A":"錯誤(本題答案)。測呼吸不應讓病人知道,以免影響自然呼吸。","B":"正確。應注意外觀與呼吸聲。","C":"正確。測速率、深度與節律。","D":"正確。生命徵象不穩定測1分鐘。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"113100-N2-25":{"quick":"頭部受傷、腦壓過高最可能出現呼吸「過慢」(bradypnea)。","detail":{"background":"顱內壓升高(IICP)壓迫腦幹呼吸中樞,典型出現Cushing反應:血壓上升、脈搏變慢、呼吸「變慢且不規則」(bradypnea,甚至陳施氏/畢歐氏)。本題選項中最符合的是呼吸過慢(bradypnea,C)。呼吸過速、暫停、喟嘆式非IICP最典型的單一型態。","options":{"A":"呼吸過速非IICP最典型。","B":"呼吸暫停是晚期/瀕死表現。","C":"正確(本題答案)。腦壓過高呈呼吸過慢。","D":"喟嘆式非IICP典型。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"114030-N2-25":{"quick":"血壓下降時呼吸「加快」(代償),非減慢;稱減慢為錯誤。","detail":{"background":"影響呼吸頻率:年齡越小呼吸越快(A對);體溫下降呼吸減慢(B對);高海拔(缺氧)呼吸加快(D對)。選項C「血壓下降,呼吸減慢」錯誤——血壓下降時(如出血、休克)身體為維持氧合而使呼吸「加快」代償,故C為錯誤敘述。記憶:使呼吸加快=發燒、大出血缺氧、急性疼痛、酸中毒、高海拔缺氧、年齡越小;使呼吸減慢=體溫下降、鴉片類藥物、鹼中毒、顱內壓升高。血壓下降反使呼吸加快。","options":{"A":"正確。年齡越小呼吸越快。","B":"正確。體溫下降呼吸減慢。","C":"錯誤(本題答案)。血壓下降呼吸加快,非減慢。","D":"正確。高海拔缺氧呼吸加快。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"101110-N2-1":{"quick":"失眠擔心檢查的病人:不宜空泛保證「不用擔心、成功例子多」。","detail":{"background":"面對因擔心檢查結果而失眠的病人,合適的護理是提供正確訊息、情緒支持與同儕分享:請醫療團隊說明疾病進展(B)、提供病友經驗分享(C)、請家屬陪伴支持(D)皆適合。選項A「向個案說明不需要擔心太多、治療成功例子很多」較不合適——空泛的保證會阻斷病人表達真實焦慮,屬不當保證。","options":{"A":"較不合適(本題答案)。空泛保證「不用擔心」阻斷情緒表達。","B":"合適。請團隊說明疾病進展。","C":"合適。病友經驗分享。","D":"合適。家屬陪伴支持。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"101110-N2-15":{"quick":"量vital signs時病人問醫師查房,宜先了解其需求:「您找醫師有甚麼事嗎?」","detail":{"background":"病人在護理師量生命徵象時詢問醫師何時查房,合適回應是先了解其背後需求與關切:「您找醫師有甚麼事嗎?」(C),再依需求協助轉達或說明。A以「量完所有病人再說」敷衍、B斷然「不會來查房」、D立刻打手機讓病人與醫師通話皆不適當。以了解需求為先。技巧:病人在護理操作中提出需求時,先「了解需求(澄清)」再回應;敷衍延後、斷然否定、越級代為聯繫醫師通話皆不當。以病人需求為中心。","options":{"A":"敷衍延後,不當。","B":"斷然否定,未了解需求。","C":"正確(本題答案)。先了解病人找醫師的需求。","D":"立即打手機通話不恰當。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"101110-N2-56":{"quick":"迎接新入院病人,護理師首要是接待並自我介紹。","detail":{"background":"入院護理(新病人)的首要活動是「接待病人並自我介紹」(A),建立信任與安全感,接著介紹環境病房常規、評估、收集資料等。先接待自我介紹(互動前期→介紹期)再進行後續,故首要為接待並自我介紹。記憶:入院護理流程=互動前期(查資料準備)→介紹期(接待、自我介紹、介紹環境常規、建立信任)→工作期→結束期。新病人首要是接待並自我介紹。","options":{"A":"正確(本題答案)。首要是接待並自我介紹。","B":"介紹環境在自我介紹之後。","C":"收集檢體非首要。","D":"詢問病情在建立關係後。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"102030-N2-12":{"quick":"家屬急問檢驗報告:宜據實轉達醫師交代,不可自行解讀或臆測。","detail":{"background":"面對家屬急問檢驗報告結果,護理師不應自行解讀診斷(屬醫師職責),也不應臆測「應該沒問題/正常」。最適當是據實轉達醫師安排:「醫師交代等明天早上檢驗結果出來再討論」(A),並提供情緒支持。B、C、D皆為臆測或非正式訊息,可能造成誤導。界線:檢驗報告之「判讀與告知」屬醫師職責;護理師應據實轉達醫師安排、提供情緒支持,不可自行解讀或以印象/臆測回覆,以免誤導家屬。","options":{"A":"正確(本題答案)。據實轉達醫師交代,不臆測。","B":"臆測「有問題醫師會找」,不當。","C":"憑開會印象說正常,不可靠。","D":"憑病歷自行判讀,逾越職責。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"102110-N2-3":{"quick":"中風急性期依Maslow應優先滿足「穩定生命徵象」(生理需要)。","detail":{"background":"依馬斯洛需要層次,生理需要最優先。黃先生急性中風、口齒不清、肢體乏力,首要是穩定其生命徵象、維持呼吸道與循環(生理/安全需要)(C)。建立溝通、調適身體心像、討論復健是後續較高層次需要,須待生命徵象穩定後再進行。原則:馬斯洛需要層次生理>安全>愛與隸屬>自尊>自我實現;急性中風優先穩定生命徵象(呼吸、循環)等生理/安全需要,再處理溝通、心像、復健等高層次需要。","options":{"A":"身體心像調適屬較高層次需要。","B":"溝通能力建立在生理穩定之後。","C":"正確(本題答案)。優先穩定生命徵象(生理需要)。","D":"復健目標屬後續。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"103100-N2-7":{"quick":"右心衰竭的「症狀」中下肢水腫是病人可察覺的不適;本題答案B下肢水腫。","detail":{"background":"右心衰竭(體循環鬱血)表現:下肢/週邊水腫、頸靜脈怒張、肝腫大、體重增加。本題問病人「症狀(symptoms)」——下肢水腫(B)是病人可自覺的不適(腫脹感)。A脈搏減弱次數減少非右心衰典型;C肺水腫、D肺部囉音屬「左」心衰竭的表現。故選下肢水腫(B)。","options":{"A":"脈搏減弱次數少非右心衰典型。","B":"正確(本題答案)。下肢水腫是右心衰表現。","C":"肺水腫屬左心衰竭。","D":"肺部囉音屬左心衰竭。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"104030-N2-8":{"quick":"「個案主訴腹部不適」是病人自覺=症狀(symptoms)。","detail":{"background":"症狀(symptoms)是病人自覺、無法直接測量者;徵象(signs)是可觀察測量者。選項A「個案主訴腹部不適」是病人自覺=症狀;B腸蠕動次數(聽診)、C體溫(測量)是徵象;D性別是基本資料。故屬症狀者為主訴腹部不適(A)。判別:症狀(symptom)=病人自覺「主訴」者;徵象(sign)=可觀察測量者(腸蠕動次數、體溫)。性別屬基本資料。主訴腹部不適=症狀。","options":{"A":"正確(本題答案)。主訴腹部不適=症狀。","B":"腸蠕動次數是聽診徵象。","C":"體溫是測量徵象。","D":"性別是基本資料。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"104030-N2-33":{"quick":"叩擊下頦角致嘴鼻眼抽搐=沃斯德克氏徵象(Chvostek’s sign),低血鈣。","detail":{"background":"沃斯德克氏徵象(Chvostek’s sign):輕叩耳前下頦角(顏面神經)引發同側嘴角、鼻翼、眼瞼抽搐,是「低血鈣」(神經肌肉興奮性增加)的表現;特魯索氏徵象(Trousseau’s)是壓脈帶充氣致手部痙攣(腕足痙攣),亦為低血鈣。霍曼氏(Homan’s)是DVT、恰達克(Chaddock)是病理反射。故為Chvostek’s sign(B)。","options":{"A":"恰達克徵象是錐體束病理反射。","B":"正確(本題答案)。叩下頦致抽搐=Chvostek徵象(低血鈣)。","C":"霍曼氏徵象是深部靜脈栓塞。","D":"特魯索氏徵象也是低血鈣,但機轉是壓脈帶致痙攣。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"104030-N2-37":{"quick":"食物入胃刺激大腸蠕動=胃結腸反射(命題作十二指腸結腸反射,本題答案B)。","detail":{"background":"本題官方答案B。進食後食物進入胃/十二指腸,刺激大腸產生集團蠕動、引發便意,稱「胃-結腸反射(gastrocolic reflex)」(命題以「十二指腸結腸反射」表述)。此反射是飯後易有便意的生理基礎,可用於訓練排便習慣(飯後如廁)。臨床應用:胃-結腸反射使飯後易有便意,可教導病人「飯後30分鐘如廁」訓練規律排便,善用此生理反射改善便秘。","options":{"A":"胃十二指腸反射非引發大腸蠕動者。","B":"正確(本題答案)。食物入腸胃引發大腸蠕動。","C":"直腸反射是糞便入直腸引發便意。","D":"非單純交感反射。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"104100-N2-9":{"quick":"盧女士哭泣,最優先護理活動是「了解其哭泣的原因」。","detail":{"background":"乳房切除後病人夜間哭泣「我再也不是女人了」,反映身體心像改變與情緒困擾。最優先的護理活動是傾聽、陪伴、「了解其哭泣的原因」(C),提供情緒支持,而非先量生命徵象、給安眠藥或急著衛教。先處理情緒、建立關係。技巧:病人情緒困擾(哭泣)時,先傾聽陪伴、了解原因(同理),再提供支持與衛教;勿急於量生命徵象、給安眠藥或衛教而忽略情緒。","options":{"A":"量生命徵象非情緒困擾的首要。","B":"給安眠藥逃避情緒問題。","C":"正確(本題答案)。先了解哭泣的原因。","D":"急著衛教未先處理情緒。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"104100-N2-71":{"quick":"書寫護理紀錄屬「間接」護理,不計入直接護理時數。","detail":{"background":"直接護理時數=護理師直接對病人提供的照護(傷口換藥、測量體溫血壓、與病人家屬會談、衛教、給藥)。書寫護理紀錄屬「間接護理」(不直接接觸病人),不計入直接護理時數(D)。故不計入直接護理時數者為書寫護理紀錄。區辨:直接護理=直接對病人提供(換藥、量生命徵象、會談、衛教、給藥);間接護理=不直接接觸病人(書寫紀錄、準備藥物、通知醫師、交班)。","options":{"A":"傷口換藥屬直接護理。","B":"測量體溫血壓屬直接護理。","C":"與病患家屬會談屬直接護理。","D":"正確(本題答案)。書寫護理紀錄屬間接護理。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"105030-N2-55":{"quick":"入院辨識應「核對姓名與病歷號(雙重辨識)」,非僅以床號辨識;稱僅床號為錯誤。","detail":{"background":"入院護理:首要測量生命徵象、評估觀察(B對);安排電動床增加控制感(C對);允許適度布置環境(D對)。選項A「立即戴上手圈並以『床號』辨識孕婦」錯誤——病人辨識應至少用「兩種辨識方法(姓名+病歷號/生日)」,不可只以「床號」辨識(床號會變動、易出錯),故A為錯誤敘述。","options":{"A":"錯誤(本題答案)。應雙重辨識(姓名+病歷號),不可僅以床號。","B":"正確。首要測量生命徵象並評估。","C":"正確。電動床增加自我控制感。","D":"正確。允許適度布置環境。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"107030-N2-55":{"quick":"COPD呼吸困難、SpO2 88%:應先處理呼吸困難,穩定後再做完整身體評估。","detail":{"background":"COPD病人呼吸困難、SpO2 88%(低血氧)屬緊急狀況。護理初評原則:生命受威脅的問題優先處理,故應「先處理呼吸困難(給氧、姿位)等情況穩定,再執行完整性身體檢查與評估」(C)。不可先花時間做完整健康史或全身評估而延誤處理低血氧。原則:護理初評時,生命受威脅問題(低血氧、呼吸困難)優先處理,穩定後再做完整健康史與身體評估;不可為求完整而延誤緊急處置。","options":{"A":"先收集完整健康史會延誤處理低血氧。","B":"先做完整評估延誤緊急處理。","C":"正確(本題答案)。先處理呼吸困難,穩定後再完整評估。","D":"先做完整評估不當。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"107110-N2-33":{"quick":"「什麼情況會讓疼痛更嚴重?」=P(Provocative/Palliative,誘發與緩解因素)。","detail":{"background":"疼痛評估PQRST:P(Provocative/Palliative,誘發與緩解因素)、Q(Quality/Quantity,性質與程度)、R(Region/Radiation,部位與放射)、S(Severity,嚴重度)、T(Timing,時間)。詢問「什麼情況會讓疼痛更嚴重?」是探詢誘發/加重因素=P(C)。","options":{"A":"R是部位與放射。","B":"Q是性質與程度。","C":"正確(本題答案)。誘發/緩解因素=P。","D":"T是時間。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"107110-N2-55":{"quick":"COPD呼吸喘發燒立即性入院護理:監測生命徵象(1)、測血氧(4)、教導呼叫鈴(5)→「145」。","detail":{"background":"COPD呼吸喘、發燒由急診入病房的「立即性」入院護理優先處理安全與緊急:1監測生命徵象、4測量血氧飽和度(評估呼吸狀態)、5教導呼叫鈴使用(安全)。測身高體重(3)、病房環境介紹(2)、教導檢體收集(6)屬非緊急、可稍後。故立即性護理為「145」。","options":{"A":"含2、3屬非緊急。","B":"正確(本題答案)。1監測生命徵象、4測血氧、5呼叫鈴。","C":"含2、6非立即必要。","D":"含6非立即必要。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"108020-N2-54":{"quick":"GCS由E4V5M5降至E3V4M4(意識惡化)需立即報告。","detail":{"background":"生命徵象/意識惡化需立即報告:柯老太太入院GCS E4V5M5(14分),24小時後A「GCS E3V4M4(11分)」意識明顯下降3分——意識惡化是急性神經狀態改變,須立即報告醫師(A)。B體溫37.6→37.8變化小;C血壓98/60雖偏低但需綜合判斷;D輸入1050輸出650尚屬合理。意識下降最需立即處理。","options":{"A":"正確(本題答案)。GCS下降(意識惡化)需立即報告。","B":"體溫37.6→37.8變化小。","C":"血壓98/60偏低但非最急。","D":"I/O大致平衡。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"108110-N2-8":{"quick":"人體溫度最高的部位為肝臟(代謝旺盛)。","detail":{"background":"人體核心溫度以代謝最旺盛的器官最高——肝臟是體內代謝產熱最多的器官,溫度最高(A);其次為心臟、腦。四肢、耳垂、軀幹表面屬周邊,溫度較核心低。故溫度最高部位為肝臟(A)。記憶:核心溫度以代謝最旺盛器官最高——肝臟>心臟>腦;四肢、耳垂、體表屬周邊,溫度較核心低。臨床核心溫度測量部位如肛溫、耳溫、食道溫。","options":{"A":"正確(本題答案)。肝臟代謝旺盛、溫度最高。","B":"耳垂屬周邊,溫度較低。","C":"四肢屬周邊,溫度較低。","D":"軀幹表面低於核心器官。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"108110-N2-26":{"quick":"徵象(signs)=可測量觀察者:血壓、WBC、聽診爆裂音→「345」。","detail":{"background":"徵象(signs)是可觀察測量者;症狀(symptoms)是病人自覺者。題項:1眩暈(自覺=症狀)、2肚子絞痛(自覺=症狀)、3血壓130/68(測量=徵象)、4WBC 8900(檢驗=徵象)、5胸部聽診爆裂音(聽診=徵象)、6疲倦無力(自覺=症狀)。故徵象為「345」。","options":{"A":"含1、2症狀。","B":"含1、2、6症狀。","C":"正確(本題答案)。3血壓、4WBC、5聽診音皆徵象。","D":"含1、2、6症狀。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"108110-N2-27":{"quick":"間接觀察法=不直接接觸病人:查病歷Hb(3)、會診報告(4)、查護理紀錄(6)→「346」。","detail":{"background":"間接觀察法(indirect observation)=不直接接觸病人,由病歷、檢驗報告、會診、護理紀錄等取得;直接觀察=護理師親自視觸叩聽。題項:1觀察傷口(直接)、2叩診腹部(直接)、5聽診呼吸音(直接)屬直接;3查病歷Hb、4會診報告、6查護理紀錄屬間接。故間接觀察為「346」。","options":{"A":"含1、2直接觀察。","B":"含1、2、5直接觀察。","C":"正確(本題答案)。3查病歷、4會診、6查紀錄屬間接。","D":"含2、5直接觀察。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"109030-N2-4":{"quick":"生命徵象記錄表TPR以下欄位不包含「手術時間(operated at 9:00)」。本題答案A。","detail":{"background":"生命徵象(TPR)記錄表單TPR欄位以下通常記錄:血壓(110/80)、體重(80 Kg)、排便次數(2/E,如每日排便)等與生命徵象相關之數據。「operated at 9:00(手術時間)」屬特殊事件/病程紀錄,不在TPR以下的例行生命徵象欄位(A)。故不包括者為手術時間。","options":{"A":"正確(本題答案)。手術時間不在TPR以下例行欄位。","B":"血壓記於生命徵象表。","C":"體重記於生命徵象表。","D":"排便次數(2/E)記於生命徵象表。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"109030-N2-38":{"quick":"肺炎RR 27、SpO2 80%(嚴重低血氧)應最優先處理。","detail":{"background":"危急優先判斷以「呼吸/循環危及生命」最優先。選項A 80歲肺炎、呼吸27次/分、SpO2 80%(嚴重低血氧、呼吸窘迫)——SpO2<90%屬緊急,須最優先給氧處理(A)。B骨折血壓略高、C糖尿病足發燒、D術後血壓略高,皆不如低血氧緊急。故最優先為A。","options":{"A":"正確(本題答案)。SpO2 80%嚴重低血氧最優先。","B":"小腿骨折血壓略高,非最急。","C":"糖尿病足發燒,非最急。","D":"術後血壓略高,非最急。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"109110-N2-6":{"quick":"生命徵象紀錄表不會出現「病況進展」(屬病程/護理紀錄)。","detail":{"background":"生命徵象紀錄表(TPR表)記錄:病人基本資料、手術或生產日期、特殊處置(如輸血)、TPR與血壓體重等。「病況進展(病情變化敘述)」屬病程紀錄/護理紀錄的敘述性內容,不會出現在生命徵象數據表上(D)。故不會出現者為病況進展。區辨:生命徵象(TPR)紀錄表記錄數據(基本資料、手術日期、特殊處置、TPR與血壓體重);敘述性的「病況進展」屬病程紀錄/護理紀錄,不在此表。","options":{"A":"病人基本資料會出現。","B":"手術/生產日期會出現。","C":"特殊處置會出現。","D":"正確(本題答案)。病況進展屬病程紀錄,不在生命徵象表。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"110030-N2-10":{"quick":"傷口換藥時可觀察到「感染情形」(直接觀察)。","detail":{"background":"資料收集時機與觀察:傷口換藥時可直接觀察傷口的感染情形(紅腫熱痛、滲液)(B正確)。A白血球數是「檢驗」非晨間護理觀察所得;C體溫紀錄單看不到「排尿困難」(那要問或評估排尿);D測生命徵象時不易觀察「人際關係」。故正確為傷口換藥可觀察感染(B)。","options":{"A":"白血球數須檢驗,非晨間護理觀察。","B":"正確(本題答案)。傷口換藥可觀察感染情形。","C":"體溫紀錄單看不到排尿困難。","D":"測生命徵象不易觀察人際關係。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"110030-N2-14":{"quick":"診斷縮寫R/O=rule out=「疑似」(待排除)。","detail":{"background":"常見診斷縮寫:R/O(rule out)=疑似、待排除某診斷;C/O(complain of)=主訴;P.E.(physical examination)=身體檢查;AAD/DC=出院。R/O表示臨床懷疑但尚待檢查排除,故含意為「疑似」(C)。","options":{"A":"「不含」非R/O含意。","B":"身體檢查是P.E.。","C":"正確(本題答案)。R/O=rule out=疑似/待排除。","D":"許可出院是discharge。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"110110-N2-6":{"quick":"護生不忍叫醒病人服藥:最適當是「立即再次確認生命徵象正確性」。本題答案D。","detail":{"background":"游奶奶術後第一天、護生9:40仍未給口服藥且測得呼吸僅8次/分(術後用嗎啡PCA,呼吸<10提示呼吸抑制)。最適當處置是「立即再次確認病人生命徵象之正確性」(D)——呼吸8次/分異常偏低,須先確認數值並警覺鴉片類呼吸抑制,而非單純讓病人休息或鼓勵護生。發現呼吸抑制應通報處理。","options":{"A":"呼吸8次/分異常,不可只讓病人休息。","B":"服藥時間延遲非首要,先確認異常生命徵象。","C":"呼吸異常下不宜只給正向鼓勵。","D":"正確(本題答案)。立即再確認生命徵象(呼吸8次/分異常)。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"110110-N2-51":{"quick":"入院護理:自我介紹與觀察病人是最先活動、建立身高體重生命徵象資料→「23」。","detail":{"background":"入院護理措施:2自我介紹及觀察病人是最先的護理活動、3建立身高體重與生命徵象基礎資料,皆正確。1「需在接病人當班內完成『所有』護理評估病歷」不切實際(可分階段);4「護理人員應主動保管病人貴重物品」不當(貴重物品應請家屬帶回或依規定處理,不由護理人員保管)。故正確為「23」。","options":{"A":"含1(當班完成所有評估)不切實際。","B":"正確(本題答案)。2自我介紹觀察、3建立基礎資料。","C":"含4(代為保管貴重物品)不當。","D":"含1、4皆不妥。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"111110-N2-6":{"quick":"「壓傷傷口紅、有異味」?本題答案B,屬護理師觀察=...實為徵象;惟官方判為症狀?重判。","detail":{"background":"本題官方答案B。症狀(symptom)是病人自覺者;徵象(sign)是可觀察測量者。選項A體溫39.7(測量=徵象)、C腸蠕動12次(聽診=徵象)、D血色素8.7(檢驗=徵象)皆徵象。選項B「壓傷傷口紅、有異味」雖是觀察所得,但本題命題將其相對歸為「症狀(描述性)」作為答案;作答時以官方答案B為準。重點仍是:可量化檢驗數據(體溫/腸蠕動/血色素)為典型徵象。","options":{"A":"體溫測量值是徵象。","B":"本題答案。命題判此描述為症狀。","C":"腸蠕動次數是聽診徵象。","D":"血色素是檢驗徵象。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"112030-N2-13":{"quick":"指導乳房自我檢查屬「健康促進」護理措施。","detail":{"background":"護理措施分類:健康促進(promotion,如衛教自我檢查、運動營養指導,增進健康)、預防性(prevention,如疫苗)、治療性(treatment)、評估性(assessment)。學校護理師指導女學生乳房自我檢查,目的在增進健康意識與早期自我發現,屬「健康促進」護理措施(D)。","options":{"A":"預防性偏向特定疾病預防(疫苗等)。","B":"治療性是處理現存問題。","C":"評估性是收集資料。","D":"正確(本題答案)。指導自我檢查屬健康促進。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"112110-N2-7":{"quick":"以共通語言(粵語)和緩溝通有助溝通;「護理師對訊息的了解程度」不是阻礙因素(本題答案A王先生使用的語言?重判)。","detail":{"background":"本題官方答案A。林護理師會講粵語、能以王先生的母語(粵語)溝通——故「王先生所使用的語言(粵語)」在此情境中「不是」阻礙有效溝通的因素(因護理師也懂粵語,語言反而成為橋樑)。B恍惚神情、C喃喃自語內容(意識/精神狀態)、D護理師對訊息的了解程度才是潛在阻礙。故不是阻礙者為王先生使用的語言(A)。","options":{"A":"正確(本題答案)。護理師也懂粵語,語言非阻礙。","B":"恍惚神情阻礙溝通。","C":"喃喃自語內容不清阻礙溝通。","D":"對訊息理解程度影響溝通。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"113180-N2-26":{"quick":"流感合併肺炎、呼吸喘RR 30最緊急,需優先處理。","detail":{"background":"危急優先判斷以呼吸/循環危及生命者最優先。選項B 40歲流感合併肺炎、主訴呼吸喘、呼吸30次/分(呼吸窘迫)——呼吸>30伴肺炎喘,屬呼吸危急,須最優先處理(B)。A闌尾炎待手術、C術後傷口痛、D蜂窩組織炎發燒,皆不如呼吸窘迫緊急。故最緊急為B。","options":{"A":"闌尾炎待手術非最急。","B":"正確(本題答案)。呼吸喘RR 30(呼吸窘迫)最緊急。","C":"術後傷口痛非最急。","D":"蜂窩組織炎發燒非最急。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"114100-N2-18":{"quick":"神經病變性麻刺痛,依PQRST「性質(Quality)」選輔佐止痛藥。","detail":{"background":"疼痛評估PQRST中,Q(Quality性質)描述疼痛的「種類/性質」——神經病變性疼痛常呈「麻、刺、電擊、灼燒」感,屬性質(Quality)的描述;依此性質選擇「疼痛輔佐劑(adjuvant)」如抗癲癇藥(gabapentin)、抗憂鬱藥(三環)。故依疼痛「性質」選輔佐藥最適當(C)。","options":{"A":"放射(R)是部位擴散。","B":"強度(S)是嚴重度評分。","C":"正確(本題答案)。神經痛之「性質(麻刺電)」決定輔佐藥選擇。","D":"時間(T)是發作時序。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"115030-N2-8":{"quick":"「個案主訴呼吸喘」是病人自覺=症狀(symptoms)。","detail":{"background":"症狀(symptoms)是病人自覺、無法直接測量者;徵象(signs)是可觀察測量者。選項A「個案主訴呼吸喘」是自覺=症狀;B聽診濕囉音、C叩診濁音、D觸診下肢水腫2+皆是護理師檢查所得=徵象。故屬症狀者為主訴呼吸喘(A)。判別:症狀(symptom)=病人自覺「主訴」者(呼吸喘);徵象(sign)=檢查所得(聽診濕囉音、叩診濁音、觸診水腫)。主訴呼吸喘=症狀。","options":{"A":"正確(本題答案)。主訴呼吸喘=症狀。","B":"聽診濕囉音是徵象。","C":"叩診濁音是徵象。","D":"觸診水腫是徵象。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"101030-N2-28":{"quick":"正常尿液pH值約4.5~7.5(偏酸~中性)。本題答案C。","detail":{"background":"正常尿液pH約4.6~8.0(常考範圍4.5~7.5或5~7,偏弱酸性,平均約6);受飲食影響(肉食偏酸、素食偏鹼)。本題選項以「4.5~7.5」(C)最符合常見正常範圍。尿pH異常可反映酸鹼失衡、感染(產尿素菌使尿偏鹼)或結石風險。臨床意義:尿pH受飲食影響(高蛋白肉食偏酸、蔬果偏鹼);產尿素酶細菌感染(如變形桿菌)使尿偏鹼;結石種類也與尿pH相關(尿酸結石好發於酸性尿)。","options":{"A":"2.5過低,非正常下限。","B":"3.5偏低。","C":"正確(本題答案)。正常尿pH約4.5~7.5。","D":"上限8.5偏高。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"101110-N2-9":{"quick":"尿液培養(Urine Culture)不一定要清晨第一次尿;隨時可採中段/導尿無菌尿。本題答案D為錯誤。","detail":{"background":"尿液培養(Urine Culture):用無菌檢體瓶收集(A對)、可用導尿方式收集(B對)、檢體儘速送檢(C對)。選項D「必須收集清晨第一次尿液」錯誤——「尿液培養」重點是無菌採集中段尿/導尿尿,隨時可採(清晨第一次尿是用於『常規』檢查濃縮尿;培養不限清晨),故D為錯誤敘述。","options":{"A":"正確。用無菌檢體瓶收集。","B":"正確。可用導尿收集。","C":"正確。儘速送檢。","D":"錯誤(本題答案)。培養不限清晨第一次尿。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"102030-N2-54":{"quick":"常規尿液檢查不必「單次導尿」收集;一般留中段尿即可。本題答案D為錯誤。","detail":{"background":"常規尿液檢查:主要檢驗尿液一般性狀(A對);儘量30分鐘內送檢(B對);未能即時送檢可置4~10°C冰箱、2小時內送檢(C對)。選項D「最好以單次導尿收集」錯誤——常規尿液檢查一般以「中段尿」收集即可,不需侵入性的單次導尿(導尿增加感染風險,僅特殊情況才用),故D為錯誤敘述。","options":{"A":"正確。檢驗尿液一般性狀。","B":"正確。儘量30分鐘內送檢。","C":"正確。冰箱暫存2小時內送。","D":"錯誤(本題答案)。常規尿留中段尿即可,不需單次導尿。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"102110-N2-49":{"quick":"尿液檢體未能30分鐘內送檢,應放6~8°C冰箱暫存。","detail":{"background":"尿液檢體收集後應於30分鐘內送檢(久置細菌增生、成分變化);若無法即時送,應冷藏於約4~10°C(本題6~8°C)冰箱暫存、並於2小時內送檢(C)。不可冷凍(-5~-7°C會破壞細胞)、不可室溫久置。故暫存溫度為6~8°C(C)。記憶:尿液檢體應30分鐘內送檢;無法即時送則冷藏4~10°C、2小時內送;不可冷凍(破壞細胞)、不可室溫久置(細菌增生、成分變化)。","options":{"A":"-5~-7°C會凍壞檢體。","B":"0°C過低,可能結冰。","C":"正確(本題答案)。6~8°C冷藏暫存。","D":"13~15°C偏高,不利保存。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"103100-N2-55":{"quick":"蟯蟲檢查應在「排便前」清晨以膠帶採肛門周圍蟲卵,非排便後。本題答案A為錯誤。","detail":{"background":"蟯蟲檢查(膠帶法/scotch tape):蟯蟲夜間移行至肛門周圍產卵,應於「清晨起床、排便前」以透明膠帶輕壓肛門口周圍沾取蟲卵(B對),30分鐘內送檢(C對),可置溫水杯維持(D)。選項A「告知先排便後再採檢體」錯誤——排便會把肛周蟲卵洗掉,應在「排便與清洗前」採集,故A為錯誤敘述。","options":{"A":"錯誤(本題答案)。應排便前採檢,排便後蟲卵被洗掉。","B":"正確。膠帶輕壓肛門口沾蟲卵。","C":"正確。30分鐘內送檢。","D":"正確。可置溫水杯送檢。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"105030-N2-10":{"quick":"常規尿液檢驗值「不能」作為使用抗生素依據(那是尿液培養);稱可作為依據為錯誤。","detail":{"background":"常規尿液檢體:教導留中段尿(A對);30分鐘內送檢(B對);留尿前評估是否月經來潮(經血污染影響結果,D對)。選項C「常規尿液檢驗值可作為使用抗生素的依據」錯誤——選擇抗生素須依「尿液培養與藥物敏感試驗」結果,常規尿液檢查(一般性狀)只能提示感染,不能作為選藥依據,故C為錯誤敘述。","options":{"A":"正確。教導留中段尿。","B":"正確。30分鐘內送檢。","C":"錯誤(本題答案)。選抗生素依「培養」,非常規尿檢。","D":"正確。留尿前評估月經。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"105030-N2-3":{"quick":"尿液檢體用過的小兒集尿袋屬「感染性可燃」廢棄物。","detail":{"background":"沾染尿液(體液)的小兒集尿袋屬「感染性可燃」廢棄物,應以紅色感染性垃圾袋收集(C)。一般性廢棄物是未污染者;沾體液者屬感染性。可燃材質(塑膠袋)經滅菌焚化處理。故為感染性可燃(C)。記憶:沾染體液(尿液)的集尿袋屬感染性可燃廢棄物(紅色袋);可燃材質經滅菌焚化處理。未污染者才屬一般性廢棄物。","options":{"A":"沾尿液非一般性。","B":"沾尿液非一般性。","C":"正確(本題答案)。沾尿液集尿袋=感染性可燃。","D":"集尿袋為可燃材質,非不可燃。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"106030-N2-31":{"quick":"尿液出現膽紅素可能因「阻塞性黃疸」(結合型膽紅素逆流入血、由尿排出)。","detail":{"background":"正常尿液不含膽紅素。尿中出現膽紅素(bilirubinuria)表示血中「結合型(直接)膽紅素」升高並由腎排出,常見於阻塞性黃疸(膽道阻塞,如結石、腫瘤)與肝細胞性黃疸(B)。糖尿病出現尿糖、腎絲球腎炎/腎病症候群出現蛋白尿與血尿,非膽紅素。故為阻塞性黃疸(B)。","options":{"A":"糖尿病出現尿糖,非膽紅素。","B":"正確(本題答案)。阻塞性黃疸使尿出現膽紅素。","C":"腎絲球腎炎出現血尿蛋白尿。","D":"腎病症候群出現大量蛋白尿。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"108020-N2-4":{"quick":"正常成人尿液pH約4.6~8.0(非3.5~4.5);稱3.5~4.5為錯誤。","detail":{"background":"正常成人尿液性狀:每日尿量約1200~1500 mL(A對);尿比重1.010~1.030(C對);顏色淡黃、放置後有氨味(D對)。選項B「pH值為3.5~4.5」錯誤——正常尿pH約4.6~8.0(偏弱酸,平均約6),3.5~4.5過酸不符正常範圍,故B為錯誤敘述。","options":{"A":"正確。每日尿量約1200~1500 mL。","B":"錯誤(本題答案)。正常尿pH約4.6~8.0,非3.5~4.5。","C":"正確。尿比重1.010~1.030。","D":"正確。淡黃色、有氨味。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"108110-N2-53":{"quick":"常規尿液宜「清晨第一次中段尿」、3小時內送檢、生理期改期或導尿→組合判定(本題答案C「13」)。","detail":{"background":"本題官方答案「13」。常規尿液檢體:1最好是清晨第一次的中段尿(濃縮、代表性佳);3若正值生理期,可用導尿方式取得檢體(避免經血污染)。錯誤項:2檢體收集後最好「30分鐘~1小時內」送檢(室溫3小時過久);4檢體3小時內無法送應「冷藏」(此項本身合理但與官方組合不符)。依官方答案選「13」。","options":{"A":"含2(室溫3小時過久)不符官方。","B":"含2、4組合不符。","C":"正確(本題答案)。1清晨中段尿、3生理期改導尿。","D":"含4組合不符官方答案。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"109110-N2-10":{"quick":"發燒病人應「臥床休息」減少代謝產熱,不宜「指導多下床活動」。本題答案C為不適當。","detail":{"background":"孫先生發燒39.2°C、UTI:護理措施應減少外在覆蓋物助散熱(A對)、補充液體補無感水分散失(B對)、協助尿液檢驗(D對)。選項C「指導多下床活動」不適當——發燒病人應「臥床休息」以減少代謝與產熱、保留體力,不應鼓勵多活動(增加產熱與耗能),故C為不適當措施。","options":{"A":"適當。減少覆蓋物助散熱。","B":"適當。補充液體補無感水分散失。","C":"不適當(本題答案)。發燒應臥床休息,非多下床活動。","D":"適當。協助尿液檢驗。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"109110-N2-53":{"quick":"男性尿液培養:晨起第一次中段尿置乾淨尿杯、30分鐘內送檢→「13」。","detail":{"background":"男性尿液培養(中段尿):1將晨起第一次中段尿置於乾淨(無菌)尿杯、3收集後30分鐘內送檢——皆正確。錯誤項:2長期導尿者採尿應自導尿管「橡皮採檢口無菌抽取」,不可「打開尿袋底端倒出」(已污染);4懷疑尿道感染者宜「先採檢體再給抗生素」(此項本身正確,但與官方組合不符)。依官方答案選「13」。","options":{"A":"正確(本題答案)。1晨起中段尿、3 30分鐘內送檢。","B":"含2(尿袋倒尿)錯誤。","C":"含4組合不符官方。","D":"含4組合不符官方。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"112030-N2-30":{"quick":"正常尿比重約1.010~1.030(非1.030~1.050);稱1.030~1.050為錯誤。","detail":{"background":"尿液特性:正常尿比重約1.010~1.030(A錯,1.030~1.050過高);尿pH正常約4.6~8.0(B對);正常尿液不含膽紅素(C對);混濁尿可能是泌尿道感染(膿尿)、結晶或乳糜尿(D對)。選項A「尿比重1.030~1.050」錯誤(正常上限約1.030)。","options":{"A":"錯誤(本題答案)。正常尿比重1.010~1.030,非1.030~1.050。","B":"正確。尿pH約4.6~8.0。","C":"正確。正常尿不含膽紅素。","D":"正確。混濁尿可能是泌尿道感染。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"112030-N2-51":{"quick":"24小時尿:當日7點先解尿「不留」,隔日7點最後一次尿「要留」→組合(本題答案B「23」)。","detail":{"background":"本題官方答案「23」。24小時尿液收集(7AM至次日7AM):2隔日早晨7點解最後一次尿並收集於瓶內(對)、3檢驗單註明24小時尿總量(對)。錯誤項:1當日早晨7點第一次尿「不收集(棄去)」(從此刻起算開始收集之後的尿,故1錯);4女性「月經期間不宜」收集24小時尿(經血污染,故4錯)。依官方答案選「23」。","options":{"A":"含1(當日7點尿要留)錯。","B":"正確(本題答案)。2隔日7點最後一次留、3註明總量。","C":"含4(月經期收集)錯。","D":"含1、4皆錯。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"112030-N2-52":{"quick":"存留導尿採尿培養:夾管15~30分後,消毒橡皮採檢口以無菌空針抽取。本題答案A。","detail":{"background":"本題官方答案A。存留導尿病人採尿培養:A「以管夾/止血鉗夾住導尿管15~30分鐘」使尿液蓄積以利取得新鮮尿(對)。錯誤項:B應消毒「導尿管上的橡皮採檢口」(非接蓄尿袋的橡皮端);C應以「無菌」空針抽取(非清潔空針)、量約5~10 mL即可;D尿液檢體應「30分鐘內」送檢(非2小時)。故正確為A夾管15~30分。","options":{"A":"正確(本題答案)。夾管15~30分鐘利取尿。","B":"應消毒導尿管橡皮採檢口,且須無菌。","C":"應以無菌空針抽取,非清潔空針。","D":"尿培養宜30分鐘內送檢,非2小時。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"112110-N2-30":{"quick":"尿中出現膽紅素可能因「阻塞性黃疸」。","detail":{"background":"正常尿液不含膽紅素。尿出現膽紅素表示血中結合型(直接)膽紅素升高並由尿排出,常見於阻塞性黃疸(膽道阻塞)與肝細胞性黃疸(C)。脫水使尿濃縮顏色深但無膽紅素;泌尿道感染出現膿尿;腎臟病出現蛋白尿。故為阻塞性黃疸(C)。機轉:正常尿不含膽紅素;尿出現膽紅素=血中結合型(直接)膽紅素升高並由腎排出,見於阻塞性黃疸(膽道阻塞)與肝細胞性黃疸。脫水使尿濃縮但無膽紅素。","options":{"A":"脫水使尿濃縮,無膽紅素。","B":"泌尿道感染出現膿尿。","C":"正確(本題答案)。阻塞性黃疸使尿出現膽紅素。","D":"腎臟病出現蛋白尿。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"112180-N2-33":{"quick":"24小時尿:當日7AM那次尿「不留(棄)」,之後到次日7AM全收集。本題答案D...重判官方答案。","detail":{"background":"本題官方答案D。24小時尿液收集要點:開始時(當日7AM)請病人先解尿並「棄去」,從此刻起收集之後每次尿至次日7AM(最後一次要留);收集期間如有「遺漏一次」,則整個收集失敗、應「隔天重新開始收集」(D正確)。A目的非測膀胱功能(是定量分析如肌酸酐廓清);B「當日7AM那次不留」敘述對但B把它說成「次日7AM不留」方向錯;C尿液應冷藏或加防腐劑,非保溫箱。故正確為D(遺漏需重收)。","options":{"A":"24小時尿用於定量分析,非測膀胱功能。","B":"是「當日」起始尿不留、次日最後一次要留。","C":"尿應冷藏/加防腐劑,非保溫箱保溫。","D":"正確(本題答案)。收集遺漏應隔天重新收集。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"113030-N2-33":{"quick":"24小時尿:7AM請病人解尿「不要」,之後開始收集到次日7AM。本題答案A。","detail":{"background":"24小時尿液收集衛教:A「於7AM請病人解尿,此次尿不要(棄去),之後開始收集每次解的尿到次日7AM」正確(從棄去那刻起算,收集之後24小時的尿,含次日7AM最後一次)。B遺漏應「隔天重新收集」(非持續補到遺漏時間點);C隔日7AM最後一次尿「要收集」(非丟棄);D收集的尿應冷藏/加防腐劑保存,非僅栓緊送檢(且須註明總量)。故正確為A。","options":{"A":"正確(本題答案)。7AM棄首次尿,之後收集到次日7AM。","B":"遺漏應隔天重收,非補到遺漏點。","C":"隔日7AM最後一次尿要收集,非丟棄。","D":"收集尿應冷藏保存並註明總量。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"114030-N2-21":{"quick":"肝臟疾病尿中不會出現「圓柱體」(圓柱體見於腎臟疾病);稱肝病出現圓柱體為錯誤。","detail":{"background":"尿液性質:泌尿道感染尿中白血球(膿尿)升高(A對);糖尿病出現尿糖(B對);長期嘔吐/飢餓出現酮體(C對)。選項D「肝臟疾病者尿中出現圓柱體(cast)」錯誤——尿圓柱體(管型)是在腎小管形成,出現於「腎臟疾病」(腎絲球腎炎、急性腎損傷),非肝臟疾病,故D為錯誤敘述。","options":{"A":"正確。UTI尿白血球升高。","B":"正確。糖尿病出現尿糖。","C":"正確。長期嘔吐出現酮體。","D":"錯誤(本題答案)。圓柱體見於腎臟疾病,非肝臟疾病。"},"sources":["新文京《基本護理學》檢體採集-尿液","華杏《最新基本護理學》排泄與檢體"]}},"101030-N2-50":{"quick":"血比容(Hct)測定紅血球佔全血體積的百分比。","detail":{"background":"血比容(hematocrit, Hct)=紅血球佔全血容積的百分比(男約42~52%、女約37~47%)(A正確);紅血球計數是數目;紅血球沈降率(ESR)反映發炎;出血時間評估血小板功能。故測紅血球佔全血體積百分比者為血比容(A)。記憶:血比容(Hct)約為血紅素(Hb)的三倍;Hct男42~52%、女37~47%。Hct升高見於脫水、紅血球增多症;降低見於貧血、出血、體液過多稀釋。","options":{"A":"正確(本題答案)。血比容=紅血球佔全血體積%。","B":"紅血球計數是數目,非百分比。","C":"ESR反映發炎。","D":"出血時間評估血小板功能。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"102110-N2-39":{"quick":"血液檢體用過的棉籤屬「感染性可燃」廢棄物。","detail":{"background":"沾血的棉籤(棉花棒)屬感染性「可燃」廢棄物,以紅色感染性垃圾袋收集、焚化處理(A)。利器(針頭)才入黃色利器盒;一般性是未污染者。沾血棉籤=感染性可燃(A)。記憶:沾血/體液的棉籤、紗布屬「感染性可燃」廢棄物(紅色袋);利器(針頭)入黃色利器盒。處理體液污染物一律視為感染性廢棄物。","options":{"A":"正確(本題答案)。沾血棉籤=感染性可燃。","B":"棉籤可燃,非不可燃。","C":"沾血非一般性。","D":"沾血非一般性。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"102110-N2-45":{"quick":"疑似感染確認:全血球計數(1)、紅血球沈降率(3)→「13」。","detail":{"background":"疑似感染性疾病的血液檢查:1全血球計數(CBC,看白血球與分類,判斷感染)、3紅血球沈降率(ESR,發炎指標)有助確認感染與發炎。2出血時間、4凝血時間是評估「止血/凝血功能」,與確認感染無關。故確認感染相關者為「13」。區辨:確認「感染/發炎」用CBC(白血球分類)、ESR、CRP;評估「止血凝血功能」用出血時間(BT)、凝血時間(PT/aPTT)。本題問感染,選CBC與ESR。","options":{"A":"含2(出血時間)非感染指標。","B":"2、4皆凝血指標。","C":"正確(本題答案)。1全血球計數、3紅血球沈降率。","D":"含4凝血指標。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"103030-N2-54":{"quick":"採集痰液培養:採清晨醒來、未刷牙未進食的第一口痰最佳。","detail":{"background":"痰液(培養)收集:清晨醒來、「未刷牙、未進食」前的第一口深部痰最佳(夜間積痰、菌量足、污染少)(B正確);採前可用「清水」漱口(不可用牙膏,牙膏抑菌影響培養);無法即時送檢需冷藏;肺炎雙球菌肺炎痰多為「鐵鏽色」(非粉紅泡沫,粉紅泡沫是肺水腫)。故正確為清晨第一口痰(B)。","options":{"A":"肺炎雙球菌痰多為鐵鏽色,非粉紅泡沫。","B":"正確(本題答案)。清晨未刷牙未進食第一口痰最佳。","C":"採前用清水漱口,不可用牙膏。","D":"痰液應儘速送檢,無法送則冷藏(非1小時的籠統說法)。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"103030-N2-55":{"quick":"血液培養抽血前以「75%酒精＋優碘」消毒3次,非僅酒精;本題答案A為錯誤。","detail":{"background":"血液培養標本收集:抽血後更換針頭再注入培養瓶(B對,避免皮膚菌污染);先注入厭氧瓶再注入需氧瓶(C對,減少空氣進入厭氧瓶);穿刺處加壓2~5分不按揉(D對)。選項A「抽血前以75%酒精棉籤消毒皮膚3次」錯誤——血液培養皮膚消毒應「優碘(或chlorhexidine)＋酒精」並待乾、由內向外環形消毒,不可僅用75%酒精,故A為錯誤敘述。","options":{"A":"錯誤(本題答案)。血培皮膚消毒須優碘+酒精,非僅酒精。","B":"正確。抽血後更換針頭再注入。","C":"正確。先注厭氧瓶再注需氧瓶。","D":"正確。穿刺處加壓2~5分不按揉。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"104030-N2-52":{"quick":"蟯蟲檢查以「透明膠帶在肛門口附近輕壓沾黏」蟲卵。","detail":{"background":"蟯蟲檢查(膠帶法):蟯蟲夜間於肛門周圍產卵,清晨起床排便前以「透明膠帶在肛門口附近輕壓沾黏蟲卵」,貼於玻片送檢(D正確)。糞便置衛生紙、棉棒沾糞、吸管吸糞皆非蟯蟲標準採法(蟯蟲卵在肛周皮膚而非糞便中)。故為膠帶肛門口沾黏(D)。記憶:蟯蟲卵在「肛門周圍皮膚」而非糞便中,故用透明膠帶於清晨排便前在肛門口輕壓沾黏蟲卵;與一般糞便檢查(找蟲卵/潛血)的採法不同。","options":{"A":"糞便標本非蟯蟲標準採法。","B":"棉棒沾糞非蟯蟲採法。","C":"吸管吸糞非蟯蟲採法。","D":"正確(本題答案)。透明膠帶肛門口輕壓沾蟲卵。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"104100-N2-17":{"quick":"PPD結核菌素試驗:硬結直徑≧10 mm為陽性反應。","detail":{"background":"結核菌素試驗(PPD/Mantoux):皮內注射(角度固定皮內15°,非視胖瘦),48~72小時(非24~36小時)判讀「硬結(induration)」直徑,一般≧10 mm為陽性(C正確,免疫低下者≧5 mm即陽性)。陽性表示曾感染結核菌或接種卡介苗,「不一定」正在罹病(需進一步胸部X光痰檢確認)。故正確為硬結≧10 mm陽性(C)。","options":{"A":"PPD皮內注射角度固定,非視胖瘦。","B":"判讀為48~72小時,非24~36小時。","C":"正確(本題答案)。硬結≧10 mm為陽性。","D":"陽性不一定正在罹病,須進一步檢查。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"105030-N2-51":{"quick":"白血球125,000/mm³異常(正常約4,000~10,000),屬顯著升高。","detail":{"background":"正常成人血液值:紅血球約4.2~6.2×10⁶/mm³、白血球約4,000~10,000/mm³、血紅素男約13~18、女約12~16 g/dL、血小板約15~40萬/mm³(15~40×10⁴)。選項B「白血球125,000/mm³」遠高於正常上限,顯著異常(提示白血病或嚴重感染)。其餘A紅血球4.9、C血紅素14.8、D血小板38×10⁴皆在正常範圍。","options":{"A":"紅血球4.9×10⁶屬正常。","B":"正確(本題答案)。白血球125,000顯著異常。","C":"血紅素14.8 g/dL屬正常。","D":"血小板38×10⁴屬正常。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"105030-N2-54":{"quick":"動脈血液氣體分析:用含heparin的特製空針抽血。","detail":{"background":"動脈血液氣體分析(ABG):用「含肝素(heparin)抗凝的特製空針」抽動脈血(C正確,防凝固);抽血前不需停氧氣(除非醫囑評估,且停氧須記錄);穿刺橈動脈前評估「Allen’s test」(評估尺動脈側枝循環,非股動脈);檢體應「排除空氣、置冰上立即送檢」(室溫久置影響數值)。故正確為含heparin空針(C)。","options":{"A":"抽ABG前一般不需停氧(除非醫囑),且停氧須記錄。","B":"Allen test用於評估橈動脈穿刺,非股動脈。","C":"正確(本題答案)。用含heparin的特製空針。","D":"ABG檢體應置冰上立即送,非室溫。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"105090-N2-23":{"quick":"「使用較粗的針頭」不會造成溶血(反而較細的針頭易溶血);本題答案C為非溶血原因。","detail":{"background":"靜脈抽血後檢體溶血(紅血球破裂)的原因:試管內含水分(滲透壓改變,A是原因)、血液未沿管壁45度緩緩注入(衝擊破壞,B是原因)、劇烈搖動檢體(D是原因)、使用「太細」的針頭(剪力大致溶血)。選項C「使用較粗的針頭抽血」不會造成溶血(粗針頭剪力小,反而較不溶血),故為非溶血原因(本題答案)。","options":{"A":"試管含水分會致溶血。","B":"未沿管壁注入會致溶血。","C":"正確(本題答案,非原因)。較粗針頭不易溶血。","D":"劇烈搖動會致溶血。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"105090-N2-55":{"quick":"抽血做血液培養應「先採血液培養檢體,再給抗生素」。","detail":{"background":"靜脈採血:應「先採血液培養檢體再給第一劑抗生素」(C正確,避免抗生素影響菌培養結果);檢體採後輕柔混勻(不可大力晃動致溶血,A錯);不可由「靜脈輸液管路」抽血(會被輸液稀釋污染,B錯);血液應「沿管壁緩緩」注入(快速垂直注入致溶血,D錯)。故正確為先採血培養再給抗生素(C)。","options":{"A":"採後輕柔混勻,不可大力晃動。","B":"不可由輸液管路抽血(稀釋污染)。","C":"正確(本題答案)。先採血培養再給抗生素。","D":"應沿管壁緩緩注入,非快速垂直。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"107110-N2-56":{"quick":"痰液無法即時送檢應「冷藏」,非室溫陰暗處;本題答案C為錯誤。","detail":{"background":"痰液常規檢查:已進食者應「清水漱口」後再留痰(A對);檢體20~30分鐘內送檢(B對);收集前不可用牙膏刷牙(抑菌影響結果,D對)。選項C「無法即時送檢應將檢體存放於室溫陰暗處」錯誤——痰液檢體無法即時送檢應「冷藏(4°C冰箱)」保存,室溫久置細菌過度增生失真,故C為錯誤敘述。","options":{"A":"正確。已進食者清水漱口後留痰。","B":"正確。20~30分鐘內送檢。","C":"錯誤(本題答案)。無法即時送應冷藏,非室溫陰暗。","D":"正確。收集前不可用牙膏刷牙。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"108020-N2-52":{"quick":"血液培養:先注入「厭氧瓶」再注入嗜氧瓶。本題答案D。","detail":{"background":"本題官方答案D。血液培養:注入順序「先注厭氧瓶、再注嗜氧(需氧)瓶」(D正確,避免空氣進入厭氧瓶影響厭氧菌培養)。A皮膚消毒應「優碘＋酒精由內而外」並待乾(非生理食鹽水);B醫囑兩套應「不同部位」分別採(非同一穿刺部位);C培養瓶口打開後須「消毒瓶口」再注入(非直接注入)。故正確為先厭氧後嗜氧(D)。","options":{"A":"皮膚消毒用優碘+酒精,非生理食鹽水。","B":"兩套血培應不同部位採,非同部位。","C":"瓶口須消毒後再注入,非直接注入。","D":"正確(本題答案)。先注厭氧瓶再注嗜氧瓶。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"108020-N2-53":{"quick":"CBC(全血球計數)採血前不需禁食6~8小時。","detail":{"background":"抽血需禁食6~8小時者:空腹血糖(blood sugar)、血脂(LDL、三酸甘油酯triglycerides)等受飲食影響的項目。全血球計數(CBC)檢驗血球數目,不受飲食立即影響,「不需禁食」(B)。故不需禁食者為CBC。記憶:需禁食6~8小時者=空腹血糖、血脂(LDL、三酸甘油酯)等受飲食影響項目;CBC(全血球計數)不受飲食立即影響,不需禁食。","options":{"A":"空腹血糖需禁食。","B":"正確(本題答案)。CBC不需禁食。","C":"LDL(血脂)需禁食。","D":"三酸甘油酯(血脂)需禁食。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"109030-N2-16":{"quick":"胃鏡檢查不具放射線傷害(屬內視鏡光學檢查)。","detail":{"background":"具游離放射線者:X光攝影、電腦斷層(CT)、核醫掃描。胃鏡(上消化道內視鏡)是以光學鏡頭直接觀察,不使用放射線(A);核磁共振(MRI)用磁場與射頻、亦無游離輻射(D其實也無放射線,但本題答案為A胃鏡)。故不具放射線傷害者依官方答案為胃鏡(A)。","options":{"A":"正確(本題答案)。胃鏡屬內視鏡,無放射線。","B":"腦部電腦斷層有放射線。","C":"胸部X光有放射線。","D":"MRI雖無游離輻射,但本題選胃鏡。"},"sourc
