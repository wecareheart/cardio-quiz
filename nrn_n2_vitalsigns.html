es":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"109030-N2-45":{"quick":"血液培養:抽血後須另換一支無菌針頭再注入培養瓶。","detail":{"background":"一般針具採血液培養:A目的是「找血中菌種」非評估肺部氣體交換(那是ABG);B抽血後「另換一支無菌針頭」再注入培養瓶(避免皮膚菌污染,B正確);C應「先採血培養再給第一劑抗生素」(非給藥後再採,且採靜脈血非動脈);D「不可由靜脈輸注部位採血」(稀釋污染)。故正確為換針頭再注入(B)。","options":{"A":"血培目的是找菌種,非評估氣體交換。","B":"正確(本題答案)。抽血後換無菌針頭再注入培養瓶。","C":"應先採血培養再給抗生素。","D":"不可由輸注部位採血。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"109030-N2-46":{"quick":"血液培養(blood culture)可作為選擇抗生素的依據。","detail":{"background":"可作為選擇抗生素種類依據者=「血液培養及藥物敏感性試驗」(C)——培養出致病菌並做藥敏,直接指導抗生素選擇。D-Dimer用於排除血栓/DIC、CRP與ESR是發炎指標(只提示有無感染發炎,不能指導選藥)。故為血液培養(C)。區辨:選抗生素依「血液培養+藥物敏感試驗」(找菌種與敏感藥);D-Dimer評估血栓/DIC、CRP與ESR是發炎指標,只提示有無發炎,不能指導選藥。","options":{"A":"D-Dimer用於評估血栓。","B":"CRP是發炎指標,不指導選藥。","C":"正確(本題答案)。血液培養+藥敏指導選抗生素。","D":"ESR是發炎指標,不指導選藥。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"109030-N2-49":{"quick":"血液培養應「先抽血培養再給抗生素」,非先厭氧陽性才再抽嗜氧;本題答案C為錯誤。","detail":{"background":"血液培養:可確認菌種作為抗生素依據(A對);需先抽血培養檢體再給抗生素(B對);通常須3~7天才有結果(D對)。選項C「以厭氧菌測試為優先,陽性再抽血做嗜氧菌培養」錯誤——血液培養應「同時」採集需氧瓶與厭氧瓶(一次採血分別注入兩瓶),並非先做厭氧、陽性後再採嗜氧,故C為錯誤敘述。","options":{"A":"正確。可確認菌種作為抗生素依據。","B":"正確。先抽血培養再給抗生素。","C":"錯誤(本題答案)。應同時採需氧與厭氧瓶,非先厭氧陽性再採。","D":"正確。血培通常3~7天有結果。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"110110-N2-53":{"quick":"抽血後若試管含抗凝劑,應「輕搖試管」混勻(防凝固)。","detail":{"background":"靜脈採血:A不可由「靜脈輸液管路」抽血(被輸液稀釋污染);B止血帶綁於抽血部位上方約7.5~10 cm(非2~3 cm,過近影響);C採集試管內若含抗凝劑,應「輕柔上下顛倒混勻」防凝固(C正確,不可大力搖晃以免溶血);D抽血後應「按壓(不按揉)」止血,按揉易瘀血。故正確為含抗凝劑輕搖混勻(C)。","options":{"A":"不可由輸液管路抽血(稀釋污染)。","B":"止血帶綁上方約7.5~10 cm,非2~3 cm。","C":"正確(本題答案)。含抗凝劑試管輕搖混勻。","D":"抽血後應按壓不按揉,按揉易瘀血。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"110110-N2-55":{"quick":"糞便潛血(化學法)前:沾尿液的糞便「不可」送檢(尿液干擾);本題答案D為錯誤。","detail":{"background":"糞便潛血試驗(化學法):收集前三天忌食菠菜、甘藍菜、紅肉、肝臟(含血/過氧化酶致偽陽性,A對);停服鐵劑三天(B對);評估是否經期(經血致偽陽性,C對)。選項D「沾有尿液的糞便仍可置入無菌容器送檢」錯誤——糞便檢體不可被尿液污染(尿液會干擾結果),且糞便檢查用一般清潔容器非無菌容器,故D為錯誤敘述。","options":{"A":"正確。前三天忌食菠菜紅肉肝臟。","B":"正確。停服鐵劑三天。","C":"正確。評估是否經期。","D":"錯誤(本題答案)。沾尿液的糞便不可送檢(干擾結果)。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"111030-N2-53":{"quick":"氣喘喘鳴入院,首要入院護理是「抬高床頭並測量生命徵象」。","detail":{"background":"氣喘發作、聽到喘鳴(wheezing)入病房,屬呼吸窘迫緊急。首要入院護理是「抬高床頭(半坐臥利呼吸)並測量生命徵象(含血氧)」(D),穩定呼吸與評估狀況優先;病史詢問、痰液收集方法、環境介紹屬後續非緊急。故首要為抬高床頭並測生命徵象(D)。","options":{"A":"病史詢問非緊急首要。","B":"痰液收集方法屬後續。","C":"環境介紹屬後續。","D":"正確(本題答案)。抬高床頭並測量生命徵象。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"111110-N2-51":{"quick":"血液培養之錯誤步驟為：1先給抗生素再採(應先採再給)、3兩套同時間同部位抽取(應不同部位/時間)、4先注入需氧瓶(應先注厭氧瓶)→錯誤組合「134」，故選B。","detail":{"background":"本題官方答案「125」(錯誤項)。血液培養II套執行:1「先施打抗生素後再採檢」錯(應先採再給藥);2「以碘酒(iodine tincture)消毒瓶口」——瓶口消毒應用75%酒精(碘酒會殘留腐蝕、且影響),命題判2錯;3兩套應「不同部位/不同時間」採(非同時同部位),故「同時間同部位」錯誤。題目選錯誤組合,1、2、5(5換無菌針頭其實正確,但官方組合為125)依官方答案。核心:先採後給藥、不同部位採兩套、瓶口酒精消毒。","options":{"A":"含5(更換無菌針頭)為正確步驟，不屬錯誤組合。","B":"正解(134)：1先給藥再採、3同部位同時抽、4先注需氧瓶皆為錯誤做法。","C":"含2(碘酒消毒瓶口)為正確步驟，不屬錯誤。","D":"含2、5皆為正確步驟，不符。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"111110-N2-53":{"quick":"痰液收集:無法咳出可震顫叩擊(1)、氣切可用抽痰法(4)→「14」。","detail":{"background":"痰液檢體收集:1痰液咳不出可協助胸腔震顫叩擊、姿位引流助排痰(對);4氣切留置病人可用「無菌抽痰法」取得痰檢體(對)。錯誤項:2收集前「不可刷牙(牙膏抑菌)」(應清水漱口);3不可以「口咽部唾液」代替痰液(唾液非下呼吸道檢體、影響結果)。故正確為「14」。","options":{"A":"含2(先刷牙)錯。","B":"2、3皆錯。","C":"含3(唾液代替)錯。","D":"正確(本題答案)。1震顫叩擊、4抽痰法。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"112030-N2-18":{"quick":"PPD硬結18 mm陽性,表示曾感染/接觸結核,「不需」再打卡介苗;本題答案C為錯誤。","detail":{"background":"PPD結核菌素試驗:主要檢驗體內是否曾感染結核分枝桿菌(產生細胞免疫)(A大致對);硬結18 mm≧10 mm為陽性反應(B對);陽性者需進一步胸部X光或痰液檢查確認是否現症感染(D對)。選項C「建議林先生需接受卡介苗注射」錯誤——PPD陽性表示已有結核免疫反應(曾感染或已接種),「不需」再接種卡介苗(卡介苗用於PPD陰性的未感染者),故C為錯誤敘述。","options":{"A":"PPD檢驗是否曾感染結核(細胞免疫反應)。","B":"正確。硬結18 mm≧10 mm為陽性。","C":"錯誤(本題答案)。PPD陽性不需再打卡介苗。","D":"正確。陽性需進一步X光/痰檢確認。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"112110-N2-51":{"quick":"「沿試管壁緩緩注入血液」不會造成溶血;本題答案D為非溶血原因。","detail":{"background":"靜脈抽血造成溶血(紅血球破裂)的原因:試管內含水分(A是原因)、使用太細的針頭(剪力大,B是原因)、劇烈搖晃檢體(C是原因)。選項D「沿試管壁緩緩注入血液」是「正確操作」可避免溶血,故不是造成溶血的原因(本題答案)。記憶:溶血原因=細針、含水、劇烈搖晃、快速衝擊注入。","options":{"A":"試管含水分會致溶血。","B":"太細針頭剪力大會致溶血。","C":"劇烈搖晃會致溶血。","D":"正確(本題答案,非原因)。沿管壁緩緩注入可避免溶血。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"112180-N2-1":{"quick":"剖腹產新生兒出生後第5天臍帶感染=住院期間新發生→符合HAI定義。","detail":{"background":"醫療照護相關感染(HAI)須為住院/醫療過程中新發生、入院時不存在也非潛伏期者。C剖腹產新生兒「出生後第5天」臍帶感染屬出生後於醫療照護期間新得=HAI(正確)。A栓塞術後隔日發燒未必感染;B出生48小時內B肝是母體垂直感染(先天);D帶狀疱疹是自身潛伏VZV再活化。故符合HAI者為C。","options":{"A":"栓塞術後發燒未必感染。","B":"48小時內B肝屬先天垂直感染。","C":"正確(本題答案)。出生第5天臍帶感染=HAI。","D":"帶狀疱疹是自身病毒再活化,非HAI。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"113180-N2-21":{"quick":"化療後血球極低(WBC 1200、PLT 5000)宜用「海綿潔牙棒」清潔口腔。","detail":{"background":"癌症化療後骨髓抑制、白血球(1200)與血小板(5000)極低,口腔清潔須避免出血與感染:應使用「軟海綿潔牙棒(口腔棉棒)」輕柔清潔(D正確),避免硬毛牙刷、牙線、牙籤(易使脆弱黏膜出血、感染)。故最適當為海綿潔牙棒(D)。重點:化療後血球極低(白血球與血小板低)時,口腔清潔用「軟海綿潔牙棒」避免黏膜出血感染;禁用硬毛牙刷、牙線、牙籤等易致出血器具。","options":{"A":"牙縫刷易致黏膜出血。","B":"牙籤棒易刺傷黏膜出血。","C":"一般牙刷硬毛易致出血。","D":"正確(本題答案)。海綿潔牙棒輕柔不易出血。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"114170-N2-35":{"quick":"阿米巴痢疾糞便檢體須保持近體溫、30分鐘內送檢(保活滋養體)。","detail":{"background":"疑似阿米巴痢疾(Entamoeba histolytica)的糞便檢體:阿米巴「滋養體(trophozoite)」在低溫下會死亡分解,故檢體應「保持近體溫(勿冷藏)、於30分鐘內儘速送檢」以保持滋養體活性供鏡檢(B正確)。不可放冰箱(會殺死滋養體)、不可隔天送、不可用浮膠貼紙(那是蟯蟲法)。故為保溫並30分內送檢(B)。","options":{"A":"阿米巴檢體不可冷藏(滋養體會死)。","B":"正確(本題答案)。保持近體溫、30分鐘內送檢。","C":"不可隔天送(滋養體分解)。","D":"浮膠貼紙是蟯蟲採法,非阿米巴。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}},"108020-N2-42":{"quick":"車禍多處挫傷、呼吸急促血壓下降,最可能因「內出血」致缺氧。","detail":{"background":"車禍多處挫傷病人出現呼吸急促、自覺呼吸不順、血壓下降——最可能原因是「內出血(失血性休克)」:大量內出血致循環血量不足、組織缺氧,身體以呼吸加快代償並使血壓下降(C正確)。疼痛、焦慮也可使呼吸快,但伴隨「血壓下降」最指向內出血;副交感受刺激會使呼吸變慢(與此相反)。故為內出血(C)。","options":{"A":"疼痛可使呼吸快,但不致血壓下降。","B":"焦慮使呼吸快,不致血壓下降。","C":"正確(本題答案)。內出血致缺氧、呼吸快、血壓降。","D":"副交感刺激使呼吸變慢,與此相反。"},"sources":["新文京《基本護理學》生命徵象-呼吸","華杏《最新基本護理學》呼吸"]}},"114100-N2-15":{"quick":"感覺外界溫度變化而增減衣物是「下視丘/大腦皮質」功能,非杏仁核;稱杏仁核為錯誤。","detail":{"background":"冷熱生理反應:冷熱覺由外側脊髓視丘徑(spinothalamic)傳至下視丘的體溫調節中樞(A對);碰觸極熱時脊髓立即將衝動傳給運動神經產生「縮回反射」(脊髓反射,C對);四肢皮膚對冷覺的接受器較多、對冷較敏感(D對)。選項B「杏仁核使人感覺溫度變化而增減衣物」錯誤——溫度感覺整合與行為性體溫調節主要由「下視丘與大腦皮質」負責,杏仁核主司情緒,故B為錯誤敘述。","options":{"A":"正確。冷熱覺經外側脊髓視丘徑傳至下視丘。","B":"錯誤(本題答案)。感溫增減衣物是下視丘/皮質功能,非杏仁核。","C":"正確。碰極熱產生脊髓縮回反射。","D":"正確。四肢對冷覺較敏感。"},"sources":["新文京《基本護理學》身體評估","華杏《最新基本護理學》健康評估"]}},"115030-N2-35":{"quick":"血小板80×10⁴(80萬)異常偏高(正常約15~40萬)。","detail":{"background":"正常成人血液值:紅血球約4.2~6.2×10⁶/mm³、白血球約4,000~10,000/mm³、血紅素男13~18女12~16 g/dL、血小板約15~40萬/mm³(15~40×10⁴)。選項D「血小板80×10⁴(=800,000/mm³)」遠高於正常上限40萬,屬異常增多(血小板增多症,可能反應性或骨髓增生)。A紅血球5×10⁶、B白血球8000、C血紅素14.8皆正常。","options":{"A":"紅血球5×10⁶屬正常。","B":"白血球8000屬正常。","C":"血紅素14.8 g/dL屬正常。","D":"正確(本題答案)。血小板80萬遠高於正常上限,異常。"},"sources":["新文京《基本護理學》檢體採集-血液/痰液","華杏《最新基本護理學》檢驗檢體"]}}},TO=["1體溫測量發燒型態與體溫過高過低", "2脈搏測量類型與脈律異常", "3血壓測量原理與影響因素", "4呼吸型態測量與影響因素", "5身體評估徵象症狀與疼痛評估", "6尿液檢體採集與尿液性狀檢驗", "7血液檢體採集檢驗與其他檢體"],LEC={"1體溫測量發燒型態與體溫過高過低":{"html":"\n<p><b>發燒型態(高頻):</b><b>恆常熱</b>=持續高、24h波動&lt;1°C(大葉性肺炎、傷寒);<b>弛張熱</b>=波動&gt;1~2°C但不回正常;<b>間歇熱</b>=高燒與正常(或以下)交替(敗血症、瘧疾);<b>回歸熱</b>=發燒期與無燒期各數日交替(術後傷口感染)。</p>\n<p><b>發燒三期:</b>發冷(發作)期=寒顫、蒼白冰冷、血管收縮、自覺冷(產熱)→發熱(高峰)期=乾熱潮紅、脈呼吸快、尿少→退熱期=出汗散熱、尿量增。體溫每升1°C代謝率約增<b>13%</b>。</p>\n<p><b>體溫過高三型:</b><b>熱痙攣</b>=大量流汗喪失水與氯化鈉致肌肉痙攣;<b>熱衰竭</b>=脫水、蒼白濕冷、血壓降脈快弱、體溫近正常(處置抬高下肢);<b>中暑</b>=體溫調節中樞失能、皮膚乾熱、體溫&gt;40°C、意識改變(初期血壓升)。體溫過低=低血糖/甲狀腺低下/寒冷,脈呼吸慢、尿少。</p>\n<p><b>影響體溫:</b>升溫=甲狀腺素、運動、排卵後黃體素、焦慮壓力;降溫=動情激素、老人、甲狀腺低下。<b>測量:</b>耳溫成人往上往後、3歲以下往下往後拉;嬰兒肛溫插約0.5吋;基礎體溫排卵後升0.3~0.6°C。</p>\n"},"2脈搏測量類型與脈律異常":{"html":"\n<p><b>脈搏類型:</b><b>洪脈(bounding)</b>=強而有力(高血壓、發燒、甲亢);<b>絲脈(thready)</b>=細弱(休克);<b>弦脈</b>=緊如琴弦;<b>交替脈</b>=強弱交替(左心衰)。正常脈搏強度標記<b>2+</b>(0無/1+弱/2+正常/3+洪)。</p>\n<p><b>脈律異常:</b><b>脈搏短絀(pulse deficit)</b>=心尖脈&gt;橈動脈、兩人同時測,常見心房纖維顫動;<b>二重脈</b>=每一正常脈後跟一不成熟脈;<b>間歇脈</b>=跳幾下停一下無節律;<b>跑脈</b>=細快&gt;150;<b>奇異脈</b>=吸氣脈量減弱(心包填塞);<b>竇性心律不整</b>=吸氣心率快、呼氣慢;<b>柯利干氏脈(水沖脈)</b>=主動脈瓣閉鎖不全。</p>\n<p><b>須測1分鐘心尖脈者:</b>新生兒/嬰兒、脈搏短絀、心律不整、<b>服毛地黃</b>(心尖脈&lt;60停藥通報);心尖脈位於<b>左鎖骨中線第五肋間</b>,聽心音用膜面。觸診用食中無名指(不用拇指)。</p>\n<p><b>測量部位:</b>嬰幼兒測心尖脈;足背動脈(足背)/脛後動脈(內踝後);肱動脈(肘窩內側);膝膕動脈(彎膝較易)。心搏過速&gt;100(甲亢/發燒)、過緩&lt;60(毛地黃/低體溫)。</p>\n"},"3血壓測量原理與影響因素":{"html":"\n<p><b>血壓組成:</b>收縮壓=左心室收縮力;舒張壓=<b>周邊血管阻力</b>;脈搏壓=收縮−舒張(正常30~40,反映心搏出量與動脈順應性);<b>MAP=舒張壓+脈搏壓/3</b>(正常70~105)。</p>\n<p><b>科氏音(Korotkoff)：</b>第一聲清晰=收縮壓;聲音轉低沉(第四期)=兒童第一舒張壓;<b>聲音完全消失(第五期)=成人舒張壓</b>。高血壓易有「聽診間隙」。</p>\n<p><b>測量誤差:</b>假性偏高=壓脈帶太鬆/太窄、手臂低於心臟、放氣太慢;假性偏低=壓脈帶太寬、手臂高於心臟、放氣太快。<b>手臂應與心臟同高</b>;充氣高於收縮壓約20~30 mmHg;放氣每秒2~4 mmHg;重複測間隔1~2分並排空氣囊;心律不整測3次取平均。</p>\n<p><b>禁忌側:</b>乳房切除/腋下淋巴摘除側、動靜脈廔管側、偏癱患側、輸液手臂、石膏側不可測。<b>大腿(膝膕)血壓</b>:俯臥、壓脈帶包大腿、聽膝膕動脈,收縮壓較上肢高10~40 mmHg。影響:升壓=吸菸/疼痛/寒冷/膀胱脹/顱內壓升;降壓=鎮靜劑/出血/急性飲酒。</p>\n"},"4呼吸型態測量與影響因素":{"html":"\n<p><b>異常呼吸型態(高頻):</b><b>陳施氏(Cheyne-Stokes/潮式)</b>=漸深漸淺至暫停、週期反覆(心衰、腦損、瀕死);<b>畢歐氏(Biot)</b>=速度深度均不規則(腦病變);<b>庫斯毛耳(Kussmaul)</b>=深而快(代謝性酸中毒/DKA);喟嘆式=偶發深呼吸。</p>\n<p><b>影響呼吸速率:</b>加快=發燒、大出血缺氧、急性疼痛、焦慮、酸中毒、高海拔、年齡越小;減慢=<b>鴉片類藥物(抑制呼吸中樞)</b>、鹼中毒、顱內壓升高、年長;男性肺容量大、呼吸速率較女性慢。血壓「突升」→呼吸變慢(壓力反射);血壓降→呼吸加快。</p>\n<p><b>測量:</b>應在病人「不知不覺」中測(避免影響自然呼吸),常於測脈搏後手仍在腕部時順勢觀察胸廓;測速率、深度、節律;生命徵象不穩定或不規則者測<b>1分鐘</b>。COPD呈慢而深費力呼氣(噘嘴呼吸),非快而淺。</p>\n"},"5身體評估徵象症狀與疼痛評估":{"html":"\n<p><b>主觀 vs 客觀(症狀 vs 徵象):</b>症狀(symptom)/主觀資料=病人自覺「主訴/感覺」者(頭痛、噁心、呼吸喘);徵象(sign)/客觀資料=可觀察測量者(血壓、體溫、聽診音、檢驗值)。家屬轉述仍屬主觀來源。</p>\n<p><b>觀察法:</b>直接觀察=護理師親自視觸叩聽;<b>間接觀察=不接觸病人</b>(查病歷、檢驗報告、會診、護理紀錄)。</p>\n<p><b>疼痛評估 PQRST:</b><b>P</b>誘發/緩解因素、<b>Q</b>性質(麻刺電→神經痛,選輔佐藥)、<b>R</b>部位/放射、<b>S</b>嚴重度、<b>T</b>時間。神經病變痛依「性質(Q)」選adjuvant(抗癲癇/抗憂鬱藥)。</p>\n<p><b>特殊徵象:</b>低血鈣=Chvostek(叩下頦致顏面抽搐)、Trousseau(壓脈帶致腕足痙攣);Homan=DVT。<b>危急優先</b>:呼吸/循環危及生命者(如SpO2&lt;90%、呼吸窘迫、意識下降GCS降)最優先;依馬斯洛生理&gt;安全。BMI=體重÷身高(m)²(正常18.5~24)。</p>\n"},"6尿液檢體採集與尿液性狀檢驗":{"html":"\n<p><b>正常尿液性狀:</b>每日尿量約1200~1500 mL;<b>pH約4.6~8.0</b>(偏弱酸);<b>比重1.010~1.030</b>;淡黃色、放置有氨味;正常尿<b>不含膽紅素、葡萄糖、蛋白、酮體</b>。尿出現膽紅素=阻塞性/肝細胞性黃疸;尿糖=糖尿病;酮體=飢餓/嘔吐/DKA;圓柱體(管型)=腎臟疾病;膿尿=泌尿道感染。</p>\n<p><b>常規尿液:</b>留中段尿、30分鐘內送檢、無法送則冷藏(4~10°C)2小時內送;清晨第一次尿較濃縮;經期改期或導尿;常規尿檢「不能」作為選抗生素依據(那要尿液培養)。</p>\n<p><b>24小時尿:</b>起始(7AM)第一次尿「棄去」,之後收集每次尿至次日7AM(最後一次要留)、註明總量、冷藏/加防腐劑;<b>遺漏一次須隔天重收</b>;經期不宜收集。</p>\n<p><b>蟯蟲檢查:</b>清晨「排便前」以透明膠帶在肛門口沾蟲卵(蟲卵在肛周皮膚非糞便),30分鐘內送檢。沾染體液的集尿袋屬感染性可燃廢棄物(紅色)。</p>\n"},"7血液檢體採集檢驗與其他檢體":{"html":"\n<p><b>正常血液值:</b>紅血球4.2~6.2×10⁶、白血球4000~10000、血紅素男13~18女12~16 g/dL、血小板15~40萬(×10⁴);<b>血比容=紅血球佔全血%</b>(約Hb的3倍)。白血球&gt;10萬或血小板&gt;40萬皆異常。</p>\n<p><b>血液培養:</b>皮膚以<b>優碘+酒精</b>由內向外消毒待乾;<b>先採血培養再給抗生素</b>;抽血後另換無菌針頭再注入;<b>先注厭氧瓶再注嗜氧瓶</b>;兩套不同部位採;通常3~7天有結果,可指導抗生素選擇。</p>\n<p><b>溶血原因:</b>太細針頭、試管含水、劇烈搖晃、快速衝擊注入;「粗針頭、沿管壁緩緩注入」可避免溶血。<b>禁食6~8小時</b>=血糖、血脂(LDL/三酸甘油酯);<b>CBC不需禁食</b>。</p>\n<p><b>ABG:</b>含heparin特製空針、橈動脈穿刺前做Allen test、排空氣置冰上立即送。<b>痰液</b>:清晨未刷牙未進食第一口痰、清水漱口(勿牙膏)、冷藏。<b>PPD</b>:皮內注射、48~72h判讀硬結≧10 mm陽性。<b>阿米巴糞便</b>:保溫、30分鐘內送(保活滋養體)。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_b3_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
