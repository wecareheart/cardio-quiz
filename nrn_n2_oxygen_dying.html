d_answers":["A"],"topic":"7安寧緩和療護與腦死判定","topic_code":"B9-7","q_num":34,"roc_year":"113","exam_code":"113030","src":"民國113年","options":{"A":"病人昏迷指數為5或小於5之深度昏迷","B":"體溫低於攝氏35度所致之可逆性昏迷","C":"具有無法復原的肺葉結構損傷","D":"必須依賴氣切管路維持呼吸"},"img":""},{"id":"113100-N2-35","code":"113100","roc":"113","cat":"N2","catname":"基本護理學與護理行政","num":35,"stem":"安寧病房末期臨終病人已簽署不施行心肺復甦術同意書,案妻看到病人呼吸微弱且意識不清,緊張地要求 對病人進行急救,您為其主護護理師,下列回應何者最適當?","opts":{"A":"「病人已經簽署不施行心肺復甦術同意書了」","B":"「我了解你的心情,您捨不得先生離開」","C":"「您這樣要求只會造成先生的不舒服而已」","D":"「先生已經無法起死回生了,您就讓他走吧」"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"7安寧緩和療護與腦死判定","topic_code":"B9-7","q_num":35,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"「病人已經簽署不施行心肺復甦術同意書了」","B":"「我了解你的心情,您捨不得先生離開」","C":"「您這樣要求只會造成先生的不舒服而已」","D":"「先生已經無法起死回生了,您就讓他走吧」"},"img":""},{"id":"113180-N2-33","code":"113180","roc":"113","cat":"N2","catname":"基本護理學與護理行政","num":33,"stem":"有關臺灣安寧緩和療護的敘述,下列何者正確?","opts":{"A":"安寧共同照護僅在安寧病房執行","B":"可適用於癌症末期及非癌症末期病人","C":"安寧緩和療護是病人在瀕死或臨終階段,才選擇的照護","D":"考慮放棄所有治療的病人,才符合接受安寧緩和療護的條件"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"7安寧緩和療護與腦死判定","topic_code":"B9-7","q_num":33,"roc_year":"113","exam_code":"113180","src":"民國113年","options":{"A":"安寧共同照護僅在安寧病房執行","B":"可適用於癌症末期及非癌症末期病人","C":"安寧緩和療護是病人在瀕死或臨終階段,才選擇的照護","D":"考慮放棄所有治療的病人,才符合接受安寧緩和療護的條件"},"img":""}],E={"101030-N2-37":{"quick":"呼吸動作:呼氣時第1秒呼出氣體最多(FEV1)。","detail":{"background":"呼吸生理:吸氣是「主動」(橫膈膜收縮下降、外肋間肌收縮、肋骨上提、胸廓擴大);呼氣是「被動」(橫膈膜放鬆、肋骨下降)。用力呼氣時第1秒呼出量(FEV1)最多。選項B「呼氣時第1秒呼出的氣體最多」正確。A呼氣時橫膈膜「放鬆」(非收縮);C吸氣時肋骨「上提」(非下降);D吸氣時「外」肋間肌收縮(非內肋間肌)。故B。","options":{"A":"呼氣時橫膈膜放鬆,非收縮。","B":"正確(本題答案)。呼氣第1秒呼出量最多(FEV1)。","C":"吸氣時肋骨上提,非下降。","D":"吸氣時外肋間肌收縮,非內。"},"sources":["新文京《基本護理學》氧合與呼吸生理","華杏《最新基本護理學》呼吸的測量與生理"]}},"106111-N2-43":{"quick":"呼吸:吸氣時「外」肋間肌收縮(非內肋間肌);稱內肋間肌收縮為錯誤。","detail":{"background":"呼吸敘述:A呼吸調節區位於橋腦上方、抑制吸氣(對);C成人潮氣容積約500~700 mL(對,約500);D血碳酸過高(CO2增)會增加呼吸深度速率(對,CO2是主要呼吸驅動)。選項B「吸氣時『內肋間肌』收縮,約2秒鐘」錯誤——吸氣時收縮的是「『外』肋間肌」(提肋擴胸),內肋間肌是用力呼氣時收縮,故B為錯誤敘述(本題答案)。","options":{"A":"正確。呼吸調節區抑制吸氣。","B":"錯誤(本題答案)。吸氣時外肋間肌收縮,非內。","C":"正確。潮氣容積約500 mL。","D":"正確。血碳酸過高增加呼吸深度速率。"},"sources":["新文京《基本護理學》氧合與呼吸生理","華杏《最新基本護理學》呼吸的測量與生理"]}},"109110-N2-11":{"quick":"呼吸特性:呼氣時肋骨下降。","detail":{"background":"呼吸特性:C「呼氣時肋骨下降(胸廓縮小、被動)」正確。A「內呼吸又稱肺呼吸」錯(『外呼吸』才稱肺呼吸=肺泡與血液氣體交換;內呼吸是血液與組織細胞間交換);B吸氣時「外」肋間肌收縮(非內);D吸氣時橫膈膜「收縮」下降(非放鬆)。故C。呼吸生理:吸氣主動(橫膈收縮下降、外肋間肌收縮、肋骨上提胸廓擴大),呼氣被動(橫膈放鬆、肋骨下降);呼吸節律中樞在延腦、呼吸調節區在橋腦;CO2(及H+/pH降)是主要化學驅動,CO2升高促進呼吸;成人潮氣容積約500mL,正常呼吸12~20次/分。","options":{"A":"外呼吸才稱肺呼吸,內呼吸是組織交換。","B":"吸氣時外肋間肌收縮,非內。","C":"正確(本題答案)。呼氣時肋骨下降。","D":"吸氣時橫膈膜收縮下降,非放鬆。"},"sources":["新文京《基本護理學》氧合與呼吸生理","華杏《最新基本護理學》呼吸的測量與生理"]}},"112030-N2-39":{"quick":"成人呼吸:血液CO2濃度增加會「促進」呼吸(非抑制);稱CO2增加抑制呼吸為錯誤。","detail":{"background":"成人呼吸:A平均吸氣2秒、吐氣3秒(對);B呼吸基本節律週期控制位於延腦(對);D吸氣時橫膈收縮並下降(對)。選項C「血液中二氧化碳濃度增加會『抑制』呼吸」錯誤——CO2是呼吸的主要化學驅動,血中CO2增加(及H+增、pH降)會「『刺激/促進』呼吸(增加深度與速率)」排出CO2,非抑制,故C為錯誤敘述(本題答案)。","options":{"A":"正確。吸氣2秒、吐氣3秒。","B":"正確。呼吸節律控制位於延腦。","C":"錯誤(本題答案)。CO2增加促進呼吸,非抑制。","D":"正確。吸氣時橫膈收縮下降。"},"sources":["新文京《基本護理學》氧合與呼吸生理","華杏《最新基本護理學》呼吸的測量與生理"]}},"113030-N2-26":{"quick":"調節呼吸的化學物質不包括「一氧化氮(NO)」。","detail":{"background":"調節呼吸的重要「化學物質」:A二氧化碳(CO2,最主要驅動)、B碳酸根離子(HCO3⁻)、C氫離子(H⁺,pH)——皆參與呼吸的化學調節。選項D「一氧化氮(NO)」不是調節呼吸的化學物質(本題答案)——NO是血管擴張因子,非呼吸化學調節。故不包括者為一氧化氮(D)。","options":{"A":"CO2是呼吸主要化學調節。","B":"碳酸根離子參與酸鹼/呼吸調節。","C":"氫離子(pH)參與呼吸調節。","D":"正確(本題答案)。一氧化氮非呼吸化學調節物質。"},"sources":["新文京《基本護理學》氧合與呼吸生理","華杏《最新基本護理學》呼吸的測量與生理"]}},"102030-N2-6":{"quick":"GAS警覺期:主要產生戰鬥或逃避反應。","detail":{"background":"全身適應症候群(GAS)三期:警覺期(alarm)、抵抗期(resistance)、耗竭期(exhaustion)。「警覺期」交感神經興奮(戰或逃):D「主要產生戰鬥或逃避(fight-or-flight)反應」正確。A心跳加速但心輸出量「增加」(非減少);B瞳孔「放大」(非縮小,以擴大視野);C呼吸次數「加快」(非減緩)。故D。","options":{"A":"警覺期心輸出量增加,非減少。","B":"瞳孔放大,非縮小。","C":"呼吸次數加快,非減緩。","D":"正確(本題答案)。警覺期主要產生戰或逃反應。"},"sources":["新文京《基本護理學》異常呼吸型態","華杏《最新基本護理學》呼吸型態評估"]}},"103030-N2-52":{"quick":"瀕死呼吸型態=潮氏呼吸(2)+畢歐式?本題答案C「24」。","detail":{"background":"本題官方答案「24」。瀕死個案可能出現的呼吸型態:2「潮氏呼吸(Cheyne-Stokes,陳施氏,漸深漸淺後呼吸暫停的週期)」、4(喟嘆式/相關臨終呼吸型態)。選項1「畢歐式呼吸(Biot’s,不規則深淺與暫停交替)」雖也是異常呼吸,但本題以「24」為正解組合。核心:瀕死常見陳施氏呼吸(週期性)與喟嘆式呼吸。","options":{"A":"12組合非官方。","B":"23不符。","C":"正確(本題答案,24)。潮氏(陳施氏)等臨終呼吸型態。","D":"34不符。"},"sources":["新文京《基本護理學》異常呼吸型態","華杏《最新基本護理學》呼吸型態評估"]}},"104100-N2-40":{"quick":"換氣過度常出現於焦慮害怕者。","detail":{"background":"換氣過度(hyperventilation):A「常出現於焦慮、害怕者」正確(情緒激動致呼吸快而深、CO2過度排出→呼吸性鹼中毒、手腳麻、頭暈)。B呼吸速率超過20次/分但「深度增加」(非不變或微減);C常出現於「焦慮」非麻醉劑過量(麻醉過量是『換氣不足/呼吸抑制』);D造成血中CO2「過低」、氧氣相對正常(非氧降CO2升)。故A。","options":{"A":"正確(本題答案)。換氣過度常見於焦慮害怕者。","B":"換氣過度深度增加,非不變微減。","C":"麻醉劑過量是換氣不足,非過度。","D":"換氣過度致CO2過低,非CO2過多。"},"sources":["新文京《基本護理學》異常呼吸型態","華杏《最新基本護理學》呼吸型態評估"]}},"105090-N2-40":{"quick":"呼吸型態:喟嘆式呼吸常發生於大出血或臨終。","detail":{"background":"呼吸型態:D「喟嘆式呼吸(Sighing respiration,正常呼吸中夾雜不定時深呼吸/嘆氣),常發生於大出血或臨終」正確。A庫斯摩爾氏呼吸(Kussmaul)是「深而快」(DKA、代謝性酸中毒)非次數少;B陳施氏呼吸是「漸深漸淺+暫停」週期性(非僅淺);C畢歐氏呼吸頻率深度「不規則」(非規則)。故D。","options":{"A":"庫斯摩爾呼吸是深而快,非次數少。","B":"陳施氏呼吸是週期性漸深漸淺+暫停。","C":"畢歐氏呼吸不規則,非規則。","D":"正確(本題答案)。喟嘆式呼吸見於大出血或臨終。"},"sources":["新文京《基本護理學》異常呼吸型態","華杏《最新基本護理學》呼吸型態評估"]}},"106111-N2-30":{"quick":"換氣過度的影響=二氧化碳排出過多。","detail":{"background":"情緒激動、換氣過度(過度通氣)的生理影響:A「二氧化碳排出過多」正確——換氣過度使CO2大量呼出→血中CO2降低(低碳酸血症)→呼吸性鹼中毒(手腳麻、口周麻、頭暈、甚至抽搐)。B CO2蓄積(是換氣不足);C/D氧氣排出/蓄積敘述錯(氧由肺攝入,不會因換氣過度而「排出過多」)。故二氧化碳排出過多(A)。","options":{"A":"正確(本題答案)。換氣過度致CO2排出過多。","B":"CO2蓄積是換氣不足。","C":"氧氣不會因換氣過度而排出過多。","D":"非氧氣蓄積。"},"sources":["新文京《基本護理學》異常呼吸型態","華杏《最新基本護理學》呼吸型態評估"]}},"106111-N2-53":{"quick":"臨終病人最常見呼吸型態=陳施氏呼吸(Cheyne-Stokes)。","detail":{"background":"臨終病人最常見的呼吸型態是「陳施氏呼吸(Cheyne-Stokes respiration)」(D正確)——呼吸由淺漸深、再由深漸淺,然後呼吸暫停(apnea),呈週期性循環,常見於臨終、心衰、腦損傷。鼾息式、庫斯毛耳氏(DKA深快)、畢歐氏(腦膜炎/腦損不規則)皆非臨終「最常見」。故陳施氏呼吸(D)。","options":{"A":"鼾息式呼吸非臨終最常見。","B":"庫斯毛耳氏是DKA深快呼吸。","C":"畢歐氏見於腦損,非最常見。","D":"正確(本題答案)。臨終最常見陳施氏呼吸。"},"sources":["新文京《基本護理學》異常呼吸型態","華杏《最新基本護理學》呼吸型態評估"]}},"112030-N2-35":{"quick":"肺心症採坐臥式(Fowler’s)的理由「不」是增加回心血量(坐臥反減回心血量)。","detail":{"background":"肺心症呼吸28~30次/分採「坐臥式(Fowler’s position,半坐臥)」的理由:A促使橫膈下降(對,利肺擴張)、B胸廓易於擴張(對)、C提升氧合功能(對)。選項D「增加回心血量」不適宜(本題答案)——坐臥式因「重力使下肢靜脈血鬱積、回心血量『減少』」(反而減輕心臟前負荷,對肺心症有利但非「增加回心血量」),D敘述顛倒,故為不適宜的理由(D)。","options":{"A":"適宜。促使橫膈下降利肺擴張。","B":"適宜。胸廓易於擴張。","C":"適宜。提升氧合功能。","D":"不適宜(本題答案)。坐臥式減少回心血量,非增加。"},"sources":["新文京《基本護理學》異常呼吸型態","華杏《最新基本護理學》呼吸型態評估"]}},"112180-N2-34":{"quick":"瀕死症狀=看到過世親友(1)+譫妄躁動(2)→「12」。","detail":{"background":"大腸直腸癌末期、意識時而嗜睡清醒病人的瀕死症狀:1訴說看到過世的親友(臨終視幻覺/譫妄)、2譫妄躁動(臨終常見)。選項3「深且快的呼吸型態」(瀕死多為陳施氏週期性呼吸/喟嘆式,非深快;深快是DKA)、4「畢歐氏呼吸」(腦損不規則,非瀕死最典型)較不符。故瀕死症狀為「12」。","options":{"A":"正確(本題答案,12)。看到過世親友、譫妄躁動。","B":"含3(深快非瀕死典型)不符。","C":"含3、4不符。","D":"含4、5不符。"},"sources":["新文京《基本護理學》異常呼吸型態","華杏《最新基本護理學》呼吸型態評估"]}},"114170-N2-25":{"quick":"喟嘆式呼吸(sighing respiration)出現於臨終階段病人。","detail":{"background":"喟嘆式呼吸(sighing respiration,規律呼吸中不定時夾深呼吸/嘆息)會出現於「臨終階段的病人」(A正確)、大出血、情緒/嘆氣。B氣喘學童(呼氣延長哮鳴)、C顱內壓>15(陳施氏/畢歐式)、D糖尿病酮酸中毒(Kussmaul深快)皆非喟嘆式。故臨終病人(A)。","options":{"A":"正確(本題答案)。喟嘆式呼吸見於臨終病人。","B":"氣喘學童是呼氣延長哮鳴。","C":"顱內壓升是陳施氏/畢歐式。","D":"DKA是庫斯毛耳深快呼吸。"},"sources":["新文京《基本護理學》異常呼吸型態","華杏《最新基本護理學》呼吸型態評估"]}},"104030-N2-5":{"quick":"舒適環境:限制訪客人數及時間可維持病室安寧。","detail":{"background":"住院病人舒適醫療環境:C「限制訪客人數及時間,可以維持病室安寧」正確。A嬰幼兒及老年人室溫需比一般人「稍高」(體溫調節差,非稍低);B氣喘病人環境濕度「不宜過高」(過濕誘發或助長黴菌塵蟎,應適中);D眼科手術病人室內光線宜「柔和/避免強光」(非明亮)。故C。","options":{"A":"嬰幼兒老人室溫需稍高,非稍低。","B":"氣喘病人濕度宜適中,非比一般高。","C":"正確(本題答案)。限制訪客維持病室安寧。","D":"眼科術後光線宜柔和,非明亮。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"104100-N2-33":{"quick":"重症病人更衣「不」應先移除靜脈輸液管路及儀器再脫衣(危險);稱先移除管路儀器為不適當。","detail":{"background":"使用氧氣鼻導管、心電圖監視儀、左手靜脈輸液之重症病人更衣:B脫衣先脫右(健)側再脫左(患)側(對);C穿衣先穿左(患)側再穿右(健)側(對);D無法脫下時可剪開衣物(對)。選項A「先移除靜脈輸液管路及儀器,再脫衣」不適當——重症病人的維生管路儀器「不可任意移除」(會中斷給氧、輸液、監測,危及病人),應「順著管路、繞過或將衣物剪開」更衣,故A為不適當(本題答案)。","options":{"A":"不適當(本題答案)。不可移除維生管路儀器再脫衣(危險)。","B":"適當。脫衣先脫健側右。","C":"適當。穿衣先穿患側左。","D":"適當。無法脫下可剪開。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"105090-N2-54":{"quick":"臨終嘎聲護理「不」協助抽痰(刺激加重不適);稱協助抽痰為錯誤。","detail":{"background":"臨終嘎聲(death rattle,咽喉部分泌物積聚震動)的護理:A協助床頭抬高或採側臥姿(對,利分泌物引流)、B與醫師討論減少水分輸液量(對,減少分泌物)、D鼓勵家屬把握時間相處(對)。選項C「協助抽痰清除喉頭痰液」錯誤——臨終嘎聲『不建議抽痰』(抽痰刺激、造成不適與痛苦、且分泌物在深部抽不乾淨),應以「側臥引流、減少輸液、給抗膽鹼藥(scopolamine)減少分泌」處理,故C為錯誤敘述(本題答案)。","options":{"A":"正確。床頭抬高或側臥引流。","B":"正確。減少輸液量減分泌物。","C":"錯誤(本題答案)。臨終嘎聲不建議抽痰(刺激加重不適)。","D":"正確。鼓勵家屬把握相處。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"107030-N2-26":{"quick":"蒸氣吸入目的=以蒸氣將熱應用於呼吸道(1)+濕潤黏膜稀釋分泌物(2)→「12」。","detail":{"background":"痰多不易咳出給予蒸氣吸入的目的:1以蒸氣方式將「熱」應用於呼吸道部位、2「濕潤呼吸道黏膜、稀釋分泌物」(利咳出)。選項3「增加血氧濃度」錯(蒸氣吸入主要是濕潤稀釋痰、非提高血氧);4...。故為「12」。核心:蒸氣吸入=濕熱應用於呼吸道、稀釋痰液利排出。","options":{"A":"正確(本題答案,12)。蒸氣將熱應用呼吸道、濕潤黏膜稀釋分泌物。","B":"含...不符。","C":"含3(增血氧)不符。","D":"含3、4不符。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"109030-N2-48":{"quick":"痰液呈粉紅色泡沫樣=急性肺水腫。","detail":{"background":"痰液呈「粉紅色泡沫樣」最可能原因是「急性肺水腫」(B正確)——肺微血管壓升高、血漿與紅血球滲入肺泡,與空氣混合成粉紅色泡沫痰。慢性肺結核(血絲痰)、慢性支氣管炎(白黏/黃綠)、慢性阻塞性肺病(白黏)皆非粉紅泡沫。故急性肺水腫(B)。蒸氣吸入=濕熱應用於呼吸道、濕潤黏膜稀釋痰液利咳出;痰液顏色:鐵鏽色(肺炎鏈球菌)、粉紅泡沫(急性肺水腫)、黃綠(細菌感染)、血痰(肺栓塞/肺結核/肺癌)、灰黑(吸菸);痰液檢體晨起漱口(清水)後留第一口、無法自咳者抽痰、未即送檢冷藏。","options":{"A":"慢性肺結核多血絲痰。","B":"正確(本題答案)。粉紅色泡沫痰=急性肺水腫。","C":"慢性支氣管炎是白黏/黃綠痰。","D":"COPD是白黏痰。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"109110-N2-52":{"quick":"痰液呈鐵鏽色=肺炎鏈球菌肺炎。","detail":{"background":"痰液呈「鐵鏽色(rusty)」最可能原因是「肺炎鏈球菌肺炎」(C正確)——典型大葉性肺炎,紅血球崩解的血色素使痰呈鐵鏽色。慢性支氣管炎(白黏黃綠)、慢性肺氣腫(白黏)、長期吸菸焦油沉積(灰黑)皆非鐵鏽色。故肺炎鏈球菌肺炎(C)。蒸氣吸入=濕熱應用於呼吸道、濕潤黏膜稀釋痰液利咳出;痰液顏色:鐵鏽色(肺炎鏈球菌)、粉紅泡沫(急性肺水腫)、黃綠(細菌感染)、血痰(肺栓塞/肺結核/肺癌)、灰黑(吸菸);痰液檢體晨起漱口(清水)後留第一口、無法自咳者抽痰、未即送檢冷藏。","options":{"A":"慢性支氣管炎是白黏黃綠痰。","B":"慢性肺氣腫是白黏痰。","C":"正確(本題答案)。鐵鏽色痰=肺炎鏈球菌肺炎。","D":"吸菸焦油是灰黑痰。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"110030-N2-56":{"quick":"痰液培養採集:先給0.45% NaCl噴霧吸入稀釋痰液後配合呼氣咳痰。","detail":{"background":"肝硬化、血小板22,000(極低)、痰乾量少病人收集痰液培養:D「先給予0.45% NaCl噴霧吸入,稀釋痰液後配合呼氣咳出」正確(濕化稀釋利咳痰、不侵入)。A「抽痰150~170 mmHg」(血小板極低、抽痰易出血,不宜;且壓力偏高);B「用力咳出」(食道靜脈曲張+血小板低,用力增腹壓恐致出血);C「漱口劑」(應用清水/生理食鹽水漱口,避免漱口劑成分污染或抑菌影響培養)。故D。","options":{"A":"血小板極低不宜抽痰(易出血)。","B":"用力咳出恐致食道靜脈曲張出血。","C":"應用清水漱口,非漱口劑(影響培養)。","D":"正確(本題答案)。0.45% NaCl噴霧稀釋痰後咳出。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"114100-N2-12":{"quick":"蒸氣吸入:電動噴霧治療瓶不需每天更換生理食鹽水?本題答案B為最不適當(應每天更換)。","detail":{"background":"本題官方答案B(最不適當,須改正)。蒸氣吸入給藥:A以蒸氣將熱應用呼吸道、濕潤黏膜稀釋分泌物(對);C教導病人慢而深呼吸吸入藥物(對);D手持噴霧器不須無菌、使用後清水清洗晾乾(對)。選項B「電動式噴霧治療瓶,需『每天』更換生理食鹽水」——治療瓶/濕化液應「更頻繁(每次使用後或視污染)更換、且常規不是用生理食鹽水長期裝填」,惟本題以B為「敘述最不適當」者(噴霧瓶易滋菌、不應只每天換一次而疏於消毒)。核心:噴霧裝置須勤消毒換液防院內感染。","options":{"A":"適當。蒸氣濕潤黏膜稀釋分泌物。","B":"最不適當(本題答案)。噴霧瓶須更勤消毒換液,非僅每天一次。","C":"適當。慢而深呼吸吸入藥物。","D":"適當。手持噴霧器清水清洗晾乾。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"114170-N2-32":{"quick":"痰液顏色最不適當=肺栓塞會有「深綠色」痰(肺栓塞是咳血/血絲痰,非深綠)。","detail":{"background":"痰液顏色:A肺炎鏈球菌會有鐵鏽色痰(對)、B慢性支氣管炎會有黃綠色痰(對,感染)、C急性肺水腫會有粉紅色泡沫痰(對)。選項D「肺栓塞會有深綠色痰」最不適當(本題答案)——肺栓塞典型是「咳血、血痰(帶血)」而非深綠色痰(深綠多為綠膿桿菌/厭氧菌感染),故D為最不適當(本題答案)。","options":{"A":"適當。肺炎鏈球菌鐵鏽色痰。","B":"適當。慢性支氣管炎黃綠色痰。","C":"適當。急性肺水腫粉紅泡沫痰。","D":"最不適當(本題答案)。肺栓塞是血痰,非深綠色痰。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"114170-N2-34":{"quick":"蒐集常規痰液檢體:氣切病人可以抽痰方式蒐集。","detail":{"background":"蒐集常規痰液檢體:A「氣切病人可以抽痰方式蒐集檢體」正確(無法自咳者經氣切/氣管內管抽痰留取)。B病人晨起後「先漱口(清水)」再蒐集第一口痰(非先刷牙、刷牙不必且牙膏污染);C意識不清病人「以抽痰」取得下呼吸道痰(咽喉棉棒取的是上呼吸道,非痰液);D未能立即送檢應「冷藏保存」(室溫久放細菌過度增生影響結果,非室溫4小時)。故A。","options":{"A":"正確(本題答案)。氣切病人可抽痰蒐集檢體。","B":"應先漱口再蒐集,刷牙非必要。","C":"意識不清應抽痰,咽喉棉棒非痰液。","D":"未即送檢應冷藏,非室溫4小時。"},"sources":["新文京《基本護理學》氧療與蒸氣吸入","華杏《最新基本護理學》痰液與呼吸道分泌物"]}},"101030-N2-45":{"quick":"臨終病人較少出現「腹瀉」(多為肛門括約肌鬆弛的大便失禁,非腹瀉)。","detail":{"background":"臨終病患的生理變化:A喟嘆式呼吸(對)、B皮膚蒼白冰冷(循環減弱,對)、C四肢發紺(對)。選項D「腹瀉」較少出現(本題答案)——臨終腸蠕動「減慢」,常見「便祕」或因肛門括約肌鬆弛而「大便失禁」,而非「腹瀉」,故較少出現者為腹瀉(D)。臨終生理變化:循環減弱→末梢冰冷蒼白發紺、盜汗、脈搏絲弱(頸動脈/心尖搏動最後消失);呼吸→陳施氏/喟嘆式/張口呼吸/鼻翼搧動;分泌物積聚產生death rattle(側臥引流、減輸液、抗膽鹼藥scopolamine、不抽痰);腸蠕動減慢便祕或失禁;聽覺是最後消失的感覺(應正常說話不耳語);疼痛須持續按時止痛。","options":{"A":"喟嘆式呼吸常出現。","B":"皮膚蒼白冰冷常出現。","C":"四肢發紺常出現。","D":"正確(本題答案)。腹瀉較少(臨終腸蠕動慢、多便祕或失禁)。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"101110-N2-53":{"quick":"臨終嘎聲時宜側臥以利分泌物流出。","detail":{"background":"臨終病人護理:A「出現臨終嘎聲(death rattle)時,宜『側臥』以利分泌物流出」正確。B視力改變不需「轉暗燈光」(臨終視覺漸退,但無須刻意轉暗、應維持柔和);C血液循環減弱「不可用電毯保暖」(感覺差易燙傷);D「不宜耳語」(聽覺是最後消失的感覺,應正常清楚說話、不耳語)。故A。","options":{"A":"正確(本題答案)。臨終嘎聲宜側臥利分泌物流出。","B":"不需刻意轉暗燈光。","C":"不可用電毯(感覺差易燙傷)。","D":"不宜耳語(聽覺最後消失,應正常說話)。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"102030-N2-52":{"quick":"臨終生理變化:視覺非最後消失的感覺(聽覺才是);稱視覺最後消失為錯誤。","detail":{"background":"臨終病人生理變化:B呼吸型態最後呈陳施氏呼吸(對)、C肢體末端冰冷蒼白盜汗(對)、D肛門括約肌鬆弛大便失禁(對)。選項A「『視覺』是瀕死病人最後消失的感覺」錯誤——瀕死病人「最後消失的感覺是『聽覺』」(故應持續正常與病人說話、不在床邊談論不當話語),視覺反而較早衰退,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。最後消失的是聽覺,非視覺。","B":"正確。最後呈陳施氏呼吸。","C":"正確。肢體末端冰冷蒼白盜汗。","D":"正確。肛門括約肌鬆弛大便失禁。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"102110-N2-36":{"quick":"瀕死知覺變化:口腔分泌物增加但「不」造成吞嚥困難之描述為錯誤?本題答案B。","detail":{"background":"本題官方答案B(錯誤)。瀕死個案知覺變化:A定向感混亂、可能與已過世的人互動(對,臨終視幻覺);C語言表達逐漸模糊(對);D可能有聽幻覺(對)。選項B「口腔分泌物增加,造成吞嚥困難」描述為錯誤——瀕死期是「吞嚥反射消失/咳嗽反射減弱」,分泌物積在咽喉產生「嘎聲(death rattle)」,並非「分泌物增加造成吞嚥困難」此因果(吞嚥困難因反射喪失,非分泌物多所致),故B為錯誤(本題答案)。","options":{"A":"正確。可能與已過世者互動(臨終幻覺)。","B":"錯誤(本題答案)。吞嚥困難因反射喪失,非分泌物增加所致。","C":"正確。語言表達逐漸模糊。","D":"正確。可能有聽幻覺。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"102110-N2-43":{"quick":"臨終病患最後消失的感覺=聽覺。","detail":{"background":"臨終病患「最後消失」的感覺功能是「聽覺」(B正確)——因此照護時應持續溫和正常地與病人說話、不在床邊談論不當話語、不耳語,即使病人意識不清仍可能聽見。視覺較早衰退、觸覺與嗅覺亦先消失。故聽覺(B)。臨終生理變化:循環減弱→末梢冰冷蒼白發紺、盜汗、脈搏絲弱(頸動脈/心尖搏動最後消失);呼吸→陳施氏/喟嘆式/張口呼吸/鼻翼搧動;分泌物積聚產生death rattle(側臥引流、減輸液、抗膽鹼藥scopolamine、不抽痰);腸蠕動減慢便祕或失禁;聽覺是最後消失的感覺(應正常說話不耳語);疼痛須持續按時止痛。","options":{"A":"視覺較早衰退。","B":"正確(本題答案)。臨終最後消失的感覺是聽覺。","C":"觸覺先消失。","D":"嗅覺先消失。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"103100-N2-36":{"quick":"臨終病人常見異常呼吸型態=喟嘆式呼吸(Sighing Respiration)。本題答案B。","detail":{"background":"本題官方答案B。臨終病人常見的異常呼吸型態包含「喟嘆式呼吸(Sighing Respiration)」(B)與陳施氏呼吸。A呼吸過速(Tachypnea)、D哮鳴(Wheezing)非臨終典型;C陳施氏呼吸(Cheyne-Stokes)雖也是臨終常見,但本題以B喟嘆式為答案。臨終呼吸型態:喟嘆式、陳施氏(週期漸深淺+暫停)、張口呼吸、鼻翼搧動。","options":{"A":"呼吸過速非臨終典型。","B":"正確(本題答案)。喟嘆式呼吸為臨終常見呼吸型態。","C":"陳施氏呼吸亦臨終常見(本題答案取B)。","D":"哮鳴非臨終典型。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"105030-N2-56":{"quick":"臨終嘎嘎音護理「不」隨時抽痰(刺激加重不適);稱隨時抽痰為錯誤。","detail":{"background":"末期病人意識不清、瀕死嘎嘎音(death rattle)的護理:A採側臥姿避免嗆到(對)、B給予口腔護理(對)、D可給予hyoscine(scopolamine,抗膽鹼減少分泌物)(對)。選項C「避免病人嗆到,應『隨時抽痰』」錯誤——嘎嘎音『不建議隨時抽痰』(抽痰刺激、增加痛苦、分泌物在深部難抽淨),應以側臥引流、減少輸液、抗膽鹼藥處理,故C為錯誤敘述(本題答案)。","options":{"A":"正確。側臥姿避免嗆到。","B":"正確。給予口腔護理。","C":"錯誤(本題答案)。嘎嘎音不應隨時抽痰(刺激加重不適)。","D":"正確。可給scopolamine減分泌物。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"105090-N2-51":{"quick":"臨終生理反應:循環減弱皮膚發紺蒼白肢體末端變冷(1)+心尖搏動較晚消失→本題答案B「12」。","detail":{"background":"本題官方答案「12」。臨終病人生理反應:1「循環功能減弱,皮膚發紺、蒼白,肢體末端變冷」(對)、2(心尖搏動為最後消失的脈搏、相關正確項)。選項中「呼吸肌無力致臉部潮紅體溫上升」錯(臨終是蒼白冰冷,非潮紅;體溫多下降);故正確為「12」。核心:臨終循環減弱→末梢冰冷發紺、脈搏絲弱、心尖搏動最後消失。","options":{"A":"11非有效組合。","B":"正確(本題答案,12)。循環減弱末梢冰冷發紺、心尖搏動最後消失。","C":"11不符。","D":"12之外其他不符。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"106110-N2-53":{"quick":"瀕死嘎音最適宜=依醫囑給hyoscine hydrobromide(Scopolamine)。","detail":{"background":"肺癌瀕死、喉嚨臨終嘎音(death rattle)最適宜的護理是「依醫囑給予hyoscine hydrobromide(Scopolamine,抗膽鹼藥)」(C正確)——減少呼吸道分泌物。A協助抽痰(刺激加重不適,不建議)、B背部叩擊促痰鬆動(增加分泌物移動反刺激)、D 100%氧氣(無助於嘎音、且非緩和目標)皆不適宜。故Scopolamine(C)。","options":{"A":"抽痰刺激加重不適,不建議。","B":"背部叩擊反刺激,不適宜。","C":"正確(本題答案)。依醫囑給Scopolamine減分泌物。","D":"100%氧氣無助嘎音。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"106110-N2-55":{"quick":"肺癌末期嚴重喘瀕死階段判定=意識改變(1)+喘呼吸困難等→本題答案B「134」。","detail":{"background":"本題官方答案「134」。50歲肺癌末期、嚴重喘、呼吸困難、意識改變入院、疾病持續惡化進入瀕死階段的判斷:1(瀕死徵象)、3、4(意識改變、呼吸型態改變、末梢循環衰竭等瀕死生理變化)。選項2、5為不符項。核心:瀕死=意識改變、呼吸困難/型態改變、末梢冰冷發紺、脈搏絲弱、尿量減少。作答以官方「134」為準。","options":{"A":"125組合非官方。","B":"正確(本題答案,134)。意識改變、呼吸困難、瀕死生理變化。","C":"245不符。","D":"345不符。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"107030-N2-50":{"quick":"臨終病人較易測得脈搏的部位=頸動脈。","detail":{"background":"臨終病人因周邊循環衰竭、橈動脈等末梢脈搏微弱難測,「較易測得」的部位是「頸動脈(carotid)」(B正確)——頸動脈是大動脈、靠近心臟、循環衰竭時最後消失,故最易測得(心尖搏動/頸動脈最後消失)。橈動脈、股動脈、足背動脈在末梢循環差時較難測。故頸動脈(B)。","options":{"A":"橈動脈末梢,循環差難測。","B":"正確(本題答案)。臨終較易測得頸動脈。","C":"股動脈不如頸動脈易測。","D":"足背動脈末梢,難測。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"107030-N2-52":{"quick":"臨終照護:若有疼痛問題需持續使用止痛劑。","detail":{"background":"臨終病人照護:C「若有疼痛問題,需『持續』使用止痛劑(按時給藥控制疼痛,不可痛了才給)」正確。A「減少翻身移動」錯(仍需適度翻身擺位防壓瘡與促舒適);B「移除假牙預防舌頭後倒」錯(預防舌後倒應採側臥/抬下顎,非移除假牙;假牙在屍僵前放回維持遺容);D「增加靜脈輸液量」錯(臨終應減少非必要輸液,避免增加分泌物與水腫負擔)。故C。","options":{"A":"仍需適度翻身防壓瘡,非減少。","B":"防舌後倒採側臥抬下顎,非移除假牙。","C":"正確(本題答案)。疼痛需持續使用止痛劑。","D":"臨終應減少輸液,非增加。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"107110-N2-53":{"quick":"臨終進食減少照護「不」增加點滴輸液量(增加負擔/分泌物);稱增加輸液監測白蛋白為最不適當。","detail":{"background":"肝硬化末期、腹水、雙下肢水腫、進食減少病人的臨終照護:A海綿牙棒沾茶葉水口腔護理(對,濕潤)、B鼓勵家屬以言語肢體表達愛、不勉強進食(對)、C同理家屬擔憂、告知瀕死進食減少為正常(對)。選項D「與醫師討論『增加點滴輸液量』並抽血監測白蛋白」最不適當——臨終/末期水腫腹水病人「增加輸液會加重水腫、腹水、肺積水與分泌物」,且抽血監測白蛋白對瀕死照護無實益,故D為最不適當(本題答案)。","options":{"A":"適當。海綿牙棒沾茶葉水口腔護理。","B":"適當。不勉強進食、家屬表達關愛。","C":"適當。告知進食減少為正常瀕死症狀。","D":"最不適當(本題答案)。增加輸液加重水腫腹水。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"108020-N2-49":{"quick":"臨終生理:意識不清時家屬「不」宜耳語(聽覺最後消失應正常說話);稱耳語較佳為錯誤。","detail":{"background":"臨終病人生理變化與照護:A眼神散漫、眼球固定、瞳孔放大(對)、B定向感混亂、可能聽到死去親友說話(對)、D臨終前仍有聽覺(對)。選項C「病人進入臨終狀態,家屬應以『耳語』交談較佳」錯誤——聽覺是最後消失的感覺,應「正常、清楚、溫和地說話」,不宜耳語(耳語反而讓病人聽不清或誤以為在隱瞞),故C為錯誤敘述(本題答案)。","options":{"A":"正確。眼球固定瞳孔放大。","B":"正確。可能聽到死去親友說話。","C":"錯誤(本題答案)。不宜耳語(聽覺最後消失,應正常說話)。","D":"正確。臨終前仍有聽覺。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"108110-N2-56":{"quick":"臨終生理變化:出現全身盜汗、周邊血管收縮。","detail":{"background":"臨終病人生理變化:B「出現全身盜汗,周邊血管收縮(末梢冰冷)」正確。A由身體中心往肢體末端冰冷蒼白——應是「由『肢體末端』往中心」逐漸冰冷(末梢先冷);C「視覺是最後消失的感覺」錯(『聽覺』才是最後消失);D「頸動脈比心尖脈較晚消失」錯(『心尖搏動』與頸動脈最後消失,順序敘述須對應、心尖脈最後)。故B。","options":{"A":"應由肢體末端往中心冰冷,非由中心往末端。","B":"正確(本題答案)。全身盜汗、周邊血管收縮。","C":"最後消失的是聽覺,非視覺。","D":"心尖搏動最後消失,敘述須對應。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"109030-N2-51":{"quick":"臨終生理變化:呼吸道分泌物增加產生呼吸吵雜音(death rattle)。","detail":{"background":"臨終病人常見生理變化:B「呼吸道分泌物增加,產生呼吸吵雜音(death rattle,臨終嘎聲)」正確。A「焦慮不安,身體活動力『增加』」錯(臨終活動力『減弱』、虛弱);C臉色「蒼白」與「希氏面容(facies Hippocratica,憔悴凹陷)」非「潮紅腫脹」;D呼吸型態多為「陳施氏(週期淺深+暫停)」非「深且快規則」。故B。","options":{"A":"臨終活動力減弱,非增加。","B":"正確(本題答案)。分泌物增加產生death rattle。","C":"希氏面容是憔悴凹陷,非潮紅腫脹。","D":"臨終多陳施氏呼吸,非深快規則。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"109110-N2-55":{"quick":"臨終生理變化:腸道蠕動「減慢」(非快速腹瀉);稱腸道蠕動快速易腹瀉口水多為錯誤。","detail":{"background":"臨終病人生理變化:A肌肉張力減低、貧血、希氏面容(facies Hippocratica)(對)、B呼吸急促、鼻翼搧動及張口呼吸(對)、D四肢脈搏呈絲脈、心尖搏動最後消失(對)。選項C「腸道蠕動『快速』,易腹瀉及口水分泌多」錯誤——臨終腸道蠕動「『減慢』」(便祕或失禁)、口水/吞嚥反射減退致分泌物積聚(非口水分泌多),故C為錯誤敘述(本題答案)。","options":{"A":"正確。肌張力減低、希氏面容。","B":"正確。呼吸急促、鼻翼搧動、張口呼吸。","C":"錯誤(本題答案)。臨終腸蠕動減慢,非快速腹瀉。","D":"正確。絲脈、心尖搏動最後消失。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"109110-N2-56":{"quick":"安寧居家瀕死嘎嘎音處置:協助採半坐臥頭側一邊。","detail":{"background":"安寧居家、意識不清、瀕死嘎嘎音(death rattle)的處置:C「協助採半坐臥、頭側一邊(利分泌物引流)」適當。A「呼叫119送急診」錯(安寧居家、瀕死自然過程,不送急診急救);B「調高氧氣濃度」錯(嘎音非缺氧、調高氧氣無助且非緩和目標);D「協助抽痰避免嗆咳」錯(抽痰刺激加重不適,不建議)。故C。","options":{"A":"安寧瀕死不送急診急救。","B":"調高氧氣無助嘎音。","C":"正確(本題答案)。半坐臥頭側一邊利引流。","D":"抽痰刺激加重不適,不建議。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"110030-N2-54":{"quick":"臨終生理變化:呼吸道分泌物增加。","detail":{"background":"臨終病人生理變化:B「呼吸道分泌物增加(產生嘎聲)」正確。A「腸蠕動增快造成腹瀉失禁」錯(臨終腸蠕動『減慢』,多便祕或括約肌鬆弛失禁,非腹瀉);C「肢體末端溫熱潮紅且乾燥」錯(末梢『冰冷蒼白發紺、盜汗』);D「視覺是最後消失的知覺」錯(『聽覺』最後消失)。故B。","options":{"A":"臨終腸蠕動減慢,非增快腹瀉。","B":"正確(本題答案)。臨終呼吸道分泌物增加。","C":"末梢冰冷蒼白發紺盜汗,非溫熱潮紅。","D":"最後消失的是聽覺,非視覺。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"112030-N2-54":{"quick":"臨終生理:吸氣時胸壁應「外突」呼氣內陷之描述顛倒為錯誤。","detail":{"background":"肺癌末期即將臨終的生理變化:A感覺功能消失(對,漸退)、C四肢出現發紺(對)、D視力改變(對)。選項B「吸氣時胸壁『內陷』,呼氣時『外突』」錯誤——正常吸氣時胸廓「擴張外突」、呼氣時「縮小內陷」;B敘述顛倒(吸氣內陷是嚴重呼吸窘迫的『胸壁凹陷』徵象但非常態描述),故B為錯誤敘述(本題答案)。","options":{"A":"正確。臨終感覺功能消失。","B":"錯誤(本題答案)。吸氣胸壁應外突、呼氣內陷,B顛倒。","C":"正確。四肢發紺。","D":"正確。視力改變。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"112110-N2-12":{"quick":"術後護理問題優先順序排最後=缺乏居家照顧知識。","detail":{"background":"結腸切除手術剛返病房,護理問題依「優先順序(ABC生理優先)」:A呼吸道清除無效(氣道Airway,最優先)、D周邊組織灌流改變(循環)、B急性疼痛——皆生理急迫。選項C「缺乏居家照顧知識」排序「最後」(本題答案)——剛術後返房,居家照顧知識屬「出院準備」非當下急迫問題,依馬斯洛/ABC原則排最後。故C。","options":{"A":"呼吸道清除無效最優先(氣道)。","B":"急性疼痛較居家知識優先。","C":"正確(本題答案)。缺乏居家照顧知識排序最後。","D":"周邊組織灌流(循環)較居家知識優先。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"112110-N2-55":{"quick":"臨終護理措施:以病人的想法為優先考量。","detail":{"background":"臨終病人護理措施:C「以病人的想法為優先考量(尊重自主、以病人為中心)」適當。A「護理師與家屬間儘量以耳語交談」錯(聽覺最後消失,不宜耳語);B「白天拉窗簾保持昏暗減視覺刺激」錯(無須刻意昏暗,維持柔和自然光即可);D「意識不清出現嘎嘎聲予以抽痰並抬高下顎」錯(嘎聲不建議抽痰)。故C。","options":{"A":"不宜耳語(聽覺最後消失)。","B":"無須刻意昏暗。","C":"正確(本題答案)。以病人的想法為優先考量。","D":"嘎聲不建議抽痰。"},"sources":["新文京《基本護理學》臨終病人生理變化","華杏《最新基本護理學》瀕死症狀與照護"]}},"101030-N2-46":{"quick":"屍冷是死後最早改變,降溫約每小時1°C。","detail":{"background":"死亡後遺體變化:B「大體開始降溫(屍冷),此為死亡後屍體『最早』的改變,降溫速度約每小時1°C」正確。A屍僵(肌蛋白化學變化使僵硬)從「『下頷/小肌肉』開始」非臀部;C防臉部「屍斑/變黑」應於頭肩部「墊枕頭使頭部稍高」(C方向尚可,但本題以B為正解);D「冰敷關節減僵硬」錯(冰敷反促僵硬;軟化是屍僵後自然發生)。故B。","options":{"A":"屍僵從下頷小肌肉開始,非臀部。","B":"正確(本題答案)。屍冷是最早改變,約每小時降1°C。","C":"防臉變黑墊枕頭使頭稍高(本題正解B)。","D":"冰敷促僵硬,非減僵硬。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"101030-N2-47":{"quick":"遺體護理「不」應不戴手套(須戴手套防接觸體液);稱不戴手套以表尊重為較不適當。","detail":{"background":"執行遺體護理:A請家屬一同參與(對,利哀傷調適)、B以溫水擦拭遺體(對)、C向病人及家屬說明過程(對,即使病人已逝仍以尊重態度進行)。選項D「執行時不戴手套,以表達尊重」較不適當——遺體護理「應戴手套」以防接觸體液、避免感染,戴手套不影響尊重,故D為較不適當(本題答案)。","options":{"A":"適當。請家屬一同參與。","B":"適當。溫水擦拭遺體。","C":"適當。說明過程。","D":"較不適當(本題答案)。應戴手套防接觸體液。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"101110-N2-52":{"quick":"屍體護理:傳染病死亡者「不」以無菌技術處理(應加強防護隔離,非無菌);稱無菌技術為錯誤。","detail":{"background":"屍體護理:A向家屬解釋目的步驟(對)、B醫院政策准許下協助臨終告別儀式(對)、D護理記錄註明死亡經過與時間(對)。選項C「具有傳染病的病患死亡時,應以『無菌技術』處理」錯誤——傳染病遺體應以「『隔離防護(標準防護/感染管制)』技術」處理(戴手套口罩防護衣、屍袋標示),目的是「防止傳染」非「無菌(防止汙染遺體)」,概念用錯,故C為錯誤敘述(本題答案)。","options":{"A":"正確。向家屬解釋目的步驟。","B":"正確。協助臨終告別儀式。","C":"錯誤(本題答案)。傳染病遺體應用隔離防護,非無菌技術。","D":"正確。記錄死亡經過與時間。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"101110-N2-54":{"quick":"屍僵原因「不」是二氧化碳堆積(是ATP耗竭肌動凝蛋白結合);稱CO2堆積引起僵硬為錯誤。","detail":{"background":"屍僵變化:A人即將死亡前全身肌肉鬆弛(對)、B死後6~8小時肌肉呈僵硬(對)、D完全僵直後可能再次軟化(對,死後約24~48小時後自溶軟化)。選項C「因為『二氧化碳堆積』在肌肉而引起僵硬」錯誤——屍僵是「ATP耗竭,肌動蛋白與肌凝蛋白無法解離而持續結合」所致,非CO2堆積,故C為錯誤敘述(本題答案)。","options":{"A":"正確。死亡前肌肉鬆弛。","B":"正確。死後6~8小時僵硬。","C":"錯誤(本題答案)。屍僵因ATP耗竭,非CO2堆積。","D":"正確。完全僵直後可能再軟化。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"102030-N2-53":{"quick":"屍僵完成前應將假牙放回口腔中。","detail":{"background":"遺體變化與護理:C「在屍僵完成前,應將假牙放回口腔中(維持臉部遺容輪廓)」正確。A「屍斑是死後最早出現的變化」錯(『屍冷』才是最早);B「死後6~8小時開始僵硬,屍僵12小時內完成」——屍僵約6~8小時開始、約12~24小時達高峰完成(此項數字大致對,但本題以C為正解);D「大肌肉比小肌肉僵硬更明顯」錯(屍僵由『小肌肉(下頷)』先開始)。故C。","options":{"A":"最早出現的是屍冷,非屍斑。","B":"屍僵12~24小時完成(本題正解C)。","C":"正確(本題答案)。屍僵完成前將假牙放回口腔。","D":"屍僵由小肌肉(下頷)先開始。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"103100-N2-56":{"quick":"遺體護理「不」將假牙拔除(應裝回維持遺容);稱拔除假牙避免屍僵後無法移除為錯誤。","detail":{"background":"進行遺體護理:A護理人員戴手套避免接觸體液(對)、B遺體仰臥、頭下放枕頭預防臉色變黑(對,頭稍高防血液鬱積)、C臀部放看護墊避免尿糞排出(對)。選項D「將假牙『拔除』,以避免屍僵後無法移除」錯誤——應在「屍僵發生前『裝上/放回』假牙」以維持臉部遺容輪廓,而非拔除,故D為錯誤敘述(本題答案)。","options":{"A":"正確。戴手套避免接觸體液。","B":"正確。頭下放枕頭預防臉色變黑。","C":"正確。臀部放看護墊。","D":"錯誤(本題答案)。應裝回假牙維持遺容,非拔除。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"107030-N2-51":{"quick":"屍僵前屍體擺置「不」採側臥(應仰臥維持遺容);稱協助側臥防吸入分泌物為錯誤。","detail":{"background":"屍僵發生前屍體擺置:A協助仰臥(對,維持遺容)、B在下頷未變硬前先裝上假牙(對)、D雙手置於身側或前胸(對)。選項C「協助『側臥』以防吸入分泌物」錯誤——遺體應「仰臥、頭部稍墊高」維持遺容(病人已死亡無『吸入』疑慮),側臥不利遺容擺置,故C為錯誤敘述(本題答案)。","options":{"A":"正確。協助仰臥維持遺容。","B":"正確。下頷未硬前裝上假牙。","C":"錯誤(本題答案)。遺體應仰臥,非側臥(已無吸入疑慮)。","D":"正確。雙手置身側或前胸。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"107110-N2-51":{"quick":"遺體變化:屍斑約死後「2~4小時」出現(非12小時);稱屍斑死後12小時出現為錯誤。","detail":{"background":"人體死亡後遺體變化:A人死後首先出現的變化是體溫降低(屍冷,對)、C「小肌肉較大肌肉先發生僵硬」(對,下頷等小肌肉先僵)、D遺體護理最好在屍僵形成前完成(對)。選項B「屍斑大約在死後『12小時』出現」錯誤——屍斑約在死後「2~4小時(2小時左右)」開始出現、6~8小時較明顯,非12小時,故B為錯誤敘述(本題答案)。","options":{"A":"正確。首先出現體溫降低(屍冷)。","B":"錯誤(本題答案)。屍斑約死後2~4小時出現,非12小時。","C":"正確。小肌肉較大肌肉先僵硬。","D":"正確。遺體護理在屍僵前完成。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"109030-N2-14":{"quick":"遺體變化:初期降溫約「1°C/hr」(非2°C/hr);稱2°C/hr為錯誤。","detail":{"background":"死亡後遺體變化:B死後30分鐘左右出現屍斑(對,約30分~2小時)、C屍僵於死後2~3小時發生(對)、D屍僵首先發生於下頷(對)。選項A「初期遺體以『2°C/hr』的速度降溫」錯誤——屍冷初期降溫速度約「1°C/hr(每小時約1度)」,非2°C/hr,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。屍冷約1°C/hr,非2°C/hr。","B":"正確。死後約30分出現屍斑。","C":"正確。屍僵死後2~3小時發生。","D":"正確。屍僵首先發生於下頷。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"110030-N2-52":{"quick":"遺體護理:若有傷口需要縫合,以維護死者皮膚完整性。","detail":{"background":"遺體護理:B「若有傷口需要縫合,以維護死者皮膚完整性(及遺容)」正確。A「移走枕頭保持平直」錯(應『放置枕頭使頭部稍高』防臉色變黑);C「移除假牙防脫落」錯(應『裝回假牙』維持遺容);D「身體腔道出口保持通暢」錯(應『填塞』腔道出口防體液/排泄物外流)。故B。","options":{"A":"應放枕頭使頭稍高,非移走。","B":"正確(本題答案)。傷口需縫合維護皮膚完整性。","C":"應裝回假牙,非移除。","D":"應填塞腔道出口,非保持通暢。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"110110-N2-12":{"quick":"遺體護理:在醫院政策准許下提供佛教助唸環境。","detail":{"background":"執行遺體護理,家屬希望進行佛教助唸儀式:B「在醫院政策准許下,提供助唸環境」最適當(尊重宗教信仰、滿足靈性需求)。A「至太平間後才能舉行」(不近人情、應盡量配合)、C「須立刻執行遺體護理不宜舉行儀式」(不尊重)、D「請病房中相同信仰之工作人員及病友一起助唸」(不宜動員病友、應由家屬/宗教人員)皆不適當。故B。","options":{"A":"不應限至太平間才能舉行。","B":"正確(本題答案)。政策准許下提供助唸環境。","C":"不應拒絕儀式(不尊重)。","D":"不宜動員病友一起助唸。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"110110-N2-54":{"quick":"屍僵由頷部開始。","detail":{"background":"死亡後遺體變化:C「屍僵的產生『由頷部(下頷)開始』(再往軀幹四肢)」正確。A「屍斑因『肌蛋白化學變化』」錯(屍斑是血液受重力沉積於低位、非肌蛋白變化;『屍僵』才是肌蛋白變化);B「屍僵是死亡後最早的改變」錯(『屍冷』最早);D「完全屍僵後軀體就不會再軟化」錯(死後約24~48小時後會『自溶軟化』)。故C。","options":{"A":"屍斑是血液重力沉積,非肌蛋白變化。","B":"最早改變是屍冷,非屍僵。","C":"正確(本題答案)。屍僵由頷部開始。","D":"完全屍僵後會再軟化(自溶)。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"111030-N2-55":{"quick":"屍僵:死後6~8小時發生(1)+由頭頸部開始(4)→「14」。","detail":{"background":"屍僵敘述:1屍僵通常在死亡後6~8小時發生(對)、4屍僵發生多由「頭頸部(下頷)開始」(對)。選項2「屍僵乃因『血液凝固』而引起」錯(是ATP耗竭、肌蛋白持續結合);3「小肌肉較大肌肉先發生屍僵」此項其實對,但本題正確組合為「14」。核心:屍僵6~8小時、由下頷/頭頸小肌肉先開始、ATP耗竭所致。","options":{"A":"13雖含正確項,本題官方為14。","B":"含2(血液凝固)錯。","C":"含2錯。","D":"34不符。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"111110-N2-55":{"quick":"遺體擺位:採仰臥維持遺容(2)+頭下放枕頭(3)→「23」。","detail":{"background":"死亡後遺體擺位:2「採仰臥維持遺容」、3「頭下放置枕頭(使頭部稍高,防血液鬱積臉變黑)」正確。選項1「採側臥以利口腔分泌物流出」錯(遺體採仰臥維持遺容,非側臥);4「將手腳以繃帶纏繞固定」錯(遺體手腳自然置身側/前胸,不以繃帶纏繞)。故為「23」。","options":{"A":"含1(側臥)錯。","B":"含1、4錯。","C":"正確(本題答案,23)。仰臥維持遺容、頭下放枕頭。","D":"含4(繃帶纏繞)錯。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"112030-N2-44":{"quick":"死亡後遺體變化:死亡後最早的變化是屍冷。","detail":{"background":"死亡後遺體變化:C「死亡後遺體『最早』的變化是屍冷(體溫下降)」正確。A「屍斑死後6~8小時出現」錯(屍斑約死後2~4小時開始、6~8小時較明顯,本題以C為正解);B「屍僵以較大肌肉較明顯」錯(由『小肌肉/下頷』先開始);D「屍僵最早發生在身體手部末端」錯(由『下頷』先開始)。故C。","options":{"A":"屍斑約2~4小時開始(本題正解C)。","B":"屍僵由小肌肉(下頷)先,非大肌肉。","C":"正確(本題答案)。最早變化是屍冷。","D":"屍僵由下頷先,非手部末端。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"113030-N2-32":{"quick":"遺體護理最不適當=移除頭部枕頭採仰臥避免頭頸屈曲(應放枕頭使頭稍高)。","detail":{"background":"遺體護理:A鼻胃管留置者反抽胃內容物後再移除管路(對,防內容物溢出)、B口腔護理後幫助閉合(對)、C拔除導尿管前先抽出水囊內蒸餾水再移除(對)。選項D「協助採仰臥並『移除頭部枕頭』,避免頭頸屈曲」最不適當——遺體應「仰臥並『放置枕頭使頭部稍高』」(防血液鬱積臉部變黑),移除枕頭使頭部過低反而臉色變黑,故D為最不適當(本題答案)。","options":{"A":"適當。鼻胃管反抽後移除。","B":"適當。口腔護理後幫助閉合。","C":"適當。拔導尿管前抽水囊蒸餾水。","D":"最不適當(本題答案)。應放枕頭使頭稍高,非移除。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"113100-N2-32":{"quick":"屍斑約在死後2小時較為明顯。","detail":{"background":"死亡後遺體屍斑、屍冷、屍僵變化:C「屍斑約在死後2小時(2~4小時)較為明顯」正確。A「首先出現的是屍僵」錯(『屍冷』最早);B「屍僵以較大肌肉最明顯」錯(由『小肌肉/下頷』先);D「受到壓迫的部位較容易形成屍斑」錯(屍斑出現在『未受壓迫的低位』部位,受壓處因血管受壓反而『不形成』屍斑而呈蒼白)。故C。","options":{"A":"最早是屍冷,非屍僵。","B":"屍僵由小肌肉先,非大肌肉。","C":"正確(本題答案)。屍斑約死後2小時較明顯。","D":"受壓部位不形成屍斑(呈蒼白),非容易形成。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"113180-N2-34":{"quick":"家屬崩潰大哭:引導家屬抒發情緒。","detail":{"background":"住院病人剛過世、家屬情緒崩潰大哭,護理師最適當的護理活動是「引導家屬抒發情緒(陪伴、傾聽、接納哀傷)」(C正確)。A「安慰家屬情緒控制面對事實」(壓抑情緒、不利調適)、B「說明死亡離院手續流程」(時機不對、應先安撫情緒)、D「避免家屬觸碰遺體」(應讓家屬與遺體告別)皆不適當。故引導抒發情緒(C)。","options":{"A":"壓抑情緒不利哀傷調適。","B":"手續流程非當下優先。","C":"正確(本題答案)。引導家屬抒發情緒。","D":"應讓家屬與遺體告別,非避免觸碰。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"113180-N2-35":{"quick":"隨意肌屍僵一般從「下頷」最先發生。","detail":{"background":"人死亡後隨意肌(骨骼肌)的屍僵變化,一般「最先」從「下頷(下顎)」開始(C正確)——屍僵由「小肌肉(下頷、頸部)先,再往軀幹、四肢大肌肉」進展。髖關節、軀幹、上肢皆較下頷晚。故下頷(C)。死亡後遺體變化:屍冷(最早,約1°C/hr)→屍斑(死後2~4小時,血液重力沉積於低位未受壓處)→屍僵(6~8小時始,由下頷小肌肉先,ATP耗竭肌蛋白持續結合,24~48小時後自溶軟化)。遺體護理:戴手套、溫水擦拭、仰臥頭墊枕(防臉變黑)、屍僵前裝回假牙、填塞腔道、傷口縫合、移管前先反抽、傳染病用隔離防護。","options":{"A":"髖關節較下頷晚僵硬。","B":"軀幹較下頷晚。","C":"正確(本題答案)。屍僵最先從下頷開始。","D":"上肢較下頷晚。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"114030-N2-34":{"quick":"遺體護理:有鼻胃管者須先引流後再移除管路。","detail":{"background":"遺體護理措施:A「有鼻胃管者須先引流(反抽)後再移除管路(防胃內容物溢出污染)」正確。B「假牙須在屍僵『發生後』再裝上」錯(應在屍僵『前』裝回維持遺容);C「遺體側臥以利口腔分泌液引流」錯(遺體採仰臥維持遺容);D「用30°C溫水擦拭」——遺體擦拭用溫水即可(30°C偏低,一般溫水約40°C上下,本題以A為正解)。故A。","options":{"A":"正確(本題答案)。鼻胃管先引流後再移除。","B":"假牙應屍僵前裝回,非屍僵後。","C":"遺體應仰臥,非側臥。","D":"擦拭用溫水(30°C偏低),本題正解A。"},"sources":["新文京《基本護理學》遺體護理","華杏《最新基本護理學》死亡後遺體變化"]}},"102030-N2-51":{"quick":"聽到末期診斷不斷說「怎麼可能」=否認期。","detail":{"background":"Kübler-Ross瀕死心理五階段:否認(denial)→憤怒(anger)→磋商(bargaining)→憂鬱(depression)→接受(acceptance)。林先生剛聽到肝癌末期診斷,不斷說「怎麼可能?」「你(是不是搞錯)?」=「否認期」(A正確)——以否認作為暫時的自我防衛、緩衝衝擊。故否認期(A)。","options":{"A":"正確(本題答案)。「怎麼可能」是否認期。","B":"憤怒期是「為什麼是我」的怨懟。","C":"磋商期是討價還價、許願。","D":"憂鬱期是失落悲傷。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"103030-N2-53":{"quick":"處於憤怒期的瀕死病人發脾氣:接受病人行為、陪伴並傾聽其抱怨。","detail":{"background":"處於「憤怒期」的瀕死病人常對護理師發脾氣,最適當的護理是「接受病人的行為,陪伴並傾聽其抱怨」(B正確)——理解憤怒是哀傷過程的正常反應,不批判、提供情緒宣洩出口。A給鎮靜劑(壓抑情緒)、C請家屬約束(不尊重)、D減少探視讓其獨處(疏離、不利支持)皆不當。故接受並傾聽(B)。","options":{"A":"給鎮靜劑壓抑情緒,不當。","B":"正確(本題答案)。接受行為、陪伴傾聽抱怨。","C":"約束病人不尊重。","D":"減少探視疏離,不利支持。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"103030-N2-56":{"quick":"臨終護理「不」鼓勵病人少用止痛劑能忍則忍(應充分止痛);稱鼓勵能忍則忍為錯誤。","detail":{"background":"臨終病人護理措施:A多陪伴傾聽、滿足精神心靈需要(對)、B說話清楚緩慢以免增加焦慮(對)、D改善血循變慢可多按摩給予保暖(對,惟保暖防燙傷)。選項C「鼓勵病人『少用止痛劑,能忍則忍』」錯誤——臨終/緩和照護強調「充分疼痛控制、按時給止痛劑」,不應讓病人忍痛,故C為錯誤敘述(本題答案)。","options":{"A":"正確。陪伴傾聽滿足心靈需要。","B":"正確。說話清楚緩慢減焦慮。","C":"錯誤(本題答案)。應充分止痛,非鼓勵忍痛。","D":"正確。改善血循可按摩保暖。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"104100-N2-52":{"quick":"末期病人及家屬溝通最適切=協助病人進行生命回顧。","detail":{"background":"醫療照護者與末期病人及家屬的溝通互動:A「協助病人進行生命回顧(life review,回顧一生、找尋意義、達成統整)」最適切。B「迴避死亡相關禁忌話題」(應開放討論、不迴避);C「對病人與家屬的苦難表示『同情(sympathy)』」(應為『同理empathy』非居高臨下的同情);D「家屬沒有哀傷情緒表示無情緒適應問題」(無外顯哀傷不代表沒問題,可能是壓抑/延遲哀傷)皆不適切。故A。","options":{"A":"正確(本題答案)。協助病人進行生命回顧。","B":"不應迴避死亡話題。","C":"應同理(empathy)非同情(sympathy)。","D":"無外顯哀傷不代表無適應問題。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"104100-N2-53":{"quick":"Kübler-Ross五階段:磋商期和憂鬱期可能同時存在。","detail":{"background":"Kübler-Ross瀕死五階段:C「磋商期和憂鬱期『可能同時存在』」正確——五階段非僵化線性,可能跳躍、重疊、反覆或停留。A「會依相同順序出現」錯(順序因人而異);B「死亡前都會進入接受期」錯(未必每人都達接受期);D「每位病人都會經歷此五階段」錯(非人人皆歷經全部五階段)。故C。","options":{"A":"順序因人而異,非固定。","B":"未必都進入接受期。","C":"正確(本題答案)。磋商期與憂鬱期可能同時存在。","D":"非人人皆歷經全部五階段。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"104100-N2-54":{"quick":"臨終病人說看到已過世大哥:了解此經驗是否影響病人的臨終平安。","detail":{"background":"胃癌末期臨終病人說「看到10年前過世的大哥來看我」,護理師的回應應「了解此經驗是否影響病人的臨終平安(A)」——以接納、開放態度探詢病人感受,評估此瀕死覺知(nearing death awareness)對病人是安慰或困擾。A正確。B聯絡宗教人員(可後續但非首要)、C轉移話題(否定病人經驗)、D否定病人陳述澄清事實(不尊重、不利平安)皆不適當。故A。","options":{"A":"正確(本題答案)。了解此經驗是否影響病人臨終平安。","B":"宗教人員可後續,非首要。","C":"轉移話題否定病人經驗。","D":"否定病人陳述不尊重。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"105030-N2-13":{"quick":"剛得知末期癌症:輕握病人的手或輕拍肩膀表示支持與關懷。","detail":{"background":"病人剛得知罹患末期癌症(震驚/否認期),護理師最適當是「輕握病人的手或輕拍其肩膀,表示支持與關懷」(A正確)——以肢體接觸與陪伴提供情感支持,不急於說教。B「鼓勵面對現實、協助完成願望」(時機太早)、C「醫療進步應抱希望」(否定情緒、不實假保證)、D「主動詳細告知後續準備」(此時無法承受)皆不適當。故A。","options":{"A":"正確(本題答案)。輕握手/輕拍肩表支持關懷。","B":"鼓勵面對現實時機太早。","C":"假保證否定情緒。","D":"詳細告知後續準備此時無法承受。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"105030-N2-52":{"quick":"已簽意願書卻哭喊想活下去:接納其情緒(磋商/求生)等→本題答案D「34」。","detail":{"background":"本題官方答案「34」。已簽「預立安寧緩和醫療暨維生醫療抉擇意願書」、肺癌多處轉移病人,某日哭泣「請救救我,我想活下去」:應「3接納病人情緒矛盾(求生意志是正常的哀傷反應)、4陪伴傾聽、評估其心理需求」。選項1「立即撤回意願書安排急救」、2「告知已簽署不可反悔」皆不當。核心:意願書可隨時撤回,但當下應先「接納情緒、傾聽」,不批判、不急著撤書或駁回。故「34」。","options":{"A":"13含立即急救不當。","B":"14不符。","C":"24含「不可反悔」不當。","D":"正確(本題答案,34)。接納情緒、陪伴傾聽評估需求。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"105090-N2-52":{"quick":"先生剛過世、家屬崩潰大哭:協助帶至安靜房間、鼓勵情緒宣洩。","detail":{"background":"先生因淋巴癌剛過世、劉女士崩潰大哭,最適切的照護是「協助帶至安靜房間,鼓勵情緒宣洩(D)」——提供隱私空間、接納並支持哀傷情緒表達。A「安慰節哀順變」(壓抑情緒)、B「請其克制情緒避免干擾逝者」(否定哀傷)、C「儘早移走遺體轉移哀傷」(剝奪告別機會)皆不適當。故D。","options":{"A":"安慰節哀壓抑情緒,不當。","B":"請克制情緒否定哀傷。","C":"儘早移走遺體剝奪告別。","D":"正確(本題答案)。帶至安靜房間鼓勵情緒宣洩。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"105090-N2-53":{"quick":"臨終疼痛控制:持續性疼痛評估、按時以止痛劑控制。","detail":{"background":"臨終病人疼痛控制:B「持續性疼痛評估,且按時(around-the-clock)以止痛劑控制疼痛」正確。A「感官知覺衰退,原有慢性疼痛會消失」錯(疼痛不會因臨終而消失,仍需控制);C「止痛劑以肌肉注射效果較佳」錯(肌注疼痛、吸收不穩,臨終多用口服/皮下/靜脈/貼片);D「痛時再給藥避免成癮」錯(應按時給藥、臨終不須擔心成癮)。故B。","options":{"A":"臨終疼痛不會消失,仍需控制。","B":"正確(本題答案)。持續評估、按時給止痛劑。","C":"肌注非首選(疼痛、吸收不穩)。","D":"應按時給藥,臨終不慮成癮。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"106030-N2-55":{"quick":"COPD末期瀕死每日抽血ABG:與醫師討論處置的利與弊及對病人之意義。","detail":{"background":"COPD末期瀕死病人、醫囑每日抽動脈血氣體分析(ABG),護理師最適切回應是「與醫師討論該處置的『利與弊』及其對病人之意義(B)」——以病人最大利益為考量、檢視侵入性檢查在瀕死階段是否必要(可能徒增痛苦)。A「討論改隔日抽血以減少『工作負荷』」(理由錯,應為病人考量非減負荷)、C「不需要再做任何處置」(過於武斷)、D「遵醫囑執行」(未思考瀕死階段的適切性)皆不適當。故B。","options":{"A":"理由應為病人考量,非減工作負荷。","B":"正確(本題答案)。討論處置利弊及對病人意義。","C":"「不需做任何處置」過於武斷。","D":"未思考瀕死階段適切性。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"106110-N2-56":{"quick":"瀕死生理照護「不」鼓勵攝食或給非腸道營養維持體力(瀕死不強迫進食);稱鼓勵攝食為錯誤。","detail":{"background":"肺癌末期瀕死階段的生理照護:B雙眼可以生理食鹽水紗布覆蓋(對,防角膜乾燥)、C意識混亂躁動必要時給鎮靜劑(對)、D可給嗎啡類藥物改善呼吸困難(對)。選項A「鼓勵病人攝食或給予非腸道營養以維持體力」錯誤——瀕死期消化吸收功能衰退,「不應勉強進食或積極給予非腸道(靜脈)營養」(反增加負擔、水腫、分泌物),應依病人意願、提供舒適照護,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。瀕死不應勉強攝食或給非腸道營養。","B":"正確。生理食鹽水紗布覆蓋雙眼。","C":"正確。躁動必要時給鎮靜劑。","D":"正確。嗎啡改善呼吸困難。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"106111-N2-52":{"quick":"預期性哀傷「不」能避免死亡發生時的急性哀傷;稱可避免急性哀傷為錯誤。","detail":{"background":"預期性哀傷(anticipatory grief,死亡前預先經驗的哀傷):A讓病人與家屬有時間道別並完成未了心願(對)、C病人與家屬在病人未逝前就已經驗哀傷(對)、D幫助漸進承認死亡為無可避免(對)。選項B「預先經驗哀傷『可以避免』死亡發生時的急性哀傷」錯誤——預期性哀傷能「減輕/緩衝」但「不能完全『避免』」死亡當下的急性哀傷,故B為錯誤敘述(本題答案)。","options":{"A":"正確。有時間道別、完成未了心願。","B":"錯誤(本題答案)。預期性哀傷可緩衝但不能避免急性哀傷。","C":"正確。未逝前已經驗哀傷。","D":"正確。漸進承認死亡無可避免。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"106111-N2-54":{"quick":"瀕死溝通:藉肢體接觸表達對病人的愛與關心。","detail":{"background":"醫療照護者與瀕死病人及家屬溝通:A「藉由肢體接觸(握手、輕撫)表達對病人的愛與關心」正確。B「避免與病人討論其後事與喪葬準備」錯(應開放、不迴避病人想談的後事);C「護理師與家屬之間溝通盡量採用耳語」錯(聽覺最後消失,不宜耳語、避免病人誤會);D「與病人對話時聲音宏亮採開放式問句」錯(應溫和清楚、非宏亮)。故A。","options":{"A":"正確(本題答案)。藉肢體接觸表達愛與關心。","B":"不應避免討論後事(視病人意願)。","C":"不宜耳語(聽覺最後消失)。","D":"應溫和清楚,非聲音宏亮。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"107030-N2-53":{"quick":"病人質問神為何困住我:接納其哀傷為正常反應。","detail":{"background":"乳癌末期、基督徒病人眼泛淚光說「如果神愛我,為何將我困在這樣的身體裡?」(靈性困擾),護理師當下最適當是「接納其哀傷為正常反應(B)」——以同理、傾聽、接納病人的靈性掙扎,陪伴而不急於說教或駁斥。A「轉介神職人員解釋教義」(可後續但非當下首要)、C「再保證神愛世人」(否定其感受)、D「鼓勵正向面對苦難」(說教、未同理)皆不適當。故B。","options":{"A":"轉介神職人員可後續,非當下首要。","B":"正確(本題答案)。接納其哀傷為正常反應。","C":"再保證神愛世人否定其感受。","D":"鼓勵正向面對是說教,未同理。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"107110-N2-50":{"quick":"Kübler-Ross:初期否認是暫時自我防衛,多給時間緩和情緒衝擊。","detail":{"background":"Kübler-Ross瀕死心理及護理:A「初期的否認是暫時的自我防衛機轉,多給一些時間以緩和情緒上的衝擊」正確。B「憤怒期不要理他、讓其獨處」錯(應接受情緒、陪伴傾聽,非不理);C「接受期可減少心理支持」錯(接受期仍需陪伴支持);D「憂鬱期告訴病人病情沒有很糟」錯(否定情緒、假保證,應允許其哀傷)。故A。","options":{"A":"正確(本題答案)。否認是暫時防衛,多給時間緩和衝擊。","B":"憤怒期應陪伴傾聽,非不理獨處。","C":"接受期仍需心理支持。","D":"憂鬱期不應假保證,應允許哀傷。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"107110-N2-52":{"quick":"喪子母親哀傷:回應「我們談一談妳逝去的孩子,好嗎?」","detail":{"background":"長子病逝、楊太太思念以淚洗面,對哀傷調適最適當的回應是「我們談一談妳逝去的孩子,好嗎?(D)」——開放邀請、鼓勵表達哀傷、陪伴傾聽,不迴避。A「試煉背後有意義」(說教)、B「妳已盡力、孩子走得平安」(空泛安慰)、C「往正向想、還有其他孩子」(否定失落、不可取代)皆不適當。故D。","options":{"A":"「背後有意義」是說教。","B":"空泛安慰未同理。","C":"「還有其他孩子」否定失落。","D":"正確(本題答案)。邀請談逝去的孩子,鼓勵表達哀傷。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"108110-N2-54":{"quick":"支持喪親家屬哀傷:「相信您現在的痛苦難過是難以想像的。」","detail":{"background":"支持剛面臨親人離世家屬的哀傷情緒,最有助益的是「相信您現在的痛苦難過是難以想像的(D)」——同理、承認與接納家屬的痛苦感受。A「不要難過、他的一生很有意義」、B「要勇敢堅強、還有其他愛你的家人」、C「時間會治療一切、再困難都會過去」皆是「淡化/否定哀傷的安慰」,不利情緒抒發。故D(同理承認痛苦)。","options":{"A":"「不要難過」淡化哀傷。","B":"「要勇敢堅強」否定情緒。","C":"「時間會治療」淡化當下痛苦。","D":"正確(本題答案)。同理承認家屬難以想像的痛苦。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"109110-N2-54":{"quick":"憂鬱期哭泣護理:移除危險物品(2)+鼓勵表達內心(3)→「23」。","detail":{"background":"瀕死病人處於「憂鬱期」常哭泣的護理:2「移除室內具自我傷害的危險物品(維護安全)」、3「鼓勵其表達內心(情緒、失落)」。選項1「減少探視讓其獨處減少干擾」錯(憂鬱期更需陪伴支持,非疏離);4...。故為「23」。核心:憂鬱期允許病人哀傷、陪伴傾聽、確保安全、不強迫振作。","options":{"A":"含1(減少探視獨處)錯。","B":"正確(本題答案,23)。移除危險物品、鼓勵表達內心。","C":"含...不符。","D":"含1、4不符。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"110030-N2-15":{"quick":"護理措施:與營養師共同擬定飲食計畫為合作性護理措施。","detail":{"background":"護理措施種類:D「與營養師共同擬定病人的飲食計畫,為『合作性(協同性)護理措施』」正確(與其他專業合作執行)。A每2小時翻身是「獨立性」(非非獨立性);B經鼻導管給氧是「依賴性(依醫囑)」(非獨立性);C中心靜脈導管置入是「醫師執行/依賴性」(非獨立性護理)。故D。","options":{"A":"每2小時翻身是獨立性護理。","B":"經鼻導管給氧是依賴性(依醫囑)。","C":"中心靜脈置入非獨立性護理。","D":"正確(本題答案)。與營養師合擬飲食是合作性護理。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"110110-N2-56":{"quick":"鄰床病人過世致害怕失眠:最優先評估病人對死亡的感受。","detail":{"background":"肝癌末期林先生因鄰床癌末病人過世而害怕、失眠、頻按叫人鈴,「最優先」的護理措施是「評估病人對死亡的感受(B)」——先了解恐懼的根源(對死亡的焦慮),才能對症提供支持(護理過程以評估為先)。A請家屬留院陪伴、C協助轉床減少恐懼、D提供唸佛機轉移注意力皆是「評估後」的措施。故最優先評估死亡感受(B)。","options":{"A":"家屬陪伴是評估後措施。","B":"正確(本題答案)。最優先評估病人對死亡的感受。","C":"轉床是評估後措施。","D":"唸佛機轉移是評估後措施。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"111030-N2-54":{"quick":"臨終照護「不」一律由口服途徑給藥(吞嚥困難應改皮下/靜脈);稱藥物由口服避免注射傷害為錯誤。","detail":{"background":"臨終照護:A依病人意願選擇合宜進食方式(對)、B停止或減少非必要的醫療處置或監測儀器(對)、C簡化處方並保留症狀控制藥物(對)。選項D「藥物由『口服途徑』給予,以避免造成注射傷害」錯誤——臨終病人常吞嚥困難、意識不清,口服給藥不可行,應改「皮下、靜脈、舌下、貼片」等途徑確保症狀控制,故D為錯誤敘述(本題答案)。","options":{"A":"正確。依意願選擇進食方式。","B":"正確。減少非必要處置監測。","C":"正確。簡化處方保留症狀控制藥。","D":"錯誤(本題答案)。吞嚥困難應改皮下/靜脈,非一律口服。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"111110-N2-56":{"quick":"喪親哀傷支持:可透過照片等紀念物引導,以抒發情緒不壓抑。","detail":{"background":"喪親家屬哀傷情緒支持:D「可透過照片等紀念物引導,以抒發情緒、不壓抑」最適當——藉紀念物協助回顧、表達哀傷、健康調適。A「安慰節哀以避免情緒潰堤」(壓抑)、B「鼓勵以工作轉移注意力以免過度沉浸」(逃避哀傷)、C「建議清除所有遺物避免睹物思人」(剝奪哀悼連結)皆不利哀傷調適。故D。","options":{"A":"安慰節哀壓抑情緒。","B":"工作轉移是逃避哀傷。","C":"清除遺物剝奪哀悼連結。","D":"正確(本題答案)。藉紀念物引導抒發情緒不壓抑。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"112110-N2-53":{"quick":"要求放生積功德以延長生命=討價還價期(磋商期)。","detail":{"background":"乳癌末期王女士要求家人準備動物放生、期待「積功德、累福報以延長生命」,其心理正處於Kübler-Ross的「討價還價期(磋商期,bargaining)」(B正確)——以許願、交換條件(行善)企圖換取延長生命或好轉。否認期(不承認)、憂鬱期(失落悲傷)、接受期(平靜接受)皆非。故討價還價期(B)。","options":{"A":"否認期是不承認診斷。","B":"正確(本題答案)。放生積功德換取延命=討價還價期。","C":"憂鬱期是失落悲傷。","D":"接受期是平靜接受。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"112110-N2-54":{"quick":"COVID-19瀕死負壓隔離:家屬可能為潛在複雜性哀傷族群,宜轉介專業團隊。","detail":{"background":"COVID-19確診、負壓隔離、瀕死病人的臨終照護:A「家屬可能為潛在『複雜性哀傷(complicated grief)』族群,宜轉介醫療專業團隊提供協助」正確(隔離致無法陪伴、突然死亡易致複雜哀傷)。B「須避免家屬與病人任何形式接觸」錯(應在感控下盡量提供視訊/防護下會面);C「因傳染疾患故不適用緩和性鎮靜」錯(緩和性鎮靜仍適用);D「向家屬說明將盡全力搶救到底」錯(瀕死應以緩和為主、尊重意願)。故A。","options":{"A":"正確(本題答案)。家屬潛在複雜性哀傷,宜轉介專業團隊。","B":"應在感控下盡量提供會面,非完全避免。","C":"緩和性鎮靜仍適用。","D":"瀕死應緩和為主,非搶救到底。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"112180-N2-35":{"quick":"生命回顧最適當時機=協助病人舒適護理時。","detail":{"background":"引導大腸直腸癌末期病人進行生命回顧:B「協助病人舒適護理時,是生命回顧的『適切時機』(自然、放鬆的互動中引導)」正確。A「於家屬不在場時進行」錯(不必刻意避開家屬,家屬參與可增情感連結);C「出現感傷情緒時轉移話題」錯(應陪伴接納情緒,非轉移);D「生命回顧主要目的是論定一生成敗」錯(目的是『統整、找尋意義、達成圓滿』,非論定成敗)。故B。","options":{"A":"不必刻意避開家屬。","B":"正確(本題答案)。舒適護理時是生命回顧適切時機。","C":"感傷情緒應陪伴接納,非轉移。","D":"生命回顧目的是統整找意義,非論成敗。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"114030-N2-33":{"quick":"臨終護理:協助減少不適(1)+說話清楚緩慢(3)→「13」。","detail":{"background":"臨終病人護理措施:1「協助個案減少不適(舒適照護)」、3「與個案說話要清楚、緩慢,以免增加其焦慮」。選項2「病房環境應昏暗以減少對眼睛刺激」錯(無須刻意昏暗,維持柔和自然光);4「避免個案使用止痛劑」錯(應充分止痛、按時給藥)。故為「13」。","options":{"A":"正確(本題答案,13)。協助減少不適、說話清楚緩慢。","B":"含2、4錯。","C":"含2(昏暗)錯。","D":"含4(避免止痛劑)錯。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"114100-N2-35":{"quick":"Kübler-Ross:病人可能只停留在否認期直到死亡。","detail":{"background":"Kübler-Ross瀕死五階段:C「病人可能『只停留在否認期』直到死亡」正確——並非人人都歷經全部五階段或達接受期,有人停留某一階段。A「死亡前都能達到接受期」錯(未必);B「按上述五階段依序進行」錯(可跳躍、重疊、反覆);D「哀傷心理反應不適用於家屬」錯(家屬同樣經歷哀傷反應)。故C。","options":{"A":"未必都能達接受期。","B":"非依序進行,可跳躍反覆。","C":"正確(本題答案)。病人可能只停留否認期至死亡。","D":"哀傷反應同樣適用於家屬。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"115030-N2-32":{"quick":"末期家屬哀傷支持:家庭關係動態評估有助辨識需哀傷支持者。","detail":{"background":"末期病人即將離世的家屬哀傷支持:C「家庭關係『動態評估』,有助於辨識需哀傷支持者(找出高風險、需介入的家屬)」最適當。A「家屬減少探視以漸進去除依附、減低分離焦慮」錯(應鼓勵陪伴道別,非減少探視);B「家屬在病人逝世『後』才開始哀傷歷程」錯(哀傷在病人逝世前即開始=預期性哀傷);D「家屬與病人宜避免互表感受以免加深哀傷」錯(應鼓勵表達愛與感受、完成道別)。故C。","options":{"A":"應鼓勵陪伴道別,非減少探視。","B":"哀傷在逝世前即開始(預期性哀傷)。","C":"正確(本題答案)。家庭關係動態評估辨識需哀傷支持者。","D":"應鼓勵互表感受,非避免。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"104030-N2-53":{"quick":"自然死=尊重病人自主權終止無效維生醫療,讓疾病自然發展。","detail":{"background":"自然死(natural death):A「尊重病人自主權,終止無效維生醫療,讓疾病自然發展的一個選擇」正確。B「使用維生醫療延長瀕死期」(與自然死相反);C「等同安樂死,加速死亡」錯(自然死『不加速』死亡,讓疾病自然進程;安樂死是主動結束生命,兩者不同);D「治療不符病人福祉、病人無法自主時即不可停止」(敘述矛盾)。故A。","options":{"A":"正確(本題答案)。自然死=終止無效維生醫療讓疾病自然發展。","B":"延長瀕死期與自然死相反。","C":"自然死非安樂死(不加速死亡)。","D":"敘述矛盾,不正確。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"105030-N2-53":{"quick":"反覆入院末期病人資料收集:可能需重複數次提問以讓病人有充分時間反應。","detail":{"background":"短期反覆入院末期病人的入院護理資料收集:D「可能需要重複數次提問,以讓病人有充分的時間作反應(體力差、反應慢)」正確。A「須一次完成所有資料收集」錯(末期病人體力有限,應分段);B「須再次詳細詢問過去病史治療」錯(反覆入院已有紀錄,不必每次詳問、避免打擾);C「已簽DNR者每次入院都須再簽」錯(意願書持續有效,無須每次重簽)。故D。","options":{"A":"應分段收集,非一次完成。","B":"反覆入院已有紀錄,不必每次詳問。","C":"DNR意願書持續有效,無須每次重簽。","D":"正確(本題答案)。可重複提問讓病人有充分時間反應。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"108020-N2-50":{"quick":"基督徒卵巢癌末期單親:同理家屬哀傷反應並引導與病人道別。","detail":{"background":"卵巢癌末期、已簽預立意願書、單親撫養5歲兒、虔誠基督徒病人的瀕死照護:A「同理家屬的哀傷反應並引導與病人道別」最適當。B「避免與孩童談論死亡以免恐懼」錯(應以適齡方式協助孩童理解與道別);C「依家屬宗教信仰協助遺體護理」(尚可但本題以A為最適切的心理支持);D「尊重家屬要求撤回病人預立醫療指示」錯(應尊重『病人本人』的預立意願,家屬不能逕自撤回病人意願)。故A。","options":{"A":"正確(本題答案)。同理家屬哀傷並引導與病人道別。","B":"應以適齡方式協助孩童道別,非避免。","C":"協助遺體護理尚可,本題A最適切。","D":"應尊重病人本人預立意願,家屬不能逕撤。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"108020-N2-51":{"quick":"安寧療護:照護模式包含住院、居家與共同照護。","detail":{"background":"安寧療護:D「照護模式包含住院、居家與(安寧)共同照護」正確。A「採消極方式、不做任何侵入性治療」錯(安寧是『積極』的症狀控制與全人照顧,非消極不作為);B「僅針對癌症末期病人及家屬」錯(已擴及非癌末期如失智、心衰、腎衰、COPD等八大非癌疾病);C「需要自費」錯(健保有給付安寧療護)。故D。","options":{"A":"安寧是積極症狀控制,非消極不作為。","B":"已擴及非癌末期疾病,非僅癌症。","C":"健保有給付,非需自費。","D":"正確(本題答案)。模式含住院、居家、共同照護。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"108020-N2-56":{"quick":"腦死判定適用=無腦幹反射、無自發性呼吸的昏迷。","detail":{"background":"腦死判定適用情境:D「無腦幹反射、無自發性呼吸的昏迷(腦幹功能完全喪失)」正確。A新陳代謝障礙、B藥物中毒、C低體溫造成的深度昏迷——皆是「可逆性、須先排除」的情況,不可進行腦死判定(須先矯正這些可逆因素)。故腦死判定適用於「無腦幹反射、無自發呼吸、原因確定且不可逆」者(D)。","options":{"A":"新陳代謝障礙昏迷可逆,須先排除。","B":"藥物中毒昏迷可逆,須先排除。","C":"低體溫昏迷可逆,須先排除。","D":"正確(本題答案)。無腦幹反射無自發呼吸的昏迷適用腦死判定。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"108110-N2-14":{"quick":"腦死判定準則:「可逆與不可逆昏迷均適用」為錯誤(僅不可逆適用)。","detail":{"background":"臺灣2012修訂「腦死判定準則」:B先決條件為昏迷指數≦5(深度昏迷)(對)、C病人需依賴人工呼吸器維持呼吸(對)、D應進行兩次程序相同的判定性腦幹功能測試(對)。選項A「可逆與不可逆之昏迷『均適用』」錯誤——腦死判定僅適用於「『不可逆』的昏迷(原因確定、排除可逆因素如低體溫、藥物、代謝)」,可逆昏迷不適用,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。僅不可逆昏迷適用,可逆不適用。","B":"正確。昏迷指數≦5。","C":"正確。需依賴人工呼吸器。","D":"正確。兩次腦幹功能測試。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"108110-N2-52":{"quick":"腦死判定腦幹反射測試包括頭-眼反射。","detail":{"background":"腦死判定的「腦幹反射功能測試」項目:C「頭-眼反射(娃娃眼反射,oculocephalic reflex)」屬腦幹反射測試(C正確),其他如瞳孔對光反射、角膜反射、前庭-眼反射(冰水試驗)、咳嗽/作嘔反射、呼吸暫停試驗。A吞嚥反射(屬腦幹但非標準列項)、B膝反射(脊髓反射,非腦幹)、D抓握反射(原始反射,非腦幹判定項)皆非標準。故頭-眼反射(C)。","options":{"A":"吞嚥反射非標準腦死判定列項。","B":"膝反射是脊髓反射,非腦幹。","C":"正確(本題答案)。頭-眼反射屬腦幹反射測試。","D":"抓握反射非腦幹判定項。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"110030-N2-53":{"quick":"安寧緩和:針對生命受威脅疾病的病人與其家屬提供照護。","detail":{"background":"安寧緩和療護:D「針對『生命受威脅疾病』的病人與其家屬提供照護(全人、全家、全程、全隊的四全照顧)」正確。A「以疾病治癒為導向」錯(安寧以『症狀緩解、生活品質』為導向,非治癒);B「僅提供病人支持性照護直到死亡」錯(亦照顧家屬、含喪慟輔導);C「照護範圍以疼痛控制和症狀緩解為限」錯(含身心靈社會全人照顧,非僅症狀)。故D。","options":{"A":"安寧以症狀緩解生活品質為導向,非治癒。","B":"亦照顧家屬含喪慟輔導,非僅病人至死。","C":"含全人照顧,非僅疼痛症狀。","D":"正確(本題答案)。針對生命受威脅疾病病人與家屬照護。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"111110-N2-54":{"quick":"腦死認定標準=無腦幹反射(2)+無自行呼吸(4)→「24」。","detail":{"background":"依衛福部腦死判定準則,屬於腦死認定標準:2「無腦幹反射」、4「無自行(自發性)呼吸」(呼吸暫停試驗陽性)。選項1「低體溫昏迷」錯(低體溫是須排除的可逆因素,不可作為腦死認定);3「須經『一次』腦幹功能測試」錯(須經『兩次』程序相同的測試,間隔一定時間)。故腦死認定為「24」。","options":{"A":"含1(低體溫須排除)、3(一次測試)錯。","B":"含1、3錯。","C":"正確(本題答案,24)。無腦幹反射、無自行呼吸。","D":"含3(一次測試)錯。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"112030-N2-55":{"quick":"臨終譫妄躁動用藥諮詢:與家人共同討論照護目標、解釋用藥效應再做決定。","detail":{"background":"肺癌骨轉移、用嗎啡止痛、臨終譫妄躁動,家屬詢問加藥:D「與家人共同討論照護目標,解釋用藥可能產生的效應,再做決定」最適當(共享決策、雙重效應原則)。A「增加嗎啡/鎮靜劑會加速死亡、不符倫理」錯(以緩解痛苦為目的之合理用藥即使可能縮短生命,符合『雙重效應原則』,合乎倫理);B「臨終正常反應、不需處理」錯(躁動造成痛苦需處理);C「用藥緩解躁動但病人可能離世=協助自殺」錯(緩和性鎮靜≠協助自殺)。故D。","options":{"A":"合理緩解痛苦用藥符合雙重效應原則。","B":"躁動造成痛苦需處理,非不需處理。","C":"緩和性鎮靜非協助自殺。","D":"正確(本題答案)。共同討論照護目標、解釋用藥效應再決定。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"112030-N2-56":{"quick":"安寧照護健保給付不適用=大腸憩室炎(非末期/生命受威脅疾病)。","detail":{"background":"健保給付安寧療護的對象:A心臟衰竭(末期)、B失智症(末期)、C癌症(末期)——皆是健保給付的安寧照護對象(八大非癌+癌症末期)。選項D「大腸憩室炎」無法使用健保給付安寧照護(本題答案)——大腸憩室炎是「可治療的良性發炎疾病」,非末期/生命受威脅疾病,不符安寧給付對象。故不適用者為大腸憩室炎(D)。","options":{"A":"心臟衰竭末期屬安寧給付對象。","B":"失智症末期屬安寧給付對象。","C":"癌症末期屬安寧給付對象。","D":"正確(本題答案)。大腸憩室炎非末期,不適用安寧給付。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"112180-N2-32":{"quick":"腦死先決條件「不」含昏迷原因是可逆性(須為不可逆);稱昏迷原因可逆為錯誤。","detail":{"background":"腦死判定的先決條件:A陷入深度昏迷且須依賴人工呼吸器維持呼吸(對)、B導致昏迷原因已經確定(對)、C遭受無法復原的腦部結構損壞(對)。選項D「確定其昏迷原因是『可逆性』的」錯誤——腦死先決條件須為「『不可逆』的昏迷」(已排除低體溫、藥物中毒、代謝等可逆因素),可逆性昏迷不可判定腦死,故D為錯誤敘述(本題答案)。","options":{"A":"正確。深度昏迷依賴人工呼吸器。","B":"正確。昏迷原因已確定。","C":"正確。無法復原的腦結構損壞。","D":"錯誤(本題答案)。須為不可逆昏迷,非可逆。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"113030-N2-34":{"quick":"腦死先決條件:病人昏迷指數為5或小於5之深度昏迷。","detail":{"background":"衛福部2012「腦死判定準則」先決條件:A「病人昏迷指數為5或小於5之深度昏迷」正確。B「體溫低於35°C所致之『可逆性』昏迷」錯(低體溫是須排除的可逆因素,不可判腦死);C「具有無法復原的『肺葉』結構損傷」錯(應為『腦部』結構損傷,非肺葉);D「必須依賴『氣切』管路維持呼吸」錯(是依賴『人工呼吸器』、無自發呼吸,非特指氣切)。故A。","options":{"A":"正確(本題答案)。昏迷指數≦5之深度昏迷。","B":"低體溫可逆昏迷不可判腦死。","C":"應為腦部結構損傷,非肺葉。","D":"是依賴人工呼吸器,非特指氣切。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"113180-N2-33":{"quick":"臺灣安寧緩和療護可適用於癌症末期及非癌症末期病人。","detail":{"background":"臺灣安寧緩和療護:B「可適用於癌症末期『及非癌症末期』病人(八大非癌:失智、心衰、肺、肝、腎衰竭等)」正確。A「安寧共同照護僅在安寧病房執行」錯(共同照護是在『一般病房』由安寧團隊協同照顧);C「瀕死或臨終階段才選擇」錯(可及早介入,非僅瀕死);D「考慮放棄所有治療才符合」錯(安寧非放棄治療,是調整目標為症狀緩解與生活品質)。故B。","options":{"A":"安寧共同照護在一般病房協同,非僅安寧病房。","B":"正確(本題答案)。適用癌末及非癌末期病人。","C":"可及早介入,非僅瀕死臨終。","D":"安寧非放棄所有治療。"},"sources":["新文京《基本護理學》安寧緩和療護","安寧緩和醫療條例;人體器官移植條例腦死判定準則"]}},"113030-N2-35":{"quick":"臨終瀕死症狀=張口呼吸(2)+吞嚥困難(4)→「24」。","detail":{"background":"臨終病人的瀕死症狀:2「張口呼吸(呼吸肌無力、下顎鬆弛)」、4「吞嚥困難(吞嚥反射消失)」。選項1「脈搏出現奇異脈(paradoxical pulse,吸氣時收縮壓下降>10mmHg)」是心包填塞/嚴重氣喘的徵象,非瀕死典型;3「肛門括約肌『收縮』」錯(瀕死是括約肌『鬆弛』致失禁,非收縮)。故瀕死症狀為「24」。","options":{"A":"含1(奇異脈非瀕死典型)不符。","B":"14含1不符。","C":"含3(括約肌收縮)錯。","D":"正確(本題答案,24)。張口呼吸、吞嚥困難。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}},"113100-N2-35":{"quick":"已簽DNR案妻要求急救:回應「我了解你的心情,您捨不得先生離開」。","detail":{"background":"安寧病房末期、已簽DNR、案妻看到病人呼吸微弱意識不清而緊張要求急救,主護護理師最適當的回應是「我了解你的心情,您捨不得先生離開(B)」——先「同理、接納家屬的不捨與焦慮」,再溫和說明。A「病人已簽DNR了」(冷硬、未同理)、C「這樣要求只會造成先生不舒服」(指責)、D「先生已無法起死回生,讓他走吧」(冷酷、不近人情)皆不適當。故B(同理家屬心情)。","options":{"A":"「已簽DNR」冷硬未同理。","B":"正確(本題答案)。同理「捨不得先生離開」的心情。","C":"「造成不舒服」是指責。","D":"「讓他走吧」冷酷不近人情。"},"sources":["新文京《基本護理學》瀕死心理與哀傷","華杏《最新基本護理學》臨終溝通與哀傷支持"]}}},TO=["1呼吸生理與調節", "2異常呼吸型態", "3給氧蒸氣吸入與痰液", "4臨終病人生理變化與瀕死症狀", "5瀕死心理Kübler-Ross與溝通哀傷支持", "6遺體護理與屍體變化", "7安寧緩和療護與腦死判定"],LEC={"1呼吸生理與調節":{"html":"\n<p><b>吸氣(主動):</b>橫膈膜<b>收縮下降</b>、<b>外</b>肋間肌收縮、肋骨上提、胸廓擴大。<b>呼氣(被動):</b>橫膈膜放鬆、肋骨下降。用力呼氣第1秒呼出量(FEV1)最多。</p>\n<p><b>調節中樞:</b>呼吸基本<b>節律</b>在<b>延腦</b>、呼吸調節區在<b>橋腦</b>(抑制吸氣)。</p>\n<p><b>化學調節:</b><b>CO2(及H⁺、pH下降)是最主要驅動</b>——血中CO2升高會<b>促進</b>(增加深度與速率)呼吸排出CO2。調節物質含CO2、HCO3⁻、H⁺(<b>不含一氧化氮</b>)。成人潮氣容積約500 mL、正常呼吸12~20次/分。內呼吸=組織交換、外呼吸=肺呼吸(肺泡血液交換)。</p>\n"},"2異常呼吸型態":{"html":"\n<p><b>陳施氏呼吸(Cheyne-Stokes):</b>漸深漸淺後呼吸暫停的<b>週期性</b>循環——臨終、心衰、腦損傷;<b>臨終最常見</b>。</p>\n<p><b>庫斯毛耳呼吸(Kussmaul):</b>深而快——<b>糖尿病酮酸中毒</b>、代謝性酸中毒(代償排CO2)。<b>畢歐氏呼吸(Biot):</b>不規則深淺+暫停——腦膜炎、腦損。<b>喟嘆式呼吸(Sighing):</b>規律呼吸夾不定時深呼吸——<b>臨終</b>、大出血、情緒。</p>\n<p><b>換氣過度(hyperventilation):</b>常見於<b>焦慮害怕</b>——CO2過度排出→低碳酸血症→<b>呼吸性鹼中毒</b>(手腳麻、口周麻、頭暈)。GAS警覺期=交感興奮、戰或逃反應。</p>\n"},"3給氧蒸氣吸入與痰液":{"html":"\n<p><b>蒸氣吸入:</b>以蒸氣將<b>熱</b>應用於呼吸道、<b>濕潤黏膜、稀釋分泌物</b>利咳出;噴霧裝置須勤消毒換液防院內感染。</p>\n<p><b>痰液顏色:</b><b>鐵鏽色</b>=肺炎鏈球菌(大葉性肺炎)、<b>粉紅色泡沫</b>=急性肺水腫、<b>黃綠色</b>=細菌感染、<b>血痰</b>=肺栓塞/肺結核/肺癌、灰黑=吸菸焦油。</p>\n<p><b>痰液檢體:</b>晨起<b>先漱口(清水)</b>後留<b>第一口痰</b>、深呼吸後咳出;無法自咳者(氣切/意識不清)以<b>抽痰</b>留取;血小板極低者改噴霧稀釋後咳出、避免抽痰出血;未能立即送檢應<b>冷藏</b>。</p>\n"},"4臨終病人生理變化與瀕死症狀":{"html":"\n<p><b>循環:</b>減弱→末梢<b>冰冷蒼白發紺</b>、盜汗、脈搏絲弱;<b>頸動脈與心尖搏動最後消失</b>(故臨終測頸動脈較易)。</p>\n<p><b>呼吸:</b>陳施氏/喟嘆式/張口呼吸/鼻翼搧動;分泌物積聚產生<b>臨終嘎聲(death rattle)</b>→<b>側臥引流、減少輸液、給抗膽鹼藥(scopolamine)、不抽痰</b>(抽痰刺激加重不適)。</p>\n<p><b>其他:</b>腸蠕動減慢→便祕或括約肌鬆弛失禁(非腹瀉);<b>聽覺是最後消失的感覺</b>(應正常清楚說話、<b>不耳語</b>);疼痛須<b>持續按時</b>給止痛劑;瀕死不勉強進食/給非腸道營養;希氏面容(憔悴凹陷)。</p>\n"},"5瀕死心理Kübler-Ross與溝通哀傷支持":{"html":"\n<p><b>Kübler-Ross五階段:</b>否認(怎麼可能)→憤怒(為什麼是我)→<b>磋商/討價還價</b>(許願、放生積功德換延命)→憂鬱(失落悲傷)→接受。<b>非線性</b>:可跳躍、重疊、反覆、停留某階段;<b>未必</b>達接受期;家屬同樣經歷哀傷。</p>\n<p><b>溝通:</b><b>同理(empathy)接納</b>、陪伴傾聽、肢體接觸(握手輕拍)、協助<b>生命回顧</b>、開放邀請談感受;憤怒期接受情緒不批判、憂鬱期允許哀傷並確保安全。</p>\n<p><b>哀傷支持:</b>忌淡化安慰(節哀/勇敢/時間會治療);宜<b>引導抒發情緒、藉照片紀念物</b>。<b>預期性哀傷</b>=逝世前已開始,可緩衝但<b>不能避免</b>急性哀傷。</p>\n"},"6遺體護理與屍體變化":{"html":"\n<p><b>遺體變化(順序):</b><b>屍冷</b>(死後最早,約<b>1°C/hr</b>降溫)→<b>屍斑</b>(死後<b>2~4小時</b>,血液受重力沉積於低位<b>未受壓</b>處;受壓處呈蒼白)→<b>屍僵</b>(死後<b>6~8小時</b>始,由<b>下頷小肌肉</b>先,因<b>ATP耗竭</b>肌動凝蛋白持續結合;24~48小時後自溶軟化)。</p>\n<p><b>遺體護理:</b><b>戴手套</b>(防接觸體液)、溫水擦拭、<b>仰臥</b>並頭下<b>墊枕</b>(使頭稍高防臉色變黑)、屍僵<b>前裝回假牙</b>維持遺容、<b>填塞</b>腔道出口、傷口需縫合、移除管路前先反抽;傳染病遺體用<b>隔離防護</b>(非無菌)技術;尊重宗教助唸、家屬參與。</p>\n"},"7安寧緩和療護與腦死判定":{"html":"\n<p><b>安寧緩和療護:</b>四全(全人/全家/全程/全隊)、以<b>症狀緩解與生活品質</b>為導向(<b>非治癒、非放棄治療</b>);<b>健保給付</b>癌症末期及<b>八大非癌</b>(心衰、失智、肺/肝/腎衰竭等);模式含<b>住院、居家、共同照護</b>(共同照護在一般病房協同)。</p>\n<p><b>自然死:</b>尊重病人自主、終止無效維生醫療、讓疾病自然發展(<b>非安樂死</b>,不加速死亡)。意願書可隨時撤回、持續有效不須每次重簽。</p>\n<p><b>腦死判定:</b>先決條件=<b>不可逆</b>深度昏迷(昏迷指數<b>≦5</b>)、依賴人工呼吸器、<b>排除</b>低體溫/藥物/代謝等可逆因素;須<b>兩次</b>程序相同的腦幹功能測試(含<b>頭-眼反射</b>)、<b>無自發性呼吸</b>(呼吸暫停試驗)。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_b9_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';

function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
