","D":"紫外線消毒"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"7醫療廢棄物處理","topic_code":"B2-7","q_num":3,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"福馬林消毒","B":"冰凍處理後掩埋","C":"滅菌後粉碎","D":"紫外線消毒"},"img":""}],E={"101110-N2-4":{"quick":"院內感染=住院期間「新」得到的感染,不含入院時已有或潛伏的感染。","detail":{"background":"院內感染(nosocomial infection)現稱醫療照護相關感染(HAI),定義為病人「住院期間或出院後」新發生、且入院時不存在也非處於潛伏期的感染;一般以入院後48~72小時(視潛伏期)後出現者為判定參考。常見部位以泌尿道感染(導尿相關)最多,其次手術部位、肺炎、血流感染。選項A正確;B含入院前潛伏錯;C「72小時皆稱院內感染」過於僵化;D最常見部位非僅加護與嬰兒室。","options":{"A":"正確(本題答案)。指住院期間新得的感染,不含入院時已有者。","B":"入院前已潛伏的病症不算院內感染。","C":"非一律以72小時界定,須扣除入院時已潛伏者。","D":"最常見部位是泌尿道,非僅ICU與嬰兒室。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"102030-N2-3":{"quick":"院內感染多因濫用抗生素、抵抗力低、侵入性檢查治療機會增加所致。","detail":{"background":"HAI危險因子:抗生素誤用濫用(造成抗藥性菌)、宿主抵抗力低下(老年、免疫不全、慢性病)、侵入性裝置與處置增加(導尿管、靜脈導管、插管、手術)。常見部位以泌尿道感染最高(非呼吸道);入院時已有感染、住院後培養出另一菌且菌落數不足(1000/mL未達顯著菌尿10^5)非HAI;開放性骨折本身帶菌之骨髓炎屬原發非院內感染。選項B正確。","options":{"A":"院內感染最常見部位是泌尿道,非呼吸道。","B":"正確(本題答案)。抗生素濫用、抵抗力低、侵入性處置增加所致。","C":"入院已有感染+菌落數不足非HAI。","D":"開放性骨折之骨髓炎屬原發感染。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"102110-N2-54":{"quick":"切斷感染鏈任一環節,即可阻止感染源傳播。","detail":{"background":"感染鏈六環節:感染原(病原體)→傳染窩(貯主)→離開傳染窩的門戶→傳播途徑→進入易感宿主的門戶→易感宿主。只要有效切斷其中「任一」環節,傳播即被阻止(C正確)。A照顧兩病人後才一併洗手會造成交互感染;B無症狀帶菌者(carrier)亦是感染鏈帶菌者;D清潔劑擦拭達「清潔」非「滅菌」。","options":{"A":"每位病人照護前後都須洗手,不可兩人後一併洗。","B":"無症狀帶菌者也算感染鏈中的帶菌者。","C":"正確(本題答案)。切斷感染鏈任一環節即阻止傳播。","D":"清潔劑只達清潔,非滅菌。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"107030-N2-3":{"quick":"靜脈導管化膿即可臨床判定為院內感染,不一定須先細菌培養才確定。","detail":{"background":"院內感染判定:手術後傷口發炎化膿屬HAI(A正確);入院後潛伏、出院後才出現症狀者亦屬HAI(C正確);多發生於住院72小時以後(D正確)。選項B「靜脈導管化膿須行細菌培養才能確定是否院內感染」錯誤——導管部位出現紅腫熱痛化膿等臨床表現即可判定為導管相關感染(HAI),培養是為找病原與抗生素選擇,非判定HAI的必要前提。","options":{"A":"正確。術後傷口化膿屬院內感染。","B":"錯誤(本題答案)。導管化膿臨床即可判定HAI,不必先培養才算。","C":"正確。出院後才出現的潛伏感染亦屬HAI。","D":"正確。多發生於住院72小時後。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"106030-N2-7":{"quick":"剖腹產新生兒出生第4天臍帶感染=住院期間新發生→符合HAI。","detail":{"background":"HAI須為「住院/醫療照護過程中新發生、入院時不存在也非潛伏期」的感染。C剖腹產新生兒出生後第4天臍帶感染,屬出生後於醫療照護期間新得=HAI(正確)。A栓塞治療隔日發燒未必是感染;B出生48小時診斷德國麻疹屬母體垂直感染(先天);D帶狀疱疹是自身潛伏VZV再活化,非醫療照護新得。","options":{"A":"栓塞後隔日發燒未必為感染,不符。","B":"出生48小時德國麻疹屬先天垂直感染。","C":"正確(本題答案)。出生第4天臍帶感染=住院新得HAI。","D":"帶狀疱疹是自身潛伏病毒再活化,非HAI。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"106110-N2-5":{"quick":"HAI=住院期間新發生者:導管部位紅腫(2)、術後二天傷口感染(5)→「25」。注意答案B。","detail":{"background":"判定HAI須為住院/醫療過程中新發生、入院時不存在者。題項:1胎兒出生36小時梅毒=先天垂直感染(非HAI);2住院注射靜脈導管部位紅腫熱痛=導管相關HAI;3化療藥滲漏致發炎=藥物外滲非感染;4闌尾炎合併腹膜炎=原發疾病進展;5術後二天傷口感染=HAI;6入院本因泌尿道感染住院期間培養出新菌=可能為原本感染或定植,本題不計入。官方答案為「25」(B)。","options":{"A":"含1(先天)、3(外滲非感染)、4(原發)。","B":"正確(本題答案)。2導管感染、5術後傷口感染為HAI。","C":"含3、4、6不符。","D":"含4不符。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"106110-N2-1":{"quick":"外生性院內感染最常見致病菌=金黃色葡萄球菌。","detail":{"background":"院內感染依來源分外生性(交叉感染,病原來自他人/環境/醫護)與內生性(病人自身常在菌)。外生性HAI最常見的致病菌為金黃色葡萄球菌(含MRSA),經由醫護人員雙手、器械、環境傳播,故手部衛生最重要。大腸桿菌多為內生性泌尿道感染來源。區辨:外生性HAI(交叉感染,病原來自他人/環境/醫護雙手)最常見金黃色葡萄球菌;內生性HAI(自身常在菌移位)如大腸桿菌泌尿道感染。前者靠手部衛生防範。","options":{"A":"正確(本題答案)。外生性HAI最常見=金黃色葡萄球菌。","B":"大腸桿菌多為內生性泌尿道感染。","C":"鏈球菌非外生性HAI最常見。","D":"沙門桿菌主要食物媒介傳染。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"107030-N2-2":{"quick":"院內感染最常見致病菌=金黃色葡萄球菌與綠膿桿菌。","detail":{"background":"醫院內爆發的院內感染最常見致病菌為金黃色葡萄球菌(含抗藥性MRSA)與綠膿桿菌(Pseudomonas aeruginosa,常見於呼吸器、潮濕環境、燒傷與免疫低下病人)。兩者皆與侵入性裝置、醫護雙手與環境污染密切相關,故手部衛生與環境消毒為防治重點。","options":{"A":"正確(本題答案)。金黃色葡萄球菌與綠膿桿菌最常見。","B":"白色念珠菌非最常見HAI菌。","C":"肉毒桿菌為食物中毒病原,非HAI主因。","D":"肺炎雙球菌非院內感染最常見菌。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"104030-N2-3":{"quick":"紫外線燈照射床褥屬「移除傳染窩」,不是阻斷傳染途徑。注意答案D為錯誤。","detail":{"background":"感染鏈介入:以外科無菌執行導尿=阻斷病原進入宿主門戶/傳染途徑(A);定期更換氧氣潮濕瓶=移除/消除傳染窩(B);維持插管引流管通暢=維持傳染窩出口通暢避免滯留孳生(C)。選項D「以紫外線燈照射床褥」是對環境貯主(傳染窩)做消毒=移除傳染窩,而非「阻斷傳染途徑」,故為錯誤敘述。","options":{"A":"正確。外科無菌導尿=阻斷傳染途徑。","B":"正確。更換潮濕瓶=移除傳染窩。","C":"正確。維持引流通暢=通暢傳染窩出口。","D":"錯誤(本題答案)。紫外線照床褥是消除傳染窩,非阻斷傳染途徑。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"104100-N2-4":{"quick":"將白血球低下病人單獨安置=保護「易感性宿主」(阻斷易感宿主環節)。","detail":{"background":"保護性(反)隔離是針對免疫低下的「易感性宿主」所設,將病人安置於潔淨/正壓單人室,以阻斷病原進入易感宿主。題目把白血球低下病人安排獨立病室,介入的感染鏈環節是「易感性宿主」(D)。感染鏈六環節:感染原→傳染窩→離開門戶→傳染途徑→進入門戶→易感宿主。保護性隔離把免疫低下者單獨潔淨安置,介入的正是「易感性宿主」環節,使病原無法侵入。","options":{"A":"感染原是病原體本身。","B":"傳染窩是病原貯主。","C":"傳染途徑是傳播方式。","D":"正確(本題答案)。保護易感宿主=阻斷易感性宿主環節。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"107030-N2-6":{"quick":"登革熱「巡倒清刷」清除孑孓孳生源=移除/消滅感染窩。","detail":{"background":"登革熱由病媒蚊(斑蚊)傳播,「巡、倒、清、刷」清除積水容器、消滅孑孓孳生源,是針對病媒(蚊)這一「感染窩/傳染窩」進行消滅,屬阻斷感染鏈中的「感染窩」環節(D)。使用蚊帳、防蚊液才是阻斷「傳染途徑」。感染鏈介入區辨:清除孑孓孳生源=消滅「感染窩(病媒蚊)」;使用蚊帳/防蚊液=阻斷「傳染途徑」;接種疫苗=保護「易感宿主」。登革熱巡倒清刷屬前者。","options":{"A":"進入易感宿主門戶是另一環節。","B":"離開感染窩門戶非清除孳生源。","C":"易感宿主指人本身。","D":"正確(本題答案)。清除孑孓孳生源=消滅感染窩。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"113030-N2-2":{"quick":"登革熱用蚊帳=阻斷「傳染途徑」(病媒蚊叮咬)。","detail":{"background":"登革熱經病媒蚊(斑蚊)叮咬傳播,屬蟲媒傳染(非共通媒介物)。使用蚊帳防止蚊蟲叮咬=阻斷「傳染途徑」(B正確);處理居家積水是消滅孳生源=移除感染窩(非阻斷進入宿主入口);照護病人採「血液體液防護」非外科無菌(登革熱不靠外科無菌阻斷)。感染鏈介入區辨:蚊帳/防蚊液=阻斷「傳染途徑」;清除居家積水(消滅孳生源)=消滅「感染窩」;接種疫苗=保護「易感宿主」。登革熱屬蟲媒傳染。","options":{"A":"登革熱屬蟲媒傳染,非共通媒介物傳播。","B":"正確(本題答案)。蚊帳阻斷病媒叮咬=阻斷傳染途徑。","C":"清除積水是消滅孳生源(感染窩),非阻斷入口。","D":"登革熱非靠外科無菌阻斷,且阻斷的非傳染窩。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"106110-N2-2":{"quick":"痢疾(痢疾桿菌)經糞口=媒介物(食物水)傳染。","detail":{"background":"細菌性痢疾由痢疾桿菌(Shigella)經糞-口途徑傳播,屬媒介物傳染(污染的食物、水、用具)。故傳染途徑為媒介物傳染(B)。防治重點為腸胃道隔離、排泄物消毒、手部衛生與飲食衛生。防治:痢疾經糞口(媒介物)傳染,採腸胃道(接觸)隔離——排泄物先消毒浸泡再沖、餐具消毒、加強手部衛生與飲食衛生;非戴口罩防飛沫的重點。","options":{"A":"飛沫傳染是呼吸道病原。","B":"正確(本題答案)。痢疾經糞口=媒介物傳染。","C":"垂直傳染是母嬰。","D":"空氣傳染是飛沫核(如結核)。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"106110-N2-3":{"quick":"痢疾屬腸道傳染,排泄物須先消毒水浸泡再沖掉。","detail":{"background":"細菌性痢疾經糞口傳染,照護採腸胃道(接觸)隔離:病人排泄物須先以消毒水浸泡消毒後再沖掉(B正確),餐具與用物消毒、加強手部衛生。A「絕對隔離」過度;C訪客戴口罩對糞口傳染非重點(應重視手部衛生);D餐盤煮沸消毒雖可,但B「排泄物消毒」是腸道傳染最關鍵措施。","options":{"A":"腸道傳染採腸胃道隔離即可,非絕對隔離。","B":"正確(本題答案)。排泄物先消毒浸泡再沖掉。","C":"糞口傳染重點是手部衛生,非戴口罩。","D":"餐盤可煮沸,但排泄物消毒為最關鍵。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"108020-N2-70":{"quick":"水痘經「空氣/飛沫」傳染,非媒介物傳染。","detail":{"background":"媒介物(共同媒介)傳染指經污染的食物、水、用具傳播:霍亂、痢疾、傷寒皆屬糞口/食物水媒介傳染。水痘(VZV)經空氣(飛沫核)與接觸(水疱液)傳播,屬空氣傳染而非媒介物傳染,故為「不是藉由媒介物傳染」者(C)。區辨:媒介物(共同媒介)傳染=經污染食物/水/用具(霍亂、痢疾、傷寒,屬糞口);水痘經空氣與接觸(水疱液)傳播,不屬媒介物傳染。","options":{"A":"霍亂經污染水/食物=媒介物傳染。","B":"痢疾經糞口=媒介物傳染。","C":"正確(本題答案)。水痘經空氣傳染,非媒介物。","D":"傷寒經污染食物水=媒介物傳染。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"110110-N2-69":{"quick":"腦膜炎(腦膜炎雙球菌)經「飛沫」傳染,非空氣傳染。","detail":{"background":"空氣傳染(飛沫核,<5μm,可長距離懸浮)經典三病:肺結核、水痘、麻疹(後加SARS/COVID視防護)。流行性感冒主要飛沫但常與空氣防護並論。腦膜炎雙球菌引起的流行性腦脊髓膜炎屬「飛沫傳染」(近距離大飛沫),非典型空氣傳染。故不是藉空氣傳染者為腦膜炎(A)。","options":{"A":"正確(本題答案)。腦膜炎屬飛沫傳染,非空氣傳染。","B":"肺結核屬空氣傳染。","C":"水痘屬空氣傳染。","D":"流感主要飛沫,常與空氣防護並列。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"112030-N2-3":{"quick":"開放性肺結核屬空氣(飛沫核)傳染。","detail":{"background":"空氣傳染由直徑<5μm的飛沫核長距離懸浮傳播,代表疾病:開放性肺結核、水痘、麻疹。淋病=接觸(性)傳染;小兒麻痺=糞口/接觸;百日咳=飛沫傳染。故屬空氣傳染者為開放性肺結核(D),須負壓隔離與N95防護。記憶:空氣傳染(飛沫核<5μm長距離懸浮)經典=肺結核、水痘、麻疹(＋SARS/COVID);淋病為性接觸、小兒麻痺為糞口、百日咳為飛沫(近距離大飛沫)。","options":{"A":"淋病為性接觸傳染。","B":"小兒麻痺為糞口傳染。","C":"百日咳為飛沫傳染。","D":"正確(本題答案)。開放性肺結核屬空氣傳染。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"112110-N2-66":{"quick":"嚴重特殊傳染性肺炎(COVID-19)主要經空氣或飛沫傳染。","detail":{"background":"嚴重特殊傳染性肺炎(COVID-19)主要傳播途徑為飛沫與空氣(氣溶膠,尤其密閉空間或執行產生氣溶膠處置時),亦可經接觸污染物表面間接傳播。主要途徑為空氣或飛沫傳染(A),防護需外科/N95口罩、手部衛生,必要時負壓隔離。防護:COVID-19主要飛沫與空氣(氣溶膠,尤其密閉空間或產生氣溶膠處置時)傳播,亦可接觸污染表面;防護用外科/N95口罩、手部衛生,必要時負壓隔離與護目。","options":{"A":"正確(本題答案)。COVID-19主要經空氣或飛沫傳染。","B":"非病媒傳染。","C":"非主要經食物飲水。","D":"接觸為次要途徑,非主要。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"107110-N2-71":{"quick":"登革熱依傳染病防治法屬「第二類」傳染病。","detail":{"background":"我國傳染病防治法第3條將傳染病分五類:第一類(如天花、SARS,須強制隔離、24小時內通報)、第二類(如登革熱、傷寒、桿菌性痢疾、結核病、霍亂、麻疹等,24小時內通報)、第三類(如腸病毒、流感併發症等,一週內通報)、第四類(如水痘等中央指定)、第五類(如伊波拉、黃熱病、新型A型流感等新興傳染病,24小時內通報)。登革熱為第二類。","options":{"A":"第一類為天花、SARS等。","B":"正確(本題答案)。登革熱為第二類傳染病。","C":"第三類為腸病毒、流感併發症等。","D":"第四類為水痘等中央指定。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"113030-N2-46":{"quick":"結核病依傳染病防治法屬「第二類」傳染病。","detail":{"background":"依傳染病防治法第3條,結核病(肺結核)列為第二類傳染病,須於24小時內通報。第二類尚含登革熱、傷寒、桿菌性痢疾、霍亂、麻疹、白喉、百日咳等。結核病防治重點為空氣傳染防護(負壓、N95)、接觸者追蹤與都治計畫(DOTS)。記憶:傳染病五分類——第一類(天花、SARS)、第二類(結核、登革熱、傷寒、霍亂、麻疹)、第三類(腸病毒、流感併發症)、第四類(水痘等指定)、第五類(伊波拉、MERS、新型A流感)。結核屬第二類。","options":{"A":"第一類為天花、SARS。","B":"正確(本題答案)。結核病屬第二類傳染病。","C":"第三類為腸病毒、流感併發症。","D":"第四類為水痘等。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"109110-N2-69":{"quick":"流感併發重症屬「第三類」傳染病,非第五類。","detail":{"background":"第五類傳染病為新興或國外移入、我國尚未發生或可能造成嚴重危害者,須24小時內通報,包含伊波拉病毒感染、黃熱病、新型A型流感、中東呼吸症候群(MERS)等。選項C「流感併發重症」屬第三類傳染病(一週內通報),不屬第五類,故為本題答案(不屬第五類者)。","options":{"A":"伊波拉屬第五類。","B":"黃熱病屬第五類。","C":"正確(本題答案)。流感併發重症屬第三類,非第五類。","D":"新型A型流感屬第五類。"},"sources":["新文京《基本護理學》感染控制","疾管署《傳染病防治法》"]}},"101110-N2-7":{"quick":"以物理/化學殺滅微生物芽孢與繁殖體=滅菌(sterilization)。","detail":{"background":"名詞辨析:滅菌(sterilization)=殺滅所有微生物含細菌「芽孢」與繁殖體,達完全無菌;消毒(disinfection)=殺滅大部分致病微生物繁殖體,但「不一定」殺死芽孢;清潔(clean)=以清水、清潔劑去除可見污物;無菌(asepsis)=維持無微生物的狀態。能殺滅芽孢與繁殖體者為滅菌。","options":{"A":"消毒不一定殺死芽孢。","B":"正確(本題答案)。殺滅芽孢與繁殖體=滅菌。","C":"清潔只去除可見污物。","D":"無菌是狀態,非殺滅方法。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"112110-N2-3":{"quick":"殺滅病毒、芽孢、繁殖體達完全無菌=滅菌(sterilization)。","detail":{"background":"滅菌(sterilization)是以物理(高壓蒸氣、乾熱、輻射)或化學(戊二醛、環氧乙烷、過氧化氫)方式殺滅「所有」微生物,包含病毒、細菌繁殖體與最頑強的細菌芽孢,達到完全無菌狀態。消毒僅殺繁殖體;隔離是防傳播;清潔是去污。故為滅菌(D)。","options":{"A":"消毒不一定殺芽孢與病毒。","B":"隔離是防傳播措施,非殺菌。","C":"清潔只去除污物。","D":"正確(本題答案)。殺滅含芽孢達完全無菌=滅菌。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"108020-N2-5":{"quick":"可殺繁殖體並含「芽孢」達高程度消毒=2%戊二醛(Cidex)。","detail":{"background":"高程度消毒(high-level disinfection)能殺滅細菌繁殖體、結核菌、病毒、真菌,延長作用時間亦可殺芽孢,常用2%戊二醛(Cidex),適用於內視鏡、橡皮導管等不耐高溫器材。碘酒、來舒、70%酒精屬中低程度消毒,無法可靠殺芽孢。故選2%戊二醛(C)。","options":{"A":"10%碘酒屬中程度消毒,不殺芽孢。","B":"3%來舒屬中低程度消毒。","C":"正確(本題答案)。2%戊二醛可達高程度消毒含芽孢。","D":"70%酒精屬中程度,不殺芽孢。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"104100-N2-6":{"quick":"戊二醛(Cidex)浸泡3~10小時可滅菌、加活化劑有效期14~28天、須先刷洗污漬→「135」。","detail":{"background":"2%活性戊二醛(Cidex)用於內視鏡:浸泡約10~20分可達高層次消毒、浸泡3~10小時可達滅菌(1對);加入活化劑後有效期約14~28天(3對);浸泡前須先刷洗去除污漬以利消毒(5對)。錯誤項:2取出須沖洗不可直接乾燥使用;4在有效期內可重複使用不必每次重泡;6戊二醛具腐蝕性,不宜用於部分金屬。正確為「135」。","options":{"A":"正確(本題答案)。1滅菌、3有效期14~28天、5先刷洗污漬。","B":"2、4、6皆錯。","C":"含6(具腐蝕性)錯。","D":"含2、4錯。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"111030-N2-5":{"quick":"戊二醛(Cidex)或過氧化氫可用於內視鏡、呼吸治療器材消毒。","detail":{"background":"滅菌/消毒法辨析:高壓蒸氣滅菌條件為121°C、15 lb/in²、約15~20分(非90~110°C);2%戊二醛(Cidex)或6~10%過氧化氫(H2O2)適用於不耐高溫的內視鏡、呼吸治療器材化學消毒(B正確);濕熱滅菌傳導效果「優於」乾熱,所需溫度較低;紫外線穿透力差、不能可靠殺芽孢。","options":{"A":"高壓蒸氣為121°C/15 lb,非90~110°C。","B":"正確(本題答案)。戊二醛/過氧化氫適用內視鏡與呼吸器材。","C":"濕熱傳導優於乾熱,所需溫度較低。","D":"紫外線穿透力差,無法可靠殺芽孢。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"112110-N2-4":{"quick":"Cidex(戊二醛)最常用於橡皮導管及內視鏡消毒。","detail":{"background":"戊二醛(Cidex)是化學高層次消毒劑,專用於不耐高溫高壓的器材,如橡皮(橡膠)導管、內視鏡、呼吸治療器材(B正確)。地板浴廁用一般消毒劑(漂白水/來舒);床旁桌用酒精擦拭;分泌物排泄物用漂白水浸泡。區辨:戊二醛(Cidex)用於「不耐高溫高壓」的橡皮導管、內視鏡、呼吸治療器材(高層次化學消毒);耐高溫器械用高壓蒸氣;地板浴廁用漂白水/來舒。","options":{"A":"地板浴廁用漂白水/來舒,非Cidex。","B":"正確(本題答案)。Cidex用於橡皮導管及內視鏡。","C":"床旁桌用酒精擦拭即可。","D":"分泌物排泄物用漂白水浸泡。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"103100-N2-1":{"quick":"巴氏(巴斯德)消毒法=62°C 30分,適用乳製品→「13」。","detail":{"background":"巴氏消毒法(pasteurization)為低溫長時間(LTLT)62~63°C加熱30分鐘,或高溫短時間(HTST)72°C 15秒,主要用於牛奶、果汁等飲品(乳製品)的消毒,殺滅致病繁殖體而保留風味,不殺芽孢。故正確為「1(62°C 30分)、3(適用乳製品)」=「13」。餐盤多用煮沸或高溫清洗,非巴氏消毒。","options":{"A":"正確(本題答案)。62°C 30分、適用乳製品。","B":"含4(餐盤)不妥。","C":"含2(32°C 60分)錯。","D":"含2、4皆錯。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"109110-N2-2":{"quick":"巴斯德消毒法常用於牛奶、果汁飲品消毒。","detail":{"background":"巴斯德(巴氏)消毒法為62~63°C/30分或72°C/15秒的低溫消毒,常用於牛奶、果汁等飲品(A正確),殺滅致病菌繁殖體保留營養風味。它屬中低程度消毒、不殺芽孢,亦非生物抑菌劑;B「62°C 15分達高層次消毒」時間與層次皆不符;C可殺真菌繁殖體;D非生物抑菌劑。","options":{"A":"正確(本題答案)。常用於牛奶、果汁飲品消毒。","B":"巴氏為62°C/30分,非15分且非高層次。","C":"可殺真菌繁殖體,非無法殺真菌。","D":"屬熱力消毒,非生物抑菌劑。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"110110-N2-1":{"quick":"煮沸消毒沸水中加2%碳酸鈉可增加消毒作用。","detail":{"background":"煮沸消毒法(100°C):水量須完全蓋過物品(非與物品等高)、消毒時間自「水沸騰」開始計(非開火即計)、加入2%碳酸鈉(蘇打)可提高沸點與殺菌作用並防器械生鏽(C正確)、玻璃類冷水放入煮沸約10~15分。屬中低程度消毒,不殺芽孢。記憶:煮沸消毒(100°C)水須完全蓋過物品、時間自「水沸騰」起算、加2%碳酸鈉提高沸點與殺菌並防鏽、玻璃冷水放入煮約10~15分;屬中低程度消毒不殺芽孢。","options":{"A":"水須完全蓋過物品,非與物品等高。","B":"時間自水沸騰起算,非開火即算。","C":"正確(本題答案)。加2%碳酸鈉可增強消毒作用。","D":"玻璃類煮沸時間較長(約10~15分)。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"104030-N2-2":{"quick":"化學消毒:溫度升高可加速化學反應、提高殺菌速率。","detail":{"background":"化學消毒原理:溫度每升高約10°C殺菌速率約增一倍(C正確);物品表面須先清潔去污,污物會降低消毒效果(A錯);酒精濃度非愈濃愈好(70~75%殺菌效果最佳,過濃使蛋白快速凝固反阻滲透,B錯);消毒效果與作用時間有關,時間愈長殺菌愈完全(D錯)。","options":{"A":"物品須先清潔,污物降低消毒效果。","B":"酒精70~75%最佳,非愈濃愈好。","C":"正確(本題答案)。溫度升高加速反應、提高殺菌速率。","D":"殺菌效果與消毒時間長短有關。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"109110-N2-4":{"quick":"5.25%漂白水「能」消毒肝炎病毒;稱「無效」錯誤。","detail":{"background":"化學消毒概念:70~75%酒精殺菌效果優於95%(A對,適度水分助蛋白變性);化學消毒時間越長殺菌越完全(C對);溫度每升10°C殺菌度約增一倍(D對)。選項B「5.25%漂白水對肝炎病毒消毒無效」錯誤——次氯酸鈉(漂白水)正是對B、C肝病毒、HIV等有效的消毒劑(常用1:10~1:100稀釋),故為錯誤敘述。","options":{"A":"正確。70~75%酒精效果優於95%。","B":"錯誤(本題答案)。漂白水對肝炎病毒有效,非無效。","C":"正確。消毒時間越長殺菌越完全。","D":"正確。每升10°C殺菌度約增一倍。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"108110-N2-1":{"quick":"塑膠類不耐高溫,不適用高壓蒸氣滅菌。","detail":{"background":"高壓蒸氣滅菌(autoclave,121°C/15 lb/15~20分)適用耐高溫高濕物品:布類、手術金屬器械、水溶性溶液、玻璃。塑膠類、橡膠、內視鏡、不耐熱物品「不適用」(會變形熔化),應改用化學消毒(戊二醛)或低溫滅菌(環氧乙烷、過氧化氫電漿)。故不適用者為塑膠類(B)。","options":{"A":"布類耐高溫,適用高壓蒸氣。","B":"正確(本題答案)。塑膠類不耐高溫,不適用。","C":"手術器械(金屬)適用。","D":"水溶性溶液適用高壓蒸氣。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"105090-N2-8":{"quick":"水痘病人床墊(不耐高溫大件)以紫外線消毒法處理。","detail":{"background":"水痘(VZV)病人出院後,床墊、床褥等大型不耐高溫又不易浸泡的物品,常以紫外線照射消毒(物理消毒)處理。超音波非床墊消毒法;火焰滅菌用於接種環等小金屬;高壓蒸氣滅菌不適用大型床墊。故選紫外線消毒法(A)。原則:大型、不耐高溫又難浸泡的物品(床墊、床褥、棉被)以紫外線照射消毒;耐高溫器械用高壓蒸氣滅菌;小金屬接種環用火焰滅菌。床墊選紫外線。","options":{"A":"正確(本題答案)。床墊大件以紫外線消毒。","B":"超音波非床墊消毒法。","C":"火焰滅菌用於小金屬器材。","D":"床墊不適用高壓蒸氣滅菌。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"112030-N2-5":{"quick":"訪客以75%酒精洗手=消毒(殺滅大部分繁殖體,不殺芽孢)。","detail":{"background":"名詞辨析:清潔(clean)=去除可見污物;消毒(disinfection)=殺滅大部分致病微生物的繁殖體,但不一定殺死芽孢;滅菌(sterilization)=殺滅含芽孢的所有微生物;無菌(asepsis)=維持無微生物狀態。訪客進出醫院以75%酒精乾洗手,是殺滅手部致病繁殖體、管制感染源傳播的「消毒」措施(B)。酒精屬中程度消毒劑,不殺芽孢。","options":{"A":"清潔只去除可見污物,非殺菌。","B":"正確(本題答案)。75%酒精洗手=消毒。","C":"滅菌須殺含芽孢的所有微生物,酒精達不到。","D":"無菌是狀態,非此措施。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"101030-N2-2":{"quick":"疑似結核病人用過之血壓計、聽診器,出院後以75%酒精擦拭消毒。","detail":{"background":"結核病人病室內專用、不耐高溫的血壓計、聽診器等,於病人出院後以75%酒精徹底擦拭消毒(B正確)。A口鼻分泌物衛生紙屬感染性可燃廢棄物應焚化處理(非滅菌再用);C人工紫外線消毒病床傢俱時間敘述/做法不當;D漂白水濃度3.0%過高(地板一般用較低濃度)。","options":{"A":"分泌物衛生紙屬感染性廢棄物應焚化,非高壓滅菌再用。","B":"正確(本題答案)。血壓計聽診器以75%酒精擦拭消毒。","C":"紫外線消毒傢俱做法/時間不當。","D":"漂白水3.0%濃度過高,地板用較低濃度。"},"sources":["新文京《基本護理學》消毒與滅菌","華杏《最新基本護理學》"]}},"101030-N2-6":{"quick":"持無菌敷料鉗握「上1/3」、鉗尖朝下保持閉合。","detail":{"background":"無菌敷料鉗(transfer forceps)操作:手握鉗子的「上1/3」處(B區),鉗尖朝「下」並保持「閉合」以防污染;取放時鉗尖不可高舉(避免液體倒流污染)。選項A正確;B「鉗尖開立」錯(應閉合);C棉球罐蓋取下後蓋口應朝下或內面朝下放、保持在腰部以上,「蓋口朝上」易污染;D打開棉球罐持蓋緣、內面向下。","options":{"A":"正確(本題答案)。手握敷料鉗上1/3處。","B":"鉗尖須閉合,非開立狀態。","C":"罐蓋蓋口應朝下,非朝上。","D":"持蓋緣、內面朝下,非以利旋轉而朝上。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"101110-N2-6":{"quick":"無菌區邊緣1吋範圍視為非無菌區(污染區)。","detail":{"background":"無菌區原則:無菌區邊緣約1吋(2.5cm)範圍視為非無菌(污染)區(C正確);非無菌物品應遠離無菌區至少1吋(非30公分);無菌物品應維持在腰部「以上」且面向無菌區(視線範圍內);拆封但未使用的無菌物品視為已污染,不可留供下一位病人使用。記憶:無菌區「邊緣1吋=污染、腰部以下=污染、視線外=污染、拆封未用=污染」四大污染判準是高頻考點。","options":{"A":"非無菌物品遠離約1吋即可,非30公分。","B":"無菌物品應在腰部「以上」,非以下。","C":"正確(本題答案)。邊緣1吋視為非無菌區。","D":"拆封未用的無菌物品視為污染,不可再供他人。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"104100-N2-12":{"quick":"鋪設無菌區:桌面下垂部分不屬無菌區。","detail":{"background":"鋪無菌區原則:無菌單垂下桌緣以下的部分(下垂部分)視為「非無菌」,不屬無菌區(C正確);無菌物品應放在無菌區邊緣1吋「以內」的安全區(非0.5吋邊緣處);無菌物品應維持在腰部以上、面向且不可背對無菌區;滅菌包有效期依包裝方式而定(非固定14天)。","options":{"A":"應放在邊緣1吋以內安全區,非0.5吋邊緣。","B":"應在「腰部」以上、不可背對,敘述不精確。","C":"正確(本題答案)。桌面下垂部分非無菌區。","D":"滅菌包有效期非固定14天。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"107110-N2-1":{"quick":"打開無菌包時手只能接觸包布四角的「外面」。","detail":{"background":"打開無菌包(外科無菌):先確認包外滅菌指示帶「已變色」且在有效期內(變色才代表已滅菌,A敘述顛倒為錯);第一角應朝「外/遠離自己」先打開(避免手越過無菌區,B錯);打開時手只能接觸包布四角的「外面」、不可碰內面無菌區(C正確);包內物品一經打開即不可再原樣包回供下次使用(D錯)。","options":{"A":"滅菌指示帶須「已變色」才代表滅菌完成,非沒變色。","B":"第一角應朝外/遠離自己先開,非朝向自己。","C":"正確(本題答案)。手只接觸包布四角外面。","D":"打開後不可包回供下次使用。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"107110-N2-2":{"quick":"用畢無菌敷料鉗:夾緊鉗尖、垂直放回泡鑷罐。","detail":{"background":"無菌敷料鉗:手握上1/3、鉗尖朝下並閉合;夾取棉球後在距無菌區適當低高度放入;用畢時夾緊(閉合)鉗尖、垂直放回泡鑷罐中(D正確),避免鉗尖碰罐口污染。A「握中段1/2」錯(握上1/3);B「鉗尖朝上」錯(應朝下);C「距無菌區3公分」放置高度敘述不精確。","options":{"A":"手握上1/3處,非中段1/2。","B":"鉗尖應朝下,非朝上。","C":"放置高度敘述不精確。","D":"正確(本題答案)。夾緊鉗尖垂直放回泡鑷罐。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"103100-N2-11":{"quick":"注射部位消毒:由內向外環狀消毒、待酒精自然乾燥後才插針。","detail":{"background":"注射部位消毒原則:以無菌棉枝沾消毒劑「由內向外」環狀消毒(由乾淨中心向外圍),待消毒劑(酒精)「自然乾燥」後才插針(酒精乾燥時才達殺菌效果,且避免帶入針孔刺激)。故A正確。B、C由外向內或口吹乾、未乾即插針皆錯;D由內向外但「擦拭後即插針」未待乾亦不當。","options":{"A":"正確(本題答案)。由內向外環狀消毒、待酒精自然乾再插針。","B":"不可由外向內,也不可口吹乾。","C":"須待酒精乾燥才插針,非未乾即插。","D":"須待乾燥,非擦拭後即插針。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"103030-N2-4":{"quick":"預防微生物由一處傳播到另一處之技術=內科無菌。","detail":{"background":"內科無菌(medical asepsis,清潔技術)目的在「減少並防止」致病微生物由一個人/地方傳播到另一個人/地方,如洗手、戴口罩、隔離技術、清潔消毒。外科無菌(surgical asepsis)則是「完全去除」所有微生物、維持無菌區於無菌狀態(用於侵入性處置)。題幹描述屬內科無菌(D)。","options":{"A":"消毒是處理物品,非此技術定義。","B":"外科無菌是維持無菌狀態,定義不同。","C":"滅菌是殺滅所有微生物。","D":"正確(本題答案)。防止微生物傳播=內科無菌。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"103100-N2-5":{"quick":"勤洗手、戴口罩是維持內科無菌的要項。","detail":{"background":"內科無菌(清潔技術)要項為勤洗手、戴口罩、清潔消毒、隔離,目的在減少微生物傳播(A正確)。B「以消毒滅菌觀念保持物品無菌」是外科無菌;C內科無菌「適用」於肺結核、腸病毒等隔離照護;D替病人灌腸、擦澡屬清潔護理,正是採內科無菌。區辨:內科無菌(清潔技術)以勤洗手、戴口罩、隔離減少微生物傳播,適用結核/腸病毒等隔離照護與灌腸擦澡;外科無菌才是用消毒滅菌觀念維持物品/無菌區於無菌狀態。","options":{"A":"正確(本題答案)。勤洗手戴口罩是內科無菌要項。","B":"以滅菌保持物品無菌屬外科無菌。","C":"內科無菌適用於結核、腸病毒照護。","D":"灌腸擦澡採內科無菌即可。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"111030-N2-6":{"quick":"傷口換藥屬「外科無菌」技術,不屬內科無菌。","detail":{"background":"內科無菌(清潔技術)包含洗手、戴口罩、隔離技術等減少微生物傳播的措施。傷口換藥(尤其手術傷口)需「外科無菌」技術(維持無菌區、戴無菌手套),屬外科無菌而非內科無菌,故為「不屬於內科無菌」者(B)。區辨:內科無菌(清潔技術)=洗手、戴口罩、隔離,減少微生物傳播;傷口換藥(尤其手術傷口)需外科無菌(戴無菌手套、維持無菌區),屬外科無菌而非內科無菌。","options":{"A":"洗手屬內科無菌。","B":"正確(本題答案)。傷口換藥屬外科無菌技術。","C":"戴口罩屬內科無菌。","D":"隔離技術屬內科無菌。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"111030-N2-4":{"quick":"外科無菌的定義:確保無菌物品維持在無菌狀態。","detail":{"background":"外科無菌(surgical asepsis)是去除所有微生物(含芽孢)並「確保無菌物品/無菌區維持在無菌狀態」的技術(C正確),用於侵入性處置(導尿、注射、手術、傷口換藥)。它非「清潔技術」(A錯,清潔技術指內科無菌);非用來處理病人間交互感染(B,那是內科無菌/隔離);傳染病隔離防治屬內科無菌(D錯)。","options":{"A":"清潔技術是內科無菌,非外科無菌。","B":"處理交互感染是內科無菌/隔離。","C":"正確(本題答案)。確保無菌物品維持無菌狀態。","D":"傳染病隔離防治屬內科無菌。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"114030-N2-2":{"quick":"綁帶式外科口罩上下兩帶都要繫、須同時蓋住口鼻。","detail":{"background":"內科無菌相關:不可戴手套取代洗手(A錯);高於肘部的刷手是「外科無菌」(B錯,內科無菌洗手指尖朝下);綁帶式外科口罩上下兩條帶子都須繫上、須同時完整蓋住口與鼻(C正確);選項D「執行侵入性治療保持無菌區無菌」是「外科無菌」定義(D錯,非內科無菌)。","options":{"A":"戴手套不能取代洗手。","B":"高於肘部刷手是外科無菌,非內科。","C":"正確(本題答案)。口罩上下帶都繫、蓋住口鼻。","D":"維持無菌區是外科無菌定義,非內科。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"114100-N2-1":{"quick":"內科無菌洗手:沖水時指尖朝下、低於肘部(讓水由乾淨往污染流)。","detail":{"background":"內科無菌洗手沖水時雙手指尖「朝下、低於肘部」,使水由相對乾淨的前臂往較污染的手指、再流入水槽(A正確)。外科無菌(刷手)則指尖朝上、高於肘部。B內科無菌非用於侵入性治療(那是外科無菌);C外科無菌非「清潔技術」(那是內科無菌);D戴手套不能取代洗手。","options":{"A":"正確(本題答案)。內科無菌洗手指尖朝下、低於肘部。","B":"侵入性治療用外科無菌,非內科。","C":"清潔技術是內科無菌,非外科。","D":"戴手套不能取代洗手。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"115030-N2-4":{"quick":"外科無菌應用於術後第一天傷口換藥(侵入性/開放傷口)。","detail":{"background":"外科無菌(surgical asepsis)用於侵入性處置與開放性傷口,如手術、導尿、注射、術後傷口換藥。選項D「應用於術後第一天傷口換藥」正確。A「一系列清潔技術」是內科無菌;B「將非無菌物件侷限在清潔區」描述不符外科無菌;C「避免微生物由一處傳到另一處」是內科無菌的目的。","options":{"A":"清潔技術是內科無菌。","B":"敘述不符外科無菌定義。","C":"防止微生物傳播是內科無菌目的。","D":"正確(本題答案)。術後傷口換藥用外科無菌。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"102110-N2-56":{"quick":"保持滅菌物品/無菌區於無菌狀態=外科無菌技術。","detail":{"background":"保持滅菌物品或無菌區域維持於無菌狀態的技術稱為外科無菌技術(surgical asepsis)(B)。隔離技術是限制病原傳播;滅菌是殺滅微生物的處理;內科無菌是減少微生物傳播的清潔技術。維持無菌狀態屬外科無菌。核心區辨:外科無菌=「維持無菌區於無菌狀態」(用於侵入性處置);內科無菌=「減少微生物傳播」的清潔技術(洗手/戴口罩/隔離);滅菌=殺滅微生物的處理過程。","options":{"A":"隔離技術是限制病原傳播。","B":"正確(本題答案)。維持無菌狀態=外科無菌技術。","C":"滅菌是殺滅微生物的處理。","D":"內科無菌是清潔技術,非維持無菌區。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"102110-N2-9":{"quick":"鼻胃灌食不需外科無菌(屬內科無菌即可)。","detail":{"background":"需外科無菌的技術:導尿、靜脈注射、手術傷口換藥、抽腹水、放置中心靜脈導管等侵入無菌部位者。鼻胃灌食是經由與外界相通的消化道進行,屬清潔技術(內科無菌)即可,不需外科無菌。故不是外科無菌應用對象者為鼻胃灌食(B)。判準口訣:侵入「無菌部位」(血管/膀胱/開放傷口/體腔)→外科無菌;經「與外界相通管道」(消化道、會相通的腸道)→內科無菌即可。鼻胃灌食屬後者。","options":{"A":"導尿需外科無菌。","B":"正確(本題答案)。鼻胃灌食用內科無菌即可。","C":"靜脈注射需外科無菌。","D":"手術傷口換藥需外科無菌。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"105090-N2-3":{"quick":"鼻胃管置放不需外科無菌(屬內科無菌)。","detail":{"background":"單次導尿、胸管置放、靜脈注射皆侵入無菌部位,需外科無菌。鼻胃管置放是經鼻進入與外界相通的消化道,屬清潔技術(內科無菌),不需外科無菌操作。故不需外科無菌者為鼻胃管置放(C)。判準:單次導尿、胸管置放、靜脈注射皆侵入無菌部位→外科無菌;鼻胃管經鼻入與外界相通的消化道→內科無菌(清潔技術)即可,不需戴無菌手套鋪無菌區。","options":{"A":"單次導尿需外科無菌。","B":"胸管置放需外科無菌。","C":"正確(本題答案)。鼻胃管置放用內科無菌即可。","D":"靜脈注射需外科無菌。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"107030-N2-4":{"quick":"需外科無菌者:點滴加藥、肌肉注射、單次導尿、傷口換藥→「2345」。","detail":{"background":"需外科無菌(侵入無菌部位):2點滴加藥(進入靜脈)、3肌肉注射、4單次導尿、5傷口換藥。1灌腸是經肛門進入與外界相通的腸道,屬清潔技術(內科無菌),不需外科無菌。故需外科無菌者為「2345」(C)。判準:點滴加藥(入靜脈)、肌肉注射、單次導尿、傷口換藥皆侵入無菌部位→外科無菌;灌腸經肛門入與外界相通的腸道→內科無菌(清潔技術)即可。","options":{"A":"含1灌腸(內科無菌)。","B":"含1灌腸不妥。","C":"正確(本題答案)。2345皆需外科無菌。","D":"含1灌腸不妥。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"110030-N2-8":{"quick":"需外科無菌者:氣管內插管抽痰、結腸造瘻灌洗?實為抽痰與胰島素…答案「23」。","detail":{"background":"本題官方答案為「23」。需採外科無菌原則者:2氣管內插管抽痰(進入下呼吸道無菌部位,須無菌抽痰)、3結腸造瘻灌洗(命題視造瘻口操作須無菌)。1胃造瘻灌食屬清潔技術;4胰島素皮下注射一般採清潔/內科無菌(皮下注射常被歸清潔技術)。依官方答案選「23」。臨床上抽痰確須無菌技術為核心考點。","options":{"A":"1胃造瘻灌食屬清潔技術。","B":"正確(本題答案)。2氣管插管抽痰、3結腸造瘻灌洗須外科無菌。","C":"含4胰島素皮下注射(清潔技術)。","D":"含4不妥。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"113100-N2-3":{"quick":"手術室刷手符合外科無菌、掌部應高於肘部→「24」。","detail":{"background":"手術室外科刷手(surgical scrub)標準:屬「外科無菌」(2);刷手後沖水與保持時雙手「指尖朝上、掌部高於肘部」,使水由指尖流向手肘(讓最乾淨的手部維持最高、污水往肘部流)(4)。1「內科無菌」錯;3「手高舉至肩上」過高且非標準。正確為「24」。","options":{"A":"含1(內科無菌)、3(肩上)不妥。","B":"含1錯。","C":"含3(舉至肩上)不妥。","D":"正確(本題答案)。2外科無菌、4掌部高於肘部。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"103030-N2-5":{"quick":"有效洗手可清除手中約90%以上暫時性細菌。","detail":{"background":"正確的肥皂清水洗手(內科無菌洗手)可去除手部約90%以上的「暫時性菌叢」(transient flora,沾附於皮膚表面、與HAI傳播最相關者)。洗手是預防院內感染最經濟有效的方法。故清除比例為90%以上(D)。延伸:暫時性菌叢(transient flora)沾附皮膚表面、與院內感染傳播最相關,正確洗手可去除90%以上;常在菌叢(resident flora)較難完全去除。洗手是最經濟有效的感控措施。","options":{"A":"60~69%偏低。","B":"70~79%偏低。","C":"80~89%偏低。","D":"正確(本題答案)。有效洗手清除約90%以上暫時性細菌。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"103100-N2-6":{"quick":"外科無菌洗手(刷手)時需用刷子刷洗。","detail":{"background":"洗手法辨析:外科無菌洗手(刷手)需用刷子刷洗指甲、指縫至手肘上、時間較長(C正確);非手術的內科無菌洗手搓洗範圍至手腕「上方約2吋」(非僅到手腕);內科無菌洗手沖水時指尖「朝下」、低於手肘(B敘述朝上錯);擦手紙用畢丟一般垃圾(非感染性,除非污染血體液)。","options":{"A":"內科無菌洗手範圍至手腕上約2吋,非僅到手腕。","B":"內科無菌沖水指尖朝下、低於手肘,非朝上高於手肘。","C":"正確(本題答案)。外科無菌刷手需用刷子刷洗。","D":"擦手紙一般丟普通垃圾。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"107030-N2-1":{"quick":"內科無菌洗手沖水應「指尖朝下、低於手肘」;稱手掌高於手肘錯。","detail":{"background":"洗手原則:清洗至手腕上2吋、每部位搓洗約10次以上(A、B對);外科無菌刷手沖水時指尖朝上、由指尖沖向手肘(D對)。選項C「內科無菌洗手沖水保持手掌高於手肘、水由手指流至手腕」錯誤——內科無菌洗手沖水時應「指尖朝下、雙手低於手肘」,使水由前臂往指尖流入水槽,故C為錯誤敘述。","options":{"A":"正確。清洗至手腕上2吋。","B":"正確。每部位搓洗約10次。","C":"錯誤(本題答案)。內科無菌洗手指尖朝下、低於手肘,非手掌高於手肘。","D":"正確。外科無菌沖水指尖朝上沖向手肘。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"107110-N2-4":{"quick":"內科無菌洗手:每部位搓洗5~10次、過程至少40~60秒。","detail":{"background":"內科無菌洗手原則:以肥皂清水洗手,每一部位至少搓洗5~10次,完整過程至少40~60秒(B正確);洗手步驟口訣「內(掌對掌)、外(掌對背)、夾(指縫)、弓(指背對掌)、大(大拇指)、立(指尖)、腕」等;沖水時指尖朝「下」(非朝上);乾洗手(酒精)時間約20~30秒,與肥皂洗手不完全相同。","options":{"A":"洗手步驟順序敘述不符標準口訣。","B":"正確(本題答案)。每部位搓洗5~10次、至少40~60秒。","C":"內科無菌沖水指尖朝下,非朝上。","D":"乾洗手時間與肥皂洗手不完全相同。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"114100-N2-46":{"quick":"雙手沾染血液體液後應「肥皂清水洗手」,不可僅用酒精乾洗手。","detail":{"background":"手部衛生指引:戴手套不能取代手部衛生、脫手套後仍須洗手(A對);指甲長度不超過0.5cm、不留人工指甲(C對);接觸病人周遭環境後須洗手(D對)。選項B「雙手沾染血液或體液後可使用酒精性乾洗手液」最不適當——當手部有「明顯髒污或沾染血液/體液」時,酒精乾洗手效果不足,應以肥皂與流動清水洗手。","options":{"A":"適當。戴手套不能取代洗手。","B":"最不適當(本題答案)。沾染血液體液須用肥皂清水洗手,非酒精乾洗手。","C":"適當。指甲不超過0.5cm。","D":"適當。接觸病人環境後須洗手。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"106030-N2-1":{"quick":"預防院內感染最經濟有效的方法=正確洗手。","detail":{"background":"手部衛生(正確洗手)是預防院內感染最簡單、最經濟、最有效的方法,可去除約90%以上的暫時性菌叢、阻斷經手交叉傳播。戴手套、口罩、隔離衣為輔助防護,不能取代洗手。故最經濟有效者為正確洗手(C)。延伸:手部衛生五時機(WHO)=接觸病人前、執行無菌操作前、暴露體液後、接觸病人後、接觸病人周遭環境後;戴手套/口罩/隔離衣為輔助,皆不能取代洗手。","options":{"A":"戴手套是輔助,不能取代洗手。","B":"戴口罩防飛沫,非最經濟有效的整體方法。","C":"正確(本題答案)。正確洗手最經濟有效。","D":"穿隔離衣為特定情境防護。"},"sources":["新文京《基本護理學》內外科無菌技術","WHO/CDC手部衛生指引"]}},"101110-N2-2":{"quick":"應採保護性隔離者:大範圍燒傷、骨髓移植(免疫低下)→「24」。","detail":{"background":"保護性(反向)隔離是保護「免疫低下/易感」病人不被外界病原感染,適用對象:大範圍燒傷(皮膚屏障喪失)、骨髓移植/白血病化療、嗜中性白血球低下、嚴重免疫缺損等。肺結核、SARS屬「傳染源」需空氣/飛沫隔離(防病原外傳)。故採保護性隔離者為「2大範圍燒傷、4骨髓移植」=「24」(D)。","options":{"A":"肺結核是傳染源,需空氣隔離非保護隔離。","B":"含1肺結核不妥。","C":"含3 SARS(傳染源)不妥。","D":"正確(本題答案)。2燒傷、4骨髓移植採保護性隔離。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"102030-N2-1":{"quick":"白血病骨髓移植病人應採保護性(反向)隔離。","detail":{"background":"白血病接受骨髓移植病人免疫力極度低下,屬「易感性宿主」,應採保護性(反向)隔離:安置潔淨/正壓單人室、限制訪客、進入者須洗手戴口罩、避免接觸感染源與生鮮食物,以保護病人不被感染。腸胃道/接觸/血液隔離是防病原外傳的隔離,方向相反。記憶:保護(反向)隔離針對「易感宿主」(燒傷/移植/化療/嗜中性球<500),房間採正壓;隔離源頭傳染病(結核/SARS)才採負壓,方向相反勿混淆。","options":{"A":"腸胃道隔離防病原外傳。","B":"接觸隔離防病原外傳。","C":"正確(本題答案)。免疫低下採保護性隔離。","D":"血液隔離防血液病原外傳。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"102030-N2-2":{"quick":"骨髓移植病人餐盤宜先經流動蒸氣消毒(保護性隔離)。","detail":{"background":"保護性隔離照護免疫低下骨髓移植病人:減少病原進入,如餐具/餐盤先經流動蒸氣消毒(B正確)、避免生食、限制訪客、不與其他病童同房。A鼓勵戶外散步(增加感染風險)、C白血病非血液傳染病(無須以「防外傳」為由戴手套照護)、D與其他病童同房易交叉感染,皆不當。","options":{"A":"免疫低下不宜戶外散步,增感染風險。","B":"正確(本題答案)。餐盤先經流動蒸氣消毒。","C":"白血病非血液傳染病,理由錯誤。","D":"不可與其他病童同房,易交叉感染。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"103100-N2-69":{"quick":"成立SARS專責病房鼓勵護理師照顧,依需要層級宜最先滿足「安全」需要。","detail":{"background":"依Maslow需要層級理論,要鼓勵護理人員願意照顧SARS等高危傳染病病人,主管應「最先」滿足其安全需要(safety):提供完整防護裝備、明確感控流程、職前訓練、足夠人力與住所(避免帶病回家),使人員在「安全有保障」下才願投入。生理需要在工作情境已大致滿足,愛與歸屬、自我實現屬更高層次,須先確保安全。","options":{"A":"生理需要在此情境已大致滿足。","B":"正確(本題答案)。最先滿足安全需要(防護、訓練、人力)。","C":"愛與歸屬屬較高層次。","D":"自我實現屬最高層次。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"104030-N2-1":{"quick":"易感宿主(保護隔離)房間採「正壓」,非負壓;稱負壓錯誤。","detail":{"background":"隔離與全面防護:隔離衣使用後腰部、肘部以下視為污染區(A對);口罩潮濕即失防護應更換(C對);脫手套後立即洗手(D對)。選項B「易感宿主之房間採負壓」錯誤——保護易感宿主(免疫低下)的房間應採「正壓」(室內壓力高於外界,使空氣由內往外流,防止外界病原進入);負壓用於空氣傳染源(如結核、SARS)防病原外傳。","options":{"A":"正確。隔離衣腰肘以下視為污染區。","B":"錯誤(本題答案)。易感宿主房間採正壓,非負壓。","C":"正確。口罩潮濕應立即更換。","D":"正確。脫手套後立即洗手。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"105090-N2-1":{"quick":"穿脫隔離衣4要點皆正確(覆蓋及膝、正面領口污染、外面包內、脫後洗手)。注意答案C。","detail":{"background":"穿脫隔離衣原則:1隔離衣須完全覆蓋工作服、長度及膝為佳;2使用後正面、領口、腰以下、袖口皆視為污染區;3脫隔離衣時將外面(污染面)包裹在內側、避免污染擴散;4脫下後立即洗手。本題四項皆為正確操作原則(選項標示混亂,官方答案為C,對應四點皆正確的組合)。核心:隔離衣外面=污染、內面=清潔,脫除時污染面內包並洗手。","options":{"A":"選項標示混亂,以四點皆正確為準。","B":"同上。","C":"正確(本題答案)。四項穿脫隔離衣原則皆正確。","D":"同上。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"112110-N2-5":{"quick":"穿脫隔離衣:污染面內包送洗、覆蓋手腕膝蓋、只持外面、脫後洗手→「124」。","detail":{"background":"穿脫隔離衣原則:1脫除時將污染區(外面)包裹在裡面送洗;2隔離衣須覆蓋至手腕、膝蓋為佳;4脫下後立即洗手——皆正確。選項3「脫隔離衣時只能持拿外面以維持裡面乾淨」錯誤——脫除時應持拿「內面(清潔面)」操作、將外面污染面內包,避免手碰污染面。故正確為「124」(D)。","options":{"A":"含3(持外面)錯。","B":"含3錯。","C":"含3錯。","D":"正確(本題答案)。1污染內包、2覆蓋手腕膝蓋、4脫後洗手。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"109110-N2-3":{"quick":"脫隔離衣時「領口視為清潔區」正確;本題問錯誤者→看其他項。注意答案D。","detail":{"background":"照護H5N1穿脫PPE:脫隔離衣時領口因綁帶處相對少接觸病人,被視為清潔區(A為正確操作);隔離衣若重複使用,掛置時污染面應朝外(B正確);護目設備應在前室脫除(C正確)。選項D「外科手術口罩每8小時更換一次」錯誤——外科口罩一旦潮濕、污染或執行不同病人/處置即應更換,並非固定每8小時才換(且照護空氣/飛沫傳染應使用N95而非僅外科口罩),故D為錯誤敘述。","options":{"A":"正確。脫隔離衣時領口視為清潔區。","B":"正確。重複使用時污染面朝外掛置。","C":"正確。護目設備於前室脫除。","D":"錯誤(本題答案)。口罩潮濕污染即須更換,非固定8小時。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"101110-N2-3":{"quick":"照護SARS後離室:在病室先脫外層手套、前室再依序脫除其餘PPE。","detail":{"background":"照護SARS(空氣/飛沫＋接觸防護,常戴雙層手套)離開時,脫除PPE的污染管控原則:在「病室內」先脫最外層(最污染)手套,進入前室再脫內層手套、隔離衣、帽等,並全程以乾淨手操作、最後洗手。選項C(病室先脫外層手套,前室脫內層手套、另戴手套移除隔離衣)最符合由污到淨、避免污染擴散的原則。A把污染棉棒帶回護理站、B順序與地點不當、D請病人取下口罩皆錯。","options":{"A":"污染棉棒應留病室處理,不可帶回護理站。","B":"脫除地點與順序不當。","C":"正確(本題答案)。病室先脫外層手套,前室再脫其餘PPE。","D":"不可請傳染病人取下口罩。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"105030-N2-1":{"quick":"SARS防護:照護時即需穿戴完整PPE,非「只有接觸體液時」才穿戴。","detail":{"background":"SARS隔離:屬空氣/飛沫傳染,需負壓單獨病房(A對);使用拋棄式或專用醫療用品(C對);床單先高壓滅菌再清洗(D對)。選項B「只有接觸SARS病患的體液時才需穿戴防護用具」錯誤——SARS經飛沫/空氣傳播,進入病室照護即須全程穿戴完整PPE(N95、護目、隔離衣、手套),非僅接觸體液時,故B為錯誤敘述。","options":{"A":"正確。SARS需負壓單獨病房。","B":"錯誤(本題答案)。照護SARS全程須穿戴PPE,非僅接觸體液時。","C":"正確。醫療用品宜拋棄式或專用。","D":"正確。床單先高壓滅菌再清洗。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"103100-N2-4":{"quick":"照護愛滋病人:抽血等接觸血液時須戴手套(標準防護)。","detail":{"background":"愛滋病(HIV)經血液、體液、性接觸傳染,照護採「標準防護(血液體液防護)」,於進行抽血等可能接觸血液的技術時戴手套(C正確)。不需單人房絕對隔離(A錯)、一般交談不需穿隔離衣(B錯,除非可能噴濺體液)、餐盤一般清潔即可不需高壓蒸氣(D錯,HIV不經餐具日常接觸傳播)。","options":{"A":"HIV不需絕對隔離,標準防護即可。","B":"一般交談不需穿隔離衣。","C":"正確(本題答案)。抽血接觸血液時須戴手套。","D":"餐盤一般清潔即可,不需高壓蒸氣。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"107110-N2-7":{"quick":"照護愛滋病人接觸血液:不需「單獨房間」(標準防護即可)。","detail":{"background":"愛滋病經血液體液傳染,採標準防護:洗手、可能接觸血液時戴手套、可能噴濺時戴口罩護目。不需安排「單獨房間」隔離(HIV不經空氣飛沫日常接觸傳播)。故「不須採用」者為單獨房間(B)。原則:愛滋(HIV)經血液體液傳染,採標準防護(洗手、接觸血液戴手套、噴濺戴口罩護目);不需單獨房間隔離(不經空氣飛沫日常接觸傳播),也不需餐具特殊消毒。","options":{"A":"洗手仍須執行。","B":"正確(本題答案)。不需單獨房間,標準防護即可。","C":"接觸血液時須戴手套。","D":"可能噴濺時戴口罩。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"108020-N2-8":{"quick":"MRSA採「接觸隔離」:照護人員須穿戴手套、隔離衣。","detail":{"background":"MRSA(抗藥性金黃色葡萄球菌)主要經接觸傳播,採「接觸隔離(contact precautions)」:照護人員須穿戴手套與隔離衣、專用器材、加強手部衛生,病人宜單人房(一般病房非負壓)。選項C正確。A負壓單人房是空氣傳染所需;B過濾式口罩(N95)是空氣傳染所需;D「以此病人優先照顧」不當(接觸隔離病人宜「最後」照顧以免帶菌)。","options":{"A":"MRSA接觸傳播,不需負壓病房。","B":"過濾式口罩用於空氣傳染,非MRSA必需。","C":"正確(本題答案)。MRSA採接觸隔離,穿戴手套隔離衣。","D":"接觸隔離病人宜最後照顧,非優先。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"106030-N2-5":{"quick":"測量H5N1病人生命徵象,「無菌隔離衣」較不必要(一般隔離衣即可)。","detail":{"background":"H5N1流感經飛沫/接觸傳播,測量生命徵象時需手套、護目設備、外科口罩(或N95)等防護。「無菌隔離衣」較不必要——隔離衣的目的是阻隔污染、保護工作服,使用「一般(清潔)隔離衣」即可,不需「無菌」隔離衣(無菌用於外科無菌處置)。故較不必要者為無菌隔離衣(B)。","options":{"A":"手套必要(接觸防護)。","B":"正確(本題答案)。一般隔離衣即可,不需無菌隔離衣。","C":"護目設備必要(防噴濺)。","D":"外科口罩必要(飛沫防護)。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"107030-N2-5":{"quick":"照護疑似伊波拉病人,「外科口罩」不適宜(須更高等級防護)。","detail":{"background":"伊波拉病毒經血液體液接觸傳播且致死率高,執行常規醫療照護須最高等級PPE:雙層手套、護目設備/面罩、連身型防護衣、N95以上呼吸防護、防水鞋套等。「外科口罩」防護不足(無法可靠阻隔氣溶膠與噴濺),故不適宜者為外科口罩(B)。原則:傳染力強、致死率高的病原(伊波拉)須最高等級PPE——雙層手套、面罩/護目、連身防護衣、N95以上、防水鞋套;外科口罩無法阻隔氣溶膠與噴濺,防護不足。","options":{"A":"手套必要。","B":"正確(本題答案)。外科口罩防護不足,須N95以上。","C":"護目設備必要。","D":"連身型防護衣必要。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"106111-N2-2":{"quick":"水痘屬第四類傳染病,須採「絕對隔離」(空氣＋接觸)。","detail":{"background":"水痘(VZV)經空氣(飛沫核)與接觸(水疱液)傳播、傳染力強,屬第四類傳染病,須採「絕對隔離」(同時空氣＋接觸隔離):負壓單人房、N95、隔離衣手套,照護者宜具免疫力。故為絕對隔離(C)。記憶:水痘=空氣＋接觸雙重傳播→「絕對隔離」(負壓單人房、N95、隔離衣手套),屬第四類傳染病;照護者最好具水痘免疫力(曾感染或接種)。","options":{"A":"保護隔離是保護免疫低下者,方向相反。","B":"接觸隔離不足以防水痘空氣傳播。","C":"正確(本題答案)。水痘須絕對隔離(空氣＋接觸)。","D":"呼吸道隔離不足以涵蓋接觸傳播。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"106111-N2-3":{"quick":"水痘病人「如廁後排泄物無須漂白水浸泡10分鐘」;該措施為錯誤。","detail":{"background":"照護水痘病人:水痘經談話咳嗽(空氣飛沫)傳染,接觸時戴口罩(A對);擦拭水疱的衛生紙屬感染性垃圾(C對);出院後房間須消毒並終期消毒(D對)。選項B「如廁後排泄物需先用漂白水浸泡10分鐘才可沖掉」錯誤——水痘主要經呼吸道與水疱液接觸傳播,並非腸道(糞口)傳染,排泄物不需特別漂白水浸泡消毒,故B為錯誤的護理措施。","options":{"A":"正確。水痘經空氣飛沫,交談戴口罩。","B":"錯誤(本題答案)。水痘非糞口傳染,排泄物不需漂白水浸泡。","C":"正確。擦水疱衛生紙屬感染性垃圾。","D":"正確。出院後須房間消毒與終期消毒。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"111110-N2-4":{"quick":"水痘須採接觸「且」空氣隔離並單獨負壓房;稱「無須單獨房間」錯誤。","detail":{"background":"感染控制措施:嗜中性白血球<500/mm³應採保護性隔離(A對);疥瘡採接觸隔離(B對);德國麻疹採飛沫隔離(C對)。選項D「水痘採接觸性隔離但無須單獨房間」錯誤——水痘同時經空氣與接觸傳播,須採「空氣＋接觸」隔離並安置「單獨負壓房間」,不可不單獨隔離,故D為錯誤敘述。","options":{"A":"正確。嗜中性球<500採保護性隔離。","B":"正確。疥瘡採接觸隔離。","C":"正確。德國麻疹採飛沫隔離。","D":"錯誤(本題答案)。水痘須空氣＋接觸隔離且單獨負壓房,非無須單獨房間。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"114170-N2-1":{"quick":"肺結核應採「空氣傳染防護措施」(負壓、N95)。","detail":{"background":"隔離措施配對:肺結核(空氣傳染)應採空氣傳染防護:負壓隔離房、N95口罩(D正確)。A化療病人是免疫低下→應採保護性隔離(非接觸防護);B疥瘡→接觸隔離(非保護性);C骨髓移植病人→保護性隔離(非接觸防護)。故最適當者為D。隔離配對口訣:結核/水痘/麻疹=空氣;百日咳/流感/腦膜炎=飛沫;MRSA/疥瘡/腸道菌=接觸;化療/移植/嗜中性球低=保護性(反向)隔離。肺結核採空氣防護。","options":{"A":"化療病人應採保護性隔離,非接觸防護。","B":"疥瘡應採接觸隔離,非保護性。","C":"骨髓移植應採保護性隔離,非接觸防護。","D":"正確(本題答案)。肺結核採空氣傳染防護。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"108020-N2-1":{"quick":"疑似新型流感住院,首要衛教=請病人勤洗手、戴口罩以防傳播。","detail":{"background":"疑似新型流感(飛沫/接觸傳播)病人住院,護理人員「首先」應提供的衛教是請病人勤洗手、咳嗽禮節並戴口罩,以阻斷飛沫與接觸傳播(D正確)。A安排負壓病房是醫護的環境安排非對「病人」的首要衛教;B、C限制聊天與探訪屬次要管理措施。以病人可立即執行的手部衛生與戴口罩為首要衛教。","options":{"A":"負壓病房是環境安排,非對病人的首要衛教。","B":"限制聊天非首要衛教重點。","C":"限制探訪屬次要管理。","D":"正確(本題答案)。首要衛教為勤洗手、戴口罩防傳播。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"108020-N2-2":{"quick":"更換胸管傷口敷料:戴無菌手套後雙手保持腰部以上、視線範圍內。","detail":{"background":"更換胸管傷口敷料屬外科無菌:戴無菌手套後雙手須維持在「腰部以上、視線範圍以內」(避免越出視線而污染)——選項C接近此原則(膝蓋以上、視線內,核心是維持在可視且高於腰部的無菌範圍)。A無菌容器蓋打開後內面朝上放或蓋回以維持無菌(非隨意置桌);B拆無菌敷料應以無菌鉗夾取、非以手指抓;D非無菌物品應遠離無菌區至少1吋以上。本題以C為正確操作概念。","options":{"A":"無菌容器蓋不可隨意置桌面,應維持無菌。","B":"無菌敷料應以無菌鉗夾取,非手指抓。","C":"正確(本題答案)。戴無菌手套後雙手保持高位、視線範圍內。","D":"非無菌物品應遠離無菌區1吋以上。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"113180-N2-40":{"quick":"病房放置導管或腰椎穿刺:防護=手套、口罩、隔離衣、護目鏡。","detail":{"background":"在病房執行放置中心導管、腰椎穿刺等侵入性無菌處置時,應採「最大無菌屏障」並防噴濺:手套(無菌)、口罩、隔離衣(無菌)、護目鏡/面罩,必要時加髮帽。選項D「手套、口罩、隔離衣、護目鏡」最完整且符合無菌屏障與防噴濺,故為正確。其餘選項缺護目或缺隔離衣等防護。","options":{"A":"缺護目鏡(防噴濺)。","B":"缺隔離衣(無菌屏障)。","C":"缺護目鏡(防噴濺)。","D":"正確(本題答案)。手套、口罩、隔離衣、護目鏡最完整。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"101030-N2-1":{"quick":"照護疑似結核病人:照顧前後須洗手,洗手時間至少約30秒以上。","detail":{"background":"照護疑似結核(空氣傳染)病人之感染控制應用:照顧前後一定要洗手,內科無菌洗手時間至少約30秒(完整流程40~60秒)(A正確)。B「結核病人為易感染宿主、需外科無菌」錯(結核病人是傳染源,需空氣防護而非把他當易感宿主);C一般照護穿戴N95與隔離衣等,口罩以N95為主,敘述不完整;D安排健保床與感控無關。以洗手為基本且正確的感控措施。","options":{"A":"正確(本題答案)。照顧前後須洗手,時間至少約30秒。","B":"結核病人是傳染源,需空氣防護,非當易感宿主用外科無菌。","C":"結核空氣傳染防護以N95為主,敘述不完整。","D":"安排健保床與感染控制無關。"},"sources":["新文京《基本護理學》隔離技術","CDC隔離防護指引(Standard/Transmission-based Precautions)"]}},"101030-N2-27":{"quick":"單次導尿須用無菌技術,但每次導尿量不應超過1000 mL;「不可超過500」為較舊標準。注意答案B為錯誤。","detail":{"background":"本題問「錯誤」者,答案B。單次導尿:採屈膝仰臥式(A對);消毒尿道口由上而下、遠側小陰唇→近側小陰唇→中央尿道口(C對);一次導尿量過去教材有「不超過500~1000 mL」之說以免腹壓驟降致虛脫。選項B敘述「將潤滑劑擠在紗布上再潤滑導尿管」之操作被命題判為錯誤(無菌導尿應以無菌方式潤滑導尿管頭端、且潤滑長度與方式須符合規範);依官方答案B為錯誤敘述。","options":{"A":"正確。採屈膝仰臥式。","B":"錯誤(本題答案)。此潤滑操作敘述不符無菌導尿規範。","C":"正確。由上而下、遠側→近側→中央尿道口消毒。","D":"單次導尿量上限(舊標準500、新1000)為避免腹壓驟降。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"102110-N2-27":{"quick":"存留導尿:選16~18 Fr.導尿管。","detail":{"background":"成人存留(留置)導尿:採外科無菌技術、以「優碘(非碘酒)」消毒會陰尿道口;選用合適管徑一般成人為16~18 Fr.(B正確);導尿管插入長度女性約5~7.5cm、男性約17~20cm(非僅10cm);插入後打入約5~10 mL(部分10 mL)無菌「蒸餾水」於水囊固定(非20cc)。故正確為B。","options":{"A":"應用外科無菌、以優碘消毒(非內科無菌、碘酒)。","B":"正確(本題答案)。成人導尿管選16~18 Fr.。","C":"插入長度女約5~7.5cm,非10cm。","D":"水囊打入約5~10cc,非20cc。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"114100-N2-11":{"quick":"女性存留導尿:水球固定後導尿管應固定於「大腿內側」,非下腹部。注意答案D為錯誤。","detail":{"background":"女性存留導尿(外科無菌):先鋪洞巾再消毒(A對)、以水性潤滑劑潤滑導尿管頭5~7cm(B對)、確認引流通暢後打入5~10mL無菌蒸餾水固定水球(C對)。選項D「水球固定後導尿管直接固定於下腹部」錯誤——女性留置導尿管應固定於「大腿內側」(男性才固定於下腹部以減少尿道壓迫),故D為錯誤敘述。","options":{"A":"正確。先鋪洞巾再消毒。","B":"正確。潤滑導尿管頭5~7cm。","C":"正確。打入5~10mL固定水球。","D":"錯誤(本題答案)。女性應固定於大腿內側,非下腹部。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"109110-N2-38":{"quick":"成人女性存留導尿應固定於「大腿內側」(男性固定下腹部)，避免尿道牽扯受壓，故選D。","detail":{"background":"本題官方答案B。成人女性無菌導尿:消毒順序應「由內(尿道口)往外、遠近側小陰唇」依規範(A順序敘述不符);存留導尿管水囊注入約「水囊標示量(常見約10mL,本題採12~15mL生理食鹽水)」固定(B);單次導尿量上限避免腹壓驟降(C「不超過1000mL」概念對但本題非答案);存留導尿管女性固定於大腿內側(D「大腿內側」概念對)。依官方答案以B為正確。臨床要點:水囊以無菌液體填充至標示量。","options":{"A":"錯誤：消毒應「由遠側小陰唇→近側小陰唇→中央尿道口」，尿道口最後消毒；題述順序相反。","B":"錯誤：水囊應注入「無菌蒸餾水約10 mL」(依水囊標示)，非12~15 mL生理食鹽水(食鹽水易結晶阻塞)。","C":"單次導尿量過多時宜分次引流，但「上限1,000 mL」非本題正解重點。","D":"正解：女性存留導尿管固定於大腿內側，避免尿道受壓。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"104100-N2-31":{"quick":"存留導尿病人會陰沖洗順序:尿道口→遠側小陰唇→近側小陰唇→遠側大陰唇→近側大陰唇。","detail":{"background":"會陰部清潔(留置導尿)沖洗順序由「最乾淨(中央尿道口)往外、由遠側往近側」:尿道口→遠側小陰唇→近側小陰唇→遠側大陰唇→近側大陰唇(A正確,由內而外、一枝棉枝擦一處即丟)。B沖洗壺口朝床尾且重複使用棉枝(錯,棉枝一次一丟);C採屈膝仰臥而非左側臥;D會陰沖洗本身為清潔(內科無菌)但留置導尿口的清潔仍重視無菌原則,本題以A順序為正確。","options":{"A":"正確(本題答案)。尿道口→遠側→近側小陰唇→遠側→近側大陰唇。","B":"棉枝一次一丟,不可重複使用。","C":"會陰沖洗採屈膝仰臥,非左側臥。","D":"留置導尿口清潔重視無菌,敘述不精確。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"102030-N2-33":{"quick":"留置尿管取尿檢體:先夾管再以無菌空針自橡皮接頭處抽取。","detail":{"background":"留置(存留)導尿病人採集尿液檢體:先以管夾夾住引流管10~15分鐘使尿液蓄積於導尿管,再以無菌技術、消毒導尿管上的橡皮採檢口後,用無菌空針自橡皮接頭處抽取尿液(C正確)。不可從蓄尿袋取(已污染、非新鮮尿)、不可換新管、不可鬆開接口(破壞密閉系統增感染)。","options":{"A":"蓄尿袋的尿已久置且污染,不可採。","B":"不需更換新導尿管。","C":"正確(本題答案)。無菌空針自橡皮接頭處抽取。","D":"不可鬆開接口,破壞密閉系統增感染。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"111030-N2-30":{"quick":"留置導尿採尿培養:消毒橡皮接頭後以無菌空針抽取尿液。","detail":{"background":"留置導尿管採尿做細菌培養:應以無菌空針自導尿管上的「橡皮採檢接頭」處,消毒後抽取新鮮尿液(A正確),維持密閉系統無菌。不可自蓄尿袋開口取(久置污染)、不可分開導尿管與蓄尿袋接口(破壞密閉增感染)、不可拔管採中段尿(不必要且增感染)。技巧:留置導尿採尿培養須維持密閉系統——消毒導尿管橡皮採檢口後以無菌空針抽取新鮮尿;不可自蓄尿袋取(久置污染)、不可分開接口(破壞密閉增感染)。","options":{"A":"正確(本題答案)。消毒橡皮接頭後以無菌空針抽取。","B":"蓄尿袋的尿久置污染,不適合培養。","C":"分開接口破壞密閉系統,增感染。","D":"不需拔管採中段尿。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"111030-N2-51":{"quick":"尿液培養:以「導尿」方式收集中段尿於無菌標本容器。注意答案B。","detail":{"background":"尿液「培養」需無菌採檢:可以無菌導尿方式收集尿液於無菌標本容器(B正確,污染最少);一般中段尿培養則須清潔會陰、解掉前段尿沖洗尿道口後再以無菌容器盛接中段尿。選項A「以清潔方式」收集易污染、不適培養;C、D收集整日尿(24小時尿)是用於定量分析(如肌酸酐廓清)而非「培養」。本題以B為正確。","options":{"A":"清潔方式易污染,不適合培養。","B":"正確(本題答案)。以導尿方式收集中段尿於無菌容器。","C":"整日尿用於定量,非培養。","D":"整日尿用於定量,非培養。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"110030-N2-51":{"quick":"留中段尿:先解掉前段小便沖洗尿道口,再以無菌容器盛取中段尿。","detail":{"background":"中段尿(clean-catch midstream)採檢護理指導:先清潔會陰(女性由「前往後」消毒,非後往前)、解掉前段小便沖洗尿道口後,再以無菌容器盛接中段尿(B正確)。所需尿量約10~30 mL即可(非120 mL以上);應立即送檢(非留置4小時)。","options":{"A":"女性消毒會陰應由前往後,非後往前。","B":"正確(本題答案)。先解前段尿沖洗,再取中段尿。","C":"採檢尿量約10~30mL即可,非120mL以上。","D":"尿檢體應立即送檢,不可久置。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"111110-N2-5":{"quick":"導尿時「於無菌區抽取無菌蒸餾水」並不違反無菌原則;違反者為其他。注意答案D。","detail":{"background":"本題問「違反無菌原則」者。導尿無菌操作:注意導尿包滅菌有效期(A正確);導尿管置於無菌區邊緣1吋以內(B正確,1吋外視為污染);消毒會陰用過的棉棒應丟無菌區外的垃圾袋(C正確)。選項D「消毒會陰後可於無菌區抽取無菌蒸餾水」——消毒會陰的手已視為污染,若以該手在無菌區操作抽取會污染無菌區,故此操作違反無菌原則(D為本題答案,違反者)。","options":{"A":"未違反。注意導尿包滅菌有效期。","B":"未違反。導尿管置於無菌區邊緣1吋以內。","C":"未違反。污染棉棒丟無菌區外。","D":"違反(本題答案)。消毒會陰後該手已污染,不可在無菌區抽蒸餾水。"},"sources":["新文京《基本護理學》無菌導尿技術","華杏《最新基本護理學》排泄需要"]}},"104030-N2-51":{"quick":"感染病房終期消毒「清理後不可立即鋪床」;須消毒處理後才鋪。注意答案B為錯誤。","detail":{"background":"感染病房終期消毒(terminal disinfection):病房用物先以紫外線照射約30分後再拆布單(A對);耐高溫用物先高壓蒸氣滅菌再送洗(C對);沾體液地板以漂白水清洗(D對)。選項B「清理病房後便可以立即鋪床」錯誤——終期消毒須完成全面消毒、必要時空置通風後才可鋪床備用,不可清理後立即鋪床,故B為錯誤敘述。","options":{"A":"正確。先紫外線照射再拆布單。","B":"錯誤(本題答案)。終期消毒後不可立即鋪床,須完成消毒處理。","C":"正確。耐高溫用物先高壓滅菌再送洗。","D":"正確。沾體液地板以漂白水清洗。"},"sources":["新文京《基本護理學》病人單位與終期消毒"]}},"104100-N2-55":{"quick":"傳染病人出院:有血跡體液之牆壁地板以漂白水清洗。","detail":{"background":"傳染性病人出院後病人單位處理:有血跡、體液之牆壁或地板以漂白水(次氯酸鈉)清洗消毒(D正確)。A使用過布單屬感染性應放感染性袋(非一般袋);B紫外線照射時間/做法應約30分(15分不足);C布單、不鏽鋼容器應「先消毒/滅菌再清洗」或依材質處理,敘述次序不當。以D為正確。","options":{"A":"感染病人布單應放感染性袋,非一般袋。","B":"紫外線照射約30分,15分不足。","C":"布單與容器處理次序/方式不當。","D":"正確(本題答案)。血跡體液牆地以漂白水清洗。"},"sources":["新文京《基本護理學》病人單位與終期消毒"]}},"110110-N2-52":{"quick":"接觸性隔離病人出院:病床先紫外線照射30分後再以消毒液擦拭清理。","detail":{"background":"接觸性隔離病人出院後病人單位處理:病床應先以紫外線照射約30分鐘後,再以消毒液擦拭清理(C正確)。A病人服屬感染性應放感染性污衣袋(非一般污衣桶);B枕頭一般以紫外線或依材質消毒,非一律高壓蒸氣(且需註明);D點滴幫浦以75%(非95%)酒精擦拭、晾乾時間敘述過長。以C為正確。","options":{"A":"感染病人服應放感染性污衣袋,非一般污衣桶。","B":"枕頭依材質消毒,非一律高壓蒸氣。","C":"正確(本題答案)。病床先紫外線30分再消毒液擦拭。","D":"幫浦用75%酒精,非95%。"},"sources":["新文京《基本護理學》病人單位與終期消毒"]}},"108020-N2-11":{"quick":"肺結核病人出院後病房:先以紫外線燈照射30分鐘後再開始清理。","detail":{"background":"肺結核(空氣傳染)病人出院後病室終期消毒:先以紫外線燈照射約30分鐘殺滅空氣中與表面結核菌後,再開始清理(A正確)。B使用過布單應視為感染性處理(非直接丟、且勿污染);C血跡消毒濃度/藥劑敘述不當;D空置時間敘述不必要。以A為正確。原則:肺結核(空氣傳染)病人出院後病室終期消毒,先以紫外線燈照射約30分鐘殺滅空氣與表面結核菌,再開始清理;感染性布單須妥善處理勿污染環境。","options":{"A":"正確(本題答案)。先紫外線照射30分鐘再清理。","B":"感染性布單須妥善處理,非直接丟置。","C":"血跡消毒藥劑/濃度敘述不當。","D":"空置時間敘述不必要。"},"sources":["新文京《基本護理學》病人單位與終期消毒"]}},"114100-N2-33":{"quick":"終期消毒:有血跡分泌物之牆壁地板以漂白水清洗擦拭。","detail":{"background":"傳染性病人出院後終期消毒(terminal disinfection):有血跡、分泌物之牆壁或地板以漂白水(次氯酸鈉)清洗擦拭(C正確)。A紫外線照射應約30分(15分不足);B病人衣物布單屬感染性應放感染性(紅色)袋,非白色;D布單、不鏽鋼容器應依感染性流程處理。以C為正確。","options":{"A":"紫外線照射約30分,15分不足。","B":"感染性布單應放感染性袋,非白色。","C":"正確(本題答案)。血跡分泌物牆地以漂白水清洗。","D":"布單容器須依感染性流程處理。"},"sources":["新文京《基本護理學》病人單位與終期消毒"]}},"115030-N2-33":{"quick":"上呼吸道傳染病人出院:床褥及枕頭送洗前以紫外線燈照射60分鐘。","detail":{"background":"上呼吸道傳染性疾病病人出院後病室終期消毒:不耐浸泡的床褥、枕頭等大件,送洗前以紫外線燈照射約60分鐘消毒(C正確)。A來舒濃度/做法、B漂白水濃度0.01%過低(血跡分泌物用較高濃度如1:10~1:100)、D紫外線15分照射時間不足。以C為正確。","options":{"A":"來舒擦拭濃度/做法敘述不當。","B":"漂白水0.01%濃度過低,血跡用較高濃度。","C":"正確(本題答案)。床褥枕頭送洗前紫外線照射60分鐘。","D":"紫外線15分照射時間不足。"},"sources":["新文京《基本護理學》病人單位與終期消毒"]}},"113180-N2-32":{"quick":"傳染病病房病人出院處理:護理師應採隔離技術,穿戴口罩、手套及隔離衣。","detail":{"background":"處理傳染病病房出院後的污染病人單位時,護理師本身仍須採「隔離技術」防護:穿戴口罩、手套及隔離衣,避免處理過程中受污染(A正確)。B次氯酸鈉0.02%濃度偏低(血跡用較高濃度);C鋼製彎盆應高壓蒸氣滅菌或依規範,來舒0.5%敘述不當;D太空被枕頭以紫外線/送洗處理,非黑色袋隔絕48小時。以A為正確。","options":{"A":"正確(本題答案)。處理時護理師須穿戴口罩手套隔離衣。","B":"次氯酸鈉0.02%濃度偏低。","C":"鋼製彎盆應高壓滅菌,來舒敘述不當。","D":"被枕以紫外線/送洗處理,非黑袋隔絕48小時。"},"sources":["新文京《基本護理學》病人單位與終期消毒"]}},"114100-N2-39":{"quick":"一般病室清潔:使用過被服以71°C以上高溫清洗25分鐘。","detail":{"background":"醫院一般病室清潔原則:使用過的被服應以71°C以上高溫清洗約25分鐘以達熱力消毒(B正確);病床床旁應以消毒劑擦拭(非僅清水,A錯);抹布拖把不可「抖動」(會揚塵散播微生物,C錯);清潔順序應「由最乾淨往最髒、由上而下」(非由最大污染區開始,D錯)。","options":{"A":"病床床旁應以消毒劑擦拭,非僅清水。","B":"正確(本題答案)。被服以71°C以上高溫洗25分鐘。","C":"抹布拖把不可抖動,避免揚塵散菌。","D":"清潔應由乾淨往髒,非由最污染區開始。"},"sources":["新文京《基本護理學》病人單位與終期消毒"]}},"106030-N2-52":{"quick":"出院後病人單位「一般清潔消毒即可,無須無菌消毒」;稱須無菌消毒為錯誤。","detail":{"background":"出院護理:護理師應於病人入院時即擬定出院計畫(A對);教導返家按時服藥並注意副作用(B對);評估可運用的社區資源(C對)。選項D「病人出院後須將病人單位進行無菌消毒」錯誤——一般病人出院後的病人單位只需「清潔與消毒(終期清潔)」即可,並非要達「無菌(滅菌)」程度;只有特殊感染病人才需加強終期消毒,但仍非「無菌」,故D為錯誤敘述。","options":{"A":"正確。入院時即擬定出院計畫。","B":"正確。教導按時服藥並注意副作用。","C":"正確。評估社區資源。","D":"錯誤(本題答案)。病人單位清潔消毒即可,無須達無菌。"},"sources":["新文京《基本護理學》病人單位與終期消毒"]}},"103030-N2-1":{"quick":"醫療廢棄物專用容器/垃圾桶八分滿即應綑紮或移除。","detail":{"background":"安全醫療環境:醫療廢棄物專用容器或垃圾桶達「八分滿」即應綑紮封口或移除(避免溢出、針扎與污染擴散)(D正確)。A注射後空針「不可回套」(避免針扎,應直接丟入利器盒);B使用後尿袋屬感染性廢棄物(非一般垃圾);C感染性可燃廢棄物容器是「紅色」(非黃色,黃色為感染性不可燃/利器)。","options":{"A":"空針不可回套,直接丟利器盒。","B":"使用後尿袋屬感染性廢棄物。","C":"感染性可燃廢棄物容器是紅色,非黃色。","D":"正確(本題答案)。容器八分滿即綑紮移除。"},"sources":["行政院環保署《醫療廢棄物管理》","新文京《基本護理學》"]}},"105090-N2-7":{"quick":"化療後點滴管屬「基因毒性(細胞毒性)廢棄物」,不應丟「感染性紅色」容器。注意答案A為錯誤。","detail":{"background":"感染性廢棄物分類:可燃感染性(紅色)、不可燃感染性與利器(黃色)。B空針針頭→黃色利器盒(對);C胸腔引流瓶引流管→紅色感染性(對);D手術刀片縫針→黃色利器盒(對)。選項A「化學治療後之靜脈點滴管棄置於感染性紅色容器」錯誤——化療廢棄物屬「基因毒性/細胞毒性事業廢棄物」,應以專用的細胞毒性廢棄物容器(常為紫色/特定標示)處理,不可當一般感染性紅色廢棄物,故A為錯誤敘述。","options":{"A":"錯誤(本題答案)。化療點滴管屬細胞毒性廢棄物,須專用容器,非感染性紅色。","B":"正確。空針針頭丟黃色利器盒。","C":"正確。胸腔引流瓶管丟紅色感染性。","D":"正確。刀片縫針丟黃色利器盒。"},"sources":["行政院環保署《醫療廢棄物管理》","新文京《基本護理學》"]}},"107110-N2-73":{"quick":"無污染性醫療用品「不需」儘量使用一次性產品;此敘述為錯誤。","detail":{"background":"醫療廢棄物管理:分一般性與感染性廢棄物(A對);避免不必要的廢棄物儲存以降低污染(C對);遵守包裝、標示、儲存規定(D對)。選項B「無污染性的醫療用品應儘量使用一次性產品」錯誤——為減量(reduce)以降低環境負荷,無污染性、可重複使用的醫療用品應「儘量重複使用」而非改用一次性產品,故B為錯誤敘述(增加廢棄物)。","options":{"A":"正確。分一般性與感染性廢棄物。","B":"錯誤(本題答案)。無污染用品應儘量重複使用,非改用一次性。","C":"正確。避免不必要儲存以降污染。","D":"正確。遵守包裝標示儲存規定。"},"sources":["行政院環保署《醫療廢棄物管理》","新文京《基本護理學》"]}},"109030-N2-72":{"quick":"乾淨點滴瓶屬一般廢棄物,非生物醫療(感染性)廢棄物。","detail":{"background":"生物醫療(感染性)廢棄物含:注射針頭、手術縫合針(利器)、沾血體液的木質壓舌板等。乾淨(未使用、未污染)的點滴瓶屬一般事業廢棄物,可回收或一般處理,非生物醫療廢棄物。故非生物醫療廢棄物者為乾淨點滴瓶(C)。區辨:生物醫療(感染性)廢棄物=沾血體液或具感染性者(針頭、縫合針、沾染壓舌板);乾淨未使用的點滴瓶屬一般事業廢棄物,可回收,非感染性。","options":{"A":"注射針頭屬生物醫療廢棄物(利器)。","B":"手術縫合針屬生物醫療廢棄物。","C":"正確(本題答案)。乾淨點滴瓶屬一般廢棄物。","D":"沾染的木質壓舌板屬生物醫療廢棄物。"},"sources":["行政院環保署《醫療廢棄物管理》","新文京《基本護理學》"]}},"109110-N2-13":{"quick":"手術後手套、紗布、排泄用具應以「紅色」感染性袋收集;稱藍色為錯誤。","detail":{"background":"醫療廢棄物收集:非有害藥用ampule/vial瓶以白色透明袋(A對);胸腔引流瓶管→紅色感染性容器(C對);空針針頭→黃色利器盒(D對)。選項B「手術後手套、紗布、排泄用具需以藍色透明塑膠袋收集」錯誤——此類沾染血液體液的可燃感染性廢棄物應以「紅色」感染性垃圾袋收集,藍色非感染性廢棄物標準色,故B為錯誤敘述。","options":{"A":"正確。非有害藥用瓶以白色透明袋。","B":"錯誤(本題答案)。感染性手套紗布應以紅色袋,非藍色。","C":"正確。胸腔引流瓶管丟紅色感染性容器。","D":"正確。空針針頭丟黃色利器盒。"},"sources":["行政院環保署《醫療廢棄物管理》","新文京《基本護理學》"]}},"110030-N2-77":{"quick":"一般性醫療廢棄物=非有害藥用玻璃瓶或藥水容器。","detail":{"background":"一般性(非感染性)醫療廢棄物指未受血液體液污染、非利器、非有害者,如非有害藥用玻璃瓶或藥水容器(D正確)。A針頭相連注射筒、輸液導管→感染性;B蓋玻片、破裂玻璃器皿→利器/感染性;C致癌細胞毒素→有害(基因毒性)廢棄物。故屬一般性者為D。區辨:一般性醫療廢棄物=未污染、非利器、非有害者(如非有害藥用玻璃瓶);針頭注射筒、破玻璃利器、細胞毒素(致癌)皆屬感染性或有害廢棄物,須專門處置。","options":{"A":"針頭注射筒輸液導管屬感染性廢棄物。","B":"蓋玻片破玻璃屬利器/感染性。","C":"致癌細胞毒素屬有害廢棄物。","D":"正確(本題答案)。非有害藥用玻璃瓶屬一般性廢棄物。"},"sources":["行政院環保署《醫療廢棄物管理》","新文京《基本護理學》"]}},"111110-N2-64":{"quick":"可燃性感染性廢棄物(熱處理)以「紅色」容器(垃圾袋)貯存。","detail":{"background":"感染性廢棄物貯存容器顏色:「可燃」感染性廢棄物(經滅菌/焚化等熱處理)以紅色容器(垃圾袋)貯存;「不可燃」感染性廢棄物與利器以黃色容器貯存。故以熱處理之可燃性生物醫療感染性廢棄物=紅色容器(A正確)。記憶:紅可燃、黃不可燃(利器)。記憶口訣:感染性廢棄物「紅可燃、黃不可燃(含利器)」、白(非有害藥用瓶)、黑(一般垃圾)。經熱處理之可燃感染性廢棄物用紅色容器。","options":{"A":"正確(本題答案)。可燃感染性廢棄物用紅色容器。","B":"黃色用於不可燃感染性與利器。","C":"白色非感染性廢棄物標準色。","D":"黑色為一般垃圾。"},"sources":["行政院環保署《醫療廢棄物管理》","新文京《基本護理學》"]}},"112110-N2-64":{"quick":"不可燃生物醫療感染性廢棄物以「黃色」容器貯存。","detail":{"background":"感染性廢棄物貯存:可燃感染性→紅色容器;「不可燃」感染性廢棄物(含玻璃、金屬利器等)→黃色容器。故不可燃生物醫療感染性廢棄物=黃色(B正確)。記憶:紅可燃、黃不可燃(利器)。記憶口訣:感染性廢棄物容器「紅=可燃、黃=不可燃(含玻璃金屬利器)」;白=非有害藥用瓶、黑=一般垃圾。不可燃感染性用黃色容器。","options":{"A":"紅色用於可燃感染性廢棄物。","B":"正確(本題答案)。不可燃感染性廢棄物用黃色容器。","C":"白色非感染性標準色。","D":"黑色為一般垃圾。"},"sources":["行政院環保署《醫療廢棄物管理》","新文京《基本護理學》"]}},"114030-N2-3":{"quick":"手術縫合針(利器)使用後應「滅菌後粉碎」處理。","detail":{"background":"手術縫合針屬感染性利器廢棄物,先收集於利器盒(黃色),最終以「滅菌(高溫蒸氣/焚化)後粉碎」等方式處理,使其失去感染性與銳利傷害性後再清運(C正確)。福馬林消毒、冰凍掩埋、紫外線消毒皆非利器感染性廢棄物的標準最終處置方式。處置:感染性利器(縫合針、刀片)先收集於黃色利器盒,最終以滅菌(高溫/焚化)後粉碎,使失去感染性與銳利性再清運;非福馬林、冰凍掩埋或紫外線可處理。","options":{"A":"福馬林消毒非利器廢棄物標準處置。","B":"冰凍掩埋非標準處置。","C":"正確(本題答案)。利器滅菌後粉碎處理。","D":"紫外線消毒無法處理利器感染性廢棄物。"},"sources":["行政院環保署《醫療廢棄物管理》","新文京《基本護理學》"]}}},TO=["1院內感染概念感染鏈傳染途徑與傳染病分類", "2消毒滅菌方法與原理", "3內外科無菌技術與洗手", "4隔離防護與個人防護設備", "5無菌導尿與檢體採集技術", "6終期消毒與病人單位清潔", "7醫療廢棄物處理"],LEC={"1院內感染概念感染鏈傳染途徑與傳染病分類":{"html":"\n<p><b>院內感染(HAI):</b>住院期間或出院後「新發生、入院時不存在也非潛伏期」的感染(參考入院後48~72小時)。最常見部位=<b>泌尿道(導尿相關)</b>;最常見致病菌=<b>金黃色葡萄球菌、綠膿桿菌</b>。危險因子:抗生素濫用、抵抗力低、侵入性處置增加。外生性=交叉感染(金黃葡萄球菌);內生性=自身常在菌(大腸桿菌)。</p>\n<p><b>感染鏈六環節:</b>感染原→傳染窩→離開傳染窩門戶→<b>傳染途徑</b>→進入易感宿主門戶→<b>易感宿主</b>。切斷「任一」環節即可阻止傳播。介入區辨:外科無菌導尿=阻斷傳染途徑;更換潮濕瓶/紫外線照床褥=移除傳染窩;保護性隔離=保護易感宿主;清除孑孓孳生源=消滅感染窩;蚊帳=阻斷傳染途徑。</p>\n<p><b>傳染途徑:</b>空氣(飛沫核&lt;5μm:<b>結核、水痘、麻疹</b>＋SARS/COVID)、飛沫(近距離大飛沫:流感、百日咳、腦膜炎)、接觸(MRSA、疥瘡)、媒介物(糞口:霍亂、痢疾、傷寒)、蟲媒(登革熱)、垂直(母嬰)。</p>\n<p><b>傳染病防治法五分類:</b>一(天花、SARS)、<b>二(結核、登革熱、傷寒、霍亂、麻疹</b>;24h通報)、三(腸病毒、流感併發症;一週通報)、四(水痘等中央指定)、五(伊波拉、MERS、新型A流感;24h通報)。</p>\n"},"2消毒滅菌方法與原理":{"html":"\n<p><b>四級概念:</b>清潔(去污)＜消毒(殺大部分繁殖體、<u>不一定殺芽孢</u>)＜滅菌(殺含<b>芽孢</b>的所有微生物，達完全無菌)；無菌=維持無微生物狀態。</p>\n<p><b>物理法:</b><b>高壓蒸氣滅菌(autoclave)</b>121°C/15 lb/15~20分,適用布類、金屬器械、水溶性溶液、玻璃;<u>不適用塑膠、橡膠、內視鏡</u>。煮沸(100°C,水沸騰起算、加2%碳酸鈉增效防鏽)、紫外線(穿透差、不殺芽孢,用於空氣/表面/床墊大件)、火焰(小金屬)、乾熱。</p>\n<p><b>巴氏(巴斯德)消毒:</b>62~63°C/30分(或72°C/15秒),用於<b>牛奶、果汁</b>等飲品,不殺芽孢。</p>\n<p><b>化學法:</b><b>2%戊二醛(Cidex)</b>=高層次消毒,用於不耐熱的橡皮導管、內視鏡、呼吸器材(浸泡10~20分消毒、3~10小時滅菌);過氧化氫亦可。酒精<b>70~75%</b>效果最佳(非愈濃愈好);漂白水(次氯酸鈉)<b>對肝炎病毒、HIV有效</b>。原則:物品須先去污、溫度每升10°C殺菌約增一倍、時間越長越完全。</p>\n"},"3內外科無菌技術與洗手":{"html":"\n<p><b>內科 vs 外科無菌:</b><b>內科無菌(清潔技術)</b>=減少微生物「傳播」(洗手、戴口罩、隔離);<b>外科無菌</b>=維持無菌物品/無菌區於「無菌狀態」(用於侵入無菌部位:導尿、注射、手術、傷口換藥)。判準:侵入無菌部位/開放傷口→外科無菌;經與外界相通管道(鼻胃灌食、灌腸)→內科無菌。</p>\n<p><b>無菌區污染判準:</b>邊緣<b>1吋</b>內=污染、<b>腰部以下</b>=污染、視線外=污染、拆封未用=污染、潮濕(毛細現象)=污染、下垂桌緣以下=污染。</p>\n<p><b>無菌敷料鉗:</b>握<b>上1/3</b>、鉗尖朝<b>下</b>且閉合、用畢夾緊垂直放回泡鑷罐。注射部位消毒:<b>由內向外</b>環狀、待酒精<b>自然乾</b>才插針。</p>\n<p><b>洗手:</b>有效洗手去除約<b>90%以上</b>暫時性菌叢,是最經濟有效的感控。<b>內科無菌洗手</b>沖水指尖<b>朝下、低於肘部</b>(乾淨往污染流)、每部位搓5~10次、40~60秒;<b>外科刷手</b>用刷子、指尖<b>朝上、高於肘部</b>。手沾血體液須肥皂清水洗(非僅酒精);戴手套不能取代洗手。WHO手部衛生五時機。</p>\n"},"4隔離防護與個人防護設備":{"html":"\n<p><b>隔離分類配對(高頻):</b>空氣傳染防護(負壓、N95):<b>結核、水痘、麻疹</b>;飛沫隔離:流感、百日咳、德國麻疹、腦膜炎;接觸隔離:<b>MRSA、疥瘡</b>、腸道菌;<b>保護性(反向)隔離(正壓)</b>:免疫低下易感宿主(<b>大範圍燒傷、骨髓移植、白血病化療、嗜中性球&lt;500</b>)。水痘=空氣＋接觸=絕對隔離。</p>\n<p><b>正壓 vs 負壓:</b>保護「易感宿主」→<b>正壓</b>(空氣由內往外,防外界病原進入);隔離「傳染源」(結核/SARS)→<b>負壓</b>(空氣由外往內,防病原外傳)。</p>\n<p><b>隔離衣:</b>外面、正面、領口以下、腰肘以下、袖口皆=污染區;脫除時<b>污染面內包</b>、持內面操作、脫後立即洗手;口罩潮濕即更換。</p>\n<p><b>PPE分級:</b>標準防護(HIV/愛滋:洗手、接觸血液戴手套);加護等級(伊波拉:雙層手套、面罩、連身防護衣、N95);脫PPE順序由污到淨,護目於前室脫除。</p>\n"},"5無菌導尿與檢體採集技術":{"html":"\n<p><b>存留(留置)導尿:</b>採<b>外科無菌</b>、以<b>優碘</b>(非碘酒)消毒;成人管徑<b>16~18 Fr.</b>;插入長度女約5~7.5cm、男約17~20cm;水囊打入約<b>5~10 mL無菌蒸餾水/生理食鹽水</b>固定;導尿管<b>女固定大腿內側、男固定下腹部</b>。</p>\n<p><b>消毒順序(女性):</b>由內(尿道口)往外、由遠側往近側:尿道口→遠側小陰唇→近側小陰唇→遠側大陰唇→近側大陰唇,<b>一棉枝擦一處即丟</b>。單次導尿量上限(舊500、新1000 mL)避免腹壓驟降。</p>\n<p><b>留置導尿採尿培養:</b>維持<b>密閉系統</b>——先夾管10~15分,消毒導尿管<b>橡皮採檢口</b>後以<b>無菌空針抽取</b>;不可自蓄尿袋取(久置污染)、不可分開接口(破壞密閉增感染)。</p>\n<p><b>中段尿:</b>清潔會陰(女由前往後)、解前段尿沖洗尿道口,再以無菌容器盛中段尿,量約10~30 mL,立即送檢;培養可用無菌導尿採檢。</p>\n"},"6終期消毒與病人單位清潔":{"html":"\n<p><b>終期消毒(terminal disinfection):</b>傳染性病人出院後對病室全面消毒。順序原則:先以<b>紫外線燈照射約30分鐘</b>(空氣/表面)再開始清理拆布單;耐高溫用物先<b>高壓蒸氣滅菌再送洗</b>;有血跡、體液之牆壁地板以<b>漂白水(次氯酸鈉)</b>清洗;不耐浸泡的床褥、枕頭送洗前以紫外線照射(約30~60分)。處理時護理師仍須穿戴<b>口罩、手套、隔離衣</b>。完成消毒後才可鋪床,<u>不可清理後立即鋪床</u>。</p>\n<p><b>感染性布單:</b>放感染性(紅色)污衣袋、註明床號與傳染類別,勿接觸地板。</p>\n<p><b>一般病室清潔:</b>被服以<b>71°C以上高溫洗25分鐘</b>;床旁以消毒劑(非僅清水)擦拭;抹布拖把<u>不可抖動</u>(揚塵散菌);清潔順序<b>由乾淨往髒、由上而下</b>。</p>\n<p><b>一般病人出院:</b>病人單位只需清潔與消毒(終期清潔),<u>無須達「無菌」程度</u>。</p>\n"},"7醫療廢棄物處理":{"html":"\n<p><b>容器顏色口訣:</b><b>紅=可燃感染性</b>(沾血體液之手套紗布、引流管,經滅菌焚化熱處理)、<b>黃=不可燃感染性與利器</b>(空針針頭、刀片、縫合針、破玻璃)、<b>白=非有害藥用瓶(ampule/vial)</b>、<b>黑=一般垃圾</b>。容器達<b>八分滿</b>即綑紮移除。</p>\n<p><b>分類:</b>一般性醫療廢棄物(未污染、非利器、非有害,如非有害藥用玻璃瓶)vs 感染性(生物醫療)廢棄物(沾血體液、利器、感染性)。乾淨未用點滴瓶屬一般廢棄物可回收。</p>\n<p><b>利器:</b>空針<u>不可回套</u>,直接丟黃色利器盒;縫合針、刀片以<b>滅菌後粉碎</b>處理使失去感染性與銳利性。</p>\n<p><b>特殊:</b>化療(細胞毒性/基因毒性)廢棄物須<b>專用容器</b>(常為紫色/特定標示),不可當一般感染性紅色廢棄物;致癌細胞毒素屬有害廢棄物。減量原則:無污染可重複用品應重複使用,非改用一次性。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_b2_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
