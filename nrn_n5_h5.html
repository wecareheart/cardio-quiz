N5-48","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":48,"stem":"依據老人福利機構設立標準,有關長期照顧機構類型及照護對象,下列敘述何者最適當?","opts":{"A":"失智照顧型機構是提供中度失智以上具行動能力且需受照顧者","B":"安養機構僅提供自我照顧缺失老人照護","C":"日間照顧是提供全天候的照顧服務","D":"養護型機構提供具足夠生活自理能力之老人照護"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"長期照護與老人社區照護","topic_num":"長期照護與老人社區照護","q_num":48,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"失智照顧型機構是提供中度失智以上具行動能力且需受照顧者","B":"安養機構僅提供自我照顧缺失老人照護","C":"日間照顧是提供全天候的照顧服務","D":"養護型機構提供具足夠生活自理能力之老人照護"},"img":""}],E={"101030-N5-32":{"quick":"評估老年病人用藥情形須考慮的因素＝用藥史②、認知功能③、支持系統④(性別①非主要)。","detail":{"background":"評估老年病人的用藥情形，須考慮:(2)「用藥史(目前及過去用藥、多重用藥、交互作用)」;(3)「認知功能(影響其「正確服藥」的能力，如失智者易忘記/服錯)」;(4)「支持系統(有無家人/照顧者協助管理用藥)」。而(1)『性別』「不是評估用藥情形的「主要」因素」。故正確為②③④(選 B)。評估老人用藥看用藥史、認知功能、支持系統。","options":{"A":"123：含①(性別，非主要因素)，錯誤。","B":"正確。用藥史②、認知功能③、支持系統④。","C":"134：含①、缺②，錯誤。","D":"124：含①、缺③，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"101030-N5-75":{"quick":"長期照護特性、對象與目標「錯誤」者＝評估個案資源需求多以疾病診斷為初步判定依據。","detail":{"background":"長期照護的敘述，「錯誤」者為(D)『「評估長期照護個案的資源需求，多以「疾病診斷」為初步判定依據」』——錯誤，長照的需求評估「主要以「「失能程度/功能狀態(如 ADL、IADL)」」為依據」，而非「以「疾病診斷」」(同一疾病的失能程度可能差異很大)。其他正確:A 長照資源發展原則須著重社區化;B 長期照護保險為(當時的)政策方向;C 22歲脊髓損傷者及90歲中風老人皆是長照對象(不限年齡，以失能為準)。故本題選錯誤者為 D。長照需求評估以「失能程度」為依據，非疾病診斷。","options":{"A":"長照資源發展須著重社區化，正確。","B":"長期照護保險為政策方向，正確。","C":"脊髓損傷者及中風老人皆是長照對象，正確。","D":"正確(本題選錯誤者)。長照需求評估以失能程度為依據，非疾病診斷。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"101030-N5-76":{"quick":"臺灣居家護理的服務內容「不包括」者＝調整藥物處方。","detail":{"background":"臺灣居家護理的服務內容，「不包括」(B)『「調整藥物「處方」」』——「調整藥物處方是「「醫師」的職權」，「不是「居家「護理」」的服務內容」(居家護理師依醫囑執行護理，無處方權)。其他屬於居家護理的服務:A 採送檢體;C 氣切管置換與照顧;D 大小量灌腸。故本題選不包括者為 B。調整藥物處方是醫師職權，非居家護理的內容。","options":{"A":"採送檢體是居家護理的服務內容。","B":"正確(本題選不包括者)。調整藥物處方是醫師職權，非居家護理。","C":"氣切管置換與照顧是居家護理的服務內容。","D":"大小量灌腸是居家護理的服務內容。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"101110-N5-18":{"quick":"較常用於評估「失智症」患者「認知功能」的工具＝簡易智能狀態測驗(MMSE)。","detail":{"background":"較常用於評估「失智症」患者「「認知功能」」的檢測工具是(C)『「簡易智能狀態測驗(MMSE;評估「定向、記憶、注意、語言、空間」等「認知功能」，是失智篩檢/評估的常用工具)」』。基本日常生活活動功能(ADL)、工具性日常生活活動功能(IADL)評估的是「「日常生活「功能/失能」」」(非認知);整體功能評估(GAF)評估「精神功能」。「認知功能」用 MMSE。故 C 正確。MMSE 評估認知功能;ADL/IADL 評估生活功能。","options":{"A":"ADL 評估基本日常生活功能(失能)，非認知。","B":"IADL 評估工具性日常生活功能(失能)，非認知。","C":"正確。MMSE 評估失智患者的認知功能。","D":"GAF 評估整體精神功能。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"101110-N5-41":{"quick":"「老人防跌」列入健康政策重點，主要考量＝人口特性。","detail":{"background":"我國將「老人防跌」列入健康政策工作重點，主要是考量(D)『「「人口特性」(臺灣「人口「高齡化」」，老年人口比率上升，跌倒是老人常見且嚴重的健康問題，故須因應「人口結構(老化)」的特性，推動防跌)」』。社會變遷、經濟發展、醫事人力非「老人防跌」政策的「主要」考量。「老人防跌」是因應人口老化(人口特性)。故 D 正確。老人防跌是因應人口高齡化(人口特性)。","options":{"A":"社會變遷非老人防跌政策的主要考量。","B":"經濟發展非主要考量。","C":"醫事人力非主要考量。","D":"正確。老人防跌主要考量人口特性(高齡化)。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"101110-N5-63":{"quick":"輪椅因門太小/門檻過高無法進出：應優先轉介居家無障礙環境改造。","detail":{"background":"張先生下半身癱瘓、坐輪椅，「因「浴廁門太小、大門門檻過高」導致「輪椅無法進出」」是其最大困擾——應優先提供(B)『「轉介「居家無障礙環境改造」(改善門寬、去除門檻、加裝斜坡/扶手，使輪椅能進出，解決其「最大、最迫切」的困擾)」』。其他較不優先:A『接受疾病限制及角色改變』(心理調適，非當下迫切);C『新職業能力訓練』(非當下迫切);D『居家喘息服務』(針對照顧者)。故 B 正確。針對輪椅無法進出的環境障礙，優先轉介無障礙環境改造。","options":{"A":"接受疾病限制是心理調適，非當下迫切的環境問題。","B":"正確。輪椅無法進出，優先轉介居家無障礙環境改造。","C":"新職業能力訓練非當下迫切。","D":"居家喘息服務是針對照顧者，非解決環境障礙。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"101110-N5-65":{"quick":"安排家庭訪視「第一優先」＝由登革熱疫區返國的發燒個案。","detail":{"background":"社區護理師安排家庭訪視，應列為「第一優先」的是(D)『「由「登革熱疫區返國的「發燒」個案」(疑似「傳染病(登革熱)」，「具急迫性、傳播風險」，須立即訪視、疫調、防止擴散)』。其他較不急迫:A 血壓148/90(輕度偏高、慢性);B 半乳糖血症新生兒(須處理但非傳染急迫);C 獨居老人(關懷訪視、非急迫)。傳染病(疑似登革熱發燒)最急迫，列第一優先。故 D 正確。","options":{"A":"血壓148/90是輕度偏高的慢性問題，非急迫。","B":"半乳糖血症新生兒須處理，但非傳染急迫。","C":"獨居老人是關懷訪視，非急迫。","D":"正確。登革熱疫區返國的發燒個案(疑似傳染病)，列第一優先。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"101110-N5-74":{"quick":"居家服務的敘述「錯誤」者＝居家服務項目中包括協助獨居老人保管重要財物。","detail":{"background":"居家服務的敘述，「錯誤」者為(B)『「居家服務項目中「包括「協助獨居老人「保管重要財物」」」』——錯誤，居家服務「「不包括「保管財物」」(涉及財物糾紛的風險，非居家服務的項目;居家服務是「身體照顧、家務協助」等)。其他正確:A 居家服務工作者應取得照顧服務員90小時訓練證明;C 可直接向各地長期照顧管理中心申請;D 一般失能民眾可使用此項服務。故本題選錯誤者為 B。居家服務不含保管財物。","options":{"A":"居家服務工作者應取得照服員90小時訓練證明，正確。","B":"正確(本題選錯誤者)。居家服務不含協助保管財物。","C":"可向各地長期照顧管理中心申請，正確。","D":"一般失能民眾可使用此服務，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"101110-N5-75":{"quick":"臺灣長期照護資源的敘述「錯誤」者＝機構式照顧資源不足。","detail":{"background":"臺灣長期照護資源的敘述，「錯誤」者為(A)『「「機構式」照顧資源「不足」」』——錯誤，臺灣「「機構式」照顧資源「相對較「豐富」」(發展較早、較多)」;「不足」的是「「居家、社區式」照顧資源」(去機構化、在地老化的方向尚待加強)。其他正確:B 機構式資源較居家服務資源豐富;C 日間照護資源相當有限;D 城鄉間長期照護資源分布落差大。故本題選錯誤者為 A。臺灣機構式資源相對豐富，居家社區式資源較不足。","options":{"A":"正確(本題選錯誤者)。機構式資源相對豐富，居家社區式資源較不足。","B":"機構式資源較居家服務資源豐富，正確。","C":"日間照護資源相當有限，正確。","D":"城鄉間長照資源分布落差大，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"101110-N5-76":{"quick":"居家護理服務屬三段五級的「第三段第五級(復健)」。","detail":{"background":"居家護理服務(對「已患病/失能、在家療養」者提供護理照護)——屬三段五級的(D)『「第三段(第五級)預防(「復健(rehabilitation)」;對「已患病/失能者」提供照護，「維持功能、減少失能、提升生活品質」，使其能在家中獲得照護)」』。第一段是健康促進/特殊保護;第二段是早期診斷治療。「居家護理(對病人/失能者的照護)」屬第三段(復健)。故 D 正確。居家護理屬第三段第五級(復健)。","options":{"A":"第一段第二級是特殊保護(如疫苗)。","B":"第二段第三級是早期診斷早期治療。","C":"第三段第四級是限制殘障。","D":"正確。居家護理服務屬第三段第五級(復健)。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"101110-N5-78":{"quick":"創立刊物、成立志工遊說民眾支持＝社區健康營造的「社會傳播的助力」。","detail":{"background":"為推動老人體適能，社區「創立「定期刊物」、成立「志工組織遊說民眾」」——屬社區健康營造三大要素中的(B)『「社會傳播的助力(透過「刊物、志工、宣傳」等「傳播、動員」的力量，推廣健康觀念、爭取民眾支持)」』。社區居民的自覺是居民的意識;政策的支持是政策面;社區行政系統是行政。「刊物、志工遊說(傳播動員)」屬社會傳播的助力。故 B 正確。","options":{"A":"社區居民的自覺是居民的意識覺醒。","B":"正確。創立刊物、志工遊說(傳播動員)，是社會傳播的助力。","C":"政策的支持是政策面的支持。","D":"社區行政系統是行政層面的運用。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"102030-N5-63":{"quick":"張太太要去接孫子：先結束此次訪視，另約合適時間訪視。","detail":{"background":"家訪中，張太太「一直看鐘、表示要去接小孫子」(分心、有其他事務)——社區護理師應(C)『「先「結束此次訪視」，「另約合適的時間」訪視(尊重案家的時間與狀況，在其「能專心」時再訪視，效果較好)」』。其他不當:A『強調復健重要性引起動機』在其分心、趕時間時無效;B『繼續說明、確認瞭解後再走』忽視其急著離開的需求;D『留在張家等她回來』不尊重、不切實際。故 C 正確。案家有其他事務時，宜結束訪視、另約合適時間。","options":{"A":"在其分心、趕時間時強調動機無效。","B":"繼續說明忽視其急著離開的需求。","C":"正確。先結束此次訪視，另約合適時間。","D":"留在張家等她回來不尊重、不切實際。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"102030-N5-76":{"quick":"出院準備服務的核心概念＝持續性照顧。","detail":{"background":"出院準備服務的「核心概念」是(B)『「持續性照顧(continuity of care;確保病人「從醫院到社區/家庭」的照護「無縫銜接、連續不中斷」)」』。整合性服務、可近性服務、資源整合雖相關，但出院準備服務的「核心」是「「照護的「持續性」(出院後的照護銜接)」」。故 B 正確。出院準備服務的核心是持續性照顧(醫院到社區的無縫銜接)。","options":{"A":"整合性服務是相關概念，但非核心。","B":"正確。出院準備服務的核心概念是持續性照顧。","C":"可近性服務是相關概念，但非核心。","D":"資源整合是相關概念，但非核心。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"102030-N5-77":{"quick":"「長期照護十年計畫」中「不屬於補助項目」者＝居家藥事服務。","detail":{"background":"現行(當時)「長期照護十年計畫」的補助項目包括:A 照顧服務(居家服務、日間照顧、家庭托顧)、B 居家護理服務、C 居家復健服務，以及喘息服務、輔具、營養餐飲、交通接送等。而(D)『「居家「藥事」服務」』「不在」當時長照十年計畫的補助項目中。故本題選不屬於者為 D。(註:長照2.0 後服務項目擴增;本題依當時的長照十年計畫1.0。)","options":{"A":"照顧服務是長照十年計畫的補助項目。","B":"居家護理服務是補助項目。","C":"居家復健服務是補助項目。","D":"正確(本題選不屬於者)。居家藥事服務不在當時長照十年計畫的補助項目。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"102110-N5-57":{"quick":"阮氏表示無法自行決定使用喘息服務：須進一步評估家庭的權力結構。","detail":{"background":"阮氏(主要照顧者、疲累想休息)被告知可用喘息服務，但「表示「無法自行決定」」——社區護理師需進一步評估(A)『「家庭的「權力結構」(了解「誰才是家中「做決定」的人」、阮氏在家中的權力地位，才能協助其取得使用服務的同意)』。社會化功能、發展階段、照護能力非此問題(「無法自行決定」)的關鍵。「無法自行決定」反映「權力結構(決策權不在她)」。故 A 正確。「無法自行決定」須評估家庭的權力結構(誰有決策權)。","options":{"A":"正確。「無法自行決定」須評估家庭的權力結構(誰有決策權)。","B":"社會化功能是傳遞價值規範，非此問題的關鍵。","C":"發展階段非此問題的關鍵。","D":"照護能力非「無法決定」的關鍵(她已照護一年、情況良好)。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"102110-N5-69":{"quick":"植物人返家照顧的出院準備時機＝一入院就須進行出院準備服務。","detail":{"background":"李先生(車禍後植物人、將返家照顧)的出院準備時機，正確的是(A)『「「一入院」就須進行出院準備服務(及早評估、規劃出院後的照護需求、資源連結、家屬準備，使返家照顧能順利銜接)」』。其他錯誤:B『病情穩定、確定出院「再執行」』太晚;C『依「家庭照顧能力」決定時機』錯誤(出院準備應「及早、一入院」即開始);D『「出院前都可以」』太被動。故 A 正確。出院準備服務應在「入院時」即開始(與前述同類題一致)。","options":{"A":"正確。一入院就須進行出院準備服務。","B":"病情穩定、確定出院再執行太晚。","C":"出院準備應及早開始，非依家庭照顧能力決定時機。","D":"「出院前都可以」太被動。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"102110-N5-70":{"quick":"植物人由家人照顧的資源需求「錯誤」者＝轉介居家職能治療進行居家環境改造。","detail":{"background":"李先生(植物人、完全臥床、由家人照顧)的資源需求，「錯誤」者為(A)『「轉介「居家職能治療」進行「居家環境改造」」』——「植物人「完全臥床、無認知與自主活動能力」，「職能治療(目標是「恢復生活功能/自理」)對其「意義不大」」，且「環境改造(如輪椅進出)對「臥床植物人」非優先」。其他適當:B 建議使用居家服務協助部分照顧人力;C 評估家庭經濟、協助取得經濟資源;D 轉介居家護理(管路照護等)。故本題選錯誤者為 A。植物人臥床，職能治療/環境改造非其需求。","options":{"A":"正確(本題選錯誤者)。植物人臥床，職能治療/環境改造非其需求。","B":"建議使用居家服務協助照顧人力，適當。","C":"評估經濟、協助取得經濟資源，適當。","D":"轉介居家護理(管路照護等)，適當。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"102110-N5-71":{"quick":"面對父親逐步退化(失智)，李太太可做的事「錯誤」者＝自行購買藥物治療。","detail":{"background":"面對李先生父親「逐步退化(疑似失智)」，李太太可做的事，「錯誤」者為(D)『「「自行購買藥物」治療」』——錯誤，「失智的「診斷與用藥」須「經「醫師」評估、診斷、處方」」，「「不可「自行購藥」」(用錯藥有害)。其他適當:A 請個案管理師初步篩檢後再帶去醫院確診;B 直接到醫院由醫師臨床診斷失智症;C 可請居家護理師協助以 MMSE 評估。故本題選錯誤者為 D。失智用藥須經醫師處方，不可自行購藥。","options":{"A":"請個管師初步篩檢後再就醫確診，適當。","B":"到醫院由醫師臨床診斷失智症，適當。","C":"請居家護理師以 MMSE 評估，適當。","D":"正確(本題選錯誤者)。失智用藥須經醫師處方，不可自行購藥。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"103030-N5-47":{"quick":"居家照護歸屬於我國健康照顧體系的「長期照護」部分。","detail":{"background":"居家照護(對在家療養的失能/慢性病人提供照護)——歸屬於我國健康照顧體系的(D)『「長期照護(對「失能、慢性、需長期照顧」者提供的「持續性照護」;居家照護是長照的一環)」』。緊急救護是急救;群體醫療是基層醫療;社區發展是社區營造。「居家照護」屬長期照護。故 D 正確。居家照護屬長期照護體系。","options":{"A":"緊急救護是急重症的急救。","B":"群體醫療是基層醫療服務。","C":"社區發展是社區營造。","D":"正確。居家照護歸屬於長期照護。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"103030-N5-67":{"quick":"申請「長照十年計畫」照顧服務的需求評估單位＝長期照顧管理中心。","detail":{"background":"擬申請「長期照顧十年計畫」中的「照顧服務」，應由(B)『「長期照顧管理中心(各縣市的長照「單一窗口」，負責「需求評估、核定服務、連結資源」)」』負責照顧需求評估。居家服務中心是提供居家服務的單位;勞工局、衛生局非長照需求評估的單位。「照顧需求評估」由長期照顧管理中心負責。故 B 正確。長照的需求評估由長期照顧管理中心(單一窗口)負責。","options":{"A":"居家服務中心是提供居家服務的單位。","B":"正確。需求評估由長期照顧管理中心負責。","C":"勞工局非長照需求評估的單位。","D":"衛生局非長照需求評估的單位。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"103030-N5-68":{"quick":"長期照護「社區化照護」的意涵＝儘可能使失能/失智老人舒適安全地留在家庭或熟悉的社區，越久越好。","detail":{"background":"長期照護中「社區化照護」的意涵是(B)『「儘可能使「失能或失智的老人」能「舒適及安全地「留在「家庭或熟悉的社區」」，越久越好」(即「「在地老化(aging in place)」」的理念)」』。其他是別的取向:A 是「機構式照顧」;C 是「機構照顧的人性化」;D 是「機構費用的補助」。社區化照護＝在地老化(留在家庭/社區)。故 B 正確。社區化照護的核心是在地老化(讓老人留在熟悉的家庭/社區)。","options":{"A":"「去機構接受照護」是機構式照顧，非社區化。","B":"正確。儘可能讓老人留在家庭/熟悉的社區(在地老化)，是社區化照護。","C":"「機構的人性化照護」是機構照顧的改善。","D":"「機構費用的補助」是經濟協助。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"103030-N5-69":{"quick":"護理之家的照顧服務員與床位比例＝1:5。","detail":{"background":"依「護理機構分類設置標準」，護理之家的「照顧服務員與「床位」」比例應為(A)『「1:5(每5床應至少配置1名照顧服務員)」』。故 A 正確。(護理之家:照顧服務員每5床1人;護理人員每15床1人。) 護理人員每15床1人、社工人員未滿100床得兼任，是機構人力配置的基本規範，目的是確保住民獲得足夠的照顧人力與安全。","options":{"A":"正確。護理之家照顧服務員與床位比例為1:5。","B":"1:10非照顧服務員的床位比。","C":"1:15是護理人員的床位比，非照顧服務員。","D":"1:20非標準的比例。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"103100-N5-31":{"quick":"39歲剛出院、居家護理初次服務的「最優先」措施＝評估服藥情形與副作用。","detail":{"background":"陳先生(39歲、剛自急性病房出院、接受居家護理「初次服務」)，最優先的護理措施是(A)『「評估「服藥情形與副作用」(剛出院者「用藥的「正確性、遵從性、副作用」」直接影響病情穩定與安全，是初次居家護理的「優先評估」)』。轉介復健、申請社區資源、確認生活作息正常化是後續。剛出院者優先評估服藥情形與副作用。故 A 正確。剛出院者居家護理優先評估服藥情形與副作用。","options":{"A":"正確。剛出院者優先評估服藥情形與副作用。","B":"轉介復健是後續的措施。","C":"協助申請社區資源是後續的措施。","D":"確認生活作息正常化是後續的措施。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"103100-N5-67":{"quick":"評估糖尿病截肢獨居老人是否適合繼續獨居：需優先評估「照護能力」。","detail":{"background":"獨居老人因糖尿病截肢甫出院，要評估其「是否「適合繼續獨居」」，需優先評估(D)『「(自我)「照護能力」(截肢後其「日常生活自理、傷口照顧、行動、用藥」等「能否「自我照顧」」，是判斷能否獨居的關鍵)』。人際關係、社會化功能、發展階段非「能否獨居」的關鍵。「能否獨居」取決於其「自我照護能力」。故 D 正確。評估能否獨居，優先評估其自我照護能力。","options":{"A":"人際關係非能否獨居的關鍵。","B":"社會化功能非能否獨居的關鍵。","C":"發展階段非能否獨居的關鍵。","D":"正確。評估能否獨居，需優先評估其照護能力。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"103100-N5-70":{"quick":"老人福利法所稱「老人福利機構」「不包括」者＝醫療機構。","detail":{"background":"依老人福利法(2012修訂)，所稱的「老人福利機構」包括:A 長期照顧機構(長照型、養護型、失智照顧型)、C 安養機構、D 其他老人福利機構(如文康、服務機構)。而(B)『「醫療機構」』「不是」老人福利法所稱的老人福利機構(醫療機構屬「醫療法」規範)。故本題選不包括者為 B。老人福利機構含長照、安養等，不含醫療機構。","options":{"A":"長期照顧機構是老人福利機構。","B":"正確(本題選不包括者)。醫療機構屬醫療法，非老人福利機構。","C":"安養機構是老人福利機構。","D":"其他老人福利機構(文康、服務)是老人福利機構。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"103100-N5-74":{"quick":"護理之家機構負責人的資格＝護理師4年以上或護士7年以上的臨床經驗。","detail":{"background":"依護理人員法規定，護理之家機構的負責人至少應具備(C)『「登記執業、從事臨床護理工作「護理師「4年」以上」或「護士「7年」以上」」的資格』。故 C 正確。(護理機構負責人:護理師須4年、護士須7年以上的臨床護理工作經驗。)","options":{"A":"護理師2年/護士5年不足。","B":"護理師3年/護士6年不足。","C":"正確。護理師4年以上或護士7年以上。","D":"護理師5年/護士8年超過規定的最低要求。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"103100-N5-75":{"quick":"癌末病人希望在家往生、家屬擔心臨終處理：建議使用居家安寧療護。","detail":{"background":"張先生(癌末、反覆住院、不想再治療、「希望在家往生」、家屬認同但擔心無法處理臨終狀況)——最合適的護理處置是(B)『「建議使用「居家安寧療護(由安寧團隊「到宅」提供症狀控制、臨終照護、家屬支持與指導，使病人能「在家善終」、家屬獲得專業協助)」』。其他不當:A『轉安寧病房、往生再送回家』不符其「在家」的意願;C『到醫院治療延長生命』違反其意願(不想再治療);D『留在家、臨終再送院』不符在家往生的意願、且無專業支持。故 B 正確。希望在家善終者，居家安寧療護最合適。","options":{"A":"轉安寧病房不符其「在家」的意願。","B":"正確。建議使用居家安寧療護(在家善終、專業支持)。","C":"到醫院治療違反其意願(不想再治療)。","D":"臨終再送院不符在家往生的意願、無專業支持。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0","安寧緩和"]}},"104030-N5-32":{"quick":"老化的「活動理論(activity theory)」主張＝保持活躍是老人心理健康的重要因素。","detail":{"background":"老化心理社會學中「活動理論(activity theory)」的主張是(C)『「「保持活躍(維持活動與社會參與)」是老人「心理健康」的重要因素(老人應「持續參與活動、維持社會角色」，才能保有生活滿意與心理健康)」』。其他是別的理論:A『減少互動是正常老化』是「「撤退(脫離)理論」」;B『完成「自我統合」』是「Erikson 的心理社會發展理論」;D『活動增加負擔、易意外』非活動理論的主張。故 C 正確。活動理論主張保持活躍有益老人的心理健康。","options":{"A":"「減少互動是正常老化」是撤退(脫離)理論。","B":"「自我統合」是 Erikson 的發展理論。","C":"正確。活動理論主張保持活躍是老人心理健康的重要因素。","D":"「活動增加負擔」非活動理論的主張。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"104030-N5-41":{"quick":"護理人員可獨立開業的機構「不包括」者＝長期照護機構。","detail":{"background":"依護理機構設置標準，護理人員可「獨立開業」的機構「不包括」(C)『「「長期照護機構」』——「長期照護機構(如養護、安養)「不是「護理人員「獨立開業」」的「護理機構」」(其設立依老人福利法等，非由護理人員獨立開業)。護理人員可獨立開業的「護理機構」:A 居家護理機構、B 護理之家機構、D 產後護理機構。故本題選不包括者為 C。長期照護機構非護理人員獨立開業的護理機構。","options":{"A":"居家護理機構是護理人員可獨立開業的機構。","B":"護理之家機構是護理人員可獨立開業的機構。","C":"正確(本題選不包括者)。長期照護機構非護理人員獨立開業的護理機構。","D":"產後護理機構是護理人員可獨立開業的機構。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"104030-N5-46":{"quick":"中風臥床者每天做全關節運動＝第三段預防(復健)。","detail":{"background":"張太太二度中風、右半身癱瘓、長期臥床，「教導家人每天為她做「全關節運動」」——屬(D)『「第三段預防(「復健/限制殘障」;對「已患病/失能者」，「維持關節活動度、預防攣縮與併發症」，減少失能、維持功能)』。定期出國旅遊、流感疫苗(特殊保護，第一段)、子宮頸癌篩檢(早期診斷，第二段)非第三段。「全關節運動(復健、預防攣縮)」屬第三段預防。故 D 正確。對臥床者做全關節運動(復健、預防攣縮)屬第三段預防。","options":{"A":"定期出國旅遊非預防分級的措施。","B":"注射流感疫苗是特殊保護(第一段)。","C":"子宮頸癌篩檢是早期診斷(第二段)。","D":"正確。每天做全關節運動(復健、預防攣縮)屬第三段預防。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"104030-N5-67":{"quick":"臺灣老年人口(民國82年邁入高齡化)的敘述(本題送分)。","detail":{"background":"臺灣於民國82年正式邁入「高齡化(人口老化)」國家——本題經評定為「送分(各選項均給分)」。理解重點:臺灣人口老化「速度極快(屬世界前列)」;老人罹病「以慢性退化性疾病最多」;「85歲以上的「老老人」成長比率高」;老年照顧「著重「生活功能的維持」而非治癒疾病」。本題送分。","options":{"A":"本題送分。臺灣人口老化速度極快。","B":"本題送分。老人罹病以慢性退化性疾病最多。","C":"本題送分。老老人成長比率高。","D":"本題送分。老年照顧著重生活功能維持。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護","送分題"]}},"104030-N5-76":{"quick":"長照運用個案管理的原因「錯誤」者＝有效管理個案財務。","detail":{"background":"長期照護中運用個案管理的原因，「錯誤」者為(D)『「有效「管理個案財務」』——「管理個案的「私人財務」「不是」個案管理的目的」(個案管理是「協調服務、控制照顧成本、滿足需求」，而非管理個案的私人財務)。其他正確的原因:A 有效控制照顧成本;B 服務方案或資源多元且來自不同組織機構(須整合協調);C 滿足個案的多重需求。故本題選錯誤者為 D。個案管理是協調服務、控制成本，非管理個案的私人財務。","options":{"A":"有效控制照顧成本，是運用個案管理的原因。","B":"資源多元、來自不同機構，須整合協調，是原因。","C":"滿足個案的多重需求，是原因。","D":"正確(本題選錯誤者)。個案管理非管理個案的私人財務。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"104030-N5-78":{"quick":"長期照護團隊的「其他人力資源」敘述「錯誤」者＝志工團體並不需要任何教育訓練。","detail":{"background":"長期照護團隊的「其他人力資源」敘述，「錯誤」者為(D)『「志工團體「並不需要任何教育訓練」』——錯誤，「志工「須接受「教育訓練」」(基礎訓練、特殊訓練)，才能提供適切、安全的服務」。其他正確:A 包括來自家人、親友或志工的協助;B 家屬對復健配合與治療成效具關鍵性影響;C 行政人員負責住民照護管理、人事財務管理等。故本題選錯誤者為 D。志工須接受教育訓練，非不需訓練。","options":{"A":"其他人力包括家人、親友、志工，正確。","B":"家屬對復健配合與成效具關鍵影響，正確。","C":"行政人員負責照護管理、人事財務，正確。","D":"正確(本題選錯誤者)。志工須接受教育訓練，非不需訓練。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"104100-N5-30":{"quick":"一般老化過程：自我統合(integrity)為老年期的主要發展任務。","detail":{"background":"一般老化過程的正確敘述是(C)『「「自我統合(ego integrity vs. despair)」為老年期的「主要發展任務」(依 Erikson，老年期的發展任務是「回顧人生、達成統合與圓滿，否則陷入絕望」)」』。其他錯誤:A『憂鬱與無助是老化「必然」的情緒發展』錯誤(憂鬱「不是」正常老化的必然);B『最早期的老化是「思考功能遲緩」』錯誤(最早期的老化多是「「身體/感官(如視聽力)」」的退化);D『近期與遠期記憶「同時」明顯減退』錯誤(老化時「「近期記憶」先減退」，遠期記憶保留較久)。故 C 正確。","options":{"A":"憂鬱與無助不是正常老化的必然情緒。","B":"最早期的老化多是身體/感官的退化，非思考遲緩。","C":"正確。自我統合是老年期的主要發展任務。","D":"老化時近期記憶先減退，非近遠期同時減退。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"104100-N5-47":{"quick":"甲(老人多)、乙(青年多)社區死亡人數同為50：兩社區的死亡率「無法直接比較」。","detail":{"background":"甲社區(老人多)、乙社區(青年多)該年死亡人數「都是50位」——關於兩社區「死亡率」的比較，正確的是(D)『「「無法直接比較」(因「「粗死亡率」會受「人口「總數」與「年齡結構」」影響;須知道「各社區的「總人口數」」才能算「率」，且「年齡結構不同」也須「標準化」後才能公平比較)」』。「死亡「人數」相同」不代表「死亡「率」相同」。故 D 正確。僅知死亡人數、不知人口數與年齡結構，無法直接比較死亡率。","options":{"A":"僅知死亡人數，不知人口數，無法判斷死亡率高低。","B":"同上，無法判斷。","C":"死亡人數相同不代表死亡率相同(須看人口數)。","D":"正確。不知人口數與年齡結構，無法直接比較死亡率。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計"]}},"104100-N5-69":{"quick":"國內長期照護個案補助的主要依據＝身體功能(失能程度)。","detail":{"background":"目前國內對長期照護個案「補助」的主要依據是(A)『「「身體功能(失能程度;如 ADL、IADL 的失能等級)」(長照補助以「失能的程度」決定服務與補助額度，而非疾病種類)』。疾病種類、居住地區、家庭凝聚力非長照補助的主要依據。長照補助以「身體功能(失能程度)」為依據。故 A 正確(與前述同類題一致)。","options":{"A":"正確。長照補助的主要依據是身體功能(失能程度)。","B":"疾病種類非長照補助的主要依據。","C":"居住地區非主要依據。","D":"家庭凝聚力非主要依據。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"104100-N5-79":{"quick":"中風中斷復健者的護理措施「不適當」者＝直接轉介個案去護理之家。","detail":{"background":"中風的唐老先生「因復健效果不彰而「中斷復健」」，護理措施「不適當」者為(D)『「「直接轉介個案去「護理之家」」』——錯誤，應「先「了解中斷的原因、與案家共同重訂目標」」，協助其「繼續復健」，而非「直接送機構(放棄居家復健、剝奪其自主)」。其他適當:A 了解個案及家屬的困難;B 了解個案目前的身體功能;C 與案家一同訂定具體可行的目標。故本題選不適當者為 D。應先了解困難、重訂目標，非直接轉介護理之家。","options":{"A":"了解個案及家屬的困難，適當。","B":"了解個案目前的身體功能，適當。","C":"與案家一同訂定具體可行的目標，適當。","D":"正確(本題選不適當者)。應先了解困難、重訂目標，非直接轉介護理之家。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"104100-N5-80":{"quick":"長照十年計畫「喘息服務」的敘述「錯誤」者＝目前僅限於補助機構式喘息服務。","detail":{"background":"長照十年計畫「喘息服務」的敘述，「錯誤」者為(C)『「目前「僅限於」補助「機構式」喘息服務」』——錯誤，喘息服務「「含「機構式」「與」「居家式」」喘息」(讓主要照顧者能暫時休息;可選擇將被照顧者送機構或由居服員到宅)。其他正確:A 可暫時取代照顧者責任;B 適用於居家失能個案;D 使用機構喘息服務可獲交通費補助。故本題選錯誤者為 C。喘息服務含機構式與居家式，非僅限機構式。","options":{"A":"可暫時取代照顧者責任，正確。","B":"適用於居家失能個案，正確。","C":"正確(本題選錯誤者)。喘息服務含機構式與居家式，非僅限機構式。","D":"使用機構喘息可獲交通費補助，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"105030-N5-74":{"quick":"對照顧服務員人力要求「最高」的老人福利機構＝失智照護型機構。","detail":{"background":"老人福利機構中，對「照顧服務員」人力要求「最高(比例最密)」的是(C)『「「失智照護型機構」(失智住民「需「最密集、專業」的照顧、看護(防走失、行為問題、生活照顧)」，故照服員的人力配置要求「最高」)』。長期照護型、養護型機構的人力要求次之;安養機構(收住生活可自理者)的人力要求最低。「失智照護型」的照服員人力要求最高。故 C 正確。失智照護型機構的照服員人力要求最高(住民需求最密集)。","options":{"A":"長期照護型機構的人力要求次於失智型。","B":"養護型機構的人力要求次於失智型。","C":"正確。失智照護型機構對照服員的人力要求最高。","D":"安養機構(可自理者)的人力要求最低。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"105030-N5-75":{"quick":"長照十年計畫資源分配及費用補助的主要依據＝失能程度①、家庭經濟狀況④。","detail":{"background":"我國長照十年計畫「資源分配及費用補助」的主要依據是:(1)「失能程度(依「ADL/IADL 的失能等級」決定服務量)」;(4)「家庭經濟狀況(依「家庭經濟(低收入、中低收入、一般戶)」決定「補助比例(部分負擔)」)」。而(2)疾病嚴重度、(3)家庭照顧人力不是「補助」的主要依據。故正確為①④(選 D)。長照補助依「失能程度(服務量)＋家庭經濟(補助比例)」。","options":{"A":"12：含②(疾病嚴重度)，非補助的主要依據。","B":"23：含②③，非補助依據。","C":"34：含③(家庭照顧人力)，非補助依據。","D":"正確。失能程度①、家庭經濟狀況④。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"105030-N5-76":{"quick":"膝關節炎、採購食物困難的獨居老人：較適合的資源＝居家服務①、送餐服務②。","detail":{"background":"80歲獨居的張老太太「膝關節炎惡化、「上市場採購食物有困難」」——較適合提供的資源是:(1)「居家服務(由居服員協助「採買、家務」等日常生活)」;(2)「送餐服務(直接「送餐到府」，解決其無法外出採購、備餐的問題)」。而(3)『護理之家』(機構式，不需;她只是採購困難、非須機構照護);(4)『居家營養師』(非當下解決「採購/吃飯」的優先)。故正確為①②(選 A)。對採購困難的獨居老人，居家服務與送餐服務最適合。","options":{"A":"正確。居家服務①、送餐服務②，解決採購與備餐困難。","B":"23：含③(護理之家，不需)，錯誤。","C":"34：含③④，非優先。","D":"14：含④(居家營養師，非優先)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"105030-N5-80":{"quick":"正常老化的生理功能改變「錯誤」者＝心輸出量增加。","detail":{"background":"正常老化過程的生理功能改變，「錯誤」者為(A)『「心輸出量「增加」」』——錯誤，老化時「「心輸出量「「減少」」(心肌收縮力下降、血管硬化、心臟儲備功能降低)」。其他正確(屬正常老化):B 唾液腺分泌減少(口乾);C 胰島素分泌減少(血糖調節變差);D 腦組織重量減少(腦萎縮)。故本題選錯誤者為 A。老化時心輸出量「減少」，非增加。","options":{"A":"正確(本題選錯誤者)。老化時心輸出量減少，非增加。","B":"唾液腺分泌減少，是正常老化的改變。","C":"胰島素分泌減少，是正常老化的改變。","D":"腦組織重量減少(腦萎縮)，是正常老化的改變。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"105090-N5-63":{"quick":"照顧臥床哥哥、體力不如前、希望獲協助：轉介使用喘息服務。","detail":{"background":"王先生(76歲、照顧82歲股骨骨折臥床的哥哥、居家照顧良好、「不捨送機構、但體力不如前、希望獲得協助」)——護理師應(B)『「轉介王先生使用「喘息服務」(讓「主要照顧者(王先生)」能「暫時休息、喘口氣」，由喘息服務「暫時接手照顧」，以「持續居家照顧」)』。其他不當:A『忍耐等候復原』未提供協助;C『送機構照顧』不符其「不捨送機構、想居家照顧」的意願;D『心理治療』非其需求(他需要的是「照顧上的喘息」)。故 B 正確。對體力不堪負荷、想持續居家照顧的照顧者，轉介喘息服務。","options":{"A":"忍耐等候未提供協助。","B":"正確。轉介使用喘息服務，讓照顧者暫時休息。","C":"送機構不符其「不捨送機構、想居家照顧」的意願。","D":"心理治療非其需求(他需要照顧上的喘息)。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"105090-N5-72":{"quick":"臺灣居家護理服務採用的健保支付制度＝資源耗用群(RUGs)。","detail":{"background":"目前臺灣居家護理服務採用的健康保險支付制度是(D)『「資源耗用群(Resource Utilization Groups, RUGs;依「個案「耗用資源的程度(照護需求)」」分群，據以「給付」)」』。論人計酬是按人頭;DRG 是按診斷關聯群(住院);論件計酬是按服務件數。居家護理採「資源耗用群(RUGs)」支付。故 D 正確。臺灣居家護理採資源耗用群(RUGs)支付制度。","options":{"A":"論人計酬(Capitation)是按人頭給付。","B":"DRG 是住院的診斷關聯群支付。","C":"論件計酬(Fee for service)是按服務件數給付。","D":"正確。居家護理採資源耗用群(RUGs)支付制度。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"105090-N5-73":{"quick":"長照十年計畫服務對象「錯誤」者＝30歲身心障礙的張小姐。","detail":{"background":"長照十年計畫(1.0)服務對象的「錯誤」者為(A)『「「30歲」身心障礙的張小姐」』——長照十年計畫1.0 的服務對象是:「65歲以上失能老人、「55~64歲」失能原住民、「50歲以上」失能身心障礙者、僅 IADL 失能且獨居的老人」。「「30歲」的身心障礙者「未滿「50歲」，不在「身心障礙者」的服務對象範圍」。其他符合對象:B 80歲獨居無法自行進食的吳女士;C 56歲中風半側麻痺的原住民王先生;D 62歲中度失智的陳先生。故本題選錯誤者為 A。身心障礙者須50歲以上才是長照1.0對象。","options":{"A":"正確(本題選錯誤者)。身心障礙者須50歲以上，30歲不在對象範圍。","B":"80歲獨居無法進食，是長照對象。","C":"56歲中風的原住民(原住民55歲以上失能)，是對象。","D":"62歲中度失智(50歲以上失智)，是對象。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"105090-N5-74":{"quick":"低收入下肢癱瘓、浴室狹小洗澡困難：最能有效解決＝轉介使用居家無障礙環境改善服務。","detail":{"background":"低收入戶、下肢癱瘓的周先生「「浴室狹小、沒有輪椅迴轉空間」，「洗澡」是其長期困難」——最能有效解決的護理措施是(D)『「轉介使用「居家無障礙環境改善服務」(改善浴室空間/設施，使輪椅能進出、迴轉，「根本解決」其洗澡困難)』。其他無法根本解決:A『復健訓練』無法改變浴室空間;B『僱用外傭』經濟困難、且未解決空間問題;C『住進護理之家』非其需求(他只是環境障礙)。故 D 正確。針對環境障礙(浴室空間)，居家無障礙環境改善最能解決(與前述同類題一致)。","options":{"A":"復健訓練無法改變浴室空間。","B":"僱用外傭經濟困難，且未解決空間問題。","C":"住進護理之家非其需求(他只是環境障礙)。","D":"正確。轉介居家無障礙環境改善服務，根本解決洗澡困難。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"105090-N5-75":{"quick":"「不屬於」社區式長期照護服務模式者＝護理之家。","detail":{"background":"長期照護服務型態中，「不屬於「社區式」」的是(A)『「護理之家」』——「護理之家」是「「機構式」長期照護(住民「入住機構」接受24小時照護)」，而非「社區式」。其他屬於「社區式(在社區/家庭接受服務)」:B 居家護理、C 居家服務、D 日間照護。故本題選不屬於者為 A。護理之家是機構式，非社區式。","options":{"A":"正確(本題選不屬於者)。護理之家是機構式，非社區式。","B":"居家護理是社區式服務。","C":"居家服務是社區式服務。","D":"日間照護是社區式服務。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"106030-N5-71":{"quick":"評估職場「失能傷害頻率(frequency rate)」必要的資料＝失能傷害次數。","detail":{"background":"職業衛生護理師評估職場「失能傷害「頻率(frequency rate)」」時，必要收集的資料是(A)『「失能傷害「「次數」」(失能傷害頻率＝失能傷害「次數」÷總經歷工時×10⁶;反映傷害「發生的頻繁程度」)』。傷害種類、傷害嚴重度非「頻率」的計算必要;「傷害損失日數總計」是計算「「嚴重率(severity rate)」」的資料(非頻率)。故 A 正確。失能傷害頻率＝失能傷害次數÷總工時×10⁶。","options":{"A":"正確。失能傷害頻率需要「失能傷害次數」。","B":"傷害種類非計算頻率的必要資料。","C":"傷害損失日數是計算「嚴重率」的資料，非頻率。","D":"傷害嚴重度非計算頻率的必要資料。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"106030-N5-74":{"quick":"臺灣護理之家機構評鑑的目的「錯誤」者＝做為長期照護保險給付之依據。","detail":{"background":"臺灣護理之家機構評鑑的目的，「錯誤」者為(D)『「做為「長期照護「保險」給付」之依據」』——錯誤，「臺灣「尚未實施「長期照護「保險」」(是「長照「十年計畫(稅收制)」」)，故機構評鑑「不是」長照保險給付的依據。其他正確的評鑑目的:A 提升機構照護品質;B 提供民眾選擇長照機構之參考;C 做為政府獎補助之參考。故本題選錯誤者為 D。臺灣無長照保險，機構評鑑非保險給付依據。","options":{"A":"提升機構照護品質，是評鑑目的。","B":"提供民眾選擇機構之參考，是評鑑目的。","C":"做為政府獎補助之參考，是評鑑目的。","D":"正確(本題選錯誤者)。臺灣無長照保險，評鑑非保險給付依據。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"106030-N5-75":{"quick":"世界各國長期照護發展的主要趨勢「錯誤」者＝增加機構式服務的使用。","detail":{"background":"當前世界各國長期照護發展的主要趨勢，「錯誤」者為(A)『「「增加「機構式」服務」的使用」』——錯誤，趨勢是「「「去機構化」、「發展社區/居家式服務」、「在地老化」」(減少機構式、增加社區居家式)。其他正確的趨勢:B 發展多元化社區照護服務;C 提供在地老化所需之支持;D 確保衰弱老人獲得照顧服務。故本題選錯誤者為 A。長照趨勢是去機構化、發展社區居家式，非增加機構式。","options":{"A":"正確(本題選錯誤者)。趨勢是去機構化、發展社區居家式，非增加機構式。","B":"發展多元化社區照護服務，是趨勢。","C":"提供在地老化所需的支持，是趨勢。","D":"確保衰弱老人獲得照顧服務，是趨勢。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"106110-N5-47":{"quick":"健保居家護理給付的收案程序＝由照護機構向健保署提出申請、經審查通過者可接受給付，不符者應予拒絕。","detail":{"background":"申請健保給付的居家護理服務，正確的收案程序是(D)『「除了「醫師開立「居家照顧醫囑單」」，也要「檢具「居家照護申請書」」，再「由「醫師及護理師」評估後收案」(須醫師醫囑＋申請書＋醫護評估)』。其他錯誤:A『只須醫師評估開醫囑、由居家「服務」部門收案』不完整(還須申請書與護理評估;且是居家「護理」非居家服務);B『可直接申請即由居家護理師安排』省略了醫師醫囑與評估;C『由機構向健保署提出申請、不符即拒絕』描述不符。故 D 正確。居家護理收案須醫囑單＋申請書＋醫護評估。","options":{"A":"只憑醫師醫囑、由居家「服務」部門收案不完整(且非健保給付的審查程序)。","B":"省略了健保給付的申請與審查程序。","C":"正確。符合收案條件者由照護機構向健保署提出申請，審查通過可給付、不符者拒絕。","D":"醫囑單與評估屬臨床收案，但本題問健保「給付」的申請審查程序，以 C 為官方答案。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"106110-N5-58":{"quick":"長照2.0 喘息服務：可選用居家、機構與日間照護型喘息服務。","detail":{"background":"長照2.0 喘息服務的正確描述是(B)『「可選用「居家式、機構式與日間照護型」喘息服務(長照2.0 將喘息服務「多元化」，照顧者可依需求選擇不同形式)」』。其他錯誤:A『重度失能者每年最高補助「14天」』數值依規定(長照2.0 喘息天數依失能等級，且後續有調整);C『每日最高補助「1,000元」』數值不符;D『輕度失智症者「尚未納入」服務對象』錯誤(長照2.0 已將「失智症(含輕度)」納入服務對象)。故 B 正確。長照2.0 喘息服務可選居家、機構、日照型。","options":{"A":"重度失能者的補助天數依規定(非單純14天)。","B":"正確。可選用居家、機構與日間照護型喘息服務。","C":"每日補助經費非1,000元(依規定)。","D":"長照2.0 已將失智症(含輕度)納入服務對象。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"106110-N5-59":{"quick":"執行出院準備服務「首先」應完成＝篩選高危險群。","detail":{"background":"執行出院準備服務時，「首先」應完成(C)『「「篩選高危險群」(先「篩選出「有出院準備需求(高危險、複雜照護需求)」的病人」，再針對這些對象進行後續的評估、計畫與安排)』。評估需求、擬定計畫、服務協調安排都是「篩選出高危險群「之後」」的步驟。出院準備服務的第一步是「篩選高危險群」。故 C 正確。出院準備服務首先篩選高危險群。","options":{"A":"評估照護需求是篩選出高危險群後的步驟。","B":"擬定照護計畫是後續步驟。","C":"正確。首先應篩選高危險群。","D":"服務協調與安排是後續步驟。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"106110-N5-74":{"quick":"長期照顧服務法的長照對象＝身心失能持續達6個月以上者。","detail":{"background":"依我國「長期照顧服務法」，所指的「長期照顧對象」是指「身心失能「持續達(B)6個月以上」」的人(「失能達6個月以上」才屬長照服務的對象)。故 B 正確。長照服務法的對象是身心失能持續達6個月以上者。 長照服務法定義的長照是對失能持續6個月以上者，依個人或照顧者需要提供生活支持、協助、社會參與、照顧及醫護服務;急性、短期(未達6個月)的照護需求屬急性醫療範疇，非長照。","options":{"A":"3個月不符長照服務法的規定。","B":"正確。身心失能持續達6個月以上者，是長照對象。","C":"12個月超過規定的最低期間。","D":"18個月超過規定。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"106110-N5-77":{"quick":"老人健檢名額已滿，代表社區資源的「可用性(availability)」不足。","detail":{"background":"某長者預約社區醫療院所的老人健檢，「但名額已滿(供給不足、無法滿足需求)」——這代表該社區老人健檢資源的(B)『「可用性(availability;資源的「「數量/供給」是否「足夠」」滿足需求;名額滿表示「供給不足」)」』不足。可近性是地理上是否容易取得;可靠性是責信;可負擔性是費用。「名額滿、供給不足」屬可用性不足。故 B 正確。名額已滿(供給不足)是可用性不足。","options":{"A":"可近性是地理/管道上是否容易取得。","B":"正確。名額已滿(供給不足)，是可用性(availability)不足。","C":"可靠性是責信。","D":"可負擔性是費用負擔。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"106111-N5-55":{"quick":"為社區老人爭取無障礙運動休閒設施＝代言者(advocate)。","detail":{"background":"「為社區老人「爭取」無障礙運動休閒設施」——是展現社區護理師的(C)『「代言者(advocate;為(弱勢)族群「發聲、爭取權益與資源)」』角色。教育者是衛教;評值者是評值;研究者是研究。本題核心是「爭取設施(為老人發聲)」，故為代言者。故 C 正確。為老人爭取設施/資源是代言者的角色。","options":{"A":"教育者是提供衛教。","B":"評值者是進行評值。","C":"正確。為社區老人爭取無障礙設施，是代言者。","D":"研究者是進行研究。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"106111-N5-64":{"quick":"老人防跌介入後下肢肌力顯著改善：依 PRECEDE-PROCEED 屬「衝擊評值」。","detail":{"background":"社區12週老人防跌介入後，「老人「下肢肌力」有顯著改善」——依 PRECEDE-PROCEED 模式，此成效指標屬(C)『「衝擊(impact)評值(評估介入對「行為、生理指標(如肌力)、危險因子」等「中期」的「改變」)」』。結構評值是評估結構/資源;過程評值是執行過程;結果(outcome)評值是「最終的「健康狀態/生活品質」(如「跌倒「率」下降」)」。「肌力改善(中期的生理改變)」屬衝擊評值。故 C 正確。肌力改善(中期生理改變)屬衝擊評值;跌倒率下降才是結果評值。","options":{"A":"結構評值是評估結構/資源(人力、設備)。","B":"過程評值是評估執行過程。","C":"正確。肌力改善(中期生理改變)屬衝擊(impact)評值。","D":"結果評值是最終的健康狀態(如跌倒率下降)。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"106111-N5-76":{"quick":"長照2.0 服務對象「錯誤」者＝65歲、ADL及IADL測試滿分、獨居的孫先生。","detail":{"background":"長照2.0 服務對象的「錯誤」者為(C)『「65歲，ADL 及 IADL 測試「滿分」、獨居的孫先生」』——「ADL 及 IADL「滿分」表示「「沒有失能(生活功能完全正常)」」，「「不是長照的服務對象」(長照服務「失能者」;「獨居」本身不等於失能)。其他符合對象:A 80歲、IADL 失能;B 48歲植物人(失能);D 52歲、失智 CDR≧2(失智)。故本題選錯誤者為 C。ADL/IADL 滿分(無失能)者非長照對象。","options":{"A":"80歲、IADL失能的謝奶奶，是長照對象。","B":"48歲植物人(失能)的吳先生，是長照對象。","C":"正確(本題選錯誤者)。ADL/IADL滿分(無失能)者非長照對象。","D":"52歲失智(CDR≧2)的王先生，是長照對象。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"106111-N5-77":{"quick":"安寧緩和醫療條例：20歲以上具完全行為能力者，得預立安寧緩和醫療意願書。","detail":{"background":"安寧緩和醫療條例的正確敘述是(A)『「「20歲以上、具完全行為能力」之人，若有意願接受安寧緩和醫療，得「預立」安寧緩和醫療「意願書」」』。其他錯誤:B『得請「醫療機構的工作人員」作為見證人』錯誤(見證人「不得為「醫療機構的「醫療人員/工作人員」」」，以避免利益衝突);C『最近親屬序為「父母、配偶、成年子女、孫子女」』錯誤(順序應是「「配偶、成年子女、孫子女、父母」…」);D『轉診至其他機構「原意願書即失效、需重新簽署」』錯誤(意願書「不因轉診而失效」)。故 A 正確。20歲以上、具完全行為能力者得預立安寧緩和意願書。","options":{"A":"正確。20歲以上、具完全行為能力者，得預立安寧緩和醫療意願書。","B":"見證人不得為醫療機構的醫療人員(利益衝突)。","C":"最近親屬的順序是配偶、成年子女、孫子女、父母等。","D":"意願書不因轉診而失效。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0","安寧緩和"]}},"106111-N5-78":{"quick":"遷移壓力症候群的照護「錯誤」者＝安排不同照顧者協助老人認識工作人員。","detail":{"background":"遷移(遷居)壓力症候群(relocation stress syndrome;老人因「遷居/入住機構」而產生焦慮、混亂等壓力反應)的照護，「錯誤」者為(B)『「安排「不同」照顧者，協助老人認識工作人員」』——錯誤，應「安排「「固定」的照顧者(主護)」」(「固定、熟悉」的照顧者能「增加安全感、減少混亂」;「不同照顧者」反而會「增加陌生與壓力」)。其他正確:A 充分提供入住前準備(預先熟悉);C 鼓勵家屬親友經常探視;D 提供日常生活活動的選擇、增加自主性。故本題選錯誤者為 B。遷移壓力症候群應安排固定照顧者，非不同照顧者。","options":{"A":"充分提供入住前準備，正確。","B":"正確(本題選錯誤者)。應安排固定照顧者，非不同照顧者。","C":"鼓勵家屬親友經常探視，正確。","D":"提供日常生活的選擇、增加自主性，正確。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"107030-N5-48":{"quick":"提供健保居家護理服務的機構型態，以「醫院附設」最多。","detail":{"background":"目前提供健保居家護理服務的機構型態中，以(A)『「醫院附設」(由醫院附設的居家護理單位)最多』。獨立開業、衛生所附設、一般開業醫師附設的居家護理單位數量較少。故 A 正確。臺灣的居家護理服務以「醫院附設」型態最多。","options":{"A":"正確。健保居家護理服務以醫院附設型態最多。","B":"獨立開業的居家護理單位較少。","C":"衛生所附設的居家護理單位較少。","D":"一般開業醫師附設的較少。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"107030-N5-56":{"quick":"老年人口比率12.51%＝高齡化社會(aging society)。","detail":{"background":"老年人口比率12.51%——介於7%~14%之間，屬(A)『「高齡化社會(aging society;65歲以上佔總人口「7%~14%」)」』。對照:高齡社會(aged society)為14%~20%;超高齡社會(super-aged)為20%以上。12.51%在7%~14%區間，屬高齡化社會。故 A 正確。7~14%是高齡化社會;14~20%是高齡社會;20%以上是超高齡社會。","options":{"A":"正確。12.51%(在7~14%之間)，屬高齡化社會(aging society)。","B":"高齡社會是14%~20%。","C":"(超高齡社會是20%以上)。","D":"超級高齡(超高齡)社會是20%以上。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"107110-N5-44":{"quick":"屬於社區中「非正式資源」者＝志工。","detail":{"background":"社區中的「非正式資源」是指「非「正式組織/制度」提供的、「自發、彈性」的資源(如家人、親友、鄰里、「志工」、宗教團體)」——(C)『「志工」』屬之。喘息服務、在宅(居家)服務、日間照護中心是「「正式資源」(由正式的機構/制度提供的服務)」。「志工」屬非正式資源。故 C 正確。志工是社區的非正式資源;喘息、居家服務、日照中心是正式資源。","options":{"A":"喘息服務是正式資源(機構/制度提供)。","B":"在宅(居家)服務是正式資源。","C":"正確。志工是社區的非正式資源。","D":"日間照護中心是正式資源。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"107110-N5-56":{"quick":"疥瘡：常見於人口密集機構①、疥蟲在皮膚表面挖隧道產卵②。","detail":{"background":"疥瘡的正確描述:(1)「常見於「人口密集的機構」(如護理之家、收容所，因密切接觸易傳播)」;(2)「疥蟲在「皮膚表面挖出隧道、產卵」(指縫、皺褶處)」。而(3)『只要「40度」高溫即可殺死疥蟲』錯誤(須「「50度以上」高溫或冷凍」才能殺死);(4)『照顧者常接觸、「只要勤清潔不需一同治療」』錯誤(密切接觸者「須「一同治療」」，否則交互感染);(5)『常見於「白天」劇烈搔癢』錯誤(疥瘡是「「夜間」劇癢」)。故正確為①②(選 A)。","options":{"A":"正確。常見於人口密集機構①、疥蟲在皮膚表面挖隧道產卵②。","B":"僅③⑤：③(40度殺疥蟲，錯)⑤(白天劇癢，錯)。","C":"①②③：含③(40度，錯誤)。","D":"②③④：含③④(皆錯)。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"107110-N5-75":{"quick":"長照管理中心照顧管理專員(care manager)的職責＝擬定照顧計畫①、連結個案所需服務③、控制照顧成本⑤。","detail":{"background":"長期照顧管理中心「照顧管理專員(care manager)」的工作職責:(1)「擬定照顧計畫」;(3)「連結個案所需的服務」;(5)「控制照顧成本(合理運用資源)」。而(2)『協助執行「復健」』、(4)『協助「傷口護理」』是「「復健治療師、護理師」「直接執行」的「臨床」工作」，「不是「照顧管理專員(屬「協調管理」角色)」」的職責。故正確為①③⑤(選 D)。照顧管理專員是擬計畫、連結服務、控制成本(管理協調)，非親自執行復健/傷口護理。","options":{"A":"123：含②(協助執行復健，是治療師的工作)，錯誤。","B":"234：含②④(直接臨床執行)，非照管專員的職責。","C":"345：含④(傷口護理，是護理師的工作)，錯誤。","D":"正確。擬定照顧計畫①、連結服務③、控制照顧成本⑤。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"107110-N5-76":{"quick":"國內長照機構評鑑的品質指標＝跌倒①、鼻胃管與導尿管移除②、非計畫性體重改變③。","detail":{"background":"國內長期照護機構評鑑採用的「品質指標」包括:(1)跌倒、(2)鼻胃管與導尿管的「移除(率)」(反映照護是否協助住民「移除不必要的管路」)、(3)非計畫性的體重改變(反映營養照護)。而(4)多重用藥、(5)預立指示「不是」(當時)機構評鑑的「標準品質指標」。故正確為①②③(選 A)。長照機構品質指標常含跌倒、管路移除、非計畫性體重改變、壓瘡、感染等。","options":{"A":"正確。跌倒①、鼻胃管與導尿管移除②、非計畫性體重改變③。","B":"234：含④(多重用藥)，非標準指標。","C":"345：含④⑤，非標準指標。","D":"125：含⑤(預立指示)，非標準指標。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"107110-N5-77":{"quick":"正常老化常見的健康問題＝吸收鈣質能力減少②、唾液腺分泌減少③、免疫力降低⑤(心輸出量增加①、胰島素分泌增加④皆錯)。","detail":{"background":"正常老化所產生的生理機能退化，常見的健康問題:(2)從食物中吸收「鈣質」的能力減少(易骨質疏鬆)、(3)唾液腺分泌減少(口乾)、(5)免疫力降低(易感染)。而(1)『心輸出量「增加」』錯誤(老化時心輸出量「「減少」」);(4)『胰島素分泌「增加」』錯誤(老化時胰島素分泌「「減少」、且阻抗增加」，血糖調節變差)。故正確為②③⑤(選 B)。老化:鈣吸收↓、唾液↓、免疫力↓、心輸出量↓、胰島素↓。","options":{"A":"125：含①(心輸出量增加，錯誤)，錯誤。","B":"正確。吸收鈣質減少②、唾液腺分泌減少③、免疫力降低⑤。","C":"245：含④(胰島素增加，錯誤)，錯誤。","D":"145：含①④(皆錯)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"107110-N5-78":{"quick":"社區中健康的女性長者最需要的照護＝生活照護指導。","detail":{"background":"社區中「「健康」的女性長者」最需要的照護是(B)『「生活照護「指導」(對「健康」的長者，著重「「健康促進、生活型態指導」(營養、運動、保健、預防)」，維持其健康與功能)』。共餐服務(社交/營養補充)、門診醫療照護、社區居家護理是針對「「有照護需求/失能」」的長者。「健康的」長者最需要的是「生活照護指導(健康促進)」。故 B 正確。健康長者最需健康促進/生活照護指導。","options":{"A":"共餐服務偏向社交/營養補充。","B":"正確。健康的女性長者最需要生活照護指導(健康促進)。","C":"門診醫療照護是針對有疾病的長者。","D":"社區居家護理是針對有照護需求/失能的長者。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"108110-N5-46":{"quick":"49床一般護理之家符合法規最低人力＝4位專職護理師、10位專職照服員、1位兼職社工師。","detail":{"background":"49床的一般護理之家，符合法規「最低」人力規範的是(B)『「「4位專職護理師、10位專職照顧服務員、1位「兼職」社工師」」』。計算:「護理人員「每15床1人」→49床需「ceil(49/15)＝4」位」;「照顧服務員「每5床1人」→49床需「ceil(49/5)＝10」位」;「社工師「未滿100床「得以「兼職」」」(49床<100，故社工師可兼職)。故 B 正確(4護理師、10照服員、1兼職社工)。","options":{"A":"三位護理師不足(49床需4位)。","B":"正確。4位護理師、10位照服員、1位兼職社工師(49床<100社工可兼職)。","C":"五位護理師、專職社工師超過最低規範(浪費人力)。","D":"十五位照服員、五位護理師超過最低規範。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"108110-N5-55":{"quick":"健保居家護理訪視給付項目「錯誤」者＝代領慢性病處方藥物。","detail":{"background":"臺灣健保居家護理訪視費用的給付項目，「錯誤」者為(C)『「「代領慢性病處方藥物」』——「代領藥物「不是」居家護理「訪視」的給付項目」(居家護理是「護理技術服務」)。其他屬於給付項目:A 壓瘡傷口護理;B 被動性關節運動;D 靜脈點滴加藥。故本題選錯誤者為 C。居家護理給付的是護理技術服務，不含代領藥物。","options":{"A":"壓瘡傷口護理是居家護理的給付項目。","B":"被動性關節運動是給付項目。","C":"正確(本題選錯誤者)。代領慢性病處方藥物非居家護理的給付項目。","D":"靜脈點滴加藥是給付項目。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"108110-N5-77":{"quick":"全身癱瘓出院、太太照顧緊張焦慮、需周全協助：轉介長期照顧管理中心。","detail":{"background":"李先生全身癱瘓、有氣切/導尿管、由太太在家照顧，太太「無人輪替、緊張焦慮、照護能力未純熟」——為讓李家「得到較周全的協助」，可轉介至(B)『「長期照顧管理中心(各縣市的長照「單一窗口」，能「整體評估需求、連結各項長照資源(居家護理、居家服務、喘息、輔具、環境改善等)」，提供「周全、整合」的協助)』。出院準備服務中心(出院前的銜接)、長期照護協會(非服務窗口)、居家護理所(僅護理服務)較無法提供「整合性」的協助。故 B 正確。需整合性、周全的長照協助，轉介長期照顧管理中心(單一窗口)。","options":{"A":"出院準備服務中心是出院前的銜接，已出院。","B":"正確。轉介長期照顧管理中心(單一窗口)，提供整合性協助。","C":"長期照護協會非服務窗口。","D":"居家護理所僅提供護理服務，無法整合各項資源。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"108110-N5-78":{"quick":"讓家庭照顧者了解類似家庭的經驗、增加心理適應＝轉介家屬支持團體。","detail":{"background":"為讓李太太「了解「類似狀況的「其他家庭照顧者」的經驗」、增加其「心理適應」」——可轉介(C)『「家屬(照顧者)支持團體(由「處境相似的照顧者」組成，「彼此「分享經驗、相互支持」」，減輕照顧壓力、增進心理適應)』。喘息服務是讓照顧者休息;居家護理是護理服務;居家服務是生活照顧人力。「了解他人經驗、相互支持、心理適應」用「家屬支持團體」。故 C 正確。家屬支持團體讓照顧者分享經驗、相互支持、增進心理適應。","options":{"A":"喘息服務是讓照顧者暫時休息。","B":"居家護理是提供護理服務。","C":"正確。轉介家屬支持團體，分享經驗、相互支持、增進心理適應。","D":"居家服務是提供生活照顧人力。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"109030-N5-52":{"quick":"參加「重陽節敬老健走」以了解老人健康體能＝參與式觀察法。","detail":{"background":"護理師「「參加」社區舉辦的「重陽節敬老健走」活動，「以了解社區老人的健康體能狀況」」——這是『「參與式觀察法(participant observation;研究者「親自參與」社區活動，在參與中「觀察」對象的狀況)」』。民意團體過程是召集團體討論;社區調查是問卷調查;擋風玻璃式調查是開車繞社區觀察環境。本題是「親自參加活動並觀察」，故為參與式觀察法。故 A 正確(與前述同類題一致)。","options":{"A":"正確。親自參加健走活動並觀察老人體能，是參與式觀察法。","B":"民意團體過程是召集團體討論。","C":"社區調查是問卷調查。","D":"擋風玻璃式調查是開車繞社區觀察環境。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"109030-N5-74":{"quick":"使住院病童於社區獲得持續性照護＝儘早執行出院準備服務。","detail":{"background":"為使住院病童於社區獲得「持續性的照護」，最適當的是(D)『「儘早執行「出院準備服務」(在「住院期間「及早」規劃出院後的照護需求、資源連結、家屬準備，使「醫院到社區」的照護「無縫銜接」)』。提供高科技設備、改善醫院環境、臨床路徑是「院內」的措施，無法確保「出院後社區的持續性」。「持續性照護(出院後銜接)」靠出院準備服務。故 D 正確(與前述同類題一致)。","options":{"A":"提供高科技醫療設備是院內措施。","B":"改善醫院環境是院內措施。","C":"臨床路徑是院內的照護流程。","D":"正確。儘早執行出院準備服務，確保社區持續性照護。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"109030-N5-75":{"quick":"長照2.0服務對象「最不適當」者＝70歲獨居、日常生活活動功能(ADL)滿分的陳先生。","detail":{"background":"長照2.0 服務對象，「最不適當」者為(B)『「70歲獨居陳先生，「日常生活活動功能(ADL)「滿分」」』——「ADL「滿分」表示「「沒有失能」」，「獨居本身不等於失能」，故「不是長照的服務對象」。其他符合對象:A 48歲、IADL 失能;C 86歲、巴氏量表(ADL)<60分(失能);D 65歲、IADL 失能且 SOF 評估三項中有二項(衰弱)。故本題選最不適當者為 B。ADL 滿分(無失能)者非長照對象。","options":{"A":"48歲、IADL失能的郭小姐，是長照對象。","B":"正確(本題選最不適當者)。ADL滿分(無失能)者非長照對象。","C":"86歲、巴氏量表<60分(失能)的李奶奶，是對象。","D":"65歲、IADL失能且SOF衰弱的王先生，是對象。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"109030-N5-76":{"quick":"長照機構住民感染疥瘡的處理「最不適當」者＝抗疥藥物勿塗抹於紅斑或水泡以外的皮膚。","detail":{"background":"長照機構住民感染疥瘡的處理，「最不適當」者為(D)『「抗疥藥物「勿塗抹於紅斑或水泡「以外」的皮膚」』——錯誤，「抗疥藥物(如 permethrin)應「「全身(頸部以下)「普遍」塗抹」」(因疥蟲可能在「看似正常」的皮膚，不能只塗病灶處)。其他適當:A 採用接觸性隔離法隔離病人;B 衣服及被單以60度以上熱水清洗;C 無法清洗的枕頭/床墊密封於塑膠袋靜置兩週(餓死疥蟲)。故本題選最不適當者為 D。抗疥藥物應全身(頸部以下)普遍塗抹，非只塗病灶。","options":{"A":"採接觸性隔離法隔離病人，適當。","B":"衣服被單以60度以上熱水清洗，適當。","C":"無法清洗者密封塑膠袋靜置兩週(餓死疥蟲)，適當。","D":"正確(本題選最不適當者)。抗疥藥物應全身(頸部以下)塗抹，非只塗病灶。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"109110-N5-46":{"quick":"長照2.0「預防失能」的服務＝口腔保健①、認知促進②、膳食營養③(職業訓練④非)。","detail":{"background":"長照2.0 中「預防及延緩失能」的服務項目包括:(1)口腔保健、(2)認知促進、(3)膳食營養，以及肌力強化運動、社會參與等。而(4)『職業訓練』「不是」長照2.0 預防失能的項目(職業訓練屬「就業」範疇)。故正確為①②③(選 A)。長照2.0 預防失能含口腔保健、認知促進、膳食營養、肌力運動等。","options":{"A":"正確。口腔保健①、認知促進②、膳食營養③。","B":"124：含④(職業訓練)，非預防失能的項目。","C":"134：含④，錯誤。","D":"234：含④、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"109110-N5-70":{"quick":"居家護理的描述「錯誤」者＝服務費用及交通費用均由健保給付。","detail":{"background":"居家護理的描述，「錯誤」者為(D)『「居家護理的「服務費用「及「交通費用」」均由健保給付」』——錯誤，「健保給付「居家護理的「訪視/技術」費用」，但「「交通費」「有「部分負擔」」(非全由健保給付)」。其他正確:A 是長期照顧中最早發展的照護模式;B 由護理師及醫生定期前往個案家中訪視;C 協助行動不便的個案在家獲得適當的醫療照護。故本題選錯誤者為 D。居家護理的交通費有部分負擔，非全由健保給付。","options":{"A":"是長期照顧中最早發展的照護模式，正確。","B":"由護理師及醫生定期前往訪視，正確。","C":"協助行動不便個案在家獲得照護，正確。","D":"正確(本題選錯誤者)。交通費有部分負擔，非全由健保給付。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"109110-N5-73":{"quick":"原住民長照政策推動困境「最不適當」者＝家庭照顧者人數過多導致溝通不良。","detail":{"background":"長照2.0 對原住民推動的困境原因，「最不適當」者為(D)『「「家庭照顧者「人數過多」」導致溝通不良」』——這「不是」原住民長照困境的原因(且「照顧者人數多」反而是「資源」，並非困境)。其他是真正的困境:A 交通不便形成地理障礙;B 醫事及照護人力不足或流動率太高;C 文化語言的障礙。故本題選最不適當者為 D。原住民長照的困境是交通、人力、文化語言，非「照顧者人數過多」。","options":{"A":"交通不便形成地理障礙，是原住民長照的困境。","B":"醫事及照護人力不足或流動率高，是困境。","C":"文化語言的障礙，是困境。","D":"正確(本題選最不適當者)。「照顧者人數過多」非困境(反而是資源)。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"109110-N5-74":{"quick":"長照管理中心照顧管理專員的職責(本題送分)。","detail":{"background":"長期照顧管理中心「照顧管理專員」的職責——本題經評定為「送分(各選項均給分)」。理解重點:照顧管理專員負責「受理申請、資格審查、需求評估、擬定/初審照顧計畫、連結服務、定期複評、控制成本」等「個案管理/協調」工作。本題送分。","options":{"A":"本題送分。受理申請、資格審查是其職責。","B":"本題送分。執行照管工作後進行複評是其職責。","C":"本題送分。照顧管理需求評估是其職責。","D":"本題送分。初審照顧計畫是其職責。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0","送分題"]}},"109110-N5-75":{"quick":"高齡社會(aged society)＝65歲以上人口比率14%。","detail":{"background":"高齡社會(aged society)是指「65歲以上人口比率達(B)14%(14%~20%)」。對照:高齡化社會(aging)為7%;超高齡社會(super-aged)為20%。故 B 正確。7%＝高齡化社會;14%＝高齡社會;20%＝超高齡社會(與前述同類題一致)。","options":{"A":"7%是高齡化社會。","B":"正確。高齡社會是65歲以上佔14%。","C":"20%是超高齡社會。","D":"25%超過超高齡社會的門檻。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"109110-N5-77":{"quick":"慢性病的特性「錯誤」者＝穩定控制代表治癒。","detail":{"background":"慢性病特性的「錯誤」者為(B)『「「穩定控制」代表「治癒」」』——錯誤，「慢性病「多無法「治癒」」，「穩定控制」只是「病情受到控制(仍需持續管理)」，並「「不等於治癒」」。其他正確:A 初期通常沒有明顯症狀;C 早期發現可避免疾病惡化;D 可能會造成失能。故本題選錯誤者為 B。慢性病穩定控制不等於治癒(仍需持續管理)。","options":{"A":"初期通常沒有明顯症狀，正確。","B":"正確(本題選錯誤者)。穩定控制不等於治癒。","C":"早期發現可避免疾病惡化，正確。","D":"可能會造成失能，正確。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"110030-N5-42":{"quick":"向里長爭取安排志工陪行動不便獨居老人就醫＝代言人角色。","detail":{"background":"護理師「向轄區里長「爭取」安排社區志工「陪行動不便的獨居老人就醫」」——較能描述其(C)『「代言人(advocate;為「無法自行就醫的弱勢老人」「發聲、爭取」協助與資源)」』角色。照護提供者是親自提供照護;個案管理者是協調個案的服務;教育者是衛教。本題核心是「為老人爭取就醫協助(發聲)」，故為代言人。故 C 正確。為弱勢老人爭取協助/資源是代言人的角色。","options":{"A":"照護提供者是親自提供照護。","B":"個案管理者是協調個案的服務。","C":"正確。為老人爭取就醫協助(發聲)，是代言人角色。","D":"教育者是提供衛教。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"110030-N5-68":{"quick":"獨居老人疑似中風、送醫、轉入安養機構＝運用「發現個案①、追蹤檢查治療③」策略。","detail":{"background":"社區護理師「接獲通報(疑似中風)→安排「送醫救治」→協助「轉入安養機構」」——運用的策略是:(1)「發現個案(接獲通報、發現疑似中風者)」;(3)「追蹤檢查治療(送醫救治、確診治療)」。而(2)『復健』、(4)『居家照護服務』與此情境不符(轉入「機構」而非居家;且未提及復健)。故正確為①③(選 D)。發現個案＋送醫救治屬「發現個案＋追蹤檢查治療」。","options":{"A":"12：含②(復健，未提及)，錯誤。","B":"23：含②、缺①，錯誤。","C":"34：含④(居家照護，轉機構非居家)，錯誤。","D":"正確。發現個案①、追蹤檢查治療(送醫)③。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"110030-N5-73":{"quick":"長期照護的敘述「不適當」者＝著重急性症狀的處置。","detail":{"background":"長期照護的敘述，「不適當」者為(D)『「著重「急性症狀」的處置」』——錯誤，長期照護是「對「慢性、失能、需「長期(持續)」照顧」者提供的「「維持功能、生活照顧、提升生活品質」」的照護」，「「不是」著重「急性症狀」的處置」(急性處置是「急性醫療」的範疇)。其他適當:A 服務對象不一定是老年人(任何失能者);B 目的是增進獨立自主的生活能力;C 需要跨專業領域的照顧。故本題選不適當者為 D。長期照護著重維持功能、生活照顧，非急性症狀處置。","options":{"A":"服務對象不一定是老年人(任何失能者)，正確。","B":"目的是增進獨立自主的生活能力，正確。","C":"需要跨專業領域的照顧，正確。","D":"正確(本題選不適當者)。長照著重維持功能，非急性症狀處置。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"110030-N5-76":{"quick":"長照十年計畫2.0 的主要財源＝菸品健康福利捐①、捐贈收入②。","detail":{"background":"目前長照十年計畫2.0 的主要財源(稅收制)是:(1)「菸品健康福利捐」、(2)「捐贈收入」，以及「遺產及贈與稅、房地合一稅、政府公務預算」等。而(3)『長期照護「保險費」』(臺灣「尚未實施長照「保險」)、(4)『全民健康「保險費」』(健保財源，非長照財源)「不是」長照的財源。故正確為①②(選 A)。長照2.0 採稅收制，財源含菸捐、遺贈稅、房地合一稅、捐贈等。","options":{"A":"正確。菸品健康福利捐①、捐贈收入②，是長照2.0的財源。","B":"23：含③(長照保險費，臺灣未實施長照保險)，錯誤。","C":"34：含③④(保險費)，皆非長照財源。","D":"14：含④(健保費，非長照財源)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"110030-N5-80":{"quick":"疑似失智、須進一步確立診斷：轉介失智共同照護中心。","detail":{"background":"社區中發現疑似失智症個案、「須進一步「確立診斷」」——應轉介至(B)『「失智「共同照護中心(失智共照中心;提供「「確診、評估、個案管理、連結資源」」，是失智「診斷與管理」的整合窗口)」』。失智社區服務據點、瑞智學堂、失智日間照護中心是「「已確診後」的「照顧/支持」服務」，非「確立診斷」的單位。「確立診斷」轉介失智共同照護中心。故 B 正確。疑似失智須確診，轉介失智共同照護中心。","options":{"A":"失智社區服務據點是已確診後的支持服務。","B":"正確。須確立診斷，轉介失智共同照護中心。","C":"瑞智學堂是已確診失智者的認知促進活動。","D":"失智症日間照護中心是已確診後的日間照顧。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"110110-N5-73":{"quick":"聯合國人口老化「最不適當」者＝超高齡社會指65歲以上佔25%以上。","detail":{"background":"聯合國人口老化的敘述，「最不適當」者為(C)『「超高齡社會(super-aged society)指65歲以上佔「25%」以上」』——錯誤，「超高齡社會是65歲以上佔「「20%」以上」」，非25%。其他正確:A 高齡化社會(aging)＝7%以上;B 高齡社會(aged)＝14%以上;D 我國於2018年進入高齡社會。故本題選最不適當者為 C。超高齡社會是20%以上，非25%。","options":{"A":"高齡化社會＝7%以上，正確。","B":"高齡社會＝14%以上，正確。","C":"正確(本題選最不適當者)。超高齡社會是20%以上，非25%。","D":"我國於2018年進入高齡社會，正確。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"110110-N5-74":{"quick":"居家護理的敘述「錯誤」者＝全民健保對居家護理的給付每個月1次為限。","detail":{"background":"居家護理的敘述，「錯誤」者為(C)『「全民健保對居家護理服務的給付，「每個月「1次」為限」』——錯誤，健保給付居家護理「「每個月「2次」(一般情況)」(必要時可增加)。其他正確:A 是屬於三段五級中的末段(第三段)預防;B 目的是減少疾病合併症及再住院率;D 一般戶居家服務的來回計程車交通費由案家自行負擔。故本題選錯誤者為 C。健保居家護理給付每月2次，非1次。","options":{"A":"屬三段五級中末段(第三段)預防，正確。","B":"目的是減少合併症及再住院率，正確。","C":"正確(本題選錯誤者)。健保居家護理給付每月2次，非1次。","D":"一般戶居家服務的交通費由案家自負，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"110110-N5-75":{"quick":"長照2.0 失智照護政策「錯誤」者＝將60歲以上失智者納入服務對象。","detail":{"background":"長照2.0 失智照護政策的「錯誤」者為(A)『「將「60歲」以上失智者納入服務對象」』——錯誤，長照2.0 將「「「50歲」以上」的失智者」納入服務對象(失智的服務對象放寬至50歲以上，非60歲)。其他正確:B 廣設失智社區服務據點、提供家屬照顧訓練及支持團體;C 鼓勵縣市布建日間照顧中心、團體家屋;D 補助入住機構專區的失智症中度以上且具行動能力老人「特別處遇費」。故本題選錯誤者為 A。長照2.0 將50歲以上失智者納入服務對象，非60歲。","options":{"A":"正確(本題選錯誤者)。長照2.0 將50歲以上失智者納入服務對象，非60歲。","B":"廣設失智社區服務據點、提供支持服務，正確。","C":"布建日間照顧中心、團體家屋，正確。","D":"補助失智症中度以上者「特別處遇費」，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"110110-N5-76":{"quick":"長照2.0 的敘述「最不適當」者＝C級巷弄長照站的功能為研擬照顧計畫、協調連結資源。","detail":{"background":"長照2.0 的敘述，「最不適當」者為(D)『「「C級巷弄長照站」其服務功能為「研擬照顧計畫、進行協調連結照顧服務資源」』——錯誤，「「研擬照顧計畫、協調連結資源」是「「A級(社區整合型服務中心)」」的功能」;「「C級(巷弄長照站)」的功能是「「提供「預防失能/延緩失能、共餐、喘息」等「在地、可近」的初級服務」」。其他正確:A 長照政策以居家、社區為主，機構式為輔;B 社區整體照顧以培植A、擴充B、廣布C 為原則;C 由中央、地方、民間三方協力布建。故本題選最不適當者為 D。研擬計畫、連結資源是A級功能;C級提供在地初級服務。","options":{"A":"長照以居家、社區為主，機構式為輔，正確。","B":"以培植A、擴充B、廣布C為原則，正確。","C":"由中央、地方、民間三方協力布建，正確。","D":"正確(本題選最不適當者)。研擬計畫、連結資源是A級功能;C級提供在地初級服務。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"110110-N5-77":{"quick":"長期照護成效的評價指標「最不適當」者＝個案慢性疾病治癒率。","detail":{"background":"長期照護成效的評價指標，「最不適當」者為(C)『「個案慢性疾病「治癒率」』——錯誤，「慢性病「無法「治癒」」，長照成效不以「治癒率」評價，而以「「功能維持、生活品質、滿意度、成本」」等評價。其他適當的評價指標:A 個案或案家的滿意程度;B 個案健康狀況的維持狀況;D 個案使用長期照護的成本。故本題選最不適當者為 C。長照成效不以慢性病治癒率評價(慢性病無法治癒)。","options":{"A":"個案或案家的滿意程度，是適當的評價指標。","B":"個案健康狀況的維持狀況，是適當指標。","C":"正確(本題選最不適當者)。慢性病無法治癒，不以治癒率評價。","D":"個案使用長期照護的成本，是適當指標。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111030-N5-65":{"quick":"小規模多機能服務機構的目的「錯誤」者＝增加老人再就業機會。","detail":{"background":"長照2.0「小規模多機能」服務機構發展目的，「錯誤」者為(D)『「增加老人「再就業」機會」』——「再就業」與「長照服務(照顧失能者)」無關，「不是」其目的。其他正確的目的:A 發展多元化社區照顧模式;B 因地制宜符合社區需求;C 落實在地老化目標。故本題選錯誤者為 D。小規模多機能的目的是多元社區照顧、在地老化，非老人再就業。","options":{"A":"發展多元化社區照顧模式，是其目的。","B":"因地制宜符合社區需求，是其目的。","C":"落實在地老化目標，是其目的。","D":"正確(本題選錯誤者)。增加老人再就業機會非其目的。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111030-N5-67":{"quick":"獨居老人預防跌倒：建議家中物品固定擺放。","detail":{"background":"獨居老人預防跌倒，正確的是(C)『「建議「家中物品「固定擺放」」(物品「固定位置」，老人熟悉、不易絆倒、好取用，減少跌倒)』。其他錯誤:A『室內燈光不足是「內因性」危險因子』錯誤(燈光不足是「「外(環境)因性」」因子);B『浴室門口放「活動地毯」』錯誤(活動地毯「易滑動、絆倒」，反增跌倒風險，應移除);D『預防跌倒屬三段五級的「第四級」』錯誤(預防跌倒(預防發生)屬「「第一級(健康促進)/第二級(特殊保護)」」，非第四級)。故 C 正確。家中物品固定擺放可減少跌倒。","options":{"A":"室內燈光不足是外(環境)因性危險因子，非內因性。","B":"活動地毯易滑動絆倒，應移除，非放置。","C":"正確。建議家中物品固定擺放，減少跌倒。","D":"預防跌倒(預防發生)屬第一/二級，非第四級。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"111030-N5-72":{"quick":"喘息服務的敘述「最不適當」者＝喘息服務只在C級巷弄長照站提供。","detail":{"background":"喘息服務的敘述，「最不適當」者為(A)『「喘息服務「只在「C級—巷弄長照站」」提供」』——錯誤，喘息服務「「有「居家式、機構式、日間照顧型」等「多種形式」」，「不限於」C級巷弄長照站」。其他正確:B 喘息服務的服務對象是家庭照顧者;C 輕度、中度失能者的家庭照顧者每年最高14天補助;D 重度失能者的家庭照顧者每年最高21天補助。故本題選最不適當者為 A。喘息服務有多種形式，不限於C級長照站。","options":{"A":"正確(本題選最不適當者)。喘息服務有多種形式，不限於C級長照站。","B":"喘息服務的對象是家庭照顧者，正確。","C":"輕中度失能者的照顧者每年最高14天，正確。","D":"重度失能者的照顧者每年最高21天，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111030-N5-73":{"quick":"衰弱評估量表 SOF「錯誤」者＝體重減輕與1年前相比減少超過5公斤以上。","detail":{"background":"SOF(Study of Osteoporotic Fractures)衰弱評估量表的敘述，「錯誤」者為(B)『「「體重減輕」:與1年前相比「體重減少超過「5公斤」以上」』——錯誤，SOF 的體重減輕指標是「「過去一年「體重減少「≧5%」(或3公斤)」」」，而非「5公斤以上」。其他正確:A 有三項評估項目(體重減輕、下肢功能、活力);C 下肢功能:無法從椅子不用手扶站起5次;D 符合二項(含)以上者為衰弱(frail)。故本題選錯誤者為 B。SOF 體重減輕是「≧5%」，非5公斤。","options":{"A":"SOF 有三項評估項目，正確。","B":"正確(本題選錯誤者)。SOF 體重減輕是過去一年≧5%，非5公斤。","C":"下肢功能:無法不扶手從椅子站起5次，正確。","D":"符合二項以上者為衰弱(frail)，正確。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"111030-N5-74":{"quick":"長期照顧的理念與目標「最不適當」者＝機構化(服務以機構資源為主、社區資源為輔)。","detail":{"background":"長期照顧的理念與目標，「最不適當」者為(A)『「機構化(institutionalization):服務以「機構」資源為主、「社區」資源為輔」』——錯誤，長照的理念是「「「去機構化」、「社區/居家為主、機構為輔」、在地老化」」，而非「機構化(機構為主)」。其他正確的理念:B 在地老化(留在家中或熟悉的社區);C 整合式服務(生活、醫事、社會支持的多面向組合);D 消費者導向(個別化、人性化的服務)。故本題選最不適當者為 A。長照以社區/居家為主、機構為輔(去機構化)，非機構化。","options":{"A":"正確(本題選最不適當者)。長照以社區/居家為主、機構為輔，非機構化。","B":"在地老化是長照的理念，正確。","C":"整合式服務是長照的理念，正確。","D":"消費者導向(個別化、人性化)是長照的理念，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111030-N5-75":{"quick":"長照2.0 ABC 三級服務的主要目的＝整合與銜接服務資源。","detail":{"background":"長照2.0 採用「ABC 三級服務(A 社區整合型服務中心、B 複合型服務中心、C 巷弄長照站)」，其主要目的是(C)『「「整合與銜接」服務資源(建構「綿密、在地化」的社區整體照顧服務網絡，使資源「整合、連結、可近」)」』。減少照顧人力、節約成本、預防機構過多非 ABC 三級的「主要」目的。ABC 三級是為了「整合與銜接資源」、建立社區照顧網。故 C 正確。ABC 三級服務的目的是整合與銜接服務資源(建構社區照顧網)。","options":{"A":"減少照顧人力非 ABC 三級的主要目的。","B":"節約成本非主要目的。","C":"正確。ABC 三級服務的目的是整合與銜接服務資源。","D":"預防機構過多非主要目的。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111110-N5-43":{"quick":"長照2.0 ABC級服務「最不適當」者＝為提供可近性服務應普設A級單位。","detail":{"background":"長照2.0 ABC級服務的敘述，「最不適當」者為(D)『「為提供「可近性」服務，應「普設「A級」單位」』——錯誤，「為提供「可近性(就近、第一線)」服務，應「「廣布「C級(巷弄長照站)」」」(C級才是「就近、最普及」的第一線據點);「A級(社區整合型服務中心)是「整合、擬計畫」的「核心」，數量較少」。其他正確:A A級單位為失能者擬定照顧服務計畫及連結/提供長照服務;B B級單位為複合型服務中心、擴充提供照護服務;C C級單位可提供社區第一線的長照服務。故本題選最不適當者為 D。可近性服務應廣布C級，非普設A級。","options":{"A":"A級為失能者擬計畫及連結/提供服務，正確。","B":"B級為複合型服務中心、擴充服務，正確。","C":"C級可提供社區第一線的長照服務，正確。","D":"正確(本題選最不適當者)。可近性服務應廣布C級，非普設A級。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111110-N5-46":{"quick":"出院準備服務的敘述「最不適當」者＝個案出院當日即結案。","detail":{"background":"出院準備服務的敘述，「最不適當」者為(D)『「個案「出院當日即結案」』——錯誤，出院準備服務應「「持續追蹤至「出院後、社區照護銜接完成」」」，而非「出院當日就結案」(否則無法確保照護的「持續性」)。其他正確:A 強調跨專業團隊合作;B 一入院24小時內開始進行;C 協助照護資源之轉介或利用。故本題選最不適當者為 D。出院準備服務應追蹤至社區銜接，非出院當日結案。","options":{"A":"強調跨專業團隊合作，正確。","B":"一入院24小時內開始進行，正確。","C":"協助照護資源之轉介或利用，正確。","D":"正確(本題選最不適當者)。應追蹤至社區銜接，非出院當日結案。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111110-N5-66":{"quick":"改善社區獨居老人支持系統「最不適當」者＝建議入住長期照護機構。","detail":{"background":"改善社區「獨居老人「支持系統」」的措施，「最不適當」者為(D)『「建議「入住長期照護機構」』——錯誤，「對(尚能獨居的)獨居老人，「改善其「社區支持系統」」是「連結資源、增加社會連結、讓其「留在社區(在地老化)」」，而非「直接送機構(剝奪其自主、不符其需求)」。其他適當:A 介紹參與宗教活動(增加社會連結);B 定期關懷訪視;C 轉介社福機構(連結資源)。故本題選最不適當者為 D。改善獨居老人的支持系統應在地連結資源，非送機構。","options":{"A":"介紹參與宗教活動(增加社會連結)，適當。","B":"定期關懷訪視，適當。","C":"轉介社福機構(連結資源)，適當。","D":"正確(本題選最不適當者)。應在地連結資源，非建議入住機構。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"111110-N5-72":{"quick":"居家式照顧服務「較不適當」者＝居家藥事服務不屬於服務範圍。","detail":{"background":"居家式照顧服務的敘述，「較不適當」者為(D)『「居家「藥事」服務「不屬於」服務範圍」』——錯誤，「長照2.0 「「已將「居家藥事服務」納入」服務範圍」(藥師到宅提供「用藥整合、指導、清查」)。其他正確:A 護理人員可獨立開設居家護理所;B 居家護理可提供鼻胃管、氣切、尿管之照護;C 依照顧管理中心專員評估，必要者可提供居家復健服務。故本題選較不適當者為 D。長照2.0 已將居家藥事服務納入服務範圍。","options":{"A":"護理人員可獨立開設居家護理所，正確。","B":"居家護理可提供鼻胃管、氣切、尿管照護，正確。","C":"必要者可提供居家復健服務，正確。","D":"正確(本題選較不適當者)。居家藥事服務已納入長照2.0的服務範圍。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111110-N5-74":{"quick":"四肢癱瘓、妻每天擦澡疲憊、浴室狹小：較適當的長照資源＝復健訓練②、喘息服務③、居家無障礙改善服務⑤。","detail":{"background":"林先生四肢癱瘓出院、妻子每天擦澡且疲憊、浴室狹小——較適當的長照資源:(2)「進行「復健訓練」(維持功能、預防併發症)」;(3)「轉介使用「喘息服務」(讓「疲憊的照顧者(妻)」能暫時休息)」;(5)「轉介使用「居家無障礙改善服務」(改善「狹小的浴室」，便利照顧)」。而(1)『日間照顧』(四肢癱瘓者外出/接送困難，較不適合);(4)『安養中心』(妻想居家照顧，且非單純安養)較不適合。故正確為②③⑤(選 C)。","options":{"A":"125：含①(日間照顧，四肢癱瘓外出困難)，較不適合。","B":"234：含④(安養中心，妻想居家照顧)，較不適合。","C":"正確。復健訓練②、喘息服務③、居家無障礙改善服務⑤。","D":"345：含④(安養中心)，較不適合。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111110-N5-75":{"quick":"林太太(照顧者)所需的支持性服務「最不適當」者＝轉介林先生至社區照顧關懷據點。","detail":{"background":"林太太(主要照顧者)所需的「支持性服務」，「最不適當」者為(B)『「轉介「林先生(被照顧者)」至「社區照顧關懷據點」』——錯誤，「社區照顧關懷據點」的對象是「「健康/亞健康」的「社區老人」(提供共餐、健康促進、關懷)」，「不適合「四肢癱瘓(重度失能)」的林先生」;且本題問的是「「林太太(照顧者)」所需的支持」。其他適當(支持林太太):A 教導脊髓損傷照護技巧;C 加入家庭照顧者支持團體;D 教導壓力處理技巧。故本題選最不適當者為 B。關懷據點對象是健康老人，不適合重度失能者;且本題是支持照顧者。","options":{"A":"教導脊髓損傷照護技巧，支持照顧者，適當。","B":"正確(本題選最不適當者)。關懷據點對象是健康老人，不適合四肢癱瘓者。","C":"加入家庭照顧者支持團體，支持照顧者，適當。","D":"教導壓力處理技巧，支持照顧者，適當。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"111110-N5-76":{"quick":"長者在家進行肌力訓練「錯誤」者＝坐姿肌力訓練不適合長者採用。","detail":{"background":"長者在家進行肌力和肌耐力訓練，「錯誤」者為(C)『「「坐姿」肌力訓練「不適合」長者採用」』——錯誤，「「坐姿(椅子)」肌力訓練「「適合」長者(尤其行動不便、平衡較差者)」(安全、可降低跌倒風險，是常用的高齡運動方式)。其他正確:A 長者每週應累計至少150分鐘中等費力運動;B 運動強度以不疼痛為原則、體能提升後再逐漸增加;D 體能差的長者以增加日常性活動為優先。故本題選錯誤者為 C。坐姿肌力訓練適合長者(安全)，非不適合。","options":{"A":"長者每週應累計至少150分鐘中等費力運動，正確。","B":"運動以不疼痛為原則、體能提升後再增加，正確。","C":"正確(本題選錯誤者)。坐姿肌力訓練適合長者(安全)，非不適合。","D":"體能差的長者以增加日常活動為優先，正確。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"111110-N5-78":{"quick":"老人跌倒危險因子中屬「外因性」者＝光線不足。","detail":{"background":"老人跌倒的危險因子中，屬「外(環境)因性」的是(A)『「光線不足(屬「「環境(外在)」」因素，如照明、地面、障礙物)」』。其他屬「內(個人)因性」:B 中風病史(疾病)、C 使用鎮靜劑(藥物)、D 白內障(視力)。「光線不足(環境)」屬外因性。故 A 正確。外因性(環境):光線、地面、障礙物;內因性(個人):疾病、藥物、感官、平衡。","options":{"A":"正確。光線不足屬外(環境)因性的跌倒危險因子。","B":"中風病史(疾病)屬內因性。","C":"使用鎮靜劑(藥物)屬內因性。","D":"白內障(視力)屬內因性。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"112030-N5-42":{"quick":"長期照顧服務法的長照定義＝身心失能持續已達或預期達6個月以上者。","detail":{"background":"依長期照顧服務法，長期照顧是指「身心失能「持續已達「或「預期達「6個月」以上」者，依其個人或照顧者的需要，提供生活支持、協助、社會參與、照顧及相關的醫護服務(B)6個月』。故 B 正確。長照服務法的長照對象是失能持續/預期達6個月以上者(與前述同類題一致)。","options":{"A":"3個月不符規定。","B":"正確。身心失能持續達或預期達6個月以上者。","C":"9個月超過規定的最低期間。","D":"12個月超過規定。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112030-N5-72":{"quick":"遷移壓力症候群的照護「較不適宜」者＝每日安排不同照顧者，增加適應性。","detail":{"background":"王老先生失能遷居入住護理之家，遷移(遷居)壓力症候群的照護，「較不適宜」者為(A)『「每日安排「「不同」照顧者」，增加適應性」』——錯誤，應「安排「「固定」的照顧者」」(「固定、熟悉」的照顧者能「增加安全感、減少混亂」;「不同照顧者」反而增加陌生與壓力)。其他適宜:B 提供入住前的準備;C 鼓勵家人、親友經常探望;D 提供日常生活活動的選擇、增加自主性。故本題選較不適宜者為 A。遷移壓力症候群應安排固定照顧者(與前述同類題一致)。","options":{"A":"正確(本題選較不適宜者)。應安排固定照顧者，非每日不同照顧者。","B":"提供入住前的準備，適宜。","C":"鼓勵家人、親友經常探望，適宜。","D":"提供日常生活的選擇、增加自主性，適宜。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"112030-N5-73":{"quick":"長期照護需求評估工具「較不適宜」者＝使用 SPMSQ 評估失智「等級」。","detail":{"background":"長期照護需求評估工具，「較不適宜」者為(C)『「使用「簡易心智狀態問卷(SPMSQ)」評估「失智「等級」」』——錯誤，「SPMSQ 是篩檢「「認知功能(有無認知障礙)」」的工具，「「不能」用來「分「失智的「等級/嚴重度」」」(失智的「等級」應用「「臨床失智評估量表(CDR)」」評估)。其他適宜:A 使用 ADLs 評估日常生活功能;B 使用 IADLs 評估服藥、家務等能力;D 使用修正版柯氏量表評估自我照顧能力。故本題選較不適宜者為 C。SPMSQ 篩檢認知，失智等級用 CDR。","options":{"A":"使用 ADLs 評估日常生活功能，適宜。","B":"使用 IADLs 評估服藥、家務等能力，適宜。","C":"正確(本題選較不適宜者)。SPMSQ 篩檢認知，失智等級應用 CDR。","D":"使用修正版柯氏量表評估自我照顧能力，適宜。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112030-N5-74":{"quick":"長照2.0「不符合」使用服務資源者＝50歲、關節退化的獨居者。","detail":{"background":"依長照2.0，「不符合」使用服務資源的是(A)『「「50歲」、「關節退化」的「獨居者」』——「50歲「非老人」、「關節退化」不一定構成「失能」、也「無身心障礙證明」」，故不符合長照對象。其他符合:B 58歲、領有身心障礙證明的原住民(55歲以上失能原住民/身障);C 54歲、年輕型失智(50歲以上失智);D 66歲、需協助吃飯上廁所洗澡(65歲以上、ADL 失能)。故本題選不符合者為 A。50歲關節退化獨居者不構成長照失能對象。","options":{"A":"正確(本題選不符合者)。50歲關節退化獨居者不構成長照失能對象。","B":"58歲領身障證明的原住民，符合對象。","C":"54歲年輕型失智(50歲以上失智)，符合對象。","D":"66歲、ADL失能需協助者，符合對象。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112030-N5-75":{"quick":"個案管理師進行長照需求評估「最不適宜」者＝以個案管理師的專業建議為基礎。","detail":{"background":"長照2.0 個案管理師進行需求評估時，「最不適宜」者為(D)『「以「個案管理師的「專業建議」」為基礎」』——錯誤，需求評估應「以「「個案(及照顧者)的「需求、生活型態、意願」」」為基礎(以案主為中心)」，而非「以「個管師的(主觀)專業建議」為基礎」。其他適宜:A 使用照顧管理評估量表;B 需考量個案的生活型態;C 應涵蓋跨領域的評估。故本題選最不適宜者為 D。需求評估以案主的需求為基礎，非個管師的主觀建議。","options":{"A":"使用照顧管理評估量表，適宜。","B":"需考量個案的生活型態，適宜。","C":"應涵蓋跨領域的評估，適宜。","D":"正確(本題選最不適宜者)。應以個案的需求為基礎，非個管師的主觀建議。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112030-N5-76":{"quick":"長照服務的方式及內容「錯誤」者＝喘息機構住宿式：提供「家庭照顧者」入住機構服務以獲得喘息。","detail":{"background":"長照服務的方式及內容，「錯誤」者為(A)『「喘息機構住宿式:提供「「家庭照顧者」入住機構」服務以獲得喘息」』——錯誤，「機構住宿式喘息是「讓「「被照顧者(失能者)」「入住機構」」」(由機構暫時接手照顧)，「使「「家庭照顧者」能「在家「喘息(休息)」」」，「而非「「照顧者」入住機構」。其他正確:B 社區式:於社區設置場所提供日間照顧、小規模多機能等;C 居家式:到宅提供照顧服務;D 家庭照顧者支持服務:提供定點、到宅等支持。故本題選錯誤者為 A。機構喘息是讓「被照顧者」入住機構，非「照顧者」入住。","options":{"A":"正確(本題選錯誤者)。機構喘息是讓「被照顧者」入住，非「照顧者」入住。","B":"社區式提供日間照顧、小規模多機能等，正確。","C":"居家式到宅提供照顧服務，正確。","D":"家庭照顧者支持服務提供定點、到宅支持，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112030-N5-80":{"quick":"衰弱(frailty)的敘述「最不適宜」者＝是指身體健康無法恢復較好的功能狀態。","detail":{"background":"衰弱(frailty)的敘述，「最不適宜」者為(C)『「是指身體健康「「無法」恢復」較好的功能狀態」』——錯誤，「衰弱是「「可逆」的」(介於健康與失能「之間」的「過渡」階段;「「可透過「運動、營養、介入」「恢復/改善」」功能)，並非「無法恢復」。其他適宜:A 是介於健康與生病/失能前的一個階段、不是一種疾病;B 通常是身體多處系統發生進展性功能下降;D 可以透過周全性評估提早發現。故本題選最不適宜者為 C。衰弱是可逆的(可透過介入改善)，非無法恢復。","options":{"A":"是介於健康與失能前的階段、不是疾病，正確。","B":"通常是身體多處系統進展性功能下降，正確。","C":"正確(本題選最不適宜者)。衰弱是可逆的(可改善)，非無法恢復。","D":"可透過周全性評估提早發現，正確。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"112110-N5-64":{"quick":"提供失智家屬指紋捺印、瑞智學堂、支持團體等資訊＝協調者。","detail":{"background":"社區護理師「提供輕度失智家屬「預防走失指紋捺印、瑞智學堂、失智家屬支持團體」等「資訊」」——是扮演(B)『「協調者(coordinator;「協調、連結」個案/家屬到「各項適合的服務與資源」)」』角色。代言人是為弱勢發聲;流行病學者是研究;環境改變者是改變環境。本題核心是「連結各項資源/服務」，故為協調者。故 B 正確。連結、轉介各項資源是協調者的角色。","options":{"A":"代言人是為弱勢發聲、爭取權益。","B":"正確。提供並連結各項資源/服務，是協調者。","C":"流行病學者是進行流行病學研究。","D":"環境改變者是改變環境。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112110-N5-66":{"quick":"符合內政部「獨居老人」界定者＝與心智障礙成年女兒同住①、與同為老人的太太同住(子在國外)②。","detail":{"background":"依內政部對「獨居老人」的界定(含「「單獨居住」、「僅與「無照顧能力者(如心智障礙者)」同住」、「「二老(配偶亦為老人)」同住」」等)，符合的是:(1)「70歲喪偶、與「心理年齡未滿3歲(心智障礙、「無照顧能力」)」的成年女兒同住(視同獨居)」;(2)「70歲、與「小4歲(亦為老年)」的太太同住、獨子定居國外(「二老同住、無其他照顧人力」，視同獨居)」。而(3)『與獨子同住、該子「僅每週二、三出差(其餘時間在家、有照顧人力)」』不符獨居。故正確為①②(選 B)。","options":{"A":"僅1：缺②(二老同住，亦符合)，不完整。","B":"正確。與心智障礙女兒同住①、與同為老人的太太同住(子在國外)②。","C":"13：含③(有獨子同住、僅短暫出差)，非獨居。","D":"23：含③，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"112110-N5-72":{"quick":"長照2.0 小規模多機能的服務項目「最不適當」者＝輔具租借。","detail":{"background":"長照2.0「小規模多機能」服務的項目，「最不適當」者為(D)『「輔具租借」』——「小規模多機能服務」結合「「日間照顧、居家服務、臨時住宿(夜間/短期)」」等「多種彈性服務」(以「日間照顧」為基礎，彈性提供到宅及臨時住宿)。而「輔具租借」是「「輔具服務」(由輔具資源中心提供)」，「不是「小規模多機能」的服務項目」。故本題選最不適當者為 D。小規模多機能含日照、居家、臨時住宿，不含輔具租借。","options":{"A":"臨時住宿是小規模多機能的服務項目。","B":"居家服務是小規模多機能的服務項目。","C":"日間照顧是小規模多機能的服務項目。","D":"正確(本題選最不適當者)。輔具租借是輔具服務，非小規模多機能的項目。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112110-N5-73":{"quick":"長照2.0 C級據點的功能「錯誤」者＝醫師駐點。","detail":{"background":"長照2.0 社區整體照護模式中「C級(巷弄長照站)據點」的功能，「錯誤」者為(C)『「醫師駐點」』——「C級巷弄長照站「沒有「醫師駐點」」(C級提供的是「「預防/延緩失能、共餐、健康促進、喘息」等「在地、初級」的服務」，並非醫療服務)。其他屬於C級的功能:A 共餐服務、B 健康促進、D 預防與延緩失能服務。故本題選錯誤者為 C。C級巷弄長照站無醫師駐點(提供在地初級服務)。","options":{"A":"共餐服務是C級據點的功能。","B":"健康促進是C級據點的功能。","C":"正確(本題選錯誤者)。C級巷弄長照站無醫師駐點。","D":"預防與延緩失能服務是C級據點的功能。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112110-N5-74":{"quick":"居家服務的敘述「錯誤」者＝核定時數不符合需求時無法申請自費服務。","detail":{"background":"居家服務的敘述，「錯誤」者為(D)『「核定時數「不符合需求時「無法」申請「自費」服務」』——錯誤，「當「長照核定的時數不足」時，「「可以「自費」「加購」服務」」(超出核定額度的部分由民眾「自費」)。其他正確:A 居家服務員在護理人員指導下可協助執行技術性照護工作;B 居家服務員可陪同個案就醫;C 獨居輕度失能老人可申請使用。故本題選錯誤者為 D。核定時數不足時可自費加購服務。","options":{"A":"居家服務員在護理人員指導下可執行技術性照護，正確。","B":"居家服務員可陪同個案就醫，正確。","C":"獨居輕度失能老人可申請使用，正確。","D":"正確(本題選錯誤者)。核定時數不足時可自費加購服務。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112110-N5-75":{"quick":"中風、留置鼻胃管/氣切、無法回門診、擔心管路照顧：最優先建議使用「居家護理」。","detail":{"background":"陳先生(中風、巴氏量表55分、「留置鼻胃管及氣切管」、「無法回門診、對「管路照顧」擔心」)——個案管理師最優先建議使用(B)『「居家護理(由「居家護理師「到宅」提供「鼻胃管、氣切管的「換管、照護、衛教」」，解決其「管路照護」與「無法回門診換管」的問題)』。其他較不優先:A 居家照顧服務(生活照顧，非管路);C 居家復健;D 居家無障礙環境改善。針對「管路照護」的需求，居家護理最優先。故 B 正確。對有管路照護需求者，最優先居家護理。","options":{"A":"居家照顧服務是生活照顧，非管路照護。","B":"正確。對管路照護需求，最優先居家護理。","C":"居家復健是復健，非管路照護。","D":"居家無障礙環境改善是環境，非管路照護。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112110-N5-76":{"quick":"無法沐浴及上下床、照顧者年長衰弱：最適當的長照資源＝居家照顧服務。","detail":{"background":"陳先生「無法獨自沐浴及上下床」、陳太太「年長衰弱」(照顧人力不足)——為協助照顧，最適當的長照資源是(A)『「居家照顧服務(由「居服員「到宅」協助「沐浴、移位(上下床)、身體照顧」等「日常生活」照顧」，補充照顧人力)』。居家醫療(醫療)、送餐服務(餐食)、交通接送(外出)非「協助日常身體照顧」的服務。「協助沐浴、上下床(身體照顧)」用居家照顧服務。故 A 正確。協助日常身體照顧(沐浴、移位)用居家照顧服務。","options":{"A":"正確。協助沐浴、上下床(身體照顧)，用居家照顧服務。","B":"居家醫療是提供醫療，非日常身體照顧。","C":"送餐服務是提供餐食。","D":"交通接送是協助外出。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112110-N5-77":{"quick":"SOF 評估：體重減2公斤(<5%正常)、無法站坐5次(異常)、2~3日無力(正常)＝符合1項，屬「衰弱傾向(前期)」。","detail":{"background":"依 SOF 衰弱量表三項評估:(1)「體重減輕」:過去一年「65→63公斤(減2公斤，「<5%」)＝「「正常(未達標準)」」;(2)「下肢功能」:「無法不扶手連續站坐「5次」(只能3次)＝「「異常(符合1項)」」;(3)「活力」:一個月「2~3日」無力(「未達「半數以上時間」」)＝「「正常」」。「符合「1項」」——依 SOF「0項＝無衰弱;1項＝衰弱「前期(傾向)」;2項以上＝衰弱」。故陳老太太屬(B)「有老年衰弱傾向(衰弱前期)」。故 B 正確。SOF 符合1項屬衰弱前期(傾向)。","options":{"A":"符合1項，已有衰弱傾向，非無衰弱。","B":"正確。符合1項(下肢功能異常)，屬衰弱傾向(前期)。","C":"符合2項以上才是「已有衰弱」，本題僅1項。","D":"SOF 無「嚴重衰弱」的分級。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"112180-N5-46":{"quick":"居家護理師的角色與功能「錯誤」者＝可為個案進行各種侵入性管路之「治療」與更換。","detail":{"background":"居家護理師的角色與功能，「錯誤」者為(C)『「可為個案進行「各種「侵入性管路」之「治療」與更換」』——敘述過度，「居家護理師「依醫囑」可更換「鼻胃管、尿管」等「特定管路」，但「「各種侵入性管路之「治療」」(如中心靜脈導管、需醫療處置者)「超出其執業範圍/屬醫師職權」」。其他正確:A 可於個案家中進行整體性身體評估;B 可協助個案與家屬進行照護指導;D 可依個案需求協助進行相關檢體送檢。故本題選錯誤者為 C。居家護理師可換特定管路，但非「各種侵入性管路的治療」。","options":{"A":"可於個案家中進行整體性身體評估，正確。","B":"可協助個案與家屬進行照護指導，正確。","C":"正確(本題選錯誤者)。居家護理師可換特定管路，但非「各種侵入性管路的治療」。","D":"可依需求協助進行檢體送檢，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"112180-N5-47":{"quick":"日間照顧的敘述「最適當」者＝是社區式照顧之一部分。","detail":{"background":"日間照顧的敘述，「最適當」者為(A)『「是「社區式照顧」之一部分(日間照顧屬「「社區式」長照;白天到機構接受照顧、晚上回家)」』。其他錯誤:B『可協助進行「技術性的管路照護」』錯誤(管路照護是「居家護理」;日間照顧以「生活照顧、活動、復健」為主);C『服務對象「僅針對生活可自理之老人」』錯誤(日間照顧也收「「失能/失智」者」);D『主管機關為「社團法人長期照顧專業學會」』錯誤(主管機關是「「政府(衛福部/地方政府)」」)。故 A 正確。日間照顧屬社區式長照。","options":{"A":"正確。日間照顧是社區式照顧之一部分。","B":"技術性管路照護是居家護理，非日間照顧的主要服務。","C":"日間照顧也收失能/失智者，非僅生活可自理者。","D":"主管機關是政府，非長期照顧專業學會。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113030-N5-2":{"quick":"失能個案符合申請＝居家復能①、交通接送③。","detail":{"background":"依長照2.0，此失能個案符合申請的補助為:(1)「居家「復能」(到宅提供「復能訓練」，「延緩失能、恢復生活功能」)」;(3)「交通接送(協助其「外出就醫/復健」的交通)」。而(2)居家服務、(4)居家護理「依其「實際需求」而定」(本案以「復能＋交通接送」為主)。故正確為①③(選 B)。失能者依「需求」核定服務;本案符合居家復能與交通接送。","options":{"A":"12：含②(居家服務，本案以復能為主)，非答案。","B":"正確。居家復能①、交通接送③。","C":"14：含④(居家護理，本案無管路護理需求)，非答案。","D":"24：含②④，非本案的核定服務。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113030-N5-46":{"quick":"出院準備服務「最不適當」者＝針對每位出院病人均需提供出院準備服務。","detail":{"background":"出院準備服務的敘述，「最不適當」者為(B)『「針對「每位」出院病人「均需」提供出院準備服務」』——錯誤，出院準備服務是「針對「篩選出的「高危險群(有持續照護需求、複雜)」」提供」，「並非「「每位」出院病人「都需要」」(多數單純的病人不需要)。其他正確:A 服務對象為需要持續性照護之個案;C 可連結居家護理及護理之家;D 追蹤評值項目包含用藥、經濟問題、意外等。故本題選最不適當者為 B。出院準備服務針對篩選出的高危險群，非每位病人。","options":{"A":"服務對象為需持續性照護的個案，正確。","B":"正確(本題選最不適當者)。針對篩選出的高危險群，非每位病人。","C":"可連結居家護理及護理之家，正確。","D":"追蹤評值含用藥、經濟、意外等，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113030-N5-47":{"quick":"中度失智、與兒女同住但兒女白天上班：應優先建議日間照顧。","detail":{"background":"陳女士(喪偶、中度失智、「與兒女同住但兒女平日「上班」(白天無人照顧)」)——應優先建議(D)『「日間照顧(「白天」到日照中心接受「照顧、活動、認知促進」，「晚上回家」與家人同住;解決「白天無人照顧」的問題)』。社區關懷據點(健康老人)、喘息服務(讓照顧者休息)、老人公寓(住宿)較不符其「白天照顧」的需求。「白天無人照顧的失智者」用日間照顧。故 D 正確。對白天無人照顧的失智者，日間照顧最適合。","options":{"A":"社區關懷據點對象是健康老人，不適合中度失智者。","B":"喘息服務是讓照顧者休息，非白天的常態照顧。","C":"老人公寓是住宿，不符其與家人同住的情況。","D":"正確。白天無人照顧的失智者，優先建議日間照顧。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113030-N5-48":{"quick":"中風、助行器行走、上下樓梯與洗澡需部分協助：符合申請居家復能①、居家護理④。","detail":{"background":"陳女士(中風、「可用助行器在家行走」、「上下樓梯與洗澡需「部分協助」」)，依長照2.0 符合申請:(1)「居家「復能」(到宅復能訓練，恢復/維持其行走、自理功能)」;(4)「居家「護理」(視其護理需求，如評估、衛教、健康監測)」。本案以「復能(維持功能)＋護理」為核定方向。故正確為①④(選 C)。中風後復能訓練(維持功能)＋居家護理是其核定服務。","options":{"A":"12：含②(居家服務)，本案以復能為主。","B":"13：含③(交通接送)，本案以復能+護理為主。","C":"正確。居家復能①、居家護理④。","D":"24：含②③，非本案核定的服務組合。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113030-N5-49":{"quick":"影響長者營養狀況的常見因素「最不適當」者＝共餐據點的餐點供應有限。","detail":{"background":"影響長者「營養狀況」的常見因素，「最不適當」者為(A)『「「共餐據點」的「餐點供應有限」』——「共餐據點的供應」是「外部服務的供給問題」，「不是「影響「個人營養狀況」」的「常見(生理/口腔)」因素」。其他是影響長者營養的常見因素:B 因服用藥物引起味覺問題或喪失食慾;C 唾液腺無法分泌足夠唾液(口乾、影響咀嚼吞嚥);D 假牙摩擦使牙床疼痛、無法咬碎食物。故本題選最不適當者為 A。影響長者營養的常見因素是藥物、口乾、假牙等生理/口腔問題，非共餐供應。","options":{"A":"正確(本題選最不適當者)。共餐供應有限是外部供給，非影響個人營養的常見生理因素。","B":"藥物引起味覺問題/喪失食慾，影響營養。","C":"唾液不足影響咀嚼吞嚥，影響營養。","D":"假牙疼痛無法咬碎食物，影響營養。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"113100-N5-26":{"quick":"核定失能等級與給付額度者＝長期照顧管理中心照顧管理專員。","detail":{"background":"依長照2.0，「核定「失能等級與給付額度」」的是(D)『「長期照顧管理中心的「照顧管理專員(care manager;受理申請、需求評估、「核定失能等級與給付額度」、擬照顧計畫)」』。出院準備中心個管員、A單位個管師、B單位督導員是「提供服務」的單位，「不負責「核定」失能等級與給付」。「核定失能等級與額度」由長照管理中心的照顧管理專員負責。故 D 正確。失能等級與給付額度由長照管理中心照顧管理專員核定。","options":{"A":"出院準備服務中心個管員不負責核定失能等級。","B":"A單位個管師是提供服務，非核定額度。","C":"B單位督導員是提供服務，非核定額度。","D":"正確。失能等級與給付額度由長照管理中心照顧管理專員核定。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113100-N5-27":{"quick":"發現老年個案多重用藥的護理措施「最不適當」者＝清點後多出的藥請個案自行丟棄。","detail":{"background":"居家護理師發現老年個案「多重用藥」，護理措施「最不適當」者為(A)『「清點完藥物後，「多出的請個案「自行丟棄」」』——錯誤，「不應「請個案自行丟棄」藥物」(應「「評估、與醫師討論、整合用藥」，並「依正確方式處理廢棄藥物(如送藥局回收)」，且須了解為何「多出(是否未按時服用)」)。其他適當:B 評估個案是否有藥物交互使用的副作用;C 評估個案每日服用藥物狀況;D 評估個案的用藥知識。故本題選最不適當者為 A。多出的藥應評估原因、與醫師討論，非請個案自行丟棄。","options":{"A":"正確(本題選最不適當者)。應評估原因、與醫師討論，非請個案自行丟棄。","B":"評估是否有藥物交互作用的副作用，適當。","C":"評估個案每日服用藥物狀況，適當。","D":"評估個案的用藥知識，適當。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"113100-N5-44":{"quick":"提供經濟弱勢獨居老人送餐服務＝社區的「相互支援」功能。","detail":{"background":"「提供社區「經濟弱勢的獨居老人」「送餐服務」」——是社區(B)『「相互支援(mutual support;社區成員間「相互扶持、提供協助」，對弱勢者伸出援手)」』功能的發揮。社會控制是維持秩序;社會參與是參與活動;社會化是傳遞價值。「對弱勢老人送餐(相互幫助)」屬相互支援。故 B 正確。對弱勢老人送餐(相互幫助)是社區的相互支援功能(與前述同類題一致)。","options":{"A":"社會控制是維持秩序、規範行為。","B":"正確。對弱勢老人送餐(相互幫助)，是相互支援功能。","C":"社會參與是參與社區活動。","D":"社會化是傳遞價值與規範。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"113100-N5-45":{"quick":"社區護理師於長期照護的角色與職責「最不適當」者＝幫個案與家庭做決定、直接給予社會資源。","detail":{"background":"社區護理師於長期照護的角色與職責，「最不適當」者為(D)『「可「幫「個案與家庭「做決定」」、直接給予社會資源」』——錯誤，護理師應「「協助、賦權」個案與家庭「「自己」做決定」(尊重其自主)，而非「「替」他們「做決定」」。其他適當:A 可幫助家庭進行調適;B 可幫助個案利用健康照護資源;C 可運用專業參與政策擬定並做適當回饋。故本題選最不適當者為 D。應協助、賦權其自主決定，非替個案與家庭做決定。","options":{"A":"可幫助家庭進行調適，適當。","B":"可幫助個案利用健康照護資源，適當。","C":"可運用專業參與政策擬定並回饋，適當。","D":"正確(本題選最不適當者)。應協助其自主決定，非替個案與家庭做決定。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113100-N5-46":{"quick":"評估個案「失能(身體功能)」狀況「最不適當」的工具＝簡易智能量表(MMSE)。","detail":{"background":"評估個案的「失能(「身體功能」)」狀況，「最不適當」的工具是(D)『「簡易智能量表(MMSE)」』——「MMSE 評估的是「「認知功能」」，「不是「「身體功能/失能」」」。適合評估「身體功能/失能」的:A 工具性日常生活量表(IADLs)、B 日常生活活動量表(ADLs)、C 修正版柯氏量表(評估自我照顧能力)。故本題選最不適當者為 D。MMSE 評估認知，非身體功能/失能。","options":{"A":"IADLs 評估工具性日常生活功能(失能)，適當。","B":"ADLs 評估日常生活活動功能(失能)，適當。","C":"修正版柯氏量表評估自我照顧能力，適當。","D":"正確(本題選最不適當者)。MMSE 評估認知，非身體功能/失能。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113100-N5-47":{"quick":"長期照護中「社區式照護」的資源「不適當」者＝機構住宿。","detail":{"background":"長期照護中「社區式照護」的資源，「不適當」者為(A)『「機構住宿」』——「機構住宿是「「機構式」」長照(住民「入住機構」)，「不是「「社區式」」」。其他屬於社區式(在社區/家庭):B 在宅臨終安寧照護、C 喘息服務(居家/日照型)、D 日間照護。故本題選不適當者為 A。機構住宿是機構式，非社區式(與前述同類題一致)。","options":{"A":"正確(本題選不適當者)。機構住宿是機構式，非社區式。","B":"在宅臨終安寧照護是社區式資源。","C":"喘息服務(居家/日照型)是社區式資源。","D":"日間照護是社區式資源。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113100-N5-48":{"quick":"長照服務法：身心失能持續已達或預期達6個月以上者，可申請長照服務。","detail":{"background":"依長期照顧服務法，「身心失能「持續已達「或「預期達「(C)6個月」以上」者，可依個人或照顧者需求申請相關長照服務』。故 C 正確。長照服務法的對象是失能持續/預期達6個月以上者(與前述同類題一致)。 長照服務法以「失能持續達或預期達6個月以上」為門檻，涵蓋老人、身心障礙者等各年齡的失能者;補助以失能等級為依據，目的是提供持續性的生活與醫護照顧。","options":{"A":"一個月不符規定。","B":"三個月不符規定。","C":"正確。身心失能持續或預期達6個月以上者，可申請長照服務。","D":"十二個月超過規定的最低期間。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113180-N5-46":{"quick":"身體衰弱、女兒上班10小時無法配合日照時段、希望白天照顧：最適當＝家庭托顧。","detail":{"background":"82歲潘老太太(身體衰弱、需照顧)，女兒「白天通勤及上班約10小時(「時間長、無法配合日間照顧中心的服務「時段」」)、但希望媽媽白天能接受照顧——最適當的社區式長照服務是(A)『「家庭托顧(由「受過訓練的「家庭托顧服務員」」在「「其自家(社區內的家庭)」」提供「「類似托兒」的「日間照顧」，「「時間較彈性」」，可配合家屬較長的上班時間)』。團體家屋(失智住宿)、社區關懷據點(健康老人)、C級巷弄站(初級服務)不符其「彈性時段的白天照顧」需求。故 A 正確。需彈性時段的白天照顧，家庭托顧最適合。","options":{"A":"正確。需彈性時段的白天照顧，家庭托顧最適合。","B":"團體家屋是失智者的住宿式照顧。","C":"社區關懷據點對象是健康老人。","D":"C級巷弄長照站提供初級服務，非全日彈性照顧。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113180-N5-47":{"quick":"C級巷弄長照站「最合適」者＝提供社區健康及亞健康老人預防及延緩失能的服務。","detail":{"background":"長照2.0「C級巷弄長照站」的最合適敘述是(B)『「提供社區「健康及亞健康老人「預防及延緩失能」」的服務(C級是「在地、第一線」的據點，提供「共餐、健康促進、預防延緩失能」等「初級」服務)』。其他是A、B級的功能:A『為失能者「擬定照顧服務計畫」』是「A級」;C『小規模多機能社區式長照』是「B級」;D『複合型長照服務中心』是「B級」。故 B 正確。C級提供預防及延緩失能的初級服務。","options":{"A":"擬定照顧服務計畫是A級的功能。","B":"正確。C級提供健康/亞健康老人預防及延緩失能的服務。","C":"小規模多機能是B級的服務。","D":"複合型長照服務中心是B級。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113180-N5-48":{"quick":"機構照護品質監測指標＝約束②、感染③、跌倒④、壓力性損傷⑤、非計畫性體重改變⑥(尿布使用①非)。","detail":{"background":"依臺灣長期照護專業協會機構照護委員會的「機構品質監測指標」，包含:(2)約束、(3)感染、(4)跌倒、(5)壓力性損傷(壓瘡)、(6)非計畫性體重改變。而(1)『尿布使用』「不是」機構品質監測的標準指標。故正確為②③④⑤⑥(選 C)。長照機構品質指標含約束、感染、跌倒、壓瘡、非計畫性體重改變等(反映照護品質與安全)。","options":{"A":"僅345：缺②⑥，不完整。","B":"僅2345：缺⑥，不完整。","C":"正確。約束②、感染③、跌倒④、壓力性損傷⑤、非計畫性體重改變⑥。","D":"123456：含①(尿布使用)，非標準指標。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"113180-N5-49":{"quick":"預防長者跌倒評估「最不適當」者＝穿著魔鬼氈固定且鞋底較厚重的鞋子能降低跌倒。","detail":{"background":"預防長者跌倒評估，「最不適當」者為(C)『「穿著魔鬼氈固定且「「鞋底較厚重」」的鞋子能「降低」跌倒」』——錯誤，「「鞋底「過厚重」會「降低足底的感覺回饋、增加行走的不穩」」，「不利」防跌」(應穿「「合腳、防滑、鞋底「薄而適中、有支撐」」的鞋)。其他適當:A 步態與平衡是老人跌倒的重要預測因子;B 白內障、失禁或認知功能退化會提高跌倒風險;D 浴室地板濕滑可建議使用防滑墊。故本題選最不適當者為 C。鞋底過厚重不利防跌，應穿合腳防滑、鞋底適中的鞋。","options":{"A":"步態與平衡是老人跌倒的重要預測因子，正確。","B":"白內障、失禁、認知退化會提高跌倒風險，正確。","C":"正確(本題選最不適當者)。鞋底過厚重不利防跌(降低足底感覺、不穩)。","D":"浴室地板濕滑建議使用防滑墊，正確。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"113180-N5-50":{"quick":"WHO 長者整合性照護指引(ICOPE)的六大能力評估＝行動、認知、視力、聽力、營養及憂鬱。","detail":{"background":"WHO 提出延緩失能的「長者整合性照護指引(ICOPE)」六大能力評估項目是(B)『「行動(移動能力)、認知、視力、聽力、營養、及憂鬱(心理)」』(ICOPE 評估「行動、認知、活力營養、視覺、聽覺、心理(憂鬱)」六大內在能力)。其他選項的組合(含藥物、失禁、日常生活活動等)非 ICOPE 的六大能力。故 B 正確。ICOPE 六大內在能力:行動、認知、視力、聽力、營養、憂鬱(心理)。","options":{"A":"含「藥物」，非 ICOPE 的六大能力。","B":"正確。行動、認知、視力、聽力、營養及憂鬱。","C":"含「失禁、日常生活活動」，非 ICOPE 的六大能力。","D":"含「藥物、日常生活活動」，非 ICOPE 的六大能力。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護","ICOPE"]}},"114030-N5-31":{"quick":"增設無障礙設施以降低老人跌倒＝渥太華憲章的「創造支持性環境」。","detail":{"background":"社區為降低老人跌倒率「增設「無障礙設施」」——屬渥太華健康促進憲章的(B)『「創造支持性的環境(改善「環境設施」，使健康/安全的選擇更容易;無障礙設施減少跌倒風險)」』。建立健康公共政策是立法;強化社區行動是社區參與;發展個人技巧是衛教。「增設無障礙設施(改善環境)」屬創造支持性環境。故 B 正確。增設無障礙設施(改善環境)是創造支持性環境(與前述同類題一致)。","options":{"A":"建立健康公共政策是立法/政策手段。","B":"正確。增設無障礙設施(改善環境)，是創造支持性環境。","C":"強化社區活動是促進社區參與。","D":"發展個人技巧是衛教與技能培養。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"114030-N5-47":{"quick":"85歲、巴氏65分、無法洗澡備餐、需陪同就醫：最合適申請「居家服務」。","detail":{"background":"方奶奶(85歲獨居、巴氏量表65分、「無法自行洗澡和備餐」、需志工陪同就醫)——最合適申請的長照服務是(B)『「居家服務(由居服員「到宅」協助「洗澡(身體照顧)、備餐(家務)、陪同就醫」等「日常生活」照顧)』。居家護理(管路/護理需求)、家庭托顧(白天托顧)、居家喘息(照顧者休息)非其「日常生活照顧」的需求。「協助洗澡、備餐、陪同就醫(日常生活照顧)」用居家服務。故 B 正確。協助日常生活照顧(洗澡、備餐)用居家服務。","options":{"A":"居家護理是針對管路/護理需求。","B":"正確。協助洗澡、備餐、陪同就醫(日常生活照顧)，用居家服務。","C":"家庭托顧是白天的托顧照顧。","D":"居家喘息是讓照顧者休息。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"114100-N5-43":{"quick":"正常老化的生理變化「最不適當」者＝聽覺退化從低頻率聽力減退開始。","detail":{"background":"正常老化的生理變化，「最不適當」者為(B)『「聽覺退化從「「低頻率」」聽力減退開始」』——錯誤，「老化的聽覺退化(老年性聽損)是「「「高頻率」」聽力「先」減退」(先聽不清高音、子音)，而非低頻率。其他正確:A 淚液製造量和質地下降(乾眼);C 嗅神經元減少使嗅覺減退;D 口腔黏膜萎縮、唾液分泌減少。故本題選最不適當者為 B。老年性聽損從「高頻率」開始，非低頻率。","options":{"A":"淚液製造量和質地下降(乾眼)，正確。","B":"正確(本題選最不適當者)。老年性聽損從高頻率開始，非低頻率。","C":"嗅神經元減少使嗅覺減退，正確。","D":"口腔黏膜萎縮、唾液分泌減少，正確。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"114100-N5-46":{"quick":"糖尿病足潰瘍者可申請的長照資源「最不適當」者＝居家照服員到府執行足部傷口清創。","detail":{"background":"吳爺爺(糖尿病、雙足潰瘍傷口、行動不便)可申請的長照資源，「最不適當」者為(B)『「可申請「居家「照服員」」到府執行「足部「傷口清創」」』——錯誤，「「傷口清創」是「「護理/醫療」處置(屬「居家「護理」師」或醫療人員的職責)」，「「不是「照顧服務員」」的工作」(照服員做生活照顧，不做傷口清創)。其他適當:A 申請輪椅購置或租賃(解決行動不便);C 申請居家護理師每月訪視進行護理指導;D 申請交通接送服務安排回診。故本題選最不適當者為 B。傷口清創是護理/醫療處置，非照服員的工作。","options":{"A":"申請輪椅購置或租賃解決行動不便，適當。","B":"正確(本題選最不適當者)。傷口清創是護理/醫療處置，非照服員的工作。","C":"申請居家護理師訪視進行護理指導，適當。","D":"申請交通接送服務安排回診，適當。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"114100-N5-47":{"quick":"護理之家的敘述「最不適當」者＝每20床至少應置護理人員1人。","detail":{"background":"依護理機構分類設置標準，護理之家的敘述，「最不適當」者為(C)『「每「20床」至少應置「護理人員」1人」』——錯誤，護理之家的「護理人員」配置是「每「「15床」」至少1人」，非20床。其他正確:A 服務對象應由醫師定期予以診察;B 收案對象包括鼻胃管、氣切、尿管之個案;D 每5床至少應置照顧服務員1人。故本題選最不適當者為 C。護理之家護理人員每15床1人，非20床。","options":{"A":"服務對象應由醫師定期診察，正確。","B":"收案對象包括鼻胃管、氣切、尿管個案，正確。","C":"正確(本題選最不適當者)。護理人員每15床1人，非20床。","D":"每5床至少置照顧服務員1人，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"114100-N5-48":{"quick":"「不屬於」Fried 衰弱量表內容者＝跌倒次數。","detail":{"background":"Fried 衰弱量表(Fried Frailty Index)的五項內容是:A 體能活動度(低)、B 體重減輕(非刻意)、D 行走速度(慢)，以及「握力下降(無力)、疲憊感」。而(C)『「跌倒次數」』「不屬於」Fried 衰弱量表的內容。故本題選不屬於者為 C。Fried 衰弱五項:體重減輕、無力(握力)、疲憊、行走速度慢、體能活動度低;不含跌倒次數。","options":{"A":"體能活動度是 Fried 衰弱量表的內容。","B":"體重減輕是 Fried 衰弱量表的內容。","C":"正確(本題選不屬於者)。跌倒次數不屬於 Fried 衰弱量表。","D":"行走速度是 Fried 衰弱量表的內容。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"114170-N5-27":{"quick":"衛福部推動長照2.0 的主責單位＝長期照顧司。","detail":{"background":"衛生福利部推動「長期照護十年計畫2.0」的「主責單位」是(D)『「長期照顧司(衛福部下「專責長照業務」的司)」』。保護服務司(保護服務)、社會保險司(社會保險)、護理及健康照護司(護理及健康照護)非長照2.0 的主責單位。長照2.0 由「長期照顧司」主責。故 D 正確。長照2.0 的主責單位是長期照顧司。","options":{"A":"保護服務司負責保護服務(家暴、性侵等)。","B":"社會保險司負責社會保險。","C":"護理及健康照護司負責護理及健康照護。","D":"正確。長照2.0 的主責單位是長期照顧司。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"114170-N5-31":{"quick":"評值人力、物力、財力的使用狀況＝效率評值(efficiency)。","detail":{"background":"護理師執行獨居老人關懷計畫後，「評值「使用的「人力、物力和財力」(投入的資源)」的使用狀況」——屬(B)『「效率評值(efficiency;評估「投入的「資源(成本)」」與「產出」的關係/合理運用程度)」』。效果評值是是否達成目標;合適性評值是是否符合需求;成效(impact)評值是衝擊/影響。「評估資源(成本)的使用」屬效率評值。故 B 正確。評估資源(人力物力財力)的使用屬效率評值。","options":{"A":"效果評值是評估是否達成目標。","B":"正確。評值人力、物力、財力的使用，是效率評值。","C":"合適性評值是評估是否符合需求。","D":"成效評值是評估衝擊/影響。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"114170-N5-32":{"quick":"蒐集社區提供獨居老人共餐情形＝社會福利系統的資料。","detail":{"background":"社區健康評估時，蒐集「社區提供「獨居老人「共餐」情形(社會福利服務)」」——主要是(C)『「「社會福利系統」的資料蒐集(共餐是「對弱勢/老人的「社會福利服務」」)」』。娛樂系統是休閒設施;經濟系統是就業收入;溝通系統是訊息傳播。「老人共餐(社會福利服務)」屬社會福利系統。故 C 正確。老人共餐服務屬社會福利系統的資料。","options":{"A":"娛樂系統是休閒設施。","B":"經濟系統是就業與收入。","C":"正確。老人共餐(社會福利服務)，屬社會福利系統。","D":"溝通系統是訊息傳播管道。"},"sources":["社區衛生護理學(新文京/華杏)·老人社區照護"]}},"114170-N5-46":{"quick":"家庭托顧服務「最不適當」者＝由照顧服務人員「到個案家」提供服務。","detail":{"background":"家庭托顧服務的敘述，「最不適當」者為(C)『「由照顧服務人員「「到個案家」」提供服務」』——錯誤，「家庭托顧是「「被照顧者(失能者)」「白天「到「照顧服務員的「自家(托顧家庭)」」」接受照顧(類似「托兒」的「托老」)」，「「不是「照服員「到個案家」」」。其他正確:A 屬於社區照護模式;B 由縣市政府主管機關自行或結合民間資源提供;D 提供失能老人身體照顧、日常生活照顧及安全照顧等。故本題選最不適當者為 C。家庭托顧是被照顧者到托顧家庭，非照服員到個案家。","options":{"A":"屬於社區照護模式，正確。","B":"由縣市政府自行或結合民間資源提供，正確。","C":"正確(本題選最不適當者)。家庭托顧是被照顧者到托顧家庭，非照服員到個案家。","D":"提供身體照顧、日常生活照顧及安全照顧，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"114170-N5-48":{"quick":"喘息服務的敘述「最不適當」者＝全額補助，一般戶免部分負擔。","detail":{"background":"長照2.0 喘息服務的敘述，「最不適當」者為(B)『「「全額補助」，「一般戶「免」部分負擔」』——錯誤，「長照服務(含喘息)「「依家庭經濟「分級「部分負擔」」」:「低收入戶「免」部分負擔;「中低收入戶、「一般戶」「須「部分負擔」」(一般戶負擔比例最高)」，「非「全額補助、一般戶免部分負擔」。其他正確:A 以照顧者需求為主的服務模式;C 家庭外籍看護工休假期間可申請使用;D 居家喘息及機構喘息可以合併使用。故本題選最不適當者為 B。一般戶須部分負擔，非全額補助/免部分負擔。","options":{"A":"以照顧者需求為主的服務模式，正確。","B":"正確(本題選最不適當者)。一般戶須部分負擔，非全額補助/免部分負擔。","C":"家庭外籍看護工休假期間可申請使用，正確。","D":"居家喘息及機構喘息可以合併使用，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"115030-N5-27":{"quick":"19歲、意識清楚、肺癌末期預立DNR：意願書具法律效力①、需具完全行為能力者二人以上見證②、簽署後可隨時撤回④(執行機構人員不可見證③)。","detail":{"background":"王同學(19歲、「已成年(民法18歲成年)」、意識清楚、肺癌末期)預立 DNR 意願書，正確的是:(1)「所簽署的意願書「具法律效力」(成年、意識清楚、自願簽署)」;(2)「需有「具完全行為能力者「二人以上」在場「見證」」;(4)「意願書簽署後「可以「隨時撤回」」。而(3)『「執行「意願人維生醫療之機構」所屬人員」可當「見證人」』錯誤——「執行「該病人維生醫療的機構」的「醫療人員」「「不得」擔任「見證人」」(以避免利益衝突)。故正確為①②④(選 B)。","options":{"A":"123：含③(執行機構人員當見證，利益衝突，錯誤)。","B":"正確。意願書具法律效力①、二人以上見證②、可隨時撤回④。","C":"134：含③，錯誤。","D":"234：含③、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0","安寧緩和"]}},"115030-N5-46":{"quick":"失智社區服務據點的服務項目「最不適當」者＝提供失智個案申請外籍照顧服務員。","detail":{"background":"失智社區服務據點的服務項目，「最不適當」者為(C)『「提供失智個案「申請「外籍照顧服務員」」』——「申請外籍看護(外籍照服員)」是「另循「就業/外籍移工」管道」，「「不是「失智社區服務據點」」的服務項目」(據點提供的是「認知促進、共餐、照顧者支持」等)。其他屬於據點的服務:A 提供極輕度至輕度失智者的認知功能促進活動;B 提供個案共餐等長照預防服務;D 提供照顧者支持團體及照顧訓練課程。故本題選最不適當者為 C。失智據點不提供申請外籍看護的服務。","options":{"A":"提供失智者認知功能促進活動，是據點的服務。","B":"提供共餐等長照預防服務，是據點的服務。","C":"正確(本題選最不適當者)。申請外籍看護非失智據點的服務項目。","D":"提供照顧者支持團體及照顧訓練，是據點的服務。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"115030-N5-47":{"quick":"出院準備服務的特性「最不適當」者＝是以機構為中心的照護模式。","detail":{"background":"出院準備服務的特性，「最不適當」者為(B)『「是以「「機構」為中心」的照護模式」』——錯誤，出院準備服務是「「以「「個案(病人)」為中心」」(以病人的「持續照護需求」為中心，協助其從醫院順利銜接到社區/家庭)，而非「以機構為中心」。其他正確:A 是持續照護體系中重要的轉銜機制;C 需要各醫療照顧等專業團隊共同參與;D 入院即為出院準備的開始。故本題選最不適當者為 B。出院準備服務以個案為中心，非以機構為中心。","options":{"A":"是持續照護體系中重要的轉銜機制，正確。","B":"正確(本題選最不適當者)。出院準備服務以個案為中心，非以機構為中心。","C":"需要各專業團隊共同參與，正確。","D":"入院即為出院準備的開始，正確。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}},"115030-N5-48":{"quick":"老人福利機構類型「最適當」者＝失智照顧型機構提供「中度失智以上、具行動能力且需受照顧者」。","detail":{"background":"依老人福利機構設立標準，最適當的是(A)『「「失智照顧型」機構是提供「「中度失智以上、具行動能力」且需受照顧」者(以「單元/團體家屋」方式照顧能行動的中重度失智者)』。其他錯誤:B『安養機構「僅提供「自我照顧「缺失」」老人』錯誤(安養機構收住「「生活可「自理」」、無重大疾病的老人」);C『日間照顧是提供「全天候」的照顧』錯誤(日間照顧是「「白天」」照顧、晚上回家);D『養護型機構提供「具足夠生活「自理」能力」之老人』錯誤(養護型收住「「生活「無法自理」、但「無技術性護理」需求」者)。故 A 正確。失智照顧型機構收住中度失智以上、具行動能力者。","options":{"A":"正確。失智照顧型機構提供中度失智以上、具行動能力且需受照顧者。","B":"安養機構收住生活可自理的老人，非自我照顧缺失者。","C":"日間照顧是白天照顧、晚上回家，非全天候。","D":"養護型機構收住無法自理但無技術性護理需求者，非具足夠自理能力者。"},"sources":["社區衛生護理學(新文京/華杏)·長期照護","長期照顧十年計畫2.0"]}}},TO=["長期照護與老人社區照護"],LEC={"長期照護與老人社區照護":{"title":"長期照護與老人社區照護　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「長期照護與老人社區照護」的歷屆考題共 155 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_h5_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
