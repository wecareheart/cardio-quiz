要是考量下列那個原則?","opts":{"A":"可負擔性","B":"可近性","C":"可接受性","D":"有用性"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"傳染病防治與預防接種","topic_num":"傳染病防治與預防接種","q_num":32,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"可負擔性","B":"可近性","C":"可接受性","D":"有用性"},"img":""}],E={"101030-N5-41":{"quick":"傳染病發生時必須檢疫的對象＝與病人接觸者。","detail":{"background":"傳染病發生時，必須「檢疫(quarantine)」的對象為(A)『「與病人「接觸者」(可能已被感染、尚在潛伏期、有傳播風險者，須在潛伏期內「限制其活動、觀察」)」』。「檢疫」是針對「「接觸者(可能感染但尚未發病者)」」的措施;「「隔離(isolation)」」才是針對「「已發病的病人」」。曾到國外、有發燒、曾打疫苗者非「檢疫」的定義對象。故 A 正確。檢疫針對接觸者(可能感染、潛伏期者)。","options":{"A":"正確。檢疫的對象是與病人接觸者(可能感染、潛伏期者)。","B":"曾到國外者不一定是接觸者。","C":"有發燒的人可能是病人(應隔離)，非檢疫的定義對象。","D":"曾打疫苗者已有免疫力，非檢疫對象。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"101030-N5-44":{"quick":"麻疹「不會」經由「血液」傳染。","detail":{"background":"麻疹是「「呼吸道(空氣/飛沫)傳染病」」，會經由(A)飛沫、(C)接觸、(D)咽喉分泌物傳染，但「「不會」經由(B)「血液」傳染」(麻疹病毒主要存在於呼吸道分泌物，經飛沫/空氣傳播，非血液途徑)。故本題選不會的途徑為 B。麻疹經飛沫/空氣傳播，非血液傳染。","options":{"A":"麻疹會經由飛沫傳染。","B":"正確(本題選不會者)。麻疹不會經由血液傳染。","C":"麻疹會經由接觸傳染。","D":"麻疹會經由咽喉分泌物傳染。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"101030-N5-45":{"quick":"桿菌性痢疾傳染方式「錯誤」者＝飛沫感染。","detail":{"background":"桿菌性(細菌性)痢疾(志賀氏桿菌)是「「糞口傳染」」，傳染方式的「錯誤」者為(C)『「飛沫感染」』——痢疾「「不經飛沫」傳染」(是「糞口途徑」)。其他正確:A 由帶菌者糞便污染之物而感染;B 可能由蒼蠅散播病菌到食品而感染;D 接觸帶菌者糞便後沒洗手或沒清洗指甲縫隙。故本題選錯誤者為 C。桿菌性痢疾是糞口傳染，非飛沫。","options":{"A":"由帶菌者糞便污染之物而感染，正確。","B":"可能由蒼蠅散播病菌到食品，正確。","C":"正確(本題選錯誤者)。痢疾是糞口傳染，非飛沫感染。","D":"接觸糞便後沒洗手而感染，正確。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"101030-N5-68":{"quick":"愛滋條例「錯誤」者＝愛滋病藥品費用由病人全額負擔。","detail":{"background":"「人類免疫缺乏病毒傳染防治及感染者權益保障條例」的措施，「錯誤」者為(A)『「愛滋病藥品費用由病人「全額負擔」」』——錯誤，政府「「提供「免費」的抗愛滋病毒治療藥品」」(以維持治療、降低傳播)，非由病人全額負擔。其他正確:B 訂定致感染者補償辦法;C 無健保的感染者提供免費的抗愛滋藥品;D 開辦愛滋個管師計畫。故本題選錯誤者為 A。政府提供免費的抗愛滋藥品，非病人全額負擔。","options":{"A":"正確(本題選錯誤者)。政府提供免費抗愛滋藥品，非病人全額負擔。","B":"訂定致感染者補償辦法，正確。","C":"無健保感染者提供免費抗愛滋藥品，正確。","D":"開辦愛滋個管師計畫，正確。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"101110-N5-47":{"quick":"致病力最高的腸病毒類型＝71型腸病毒。","detail":{"background":"腸病毒中「致病力(尤其引發「重症」)最高」的類型是(D)『「腸病毒「71型」(EV71;最易造成「神經系統併發症、重症、死亡」，尤其5歲以下幼兒)」』。克沙奇病毒、依科病毒多引起較輕的手足口病/疱疹性咽峽炎。腸病毒71型是重症與死亡的主要型別。故 D 正確。腸病毒71型(EV71)致病力最高、最易重症。","options":{"A":"A型克沙奇病毒多引起較輕的手足口病/疱疹性咽峽炎。","B":"B群克沙奇病毒致病力非最高。","C":"依科病毒致病力非最高。","D":"正確。腸病毒71型(EV71)致病力最高、最易重症。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"101110-N5-48":{"quick":"以「預防注射」預防傳染病＝增強人體的抵抗力。","detail":{"background":"強調以「預防注射(疫苗)」來預防傳染病——是應用(C)『「增強「人體(宿主)」的抵抗力(疫苗使人體產生「特異性免疫」，抵抗特定病原)」』的原則。撲滅病原體是消滅病原;控制傳染源是處理感染源;控制傳染途徑是阻斷傳播。「疫苗(增強宿主免疫)」屬增強人體抵抗力。故 C 正確。預防注射(疫苗)是增強宿主(人體)的抵抗力。","options":{"A":"撲滅病原體是消滅病原。","B":"控制傳染源是處理感染源(病人/帶菌者)。","C":"正確。預防注射(疫苗)是增強人體的抵抗力。","D":"控制傳染途徑是阻斷傳播(如洗手、消毒)。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"102030-N5-45":{"quick":"施打流感疫苗＝增加宿主抵抗力。","detail":{"background":"施打流行性感冒疫苗，在傳染病防治原則中屬於(C)『「增加「宿主」抵抗力(疫苗使宿主產生免疫，抵抗流感病毒)」』。減少感染源傳染力是處理感染源;切斷傳染途徑是阻斷傳播;降低疾病感受性的描述較籠統(疫苗是「增加抵抗力」)。「疫苗」屬增加宿主抵抗力。故 C 正確(與前述同類題一致)。","options":{"A":"減少感染源的傳染力是處理感染源。","B":"切斷傳染途徑是阻斷傳播。","C":"正確。施打流感疫苗是增加宿主抵抗力。","D":"「降低疾病感受性」的描述較籠統，疫苗是增加抵抗力。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"102030-N5-46":{"quick":"可透過胎盤垂直傳染者＝梅毒①、愛滋病②、B型肝炎③(肺結核④非)。","detail":{"background":"可透過「胎盤「垂直傳染(母嬰傳染)」」的疾病:(1)梅毒、(2)愛滋病、(3)B型肝炎(這些病原可經「胎盤/產道/血液體液」由母傳子)。而(4)『肺結核』「「不經胎盤垂直傳染」(肺結核是「「空氣/飛沫」傳染」，先天性結核極罕見)」。故正確為①②③(選 A)。梅毒、愛滋、B肝可垂直傳染;肺結核是空氣傳染。","options":{"A":"正確。梅毒①、愛滋②、B肝③可垂直(母嬰)傳染。","B":"234：含④(肺結核，非垂直傳染)，錯誤。","C":"134：含④，錯誤。","D":"124：缺③(B肝可垂直傳染)，不完整。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"102110-N5-42":{"quick":"腸病毒感染特徵：傳染途徑為直接接觸傳染。","detail":{"background":"腸病毒感染特徵的正確敘述是(C)『「傳染途徑為「(直接)接觸傳染」(接觸患者的口鼻分泌物、糞便、皮膚水泡;亦可糞口、飛沫)」』。其他錯誤:A『感染過腸病毒者，以後「不會再感染」』錯誤(腸病毒「型別多」，感染一型後「仍可能感染「其他型別」」);B『流行季節是「冬季」』錯誤(腸病毒流行季節是「「春夏(4~9月)」」);D『感染後約在「二天內」出現症狀』錯誤(潛伏期約「「3~5天」」)。故 C 正確。腸病毒主要經接觸(及糞口、飛沫)傳染。","options":{"A":"腸病毒型別多，感染一型後仍可能感染其他型別。","B":"腸病毒流行季節是春夏(4~9月)，非冬季。","C":"正確。腸病毒的傳染途徑為直接接觸傳染。","D":"腸病毒潛伏期約3~5天，非二天內。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"102110-N5-56":{"quick":"新生兒家庭訪視的主要目的＝確認產婦照顧新生兒的能力。","detail":{"background":"社區護理師接獲新生兒通報、進行家庭訪視，此次訪視的「主要目的」是(A)『「確認產婦(照顧者)照顧新生兒的能力(評估產婦的育兒知能、新生兒的照顧、餵養、環境，提供必要的支持與指導)」』。施打B肝疫苗、先天代謝異常篩檢已在「住院期間(出生時)」完成;確認是否遵從坐月子規範非訪視的主要目的。新生兒家訪以「評估照顧能力、提供支持」為主。故 A 正確。","options":{"A":"正確。新生兒家訪的主要目的是確認產婦照顧新生兒的能力。","B":"B肝疫苗於出生時(住院期間)施打，非家訪目的。","C":"先天代謝異常篩檢於出生後住院期間採檢。","D":"確認是否遵從坐月子規範非家訪的主要目的。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"102110-N5-79":{"quick":"可經由病媒(昆蟲)傳染者＝日本腦炎③、瘧疾④(猩紅熱①、百日咳②是飛沫)。","detail":{"background":"可經由「病媒(昆蟲)」傳染的傳染病:(3)日本腦炎(「三斑家蚊」傳播)、(4)瘧疾(「瘧蚊」傳播)。而(1)猩紅熱、(2)百日咳是「「飛沫(呼吸道)傳染」」，非病媒傳染。故正確為③④(選 D)。日本腦炎、瘧疾經蚊子(病媒)傳染;猩紅熱、百日咳是飛沫傳染。","options":{"A":"12：猩紅熱、百日咳是飛沫傳染，非病媒。","B":"13：含①(猩紅熱，飛沫)，錯誤。","C":"23：含②(百日咳，飛沫)，錯誤。","D":"正確。日本腦炎③、瘧疾④經病媒(蚊子)傳染。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"103030-N5-48":{"quick":"每年推廣老人流感疫苗接種＝三段五級的「特殊保護」。","detail":{"background":"每年推廣「老人「流感疫苗接種」」——是對「健康者」施打疫苗以「預防特定疾病」，屬三段五級的(B)『「特殊保護(第二級;屬第一段預防;疫苗接種是針對特定疾病的防護)」』。健康促進是一般性的健康增進;早期治療、早期診斷是第二段。「疫苗接種」屬特殊保護。故 B 正確(與前述同類題一致)。","options":{"A":"健康促進是一般性的健康增進(衛教、營養)。","B":"正確。流感疫苗接種屬特殊保護(第二級)。","C":"早期治療屬第二段預防。","D":"早期診斷屬第二段預防。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"103030-N5-73":{"quick":"日本腦炎疫苗(當時)＝死的病毒(不活化疫苗)。","detail":{"background":"日本腦炎疫苗(本題依當時的「「鼠腦不活化疫苗」」)屬(C)『「「死的(不活化)病毒」疫苗」』——當時的日本腦炎疫苗是「以「滅活(死的)」病毒」製成的不活化疫苗。(註:現行已改為「「活性減毒」嵌合疫苗」，於出生滿15個月、27個月接種;但本題時代為不活化(死病毒)疫苗。)故 C 正確。","options":{"A":"(現行為活性減毒，但本題時代)當時為死病毒疫苗。","B":"日本腦炎疫苗是病毒疫苗，非細菌。","C":"正確。當時的日本腦炎疫苗是死的(不活化)病毒疫苗。","D":"日本腦炎疫苗是病毒疫苗，非細菌。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"103100-N5-47":{"quick":"第一類法定傳染病：應於24小時內完成報告；應於指定隔離治療機構施行隔離治療。","detail":{"background":"依傳染病防治法，「第一類」法定傳染病(如天花、鼠疫、SARS、嚴重特殊傳染性肺炎等，危害最大)的處置，正確的是(A)『「應於「24小時內」完成報告;「應」於指定隔離治療機構施行「隔離治療」(第一類「強制」隔離)」』。第一類傳染病須「24小時內通報、「強制」隔離治療」(不是「必要時」才隔離，而是「應」隔離)。報告時限非「一周」。故 A 正確。第一類傳染病:24小時內通報、強制隔離治療。","options":{"A":"正確。24小時內完成報告;應於指定機構施行隔離治療。","B":"第一類是「應」隔離(強制)，非「必要時」才隔離。","C":"報告時限是24小時內，非一周。","D":"報告時限是24小時內、且為強制隔離，非一周/必要時。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"103100-N5-58":{"quick":"健康促進的範疇＝定期健康檢查(本題答案；其餘為特殊保護)。","detail":{"background":"健康促進範疇的敘述，本題答案為(A)『「定期健康檢查」』——相對於其他選項(B 預防接種、C 職業災害防治、D 去除致癌物質，這些都是「「特殊保護(第二級預防)」」)，A「定期健康檢查」被歸為「健康(維護)的範疇」。(嚴格而言，定期健檢含「早期診斷」意涵;但本題以「定期健康檢查」為相對符合「健康促進/健康維護」者。)故 A 正確。(其他三項皆屬特殊保護。)","options":{"A":"正確(本題答案)。定期健康檢查屬健康維護/促進的範疇。","B":"預防接種屬特殊保護(第二級)。","C":"職業災害防治屬特殊保護(第二級)。","D":"去除致癌物質屬特殊保護(第二級)。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"104030-N5-49":{"quick":"疾病傳染期間暫時關閉公共場所＝切斷傳染途徑。","detail":{"background":"在疾病傳染期間「暫時關閉公共場所」——是(B)『「切斷傳染途徑(減少人群聚集、阻斷病原在人與人之間的傳播)」』。減少感染源傳染力是處理感染源(病人);增加宿主抵抗力是疫苗等;降低疾病感受性較籠統。「關閉公共場所(減少聚集、阻斷傳播)」屬切斷傳染途徑。故 B 正確。關閉公共場所、減少聚集是切斷傳染途徑。","options":{"A":"減少感染源的傳染力是處理感染源(病人/帶菌者)。","B":"正確。關閉公共場所、減少聚集，是切斷傳染途徑。","C":"增加宿主抵抗力是疫苗等措施。","D":"「降低疾病感受性」的描述較籠統。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"104100-N5-48":{"quick":"易導致出血性登革熱者＝登革熱重複感染(不同型別)。","detail":{"background":"易導致「「出血性(重症)登革熱」」的是(C)『「登革熱「重複感染」(感染「不同型別」的登革病毒;因「抗體依賴性增強(ADE)」現象，第二次感染不同型別時，原有抗體反而促進病毒增殖，導致重症/出血)」』。感染第一型、未及時治療、服用阿斯匹靈(會加重出血但非「導致」出血性登革熱的「機轉」)非主因。「重複感染不同型別」是出血性登革熱的關鍵。故 C 正確。重複感染不同型別登革病毒(ADE)易致出血性登革熱。","options":{"A":"感染單一型別不一定致出血性登革熱。","B":"未及時治療非出血性登革熱的關鍵機轉。","C":"正確。登革熱重複感染(不同型別，ADE)易致出血性登革熱。","D":"服用阿斯匹靈會加重出血，但非「導致」出血性登革熱的機轉(且登革熱禁用阿斯匹靈)。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"104100-N5-49":{"quick":"不需病媒/媒介物、直接由病人傳給宿主者＝B型肝炎①、麻疹④(日本腦炎②、傷寒③需媒介)。","detail":{"background":"病原體「不需經過病媒或媒介物、「直接」由病人傳給宿主」的:(1)B型肝炎(經「血液、體液」直接傳染)、(4)麻疹(經「飛沫、空氣」直接傳染)。而(2)日本腦炎(需「病媒「蚊子」」)、(3)傷寒(需「媒介物「污染的食物/水」(糞口)」)。故正確為①④(選 D)。B肝(血液體液)、麻疹(飛沫)是直接傳染;日本腦炎(蚊)、傷寒(食物水)需媒介。","options":{"A":"12：含②(日本腦炎，需病媒蚊)，錯誤。","B":"23：日本腦炎需病媒、傷寒需媒介物，皆非直接。","C":"34：含③(傷寒，需媒介物)，錯誤。","D":"正確。B肝①(血液體液)、麻疹④(飛沫)是直接傳染。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"104100-N5-50":{"quick":"淋病確診個案的防疫措施＝應呈報當地衛生主管機關。","detail":{"background":"針對淋病確診個案的防疫措施，正確的是(A)『「應「呈報(通報)」當地衛生主管機關(淋病為法定傳染病，須依規定通報)」』。其他錯誤:B『應「隔離」』錯誤(淋病是性接觸傳染，「不需隔離」;應「治療、追蹤接觸者」);C『需要「檢疫」』錯誤(淋病不需檢疫);D『應給予「被動疫苗注射」』錯誤(淋病「無疫苗」，以「抗生素治療」)。故 A 正確。淋病應依法通報，並治療、追蹤接觸者(無需隔離/檢疫/疫苗)。","options":{"A":"正確。淋病確診應呈報當地衛生主管機關。","B":"淋病是性接觸傳染，不需隔離。","C":"淋病不需檢疫。","D":"淋病無疫苗，以抗生素治療。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"104100-N5-68":{"quick":"社區傳染病防治的「第二段」預防＝主動發現個案③、使民眾早期接受治療④(預防接種①、衛生教育②是初段)。","detail":{"background":"社區傳染病防治措施中，屬「第二段(早期診斷、早期治療)」預防的是:(3)主動發現個案(早期發現)、(4)使民眾早期接受治療(早期治療)。而(1)實施預防接種、(2)進行衛生教育是「「初段(第一段)」預防」(健康促進/特殊保護)。故第二段預防為③④(選 B)。第二段預防＝早期發現、早期診斷、早期治療。","options":{"A":"12：預防接種、衛生教育是初段預防，非第二段。","B":"正確。主動發現個案③、早期接受治療④，是第二段預防。","C":"13：含①(預防接種，初段)，錯誤。","D":"24：含②(衛生教育，初段)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"104100-N5-76":{"quick":"中老年預防保健的「特殊保護」措施＝接種流感疫苗。","detail":{"background":"依三段五級，屬中老年預防保健「特殊保護(第二級)」的措施是(A)『「接種流感疫苗(對特定疾病的防護)」』。大腸直腸癌篩檢是「「早期診斷(第三級)」」;規律運動是「「健康促進(第一級)」」;居家照護是「「復健/限制殘障(第三段)」」。「疫苗接種」屬特殊保護。故 A 正確(與前述同類題一致)。","options":{"A":"正確。接種流感疫苗屬特殊保護(第二級)。","B":"大腸直腸癌篩檢屬早期診斷(第三級)。","C":"規律運動屬健康促進(第一級)。","D":"居家照護屬復健/限制殘障(第三段)。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"105030-N5-48":{"quick":"傳染防治的「初段」預防工作＝實施衛生教育。","detail":{"background":"社區護理師在傳染病防治上的「初段(第一段)」預防工作是(B)『「實施衛生教育(屬「健康促進」，是第一段預防;教導民眾預防傳染病的知識與行為)」』。疫情調查、早期發現病例、門診/防疫局追蹤治療屬「「第二段(早期發現、早期治療)」」預防。「衛生教育(健康促進)」屬初段預防。故 B 正確。衛生教育屬初段(第一段)預防。","options":{"A":"疫情調查屬第二段預防(早期發現)。","B":"正確。實施衛生教育(健康促進)屬初段預防。","C":"早期發現病例屬第二段預防。","D":"門診/防疫追蹤治療屬第二段預防(早期治療)。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"105030-N5-49":{"quick":"病媒蚊造成的傳染疾病＝日本腦炎①、瘧疾④(霍亂②、A型肝炎③是糞口)。","detail":{"background":"由「病媒「蚊」」造成的傳染疾病:(1)日本腦炎(三斑家蚊)、(4)瘧疾(瘧蚊)。而(2)霍亂、(3)A型肝炎是「「糞口(食物/水)傳染」」，非病媒蚊。故正確為①④(選 B)。日本腦炎、瘧疾經蚊子(病媒)傳染;霍亂、A肝是糞口傳染。","options":{"A":"12：含②(霍亂，糞口)，錯誤。","B":"正確。日本腦炎①、瘧疾④經病媒蚊傳染。","C":"23：霍亂、A肝是糞口傳染，非病媒蚊。","D":"24：含②(霍亂，糞口)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"105030-N5-69":{"quick":"預防婦女生下缺陷兒，尚未懷孕者應建議施打＝德國麻疹(MMR)疫苗。","detail":{"background":"為預防婦女生下「缺陷兒」，護理師對「尚未懷孕者」應建議施打(C)『「德國麻疹(MMR;麻疹、腮腺炎、德國麻疹)疫苗」——「孕婦若感染「德國麻疹(風疹)」會造成胎兒「「先天性德國麻疹症候群(心臟缺陷、白內障、聽障等)」」」，故「育齡婦女應在「懷孕前」接種(MMR 是活疫苗，「孕期不可接種」)」』。三合一(白喉百日咳破傷風)、沙賓(小兒麻痺)非預防胎兒缺陷的疫苗。故 C 正確。育齡婦女應在孕前接種德國麻疹(MMR)疫苗，預防先天性德國麻疹症候群。","options":{"A":"三合一疫苗(白喉百日咳破傷風)非預防胎兒缺陷。","B":"沙賓疫苗(小兒麻痺)非預防胎兒缺陷。","C":"正確。德國麻疹(MMR)疫苗，預防先天性德國麻疹症候群。","D":"(對照)其他疫苗非預防先天性德國麻疹。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"105090-N5-58":{"quick":"疾病與病媒「錯誤」配對＝登革熱-三斑家蚊(應為埃及斑蚊/白線斑蚊)。","detail":{"background":"疾病與相對應病媒的描述，「錯誤」者為(D)『「登革熱-「三斑家蚊」」』——錯誤，「登革熱的病媒是「「埃及斑蚊、白線斑蚊」」;「「三斑家蚊」是「「日本腦炎」」的病媒」。其他正確:A 疥瘡-疥蟲;B 鼠疫-跳蚤;C 回歸熱-體蝨。故本題選錯誤者為 D。登革熱病媒是斑蚊;三斑家蚊傳日本腦炎。","options":{"A":"疥瘡-疥蟲，正確。","B":"鼠疫-跳蚤，正確。","C":"回歸熱-體蝨，正確。","D":"正確(本題選錯誤者)。登革熱病媒是斑蚊;三斑家蚊傳日本腦炎。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"105090-N5-70":{"quick":"從未接種MMR的國小一年級新生＝補接種2劑。","detail":{"background":"學校護理師對「過去從未接種過 MMR(麻疹、腮腺炎、德國麻疹)」的國小一年級新生，依入學後補種指引，應(D)『「補接種「2劑」(MMR 完整接種為「2劑」;從未接種者須補足2劑)」』。其他錯誤:A『可能已自然感染、無須補種』錯誤(不可假設已自然感染);B『先驗血中抗體再決定』非標準作法(直接依指引補種);C『補接種1劑』不足(MMR 需2劑)。故 D 正確。從未接種 MMR 者應補接種2劑(MMR 完整為2劑)。","options":{"A":"不可假設已自然感染，仍須補種。","B":"依指引直接補種，非先驗抗體。","C":"MMR 需2劑，補1劑不足。","D":"正確。從未接種 MMR 者補接種2劑。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"106030-N5-46":{"quick":"屬於我國第一類法定傳染病者＝嚴重急性呼吸道症候群(SARS)。","detail":{"background":"我國傳染病防治法的「第一類」法定傳染病(危害最大、須24小時通報、強制隔離)包括(C)『「嚴重急性呼吸道症候群(SARS)」』(以及天花、鼠疫、狂犬病等;新型/嚴重的傳染病)。百日咳、白喉、破傷風屬「「第三類」」法定傳染病。故 C 正確。SARS 是第一類法定傳染病。","options":{"A":"百日咳屬第三類法定傳染病。","B":"白喉屬第三類法定傳染病。","C":"正確。嚴重急性呼吸道症候群(SARS)是第一類法定傳染病。","D":"破傷風屬第三類法定傳染病。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"106030-N5-47":{"quick":"為老人施打流感疫苗＝保護易感宿主。","detail":{"background":"為老人施打流感疫苗，屬(B)『「保護「易感宿主」(疫苗使「易受感染的宿主(老人)」產生免疫，保護其不受感染)」』的傳染病防治策略。消滅病媒是處理病媒(如蚊);阻絕致病原是處理病原;去除中間宿主是處理中間宿主。「疫苗(保護宿主)」屬保護易感宿主。故 B 正確。疫苗接種是保護易感宿主(與前述同類題一致)。","options":{"A":"消滅病媒是處理病媒(如蚊蟲)。","B":"正確。為老人施打流感疫苗是保護易感宿主。","C":"阻絕致病原及病原體是處理病原。","D":"去除中間宿主是處理中間宿主。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"106030-N5-48":{"quick":"潛伏期(潛伏結核感染)的痰塗片及痰液培養＝皆為陰性。","detail":{"background":"對「處於「潛伏期(潛伏結核感染 LTBI)」」的結核感染者進行痰塗片及痰液培養，正確的是(D)『「痰塗片及痰液培養「皆為陰性」」』——「潛伏結核感染者「沒有「活動性疾病、沒有排菌、無症狀、無傳染力」」」，故「痰塗片(找抗酸菌)與痰液培養「都「陰性」」」。(潛伏感染靠 IGRA 或結核菌素測驗診斷，而非痰檢。)故 D 正確。潛伏結核感染無排菌，痰塗片與培養皆陰性。","options":{"A":"潛伏感染無排菌，痰塗片不會陽性。","B":"潛伏感染無排菌，痰液培養不會陽性。","C":"潛伏感染無排菌，兩者不會皆陽性。","D":"正確。潛伏結核感染無排菌，痰塗片及培養皆為陰性。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"106030-N5-49":{"quick":"網狀模式較適合解釋＝慢性病的特性。","detail":{"background":"致病模式中的「網狀模式(因果網 web of causation)」較適合用來解釋(C)『「「慢性病」的特性(慢性病是「「多因子、多重交互作用」」造成，網狀模式能呈現「多因素交織的因果網」)』。傳染病(單一病原)適合三角模式;急性病、遺傳病非網狀模式的最佳對象。「多因子的慢性病」適合網狀模式。故 C 正確。網狀模式(因果網)適合解釋多因子的慢性病(與前述同類題一致)。","options":{"A":"傳染病(單一病原)適合三角模式。","B":"急性病非網狀模式的最佳對象。","C":"正確。網狀模式較適合解釋多因子的慢性病。","D":"遺傳病非網狀模式的最佳對象。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"106110-N5-42":{"quick":"多重抗藥性結核病(MDR-TB)：結核菌培養陽性且同時對 isoniazid 與 rifampin 抗藥①、DOTs Plus 監控④。","detail":{"background":"多重抗藥性結核病(MDR-TB)的正確描述:(1)「結核菌培養為「陽性」，且「同時」對「isoniazid 與 rifampin」這「兩種第一線藥物」有抗藥性」(這是 MDR-TB 的定義);(4)「進階都治計畫(DOTs Plus)能更全面地監控、治療多重抗藥性結核病人」。而(2)『培養「陰性」、對「fluoroquinolone」抗藥』錯誤(培養應陽性，且 fluoroquinolone 抗藥屬「「廣泛抗藥 XDR」」);(3)『因藥物副作用以致症狀無法改善』非 MDR-TB 的定義。故正確為①④(選 D)。","options":{"A":"12：含②(培養陰性、fluoroquinolone)，定義錯誤。","B":"23：含②③，非 MDR-TB 的定義。","C":"34：含③、缺①，錯誤。","D":"正確。培養陽性且對 isoniazid+rifampin 抗藥①、DOTs Plus 監控④。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"106111-N5-43":{"quick":"潛伏期72小時~14天，檢疫期間至少應為14天(最長潛伏期)。","detail":{"background":"檢疫(quarantine)期間應以「「該傳染病的「最長潛伏期」」」為準(以確保接觸者在最長潛伏期內若未發病，即可解除)。本題潛伏期是72小時(3天)到14天，「最長潛伏期為14天」，故檢疫期間至少應為(D)『14天』。故 D 正確。檢疫期間＝該病的最長潛伏期(本題14天)。","options":{"A":"3天是最短潛伏期，非檢疫期間。","B":"7天非最長潛伏期。","C":"10天非最長潛伏期。","D":"正確。檢疫期間至少為最長潛伏期14天。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"106111-N5-59":{"quick":"流感疫苗：為「非活性」疫苗②、保護效力約只能維持一年③。","detail":{"background":"流感疫苗的正確敘述:(2)「為「非活性(不活化)」疫苗(注射型流感疫苗是「不活化」疫苗;鼻噴劑型才是活性減毒)」;(3)「保護效力約只能維持「一年」(且流感病毒「每年變異」，故須「每年接種」)」。而「為活性疫苗(①)」不正確(注射型是非活性)。故正確為②③(選 C)。流感疫苗(注射型)是非活性、保護約一年、須年年接種。","options":{"A":"①③：含①(活性疫苗，注射型是非活性)，錯誤。","B":"①④：含①，錯誤。","C":"正確。非活性疫苗②、保護效力約一年③。","D":"②⑤：⑤的內容不符。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"106111-N5-60":{"quick":"拒絕清除登革熱孳生源(積水容器)的罰鍰＝新臺幣3千元以上、1萬5千元以下。","detail":{"background":"若民眾拒絕配合登革熱防疫措施(清除戶外易積水容器)，主管機關可依傳染病防治法處以(D)『「新臺幣「3千元以上、1萬5千元以下」罰鍰」』。故 D 正確。(依傳染病防治法，拒不配合清除孳生源者，可處3千~1萬5千元罰鍰;經限期改善而未改善者可按次處罰。)","options":{"A":"六萬~三十萬是其他較重的罰則。","B":"五千~三萬非此項罰則。","C":"一萬~六萬非此項罰則。","D":"正確。處新臺幣3千元以上、1萬5千元以下罰鍰。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"107030-N5-45":{"quick":"布氏指數(Breteau Index)＝每「100戶」受調查住家中有病媒蚊幼蟲陽性的容器總數。","detail":{"background":"布氏指數(Breteau Index)是病媒蚊幼蟲調查指數之一，是以(A)『「每「100戶」受調查的住家」』為單位，計算「「有病媒蚊幼蟲(孑孓)陽性」的「容器總數」」(布氏指數＝陽性容器數÷調查戶數×100)。故 A 正確。布氏指數＝每100戶受調查住家中陽性容器的總數(指數越高表示孳生源越多)。","options":{"A":"正確。布氏指數以每100戶受調查住家為單位計算陽性容器總數。","B":"非每1000戶。","C":"布氏指數的單位是「戶」，非「積水容器」。","D":"布氏指數的單位是「戶」，非「容器」。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"107030-N5-57":{"quick":"國小學童身上長水疱(水痘)：立即採取隔離措施①、調查同學是否有同樣症狀並通報②。","detail":{"background":"小珊(國小二年級)身上及背部長「小水疱(疑似水痘)」，正確的處置:(1)「立即採取「隔離」措施(水痘傳染力強，須隔離至水疱結痂)」;(2)「調查班上同學是否有同樣症狀，並進行「通報」(水痘屬須監視/通報，且須防群聚)」。而(3)『曾接種過水痘疫苗的學生「可以到校上課」』敘述不全(仍須評估、注意);(4)『水疱多於50處表示傳染力「不高」』錯誤(水疱「越多」表示「傳染力越「強」」)。故正確為①②(選 A)。","options":{"A":"正確。立即隔離①、調查同學並通報②。","B":"僅34：含④(水疱多傳染力不高，錯誤)。","C":"123：含③(敘述不全)。","D":"234：含④(錯誤)。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"107030-N5-58":{"quick":"腸病毒：引起併發重症的型別以腸病毒71型為主。","detail":{"background":"腸病毒的正確描述是(D)『「引起腸病毒感染「併發重症」的型別「以「腸病毒71型(EV71)」為主」」』。其他錯誤:A『感染過腸病毒者以後「不會再感染」』錯誤(型別多，仍可能感染其他型別);B『「發病前」一週傳染力最強』錯誤(腸病毒在「發病「後」一週」傳染力最強);C『以「酒精」消毒餐具』錯誤(「腸病毒「對酒精有抵抗力」、酒精「無效」」;應用「含氯漂白水」消毒)。故 D 正確。腸病毒重症以71型為主;酒精無效、須用漂白水。","options":{"A":"腸病毒型別多，感染後仍可能感染其他型別。","B":"腸病毒在發病後一週傳染力最強，非發病前。","C":"腸病毒對酒精有抵抗力，須用含氯漂白水消毒。","D":"正確。引起重症的型別以腸病毒71型為主。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"107030-N5-59":{"quick":"登革熱：追查同行者暴露史①、入境檢疫③、24小時內通報⑤。","detail":{"background":"從印尼回國、確診登革熱的林小姐，正確的描述:(1)「衛生機關要「追查同行者的暴露史及健康資料」(疫調)」;(3)「(有發燒等症狀者)入境須進行「檢疫程序」」;(5)「登革熱應儘速於「24小時內通報」(法定傳染病)」。而(2)『感染某一型登革病毒後，對「該型」病毒「仍會重複感染」』錯誤(對「「同型」會「終身免疫」，「不會」再感染同型;是「「異型」」才會重複感染並可能加重);(4)『治療期間「仍可捐血」』錯誤(感染期間「不可捐血」，以防血液傳播)。故正確為①③⑤(選 C)。","options":{"A":"123：含②(同型重複感染，錯誤)。","B":"234：含②④，皆錯。","C":"正確。追查同行者①、入境檢疫③、24小時通報⑤。","D":"245：含②④，皆錯。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"107030-N5-60":{"quick":"76歲高血壓長者可建議的免費疫苗＝肺炎鏈球菌疫苗②、流感疫苗③。","detail":{"background":"林太太76歲、有高血壓，社區護理師可建議她接受免費的:(2)肺炎鏈球菌疫苗(65歲以上長者公費)、(3)流感疫苗(65歲以上長者公費)。而(1)帶狀疱疹疫苗(目前多為「自費」)、(4)人類乳突病毒(HPV)疫苗(對象是「青少女」，非老人)非此情境的免費疫苗。故正確為②③(選 C)。65歲以上長者公費接種肺炎鏈球菌與流感疫苗。","options":{"A":"12：含①(帶狀疱疹，多為自費)，錯誤。","B":"14：含①④，皆非此情境的免費疫苗。","C":"正確。肺炎鏈球菌疫苗②、流感疫苗③(老人公費)。","D":"34：含④(HPV，對象是青少女)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"107110-N5-49":{"quick":"5個月大的嬰兒應「完成」的疫苗＝卡介苗(BCG)。","detail":{"background":"5個月大的小旬，依預防接種時程，「應已完成」的疫苗是(C)『「卡介苗(BCG;於「出生滿5個月(現行)」接種，故5個月大應接種/完成)」』。其他尚未到完成的時程:A B型肝炎「第三劑」於「6個月」;B 五合一(DTaP-Hib-IPV)「第三劑」於「6個月」;D 肺炎鏈球菌(PCV13)「第三劑」於「12個月」(且基礎劑在2、4個月)。故 C 正確。(現行卡介苗於出生滿5個月接種。)","options":{"A":"B肝第三劑於6個月，5個月尚未到。","B":"五合一第三劑於6個月，5個月尚未到。","C":"正確。卡介苗(BCG)於出生滿5個月接種。","D":"PCV13第三劑於12個月，5個月尚未到。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"107110-N5-54":{"quick":"對易孳生登革熱病媒蚊的環境投藥(本題送分)。","detail":{"background":"以三段五級的觀點，「對易孳生登革熱病媒蚊的環境進行「投藥(噴藥滅蚊/孳生源處理)」」——本題經評定為「送分(各選項均給分)」。理解重點:控制病媒(環境噴藥、清除孳生源)屬「「初段預防」」(在疾病發生前控制環境中的病媒、阻斷傳播),可視為「特殊保護/改善環境衛生」。本題送分。","options":{"A":"本題送分。對病媒環境投藥可視為初段預防的特殊保護。","B":"本題送分。改善環境衛生也是初段預防。","C":"本題送分，各選項均給分。","D":"本題送分，各選項均給分。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防","送分題"]}},"108110-N5-63":{"quick":"新型A型流感：H1N1/H3N2 是每年週期性流行的流感①、常見於禽鳥傳人(H7N9、H5N1)③。","detail":{"background":"新型A型流感的正確描述:(1)「H1N1、H3N2 屬於「每年週期性流行」的「季節性」流感」;(3)「「新型A型流感」常見於「禽鳥病毒傳染人類」，如 H7N9、H5N1(禽流感)」。而(2)『致死率約「80~90%」』錯誤(致死率因病毒株而異，並非一律80~90%);(4)『密切接觸者須自主健康管理「5天」』、(5)『發現個案須於「48小時」內通報』的時限不符(新型A型流感是法定傳染病，須「24小時內」通報)。故正確為①③(選 C)。","options":{"A":"12：含②(致死率80~90%，過高/不一定)，錯誤。","B":"24：含②④，皆不符。","C":"正確。H1N1/H3N2 季節性流感①、禽鳥傳人 H7N9/H5N1③。","D":"45：含④⑤(時限不符)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"108110-N5-64":{"quick":"日本腦炎僅接種兩劑的回國新生(本題送分)。","detail":{"background":"小華長住上海、日本腦炎僅接種兩劑，今年回國就讀國小一年級——本題經評定為「送分(各選項均給分)」。理解重點:日本腦炎疫苗的接種時程與劑數，因「不同年代/不同國家(不活化 vs 活性減毒)」而異，補種需依「現行的補種指引」評估其過去接種的疫苗種類與劑數再決定。本題送分。","options":{"A":"本題送分。補種需依現行指引評估。","B":"本題送分，各選項均給分。","C":"本題送分，各選項均給分。","D":"本題送分，各選項均給分。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署","送分題"]}},"109030-N5-48":{"quick":"「不需」於24小時內完成通報者＝庫賈氏病。","detail":{"background":"依傳染病通報規定，「不需」於「24小時內」完成病例通報的是(A)『「庫賈氏病(CJD;屬「「第四類」法定傳染病，通報時限為「一週內」」)」』。其他須「24小時內」通報:B 登革熱(第二類)、C 狂犬病(第一類)、D 肉毒桿菌中毒(第一類)。故本題選不需24小時者為 A。庫賈氏病屬第四類、一週內通報，非24小時。","options":{"A":"正確(本題選不需24小時者)。庫賈氏病屬第四類，通報時限為一週內。","B":"登革熱(第二類)須24小時內通報。","C":"狂犬病(第一類)須24小時內通報。","D":"肉毒桿菌中毒(第一類)須24小時內通報。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"109110-N5-45":{"quick":"登革熱的描述「錯誤」者＝先後感染「同型別」登革病毒會有更高機率導致較嚴重症狀。","detail":{"background":"登革熱描述的「錯誤」者為(C)『「「先後感染「同型別」」之登革病毒，會有更高機率導致較嚴重的症狀」』——錯誤，「對「「同型別」會「終身免疫」(不會再感染同型)」;是「「先後感染「不同型別」」」時，因「抗體依賴性增強(ADE)」，才會「有較高機率「導致較嚴重(出血性)」症狀」。其他正確:A 登革病毒有四種血清型，每型都具感染致病能力;B 治療登革熱沒有特效藥，以症狀治療為主;D 對疑似個案可使用 NS1 抗原快速篩檢。故本題選錯誤者為 C。是「不同型別」重複感染才會加重，非同型。","options":{"A":"登革病毒有四種血清型，每型都具致病能力，正確。","B":"沒有特效藥，以症狀治療為主，正確。","C":"正確(本題選錯誤者)。是「不同型別」重複感染才會加重，非同型。","D":"對疑似個案可用 NS1 抗原快速篩檢，正確。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"109110-N5-60":{"quick":"免疫力：自然被動免疫＝新生兒經由胎盤獲得母體抗體。","detail":{"background":"免疫力的正確敘述是(A)『「「自然被動」免疫－新生兒「經由胎盤」獲得母體的抗體(IgG)」』(自然＝非人為;被動＝直接接受現成的抗體)。其他錯誤:B『「人工被動」免疫－給予「疫苗」』錯誤(給疫苗使人體「「自己產生」抗體，是「人工「主動」」」);C『「人工主動」免疫－給予「免疫球蛋白」』錯誤(給予現成的「免疫球蛋白」是「人工「被動」」);D『「自然被動」免疫－感染傳染病後獲得免疫力』錯誤(感染後自己產生免疫是「自然「主動」」)。故 A 正確。","options":{"A":"正確。自然被動免疫＝新生兒經由胎盤獲得母體抗體。","B":"給疫苗使人體自己產生抗體，是人工主動免疫。","C":"給予免疫球蛋白是人工被動免疫。","D":"感染後自己產生免疫是自然主動免疫。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署","免疫學"]}},"110030-N5-45":{"quick":"結核病防治工作(本題送分)。","detail":{"background":"結核病防治工作的敘述——本題經評定為「送分(各選項均給分)」。理解重點(結核防治概念):IGRA(丙型干擾素釋放試驗)可檢測潛伏結核感染(但幼兒判讀須注意);潛伏結核感染的高危險群適時給予預防性治療(如3HP 速克伏，每週服藥一次、共12劑、約3個月)可減少日後發病;我國推動結核防治、邁向消除結核的目標。本題送分。","options":{"A":"本題送分。我國推動結核防治計畫。","B":"本題送分。IGRA 可檢測潛伏結核感染。","C":"本題送分。高危險群預防性治療可減少發病。","D":"本題送分。3HP 短程處方每週一次、共12劑、約3個月。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署","送分題"]}},"110030-N5-46":{"quick":"接種麻疹疫苗＝提升宿主免疫力。","detail":{"background":"接種麻疹疫苗，屬(C)『「提升「宿主」免疫力(疫苗使宿主產生特異性免疫，抵抗麻疹病毒)」』的傳染病防治原則。祛除病原體是消滅病原;截斷傳染途徑是阻斷傳播;管制傳染窩是處理感染源。「疫苗(提升宿主免疫)」屬提升宿主免疫力。故 C 正確。疫苗接種是提升宿主免疫力(與前述同類題一致)。","options":{"A":"祛除病原體是消滅病原。","B":"截斷傳染途徑是阻斷傳播。","C":"正確。接種麻疹疫苗是提升宿主免疫力。","D":"管制傳染窩是處理感染源(傳染窩)。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"110030-N5-48":{"quick":"由「病毒」引起者＝登革熱①、日本腦炎②、麻疹④(霍亂③是細菌)。","detail":{"background":"由「病毒」引起的疾病:(1)登革熱(登革病毒)、(2)日本腦炎(日本腦炎病毒)、(4)麻疹(麻疹病毒)。而(3)『霍亂』是「「「細菌」(霍亂弧菌)」」造成，非病毒。故正確為①②④(選 C)。登革熱、日本腦炎、麻疹是病毒;霍亂是細菌。","options":{"A":"123：含③(霍亂，細菌)，錯誤。","B":"234：含③，錯誤。","C":"正確。登革熱①、日本腦炎②、麻疹④是病毒引起。","D":"134：含③、缺②，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"110110-N5-43":{"quick":"健保預防保健「錯誤」者＝德國麻疹抗體陰性的孕婦可提供免費德國麻疹疫苗注射。","detail":{"background":"健保預防保健服務的敘述，「錯誤」者為(B)『德國麻疹抗體陰性的「孕婦」「可提供免費的德國麻疹疫苗注射」』——錯誤，「德國麻疹(MMR)是「活性減毒疫苗」，「孕期「不可」接種」(應在「產後」補種)」。其他正確:A 兒童預防保健7次、7歲以下適用;C 成人預防保健40~64歲每3年1次、65歲以上等每年1次;D 30歲以上女性免費每年子宮頸抹片。故本題選錯誤者為 B。德國麻疹是活疫苗，孕期不可接種。","options":{"A":"兒童預防保健7次、7歲以下適用，正確。","B":"正確(本題選錯誤者)。德國麻疹是活疫苗，孕期不可接種(應產後)。","C":"成人預防保健的頻率描述正確。","D":"30歲以上女性免費每年子宮頸抹片，正確。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"110110-N5-47":{"quick":"孕婦「可以」接種的疫苗＝流感疫苗。","detail":{"background":"孕婦「可以」接種的疫苗是(C)『「流感疫苗(「不活化」疫苗，孕婦「可」接種，且建議接種以保護母嬰)」』。其他「不可」接種(皆為「活性減毒」疫苗，孕期禁用):A 麻疹疫苗、B 水痘疫苗、D 日本腦炎(活性減毒)疫苗。故 C 正確。孕婦可接種「不活化」疫苗(如流感、Tdap)，禁用「活疫苗」(麻疹、水痘、MMR 等)。","options":{"A":"麻疹疫苗是活疫苗，孕期禁用。","B":"水痘疫苗是活疫苗，孕期禁用。","C":"正確。流感疫苗是不活化疫苗，孕婦可接種。","D":"日本腦炎(活性減毒)疫苗，孕期禁用。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"110110-N5-50":{"quick":"病毒性腸胃炎：諾羅病毒好發於學校、機構等人口密集處。","detail":{"background":"病毒性腸胃炎的正確敘述是(D)『「諾羅病毒好發於「學校、機構等人口密集處」(傳染力強、易在密閉/群聚場所爆發群聚)」』。其他錯誤:A『腺病毒好發於「6歲以上」』錯誤(腺病毒腸胃炎好發於「嬰幼兒」);B『輪狀病毒好發於「65歲長者」』錯誤(輪狀病毒好發於「嬰幼兒(5歲以下)」);C『「克沙奇A型」最容易引發重症心肌炎』錯誤(引發心肌炎的多為「「克沙奇B型」」)。故 D 正確。諾羅病毒易在學校、機構等人口密集處爆發群聚。","options":{"A":"腺病毒腸胃炎好發於嬰幼兒，非6歲以上。","B":"輪狀病毒好發於嬰幼兒，非65歲長者。","C":"引發心肌炎多為克沙奇B型，非A型。","D":"正確。諾羅病毒好發於學校、機構等人口密集處。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"110110-N5-72":{"quick":"我國國小校園最常見的傳染病＝腸病毒。","detail":{"background":"我國目前「國小校園」最常見的傳染病是(B)『「腸病毒(在學齡前及國小學童間「最常見、易群聚」，春夏流行)」』。麻疹(已因疫苗大幅減少)、B型流感、破傷風(已罕見)非校園最常見。故 B 正確。腸病毒是國小校園最常見的傳染病。","options":{"A":"麻疹已因疫苗接種大幅減少。","B":"正確。腸病毒是國小校園最常見的傳染病。","C":"B型流感非校園最常見的傳染病。","D":"破傷風已因疫苗接種而罕見。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"111030-N5-44":{"quick":"急性病毒性A型肝炎「錯誤」者＝感染後約70~80%會演變成慢性肝炎。","detail":{"background":"急性病毒性A型肝炎的敘述，「錯誤」者為(A)『「感染A型肝炎病毒後，約70~80%會「演變成慢性肝炎」」』——錯誤，「A型肝炎「不會「慢性化」」(感染後痊癒、「終身免疫」，不會變慢性肝炎;「會慢性化的是「B型、C型」肝炎」)。其他正確:B 衛生局接獲A肝通報病例時應即進行訪視;C 病人罹病期間需採腸胃道(糞口)隔離措施;D A型肝炎疫苗自107年起列入滿12個月以上幼兒常規接種。故本題選錯誤者為 A。A肝不會慢性化(B、C肝才會)。","options":{"A":"正確(本題選錯誤者)。A肝不會慢性化，B、C肝才會。","B":"接獲A肝通報病例時應即進行訪視，正確。","C":"病人罹病期間需採腸胃道隔離，正確。","D":"A肝疫苗自107年起列入幼兒常規接種，正確。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"111030-N5-48":{"quick":"登革熱的敘述「錯誤」者＝典型登革熱的潛伏期約為1至2天。","detail":{"background":"登革熱的敘述，「錯誤」者為(B)『「典型登革熱的潛伏期約為「1至2天」」』——錯誤，登革熱的潛伏期約「「3~14天(平均4~7天)」」，非1~2天。其他正確:A 屬於第二類法定傳染病;C 典型臨床症狀有突發性的高燒(≧38°C)、頭痛、肌肉關節痛等;D 臺灣的病媒蚊主要為埃及斑蚊與白線斑蚊。故本題選錯誤者為 B。登革熱潛伏期約3~14天，非1~2天。","options":{"A":"屬於第二類法定傳染病，正確。","B":"正確(本題選錯誤者)。登革熱潛伏期約3~14天，非1~2天。","C":"典型症狀有突發性的高燒(≧38°C)，正確。","D":"臺灣病媒蚊主要為埃及斑蚊與白線斑蚊，正確。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"111030-N5-49":{"quick":"結核病的敘述「錯誤」者＝潛伏結核感染者雖無症狀，但具有傳染力。","detail":{"background":"結核病的敘述，「錯誤」者為(D)『「「潛伏結核感染」者雖無症狀，但「具有傳染力」」』——錯誤，「「潛伏結核感染(LTBI)」者「「沒有」傳染力」(無排菌、無症狀;只有「「活動性肺結核(排菌)」」者才有傳染力)。其他正確:A 由結核桿菌引起，為慢性傳染病;B 在臺灣一年四季都有病例，男性發生率比女性高;C 結核病可發生在人體任何器官或組織(肺外結核)。故本題選錯誤者為 D。潛伏結核感染無傳染力(活動性肺結核才有)。","options":{"A":"由結核桿菌引起、為慢性傳染病，正確。","B":"一年四季都有病例、男性發生率較高，正確。","C":"結核病可發生在任何器官或組織，正確。","D":"正確(本題選錯誤者)。潛伏結核感染無傳染力，活動性肺結核才有。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"111110-N5-50":{"quick":"屬於「特殊保護」層級者＝職場使用護具③、疫苗接種④。","detail":{"background":"依三段五級，屬於「特殊保護(第二級;針對特定危害的防護)」的是:(3)職場使用護具(防護具，預防職業傷害)、(4)疫苗接種(預防特定傳染病)。而(1)婚前健康檢查(含篩檢，偏向「早期診斷」)、(2)均衡飲食、(5)性教育(偏向「健康促進」)。故特殊保護為③④(選 C)。特殊保護＝防護具、疫苗等針對特定危害的防護。","options":{"A":"12：婚前健檢偏早期診斷、均衡飲食偏健康促進。","B":"23：含②(均衡飲食，健康促進)，錯誤。","C":"正確。職場使用護具③、疫苗接種④，屬特殊保護。","D":"45：含⑤(性教育，健康促進)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"111110-N5-56":{"quick":"里幹事協助預約、發通知單提醒接種＝增加行動線索①、降低行動障礙認知②。","detail":{"background":"政府透過「里幹事「協助預約」鄰近診所、「發通知單提醒」接種時間地點」——應用健康信念模式的:(1)「增加「行動線索(cues to action;通知單、提醒是促使行動的線索)」;(2)「降低「行動障礙」的認知(協助預約、就近接種，減少民眾接種的不便/障礙)」。而(3)增進疾病嚴重度的認知、(4)提升自我效能不是此措施的重點。故正確為①②(選 A)。提醒(行動線索)+協助預約就近(降低障礙)是健康信念模式的應用。","options":{"A":"正確。增加行動線索①、降低行動障礙認知②。","B":"14：含④(提升自我效能)，非此措施的重點。","C":"23：含③(增進嚴重度認知)，非此措施的重點。","D":"24：含④，非此措施的重點。"},"sources":["社區衛生護理學(新文京/華杏)·健康行為理論"]}},"111110-N5-60":{"quick":"最適合解釋 COVID-19 致病模式者＝三角模式。","detail":{"background":"最適合用來解釋 COVID-19(傳染病)致病模式的是(A)『「三角模式(epidemiologic triangle;以「病原(SARS-CoV-2)、宿主(人)、環境(接觸、聚集)」三要素的交互作用解釋「傳染病」的發生)」』。輪狀模式、生態模式、網狀模式較適合「多因子的慢性病」。COVID-19 是傳染病(單一病原)，最適合三角模式。故 A 正確。傳染病(COVID-19)的致病用三角模式(病原、宿主、環境)。","options":{"A":"正確。COVID-19(傳染病)最適合用三角模式解釋。","B":"輪狀模式偏向多因子的慢性病。","C":"生態模式偏向多層次環境的慢性問題。","D":"網狀模式(因果網)偏向多因子的慢性病。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"111110-N5-62":{"quick":"傳染病與病媒「錯誤」配對＝萊姆病-蚊子(應為壁蝨)。","detail":{"background":"傳染病與病媒的敘述，「錯誤」者為(C)『「萊姆病-「蚊子」」』——錯誤，「萊姆病(Lyme disease)的病媒是「「壁蝨(硬蜱)」」，而非蚊子」。其他正確:A 霍亂-蒼蠅(機械性傳播);B 鼠疫-跳蚤;D 漢他病毒症候群-老鼠(鼠類)。故本題選錯誤者為 C。萊姆病的病媒是壁蝨(蜱)，非蚊子。","options":{"A":"霍亂可由蒼蠅機械性傳播污染食物，正確。","B":"鼠疫-跳蚤，正確。","C":"正確(本題選錯誤者)。萊姆病的病媒是壁蝨(蜱)，非蚊子。","D":"漢他病毒症候群-老鼠(鼠類)，正確。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"111110-N5-69":{"quick":"校園結核病護理指導：都治計畫針對確診個案的治療③、結核病指標個案是確定診斷的病人④。","detail":{"background":"校園結核病護理指導的正確敘述:(3)「都治計畫(DOTS;直接觀察治療)是針對「確診個案」的「治療」策略(由關懷員親眼看病人服藥)」;(4)「結核病「指標個案」是指「確定診斷」的結核病病人(再據以進行接觸者調查)」。而(1)『結核病主要為「直接接觸」傳染』錯誤(結核是「「空氣/飛沫(飛沫核)」傳染」;「保持通風」正確，但傳染途徑寫錯);(2)『咳嗽超過「一週」應就醫』不精確(結核篩檢的咳嗽指標是「「超過「兩週/三週」」」)。故正確為③④(選 C)。","options":{"A":"12：①傳染途徑寫成直接接觸(應為空氣飛沫)、②咳嗽指標應為兩三週，皆不準。","B":"23：含②(咳嗽一週不準)，錯誤。","C":"正確。都治計畫針對確診個案③、指標個案是確診病人④。","D":"14：含①(直接接觸傳染，錯誤)。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"112030-N5-44":{"quick":"登革熱防治：布氏指數調查100戶②、登革病毒可垂直傳染胎兒③、國內尚未有登革熱疫苗核准上市⑤。","detail":{"background":"登革熱防治的最適宜敘述:(2)「布氏指數是指調查100戶住宅、發現有登革熱病媒蚊幼蟲孳生的「陽性容器數」」;(3)「登革病毒可透過懷孕母親「垂直傳染」給胎兒」;(5)「(本題時)國內尚未有登革熱疫苗核准上市」。而(1)『埃及斑蚊多於「夜間」活動』錯誤(埃及斑蚊「「白天」」活動，「晨昏」是高峰);(4)『屬「第三類」傳染病、「48小時」內通報』錯誤(登革熱是「「第二類」、「24小時」內通報」)。故正確為②③⑤(選 C)。","options":{"A":"124：含①(夜間活動，錯誤)④(第三類48小時，錯誤)。","B":"134：含①④，皆錯。","C":"正確。布氏指數②、可垂直傳染胎兒③、國內尚未有疫苗⑤。","D":"345：含④(第三類48小時，錯誤)。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"112030-N5-62":{"quick":"A型肝炎：主要經由糞口傳染。","detail":{"background":"A型肝炎的正確描述是(B)『「主要經由「糞口」傳染(經受污染的食物、水)」』。其他錯誤:A『屬「第三類」傳染病』錯誤(A型肝炎是「「第二類」」法定傳染病);C『潛伏期為「7~14天」』錯誤(A肝潛伏期約「「15~50天(平均28天)」」);D『發病6個月後「仍會重複感染」』錯誤(A肝感染後「「終身免疫」，不會重複感染」)。故 B 正確。A肝主要經糞口傳染、屬第二類、感染後終身免疫。","options":{"A":"A型肝炎是第二類法定傳染病，非第三類。","B":"正確。A型肝炎主要經由糞口傳染。","C":"A肝潛伏期約15~50天(平均28天)，非7~14天。","D":"A肝感染後終身免疫，不會重複感染。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"112110-N5-47":{"quick":"COVID-19 的「特殊保護」措施＝疫苗注射②、戴口罩④。","detail":{"background":"依三段五級，屬 COVID-19 防治「特殊保護(初段;針對特定疾病的防護)」的是:(2)實施疫苗注射(預防感染)、(4)戴口罩(阻斷飛沫傳播、保護自身)。而(1)利用快篩發現個案、(3)確診者早期接受治療屬「「次段(早期發現、早期治療)」」;(5)患者出院後追蹤管理屬「「三段(限制殘障/復健)」」。故特殊保護為②④(選 C)。疫苗、戴口罩屬初段(特殊保護)。","options":{"A":"12：含①(快篩發現個案，屬次段)，錯誤。","B":"13：①③屬次段，非特殊保護。","C":"正確。疫苗注射②、戴口罩④，屬特殊保護。","D":"45：含⑤(出院追蹤，屬三段)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·三段五級預防"]}},"112110-N5-54":{"quick":"預防校園腸病毒「最適當」者＝加強個人衛生、常洗手。","detail":{"background":"預防校園腸病毒，「最適當」的措施是(B)『「加強「個人衛生、常洗手」(勤洗手是預防腸病毒「最有效、最根本」的方法;腸病毒經接觸/糞口/飛沫傳播)」』。其他錯誤:A『加強「腸病毒疫苗接種」』不適(腸病毒型別多、疫苗僅針對 EV71、非全面預防);C『可用「500 ppm」漂白水消毒』——「腸病毒患者「分泌物/嘔吐物污染處」須用「「1000 ppm」」」(一般環境500ppm，但腸病毒污染處需更高濃度);D『得過腸病毒就不會再感染』錯誤(型別多，仍可能再感染)。故 B 正確。勤洗手是預防腸病毒最有效的方法。","options":{"A":"腸病毒型別多、疫苗僅針對 EV71，非全面預防。","B":"正確。加強個人衛生、常洗手，是預防腸病毒最有效的方法。","C":"腸病毒患者分泌物污染處須用1000ppm漂白水。","D":"腸病毒型別多，得過後仍可能再感染。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"112110-N5-57":{"quick":"運用電視廣告宣傳防疫行為＝健康傳銷(社會行銷)。","detail":{"background":"運用「電視廣告」宣傳民眾建立預防 COVID-19 的行為——屬(A)『「健康傳銷(社會行銷;借用商業行銷的手法、透過大眾媒體「廣泛宣傳」健康觀念與行為)」』的衛生教育方法。小組討論、自學教材、講述法是「面對面/個別」的教學方法。「電視廣告(大眾傳播、廣泛宣傳)」屬健康傳銷(社會行銷)。故 A 正確。","options":{"A":"正確。電視廣告宣傳健康行為，屬健康傳銷(社會行銷)。","B":"小組討論是面對面的小團體教學。","C":"自學教材是個別的自我學習。","D":"講述法是面對面的講授。"},"sources":["社區衛生護理學(新文京/華杏)·衛生教育"]}},"112110-N5-62":{"quick":"自來水淨水過程最廣泛、最便宜的消毒法＝氯氣消毒。","detail":{"background":"自來水淨水過程中，「最廣泛使用且價格最便宜」的消毒法是(C)『「氯氣消毒(加氯;價格便宜、殺菌力強、且「有「持續(殘餘)消毒」效果(維持管線中的餘氯)」，是自來水最普遍的消毒法)」』。臭氧、金屬離子、紫外線消毒「無持續消毒效果、成本較高」，較不適合大規模供水。故 C 正確。氯氣消毒便宜、有殘餘消毒效果，是自來水最廣泛的消毒法。","options":{"A":"臭氧消毒成本較高、無持續消毒效果。","B":"金屬離子消毒成本較高。","C":"正確。氯氣消毒便宜、有殘餘消毒效果，最廣泛使用。","D":"紫外線消毒無持續消毒效果、不適合大規模供水。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"112180-N5-28":{"quick":"應於24小時內完成通報者＝桿菌性痢疾(第二類法定傳染病)。","detail":{"background":"依傳染病防治法，應於「24小時內」完成通報的是(A)『「桿菌性痢疾(屬「第二類」法定傳染病，須「24小時內」通報)」』。對照:急性病毒性C型肝炎(C)、恙蟲病(D)的通報時限較長(一週內)。(腸病毒感染併發重症亦須儘速通報，但本題指定答案為桿菌性痢疾。)故 A 正確。桿菌性痢疾屬第二類、須24小時內通報。","options":{"A":"正確。桿菌性痢疾屬第二類，須24小時內通報。","B":"(腸病毒併發重症亦須儘速通報，但本題指定答案為桿菌性痢疾)。","C":"急性病毒性C型肝炎的通報時限較長(一週內)。","D":"恙蟲病的通報時限較長(一週內)。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"112180-N5-35":{"quick":"COVID-19疫情期間最能「快速」宣導防疫觀念＝透過大眾媒體(電視/廣播)。","detail":{"background":"COVID-19 疫情期間，「最能「快速」宣導」防疫正確觀念的衛生教育方法是(D)『「透過「大眾媒體(電視或廣播)」宣導(可在「最短時間「廣泛、大量」地觸及大眾」)」』。舉辦講座、分送宣傳單、張貼海報的「觸及範圍小、速度慢」。大眾媒體能快速、廣泛宣導。故 D 正確。大眾媒體(電視/廣播)能最快速、廣泛地宣導防疫觀念。","options":{"A":"舉辦講座的觸及範圍小、速度慢。","B":"分送宣傳單的觸及與速度有限。","C":"張貼海報的觸及範圍小。","D":"正確。透過大眾媒體(電視/廣播)最能快速、廣泛宣導。"},"sources":["社區衛生護理學(新文京/華杏)·衛生教育"]}},"113030-N5-30":{"quick":"疑似麻疹應收集的「TOCC」＝旅遊史②、接觸史③、職業史④、群聚史⑦。","detail":{"background":"評估疑似傳染病(如麻疹)時應收集「TOCC」:T＝(2)「旅遊史(Travel)」、O＝(4)「職業史(Occupation)」、C＝(3)「接觸史(Contact)」、C＝(7)「群聚史(Cluster)」。而(1)抽菸史、(5)手術史、(6)發病時間不在 TOCC 之中。故正確為②③④⑦(選 C)。TOCC＝旅遊史、職業史、接觸史、群聚史(用於傳染病疫調)。","options":{"A":"1235：含①(抽菸史)⑤(手術史)，非 TOCC。","B":"1246：含①⑥，非 TOCC。","C":"正確。旅遊史②、接觸史③、職業史④、群聚史⑦。","D":"3567：含⑤⑥，非 TOCC。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"113100-N5-30":{"quick":"藉由病媒「蚊」傳播者＝黃熱病②、瘧疾③、茲卡病毒感染症⑤(斑疹傷寒①蝨、炭疽④接觸)。","detail":{"background":"藉由病媒「蚊」傳播的疾病:(2)黃熱病(斑蚊)、(3)瘧疾(瘧蚊)、(5)茲卡病毒感染症(斑蚊)。而(1)流行性斑疹傷寒(病媒是「「體蝨」」)、(4)炭疽病(經「接觸/吸入/食入」，非病媒蚊)。故正確為②③⑤(選 C)。黃熱病、瘧疾、茲卡經蚊子傳播;斑疹傷寒經蝨、炭疽經接觸。","options":{"A":"125：含①(斑疹傷寒，蝨)，錯誤。","B":"134：含①④，皆非蚊媒。","C":"正確。黃熱病②、瘧疾③、茲卡⑤經病媒蚊傳播。","D":"345：含④(炭疽，接觸)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"113180-N5-29":{"quick":"登革熱「最不適當」者＝主要病媒蚊是三斑家蚊。","detail":{"background":"登革熱的敘述，「最不適當」者為(D)『「主要病媒蚊是「三斑家蚊」」』——錯誤，「登革熱的主要病媒蚊是「「埃及斑蚊、白線斑蚊」」;「三斑家蚊」是「「日本腦炎」」的病媒」。其他正確:A 俗稱斷骨熱(因關節肌肉劇痛);B 其病毒主要有4種型別;C 感染兩種或以上不同型的登革病毒，易發生出血性登革熱(ADE)。故本題選最不適當者為 D。登革熱病媒是斑蚊;三斑家蚊傳日本腦炎(與前述同類題一致)。","options":{"A":"俗稱斷骨熱(關節肌肉劇痛)，正確。","B":"病毒主要有4種型別，正確。","C":"感染不同型易發生出血性登革熱(ADE)，正確。","D":"正確(本題選最不適當者)。登革熱病媒是斑蚊;三斑家蚊傳日本腦炎。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"113180-N5-30":{"quick":"施打 COVID-19 疫苗以降低感染風險＝初段第二級(特殊保護)。","detail":{"background":"為降低感染 COVID-19 的風險而「施打疫苗」——屬預防概念的(B)『「初段(第一段)的「第二級(特殊保護)」(對健康者施打疫苗，預防特定疾病)」』。初段第一級是健康促進(一般性);次段第二級/第三級是早期診斷治療。「疫苗接種」屬特殊保護(初段第二級)。故 B 正確。疫苗接種屬初段第二級(特殊保護)。","options":{"A":"初段第一級是健康促進(一般性的健康增進)。","B":"正確。施打疫苗屬初段第二級(特殊保護)。","C":"次段第二級的層級配對不符(篩檢/早期診斷屬次段)。","D":"次段第三級是早期治療。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"114030-N5-38":{"quick":"臺灣淨水廠供水系統廣泛使用＝氯氣消毒法。","detail":{"background":"臺灣淨水廠的供水系統目前廣泛使用(A)『「氯氣消毒法(加氯;便宜、殺菌力強、且有「持續(殘餘)消毒」效果，可維持自來水管線中的餘氯)」』。臭氧、紫外線、銀離子消毒「無持續消毒效果、成本較高」，不適合大規模供水。故 A 正確。氯氣消毒是臺灣淨水廠最廣泛使用的消毒法(與前述同類題一致)。","options":{"A":"正確。臺灣淨水廠廣泛使用氯氣消毒法。","B":"臭氧消毒無持續消毒效果、成本較高。","C":"紫外線消毒無持續消毒效果。","D":"銀離子消毒成本較高、不適合大規模供水。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"114100-N5-28":{"quick":"須在24小時內通報者＝狂犬病①、猴痘②、人類免疫缺乏病毒感染③、多重抗藥性結核病④(皆是)。","detail":{"background":"須在「24小時內」通報的法定傳染病:(1)狂犬病(第一類)、(2)猴痘(第二類)、(3)人類免疫缺乏病毒感染(HIV;依規定24小時內通報)、(4)多重抗藥性結核病(MDR-TB;24小時內通報)——四者皆須24小時內通報。故為①②③④(選 D)。狂犬病、猴痘、HIV、MDR-TB 皆須24小時內通報。","options":{"A":"僅123：缺④，不完整。","B":"僅134：缺②，不完整。","C":"僅234：缺①，不完整。","D":"正確。狂犬病①、猴痘②、HIV③、MDR-TB④皆須24小時內通報。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"114100-N5-29":{"quick":"新型A型流感(禽流感)「最不適當」者＝已證實多數案例是經由人傳人。","detail":{"background":"新型A型流感(禽流感)的敘述，「最不適當」者為(A)『「已證實「多數案例是經由「人傳人」」』——錯誤，新型A型流感(如 H5N1、H7N9)「「主要是「禽鳥(動物)傳人」」，「「人傳人「不易/僅零星」」」(若出現「有效率的人傳人」會引發大流行的疑慮)」。其他正確:B 傳染途徑是經由吸入及接觸傳染;C 會出現類流感或嚴重肺炎症狀;D 應避免接觸禽鳥、戴口罩及多洗手。故本題選最不適當者為 A。禽流感主要是禽傳人，人傳人不易。","options":{"A":"正確(本題選最不適當者)。禽流感主要是禽傳人，人傳人不易/僅零星。","B":"傳染途徑經由吸入及接觸，正確。","C":"會出現類流感或嚴重肺炎症狀，正確。","D":"應避免接觸禽鳥、戴口罩及多洗手，正確。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"114100-N5-42":{"quick":"懷孕6週新住民的護理指導「最不適當」者＝德國麻疹抗體陰性、鼓勵儘速接受德國麻疹疫苗注射。","detail":{"background":"懷孕6週的新住民阮氏，護理指導「最不適當」者為(B)『「若德國麻疹抗體檢查呈陰性，「鼓勵「儘速」接受德國麻疹疫苗注射」」』——錯誤，「德國麻疹(MMR)是「活性減毒疫苗」，「「孕期「不可」接種」(會有致畸風險;應在「「產後」」補種)」。其他適當:A 介紹同鄉支持團體;C 提供未納健保的產前檢查補助資訊;D 告知產檢補助項目包括梅毒檢查及德國麻疹抗體等。故本題選最不適當者為 B。孕期不可接種德國麻疹(活)疫苗。","options":{"A":"介紹同鄉支持團體，適當。","B":"正確(本題選最不適當者)。孕期不可接種德國麻疹活疫苗(應產後)。","C":"提供未納健保的產檢補助資訊，適當。","D":"告知產檢補助含梅毒、德國麻疹抗體等，適當。"},"sources":["社區衛生護理學(新文京/華杏)·預防接種","疾病管制署"]}},"114170-N5-28":{"quick":"腸病毒「最不適當」者＝發燒時才具傳染力。","detail":{"background":"腸病毒的敘述，「最不適當」者為(D)『「「發燒時」才具傳染力」』——錯誤，腸病毒「在「發病前數天」到「發病後「數週(尤其發病後一週內最強)」」都「具傳染力」」(且痊癒後仍可能由糞便排出病毒數週)，並非「只有發燒時」才有傳染力。其他正確:A 死亡病例以5歲以下幼童居多;B 感染腸病毒71型是目前致病力最高的;C 典型症狀為手足口病與疱疹性咽峽炎。故本題選最不適當者為 D。腸病毒在發病前後、甚至痊癒後一段時間都有傳染力，非僅發燒時。","options":{"A":"死亡病例以5歲以下幼童居多，正確。","B":"腸病毒71型致病力最高，正確。","C":"典型症狀為手足口病與疱疹性咽峽炎，正確。","D":"正確(本題選最不適當者)。腸病毒在發病前後皆有傳染力，非僅發燒時。"},"sources":["社區衛生護理學(新文京/華杏)·傳染病防治","疾病管制署"]}},"114170-N5-34":{"quick":"讓師生了解感染COVID-19對健康的衝擊及預後＝增強健康信念模式的「嚴重性」認知。","detail":{"background":"護理師讓教職員及學生「了解感染 COVID-19 後對健康可能造成的「衝擊及預後」」——主要是增強健康信念模式的(B)『「(感知)「嚴重性(perceived severity;認知到「疾病的後果有多嚴重」)」認知」』。罹患性(susceptibility)是「認知到自己「可能得病」」;利益性是「行動的好處」;障礙性是「行動的阻礙」。「了解疾病的衝擊與預後(後果嚴重)」屬嚴重性認知。故 B 正確。了解疾病的衝擊與預後是增強「嚴重性」認知。","options":{"A":"罹患性是認知到自己可能得病的風險。","B":"正確。了解疾病的衝擊及預後，是增強嚴重性認知。","C":"利益性是認知到採取行動的好處。","D":"障礙性是認知到採取行動的阻礙。"},"sources":["社區衛生護理學(新文京/華杏)·健康行為理論"]}},"115030-N5-32":{"quick":"安排長者在「居住地的學校活動中心」施打疫苗＝考量「可近性」原則。","detail":{"background":"護理師安排社區長者於「「居住地」的「學校活動中心」」為施打 COVID-19 疫苗的場地——主要是考量(B)『「可近性(accessibility;在「居住地附近、就近」設站，使長者「容易到達、方便接種」)」』原則。可負擔性是費用;可接受性是符合文化/需求;有用性是是否有效。「就近設站、方便到達」屬可近性。故 B 正確。就近(居住地附近)設站方便長者接種，是考量可近性。","options":{"A":"可負擔性是費用負擔的考量。","B":"正確。就近(居住地)設站方便到達，是考量可近性。","C":"可接受性是符合文化/需求的考量。","D":"「有用性」是是否有效的考量。"},"sources":["社區衛生護理學(新文京/華杏)·健康政策與照護體系"]}}},TO=["傳染病防治與預防接種"],LEC={"傳染病防治與預防接種":{"title":"傳染病防治與預防接種　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「傳染病防治與預防接種」的歷屆考題共 80 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_h3_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
