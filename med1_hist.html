"副甲狀腺主細胞(parathyroid chief cells)","D":"甲狀腺濾泡細胞(thyroid follicular cells)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_107100-45","q_num":45,"roc_year":"107","exam_code":"107100","src":"民國107年","topic":"HI11內分泌皮膚與感覺器官","stem":"腦下垂體不具有下列何種組織構造?","options":{"A":"閏管(intercalated duct)","B":"竇狀微血管(sinusoidal capillaries)","C":"嫌色細胞(chromophobes)","D":"嗜色細胞(chromophils)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_108030-44","q_num":44,"roc_year":"108","exam_code":"108030","src":"民國108年","topic":"HI11內分泌皮膚與感覺器官","stem":"下列有關構成表皮(epidermis)的細胞敘述,何者錯誤?","options":{"A":"角質細胞(keratinocyte)是表皮中含量最多的細胞","B":"黑色素細胞(melanocyte)的細胞體主要分布在表皮的基底層(stratum basale)","C":"默克耳氏細胞(Merkel's cell)主要分布在表皮的棘狀層(stratum spinosum)","D":"蘭格罕氏細胞(Langerhans' cell)具有樹突狀突起(dendritic process),是一種抗原呈現細胞(antigen- presenting cell)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med1_108100-36","q_num":36,"roc_year":"108","exam_code":"108100","src":"民國108年","topic":"HI11內分泌皮膚與感覺器官","stem":"下列有關眼睛(eye)發育的敘述,何者錯誤?","options":{"A":"眼裂(optic fissure)位於眼杯(optic cup)的腹側面,並沿著視柄(optic stalk)發育","B":"視網膜中央動脈和靜脈(central artery and vein of retina)是源自遠側端玻璃體血管(hyaloid vessels)的衍生 物","C":"視網膜色素上皮(retinal pigment epithelium)是源自眼杯(optic cup)的外層","D":"視神經(optic nerve)是源自視網膜之神經節細胞軸突(axons of ganglion cells)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_108100-42","q_num":42,"roc_year":"108","exam_code":"108100","src":"民國108年","topic":"HI11內分泌皮膚與感覺器官","stem":"對於胰臟(pancreas)的內分泌部(endocrine portion)之敘述,下列何項正確?","options":{"A":"是漿液腺(serous gland)組成","B":"是蘭氏小島(islets of Langerhans)","C":"是泡心細胞(centroacinar cells)組成","D":"組成細胞內部有許多嗜酸性的酶原顆粒(zymogen granules)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_109020-44","q_num":44,"roc_year":"109","exam_code":"109020","src":"民國109年","topic":"HI11內分泌皮膚與感覺器官","stem":"游離的神經纖維末梢(free nerve ending)最遠終止於皮膚表皮層(epidermis)的何處?","options":{"A":"基底層(stratum basale)","B":"棘狀層(stratum spinosum)","C":"顆粒層(stratum granulosum)","D":"角質層(stratum corneum)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med1_110020-40","q_num":40,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"HI11內分泌皮膚與感覺器官","stem":"有關角膜(cornea)的敘述,下列何者正確?","options":{"A":"角膜上皮(corneal epithelium)由約5層非角質化複層扁平上皮細胞所組成,厚約 50μm","B":"Bowman氏膜(Bowman's membrane)呈現過碘酸–雪夫氏(periodic acid-Schiff, PAS)反應,厚約 50μm","C":"Descemet氏膜(Descemet's membrane)是一均質、微纖維的板層,厚約 40μm","D":"角膜基質(corneal stroma)由約30層薄板(thin lamellae)組成,每層含交錯的網狀微纖維束(reticular fibrils)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_110020-44","q_num":44,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"HI11內分泌皮膚與感覺器官","stem":"手掌皮膚(palm skin)可見到下列何種構造?","options":{"A":"毛囊(hair follicles)","B":"豎毛肌(arrector pili muscles)","C":"皮脂腺(sebaceous glands)","D":"汗腺(sweat glands)"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_111020-43","q_num":43,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"HI11內分泌皮膚與感覺器官","stem":"下列何種細胞具有外分泌(exocrine)以及類似內分泌(endocrine-like)的功能?","options":{"A":"肝細胞(hepatocytes)","B":"胰島細胞(pancreatic islet cells)","C":"唾液腺腺泡細胞(salivary acinar cells)","D":"庫弗氏細胞(Kupffer cells)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_111100-40","q_num":40,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"HI11內分泌皮膚與感覺器官","stem":"下列有關膜性迷路(membranous labyrinth)的敘述,何者錯誤?","options":{"A":"壺腹嵴(crista ampullaris)是頭部角加速運動(angular acceleration)的感覺受器","B":"頂帽(cupula)的耳石(otolith)是頭部直線加速運動(linear acceleration)的感覺受器","C":"前庭階(scala vestibule)與鼓室階(scala tympani)於蝸孔(helicotrema)彼此相通","D":"耳蝸導管(cochlear duct)內,流動的液體為內淋巴液(endolymph)"},"answer":"B","accepted_answers":["B","C"],"answer_status":"多重答案","img":""},{"id":"med1_113020-44","q_num":44,"roc_year":"113","exam_code":"113020","src":"民國113年","topic":"HI11內分泌皮膚與感覺器官","stem":"下列何者富含血管,負責提供養分及氧氣給毛囊(hair follicle)?","options":{"A":"真皮乳頭(dermal papilla)","B":"玻璃膜(glassy membrane)","C":"內根鞘(internal root sheath)","D":"外根鞘(external root sheath)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_113020-45","q_num":45,"roc_year":"113","exam_code":"113020","src":"民國113年","topic":"HI11內分泌皮膚與感覺器官","stem":"下列何者的細胞內含有大量的脂肪小滴(lipid droplets),且可分泌糖皮質素(glucocorticoid)?","options":{"A":"腎上腺皮質(adrenal cortex)的球小帶(zona glomerulosa)","B":"腎上腺皮質(adrenal cortex)的束狀帶(zona fasciculata)","C":"腎上腺皮質(adrenal cortex)的網狀帶(zona reticularis)","D":"腎上腺髓質(adrenal medulla)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_114020-45","q_num":45,"roc_year":"114","exam_code":"114020","src":"民國114年","topic":"HI11內分泌皮膚與感覺器官","stem":"下列何種現象可在老化皮膚中觀察到?","options":{"A":"角質細胞(keratinocyte)出現萎縮現象","B":"蘭氏細胞(Langerhans cell)數量增加","C":"真皮的纖維母細胞(dermal fibroblast)活性增加","D":"皮脂腺(sebaceous gland)分泌量增加"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_114090-44","q_num":44,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"HI11內分泌皮膚與感覺器官","stem":"有關表皮(epidermis)中的蘭氏細胞(Langerhans cell)之敘述,何者正確?","options":{"A":"均勻分布在表皮的五層細胞中","B":"常發現在基底層(stratum basale)","C":"是抗原呈現細胞(antigen-presenting cell)","D":"為機械性受器(mechanoreceptor)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""}],E={"med1_107100-37":{"quick":"粒線體為「雙層膜」胞器,故「單層膜」敘述錯誤。","detail":{"background":"粒線體(mitochondria)是能量工廠,具「雙層膜」:外膜平滑、含porin通透性高;內膜向內摺成嵴(cristae)、含電子傳遞鏈與ATP合成酶、通透性低(故膜間腔與基質成分不同)。基質(matrix)含環狀mtDNA、mt-RNA與核糖體(可半自主複製轉錄轉譯,母系遺傳)、TCA循環酵素,並有「基質顆粒」可儲存Ca²⁺等雙價陽離子。粒線體以「分裂(fission)」增殖、亦可融合(fusion)。故D「單層膜」錯誤。臨床:粒線體DNA突變→母系遺傳粒線體疾病(MELAS、LHON);內膜電傳鏈是活性氧與凋亡(釋出cytochrome c)關鍵。","options":{"A":"粒線體以分裂增加數目,正確。","B":"基質具DNA與RNA,正確。","C":"基質顆粒可儲存雙價離子,正確。","D":"稱粒線體為單層膜—錯誤(實為雙層膜),為正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108030-38":{"quick":"核仁(nucleolus)無膜,為rRNA轉錄與核糖體次單元組裝處。","detail":{"background":"依「有無膜」分胞器:「有膜胞器」=粒線體、內質網(粗糙ER附核糖體合成分泌/膜蛋白、平滑ER合成脂質類固醇解毒儲鈣)、高基氏體、溶體、胞內體(endosome)、過氧化質體(peroxisome)、核膜;「無膜胞器」=核糖體、蛋白酶體、中心粒/中心體、細胞骨架、「核仁」。核仁(nucleolus)是核內無膜的緻密區,為rRNA基因(NOR)轉錄與核糖體大小次單元組裝之處,蛋白質合成旺盛的細胞核仁明顯。故不具膜者為核仁。","options":{"A":"核仁無膜—正解。","B":"胞內體為有膜胞器。","C":"過氧化質體為單層膜胞器。","D":"內質網為有膜胞器。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111020-37":{"quick":"纖毛(cilia)的內部軸絲以微管(9+2)為基礎。","detail":{"background":"細胞表面突起的「核心骨架」不同:「微絨毛(microvilli)」核心為「肌動蛋白微絲(actin)」—小腸吸收細胞的『紋狀緣』與腎近曲小管的『刷狀緣』皆屬之,增大吸收面積;「靜纖毛(stereocilia)」是特長分支的微絨毛,核心亦為actin(見於副睪、內耳毛細胞);「纖毛(cilia)」核心為「微管」,排列為「9+2」軸絲(9對周邊雙聯體+中央2根),靠dynein臂滑動產生擺動(見於呼吸道、輸卵管)。故以微管為基礎者為纖毛。臨床:dynein缺陷→原發性纖毛運動不良(Kartagener症候群:內臟轉位、慢性鼻竇炎、不孕)。","options":{"A":"紋狀緣微絨毛核心為actin微絲。","B":"刷狀緣微絨毛核心為actin微絲。","C":"靜纖毛核心為actin微絲。","D":"纖毛軸絲(9+2)以微管為基礎—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-47":{"quick":"膽固醇是低溫下維持細胞膜流動性的關鍵成分。","detail":{"background":"細胞膜流動性的調節:膽固醇(cholesterol)嵌於磷脂之間,扮演「流動性緩衝劑」—「高溫時」其剛性環限制磷脂運動而『降低』流動性;「低溫時」則插入磷脂間防止其緊密堆疊結晶化、『維持』膜的流動性。此外不飽和脂肪酸(雙鍵造成彎折)亦增流動性、飽和脂肪酸降流動性。故低溫維持流動性最重要者為膽固醇。穿膜蛋白與周圍膜蛋白是膜的功能性成分(運輸、受體、酵素),非調節流動性的主因。","options":{"A":"飽和脂肪酸使膜緊密、降低流動性。","B":"膽固醇低溫維持流動性—正解。","C":"穿膜蛋白為功能蛋白,非流動性主調節者。","D":"周圍膜蛋白附於膜表面,非流動性調節者。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_112020-38":{"quick":"板小體(lamellar body)是細胞質胞器,非細胞核構造。","detail":{"background":"細胞核的構造:核膜(雙層、含核孔複合體)、核板/核纖層(nuclear lamina,中間絲lamin構成,支撐核膜、調節有絲分裂解體)、染色質(異/常染色質)、核仁、「巴氏小體(Barr body)」(失活的X染色體濃縮成的異染色質,貼核膜,女性可見、為性別判定依據)。而「板小體(lamellar body)」是『細胞質內的分泌胞器』—第II型肺泡細胞用以儲存分泌表面張力素、角質細胞用以分泌脂質屏障,與細胞核無關。故不屬於細胞核者為板小體。","options":{"A":"核仁為核內構造。","B":"核板(核纖層)為核膜內襯。","C":"板小體為細胞質分泌胞器,非核構造—正解。","D":"巴氏小體為失活X染色體,位核內。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_112020-39":{"quick":"嗜天青顆粒(azurophilic granules)即溶酶體。","detail":{"background":"顆粒性白血球(嗜中性、嗜酸、嗜鹼球)含兩類顆粒:「特異顆粒(specific granules)」各系不同(嗜中性含鹼性磷酸酶、溶菌酶、乳鐵蛋白;嗜酸含主要鹼性蛋白MBP;嗜鹼含組織胺、肝素);「嗜天青顆粒(azurophilic/primary granules)」則相當於「溶酶體(lysosome)」—含酸性水解酶與髓過氧化酶(MPO)、防禦素,負責胞內殺菌與消化。故嗜天青顆粒主要相當於溶酶體。臨床:MPO與嗜中性球氧化爆發殺菌有關;溶酶體酶缺陷→溶酶體儲積症。","options":{"A":"嗜天青顆粒即溶酶體—正解。","B":"粒線體為能量胞器,非顆粒。","C":"高基氏體為加工胞器。","D":"過氧化酶體與長鏈脂肪酸氧化有關,非嗜天青顆粒。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-37":{"quick":"福馬林不能保存脂質;組織處理過程脂質被溶劑溶去,故細胞膜完整性無法保存。","detail":{"background":"福馬林(formalin,甲醛水溶液)是最常用固定劑:藉「交聯蛋白質胺基」使蛋白變性、組織變硬,並「防止細胞自溶與腐敗(殺菌)」、保存組織結構供後續切片染色。但它「主要固定蛋白質,『不能』有效固定/保存脂質」—標準石蠟包埋流程中經酒精脫水與二甲苯透明,脂質(含細胞膜磷脂)被有機溶劑溶出,故H&E切片上脂肪細胞呈空泡。欲保存脂質需用冷凍切片+特殊染色(如油紅O)。故A「與脂質充分作用保存細胞膜完整」錯誤。","options":{"A":"稱保存脂質與細胞膜完整—錯誤(脂質於處理中被溶出),為正解。","B":"使蛋白變性、組織變硬,正確。","C":"防止自溶,正確。","D":"可殺死微生物,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-47":{"quick":"細胞膜主要由蛋白質與磷脂質(phospholipid)組成。","detail":{"background":"細胞膜為「流體鑲嵌模型」:基本骨架是「磷脂質(phospholipid)雙層」(兩性分子:親水頭朝外、疏水尾朝內),其間鑲嵌「蛋白質」(整合/穿膜蛋白、周圍蛋白—行運輸、受體、酵素、辨識)、並含「膽固醇」調節流動性與「醣類」(醣蛋白/醣脂,形成細胞外醣萼供辨識)。故組成細胞膜的兩大主要成分為蛋白質與「磷脂質」。甘油、三酸甘油酯是中性脂肪(儲能),非膜主成分;膽固醇是次要調節成分。","options":{"A":"甘油為脂質骨架成分,非膜主成分。","B":"三酸甘油酯為儲能脂肪,非膜主成分。","C":"磷脂質為膜雙層主成分—正解。","D":"膽固醇為調節流動性的次要成分。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113090-37":{"quick":"高基氏體負責蛋白質的修飾與分類運送。","detail":{"background":"各胞器功能:高基氏體(Golgi)為「加工與分揀中心」—接收粗糙ER來的蛋白,進行『修飾(醣化加工、磷酸化、硫酸化)』與『分類(sorting)、包裝』成分泌泡/溶體/膜蛋白,有cis(接收)與trans(輸出)面。比較錯誤選項:A粒線體為『雙層膜』、行『有氧』呼吸(非單層、非無氧);B rRNA由核仁轉錄製造、核糖體是被製造者(非製造rRNA);C含核糖體、行醣化者為『粗糙』ER(平滑ER無核糖體、負責脂質類固醇合成解毒儲鈣)。故D正確。","options":{"A":"粒線體為雙層膜、有氧呼吸(非單層無氧)。","B":"rRNA由核仁製造、核糖體被其製造(敘述顛倒)。","C":"含核糖體行醣化者為粗糙ER(非平滑ER)。","D":"高基氏體負責修飾與分類—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113090-38":{"quick":"光學(明視野)顯微鏡的最佳解析度約 0.2 μm。","detail":{"background":"解析度(resolution)=能分辨兩點為二的最小距離,受光波長限制:「光學顯微鏡(明視野)」用可見光,最佳解析度約「0.2 μm(200 nm)」,放大上限約1000–1500倍;「穿透式電子顯微鏡(TEM)」用電子束(波長極短),解析度可達約0.2 nm(分辨胞器超微結構、膜)。故光鏡約0.2 μm。記憶:人眼約0.2 mm、光鏡0.2 μm、電鏡0.2 nm—每跨一階差1000倍。此即為何細胞膜(7–10 nm)在光鏡下看不見、需電鏡。","options":{"A":"0.2 mm為人眼裸視解析度。","B":"0.2 μm為光學顯微鏡最佳解析度—正解。","C":"0.2 nm為電子顯微鏡解析度。","D":"0.2 pm遠超現有顯微鏡能力。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113090-40":{"quick":"軸突運輸主要沿微小管(microtubule)進行。","detail":{"background":"神經元的「軸突運輸(axonal transport)」沿「微小管(microtubule)」軌道進行,由馬達蛋白驅動:「順向運輸(anterograde,胞體→軸突末梢)」由kinesin負責(運送胞器、突觸小泡、粒線體);「逆向運輸(retrograde,末梢→胞體)」由dynein負責(回收物質、神經營養因子訊號)。微管極性(負端在胞體、正端在末梢)決定方向。臨床:逆向運輸亦是破傷風毒素、狂犬病毒、單純疱疹病毒入侵中樞的路徑;微管藥(vincristine、taxane)的周邊神經毒性即源於干擾軸突運輸。髓鞘負責跳躍式傳導、非物質運輸。","options":{"A":"髓鞘負責絕緣與跳躍傳導,非物質運輸。","B":"平滑內質網非軸突運輸軌道。","C":"微小管為軸突運輸軌道—正解。","D":"粗糙內質網行蛋白合成,非運輸軌道。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114020-37":{"quick":"核糖體與蛋白酶體屬無膜胞器(選項3與4)。","detail":{"background":"依有無膜分:「無膜胞器」=核糖體(rRNA+蛋白,合成蛋白)、蛋白酶體(proteasome,降解泛素標記蛋白)、中心體/中心粒、細胞骨架、核仁;「有膜胞器」=胞內體(endosome)、粗糙與平滑內質網、高基氏體、溶體、過氧化質體、粒線體。故無膜者為「核糖體(3)與蛋白酶體(4)」。胞內體(1)與粗糙ER(2)皆為有膜胞器。蛋白酶體與泛素-蛋白酶體系統(細胞周期、訊號蛋白降解)為標靶(如bortezomib治多發性骨髓瘤)。","options":{"A":"12(胞內體+粗糙ER)皆有膜。","B":"23(粗糙ER有膜)不符。","C":"34(核糖體+蛋白酶體)皆無膜—正解。","D":"14(胞內體有膜)不符。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114020-38":{"quick":"黏液細胞的黏原顆粒富含醣類,PAS染色呈陽性。","detail":{"background":"黏液細胞(mucous cell,如杯狀細胞、胃表面黏液細胞)特徵:頂部細胞質充滿「黏原顆粒(mucinogen granule)」—內含高度醣化的黏液素(mucin),「PAS染色(periodic acid–Schiff,標記醣類)呈『陽性』(紫紅)」、Alcian blue(酸性黏多醣)亦陽性;在H&E下黏液被洗去而頂部呈「淡染/空泡狀(非嗜伊紅)」;細胞核被頂部黏液擠到「基部」(非中央)、變扁;基部含粗糙ER故略嗜鹼,但題述「核周邊大量粗糙ER」非其最典型描述。故D正確。比較:漿液細胞(如胰腺泡)頂部含酶原顆粒、呈嗜伊紅、核圓居中偏基。","options":{"A":"黏液細胞核被擠到基部,非中央。","B":"核周大量粗糙ER非黏液細胞最典型描述(頂部以黏原顆粒為主)。","C":"頂部黏液於H&E淡染/空泡,非嗜伊紅。","D":"黏原顆粒PAS陽性—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_106100-45":{"quick":"副睪內襯為帶靜纖毛的偽複層柱狀上皮。","detail":{"background":"上皮分類依「層數×頂層細胞形狀」:男性生殖管道多為「偽複層柱狀上皮(pseudostratified columnar)」—所有細胞皆接觸基底膜但細胞核高低錯落『看似多層、實為單層』。副睪(epididymis)內襯為「帶長靜纖毛(stereocilia)的偽複層柱狀上皮」,主細胞具吸收(吸收睪丸液濃縮精子)與分泌(使精子成熟、獲得運動力)功能;輸精管亦同型。比較:呼吸道為帶纖毛的偽複層柱狀;移形上皮見於腎盞至膀胱;複層扁平見於皮膚、食道、陰道。故副睪屬偽複層柱狀。","options":{"A":"副睪為偽複層柱狀上皮(帶靜纖毛)—正解。","B":"複層扁平見於皮膚/食道/陰道。","C":"多層柱狀少見於眼瞼結膜/部分大導管。","D":"移形上皮見於泌尿道。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-38":{"quick":"黏著斑(macula adherens,即橋粒)與中間絲連結。","detail":{"background":"上皮側面的細胞接合複合體由淺至深:「閉鎖小帶/緊密接合(zonula occludens)」封閉細胞間隙、連actin;「黏著小帶(zonula adherens)」帶狀、由cadherin連『肌動蛋白微絲(actin)』;「黏著斑/橋粒(macula adherens/desmosome)」點狀、由desmoglein/desmocollin連『中間絲(intermediate filament,如keratin)』提供機械強度。基底面的「半橋粒」與「點狀黏著」亦各連中間絲與actin。故與『中間絲』連結者為黏著斑(橋粒)。臨床:抗desmoglein自體抗體→尋常天疱瘡(表皮內水疱)。","options":{"A":"閉鎖小帶(緊密接合)連actin、封閉間隙。","B":"黏著小帶連actin微絲。","C":"黏著斑(橋粒)連中間絲—正解。","D":"局部黏著連actin微絲(位基底面)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109020-37":{"quick":"類上皮組織(內分泌細胞)無游離表面,故此敘述錯誤。","detail":{"background":"「類上皮組織(epithelioid tissue)」指源自上皮但「失去游離表面、不襯覆腔面」的細胞團—典型為『內分泌腺』(如腎上腺皮質、間質細胞、黃體),其分泌物直接入血、無需面向管腔。它仍保有上皮的其他極性特徵:有側區(細胞間接合)、有基底區並接觸基底膜、被結締組織與豐富微血管包繞。故「有游離表面」對類上皮組織為『錯誤』敘述(它正是以『無游離表面』為特徵)。比較:外分泌腺仍有管腔(有游離面)。","options":{"A":"類上皮組織無游離表面—此敘述錯誤,為正解。","B":"仍有側區(細胞接合),正確。","C":"仍有基底區,正確。","D":"基底區接觸基底膜,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_110020-37":{"quick":"橋粒(desmosome)有中間絲參與。","detail":{"background":"上皮細胞接合與其連結的細胞骨架:緊密接合(tight junction/zonula occludens)→封閉、連actin;黏著小帶(zonula adherens)→連actin微絲;「橋粒(desmosome/macula adherens)→連『中間絲(keratin)』」,如鈕扣般點狀分布、抗拉強;間隙接合(gap junction)→connexon通道供小分子離子通訊(無連細胞骨架)。故有中間絲參與者為橋粒。心肌間盤亦含橋粒(錨定中間絲)與筋膜黏著(錨定actin)與間隙接合(電耦合)。","options":{"A":"緊密接合連actin、行封閉。","B":"黏著小帶連actin微絲。","C":"橋粒連中間絲—正解。","D":"間隙接合為通訊通道,不連細胞骨架。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_110020-38":{"quick":"杯狀細胞是分散於上皮間的單細胞腺體(分泌黏液)。","detail":{"background":"杯狀細胞(goblet cell)是「單細胞外分泌腺(unicellular gland)」—分散在『單層柱狀或偽複層柱狀上皮』之間(腸道、呼吸道),頂部脹滿黏原顆粒呈高腳杯狀、核被擠至基部,分泌「黏液(mucous,非漿液)」潤滑保護表面。它不形成腺泡(acinus)、本身即一個腺細胞。故B正確。比較:漿液細胞分泌稀薄含酶分泌物;單層鱗狀上皮(如內皮、間皮)之間無杯狀細胞。臨床:呼吸道杯狀細胞增生與慢性支氣管炎黏液過多有關;PAS/Alcian blue可標記。","options":{"A":"杯狀細胞不構成腺泡,為單細胞腺。","B":"屬單細胞腺體—正解。","C":"分泌黏液(非漿液)。","D":"分布於單層柱狀/偽複層柱狀(非單層鱗狀)上皮間。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111020-38":{"quick":"頂泌(apocrine)分泌物外覆一層細胞膜(連同部分頂部胞質釋出)。","detail":{"background":"外分泌的三種釋放方式:「局泌(merocrine/eccrine)」以胞吐釋出、細胞完整無損(最常見,如胰腺泡、一般汗腺);「頂泌(apocrine)」釋出時連同『部分頂部細胞質與包覆的細胞膜』一起脫落(故分泌物外『仍有細胞膜包覆』,如乳腺脂質分泌、腋下大汗腺);「全泌(holocrine)」整個細胞充滿分泌物後死亡崩解、連細胞一併釋出(如皮脂腺)。故「分泌物仍有細胞膜包覆」者為頂泌腺。","options":{"A":"全泌腺整個細胞崩解釋出。","B":"局泌以胞吐釋出、細胞無損、分泌物無細胞膜。","C":"頂泌分泌物外覆細胞膜—正解。","D":"內分泌入血、無管腔。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111020-44":{"quick":"半胞橋小體(hemidesmosome)連接基底細胞與基底膜。","detail":{"background":"上皮『基底面』的錨定接合:「半胞橋小體(hemidesmosome)」像半個橋粒,以整合素(integrin α6β4)將基底細胞的『中間絲(keratin)』錨定到『基底膜(基底層laminin)』,提供上皮與下方結締組織的牢固附著;「點狀黏著(focal adhesion)」則以整合素連actin微絲到細胞外基質。故連接基底細胞與基底膜者為半胞橋小體。臨床:抗BP180/BP230(半橋粒成分)自體抗體→大疱性類天疱瘡(表皮下水疱);整合素/laminin基因缺陷→交界型表皮鬆解症。","options":{"A":"胞橋小體位於『側面』、連相鄰細胞。","B":"緊密接合位側面頂端、行封閉。","C":"間隙接合位側面、行通訊。","D":"半胞橋小體連基底細胞與基底膜—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-38":{"quick":"全分泌(holocrine)是分泌物連同整個細胞一起釋入管腔。","detail":{"background":"依分泌物釋放是否伴隨細胞犧牲區分:「全分泌(holocrine)」—分泌細胞在胞質充滿分泌物後『整個細胞崩解死亡、連同分泌物一起釋入管腔』,由基底幹細胞補充,典型為『皮脂腺(分泌皮脂)』與眼瞼瞼板腺;「頂分泌(apocrine)」僅頂部胞質連分泌物脫落;「局分泌(merocrine)」純胞吐、細胞完好。故「將分泌物與細胞一併釋放」者為全分泌。","options":{"A":"局分泌純胞吐、細胞無損。","B":"頂分泌僅頂部胞質脫落。","C":"全分泌連整個細胞一起釋放—正解。","D":"內分泌入血、無管腔。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_112020-37":{"quick":"偽複層柱狀上皮所有細胞都接觸基底膜(但不一定都達游離面)。","detail":{"background":"偽複層柱狀上皮(pseudostratified columnar)的定義特徵:「『所有』細胞都接觸『基底膜』」(故實為單層),但細胞高矮不一、核位高低錯落而『看似多層』;其中高的柱狀細胞達游離面、矮的基底細胞(幹細胞)未達游離面(故並非所有細胞都觸及游離表面)。常見於呼吸道(帶纖毛+杯狀)與男性生殖管(帶靜纖毛)。故B「所有細胞都接觸基底膜」正確;A(所有都達游離面)、C(所有柱狀都不達游離面)、D(基底細胞不接觸基底膜)皆錯。","options":{"A":"並非所有細胞都達游離面(基底細胞未達)。","B":"所有細胞都接觸基底膜—正解。","C":"柱狀細胞達游離面(非都不觸及)。","D":"基底細胞接觸基底膜(此即偽複層特徵)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-38":{"quick":"氣管內襯為帶纖毛的偽複層柱狀上皮(含杯狀細胞)。","detail":{"background":"呼吸道傳導部(鼻、氣管、支氣管)的典型內襯為「帶纖毛的偽複層柱狀上皮(ciliated pseudostratified columnar epithelium)」,夾雜「杯狀細胞(分泌黏液)」、基底細胞(幹細胞)、刷細胞與神經內分泌細胞,構成「黏液纖毛清除系統」(黏液捕捉顆粒、纖毛向咽部擺送)。隨氣道變細,上皮漸變薄:細支氣管為單層柱狀/立方(含Club細胞)、肺泡為單層扁平。故氣管屬具纖毛的偽複層柱狀上皮。臨床:吸菸使纖毛受損、杯狀細胞增生→清除力下降、慢性支氣管炎;鱗狀化生為癌前變化。","options":{"A":"單層柱狀見於胃腸,非氣管。","B":"複層扁平見於皮膚/食道/聲帶。","C":"複層柱狀少見。","D":"帶纖毛的偽複層柱狀上皮—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114090-37":{"quick":"半橋粒位於上皮『基底面』,不出現在側面。","detail":{"background":"上皮細胞接合的「分區」:『側面(lateral domain)』有—緊密接合(頂端封閉)、黏連接合(黏著小帶連actin、橋粒連中間絲)、間隙接合(通訊);『基底面(basal domain)』有—半橋粒(連中間絲錨定基底膜)、點狀黏著(連actin錨定基質)。故「半橋粒(hemidesmosome)」屬基底面、『不』出現在側面。記憶:名字帶「半(hemi)」者錨定基底膜在底面;成對的橋粒/間隙/緊密在側面相鄰細胞間。","options":{"A":"間隙接合在側面。","B":"黏連接合在側面。","C":"半橋粒在基底面、不在側面—正解。","D":"緊密接合在側面頂端。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_115020-37":{"quick":"點狀黏著(focal adhesion)位於上皮細胞的基底面。","detail":{"background":"上皮『基底面(basal domain)』的接合專責「錨定到基底膜/細胞外基質」:「半橋粒(hemidesmosome)」以整合素連中間絲、「點狀黏著(focal adhesion)」以整合素連actin微絲。而緊密接合、黏連接合(黏著小帶、橋粒)位於『側面』連相鄰細胞。故出現在基底面者為點狀黏著。整合素媒介的基底面接合不僅固定細胞,也傳遞「細胞-基質訊號」(影響存活、移行、分化);其異常與腫瘤侵襲轉移相關。","options":{"A":"緊密接合在側面。","B":"黏連接合在側面。","C":"橋粒在側面。","D":"點狀黏著在基底面—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_107100-39":{"quick":"正母紅血球(normoblast)已不再分裂(其後排核成網狀紅血球)。","detail":{"background":"紅血球生成(erythropoiesis)序列:前母紅血球(proerythroblast)→嗜鹼性母紅血球(basophilic,核糖體多故嗜鹼、仍分裂)→多染性母紅血球(polychromatophilic,開始合成血紅素、『最後仍具分裂能力的階段』)→「正/嗜酸性母紅血球(normoblast/orthochromatophilic erythroblast,血紅素充滿、核濃縮『已喪失分裂能力』)」→排核成網狀紅血球(reticulocyte,殘留核糖體)→成熟紅血球。故不再分裂者為正母紅血球。受EPO(腎臟分泌)調控;網狀紅血球比例反映骨髓造血活性。","options":{"A":"正母紅血球已不再分裂—正解。","B":"前母紅血球可分裂。","C":"嗜鹼性母紅血球可分裂。","D":"多染性母紅血球為最後可分裂階段。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108030-39":{"quick":"棕色脂肪在新生兒含量多、分布廣,隨成長逐漸減少。","detail":{"background":"兩種脂肪組織:「白色脂肪(white)」細胞含『單一大脂滴』把核擠到周邊(單泡),主司『儲能、保溫、保護、內分泌(leptin)』;「棕色脂肪(brown)」細胞含『多個小脂滴』與『大量粒線體(故呈棕色)』,粒線體內膜的UCP1(thermogenin)使氧化磷酸化解偶聯而『產熱(非顫抖性產熱)』,「在新生兒含量多、分布廣(肩胛間、頸、腎周),隨成長逐漸減少」。脂滴並非由細胞膜包裹(無膜或僅單層磷脂單層+perilipin)。故D正確;A(功能寫反)、B(脂滴有膜)、C(大小寫反)皆錯。","options":{"A":"功能寫反:白色儲能、棕色產熱。","B":"脂滴非雙層膜包裹(僅磷脂單層/perilipin)。","C":"大小寫反:白色一大顆、棕色多小顆。","D":"棕色脂肪新生兒多、隨成長減少—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109100-39":{"quick":"MEP是血小板(巨核細胞)與紅血球的共同前驅細胞。","detail":{"background":"造血分化:髓系幹細胞先分為「巨核-紅血球前驅(MEP)」與「粒-單核前驅(GMP)」。「MEP」為『血小板(來自巨核細胞)與紅血球』的共同前驅—故A正確。比較錯誤:B紅血球是血中『數量最多』(非最少)、直徑約7–8μm、壽命約120天;C白血球中『數量最少者為嗜鹼性球』(非嗜酸性球;數量序大致嗜中>淋巴>單核>嗜酸>嗜鹼);D血小板是巨核細胞胞質碎片、『無細胞核』(但含顆粒、參與止血)。故A正確。","options":{"A":"MEP為血小板與紅血球共同前驅—正解。","B":"紅血球數量最多、徑7–8μm、壽命約120天。","C":"白血球中最少者為嗜鹼性球(非嗜酸)。","D":"血小板無細胞核(為巨核細胞碎片)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_110020-39":{"quick":"白血球的嗜天青顆粒即溶酶體。","detail":{"background":"白血球(leukocyte)的嗜天青顆粒(azurophilic granule)為「溶酶體」,含酸性水解酶與髓過氧化酶,行胞內殺菌消化—故B正確。比較錯誤:A分類寫反—『顆粒性』白血球=嗜中性、嗜酸性、嗜鹼性;『無顆粒性』=淋巴球、單核球;C所有白血球皆能以『血球滲出(diapedesis)』離開血管進入結締組織(非只有淋巴球);D數量最多者為『嗜中性球』、體積最大者為『單核球』(非淋巴球最多、嗜中性最大)。故B正確。","options":{"A":"分類寫反(顆粒性=嗜中/酸/鹼;無顆粒性=淋巴/單核)。","B":"嗜天青顆粒即溶酶體—正解。","C":"各種白血球皆能滲出血管(非只淋巴球)。","D":"最多為嗜中性球、最大為單核球。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113090-41":{"quick":"周細胞(pericyte)具間質幹細胞特性,可分化為內皮或平滑肌細胞。","detail":{"background":"「周細胞(pericyte/周皮細胞)」沿微血管與小靜脈外纏繞,位於內皮的基底膜內,具「未分化間質幹細胞樣特性」—在血管新生或損傷修復時可增生並『分化為內皮細胞或血管平滑肌細胞』,並調節微血管管徑與通透性、穩定新生血管。故為正解。比較:軟骨細胞、足細胞(腎絲球)、肥大細胞皆為已分化的終末細胞,無此多潛能。臨床:糖尿病視網膜病變早期即見『周細胞流失』→微血管瘤與滲漏;腫瘤血管周細胞覆蓋不全。","options":{"A":"周細胞具間質幹細胞樣特性、可分化為內皮/平滑肌—正解。","B":"軟骨細胞為終末分化細胞。","C":"足細胞為腎絲球終末細胞。","D":"肥大細胞為終末免疫細胞。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114020-40":{"quick":"彈性纖維含小纖維蛋白(fibrillin)微纖維作為支架。","detail":{"background":"彈性纖維(elastic fiber)由兩成分構成:核心的「彈力素(elastin,可伸縮的交聯蛋白)」與外周的「小纖維蛋白(fibrillin)微纖維」—fibrillin微纖維作為支架,引導彈力素沉積。故C正確。比較錯誤:A彈力素由多條原纖維聚集(非僅3條);B H&E下膠原與彈性纖維皆呈嗜伊紅、『難以分辨』,需特殊染色(Verhoeff、orcein、resorcin-fuchsin);D彈性纖維大量存在於『大動脈、彈性軟骨、肺、皮膚真皮』(非淋巴組織)。臨床:fibrillin-1基因(FBN1)突變→馬凡氏症候群(主動脈瘤、晶狀體脫位)。","options":{"A":"彈力素由多條原纖維聚集(非僅3條)。","B":"H&E下膠原與彈性纖維難分辨,需特殊染色。","C":"含fibrillin微纖維作支架—正解。","D":"彈性纖維富於大動脈/彈性軟骨/肺/皮膚,非淋巴組織。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_115020-40":{"quick":"嗜鹼性球與肥大細胞功能相似、前驅來源相近(皆髓系)。","detail":{"background":"功能與來源最相近者為「嗜鹼性球(basophil)與肥大細胞(mast cell)」:兩者皆源自『骨髓造血幹細胞(髓系)』、胞質皆富含『組織胺與肝素的嗜鹼性顆粒』、表面皆有高親和力IgE受體(FcεRI),活化後脫顆粒釋出組織胺與白三烯,媒介『第I型過敏反應與發炎』(嗜鹼球在血中循環、肥大細胞駐留結締組織)。故C正確。比較:NK細胞屬淋巴系先天免疫、漿細胞為B細胞分化的抗體工廠(來源功能皆不同);巨噬細胞(吞噬)與巨核細胞(產血小板)功能迥異。","options":{"A":"肥大細胞與巨噬細胞功能不同(過敏 vs 吞噬)。","B":"NK細胞(先天免疫)與漿細胞(抗體)功能來源皆不同。","C":"嗜鹼性球與肥大細胞功能相似、來源相近—正解。","D":"巨噬細胞(吞噬)與巨核細胞(產血小板)迥異。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_106100-38":{"quick":"陷窩(lacuna)是軟骨/骨才有(容納細胞),緻密結締組織無。","detail":{"background":"纖維軟骨(fibrocartilage)與規則緻密結締組織(如肌腱)都富含『第I型膠原纖維』、都有纖維母/軟骨母細胞與基質,外觀相似。其關鍵差別在於軟骨細胞被包埋於自己分泌的基質中、住在「陷窩(lacuna)」內—『陷窩是軟骨(與骨)特有、緻密結締組織沒有』(肌腱的纖維母細胞夾在纖維束之間、無陷窩)。故纖維軟骨才有者為陷窩。纖維軟骨見於椎間盤、恥骨聯合、半月板,耐壓兼抗拉,無軟骨膜。","options":{"A":"纖維母細胞兩者皆有。","B":"膠原纖維兩者皆富含(第I型)。","C":"基質兩者皆有。","D":"陷窩為軟骨/骨特有、緻密結締組織無—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_106100-39":{"quick":"骨細胞藉骨小管內的「間隙接合」進行物質交換。","detail":{"background":"骨細胞(osteocyte)埋於陷窩中,以細長突起伸入「骨小管(canaliculi)」彼此相連,突起末端以「間隙接合(gap junction)」相接—讓相鄰骨細胞間直接交換離子、營養與訊號分子,也與骨表面的骨母細胞相通,構成感知力學負荷與調節骨重塑的網路(因骨基質鈣化、養分無法擴散,須靠此小管-間隙接合系統)。故物質交換構造為間隙接合。骨細胞凋亡(如骨壞死)會中斷此網路、觸發局部骨重塑。","options":{"A":"緊密接合行封閉。","B":"黏連接合行機械固定。","C":"胞橋小體錨定中間絲。","D":"間隙接合供骨細胞物質交換—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_107100-38":{"quick":"透明軟骨與彈性軟骨有軟骨膜,可進行附加性生長;纖維軟骨無軟骨膜。","detail":{"background":"軟骨的兩種生長:「間質性生長(interstitial)」=內部軟骨細胞分裂並分泌基質、由內向外擴大(幼年);「附加性生長(appositional)」=『軟骨膜(perichondrium)』內層的軟骨母細胞在表面新增軟骨。後者需有『軟骨膜』。三型軟骨中「透明軟骨(1)與彈性軟骨(2)有軟骨膜→可附加性生長」;「纖維軟骨(3)『沒有軟骨膜』→不能附加性生長」(由緻密結締組織移行而來)。故能附加性生長者為12。","options":{"A":"透明(1)與彈性(2)軟骨有軟骨膜、可附加性生長—正解。","B":"含纖維軟骨(3)、無軟骨膜不符。","C":"含纖維軟骨(3)不符。","D":"纖維軟骨無軟骨膜、不能附加性生長。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-39":{"quick":"長骨軟骨內骨化的初級骨化中心位於骨幹(diaphysis)。","detail":{"background":"長骨以「軟骨內骨化(endochondral)」發育:先形成透明軟骨模型,「初級骨化中心(primary ossification center)出現於『骨幹(diaphysis)』中段」(軟骨膜變骨膜、骨領形成、軟骨鈣化、血管侵入),由此向兩端骨化;出生後兩端「骨骺(epiphysis)」再出現『次級骨化中心』。兩者之間殘留的「骨骺板(growth plate)」持續以軟骨內骨化使骨『增長』,至青春期後閉合。骨幹骺端(metaphysis)是生長板下方新骨形成區。故初級骨化中心在骨幹。","options":{"A":"初級骨化中心位於骨幹—正解。","B":"骨骺為次級骨化中心位置。","C":"骨幹骺端為生長板下新骨區。","D":"骨內膜為骨髓腔內襯,非骨化中心。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109020-39":{"quick":"骨髓竇為封閉循環,新生血球須穿透內皮才入血。","detail":{"background":"紅骨髓的「竇狀系統(sinusoidal system)」為『封閉型』循環:成熟血球必須主動『穿透竇狀微血管的內皮』才能進入血流(故周邊血通常不見幼稚血球;骨髓中央造血、竇旁釋放)—故A正確。比較錯誤:B『紅』骨髓才是活化造血、『黃』骨髓主要為脂肪(非造血);C長骨非造血空間被『脂肪(黃骨髓)』占據(非纖維母細胞);D巨核細胞的胞質突起『直接穿過內皮伸入竇腔』脫落成血小板(不需網狀細胞協助)。故A正確。","options":{"A":"竇狀系統封閉、新生血球須穿透內皮入循環—正解。","B":"活化造血為紅骨髓(黃骨髓主為脂肪)。","C":"非造血空間被脂肪(黃骨髓)占據。","D":"血小板由巨核細胞突起穿內皮脫落,不需網狀細胞。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111020-39":{"quick":"骨細胞壽命最長、蝕骨細胞壽命最短。","detail":{"background":"骨的三種細胞中:骨母(osteoblast)與骨細胞(osteocyte)源自『骨生成細胞(間質來源)』;「蝕骨細胞(osteoclast)則源自『單核球/巨噬細胞系(造血來源)』、為多核大細胞」—故並非皆來自骨生成細胞、也非皆單核。數量上骨細胞最多(占骨內細胞絕大多數)、蝕骨細胞較少。壽命上「骨細胞最長(可數十年,埋於基質)、蝕骨細胞最短(完成吸收後凋亡)」。故B正確;A、C、D皆錯。臨床:蝕骨細胞過度活化→骨質疏鬆、蝕骨不全(osteopetrosis)則相反。","options":{"A":"蝕骨細胞源自單核球系(非骨生成細胞)。","B":"骨細胞壽命最長、蝕骨細胞最短—正解。","C":"數量最多為骨細胞(非骨母細胞)。","D":"蝕骨細胞為多核(非皆單核)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-39":{"quick":"長骨直徑加粗主要靠骨外膜(periosteum)的附加性生長。","detail":{"background":"長骨「直徑變粗」靠『附加性生長(appositional)』:「骨外膜(periosteum)」內層的骨生成細胞分化為骨母細胞,在骨幹外表面持續新增同心圓骨層使骨變粗;同時骨內膜側的蝕骨細胞吸收內壁、擴大骨髓腔。而「長度增長」則靠『骨骺板(生長板)』的軟骨內骨化。故直徑加粗主要由骨外膜。臨床:生長激素過多在生長板閉合前致『長高(巨人症)』、閉合後致『肢端肥大(骨變寬增厚)』。","options":{"A":"骨外膜附加性生長使骨變粗—正解。","B":"骨內膜側以吸收為主、擴大髓腔。","C":"骨幹骺端為生長板下新骨區(關長度)。","D":"骨骺板司長度增長。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-39":{"quick":"軟骨是無血管(avascular)構造,養分靠基質擴散。","detail":{"background":"軟骨的特性:「無血管(avascular)、無淋巴、無神經」—軟骨細胞的養分與氧氣靠『基質擴散』供應(故代謝慢、損傷後再生差),這也是它能作為關節滑動面與承壓的結構基礎。故C正確。比較錯誤:A附加性生長是由『軟骨膜』的軟骨母細胞在表面新增(非軟骨細胞本身分裂—那是間質性生長);B透明軟骨基質主要是『第II型膠原』(非第I型;第I型在纖維軟骨);D軟骨再生『很差』、受傷常以纖維軟骨修補、難完整癒合。故C正確。","options":{"A":"附加性生長靠軟骨膜(軟骨細胞分裂為間質性生長)。","B":"透明軟骨基質主為第II型膠原(非第I型)。","C":"軟骨為無血管構造、養分靠擴散—正解。","D":"軟骨再生差、難完整癒合。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113090-39":{"quick":"骨基質(類骨質)主要由成骨細胞(osteoblast)分泌。","detail":{"background":"骨生成時,「成骨細胞(osteoblast)」分泌『類骨質(osteoid,未鈣化的有機骨基質:第I型膠原+骨鈣素osteocalcin+蛋白多醣)』,隨後鹼性磷酸酶促進羥磷灰石沉積而鈣化;成骨細胞被自己分泌的基質包埋後即轉為『骨細胞(osteocyte)』。骨生成細胞是其前驅(不直接分泌大量基質)、蝕骨細胞反而『吸收』骨質、骨細胞維持基質但非主要分泌者。故分泌骨基質者為成骨細胞。臨床:成骨細胞活性指標=鹼性磷酸酶、骨鈣素;類骨質鈣化不全(維生素D缺乏)→佝僂病/骨軟化。","options":{"A":"骨生成細胞為前驅、不主分泌基質。","B":"成骨細胞分泌骨基質(類骨質)—正解。","C":"蝕骨細胞吸收骨質。","D":"骨細胞維持基質、非主要分泌者。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114020-39":{"quick":"間接骨癒合(經軟痂)有軟骨參與;膜內骨化與直接癒合無軟骨。","detail":{"background":"骨折癒合兩型:「直接(一級)癒合」需骨折端解剖復位且堅強固定、骨單位直接跨越癒合,『無軟骨痂』;「間接(二級)癒合」(多數骨折)經血腫→『軟骨性軟痂(soft callus,經軟骨內骨化)』→硬痂→重塑,『有軟骨參與』。膜內骨化(扁平骨)由間質直接成骨、無軟骨;骨單位(骨元)形成是骨重塑,無軟骨。故有軟骨參與者為「間接骨癒合」。臨床:固定不穩→過多軟骨痂或不癒合;穩定加壓→趨向直接癒合。","options":{"A":"膜內骨化由間質直接成骨、無軟骨。","B":"骨元形成屬骨重塑、無軟骨。","C":"直接骨癒合無軟骨痂。","D":"間接骨癒合經軟骨性軟痂—有軟骨參與,為正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114090-39":{"quick":"關節面軟骨無「軟骨膜」(直接面對關節腔)。","detail":{"background":"關節面的「玻璃(透明)軟骨」特殊處在於『表面沒有軟骨膜(perichondrium)』—直接裸露面對關節腔、由滑液供養與潤滑(滑動面),故缺乏附加性生長與血供、損傷難修復。它仍具透明軟骨的一般成分:基質富含『玻尿酸(hyaluronan)與蛋白多醣、第II型膠原』、軟骨細胞成「同源細胞群(isogenous group,一個母細胞分裂而成)」。故不存在於關節軟骨者為軟骨膜。臨床:此特性是退化性關節炎軟骨磨損難自癒的根本。","options":{"A":"關節面軟骨無軟骨膜—正解。","B":"玻尿酸為其基質成分。","C":"即為透明軟骨。","D":"含同源細胞群。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114090-40":{"quick":"長骨軟骨內骨化有初級與次級骨化中心。","detail":{"background":"骨化型式:「膜內骨化(intramembranous)」形成『扁平骨(顱蓋、面骨、鎖骨)』,由間質直接成骨針→骨小樑;「軟骨內骨化(endochondral)」形成『長骨與多數骨』,先軟骨模型,『出現初級(骨幹)與次級(骨骺)骨化中心』—故C正確。比較錯誤:A扁平骨主靠『膜內』骨化(非軟骨內);B骨針加大形成骨小樑是『附加性』成骨(非間質性生長,後者用於軟骨);D軟骨內骨化時蝕骨細胞在『鈣化軟骨/初級骨小樑』處作用、肥大區(zone of hypertrophy)是軟骨細胞肥大鈣化區、尚非蝕骨細胞分解骨『質』之處(該描述不準)。故C正確。","options":{"A":"扁平骨主靠膜內骨化(非軟骨內)。","B":"骨針增大為附加性成骨(非間質性生長)。","C":"長骨軟骨內骨化有初級與次級骨化中心—正解。","D":"肥大區為軟骨肥大鈣化、非蝕骨細胞分解骨質處。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_115020-39":{"quick":"蝕骨細胞為多核、胞質嗜酸性的大細胞。","detail":{"background":"蝕骨細胞(osteoclast)特性:源自『單核球/巨噬細胞系(造血幹細胞)』(非骨生成細胞)、為「多個細胞核的大細胞、胞質富含粒線體與溶酶體呈『嗜酸性』」,貼骨面形成「皺褶緣(ruffled border)」與封閉區,分泌H⁺(碳酸酐酶/質子幫浦)溶解羥磷灰石、並以組織蛋白酶K分解膠原而『吸收骨質』。它『不』合成類骨質(那是成骨細胞)、『不』發出骨小管(那是骨細胞)。故C正確。臨床:RANKL/RANK/OPG調控其分化;雙磷酸鹽、denosumab(抗RANKL)抑制蝕骨細胞治骨質疏鬆。","options":{"A":"合成類骨質者為成骨細胞。","B":"源自單核球系(非骨生成細胞)。","C":"多核且胞質嗜酸性—正解。","D":"發出骨小管者為骨細胞。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_106100-35":{"quick":"蒲金氏纖維是『特化的心肌細胞』,負責快速傳導。","detail":{"background":"心臟傳導系統(竇房結、房室結、希氏束、左右束支、蒲金氏纖維)由「特化的心肌細胞」構成,並非神經組織。「蒲金氏纖維(Purkinje fiber)」是特化心肌細胞:體積較大、肌原纖維少而靠周邊、富含肝醣與粒線體(故H&E染色較淡),具豐富間隙接合而『傳導速度最快』,使心室幾乎同步收縮。竇房結為節律點。故蒲金氏纖維源自心肌細胞。臨床:傳導系統病變→傳導阻滯、束支阻滯;其自律性可成為逸搏節律。","options":{"A":"蒲金氏纖維為特化心肌細胞—正解。","B":"非神經細胞(雖功能類似傳導)。","C":"非纖維母細胞。","D":"非內皮細胞。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108030-37":{"quick":"肌纖維膜(sarcolemma)即骨骼肌細胞的細胞膜。","detail":{"background":"骨骼肌的結締組織鞘有三層:「肌外膜(epimysium)」包整條肌肉、「肌束膜(perimysium)」包肌束、「肌內膜(endomysium)」包每條肌纖維—皆屬結締組織。而「肌纖維膜(sarcolemma)」才是『肌細胞本身的細胞膜』(含其外的基底膜),其內凹形成T小管。故由肌細胞細胞膜組成者為肌纖維膜。記憶:sarco-(肌)+lemma(膜)=肌膜;三層「-mysium」都是包覆用的結締組織(血管神經行於其間)。","options":{"A":"肌纖維膜即肌細胞細胞膜—正解。","B":"肌外膜為包整條肌肉的結締組織。","C":"肌內膜為包單條肌纖維的結締組織。","D":"肌束膜為包肌束的結締組織。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-37":{"quick":"平滑肌細胞外有外板(external lamina,即基底膜)包圍。","detail":{"background":"平滑肌細胞(梭形單核)特徵:外有「外板(external lamina/基底膜)」包圍—故B正確;收縮裝置為actin/myosin細絲錨定於『緻密體(dense body)』與細胞膜的『緻密斑』,但緻密體是『細肌絲(actin)』的附著點,myosin並非直接附著於緻密體(A錯);平滑肌『無T小管』、靠細胞膜小凹(caveolae)與肌漿網釋鈣(C錯);細胞間以『間隙接合』電耦合(非橋粒)(D錯)。故B正確。臨床:平滑肌受自主神經與荷爾蒙調控、可再生(具分裂能力)。","options":{"A":"緻密體為細肌絲(actin)附著點,myosin非直接附著。","B":"細胞外有外板(基底膜)包圍—正解。","C":"平滑肌無T小管(靠caveolae/肌漿網)。","D":"平滑肌細胞間以間隙接合連接(非橋粒)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-45":{"quick":"懷孕時子宮肌層平滑肌會肥大(變大)並增生(變多)。","detail":{"background":"子宮壁三層:內膜(endometrium)、肌層(myometrium,最厚、平滑肌)、外膜。懷孕時子宮肌層平滑肌『同時肥大(細胞變大)與增生(數目增加,平滑肌具分裂能力)』以容納胎兒並於分娩時強力收縮—故C正確。比較錯誤:A月經週期中『內膜』功能層週期性剝落,但子宮其他部位(如部分肌層血流)亦受荷爾蒙影響,然主要變化在內膜;此選項『只有內膜會改變』敘述過絕對,題意以C為正解;B子宮肌層分層多且界限不清、非『外層最厚』;D子宮頸以『緻密結締組織/膠原為主、平滑肌少』,故子宮體平滑肌反多於子宮頸。故C正確。","options":{"A":"主要為內膜週期變化,但此絕對敘述非最佳;C更正確。","B":"肌層分層界限不清、非外層最厚。","C":"懷孕時肌層平滑肌肥大且增生—正解。","D":"子宮頸以結締組織為主、平滑肌少於子宮體。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109020-38":{"quick":"平滑肌的細絲與中間絲固著於緻密體(dense body)。","detail":{"background":"平滑肌的收縮支架:「緻密體(dense body)」(含α-actinin,相當於骨骼肌Z線的對應物)散布於胞質、並錨定於細胞膜的『緻密斑』,是「細肌絲(thin/actin filament)與中間絲(desmin、vimentin)的共同固著點」;收縮時myosin拉動actin、力經緻密體傳至細胞膜使細胞縮短、核呈螺旋狀。故細絲與中間絲固著於緻密體。平滑肌無橫紋(肌絲不規則排列)、無T小管、無肌節。故D正確。","options":{"A":"胞飲小泡與物質攝取有關,非肌絲固著點。","B":"平滑肌無T小管。","C":"小凹(caveolae)參與鈣訊號,非肌絲固著點。","D":"緻密體為細絲與中間絲固著點—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109100-37":{"quick":"骨骼肌的一個肌細胞即「肌纖維(muscle fiber)」。","detail":{"background":"骨骼肌的層級命名:整條肌肉→肌束(fascicle)→「肌纖維(muscle fiber)=一個骨骼肌細胞(多核、長圓柱、胚胎期肌母細胞融合而成)」→肌原纖維(myofibril,胞內收縮單位束)→肌絲(myofilament,actin細肌絲/myosin粗肌絲)→肌節(sarcomere,Z線間)。故一個肌細胞即肌纖維。記憶:fiber=細胞、fibril=胞內纖維束、filament=分子層級肌絲、fascicle=一束細胞。骨骼肌核位周邊;再生靠衛星細胞。","options":{"A":"肌原纖維為胞內收縮纖維束(非整個細胞)。","B":"肌纖維即一個肌細胞—正解。","C":"肌絲為分子層級的actin/myosin。","D":"肌束為多條肌纖維的集合。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109100-38":{"quick":"平滑肌為『單核』,故「多核」不是其特徵。","detail":{"background":"平滑肌細胞特徵:梭形、『單一中央核(收縮時核呈螺旋/波浪狀變形)』、有緻密體、有細胞膜小凹(caveolae,參與鈣訊號)、外覆外板、細胞間以間隙接合電耦合、無橫紋無T小管。而「多核」是『骨骼肌』的特徵(肌母細胞融合);心肌多為單核或雙核並有間盤。故不是平滑肌特徵者為「多核」。臨床:平滑肌(子宮肌瘤、平滑肌肉瘤)、可再生與肥大增生。","options":{"A":"緻密體為平滑肌特徵。","B":"細胞膜小凹為平滑肌特徵。","C":"核隨收縮變形為平滑肌特徵。","D":"多核為骨骼肌特徵、非平滑肌—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-37":{"quick":"運動終板在肌梭『外』(支配普通肌纖維),不在肌梭內鞘內。","detail":{"background":"肌梭(muscle spindle)是『本體感覺受器』:由結締組織內鞘(internal capsule)包覆數條特化的「梭內肌纖維(intrafusal fiber)」—含『核袋纖維(nuclear bag)』與『核鏈纖維(nuclear chain)』,其中段被「環螺旋(annulospiral/Ia)末梢」纏繞感測『肌肉長度與牽張』,γ運動神經支配其兩端。而「運動終板(motor end plate)」是α運動神經與『梭外普通肌纖維(extrafusal)』的神經肌肉接合處—『不在肌梭內鞘內』。故不包含者為運動終板。臨床:肌梭為深部肌腱反射(牽張反射)的感受器。","options":{"A":"運動終板支配梭外肌纖維、不在肌梭內—正解。","B":"環螺旋末梢纏繞梭內纖維中段、在內鞘內。","C":"核鏈纖維為梭內纖維、在內鞘內。","D":"核袋纖維為梭內纖維、在內鞘內。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114090-38":{"quick":"骨骼肌的三聯體位於A帶與I帶交接處(A-I junction)。","detail":{"background":"骨骼肌興奮收縮偶聯:細胞膜(肌纖維膜)內凹成「T小管」傳遞動作電位入細胞深部;肌漿網(SR)兩端膨大為「終池(terminal cisternae)」儲鈣。「『一條T小管』夾在『兩個終池』之間=『三聯體(triad)』」,位於『A帶與I帶交接處(A-I junction)』,每肌節有兩個三聯體。故D正確。比較錯誤:A骨骼肌細胞間『無間隙接合』(各自獨立、由神經個別支配;心肌才有間盤間隙接合);B終池是『肌漿網』的膨大(非細胞膜內凹—那是T小管);C三聯體是『兩終池+一T小管』(非一終池+兩T小管;後者『二聯體』見於心肌)。故D正確。","options":{"A":"骨骼肌細胞間無間隙接合(各自獨立)。","B":"終池為肌漿網膨大(非細胞膜內凹)。","C":"三聯體=一T小管+兩終池(非一終池+兩T小管)。","D":"三聯體位於A-I交接處—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_115020-38":{"quick":"心肌間盤含黏連接合、橋粒與間隙接合,『不含』緊密接合。","detail":{"background":"心肌間盤(intercalated disc)是相鄰心肌細胞端對端的特化接合,含三種接合:橫向部分有「筋膜黏著/黏連接合(fascia adherens,錨定actin細肌絲、傳收縮力)」與「橋粒(desmosome,錨定中間絲desmin、抗拉)」;縱向部分有「間隙接合(gap junction,connexin43,使離子流通、心肌電耦合同步收縮)」。『不含緊密接合(tight junction)』。故不包括者為緊密接合。臨床:橋粒蛋白基因突變→致心律不整性右室心肌病(ARVC);間隙接合重塑與心律不整有關。","options":{"A":"黏連接合(fascia adherens)為間盤組成。","B":"橋粒為間盤組成。","C":"緊密接合不在心肌間盤—正解。","D":"間隙接合為間盤組成(電耦合)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_106100-36":{"quick":"小腦源自『後腦/菱腦』,非前腦,故此配對錯誤。","detail":{"background":"三腦泡→五腦泡與成體腦區:前腦(prosencephalon)→端腦(大腦半球、紋狀體)+間腦(『視丘、下視丘』);中腦(mesencephalon)→中腦(『頂蓋tectum=四疊體』、大腦腳);菱腦/後腦(rhombencephalon)→後腦(metencephalon:『橋腦+小腦』)+髓腦(延腦)。故「小腦源自前腦」配對『錯誤』(小腦實源自後腦/菱腦)。其餘:橋腦-後腦✓、視丘-前腦✓、頂蓋-中腦✓皆正確。記憶:小腦與橋腦同屬metencephalon。","options":{"A":"橋腦源自後腦,配對正確。","B":"稱小腦源自前腦—錯誤(實源自後腦/菱腦),為正解。","C":"視丘源自前腦(間腦),正確。","D":"頂蓋源自中腦,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_106100-37":{"quick":"成人CNS最常見的原發腫瘤源自星狀膠細胞(astrocyte)。","detail":{"background":"成人中樞神經系統「原發性腫瘤」以『神經膠瘤(glioma)』為主,其中又以「星狀膠細胞瘤(astrocytoma),尤其最惡性的膠質母細胞瘤(glioblastoma)最常見」—星狀膠細胞數量多、終生具增殖潛能,故最易癌變。神經元(神經母細胞瘤好發於兒童周邊交感)在成人CNS少見原發瘤;淋巴細胞(原發CNS淋巴瘤)較少;寡突膠瘤(oligodendroglioma)較星狀膠瘤少見。故成人CNS最常見原發瘤源自纖維性星狀膠細胞。(整體成人顱內腫瘤含轉移瘤與腦膜瘤,但『原發神經實質』以膠質瘤居首。)","options":{"A":"神經母細胞瘤好發兒童周邊,非成人CNS主流。","B":"CNS原發淋巴瘤較少。","C":"星狀膠細胞瘤(膠母細胞瘤)最常見—正解。","D":"寡突膠瘤較星狀膠瘤少見。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_107100-40":{"quick":"硬腦膜下腔(subdural space)不含腦脊髓液。","detail":{"background":"腦脊髓液(CSF)由腦室脈絡叢產生,循環於腦室系統與「蜘蛛膜下腔(subarachnoid space,含其膨大的『大池cisterna magna』等腦池)」與脊髓中央管,經蜘蛛膜顆粒吸收入靜脈竇。故含CSF者為:腦室、中央管、蜘蛛膜下腔(含大池)。而「硬腦膜下腔(subdural space)」是硬膜與蜘蛛膜之間的『潛在腔隙』,正常不含CSF(出血時形成硬膜下血腫)。故不含CSF者為硬腦膜下腔。臨床:腰椎穿刺取CSF於蜘蛛膜下腔(L3-4以下);硬膜下出血為橋靜脈撕裂(老人/酗酒)。","options":{"A":"大池為蜘蛛膜下腔膨大、含CSF。","B":"硬腦膜下腔為潛在腔、不含CSF—正解。","C":"蜘蛛膜下腔含CSF。","D":"脊髓中央管含CSF。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_107100-44":{"quick":"嗅覺上皮無杯狀細胞(其黏液由鮑曼氏腺提供)。","detail":{"background":"鼻腔嗅覺上皮(olfactory epithelium)為『偽複層柱狀』,含三種細胞:「嗅覺受器細胞(雙極神經元,其軸突組成嗅神經CN I)」、「支持/支撐細胞(sustentacular cell)」、「基底細胞(basal cell,幹細胞,可再生嗅神經元)」;其下固有層有『鮑曼氏腺(Bowman gland)』分泌漿液溶解氣味分子。嗅上皮『沒有杯狀細胞』(黏液由鮑曼氏腺供應,非杯狀細胞)。故不具者為杯狀細胞。臨床:嗅神經元是少數可終生再生的神經元(基底細胞為幹細胞)。","options":{"A":"嗅覺受器為雙極神經元,存在。","B":"嗅上皮無杯狀細胞(黏液由鮑曼氏腺)—正解。","C":"基底細胞(幹細胞)存在。","D":"支持細胞存在。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_107100-47":{"quick":"辨別紅、綠色的錐細胞基因皆位於X染色體且位置相近。","detail":{"background":"人類彩色視覺由三種錐細胞(S藍/M綠/L紅)構成「三原色=紅、綠、藍」。辨別『紅(L)與綠(M)』的視蛋白基因『相鄰位於X染色體』,序列相近易發生不等交換而出錯—故D正確,也解釋『紅綠色盲為X性聯隱性』、『男性(XY)發生率遠高於女性(約8% vs 0.5%,非1:1)』。比較錯誤:A『M錐』主吸收綠光(L錐才吸紅光);B三原色是紅綠『藍』(非黃);C男女色盲比率非1:1(男遠多)。故D正確。","options":{"A":"M錐主吸收綠光(非紅光)。","B":"三原色為紅綠藍(非黃)。","C":"男性色盲遠多於女性(非1:1)。","D":"紅綠錐基因皆在X染色體且相近—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_108030-40":{"quick":"CNS的髓鞘碎片清除主要由『微膠細胞』負責,非寡突膠細胞。","detail":{"background":"神經損傷反應:軸突受傷後其『遠端』因失去胞體供養而「順行性(華勒氏)退化(anterograde/Wallerian degeneration)」;胞體則出現「染色質溶解(chromatolysis,尼氏小體分散消失、核偏位)」。清除髓鞘與軸突碎片:『周邊神經(PNS)』由許旺細胞去分化加上『單核球衍生巨噬細胞』吞噬、並形成Büngner帶引導『可再生』;『中樞(CNS)』則主要由「微膠細胞(microglia,CNS常駐巨噬細胞)」清除,且寡突膠細胞與抑制性環境使CNS『再生差』。故D稱「CNS由寡突膠細胞負責髓鞘分解清除」錯誤(應為微膠細胞)。","options":{"A":"遠端軸突順行性(華勒氏)退化,正確。","B":"染色質溶解(尼氏小體消失),正確。","C":"PNS有單核球衍生巨噬細胞聚集,正確。","D":"稱CNS由寡突膠細胞清除髓鞘—錯誤(應為微膠細胞),為正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_108100-40":{"quick":"寡突膠細胞如同PNS的許旺細胞,負責CNS髓鞘形成。","detail":{"background":"CNS四種神經膠細胞:「寡突膠細胞(oligodendrocyte)」形成CNS髓鞘—『類似PNS的許旺細胞』,但一個寡突膠可包覆『多條』軸突(許旺細胞僅包一段一條)—故A正確;「星狀膠細胞(astrocyte)」星形多突、支持並參與血腦屏障與離子緩衝(非立方上皮);「室管膜細胞(ependymal cell)」是襯於腦室/中央管的『立方/柱狀纖毛上皮』(非分支吞噬);「微膠細胞(microglia)」是CNS常駐免疫吞噬細胞(分支可接觸血管,但非灰質中數目最多—星狀膠較多)。故A正確。","options":{"A":"寡突膠細胞如許旺細胞、形成CNS髓鞘—正解。","B":"襯腦室中央管的立方上皮為室管膜細胞(非星狀膠)。","C":"微膠細胞非灰質中最多(星狀膠較多)。","D":"分支吞噬免疫者為微膠細胞(非室管膜)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_109020-40":{"quick":"神經內膜的膠原主要由『許旺細胞』合成,非纖維母細胞。","detail":{"background":"周邊神經三層鞘:「神經外膜(epineurium)」=包整條神經的緻密結締組織(含滋養血管)—D正確;「神經束膜(perineurium)」=包神經束的扁平『神經束膜細胞』、其間『緊密接合』構成『血-神經屏障』—B、C正確;「神經內膜(endoneurium)」=包單條神經纖維的疏鬆結締組織,其『膠原主要由許旺細胞(Schwann cell)合成』(非纖維母細胞)。故A「神經內膜膠原大部分由纖維母細胞合成」錯誤。臨床:血-神經屏障保護軸突;束膜屏障破壞與發炎性神經病變相關。","options":{"A":"稱神經內膜膠原由纖維母細胞合成—錯誤(主由許旺細胞),為正解。","B":"神經束膜由扁平束膜細胞構成,正確。","C":"束膜細胞緊密接合形成血-神經屏障,正確。","D":"神經外膜為緻密結締組織,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_109100-40":{"quick":"大腦並非唯一具血腦屏障的腦區,故此敘述錯誤。","detail":{"background":"血腦屏障(BBB)由「連續型微血管的內皮細胞間『緊密接合』」為核心,加上『星狀膠細胞足突』與周細胞、基底膜共同維持—限制物質自由進入腦實質(A、B、D正確)。BBB『廣泛存在於整個中樞神經系統(大腦、小腦、腦幹、脊髓)』,並非『大腦唯一』(C錯誤);反而有少數『缺乏BBB』的「室周器官(circumventricular organs,如最後區、神經垂體、松果體)」以利感測血液成分或分泌激素。故C「大腦是唯一具BBB的腦組織」錯誤。臨床:BBB限制藥物入腦;發炎/腫瘤破壞BBB→腦水腫、顯影劑滲漏強化。","options":{"A":"BBB含星狀膠與連續型微血管,正確。","B":"內皮間緊密接合,正確。","C":"稱大腦為唯一具BBB腦區—錯誤(全CNS皆有),為正解。","D":"星狀膠有助維持BBB,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_111020-40":{"quick":"CNS的無髓鞘軸突外『沒有結締組織』(裸露於神經氈中)。","detail":{"background":"中樞與周邊『無髓鞘軸突』差異大:在『周邊(PNS)』,無髓鞘軸突仍被許旺細胞胞質包繞(數條共擠一個許旺細胞=Remak束)、外有基底層;但在『中樞(CNS)』,無髓鞘軸突『裸露走行於神經氈(neuropil)中,並非被神經膠突起個別包埋、無支持細胞個別包繞、無基底層、外亦無結締組織(CNS內無膠原結締組織鞘)』。故D「無髓鞘軸突外沒有結締組織」正確;A、B、C皆為PNS或錯誤描述。CNS缺結締組織鞘亦是其損傷再生差的因素之一。","options":{"A":"CNS無髓鞘軸突非個別包埋於膠細胞突起。","B":"個別被支持細胞包繞為PNS(Remak)特徵。","C":"CNS軸突無基底層。","D":"CNS無髓鞘軸突外無結締組織—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_112020-40":{"quick":"許旺細胞包圍無髓鞘纖維但不形成髓鞘(Remak束)。","detail":{"background":"許旺細胞(Schwann cell)是『周邊神經系統(PNS)』的神經膠細胞(非CNS)—A錯。它對『有髓鞘纖維』一個許旺細胞包一段軸突形成髓鞘;對『無髓鞘纖維』則『以胞質包繞數條軸突但不纏繞成髓鞘(Remak bundle)』—故B正確。「蘭氏結(node of Ranvier)」是相鄰許旺細胞間『無髓鞘的裸露間隙』(離子通道密集、跳躍式傳導處)—C說成有髓鞘包圍是錯;「Schmidt-Lanterman切跡」是髓鞘內『殘留許旺細胞胞質』的螺旋通道—D說不含胞質是錯。故B正確。","options":{"A":"許旺細胞屬PNS(非CNS)。","B":"無髓鞘纖維被許旺細胞包圍但不形成髓鞘—正解。","C":"蘭氏結為無髓鞘裸露間隙(非有髓鞘處)。","D":"Schmidt-Lanterman切跡含許旺細胞胞質。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_113020-40":{"quick":"衛星細胞圍繞PNS神經節的神經元胞體、不形成髓鞘。","detail":{"background":"「衛星細胞(satellite cell)」是『周邊神經節(背根節、自主神經節)』內、圍繞『神經元胞體』的小型扁平神經膠細胞(非柱狀、非多核)—提供支持、絕緣與代謝環境調控,但『不形成髓鞘』(髓鞘由許旺細胞/寡突膠形成)。故D正確;A錯(衛星細胞在PNS神經節、非圍繞CNS神經元),B、C錯(小型扁平、單核)。注意此「衛星細胞」與骨骼肌的「衛星細胞(肌幹細胞)」同名異物。","options":{"A":"衛星細胞圍繞PNS神經節胞體(非CNS神經元)。","B":"為小型扁平細胞(非大型柱狀)。","C":"為單核(非多核)。","D":"不形成髓磷脂—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_114020-41":{"quick":"嗅球(及嗅上皮、海馬齒狀回)為成體仍有神經新生之處。","detail":{"background":"成體神經新生(adult neurogenesis)極為有限,主要見於兩處:側腦室『腦室下區(SVZ)』的神經幹細胞遷移至「嗅球(olfactory bulb)」補充中間神經元;以及海馬『齒狀回顆粒下區(SGZ)』。故成年後受損仍可由幹細胞再生者為嗅球。相對地,腦幹、脊髓灰質、背根神經節的神經元『成年後幾乎不再生』(損傷後難恢復)。臨床基礎:此也呼應嗅上皮基底細胞可持續再生嗅神經元的特性。","options":{"A":"腦幹神經元成年不再生。","B":"脊髓灰質神經元成年不再生。","C":"嗅球為成體神經新生之處—正解。","D":"背根神經節神經元成年不再生。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_114090-41":{"quick":"交感神經節的節後神經元多為多極型(multipolar)。","detail":{"background":"神經元依突起數分:「多極型(multipolar,多樹突+一軸突)」最常見—運動神經元、CNS大多數神經元、『自主神經節(交感/副交感)的節後神經元』皆屬之;「雙極型(bipolar)」見於視網膜雙極細胞、嗅覺、內耳前庭與耳蝸(螺旋)神經節;「偽單極(pseudounipolar)」見於『背根神經節與三叉神經節的感覺神經元』。故交感神經節神經元多為多極型。臨床:自主神經節是節前(CNS)與節後(效應器)神經元換元處。","options":{"A":"交感神經節神經元多為多極型—正解。","B":"雙極型見於視網膜/嗅/內耳。","C":"偽單極見於背根/三叉感覺節。","D":"非偽單極與雙極混合。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_115020-41":{"quick":"視網膜神經節細胞層的神經元為『多極型』,不屬雙極神經元。","detail":{"background":"雙極神經元(一樹突+一軸突)分布於特殊感覺通路:「內耳前庭神經節、柯蒂氏螺旋(耳蝸)神經節」(聽覺平衡)、「嗅覺上皮的嗅受器細胞」、「視網膜的『雙極細胞』」。但題問『視網膜的神經節細胞層(ganglion cell layer)』—其『神經節細胞是多極型』神經元(樹突接收雙極細胞訊號、軸突匯成視神經),『不屬雙極神經元』。故D為正解(不屬雙極)。注意區分:視網膜內的『雙極細胞』是雙極;『神經節細胞』是多極—題目問的是後者。","options":{"A":"前庭神經節為雙極神經元。","B":"嗅覺上皮受器為雙極神經元。","C":"螺旋(耳蝸)神經節為雙極神經元。","D":"視網膜神經節細胞為多極型、不屬雙極—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Snell臨床神經解剖"]}},"med1_106100-40":{"quick":"派亞氏斑是黏膜淋巴球聚集形成的構造(GALT)。","detail":{"background":"派亞氏斑(Peyer’s patch)是『迴腸黏膜與黏膜下層』內、多個淋巴小結聚集形成的「黏膜相關淋巴組織(MALT/GALT)」—由大量『淋巴球』(B細胞為主的生發中心+周邊T細胞區)聚集構成,表面覆有特化的『M細胞』可攝取腸腔抗原呈遞給下方免疫細胞,啟動黏膜免疫(分泌型IgA)。故其特徵為淋巴球聚集。臨床:傷寒桿菌侵犯派亞氏斑可致腸出血/穿孔;迴腸末端派亞氏斑最密集。","options":{"A":"非微血管聚集。","B":"非內分泌細胞聚集。","C":"為淋巴球聚集形成(GALT)—正解。","D":"非神經細胞聚集。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_107100-41":{"quick":"動脈粥狀硬化斑塊的特徵是內膜(intima)平滑肌增生與脂質堆積。","detail":{"background":"動脈粥狀硬化(atherosclerosis)的病理核心發生在『血管內膜(tunica intima)』:內皮受損→LDL進入並氧化、單核球進入吞脂成『泡沫細胞』、『中膜平滑肌細胞遷移至內膜並增生』、分泌膠原形成纖維帽,中央為脂質與壞死核心(粥狀)。故斑塊以『內膜增厚、平滑肌增生與脂質堆積』為特徵(A正確)。並非中膜彈性板增多(B)、非外膜顯著增厚(C)、也非三層均勻增生(D—主要在內膜)。臨床:斑塊破裂→血栓→心肌梗塞/腦中風;危險因子LDL、抽菸、高血壓、糖尿病。","options":{"A":"內膜平滑肌增生(自中膜遷入)—正解。","B":"非中膜彈性板增多。","C":"非外膜顯著變厚。","D":"病變主要在內膜,非三層均勻增生。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108030-41":{"quick":"胸腺無淋巴小結(無生發中心);其皮質髓質為瀰漫淋巴組織。","detail":{"background":"淋巴小結(lymphatic nodule,含生發中心)是『B細胞』增殖反應之處,見於『脾(白髓)、淋巴結(皮質)、扁桃體、派亞氏斑/MALT、闌尾』等。而「胸腺(thymus)」是『T細胞成熟的初級淋巴器官』,以皮質(密集胸腺細胞)與髓質(含哈氏小體Hassall corpuscle)構成『瀰漫淋巴組織』,『沒有淋巴小結/生發中心』(因無B細胞增殖反應)。故不具淋巴小結者為胸腺。臨床:胸腺青春期後退化;重症肌無力與胸腺增生/胸腺瘤相關。","options":{"A":"胸腺無淋巴小結(T細胞初級器官)—正解。","B":"脾白髓含淋巴小結。","C":"小腸有派亞氏斑等淋巴小結。","D":"扁桃體含淋巴小結。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109100-41":{"quick":"淋巴微管基底膜『不完整』且無瓣膜(瓣膜在較大淋巴管),故此敘述錯誤。","detail":{"background":"淋巴微管(lymphatic capillary)特性:以『盲端』起始於組織間隙(A正確)、管壁由『單層內皮』構成、『基底膜不完整或缺如』且內皮細胞重疊成單向活瓣、以錨絲固定—使其『通透性大於血微血管』,可吸收大分子、蛋白與多餘組織液(B、C正確)。故D「具完整基底膜與瓣膜」錯誤—淋巴『微管』基底膜不完整、瓣膜(防逆流)出現在『較大的集合淋巴管』而非微管。淋巴液最終經胸管/右淋巴管入靜脈。臨床:淋巴管阻塞(絲蟲、術後)→淋巴水腫。","options":{"A":"淋巴管以盲端微管起始,正確。","B":"淋巴微管通透性大於血微血管,正確。","C":"主要由內皮細胞構成,正確。","D":"稱具完整基底膜與瓣膜—錯誤(基底膜不完整、瓣膜在較大淋巴管),為正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_110020-41":{"quick":"淋巴在淋巴結中:輸入管→被膜下竇→小樑竇→髓質竇→輸出管(1→3→5→4→2)。","detail":{"background":"淋巴流經淋巴結的路徑:多條「輸入淋巴管(1, afferent)」自凸側穿被膜進入→「被膜下(邊緣)竇(3, subcapsular sinus)」→沿小樑下行的「小樑竇(5, trabecular/cortical sinus)」→深部「髓質竇(4, medullary sinus)」→於凹側『門部』匯入單條「輸出淋巴管(2, efferent)」離開。故順序為1→3→5→4→2。沿途淋巴流經富含巨噬細胞與淋巴球的網狀組織,被過濾並接觸抗原啟動免疫反應(B細胞於皮質生發中心、T細胞於副皮質、漿細胞於髓索)。","options":{"A":"15342順序不符竇的解剖層次。","B":"13542(輸入→被膜下→小樑→髓質→輸出)—正解。","C":"14532順序錯誤。","D":"14352順序錯誤。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111020-41":{"quick":"下腔靜脈外膜比中膜厚,且外膜含大量縱走平滑肌束。","detail":{"background":"大靜脈(如下腔靜脈、門靜脈)的管壁特徵與大動脈不同:中膜平滑肌相對少,而『外膜(tunica adventitia)最厚、且含大量「縱走排列的平滑肌束」』(協助回流)—故C正確。比較錯誤:A顯著的內/外彈性膜是『肌肉型動脈』特徵(靜脈不明顯);B平滑肌不只在中膜,『外膜也有大量縱走平滑肌』;D中膜平滑肌多為環走、外膜為縱走,『排列方向不同』。故C正確。臨床:靜脈壁薄、壓力低、有瓣膜防逆流;靜脈曲張與瓣膜功能不全有關。","options":{"A":"顯著內外彈性膜為肌肉型動脈特徵(非大靜脈)。","B":"平滑肌不只在中膜(外膜亦有縱走束)。","C":"外膜厚於中膜、含縱走平滑肌束—正解。","D":"中膜(環走)與外膜(縱走)排列方向不同。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111020-45":{"quick":"三級絨毛(tertiary villi)的結締組織內出現胎兒血管。","detail":{"background":"胎盤絨毛的發育三階段:「初級絨毛(primary)」=僅『細胞滋養層核心外覆合體滋養層』(無結締組織);「次級絨毛(secondary)」=核心長入『胚外中胚層結締組織』(尚無血管),此期絨毛已『環覆整個絨毛膜囊』;「三級絨毛(tertiary)」=結締組織核心內『出現胎兒血管(臍血管分支)』,確立母胎物質交換。故C正確。比較:A初級絨毛無結締組織;B次級絨毛覆蓋整個絨毛膜囊(後絨毛膜光滑面退化、僅基底側叢密絨毛成胎盤);D次級/三級絨毛最外層始終為『合體滋養層』(非細胞滋養層)。故C正確。","options":{"A":"初級絨毛無結締組織(僅滋養層)。","B":"次級絨毛覆蓋整個絨毛膜囊(非僅部分)。","C":"三級絨毛結締組織內出現血管—正解。","D":"絨毛最外層為合體滋養層(非細胞滋養層)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-41":{"quick":"小動脈與小靜脈的內膜均為單層內皮細胞。","detail":{"background":"微循環血管的共通與差異:小動脈(arteriole)與小靜脈(venule)『內膜皆為單層內皮(襯於管腔)』—A正確。差異在於:小動脈中膜有『1–2層平滑肌(非骨骼肌)』、無明顯彈性板(B、C錯—彈性板是較大動脈特徵);『微血管前括約肌』由『後微動脈(metarteriole)末端的平滑肌』形成、調控血液進入微血管床—『非小動脈與小靜脈兩者皆有』(小靜脈端為收集端、無前括約肌)(D錯)。故A正確。小靜脈(尤其後微血管小靜脈)是白血球滲出與發炎滲漏的主要部位。","options":{"A":"小動脈與小靜脈內膜皆為單層內皮—正解。","B":"為平滑肌(非骨骼肌)、小靜脈亦無數層彈性板。","C":"顯著彈性內膜為較大動脈特徵。","D":"微血管前括約肌在後微動脈端,非兩者皆有。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114020-42":{"quick":"連續型微血管見於肌肉與中樞神經(血腦屏障)等處。","detail":{"background":"微血管(capillary)管壁僅『單層內皮+基底膜(+周細胞)』,『無中膜外膜』(故A錯—微血管非三層結構)、『有基底板/基底膜』(B錯)。依內皮結構分三型:「連續型(continuous)」內皮完整無孔、有完整基底膜—見於『肌肉、中樞神經(構成血腦屏障)、肺、皮膚、結締組織』(D正確);「窗孔型(fenestrated)」內皮有小孔—見於腎絲球、腸黏膜、內分泌腺;「竇狀(sinusoidal/discontinuous)」內皮有大間隙—見於肝、脾、骨髓。故C(連續型有孔)錯。故D正確。","options":{"A":"微血管僅單層內皮+基底膜,非三層結構。","B":"連續型微血管有完整基底板。","C":"有孔者為窗孔型(連續型無孔)。","D":"連續型見於肌肉與中樞神經—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_115020-42":{"quick":"脾以開放式循環,紅血球經有鞘微血管入脾索(紅髓)。","detail":{"background":"脾臟(最大淋巴器官)的循環與構造:『無輸入淋巴管』(僅有輸出淋巴管,不像淋巴結過濾淋巴—故A錯,脾過濾『血液』);「白髓(white pulp)」是圍繞『中央動脈』的淋巴鞘(PALS,T區)與淋巴小結(B區),『紅髓』則由脾索與脾竇構成(B把紅白髓敘述顛倒—錯);高內皮小靜脈(HEV)是『淋巴結』淋巴球歸巢處、非脾(C錯)。脾循環多為「開放式」:血經中央動脈→筆毛動脈→『有鞘微血管』開口『直接注入脾索(紅髓)』,血球再擠過脾竇內皮間隙回流—老化/異常紅血球在此被巨噬細胞清除。故D正確。","options":{"A":"脾無輸入淋巴管、過濾血液(非淋巴)。","B":"紅白髓敘述顛倒(中央動脈淋巴鞘屬白髓)。","C":"高內皮小靜脈在淋巴結(非脾)。","D":"紅血球經有鞘微血管以開放式循環入脾索—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_106100-43":{"quick":"肺泡巨噬細胞無法有效分解結核桿菌(其蠟質壁與抑制吞噬體成熟使菌存活),故此敘述錯誤。","detail":{"background":"呼吸系統病理:A囊腫性纖維化(CFTR氯離子通道缺陷→黏液濃稠、阻塞、反覆感染)為好發兒童青年的遺傳性慢性阻塞性疾病,正確;C肺氣腫=終末細支氣管以遠的氣腔『永久性擴大伴壁破壞』,正確;D慢性支氣管炎/支氣管擴張時呼吸上皮可『鱗狀化生』成複層扁平,正確。B『肺泡巨噬細胞可吞噬並分解結核桿菌』錯誤—結核桿菌雖被吞噬,但其『分枝菌酸蠟質細胞壁與抑制吞噬體-溶酶體融合』的能力使它『能在巨噬細胞內存活增殖』(故形成肉芽腫/乾酪壞死、潛伏感染),並非被有效分解。故B為正解。","options":{"A":"CF為兒童青年遺傳性慢性阻塞疾病,正確。","B":"稱肺泡巨噬細胞能分解結核桿菌—錯誤(結核菌可在其內存活),為正解。","C":"肺氣腫=終末細支氣管以遠氣腔永久擴大伴壁破壞,正確。","D":"慢性支氣管炎/支擴可致呼吸上皮鱗狀化生,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-41":{"quick":"氣管與支氣管壁都含彈性纖維。","detail":{"background":"氣管與支氣管的管壁比較:兩者『都含彈性纖維』(維持回彈)—A正確。差異:上皮高度隨氣道變細而『遞減』(氣管較高的偽複層柱狀→小支氣管漸矮),非高度相同(B錯);軟骨方面氣管為『C形透明軟骨環』、支氣管為『不規則透明軟骨片』,皆為『透明軟骨(非纖維軟骨)』(C錯);兩者壁內『都有平滑肌』(支氣管的平滑肌呈螺旋環繞、氣管後壁有氣管肌)(D錯)。故A正確。隨氣道變小:軟骨減少消失、平滑肌相對增多、杯狀與纖毛漸少。","options":{"A":"氣管與支氣管都有彈性纖維—正解。","B":"上皮高度隨氣道變細遞減(非相同)。","C":"軟骨皆為透明軟骨(非纖維軟骨)。","D":"兩者皆有平滑肌(非都沒有)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109020-41":{"quick":"第一型肺泡細胞為極薄扁平細胞,與內皮共組氣血屏障。","detail":{"background":"第一型肺泡細胞(type I pneumocyte):『極薄的單層扁平細胞』,覆蓋約『95%肺泡表面』(數量約占肺泡細胞40%),與『微血管內皮細胞及其融合的基底膜』共同組成『氣血屏障(air-blood barrier)』供O₂/CO₂擴散—故C正確。比較錯誤:A層狀體(lamellar body,儲存表面張力素)在『第二型』肺泡細胞;B吞噬灰塵紅血球者為『肺泡巨噬細胞(塵細胞/心衰細胞)』;D數量與覆蓋比例敘述應為『第二型占約60%數量但僅覆蓋5%表面』(第一型相反:占40%卻覆蓋95%)。故C正確。","options":{"A":"層狀體在第二型肺泡細胞。","B":"吞噬灰塵紅血球者為肺泡巨噬細胞。","C":"第一型與內皮組成氣血屏障—正解。","D":"第一型覆蓋約95%表面(占約40%數量),比例敘述顛倒。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_112020-41":{"quick":"終末細支氣管上皮『無杯狀細胞』(由Club細胞取代),故此比較錯誤。","detail":{"background":"支氣管(bronchus)與終末細支氣管(terminal bronchiole)比較:兩者皆有『平滑肌』(細支氣管平滑肌相對更明顯)、皆有『彈性纖維』、皆屬『傳導部、無氣體交換』(A、C、D正確)。差異在上皮:支氣管為帶纖毛偽複層柱狀『含杯狀細胞』;但『終末細支氣管上皮已無杯狀細胞與軟骨』,由『單層柱狀/立方,含無纖毛的Club細胞(克拉拉細胞,分泌保護性蛋白、解毒)』取代。故B「上皮均具杯狀細胞」錯誤(終末細支氣管無杯狀細胞)。臨床:細支氣管無杯狀細胞與軟骨,易因平滑肌痙攣與發炎而阻塞(氣喘)。","options":{"A":"兩者皆有平滑肌,正確。","B":"稱兩者上皮均有杯狀細胞—錯誤(終末細支氣管無杯狀細胞),為正解。","C":"兩者皆有彈性纖維,正確。","D":"兩者皆屬傳導部、無氣體交換,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-41":{"quick":"第二型肺泡細胞分泌表面張力素(surfactant)。","detail":{"background":"第二型肺泡細胞(type II pneumocyte):立方狀、頂部有微絨毛、胞內含『層狀體(lamellar body)』儲存並分泌『表面張力素(surfactant,降低肺泡表面張力、防呼氣時塌陷)』—故C正確。它『數量約占60%但僅覆蓋5%表面』、兼為肺泡上皮的『幹細胞(損傷後增生修復、可分化為第一型)』。比較錯誤:A數量覆蓋寫成第一型的數值(顛倒);B氣血屏障由『第一型』與內皮組成(非第二型+巨噬細胞);D『很薄扁平』是第一型(第二型為立方狀)。故C正確。臨床:早產兒第二型不成熟、surfactant不足→新生兒呼吸窘迫(RDS)。","options":{"A":"數量/覆蓋比例為第一型數值(顛倒)。","B":"氣血屏障由第一型與內皮組成(非第二型)。","C":"第二型分泌表面張力素—正解。","D":"扁平薄者為第一型(第二型為立方)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114090-42":{"quick":"嗅覺上皮無杯狀細胞(黏液由鮑曼氏腺提供)。","detail":{"background":"嗅覺上皮(olfactory epithelium)為偽複層柱狀,含:「嗅覺受器細胞(雙極神經元)」、「支持/支撐細胞(supporting cell)」、「基底細胞(basal cell,幹細胞)」,亦有少量「刷細胞(brush cell,具微絨毛、可能司感覺)」。其下固有層的『鮑曼氏腺』分泌漿液溶解氣味分子。嗅上皮『沒有杯狀細胞』(與呼吸上皮不同;黏液來自鮑曼氏腺而非杯狀細胞)。故最不可能出現者為杯狀細胞。臨床:嗅受器(雙極神經元)與基底幹細胞使嗅覺具再生力。","options":{"A":"支持細胞為嗅上皮成分。","B":"基底細胞(幹細胞)為嗅上皮成分。","C":"刷細胞可見於嗅/呼吸上皮。","D":"杯狀細胞最不可能出現於嗅上皮—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_106100-41":{"quick":"壁細胞不在胞質內「合成」鹽酸;HCl是在分泌小管膜以H⁺與Cl⁻組裝分泌,故此敘述錯誤。","detail":{"background":"壁細胞(parietal/oxyntic cell)位於胃底腺,圓形嗜伊紅、富含粒線體;有「胞內小管系統(intracellular canaliculi)」與微絨毛(刺激時質子幫浦H⁺/K⁺-ATPase插入此膜大量分泌)。它分泌『鹽酸(HCl)』與『內在因子(intrinsic factor,助迴腸吸收維生素B12)』。但HCl並非「在胞質內合成的分子」—而是碳酸酐酶產生H⁺由質子幫浦泵入小管腔,Cl⁻經通道進入,兩者『在分泌小管膜處組合成HCl』。故C「可在胞質內合成鹽酸」錯誤。臨床:自體免疫破壞壁細胞→內在因子缺乏→惡性貧血;PPI抑制質子幫浦。","options":{"A":"具胞內小管與微絨毛,正確。","B":"壁細胞不存在於賁門(賁門腺以黏液細胞為主),正確。","C":"稱胞質內合成HCl—錯誤(於分泌小管膜組裝),為正解。","D":"分泌HCl與內在因子助B12吸收,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_106100-42":{"quick":"肝小葉第一區(近肝門)血氧最佳,故最先再生、最後壞死(非最先死亡),敘述錯誤。","detail":{"background":"肝腺泡(acinus)依血流分三區:「第一區(zone 1,近肝門三合體)」血氧與營養『最佳』—故對缺血最耐受、『最後壞死、最先再生』,但對血源性毒物與膽汁淤滯『最先反應』;「第三區(zone 3,近中央靜脈)」血氧最差—『最先壞死(缺血)』、對毒物(如對乙醯氨基酚)代謝損傷敏感。故C「血流不良時第一區最先死亡且最後再生」錯誤(應為第三區最先壞死;第一區最耐缺血)。A、B(脂蛋白合成:脂質由平滑ER、蛋白由粗糙ER,呈密心小泡)、D(第三區對毒物/膽汁淤滯反應較慢)為可接受敘述。","options":{"A":"脂蛋白呈密心小泡,屬可接受敘述。","B":"脂質由平滑ER、蛋白由粗糙ER,正確。","C":"稱血流不良時第一區最先死亡—錯誤(第一區血氧最佳最耐缺血),為正解。","D":"第三區對毒物/膽汁淤滯反應較慢,屬可接受敘述。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_107100-42":{"quick":"膽囊壁缺乏黏膜肌層(也無黏膜下層)。","detail":{"background":"膽囊壁構造與消化管略不同:有黏膜(單層柱狀上皮+固有層)、『沒有黏膜肌層、也沒有黏膜下層』、有肌層(muscularis,平滑肌)、外覆漿膜/外膜(adventitia,貼肝面為外膜)。故膽囊所『沒有』者為黏膜肌層。膽囊功能為濃縮儲存膽汁(吸收水分),受CCK刺激收縮排膽汁。臨床:膽囊黏膜向肌層內陷形成『Rokitansky-Aschoff竇』(與膽固醇沉積、腺肌症相關)。","options":{"A":"膽囊無黏膜肌層—正解。","B":"有固有層。","C":"有外肌層(平滑肌)。","D":"貼肝面有外膜。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_107100-43":{"quick":"潘氏細胞位於小腸隱窩,結腸不具備。","detail":{"background":"結腸(大腸)組織特徵:單層柱狀上皮『富含杯狀細胞(分泌黏液潤滑糞便)』、有直且深的腸腺(Lieberkühn隱窩)、無絨毛(表面平坦)、固有層與黏膜下有淋巴小結。但結腸『沒有潘氏細胞(Paneth cell)』—潘氏細胞位於『小腸隱窩底部』,含嗜伊紅顆粒、分泌溶菌酶與防禦素(抗菌、維持腸道幹細胞區)。故結腸不具備者為潘氏細胞。(註:結腸近端偶可見少量潘氏細胞,但典型分布在小腸;考點以結腸無潘氏細胞為準。)","options":{"A":"結腸富含杯狀細胞。","B":"結腸為單層柱狀上皮。","C":"潘氏細胞在小腸隱窩、結腸不具備—正解。","D":"結腸有淋巴小結。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108030-42":{"quick":"肛門直腸連接處:直腸上皮(單層柱狀)富含杯狀細胞。","detail":{"background":"肛門直腸連接處(anorectal junction)的上皮『移行』:『直腸』仍為『單層柱狀上皮、富含杯狀細胞』的腸黏膜;越過齒狀線後『肛管』漸變為『複層扁平上皮』(肛梳區未角化→肛緣角化)。故A「直腸上皮有許多杯狀細胞」正確。比較錯誤:B複層扁平是『肛門』(非直腸);C派亞氏斑在小腸(非肛門);D內括約肌是肌外層『環走肌』顯著增厚(非縱走肌)、外括約肌為骨骼肌。故A正確。","options":{"A":"直腸上皮富含杯狀細胞—正解。","B":"複層扁平上皮在肛門(非直腸)。","C":"派亞氏斑在小腸,非肛門。","D":"內括約肌為環走肌增厚(非縱走)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108030-43":{"quick":"壁細胞是胃底腺(gastric gland proper)的細胞。","detail":{"background":"胃底腺(gastric gland proper/fundic gland)含:表面與頸黏液細胞、『壁細胞(parietal,分泌HCl與內在因子)』、『主細胞(chief,分泌胃蛋白酶原)』、腸內分泌細胞、未分化幹細胞。故屬胃底腺細胞者為壁細胞。比較:M細胞(microfold)在派亞氏斑上皮(攝取抗原)、潘氏細胞在小腸隱窩、杯狀細胞在腸道—皆非胃底腺細胞。故A正確。","options":{"A":"壁細胞為胃底腺細胞—正解。","B":"M細胞在派亞氏斑上皮。","C":"潘氏細胞在小腸隱窩。","D":"杯狀細胞在腸道。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-43":{"quick":"派亞氏斑主要分布於迴腸(ileum)。","detail":{"background":"派亞氏斑(Peyer’s patch)是聚集的淋巴小結(GALT),『主要分布於小腸末段的『迴腸(ileum)』』(黏膜與黏膜下層),表面有M細胞攝取腸腔抗原啟動黏膜免疫(分泌IgA)。十二指腸、空腸亦有少量淋巴組織但以迴腸最密集。故主要在迴腸。臨床:傷寒侵犯迴腸派亞氏斑致出血穿孔;克隆氏病好發迴腸末端。","options":{"A":"直腸非派亞氏斑主分布處。","B":"空腸派亞氏斑較少。","C":"迴腸為派亞氏斑主要分布處—正解。","D":"十二指腸淋巴組織少。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109020-42":{"quick":"膽囊內襯為單層柱狀上皮(具吸收功能)。","detail":{"background":"膽囊內襯為『單層柱狀上皮』(高柱狀、頂部微絨毛),負責濃縮膽汁(主動吸收Na⁺與水)。其下為固有層(富血管)、肌層、外膜/漿膜,無黏膜肌層與黏膜下層。故為單層柱狀上皮。比較:移形上皮在泌尿道;複層柱狀少見;角質化複層扁平在皮膚。故B正確。","options":{"A":"移形上皮在泌尿道。","B":"膽囊為單層柱狀上皮—正解。","C":"複層柱狀少見(部分大導管)。","D":"角質化複層扁平在表皮。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109020-43":{"quick":"胃黏膜沒有杯狀細胞(杯狀細胞屬腸道)。","detail":{"background":"胃黏膜的細胞:表面黏液細胞(分泌中性黏液保護)、胃小凹與胃腺的頸黏液細胞、壁細胞、主細胞、腸內分泌細胞、未分化成體幹細胞(再生上皮)。胃黏膜『沒有杯狀細胞』—杯狀細胞是『腸道(小腸、大腸)』的黏液單細胞腺。故胃黏膜沒有的細胞為杯狀細胞。臨床:胃出現杯狀細胞=『腸上皮化生(intestinal metaplasia)』,屬癌前變化(與慢性胃炎/幽門桿菌相關)。","options":{"A":"表面黏液細胞存在於胃黏膜。","B":"杯狀細胞屬腸道、胃黏膜無—正解。","C":"壁細胞存在於胃底腺。","D":"未分化幹細胞存在(再生上皮)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109100-42":{"quick":"十二指腸的黏膜肌層因布魯納氏腺穿入而呈不連續。","detail":{"background":"胃與十二指腸交接處的辨識:十二指腸最大特徵是『黏膜下層有布魯納氏腺(Brunner’s gland,分泌鹼性黏液中和胃酸)』,其腺體常『穿過黏膜肌層』使後者呈『不連續(discontinuous)』—故C正確。比較錯誤:A表面黏液細胞是『胃』的特徵(十二指腸表面為帶刷狀緣的吸收細胞+杯狀細胞);B布魯納氏腺在『十二指腸』(非胃);D幽門括約肌是『胃幽門』肌外層『環走肌』增厚(非縱走肌)。故C正確。","options":{"A":"表面黏液細胞為胃特徵(非十二指腸)。","B":"布魯納氏腺在十二指腸(非胃)。","C":"十二指腸黏膜肌層因布魯納氏腺穿入而不連續—正解。","D":"幽門括約肌為環走肌增厚(非縱走)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109100-43":{"quick":"歐巴氏(肌間)神經叢位於肌外層,調節腸蠕動。","detail":{"background":"腸道神經系統(腸內神經叢)有二:「歐巴氏神經叢/肌間神經叢(Auerbach’s/myenteric plexus)」位於『肌外層的環走肌與縱走肌之間』,主『調節腸蠕動(平滑肌收縮)』;「梅斯納氏神經叢/黏膜下神經叢(Meissner’s/submucosal plexus)」位於黏膜下層,調節腺體分泌與黏膜血流。故位於肌外層調節蠕動者為歐巴氏神經叢。比較:梅斯納氏『小體』是真皮的觸覺受器(與神經叢同名易混);蒲金氏纖維在心臟。臨床:先天性巨結腸症(Hirschsprung)為遠端腸壁神經節細胞缺如→無蠕動、近端擴張。","options":{"A":"梅斯納氏小體為皮膚觸覺受器。","B":"梅斯納氏神經叢在黏膜下、調節分泌。","C":"歐巴氏神經叢在肌外層、調節蠕動—正解。","D":"蒲金氏纖維在心臟傳導系統。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_110020-42":{"quick":"駱阿氏竇(Rokitansky-Aschoff sinus)是膽囊黏膜向肌層內陷形成的憩室。","detail":{"background":"膽囊的「駱阿氏竇(Rokitansky-Aschoff sinus)」是『黏膜上皮向下深陷穿入肌層的憩室狀內陷(mucosal diverticula)』,為膽囊壁的正常或病態變異;當數目增多、合併肌層增厚即為『腺肌症(adenomyomatosis)』,膽汁淤積其內易沉積膽固醇/形成結石、可成感染巢。故為黏膜憩室。它非腺泡(膽囊無分泌腺泡,僅頸部有少量黏液腺)、非淋巴管。故C正確。","options":{"A":"非漿液腺泡。","B":"非黏液腺泡。","C":"為黏膜向肌層內陷的憩室—正解。","D":"非淋巴管。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_110020-43":{"quick":"胃幽門部具顯著黏膜肌層與增厚的環走肌(構成幽門括約肌)。","detail":{"background":"胃幽門部(pylorus)特徵:有顯著的黏膜肌層,且『肌外層的環走肌顯著增厚形成幽門括約肌』調控胃排空—故C正確。比較錯誤:A幽門腺為『分支管狀腺(branched tubular)』(非單泡狀腺);B幽門的『胃小凹很深』約占黏膜厚度『一半』(非僅十分之一;胃底腺區小凹才較淺);D幽門腺主要由『黏液細胞』組成(分泌黏液與少量胃泌素G細胞),『壁細胞少、無杯狀細胞』。故C正確。","options":{"A":"幽門腺為分支管狀腺(非單泡狀)。","B":"幽門胃小凹深(約占黏膜一半,非十分之一)。","C":"具顯著黏膜肌層與增厚環走肌(幽門括約肌)—正解。","D":"幽門腺主為黏液細胞(壁細胞少、無杯狀)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111020-42":{"quick":"膽汁經赫林氏管(canal of Hering)由膽小管引流入膽管。","detail":{"background":"膽汁流向與血流『相反』:肝細胞分泌膽汁入『膽小管(bile canaliculus,肝細胞間的細小溝)』→匯入『赫林氏管(canal of Hering,部分肝細胞+膽管細胞構成的過渡管,亦為肝幹細胞所在)』→小葉間膽管→肝管。故膽汁運送管道為赫林氏管。比較:狄氏腔(space of Disse)是肝細胞與肝竇間的『血漿交換間隙』(含伊東細胞)、肝竇是『血流』通道、乳糜管是小腸絨毛的『淋巴管』。故A正確。臨床:膽汁淤積時膽小管擴張;赫林氏管幹細胞參與肝再生。","options":{"A":"赫林氏管引流膽汁—正解。","B":"狄氏腔為血漿交換間隙。","C":"肝竇為血流通道。","D":"乳糜管為小腸絨毛淋巴管。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-42":{"quick":"輪廓乳突含有許多味蕾(沿其側壁與環溝)。","detail":{"background":"舌輪廓乳突(circumvallate papillae):『8–12個、體積最大、數量最少』,排列成『V形(界溝前方,與舌長軸垂直分布)』;其『側壁含大量味蕾』、環繞的溝底有『von Ebner漿液腺』沖洗味溝;表面為『複層扁平上皮』。故B「含許多味蕾」正確。比較錯誤:A非舌外側平行分布;C最小最多者為『絲狀乳突』;D表面為複層扁平上皮(非單層扁平)。故B正確。","options":{"A":"輪廓乳突呈V形排列於界溝前(非舌外側平行)。","B":"含許多味蕾—正解。","C":"最小最多者為絲狀乳突。","D":"表面為複層扁平上皮(非單層扁平)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-43":{"quick":"十二指腸的特徵是黏膜下層有布魯納氏腺(Brunner’s gland)。","detail":{"background":"小腸三段比較:十二指腸特徵『黏膜下層有布魯納氏腺(分泌鹼性黏液中和胃酸)』—C正確;絨毛由十二指腸/空腸最高最密、向迴腸漸矮(B錯,非迴腸最多);杯狀細胞數量『由近端向遠端遞增,迴腸最多』(A錯,非空腸最多);派亞氏斑『迴腸最多最明顯』(D錯,非十二指腸)。故C正確。記憶口訣:十二指腸=Brunner腺;迴腸=Peyer斑與最多杯狀細胞;絨毛近端最發達。","options":{"A":"杯狀細胞迴腸最多(非空腸)。","B":"絨毛近端(十二指腸/空腸)最多(非迴腸)。","C":"十二指腸有Brunner’s gland—正解。","D":"派亞氏斑迴腸最多(非十二指腸)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_112020-42":{"quick":"狄氏空間(space of Disse)位於肝細胞與肝血竇之間。","detail":{"background":"肝臟微結構:「狄氏空間(space of Disse/perisinusoidal space)」位於『肝細胞與肝血竇內皮之間』,是血漿與肝細胞行物質交換之處,內含『伊東細胞(Ito/hepatic stellate cell,儲存維生素A與脂肪、活化時分泌膠原致纖維化)』—故C正確。比較錯誤:A庫弗氏細胞(Kupffer)是肝竇內的『常駐巨噬細胞』(非肝細胞特化、非儲養分,行吞噬);B肝血竇是『不連續/有孔(discontinuous fenestrated)內皮』(非連續型,利大分子交換);D伊東細胞非吞噬老化細胞(那是庫弗氏細胞),為儲脂/維A細胞。故C正確。臨床:伊東細胞活化是肝硬化纖維化的核心。","options":{"A":"庫弗氏細胞為巨噬細胞(非肝細胞特化儲養分)。","B":"肝血竇為不連續/有孔內皮(非連續型)。","C":"狄氏空間在肝細胞與肝血竇之間—正解。","D":"伊東細胞儲脂/維A(非吞噬老化細胞)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_112020-43":{"quick":"結腸上皮富含杯狀細胞,分泌黏液潤滑保護。","detail":{"background":"結腸(大腸)組織:上皮為單層柱狀,『富含杯狀細胞分泌黏液潤滑糞便、保護黏膜』—A正確;表面吸收細胞主吸『水與電解質』但其微絨毛『不如小腸發達』(B錯—大腸非主要消化吸收營養處);『結腸帶(taeniae coli)由肌外層的「縱走肌」局部增厚形成』三條(C錯,非環走肌);大腸『無環狀襞、無絨毛』(D錯,環狀襞是小腸特徵)。故A正確。臨床:杯狀細胞黏液層是腸道屏障;潰瘍性結腸炎杯狀細胞減少、黏液層受損。","options":{"A":"結腸富含杯狀細胞分泌黏液—正解。","B":"大腸微絨毛不如小腸發達。","C":"結腸帶由縱走肌增厚形成(非環走肌)。","D":"大腸無環狀襞與絨毛(為小腸特徵)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-42":{"quick":"胃賁門腺細胞為黏液性,含黏原顆粒。","detail":{"background":"含『黏原顆粒(mucinogen granule,PAS陽性、黏液性)』者為黏液分泌細胞:「胃賁門腺(cardiac gland)以黏液細胞為主、含黏原顆粒」—A正確。比較:胰腺泡細胞與耳下腺(腮腺)腺泡細胞為『漿液性』、含『酶原顆粒(zymogen granule,嗜伊紅)』;潘氏細胞含『嗜伊紅顆粒(防禦素、溶菌酶)』。故含黏原顆粒者為胃賁門腺細胞。","options":{"A":"胃賁門腺細胞為黏液性、含黏原顆粒—正解。","B":"胰腺泡細胞為漿液性、含酶原顆粒。","C":"腮腺腺泡為漿液性、含酶原顆粒。","D":"潘氏細胞含嗜伊紅防禦素顆粒。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-43":{"quick":"膽囊固有層富含血管與淋巴,但典型不含黏液『腺』(僅頸部少量);最不可能者為黏液腺(此題以淋巴管為答案鍵—固有層無真正集合淋巴管)。","detail":{"background":"膽囊壁:黏膜(單層柱狀上皮+固有層,無黏膜肌層與黏膜下層)。其固有層『富含穿孔型微血管與小靜脈』(吸收膽汁水分後回流),『黏液腺僅見於膽囊頸部』。本題官方以「淋巴管」為『最不可能出現』者—膽囊固有層雖有微淋巴叢,但相較豐富的有孔微血管與小靜脈,典型切片中『集合淋巴管』最不明顯。故答案C。此題為比較『何者最不可能』,以血管成分最常見、淋巴管最不顯著作答。","options":{"A":"有孔微血管於膽囊固有層豐富(吸收水分)。","B":"小靜脈於固有層常見。","C":"淋巴管在固有層最不明顯—為正解(官方答案)。","D":"頸部可見少量黏液腺。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113090-42":{"quick":"牙本質小管內含成牙質細胞突(odontoblastic process)。","detail":{"background":"牙的硬組織比較:「琺瑯質(enamel)」由『成釉細胞(ameloblast)』分泌、僅覆蓋『齒冠』、為人體最硬組織、形成後成釉細胞消失『無法再生』;「牙本質(dentin)」由『成牙質細胞(odontoblast)』分泌、覆蓋齒冠與齒根、其『牙本質小管內含成牙質細胞的突起(odontoblastic process)』可終生緩慢形成(故C正確);成牙質細胞本體位於牙髓邊緣。比較錯誤:A琺瑯質僅在齒冠(非齒根);B兩者由不同細胞分泌(釉=成釉、本質=成牙質);D與牙周韌帶相接者是齒根表面的『牙骨質(cementum)』(非牙本質直接)。故C正確。","options":{"A":"琺瑯質僅覆齒冠(非齒根)。","B":"琺瑯由成釉細胞、牙本質由成牙質細胞(非同一)。","C":"牙本質小管含成牙質細胞突—正解。","D":"與牙周韌帶相接者為牙骨質(非牙本質)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113090-43":{"quick":"主細胞(chief cell)分布於胃底腺、不見於幽門腺。","detail":{"background":"胃不同區域腺體細胞組成:『胃底腺(fundic gland)』含完整五類—表面/頸黏液、壁細胞、『主細胞(chief,分泌胃蛋白酶原)』、腸內分泌、未分化幹細胞;而『幽門腺與賁門腺以黏液細胞為主、壁細胞少、『無主細胞』』。故主要分布於胃底腺而幽門腺沒有者為『主細胞』(壁細胞亦以胃底腺為主,但題給選項中區別最明確者為主細胞)。比較:未分化幹細胞、黏液細胞、腸內分泌細胞在各區皆有。故A正確。","options":{"A":"主細胞在胃底腺、幽門腺無—正解。","B":"未分化幹細胞各區皆有。","C":"黏液分泌細胞各區皆有(幽門腺以此為主)。","D":"腸內分泌細胞各區皆有。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114020-43":{"quick":"主細胞分泌胃蛋白酶原、富含粗糙ER而呈嗜鹼性。","detail":{"background":"胃底腺主細胞(chief/zymogenic cell)位於腺體基部,『分泌胃蛋白酶原(pepsinogen,遇胃酸活化為胃蛋白酶分解蛋白)』;因合成蛋白旺盛、基部富含『粗糙內質網』故H&E下『胞質嗜鹼性』、頂部含嗜伊紅酶原顆粒。故A正確。比較:壁細胞圓形『嗜伊紅』(富粒線體)分泌HCl;黏液頸細胞分泌酸性黏液;腸內分泌細胞分泌激素。故A正確。","options":{"A":"主細胞分泌胃蛋白酶原、嗜鹼性—正解。","B":"黏液頸細胞分泌酸性黏液。","C":"壁細胞嗜伊紅、分泌HCl。","D":"腸內分泌細胞分泌激素。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114020-44":{"quick":"食道的黏膜層(賁門腺)與黏膜下層(食道腺)皆有黏液腺。","detail":{"background":"消化管中『黏膜層與黏膜下層「皆」具黏液腺』者為「食道(esophagus)」:食道下端近賁門處『黏膜層』有『賁門腺(分泌黏液)』、整段食道『黏膜下層』有『食道腺(esophageal gland proper,分泌黏液潤滑食團)』。比較:胃腺在黏膜層(黏膜下層無腺體)、結腸腺在黏膜層、闌尾類似結腸—皆非黏膜下層有腺體。十二指腸雖黏膜下有Brunner腺,但題選項為食道最典型「兩層皆有黏液腺」。故A正確。","options":{"A":"食道黏膜層(賁門腺)與黏膜下層(食道腺)皆有黏液腺—正解。","B":"胃腺僅在黏膜層。","C":"結腸腺僅在黏膜層。","D":"闌尾腺僅在黏膜層。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114090-43":{"quick":"結腸帶屬大腸;絨毛、乳糜管、環皺襞皆屬小腸。","detail":{"background":"比較構造的器官歸屬:「絨毛(villi)、乳糜管(lacteal,絨毛中央的淋巴管)、環皺襞(plicae circulares/Kerckring襞)」皆是『小腸』增大吸收面積的構造;而「結腸帶(teniae coli)」是『大腸(結腸)』肌外層縱走肌增厚形成的三條帶(收縮成結腸袋haustra)。故不與其他三者同器官者為結腸帶。記憶:小腸=絨毛+環皺襞+微絨毛三級放大吸收面;大腸=結腸帶+結腸袋+腸脂垂、無絨毛。","options":{"A":"絨毛屬小腸。","B":"乳糜管屬小腸絨毛。","C":"環皺襞屬小腸。","D":"結腸帶屬大腸—與其他三者不同器官,為正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_115020-43":{"quick":"絲狀乳突數量最多、體積最小(無味蕾)。","detail":{"background":"舌乳突四種:「絲狀乳突(filiform)」『數量最多、體積最小』、表面角化呈尖錐狀、『無味蕾』(司觸覺與摩擦,使舌面粗糙);「蕈狀乳突(fungiform)」散在舌尖兩側、紅色、含少量味蕾;「輪廓乳突(circumvallate)」最大最少(8–12個,V形)、含大量味蕾;「葉狀乳突(foliate)」位舌後外側、含味蕾(人類退化)。故數量最多且最小者為絲狀乳突。臨床:維生素缺乏/萎縮性舌炎時絲狀乳突萎縮致舌面光滑。","options":{"A":"絲狀乳突最多最小(無味蕾)—正解。","B":"蕈狀乳突散在舌尖、含少量味蕾。","C":"輪廓乳突最大最少。","D":"葉狀乳突位舌後外側。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_115020-44":{"quick":"闌尾黏膜富含淋巴小結,常延伸至黏膜下層。","detail":{"background":"消化道組織正確敘述為D:『闌尾(appendix)黏膜層有豐富的淋巴小結(GALT),常融合並延伸入黏膜下層』(故闌尾壁淋巴組織特別發達)。比較錯誤:A黏膜肌層分布應達『肛管』(非僅到盲腸);B胃底腺位於『黏膜層』內、向下延伸至黏膜肌層上方(『不』延伸至肌外層);C小腸絨毛是『黏膜層(上皮+固有層)』向腸腔的突起(非黏膜下層突出—黏膜下突出者為環皺襞的軸心)。故D正確。臨床:闌尾淋巴組織增生(病毒感染後)可阻塞管腔誘發急性闌尾炎。","options":{"A":"黏膜肌層分布達肛管(非僅到盲腸)。","B":"胃底腺在黏膜層(不延伸至肌外層)。","C":"絨毛由黏膜層突出(非黏膜下層)。","D":"闌尾黏膜富含淋巴小結、延伸至黏膜下層—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_107100-46":{"quick":"精子成型(spermiogenesis)指精細胞(spermatid)轉變為成熟精子的形態變化。","detail":{"background":"男性生殖細胞發育:精原細胞(spermatogonia)有絲分裂→『初級精母細胞』→減數I→次級精母細胞→減數II→『精細胞(spermatid,單倍體圓形)』。最後階段「精子成型(spermiogenesis)」=『精細胞「不再分裂」、經形態重塑變為精子(spermatozoa)』:形成『頂體(acrosome,含水解酶助受精)』、濃縮細胞核、由中心粒長出鞭毛、粒線體聚於中段、多餘胞質丟棄。故D正確。比較:A是減數前的增殖、B是釋放(spermiation)、C是『精子獲能(capacitation,在女性生殖道)』或副睪內成熟(運動力獲得)。故D正確。","options":{"A":"此為精母細胞形成(減數前),非精子成型。","B":"精原細胞脫離為釋放,非精子成型。","C":"副睪內為精子成熟/獲能,非精子成型。","D":"精細胞轉為成熟精子的形態變化—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108030-45":{"quick":"原始濾泡(primordial follicle)尚無透明帶。","detail":{"background":"卵巢濾泡發育:「原始濾泡(primordial)」=初級卵母細胞(停滯減數I)外圍『單層扁平濾泡細胞』,『尚無透明帶』;「初級濾泡(primary)」=濾泡細胞變立方並增生,卵母細胞與濾泡細胞間出現『透明帶(zona pellucida,醣蛋白ZP1-3,精子辨識結合)』;「次級/竇狀濾泡(secondary/antral)」=出現卵泡液腔、卵泡膜分內外層;「成熟/格拉夫濾泡(mature/Graafian)」=大竇腔、卵丘。故不具透明帶者為原始濾泡。臨床:ZP3為精卵辨識受體;透明帶硬化阻止多精受精。","options":{"A":"成熟濾泡有透明帶。","B":"次級濾泡有透明帶。","C":"初級濾泡開始出現透明帶。","D":"原始濾泡尚無透明帶—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108030-46":{"quick":"陰莖海綿體是勃起的血管組織,不分泌精液成分。","detail":{"background":"精液(semen)的分泌來源:『精囊(seminal vesicle)』貢獻約60–70%(含果糖供精子能量、前列腺素、鹼性);『前列腺(prostate)』貢獻約20–30%(含酸性磷酸酶、PSA、檸檬酸、鋅);『尿道球腺(Cowper/bulbourethral gland)』分泌黏液潤滑與中和尿道酸性;加上睪丸/副睪的精子。而「陰莖海綿體(corpus cavernosum)」是『勃起用的血管竇狀組織』,『不分泌精液成分』。故精液不含其分泌物。臨床:PSA為前列腺癌標記;精囊果糖檢測評估射精管通暢。","options":{"A":"前列腺分泌精液成分(PSA、酸性磷酸酶)。","B":"陰莖海綿體為勃起血管組織、不分泌精液—正解。","C":"尿道球腺分泌潤滑黏液。","D":"精囊分泌果糖等精液主成分。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-44":{"quick":"緻密斑由『遠曲小管(遠端小管)』特化,非近直小管,故此敘述錯誤。","detail":{"background":"近腎絲球器(JGA)三成分:「緻密斑(macula densa)」=『遠端小管(遠曲小管起始/遠直小管)』貼近腎小體血管極處的特化上皮,感測小管液NaCl濃度;「近腎絲球細胞(JG cell)」=『入球小動脈管壁平滑肌特化』,分泌腎素(renin);「腎絲球外系膜細胞(Lacis)」。腎絲球微血管內皮為『穿孔型』(A正確);皮髓交界有『弓形動脈』(D正確)。故B「緻密斑由『近直小管』特化」錯誤(應由遠端小管特化)。臨床:JGA為腎素-血管收縮素-醛固酮系統(RAAS)的感測與啟動樞紐、調控血壓與鈉平衡。","options":{"A":"腎絲球微血管內皮為穿孔型,正確。","B":"稱緻密斑由近直小管特化—錯誤(應為遠端小管),為正解。","C":"JG細胞由入球小動脈平滑肌特化,正確。","D":"皮髓交界有弓形動脈,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-46":{"quick":"細精管上皮為複合型複層的生精上皮(含支持細胞與各級生精細胞)。","detail":{"background":"細精管(seminiferous tubule)管壁:外有基底膜與『類肌細胞(myoid cell,收縮推送精子;不分泌睪固酮)』;管內為「複合型複層的生精上皮(complex stratified)」—由柱狀的『塞托利氏/支持細胞(Sertoli,構成血睪屏障、支持營養各級生精細胞)』與由基底到管腔排列的精原→精母→精細胞→精子組成。故C正確。比較錯誤:A支持細胞在『管內』(非管外);B分泌睪固酮者是管『間』的『萊迪希/間質細胞(Leydig)』(非類肌細胞);D管腔『近腔面』為精細胞/精子,管腔『底部(基底)』為精原細胞。故C正確。","options":{"A":"支持細胞在管內(非管外)。","B":"分泌睪固酮者為間質Leydig細胞(非類肌細胞)。","C":"生精上皮為複合型複層上皮—正解。","D":"基底為精原細胞、近腔為精細胞(敘述顛倒)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109020-45":{"quick":"輸精管具有內縱、中環、外縱『三層厚平滑肌』。","detail":{"background":"精索(spermatic cord)含輸精管、睪丸動脈、蔓狀靜脈叢、淋巴、神經、提睪肌等。其中「輸精管(ductus deferens)」管壁特徵是『特別厚的三層平滑肌(內縱、中環、外縱)』(故射精時強力蠕動推送精子)、內襯為帶靜纖毛的『偽複層柱狀上皮』(非單層柱狀)。「蔓狀靜脈叢(pampiniform plexus)」是『許多小靜脈交織成網』包繞睪丸動脈行『逆流熱交換』降溫(非典型中型靜脈)。故A正確。臨床:蔓狀叢靜脈曲張(varicocele,左側多)致陰囊溫升、影響生精;輸精管厚肌層是觸診與結紮(vasectomy)的依據。","options":{"A":"輸精管具三層平滑肌—正解。","B":"蔓狀叢為靜脈網行熱交換(非典型中型靜脈)。","C":"輸精管上皮為偽複層柱狀(非單層柱狀)。","D":"輸精管以厚平滑肌為主(非網狀纖維填充)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109100-44":{"quick":"亨利氏環細段位於腎髓質。","detail":{"background":"腎元各段的皮髓分布:「腎小體、近曲小管、遠曲小管、緻密斑」位於『皮質』;「亨利氏環(loop of Henle)的細段(thin limb)與集尿管」深入『髓質』。故位於腎髓質者為亨利氏環細段。髓質的逆流倍增系統(亨利氏環+直血管vasa recta)建立高滲濃度梯度以濃縮尿液。髓質射線(medullary ray)則是皮質內向下延伸的直小管與集尿管束。故C正確。","options":{"A":"遠曲小管在皮質。","B":"緻密斑在皮質(血管極處)。","C":"亨利氏環細段在髓質—正解。","D":"腎小體在皮質。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109100-45":{"quick":"陰莖海綿體含許多不規則血管腔,周圍有平滑肌束(勃起組織)。","detail":{"background":"陰莖海綿體(corpora cavernosa)結構:外包『緻密(非疏鬆)結締組織的白膜(tunica albuginea)』(A錯);內為勃起組織—『許多不規則的血竇(血管腔),其間有小樑、富含平滑肌束與螺旋動脈(helicine artery)』,平滑肌鬆弛時動脈血充滿血竇而勃起(B正確);其充血是『動脈血直接灌入血竇(竇狀組織),非單純動脈→微血管→小靜脈的常規路徑』(C錯);龜頭(glans)皮下『無脂肪組織、富含感覺末梢』(D錯)。故B正確。臨床:勃起靠NO使平滑肌鬆弛(PDE5抑制劑作用點);白膜限制使靜脈受壓維持勃起。","options":{"A":"白膜為緻密結締組織(非疏鬆)。","B":"海綿體含血竇、周圍平滑肌束—正解。","C":"勃起為動脈血直接灌入血竇(非常規微血管路徑)。","D":"龜頭皮下無脂肪、富感覺末梢。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-44":{"quick":"遠曲小管細胞核較近管腔表面(細胞較矮、無刷狀緣使核相對偏腔側)。","detail":{"background":"近曲小管(PCT)vs遠曲小管(DCT)的鏡下區別:PCT細胞高柱狀、頂部有『發達刷狀緣(微絨毛)』、胞質嗜伊紅濃染(富粒線體與溶酶體)、細胞界線不清、管腔小而不規則;DCT細胞較『矮(立方)、無刷狀緣、胞質較淡、細胞界線較清、核相對偏近管腔面、管腔大而規則』。故B「遠曲小管核較近管腔表面」正確。比較錯誤:A溶酶體多、濃染是『近曲小管』特徵;C近曲小管細胞界線『不清』(非均明顯);D兩者頂面是『微絨毛』(近曲多)而非纖毛(D錯)。故B正確。","options":{"A":"溶酶體多、胞質濃染為近曲小管特徵。","B":"遠曲小管核較近管腔面—正解。","C":"近曲小管細胞界線不清(非均明顯)。","D":"頂面為微絨毛非纖毛。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-45":{"quick":"次級卵泡的顆粒層與內鞘細胞在『排卵後』才黃體化,排卵前尚未完全分化,故敘述錯誤。","detail":{"background":"黃體(corpus luteum)形成:『排卵後』殘餘濾泡的『顆粒層細胞→大型顆粒層黃體細胞(granulosa lutein,直徑較大,分泌黃體酮)』、『內鞘細胞→較小的卵泡鞘黃體細胞(theca lutein,分泌雌激素前驅)』—故是『排卵後』才黃體化。D稱「次級卵泡的顆粒層與內鞘細胞在排卵『前』已完全分化為黃體細胞」錯誤(黃體化發生於排卵後)。A(顆粒層黃體細胞較大)、B(無受精→退化成白體)、C(有受精著床→hCG維持黃體在孕初增大)皆正確。故D為正解。","options":{"A":"顆粒層黃體細胞較大,正確。","B":"無受精則退化成白體,正確。","C":"受精著床後黃體孕初增大,正確。","D":"稱排卵前已分化為黃體細胞—錯誤(黃體化在排卵後),為正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-46":{"quick":"精原細胞(spermatogonium)位於基底、與細精管基底板接觸。","detail":{"background":"生精上皮的『血睪屏障(blood-testis barrier)』由相鄰塞托利氏細胞間的緊密接合構成,將上皮分為『基底室』與『近腔室』。最不成熟的『精原細胞(spermatogonium,幹細胞)』位於『基底室、與基底板(basal lamina)接觸』;隨分化(精母→精細胞→精子)細胞穿越屏障逐漸往『管腔側』移動。故與基底板接觸者為精原細胞。血睪屏障保護單倍體生精細胞不被免疫系統視為外來抗原。故B正確。","options":{"A":"精母細胞已進入近腔室。","B":"精原細胞與基底板接觸—正解。","C":"精細胞近管腔。","D":"精子在管腔內。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_112020-44":{"quick":"緻密斑是近腎絲球器(JGA)的組成構造之一。","detail":{"background":"近腎絲球器(juxtaglomerular apparatus, JGA)由三部分構成:「緻密斑(macula densa,『遠端小管』貼血管極的特化上皮,感測小管液NaCl)」、「近腎絲球細胞(JG cell,『入球小動脈』管壁平滑肌特化,分泌腎素)」、「腎絲球外系膜細胞(extraglomerular mesangial/Lacis cell)」。故參與形成JGA者為緻密斑。比較錯誤:A入球小動脈的『內皮』非JGA構造(是其『平滑肌』特化為JG細胞);C特化上皮來自『遠端小管』(非近曲小管);D『絲球體『內』』系膜細胞屬腎絲球(JGA的是『球外』系膜細胞)。故B正確。","options":{"A":"入球小動脈的特化『平滑肌』(JG細胞)才是JGA組成,非其內皮。","B":"緻密斑為JGA組成—正解。","C":"緻密斑由遠端小管特化(非近曲小管)。","D":"JGA含『球外』系膜細胞(非球內系膜細胞)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_112020-45":{"quick":"閉鎖濾泡的基底膜增厚成波浪狀透明的玻璃膜。","detail":{"background":"卵泡『閉鎖(atresia)』是大多數卵泡的命運(終生僅約400個排卵):濾泡細胞與卵母細胞凋亡退化,『基底膜增厚形成波浪狀透明的「玻璃膜(glassy membrane)」』是閉鎖(尤其較大竇狀)濾泡的顯著組織標誌;殘餘可形成間質腺。故B正確。原始/初級/次級/成熟濾泡為正常發育階段,不以玻璃膜為特徵。故玻璃膜=閉鎖濾泡。","options":{"A":"原始濾泡無玻璃膜。","B":"閉鎖濾泡形成玻璃膜—正解。","C":"次級濾泡為正常發育階段。","D":"成熟濾泡為正常發育階段。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-46":{"quick":"附圖黏膜形成複雜分支皺襞、被覆單層柱狀纖毛上皮→輸卵管(uterine tube)。","detail":{"background":"附圖顯示管腔『輪廓不規則、呈波浪/扇貝狀』,內襯上皮『高低交替』—『高的纖毛柱狀細胞群』與『矮的無纖毛立方細胞群』相間排列,使管腔呈鋸齒狀,這是「輸出小管(efferent ductules)」的經典組織特徵(高細胞具纖毛推送精子、矮細胞吸收睪丸液)。比較:輸卵管為均一高纖毛柱狀(腔面平整)、陰道為複層扁平、尿道多為移形/複層柱狀。故附圖上皮主要出現於『輸出小管』。臨床:輸出小管連接睪丸網與副睪、吸收約90%睪丸液濃縮精子。","options":{"A":"★正確(本題答案)。輸卵管黏膜皺襞多而分支,被覆單層柱狀纖毛上皮。","B":"陰道為複層扁平上皮,不符。","C":"輸出小管上皮高矮交替(腔面波浪),與本圖分支皺襞不同。","D":"尿道多為移行/複層柱狀上皮,不符。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113090-44":{"quick":"髓質射線含直小管與集尿管,『不』包括近曲與遠曲小管(後者為皮質迷路),故敘述錯誤。","detail":{"background":"腎皮質分『皮質迷路(cortical labyrinth)』與『髓質射線(medullary ray)』:「皮質迷路」含『腎小體、近曲小管、遠曲小管』;「髓質射線」是自髓質向皮質延伸的『直行小管束—含近直小管、遠直小管(亨利氏環粗段)與集尿管』,『不含近曲與遠曲小管』。故C「髓質射線包括近曲與遠曲小管」錯誤。A(近曲與遠曲皆有基部橫紋—基側膜內褶富粒線體)、B(近曲微絨毛/刷狀緣多於遠曲)、D(緻密斑由遠端小管特化)皆正確。故C為正解。","options":{"A":"近曲與遠曲皆有基部橫紋,正確。","B":"近曲微絨毛多於遠曲,正確。","C":"稱髓質射線含近曲遠曲小管—錯誤(那屬皮質迷路),為正解。","D":"緻密斑由遠端小管特化,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113090-45":{"quick":"卵泡成長時顆粒細胞間廣泛出現間隙接合(gap junction)以協調訊號。","detail":{"background":"卵泡發育中,『顆粒細胞(granulosa cell)之間』廣泛建立「間隙接合(gap junction,connexin)」—使顆粒細胞彼此及與卵母細胞(經透明帶的跨膜突起)『代謝與訊號耦合(傳遞cAMP維持卵母細胞減數停滯、傳送營養)』,是卵泡協調發育與卵母細胞成熟調控的關鍵。故廣泛出現者為間隙接合。LH高峰時間隙接合通訊中斷→解除減數停滯、卵母細胞恢復減數分裂並排卵。故C正確。","options":{"A":"緊密接合非顆粒細胞主要協調接合。","B":"黏連接合非此題重點。","C":"間隙接合廣泛出現於顆粒細胞間—正解。","D":"橋粒非顆粒細胞主要協調接合。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114020-46":{"quick":"副睪上皮表面具特化的長靜纖毛(stereocilia)。","detail":{"background":"男性生殖管道中具『靜纖毛(stereocilia,特長分支的微絨毛,actin核心、非真纖毛)』者為「副睪(epididymis)」(及輸精管)—其偽複層柱狀上皮的主細胞頂面有長靜纖毛,增加吸收面積(吸收睪丸液、濃縮精子)並分泌使精子成熟的物質。比較:直細精管與曲細精管為生精上皮(無靜纖毛)、輸出小管為高矮交替的纖毛柱狀(有真『纖毛』非靜纖毛)。故C正確。臨床:內耳毛細胞的靜纖毛亦為actin核心(感聲)。","options":{"A":"直小管屬生精上皮、無靜纖毛。","B":"輸出小管具真纖毛(非靜纖毛)。","C":"副睪具特化靜纖毛—正解。","D":"曲細精管為生精上皮、無靜纖毛。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_115020-45":{"quick":"近曲小管具最發達的刷狀緣(微絨毛),負責大量再吸收。","detail":{"background":"腎小管中『刷狀緣(brush border,密集微絨毛)』最發達者為「近曲小管(PCT)」—因它再吸收約65–70%濾液(葡萄糖、胺基酸、Na⁺、水、HCO₃⁻),刷狀緣大幅增加表面積、頂部還有胞飲小泡與溶酶體回收蛋白。遠曲小管、亨利氏環細升支、集尿管的微絨毛皆稀少(功能以選擇性運輸與調節為主)。故刷狀緣最發達者為近曲小管。臨床:近曲小管刷狀緣對缺血/毒物(胺基糖苷、顯影劑)敏感、脫落見於急性腎小管壞死的尿沉渣。","options":{"A":"近曲小管刷狀緣最發達—正解。","B":"遠曲小管微絨毛稀少。","C":"亨利氏環細升支微絨毛少。","D":"集尿管微絨毛少。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_106100-44":{"quick":"腎上腺髓質嗜鉻細胞與交感節後神經元同源(皆神經嵴)。","detail":{"background":"腎上腺髓質的「嗜鉻細胞(chromaffin cell)」與「交感節後神經元」皆源自『神經嵴』、同源—嗜鉻細胞相當於『失去軸突的特化交感節後神經元』,受交感『節前』纖維直接支配,分泌『腎上腺素/正腎上腺素』入血(故髓質是內分泌化的交感神經節)。比較:腎上腺『皮質』源自中胚層(分泌類固醇);副甲狀腺主細胞源自第3、4咽囊內胚層;甲狀腺濾泡細胞源自內胚層。故與交感神經元同源者為嗜鉻細胞。臨床:嗜鉻細胞瘤(pheochromocytoma)分泌兒茶酚胺致陣發性高血壓。","options":{"A":"腎上腺嗜鉻細胞與交感神經元同源(神經嵴)—正解。","B":"腎上腺皮質源自中胚層。","C":"副甲狀腺主細胞源自咽囊內胚層。","D":"甲狀腺濾泡細胞源自內胚層。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_107100-45":{"quick":"腦下垂體沒有閏管(intercalated duct,那是外分泌腺導管成分)。","detail":{"background":"腦下垂體為『內分泌腺』,無導管系統—故『沒有閏管(intercalated duct)』(閏管是腮腺/胰等外分泌腺連接腺泡的小導管)。它具有:豐富的『竇狀微血管(垂體門脈系統運送下視丘釋放激素)』;腺垂體(前葉)染色分為『嗜色細胞(chromophil,含嗜酸性與嗜鹼性細胞,分泌GH/PRL/ACTH/TSH/FSH/LH)』與『嫌色細胞(chromophobe,染色淡)』。故不具者為閏管。臨床:垂體腺瘤(常為嫌色或嗜酸性)依分泌激素致肢端肥大、泌乳、庫欣等。","options":{"A":"腦下垂體無閏管(內分泌腺無導管)—正解。","B":"有竇狀微血管(垂體門脈)。","C":"有嫌色細胞。","D":"有嗜色細胞(分泌各激素)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108030-44":{"quick":"默克耳氏細胞主要分布在表皮『基底層』(觸覺),非棘狀層,故敘述錯誤。","detail":{"background":"表皮四種細胞:「角質細胞(keratinocyte)」最多(A正確,行角化屏障);「黑色素細胞(melanocyte)」位『基底層』、樹突狀、產黑色素(B正確);「蘭格罕氏細胞(Langerhans)」位棘狀層為主、樹突狀『抗原呈現細胞』(D正確);「默克耳氏細胞(Merkel cell)」位於『基底層』、與感覺末梢形成默克耳盤(觸覺機械受器)。故C「默克耳氏細胞主要在棘狀層」錯誤(應在基底層)。記憶:基底層住著黑色素細胞與默克耳細胞;棘狀層有蘭格罕氏細胞。故C為正解。","options":{"A":"角質細胞最多,正確。","B":"黑色素細胞在基底層,正確。","C":"稱默克耳氏細胞在棘狀層—錯誤(應在基底層),為正解。","D":"蘭格罕氏細胞為抗原呈現細胞,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-36":{"quick":"視網膜中央動靜脈源自玻璃體血管的『近側端』(非遠側端),故敘述錯誤。","detail":{"background":"眼的發育:視杯(間腦外突)雙層—『外層→視網膜色素上皮(C正確)』、內層→神經視網膜;視杯腹側的「眼裂(optic fissure)」沿視柄發育,『玻璃體血管(hyaloid vessels)』經眼裂進入供應發育中的晶狀體與視網膜內層—其『近側端持續存留為「視網膜中央動靜脈」』,而『遠側端(供晶狀體者)退化消失』。故B「中央動靜脈源自『遠側端』玻璃體血管」錯誤(應為近側端;遠側端退化)。A(眼裂在腹側沿視柄)、D(視神經由神經節細胞軸突組成)皆正確。臨床:眼裂閉合不全→虹膜/視網膜缺損(coloboma);玻璃體動脈殘留→Bergmeister乳頭。","options":{"A":"眼裂位於眼杯腹側沿視柄,正確。","B":"稱中央動靜脈源自遠側端玻璃體血管—錯誤(應為近側端;遠側端退化),為正解。","C":"視網膜色素上皮源自視杯外層,正確。","D":"視神經為神經節細胞軸突,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_108100-42":{"quick":"胰臟內分泌部即蘭氏小島(islets of Langerhans)。","detail":{"background":"胰臟兼具外分泌與內分泌:『外分泌部』=漿液性腺泡(分泌含酶原顆粒的消化酶)+導管(泡心細胞centroacinar為其起始);『內分泌部』=散布於腺泡間、染色較淡的細胞團「蘭氏小島(islets of Langerhans)」—含α(升糖素)、β(胰島素,最多)、δ(體抑素)、PP細胞,周圍富含微血管直接入血。故內分泌部為蘭氏小島(B正確)。A(漿液腺)、C(泡心細胞)、D(酶原顆粒)皆為『外分泌部』描述。臨床:β細胞破壞→第1型糖尿病;胰島腫瘤(insulinoma等)。","options":{"A":"漿液腺為外分泌部。","B":"內分泌部為蘭氏小島—正解。","C":"泡心細胞屬外分泌導管起始。","D":"酶原顆粒在外分泌腺泡細胞。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_109020-44":{"quick":"游離神經末梢最遠可達表皮『顆粒層』。","detail":{"background":"皮膚的感覺神經末梢:多數包覆型受器(Meissner小體在真皮乳頭、Pacinian小體在深層)位於真皮;而『游離神經末梢(free nerve ending,司痛、溫、癢與粗觸覺)』可進入『表皮』，並『最遠終止於顆粒層(stratum granulosum)附近』(再上的角質層為無核死細胞、無神經分布)。故最遠達顆粒層。表皮無血管,但有游離神經末梢深入。故C正確。","options":{"A":"基底層有末梢但非最遠處。","B":"棘狀層有末梢但非最遠處。","C":"游離神經末梢最遠達顆粒層—正解。","D":"角質層為無核死細胞、無神經分布。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_110020-40":{"quick":"角膜上皮為約5層、未角化複層扁平上皮,厚約50μm。","detail":{"background":"角膜(由外而內)五層:「角膜上皮(corneal epithelium)」=約5層『未角化複層扁平上皮、厚約50μm』、再生力強(A正確);「Bowman氏膜」=無細胞的緻密膠原前界膜(非PAS陽性基底膜、厚約8–12μm,受損不再生)(B錯);「基質(stroma)」=占角膜九成、約200–250層『規則平行排列的膠原板層(非30層、非網狀微纖維)』,其規則排列使角膜透明(D錯);「Descemet氏膜」=內皮的基底膜(約5–10μm,可再生)(C的40μm過厚、錯);「內皮」=單層、調節水分維持透明。故A正確。臨床:內皮失代償→角膜水腫混濁;上皮再生快(角膜擦傷可癒)。","options":{"A":"角膜上皮約5層未角化複層扁平、厚約50μm—正解。","B":"Bowman膜為無細胞膠原膜(非PAS基底膜、厚度不符)。","C":"Descemet膜約5–10μm(非40μm)。","D":"基質約200+層規則膠原板層(非30層網狀微纖維)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_110020-44":{"quick":"手掌(無毛厚皮)只有汗腺,無毛囊、豎毛肌與皮脂腺。","detail":{"background":"皮膚分『有毛薄皮』與『無毛厚皮(手掌、腳掌)』。手掌屬『無毛厚皮』:表皮厚(含透明層stratum lucidum)、『有豐富的「外泌汗腺(eccrine sweat gland)」』調節體溫與抓握;但『沒有毛囊、豎毛肌與皮脂腺』(此三者與毛髮系統相伴,屬有毛皮膚)。故手掌可見者為汗腺。臨床:手掌多汗症(hyperhidrosis)即外泌汗腺過度活躍;掌蹠角化症為厚皮角質異常。故D正確。","options":{"A":"手掌無毛囊。","B":"手掌無豎毛肌。","C":"手掌無皮脂腺。","D":"手掌有汗腺—正解。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111020-43":{"quick":"肝細胞兼具外分泌(分泌膽汁)與類內分泌(分泌血漿蛋白入血)功能。","detail":{"background":"「肝細胞(hepatocyte)」是兼具兩種分泌方向的細胞:『外分泌』—向膽小管分泌『膽汁』(經膽道入十二指腸);『類內分泌』—向肝竇(血液)分泌『白蛋白、凝血因子、脂蛋白、運輸蛋白』等入血。故同時具外分泌與類內分泌功能者為肝細胞。比較:胰島細胞純內分泌、唾液腺腺泡純外分泌、庫弗氏細胞是吞噬巨噬細胞。故A正確。臨床:肝功能衰竭時白蛋白(低蛋白水腫)與凝血因子(凝血異常)同時下降、膽汁排泄受阻(黃疸),正反映其雙重分泌角色。","options":{"A":"肝細胞兼外分泌(膽汁)與類內分泌(血漿蛋白)—正解。","B":"胰島細胞為純內分泌。","C":"唾液腺腺泡為純外分泌。","D":"庫弗氏細胞為吞噬巨噬細胞。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_111100-40":{"quick":"耳石(otolith)在橢圓囊/球囊的『耳石器』(感直線加速),不在半規管壺腹的頂帽,故敘述錯誤。","detail":{"background":"內耳膜性迷路的感覺受器:「半規管的壺腹嵴(crista ampullaris)」其膠質『頂帽(cupula)』感測『角(旋轉)加速度』(A正確);「橢圓囊/球囊的斑(macula)」其膠質含『耳石(otolith/otoconia)』感測『直線加速度與重力』。故B「頂帽的耳石感直線加速」錯誤—頂帽『沒有耳石』(耳石在囊斑;且頂帽感角加速,非直線)。C(耳蝸前庭階與鼓室階於蝸孔相通,含外淋巴)、D(耳蝸導管內為內淋巴)皆正確。故B為正解。臨床:耳石脫落入半規管→良性陣發性姿勢性眩暈(BPPV)。","options":{"A":"壺腹嵴感角加速度,正確。","B":"稱頂帽的耳石感直線加速—錯誤(耳石在囊斑、頂帽感角加速),為正解。","C":"前庭階與鼓室階於蝸孔相通,正確。","D":"耳蝸導管內為內淋巴,正確。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-44":{"quick":"真皮乳頭(dermal papilla)富含血管,供養毛囊。","detail":{"background":"毛囊基部膨大為『毛球(hair bulb)』,其底部凹入富含血管與神經的『真皮乳頭(dermal papilla)』—『提供毛基質細胞養分與氧氣、並以訊號調控毛髮生長週期』。其上的毛基質(matrix)細胞增殖形成毛幹與內根鞘。比較:玻璃膜是毛囊外的增厚基底膜(分隔上皮與結締組織鞘);內根鞘、外根鞘為包覆毛幹的上皮鞘(非供血)。故供養毛囊者為真皮乳頭。臨床:雄性禿與毛乳頭對雄激素(DHT)敏感、毛囊微小化有關。故A正確。","options":{"A":"真皮乳頭富含血管、供養毛囊—正解。","B":"玻璃膜為增厚基底膜(非供血)。","C":"內根鞘為包覆毛幹的上皮鞘。","D":"外根鞘為毛囊外層上皮鞘。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_113020-45":{"quick":"腎上腺皮質束狀帶細胞富含脂滴、分泌糖皮質素(皮質醇)。","detail":{"background":"腎上腺皮質三帶(由外而內):「球狀帶(zona glomerulosa)」分泌『礦物皮質素(醛固酮,受RAAS調控)』;「束狀帶(zona fasciculata)」細胞排成索狀、『胞質富含大量脂滴(故稱「泡沫細胞spongiocyte」、含膽固醇酯供類固醇合成)』、分泌『糖皮質素(皮質醇,受ACTH調控)』;「網狀帶(zona reticularis)」分泌『性類固醇(雄性素DHEA)』。髓質分泌兒茶酚胺。故含大量脂滴並分泌糖皮質素者為束狀帶。臨床:束狀帶/ACTH過度→庫欣症候群;不足→愛迪生氏病。故B正確。","options":{"A":"球狀帶分泌醛固酮(礦物皮質素)。","B":"束狀帶富含脂滴、分泌糖皮質素—正解。","C":"網狀帶分泌性類固醇。","D":"髓質分泌兒茶酚胺。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114020-45":{"quick":"老化皮膚可見角質細胞萎縮(表皮變薄)。","detail":{"background":"皮膚老化的組織變化:「角質細胞(表皮)萎縮使『表皮變薄』、增殖更新變慢」(A正確);『蘭格罕氏細胞數量「減少」』→免疫監視下降(B錯);『真皮纖維母細胞活性「降低」、膠原與彈性纖維減少並變性』→皺紋鬆弛(C錯);『皮脂腺與汗腺分泌「減少」』→皮膚乾燥(D錯)。故老化可見者為角質細胞萎縮。臨床:老化加上紫外線(光老化)致表皮基底細胞異型、彈性纖維變性(日光性彈力組織變性)、易瘀青(真皮血管支持差)。故A正確。","options":{"A":"老化皮膚角質細胞萎縮(表皮變薄)—正解。","B":"蘭氏細胞數量減少(非增加)。","C":"真皮纖維母細胞活性降低(非增加)。","D":"皮脂腺分泌減少(非增加)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}},"med1_114090-44":{"quick":"蘭格罕氏細胞是表皮內的抗原呈現細胞(樹突狀)。","detail":{"background":"蘭格罕氏細胞(Langerhans cell)是表皮的『樹突狀「抗原呈現細胞(antigen-presenting cell)」』—源自骨髓、屬樹突細胞家族,『主要分布於棘狀層(非均勻五層、非基底層)』,以樹突捕捉穿透表皮的抗原(過敏原、微生物),移行至淋巴結活化T細胞,啟動皮膚適應性免疫(如接觸性過敏)。故C正確;A(非均勻五層)、B(主在棘狀層非基底層)、D(機械受器是『默克耳細胞』,非蘭格罕氏細胞)皆錯。電鏡下其胞質有特徵性『Birbeck顆粒(網球拍狀)』。臨床:蘭格罕氏細胞組織球增生症(LCH)。","options":{"A":"非均勻分布五層(主在棘狀層)。","B":"主在棘狀層(非基底層)。","C":"蘭格罕氏細胞為抗原呈現細胞—正解。","D":"機械受器為默克耳細胞(非蘭格罕氏細胞)。"},"sources":["Junqueira《基礎組織學》","Ross《組織學》","Gartner組織學"]}}},TO=["HI1細胞胞器與組織學技術", "HI2上皮組織與細胞接合", "HI3結締組織纖維與血液", "HI4軟骨與骨", "HI5肌肉組織", "HI6神經組織", "HI7循環淋巴與免疫", "HI8呼吸系統", "HI9消化系統", "HI10泌尿與男女生殖系統", "HI11內分泌皮膚與感覺器官"],LEC={"HI1細胞胞器與組織學技術":{"title":"胞器、細胞膜與顯微技術","html":"<p><b>有膜 vs 無膜胞器</b>:有膜=粒線體(『雙層膜』、有環狀DNA、行有氧呼吸、母系遺傳)、粗糙ER(附核糖體、合成分泌/膜蛋白)、平滑ER(脂質類固醇合成、解毒、儲鈣)、高基氏體(『修飾與分類』)、溶體、胞內體、過氧化質體;無膜=核糖體、蛋白酶體、中心粒、細胞骨架、『核仁』。</p><p><b>細胞骨架</b>:微絲(actin)=微絨毛(刷狀/紋狀緣)、靜纖毛核心;微管=『纖毛(9+2)、軸突運輸(kinesin順向/dynein逆向)』、中心粒;中間絲=橋粒/半橋粒錨定。</p><p><b>細胞膜</b>:流體鑲嵌=磷脂雙層+蛋白+膽固醇(低溫維持流動性)+醣類。</p><p><b>技術</b>:光鏡解析度約『0.2 μm』、電鏡0.2 nm、人眼0.2 mm。福馬林交聯蛋白固定(『不保存脂質』);PAS標記醣類(黏液陽性)。嗜天青顆粒=溶酶體。</p>"},"HI2上皮組織與細胞接合":{"title":"上皮分類、細胞接合與腺體分泌","html":"<p><b>細胞接合</b>:側面—緊密接合(封閉、連actin)、黏著小帶(連actin)、橋粒(連『中間絲』)、間隙接合(通訊);基底面—『半橋粒(連中間絲、錨基底膜)』、點狀黏著(連actin)。心肌間盤=黏著+橋粒+間隙(『無緊密接合』)。</p><p><b>上皮分類</b>:偽複層柱狀(『所有細胞觸基底膜、非都達游離面』)=氣管/副睪;移形=泌尿道;複層扁平=皮膚/食道/陰道;單層柱狀=胃腸/膽囊。</p><p><b>腺體分泌方式</b>:局泌(merocrine,胞吐、細胞無損)、頂泌(apocrine,『分泌物外覆細胞膜』、如乳腺)、全泌(holocrine,『整個細胞崩解釋出』、如皮脂腺)。杯狀細胞=單細胞黏液腺。</p>"},"HI3結締組織纖維與血液":{"title":"纖維、脂肪、血球與造血","html":"<p><b>纖維</b>:膠原(抗拉)、網狀(第III型)、彈性纖維(彈力素+『fibrillin微纖維』,H&E難辨需特殊染色;FBN1突變→馬凡氏症)。</p><p><b>脂肪</b>:白色(單一大脂滴、儲能、leptin);棕色(『多小脂滴+大量粒線體UCP1產熱』、新生兒多)。</p><p><b>血球</b>:紅血球最多(7–8μm、壽命約120天);白血球最多嗜中性、『最少嗜鹼性』;血小板為巨核細胞碎片『無核』。嗜天青顆粒=溶酶體。MEP=血小板+紅血球共同前驅。</p><p><b>紅血球生成</b>:前母→嗜鹼性母→多染性母(『最後可分裂』)→『正母紅血球(不再分裂)』→網狀紅血球→成熟,受EPO調控。</p><p>嗜鹼性球與肥大細胞功能/來源相近(過敏、IgE);周細胞具間質幹細胞樣多潛能。</p>"},"HI4軟骨與骨":{"title":"軟骨類型、骨細胞與骨化","html":"<p><b>軟骨</b>:『無血管/神經/淋巴』、養分靠擴散。陷窩容納軟骨細胞(緻密結締組織無陷窩)。透明軟骨(第II型膠原)、彈性軟骨有軟骨膜→可『附加性生長』;纖維軟骨無軟骨膜。關節軟骨表面『無軟骨膜』(難修復)。</p><p><b>骨細胞</b>:骨母細胞(分泌『類骨質』)→被埋成骨細胞(壽命最長、藉『骨小管內間隙接合』交換物質);蝕骨細胞(『單核球系、多核、嗜酸、皺褶緣』吸收骨、RANKL調控、壽命最短)。</p><p><b>骨化</b>:膜內骨化→扁平骨;軟骨內骨化→長骨(『初級骨化中心在骨幹、次級在骨骺』)。直徑加粗靠『骨外膜附加性生長』、長度靠骨骺板。間接骨折癒合經『軟骨性軟痂』。</p>"},"HI5肌肉組織":{"title":"骨骼肌、心肌與平滑肌","html":"<p><b>骨骼肌</b>:多核、橫紋;一個細胞=『肌纖維』。T小管(肌纖維膜內凹)+兩終池(肌漿網)=『三聯體(triad)』,位『A-I交接處』;細胞間『無間隙接合』。三層鞘:肌外膜/肌束膜/肌內膜;肌纖維膜=肌細胞膜。肌梭(含核袋/核鏈纖維+環螺旋末梢)為本體感覺受器。</p><p><b>心肌</b>:單/雙核、有『間盤(黏著+橋粒+間隙接合,無緊密接合)』;蒲金氏纖維=特化心肌(傳導最快)。</p><p><b>平滑肌</b>:單核(收縮時核螺旋變形)、無橫紋無T小管、有『緻密體(細絲+中間絲固著點)』、有caveolae、外覆外板、間隙接合電耦合;可肥大增生(如孕期子宮)。</p>"},"HI6神經組織":{"title":"神經元、神經膠與周邊神經","html":"<p><b>神經元形態</b>:多極(運動/自主節後)、雙極(視網膜雙極/嗅/前庭/螺旋神經節)、偽單極(背根/三叉感覺節)。</p><p><b>神經膠</b>:CNS—星狀膠(支持/血腦屏障)、『寡突膠(形成CNS髓鞘,一個包多條)』、微膠(免疫吞噬、清除髓鞘碎片)、室管膜(襯腦室)。PNS—『許旺細胞(髓鞘;無髓鞘纖維以Remak束包繞但不成髓鞘)』、衛星細胞(圍神經節胞體、不成髓鞘)。</p><p><b>周邊神經鞘</b>:神經外膜(緻密結締組織)、神經束膜(『血-神經屏障』)、神經內膜(膠原由『許旺細胞』合成)。CNS無髓鞘軸突外『無結締組織』。</p><p><b>其他</b>:腦泡—小腦源『後腦』(非前腦);成人CNS原發瘤以『星狀膠瘤』最常見;成體神經新生在『嗅球、海馬』;血腦屏障遍佈全CNS(非僅大腦)、室周器官缺BBB。</p>"},"HI7循環淋巴與免疫":{"title":"血管壁、微血管與淋巴器官","html":"<p><b>血管壁</b>:內/中/外三膜。大靜脈(下腔)『外膜最厚、含縱走平滑肌』;肌肉型動脈有明顯內外彈性膜;動脈粥狀硬化在『內膜』(平滑肌遷入增生+脂質)。微血管=單層內皮+基底膜:連續型(肌肉/CNS血腦屏障)、窗孔型(腎絲球/腸/內分泌)、竇狀(肝脾骨髓)。</p><p><b>淋巴</b>:微管盲端起始、『基底膜不完整、通透性高』(瓣膜在較大淋巴管)。淋巴結內流向:輸入→被膜下竇→小樑竇→髓質竇→輸出。</p><p><b>淋巴器官</b>:胸腺(T細胞、『無淋巴小結』、有哈氏小體);脾(過濾『血液』、『無輸入淋巴管』、白髓圍中央動脈、紅血球經有鞘微血管『開放式』入脾索);派亞氏斑=迴腸GALT。胎盤三級絨毛內出現胎兒血管。</p>"},"HI8呼吸系統":{"title":"傳導部上皮與肺泡","html":"<p><b>傳導部</b>:鼻/氣管/支氣管=帶纖毛偽複層柱狀+杯狀細胞(黏液纖毛清除);軟骨皆『透明軟骨』、皆有平滑肌與彈性纖維。『終末細支氣管無杯狀細胞與軟骨』,由『Club細胞』取代。</p><p><b>肺泡</b>:『第一型肺泡細胞』=極薄扁平、覆95%表面、與內皮組成『氣血屏障』;『第二型』=立方、含層狀體、『分泌表面張力素』、為肺泡幹細胞(早產不足→RDS)。肺泡巨噬細胞(塵/心衰細胞)吞噬;『結核菌可在巨噬細胞內存活』。</p><p>嗅覺上皮=偽複層(雙極嗅受器+支持+基底細胞+刷細胞),『無杯狀細胞』(黏液由鮑曼氏腺)。肺氣腫=終末細支氣管以遠氣腔永久擴大伴壁破壞。</p>"},"HI9消化系統":{"title":"消化管分層、胃腸與肝膽胰","html":"<p><b>消化管四層</b>:黏膜(上皮+固有層+黏膜肌層)、黏膜下層、肌外層(『歐巴氏肌間神經叢調蠕動』、梅斯納氏黏膜下神經叢調分泌)、外膜/漿膜。食道『黏膜層(賁門腺)與黏膜下層(食道腺)皆有黏液腺』。</p><p><b>胃</b>:胃底腺含壁細胞(HCl+內在因子、胞內小管、嗜伊紅)、主細胞(胃蛋白酶原、『嗜鹼』);胃黏膜『無杯狀細胞』(出現=腸化生)。幽門=深胃小凹+分支黏液腺+環走肌增厚(括約肌)。</p><p><b>小腸</b>:絨毛+環皺襞+微絨毛三級放大;十二指腸=『Brunner腺(黏膜下)』;迴腸=最多杯狀細胞+『派亞氏斑』;潘氏細胞在隱窩。大腸=富杯狀細胞、無絨毛、『結腸帶由縱走肌』。</p><p><b>肝膽</b>:肝腺泡zone1(近肝門血氧佳、最耐缺血最先再生、毒物先反應)、zone3(近中央靜脈、最先缺血壞死);『狄氏腔』在肝細胞與肝竇(不連續有孔內皮)間、含『伊東細胞(儲維A、活化致纖維化)』;庫弗氏=肝竇巨噬細胞;膽汁經『赫林氏管』。膽囊=單層柱狀、『無黏膜肌層』、Rokitansky-Aschoff竇=黏膜憩室。舌:絲狀乳突最多最小無味蕾、輪廓乳突最大最少多味蕾。</p>"},"HI10泌尿與男女生殖系統":{"title":"腎元、生精與卵巢濾泡","html":"<p><b>腎</b>:腎小體/近曲/遠曲在皮質,亨利氏環細段/集尿管在髓質;近曲小管『刷狀緣最發達』(再吸收65–70%);『近腎絲球器』=緻密斑(遠端小管特化、感NaCl)+JG細胞(入球小動脈平滑肌、分泌腎素)+球外系膜=RAAS樞紐。髓質射線含直小管(不含曲小管)。</p><p><b>男性生殖</b>:生精序列精原(接基底板)→精母→精細胞→『精子成型(spermiogenesis,形成頂體、鞭毛、不再分裂)』;血睪屏障由Sertoli緊密接合構成;Leydig細胞分泌睪固酮。輸精管三層厚平滑肌;副睪/輸精管帶『靜纖毛』;『輸出小管=纖毛柱狀高矮交替、腔面波浪狀』(本主題附圖題)。精液=精囊(果糖)+前列腺(PSA)+尿道球腺,海綿體不分泌。</p><p><b>女性生殖</b>:原始濾泡『無透明帶』,初級濾泡起出現透明帶(ZP3精卵辨識);顆粒細胞間『間隙接合』協調;『閉鎖濾泡』形成波浪狀『玻璃膜』;『黃體在排卵後』由顆粒層+內鞘黃體化(顆粒層黃體細胞較大);無受精→白體。</p>"},"HI11內分泌皮膚與感覺器官":{"title":"內分泌腺、皮膚與眼耳","html":"<p><b>內分泌</b>:腎上腺皮質球狀帶(醛固酮)/束狀帶(『脂滴多、糖皮質素』)/網狀帶(性類固醇);髓質嗜鉻細胞(『與交感神經元同源、神經嵴』、兒茶酚胺)。腦下垂體無導管(『無閏管』)、有竇狀微血管、嗜色/嫌色細胞。胰島=胰臟內分泌部;肝細胞兼『外分泌(膽汁)+類內分泌(血漿蛋白)』。</p><p><b>皮膚</b>:角質細胞最多;基底層有黑色素細胞與『默克耳細胞(觸覺)』;棘狀層有『蘭格罕氏細胞(抗原呈現、Birbeck顆粒)』。手掌『無毛厚皮』只有汗腺(無毛囊/豎毛肌/皮脂腺)。毛囊由『真皮乳頭』供血。游離神經末梢最遠達『顆粒層』。老化→角質細胞萎縮、蘭氏細胞與纖維母細胞減少。</p><p><b>感覺器官</b>:角膜上皮約5層未角化複層扁平;眼發育—視杯外層→色素上皮、玻璃體血管近側端→視網膜中央動靜脈。內耳—『壺腹嵴/頂帽感角加速』、『囊斑/耳石感直線加速』;耳蝸導管內為內淋巴。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^HI(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
