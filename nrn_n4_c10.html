["C"],"topic":"8急重症其他借題","topic_num":"小兒急重症事故傷害與中毒","topic_code":"C10","q_num":77,"roc_year":"107","exam_code":"107110","src":"民國107年","options":{"A":"腎臟排出過多氫離子與鉀離子,造成代謝性酸中毒","B":"依醫囑給與口服kayexalate,增加鉀離子的吸收","C":"少尿期,體液容積過多,宜限制水分攝入","D":"少尿期應攝入高鉀、高鈉飲食,矯正電解質不平衡"},"img":""},{"id":"111110-N4-69","code":"111110","roc":"111","cat":"N4","catname":"產兒科護理學","num":69,"stem":"有關腸病毒的預防與環境消毒,下列何者正確?","opts":{"A":"利用75%的酒精消毒玩具可預防腸病毒感染","B":"接觸腸病毒幼童,可口服3 天巨環黴素預防性投藥","C":"兒童的分泌物或排泄物污染的物品建議使用1,000 ppm 的含氯漂白水消毒","D":"冷凍可殺滅腸病毒"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"8急重症其他借題","topic_num":"小兒急重症事故傷害與中毒","topic_code":"C10","q_num":69,"roc_year":"111","exam_code":"111110","src":"民國111年","options":{"A":"利用75%的酒精消毒玩具可預防腸病毒感染","B":"接觸腸病毒幼童,可口服3 天巨環黴素預防性投藥","C":"兒童的分泌物或排泄物污染的物品建議使用1,000 ppm 的含氯漂白水消毒","D":"冷凍可殺滅腸病毒"},"img":""},{"id":"112110-N4-71","code":"112110","roc":"112","cat":"N4","catname":"產兒科護理學","num":71,"stem":"有關苯酮尿症病童之臨床症狀,下列敘述何者正確?","opts":{"A":"出生即出現酮酸中毒","B":"一般症狀包括嘔吐、尿、體汗有霉臭味","C":"皮膚色澤呈現潮濕紅潤,髮色烏黑","D":"黃疸、生長遲緩、白內障"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"8急重症其他借題","topic_num":"小兒急重症事故傷害與中毒","topic_code":"C10","q_num":71,"roc_year":"112","exam_code":"112110","src":"民國112年","options":{"A":"出生即出現酮酸中毒","B":"一般症狀包括嘔吐、尿、體汗有霉臭味","C":"皮膚色澤呈現潮濕紅潤,髮色烏黑","D":"黃疸、生長遲緩、白內障"},"img":""}],E={"101030-N4-42":{"quick":"嬰兒(<1歲)哽塞窒息：俯臥頭低於軀幹、在背後肩胛骨間叩擊5下→翻正壓胸5下。","detail":{"background":"未滿1歲嬰兒「異物哽塞(完全阻塞)」的急救採「「背擊5下＋胸推5下」交替」(不可用哈姆立克腹部推擠，以免傷及內臟)。施救者讓嬰兒「俯臥、「頭「低於」軀幹」、跨於前臂上」，以「手掌在「背後「肩胛骨間」」「叩擊5下」」(B)，再「翻正、用兩指在兩乳頭連線中央下方「壓胸5下」」，交替直到異物排出或失去意識。","options":{"A":"頭應「低於」軀幹(利重力排出)，非高於軀幹。","B":"正確。在背後肩胛骨間叩擊5下(嬰兒背擊法)。","C":"嬰兒「不用」上腹部施壓(避免傷內臟)。","D":"劍突下拳頭推擠是「成人」哈姆立克法，嬰兒不適用。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"103030-N4-46":{"quick":"11個月嬰兒嗆到呼吸困難發黑：頭低於軀幹、背後肩胛骨間拍擊5下＋兩指壓胸5下。","detail":{"background":"小波(11個月、嗆到、呼吸困難、臉色發黑＝完全阻塞)應採「嬰兒哽塞急救法」：(D)「讓嬰兒「頭低於軀幹」，用力在「背後肩胛骨間「拍擊5下」」，再以「兩手指「壓胸5次」」交替」，直到異物排出。嬰兒「不可」用哈姆立克腹部推擠(傷內臟)；意識清醒的完全阻塞應先做背擊胸推，而非先吹氣或壓胸。","options":{"A":"有異物阻塞時先排除異物，非立即捏鼻口對口吹氣。","B":"哈姆立克(腹部推擠)是成人/兒童用，嬰兒不適用。","C":"只壓胸而無背擊，不完整。","D":"正確。頭低於軀幹、背擊5下＋壓胸5下交替(嬰兒哽塞急救)。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"105090-N4-41":{"quick":"5歲幼兒噎到無法發聲呼吸困難：施壓劍突下(哈姆立克腹部推擠法)。","detail":{"background":"仔仔(5歲、噎到、「無法發聲、呼吸困難」＝完全阻塞)，1歲以上兒童/成人採「「哈姆立克法(腹部推擠)」」：施救者由後環抱，「拳頭置於「肚臍上方、劍突下」」，「快速向上向內推擠」(A)，直到異物排出。意識清醒者不做人工呼吸、不做心外按摩、1歲以上不用背擊。","options":{"A":"正確。施壓劍突下(哈姆立克腹部推擠法)，適用1歲以上。","B":"病人仍有意識且呼吸道阻塞，先排除異物，非人工呼吸。","C":"背擊(扣擊背部)主要用於嬰兒，非5歲兒童的首選。","D":"病人有意識有脈搏，不做心外按摩。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"107030-N4-59":{"quick":"7個月嬰兒噎到：俯臥跨於施救者手臂、頭低於軀幹、背後肩胛骨間叩擊5下。","detail":{"background":"小玲(7個月、蒟蒻噎到)屬未滿1歲嬰兒哽塞，正確處置是(B)：「採「俯臥」、跨於施救者「手臂(背)」上、「頭「低於」軀幹」，以「手掌在「背後肩胛骨間「叩擊5下」」」，再翻正壓胸5下交替。嬰兒不用哈姆立克(劍突下推擠)、不用成人壓胸15次的舊比率，意識清醒不先做人工呼吸。","options":{"A":"胸部重擊執行心外按摩是用於「無脈搏」者，本題是哽塞。","B":"正確。俯臥、頭低於軀幹、背後肩胛骨間叩擊5下(嬰兒背擊)。","C":"劍突下拳頭重壓是哈姆立克(腹部推擠)，嬰兒不適用。","D":"有異物阻塞先排除異物，非先人工呼吸；且壓胸15次為舊比率。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"108020-N4-41":{"quick":"異物吸入造成「輕微(部分)」支氣管阻塞的症狀「錯誤」者＝無法說話。","detail":{"background":"異物吸入若造成「「輕微(部分)」呼吸道阻塞」，病人「仍能「咳嗽、發聲、呼吸(雖有喘鳴)」」，此時應「鼓勵其用力咳嗽」自行排出，不貿然拍背。症狀「錯誤」者為(C)「無法說話」——「無法說話/發聲、無法咳嗽、發紺」是「「完全(嚴重)阻塞」」的表現，需立即背擊胸推/哈姆立克。其餘 A 作嘔、B 咳嗽、D 哮喘(喘鳴)為部分阻塞的表現。","options":{"A":"作嘔是部分阻塞的症狀。","B":"咳嗽是部分阻塞的症狀(且應鼓勵咳嗽)。","C":"正確(本題選錯誤者)。無法說話屬完全阻塞，非輕微阻塞。","D":"哮喘(喘鳴)是部分阻塞的症狀。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"103030-N4-45":{"quick":"執行1歲以下嬰兒急救時，檢查脈搏的部位＝肱動脈。","detail":{"background":"嬰兒(<1歲)CPR 時「檢查脈搏」應觸摸「「肱動脈(上臂內側)」」(D)——嬰兒頸部短胖、頸動脈不易觸及，故改用肱動脈(或股動脈)；1歲以上兒童及成人則用「頸動脈」。檢查脈搏時間應在「10秒內」，無脈搏或心跳<60次/分且灌流不足即開始胸外按壓。","options":{"A":"膝膕動脈不用於嬰兒急救脈搏檢查。","B":"足背動脈不適合急救時快速觸摸。","C":"橈動脈在嬰兒不易觸及，非首選。","D":"正確。嬰兒檢查脈搏用肱動脈。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"105030-N4-41":{"quick":"疑似頸椎損傷的 CPR「錯誤」者＝立即採壓額抬下巴法。","detail":{"background":"王小弟(車禍、疑似「頸椎損傷」、心跳停止)，打開呼吸道時「「不可「壓額抬下巴(會使頸部後仰)」」，應改用「「下顎(推)前推法(jaw thrust)」」，以「固定頸椎、避免二度損傷」。故「錯誤」者為(A)。其餘正確：B 在兩乳頭連線中央(下半段胸骨)按壓、C 按壓深度約胸廓前後徑的1/3~1/2、D 單人急救按壓與通氣比為30:2。","options":{"A":"正確(本題選錯誤者)。疑似頸椎損傷應用下顎前推法，非壓額抬下巴。","B":"在兩乳頭連線中央執行心外按摩，正確。","C":"按壓深度約1/3~1/2胸廓，正確。","D":"單人急救按壓:通氣為30:2，正確。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"106110-N4-44":{"quick":"嬰兒心肺復甦術「錯誤」者＝於兩乳頭連線中央按壓。","detail":{"background":"嬰兒(<1歲)CPR 的按壓「部位」應在「兩乳頭連線中央「「下方」」(胸骨下半段)」，避免壓到劍突。故「錯誤」者為(A)「於兩乳頭連線中央按壓」(缺「下方」)。其餘正確：B 用「兩手指(單人)」或雙手環抱兩拇指(雙人)按壓、C 按壓深度約「4 cm(約胸廓1/3)」、D 速率「每分鐘100~120次」。","options":{"A":"正確(本題選錯誤者)。應在兩乳頭連線中央「下方」，非中央。","B":"單人用兩手指進行按壓，正確。","C":"按壓深度約4 cm(胸廓1/3)，正確。","D":"速率約每分鐘100~120次，正確。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"108020-N4-55":{"quick":"嬰兒心肺復甦術「正確」者＝每分鐘壓胸100~120下。","detail":{"background":"嬰兒 CPR 的正確敘述為(D)「每分鐘壓胸「100~120下」」。其餘錯誤：A 發現無反應無呼吸應「先「立即 CPR(壓胸30:2)」，「無旁人時做「2分鐘」CPR 再求救」」(目睹猝倒例外)，非先打119；B 採「C-A-B」順序，「先「壓胸30下」再吹2口氣」，非先吹氣；C 嬰兒人工呼吸採「口對「口鼻」」，「不需」捏鼻子。","options":{"A":"無旁人時應先做2分鐘 CPR 再求救(C-A-B)，非先打119。","B":"採 C-A-B：先壓胸30下再吹2口氣，非先吹氣。","C":"嬰兒採口對口鼻人工呼吸，不需捏鼻子。","D":"正確。每分鐘壓胸100~120下。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"108110-N4-53":{"quick":"嬰兒急救程序「正確」者＝可用刺(彈)腳跟的方式檢查嬰兒是否失去意識。","detail":{"background":"嬰兒急救程序的正確敘述為(A)「可用「拍打/彈「腳底(腳跟)」」、輕拍肩膀並呼叫，檢查嬰兒是否「有反應(意識)」」。其餘錯誤：B 嬰兒人工呼吸採「口對「口鼻」」，「不」捏鼻子；C 嬰兒檢查脈搏用「肱動脈」(非頸動脈)，時間在「10秒內」；D 疑似頸部損傷打開呼吸道應用「下顎前推法」，非壓額抬下巴。","options":{"A":"正確。可用刺(彈)腳跟方式檢查嬰兒是否有反應。","B":"嬰兒採口對口鼻人工呼吸，不捏鼻子。","C":"嬰兒檢查脈搏用肱動脈，非頸動脈。","D":"疑似頸損應用下顎前推法，非壓額抬下巴。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"110110-N4-41":{"quick":"3歲兒童 CPR「正確」者＝按壓:通氣單人30:2、雙人15:2。","detail":{"background":"兒童(1歲~青春期)CPR 的正確敘述為(D)「胸部按壓與人工呼吸比例：「單人」施救30:2、「雙人」施救「15:2」」。其餘錯誤：A 兒童心外按摩用「單手掌根(或雙手)」，「不是「兩根手指(嬰兒用)」」，深度約「5 cm(胸廓1/3)」；B 兒童檢查脈搏用「頸動脈或股動脈」(肱動脈是嬰兒用)；C 兒童人工呼吸應「捏住鼻子、口對口」，非同時罩口鼻(口鼻是嬰兒用)。","options":{"A":"兒童用單手掌根按壓，深度約5 cm，非兩指4 cm。","B":"兒童檢查脈搏用頸/股動脈，肱動脈是嬰兒用。","C":"兒童採捏鼻口對口，罩口鼻是嬰兒用。","D":"正確。按壓:通氣單人30:2、雙人15:2。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"111110-N4-44":{"quick":"2個月嬰兒 CPR「錯誤」者＝以單手掌根方式進行心外按摩。","detail":{"background":"小奇(2個月、無呼吸無心跳)CPR，「錯誤」者為(D)「以「單手「掌根」」進行心外按摩」——「嬰兒」應用「「兩手指(單人)」或「雙手環抱兩拇指(雙人)」」按壓，「單手掌根」是「兒童」用法。其餘正確：A 刺(彈)腳跟評估反應、B 10秒內檢查肱動脈、C 按壓部位於兩乳頭連線中央下方。","options":{"A":"刺腳跟評估意識(反應)，正確。","B":"10秒內檢查肱動脈，正確。","C":"按壓部位於兩乳頭連線中央下方，正確。","D":"正確(本題選錯誤者)。嬰兒用兩指或雙拇指環抱，非單手掌根。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"114100-N4-29":{"quick":"為未滿1歲嬰兒執行 CPR「錯誤」者＝壓胸速率每分鐘60~80次。","detail":{"background":"醫護人員為未滿1歲嬰兒執行 CPR，「錯誤」者為(C)「壓胸速率每分鐘「60~80次」」——正確速率為「「100~120次/分」」(60~80過慢)。其餘正確：A 按壓深度為胸部前後徑下壓約「4 cm(約1/3)」、B 按壓部位在「兩乳頭連線中央之下方」、D 用「壓額抬下巴」暢通呼吸道(無頸椎損傷時)。","options":{"A":"按壓深度約4 cm(胸廓1/3)，正確。","B":"按壓部位兩乳頭連線中央下方，正確。","C":"正確(本題選錯誤者)。速率應100~120次/分，非60~80。","D":"無頸損時用壓額抬下巴暢通呼吸道，正確。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"115030-N4-26":{"quick":"2個月嬰兒被棉被悶住無意識的急救「正確」者＝心外按摩位置在兩乳頭連線中央下胸骨處。","detail":{"background":"小華(2個月、被棉被悶住、無意識)的急救正確敘述為(C)「心外按摩位置是「兩乳頭連線中央「下方」之胸骨處」」。其餘錯誤：A 採「C-A-B」順序，先評估、按壓，非立即吹兩口氣；B 嬰兒檢查脈搏用「肱動脈」，非橈動脈；D 「單人」施救嬰兒按壓:通氣為「30:2」(雙人才15:2)。","options":{"A":"採 C-A-B，先評估按壓，非立即吹兩口氣。","B":"嬰兒檢查脈搏用肱動脈，非橈動脈。","C":"正確。心外按摩位置在兩乳頭連線中央下方胸骨處。","D":"單人施救按壓:通氣為30:2，非15:2。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"102030-N4-44":{"quick":"溺水恢復意識後住院應觀察＝排尿情形①、顱內壓增加徵象③、末梢循環⑤。","detail":{"background":"嘉玉溺水、急救恢復意識後住院，須觀察「「溺水後續併發症」」：(1)「排尿情形(評估「腎功能/缺氧性腎損傷」與體液)」、(3)「顱內壓增加徵象(缺氧性「腦水腫」)」、(5)「末梢循環(組織灌流、低體溫)」。而(2)耳朵分泌物、(4)眼睛突出與溺水後續觀察無關。故選①③⑤(C)。溺水重點觀察缺氧後的腦、肺、腎與循環。","options":{"A":"123：含②(耳朵分泌物，與溺水無關)。","B":"124：含②④，皆非。","C":"正確。排尿情形①、顱內壓增加徵象③、末梢循環⑤。","D":"245：含②④，且缺①③，錯誤。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"105090-N4-42":{"quick":"溺水、體溫33°C、知覺遲鈍的回復體溫處置「不適當」者＝提供熱湯並協助餵食。","detail":{"background":"大明溺水、中心體溫33°C(低體溫)、「知覺較遲鈍」。回復體溫「不適當」者為(B)「提供「熱湯並「協助餵食」」」——「意識/知覺「不清(遲鈍)」者「不可由口進食/飲」」，以免「嗆咳、吸入性肺炎」。其餘為適當的「復溫」措施：A 溫熱毯子(被動外復溫)、C 加熱潮濕氧氣(主動核心復溫)、D 電熱器加溫。","options":{"A":"溫熱毯子(被動外復溫)，適當。","B":"正確(本題選不適當者)。知覺遲鈍者不可由口餵食(防吸入)。","C":"加熱潮濕氧氣(主動核心復溫)，適當。","D":"電熱器加溫，適當。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"106110-N4-78":{"quick":"溺水後懷疑腦幹及延髓受損，較可能的呼吸型態＝喘息呼吸與暫停交替(陳施氏呼吸)。","detail":{"background":"小明溺水窒息、缺氧造成「腦幹及延髓(呼吸中樞)受損」，呼吸調節異常，較可能出現(B)「「喘息呼吸與暫停呼吸「交替」」出現(本題稱之為「陳施氏呼吸」型態)」，反映「中樞性呼吸節律的紊亂」。其餘：A 過度換氣型態、C 喟嘆式呼吸、D 不規則穿插暫停的型態各為不同情境的描述，本題答案依題意選 B。","options":{"A":"深快的過度換氣型態非本題最符合的描述。","B":"正確。喘息與暫停交替(陳施氏呼吸)，反映中樞呼吸節律紊亂。","C":"喟嘆式呼吸非腦幹延髓受損的典型描述。","D":"不規則穿插暫停的運動式呼吸非本題答案。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"110110-N4-42":{"quick":"溺水後體溫29°C 的復溫處置「錯誤」者＝給予加溫毯使體溫上升3°C/小時。","detail":{"background":"小強溺水、體溫29°C(中重度低體溫)，復溫應「「緩慢、漸進(約「1°C/小時」)」」，「「過快復溫」會引起「復溫休克、心律不整、復溫後低血壓」」。故「錯誤」者為(D)「使體溫上升「3°C/小時(過快)」」。其餘為適當的主動核心復溫：A 40~45°C加熱潮濕氧氣、B 40~42°C靜脈溫液、C 40~45°C電解液胃灌洗。","options":{"A":"40~45°C加熱潮濕氧氣(核心復溫)，正確。","B":"40~42°C靜脈溫液，正確。","C":"40~45°C電解液胃灌洗(核心復溫)，正確。","D":"正確(本題選錯誤者)。復溫應緩慢(約1°C/小時)，3°C/小時過快。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","AHA PALS 2020"]}},"101030-N4-49":{"quick":"嬰兒與兒童燒傷面積評估(九法則)中，百分比與成人「不同」的部位＝雙下肢。","detail":{"background":"「九法則(rule of nine)」評估燒傷體表面積時，「嬰兒/幼兒「頭部「比例大」、「下肢「比例小」」」，與成人不同(成人頭9%、雙下肢各18%；嬰兒頭約18%、雙下肢較小)。故各部位中百分比「不同」者為(D)「雙下肢」(及頭部)。雙上肢(各9%)、前軀幹、後軀幹(各18%)在嬰兒與成人差異較小。臨床對幼兒多改用「Lund-Browder 圖表」較精確。","options":{"A":"雙上肢(各9%)成人與嬰兒差異小。","B":"前軀幹(18%)差異小。","C":"後軀幹(18%)差異小。","D":"正確。雙下肢(及頭部)在嬰兒與成人的百分比不同。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"102030-N4-43":{"quick":"燒傷急性期病童的營養「不適當」者＝25~40%碳水、40~60%蛋白、15~20%脂肪。","detail":{"background":"燒傷病童因高代謝、組織修復，需「「高熱量、高蛋白」」飲食，但「「醣類(碳水)應佔「最大比例(約50~60%)」」」以供應能量、節省蛋白質作為組織修復。故「不適當」者為(C)「碳水「僅25~40%」、蛋白「高達40~60%」」(比例失當)。其餘正確：A 重度燒傷最初24~72小時(腸蠕動麻痺期)需禁食、B 熱量需求為平常的2~3倍、D 及早補充維生素A、B、C 及礦物質、鐵、鋅。","options":{"A":"重度燒傷最初24~72小時需禁食，正確。","B":"熱量需要量為平常的2~3倍，正確。","C":"正確(本題選不適當者)。醣類應佔最大比例(50~60%)，非蛋白佔40~60%。","D":"及早補充維生素A、B、C 及鐵、鋅，正確。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"102110-N4-43":{"quick":"9個月、8 kg燙傷下腹/後下背/雙下肢/會陰：最初24小時約給1500 c.c.乳酸林格氏液。","detail":{"background":"王小弟(9個月、8 kg、燙傷「下腹+後下背+雙下肢+會陰」)，依嬰兒九法則估算燒傷面積，再以「Parkland 公式」計算復甦輸液：「最初「24小時」總量＝4 mL × 體重 × 燒傷%」，「前「8小時」給「一半」、後16小時給另一半」、首選「乳酸林格氏液」。本題估算最初24小時約需(C)「1500 c.c.乳酸林格氏液」。輸液速度須依尿量、生命徵象調整。","options":{"A":"最初8小時的量(總量的一半)非500 c.c.(估算偏低)。","B":"第二個8小時的量計算不符。","C":"正確。最初24小時約給1500 c.c.乳酸林格氏液。","D":"血漿的補充非此題重點，數值不符。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"104030-N4-42":{"quick":"燒傷兒童復健期的護理指導「不適當」者＝為減輕水腫，關節儘量維持屈曲姿勢。","detail":{"background":"燒傷「復健期」照護的重點是「「預防「攣縮、變形」」」，關節應「維持「「伸展(抗攣縮)」位置」、配合「正確擺位、副木(夾板)固定」」，「「不可」維持「屈曲」」(屈曲易造成攣縮)。故「不適當」者為(B)。其餘：A 以正確擺位及副木固定預防攣縮(正確)；C、D 與壓力(彈性)衣有關——壓力衣應「長時間穿戴(約23小時/天，僅洗澡時脫)」、「持續穿至疤痕成熟不再增生」(以抑制肥厚性疤痕)。","options":{"A":"以正確擺位及夾板固定預防肢體攣縮，正確。","B":"正確(本題選不適當者)。應維持「伸展(抗攣縮)」位，非屈曲。","C":"壓力(彈性)衣須長時間穿戴抑制疤痕(本題以 B 為指定答案)。","D":"彈性衣需持續穿至疤痕不再增生為止，正確。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"104100-N4-44":{"quick":"頸/前肩/手肘/手腕內側三度燒傷的抗攣縮姿勢「正確」者＝上肢維持100~130度外展。","detail":{"background":"小華(頸、前肩、手肘、手腕內側三度燒傷)為「預防攣縮」，各關節應採「「與攣縮方向相反」」的「伸展/外展」位：(C)「上肢(肩)維持「100~130度「外展」」」(對抗腋下攣縮)。其餘錯誤：A 頸部燒傷應「「過度伸展(頸下「不墊枕」)」」，避免低頭攣縮；B 手肘應「伸直」，非屈曲；D 手腕應「背屈(伸展)」，非屈曲。抗攣縮原則＝關節維持伸展、外展位。","options":{"A":"頸部應過度伸展、不墊枕，非在頸下墊枕。","B":"手肘應維持伸直，非屈曲。","C":"正確。上肢(肩)維持100~130度外展(抗腋下攣縮)。","D":"手腕應背屈(伸展)，非屈曲。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"105030-N4-44":{"quick":"幼兒被熱水燙傷的處置步驟＝沖→脫→泡→蓋→送。","detail":{"background":"燒燙傷的急救口訣為「「沖、脫、泡、蓋、送」」(B)：(1)「沖」——以「流動冷水」沖燙傷處15~30分鐘降溫止痛；(2)「脫」——在水中小心「脫(剪)除」未沾黏的衣物；(3)「泡」——持續「浸泡」冷水緩解疼痛；(4)「蓋」——以「乾淨布巾覆蓋」；(5)「送」——盡速「送醫」。不可塗藥膏、不可冰敷、不可弄破水泡。","options":{"A":"脫→沖順序錯誤，應「先沖再脫」。","B":"正確。沖→脫→泡→蓋→送。","C":"順序錯誤(蓋、送不應在泡、脫之前)。","D":"順序錯誤。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"106111-N4-47":{"quick":"14歲下腹及大腿燙傷住院2週的護理「錯誤」者＝鼓勵好朋友在旁陪伴他換藥。","detail":{"background":"小銘(14歲青少年、「下腹及大腿(私密部位)」燙傷)，青少年「重視「身體心像、隱私與自尊」」。「錯誤」者為(C)「鼓勵「好朋友「在旁陪伴「換藥」」」——換藥會「暴露私密部位」，不宜由「同儕」在旁，應「維護其隱私」。其餘正確：A 鼓勵常打電話給好友(維持同儕連結)、B 告知燙傷部位的治療措施、D 鼓勵表達對燙傷部位的感受(處理身體心像)。","options":{"A":"鼓勵常打電話給好友(維持同儕連結)，正確。","B":"告知燙傷部位的治療措施，正確。","C":"正確(本題選錯誤者)。換藥暴露私密部位，不宜同儕陪伴(維護隱私)。","D":"鼓勵表達對燙傷部位的感受，正確。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"107030-N4-42":{"quick":"燒燙傷的敘述「錯誤」者＝三度燒傷面積大於10%為「中度」燒傷。","detail":{"background":"燒燙傷的「錯誤」者為(D)「三度燒傷面積「>10%」為「「中度」」」——依嚴重度分類，「「三度燒傷「>10%」」屬「「重度(嚴重)」」燒傷」(非中度)。其餘正確：A 72小時內為急救(休克)期，需預防低血量休克；B 以大量水沖洗、並除去「未沾黏」的衣物(沾黏者勿強撕)；C 復甦首選「乳酸林格氏液」。","options":{"A":"72小時內為急救期、需預防休克，正確。","B":"以大量水沖洗、除去未沾黏的衣物，正確。","C":"優先給予乳酸林格氏液，正確。","D":"正確(本題選錯誤者)。三度燒傷>10%屬重度，非中度。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"107030-N4-58":{"quick":"1歲嬰兒頭部燙傷，以嬰兒九分法計算的燙傷範圍＝18%。","detail":{"background":"強強(1歲)「頭部」燙傷，依「嬰兒(幼兒)九分法」，「嬰兒「頭部約佔「18%」」」(嬰兒頭大、佔比是成人9%的兩倍)。故燙傷範圍為(C)「18%」。嬰兒體表分布與成人不同：頭18%、軀幹前後各18%、雙上肢各9%、雙下肢較成人小。","options":{"A":"9%是成人頭部的比例，非嬰兒。","B":"14%非嬰兒頭部的比例。","C":"正確。嬰兒頭部約佔18%。","D":"27%過高，非嬰兒頭部單一部位的比例。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"107110-N4-55":{"quick":"2歲、12 kg、30%部分皮層燒傷、已過1小時：每小時輸液速度約103 mL。","detail":{"background":"陳小妹(2歲、12 kg、30%燒傷)，以「Parkland 公式」：24小時總量＝4 × 12 × 30 ＝「1440 mL」，「前8小時」給「一半＝720 mL」。受傷後「已過1小時」，剩餘「7小時」需輸完720 mL：720 ÷ 7 ≈ (D)「103 mL/小時」。輸液速度須依「尿量、生命徵象」隨時調整。","options":{"A":"60 mL/小時計算偏低。","B":"69 mL/小時計算不符。","C":"90 mL/小時計算不符。","D":"正確。720 mL÷7小時≈103 mL/小時。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"108110-N4-55":{"quick":"1歲半、14 kg、30%燒傷：評估輸液是否適當，每小時尿量應約14 mL。","detail":{"background":"評估燒傷病童「輸液(復甦)是否適當」最重要的指標是「「尿量」」。「嬰幼兒/兒童」的「理想尿量為「1 mL/kg/小時」」。陳小妹14 kg，故每小時尿量應約(B)「14 mL(1 × 14)」較適宜。尿量過少表示輸液不足或灌流不佳，須加快滴速。(成人理想尿量約0.5~1 mL/kg/小時。)","options":{"A":"6 mL過少，表示輸液不足。","B":"正確。1 mL/kg/小時 × 14 kg ≈ 14 mL。","C":"30 mL偏多。","D":"60 mL過多。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"110030-N4-43":{"quick":"燒傷病童休克期最初24小時的處置「最適當」者＝優先選擇乳酸林格氏液補充液體。","detail":{"background":"燒傷「休克(急救)期」最初24小時的重點是「「體液復甦、預防低血量休克」」，(A)「優先選擇「乳酸林格氏液(lactated Ringer)」」。其餘不適當：B 休克時周邊循環差，止痛藥應「「靜脈」」給予(皮下/肌肉吸收不良)；C 急救期(腸麻痺)應「禁食」，非高蛋白高熱量飲食；D 「避免攣縮」是「復健期」的重點，非休克期。","options":{"A":"正確。優先選擇乳酸林格氏液補充液體。","B":"休克時止痛藥應靜脈給予(皮下/肌肉吸收不良)。","C":"急救期應禁食，非高蛋白高熱量飲食。","D":"避免攣縮是復健期的重點，非休克期。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"110030-N4-46":{"quick":"造成兒童燒傷急救期(emergent period)休克的主要原因＝低血量性。","detail":{"background":"燒傷「急救(休克)期(最初24~48小時)」，因「微血管通透性增加，大量「血漿/體液「滲漏」」到組織間隙與燒傷創面」，造成「血管內容積驟減」，引起(A)「「低血量性休克」」。故復甦重點是「補充乳酸林格氏液、維持尿量」。並非壓力性、心因性或敗血性(敗血性休克多見於後期感染期)。","options":{"A":"正確。體液大量滲漏造成低血量性休克。","B":"壓力性非燒傷休克的機轉。","C":"心因性休克非燒傷急救期的主因。","D":"敗血性休克多見於後期感染期，非急救期主因。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"110110-N4-45":{"quick":"燒傷急救期低血量休克時，最有效的止痛劑給予途徑＝靜脈注射。","detail":{"background":"小莉處於燒傷急救期、「低血量休克」狀態，「周邊循環灌流差」，「「皮下、肌肉「吸收不穩定」」」，故止痛劑(如嗎啡)應採(D)「「靜脈注射」」，吸收快速、作用可靠、可滴定劑量。鼻部吸入、皮下注射、肌肉注射在休克狀態下吸收差，不適合。","options":{"A":"鼻部吸入非休克時的有效止痛途徑。","B":"皮下注射在休克時吸收差。","C":"肌肉注射在休克時吸收不穩定。","D":"正確。靜脈注射(休克時吸收快速可靠)。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"111110-N4-41":{"quick":"美國燒傷協會兒童「重度」燒燙傷的分類「正確」者＝三度燒燙傷>10%體表面積。","detail":{"background":"依美國燒傷協會(ABA)，兒童「「重度(嚴重)」」燒燙傷的標準包括(D)「「三度(全層)燒燙傷「>10%」體表面積」」(以及二度>20%、合併呼吸道吸入傷、電傷、化學傷、合併其他外傷或重要部位燒傷等)。其餘 A、B、C 的百分比與分類門檻不符。三度>10%即屬重度，需轉燒傷中心。","options":{"A":"二度10~20%非重度的此分類門檻。","B":"二度<10%屬輕度。","C":"三度2~10%非「重度」的門檻。","D":"正確。三度燒燙傷>10%體表面積屬重度。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"112180-N4-26":{"quick":"1歲8個月、12 kg、前胸15%二度燒傷的照護「錯誤」者＝每日熱量需求為1,050 Kcal。","detail":{"background":"小明(1歲8個月、12 kg、前胸15%二度燒傷)的照護，「錯誤」者為(C)「每日熱量需求「1,050 Kcal」」——燒傷因高代謝，熱量需求應「「依公式(如 Curreri：25×kg＋40×%TBSA)計算」」並「高於」一般幼兒，本題以該數值不符判為錯誤。其餘正確：A 最初24小時以乳酸林格氏液補充體液電解質、B 輸液速度依生命徵象與尿量調整、D 傷口處置含每日換藥、清洗、水療、清創及植皮。","options":{"A":"最初24小時以乳酸林格氏液補充，正確。","B":"依生命徵象、尿量調整輸液速度，正確。","C":"正確(本題選錯誤者)。燒傷熱量需求應依公式計算且較高，數值不符。","D":"傷口換藥、清洗、水療、清創、植皮，正確。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"113100-N4-27":{"quick":"左手臂淺二度燙傷(微紅、水泡)當下「最適當」處理＝沖冷水至少15~30分鐘。","detail":{"background":"陳小妹左手臂燙傷、「表皮微紅且出現水泡(淺二度)」，當下最適當的是(A)「立即帶去「沖「冷水」至少「15~30分鐘」」」(降溫、止痛、減少組織傷害)，即燙傷急救「沖」的步驟。其餘錯誤：B 不可用「冰塊直接冰敷」(凍傷、血管收縮使傷害加重)；C 不可立即塗「藥膏/牙膏」(影響評估與清創)；D 不可用「針頭戳破水泡」(增加感染風險)。","options":{"A":"正確。沖冷水至少15~30分鐘(燙傷急救「沖」)。","B":"不可用冰塊直接冰敷(凍傷、加重傷害)。","C":"不可立即塗藥膏(影響評估與清創)。","D":"不可戳破水泡(增加感染風險)。"},"sources":["兒科護理學(新文京/華杏)·燒燙傷","ABA 燒傷指引"]}},"101030-N4-44":{"quick":"誤喝漂白水(腐蝕性)的處置「不適當」者＝給予吐根糖漿催吐。","detail":{"background":"漂白水屬「「腐蝕性(強鹼/次氯酸鹽)」」物質，誤食後「「絕對「禁止催吐」」」(嘔吐使腐蝕性物質再次經過食道，「加重食道、口腔的二次灼傷」，並可能吸入)。故「不適當」者為(B)「給予「吐根糖漿(ipecac)」催吐」。其餘適當：A 2小時內給「水或牛奶「稀釋/中和」」(勿超過15 c.c./kg，以免引發嘔吐)、C 帶容器(殘留物)儘早送醫、D 依醫囑協助內視鏡檢查評估食道燒灼。","options":{"A":"2小時內給水或牛奶稀釋(勿過量)，適當。","B":"正確(本題選不適當者)。腐蝕性物質禁催吐(加重食道灼傷)。","C":"帶容器儘早送醫，適當。","D":"依醫囑協助內視鏡檢查食道燒灼，適當。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"102110-N4-44":{"quick":"乙醯胺基酚(acetaminophen)過量需持續觀察＝肝功能①、凝血酶原時間③、腎功能④。","detail":{"background":"乙醯胺基酚(普拿疼)過量的主要毒性是「「肝毒性(肝細胞壞死)」」，可能進展為「「肝、腎衰竭」」。故需持續觀察：(1)「肝功能(AST/ALT)」、(3)「凝血酶原時間(PT，反映肝合成功能)」、(4)「腎功能」。而(2)血色素、(5)動脈血 PaCO₂ 與其毒性無直接關係。故選①③④(B)。解毒劑為 N-acetylcysteine。","options":{"A":"125：含②⑤(血色素、PaCO₂)，與肝毒性無關。","B":"正確。肝功能①、凝血酶原時間③、腎功能④。","C":"234：含②，且缺①，錯誤。","D":"345：含⑤、缺①，錯誤。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"105090-N4-43":{"quick":"兒童長期接觸玩具上不當的塗料或染料，最容易發生＝鉛中毒。","detail":{"background":"兒童長期啃咬、接觸「「玩具上含「鉛」的「塗料/染料」」」，最容易發生(C)「「鉛中毒」」。鉛經口攝入後蓄積體內，影響「中樞神經(學習障礙、智能受損)、造血(貧血)、腎臟」。處於「口腔期」的嬰幼兒最易因「啃咬掉漆玩具、含鉛物品」而中毒，故玩具應選用「不含鉛、不掉漆」者。","options":{"A":"鐵中毒多因誤食鐵劑/綜合維生素，非玩具塗料。","B":"鋰非玩具塗料常見的中毒物質。","C":"正確。玩具塗料/染料常含鉛，易致鉛中毒。","D":"汞中毒多與溫度計、魚類生物濃縮有關。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"106110-N4-43":{"quick":"幼兒長期大量鉛中毒，最嚴重且造成「不可逆」傷害者＝中樞神經系統病變。","detail":{"background":"幼兒鉛中毒的合併症中，最嚴重且「「不可逆」」者為(A)「「中樞神經系統病變」」——鉛會造成「「鉛腦病變(腦水腫、抽搐、智能與發育「永久」受損、行為與學習障礙)」」。其餘較不嚴重或可逆：B 吞嚥困難、腹瀉(腸胃症狀)、C 貧血(鉛抑制血紅素合成，非紅血球過多)、D 呼吸衰竭非鉛中毒的主要表現。","options":{"A":"正確。中樞神經系統病變(鉛腦病變)最嚴重且不可逆。","B":"腸胃症狀相對較不嚴重。","C":"鉛中毒造成「貧血」，非紅血球過多。","D":"呼吸衰竭非鉛中毒的主要不可逆傷害。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"106111-N4-42":{"quick":"鐵劑中毒給予 Deferoxamine(去鐵胺)若注射速度過快，可能出現＝休克(低血壓)。","detail":{"background":"妞妞(鐵劑中毒、血中鐵460 μg/dL)依醫囑靜脈輸注「Deferoxamine(去鐵胺，鐵螯合劑)」，「「注射速度「過快」」」可能引起「「低血壓、休克」」(及臉部潮紅、心搏過速)。故答案為(D)「休克」。臨床須「控制滴速、監測血壓」，並注意尿液可能呈「紅棕(玫瑰)色(排出鐵-去鐵胺複合物)」。","options":{"A":"便秘非去鐵胺快速注射的副作用。","B":"快速注射造成低「血壓」，非高血壓。","C":"多見心搏「過速」而非過慢。","D":"正確。注射過快可能出現低血壓、休克。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"107030-N4-49":{"quick":"誤食毒物對兒童器官損傷「正確」者＝乙醯氨基酚中毒會造成肝、腎衰竭。","detail":{"background":"誤食毒物的器官損傷，正確者為(D)「「乙醯氨基酚(acetaminophen)」中毒會造成「肝、腎衰竭」」(主要肝毒性)。其餘錯誤：A 鉛中毒以「「中樞神經系統」」受損最嚴重(非肝臟)；B 鐵劑中毒以「「肝臟、腸胃道」」受損為主(非泌尿系統)；C 碳氫化合物(如汽油、煤油)中毒主要造成「「吸入性肺炎、肺損傷」」(非心律不整)。","options":{"A":"鉛中毒以中樞神經系統受損最嚴重，非肝臟。","B":"鐵劑中毒以肝臟、腸胃道為主，非泌尿系統。","C":"碳氫化合物中毒以吸入性肺損傷為主，非心律不整。","D":"正確。乙醯氨基酚中毒會造成肝、腎衰竭。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"109030-N4-41":{"quick":"適合為兒童進行催吐的中毒情況＝4歲兒童誤食有毒磨菇。","detail":{"background":"催吐的「禁忌」包括：「<6個月嬰兒、意識不清/昏迷、抽搐、誤食「腐蝕性(強酸鹼、清潔劑)」或「碳氫化合物(石油類)」」。本題「適合」催吐者為(C)「4歲兒童誤食「有毒磨菇(非腐蝕性、意識清楚)」」。其餘為禁忌：A 小於6個月嬰兒、B 已「昏迷」、D 廚房「清潔劑(腐蝕性)」。(註：現多以洗胃/活性碳取代催吐。)","options":{"A":"小於6個月嬰兒為催吐禁忌。","B":"昏迷者催吐易吸入，為禁忌。","C":"正確。4歲、意識清楚、誤食非腐蝕性的有毒磨菇，適合催吐。","D":"清潔劑(腐蝕性)為催吐禁忌。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"109110-N4-44":{"quick":"預防嬰幼兒鉛中毒、減少鉛吸收的敘述「錯誤」者＝多攝取富含脂肪酸的食物。","detail":{"background":"預防鉛中毒、減少鉛吸收，「錯誤」者為(D)「多攝取「富含「脂肪(酸)」」的食物」——「「高脂肪飲食反而「增加」鉛的「吸收」」」；應「補充「鈣、鐵、維生素C、鋅」」(與鉛競爭吸收、促進排出)，並避免空腹。其餘正確：A 進食前洗手(避免手上鉛塵入口)、B 選不掉漆的安全玩具、C 避免攝入過多罐頭食物(舊式罐頭可能含鉛)。","options":{"A":"進食前洗手，減少鉛入口，正確。","B":"選不掉漆的安全玩具，正確。","C":"避免攝入過多罐頭食物，正確。","D":"正確(本題選錯誤者)。高脂肪飲食增加鉛吸收，應補鈣鐵維C。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"109110-N4-45":{"quick":"乙醯氨基酚(acetaminophen)中毒「正確」者＝常用解毒劑為 N-acetylcysteine(NAC)。","detail":{"background":"強強誤食退燒藥、乙醯氨基酚中毒，正確者為(D)「常用的解毒劑為「「N-acetylcysteine(NAC, mucomyst)」」」(補充穀胱甘肽前驅物、保護肝臟，宜「早期」給予)。其餘錯誤：A naloxone 是「鴉片類」解毒劑，非 acetaminophen；B 誤食「2小時內」應考慮「洗胃/活性碳」減少吸收，非避免；C 活性碳應「早期」使用，非3天後。","options":{"A":"naloxone 是鴉片類解毒劑，非乙醯氨基酚。","B":"2小時內應洗胃/活性碳減少吸收，非避免。","C":"活性碳應早期使用，非3天後。","D":"正確。常用解毒劑為 N-acetylcysteine(NAC)。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"110030-N4-44":{"quick":"3歲誤食包粽用鹼水(腐蝕性)、意識清楚的處置「最適當」者＝2小時內喝清水或牛奶中和。","detail":{"background":"小玉誤食「「鹼水(強鹼、腐蝕性)」」、意識清楚，最適當的是(B)「在「2小時內「喝「清水或牛奶」」稀釋/中和」」(緩解腐蝕)。其餘不適當：A 腐蝕性物質「禁催吐」(加重食道二次灼傷)；C 「禁灌腸/胃灌洗」(可能造成食道/胃穿孔)；D 「deferoxamine(去鐵胺)」是「鐵劑」中毒的解毒劑，與鹼水無關。","options":{"A":"腐蝕性物質禁催吐(加重灼傷)。","B":"正確。2小時內喝清水或牛奶稀釋/中和。","C":"禁灌腸/胃灌洗(恐穿孔)。","D":"去鐵胺是鐵劑中毒的解毒劑，與鹼水無關。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"110110-N4-56":{"quick":"2歲幼兒喝漂白水(腐蝕性)的立即處置＝先給喝一點牛奶。","detail":{"background":"小寶誤喝「「漂白水(腐蝕性)」」，立即處置為(B)「先給「喝一點「牛奶(或清水)」」稀釋/中和」再送醫(牛奶可中和並保護黏膜)。其餘錯誤：A 漱口不足以處理已吞入的腐蝕性物質(宜喝牛奶/水中和)；C 「拍背催吐」屬「催吐」，腐蝕性物質「禁催吐」；D 「吐根糖漿催吐」為腐蝕性物質的禁忌。","options":{"A":"漱口不足，應給喝牛奶或清水中和。","B":"正確。先給喝一點牛奶稀釋/中和再送醫。","C":"拍背催吐是腐蝕性物質的禁忌。","D":"吐根糖漿催吐是腐蝕性物質的禁忌。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"111110-N4-45":{"quick":"兒童誤食可採用「催吐」處理的毒物＝鐵劑。","detail":{"background":"催吐的禁忌是「腐蝕性(強酸鹼、清潔劑)」與「碳氫化合物」。本題可催吐者為(B)「「鐵劑」」(非腐蝕性，若意識清楚、無禁忌可考慮催吐/洗胃)。其餘 A 清潔劑、C 漂白劑、D 洗碗劑「皆屬「腐蝕性」」，「禁止催吐」(以免食道二次灼傷)。","options":{"A":"清潔劑(腐蝕性)禁催吐。","B":"正確。鐵劑非腐蝕性，可考慮催吐。","C":"漂白劑(腐蝕性)禁催吐。","D":"洗碗劑(腐蝕性)禁催吐。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"112030-N4-45":{"quick":"嬰幼兒誤食色彩鮮豔的糖果紙、廣告紙、顏料，易致中樞神經損傷的中毒＝鉛。","detail":{"background":"嬰幼兒(口腔期)誤食「「色彩鮮豔的糖果紙、廣告紙、顏料(常含「鉛」)」」，易引起(A)「「鉛中毒」」，造成「「中樞神經系統損傷(鉛腦病變、智能與發育受損、學習與行為障礙)」」。鉛中毒是兒童常見且嚴重的重金屬中毒，預防重點為「避免接觸含鉛物品、補充鈣鐵」。","options":{"A":"正確。色彩鮮豔印刷品/顏料常含鉛，易致鉛中毒、傷中樞神經。","B":"鐵中毒多因誤食鐵劑，主要傷肝腸胃。","C":"銅非此情境常見的中毒物質。","D":"塑化劑非造成中樞神經急性損傷的此類中毒。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"113030-N4-26":{"quick":"誤食鐵劑的護理指導「最適當」者＝注射去鐵質劑(去鐵胺)後，尿液會呈深褐/紅橙色。","detail":{"background":"小花誤食鐵劑，最適當的指導為(D)「注射「去鐵質劑(deferoxamine)」後，尿液會呈「深褐/紅橙(玫瑰)色」(排出「鐵-去鐵胺複合物」，屬「正常」現象)」。其餘錯誤：A 鐵「會」沉積在肝臟、造成肝損傷；B 鐵劑中毒須「「立即」」處理(觀察腸胃出血、休克等)，非一週後；C 「活性碳「無法」吸附「鐵」」(鐵不被活性碳吸附)。","options":{"A":"鐵會沉積在肝臟、造成肝損傷。","B":"鐵劑中毒須立即處理，非一週後。","C":"活性碳無法吸附鐵。","D":"正確。注射去鐵胺後尿液呈深褐/紅橙色(排出鐵複合物)。"},"sources":["兒科護理學(新文京/華杏)·兒童中毒","毒物諮詢中心"]}},"104030-N4-44":{"quick":"嬰兒搖晃症候群的預防措施「不適當」者＝移動嬰兒時務必給予胸腰部支撐。","detail":{"background":"嬰兒搖晃症候群(劇烈搖晃造成腦/視網膜出血)的預防，「不適當」者為(D)「移動嬰兒時務必給予「「胸腰部」」支撐」——嬰兒頸部肌肉發育未成熟，移動/抱持時應「「支撐「頭頸部」」」(非胸腰部)，以免頭部劇烈晃動。其餘正確：A 教導照顧者安撫嬰兒情緒的技巧、B 勿將嬰兒反覆拋接或架在肩上搖動、C 照顧者陷入憤怒時可暫請他人幫忙照顧。","options":{"A":"教導安撫嬰兒情緒的技巧，正確。","B":"勿反覆拋接或架在肩上搖動，正確。","C":"照顧者憤怒時暫請他人幫忙，正確。","D":"正確(本題選不適當者)。應支撐「頭頸部」，非胸腰部。"},"sources":["兒科護理學(新文京/華杏)·兒童事故傷害","兒少事故傷害防制"]}},"106030-N4-44":{"quick":"8歲被雨傘節(神經性毒蛇)咬傷左小腿的處置「最適宜」者＝以夾板固定患肢且保持低於心臟位置。","detail":{"background":"小亮被「雨傘節(神經性毒蛇)」咬傷，正確處置為(A)「以「副木(夾板)「固定」患肢、保持「「低於心臟」」位置」，「減少活動、延緩毒液擴散」，並儘速送醫施打抗蛇毒血清。其餘錯誤：B 不建議「切開傷口」(增加出血/感染)；C 加壓固定應在「「近心端(非遠心端)」」、且以「彈性繃帶輕度加壓固定」；D 蛇毒中毒是「毒液」非「革蘭氏陽性桿菌感染」。","options":{"A":"正確。夾板固定患肢、保持低於心臟，延緩毒液擴散。","B":"不建議切開傷口(增加出血感染)。","C":"加壓固定應在近心端，非遠心端。","D":"蛇咬是毒液中毒，非革蘭氏陽性桿菌感染。"},"sources":["兒科護理學(新文京/華杏)·兒童事故傷害","兒少事故傷害防制"]}},"110030-N4-54":{"quick":"兒童事故傷害的預防與處置「正確」者＝處於口腔階段的嬰幼兒容易發生異物哽塞或鉛中毒。","detail":{"background":"兒童事故傷害的正確敘述為(D)「處於「「口腔期」」的嬰幼兒喜歡將物品放入口中，容易發生「異物哽塞、誤食(鉛)中毒」」。其餘錯誤：A 誤食「漂白水(腐蝕性)」「禁催吐」(不可給吐根糖漿)；B 溺水「最優先」是「打開呼吸道、CPR(A-B-C/急救)」，非恢復體溫；C 嬰幼兒安全座椅應「面向後、固定於「後座」」(非前座駕駛旁)。","options":{"A":"誤食漂白水(腐蝕性)禁催吐，非給吐根糖漿。","B":"溺水最優先是打開呼吸道、CPR，非恢復體溫。","C":"安全座椅應面向後、固定於後座，非前座。","D":"正確。口腔期嬰幼兒易發生異物哽塞或鉛中毒。"},"sources":["兒科護理學(新文京/華杏)·兒童事故傷害","兒少事故傷害防制"]}},"111110-N4-46":{"quick":"3歲被母貓咬傷手背的處置「錯誤」者＝儘快打破傷風抗毒素。","detail":{"background":"丁丁被「貓咬傷」，「錯誤」者為(A)「「儘快打「破傷風「抗毒素」」」——傷口處理「首要是「大量清水/生理食鹽水「沖洗」傷口」」；破傷風的處置應「「依「疫苗接種史」評估」」是否補打「破傷風疫苗/類毒素」(而非常規「立即」打「抗毒素」)，並評估狂犬病風險。其餘正確：B 沖洗傷口、局部塗抹抗生素藥膏、C 指導傷口紅腫須就醫、D 注意體溫及局部淋巴腫脹(感染徵象)。","options":{"A":"正確(本題選錯誤者)。首要是沖洗傷口；破傷風依疫苗史評估，非儘快打抗毒素。","B":"沖洗傷口、局部塗抹抗生素藥膏，正確。","C":"指導傷口紅腫須就醫，正確。","D":"注意體溫及局部淋巴腫脹(感染徵象)，正確。"},"sources":["兒科護理學(新文京/華杏)·兒童事故傷害","兒少事故傷害防制"]}},"111110-N4-80":{"quick":"5個月嬰兒跌落致顱內出血、顱內壓增高的護理「較不適當」者＝給予多喝水增加體液容積以及腦組織灌流。","detail":{"background":"張小弟跌落致「顱內出血、顱內壓增高(IICP)」，護理「較不適當」者為(C)「給予「「多喝水」增加體液容積」」——IICP 時應「「限制水分(避免腦水腫加重)」」，非多喝水。其餘正確：A 觀察囟門有無緊繃鼓脹、每天測量頭圍、B 鼓勵父母陪伴安撫、減少哭泣不安(哭鬧會升高 ICP)、D 床頭抬高約30~45度、維持頭部中線、避免壓迫頸靜脈(促進靜脈回流、降 ICP)。","options":{"A":"觀察囟門、每天測頭圍，正確。","B":"父母陪伴安撫、減少哭泣(避免升高 ICP)，正確。","C":"正確(本題選較不適當者)。IICP 應限水，非多喝水。","D":"床頭抬高30~45度、頭部中線、避免壓迫頸靜脈，正確。"},"sources":["兒科護理學(新文京/華杏)·兒童事故傷害","兒少事故傷害防制"]}},"112110-N4-43":{"quick":"預防嬰兒搖晃症候群的護理照護「正確」者＝教導照顧者處於憤怒、焦慮時先調適自身情緒。","detail":{"background":"預防嬰兒搖晃症候群，正確者為(D)「教導照顧者「處於「憤怒、焦慮」時，「先「調適自身情緒」」、暫時離開或請他人協助」」(嬰兒哭鬧常是照顧者失控搖晃的誘因)。其餘錯誤：A 劇烈搖晃造成的是「「腦部及視網膜出血」」(非脊柱未成形)；B 移動嬰兒應支撐「「頭頸部」」(非僅背腰部)；C 安全抱持應「「托住頭頸與臀部」」，非雙手置於腋窩抱起雙臂(會使頭部晃動)。","options":{"A":"劇烈搖晃造成腦/視網膜出血，非脊柱未成形。","B":"移動嬰兒應支撐頭頸部，非僅背腰部。","C":"安全抱持應托住頭頸與臀部，非從腋窩抱起雙臂。","D":"正確。教導照顧者憤怒/焦慮時先調適情緒。"},"sources":["兒科護理學(新文京/華杏)·兒童事故傷害","兒少事故傷害防制"]}},"114030-N4-26":{"quick":"兒童急救生命之鏈(pediatric chain of survival)的第一步驟＝預防傷害發生。","detail":{"background":"兒童急救「生命之鏈」五個環節中，「第一步驟」為(A)「「預防(傷害發生)」」——兒童的心跳停止多源於「可預防的「事故傷害、窒息、溺水」」，故「「預防」優先於急救」。後續環節為：及早 CPR → 啟動緊急救護系統 → 及早高級救命術 → 復甦後照護/整合性照護。「預防」是兒童生命之鏈的特色(與成人鏈不同)。","options":{"A":"正確。兒童生命之鏈第一步驟為預防傷害發生。","B":"及早 CPR 是第二環節。","C":"及早高級醫療照護是後段環節。","D":"啟動緊急救護系統是中段環節。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","Nelson 兒科學"]}},"114170-N4-28":{"quick":"1歲3個月幼兒的事故傷害預防指導「最適當」者＝洗澡時先放冷水再放熱水。","detail":{"background":"阿嬤照顧1歲3個月幼兒的事故傷害預防，「最適當」者為(D)「洗澡時「先放「冷水」、再放「熱水」(並先測水溫)」」，可「預防燙傷」。其餘錯誤：A 異物入鼻孔「不可用手挖」(會越塞越深)，應就醫取出；B 安全座椅應「面向後、固定於「後座」」，非前座；C 誤喝「漂白水(腐蝕性)」「禁催吐」(加重食道灼傷)。","options":{"A":"異物入鼻不可用手挖(越塞越深)，應就醫。","B":"安全座椅應固定於後座，非前座。","C":"誤喝漂白水(腐蝕性)禁催吐。","D":"正確。洗澡先放冷水再放熱水(預防燙傷)。"},"sources":["兒科護理學(新文京/華杏)·兒童事故傷害","兒少事故傷害防制"]}},"101030-N4-59":{"quick":"Aminophylline 中毒症狀「不包括」者＝皮膚發熱、起丘疹。","detail":{"background":"Aminophylline(茶鹼類)治療指數狹窄，中毒症狀包括：A 腸胃不適、噁心嘔吐、B 心搏過速、心律不整、C 頭痛、不安與失眠(中樞興奮)、抽搐。「不包括」者為(D)「皮膚發熱、起丘疹」(非茶鹼中毒的典型表現，較像過敏反應)。監測茶鹼血中濃度、心律與腸胃中樞症狀是用藥重點。","options":{"A":"腸胃不適、噁心嘔吐是茶鹼中毒症狀。","B":"心搏過速、心律不整是茶鹼中毒症狀。","C":"頭痛、不安、失眠(中樞興奮)是茶鹼中毒症狀。","D":"正確(本題選不包括者)。皮膚發熱起丘疹非茶鹼中毒的典型表現。"},"sources":["兒科護理學(新文京/華杏)·小兒急救藥物","小兒藥理"]}},"101110-N4-4":{"quick":"兒童急救常用藥物「正確」者＝Dopamine 作用於α接受器，可增加心輸出量。","detail":{"background":"兒童急救藥物的正確敘述為(D)「「Dopamine」作用於「α(及β)接受器」，「增加心收縮力與血壓、心輸出量」」。其餘錯誤：A Epinephrine 注射後心跳「「加快」」(β1作用)，非變緩慢；B Atropine 是「「副交感(迷走)抑制劑」」，藉「解除迷走張力「增加心率」」，非交感抑制劑；C Sodium bicarbonate 用於「「代謝性「酸」血症」」(緩衝劑)，非鹼血症。","options":{"A":"Epinephrine 注射後心跳加快，非變緩慢。","B":"Atropine 是副交感抑制劑(增加心率)，非交感抑制劑。","C":"Sodium bicarbonate 用於酸血症，非鹼血症。","D":"正確。Dopamine 作用於α接受器，可增加心輸出量。"},"sources":["兒科護理學(新文京/華杏)·小兒急救藥物","小兒藥理"]}},"104030-N4-43":{"quick":"小兒急救常用靜脈藥物的注意事項「不適當」者＝輸注 Epinephrine HCL 需注意尿崩的情形。","detail":{"background":"小兒急救靜脈藥物的注意事項，「不適當」者為(B)「輸注「Epinephrine」需注意「「尿崩」」」——Epinephrine 的監測重點是「「心律、血壓、心搏過速、組織灌流」」，與「尿崩」無關。其餘正確：A 輸注 Atropine 需注意血氧濃度(低血氧時心搏過緩可能對 atropine 反應差)、C 輸注 Furosemide 需注意電解質平衡(低血鉀)、D 輸注 Lidocaine 需注意心率變化。","options":{"A":"輸注 Atropine 需注意血氧濃度，正確。","B":"正確(本題選不適當者)。Epinephrine 監測心律血壓，與尿崩無關。","C":"輸注 Furosemide 需注意電解質(低血鉀)，正確。","D":"輸注 Lidocaine 需注意心率變化，正確。"},"sources":["兒科護理學(新文京/華杏)·小兒急救藥物","小兒藥理"]}},"104030-N4-32":{"quick":"子癇前症孕婦接受硫酸鎂(MgSO4)治療的護理「較適當」者＝注意鎂中毒(深部肌腱反射減弱、呼吸受抑制)。","detail":{"background":"李女士接受「硫酸鎂(MgSO4)」(子癇前症/安胎用)，較適當的護理為(D)「須注意「「鎂中毒」」現象，包括「「深部肌腱反射「減弱/消失」、「呼吸受抑制(<12次/分)」、尿量減少」」，並備「「鈣劑(calcium gluconate)」」解毒」。其餘錯誤：A 飲食非低蛋白低鈉；B 上腹痛少尿是「HELLP/子癇前症」表現但非鎂治療的主要監測；C 應採「「左側臥」」促進胎盤灌流(非右側臥)。","options":{"A":"飲食非低蛋白低鈉。","B":"上腹痛少尿是子癇前症表現，非鎂治療的主要監測重點。","C":"應採左側臥促進胎盤灌流，非右側臥。","D":"正確。注意鎂中毒(深部肌腱反射減弱、呼吸抑制)。"},"sources":["兒科護理學(新文京/華杏)·小兒急救藥物","小兒藥理"]}},"106030-N4-33":{"quick":"安胎使用 MgSO4 的護理「正確」者＝可能造成呼吸抑制，應監控呼吸速率宜大於12次/分。","detail":{"background":"沈女士安胎輸注 MgSO4，正確護理為(D)「MgSO4 可能造成「「呼吸抑制」」，應監控「「呼吸速率「宜大於12次/分」」」(<12次/分為中毒徵象)」。其餘錯誤：A 鎂中毒是「「深部肌腱反射「減弱」」」(非增強)；B 解毒劑是「「10%」calcium gluconate」(非「50%」)應置於床邊；C 應監控「「每小時尿量「宜大於30 mL」」」(尿少會使鎂蓄積中毒)，非「少於25 mL」。","options":{"A":"鎂中毒是深部肌腱反射減弱，非增強。","B":"解毒劑是「10%」calcium gluconate，非「50%」。","C":"每小時尿量宜大於30 mL(尿少會使鎂蓄積)，非少於25 mL。","D":"正確。應監控呼吸速率宜大於12次/分(防呼吸抑制)。"},"sources":["兒科護理學(新文京/華杏)·小兒急救藥物","小兒藥理"]}},"107110-N4-72":{"quick":"心臟病嬰兒服用毛地黃的護理指導「正確」者＝發生噁心嘔吐時可能是中毒症狀，需盡速就醫。","detail":{"background":"罹患心臟病嬰兒服用「毛地黃(digoxin)」的指導，正確者為(C)「發生「「噁心、嘔吐(腸胃症狀)」」時，可能是「中毒症狀」，需盡速就醫」(毛地黃中毒早期常見厭食、噁心嘔吐、心律不整)。其餘錯誤：A 服用前量「心尖脈「1分鐘(整分鐘)」」，非30秒；B 嬰兒「心跳「過「慢」(<100次/分)」」才停藥就醫(非高於120)；D 毛地黃宜「「空腹(兩餐間)」」服用、勿與牛奶食物併用以免影響吸收。","options":{"A":"服用前量心尖脈應測1分鐘，非30秒。","B":"嬰兒心跳過「慢」(<100)才停藥，非高於120。","C":"正確。噁心嘔吐可能是毛地黃中毒症狀，需盡速就醫。","D":"毛地黃宜空腹服用，勿與牛奶食物併用。"},"sources":["兒科護理學(新文京/華杏)·小兒急救藥物","小兒藥理"]}},"111030-N4-50":{"quick":"兒童疼痛控制的敘述「正確」者＝naloxone 為鴉片類藥物拮抗劑，可緩解呼吸抑制的副作用。","detail":{"background":"兒童疼痛控制的正確敘述為(B)「「naloxone」為「「鴉片類「拮抗劑」」」，可「緩解(逆轉)鴉片造成的「呼吸抑制」」等副作用」。其餘有誤：A meperidine「不建議」用於「癌末/慢性疼痛」(代謝物 normeperidine 具神經毒性、易致抽搐)；C morphine 為鴉片類，雖可用於術後止痛，惟本題以 B 為最正確敘述；D acetaminophen「不易產生耐受性」，「可」用於兒科疼痛控制。","options":{"A":"meperidine 不建議用於癌末/慢性疼痛(normeperidine 神經毒性)。","B":"正確。naloxone 是鴉片拮抗劑，可緩解呼吸抑制。","C":"morphine 雖可用於術後止痛，本題以 B 為最正確敘述。","D":"acetaminophen 不易產生耐受性，可用於兒科疼痛控制。"},"sources":["兒科護理學(新文京/華杏)·小兒急救藥物","小兒藥理"]}},"103100-N4-71":{"quick":"輸血10分鐘後出現寒顫、發燒、胸悶、頭痛的緊急處理＝立即停止輸血並通知醫師。","detail":{"background":"環環輸血「10分鐘後」即出現「寒顫、發燒、胸悶、頭痛」(疑似「輸血反應」)，緊急處理為(A)「「立即「停止輸血」」、「保留靜脈管路(改打生理食鹽水)」並「通知醫師」」，再評估反應類型、保留血袋與檢體送驗。發生反應時「不可「減緩速率繼續輸」或「等症狀消失」」，必須立即停止以策安全。","options":{"A":"正確。立即停止輸血並通知醫師。","B":"應先停止輸血、通知醫師後再依醫囑處置，非自行給藥。","C":"發生反應不可只減緩速率、等待症狀消失。","D":"應立即「停止」輸血，非減緩速率繼續輸。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","Nelson 兒科學"]}},"105030-N4-74":{"quick":"急性腎衰竭的照護「錯誤」者＝注射碳酸氫鈉，矯正代謝性鹼中毒。","detail":{"background":"急性腎衰竭的照護，「錯誤」者為(A)「注射碳酸氫鈉，矯正「「代謝性「鹼」中毒」」」——急性腎衰竭因「無法排出氫離子」，造成的是「「代謝性「酸」中毒」」(非鹼中毒)，碳酸氫鈉是用來矯正「酸」中毒。其餘正確：B 以少量多次給水、控制水分攝取(少尿期防體液過多)、C 聽診呼吸音評估肺水腫、D 服用 Kayexalate 降低血鉀。","options":{"A":"正確(本題選錯誤者)。急性腎衰竭是代謝性「酸」中毒，非鹼中毒。","B":"少量多次給水、控制水分攝取，正確。","C":"聽診呼吸音評估肺水腫，正確。","D":"服用 Kayexalate 降低鉀離子，正確。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","Nelson 兒科學"]}},"107110-N4-77":{"quick":"急性腎衰竭的敘述「正確」者＝少尿期體液容積過多，宜限制水分攝入。","detail":{"background":"急性腎衰竭的正確敘述為(C)「「少尿期」因「「體液容積過多(水分排不出)」」，宜「「限制水分攝入」」」(防肺水腫、高血壓、心衰竭)。其餘錯誤：A 腎臟「「無法「排出」」氫與鉀離子，造成代謝性酸中毒、「高血鉀」」(非排出過多)；B Kayexalate 是「「降低(交換排出)」血鉀」，非增加吸收；D 少尿期應「「限「鉀」、限「鈉」、限蛋白」」飲食(非高鉀高鈉)。","options":{"A":"腎臟無法排出氫與鉀，造成酸中毒、高血鉀，非排出過多。","B":"Kayexalate 是降低血鉀，非增加吸收。","C":"正確。少尿期體液過多，宜限制水分攝入。","D":"少尿期應限鉀、限鈉飲食，非高鉀高鈉。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","Nelson 兒科學"]}},"106030-N4-57":{"quick":"出血性登革熱的護理措施「錯誤」者＝建議使用水楊酸類解熱鎮痛。","detail":{"background":"出血性登革熱(dengue hemorrhagic fever)的護理，「錯誤」者為(B)「建議使用「「水楊酸類(aspirin)」」解熱鎮痛」——登革熱「「禁用 aspirin/水楊酸、NSAID」」(會「抑制血小板、加重出血」)，發燒應以「「acetaminophen(普拿疼)」」處理。其餘正確：A 觀察腹水、肋膜積水、低血壓等血漿滲漏徵象、C 衛教撲滅埃及斑蚊及白線斑蚊(病媒蚊)、D 屬第二類法定傳染病，須通報當地衛生主管機關。","options":{"A":"觀察腹水、肋膜積水、低血壓(血漿滲漏)，正確。","B":"正確(本題選錯誤者)。登革熱禁用水楊酸(加重出血)，應用 acetaminophen。","C":"撲滅埃及斑蚊及白線斑蚊，正確。","D":"屬第二類法定傳染病，須通報，正確。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","Nelson 兒科學"]}},"107030-N4-68":{"quick":"兒童會厭炎(epiglottitis)的敘述「錯誤」者＝做喉頭細菌培養時，先以壓舌板壓住舌後根採檢。","detail":{"background":"兒童會厭炎的「錯誤」者為(D)「做喉頭細菌培養時，「「先以壓舌板「壓住舌後根」」」——會厭炎「「絕對「禁止」用壓舌板壓舌、刺激咽喉或做喉頭檢查」」，會「誘發「喉頭痙攣、完全氣道阻塞」」而致命；檢查須在「已備好氣管插管/氣切設備」的情況下由專人執行。其餘正確：A 最常見致病菌是 B 型流感嗜血桿菌(Hib)、B 病童採「坐姿、三腳架姿勢」、流口水、C 協助喉頭檢查時宜備妥氣管插管的急救設備。","options":{"A":"最常見致病菌是 B 型流感嗜血桿菌(Hib)，正確。","B":"病童採坐姿、三腳架姿勢，正確。","C":"宜備妥經鼻氣管插管的急救設備，正確。","D":"正確(本題選錯誤者)。禁用壓舌板刺激咽喉(恐誘發完全阻塞)。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","Nelson 兒科學"]}},"112110-N4-71":{"quick":"苯酮尿症(PKU)病童的臨床症狀「正確」者＝一般症狀包括嘔吐，尿液、體汗有霉(鼠)臭味。","detail":{"background":"苯酮尿症(PKU，苯丙胺酸代謝缺陷)的正確症狀為(B)「一般症狀包括「嘔吐」、「尿液、體汗有「霉(鼠)臭味」」(苯丙酮酸堆積)、智能障礙」。其餘錯誤：A 「非」出生即酮酸中毒；C PKU 因黑色素生成減少，「皮膚「白皙」、髮色「淺(金)」、虹膜淺」(非皮膚紅潤、髮色烏黑)；D 黃疸、白內障是「「半乳糖血症」」的表現，非 PKU。新生兒篩檢可早期診斷，需限制苯丙胺酸飲食。","options":{"A":"非出生即酮酸中毒。","B":"正確。嘔吐、尿液與體汗有霉(鼠)臭味。","C":"PKU 皮膚白皙、髮色淺，非皮膚紅潤、髮色烏黑。","D":"黃疸、白內障是半乳糖血症的表現，非 PKU。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","Nelson 兒科學"]}},"106111-N4-52":{"quick":"病童 CPR 後不幸死亡，對其母親的護理「正確」者＝適當處理孩子的遺體後，再讓母親與孩子道別。","detail":{"background":"病童急救無效死亡，對母親的護理正確者為(C)「「適當「整理/處理孩子的遺體」後」，再「讓母親與孩子「道別」」」(讓母親見到較安詳的孩子、給予完成哀悼的機會)。其餘不當：A 讓母親探視「正在進行 CPR」的病童不一定適當(視情況與意願)；B 讓母親「盡快看「急救後未整理的原貌」」會造成創傷；D 「避免母親探視」剝奪其道別、哀悼的權利。應支持母親完成道別與哀傷歷程。","options":{"A":"讓母親探視正在 CPR 的病童不一定適當(視情況)。","B":"讓母親看急救後未整理的原貌會造成創傷。","C":"正確。適當處理遺體後，再讓母親與孩子道別。","D":"避免母親探視會剝奪其道別與哀悼的權利。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","Nelson 兒科學"]}},"111110-N4-69":{"quick":"腸病毒的預防與環境消毒「正確」者＝兒童分泌物/排泄物污染的物品建議用1,000 ppm含氯漂白水消毒。","detail":{"background":"腸病毒的預防與環境消毒，正確者為(C)「兒童「分泌物或排泄物「污染」的物品」建議使用「「1,000 ppm 的「含氯漂白水」」」消毒」(一般環境用500 ppm，受污染處用1,000 ppm)。其餘錯誤：A 「「酒精「對腸病毒「無效」」」(腸病毒為無套膜病毒)；B 「無「預防性抗生素/巨環黴素投藥」」(腸病毒是病毒)；D 「「冷凍「無法」殺滅」腸病毒(須「乾熱、紫外線、含氯漂白水」)。","options":{"A":"75%酒精對腸病毒無效(無套膜病毒)。","B":"腸病毒是病毒，無預防性抗生素投藥。","C":"正確。污染物品用1,000 ppm 含氯漂白水消毒。","D":"冷凍無法殺滅腸病毒。"},"sources":["兒科護理學(新文京/華杏)·小兒急重症","Nelson 兒科學"]}}},TO=["1哽塞窒息與異物吸入", "2心肺復甦術", "3燒燙傷評估與急救處置", "4溺水與體溫過低", "5中毒催吐與解毒劑", "6事故傷害預防咬傷與頭部外傷", "7急重症藥物與毒性監測", "8急重症其他借題"],LEC={"1哽塞窒息與異物吸入":{"title":"哽塞窒息與異物吸入　複習重點","html":"<p>嬰兒(&lt;1歲)完全哽塞用「背擊5下＋胸推5下」交替，頭低於軀幹；1歲以上用哈姆立克(劍突下腹部推擠)。意識清醒不做人工呼吸/壓胸。輕微(部分)阻塞仍能咳嗽發聲，鼓勵咳嗽；無法說話/發紺＝完全阻塞需立即處理。</p>"},"2心肺復甦術":{"title":"心肺復甦術　複習重點","html":"<p>C-A-B 順序、按壓:通氣 嬰兒/兒童單人30:2、雙人15:2，速率100~120次/分。嬰兒檢查脈搏用「肱動脈」、兒童用頸/股動脈；按壓部位兩乳頭連線中央「下方」、深度約胸廓1/3(嬰兒4cm)。嬰兒單人用兩指、兒童用單手掌根。疑頸椎損傷改用「下顎前推法」。</p>"},"3燒燙傷評估與急救處置":{"title":"燒燙傷評估與急救處置　複習重點","html":"<p>急救口訣「沖脫泡蓋送」；不可冰敷、塗藥、戳水泡。嬰兒九法則頭18%、雙下肢較小。Parkland：24h總量＝4×kg×%TBSA，前8h給一半，首選乳酸林格氏液；尿量(兒童1mL/kg/h)是復甦指標。急救期＝低血量休克，止痛走靜脈。三度&gt;10%＝重度。復健期維持「伸展抗攣縮」位、壓力衣長時間穿戴。</p>"},"4溺水與體溫過低":{"title":"溺水與體溫過低　複習重點","html":"<p>溺水最優先打開呼吸道、CPR；後續觀察缺氧造成的腦(IICP)、肺、腎、循環。低體溫者復溫宜緩慢(約1°C/h)，過快會引起復溫休克/心律不整；意識不清者不可由口餵食(防吸入)。</p>"},"5中毒催吐與解毒劑":{"title":"中毒催吐與解毒劑　複習重點","html":"<p>腐蝕性(強酸鹼、漂白水、清潔劑)與碳氫化合物「禁催吐」，誤食腐蝕性給牛奶/水中和、禁灌洗。鉛中毒傷中樞神經(不可逆)；鐵劑解毒用去鐵胺(尿呈紅橙色，活性碳無效)；乙醯氨基酚傷肝腎、解毒用 NAC。催吐禁忌：&lt;6月、昏迷、抽搐、腐蝕性。</p>"},"6事故傷害預防咬傷與頭部外傷":{"title":"事故傷害預防咬傷與頭部外傷　複習重點","html":"<p>口腔期嬰幼兒易哽塞/誤食中毒；安全座椅面向後、固定後座；洗澡先放冷水。神經性毒蛇咬傷固定患肢、低於心臟。搖晃症候群預防＝支撐頭頸、照顧者調適情緒。IICP 限水、床頭抬高30~45度。兒童生命之鏈第一步＝「預防」。</p>"},"7急重症藥物與毒性監測":{"title":"急重症藥物與毒性監測　複習重點","html":"<p>Epinephrine 心跳加快、Atropine 副交感抑制增心率、Dopamine 增心輸出量、NaHCO3 治酸血症。MgSO4 中毒＝深部肌腱反射減弱、呼吸&lt;12次/分、尿少，解毒用10%calcium gluconate。毛地黃噁心嘔吐＝中毒，量心尖脈1分鐘、空腹服。茶鹼中毒＝腸胃/心律/中樞興奮。</p>"},"8急重症其他借題":{"title":"急重症其他借題　複習重點","html":"<p>輸血反應立即停止輸血、保留管路通知醫師。急性腎衰竭少尿期＝代謝性酸中毒、高血鉀、限水限鉀。登革熱禁 aspirin。會厭炎禁壓舌板。PKU 尿汗有鼠臭味、皮膚白皙。腸病毒酒精無效、用1000ppm 含氯漂白水。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c10_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
