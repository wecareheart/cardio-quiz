腎上腺增生(bilateral (micronodular) adrenal hyperplasia)約佔40%。","B":"糖皮質類固醇可抑制性醛固酮增多症 (Glucocorticoid-remediable alsoteronism, GRA)病人 的aldosterone產生受到ACTH 調控而非renin。","C":"PA常見的症狀包括高血壓、低血鉀、代謝性鹼中毒(metabolic alkalosis)等。約有 80% 的PA病人會 有低血鉀。","D":"PA 病人罹患第2型糖尿病的風險增加、但罹患骨質疏鬆的風險降低。","E":"懷疑有PA 的病人要檢測 aldosterone-renin ratio (ARR)時,須注意降血壓藥物的可能影響。沒有停用 乙型阻斷劑(β-blocker)的情況下,如果ARR低,仍然需要考慮PA 的可能。"},"id":"113-102","roc_year":113,"source":"113合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":102,"src":"113合併卷"},{"num":103,"answer":"A","stem":"有關嗜鉻細胞瘤(pheochromocytoma)的描述, 下列哪一項正確?","options":{"A":"嗜鉻細胞瘤病人可能有多尿(polyuria)、多渴(polydipsia)、姿勢性低血壓(orthostatic hypotension)、血糖高、高血鈣等臨牀表現。","B":"使用利尿劑、三環抗憂鬱劑、α及β阻斷劑會減少catecholamine濃度,可能造成尿液檢驗偽陰性(false negative)結果。","C":"嗜鉻細胞瘤的病理常呈現”Zellballen(細胞球)”型態,免疫組織染色通常呈現chromogranin 陽 性,synaptophysin 陰性。","D":"大約65%的嗜鉻細胞瘤病人有遺傳相關的症候群(inherited syndrome),這些病人的發病年齡通常比 偶發性(sporadic)嗜鉻細胞瘤病人年輕大約15歲。","E":"約有5%的腎上腺偶發瘤(adrenal incidentaloma) 是嗜鉻細胞瘤。嗜鉻細胞瘤在未靜脈注射顯影劑的 電腦斷層(unenhanced CT)通常其attenuation <10 HU。"},"id":"113-103","roc_year":113,"source":"113合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":103,"src":"113合併卷"},{"num":72,"answer":"B","stem":"關於原發性醛固酮增多症(hyperaldosteronism)患者進行腎上腺評估的敘述,哪些正確? (1) 精細切面電腦斷層是初步評估腎上腺病灶的首選方法。 (2) 所有確診患者都應立即進行選擇性腎上腺靜脈採樣(AVS)。 (3) 腎上腺靜脈採樣(AVS)可比較左右腎上腺靜脈與下腔靜脈中的醛固酮濃度。 (4) 若電腦顯示單側病灶,且病人年齡小於 40 歲,需避免手術。 (5) AVS的正確導管定位需同時量測皮質醇,並顯示下腔靜脈與腎上腺靜脈間的皮質醇濃度梯度大於3。","options":{"A":"(1)+(2)+(4)。","B":"(1)+(3)+(5)。","C":"(1)+(4)+(5)。","D":"(2)+(3)+(4)。","E":"(3)+(4)+(5)。"},"id":"114-72","roc_year":114,"source":"114合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":72,"src":"114合併卷"},{"num":101,"answer":"A","stem":"有關腎上腺的描述,哪一項最正確?","options":{"A":"鹽皮質激素(mineralocorticoid)主要由腎素-血管張力素-醛固酮系統(renin-angiotensin-aldosterone system, RAAS)調控,下視丘-腦垂體(hypothalamus-pituitary)的損傷並不會顯著影響腎上腺合成醛 固酮(aldosterone)。","B":"庫欣氏症候群的病人常見的臨床表徵包括近端肌病變(proximal myopathy)、無月 經(amenorrhea)、白血球減少、增加深部靜脈栓塞(deep vein thrombosis)及肺栓塞(pulmonary embolism)風險等。","C":"原發性皮質醛固酮症(Primary aldosteronism, PA)的病因,單側腎上腺腫瘤 (adrenal adenoma)約 佔60%,雙側腎上腺(小結節)皮質增生(bilateral (micronodular) adrenal hyperplasia)約佔40%。","D":"血管張力素轉化酶抑制劑(angiotensin converting enzyme inhibitors, ACEIs)會使醛固酮對腎素比 值(aldosterone renin ratio, ARR)上升,而乙型阻斷劑(β blockers)會使ARR 下降。","E":"糖皮素缺乏(glucocorticoid deficiency)病人可能有肌肉痠痛、關節痛、發燒、貧血、淋巴球增加、甲 促素(thyroid stimulating hormone, TSH)下降等臨床表徵 。"},"id":"114-101","roc_year":114,"source":"114合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":101,"src":"114合併卷"},{"num":102,"answer":"B","stem":"有關嗜鉻細胞瘤(pheochromocytoma)的描述, 下列哪一項最正確?","options":{"A":"嗜鉻細胞瘤的好發年紀約為40 歲。過去所謂的”rule of tens” 是指約10% 為腎上腺雙側腫瘤、10%為 腎上腺以外腫瘤、10%為良性腫瘤。","B":"嗜鉻細胞瘤被稱為”偉大的偽裝者”( the great masquerader ) ,常見的臨床表現包括頭痛、冒汗、心 悸、高血壓、焦慮、恐慌、低血壓等,但嗜鉻細胞瘤也可能數年皆無症狀。","C":"為避免造成血壓的急遽變化,嗜鉻細胞瘤的診斷定位最好安排無顯影劑(non-contrast)的電腦斷層或 核磁共振檢查。","D":"嗜鉻細胞瘤的治療以手術切除為首選,開刀前應該先以甲型阻斷劑(α-blockers)控制血壓、補充水 分、再視需要加上乙型阻斷劑(β-blockers)。為避免副作用,最好不用鈣離子通道阻斷劑(calcium channel blockers)或血管張力素轉化酶抑制劑(angiotensin converting enzyme inhibitors, ACEIs)。","E":"第2A型多發性內分泌腫瘤(multiple endocrine neoplasia, MEN)以甲狀腺髓質癌(medullary thyroid carcinoma, MTC)、嗜鉻細胞瘤及副甲狀腺功能亢進為主。而第 2B 型 MEN 通常不包括 MTC。"},"id":"114-102","roc_year":114,"source":"114合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":102,"src":"114合併卷"},{"num":6,"answer":"C","stem":"58歲男性,2年前因腦垂腺 1.6 公分無功能腫瘤開刀切除,此後即服用甲狀腺素治療,病人在健檢發現腰椎Bone nineral Density(BMD) -2.6、左臀BMD -2.7來診,身體檢查無特殊異常,抽血free T4 1.2 ng/dL 、hsTSH <0.1 μU/mL,FSH、LH皆<1.0 mIU/mL,Testosterone 50 ng/dL,除了Vit D 及鈣之補充外,下列那一治療最恰當 ?","options":{"A":"Calcitonin","B":"Carbergoline","C":"Testosterone","D":"減少甲狀腺素劑量","E":"Bisphosphonate"},"id":"106-綜-6","roc_year":106,"source":"106舊站q5綜合卷","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":6,"src":"舊站綜合卷"},{"num":120,"answer":"B","stem":"58歲女性病人,因為血壓低及意識不清被送至急診。她的內分泌檢查顯示 fT4 0.65 ng/dL, hsTSH 0.32 uIU/mL, cortisol (8 am) 5 ug/dL, ACTH 40 pg/mL, GH 2.5 ng/mL, prolactin 6 ng/mL。下列哪一個選項, 最支持腦垂體功能不全(hypopituitarism) 診斷?(參考值: fT4 0.70~1.48 ng/dL; hsTSH 0.35~4.94 uIU/mL; cortisol (8am) 5~25 ug/dL; cortisol (4pm) 2.5~12.5 ug/dL; ACTH 7.4~57.3 pg/mL; GH <8 ng/dL; prolactin 5~23 ng/mL) (1) insulin hyoglycemia test, 當 glucose <40 mg/dL時, GH 為 6 ng/mL. (2) Insulin hypoglycemia test, 當 glucose < 40 mg/dL時, cortisol 為 9 ug/dL. (3) TRH stimulation test, peak TSH 4.25 uIU/mL. (4) TRH stimulation test, peak prolactin 19 ng/mL. (5) CRH stimulation test, peak ACTH 90 pg/mL.","options":{"A":"(1)+(2)","B":"(2)+(3)","C":"(3)+(4)","D":"(1)+(2)+(3)","E":"(2)+(3)+(5)"},"id":"109-120","roc_year":109,"source":"109合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":120,"src":"109合併卷"},{"num":121,"answer":"C","stem":"一位65歲男性病人,主訴有多尿夜尿,他沒有糖尿病,考慮此病人是否有尿崩症 (diabetes insipidus, DI),下列哪一項思考最正確? (1) 讓病人隨意喝水的情況下, 如果24小時尿量 , < 40 mL/kg, 尿滲透壓 > 300 mosm/L, 應該先檢查泌尿系 統是否有異常。 (2) 如果24小時尿量 > 40 mL/kg, 尿滲透壓 < 300 mosm/L, basal plasma arginine vasopressin (AVP) < 1 pg/mL, 應該考慮 central DI 或 primary polydipsia。 (3) 如果腦垂體核磁共振檢查顯示後葉沒有亮點, 可以排除 central DI。 (4) 病人的尿滲透壓在限水4小時後, 由 250 mOsm/L 上升為 400 mOsm/L, 病人可能是 central DI。 (5) 病人在限水4小時以後, 給予 desmopressin (DDAVP), 其尿滲透壓為 250 mOsm/L, 病人可能是 nephrogenic DI。","options":{"A":"(1)+(2)+(4)","B":"(2)+(3)+(5)","C":"(1)+(2)+(5)","D":"(3)+(4)+(5)","E":"(2)+(4)"},"id":"109-121","roc_year":109,"source":"109合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":121,"src":"109合併卷"},{"num":128,"answer":"B","stem":"下列有關男性健康的論述,哪一項正確?","options":{"A":"成人男性荷爾蒙testosterone 濃度隨年紀增加而下降的速度與體重相關,肥胖者下降速度較慢","B":"年老者的 sex-hormone binding globulin (SHBG) 比年輕人高","C":"Total testosterone 濃度與胰島素阻抗 (insulin resistance)無關,但bioavailable testosterone濃度越低 則insulin resistance 越高","D":"Testosterone 治療可以增加腰椎及股骨的骨密度","E":"前列腺癌(Prostate cancer)的病人接受 androgen deprivation therapy 可以減少心血管疾病風險"},"id":"109-128","roc_year":109,"source":"109合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":128,"src":"109合併卷"},{"num":97,"answer":"D","stem":"81歲女性病人,有高血壓及糖尿病病史。因意識不清被送至急診,電腦斷層檢查顯示有腦下垂體腫瘤,抽 血檢查顯示: 血鈉126 mmol/L、血鉀4.1 mmol/L、血糖126 mg/dL、fT4 0.78 ng/dL、hsTSH 4.59 μIU/mL、cortisol (8 am) 18.9 μg/dL、ACTH 7.5 pg/mL、LH 0.67 mIU/mL、FSH 7.2 mIU/mL、GH 0.19 ng/mL、IGF-1 60.3 ng/mL、prolactin 56.3 ng/mL 。下列哪一個描述最正確? (參考值:fT4 0.93~1.70 ng/dL、hsTSH 0.27~4.20 μIU/mL、cortisol: 8 am 5.27~22.45 μg/dL、ACTH: 7.9~47.1 pg/mL、GH 0.01-3.61 ng/mL、prolactin 1.8-20.3 ng/mL、LH (停經後)15.9-54.0 mIU/mL、FSH (停經後) 23.0-116.3 mIU/mL、IGF-1 30.6-208 ng/mL)。 (1)病人的TSH 較參考值高,應該考慮TSHoma。 (2)病人的prolactin 較參考值高,應該診斷為prolactinoma. (3)病人的LH及FSH 較參考值低,應該考慮有hypopituitarism。 (4)應該先給予類固醇治療。 (5)應該先給予甲狀腺素治療。","options":{"A":"1。","B":"2。","C":"3。","D":"(3)+(4)。","E":"(2)+(5)。"},"id":"110-97","roc_year":110,"source":"110合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":97,"src":"110合併卷"},{"num":98,"answer":"E","stem":"下列哪一項有關泌乳激素瘤(prolactinoma)的描述最正確? (1)泌乳激素瘤(prolactinoma)是最常見的腦下垂體腫瘤,約佔有功能的腦下垂體腫瘤(functioning pituitary tumor)的70%以上。 (2)腦下垂體腫瘤可能同時分泌兩種以上的荷爾蒙,例如: GH及 prolactin (PRL), ACTH及 PRL, TSH及 PRL等。 (3)小於1公分的泌乳激素瘤,男女比例約為 1:20;大於1公分的泌乳激素瘤男女比例約為2:1。 (4)血中泌乳激素濃度通常與泌乳激素腫瘤大小成正相關,PRL> 250 μg/L 通常其腫瘤大於1公分 。 (5)有泌乳激素瘤的婦女若考慮懷孕,應使用cabergoline治療。","options":{"A":"(1)+(2)+(4)。","B":"(2)+(3)+(5)。","C":"(1)+(3)+(5)。","D":"(1)+(4)+(5)。","E":"(2)+(4)。"},"id":"110-98","roc_year":110,"source":"110合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":98,"src":"110合併卷"},{"num":102,"answer":"B","stem":"腦垂體腫瘤 (pituitary adenomas) 可能伴隨腦垂體荷爾蒙分泌異常。下列哪一項描述不正確?","options":{"A":"腦垂體腫瘤通常源自單一型態細胞,但可能有兩種以上荷爾蒙的過多分泌。","B":"泌乳激素瘤(prolactinoma)的大小與泌乳激素(prolactin, PRL)濃度相關。PRL濃度大於150 μg/L,其 腫瘤皆大於1 公分。","C":"生長激素(growth hormone, GH)有脈動性(pulsatile)分泌,單一隨意(single, random)檢測的GH濃度無 法用以確定(或排除)肢端肥大症(acromegaly)的診斷,也無法代表疾病的嚴重度。","D":"類胰島素生長因子1 (insulin-like growth factor 1,IGF-1)的濃度會因年紀不同而異。GH可以 使IGF-1的濃度增加,限制熱量攝取(caloric restriction)會使 IGF-1濃度下降。","E":"大多數庫欣氏症(Cushing's disease)的腦垂體腫瘤是小於0.5 公分的 microadenoma。"},"id":"111-102","roc_year":111,"source":"111合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":102,"src":"111合併卷"},{"num":103,"answer":"D","stem":"有關性腺功能異常的描述,下列哪一項最正確?","options":{"A":"Turner's syndrome 會表現 hypogonadotropic hypogonadism。","B":"顱咽瘤(Craniopharygioma)可導致hypergonadotropic hypogonadism。","C":"血液中的睪固酮(testosterone)約80%與白蛋白或性荷爾蒙結合球蛋白(sex hormone-binding globulin, SHBG)結合,約20%屬游離型。","D":"Klinefelter syndrome病人罹患乳癌、糖尿病、骨質疏鬆、全身性紅斑性狼瘡(systemic lupus erythematosus, SLE)等疾病的風險增加,但罹患攝護腺癌的風險降低。","E":"Ketoconazole可以刺激抑制睪固酮(testosterone)的生成,而spironolactone可以阻斷雄激 素(androgen)的作用。"},"id":"111-103","roc_year":111,"source":"111合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":103,"src":"111合併卷"},{"num":104,"answer":"C","stem":"下列有關尿崩症(diabetes insipidus, DI)的描述,哪一項最正確?","options":{"A":"尿崩症的定義為24 小時尿量超過30 ml/公斤體重,且尿滲透壓 <250 mosmol/L。","B":"正常人的腦垂體核磁共振檢查,後葉在T1-weighted midsagittal images 會呈現亮點。此亮點在原發 性多飲症(primary polydipsia)或中樞性尿崩症(central DI)會消失。","C":"某些藥物,例如lithium、amphotericin B、aminoglycosides等可能導致腎源性尿崩症(nephrogenic DI)。","D":"懷孕期尿崩症(gestational DI) 常表現於懷孕的頭三個月,隨孕期之增加而逐漸改善。","E":"Desmopressin(DDAVP)可治療原發性多飲症(primary polydipsia)或中樞性尿崩症(central DI)。腎性 尿崩症 (nephrogenic DI)應以thiazide利尿劑、 amiloride、indomethacin 等藥物治療。"},"id":"111-104","roc_year":111,"source":"111合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":104,"src":"111合併卷"},{"num":137,"answer":"C","stem":"腫瘤關聯症候群(Paraneoplastic syndromes)有時由於腫瘤產製「異位性的荷爾蒙」(ectopic hormone)所 造成。譬如:「Syndrome of inappropriate antidiuretic hormone secretion (SIADH)」常引發臨床的低血鈉 症(hyponatremia)。SIADH常由下列何種「異位性的荷爾蒙」(ectopic hormone) 產製與分泌過多所造成?","options":{"A":"Parathyroid hormone-related protein (PTHrP)。","B":"1,25-Dihydroxyvitamin D。","C":"Vasopressin。","D":"Adrenocorticotropic hormone (ACTH)。","E":"Insulin-like growth factor type II (IGF-II)。"},"id":"111-137","roc_year":111,"source":"111合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":137,"src":"111合併卷"},{"num":78,"answer":"B","stem":"有關尿崩症(diabetes insipidus, DI)的診斷與治療,下列哪一項正確?","options":{"A":"尿崩症的定義為在不限水的情況下,每天每公斤體重尿量大於60 mL (例如: 70公斤重,尿量超過每天 4200 mL)且尿滲透壓小於250 mosmol/L。","B":"病人有尿崩症,且其plasma arginine vasopressin (AVP) < 1 pg/mL,應該安排腦下垂體核磁共振檢 查。","C":"尿崩症的病人如果其腦下垂體核磁共振影像顯示其後葉有白白亮點,一定是中樞性尿崩症 (central DI)。","D":"懷疑有尿崩症的病人在做限水測試時,尿量減少,尿滲透壓增加,此病人比較像是中樞性尿崩症 (central DI)。","E":"腎源性尿崩症(nephrogenic DI)應該使用desmopressin (DDAVP)治療。"},"id":"112-78","roc_year":112,"source":"112合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":78,"src":"112合併卷"},{"num":97,"answer":"B","stem":"有關成人生長激素缺乏(Adult growth hormone deficiency)的治療,那一項描述不正確?","options":{"A":"診斷確定後應給予生長激素治療,生長激素的起始劑量約為每日0.1-0.2mg,逐漸調整至最大劑量每 日1.25mg,維持類胰島素成長因子1(IGF-1)血清濃度在符合年齡與性別的參考值中間。","B":"生長激素治療劑量一般男性多於女性、年長者多於年輕人。","C":"使用生長激素治療的禁忌症包括腫瘤、顱內高血壓、不易控制的糖尿病及視網膜病變等。","D":"長期使用生長激素治療會增加高密度脂蛋白(high-density lipoprotein),但總膽固醇及胰島素不會有明 顯的改變。","E":"第二型糖尿病患者使用生長激素治療初期可能會增加胰島素阻抗,在小心監控及適當調整劑量下,長 期使用生長激素可以減少腹部脂肪並改善血糖控制。"},"id":"112-97","roc_year":112,"source":"112合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":97,"src":"112合併卷"},{"num":62,"answer":"B","stem":"一位38歲女性,腦下垂體腫瘤手術後24小時內,尿量近4000ml,血鈉[Na]自手術前的138 mEq/L上升為150 mEq/L。根據紀錄,病人手術前並無特意增加水分輸注,本身無糖尿病等慢性病史。實驗室檢查:urine osmolality 92 mOsm/kg H2O, urine Na 30 mEq/L。以下處置,何者最適當?","options":{"A":"安排water deprivation test,追蹤plasma AVP or circulating copeptin level,與血鈉[Na]變化。","B":"給予desmopressin (dDAVP)。","C":"給予tolvaptan。","D":"給予lactated Ringer solution或0.9% saline補充體液容積。","E":"給予thiazides、amiloride、NSAID,搭配water (without electrolytes) intake。"},"id":"113-62","roc_year":113,"source":"113合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":62,"src":"113合併卷"},{"num":97,"answer":"C","stem":"下列有關腦垂體功能檢查的描述, 那一項最正確? (1) 胰島素耐性測驗(insulin tolerance test):給予胰島素(0.05-1.15 U/Kg IV),於 -30分、0分、30分、60分、120分測量血糖及生長激素(growth hormone,GH)濃度,若血糖 <40 mg/dL時,GH為 2.5 цg /L,應視為無生長激素缺乏。 (2) 甲狀腺促素釋素測驗(thyrotropin- releasing hormone (TRH) test): 給予TRH 200-500 μg IV,於0分、20分及60分測量甲促素(TSH)及泌乳激素(prolactin),若prolactin上升基礎值的1.5倍,應視為 正常反應。 (3) 胰島素耐性測驗(insulin tolerance test):給予胰島素(0.05-1.15 U/Kg IV),於 -30分、0分、30分、60分、90分測量血糖及可體松(cortisol)濃度,若血糖<40 mg/dL時,cortisol 濃度上 升 >7 μg/dL 或濃度>20 μg/dL,應視為無促腎上腺皮質激素(Adrenocorticotropic hormone, ACTH )之缺 乏。 (4) 口服葡萄糖耐性測驗(oral glucose tolerance test)於0分、30分、60分測量生長激素(GH) 濃度,若GH 濃度為2 μg/L,應視為正常反應。 (5) 於 11 pm 給予dexamethasone 1 mg, 第二天早上8 am 的cortisol 濃度若為4 μg/dL,應視為正常反 應。","options":{"A":"(1)+(3)。","B":"(2)+(4)。","C":"(3)+(5)。","D":"(1)+(2)+(3)。","E":"(2)+(4)+(5)。"},"id":"113-97","roc_year":113,"source":"113合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":97,"src":"113合併卷"},{"num":98,"answer":"E","stem":"下列有關尿崩症(diabetes insipidus, DI)的描述,哪一項不正確?","options":{"A":"希罕氏症候群(Sheehan’s syndrome) 可能造成中樞性尿崩症(central DI)。","B":"鋰鹽(lithium)及cisplatin可能造成腎源性尿崩症 (nephrogenic DI)。","C":"Sarcoidosis 可能造成中樞性尿崩症及腎源性尿崩症。","D":"懷孕第二及第三孕期(second and third trimesters)可能造成尿崩症。","E":"高血鈣(hypercalcemia)及高血鉀(hyperkalemia)可能造成腎源性尿崩症。"},"id":"113-98","roc_year":113,"source":"113合併PDF","topic":"腦下垂體與性腺生殖內分泌","topic_code":"E7","topic_num":7,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":98,"src":"113合併卷"},{"num":137,"answer":"D","stem":"不論糖尿病或非糖尿病患者,血脂異常的疾病根源在於胰島素阻抗性(Insulin resistance) 及 脂蛋白 (lipoprotein)的代謝異常,一般常見的疾病狀態為膽固醇/三酸甘油酯(TG)增加,高密度脂蛋白 (HDL)減少 相關,以下有關血脂異常的疾病狀態敘述,何者為錯誤的?","options":{"A":"血脂異常時,低密度及極低密度脂蛋白(LDL & VLDL)的增加是重要的致病因子,多與肥胖、胰島素 阻抗及遺傳相關,因此肥胖患者,在減輕體重之後,相關檢查數值都會改善","B":"遺傳因子(genetic predisposition)及環境因素(environmental contribution)會同時影響病患血脂之變化","C":"肥胖及胰島素阻抗性增加時,血脂異常的表現經常是TG增加,但是HDL 降低","D":"長期攝取高熱量的醣類食物及持續的飲酒,其血脂異常可發現為增加VLDL及TG,但是降低HDL之血 中濃度","E":"甲狀腺機能不足 (Hypothyroidism) 時,病患之LDL增加,因為原本甲狀腺素可增加肝臟之LDL受 器,降低血中之LDL,但甲狀腺素不足時,血中之LDL之清除效率也會明顯下降"},"id":"109-137","roc_year":109,"source":"109合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":137,"src":"109合併卷"},{"num":139,"answer":"E","stem":"依照 2017台灣高危險病患血脂治療指引,糖尿病患者以生活型態及藥物治療為基本標的,下列敘述,何 者為錯誤的?","options":{"A":"糖尿病患者合併急性冠狀動脈症候群 (acute coronary syndrome)時,低密度脂蛋白 (LDL-C)的控制標 的為 < 55 mg/dL","B":"糖尿病患者高膽固醇血症控制之建議首選藥物為Statins","C":"糖尿病患者合併心血管疾病風險時,低密度脂蛋白 (LDL-C)的控制標的為 < 70 mg/dL","D":"40歲以上之糖尿病患者,在無心血管疾病病史時,低密度脂蛋白 (LDL-C)的控制標的為 < 100 mg/dL","E":"一般控制原則,40歲以下之糖尿病患者,無論是否有心血管疾病病史,均不宜使用Statins類藥物控 制低密度脂蛋白 (LDL-C)"},"id":"109-139","roc_year":109,"source":"109合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":139,"src":"109合併卷"},{"num":112,"answer":"B","stem":"以下有關血脂異常的疾病狀態敘述,何者為錯誤的?","options":{"A":"低密度及極低密度脂蛋白(LDL & VLDL)的增加是重要的致病因子,並且與肥胖、胰島素阻抗相關。","B":"長期攝取大量的醣類食物及持續的飲酒,其血脂異常表現為VLDL及TG增加,以及血中之HDL濃度降 低。","C":"肥胖及胰島素阻抗性增加時,血脂異常的表現主要是TG增加。","D":"甲狀腺機能不足 (Hypothyroidism) 時,血中之LDL濃度會明顯升高,造成心血管疾病。","E":"血脂異常疾病,同時受到遺傳因子(genetic predisposition)及環境因素(environmental contribution)的 影響。"},"id":"110-112","roc_year":110,"source":"110合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":112,"src":"110合併卷"},{"num":105,"answer":"A","stem":"糖尿病與肥胖組成糖胖症(Diabesity),在新陳代謝疾病的範疇內,肥胖已經成為控制糖尿病血糖之重要障 礙,下列之有關糖胖症之描述,何者有誤?","options":{"A":"運動對於體重控制非常重要,實證研究顯示運動強度愈強時,可以降低糖尿病發病率,也可以降低心 臟血管疾病之死亡率。","B":"美國國衛院進行之生活型態研究LOOKAHEAD,針對糖尿病的患者安排營養諮詢及體重管理,雖然 可以改善血糖及HbA1c之控制,但是最終研究結果,卻顯示無法降低糖尿病患者心臟血管疾病死亡 率。","C":"生活型態之於糖尿病飲食控制原則,計畫性飲食及運動降低的體重及脂肪組織,可以預防疾病之進 展。","D":"目前實證醫學上,針對糖胖症之血糖控制,以及有效降低體重,使用Glucagon-like peptide-1 receptor agonist (GLP-1 RA)是治療上常見的考量之一。","E":"過去二十年之減重手術研究,顯示體重減輕之過程中,糖尿病進展及心臟血管死亡率均得到統計學 上,有意義之改善。"},"id":"111-105","roc_year":111,"source":"111合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":105,"src":"111合併卷"},{"num":109,"answer":"D","stem":"李先生,64歲,糖尿病病史為8年,一年前因冠狀動脈疾病(three vessles disease )進行心導管,並置放 支架,目前使用之血糖控藥物為胰島素 insulin degludec (70%)/aspart (30%)。高血壓藥物為每 日Valsatan 160mg 及Amlodipine 5mg ,膽固醇藥物為 Atorvastatin 每日40mg。目前之空腹血糖為 132 mg/dL,HbA1c 為 7.0 %,LDL cholesterol 為 55 mg/dL,HDL cholesterol 48 mg/dL,Triglyceride 為 628 mg/dL,尿液顯示有巨量白蛋白尿 (macroalbuminuria),且有非增殖型視網膜病變 (Non-proliferative retinopathy),目前應該增加使用下列哪一項藥物?","options":{"A":"Ezetimibe。","B":"Cholestyramine。","C":"PCSK9 (Proprotein convertase subtilisin/kexin type9) inhibitor。","D":"Fenofibrate。","E":"Sodium-glucose Cotransporter-2 (SGLT2) Inhibitors。"},"id":"111-109","roc_year":111,"source":"111合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":109,"src":"111合併卷"},{"num":105,"answer":"D","stem":"有關糖胖症(Diabesity),下列相關疾病敘述中,何者有誤?","options":{"A":"依照糖尿病飲食控制原則,計畫性飲食及運動降低的體重,主要是脂肪組織。","B":"心血管疾病密切相關的肥胖型態是中心性腹部肥胖 (central abdominal obesity)。","C":"針對糖尿病的患者安排營養諮詢及體重管理,可以改善血糖及HbA1c之控制,但是目前研究結果顯示 並無法降低糖尿病患者之心臟血管疾病死亡率。","D":"運動對於體重之控制非常重要,運動強度愈強,研究之資料顯示可以降低糖尿病發病率,也可以降低 心臟血管疾病之死亡率。","E":"計畫性飲食及規律之足量運動,可以降低糖尿病發病之機率,其關鍵機轉為控制體重。"},"id":"112-105","roc_year":112,"source":"112合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":105,"src":"112合併卷"},{"num":111,"answer":"B","stem":"56歲,男性,糖尿病病史為10年,曾因冠狀動脈疾病進行心導管置放支架。目前使用藥物包括: 預混型胰 島素 (Premix insulin),高血壓藥物為每日valsatan 160mg 及amlodipine 5mg ,膽固醇藥物為 rosuvastatin 每日20mg。目前HbA1c 為 6.9 %,LDL cholesterol 為 52 mg/dL,HDL cholesterol 39 mg/dL,Triglyceride 為 828 mg/dL,尿液檢查正常,無微量白蛋白尿,輕微背景型視網膜病變 (Background retinopathy),目前應該增加使用下列哪一項藥物?","options":{"A":"Nicotic acid。","B":"Fenofibrate。","C":"Ezetimibe。","D":"Cholestyramine。","E":"PCSK-9 inhibitor。"},"id":"112-111","roc_year":112,"source":"112合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":111,"src":"112合併卷"},{"num":157,"answer":"E","stem":"一位 27歲的男性到皮膚科門診就診,主訴最近一週左右背部、上臂及手背出現無症狀皮膚病灶(如圖1所 示),病人過去病史為肥胖,飲食習慣為高油,並經常喝酒。理學檢查發現粉紅至黃色丘疹散在於背 部、上臂及手背。請問此案例相關敘述何者錯誤?","options":{"A":"鑑別診斷包括傳染性軟疣(molluscum contagiosum)、皮脂腺增生(sebaceous hyperplasia) 、發疹性 黃色瘤(eruptive xanthoma)以及發疹性組織細胞瘤(eruptive histiocytoma)。","B":"診斷需考量病人是否具有代謝症候群之危險因子。","C":"實驗室檢查需包含空腹時血中三酸甘油脂及膽固醇濃度。","D":"此皮膚病灶表現與三酸甘油脂過高最相關。","E":"此皮膚病灶表現與低密度膽固醇過高最相關。"},"id":"113-157","roc_year":113,"source":"113合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQ roorMRRIgfhVA6UUV0UaUY35Uc1arKXxMlEGB979KUQc/e/SiiugwuxRDj+L9KXyvf9KKKEF2Hl/7VOCYPWiimDbJKKKKCT//Z","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":157,"src":"113合併卷"},{"num":105,"answer":"B","stem":"糖尿病與肥胖常同時出現,被稱為糖胖症(Diabesity),兩者在代謝疾病中息息相關。以下關於這兩種疾 病的敘述,何者錯誤?","options":{"A":"根據長期研究顯示,透過規劃良好的飲食與充足規律的運動,可有效降低糖尿病的發生率,主要機轉 在於體重控制。","B":"運動在控制體重方面扮演關鍵角色,且研究指出,運動強度愈高,不僅能降低糖尿病發病風險,亦有 助於減少心血管疾病的死亡率。","C":"美國國家衛生研究院(NIH)進行的 LOOK AHEAD 生活型態研究,針對糖尿病患者實施營養與體重 管理介入,雖有助於血糖與 HbA1c 控制,但研究並未證實此方式能降低糖尿病患者的心血管死亡 率。","D":"除了常見的身體質量指數(Body Mass Index, BMI)之外,與心血管風險更密切相關的肥胖類型為中 央型腹部肥胖(central abdominal obesity)。","E":"根據糖尿病飲食控制的原則,當透過計畫性飲食與運動使體重減輕時,減少的主要為脂肪組織,有助 於延緩病情惡化。"},"id":"114-105","roc_year":114,"source":"114合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":105,"src":"114合併卷"},{"num":108,"answer":"E","stem":"陳先生,72歲,糖尿病病史為20年,五年前因冠狀動脈疾病進行心導管置放支架,目前使用藥物包括: 預 混型胰島素 (Ryzodeg insulin),高血壓藥物為每日 Valsartan 160mg/amlodipine 5mg/Bisoprolol 2.5mg ,膽固醇藥物為 atorvastatin 每日20mg。目前HbA1c 為 6.8%,LDL cholesterol 為 46 mg/dL,HDL cholesterol 39 mg/dL,Triglyceride 為 625 mg/dL,尿液檢查正常,無微量白蛋白尿,但患有背景型視網 膜病變 (Background retinopathy),目前應該增加使用下列哪一項藥物?","options":{"A":"SGLT-2 inhibitor。","B":"Pioglitazone。","C":"PCSK9 inhibitor。","D":"Ezetimibe。","E":"Fenofibrate。"},"id":"114-108","roc_year":114,"source":"114合併PDF","topic":"肥胖、代謝症候群與血脂異常","topic_code":"E8","topic_num":8,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":108,"src":"114合併卷"},{"num":129,"answer":"C","stem":"Medullary thyroid cancer (MTC) 可以表現於多發性內分泌腫瘤 (multiple endocrine neoplasia, MEN),以 下哪一項正確?","options":{"A":"有MTC家族病史的幼兒,最好在5歲以前接受預防性的甲狀腺切除手術","B":"MEN2A 中的 MTC 比 MEN2B中的MTC 更具侵襲性 (more aggressive)","C":"Calcitonin可以當作 MTC 術前診斷及術後追蹤的tumor marker","D":"MTC術後再發頸部淋巴腺轉移應該使用放射性碘治療","E":"MTC若有遠部轉移,其10年存活率約為 50%"},"id":"109-129","roc_year":109,"source":"109合併PDF","topic":"多發性內分泌腫瘤、神經內分泌瘤與自體免疫多腺體症候群","topic_code":"E9","topic_num":9,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":129,"src":"109合併卷"},{"num":101,"answer":"D","stem":"一位53歲男性因為前頸部腫大約一個月。他除了因為腎結石接受過多次體外震波碎石術治療外無其他病 史。身體診察發現其前頸部有約3公分的腫大,可隨吞嚥滑動,表面皮膚正常。他的檢驗結果如下: fT4 1.13 ng/dL、TSH 0.31 μIU/mL、PTH 125.3 pg/mL、血鈣11.9 mg/dL、creatinine 1.2 mg/dL。超音波顯 示甲狀腺囊腫性結節。細針穿刺細胞學檢查顯示sheet of follicular cells with macrophages and colloid。細針穿刺抽到的17 ml液體中,PTH濃度> 3000 pg/mL,thyroglobulin 濃度為211 ng/mL。Tc99m sestamibi scintigraphy 顯示local hot spots at left upper and left lower thyroid beds, and a large cold area at right lobe of thyroid。 (血中濃度參考值: fT4 0.93-1.70 ng/dL、TSH 0.27-4.20 μIU/mL、PTH 18.4-80.1 pg/mL、Ca 8.6-10.2 mg/dL、thyroglobulin <55 ng/mL、creatinine 0.7-1.2 mg/dL) 請問下列哪一項是最可能的正確診斷?","options":{"A":"甲狀腺囊腫性結節。","B":"甲狀腺癌。","C":"單一副甲狀腺腫瘤。","D":"多發性內分泌腫瘤 (multiple endocrine neoplasia)。","E":"次發性副甲狀腺功能亢進"},"id":"110-101","roc_year":110,"source":"110合併PDF","topic":"多發性內分泌腫瘤、神經內分泌瘤與自體免疫多腺體症候群","topic_code":"E9","topic_num":9,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":101,"src":"110合併卷"},{"num":100,"answer":"E","stem":"第二型自體免疫多腺體症候群(Autoimmune polyglandular syndrome 2 , APS2)常見下列疾病,除了:","options":{"A":"原發性腎上腺功能不足(primary adrenal insufficiency)。","B":"甲狀腺功能亢進(hyperthyroidism)。","C":"早發性卵巢衰竭(premature ovarian failure)。","D":"惡性貧血(pernicious anemia)。","E":"慢性黏膜皮膚念珠菌病(chronic mucocutaneous candidiasis)。"},"id":"112-100","roc_year":112,"source":"112合併PDF","topic":"多發性內分泌腫瘤、神經內分泌瘤與自體免疫多腺體症候群","topic_code":"E9","topic_num":9,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":100,"src":"112合併卷"},{"num":104,"answer":"C","stem":"下列有關自體免疫性多發性內分泌症候群(autoimmune polyendocrine syndrome, APS)的描述,哪一項不 正確?","options":{"A":"APS 多見內分泌功能低下,例如Addison’s disease、副甲狀腺功能低下、第一型糖尿病、性腺功能 低下等。但APS 第一型(APS-1)及第二型(APS-2)都可見甲狀腺功能亢進的葛雷夫氏症(Graves’ disease)。","B":"不同亞型APS 的非內分泌表現各有不同。APS-1常見皮膚粘膜念珠菌病(mucocutaneous candidiasis);APS-2會表現乳糜瀉(celiac disease)。","C":"APS-1常以慢性皮膚粘膜念珠菌病為最早的病徵,其發病年齡通常為30-40歲。第一個病徵出現後可 以間隔數年才出現第二個病徵。","D":"APS-2 的病人女性多於男性。APS-2病人對於特定的器官可能有自體免疫抗體(autoantibodies),但 通常沒有針對細胞激素(cytokines)的抗體。","E":"APS-1 的病人以ketoconazole治療皮膚粘膜念珠菌病時,需要小心是否可能造成腎上腺危症(adrenal crisis)。"},"id":"113-104","roc_year":113,"source":"113合併PDF","topic":"多發性內分泌腫瘤、神經內分泌瘤與自體免疫多腺體症候群","topic_code":"E9","topic_num":9,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":104,"src":"113合併卷"},{"num":138,"answer":"D","stem":"只有某些癌症可以抽血檢測某些特定物質來偵測腫瘤的存在或負荷量(loads),稱之為「腫瘤標記」(tumor markers)。下列何者屬於甲狀腺髓質癌(Medullary cancer of the thyroid)特定的「腫瘤標記」?","options":{"A":"Catecholamines。","B":"Human chorionic gonadotropin。","C":"Neuron-specific enolase。","D":"Calcitonin。","E":"Monoclonal immunoglobulin。"},"id":"114-138","roc_year":114,"source":"114合併PDF","topic":"多發性內分泌腫瘤、神經內分泌瘤與自體免疫多腺體症候群","topic_code":"E9","topic_num":9,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":138,"src":"114合併卷"}],E={"100-綜-5":{"quick":"口服藥控制不良的 T2DM,起始注射首選「睡前基礎胰島素(long-acting glargine)」→ D。","detail":{"background":"T2DM 在多種口服降血糖藥(OAD)仍未達標時,ADA/EASD 與台灣指引均建議加上「基礎胰島素(basal insulin)」作為起始注射治療。首選長效胰島素 glargine、detemir、degludec,睡前(bedtime)單次注射能整夜壓制肝糖輸出(hepatic glucose output)、改善空腹血糖(FPG),且作用平穩無明顯峰值,夜間低血糖與體重增加風險均低於預混型(premixed)或多次餐時注射。起始劑量約 10 U 或 0.1–0.2 U/kg/day,依 FPG 每 2–3 天上調(titration)。起始邏輯是「先補基礎、後補餐時(basal-plus→basal-bolus)」;若一開始就加餐時速效胰島素或預混胰島素,既不符合起始順序,也增加低血糖與注射負擔。出題年(100/2011)。","options":{"A":"錯:餐前 Regular 屬「餐時胰島素」,起始階段應先補基礎胰島素而非餐時。","B":"次佳:早餐前 NPH 主要壓制白天血糖,作用峰值在午後,不及睡前基礎胰島素貼近生理且夜間低血糖風險較高。","C":"錯:Lispro 為餐時速效,單獨晚餐前注射無法控制全日及空腹血糖。","D":"正解:睡前 glargine 為起始基礎胰島素首選,平穩壓制空腹高血糖、低血糖風險低。","E":"錯:Mixtard(NPH70/Reg30)含速效成分,起始即用於控制不良者,夜間及餐前低血糖風險高。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"107-綜-7":{"quick":"糖尿病酮酸中毒「不是」診斷第1型糖尿病的必要條件;T1DM 看的是 C-peptide(內生胰島素)與自體抗體 → D。","detail":{"background":"第1型糖尿病(T1DM)本質是自體免疫破壞胰島β細胞,導致「內生胰島素分泌幾近缺乏」。診斷與分型依據是「β細胞功能(內生胰島素儲備)」與「自體免疫證據」:①空腹血清 C-peptide 低、②升糖素(glucagon)刺激或混合餐刺激後 C-peptide 上升幅度小(刺激後與基礎差值小,代表 β 細胞無儲備)、③胰島自體抗體陽性(anti-GAD65、IA-2、ZnT8、ICA、IAA)。C-peptide 與胰島素等莫耳分泌,可在打外源胰島素時仍反映內生分泌,是評估 β 細胞功能的關鍵。糖尿病酮酸中毒(DKA)是 T1DM「常見的表現/併發症」,但並非診斷必要條件——許多 T1DM 以高血糖症狀(三多)起病而未發生 DKA,且 DKA 也可見於 T2DM(ketosis-prone)或誘發狀況。故「DKA」為非必要條件(本題答案 D)。出題年(107/2018)。","options":{"A":"必要:空腹 C-peptide 反映基礎內生胰島素分泌。","B":"必要:升糖素刺激後 C-peptide 反映 β 細胞儲備。","C":"必要:刺激後與基礎 C-peptide 差值小代表無儲備,支持 T1DM。","D":"正解(非必要條件):DKA 是常見表現而非診斷 T1DM 的必要條件。","E":"必要:Anti-GAD65 等胰島自體抗體陽性是自體免疫 T1DM 的證據。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"109-130":{"quick":"SGLT2i 大型試驗主要證實降低「心衰住院與腎病進展」;明確降低「腦中風」並非其主要實證 → B 錯誤。","detail":{"background":"SGLT2 抑制劑(empagliflozin、dapagliflozin、canagliflozin)抑制近端腎小管 SGLT2,阻斷尿糖再吸收使葡萄糖由尿排出,降血糖機轉「與胰島素作用無關」(A 正確),亦帶來滲透性利尿、減重、降血壓。心血管試驗(EMPA-REG OUTCOME、CANVAS、DECLARE-TIMI 58)一致顯示顯著「降低心衰住院」與「延緩腎病變(降 albuminuria、保腎)」(D、E 正確),並降低心血管死亡;但對「致命/非致命腦中風」並無一致顯著的降低效果——這是 SGLT2i 與 GLP-1 RA(後者主要降中風/MACE)在心血管效益上的關鍵區別。故 B(可減少腦中風)為錯誤(本題答案)。臨床最受關注的系統性副作用為「正常血糖性酮酸中毒(euglycemic DKA)」,機轉與其促使升糖素上升、脂解增加生成酮體有關(C 正確)。出題年(109/2020)。","options":{"A":"正確:SGLT2i 機轉獨立於胰島素。","B":"錯誤(本題答案):SGLT2i 主要降心衰住院與腎病進展,降腦中風非其一致實證。","C":"正確:euglycemic DKA 為其最受關注副作用,與升糖素上升有關。","D":"正確:減重主因尿糖排出(熱量流失)。","E":"正確:改善蛋白尿、延緩 DKD,為腎臟保護藥理。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"109-133":{"quick":"HbA1c 一般目標是「<7%」非「<6%」;胰島素長期使用主要副作用是低血糖與「體重增加」(非以低血糖為唯一)——錯誤組為(2)+(5)反之 → 本題答案 B 指(2)(5)為錯。","detail":{"background":"一般成人 T2DM 之 HbA1c 控制目標為「<7%」(個別化:年輕、病程短、無心血管病可更嚴格<6.5%;高齡、低血糖風險、併發症多則放寬至8%),「<6%」過於嚴格且增加低血糖風險(故敘述(2)「目標應為6%以下」錯誤)。(1)Metformin 為第一線首選用藥(正確)。(3)Sulfonylurea 促胰島素分泌,易低血糖與體重上升(正確)。(4)胰島素長期使用最常見副作用確為低血糖與體重增加(敘述本身正確)。(5)DPP-4i「體重中性」(不增不減),具減重效果的是 GLP-1 RA 與 SGLT2i;故敘述(5)「DPP-4i 與 SGLT-2i 都有減輕體重效果」錯誤(DPP-4i 不減重)。錯誤者=(2)+(5)=B。出題年(109/2020)。","options":{"A":"錯:(1) Metformin 第一線正確。","B":"正解:(2)目標6%過嚴(應<7%)、(5)DPP-4i 為體重中性不減重,兩者皆錯誤。","C":"錯:(3)(4)敘述皆正確。","D":"錯:(4)正確。","E":"錯:(4)正確、僅(5)錯。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"109-135":{"quick":"妊娠糖尿病主要是「胰島素阻抗」(非分泌不足);後期孕期阻抗「上升」而非降低 → 錯誤為(1)(3)=E。","detail":{"background":"妊娠糖尿病(GDM)病生理核心是「懷孕後期胎盤荷爾蒙(human placental lactogen、progesterone、cortisol、prolactin)誘發的胰島素阻抗(insulin resistance)增加」,當 β 細胞代償不足時血糖升高;故主因是「阻抗」而非「分泌不足」(敘述(1)錯)。胰島素阻抗在懷孕「後期(late pregnancy/第三孕期)會明顯上升」,血糖反而更難控制(敘述(3)「阻抗明顯降低、血糖易控制」錯)。(2)GDM 增加與肥胖盛行相關(正確)。(4)若在懷孕初次發現之血糖即達糖尿病診斷標準,應歸類為「孕期顯性糖尿病(overt/pregestational DM)」,代表孕前可能已是糖尿病(正確)。錯誤者=(1)+(3)=E。GDM 產後 35–60% 於 10–20 年進展為 T2DM,產後須追蹤血糖。出題年(109/2020)。","options":{"A":"錯:(2)正確。","B":"錯:(4)正確。","C":"錯:(2)正確。","D":"錯:(4)正確。","E":"正解:(1)主因為阻抗非分泌不足、(3)後期阻抗上升非下降,兩者皆錯。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"109-136":{"quick":"高齡、併發症多、反覆感染住院的糖尿病人,HbA1c 應「放寬」而非<6.5% → D 錯誤。","detail":{"background":"糖尿病血糖目標需「個別化」。對高齡、衰弱、合併症多、低血糖風險高、預期餘命有限者,ADA 與台灣指引建議「放寬」HbA1c 目標(約 7.5–8.0% 或更寬),以避免低血糖傷害(跌倒、心血管事件、認知惡化)。本例 78 歲、反覆肺炎/泌尿道感染住院、長期控制不佳(HbA1c 9.5%),屬高風險族群:應加基礎胰島素穩定住院血糖(A 對)、儘早篩檢視網膜與足部神經病變(B 對)、安排飲食運動衛教(C 對)、教導居家自我血糖監測(E 對);但未來目標「<6.5%」過嚴、增加低血糖危險,並不適當(D 錯誤,本題答案)。出題年(109/2020)。","options":{"A":"正確:住院高血糖應至少加基礎胰島素。","B":"正確:應儘早篩檢糖尿病視網膜及足部神經病變。","C":"正確:飲食運動衛教必要。","D":"錯誤(本題答案):高齡多病者目標應放寬,非<6.5%。","E":"正確:鼓勵居家自我血糖監測。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"109-138":{"quick":"積極控糖需多次注射+頻繁監測,連續血糖監測(CGM)是趨勢 → B 正確。","detail":{"background":"生理性胰島素分泌包含「基礎(basal)」與「進食刺激的餐時尖峰(bolus)」兩部分,故最貼近生理的補充方式是「basal-bolus(基礎+餐時多次注射)」而非「一天一次基礎胰島素」(故 A、D「一天一次最符合生理」錯)。要積極達標時採多次注射(MDI)或胰島素幫浦,並須配合更頻繁的血糖監測;連續血糖監測(CGM)能顯示血糖趨勢、time-in-range,是現今與未來趨勢(B 正確,本題答案)。內生胰島素先經門靜脈入肝(first-pass),外源皮下注射先入全身循環,故到達肝臟的相對濃度「較內生為低」(屬 subphysiologic at liver),C「較高、supraphysiologic」敘述錯。T1DM 每日胰島素總量約 0.5–1.0 U/kg/day(蜜月期更低),「1.5–2.0 U/kg/day」過高(D 錯)。GLP-1 RA 是腸泌素受體促效劑、非胰島素,且能減重(E 錯)。出題年(109/2020)。","options":{"A":"錯:一天一次基礎胰島素並非最符合生理(缺餐時 bolus)。","B":"正解:積極控糖需多次注射+頻繁監測,CGM 為趨勢。","C":"錯:外源胰島素到達肝臟濃度較內生「低」(subphysiologic),非較高。","D":"錯:T1DM 每日總量約 0.5–1.0 U/kg,非1.5–2.0。","E":"錯:GLP-1 RA 非基礎胰島素,且具減重作用。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"110-105":{"quick":"Pioglitazone(TZD)須留意的副作用:骨折、心衰(體液滯留)、黃斑部水腫 →(1)(3)(5)=C。","detail":{"background":"Thiazolidinedione(TZD,台灣僅 pioglitazone)為 PPARγ 促效劑,增加周邊組織胰島素敏感度。重要副作用:①「體液滯留→水腫、誘發或惡化心衰(NYHA III/IV 禁用)」(故(3)心衰須留意);②「骨折風險增加」(尤其停經後女性,遠端肢體骨折)(故(1)骨折);③「黃斑部水腫(macular edema)」(故(5)眼睛黃斑部水腫);④體重增加、膀胱癌風險爭議。題目選項(2)尿道感染與(4)腦中風並非 TZD 典型副作用(尿道/生殖器感染是 SGLT2i;TZD 並不增加中風)。故須留意者=(1)+(3)+(5)=C。出題年(110/2021)。","options":{"A":"錯:含(2)尿道感染(屬 SGLT2i)。","B":"錯:含(4)腦中風(非 TZD 副作用)。","C":"正解:骨折(1)+心衰(3)+黃斑部水腫(5)為 TZD 須留意副作用。","D":"錯:含(2)(4)。","E":"錯:含(2)尿道感染。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"110-108":{"quick":"TZD 不會造成低血糖(不刺激胰島素分泌);Metformin 之 eGFR 界線為30(非45)→ 錯誤組(1)(4)(5)... 本題答案 E=(1)(4)(5)。","detail":{"background":"逐項:(1)「Metformin 當 eGFR<45 即不應使用」錯誤——禁用界線是 eGFR<30;eGFR 30–45 可在密切監測下「減量續用」,故敘述把界線設在45為錯。(2)GLP-1 RA 具心血管保護(LEADER、SUSTAIN-6 等)→正確。(3)Sulfonylurea 與胰島素易致低血糖與體重上升→正確。(4)「TZD 長期使用低血糖是常見副作用」錯誤——TZD 為胰島素增敏劑、不刺激胰島素分泌,單用不致低血糖(其副作用為水腫/心衰/骨折/體重增加)。(5)「DPP-4i 及 SGLT-2i 具心血管保護」——DPP-4i 多為心血管中性(未證實降 MACE),故把 DPP-4i 列為具保護為「不夠正確/錯誤」(具明確 CV 保護者為 SGLT2i 與部分 GLP-1 RA)。錯誤者=(1)+(4)+(5)=E。出題年(110/2021)。","options":{"A":"錯:(2)正確。","B":"錯:(3)正確。","C":"錯:(2)(3)正確。","D":"錯:(2)(3)正確。","E":"正解:(1)eGFR界線應為30、(4)TZD 不致低血糖、(5)DPP-4i 非具明確 CV 保護,三者皆錯。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"110-110":{"quick":"妊娠糖尿病主因是「胰島素阻抗」非分泌不足 → A 錯誤。","detail":{"background":"妊娠糖尿病(GDM)主因為孕期胎盤荷爾蒙誘發的「胰島素阻抗」,β 細胞代償不足而高血糖(A「主要與胰島素分泌不足相關」錯誤,本題答案)。(B)GDM 增加趨勢與肥胖率上升相關(正確)。(C)若懷孕第一孕期(first trimester)即測得達糖尿病標準的血糖,代表孕前可能已是糖尿病(overt DM)(正確)。(D)GDM 產後仍應定期(約每1–3年)篩檢血糖(正確)。(E)GDM 母親所生子代,日後肥胖與糖尿病風險較高(正確)。出題年(110/2021)。","options":{"A":"錯誤(本題答案):GDM 主因為胰島素阻抗,非分泌不足。","B":"正確:與肥胖盛行相關。","C":"正確:第一孕期即異常代表孕前已有糖尿病。","D":"正確:產後應定期血糖篩檢。","E":"正確:子代未來糖尿病風險升高。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"110-111":{"quick":"最符合生理的胰島素補充是「basal-bolus」而非「一天一次基礎胰島素」→ D 錯誤。","detail":{"background":"(A)內生胰島素先分泌入門靜脈系統(正確)。(B)外源皮下胰島素先入全身循環,到達肝臟濃度相對「較低(subphysiologic)」(正確)。(C)長效基礎胰島素通常傍晚或睡前注射(正確)。(D)「一天一次長效基礎胰島素最符合生理」錯誤——生理分泌含基礎+餐時兩部分,最貼近生理者為 basal-bolus 多次注射(本題答案)。(E)住院多次注射時,以體重估算總劑量,約「50% 給基礎、50% 給餐時」(正確)。出題年(110/2021)。","options":{"A":"正確:內生胰島素先入門靜脈。","B":"正確:外源胰島素到肝濃度較低。","C":"正確:基礎胰島素多傍晚/睡前打。","D":"錯誤(本題答案):basal-bolus 才最符合生理,非一天一次基礎。","E":"正確:住院總劑量約基礎/餐時各半。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"111-107":{"quick":"明確降低 MACE 的降糖藥為 GLP-1 RA 與 SGLT2i →(2)+(5)=E。","detail":{"background":"降糖藥的心血管實證:具「明確降低 MACE(心血管死亡、非致命心肌梗塞、非致命中風)」者為 ②GLP-1 RA(liraglutide LEADER、semaglutide SUSTAIN-6、dulaglutide REWIND)與 ⑤SGLT2i(empagliflozin EMPA-REG、canagliflozin CANVAS;SGLT2i 尤其強在心衰住院與腎病)。①α-glucosidase inhibitor、③Sulfonylurea、④DPP-4i 均未證實降低 MACE(DPP-4i 為心血管中性;部分如 saxagliptin 反增心衰住院)。故=(2)+(5)=E。出題年(111/2022)。","options":{"A":"錯:(1)(3)未證實降 MACE。","B":"錯:(4)DPP-4i 中性。","C":"錯:(1)(4)未證實。","D":"錯:(3)SU 未證實。","E":"正解:GLP-1 RA(2)+SGLT2i(5)具明確降 MACE 實證。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"111-108":{"quick":"Pioglitazone(TZD)副作用:水腫、脆弱性骨折、體重/脂肪增加 →(1)(3)(5)=C。","detail":{"background":"TZD(pioglitazone)為 PPARγ 促效劑增敏胰島素,並有改善蛋白尿之報告。主要副作用為:①體液滯留→水腫(edema)、可惡化心衰;③脆弱性骨折(fragility fracture,尤其停經後女性);⑤體重及脂肪組織增加(脂肪重新分布、體液滯留)。(2)認知障礙與(4)腦中風並非 TZD 典型副作用。故=(1)+(3)+(5)=C。出題年(111/2022)。","options":{"A":"錯:含(2)(4)。","B":"錯:含(2)。","C":"正解:水腫(1)+脆弱性骨折(3)+體重脂肪增加(5)。","D":"錯:含(2)。","E":"錯:含(4)。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"111-110":{"quick":"GLP-1 由腸道 L 細胞分泌、能減重、抑食慾延緩胃排空 →(1)(3)(5)=E。","detail":{"background":"腸泌素(incretin):①GLP-1 由迴腸/結腸「L 細胞」分泌、GIP 由「K 細胞」分泌(正確)。GLP-1 以「葡萄糖依賴」方式刺激胰島素分泌「並抑制升糖素」(故(2)「也刺激升糖素」錯誤)。③GLP-1 RA 明顯減重(正確)。④GLP-1 RA 主要用於 T2DM,「不」適用於 T1DM(無內生胰島素者不可取代胰島素)(故(4)錯)。⑤GLP-1 RA 降低食慾、延緩胃排空、增加飽足感(正確)。正確者=(1)+(3)+(5)=E。DPP-4i 抑制 DPP-4 降解內生 GLP-1/GIP,屬腸泌素增強類但為體重中性。出題年(111/2022)。","options":{"A":"錯:含(2)刺激升糖素(實為抑制)。","B":"錯:含(2)(4)。","C":"錯:含(2)。","D":"錯:含(4)T1DM 不適用。","E":"正解:(1)L細胞+(3)減重+(5)抑食慾延緩胃排空。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"111-111":{"quick":"Metformin 在糖尿病前期可「延緩」進展為糖尿病(DPP 研究) → C「無法延緩」錯誤。","detail":{"background":"Metformin(biguanide)主要抑制肝糖新生、增加周邊葡萄糖利用,不刺激胰島素分泌、單用不致低血糖、體重中性,為大多數指引第一線。(A)eGFR<30 禁用(正確)。(B)長期使用可致維他命 B12 吸收不良/缺乏,須監測(正確)。(C)「Metformin 無法延緩糖尿病發病」錯誤——Diabetes Prevention Program(DPP)證實 metformin 使高危/前期者進展為糖尿病的風險降低約 31%(故 C 為本題答案,敘述錯誤)。(D)乳酸中毒罕見但延遲診斷死亡率高(正確)。(E)孕期 metformin 屬可考慮的選項之一(正確)。出題年(111/2022)。","options":{"A":"正確:eGFR<30 禁用。","B":"正確:可致 B12 吸收不良。","C":"錯誤(本題答案):DPP 研究證實 metformin 可延緩糖尿病發病。","D":"正確:乳酸中毒罕見但致死率高。","E":"正確:孕期可考慮使用。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"111-112":{"quick":"多數 SGLT2i 的腎功能使用下限為 eGFR≈20–25(已放寬),「>45」敘述過嚴/錯誤 → B。","detail":{"background":"SGLT2i(empagliflozin、dapagliflozin、canagliflozin)抑制近端腎小管 SGLT2、排尿糖。(A)機轉為抑制尿糖再吸收使葡萄糖由尿排出(正確)。(B)早期仿單限制 eGFR>45 才可起始,但近年大型腎臟/心衰試驗(DAPA-CKD、EMPA-KIDNEY、CREDENCE)已將可起始/續用門檻「放寬至 eGFR≈20–25 mL/min/1.73m²」,故「多數 SGLT2i 限 eGFR>45」已是過時/錯誤敘述(本題答案)。(C)隨血糖下降常伴體重減輕(正確)。(D)亦可用於「非糖尿病」之 CKD 與心衰病人(DAPA-CKD/DAPA-HF)(正確)。(E)增加尿糖→泌尿道與生殖器黴菌感染風險、罕見會陰壞死性筋膜炎(Fournier gangrene)(正確)。出題年(111/2022)。","options":{"A":"正確:抑制尿糖再吸收、糖由尿排出。","B":"錯誤(本題答案):腎功能門檻已放寬至 eGFR≈20–25,非僅>45。","C":"正確:常伴體重減輕。","D":"正確:可用於非糖尿病 CKD/心衰。","E":"正確:增泌尿道/生殖器感染風險。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"112-106":{"quick":"SGLT2i 直接從腎臟排糖、機轉「與胰島素無關(non-insulin dependent)」→ C。","detail":{"background":"降糖藥依是否與胰島素分泌/作用相關分類:與胰島素「相關」者——SU/glinide(促分泌)、DPP-4i 與 GLP-1 RA(腸泌素促葡萄糖依賴性胰島素分泌)、TZD(增敏胰島素作用)、胰島素本身。與胰島素「無關(non-insulin dependent)」者——SGLT2i(直接抑制腎小管 SGLT2 排尿糖,完全不經胰島素)以及 α-glucosidase inhibitor(延緩腸道醣類吸收)。故本題答案 C(SGLT2i)。出題年(112/2023)。","options":{"A":"錯:GLP-1 RA 促葡萄糖依賴性胰島素分泌(與胰島素相關)。","B":"錯:DPP-4i 經腸泌素促胰島素分泌。","C":"正解:SGLT2i 直接排尿糖,機轉與胰島素無關。","D":"錯:SU 促胰島素分泌。","E":"錯:TZD 增敏胰島素作用。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"112-107":{"quick":"Metformin eGFR<30 禁用、HbA1c 目標非<6%、針劑(胰島素/GLP-1)在 eGFR<60 並非禁用 → 錯誤(1)(3)(5)=E。","detail":{"background":"逐項:(1)「Metformin 可安全用於 eGFR<30」錯誤——eGFR<30 禁用。(2)SU 易低血糖與體重上升(正確)。(3)「ADA 建議 HbA1c<6%」錯誤——一般目標<7%(個別化)。(4)SGLT2i 降糖常伴體重減輕(正確)。(5)「eGFR<60 應避免胰島素與 GLP-1 RA」錯誤——胰島素於任何腎功能皆可使用(腎差時須減量防低血糖);GLP-1 RA 多數可用於中重度 CKD(部分依品項調整),並非以 eGFR<60 為禁忌。錯誤者=(1)+(3)+(5)=E。出題年(112/2023)。","options":{"A":"錯:(4)正確。","B":"錯:(2)(4)正確。","C":"錯:(4)正確。","D":"錯:(1)(3)雖錯但(4)正確不在選項邏輯。","E":"正解:(1)Metformin 應 eGFR<30 禁用、(3)目標<7%非<6%、(5)針劑非以 eGFR<60 為禁忌,皆錯。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"112-108":{"quick":"Pioglitazone(TZD)副作用:骨質疏鬆/骨折、體重增加、體重脂肪增加 →(1)(3)(5)=A。","detail":{"background":"TZD(pioglitazone)PPARγ 促效劑,副作用包括:①骨質疏鬆/脆弱性骨折、③體重增加、⑤體重及脂肪組織增加(脂肪重分布+體液滯留),以及水腫/心衰、黃斑部水腫、膀胱癌爭議。(2)認知障礙與(4)腦中風非其典型副作用。故=(1)+(3)+(5)=A。出題年(112/2023)。","options":{"A":"正解:骨鬆/骨折(1)+體重增加(3)+體重脂肪增加(5)。","B":"錯:含(4)。","C":"錯:含(2)。","D":"錯:含(2)。","E":"錯:含(2)(4)。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"112-109":{"quick":"增加尿鈉(natriuresis)排除的降糖藥是 SGLT2i(同時排鈉與糖) → D。","detail":{"background":"SGLT2(sodium-glucose co-transporter 2)位於近端腎小管,同時再吸收「鈉與葡萄糖」。SGLT2i 阻斷此轉運→尿糖排出同時「增加尿鈉排除(natriuresis)」與滲透性利尿,這也是其降血壓、減少體液負荷、保護心衰與腎臟的部分機轉(影響球管回饋 tubuloglomerular feedback、降低腎絲球高過濾)。其他降糖藥無此排鈉機轉。故本題答案 D。出題年(112/2023)。","options":{"A":"錯:SU 促胰島素分泌,無排鈉作用。","B":"錯:Biguanide 抑肝糖新生,無排鈉。","C":"錯:TZD 反致鈉水滯留(水腫)。","D":"正解:SGLT2i 同時排鈉與糖,具利鈉作用。","E":"錯:胰島素促鈉再吸收,非排鈉。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"112-110":{"quick":"GLP-1 RA 不能用於「治療第1型糖尿病」(無內生胰島素者不可取代胰島素)→ C 錯誤。","detail":{"background":"(A)基礎胰島素可與 GLP-1 RA 併用(fixed-ratio 如 IDegLira/IGlarLixi),協同控糖且減少低血糖/體重增加(正確)。(B)GLP-1 RA 常見腸胃副作用(噁心、腹脹);胰島素最常見副作用為低血糖(正確)。(C)「GLP-1 RA 可合併胰島素治療第1型糖尿病並減少胰島素用量」錯誤(本題答案)——GLP-1 RA 適應症為 T2DM,T1DM 缺乏內生胰島素,GLP-1 RA 不能取代或作為其主要治療(仿單未核准、低血糖/酮酸風險)。(D)GLP-1 RA 降糖兼減重(正確)。(E)基礎胰島素起始劑量約 0.1–0.2 U/kg/day(正確)。出題年(112/2023)。","options":{"A":"正確:basal insulin 可與 GLP-1 RA 併用。","B":"正確:GLP-1 RA 致腸胃不適、胰島素致低血糖。","C":"錯誤(本題答案):GLP-1 RA 不用於治療 T1DM。","D":"正確:GLP-1 RA 降糖兼減重。","E":"正確:基礎胰島素起始約0.2 U/kg/day。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"113-105":{"quick":"非胰島素相關(non-insulin dependent)機轉的降糖藥為 SGLT2i → A。","detail":{"background":"同 112-106 概念。SGLT2i 直接抑制近端腎小管 SGLT2 排尿糖,機轉「完全與胰島素分泌/作用無關」;Metformin(抑肝糖新生,需有部分胰島素背景但不直接刺激分泌——本題分類歸於與胰島素作用相關側)、TZD(增敏胰島素作用)、GLP-1 RA(促葡萄糖依賴性胰島素分泌)、SU(促胰島素分泌)皆與胰島素相關。故本題答案 A(SGLT2i)。出題年(113/2024)。","options":{"A":"正解:SGLT2i 排尿糖,與胰島素無關。","B":"錯:Metformin 之降糖效果需胰島素背景(本題歸相關)。","C":"錯:TZD 增敏胰島素作用。","D":"錯:GLP-1 RA 促胰島素分泌。","E":"錯:SU 促胰島素分泌。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"113-106":{"quick":"造成下肢水腫的降糖藥是 TZD(PPARγ→鈉水滯留)→ D。","detail":{"background":"TZD(pioglitazone)活化 PPARγ,促進腎集尿管鈉再吸收→「鈉水滯留→下肢水腫、體重增加,並可誘發/惡化心衰」,為其註冊副作用(NYHA III/IV 禁用)。其他選項(SU、SGLT2i、Metformin、DPP-4i)不以水腫為特徵;SGLT2i 反而利尿。故本題答案 D。出題年(113/2024)。","options":{"A":"錯:SU 不致水腫。","B":"錯:SGLT2i 利尿,非致水腫。","C":"錯:Metformin 無水腫副作用。","D":"正解:TZD 鈉水滯留致下肢水腫。","E":"錯:DPP-4i 不致水腫。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"113-107":{"quick":"SGLT2i 反而「增加」euglycemic DKA 風險,而非降低 → E 錯誤。","detail":{"background":"(A)高尿糖增加泌尿道及生殖器(黴菌)感染風險(正確)。(B)SGLT2i 降低糖尿病與「非糖尿病」病人之心衰住院(DAPA-HF、EMPEROR)(正確)。(C)可與胰島素併用(正確)。(D)eGFR>60 之糖尿病人皆可使用(正確;且已放寬至更低 eGFR)。(E)「SGLT2i 同時降低酮酸中毒機率」錯誤(本題答案)——SGLT2i 反而「增加正常血糖性酮酸中毒(euglycemic DKA)」風險(促升糖素、脂解、生酮),手術/禁食/急病時須停藥。出題年(113/2024)。","options":{"A":"正確:增泌尿道/生殖器感染。","B":"正確:降心衰住院(含非糖尿病)。","C":"正確:可與胰島素併用。","D":"正確:eGFR>60 皆可用。","E":"錯誤(本題答案):SGLT2i 反增 euglycemic DKA 風險。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"113-110":{"quick":"Metformin 每日最高劑量約 2000–2550 mg,「最高 2000mg」敘述偏狹/錯誤 → E。","detail":{"background":"(A)可致 B12 吸收不良(正確)。(B)eGFR<30 禁用(正確)。(C)糖尿病前期可延緩進展(DPP)(正確)。(D)乳酸中毒罕見但延遲診斷致死率高(正確)。(E)「每日最高劑量 2000mg」為本題判錯處——Metformin 常見最高有效劑量約 2000 mg,但仿單/實務最大可至 2550 mg(緩釋型 2000 mg),敘述「最高 2000mg」過於絕對而被列為錯誤(本題答案)。出題年(113/2024)。","options":{"A":"正確:可致 B12 吸收不良。","B":"正確:eGFR<30 禁用。","C":"正確:延緩糖尿病前期進展。","D":"正確:乳酸中毒罕見但致死率高。","E":"錯誤(本題答案):每日最高劑量可達約 2550mg,非僅 2000mg。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"113-111":{"quick":"曾有/合併膀胱癌者禁用 TZD(pioglitazone)→ D。","detail":{"background":"Pioglitazone(TZD)長期/高累積劑量與「膀胱癌風險增加」的疑慮(數據有爭議但仿單列為警示),故「活動性膀胱癌或有膀胱癌病史」者「禁用/不建議使用」pioglitazone(本題答案 D)。其他選項(Metformin、SGLT2i、DPP-4i、insulin glargine)與膀胱癌並無此禁忌(SGLT2i 與膀胱癌無確立關聯)。出題年(113/2024)。","options":{"A":"錯:Metformin 與膀胱癌無禁忌。","B":"錯:SGLT2i 與膀胱癌無確立關聯。","C":"錯:DPP-4i 無此禁忌。","D":"正解:pioglitazone(TZD)與膀胱癌風險相關,合併膀胱癌應避免。","E":"錯:insulin glargine 無膀胱癌禁忌。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"114-106":{"quick":"造成骨質疏鬆/骨折風險的降糖藥是 TZD → D。","detail":{"background":"TZD(pioglitazone)活化 PPARγ 使骨髓間葉幹細胞偏向脂肪細胞分化、抑制成骨,並增加蝕骨活性,導致「骨密度下降、脆弱性骨折」(尤其停經後女性,遠端肢體骨折),為其重要長期副作用。其他選項(SU、SGLT2i、Metformin、insulin)中,SGLT2i(canagliflozin 早期 CANVAS 曾有骨折訊號但後續不一致)不是標準答案;本題標準答案為 TZD(D)。出題年(114/2025)。","options":{"A":"錯:SU 無骨鬆風險。","B":"錯:SGLT2i 非標準骨鬆答案。","C":"錯:Metformin 無骨鬆風險。","D":"正解:TZD 抑制成骨、增骨折風險。","E":"錯:胰島素無骨鬆風險。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"114-107":{"quick":"GLP-1 RA「不」用於治療第1型糖尿病 → B 錯誤。","detail":{"background":"(A)GLP-1 RA 與基礎胰島素併用可提升控糖成效(正確)。(B)「T1DM 宜合併 GLP-1 RA 以降低胰島素用量」錯誤(本題答案)——GLP-1 RA 適應症為 T2DM;T1DM 缺乏內生胰島素,GLP-1 RA 無法取代胰島素,仿單未核准且增酮酸/低血糖風險。(C)GLP-1 RA 常見腸胃不適,胰島素最常見低血糖(正確)。(D)GLP-1 RA 降糖兼大幅減重(semaglutide/tirzepatide 尤著)(正確)。(E)基礎胰島素起始約 0.1–0.2 U/kg/day(正確)。出題年(114/2025)。","options":{"A":"正確:GLP-1 RA 可與基礎胰島素併用。","B":"錯誤(本題答案):GLP-1 RA 不用於治療 T1DM。","C":"正確:GLP-1 RA 腸胃不適、胰島素低血糖。","D":"正確:GLP-1 RA 降糖兼減重。","E":"正確:基礎胰島素起始約0.2 U/kg/day。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"114-110":{"quick":"Metformin 在 eGFR<30 為「禁用」,並非安全 → E 錯誤。","detail":{"background":"(A)可致 B12 吸收不良/缺乏(正確)。(B)乳酸中毒罕見但致死率可達 50%(正確)。(C)可延緩糖尿病前期進展與惡化(DPP)(正確)。(D)孕期可考慮使用(正確)。(E)「eGFR<30 仍安全使用」錯誤(本題答案)——eGFR<30 是 Metformin 的禁忌(乳酸中毒風險),eGFR 30–45 須減量並密切監測。出題年(114/2025)。","options":{"A":"正確:可致 B12 吸收不良。","B":"正確:乳酸中毒罕見但致死率高。","C":"正確:延緩糖尿病進展。","D":"正確:孕期可考慮。","E":"錯誤(本題答案):eGFR<30 為 Metformin 禁忌,非安全。"},"sources":["Harrison's 21e, Ch.397 Diabetes Mellitus: Management","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","台灣糖尿病臨床照護指引(2022)"]}},"103-綜-7":{"quick":"非糖尿病者出現「低血糖+不當偏高的胰島素」→ 懷疑胰島素瘤,住院做 72 小時飢餓試驗 → B。","detail":{"background":"正常人血糖降低時胰島素應「被抑制」。本例血糖 56 mg/dL 時胰島素仍達 18 μU/mL(不當偏高),且早晨反覆發作(空腹型低血糖),高度懷疑「胰島素瘤(insulinoma)」或內生性高胰島素血症。診斷標準依 Endocrine Society:確認 Whipple triad 後,以「72 小時監督飢餓試驗(prolonged/72-hr fasting test)」誘發低血糖,於低血糖時同時測血糖、胰島素、C-peptide、proinsulin、β-羥基丁酸與磺醯尿素篩檢——胰島素瘤呈「低血糖時 insulin≥3 μU/mL、C-peptide≥0.6 ng/mL、proinsulin↑、β-OHB 低、SU 篩檢陰性」。「先做生化定性、再做影像定位」是正確順序,故首選 72 小時飢餓試驗(B)。腹部 CT/EUS 是「定位」工具,應在生化確診後進行。出題年(103/2014)。","options":{"A":"錯:腹部 CT 是定位,須先生化確診。","B":"正解:住院 72 小時飢餓試驗為內生性高胰島素低血糖之確診步驟。","C":"錯:家中監測無法確診胰島素瘤。","D":"錯:PET 非首選。","E":"錯:EUS 為定位工具,須先確診。"},"sources":["Harrison's 21e, Ch.399 Hypoglycemia","Williams Textbook of Endocrinology 14e (Hypoglycemia/Insulinoma)","Endocrine Society Clinical Practice Guideline: Evaluation and Management of Adult Hypoglycemic Disorders (2009)"]}},"108-綜-6":{"quick":"T2DM 漏打胰島素+感染,血糖525、Na151、滲透壓高、無酸中毒→高血糖高滲透壓狀態(HHS),首選 0.9% 生理食鹽水 → C。","detail":{"background":"本例 82 歲 T2DM、漏打胰島素+感冒誘發,血糖 525 mg/dL、Na 151、BUN/Cr 升高、血壓偏低,屬「高血糖高滲透壓狀態(HHS)」:特徵為極高血糖(常>600)、高血漿滲透壓、嚴重脫水、無/輕微酮酸中毒(殘存胰島素足以抑制生酮)。處置首要是「大量等張輸液回補血容積」——初始用「0.9% 生理食鹽水(Normal Saline)」快速擴容、改善灌流與監測尿量;待血容積回補、血鈉校正後再依校正後血鈉改用 0.45% half saline,並在補液後加上胰島素輸注、補鉀。一開始即用低張液或含糖液會延誤擴容並增腦水腫風險。故監測尿量與初始輸液首選 0.9% NS(C)。出題年(108/2019)。","options":{"A":"錯:0.45% half saline 為後續(血容積回補後)用,非初始。","B":"錯:Lactated Ringer 非 HHS 初始首選(滲透壓考量)。","C":"正解:0.9% NS 快速擴容、監測尿量,為 HHS 初始輸液。","D":"錯:含糖液於血糖極高時不宜作初始補液。","E":"錯:初始不應用低張液合併胰島素。"},"sources":["Harrison's 21e, Ch.397 DM: DKA & HHS","ADA Hyperglycemic Crises in Adult Patients with Diabetes (Consensus)","Williams Textbook of Endocrinology 14e"]}},"109-132":{"quick":"反覆清晨低血糖(血糖28)、空腹胰島素/C-peptide 不被抑制→ 胰島素瘤,做 72 小時飢餓試驗 → B。","detail":{"background":"本例反覆清晨低血糖(曾測 28 mg/dL)、ACTH/cortisol/TSH 正常(排除腎上腺/甲狀腺低下致低血糖),空腹 insulin 2.12、C-peptide 1.40——雖空腹當下血糖正常,但臨床高度懷疑「內生性高胰島素低血糖(胰島素瘤)」。確診須在「低血糖發作時」抓到不當偏高的內生胰島素,故安排「72 小時監督飢餓試驗」誘發並同步採血(insulin、C-peptide、proinsulin、β-OHB、SU 篩檢)。確診後再以 CT/MRI/EUS 定位。故首選 72 小時飢餓試驗(B);Pituitary MRI、CT、OGTT、dexamethasone 抑制試驗皆非此情境首選。出題年(109/2020)。","options":{"A":"錯:腹部 CT 為定位,須先生化確診。","B":"正解:72 小時飢餓試驗為內生性高胰島素低血糖確診步驟。","C":"錯:OGTT 用於診斷糖尿病/反應性低血糖,非空腹型胰島素瘤確診。","D":"錯:Pituitary MRI 無關。","E":"錯:dexamethasone 抑制試驗用於庫欣,非此題。"},"sources":["Harrison's 21e, Ch.399 Hypoglycemia","Williams Textbook of Endocrinology 14e (Hypoglycemia/Insulinoma)","Endocrine Society Clinical Practice Guideline: Evaluation and Management of Adult Hypoglycemic Disorders (2009)"]}},"110-56":{"quick":"DM 發燒肺炎+血糖385、HCO3 14、代償性過度換氣→ 同時有代謝酸中毒(DKA)與呼吸性鹼中毒 →(2)+(3)=D。","detail":{"background":"本例血糖 385、pH 7.35、pCO2 22(低)、HCO3 14(低):①血糖高+HCO3 低+陰離子間隙 AG=Na−(Cl+HCO3)=130−(96+14)=20(>12,升高)→「代謝性酸中毒(高 AG,與糖尿病/DKA 相關)」(故(2)對、(4)「AG 仍正常」錯)。②pCO2 22 遠低於代謝性酸中毒單純代償應有的值(Winter: 預期 pCO2≈1.5×14+8±2≈29),pCO2 更低代表「合併呼吸性鹼中毒(肺炎/發燒過度換氣)」(故(3)對)。③(1)「呼吸性酸中毒」錯(pCO2 是低不是高)。④(5)胰島素+葡萄糖治療時要小心的是「低血鉀與低血磷(hypophosphatemia)」而非高血磷,故(5)錯。正確=(2)+(3)=D。此為 DKA 合併肺炎之混合型酸鹼。出題年(110/2021)。","options":{"A":"錯:含(1)(5)。","B":"錯:含(1)(4)(5)。","C":"錯:含(5)hyperphosphatemia(應為低血磷)。","D":"正解:(2)代謝性酸中毒(DKA)+(3)呼吸性鹼中毒(肺炎)。","E":"錯:(4)AG 實為升高,非正常。"},"sources":["Harrison's 21e, Ch.397 DM: DKA & HHS","ADA Hyperglycemic Crises in Adult Patients with Diabetes (Consensus)","Williams Textbook of Endocrinology 14e"]}},"110-78":{"quick":"DPP-4i 與 SGLT-2i 雖低血糖風險低,但「不會發生低血糖」說法過絕對 → C 錯誤。","detail":{"background":"糖尿病低血糖:(A)T1DM 積極胰島素控糖可降微血管併發症(DCCT),但低血糖發生率上升(正確)。(B)T2DM 口服藥中最易致低血糖者為 sulfonylurea(促胰島素分泌、不依血糖)(正確)。(C)「DPP-4i 與 SGLT-2i 因機轉特殊故不會發生低血糖」錯誤(本題答案)——此兩類「單用」低血糖風險低(DPP-4i 為葡萄糖依賴性、SGLT2i 排糖),但「與 SU 或胰島素併用」時仍會增加低血糖,故不能說「不會」。(D)多次餐前(MDI)較單純基礎胰島素低血糖風險高(正確)。(E)病程久者自主神經病變致「無自覺性低血糖(hypoglycemia unawareness)」(正確)。出題年(110/2021)。","options":{"A":"正確:積極控糖低血糖增多。","B":"正確:SU 最易致低血糖。","C":"錯誤(本題答案):與 SU/胰島素併用時仍可低血糖,非「不會」。","D":"正確:MDI 低血糖風險較基礎胰島素高。","E":"正確:久病者可無自覺性低血糖。"},"sources":["Harrison's 21e, Ch.399 Hypoglycemia","Williams Textbook of Endocrinology 14e (Hypoglycemia/Insulinoma)","Endocrine Society Clinical Practice Guideline: Evaluation and Management of Adult Hypoglycemic Disorders (2009)"]}},"110-107":{"quick":"DKA 處置主要靠「持續靜脈/即時胰島素輸注」抑制生酮,而非單純規律基礎胰島素 → D 錯誤。","detail":{"background":"DKA 三要件:高血糖(>250)、高 AG 代謝性酸中毒(pH<7.3、HCO3<18)、血/尿酮體陽性。(A)合併高血糖+代謝酸中毒(正確)。(B)血酮(β-OHB)是診斷關鍵(正確)。(C)補液用 0.9% NS,後依校正鈉改 0.45%(正確)。(D)「規律注射基礎胰島素是校正/避免 DKA 惡化的重要步驟」錯誤(本題答案)——急性 DKA 校正需「持續靜脈短效胰島素輸注(IV regular insulin infusion)」緊密滴定以關閉生酮、降 AG,而非僅靠長效基礎胰島素;基礎胰島素是「恢復進食、酸中毒緩解後過渡(overlap)」階段才併用。(E)血糖降至約 200–250 時加 5% 葡萄糖液(讓胰島素續打以清除酮體而不致低血糖)(正確)。出題年(110/2021)。","options":{"A":"正確:高血糖+代謝酸中毒。","B":"正確:血酮為診斷關鍵。","C":"正確:NS→0.45% saline 補液。","D":"錯誤(本題答案):DKA 需持續 IV 胰島素輸注,非僅基礎胰島素。","E":"正確:血糖約250時加5%葡萄糖續打胰島素清酮。"},"sources":["Harrison's 21e, Ch.397 DM: DKA & HHS","ADA Hyperglycemic Crises in Adult Patients with Diabetes (Consensus)","Williams Textbook of Endocrinology 14e"]}},"110-109":{"quick":"反覆空腹低血糖(血糖40/36)、非糖尿病、胰島素/C-peptide 不被抑制→ 72 小時飢餓試驗 → E。","detail":{"background":"同胰島素瘤診斷邏輯。本例 48 歲、體重增加、反覆「空腹/清晨」低血糖(40、36 mg/dL),ACTH/cortisol/TSH 正常排除腎上腺與甲狀腺低下,屬內生性高胰島素低血糖之疑。確診須在低血糖發作當下抓到不當偏高之 insulin/C-peptide/proinsulin,故安排「72 小時監督飢餓試驗」(E)。確診後再以影像定位。Pituitary MRI、CT、OGTT、dexamethasone 抑制試驗皆非首選。出題年(110/2021)。","options":{"A":"錯:OGTT 非空腹型胰島素瘤確診。","B":"錯:Pituitary MRI 無關。","C":"錯:CT 為定位,須先確診。","D":"錯:dexamethasone 抑制試驗用於庫欣。","E":"正解:72 小時飢餓試驗確認內生性高胰島素低血糖。"},"sources":["Harrison's 21e, Ch.399 Hypoglycemia","Williams Textbook of Endocrinology 14e (Hypoglycemia/Insulinoma)","Endocrine Society Clinical Practice Guideline: Evaluation and Management of Adult Hypoglycemic Disorders (2009)"]}},"111-106":{"quick":"反覆空腹低血糖(血糖22)、胰島素/C-peptide 不被抑制→ 先做 72 小時飢餓試驗 → B。","detail":{"background":"本例 56 歲、體重增加、反覆不明原因低血糖(急診血糖 22 mg/dL),ACTH/cortisol/IGF-1/TSH 正常,空腹 insulin 3.6、C-peptide 2.6(低血糖時內生胰島素不被適當抑制)→ 內生性高胰島素低血糖(胰島素瘤)之疑。應「先生化定性、後影像定位」,故優先安排「72 小時延長禁食測試」(B);肝胰 MRI、EUS 為後續定位工具,Holter、Pituitary MRI 與此無關。出題年(111/2022)。","options":{"A":"錯:肝胰 MRI 為定位,須先確診。","B":"正解:72 小時飢餓試驗為內生性高胰島素低血糖確診步驟。","C":"錯:Holter 用於心律不整暈厥,本例已排除。","D":"錯:Pituitary MRI 無關。","E":"錯:EUS 為定位工具,須先確診。"},"sources":["Harrison's 21e, Ch.399 Hypoglycemia","Williams Textbook of Endocrinology 14e (Hypoglycemia/Insulinoma)","Endocrine Society Clinical Practice Guideline: Evaluation and Management of Adult Hypoglycemic Disorders (2009)"]}},"112-112":{"quick":"反覆空腹低血糖(血糖32)、胰島素/C-peptide 不被抑制、其他軸正常→ 72 小時飢餓試驗 → D。","detail":{"background":"同上胰島素瘤診斷邏輯。45 歲、反覆工作時昏倒、急診血糖 32 mg/dL,空腹 insulin 3.6、C-peptide 2.6,ACTH/cortisol/IGF-1/TSH 正常→ 內生性高胰島素低血糖。確診首選「72 小時 prolonged fasting test」(D)。OGTT、Holter、腹部 CT 皆非首選(選項 B、E 同為 24 小時心電圖屬出題重複)。出題年(112/2023)。","options":{"A":"錯:OGTT 非空腹型胰島素瘤確診。","B":"錯:Holter 心電圖無關(已排除心律不整)。","C":"錯:腹部 CT 為定位,須先確診。","D":"正解:72 小時飢餓試驗確認內生性高胰島素低血糖。","E":"錯:24 小時心電圖無關。"},"sources":["Harrison's 21e, Ch.399 Hypoglycemia","Williams Textbook of Endocrinology 14e (Hypoglycemia/Insulinoma)","Endocrine Society Clinical Practice Guideline: Evaluation and Management of Adult Hypoglycemic Disorders (2009)"]}},"113-108":{"quick":"反覆空腹低血糖(血糖20)、胰島素/C-peptide 不被抑制→ 優先 72 小時飢餓試驗 → D。","detail":{"background":"本例 46 歲、體重增加、反覆不明原因低血糖(急診血糖 20 mg/dL),空腹 insulin 2.8、C-peptide 2.2,ACTH/cortisol/IGF-1/TSH 正常→ 內生性高胰島素低血糖(胰島素瘤)之疑。應「先生化定性(72 小時飢餓試驗)、後影像定位」,故優先「72 小時 prolonged fasting test」(D)。Chromogranin A、腹部 CT、IPSS、Pituitary MRI 皆非首選確診步驟。出題年(113/2024)。","options":{"A":"錯:Pituitary MRI 無關。","B":"錯:Chromogranin A 為 NET 標記,非確診低血糖首選。","C":"錯:腹部 CT 為定位,須先確診。","D":"正解:72 小時飢餓試驗為確診步驟。","E":"錯:IPSS 用於庫欣鑑別,非此題。"},"sources":["Harrison's 21e, Ch.399 Hypoglycemia","Williams Textbook of Endocrinology 14e (Hypoglycemia/Insulinoma)","Endocrine Society Clinical Practice Guideline: Evaluation and Management of Adult Hypoglycemic Disorders (2009)"]}},"113-112":{"quick":"低血糖原因:不當用胰島素/降糖藥、胃繞道術後、腎上腺機能不足 →(1)(3)(4)=E。","detail":{"background":"低血糖病因:(1)不當使用胰島素或口服降糖藥(尤其 SU)——最常見(對)。(2)肢端肥大症(GH/IGF-1 過多)→ 反致「胰島素阻抗/高血糖」,非低血糖(錯)。(3)胃繞道/胃切除術後→ 食物快速進入小腸刺激過量 GLP-1/胰島素分泌→「餐後低血糖(post-bariatric/dumping、nesidioblastosis)」(對)。(4)腎上腺機能不足(Addison/續發性)→ cortisol 缺乏使反調節不足→ 低血糖(對)。(5)庫欣氏症候群(cortisol 過多)→ 高血糖/類固醇糖尿病,非低血糖(錯)。正確=(1)+(3)+(4)=E。出題年(113/2024)。","options":{"A":"錯:含(2)肢端肥大(致高血糖)。","B":"錯:含(2)。","C":"錯:含(2)(5)。","D":"錯:含(5)庫欣(致高血糖)。","E":"正解:(1)藥物+(3)胃繞道術後+(4)腎上腺機能不足。"},"sources":["Harrison's 21e, Ch.399 Hypoglycemia","Williams Textbook of Endocrinology 14e (Hypoglycemia/Insulinoma)","Endocrine Society Clinical Practice Guideline: Evaluation and Management of Adult Hypoglycemic Disorders (2009)"]}},"102-綜-6":{"quick":"糖尿病足潰瘍主因是「周邊神經病變」致壓力分布不均與感覺喪失 → B。","detail":{"background":"糖尿病足潰瘍的核心致病機轉是「周邊感覺運動神經病變(peripheral neuropathy)」:感覺喪失使病人對壓力、摩擦、外傷與溫度無感;運動神經病變致足部小肌肉萎縮、足弓變形(Charcot foot)、壓力分布不均,於蹠骨頭等受壓處反覆受力形成胼胝與潰瘍。周邊動脈疾病(PAD/缺血)與感染是「加重與惡化」因子但非主因。處置原則:減壓(offloading,如全接觸石膏)、傷口照護、控制感染與血糖、評估血流;衛教應「絕不赤腳(室內外皆然)」、每日檢查足部、選合適鞋具;不應鼓勵帶傷多走動。高壓氧僅為輔助、非必須。故主因為神經病變(B)。出題年(102/2013)。","options":{"A":"錯:缺血為加重因子,高壓氧非必須。","B":"正解:主因為神經病變致壓力不均與感覺喪失。","C":"錯:感染為惡化因子非主因。","D":"錯:室內外皆不應赤腳。","E":"錯:帶傷多走動會惡化潰瘍,應減壓。"},"sources":["Harrison's 21e, Ch.398 DM: Complications","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","KDIGO 2022 Diabetes in CKD Guideline"]}},"105-綜-10":{"quick":"T1DM 突發單一足下垂(foot drop)、感覺喪失→ 糖尿病單一神經病變,做神經傳導檢查 → B。","detail":{"background":"T1DM 19 年、突發「左足無法背屈(foot drop)」合併該肢感覺喪失、但對側與膝反射正常→ 局部「單一神經病變(mononeuropathy,如腓神經/common peroneal nerve)或糖尿病性肌萎縮(diabetic amyotrophy)」之表現,屬糖尿病慢性神經併發症之一。最恰當的釐清檢查為「神經傳導檢查(NCV/EMG)」以定位與分級神經損傷(B)。甲狀腺功能、CSF 電泳、腰椎 MRI、類風濕因子皆非此單側周邊神經病變首選。出題年(105/2016)。","options":{"A":"錯:甲狀腺腫與此足下垂無直接因果。","B":"正解:神經傳導檢查定位糖尿病單一神經病變。","C":"錯:CSF 電泳用於去髓鞘/GBS,非首選。","D":"錯:雙側對稱才疑腰椎病變;此為單神經病變。","E":"錯:類風濕因子與此無關。"},"sources":["Harrison's 21e, Ch.398 DM: Complications","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","KDIGO 2022 Diabetes in CKD Guideline"]}},"109-131":{"quick":"高齡糖尿病腎病變者目標應「放寬」,而非年紀愈大愈嚴格控到<6.5% → D 錯誤。","detail":{"background":"老年糖尿病腎臟照護:(A)DKD 病人之貧血、左心室肥大、心血管病與死亡率彼此顯著相關(正確)。(B)一般 HbA1c 目標約7%,但高齡合併腎病、活動力差者應放寬至<8%(正確)。(C)顯影劑可致對比劑腎病變使腎功能急速惡化(正確)。(D)「年紀愈長愈應將 HbA1c 控到<6.5% 以下」錯誤(本題答案)——大型試驗(ACCORD、ADVANCE、VADT)顯示對高齡/病程久者過度嚴格控糖「不降反增」死亡與低血糖風險,故高齡應放寬而非更嚴格。(E)腎功能差時 SU 半衰期延長,是低血糖重要原因(正確)。出題年(109/2020)。","options":{"A":"正確:貧血/LVH/CVD/死亡率相關。","B":"正確:高齡腎病者目標放寬至<8%。","C":"正確:顯影劑可致急性腎惡化。","D":"錯誤(本題答案):高齡應放寬目標,非愈嚴格<6.5%。","E":"正確:腎差時 SU 易致低血糖。"},"sources":["Harrison's 21e, Ch.398 DM: Complications","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","KDIGO 2022 Diabetes in CKD Guideline"]}},"110-106":{"quick":"eGFR 28 的 DM+CAD 病人,不應加「無心血管/腎臟保護實證」的 DPP-4i,而應選有實證的藥(SGLT2i/GLP-1RA;此 eGFR 偏低則 GLP-1RA)→ B 為錯誤敘述。","detail":{"background":"本例 70 歲、心肌梗塞支架病史、eGFR 28(中重度 CKD)。藥物選擇原則:Metformin 於 eGFR<30 禁用(A 正確,應停)。SGLT2i 在 eGFR 過低時起始受限(早期門檻;本題情境視為不宜起始)(C 正確)。具心血管/腎臟保護實證者為 SGLT2i 與 GLP-1 RA;DPP-4i 為心血管「中性」(saxagliptin 甚至增心衰住院),「加 DPP-4i 來預防腎惡化及保護心血管」缺乏實證,故 B 為錯誤敘述(本題答案)——此情境應優先考慮 GLP-1 RA(可用於低 eGFR、具 CV 保護)。(D)目標 HbA1c<7% 合理(正確)。(E)鼓勵居家自我血糖監測(正確)。出題年(110/2021)。","options":{"A":"正確:eGFR<30,Metformin 應停用。","B":"錯誤(本題答案):DPP-4i 無腎/心血管保護實證,不是此情境首選。","C":"正確:此 eGFR 不宜起始 SGLT2i(依當年門檻)。","D":"正確:HbA1c<7% 為合理目標。","E":"正確:鼓勵居家自我血糖監測。"},"sources":["Harrison's 21e, Ch.398 DM: Complications","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","KDIGO 2022 Diabetes in CKD Guideline"]}},"113-109":{"quick":"糖尿病 LDL 目標應更嚴格(非<130)、血壓非須<120/80(含蛋白尿非<110/70)、戒菸永遠有益 → 錯誤(3)(4)(5)=E。","detail":{"background":"逐項:(1)高齡 HbA1c 目標較年輕者寬鬆(正確)。(2)糖尿病高血壓首選 ACEI/ARB(尤其有蛋白尿者)(正確)。(3)「糖尿病高血脂 LDL 目標<130」錯誤——糖尿病屬高/極高風險,LDL 目標多為<100(無 ASCVD)或<70、甚至<55(合併 ASCVD/極高風險),遠低於130。(4)「血壓目標<120/80、合併蛋白尿<110/70」錯誤——一般糖尿病血壓目標約<130/80(個別化),並非<120/80 或<110/70。(5)「達標後戒菸已無助益」錯誤——戒菸永遠能降低心血管與微血管併發症風險。錯誤者=(3)+(4)+(5)=E。出題年(113/2024)。","options":{"A":"錯:(1)(2)正確。","B":"錯:(1)正確。","C":"錯:(2)正確。","D":"錯:(1)正確。","E":"正解:(3)LDL目標應更嚴格、(4)血壓非<120/80、(5)戒菸永遠有益,三者皆錯。"},"sources":["Harrison's 21e, Ch.398 DM: Complications","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","KDIGO 2022 Diabetes in CKD Guideline"]}},"114-109":{"quick":"83歲、eGFR 28、明顯蛋白尿的新診斷糖尿病:Metformin/SGLT2i 受 eGFR 限制、SU/TZD 不宜,選 DPP-4i(linagliptin,不需依腎功能調量)→ C。","detail":{"background":"本例 eGFR 28(嚴重 CKD)、下肢水腫、巨量白蛋白尿。逐藥評估:Metformin eGFR<30 禁用(A 不宜);Empagliflozin(SGLT2i)在 eGFR 28 雖近年腎臟試驗已可用於更低 eGFR,但「起始」於此值降糖效益有限且本題情境列為次選;Glimepiride(SU)在腎差者低血糖風險高(D 不宜);Pioglitazone(TZD)致水腫/心衰、此例已有下肢水腫(E 不宜)。Linagliptin(DPP-4i)主要經腸肝膽道排泄、「不需依腎功能調整劑量」、低血糖風險低,最適合嚴重腎功能不全者(C,本題答案)。出題年(114/2025)。","options":{"A":"錯:Metformin eGFR<30 禁用。","B":"錯:SGLT2i 於 eGFR 28 起始降糖效益有限(本題列次選)。","C":"正解:Linagliptin(DPP-4i)不需依腎功能調量、低血糖風險低,適合重度 CKD。","D":"錯:SU 於腎差者低血糖風險高。","E":"錯:TZD 致水腫,此例已有下肢水腫。"},"sources":["Harrison's 21e, Ch.398 DM: Complications","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","KDIGO 2022 Diabetes in CKD Guideline"]}},"114-111":{"quick":"DPP-4i 與 GLP-1 RA 同屬 incretin 類,「不應併用」(機轉重疊、無加成)→ D 錯誤。","detail":{"background":"本例 T2DM 合併 DKD(eGFR 40、UACR 210、NPDR)。(A)加 SGLT2i 延緩腎惡化、降心血管事件(KDIGO 建議)(正確)。(B)eGFR 40 仍可續用 Metformin 並監測(正確,eGFR≥30 可用)。(C)GLP-1 RA 可作合併選項、兼降糖與減重、具腎心保護(正確)。(D)「DPP-4i 與 GLP-1 RA 屬 incretin 類,合併可加強血糖控制」錯誤(本題答案)——兩者機轉重疊(皆作用於 GLP-1 路徑),併用無額外加成、不建議同時使用。(E)UACR>200 即使血壓未達140/90,仍應用 ACEI/ARB 作腎臟保護(正確)。出題年(114/2025)。","options":{"A":"正確:加 SGLT2i 延緩腎惡化、降 CV 事件。","B":"正確:eGFR 40 可續用 Metformin。","C":"正確:GLP-1 RA 為合併選項。","D":"錯誤(本題答案):DPP-4i 與 GLP-1 RA 機轉重疊,不應併用。","E":"正確:蛋白尿明顯應用 ACEI/ARB 護腎。"},"sources":["Harrison's 21e, Ch.398 DM: Complications","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","KDIGO 2022 Diabetes in CKD Guideline"]}},"114-112":{"quick":"DM 合併 HFrEF 急性惡化時,最不適合加「saxagliptin(DPP-4i,曾增心衰住院)」→ C。","detail":{"background":"本例 T2DM+HFrEF(LVEF 38%)急性失代償(水腫、NT-proBNP 升)。(A)SGLT2i 為 HFrEF 標準治療之一(DAPA-HF、EMPEROR-Reduced),改善血糖兼降心血管死亡與心衰住院(正確)。(B)eGFR 58,Metformin 可續用且不增心衰風險(正確)。(C)「加 saxagliptin」最不適合(本題答案)——SAVOR-TIMI 53 顯示 saxagliptin「增加心衰住院」,心衰病人應避免。(D)TZD(pioglitazone)致鈉水滯留惡化心衰,不應使用(正確)。(E)其他藥無效/禁忌時胰島素可作後線(正確)。出題年(114/2025)。","options":{"A":"正確:SGLT2i 為 HFrEF 標準治療。","B":"正確:eGFR 58 Metformin 可續用。","C":"最不適合(本題答案):saxagliptin 增心衰住院,HF 病人應避免。","D":"正確:TZD 致水腫惡化心衰,不應用。","E":"正確:胰島素可作後線選擇。"},"sources":["Harrison's 21e, Ch.398 DM: Complications","Williams Textbook of Endocrinology 14e","ADA Standards of Care in Diabetes 2024/2025","KDIGO 2022 Diabetes in CKD Guideline"]}},"102-綜-7":{"quick":"甲亢誘發之低血鉀週期性麻痺(thyrotoxic periodic paralysis):應先治甲亢/補鉀,「即刻放射碘」非急性處置 → E 錯誤。","detail":{"background":"30 歲亞洲男性、突發下肢麻痺+腱反射消失+K 2.0+free T4 高→典型「甲狀腺毒性低血鉀週期性麻痺(thyrotoxic periodic paralysis, TPP)」:甲狀腺素過多使 Na-K-ATPase 活性增加、鉀大量移入細胞內致急性低血鉀與肌肉麻痺,好發亞洲年輕男性,常於高碳水餐後/休息時發作。處置:急性期謹慎補鉀(避免反彈性高血鉀)+非選擇性 β-blocker(propranolol),根本是控制甲亢;誘因衛教為「避免高碘食物、避免高糖/飽食(會誘發鉀內移)、發作時補鉀」。控制甲亢後 TPP 多不再發(C 正確)。放射碘(I-131)是甲亢「根治」選項之一,但屬擇期治療,「急性麻痺發作時即刻放射碘」並非處置重點且不恰當,故 E 錯誤(本題答案)。出題年(102/2013)。","options":{"A":"正確:應避免高碘食物(海帶紫菜)。","B":"正確:避免甜食/飽食以免誘發鉀內移。","C":"正確:甲亢控制後 TPP 多不再發。","D":"正確:宜補充含鉀食物。","E":"錯誤(本題答案):急性發作期重點是補鉀+β-blocker+控甲亢,非即刻放射碘。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"105-綜-9":{"quick":"antiTPO 高+TSH 輕升+fT4 正常→ 亞臨床甲狀腺低下(橋本),此時甲狀腺素治療效益有限,觀察追蹤即可 → E。","detail":{"background":"本例 fT4 正常(1.07)、TSH 輕升(7.5)、antiTPO 高(400)→「亞臨床甲狀腺功能低下(subclinical hypothyroidism)合併橋本氏甲狀腺炎」。處置原則:TSH 介於 4–10、無症狀、非懷孕、無心血管/不孕考量者,多數「先觀察、定期追蹤 TSH」即可,不急於補充 levothyroxine(治療門檻多為 TSH>10 或有症狀/懷孕/抗體陽性且計畫懷孕者)。給甲狀腺素「為了治療甲狀腺腫」「為了降 antiTPO 發炎」「為了降 thyroglobulin」皆非正確適應症。故此情境「甲狀腺素治療無益,觀察即可」最恰當(E)。出題年(105/2016)。","options":{"A":"錯:fT4 正常非明顯低下,不需即刻補充。","B":"錯:甲狀腺素非為「治療甲狀腺腫」而給。","C":"錯:抗體高不是給甲狀腺素的理由(無法降發炎)。","D":"錯:thyroglobulin 高非治療適應症。","E":"正解:亞臨床低下無症狀者觀察追蹤即可。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"107-綜-6":{"quick":"倦怠便秘體重增加+低鈉+高膽固醇+CK 高+心搏慢→ 甲狀腺低下,應先測 free T4/hsTSH → D。","detail":{"background":"本例 45 歲女性倦怠、便秘、體重增加、臉浮腫、心搏慢(58)、低血鈉(128)、高膽固醇(260,LDL 160)、CK 顯著升高(1500)——皆為「甲狀腺功能低下(hypothyroidism)」典型表現(代謝下降、黏液水腫、低鈉、高血脂、肌酸激酶上升致肌病變、心搏慢)。最恰當下一步是「測 free T4、hsTSH」確認診斷(D);找到並治療甲狀腺低下後,高膽固醇與其他異常多會改善——若先給 statin 反增 CK/肌病變風險(A 不當)。其他選項(ARB、尿鈉蛋白、ACTH/cortisol)非此典型甲低表現的首選。出題年(107/2018)。","options":{"A":"錯:甲低未矯正即給 statin 增肌病變風險。","B":"錯:ARB 非此情境首選。","C":"錯:低鈉雖見於甲低,但首應查甲狀腺。","D":"正解:測 free T4/hsTSH 確認甲狀腺低下。","E":"錯:ACTH/cortisol 為腎上腺,非此典型甲低表現首選。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"109-124":{"quick":"禁食是把 T4 轉成 rT3「減少 5'-deiodinase」造成 low T3——本選項把酵素機轉/名稱寫反 → A 不正確。","detail":{"background":"非甲狀腺疾病症候群(sick euthyroid / nonthyroidal illness syndrome, NTIS):重病/禁食時周邊「5'-deiodinase(type 1)」活性下降,使 T4 較少轉成活性 T3、較多轉成無活性 rT3,造成「low T3 syndrome」。(A)敘述「禁食影響 5-deiodinase 使 T4 變 rT3 造成 low T3」表面接近,但題目判為「不正確」——關鍵在 rT3 上升是因「5'-deiodinase(將 rT3 降解者)活性下降使 rT3 清除減少」與「外環 5'-脫碘減少」,選項把酵素作用方向/命名混淆而判錯(本題答案 A)。(B)low T4+low T3 代表病情嚴重、預後差(正確)。(C)急性肝病釋出 TBG 使 total T3/T4 升、unbound 不變(正確)。(D)dopamine/glucocorticoid 抑制 TSH(正確)。(E)HIV 初期 T3/T4 可升高(正確)。出題年(109/2020)。","options":{"A":"不正確(本題答案):rT3 上升主因是其「清除(脫碘降解)減少」,選項對 deiodinase 機轉/命名描述有誤。","B":"正確:low T4+low T3 預後差。","C":"正確:急性肝病釋 TBG 使 total↑、free 不變。","D":"正確:dopamine/類固醇抑制 TSH。","E":"正確:HIV 初期 T3/T4 可升。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"109-125":{"quick":"分化型甲狀腺癌做完放射碘後,TSH 抑制治療應把甲狀腺素開到「TSH 偏低(輕度甲亢範圍)」以抑制復發 → D。","detail":{"background":"甲狀腺乳突癌全切除+頸部淋巴結轉移(此例左側 5/11 陽性)為中高復發風險,術後常輔以放射性碘(I-131)清除殘餘組織與微轉移。放射碘後須給「甲狀腺素抑制治療(TSH suppression)」——把 TSH 壓到「偏低(subclinical hyperthyroidism 範圍)」以減少 TSH 對殘餘/復發癌細胞的刺激(D,本題答案)。其他:(A)分期 T 與 N 標示及 stage 須依年齡與最新 AJCC,選項標示不符;(B)放射碘時機通常為術後數週並做準備(停甲狀腺素或用 rhTSH、低碘飲食),非「兩週內」固定;(C)診斷掃描劑量與流程描述為干擾;(E)thyroglobulin 為追蹤指標,治療後理想是「測不到/極低」,非維持在10。出題年(109/2020)。","options":{"A":"錯:分期標示與最新 AJCC 不符。","B":"錯:放射碘須準備,非固定術後兩週內。","C":"錯:診斷掃描流程描述為干擾選項。","D":"正解:放射碘後 TSH 抑制治療,維持 TSH 偏低。","E":"錯:Tg 追蹤理想為測不到/極低,非維持10。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"110-99":{"quick":"孕期抗甲狀腺藥可過胎盤、fT4 高 TSH 正常/高須想 TSHoma 或甲狀腺荷爾蒙阻抗,thyrotoxicosis 但 fT4 正常查 fT3 →(1)(4)(5)=D。","detail":{"background":"逐項:(1)抗甲狀腺藥(MMI/PTU)可過胎盤影響胎兒甲狀腺(故孕期須最低有效劑量)(正確)。(2)「哺乳期絕對禁用抗甲狀腺藥」錯誤——低劑量 PTU/MMI 哺乳期可用、相對安全。(3)放射碘前停藥時程的敘述把 carbimazole 與 PTU 處理寫反/不符實務(判錯)。(4)有甲狀腺毒症表現但 TSH 低、fT4 正常,應測 fT3 以確認「T3 toxicosis」(正確)。(5)fT4 高而 TSH 正常或升高,須想「TSH 分泌型腦垂體瘤(TSHoma)」或「甲狀腺荷爾蒙阻抗症候群」(正確)。正確=(1)+(4)+(5)=D。出題年(110/2021)。","options":{"A":"錯:含(3)時程敘述有誤。","B":"錯:含(2)哺乳期非絕對禁用。","C":"錯:含(3)。","D":"正解:(1)藥過胎盤+(4)查 fT3 確認 T3 toxicosis+(5)TSHoma/阻抗。","E":"錯:含(2)(3)。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"110-104":{"quick":"先左後右、頸痛轉移+ESR/CRP 升+fT4 高 TSH 低→ 亞急性(de Quervain)甲狀腺炎,給 NSAID(輕者)→ C。","detail":{"background":"本例頸部疼痛「由左轉右移行」、甲狀腺壓痛、ESR/CRP 升高、fT4 高而 TSH 極低→典型「亞急性肉芽腫性(de Quervain)甲狀腺炎」,常於病毒上呼吸道感染後,濾泡破壞釋出儲存的甲狀腺素造成暫時甲狀腺毒症(放射碘攝取低)。治療:輕中度疼痛用「NSAID」,中重度用類固醇(prednisolone);甲狀腺毒症為一過性,用 β-blocker 緩解症狀即可,「不」用抗甲狀腺藥(非合成過多)、「不」用抗生素(非細菌性急性甲狀腺炎)。故 C(亞急性甲狀腺炎、可給 NSAID)正確。出題年(110/2021)。","options":{"A":"錯:破壞性甲狀腺毒症非合成過多,不用抗甲狀腺藥。","B":"錯:雖屬發炎但首選 NSAID(中重度才類固醇)。","C":"正解:亞急性甲狀腺炎,輕者給 NSAID。","D":"錯:非細菌性急性甲狀腺炎,不需抗生素。","E":"乾擾:超音波雖有助,但本題最正確是診斷+NSAID。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"111-77":{"quick":"感冒後前頸痛+甲狀腺壓痛+fT4 高 TSH 低→ 亞急性甲狀腺炎,給類固醇或 NSAID → E。","detail":{"background":"45 歲、兩週前感冒、前頸痛、甲狀腺壓痛、fT4 高、TSH 低、白血球正常→「亞急性(de Quervain)甲狀腺炎」。為自限性、病毒後發炎性甲狀腺破壞,釋出甲狀腺素致暫時性甲狀腺毒症(放射碘攝取低)。治療以「抗發炎」為主:輕者 NSAID,中重度疼痛/症狀明顯用類固醇(prednisolone)約 2–4 週漸減;甲狀腺毒症期用 β-blocker 緩解症狀。不用抗甲狀腺藥(非合成增加)、不用抗生素(非細菌)。故 E(類固醇或 NSAID)正確。出題年(111/2022)。","options":{"A":"錯:破壞性甲狀腺毒症不用抗甲狀腺藥。","B":"錯:非細菌性,不用抗生素。","C":"錯:甲狀腺素高,不應再補。","D":"錯:抗甲狀腺藥+抗生素皆不需。","E":"正解:亞急性甲狀腺炎,給類固醇或 NSAID 抗發炎。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"111-97":{"quick":"TSI 過胎盤致胎兒甲狀腺毒症、放射碘前須避孕6個月且孕哺絕對禁忌、胎兒甲毒徵候 →(1)(3)(4)=D。","detail":{"background":"逐項:(1)母體 thyroid-stimulating immunoglobulins(TSI)可過胎盤刺激胎兒甲狀腺→胎兒/新生兒甲狀腺毒症(正確)。(2)「不論孕期首選 PTU」錯誤——首選依孕期不同:第一孕期用 PTU(MMI 致畸胎風險如皮膚發育不全/後鼻孔閉鎖),第二、三孕期改回 MMI(PTU 肝毒性),非「全程 PTU」。(3)放射碘治療後約6個月可安全受孕,孕期與哺乳期使用放射碘為絕對禁忌(正確)。(4)胎兒甲狀腺毒症徵候:子宮內生長遲緩、胎心>160/min、骨齡超前、甲狀腺腫(正確)。(5)產後甲亢易復發,但哺乳期「可」用低劑量抗甲狀腺藥(非不應使用),故(5)錯。正確=(1)+(3)+(4)=D。出題年(111/2022)。","options":{"A":"錯:含(2)。","B":"錯:漏(1)。","C":"錯:含(5)。","D":"正解:(1)TSI 過胎盤+(3)放射碘避孕6月/孕哺禁忌+(4)胎兒甲毒徵候。","E":"錯:含(2)(5)。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"112-102":{"quick":"孕婦即使甲狀腺功能正常,若有甲狀腺抗體仍增流產/早產風險 → E。","detail":{"background":"(A)「自體免疫甲狀腺低下皆瀰漫性腫大」錯——萎縮性(atrophic)橋本可甲狀腺萎縮不腫大。(B)亞臨床甲狀腺低下「無症狀就不需治療」錯——TSH>10、懷孕、有症狀或計畫懷孕者應治療。(C)甲狀腺低下「血壓必偏低不會高血壓」錯——甲低反而常見「舒張壓上升的高血壓」(全身血管阻力增加)。(D)levothyroxine 劑量約 1.6 μg/kg/day,但應「空腹(早餐前30–60分鐘)」服用而非餐後,故 D 細節錯。(E)孕婦即使 TSH/fT4 正常,只要「甲狀腺自體抗體(anti-TPO)陽性」,流產與早產風險仍升高(正確,本題答案),須密切監測甲狀腺功能。出題年(112/2023)。","options":{"A":"錯:萎縮性橋本可不腫大。","B":"錯:TSH>10/孕婦/有症狀者仍需治療。","C":"錯:甲低反常見舒張性高血壓。","D":"錯:levothyroxine 應空腹服用(早餐前),非餐後。","E":"正解:孕婦甲狀腺抗體陽性即使功能正常仍增流產/早產風險。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"112-103":{"quick":"超音波「高度大於寬度(taller-than-wide)」之結節惡性風險較高 → A。","detail":{"background":"甲狀腺結節惡性超音波特徵(ATA/TI-RADS):實質低回音、邊緣不規則/微小分葉、微鈣化、縱橫比>1(「taller-than-wide」,高度>寬度)、被膜外侵犯——故 A(taller-than-wide 惡性風險較高)正確。(B)濾泡瘤(follicular neoplasm,Bethesda IV)惡性風險約15–30%,非<10%。(C)甲狀腺癌 TNM:T2 為>2–4 cm、T3 為>4 cm 或微小腺體外侵犯,3.5 cm 屬 T2 非 T3。(D)分化型甲狀腺癌「並非全部」術後都需放射碘——低風險(如 T1N0)不需,依分期/復發風險決定。(E)甲狀腺淋巴癌(常見於橋本基礎)治療以化療±放療為主,「手術」非首要。故 A 為本題答案。出題年(112/2023)。","options":{"A":"正解:taller-than-wide 結節惡性風險較高。","B":"錯:濾泡瘤惡性風險約15–30%,非<10%。","C":"錯:3.5 cm 屬 T2(非 T3)。","D":"錯:低風險分化癌不需常規放射碘。","E":"錯:甲狀腺淋巴癌以化放療為主,非手術首選。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"113-116":{"quick":"診斷自體免疫甲狀腺疾病最常用抗體=甲狀腺球蛋白抗體(TgAb)+甲狀腺過氧化酶抗體(TPOAb)→ C。","detail":{"background":"自體免疫甲狀腺疾病(AITD,含橋本氏甲狀腺炎與葛雷夫氏病)最常用的診斷抗體組合是「甲狀腺過氧化酶抗體(anti-TPO)」與「甲狀腺球蛋白抗體(anti-Tg/TgAb)」,兩者陽性支持自體免疫甲狀腺炎(橋本以 anti-TPO 最敏感)。TSH 受體抗體(TRAb/TSI)則為葛雷夫氏病的特異標記。ANA、anti-dsDNA、anti-RNP 為全身性自體免疫(SLE/MCTD)抗體,與 AITD 診斷無關。故最常用組合為 TgAb+TPOAb(C)。出題年(113/2024)。","options":{"A":"錯:ANA 非甲狀腺特異抗體。","B":"錯:anti-dsDNA 為 SLE 抗體。","C":"正解:TgAb+TPOAb 為診斷 AITD 最常用抗體。","D":"錯:TSHR Ab 為葛雷夫氏特異,非「最常用」一般 AITD 篩檢組合。","E":"錯:anti-RNP 為 MCTD 抗體。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"114-97":{"quick":"會「抑制」TSH 分泌者為 dopamine、somatostatin、glucocorticoid、T3;胰島素不抑制 TSH → A(除外)。","detail":{"background":"腦垂體促甲狀腺細胞(thyrotrope)分泌 TSH 受多重調控:正向為下視丘 TRH;負向「抑制」TSH 分泌者包括——T3/T4(負回饋,B選項 D 的核心)、dopamine(多巴胺)、somatostatin(體抑素)、glucocorticoid(類固醇)。胰島素(insulin)並非 TSH 分泌的抑制因子。故「除外」者為 A(胰島素)。臨床意義:重症使用 dopamine 或高劑量類固醇會壓低 TSH,造成 sick euthyroid 解讀困難。出題年(114/2025)。","options":{"A":"正解(除外):胰島素不抑制 TSH 分泌。","B":"抑制:dopamine 抑制 TSH。","C":"抑制:somatostatin 抑制 TSH。","D":"抑制:glucocorticoid 抑制 TSH。","E":"抑制:T3 負回饋抑制 TSH。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"114-98":{"quick":"甲狀腺相關眼病變可見於甲亢、甲低或功能正常者 → B。","detail":{"background":"(A)甲狀腺毒性低血鉀週期性麻痺最常見於「亞洲年輕男性」,非西方中年女性(錯)。(B)甲狀腺相關眼病變(Graves ophthalmopathy/TAO)主要與自體免疫(TSHR 抗體刺激眼眶纖維母細胞)有關,可見於甲亢、甲狀腺功能正常(euthyroid Graves)甚至甲低者(正確,本題答案)。(C)甲亢最常見的心律不整是「竇性心搏過速」,心房顫動雖重要但非「最常見」(錯)。(D)TSI 濃度與甲狀腺荷爾蒙濃度「並非直接線性相關」(錯)。(E)葛雷夫氏病合併眼病變約25–50%、皮膚病變(脛前黏液水腫)與指端粗厚較少見,選項比例(30/20/10%)與一般教科書「眼病變較高、皮膚/acropachy 更低(<5%)」不符(錯)。出題年(114/2025)。","options":{"A":"錯:TPP 好發亞洲年輕男性。","B":"正解:TAO 可見於甲亢、甲低或功能正常者。","C":"錯:甲亢最常見心律為竇性心搏過速。","D":"錯:TSI 與甲狀腺素濃度非直接相關。","E":"錯:皮膚病變/acropachy 比例遠低於選項所述。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"114-99":{"quick":"分化型甲狀腺癌術後依分期決定放射碘;T1N0M0 給放射碘不影響復發/存活 → C。","detail":{"background":"(A)碘過量/缺乏、amiodarone、lithium 皆可致甲狀腺功能異常;但「亞臨床甲低孕婦不建議治療」錯——孕婦亞臨床甲低(尤其抗體陽性)建議給 levothyroxine。(B)急性(化膿性)甲狀腺炎以抗生素+引流為主,梨狀竇瘻管檢查應於「急性發炎緩解後」進行,非急性期趁早(錯)。(C)分化型甲狀腺癌全切後依「分期/復發風險」決定是否放射碘;低風險 T1N0M0 給放射碘「並不改善復發率或存活率」,故不常規給(正確,本題答案)。(D)亞急性甲狀腺炎好發「30–50 歲女性」非男性(錯)。(E)橋本氏甲狀腺炎「不應鼓勵多攝碘」(碘可惡化自體免疫),也非以類固醇治療,治療是甲低時補 levothyroxine(錯)。出題年(114/2025)。","options":{"A":"錯:亞臨床甲低孕婦建議治療。","B":"錯:梨狀竇瘻管檢查應於急性緩解後。","C":"正解:低風險 T1N0M0 放射碘不改善復發/存活,依分期決定。","D":"錯:亞急性甲狀腺炎好發30–50歲女性。","E":"錯:橋本不應多攝碘、非類固醇治療。"},"sources":["Harrison's 21e, Ch.384 Disorders of the Thyroid Gland","Williams Textbook of Endocrinology 14e","2015/2016 ATA Thyroid Nodule & Differentiated Thyroid Cancer / Hyperthyroidism Guidelines","2017 ATA Thyroid Disease in Pregnancy"]}},"101-綜-6":{"quick":"促進「骨生成(anabolic)」的是 PTH(teriparatide)與 NaF →(2)+(3)=B。","detail":{"background":"骨質疏鬆藥物依機轉分「抗骨吸收(antiresorptive)」與「促骨生成(anabolic)」:抗骨吸收者抑制蝕骨細胞——bisphosphonate、estrogen、SERM、calcitonin、denosumab、Vit D(維持礦化、間接);促骨生成(刺激成骨)者——「間歇性 PTH/PTHrP 類似物(teriparatide、abaloparatide)」與「氟化鈉(NaF,刺激成骨細胞但所成骨品質脆)」,以及新型 romosozumab(雙重)。本題選項中屬「促骨生成」者為(2)PTH 與(3)NaF=B。(1)bisphosphonate、(5)estrogen 為抗骨吸收;(4)Vit D 主為維持鈣磷與礦化,非典型 anabolic。出題年(101/2012)。","options":{"A":"錯:含(1)bisphosphonate(抗骨吸收)。","B":"正解:(2)PTH +(3)NaF 為促骨生成。","C":"錯:含(4)Vit D(非典型 anabolic)。","D":"錯:含(5)estrogen(抗骨吸收)。","E":"錯:(1)(5)皆抗骨吸收。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"103-綜-6":{"quick":"肺癌+高血鈣+PTH 測不到→ 惡性腫瘤高血鈣,輸液後維持血鈣首選 bisphosphonate → B。","detail":{"background":"本例肺癌、血鈣 13、iPTH 測不到→「惡性腫瘤相關高血鈣(humoral hypercalcemia of malignancy,多由 PTHrP 介導,PTH 被壓抑)」。急性處置先「大量生理食鹽水輸液」回補容積並促鈣排出;要「持續維持血鈣正常」最有效的是「bisphosphonate(如 zoledronate/pamidronate)」抑制蝕骨吸收(起效慢約2–4天但持久),為長效控制首選(B)。Calcitonin 起效快但效果短暫且快速耐受(tachyphylaxis),僅作橋接;loop diuretic 僅在容積回補後輔助(且不應在脫水時用);prednisolone 主用於維生素D/肉芽腫/淋巴瘤型高血鈣;EDTA 不用。出題年(103/2014)。","options":{"A":"錯:calcitonin 起效快但短效耐受,僅橋接。","B":"正解:bisphosphonate 持久抑制蝕骨,維持血鈣首選。","C":"錯:利尿劑僅容積回補後輔助。","D":"錯:類固醇用於維生素D/肉芽腫/血液腫瘤型。","E":"錯:EDTA 非標準治療。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"109-126":{"quick":"Calcimimetics(擬鈣劑)降 PTH 與血鈣,但「不增加骨密度」→ D 不正確。","detail":{"background":"高血鈣鑑別:(A)維生素A中毒可致 PTH 低的高血鈣(增蝕骨)(正確)。(B)短期急性出現、PTH 低的高血鈣應先想惡性腫瘤(正確)。(C)約10–15% 鋰鹽治療者可有高血鈣(改變鈣感應受器設定點)(正確)。(D)「Calcimimetics(cinacalcet)可降 PTH、降血鈣並增加骨密度」不正確(本題答案)——cinacalcet 活化副甲狀腺鈣感應受器(CaSR)降低 PTH 與血鈣,但「不增加骨密度」(不像 bisphosphonate);用於副甲狀腺癌、無法手術之原發性副甲狀腺亢進、洗腎之次發性副甲亢。(E)甲狀腺亢進(增骨轉換)與腎上腺功能低下(Addison)皆可致高血鈣(正確)。出題年(109/2020)。","options":{"A":"正確:維生素A中毒致 PTH 低高血鈣。","B":"正確:急性 PTH 低高血鈣先想惡性。","C":"正確:鋰鹽可致高血鈣。","D":"不正確(本題答案):cinacalcet 降 PTH/血鈣但不增骨密度。","E":"正確:甲亢/腎上腺功能低下可致高血鈣。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"109-127":{"quick":"Klinefelter syndrome(性腺低下)會增加骨質疏鬆風險 → B。","detail":{"background":"(A)DXA 之「T-score」是與「同性別、同種族之『年輕健康成人』高峰骨量」比較(非同年紀);與同年紀比較者是 Z-score(錯)。(B)Klinefelter syndrome(47,XXY,睪固酮低下/性腺功能低下)→ 性荷爾蒙缺乏增加骨質疏鬆風險(正確,本題答案)。(C)骨折風險隨 T-score 每下降一個標準差約增 1.5–3 倍,但「T-score<−2.5 者骨折風險恰為 −1.0~−2.5 者的3倍」此精確倍數敘述不成立(錯)。(D)FRAX 納入的家族史是「父母『髖部』骨折」,非「腰椎骨折」(錯)。(E)Denosumab 與 bisphosphonate 同樣有 ONJ 與「非典型股骨骨折(atypical femur fracture)」風險,故「不會增加 atypical femur fracture」錯。出題年(109/2020)。","options":{"A":"錯:T-score 與年輕健康成人比,非同年紀。","B":"正解:Klinefelter 性腺低下增骨鬆風險。","C":"錯:該精確倍數敘述不成立。","D":"錯:FRAX 用父母「髖部」骨折,非腰椎。","E":"錯:denosumab 亦有 atypical femur fracture 風險。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"109-172":{"quick":"PTHrP 介導之惡性高血鈣,類固醇(Prednisolone)最不需要 → D。","detail":{"background":"本例肺多發結節+高血鈣 14.2+PTH-rP 升高→「惡性腫瘤體液性高血鈣(HHM,PTHrP 介導)」。標準處置:①大量生理食鹽水(Normal saline)回補容積、促鈣排出;②容積回補後可加 loop diuretic(furosemide)輔助利鈣;③calcitonin 快速短期降鈣(橋接);④bisphosphonate(pamidronate/zoledronate)持久抑制蝕骨(主力)。「類固醇(prednisolone)」對 PTHrP 介導的高血鈣「無效」,主要用於維生素D中毒、肉芽腫病(sarcoidosis)、淋巴瘤/骨髓瘤等「1,25-D 或細胞激素介導」的高血鈣,故此情境「最不需要」(D,本題答案)。出題年(109/2020)。","options":{"A":"需要:生理食鹽水擴容利鈣。","B":"需要:pamidronate 持久降鈣。","C":"需要:容積回補後 furosemide 輔助。","D":"最不需要(本題答案):類固醇對 PTHrP 型高血鈣無效。","E":"需要:calcitonin 快速短期降鈣。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"110-60":{"quick":"T1DM 厭食+開始部分靜脈營養→ 葡萄糖刺激胰島素使磷移入細胞內,造成急性低血磷(refeeding)→ E。","detail":{"background":"本例 T1DM、厭食體重下降、住院開始「部分靜脈營養」第三天出現低血磷(0.8)→「再餵食症候群(refeeding syndrome)」之低血磷:長期飢餓後給予碳水化合物→葡萄糖刺激胰島素分泌→磷(及鉀、鎂)大量隨葡萄糖「移入細胞內」進行磷酸化(ATP、2,3-DPG 合成),血中磷急速下降(E,本題答案)。其他:DKA 急性期細胞外磷可暫時正常或高(總體缺乏,治療後才降);hungry bone 見於副甲狀腺/甲狀腺術後;原發性副甲低與腎性失磷非此情境主因。處置:補磷、補鉀鎂、緩慢增加熱量並監測電解質。出題年(110/2021)。","options":{"A":"錯:DKA 急性期磷多正常/高(治療後才降)。","B":"錯:hungry bone 見於副甲/甲狀腺術後。","C":"錯:原發性副甲低非此情境。","D":"錯:腎性失磷非主因。","E":"正解:再餵食時磷因胰島素移入細胞內致急性低血磷。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"111-98":{"quick":"高血鈣:PTH 相關(副甲狀腺癌/鋰鹽/FHH)+1,25-D 代謝慢+惡性腫瘤 →(1)(2)(5)=E。","detail":{"background":"逐項:(1)PTH 相關高血鈣含副甲狀腺癌、鋰鹽、家族性低尿鈣高血鈣(FHH)(正確)。(2)「24-hydroxylase 缺乏使 1,25(OH)2D 代謝(降解)變慢」→活性維生素D 累積→高血鈣(見於 CYP24A1 突變之嬰兒高血鈣)(正確)。(3)「維生素A『缺乏』致高血鈣」錯誤——是維生素A「中毒/過量」致高血鈣;thiazide、fat necrosis 可致高血鈣但與「A缺乏」並列使本項錯。(4)甲狀腺功能「低下」一般不致高血鈣(甲狀腺『亢進』才增骨轉換致高血鈣);immobilization 可致高血鈣,但與「甲低」並列使本項錯。(5)惡性腫瘤經轉移或體液因子(PTHrP)致高血鈣(正確)。正確=(1)+(2)+(5)=E。出題年(111/2022)。","options":{"A":"錯:含(3)(維生素A缺乏有誤)。","B":"錯:含(4)(甲低有誤)。","C":"錯:漏(2)。","D":"錯:含(3)。","E":"正解:(1)PTH相關+(2)1,25-D代謝慢+(5)惡性腫瘤。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"112-104":{"quick":"鱗狀細胞癌(SCC)較常以 PTHrP 引起高血鈣 → C。","detail":{"background":"(A)「鋰鹽致高血鈣停藥後仍無法恢復」錯——多數停鋰後可逆。(B)FHH 是「體染色體『顯性』(autosomal dominant)」之 CaSR 去活化突變,非隱性(錯)。(C)肺癌中「鱗狀細胞癌(SCC)」較常經 PTHrP 引起體液性高血鈣;小細胞癌與腺癌雖可骨轉移但較少以高血鈣表現(正確,本題答案)。(D)原發性副甲亢約「80–85% 為單一腺瘤」此數字對,但「副甲狀腺癌侵襲性強、存活期很短」過度——副甲狀腺癌雖侵襲但非「存活期很短」一概而論;且本選項並非最正確。(E)calcitonin 起效比 denosumab/pamidronate「快」(對),但主要副作用是「快速耐受/噁心」而非「嚴重低血鈣」(denosumab/bisphosphonate 才較易致低血鈣),故 E 錯。最正確為 C。出題年(112/2023)。","options":{"A":"錯:停鋰後高血鈣多可逆。","B":"錯:FHH 為體染色體顯性遺傳。","C":"正解:鱗狀細胞癌較常以 PTHrP 致高血鈣。","D":"錯:副甲狀腺癌存活敘述過度,非最正確。","E":"錯:calcitonin 主副作用為耐受/噁心,非嚴重低血鈣。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"113-72":{"quick":"全甲狀腺切除後低血鈣(口周麻木、Trousseau 徵象、PTH 2)→ 急性症狀性低血鈣,靜脈葡萄糖酸鈣 → D。","detail":{"background":"本例全甲狀腺切除術後4天,口周麻木、上肢痙攣、量血壓誘發腕部痙攣(Trousseau sign 陽性)、PTH 極低(2 pg/mL)→「術後副甲狀腺功能低下致急性症狀性低血鈣」(手術損傷/移除副甲狀腺)。有「神經肌肉激惹症狀(tetany、Chvostek/Trousseau)」之急性低血鈣為急症,首選「靜脈注射葡萄糖酸鈣(IV calcium gluconate)」快速矯正(D),後續再補口服鈣與活性維生素D(calcitriol);若同時低血鎂則須補鎂(本例鎂 1.7 正常)。口服維生素D起效慢、皮下 PTH 與碳酸氫鈉皆非急性症狀性低血鈣首選。出題年(113/2024)。","options":{"A":"錯:口服維生素D起效慢,非急性首選。","B":"錯:皮下 PTH 非急性低血鈣首選。","C":"錯:鎂正常(1.7),非主因。","D":"正解:症狀性低血鈣急救用 IV calcium gluconate。","E":"錯:碳酸氫鈉與此無關。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"113-101":{"quick":"Bisphosphonate 增骨密度但不影響血鈣;calcimimetic 降 PTH/血鈣但不影響骨密度 → B。","detail":{"background":"(A)高血鈣最常見病因「原發性副甲狀腺亢進(門診最常見)與惡性腫瘤(住院最常見)」約佔九成(對),但「維生素D『缺乏』致高血鈣」有誤(應為維生素D中毒),故 A 整體不正確。(B)Bisphosphonate 抑制蝕骨增加骨密度但「不直接降血鈣到治療範圍/不以調血鈣為主」;calcimimetic(cinacalcet)活化 CaSR 降 PTH 與血鈣但「不增骨密度」——兩者作用標的不同,敘述正確(本題答案)。(C)無症狀原發性副甲亢的手術指標:年齡「<50 歲」(非>60)、血鈣高於正常上限>1 mg/dL、Ccr<60(或 eGFR<60)、骨密度 T<−2.5 或脆弱性骨折——選項把年齡與閾值寫錯。(D)術後低血鈣可能需處理(補鈣/維生素D),非一概不需。(E)calcitonin 抑制蝕骨並「增加」腎鈣排出(非減少),故 E 錯。出題年(113/2024)。","options":{"A":"錯:維生素D「缺乏」致高血鈣有誤(應為中毒)。","B":"正解:bisphosphonate 增骨密度不調血鈣;calcimimetic 降 PTH/血鈣不增骨密度。","C":"錯:手術指標年齡應<50、閾值寫錯。","D":"錯:術後低血鈣常需補鈣處理。","E":"錯:calcitonin 增加腎鈣排出,非減少。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Te
