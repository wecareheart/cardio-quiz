xtbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"113-138":{"quick":"PTHrP 介導之惡性高血鈣,類固醇(Prednisolone)最不適宜 → D。","detail":{"background":"同 109-172。肺多發結節+高血鈣 14.2+PTH-rP 升→ 惡性腫瘤體液性高血鈣(PTHrP 介導)。處置:生理食鹽水擴容(A)、容積回補後 furosemide 利鈣(B)、calcitonin 快速短期降鈣(C)、pamidronate 持久抑蝕骨(E)。「類固醇(prednisolone)」對 PTHrP 型無效,主用於維生素D/肉芽腫/淋巴瘤型高血鈣,故最不適宜(D,本題答案)。出題年(113/2024)。","options":{"A":"適宜:生理食鹽水擴容。","B":"適宜:furosemide 容積回補後利鈣。","C":"適宜:calcitonin 快速短期降鈣。","D":"最不適宜(本題答案):類固醇對 PTHrP 型高血鈣無效。","E":"適宜:pamidronate 持久抑蝕骨。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"114-100":{"quick":"甲亢、thiazide、維生素A/D 中毒、鋰鹽、脂肪壞死皆可致高血鈣 → C。","detail":{"background":"(A)PTH 具生物活性的是「N 端(amino-terminal)前34個胺基酸(PTH 1-34,即 teriparatide)」,非碳端,故 A 錯。(B)calcitonin 抑制蝕骨「骨吸收」(非抑制成骨),並「增加」腎鈣排出,故 B 寫反。(C)甲狀腺亢進、thiazide 利尿劑、維生素A或D 中毒、鋰鹽、脂肪溶解(fat necrosis)皆可致高血鈣(正確,本題答案)。(D)PTHrP 主要結合並活化「PTH-1 receptor(PTH/PTHrP 共用受體)」,非僅 PTH-2,故 D 寫反。(E)無症狀原發性副甲亢手術指標:血鈣高於上限>1 mg/dL、Ccr<60、T<−2.5;本例血鈣僅高0.8、Ccr 65、T −2.0 皆未達標,「不」需手術,故 E 錯。出題年(114/2025)。","options":{"A":"錯:PTH 活性在 N 端(1-34),非碳端。","B":"錯:calcitonin 抑「骨吸收」且增腎鈣排出,選項寫反。","C":"正解:甲亢/thiazide/維生素A,D中毒/鋰鹽/脂肪壞死皆可致高血鈣。","D":"錯:PTHrP 活化 PTH-1 receptor,選項寫反。","E":"錯:此例未達手術指標,不需手術。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"114-104":{"quick":"庫欣、副甲亢、甲亢、腎上腺功能不足、肢端肥大、高泌乳素等內分泌病皆增骨鬆風險 → B。","detail":{"background":"(A)「男性」骨鬆/骨折風險「低於」女性(女性風險高),故把「男性」列為增風險因子錯。(B)多種內分泌病增骨鬆風險:庫欣(類固醇過多)、副甲狀腺亢進、甲狀腺亢進、腎上腺功能不足(治療用類固醇)、肢端肥大、高泌乳素(致性腺低下)——皆正確(本題答案)。(C)cyclosporine、aluminum、heparin 增骨鬆風險(對),但「lithium 減少骨鬆風險」未確立、敘述有誤。(D)Z-score 與「同年齡同性別」比、T-score 與「年輕健康成人」比——選項把兩者寫反。(E)osteocalcin、bone-specific ALP 皆為「骨生成(formation)」指標;骨吸收指標是 CTX/NTX——選項把 bone-specific ALP 誤列為骨吸收標記,故 E 錯。出題年(114/2025)。","options":{"A":"錯:女性骨鬆風險高於男性。","B":"正解:庫欣/副甲亢/甲亢/腎上腺功能不足/肢端肥大/高泌乳素皆增骨鬆。","C":"錯:lithium 減骨鬆風險未確立。","D":"錯:Z-score 與同齡比、T-score 與年輕成人比(選項寫反)。","E":"錯:bone-specific ALP 屬骨生成指標,非骨吸收。"},"sources":["Harrison's 21e, Ch.408 Disorders of the Parathyroid Gland & Calcium Homeostasis / Ch.410 Osteoporosis","Williams Textbook of Endocrinology 14e","2014 Guidelines for Asymptomatic Primary Hyperparathyroidism (4th Intl Workshop)"]}},"109-129":{"quick":"Calcitonin 是甲狀腺髓質癌(MTC)術前診斷與術後追蹤的腫瘤標記 → C。","detail":{"background":"甲狀腺髓質癌(MTC)源自分泌降鈣素的濾泡旁 C 細胞,可為散發或遺傳性(MEN2A/2B、家族性 MTC,RET 原癌基因突變)。(A)RET 突變兒童「預防性甲狀腺切除」時機依突變風險分層:MEN2B(最高風險,M918T)應「1 歲內」、MEN2A 高風險「5 歲前」、中度風險可依 calcitonin 追蹤——「一律5歲前」不夠精確。(B)MEN2B 的 MTC 比 MEN2A「更具侵襲性」(本選項寫反)。(C)Calcitonin(及 CEA)是 MTC 術前診斷與術後追蹤的腫瘤標記(正確,本題答案);術前高 calcitonin 也提示腫瘤負荷與轉移。(D)MTC 源自 C 細胞「不攝碘」,故「放射性碘治療無效」(本選項錯)——復發轉移以手術、外放療或標靶(vandetanib/cabozantinib、選擇性 RET 抑制劑 selpercatinib)治療。(E)MTC 遠處轉移 10 年存活約 20–40%,「50%」偏高。出題年(109/2020)。","options":{"A":"錯:預防性切除時機依 RET 風險分層,非一律5歲前。","B":"錯:MEN2B 的 MTC 比 MEN2A 更具侵襲性(選項寫反)。","C":"正解:calcitonin 為 MTC 術前診斷與術後追蹤標記。","D":"錯:MTC 不攝碘,放射性碘無效。","E":"錯:遠處轉移 10 年存活約20–40%,非50%。"},"sources":["Harrison's 21e, Ch.388 MEN / Ch.389 Autoimmune Polyglandular Syndromes","Williams Textbook of Endocrinology 14e","2015 ATA Medullary Thyroid Carcinoma Guidelines"]}},"110-101":{"quick":"前頸腫塊抽出液 PTH>3000+高血鈣+高 PTH→ 副甲狀腺病灶,合併甲狀腺結節與腎結石史→ 多發性內分泌腫瘤(MEN1) → D。","detail":{"background":"本例高血鈣(11.9)+PTH 高(125)+反覆腎結石(高血鈣致)→「原發性副甲狀腺功能亢進」;頸部囊性病灶抽吸液「PTH>3000」證實為「副甲狀腺(囊性腺瘤)」來源;同時有甲狀腺結節。年輕(53歲)、副甲亢+其他腺體病灶並存,須想「多發性內分泌腫瘤(MEN,尤其 MEN1:副甲狀腺+胰臟內分泌+腦垂體『3P』)」。本題在「單一副甲狀腺腫瘤」與「MEN」間,因合併多腺體表現,最可能答案選「多發性內分泌腫瘤(MEN)」(D)。臨床應進一步篩 MEN1(基因、gastrin/prolactin/IGF-1 等)。出題年(110/2021)。","options":{"A":"錯:抽吸液 PTH>3000 證實為副甲狀腺源,非單純甲狀腺囊腫。","B":"錯:非甲狀腺癌(thyroglobulin 僅輕高、為甲狀腺組織背景)。","C":"部分正確但不完整:雖有副甲狀腺腫瘤,但合併多腺體表現指向 MEN。","D":"正解:副甲亢+多腺體病灶→多發性內分泌腫瘤(MEN)。","E":"錯:PTH 高且血鈣高為原發性(非次發性副甲亢)。"},"sources":["Harrison's 21e, Ch.388 MEN / Ch.389 Autoimmune Polyglandular Syndromes","Williams Textbook of Endocrinology 14e","2015 ATA Medullary Thyroid Carcinoma Guidelines"]}},"112-100":{"quick":"慢性黏膜皮膚念珠菌病是 APS-1(非 APS-2)的特徵 → 「除了」E。","detail":{"background":"自體免疫多腺體症候群(APS):APS-1(APECED,AIRE 基因突變,兒童期)三聯徵為「慢性黏膜皮膚念珠菌病+副甲狀腺功能低下+原發性腎上腺功能不足」。APS-2(Schmidt 症候群,成人,HLA 相關,多基因)常見組合為「原發性腎上腺功能不足(Addison)+自體免疫甲狀腺疾病(甲亢或甲低)+第1型糖尿病」,並可合併早發性卵巢衰竭、惡性貧血、白斑、乳糜瀉等。本題問 APS-2「常見疾病,除了」——選項 A 腎上腺功能不足、B 甲亢、C 早發卵巢衰竭、D 惡性貧血皆屬 APS-2;唯「E 慢性黏膜皮膚念珠菌病」屬 APS-1 特徵,故為「除外」答案(E)。出題年(112/2023)。","options":{"A":"屬 APS-2:原發性腎上腺功能不足。","B":"屬 APS-2:自體免疫甲狀腺(甲亢)。","C":"屬 APS-2:早發性卵巢衰竭。","D":"屬 APS-2:惡性貧血。","E":"正解(除外):慢性黏膜皮膚念珠菌病屬 APS-1 特徵。"},"sources":["Harrison's 21e, Ch.388 MEN / Ch.389 Autoimmune Polyglandular Syndromes","Williams Textbook of Endocrinology 14e","2015 ATA Medullary Thyroid Carcinoma Guidelines"]}},"113-104":{"quick":"APS-1 常於「嬰幼兒/兒童期」起病(非30-40歲),首發多為念珠菌病 → C 不正確。","detail":{"background":"(A)APS 多見內分泌「功能低下」(Addison、副甲狀腺低下、T1DM、性腺低下),但 APS-1 與 APS-2 皆可見「甲狀腺功能亢進(Graves)」(正確)。(B)APS-1 常見皮膚黏膜念珠菌病;APS-2 可見乳糜瀉(正確)。(C)「APS-1 發病年齡通常為30–40歲」不正確(本題答案)——APS-1(APECED,AIRE 突變)為「嬰幼兒/兒童期」起病,常以慢性黏膜皮膚念珠菌病為最早病徵,各成分間隔數年陸續出現。(D)APS-2 女多於男,有器官特異自體抗體(正確;相對地 APS-1 特徵是有抗『細胞激素 type I 干擾素』抗體)。(E)APS-1/Addison 病人用 ketoconazole(抑制類固醇生成)治療念珠菌病可能誘發腎上腺危症(正確)。出題年(113/2024)。","options":{"A":"正確:APS 多功能低下,但皆可見 Graves。","B":"正確:APS-1 念珠菌病、APS-2 乳糜瀉。","C":"不正確(本題答案):APS-1 為嬰幼兒/兒童期起病,非30-40歲。","D":"正確:APS-2 女多於男、有器官特異抗體。","E":"正確:ketoconazole 可誘發腎上腺危症。"},"sources":["Harrison's 21e, Ch.388 MEN / Ch.389 Autoimmune Polyglandular Syndromes","Williams Textbook of Endocrinology 14e","2015 ATA Medullary Thyroid Carcinoma Guidelines"]}},"114-138":{"quick":"甲狀腺髓質癌(MTC)特定腫瘤標記為 Calcitonin → D。","detail":{"background":"甲狀腺髓質癌(MTC)源自分泌降鈣素之濾泡旁 C 細胞,其「特定腫瘤標記」為「Calcitonin(降鈣素)」(及輔以 CEA),用於術前診斷、評估腫瘤負荷與術後追蹤復發。其他選項:catecholamines/metanephrines→嗜鉻細胞瘤;hCG→妊娠滋養細胞病/生殖細胞瘤;neuron-specific enolase(NSE)→小細胞肺癌/神經內分泌瘤;單株免疫球蛋白→多發性骨髓瘤。故本題答案 D(Calcitonin)。出題年(114/2025)。","options":{"A":"錯:catecholamines 為嗜鉻細胞瘤標記。","B":"錯:hCG 為生殖細胞/滋養細胞瘤標記。","C":"錯:NSE 為小細胞肺癌/NET 標記。","D":"正解:calcitonin 為 MTC 特定腫瘤標記。","E":"錯:單株免疫球蛋白為骨髓瘤標記。"},"sources":["Harrison's 21e, Ch.388 MEN / Ch.389 Autoimmune Polyglandular Syndromes","Williams Textbook of Endocrinology 14e","2015 ATA Medullary Thyroid Carcinoma Guidelines"]}},"100-綜-6":{"quick":"倦怠、體重減輕+黏膜/手掌紋黑色色素沉著→ 原發性腎上腺功能不足(Addison),測 8AM ACTH/cortisol → C。","detail":{"background":"本例倦怠、體重減輕、「口腔黏膜/手指關節/手掌紋黑色色素沉著(hyperpigmentation)」為「原發性腎上腺功能不足(Addison's disease)」的典型徵象——腎上腺皮質破壞使 cortisol 不足,負回饋解除使 ACTH(及共同前驅物 POMC、MSH)升高,刺激黑色素細胞造成色素沉著(尤其黏膜、皺褶、疤痕、受壓處)。鈉鉀此時可正常或低鈉高鉀。最佳診斷檢查是「清晨(8 AM)血漿 cortisol 與 ACTH」(原發性者 cortisol 低、ACTH 高),續以 ACTH(cosyntropin)刺激試驗確認。故選 C。Ceruloplasmin 是 Wilson 病(本例銅代謝非重點),腹部影像非首選。出題年(100/2011)。","options":{"A":"錯:腹部超音波非診斷腎上腺功能不足首選。","B":"錯:CT 是定位,須先生化診斷。","C":"正解:8AM ACTH/cortisol 為診斷 Addison 首選。","D":"錯:ceruloplasmin 是 Wilson 病,非此色素沉著病因。","E":"錯:血糖/HbA1c 與此色素沉著表現不符。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"106-綜-4":{"quick":"腎上腺腫瘤≥4cm(此例3.5cm且症狀可疑)即使功能檢查正常,仍建議手術切除 → B。","detail":{"background":"腎上腺偶發瘤(adrenal incidentaloma)處置取決於「①是否具功能、②是否疑惡性」。疑惡性指標:腫瘤大(>4 cm)、影像不良性特徵(unenhanced CT >10 HU、邊緣不規則、生長快、不均質)。本例右腎上腺 3.5 cm 腫瘤,雖內分泌功能檢查(cortisol/ACTH/兒茶酚胺/醛固酮/腎素/DHEAS)皆正常(無功能),但仍有臨床發作性症狀且腫瘤偏大,依原則「不論有無功能,因大小/惡性疑慮應照會外科手術切除並送病理」(B)。觀察、症狀治療、精神科或補充雄性素皆不恰當。出題年(106/2017)。","options":{"A":"錯:即使無功能,腫瘤偏大仍應切除送病理。","B":"正解:不論功能,因大小/惡性疑慮應手術切除。","C":"錯:不應先歸因精神科。","D":"錯:非男性更年期,補雄性素無據。","E":"錯:症狀明顯+腫瘤偏大不宜僅追蹤。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"109-79":{"quick":"查 RAAS 前可保留「α-blocker(prazosin)與 CCB(nifedipine)」控壓,影響 ARR 最小 →(1)+(3)=A。","detail":{"background":"原發性醛固酮症(PA)篩檢測「醛固酮/腎素比(ARR)」時,許多降壓藥會干擾結果:醛固酮受體拮抗劑(spironolactone/eplerenone)、利尿劑會升 renin 致偽陰性(須停4週);β-blocker 抑 renin 使 ARR 假性升高(偽陽性);ACEI/ARB 升 renin 使 ARR 假性偏低(偽陰性)。對 ARR 影響最小、可保留用於控壓的是「α1-blocker(prazosin/doxazosin)」與「非二氫吡啶/二氫吡啶 CCB(verapamil/nifedipine)」。故可保留(1)α-blocker+(3)CCB,暫停(2)β-blocker、(4)利尿劑/醛固酮拮抗劑、(5)ACEI=A。出題年(109/2020)。","options":{"A":"正解:α-blocker(1)+CCB(3)對 ARR 影響最小,可保留控壓。","B":"錯:含(5)ACEI 影響 ARR。","C":"錯:含(4)利尿劑影響 ARR。","D":"錯:含(2)β-blocker、(4)。","E":"錯:含(2)(5)。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"109-122":{"quick":"庫欣症狀+術後未改善+ACTH 高+低血鉀+LDH 高→ 疑異位性 ACTH,做胸腹骨盆 CT 找原發 → D。","detail":{"background":"本例疑庫欣手術後三個月症狀未改善、MRI 無明顯腦垂體瘤、cortisol 高、ACTH 高(96)、嚴重低血鉀(2.8)、LDH 高→ 高度懷疑「異位性 ACTH 症候群(ectopic ACTH,常見小細胞肺癌、類癌、胰島/胸腺 NET)」:特徵為快速進展、嚴重低血鉀代謝性鹼中毒(高 cortisol 之礦皮質作用)、色素沉著、體重減輕。下一步應「找異位來源」——安排「胸腹骨盆腔電腦斷層(±生長抑素受體影像)」尋找分泌 ACTH 的腫瘤(D)。High-dose DST 與 IPSS 用於「鑑別腦垂體 vs 異位」,但此例 MRI 陰性、臨床強烈指向異位,優先以影像找原發灶。出題年(109/2020)。","options":{"A":"次選:高劑量 DST 可助鑑別,但此例優先找異位原發。","B":"錯:症狀未改善不宜僅追蹤。","C":"次選:IPSS 鑑別腦垂體/異位,但臨床已強烈指向異位。","D":"正解:胸腹骨盆 CT 尋找異位 ACTH 原發腫瘤。","E":"錯:pasireotide 為治療,非此時診斷步驟。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"109-123":{"quick":"4cm 腎上腺腫瘤、cortisol/醛固酮/兒茶酚胺大致正常→ 應加測 17-OHP 及 DHEAS(評估雄性素/CAH)→ D。","detail":{"background":"腎上腺偶發瘤須完整功能評估:庫欣(低劑量DST/午夜唾液皮質醇)、嗜鉻細胞瘤(血/尿 metanephrine)、原發性醛固酮症(ARR,若有高血壓低血鉀)、以及「雄性素(DHEAS)與類固醇前驅物(17-hydroxyprogesterone)」以評估分泌雄性素之腫瘤或先天性腎上腺增生(CAH)/腎上腺皮質癌。本例 cortisol、ACTH、醛固酮、腎素、尿兒茶酚胺大致在範圍內,為更完整評估腎上腺功能,應「加測 17-OHP 及 DHEAS」(D)。此例未達高血壓低血鉀故非優先 PA(B 錯);CT density 10 HU 偏脂質性(較傾向良性腺瘤)但仍須功能完整評估,非立即手術(E 錯)。出題年(109/2020)。","options":{"A":"錯:並非絕大多數單側腎上腺瘤都分泌 cortisol。","B":"錯:無高血壓低血鉀,非優先考慮 PA。","C":"錯:利尿劑/三環抗憂鬱使尿兒茶酚胺「偽高」非偽低。","D":"正解:加測 17-OHP 及 DHEAS 完整評估雄性素/CAH。","E":"錯:應先完成功能評估,非立即手術。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"110-100":{"quick":"庫欣氏症候群增加靜脈血栓栓塞(VTE/PE)風險 → B。","detail":{"background":"本例皮下瘀青、腹部紫色斑紋、cortisol 不被抑制(8am/4pm 皆高、喪失日夜節律)、ACTH 低(<5)、單側腎上腺腫瘤→「ACTH 非依賴型(腎上腺源)庫欣氏症候群」。(A)雖 ACTH 低代表對側腎上腺受抑,「術後仍須給 hydrocortisone」補充至 HPA 軸恢復(故 A 錯)。(B)庫欣為「高凝血狀態」,深部靜脈栓塞與肺栓塞風險增加(正確,本題答案),圍術期須評估抗凝預防。(C)HPA 軸恢復比率因病因而異,但敘述的特定數字過於絕對。(D)庫欣常見白血球「上升」(嗜中性增多)、淋巴與嗜酸性球減少,非白血球下降/嗜鹼性增加。(E)mitotane/ketoconazole/metyrapone 確為內科控制選項(此選項本身大致正確,但題目最正確為 B 的簡明陳述)。出題年(110/2021)。","options":{"A":"錯:對側腎上腺受抑,術後仍須補 hydrocortisone。","B":"正解:庫欣為高凝狀態,增 DVT/PE 風險。","C":"錯:HPA 恢復比率敘述過於絕對。","D":"錯:庫欣常見白血球上升、淋巴/嗜酸性球減少。","E":"乾擾:藥物治療大致正確,但 B 為最正確簡明陳述。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"110-102":{"quick":"嗜鉻細胞瘤轉移最相關的是「SDHB」突變,非 SDHC → B 不正確。","detail":{"background":"嗜鉻細胞瘤(pheochromocytoma)。(A)三環抗憂鬱藥、opiates、metoclopramide、顯影劑等可誘發兒茶酚胺釋放危象(正確)。(B)「約5–10% 惡性;SDHC 突變最易轉移」不正確(本題答案)——與「惡性/轉移」關聯最強的是「SDHB」突變(SDHB 相關副神經節瘤/嗜鉻細胞瘤轉移率高、預後差),非 SDHC。(C)血漿「游離 metanephrines」敏感度/特異度高於直接測兒茶酚胺(正確)。(D)免疫組化 chromogranin A、synaptophysin 陽性(神經內分泌標記)(正確)。(E)惡性/轉移性可用 ¹³¹I-MIBG 等放射性核種治療(正確)。出題年(110/2021)。","options":{"A":"正確:TCA/opiates 可誘發症狀。","B":"不正確(本題答案):與轉移最相關者為 SDHB,非 SDHC。","C":"正確:游離 metanephrines 敏感度/特異度高。","D":"正確:chromogranin/synaptophysin 陽性。","E":"正確:轉移性可用 ¹³¹I-MIBG。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"110-103":{"quick":"原發性醛固酮症「增加」骨質疏鬆風險(非減少)→ A 不正確。","detail":{"background":"原發性醛固酮症(PA)。(A)「PA 增糖尿病但『減少』骨質疏鬆風險」不正確(本題答案)——醛固酮過多會「增加」骨質流失與骨折風險(尿鈣排出增加、續發副甲狀腺亢進),並增加心血管事件、心房顫動、糖尿病。(B)良性醛固酮腺瘤多<2 cm,大腫瘤(尤其年輕)要警覺腎上腺皮質癌(正確)。(C)GRA(家族性醛固酮症第一型,CYP11B1/B2 嵌合基因受 ACTH 調控)有家族遺傳、早發高血壓與出血性中風;低劑量 glucocorticoid 抑制 ACTH 可減少醛固酮(正確)。(D)測 ARR 前應矯正低血鉀並停用礦皮質受體拮抗劑至少4週(正確)。(E)thiazide 致低血鉀惡化(正確)。出題年(110/2021)。","options":{"A":"不正確(本題答案):PA 增加(非減少)骨質疏鬆/骨折風險。","B":"正確:腺瘤多<2cm,大者警覺惡性。","C":"正確:GRA 遺傳、glucocorticoid 可抑制。","D":"正確:測 ARR 前矯正低血鉀、停 MRA 4週。","E":"正確:thiazide 惡化低血鉀。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"111-99":{"quick":"低劑量地塞米松抑制試驗 cortisol 仍<50 nmol/L(被抑制)可初步排除庫欣 → B。","detail":{"background":"庫欣氏症候群篩檢/診斷。(A)病因性別分布:腎上腺腫瘤與 Cushing's disease「女性居多」、異位性 ACTH 較常見於男性(與肺癌相關),選項把分布寫反。(B)低劑量地塞米松抑制試驗(0.5 mg q6h×2天,或隔夜1 mg)後,若血清 cortisol 被壓抑「<50 nmol/L(<1.8 μg/dL)」,代表 HPA 軸可被抑制,可「初步排除」庫欣(正確,本題答案)。(C)約「>90% Cushing's disease 為 microadenoma(<1 cm)」,故「40% 大於1公分」不正確。(D)庫欣常見白血球「上升」、嗜酸性球/淋巴球下降,非嗜鹼性增加。(E)庫欣為高凝狀態,DVT 與 PE「皆」增加,非僅 PE。出題年(111/2022)。","options":{"A":"錯:性別分布寫反(腎上腺腫瘤/Cushing disease 女性居多)。","B":"正解:低劑量 DST 後 cortisol<50 nmol/L 可初步排除庫欣。","C":"錯:多數 Cushing disease 為 microadenoma(<1cm)。","D":"錯:庫欣白血球上升、嗜酸/淋巴球下降。","E":"錯:DVT 與 PE 風險皆增加。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"111-100":{"quick":"GRA 應先以低劑量地塞米松控制血壓,必要時加醛固酮受體拮抗劑 → E。","detail":{"background":"原發性醛固酮症(PA)。(A)PA 增加骨質疏鬆/糖尿病/認知障礙風險,且「不會使 cortisol 分泌減少」(部分腺瘤甚至共分泌 cortisol),敘述有誤。(B)β-blocker 抑 renin 使 ARR「上升(偽陽性)」非下降,選項方向錯。(C)saline infusion test 後 aldosterone「<5 ng/dL(<140 pmol/L)可排除 PA」;10 ng/dL(280 pmol/L)屬「不能排除/確診範圍」,故 C 錯。(D)AVS 判讀單側化用「醛固酮/皮質醇(lateralization ratio)」且需明顯側化(常用>4,經 ACTH 刺激),「比差距1.8」不足以判定,且選項用 aldosterone/cortisone 名稱有誤。(E)GRA(glucocorticoid-remediable aldosteronism)應先以「低劑量地塞米松」抑制 ACTH 控制血壓,必要時加醛固酮受體拮抗劑(正確,本題答案)。出題年(111/2022)。","options":{"A":"錯:PA 不會使 cortisol 減少,且增多種共病。","B":"錯:β-blocker 使 ARR 上升(偽陽性),非下降。","C":"錯:排除 PA 之 aldosterone 閾值約<5 ng/dL,非10。","D":"錯:AVS 側化判讀標準與名稱有誤。","E":"正解:GRA 先以低劑量地塞米松控壓,必要時加 MRA。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"111-101":{"quick":"嗜鉻細胞瘤症狀典型(高血壓+陣發性心悸/冒汗/頭痛),但也可無症狀數年 → A。","detail":{"background":"嗜鉻細胞瘤「偉大的偽裝者」。(A)典型為持續/陣發性高血壓合併「頭痛、心悸、冒汗」三聯徵,但約一部分病人(尤其偶發瘤、SDHx 相關)可無症狀達數年(正確,本題答案)。(B)發作時間多為「數分鐘至1小時內」,非通常>2小時。(C)三環抗憂鬱藥、opiates、metoclopramide「會誘發(增加)」症狀發作而非減少(選項方向錯)。(D)現代含碘非離子顯影劑在已 α-blockade 下「可安全使用」,並非「最好不要施打」(舊觀念已修正)。(E)血漿/尿 metanephrine 敏感度高(對),但「易受靜脈穿刺壓力造成偽陽性」對血漿游離 metanephrine 確有此限制——惟此選項與 A 相比 A 為「最正確」。出題年(111/2022)。","options":{"A":"正解:典型三聯徵但也可無症狀數年。","B":"錯:發作多數分鐘至1小時,非>2小時。","C":"錯:TCA/opiates/metoclopramide 是誘發(增加)症狀。","D":"錯:α-blockade 下顯影劑可安全使用。","E":"乾擾:偽陽性敘述部分成立,但 A 為最正確。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"112-98":{"quick":"異位性 ACTH 病程快、嚴重肌病變;ACTH 平均約腦垂體瘤8倍但重疊;IPSS 鑑別敏感度高 →(2)(4)(5)=C。","detail":{"background":"ACTH 依賴型庫欣鑑別(腦垂體瘤 Cushing's disease vs 異位性 ACTH):(1)「腦垂體瘤男多於女、異位女多於男」錯——Cushing's disease「女性居多」、異位性 ACTH(肺癌相關)男性較多,選項寫反。(2)腦垂體瘤病程進展慢;異位性進展快且常有嚴重肌病變/低血鉀(正確)。(3)低血鉀比例敘述(腦垂體45%、異位55%)為干擾——異位性低血鉀比例「遠高」(>70–90%),此具體數字不正確。(4)異位性 ACTH 平均約腦垂體瘤的數倍,但因重疊性高,單以 ACTH 濃度無法區別(正確)。(5)IPSS 是鑑別兩者的金標準:基礎中樞/周邊 ACTH 比>2、CRH 刺激後>3 支持腦垂體源,敏感度>90–95%(正確)。正確=(2)+(4)+(5)=C。出題年(112/2023)。","options":{"A":"錯:含(1)(性別分布寫反)。","B":"錯:漏(5)。","C":"正解:(2)病程/肌病變+(4)ACTH 重疊+(5)IPSS 高敏感。","D":"錯:含(1)(3)。","E":"錯:含(3)。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"112-99":{"quick":"PA:β-blocker 使 ARR 上升、雙側增生用 MRA/鈉通道阻斷劑藥物治療 →(2)+(5)=D。","detail":{"background":"原發性醛固酮症篩檢診斷:(1)測 ARR 前矯正低血鉀並停 spironolactone「4週」(非2週),故(1)時程錯。(2)β-blocker 抑 renin→使 aldosterone/renin 比「上升」(偽陽性);初步 ARR 不確定時停 β-blocker 兩週後重測(正確)。(3)saline infusion test 後 aldosterone「<5 ng/dL 可排除 PA」;10 ng/dL 屬不能排除,故(3)錯。(4)確診 PA 後若 CT 單側腫瘤:「<35–40歲、明顯單側腺瘤」可直接考慮手術,「≥40歲」因偶發瘤多反而「更需 AVS 確認側化」——選項把年齡邏輯寫反,故(4)錯。(5)確診 PA 且雙側小結節增生(idiopathic hyperaldosteronism)應以「礦皮質受體拮抗劑(spironolactone/eplerenone)或鈉通道阻斷劑(amiloride)」藥物治療(正確)。正確=(2)+(5)=D。出題年(112/2023)。","options":{"A":"錯:含(1)(3)。","B":"錯:含(4)。","C":"錯:含(1)(3)。","D":"正解:(2)β-blocker 升 ARR+(5)雙側增生藥物治療。","E":"錯:含(1)(3)(4)。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"112-101":{"quick":"血漿游離 metanephrine 敏感度最高、但易受抽血壓力致「偽陽性」——此敘述正確;不正確處在他項... 本題答案 A。","detail":{"background":"嗜鉻細胞瘤。本題問「不正確」者為 A。(A)敘述「血漿 metanephrine 敏感度最高、易因抽血壓力偽陽性」——血漿游離 metanephrine 確實敏感度最高(篩檢首選)且確有姿勢/壓力造成偽陽性的限制(故須平躺、避免咖啡因);本題將 A 列為「不正確」應是針對其表述被視為與其它皆正確之選項相對的瑕疵(命題以 A 為答案)。(B)典型陣發性頭痛/冒汗/心悸,可無症狀數年(正確)。(C)TCA、opiates 誘發症狀(正確)。(D)術前 α-blocker 控壓、術中 nitroprusside 控高血壓(正確)。(E)惡性嗜鉻細胞瘤須有「轉移」才定義為惡性,單憑細胞異型/有絲分裂/侵犯不足(正確)。依官方答案,A 為本題答案。出題年(112/2023)。","options":{"A":"本題答案:此選項被官方判為不正確(其餘 B–E 皆為正確敘述)。","B":"正確:陣發性頭痛/冒汗/心悸,可無症狀數年。","C":"正確:TCA/opiates 誘發症狀。","D":"正確:術前 α-blocker、術中 nitroprusside。","E":"正確:須有轉移才定義惡性。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"112-158":{"quick":"27歲新診斷 DM+高血壓+中央肥胖+紫紋+cortisol 高/ACTH 測不到→ ACTH 非依賴型庫欣,做腎上腺 CT → D。","detail":{"background":"本例年輕女性、新發糖尿病與高血壓、近端肌無力、中央型肥胖、腹部紫色條紋(照片),24 小時尿游離 cortisol 大幅升高(3058 nmol,>正常上限數十倍)、「ACTH 偵測不到」、無外源類固醇→ 確立「內生性、ACTH 非依賴型(腎上腺源)庫欣氏症候群」。ACTH 被壓抑指向「腎上腺自主分泌 cortisol」(腺瘤/癌/增生),故下一步定位應做「腎上腺電腦斷層(adrenal CT)」找腎上腺腫瘤(D)。若 ACTH「升高/不被抑制」才需腦垂體 MRI 或找異位 ACTH(胸部 CT);本例 ACTH 測不到,故非腦垂體/胸部。出題年(112/2023)。","options":{"A":"錯:ACTH 測不到非異位性,不需先做胸部 CT。","B":"錯:ACTH 非依賴(測不到),非腦垂體源。","C":"錯:大腸鏡與此無關。","D":"正解:ACTH 非依賴型庫欣,做腎上腺 CT 定位腫瘤。","E":"錯:甲狀腺超音波與此無關。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"113-102":{"quick":"GRA 的 aldosterone 受「ACTH」調控而非 renin → B。","detail":{"background":"原發性醛固酮症(PA)。(A)病因比例:醛固酮腺瘤(Conn)約「30–40%」、雙側特發性增生(IHA)約「60%」,選項把比例寫反(寫成腺瘤60%/增生40%)。(B)GRA(家族性醛固酮症第一型)因 CYP11B1/CYP11B2 嵌合基因,使醛固酮合成受「ACTH」調控(而非 renin/血鉀),故低劑量 glucocorticoid 抑 ACTH 可降醛固酮(正確,本題答案)。(C)PA 雖可有高血壓、低血鉀、代謝性鹼中毒,但「低血鉀僅見於約 30–50%」病人(非80%,多數 PA 血鉀正常),故 C 數字錯。(D)PA 增第2型糖尿病風險,且「增加(非降低)」骨質疏鬆風險,故 D 錯。(E)未停 β-blocker 時 ARR 易「偏高(偽陽性)」;若此時 ARR「低」反而較可靠地不支持 PA——選項邏輯敘述為干擾。最正確為 B。出題年(113/2024)。","options":{"A":"錯:腺瘤約30–40%、雙側增生約60%(比例寫反)。","B":"正解:GRA 的 aldosterone 受 ACTH 調控。","C":"錯:低血鉀僅約30–50%,非80%。","D":"錯:PA 增加(非降低)骨質疏鬆風險。","E":"乾擾:β-blocker 使 ARR 偏高,選項邏輯不正確。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"113-103":{"quick":"嗜鉻細胞瘤可表現多尿、多渴、姿勢性低血壓、高血糖、高血鈣 → A。","detail":{"background":"嗜鉻細胞瘤。(A)兒茶酚胺過多可致「高血糖(抑胰島素、促糖解)」、「姿勢性低血壓(容積收縮+血管反應)」、「多尿多渴」、偶見「高血鈣(共分泌 PTHrP 或合併 MEN2 副甲亢)」(正確,本題答案)。(B)利尿劑/TCA/α、β阻斷劑會使檢驗「偽陽性(偽高)」或干擾,而非造成「偽陰性」;且抗高血壓藥不會「減少」真實兒茶酚胺(選項錯)。(C)病理 Zellballen 型態正確,但免疫染色 chromogranin 與 synaptophysin「皆陽性」(選項說 synaptophysin 陰性,錯)。(D)約「30–40%」嗜鉻細胞瘤有遺傳症候群(VHL、MEN2、NF1、SDHx),非65%(數字過高)。(E)約「5%」腎上腺偶發瘤是嗜鉻細胞瘤(對),但嗜鉻細胞瘤在 unenhanced CT 多「>10 HU(富血管、非脂質)」,選項說<10 HU 錯。故最正確為 A。出題年(113/2024)。","options":{"A":"正解:可表現多尿/多渴/姿勢性低血壓/高血糖/高血鈣。","B":"錯:藥物造成偽陽性非偽陰性,且不減少真實兒茶酚胺。","C":"錯:synaptophysin 應為陽性。","D":"錯:遺傳症候群約30–40%,非65%。","E":"錯:嗜鉻細胞瘤 unenhanced CT 多>10 HU。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"114-72":{"quick":"PA 腎上腺評估:CT 為初步、AVS 比較兩側腎上腺靜脈與下腔靜脈醛固酮、AVS 須同測皮質醇確認導管定位(梯度>3)→(1)(3)(5)=B。","detail":{"background":"原發性醛固酮症之腎上腺評估:(1)「精細切面腎上腺 CT」是初步定位影像首選(正確)。(2)「所有確診者都應立即 AVS」錯——年輕(<35歲)、明顯單側腺瘤、生化嚴重者可考慮直接手術,並非「所有人立即 AVS」。(3)AVS 比較「左、右腎上腺靜脈與下腔靜脈(IVC)」的醛固酮(及皮質醇)濃度以判定側化(正確)。(4)「單側病灶且年齡<40 歲需避免手術」錯——年輕且明顯單側病灶反而「適合手術」(可不必 AVS)。(5)AVS 導管定位正確性以「同時測皮質醇」確認,腎上腺靜脈與 IVC 皮質醇梯度需足夠(常用 selectivity index,選項以>3 表達定位成功)(正確)。正確=(1)+(3)+(5)=B。出題年(114/2025)。","options":{"A":"錯:含(2)(4)。","B":"正解:(1)CT 初步+(3)AVS 比較兩側與 IVC+(5)同測皮質醇確認定位。","C":"錯:含(4)。","D":"錯:含(2)(4)。","E":"錯:含(4)。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"114-101":{"quick":"醛固酮主要受 RAAS 調控,下視丘-腦垂體損傷不顯著影響醛固酮合成 → A。","detail":{"background":"(A)鹽皮質激素(醛固酮)主要由「腎素-血管張力素-醛固酮系統(RAAS)」與血鉀調控,ACTH 僅短暫/次要影響;故「下視丘-腦垂體損傷不顯著影響醛固酮合成」正確(本題答案)——這也是為何續發性腎上腺功能不足(ACTH 缺乏)時醛固酮多保留、較少嚴重高鉀。(B)庫欣常見近端肌病變、無月經、DVT/PE 風險增加(對),但白血球多「上升」非減少,故 B 有誤。(C)PA 病因比例腺瘤約30–40%、雙側增生約60%,選項寫反(60/40),故 C 錯。(D)ACEI 升 renin 使 ARR「下降(偽陰)」,β-blocker 抑 renin 使 ARR「上升」——選項把方向寫反。(E)糖皮質素缺乏(腎上腺功能不足)可有肌痛、關節痛、發燒、貧血、「嗜酸性球與淋巴球增加」、TSH 可輕升等;選項把多項寫成相反,故 E 錯。出題年(114/2025)。","options":{"A":"正解:醛固酮主要受 RAAS 調控,腦垂體損傷影響不大。","B":"錯:庫欣白血球上升(非減少)。","C":"錯:PA 腺瘤約30–40%、增生約60%(比例寫反)。","D":"錯:ACEI 降 ARR、β-blocker 升 ARR(方向寫反)。","E":"錯:糖皮質素缺乏之血球/TSH 變化敘述有誤。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"114-102":{"quick":"嗜鉻細胞瘤是偉大偽裝者,可有頭痛/冒汗/心悸/高血壓/焦慮甚至低血壓,也可無症狀數年 → B。","detail":{"background":"嗜鉻細胞瘤。(A)「rule of tens」指約 10% 腎上腺外、10% 雙側、10%「惡性」、10% 家族性、10% 兒童——選項把「10% 為良性」寫錯(應為約10%惡性)。(B)被稱「偉大的偽裝者」,表現多樣:頭痛、冒汗、心悸、高血壓、焦慮恐慌,甚至「姿勢性低血壓/血壓不穩」,也可無症狀數年(正確,本題答案)。(C)定位影像可用含顯影劑 CT/MRI(在適當 α-blockade 下安全),「非必須無顯影劑」(C 過時)。(D)術前以 α-blocker 控壓、補充容積、必要時加 β-blocker(務必 α 先於 β,避免無對抗 α 致高血壓危象),但「不用 CCB/ACEI」過於絕對——CCB 常作為輔助降壓藥可使用,故 D 錯。(E)MEN2A 含 MTC+嗜鉻細胞瘤+副甲亢;「MEN2B 不含 MTC」錯——MEN2B 也以 MTC 為核心(加嗜鉻細胞瘤、黏膜神經瘤、馬凡體型),故 E 錯。出題年(114/2025)。","options":{"A":"錯:rule of tens 應含約10%惡性(非10%良性)。","B":"正解:偉大偽裝者,多樣表現含低血壓,可無症狀數年。","C":"錯:適當 α-blockade 下含顯影劑影像可安全使用。","D":"錯:CCB 可作輔助降壓,非絕對不可用。","E":"錯:MEN2B 仍以 MTC 為核心。"},"sources":["Harrison's 21e, Ch.386 Disorders of the Adrenal Cortex / Ch.387 Pheochromocytoma","Williams Textbook of Endocrinology 14e","2014 Endocrine Society: Pheochromocytoma/Paraganglioma; 2016 Primary Aldosteronism Guidelines; 2008 Cushing's Syndrome Guideline"]}},"106-綜-6":{"quick":"腦垂體術後全垂體低下→ FSH/LH 低、testosterone 低(續發性性腺低下)+骨鬆,應補睪固酮 → C。","detail":{"background":"本例腦垂體瘤術後「全垂體功能低下(hypopituitarism)」:已補甲狀腺素(hsTSH<0.1 反映外源 T4 抑制,屬中樞性),但 FSH/LH「皆低」、testosterone 低(50 ng/dL)→「續發性(中樞性)性腺功能低下」,且骨密度低(T −2.6/−2.7,性腺低下相關骨鬆)。最恰當治療為「補充睪固酮(testosterone)」——既矯正性腺低下,也能增加腰椎/股骨骨密度、改善骨鬆(C)。Calcitonin/bisphosphonate 雖治骨鬆,但此處骨鬆根因是性腺低下,首要補睪固酮;甲狀腺素 hsTSH 低是中樞性無法用 TSH 判讀,不應據此減量(D 不當)。出題年(106/2017)。","options":{"A":"錯:calcitonin 非首選(根因是性腺低下)。","B":"錯:cabergoline 用於泌乳素瘤,本例非高泌乳素。","C":"正解:續發性性腺低下→補睪固酮,兼增骨密度。","D":"錯:中樞性 TSH 無法判讀,不應據 hsTSH 減量甲狀腺素。","E":"次選:bisphosphonate 可輔助,但首要矯正性腺低下。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"109-120":{"quick":"胰島素低血糖試驗 cortisol 反應不足(9)+TRH 後 TSH 反應鈍(4.25)→ 支持垂體功能不全 →(2)+(3)=B。","detail":{"background":"腦垂體功能不全(hypopituitarism)以「刺激試驗反應不足」診斷。本例 fT4 低+TSH 不高(中樞性甲低)、cortisol 偏低+ACTH 不高(中樞性腎上腺不足)。逐項:(1)胰島素低血糖試驗(ITT)血糖<40 時 GH 升到 6 ng/mL→「足夠(>3–5)」,代表「無 GH 缺乏」,不支持垂體不全;(2)ITT 血糖<40 時 cortisol 僅 9 μg/dL→反應「不足(正常應>18–20)」,支持 ACTH/腎上腺軸不全(支持);(3)TRH 刺激後 peak TSH 4.25(上升幅度小、反應鈍)→支持中樞性甲狀腺軸不全(支持);(4)TRH 後 prolactin 升到 19→屬正常反應,不支持;(5)CRH 後 ACTH 升到 90→有反應,不支持缺乏。最支持 hypopituitarism 者=(2)+(3)=B。出題年(109/2020)。","options":{"A":"錯:(1)GH 反應足夠,不支持。","B":"正解:(2)cortisol 反應不足+(3)TSH 反應鈍,支持垂體不全。","C":"錯:(4)prolactin 反應正常。","D":"錯:含(1)。","E":"錯:含(5)。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"109-121":{"quick":"尿量多+尿滲透壓<300+AVP 低→ central DI 或原發性多飲;限水後給 DDAVP 尿滲仍不升→ nephrogenic DI →(1)(2)(5)=C。","detail":{"background":"尿崩症(DI)思考:(1)隨意飲水下若 24 小時尿量<40 mL/kg、尿滲>300→非多尿,應先查泌尿系統其他原因(合理)。(2)若尿量>40 mL/kg、尿滲<300、基礎 AVP<1→多尿且 ADH 低,應考慮 central DI 或原發性多飲(primary polydipsia)(合理)。(3)「MRI 後葉無亮點即可排除 central DI」錯——後葉亮點(bright spot)在正常人也可能不明顯,缺亮點不能排除/確診。(4)限水4小時尿滲由250升到400「僅部分濃縮、未達正常>600–800」,單以此不足以判定 central DI(此題判(4)不正確)。(5)限水後給 DDAVP 尿滲仍低(250、無進一步上升)→腎臟對 ADH 無反應→ nephrogenic DI(合理)。正確=(1)+(2)+(5)=C。出題年(109/2020)。","options":{"A":"錯:含(4)(僅部分濃縮不足判 central DI)。","B":"錯:含(3)(亮點消失不能排除)。","C":"正解:(1)+(2)+(5)。","D":"錯:含(3)(4)。","E":"錯:漏(1)(5)。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"109-128":{"quick":"年老男性 SHBG 較年輕人「高」→ B。","detail":{"background":"男性健康/睪固酮生理:(A)testosterone 隨年紀下降,「肥胖者下降『較快』」(脂肪組織芳香化、SHBG 低、下視丘抑制),選項說肥胖者下降較慢錯。(B)年老者 SHBG「升高」(故總睪固酮可能正常但游離/生物可用睪固酮下降)(正確,本題答案)。(C)胰島素阻抗與「總睪固酮」也相關(總與生物可用睪固酮低皆與胰島素阻抗相關),選項說「total testosterone 與胰島素阻抗無關」錯。(D)睪固酮治療「可」增加腰椎與股骨骨密度(此敘述本身正確),但本題要選「正確」唯一最佳——(B)為標準答案;(D)亦屬正確但題目以(B)為解。(E)前列腺癌之雄性素剝奪治療(ADT)會「增加(非減少)」心血管疾病與代謝風險,選項錯。出題年(109/2020)。","options":{"A":"錯:肥胖者睪固酮下降較快,非較慢。","B":"正解:年老者 SHBG 較年輕人高。","C":"錯:總睪固酮亦與胰島素阻抗相關。","D":"敘述正確但非本題標準答案:睪固酮可增骨密度。","E":"錯:ADT 增加(非減少)心血管風險。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"110-97":{"quick":"腦垂體瘤+LH/FSH(停經後應高卻)偏低→ 續發性性腺低下,支持 hypopituitarism →(3)=C。","detail":{"background":"本例 81 歲停經女性、腦垂體瘤、意識不清、低血鈉(126)。逐項:(1)TSH 4.59 在參考範圍內、fT4 低偏邊緣,不足以診斷 TSHoma(TSHoma 應 fT4 高+TSH 不被抑制)(錯)。(2)prolactin 56(輕度升高)在大型垂體瘤可因「柄效應(stalk effect)」輕升,不足以診斷 prolactinoma(後者常>150–200)(錯)。(3)停經後 LH/FSH 應「明顯升高」,本例 LH 0.67、FSH 7.2 反而偏低→不適當的低 gonadotropin→支持「續發性性腺低下/全垂體功能不全(hypopituitarism)」(正確,故答案為(3)=C)。(4)/(5)應先評估與補充——但本例 cortisol/ACTH 大致足夠,且最「正確的描述」是(3);選 C(僅(3))。出題年(110/2021)。","options":{"A":"錯:TSH 在範圍內,非 TSHoma。","B":"錯:prolactin 輕升為柄效應,非 prolactinoma。","C":"正解:停經後 LH/FSH 偏低→支持 hypopituitarism。","D":"錯:本例非須先給類固醇之危症描述為最正確。","E":"錯:(2)(5)不成立。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"110-98":{"quick":"泌乳素濃度與腫瘤大小正相關、PRL>250 多為大腺瘤;垂體瘤可同時分泌多種荷爾蒙 →(2)+(4)=E。","detail":{"background":"泌乳素瘤(prolactinoma):(1)「泌乳素瘤是最常見的腦垂體瘤,佔功能性垂體瘤70%以上」——泌乳素瘤確為最常見「功能性」垂體瘤(約佔功能性的一半以上,但「70% 以上」數字偏高,本題判為非最佳)。(2)垂體瘤可同時分泌兩種以上荷爾蒙(如 GH+PRL)(正確)。(3)小於1公分(microprolactinoma)女性遠多於男性(女:男約20:1),大腺瘤男性比例升高——選項把比例細節寫得不夠精準(此題未採)。(4)血中 PRL 濃度與腫瘤大小正相關,PRL>250 μg/L 通常腫瘤>1 cm(正確)。(5)有泌乳素瘤婦女若考慮懷孕「可用 cabergoline」(對),但本題答案組為(2)+(4)=E。出題年(110/2021)。","options":{"A":"錯:含(1)(數字偏高)。","B":"錯:含(3)(5)細節。","C":"錯:含(1)(3)。","D":"錯:含(1)。","E":"正解:(2)垂體瘤可多荷爾蒙+(4)PRL 與腫瘤大小正相關。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"111-102":{"quick":"泌乳素瘤大小與 PRL 相關,但「PRL>150 即皆>1cm」過於絕對 → B 不正確。","detail":{"background":"腦垂體腫瘤:(A)垂體瘤多源自單一細胞型,但可分泌兩種以上荷爾蒙(正確)。(B)「PRL>150 μg/L 其腫瘤『皆』大於1公分」不正確(本題答案)——PRL 與腫瘤大小「整體正相關」,但個別存在重疊,並非 PRL>150 就「一定」是大腺瘤(且大腺瘤之非泌乳素瘤可因柄效應 PRL 中度升高)。(C)GH 為脈動性分泌,單次隨機 GH 無法確診/排除肢端肥大,須測 IGF-1 與 OGTT 抑制(正確)。(D)IGF-1 隨年齡變化,GH 升 IGF-1、熱量限制降 IGF-1(正確)。(E)多數 Cushing's disease 為<0.5 cm 之 microadenoma(正確)。出題年(111/2022)。","options":{"A":"正確:垂體瘤可分泌兩種以上荷爾蒙。","B":"不正確(本題答案):PRL>150 不代表腫瘤「皆」>1cm。","C":"正確:單次 GH 無法確診肢端肥大。","D":"正確:GH 升 IGF-1、熱量限制降 IGF-1。","E":"正確:Cushing disease 多為 microadenoma。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"111-103":{"quick":"Klinefelter syndrome 增乳癌/糖尿病/骨鬆/SLE 風險,攝護腺癌風險降低 → D。","detail":{"background":"性腺功能異常:(A)Turner syndrome(45,X)為性腺發育不全→「高促性腺素性性腺低下(hypergonadotropic)」,非 hypogonadotropic(錯)。(B)顱咽瘤壓迫下視丘-垂體→「低促性腺素性(hypogonadotropic)」性腺低下,非 hypergonadotropic(錯)。(C)血中睪固酮約「98% 與 SHBG/白蛋白結合、僅約 1–2% 游離」,選項「80% 結合、20% 游離」數字錯。(D)Klinefelter(47,XXY,睪固酮低、雌激素相對高)罹乳癌、糖尿病、骨質疏鬆、SLE 等風險增加,而攝護腺癌風險降低(正確,本題答案)。(E)ketoconazole「抑制」睪固酮生成(非刺激),spironolactone 阻斷雄性素作用——選項「刺激抑制」語病使其不精確。最正確為 D。出題年(111/2022)。","options":{"A":"錯:Turner 為高促性腺素性性腺低下。","B":"錯:顱咽瘤致低促性腺素性性腺低下。","C":"錯:睪固酮約98%結合、僅1–2%游離。","D":"正解:Klinefelter 增乳癌/DM/骨鬆/SLE,攝護腺癌風險降低。","E":"錯:ketoconazole 抑制睪固酮(選項語意不精確)。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"111-104":{"quick":"lithium、amphotericin B、aminoglycosides 可致腎源性尿崩症 → C。","detail":{"background":"尿崩症(DI):(A)尿崩定義為尿量大(>50 mL/kg/day 或>3 L/day)且尿滲透壓低(<300 mosmol/L);選項「>30 mL/kg、<250」數字不符標準。(B)正常後葉在 T1 影像呈亮點;此亮點在 central DI「消失」,但在「原發性多飲(primary polydipsia)」通常「仍存在」,故選項把兩者並列為「皆消失」錯。(C)藥物性腎源性尿崩:lithium(最常見)、amphotericin B、aminoglycosides、demeclocycline、cidofovir/foscarnet 等(正確,本題答案)。(D)妊娠期尿崩多見於「第三孕期(胎盤 vasopressinase 分解 AVP)」,且產後緩解,選項「頭三個月、隨孕期改善」寫反。(E)DDAVP 治「central DI」(可),但「不」用於 primary polydipsia(會致水中毒);腎源性 DI 用 thiazide/amiloride/NSAID(對),故 E 因把 primary polydipsia 列入 DDAVP 適應而錯。出題年(111/2022)。","options":{"A":"錯:尿崩數值定義不符標準。","B":"錯:primary polydipsia 後葉亮點通常仍存在。","C":"正解:lithium/amphotericin B/aminoglycosides 致腎源性 DI。","D":"錯:妊娠 DI 多見第三孕期、產後緩解(選項寫反)。","E":"錯:DDAVP 不用於 primary polydipsia(致水中毒)。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"111-137":{"quick":"SIADH 由「異位性 vasopressin(ADH)」分泌過多造成 → C。","detail":{"background":"腫瘤關聯內分泌症候群:不適當抗利尿激素分泌症候群(SIADH)的本質是「抗利尿激素(vasopressin/ADH)分泌過多」造成水滯留與「稀釋性低血鈉」。當為腫瘤相關(最典型小細胞肺癌)時,即由腫瘤「異位分泌 vasopressin(ADH)」所致(C,本題答案)。其他異位荷爾蒙對應:PTHrP→高血鈣;1,25-D→肉芽腫/淋巴瘤高血鈣;ACTH→異位庫欣;IGF-II→非胰島細胞瘤低血糖。故 SIADH 對應 vasopressin。出題年(111/2022)。","options":{"A":"錯:PTHrP 致高血鈣,非 SIADH。","B":"錯:1,25-D 致高血鈣。","C":"正解:SIADH 由異位 vasopressin(ADH)過多造成。","D":"錯:ACTH 致異位庫欣。","E":"錯:IGF-II 致低血糖。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"112-78":{"quick":"尿崩+AVP<1(中樞性可能)應安排腦下垂體 MRI 找病因 → B。","detail":{"background":"尿崩症診斷治療:(A)尿崩定義為尿量「>50 mL/kg/day(70 kg 約>3.5 L)」且尿滲<300;選項「>60 mL/kg(>4200 mL)、<250」門檻設太嚴,不符標準。(B)病人有尿崩且 plasma AVP<1 pg/mL(低)→提示 central DI,應安排「腦下垂體 MRI」找下視丘-垂體病灶(腫瘤/浸潤/柄病變)(正確,本題答案)。(C)後葉有亮點「不一定」是 central DI(正常人也有亮點;central DI 反而常亮點消失),選項「一定是 central DI」錯。(D)限水測試時「尿量減少、尿滲增加」代表能濃縮尿→比較像「原發性多飲」而非 central DI(選項把判讀寫反)。(E)腎源性 DI 對 DDAVP 無反應,不能用 DDAVP 治療(應 thiazide/amiloride/NSAID)。出題年(112/2023)。","options":{"A":"錯:尿崩門檻數值不符標準。","B":"正解:AVP<1 提示 central DI,應做腦下垂體 MRI。","C":"錯:後葉亮點不一定是 central DI。","D":"錯:能濃縮尿較像原發性多飲(判讀寫反)。","E":"錯:腎源性 DI 不能用 DDAVP。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"112-97":{"quick":"成人 GH 缺乏:GH 劑量一般「女性多於男性、年輕者多於年長者」→ B 不正確。","detail":{"background":"成人生長激素缺乏(AGHD)治療:(A)診斷確定後給 GH,起始約 0.1–0.2 mg/day,漸調至維持 IGF-1 在年齡性別參考值中段(大致正確)。(B)「GH 劑量男性多於女性、年長多於年輕」不正確(本題答案)——實際上「女性(尤其口服雌激素者)需要『較高』劑量」、「年輕人需要較高、年長者較低」,故方向相反。(C)GH 治療禁忌含活動性惡性腫瘤、顱內高壓、控制不良糖尿病/視網膜病變(正確)。(D)GH 治療改善血脂(升 HDL)、體組成(正確)。(E)T2DM 用 GH 初期增胰島素阻抗,長期可減腹部脂肪改善代謝(正確)。出題年(112/2023)。","options":{"A":"正確:起始 0.1–0.2 mg/day,維持 IGF-1 中段。","B":"不正確(本題答案):女性需較高劑量、年輕者較高(方向相反)。","C":"正確:禁忌含腫瘤/顱內高壓/控制不良 DM/視網膜病變。","D":"正確:改善 HDL 與體組成。","E":"正確:長期可改善腹部脂肪與血糖。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"113-62":{"quick":"腦垂體術後多尿、高血鈉、尿滲透壓極低(92)→ 術後中樞性尿崩,給 desmopressin(DDAVP)→ B。","detail":{"background":"本例腦下垂體腫瘤術後 24 小時內「多尿(近4000 mL)、血鈉由138升到150(高血鈉)、尿滲透壓僅 92 mOsm/kg(極低、無法濃縮)」→典型「術後中樞性尿崩症(central DI)」:手術損傷下視丘-神經垂體使 ADH 分泌不足,大量稀釋尿、自由水流失致高血鈉。處置:確認血容積後,直接「給予 desmopressin(dDAVP)」補充 ADH 以濃縮尿、矯正高血鈉與多尿(B);同時補充自由水。Water deprivation test 不適用於已高血鈉之明確 DI(且有危險);tolvaptan(V2 拮抗)會「惡化」多尿;單純補等張液無法解決自由水流失;thiazide/amiloride/NSAID 用於腎源性 DI。出題年(113/2024)。","options":{"A":"錯:已明確高血鈉多尿,不宜再做限水試驗(危險)。","B":"正解:術後中樞性 DI,給 desmopressin(dDAVP)。","C":"錯:tolvaptan(V2 拮抗)會惡化多尿。","D":"錯:單純補等張液無法矯正自由水流失。","E":"錯:thiazide/amiloride/NSAID 用於腎源性 DI。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"113-97":{"quick":"ITT 血糖<40 時 cortisol 升>7 或>20 視為無 ACTH 缺乏;隔夜 1mg DST 後 cortisol 4 視為正常 →(3)+(5)=C。","detail":{"background":"腦垂體功能檢查:(1)ITT 血糖<40 時 GH 為 2.5 μg/L→「不足(正常應>3–5)」,故「視為無 GH 缺乏」不正確。(2)TRH 試驗後 prolactin「上升『超過』基礎值約2倍以上」為正常;「上升基礎值1.5倍」反應偏鈍,判正常不正確。(3)ITT 血糖<40 時 cortisol 上升>7 μg/dL 或峰值>18–20 μg/dL→代表 HPA 軸完整、「無 ACTH 缺乏」(正確)。(4)OGTT 抑制試驗用於肢端肥大:正常人糖負荷後 GH 應被「壓抑到<1 μg/L」;GH 為 2 μg/L 未被壓抑→不正常(故(4)「視為正常」錯)。(5)隔夜 1 mg 地塞米松抑制試驗後晨間 cortisol「<1.8 μg/dL」為完全抑制;本選項給「4 μg/dL 視為正常」——以較寬鬆判讀(<5 μg/dL 早期界值)視為正常反應屬可接受(本題判正確)。正確=(3)+(5)=C。出題年(113/2024)。","options":{"A":"錯:含(1)(GH 反應不足)。","B":"錯:含(2)(4)。","C":"正解:(3)ITT cortisol 反應足+(5)DST cortisol 受抑視為正常。","D":"錯:含(1)(2)。","E":"錯:含(2)(4)。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"113-98":{"quick":"高血鈣可致腎源性尿崩,但「高血鉀」不致腎源性 DI(低血鉀才會)→ E 不正確。","detail":{"background":"尿崩症病因:(A)Sheehan 症候群(產後垂體缺血壞死)可致全垂體功能低下含中樞性 DI(正確)。(B)lithium、cisplatin 致腎源性 DI(正確)。(C)Sarcoidosis(肉芽腫浸潤)可侵犯下視丘致中樞性 DI,亦可因高血鈣致腎源性 DI(正確)。(D)妊娠(第二、三孕期)胎盤 vasopressinase 分解 AVP 可致妊娠性 DI(正確)。(E)「高血鈣『及高血鉀』可致腎源性 DI」不正確(本題答案)——致腎源性 DI 的電解質異常是「高血鈣」與「『低』血鉀(hypokalemia)」,而非「高血鉀」。出題年(113/2024)。","options":{"A":"正確:Sheehan 可致中樞性 DI。","B":"正確:lithium/cisplatin 致腎源性 DI。","C":"正確:sarcoidosis 可致中樞與腎源性 DI。","D":"正確:妊娠第二三孕期可致 DI。","E":"不正確(本題答案):是高血鈣與「低」血鉀致腎源性 DI,非高血鉀。"},"sources":["Harrison's 21e, Ch.380 Anterior Pituitary / Ch.381 Posterior Pituitary (DI/SIADH)","Williams Textbook of Endocrinology 14e","Endocrine Society Clinical Practice Guidelines (Hypopituitarism/Acromegaly/Hyperprolactinemia)"]}},"109-137":{"quick":"LDL/VLDL 增加雖與肥胖胰島素阻抗相關,但「減重後相關數值都會改善」過於絕對(家族性高血脂受遺傳主導)→ A 錯誤。","detail":{"background":"血脂異常與胰島素阻抗:(B)血脂受遺傳與環境共同影響(正確)。(C)肥胖/胰島素阻抗典型血脂為「高 TG、低 HDL」(atherogenic dyslipidemia)(正確)。(D)長期高醣飲食+飲酒→VLDL/TG 升、HDL 降(正確)。(E)甲狀腺低下時肝臟 LDL 受體減少、LDL 清除下降→LDL 升高(正確)。(A)「LDL/VLDL 升高多與肥胖/胰島素阻抗/遺傳相關,因此肥胖者『減重後相關數值都會改善』」為錯誤(本題答案)——對「家族性高膽固醇血症(FH)」等強遺傳主導者,減重對 LDL 改善有限,故「都會改善」過於絕對。出題年(109/2020)。","options":{"A":"錯誤(本題答案):家族性高血脂受遺傳主導,減重未必改善,「都會改善」過於絕對。","B":"正確:遺傳與環境共同影響血脂。","C":"正確:胰島素阻抗呈高 TG、低 HDL。","D":"正確:高醣+飲酒升 VLDL/TG、降 HDL。","E":"正確:甲低使 LDL 受體減少、LDL 升高。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}},"109-139":{"quick":"40歲以下糖尿病人並非一律禁用 statin;有風險因子仍可/應使用 → E 錯誤。","detail":{"background":"2017 台灣血脂指引(糖尿病):(A)DM+急性冠心症(極高風險)LDL-C 目標<55 mg/dL(正確,近年指引更強調)。(B)糖尿病高膽固醇首選 statin(正確)。(C)DM 合併心血管風險 LDL-C<70(正確)。(D)≥40 歲、無 CVD 病史之 DM,LDL-C<100(正確)。(E)「40 歲以下 DM 無論有無 CVD 均不宜使用 statin」錯誤(本題答案)——40 歲以下糖尿病人若有其他危險因子(高 LDL、吸菸、高血壓、家族史、靶器官損傷)仍應使用 statin,並非一律禁用。出題年(109/2020)。","options":{"A":"正確:DM+ACS LDL-C<55。","B":"正確:首選 statin。","C":"正確:DM 合併 CV 風險 LDL-C<70。","D":"正確:≥40歲無 CVD 之 DM LDL-C<100。","E":"錯誤(本題答案):<40歲 DM 有風險因子仍應用 statin,非一律禁用。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}},"110-112":{"quick":"甲狀腺低下使 LDL 升高並增心血管風險 → 但本題判 B「高醣+飲酒致 VLDL/TG 升、HDL 降」之描述為「錯誤」。","detail":{"background":"本題問血脂異常敘述「何者錯誤」,官方答案 B。(A)LDL/VLDL 升高與肥胖、胰島素阻抗相關(正確)。(B)被列為錯誤(本題答案)——「長期大量醣類+飲酒→VLDL/TG 升、HDL 降」此描述方向大致符合病理生理,但命題以本選項中之細節(如把 HDL 一概描述為降低、或與其他選項對照)判為錯誤敘述;考生作答以官方鍵 B 為準。(C)肥胖/胰島素阻抗主要 TG 升(正確)。(D)甲狀腺低下 LDL 升高、增心血管風險(正確)。(E)血脂受遺傳+環境影響(正確)。出題年(110/2021)。","options":{"A":"正確:LDL/VLDL 升與肥胖/胰島素阻抗相關。","B":"本題答案(錯誤):此選項被官方判為錯誤敘述。","C":"正確:胰島素阻抗主要 TG 升。","D":"正確:甲低 LDL 升高增心血管風險。","E":"正確:血脂受遺傳與環境影響。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}},"111-105":{"quick":"運動有益,但「運動強度愈強就愈能降低糖尿病發病率與心血管死亡率」過於絕對 → A 有誤。","detail":{"background":"糖胖症(Diabesity):(A)「運動強度『愈強』愈能降糖尿病發病與心血管死亡」有誤(本題答案)——運動有益,但效益主要來自「規律與總量」而非單純「強度愈強愈好」,過強運動未必線性降低死亡率(且對某些族群有風險)。(B)LOOK AHEAD 研究:強化生活型態介入改善血糖/HbA1c/體重,但「未顯著降低心血管死亡(主要終點未達標)」(正確)。(C)計畫飲食+運動減重(主要減脂肪)可預防疾病進展(正確)。(D)GLP-1 RA 兼降糖與減重,為糖胖症常見選擇(正確)。(E)減重手術可改善血糖與心血管預後(正確)。出題年(111/2022)。","options":{"A":"有誤(本題答案):「強度愈強愈降發病/死亡」過於絕對,效益主在規律總量。","B":"正確:LOOK AHEAD 未顯著降心血管死亡。","C":"正確:減重(減脂)可預防疾病進展。","D":"正確:GLP-1 RA 兼降糖減重。","E":"正確:減重手術改善血糖與心血管預後。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}},"111-109":{"quick":"DM 已達 LDL 目標但 TG 極高(628),為降胰臟炎與殘餘風險應加 fenofibrate → D。","detail":{"background":"本例 DM+三條冠狀動脈病變支架,statin 已使 LDL 達標(55),但「TG 極高(628 mg/dL)」。TG>500 mg/dL 主要風險是「急性胰臟炎」,且高 TG 屬糖尿病殘餘心血管風險;在 statin 基礎上,應加「fibrate(fenofibrate)」降 TG(D)——fenofibrate 與 statin 併用相對安全(避免 gemfibrozil)。Ezetimibe/PCSK9i/cholestyramine 主降 LDL,對極高 TG 幫助有限(此例 LDL 已達標)。出題年(111/2022)。","options":{"A":"錯:ezetimibe 主降 LDL,LDL 已達標。","B":"錯:cholestyramine 降 LDL 且可能升 TG(不宜高 TG)。","C":"錯:PCSK9i 主降 LDL,LDL 已達標。","D":"正解:TG 極高(628)加 fenofibrate 降 TG、防胰臟炎。","E":"乾擾:SGLT2i 有心腎益處但此題針對血脂處置,降 TG 首選 fibrate。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}},"112-105":{"quick":"運動有益,但「強度愈強愈能降發病率與心血管死亡率」過於絕對 → D 有誤。","detail":{"background":"糖胖症(Diabesity):(A)計畫飲食+運動減重主要減脂肪組織(正確)。(B)中心性腹部肥胖與心血管風險最相關(正確)。(C)LOOK AHEAD 改善血糖但未證實降心血管死亡(正確)。(D)「運動強度愈強愈能降糖尿病發病與心血管死亡」有誤(本題答案)——同 111-105,效益主在規律與總量,非單純強度愈強愈好。(E)計畫飲食+規律足量運動降糖尿病發病,關鍵在控制體重(正確)。出題年(112/2023)。","options":{"A":"正確:減重主要減脂肪。","B":"正確:中心性腹部肥胖與 CV 風險最相關。","C":"正確:LOOK AHEAD 未證實降 CV 死亡。","D":"有誤(本題答案):「強度愈強愈降發病/死亡」過於絕對。","E":"正確:規律運動降發病,關鍵在體重控制。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}},"112-111":{"quick":"DM+CAD,LDL 已達標但 TG 極高(828)→ 加 fenofibrate 降 TG、防胰臟炎 → B。","detail":{"background":"本例 DM+冠心症支架,rosuvastatin 已使 LDL 達標(52),但「TG 極高(828)」→ 主要風險為急性胰臟炎與殘餘心血管風險,應加「fenofibrate(fibrate)」降 TG(B)。Nicotinic acid(niacin)雖降 TG 但副作用多、臨床少用且未顯著改善預後;ezetimibe/cholestyramine/PCSK9i 主降 LDL(LDL 已達標,幫助有限)。故 B。出題年(112/2023)。","options":{"A":"錯:niacin 副作用多、未改善預後,非首選。","B":"正解:TG 極高加 fenofibrate 降 TG、防胰臟炎。","C":"錯:ezetimibe 主降 LDL(已達標)。","D":"錯:cholestyramine 降 LDL 且可能升 TG。","E":"錯:PCSK9i 主降 LDL(已達標)。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}},"113-157":{"quick":"肥胖、高油、酗酒者背部/上臂黃色丘疹→ 發疹性黃色瘤,與「高三酸甘油酯」最相關(非 LDL)→ E 錯誤。","detail":{"background":"本例年輕、肥胖、高油飲食、酗酒,背部/上臂/手背「粉紅至黃色丘疹」→「發疹性黃色瘤(eruptive xanthoma)」,典型與「嚴重高三酸甘油酯血症(常 TG>1000–2000,如家族性高乳糜微粒血症/重度高 TG)」相關,真皮巨噬細胞吞噬脂質形成。(A)鑑別含 molluscum、皮脂腺增生、發疹性黃色瘤、發疹性組織細胞瘤(合理)。(B)應評估代謝症候群危險因子(合理)。(C)檢查應含空腹 TG 與膽固醇(合理)。(D)此病灶與「TG 過高」最相關(正確)。(E)「與 LDL 膽固醇過高最相關」錯誤(本題答案)——eruptive xanthoma 與「TG」相關,而非 LDL(LDL 高相關的是肌腱黃色瘤/tendon xanthoma、黃斑瘤)。出題年(113/2024)。","options":{"A":"合理:鑑別診斷涵蓋發疹性黃色瘤等。","B":"合理:應評估代謝症候群危險因子。","C":"合理:檢查含空腹 TG 與膽固醇。","D":"正確:發疹性黃色瘤與高三酸甘油酯最相關。","E":"錯誤(本題答案):與 LDL 過高無關;LDL 高相關的是肌腱黃色瘤。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}},"114-105":{"quick":"運動有益,但「強度愈強愈能降發病率與心血管死亡率」過於絕對 → B 錯誤。","detail":{"background":"糖胖症(Diabesity)同 111-105/112-105:(A)規律飲食運動降糖尿病發病、機轉在體重控制(正確)。(B)「運動強度愈高愈能降發病風險與心血管死亡率」錯誤(本題答案)——效益主在規律與總活動量,非強度愈強愈好。(C)LOOK AHEAD 改善血糖但未證實降心血管死亡(正確)。(D)中心性腹部肥胖與心血管風險最相關(正確)。(E)計畫飲食+運動減重主要減脂肪、延緩病程(正確)。出題年(114/2025)。","options":{"A":"正確:規律飲食運動降發病,機轉在體重控制。","B":"錯誤(本題答案):「強度愈高愈降發病/死亡」過於絕對。","C":"正確:LOOK AHEAD 未證實降 CV 死亡。","D":"正確:中心性腹部肥胖與 CV 風險最相關。","E":"正確:減重主要減脂肪、延緩病程。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}},"114-108":{"quick":"DM+CAD,LDL 已達標但 TG 極高(625)→ 加 fenofibrate 降 TG、防胰臟炎 → E。","detail":{"background":"本例 DM 20 年+冠心症支架,atorvastatin 已使 LDL 達標(46),但「TG 極高(625)」→ 應加「fenofibrate(fibrate)」降 TG(降急性胰臟炎與殘餘心血管風險)(E)。其他:SGLT2i/pioglitazone 屬降糖藥(此題針對血脂);PCSK9i/ezetimibe 主降 LDL(已達標)。故 E。出題年(114/2025)。","options":{"A":"錯:SGLT2i 為降糖藥,此題針對降 TG。","B":"錯:pioglitazone 為降糖藥,且可致水腫。","C":"錯:PCSK9i 主降 LDL(已達標)。","D":"錯:ezetimibe 主降 LDL(已達標)。","E":"正解:TG 極高加 fenofibrate 降 TG、防胰臟炎。"},"sources":["Harrison's 21e, Ch.407 Disorders of Lipoprotein Metabolism / Ch.401 Obesity","Williams Textbook of Endocrinology 14e","2017 台灣高危險群血脂異常治療指引 / 2018 AHA-ACC Cholesterol Guideline","ADA Standards of Care 2024/2025"]}}},TO=["糖尿病診斷與藥物治療", "糖尿病急症與低血糖", "糖尿病慢性併發症與綜合照護", "甲狀腺疾病", "副甲狀腺、鈣磷與骨質疏鬆", "腎上腺疾病", "腦下垂體與性腺生殖內分泌", "肥胖、代謝症候群與血脂異常", "多發性內分泌腫瘤、神經內分泌瘤與自體免疫多腺體症候群"];
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var t='答案：'+q.answer;if(q.answer_status&&q.answer_status!=='normal'){var lbl=q.answer_status.indexOf('送分')>=0?'（送分·全給分）':'（多重答案·均給分：'+(q.accepted_answers||[]).join('、')+'）';t+='<span class="amul">'+lbl+'</span>';}return t;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>','<span class="chip">'+esc(q.src)+'</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.answer===k)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
ce.addEventListener('click',e=>{if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
