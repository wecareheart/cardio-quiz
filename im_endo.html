<script>
const Q=[{"num":5,"answer":"D","stem":"已經使用多種口服降血糖藥物仍控制不良之第2型糖尿病病人,下列那一處置較佳?","options":{"A":"增加注射餐前Regular insulin","B":"增加早餐前NPH insulin","C":"增加晚餐前Lispro insulin","D":"增加睡前Glargine insulin","E":"增加睡前Mixtard insulin(NPH 70%+Regular 30%)"},"id":"100-綜-5","roc_year":100,"source":"100舊站q5綜合卷","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":5,"src":"舊站綜合卷"},{"num":7,"answer":"D","stem":"下列那一項非診斷第1型糖尿病的必要條件..","options":{"A":"空腹血清C-peptide濃度","B":"升糖素刺激後6分鐘血清C-peptide濃度","C":"升糖素刺激試驗6分與0分血清C-peptide濃度相差","D":"糖尿病酮酸中毒","E":"Anti-GAD65 陽性"},"id":"107-綜-7","roc_year":107,"source":"107舊站q5綜合卷","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":7,"src":"舊站綜合卷"},{"num":130,"answer":"B","stem":"近年來,糖尿病之新藥發展迅速,其中SGLT2 inhibitor (鈉-葡萄糖協同轉運蛋白質 2抑制劑,sodium glucose co-transporter 2 inhibitor)屬於新機轉之藥物。下列的有關SGLT2 inhibitor之敘述,何者為錯誤?","options":{"A":"鈉-葡萄糖協同轉運蛋白質 2抑制劑之基本機轉,與胰島素之作用無關","B":"大型糖尿病之預後研究結果顯示,鈉-葡萄糖協同轉運蛋白質 2抑制劑可以減少糖尿病患者發生腦中 風","C":"目前的研究結果顯示,此類藥物臨床上最令人擔心的系統性副作用為酮酸中毒 (Ketoacidosis),其致 病機轉推論與本項藥物使用之後,會增加病患血中昇糖激素(glucagon)之濃度","D":"鈉-葡萄糖協同轉運蛋白質 2抑制劑使用後之體重減輕現象,主要的原因來自於本項藥品可將血中葡 萄糖排除於尿液中","E":"鈉-葡萄糖協同轉運蛋白質 2抑制劑的研究發現,本項藥物可以改善蛋白尿的現象,具有延緩糖尿病 腎病變的藥理效應"},"id":"109-130","roc_year":109,"source":"109合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":130,"src":"109合併卷"},{"num":133,"answer":"B","stem":"統計上,台灣目前第二型糖尿病患者達230萬人,除了生活型態、飲食及運動來預防之外,一旦確診為糖 尿病之後,藥物治療也是非常重要的一環。以下有關糖尿病之敘述,那一些是錯誤的? (1) Biguanide之Metformin是台灣及美國建議糖尿病治療的第一線用藥 (2) 目前國內及美國糖尿病學會之建議,HbA1c (糖化血紅素)之控制目標應該為 6 % 以下 (3) Sulphonylurea類藥物,容易造成低血糖及體重上升 (4) 胰島素雖然可以迅速降低血糖,但長期使用時,低血糖是常見之藥物副作用 (5) 新型之糖尿病口服藥物,如DPP-4 inhibitor及SGLT-2 inhibitor,除了降低血糖之外,也有減輕糖尿病 患體重的藥理效應","options":{"A":"(1)+(2)","B":"(2)+(5)","C":"(3)+(4)","D":"(2)+(4)","E":"(4)+(5)"},"id":"109-133","roc_year":109,"source":"109合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":133,"src":"109合併卷"},{"num":135,"answer":"E","stem":"近年之研究顯示懷孕與糖尿病之關係釐清,是安全成功生育的關鍵因子之一。孕前未診斷糖尿之婦女,懷 孕時產生之血糖異常為妊娠性糖尿病,雖然產後大多數之婦女,血糖都可以恢復到正常範圍之內,但仍 有35-60%的妊娠性糖尿病婦女,在10至20年期間仍會進展為真正之糖尿病患。以下有關妊娠性糖尿病之 相關敘述,那一些是錯誤的? (1) 妊娠性糖尿病的表現,主要與患者胰島素分泌不足 (insulin deficiency) 相關 (2) 妊娠性糖尿病增加的趨勢,與婦女肥胖率的增加密切相關 (3) 妊娠性糖尿病在懷孕之後期孕期時 (late pregnancy),胰島素阻抗性會明顯降低,血糖比較容易控制 (4) 在懷孕期間,初次發現之血糖異常,如果符合糖尿病之診斷,應歸類於真正之糖尿病 (overt diabetes)","options":{"A":"(1)+(2)","B":"(2)+(4)","C":"(2)+(3)","D":"(1)+(4)","E":"(1)+(3)"},"id":"109-135","roc_year":109,"source":"109合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":135,"src":"109合併卷"},{"num":136,"answer":"D","stem":"陳奶奶,78歲,可自由活動,主要照護者為家人,同住。數次因肺炎或泌尿道感染住院治療,糖尿病病史 已10年。目前接受口服藥物控制血糖,但未規律回診追蹤急篩檢併發症。本次因肺炎住院,抗生素使 用5天後,評估情況穩定,預計2天後出院。目前生命徵象穩定,入院隨機之HbA1c 為 9.5 %,住院之第 五天晨間空腹血糖為220 mg/dL,當日早餐後兩小時之血糖為268 mg/dL,肌酸酐為 0.9 mg/dL。雖然目 前無明顯多尿或其他不適症狀。就病程發展而言,下列有關治療安排敘述,何者錯誤?","options":{"A":"就住院血糖變化,應建議至少加入basal Insulin針劑類(基礎胰島素)藥物治療","B":"建議儘早安排糖尿病視網膜及足部神經學檢查","C":"建議應安排糖尿病飲食及運動衛教","D":"未來糖尿病HbA1c指標,控制標的為 < 6.5 % 以下","E":"建議病患未來應於居家自我監測血糖 (Self Monitoring of Blood Glucose)"},"id":"109-136","roc_year":109,"source":"109合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":136,"src":"109合併卷"},{"num":138,"answer":"B","stem":"胰島素是治療糖尿病,控制血糖的重要針劑藥物,以下有關胰島素治療的說明及其生理機轉,何者是正確 的?","options":{"A":"就糖尿病控制血糖而言,比較符合人體生理性需求的胰島素注射方式是一天一次的基礎胰島素(basal insulin)","B":"如果需要積極控制血糖時,多次胰島素注射,是達成控制標的的重要方法,但是需要配合更頻繁之自 我血糖監測,未來的趨勢是連續血糖偵測模式 (continuous glucose monitoring)","C":"身體胰臟分泌之內源性胰島素,直接分泌進入肝靜脈系統,但是注射型之外源性胰島素,則在注射後 進入全身系統循環,因此注射之胰島素進入肝臟時,較內源性胰島素進入肝臟的濃度為高,屬 於supraphysiologic insulin level。","D":"就第一型糖尿病之患者而言,每天需要之胰島素注射總量,一般在 1.5 - 2.0 單位/每公斤/每天 (unit/kg/day) 左右","E":"GLP-1 RA (Glucgon like peptide-1 receptor agonist) 是一種基礎胰島素,但是卻沒有傳統胰島素會 增加病患體重的副作用"},"id":"109-138","roc_year":109,"source":"109合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":138,"src":"109合併卷"},{"num":105,"answer":"C","stem":"糖尿病的血糖控制,胰島素阻抗 (insulin resistance)是重要的致病機轉,Thiazolidinedione (TZD)可以改 善增加增加胰島素敏感度,目前國內TZD類藥物,僅有Pioglitazone,下列之選項中,何者為必須留意的 藥物副作用? (1)骨折 (2)尿道感染 (3)心臟衰竭 (4)腦中風 (5)眼睛黃斑部水腫。","options":{"A":"(1)+(2)+(3)。","B":"(3)+(4)+(5)。","C":"(1)+(3)+(5)。","D":"(2)+(3)+(4)。","E":"(1)+(2)+(5)。"},"id":"110-105","roc_year":110,"source":"110合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":105,"src":"110合併卷"},{"num":108,"answer":"E","stem":"有關糖尿病藥物之敘述,何者為是錯誤的? (1)Metformin是糖尿病治療原則的第一線用藥,但當eGFR < 45 時,即不應使用Metformin (2)研究顯示,GLP-1 receptor agonist類之藥物, 具有糖尿病心血管疾病之保護療效 (3)使用 Sulphonylurea類藥物及胰島素,容易出現低血糖及體重上升 (4)Thiazolidinediones (TZD)長期使用時,低血糖是常見之藥物副作用 (5)糖尿病口服藥物中,DPP-4 inhibitor及SGLT-2 inhibitor,具有糖尿病心血管疾病之保護療效","options":{"A":"(1)+(2)+(5)。","B":"(1)+(3)+(4)。","C":"(2)+(3)+(5)。","D":"(2)+(3)+(4)。","E":"(1)+(4)+(5)。"},"id":"110-108","roc_year":110,"source":"110合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":108,"src":"110合併卷"},{"num":110,"answer":"A","stem":"有關於妊娠性糖尿病,研究顯示35-60%的妊娠性糖尿病婦女,在10至20年期間仍會進展為真正之糖尿病 患。以下有關妊娠性糖尿病之相關敘述,那一項是錯誤的?","options":{"A":"妊娠性糖尿病的表現,主要與此類患者懷孕時的胰島素分泌不足相關。","B":"妊娠性糖尿病增加的趨勢,與婦女肥胖率的增加相關。","C":"如果懷孕第一期孕程 (first trimester)時,即出現血糖異常之糖尿病診斷,代表此病患於懷孕前,已是 糖尿病的患者。","D":"目前臨床建議,妊娠性糖尿病婦女產後,仍應每三年進行血糖篩檢。","E":"妊娠性糖尿病婦女產下之新生兒,比起正常妊娠婦女之下一代,長大後有更高的風險,成為糖尿病的 病患。"},"id":"110-110","roc_year":110,"source":"110合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":110,"src":"110合併卷"},{"num":111,"answer":"D","stem":"有關糖尿病胰島素的生理機轉及藥物治療,下列之敘述何者是錯誤的?","options":{"A":"人體胰臟分泌之內源性胰島素,分泌後直接進入門靜脈系統。","B":"注射型之外源性胰島素,於注射後進入全身系統循環,相較於人體內源性胰島素進入肝臟的濃度為 低,屬於subphysiologic insulin level。","C":"在病患正常作息下,每日注射長效型基礎胰島素的時機為傍晚 (evening)或睡前 (before bedtime)。","D":"就糖尿病控制血糖而言,最符合人體生理性需求的胰島素注射方式是一天一次的長效型基礎胰島 素(basal insulin)。","E":"病患住院時,如果需要每日多次注射胰島素,經體重計算之胰島素總劑量的50%,應以基礎胰島 素(basal insulin) 的方式給藥。"},"id":"110-111","roc_year":110,"source":"110合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":111,"src":"110合併卷"},{"num":107,"answer":"E","stem":"糖尿病降血糖藥物眾多,下列之降血糖藥物中,實證研究顯示那些藥物,有明確可降低 Major adverse cardiovascular events (cardiovascular death, non-fatal myocardial infarctiomn, non-fatal stroke) 之結果? (1) Alpha-glucosidase inhibitors (2) Glucagon-like peptide 1 receptor agonists (3) Sulfonylurea (4) Dipepetidyl peptidase inhibitor (5) Sodium-glucose co-transporter-2 inhibitors","options":{"A":"(1)+(3)。","B":"(2)+(4)。","C":"(1)+(4)。","D":"(3)+(5)。","E":"(2)+(5)。"},"id":"111-107","roc_year":111,"source":"111合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":107,"src":"111合併卷"},{"num":108,"answer":"C","stem":"Thiazolidinedione (TZD)類之胰島素增敏劑,可以改善胰島素在人體內之敏感度,文獻報告顯示也可以改 善蛋白尿,但是本類藥物也有些副作用。以Pioglitazone為例,使用相關藥物副作用包括下列何者? (1) 水腫 (edema) (2) 認知障礙 (cognitive dysfunction) (3 )脆弱性骨折 (fragility frcuture) (4) 腦中風 (Storke) (5) 體重及脂肪組織增加","options":{"A":"(1)+(2)+(4)。","B":"(1)+(2)+(3)。","C":"(1)+(3)+(5)。","D":"(2)+(3)+(5)。","E":"(3)+(4)+(5)。"},"id":"111-108","roc_year":111,"source":"111合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":108,"src":"111合併卷"},{"num":110,"answer":"E","stem":"GLP-1 receptor agonist與DPP-4 inhibitors屬於Incretin 腸泌素類類藥物。以下有關 腸泌素之敘述,何者 為正確? (1) GLP-1 (Glucagon like peptide-1) 由腸道之L cell分泌 (2) GLP-1 可刺激胰島素分泌,但也刺激昇糖激素 (Glucagon)分泌 (3) 使用GLP-1 receptor agonist治療糖尿病患者時,也有明顯減輕體重之效果 (4) 第一型糖尿病患者也適用GLP-1 receptor agonist (5) 使用GLP-1 receptor agonist可降低糖尿病患之食慾及延緩胃排空時間","options":{"A":"(1)+(2)+(3)。","B":"(2)+(3)+(4)。","C":"(2)+(3)+(5)。","D":"(1)+(4)+(5)。","E":"(1)+(3)+(5)。"},"id":"111-110","roc_year":111,"source":"111合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":110,"src":"111合併卷"},{"num":111,"answer":"C","stem":"Biguanides 類的藥物,是目前全世界大多數糖尿病治療指引的建議首選用藥,以下有關Metformin之敘述 何者為錯誤的?","options":{"A":"腎功能不佳的糖尿病患者,eGFR小於30 ml/min/1.73m2時,不應使用Metformin。","B":"Metformin可能造成維他命B12 (Vitamin B12)之malabsorption。","C":"雖然Metfmornin之使用可以降低血糖,但是根據Diabetes Prevention Program之研究,Metformin並 無法延緩糖尿病之發病病程。","D":"乳酸中毒是罕見的Metformin藥物副作用,統計上,延遲診斷之死亡率可達50%。","E":"目前糖尿病之孕婦懷孕時,依據美國及台灣之治療指引,Metformin是安全的糖尿病用藥選擇之一。"},"id":"111-111","roc_year":111,"source":"111合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":111,"src":"111合併卷"},{"num":112,"answer":"B","stem":"糖尿病新型用藥中,SGLT-2抑制劑 (Sodium-glucose Cotransporter 2 inhibitor),最近數年廣泛使用的於 糖尿病之新興治療藥物。下列有關SGLT-2抑制劑的敘述,何者是錯誤的?","options":{"A":"SGLT-2抑制劑的作用機轉,主要是抑制尿糖之再吸收,因此葡萄糖大量的從尿中排出。","B":"目前大多數的SGLT-2抑制劑,使用之腎功能之限制為 eGFR > 45 ml/min/1.73m2以上。","C":"此類藥物在降血糖的過程中,糖尿病患者體重多半也會隨之減輕。","D":"實證醫學研究顯示,SGLT-2抑制劑也可以使用於非糖尿病之慢性腎臟病患者。","E":"由於此類藥物增加尿糖排出,因此容易發生泌尿道感染,而且可能發生嚴重之生殖器感染。"},"id":"111-112","roc_year":111,"source":"111合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":112,"src":"111合併卷"},{"num":106,"answer":"C","stem":"下列降血糖藥物中,何項藥物為非胰島素相關(non-insulin dependent)之藥理機轉?","options":{"A":"Glucagon like peptide 1 receptor agonist (GLP 1 RA)。","B":"Dipeptidyl dipeptidase 4 inhibitor (DPP4 inhibitor)。","C":"Sodium-glucose co-transporter 2 inhibitor (SGLT 2 inhibitor)。","D":"Sulfonylurea。","E":"Thiazolidinedione。"},"id":"112-106","roc_year":112,"source":"112合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":106,"src":"112合併卷"},{"num":107,"answer":"E","stem":"下列有關糖尿病藥物之敘述,何者為錯誤之描述? (1) Metformin可以安全地使用於eGFR < 30的糖尿病患 者 (2)Sulfonylurea類之降血糖藥物,容易造成病患之低血糖及體重上升 (3) 美國糖尿病學會之臨床建 議,HbA1c糖化血色素應控制於 < 6% (4) Sodium glucose co-transporter 2 inhibitor (SGLT2 inhibitor) 在 降低血糖之時,通常也會伴隨減輕病患之體重 (5) 腎功能不佳,eGFR < 60時,應避免使用胰島素 及GLP-1 receptor agonist之針劑藥物。","options":{"A":"(1)+(4)+(5)。","B":"(2)+(4)+(5)。","C":"(3)+(4)+(5)。","D":"(1)+(3)+(4)。","E":"(1)+(3)+(5)。"},"id":"112-107","roc_year":112,"source":"112合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":107,"src":"112合併卷"},{"num":108,"answer":"A","stem":"Thiazolidinedione 類藥物,以Pioglitazone為例,使用相關藥物副作用包括下列何者?(1)骨質疏鬆 (2)認知 障礙 (cognitive dysfunction) (3)體重增加 (4)腦中風 (Storke) (5)體重及脂肪組織增加。","options":{"A":"(1)+(3)+(5)。","B":"(3)+(4)+(5)。","C":"(1)+(2)+(5)。","D":"(1)+(2)+(3)。","E":"(2)+(3)+(5)。"},"id":"112-108","roc_year":112,"source":"112合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":108,"src":"112合併卷"},{"num":109,"answer":"D","stem":"下列之糖尿病之治療藥物中,何者具有增加排除尿鈉之藥理機轉?","options":{"A":"Sulfonylurea。","B":"Biguanide。","C":"Thiazolidinedione (TZD)。","D":"Sodium glucose co-transporter 2 inhibitor (SGLT 2 inhibitor)。","E":"Insulin。"},"id":"112-109","roc_year":112,"source":"112合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":109,"src":"112合併卷"},{"num":110,"answer":"C","stem":"以下有關胰島素及GLP-1 RA (Glucagon like peptide-1 receptor agonist) 治療之描述,何者錯誤?","options":{"A":"基礎胰島素 (basal insulin) 可以合併GLP-1 RA,協同控制病患之血糖。","B":"GLP-1 RA 常見的副作用為腹脹噁心感,胰島素最常見之副作用為低血糖。","C":"GLP-1 RA 可以合併胰島素治療第一型糖尿病,並可減少胰島素使用之劑量。","D":"GLP-1 RA 之使用,在降低血糖時,也會同時減輕病患之體重。","E":"Basal insulin (基礎胰島素) 使用之起始劑量(initial dose) 的原則為 0.2 unit/kg/day。"},"id":"112-110","roc_year":112,"source":"112合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":110,"src":"112合併卷"},{"num":105,"answer":"A","stem":"糖尿病降血糖藥物中,有些與胰島素分泌或胰島素阻抗性有關,有些則無直接關聯(non-insulin dependent),以下降血糖藥物中,何項藥物為非胰島素相關(non-insulin dependent)之機轉?","options":{"A":"Sodium-glucose co-transporter 2 inhibitor (SGLT 2 inhibitor)。","B":"Metformin。","C":"Thiazolidinedione(TZD)。","D":"Glucagon like peptide 1 receptor agonist (GLP 1 RA)。","E":"Sulfonylurea。"},"id":"113-105","roc_year":113,"source":"113合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":105,"src":"113合併卷"},{"num":106,"answer":"D","stem":"下列哪一種糖尿病降血糖藥物之藥理機轉,可能會造成下肢水腫?","options":{"A":"Sulfonylurea。","B":"Sodium-glucose co-transporter 2 inhibitor (SGLT 2 inhibitor)。","C":"Metformin。","D":"Thiazolidinedione(TZD)。","E":"Dipeptidyl dipeptidase 4 inhibitor (DPP4 inhibitor)。"},"id":"113-106","roc_year":113,"source":"113合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":106,"src":"113合併卷"},{"num":107,"answer":"E","stem":"有關Sodium-glucose co-transporter 2 inhibitor (SGLT 2 inhibitor)藥品之敘述,何者為錯誤的?","options":{"A":"SGLT 2 inhibitor 所形成之高尿糖,可能增加泌尿道及生殖器感染之風險。","B":"臨床試驗研究顯示SGLT 2 inhibitor 可以降低糖尿病及非糖尿患者,因心臟衰竭住院的機率。","C":"SGLT 2 inhibitor可以與胰島素同時合併使用來控制血糖。","D":"腎功能 eGFR > 60 mL/min/1.73m2 以上之糖尿病患者,都可以使用SGLT 2 inhibitor。","E":"SGLT 2 inhibitor 在降低血糖之際,也同時降低病患產生酮酸中毒(diabetic ketoacidosis) 的機率。"},"id":"113-107","roc_year":113,"source":"113合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":107,"src":"113合併卷"},{"num":110,"answer":"E","stem":"Metformin是目前國際上大多數糖尿病治療指引之首選藥物建議。以下有關Metformin之敘述何者為錯誤 的?","options":{"A":"Metformin可能造成維他命B12 (Vitamin B12)之malabsorption。","B":"腎功能不佳的糖尿病患者,eGFR小於30 ml/min/1.73m2,不應使用Metformin。","C":"糖尿病前期病患使用Metformin,可以延緩糖尿病前期到發生糖尿病之病程。","D":"乳酸中毒是罕見的Metformin藥物副作用,但是文獻記載之死亡率可達50%。","E":"Metformin之每日最高使用劑量為 2000mg。"},"id":"113-110","roc_year":113,"source":"113合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":110,"src":"113合併卷"},{"num":111,"answer":"D","stem":"糖尿病患者,併有膀胱癌(Bladder cancer)時,不可使用下列哪一種降血糖藥物?","options":{"A":"Metformin。","B":"Sodium-glucose co-transporter 2 inhibitor (SGLT 2 inhibitor)。","C":"Dipeptidyl dipeptidase 4 inhibitor (DPP4 inhibitor)。","D":"Thiazolidinedione (TZD)。","E":"Insulin glargine。"},"id":"113-111","roc_year":113,"source":"113合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":111,"src":"113合併卷"},{"num":106,"answer":"D","stem":"下列哪一項糖尿病治療藥物,會造成骨質疏鬆(Osteoporosis) 的風險?","options":{"A":"Sulfonylurea。","B":"Sodium glucose cotransporter 2 (SGLT2) inhibitor。","C":"Metformin。","D":"Thiazolidinedione (TZD)。","E":"Insulin。"},"id":"114-106","roc_year":114,"source":"114合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":106,"src":"114合併卷"},{"num":107,"answer":"B","stem":"在內科臨床血糖控制策略中,胰島素(Insulin)與 GLP-1 受體促效劑(GLP-1 receptor agonist, GLP-1 RA)兩者皆屬於注射型的重要藥物。針對這兩類藥物的臨床應用,下列何者為錯誤的敘述?","options":{"A":"GLP-1 RA 與基礎胰島素併用之聯合治療有助於提升血糖控制成效。","B":"對第一型糖尿病的治療,GLP-1 RA 宜合併Insulin 使用,降低胰島素用量。","C":"GLP-1 RA 治療中常見副作用為腸胃不適如噁心與腹脹,而胰島素治療最常見的不良反應為低血糖。","D":"臨床研究指出,GLP-1 RA 在有效降低血糖的同時,可以大幅減輕患者之體重。","E":"基礎型胰島素(Basal insulin)起始劑量的建議通常為每日每公斤體重 0.2 單位(unit/kg/day)。"},"id":"114-107","roc_year":114,"source":"114合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":107,"src":"114合併卷"},{"num":110,"answer":"E","stem":"Metformin 為 Biguanides 類藥物,目前被國際多數糖尿病治療指引列為第一線用藥。關於 Metformin 的 下列敘述,何者不正確?","options":{"A":"Metformin 有可能導致維生素 B12 吸收不良,進而造成B12之缺乏。","B":"雖然乳酸中毒是 Metformin 罕見的副作用,但一旦發生,其死亡率可高達 50%。","C":"Metformin 的使用可延緩糖尿病的發展與惡化。","D":"在懷孕期間,Metformin 為可考慮之糖尿病治療選項之一。","E":"對於腎功能不全患者, eGFR 小於 30 ml / min / 1.73m2,Metformin 的使用是安全的。"},"id":"114-110","roc_year":114,"source":"114合併PDF","topic":"糖尿病診斷與藥物治療","topic_code":"E1","topic_num":1,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":110,"src":"114合併卷"},{"num":7,"answer":"B","stem":"30歲女性平常身體健康,因2個月來常早上無法叫醒被送來急診,身體檢查除血壓90/60 mmHg、 PR 120/min, regular、 盜汗外,無特殊異常。經葡萄糖注射恢復正常,注射前抽血檢查血糖56 mg/dL、 insulin level 18 μU/mL ,下列那一措施在診斷上最恰當?","options":{"A":"腹部電腦斷層","B":"住院做72小時空腹試驗","C":"家中葡萄糖監測","D":"全身正子掃描","E":"胰臟內視鏡超音波檢查"},"id":"103-綜-7","roc_year":103,"source":"103舊站q5綜合卷","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":7,"src":"舊站綜合卷"},{"num":6,"answer":"C","stem":"陳先生,82歲,身高168公分,體重58公斤,糖尿病病史20年,目前接受 三餐前速效及睡前基礎胰島素治療。但經常會漏打餐前胰島素,一個月前之HbA1c為8.8 %,近一周出現感冒之症狀,沒有發燒之紀錄,但是胃口不佳。此次因意識狀況不清,送至急診就醫,急診之血糖為525 mg/dL,鈉離子為151 mEq/L,'鉀離子為3.5 mEq/L,尿素氮BUN為62 mg/dL,肌酸酐Cr為 2.6 mg/dL。到急診後之血壓為98/60 mmHg,脈搏為96 bpm。下列之輸液,何者最適於此病患輸注及監測其尿液排出量 (Urine output)?","options":{"A":"0.45% Half saline solution","B":"Lactate Ringer solution","C":"0.9 % Normal Saline solution","D":"5% Glucose solution with regular insulin intravenous infusion","E":"0.45% Half saline solution with regular insulin intravenous infusion"},"id":"108-綜-6","roc_year":108,"source":"108舊站q5綜合卷","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":6,"src":"舊站綜合卷"},{"num":132,"answer":"B","stem":"張老師,48歲 ,身高173公分,體重90公斤,最近兩年,體重自75公斤增加至目前之體重。無個人或家 族之糖尿病史。最近幾年,好幾次在清晨上班或上課中昏倒,昏倒時意識不清,曾於轉送急診後,發現血 糖值為28mg/dL,在注射50%葡萄糖液後恢復意識。並未發現神經學異常或糖尿病。本次再度因意識狀態 不清,送至急診就醫,急診血糖值為38 mg/dL,注射葡萄糖液後恢復意識,清醒後,在急診亦無神經學 異常症狀,因此建議住院進一步追查原因。回門診追蹤時,在接受任何輸液下,空腹血糖為 98 mg/dL,清晨8點時之ACTH 42.2 pg/mL, Cortisol 21.8 ug/dL, 空腹之Insulin 為 2.12 mIU/mL, C-peptide為 1.40 ng/mL, 甲狀腺功能篩檢TSH為 4.20 mIU/mL。請問下一步應該建議那一項檢查?","options":{"A":"腹部電腦斷層檢查","B":"72 小時之 Prolonged fasting test (延長飢餓測試)","C":"75公克葡萄糖耐受試驗 (Oral glucose tolerance test)","D":"腦下垂體磁振攝影 (Pituitary MRI)","E":"Overnight 1mg Dexamathasone suppression測試"},"id":"109-132","roc_year":109,"source":"109合併PDF","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":132,"src":"109合併卷"},{"num":56,"answer":"D","stem":"A 54 y/o diabetic female patient with 4 days of fever, respiratory symptoms and dyspnea. At emergency service, physical examination revealed postural hypotension, tachycardia, and Kussmaul respiration. Laboratory tests were: blood glucose level of 385 mg/dL. The arterial pH is 7.35, pCO2 is 22 mm Hg, pO2 86 mmHg, HCO3− 14 mEq/L. Serum electrolyte values were: Na 130 meq/L; K 5.1 meq/L; Cl 96 meq/L; Chest x-ray film indicated consolidation of bilateral lower lobe. Which of the following statements is most likely to be true? (1)The patient has respiratory acidosis, possibly related to pneumonia (2)The patient has metabolic acidosis, possibly related to diabetes (3)The patient has respiratory alkalosis, possibly related to pneumonia (4)The anion gap is still within normal range (5)Be cautious with hyperphospatemia during combined insulin and glucose therapy","options":{"A":"(1)+(2)+(5)。","B":"(1)+(2)+(4)+(5)。","C":"(2)+(3)+(5)。","D":"(2)+(3)。","E":"(2)+(3)+(4)。"},"id":"110-56","roc_year":110,"source":"110合併PDF","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":56,"src":"110合併卷"},{"num":78,"answer":"C","stem":"糖尿病患者治療中,低血糖是非常需要注意的變化。下列有關糖尿病低血糖之敘述,何者錯誤?","options":{"A":"第一型糖尿病患者以胰島素積極控制血糖,可以有效地降低糖尿病視網膜及腎病變,但是低血糖因胰 島素之積極使用,發生率也較高。","B":"第二型糖尿病最容易造成低血糖之口服藥物為硫胺類 (Sulfonylurea)藥物。","C":"新型的糖尿病藥物如DPP-4 inhibitor 及 SGLT-2 inhibitor,因其藥物機轉特殊,因此不會發生低血 糖。","D":"使用多次餐前胰島素控制血糖,發生低血糖之機率,較基礎胰島素為高。","E":"糖尿病患的糖尿病史愈久,可能因自主神經病變,產生 Hypoglycemia unawareness,而無明顯自覺 性的症狀。"},"id":"110-78","roc_year":110,"source":"110合併PDF","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":78,"src":"110合併卷"},{"num":107,"answer":"D","stem":"有關糖尿病酮酸中毒 (Diabetic ketoacidosis)診斷及處置,下列敘述,何者為錯誤的?","options":{"A":"病患多會合併高血糖及代謝酸中毒 (Metabolic acidosis)。","B":"病患血中出現酮體 (serum ketone)是診斷糖尿病酮酸中毒的重要關鍵。","C":"補充此類病患之體液,應同時確認電解質平衡,一般會使用 0.9% Normal saline 及 0.45% Saline。","D":"規律注射基礎胰島素是校正及避免病患酮酸中毒惡化的重要步驟。","E":"當使用胰島素校正血糖至250 mg/dL 時,除繼續注意體液量之平衡之外,應同步加上5% Glucose之 輸液。"},"id":"110-107","roc_year":110,"source":"110合併PDF","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":107,"src":"110合併卷"},{"num":109,"answer":"E","stem":"一位48歲 的女性,身高155公分,體重70公斤,無個人或家族之糖尿病史。最近兩年,體重自58公斤增 加至目前之體重。最近兩年,數次因昏倒意識不清,送至急診就醫,並曾於急診發現指尖扎血之血糖 值40mg/dL,在注射50%葡萄糖液後恢復意識。病患於神經內科及家庭醫學科就醫複查,並未發現神經學 異常或糖尿病。本次再度因意識狀態不清,送至急診就醫,急診血糖值為 36mg/dL,注射葡萄糖液後恢 復意識,清醒後,在急診亦無神經學異常症狀,建議住院進一步追查原因。在病房住院時,空腹8小 時,無輸液下,清晨8點空腹血糖為 82mg/dL,同時之內分泌檢查顯示,ACTH 38.6 pg/mL, Cortisol 19.6 ug/dL, Insulin 2.2 mIU/mL, C-peptide 2.0 ng/mL, TSH 3.82 mIU/mL。請問下一步應該建議那一項檢查?","options":{"A":"口服75公克葡萄糖耐受試驗。","B":"腦下垂體磁振攝影 (Pituitary MRI)。","C":"腹部電腦斷層檢查。","D":"Overnight 1mg Dexamathasone suppression測試。","E":"72 小時之 Prolonged fasting test。"},"id":"110-109","roc_year":110,"source":"110合併PDF","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":109,"src":"110合併卷"},{"num":106,"answer":"B","stem":"楊先生,56歲,身高164公分,體重 77 公斤,並無糖尿病之家族及個人病史,最近半年,體重增加了4公 斤。近一年以來,數次因不明原因昏倒,送至急診就醫。病史有高血壓,每日規則服用Losartan 50mg及Amlodipine 5mg,過去門診無異常神經血管之異常狀況。本次居家時,再度昏倒,並且意識持續 不清,因此送到急診。本次急診之血壓為98/60 mmHg,脈搏為規律的84 bpm,急診之血糖顯示為22 mg/dL,給予50%之葡萄糖輸液後,恢復意識。因此建議住院診察,在病房無點滴輸液的前提下,空腹8 小時後,抽血報告為: 空腹血糖 76 mg/dL ,Insulin 3.6 mIU/mL ,C-peptide 2.6 ng/mL,ACTH 62.2 pg/mL,Cortisol 16.3 ug/dL,IGF-1 106 ng/mL,TSH 4.32 mIU/mL,於此時應考慮之優先檢查項目為 何?","options":{"A":"腹部肝胰磁振攝影 (Magnetic resonance image, MRI)。","B":"72小時延長禁食測試 ( Prolonged fasting test)。","C":"24小時心電圖 (Holter ECG monitor)。","D":"腦下垂體磁振攝影(MRI)。","E":"經食道內視鏡超音波 (Endoscopic ultrasound, EUS)。"},"id":"111-106","roc_year":111,"source":"111合併PDF","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":106,"src":"111合併卷"},{"num":112,"answer":"D","stem":"45歲,男性,165公分,80公斤,無糖尿病家族及個人病史,經常工作時昏倒,都在休息30分鐘後逐漸甦 醒,心臟內科及神經內科門診檢查無心律不整或神經血管病變異常發現。本次昏倒後,送至急診,但意識 持續不清,血壓為112/60 mmHg,急診血糖為 32 mg/dl,給予50%葡萄糖注射及輸液後甦醒。建議住院 診治。 在病房未輸液情況下,空腹8小時後,抽血結果為空腹血糖 88 mg/dl, Insulin 3.6 mIU/ml, C-peptide 2.6 ng/ml, ACTH 36.8 pg/ml, Cortisol 18.6 ug/dl, IGF-1 172 ng/ml, TSH 1.10 mIU/ml。此時應建議先進行何 項檢查?","options":{"A":"75 公克葡糖糖耐受試驗。","B":"24小時心電圖。","C":"腹部電腦斷層。","D":"72小時 Prolong fasting test。","E":"24小時心電圖。"},"id":"112-112","roc_year":112,"source":"112合併PDF","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":112,"src":"112合併卷"},{"num":108,"answer":"D","stem":"李先生,46歲,身高168公分,體重 78 公斤,近一年來,體重增加了8 公斤。病患無糖尿病之家族及個 人病史,近來有數次不明原因的昏倒紀錄,均約30 分鐘內甦醒過來。門診無心律不整或神經血管之異常 狀況。本次因再度於工作時昏倒,但是意識持續不清,因此送到急診。急診之血壓為110/58 mmHg,脈 搏為規律的84bpm,急診之血糖顯示為20 mg/dL,給予50%之葡萄糖輸液後,即恢復意識。在住院診察 後,無點滴輸液的前提下,空腹8 小時,抽血報告為: 空腹血糖 76 mg/dL, Insulin 2.8 mIU/mL ,C-peptide 2.2 ng/mL,ACTH 66.8 pg/mL,Cortisol 18.8 ug/dL,IGF-1 230 ng/mL,TSH 3.48 mIU/mL,此時應考慮之優先檢查項目為何?","options":{"A":"腦下垂體磁振攝影(MRI)。","B":"抽血檢查血中 Chromogranin A 濃度。","C":"腹部電腦斷層。","D":"72小時之 Prolonged fasting test。","E":"Inferior petrosal sinus sampling (IPSS) 下岩竇靜脈血液取樣檢測。"},"id":"113-108","roc_year":113,"source":"113合併PDF","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":108,"src":"113合併卷"},{"num":112,"answer":"E","stem":"低血糖是糖尿病治療過程中,以及非糖尿病患者相關疾病或使用特定藥物治療時常見的併發症,下列何者 是發生低血糖的原因? (1) 不當使用胰島素或口服降血糖藥物。 (2) 肢端肥大症。 (3) 胃切除手術後 (Post-gastric bypass surgery)。 (4) 腎上腺機能不足 (Adrenal insufficiency)。 (5) 庫欣氏症候群 (Cushing's syndrome)。","options":{"A":"(1)+(2)+(4)。","B":"(2)+(3)+(4)。","C":"(1)+(2)+(5)。","D":"(1)+(3)+(5)。","E":"(1)+(3)+(4)。"},"id":"113-112","roc_year":113,"source":"113合併PDF","topic":"糖尿病急症與低血糖","topic_code":"E2","topic_num":2,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":112,"src":"113合併卷"},{"num":6,"answer":"B","stem":"有關糖尿病足潰瘍之敘述何者正確?","options":{"A":"主要原因是血管病變導致缺氧,因此高壓氧治療是必須的","B":"主要原因是神經病變導致壓力不均勻所致","C":"主要是因抵抗力不足,感染造成","D":"除了在室內,不應赤腳走路","E":"應鼓勵病人多走動以促進血液循環"},"id":"102-綜-6","roc_year":102,"source":"102舊站q5綜合卷","topic":"糖尿病慢性併發症與綜合照護","topic_code":"E3","topic_num":3,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":6,"src":"舊站綜合卷"},{"num":10,"answer":"B","stem":"37歲女性為第1型糖尿病19年,因左足無法背屈 ( dorsiflex ) 來診,最近追蹤除了眼底有一些小血管瘤以外無其他併發症,體檢發現甲狀腺2度腫大,左足無法背屈,感覺也喪失,右下肢則為正常; 膝反射二側皆正常,下列那一項檢查最恰當?","options":{"A":"甲狀腺功能檢查","B":"神經傳導檢查","C":"腦脊髓液蛋白電泳","D":"腰部核磁共振","E":"類風濕因子測定"},"id":"105-綜-10","roc_year":105,"source":"105舊站q5綜合卷","topic":"糖尿病慢性併發症與綜合照護","topic_code":"E3","topic_num":3,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":10,"src":"舊站綜合卷"},{"num":131,"answer":"D","stem":"台灣老年性糖尿病人口,隨著平均壽命之延長,呈現快速增加的現象,其中糖尿病腎臟照護,必須重 視,下列有關老年性糖尿病腎臟照護的敘述,何者為錯誤?","options":{"A":"老年性糖尿病腎臟病變時,病患貧血的程度、左心室肥大現象、心血管疾病發生率及死亡率之間,呈 現統計學上顯著的相關性","B":"雖然糖尿控制指標糖化血色素(HbA1c) 一般建議的標的是 7%,但是針對老年性糖尿病,合併腎病變 時,需考慮病患之身體健康狀況及活動能力,目前老年糖尿病照護之建議,針對活動力較差之患 者,控制標的為HbA1c < 8 %","C":"老年性糖尿病患者,接受心導管或其他影像學檢查時,顯影劑可能是造成腎臟功能急速惡化的原因之 一","D":"目前已知的大型臨床研究均顯示,為了降低心血管死亡,以及預防心血管事件發生,在病患腎功能無 虞的前提下,年紀愈長的糖尿病患,應將HbA1c控制< 6.5%以下,才是長期的醫療模式","E":"老年糖尿病, 患腎功能不佳時, 磺脲類藥物(Sulfonylureas)之使用, 可能是低血糖的重要原因之一"},"id":"109-131","roc_year":109,"source":"109合併PDF","topic":"糖尿病慢性併發症與綜合照護","topic_code":"E3","topic_num":3,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":131,"src":"109合併卷"},{"num":106,"answer":"B","stem":"陳先生,70歲,體重76公斤,身高160公分,BMI 為29.7,糖尿病診斷逾十年,本次住院前半年,曾因心 肌梗塞,住院進行心導管及置放支架治療,目前生活作息可自理,主要照顧者為同住之兒子。住院前僅接 受每天早、晚餐後口服一顆Metformin (500mg/tab) 治療,住院中接受胰島素注射治療。本次因社區型肺 炎住院治療,抗生素使用7天後,評估情況穩定,目前生命徵象穩定,並預備出院。住院中之HbA1c 為7.6 %,肌酸酐為 2.3 mg/dL (eGFR為 28mL/min/1.73m2)。預出院前之晨間空腹血糖為122 mg/dL,當 日早餐後兩小時指尖扎針血之血糖為166 mg/dL。下列有關出院後糖尿病治療安排敘述,何者錯誤?","options":{"A":"依照病患之eGFR變化,Metfromin已不宜使用。","B":"為預防糖尿病腎功能繼續惡化及病患曾有心血管疾病病史,應加上DPP-4 inhibitor 類藥物治療。","C":"依據目前腎功能之變化,出院後不宜使用SGLT-2 inhibitor。","D":"建議出院後之HbA1c控制應以7.0 %以下為目標。","E":"建議病患應於居家自我監測血糖 (Self Monitoring of Blood Glucose)。"},"id":"110-106","roc_year":110,"source":"110合併PDF","topic":"糖尿病慢性併發症與綜合照護","topic_code":"E3","topic_num":3,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":106,"src":"110合併卷"},{"num":109,"answer":"E","stem":"以下有關糖尿病、高血壓及高血脂治療藥物的敘述,何者為錯誤的? (1)隨著年齡的老化,血糖控制的HbA1c控制範圍,高齡的糖尿病病患會較年輕的糖尿病患者寬鬆些 。 (2)目前糖尿病高血壓治療的首選藥物為 Angiotensin-converting enzyme inhibitor (ACEI)或 angiotension receptor blocker (ARB) 。 (3)糖尿病患者如需藥物控制治療高血脂,其低密度脂蛋白膽固醇(LDL-cholestrol) 之治療標的為低於130 mg/mL。 (4)糖尿病患者之高血壓控制目標,基本上定在低於120/80 mmHg,如果合併蛋白尿時,血壓控制建議為 低於110/70 mmHg。 (5)當HbA1c、血壓及血脂均達到控制標準時,戒菸已無助於降低糖尿病血管併發症之風險。","options":{"A":"(1)+(2)+(3)。","B":"(1)+(4)+(5)。","C":"(2)+(4)+(5)。","D":"(1)+(3)+(5)。","E":"(3)+(4)+(5)。"},"id":"113-109","roc_year":113,"source":"113合併PDF","topic":"糖尿病慢性併發症與綜合照護","topic_code":"E3","topic_num":3,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":109,"src":"113合併卷"},{"num":109,"answer":"C","stem":"一位83歲男性因感到倦怠前來就診,無糖尿病史,初診身體檢查顯示:BMI 為 28 kg/m2,血壓為 130/90 mmHg,下肢可見輕微水腫,其餘並無明顯異常。抽血檢查結果為:肌酸酐(Cre)2.3 mg/dL、eGFR 為 28ml/min/1.73 m2、AST 30 U/L、ALT 25 U/L、糖化血色素(HbA1c)8.6%、空腹血糖 160 mg/dL,餐 後血糖為 223 mg/dL。尿液檢查顯示明顯巨量之微白蛋白尿(microalbuminuria)。除了建議調整生活型態 與飲食控制之外,下列藥物處置何者最適當?","options":{"A":"Metformin。","B":"Empagliflozin, SGLT-2 inhibitor (sodium-glucose co-transporter 2 inhibitor)。","C":"Linagliptin, DPP-4 inhibitor (dipeptidyl peptidase-4 inhibitor)。","D":"Glimepiride, Sulfonylurea。","E":"Pioglitazone, Thiazolidinedione (TZD)。"},"id":"114-109","roc_year":114,"source":"114合併PDF","topic":"糖尿病慢性併發症與綜合照護","topic_code":"E3","topic_num":3,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":109,"src":"114合併卷"},{"num":111,"answer":"D","stem":"一位68歲男性,患有第二型糖尿病超過15年,近日主訴夜間頻尿與視力模糊。身高170 cm,體重78公 斤,血壓138/86 mmHg。抽血檢查結果為:HbA1c 8.2%,eGFR 40 mL/min/1.73m2,尿液檢查顯示 albumin-to-creatinine ratio (UACR) 為 210 mg/g。眼底檢查顯示非增殖型視網膜病變(NPDR)。目前使 用藥物為 Metformin 1000 mg BID 及 Sitagliptin 100 mg QD。有關此病人治療建議的敘述,何者為錯 誤?","options":{"A":"考慮合併使用 SGLT2 抑制劑可延緩腎功能惡化,有助於減少心血管事件發生。","B":"病人已有中度腎病變,Metformin 可繼續使用,但須定期監測腎功能。","C":"GLP-1 receptor agonist 可做為合併治療選項,有助於血糖及體重控制。","D":"DPP-4 抑制劑及 GLP-1 receptor agonist 屬 incretin 類藥物,合併使用可加強血糖控制。","E":"病人之 UACR > 200 mg/g,即使血壓未超過140/90 mmHg,仍應考慮使用 ACEi 或 ARB 作為腎臟 保護。"},"id":"114-111","roc_year":114,"source":"114合併PDF","topic":"糖尿病慢性併發症與綜合照護","topic_code":"E3","topic_num":3,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":111,"src":"114合併卷"},{"num":112,"answer":"C","stem":"一位75歲男性,有第二型糖尿病與心臟衰竭病史(LVEF 38%,HFrEF)。現用藥包括 Metformin 、Bisoprolol 、 Sacubitril / Valsartan、Furosemide 與 Atorvastatin。近來出現下肢水腫惡化與輕度呼吸 困難,體重增加2公斤。實驗室數據顯示:HbA1c 8.4%,eGFR 58 mL / min / 1.73m2,NT-proBNP 明顯 上升。以下哪一項治療策略最不適合?","options":{"A":"SGLT2 抑制劑可改善血糖及心衰之病程,並進一步降低心血管死亡與住院風險。","B":"目前持續使用 Metformin 為安全且合適的選擇,不會增加心衰惡化風險。","C":"針對血糖控制,可考慮加上 saxagliptin (DPP-4 抑制劑)。","D":"考量體液滯留與心衰惡化,目前不應使用 Thiazolidinedione (Pioglitazone)。","E":"針對血糖控制,當其他藥物無效或有禁忌時,胰島素可作為後線使用的選擇。"},"id":"114-112","roc_year":114,"source":"114合併PDF","topic":"糖尿病慢性併發症與綜合照護","topic_code":"E3","topic_num":3,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":112,"src":"114合併卷"},{"num":7,"answer":"E","stem":"有一30歲男性工程師因突然下肢無力跌倒被送來急診,理學檢查發現下肢paralysis,deep tendon reflex 消失,脈搏132/min,血壓150/50 mmHg,體溫正常,抽血檢查:K2.0 mM,free T4 2.5 ng/dl,以下有關敘述何者錯誤?","options":{"A":"不宜多吃海帶、紫菜含碘食物","B":"不宜多吃甜食或過於飽食","C":"此病為甲狀腺機能亢進引起,只要甲狀腺機能控制便不再發","D":"宜多吃含鉀食物","E":"建議病人即刻使用放射碘治療"},"id":"102-綜-7","roc_year":102,"source":"102舊站q5綜合卷","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":7,"src":"舊站綜合卷"},{"num":9,"answer":"E","stem":"48歲女性因健檢發現甲狀腺腫來求診,身體檢查發現病人甲狀腺呈第一度腫大,抽血檢查..free T4 1.07 ng/dl、hsTSH 7.5μU/ml、thyroglobulin 100 ng/ml、antiTPO 400 IU/ml。下列處置及其理由何者正確?","options":{"A":"病人甲狀腺機能低下即刻給予甲狀腺素補充","B":"病人甲狀腺腫給予甲狀腺素治療","C":"病人antiTPO高給予甲狀腺素治療以減少發炎","D":"病人thyroglobulin高給予甲狀腺素治療","E":"甲狀腺素治療無益,觀察即可"},"id":"105-綜-9","roc_year":105,"source":"105舊站q5綜合卷","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":9,"src":"舊站綜合卷"},{"num":6,"answer":"D","stem":"45歲女性因倦怠、無力、便秘、體重增加來診,身體檢查發現身高160公分、體重60公斤、臉部略為浮腫、蒼白,血壓 146/92 mmHg、PR 58/min, regular 抽血檢查發現飯前血糖100 mg/dl、膽固醇 260 mg/dl、低密度膽固醇 160 mg/dl,Na 128 mM、K 4.0 mM、CK 1500 U/L,下列處置何者最恰當..","options":{"A":"給予statin治療","B":"給予angiotensin receptor blocker","C":"測Urine sodium、protein","D":"測血中 free T4、hsTSH","E":"測血中 ACTH、cortisol"},"id":"107-綜-6","roc_year":107,"source":"107舊站q5綜合卷","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":6,"src":"舊站綜合卷"},{"num":124,"answer":"A","stem":"某些非甲狀腺疾病(nonthyroidal illness)可能造成甲促素(TSH)或甲狀腺荷爾蒙濃度異常的sick euthyroid syndrome。以下哪一項描述不正確?","options":{"A":"禁食可能影響5-deiodinase的作用,使 T4 變成 rT3, 造成 low T3 syndrome","B":"如果病人有low T4, low T3, 代表病情極為嚴重,預後不佳","C":"急性肝病變(acute liver disease) 可能釋放thyroxine-binding globulin (TBG)而使total T3及T4 增 加,但unbound T3及 T4則不會增加","D":"使用dopamine 或 glucocorticoid 治療可能使TSH 偏低","E":"在HIV感染初期,即使病人有體重下降,T3及T4仍然可能增高"},"id":"109-124","roc_year":109,"source":"109合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":124,"src":"109合併卷"},{"num":125,"answer":"D","stem":"一位28歲男性病人接受雙側甲狀腺全切除手術, 其病理報告如下:左側甲狀腺有4*2.2*1.8公分甲狀腺乳 突癌,右側甲狀腺無癌病變。左側level II, III, IV淋巴結共切除11個,其中5個有甲狀腺乳突癌轉移。請問 有關這位病人的診斷與處置,哪一項正確?","options":{"A":"依據美國聯合癌症委員會(American Joint Commiottee on Cancer staging), 此病人為T2N1bMx, stage IVA","B":"病人的再發風險高,手術後二週內應該給予放射性碘(I -131)治療","C":"使用放射性碘治療前,應該先以低劑量(3mCi)放射性碘掃描,以了解殘餘甲狀腺組織有多少並估算適 當的放射性碘治療劑量","D":"病人在接受放射性碘治療後,應該補充甲狀腺素 以維持其甲狀腺功能在subclinical hyperthyroidism的範圍","E":"血清中thyroglobulin可做為甲狀腺癌追蹤指標,最好維持在10 ng/ML 以下 (正常參考值< 55 ng/mL)"},"id":"109-125","roc_year":109,"source":"109合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":125,"src":"109合併卷"},{"num":99,"answer":"D","stem":"有關甲狀腺功能亢進的診斷及治療,下列哪一項最正確? (1)抗甲狀腺藥物可能通過胎盤影響胎兒發育。 (2)哺乳期絕對禁用抗甲狀腺藥物。 (3)以carbimazole 治療甲狀腺功能亢進,若欲給予放射性碘治療,在給予放射性碘前2-3天應先暫 停carbimazole,若有需要,在給予放射性碘3-7天後再給予carbimazole。使用propylthiouracil 後若要給 予放射性碘治療,則可以不需要停用propylthiouracil。 (4)病人如果有甲狀腺毒症(thyrotoxicosis)的臨床表現,其TSH偏低但fT4正常,應該檢測fT3以確定是否為 T3 toxicosis。 (5)fT4 高、TSH 正常或高,須考慮TSH-secreting pituitary adenoma 或甲狀腺荷爾蒙拮抗症候群 (thyroid hormone resistance syndrome)。","options":{"A":"(1)+(3)。","B":"(2)+(4)。","C":"(3)+(5)。","D":"(1)+(4)+(5)。","E":"(2)+(3)+(4)。"},"id":"110-99","roc_year":110,"source":"110合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":99,"src":"110合併卷"},{"num":104,"answer":"C","stem":"一位50歲女性病人,主訴四月初因為左側前頸部腫痛在外就診,當時的甲狀腺功能檢查為: T4 10.85 μg/dL、TSH 0.153 μIU/mL,未做其他檢查及治療。五月初病人來診,表示左側前頸部疼痛稍減,但右側 前頸部開始疼痛。身體診察發現甲狀腺腫大,右側局部壓痛比左側明顯,表面皮膚正常。檢查結果顯示 fT4 3.01 ng/dL、 TSH ≦ 0.005μIU/mL、anti-thyroglobulin antibody 292 IU/mL、anti-TPO 414 IU/mL、ESR 36 mm/hr、CRP 7.0 mg/L、WBC 4.58*103/μL;請問下列哪一項描述最正確? (參考值: T4: 5.1-14.1μg/dL、fT4 0.93~1.70 ng/dL、TSH 0.270 ~ 4.200 μIU/mL、anti-thyroglobulin antibody <60 IU/mL、anti-TPO <60 IU/mL、ESR 0-20 mm/hr、CRP <5 mg/L、WBC 4.00-10.80*103/μL )","options":{"A":"病人有甲狀腺功能亢進,應該給予抗甲狀腺藥物。","B":"病人有自體免疫甲狀腺疾病,應該給予類固醇。","C":"病人有亞急性甲狀腺炎,可以給予non-steroid anti-inflammatory drug。","D":"病人有急性甲狀腺炎,應該給予抗生素。","E":"甲狀腺超音波比放射性碘掃描更有助於鑑別fT4高的原因。"},"id":"110-104","roc_year":110,"source":"110合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":104,"src":"110合併卷"},{"num":77,"answer":"E","stem":"一位45歲男性病人,主訴為前頸部疼痛。他約兩週前有感冒,沒有發燒,甲狀腺有局部腫大併壓痛。他的 白血球為5.1 K/μL,fT4 為 1.9 ng/dL (參考值 0.89 ~ 1.76 ng/dL),TSH為 0.36 μIU/mL (參考值 0.4 ~ 4μIU/mL) ,請問下列哪一個選項最正確?","options":{"A":"給予抗甲狀腺藥物。","B":"給予抗生素。","C":"給予甲狀腺素。","D":"給予抗甲狀腺藥物及抗生素。","E":"給予類固醇或非類固醇抗發炎藥物(NSAID)。"},"id":"111-77","roc_year":111,"source":"111合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":77,"src":"111合併卷"},{"num":97,"answer":"D","stem":"以下有關懷孕與甲狀腺疾病的描述,哪幾項最正確? (1) 懷孕婦女體內的甲狀腺刺激球蛋白(thyroid stimulating immunoglobulins)可以過胎盤造成胎兒的甲狀腺 毒症。 (2) 美國食品藥物管理局 (Food and Drug Administration) 建議不論懷孕週期,懷孕婦女的首選抗甲狀腺藥 物均為propylthiouracil。 (3) 一般而言,使用放射性碘治療六個月以後可以安全受孕,但在懷孕及哺乳期使用放射性碘治療是絕對 禁忌。 (4) 胎兒甲狀腺毒症的徵候包括子宮內生長遲緩(poor intrauterine growth) 、心跳超過每分鐘160下、骨齡 超過(advanced bone age)、甲狀腺腫等。 (5) 產後很容易有甲狀腺功能亢進的復發,但若哺乳,則不應該使用抗甲狀腺藥物。","options":{"A":"(1)+(2)。","B":"(3)+(4)。","C":"(4)+(5)。","D":"(1)+(3)+(4)。","E":"(2)+(3)+(5)。"},"id":"111-97","roc_year":111,"source":"111合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":97,"src":"111合併卷"},{"num":102,"answer":"E","stem":"有關甲狀腺功能低下的描述,哪一項最正確?","options":{"A":"自體免疫性甲狀腺功能低下(autoimmune hypothyroidism)的病人,因為有淋巴球浸潤,故而其甲狀 腺皆為瀰漫性腫大。","B":"亞臨床甲狀腺功能低下(subclinical hypothyroidism)的病人不會有明顯症狀,因此不需要治療。","C":"甲狀腺功能低下時,心肌收縮力(myocardial contractility)減少、心跳減慢,因此通常血壓偏低,不會 有高血壓。","D":"甲狀腺功能低下的levothyroxine治療劑量為每日每公斤體重1.6μg,最好是早餐後30分鐘內使用。","E":"懷孕婦女若有甲狀腺抗體,即使甲狀腺功能正常,仍有較高的流產及早產風險。"},"id":"112-102","roc_year":112,"source":"112合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":102,"src":"112合併卷"},{"num":103,"answer":"A","stem":"有關甲狀腺結節及甲狀腺癌的描述,下列哪一項最正確?","options":{"A":"甲狀腺超音檢查,高度大於寬度(taller-than-wide)的結節,其惡性風險高於寬度大於高 度(wider-than-tall)的結節。","B":"甲狀腺結節的細針穿刺細胞學檢查如果報告為濾泡瘤(follicular neoplasm), 其惡性風險通常<10%。","C":"美國癌症聯合委員會(American Joint Committee on Cancer, AJCC)的腫瘤、淋巴、轉移(tumor, node , metastasis, TNM)癌症分類,腫瘤3.5公分為T3。","D":"甲狀腺癌病人經手術切除後都應該接受放射性(radioiodine)治療,以減少復發及延長存活。","E":"甲狀腺淋巴癌常快速長大,手術切除是首要的治療方式。"},"id":"112-103","roc_year":112,"source":"112合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":103,"src":"112合併卷"},{"num":116,"answer":"C","stem":"下列抗體是診斷自體免疫甲狀腺疾病(AITD)之最常用之檢查?","options":{"A":"甲狀腺過氧化酶抗體+抗核抗體(TPO Ab+ ANA)。","B":"甲狀腺球蛋白抗體+DNA抗體(TgAb +anti-DSDNA)。","C":"甲狀腺球蛋白抗體Tg Ab+ 甲狀腺過氧化酶抗體TPO Ab。","D":"甲促素接受器抗體(TSHR Ab)+TPO Ab。","E":"TSHR Ab+抗RNP抗體。"},"id":"113-116","roc_year":113,"source":"113合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":116,"src":"113合併卷"},{"num":97,"answer":"A","stem":"下列因子可以抑制腦垂體促甲狀腺細胞(thyrotrope) 分泌甲狀腺刺激素(thyroid stimulating hormone, TSH),哪一項除外?","options":{"A":"胰島素(Insulin)。","B":"多巴胺(Dopamine)。","C":"體抑素(Somatostatin)。","D":"類固醇(Glucocorticoids)。","E":"三碘甲狀腺素(Triiodothyronine, T3)。"},"id":"114-97","roc_year":114,"source":"114合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":97,"src":"114合併卷"},{"num":98,"answer":"B","stem":"下列哪一項描述最正確?","options":{"A":"甲狀腺功能亢進合併低血鉀週期性無力症(Hypokalemic periodic paralysis)最常見於西方中年女性。","B":"甲狀腺功能亢進、低下或正常的人都可能有甲狀腺相關眼病變(thyroid-associated ophthalmopathy)。","C":"甲狀腺功能亢進病人最常見的心血管疾病表徵是心房顫動(atrial fibrillation)。","D":"葛雷夫氏症(Graves’ disease)患者的thyroid-stimulating immunoglobulins (TSIs)濃度與甲狀腺荷爾蒙 濃度直接相關。","E":"葛雷夫氏症(Graves’ disease)患者中約 30%、20%、10% 會合併眼病變(ophthalmopathy)、皮膚病 變(dermopathy)、指端粗厚(acropachy)。"},"id":"114-98","roc_year":114,"source":"114合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":98,"src":"114合併卷"},{"num":99,"answer":"C","stem":"有關甲狀腺疾病的描述,下列哪一項最正確?","options":{"A":"碘過量、碘缺乏、amiodarone、lithium等都可能造成甲狀腺功能低下。亞臨床性甲狀腺低能 症(subclinical hypothyroidism)的懷孕婦女不建議給予甲狀腺素治療。","B":"一位50歲男性被診斷有急性甲狀腺炎(acute thyroiditis),除了使用抗生素治療,應於急性期趁早做吞 鋇劑顯影、喉頭鏡或電腦斷層等檢查以找出是否有梨狀竇瘻管 (pyriform sinus fistula)。","C":"甲狀腺分化癌經手術全切除後,應依據其癌症分期(cancer staging)考慮放射性碘治療。T1N0M0的病 人給予放射性碘治療,並不會影響再發率(recurrence rate)或存活率(survival rate)。","D":"亞急性甲狀腺炎 (subacute thyroiditis)好發於30-50歲之男性。病程中可以先看到甲狀腺素(thyroxine, T4)上升,甲狀腺刺激素(thyroid stimulating hormone, TSH) 下降,此時放射性碘之攝 取(radioactive iodine uptake)通常會減少或消失。","E":"橋本氏甲狀腺炎(Hashimoto’s thyroiditis) 屬自體免疫性甲狀腺疾病,應鼓勵病人多攝取碘,考慮甲狀 腺過氧化酶抗體(antithyroid peroxidase antibody)之高低給予適量之類固醇,並定期追蹤其甲狀腺 功能,若甲狀腺功能低下,應給予甲狀腺素治療。"},"id":"114-99","roc_year":114,"source":"114合併PDF","topic":"甲狀腺疾病","topic_code":"E4","topic_num":4,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":99,"src":"114合併卷"},{"num":6,"answer":"B","stem":"那些藥會促進骨生成 (1)Bisphosphonate (2)PTH (3)NaF (4)Vit D (5)Estrogen","options":{"A":"(1)+(2)","B":"(2)+(3)","C":"(3)+(4)","D":"(4)+(5)","E":"(1)+(5)"},"id":"101-綜-6","roc_year":101,"source":"101舊站q5綜合卷","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":6,"src":"舊站綜合卷"},{"num":6,"answer":"B","stem":"65歲男性因倦怠、食慾不振、多尿二個月,今早昏迷來急診,6個月前病人被診斷肺癌,身體檢查:血壓88/60 mmHg 、PR 108/min、regular,RR20/min,此外無特別異常,抽血檢查BUN 66 mg/dL、Cr 2.9 mg/dL、Ca 13 mg/dL。經過食鹽水輸液治療後清醒,iPTH測不到,要維持血鈣正常,下列那一藥物最佳","options":{"A":"Calcitonin","B":"Bisphosphonate","C":"Diuretic","D":"Prednisolone","E":"EDTA"},"id":"103-綜-6","roc_year":103,"source":"103舊站q5綜合卷","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":6,"src":"舊站綜合卷"},{"num":126,"answer":"D","stem":"高血鈣(hypercalcemia)的鑑別診斷,以下哪一項不正確?","options":{"A":"Vitamin A intoxication可能造成副甲狀腺荷爾蒙(PTH)低的高血鈣症","B":"如果短期急性出現高血鈣症且PTH值偏低,應該先考慮惡性腫瘤","C":"約有 10% 以lithium 治療 bipolar depression 的病人可能產生高血鈣症","D":"Calcimimetics可以下降PTH的分泌,降低血鈣, 增加骨密度","E":"甲狀腺功能亢進或腎上腺功能低下都可能引起高血鈣症"},"id":"109-126","roc_year":109,"source":"109合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":126,"src":"109合併卷"},{"num":127,"answer":"B","stem":"下列有關骨質疏鬆(osteroporosis)的描述,哪一項正確?","options":{"A":"以DXA測量骨密度(bone minearal density, BMD), T-score是與相同性別、相同種族、相同年紀的人 做比較","B":"Klinefelter's syndrome會增加骨質疏鬆風險","C":"如果其他條件都相同, 骨密度 T-score <-2.5的人發生骨折的風險3倍於T-score 介於-1.0 及 -2.5之間 的人","D":"以 Fracture risk assessment tool (FRAX)估算,如果父母有腰椎骨折病史,則骨折風險會增加","E":"Denosumab可能增加osteonecrosis of the jaw (ONJ)的風險,但不會增加atypical femur fracture的風 險"},"id":"109-127","roc_year":109,"source":"109合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":127,"src":"109合併卷"},{"num":172,"answer":"D","stem":"一位70歲男性病人,突然因意識混亂(confusion)被家人送至急診室。生命徵象(TPR與血壓)大致穩定,並 沒有局部神經學徵象。初步抽血檢查發現血清鈣數值3.55mmol/L (14.2mg/dL),BUN與Cre數值輕微上 升。胸部X光攝影(CXR)發現兩側肺野有多發肺結節(nodules),高度懷疑是轉移的惡性腫瘤。之後的實驗 室檢查顯示PTH-rP (parathyroid hormone-related protein)數值明顯上升。下列的高血鈣症之處置最\"不\"需 要?","options":{"A":"Normal saline","B":"Pamidronate","C":"Furosemide","D":"Prednisolone","E":"Calcitonin"},"id":"109-172","roc_year":109,"source":"109合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":172,"src":"109合併卷"},{"num":60,"answer":"E","stem":"A 26-year-old girl of type I diabetes had poor appetite and body weight loss for 3 kg (6%) in recent one month. After admission, she received partial parenteral nutrition due to anorexia and poor oral intake. Hypophosphatemia (0.8 mg/dL) was notcied on the third day of admission . The most likely mechanism for her acute hypophosphatemia is:","options":{"A":"Acute stage of diabetic ketoacidosis。","B":"Hungry bone syndrome。","C":"Primary hypoparathyroidism。","D":"Renal phosphate wasting。","E":"Shift of phosphorus into intracellular stores。"},"id":"110-60","roc_year":110,"source":"110合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":60,"src":"110合併卷"},{"num":98,"answer":"E","stem":"下列因素可能造成高血鈣症,哪幾項描述最正確? (1) 與副甲狀腺荷爾蒙(parathyroid hormone, PTH)相關,包括副甲狀腺癌、使用鋰鹽治療、家族性低尿鈣 高血鈣等。 (2) 24-hydroxylase缺乏使1,25(OH)2D代謝變慢可能導致高血鈣。 (3) 維生素A缺乏、使用Thiazides、脂肪消解(fat necrosis)等可能加快骨代謝而造成高血鈣。 (4) 甲狀腺功能低下、不動(immobilization) 使代謝變慢,鈣不易排出,因此可能造成高血鈣。 (5) 惡性腫瘤可能因為轉移(metastasis)或分泌某些因子(humoral mediation)而造成高血鈣。","options":{"A":"(1)+(3)。","B":"(2)+(4)。","C":"(1)+(5)。","D":"(2)+(3)+(5)。","E":"(1)+(2)+(5)。"},"id":"111-98","roc_year":111,"source":"111合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":98,"src":"111合併卷"},{"num":104,"answer":"C","stem":"下列有關副甲狀腺與血鈣平衡的描述哪一項最正確?","options":{"A":"約有10%長期使用鋰鹽的病人可能有高血鈣。一旦造成高血鈣,即使停用鋰鹽,血鈣仍無法恢復正 常。","B":"家族性低尿鈣性高鈣血症(familial hypocalciuric hypercalcemia, FHH) 是一種體染色體隱性遺 傳(autosomal recessive)疾病。病人常表現無症狀的高血鈣,主要是因為感應鈣離子濃度的受器基因 突變引起的。","C":"肺癌中的小細胞癌(small cell carcinoma)以及腺癌(adenocarcinoma)雖然常有骨轉移,但少引起高血 鈣。鱗狀細胞癌(squamous cell carcinoma)較常有高血鈣。","D":"原發性副甲狀腺功能亢進(primary hyperparathyroidism)中約有80%的病人為單一副甲狀腺瘤。副甲 狀腺瘤以良性居多,偶而可見副甲狀腺癌。副甲狀腺癌侵襲性強,存活期很短。","E":"高血鈣的治療藥物中,calcitonin的開始作用時間比denosumab或pamidronate短,可能的副作用是嚴 重的低血鈣。"},"id":"112-104","roc_year":112,"source":"112合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":104,"src":"112合併卷"},{"num":72,"answer":"D","stem":"一位41歲男性來到急診室,有2天的噁心、腹部不適和腹瀉病史。腹部不適在飯後立即加重。在過去24小 時內還有逐漸加重的口周麻木和上肢肌肉痙攣。4天前接受了全甲狀腺切除術。家族史:母親在68歲時死 於肺癌,個人史:他每天抽一包香菸,已有22年,目前唯一的藥物是多種維他命補充劑。理學檢查:外觀 很疲倦,體溫36.0°C ,脈搏72次/分鐘,呼吸20次/分鐘,血壓130/70 mm Hg。測量血壓時,加壓帶引起 腕部痙攣。頸部手術傷口癒合良好。腹部輕度壓痛。其餘檢查無異常。血清檢查顯示:鈉:138 mEq/L,鉀:4.2 mEq/L,氯:102 mEq/L,碳酸氫鹽:25 mEq/L,鎂:1.7 mg/dL,磷:4.3 mg/dL,25-羥基維生素D:20 ng/mL (正常範圍20-100),副甲狀腺激素:2 pg/mL。下列哪一項是最合適 的初始藥物治療措施?","options":{"A":"口服維生素D。","B":"皮下注射副甲狀腺激素。","C":"靜脈注射鎂。","D":"靜脈注射葡萄糖酸鈣。","E":"靜脈注射碳酸氫鈉。"},"id":"113-72","roc_year":113,"source":"113合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":72,"src":"113合併卷"},{"num":101,"answer":"B","stem":"下列有關副甲狀腺的描述哪一項最正確?","options":{"A":"高血鈣(hypercalcemia)最常見的病因是副甲狀腺功能亢進,其次是癌症,這兩者約佔高血鈣個案 的90%。Vitamin D 缺乏、甲狀腺功能亢進、vitamin A中毒、脂肪壞死(fat necrosis) 等也可能造成高 血鈣。","B":"雙磷酸鹽 (bisphosphonates)可以增加骨密度但不影響血鈣濃度。擬鈣劑(calcimimetics)可以減 少PTH 分泌降低血鈣,但不會影響骨密度。","C":"原發性副甲狀腺功能亢進(primary hyperparathyroidism)的無症狀病人,應該建議開刀的狀況包括:年 齡 > 60歲、血鈣大於正常參考值 1 mg/dL 以上、肌酸酐廓清率(creatinine clearance) < 50 mL/min、腰椎骨密度T score < -2.5 等。","D":"單一副甲狀腺腫瘤造成的原發性副甲狀腺功能亢進在手術切除腫瘤後血鈣通常在24小時內就會下 降,3至5天內血鈣可能低於正常值。通常手術後之低血鈣可以自動恢復正常,可以不需要處理。","E":"抑鈣素(calcitonin) 可以抑制噬骨細胞(osteoclast)的骨吸收作用,並減少腎臟的鈣排出。腦、腸 胃、免疫系統都有抑鈣素接合器 (receptors)。"},"id":"113-101","roc_year":113,"source":"113合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":101,"src":"113合併卷"},{"num":138,"answer":"D","stem":"一位72歲男性病人,突然因意識混亂(confusion)被家人送至急診室。生命徵象(TPR與血壓)大致穩定,並 沒有局部神經學徵象。初步抽血檢查發現血清鈣數值3.55 mmole/L (14.2 mg/dL),BUN與Cre數值輕微上 升。胸部X光攝影(CXR)發現兩側肺野有多發肺結節(nodules),高度懷疑是轉移的惡性腫瘤。之後的實驗 室檢查顯示PTH-rP (parathyroid hormone-related protein)數值明顯上升。下列的高血鈣症之處置,何者 最不適宜?","options":{"A":"Normal saline。","B":"Furosemide。","C":"Calcitonin。","D":"Prednisolone。","E":"Pamidronate。"},"id":"113-138","roc_year":113,"source":"113合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":138,"src":"113合併卷"},{"num":100,"answer":"C","stem":"下列有關副甲狀腺及高血鈣的描述哪一項最正確?","options":{"A":"副甲狀腺荷爾蒙(parathyroid hormone, PTH) 含84個胺基酸,其碳端(carboxyl-terminal portion) 之34個胺基酸(PTH 1-34) 具生物活性。","B":"抑鈣激素(calcitonin) 可以抑制成骨細胞(osteoblast) 的骨生成(bone formation),也可以刺激腎臟的鈣 排出(renal clearance)。","C":"甲狀腺功能亢進 (hyperthyroidism)、thiazides利尿劑、維他命A或D 中毒、鋰鹽(lithium)、脂肪溶 解(fat necrosis)等,均可能造成高血鈣(hypercalcemia)。","D":"副甲狀腺素相關胜肽(parathyroid hormone related peptide, PTHrP)可以結合並活化副甲狀腺荷爾蒙 第二型接合器(PTH-2 receptor),但無法活化副甲狀腺荷爾蒙第一型接合器(PTH-1 receptor)。","E":"一位58歲男性病人兩年前被診斷有無症狀原發性副甲狀腺功能亢進(asymptomatic primary hyperparathyroidism)。他最近一次追蹤,血鈣高出正常值 0.8 mg/dL、肌酸軒廓清(creatinine clearance) 為65 mL/min、腰椎骨密度(lumbar spine bone mineral density) T score 為 -2.0。應該建 議他接受副甲狀腺切除手術治療。"},"id":"114-100","roc_year":114,"source":"114合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":100,"src":"114合併卷"},{"num":104,"answer":"B","stem":"下列有關骨質疏鬆(osteoporosis)的描述,哪一項最正確?","options":{"A":"年紀大、男性、白種人、吸菸、喝酒(alcoholism) 等都會增加骨質疏鬆骨折的風險。","B":"庫欣氏症候群、副甲狀腺功能亢進、甲狀腺功能亢進、腎上腺功能不足、肢端肥大症、泌乳激素增加 等內分泌疾病都會增加骨質疏鬆的風險。","C":"Cyclosporine、aluminum、heparin 等藥物會增加骨質疏鬆的風險,而 lithium 可以減少骨質疏鬆風 險。","D":"骨密度(bone mineral density)檢查,”Z-score” 是與同種族、性別的年輕人相較,而”T-score”是與同 年紀、性別的人相較。","E":"臨床上可用serum osteocalcin做為骨生成(bone formation)的生化指標(biochemical marker),而serum bone-specific alkaline phosphatase則是骨吸收(bone resorption)的生化指標。"},"id":"114-104","roc_year":114,"source":"114合併PDF","topic":"副甲狀腺、鈣磷與骨質疏鬆","topic_code":"E5","topic_num":5,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":104,"src":"114合併卷"},{"num":6,"answer":"C","stem":"有一45歲男性農夫,因倦怠、體重減輕來診,病人過去病史有B型肝炎,身體檢查身高180公分,體重102公斤,血壓136/83 mmHg、脈搏 88/min,regular,口腔黏膜、手指關節及手掌紋有黑色沈積,頸、胸、腹檢查無特別異常,抽血檢查Na 138 mM、K 4.5 mM、Cl 104 mM、Ca 2.27 mM、P 4.4 mg/dl、GOT 30 U/L、GPT 56 U/L,試問哪一項檢查對診斷較佳?","options":{"A":"腹部超音波","B":"腹部電腦斷層","C":"8 AM ACTH,cortisol血漿濃度","D":"血清ceruloplasmin","E":"血糖、糖化血色素"},"id":"100-綜-6","roc_year":100,"source":"100舊站q5綜合卷","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":6,"src":"舊站綜合卷"},{"num":4,"answer":"B","stem":"55歲男性最近3個月開始有潮紅、流汗、呼吸困難之發作,起初很輕微,但近1個月來覺得加重,曾因上述症狀到過急診,但經症狀治療即恢復,三星期前還因懷疑急性盲腸炎開刀但症狀皆無改善,二天前內視鏡檢查發現十二指腸潰瘍、胃炎,腹超發現肝實質性疾病 ( parenchymal disease ) ,腹部電腦斷層發現右腎上腺有3.5 cm腫瘤,經內分泌檢查,cortisol、ACTH、catecholamine、aldosterone、plasma renin activity、 DHEAS皆為正常,請問您如何處置?","options":{"A":"此為無功能性腫瘤,可採症狀治療","B":"不論有無功能,照會開刀治療","C":"先照會精神科排除精神方面疾病","D":"此為男性更年期可給予雄性素治療","E":"6個月後再做腹部電腦斷層檢查"},"id":"106-綜-4","roc_year":106,"source":"106舊站q5綜合卷","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":4,"src":"舊站綜合卷"},{"num":79,"answer":"A","stem":"一位年輕女性,有頑固性高血壓,需同時使用以下多種降血壓藥物。醫師因懷疑是次發性高血壓,欲檢 查renin-angiotensin-aldosterone system。檢查前可以保留使用以下何種藥物,而暫停其他的,才能夠局 部控制血壓,又不致影響檢查結果與判讀? (1) Alpha-blocker, 如: prazosin (2) Beta-blocker, 如: propranolol (3) Calcium channel blocker, 如: nifedipine (4) Diuretics, 如: aldosterone antagonists (5) ACEI (angiotensin- converting enzyme inhibitors), 如: ramipril","options":{"A":"(1)+(3)","B":"(1)+(5)","C":"(1)+(3)+(4)","D":"(2)+(3)+(4)","E":"(2)+(3)+(5)"},"id":"109-79","roc_year":109,"source":"109合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":79,"src":"109合併卷"},{"num":122,"answer":"D","stem":"一位35歲女性病人因為懷疑有庫欣氏症而接受腦垂體手術,但開刀三個月後,月亮臉,腹部紫色斑紋,倦 怠,上肢無力等症狀均未改善,腦垂體核磁共振未見明顯腫瘤,她的檢驗結果為 cortisol (8am) 28 ug/dL, 4pm 26 ug/dL, ACTH 96 pg/mL, K 2.8 mmol/L, LDH 864 U/L。請問哪一項檢查或處置最恰當?(參考值 cortisol (8sm) 5 ~25 ug/dL, cortisol (4pm) 2.5 ~12.5 ug/dL, ACTH 7.4 ~ 57.3 pg/mL, K 3.5 ~5.1 mmol/L, LDH 140 ~271 U/L)","options":{"A":"High dose dexamethasone suppression test","B":"追蹤, 三個月後再做一次腦垂體核磁共振","C":"雙側infeiror petrosal sinus sampling","D":"胸腹骨盆腔電腦斷層","E":"申請健保給付, 以 pasireotide 治療"},"id":"109-122","roc_year":109,"source":"109合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":122,"src":"109合併卷"},{"num":123,"answer":"D","stem":"一位49歲女性病人因為B型肝炎帶原追蹤腹部超音波發現有右側腎上腺腫瘤,腎上腺電腦斷層顯示腫瘤大 小為4公分, CT density 為10 HU。她的檢驗結果如下:cortisol (8am) 16.0 ug/dL, cortisol (4pm) 12.2 ug/dL, ACTH 13.7 pg/mL, aldosterone 18 ng/dL, plasma renin activity 0.95 ng/mL/hr, urine VMA 4.7 mg/24hr, urine dopamine 254.5 ug/24 hr, urine epinephrine 9.3 ug/24hr, urine norepinephrine 83.5 ug/24hr。請問以下哪一項敘述正確?(參考值; cortisol (8am) 5.0~25.0 ug/dL, cortisol (4pm) 2.5~12.5 ug/dL, ACTH 7.4~57.3 pg/mL, plasma renin activity 1~5 ng/mL/hr, aldosterone 5~30 ng/dL, urine dopamine 50~450 ug/24 hr, urine epinephrine < 22.4 ug/24hr, urine norepinephrine 12.1~85.5 ug/24hr, urine VMA 1~7 mg/24hr)","options":{"A":"絕大多數單側腎上腺腫瘤為分泌cortisol的良性腫瘤","B":"此病人應該優先考慮primary aldosteronism","C":"使用利尿劑或三環抗憂鬱藥物可能引起urine catecholamine 假性偏低","D":"應該加測17-hydroxyprogesterone 及DHEAS","E":"建議手術切除此腎上腺腫瘤"},"id":"109-123","roc_year":109,"source":"109合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":123,"src":"109合併卷"},{"num":100,"answer":"B","stem":"一位58歲女性病人,有糖尿病、高血壓及骨質疏鬆病史。她有皮下瘀青、腹部紫色斑紋。檢驗發現皮質 醇(cortisol)8 am 20.86 μg/dL、4 pm 20.97 μg/dL;腎上腺皮質激素(ACTH)8 am <5 pg/mL,電腦 斷層顯示左側腎上腺有3.3公分的腫瘤,如果安排左側腎上腺切除,下列哪一個描述最適當? (參考值: cortisol: 8 am 5.77~22.45 μg/dL、4 pm 3.44-16.9 μg/dL ; ACTH; 7.9~47.1 pg/mL )","options":{"A":"此病人術前的cortisol沒有增高,因此左側腎上腺切除術後不須給予hydrocortisone。","B":"庫欣氏症候群可能增加深部靜脈栓塞或肺栓塞的風險。","C":"庫欣氏症候群在給予適當的治療後,hypothalamus-pituitary-adrenal (HPA) axis恢復正常的機會因為 病因不同會有差別。一般而言,腎上腺腫瘤造成的庫欣氏症候群在腎上腺腫瘤切除後,其HPA axis恢復正常的比率為80%,遠高於ectopic ACTH syndrome 或Cushing’s disease治療後 HPA axis 恢復正常的比率。","D":"病人接受腎上腺腫瘤切除術後,須增加降血壓及降血糖藥物劑量。","E":"庫欣氏症侯群的病人如果不適合手術,可以考慮使用metyraponec或ketoconazole。Mitotane 可以用 於治療腎上腺皮質癌,但不建議用於良性腎上腺腫瘤的庫欣氏症候群。"},"id":"110-100","roc_year":110,"source":"110合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":100,"src":"110合併卷"},{"num":102,"answer":"B","stem":"下列有關嗜鉻細胞瘤(pheochromocytoma)的描述,哪一項不正確?","options":{"A":"三環抗憂慮藥物(tricyclic antidepressants)及opiates都可能誘發高血壓、心悸、冒汗等症狀。","B":"嗜鉻細胞瘤約有5-10%是惡性的。如果有SDHC突變,最容易有轉移。","C":"嗜鉻細胞瘤的診斷,檢驗血中的free metanephrines 比檢驗血中的catecholamines 有更高的敏感性 及特異性。","D":"嗜鉻細胞瘤的手術檢體以免疫組織化學染色(immunohistochemistry)可以看到 有chromogranin、synaptophysin 的陽性反應。","E":"惡性嗜鉻細胞瘤合併轉移可以考慮用放射性核種(radionuclide)治療,例如 131I-MIBG 。"},"id":"110-102","roc_year":110,"source":"110合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":102,"src":"110合併卷"},{"num":103,"answer":"A","stem":"有關原發性皮質醛酮症(primary aldosteronism, PA) 的描述,以下哪一項不正確?","options":{"A":"Primary aldosteronism病人常表現高血壓及低血鉀,會增加糖尿病罹患率,但可以減少骨質疏鬆風 險。","B":"大多數的良性aldosterone-producing adenoma 通常小於2公分,年輕人有較大的腫瘤應該要小心是 否有惡性變化。","C":"Glucocorticoid-remediable aldosteronsim (GRA)有家族遺傳,可能會有早發性的高血壓及中風。使 用glucocorticoid 可以減少aldosterone的產生。","D":"檢測aldosterone 及renin 濃度前,應該先將血鉀調至正常範圍,並停用 minerocorticoid receptor antagonist 至少4週。","E":"使用thiazide治療其高血壓可能導致低血鉀惡化。"},"id":"110-103","roc_year":110,"source":"110合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":103,"src":"110合併卷"},{"num":99,"answer":"B","stem":"下列有關庫欣氏症候群(Cushing's syndrome)的描述,哪一項最正確?","options":{"A":"庫欣氏症候群病因不同,男女好發比例各異。其中,易位性庫欣氏症候群(ectopic ACTH syndrome)以女性居多;但腎上腺皮質腫瘤的,則以男性居多。","B":"在庫欣氏症候群的診斷流程中,低劑量dexamethasone 壓抑測試 (low dose dexamethasone suppression test),給予0.5 mg dexamethasone q6h 兩天後,如果血清中的cortisol 濃度低於 50 nmol/L,應該可以先排除庫欣氏症候群。","C":"40%庫欣氏症 (Cushing's disease)病人的腦垂體腫瘤大於1公分。","D":"庫欣氏症候群的病人通常白血球數下降,且嗜鹼性細胞(basophil)增加。","E":"庫欣氏症的病人有高凝血(hypercoagulation),肺栓塞(pulmonary embolism)的風險增加,但深部靜 脈栓塞(deep vein thromobosis)的風險並未增加。"},"id":"111-99","roc_year":111,"source":"111合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["B"],"correction_note":"","q_num":99,"src":"111合併卷"},{"num":100,"answer":"E","stem":"下列有關於原發性醛固酮症(primary aldosteronism, PA)的描述,哪一項最正確?","options":{"A":"PA的病人可能增加骨質疏鬆、糖尿病、認知障礙等疾病風險,也可能使cortisol的分泌減少。","B":"PA的鑑別診斷過程中,檢測醛固酮/腎素比值(aldosterone/renin ratio, ARR)時, 除了需要停 用spironolactone 4週外,可以持續原有的血壓藥。但因為β-blocker可能使ARR下降,因此若檢測結 果不確定(equivocal)時,最好停用β-blocker兩週後再重複測量一次。","C":"生理食鹽水靜注測試(saline infusion test),在4小時內靜脈輸注2公升生理食鹽水後,aldosterone濃 度為280 pmol/L (10 ng/dL)可排除PA。","D":"腎上腺靜脈取樣(adrenal vein sampling)時,如果右、左腎上腺靜脈中的aldosterone/cortisone濃度比 差距為1.8,可採信是右腎上腺造成PA。","E":"糖皮質類固醇可抑制性醛固酮增多症(glucocorticoid remediable aldosteronism, GRA)應先以低劑 量dexamethasone控制血壓。若需要,可加上醛固酮受體拮抗劑。"},"id":"111-100","roc_year":111,"source":"111合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["E"],"correction_note":"","q_num":100,"src":"111合併卷"},{"num":101,"answer":"A","stem":"嗜鉻細胞瘤 (pheochromocytoma) 被視為“偉大的偽裝者(the great masquerader)”,以下哪一項描述最正 確?","options":{"A":"嗜鉻細胞瘤的症狀包括高血壓及陣發性的心悸、冒汗、頭痛等。通常其症狀明顯,但也有某些病人可 以無症狀達數年之久。","B":"嗜鉻細胞瘤的症狀發作頻率不定,但每次發作時間通常大於兩小時。","C":"三環抗憂鬱藥(tricyclic antidepressants)、opiates、metoclopramide等藥會減少嗜鉻細胞瘤的症狀表 現,延緩診斷。","D":"病人懷疑有嗜鉻細胞瘤需要做電腦斷層或核磁共振等影像學檢查時,為減少刺激,最好不要施打顯影 劑。","E":"與其他檢驗方式比較,檢測血中的metanephrine 具有高敏感度,但因很容易受到靜脈穿 刺(venipuncture)等壓力影響,而有較高的偽陽性。"},"id":"111-101","roc_year":111,"source":"111合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":101,"src":"111合併卷"},{"num":98,"answer":"C","stem":"腎上腺皮質刺激素依賴型庫欣氏症候群(ACTH-dependent Cushing's syndrome)的病因包括腦垂 體ACTH分泌瘤(以下簡稱腦垂體瘤)或異位性 ACTH(以下簡稱異位性),下列有關其鑑別診斷的描述, 那一 項正確?(1)腦垂體瘤男性多於女性;異位性女性多於男性。(2)腦垂體瘤的病程通常進展較緩慢;異位性通常 病程進展快且常見嚴重肌病變(myopathy)。(3)約有45%的腦垂體瘤病人血鉀濃度低於3.3 mEg/L;約 有55%的異位性病人血鉀濃度低於3.3 mEg/L。(4)雖然異位性病人的ACTH平均濃度約為腦垂體瘤病人 的8倍,但因為重疊性高,ACTH濃度仍無法區別這兩種病因。(5)下岩樣竇採樣(Inferior petrosal sinus sampling, IPSS)檢查時,腦垂體瘤病人可見基礎IPSS與周圍靜脈之ACTH值之比>2,,注射促腎上腺皮質 激素釋放激素(corticotropin releasing hormone, CRH)後,IPSS與周圍靜脈之ACTH 值之比>3。這個檢查 的敏感度>95%。","options":{"A":"(1)+(2)。","B":"(2)+(4)。","C":"(2)+(4)+(5)。","D":"(1)+(3)+(4)。","E":"(3)+(5)。"},"id":"112-98","roc_year":112,"source":"112合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["C"],"correction_note":"","q_num":98,"src":"112合併卷"},{"num":99,"answer":"D","stem":"原發性皮質醛酮症((primary aldosteronism), PA)的篩檢與診斷,哪一項最正確?(1)檢測皮質醛酮-腎素 比(aldosterone-to-renin ratio, ARR)前需先矯正低血鉀並停用spironolactone兩週。(2)乙型抑制 劑(β-Blockers)會使renin下降、aldosterone上升、ARR上升。初步的ARR若不確定(為equivcal result)時,最好停用β-Blockers二週後再重複檢測。(3)做生理食鹽水輸注測試(saline infusion test),在4小時內以靜脈輸注2L的生理食鹽水,若aldosterone為10ng/dL(280 pmol/L) 可以排除PA。(4)經 過ARR檢測、saline infsion test等confirmation tests確認有PA,若電腦斷層檢查發現有單側腎上腺腫瘤 時,小於40歲以下的病人最好再做腎上腺靜脈取樣檢查(adrenal vein sampling),而40歲以上病人應該建 議單側腎上腺切除。(5)經過ARR檢測、saline infusion test等confirmation tests確認有PA,若電腦斷層檢 查發現兩側腎上腺有小結節性增生(bilateral micronodular hyperplasia)應該使用鹽皮質激素受 體(mineralocorticoid recepter)抑制劑或鈉離子通道阻斷劑(sodium channel blocker)等藥物治療。","options":{"A":"(1)+(2)+(3)。","B":"(2)+(4)。","C":"(1)+(3)+(5)。","D":"(2)+(5)。","E":"(1)+(3)+(4)。"},"id":"112-99","roc_year":112,"source":"112合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["D"],"correction_note":"","q_num":99,"src":"112合併卷"},{"num":101,"answer":"A","stem":"有關嗜鉻細胞瘤(pheochromocytoma)的描述,下列哪一項不正確?","options":{"A":"測量血漿後腎上腺髓素(plasma metanephrine)濃度具有最高的敏感度,但比較有容易有因為靜脈抽 血的壓力造成的偽陽性(false positive)升高。","B":"嗜鉻細胞瘤常見的症狀包括陣發性頭痛、冒汗、心悸等。有些病人可以數年沒有症狀。","C":"三環抗憂鬱症(tricyclic antidepressants)及鴉片類藥物(opiates)都可能誘發嗜鉻細胞瘤的症狀發作。","D":"嗜鉻細胞瘤術前應該以α交感神經阻斷劑(α-adrenergic blockers)控制血壓;術中可以 用nitroprusside輸注控制高血壓。","E":"約有5-10%的嗜鉻細胞瘤是惡性的。手術檢體有細胞異型(cellular atypia)、有絲分裂(mitosis)、血管 或周圍組織侵犯(invasion)等特徵尚不足以診斷為惡性嗜鉻細胞瘤。有淋巴或遠處轉移的,才被認為 是惡性嗜鉻細胞瘤。"},"id":"112-101","roc_year":112,"source":"112合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"","answer_status":"normal","accepted_answers":["A"],"correction_note":"","q_num":101,"src":"112合併卷"},{"num":158,"answer":"D","stem":"27歲無病史女性,過去幾個月來被新診斷糖尿病和高血壓,問診和理學檢查發現近端肢體無力、臉部潮紅 和中央型肥胖,腹部有如照片所示皮疹(如圖),24小時free cortisol 3058 nmol (正常值 <160),ACTH偵測 不到,病人過去並無使用類固醇,請問下一步應該做以下哪項檢查?","options":{"A":"胸部電腦斷層。","B":"腦下垂體核磁共振。","C":"大腸鏡檢查。","D":"腎上腺電腦斷層。","E":"甲狀腺超音波。"},"id":"112-158","roc_year":112,"source":"112合併PDF","topic":"腎上腺疾病","topic_code":"E6","topic_num":6,"img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAJ8AsQDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqO
