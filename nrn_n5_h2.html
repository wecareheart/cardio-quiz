咽癌發生率"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"流行病學與生物統計","topic_num":"流行病學與生物統計","q_num":30,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"此暴露可能為健康事件的危險因子","B":"此暴露可能為健康事件的保護因子","C":"暴露組的鼻咽癌盛行率低於非暴露組的鼻咽癌盛行率","D":"暴露組的鼻咽癌發生率低於非暴露組的鼻咽癌發生率"},"img":""},{"id":"114170-N5-43","code":"114170","roc":"114","cat":"N5","catname":"精神科與社區衛生護理學","num":43,"stem":"目前我國1 至14 歲的兒童及青少年最主要的死因為何?","opts":{"A":"惡性腫瘤","B":"周產期畸形","C":"事故傷害","D":"染色體異常"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"流行病學與生物統計","topic_num":"流行病學與生物統計","q_num":43,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"惡性腫瘤","B":"周產期畸形","C":"事故傷害","D":"染色體異常"},"img":""},{"id":"115030-N5-28","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":28,"stem":"有關世代研究(cohort study)與病例對照研究(case-control study)敘述,下列何者最不適當?","opts":{"A":"兩者皆為縱貫法(longitudinal study)","B":"兩者皆可以計算發生率(incidence rate)","C":"世代研究可應用於因果關係的推論","D":"病例對照研究屬回溯性(retrospective)的設計"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"流行病學與生物統計","topic_num":"流行病學與生物統計","q_num":28,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"兩者皆為縱貫法(longitudinal study)","B":"兩者皆可以計算發生率(incidence rate)","C":"世代研究可應用於因果關係的推論","D":"病例對照研究屬回溯性(retrospective)的設計"},"img":""},{"id":"115030-N5-29","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":29,"stem":"下列何者可作為評估婦幼衛生保健工作成效之指標?1自然增加率 2嬰兒死亡率 3孕產婦死亡率 4社會增加率","opts":{"A":"僅12","B":"僅23","C":"僅123","D":"1234"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"流行病學與生物統計","topic_num":"流行病學與生物統計","q_num":29,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"僅12","B":"僅23","C":"僅123","D":"1234"},"img":""},{"id":"115030-N5-30","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":30,"stem":"有關篩檢工具信度(reliability)與效度(validity)的敘述,下列何者最不適當?","opts":{"A":"信度是指測量結果的一致性、穩定性及可靠性","B":"信度很高的工具,其效度一定高","C":"陽性預測值與陰性預測值會受到疾病盛行率的影響","D":"效度是視工具的特異度(specificity)及敏感度(sensitivity)來決定"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"流行病學與生物統計","topic_num":"流行病學與生物統計","q_num":30,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"信度是指測量結果的一致性、穩定性及可靠性","B":"信度很高的工具,其效度一定高","C":"陽性預測值與陰性預測值會受到疾病盛行率的影響","D":"效度是視工具的特異度(specificity)及敏感度(sensitivity)來決定"},"img":""}],E={"101030-N5-42":{"quick":"靜態生活型態者A疾病的發生率＝118÷880≈0.134。","detail":{"background":"發生率(累積發生率)＝「觀察期間「新發生個案數」÷「期初的「易感人口數(暴露人數)」」」。靜態生活型態者共880人，期間有118人罹患A疾病。故發生率＝118 ÷ 880 ≈ 0.134(約13.4%)。其他選項的計算不符。故 B 正確。發生率以「新發生個案÷期初易感人口」計算。","options":{"A":"0.155非118/880的結果。","B":"正確。118÷880≈0.134。","C":"0.045非正確計算。","D":"0.043非正確計算。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"101030-N5-46":{"quick":"平均餘命愈高代表＝醫療保健水準愈高。","detail":{"background":"平均餘命(life expectancy)愈高，代表一個國家(B)『「醫療保健水準愈高」(醫療、營養、衛生、生活水準提升，使人民活得更久)』。平均餘命是反映一個國家整體健康與發展水準的重要指標。人口金字塔型、人口增加率、出生死亡率與「平均餘命高」沒有「必然」的對應(平均餘命高的國家多為「高齡化、出生率低」)。故 B 正確。平均餘命高反映醫療保健與生活水準高。","options":{"A":"平均餘命高的國家人口組成多為高齡化(非金字塔型)。","B":"正確。平均餘命愈高，代表醫療保健水準愈高。","C":"人口增加率與平均餘命無必然對應。","D":"平均餘命高的國家多為「低出生率、低死亡率」。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"101030-N5-47":{"quick":"「致死率」的敘述「錯誤」者＝作為十大死因的排行依據。","detail":{"background":"致死率(case fatality rate，某病的死亡數÷該病的病例數)的敘述，「錯誤」者為(D)『「作為「十大死因」的排行依據」』——錯誤，十大死因是依「「死因別(原因別)死亡率」」排序，而非「致死率」。其他正確:A 致死率表示疾病的嚴重度;B 有助於評估疾病的治療預後;C 疾病狀態穩定時，致死率與發生率相乘可計算(死因別)死亡率。故本題選錯誤者為 D。十大死因依死因別死亡率排序，非致死率。","options":{"A":"致死率表示疾病的嚴重度，正確。","B":"有助於評估疾病的治療預後，正確。","C":"疾病穩定時，致死率×發生率可算死亡率，正確。","D":"正確(本題選錯誤者)。十大死因依死因別死亡率排序，非致死率。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"101030-N5-55":{"quick":"國家社會、經濟和衛生的綜合指標＝死因別死亡率。","detail":{"background":"最適合作為一個國家社會、經濟和衛生「綜合指標」的是(D)『「死因別(原因別)死亡率」——反映一個國家的「疾病型態、醫療水準、社會經濟發展」(如傳染病死亡率高反映落後、慢性病死亡率高反映已開發、可比較各國的健康狀態)』。週產期、孕產婦死亡率偏向「婦幼」面向;(註:嬰兒死亡率常被視為「婦幼衛生」的敏感指標。)依本題答案，死因別死亡率為國家社會經濟衛生的綜合指標。故 D 正確。","options":{"A":"週產期死亡率偏向婦幼/週產期的面向。","B":"嬰兒死亡率常作為婦幼衛生的敏感指標。","C":"孕產婦死亡率偏向婦幼/孕產的面向。","D":"正確。死因別死亡率反映疾病型態與社經衛生，是國家綜合指標。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"101110-N5-44":{"quick":"發生率與盛行率的應用：盛行率適合用來規劃醫療設備與人力配置。","detail":{"background":"發生率與盛行率的應用，正確的是(C)『「盛行率(某時點/期間「所有「現存(新+舊)」個案」)」適合用來「規劃醫療設備與人力配置」(因盛行率反映「現有的總病例負荷」，可據以配置照護資源)』。其他錯誤:A『「發生率」適合推估「舊個案」趨勢』錯誤(發生率是「新個案」);B『「盛行率」更適合做「致病因子」探討』錯誤(探討病因應用「「發生率」(新發生與暴露的關係)」);D『盛行率高的社區個案數「一定」多於盛行率低的社區』錯誤(個案數還取決於「人口數」)。故 C 正確。盛行率反映現有病例負荷，適合規劃醫療資源。","options":{"A":"發生率是新個案，非推估舊個案。","B":"探討致病因子應用發生率，非盛行率。","C":"正確。盛行率反映現有病例負荷，適合規劃醫療設備與人力。","D":"個案數還取決於人口數，非盛行率高就一定多。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"101110-N5-45":{"quick":"最能解釋一個國家「社會增加率」改變的＝人口移動增加。","detail":{"background":"一個國家的「社會增加率(社會增加＝遷入−遷出)」的改變，最能由(D)『「人口移動(遷入、遷出)增加」』來解釋——「社會增加」就是「「人口的「遷徙移動(移入移出)」」」造成的人口變化。平均壽命、生活環境、出生死亡(C 屬「「自然增加」」)是「自然增加」的相關因素，而非「社會增加」。故 D 正確。社會增加率反映人口的遷徙移動;自然增加率反映出生與死亡。","options":{"A":"平均壽命增加屬自然增加的相關因素。","B":"生活環境改善屬自然增加的相關因素。","C":"出生高於死亡是「自然增加」，非社會增加。","D":"正確。人口移動(遷入遷出)增加，最能解釋社會增加率的改變。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"101110-N5-50":{"quick":"依賴人口指數＝(0~14歲＋65歲以上)÷(15~64歲)≈34.05%。","detail":{"background":"依賴人口指數(扶養比)＝「「依賴人口(0~14歲幼年 ＋ 65歲以上老年)」÷「工作年齡人口(15~64歲)」×100%」。本題:幼年(0~4歲30 ＋ 5~14歲82)＝112;老年(65~74歲20 ＋ ≧75歲26)＝46;依賴人口＝112＋46＝158。工作年齡(15~44歲316 ＋ 45~49歲42 ＋ 50~64歲106)＝464。依賴人口指數＝158 ÷ 464 ×100% ≈ 34.05%。故 C 正確。","options":{"A":"17.75%非正確計算。","B":"20.89%非正確計算。","C":"正確。(112+46)÷464≈34.05%。","D":"36.94%非正確計算。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"102030-N5-41":{"quick":"子宮頸抹片篩檢的敏感度＝真陽性÷實際有病者＝40÷50＝80%。","detail":{"background":"敏感度(sensitivity)＝「真陽性 ÷ (真陽性 ＋ 偽陰性)＝真陽性 ÷ 「實際「有病」者總數」」。本題:實際有病(零期子宮頸癌)50人，其中診斷「確認陽性(真陽性)」40人(故偽陰性10人)。敏感度＝40 ÷ 50 ＝80%。故 A 正確。敏感度是「實際有病者中，被篩檢正確檢出(陽性)的比率」。","options":{"A":"正確。敏感度＝40÷50＝80%。","B":"93.3%非敏感度的計算(可能是陽性預測值等)。","C":"84%非敏感度的計算。","D":"90%非敏感度的計算。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"102030-N5-44":{"quick":"布袋、東石地區出現大量烏腳病個案＝地方性流行(endemic)。","detail":{"background":"臺灣布袋與東石地區(因飲用水含砷)出現「「特定地區」「長期、持續」存在「大量」個案」——此現象稱為(A)『「地方性流行(endemic，疾病「經常、持續」存在於「某特定地區/族群」)」』。大流行(pandemic)是跨國/全球大範圍;散發性流行(sporadic)是零星、不規則發生;「特定性流行」非標準名詞。烏腳病集中於特定地區持續發生，屬地方性流行。故 A 正確。","options":{"A":"正確。特定地區持續存在大量烏腳病個案，是地方性流行(endemic)。","B":"大流行(pandemic)是跨國/全球大範圍流行。","C":"散發性流行是零星、不規則發生。","D":"「特定性流行」非標準的流行病學名詞。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"102030-N5-48":{"quick":"找出少見傳染病的危險因子＝回溯性病例對照研究。","detail":{"background":"社區少數居民罹患「「少見」的傳染病」，要找出「可能的危險因子」——最適合(A)『「回溯性「病例對照研究(case-control study)」」:以「「已罹病者(病例)」與「未罹病者(對照)」」，回溯比較其過去的暴露，找出危險因子;「適合「罕見疾病」(可確保有足夠的病例)」』。前瞻性世代研究適合常見病、追蹤暴露到發病(罕見病須追蹤大量人、耗時);臨床實驗是介入研究;全面普查不適合找病因。故 A 正確。罕見疾病找危險因子適合用病例對照研究。","options":{"A":"正確。少見疾病找危險因子，適合回溯性病例對照研究。","B":"前瞻性世代研究適合常見病，罕見病須追蹤大量人、耗時。","C":"臨床實驗是介入性研究，非找危險因子。","D":"全面普查不適合找病因(且罕見病普查不符成本)。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"102030-N5-49":{"quick":"孕產婦死亡數÷該年活嬰總數＝孕產婦死亡率。","detail":{"background":"「一年內因各種產褥原因所致「孕產婦死亡數(懷孕期間或懷孕終止42天內)」÷「該年活嬰總數」」——代表(A)『「孕產婦死亡率(maternal mortality rate;反映孕產照護與婦幼衛生水準)」』。週產期死亡率是胎兒/新生兒;育齡婦女死亡率是育齡婦女整體;胎兒死亡率是胎兒。本題分子是「孕產婦死亡」、分母是「活嬰」，即孕產婦死亡率。故 A 正確。孕產婦死亡率＝孕產婦死亡數÷活產數。","options":{"A":"正確。孕產婦死亡數÷活嬰總數，是孕產婦死亡率。","B":"週產期死亡率是胎兒/新生兒的死亡。","C":"育齡婦女死亡率是育齡婦女整體的死亡。","D":"胎兒死亡率是胎兒的死亡。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"102110-N5-41":{"quick":"65歲以上的性比小於1＝65歲以上女性多於男性。","detail":{"background":"性比(sex ratio)＝「男性人數 ÷ 女性人數 ×100」(或男÷女)。「性比「小於1(男÷女<1)」」代表「「男性人數「少於」女性人數」」，即(D)『「65歲以上「女性多於男性」」』。(老年人口因女性平均餘命較長，常見女多於男、性比小於1。)故 D 正確。性比小於1表示女多於男。","options":{"A":"性比是「人數」的比值，非死亡人數。","B":"性比是「人數」的比值，非死亡人數。","C":"性比小於1是「女多於男」，非男多於女。","D":"正確。性比小於1，代表65歲以上女性多於男性。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"102110-N5-43":{"quick":"年初200人血糖過高(盛行率20%)；一年後新增的才算發生率。","detail":{"background":"A社區1000人，「年初」抽檢200人血糖過高、一年後250人過高。正確的是(A)『「第一次(年初)抽檢血糖過高的「盛行率」＝200 ÷ 1000 ＝20%(某時點所有現存個案÷總人口)」』。其他錯誤:B『第二次的「發生率」為25%』錯誤(250含「舊個案」，發生率應只算「新發生」的個案,須扣除原有的);C『總盛行率45%』錯誤(不能把兩次相加);D『發生率50%』錯誤。故 A 正確。盛行率＝某時點所有現存個案÷總人口(年初200/1000＝20%)。","options":{"A":"正確。年初200人過高的盛行率＝200/1000＝20%。","B":"250含舊個案，發生率須只算新發生的，非25%。","C":"不能把兩次盛行率相加，非45%。","D":"發生率非50%。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"102110-N5-44":{"quick":"直接標準化調整比較兩地死亡率的目的＝消除人口組成差異所產生的誤差。","detail":{"background":"以「直接標準化(direct standardization)」調整來比較甲、乙兩地的死亡率，其目的是(A)『「消除「人口組成(尤其年齡結構)差異」所產生的誤差(使兩地在「相同的標準人口結構」下比較，排除年齡等組成的干擾)」』。例如甲地老人多、死亡率自然高，直接標準化後才能公平比較。其他選項(降低死亡人數過少、調整為同一水平、減少老年人口干擾)的描述不精確。故 A 正確。標準化是為了消除人口組成(年齡結構)差異的干擾。","options":{"A":"正確。直接標準化是為了消除人口組成差異所產生的誤差。","B":"非為了降低死亡人數過少的干擾。","C":"「調整為同一水平」的描述不精確。","D":"是消除整體人口組成差異，非僅減少老年人口干擾。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"102110-N5-48":{"quick":"比較兩地婦女的生育能力＝年齡別生育率。","detail":{"background":"要「比較「兩地」婦女的「生育能力」」，最適合的是(B)『「年齡別生育率(age-specific fertility rate;消除兩地「育齡婦女「年齡結構」差異」的干擾，比較各年齡層的生育情形，較能公平比較生育能力)」』。一般生育率(總育齡婦女的生育率)會受年齡結構影響;毛繁殖率、淨繁殖率偏向人口替代/世代繁衍的衡量。比較「生育能力」宜用「年齡別生育率」(控制年齡)。故 B 正確。","options":{"A":"一般生育率會受育齡婦女年齡結構的影響。","B":"正確。年齡別生育率可控制年齡結構，適合比較生育能力。","C":"毛繁殖率偏向衡量人口的世代繁衍(女嬰)。","D":"淨繁殖率偏向衡量人口替代(扣除死亡)。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"102110-N5-73":{"quick":"「依賴人口指數」是以「比例(ratio)」方式呈現。","detail":{"background":"「依賴人口指數(扶養比)＝依賴人口(幼年＋老年)÷工作年齡人口」——是以(A)『「比例(ratio)」方式呈現(分子與分母是「兩個「互斥(不重疊)」的群體」相除;「分子「不」包含於分母」)』。分率(proportion)是「分子「包含於」分母(部分÷全體)」;比率(rate)含時間;百分比是×100。依賴人口指數的分子(依賴人口)與分母(工作年齡人口)互斥，故為比例(ratio)。故 A 正確。比例(ratio)是兩個互斥群體相除。","options":{"A":"正確。依賴人口指數的分子分母互斥，是比例(ratio)。","B":"分率(proportion)是分子包含於分母(部分÷全體)。","C":"比率(rate)含時間維度。","D":"百分比是分率/比例×100的表示。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"102110-N5-80":{"quick":"評估婦幼衛生保健工作成效的最佳指標＝嬰兒死亡率。","detail":{"background":"評估「婦幼衛生保健工作成效」的「最佳(最敏感)指標」是(C)『「嬰兒死亡率(infant mortality rate;對「醫療、營養、衛生、社會經濟」的變化「最敏感」，是反映婦幼衛生與國家健康水準的重要指標)」』。粗死亡率受人口年齡結構影響;孕產婦、新生兒死亡率雖也是婦幼指標，但「嬰兒死亡率」是評估婦幼衛生成效「最常用、最敏感」的指標。故 C 正確。嬰兒死亡率是婦幼衛生成效最敏感的指標。","options":{"A":"粗死亡率受人口年齡結構影響，非婦幼指標。","B":"孕產婦死亡率是婦幼指標，但嬰兒死亡率更敏感、最常用。","C":"正確。嬰兒死亡率是評估婦幼衛生成效的最佳指標。","D":"新生兒死亡率是婦幼指標，但嬰兒死亡率涵蓋更廣、最敏感。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"103030-N5-41":{"quick":"想知道某縣市癌症的地理分布＝描述性流行病學。","detail":{"background":"護理師想知道「某縣市癌症的「地理分布」狀況」——適合用(A)『「描述性流行病學(descriptive epidemiology;描述疾病在「人(person)、時(time)、地(place)」的「分布」，地理分布屬「地」的描述)」』。分析性流行病學是探討病因/危險因子(如病例對照、世代研究);實驗性流行病學、社區試驗是介入研究。「描述疾病的地理分布」屬描述性流行病學。故 A 正確。描述疾病在人、時、地的分布屬描述性流行病學。","options":{"A":"正確。描述癌症的地理分布，屬描述性流行病學。","B":"分析性流行病學是探討病因/危險因子。","C":"實驗性流行病學是介入研究。","D":"社區試驗是社區層級的介入研究。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"103030-N5-42":{"quick":"屬於「比例(ratio)」的生命統計指標＝依賴人口指數。","detail":{"background":"屬於「比例(ratio，分子分母「互斥、不重疊」)」的生命統計指標是(A)『「依賴人口指數(扶養比;依賴人口÷工作年齡人口，兩群體互斥)」』。十大死因是排序(非單一比值);嬰兒死亡率、總生育率是「比率(rate;分子包含於相關母群、含時間)」。「依賴人口指數」的分子(依賴人口)不包含於分母(工作人口)，故為比例(ratio)。故 A 正確(與前述同類題一致)。","options":{"A":"正確。依賴人口指數的分子分母互斥，是比例(ratio)。","B":"十大死因是排序，非單一的比值指標。","C":"嬰兒死亡率是比率(rate)。","D":"總生育率是比率(rate)。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"103030-N5-43":{"quick":"生命指數(Vital Index)＝出生數÷死亡數×100＝9÷5×100＝180%。","detail":{"background":"生命指數(Vital Index)＝「「出生數 ÷ 死亡數」×100%」(反映人口的自然增減趨勢，>100表示出生多於死亡、人口自然增加)。本題:出生總數9、死亡總數5。生命指數＝9 ÷ 5 ×100% ＝180%。故 C 正確。生命指數＝出生數÷死亡數×100;>100表示人口自然增加。","options":{"A":"80%非生命指數的計算。","B":"91.42%非生命指數的計算。","C":"正確。出生9÷死亡5×100＝180%。","D":"166.66%非正確計算。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"103030-N5-45":{"quick":"發生率與盛行率：發生率乃指調查期間「易感人口」中「新發生」個案所占的比率。","detail":{"background":"發生率與盛行率的正確敘述是(B)『「發生率」乃指「調查期間，「易感(暴露)人口」中「新發生」的個案所占的比率」』。其他錯誤:A『發生率乃指「所有人口中「所有個案」」所占比率』錯誤(那是「盛行率」的概念，且發生率分母是「易感人口」、分子是「新個案」);C『盛行率以「舊個案」為分子』錯誤(盛行率分子是「「所有現存(新＋舊)」個案」);D『盛行率以「新個案」為分子』錯誤(盛行率含新舊個案)。故 B 正確。發生率＝易感人口中的新發生個案;盛行率＝所有現存(新+舊)個案。","options":{"A":"「所有人口中所有個案」偏向盛行率，且發生率分母是易感人口、分子是新個案。","B":"正確。發生率＝易感人口中新發生個案所占的比率。","C":"盛行率分子是所有現存(新＋舊)個案，非僅舊個案。","D":"盛行率含新舊個案，非僅新個案。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"103030-N5-50":{"quick":"到戶政事務所可獲得社區的「人口群體特性」資料。","detail":{"background":"到「戶政事務所」可獲得社區的(B)『「人口群體特性(人口統計，如人口數、年齡、性別、婚姻、遷入遷出、出生死亡等)」』資料。衛生統計(A)由「衛生機關」提供;學校學生曠課(C)由「學校」提供;文化活動場次(D)由「文化機關」提供。戶政事務所掌管「人口登記」，故提供人口群體特性資料。故 B 正確。戶政事務所提供人口群體特性(人口統計)資料。","options":{"A":"衛生統計由衛生機關提供，非戶政。","B":"正確。戶政事務所提供人口群體特性資料。","C":"學生曠課情形由學校提供。","D":"文化活動場次由文化機關提供。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"103100-N5-45":{"quick":"國家社會、經濟和衛生政策的綜合指標＝原因別死亡率。","detail":{"background":"最適合作為國家社會、經濟和衛生政策「綜合指標」的是(C)『「原因別(死因別)死亡率(cause-specific mortality rate;反映一個國家的「疾病型態、醫療水準、社經發展」，可比較各國的健康狀態與政策成效)」』。盛行率是某病的現存病例;粗死亡率受年齡結構影響;致死率是某病的嚴重度。依本題答案，原因別死亡率為國家社經衛生政策的綜合指標。故 C 正確(與前述同類題一致)。","options":{"A":"盛行率是某病的現存病例比率。","B":"粗死亡率受人口年齡結構影響。","C":"正確。原因別死亡率反映疾病型態與社經衛生，是國家綜合指標。","D":"致死率是某病的嚴重度。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"103100-N5-46":{"quick":"2009年 H1N1 新型流感被 WHO 列為＝大流行(pandemic)。","detail":{"background":"2009年的 H1N1 新型流感「「跨國、全球大範圍」流行」——被世界衛生組織列為(D)『「大流行(pandemic;疾病在「全球/多國」大範圍、大量流行)」』。散發性流行(sporadic)是零星、不規則;連鎖傳染流行(progressive epidemic)是逐步傳播;(地方性流行 endemic 是特定地區持續存在)。H1N1 在全球大流行，故為 pandemic。故 D 正確。Pandemic 是跨國/全球的大流行。","options":{"A":"散發性流行是零星、不規則發生。","B":"連鎖傳染流行是逐步傳播的型態。","C":"(對照)地方性流行是特定地區持續存在。","D":"正確。H1N1 全球大範圍流行，是大流行(pandemic)。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"103100-N5-48":{"quick":"探討 VOCs 暴露與癌症的因果關係＝回溯性世代研究。","detail":{"background":"要探討「揮發性有機物(VOCs)暴露與「癌症發生」的「因果關係」」，最適合(D)『「回溯性世代研究(retrospective cohort study;依「過去的暴露(有無暴露 VOCs)」分組，追蹤(回溯)其後癌症的發生率，比較暴露組與非暴露組，可推論因果)」』。臨床試驗、社區介入是介入研究(不適合「致癌物」暴露，違反倫理);橫斷式研究(同時測暴露與疾病)無法確立時序、難推因果。世代研究(暴露在前、疾病在後)較能推論因果。故 D 正確。","options":{"A":"臨床試驗對致癌物暴露違反倫理，不可行。","B":"社區介入研究是介入性，不適合致癌物暴露。","C":"橫斷式研究無法確立時序，難推因果。","D":"正確。回溯性世代研究依過去暴露分組、追蹤疾病，可推因果。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"103100-N5-49":{"quick":"肝癌致死率＝因肝癌死亡數÷肝癌病患數＝30÷1000＝30‰。","detail":{"background":"致死率(case fatality rate)＝「「某病的死亡數」÷「該病的「病例數」」」。本題:因肝癌死亡30人、肝癌病患1000人。致死率＝30 ÷ 1000 ＝0.03 ＝30‰(或3%)。(注意分母是「肝癌病例數」而非總人口或總死亡數。)故 B 正確。致死率＝某病死亡數÷該病病例數＝30/1000＝30‰。","options":{"A":"3‰非正確(30/1000=30‰)。","B":"正確。30÷1000＝30‰。","C":"5%非正確計算。","D":"50%是「因肝癌死亡÷總死亡(30/500=6%)」之類，非致死率。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"103100-N5-62":{"quick":"水媒/環境疾病「錯誤」者＝有機汞污染會造成痛痛病。","detail":{"background":"水媒/環境污染疾病的敘述，「錯誤」者為(B)『「「有機汞」污染會造成「痛痛病」」』——錯誤，「「有機汞」污染造成的是「「水俁病(Minamata disease，神經損傷)」」;「「痛痛病(itai-itai)」是「「「鎘(cadmium)」」中毒(骨軟化、疼痛)」造成的」。其他正確:A 氟過多會形成斑齒症(氟斑牙);C 志賀氏桿菌污染會造成細菌性痢疾;D 砷污染會造成烏腳病。故本題選錯誤者為 B。有機汞→水俁病;鎘→痛痛病。","options":{"A":"氟過多會形成斑齒症(氟斑牙)，正確。","B":"正確(本題選錯誤者)。有機汞→水俁病;痛痛病是鎘中毒。","C":"志賀氏桿菌污染造成細菌性痢疾，正確。","D":"砷污染造成烏腳病，正確。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"104030-N5-44":{"quick":"粗出生率的分母＝該年年中全人口數。","detail":{"background":"粗出生率(crude birth rate)＝「「該年活產數」÷「該年「年中「全人口數」」」×1000」。故分母是(D)『「該年年中「全」人口數」』。其他錯誤:A 活嬰總數是「分子」;B 育齡婦女年中人口是「一般生育率」的分母;C 活嬰加死嬰是其他指標。粗出生率以「全人口」為分母。故 D 正確。粗出生率＝活產數÷年中全人口數×1000。","options":{"A":"活嬰總數是分子，非分母。","B":"育齡婦女年中人口是一般生育率的分母。","C":"活嬰加死嬰非粗出生率的分母。","D":"正確。粗出生率的分母是該年年中全人口數。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"104030-N5-45":{"quick":"比較核電廠員工癌症發生率，最適合的對照世代＝社區所有人口。","detail":{"background":"為了解「某核電廠員工」癌症發生率是否「高於整個社區族群」——最適合選擇的對照世代是(B)『「社區「所有」人口(作為一般族群的比較基準，看核電廠員工是否高於「一般人」)」』。其他不適合:A 其他核電廠員工(也可能有暴露，無法凸顯差異);C 員工家屬(可能有間接暴露/生活型態相似);D 社區中其他工廠員工(也可能有職業暴露)。要看「是否高於一般社區族群」，對照應是「社區所有人口」。故 B 正確。","options":{"A":"其他核電廠員工也可能有暴露，無法凸顯差異。","B":"正確。比較對象應為社區所有人口(一般族群)。","C":"員工家屬可能有間接暴露/相似生活型態。","D":"其他工廠員工也可能有職業暴露。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"104030-N5-47":{"quick":"十大死因是根據「死因別死亡率」排序。","detail":{"background":"十大死因是根據(A)『「死因別(原因別)死亡率(cause-specific mortality rate)」』排序——即「各種死因「分別」的死亡率」，由高到低排出前十大。疾病致死率是某病死亡÷該病病例;標準化死亡率是調整人口結構後的;年齡別死亡率是各年齡層的死亡率。十大死因依「死因別死亡率」排。故 A 正確(與前述同類題一致)。","options":{"A":"正確。十大死因根據死因別死亡率排序。","B":"致死率是某病死亡÷該病病例，非排死因。","C":"標準化死亡率是調整人口結構後的死亡率。","D":"年齡別死亡率是各年齡層的死亡率。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"104030-N5-48":{"quick":"一般生育率＝活產數÷15~49歲育齡婦女數＝25÷1000＝25‰。","detail":{"background":"一般生育率(general fertility rate)＝「「該年活產(活嬰)數」÷「「15~49歲(育齡)婦女」年中人口數」×1000」。本題:活嬰25人、15~49歲婦女1000人。一般生育率＝25 ÷ 1000 ×1000 ＝25(‰)。(注意分子用「活嬰」、分母用「育齡婦女」。)故 B 正確。一般生育率＝活產數÷育齡婦女數×1000＝25‰。","options":{"A":"20非正確計算。","B":"正確。活嬰25÷育齡婦女1000×1000＝25‰。","C":"30是「出生嬰兒(含死嬰)30」，但一般生育率用活嬰25。","D":"55非正確計算。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"104030-N5-50":{"quick":"全部參與者的A疾病發生率＝(40+118)÷(920+880)＝158÷1800≈0.088。","detail":{"background":"發生率＝「「新發生個案數」÷「期初的「易感人口總數」」」。本題「全部參與者」:新發病(40動態 ＋ 118靜態)＝158;易感人口總數(920動態 ＋ 880靜態)＝1800。發生率＝158 ÷ 1800 ≈ 0.088。故 C 正確。發生率＝總新病例÷總易感人口＝158/1800≈0.088。","options":{"A":"0.177非正確計算。","B":"0.134是「靜態者」的發生率(118/880)，非全部。","C":"正確。158÷1800≈0.088。","D":"0.043是「動態者」的發生率(40/920)，非全部。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"104100-N5-45":{"quick":"懷孕婦女及新生兒照顧是否良好的指標＝新生兒死亡率。","detail":{"background":"最適合作為「懷孕婦女及「新生兒」照顧是否良好」的指標是(B)『「新生兒死亡率(neonatal mortality rate，出生未滿28天的死亡;反映「妊娠、生產過程與新生兒早期照護」的品質，受先天因素、產科與新生兒照護影響)」』。嬰兒死亡率涵蓋整個嬰兒期(更廣);週產期死亡率含胎兒晚期;孕產婦死亡率針對母親。依本題答案，新生兒死亡率最能反映懷孕婦女及新生兒的照顧品質。故 B 正確。","options":{"A":"嬰兒死亡率涵蓋整個嬰兒期(0~1歲)，較廣。","B":"正確。新生兒死亡率反映妊娠、生產與新生兒早期照護品質。","C":"週產期死亡率含胎兒晚期至新生兒早期。","D":"孕產婦死亡率針對母親(孕產婦)的死亡。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"104100-N5-46":{"quick":"前瞻性世代研究的缺點(相較病例對照)＝追蹤對象容易流失。","detail":{"background":"與病例對照研究相較，前瞻性世代研究的「缺點」是(C)『「「追蹤對象容易流失(失訪)」(世代研究須「長期追蹤」大量對象，過程中對象易流失、耗時、耗費資源)」』。其他是世代研究的「優點(相較病例對照)」:A 暴露資料的時序「易」掌握(暴露在前);B 較「不易」發生回憶偏差(前瞻性收集);D 因果關係判別「較明確」。故 C 正確。世代研究的缺點是長期追蹤、對象易流失、耗時耗資。","options":{"A":"世代研究的暴露時序「易」掌握，是優點。","B":"世代研究前瞻收集、較不易回憶偏差，是優點。","C":"正確。世代研究須長期追蹤，對象容易流失，是缺點。","D":"世代研究的因果判別較明確，是優點。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"104100-N5-74":{"quick":"新生兒後期嬰兒死亡率的分母＝一年內活產總數。","detail":{"background":"新生兒後期嬰兒死亡率(後期新生兒/嬰兒死亡率)的計算，其「分母」為(A)『「一年內「活產(活嬰)總數」」』。嬰兒死亡相關的死亡率(嬰兒、新生兒、後期嬰兒死亡率)「分母多為「活產總數」」。其他選項(胎齡滿28週活產、未滿1週新生兒、全年中人口)非此指標的分母。故 A 正確。嬰兒/新生兒相關死亡率的分母是活產總數。","options":{"A":"正確。分母為一年內活產總數。","B":"胎齡滿28週活產是週產期指標的分母。","C":"未滿1週新生兒非此指標的分母。","D":"全年中人口是粗死亡率的分母。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"105030-N5-44":{"quick":"流感快篩：敏感度＝真陽性÷實際有病者＝36÷64。","detail":{"background":"此流感快篩:200人，陽性40(其中真陽性36、偽陽性4)、陰性160(其中真陰性132、偽陰性28)。正確的是(C)『「敏感度＝真陽性 ÷ (真陽性＋偽陰性)＝36 ÷ (36＋28)＝36 ÷ 64」(實際有病64人中，被正確檢出陽性的36人)』。其他錯誤:A 特異性應為「真陰性÷(真陰性＋偽陽性)＝132÷(132＋4)＝132/136」，非132/160;B 4/132非特異性;D 敏感度應為36/64(實際有病者)，非36/40(陽性者，那是陽性預測值)。故 C 正確。","options":{"A":"特異性應為132/136(真陰性÷實際無病)，非132/160。","B":"4/132非特異性的計算。","C":"正確。敏感度＝36÷(36+28)＝36/64。","D":"36/40是陽性預測值(陽性者中真陽性)，非敏感度。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"105030-N5-45":{"quick":"病例對照研究最適合作為病例組的對象＝新發病者。","detail":{"background":"病例對照研究中，為探討危險因子與疾病的關係，最適合做為「病例組」的對象是(A)『「「新發病者(incident cases)」(新診斷的病例，其「暴露史較不受疾病進展/存活的影響」，較能反映「致病」的危險因子)」』。疾病復發者、久病未癒者(屬「盛行(prevalent)病例」，其暴露可能受疾病病程、存活影響，會有「存活偏差」);得病後行為驟變者也會混淆暴露的判定。故 A 正確。病例對照研究宜用新發病者，以減少存活/病程的偏差。","options":{"A":"正確。新發病者的暴露史較不受疾病進展影響，最適合做病例組。","B":"疾病復發者屬盛行病例，會有存活偏差。","C":"久病未癒者屬盛行病例，暴露受病程影響。","D":"得病後行為驟變者會混淆暴露的判定。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"105030-N5-67":{"quick":"臺灣人口現況「錯誤」者＝人口趨勢為標準化死亡率逐年升高。","detail":{"background":"臺灣人口現況的敘述，「錯誤」者為(A)『「人口趨勢為「標準化死亡率逐年「升高」」』——錯誤，臺灣的「「標準化死亡率(調整年齡結構後)是「逐年「下降」」(醫療衛生進步)」(「粗死亡率」雖因人口老化而上升，但「標準化」後是下降的)。其他正確:B 新移民課題日益重要;C 人口成長緩慢(甚至負成長);D 65歲以上人口占總人口的比率超過10%(已超過)。故本題選錯誤者為 A。標準化死亡率逐年下降，非升高。","options":{"A":"正確(本題選錯誤者)。標準化死亡率逐年下降，非升高。","B":"新移民課題日益重要，正確。","C":"人口成長緩慢，正確。","D":"65歲以上人口比率超過10%，正確。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"105030-N5-68":{"quick":"子宮頸癌：發生與人類乳突病毒(HPV)感染有關。","detail":{"background":"我國婦女子宮頸癌的正確描述是(B)『「子宮頸癌的發生與「人類乳突病毒(HPV)」感染有關(高危險型 HPV 持續感染是子宮頸癌的主要原因)」』。其他錯誤:A『近5年是婦女癌症死因「第一位」』錯誤(子宮頸癌因抹片篩檢已下降，非第一位;乳癌、肺癌等較前);C『為「新婚婦女」注射嘉喜疫苗可預防』不精確(HPV 疫苗應在「「青少年(性行為前)」」接種效果最佳);D『健保給付「25歲」以上每年免費抹片』錯誤(是「「30歲」」以上婦女)。故 B 正確。子宮頸癌與 HPV 感染有關。","options":{"A":"子宮頸癌因篩檢已下降，非婦女癌症死因第一位。","B":"正確。子宮頸癌的發生與 HPV 感染有關。","C":"HPV 疫苗應在青少年(性行為前)接種效果最佳。","D":"健保給付30歲以上婦女子宮頸抹片，非25歲。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"105090-N5-46":{"quick":"世代研究的特徵「錯誤」者＝為研究罕見疾病最經濟、省時的方法。","detail":{"background":"世代研究(cohort study)特徵的敘述，「錯誤」者為(D)『「為研究「罕見疾病」最「經濟、省時」的方法」』——錯誤，世代研究須「長期追蹤大量人」，「「罕見疾病」用世代研究「不經濟、耗時(須追蹤極大量人才有足夠病例)」」;「罕見疾病」應用「「病例對照研究」」。其他正確:A 可探討危險因子與疾病的關係;B 可計算危險因子的相對危險性(RR);C 提供觀察疾病自然史的機會。故本題選錯誤者為 D。罕見疾病用病例對照研究，非世代研究。","options":{"A":"可探討危險因子與疾病的關係，正確。","B":"可計算相對危險性(RR)，正確。","C":"提供觀察疾病自然史的機會，正確。","D":"正確(本題選錯誤者)。罕見疾病用病例對照研究，世代研究不經濟。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"105090-N5-47":{"quick":"判定因果關係的「必要條件」＝正確的時序性。","detail":{"background":"判定某危險因子與某疾病的因果關係，「「必要(不可或缺)」」的條件是(C)『「正確的「時序性(temporality;「因(暴露)」必須在「果(疾病)」「之前」)」」』——時序性是因果判定中「唯一「絕對必要」」的條件(因一定在果之前)。其他(A 劑量效應、B 相關特異性、D 符合生物知識)是「「支持(輔助)」」的條件，能「增強」因果推論，但「非絕對必要」。故 C 正確。時序性(因在果前)是因果判定的必要條件。","options":{"A":"劑量效應是支持因果的輔助條件，非絕對必要。","B":"相關的特異性是輔助條件，非必要。","C":"正確。正確的時序性(因在果前)是判定因果的必要條件。","D":"符合現存生物知識是輔助條件，非必要。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"105090-N5-50":{"quick":"動態生活型態者的A疾病發生率＝40÷920≈0.043。","detail":{"background":"發生率＝「新發生個案÷期初易感人口」。本題「動態生活型態者」:新發病40人、總人數(易感人口)920人。發生率＝40 ÷ 920 ≈ 0.043。故 D 正確。動態生活型態者的發生率＝40/920≈0.043。","options":{"A":"0.155非正確計算。","B":"0.134是靜態者的發生率(118/880)。","C":"0.045非正確計算。","D":"正確。40÷920≈0.043。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"106030-N5-44":{"quick":"因果關係的判斷「錯誤」者＝具高的相對危險性。","detail":{"background":"因果關係判斷的敘述，「錯誤」者為(B)『「具「高的相對危險性(RR)」」』——「關聯強度(高 RR)」雖能「支持」因果，但「「並非判定因果的「必備/絕對」條件」」(關聯強度大「不等於」因果，且 RR 高未必代表因果);相較之下，A 正確的時序性(必要條件)、C 符合現存的生物知識、D 呈現劑量效應關係，都是「公認的因果判定準則」。故本題以「高的相對危險性」為相對不嚴謹/錯誤的敘述(選 B)。(註:此為四選一的相對判斷;時序性才是必要條件。)","options":{"A":"具正確的時序性，是因果判定的必要條件。","B":"正確(本題選錯誤者)。高相對危險性是支持證據，非判定因果的必備條件。","C":"符合現存的生物知識，是因果判定的準則。","D":"呈現劑量效應關係，是因果判定的準則。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"106030-N5-45":{"quick":"第一次篩檢血膽固醇過高的盛行率＝250÷1000＝25%。","detail":{"background":"社區護理師對1000人篩檢，第一次250人血膽固醇過高。正確的是(A)『「第一次篩檢血膽固醇過高的「盛行率」＝250 ÷ 1000 ＝25%(某時點所有現存個案÷總人口)」』。其他錯誤:B『第二次的「發生率」為30%』錯誤(300含舊個案，發生率須只算新發生);C『「期盛行率」55%』錯誤(不能把兩次相加);D『發生率50%』錯誤。故 A 正確(與前述同類題一致)。盛行率＝某時點現存個案÷總人口＝250/1000＝25%。","options":{"A":"正確。第一次篩檢盛行率＝250/1000＝25%。","B":"300含舊個案，發生率須只算新發生，非30%。","C":"不能把兩次盛行率相加，非55%。","D":"發生率非50%。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"106030-N5-53":{"quick":"人口結構圖可提供「年齡層分布」的訊息。","detail":{"background":"社區評估時收集人口組成、繪製成「人口結構圖(人口金字塔)」——可提供(A)『「「年齡層(及性別)分布」(人口金字塔以年齡、性別呈現人口的組成結構)」』的訊息。社會增加率(遷徙)、自然增加率(出生死亡)、人口密度(人口÷面積)無法從「人口結構圖(年齡性別組成)」直接得知。故 A 正確。人口結構圖(金字塔)呈現年齡層與性別的分布。","options":{"A":"正確。人口結構圖(金字塔)提供年齡層(與性別)分布。","B":"社會增加率(遷徙)無法從人口結構圖直接得知。","C":"自然增加率(出生死亡)無法從人口結構圖直接得知。","D":"人口密度(人口÷面積)非人口結構圖呈現的訊息。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"106110-N5-45":{"quick":"登革熱：4/1點盛行率10%，4/1~6/1期間期盛行率＝(100舊+100新)÷1000＝20%。","detail":{"background":"某社區登革熱:4月1日調查1000人有100人已感染、6月1日同群又確認100人感染。正確的是(B)『「「期盛行率」＝(在這「一段期間(4/1~6/1)」內「所有(新＋舊)」的個案)÷總人口＝(100＋100)÷1000＝20%」』。其他:A『「點盛行率」20%』錯誤(4/1的「點」盛行率＝100/1000＝10%);C『「累積發生率」10%』需以「易感人口(900)」為分母(100新/900≈11%)，非10%;D『累積盛行率20%』非標準名詞。故 B 正確。期盛行率＝期間所有個案÷總人口。","options":{"A":"4/1的點盛行率＝100/1000＝10%，非20%。","B":"正確。期盛行率＝(100舊+100新)÷1000＝20%。","C":"累積發生率分母應為易感人口900(100/900≈11%)，非10%。","D":"「累積盛行率」非標準名詞。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"106110-N5-46":{"quick":"流行病學的「流行病」＝疾病的發生數目超過正常期望值。","detail":{"background":"流行病學中所謂的「流行病(epidemic)」，正確的是(B)『「疾病的發生數目「超過「正常期望值(預期的基準水準)」」」(在某時間、地點，某病的發生「明顯多於平常預期」即為流行)』。其他錯誤:A『比「前一年」多』不精確(須與「常態期望值」比，非僅與前一年比);C『超過「所有存在的病例數」』語意不通;D『死亡人數超過過去』不精確。故 B 正確。流行病是疾病發生超過正常期望值。","options":{"A":"須與常態期望值比，非僅與前一年比。","B":"正確。疾病發生數目超過正常期望值，即為流行病。","C":"「超過所有存在的病例數」語意不通。","D":"「死亡超過過去」不精確。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"106110-N5-62":{"quick":"生命統計中「不屬於」比例(ratio)者＝發生率。","detail":{"background":"生命統計中常用的「比例(ratio，分子分母「互斥」)」，「不包含」者為(D)『「發生率」』——發生率是「「比率(rate;含時間、分子包含於相關母群)」」，而非「比例(ratio)」。其他屬於比例(ratio):A 性別比(男÷女)、B 扶老比(老年÷工作年齡)、C 依賴人口指數(依賴÷工作年齡)，這些的分子分母都「互斥」。故本題選不包含者為 D。發生率是比率(rate)，非比例(ratio)。","options":{"A":"性別比(男÷女)是比例(ratio)。","B":"扶老比是比例(ratio)。","C":"依賴人口指數是比例(ratio)。","D":"正確(本題選不包含者)。發生率是比率(rate)，非比例(ratio)。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"106110-N5-63":{"quick":"平均餘命的敘述「錯誤」者＝為一項真實統計數值。","detail":{"background":"平均餘命(life expectancy)的敘述，「錯誤」者為(B)『「為一項「真實」統計數值」』——錯誤，平均餘命是「「「推估(估計)」值」」:「「假設「目前各年齡層的死亡率「維持不變」」，據以「推算」某年齡者「預期」還可再活的年數」」，並非「真實觀察到的數值」。其他正確:A 指假設目前各年齡層死亡率不變，該年各年齡層預期可再生存的年數;C 統計學上以「零歲的平均餘命(即平均壽命)」作比較;D 我國平均餘命逐年上升中。故本題選錯誤者為 B。平均餘命是推估值，非真實統計數值。","options":{"A":"假設死亡率不變、預期可再生存的年數，正確。","B":"正確(本題選錯誤者)。平均餘命是推估值，非真實統計數值。","C":"以零歲的平均餘命(平均壽命)作比較，正確。","D":"我國平均餘命逐年上升中，正確。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"106111-N5-42":{"quick":"探討「遺傳」與疾病的關係＝雙胞胎研究。","detail":{"background":"最適合探討「遺傳」與疾病關係的是(A)『「雙胞胎研究(twin study;比較「同卵(基因相同)」與「異卵(基因不同)」雙胞胎的疾病一致率，可「區分遺傳與環境的影響」)」』。移民比較研究偏向看「環境/生活型態」的改變;追蹤性研究是世代研究;國際比較是生態層次的比較。「分辨遺傳的影響」最適合雙胞胎研究。故 A 正確。雙胞胎研究可分離遺傳與環境的作用。","options":{"A":"正確。雙胞胎研究可分辨遺傳與環境的影響。","B":"移民比較研究偏向看環境/生活型態的改變。","C":"追蹤性研究(世代研究)是看暴露與疾病。","D":"國際間比較是生態層次的比較。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"106111-N5-56":{"quick":"生命指數(vital index)大於100，即代表人口正成長。","detail":{"background":"生命指數(vital index)＝出生數÷死亡數×100。當生命指數「大於(D)100」時，代表「「出生數「大於」死亡數」」，即該國為「「人口「正(自然)成長」國家」」。生命指數＝100表示出生等於死亡(自然增加為零);<100表示出生少於死亡(自然減少)。故 D 正確。生命指數>100表示人口自然正成長。","options":{"A":"1非生命指數的判準(生命指數是×100的)。","B":"10非判準。","C":"50表示出生遠少於死亡(負成長)。","D":"正確。生命指數>100，代表人口正成長。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"106111-N5-57":{"quick":"登革熱「巡、倒、清、刷」(清除孳生源)＝著重三角模式的「環境」因素。","detail":{"background":"依疾病致病「三角模式(病原、宿主、環境)」，民眾落實「巡、倒、清、刷(巡視、倒掉積水、清除容器、刷洗;「清除病媒蚊的孳生源」)」以預防登革熱——是著重於(B)『「環境」因素(改善「環境」中病媒蚊孳生的條件)』。致病原是登革病毒;宿主是人;遺傳非三角模式的因素。「清除孳生源(改善環境)」屬環境因素。故 B 正確。清除病媒蚊孳生源(巡倒清刷)是改善環境因素。","options":{"A":"致病原是登革病毒(病原體本身)。","B":"正確。清除孳生源(巡倒清刷)是改善環境因素。","C":"宿主是人(被感染的對象)。","D":"遺傳非疾病三角模式的因素。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"106111-N5-58":{"quick":"癌症篩檢工具：選擇篩檢工具時需「同時考量信度和效度」。","detail":{"background":"癌症篩檢工具的正確敘述是(C)『「選擇篩檢工具時需「同時考量「信度(可靠性、一致性)」與「效度(準確性、敏感度特異度)」」』。其他錯誤:A『篩檢結果陽性「即」表示確實罹患癌症』錯誤(篩檢陽性「須進一步「確診」」，篩檢非確診);B『「信度」很高表示「測量結果和真實情形一致」』錯誤(「與真實一致」是「「效度」」;信度是「「一致性/可重複性」」);D『好的篩檢工具信度和效度都需達「100%」』錯誤(實務上難達100%，且須在敏感度與特異度間權衡)。故 C 正確。","options":{"A":"篩檢陽性須進一步確診，非即表示罹癌。","B":"與真實一致是「效度」，信度是一致性/可重複性。","C":"正確。選擇篩檢工具需同時考量信度和效度。","D":"信效度難達100%，且須在敏感度與特異度間權衡。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"106111-N5-72":{"quick":"聯合國 SDGs：產婦死亡率少於十萬分之70、消除可預防的新生兒及5歲以下兒童死亡率。","detail":{"background":"聯合國2030永續發展目標(SDGs，目標3 健康與福祉)的正確敘述是(A)『「產婦死亡率「少於十萬分之70(每十萬活產<70)」、消除可預防的「新生兒及5歲以下兒童」死亡率」』。其他選項的數值/單位/年齡有誤(非「百萬分之」、非「7歲以下」、非「千萬分之」)。故 A 正確。SDG3:孕產婦死亡率<10萬分之70、降低5歲以下兒童死亡。","options":{"A":"正確。產婦死亡率<十萬分之70、消除可預防的新生兒及5歲以下兒童死亡。","B":"單位(百萬分之)、年齡(7歲)有誤。","C":"單位(百萬分之)有誤。","D":"單位(千萬分之)、年齡(7歲)有誤。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學","SDGs"]}},"107030-N5-53":{"quick":"發生率男性是女性5倍但盛行率無性別差異＝該疾病的致死率男性較女性高。","detail":{"background":"某病「發生率」男性是女性5倍，但「盛行率」在性別上無差異——最可能的原因是(B)『「該疾病的「致死率」男性較女性高(男性雖較多人「新發病(發生率高)」，但因「致死率高、很快死亡(病程短、存活時間短)」，使其「現存病例(盛行率)」並未累積較多，故盛行率反而與女性相當)」』。(盛行率≈發生率×病程;發生率高但病程短，盛行率可能不高。)其他選項無法同時解釋「發生率高但盛行率相同」。故 B 正確。","options":{"A":"男性接受治療比率高無法解釋此現象。","B":"正確。男性致死率高、病程短，故發生率高但盛行率未累積較多。","C":"「女性病程較短」會使女性盛行率更低，方向相反。","D":"危險因子比率高只解釋發生率高，無法解釋盛行率相同。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"107030-N5-54":{"quick":"標準化比率的描述「較不適當」者＝是運用統計方法、調整過「經濟結構」而來。","detail":{"background":"標準化比率的描述，「較不適當」者為(A)『「是運用統計方法，調整過「經濟結構」而來」』——錯誤，標準化比率是「調整「「人口結構(尤其「年齡」結構)」」」，而非「經濟結構」。其他適當:B 是一個「假想(虛擬)比率」(在假想的標準人口下計算);C 可用來做國與國之間的整體比較;D 為了比較兩個以上團體間的比率所推算出來的。故本題選較不適當者為 A。標準化是調整「人口(年齡)結構」，非經濟結構。","options":{"A":"正確(本題選較不適當者)。標準化是調整人口(年齡)結構，非經濟結構。","B":"是一個假想(虛擬)比率，正確。","C":"可用來做國與國之間的整體比較，正確。","D":"為比較兩個以上團體所推算的比率，正確。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"107030-N5-55":{"quick":"「不是」臺灣人口結構現況者＝人口性別比例>100(臺灣女多於男，性別比已<100)。","detail":{"background":"依2015衛福部年報，「「不是」臺灣人口結構現況」的是(D)『「青壯年比率「上升」」』——錯誤，臺灣「「青壯年(工作年齡)人口比率「下降」」(少子化+高齡化的結果)」。其他是臺灣人口結構的現況:A 幼年人口比率降低(少子化);B 人口性別比例>100(出生性別比男略多);C 老年人口比率上升(高齡化)。故本題選不是者為 D。臺灣青壯年比率下降，非上升。","options":{"A":"幼年人口比率降低(少子化)，是現況。","B":"正確(本題選不是者)。臺灣人口性別比例已<100(女性多於男性)，非>100。","C":"老年人口比率上升(高齡化)，是現況。","D":"青壯年比率(依該年報)仍為人口結構的描述之一，屬現況。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"107030-N5-67":{"quick":"評估婦幼衛生保健工作成效的最佳指標＝嬰兒死亡率(IMR)。","detail":{"background":"評估一個國家「婦幼衛生保健工作」實行成效的「最佳(最敏感)指標」是(A)『「嬰兒死亡率(Infant Mortality Rate, IMR;對醫療、營養、衛生、社經的變化「最敏感」，是反映婦幼衛生與國家健康水準的重要指標)」』。粗死亡率受年齡結構影響;新生兒、孕產婦死亡率雖也是婦幼指標，但「嬰兒死亡率」是評估婦幼衛生成效「最敏感、最常用」的指標。故 A 正確(與前述同類題一致)。","options":{"A":"正確。嬰兒死亡率是評估婦幼衛生成效的最佳(最敏感)指標。","B":"粗死亡率受年齡結構影響，非婦幼指標。","C":"新生兒死亡率是婦幼指標，但嬰兒死亡率涵蓋更廣、最敏感。","D":"孕產婦死亡率是婦幼指標，但嬰兒死亡率最敏感、最常用。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"107110-N5-41":{"quick":"15歲以上的性比小於100＝15歲以上女性多於男性。","detail":{"background":"性比(sex ratio)＝男性人數÷女性人數×100。「性比「小於100(男÷女<1)」」代表「「男性少於女性」」，即(D)『「15歲以上「女性多於男性」」』。性比是「人數」的比值，與死亡人數無關。故 D 正確。性比小於100表示女多於男(與前述同類題一致)。","options":{"A":"性比是人數的比值，非死亡人數。","B":"性比是人數的比值，非死亡人數。","C":"性比小於100是女多於男，非男多於女。","D":"正確。性比小於100，代表女性多於男性。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"107110-N5-42":{"quick":"病例對照 vs 世代研究的比較「錯誤」者＝世代研究較適合用於研究潛伏期較長的疾病。","detail":{"background":"病例對照研究與世代研究的比較，「錯誤」者為(B)『「世代研究較適合用於研究「潛伏期較長」的疾病」』——錯誤，「潛伏期長(或罕見)」的疾病「用世代研究須「追蹤太久、不經濟」」，「應用「「病例對照研究」」」(回溯過去暴露，較省時)。其他正確:A 世代研究的成本高於病例對照(須長期追蹤大量人);C 病例對照研究無法計算相對危險性(RR;只能算勝算比 OR);D 病例對照研究所用的樣本數相對較少。故本題選錯誤者為 B。潛伏期長/罕見的疾病用病例對照研究。","options":{"A":"世代研究的成本高於病例對照，正確。","B":"正確(本題選錯誤者)。潛伏期長的疾病用病例對照研究，非世代研究。","C":"病例對照研究無法計算 RR(只能算 OR)，正確。","D":"病例對照研究所用樣本數相對較少，正確。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"107110-N5-43":{"quick":"判定因果關係的「必要條件」＝正確的時序性。","detail":{"background":"應用流行病學方法判定因果關係時，「必要(否則無法成立)」的條件是(D)『「正確的「時序性(temporality;因「暴露」必須在「果(疾病)」之「前」)」」』——時序性是因果判定中「唯一「絕對必要」」的條件。其他(A 劑量效應、B 相關的一致性、C 符合現存生物知識)是「「支持(輔助)」」的條件，非絕對必要。故 D 正確(與前述同類題一致)。時序性(因在果前)是判定因果的必要條件。","options":{"A":"劑量效應是支持因果的輔助條件。","B":"相關的一致性是輔助條件。","C":"符合現存的生物知識是輔助條件。","D":"正確。正確的時序性是判定因果的必要條件。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"107110-N5-52":{"quick":"每1000位育齡婦女平均所生的「女嬰」數＝粗(毛)繁殖率(GRR)。","detail":{"background":"「每1000位育齡婦女平均所生的「「女嬰」」數」稱為(B)『「粗(毛)繁殖率(gross reproduction rate, GRR;只計算「女嬰」，用以衡量「下一代女性人口的補充」)」』。粗出生率是全人口的出生;一般生育率是育齡婦女所生的「所有」嬰兒;總生育率是一名婦女一生平均生育的「所有」子女數。只計「女嬰」者是粗繁殖率。故 B 正確。粗繁殖率只計女嬰(衡量女性人口的繁衍)。","options":{"A":"粗出生率是全人口的出生率。","B":"正確。每1000育齡婦女所生的女嬰數，是粗(毛)繁殖率。","C":"一般生育率是育齡婦女所生的所有嬰兒。","D":"總生育率是一名婦女一生平均生育的所有子女數。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"108110-N5-41":{"quick":"了解社區中罕見疾病的危險因子＝回溯性病例對照研究。","detail":{"background":"要了解社區中「罕見疾病」的危險因子，最適合(C)『「回溯性「病例對照研究」(以已罹病的「病例」與「對照」回溯比較其過去暴露;「適合「罕見疾病」(可確保足夠病例)、省時)」』。全面普查不適合找病因;臨床實驗是介入研究;前瞻性世代研究對罕見病須追蹤大量人、耗時。罕見疾病找危險因子用病例對照研究。故 C 正確(與前述同類題一致)。","options":{"A":"全面普查不適合找病因。","B":"臨床實驗研究是介入性研究。","C":"正確。罕見疾病找危險因子，適合回溯性病例對照研究。","D":"前瞻性世代研究對罕見病須追蹤大量人、耗時。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"108110-N5-42":{"quick":"比較國家公衛醫療進步最敏感、評估婦幼衛生成效的指標＝嬰兒死亡率。","detail":{"background":"用來比較國家「公共衛生與醫療進步「最敏感」」、並評估「婦幼衛生」工作推展成效的指標是(D)『「嬰兒死亡率(infant mortality rate;對醫療、營養、衛生、社經變化最敏感，是反映國家健康水準與婦幼衛生的重要指標)」』。癌症發生率反映癌症;粗出生率反映生育;疾病致死率反映某病的嚴重度。嬰兒死亡率是公衛/婦幼最敏感的指標。故 D 正確(與前述同類題一致)。","options":{"A":"癌症發生率反映癌症的發生。","B":"粗出生率反映生育情形。","C":"疾病致死率反映某病的嚴重度。","D":"正確。嬰兒死亡率是反映公衛進步與婦幼衛生最敏感的指標。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"108110-N5-43":{"quick":"標準化死亡率相同但 A 國粗死亡率較大＝A 國的老年人口較 B 國多。","detail":{"background":"A、B 兩國的「年齡標準化死亡率「相同」」(表示「在相同年齡結構下，兩國的死亡風險一樣」)，但 A 國的「粗死亡率「較大」」——最可能的原因是(A)『「A 國的「老年人口較 B 國「多」(年齡結構較老)」」』。因「粗死亡率」會受「年齡結構」影響:A 國老人多，故「未標準化的「粗」死亡率」較高;但「標準化(調整年齡)後」兩國相同，表示差異來自「年齡結構(老人多)」。故 A 正確。粗死亡率高但標準化後相同，表示 A 國人口較老。","options":{"A":"正確。A 國老年人口較多(人口較老)，故粗死亡率較高。","B":"A 國老年人口若較少，粗死亡率應較低，方向相反。","C":"性比與此現象無直接關係。","D":"性比與此現象無直接關係。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"108110-N5-61":{"quick":"臨床試驗：隨機分派是必要條件①、適合探討因果關係②(以團體/社區為對象③、缺點為回憶偏差④非)。","detail":{"background":"實驗流行病學中的臨床試驗(clinical trial)的正確敘述:(1)「「隨機分派(random assignment)」是必要條件」(隨機分配以平衡組間差異);(2)「適合探討「因果關係」(介入研究，因果證據力最強)」。而(3)『以「團體或社區」為研究對象』錯誤(那是「「社區試驗」」;臨床試驗以「個人」為對象);(4)『最大缺點為「回憶偏差」』錯誤(回憶偏差是「病例對照研究」的缺點;臨床試驗是前瞻介入、無回憶偏差)。故正確為①②(選 A)。","options":{"A":"正確。隨機分派是必要條件①、適合探討因果關係②。","B":"23：含③(社區為對象，那是社區試驗)，錯誤。","C":"34：含③④，皆錯。","D":"14：含④(回憶偏差，那是病例對照的缺點)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"108110-N5-62":{"quick":"病例對照研究：可算出勝算比(odds ratio)。","detail":{"background":"某研究找50位口腔癌患者(病例)及50位無口腔癌者(對照)，詢問嚼檳榔史——這是「病例對照研究」。正確的是(A)『「可算出「勝算比(odds ratio, OR)」(病例對照研究以勝算比估計關聯)」』。其他錯誤:B『可算出「相對危險性(RR)」』錯誤(病例對照「無法直接算 RR」，只能算 OR);C『可得到「發生率」』錯誤(病例對照「無法計算發生率」，因病例與對照的人數是研究者選定的);D『可提供「疾病自然史」』錯誤(病例對照是回溯的，無法觀察自然史)。故 A 正確。病例對照研究以勝算比(OR)估計關聯。","options":{"A":"正確。病例對照研究可算出勝算比(OR)。","B":"病例對照研究無法直接算相對危險性(RR)。","C":"病例對照研究無法計算發生率(人數是選定的)。","D":"病例對照研究是回溯的，無法提供疾病自然史。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"109030-N5-44":{"quick":"調查75歲以上腦中風死亡率，需收集：年中75歲以上總人口數②、全年75歲以上腦中風死亡人數④。","detail":{"background":"要了解社區中「「75歲以上」「腦中風」死亡率」，需調查:(2)「年中「75歲以上」總人口數(作「分母」)」;(4)「全年「75歲以上「腦中風」」死亡人數(作「分子」)」。死亡率＝(該特定年齡、特定死因的死亡數)÷(該特定年齡的年中人口數)。而(1)年中「總」人口、(3)全年75歲以上「總(各種死因)」死亡人數不符此特定指標。故正確為②④(選 C)。","options":{"A":"12：含①(總人口)③缺，不符。","B":"14：含①(總人口)，分母應為75歲以上人口。","C":"正確。年中75歲以上總人口②(分母)、全年75歲以上腦中風死亡④(分子)。","D":"34：含③(75歲以上總死亡)，分子應為腦中風死亡。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"109030-N5-46":{"quick":"流行病學研究法：世代研究(Cohort)可探討疾病的發生率。","detail":{"background":"流行病學研究法的正確描述是(A)『「世代研究(Cohort study)可探討疾病的「發生率(incidence)」(依暴露分組、前瞻追蹤新發病例，可計算發生率與相對危險性)」』。其他錯誤:B『生態研究法可計算「相對危險性(RR)」』錯誤(生態研究是「群體」層次，「不能」推論個體的 RR;有「生態謬誤」);C『橫斷研究法可探討「因果時序」』錯誤(橫斷研究同時測暴露與疾病，「無法確立時序」);D『病例對照法以「是否暴露」為起始點』錯誤(病例對照是以「「是否罹病(病例/對照)」」為起始點，再回溯暴露)。故 A 正確。","options":{"A":"正確。世代研究可探討疾病的發生率。","B":"生態研究是群體層次，不能計算個體的 RR(有生態謬誤)。","C":"橫斷研究同時測暴露與疾病，無法確立因果時序。","D":"病例對照以「是否罹病」為起始點，非是否暴露。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"109030-N5-47":{"quick":"A廠(敏感度90%)<B廠(敏感度97%)：A 廠可正確檢驗出的感染個案較 B 廠少。","detail":{"background":"A廠(敏感度90%、特異度95%)、B廠(敏感度97%、特異度86%)。「「敏感度」」是「實際「有病(感染)」者中被「正確檢出(陽性)」的比率」。A廠敏感度(90%)「低於」B廠(97%)，故(B)『「A 廠可「正確檢驗(檢出)」流感「感染」個案「較 B 廠「少」」(敏感度較低、漏掉較多感染者)』。其他錯誤:A 方向相反;C 「正確檢驗無感染者」看「特異度」，A(95%)「高於」B(86%)，故 A 較「多」(非較少);D 檢驗出感染者的能力主要看「敏感度」，已可比較(A<B)。故 B 正確。敏感度低→檢出感染者較少。","options":{"A":"方向相反(A 敏感度較低，檢出感染者較少)。","B":"正確。A 廠敏感度較低，檢出流感感染個案較 B 廠少。","C":"檢出無感染者看特異度，A(95%)高於 B(86%)，A 較多非較少。","D":"檢出感染者主要看敏感度(A<B)，已可比較。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"109030-N5-50":{"quick":"追蹤後相對危險性(RR)＝3.0：此暴露可能為健康事件的危險因子。","detail":{"background":"追蹤6年，暴露組(高二氧化硫)相對於非暴露組罹患過敏性鼻炎的「相對危險性(RR)＝3.0(>1)」——最合適的推論是(C)『「此暴露「可能為健康事件的「危險因子」」(RR>1 表示「暴露組的發病風險「高於」非暴露組」，暴露增加疾病風險)」』。其他錯誤:A『可能為「保護因子」』錯誤(保護因子的 RR<1);B『「不太可能」為危險因子』錯誤(RR=3 顯示是危險因子);D『暴露組發生率「低於」非暴露組』錯誤(RR=3 表示暴露組「較高」)。故 C 正確。RR>1表示暴露是危險因子。","options":{"A":"保護因子的 RR<1，非3.0。","B":"RR=3 顯示暴露是危險因子，非不太可能。","C":"正確。RR=3.0(>1)，此暴露可能為危險因子。","D":"RR=3 表示暴露組發生率較高，非較低。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"109030-N5-51":{"quick":"依賴人口指數的敘述「錯誤」者＝是一個比率(rate)。","detail":{"background":"依賴人口指數的敘述，「錯誤」者為(B)『「是一個「比率(rate)」」』——錯誤，依賴人口指數是「「比例(ratio;分子(依賴人口)與分母(工作年齡人口)「互斥」，分子不包含於分母)」」，而非「比率(rate;含時間)」。其他正確:A 又稱為扶養比(dependency ratio);C ＝扶老比＋扶幼比;D ＝(0~14歲人口＋65歲以上人口)÷(15~64歲人口)×100。故本題選錯誤者為 B。依賴人口指數是比例(ratio)，非比率(rate)。","options":{"A":"又稱為扶養比(dependency ratio)，正確。","B":"正確(本題選錯誤者)。依賴人口指數是比例(ratio)，非比率(rate)。","C":"＝扶老比＋扶幼比，正確。","D":"公式正確((0~14+65以上)÷(15~64)×100)。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"109110-N5-43":{"quick":"社會增加率＝遷入率−遷出率＝24‰−14‰＝10‰。","detail":{"background":"社會增加率＝「「遷入率 − 遷出率」」(人口因「遷徙移動」造成的增減)。本題:遷入率24‰、遷出率14‰。社會增加率＝24‰ − 14‰ ＝10‰。(註:粗出生率16‰、粗死亡率4‰是用來算「「自然」增加率(16−4＝12‰)」，與「社會」增加率無關。)故 A 正確。社會增加率＝遷入率−遷出率＝10‰。","options":{"A":"正確。社會增加率＝遷入24‰−遷出14‰＝10‰。","B":"12‰是「自然」增加率(出生16−死亡4)，非社會增加率。","C":"22‰非正確計算。","D":"40‰非正確計算。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"109110-N5-44":{"quick":"短時間得知慢性腎臟病的危險因子＝病例對照法。","detail":{"background":"要在「「短時間」內」得知18~65歲民眾發生慢性腎臟病的「危險因子」——最適合(D)『「病例對照法(case-control study;以「已罹病者(病例)」與「對照」回溯比較過去暴露，「省時、快速」，適合找危險因子)」』。生態研究是群體層次(有生態謬誤);橫斷研究無法確立時序;世代研究須「長期追蹤」(耗時)。要「短時間」找危險因子用病例對照法。故 D 正確。病例對照法回溯暴露、省時，適合短時間找危險因子。","options":{"A":"生態研究是群體層次，有生態謬誤。","B":"橫斷研究無法確立因果時序。","C":"世代研究須長期追蹤，耗時。","D":"正確。病例對照法回溯暴露、省時，可短時間得知危險因子。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"109110-N5-63":{"quick":"探討「慢性疾病」致病機轉「最不適合」的模式＝三角模式。","detail":{"background":"要探討「「慢性」疾病」的致病機轉，「最不適合」的致病模式是(C)『「三角模式(epidemiologic triangle)」』——三角模式(病原、宿主、環境)「最適合「「傳染病」(單一病原)」」;「慢性病是「多因子」造成」，宜用「「網狀模式(因果網)」、輪狀模式(強調宿主、環境、遺傳)、螺狀模式」等能呈現「多因子」的模式。故本題選最不適合者為 C。三角模式適合傳染病(單一病原)，慢性病(多因子)用網狀/輪狀模式。","options":{"A":"網狀模式(因果網)適合多因子的慢性病。","B":"輪狀模式強調宿主、環境、遺傳，適合慢性病。","C":"正確(本題選最不適合者)。三角模式適合傳染病，不適合多因子的慢性病。","D":"螺狀模式可呈現多因子的交互，適合慢性病。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"110030-N5-41":{"quick":"分析運用健康數據以監測社區計畫成效＝以實證為基礎的能力。","detail":{"background":"「熟悉流行病學與生命統計、「分析與運用健康數據」以「監測社區計畫成效」」——屬社區護理師的(D)『「以實證為基礎(evidence-based)的能力(運用數據、研究證據來評估、監測、改善實務與計畫)」』。社區群體家庭能力、個案照顧管理能力、管理能力是其他面向。「分析運用數據、監測成效」屬以實證為基礎的能力。故 D 正確。運用流病/統計數據監測成效是以實證為基礎的能力。","options":{"A":"社區、群體與家庭能力偏向對象層面的照護。","B":"個案照顧管理能力偏向個案管理。","C":"管理能力偏向行政管理。","D":"正確。分析運用健康數據監測成效，是以實證為基礎的能力。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"110030-N5-44":{"quick":"世代研究法：能描述疾病的自然史②、能探討因果關係③(罕見致癌因子①、訪談誤差④非)。","detail":{"background":"流行病學世代研究法(cohort study)較適當的是:(2)「能描述疾病的「自然史」(前瞻追蹤，可觀察疾病從暴露到發病的過程)」;(3)「能探討「因果關係」(暴露在前、疾病在後，時序明確)」。而(1)『適合研究「罕見」致癌因子』錯誤(罕見用「病例對照」;世代研究罕見病須追蹤大量人、不經濟);(4)『可能出現「訪談誤差(回憶偏差)」』錯誤(回憶偏差是「病例對照」的缺點;世代是前瞻收集、較無回憶偏差)。故正確為②③(選 C)。","options":{"A":"12：含①(罕見因子，應用病例對照)，錯誤。","B":"14：含①④，皆非世代研究的優點。","C":"正確。能描述疾病自然史②、能探討因果關係③。","D":"34：含④(訪談誤差，那是病例對照的缺點)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"110030-N5-49":{"quick":"本國居民與移居海外華僑的鼻咽癌比較＝較可能找出「環境因子」的影響。","detail":{"background":"以「本國居民」及「移居海外的華僑」進行鼻咽癌比較研究——較可能找出(D)『「環境(及生活型態)因子」的影響』。「移民研究」的原理:「「同一族群(遺傳相近)」，因「移居不同環境」而疾病率改變」，即可推論「「環境/生活型態」」的影響(若疾病率隨移居地改變，表示環境因子重要;若不變，表示遺傳因子重要)。本國 vs 海外華僑(遺傳相近、環境不同)，故凸顯環境因子。故 D 正確。移民研究凸顯環境/生活型態因子的影響。","options":{"A":"醫療因子非移民研究凸顯的重點。","B":"法規制度因子非移民研究凸顯的重點。","C":"遺傳因子在「遺傳相近」的同族群中差異小，非此設計凸顯的。","D":"正確。本國 vs 海外華僑(遺傳近、環境異)，凸顯環境因子。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"110030-N5-53":{"quick":"國際公認評估兒童健康的單一指標＝5歲以下兒童死亡率。","detail":{"background":"國際間公認用以評估「兒童健康」的「單一指標」是(A)『「5歲以下兒童死亡率(under-5 mortality rate, U5MR;WHO/UNICEF 用以評估兒童健康與發展的核心指標)」』。7歲、12歲、18歲以下兒童死亡率非國際公認的標準指標。故 A 正確。5歲以下兒童死亡率是國際公認評估兒童健康的單一指標。","options":{"A":"正確。5歲以下兒童死亡率是國際公認評估兒童健康的單一指標。","B":"7歲以下兒童死亡率非國際公認的標準指標。","C":"12歲以下兒童死亡率非國際公認的標準指標。","D":"18歲以下兒童死亡率非國際公認的標準指標。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學","SDGs"]}},"110110-N5-45":{"quick":"粗出生率＝活產數÷年中總人口×1000＝60÷3000×1000＝20‰。","detail":{"background":"粗出生率(CBR)＝「活產數 ÷ 年中「總」人口數 ×1000」。本題:活產60、總人口3000。CBR＝60 ÷ 3000 ×1000 ＝20‰。故 C 正確。粗出生率＝60/3000×1000＝20‰(分母用「總人口」)。","options":{"A":"150‰是「活產÷育齡婦女×1000(60/450×1000=133)」之類，非粗出生率。","B":"133‰是一般生育率(活產÷育齡婦女)，非粗出生率。","C":"正確。60÷3000×1000＝20‰。","D":"0.13‰非正確計算。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"110110-N5-46":{"quick":"一般生育率＝活產數÷15~49歲育齡婦女×1000＝60÷450×1000≈133‰。","detail":{"background":"一般生育率(GFR)＝「活產數 ÷ 「15~49歲(育齡)婦女」年中人口數 ×1000」。本題:活產60、育齡婦女450。GFR＝60 ÷ 450 ×1000 ≈ 133‰。故 B 正確。一般生育率＝60/450×1000≈133‰(分母用「育齡婦女」)。","options":{"A":"150‰非正確計算。","B":"正確。60÷450×1000≈133‰。","C":"20‰是粗出生率(活產÷總人口)，非一般生育率。","D":"0.13‰非正確計算。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"110110-N5-48":{"quick":"流行病學健康議題評估「正確」者＝某事件的發生率超過其正常期望值，即符合流行病的條件。","detail":{"background":"依流行病學方法，正確的是(D)『「某事件的發生率「超過其正常期望值」，即符合「流行病(epidemic)」的條件」』。其他錯誤:A『某社區的登革熱屬「地方性(endemic)」』錯誤(臺灣登革熱多為「「境外移入引發的「流行(epidemic)」」」，非「地方性持續存在」);B『烏腳病屬「大流行(pandemic)」』錯誤(烏腳病是「特定地區持續的「地方性(endemic)」」);C『食物中毒屬「散發性(sporadic)」』錯誤(食物中毒常是「「點流行/暴發(outbreak)」」，短時間多人發病)。故 D 正確。發生超過正常期望值即為流行病。","options":{"A":"臺灣登革熱多為境外移入引發的流行，非地方性。","B":"烏腳病是特定地區持續的地方性(endemic)，非大流行。","C":"食物中毒常是點流行/暴發，非散發性。","D":"正確。發生率超過正常期望值，即符合流行病的條件。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"110110-N5-49":{"quick":"糞便潛血篩檢：特異性＝真陰性÷實際無病＝350÷400＝87.5%。","detail":{"background":"某篩檢:460人，陽性80(真陽性30、偽陽性50)、陰性380(真陰性350、偽陰性30)。正確的是(B)『「特異性＝真陰性 ÷ (真陰性＋偽陽性)＝350 ÷ (350＋50)＝350/400 ＝87.5%」(實際無病400人中被正確檢出陰性的比率)』。其他錯誤:A 敏感度應為「真陽性÷實際有病＝30÷(30＋30)＝50%」，非37.5%;C 偽陽性率＝偽陽性÷實際無病＝50÷400＝12.5%，非50%;D 偽陰性率＝偽陰性÷實際有病＝30÷60＝50%，非12.5%。故 B 正確。","options":{"A":"敏感度應為30÷60＝50%，非37.5%。","B":"正確。特異性＝350÷400＝87.5%。","C":"偽陽性率＝50÷400＝12.5%，非50%。","D":"偽陰性率＝30÷60＝50%，非12.5%。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"111030-N5-45":{"quick":"最能反映一個國家經濟負擔狀況的指標＝依賴指數。","detail":{"background":"最能反映一個國家「經濟負擔」狀況的指標是(A)『「依賴指數(扶養比;依賴人口(幼年＋老年)÷工作年齡人口;反映「每位工作年齡者須扶養多少依賴人口」，數值越高表示「經濟負擔越重」)」』。平均餘命反映健康水準;社會增加率反映人口遷徙;孕產婦死亡率反映婦幼衛生。依賴指數直接反映「工作人口的扶養(經濟)負擔」。故 A 正確。依賴指數反映工作人口的扶養(經濟)負擔。","options":{"A":"正確。依賴指數反映工作人口的扶養(經濟)負擔。","B":"平均餘命反映健康水準。","C":"社會增加率反映人口遷徙。","D":"孕產婦死亡率反映婦幼衛生。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"111030-N5-46":{"quick":"探討罕見病例的危險因子＝病例對照法。","detail":{"background":"欲探討「罕見」病例的「危險因子」，最適當的是(D)『「病例對照法(case-control study;以已罹病的「病例」與「對照」回溯比較暴露;「適合「罕見」疾病(可確保足夠病例)、省時)」』。生態研究是群體層次(有生態謬誤);世代研究對罕見病須追蹤大量人、耗時;橫斷研究無法確立時序。罕見病例找危險因子用病例對照法。故 D 正確(與前述同類題一致)。","options":{"A":"生態研究是群體層次，有生態謬誤。","B":"世代研究對罕見病須追蹤大量人、耗時。","C":"橫斷研究無法確立因果時序。","D":"正確。罕見病例找危險因子，適合病例對照法。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"111030-N5-47":{"quick":"慢性腎病篩檢的敏感性＝真陽性÷實際有病＝20÷40＝50%。","detail":{"background":"敏感性(sensitivity)＝「真陽性 ÷ (真陽性＋偽陰性)＝真陽性 ÷ 「實際「有病」者總數」」。本題:實際有慢性腎病40人，其中篩檢「呈陽性(真陽性)」20人。敏感性＝20 ÷ 40 ＝50%。故 C 正確。敏感性＝20/40＝50%(實際有病者中被正確檢出陽性的比率)。","options":{"A":"20%非敏感性的計算。","B":"30%非敏感性的計算。","C":"正確。敏感性＝20÷40＝50%。","D":"87%非敏感性(可能是特異性140/160)。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"111110-N5-41":{"quick":"依賴指數的敘述「錯誤」者＝是指65歲以上老年人口占生產力人口的比例。","detail":{"background":"依賴指數的敘述，「錯誤」者為(B)『「是指「65歲以上「老年」人口」占生產力人口的比例」』——錯誤，依賴指數的「依賴人口」是「「幼年(0~14歲)「＋」老年(65歲以上)」」兩者，而非「只有老年」(只有老年者是「「扶老比」」)。其他正確:A 又稱扶養比;C 數值越高表示生產力人口的負擔愈重;D 生產力人口是指15~64歲人口。故本題選錯誤者為 B。依賴指數含「幼年＋老年」，非只老年。","options":{"A":"又稱扶養比，正確。","B":"正確(本題選錯誤者)。依賴指數含幼年+老年，非只老年(只老年是扶老比)。","C":"數值越高表示生產力人口的負擔愈重，正確。","D":"生產力人口是指15~64歲人口，正確。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"111110-N5-42":{"quick":"提升「宿主」抵抗力：注射疫苗②、攝取均衡飲食③、保持規律運動④(洗手①、噴酒精⑤是阻斷傳染途徑)。","detail":{"background":"依傳染病三角模式，要提升「「宿主」的抵抗力」:(2)注射疫苗(產生特異性免疫)、(3)攝取均衡飲食(增強體質)、(4)保持規律運動(增強免疫力)。而(1)離開醫院要洗手、(5)手部噴酒精，是「「阻斷「傳染途徑」(去除環境/媒介中的病原)」」，而非「提升宿主的抵抗力」。故提升宿主抵抗力為②③④(選 C)。","options":{"A":"123：含①(洗手，屬阻斷傳染途徑)，錯誤。","B":"125：含①⑤(洗手、噴酒精，皆阻斷途徑)，錯誤。","C":"正確。注射疫苗②、均衡飲食③、規律運動④，提升宿主抵抗力。","D":"345：含⑤(噴酒精，屬阻斷途徑)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"111110-N5-47":{"quick":"子宮頸癌篩檢的陽性預測值＝真陽性÷所有陽性＝500÷(500+1600)≈23.81%。","detail":{"background":"陽性預測值(PPV)＝「真陽性 ÷ (真陽性＋偽陽性)＝真陽性 ÷ 「所有篩檢「陽性」者」」。本題:真陽性500(癌個案中陽性)、偽陽性1600(健康者中陽性)。PPV＝500 ÷ (500＋1600)＝500/2100 ≈ 23.81%。故 B 正確。陽性預測值＝500/(500+1600)≈23.81%。","options":{"A":"20%非正確計算。","B":"正確。500÷(500+1600)≈23.81%。","C":"44.44%非陽性預測值的計算。","D":"50%非陽性預測值的計算。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"111110-N5-48":{"quick":"評估國家社經衛生政策規劃的綜合指標＝原因別死亡率。","detail":{"background":"可作為評估「國家、社會、經濟和衛生等政策規劃」的「綜合指標」是(C)『「原因別(死因別)死亡率(反映一個國家的疾病型態、醫療水準、社經發展;可比較各國的健康狀態與政策成效)」』。社會增加率反映遷徙;人口成長率反映人口增減;育齡婦女總生育率反映生育。依本題答案，原因別死亡率為國家社經衛生政策的綜合指標。故 C 正確(與前述同類題一致)。","options":{"A":"社會增加率反映人口遷徙。","B":"人口成長率反映人口增減。","C":"正確。原因別死亡率反映疾病型態與社經衛生，是綜合指標。","D":"育齡婦女總生育率反映生育情形。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"111110-N5-49":{"quick":"出血型登革熱病例中15~50%會死亡＝致死率。","detail":{"background":"「「出血型登革熱「病例」」中有15~50%「會死亡」」——15~50%代表(B)『「致死率(case fatality rate;「某病的「病例」中死亡的比率」，反映疾病的「嚴重度」)」』。死亡率(分母是「全人口」)、原因別死亡率(全人口中某死因的死亡)、死亡相對危險性(兩組死亡風險的比值)皆不符。「病例中死亡的比率」是致死率。故 B 正確。致死率＝某病病例中死亡的比率(反映疾病嚴重度)。","options":{"A":"死亡率的分母是全人口，非病例。","B":"正確。出血型登革熱病例中的死亡比率，是致死率。","C":"原因別死亡率的分母是全人口。","D":"死亡相對危險性是兩組死亡風險的比值。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"111110-N5-51":{"quick":"走街式(擋風玻璃)調查「較不適合」收集＝人口與生命統計的資料。","detail":{"background":"以「走街式(擋風玻璃式)調查」(實地巡視觀察)進行社區健康評估，「較不適合」用來收集(C)『「「人口與生命統計」的資料」』——人口與生命統計(人口數、出生死亡、年齡結構等)是「「數字統計」，須由「戶政/衛生統計」等「次級資料」取得」，「無法「用眼睛巡視觀察」得到」。其他可由走街式調查觀察:A 娛樂系統(公園、設施)、B 安全運輸系統(道路、交通、消防)、D 健康及社會服務(醫療機構、設施)。故 C 正確。走街式調查靠觀察，人口生命統計須查統計資料。","options":{"A":"娛樂系統(公園、設施)可由走街式調查觀察。","B":"安全運輸系統(道路、交通)可由走街式調查觀察。","C":"正確(本題選較不適合者)。人口與生命統計是數字資料，無法靠巡視觀察。","D":"健康及社會服務(醫療機構)可由走街式調查觀察。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"111110-N5-71":{"quick":"學校護理師應用流行病學進行校園評估的目的「最不適當」者＝用於教學器材設備管理。","detail":{"background":"學校護理師應用流行病學方法進行校園評估的目的，「最不適當」者為(C)『「用於「教學器材設備管理」」』——教學器材設備管理是「行政/總務」的工作，「與流行病學(研究疾病分布與成因)「無關」」。其他適當:A 用於疾病監測(監測校園傳染病/健康問題);B 瞭解校園環境中的危險因子;D 提供衛生教育宣導(依評估結果)。故本題選最不適當者為 C。教學器材設備管理與流行病學無關。","options":{"A":"用於疾病監測，是流行病學評估的目的。","B":"瞭解校園環境中危險因子，是流行病學評估的目的。","C":"正確(本題選最不適當者)。教學器材設備管理與流行病學無關。","D":"提供衛生教育宣導(依評估結果)，是流行病學評估的目的。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112030-N5-43":{"quick":"不同研究團隊都發現抽菸與肺癌有顯著關係＝因果判定的「相關的一致性」。","detail":{"background":"不同的研究團隊、在不同條件下，「結果「皆」發現抽菸與肺癌有顯著關係」——這是依據因果判定條件中的(C)『「相關的「一致性(consistency;不同研究、不同對象、不同方法「都得到一致的結果」，增強因果推論)」」』。相關的程度(強度)是關聯的大小;劑量效應是暴露越多風險越高;相關的特定性是特定暴露對特定疾病。「不同研究都一致」屬「一致性」。故 C 正確。不同研究都得到一致結果是「相關的一致性」。","options":{"A":"相關的程度(強度)是關聯的大小。","B":"劑量效應是暴露越多風險越高。","C":"正確。不同研究都得到一致結果，是相關的一致性。","D":"相關的特定性是特定暴露對應特定疾病。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112030-N5-46":{"quick":"流行病學研究方法「較不適宜」者＝世代研究的經費成本通常比病例對照研究低。","detail":{"background":"流行病學研究方法的敘述，「較不適宜」者為(D)『「世代研究法的經費成本「通常比病例對照研究「低」」』——錯誤，「世代研究須「長期追蹤大量人」，「成本「高於」病例對照研究」」。其他適宜:A 臨床試驗法能證明自變項與依變項的因果關係(介入研究);B 生態研究法是以「族群」為單位(非個人);C 橫斷性研究法較適用於「不會隨時間改變」的危險因子(如血型、基因)。故本題選較不適宜者為 D。世代研究的成本高於病例對照。","options":{"A":"臨床試驗能證明因果關係，正確。","B":"生態研究以族群為單位，正確。","C":"橫斷研究適用於不會隨時間改變的危險因子，正確。","D":"正確(本題選較不適宜者)。世代研究的成本高於病例對照，非較低。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112030-N5-47":{"quick":"三角致病模式的要素＝環境②、病原體③、宿主④(壓力①非)。","detail":{"background":"三角致病模式(epidemiologic triangle)的三要素是:(2)環境(environment)、(3)病原體(agent)、(4)宿主(host)。而(1)『「壓力」』「不是」三角模式的要素。故正確為②③④(選 D)。疾病三角模式的三要素是病原、宿主、環境。","options":{"A":"123：含①(壓力，非三角要素)，錯誤。","B":"124：含①、缺③，錯誤。","C":"134：含①，錯誤。","D":"正確。環境②、病原體③、宿主④是三角模式的三要素。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112030-N5-48":{"quick":"最能透過篩檢早期發現病理變化的疾病自然史階段＝症狀前期(presymptomatic stage)。","detail":{"background":"疾病自然史中，「最能透過「篩檢」「早期發現」身體「病理變化」」的階段是(C)『「症狀前期(stage of presymptomatic disease;「病理變化已開始、但「尚無臨床症狀」」，此期「篩檢」可早期發現，是「第二段預防(早期診斷)」的最佳時機)」』。易感受期尚未有病理變化(屬第一段預防);臨床期已有症狀;殘障期已造成失能。「無症狀但有病理變化」的症狀前期最適合篩檢。故 C 正確。症狀前期(無症狀但有病理變化)是篩檢早期發現的最佳階段。","options":{"A":"易感受期尚未有病理變化(屬第一段預防)。","B":"殘障期已造成失能(屬第三段預防)。","C":"正確。症狀前期(無症狀但有病理變化)最能透過篩檢早期發現。","D":"臨床期已有症狀，非「早期發現」。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112030-N5-49":{"quick":"收集1000肺癌與1000無肺癌探討空汙暴露＝病例對照法。","detail":{"background":"某研究「收集1000位「肺癌(病例)」及1000位「無肺癌(對照)」」，回溯探討「過去5年空汙暴露」與肺癌的關係——這是(A)『「病例對照法(case-control study;以「已罹病(病例)」與「未罹病(對照)」分組，「回溯」比較其過去的暴露)」』。世代研究是依「暴露」分組、追蹤疾病;生態研究是群體層次;橫斷研究是同時測。「依「疾病(有無肺癌)」分組、回溯暴露」是病例對照法。故 A 正確。","options":{"A":"正確。依疾病(有無肺癌)分組、回溯暴露，是病例對照法。","B":"世代研究是依「暴露」分組、追蹤疾病。","C":"生態研究是群體層次的相關研究。","D":"橫斷研究是同時測量暴露與疾病。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112030-N5-50":{"quick":"敏感度80%、特異度94%的篩檢：未罹患大腸癌者中，有94%被篩檢為陰性。","detail":{"background":"篩檢工具的「特異度(specificity)」＝「「實際「無病(未罹患)」者」中，被「正確篩檢為「陰性」」的比率」。本題特異度94%，即(C)『「「未罹患大腸癌」的個案中，有「94%」的人會被篩檢為「陰性」」』。其他錯誤:A『陽性個案中80%確診罹癌』是「「陽性預測值」」(非敏感度80%);B『參與者中80%確診無癌』語意不符;D『陰性個案中94%確診無癌』是「「陰性預測值」」(非特異度)。故 C 正確。特異度＝未罹病者中被正確篩為陰性的比率。","options":{"A":"「陽性中80%確診罹癌」是陽性預測值，非敏感度的定義。","B":"「參與者中80%確診無癌」語意不符。","C":"正確。特異度94%＝未罹患者中94%被篩檢為陰性。","D":"「陰性中94%確診無癌」是陰性預測值，非特異度。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112110-N5-46":{"quick":"篩檢工具：敏感度與特異度不變時，疾病盛行率愈高，陽性預測值愈高。","detail":{"background":"篩檢工具的正確敘述是(D)『「當工具的敏感度與特異度「不變」時，「疾病盛行率「愈高」，陽性預測值(PPV)「愈高」」(盛行率高→實際病人多→篩檢陽性者中真陽性比例增加)』。其他錯誤:A 敏感度與特異度代表篩檢工具的「「效度(準確性)」」，非信度;B『提高敏感度「也會同時提高」特異度』錯誤(敏感度與特異度是「「互相消長(trade-off)」」);C 陽性預測值是「篩檢「陽性」的人當中「真正罹病」的比率」，非「罹病者中篩陽的比率(那是敏感度)」。故 D 正確。","options":{"A":"敏感度與特異度代表效度(準確性)，非信度。","B":"敏感度與特異度互相消長，非同時提高。","C":"陽性預測值是篩陽者中罹病的比率，非罹病者中篩陽。","D":"正確。敏感度特異度不變時，盛行率愈高，陽性預測值愈高。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112110-N5-48":{"quick":"調查社區失智症失能盛行率，最適合用於規劃醫療設備及人力。","detail":{"background":"調查社區失智症失能的「「盛行率」」，最適合應用於(D)『「規劃醫療設備及人力(盛行率反映「現有的總病例負荷」，可據以配置照護資源)」』。推估死亡率、評估死亡原因、探討致病因子非盛行率的主要用途(探討病因應用「發生率」)。盛行率反映現有病例量，適合規劃資源。故 D 正確(與前述同類題一致)。","options":{"A":"推估死亡率非盛行率的用途。","B":"評估死亡原因非盛行率的用途。","C":"探討致病因子應用發生率，非盛行率。","D":"正確。盛行率反映現有病例量，適合規劃醫療設備及人力。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112110-N5-49":{"quick":"一段時間內某地區人口被「新診斷」出COVID-19的比率＝發生率。","detail":{"background":"欲了解「一段時間內，某地區人口群體被「「新診斷」」出 COVID-19」的比率——屬(B)『「發生率(incidence;某期間內「新發生」的病例÷易感人口)」』。盛行率是「某時點所有現存(新＋舊)」病例;死亡率是死亡;致死率是某病病例中的死亡。「新診斷」的病例屬發生率。故 B 正確。發生率＝期間內新發生(新診斷)的病例比率。","options":{"A":"盛行率是某時點所有現存(新+舊)病例。","B":"正確。新診斷出的病例比率，是發生率。","C":"死亡率是死亡的比率。","D":"致死率是某病病例中的死亡比率。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112110-N5-50":{"quick":"病例對照研究法：研究一開始已有個案。","detail":{"background":"病例對照研究法(case-control study)的正確敘述是(A)『「研究一開始「已有個案(以「已罹病的「病例」」與「對照」開始)」」』——病例對照是「先有「病例(已罹病者)」與「對照(未罹病者)」，再回溯比較暴露」。其他錯誤:B『適合用來探討「非罕見」疾病』錯誤(病例對照「適合「罕見」疾病」);C『對照組應採「隨機」取樣』不精確(對照應與病例「條件相近(配對)」，非單純隨機);D『可獲得疾病的「發生率」』錯誤(病例對照「無法計算發生率」)。故 A 正確。病例對照研究一開始即以已罹病的病例為對象。","options":{"A":"正確。病例對照研究一開始已有個案(病例)。","B":"病例對照適合罕見疾病，非非罕見疾病。","C":"對照應與病例條件相近(配對)，非單純隨機。","D":"病例對照無法獲得發生率。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112110-N5-51":{"quick":"社區健康評估方法「較不適當」者＝民意調查可用來收集衛生統計資料、判斷社區整體狀況。","detail":{"background":"社區健康評估方法的敘述，「較不適當」者為(C)『「「民意調查」可用來收集「衛生統計資料」、判斷社區整體社會的狀況」』——錯誤，「民意調查收集的是「民眾的「意見、態度」(主觀)」」，「「衛生統計資料(客觀的數字)」應由「戶政/衛生統計」等取得」，民意調查無法收集衛生統計資料。其他適當:A 走街式調查能收集社區生活型態及物理環境的機會;B 重要人物訪談的對象須包括各層級;D 參與式觀察可了解社區互動及溝通型態。故本題選較不適當者為 C。民意調查收集意見，非衛生統計資料。","options":{"A":"走街式調查能觀察社區生活型態與物理環境，適當。","B":"重要人物訪談須包括各層級以多角度了解，適當。","C":"正確(本題選較不適當者)。民意調查收集意見，非衛生統計資料。","D":"參與式觀察可了解社區互動及溝通型態，適當。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"112180-N5-29":{"quick":"新生兒死亡率＝一年內每1000個活產嬰兒中，出生未滿4週(28天)之死亡嬰兒數。","detail":{"background":"新生兒死亡率的正確敘述是(C)『「一年內，每1000個「活產嬰兒」中，「出生「未滿4週(28天)」」之死亡嬰兒人數」』——新生兒(neonatal)指「出生未滿28天(4週)」，分母用「活產數」。其他錯誤:A 分母用「年中人口」錯(應為活產);B『未滿「1歲」』是「「嬰兒」死亡率」，非新生兒;D『「滿4週至未滿1歲」』是「「後期新生兒/嬰兒後期」死亡率」。故 C 正確。新生兒死亡率＝活產中出生未滿28天的死亡數÷活產數×1000。","options":{"A":"分母應為活產數，非年中人口。","B":"「未滿1歲」是嬰兒死亡率，非新生兒。","C":"正確。每1000活產中出生未滿4週(28天)的死亡嬰兒數。","D":"「滿4週至未滿1歲」是後期嬰兒死亡率。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"112180-N5-30":{"quick":"糖尿病篩檢的敏感度＝真陽性÷實際有病＝16÷26。","detail":{"background":"敏感度＝「真陽性 ÷ (真陽性＋偽陰性)＝真陽性 ÷ 「實際「有病」者總數」」。本題:糖尿病人26人，其中篩檢「陽性(真陽性)」16人。敏感度＝16 ÷ 26。故 A 正確。敏感度＝16/26(實際有糖尿病者中被正確檢出陽性的比率)。","options":{"A":"正確。敏感度＝16÷26。","B":"10/26是偽陰性÷有病(漏掉的)，非敏感度。","C":"16/20非敏感度的計算。","D":"4/274是偽陽性÷無病，非敏感度。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"113030-N5-28":{"quick":"疾病發生率：可推算罹病的可能性或致病因子。","detail":{"background":"疾病發生率的最適當敘述是(C)『「可「推算罹病的可能性」或探討「致病因子」(發生率＝新發生個案÷易感人口，反映「新罹病的風險」，可用於探討病因)」』。其他錯誤:A『以「比例(ratio)」呈現』錯誤(發生率是「「比率(rate)」」);B『指某時間內族群中「現存」的病例數』錯誤(那是「盛行率」;發生率是「新發生」);D『最適合用來「規劃長期醫療設備、人力」』錯誤(那是「「盛行率」」的用途)。故 C 正確。發生率反映新罹病的風險，可探討致病因子。","options":{"A":"發生率是比率(rate)，非比例(ratio)。","B":"「現存病例」是盛行率，發生率是新發生。","C":"正確。發生率可推算罹病的可能性或致病因子。","D":"規劃長期設備、人力是盛行率的用途。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"113030-N5-29":{"quick":"探討懷孕用藥與胎兒畸型的因果關係＝世代追蹤研究法。","detail":{"background":"欲探討「婦女懷孕期間使用藥物」與「胎兒畸型」的「因果關係」——最合適的是(D)『「世代(追蹤)研究法(cohort study;依「孕婦有無用藥(暴露)」分組，「前瞻追蹤」其胎兒是否畸型，可推論因果)」』。臨床試驗「不可」對孕婦「給予可能致畸的藥物」(違反倫理);描述性調查、橫斷研究無法確立因果時序。對「不能做實驗(倫理)」的暴露，用世代追蹤研究。故 D 正確。","options":{"A":"臨床試驗對孕婦用藥(可能致畸)違反倫理，不可行。","B":"描述性調查法無法探討因果。","C":"橫斷式研究無法確立因果時序。","D":"正確。世代追蹤研究依用藥分組、追蹤胎兒，可推因果。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"113100-N5-28":{"quick":"篩檢工具效度：偽陽性率與偽陰性率是為了瞭解篩檢結果的錯誤率。","detail":{"background":"篩檢工具效度的最適當敘述是(D)『「偽陽性率與偽陰性率是為了「瞭解篩檢結果的「錯誤率」」(偽陽性＝無病卻被判陽性;偽陰性＝有病卻被判陰性)」』。其他錯誤:A『敏感度又稱為「真陰性」』錯誤(敏感度是「真陽性率」);B『特異性又稱為「真陽性」』錯誤(特異性是「真陰性率」);C『敏感度越高越好、「特異性越「低」越好」』錯誤(敏感度與特異度「都」要高，且兩者互相消長)。故 D 正確。偽陽性率、偽陰性率反映篩檢的錯誤率。","options":{"A":"敏感度是真陽性率，非真陰性。","B":"特異性是真陰性率，非真陽性。","C":"敏感度與特異度都要高，特異性非越低越好。","D":"正確。偽陽性率與偽陰性率是為了瞭解篩檢結果的錯誤率。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"113100-N5-29":{"quick":"疾病的流行情形：腸病毒屬於週期變動。","detail":{"background":"疾病流行情形的最適當敘述是(C)『「「腸病毒」屬於「週期變動(cyclic variation;有「季節性/週期性」的流行，如腸病毒夏季流行)」」』。其他錯誤:A『癌症是「短期」流行』錯誤(癌症是「「長期趨勢(secular trend)」」);B『食物中毒是「長期趨勢」』錯誤(食物中毒是「「短期暴發(outbreak)」」);D『產後憂鬱症是「週期變動」』錯誤(產後憂鬱與個人生育有關，非週期性流行)。故 C 正確。腸病毒有季節週期性，屬週期變動。","options":{"A":"癌症是長期趨勢(secular trend)，非短期流行。","B":"食物中毒是短期暴發，非長期趨勢。","C":"正確。腸病毒有季節週期性，屬週期變動。","D":"產後憂鬱與個人生育有關，非週期變動。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"113100-N5-35":{"quick":"生命統計「錯誤」者＝一般生育率＝(該年出生數÷育齡婦女數)×100(應×1000)。","detail":{"background":"生命統計的敘述，「錯誤」者為(C)『「一般生育率＝(該年出生數 ÷ 育齡婦女數)×「100」」』——錯誤，一般生育率應「×「1000」(以「‰」表示)」，而非×100。其他正確:A 扶老比＝(65歲以上人口)÷(15~64歲人口)×100;B 老化指數＝(65歲以上人口數÷0~14歲人口數)×100;D 扶養比＝〔(0~14歲＋65歲以上)÷15~64歲〕×100。故本題選錯誤者為 C。一般生育率應×1000(‰)，非×100。","options":{"A":"扶老比＝(65歲以上÷15~64歲)×100，正確。","B":"老化指數＝(65歲以上÷0~14歲)×100，正確。","C":"正確(本題選錯誤者)。一般生育率應×1000，非×100。","D":"扶養比公式正確。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"113100-N5-39":{"quick":"透過社區發展史的資料，最適合了解居民的「風俗習慣」。","detail":{"background":"透過「社區發展史」的資料收集，最適合了解居民的(B)『「風俗習慣(社區發展史蘊含「歷史、文化、風俗、價值」等脈絡資訊)」』。人口成長趨勢(人口統計)、人口健康狀況(健康統計)、娛樂設施(物理環境)是「客觀/量化」的資料，非「發展史」所能反映的「文化、風俗」面向。故 B 正確。社區發展史反映文化、風俗、價值等脈絡(與前述同類題一致)。","options":{"A":"人口成長趨勢是人口統計資料。","B":"正確。社區發展史最適合了解居民的風俗習慣。","C":"人口健康狀況是健康統計資料。","D":"娛樂設施是物理環境資料。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"113180-N5-28":{"quick":"依賴指數：數值越高表示具生產力人口的負擔愈重。","detail":{"background":"依賴指數(dependency ratio)的正確敘述是(D)『「此數值「越高」，表示「具生產力人口的負擔「愈重」」(每位工作年齡者須扶養的依賴人口越多)」』。其他錯誤:A『又稱「扶老比」』錯誤(依賴指數＝扶老比＋扶幼比，非僅扶老);B『指「65歲以上」占生產力人口的比例』錯誤(含「幼年＋老年」);C『生產力人口是「18~64歲」』錯誤(是「「15~64歲」」)。故 D 正確。依賴指數越高，工作人口的扶養負擔越重。","options":{"A":"依賴指數含幼年+老年，非僅扶老比。","B":"依賴指數含幼年+老年，非只65歲以上。","C":"生產力人口是15~64歲，非18~64歲。","D":"正確。數值越高表示生產力人口的負擔愈重。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"113180-N5-32":{"quick":"想知道某村里三高的分布狀況＝描述性流行病學。","detail":{"background":"護理師想知道「某村里「高血壓、高血糖、高血脂」的「分布」狀況」——最適合(A)『「描述性流行病學(描述疾病在人、時、地的「分布」)」』。分析性是探討病因/危險因子;實驗性是介入研究;縱貫性是長期追蹤的研究設計。「描述三高的分布」屬描述性流行病學。故 A 正確(與前述同類題一致)。","options":{"A":"正確。描述三高的分布狀況，屬描述性流行病學。","B":"分析性流行病學是探討病因/危險因子。","C":"實驗性流行病學是介入研究。","D":"縱貫性是長期追蹤的研究設計。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"114030-N5-28":{"quick":"流行病學的敘述「最不適當」者＝專為探討傳染病的流行概況。","detail":{"background":"流行病學的敘述，「最不適當」者為(A)『「「專為」探討「傳染病」的流行概況」』——錯誤，流行病學「「不限於傳染病」，也廣泛探討「慢性病、傷害、心理健康」等各種健康問題的分布與成因」。其他適當:B 流行病指一個疾病的發生超過正常期望值;C 疾病的探討不限於地點或時間;D 可探討暴露源和疾病的因果關係。故本題選最不適當者為 A。流行病學不限於傳染病，也探討慢性病等。","options":{"A":"正確(本題選最不適當者)。流行病學不限於傳染病，也探討慢性病等。","B":"流行病指疾病發生超過正常期望值，正確。","C":"疾病的探討不限於地點或時間，正確。","D":"可探討暴露源和疾病的因果關係，正確。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"114030-N5-30":{"quick":"疫情期間維持社交距離＝針對三角模式中「環境」因素的處理策略。","detail":{"background":"疫情期間「維持適當「社交距離」」——是針對三角致病模式中(B)『「環境」因素的處理策略(透過「改變人與人之間的「環境/接觸條件」」，阻斷病原的傳播)』。壓力非三角要素;病原體是病毒本身;宿主是人。「社交距離(改變傳播的環境條件)」屬環境因素的處理。故 B 正確。維持社交距離是針對環境(傳播條件)的處理。","options":{"A":"壓力非三角致病模式的要素。","B":"正確。維持社交距離是針對環境因素的處理策略。","C":"病原體是病毒本身。","D":"宿主是被感染的人(處理宿主如疫苗、提升抵抗力)。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"114030-N5-33":{"quick":"Anderson & McFarlane 的「人口群體特性」評估「最不適當」者＝對村/里長的滿意度。","detail":{"background":"依 Anderson & McFarlane 模式，「人口群體特性(core)」評估內容，「最不適當」者為(C)『「對村/里長的「滿意度」」』——「對村里長的滿意度」屬「「政府與政治次系統(對領導/施政的態度)」」，而非「「人口群體特性(人口的組成統計)」」。其他屬於人口群體特性:A 男女的性比、B 婚姻狀況、D 社會增加率(人口的遷徙)。故本題選最不適當者為 C。對村里長的滿意度屬政治系統，非人口特性。","options":{"A":"男女的性比是人口群體特性。","B":"婚姻狀況是人口群體特性。","C":"正確(本題選最不適當者)。對村里長的滿意度屬政治系統，非人口特性。","D":"社會增加率(人口遷徙)是人口群體特性。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"114030-N5-37":{"quick":"水媒疾病「最不適當」者＝阿米巴原蟲是副傷寒的致病原。","detail":{"background":"水媒疾病的敘述，「最不適當」者為(B)『「「阿米巴原蟲」是「副傷寒」的致病原之一」』——錯誤，「「阿米巴原蟲」造成的是「「阿米巴痢疾」」;「「副傷寒」是「「沙門氏桿菌(Salmonella paratyphi)」」造成的」。其他正確:A 志賀氏桿菌是細菌性痢疾的致病原之一;C 小兒麻痺病毒是小兒麻痺症的致病原;D 鞭毛蟲是寄生蟲病的致病原之一。故本題選最不適當者為 B。阿米巴原蟲→阿米巴痢疾;副傷寒→沙門氏菌。","options":{"A":"志賀氏桿菌是細菌性痢疾的致病原，正確。","B":"正確(本題選最不適當者)。阿米巴原蟲造成阿米巴痢疾;副傷寒是沙門氏菌。","C":"小兒麻痺病毒是小兒麻痺症的致病原，正確。","D":"鞭毛蟲是寄生蟲病的致病原，正確。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"114100-N5-30":{"quick":"輪狀模式：環境因子包含生物、物理、社會。","detail":{"background":"致病模式中「輪狀模式(wheel model)」的最適當敘述是(B)『「「環境」因子包含「生物、物理、社會」(輪狀模式以「宿主(及其遺傳核心)」為中心，外圍環繞「生物、物理、社會」三類環境)」』。其他錯誤:A『強調「時間」對疾病發展的影響』非輪狀模式的特點;C『強調「宿主與病原體」間的互動』是「「三角模式」」的特點;D『最適合解釋慢性病的「因果關係鏈」』是「「網狀模式(因果網)」」的特點。故 B 正確。輪狀模式以宿主為核心、外環生物物理社會環境。","options":{"A":"強調時間非輪狀模式的特點。","B":"正確。輪狀模式的環境因子包含生物、物理、社會。","C":"強調宿主與病原體互動是三角模式的特點。","D":"解釋慢性病因果鏈是網狀模式(因果網)的特點。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"114100-N5-31":{"quick":"判斷社區健康問題嚴重性的原則「最不適當」者＝社區凝聚力。","detail":{"background":"判斷社區健康問題的「嚴重性」時，「最不適當」的原則是(D)『「社區凝聚力」』——「社區凝聚力」是「社區動員/參與」的面向，「與判斷問題的「嚴重性」無關」。判斷嚴重性的原則:A 致死率(問題的致命程度)、B 影響人數(波及範圍)、C 經濟損失(造成的損害)。故本題選最不適當者為 D。判斷嚴重性看致死率、影響人數、經濟損失，非社區凝聚力。","options":{"A":"致死率反映問題的致命程度，是嚴重性的判準。","B":"影響人數反映波及範圍，是嚴重性的判準。","C":"經濟損失反映造成的損害，是嚴重性的判準。","D":"正確(本題選最不適當者)。社區凝聚力與問題的嚴重性無關。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"114170-N5-26":{"quick":"健康平均餘命＝不需依賴他人照顧的平均期望存活年數。","detail":{"background":"健康平均餘命的最適當敘述是(C)『「是指「不需依賴他人照顧(健康、能自理)」的平均期望存活年數(扣除「不健康/失能」的年數)」』。其他錯誤:A『我國健康平均餘命已達「80歲以上」』不正確(健康餘命「低於」平均餘命;我國健康餘命約70餘歲);B『出生後預期可以存活的平均年數』是「「平均餘命/平均壽命」」(非「健康」餘命);D『改善「重症照護設備」有助於提升「健康」餘命』不精確(健康餘命著重「延長健康、減少失能」，而非延長「重症存活」)。故 C 正確。健康平均餘命是「能自理、不需依賴照顧」的存活年數。","options":{"A":"我國健康餘命約70餘歲，非80歲以上。","B":"「出生後預期存活年數」是平均餘命，非健康餘命。","C":"正確。健康平均餘命是不需依賴他人照顧的存活年數。","D":"健康餘命著重延長健康、減少失能，非延長重症存活。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"114170-N5-30":{"quick":"追蹤後 RR＝2.5：此暴露可能為健康事件的危險因子。","detail":{"background":"追蹤10年，暴露組(高甲醛)相對於非暴露組罹患鼻咽癌的「相對危險性(RR)＝2.5(>1)」——最適當的推論是(A)『「此暴露「可能為健康事件的「危險因子」」(RR>1 表示暴露組的發病風險「高於」非暴露組)」』。其他錯誤:B『可能為「保護因子」』錯誤(保護因子 RR<1);C『暴露組「盛行率「低於」」非暴露組』、D『暴露組「發生率「低於」」非暴露組』錯誤(RR=2.5 表示暴露組「較高」)。故 A 正確。RR>1表示暴露是危險因子(與前述同類題一致)。","options":{"A":"正確。RR=2.5(>1)，此暴露可能為危險因子。","B":"保護因子的 RR<1，非2.5。","C":"RR=2.5 表示暴露組較高，非較低。","D":"RR=2.5 表示暴露組發生率較高，非較低。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"114170-N5-43":{"quick":"我國1~14歲兒童及青少年的最主要死因＝事故傷害。","detail":{"background":"目前我國「1~14歲」的兒童及青少年「最主要的死因」是(C)『「事故傷害(意外傷害，如交通事故、溺水、跌落等;是兒童青少年的首要死因)」』。惡性腫瘤(癌症)是次要;周產期畸形、染色體異常是「新生兒/嬰兒早期」的死因(非1~14歲)。故 C 正確。事故傷害是我國1~14歲兒童及青少年的首要死因。","options":{"A":"惡性腫瘤是兒童青少年的次要死因。","B":"周產期畸形是新生兒/嬰兒早期的死因。","C":"正確。事故傷害是1~14歲兒童及青少年的最主要死因。","D":"染色體異常是新生兒/嬰兒早期的死因。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"115030-N5-28":{"quick":"世代研究與病例對照研究「最不適當」者＝兩者皆可以計算發生率。","detail":{"background":"世代研究與病例對照研究的敘述，「最不適當」者為(B)『「「兩者皆」可以計算「發生率(incidence rate)」」』——錯誤，「「世代研究」可計算發生率(前瞻追蹤新病例);但「「病例對照研究」「無法」計算發生率」(病例與對照的人數是研究者選定的)」。其他正確:A 兩者皆為縱貫法(longitudinal);C 世代研究可應用於因果關係的推論;D 病例對照研究屬回溯性(retrospective)設計。故本題選最不適當者為 B。病例對照研究無法計算發生率。","options":{"A":"兩者皆為縱貫法(longitudinal)，正確。","B":"正確(本題選最不適當者)。病例對照研究無法計算發生率。","C":"世代研究可應用於因果關係的推論，正確。","D":"病例對照研究屬回溯性設計，正確。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}},"115030-N5-29":{"quick":"評估婦幼衛生保健工作成效的指標＝嬰兒死亡率②、孕產婦死亡率③(自然增加率①、社會增加率④非)。","detail":{"background":"可作為評估「婦幼衛生」保健工作成效的指標是:(2)嬰兒死亡率(反映婦幼衛生最敏感)、(3)孕產婦死亡率(反映孕產照護)。而(1)自然增加率(出生−死亡)、(4)社會增加率(遷入−遷出)是「人口增減」的指標，「與婦幼衛生成效無直接關係」。故正確為②③(選 B)。婦幼衛生成效以嬰兒死亡率、孕產婦死亡率評估。","options":{"A":"僅12：含①(自然增加率，非婦幼指標)，錯誤。","B":"正確。嬰兒死亡率②、孕產婦死亡率③，是婦幼衛生指標。","C":"僅123：含①，錯誤。","D":"1234：含①④(人口增減指標)，非婦幼指標。"},"sources":["社區衛生護理學(新文京/華杏)·生命統計","公共衛生學"]}},"115030-N5-30":{"quick":"篩檢工具信度與效度「最不適當」者＝信度很高的工具，其效度一定高。","detail":{"background":"篩檢工具信度與效度的敘述，「最不適當」者為(B)『「信度很高的工具，其效度「一定高」」』——錯誤，「「信度高(一致、穩定)「不保證」效度高(準確)」」(工具可能「一致地測錯」，即「信度高但效度低」);效度高則信度通常也高，但反之不然。其他適當:A 信度是指測量結果的一致性、穩定性及可靠性;C 陽性預測值與陰性預測值會受疾病盛行率影響;D 效度是視工具的特異度及敏感度來決定。故本題選最不適當者為 B。信度高不保證效度高。","options":{"A":"信度是測量結果的一致性、穩定性與可靠性，正確。","B":"正確(本題選最不適當者)。信度高不保證效度高(可能一致地測錯)。","C":"陽性/陰性預測值會受盛行率影響，正確。","D":"效度由特異度及敏感度決定，正確。"},"sources":["社區衛生護理學(新文京/華杏)·流行病學","生物統計學"]}}},TO=["流行病學與生物統計"],LEC={"流行病學與生物統計":{"title":"流行病學與生物統計　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「流行病學與生物統計」的歷屆考題共 126 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_h2_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
