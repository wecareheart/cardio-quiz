":"GTP-bound的被活化狀態","B":"GDP-bound的去活化狀態","C":"ATP-bound的被活化狀態","D":"ADP-bound的去活化狀態"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_110020-98","q_num":98,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"T13訊息傳遞與激素生化","stem":"乳癌的病患有時會利用tamoxifen(一種激素拮抗劑)來做為輔助治療。下列有關此藥劑之敘述,何者正確?","options":{"A":"tamoxifen是一種男性激素的專一拮抗劑(antagonist)","B":"對雌激素受體呈陰性的乳癌患者效果較好","C":"必須經由癌細胞表面之受器(receptor)進入細胞","D":"進入細胞後,與雌激素受器結合,影響雌激素調控之基因表達"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_111020-78","q_num":78,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"T13訊息傳遞與激素生化","stem":"下列何種激素-受體相互作用後,受體會由單體(monomer)形成雙聚體(dimer)?","options":{"A":"乙醯膽鹼與其菸鹼受體(nicotinic acetylcholine receptor)","B":"表皮生長因子(EGF)與其受體(EGF receptor)","C":"腎上腺素與其受體(β-adrenergic receptor)","D":"膠原蛋白與其受體(integrin)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_111020-79","q_num":79,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"T13訊息傳遞與激素生化","stem":"庫欣氏症(Cushing syndrome)是一種腎上腺皮質類固醇分泌過多的疾病,下列敘述何者錯誤?","options":{"A":"腎上腺皮質類固醇合成的前驅物是膽固醇","B":"類固醇無法穿透細胞膜,故必須作用於細胞膜上之受體","C":"腎上腺皮質類固醇與其受體結合可造成受體之構形改變","D":"受體經活化之後可調控基因轉錄作用"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_111100-99","q_num":99,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"T13訊息傳遞與激素生化","stem":"Receptor tyrosine kinases(RTKs)是一類重要的細胞傳訊受體,其可在tyrosine residue上進行磷酸化來傳遞訊 息。下列何者不屬於RTKs?","options":{"A":"epidermal growth factor receptor(EGFR)","B":"fibroblast growth factor receptor(FGFR)","C":"phosphoinositide 3-kinase(PI3K)","D":"insulin receptor(INSR)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med1_112020-98","q_num":98,"roc_year":"112","exam_code":"112020","src":"民國112年","topic":"T13訊息傳遞與激素生化","stem":"下列何者與類固醇激素(steroid hormone)之作用方式無關?","options":{"A":"激素會與受體形成複合體(hormone-receptor complexes)","B":"受體主要在細胞膜表面以磷酸化方式活化" "exam_code":"114020","src":"民國114年","topic":"T13訊息傳遞與激素生化","stem":"下列荷爾蒙(hormones),何者不需藉由細胞膜上受體來傳遞訊號至胞內?","options":{"A":"甲狀腺刺激素(thyroid-stimulating hormone)","B":"腎上腺素(adrenaline)","C":"濾泡刺激素(follicle-stimulating hormone)","D":"甲狀腺素(thyroid hormones)"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med1_114020-96","q_num":96,"roc_year":"114","exam_code":"114020","src":"民國114年","topic":"T13訊息傳遞與激素生化","stem":"下列受體系統何者最常透過環腺苷酸(c-AMP)當作訊號傳遞之第二信差(secondary messenger)?","options":{"A":"G 蛋白偶聯受體(G protein-coupled receptor)","B":"受體酪胺酸激酶(receptor tyrosine kinase)","C":"核受體(nuclear receptor)","D":"配體門控離子通道(ligand-gated ion channel)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_114090-96","q_num":96,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"T13訊息傳遞與激素生化","stem":"下列有關蛋白激酶A(protein kinase A)活化的描述,何者正確?","options":{"A":"需要cAMP 結合其R 次單元","B":"需要cAMP 結合其C 次單元","C":"需要鈣離子結合其R 次單元","D":"需要鈣離子結合其C 次單元"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med1_114090-97","q_num":97,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"T13訊息傳遞與激素生化","stem":"Phosphoinositide 3-kinase(PI3K)主要以磷酸化細胞膜上的那一個分子來傳遞訊息?","options":{"A":"Ras","B":"PKC","C":"PIP2","D":"PKB"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med1_115020-97","q_num":97,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"T13訊息傳遞與激素生化","stem":"下列有關細胞訊號傳遞的敘述,何者最不適當?","options":{"A":"多細胞生物體可藉由細胞間互相交換眾多不同的訊號,來引發各種合適的反應","B":"細胞和生物體只會偵測環境中的化學訊號,而物理訊號則無法啟動細胞傳訊機制","C":"訊號分子是可被特異受體偵測到的訊息,可引發細胞做出適當反應","D":"將訊號分子轉換成化學變化,即稱為訊息傳導(signal transduction),乃是活細胞普遍存在的一種特性"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med1_115020-98","q_num":98,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"T13訊息傳遞與激素生化","stem":"Protein kinase A(PKA)是一種磷酸化激酶,可催化在其受質蛋白中的何種胺基酸上進行磷酸化 (phosphorylation)?","options":{"A":"組胺酸(histidine)","B":"蘇胺酸(threonine)","C":"酪胺酸(tyrosine)","D":"麩胺酸(glutamate)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""}],E={"med1_106100-75":{"quick":"天冬醯胺(asparagine)無芳香環,不吸收280 nm紫外光。","detail":{"background":"蛋白質在『280 nm』的紫外吸收來自「芳香族胺基酸」的共軛芳香環:『色胺酸(Trp,吸收最強)、酪胺酸(Tyr)、苯丙胺酸(Phe,弱)』。而『天冬醯胺(asparagine)的側鏈為醯胺(-CH₂-CONH₂),無芳香環→不吸收280 nm』。故B正確。應用:280 nm吸光估蛋白質濃度(主要靠Trp/Tyr);260/280比評估蛋白質與核酸純度。故B正確。","options":{"A":"苯丙胺酸有芳香環、吸280nm。","B":"天冬醯胺無芳香環、不吸280nm—正解。","C":"酪胺酸有芳香環、吸280nm。","D":"色胺酸吸280nm最強。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_106100-76":{"quick":"三級結構內部最主要的「共價」交互作用為雙硫鍵。","detail":{"background":"蛋白質三級結構由多種作用維持,其中『「共價」鍵僅有「雙硫鍵(disulfide bond,兩個半胱胺酸Cys的-SH氧化形成-S-S-)」』—故三級結構內部最常見的「共價」交互作用為雙硫鍵(D)。比較:氫鍵、離子鍵(鹽橋)、凡得瓦力、疏水作用皆為「非共價」作用(個別弱但總和重要)。故D正確。臨床/技術:還原劑(如β-巰基乙醇、DTT)打斷雙硫鍵使蛋白變性;雙硫鍵增加結構與熱穩定性(常見於分泌性蛋白)。","options":{"A":"氫鍵為非共價作用。","B":"凡得瓦力為非共價。","C":"離子交互作用為非共價。","D":"雙硫鍵為共價作用—正解。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_107100-74":{"quick":"成骨不全症由膠原蛋白(collagen)結構變異所致。","detail":{"background":"『成骨不全症(osteogenesis imperfecta,脆骨症)』主因『「第I型膠原蛋白(collagen)」基因(COL1A1/COL1A2)突變』→膠原三股螺旋組裝異常(常因Gly被取代破壞Gly-X-Y重複)→骨骼脆弱易折、藍鞏膜、聽損、牙本質發育不全。故D正確。比較:纖黏蛋白、骨橋蛋白、角質蛋白與此病無關。故D正確。記憶:膠原每三個殘基有一Gly(最小)位於三股螺旋核心,Gly突變→嚴重型。","options":{"A":"纖黏蛋白與成骨不全無關。","B":"骨橋蛋白與此無關。","C":"角質蛋白為表皮/毛髮。","D":"膠原蛋白變異致成骨不全—正解。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_107100-75":{"quick":"含Gly與Pro的-Ser-Gly-Pro-Gly-序列最易形成β-turn(β轉角)。","detail":{"background":"β-轉角(β-turn/β-bend)是讓胜肽鏈『180°回折』的二級結構,常見於球蛋白表面;『「甘胺酸(Gly,最小、最具彈性)」與「脯胺酸(Pro,環狀、易形成轉角)」常出現在β-turn』。故含-Ser-Gly-Pro-Gly-序列最易形成β-turn(A)。比較:α-螺旋與β-摺板需規則氫鍵且Pro/Gly反而是「破壞者」;鋅指是含鋅的結構模體。故A正確。記憶:Gly與Pro=轉角常客、螺旋/摺板破壞者。","options":{"A":"Gly/Pro序列易形成β-turn—正解。","B":"Pro/Gly破壞α-螺旋。","C":"Pro/Gly不利β-sheet。","D":"鋅指為含鋅模體(非此序列)。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_107100-76":{"quick":"SDS-PAGE可依分子量分離評估蛋白質分子量。","detail":{"background":"評估蛋白質「分子量」:『「SDS聚丙烯醯胺凝膠電泳(SDS-PAGE)」—SDS使蛋白變性、賦予均一負電荷,電泳遷移率「只取決於分子量(大小)」→可估分子量』。故A正確。比較:等電聚焦(依等電點pI分離)、離子交換層析(依電荷)、紫外可見光分光(測濃度/光譜)—皆非直接測分子量。故A正確。(測更精確分子量可用質譜法。)","options":{"A":"SDS-PAGE依分子量分離—正解。","B":"等電聚焦依pI(非分子量)。","C":"離子交換依電荷。","D":"紫外可見光測濃度/光譜。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_108030-74":{"quick":"多胜肽在等電點(pI)時淨電荷為零。","detail":{"background":"等電點(isoelectric point, pI)的定義:『在該pH下,分子的「正電荷與負電荷數目相等→「淨電荷為零」」』(此時分子在電場中不移動、溶解度最低易沉澱)。故C正確。注意:淨電荷為零『不等於』完全不帶電—分子仍以「兩性離子(zwitterion)」存在(同時帶正與負電,只是相互抵消)。故C正確(淨電荷零),非「皆不帶電」。應用:等電聚焦電泳依pI分離蛋白。","options":{"A":"非兩端皆帶正電。","B":"非完全不帶電(以兩性離子存在)。","C":"淨電荷為零—正解。","D":"非帶四個淨電荷。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_108030-75":{"quick":"分子篩(size-exclusion)層析依大小分離,無法「直接鑑定蛋白質身分」。","detail":{"background":"蛋白質「身分鑑定」技術:『西方墨點(Western blot,專一抗體辨識)、質譜法(mass spectrometry,測序列/質量指紋)、N端序列分析(Edman降解定序)』—皆可「鑑定身分」。而『「分子篩/凝膠過濾層析(size-exclusion chromatography)」只依「分子大小」分離,「無法直接鑑定是哪一種蛋白質」』。故C無法直接用於身分鑑定,為正解。故C正確。","options":{"A":"Western blot以抗體鑑定身分。","B":"質譜法可鑑定身分。","C":"分子篩層析只依大小分離、無法鑑定身分—正解。","D":"N端定序可鑑定身分。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_108030-91":{"quick":"glutathione reductase用「NADPH」(非ATP)還原GSSG,故此敘述錯誤。","detail":{"background":"穀胱甘肽(glutathione, GSH):A『由「Glu-Cys-Gly」三胺基酸組成(γ-麩胺醯鍵)』(正確);B『參與某些白三烯(如LTC4)合成』(正確);C『被氧化時兩分子GSH經「雙硫鍵」形成GSSG』(正確)。D「glutathione reductase「利用ATP」將GSSG還原成2GSH」『錯誤』—還原酶利用『「NADPH(非ATP)」』提供電子還原GSSG。故D為正解。功能:GSH是主要抗氧化劑(清除過氧化物,經glutathione peroxidase);NADPH由五碳糖磷酸途徑供應。","options":{"A":"由Glu/Cys/Gly組成,正確。","B":"參與白三烯合成,正確。","C":"氧化形成GSSG(雙硫鍵),正確。","D":"稱用ATP還原GSSG—錯誤(應為NADPH),為正解。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_108100-74":{"quick":"某些蛋白質可能以一種以上的四級結構存在(正確)。","detail":{"background":"蛋白質結構敘述:D『某些蛋白質可有「多種四級結構」(如血紅素的R/T態、或聚合狀態變化)』正確。比較錯誤:A『選擇性剪接「會」改變蛋白質「一級結構」(產生不同胺基酸序列的異構體)』;B『點突變「可能」改變二級結構(若影響螺旋/摺板傾向)』;C『α-螺旋與β-摺板屬「二級結構」(非三級結構)』。故D正確。記憶:一級=序列、二級=螺旋/摺板、三級=整體摺疊、四級=多次單元組裝。","options":{"A":"選擇性剪接會改變一級結構。","B":"點突變可能改變二級結構。","C":"α螺旋/β摺板屬二級結構(非三級)。","D":"某些蛋白可有多種四級結構—正解。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_108100-75":{"quick":"甲硫胺酸的硫「不」參與雙硫鍵(雙硫鍵由半胱胺酸形成),故此敘述錯誤。","detail":{"background":"雙硫鍵(disulfide bond):由『「半胱胺酸(cysteine)」的-SH氧化形成-S-S-』—『甲硫胺酸(methionine)雖含硫但為硫醚(-S-CH₃)、「不」參與雙硫鍵』。故A「甲硫胺酸側鏈硫參與雙硫鍵」錯誤,為正解。其餘正確:B強還原劑(DTT/β-巰基乙醇)斷裂雙硫鍵;C雙硫鍵增熱穩定性;D雙硫鍵異構酶(PDI)協助正確摺疊(重排雙硫鍵)。故A正確。記憶:雙硫鍵=Cys(非Met)。","options":{"A":"稱甲硫胺酸硫參與雙硫鍵—錯誤(雙硫鍵由半胱胺酸形成),為正解。","B":"強還原劑斷裂雙硫鍵,正確。","C":"雙硫鍵增熱穩定性,正確。","D":"雙硫鍵異構酶助摺疊,正確。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_108100-76":{"quick":"pH=12(強鹼)時甘胺酸的胺基去質子、羧基解離→NH₂-CH₂-COO⁻。","detail":{"background":"甘胺酸的解離:羧基pKa≈2.3、胺基pKa≈9.6。隨pH上升:『極酸(pH<2)→NH₃⁺-CH₂-COOH(淨+1);中性(pH≈6,等電點)→「兩性離子」NH₃⁺-CH₂-COO⁻(淨0);「強鹼(pH=12,>9.6)」→「胺基去質子(NH₂)、羧基已解離(COO⁻)」=「NH₂-CH₂-COO⁻(淨−1)」』。故B正確。記憶:pH越高越去質子→帶負電。故B正確。","options":{"A":"NH₃⁺-CH₂-COOH為極酸態。","B":"pH12時為NH₂-CH₂-COO⁻—正解。","C":"化學式不正確。","D":"NH₃⁺-CH₂-COO⁻為等電點(中性)態。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_108100-90":{"quick":"N-連結醣化用「天門冬醯胺(Asn)」、O-連結用Ser/Thr,故Asn/Thr/Ser參與糖蛋白共價鍵。","detail":{"background":"糖蛋白的醣-蛋白共價鍵:『「N-連結醣化」糖接到「天門冬醯胺(Asn)」的醯胺氮(序列Asn-X-Ser/Thr)』;『「O-連結醣化」糖接到「絲胺酸(Ser)或蘇胺酸(Thr)」的羥基』。故直接參與醣-蛋白共價鍵的胺基酸為『Asn、Thr、Ser(B)』。故B正確。(Gly無側鏈羥基/醯胺,不直接連糖。)故B正確。","options":{"A":"Gly不直接連糖(無羥基/醯胺)。","B":"Asn(N-連結)+Thr/Ser(O-連結)—正解。","C":"組合不符醣化胺基酸。","D":"Lys/His/Glu非醣化連接點。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_109020-91":{"quick":"磷酸化的Na-K幫浦對「鉀」親和力高、對「鈉」親和力低(構象E2),故此敘述錯誤。","detail":{"background":"Na⁺-K⁺幫浦循環:A『每運送3 Na⁺出細胞水解1 ATP』(正確);B『與細胞內Na⁺結合後「自磷酸化」』(正確,E1→E2-P);C『強心配糖體(digitalis)結合並抑制之』(正確)。D「磷酸化的幫浦對鉀的親和力「低於」對鈉」『錯誤』—『磷酸化後幫浦轉為「E2-P構象」,對「鈉親和力「下降」(把鈉釋出細胞外)、對「鉀」親和力「上升」(在外側結合鉀)」』→故對鉀親和力「高於」鈉。故D為正解。記憶:E1高親鈉(胞內)、E2-P高親鉀(胞外)。","options":{"A":"3Na出耗1ATP,正確。","B":"結合Na後磷酸化,正確。","C":"digitalis抑制幫浦,正確。","D":"稱磷酸化後對鉀親和力低於鈉—錯誤(應對鉀親和力高),為正解。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_111020-76":{"quick":"強還原劑會破壞蛋白質中的雙硫鍵(正確)。","detail":{"background":"雙硫鍵(disulfide bond,共價):C『「強還原劑(如DTT、β-巰基乙醇)會「破壞(還原)」雙硫鍵(-S-S-→2 -SH)」』正確。比較錯誤:A雙硫鍵對「許多分泌性蛋白的三級結構穩定性「有顯著貢獻」」(非無影響);B雙硫鍵由『「半胱胺酸(cysteine)」(非甲硫胺酸)』形成;D雙硫鍵是「「共價」鍵」(非非共價)。故C正確。記憶:雙硫鍵=共價、Cys、增穩定、可被還原劑斷。","options":{"A":"雙硫鍵對穩定性有顯著貢獻(非無影響)。","B":"雙硫鍵由半胱胺酸(非甲硫胺酸)形成。","C":"強還原劑破壞雙硫鍵—正解。","D":"雙硫鍵為共價(非非共價)。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_111100-74":{"quick":"精胺酸(arginine)的胍基側鏈在中性pH帶正電。","detail":{"background":"中性pH(7)帶正電的鹼性胺基酸:『「精胺酸(Arg,胍基,pKa≈12.5)」、「離胺酸(Lys,ε-胺基,pKa≈10.5)」常帶正電;組胺酸(His,pKa≈6,部分帶正)』。故B(arginine)在pH7側鏈帶正電,正確。比較:丙胺酸(中性非極性)、天門冬醯胺(中性極性醯胺)、天門冬胺酸(酸性,帶負電)。故B正確。記憶:鹼性帶正(Arg/Lys/His)、酸性帶負(Asp/Glu)。","options":{"A":"丙胺酸側鏈非極性、不帶電。","B":"精胺酸胍基帶正電—正解。","C":"天門冬醯胺中性極性、不帶電。","D":"天門冬胺酸酸性、帶負電。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_112020-74":{"quick":"膠體過濾(凝膠過濾)層析依「分子大小」分離蛋白質。","detail":{"background":"『膠體過濾/凝膠過濾/分子篩層析(gel filtration/size-exclusion chromatography)』:利用多孔膠珠—『「大分子」無法進入孔洞、走捷徑「先洗出」;「小分子」進入孔洞、路徑長「後洗出」』→依『「分子大小(molecular size)」分離』。故B正確。比較:離子交換(依電荷)、等電聚焦(依pI)、SDS-PAGE(依分子量但變性)。故B正確。應用:亦可估天然蛋白的分子量(以標準品校正)。","options":{"A":"依電荷分離為離子交換。","B":"膠體過濾依分子大小—正解。","C":"質荷比為質譜/電泳。","D":"非依穩定程度。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_112020-75":{"quick":"β-摺板相鄰鏈可平行或反平行排列(正確)。","detail":{"background":"二級結構:D『「β-摺板」相鄰多肽鏈方向「可平行(parallel)或反平行(antiparallel)」』正確。比較錯誤:A『α-螺旋的「胺基(N)端」因偶極排列帶「部分「正」電(羰基O指向C端,故C端偏負、N端偏正)」』(此選項說N端帶負電,錯);B『自然界α-螺旋大多為「右手性(right-handed)」』(非左手);C『「氫鍵」同時穩定α-螺旋「與」β-摺板兩者(非僅螺旋)』。故D正確。記憶:α-螺旋右手、N端帶正(偶極);β-摺板平行/反平行皆有、靠鏈間氫鍵。","options":{"A":"α-螺旋N端帶部分正電(非負)。","B":"α-螺旋大多右手性(非左手)。","C":"氫鍵亦穩定β-摺板(非僅螺旋)。","D":"β-摺板可平行或反平行—正解。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_113020-75":{"quick":"α-螺旋主要靠主鏈胜肽鍵之間的氫鍵穩定。","detail":{"background":"α-螺旋的穩定主要靠『「主鏈(backbone)上「胜肽鍵的羰基O與第四個殘基的醯胺N-H之間」的「氫鍵」」(n與n+4)』—沿螺旋軸規律形成。故B正確。比較:α碳之間無直接疏水作用(A錯)、R基團的靜電/氫鍵作用會影響但「非主要穩定α-螺旋的因素」(C、D非主因;主鏈氫鍵才是核心)。故B正確。(R基團作用主要影響側鏈間與整體摺疊。)","options":{"A":"α碳間無直接疏水作用穩定螺旋。","B":"主鏈胜肽鍵間的氫鍵穩定α-螺旋—正解。","C":"R基團靜電作用非主要穩定因素。","D":"R基團氫鍵非主要穩定因素。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_113090-75":{"quick":"加入還原劑最容易破壞雙硫鍵(化學還原-S-S-→2-SH)。","detail":{"background":"雙硫鍵(-S-S-,共價)的破壞:『「加入「還原劑(reducing agent,如DTT、β-巰基乙醇、TCEP)」直接「化學還原」雙硫鍵成兩個-SH」最直接有效』。故C正確。比較:高溫、低pH、界面活性劑主要破壞「非共價」作用(氫鍵、疏水、離子作用)使蛋白變性,但『不直接「斷裂共價雙硫鍵」』(雙硫鍵需還原劑或氧化還原)。故C正確。技術:SDS-PAGE樣品需加還原劑(β-ME)斷雙硫鍵使次單元分離。","options":{"A":"高溫破壞非共價作用(不直接斷雙硫鍵)。","B":"強酸影響非共價作用。","C":"還原劑直接破壞雙硫鍵—正解。","D":"界面活性劑破壞疏水作用(非雙硫鍵)。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_113090-95":{"quick":"麩胺酸(glutamate)經去羧基代謝為GABA。","detail":{"background":"抑制性神經傳遞物『GABA(γ-胺基丁酸)』由『「麩胺酸(glutamate)」經「麩胺酸去羧酶(GAD,需「維生素B6/磷酸吡哆醛PLP」為輔酶)」「去羧基」』而成。故A(glutamate)為GABA前驅物,正確。比較:甲硫胺酸(SAM甲基供體)、蘇胺酸、丙胺酸非GABA前驅。故A正確。記憶:麩胺酸=興奮性傳導物,其去羧產物GABA=抑制性傳導物(B6依賴);B6缺乏可致抽搐。","options":{"A":"麩胺酸去羧成GABA—正解。","B":"甲硫胺酸為甲基供體前驅(非GABA)。","C":"蘇胺酸非GABA前驅。","D":"丙胺酸非GABA前驅。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_114020-77":{"quick":"NAD⁺=菸鹼醯胺核苷酸與腺嘌呤核苷酸經焦磷酸相連的二核苷酸(圖D)。","detail":{"background":"NAD⁺(菸鹼醯胺腺嘌呤二核苷酸):結構為『「「菸鹼醯胺(nicotinamide,吡啶環帶「-C(=O)NH₂醯胺」)」核糖核苷酸」與「「腺嘌呤(adenine)」核糖核苷酸」經「焦磷酸(兩個磷酸)」相連』的「二核苷酸」(由維生素B3衍生)。其「菸鹼醯胺環」是接受/釋放氫負離子(H⁻,2電子)的活性中心(NAD⁺⇌NADH),參與分解代謝氧化還原、攜電子至電子傳遞鏈;NADP⁺(多一磷酸)用於合成代謝。對照附圖:「D」具「菸鹼醯胺(帶醯胺的吡啶)+兩個核糖+焦磷酸+腺嘌呤」=NAD⁺。比較:A=腺苷單磷酸(AMP,僅腺嘌呤+核糖+1磷酸);B=磷酸吡哆醛(PLP,維生素B6,吡啶帶醛基);C=黃素腺嘌呤二核苷酸(FAD,含「異咯嗪flavin三環+核糖醇」非菸鹼醯胺)。故選D。","options":{"A":"AMP(腺苷單磷酸,只有腺嘌呤+核糖+1磷酸)。","B":"磷酸吡哆醛(PLP/維生素B6,吡啶環帶醛基)。","C":"FAD(黃素腺嘌呤二核苷酸,含flavin異咯嗪三環,非菸鹼醯胺)。","D":"NAD⁺(菸鹼醯胺+腺嘌呤,經焦磷酸相連的二核苷酸)—正解(圖D)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》"]}},"med1_114090-74":{"quick":"12個胺基酸的多肽含11個胜肽鍵(n−1)。","detail":{"background":"胜肽鍵(peptide bond)連接相鄰胺基酸的羧基與胺基。『n個胺基酸形成的線性多肽,含「n−1」個胜肽鍵』(端點各少一個鍵)。故12個胺基酸→『12−1=11個胜肽鍵』(C)。故C正確。(環狀胜肽則為n個。)記憶:鏈狀多肽胜肽鍵數=殘基數−1。","options":{"A":"9不符(應n−1)。","B":"10不符。","C":"12−1=11個胜肽鍵—正解。","D":"12為殘基數(非胜肽鍵數)。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_114090-75":{"quick":"固有無序蛋白(IDP)缺乏固定的三維結構。","detail":{"background":"『固有無序蛋白(intrinsically disordered proteins, IDP)』:『「缺乏單一、固定的三維(三級)結構」,在生理條件下呈「動態、彈性的多種構象」』(常富含帶電與極性胺基酸、少芳香/疏水核心)。故B正確。它們『「有」重要功能(訊號傳遞、調控、支架,常在結合標的時才折疊—coupled folding and binding)、且「會」與多種蛋白互動(中樞節點)』—故A(無功能)、C(芳香族為主)、D(不互動)皆錯。故B正確。臨床:許多IDP與訊號/轉錄調控、與疾病(如p53、α-synuclein)相關。","options":{"A":"IDP有重要功能(非無功能)。","B":"缺乏固定三維結構—正解。","C":"IDP富帶電/極性(非芳香族為主)。","D":"IDP會與多種蛋白互動。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_114090-76":{"quick":"2,3-BPG結合血紅素使其偏向T態(低氧親和力),促進組織卸氧。","detail":{"background":"2,3-雙磷酸甘油酸(2,3-BPG):『結合於血紅素「去氧(T態)」四聚體中央的正電口袋→「穩定T態(tense, 低氧親和力)」→使氧解離曲線「右移」→促進組織釋氧』。故B(T態)正確。比較:R態(relaxed)是高氧親和力(肺部);A形、Z形非血紅素構象。故B正確。生理:高海拔/慢性缺氧時2,3-BPG↑助組織取氧;HbF對2,3-BPG親和低故氧親和力高(胎盤奪氧)。","options":{"A":"R態為高氧親和力(2,3-BPG反而穩定T態)。","B":"2,3-BPG使血紅素偏T態(低氧親和)—正解。","C":"A形非血紅素構象。","D":"Z形非血紅素構象。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_115020-74":{"quick":"尿素變性後可自發復性→此摺疊過程「總亂度(系統+環境)一定增加」(自發必然)。","detail":{"background":"蛋白質去除變性劑後「自發性」折疊回天然結構:依熱力學,『自發過程必有「總亂度(蛋白質+環境)增加(ΔS_total>0)」、且「自由能下降(ΔG<0)」』。題給選項中『D「總亂度(蛋白質本身和環境)一定增加」』是自發過程的必然(熱力學第二定律)→正確。比較:A蛋白質「本身」亂度折疊時「減少」(但環境亂度增加更多使總增,故「本身一定減少」對「折疊」雖常見、但題以總亂度為最穩妥);B「一定放熱」不必然(可吸熱但靠熵驅動);C自由能下降是自發必然(亦對)。官方答案取C(自由能一定減少)亦為自發必然——本題標準答案為C(反應過程自由能一定減少)。綜合:自發過程ΔG<0、ΔS_total>0。","options":{"A":"蛋白本身亂度折疊時減少(非增加,但非總亂度)。","B":"不一定放熱(可熵驅動)。","C":"自發過程自由能一定減少(ΔG<0)—正解。","D":"總亂度增加亦對,但官方取C。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_115020-76":{"quick":"胺基酸為兩性電解質,因其能同時呈酸性與鹼性(可給/受質子)。","detail":{"background":"胺基酸是『「兩性電解質(ampholyte)/兩性離子(zwitterion)」』:『同時含「酸性的羧基(-COOH,可釋H⁺,作為酸)」與「鹼性的胺基(-NH₂,可接H⁺,作為鹼)」→「能同時呈現酸性與鹼性功能」』。故A正確。此特性使胺基酸在不同pH帶不同電荷、有等電點、具緩衝能力。故A正確。","options":{"A":"能同時呈酸性與鹼性功能—正解。","B":"非以「不帶電/離子轉換」定義兩性。","C":"極性/非極性非兩性定義。","D":"吸光性與兩性無關。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_106100-92":{"quick":"維持最大離子濃度梯度的是胃壁細胞的H⁺-K⁺-ATPase(胃酸,跨膜H⁺梯度達百萬倍)。","detail":{"background":"各ATPase維持的離子梯度大小:『「胃壁細胞的H⁺-K⁺-ATPase」把H⁺泵入胃腔,使「胃腔H⁺濃度比血漿高約「百萬倍(10⁶,pH差約3→6單位)」」→「維持「人體最大的離子濃度梯度」」』。故C正確。比較:Na⁺-K⁺-ATPase(鈉鉀梯度約10–30倍)、Ca²⁺-ATPase(鈣梯度約萬倍)、陰離子運輸器皆小於胃酸的H⁺梯度。故C正確。臨床:質子幫浦抑制劑(PPI)抑制此H⁺-K⁺-ATPase治胃酸過多。","options":{"A":"Na-K幫浦梯度約10–30倍。","B":"陰離子運輸器非主動建立大梯度。","C":"胃H⁺-K⁺-ATPase維持最大梯度(胃酸百萬倍)—正解。","D":"Ca²⁺-ATPase梯度約萬倍。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_106100-74":{"quick":"受質濃度極低時初速度∝[S],其速率常數為Vmax/Km(=專一性常數方向)。","detail":{"background":"Michaelis-Menten:v=Vmax[S]/(Km+[S])。『當[S]「極低(<<Km)」→分母Km+[S]≈Km→v≈(Vmax/Km)[S]』→『初速度與[S]「成正比」、其「一級速率常數」=「Vmax/Km」』(=kcat[E_total]/Km)。故C正確。「kcat/Km」稱「專一性常數(specificity constant)」,反映酵素在低受質下的催化效率。故C正確。","options":{"A":"kcat為轉換數(高[S]時)。","B":"kcat×Km非此常數。","C":"Vmax/Km(低[S]時的速率常數)—正解。","D":"1/Km非速率常數。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_107100-91":{"quick":"促進性擴散經專一性膜蛋白降低溶質通過膜的活化能。","detail":{"background":"促進性擴散(facilitated diffusion):『「順濃度梯度、不耗能」,但需「專一性膜運輸蛋白(載體/通道)」協助「降低溶質穿膜的「活化能」」』(疏水膜對極性/帶電溶質是高能障)。故A正確。比較錯誤:B不改變「濃度梯度大小」(只加速達平衡);C運輸蛋白克服極性問題、非溶質極性改變膜;D「O₂、N₂、CH₄等非極性小氣體」是「簡單擴散(直接穿膜)」,不需載體。故A正確。","options":{"A":"經膜蛋白降低活化能—正解。","B":"不改變濃度梯度大小。","C":"是膜蛋白協助、非溶質改變膜。","D":"非極性氣體為簡單擴散(非促進性)。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_107100-97":{"quick":"受體酵素對「胞內」受質具酵素活性(如受體酪胺酸激酶)。","detail":{"background":"受體酵素(receptor enzyme,如「受體酪胺酸激酶RTK」):『是「跨膜蛋白」—「胞外」有「配體(ligand)結合位」、「胞內」有「酵素催化結構域」,「對「細胞質內(胞內)的受質」具酵素活性(如磷酸化下游蛋白)」』。故B正確。比較錯誤:A是膜蛋白(非「不是」);C胞外是「結合配體」非「對配體有酵素活性」;D受質結合位在「胞內」(非胞外)。故B正確。例:胰島素受體、EGF受體(配體結合→自磷酸化→活化胞內訊號)。","options":{"A":"受體酵素是膜蛋白(非不是)。","B":"對胞內受質具酵素活性—正解。","C":"胞外為配體結合(非對配體有酵素活性)。","D":"受質結合位在胞內(非胞外)。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_109020-76":{"quick":"glucose+ATP→glucose-6-P(轉移磷酸基)由轉移酶(transferase,激酶)催化。","detail":{"background":"EC六大類:『1氧化還原酶(oxidoreductase)、2轉移酶(transferase)、3水解酶(hydrolase)、4裂解酶(lyase)、5異構酶(isomerase)、6連接酶(ligase)』。『「glucose+ATP→glucose-6-P+ADP」是把「磷酸基由ATP「轉移」給葡萄糖」(己糖激酶hexokinase)→屬「轉移酶(transferase)」』(激酶kinase是轉移磷酸基的轉移酶次類)。故D正確。記憶:激酶=轉移酶。","options":{"A":"水解酶催化水解反應。","B":"連接酶用ATP連接兩分子(形成新鍵)。","C":"氧化還原酶催化氧化還原。","D":"轉移磷酸基→轉移酶—正解。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_109020-94":{"quick":"GOT/GPT(AST/ALT)屬「轉胺酶(transaminase/aminotransferase)」。","detail":{"background":"GOT(AST)與GPT(ALT)是肝功能指標:『「轉胺酶(transaminase/aminotransferase)」—催化「胺基(-NH₂)由胺基酸「轉移」到α-酮酸」的反應(需「磷酸吡哆醛PLP/維生素B6」為輔酶)』。GOT(AST):aspartate↔oxaloacetate;GPT(ALT):alanine↔pyruvate。故C正確。肝細胞受損釋出此二酶→血中升高(ALT較肝專一)。故C正確。","options":{"A":"激酶轉移磷酸基(非轉胺)。","B":"去羧酶移除羧基。","C":"GOT/GPT為轉胺酶—正解。","D":"甲基轉移酶轉移甲基。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_109100-76":{"quick":"初速度=0.8 Vmax時,[S]=4 Km。","detail":{"background":"Michaelis-Menten:v/Vmax=[S]/(Km+[S])。當『v=0.8 Vmax→0.8=[S]/(Km+[S])→0.8Km+0.8[S]=[S]→0.8Km=0.2[S]→[S]=4Km』。故C(4Km)正確。(對照:v=0.5Vmax時[S]=Km;v=0.9Vmax時[S]=9Km。)故C正確。","options":{"A":"2Km對應v≈0.67Vmax。","B":"3Km對應v=0.75Vmax。","C":"4Km對應v=0.8Vmax—正解。","D":"5Km對應v≈0.83Vmax。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_110020-75":{"quick":"酵素改變的是反應的「速率常數」(加速),不改變平衡與自由能差。","detail":{"background":"酵素催化的本質:『藉「降低活化能」「加速正逆反應的「速率常數(rate constant)」」』。它『「不改變」反應的「平衡常數(Keq)、反應物與產物之間的自由能差(ΔG)、產物結構」』(只縮短達平衡的時間、不移動平衡)。故B(速率常數)正確。故B正確。記憶:酵素改變動力學(速率)、不改變熱力學(平衡)。","options":{"A":"不改變平衡常數。","B":"改變速率常數(加速)—正解。","C":"不改變反應物產物自由能差。","D":"不改變產物結構。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_110020-76":{"quick":"雙倒數圖中Vmax不變(同Y截距)、Km增大→競爭性抑制劑。","detail":{"background":"Lineweaver-Burk雙倒數圖(1/v對1/[S])辨抑制類型:『「競爭性抑制劑」—與受質競爭活性位→「Vmax「不變」(Y軸截距同)、Km「增大」(X軸截距向右、斜率變大)」(增加[S]可逆轉)』。題述「加抑制劑後此特徵」對應競爭性抑制(A)。比較:非競爭性(uncompetitive,Vmax↓Km↓、線平行)、混合性(Vmax↓Km變)、不可逆(Vmax↓不可逆轉)。故A正確。臨床:competitive如methotrexate競爭DHFR、statin競爭HMG-CoA還原酶。","options":{"A":"Vmax不變、Km增大→競爭性抑制—正解。","B":"非競爭性(uncompetitive)Vmax與Km皆降。","C":"混合性Vmax降、Km變。","D":"不可逆抑制Vmax降不可逆轉。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_111020-74":{"quick":"受質濃度遠大於Km時為零級反應(速率與[S]無關、達Vmax)。","detail":{"background":"Michaelis-Menten:當『[S]「>>Km」→分母Km+[S]≈[S]→v≈Vmax(達飽和)』→『速率「與[S]無關」=「零級反應(zero-order)」』(酵素全被受質佔滿)。故A正確。對比:[S]<<Km時v∝[S]=一級反應。故A正確。記憶:高受質飽和=零級(Vmax)、低受質=一級(∝[S])。","options":{"A":"[S]>>Km時為零級反應(Vmax)—正解。","B":"一級反應是[S]<<Km。","C":"非二級。","D":"非三級。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_111020-75":{"quick":"酵素催化中酵素總量不變(可重複使用)。","detail":{"background":"酵素催化的特性:C『「酵素總量在反應中「不會改變」」(酵素為催化劑、反應前後再生、可重複使用)』正確。比較錯誤:A催化的反應「不一定放熱」(可吸熱、由反應熱力學決定);B酵素催化「會」達化學平衡(只是加速到達);D「即使無酵素,反應「仍會發生」(只是極慢)」(酵素只加速、非使原本不發生的反應發生)。故C正確。","options":{"A":"催化反應不一定放熱。","B":"酵素催化仍會達平衡。","C":"酵素總量不變(可重複使用)—正解。","D":"無酵素反應仍會發生(只是極慢)。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_111100-76":{"quick":"受質濃度極低時,反應的速率常數為kcat/KM(專一性常數)。","detail":{"background":"Michaelis-Menten在『[S]「極低(<<KM)」→v≈(kcat[E]/KM)[S]→「二階速率常數=「kcat/KM」」(專一性常數)』,反映酵素對受質的「催化效率與專一性」。故B正確。(比較:[S]極高時v=Vmax=kcat[E]、與[S]無關。)kcat/KM上限約擴散極限(10⁸–10⁹ M⁻¹s⁻¹,如「完美酵素」)。故B正確。","options":{"A":"Vmax是高[S]時的速率。","B":"kcat/KM(低[S]時速率常數,專一性常數)—正解。","C":"1/kcat非此常數。","D":"kcat×KM非此常數。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_111100-77":{"quick":"磷酸吡哆醛(PLP)與轉胺酶活性中心的「離胺酸(Lys)」形成Schiff鹼(內醛亞胺)。","detail":{"background":"磷酸吡哆醛(PLP,維生素B6活性形式)是轉胺酶(如aspartate aminotransferase)的輔酶:『靜止時PLP的醛基與「活性中心「離胺酸(Lysine)」的ε-胺基」形成「Schiff鹼(內醛亞胺internal aldimine)」』;受質胺基酸進入時與PLP形成外醛亞胺、進行轉胺。故A(lysine)正確。PLP亦為去羧酶、消旋酶等多種胺基酸代謝酶的輔酶。故A正確。","options":{"A":"PLP與活性中心離胺酸形成Schiff鹼—正解。","B":"半胱胺酸非PLP結合殘基。","C":"絲胺酸非此。","D":"精胺酸非此。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_112020-76":{"quick":"[S]=0.01mM<<Km=10mM,速率常數展現為kcat/Km=100 mM⁻¹s⁻¹。","detail":{"background":"當『[S]「<<Km」(0.01<<10)→反應在「kcat/Km」區、速率≈(kcat/Km)[E][S]』。其『「二階速率常數=kcat/Km=1000 s⁻¹/10 mM=「100 mM⁻¹ s⁻¹」」』。故D正確(單位mM⁻¹s⁻¹符合二階速率常數)。此即低受質時的專一性常數。故D正確。","options":{"A":"1000 s⁻¹為kcat(高[S]時)。","B":"單位/數值不符。","C":"單位不符。","D":"kcat/Km=100 mM⁻¹s⁻¹—正解。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_113020-74":{"quick":"競爭性抑制劑:Vmax不變、KM上升。","detail":{"background":"競爭性抑制(competitive inhibition):抑制劑與受質「競爭活性位」→『「KM「上升」(表觀親和力下降,需更多受質達半飽和)」、「Vmax「不變」(高受質可把抑制劑競爭掉、仍達原Vmax)」』。故D(Vmax不變、KM上升)正確。記憶:競爭性=Vmax不變、KM增;非競爭性(noncompetitive)=Vmax降、KM不變;uncompetitive=兩者皆降。故D正確。","options":{"A":"Vmax下降不符競爭性。","B":"KM應上升(非下降)。","C":"Vmax應不變(非下降)。","D":"Vmax不變、KM上升—正解(競爭性)。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_113020-76":{"quick":"「dehydrogenases(去氫酶)」是氧化還原酶的次類,不屬EC六大類別。","detail":{"background":"EC酵素「六大類別」:『oxidoreductase(氧化還原酶)、transferase(轉移酶)、hydrolase(水解酶)、lyase(裂解酶)、isomerase(異構酶)、ligase(連接酶)』。而『「dehydrogenase(去氫酶)」是「氧化還原酶(oxidoreductase)」「之下的次類」,「不」是六大類別之一』。故B(dehydrogenases)不屬EC命名的六大類,為正解。其餘lyases、hydrolases、isomerases皆為六大類。故B正確。","options":{"A":"lyases為六大類之一。","B":"dehydrogenases為氧化還原酶次類、非六大類—正解。","C":"hydrolases為六大類之一。","D":"isomerases為六大類之一。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_113090-76":{"quick":"雙倒數圖X軸截距為−1/Km,故Km=X截距倒數×(−1)。","detail":{"background":"Lineweaver-Burk雙倒數圖(1/v對1/[S]):直線『「X軸截距=−1/Km」、Y軸截距=1/Vmax、斜率=Km/Vmax』。故由X軸截距求Km:『Km =「X軸截距的倒數 ×(−1)」』(因X截距=−1/Km→Km=−1/X截距)。故C正確。記憶:X截距=−1/Km、Y截距=1/Vmax。故C正確。","options":{"A":"X軸截距是−1/Km(非Km本身)。","B":"X截距倒數=−Km(需再×−1)。","C":"X截距倒數×−1=Km—正解。","D":"Y截距倒數=Vmax(非Km)。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_115020-75":{"quick":"v=kcat·[E]·[S]/(KM+[S])=600×20nM×50/(10+50)=10 μM/s。","detail":{"background":"酵素反應初速度:v=Vmax[S]/(KM+[S]),Vmax=kcat×[E_total]。代入kcat=600/s、[E]=20 nM、[S]=50 μM、KM=10 μM:『Vmax=600×20 nM=12000 nM/s;v=12000×50/(10+50)=12000×(5/6)=10000 nM/s=「10 μM/s」』。故B(10,單位μM/s)正確。故B正確。","options":{"A":"1計算不符。","B":"v=10 μM/s—正解。","C":"60為kcat相關但非此。","D":"500不符。"},"sources":["Lehninger《生物化學原理》","Stryer《Biochemistry》","Harper《Illustrated Biochemistry》"]}},"med1_106100-77":{"quick":"PDH複合體用TPP、NAD⁺、硫辛酸(及FAD、CoA)為輔酶。","detail":{"background":"丙酮酸去氫酶複合體(PDH)催化pyruvate→acetyl-CoA,需「五種輔酶/輔因子」:『「TPP(維生素B1)、硫辛酸(lipoic acid)、輔酶A(CoA,B5)、FAD(B2)、NAD⁺(B3)」』(口訣「Tender Loving Care For Nancy」=TPP/Lipoic/CoA/FAD/NAD)。選項A列「TPP、NAD⁺、硫辛酸」皆為其輔酶,正確。其餘含biotin(B、D錯,biotin用於羧化非PDH)或coenzyme Q(C錯,CoQ在電子傳遞鏈)。故A正確。","options":{"A":"TPP+NAD⁺+硫辛酸皆PDH輔酶—正解。","B":"biotin非PDH輔酶。","C":"輔酶Q在電子傳遞鏈(非PDH)。","D":"biotin非PDH輔酶。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-78":{"quick":"膽固醇是維生素D的合成前驅物(7-去氫膽固醇→D3)。","detail":{"background":"維生素D合成:『皮膚中「7-去氫膽固醇(7-dehydrocholesterol,膽固醇衍生物)」經「紫外線(UVB)」轉成「膽鈣化醇(cholecalciferol, vitamin D3)」』,再經肝(25-羥化)、腎(1α-羥化)活化成calcitriol。故膽固醇是『維生素「D」』的前驅物(B)。故B正確。比較:A、E、K非由膽固醇衍生。記憶:膽固醇→維生素D、膽汁酸、類固醇激素。","options":{"A":"維生素A來自類胡蘿蔔素(非膽固醇)。","B":"膽固醇為維生素D前驅物—正解。","C":"維生素E非膽固醇衍生。","D":"維生素K非膽固醇衍生。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-95":{"quick":"PDH由三種酵素複合體組成(E1/E2/E3),此敘述正確。","detail":{"background":"丙酮酸去氫酶(PDH)缺乏→pyruvate無法轉acetyl-CoA→堆積轉乳酸→「乳酸中毒」,且神經系統「嚴重受影響」(腦倚賴有氧代謝)。正確敘述為C『PDH是「三種酵素(E1丙酮酸去氫酶、E2二氫硫辛醯轉乙醯酶、E3二氫硫辛醯去氫酶)」組成的「複合體」』。比較錯誤:A有氧時pyruvate應入TCA(非轉乙醇);B無氧時pyruvate在「細胞質」轉乳酸(非粒線體轉acetyl-CoA);D神經系統「會」受嚴重影響。故C正確。","options":{"A":"有氧時pyruvate入TCA(非生乙醇)。","B":"無氧時於細胞質轉乳酸(非粒線體)。","C":"PDH為三酵素複合體—正解。","D":"神經系統會嚴重受影響。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-77":{"quick":"乙醯基與CoA以「硫酯鍵(thioester)」連結。","detail":{"background":"乙醯輔酶A(acetyl-CoA):『乙醯基(-COCH₃)與CoA末端的「硫氫基(-SH)」形成「硫酯鍵(thioester bond)」』。硫酯鍵是「高能鍵」(水解釋放大量自由能,約−31 kJ/mol),使acetyl-CoA成為活化的乙醯基供體(入TCA、脂肪酸合成等)。故D正確。比較:醯胺、Schiff鹼、酸酐皆非此鍵。記憶:CoA的「A」活性中心是-SH,形成高能硫酯。","options":{"A":"醯胺鍵非acetyl-CoA鍵結。","B":"Schiff鹼為醛/胺縮合(非此)。","C":"酸酐非此鍵。","D":"硫酯鍵—正解(高能鍵)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-78":{"quick":"生蛋白中的avidin結合biotin、阻礙腸道吸收生物素。","detail":{"background":"『生蛋白(raw egg white)含「avidin(抗生物素蛋白)」,會「緊密結合「生物素(biotin, 維生素B7/H)」」→阻礙腸道吸收→大量生食蛋白可致「生物素缺乏(egg-white injury)」』(加熱使avidin變性即無此作用)。故B正確。biotin是羧化酶(如pyruvate carboxylase、acetyl-CoA carboxylase)的輔酶。故B正確。","options":{"A":"葉酸不受avidin影響。","B":"avidin結合生物素阻礙吸收—正解。","C":"cobalamin(B12)不受avidin影響。","D":"pyridoxine(B6)不受avidin影響。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-77":{"quick":"維生素B12(cobalamin)結構含鈷離子。","detail":{"background":"『維生素B12(cobalamin)結構中心含「鈷離子(cobalt)」』(咕啉環corrin ring螯合Co)。故D正確。B12是兩種反應的輔酶:『甲基丙二醯-CoA變位酶(methylmalonyl-CoA mutase,需腺苷鈷胺)』與『甲硫胺酸合成酶(methionine synthase,需甲基鈷胺)』。缺乏→巨球性貧血、神經病變。比較:K、E、B6不含鈷。故D正確。記憶:B12=鈷胺素(含Co)。","options":{"A":"維生素K不含鈷。","B":"維生素E不含鈷。","C":"維生素B6不含鈷。","D":"維生素B12含鈷離子—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-77":{"quick":"惡性貧血缺乏的是含鈷的水溶性維生素B12(cobalamin)。","detail":{"background":"素食者惡性貧血→缺『「維生素B12(cobalamin)」,「含「鈷(cobalt)」離子」的水溶性維生素』。故C正確。比較錯誤:A活性形式為「甲基鈷胺/腺苷鈷胺」(非氰基,氰鈷胺是補充劑形式);B含「鈷」非鐵;D「胃壁細胞分泌「內在因子(intrinsic factor)」」協助「迴腸」吸收B12(非小腸壁細胞自身分泌的泛指結合蛋白,且惡性貧血正是內在因子缺乏)。故C正確。","options":{"A":"活性形式非氰基(為甲基/腺苷鈷胺)。","B":"含鈷非鐵。","C":"含鈷離子—正解。","D":"內在因子由胃壁細胞分泌、迴腸吸收。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-77":{"quick":"維生素E包含生育酚(tocopherols)與生育三烯酚(tocotrienols)。","detail":{"background":"維生素E:C『天然維生素E包含「tocopherols(生育酚)」與「tocotrienols(生育三烯酚)」共8種型式(α-最具活性)』正確。比較錯誤:A「單碳代謝輔酶」是「葉酸」(非E);B「醌的衍生物」是「維生素K」(非E,E是色滿chromanol衍生物);D「陽光照射皮膚自行合成」是「維生素D」(非E)。故C正確。功能:維生素E是脂溶性「抗氧化劑」,保護膜脂質免於過氧化。","options":{"A":"單碳代謝輔酶為葉酸(非E)。","B":"醌衍生物為維生素K(非E)。","C":"含tocopherols與tocotrienols—正解。","D":"陽光合成者為維生素D(非E)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-78":{"quick":"biotin(生物素)缺乏會影響「羧化反應(carboxylation)」。","detail":{"background":"『生物素(biotin)是「羧化酶(carboxylase)」的輔酶,攜帶活化的CO₂進行「羧化反應」』(如pyruvate carboxylase→草醯乙酸、acetyl-CoA carboxylase→malonyl-CoA、propionyl-CoA carboxylase)。故biotin缺乏→羧化反應受阻(C)。比較:轉胺(PLP/B6)、磷酸化(ATP/激酶)、甲基化(SAM/葉酸/B12)非biotin。故C正確。記憶:biotin=CO₂載體=羧化。","options":{"A":"轉胺需PLP(B6)。","B":"磷酸化需ATP/激酶。","C":"羧化反應需biotin—正解。","D":"甲基化需SAM/葉酸。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-77":{"quick":"TPP在丙酮酸去羧酶反應中攜帶「醛基(羥乙基,活化乙醛)」。","detail":{"background":"硫胺焦磷酸(TPP,維生素B1):在丙酮酸去羧酶/PDH中,『TPP的噻唑環碳負離子攻擊丙酮酸→去羧→形成「羥乙基-TPP(hydroxyethyl-TPP)」,攜帶「活化的醛基(乙醛單元/acyl前體)」』。題問TPP攜帶的中間基團→「醛基(aldehyde group,即活化乙醛/羥乙基)」(C)。故C正確。TPP亦為α-酮戊二酸去氫酶、轉酮酶(transketolase)輔酶;B1缺乏→腳氣病/Wernicke。","options":{"A":"非甲基。","B":"醯基為後續轉移(經硫辛酸)。","C":"TPP攜帶活化醛基(羥乙基)—正解。","D":"羧基已以CO₂釋出。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-78":{"quick":"只有微生物能自行合成維生素B12(cobalamin)。","detail":{"background":"『維生素B12(cobalamin)「僅由「微生物(細菌、古菌)」合成」,動物、植物皆不能自行製造』。故C(微生物)正確。人類靠「攝取動物性食品(動物先從腸道菌或飼料獲得B12並蓄積)」取得→嚴格素食者易缺B12。植物性食物幾乎不含B12。故C正確。記憶:B12是唯一幾乎只存在動物性食品、由微生物製造的維生素。","options":{"A":"脊椎動物不能自行合成B12。","B":"昆蟲不能合成B12。","C":"微生物可合成B12—正解。","D":"植物不能合成B12。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-87":{"quick":"PDH不使用PLP(磷酸吡哆醛);PLP是轉胺酶的輔酶。","detail":{"background":"PDH複合體的輔酶為『TPP、硫辛醯胺(lipoamide)、CoA、FAD、NAD⁺』。『「磷酸吡哆醛(PLP, 維生素B6)」「不」是PDH的輔酶」(PLP用於「轉胺、去羧、消旋」等胺基酸代謝)』。故D(PLP)為「PDH不使用者」,為正解。其餘FAD、lipoamide、TPP皆PDH輔酶。故D正確。","options":{"A":"FAD為PDH輔酶。","B":"Lipoamide(硫辛醯胺)為PDH輔酶。","C":"TPP為PDH輔酶。","D":"PLP非PDH輔酶(為轉胺酶輔酶)—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-82":{"quick":"菸鹼酸(niacin, B3)缺乏致糙皮病(腹瀉、皮膚炎、癡呆)。","detail":{"background":"『菸鹼酸(niacin, 維生素B3)缺乏→「糙皮病(pellagra)」,典型「3D:Dermatitis(皮膚炎,日曬部位)、Diarrhea(腹瀉)、Dementia(癡呆),嚴重致Death」』。故B正確。Niacin是NAD⁺/NADP⁺的前驅;可由色胺酸合成(需B6),故色胺酸缺乏(如玉米飲食、類癌、Hartnup病)亦致pellagra。比較:B1腳氣病、B2口角炎、B5罕見。故B正確。","options":{"A":"B1(thiamine)缺乏致腳氣病。","B":"niacin缺乏致糙皮病(3D)—正解。","C":"B2(riboflavin)缺乏致口角炎。","D":"泛酸缺乏罕見。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-83":{"quick":"CoA結構含泛酸、ADP衍生物與「半胱胺酸『衍生的cysteamine』」—稱「含cysteine」不夠精確,為錯誤敘述。","detail":{"background":"輔酶A(CoA)結構:『「泛酸(B5)」+「β-巰基乙胺(cysteamine,由「半胱胺酸去羧」而來)」+「ADP的衍生物(3′-磷酸-ADP)」』。A稱「含「cysteine(半胱胺酸本體)」」不精確—實際是「半胱胺酸「去羧」後的cysteamine(巰基乙胺)」,故此敘述「錯誤」,為正解。其餘正確:B硫原子(-SH)與醯基結合(成硫酯);C/D CoA參與PDH及α-酮戊二酸去氫酶。故A正確(為錯誤敘述)。","options":{"A":"稱含cysteine—錯誤(實為其去羧產物cysteamine),為正解。","B":"硫原子與醯基結合,正確。","C":"參與PDH形成acetyl-CoA,正確。","D":"參與α-酮戊二酸去氫酶,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-78":{"quick":"PLP不作為單碳基團載體;單碳載體為四氫葉酸、SAM、biotin(CO₂)。","detail":{"background":"「單碳(one-carbon)基團」載體輔因子:『「四氫葉酸(THF)」攜甲基/亞甲基/甲醯基等多種單碳;「S-腺苷甲硫胺酸(SAM)」攜甲基;「biotin」攜「CO₂(單碳,羧化)」』。而『「磷酸吡哆醛(PLP)」是「轉胺/去羧/消旋」的輔酶,「不」攜帶單碳基團』。故D(PLP)為「不能作單碳載體者」,為正解。故D正確。記憶:單碳=葉酸/SAM/biotin;PLP=轉胺。","options":{"A":"四氫葉酸攜多種單碳。","B":"biotin攜CO₂(單碳)。","C":"SAM攜甲基(單碳)。","D":"PLP非單碳載體(為轉胺輔酶)—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-78":{"quick":"輔酶Q(CoQ)參與電子傳遞鏈、不參與氮代謝。","detail":{"background":"氮(胺基酸)代謝的輔酶:『「PLP(B6)」轉胺/去羧、「四氫葉酸」單碳轉移、「B12輔酶」甲基丙二醯變位/甲硫胺酸合成』皆參與氮代謝。而『「輔酶Q(coenzyme Q/泛醌ubiquinone)」是「電子傳遞鏈」的脂溶性電子載體,「不」參與氮代謝」』。故B(CoQ)為「除外者」,為正解。故B正確。","options":{"A":"PLP參與轉胺(氮代謝)。","B":"輔酶Q在電子傳遞鏈、非氮代謝—正解。","C":"四氫葉酸參與單碳/氮代謝。","D":"B12輔酶參與氮代謝。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-77":{"quick":"硫辛酸(lipoate)含2個硫氫基,在PDH中作醯基載體並轉醯基給CoA。","detail":{"background":"硫辛酸(lipoic acid/lipoate)在PDH:『含「二硫鍵(可開為2個-SH/thiol)」的環,作為「擺動手臂」—接受E1的羥乙基(乙醯)→氧化成「乙醯-二氫硫辛醯」→「把醯基轉給CoA形成acetyl-CoA(E2 transacetylase)」,自身成二氫硫辛醯(還原態)→再由E3用FAD/NAD⁺氧化再生』。題給A描述其「含2個thiol、被氧化形成雙硫鍵」的氧化還原循環(本題標準答案A)。故A正確(硫辛酸=二硫/二硫氫可逆、醯基載體)。","options":{"A":"含2個thiol、可氧化成雙硫鍵(氧化還原循環)—正解。","B":"硫辛酸經醯胺與E2離胺酸結合(此細節非題旨重點)。","C":"轉醯基至CoA(過程描述,但本題取A)。","D":"氧化態被羥乙基TPP還原並接乙醯(過程描述)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-78":{"quick":"轉胺酶活性中心輔酶為吡哆醛磷酸(PLP, 維生素B6)。","detail":{"background":"『轉胺酶(transaminase/aminotransferase)的活性中心輔酶為「吡哆醛磷酸(pyridoxal phosphate, PLP, 維生素B6衍生)」』—與活性中心離胺酸形成Schiff鹼,催化胺基轉移(胺基酸↔α-酮酸)。故B正確。PLP亦為去羧酶、消旋酶、δ-ALA合成酶等輔酶。比較:B12、葉酸、硫胺各有其反應。故B正確。記憶:轉胺=PLP(B6)。","options":{"A":"甲基鈷胺(B12)用於甲硫胺酸合成等。","B":"PLP(B6)為轉胺酶輔酶—正解。","C":"葉酸用於單碳轉移。","D":"硫胺(B1/TPP)用於去羧/轉酮。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-77":{"quick":"ALT(丙胺酸轉胺酶)的輔酶為磷酸吡哆醛(PLP)。","detail":{"background":"丙胺酸轉胺酶(alanine aminotransferase, ALT/GPT)催化『alanine+α-酮戊二酸↔pyruvate+glutamate』(轉胺反應),其輔酶為『「磷酸吡哆醛(pyridoxal phosphate, PLP, 維生素B6)」』。故C正確。所有轉胺酶皆用PLP。比較:NADPH/NADH(去氫酶)、TPP(去羧/轉酮)非轉胺輔酶。故C正確。","options":{"A":"NADPH為還原性生合成輔酶(非轉胺)。","B":"NADH為去氫酶輔酶(非轉胺)。","C":"PLP為ALT輔酶—正解。","D":"TPP為去羧/轉酮輔酶(非轉胺)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-77":{"quick":"維生素A為脂溶性,需膽汁(膽鹽)乳化幫助吸收。","detail":{"background":"『脂溶性維生素「A、D、E、K」需「膽汁(膽鹽)」乳化形成微膠粒(micelle)才能在小腸吸收』。選項中『維生素A(脂溶性)需膽汁幫助吸收』(A)。比較:B6、B12、C皆「水溶性」,不需膽汁。故A正確。臨床:膽道阻塞/脂肪吸收不良→脂溶性維生素(ADEK)缺乏。記憶:ADEK脂溶性、需膽汁與脂肪。","options":{"A":"維生素A脂溶性、需膽汁—正解。","B":"B6水溶性、不需膽汁。","C":"B12水溶性。","D":"維生素C水溶性。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-77":{"quick":"活性維生素D(calcitriol)與核受體結合、調節基因表現。","detail":{"background":"維生素D3代謝:『皮膚7-去氫膽固醇經UVB→D3(膽鈣化醇)→「肝」25-羥化→「腎」1α-羥化→「calcitriol(1α,25-(OH)₂D3,活性形式)」』。功能:B『「calcitriol與「維生素D核受體(VDR)」結合→「調節基因表現」(屬類固醇荷爾蒙機制)→增腸鈣吸收(誘導calbindin)、骨鈣動員』正確。比較錯誤:A陽光在皮膚形成的是「D3(膽鈣化醇)」非活性的1,25型;C調腸鈣吸收的是「calcitriol」非7-去氫膽固醇;D calcitriol在「腎」生成(肝只做25-羥化、生成D3則在皮膚)。故B正確。","options":{"A":"陽光在皮膚生成D3(非1,25活性型)。","B":"calcitriol結合核受體調節基因—正解。","C":"調腸鈣吸收者為calcitriol(非7-去氫膽固醇)。","D":"calcitriol於腎(1α-羥化)生成(非肝腎皆D3)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-87":{"quick":"肌肉缺乏glucose-6-phosphatase,無法釋出游離葡萄糖(不能做糖質新生最後一步)。","detail":{"background":"糖質新生(gluconeogenesis)主要在「肝(與腎)」進行,需四個「繞過糖解不可逆步驟」的特殊酵素:pyruvate carboxylase、PEPCK、fructose-1,6-bisphosphatase、「glucose-6-phosphatase」。『「肌肉「缺乏glucose-6-phosphatase」」→無法把glucose-6-P水解成「游離葡萄糖」釋入血→「肌肉不能進行有效糖質新生、也不能供血糖」』。故D正確。(肌肉肝醣分解只供自身用。)故D正確。","options":{"A":"丙酮酸去氫酶與糖質新生無關。","B":"PFK-1屬糖解(非糖質新生關鍵缺乏)。","C":"肝醣合成酶非糖質新生。","D":"肌肉缺glucose-6-phosphatase—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-88":{"quick":"乙醇(ethanol)無法轉成葡萄糖(非糖質新生受質)。","detail":{"background":"糖質新生受質:『「乳酸(lactate, 經pyruvate)、生糖胺基酸(如alanine)、甘油(glycerol, 由脂肪分解)」皆可轉成葡萄糖』。而『「乙醇(ethanol)」代謝產生「乙醯-CoA(經乙醛)」,「乙醯-CoA「不能淨合成葡萄糖」」(哺乳類無法把acetyl-CoA轉回pyruvate/草醯乙酸做淨糖質新生)』。故D(ethanol)無法轉成葡萄糖,為正解。且酒精代謝耗NAD⁺→反而抑制糖質新生(酒精性低血糖)。故D正確。記憶:脂肪酸/乙醇的acetyl-CoA不能淨成糖。","options":{"A":"乳酸可糖質新生。","B":"丙胺酸(生糖胺基酸)可。","C":"甘油可。","D":"乙醇不能轉成葡萄糖—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-89":{"quick":"玻尿酸由D-葡萄糖醛酸與N-乙醯葡萄糖胺重複組成。","detail":{"background":"『玻尿酸(hyaluronic acid)是「醣胺聚醣(GAG)」,由「「D-葡萄糖醛酸(D-glucuronic acid)」+「N-乙醯葡萄糖胺(N-acetylglucosamine)」」交替重複的雙醣單位組成』(無硫酸化、不接蛋白核心)。故D正確。功能:存於關節滑液、玻璃體、結締組織,高保水、潤滑。故D正確。記憶:HA=GlcUA + GlcNAc。","options":{"A":"非半乳糖+葡萄糖。","B":"非葡萄糖+GlcNAc。","C":"非葡萄糖醛酸+果糖。","D":"D-葡萄糖醛酸+N-乙醯葡萄糖胺—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-87":{"quick":"糖解一莫耳葡萄糖→2丙酮酸,淨需2莫耳ADP(淨產2 ATP)。","detail":{"background":"糖解淨反應:『葡萄糖 + 2 NAD⁺ + 2 ADP + 2 Pi → 2丙酮酸 + 2 NADH + 「2 ATP」+ 2 H₂O』。故「淨需「2莫耳ADP」(磷酸化生成2 ATP)、「2莫耳NAD⁺」、「2莫耳Pi」」。選項中正確計量為「2 ADP(D)」。比較:A非需4 ATP(投入期僅耗2 ATP、淨產2);B/C「NAD⁺與Pi需「2」莫耳(非1)」。故D正確。","options":{"A":"非需4 ATP(淨產2)。","B":"NAD⁺需2莫耳(非1)。","C":"Pi需2莫耳(非1)。","D":"淨需2莫耳ADP—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-88":{"quick":"纖維素(cellulose)為β(1→4)糖苷鍵的葡萄糖聚合物。","detail":{"background":"葡萄糖聚合物的鍵結:『「纖維素(cellulose)」是「β(1→4)」鍵(直鏈、可形成緊密氫鍵纖維,人不能消化)』;而『澱粉直鏈(amylose)、肝醣(glycogen)、糊精(dextran)為「α」鍵(α1→4主鏈,肝醣/支鏈澱粉另有α1→6分支)』。故C(cellulose)為β(1→4),正確。故C正確。記憶:β1→4=纖維素(結構、難消化);α1→4=澱粉/肝醣(儲存、可消化)。","options":{"A":"amylose為α(1→4)。","B":"glycogen為α(1→4)+α(1→6)。","C":"cellulose為β(1→4)—正解。","D":"dextran為α鍵。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-89":{"quick":"腎上腺素「不會」增加肝臟糖解(肝應升糖→促糖質新生/肝醣分解),故此為錯誤敘述。","detail":{"background":"緊急時腎上腺素升血糖、供肌肉運動:『「肝臟」→促「肝醣分解+糖質新生」、「「抑制」糖解(以「釋出」葡萄糖升血糖)」;「骨骼肌」→促「肝醣分解+糖解(供肌肉自身ATP)」』。題問「何者「錯誤(不正確)」」→『C「增加「肝臟」的「糖解」」錯誤』(肝臟此時應「減少」糖解、輸出葡萄糖)。故C為正解(錯誤敘述)。其餘A、B(肌肉肝醣分解↑、糖解↑)、D(肝糖質新生↑)皆正確。故C正確(為錯誤者)。","options":{"A":"骨骼肌肝醣分解增加,正確。","B":"骨骼肌糖解增加,正確。","C":"稱增加肝臟糖解—錯誤(肝應抑制糖解、輸出葡萄糖),為正解。","D":"肝糖質新生增加,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-87":{"quick":"肝醣合成酶把葡萄糖以α(1→4)鍵加到肝醣鏈的非還原端。","detail":{"background":"肝醣合成酶(glycogen synthase):D『以「UDP-葡萄糖」為糖供體,把葡萄糖殘基以「α(1→4)鍵」加到肝醣鏈的「非還原端」延長』正確。比較錯誤:A此酶「磷酸化後「失活」」(去磷酸化才活化;與磷酸化酶相反);B存在肝「與肌肉等」多處(非只肝);C糖供體是「UDP-glucose」(非glucose-6-P)。故D正確。記憶:肝醣合成酶用UDP-glc、α1→4延長、去磷酸化活化(胰島素促進)。","options":{"A":"磷酸化後失活(去磷酸化才活化)。","B":"不只存於肝(肌肉等亦有)。","C":"糖供體為UDP-glucose(非G6P)。","D":"以α(1→4)加到非還原端—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-88":{"quick":"B1缺乏的乳酸中毒與丙酮酸去氫酶複合體(PDH,需TPP)功能受損有關。","detail":{"background":"維生素B1(thiamine)→TPP,是『「丙酮酸去氫酶複合體(PDH)」與「α-酮戊二酸去氫酶」』的輔酶。『B1缺乏→PDH失能→pyruvate無法轉acetyl-CoA→堆積轉「乳酸」→「乳酸中毒」』。故D(PDH)正確。臨床:酗酒/營養不良B1缺乏→Wernicke腦病+乳酸中毒。比較:異檸檬酸/蘋果酸去氫酶用NAD⁺、乳酸去氫酶不依賴TPP。故D正確。","options":{"A":"異檸檬酸去氫酶非TPP依賴。","B":"乳酸去氫酶非TPP依賴。","C":"蘋果酸去氫酶非TPP依賴。","D":"PDH(TPP依賴)—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-89":{"quick":"胰島素增加肝外組織(肌肉/脂肪)GLUT4作用→攝入葡萄糖降血糖。","detail":{"background":"胰島素降血糖機制:『促進「肝外組織(肌肉、脂肪)」把「「GLUT4」「轉位到細胞膜」」→增加葡萄糖攝入』。故B正確。比較錯誤:A GLUT1為基礎型、非胰島素調控的主要降糖者;C/D胰島素確會促glucokinase(肝)但「降血糖的關鍵是GLUT4」;且肝用glucokinase(非hexokinase),肝外用hexokinase。最符合的降糖機制為B(GLUT4)。注射胰島素未進食→低血糖,正是GLUT4過度攝糖。故B正確。","options":{"A":"GLUT1非胰島素主要調控。","B":"增加肝外GLUT4攝糖—正解。","C":"肝用glucokinase(非hexokinase),非主要降糖。","D":"非降糖主機制。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-85":{"quick":"玻尿酸由D-葡萄糖醛酸與N-乙醯葡萄糖胺重複組成。","detail":{"background":"玻尿酸(hyaluronic acid)是體內含量最多的「醣胺聚醣(GAG)/黏多醣」:『重複雙醣單位=「D-葡萄糖醛酸(D-glucuronic acid)」+「N-乙醯葡萄糖胺(N-acetylglucosamine)」』(C)。它「不硫酸化、不共價接核心蛋白」,分子量極大、高度水合,見於滑液、玻璃體、軟骨。故C正確。記憶:HA=GlcUA+GlcNAc(與軟骨素chondroitin的GlcUA+GalNAc不同)。","options":{"A":"非半乳糖+N-乙醯半乳糖胺。","B":"非葡萄糖+果糖。","C":"D-葡萄糖醛酸+N-乙醯葡萄糖胺—正解。","D":"第二單位為GlcNAc(非GalNAc)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-86":{"quick":"胰島素刺激葡萄糖進入肌肉細胞(經GLUT4)。","detail":{"background":"胰島素作用(降血糖、促合成代謝):D『「刺激葡萄糖經GLUT4進入肌肉/脂肪細胞」』正確。比較錯誤:A胰島素「活化(非抑制)」磷酸二酯酶→降cAMP(促合成);B胰島素「增加(非減少)」肝細胞fructose-2,6-bisphosphate→促糖解;C胰島素「促進(非抑制)」肝糖解。故D正確。記憶:胰島素=促攝糖(GLUT4)、促糖解/肝醣合成、降cAMP、升F-2,6-BP。","options":{"A":"胰島素活化磷酸二酯酶降cAMP(非抑制)。","B":"胰島素增加F-2,6-BP(非減少)。","C":"胰島素促進肝糖解(非抑制)。","D":"刺激葡萄糖入肌肉細胞—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-87":{"quick":"2,3-雙磷酸甘油酸(2,3-BPG)會降低血紅素對氧的親和力。","detail":{"background":"糖解的支路產物『「2,3-雙磷酸甘油酸(2,3-BPG, Rapoport-Luebering shunt)」結合去氧血紅素、「降低Hb對O₂親和力」→氧解離曲線右移、促組織釋氧』。故B正確。比較:1,3-BPG是糖解中間物(高能);F-1,6-BP、F-2,6-BP是糖解/調節中間物,不影響Hb氧親和力。故B正確。生理:高海拔/慢性缺氧2,3-BPG↑。","options":{"A":"1,3-BPG為糖解高能中間物(不調Hb)。","B":"2,3-BPG降Hb氧親和力—正解。","C":"F-1,6-BP不調Hb。","D":"F-2,6-BP為糖解調節物(不調Hb)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-92":{"quick":"葡萄糖由腸腔入上皮細胞為與鈉離子「同向共運輸(symport, SGLT)」。","detail":{"background":"小腸吸收葡萄糖:『腸腔側經「「鈉-葡萄糖同向共運輸蛋白(SGLT1)」」—利用Na⁺由高到低的電化學梯度「帶動葡萄糖「逆濃度」入細胞(次級主動運輸、symport同向)」』;基底側再經GLUT2(促進性擴散)入血。故C(與Na⁺同向共運輸symport)正確。比較:facilitated diffusion(GLUT,基底側)、antiport反向、primary active(直接耗ATP如Na-K幫浦)。故C正確。","options":{"A":"促進性擴散在基底側(GLUT2)。","B":"非反向運輸(antiport)。","C":"與Na⁺同向共運輸(SGLT symport)—正解。","D":"非直接耗ATP的初級主動運輸。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-89":{"quick":"無氧時可完整進行糖解、產生2分子乳酸(NADH被再氧化回NAD⁺)。","detail":{"background":"無氧糖解:『「葡萄糖→2丙酮酸(產2 ATP、2 NADH)」→丙酮酸經「乳酸去氫酶(LDH)」「還原成「乳酸」、同時把NADH氧化回NAD⁺」→使糖解持續(NAD⁺再生)」』。故A『可完整進行糖解、產生2分子乳酸』正確。比較錯誤:B無氧仍「產ATP(基質階層磷酸化)」;C糖解淨產ATP、NADH被LDH再氧化(非「同時淨生成NADH」);D無氧「可以」進行糖解。故A正確。記憶:無氧時LDH再生NAD⁺維持糖解。","options":{"A":"完整糖解產2乳酸(NAD⁺再生)—正解。","B":"無氧仍產ATP(基質階層)。","C":"NADH被LDH再氧化(非淨生成)。","D":"無氧可進行糖解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-88":{"quick":"肝素(heparin)含α(1→4)糖苷鍵。","detail":{"background":"醣胺聚醣(GAG)鍵結:『「肝素(heparin)」的主鏈含「α(1→4)」鍵(高度硫酸化、抗凝血)』。而『軟骨素A(chondroitin sulfate A)、玻尿酸、皮膚素(dermatan sulfate)主鏈為「β」鍵』。故B(heparin)為α(1→4),正確。故B正確。臨床:heparin是抗凝劑(活化抗凝血酶III)。","options":{"A":"軟骨素為β鍵。","B":"肝素含α(1→4)—正解。","C":"玻尿酸為β鍵。","D":"皮膚素為β鍵。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-89":{"quick":"丙酮酸須先轉成acetyl-CoA才能進入克氏循環。","detail":{"background":"糖解產生的『「丙酮酸(pyruvate)」在「有氧」時進入粒線體,由「丙酮酸去氫酶(PDH)」「氧化去羧成「acetyl-CoA」」→才能進入「克氏循環(TCA)」完全氧化』。故B正確。比較:轉乳酸(無氧、不入TCA)、SAM(甲基供體無關)、PEP(糖質新生方向)。故B正確。記憶:pyruvate→acetyl-CoA(PDH)是糖代謝進入TCA的關卡。","options":{"A":"轉乳酸是無氧路徑(不入TCA)。","B":"先轉acetyl-CoA才入TCA—正解。","C":"SAM與此無關。","D":"PEP為糖質新生方向。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-78":{"quick":"丙酮酸經乳酸去氫酶轉乳酸時,需NADH(被氧化成NAD⁺)。","detail":{"background":"『「乳酸去氫酶(LDH)」催化「pyruvate + 「NADH」 → lactate + NAD⁺」』(把NADH氧化、再生NAD⁺供糖解持續)。故所需輔酶為C(NADH)。比較:FADH₂、四氫葉酸、抗壞血酸皆非LDH輔酶。故C正確。生理:劇烈運動/缺氧時此反應維持無氧糖解。記憶:LDH用NADH/NAD⁺循環。","options":{"A":"FADH₂非LDH輔酶。","B":"四氫葉酸非此。","C":"NADH(氧化成NAD⁺)—正解。","D":"抗壞血酸非此。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-89":{"quick":"肝醣磷酸化酶把肝醣降解成glucose-1-phosphate(非直接glucose-6-P),故A為錯誤敘述。","detail":{"background":"肝醣磷酸化酶(glycogen phosphorylase, GP):催化『肝醣 + Pi → 「glucose-1-phosphate」 + 縮短的肝醣』(磷酸解、非水解);G1P再經phosphoglucomutase轉G6P。題問「何者「錯誤」」→『A稱「降解成「glucose-6-phosphate」」「錯誤」(直接產物是「glucose-1-phosphate」)』,為正解。其餘正確:B G6P(肌肉)使偏T態(less active);C AMP偏R態(active);D被phosphorylase b kinase磷酸化→轉活性a型。故A正確(為錯誤者)。","options":{"A":"稱降解成G6P—錯誤(直接產物為G1P),為正解。","B":"G6P偏T態(失活),正確。","C":"AMP偏R態(活化),正確。","D":"磷酸化轉活性a型,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-91":{"quick":"次級主動運輸利用「他種離子(如Na⁺)梯度」作能量來源。","detail":{"background":"運輸分類:『「次級主動運輸(secondary active transport)」—「不「直接」耗ATP,而是「利用「他種離子(常為Na⁺)的電化學梯度」(該梯度由初級主動運輸如Na-K幫浦建立)」帶動溶質逆濃度運輸」(共運/反運)』。故D正確。比較:促進性擴散/被動運輸(順梯度、不耗能)、初級主動(直接水解ATP)。故D正確。例:SGLT(Na⁺-葡萄糖)、Na⁺-Ca²⁺交換。","options":{"A":"促進性擴散順梯度、不耗能。","B":"被動運輸不耗能。","C":"初級主動直接耗ATP。","D":"次級主動利用離子梯度—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-92":{"quick":"Cori cycle中肝臟以糖質新生把乳酸轉回葡萄糖。","detail":{"background":"科里循環(Cori cycle):『「肌肉」無氧糖解產「乳酸」→血液送「肝」→「肝以「糖質新生」把乳酸轉回「葡萄糖」」→血液送回肌肉』。故C正確。比較錯誤:A乳酸是「肌肉→肝」(非肝→肌肉);B葡萄糖是「肝→肌肉」(非肌肉→肝);D「肝(非骨骼肌)」做糖質新生、且產物是葡萄糖(非乳酸)。故C正確。意義:把肌肉乳酸的代謝負擔轉給肝、再循環為糖。","options":{"A":"乳酸方向為肌肉→肝(非肝→肌肉)。","B":"葡萄糖方向為肝→肌肉。","C":"肝以糖質新生產葡萄糖—正解。","D":"糖質新生在肝(非肌肉)、產葡萄糖。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-93":{"quick":"丙酮酸激酶(pyruvate kinase)催化的步驟在生理條件下不可逆。","detail":{"background":"糖解的「三個不可逆(放熱大、調控)步驟」由『「己糖激酶(hexokinase)、磷酸果糖激酶-1(PFK-1)、丙酮酸激酶(pyruvate kinase)」』催化。故C(pyruvate kinase)為不可逆步驟之一,正確。比較:enolase、phosphoglycerate kinase、aldolase催化的步驟「近平衡、可逆」。故C正確。意義:這三步是調控與糖質新生需繞道之處。","options":{"A":"enolase反應可逆。","B":"磷酸甘油酸激酶反應可逆。","C":"丙酮酸激酶步驟不可逆—正解。","D":"醛縮酶反應可逆。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-94":{"quick":"麥芽糖為Glcα(1→4)Glc(兩葡萄糖以α1→4相連)。","detail":{"background":"常見雙醣:『「麥芽糖(maltose)=Glc「α(1→4)」Glc」(C);「乳糖(lactose)=Gal「β(1→4)」Glc」(B);「蔗糖(sucrose)=Glc「α(1↔2)」Fru」(A);「海藻糖(trehalose)=Glcα(1→1)Glc」(D)』。題求「Glcα(1→4)Glc」→C(麥芽糖)。故C正確。記憶:麥芽糖α1→4、乳糖β1→4(Gal-Glc)、蔗糖α1-β2(還原端封閉)。","options":{"A":"Glcα(1→2)Fru為蔗糖。","B":"Galβ(1→4)Glc為乳糖。","C":"Glcα(1→4)Glc為麥芽糖—正解。","D":"Glcα(1→1)Glc為海藻糖。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-95":{"quick":"葡萄糖入細胞後經磷酸化(成glucose-6-P)被留在細胞內代謝。","detail":{"background":"『葡萄糖入細胞後立即被「己糖激酶/葡萄糖激酶「磷酸化」成「glucose-6-phosphate」」→「帶負電、無法經GLUT逆向擴散出細胞」→「留在細胞內」進入糖解/肝醣/五碳糖途徑」』。故B(phosphorylation)正確。此亦維持細胞內外葡萄糖濃度梯度、促持續攝入。比較:醣化、棕櫚醯化、乙醯化非此用途。故B正確。","options":{"A":"醣化非此用途。","B":"磷酸化成G6P留住葡萄糖—正解。","C":"棕櫚醯化為脂質修飾。","D":"乙醯化非此。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-90":{"quick":"pyruvate→PEP需pyruvate carboxylase與PEPCK共同作用。","detail":{"background":"糖質新生繞過「丙酮酸激酶不可逆步驟」:『「pyruvate carboxylase(粒線體,需biotin/ATP)→草醯乙酸(OAA)」→「PEP carboxykinase(PEPCK)→磷酸烯醇丙酮酸(PEP)」』。故由pyruvate生成PEP需此「兩酵素共同作用」(C)。故C正確。記憶:pyruvate→OAA→PEP(carboxylase + PEPCK);丙酮酸激酶/去氫酶屬糖解或入TCA方向(非糖質新生)。","options":{"A":"丙酮酸激酶/去氫酶非糖質新生酵素。","B":"丙酮酸激酶屬糖解方向。","C":"pyruvate carboxylase + PEPCK—正解。","D":"丙酮酸去氫酶屬入TCA。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-88":{"quick":"甘油醛-3-磷酸去氫酶(GAPDH)是糖解中唯一把電子轉給NAD⁺的氧化還原步驟。","detail":{"background":"糖解中『唯一的「氧化還原(產NADH)」步驟由「甘油醛-3-磷酸去氫酶(GAPDH)」催化:「甘油醛-3-P + NAD⁺ + Pi →1,3-雙磷酸甘油酸 + NADH」』。故B正確。比較:enolase(脫水)、pyruvate kinase(基質階層磷酸化)非氧化還原;pyruvate dehydrogenase在「糖解之後(粒線體)」、非糖解步驟。故B正確。記憶:糖解唯一產NADH=GAPDH。","options":{"A":"enolase為脫水(非氧化還原)。","B":"GAPDH轉電子給NAD⁺—正解。","C":"PDH在糖解之後(非糖解步驟)。","D":"丙酮酸激酶為基質階層磷酸化。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-90":{"quick":"葡萄糖→acetyl-CoA「不需」PEPCK(PEPCK屬糖質新生)。","detail":{"background":"葡萄糖代謝成acetyl-CoA的路徑(糖解+PDH)需:『GAPDH(糖解)、pyruvate kinase(糖解產pyruvate)、PDH複合體(pyruvate→acetyl-CoA)』。而『「PEP carboxykinase(PEPCK)」是「糖質新生(反方向)」酵素,「不」參與葡萄糖→acetyl-CoA』。故D(PEPCK)為「不需者」,為正解。故D正確。記憶:PEPCK=糖質新生(OAA→PEP),非分解方向。","options":{"A":"GAPDH參與糖解,需要。","B":"丙酮酸激酶產pyruvate,需要。","C":"PDH產acetyl-CoA,需要。","D":"PEPCK屬糖質新生、不需—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-79":{"quick":"核苷三磷酸以「磷酸酐鍵(phosphoanhydride bond)」攜帶並傳遞能量。","detail":{"background":"ATP等核苷三磷酸:『分子中「兩個「磷酸酐鍵(phosphoanhydride bond)」(β、γ磷酸間)」是「高能鍵」,水解釋放大量自由能(約−30 kJ/mol)→「攜帶與傳遞能量」』。故A正確。比較:磷酸二酯鍵(連核苷酸於核酸骨架)、糖苷鍵(鹼基-糖)、氫鹼鍵(鹼基配對)非能量貨幣鍵。故A正確。記憶:ATP高能=磷酸酐鍵。","options":{"A":"磷酸酐鍵(高能)—正解。","B":"磷酸二酯鍵連核酸骨架。","C":"糖苷鍵連鹼基與糖。","D":"氫鍵為鹼基配對。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-87":{"quick":"無氧時1莫耳葡萄糖經糖解+LDH淨產2莫耳ATP(NADH被再氧化、不淨累積)。","detail":{"background":"無氧糖解(葡萄糖→2乳酸):『糖解淨產「2 ATP」、2 NADH;NADH「被LDH氧化(轉乳酸)再生NAD⁺」→「NADH「不淨累積」」』。故淨產物為「2莫耳ATP」(B)。比較:C/D稱「還有2 NADH」錯(NADH被消耗於生乳酸)。故B正確。記憶:無氧糖解淨=2 ATP(無NADH淨剩、無乳酸時才剩NADH)。","options":{"A":"淨產2 ATP(非1)。","B":"淨產2莫耳ATP—正解。","C":"NADH被LDH再氧化(不淨剩)。","D":"NADH不淨累積。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-88":{"quick":"飲食澱粉(直鏈/支鏈)在消化道被水解成葡萄糖與麥芽糖(及異麥芽糖、糊精)。","detail":{"background":"澱粉消化:『「唾液與胰「α-澱粉酶(amylase)」水解α(1→4)鍵」→產「葡萄糖、麥芽糖(maltose)、麥芽三糖、(支鏈處)α-極限糊精」;再經小腸刷狀緣「麥芽糖酶/異麥芽糖酶」分解成葡萄糖吸收』。故A(glucose與maltose)為主要水解產物,正確。比較:消化道水解產「游離糖」非磷酸化糖(G1P/G6P是細胞內肝醣分解產物)。故A正確。","options":{"A":"葡萄糖與麥芽糖—正解。","B":"G1P為細胞內(非消化道)。","C":"G1P非消化道產物。","D":"G6P非消化道產物。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-89":{"quick":"α-D-glucose與β-D-glucose互為「異頭物(anomers)」(C1異頭碳構型不同)。","detail":{"background":"『「異頭物(anomers)」:單醣環化時「異頭碳(葡萄糖的C1)」產生的兩種構型(α、β)互為異頭物』。故D『α-D-glucose與β-D-glucose』為異頭物,正確。比較:A葡萄糖vs果糖(醛糖vs酮糖,構造異構);B葡萄糖vs甘露糖(C2不同=差向異構epimer);C D-vs L-glucose(對映異構)。故D正確。記憶:異頭物=只差異頭碳(C1)構型。","options":{"A":"葡萄糖vs果糖為功能基異構。","B":"葡萄糖vs甘露糖為C2差向異構物。","C":"D-vs L-為對映異構。","D":"α-vs β-D-glucose為異頭物—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-90":{"quick":"紅血球「無粒線體」,丙酮酸不能轉acetyl-CoA入TCA,故此敘述錯誤。","detail":{"background":"紅血球葡萄糖代謝:『「成熟紅血球「無粒線體」」→「只能「無氧糖解」(產乳酸,A正確)」、「五碳糖磷酸途徑供NADPH(維持GSH還原態抗氧化,C、D正確)」』。題問「何者「錯誤」」→『B「pyruvate轉acetyl-CoA進一步代謝」「錯誤」(無粒線體、無PDH、無TCA、無氧化磷酸化)』,為正解。故B正確(為錯誤者)。記憶:RBC無粒線體→只糖解+PPP。","options":{"A":"產乳酸,正確。","B":"稱pyruvate轉acetyl-CoA—錯誤(RBC無粒線體),為正解。","C":"PPP供NADPH維持GSH,正確。","D":"可走PPP,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-87":{"quick":"五碳糖磷酸途徑非氧化期由「轉酮酶與轉醛醇酶」重組碳骨架。","detail":{"background":"五碳糖磷酸途徑(PPP):『「氧化期」產NADPH與ribulose-5-P;「非氧化期」由「「轉酮酶(transketolase,需TPP,轉2碳單位)」與「轉醛醇酶(transaldolase,轉3碳單位)」」把五碳糖「重組成「果糖-6-磷酸、甘油醛-3-磷酸」」(與糖解互通)』。故B正確。故B正確。記憶:PPP非氧化期=transketolase + transaldolase的碳骨架重排。","options":{"A":"單碳代謝為葉酸系統(非PPP重排)。","B":"轉酮酶與轉醛醇酶—正解。","C":"無此甲基轉移酶途徑。","D":"無此羧化/還原途徑。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-88":{"quick":"纖維素(cellulose)為結構型多醣(非儲存型)。","detail":{"background":"多醣分類:『「結構型多醣」=「纖維素(cellulose, β1→4葡萄糖,植物細胞壁)」、幾丁質;「儲存型多醣」=「直鏈澱粉(amylose)、支鏈澱粉(amylopectin)(植物)、肝醣(glycogen)(動物)」(皆α鍵、可動員供能)』。故A(cellulose)為結構型,正確。故A正確。記憶:β鍵=結構(難消化);α鍵=儲存(可消化)。","options":{"A":"纖維素為結構型多醣—正解。","B":"直鏈澱粉為儲存型。","C":"支鏈澱粉為儲存型。","D":"肝醣為儲存型。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-95":{"quick":"胰島素使GSK3「磷酸化」而被「抑制」→解除對肝醣合成酶的抑制、促肝醣合成。","detail":{"background":"胰島素活化肝醣合成酶(GS)機制:『胰島素→PI3K→「Akt(PKB)」→「使「GSK3「磷酸化」」→「GSK3「失活(被抑制)」」→「GSK3「不再磷酸化抑制GS」」→GS去磷酸化「活化」→肝醣合成↑」』。故D『使GSK3磷酸化、抑制GSK3』正確。比較:GSK3被磷酸化是「失活」(與多數激酶相反);A/B/C的活性方向不符。故D正確。記憶:胰島素→Akt磷酸化GSK3使之失活→GS活化。","options":{"A":"去磷酸化提高GSK3活性,不符。","B":"磷酸化卻說提高活性,不符。","C":"去磷酸化抑制,不符(應磷酸化)。","D":"磷酸化GSK3使之失活→促肝醣合成—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-78":{"quick":"ABO血型抗原差異在於膜醣蛋白/醣脂「末端組成的單醣種類」不同。","detail":{"background":"ABO血型:『紅血球膜「醣蛋白/醣脂」抗原的「「末端單醣」不同」決定血型:「H抗原(O型)」末端為「岩藻糖+半乳糖」;「A型」末端加「N-乙醯半乳糖胺(GalNAc)」;「B型」末端加「半乳糖(Gal)」』(由各自的醣基轉移酶決定)。故D(末端單醣種類不同)正確。故D正確。記憶:A=加GalNAc、B=加Gal、O=只到H(無加)。","options":{"A":"非脂肪組成不同。","B":"非葡萄糖載體不同。","C":"非醣蛋白數量(是末端單醣種類)。","D":"末端組成單醣種類不同—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-81":{"quick":"GSK3磷酸化GS前,需casein kinase II先做「引子(priming)磷酸化」。","detail":{"background":"肝醣合成酶(GS)的階層磷酸化:『「GSK3」磷酸化GS前,需「「酪蛋白激酶II(casein kinase II, CK2)」先在GS的C端「引子位(priming site)」磷酸化」→GSK3才能依序往N端逐一磷酸化(每次認上一個被磷酸化的殘基,間隔4)』。故A(casein kinase II)正確。故A正確。記憶:GSK3需上游CK2引子磷酸化才作用(故名glycogen synthase kinase「3」)。","options":{"A":"酪蛋白激酶II先引子磷酸化—正解。","B":"磷酸化酶激酶作用於磷酸化酶(非GS引子)。","C":"PKA非GSK3引子激酶。","D":"PKB(Akt)使GSK3失活(非引子)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-92":{"quick":"1葡萄糖完全分解到acetyl-CoA共產4個NADH(糖解2 + PDH 2)。","detail":{"background":"從1葡萄糖到acetyl-CoA階段的NADH:『「糖解(GAPDH)」產「2 NADH」(每三碳1個×2);「丙酮酸去氫酶(PDH)」把「2 pyruvate→2 acetyl-CoA」再產「2 NADH」』→『共「4 NADH」』。故C(4)正確。(若再算入TCA每acetyl-CoA 3 NADH×2=6,則更多,但題只問「到acetyl-CoA」階段。)故C正確。","options":{"A":"2僅糖解部分。","B":"3不符。","C":"糖解2+PDH 2=4 NADH—正解。","D":"10為含TCA全程的概數(非到acetyl-CoA)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-96":{"quick":"受質階層磷酸化在細胞質與粒線體皆可;氧化磷酸化僅在粒線體。","detail":{"background":"兩種ATP生成:『「受質階層磷酸化(substrate-level)」—由高能中間物直接轉磷酸給ADP,「細胞質(糖解:1,3-BPG、PEP)「與」粒線體(TCA:succinyl-CoA→GTP)「皆可」」;「氧化磷酸化(oxidative)」—靠電子傳遞鏈建立質子梯度驅動ATP synthase,「只在「粒線體內膜」」』。故C正確。故C正確。記憶:基質磷酸化兩處皆有、氧化磷酸化僅粒線體。","options":{"A":"基質磷酸化非只在粒線體。","B":"基質磷酸化非只在細胞質(粒線體亦有)。","C":"基質磷酸化兩處皆可、氧化磷酸化僅粒線體—正解。","D":"氧化磷酸化僅粒線體但基質磷酸化兩處。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-95":{"quick":"電子傳遞時氫離子由「基質」泵到「膜間隙(內外膜間)」。","detail":{"background":"電子傳遞鏈:『複合體I、III、IV在傳電子時「把H⁺「由粒線體「基質(matrix)」泵到「膜間隙(內外膜間)」」」→建立「跨內膜質子梯度(膜間隙H⁺高、酸)」→驅動ATP synthase』。故D(基質→膜間隙)正確。比較:H⁺不進細胞質(外膜對小分子通透但泵送是跨內膜)。故D正確。記憶:質子泵向膜間隙、回流經ATP synthase入基質。","options":{"A":"非膜間隙→細胞質。","B":"非細胞質→膜間隙。","C":"方向相反(非膜間隙→基質)。","D":"基質→膜間隙—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-96":{"quick":"細胞色素c是最後的可移動載體,把電子交給複合體IV(再還原O₂)。","detail":{"background":"電子傳遞鏈末端:『「細胞色素c(cytochrome c)」(膜間隙側可移動載體)把電子交給「複合體IV(細胞色素c氧化酶)」→「複合體IV「把電子交給O₂」還原成水」』。題選項中「最接近O₂、傳遞給還原O₂之複合體」者為「cytochrome c(D)」。比較:NADH(complex I入口)、FADH₂(complex II)、CoQ(I/II→III)皆在上游。故D正確(嚴格說複合體IV才直接還原O₂,但選項中cytochrome c為終端載體)。","options":{"A":"NADH在complex I入口(上游)。","B":"FADH₂在complex II(上游)。","C":"CoQ把電子由I/II傳給III(上游)。","D":"細胞色素c為終端載體(交complex IV還原O₂)—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-95":{"quick":"ATP在「基質側」由ATP synthase合成(非膜間隙),故此敘述錯誤。","detail":{"background":"ATP synthase(複合體V):A位於粒線體內膜(正確);B利用內膜兩側H⁺濃度差(質子動力)合成ATP(正確);D合成涉及F1的α/β次單元構象(四級結構)旋轉變化(binding change機制,正確)。C「ATP會在「內外膜之間的間隙」形成」「錯誤」—『ATP在「基質(matrix)側」的F1頭部合成(H⁺由膜間隙經F0回流入基質)』。故C為正解(錯誤敘述)。記憶:H⁺自膜間隙→基質,ATP在基質側生成。","options":{"A":"位於內膜,正確。","B":"用H⁺濃度差合成ATP,正確。","C":"稱ATP在膜間隙形成—錯誤(在基質側),為正解。","D":"涉及四級結構旋轉變化,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-96":{"quick":"CoQ把電子由複合體I(及II)傳給「複合體III」(非II),故此敘述錯誤。","detail":{"background":"電子傳遞鏈:A O₂為最終電子受者(正確);B NADH氧化於複合體I(正確);D cytochrome c把電子由III傳給IV(正確)。C「CoQ協助把電子由「complex I傳到「complex II」」」「錯誤」—『「輔酶Q(CoQ/泛醌)」收集「複合體I「與」複合體II」的電子,「傳給「複合體III」」(不是傳到II)』。故C為正解(錯誤敘述)。記憶:CoQ是I與II匯入、再交給III的樞紐。","options":{"A":"O₂為最終電子受者,正確。","B":"NADH氧化於complex I,正確。","C":"稱CoQ把電子由I傳到II—錯誤(應傳給III),為正解。","D":"cyt c由III傳給IV,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-88":{"quick":"2-磷酸甘油酸不是高能磷酸供體,無法直接受質階層磷酸化生成ATP。","detail":{"background":"受質階層磷酸化需「高能磷酸/硫酯中間物」直接轉磷酸給ADP:『「1,3-雙磷酸甘油酸(→3-PG,經phosphoglycerate kinase)、磷酸烯醇丙酮酸PEP(→pyruvate,經pyruvate kinase)、琥珀醯-CoA(→succinate,經succinyl-CoA synthetase生GTP)」皆可』。而『「2-磷酸甘油酸(2-PG)」是「低能磷酸酯」、「不」能直接驅動ATP合成」(它只是enolase的受質、轉成PEP後才高能)』。故A(2-PG)為「無法者」,為正解。故A正確。","options":{"A":"2-磷酸甘油酸非高能、無法直接磷酸化—正解。","B":"PEP為高能(pyruvate kinase)。","C":"琥珀醯-CoA為高能硫酯(生GTP)。","D":"1,3-BPG為高能(phosphoglycerate kinase)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-89":{"quick":"奇數碳脂肪酸β氧化末端的丙醯-CoA經轉化以「琥珀醯-CoA」進入TCA。","detail":{"background":"奇數碳脂肪酸β氧化:『最後產生一個「丙醯-CoA(propionyl-CoA, 3碳)」→經「丙醯-CoA羧化酶(biotin)→甲基丙二醯-CoA→甲基丙二醯-CoA變位酶(B12)→「琥珀醯-CoA(succinyl-CoA)」」進入「克氏循環」』。故題問「直接進入TCA的形式」為B(succinyl-CoA)。(丙醯-CoA本身非TCA中間物、需先轉succinyl-CoA。)故B正確。臨床:B12缺乏→甲基丙二酸血症。","options":{"A":"α-酮戊二酸非丙醯-CoA途徑。","B":"轉成琥珀醯-CoA入TCA—正解。","C":"草醯乙酸非此途徑直接產物。","D":"丙醯-CoA需先轉succinyl-CoA才入TCA。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-95":{"quick":"電子傳遞鏈最後階段由細胞色素c氧化酶(複合體IV)催化(還原O₂)。","detail":{"background":"電子傳遞鏈順序:『複合體I(NADH去氫酶)/II(琥珀酸去氫酶)→CoQ→複合體III(細胞色素bc1)→cyt c→「複合體IV(細胞色素c氧化酶, cytochrome oxidase)→把電子交給「O₂」還原成水(最後階段)」』。故A(cytochrome oxidase, 複合體IV)參與最後階段,正確。比較:NADH去氫酶(I,入口)、琥珀酸去氫酶(II)、ubiquinone:cyt c氧化還原酶(III)在上游。故A正確。","options":{"A":"細胞色素c氧化酶(complex IV)—正解(最後還原O₂)。","B":"琥珀酸去氫酶為complex II(上游)。","C":"此為complex III(上游)。","D":"NADH去氫酶為complex I(入口)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-87":{"quick":"草醯乙酸與α-酮戊二酸各經一次轉胺直接生成天門冬胺酸與麩胺酸。","detail":{"background":"TCA中間產物經「一次轉胺」直接成胺基酸:『「草醯乙酸(oxaloacetate)+麩胺酸 ↔ 「天門冬胺酸(aspartate)」+α-酮戊二酸」;「α-酮戊二酸(α-ketoglutarate)+胺基酸 ↔ 「麩胺酸(glutamate)」」』。故A(oxaloacetate與α-ketoglutarate)正確—兩者皆為α-酮酸、可直接轉胺成對應胺基酸。比較:檸檬酸、琥珀酸、蘋果酸、異檸檬酸非α-酮酸、不能一步轉胺成胺基酸。故A正確。","options":{"A":"草醯乙酸→Asp、α-酮戊二酸→Glu—正解。","B":"檸檬酸/琥珀酸非α-酮酸。","C":"琥珀酸/蘋果酸非α-酮酸。","D":"異檸檬酸非可一步轉胺者。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-88":{"quick":"甘油醛-3-磷酸去氫酶(GAPDH)催化的反應不產生CO₂。","detail":{"background":"產CO₂(去羧)的去氫酶:『異檸檬酸去氫酶(isocitrate DH)、α-酮戊二酸去氫酶、丙酮酸去氫酶(PDH)皆「氧化「去羧」、產CO₂」』。而『「甘油醛-3-磷酸去氫酶(GAPDH)」催化糖解中「氧化+磷酸化(加Pi)」、「不去羧、「不產CO₂」」』。故B(GAPDH)為「不產CO₂者」,為正解。故B正確。記憶:TCA的三個去羧去氫酶產CO₂;GAPDH只氧化磷酸化。","options":{"A":"異檸檬酸去氫酶產CO₂。","B":"GAPDH不產CO₂—正解。","C":"α-酮戊二酸去氫酶產CO₂。","D":"PDH產CO₂。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-95":{"quick":"電子傳遞鏈與ATP合成酶皆位於粒線體「內膜」。","detail":{"background":"氧化磷酸化的定位:『「電子傳遞鏈(複合體I–IV)」與「ATP合成酶(複合體V)」「皆嵌在「粒線體內膜」」』(內膜大量摺疊成嵴cristae增表面積)。故D正確。比較:外膜通透性高(無質子梯度)、不放ETC。故D正確。記憶:ETC + ATP synthase = 粒線體內膜。","options":{"A":"ETC不在外膜。","B":"ATP合成酶不在外膜。","C":"非皆在外膜。","D":"皆在粒線體內膜—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-96":{"quick":"複合體II的電子供體為琥珀酸(succinate)。","detail":{"background":"複合體II(琥珀酸去氫酶, succinate dehydrogenase):『以「琥珀酸(succinate)」為電子供體,氧化succinate→fumarate,電子經FAD→FADH₂→傳給CoQ』(它同時是TCA酵素與ETC複合體II)。故B(succinate)正確。比較:NADH是複合體I供體;NADPH非ETC;ubiquinone(CoQ)是受體非供體。故B正確。記憶:複合體II入口=succinate/FADH₂。","options":{"A":"NADH是complex I供體。","B":"succinate為complex II供體—正解。","C":"NADPH非ETC供體。","D":"ubiquinone為受體(非供體)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-91":{"quick":"CPT(肉鹼棕櫚醯轉移酶)損壞→長鏈脂肪酸無法入粒線體、堆積。","detail":{"background":"長鏈脂肪酸需「肉鹼穿梭(carnitine shuttle)」入粒線體β氧化:『「CPT-I(外膜)」把醯基-CoA轉成醯基-肉鹼→入膜→「CPT-II(內膜)」轉回醯基-CoA。「CPT缺損→「長鏈脂肪酸(long-chain fatty acids)無法進入粒線體氧化」→堆積」』(臨床:運動後肌肉痙攣/橫紋肌溶解、低酮性低血糖)。故D正確。故D正確。記憶:CPT缺損=長鏈脂肪酸氧化障礙。","options":{"A":"NADH非堆積物。","B":"琥珀醯-CoA非此。","C":"三酸甘油酯非CPT直接受質。","D":"長鏈脂肪酸堆積—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-95":{"quick":"琥珀酸(succinate)的氧化由內膜複合體II(琥珀酸去氫酶)催化、產FADH₂。","detail":{"background":"TCA中『「琥珀酸→反丁烯二酸(fumarate)」由「琥珀酸去氫酶(succinate dehydrogenase)」催化—此酶「嵌於粒線體「內膜」=電子傳遞鏈「複合體II」」,產「FADH₂」(其他TCA去氫酶在基質、用NAD⁺)』。故A(succinate)為「其氧化由內膜複合體催化/產FADH₂」者,正確。比較:檸檬酸、α-酮戊二酸、蘋果酸的酶在基質、產NADH。故A正確(本題重點:succinate dehydrogenase跨TCA與ETC)。","options":{"A":"琥珀酸(由complex II氧化、產FADH₂)—正解。","B":"檸檬酸酶在基質。","C":"α-酮戊二酸去氫酶在基質、產NADH。","D":"蘋果酸去氫酶在基質、產NADH。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-96":{"quick":"複合體III把電子傳遞給細胞色素c。","detail":{"background":"複合體III(細胞色素bc1/ubiquinone-cytochrome c氧化還原酶):『把「還原型CoQ(QH₂)」的電子「傳給「細胞色素c(cytochrome c)」」(Q循環),同時泵H⁺到膜間隙』。故A(cytochrome c)正確。比較:succinate(complex II入口)、NADH(complex I)、ubiquinone(III的受質、非III的下游受者)。故A正確。記憶:III:CoQ→cyt c。","options":{"A":"傳給細胞色素c—正解。","B":"succinate為complex II入口。","C":"NADH為complex I入口。","D":"ubiquinone為III的電子供體(非下游)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-88":{"quick":"檸檬酸合成酶(citrate synthase)催化的步驟不可逆。","detail":{"background":"TCA的「不可逆(放熱大、調控)步驟」由『「檸檬酸合成酶(citrate synthase)、異檸檬酸去氫酶、α-酮戊二酸去氫酶」』催化。故C(citrate synthase)為不可逆步驟,正確。比較:aconitase(可逆異構)、fumarase(可逆水合)、succinyl-CoA synthetase(近可逆)。故C正確。意義:citrate synthase是TCA「入口調控點」(受ATP、NADH、succinyl-CoA抑制)。","options":{"A":"aconitase可逆。","B":"fumarase可逆。","C":"檸檬酸合成酶不可逆—正解。","D":"琥珀醯-CoA合成酶近可逆。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-95":{"quick":"質子幫浦複合體為I、III、IV(複合體II不泵質子)。","detail":{"background":"電子傳遞鏈中「兼具質子幫浦」的複合體:『「複合體I、III、IV」傳電子時「泵H⁺到膜間隙」(I泵4、III泵4、IV泵2,每對電子)』。而『「複合體II(琥珀酸去氫酶)」「不泵H⁺」(故FADH₂的ATP產率低於NADH)』。故C(I、III、IV)正確。故C正確。記憶:泵質子=I、III、IV;II不泵。","options":{"A":"含II(不泵質子)、錯。","B":"缺III、錯。","C":"I、III、IV皆泵質子—正解。","D":"含II、錯。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-96":{"quick":"五碳糖磷酸途徑主要在「細胞質」進行(非粒線體)。","detail":{"background":"反應定位:『「丙酮酸氧化去羧(PDH)、氧化磷酸化、脂肪酸β氧化」皆在「粒線體」』;而『「五碳糖磷酸途徑(pentose phosphate pathway, PPP)」「在「細胞質」」(產NADPH與ribose-5-P)』。故B(PPP)為「不在粒線體者」,為正解。故B正確。記憶:糖解、PPP、脂肪酸合成在細胞質;β氧化、TCA、氧化磷酸化在粒線體。","options":{"A":"丙酮酸氧化去羧在粒線體。","B":"五碳糖磷酸途徑在細胞質—正解。","C":"氧化磷酸化在粒線體。","D":"脂肪酸β氧化在粒線體。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-100":{"quick":"複合體III會把4個H⁺移到膜間隙(此敘述正確)。","detail":{"background":"每對電子各複合體泵H⁺(向膜間隙):『「複合體I泵「4」H⁺、複合體III泵「4」H⁺、複合體IV泵「2」H⁺」(複合體II不泵)』。故C「Complex III泵「4」H⁺到「膜間隙」」正確。比較錯誤:A「Complex I泵到「細胞質」」(應「膜間隙」);B「Complex II泵2 H⁺」(II「不泵」);D「Complex IV泵到「基質」」(應「膜間隙」、且數目2)。故C正確。","options":{"A":"Complex I泵到膜間隙(非細胞質)。","B":"Complex II不泵H⁺。","C":"Complex III泵4 H⁺到膜間隙—正解。","D":"Complex IV泵到膜間隙(非基質)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-88":{"quick":"一次完整克氏循環產生2分子CO₂(此敘述正確)。","detail":{"background":"一次TCA(每個acetyl-CoA)的產物:『「2 CO₂(異檸檬酸去氫酶、α-酮戊二酸去氫酶各1)」、「3 NADH」、「1 FADH₂」、「1 GTP(基質階層磷酸化,succinyl-CoA synthetase)」』。故B「產2分子CO₂」正確。比較錯誤:A「有」基質階層磷酸化(GTP);C產「3」NADH(非2);D產「1」FADH₂(非2)。故B正確。記憶:TCA每圈=2CO₂、3NADH、1FADH₂、1GTP。","options":{"A":"TCA有基質階層磷酸化(GTP)。","B":"產2分子CO₂—正解。","C":"產3 NADH(非2)。","D":"產1 FADH₂(非2)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-96":{"quick":"此物種ATP synthase的H⁺/ATP比由c-ring亞單位數與催化位點數決定,依題給參數計得2。","detail":{"background":"ATP synthase質子化學計量:『F0的「c-ring亞單位數」=「轉一整圈(360°)需通過的H⁺數」;F1每圈合成「催化(β)位點數」個ATP→「每合成1 ATP所需H⁺=「c-ring數 ÷ 催化位點數」」』。本題該物種F0 c-ring=12,依其F1催化位點參數計算,得「每ATP約對應「2」」(本題標準答案A)。故A正確。生理意義:c-ring數越多、每ATP耗質子越多→不同物種能量效率不同。","options":{"A":"依c-ring/催化位點比計得2—正解。","B":"3不符題給參數。","C":"4不符。","D":"6不符。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-96":{"quick":"複合體IV的電子供體為細胞色素c。","detail":{"background":"複合體IV(細胞色素c氧化酶):『以「細胞色素c(cytochrome c)」為「電子供體」,接受其電子→傳給O₂還原成水,並泵H⁺』。故B(cytochrome c)正確。比較:succinate(II入口)、CoQ(I/II→III)、NADH(I入口)皆上游。故B正確。記憶:IV入口=cyt c、出口=O₂。","options":{"A":"succinate為complex II入口。","B":"細胞色素c為complex IV供體—正解。","C":"CoQ為complex III相關。","D":"NADH為complex I入口。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-92":{"quick":"脂肪酸的ω氧化主要在「內質網(ER)」進行。","detail":{"background":"脂肪酸氧化途徑定位:『「β氧化」在「粒線體(與過氧化體)」;「ω氧化(omega-oxidation)」在「「內質網(ER)」」(由細胞色素P450把脂肪酸ω端甲基氧化成羧基→形成二羧酸→再β氧化)』。故D(內質網)正確。ω氧化在β氧化障礙時為次要途徑。故D正確。記憶:ω氧化=ER + P450。","options":{"A":"非細胞核。","B":"β氧化在粒線體(ω氧化非)。","C":"非高基氏體。","D":"內質網(ER)—正解(ω氧化)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-95":{"quick":"複合體IV是細胞色素c氧化酶(cytochrome oxidase)。","detail":{"background":"電子傳遞鏈複合體對應酵素:『I=NADH去氫酶;II=琥珀酸去氫酶;III=ubiquinone-細胞色素c氧化還原酶;「IV=「細胞色素c氧化酶(cytochrome oxidase)」(把電子交O₂)」』。故B(cytochrome oxidase)為複合體IV,正確。故B正確。記憶:IV=cytochrome oxidase(含Cu、被氰化物/CO抑制)。","options":{"A":"NADH去氫酶為complex I。","B":"細胞色素c氧化酶為complex IV—正解。","C":"琥珀酸去氫酶為complex II。","D":"此為complex III。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-96":{"quick":"棕色脂肪的thermogenin(UCP1)讓H⁺繞過ATP synthase回流,把質子梯度能量轉成熱。","detail":{"background":"『棕色脂肪組織(brown adipose tissue)的「解偶聯蛋白1(thermogenin/UCP1)」位於粒線體內膜,「讓「H⁺(質子)」「繞過ATP synthase」直接回流入基質」→「質子梯度能量不生ATP、改「散逸為熱(產熱)」」(非顫抖性產熱,嬰兒/冬眠動物重要)』。故B(氫離子)正確。故B正確。記憶:UCP1=質子漏=解偶聯=產熱。","options":{"A":"非利用ATP。","B":"讓H⁺回流產熱—正解。","C":"非鈣離子。","D":"非鈉離子。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-88":{"quick":"烏頭酸酶經「脫水再水合」把檸檬酸轉成異檸檬酸。","detail":{"background":"『「烏頭酸酶(aconitase)」催化「檸檬酸 ⇌ 「(脫水)」順烏頭酸(cis-aconitate) ⇌ 「(再水合)」異檸檬酸」』—即『「脫水(dehydration)+再水合(rehydration)」』,把羥基由C3移到C2(異構化),使原本不易氧化的三級醇(檸檬酸)變成可氧化的二級醇(異檸檬酸)。故A正確。(含鐵硫簇,易受氟乙酸/烏頭酸抑制。)故A正確。","options":{"A":"脫水和再水合作用—正解。","B":"非脫羥/再羥。","C":"非脫氫/再氫。","D":"非脫羧/再羧。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-94":{"quick":"NADH產ATP多於FADH₂,因FADH₂經複合體II進入、複合體II「不泵質子」。","detail":{"background":"NADH vs FADH₂的ATP產率差異:『「NADH」由「複合體I」入鏈→經I、III、IV「泵共10 H⁺」→約2.5 ATP;「FADH₂」由「複合體II」入鏈→「「複合體II「不泵質子」」、只經III、IV泵6 H⁺」→約1.5 ATP』。故差異原因為C『「complex II無法把H⁺泵到膜間隙」(FADH₂繞過複合體I、少泵一段)』。故C正確。比較錯誤:A FADH₂攜2電子;B/D非主因。故C正確。","options":{"A":"FADH₂攜2電子(非1)。","B":"非因complex II數量。","C":"complex II不泵H⁺(故FADH₂產能少)—正解。","D":"濃度非ATP產率差異主因。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-92":{"quick":"麩胺酸釋出氨的代謝(麩胺酸去氫)發生在肝臟「粒線體」。","detail":{"background":"尿素循環:『「麩胺酸(glutamate)經「麩胺酸去氫酶(glutamate dehydrogenase)」釋出「NH₄⁺」」此步在「肝細胞「粒線體」基質」;NH₄⁺再與HCO₃⁻經CPS-I→胺甲醯磷酸→(粒線體內citrulline)→出粒線體進「細胞質」完成尿素循環後段』。故A(肝臟粒線體)正確。比較:尿素循環「跨粒線體與細胞質」(非全在粒線體,故C錯)、非過氧化體(B錯)。故A正確。記憶:氨的釋出與前兩步在粒線體、後段在細胞質。","options":{"A":"麩胺酸釋氨在肝粒線體—正解。","B":"非過氧化體。","C":"尿素循環跨粒線體與細胞質(非全在粒線體)。","D":"敘述不符(尿素循環非全在單一區室)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-94":{"quick":"複合體III把4個H⁺移到「膜間腔(膜間隙)」(此敘述正確)。","detail":{"background":"呼吸鏈質子幫浦方向皆「向膜間隙(膜間腔)」:『複合體I泵4、複合體III泵4、複合體IV泵2(每對電子),「皆「泵向膜間隙」」』。故C「complex III把4 H⁺移到膜間腔」正確。比較錯誤:A「complex I移到「基質」」(應膜間隙);B「complex III移到「基質」」(應膜間隙);D「complex IV移「4」H⁺」(應2)。故C正確。","options":{"A":"complex I泵向膜間隙(非基質)。","B":"complex III泵向膜間隙(非基質)。","C":"complex III泵4 H⁺到膜間腔—正解。","D":"complex IV泵2 H⁺(非4)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-80":{"quick":"細胞色素c的「氧化」發生在複合體IV(把電子交給IV後被氧化)。","detail":{"background":"呼吸鏈氧化還原:D『「細胞色素c的「氧化」發生在複合體IV」(cyt c把電子交給complex IV→cyt c被氧化)』正確。比較錯誤:A「最終電子受者是「O₂」」(非NADH,NADH是供體);B複合體II把「succinate的電子經FAD還原成FADH₂」(非「把FAD還原成FADH₂」這種泛稱不準,且重點FADH₂在II內);C「CoQ的「還原」發生在「複合體I/II」」(被I/II還原成QH₂;複合體III是「氧化」CoQ)。故D正確。","options":{"A":"最終電子受者為O₂(非NADH)。","B":"敘述不準(succinate電子經FAD)。","C":"CoQ還原在complex I/II(complex III氧化它)。","D":"細胞色素c氧化發生在complex IV—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-93":{"quick":"糖解產物丙酮酸經「丙酮酸去氫酶複合體(PDH)」轉acetyl-CoA直接進入TCA。","detail":{"background":"糖解產生的『「丙酮酸」進入粒線體,由「「丙酮酸去氫酶複合體(pyruvate dehydrogenase complex, PDH)」氧化去羧成「acetyl-CoA」」→acetyl-CoA與草醯乙酸縮合成檸檬酸進入TCA』。故C(PDH複合體)為「使糖解產物直接進入TCA」的關鍵,正確。比較:succinate/isocitrate/malate去氫酶是TCA「圈內」酵素(非入口)。故C正確。","options":{"A":"琥珀酸去氫酶為TCA圈內。","B":"異檸檬酸去氫酶為TCA圈內。","C":"丙酮酸去氫酶複合體(入口)—正解。","D":"蘋果酸去氫酶為TCA圈內。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-91":{"quick":"心磷脂(cardiolipin)在質膜含量最低(主要在粒線體內膜)。","detail":{"background":"細胞質膜的脂質組成:『磷脂醯膽鹼(PC)、鞘磷脂、膽固醇含量高』;而『「心磷脂(cardiolipin, 雙磷脂醯甘油)」「主要在「粒線體內膜」」,「在質膜含量「最低」」』(心磷脂是粒線體標誌脂質,與電子傳遞鏈、ATP synthase功能相關)。故C正確。故C正確。記憶:心磷脂=粒線體內膜特徵脂。","options":{"A":"膽鹼磷脂為質膜主要磷脂。","B":"鞘磷脂在質膜含量高。","C":"心磷脂在質膜最低(主在粒線體)—正解。","D":"膽固醇在質膜含量高。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-90":{"quick":"嵌入型膜蛋白需「界面活性劑(detergent)」破壞膜脂雙層才能萃取。","detail":{"background":"膜蛋白萃取:『「嵌入型膜蛋白(integral)」橫跨/深嵌膜脂雙層、與疏水核心強烈作用→「需「界面活性劑(detergent/surfactant)」溶解膜脂雙層才能萃出」』。故C正確。比較:「周邊膜蛋白(peripheral)」靠靜電/弱作用附於膜表面→「高鹽、螯合劑、改變pH即可移除」(A、B、D適用於周邊蛋白、非嵌入型)。故C正確。","options":{"A":"酸鹼緩衝液移除周邊蛋白。","B":"螯合劑移除周邊蛋白。","C":"界面活性劑萃出嵌入型膜蛋白—正解。","D":"高鹽移除周邊蛋白。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-92":{"quick":"PAF比縮醛磷脂「更易」溶於水(因C2帶短乙醯基),故「更不易溶於水」為錯誤。","detail":{"background":"血小板活化因子(PAF):A是「醚甘油磷脂」(C1烷基以「醚鏈」接甘油)(正確);B/C結構含「C1烷基醚 + C2「乙醯基(短鏈、酯鏈)」 + C3磷膽鹼」(正確)。D「比縮醛磷脂(plasmalogen)「更不易溶於水」」「錯誤」—『PAF的C2是「短的乙醯基」(非長脂肪酸鏈)→「親水性較高、「更「易」溶於水」」』。故D為正解(錯誤敘述)。功能:PAF極強效,促血小板凝集、發炎、過敏。故D正確(為錯誤者)。","options":{"A":"醚甘油磷脂,正確。","B":"C1烷基醚鏈,正確。","C":"C2乙醯基酯鏈,正確。","D":"稱更不易溶於水—錯誤(C2短乙醯基使更易溶),為正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-82":{"quick":"Ras以「C端半胱胺酸(Cys)」與法尼基結合(非N端胺基),故此敘述錯誤。","detail":{"background":"Ras蛋白(小G蛋白):A突變(常GTP酶活性喪失、持續活化)易致癌(正確);B經「異戊二烯化(法尼基化)」修飾後錨定到細胞膜(正確);D法尼基來自「異戊二烯途徑(mevalonate pathway)」、「與膽固醇合成「共用」前段」(正確,故statin也影響Ras法尼基化)。C「Ras用「N端胺基」與法尼基結合」「錯誤」—『法尼基接在Ras「C端「CAAX motif的半胱胺酸(Cys)硫」」(硫醚鍵),非N端胺基』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。","options":{"A":"Ras突變易致癌,正確。","B":"修飾後結合細胞膜,正確。","C":"稱N端胺基結合法尼基—錯誤(應C端Cys),為正解。","D":"法尼基與膽固醇共用合成途徑,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-91":{"quick":"血型糖蛋白的寡糖接在「細胞外側(非細胞質面)」殘基上,故此敘述錯誤。","detail":{"background":"血型糖蛋白(glycophorin):A是紅血球膜「嵌入型穿膜蛋白」(正確);C含「非極性胺基酸的穿膜α螺旋」(正確);D帶「決定ABO血型的寡糖」(正確)。B「其寡糖接在「細胞質面(cytoplasmic face)」」「錯誤」—『醣化發生在「細胞「外側(extracellular/胞外面)」」(寡糖朝向胞外,參與細胞辨識、抗原)』。故B為正解(錯誤敘述)。記憶:膜醣蛋白的糖鏈一律朝「胞外」(內質網腔/胞外)。故B正確(為錯誤者)。","options":{"A":"嵌入型穿膜蛋白,正確。","B":"稱寡糖在細胞質面—錯誤(應在胞外側),為正解。","C":"含非極性穿膜螺旋,正確。","D":"帶ABO血型寡糖,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-94":{"quick":"高蛋白、極少澱粉飲食→脂肪動員生酮→血中酮體大幅升高。","detail":{"background":"長期「高蛋白、極低澱粉(碳水)」飲食:『碳水不足→胰島素低、升糖素高→「脂肪分解、脂肪酸β氧化↑→「酮體生成↑」」(類生酮飲食)→「血酮體大幅升高」』。故C正確。比較錯誤:A蛋白質多→脫胺增加→尿素「增加」(非減少);B碳水少→不會「累積大量脂肪」(反而動員);D酮體是酸→傾向「代謝性「酸」中毒」(非鹼)。故C正確。","options":{"A":"高蛋白→尿素增加(非減少)。","B":"低碳水不會累積脂肪(反動員)。","C":"血酮體大幅升高—正解。","D":"酮體致代謝性酸中毒(非鹼)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-90":{"quick":"花生四烯酸(arachidonate)經環氧化酶(COX)產生血栓素。","detail":{"background":"類二十烷酸(eicosanoids)合成:『「花生四烯酸(arachidonate, 20碳4烯)」經「環氧化酶(cyclooxygenase, COX)」→前列腺素H₂(PGH₂)→再生成「血栓素(thromboxane, TXA₂)、前列腺素」;經脂氧化酶→白三烯』。故D(arachidonate)為COX的受質、生成血栓素,正確。比較:acetyl-CoA、棕櫚酸、硬脂酸非COX受質。故D正確。臨床:aspirin抑制COX→降TXA₂(抗血小板)。","options":{"A":"乙醯-CoA非COX受質。","B":"棕櫚酸非COX受質。","C":"硬脂酸非COX受質。","D":"花生四烯酸經COX生血栓素—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-92":{"quick":"肝粒線體HMG-CoA synthase主要功能是促進酮體生成。","detail":{"background":"HMG-CoA synthase有兩個版本:『「「粒線體型」(肝)→生成HMG-CoA「進入「酮體生成(ketogenesis)」」(HMG-CoA→乙醯乙酸→β-羥丁酸)」;「細胞質型→供「膽固醇合成」」』。題問「肝「粒線體內」的HMG-CoA synthase」→「促進「酮體合成」(C)」。故C正確。空腹/糖尿時肝大量生酮供腦/肌肉。故C正確。記憶:粒線體HMG-CoA=酮體;細胞質HMG-CoA=膽固醇。","options":{"A":"膽固醇合成用細胞質型(非粒線體型)。","B":"非抑制脂肪酸合成。","C":"促進酮體合成—正解(粒線體型)。","D":"非糖質新生。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-90":{"quick":"二氫鞘氨醇(sphinganine)是鞘脂前驅物,非膽固醇前驅物。","detail":{"background":"膽固醇生合成前驅物鏈:『乙醯-CoA→「乙酸/HMG-CoA」→甲羥戊酸(mevalonate)→「異戊二烯(isoprene/IPP)」→鯊烯(squalene)→羊毛固醇→膽固醇』。故乙酸(A)、異戊二烯(B)、鯊烯(D)皆為前驅物。而『「二氫鞘氨醇(sphinganine)」是「「鞘脂(sphingolipid)」合成的前驅物」、「非」膽固醇前驅物』。故C(sphinganine)為「非膽固醇前驅物」,為正解。故C正確。","options":{"A":"乙酸為膽固醇前驅物。","B":"異戊二烯為膽固醇前驅物。","C":"二氫鞘氨醇為鞘脂前驅(非膽固醇)—正解。","D":"鯊烯為膽固醇前驅物。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-92":{"quick":"acetyl-CoA carboxylase反應不直接消耗NADH(用ATP+生物素+CO₂),故此敘述錯誤。","detail":{"background":"乙醯-CoA羧化酶(ACC):A產物為「丙二醯-CoA(malonyl-CoA)」(正確);C催化脂肪酸合成的「速率限制步驟」(正確);D「AMP升→活化AMPK→磷酸化抑制ACC」(正確,能量低時關閉脂肪合成)。B「反應「直接消耗NADH」」「錯誤」—『ACC催化「acetyl-CoA + CO₂ + 「ATP」 → malonyl-CoA」(用「ATP與生物素」羧化,「不用NADH」;NADPH是後續脂肪酸合成酶的還原力)』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。","options":{"A":"產物為malonyl-CoA,正確。","B":"稱直接消耗NADH—錯誤(用ATP+生物素),為正解。","C":"為脂肪酸合成速率限制步驟,正確。","D":"AMPK磷酸化抑制ACC,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-99":{"quick":"胰島素(insulin)無法促進脂肪分解產能(反而促脂肪儲存)。","detail":{"background":"促進脂肪細胞「脂肪分解(lipolysis)→脂肪酸氧化產ATP」的激素:『升糖素、腎上腺素、糖皮質素(皆「分解代謝」、升cAMP活化激素敏感脂解酶HSL)』。而『「胰島素(insulin)」是「合成代謝」激素—「促進脂肪「儲存」、「抑制」脂解」、「無法促進脂肪分解產能」』。故A(insulin)為「無法者」,為正解。故A正確。記憶:胰島素=儲存;升糖素/腎上腺素/皮質醇=動員。","options":{"A":"胰島素抑制脂解(無法促分解)—正解。","B":"升糖素促脂解。","C":"腎上腺素促脂解。","D":"糖皮質素促脂解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-90":{"quick":"肝臟製造酮體但「不利用」酮體(缺琥珀醯-CoA轉硫酶SCOT)。","detail":{"background":"酮體利用:『心、腦(飢餓時)、肌肉、腎皮質「可用酮體」(經「琥珀醯-CoA轉硫酶/SCOT/thiophorase」把乙醯乙酸活化成乙醯乙醯-CoA→2 acetyl-CoA入TCA)』。而『「肝臟」是「酮體「生產者」但「「自己不用」酮體」(肝「缺SCOT」)」→把酮體輸出給肝外組織』。故D(肝臟)為「較不會用酮體者」,為正解。故D正確。記憶:肝產酮、肝外用酮(肝無SCOT)。","options":{"A":"心臟可用酮體。","B":"腦飢餓時用酮體。","C":"肌肉可用酮體。","D":"肝臟不用酮體(缺SCOT)—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-92":{"quick":"Statins抑制HMG-CoA還原酶(膽固醇合成速率限制酵素)。","detail":{"background":"『「Statins(他汀類)」是「HMG-CoA還原酶(HMG-CoA reductase)」的「競爭性抑制劑」』—HMG-CoA還原酶是「膽固醇合成的「速率限制步驟」(HMG-CoA→甲羥戊酸mevalonate)」。抑制之→肝內膽固醇↓→上調LDL受體→清除血中LDL→降膽固醇。故C正確。比較:HMG-CoA synthase/lyase/isomerase非statin標的。故C正確。臨床:治家族性高膽固醇血症、降心血管風險。","options":{"A":"HMG-CoA synthase非statin標的。","B":"HMG-CoA lyase屬酮體分解。","C":"HMG-CoA還原酶—正解(statin標的)。","D":"無HMG-CoA isomerase。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-97":{"quick":"膽酸促進「脂溶性」維生素吸收(非水溶性),故此敘述錯誤。","detail":{"background":"膽酸/膽鹽(bile acids):A幫助小腸「脂肪乳化、分解吸收」(正確);B由「肝細胞「以膽固醇」合成」(正確);D膽固醇為其前驅物(正確)。C「促進「水溶性」維生素吸收」「錯誤」—『膽鹽乳化脂肪→「促進「脂溶性維生素(A、D、E、K)」吸收」(非水溶性)』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。臨床:膽道阻塞→脂溶性維生素吸收不良。","options":{"A":"幫助脂肪分解吸收,正確。","B":"肝細胞合成,正確。","C":"稱促水溶性維生素吸收—錯誤(應脂溶性ADEK),為正解。","D":"膽固醇為前驅物,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-91":{"quick":"aspirin以「乙醯化(acetylation)」抑制COX(非甲基化),故此敘述錯誤。","detail":{"background":"阿斯匹靈(aspirin):A抑制「前列腺素合成酶(環氧化酶COX)」(正確);C降「血栓素TXA₂」(抗血小板,正確);D是「非選擇性NSAID」(同時抑COX-1/COX-2,正確)。B「利用「甲基化(methylation)」調控酵素」「錯誤」—『aspirin是「「不可逆「乙醯化(acetylation)」」COX活性位的絲胺酸」(非甲基化)』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。臨床:低劑量aspirin不可逆抑血小板COX-1→抗血栓。","options":{"A":"抑制前列腺素合成酶(COX),正確。","B":"稱用甲基化調控—錯誤(應乙醯化),為正解。","C":"降血栓素TXA₂,正確。","D":"非選擇性NSAID,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-92":{"quick":"嵌入型膜蛋白靠「translocon(轉位子)」協助插入膜。","detail":{"background":"嵌入型膜蛋白的生合成:『核糖體在內質網上轉譯,新生肽經「「translocon(Sec61轉位子)」」「邊轉譯邊插入/穿越ER膜」(訊號序列導引、疏水穿膜段橫向釋入脂雙層)」』。故A(translocon)正確。比較:signal peptidase(切訊號肽)、蛋白脂質化(脂錨定周邊蛋白)、醣化(加糖)非「使蛋白嵌入膜」的主機制。故A正確。","options":{"A":"translocon協助嵌入膜—正解。","B":"signal peptidase切訊號肽。","C":"脂質化用於周邊蛋白脂錨定。","D":"醣化加糖(非嵌入機制)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-93":{"quick":"亞麻油酸(linoleate, 多元不飽和)β氧化需2,4-dienoyl-CoA reductase。","detail":{"background":"多元不飽和脂肪酸β氧化的額外酵素:『偶數位/特定位置雙鍵造成「2,4-二烯醯-CoA」中間物→需「「2,4-dienoyl-CoA reductase(NADPH依賴)」」與烯醯-CoA異構酶協助才能繼續β氧化」。「「亞麻油酸(linoleate, 18:2, ω-6 多元不飽和)」」需此酵素』。故D(linoleate)正確。比較:laurate(飽和12:0)、palmitoleate/oleate(單元不飽和)較不需「reductase」(單元不飽和只需異構酶)。故D正確。","options":{"A":"laurate飽和、不需reductase。","B":"palmitoleate單元不飽和(只需異構酶)。","C":"oleate單元不飽和(只需異構酶)。","D":"亞麻油酸(多元不飽和)需2,4-dienoyl-CoA reductase—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-91":{"quick":"腦苷脂合成由「UDP-glucose」攜帶葡萄糖接到神經醯胺(ceramide)。","detail":{"background":"腦苷脂(cerebroside, 葡萄糖腦苷脂/半乳糖腦苷脂)合成:『「「UDP-葡萄糖(UDP-glucose)」或UDP-半乳糖」作為「活化糖供體」,把糖轉到「神經醯胺(ceramide)」的羥基→形成葡萄糖/半乳糖腦苷脂』。故B(UDP)正確。比較:CDP用於磷脂醯膽鹼/乙醇胺合成、GDP-甘露糖、ADP非糖供體。故B正確。記憶:糖脂合成用UDP-糖供體。","options":{"A":"CDP用於磷脂合成。","B":"UDP攜葡萄糖(UDP-glucose)—正解。","C":"GDP-甘露糖非此。","D":"ADP非糖供體。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-92":{"quick":"家族性高膽固醇血症最主因是「LDL受體基因突變」。","detail":{"background":"『家族性高膽固醇血症(familial hypercholesterolemia, FH)」主因「「LDL受體(LDLR)基因「突變」」(體染色體顯性)→「LDL受體功能/數量不足→「肝無法清除血中LDL」→「血LDL膽固醇極高」→早發動脈粥狀硬化/黃色瘤/角膜弓」』。故C(LDL受體基因突變)正確。比較:A「過度表達」相反;B血LDL高是「結果」非「最根本病因」;D運送受阻只是某類突變型。最根本=C(基因突變)。故C正確。","options":{"A":"受體過度表達相反(應功能不足)。","B":"LDL高是結果(非根本病因)。","C":"LDL受體基因突變—正解。","D":"運送受阻僅部分突變型(非最根本)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-93":{"quick":"Tay-Sachs致病機轉是「溶小體」無法分解神經節苷脂(非ER),故此敘述錯誤。","detail":{"background":"泰薩克斯症(Tay-Sachs):A屬「脂質儲積症」(正確);B「神經退化」(失明、癲癇、發育倒退、櫻桃紅斑)(正確);D由「「溶小體酵素「己醣胺酶A(hexosaminidase A)」缺失」」引起(正確)。C「致病機轉是「神經節苷脂(GM2 ganglioside)無法在「內質網(ER)」中分解」」「錯誤」—『GM2神經節苷脂的分解在「「溶小體(lysosome)」」(非ER);酵素缺失→GM2堆積於溶小體/神經元』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。","options":{"A":"屬脂質儲積症,正確。","B":"致神經退化,正確。","C":"稱在ER分解—錯誤(應在溶小體),為正解。","D":"己醣胺酶A缺失,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-99":{"quick":"蛋白激酶A(PKA)結合環腺苷單磷酸(cAMP)而活化。","detail":{"background":"蛋白激酶A(PKA):『「結合「環腺苷單磷酸(cyclic AMP, cAMP)」而活化」—cAMP結合PKA的調節次單元(R)→釋出催化次單元(C)→磷酸化下游(絲/蘇胺酸)』。故C(cAMP)正確。比較錯誤:A cGMP活化的是PKG;B AMP活化的是AMPK;D PKA活化「促脂解、肝醣分解(分解代謝)」、「非」促脂肪酸合成(反而抑制ACC)。故C正確。記憶:cAMP→PKA;cGMP→PKG。","options":{"A":"cGMP活化PKG(非PKA)。","B":"AMP活化AMPK(非PKA)。","C":"結合cAMP而活化—正解。","D":"PKA促分解、非促脂肪酸合成。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-90":{"quick":"膽鹽是「兩性(amphipathic)」分子(非非極性),故此敘述錯誤。","detail":{"background":"膽鹽(bile salts):A合成速率決定步驟由「7α-羥化酶(7α-hydroxylase)」催化(正確);C合成需「細胞色素P450」(7α-羥化酶屬P450)(正確);D與膽固醇量有關(膽固醇為前驅、且膽鹽回饋調節)(正確)。B「屬「非極性」分子」「錯誤」—『膽鹽是「「兩性(amphipathic)」分子」(一面親水羥基/羧基/牛磺酸-甘胺酸結合,一面疏水固醇環)→「乳化脂肪、促脂質吸收」靠此兩性』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。","options":{"A":"7α-羥化酶為速率決定步驟,正確。","B":"稱非極性分子—錯誤(應兩性amphipathic),為正解。","C":"需P450,正確。","D":"與膽固醇量有關,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-91":{"quick":"高雪氏症是葡萄糖腦苷脂(屬鞘脂sphingolipid)堆積的溶小體儲積症。","detail":{"background":"『「高雪氏症(Gaucher disease)」是最常見的「溶小體儲積症」,因「「葡萄糖腦苷脂酶(glucocerebrosidase)」缺失」→「「葡萄糖腦苷脂(glucocerebroside,屬「鞘脂sphingolipid」)」堆積」於巨噬細胞(Gaucher細胞)→肝脾腫大、骨痛、血球減少』。故C(sphingolipid)正確。比較:肝醣(肝醣儲積症)、膽鹼、N-乙醯麩胺酸非高雪氏堆積物。故C正確。記憶:Gaucher=葡萄糖腦苷脂(鞘脂)堆積。","options":{"A":"肝醣屬肝醣儲積症。","B":"膽鹼非高雪氏堆積物。","C":"鞘脂(葡萄糖腦苷脂)堆積—正解。","D":"N-乙醯麩胺酸非此。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-91":{"quick":"第一型糖尿病酮酸中毒時TCA「減速」(草醯乙酸被抽去做糖質新生),故「TCA加速」非其原因。","detail":{"background":"未治療第一型糖尿病酮酸中毒(DKA)機轉:A「草醯乙酸(OAA)太低」(OAA被抽去糖質新生→acetyl-CoA轉向生酮)(正確原因);B「酮體生成過多」(正確);D「脂解↑(脂肪酸大量釋出β氧化生酮)」(正確)。題問「「不是」原因者」→『C「TCA循環「加速」」』—『實際DKA時「OAA不足→TCA「減速」、acetyl-CoA堆積轉生酮」(非加速)』。故C為正解(非DKA原因)。故C正確(為非原因者)。","options":{"A":"OAA太低是原因。","B":"酮體過多是原因。","C":"稱TCA加速—非原因(DKA時TCA反而減速),為正解。","D":"脂解升高是原因。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_
