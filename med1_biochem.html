113090-92":{"quick":"膽固醇普遍存在於「人類(動物)細胞膜」(調節膜流動性)。","detail":{"background":"細胞膜膽固醇分布:C『「膽固醇普遍存在「人類(動物)細胞膜」」(嵌於磷脂間、「調節膜流動性與穩定」:高溫降流動、低溫防過硬)』正確。比較錯誤:A「多數細胞膜「蛋白質約佔40–50%」」(非70%以上、且因膜而異);B「細菌細胞膜「不」含膽固醇」(細菌用hopanoid);D「植物用「植物固醇(phytosterol)」、非膽固醇」。故C正確。記憶:膽固醇=動物膜;植物=植物固醇;細菌=hopanoid。","options":{"A":"膜蛋白約40–50%(非70%以上)。","B":"細菌膜不含膽固醇。","C":"膽固醇普遍存於人類細胞膜—正解。","D":"植物用植物固醇(非膽固醇)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-93":{"quick":"膽固醇「不能」經ω氧化產生能量(人體無法分解固醇環供能),故此敘述錯誤。","detail":{"background":"膽固醇敘述:B「acetyl-CoA為膽固醇生合成前驅物」(正確);C「膽固醇為維生素D前驅物」(正確);D「HMG-CoA還原酶催化膽固醇合成速率限制步驟」(正確)。A「膽固醇可經「ω氧化」產生能量」「錯誤」—『「人體「無法分解膽固醇的固醇環」供能」(膽固醇只能轉成膽汁酸、類固醇激素、維生素D或原樣排出,「不能氧化供ATP」)』。故A為正解(錯誤敘述)。故A正確(為錯誤者)。","options":{"A":"稱膽固醇經ω氧化產能—錯誤(人體不能分解固醇環供能),為正解。","B":"acetyl-CoA為前驅物,正確。","C":"為維生素D前驅物,正確。","D":"HMG-CoA還原酶為速率限制,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-89":{"quick":"胞外側周邊膜蛋白常以「GPI錨(糖磷脂醯肌醇)」共價錨定於膜。","detail":{"background":"膜蛋白的脂質錨定:『「細胞「外側(extracellular)」」的周邊膜蛋白常以「「糖磷脂醯肌醇(GPI anchor)」」共價接到蛋白C端→錨於膜外葉』。故B(GPI)正確。比較:棕櫚醯(palmitoyl,胞內Cys)、法尼醯(farnesyl,胞內C端CAAX)、豆蔻醯(N-myristoyl,胞內N端Gly)皆「胞內側」脂錨。故B正確。記憶:GPI=胞外面錨定(如鹼性磷酸酶、CD55/59);其餘三種=胞質面。","options":{"A":"棕櫚醯為胞質面錨定。","B":"GPI錨於胞外側—正解。","C":"法尼醯為胞質面錨定。","D":"豆蔻醯為胞質面N端錨定。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-90":{"quick":"膜脂在膜融合處由「脂質運送蛋白(lipid transfer protein)」運送。","detail":{"background":"膜脂運送:『新合成的膜脂(在ER)送到各胞器膜,部分經「「脂質運送蛋白(lipid transfer protein)」」在「膜接觸點(膜融合處/接觸位)」「在膜間轉移脂質」』(亦有囊泡運輸)。故A正確。比較:醯基載體蛋白(ACP,脂肪酸合成)、載脂蛋白(apolipoprotein,血漿脂蛋白)、CPT(肉鹼穿梭)皆非「膜間脂質運送」。故A正確。","options":{"A":"脂質運送蛋白—正解。","B":"ACP用於脂肪酸合成。","C":"載脂蛋白為血漿脂蛋白。","D":"CPT為肉鹼穿梭(β氧化)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-91":{"quick":"檸檬酸(citrate)是acetyl-CoA羧化酶(ACC)的別構活化劑。","detail":{"background":"脂肪酸合成速率限制酵素「乙醯-CoA羧化酶(ACC)」的調節:『「「檸檬酸(citrate)」「別構「活化」ACC」(且促其聚合成活性絲狀體)」—檸檬酸高表「能量/碳源充足」、適合合成脂肪』。故A(citrate)正確。比較抑制者:「棕櫚醯-CoA(產物回饋抑制)」、升糖素/腎上腺素(經PKA磷酸化抑制)、AMPK(磷酸化抑制)。故A正確。記憶:citrate活化ACC;palmitoyl-CoA/磷酸化抑制ACC。","options":{"A":"檸檬酸活化ACC—正解。","B":"升糖素(經磷酸化)抑制ACC。","C":"棕櫚醯-CoA回饋抑制ACC。","D":"腎上腺素(經磷酸化)抑制ACC。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-97":{"quick":"PIP2經PI3K磷酸化(3位)生成PIP3(磷脂肌醇3,4,5-三磷酸)。","detail":{"background":"磷脂肌醇訊息:『「PIP2(磷脂肌醇4,5-雙磷酸)」可有兩條路:①「磷脂酶C(PLC)」「水解」PIP2→「IP3 + DAG」(動員鈣、活化PKC);②「PI3激酶(PI3K)」「磷酸化」PIP2「3位」→「「PIP3(磷脂肌醇「3,4,5」-三磷酸)」」(招募Akt等)』。題答案為D(PI 3,4,5-trisphosphate=PIP3,PI3K的產物)。故D正確。比較:IP3/DAG是PLC水解產物(屬另一路);B的「1,4,5」是IP3的編號(可溶性肌醇三磷酸,非膜磷脂)。故D正確。","options":{"A":"IP3為PLC水解產物(非PI3K)。","B":"1,4,5-三磷酸為IP3(可溶,非膜PIP3)。","C":"DAG為PLC水解產物。","D":"PIP3(3,4,5-三磷酸)為PI3K產物—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-89":{"quick":"磷脂醯膽鹼(phosphatidylcholine)是含甘油骨架的複合脂質。","detail":{"background":"膜脂的骨架:『「甘油磷脂(glycerophospholipid,如「磷脂醯膽鹼phosphatidylcholine」)」以「「甘油(glycerol)」為骨架」(甘油+2脂肪酸+磷酸頭基)』。故B正確。比較:膽固醇(固醇環、無甘油)、神經醯胺(ceramide,以「鞘氨醇sphingosine」為骨架)、鞘磷脂(sphingomyelin,鞘氨醇骨架)皆「非甘油骨架」。故B正確。記憶:甘油磷脂=甘油骨架;鞘脂=鞘氨醇骨架。","options":{"A":"膽固醇為固醇(無甘油)。","B":"磷脂醯膽鹼含甘油骨架—正解。","C":"神經醯胺以鞘氨醇為骨架。","D":"鞘磷脂以鞘氨醇為骨架。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-90":{"quick":"合成1莫耳棕櫚酸需14莫耳NADPH。","detail":{"background":"脂肪酸合成的還原力:『合成「1莫耳棕櫚酸(palmitate, C16)」需「「7次循環」(每次加2碳),每循環「2次還原(β-酮還原、烯醯還原)」各用1 NADPH→7×2=「14莫耳NADPH」」(另需8 acetyl-CoA、7 ATP經ACC)』。故B(14)正確。故B正確。記憶:1棕櫚酸=8 acetyl-CoA + 7 ATP + 14 NADPH。NADPH主要來自五碳糖磷酸途徑與蘋果酸酶。","options":{"A":"7為循環數(非NADPH數)。","B":"14莫耳NADPH—正解。","C":"16為碳數。","D":"21不符。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-91":{"quick":"血糖高→胰島素上升→(malonyl-CoA抑制CPT-1)減少脂肪酸進入粒線體氧化。","detail":{"background":"血糖與脂肪酸氧化調控:『血糖「高」→「胰島素↑」→促脂肪「合成」、產「丙二醯-CoA(malonyl-CoA)」→「malonyl-CoA「抑制CPT-1」」→「脂肪酸「無法進入粒線體β氧化」(減少氧化)」』。故C正確。比較錯誤:A血糖低時升糖素↑應「增加」β氧化(非減少);B升糖素升不會在血糖高時;D胰島素不會在血糖低時升、且胰島素抑制(非增加)β氧化。故C正確。記憶:胰島素/malonyl-CoA→關閉β氧化(防無效循環)。","options":{"A":"血糖低升糖素升應增加β氧化(非減少)。","B":"血糖高時升的是胰島素(非升糖素)。","C":"血糖高→胰島素↑→減少脂肪酸入粒線體氧化—正解。","D":"血糖低時升的是升糖素(非胰島素)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-94":{"quick":"游離脂肪酸不是膜脂的組成類別(膜脂為磷脂、膽固醇、醣脂)。","detail":{"background":"細胞膜脂質「三大類」:『「磷脂質(甘油磷脂、鞘磷脂)」、「膽固醇(固醇)」、「醣脂(腦苷脂、神經節苷脂)」』。而『「游離脂肪酸(free fatty acid)」「不是」膜的結構脂質」(游離脂肪酸是代謝中間物/運輸形式,膜中脂肪酸以「酯化」於磷脂/醣脂存在)』。故D(游離脂肪酸)為「不包含者」,為正解。故D正確。記憶:膜脂=磷脂+膽固醇+醣脂(脂肪酸是「被酯化」於其中、非游離)。","options":{"A":"磷脂質為膜脂。","B":"膽固醇為膜脂。","C":"醣脂為膜脂。","D":"游離脂肪酸非膜結構脂—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-95":{"quick":"乳糜微粒(chylomicron)在小腸形成,運送飲食三酸甘油酯。","detail":{"background":"血漿脂蛋白:『「乳糜微粒(chylomicron)」「在「小腸黏膜細胞」形成」,「攜帶「飲食來源的三酸甘油酯(triglyceride)」」經淋巴入血→運送到周邊與「肝(殘餘顆粒被肝攝取)」』。故A正確。比較:HDL(逆向運輸膽固醇)、IDL(VLDL代謝中間)、ApoB-100(VLDL/LDL的載脂蛋白,非顆粒)。故A正確。記憶:乳糜微粒=腸道、運飲食TG(含ApoB-48)。","options":{"A":"乳糜微粒在小腸形成、運TG—正解。","B":"HDL逆向運膽固醇。","C":"IDL為VLDL代謝中間物。","D":"ApoB-100為載脂蛋白(非顆粒)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-87":{"quick":"五碳糖磷酸途徑供應合成核苷酸所需的核糖(ribose-5-P)。","detail":{"background":"五碳糖磷酸途徑(PPP)功能:C『「氧化期」產「NADPH(還原力,供脂肪酸/膽固醇合成、GSH抗氧化)」與「ribulose-5-P→ribose-5-P(「供「核苷酸/核酸合成」的核糖」)」』正確。比較錯誤:A PPP「不直接產36 ATP」(那是葡萄糖完全氧化);B不固定產5 CO₂;D PPP產「NADPH(非NADH/FADH₂)」、「不直接進呼吸鏈」。故C正確。記憶:PPP=NADPH + 核糖(非ATP)。","options":{"A":"PPP非產36 ATP。","B":"非固定產5 CO₂。","C":"供核苷酸所需核糖—正解。","D":"PPP產NADPH(非NADH/FADH₂進呼吸鏈)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-93":{"quick":"尿素循環產物為尿素與「反丁烯二酸(fumarate)」(非草醯乙酸),故此敘述錯誤。","detail":{"background":"尿素循環:A主要在肝(正確);C「跨「粒線體(前兩步)與細胞質(後段)」」(正確);D把含氮代謝物轉成尿素排出(正確)。B「產物之一為「草醯乙酸(oxaloacetate)」」「錯誤」—『argininosuccinate裂解產「精胺酸 + 「反丁烯二酸(fumarate)」」(非草醯乙酸);fumarate雖可經TCA轉malate→OAA,但「尿素循環「直接」產物是fumarate,非OAA」』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。","options":{"A":"主要於肝臟,正確。","B":"稱產物為草醯乙酸—錯誤(直接產物是fumarate),為正解。","C":"跨粒線體與細胞質,正確。","D":"把含氮物轉尿素,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-94":{"quick":"胺基酸主要經克氏循環(TCA)間接生成葡萄糖(生糖胺基酸)。","detail":{"background":"『「生糖胺基酸(glucogenic)」代謝成「「克氏循環(TCA)」中間物(如α-酮戊二酸、琥珀醯-CoA、草醯乙酸、fumarate)」或丙酮酸→「轉成草醯乙酸→經糖質新生「間接」生成葡萄糖」』。故D(citric acid cycle)為間接產糖的關鍵途徑,正確。比較:PPP(產NADPH/核糖)、尿素循環(排氮)、氧化磷酸化(產ATP)非產糖。故D正確。","options":{"A":"PPP產NADPH/核糖(非糖)。","B":"尿素循環排氮。","C":"氧化磷酸化產ATP。","D":"經TCA間接產葡萄糖—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-93":{"quick":"N5-甲基四氫葉酸把甲基交給同半胱胺酸→生成甲硫胺酸(methionine)。","detail":{"background":"單碳代謝:『「N5-甲基四氫葉酸(N5-methyl-THF)」把「甲基」交給「同半胱胺酸(homocysteine)」(經「甲硫胺酸合成酶」、需「維生素B12」)→生成「甲硫胺酸(methionine)」』(同時再生THF)。故D正確。臨床:葉酸或B12缺乏→甲基轉移受阻→homocysteine↑、「甲基葉酸陷阱(methyl-folate trap)」、巨球性貧血。故D正確。","options":{"A":"非異白胺酸。","B":"非白胺酸。","C":"非離胺酸。","D":"生成甲硫胺酸—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-94":{"quick":"肌酸由甘胺酸、精胺酸、甲硫胺酸(SAM甲基)合成。","detail":{"background":"肌酸(creatine)生合成:『「精胺酸(arginine)」把胍基轉給「甘胺酸(glycine)」→胍基乙酸→「甲硫胺酸(methionine,經SAM)」提供「甲基」→「肌酸」』。故C(glycine, arginine, methionine)正確。肌酸在肌肉磷酸化成磷酸肌酸(高能磷酸庫);其分解產物「肌酸酐(creatinine)」反映腎功能。故C正確。記憶:肌酸=Gly+Arg+Met(SAM甲基)。","options":{"A":"tyrosine/glutamine非肌酸成分。","B":"此為穀胱甘肽成分。","C":"glycine+arginine+methionine—正解。","D":"aspartate/cysteine非肌酸成分。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-92":{"quick":"腎上腺素由酪胺酸(tyrosine)經多巴→多巴胺→正腎上腺素→腎上腺素合成。","detail":{"background":"兒茶酚胺合成:『「酪胺酸(tyrosine)→(酪胺酸羥化酶,限速)→L-DOPA→多巴胺→正腎上腺素→「腎上腺素(epinephrine)」(PNMT甲基化,需SAM)」』。故D(tyrosine)為腎上腺素前驅物,正確。比較:glycine(血基質/肌酸)、tryptophan(血清素/菸鹼酸)、histidine(組織胺)。故D正確。記憶:酪胺酸→兒茶酚胺(DA/NE/Epi)、甲狀腺素、黑色素。","options":{"A":"甘胺酸非兒茶酚胺前驅。","B":"色胺酸為血清素前驅。","C":"組胺酸為組織胺前驅。","D":"酪胺酸為腎上腺素前驅—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-93":{"quick":"α-酮戊二酸經轉胺直接生成麩胺酸(glutamate)。","detail":{"background":"轉胺反應:『「α-酮戊二酸(α-ketoglutarate)」接受胺基(由其他胺基酸提供)→「直接生成「麩胺酸(glutamate)」」(需PLP)』。故A正確。麩胺酸是「胺基集中樞」(各胺基酸的胺基經轉胺匯入α-酮戊二酸成麩胺酸,再經麩胺酸去氫酶釋氨)。比較:pyruvate→alanine、oxaloacetate→aspartate(非glutamate)、acetoacetate非α-酮酸。故A正確。","options":{"A":"α-酮戊二酸→麩胺酸—正解。","B":"丙酮酸→丙胺酸。","C":"乙醯乙酸非α-酮酸。","D":"草醯乙酸→天門冬胺酸。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-94":{"quick":"血清素由色胺酸(tryptophan)合成。","detail":{"background":"『「血清素(serotonin, 5-HT)」由「色胺酸(tryptophan)→(色胺酸羥化酶)→5-羥色胺酸(5-HTP)→(去羧,需B6)→「血清素」」』。故C(tryptophan)正確。色胺酸亦為「菸鹼酸(B3)、褪黑激素」前驅。比較:arginine(NO/肌酸/尿素)、glutamate(GABA)、tyrosine(兒茶酚胺)。故C正確。記憶:色胺酸→血清素→褪黑激素。","options":{"A":"精胺酸非血清素前驅。","B":"麩胺酸為GABA前驅。","C":"色胺酸為血清素前驅—正解。","D":"酪胺酸為兒茶酚胺前驅。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-93":{"quick":"組胺酸是生糖胺基酸、經麩胺酸→α-酮戊二酸入TCA(非琥珀醯-CoA),故此敘述錯誤。","detail":{"background":"生糖胺基酸→TCA中間物的配對:A麩胺酸→α-酮戊二酸(正確);C天冬胺酸→草醯乙酸(正確);D酪胺酸→反丁烯二酸(fumarate,亦生酮)(正確)。B「「組胺酸(histidine)→「琥珀醯-CoA」」」「錯誤」—『「組胺酸代謝→「麩胺酸」→α-酮戊二酸」入TCA(非succinyl-CoA);轉成琥珀醯-CoA的是「甲硫胺酸、纈胺酸、異白胺酸、蘇胺酸、奇數碳脂肪酸」』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。","options":{"A":"麩胺酸→α-酮戊二酸,正確。","B":"稱組胺酸→琥珀醯-CoA—錯誤(應經麩胺酸→α-酮戊二酸),為正解。","C":"天冬胺酸→草醯乙酸,正確。","D":"酪胺酸→反丁烯二酸,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-93":{"quick":"膽紅素(bilirubin)是血基質「分解」產物,非合成前驅/中間物。","detail":{"background":"血基質(heme)「合成」前驅物/中間物:『「甘胺酸(glycine) + 琥珀醯-CoA(succinyl-CoA)」→「δ-胺基酮戊酸(δ-aminolevulinate, ALA)」→膽色素原→…→原紫質→血基質』(A、B、C皆為合成路徑成員)。而『「膽紅素(bilirubin)」是血基質「「分解(catabolism)」」的產物(heme→biliverdin→bilirubin),「非合成前驅/中間物」』。故D(bilirubin)為「非合成成員」,為正解。故D正確。記憶:Gly+succinyl-CoA→ALA合成heme;heme分解→biliverdin→bilirubin。","options":{"A":"甘胺酸為heme合成前驅。","B":"琥珀醯-CoA為前驅。","C":"δ-ALA為中間物。","D":"膽紅素為分解產物(非合成)—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-85":{"quick":"S-腺苷甲硫胺酸(SAM)由「甲硫胺酸」生成,非由酪胺酸代謝。","detail":{"background":"由「酪胺酸(tyrosine)」衍生者:『「腎上腺素(epinephrine)、黑色素(melanin)、多巴胺(dopamine)」(及正腎上腺素、甲狀腺素)』。而『「S-腺苷甲硫胺酸(SAM)」由「「甲硫胺酸(methionine) + ATP」」生成(是主要甲基供體),「非」由酪胺酸代謝』。故A(SAM)為「非由酪胺酸形成者」,為正解。故A正確。記憶:酪胺酸→兒茶酚胺/黑色素/甲狀腺素;SAM來自甲硫胺酸。","options":{"A":"SAM由甲硫胺酸生成(非酪胺酸)—正解。","B":"腎上腺素由酪胺酸。","C":"黑色素由酪胺酸。","D":"多巴胺由酪胺酸。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-93":{"quick":"天門冬胺酸-精胺琥珀酸支路把克氏循環與尿素循環連結。","detail":{"background":"『「天門冬胺酸-精胺琥珀酸支路(aspartate-argininosuccinate shunt)」連結「「克氏循環(TCA)」與「尿素循環(urea cycle)」」』:尿素循環中「天門冬胺酸(提供第二個氮)+瓜胺酸→精胺琥珀酸→精胺酸+「反丁烯二酸(fumarate)」」;fumarate進「TCA」→蘋果酸→草醯乙酸→再轉胺成天門冬胺酸回尿素循環。故A正確。意義:把氨處理(尿素)與碳代謝(TCA)耦合。故A正確。","options":{"A":"連結克氏循環與尿素循環—正解。","B":"非Cori cycle。","C":"非乙醛酸循環(人類無)。","D":"非葡萄糖-丙胺酸循環。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-94":{"quick":"白化症最常因「酪胺酸(tyrosine)」代謝(酪胺酸酶)異常致黑色素不足。","detail":{"background":"『「白化症(albinism)」最常因「酪胺酸酶(tyrosinase)」缺陷→「酪胺酸無法轉成「黑色素(melanin)」」→皮膚/毛髮/眼睛色素缺乏、畏光、視力差』。故D(tyrosine代謝異常)正確。比較:離胺酸、精胺酸、色胺酸代謝異常不致白化。故D正確。記憶:酪胺酸→(酪胺酸酶)→DOPA→黑色素;缺酪胺酸酶=白化症(另苯酮尿症PKU是苯丙胺酸→酪胺酸受阻)。","options":{"A":"離胺酸與白化無關。","B":"精胺酸與白化無關。","C":"色胺酸與白化無關。","D":"酪胺酸代謝異常致白化—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-94":{"quick":"穀胱甘肽(glutathione)為三胜肽(Glu-Cys-Gly)。","detail":{"background":"『「穀胱甘肽(glutathione, GSH)」是「三胜肽」:「麩胺酸-半胱胺酸-甘胺酸(γ-Glu-Cys-Gly)」(γ-麩胺醯鍵)』。故D正確。比較:阿斯巴甜(aspartame,二胜肽甲酯Asp-Phe-OMe)、血清素(單胺,非胜肽)、血基質(卟啉環+鐵,非胜肽)。故D正確。功能:GSH是主要抗氧化劑、解毒(結合異物)、維持-SH。記憶:GSH=Glu-Cys-Gly三胜肽。","options":{"A":"阿斯巴甜為二胜肽甲酯。","B":"血清素為單胺(非胜肽)。","C":"血基質為卟啉+鐵(非胜肽)。","D":"穀胱甘肽為三胜肽—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-98":{"quick":"支鏈胺基酸為白胺酸、異白胺酸、纈胺酸(非離胺酸),故此敘述錯誤。","detail":{"background":"支鏈胺基酸(BCAA):A「包括白胺酸、異白胺酸、「離胺酸(lysine)」」「錯誤」—『BCAA是「白胺酸(Leu)、異白胺酸(Ile)、「纈胺酸(Valine)」」(非離胺酸)』。故A為正解(錯誤敘述)。其餘正確:B BCAA轉胺酶在「肌肉」活性高(BCAA主要在肌肉代謝);C楓糖尿症因「支鏈α-酮酸去氫酶」缺陷(粒線體);D BCAA代謝產NADH、FADH₂。故A正確(為錯誤者)。記憶:BCAA=Leu/Ile/Val。","options":{"A":"稱含離胺酸—錯誤(BCAA為Leu/Ile/Val),為正解。","B":"肌肉BCAA轉胺酶活性高,正確。","C":"楓糖尿症因支鏈酮酸去氫酶缺,正確。","D":"產NADH/FADH₂,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-99":{"quick":"白胺酸(leucine)兼具必需與「純生酮」胺基酸。","detail":{"background":"『「白胺酸(leucine)」「同時是「必需胺基酸」與「「純生酮(ketogenic)」胺基酸」」(與離胺酸Lys是僅有的兩個「純生酮」胺基酸;白胺酸還是必需)』。故D正確。比較:天門冬胺酸(非必需、生糖)、組胺酸(必需但生糖)、酪胺酸(非必需、生糖兼生酮)。故D正確。記憶:純生酮=Leu、Lys;Leu兼必需。","options":{"A":"天門冬胺酸非必需、生糖。","B":"組胺酸必需但生糖。","C":"酪胺酸非必需(生糖兼生酮)。","D":"白胺酸兼必需與純生酮—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-94":{"quick":"同半胱胺酸由「甲硫胺酸(methionine)」轉換而來(非精胺酸),故此敘述錯誤。","detail":{"background":"同半胱胺酸(homocysteine):A是心血管疾病危險因子(正確);C「胱硫醚-β-合成酶(cystathionine-β-synthase, CBS)」缺乏→同半胱胺酸尿症(正確);D「葉酸、B12(再甲基化)、B6(轉硫成胱胺酸)」為其代謝輔酶(正確)。B「由「精胺酸(arginine)」轉換而來」「錯誤」—『同半胱胺酸由「「甲硫胺酸(methionine)」經SAM→SAH→去腺苷」生成(非精胺酸)』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。臨床:補葉酸/B6/B12降同半胱胺酸。","options":{"A":"是心血管危險因子,正確。","B":"稱由精胺酸轉換—錯誤(應由甲硫胺酸),為正解。","C":"CBS缺乏致同半胱胺酸尿症,正確。","D":"葉酸/B12為代謝輔酶,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-95":{"quick":"血基質生合成的主要前驅物之一是甘胺酸(glycine)。","detail":{"background":"『血基質(heme)生合成:「「甘胺酸(glycine)」 + 琥珀醯-CoA」經「δ-ALA合成酶(需B6)」→δ-胺基酮戊酸(ALA)→…→原紫質IX→(加Fe²⁺)→血基質」』。故D(glycine)為主要前驅物之一,正確。比較:色胺酸、酪胺酸、組胺酸非血基質前驅。故D正確。記憶:heme = glycine + succinyl-CoA。","options":{"A":"色胺酸非heme前驅。","B":"酪胺酸非heme前驅。","C":"組胺酸非heme前驅。","D":"甘胺酸為heme前驅—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-97":{"quick":"Caspase切在「天門冬胺酸(aspartate)」之後(cysteine蛋白酶、specific for Asp)。","detail":{"background":"『細胞凋亡的「caspases(半胱胺酸天門冬胺酸蛋白酶)」是「半胱胺酸蛋白酶(活性中心Cys)」,但「切割受質的位點「在「天門冬胺酸(aspartic acid)」「之後」(P1=Asp)」」』(故名「c-asp-ase」)。故C(天門冬胺酸)正確。caspase級聯(起始caspase-8/9→執行caspase-3/7)切割多種受質執行凋亡。故C正確。記憶:caspase=Cys蛋白酶、切Asp後。","options":{"A":"非切絲胺酸。","B":"活性中心是Cys但切位非Cys。","C":"切天門冬胺酸之後—正解。","D":"非切酪胺酸。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-77":{"quick":"S-腺苷甲硫胺酸(SAM)提供甲基使磷脂醯乙醇胺甲基化成磷脂醯膽鹼。","detail":{"background":"肝細胞中『「磷脂醯乙醇胺(phosphatidylethanolamine)」經「「磷脂醯乙醇胺N-甲基轉移酶(PEMT)」用「「S-腺苷甲硫胺酸(SAM)」連續「3次甲基化」」→「磷脂醯膽鹼(phosphatidylcholine)」」(題以phosphoethanolamine→phosphocholine示意此甲基化)』。故D(SAM)為甲基供體,正確。SAM是體內主要甲基供體。比較:methionine需先活化成SAM、serine/folic acid非直接甲基供體於此。故D正確。","options":{"A":"甲硫胺酸需先活化成SAM。","B":"絲胺酸非此甲基供體。","C":"葉酸非此直接甲基供體。","D":"SAM提供甲基—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-89":{"quick":"N-連結醣化接在「天門冬醯胺(asparagine)」殘基上。","detail":{"background":"蛋白質醣化:『「N-連結(N-linked)」糖接到「「天門冬醯胺(asparagine)」的醯胺氮」(序列Asn-X-Ser/Thr,X≠Pro);「O-連結(O-linked)」糖接到「絲胺酸(Ser)/蘇胺酸(Thr)」的羥基』。題問N-linked的接點→C(asparagine)。故C正確。N-連結在內質網起始(加到Asn)、高基氏體修飾。故C正確。記憶:N-連結=Asn;O-連結=Ser/Thr。","options":{"A":"絲胺酸為O-連結。","B":"酪胺酸非主要醣化點。","C":"天門冬醯胺為N-連結—正解。","D":"天門冬胺酸非醣化接點。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-94":{"quick":"血基質合成「最後步驟在粒線體」完成(非細胞質),故此敘述錯誤。","detail":{"background":"琥珀酸-甘胺酸路徑(血基質合成):A第一個酵素是「δ-ALA合成酶」(正確);B血基質碳來自琥珀酸與甘胺酸(正確);C需「磷酸吡哆醛(B6)」(ALA合成酶輔酶)(正確)。D「血基質合成「在細胞質完成」」「錯誤」—『血基質合成「「起始(粒線體)→中段(細胞質)→「最後幾步(原紫質生成、加鐵ferrochelatase)回「「粒線體」」完成」」」(非在細胞質完成)』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:heme合成首尾在粒線體、中段在細胞質。","options":{"A":"第一酵素為δ-ALA合成酶,正確。","B":"碳來自琥珀酸+甘胺酸,正確。","C":"需PLP(B6),正確。","D":"稱在細胞質完成—錯誤(最後步在粒線體),為正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-95":{"quick":"肌肉的氨以「丙胺酸(alanine)」攜帶入肝(葡萄糖-丙胺酸循環)。","detail":{"background":"『肌肉胺基酸代謝產生的氨,經「轉胺給丙酮酸→「丙胺酸(alanine)」」攜帶,「經血液入「肝」」→肝把丙胺酸轉回丙酮酸(做糖質新生)+釋氨(入尿素循環)」』=「葡萄糖-丙胺酸循環(Cahill cycle)」。故D(丙胺酸)正確。比較:瓜胺酸/精胺酸是尿素循環中間物(肝內)、離胺酸非氨載體。故D正確。記憶:肌肉氨→丙胺酸→肝;肌肉氨亦可→麩醯胺→肝/腎。","options":{"A":"離胺酸非氨載體。","B":"瓜胺酸為尿素循環中間物。","C":"精胺酸為尿素循環中間物。","D":"丙胺酸攜氨入肝—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-89":{"quick":"醣蛋白的醣化接點為天門冬醯胺(N-)、絲胺酸/蘇胺酸(O-)。","detail":{"background":"醣蛋白醣化的胺基酸殘基:『「N-連結→「天門冬醯胺(asparagine)」」;「O-連結→「絲胺酸(serine)、蘇胺酸(threonine)」」』。故A(asparagine, serine, threonine)為醣化接點組合,正確。故A正確。記憶:醣化=Asn(N-)+Ser/Thr(O-)。其餘組合(含cysteine/glutamate/arginine等)非主要醣化接點。","options":{"A":"Asn(N-)+Ser/Thr(O-)—正解。","B":"非主要醣化接點。","C":"非醣化接點組合。","D":"非醣化接點組合。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-93":{"quick":"脯胺酸與精胺酸主要由麩胺酸(glutamate)代謝轉換而成。","detail":{"background":"『「麩胺酸(glutamate)」是「脯胺酸(proline)、精胺酸(arginine)、鳥胺酸」的共同前驅:「麩胺酸→麩胺酸半醛→「鳥胺酸/脯胺酸/精胺酸」」』。故A(glutamate)正確。麩胺酸亦是穀胱甘肽、GABA、α-酮戊二酸的相關代謝樞紐。比較:色胺酸(血清素)、纈胺酸(BCAA)、甲硫胺酸(SAM)非脯/精胺酸前驅。故A正確。","options":{"A":"麩胺酸為脯/精胺酸前驅—正解。","B":"色胺酸非此前驅。","C":"纈胺酸非此前驅。","D":"甲硫胺酸非此前驅。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-94":{"quick":"白胺酸(leucine)為純生酮胺基酸,過度代謝最易致酮症。","detail":{"background":"飢餓時蛋白分解供能:『「白胺酸(leucine)」是「「純生酮(ketogenic)」胺基酸」→代謝產「acetyl-CoA/乙醯乙酸」→「酮體」→過度代謝「最易致酮症(ketosis)」』。故A正確。比較:甲硫胺酸/精胺酸/麩胺酸是「生糖」胺基酸(轉成TCA中間物/糖,不直接生酮)。故A正確。記憶:純生酮=Leu、Lys。","options":{"A":"白胺酸純生酮、最易致酮症—正解。","B":"甲硫胺酸為生糖。","C":"精胺酸為生糖。","D":"麩胺酸為生糖。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-98":{"quick":"兒茶酚胺類激素的前驅物為酪胺酸(tyrosine)。","detail":{"background":"『「兒茶酚胺(catecholamines:多巴胺、正腎上腺素、腎上腺素)」由「酪胺酸(tyrosine)」合成:「酪胺酸→(酪胺酸羥化酶,限速)→DOPA→多巴胺→正腎上腺素→腎上腺素」』。故D(tyrosine)正確。比較:asparagine、glutamate、arginine非兒茶酚胺前驅。故D正確。記憶:酪胺酸→兒茶酚胺(亦→甲狀腺素、黑色素)。","options":{"A":"天門冬醯胺非兒茶酚胺前驅。","B":"麩胺酸為GABA前驅。","C":"精胺酸為NO前驅。","D":"酪胺酸為兒茶酚胺前驅—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-94":{"quick":"半胱胺酸(cysteine)可代謝產生丙酮酸與硫化氫(H₂S)。","detail":{"background":"『「半胱胺酸(cysteine)」代謝可產「丙酮酸(pyruvate)」與含硫產物;其中「脫硫途徑(經胱硫醚酶等)可產「硫化氫(H₂S)」」(H₂S為氣體訊號分子,調血管/神經)』。故B(cysteine)正確。比較:甲硫胺酸(經同半胱胺酸→半胱胺酸)、絲胺酸(→丙酮酸但不生H₂S)、蘇胺酸非直接產H₂S+丙酮酸者。故B正確。記憶:含硫胺基酸=Met、Cys;Cys是H₂S來源。","options":{"A":"甲硫胺酸經半胱胺酸途徑(非直接)。","B":"半胱胺酸→丙酮酸+H₂S—正解。","C":"絲胺酸→丙酮酸但不生H₂S。","D":"蘇胺酸非此。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-98":{"quick":"一氧化氮(NO)由NO合成酶以「精胺酸(arginine)」為受質生成。","detail":{"background":"『「一氧化氮合成酶(NO synthase, NOS)」催化「「精胺酸(arginine)」 + O₂ + NADPH → 「一氧化氮(NO)」 + 瓜胺酸(citrulline)」」』。故C(arginine)正確。NO是血管舒張(內皮EDRF)、神經傳遞、免疫殺菌的氣體訊號;活化鳥苷酸環化酶→cGMP→血管平滑肌鬆弛。故C正確。記憶:NO來自精胺酸(NOS,產瓜胺酸副產物)。","options":{"A":"天門冬醯胺非NO受質。","B":"麩胺酸非NO受質。","C":"精胺酸為NO受質—正解。","D":"酪胺酸非NO受質。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-92":{"quick":"血紅素加氧酶(heme oxygenase)把血基質分解成膽綠素(biliverdin)。","detail":{"background":"血基質分解:『「「血基質加氧酶(heme oxygenase, HO)」」催化「heme + O₂ + NADPH → 「膽綠素(biliverdin)」 + CO + Fe²⁺」」;膽綠素再經「膽綠素還原酶」→「膽紅素(bilirubin)」』。故B(heme oxygenase)正確。(此反應在脾/肝/巨噬細胞,屬紅血球破壞後血紅素回收。)比較:無「heme oxidase/dehydrogenase/peroxidase」此命名功能。故B正確。記憶:HO→biliverdin + CO(內生性CO來源)。","options":{"A":"無heme oxidase此標準酵素。","B":"血紅素加氧酶→膽綠素—正解。","C":"無heme去氫酶。","D":"過氧化氫酶非此功能。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-93":{"quick":"白胺酸(leucine)為生酮胺基酸,飢餓/糖尿時代謝產能。","detail":{"background":"『飢餓或糖尿病時,「白胺酸(leucine)」是「「生酮(ketogenic)」胺基酸」→代謝成「acetyl-CoA/酮體」供能(尤其供肝外組織)』。故A正確。比較:精胺酸、脯胺酸、麩胺酸是「生糖」胺基酸(→TCA中間物/糖)。故A正確。記憶:純生酮=Leu、Lys。","options":{"A":"白胺酸為生酮胺基酸—正解。","B":"精胺酸為生糖。","C":"脯胺酸為生糖。","D":"麩胺酸為生糖。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-79":{"quick":"葉酸(folate)可降低血中同半胱胺酸、減少心血管風險。","detail":{"background":"『「葉酸(folate)」(及B12、B6)是「同半胱胺酸再甲基化成甲硫胺酸(經N5-甲基THF)」的輔因子→「補充葉酸可「降低血中同半胱胺酸」」』(高同半胱胺酸是心臟病、高血壓、中風的危險因子)。故C(folate)正確。比較:aspartate、malate、citrulline不降同半胱胺酸。故C正確。記憶:葉酸/B6/B12↓同半胱胺酸。","options":{"A":"天門冬胺酸不降同半胱胺酸。","B":"蘋果酸不降。","C":"葉酸降同半胱胺酸—正解。","D":"瓜胺酸不降。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-96":{"quick":"肝外組織的氨以「麩醯胺酸(glutamine)」形式運送入肝(/腎)。","detail":{"background":"『「肝外組織(尤其腦)」產生的「氨(NH₄⁺)」,經「麩醯胺酸合成酶」與「麩胺酸 + NH₄⁺ → 「麩醯胺酸(glutamine)」」「無毒攜帶」入血→「運到「肝(經麩醯胺酸酶釋氨入尿素循環)/腎(釋氨排泄調酸鹼)」」』。故C(麩醯胺酸)正確。比較:肌肉另用「丙胺酸」(葡萄糖-丙胺酸循環);G6P/ATP/acetyl-CoA非氨載體。故C正確。記憶:氨運輸=麩醯胺酸(全身)+丙胺酸(肌肉)。","options":{"A":"葡萄糖6-磷酸非氨載體。","B":"ATP非氨載體。","C":"麩醯胺酸攜氨入肝—正解。","D":"乙醯-CoA非氨載體。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-79":{"quick":"依Chargaff法則,B菌C應為19%(非31%),故「B菌胞嘧啶約31%」為錯誤敘述。","detail":{"background":"Chargaff法則(雙股DNA):『A=T、G=C,且A+T+G+C=100%』。A菌T=16%→A=16%,A+T=32%→G+C=68%→「G=C=34%」;B菌T=31%→A=31%,A+T=62%→G+C=38%→「G=C=19%」。逐項:A「A菌腺嘌呤≈16%」正確(A=T);B「A菌胞嘧啶≈34%」正確;D「A菌(GC高68%、氫鍵多、Tm高)比B菌更可能耐高溫」正確。C「B菌胞嘧啶≈「31%」」「錯誤」(B菌C應為19%)。故C為正解(錯誤敘述)。記憶:GC含量高→Tm高(3氫鍵)。","options":{"A":"A菌腺嘌呤≈16%(A=T),正確。","B":"A菌胞嘧啶≈34%,正確。","C":"稱B菌胞嘧啶≈31%—錯誤(應為19%),為正解。","D":"A菌GC高、較耐高溫,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-80":{"quick":"黃嘌呤(xanthine)無對應的磷酸核糖轉移酶,最不可能被嘌呤回收再利用。","detail":{"background":"嘌呤回收(salvage)途徑:『「腺嘌呤(adenine)」經「APRT」、「次黃嘌呤(hypoxanthine)與鳥嘌呤(guanine)」經「HGPRT」→與PRPP結合回收成核苷酸』。而『「黃嘌呤(xanthine)」「無專屬的磷酸核糖轉移酶」回收(xanthine是嘌呤分解中間物,經黃嘌呤氧化酶→尿酸排出)→「最不可能被回收」』。故C正確。故C正確。記憶:回收=adenine(APRT)、hypoxanthine/guanine(HGPRT);xanthine走分解。","options":{"A":"腺嘌呤經APRT回收。","B":"鳥嘌呤經HGPRT回收。","C":"黃嘌呤無回收酶、最不可能—正解。","D":"次黃嘌呤經HGPRT回收。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-80":{"quick":"HGPRT活性降低(回收障礙)→嘌呤分解增→尿酸堆積→痛風(如Lesch-Nyhan)。","detail":{"background":"痛風(尿酸堆積)的酵素異常:『「次黃嘌呤-鳥嘌呤磷酸核糖轉移酶(HGPRT)活性「降低」」→「嘌呤「回收受阻」→次黃嘌呤/鳥嘌呤轉向「分解成尿酸」↑、且PRPP累積促de novo合成→「尿酸過多→痛風」」』(嚴重缺乏=Lesch-Nyhan症)。故C正確。比較:A檸檬酸合成酶與痛風無關;B PRPP合成酶「降低」反而減嘌呤(其「過度活化」才致痛風);D葡萄糖-6-磷酸酶「上升」非典型(其缺乏=von Gierke症可續發高尿酸)。故C正確。","options":{"A":"檸檬酸合成酶與痛風無關。","B":"PRPP合成酶降低反減嘌呤(過度活化才致痛風)。","C":"HGPRT活性降低→尿酸堆積痛風—正解。","D":"G6P酶上升非痛風主因。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-90":{"quick":"嘧啶(pyrimidine)不是細胞內acetyl-CoA的主要來源。","detail":{"background":"細胞內acetyl-CoA的主要來源:『「丙酮酸(pyruvate, 經PDH)」、「脂肪酸(β氧化)」、「生酮胺基酸(ketogenic amino acids)」』。而『「嘧啶(pyrimidine)」是「核苷酸鹼基」,「不是acetyl-CoA來源」(嘧啶分解產β-丙胺酸等、非acetyl-CoA主要來源)』。故C(pyrimidine)為「非主要來源者」,為正解。故C正確。記憶:acetyl-CoA來源=糖(丙酮酸)、脂肪酸、生酮胺基酸。","options":{"A":"脂肪酸為acetyl-CoA來源。","B":"生酮胺基酸為來源。","C":"嘧啶非acetyl-CoA主要來源—正解。","D":"丙酮酸為主要來源。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-79":{"quick":"5-甲基胞嘧啶去胺基→胸腺嘧啶(thymine),為去胺基(deamination)作用。","detail":{"background":"去胺基(deamination, 失去-NH₂)反應:『「5-甲基胞嘧啶(5-methylcytosine)去胺基→「胸腺嘧啶(thymine)」」(B)—此為「自發去胺基突變熱點」(C→T,因5-mC去胺直接成T、不被尿嘧啶醣苷酶辨識→較難修復)』。故B正確。比較:cytosine去胺→「尿嘧啶」(非次黃嘌呤);adenine去胺→「次黃嘌呤」(非黃嘌呤);guanine去胺→「黃嘌呤」(非尿嘧啶)。故B(5-mC→T)為正確的去胺反應。故B正確。","options":{"A":"胞嘧啶去胺成尿嘧啶(非次黃嘌呤)。","B":"5-甲基胞嘧啶去胺成胸腺嘧啶—正解。","C":"腺嘌呤去胺成次黃嘌呤(非黃嘌呤)。","D":"鳥嘌呤去胺成黃嘌呤(非尿嘧啶)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-93":{"quick":"天門冬胺酸(aspartate)同時是尿素、嘌呤、嘧啶合成的基質。","detail":{"background":"『「天門冬胺酸(aspartate)」是「尿素循環(提供第二個氮、經精胺琥珀酸)、「嘌呤合成(提供N1)」、「嘧啶合成(提供碳氮骨架,與胺甲醯磷酸縮合)」」的「共同基質」』。故C(aspartate)正確。比較:甲硫胺酸(SAM甲基)、離胺酸(純生酮、不入這些)、脯胺酸(由麩胺酸來)非此三者共用基質。故C正確。記憶:aspartate供尿素/嘌呤/嘧啶之氮碳。","options":{"A":"甲硫胺酸為甲基供體。","B":"離胺酸非此基質。","C":"天門冬胺酸供尿素/嘌呤/嘧啶—正解。","D":"脯胺酸非此基質。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-84":{"quick":"胸腺嘧啶分解的尿中代謝產物為β-胺基異丁酸(β-aminoisobutyric acid)。","detail":{"background":"嘧啶分解:『「胸腺嘧啶(thymine)」分解→「「β-胺基異丁酸(β-aminoisobutyric acid)」」(尿中可測);「胞嘧啶/尿嘧啶」分解→「β-丙胺酸(β-alanine)」』。故A(β-aminoisobutyric acid)為胸腺嘧啶代謝產物,正確。比較:β-alanine(來自尿/胞嘧啶)、uridine/cytidine(核苷非分解終產物)。故A正確。記憶:嘧啶分解產水溶性β-胺基酸(不像嘌呤產不溶尿酸)。","options":{"A":"β-胺基異丁酸(胸腺嘧啶代謝物)—正解。","B":"β-丙胺酸來自尿/胞嘧啶。","C":"尿苷為核苷(非分解終產物)。","D":"胞苷為核苷(非分解終產物)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-80":{"quick":"PRPP合成酶(過度活化)與尿酸堆積、痛風最相關。","detail":{"background":"尿酸堆積/痛風相關酵素:『「「5-磷酸-α-D-核糖-1-焦磷酸合成酶(PRPP synthetase)」「過度活化」→「PRPP↑→嘌呤de novo合成↑→尿酸↑→痛風」」』。故B(PRPP synthetase)正確。比較:adenine phosphoribosyltransferase(APRT,回收)、glucose-6-phosphatase(肝醣儲積)、orotate phosphoribosyltransferase(嘧啶)非主要痛風酵素。(另HGPRT缺乏亦致痛風。)故B正確。記憶:痛風=PRPP合成酶過度活化 或 HGPRT缺乏。","options":{"A":"APRT為腺嘌呤回收(非痛風主因)。","B":"PRPP合成酶過度活化→痛風—正解。","C":"G6P酶屬肝醣代謝。","D":"乳清酸磷酸核糖轉移酶屬嘧啶。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-79":{"quick":"甲基(-CH₃)出現在胸腺嘧啶而不在尿嘧啶(故T=5-甲基尿嘧啶)。","detail":{"background":"『「胸腺嘧啶(thymine)」與「尿嘧啶(uracil)」差別在「胸腺嘧啶「多一個「甲基(-CH₃)」在C5」」(故thymine=「5-甲基尿嘧啶」)』。故B(甲基)正確。比較:去氧核糖/核糖是「核苷的糖」而非「鹼基本身」的差別、胺基非此差別。故B正確。意義:DNA用T(非U)→可區分「胞嘧啶去胺生成的尿嘧啶」為損傷而修復(維持基因穩定)。故B正確。","options":{"A":"去氧核糖屬糖(非鹼基差別)。","B":"胸腺嘧啶多甲基—正解。","C":"胺基非T/U差別。","D":"核糖屬糖(非鹼基差別)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-80":{"quick":"PRPP是核苷酸de novo合成與補救合成「共同」的關鍵分子。","detail":{"background":"『「5-磷酸-α-D-核糖-1-焦磷酸(PRPP)」是「核苷酸「de novo(重新)合成」與「salvage(補救/回收)合成」「共同」的活化核糖供體」』(de novo:PRPP→5-磷酸核糖胺起始嘌呤環;salvage:鹼基+PRPP→核苷酸)。故D(PRPP)正確。比較:GAR、PRA、FGAR是嘌呤de novo合成的「中間物」(僅de novo)。故D正確。記憶:PRPP=兩條路共用的核糖磷酸供體。","options":{"A":"GAR為嘌呤de novo中間物。","B":"PRA為嘌呤de novo中間物。","C":"FGAR為嘌呤de novo中間物。","D":"PRPP為de novo與salvage共同—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-80":{"quick":"輔酶A(CoA)結構中含「腺嘌呤核苷酸(ADP衍生物)」。","detail":{"background":"『「輔酶A(coenzyme A)」結構=「泛酸(B5)+β-巰基乙胺+「腺嘌呤核苷酸(3′-磷酸-ADP,含「腺嘌呤」)」」』。故C(腺嘌呤核苷酸)正確。許多輔酶含腺嘌呤核苷酸成分(NAD⁺、FAD、CoA皆含AMP/ADP部分)。比較:尿/胞/鳥嘌呤核苷酸非CoA成分。故C正確。記憶:CoA含腺嘌呤(ADP)+泛酸+巰基乙胺。","options":{"A":"尿嘧啶核苷酸非CoA成分。","B":"胞嘧啶核苷酸非CoA成分。","C":"腺嘌呤核苷酸(ADP)—正解。","D":"鳥嘌呤核苷酸非CoA成分。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-79":{"quick":"二氫乳清酸去氫酶(dihydroorotate dehydrogenase)位於粒線體,呼吸被抑制時嘧啶合成受阻。","detail":{"background":"『嘧啶de novo合成中,「「二氫乳清酸去氫酶(dihydroorotate dehydrogenase, DHODH)」「位於「粒線體內膜」、其電子「直接交給輔酶Q/電子傳遞鏈」」」→「當「粒線體呼吸被抑制」時,DHODH無法運作→「嘧啶合成受阻」」』。故C正確。比較:CPS-II、aspartate transcarbamoylase、OMP去羧酶皆在細胞質、不依賴呼吸鏈。故C正確。臨床:leflunomide抑制DHODH(免疫抑制)。","options":{"A":"CPS-II在細胞質(不依賴呼吸鏈)。","B":"天門冬胺酸轉胺甲醯酶在細胞質。","C":"二氫乳清酸去氫酶在粒線體、依賴呼吸鏈—正解。","D":"OMP去羧酶在細胞質。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-93":{"quick":"CTP(嘧啶)由天門冬胺酸與麩醯胺酸(及胺甲醯磷酸)合成。","detail":{"background":"嘧啶核苷酸合成的氮碳來源:『「「胺甲醯磷酸(來自「麩醯胺酸glutamine」提供氮 + CO₂)」 + 「天門冬胺酸(aspartate)」」→縮合成「乳清酸→UMP→UTP→「CTP(再由glutamine提供胺基)」」』。故D(aspartate與glutamine)為CTP合成的胺基酸來源,正確。故D正確。比較:嘌呤才大量用甘胺酸。記憶:嘧啶環=aspartate + 胺甲醯磷酸(glutamine供氮);CTP由UTP胺化(glutamine)。","options":{"A":"甘胺酸用於嘌呤(非嘧啶CTP主來源)。","B":"精胺酸/苯丙胺酸非CTP來源。","C":"半胱胺酸非CTP來源。","D":"天門冬胺酸+麩醯胺酸→CTP—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-79":{"quick":"5-FU經酵素轉成5-F-dUMP,抑制胸苷酸合成酶(thymidylate synthase)。","detail":{"background":"抗癌藥『「5-氟尿嘧啶(5-fluorouracil, 5-FU)」代謝成「「5-氟-2′-去氧尿苷單磷酸(5-F-dUMP)」」→「「不可逆抑制「胸苷酸合成酶(thymidylate synthase)」」(dUMP→dTMP受阻)→「dTMP不足→DNA合成停滯→殺增殖細胞」」』。故D(thymidylate synthase)正確。故D正確。記憶:5-FU→F-dUMP→抑thymidylate synthase(亦稱「無胸腺嘧啶性死亡」)。","options":{"A":"黃嘌呤氧化酶屬嘌呤分解(別嘌呤醇標的)。","B":"CPS-II為嘧啶合成起始(非5-FU標的)。","C":"腺苷脫胺酶屬嘌呤(SCID相關)。","D":"胸苷酸合成酶(5-FU標的)—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-83":{"quick":"DNA的五碳糖C2′為「H(去氧)」而非OH,故「DNA的2號碳官能基為OH」錯誤。","detail":{"background":"核苷酸結構:A「尿苷(uridine)是RNA核苷之一」(正確);B「磷酸主要接在五碳糖「5′碳」」(正確);D「RNA的糖是「D-核糖(D-ribose)」」(正確)。C「DNA結構中五碳糖「2號碳的官能基為「OH」」」「錯誤」—『「DNA的糖是「去氧核糖(deoxyribose)」,「2′碳為「H(無OH)」」」(RNA才是2′-OH)』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。記憶:DNA=2′-去氧(H);RNA=2′-OH。","options":{"A":"尿苷為RNA核苷,正確。","B":"磷酸接5′碳,正確。","C":"稱DNA 2′碳為OH—錯誤(DNA為2′-去氧H),為正解。","D":"RNA糖為D-核糖,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-84":{"quick":"核糖核苷酸還原酶(ribonucleotide reductase)把核糖核苷酸還原成去氧核糖核苷酸。","detail":{"background":"『「核糖核苷酸還原酶(ribonucleotide reductase, RNR)」催化「核糖核苷酸(NDP)的「2′-OH」「還原成「2′-H」→去氧核糖核苷酸(dNDP)」」(供DNA合成),還原力來自thioredoxin/NADPH』。故C正確。RNR是DNA合成的限速與調控點(羥基脲hydroxyurea抑制之)。比較:胸苷酸合成酶(dUMP→dTMP)、核苷單磷酸激酶(加磷酸)、胞苷酸合成酶非此功能。故C正確。記憶:RNR=核糖→去氧核糖(2′-OH→2′-H)。","options":{"A":"胸苷酸合成酶做dUMP→dTMP。","B":"核苷單磷酸激酶加磷酸。","C":"核糖核苷酸還原酶(核糖→去氧核糖)—正解。","D":"胞苷酸合成酶非此。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-81":{"quick":"AZT缺3′-OH,作為反轉錄酶DNA合成的「鏈終結者(chain terminator)」。","detail":{"background":"AZT(疊氮胸苷, 3′-azido-3′-deoxythymidine):『是「核苷類反轉錄酶抑制劑(NRTI)」—被磷酸化後「摻入正在合成的病毒DNA,因「缺3′-OH(被疊氮基取代)」→「無法再接下一個核苷酸→「鏈終結(chain terminator)」」」』。故C正確。比較:它「非不可逆抑制」(A錯)、非抑DNA pol α、非抑RNase A。臨床:治HIV(抑制反轉錄、阻病毒DNA合成)。故C正確。","options":{"A":"非不可逆抑制劑(為鏈終結)。","B":"非DNA pol α抑制劑。","C":"反轉錄酶DNA合成的鏈終結者—正解。","D":"非RNase A抑制劑。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_106100-82":{"quick":"人類DNA複製以「RNA」為起始引子。","detail":{"background":"『DNA聚合酶「無法從零起始」、只能「延長已有3′-OH」→需「「引子(primer)」」。「複製起始時由「引子酶(primase)」合成「短「RNA引子」」提供3′-OH→DNA聚合酶接著延伸」』。故B(RNA)正確。後續RNA引子被移除、以DNA填補(原核由pol I、真核由pol δ/RNase H+FEN1)、再由連接酶接合。故B正確。記憶:複製引子=RNA(primase合成)。","options":{"A":"引子非DNA(是RNA)。","B":"以RNA為引子—正解。","C":"非蛋白質引子。","D":"DNA複製需引子。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_106100-84":{"quick":"RecA促使LexA抑制子「自我裂解」,解除其對SOS基因的抑制。","detail":{"background":"SOS反應(DNA嚴重損傷的應急修復):『DNA損傷產生單股DNA→「「RecA」結合單股DNA形成核蛋白絲→「促使「LexA抑制子「自我裂解(self-cleavage)」」」→解除LexA對SOS基因(uvr、recA等)操縱子的抑制→誘導修復基因表現」』。故C正確。故C正確。記憶:RecA(感測損傷)→LexA自切→誘導SOS修復。","options":{"A":"非與聚合酶結合使LexA失活。","B":"非使operator彎曲。","C":"促LexA自我裂解、解除抑制—正解。","D":"非與LexA競爭operator。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_107100-79":{"quick":"CpG位點(CpG site)較易被甲基化。","detail":{"background":"DNA甲基化:『真核「「CpG位點(CpG dinucleotide)」的「胞嘧啶」常被「甲基化(5-甲基胞嘧啶)」」→與「基因沉默、表觀遺傳調控、X染色體去活化、印記」有關;「CpG島(啟動子區)」去甲基時基因可表現』。故B(CpG site)正確。比較:TATA box、CAAT box(啟動子元件)、端粒非甲基化熱點。故B正確。記憶:CpG甲基化=表觀沉默;5-mC去胺→T是突變熱點。","options":{"A":"TATA box非甲基化熱點。","B":"CpG位點易甲基化—正解。","C":"CAAT box非甲基化熱點。","D":"端粒非甲基化熱點。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_107100-80":{"quick":"B型DNA為右旋、相鄰鹼基對間距約3.4 Å。","detail":{"background":"B型DNA(Watson-Crick標準型,生理常見):『「「右旋(right-handed)」、「相鄰鹼基對間距≈「3.4 Å」」、每圈約10.5 bp、直徑約20 Å」』。故B正確。比較:A型(右旋、較緊、RNA-DNA雜交常見)、Z型(「左旋」、嘌呤嘧啶交替序列)。3.6 Å、左旋皆非B型。故B正確。記憶:B-DNA=右旋、3.4 Å/bp、~10 bp/圈。","options":{"A":"間距應3.4 Å(非3.6)。","B":"右旋、3.4 Å/bp—正解。","C":"B型為右旋(非左旋)。","D":"B型右旋且3.4 Å。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_107100-81":{"quick":"DNA醣苷酶屬「鹼基切除修復」,不直接參與甲基指引錯配修復。","detail":{"background":"大腸桿菌「甲基指引錯配修復(methyl-directed mismatch repair)」用:『MutS(辨錯配)、MutL、MutH(切未甲基新股)、「DNA解螺旋酶II(UvrD/helicase II)」、外切酶、「DNA聚合酶III」、「DNA連接酶」』。而『「DNA醣苷酶(DNA glycosylase)」是「「鹼基切除修復(BER)」」的酵素(移除受損鹼基),「不」直接參與錯配修復』。故A(DNA glycosylase)為「不參與者」,為正解。故A正確。","options":{"A":"DNA醣苷酶屬BER、不參與錯配修復—正解。","B":"解螺旋酶II參與錯配修復。","C":"DNA連接酶參與。","D":"DNA pol III參與。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_107100-82":{"quick":"延遲股需先合成「岡崎片段(Okazaki fragment)」再接合。","detail":{"background":"延遲股(lagging strand)合成:『因DNA聚合酶只能「5′→3′」合成,而延遲股模板方向相反→「「不連續」合成「岡崎片段(Okazaki fragment, 短DNA段,各以RNA引子起始)」→再移除引子、填補、由連接酶「接合」成連續股」』。故D(需先合成岡崎片段)正確。比較錯誤:A延遲股主要由「pol III」合成(pol I只移引子);B是「不連續」(非持續);C合成方向仍「5′→3′」(每片段)。故D正確。","options":{"A":"主要由pol III(非pol I)。","B":"是不連續(非持續)。","C":"仍5′→3′合成(非3′→5′)。","D":"需先合成岡崎片段—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_107100-85":{"quick":"900 bp編碼→300個密碼子→約300胺基酸,蛋白質分子量約30,000。","detail":{"background":"由「900個鹼基對(全為編碼、無UTR)」推估蛋白質分子量:『900 bp ÷ 3(每密碼子3核苷酸)=「300個密碼子≈300個胺基酸」;每胺基酸平均分子量≈110 Da→「300×110≈33,000≈「30,000」」』。故C(30,000)正確。故C正確。記憶:胺基酸平均≈110 Da;蛋白MW≈殘基數×110。","options":{"A":"900為鹼基對數(非分子量)。","B":"5,000過低。","C":"約30,000(300殘基×110)—正解。","D":"100,000過高。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108030-81":{"quick":"Dam甲基化酶修飾(甲基化)模板股,使DNA修復系統辨認新舊股。","detail":{"background":"大腸桿菌「Dam甲基化酶(Dam methylase)」:『「在「GATC序列」的腺嘌呤(A)上甲基化」→「複製後「模板(舊)股已甲基化、新股暫未甲基化(半甲基化狀態)」→「錯配修復系統「以此區分新舊股」、把錯誤改在「新股」上」』。故B(修飾模板股供修復辨認)正確。比較:Dam非把尿嘧啶轉胸腺嘧啶(A錯)、非去除錯配。故B正確。記憶:Dam甲基化GATC→錯配修復辨股。","options":{"A":"非把尿嘧啶轉胸腺嘧啶。","B":"修飾DNA供修復辨認新舊股—正解。","C":"非去除錯配。","D":"非修復編碼股錯配。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108030-82":{"quick":"大腸桿菌DNA pol I本身「不」具DNA gyrase活性。","detail":{"background":"大腸桿菌DNA聚合酶I(pol I)的三種活性:『「5′→3′聚合酶」、「3′→5′外切酶(校對)」、「5′→3′外切酶(移除RNA引子/nick translation)」』。而『「DNA gyrase(拓樸異構酶II)」是「另一獨立酵素」(解超螺旋),「不」是pol I的活性』。故B(DNA gyrase活性)為「pol I不具者」,為正解。故B正確。記憶:pol I=聚合+兩種外切;gyrase另屬拓樸異構酶。","options":{"A":"pol I有3′→5′外切(校對)。","B":"pol I無DNA gyrase活性—正解。","C":"pol I有5′→3′聚合。","D":"pol I有5′→3′外切。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108030-84":{"quick":"真核DNA複製主要由pol δ/ε(非pol I)進行,故「主要由pol I複製」錯誤。","detail":{"background":"真核DNA複製敘述:B「起始需RNA引子」(正確);C「解螺旋酶解雙股」(正確);D「複製蛋白A(RPA)結合單股DNA」(正確)。A「主要由「DNA polymerase I」進行複製」「錯誤」—『「pol I是「原核」酵素;真核複製主要由「pol δ(延遲股)與pol ε(前進股)」,pol α/primase起始」』。故A為正解(錯誤敘述)。故A正確(為錯誤者)。記憶:真核複製=pol α(引子)、δ/ε(主);pol I是原核。","options":{"A":"稱主要由pol I複製—錯誤(真核用pol δ/ε),為正解。","B":"需RNA引子,正確。","C":"解螺旋酶解雙股,正確。","D":"RPA結合單股,正確。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108030-86":{"quick":"細菌錯配修復利用「甲基化」區分新舊股(判斷哪股是模板)。","detail":{"background":"『細菌「錯配修復(mismatch repair)」利用「「DNA甲基化(GATC的Dam甲基化)」」「區分新舊股」:「舊(模板)股已甲基化、新合成股暫未甲基化」→修復系統「把錯誤改在「未甲基化的新股」」(保留模板正確序列)』。故C(甲基化)正確。比較:乙醯化、磷酸化、醣化非區分新舊股機制。故C正確。記憶:錯配修復靠甲基化(半甲基化)辨股。","options":{"A":"乙醯化非辨股機制。","B":"磷酸化非此。","C":"甲基化區分新舊股—正解。","D":"醣化非此。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108100-79":{"quick":"加熱使雙股解開、UV吸光增、但「N-醣苷鍵不斷裂」,故「N-醣苷鍵斷裂」錯誤。","detail":{"background":"雙股DNA加熱(37→95°C):A「UV 260 nm吸光「增加」(增色效應hyperchromicity,單股暴露鹼基)」(正確);C「雙股螺旋「解開(變性)」」(正確);D「DNA「不會沉澱」(仍溶於水)」(正確)。B「「N-醣苷鍵(鹼基-糖)」斷裂」「錯誤」—『加熱「只打斷「鹼基配對的「氫鍵」」使兩股分離,「不破壞「共價的N-醣苷鍵或磷酸二酯骨架」」』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。記憶:變性=斷氫鍵(非共價鍵);增色效應。","options":{"A":"UV260吸光增(增色效應),正確。","B":"稱N-醣苷鍵斷裂—錯誤(只斷氫鍵),為正解。","C":"雙股解開,正確。","D":"不會沉澱,正確。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108100-80":{"quick":"RNA引子提供「3′-端羥基(OH)」供DNA聚合酶延伸。","detail":{"background":"『DNA聚合酶「只能在已有「3′-OH」的核苷酸上「加上新核苷酸(5′-磷酸接到3′-OH)」」、無法從零起始→需「RNA引子「提供一個「3′-端羥基(3′-OH)」」作為延伸起點」』。故B正確。故B正確。記憶:聚合方向5′→3′、新核苷酸接到「前一個的3′-OH」、故引子需提供3′-OH。","options":{"A":"非提供3′-磷酸。","B":"提供3′-端羥基—正解。","C":"非提供5′-OH。","D":"非提供5′-磷酸。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108100-81":{"quick":"人類每條染色體有「多個(>3)」複製原點。","detail":{"background":"複製原點數目:『「原核(如大腸桿菌)單一複製原點(oriC)」;「真核(人類)染色體「極大」→「每條染色體有「多個(數百~數千)」複製原點」」→同時起始、加速完成複製(在S期內)』。故D(>3)正確。故D正確。記憶:原核1個ori;真核多個ori(故>3)。","options":{"A":"1為原核(非人類)。","B":"非2個。","C":"非3個。","D":">3(多個)—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109020-79":{"quick":"Tm(融化溫度)定義為「50%」DNA分子變性(雙股解開)時的溫度。","detail":{"background":"『「融化溫度(melting temperature, Tm)」定義:「「50%」的DNA分子「變性(雙股→單股)」時的溫度」』(以UV260吸光增至中點判定)。故B(50%)正確。Tm與「GC含量(3氫鍵)正相關」、與鹽濃度、長度有關。故B正確。記憶:Tm=半數變性溫度;GC高→Tm高。","options":{"A":"非25%。","B":"50%變性—正解。","C":"非75%。","D":"非100%。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109020-80":{"quick":"Watson-Crick模型:同股相鄰鹼基間距約3.4 Å。","detail":{"background":"Watson-Crick DNA模型正確描述:D『「同股內相鄰兩核苷酸鹼基的「間距≈3.4 Å」」(每圈10 bp、約34 Å)』正確。比較錯誤:A「磷酸骨架在「外側」(親水),鹼基在「內側」」(非磷酸在內);B「兩股「反平行(antiparallel)」(一股5′→3′、另股3′→5′)」(非平行同向);C「兩股間距「只容一個嘌呤配一個嘧啶」(A-T、G-C)」(非容兩嘌呤或兩嘧啶)。故D正確。","options":{"A":"磷酸在外側(非內部)。","B":"兩股反平行(非平行同向)。","C":"只容嘌呤配嘧啶(非兩嘌呤/兩嘧啶)。","D":"相鄰鹼基間距3.4 Å—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109020-81":{"quick":"DNA聚合酶I具5′→3′核酸外切酶活性(移除RNA引子)。","detail":{"background":"『「DNA聚合酶I(pol I)」獨有「「5′→3′外切酶」活性」→「移除延遲股的「RNA引子」、並以DNA填補(nick translation)」』。故B(pol I)正確。比較:primase(合成引子、無外切)、pol III(主複製、有3′→5′校對但無5′→3′外切)、gyrase(拓樸異構酶)。故B正確。記憶:pol I的5′→3′外切=去引子;pol III無此。","options":{"A":"primase合成引子(無外切)。","B":"DNA pol I有5′→3′外切—正解。","C":"pol III無5′→3′外切。","D":"gyrase為拓樸異構酶。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109020-82":{"quick":"3′→5′外切核酸酶(校對proofreading)增加DNA複製準確度。","detail":{"background":"『DNA複製的「準確度(fidelity)」主要靠「「3′→5′外切核酸酶(proofreading/校對)」」:「DNA聚合酶若加錯核苷酸→「3′→5′外切酶「切除錯誤核苷酸」」→再重新加對的」』。故B正確。比較:單股結合蛋白(穩定單股)、連接酶(接nick)、解螺旋酶(解雙股)皆非校對。故B正確。記憶:校對=3′→5′外切;另有錯配修復(複製後)進一步提高準確度。","options":{"A":"單股結合蛋白穩定單股(非校對)。","B":"3′→5′外切酶校對—正解。","C":"連接酶接nick(非校對)。","D":"解螺旋酶解雙股(非校對)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109100-81":{"quick":"Klenow片段「無」拓樸異構酶活性,故此敘述錯誤。","detail":{"background":"Klenow片段(大腸桿菌pol I的「大片段」):『保留「「DNA聚合酶活性」+「3′→5′外切(校對)」」,「「失去「5′→3′外切」活性」」』(常用於填補3′凹端、定序)。D「具「topoisomerase活性」」「錯誤」—『Klenow「無拓樸異構酶活性」(拓樸異構酶是另一獨立酵素)』。故D為正解(錯誤敘述)。其餘A(聚合酶)、B(3′→5′外切)、C(屬pol I片段)皆正確。故D正確(為錯誤者)。","options":{"A":"有DNA聚合酶活性,正確。","B":"有3′→5′外切,正確。","C":"屬pol I的大片段,正確。","D":"稱有topoisomerase活性—錯誤,為正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109100-82":{"quick":"複製叉中由「引子酶(primase)」合成RNA引子。","detail":{"background":"大腸桿菌複製叉的DNA合成反應:B『「「引子酶(primase, DnaG)」「合成「RNA引子」」」(提供3′-OH供pol III延伸)』正確。比較錯誤:A解螺旋酶(helicase)「解開雙股、無內切酶切DNA」;C拓樸異構酶I「鬆超螺旋、非外切酶切DNA」;D「主複製酶是「pol III」(非pol II,pol II主修復)」。故B正確。記憶:helicase解旋、primase造引子、pol III主合成、gyrase鬆超螺旋。","options":{"A":"解螺旋酶解雙股(無內切切DNA)。","B":"引子酶合成RNA引子—正解。","C":"拓樸異構酶I鬆超螺旋(非外切)。","D":"主複製酶為pol III(非pol II)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-79":{"quick":"聚合反應把「n+1核苷酸的5′-磷酸」接到「n核苷酸的3′-OH」。","detail":{"background":"DNA聚合酶催化:『「新核苷酸(n+1)的「5′-α-磷酸」」「親核攻擊」「前一核苷酸(n)的「3′-OH」」→形成「磷酸二酯鍵」、釋焦磷酸(PPi)』→鏈「5′→3′」延長。故題中「n+1:5′磷酸;n:3′-OH」(D)。故D正確。記憶:5′→3′合成=新核苷酸5′磷酸接到鏈3′-OH。","options":{"A":"方向相反不符。","B":"方向相反不符。","C":"官能基對調不符。","D":"n+1的5′磷酸接n的3′-OH—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-81":{"quick":"大腸桿菌同源重組需RecBCD(加工DNA末端產生單股供RecA作用)。","detail":{"background":"大腸桿菌同源重組:『「「RecBCD」(具解旋酶+核酸酶活性)「加工雙股DNA斷裂末端→產生「3′單股突出」」」→「RecA」載入單股、催化「股侵入/股交換」→形成Holliday接合→RuvABC解析』。題問「借助何種蛋白質活性(產生單股末端/起始)」→D(RecBCD)。故D正確。(RecA做股交換、RuvC解析、ligase接合各司其職;本題重點為RecBCD加工末端。)故D正確。","options":{"A":"DNA連接酶接合(非產生單股末端)。","B":"RuvC解析Holliday接合。","C":"RecA做股侵入/交換。","D":"RecBCD加工末端產生單股—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-82":{"quick":"DnaB解螺旋酶結合「延遲股」模板、沿5′→3′方向行進解旋。","detail":{"background":"大腸桿菌『「DnaB解螺旋酶」「結合於「延遲股(lagging strand)」模板」,「沿「5′→3′」方向移動」→解開複製叉前方的雙股螺旋』。故C(延遲股;5′→3′)正確。(DnaB在延遲股模板上5′→3′移動,即朝複製叉前進方向解旋。)故C正確。記憶:DnaB=延遲股模板、5′→3′解旋。","options":{"A":"非前進股。","B":"非前進股、方向亦錯。","C":"延遲股、5′→3′—正解。","D":"方向應5′→3′(非3′→5′)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-77":{"quick":"真核DNA複製在細胞週期的「S期」進行。","detail":{"background":"細胞週期:『「G1(生長準備)→「S期(DNA「複製」、染色體倍增)」→G2(分裂準備)→M(有絲分裂)」』。故DNA複製在「S期(synthesis)」(B)。故B正確。記憶:S期=DNA合成;週期檢查點(G1/S、G2/M)把關。","options":{"A":"G1為複製前準備。","B":"S期進行DNA複製—正解。","C":"G2為分裂前準備。","D":"M期為有絲分裂。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-81":{"quick":"以「低色度(hypochromicity)」隨溫度變化測DNA融化溫度。","detail":{"background":"『測DNA「融化溫度(Tm)」利用「「增色/低色效應(hyper-/hypochromicity)」:「雙股(鹼基堆疊)時UV260吸光「低(低色度hypochromicity)」;變性成單股時吸光「增(增色)」」→「隨溫度上升監測UV260吸光、半數變性處=Tm」』。故D(低色度,即吸光隨變性改變的光學性質)正確。比較:導電性、膠中泳動、水溶性非測Tm的物理量。故D正確。","options":{"A":"導電性非測Tm。","B":"泳動性用於電泳分大小。","C":"水溶性非測Tm。","D":"低色度(光學吸光變化)測Tm—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-85":{"quick":"DNA校對(proofreading)由「3′→5′核酸外切酶(exonucleolytic)」活性負責。","detail":{"background":"『DNA合成後的「校對(proofreading)」由「「3′→5′「核酸外切酶(exonucleolytic)」」活性負責」:「加錯核苷酸→3′→5′外切切除→重加正確的」』。故D(3′→5′核酸水解活性)正確。比較:5′→3′/3′→5′「聚合活性」是合成(非校對)、5′→3′外切是去引子。故D正確。記憶:校對=3′→5′外切。","options":{"A":"5′→3′聚合是合成(非校對)。","B":"無3′→5′聚合活性。","C":"5′→3′外切是去引子。","D":"3′→5′外切=校對—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-86":{"quick":"移除誤植的尿嘧啶最主要靠「鹼基切除修復(BER)」。","detail":{"background":"『「DNA中誤植/去胺生成的「尿嘧啶(uracil)」」由「「鹼基切除修復(base excision repair, BER)」」移除:「「尿嘧啶-DNA醣苷酶(uracil-DNA glycosylase)」「切下尿嘧啶鹼基」→AP內切酶切骨架→pol填補→連接酶接合」』。故C(BER)正確。比較:直接修復(光裂合酶/MGMT)、重組修復、錯配修復針對不同損傷。故C正確。記憶:單一受損鹼基(尿嘧啶、氧化鹼基)=BER。","options":{"A":"直接修復針對二聚體/烷化。","B":"重組修復針對雙股斷裂。","C":"鹼基切除修復移除尿嘧啶—正解。","D":"錯配修復針對複製錯配。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-87":{"quick":"DNA聚合酶III是大腸桿菌DNA複製的「主要」聚合酶。","detail":{"background":"大腸桿菌「DNA聚合酶III(pol III holoenzyme)」:『「DNA「複製」時的「主要(高速、高持續性)」聚合酶」(全酶含β滑動夾提高processivity、有3′→5′校對)』。故B正確。比較錯誤:A仍「需引子」(無酶可不需引子);C「nick translation用「pol I」」(非III);D聚合需引子提供「3′-OH」(非5′-OH)。故B正確。記憶:pol III主複製、pol I去引子/修復。","options":{"A":"仍需引子(非不需)。","B":"是主要複製聚合酶—正解。","C":"nick translation用pol I(非III)。","D":"需引子提供3′-OH(非5′-OH)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-81":{"quick":"端粒酶(telomerase)只參與真核染色體DNA複製(線性末端)。","detail":{"background":"『「端粒酶(telomerase)」是「「真核」線性染色體「特有」」—「以自帶RNA為模板延長「端粒(telomere)末端重複序列」,解決「末端複製問題(end-replication problem)」」』。故C(telomerase)為「只在真核」者,正確。比較:primase、helicase、topoisomerase「原核與真核皆有」。故C正確。記憶:原核環狀DNA無端粒問題;真核線性末端需端粒酶。","options":{"A":"引子酶原核真核皆有。","B":"解螺旋酶皆有。","C":"端粒酶只在真核—正解。","D":"拓樸異構酶皆有。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-82":{"quick":"PCNA(增殖細胞核抗原)是「滑動夾」,增加DNA聚合酶的「持續合成能力(processivity)」。","detail":{"background":"『真核「「PCNA(proliferating cell nuclear antigen)」是「「滑動夾(sliding clamp)」」(環狀三聚體套住DNA)→「把DNA聚合酶δ/ε「固定在DNA上」→「大幅增加「持續合成能力(processivity)」」(一次合成更長、不脫落)」』。故C正確。比較:PCNA本身不校對(A錯)、非增「酵素活性」本質(B不準)、無3′→5′外切(D錯)。故C正確。記憶:PCNA=真核滑動夾(相當原核β夾)、提高processivity。","options":{"A":"PCNA本身不校對。","B":"非增本質酵素活性(是processivity)。","C":"增加持續合成能力(processivity)—正解。","D":"無3′→5′外切活性。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-83":{"quick":"鹼基切除修復(BER)的第一個酵素是「DNA醣苷酶(DNA glycosylase)」。","detail":{"background":"鹼基切除修復(BER)步驟:『①「「DNA醣苷酶(DNA glycosylase)」「辨認並切除受損鹼基」(產生AP位點/無鹼基位點)」→②AP內切酶切骨架→③DNA聚合酶填補→④DNA連接酶接合』。故第一個酵素為B(DNA glycosylase)。故B正確。記憶:BER首步=醣苷酶切鹼基(如尿嘧啶-DNA醣苷酶)。","options":{"A":"AP內切酶為第二步。","B":"DNA醣苷酶為第一步—正解。","C":"連接酶為最後步。","D":"聚合酶為填補步。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_112020-81":{"quick":"原核與真核DNA複製「皆需RNA引子」,故D的「真核不需/用DNA引子」之敘述錯誤。","detail":{"background":"DNA複製敘述:A「大腸桿菌「單一複製起始點(oriC)」」(正確);B「真核「多個複製起始點」」(正確);C「大腸桿菌「雙向(兩個複製叉)」複製」(正確)。D「大腸桿菌需RNA引子,而「真核生物的DNA複製「不需引子/用DNA為引子」」」「錯誤」—『「真核複製「同樣需要「RNA引子」」(由pol α/primase合成)』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:原核真核複製皆需RNA引子。","options":{"A":"大腸桿菌單一起始點,正確。","B":"真核多起始點,正確。","C":"大腸桿菌雙向複製,正確。","D":"稱真核不需RNA引子—錯誤(真核亦需),為正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_112020-83":{"quick":"原核核苷酸切除修復(NER)主要酵素為UvrABC(UvrA、B、C)。","detail":{"background":"『原核「核苷酸切除修復(nucleotide excision repair, NER)」主要由「「UvrA、UvrB、UvrC(UvrABC核酸內切酶)」」執行:「辨認大型扭曲損傷(如嘧啶二聚體)→在損傷兩側切開→移除一段含損傷的寡核苷酸→pol I填補、連接酶接合」』。故B(Uvr A, B, C)正確。比較:RuvABC(重組Holliday解析)、RecA/LexA/RecBCD(重組/SOS)、pol α/β/γ/δ(真核聚合酶)。故B正確。記憶:原核NER=UvrABC;真核NER=XP蛋白。","options":{"A":"RuvABC解析Holliday接合(重組)。","B":"UvrABC執行NER—正解。","C":"RecA/LexA/RecBCD屬重組/SOS。","D":"pol α/β/γ/δ為真核聚合酶。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113020-80":{"quick":"拓樸異構酶的主要功能是改變DNA的超螺旋(supercoil)。","detail":{"background":"『「拓樸異構酶(topoisomerase)」「藉「暫時切斷-再接合DNA股」「改變「連接數(linking number)」→調節「超螺旋(supercoil)」狀態」』:「複製/轉錄前方的「正超螺旋張力」由拓樸異構酶鬆解,避免纏死」。故A正確。比較:它不改變鹼基配對專一性、不改變核苷酸數目、不置換DNA/RNA。故A正確。記憶:type I(切單股)、type II/gyrase(切雙股、可引入負超螺旋,耗ATP)。","options":{"A":"改變DNA超螺旋—正解。","B":"不改變鹼基配對專一性。","C":"不改變核苷酸數目。","D":"不置換DNA/RNA。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113020-81":{"quick":"鹼基切除修復(BER)第一個酵素為DNA糖基化酶(DNA glycosylase)。","detail":{"background":"鹼基切除修復(BER):『第一步由「「DNA糖基化酶(DNA glycosylase)」「辨認並水解切除「受損/不當鹼基」(切N-醣苷鍵)」→形成AP(無鹼基)位點」→AP內切酶、聚合酶、連接酶接續』。故A(DNA glycosylase)為第一個酵素,正確。比較:AP內切酶(第二步)、連接酶(最後)、Dam甲基化酶(非BER)。故A正確。","options":{"A":"DNA糖基化酶為BER第一酵素—正解。","B":"AP內切酶為第二步。","C":"連接酶為最後步。","D":"Dam甲基化酶非BER。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113020-82":{"quick":"Klenow片段「無」5′→3′外切酶活性,故「有5′→3′外切」之敘述錯誤。","detail":{"background":"Klenow片段(pol I「大片段」,N端切除小片段後得到):『「保留「DNA聚合酶活性」與「3′→5′外切(校對)」、「「失去「5′→3′外切」活性」」」』(故不能做引子移除/nick translation)。題問「何者「錯誤」」→B「具「5′端到3′端核酸外切酶」活性」「錯誤」(Klenow無5′→3′外切)。故B為正解(錯誤敘述)。其餘正確:A聚合酶活性、D 3′→5′外切;C「Klenow是「大片段」」(本選項稱C端,Klenow實為去N端小片段後的大片段)。故B正確(為錯誤者)。","options":{"A":"有DNA聚合酶活性,正確。","B":"稱有5′→3′外切—錯誤(Klenow無此),為正解。","C":"為pol I大片段(去N端後)。","D":"有3′→5′外切,正確。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-79":{"quick":"端粒單股富G序列可形成「四股(G-quadruplex)」特殊結構。","detail":{"background":"『「端粒(telomere)」的「富G單股」可自我纏繞成「「四股結構(G-quadruplex / G-四聯體)」」(四個鳥嘌呤經Hoogsteen氫鍵成平面G-quartet、堆疊成四股)→「參與端粒保護、基因表現調控」』。故C(四股結構)正確。故C正確。記憶:端粒/啟動子富G區→G-quadruplex(四股)。","options":{"A":"非單純雙股。","B":"非三股。","C":"四股(G-quadruplex)—正解。","D":"非五股。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-81":{"quick":"同源重組「不需要RAG1/2」(RAG1/2用於V(D)J重組,屬非同源)。","detail":{"background":"哺乳動物「同源重組(HR)」(修雙股斷裂)需:『「MRN複合體(MRE11-RAD50-NBS1,辨識/切端)、BRCA1/BRCA2、「RAD51(股侵入/交換,類RecA)」」』。而『「RAG1/2(recombination-activating genes)」是「「V(D)J重組(免疫球蛋白/T細胞受體基因重排)」的「位點特異重組酶」,「「不」參與同源重組」』。故D(RAG1/2)為「不需要者」,為正解。故D正確。記憶:HR=MRN/BRCA/RAD51;RAG1/2=V(D)J(非HR)。","options":{"A":"BRCA1參與HR。","B":"MRN複合體參與HR。","C":"RAD51參與HR(股交換)。","D":"RAG1/2用於V(D)J(非HR)—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-82":{"quick":"Dam甲基化酶標記DNA,作為錯配修復辨認模板(舊)股的依據。","detail":{"background":"大腸桿菌「Dam甲基化酶」於複製過程:『「在「GATC」的腺嘌呤甲基化」→複製後「短暫「半甲基化(舊股已甲基、新股未甲基)」」→「「錯配修復」以此「辨識模板(舊)股」、把錯改在新股」』。故C(標記DNA供錯配修復辨股)正確。比較:Dam非把尿嘧啶/胞嘧啶轉換、非去甲基。故C正確。記憶:Dam=GATC腺嘌呤甲基化→錯配修復辨股。","options":{"A":"非把尿嘧啶轉胸腺嘧啶。","B":"非把胞嘧啶轉5-甲基胞嘧啶(那是Dcm/真核)。","C":"標記DNA供錯配修復辨模板股—正解。","D":"非去除胸腺嘧啶甲基。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-83":{"quick":"光裂合酶(photolyase)修復嘧啶二聚體需「還原型FADH⁻」與光能。","detail":{"background":"『「光裂合酶(DNA photolyase)」(直接修復)用「「還原型黃素(FADH⁻)」吸收「藍光/近UV」能量→「直接「裂解嘧啶二聚體(如胸腺嘧啶二聚體)」的環丁烷鍵」、復原相鄰嘧啶」』(人類無此酶、靠NER)。故B(FADH⁻)正確。比較:CoA、PLP、CoQ非光裂合酶輔因子。故B正確。記憶:光裂合酶=FADH⁻ + 光→修UV二聚體(直接修復)。","options":{"A":"輔酶A非此。","B":"還原型FADH⁻(吸光修二聚體)—正解。","C":"PLP非此。","D":"輔酶Q非此。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-78":{"quick":"DNA拓樸異構酶藉改變「連接數(linking number)」調控DNA纏繞/緊密度。","detail":{"background":"『「「DNA拓樸異構酶(topoisomerase)」」「藉「切斷-再接合DNA股」「改變「連接數(linking number)」」→調控DNA的「超螺旋/緊密度/纏繞狀態」」(複製、轉錄時鬆解張力)』。故D正確。比較:解螺旋酶(解氫鍵打開雙股、不改連接數)、聚合酶(合成)、連接酶(接nick)非改連接數。故D正確。記憶:連接數=拓樸異構酶調控。","options":{"A":"解螺旋酶解雙股(不改連接數)。","B":"聚合酶合成DNA。","C":"連接酶接nick。","D":"拓樸異構酶改連接數—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-80":{"quick":"DNA聚合酶γ(pol γ)負責「粒線體」DNA複製,不參與核染色體DNA合成。","detail":{"background":"真核DNA聚合酶分工:『「核染色體複製:pol α(引子)、「pol δ(延遲股)」、「pol ε(前進股)」」;「「pol γ」→「「粒線體DNA」複製」(非核)」』。故C(pol γ)為「不參與核DNA合成者」,為正解。故C正確。記憶:pol γ=粒線體;α/δ/ε=核複製;β=核修復(BER)。","options":{"A":"pol α起始核複製(造引子)。","B":"pol ε合成前進股(核)。","C":"pol γ複製粒線體DNA(非核)—正解。","D":"pol δ合成延遲股(核)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-81":{"quick":"DNA聚合酶的聚合作用不需「ATP」(需引子、Mg²⁺、dNTPs)。","detail":{"background":"DNA聚合酶聚合反應所需:『「引子(提供3′-OH)、「Mg²⁺(催化)」、「dNTPs(受質,自帶高能磷酸,水解提供能量)」」』。而『「「ATP」「不」是聚合反應「直接」需要的」(dNTP本身水解PPi供能;ATP是「連接酶/解螺旋酶」等才用)』。故C(ATP)為「不需者」,為正解。故C正確。記憶:聚合需引子+Mg²⁺+dNTP;ATP用於解旋/連接。","options":{"A":"需引子。","B":"需Mg²⁺。","C":"不需ATP(dNTP自供能)—正解。","D":"需dNTPs。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-82":{"quick":"DNA糖基化酶屬BER,不直接參與甲基指引錯配修復。","detail":{"background":"大腸桿菌「甲基指引錯配修復(methyl-directed MMR)」用:『MutS/MutL/MutH、「DNA解螺旋酶II」、外切酶、「DNA聚合酶III」、「DNA連接酶」』。而『「DNA糖基化酶(DNA glycosylase)」屬「「鹼基切除修復(BER)」」、「不」直接參與MMR』。故C(DNA glycosylase)為「不參與者」,為正解。故C正確。記憶:MMR用helicase II/pol III/ligase/MutSLH;glycosylase屬BER。","options":{"A":"pol III參與MMR。","B":"DNA連接酶參與MMR。","C":"DNA糖基化酶屬BER、不參與MMR—正解。","D":"解螺旋酶II參與MMR。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-81":{"quick":"HIV快速變異主因「反轉錄酶合成DNA的精準度(fidelity)差」(無校對)。","detail":{"background":"『HIV(反轉錄病毒)基因體快速變異主因:「「反轉錄酶(reverse transcriptase)」「無「3′→5′校對(proofreading)」活性」→「合成DNA「準確度(fidelity)低」→「高突變率」」』→導致抗藥性、免疫逃脫、疫苗困難。故C正確。比較:隨機插入、特殊水解酶、蛋白酶切割非快速「序列變異」主因。故C正確。記憶:RT無校對→高突變→HIV難治。","options":{"A":"插入位點與序列變異速率非主因。","B":"非DNA水解酵素所致。","C":"反轉錄酶低保真(無校對)—正解。","D":"蛋白酶切割與基因變異無關。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-82":{"quick":"錯配修復以「腺嘌呤甲基化(GATC的Dam甲基化)」標記模板股。","detail":{"background":"大腸桿菌錯配修復(MMR)辨識模板股的機制:『「Dam甲基化酶「在「GATC序列的「腺嘌呤(adenine)」」甲基化」→複製後「舊(模板)股已甲基、新股暫未甲基(半甲基化)」→「MMR以「甲基化的腺嘌呤」標記辨認模板股」、把錯改在未甲基化新股」』。故C(在腺嘌呤上甲基化)正確。比較:非去甲基、非把尿嘧啶/胞嘧啶轉換。故C正確。記憶:Dam甲基化GATC腺嘌呤→MMR辨股。","options":{"A":"非去除胸腺嘧啶甲基。","B":"非把尿嘧啶轉胸腺嘧啶。","C":"在腺嘌呤上甲基化(標記模板股)—正解。","D":"甲基化目標為腺嘌呤(非胞嘧啶)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-85":{"quick":"DNA聚合酶I去除RNA引子並以DNA替換。","detail":{"background":"大腸桿菌複製收尾:『「「DNA聚合酶I(pol I)」「以「5′→3′外切酶」「去除延遲股的「RNA引子」」、同時「5′→3′聚合「以DNA填補」」(nick translation)」→最後由「DNA連接酶」接合缺口」』。故D(DNA pol I)為「去引子並以DNA替換」者,正確。比較:解旋酶(解雙股)、引子酶(造引子)、連接酶(接nick、非去引子)。故D正確。記憶:pol I去RNA引子+填DNA;ligase接合。","options":{"A":"解旋酶解雙股。","B":"引子酶合成引子(非去除)。","C":"連接酶接合nick(非去引子)。","D":"pol I去引子並以DNA替換—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-86":{"quick":"移除DNA上的尿嘧啶由「鹼基切除修復(BER)」執行。","detail":{"background":"『「DNA中錯誤/去胺生成的「尿嘧啶(uracil)」」由「「鹼基切除修復(base excision repair, BER)」」移除:「「尿嘧啶-DNA醣苷酶」切下尿嘧啶→AP內切酶切骨架→pol填補→連接酶接合」』。故B(BER)正確。比較:直接修復(光裂合酶/MGMT)、錯配修復(複製錯配)、核苷酸切除修復(大型扭曲損傷如二聚體)針對不同損傷。故B正確。記憶:單一不當鹼基(尿嘧啶、氧化、去胺)=BER。","options":{"A":"直接修復針對二聚體/烷化。","B":"鹼基切除修復移除尿嘧啶—正解。","C":"錯配修復針對複製錯配。","D":"核苷酸切除修復針對大型扭曲損傷。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-87":{"quick":"DNA聚合反應方向只能5′→3′(不能3′→5′),故「方向可3′→5′」錯誤。","detail":{"background":"DNA複製敘述:A「以一股為模板合成新股(半保留)」(正確);B「真核可在多個複製起始點「同時」進行」(正確);C「DNA聚合酶可用RNA引子、「亦可用已有3′-OH的「DNA」為引子」延伸」(正確,如缺口平移/補洞)。D「聚合方向「可5′→3′「也可3′→5′」」」「錯誤」—『DNA聚合酶「「只能「5′→3′」方向合成」」(新核苷酸接到鏈的3′-OH),「無「3′→5′」聚合活性」』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:聚合永遠5′→3′。","options":{"A":"半保留、以模板合成,正確。","B":"真核多起始點同時進行,正確。","C":"可用RNA或DNA為引子,正確。","D":"稱可3′→5′聚合—錯誤(只能5′→3′),為正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_106100-83":{"quick":"lac操縱子結構基因順序為lacZ(β-半乳糖苷酶)-lacY(通透酶)-lacA(轉乙醯酶)。","detail":{"background":"大腸桿菌乳糖操縱子(lac operon)結構基因順序:『「「lacZ(β-半乳糖苷酶β-galactosidase,分解乳糖)」→「lacY(通透酶permease,輸入乳糖)」→「lacA(硫代半乳糖苷轉乙醯酶transacetylase)」」』(受啟動子/操作子調控、CAP-cAMP正調控)。依本題配對(各酵素對應其功能編號),正解為D。故D正確。記憶:lacZ→Y→A=β-gal、permease、transacetylase。","options":{"A":"配對不符。","B":"配對不符。","C":"配對不符。","D":"lacZ/Y/A功能配對正確—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_106100-86":{"quick":"管家基因表現量不同,主因各基因「啟動子對RNA聚合酶的親和力不同」。","detail":{"background":"『「管家基因(housekeeping genes)」「持續表現」維持基本功能,但「個別基因表現量不同」主因「「各基因「啟動子(promoter)」對RNA聚合酶的「親和力」不同」」→親和力高者轉錄多」』。故C正確。比較:A/B把差異歸到降解/轉譯速率非主因;D「誘導/抑制因子調控」較適用「可調控基因」(管家基因常為「組成型constitutive」、較少被誘導抑制)。故C正確。","options":{"A":"非主要由降解速率差異。","B":"非主要由轉譯速率差異。","C":"啟動子對RNA聚合酶親和力不同—正解。","D":"誘導/抑制適用可調控基因(非管家基因主因)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_107100-83":{"quick":"第一型內含子(group I intron)自我剪接需「鳥嘌呤核苷/核苷酸」協助。","detail":{"background":"『「第一型內含子(group I intron)」是「「自我剪接(self-splicing)核酶」」:「需「「鳥嘌呤核苷/核苷酸(guanosine/GMP)」作為「外來親核基」」攻擊5′剪接位起始剪接」(不需蛋白質剪接體、不需ATP)』。故A正確。比較:第二型內含子用內部腺嘌呤(2′-OH)形成套索;真核mRNA前體用「剪接體(snRNA)」。故A正確。記憶:group I=guanosine起始;group II=內部A套索;mRNA=snRNP剪接體。","options":{"A":"需鳥嘌呤核苷/核苷酸—正解。","B":"group I自我剪接不需接合酶。","C":"snRNA用於剪接體(非group I)。","D":"不需ATP/NAD⁺/snRNA。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_107100-86":{"quick":"真核mRNA的3′端是加「聚腺苷酸尾(poly-A)」(非磷酸化),故此敘述錯誤。","detail":{"background":"真核基因表現:A「mRNA主要由RNA pol II轉錄」(正確);C「CpG島甲基化→基因「沉默(無法表現)」」(正確);D「組蛋白「乙醯化」程度影響表現(乙醯化→鬆開→活化)」(正確)。B「mRNA的3′端「磷酸化」以穩定結構」「錯誤」—『真核mRNA「3′端是「加「聚腺苷酸尾(poly-A tail)」」」(非磷酸化)→穩定、助轉譯與出核』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。記憶:成熟mRNA=5′帽 + 3′poly-A + 剪接。","options":{"A":"mRNA由pol II轉錄,正確。","B":"稱3′端磷酸化—錯誤(應加poly-A),為正解。","C":"CpG島甲基化致沉默,正確。","D":"組蛋白乙醯化影響表現,正確。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108030-83":{"quick":"組蛋白去乙醯酶(HDAC)主要功能是「調節基因轉錄」(去乙醯→染色質緊縮→抑制)。","detail":{"background":"『「組蛋白去乙醯酶(histone deacetylase, HDAC)」「移除組蛋白的乙醯基」→「組蛋白正電增、與DNA結合更緊→「染色質「緊縮(濃縮)」」→「「抑制轉錄」(基因沉默)」」→「調節基因轉錄」』。故A正確。比較:HDAC不增組蛋白濃度、非直接調轉譯、非穩定eIF2。故A正確。記憶:乙醯化(HAT)→活化;去乙醯化(HDAC)→抑制。","options":{"A":"調節基因之轉錄—正解。","B":"非增加組蛋白濃度。","C":"非直接減mRNA轉譯。","D":"非穩定eIF2。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108030-85":{"quick":"色胺酸操縱子弱化作用:前導肽的Trp密碼子用以偵測細胞色胺酸含量。","detail":{"background":"大腸桿菌色胺酸操縱子(trp operon)的「弱化作用(attenuation)」:『「「前導肽(leader peptide)」序列含「連續的「色胺酸(Trp)密碼子」」→「核糖體轉譯前導肽時「依「Trp-tRNA是否充足(反映細胞色胺酸量)」決定停頓位置」→影響後續mRNA形成「終止子或抗終止子髮夾」→「調控轉錄是否繼續」」』。故C(Trp密碼子用以偵測色胺酸量)正確。比較錯誤:A弱化「非唯一」機制(另有repressor);B前導肽「非直接作用RNA聚合酶」(靠核糖體位置與RNA二級結構);D「色胺酸「高」時才弱化(終止)」(非低時)。故C正確。","options":{"A":"非唯一機制(另有repressor)。","B":"非前導肽直接作用RNA聚合酶。","C":"前導肽Trp密碼子偵測色胺酸量—正解。","D":"色胺酸高時才弱化(非低時)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108100-83":{"quick":"RNA聚合酶II對α-鵝膏蕈鹼(α-amanitin)最敏感。","detail":{"background":"真核RNA聚合酶對α-amanitin(鵝膏蕈毒)敏感度:『「「RNA pol II(轉錄mRNA)」「最敏感(低濃度即被抑制)」」;RNA pol III中等敏感(高濃度);「RNA pol I「不敏感」」』。故B(RNA pol II)正確。臨床:誤食鵝膏蕈→抑制pol II→mRNA合成停→肝腎衰竭。故B正確。記憶:α-amanitin敏感度 pol II > pol III >> pol I。","options":{"A":"pol I對α-amanitin不敏感。","B":"pol II最敏感—正解。","C":"pol III中等敏感(非最敏感)。","D":"反轉錄酶非α-amanitin標的。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108100-84":{"quick":"5S rRNA與tRNA由RNA聚合酶III合成。","detail":{"background":"真核RNA聚合酶分工:『「RNA pol I→「18S、5.8S、28S rRNA」(核仁);「RNA pol II→「mRNA」(及多數snRNA);「RNA pol III→「「5S rRNA」、「tRNA」、部分小RNA」」』。故C(RNA pol III)合成5S rRNA與tRNA,正確。故C正確。記憶:pol I=大rRNA;pol II=mRNA;pol III=tRNA + 5S rRNA。","options":{"A":"pol I合成18S/5.8S/28S rRNA。","B":"pol II合成mRNA。","C":"pol III合成5S rRNA與tRNA—正解。","D":"無ribosomal RNase此酵素。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109020-83":{"quick":"所有tRNA的3′端皆為共同序列「-CCA-3′OH」(接胺基酸處)。","detail":{"background":"『「所有tRNA的「3′端」皆有「共同的「-CCA-3′-OH」」序列」→「胺基酸接在「末端A的3′(或2′)-OH」(由胺醯-tRNA合成酶酯化)」』。故A正確。tRNA其他共同特徵:三葉草二級結構、L形三級結構、含修飾鹼基、反密碼子環。故A正確。記憶:tRNA 3′端=CCA(接胺基酸)。","options":{"A":"3′端含-CCA-3′OH—正解。","B":"非AAC。","C":"CCA在3′端(非5′)。","D":"非5′端AAC。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109020-85":{"quick":"同質異化基因(homeotic genes)在胚胎發育「後期」表現、決定各體節結構。","detail":{"background":"『「同質異化基因(homeotic genes,含「homeobox」)」「在「胚胎發育「後期」」表現」、「「決定每一「體節(segment)」的「詳細結構/身分」」(哪一節長觸角、腳、翅)』(突變→某體節變成另一體節結構,如Antennapedia)。故B正確。比較:A(母系mRNA休眠)、C(翅膀基因)、D(眼睛顏色)非homeotic定義。故B正確。記憶:homeotic/Hox=體節身分決定(發育後期)。","options":{"A":"非母系mRNA休眠機制。","B":"發育後期表現、決定體節結構—正解。","C":"非僅決定翅膀。","D":"非決定眼睛顏色。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109100-80":{"quick":"核酸雜交穩定度:RNA-RNA > RNA-DNA > DNA-DNA。","detail":{"background":"核酸雙股雜交的相對穩定度(中性pH):『「「RNA-RNA > RNA-DNA(DNA-RNA) > DNA-DNA」」』(RNA的2′-OH與A型螺旋構型使含RNA的雜交更穩定、Tm較高)。故D正確。故D正確。記憶:愈多RNA成分→愈穩定(RNA-RNA最穩、DNA-DNA最不穩)。","options":{"A":"順序不符。","B":"順序不符。","C":"順序不符。","D":"RNA-RNA>RNA-DNA>DNA-DNA—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109100-83":{"quick":"胺醯-tRNA合成酶使tRNA與相對應胺基酸進行酯化(接上正確胺基酸)。","detail":{"background":"『「胺醯-tRNA合成酶(aminoacyl-tRNA synthetase)」催化「「胺基酸 + ATP →胺醯-AMP(活化)→把胺基酸「酯化(esterification)」接到「對應tRNA的3′-CCA端」」」(產胺醯-tRNA)、釋放AMP+PPi』。此步是「轉譯保真的第一道把關(第二次校對proofreading)」。故A正確。比較:核糖體(肽鍵)、延伸因子(用GTP)非此酶功能。故A正確。記憶:合成酶=把對的胺基酸接上對的tRNA(用ATP活化)。","options":{"A":"使tRNA與對應胺基酸酯化—正解。","B":"非間接(直接催化)。","C":"肽鍵由核糖體(非此酶)。","D":"用ATP(非GTP)活化胺基酸。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-80":{"quick":"AZT抑制反轉錄酶活性(作為鏈終結者阻DNA合成)。","detail":{"background":"『AZT(疊氮胸苷)是「核苷類反轉錄酶抑制劑(NRTI)」→「「抑制HIV反轉錄酶」(摻入後因缺3′-OH成「鏈終結者」、阻病毒DNA合成)」』。故A(抑制反轉錄酶)正確。比較:非阻核苷酸生合成、非阻ATP生成、非抑RNA聚合酶。故A正確。記憶:AZT=抗HIV、抑反轉錄酶。","options":{"A":"抑制反轉錄酶活性—正解。","B":"非阻核苷酸生合成。","C":"非阻ATP生成。","D":"非抑RNA聚合酶。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-83":{"quick":"操縱子(operator)通常與「抑制子(repressor)」結合。","detail":{"background":"『原核「操縱子/操作子(operator)」是「DNA調控序列」,「通常被「「抑制子(repressor)」蛋白結合」→「阻擋RNA聚合酶轉錄(關閉基因)」」』(如lac repressor結合lac operator)。故D(repressor)正確。比較:衰減子(attenuator,終止結構)、誘導子(inducer,小分子使repressor脫離)、啟動子(promoter,RNA聚合酶結合處)非結合operator者。故D正確。記憶:operator↔repressor。","options":{"A":"衰減子為終止調控結構。","B":"誘導子是小分子(使repressor脫離)。","C":"啟動子供RNA聚合酶結合。","D":"操縱子與抑制子結合—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-100":{"quick":"反轉錄病毒嵌入位點兩端重複出現的元素是「長末端重複序列(LTR)」。","detail":{"background":"『「反轉錄病毒(retrovirus)」嵌入宿主染色體時,前病毒(provirus)「兩端各有一段「長末端重複序列(long terminal repeat, LTR)」」(「重複出現在嵌入位點兩端」)→含啟動子/增強子/poly-A訊號,驅動病毒基因表現』。故A(LTR)正確。比較:gag(結構蛋白)、pol(反轉錄酶/整合酶)、env(套膜蛋白)是基因本體(非重複末端元素)。故A正確。記憶:provirus=LTR-gag-pol-env-LTR。","options":{"A":"長末端重複序列(LTR)—正解。","B":"gag為結構蛋白基因。","C":"pol為酵素基因。","D":"env為套膜蛋白基因。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-80":{"quick":"反義寡核酸的作用「不」包括「造成RNA序列突變」(它不改變序列)。","detail":{"background":"反義寡核酸(antisense oligonucleotide)藥物機制:『「與標的mRNA「鹼基互補結合」→「①促「mRNA降解(招募RNase H)」、②阻「轉譯」、③影響「剪接(調節外顯子納入)」」』(A、C、D皆其機制)。而『「「造成RNA「序列突變」」「不是」其機制」(它只「結合/封阻/誘導降解」,「不改變序列」)』。故B(造成RNA序列突變)為「非機制者」,為正解。故B正確。","options":{"A":"可影響RNA剪接(機制之一)。","B":"不造成RNA序列突變—正解(非其機制)。","C":"可導致mRNA降解(機制)。","D":"可影響轉譯效率(機制)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-79":{"quick":"DNase I切割DNA骨架的「磷酸二酯鍵(phosphodiester bond)」。","detail":{"background":"『「去氧核糖核酸酶I(DNase I)」是「「核酸內切酶(endonuclease)」」→「水解切割DNA「骨架上的「磷酸二酯鍵(phosphodiester bond)」」」(連接相鄰核苷酸的糖-磷酸鍵)』。故C正確。比較:糖苷鍵(鹼基-糖,由醣苷酶切)、Watson-Crick鹼基配對(氫鍵,非共價)非DNase I切割對象。故C正確。記憶:核酸酶切磷酸二酯鍵(骨架)。","options":{"A":"糖苷鍵由醣苷酶切(非DNase I)。","B":"鹼基配對為氫鍵(非切割對象)。","C":"磷酸二酯鍵—正解(DNase I切割)。","D":"非華森克里克配對非切割對象。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-84":{"quick":"真核mRNA主要由RNA聚合酶II生成。","detail":{"background":"『真核「mRNA」主要由「「RNA聚合酶II(RNA polymerase II)」」轉錄生成』(亦轉錄多數snRNA、miRNA前體)。故B正確。比較:pol I(大rRNA)、pol III(tRNA/5S rRNA);「pol IV」是「植物特有」(RNA導向DNA甲基化),非動物mRNA。故B正確。記憶:pol II=mRNA。","options":{"A":"pol I合成大rRNA。","B":"pol II生成mRNA—正解。","C":"pol III合成tRNA/5S rRNA。","D":"pol IV為植物特有(非mRNA)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-87":{"quick":"含聚腺苷酸化訊號(AAUAAA)的序列最可能是D。","detail":{"background":"真核「聚腺苷酸化(polyadenylation)訊號」是『mRNA 3′端的「「AAUAAA」共識序列」(下游再加poly-A尾)』。題選項中『D「5′-AAAAAUUUUUU「AAUAAA」GGGGGGGGUUUUUUGG-3′」含「AAUAAA」共識序列」』→最可能含poly-A訊號。故D正確。故D正確。記憶:poly-A訊號=AAUAAA(切割+加尾)。","options":{"A":"無AAUAAA共識序列。","B":"無AAUAAA共識序列。","C":"無AAUAAA共識序列。","D":"含AAUAAA(poly-A訊號)—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_112020-82":{"quick":"反轉錄酶以RNA為模板合成DNA。","detail":{"background":"『「反轉錄酶(reverse transcriptase)」「以「RNA為模板」「合成「DNA(cDNA)」」」(RNA→DNA,逆轉一般轉錄方向),具RNA依賴DNA聚合、RNase H、DNA依賴DNA聚合活性』。故C正確。見於反轉錄病毒(HIV)、端粒酶、實驗室製cDNA。故C正確。記憶:反轉錄=RNA→DNA。","options":{"A":"DNA→DNA為複製(非反轉錄)。","B":"DNA→RNA為轉錄。","C":"RNA→DNA—正解(反轉錄)。","D":"RNA→RNA為RNA複製(非反轉錄)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_112020-85":{"quick":"原核小分子調控轉錄「通常「不」直接結合DNA」(而是經調節蛋白)。","detail":{"background":"原核小分子(效應物)調節轉錄起始的機制:『「通常「透過「調節蛋白(activator/repressor)」「間接」作用」:「改變抑制子構型(如誘導子使repressor脫離DNA)、調控活化子與DNA結合」』。而『「小分子「直接結合DNA」」「不是」常見機制(小分子多作用於蛋白、非直接綁DNA)』。故A(直接結合DNA)為「通常不是的機制」,為正解。故A正確。記憶:小分子→改變調節蛋白→蛋白綁/離DNA。","options":{"A":"直接結合DNA—非常見機制(正解)。","B":"調控活化子與DNA結合(是機制)。","C":"改變抑制子構型(是機制)。","D":"調控抑制子與DNA結合(是機制)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_112020-86":{"quick":"mRNA加帽發生在「細胞核(共轉錄)」,非ER/高基氏體,故此敘述錯誤。","detail":{"background":"真核mRNA 5′加帽(7-甲基鳥苷帽):A「保護mRNA不被5′外切酶水解」(正確);B「被「eIF4E」辨識」(促轉譯起始)(正確);C「幫助轉譯」(正確)。D「修飾反應主要發生於「ER及高基氏體」」「錯誤」—『「加帽在「細胞核」「共轉錄(轉錄早期、mRNA仍在合成)」進行」(非ER/Golgi)』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:加帽/剪接/加尾皆在「核內」(非ER/Golgi)。","options":{"A":"保護mRNA抗5′外切,正確。","B":"被eIF4E辨識,正確。","C":"幫助轉譯,正確。","D":"稱在ER/Golgi—錯誤(在細胞核共轉錄),為正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_112020-87":{"quick":"胺醯-tRNA合成酶對「胺基酸與tRNA「皆」高度專一」,故「可接受任何tRNA」錯誤。","detail":{"background":"胺醯-tRNA合成酶:A「把胺基酸接到tRNA「3′端」」(正確);B「分解ATP、釋PPi(活化胺基酸)」(正確);D「多數生物對「每種胺基酸有專一的合成酶(共20種)」」(正確)。C「對胺基酸特異性高,「但可接受「任何一種tRNA」」」「錯誤」—『合成酶「對「胺基酸「與」對應「tRNA」「皆」高度專一」」(雙重辨識:認對的胺基酸、認對的tRNA),「不」接受任意tRNA』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。","options":{"A":"把胺基酸接tRNA 3′端,正確。","B":"分解ATP釋PPi,正確。","C":"稱可接受任何tRNA—錯誤(對tRNA亦專一),為正解。","D":"每種胺基酸有專一合成酶,正確。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113020-84":{"quick":"σ因子(sigma)在轉錄延伸時釋出(只在起始辨認啟動子時需要)。","detail":{"background":"原核RNA聚合酶「全酶=核心酶(α₂ββ′ω)+ σ因子」:『「σ因子「只在「起始(辨認啟動子)」時需要」→「轉錄「延伸(elongation)」開始後,「σ因子「釋出」」、核心酶繼續延伸」』。故D(σ)為「延伸時釋出/不需要者」,正確。比較:α、β、β′是核心酶、全程參與。故D正確。記憶:σ=起始辨認啟動子→延伸時釋放。","options":{"A":"α為核心酶(全程)。","B":"β為核心酶(全程)。","C":"β′為核心酶(全程)。","D":"σ因子延伸時釋出—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113020-86":{"quick":"18S與28S rRNA由RNA聚合酶I合成。","detail":{"background":"『脊椎動物「18S、5.8S、28S rRNA」由「「RNA聚合酶I(RNA pol I)」」在「核仁(nucleolus)」轉錄(45S前體再加工)」』。故A(RNA pol I)正確。比較:pol II(mRNA)、pol III(5S rRNA/tRNA)。故A正確。記憶:pol I=大rRNA(18S/5.8S/28S);5S rRNA才是pol III。","options":{"A":"RNA pol I合成18S/28S rRNA—正解。","B":"pol II合成mRNA。","C":"pol III合成5S rRNA/tRNA。","D":"無ribosomal RNase此酵素。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-84":{"quick":"細菌起始時mRNA的起始AUG位於核糖體「P位」(非A位),故此敘述錯誤。","detail":{"background":"細菌轉譯起始:A「fMet-tRNA「結合在「P位(peptidyl)」」」(正確,起始tRNA直接進P位);B「IF3結合30S小次單元」(正確,防早結合);D「IF1結合A位」(正確,阻起始tRNA誤入A位)。C「mRNA的起始AUG「位於「A位」」」「錯誤」—『起始時「起始AUG與fMet-tRNA「對在「P位」」」(非A位;A位留給下一個進來的胺醯-tRNA)』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。記憶:起始tRNA入P位(其他延伸tRNA才從A位進)。","options":{"A":"fMet-tRNA結合P位,正確。","B":"IF3結合30S,正確。","C":"稱起始AUG在A位—錯誤(應在P位),為正解。","D":"IF1結合A位,正確。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-86":{"quick":"抑制子(repressor)是具異位(別構)調控特性的蛋白質。","detail":{"background":"『「抑制子(repressor)」是「「蛋白質」、具「異位(別構, allosteric)調控」特性」:「「效應物(誘導子/共抑制子)結合其「別構位」→改變構型→改變其與「操縱子DNA」的結合親和力」」(如lac repressor結合allolactose後脫離DNA)』。故B(repressor)正確。比較:operator、promoter是「DNA序列」(非蛋白);inducer是「小分子效應物」(非別構蛋白本身)。故B正確。記憶:repressor=別構蛋白(被小分子調控其DNA結合)。","options":{"A":"操縱子為DNA序列(非蛋白)。","B":"抑制子為別構蛋白—正解。","C":"啟動子為DNA序列。","D":"誘導子為小分子(非蛋白)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-87":{"quick":"端粒酶(telomerase)具反轉錄酶活性(以自帶RNA為模板合成DNA)。","detail":{"background":"『「端粒酶(telomerase)」是「「反轉錄酶(具RNA依賴DNA聚合活性)」」:「自帶「RNA模板」、以之「反轉錄合成「端粒DNA重複序列」」延長染色體末端」』。故A(telomerase)具反轉錄酶活性,正確。比較:hammerhead ribozyme(自我切割核酶)、RNase P(切tRNA前體核酶)、RNA pol III(轉錄)非反轉錄酶。故A正確。記憶:端粒酶=RNA模板的反轉錄酶。","options":{"A":"端粒酶具反轉錄酶活性—正解。","B":"錘頭核酶為自我切割。","C":"RNase P切tRNA前體。","D":"RNA pol III為轉錄酶。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-86":{"quick":"RNA聚合酶轉錄時首先結合的DNA序列稱「啟動子(promoter)」。","detail":{"background":"『「啟動子(promoter)」是「RNA聚合酶(及轉錄因子)「首先結合」的「特定DNA序列」(位於基因轉錄起始上游,如原核-10/-35、真核TATA box)→「定位轉錄起點與方向、招募聚合酶」」』。故C(promoter)正確。比較:operator(調控、結合repressor)、repressor(蛋白)、inducer(小分子)非聚合酶首先結合處。故C正確。記憶:RNA聚合酶起點=啟動子。","options":{"A":"操作子供repressor結合(調控)。","B":"抑制因子為蛋白。","C":"啟動子—正解(聚合酶首先結合)。","D":"誘導子為小分子。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-78":{"quick":"人類基因組「編碼蛋白質的DNA「不到2%」」,故「超過40%編碼」錯誤。","detail":{"background":"人類基因組特性:A「多數基因被「內含子(intron)」打斷→不連續(斷裂基因)」(正確);C「約「一半」由「轉座子(transposon)/重複序列」組成」(正確);D「著絲粒、端粒為具特殊功能的重複序列」(正確)。B「「超過40%」的DNA「編碼蛋白質」」「錯誤」—『「人類「編碼蛋白質的外顯子「僅約「1.5–2%」」」(絕大部分是內含子、調控、重複序列、非編碼)』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。記憶:人類基因組僅~2%編碼蛋白。","options":{"A":"多數基因被內含子打斷,正確。","B":"稱>40%編碼蛋白—錯誤(僅約2%),為正解。","C":"約半數為轉座子,正確。","D":"著絲粒/端粒為功能性重複序列,正確。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-80":{"quick":"抗體輕鏈:V-J重組在「DNA」層次、J-C連接在「RNA(剪接)」層次。","detail":{"background":"抗體輕鏈基因表現:『「「V-J重組」在「「DNA」層次(「V(D)J體細胞重組」,由RAG1/2剪切重接基因片段)」;「「J-C連接」在「「RNA」層次(「mRNA「剪接」」把J與C外顯子接合,去除中間內含子)」」』。故B(DNA;RNA)正確。故B正確。記憶:V(D)J=DNA重組;J與C=RNA剪接。","options":{"A":"J-C為RNA剪接(非DNA)。","B":"V-J為DNA重組、J-C為RNA剪接—正解。","C":"J-C非蛋白質層次。","D":"V-J為DNA(非RNA)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-85":{"quick":"操作子(operator)序列主要被「抑制子(repressor)」結合。","detail":{"background":"『原核操縱組(operon)的「操作子(operator)」是「DNA序列」,「主要被「「抑制子(repressor)」蛋白「結合」」→「阻RNA聚合酶轉錄(關閉)」」』。故D(repressor)正確。比較:suppressor tRNA(讀通終止子)、miRNA(真核轉錄後調控)、inducer(小分子使repressor脫離)非結合operator的蛋白。故D正確。記憶:operator↔repressor。","options":{"A":"抑制型tRNA讀通終止子(非綁operator)。","B":"miRNA為真核轉錄後調控。","C":"誘導子為小分子。","D":"操作子被抑制子結合—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-86":{"quick":"trp operon:前導肽含的Trp密碼子使其轉錄受細胞色胺酸量調控(弱化)。","detail":{"background":"色胺酸操縱組(trp operon)調控:D『「「編碼前導肽的序列含「Trp密碼子」」→「核糖體轉譯前導肽時「依「色胺酸-tRNA是否足夠(反映細胞Trp量)」決定停頓」→影響mRNA形成終止/抗終止髮夾→「使trp operon轉錄受「細胞色胺酸量」調控(弱化attenuation)」」』正確。比較錯誤:A前導肽是「胜肽(被轉譯的對象)」非酵素;B色胺酸「低」時轉錄「進行(不終止)」;C前導肽不「直接結合」RNA聚合酶。故D正確。記憶:trp高→repressor活化+弱化終止→關閉;trp低→開啟。","options":{"A":"前導肽非酵素(是被轉譯的胜肽)。","B":"色胺酸低時轉錄進行(非被終止)。","C":"前導肽不直接結合RNA聚合酶。","D":"前導肽Trp密碼子使轉錄受色胺酸量調控—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-99":{"quick":"哺乳動物siRNA長度約21~23個核苷酸。","detail":{"background":"『RNA干擾(RNAi):「「小干擾RNA(siRNA)」「長度約「21–23個核苷酸」」(雙股、3′突出2核苷酸)→併入RISC、引導「序列專一降解標的mRNA(或抑制轉譯)」」』。故B(21~23)正確。(miRNA亦約22 nt。)故B正確。記憶:siRNA/miRNA≈21–23 nt(Dicer切出)。","options":{"A":"11~13過短。","B":"21~23 nt—正解。","C":"31~33過長。","D":"41~43過長。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-88":{"quick":"乳糖多、葡萄糖少時:抑制子脫離(誘導)+CAP-cAMP活化→lac operon強表現。","detail":{"background":"大腸桿菌lac operon在「乳糖多、葡萄糖少」環境:『①「乳糖(誘導子allolactose)使「「抑制子(repressor)「脫離」操作子」→去抑制」;②「葡萄糖少→「cAMP「高」→「CAP(CRP)-cAMP結合啟動子上游「活化」轉錄」」→「「兩條件齊備→lac operon「最大量表現」(分解乳糖)」』。題以編號組合表示「抑制子未結合 + CAP結合(活化)」之正確情境,本題標準答案為D。故D正確。記憶:lac operon全開=無repressor綁 + CAP-cAMP活化(乳糖有、葡萄糖無)。","options":{"A":"組合不符。","B":"組合不符。","C":"組合不符。","D":"抑制子脫離+CAP活化→強表現—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-90":{"quick":"RNA聚合酶II辨認轉錄起始上游的「TATA box(TATAAAA)」。","detail":{"background":"『真核「「RNA聚合酶II」」轉錄起始需「「核心啟動子「TATA box(共識「TATAAAA」)」」(位於轉錄起點上游約−25至−30)→「「TBP(TATA結合蛋白)」結合TATA box→招募通用轉錄因子與pol II組成前起始複合體」』。故C(TATA box)正確。比較:TRE(反應元件)、GC box/Octamer是「上游調控/增強元件」(非pol II核心啟動子辨認的TATA)。故C正確。記憶:pol II核心啟動子=TATA box(TBP結合)。","options":{"A":"TRE為反應元件(非核心啟動子)。","B":"GC box為上游調控元件。","C":"TATA box(TATAAAA)—正解。","D":"Octamer為調控元件。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-100":{"quick":"真核染色質結構會「隨細胞週期動態變化」(此敘述正確)。","detail":{"background":"染色質:D『「染色質結構「隨細胞週期「動態變化」」(間期較鬆、有絲分裂高度濃縮成染色體)』正確。比較錯誤:A「常染色質(euchromatin)是「淺染、鬆散、活躍轉錄」」(非深染緊密);B「異染色質(heterochromatin)是「深染、緊密、不活躍」」(非淺染鬆散);C「「H3K4甲基化」與「活躍轉錄(開放)」相關」(非沉默;沉默標記是H3K9/H3K27甲基化)。故D正確。記憶:常染色質=鬆/活躍;異染色質=緊/沉默;H3K4me=活化、H3K9/27me=沉默。","options":{"A":"常染色質為淺染鬆散(非深染緊密)。","B":"異染色質為深染緊密(非淺染鬆散)。","C":"H3K4甲基化與活躍轉錄相關(非沉默)。","D":"染色質結構隨細胞週期動態變化—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_106100-85":{"quick":"原核起始時mRNA的Shine-Dalgarno序列與30S小次單元(16S rRNA)配對定位。","detail":{"background":"原核轉譯起始:C『「mRNA 5′端的「Shine-Dalgarno序列」與「30S小次單元的16S rRNA」「鹼基互補配對」→把起始AUG對準P位」』正確。比較錯誤:A「fMet-tRNA「只用於起始」(延伸用一般Met-tRNA)」;B原核是「70S(30S+50S)」非80S(80S是真核);D「IF「2」(非IF1)促fMet-tRNA結合;IF1阻A位」。故C正確。記憶:SD序列(原核)/Kozak(真核)定位起始密碼子。","options":{"A":"fMet-tRNA只用於起始(非延伸)。","B":"原核為70S(非80S)。","C":"SD序列與30S(16S rRNA)配對—正解。","D":"促fMet結合的是IF2(非IF1)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109020-84":{"quick":"真核起始時「小次單元先結合mRNA、大次單元後加入」,故「須先形成完整核糖體」錯誤。","detail":{"background":"真核轉譯起始:A「需mRNA、核糖體、胺醯-tRNA」(正確);B「mRNA需「5′帽」或「IRES(內部核糖體進入位)」」(正確);D「起始用「Met-tRNAi(非甲醯化,真核)」」(正確)。C「「大小次單元必須「先形成完整核糖體」」」「錯誤」—『起始時「「小次單元(40S)「先」結合mRNA(掃描找AUG)→「大次單元(60S)「之後」加入」組成80S」(非先組成完整核糖體)』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。","options":{"A":"需mRNA/核糖體/胺醯-tRNA,正確。","B":"需5′帽或IRES,正確。","C":"稱須先形成完整核糖體—錯誤(小次單元先結合mRNA),為正解。","D":"起始用Met-tRNAi,正確。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109100-84":{"quick":"原核延伸期:肽基轉移酶(peptidyl transferase)是核酶(ribozyme)。","detail":{"background":"原核轉譯延伸:D『「「肽基轉移酶(peptidyl transferase)」是「「核酶(ribozyme)」」(由「50S大次單元的「23S rRNA」催化肽鍵形成,非蛋白質)」』正確。比較錯誤:A每加一胺基酸「約耗「4個高能磷酸」(EF-Tu用1 GTP、EF-G用1 GTP、加上胺基酸活化耗2)」(非2);B胺醯-tRNA「先進「A位」(非P位)」;C「EF-Tu「攜帶胺醯-tRNA進A位」(非利於核糖體移位;移位是EF-G)」。故D正確。記憶:肽鍵由rRNA催化(核酶);A位進、P位接、E位出。","options":{"A":"每肽鍵約耗4高能磷酸(非2)。","B":"胺醯-tRNA先進A位(非P位)。","C":"EF-Tu攜tRNA進A位(移位是EF-G)。","D":"肽基轉移酶是核酶—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109100-86":{"quick":"E3泛素連接酶催化把泛素轉移到受質蛋白(決定受質專一性)。","detail":{"background":"泛素-蛋白酶體途徑(三酵素):『「「E1(活化酶,耗ATP活化泛素)」→「E2(結合酶,攜帶泛素)」→「「E3(連接酶)」「催化把泛素「轉移到「受質蛋白」的離胺酸」」(決定「受質專一性」)」」→多聚泛素鏈標記→蛋白酶體分解』。故C(E3)正確。故C正確。記憶:E1活化、E2攜帶、E3連接(認受質);E4延長泛素鏈(輔助)。","options":{"A":"E1活化泛素(耗ATP)。","B":"E2攜帶泛素。","C":"E3催化泛素轉到受質—正解。","D":"E4輔助延長泛素鏈(非主催化)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-84":{"quick":"轉譯框移(frameshifting)最可能發生在「轉譯延長」期。","detail":{"background":"『「轉譯框移(translational frameshifting)」(核糖體在特定「滑動序列(slippery sequence)」上「前移或後移1個核苷酸、改變讀框」)「最可能在「轉譯「延長(elongation)」」期」發生』(常見於反轉錄病毒gag-pol、某些基因的程序性框移)。故B(轉譯延長)正確。故B正確。記憶:程序性框移=延長期、滑動序列處。","options":{"A":"非起始期。","B":"轉譯延長期—正解。","C":"非中止期。","D":"非核糖體回收期。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-85":{"quick":"原核起始複合物組裝完成時,起始tRNA(fMet-tRNA)位於P位。","detail":{"background":"『原核「轉譯起始複合物」組裝完成(70S形成)時:「「起始tRNA(fMet-tRNA)」「位於「P位(peptidyl site)」」(對準起始AUG)」→「A位空著、留給下一個延伸胺醯-tRNA進入」』。故B(P位)正確。(起始tRNA是唯一「直接進P位」者,其餘延伸tRNA皆從A位進。)故B正確。記憶:起始tRNA→P位;延伸→A位進、移到P、空tRNA從E位出。","options":{"A":"A位留給延伸胺醯-tRNA。","B":"起始tRNA在P位—正解。","C":"E位為空tRNA離開處。","D":"非mRNA進入通道。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-86":{"quick":"擺動假說:反密碼子第1個鹼基(5′)可與密碼子第3個鹼基(3′)做多種配對。","detail":{"background":"擺動假說(wobble hypothesis):『「「tRNA反密碼子的「第1個鹼基(5′端,擺動位)」」可「與「密碼子的「第3個鹼基(3′端)」」「非嚴格(多種)配對」」(如反密碼子5′端的I肌苷可配U/C/A)」→「一個tRNA可辨認多個同義密碼子」(故tRNA數<61)』。故C正確。比較:密碼子前兩位仍嚴格Watson-Crick配對(D錯,第3位才擺動)。故C正確。記憶:擺動發生在「密碼子第3位/反密碼子第1位」。","options":{"A":"非反密碼子第1與密碼子第1配對。","B":"非反密碼子第3位擺動。","C":"反密碼子第1與密碼子第3做多種配對—正解。","D":"密碼子第3位是擺動(非嚴格Watson-Crick)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-88":{"quick":"泛素化(ubiquitination)直接導致蛋白被蛋白酶體辨識分解。","detail":{"background":"『蛋白質被「「多聚泛素化(ubiquitination,K48連結泛素鏈)」「標記」→「「26S蛋白酶體(proteasome)」「辨識並分解」」(ATP依賴)』。故C(ubiquitination)正確。比較:甲基化、乙醯化、醣化是其他修飾(調控功能/定位),非蛋白酶體降解訊號。故C正確。記憶:K48多聚泛素=蛋白酶體降解標籤。","options":{"A":"甲基化非降解訊號。","B":"乙醯化非降解訊號。","C":"泛素化→蛋白酶體分解—正解。","D":"醣化非降解訊號。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-89":{"quick":"原核起始因子IF2負責攜帶fMet-tRNA進入核糖體P位。","detail":{"background":"原核轉譯起始因子:『「「IF2(GTP依賴)」「結合並運送「起始tRNA(fMet-tRNAfMet)」到「30S的P位」」」;「IF1阻A位」;「IF3防大小次單元早結合、助mRNA定位」』。故B(IF2)正確。比較:IF1、IF3不攜帶fMet-tRNA;EF-Tu是「延伸」期攜帶一般胺醯-tRNA。故B正確。記憶:IF2=帶fMet-tRNA(真核對應eIF2帶Met-tRNAi)。","options":{"A":"IF1阻A位(非攜fMet)。","B":"IF2攜fMet-tRNA進P位—正解。","C":"IF3防早結合/助定位。","D":"EF-Tu為延伸期攜帶一般胺醯-tRNA。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-90":{"quick":"釋放因子RF1的立體結構與tRNA最相似(分子擬態molecular mimicry)。","detail":{"background":"『「轉譯「釋放因子(release factor, RF1/RF2)」」的「「立體結構與tRNA「最相似」」(「分子擬態molecular mimicry」)→「能「進入核糖體A位」「辨認終止密碼子」、觸發肽鏈釋放」』。故C(RF1)正確。(EF-Tu·tRNA·GTP複合體、EF-G也有部分tRNA擬態,但「釋放因子」本身單一蛋白即模擬tRNA形狀。)故C正確。記憶:RF模擬tRNA進A位讀終止密碼子。","options":{"A":"IF2非最似tRNA。","B":"EF-Tu攜tRNA(本身非最似tRNA)。","C":"釋放因子RF1結構最似tRNA—正解。","D":"伴護蛋白與tRNA結構不似。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-85":{"quick":"泛素化蛋白主要由「蛋白酶體(proteasome)」(非溶酶體)降解,故此敘述錯誤。","detail":{"background":"泛素依賴降解:A「E1活化泛素需ATP」(正確);B「E2上的泛素經E3轉到受質」(正確);C「受質的「離胺酸(lysine)」是泛素化主要接點」(正確)。D「泛素化蛋白「主要經「溶酶體(lysosome)」降解」」「錯誤」—『「泛素化(K48)蛋白「主要由「「26S蛋白酶體(proteasome)」」降解」(細胞質、ATP依賴);「溶酶體」主要降解「胞外/膜蛋白(經內吞)與自噬物」』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:泛素-蛋白酶體(胞內可溶蛋白);溶酶體(自噬/內吞)。","options":{"A":"E1活化泛素需ATP,正確。","B":"E2泛素經E3轉受質,正確。","C":"離胺酸為泛素化接點,正確。","D":"稱主要經溶酶體—錯誤(應蛋白酶體),為正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-86":{"quick":"延伸步驟順序:胺醯-tRNA進A位→肽鍵形成→移位→空tRNA出,即1234。","detail":{"background":"轉譯延伸(elongation)的步驟順序(題序1帶胺基酸的tRNA進入、2肽鍵、3移位、4空tRNA釋出之合理排列):『「①「胺醯-tRNA(EF-Tu·GTP)進「A位」」→②「「肽基轉移酶」形成「肽鍵」(P位肽鏈轉接到A位tRNA)」→③「「EF-G·GTP「移位(translocation)」」(核糖體沿mRNA前移、A→P、P→E)」→④「「空tRNA由E位釋出」」」』→順序「1234」。故A正確。故A正確。記憶:A位進→肽鍵→移位→E位出。","options":{"A":"1234(進A→肽鍵→移位→出E)—正解。","B":"順序不符。","C":"順序不符。","D":"順序不符。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_112020-84":{"quick":"蛋白質合成(延伸/移位)主要消耗GTP→GDP+Pi。","detail":{"background":"『「蛋白質合成(轉譯)」中,「延伸因子「EF-Tu(攜tRNA進A位)」與「EF-G(移位)」「皆水解「GTP→GDP+Pi」」」供能』(起始IF2/eIF2、釋放因子亦用GTP)。故B(GTP→GDP+Pi)為轉譯主要能量反應,正確。比較:胺基酸「活化」步驟才用「ATP→AMP+PPi」(C);ATP→ADP+Pi非轉譯延伸主要。故B正確。記憶:轉譯延伸=GTP(EF-Tu/EF-G);胺基酸活化=ATP→AMP+PPi。","options":{"A":"ATP→ADP+Pi非轉譯延伸主反應。","B":"GTP→GDP+Pi(延伸/移位)—正解。","C":"ATP→AMP+PPi為胺基酸活化(非延伸)。","D":"GTP→GMP+PPi非此。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113020-83":{"quick":"Ras經「異戊二烯化(prenylation,法尼基化)」修飾而錨定到細胞膜。","detail":{"background":"『致癌基因產物「Ras」經「「異戊二烯化(prenylation,如「法尼基化farnesylation」)」」「在C端CAAX motif的半胱胺酸接上疏水「法尼基」→「錨定到「細胞膜」內葉」→傳遞生長訊號』。故D(prenylation)正確。比較:泛素化(降解)、乙醯化、腺苷化非Ras膜錨定修飾。故D正確。記憶:Ras=法尼基化(prenylation)→膜定位;法尼基轉移酶抑制劑為抗癌標的。","options":{"A":"泛素化為降解標記。","B":"乙醯化非膜錨定。","C":"腺苷化非Ras修飾。","D":"異戊二烯化(prenylation)—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113020-85":{"quick":"擺動配對使反密碼子(5′)CGA的tRNA可辨認多個密碼子。","detail":{"background":"擺動假說(wobble):『「tRNA「反密碼子第1位(5′端,擺動位)」可與「密碼子第3位」做「非嚴格配對」→「一個tRNA辨認多個同義密碼子」」』。題中反密碼子『(5′)CGA』(5′端C為擺動位)可辨認對應的多個密碼子組(密碼子5′-UCN對應絲胺酸等,依擺動規則)。故本題標準答案A(5′CGA)。故A正確。記憶:反密碼子5′位=擺動位、配密碼子3′位。","options":{"A":"(5′)CGA—正解(擺動辨多個密碼子)。","B":"(5′)AGC不符題意。","C":"(5′)UGC不符。","D":"(5′)GGC不符。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-85":{"quick":"立汎黴素(rifampicin)抑制「轉錄(RNA聚合酶)」,非抑制轉譯。","detail":{"background":"抑制細菌「蛋白質轉譯」的抗生素:『「四環黴素(tetracycline,阻A位胺醯-tRNA結合)、紅黴素(erythromycin,阻50S移位)、鏈黴素(streptomycin,致誤讀/阻起始,作用30S)」皆「抑轉譯」』。而『「立汎黴素(rifampicin)」「抑制「細菌RNA聚合酶」→阻「「轉錄」」(非轉譯)」』。故B(rifampicin)為「非抑轉譯者」,為正解。故B正確。記憶:rifampicin=抑轉錄(RNA pol);治結核。","options":{"A":"四環黴素抑轉譯(阻A位)。","B":"立汎黴素抑轉錄(RNA聚合酶)—正解(非抑轉譯)。","C":"紅黴素抑轉譯(50S)。","D":"鏈黴素抑轉譯(30S)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-83":{"quick":"甲硫胺酸(methionine)側鏈無羥基,無法被磷酸化。","detail":{"background":"蛋白質「磷酸化」的胺基酸:『「「絲胺酸(Ser)、蘇胺酸(Thr)、酪胺酸(Tyr)」(皆含「羥基-OH」)」可被「激酶」磷酸化(加磷酸到-OH)』。而『「甲硫胺酸(methionine)」側鏈是「硫醚(-S-CH₃)、「無羥基」」→「「無法磷酸化」」』。故C(methionine)為「無法磷酸化者」,為正解。故C正確。記憶:磷酸化=Ser/Thr/Tyr(有OH);(細菌另有His/Asp磷酸化)。","options":{"A":"酪胺酸可磷酸化(有OH)。","B":"絲胺酸可磷酸化。","C":"甲硫胺酸無羥基、不能磷酸化—正解。","D":"蘇胺酸可磷酸化。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-85":{"quick":"原核IF2專責結合並運送起始tRNA(fMet-tRNA)。","detail":{"background":"『原核「「IF2(GTP依賴)」「結合並運送「起始tRNA(fMet-tRNAfMet)」到核糖體P位」」』。故B(IF2)正確。比較:IF1(阻A位)、IF3(防次單元早結合)、eIF2(真核版,帶Met-tRNAi)。故B正確。記憶:IF2(原核)/eIF2(真核)=帶起始tRNA。","options":{"A":"IF1阻A位。","B":"IF2運送起始tRNA—正解。",
