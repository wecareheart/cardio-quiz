"C":"IF3防次單元早結合。","D":"eIF2是真核版(非原核)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-83":{"quick":"胺醯-tRNA合成酶突變→把錯的胺基酸接到tRNA→解碼錯誤、生功能異常蛋白。","detail":{"background":"『「胺醯-tRNA合成酶」突變(失去對胺基酸/tRNA的專一辨識)→「「把「錯誤的胺基酸」接到tRNA」→「轉譯「解碼錯誤」增加→「生成「胺基酸序列錯誤、功能異常」的蛋白質」」』。故B正確。比較錯誤:A不會「一tRNA帶多種胺基酸而增效率」;C不會「完全停止」(仍接、只是接錯);D核糖體仍辨認tRNA(問題在接錯胺基酸,非tRNA進不了A位)。故B正確。記憶:合成酶=轉譯保真關卡,出錯→錯誤蛋白。","options":{"A":"不會因此增效率。","B":"解碼錯誤增、生異常蛋白—正解。","C":"非完全停止(是接錯)。","D":"tRNA仍可進A位(問題在接錯胺基酸)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-89":{"quick":"肽鍵形成(peptide bond formation)不直接消耗能量(能量已存於胺醯-tRNA)。","detail":{"background":"核糖體蛋白合成各步耗能:『「胺基酸「活化」(ATP→AMP+PPi)、「胺醯-tRNA進A位「結合」(EF-Tu水解GTP)、「移位(translocation)」(EF-G水解GTP)」「皆耗能」』。而『「「肽鍵形成(peptide bond formation)」「不「直接」消耗ATP/GTP」」—「能量「已預存」於「胺醯-tRNA的高能酯鍵」(活化時投入),肽基轉移酶(核酶)直接催化」』。故C(肽鍵形成)為「不直接耗能者」,為正解。故C正確。記憶:肽鍵形成靠已活化的高能酯鍵、不再額外耗能。","options":{"A":"胺基酸活化耗ATP。","B":"胺醯-tRNA進A位耗GTP(EF-Tu)。","C":"肽鍵形成不直接耗能—正解。","D":"移位耗GTP(EF-G)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-91":{"quick":"起始密碼子由起始tRNA解碼:原核用N-甲醯-Met-tRNA、真核用Met-tRNA。","detail":{"background":"起始密碼子(AUG)的解碼tRNA:『「「原核」用「「N-甲醯甲硫胺酸-tRNA(N-formyl-Met-tRNA, fMet-tRNAi)」」;「「真核」用「「甲硫胺酸-tRNA(Met-tRNAi)」(未甲醯化)」」』。故C(N-formyl-Met-tRNA; Met-tRNA)正確—即原核甲醯化、真核不甲醯化。故C正確。記憶:起始tRNA皆攜Met;原核多一甲醯基(fMet)。","options":{"A":"順序顛倒(原核應為fMet)。","B":"起始非Pro(是Met)。","C":"原核fMet-tRNA、真核Met-tRNA—正解。","D":"原核應為甲醯化(fMet)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_106100-97":{"quick":"cyclin是CDK的「調節次單元」,本身「不能直接催化磷酸化」(激酶是CDK),故此敘述錯誤。","detail":{"background":"細胞週期蛋白(cyclin):A「在週期中「被合成活化、再被分解(泛素化降解)」」(正確);B「是「催化磷酸化的酵素(CDK)」的「調控因子」」(正確);C「能與泛素連結(被泛素化降解)」(正確)。D「能「直接催化蛋白質磷酸化的「激酶(kinase)」」」「錯誤」—『「cyclin本身「無激酶活性」、「不能直接磷酸化」;「激酶是「CDK(cyclin-dependent kinase)」」,cyclin是「調節次單元(活化CDK)」』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:cyclin(調節)+CDK(催化激酶)=活性複合體。","options":{"A":"被活化與分解,正確。","B":"是CDK的調控因子,正確。","C":"能與泛素連結,正確。","D":"稱cyclin直接催化磷酸化—錯誤(激酶是CDK),為正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_106100-100":{"quick":"大腸桿菌DNA聚合酶「熱穩定性差」,無法承受PCR高溫變性,故不適用於PCR。","detail":{"background":"PCR需「反覆「94°C高溫變性」」→『大腸桿菌一般DNA聚合酶「「熱穩定性差」、高溫即「變性失活」」→「無法用於PCR」(每循環都要重加酶)』。故A正確。解決:用「耐熱聚合酶(如「Taq polymerase」,來自嗜熱菌Thermus aquaticus)」。故A正確。記憶:PCR用耐熱Taq;普通pol I高溫失活。","options":{"A":"熱穩定性差(高溫失活)—正解。","B":"非模板選擇性差。","C":"非因無3′外切。","D":"非因準確性不足。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_107100-100":{"quick":"酵母人工染色體(YAC)的優點是能選殖「更大的DNA片段」。","detail":{"background":"『「酵母人工染色體(yeast artificial chromosome, YAC)」相較質體的優勢:「可「選殖「更大的DNA片段(數百kb–Mb)」」」(含端粒、著絲粒、複製原點,如真染色體般在酵母複製)』。故D正確。比較:放大效果、轉染效率、蛋白表現非YAC相對質體的主要優勢。故D正確。記憶:載體容量 質體(<10kb)<噬菌體/cosmid<BAC<YAC(最大)。","options":{"A":"放大效果非YAC主要優勢。","B":"轉染效率非其優勢。","C":"非蛋白表現更好。","D":"可選殖更大DNA片段—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108030-97":{"quick":"CDK2磷酸化pRb→釋放E2F→啟動S期基因,使G1進入S期。","detail":{"background":"G1→S轉換:『「cyclin-CDK2(及cyclin D-CDK4/6)「磷酸化「視網膜母細胞瘤蛋白(pRb)」」→「pRb「釋放「E2F轉錄因子」」」→「E2F啟動「DNA合成酵素」基因→「進入S期」」』。故C正確。比較:A「p53活化」→停滯/凋亡(阻週期);B「p21(CDK抑制子)大量」→抑CDK、停週期;D「pRb-E2F複合體(未磷酸化pRb綁住E2F)」→「抑制」E2F、停在G1。故C正確。記憶:CDK磷酸化pRb→放E2F→進S期。","options":{"A":"p53活化使週期停滯。","B":"p21抑制CDK、停週期。","C":"CDK2磷酸化pRb釋放E2F→進S期—正解。","D":"pRb-E2F複合體抑制E2F(停G1)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108030-100":{"quick":"質體轉形細菌常用「CaCl₂處理 + 熱休克(heat shock)」法。","detail":{"background":"『實驗室把「質體「轉形(transformation)」進細菌」常用「「「CaCl₂(氯化鈣)」處理細菌(使細胞膜易通透)→「「熱休克(heat shock, 42°C短暫)」」使質體DNA進入」」(化學轉形)』(或用「電穿孔electroporation」)。故D正確。比較:A低電壓電泳非轉形法;B噬菌體轉染是病毒法(非質體直接);C微注射用於大細胞/胚胎(非細菌)。故D正確。記憶:細菌轉形=CaCl₂+熱休克 或 電穿孔。","options":{"A":"低電壓電泳非轉形法。","B":"噬菌體轉染非質體直接轉形。","C":"微注射用於大細胞(非細菌)。","D":"CaCl₂+熱休克—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108100-99":{"quick":"建立「基因組庫(genomic library)」不需反轉錄酶(那是cDNA庫用)。","detail":{"background":"建立「基因組庫(genomic library)」:『需「限制酶(切基因組DNA)、DNA連接酶(接入載體)、載體(如λ噬菌體)」』。而『「反轉錄酶(reverse transcriptase)」是「建「cDNA庫」(由mRNA反轉錄成cDNA)」才需要的,「基因組庫「不需」」(直接用基因組DNA)』。故C(reverse transcriptase)為「不需要者」,為正解。故C正確。記憶:基因組庫=DNA直接切接(無RT);cDNA庫=mRNA→RT→cDNA。","options":{"A":"DNA連接酶需要(接入載體)。","B":"λ噬菌體可作載體。","C":"反轉錄酶為cDNA庫用、基因組庫不需—正解。","D":"限制酶需要(切DNA)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108100-100":{"quick":"RFLP不適合用來「建立cDNA library」。","detail":{"background":"限制性片段長度多態性(RFLP)的應用:『「「DNA指紋鑑定」、「疾病「基因定位(連鎖分析)」」、「產前/遺傳缺陷篩檢」」皆適用(分析個體間限制酶切位差異)』。而『「「建立cDNA庫」「不適合」用RFLP」(cDNA庫是「由mRNA反轉錄選殖」、與RFLP的「限制片段多態性分析」無關)』。故D(建cDNA庫)為「不適合者」,為正解。故D正確。記憶:RFLP=分析DNA多態(鑑定/定位/篩檢);非建庫工具。","options":{"A":"DNA指紋鑑定適用RFLP。","B":"疾病基因定位適用。","C":"產前遺傳篩檢適用。","D":"建cDNA庫不適用—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109020-86":{"quick":"白胺酸拉鏈(leucine zipper)是DNA結合蛋白「形成二聚體」的主要基序。","detail":{"background":"DNA結合蛋白的「二聚化(dimerization)」基序:『「「白胺酸拉鏈(leucine zipper)」—「兩條α螺旋的「規律白胺酸(每7殘基)」交錯如拉鏈、「介導二聚化」」(如bZIP轉錄因子)」』。故C正確。比較:homeodomain、zinc finger是「DNA結合」基序(非主司二聚化);β-barrel是膜孔/結構。故C正確。記憶:leucine zipper=二聚化;helix-turn-helix/zinc finger/homeodomain=DNA結合。","options":{"A":"β-barrel為膜孔結構。","B":"homeodomain為DNA結合(發育)。","C":"白胺酸拉鏈—正解(二聚化)。","D":"鋅指為DNA結合基序。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109020-100":{"quick":"第II型限制酶辨認「短的迴文(palindromic)序列」;非迴文序列即非其辨認位。","detail":{"background":"『「第II型限制酶(type II restriction enzyme)」「辨認「短(4–8 bp)的「迴文(palindromic)序列」」」(雙股讀來5′→3′相同,如GAATTC/EcoRI、GGATCC/BamHI)→在固定位置切割』。題中「不符迴文對稱」的序列即「非type II辨認序列」(本題標準答案B)。故B正確。判斷法:把序列與其互補反向序列比對,相同者為迴文(可被type II辨認)。故B正確(為非辨認序列者)。","options":{"A":"若為迴文則可被辨認。","B":"非迴文序列、非type II辨認位—正解。","C":"依迴文與否判定。","D":"依迴文與否判定。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_109100-100":{"quick":"基因定點突變(site-directed mutagenesis)不需反轉錄酶。","detail":{"background":"基因「定點突變(site-directed mutagenesis)」(用含突變的引子在模板上合成帶突變的新股):『需「「突變引子(mutated primers)」、「DNA聚合酶」、「dNTPs」、模板DNA」』。而『「反轉錄酶(reverse transcriptase)」是「RNA→DNA」用,「定點突變(DNA模板合成DNA)「不需」」』。故A(reverse transcriptase)為「不需要者」,為正解。故A正確。記憶:定點突變=突變引子+DNA pol+dNTP(無RT)。","options":{"A":"反轉錄酶不需要—正解。","B":"DNA聚合酶需要(合成新股)。","C":"dNTPs需要(受質)。","D":"突變引子需要(導入突變)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_110020-99":{"quick":"腺病毒(adenovirus)最常作為人類基因治療的載體。","detail":{"background":"『人類「基因治療(gene therapy)」載體:「「腺病毒(adenovirus)、腺相關病毒(AAV)、慢病毒(lentivirus)」等「「病毒載體」」最常用」(能高效把治療基因送入人類細胞)』。故C(adenovirus)正確。比較:酵母菌、細菌人工染色體(BAC)、噬菌體是「分子選殖/擴增」工具,不用於人體基因治療。故C正確。記憶:基因治療=病毒載體(腺病毒/AAV/慢病毒)。","options":{"A":"酵母菌為選殖宿主(非人體治療)。","B":"BAC為選殖載體。","C":"腺病毒—正解(基因治療載體)。","D":"噬菌體為細菌病毒(非人體治療)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111020-91":{"quick":"原核DNA結合調節蛋白常具「螺旋-轉角-螺旋(helix-turn-helix)」基序。","detail":{"background":"『「原核」許多「DNA結合調節蛋白(如lac repressor、CAP)」具「「螺旋-轉角-螺旋(helix-turn-helix, HTH)」」基序(一螺旋插入DNA大溝辨認序列)』。故D(helix-turn-helix)正確。比較:homeobox(真核發育)、催化三角(蛋白酶活性中心)、EF手掌(鈣結合)非原核DNA結合調節主基序。故D正確。記憶:原核調節蛋白=HTH;真核另有zinc finger/leucine zipper/HLH/homeodomain。","options":{"A":"同源框為真核發育DNA結合。","B":"催化三角為酵素活性中心。","C":"EF手掌為鈣結合。","D":"螺旋-轉角-螺旋—正解(原核調節蛋白)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-75":{"quick":"鐮形血球貧血由β-球蛋白基因「點突變(Glu→Val)」造成。","detail":{"background":"鐮形血球貧血(sickle-cell disease):『「「β-球蛋白(β-globin)基因「點突變」」(第6個密碼子「GAG→GTG」→「麩胺酸(Glu)→纈胺酸(Val)」)→HbS在缺氧時聚合→紅血球鐮形化→溶血、血管阻塞」』。故A正確。比較錯誤:B非「缺少β球蛋白由γ取代」(是β突變);C非缺α球蛋白(那是α地中海貧血);D非嬰兒期即死(可存活、現代治療下成年,且帶因者抗瘧)。故A正確。記憶:HbS=β6 Glu→Val點突變。","options":{"A":"β-球蛋白基因點突變(Glu→Val)—正解。","B":"非缺β球蛋白(是突變)。","C":"非缺α球蛋白(那是α地貧)。","D":"非嬰兒期即死。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-98":{"quick":"完全分化細胞通常停在細胞週期的G0期。","detail":{"background":"『「完全分化(terminally differentiated)的細胞」(如神經元、心肌、成熟肌肉)「通常「退出細胞週期、停在「G0期(靜止期)」」」、「不再分裂」』。故A(G0)正確。比較:G1/G2/S是「正在進行週期」的階段。故A正確。記憶:G0=靜止/不分裂(分化成熟或暫停);受刺激某些可重入G1。","options":{"A":"G0(靜止期)—正解。","B":"G1為週期進行中。","C":"G2為分裂前準備。","D":"S為DNA合成期。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-100":{"quick":"桑格定序法的關鍵分子是「2′,3′-雙脫氧核苷酸(ddNTP)」。","detail":{"background":"桑格定序法(Sanger/雙脫氧鏈終止法):『關鍵是「「2′,3′-雙脫氧核苷酸(2′,3′-dideoxynucleotides, ddNTP)」」—「缺「3′-OH」→摻入後「鏈終止(無法再延長)」→產生一系列不同長度片段→依長度讀序列」』。故B(2′,3′-雙脫氧核苷酸)正確。故B正確。記憶:Sanger=ddNTP鏈終止(缺3′-OH)。","options":{"A":"1′,2′-雙脫氧非Sanger用。","B":"2′,3′-雙脫氧核苷酸(ddNTP)—正解。","C":"2′,4′-非此。","D":"2′,5′-非此。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_112020-97":{"quick":"層黏連蛋白(laminin)是細胞外基質蛋白,非細胞週期調控蛋白。","detail":{"background":"真核細胞週期主要調控蛋白:『「cyclin(週期蛋白)、CDK(週期蛋白依賴激酶)、APC/C(後期促進複合體,泛素化降解cyclin/securin)」』。而『「層黏連蛋白(laminin)」是「「細胞外基質(基底膜)」的「結構黏附蛋白」」,「「與細胞週期調控無關」」』。故C(laminin)為「非週期調控蛋白」,為正解。故C正確。(注意:「lamin核纖層蛋白」才與核膜分解/週期相關,laminin是ECM、勿混淆。)故C正確。","options":{"A":"cyclin為週期調控蛋白。","B":"CDK為週期調控激酶。","C":"層黏連蛋白為ECM(非週期調控)—正解。","D":"APC/C為週期調控(泛素化降解)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_112020-100":{"quick":"RFLP分析DNA用「南方墨點法(Southern blotting)」。","detail":{"background":"墨點法對應:『「「Southern blotting(南方)→「「DNA」」」;Northern(北方)→RNA;Western(西方)→蛋白質』。『「RFLP(限制片段長度多態性)分析的是「「DNA」」→用「「Southern blotting」」(限制酶切→電泳→轉膜→DNA探針雜交)」』。故B(Southern)正確。故B正確。記憶:S-D(Southern-DNA)、N-R(Northern-RNA)、W-P(Western-Protein)。","options":{"A":"Western測蛋白質。","B":"Southern測DNA(RFLP用)—正解。","C":"Northern測RNA。","D":"slot blot為定量點漬(非RFLP)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113020-99":{"quick":"GCTAGC為迴文序列(雙股5′→3′讀來相同),多數限制酶辨認此類序列。","detail":{"background":"限制酶辨認的「迴文序列(palindrome)」:『「「雙股DNA「兩股各以5′→3′讀來「序列相同」」」(如「GCTAGC」的互補股反向亦為GCTAGC)」』。檢驗D「GCTAGC」:互補股3′-CGATCG-5′→以5′→3′讀為「GCTAGC」=相同→「是迴文」。故D正確。比較:CCCCCC、AGCAGC、TAGGAT的互補反向序列與原序列不同→非迴文。故D正確。記憶:迴文=自身互補反向相同(限制酶辨認對稱)。","options":{"A":"CCCCCC非迴文。","B":"AGCAGC非迴文。","C":"TAGGAT非迴文。","D":"GCTAGC為迴文—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113020-100":{"quick":"PCR不需要反轉錄酶(那是RT-PCR由RNA起始才需要)。","detail":{"background":"聚合酶鏈鎖反應(PCR)需:『「「DNA雙股模板」、「引子(一對)」、「耐熱DNA聚合酶(Taq)」、dNTPs、Mg²⁺、緩衝液」』。而『「反轉錄酶(reverse transcriptase)」「「一般PCR「不需」」」(只有「RT-PCR(以RNA為起始材料)」才先用反轉錄酶把RNA→cDNA」)』。故D(reverse transcriptase)為「PCR不需者」,為正解。故D正確。記憶:PCR=模板+引子+Taq+dNTP;RT-PCR才加反轉錄酶。","options":{"A":"PCR需DNA模板。","B":"PCR需引子。","C":"PCR需DNA聚合酶。","D":"反轉錄酶非PCR必需—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-97":{"quick":"CDK主要受「p21(CDK抑制蛋白)」抑制。","detail":{"background":"『「週期蛋白依賴激酶(CDK)」「主要被「「CDK抑制蛋白(CKI),如「p21、p27、p16」」」抑制」(p21由「p53」誘導→DNA損傷時抑制CDK→週期停滯)』。故C(p21)正確。比較:lamin(核纖層)、myosin(肌動)、Rb(被CDK磷酸化的「受質」、非抑制CDK者)非CDK抑制子。故C正確。記憶:p21/p27/p16=CDK抑制子(CKI);p53→p21。","options":{"A":"lamin為核纖層蛋白。","B":"myosin為肌動蛋白。","C":"p21抑制CDK—正解。","D":"Rb是CDK受質(非抑制CDK)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_113090-100":{"quick":"重組兩質體上的DNA片段最可能用「限制酶(restriction enzyme)」(配合連接酶)。","detail":{"background":"『要把「兩個質體上的DNA片段「重組(剪接拼接)」」→「先用「「限制酶(restriction enzyme)」「在特定位點「切割」」(產生互補黏端)→再用「DNA連接酶」接合」」』。故A(限制酶)為「最可能使用」者,正確。比較:RNA聚合酶(轉錄)、反轉錄酶(RNA→DNA)、多核苷酸激酶(加5′磷酸)非「切割重組DNA」主酵素。故A正確。記憶:重組DNA=限制酶切 + 連接酶接。","options":{"A":"限制酶(切割產黏端)—正解。","B":"RNA聚合酶為轉錄。","C":"反轉錄酶為RNA→DNA。","D":"多核苷酸激酶加5′磷酸(非切割)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-84":{"quick":"DNA足跡法(footprinting)分析「DNA與蛋白質專一性結合的位置」。","detail":{"background":"『「DNA足跡法(DNA footprinting)」:「蛋白質結合DNA後「「保護結合區」免被「DNase I/化學試劑」切割」→電泳上該區出現「「空白(footprint)」」→「定位「DNA與蛋白質專一結合的序列位置」」」』。故C正確。比較:它非定基因5′/3′端、非定RNA結合區、非定內含子位置。故C正確。記憶:footprinting=測蛋白-DNA結合位點。","options":{"A":"非定基因編碼5′/3′端。","B":"非定RNA結合位置。","C":"DNA-蛋白質專一結合位置—正解。","D":"非定內含子位置。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-98":{"quick":"製作探針標記用「γ-³²P-ATP」(經多核苷酸激酶把³²P加到5′端)。","detail":{"background":"『製作偵測探針的「放射標記」:「「γ-³²P-ATP」+「T4多核苷酸激酶」→把「γ位的³²P磷酸「轉到「DNA/寡核苷酸的5′端」」」(5′端標記)」』。故C(γ-³²P-ATP)正確。比較:α-³²P(摻入合成新股、隨機引子標記用,但題指「單股寡核苷酸末端標記」→γ);β位非轉移、ATP無標記。故C正確。記憶:5′端標記=γ-³²P-ATP+激酶;隨機引子摻入=α-³²P-dNTP。","options":{"A":"α-³²P用於摻入新股(隨機引子)。","B":"β-³²P非轉移用。","C":"γ-³²P-ATP(5′端標記)—正解。","D":"無放射的ATP無法標記。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-99":{"quick":"選殖質體通常需「抗生素抗藥性基因」作為篩選標記(此敘述正確)。","detail":{"background":"選殖質體(cloning plasmid)特性:C『「「需含「抗生素抗藥性基因(如ampR)」」「提供「篩選(selection)」」」(只有帶質體的菌能在抗生素下存活)』正確。比較錯誤:A「環狀質體複製「不需」整合到宿主染色體」(質體「自主複製」、非整合);B「質體選殖容量小(通常<10 kb,「不」能>50 kb)」(>50 kb要用BAC/YAC);D「外來片段插入靠「限制酶+連接酶」(非「Cre重組酶」,Cre用於loxP位點特異重組)」。故C正確。記憶:質體=自主複製、抗藥篩選、小容量。","options":{"A":"質體自主複製(不整合染色體)。","B":"質體容量小(非>50kb)。","C":"需抗藥性基因供篩選—正解。","D":"插入靠限制酶/連接酶(非Cre)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114020-100":{"quick":"有效表達順序為:啟動子→操作子→核糖體結合位(5′端起)。","detail":{"background":"細菌質體上「有效表達蛋白」的功能序列順序(5′→3′):『「「啟動子(promoter,RNA聚合酶結合啟動轉錄)」→「操作子(operator,調控)」→「核糖體結合位(RBS/SD序列,起始轉譯)」→結構基因」』。故B正確。比較:A/C把RBS放最前(錯,需先轉錄);D把終止子放最前(會提前終止)。故B正確。記憶:promoter→operator→RBS→ORF(先轉錄、再轉譯)。","options":{"A":"RBS不應在啟動子前。","B":"啟動子→操作子→RBS—正解。","C":"RBS不應在啟動子前。","D":"終止子在前會阻表達。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-98":{"quick":"選殖「大片段」DNA用酵母人工染色體(YAC,容量最大)。","detail":{"background":"選殖載體容量:『「質體(pBR322,<10 kb)<噬菌體/cosmid<「細菌人工染色體(BAC,~100–300 kb)」<「「酵母人工染色體(YAC,可達「數百kb–Mb,最大」)」」』。故選「最大片段」者為B(YAC)。故B正確。(BAC亦大,但YAC容量更大、最適「大片段」。)故B正確。記憶:大片段選殖容量 YAC>BAC>cosmid>噬菌體>質體。","options":{"A":"pBR322質體容量小。","B":"YAC容量最大—正解(大片段)。","C":"噬菌體載體容量中等。","D":"BAC大但小於YAC。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-100":{"quick":"免疫組織化學染色(IHC)用於「組織內蛋白定位」,不適合分析蛋白質-蛋白質交互作用。","detail":{"background":"分析「蛋白質-蛋白質交互作用」的方法:『「串接親和共純化(TAP)、免疫共沉澱(co-IP)、酵母菌雙雜交(yeast two-hybrid)」皆可偵測蛋白互動』。而『「免疫組織化學染色(immunohistochemistry, IHC)」是「在「組織切片」上「定位「單一蛋白質的「表現與分布」」」,「「不」用於分析「蛋白質間交互作用」」』。故C(IHC)為「不適用者」,為正解。故C正確。記憶:互動分析=co-IP/TAP/Y2H;IHC=組織定位。","options":{"A":"TAP用於蛋白互動。","B":"co-IP用於蛋白互動。","C":"免疫組織化學為組織定位(非互動分析)—正解。","D":"酵母雙雜交用於蛋白互動。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-82":{"quick":"Ni²⁺親和層析純化需在蛋白上接「六個連續組胺酸(His₆ tag)」。","detail":{"background":"『「Ni²⁺(鎳)親和層析(IMAC)」純化:「以重組DNA技術在標的蛋白接上「「六組胺酸標籤(His₆ tag)」」→「His的咪唑環「螯合Ni²⁺」→蛋白被鎳管柱「特異結合」→以咪唑(imidazole)競爭洗脫」」』。故C(六個連續組胺酸)正確。比較:GST標籤(用麩胱甘肽管柱)、Protein A(用IgG)、β-半乳糖苷酶(報導/融合,非Ni)。故C正確。記憶:His₆-tag↔Ni²⁺-NTA管柱。","options":{"A":"β-半乳糖苷酶非Ni親和標籤。","B":"GST用麩胱甘肽管柱(非Ni)。","C":"六組胺酸(His₆)↔Ni²⁺—正解。","D":"Protein A用IgG管柱。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_115020-99":{"quick":"原核表現載體必備「核糖體結合位(RBS)」與「轉錄啟動子(promoter)」。","detail":{"background":"『「原核「蛋白表現載體(expression vector)」」必備:「「轉錄「啟動子(promoter)」(啟動mRNA合成)」+「「核糖體結合位(RBS/Shine-Dalgarno)」(起始轉譯)」」(再加選殖位、終止子、篩選標記)』。故B(RBS+promoter)正確。比較:「內含子(intron)、端粒(telomere)」是「真核」元件,「原核「不需/無」」(原核無內含子剪接、環狀DNA無端粒)。故B正確。記憶:原核表現=promoter+RBS(無內含子/端粒)。","options":{"A":"原核無內含子(不需)。","B":"RBS+啟動子—正解(原核表現必備)。","C":"內含子為真核(不適原核)。","D":"端粒為真核線性染色體(不適原核)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-84":{"quick":"轉錄「終止」不是TFIIH的功能(TFIIH司起始前複合體、解旋、CTD磷酸化)。","detail":{"background":"真核RNA聚合酶II的通用因子「TFIIH」:A「有「ATP水解」活性」(正確);B「參與「轉錄前起始複合體」形成」(正確);C「具「DNA解旋酶(helicase,解開啟動子)+「激酶(磷酸化pol II的CTD)」活性」」(正確,亦參與NER)。D「「轉錄「終止」」」「錯誤」—『「轉錄終止「不是TFIIH的功能」」(終止另由其他機制,如poly-A訊號/Rho等)』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:TFIIH=起始前複合體、解旋、CTD磷酸化、NER;非終止。","options":{"A":"有ATP水解活性,正確。","B":"參與起始前複合體,正確。","C":"有解旋酶與激酶活性,正確。","D":"稱司轉錄終止—錯誤(非TFIIH功能),為正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_108030-76":{"quick":"凝膠過濾中分子量最大者最先洗出;次大的IgG(145,000)為第二個洗出。","detail":{"background":"凝膠過濾(分子篩)層析「依分子大小分離」:『「「大分子「先」洗出(走柱外捷徑)、小分子「後」洗出(進孔洞路徑長)」」』。本題分子量:RNA聚合酶450,000 > IgG 145,000 > 細胞色素c 13,000 ≈ RNase A 13,700。故「最先洗出=RNA聚合酶(最大);「第二個洗出=「IgG(145,000)」」;細胞色素c與RNase A(約13–14k)最後且難分」。題求「第二個被洗出者」→B(IgG)。故B正確。記憶:凝膠過濾=大的先出。","options":{"A":"細胞色素c(13,000)最後洗出。","B":"IgG(145,000)第二個洗出—正解。","C":"RNase A(13,700)最後洗出。","D":"RNA聚合酶(450,000)最先洗出(非第二)。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_111100-89":{"quick":"硫酸角質素由「半乳糖(galactose)」與「N-乙醯葡萄糖胺」組成。","detail":{"background":"『「硫酸角質素(keratan sulfate)」(角膜、軟骨主要醣胺聚醣GAG之一):「重複雙醣=「「半乳糖(galactose)」+「N-乙醯葡萄糖胺(N-acetylglucosamine)」」(及硫酸化)」』。故B正確。(特別:keratan sulfate「不含「糖醛酸(uronic acid)」」,與其他GAG不同。)故B正確。記憶:硫酸角質素=Gal+GlcNAc(無糖醛酸);玻尿酸/軟骨素才含糖醛酸。","options":{"A":"非半乳糖+葡萄糖。","B":"半乳糖+N-乙醯葡萄糖胺—正解。","C":"硫酸角質素不含糖醛酸。","D":"非糖醛酸+葡萄糖。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_114090-87":{"quick":"1,3-雙磷酸甘油酸經「一步」(phosphoglycerate kinase)直接生成ATP。","detail":{"background":"『「1,3-雙磷酸甘油酸(1,3-bisphosphoglycerate)」是「高能中間物」→「經「「一個反應(磷酸甘油酸激酶phosphoglycerate kinase)」」「把高能磷酸「直接轉給ADP→「生成ATP」」(基質階層磷酸化)」』。故D正確。比較:甘油磷酸、6-磷酸葡萄糖酸內酯、果糖1,6-雙磷酸皆「非高能磷酸直接生ATP」(需多步)。故D正確。記憶:糖解兩處基質階層磷酸化(1,3-BPG→3-PG、PEP→pyruvate)直接生ATP。","options":{"A":"甘油磷酸非一步生ATP。","B":"6-磷酸葡萄糖酸內酯非生ATP。","C":"果糖1,6-雙磷酸非一步生ATP。","D":"1,3-雙磷酸甘油酸一步生ATP—正解。"},"sources":["Lehninger《生物化學原理》","Molecular Biology of the Gene","Harper《Illustrated Biochemistry》"]}},"med1_106100-90":{"quick":"HSP使類固醇受體保持「不活化」(遮住DNA結合區),非結合類固醇結合區抑制,A敘述錯誤。","detail":{"background":"類固醇激素受體:B「不屬細胞膜受體(屬「胞內/核受體」)」(正確);C「與配體結合→構型改變→「與熱休克蛋白(HSP)解離」→活化」(正確);D「活化後與DNA上「荷爾蒙反應元件(HRE)」結合調控轉錄」(正確)。A「HSP與受體的「「類固醇結合區」」結合抑制活性」「錯誤」—『HSP90是「遮住受體「DNA結合區/使其滯留細胞質、保持「不活化」」(配體結合後HSP才解離),「並非結合「類固醇結合區」」』。故A為正解(錯誤敘述)。故A正確(為錯誤者)。","options":{"A":"稱HSP結合類固醇結合區—錯誤(HSP遮DNA結合區使失活),為正解。","B":"屬胞內受體,正確。","C":"結合配體後與HSP解離,正確。","D":"與HRE結合調控轉錄,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-98":{"quick":"霍亂毒素修飾Gs的α次單元(ADP-核糖基化),此敘述正確。","detail":{"background":"ADP-核糖基化調節訊息:A『「霍亂毒素(cholera toxin)「ADP-核糖基化「Gsα」」→抑制其GTP酶→「Gsα持續活化→腺苷酸環化酶持續活、cAMP↑」(腸液大量分泌→米湯樣腹瀉)』正確。比較:B/C「百日咳毒素(pertussis toxin)修飾的是「Giα」(非Gsα/受體)→使Gi失活、cAMP亦升」;D磷脂酶非霍亂毒素標的。故A正確。記憶:霍亂毒素→Gsα(活化);百日咳毒素→Giα(失活)。","options":{"A":"霍亂毒素修飾Gsα—正解。","B":"百日咳毒素修飾Giα(非Gsα)。","C":"百日咳毒素非修飾受體。","D":"磷脂酶非霍亂毒素標的。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_106100-99":{"quick":"心房利鈉肽(ANF/ANP)的受體是「膜鑲嵌型鳥苷酸環化酶」(產生cGMP)。","detail":{"background":"『「心房利鈉肽(ANF/ANP)」的受體是「「膜鑲嵌型「鳥苷酸環化酶(guanylyl cyclase)」受體」」→「配體結合→受體胞內域「合成cGMP」→cGMP活化PKG→血管舒張、利鈉利尿、降血壓」』。故C正確。比較:RTK(生長因子)、β-腎上腺素受體(GPCR/cAMP)非ANF受體。故C正確。記憶:ANP/NO→鳥苷酸環化酶→cGMP。","options":{"A":"非受體酪胺酸激酶。","B":"非第二型RTK。","C":"膜型鳥苷酸環化酶受體—正解。","D":"β-腎上腺素受體為GPCR(非ANF)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-84":{"quick":"缺鐵時網狀紅血球的HRI激酶磷酸化eIF2,抑制血紅素(整體轉譯起始)合成。","detail":{"background":"『網狀紅血球「缺鐵」時:「「血基質調控抑制因子(heme-regulated inhibitor, HRI)激酶」被活化→「「磷酸化「真核起始因子2(eIF2)」的α次單元」」→「抑制eIF2再生(eIF2B被卡)→「轉譯起始受抑→「血紅素(球蛋白)合成下降」」(避免無鐵時白做)」』。故C(磷酸化eIF2)正確。故C正確。記憶:缺血基質→HRI磷酸化eIF2α→關閉球蛋白轉譯。","options":{"A":"非磷酸化CREB。","B":"非磷酸化SREBP。","C":"磷酸化eIF2(抑制起始)—正解。","D":"非磷酸化eIF4E。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-98":{"quick":"介白素訊息傳遞活化轉錄因子STATs(JAK-STAT途徑)。","detail":{"background":"『「介白素(interleukins)」等細胞激素的受體屬「「細胞激素受體(無內在激酶)」」→「結合「JAK激酶」→「磷酸化並活化「STATs(訊號轉導與轉錄活化子)」」→STAT二聚化入核調控基因」』。故B(活化STATs)正確。比較:A非絲胺酸激酶受體;C/D「非主要靠cAMP/G蛋白」(那是GPCR)。故B正確。記憶:細胞激素/EPO/GH/介白素→JAK-STAT。","options":{"A":"非絲胺酸激酶受體。","B":"活化STATs—正解(JAK-STAT)。","C":"非主要活化cAMP。","D":"非主要G蛋白參與。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_107100-99":{"quick":"糖皮質激素「直接穿膜→與胞內受體結合→再結合DNA」調控轉錄。","detail":{"background":"『「糖皮質激素(glucocorticoids,脂溶性類固醇)」「「直接「擴散穿過細胞膜」」→「進入細胞「與「胞內受體(GR)」結合」」→「「複合體入核「結合DNA(GRE)」」調控基因轉錄」』。故D正確。比較:A/B錯(非膜受體);C錯(需「先與胞內受體結合」才結合DNA,非直接結合DNA)。故D正確。記憶:類固醇=穿膜→胞內受體→DNA(基因組作用)。","options":{"A":"非膜受體、非直接結合DNA。","B":"非膜受體訊息傳遞。","C":"需先與受體結合(非直接結合DNA)。","D":"穿膜→胞內受體→結合DNA—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-78":{"quick":"維生素A與「核視黃酸受體(nuclear retinoid receptors)」結合調控基因。","detail":{"background":"『「維生素A」的活性形式「「視黃酸(retinoic acid)」」「與「「核視黃酸受體(nuclear retinoid receptors, RAR/RXR)」」直接結合」→「複合體結合DNA調控基因表現」(影響發育、上皮分化)』。故C正確。比較:calcitriol受體(維生素D)、RTK、GPCR非維生素A受體。故C正確。記憶:視黃酸→核受體RAR/RXR(類固醇/甲狀腺素受體超家族)。","options":{"A":"calcitriol受體為維生素D。","B":"RTK為生長因子受體。","C":"核視黃酸受體—正解。","D":"GPCR非維生素A受體。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-79":{"quick":"霍亂毒素使Gsα持續活化、cAMP升;故「Gsα無法活化下游」為錯誤敘述。","detail":{"background":"『「霍亂毒素」「ADP-核糖基化「Gsα」→「抑制其「GTP酶」」→「Gsα「鎖在GTP結合的「持續活化」態」」→「腺苷酸環化酶「持續活化」、「cAMP「增加」」」(腸黏膜大量分泌→水樣腹瀉)』。故C(adenylyl cyclase持續活化)、D(cAMP增加)為正確結果。題問「何者「錯誤」」→A「Gsα「無法」活化下游效應物」「錯誤」(實際是「持續活化」下游)。故A為正解(錯誤敘述)。故A正確(為錯誤者)。","options":{"A":"稱Gsα無法活化下游—錯誤(實為持續活化),為正解。","B":"βγ重結合受抑(Gsα持續活化的結果之一)。","C":"腺苷酸環化酶持續活化,正確。","D":"cAMP增加,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-98":{"quick":"類固醇受體(胞內/核受體)與G蛋白訊息傳遞「無關」。","detail":{"background":"與「G蛋白(G protein)訊息傳遞」相關的:『「腺苷酸環化酶(adenylyl cyclase,GPCR下游)、磷脂酶C(PLC,Gq下游)、Ras(小G蛋白)」』。而『「類固醇受體(steroid receptors)」是「「胞內/核受體」(脂溶性激素直接入胞、調控轉錄)」,「「與G蛋白訊息傳遞「無關」」」』。故A(類固醇受體)為「無關者」,為正解。故A正確。記憶:類固醇=核受體(基因組作用,不經G蛋白/第二信差)。","options":{"A":"類固醇受體與G蛋白無關—正解。","B":"腺苷酸環化酶為G蛋白下游。","C":"磷脂酶C為Gq下游。","D":"Ras為小G蛋白。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108030-99":{"quick":"攜鈣素以「螺旋-環-螺旋(EF-hand)」結合鈣,非「兩性β層」,故此敘述錯誤。","detail":{"background":"攜鈣素(calmodulin):A「結合鈣→構型改變」(正確);C「調節多種蛋白激酶(如CaMK、MLCK)」(正確);D「以「「螺旋-環-螺旋(helix-loop-helix, EF-hand)」基序」結合鈣」(正確,4個EF-hand)。B「含「「兩性β層(β-sheet)」」與標靶結合」「錯誤」—『攜鈣素「以「α螺旋(EF-hand的螺旋-環-螺旋)」結合鈣與標靶」,「非「β層」」』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。記憶:calmodulin=4個EF-hand(螺旋-環-螺旋)、結合4 Ca²⁺。","options":{"A":"結合鈣改變構型,正確。","B":"稱含兩性β層—錯誤(是EF-hand α螺旋),為正解。","C":"調節多種激酶,正確。","D":"以螺旋-環-螺旋結合鈣,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-78":{"quick":"EPO與受體結合後,「受體被JAK磷酸化」(啟動JAK-STAT)。","detail":{"background":"紅血球生成素(EPO)的JAK-STAT機制:B『「EPO結合受體→受體二聚化→「結合的「JAK激酶」「互相活化」→「磷酸化「受體」(及JAK自身)」」→招募STAT→STAT被磷酸化、二聚化入核調控紅血球生成基因』正確。比較錯誤:A「EPO受體「本身不是JAK」(JAK是結合於受體的「另一蛋白」)」;C「受體被「JAK」磷酸化(非被STAT)」;D「入核的是「STAT」(非「EPO-受體複合體」整個入核)」。故B正確。記憶:配體→受體二聚→JAK磷酸化受體→STAT。","options":{"A":"EPO受體本身非JAK(JAK另結合)。","B":"受體被JAK磷酸化—正解。","C":"受體被JAK(非STAT)磷酸化。","D":"入核者為STAT(非整個複合體)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-96":{"quick":"IP3會「增加」(非減少)細胞質鈣濃度,故此敘述錯誤。","detail":{"background":"被荷爾蒙活化的磷脂酶C(PLC):A「受質為「PIP2(磷脂肌醇4,5-雙磷酸)」」(正確);B「產物「二醯甘油(DAG)」活化「蛋白激酶C(PKC)」」(正確);C「由「G蛋白(Gq)」連結之受體活化」(正確)。D「產物「肌醇三磷酸(IP3)」「「減少」細胞質鈣」」「錯誤」—『「IP3「結合內質網IP3受體→「「釋放鈣」→「「「增加」細胞質鈣」濃度」」(非減少)』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:PLC→IP3(放鈣↑)+DAG(活化PKC)。","options":{"A":"受質為PIP2,正確。","B":"DAG活化PKC,正確。","C":"由Gq受體活化,正確。","D":"稱IP3減少鈣—錯誤(IP3釋鈣使鈣升),為正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-97":{"quick":"糖皮質激素-受體複合體主要與「GRE」結合調控激素反應基因(在胞內形成、有DNA與激素結合區)。","detail":{"background":"糖皮質激素-受體(GR)複合體:B「複合體「在「細胞內」形成」(正確);C「結合在「可辨識的DNA序列(GRE/HRE)」上影響激素反應基因」(正確);D「受體具「典型DNA結合區」與「激素結合區」」(正確)。A「「「主要」是與「其他轉錄因子結合」「抑制」基因表現」」「為錯誤(不適當)」—『GR「「主要」機制是「結合GRE「直接調控(可活化亦可抑制)」」;「「拮抗其他轉錄因子(tethering,如抑NF-κB)」是「次要/特定」機制,非「主要」」』。故A為正解(錯誤/最不適當敘述)。故A正確(為錯誤者)。","options":{"A":"稱主要靠結合其他轉錄因子抑制—錯誤(主要靠結合GRE),為正解。","B":"複合體在胞內形成,正確。","C":"結合HRE/GRE,正確。","D":"具DNA與激素結合區,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_108100-98":{"quick":"Ras突變持續活化因「不受GAP調節」(無法水解GTP→鎖在GTP活化態)。","detail":{"background":"『「致癌「Ras突變」「持續活化」的機制:「突變使Ras「「無法被「GTPase活化蛋白(GAP)」「促進GTP水解」」」→「Ras「鎖在「GTP結合的活化態」」→「持續傳遞生長訊號」→致癌」』。故B(不受GAP調節)正確。比較:A「增加GDP親和力」會使其「失活」(相反);C/D與「持續活化」無直接關係。故B正確。記憶:Ras-GTP=活化;GAP促水解→Ras-GDP失活;癌性Ras抗GAP→鎖活化。","options":{"A":"增GDP親和力會失活(相反)。","B":"不受GAP調節(鎖GTP態)—正解。","C":"與持續活化無關。","D":"與持續活化無關。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-97":{"quick":"TNF誘導凋亡會造成粒線體釋出細胞色素c,引發細胞蛋白與DNA破壞。","detail":{"background":"腫瘤壞死因子(TNF)誘導凋亡:D『「TNF結合受體→活化caspase級聯→「造成「粒線體「釋出細胞色素c(cytochrome c)」」→「組裝凋亡體(apoptosome)→活化caspase-9/3→「分解細胞蛋白質、切割DNA」」』正確。比較錯誤:A「TNF「有」特異受體(TNFR)」(非無);B「caspase-8「活化下游caspase」(非「分解cytochrome c」)」;C過於籠統。故D正確。記憶:凋亡內生路徑=粒線體放cytochrome c→apoptosome→caspase。","options":{"A":"TNF有特異受體(非無)。","B":"caspase-8活化下游(非分解cyt c)。","C":"敘述籠統不準。","D":"粒線體釋cyt c引發凋亡—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-98":{"quick":"瓜胺素(guanylin)結合小腸鳥苷酸環化酶受體調控腸液(此敘述正確)。","detail":{"background":"鳥苷酸環化酶(guanylyl cyclase):C『「「瓜胺素(guanylin)」結合「小腸的「鳥苷酸環化酶受體」」→「cGMP↑→調控腸道「液體/電解質分泌」」(腸毒素ST亦作用此受體致分泌性腹瀉)』正確。比較錯誤:A「鳥苷酸環化酶「合成cGMP」(非把cGMP轉GMP,那是磷酸二酯酶)」;B「鳥苷酸環化酶有「膜型(受體)「與」可溶型(NO感應)」兩種」(非皆膜受體);D「Viagra(sildenafil)是「抑制「磷酸二酯酶5(PDE5)」→「減少cGMP「降解」」→cGMP維持高」(非「促進cGMP「產生」」)」。故C正確。","options":{"A":"鳥苷酸環化酶合成cGMP(非分解)。","B":"有膜型與可溶型(非皆膜受體)。","C":"guanylin結合腸鳥苷酸環化酶受體—正解。","D":"Viagra抑制PDE5(減cGMP降解,非促產生)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109020-99":{"quick":"類固醇激素「在血中「有」攜帶蛋白」(胜肽激素多無),故「後者沒有攜帶蛋白」錯誤。","detail":{"background":"胜肽 vs 類固醇激素比較:A「胜肽受體在「膜上」、類固醇受體在「胞內」」(正確);C「胜肽如PTH結合膜受體產cAMP」(正確);D「類固醇與受體結合後與DNA結合」(正確)。B「「前者(胜肽)有攜帶蛋白、「後者(類固醇)「沒有」攜帶蛋白」」」「錯誤」—『「「類固醇(脂溶性)在血中「需「攜帶蛋白」(如皮質醇結合球蛋白CBG、性荷爾蒙結合球蛋白SHBG)」運輸」;「胜肽(水溶性)「多「不需」攜帶蛋白」」(與題述相反)』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。記憶:脂溶性激素(類固醇/甲狀腺素)才需血漿攜帶蛋白。","options":{"A":"胜肽膜受體、類固醇胞內受體,正確。","B":"稱類固醇無攜帶蛋白—錯誤(類固醇才需攜帶蛋白),為正解。","C":"PTH結合膜受體產cAMP,正確。","D":"類固醇與受體後結合DNA,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-97":{"quick":"PI3K訊息路徑下游為「蛋白激酶B(PKB/Akt)」。","detail":{"background":"『「磷脂肌醇3-激酶(PI3K)」訊息路徑:「PI3K「磷酸化PIP2→PIP3」→「PIP3招募「「蛋白激酶B(protein kinase B, PKB/Akt)」」到膜並活化」→促細胞「存活、生長、代謝(如使GSK3失活、促肝醣合成)」」』。故B(protein kinase B)正確。比較:cGMP、PKG、CaMK非PI3K路徑核心。故B正確。記憶:PI3K→PIP3→Akt(PKB)→存活/生長。","options":{"A":"cGMP非PI3K路徑。","B":"蛋白激酶B(Akt)—正解。","C":"PKG屬cGMP路徑。","D":"CaMK屬鈣路徑。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_109100-98":{"quick":"鈣為次級訊息傳遞者,題述其與DAG關係之敘述為錯誤(IP3釋鈣、DAG與鈣活化PKC)。","detail":{"background":"肌肉細胞鈣離子:A「胞質鈣多與蛋白結合(游離鈣極低)」(正確);B「鈣在「內質網/肌漿網內「儲存濃度高」」(較胞質高)」(正確);C「鈣經「攜鈣素(calmodulin)」調節多種功能」(正確)。D「鈣為次級訊息傳遞者,「其「與二醯甘油(DAG)…」」(後述關係)」「錯誤」—『正確機制:「「IP3「釋放鈣」」;「DAG「與鈣」「協同活化「蛋白激酶C(PKC)」」」(題D對鈣與DAG關係的描述不正確)』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:IP3放鈣、DAG+鈣活化PKC。","options":{"A":"胞質鈣多與蛋白結合,正確。","B":"肌漿網鈣儲存濃度高,正確。","C":"經攜鈣素調節,正確。","D":"對鈣與DAG關係描述—錯誤,為正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-77":{"quick":"視覺循環是「11-cis-retinal受光→all-trans-retinal」,題述方向相反故錯誤。","detail":{"background":"維生素A型式與功能:A「視黃酸作為激素、與核受體結合」(正確);B「β-胡蘿蔔素(含多個異戊二烯)是維生素A前驅」(正確);D「11-cis-retinal與「opsin的離胺酸」形成共價(Schiff鹼)」(正確,構成視紫質)。C「「all-trans-retinal與rhodopsin結合,經可見光激發形成11-cis」」「錯誤」—『視覺循環方向相反:「「11-cis-retinal」與opsin形成「視紫質(rhodopsin)」→「受光「異構化成「all-trans-retinal」」→觸發視覺訊號(再經酵素還原回11-cis)」』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。記憶:11-cis(暗)→光→all-trans(漂白)。","options":{"A":"視黃酸與核受體結合,正確。","B":"β-胡蘿蔔素為維生素A前驅,正確。","C":"稱all-trans受光變11-cis—錯誤(實為11-cis受光變all-trans),為正解。","D":"11-cis-retinal與opsin離胺酸共價,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-96":{"quick":"一氧化氮(NO)的前驅物是「精胺酸(arginine)」(非麩醯胺酸),故此敘述錯誤。","detail":{"background":"一氧化氮(NO):A「是「自由基」、可「自由擴散穿膜」」(正確);B「為「神經傳導物質」(及血管舒張)」(正確);D「在胞質與「鳥苷酸環化酶」結合→活化產cGMP」(正確)。C「生合成前驅物是「麩醯胺酸(glutamine)」」「錯誤」—『NO由「「精胺酸(arginine)」+O₂+NADPH「(經NO合成酶)」→NO + 瓜胺酸」生成(前驅是「精胺酸」,非麩醯胺酸)』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。記憶:NO來自精胺酸(NOS)。","options":{"A":"是自由基、可擴散穿膜,正確。","B":"為神經傳導物質,正確。","C":"稱前驅為麩醯胺酸—錯誤(應為精胺酸),為正解。","D":"與鳥苷酸環化酶結合,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-97":{"quick":"Ras突變鎖在「GTP結合的活化狀態」時最可能致癌。","detail":{"background":"『「致癌基因ras突變」「使Ras「持續處於「GTP結合的「活化」狀態」」(無法水解GTP)→「持續傳遞「生長/增殖」訊號」→「最可能「致腫瘤」」』。故A(GTP-bound活化態)正確。比較:GDP-bound是「失活」態(不致癌);Ras結合的是GTP/GDP(非ATP/ADP)。故A正確。記憶:Ras-GTP=開(致癌型卡在此);Ras-GDP=關。","options":{"A":"GTP結合的活化態—正解(致癌)。","B":"GDP結合為失活態。","C":"Ras結合GTP(非ATP)。","D":"GDP-bound失活、且非ADP。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_110020-98":{"quick":"Tamoxifen進入細胞與雌激素受體結合,影響雌激素調控的基因表達。","detail":{"background":"Tamoxifen(乳癌輔助治療):D『「「Tamoxifen(選擇性雌激素受體調節劑SERM)」「進入細胞「與「雌激素受體(ER)」結合」→「在乳房「拮抗雌激素」→影響「雌激素調控基因」表達(抑制ER陽性乳癌生長)」』正確。比較錯誤:A是「雌激素(非男性激素)」拮抗;B「對「ER「陽性」乳癌效果較好」(非陰性)」;C「脂溶性、「直接穿膜」(非經表面受器「進入」)」。故D正確。記憶:tamoxifen=ER拮抗(乳房)、用於ER陽性乳癌。","options":{"A":"為雌激素拮抗(非男性激素)。","B":"對ER陽性乳癌效果好(非陰性)。","C":"直接穿膜(非經表面受器進入)。","D":"與雌激素受體結合影響基因—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-78":{"quick":"表皮生長因子(EGF)與其受體(RTK)結合後,受體由單體形成雙聚體。","detail":{"background":"『「表皮生長因子(EGF)」結合「EGF受體(受體酪胺酸激酶RTK)」→「受體「由單體「二聚化(dimer)」」→「兩受體胞內激酶域「互相自磷酸化(trans-autophosphorylation)」」→啟動下游(Ras/MAPK等)」』。故B正確。比較:菸鹼乙醯膽鹼受體(離子通道,本為五聚體)、β-腎上腺素受體(GPCR,單體經G蛋白)、整合素(integrin,結合ECM)非「配體誘導單體→二聚」的典型RTK。故B正確。記憶:RTK(EGF/胰島素/FGF)=配體誘導二聚化+自磷酸化。","options":{"A":"菸鹼受體為離子通道(非二聚活化)。","B":"EGF/EGFR二聚化—正解(RTK)。","C":"β-腎上腺素受體為GPCR。","D":"整合素結合ECM(非二聚活化機制)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111020-79":{"quick":"類固醇可穿透細胞膜、作用於胞內受體,故「類固醇無法穿膜、作用膜受體」錯誤。","detail":{"background":"庫欣氏症(腎上腺皮質類固醇過多):A「皮質類固醇合成前驅是「膽固醇」」(正確);C「類固醇與受體結合→受體構型改變」(正確);D「受體活化後調控基因轉錄」(正確)。B「「類固醇「無法穿透細胞膜」、「必須作用於「膜受體」」」」「錯誤」—『類固醇「脂溶性、「可「直接穿透細胞膜」」→作用於「「胞內/核受體」」(非膜受體)』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。記憶:類固醇=穿膜→胞內受體→基因組作用。","options":{"A":"前驅為膽固醇,正確。","B":"稱類固醇無法穿膜作用膜受體—錯誤(可穿膜、胞內受體),為正解。","C":"結合受體改變構型,正確。","D":"活化後調控轉錄,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_111100-99":{"quick":"PI3K不是受體酪胺酸激酶(它是RTK下游的「胞內」激酶,非跨膜受體)。","detail":{"background":"受體酪胺酸激酶(RTK,跨膜、胞外結合配體、胞內酪胺酸激酶域):『「EGFR、FGFR、胰島素受體(INSR)」皆為「RTK」』。而『「磷脂肌醇3-激酶(PI3K)」是「RTK「下游」的「「胞內」訊號激酶(脂質激酶)」」,「「不是「跨膜受體RTK」」」』。故C(PI3K)為「非RTK者」,為正解。故C正確。記憶:RTK=膜受體(EGFR/FGFR/INSR);PI3K/Ras/Akt=胞內下游。","options":{"A":"EGFR為RTK。","B":"FGFR為RTK。","C":"PI3K為胞內下游激酶(非RTK受體)—正解。","D":"胰島素受體為RTK。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_112020-98":{"quick":"類固醇受體在「胞內」(非膜表面以磷酸化活化),故此敘述與類固醇作用無關/錯誤。","detail":{"background":"類固醇激素作用方式:A「激素與受體形成「複合體」」(正確);C「受體具「與特定DNA序列(HRE)結合」特性」(正確);D「受體結合激素後「活化或抑制基因轉錄」」(正確)。B「「受體「主要在「細胞膜表面」「以磷酸化方式活化」」」「與類固醇作用無關(錯誤)」—『類固醇受體在「「胞內(細胞質/核)」」、「以「配體結合」活化(非膜表面磷酸化)」』。故B為正解(無關/錯誤敘述)。故B正確(為錯誤者)。記憶:類固醇受體=胞內、配體活化、結合DNA。","options":{"A":"激素與受體形成複合體,相關。","B":"稱受體在膜表面磷酸化活化—錯誤(類固醇受體在胞內),為正解。","C":"受體結合特定DNA,相關。","D":"活化/抑制基因轉錄,相關。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-96":{"quick":"攜鈣素以「EF-hand」結構域結合鈣離子。","detail":{"background":"『「鈣結合蛋白(如「攜鈣素calmodulin、肌鈣蛋白C」)」「以「「EF-hand結構域(螺旋-環-螺旋,環中酸性殘基螯合Ca²⁺)」」「結合鈣離子」」』。故A(EF-hand domain)正確。比較:SH2(結合磷酸酪胺酸)、PTB(結合磷酸酪胺酸/NPxY)、PH(結合膜磷脂PIP)非鈣結合域。故A正確。記憶:鈣結合=EF-hand;磷酸酪胺酸結合=SH2/PTB;膜磷脂結合=PH。","options":{"A":"EF-hand domain(結合鈣)—正解。","B":"SH2結合磷酸酪胺酸。","C":"PTB結合磷酸酪胺酸/NPxY。","D":"PH結合膜磷脂。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113020-97":{"quick":"心房利鈉肽(ANF)用「cGMP」(非cAMP)作為第二信差。","detail":{"background":"第二信差:『「升糖素(glucagon)、多巴胺(dopamine)、血清素(serotonin,部分受體)」等「經「GPCR-Gs→腺苷酸環化酶→「cAMP」」傳訊』。而『「心房利鈉肽(ANF/ANP)」「經「膜鳥苷酸環化酶受體→「「cGMP」」」(非cAMP)」』。故A(ANF)為「不用cAMP者」,為正解。故A正確。記憶:cAMP(腎上腺素/升糖素/多巴胺);cGMP(ANP/NO);IP3-DAG(Gq)。","options":{"A":"ANF用cGMP(非cAMP)—正解。","B":"升糖素用cAMP。","C":"多巴胺(部分受體)用cAMP。","D":"血清素(部分受體)用cAMP。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-78":{"quick":"維生素K參與凝血是做「γ-羧化(供「鈣」結合)」,「與K⁺結合」之敘述錯誤。","detail":{"background":"脂溶性維生素:A「維生素D3作為類固醇激素、活化後調節鈣磷平衡」(正確);B「D3可由陽光照皮膚的7-去氫膽固醇生成」(正確);C「維生素E有抗氧化功能」(正確)。D「維生素K參與血液凝結及「K⁺結合」」「錯誤」—『「維生素K是「凝血因子(II、VII、IX、X)「γ-麩胺酸羧化」」的輔因子→「使其能「結合「「鈣(Ca²⁺)」」」(非K⁺)」促凝血;與「鉀離子(K⁺)」無關(名稱K來自德文Koagulation凝固)』。故D為正解(錯誤敘述)。故D正確(為錯誤者)。記憶:維生素K=γ-羧化→結合鈣(非鉀)。","options":{"A":"D3為類固醇激素調鈣磷,正確。","B":"D3由皮膚7-去氫膽固醇生成,正確。","C":"維生素E抗氧化,正確。","D":"稱與K⁺結合—錯誤(是γ-羧化供鈣結合),為正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-88":{"quick":"胰島素是「活化(經PDH磷酸酶「去磷酸化」活化PDH)」,故「胰島素抑制PDH」錯誤。","detail":{"background":"丙酮酸去氫酶(PDH)調控:A「NADH抑制PDH」(正確,產物回饋);B「acetyl-CoA抑制PDH」(正確);D「ATP「經「PDH激酶」「磷酸化」PDH「抑制」」(正確,能量足時關閉)」。C「胰島素「透過「PDH磷酸酶」「抑制」PDH」」「錯誤」—『「胰島素「活化「PDH磷酸酶」→「「去磷酸化」PDH→「「活化」PDH」」(餐後促糖氧化、生脂),「非抑制」』。故C為正解(錯誤敘述)。故C正確(為錯誤者)。記憶:磷酸化(PDH激酶,被ATP/NADH/acetyl-CoA促)→抑制;去磷酸化(PDH磷酸酶,胰島素/鈣促)→活化。","options":{"A":"NADH抑制PDH,正確。","B":"acetyl-CoA抑制PDH,正確。","C":"稱胰島素抑制PDH—錯誤(胰島素經磷酸酶活化PDH),為正解。","D":"ATP經PDH激酶抑制,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_113090-99":{"quick":"磷脂酶C水解PIP2產生「二醯甘油(DAG)」(及IP3)。","detail":{"background":"『「磷脂酶C(PLC)」「水解「PIP2(磷脂肌醇4,5-雙磷酸)」」→「產「「二醯甘油(diacylglycerol, DAG,留膜上活化PKC)」」+「肌醇三磷酸(IP3,釋放內質網鈣)」」』。故A(diacylglycerol)為其產物之一,正確。比較:磷脂醯肌醇(是上游、非產物)、cAMP(腺苷酸環化酶產物)、cGMP(鳥苷酸環化酶產物)非PLC產物。故A正確。記憶:PLC:PIP2→DAG + IP3。","options":{"A":"二醯甘油(DAG)—正解(PLC產物)。","B":"磷脂醯肌醇為上游(非產物)。","C":"cAMP為腺苷酸環化酶產物。","D":"cGMP為鳥苷酸環化酶產物。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-95":{"quick":"甲狀腺素(thyroid hormone)脂溶性、用胞內受體,不需細胞膜受體。","detail":{"background":"不需細胞膜受體的激素:『「「甲狀腺素(thyroid hormones, T3/T4)」「脂溶性、「穿膜進入細胞」→「結合「「核內甲狀腺素受體」」」調控基因」(與類固醇類似的基因組作用)』。故D(甲狀腺素)正確。比較:TSH、腎上腺素、FSH皆「水溶性(胜肽/兒茶酚胺)」→需「膜受體」傳訊。故D正確。記憶:脂溶性(類固醇/甲狀腺素/維生素D/A)=胞內受體;水溶性(胜肽/兒茶酚胺)=膜受體。","options":{"A":"TSH(胜肽)需膜受體。","B":"腎上腺素需膜受體(GPCR)。","C":"FSH(胜肽)需膜受體。","D":"甲狀腺素用胞內受體(不需膜受體)—正解。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114020-96":{"quick":"G蛋白偶聯受體(GPCR)最常以cAMP為第二信差。","detail":{"background":"『「「G蛋白偶聯受體(GPCR)」」「最常以「cAMP」為第二信差」:「配體→GPCR→Gs/Gi→「腺苷酸環化酶」→「cAMP」→PKA」(如腎上腺素、升糖素)』。故A(GPCR)正確。比較:受體酪胺酸激酶(用磷酸化級聯/Ras/PI3K)、核受體(直接調基因、無第二信差)、配體門控離子通道(直接流離子)非以cAMP為主。故A正確。記憶:cAMP=GPCR(Gs/Gi)經典第二信差。","options":{"A":"GPCR最常用cAMP—正解。","B":"RTK用磷酸化級聯(非cAMP)。","C":"核受體無第二信差。","D":"離子通道直接流離子。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-96":{"quick":"蛋白激酶A(PKA)活化需「cAMP結合其R(調節)次單元」。","detail":{"background":"『「蛋白激酶A(PKA)」靜止時為「R₂C₂(兩調節R + 兩催化C)」四聚體:「「cAMP「結合「R(調節)次單元」」」→「R構型改變、「釋放「C(催化)次單元」」」→「活化的C磷酸化下游(絲/蘇胺酸)」」』。故A(cAMP結合R次單元)正確。比較:cAMP結合「R」(非C);PKA不靠鈣結合(那是PKC/CaMK)。故A正確。記憶:cAMP→PKA的R次單元→放出C次單元(活化)。","options":{"A":"cAMP結合R次單元—正解。","B":"cAMP結合R(非C)次單元。","C":"PKA不靠鈣(非鈣結合R)。","D":"PKA不靠鈣結合C。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_114090-97":{"quick":"PI3K磷酸化細胞膜的「PIP2」(生成PIP3)以傳遞訊號。","detail":{"background":"『「磷脂肌醇3-激酶(PI3K)」「磷酸化「細胞膜的「PIP2(磷脂肌醇4,5-雙磷酸)」」的「3位」→「生成「PIP3(磷脂肌醇3,4,5-三磷酸)」」→「招募「Akt(PKB)」到膜活化」傳遞存活/生長訊號」』。故C(PIP2)為其磷酸化的膜分子,正確。比較:Ras(上游)、PKC、PKB(PKB是下游被招募者,非PI3K磷酸化的膜脂)。故C正確。記憶:PI3K:PIP2→PIP3→Akt。","options":{"A":"Ras為上游(非PI3K受質)。","B":"PKC非PI3K磷酸化的膜分子。","C":"PIP2(磷酸化成PIP3)—正解。","D":"PKB是下游被招募者(非受質膜脂)。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-97":{"quick":"細胞「同時偵測化學「與」物理訊號」,故「只偵測化學訊號」最不適當(錯誤)。","detail":{"background":"細胞訊號傳遞:A「多細胞生物藉交換多種訊號引發反應」(正確);C「訊號分子被「特異受體」偵測、引發反應」(正確);D「把訊號分子轉成化學變化=「訊息傳導(signal transduction)」」(正確)。B「「細胞「只」偵測「化學訊號」、「物理訊號無法啟動傳訊」」」「最不適當(錯誤)」—『細胞「「同時偵測「化學「與」物理訊號」」(如「光(視覺)、機械力(觸覺/聽覺/血流剪切)、溫度」皆可啟動傳訊)』。故B為正解(錯誤敘述)。故B正確(為錯誤者)。記憶:訊號可為化學(配體)或物理(光/力/溫)。","options":{"A":"交換多種訊號引發反應,正確。","B":"稱只偵測化學訊號—錯誤(亦偵測物理訊號),為正解。","C":"訊號被特異受體偵測,正確。","D":"訊號轉化學變化=訊息傳導,正確。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}},"med1_115020-98":{"quick":"蛋白激酶A(PKA)磷酸化受質的「絲胺酸/蘇胺酸(此題蘇胺酸)」。","detail":{"background":"『「蛋白激酶A(PKA)」是「「絲胺酸/蘇胺酸激酶(Ser/Thr kinase)」」→「磷酸化受質蛋白的「「絲胺酸(Ser)或「蘇胺酸(threonine)」」的羥基」」』。題選項中屬其受質殘基者為B(蘇胺酸)。故B正確。比較:組胺酸(細菌雙組分系統)、酪胺酸(酪胺酸激酶如RTK)、麩胺酸(非磷酸化位)非PKA典型受質殘基。故B正確。記憶:PKA/PKC=Ser/Thr激酶;RTK=Tyr激酶。","options":{"A":"組胺酸非PKA受質(屬細菌雙組分)。","B":"蘇胺酸(Ser/Thr激酶)—正解。","C":"酪胺酸為酪胺酸激酶受質。","D":"麩胺酸非磷酸化位。"},"sources":["Lehninger《生物化學原理》","Harper《Illustrated Biochemistry》","Lippincott《Biochemistry》"]}}},TO=["T1胺基酸與蛋白質結構", "T2酵素動力學與催化", "T3輔酶與維生素", "T4醣類代謝(醣解糖質新生肝醣)", "T5檸檬酸循環與氧化磷酸化", "T6脂質與膜生化", "T7胺基酸與氮代謝", "T8核苷酸代謝", "T9DNA複製與修復", "T10轉錄與RNA", "T11轉譯與蛋白質合成", "T12基因調控與分子生物技術", "T13訊息傳遞與激素生化"],LEC={"T1胺基酸與蛋白質結構":{"title":"胺基酸與蛋白質結構","html":"<p><b>胺基酸</b>:皆含α-胺基、α-羧基、側鏈(R)。中性pH帶正電=鹼性(<b>Arg/Lys/His</b>);帶負電=酸性(Asp/Glu)。<b>等電點(pI)</b>=淨電荷為零(以兩性離子存在);芳香族(Trp>Tyr>Phe)吸<b>280 nm</b>(估蛋白濃度)。</p><p><b>四級結構層次</b>:一級(序列)→二級(α螺旋<b>右旋3.4Å無關</b>、β摺板;靠主鏈氫鍵)→三級(整體摺疊;唯一共價鍵=<b>雙硫鍵</b>由Cys、可被還原劑斷)→四級(多次單元;如Hb的R/T態)。Gly/Pro是β-turn常客、螺旋/摺板破壞者。</p><p><b>血紅素</b>:2,3-BPG穩定<b>T態</b>(低氧親和、右移卸氧);成骨不全=膠原蛋白突變(Gly被取代)。固有無序蛋白(IDP)缺固定三維結構但有功能。</p><p><b>分析技術</b>:SDS-PAGE(分子量)、等電聚焦(pI)、凝膠過濾(分子大小,大的先洗出)、離子交換(電荷)、Western/質譜/N端定序(身分鑑定)。</p>"},"T2酵素動力學與催化":{"title":"酵素動力學與催化","html":"<p><b>Michaelis-Menten</b>:v=Vmax[S]/(Km+[S])。[S]<<Km→一級、速率常數=<b>kcat/Km(專一性常數)</b>;[S]>>Km→<b>零級(Vmax)</b>;v=0.5Vmax時[S]=Km。Km=半飽和受質濃度(反映親和力倒數)。</p><p><b>Lineweaver-Burk雙倒數</b>:Y截距=1/Vmax、<b>X截距=−1/Km</b>。競爭性抑制:Vmax不變、Km↑(如statin、MTX);非競爭性:Vmax↓Km不變;uncompetitive:兩者皆↓。</p><p><b>本質</b>:酵素降低活化能、加速<b>速率常數</b>,不改變平衡常數/ΔG/產物;酵素總量反應前後不變。</p><p><b>EC六大類</b>:氧化還原酶、轉移酶(激酶kinase屬之,如己糖激酶)、水解酶、裂解酶、異構酶、連接酶。dehydrogenase是氧化還原酶「次類」非六大類。轉胺酶(GOT/GPT)需PLP、與活性中心Lys形成Schiff鹼。</p>"},"T3輔酶與維生素":{"title":"輔酶與維生素","html":"<p><b>水溶性B群</b>:B1(TPP,去羧/PDH/轉酮,缺→腳氣/Wernicke、乳酸中毒)、B2(FAD/FMN)、B3菸鹼酸(NAD⁺/NADP⁺,缺→<b>糙皮病pellagra 3D</b>)、B5泛酸(CoA)、B6(PLP,轉胺/去羧)、B7生物素(<b>羧化</b>;生蛋白avidin結合致缺乏)、B9葉酸與B12鈷胺(單碳/甲基,缺→巨球性貧血;B12含<b>鈷</b>、僅微生物合成、缺→惡性貧血)。</p><p><b>脂溶性ADEK</b>:需膽汁吸收。A(視覺/視黃酸核受體)、D(7-去氫膽固醇→陽光→D3→肝25→腎1α→calcitriol與核受體調鈣磷)、E(tocopherol抗氧化)、K(γ-羧化凝血因子→結合鈣)。</p><p><b>PDH五輔酶</b>:TPP、硫辛酸、CoA、FAD、NAD⁺(不含PLP);acetyl-CoA以高能<b>硫酯鍵</b>連結。</p>"},"T4醣類代謝(醣解糖質新生肝醣)":{"title":"醣類代謝(醣解糖質新生肝醣)","html":"<p><b>醣解</b>(細胞質):葡萄糖→2丙酮酸,淨<b>2 ATP+2 NADH</b>。不可逆三步=己糖激酶、PFK-1、丙酮酸激酶。唯一氧化步=<b>GAPDH(產NADH)</b>。葡萄糖入細胞即磷酸化(G6P)留住。無氧時LDH把丙酮酸→乳酸(再生NAD⁺)。</p><p><b>糖質新生</b>(肝腎):繞四步(丙酮酸羧化酶→PEPCK→F-1,6-BPase→G6Pase);肌肉缺<b>G6Pase</b>不能輸出葡萄糖。受質=乳酸/生糖胺基酸/甘油;<b>乙醇/脂肪酸acetyl-CoA不能淨成糖</b>。Cori循環(肌肉乳酸→肝→糖)。</p><p><b>肝醣</b>:合成酶用UDP-glc、α1→4延長非還原端、<b>去磷酸化活化</b>(胰島素經Akt抑GSK3);磷酸化酶降解產<b>G1P</b>、磷酸化活化。</p><p><b>結構糖</b>:麥芽糖α1→4、乳糖β1→4、纖維素β1→4(結構);玻尿酸=GlcUA+GlcNAc;ABO血型差在末端單醣。PPP產NADPH與核糖。</p>"},"T5檸檬酸循環與氧化磷酸化":{"title":"檸檬酸循環與氧化磷酸化","html":"<p><b>TCA</b>(粒線體基質):每acetyl-CoA產<b>2 CO₂、3 NADH、1 FADH₂、1 GTP</b>。不可逆=檸檬酸合成酶、異檸檬酸DH、α-KG DH。烏頭酸酶=脫水再水合;琥珀酸DH=複合體II(產FADH₂、嵌內膜)。丙酮酸→acetyl-CoA經<b>PDH</b>(入口)。</p><p><b>電子傳遞鏈</b>(內膜):複合體I(NADH)、II(琥珀酸/FADH₂,<b>不泵質子</b>)→CoQ→III→cyt c→IV(細胞色素c氧化酶→還原O₂)。泵質子=<b>I(4)、III(4)、IV(2)</b>,皆基質→膜間隙。</p><p><b>氧化磷酸化</b>:質子梯度驅動ATP synthase(基質側合成ATP)。NADH≈2.5 ATP、FADH₂≈1.5(複合體II不泵)。基質階層磷酸化(糖解/succinyl-CoA)兩處皆可。棕色脂肪UCP1(thermogenin)讓H⁺漏回產熱。</p>"},"T6脂質與膜生化":{"title":"脂質與膜生化","html":"<p><b>膜</b>:磷脂(甘油磷脂/鞘磷脂)+膽固醇(動物;植物用植物固醇、細菌無)+醣脂;游離脂肪酸非膜脂。心磷脂=粒線體內膜標誌。嵌入型蛋白需<b>界面活性劑</b>萃取、由translocon嵌入;周邊蛋白靠脂錨(GPI=胞外面;palmitoyl/farnesyl/myristoyl=胞質面)。</p><p><b>脂肪酸</b>:合成(細胞質,需<b>14 NADPH</b>/棕櫚酸、ACC速率限制[citrate活化、palmitoyl-CoA/磷酸化抑制]、malonyl-CoA抑CPT-1);β氧化(粒線體,需肉鹼穿梭CPT;CPT缺→長鏈脂肪酸堆積);奇數碳→succinyl-CoA;ω氧化在<b>ER</b>。</p><p><b>膽固醇</b>:acetyl-CoA→HMG-CoA→(<b>HMG-CoA還原酶,statin標的</b>)→甲羥戊酸→鯊烯→膽固醇;為膽汁酸(兩性、促ADEK吸收)、類固醇、維生素D前驅;不能氧化供能。酮體(肝粒線體HMG-CoA synthase生成,肝不用[缺SCOT])。家族性高膽固醇=LDLR突變。脂蛋白:乳糜微粒(腸、運飲食TG)。鞘脂儲積=Tay-Sachs(己醣胺酶A)、Gaucher(葡萄糖腦苷脂)。</p>"},"T7胺基酸與氮代謝":{"title":"胺基酸與氮代謝","html":"<p><b>轉胺</b>(PLP):α-KG↔Glu、丙酮酸↔Ala、OAA↔Asp。Glu為胺基樞紐。<b>尿素循環</b>(肝,跨粒線體與細胞質):Glu去氫釋NH₄⁺(粒線體);產尿素+<b>fumarate</b>(非OAA);天門冬胺酸-精胺琥珀酸支路連結TCA。</p><p><b>氨運輸</b>:肌肉→<b>丙胺酸</b>(葡萄糖-丙胺酸循環);全身→<b>麩醯胺酸</b>→肝/腎。</p><p><b>胺基酸衍生物</b>:酪胺酸→兒茶酚胺/黑色素/甲狀腺素(缺酪胺酸酶=白化症);色胺酸→血清素/菸鹼酸;Glu→GABA(B6);Arg→NO(NOS,產瓜胺酸)/肌酸(+Gly+Met);Gly+succinyl-CoA→血基質(ALA合成酶,B6;首尾在粒線體);His→組織胺。生酮純=Leu/Lys。同半胱胺酸(來自Met)↑為心血管危險因子→補葉酸/B6/B12降之。血基質分解:heme oxygenase→biliverdin+CO。</p>"},"T8核苷酸代謝":{"title":"核苷酸代謝","html":"<p><b>嘌呤</b>:de novo(從PRPP起、Gly/Asp/Gln/CO₂/甲醯-THF組裝環,耗能);salvage(APRT回收adenine、HGPRT回收hypoxanthine/guanine);<b>黃嘌呤無回收酶</b>。分解→尿酸(黃嘌呤氧化酶)。<b>痛風</b>=HGPRT缺乏(Lesch-Nyhan)或PRPP合成酶過度活化。PRPP為de novo與salvage共用。</p><p><b>嘧啶</b>:從胺甲醯磷酸(Gln供氮)+<b>天門冬胺酸</b>組裝→乳清酸→UMP;<b>二氫乳清酸DH在粒線體(依賴呼吸鏈)</b>。CTP由UTP胺化。分解→β-丙胺酸(胞/尿嘧啶)、β-胺基異丁酸(胸腺嘧啶)。</p><p><b>核苷酸結構</b>:磷酸接5′碳;<b>核糖核苷酸還原酶(RNR)</b>把核糖→去氧核糖(2′-OH→H)。DNA=2′去氧、用T(=5-甲基尿嘧啶);ATP高能=磷酸酐鍵。5-FU→F-dUMP抑胸苷酸合成酶。CoA含腺嘌呤核苷酸。</p>"},"T9DNA複製與修復":{"title":"DNA複製與修復","html":"<p><b>結構</b>:B-DNA右旋、3.4Å/bp、反平行、磷酸在外。Chargaff:A=T、G=C;GC高→Tm高(3氫鍵);<b>Tm=50%變性</b>(增色效應/低色度測之);變性只斷氫鍵(非共價鍵)。端粒富G→四股(G-quadruplex)。</p><p><b>複製</b>:半保留、<b>5′→3′</b>、需RNA引子(primase,提供3′-OH)。原核1個ori、真核多個(S期);前進股連續、延遲股<b>岡崎片段</b>。pol III主複製;pol I(5′→3′外切去引子+填補);校對=<b>3′→5′外切</b>;真核pol α(引子)/δ/ε(核)、pol γ(粒線體)、PCNA滑動夾(processivity)。端粒酶(真核,反轉錄酶)。拓樸異構酶改<b>連接數</b>(調超螺旋)。</p><p><b>修復</b>:BER(<b>DNA醣苷酶</b>先切受損鹼基,如尿嘧啶);NER(原核UvrABC,修嵌入型大損傷/二聚體);錯配修復(MutSLH+helicase II+pol III+ligase,靠<b>Dam甲基化GATC腺嘌呤</b>辨新舊股);直接修復(光裂合酶用FADH⁻);同源重組(RecBCD/RecA/RuvABC;真核MRN/BRCA/RAD51,非RAG1/2)。HIV反轉錄酶無校對→高突變。</p>"},"T10轉錄與RNA":{"title":"轉錄與RNA","html":"<p><b>真核RNA聚合酶</b>:pol I(18S/5.8S/28S rRNA)、<b>pol II(mRNA,對α-amanitin最敏感)</b>、pol III(tRNA/5S rRNA)。原核全酶=核心+<b>σ因子(起始辨啟動子,延伸時釋出)</b>。啟動子=RNA聚合酶首先結合處(TATA box/TBP);操作子↔抑制子(別構蛋白)。</p><p><b>mRNA加工</b>(核內共轉錄):5′<b>帽</b>(被eIF4E辨識、抗外切)、3′<b>poly-A</b>(訊號AAUAAA)、剪接(snRNP剪接體;group I內含子需鳥苷自我剪接)。人類僅~2%編碼蛋白、半數轉座子。</p><p><b>調控</b>:lac operon(乳糖+葡萄糖少→repressor脫離+CAP-cAMP活化→最大表現);trp operon(色胺酸高→repressor+弱化attenuation關閉;前導肽Trp密碼子感測);CpG甲基化/HDAC去乙醯→沉默、H3K4me→活化;染色質隨週期動態變化。反轉錄(RNA→DNA);provirus兩端LTR;siRNA 21–23 nt。</p>"},"T11轉譯與蛋白質合成":{"title":"轉譯與蛋白質合成","html":"<p><b>tRNA</b>:3′端共同<b>-CCA-OH</b>接胺基酸;胺醯-tRNA合成酶用ATP活化、對胺基酸<b>與</b>tRNA皆專一(轉譯保真);擺動=反密碼子5′位配密碼子3′位(多種)。</p><p><b>起始</b>:原核SD序列對30S(16S rRNA);起始tRNA入<b>P位</b>(原核fMet、真核Met,由IF2/eIF2攜帶);真核小次單元先結合mRNA、大次單元後加入。</p><p><b>延伸</b>:A位進(EF-Tu·GTP)→肽鍵(<b>肽基轉移酶=核酶/23S rRNA,不額外耗能</b>)→移位(EF-G·GTP)→E位出。每肽鍵約耗4高能磷酸(GTP→GDP+Pi);胺基酸活化才用ATP→AMP+PPi。釋放因子(RF)擬態tRNA讀終止密碼子。框移在延伸期。</p><p><b>降解</b>:泛素化(K48多聚泛素)→<b>蛋白酶體</b>(E1活化/E2攜帶/E3認受質;受質Lys)。抗生素抑轉譯(四環/紅黴/鏈黴);rifampicin抑轉錄(非轉譯)。磷酸化=Ser/Thr/Tyr(Met不能)。</p>"},"T12基因調控與分子生物技術":{"title":"基因調控與分子生物技術","html":"<p><b>細胞週期</b>:cyclin(調節)+CDK(激酶);CDK2磷酸化pRb→放E2F→進S期;p53→p21(CDK抑制子)→停滯;APC/C泛素化降解cyclin;終末分化細胞停G0。鐮形血球=β-globin點突變(Glu→Val)。</p><p><b>DNA結合基序</b>:原核helix-turn-helix;真核zinc finger/leucine zipper(二聚化)/homeodomain。</p><p><b>技術</b>:PCR(模板+引子+耐熱Taq+dNTP,不需反轉錄酶);<b>Sanger定序=ddNTP(2′,3′-雙脫氧)鏈終止</b>;限制酶(辨迴文、切黏端)+連接酶=重組DNA;質體(自主複製、抗藥篩選);大片段=YAC>BAC;基因組庫(不需RT)vs cDNA庫(需RT);His₆-tag↔Ni²⁺管柱;Southern(DNA/RFLP)、Northern(RNA)、Western(蛋白);DNA footprinting(蛋白-DNA結合位);定點突變(突變引子+pol);基因治療用病毒載體(腺病毒);蛋白互動=co-IP/TAP/Y2H(非IHC)。</p>"},"T13訊息傳遞與激素生化":{"title":"訊息傳遞與激素生化","html":"<p><b>脂溶性激素</b>(類固醇/甲狀腺素/維生素D/A):穿膜→<b>胞內/核受體</b>→結合HRE調控轉錄;血中需攜帶蛋白;HSP使類固醇受體保持失活(配體結合後解離)。糖皮質激素=胞內受體。</p><p><b>第二信差</b>:cAMP(<b>GPCR</b>-Gs/Gi→腺苷酸環化酶→PKA[cAMP結合R次單元放C次單元、磷酸化Ser/Thr];霍亂毒素鎖Gsα活化、百日咳毒素使Giα失活);cGMP(ANP→膜鳥苷酸環化酶、NO→可溶型;Viagra抑PDE5);IP3(釋鈣<b>升</b>)+DAG(活化PKC)由PLC(Gq)水解PIP2而來;鈣-calmodulin(EF-hand)。</p><p><b>受體酪胺酸激酶(RTK)</b>:EGF/胰島素→受體二聚化+自磷酸化→Ras(GTP=活化,癌性Ras抗GAP鎖活化)/MAPK、PI3K(PIP2→PIP3→Akt/PKB)。細胞激素受體→JAK-STAT(EPO/介白素)。NO來自精胺酸;TNF→粒線體放cyt c→凋亡。細胞偵測化學<b>與</b>物理訊號。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^T(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='med1_biochem_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
