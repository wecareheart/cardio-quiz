"E":"Anti-IL-6 receptor monoclonal antibody - SLE"},"id":"109-95","roc_year":109,"source":"109合併PDF","topic_num":12,"topic":"免疫治療、過敏免疫與風濕藥理","answer_status":"normal","q_num":95,"src":"109合併卷"},{"num":124,"answer":"A","stem":"在癌症治療中使用PD-1/PD-L1 checkpoint inhibitors時, 最常引起的自體免疫併發症為下列何者?","options":{"A":"Sjogren's syndrome。","B":"SLE。","C":"RA。","D":"ANCA-associated vasculitis。","E":"Polymyositis/dermatomyositis。"},"id":"112-124","roc_year":112,"source":"112合併PDF","topic_num":12,"topic":"免疫治療、過敏免疫與風濕藥理","answer_status":"normal","q_num":124,"src":"112合併卷"},{"num":157,"answer":"D","stem":"關於藥物引起之蕁蔴疹(drug-induced urticaria),最「不」常見由以下何類型藥物所引發?","options":{"A":"鴉片類藥物(Opiates)。","B":"非類固醇類消炎藥(Non-steroidal Anti-inflammatory Drugs)。","C":"血管張力素轉化酶抑制劑(Angiotensin converting enzyme inhibitors)。","D":"乙二型交感神經興奮劑(β2 agonists)。","E":"顯影劑(Radiographic dyes)。"},"id":"112-157","roc_year":112,"source":"112合併PDF","topic_num":12,"topic":"免疫治療、過敏免疫與風濕藥理","answer_status":"normal","q_num":157,"src":"112合併卷"},{"num":117,"answer":"D","stem":"嚴重急性呼吸道症候群SARS-CoV-2感染後會產生多種併發症,請問下列何種疾病較少被活化?","options":{"A":"紅斑性狼瘡(SLE)。","B":"類風濕性關節炎(RA)。","C":"抗磷脂症候群(APS)。","D":"肝癌(Hepatoma)。","E":"第一型糖尿病(T1DM)。"},"id":"113-117","roc_year":113,"source":"113合併PDF","topic_num":12,"topic":"免疫治療、過敏免疫與風濕藥理","answer_status":"normal","q_num":117,"src":"113合併卷"},{"num":113,"answer":"C","stem":"一位60歲男性,體重72公斤,罹患黑色素惡性腫瘤,接受免疫療法後出現肝炎。治療上給予高劑量類固 醇: methylprednisolone 160 mg / 日,使用2天後改為80 mg/日持續4週。關於類固醇的使用,下列何者 正確?","options":{"A":"因疫情控制良好,可立即停止使用類固醇。","B":"類固醇副作用多,因此不適合本病人使用。","C":"類固醇應由高劑量逐漸減量至低劑量,之後再停藥。","D":"當劑量減至20 mg/日時可直接停藥。","E":"當劑量減至10 mg/日時可直接停藥。"},"id":"114-113","roc_year":114,"source":"114合併PDF","topic_num":12,"topic":"免疫治療、過敏免疫與風濕藥理","answer_status":"normal","q_num":113,"src":"114合併卷"},{"num":120,"answer":"A","stem":"風濕性疾病常好發於女性,懷孕期間使用藥物需特別謹慎。下列哪一項敘述是正確的?","options":{"A":"羥氯奎寧(Hydroxychloroquine, HCQ)被美國FDA歸類為對胎兒無危險的藥物。","B":"Methotrexate(MTX)對胎兒無害。","C":"Mycophenolate mofetil 對胎兒無害。","D":"Cyclophosphamide 對胎兒無害。","E":"抗腫瘤壞死因子抗體(anti-TNF-α)對胎兒有危險。"},"id":"114-120","roc_year":114,"source":"114合併PDF","topic_num":12,"topic":"免疫治療、過敏免疫與風濕藥理","answer_status":"normal","q_num":120,"src":"114合併卷"}],E={"102-綜-9":{"quick":"SLE 惡化最重要的「環境」誘因是紫外線（UV）照射——光敏感是 SLE 經典表現，UV 誘發角質細胞凋亡與自體抗原暴露。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 紫外線（尤其 UVB）會誘發表皮角質細胞凋亡、暴露核抗原並促進 type I IFN 釋放，是臨床上最確切、最常導致皮膚與全身狼瘡惡化的環境因子，因此所有 SLE 病人都應嚴格防曬。其他可能誘因（雌激素、某些病毒如 EBV、藥物）證據較弱或屬個別情境。","options":{"A":"正確。紫外線照射是公認最重要的環境誘發因子，會誘發角質細胞凋亡、核抗原暴露與 IFN 活化，故 SLE 病人須防曬。","B":"寒冷潮濕天氣與關節不適主觀感受有關，但非 SLE 免疫惡化的確切誘因。","C":"vinyl chloride（氯乙烯）暴露與「硬皮症樣」變化／肢端硬化有關，而非 SLE。","D":"含雌激素避孕藥理論上可能影響病情，但屬個別考量；證據強度遠不及紫外線，且穩定期 SLE 仍可在評估後使用。","E":"病毒感染（如 EBV）被認為與 SLE 發病機轉有關，但作為「惡化環境因子」的證據遠不如紫外線確切。"},"sources":["Harrison 21e, Ch. Systemic Lupus Erythematosus","Kelley & Firestein, Rheumatology 11e, SLE: Clinical Features"]}},"109-200":{"quick":"圖示為圓盤狀紅斑性狼瘡（discoid lupus erythematosus）——慢性皮膚狼瘡，表現為界限清楚、附著性鱗屑、毛囊角栓、會留疤與色素變化的盤狀斑塊。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 圓盤狀紅斑性狼瘡（DLE）屬慢性皮膚型狼瘡，好發於臉、頭皮與耳朵等日曬部位，病灶為界限分明的紅色盤狀斑塊，伴隨附著性鱗屑、毛囊角栓、中央萎縮、瘢痕性禿髮與色素改變（中央色素脫失、邊緣色素沉著）。多數 DLE 為侷限皮膚病灶，僅少數進展為全身性 SLE；治療以嚴格防曬、外用／病灶內類固醇與 hydroxychloroquine 為主。","options":{"A":"正確。盤狀斑塊伴附著性鱗屑、毛囊角栓、瘢痕與色素變化為 DLE 典型表現。","B":"皮肌炎以 Gottron 丘疹、heliotrope 眼瞼紫紅斑為特徵，分布與型態不同。","C":"深部真菌感染表現多為結節、潰瘍或膿瘍，非對稱性盤狀附鱗屑斑塊。","D":"硬皮症為皮膚硬化、雷諾現象、指端硬化，無此盤狀鱗屑病灶。","E":"萎縮性疤痕可為 DLE 的後遺結果，但本身不是診斷；題目問「最可能診斷」應為 DLE。"},"sources":["Harrison 21e, Ch. SLE & Cutaneous Lupus","Kelley & Firestein 11e, Cutaneous Lupus"]}},"110-123":{"quick":"年輕女性多關節炎＋口乾＋血小板低下，ANA(+)、anti-cardiolipin(+)、RF 雖高但 X 光無侵蝕→最符合 SLE（多系統＋抗磷脂抗體＋血液侵犯）。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 本題 21 歲女性多關節炎（NSAID 有效、X 光無骨侵蝕，與 RA 的侵蝕性關節炎不同）、合併口乾、血小板低下（88,000）、ANA 1:160 speckled、anti-cardiolipin 陽性，符合 SLE 的多系統表現與抗磷脂抗體領域；RF 雖偏高但非特異（SLE、Sjögren、感染皆可陽性），而 anti-dsDNA 陰性不能排除 SLE。","options":{"A":"RA 應有侵蝕性關節炎（X 光骨侵蝕）與 ACPA 陽性；本例 X 光無侵蝕、且有血小板低下與抗磷脂抗體，不符。","B":"正確。多系統（關節、血液、抗磷脂抗體）＋ANA 陽性，最符合 SLE，且非侵蝕性關節炎正是狼瘡關節炎（Jaccoud 型）特徵。","C":"僵直性脊椎炎為中軸發炎性背痛、HLA-B27 相關，與此周邊多關節＋血球異常不符。","D":"乾燥症雖有口乾，但無法解釋血小板低下、anti-cardiolipin 陽性；且本例為 SLE 較完整的多系統表現（Sjögren 可與 SLE 重疊，但首選診斷為 SLE）。","E":"自體免疫肝炎以肝功能異常為主、anti-smooth muscle/LKM 抗體，與此關節炎血球異常表現不符。"},"sources":["2019 EULAR/ACR SLE Classification Criteria","Harrison 21e, Ch. SLE"]}},"110-127":{"quick":"2019 SLE 分類標準計分項目：discoid rash（皮膚黏膜）、anti-β2GPI（抗磷脂抗體領域）、pleural effusion（漿膜炎）皆屬標準項目→答 (1)+(3)+(4)。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 2019 EULAR/ACR 標準的領域包括：皮膚黏膜（含 discoid/acute cutaneous lupus）、漿膜（胸膜/心包積液）、抗磷脂抗體（anticardiolipin、anti-β2GPI、lupus anticoagulant）等。題中『erosive arthritis（侵蝕性關節炎）』反而是 RA 而非 SLE 的特徵（SLE 為非侵蝕性）；急性葡萄膜炎屬脊椎關節病；白血球『增多』非 SLE（SLE 多為白血球或淋巴球減少）；雙極性情感障礙與急性腎小管酸中毒皆非分類項目。故正解為 discoid rash＋anti-β2GPI＋pleural effusion。","options":{"A":"(2)erosive arthritis 為 RA 特徵、(5)acute uveitis 屬脊椎關節病，皆非 SLE 分類項目。","B":"(5)uveitis、(7)bipolar disorder 非 SLE 分類項目（SLE 神經精神項是癲癇/精神病/急性混亂，非雙極症）。","C":"(6)leukocytosis（白血球增多）非 SLE（SLE 為白血球/淋巴球減少）、(8)RTA 非分類項目。","D":"(5)uveitis、(6)leukocytosis 皆非 SLE 分類項目。","E":"正確。discoid rash、anti-β2-glycoprotein I antibody、pleural effusion 三者皆為 2019 SLE 分類標準的計分項目。"},"sources":["2019 EULAR/ACR SLE Classification Criteria (Aringer M, et al. ARD 2019)","Harrison 21e, Ch. SLE"]}},"111-115":{"quick":"年輕女性發燒＋多關節炎＋口腔潰瘍，依 2019 EULAR/ACR 標準，抗磷脂抗體（anti-phospholipid）屬免疫領域計分項，最有助於 SLE 診斷分類。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 2019 EULAR/ACR 標準的『免疫學領域』分三組：抗磷脂抗體（anticardiolipin/anti-β2GPI/lupus anticoagulant）、補體（低 C3/C4）、SLE 高特異抗體（anti-dsDNA、anti-Sm）。選項中只有抗磷脂抗體屬於分類標準計分項；anti-RNP（混合結締組織病）、anti-SSA/SSB（Sjögren）、anti-histone（藥物誘發狼瘡）皆非 2019 標準的計分抗體。","options":{"A":"anti-RNP 與混合性結締組織病（MCTD）相關，非 2019 SLE 分類標準計分項。","B":"正確。抗磷脂抗體屬 2019 SLE 分類標準的免疫學領域計分項，對此情境最有助於診斷分類。","C":"anti-SSA/Ro 為 Sjögren 與新生兒狼瘡相關抗體，非 SLE 分類計分抗體。","D":"anti-SSB/La 同屬 Sjögren 相關抗體，非 SLE 分類計分項。","E":"anti-histone 與藥物誘發狼瘡相關，非 2019 標準計分抗體。"},"sources":["2019 EULAR/ACR SLE Classification Criteria","Harrison 21e, Ch. SLE"]}},"111-127":{"quick":"SLE 診斷依臨床＋免疫血清；正解為 discoid skin lesion（皮膚）＋low complement（補體）＋hemolytic anemia（血液）→ (3)+(7)+(10)。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 SLE 的臨床／免疫項目包括：皮膚黏膜（acute/discoid cutaneous lupus、非瘢痕性禿髮、口腔潰瘍）、漿膜炎、血液（溶血性貧血、白血球/淋巴球減少、血小板低下）、補體下降、特異抗體。題中 discoid skin lesion、low serum complement、hemolytic anemia 皆為標準項目；而 myalgia（肌痛）、schizophrenia（思覺失調本身）、anti-RNP 並非 SLE 分類項；scarring alopecia（瘢痕性禿髮）也非（SLE 為非瘢痕性禿髮）。","options":{"A":"(2)scarring alopecia 為瘢痕性，SLE 計分的是『非瘢痕性』禿髮，故此組不符。","B":"(11)anti-RNP 非 SLE 分類抗體（屬 MCTD）。","C":"(5)myalgia、(9)anti-β2GPI 雖抗磷脂屬項，但 myalgia 非分類項，組合不如 D 完整正確。","D":"正確。discoid skin lesion(3)＋low complement(7)＋hemolytic anemia(10) 皆為 SLE 標準分類項目。","E":"(11)anti-RNP 非 SLE 分類抗體，組合不正確。"},"sources":["2019 EULAR/ACR SLE Classification Criteria","Harrison 21e, Ch. SLE"]}},"112-116":{"quick":"SLE 致病關鍵細胞激素為第一型干擾素（type I IFN）；其受體抗體 anifrolumab（anti-IFNAR1）已獲 FDA 核准治療 SLE。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 第一型干擾素（IFN-α/β）訊號在 SLE 大量上升（『IFN signature』），與疾病活動度相關，是核心致病機轉。針對此路徑的 anifrolumab（抗第一型干擾素受體 IFNAR1 單株抗體）已於 2021 年獲 FDA 核准用於中重度 SLE，為近年重要的標靶治療進展；另 belimumab（抗 BAFF/BLyS）亦為核准生物製劑。TNF-α、IL-1、IFN-II（IFN-γ）、IFN-III 非 SLE 核准標的。","options":{"A":"TNF-α 是 RA、AS 等的治療標靶，且抗 TNF 反而可能誘發藥物性狼瘡，非 SLE 治療標的。","B":"IL-1 抑制劑用於自體發炎疾病（如痛風、Still 病），非 SLE。","C":"正確。第一型干擾素在 SLE 大量增加並參與致病，anifrolumab（抗 IFNAR1）已獲核准治療 SLE。","D":"第二型干擾素（IFN-γ）非 SLE 已核准之治療標的。","E":"第三型干擾素（IFN-λ）與 SLE 治療無關。"},"sources":["Harrison 21e, Ch. SLE","anifrolumab FDA approval 2021 (TULIP trials)"]}},"112-128":{"quick":"SLE 最具診斷價值的自體抗體組合：ANA＋anti-dsDNA＋anti-Sm＋anti-C1q→ (1)+(5)+(9)+(11)；其中 anti-dsDNA、anti-Sm 高特異。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 ANA 為敏感的篩檢（>95% 陽性）但非特異；anti-dsDNA（與疾病活動度、狼瘡腎炎相關）與 anti-Sm 為 SLE 高特異抗體；anti-C1q 與狼瘡腎炎活動相關。anti-SSA/SSB（Sjögren）、anti-histone（藥物性狼瘡）、anti-platelet/anti-RBC（與血球低下機轉相關但非診斷特異）、anti-RNP（MCTD）對『診斷 SLE』特異性較低。","options":{"A":"含 anti-histone(7) 與 anti-phospholipid(8)，前者偏藥物性狼瘡、後者非 SLE 診斷特異抗體。","B":"anti-SSB/La(4)、anti-RBC(10) 對診斷 SLE 特異性低。","C":"anti-SSA/SSB(3,4)偏 Sjögren、anti-RNP(12)偏 MCTD，特異性不足。","D":"含 anti-histone(7)（藥物性狼瘡），組合不如 E 特異。","E":"正確。ANA＋anti-dsDNA＋anti-Sm＋anti-C1q 對診斷 SLE 最有幫助（dsDNA、Sm 高特異，C1q 與腎炎活動相關）。"},"sources":["Harrison 21e, Ch. SLE — Autoantibodies","Kelley & Firestein 11e, SLE Serology"]}},"114-117":{"quick":"第一型干擾素濃度與 SLE 疾病活動度呈「正相關」；anifrolumab（抗 IFNAR1）已獲 FDA 核准，SLE 病人血中與末梢血球皆可測得 IFN signature。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 關於 type I IFN 的正確敘述：①血中濃度與疾病活動度正相關；②SLE 病人末梢血液可偵測到 IFN 相關基因表現（IFN signature）；③anifrolumab（抗 IFNAR1）已獲 FDA 核准（故『尚未核准』為錯）；④高 IFN 與狼瘡腎炎等器官侵犯相關（故『不呈正相關』為錯）。","options":{"A":"錯誤。anifrolumab（抗 IFNAR1）已於 2021 獲 FDA 核准治療 SLE。","B":"正確。血中第一型干擾素濃度與 SLE 疾病活動度呈正相關。","C":"錯誤。SLE 病人血中可測得升高的第一型干擾素活性。","D":"錯誤。SLE 病人末梢血球可測得 type I IFN 誘發之基因表現（IFN signature），為重要生物標記。","E":"錯誤。高 IFN 活性與狼瘡腎炎等器官侵犯多呈正相關。"},"sources":["Harrison 21e, Ch. SLE","anifrolumab TULIP-1/2 trials; FDA approval 2021"]}},"114-124":{"quick":"診斷 SLE 最有幫助（高特異）的抗體是 anti-dsDNA——與 SLE 高度特異、且與疾病活動度及狼瘡腎炎相關。","detail":{"background":"全身性紅斑性狼瘡（SLE）是典型「全身性自體免疫疾病」，以多系統侵犯與多種自體抗體（尤其 ANA、anti-dsDNA、anti-Sm）為特徵。病生理核心是『先天免疫過度活化 → 第一型干擾素（type I IFN）訊號上升 → B 細胞失調產生致病性自體抗體 → 免疫複合體沉積與補體消耗造成組織傷害』。流病上好發於育齡女性（女:男約 9:1），亞洲族群盛行率與腎炎比例偏高。診斷上現多採 2019 EULAR/ACR 分類標準：以『ANA≥1:80』為進入門檻（entry criterion），再就 7 個臨床領域（全身、血液、神經精神、皮膚黏膜、漿膜、肌肉骨骼、腎臟）與 3 個免疫領域（抗磷脂抗體、補體、SLE 特異抗體 anti-dsDNA/anti-Sm）加權計分，總分≥10 即分類為 SLE，且同一領域只取最高分項。疾病活動度監測常用 anti-dsDNA 上升＋C3/C4 下降；anti-Sm 與 anti-dsDNA 為高特異性抗體。治療基石為 hydroxychloroquine（所有病人皆建議使用，可降低復發、血栓與死亡），依嚴重度加上類固醇、免疫抑制劑（MMF、cyclophosphamide、azathioprine）與生物製劑（belimumab 抗 BAFF、anifrolumab 抗 IFNAR1、voclosporin 用於狼瘡腎炎）。 在選項抗體中，anti-dsDNA 對 SLE 高度特異，且滴度與疾病活動度、狼瘡腎炎相關，是診斷與監測的關鍵抗體（anti-Sm 亦高特異但敏感度較低，本題未列）。anti-RNP 偏 MCTD、anti-SSA/SSB 偏 Sjögren、anti-mitochondrial 為原發性膽道膽管炎（PBC）標記。","options":{"A":"anti-RNP 與混合性結締組織病（MCTD）相關，對 SLE 診斷特異性不足。","B":"正確。anti-dsDNA 對 SLE 高度特異，並與疾病活動度及狼瘡腎炎相關。","C":"anti-SSA/Ro 偏 Sjögren 與新生兒狼瘡，非 SLE 特異。","D":"anti-SSB/La 同屬 Sjögren 相關抗體。","E":"anti-mitochondrial antibody 是原發性膽道膽管炎（PBC）的標記，與 SLE 無關。"},"sources":["Harrison 21e, Ch. SLE — Autoantibodies","Kelley & Firestein 11e, SLE"]}},"100-綜-11":{"quick":"疾病活動度看「目前發炎程度」：腫脹/壓痛關節數、ESR、病人整體評估皆反映活性；類風濕因子（RF）濃度屬診斷/預後標記，不隨活性即時變動，最不具活性指標。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 RA 的疾病活動度評估（如 DAS28）由『腫脹關節數、壓痛關節數、急性期反應物（ESR/CRP）、病人整體評估（patient global assessment）』組成。RF 滴度雖與較嚴重病程相關，但屬相對固定的診斷/預後標記，不隨治療即時反映發炎活性，故為『最不具活性指標』。","options":{"A":"正確。RF 濃度為診斷與預後標記，不即時反映發炎活性，是最不具活動度意義的項目。","B":"腫脹關節數直接反映滑膜炎活性，是 DAS28 組成項目。","C":"ESR 上升程度為急性期反應物，反映目前發炎活性。","D":"病人整體嚴重度自評（patient global assessment）為 DAS28/活動度評估的標準組成。","E":"壓痛關節數為 DAS28 組成項目，反映關節發炎活性。"},"sources":["2010 ACR/EULAR RA criteria; DAS28","Kelley & Firestein 11e, RA Assessment"]}},"102-綜-8":{"quick":"RA 最少侵犯遠端指間關節（DIP）；DIP 受侵犯反而要想到退化性關節炎或乾癬性關節炎。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 RA 典型侵犯 MCP、PIP、腕、MTP 等滑膜豐富的小關節，並可侵犯肩、肘、頸椎、顳顎關節，但『遠端指間關節（DIP）』極少被侵犯。DIP 受侵犯應優先考慮退化性關節炎（Heberden 結節）或乾癬性關節炎。","options":{"A":"髖關節可被 RA 侵犯（雖較晚）。","B":"肩關節為 RA 可侵犯的大關節之一。","C":"頸椎（尤其 C1–C2）為 RA 重要侵犯部位，可致半脫位。","D":"正確。遠端指間關節（DIP）是 RA 最少侵犯的關節；DIP 病變偏向 OA 或乾癬性關節炎。","E":"顳顎關節亦可被 RA 侵犯。"},"sources":["Harrison 21e, Ch. Rheumatoid Arthritis","Kelley & Firestein 11e, RA Clinical Features"]}},"109-148":{"quick":"慢性對稱性小關節炎（PIP/MCP/腕）＋晨僵>2 小時，最有助診斷的是 ESR(發炎)＋RF(血清學)→ (1)+(4)。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 本例為典型早期 RA 表現（>6 週、對稱小關節腫痛、長時間晨僵）。對診斷／分類最有幫助的是急性期反應物（ESR）與血清學（RF，本題未列 ACPA 時 RF 最相關）。CK 與 LDH 屬肌炎評估、IL-10 非臨床常規。","options":{"A":"(2)CK 為肌炎指標，與 RA 診斷無直接關聯。","B":"(3)LDH 非 RA 診斷項目。","C":"正確。ESR(1) 反映發炎、RF(4) 為血清學標記，兩者對 RA 診斷最有幫助。","D":"(5)IL-10 非臨床常規檢查。","E":"CK(2)、IL-10(5) 皆與 RA 診斷無關。"},"sources":["2010 ACR/EULAR RA criteria","Harrison 21e, Ch. RA"]}},"109-149":{"quick":"承上題：對稱性小關節炎＋長晨僵＋ESR/RF 取向 → 診斷為類風濕性關節炎（RA）。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 中年女性、雙手 PIP/MCP/腕對稱腫痛、晨僵>2 小時且持續數月，符合 RA 典型表現；多發性肌炎以近端肌無力與 CK 上升為主、AS 為中軸發炎性背痛、硬皮症有皮膚硬化雷諾、SLE 為多系統，皆與此單純對稱性小關節炎不符。","options":{"A":"多發性肌炎以近端肌無力、CK 上升為主，非對稱小關節炎。","B":"正確。對稱性 PIP/MCP/腕關節炎＋長晨僵，最符合 RA。","C":"僵直性脊椎炎為中軸發炎性背痛、HLA-B27 相關。","D":"硬皮症以皮膚硬化、雷諾現象為主。","E":"SLE 為多系統侵犯，本例無皮膚腎血液等其他系統表現。"},"sources":["2010 ACR/EULAR RA criteria","Harrison 21e, Ch. RA"]}},"109-151":{"quick":"B 肝帶原、對稱手腕關節晨僵、ANA 1:160 但 X 光仍正常 → anti-CCP（ACPA）最有助早期診斷且高特異。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 早期 RA 在 X 光出現骨侵蝕前，ACPA（anti-CCP）能提供高特異（~95%）的診斷與預後資訊，且可在症狀前數年即陽性。本例 ANA 低效價、RF 雖可考慮但 anti-CCP 特異性最高、最有助於確立 RA 並評估預後。注意 B 肝帶原者選擇生物製劑/免疫抑制前需評估抗病毒預防。","options":{"A":"關節超音波可顯示滑膜炎但非『最有助診斷』的特異檢查。","B":"RF 敏感但不特異（B 肝、感染、老化皆可陽性），特異性不如 anti-CCP。","C":"Cryoglobulin 與 C 肝相關血管炎有關，非此情境首選。","D":"補體下降偏向 SLE，非早期 RA 的關鍵檢查。","E":"正確。anti-CCP（ACPA）高特異、可早期陽性並預測侵蝕，對此早期病例診斷最有幫助。"},"sources":["Harrison 21e, Ch. RA — ACPA","2010 ACR/EULAR RA criteria"]}},"110-114":{"quick":"已確診 RA（侵蝕性、RF+），NSAID 之外應盡早加上第一線 DMARD：methotrexate。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 一旦診斷 RA 即應盡早啟動 DMARD 以阻止關節破壞，首選 methotrexate（合併葉酸）。本例已有邊緣性骨侵蝕、RF 陽性，屬需積極控制者。cyclosporine、cyclophosphamide、azathioprine、MMF 並非 RA 首選 DMARD（多用於 SLE/血管炎等）。","options":{"A":"正確。methotrexate 是 RA 的第一線 DMARD（anchor drug），確診後應盡早使用。","B":"cyclosporine 非 RA 首選 DMARD。","C":"cyclophosphamide 用於嚴重血管炎/狼瘡，非 RA 常規。","D":"azathioprine 為次選免疫抑制劑，非 RA 第一線。","E":"MMF 主要用於狼瘡腎炎等，非 RA 首選。"},"sources":["2021 ACR RA Treatment Guideline","Kelley & Firestein 11e, RA Therapy"]}},"110-128":{"quick":"RA 關節外表現：episcleritis（鞏膜外層炎）、periodontitis（牙周炎）、vasculitis（血管炎）→ (2)+(6)+(7)。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 RA 關節外表現多見於 RF/ACPA 高效價、長病程者，包括：類風濕結節、間質性肺病、鞏膜外層炎/鞏膜炎、繼發性 Sjögren（口乾 xerostomia 亦可見）、類風濕血管炎、繼發性類澱粉沉積、Felty 症候群，並與牙周炎（牙齦卟啉單胞菌與瓜胺酸化相關）有雙向關聯。題中 osteophyte（OA）、hyperthyroidism、polycythemia vera 非 RA 關節外表現。","options":{"A":"(3)osteophyte 是退化性關節炎特徵，非 RA 關節外表現。","B":"(8)polycythemia vera 為骨髓增殖疾病，與 RA 無關（RA 多為慢性病貧血）。","C":"(8)polycythemia vera 不符。","D":"正確。episcleritis(2)、periodontitis(6)、vasculitis(7) 皆為 RA 相關關節外/全身表現。","E":"(4)hyperthyroidism 非 RA 關節外表現。"},"sources":["Harrison 21e, Ch. RA — Extra-articular Manifestations","Kelley & Firestein 11e, RA"]}},"111-79":{"quick":"早期對稱性小關節炎、X 光仍正常時，最有助診斷的血清學是 ACPA(anti-citrulline)＋RF → (3)+(4)。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 2010 ACR/EULAR 標準中，血清學領域（RF 與 ACPA）權重最高（高效價 3 分）。本例 X 光尚正常的早期 RA，ACPA＋RF 對診斷與預後最具價值；ESR/CRP 雖反映發炎但非特異，ANA 偏向 SLE。","options":{"A":"(1)ESR+(2)CRP 僅反映發炎，非特異。","B":"(2)CRP 非特異。","C":"正確。ACPA(3)＋RF(4) 為 RA 最具診斷與預後價值的血清學組合。","D":"(5)ANA 偏 SLE，非 RA 特異。","E":"(1)ESR+(5)ANA 對 RA 診斷幫助有限。"},"sources":["2010 ACR/EULAR RA criteria","Harrison 21e, Ch. RA"]}},"111-116":{"quick":"診斷 RA 的兩大常用血清學檢查：類風濕因子（RF）＋抗瓜胺酸抗體（ACPA/anti-CCP）→ (2)+(4)。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 現行 RA 診斷血清學以 RF（敏感）與 ACPA（高特異）並用，兩者皆為 2010 ACR/EULAR 標準的血清學領域。ANA、anti-SSA/Ro、anti-SSB/La 偏向 SLE/Sjögren，非 RA 常規診斷抗體。","options":{"A":"(1)ANA 偏 SLE，非 RA 常規。","B":"(3)anti-SSA/Ro 偏 Sjögren。","C":"(1)ANA 非 RA 常規診斷抗體。","D":"(3)anti-SSA/Ro 不符。","E":"正確。RF(2)＋ACPA(4) 為診斷 RA 最常用的兩項血清學檢查。"},"sources":["2010 ACR/EULAR RA criteria","Kelley & Firestein 11e, RA Serology"]}},"111-123":{"quick":"RA 最常見的關節外表現是皮下結節（subcutaneous/rheumatoid nodule），多見於 RF 陽性者的伸側受壓處。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 在 RA 的關節外表現中，皮下類風濕結節最為常見（約 20–30% RF 陽性者），好發於肘部伸側、跟腱等受壓部位，組織學為中央纖維素樣壞死、周圍柵欄狀組織球。血管炎、間質性肺病、頸髓病變、葡萄膜炎相對少見（葡萄膜炎更偏脊椎關節病）。","options":{"A":"類風濕血管炎較少見，多見於嚴重高效價病人。","B":"間質性肺病（常為 UIP/NSIP）可見但較結節少。","C":"正確。皮下類風濕結節是 RA 最常見的關節外表現。","D":"頸椎脊髓病變（C1–C2 半脫位）屬嚴重併發症但不常見。","E":"葡萄膜炎較常見於脊椎關節病；RA 多為鞏膜外層炎/鞏膜炎而非葡萄膜炎。"},"sources":["Harrison 21e, Ch. RA","Kelley & Firestein 11e, RA Extra-articular"]}},"112-123":{"quick":"RA 最典型的手部變形是尺側偏移（ulnar deviation）；Heberden 結節屬 OA、膝內翻屬 OA。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 長病程 RA 因 MCP 滑膜炎與肌腱失衡，出現掌指關節尺側偏移（ulnar deviation）、天鵝頸、鈕扣指等典型變形。Heberden 結節（DIP）為 OA、frozen shoulder 為沾黏性關節囊炎、cervical ankylosis 偏 AS、genu varum（膝內翻）偏 OA。","options":{"A":"Heberden's nodule 是退化性關節炎 DIP 的骨贅。","B":"Frozen shoulder（沾黏性關節囊炎）非 RA 特異變形。","C":"頸椎強直偏向僵直性脊椎炎。","D":"膝內翻（genu varum）為退化性關節炎表現。","E":"正確。尺側偏移（ulnar deviation）為 RA 最典型的手部變形。"},"sources":["Harrison 21e, Ch. RA","Kelley & Firestein 11e, RA Deformities"]}},"112-127":{"quick":"診斷 RA 最有幫助的組合：多數「小」關節發炎(2)＋CRP 上升(7)＋ACPA 陽性(8)→答 D。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 2010 ACR/EULAR 標準重視小關節侵犯數、血清學（ACPA/RF）與急性期反應物（CRP/ESR）。下背痛(3)偏脊椎關節病、ANA(4)偏 SLE、ANCA(9)偏血管炎、皮膚血管炎(10)、口腔潰瘍(12)、腎功能異常(11)皆非 RA 典型，故最佳組合為小關節炎＋CRP＋ACPA。","options":{"A":"(3)下背痛＋(10)皮膚血管炎非 RA 典型。","B":"(4)ANA 偏 SLE，組合不佳。","C":"(9)ANCA＋(12)口腔潰瘍非 RA。","D":"正確。多數小關節發炎(2)＋CRP 上升(7)＋ACPA 陽性(8)，最符合 RA 診斷要件。","E":"(3)下背痛＋(11)腎功能異常非 RA。"},"sources":["2010 ACR/EULAR RA criteria","Harrison 21e, Ch. RA"]}},"113-119":{"quick":"2010 ACR/EULAR 標準血清學領域：RF 或 ACPA「高效價（強陽性）」給 3 分（低效價 2 分）→ 答 3 分。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 2010 ACR/EULAR 分類標準（總分≥6/10 可分類）四領域：①關節侵犯（最高 5）；②血清學（RF 或 ACPA 陰性 0、低效價 2、『高效價（強陽性）3』）；③急性期反應物（ESR/CRP 異常 1）；④症狀期程（≥6 週 1）。故 RF 強陽性最高給 3 分。","options":{"A":"1 分過低，不符血清學評分。","B":"2 分為『低效價（low-positive）』RF/ACPA 的分數。","C":"正確。RF 或 ACPA『高效價（強陽性）』給 3 分。","D":"4 分不存在於血清學領域評分。","E":"5 分為『關節侵犯領域』>10 關節（含小關節）的分數，非血清學分數。"},"sources":["2010 ACR/EULAR RA Classification Criteria (Aletaha D, et al.)","Kelley & Firestein 11e, RA Classification"]}},"113-122":{"quick":"RA 最具特異性的血清學抗體是抗瓜胺酸蛋白抗體（ACPA/anti-CCP），特異性約 95%，並預測侵蝕與預後。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 ACPA（anti-citrullinated protein antibody，臨床測 anti-CCP）對 RA 的特異性約 95%，遠高於 RF（敏感但不特異），且與侵蝕性病程、關節外表現及較差預後相關，可在症狀前數年出現。anti-SSA、anti-RNP、anti-histone 分別偏 Sjögren、MCTD、藥物性狼瘡。","options":{"A":"正確。ACPA（anti-CCP）對 RA 最具特異性（~95%），並具預後價值。","B":"anti-IgG antibody 概念近似 RF，敏感但不特異。","C":"anti-SSA 偏 Sjögren。","D":"anti-RNP 偏混合性結締組織病（MCTD）。","E":"anti-histone 偏藥物誘發狼瘡。"},"sources":["Harrison 21e, Ch. RA — ACPA","Kelley & Firestein 11e, RA Serology"]}},"114-123":{"quick":"雙側 PIP/MCP 對稱腫痛、懷疑 RA，最有助診斷的是抗瓜胺酸抗體（ACPA/anti-CCP，高特異）。","detail":{"background":"類風濕性關節炎（RA）是慢性、對稱性、侵蝕性的多發性『小關節』滑膜炎，核心病生理是滑膜被活化的 T/B 細胞、巨噬細胞與纖維母細胞浸潤形成血管翳（pannus），分泌 TNF-α、IL-6、IL-1 等促發炎細胞激素，破壞軟骨與骨（骨侵蝕 erosion）。流病好發於 30–50 歲女性（女:男約 3:1），與 HLA-DRB1『shared epitope』及吸菸交互作用相關（吸菸＋shared epitope 促進蛋白質瓜胺酸化 citrullination → ACPA 產生）。典型表現為晨僵>1 小時、PIP/MCP/腕關節對稱腫脹，慢性者出現天鵝頸、鈕扣指、尺側偏移等變形，並可侵犯頸椎（C1–C2 半脫位）。血清學：類風濕因子（RF，敏感但不特異，感染/Sjögren/老年皆可陽性）與 anti-citrullinated protein antibody（ACPA/anti-CCP，高特異 ~95%、且預測侵蝕與預後）。診斷採 2010 ACR/EULAR 分類標準（關節數、血清學 RF/ACPA、急性期反應物 ESR/CRP、症狀期程，總分≥6/10 可分類）。治療採『treat-to-target』，確診後盡早給 DMARD，首選 methotrexate（合併葉酸），反應不足加生物製劑（抗 TNF、抗 IL-6 tocilizumab、abatacept、rituximab）或 JAK 抑制劑；類固醇僅作短期橋接。 懷疑 RA 時，ACPA（anti-CCP）特異性最高（~95%）、且能在 X 光出現侵蝕前提供診斷與預後資訊；RF 敏感但不特異、CRP 僅反映發炎、ANA 偏 SLE、手部 X 光早期常正常。故 ACPA 最有助於診斷。","options":{"A":"ANA 敏感但偏 SLE，非 RA 特異。","B":"RF 敏感但不特異，特異性不如 ACPA。","C":"CRP 僅反映發炎程度，非診斷特異。","D":"正確。ACPA（anti-CCP）高特異，對診斷 RA 最有幫助。","E":"早期 RA 手部 X 光常正常，無法即時協助診斷。"},"sources":["2010 ACR/EULAR RA criteria","Harrison 21e, Ch. RA"]}},"103-綜-9":{"quick":"年輕男性發炎性下背痛＋運動後緩解＋鼠蹊（薦腸關節）痛 → 懷疑僵直性脊椎炎，最有幫助的是骨盆（薦腸關節）X 光。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 本例 23 歲男性、晨間下背僵硬、運動後緩解、雙側鼠蹊（薦腸關節轉移痛），為典型 AS 發炎性背痛。診斷關鍵是薦腸關節影像，骨盆 AP X 光可顯示薦腸關節炎（侵蝕、硬化、關節間隙變化）；HLA-B27 為輔助但非確診，自體免疫 profile 對血清陰性 SpA 幫助有限。","options":{"A":"正確。骨盆（薦腸關節）AP X 光是評估 AS／中軸 SpA 的首要影像（早期可正常時再考慮 MRI）。","B":"頸肩超音波無法評估中軸薦腸關節病變。","C":"HLA-B27 為支持性檢查，但陽性不等於診斷、陰性不能排除，非『最有幫助』的確立工具。","D":"頸椎 X 光非評估薦腸關節的首選。","E":"AS 屬血清陰性，自體免疫 profile（ANA/RF）多為陰性，幫助有限。"},"sources":["ASAS axial SpA criteria","Harrison 21e, Ch. Ankylosing Spondylitis"]}},"104-綜-11":{"quick":"反應性關節炎的腸道病原為 Yersinia、Salmonella、Shigella（與 Campylobacter）；TB 與 E. coli 非典型 → (2)+(3)+(4)。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 反應性關節炎好發於 HLA-B27 陽性者，於『泌尿生殖道（Chlamydia trachomatis）』或『腸道（Yersinia、Salmonella、Shigella、Campylobacter）』感染後 1–4 週發生。TB（結核分枝桿菌）與 E. coli 並非典型反應性關節炎誘發菌。","options":{"A":"含 (1)TB 結核桿菌，非反應性關節炎典型誘發菌。","B":"含 (1)TB，不符。","C":"含 (5)E. coli，非典型誘發菌。","D":"含 (5)E. coli，不符。","E":"正確。Yersinia(2)＋Salmonella(3)＋Shigella(4) 為反應性關節炎典型腸道病原。"},"sources":["Harrison 21e, Ch. Reactive Arthritis","Kelley & Firestein 11e, Reactive Arthritis"]}},"105-綜-12":{"quick":"AS 血清學：ESR/CRP 上升、RF 與 anti-CCP 陰性、HLA-B27 陽性、ANA/ANCA 陰性 → (3)CRP↑+(5)anti-CCP(-)+(6)HLA-B27(+)，答 E。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 AS（血清陰性脊椎關節病）的實驗室特徵：急性期反應物 ESR/CRP 可上升；RF 與 anti-CCP 陰性（血清陰性）；HLA-B27 多陽性；ANA、ANCA 通常陰性。題中正確組合為 CRP 上升＋anti-CCP(-)＋HLA-B27(+)。","options":{"A":"含 (1)ANA(+)，AS 多為 ANA 陰性。","B":"含 (4)RF(+)，AS 為血清陰性（RF 陰性）。","C":"含 (4)RF(+)、(7)ANCA(+)，皆不符 AS。","D":"含 (4)RF(+)，不符。","E":"正確。CRP 上升(3)＋anti-CCP 陰性(5)＋HLA-B27 陽性(6)，符合 AS 血清學。"},"sources":["Harrison 21e, Ch. Ankylosing Spondylitis","ASAS criteria"]}},"106-綜-5":{"quick":"活動性 AS（發炎性背痛、跟部附著點炎、HLA-B27+、未曾治療）的第一線藥物是 NSAID。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 對未經治療的活動性 AS，第一線是足量、規律 NSAID（可改善發炎性背痛與附著點炎）；對 NSAID 反應不足者才升階至生物製劑（抗 TNF 如 etanercept、或抗 IL-17）。傳統 DMARD（sulfasalazine、methotrexate）對『中軸』病灶無效（僅對周邊關節有效），全身類固醇對 AS 中軸亦效果不佳。","options":{"A":"全身類固醇對 AS 中軸病灶效果不佳，非第一線。","B":"Etanercept（抗 TNF）保留給 NSAID 反應不足者，非未治療者的第一線。","C":"Sulfasalazine 僅對周邊關節有效，對中軸（背痛/附著點）無效。","D":"Methotrexate 對 AS 中軸病灶無效。","E":"正確。NSAID 是活動性 AS 的第一線治療。"},"sources":["ASAS-EULAR axial SpA management","Harrison 21e, Ch. AS"]}},"109-154":{"quick":"軸性脊椎關節病（axial SpA）的典型特徵是 HLA-B27 陽性；ANA/RF 通常陰性，背痛在『運動後改善（休息加重）』，抗 TNF 有效。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 軸性脊椎關節病 HLA-B27 多陽性、屬血清陰性（ANA/RF 陰性），其發炎性背痛特徵為『運動後改善、休息加重』（與機械性背痛相反），且抗 TNF-α 治療有效。","options":{"A":"正確。axial SpA 與 HLA-B27 高度相關、多為陽性。","B":"ANA 通常陰性（血清陰性脊椎關節病）。","C":"RF 通常陰性。","D":"發炎性背痛在『運動後改善、休息/夜間加重』，與此敘述相反。","E":"抗 TNF-α 對 axial SpA 有效，非無效。"},"sources":["ASAS axial SpA criteria","Harrison 21e, Ch. SpA"]}},"110-120":{"quick":"慢性指（趾）炎、指甲點狀凹陷與甲床分離、RF/ACPA/HLA-B27 皆陰性、MCP–PIP–DIP 整指腫脹 → 乾癬性關節炎（PsA）。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 乾癬性關節炎屬脊椎關節病，特徵包括『整指放射狀腫脹的香腸指（dactylitis）』、指甲病變（點狀凹陷 pitting、甲床分離 onycholysis、營養不良）、可侵犯 DIP、附著點炎，且 RF/ACPA 多陰性。本例指甲變化＋整指腫脹＋血清陰性，最符合 PsA。","options":{"A":"RA 為對稱小關節侵蝕、RF/ACPA 常陽性、極少侵犯 DIP、無指甲病變。","B":"正確。指甲點狀凹陷＋甲床分離＋香腸指＋血清陰性，最符合乾癬性關節炎。","C":"AS 以中軸病變為主，非以手指指甲病變表現。","D":"痛風為急性單關節發作、有尿酸結晶，與慢性指甲病變不符。","E":"退化性關節炎無指甲病變與整指腫脹。"},"sources":["Harrison 21e, Ch. Psoriatic Arthritis","CASPAR criteria"]}},"111-117":{"quick":"下背痛＋前葡萄膜炎病史的年輕男性 → 懷疑脊椎關節病；最有幫助的是 HLA 檢查(2)＋CRP(3)。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 年輕男性慢性下背痛合併前葡萄膜炎（脊椎關節病的關節外表現）強烈提示 SpA。最有助診斷的是 HLA-B27（支持診斷）與 CRP（發炎活性、且為生物製劑反應預測因子）。ANA、anti-RNP 偏 SLE/MCTD、尿酸偏痛風，均不符。","options":{"A":"(1)ANA 偏 SLE，非 SpA 取向。","B":"正確。HLA(-B27)(2)＋CRP(3) 對診斷脊椎關節病最有幫助。","C":"(4)anti-RNP 偏 MCTD。","D":"(4)anti-RNP、(5)尿酸皆不符此情境。","E":"(1)ANA、(5)尿酸非 SpA 取向。"},"sources":["ASAS axial SpA criteria","Harrison 21e, Ch. SpA"]}},"111-126":{"quick":"治療軸性脊椎關節病（axial SpA）最有效的藥物是抗 TNF-α；傳統 DMARD（sulfasalazine、MTX）對中軸無效。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 對 NSAID 反應不足的 axial SpA，最有效的是生物製劑——抗 TNF-α（或抗 IL-17）。Sulfasalazine、methotrexate 對中軸病灶無效（僅周邊關節）；類固醇對中軸效果差；cyclosporine 無角色。","options":{"A":"Salazopyrin（sulfasalazine）僅對周邊關節有效，對中軸無效。","B":"Methotrexate 對 axial SpA 中軸無效。","C":"正確。抗 TNF-α 是 axial SpA 最有效的藥物（抗 IL-17 為另一選擇）。","D":"全身類固醇對 AS 中軸效果不佳。","E":"Cyclosporine 在 axial SpA 無治療角色。"},"sources":["ASAS-EULAR axial SpA management","Harrison 21e, Ch. AS"]}},"112-79":{"quick":"發炎性背痛、運動後改善、家族史，但 X 光未見變化、HLA-B27 陰性 → 早期 AS 應做薦腸關節 MRI（偵測骨髓水腫）。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 早期軸性 SpA 在 X 光出現結構性薦腸關節炎前，MRI 可偵測薦腸關節骨髓水腫（活動性發炎），靈敏度高於 X 光、CT、骨掃描；即使 HLA-B27 陰性，MRI 仍是早期診斷關鍵。故本例首選薦腸關節 MRI。","options":{"A":"CT 對結構破壞敏感，但對『早期發炎（骨髓水腫）』不如 MRI。","B":"正確。薦腸關節 MRI 可偵測早期骨髓水腫，是早期軸性 SpA 的關鍵影像。","C":"骨掃描特異性低，非首選。","D":"超音波無法評估薦腸關節中軸病變。","E":"關節組織切片並非診斷 AS 的方式。"},"sources":["ASAS axial SpA criteria (MRI)","Harrison 21e, Ch. AS"]}},"112-118":{"quick":"除抗 TNF 外，對僵直性脊椎炎（AS）有顯著療效的細胞激素抑制劑是抗 IL-17（如 secukinumab）。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 AS 的致病以 IL-23/IL-17 軸為核心，故除抗 TNF-α 外，抗 IL-17（secukinumab、ixekizumab）對 AS 有確切療效。值得注意：抗 IL-23 雖對乾癬與周邊關節有效，但在 AS『中軸』臨床試驗未顯效；anti-IL-1/IL-2/IL-6 對 AS 無顯著效果。","options":{"A":"抗 IL-1 對 AS 無顯著療效。","B":"抗 IL-2 非 AS 治療標的。","C":"抗 IL-6（tocilizumab）對 AS 中軸無效。","D":"正確。抗 IL-17 對 AS 有顯著療效（IL-23/IL-17 軸）。","E":"抗 IL-23 對 AS 中軸試驗未顯效（雖對乾癬/周邊有效）。"},"sources":["Harrison 21e, Ch. AS — IL-17/IL-23","ASAS-EULAR management"]}},"113-125":{"quick":"軸性脊椎炎（axial spondylitis）的標準實驗室特徵是 HLA-B27 陽性；RF 陰性、無明顯白血球/貧血，CRP 僅部分上升。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 axial spondylitis 屬血清陰性脊椎關節病：HLA-B27 多陽性、RF 陰性、無白血球增多、貧血非特徵；CRP 雖可上升但並非『顯著』且非診斷必備。故最正確的實驗室特徵是 HLA-B27 陽性。","options":{"A":"CRP 不一定顯著上升，且非診斷標誌。","B":"RF 為陰性（血清陰性）。","C":"白血球通常不增多。","D":"貧血非 axial spondylitis 的特徵。","E":"正確。HLA-B27 陽性是 axial spondylitis 的標準實驗室特徵。"},"sources":["ASAS axial SpA criteria","Harrison 21e, Ch. AS"]}},"114-127":{"quick":"年輕男性發炎性背痛（晨僵、運動後改善）、血清陰性（ANA/RF(-)）、IgA 上升 → 僵直性脊椎炎（AS）。","detail":{"background":"脊椎關節病變（spondyloarthritis, SpA）是一群與 HLA-B27 相關、以『中軸（薦腸關節/脊椎）發炎、附著點炎（enthesitis）、指炎（dactylitis/香腸指）、葡萄膜炎與血清陰性（RF/ACPA 陰性）』為特徵的疾病，包含僵直性脊椎炎（AS／放射線學中軸 SpA）、乾癬性關節炎、反應性關節炎、發炎性腸道疾病相關關節炎與未分化型。病生理核心是 IL-23/IL-17 軸與附著點的機械應力誘發發炎、新骨形成（syndesmophyte、竹節狀脊椎）。AS 的『發炎性背痛』特徵：年輕（<40 歲）起病、隱伏發作、晨僵、運動後改善、休息加重、夜間痛。診斷上薦腸關節影像是關鍵：早期 X 光可正常，MRI（骨髓水腫）較 X 光、骨掃描更早偵測薦腸關節炎；HLA-B27 陽性支持診斷但非必要。反應性關節炎（過去稱 Reiter）發生於泌尿道（Chlamydia）或腸道（Yersinia、Salmonella、Shigella、Campylobacter）感染後 1–4 週，HLA-B27 陽性者風險高。治療：NSAID 為第一線；對中軸病灶傳統 DMARD（如 methotrexate、sulfasalazine）對『中軸』無效（僅對周邊關節有效），NSAID 反應不足者用生物製劑——抗 TNF 或抗 IL-17（secukinumab/ixekizumab），抗 IL-23 對中軸效果有限（但對乾癬與周邊有效）。 17 歲男性、黎明僵硬、活動 30 分鐘後緩解（典型發炎性背痛），ANA/RF 陰性（血清陰性）、補體正常、IgA 上升（SpA 常見血清 IgA 升高），最符合 AS。RA 為周邊小關節、多發性肌炎為肌無力、硬皮症為皮膚硬化、生長痛無發炎性背痛特徵。","options":{"A":"RA 為對稱周邊小關節炎、RF/ACPA 常陽性，與中軸發炎性背痛不符。","B":"正確。年輕男性發炎性背痛＋血清陰性＋IgA↑，最符合僵直性脊椎炎。","C":"多發性肌炎以近端肌無力與 CK 上升為主。","D":"硬皮症以皮膚硬化、雷諾為主。","E":"生長痛無晨僵與發炎性背痛特徵，且不符此年齡發炎表現。"},"sources":["ASAS axial SpA criteria","Harrison 21e, Ch. AS"]}},"104-綜-12":{"quick":"膝關節 X 光見骨贅＋線狀軟骨鈣化（CPPD）、關節液白血球 26000 PMN 為主、Gram 陰性 → 痛風/CPPD/感染/反應性皆可能；最不可能的是缺血性壞死。","detail":{"background":"痛風是單鈉尿酸鹽（MSU）結晶沉積於關節所致的晶體性關節炎，與高尿酸血症（血尿酸>6.8 mg/dL 飽和點）相關。典型急性發作為單關節、夜間突發劇痛紅腫，第一蹠趾關節最常見（podagra）；關節液偏極光顯微鏡見『針狀、強烈負雙折射』MSU 結晶（黃色平行）。危險因子：男性、停經後女性、肥胖、酒精（尤其啤酒，含 purine 與抑制排泄）、含『果糖』甜飲、利尿劑（thiazide/loop 升尿酸）、腎功能不全、腫瘤溶解（化療後尿酸驟升）。治療分『急性發作』與『降尿酸（ULT）』：急性期用 NSAID、秋水仙素（colchicine，低劑量）或類固醇（三者皆第一線，依共病選擇），ULT 不在急性期啟動但已用者不停。降尿酸適應症：痛風石、影像關節破壞、反覆發作（≥2 次/年）、尿酸性腎病/腎結石；目標血尿酸<6 mg/dL（有痛風石者<5）。ULT 首選 xanthine oxidase 抑制劑 allopurinol（亞洲人用前須檢驗 HLA-B*5801，陽性者高 SJS/TEN 風險→改用 febuxostat）；uricosuric（probenecid、benzbromarone）促排泄，但腎結石/尿酸高排泄者禁用。CPPD（假性痛風）為焦磷酸鈣沉積，X 光見軟骨鈣化（chondrocalcinosis），結晶呈『菱形、弱正雙折射』，好發膝、腕，老年與代謝病（副甲亢、血色素沉著、低鎂）相關。 本例 70 歲女性、X 光線狀軟骨鈣化（chondrocalcinosis）提示 CPPD，發炎性關節液（WBC 26000、PMN 80%）可見於痛風、CPPD、細菌性與反應性關節炎；而『缺血性壞死（avascular necrosis）』為非發炎性骨壞死，關節液白血球不會如此高、也不會有軟骨鈣化，故最不可能。","options":{"A":"正確。缺血性壞死為非發炎性，關節液不會有如此高的白血球，與此發炎性、軟骨鈣化的表現不符，最不可能。","B":"痛風可表現發炎性關節液與紅腫，仍可能。","C":"CPPD（焦磷酸鈣沉積）正符合線狀軟骨鈣化，可能。","D":"細菌性關節炎可有高白血球發炎關節液（即使 Gram 染色陰性也不能排除），仍須考慮。","E":"反應性關節炎亦可造成發炎性單關節炎，可能。"},"sources":["Harrison 21e, Ch. Gout & CPPD","Kelley & Firestein 11e, Crystal Arthropathies"]}},"107-綜-8":{"quick":"痛風石＋慢性腎功能不全＋腎結石＋HLA-B*5801 陽性 → allopurinol 風險高、uricosuric 因結石/腎病禁用，最合適的降尿酸藥是 febuxostat。","detail":{"background":"痛風是單鈉尿酸鹽（MSU）結晶沉積於關節所致的晶體性關節炎，與高尿酸血症（血尿酸>6.8 mg/dL 飽和點）相關。典型急性發作為單關節、夜間突發劇痛紅腫，第一蹠趾關節最常見（podagra）；關節液偏極光顯微鏡見『針狀、強烈負雙折射』MSU 結晶（黃色平行）。危險因子：男性、停經後女性、肥胖、酒精（尤其啤酒，含 purine 與抑制排泄）、含『果糖』甜飲、利尿劑（thiazide/loop 升尿酸）、腎功能不全、腫瘤溶解（化療後尿酸驟升）。治療分『急性發作』與『降尿酸（ULT）』：急性期用 NSAID、秋水仙素（colchicine，低劑量）或類固醇（三者皆第一線，依共病選擇），ULT 不在急性期啟動但已用者不停。降尿酸適應症：痛風石、影像關節破壞、反覆發作（≥2 次/年）、尿酸性腎病/腎結石；目標血尿酸<6 mg/dL（有痛風石者<5）。ULT 首選 xanthine oxidase 抑制劑 allopurinol（亞洲人用前須檢驗 HLA-B*5801，陽性者高 SJS/TEN 風險→改用 febuxostat）；uricosuric（probenecid、benzbromarone）促排泄，但腎結石/尿酸高排泄者禁用。CPPD（假性痛風）為焦磷酸鈣沉積，X 光見軟骨鈣化（chondrocalcinosis），結晶呈『菱形、弱正雙折射』，好發膝、腕，老年與代謝病（副甲亢、血色素沉著、低鎂）相關。 本例多重限制：①HLA-B*5801 陽性 → allopurinol 引發 SJS/TEN 風險極高，應避免；②有腎結石與腎功能不全 → uricosuric（probenecid、benzbromarone、sulfinpyrazone）會增加尿中尿酸、加重結石，且腎功能不全時效果差，皆不適合。故首選 febuxostat（非 purine 類 XO 抑制劑，不需 HLA-B*5801 限制、輕中度腎功能不全可用）。","options":{"A":"正確。febuxostat 不受 HLA-B*5801 限制、輕中度腎功能不全可用，是本例最合適的降尿酸藥。","B":"probenecid（uricosuric）會增加尿酸排泄、加重腎結石，且腎功能不全時無效。","C":"benzbromarone（uricosuric）同樣不適合腎結石／腎功能不全者。","D":"sulfinpyrazone（uricosuric）禁用於腎結石。","E":"allopurinol 於 HLA-B*5801 陽性者有高 SJS/TEN 風險，應避免。"},"sources":["2020 ACR Gout Guideline (HLA-B*5801 screening)","Harrison 21e, Ch. Gout"]}},"109-140":{"quick":"突發單側踝關節腫痛＋2 週前泌尿道症狀的中年男性 → 鑑別痛風與反應性關節炎，最有幫助為 HLA-B27(2)＋尿酸(3)。","detail":{"background":"痛風是單鈉尿酸鹽（MSU）結晶沉積於關節所致的晶體性關節炎，與高尿酸血症（血尿酸>6.8 mg/dL 飽和點）相關。典型急性發作為單關節、夜間突發劇痛紅腫，第一蹠趾關節最常見（podagra）；關節液偏極光顯微鏡見『針狀、強烈負雙折射』MSU 結晶（黃色平行）。危險因子：男性、停經後女性、肥胖、酒精（尤其啤酒，含 purine 與抑制排泄）、含『果糖』甜飲、利尿劑（thiazide/loop 升尿酸）、腎功能不全、腫瘤溶解（化療後尿酸驟升）。治療分『急性發作』與『降尿酸（ULT）』：急性期用 NSAID、秋水仙素（colchicine，低劑量）或類固醇（三者皆第一線，依共病選擇），ULT 不在急性期啟動但已用者不停。降尿酸適應症：痛風石、影像關節破壞、反覆發作（≥2 次/年）、尿酸性腎病/腎結石；目標血尿酸<6 mg/dL（有痛風石者<5）。ULT 首選 xanthine oxidase 抑制劑 allopurinol（亞洲人用前須檢驗 HLA-B*5801，陽性者高 SJS/TEN 風險→改用 febuxostat）；uricosuric（probenecid、benzbromarone）促排泄，但腎結石/尿酸高排泄者禁用。CPPD（假性痛風）為焦磷酸鈣沉積，X 光見軟骨鈣化（chondrocalcinosis），結晶呈『菱形、弱正雙折射』，好發膝、腕，老年與代謝病（副甲亢、血色素沉著、低鎂）相關。 本例急性單關節炎、近期泌尿道症狀，需鑑別『痛風』（查尿酸）與『反應性關節炎』（查 HLA-B27）。ANA、ACPA、ANCA 對此情境（急性單關節晶體性 vs 反應性）幫助有限。最理想仍是關節液抽吸找結晶，但選項中以 HLA-B27＋尿酸最相關。","options":{"A":"(1)ANA、(5)ANCA 對急性單關節炎鑑別幫助有限。","B":"(4)ACPA 偏 RA，非此情境。","C":"正確。HLA-B27(2) 評估反應性關節炎、尿酸(3) 評估痛風，最有助於此急性單關節炎鑑別。","D":"(4)ACPA 不符。","E":"(5)ANCA 不符此急性單關節情境。"},"sources":["Harrison 21e, Ch. Gout / Reactive Arthritis","Kelley & Firestein 11e"]}},"109-141":{"quick":"降尿酸治療適應症為痛風石、關節/骨破壞、反覆發作、尿酸性腎病；單純『血尿酸>7』而無上述情況不需用藥。","detail":{"background":"痛風是單鈉尿酸鹽（MSU）結晶沉積於關節所致的晶體性關節炎，與高尿酸血症（血尿酸>6.8 mg/dL 飽和點）相關。典型急性發作為單關節、夜間突發劇痛紅腫，第一蹠趾關節最常見（podagra）；關節液偏極光顯微鏡見『針狀、強烈負雙折射』MSU 結晶（黃色平行）。危險因子：男性、停經後女性、肥胖、酒精（尤其啤酒，含 purine 與抑制排泄）、含『果糖』甜飲、利尿劑（thiazide/loop 升尿酸）、腎功能不全、腫瘤溶解（化療後尿酸驟升）。治療分『急性發作』與『降尿酸（ULT）』：急性期用 NSAID、秋水仙素（colchicine，低劑量）或類固醇（三者皆第一線，依共病選擇），ULT 不在急性期啟動但已用者不停。降尿酸適應症：痛風石、影像關節破壞、反覆發作（≥2 次/年）、尿酸性腎病/腎結石；目標血尿酸<6 mg/dL（有痛風石者<5）。ULT 首選 xanthine oxidase 抑制劑 allopurinol（亞洲人用前須檢驗 HLA-B*5801，陽性者高 SJS/TEN 風險→改用 febuxostat）；uricosuric（probenecid、benzbromarone）促排泄，但腎結石/尿酸高排泄者禁用。CPPD（假性痛風）為焦磷酸鈣沉積，X 光見軟骨鈣化（chondrocalcinosis），結晶呈『菱形、弱正雙折射』，好發膝、腕，老年與代謝病（副甲亢、血色素沉著、低鎂）相關。 無症狀高尿酸血症（僅血尿酸升高、無痛風發作或併發症）一般『不需』常規藥物降尿酸。降尿酸適應症為：痛風石、影像關節/骨破壞、反覆發作、尿酸引起之腎病變。故『血尿酸>7 mg/dL』本身（無上述）不需治療。","options":{"A":"有痛風石 → 須降尿酸（目標<5）。","B":"X 光顯示尿酸破壞關節/骨病變 → 須降尿酸。","C":"經常痛風發作（≥2 次/年）→ 須降尿酸。","D":"正確。單純血尿酸>7 而無痛風石/破壞/反覆發作/腎病變，屬無症狀高尿酸血症，不需藥物降尿酸。","E":"尿酸引起之腎病變 → 須降尿酸。"},"sources":["2020 ACR Gout Guideline","Harrison 21e, Ch. Gout"]}},"109-157":{"quick":"晶體性關節病正確敘述：使用 allopurinol 前須先確認 HLA-B*5801 陰性（陽性者高 SJS/TEN 風險）。","detail":{"background":"痛風是單鈉尿酸鹽（MSU）結晶沉積於關節所致的晶體性關節炎，與高尿酸血症（血尿酸>6.8 mg/dL 飽和點）相關。典型急性發作為單關節、夜間突發劇痛紅腫，第一蹠趾關節最常見（podagra）；關節液偏極光顯微鏡見『針狀、強烈負雙折射』MSU 結晶（黃色平行）。危險因子：男性、停經後女性、肥胖、酒精（尤其啤酒，含 purine 與抑制排泄）、含『果糖』甜飲、利尿劑（thiazide/loop 升尿酸）、腎功能不全、腫瘤溶解（化療後尿酸驟升）。治療分『急性發作』與『降尿酸（ULT）』：急性期用 NSAID、秋水仙素（colchicine，低劑量）或類固醇（三者皆第一線，依共病選擇），ULT 不在急性期啟動但已用者不停。降尿酸適應症：痛風石、影像關節破壞、反覆發作（≥2 次/年）、尿酸性腎病/腎結石；目標血尿酸<6 mg/dL（有痛風石者<5）。ULT 首選 xanthine oxidase 抑制劑 allopurinol（亞洲人用前須檢驗 HLA-B*5801，陽性者高 SJS/TEN 風險→改用 febuxostat）；uricosuric（probenecid、benzbromarone）促排泄，但腎結石/尿酸高排泄者禁用。CPPD（假性痛風）為焦磷酸鈣沉積，X 光見軟骨鈣化（chondrocalcinosis），結晶呈『菱形、弱正雙折射』，好發膝、腕，老年與代謝病（副甲亢、血色素沉著、低鎂）相關。 各選項對照：①CPPD 好發於『老年』而非年輕人；②MSU/痛風結晶呈『負』雙折射、CPPD 呈『弱正』雙折射，Calcium apatite 在普通偏光下不易見；③calcium oxalate 結晶與『腎衰竭/透析、乙二醇中毒』相關（非肝功能）；④allopurinol 使用前須確認 HLA-B*5801 陰性（正確）；⑤秋水仙素是抗發炎，『無』降尿酸作用。","options":{"A":"CPPD（假性痛風）好發於老年人，非年輕人。","B":"痛風（MSU）為負雙折射；Calcium apatite 在偏光顯微鏡下不呈典型負雙折射，敘述有誤。","C":"calcium oxalate 結晶與腎衰竭/乙二醇中毒相關，非肝功能異常。","D":"正確。使用 allopurinol 前須先確認 HLA-B*5801 陰性，以降低 SJS/TEN 風險。","E":"秋水仙素為抗發炎藥，無降尿酸作用。"},"sources":["2020 ACR Gout Guideline","Kelley & Firestein 11e, Crystal Arthropathies"]}},"111-119":{"quick":"突發踝關節劇痛無外傷史 → 急性單關節炎，最具診斷價值的是關節腔液檢查（找結晶/感染、區分痛風與化膿性）。","detail":{"background":"痛風是單鈉尿酸鹽（MSU）結晶沉積於關節所致的晶體性關節炎，與高尿酸血症（血尿酸>6.8 mg/dL 飽和點）相關。典型急性發作為單關節、夜間突發劇痛紅腫，第一蹠趾關節最常見（podagra）；關節液偏極光顯微鏡見『針狀、強烈負雙折射』MSU 結晶（黃色平行）。危險因子：男性、停經後女性、肥胖、酒精（尤其啤酒，含 purine 與抑制排泄）、含『果糖』甜飲、利尿劑（thiazide/loop 升尿酸）、腎功能不全、腫瘤溶解（化療後尿酸驟升）。治療分『急性發作』與『降尿酸（ULT）』：急性期用 NSAID、秋水仙素（colchicine，低劑量）或類固醇（三者皆第一線，依共病選擇），ULT 不在急性期啟動但已用者不停。降尿酸適應症：痛風石、影像關節破壞、反覆發作（≥2 次/年）、尿酸性腎病/腎結石；目標血尿酸<6 mg/dL（有痛風石者<5）。ULT 首選 xanthine oxidase 抑制劑 allopurinol（亞洲人用前須檢驗 HLA-B*5801，陽性者高 SJS/TEN 風險→改用 febuxostat）；uricosuric（probenecid、benzbromarone）促排泄，但腎結石/尿酸高排泄者禁用。CPPD（假性痛風）為焦磷酸鈣沉積，X 光見軟骨鈣化（chondrocalcinosis），結晶呈『菱形、弱正雙折射』，好發膝、腕，老年與代謝病（副甲亢、血色素沉著、低鎂）相關。 急性單關節炎（尤其突發劇痛、無外傷）的『黃金診斷』是關節穿刺抽液：偏光顯微鏡找 MSU/CPPD 結晶、革蘭氏染色與培養排除化膿性關節炎、計數白血球。X 光早期常正常、血尿酸在急性發作時可正常或偏低，故關節液檢查最有幫助。","options":{"A":"類風濕因子對急性單關節晶體性關節炎診斷無直接幫助。","B":"ANA 偏 SLE，非此情境。","C":"X 光早期常無變化，無法即時診斷。","D":"正確。關節腔液檢查（找結晶、革蘭氏染色培養、白血球計數）是急性單關節炎最具診斷價值的檢查。","E":"電腦斷層非急性單關節炎的首選診斷工具。"},"sources":["Harrison 21e, Ch. Approach to Monoarticular Arthritis","Kelley & Firestein 11e"]}},"112-117":{"quick":"痛風正確觀念：治療目標應將血尿酸降至 6 mg/dL 以下；酒精與『果糖』甜食皆升尿酸、化療後尿酸升、利尿劑升尿酸。","detail":{"background":"痛風是單鈉尿酸鹽（MSU）結晶沉積於關節所致的晶體性關節炎，與高尿酸血症（血尿酸>6.8 mg/dL 飽和點）相關。典型急性發作為單關節、夜間突發劇痛紅腫，第一蹠趾關節最常見（podagra）；關節液偏極光顯微鏡見『針狀、強烈負雙折射』MSU 結晶（黃色平行）。危險因子：男性、停經後女性、肥胖、酒精（尤其啤酒，含 purine 與抑制排泄）、含『果糖』甜飲、利尿劑（thiazide/loop 升尿酸）、腎功能不全、腫瘤溶解（化療後尿酸驟升）。治療分『急性發作』與『降尿酸（ULT）』：急性期用 NSAID、秋水仙素（colchicine，低劑量）或類固醇（三者皆第一線，依共病選擇），ULT 不在急性期啟動但已用者不停。降尿酸適應症：痛風石、影像關節破壞、反覆發作（≥2 次/年）、尿酸性腎病/腎結石；目標血尿酸<6 mg/dL（有痛風石者<5）。ULT 首選 xanthine oxidase 抑制劑 allopurinol（亞洲人用前須檢驗 HLA-B*5801，陽性者高 SJS/TEN 風險→改用 febuxostat）；uricosuric（probenecid、benzbromarone）促排泄，但腎結石/尿酸高排泄者禁用。CPPD（假性痛風）為焦磷酸鈣沉積，X 光見軟骨鈣化（chondrocalcinosis），結晶呈『菱形、弱正雙折射』，好發膝、腕，老年與代謝病（副甲亢、血色素沉著、低鎂）相關。 各選項：①酒精『與含果糖甜食皆會』升高尿酸（A 錯）；②痛風即使平時無症狀，符合適應症（痛風石/反覆/腎病）仍需降尿酸治療（B 錯）；③癌症化療後因腫瘤溶解，尿酸『會』升高（C 錯）；④治療目標血尿酸<6 mg/dL（D 正確，有痛風石者<5）；⑤利尿劑（thiazide/loop）會減少尿酸排泄、升高尿酸（E 錯）。","options":{"A":"錯誤。含果糖甜食也會升高尿酸。","B":"錯誤。符合適應症者（痛風石/反覆發作/腎病）平時仍須降尿酸治療。","C":"錯誤。化療後腫瘤溶解會使尿酸升高。","D":"正確。痛風病人降尿酸目標為血尿酸<6 mg/dL（有痛風石<5）。","E":"錯誤。利尿劑會減少尿酸排泄、升高血尿酸。"},"sources":["2020 ACR Gout Guideline","Harrison 21e, Ch. Gout"]}},"113-120":{"quick":"有痛風石的痛風病人，降尿酸目標應更嚴格，將血尿酸降至 5–6 mg/dL 以下，以溶解結晶、避免反覆發作。","detail":{"background":"痛風是單鈉尿酸鹽（MSU）結晶沉積於關節所致的晶體性關節炎，與高尿酸血症（血尿酸>6.8 mg/dL 飽和點）相關。典型急性發作為單關節、夜間突發劇痛紅腫，第一蹠趾關節最常見（podagra）；關節液偏極光顯微鏡見『針狀、強烈負雙折射』MSU 結晶（黃色平行）。危險因子：男性、停經後女性、肥胖、酒精（尤其啤酒，含 purine 與抑制排泄）、含『果糖』甜飲、利尿劑（thiazide/loop 升尿酸）、腎功能不全、腫瘤溶解（化療後尿酸驟升）。治療分『急性發作』與『降尿酸（ULT）』：急性期用 NSAID、秋水仙素（colchicine，低劑量）或類固醇（三者皆第一線，依共病選擇），ULT 不在急性期啟動但已用者不停。降尿酸適應症：痛風石、影像關節破壞、反覆發作（≥2 次/年）、尿酸性腎病/腎結石；目標血尿酸<6 mg/dL（有痛風石者<5）。ULT 首選 xanthine oxidase 抑制劑 allopurinol（亞洲人用前須檢驗 HLA-B*5801，陽性者高 SJS/TEN 風險→改用 febuxostat）；uricosuric（probenecid、benzbromarone）促排泄，但腎結石/尿酸高排泄者禁用。CPPD（假性痛風）為焦磷酸鈣沉積，X 光見軟骨鈣化（chondrocalcinosis），結晶呈『菱形、弱正雙折射』，好發膝、腕，老年與代謝病（副甲亢、血色素沉著、低鎂）相關。 痛風降尿酸目標一般<6 mg/dL；對『有痛風石』者建議更積極降至<5 mg/dL（以促進結晶溶解、縮小痛風石）。選項中 5–6 mg/dL 最符合『以下』的治療目標範圍。","options":{"A":"9–10 mg/dL 遠高於治療目標。","B":"7–8 mg/dL 仍高於 6 的目標。","C":"正確。降至 5–6 mg/dL 以下符合（有痛風石者目標<5）治療目標。","D":"3–4 mg/dL 雖更低，但長期過低（<3）尿酸可能有疑慮，非標準目標表述。","E":"1–2 mg/dL 過低，非治療目標。"},"sources":["2020 ACR Gout Guideline","Harrison 21e, Ch. Gout"]}},"113-128":{"quick":"急性痛風發作的第一線藥物之一為 NSAID（與秋水仙素、類固醇並列第一線）；本題答 NSAIDs。","detail":{"background":"痛風是單鈉尿酸鹽（MSU）結晶沉積於關節所致的晶體性關節炎，與高尿酸血症（血尿酸>6.8 mg/dL 飽和點）相關。典型急性發作為單關節、夜間突發劇痛紅腫，第一蹠趾關節最常見（podagra）；關節液偏極光顯微鏡見『針狀、強烈負雙折射』MSU 結晶（黃色平行）。危險因子：男性、停經後女性、肥胖、酒精（尤其啤酒，含 purine 與抑制排泄）、含『果糖』甜飲、利尿劑（thiazide/loop 升尿酸）、腎功能不全、腫瘤溶解（化療後尿酸驟升）。治療分『急性發作』與『降尿酸（ULT）』：急性期用 NSAID、秋水仙素（colchicine，低劑量）或類固醇（三者皆第一線，依共病選擇），ULT 不在急性期啟動但已用者不停。降尿酸適應症：痛風石、影像關節破壞、反覆發作（≥2 次/年）、尿酸性腎病/腎結石；目標血尿酸<6 mg/dL（有痛風石者<5）。ULT 首選 xanthine oxidase 抑制劑 allopurinol（亞洲人用前須檢驗 HLA-B*5801，陽性者高 SJS/TEN 風險→改用 febuxostat）；uricosuric（probenecid、benzbromarone）促排泄，但腎結石/尿酸高排泄者禁用。CPPD（假性痛風）為焦磷酸鈣沉積，X 光見軟骨鈣化（chondrocalcinosis），結晶呈『菱形、弱正雙折射』，好發膝、腕，老年與代謝病（副甲亢、血色素沉著、低鎂）相關。 急性痛風發作的第一線治療有三類可選：NSAID、低劑量秋水仙素（colchicine）、類固醇（口服或關節內），依共病選擇。降尿酸藥（uricosuric）不用於急性期啟動。本題選項中 NSAIDs 為標準第一線（秋水仙素亦為第一線，但題目以 NSAIDs 為答案）。","options":{"A":"uricosuric agent（促尿酸排泄）為『降尿酸』藥，不用於急性發作的第一線。","B":"冰敷僅為輔助，非藥物第一線。","C":"秋水仙素亦屬第一線，但本題標準答案為 NSAIDs（兩者皆可，依共病選）。","D":"5% 葡萄糖點滴對急性痛風無治療意義。","E":"正確。NSAIDs 是急性痛風發作的第一線藥物之一。"},"sources":["2020 ACR Gout Guideline","Harrison 21e, Ch. Gout"]}},"103-綜-8":{"quick":"拇指基部第一腕掌關節（1st CMC）受侵犯最可能是退化性關節炎（OA）——手部 OA 好發 DIP、PIP 與 1st CMC。","detail":{"background":"退化性關節炎（osteoarthritis, OA）是最常見的關節疾病，本質為關節軟骨退化、軟骨下骨硬化、骨贅（osteophyte）形成的『非發炎性』關節病（低度發炎）。危險因子：年齡、肥胖、女性、關節外傷/過度使用、遺傳。典型侵犯『負重關節（膝、髖）』與手部 DIP（Heberden 結節）、PIP（Bouchard 結節）、第一腕掌關節（1st CMC, 拇指基部）；RA 反而很少侵犯 DIP。症狀為使用後加重、休息改善、晨僵短（<30 分鐘）；理學見骨性腫大、捻髮音；X 光見關節間隙狹窄、骨贅、軟骨下硬化與囊腫。關節液分析是區分『發炎性 vs 非發炎性 vs 化膿性 vs 出血性』的關鍵：非發炎性（OA）：清澈、黏稠度高、WBC<2000（多<200）；發炎性（RA、痛風、SLE）：WBC 2000–50000、PMN 偏高、黏稠度下降；化膿性（septic）：WBC 常>50000（多>100000）、PMN>90%、混濁，須革蘭氏染色與培養，為關節急症；出血性：血性（外傷、PVNS、凝血異常）。治療 OA 以非藥物（減重、運動、輔具）＋acetaminophen/局部或口服 NSAID 為主，嚴重者關節置換；不需 DMARD。 手部 OA 的典型分布為遠端指間關節（DIP, Heberden）、近端指間關節（PIP, Bouchard）與第一腕掌關節（1st CMC, 拇指基部），後者常見於停經後女性。乾癬性關節炎雖可侵犯 DIP 但有指甲病變、RA 罕犯 DIP/1st CMC、假性痛風好發膝腕、淋菌性關節炎為急性化膿。","options":{"A":"乾癬性關節炎可犯 DIP，但以指甲病變、香腸指為特徵，非以 1st CMC 退化表現。","B":"RA 很少侵犯 DIP 與 1st CMC。","C":"正確。第一腕掌關節（1st CMC）退化是手部 OA 的典型部位。","D":"假性痛風（CPPD）好發膝、腕，非 1st CMC。","E":"淋菌性關節炎為急性化膿性，非慢性退化部位特異。"},"sources":["Harrison 21e, Ch. Osteoarthritis","Kelley & Firestein 11e, OA"]}},"108-綜-4":{"quick":"常以「單一關節炎」表現者：退化性關節炎(1)、痛風(2)、細菌感染性關節炎(4)→答 B；RA 與 SLE 多為多關節。","detail":{"background":"退化性關節炎（osteoarthritis, OA）是最常見的關節疾病，本質為關節軟骨退化、軟骨下骨硬化、骨贅（osteophyte）形成的『非發炎性』關節病（低度發炎）。危險因子：年齡、肥胖、女性、關節外傷/過度使用、遺傳。典型侵犯『負重關節（膝、髖）』與手部 DIP（Heberden 結節）、PIP（Bouchard 結節）、第一腕掌關節（1st CMC, 拇指基部）；RA 反而很少侵犯 DIP。症狀為使用後加重、休息改善、晨僵短（<30 分鐘）；理學見骨性腫大、捻髮音；X 光見關節間隙狹窄、骨贅、軟骨下硬化與囊腫。關節液分析是區分『發炎性 vs 非發炎性 vs 化膿性 vs 出血性』的關鍵：非發炎性（OA）：清澈、黏稠度高、WBC<2000（多<200）；發炎性（RA、痛風、SLE）：WBC 2000–50000、PMN 偏高、黏稠度下降；化膿性（septic）：WBC 常>50000（多>100000）、PMN>90%、混濁，須革蘭氏染色與培養，為關節急症；出血性：血性（外傷、PVNS、凝血異常）。治療 OA 以非藥物（減重、運動、輔具）＋acetaminophen/局部或口服 NSAID 為主，嚴重者關節置換；不需 DMARD。 急性/慢性單關節炎的常見原因：晶體（痛風、CPPD）、感染（細菌性）、退化性（OA，雖常多關節但可單關節表現）、外傷。RA 與 SLE 典型為『對稱性多關節炎』，較少以單一關節表現。故 (1)OA＋(2)痛風＋(4)細菌性最符合單關節炎。","options":{"A":"含(3)RA，RA 多為對稱性多關節。","B":"正確。退化性(1)、痛風(2)、細菌感染性(4)關節炎常以單一關節表現。","C":"含(3)RA、(5)SLE，皆多關節。","D":"含(5)SLE，多關節。","E":"含(3)RA、(5)SLE，皆非典型單關節。"},"sources":["Harrison 21e, Ch. Approach to Articular & Musculoskeletal Disorders","Kelley & Firestein 11e"]}},"109-96":{"quick":"感染性關節炎（septic arthritis）必須做關節腔液檢查（革蘭氏染色、培養、白血球計數）以確診，因屬關節急症。","detail":{"background":"退化性關節炎（osteoarthritis, OA）是最常見的關節疾病，本質為關節軟骨退化、軟骨下骨硬化、骨贅（osteophyte）形成的『非發炎性』關節病（低度發炎）。危險因子：年齡、肥胖、女性、關節外傷/過度使用、遺傳。典型侵犯『負重關節（膝、髖）』與手部 DIP（Heberden 結節）、PIP（Bouchard 結節）、第一腕掌關節（1st CMC, 拇指基部）；RA 反而很少侵犯 DIP。症狀為使用後加重、休息改善、晨僵短（<30 分鐘）；理學見骨性腫大、捻髮音；X 光見關節間隙狹窄、骨贅、軟骨下硬化與囊腫。關節液分析是區分『發炎性 vs 非發炎性 vs 化膿性 vs 出血性』的關鍵：非發炎性（OA）：清澈、黏稠度高、WBC<2000（多<200）；發炎性（RA、痛風、SLE）：WBC 2000–50000、PMN 偏高、黏稠度下降；化膿性（septic）：WBC 常>50000（多>100000）、PMN>90%、混濁，須革蘭氏染色與培養，為關節急症；出血性：血性（外傷、PVNS、凝血異常）。治療 OA 以非藥物（減重、運動、輔具）＋acetaminophen/局部或口服 NSAID 為主，嚴重者關節置換；不需 DMARD。 感染性（化膿性）關節炎是關節急症，延誤治療會迅速破壞軟骨，必須立即關節穿刺：革蘭氏染色、培養與白血球計數（常>50000、PMN>90%）以確診。RA、SLE 靠血清學、OA 靠臨床/X 光、纖維肌痛靠臨床壓痛點，皆不以關節液確診。","options":{"A":"RA 主要靠臨床＋血清學（RF/ACPA），非關節液確診。","B":"SLE 靠多系統表現＋自體抗體。","C":"正確。感染性關節炎須關節腔液檢查（染色/培養/白血球）以確診，且為急症。","D":"OA 靠臨床與 X 光，關節液為非發炎性。","E":"纖維肌痛為臨床診斷（廣泛壓痛、無發炎），不需關節液。"},"sources":["Harrison 21e, Ch. Septic Arthritis","Kelley & Firestein 11e, Synovial Fluid Analysis"]}},"109-156":{"quick":"退化性關節炎正確敘述：手部檢查常見 Heberden 結節（DIP 骨性腫大）；OA 為非發炎性，白血球不升、無骨侵蝕。","detail":{"background":"退化性關節炎（osteoarthritis, OA）是最常見的關節疾病，本質為關節軟骨退化、軟骨下骨硬化、骨贅（osteophyte）形成的『非發炎性』關節病（低度發炎）。危險因子：年齡、肥胖、女性、關節外傷/過度使用、遺傳。典型侵犯『負重關節（膝、髖）』與手部 DIP（Heberden 結節）、PIP（Bouchard 結節）、第一腕掌關節（1st CMC, 拇指基部）；RA 反而很少侵犯 DIP。症狀為使用後加重、休息改善、晨僵短（<30 分鐘）；理學見骨性腫大、捻髮音；X 光見關節間隙狹窄、骨贅、軟骨下硬化與囊腫。關節液分析是區分『發炎性 vs 非發炎性 vs 化膿性 vs 出血性』的關鍵：非發炎性（OA）：清澈、黏稠度高、WBC<2000（多<200）；發炎性（RA、痛風、SLE）：WBC 2000–50000、PMN 偏高、黏稠度下降；化膿性（septic）：WBC 常>50000（多>100000）、PMN>90%、混濁，須革蘭氏染色與培養，為關節急症；出血性：血性（外傷、PVNS、凝血異常）。治療 OA 以非藥物（減重、運動、輔具）＋acetaminophen/局部或口服 NSAID 為主，嚴重者關節置換；不需 DMARD。 OA 的正確特徵：①手部常見 Heberden 結節（DIP）與 Bouchard 結節（PIP）；②最常侵犯負重關節（膝、髖）與手部小關節，非『手腕』；③為非發炎性，血中白血球不升；④X 光是『骨贅、間隙狹窄』而非骨侵蝕（侵蝕偏 RA/痛風）；⑤長期類固醇對 OA 無效且有害。","options":{"A":"正確。Heberden 結節（DIP 骨性腫大）是手部 OA 的典型表現。","B":"OA 最常犯膝、髖與手部小關節，腕關節非好發處。","C":"OA 為非發炎性，血中白血球不會升高。","D":"OA 為骨贅與間隙狹窄，『骨侵蝕』偏 RA／痛風。","E":"長期口服類固醇對 OA 無治療效果且有害。"},"sources":["Harrison 21e, Ch. Osteoarthritis","Kelley & Firestein 11e, OA"]}},"110-113":{"quick":"膝關節液外觀清澈、黏稠度高、白血球僅 300 → 非發炎性關節液，最符合退化性關節炎（OA）。","detail":{"background":"退化性關節炎（osteoarthritis, OA）是最常見的關節疾病，本質為關節軟骨退化、軟骨下骨硬化、骨贅（osteophyte）形成的『非發炎性』關節病（低度發炎）。危險因子：年齡、肥胖、女性、關節外傷/過度使用、遺傳。典型侵犯『負重關節（膝、髖）』與手部 DIP（Heberden 結節）、PIP（Bouchard 結節）、第一腕掌關節（1st CMC, 拇指基部）；RA 反而很少侵犯 DIP。症狀為使用後加重、休息改善、晨僵短（<30 分鐘）；理學見骨性腫大、捻髮音；X 光見關節間隙狹窄、骨贅、軟骨下硬化與囊腫。關節液分析是區分『發炎性 vs 非發炎性 vs 化膿性 vs 出血性』的關鍵：非發炎性（OA）：清澈、黏稠度高、WBC<2000（多<200）；發炎性（RA、痛風、SLE）：WBC 2000–50000、PMN 偏高、黏稠度下降；化膿性（septic）：WBC 常>50000（多>100000）、PMN>90%、混濁，須革蘭氏染色與培養，為關節急症；出血性：血性（外傷、PVNS、凝血異常）。治療 OA 以非藥物（減重、運動、輔具）＋acetaminophen/局部或口服 NSAID 為主，嚴重者關節置換；不需 DMARD。 關節液 WBC<2000（本例僅 300）、黏稠度高、清澈，屬『非發炎性』，最符合 OA。痛風/RA/SLE 為發炎性（WBC 2000–50000），細菌性常>50000、混濁。故本例為退化性關節炎。","options":{"A":"痛風為發炎性關節液（WBC 數千以上），與 WBC 300 不符。","B":"正確。清澈、高黏稠度、WBC 300 為非發炎性關節液，最符合退化性關節炎。","C":"細菌性關節炎白血球常>50000、混濁，與此不符。","D":"乾癬性關節炎為發炎性。","E":"SLE 關節炎為發炎性，且為多系統，與單純非發炎膝積液不符。"},"sources":["Kelley & Firestein 11e, Synovial Fluid Analysis","Harrison 21e, Ch. OA"]}},"113-127":{"quick":"退化性關節炎最不會侵犯肘關節（elbow）；OA 好發負重關節（膝/髖）、手部 DIP/PIP、第一腕掌與第一蹠趾。","detail":{"background":"退化性關節炎（osteoarthritis, OA）是最常見的關節疾病，本質為關節軟骨退化、軟骨下骨硬化、骨贅（osteophyte）形成的『非發炎性』關節病（低度發炎）。危險因子：年齡、肥胖、女性、關節外傷/過度使用、遺傳。典型侵犯『負重關節（膝、髖）』與手部 DIP（Heberden 結節）、PIP（Bouchard 結節）、第一腕掌關節（1st CMC, 拇指基部）；RA 反而很少侵犯 DIP。症狀為使用後加重、休息改善、晨僵短（<30 分鐘）；理學見骨性腫大、捻髮音；X 光見關節間隙狹窄、骨贅、軟骨下硬化與囊腫。關節液分析是區分『發炎性 vs 非發炎性 vs 化膿性 vs 出血性』的關鍵：非發炎性（OA）：清澈、黏稠度高、WBC<2000（多<200）；發炎性（RA、痛風、SLE）：WBC 2000–50000、PMN 偏高、黏稠度下降；化膿性（septic）：WBC 常>50000（多>100000）、PMN>90%、混濁，須革蘭氏染色與培養，為關節急症；出血性：血性（外傷、PVNS、凝血異常）。治療 OA 以非藥物（減重、運動、輔具）＋acetaminophen/局部或口服 NSAID 為主，嚴重者關節置換；不需 DMARD。 原發性 OA 好發於負重關節（膝、髖、脊椎）與手部（DIP、PIP、1st CMC）、第一蹠趾關節（MTP）；『肘關節、腕、肩、踝、MCP』較少被原發性 OA 侵犯（若侵犯這些非典型部位，應懷疑次發性 OA、外傷、血色素沉著、CPPD 等）。故肘關節最不會被 OA 侵犯。","options":{"A":"PIP（Bouchard 結節）為手部 OA 常見部位。","B":"DIP（Heberden 結節）為手部 OA 最典型部位。","C":"股（髖/膝相關負重）關節為 OA 好發。","D":"正確。肘關節是 OA 最不會侵犯的部位（屬非典型，須懷疑次發性原因）。","E":"第一蹠趾關節（MTP）為原發性 OA 常見部位。"},"sources":["Harrison 21e, Ch. Osteoarthritis","Kelley & Firestein 11e, OA Distribution"]}},"101-綜-7":{"quick":"鼻中隔穿孔＋肺空洞＋壞死性肉芽腫性血管炎 → GPA（Wegener），全身型誘導治療為口服 cyclophosphamide＋prednisolone。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 本例上呼吸道（鼻樑痛、流鼻血、鼻中隔穿孔）＋肺空洞＋切片壞死性肉芽腫性血管炎，為典型 GPA。重症/全身型 GPA 的誘導治療為高劑量類固醇『合併』cyclophosphamide（或 rituximab）。單用類固醇脈衝或單用 IVIG、單用 azathioprine 誘導皆不足；題中正確為口服 cyclophosphamide 2 mg/kg＋prednisolone 1 mg/kg。","options":{"A":"正確。全身型 GPA 誘導治療為 cyclophosphamide＋高劑量類固醇（或 rituximab＋類固醇）。","B":"IVIG 非 GPA 標準誘導治療。","C":"單用 methylprednisolone pulse 不足以誘導緩解全身型 GPA，須合併細胞毒/rituximab。","D":"單用 pulse cyclophosphamide（未合併足量類固醇）非最佳；標準為兩者併用，本題以 A 的口服合併方案為答案。","E":"azathioprine 為『維持』而非誘導用藥，劑量與搭配不足以誘導重症 GPA。"},"sources":["Harrison 21e, Ch. ANCA-Associated Vasculitis","2021 ACR/VF Vasculitis Guideline"]}},"109-155":{"quick":"血管炎配對正確者：Henoch-Schönlein purpura（IgA 血管炎）血清 IgA 上升居多。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 各配對：①GPA 以『cANCA/PR3』為主（非 pANCA）；②HSP（IgA 血管炎）血清 IgA 上升（正確）；③EGPA 以『pANCA/MPO』為主（非 cANCA）；④GCA 為『>50 歲』（非<50 歲）；⑤PAN 為中血管壞死性動脈炎，皮膚較常見網狀青斑/結節/潰瘍而非典型白血球碎裂性小血管炎。","options":{"A":"GPA 以 cANCA/PR3 為主，非 pANCA。","B":"正確。Henoch-Schönlein purpura（IgA 血管炎）血清 IgA 多上升。","C":"EGPA 以 pANCA/MPO 為主，非 cANCA。","D":"巨細胞動脈炎好發於>50 歲，非<50 歲。","E":"PAN 為中血管炎，皮膚以結節/網狀青斑/潰瘍為主，非典型白血球碎裂性小血管炎。"},"sources":["Chapel Hill Consensus 2012","Harrison 21e, Ch. Vasculitis"]}},"109-158":{"quick":"抗生素後出現可觸性、壓不退色的紫斑樣風疹（vasculitic urticaria）→ 屬白血球碎裂性血管炎，最適治療為全身性類固醇。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 蕁麻疹性血管炎（urticarial/vasculitic urticaria）病灶持續>24 小時、壓之不退色（可觸性紫斑）、可留色素沈著，組織為白血球碎裂性血管炎，與單純蕁麻疹（風疹塊、退色、<24 小時）不同。較嚴重或有全身侵犯者，治療以全身性類固醇為主（抗組織胺、colchicine、dapsone、hydroxychloroquine 為輔助選項，但本題情境答全身類固醇）。","options":{"A":"抗組織胺對單純蕁麻疹有效，但對血管炎性風疹效果有限。","B":"口服 colchicine 為輔助選項，非此情境首選。","C":"hydroxychloroquine 可用於慢性蕁麻疹性血管炎，但非急性最適。","D":"dapsone 為輔助選項。","E":"正確。蕁麻疹性（白血球碎裂性）血管炎以全身性類固醇治療最適當。"},"sources":["Kelley & Firestein 11e, Cutaneous Vasculitis","Harrison 21e, Ch. Vasculitis"]}},"110-118":{"quick":"咳血＋肺浸潤＋大量蛋白尿血尿＋急性腎衰竭（肺腎症候群）→ 最該驗 ANCA(b)＋anti-GBM(c)。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 肺腎症候群（肺出血＋急性腎絲球腎炎）的鑑別核心是『ANCA 相關血管炎（GPA/MPA）』與『anti-GBM 病（Goodpasture）』。故最合適檢查為 ANCA（b）＋anti-GBM 抗體（c）。ALT 無關、ANA 偏 SLE、anticardiolipin 偏 APS，皆非首選。","options":{"A":"(a)ALT 與肺腎症候群無關。","B":"正確。ANCA(b)＋anti-GBM(c) 鑑別 ANCA 相關血管炎與 Goodpasture，最合適。","C":"(d)ANA 偏 SLE，非首選組合。","D":"(d)ANA、(e)anticardiolipin 非肺腎症候群首選。","E":"(a)ALT、(e)anticardiolipin 皆不符。"},"sources":["Harrison 21e, Ch. Pulmonary-Renal Syndromes","Chapel Hill 2012"]}},"110-119":{"quick":"承上題肺腎症候群（ANCA/anti-GBM）的最佳治療：cyclophosphamide(a)＋類固醇脈衝(d)，重症可加血漿置換。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 肺腎症候群（ANCA 相關血管炎重症或 anti-GBM）誘導治療為高劑量類固醇脈衝（methylprednisolone pulse, d）＋cyclophosphamide（a）（ANCA 相關亦可用 rituximab），嚴重肺出血/腎衰竭或 anti-GBM 加血漿置換。aspirin、colchicine、單用抗生素皆非治療。","options":{"A":"(b)aspirin 對血管炎肺腎症候群無治療意義。","B":"(c)colchicine 非此情境治療。","C":"正確。cyclophosphamide(a)＋類固醇脈衝(d) 為肺腎症候群誘導治療。","D":"(e)抗生素並非治療免疫性肺腎症候群的主軸。","E":"(b)aspirin＋(c)colchicine 皆非治療。"},"sources":["2021 ACR/VF Vasculitis Guideline","Harrison 21e, Ch. ANCA Vasculitis"]}},"110-126":{"quick":"血管炎病理機制配對正確者：Granulomatosis with polyangiitis（GPA）↔ proteinase-3 ANCA(+)（cANCA）。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 各配對：①MPA 以『pauci-immune（寡免疫）』機制、MPO-ANCA 為主，非免疫複合體沉積；②EGPA 約 40% ANCA(+)（並非一律 MPO 陰性）；③GPA↔PR3-ANCA(cANCA)（正確）；④HSP 由『IgA 免疫複合體』而非 IgM 冷凝球蛋白；⑤GCA 與慢性 C 肝無關（C 肝相關的是冷凝球蛋白血症性血管炎）。","options":{"A":"MPA 為寡免疫（pauci-immune）、MPO-ANCA 機制，非免疫複合體沉積。","B":"EGPA 並非一律 MPO-ANCA 陰性（約 40% ANCA 陽性）。","C":"正確。GPA ↔ proteinase-3 ANCA（cANCA）陽性。","D":"HSP 由 IgA 免疫複合體沉積，非 IgM 冷凝球蛋白。","E":"C 肝相關的是冷凝球蛋白血症性血管炎，非巨細胞動脈炎。"},"sources":["Chapel Hill 2012","Harrison 21e, Ch. Vasculitis"]}},"111-128":{"quick":"ANCA 相關（陽性）血管炎為三種：GPA(1)、MPA(3)、EGPA(4)→答 E。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 『ANCA 相關血管炎』專指三疾病：肉芽腫性多血管炎（GPA）、顯微多血管炎（MPA）、嗜伊紅性肉芽腫性多血管炎（EGPA）。C 肝相關血管炎（冷凝球蛋白）、狼瘡血管炎、巨細胞動脈炎、藥物誘發、Behçet、IgA 血管炎、高安氏動脈炎皆非典型 ANCA 相關。","options":{"A":"含(5)lupus vasculitis，非 ANCA 相關。","B":"GCA(6)、Behçet(8) 非 ANCA 相關。","C":"HCV 相關(2)、GCA(6) 非 ANCA 相關。","D":"藥物誘發(7)、Behçet(8)、IgA 血管炎(9) 非典型 ANCA 相關三疾病。","E":"正確。GPA(1)＋MPA(3)＋EGPA(4) 為 ANCA 相關血管炎。"},"sources":["Chapel Hill 2012","Harrison 21e, Ch. ANCA-Associated Vasculitis"]}},"112-113":{"quick":"17 歲女性肺腎侵犯＋切片證實肉芽腫性多血管炎（GPA）→ 血清最可能含 anti-proteinase-3（PR3-ANCA / cANCA）。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 GPA 以 cANCA / anti-proteinase-3（PR3）抗體為主（約 80–90% 全身活動型陽性）。本例肺（浸潤）＋腎（血尿腎功能下降）＋切片肉芽腫性多血管炎，最可能 PR3-ANCA 陽性。anti-RNP、anti-SSA、anti-dsDNA、anti-MDA5 分別偏 MCTD、Sjögren、SLE、皮肌炎。","options":{"A":"anti-RNP 偏 MCTD。","B":"anti-SSA/Ro 偏 Sjögren。","C":"正確。GPA 以 anti-proteinase-3（PR3-ANCA / cANCA）為主。","D":"anti-dsDNA 偏 SLE。","E":"anti-MDA5 偏皮肌炎（快速進行性間質肺病）。"},"sources":["Harrison 21e, Ch. GPA","Chapel Hill 2012"]}},"112-126":{"quick":"ANCA 配對正確者：cANCA ↔ Granulomatosis with polyangiitis（GPA）。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 cANCA（anti-PR3）與 GPA 高度相關；pANCA（anti-MPO）與 MPA、EGPA 相關。川崎病、PAN、HSP、Behçet 非典型 ANCA 相關血管炎，故只有 cANCA↔GPA 正確。","options":{"A":"川崎病非 ANCA 相關血管炎。","B":"正確。cANCA ↔ Granulomatosis with polyangiitis（GPA）。","C":"PAN（結節性多動脈炎）非典型 ANCA 相關。","D":"HSP 為 IgA 血管炎，非 cANCA 相關。","E":"Behçet 非 ANCA 相關血管炎。"},"sources":["Chapel Hill 2012","Harrison 21e, Ch. Vasculitis"]}},"113-123":{"quick":"血清中含 cytoplasmic ANCA（cANCA）可能性最高的是 Granulomatosis with polyangiitis（GPA）。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 cANCA（anti-PR3）最常見於 GPA；MPA、EGPA 多為 pANCA（anti-MPO）；PAN 與 GCA 通常 ANCA 陰性。故 cANCA 陽性可能性最高者為 GPA。","options":{"A":"EGPA 多為 pANCA/MPO。","B":"MPA 多為 pANCA/MPO。","C":"正確。GPA 是 cANCA（anti-PR3）陽性可能性最高者。","D":"PAN 通常 ANCA 陰性。","E":"巨細胞動脈炎通常 ANCA 陰性。"},"sources":["Harrison 21e, Ch. ANCA Vasculitis","Chapel Hill 2012"]}},"114-128":{"quick":"血管炎病理機制正確者：cANCA in granulomatosis with polyangiitis（GPA）。","detail":{"background":"血管炎是血管壁發炎導致缺血/出血的一群疾病，依侵犯血管口徑（Chapel Hill 2012 分類）分為：大血管（巨細胞動脈炎 GCA、高安氏動脈炎）、中血管（結節性多動脈炎 PAN、川崎病）、小血管（ANCA 相關：GPA、MPA、EGPA；免疫複合體：IgA 血管炎/HSP、冷凝球蛋白、anti-GBM）。ANCA 相關血管炎是考試重點：GPA（肉芽腫性多血管炎，舊稱 Wegener）：上呼吸道（鼻竇炎、鼻中隔穿孔、鞍鼻）＋肺（結節/空洞）＋腎（壞死性腎絲球腎炎），以『cANCA / anti-proteinase-3 (PR3)』為主；MPA（顯微多血管炎）：肺腎症候群、無肉芽腫，以『pANCA / anti-MPO』為主；EGPA（嗜伊紅性肉芽腫性多血管炎，舊稱 Churg-Strauss）：氣喘＋嗜伊紅球增多＋血管炎，約 40% ANCA(+)（多 pANCA/MPO）。IgA 血管炎（HSP）：可觸性紫斑、關節痛、腹痛、IgA 腎炎，血清 IgA 上升、皮膚見白血球碎裂性血管炎。GCA：>50 歲、顳動脈頭痛、下顎跛行、視力喪失、與風濕性多發肌痛重疊、ESR 顯著上升，須緊急類固醇以防失明。治療：嚴重 ANCA 相關血管炎（如 GPA 重症、肺腎症候群）以『誘導：高劑量類固醇＋cyclophosphamide 或 rituximab』，再以維持治療（azathioprine/rituximab/MTX）；血漿置換用於嚴重腎衰竭或肺出血、anti-GBM。 各機制：①GCA 為 T 細胞/巨噬細胞肉芽腫性大血管炎，非 pANCA；②狼瘡血管炎為免疫複合體，非單純 T 細胞；③HSP 為『IgA』免疫複合體，非 IgG；④EGPA（Churg-Strauss）非 IgE 免疫複合體機制；⑤GPA↔cANCA（PR3）（正確）。","options":{"A":"巨細胞動脈炎非 pANCA 機制（屬 T 細胞肉芽腫）。","B":"狼瘡血管炎以免疫複合體為主。","C":"HSP 為 IgA（非 IgG）免疫複合體。","D":"Churg-Strauss（EGPA）非 IgE 免疫複合體機制。","E":"正確。cANCA（anti-PR3）見於 granulomatosis with polyangiitis（GPA）。"},"sources":["Chapel Hill 2012","Harrison 21e, Ch. Vasculitis"]}},"109-152":{"quick":"中年女性雷諾＋乾咳/運動性呼吸困難＋嗆咳（食道）＋皮膚變硬＋ANA nucleolar＋限制型肺功能低 DLCO → 全身性硬化症。","detail":{"background":"全身性硬化症（systemic sclerosis, SSc／硬皮症）是以『血管病變、自體免疫與纖維化』三大機轉為核心的結締組織病，特徵為皮膚與內臟（肺、腸胃道、腎、心）纖維化。分兩型：①limited cutaneous（lcSSc，舊稱 CREST：鈣化、雷諾、食道蠕動障礙、指端硬化、微血管擴張），多 anti-centromere 抗體，併發肺動脈高壓風險高；②diffuse cutaneous（dcSSc），皮膚廣泛硬化，多 anti-Scl-70（anti-topoisomerase I）抗體，間質性肺病與硬皮症腎危機（scleroderma renal crisis）風險高；anti-RNA polymerase III 與腎危機及併發癌症相關。ANA 多陽性，常見『nucleolar』或『centromere』型態。雷諾現象（手指遇冷變白→變紫→變紅）幾乎是 SSc 最早、最常見的初始症狀。內臟侵犯：間質性肺病與肺動脈高壓是主要死因；食道下段蠕動障礙致逆流、吞嚥困難；硬皮症腎危機表現為惡性高血壓＋急性腎衰竭（微血管病性溶血），是內科急症。治療：器官導向——ILD 用 mycophenolate、nintedanib、cyclophosphamide、tocilizumab；肺動脈高壓用標靶藥；雷諾用鈣離子阻斷劑；腎危機用『ACE 抑制劑』（關鍵，能逆轉腎危機，禁用高劑量類固醇因會誘發腎危機）。 本例集合雷諾現象、皮膚變硬、食道蠕動障礙（嗆水）、間質性肺病（限制型、DLCO 54%）與 ANA nucleolar 型，是 SSc（diffuse type 合併 ILD）的典型多系統表現。SLE、Sjögren、多發性肌炎、抗磷脂症候群皆無法同時解釋皮膚硬化＋食道＋肺纖維化＋nucleolar ANA。","options":{"A":"SLE 無皮膚硬化與食道蠕動障礙，ANA 多 speckled/homogeneous 而非 nucleolar。","B":"Sjögren 以乾燥症為主，不致皮膚硬化與此型 ILD。","C":"正確。雷諾＋皮膚硬化＋食道＋ILD＋nucleolar ANA，最符合全身性硬化症。","D":"多發性肌炎以近端肌無力與 CK 上升為主，非皮膚硬化。","E":"抗磷脂症候群以血栓/流產為主，無此皮膚與肺纖維化表現。"},"sources":["Harrison 21e, Ch. Systemic Sclerosis","Kelley & Firestein 11e, SSc"]}},"109-199":{"quick":"圖示手指硬化（sclerodactyly）與指端潰瘍 → 全身性硬皮症（systemic scleroderma）。","detail":{"background":"全身性硬化症（systemic sclerosis, SSc／硬皮症）是以『血管病變、自體免疫與纖維化』三大機轉為核心的結締組織病，特徵為皮膚與內臟（肺、腸胃道、腎、心）纖維化。分兩型：①limited cutaneous（lcSSc，舊稱 CREST：鈣化、雷諾、食道蠕動障礙、指端硬化、微血管擴張），多 anti-centromere 抗體，併發肺動脈高壓風險高；②diffuse cutaneous（dcSSc），皮膚廣泛硬化，多 anti-Scl-70（anti-topoisomerase I）抗體，間質性肺病與硬皮症腎危機（scleroderma renal crisis）風險高；anti-RNA polymerase III 與腎危機及併發癌症相關。ANA 多陽性，常見『nucleolar』或『centromere』型態。雷諾現象（手指遇冷變白→變紫→變紅）幾乎是 SSc 最早、最常見的初始症狀。內臟侵犯：間質性肺病與肺動脈高壓是主要死因；食道下段蠕動障礙致逆流、吞嚥困難；硬皮症腎危機表現為惡性高血壓＋急性腎衰竭（微血管病性溶血），是內科急症。治療：器官導向——ILD 用 mycophenolate、nintedanib、cyclophosphamide、tocilizumab；肺動脈高壓用標靶藥；雷諾用鈣離子阻斷劑；腎危機用『ACE 抑制劑』（關鍵，能逆轉腎危機，禁用高劑量類固醇因會誘發腎危機）。 圖示為指端皮膚緊繃硬化（sclerodactyly）與缺血性指端潰瘍，是 SSc 的特徵性皮膚血管表現（源於指端血管病變與纖維化）。皮肌炎為 Gottron 徵候、DLE 為盤狀斑、感染性心內膜炎為 Janeway 病灶，皆與此不同。","options":{"A":"凍瘡型紅斑性狼瘡為遇冷的紫紅斑塊，非指端硬化潰瘍。","B":"皮肌炎為 Gottron 丘疹/徵候（關節伸側紫紅丘疹），非 sclerodactyly。","C":"類風濕結節為皮下結節，非指端硬化潰瘍。","D":"正確。手指硬化（sclerodactyly）＋指端潰瘍為全身性硬皮症的特徵。","E":"感染性心內膜炎的 Janeway 病灶為手掌足底無痛紅斑，非指端硬化。"},"sources":["Harrison 21e, Ch. Systemic Sclerosis","Kelley & Firestein 11e, SSc Skin"]}},"110-124":{"quick":"中年女性雷諾＋溢酸/嗆咳/吞嚥困難（食道）＋ANA speckled → 硬皮症取向，最有助診斷的抗體為 anti-Scl-70。","detail":{"background":"全身性硬化症（systemic sclerosis, SSc／硬皮症）是以『血管病變、自體免疫與纖維化』三大機轉為核心的結締組織病，特徵為皮膚與內臟（肺、腸胃道、腎、心）纖維化。分兩型：①limited cutaneous（lcSSc，舊稱 CREST：鈣化、雷諾、食道蠕動障礙、指端硬化、微血管擴張），多 anti-centromere 抗體，併發肺動脈高壓風險高；②diffuse cutaneous（dcSSc），皮膚廣泛硬化，多 anti-Scl-70（anti-topoisomerase I）抗體，間質性肺病與硬皮症腎危機（scleroderma renal crisis）風險高；anti-RNA polymerase III 與腎危機及併發癌症相關。ANA 多陽性，常見『nucleolar』或『centromere』型態。雷諾現象（手指遇冷變白→變紫→變紅）幾乎是 SSc 最早、最常見的初始症狀。內臟侵犯：間質性肺病與肺動脈高壓是主要死因；食道下段蠕動障礙致逆流、吞嚥困難；硬皮症腎危機表現為惡性高血壓＋急性腎衰竭（微血管病性溶血），是內科急症。治療：器官導向——ILD 用 mycophenolate、nintedanib、cyclophosphamide、tocilizumab；肺動脈高壓用標靶藥；雷諾用鈣離子阻斷劑；腎危機用『ACE 抑制劑』（關鍵，能逆轉腎危機，禁用高劑量類固醇因會誘發腎危機）。 本例雷諾＋食道蠕動障礙提示 SSc。對診斷最有幫助的特異抗體為 anti-Scl-70（anti-topoisomerase I，與 diffuse type 及 ILD 相關）；anti-centromere 則與 limited type/CREST 相關（本題未列）。anti-dsDNA 偏 SLE、anti-phospholipid 偏 APS、anti-SSA 偏 Sjögren、ANCA 偏血管炎。","options":{"A":"anti-dsDNA 偏 SLE，非 SSc 特異。","B":"anti-phospholipid 偏抗磷脂症候群。","C":"anti-SSA 偏 Sjögren。","D":"ANCA 偏 ANCA 相關血管炎。","E":"正確。anti-Scl-70（anti-topoisomerase I）對診斷硬皮症（diffuse type、ILD）最有幫助。"},"sources":["Harrison 21e, Ch. SSc — Autoantibodies","Kelley & Firestein 11e, SSc"]}},"111-124":{"quick":"全身性硬化症最常見的初始症狀是雷諾現象（Raynaud’s phenomenon）。","detail":{"background":"全身性硬化症（systemic sclerosis, SSc／硬皮症）是以『血管病變、自體免疫與纖維化』三大機轉為核心的結締組織病，特徵為皮膚與內臟（肺、腸胃道、腎、心）纖維化。分兩型：①limited cutaneous（lcSSc，舊稱 CREST：鈣化、雷諾、食道蠕動障礙、指端硬化、微血管擴張），多 anti-centromere 抗體，併發肺動脈高壓風險高；②diffuse cutaneous（dcSSc），皮膚廣泛硬化，多 anti-Scl-70（anti-topoisomerase I）抗體，間質性肺病與硬皮症腎危機（scleroderma renal crisis）風險高；anti-RNA polymerase III 與腎危機及併發癌症相關。ANA 多陽性，常見『nucleolar』或『centromere』型態。雷諾現象（手指遇冷變白→變紫→變紅）幾乎是 SSc 最早、最常見的初始症狀。內臟侵犯：間質性肺病與肺動脈高壓是主要死因；食道下段蠕動障礙致逆流、吞嚥困難；硬皮症腎危機表現為惡性高血壓＋急性腎衰竭（微血管病性溶血），是內科急症。治療：器官導向——ILD 用 mycophenolate、nintedanib、cyclophosphamide、tocilizumab；肺動脈高壓用標靶藥；雷諾用鈣離子阻斷劑；腎危機用『ACE 抑制劑』（關鍵，能逆轉腎危機，禁用高劑量類固醇因會誘發腎危機）。 SSc 的最早、最常見初始症狀為雷諾現象（常早於皮膚變化數月至數年）。其他敘述錯誤：皮膚為『硬化』而非濕疹樣變化；心血管侵犯非『最常見初始』；腎侵犯為腎危機（血管病變）而非間質性腎炎；SSc 增加的是肺纖維化相關肺癌風險但非以此為臨床特徵描述。","options":{"A":"SSc 皮膚為緊繃硬化，非濕疹樣變化。","B":"心血管病變雖會發生，但非『最常見的初始症狀』。","C":"SSc 腎侵犯為硬皮症腎危機（血管病變），非間質性腎炎。","D":"此敘述不符 SSc 最常見初始表現。","E":"正確。雷諾現象是全身性硬化症最常見的初始症狀。"},"sources":["Harrison 21e, Ch. Systemic Sclerosis","Kelley & Firestein 11e, SSc"]}},"112-119":{"quick":"硬皮症腎危機是內科急症（惡性高血壓＋急性腎衰竭），第一線治療為 ACE 抑制劑（可逆轉腎危機）。","detail":{"background":"全身性硬化症（systemic sclerosis, SSc／硬皮症）是以『血管病變、自體免疫與纖維化』三大
