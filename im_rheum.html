機轉為核心的結締組織病，特徵為皮膚與內臟（肺、腸胃道、腎、心）纖維化。分兩型：①limited cutaneous（lcSSc，舊稱 CREST：鈣化、雷諾、食道蠕動障礙、指端硬化、微血管擴張），多 anti-centromere 抗體，併發肺動脈高壓風險高；②diffuse cutaneous（dcSSc），皮膚廣泛硬化，多 anti-Scl-70（anti-topoisomerase I）抗體，間質性肺病與硬皮症腎危機（scleroderma renal crisis）風險高；anti-RNA polymerase III 與腎危機及併發癌症相關。ANA 多陽性，常見『nucleolar』或『centromere』型態。雷諾現象（手指遇冷變白→變紫→變紅）幾乎是 SSc 最早、最常見的初始症狀。內臟侵犯：間質性肺病與肺動脈高壓是主要死因；食道下段蠕動障礙致逆流、吞嚥困難；硬皮症腎危機表現為惡性高血壓＋急性腎衰竭（微血管病性溶血），是內科急症。治療：器官導向——ILD 用 mycophenolate、nintedanib、cyclophosphamide、tocilizumab；肺動脈高壓用標靶藥；雷諾用鈣離子阻斷劑；腎危機用『ACE 抑制劑』（關鍵，能逆轉腎危機，禁用高劑量類固醇因會誘發腎危機）。 硬皮症腎危機（scleroderma renal crisis）表現為突發惡性高血壓、急性腎衰竭與微血管病性溶血，與腎內 renin-angiotensin 過度活化有關。第一線且能改善預後的是『ACE 抑制劑（如 captopril）』，須積極控制血壓。鈣離子阻斷劑、ARB、endothelin 受體拮抗劑、類固醇皆非首選（高劑量類固醇反而會誘發腎危機）。","options":{"A":"ARB 雖作用於 RAS，但腎危機證據與首選地位是 ACE 抑制劑。","B":"鈣離子阻斷劑非腎危機第一線。","C":"endothelin-1 受體抑制劑用於肺動脈高壓，非腎危機首選。","D":"正確。ACE 抑制劑是硬皮症腎危機的第一線藥物，可逆轉危機。","E":"大量類固醇反而會誘發硬皮症腎危機，應避免。"},"sources":["Harrison 21e, Ch. SSc — Renal Crisis","Kelley & Firestein 11e, SSc"]}},"113-115":{"quick":"選項中最會合併惡性腫瘤的是硬皮症（systemic sclerosis）——尤其 anti-RNA polymerase III 抗體者與癌症（如乳癌）時間相近發生。","detail":{"background":"全身性硬化症（systemic sclerosis, SSc／硬皮症）是以『血管病變、自體免疫與纖維化』三大機轉為核心的結締組織病，特徵為皮膚與內臟（肺、腸胃道、腎、心）纖維化。分兩型：①limited cutaneous（lcSSc，舊稱 CREST：鈣化、雷諾、食道蠕動障礙、指端硬化、微血管擴張），多 anti-centromere 抗體，併發肺動脈高壓風險高；②diffuse cutaneous（dcSSc），皮膚廣泛硬化，多 anti-Scl-70（anti-topoisomerase I）抗體，間質性肺病與硬皮症腎危機（scleroderma renal crisis）風險高；anti-RNA polymerase III 與腎危機及併發癌症相關。ANA 多陽性，常見『nucleolar』或『centromere』型態。雷諾現象（手指遇冷變白→變紫→變紅）幾乎是 SSc 最早、最常見的初始症狀。內臟侵犯：間質性肺病與肺動脈高壓是主要死因；食道下段蠕動障礙致逆流、吞嚥困難；硬皮症腎危機表現為惡性高血壓＋急性腎衰竭（微血管病性溶血），是內科急症。治療：器官導向——ILD 用 mycophenolate、nintedanib、cyclophosphamide、tocilizumab；肺動脈高壓用標靶藥；雷諾用鈣離子阻斷劑；腎危機用『ACE 抑制劑』（關鍵，能逆轉腎危機，禁用高劑量類固醇因會誘發腎危機）。 多種結締組織病與癌症相關，其中硬皮症（尤其 anti-RNA polymerase III 抗體者）與癌症（乳癌、肺癌等）的發生時間常相近（paraneoplastic 關聯），且 SSc 之肺纖維化增加肺癌風險。高血壓、急性心肌梗塞、肺結核、急性腎盂腎炎皆非自體免疫–癌症關聯疾病。","options":{"A":"高血壓非與惡性腫瘤直接關聯的免疫疾病。","B":"正確。硬皮症（尤其 anti-RNAP III）與惡性腫瘤關聯顯著。","C":"急性心肌梗塞與癌症無此免疫關聯。","D":"肺結核為感染，非此題免疫–癌症關聯。","E":"急性腎盂腎炎為感染，非癌症關聯。"},"sources":["Kelley & Firestein 11e, SSc & Malignancy","Harrison 21e, Ch. SSc"]}},"114-125":{"quick":"雷諾現象＋乾咳吞嚥困難＋手指與臉皮膚變厚＋ANA nucleolar → 全身性硬化症（systemic sclerosis）。","detail":{"background":"全身性硬化症（systemic sclerosis, SSc／硬皮症）是以『血管病變、自體免疫與纖維化』三大機轉為核心的結締組織病，特徵為皮膚與內臟（肺、腸胃道、腎、心）纖維化。分兩型：①limited cutaneous（lcSSc，舊稱 CREST：鈣化、雷諾、食道蠕動障礙、指端硬化、微血管擴張），多 anti-centromere 抗體，併發肺動脈高壓風險高；②diffuse cutaneous（dcSSc），皮膚廣泛硬化，多 anti-Scl-70（anti-topoisomerase I）抗體，間質性肺病與硬皮症腎危機（scleroderma renal crisis）風險高；anti-RNA polymerase III 與腎危機及併發癌症相關。ANA 多陽性，常見『nucleolar』或『centromere』型態。雷諾現象（手指遇冷變白→變紫→變紅）幾乎是 SSc 最早、最常見的初始症狀。內臟侵犯：間質性肺病與肺動脈高壓是主要死因；食道下段蠕動障礙致逆流、吞嚥困難；硬皮症腎危機表現為惡性高血壓＋急性腎衰竭（微血管病性溶血），是內科急症。治療：器官導向——ILD 用 mycophenolate、nintedanib、cyclophosphamide、tocilizumab；肺動脈高壓用標靶藥；雷諾用鈣離子阻斷劑；腎危機用『ACE 抑制劑』（關鍵，能逆轉腎危機，禁用高劑量類固醇因會誘發腎危機）。 本例冬季雷諾、皮膚（手指、臉）變厚硬化、食道（吞嚥困難）與肺（乾咳）侵犯、ANA nucleolar 型，是 SSc 典型表現。SLE、皮肌炎、血管炎、乾燥症皆無法同時解釋皮膚硬化＋nucleolar ANA。","options":{"A":"SLE 無皮膚硬化，ANA 多非 nucleolar。","B":"皮肌炎以肌無力與特徵性皮疹為主，非皮膚硬化。","C":"血管炎症候群無皮膚硬化與 nucleolar ANA。","D":"乾燥症（Sicca）以乾燥為主，無皮膚硬化。","E":"正確。雷諾＋皮膚硬化＋食道/肺侵犯＋nucleolar ANA，最符合全身性硬化症。"},"sources":["Harrison 21e, Ch. Systemic Sclerosis","Kelley & Firestein 11e, SSc"]}},"110-116":{"quick":"年輕男性間質性肺病（雙下肺毛玻璃）＋近端肌無力（無法由座椅/蹲踞站起）→ 發炎性肌病，最有幫助的是 CPK（肌酸激酶）。","detail":{"background":"特發性發炎性肌病（idiopathic inflammatory myopathies, IIM）包括皮肌炎（DM）、多發性肌炎（PM）、免疫媒介壞死性肌病（IMNM）與包涵體肌炎（IBM）。共同特徵為『近端、對稱性肌無力』（如蹲下站不起、舉手梳頭困難）與肌肉酵素上升（creatine kinase, CK/CPK 最敏感，亦升 aldolase、AST/ALT、LDH）。皮肌炎特徵性皮疹：Gottron 丘疹/徵候（指關節伸側紫紅丘疹）、heliotrope rash（眼瞼紫紅斑＋水腫）、shawl/V sign、mechanic's hand。肌炎特異抗體（MSA）有重要臨床對應：anti-Jo-1（與抗合成酶症候群——ILD、關節炎、mechanic's hand、發燒、雷諾）；anti-MDA5（臨床無肌病型皮肌炎 clinically amyopathic DM，合併『快速進行性間質性肺病 RP-ILD』、皮膚潰瘍，預後差）；anti-TIF1-γ 與 anti-NXP2（與『成人癌症相關肌炎』，尤其 DM 須篩癌）；anti-Mi-2（典型皮疹、預後較好、癌症關聯低）；anti-SRP/HMGCR（壞死性肌病）。皮肌炎（尤其>40 歲、anti-TIF1-γ）合併惡性腫瘤風險明顯升高，須積極篩檢。診斷靠肌酵素、肌電圖、MRI、肌肉切片與 MSA；治療以高劑量類固醇＋免疫抑制劑（MTX、azathioprine、MMF、IVIG，RP-ILD 需積極合併治療）。 本例近端肌無力（無法站起）合併雙下肺毛玻璃樣 ILD，高度提示發炎性肌病（如 anti-synthetase 或 MDA5 相關 DM/PM）。最有助診斷的是 CK/CPK（肌肉酵素，肌炎最敏感指標）。ALT、LDH 雖可升但非特異，ANA、補體偏 SLE。","options":{"A":"ALT 雖可隨肌損升高，但非肌炎最特異指標。","B":"LDH 非特異。","C":"正確。CPK（肌酸激酶）是發炎性肌病最敏感的肌肉酵素，對診斷最有幫助。","D":"ANA 偏 SLE，對此肌病/ILD 診斷非首選。","E":"補體偏 SLE，非肌炎指標。"},"sources":["Harrison 21e, Ch. Inflammatory Myopathies","Kelley & Firestein 11e, IIM"]}},"110-158":{"quick":"搔癢皮疹（前胸/上背/手背指關節）＋爬樓梯無力＋近期乳癌＋ANA(+)、CK 正常 → 臨床無肌病型皮肌炎（dermatomyositis）。","detail":{"background":"特發性發炎性肌病（idiopathic inflammatory myopathies, IIM）包括皮肌炎（DM）、多發性肌炎（PM）、免疫媒介壞死性肌病（IMNM）與包涵體肌炎（IBM）。共同特徵為『近端、對稱性肌無力』（如蹲下站不起、舉手梳頭困難）與肌肉酵素上升（creatine kinase, CK/CPK 最敏感，亦升 aldolase、AST/ALT、LDH）。皮肌炎特徵性皮疹：Gottron 丘疹/徵候（指關節伸側紫紅丘疹）、heliotrope rash（眼瞼紫紅斑＋水腫）、shawl/V sign、mechanic's hand。肌炎特異抗體（MSA）有重要臨床對應：anti-Jo-1（與抗合成酶症候群——ILD、關節炎、mechanic's hand、發燒、雷諾）；anti-MDA5（臨床無肌病型皮肌炎 clinically amyopathic DM，合併『快速進行性間質性肺病 RP-ILD』、皮膚潰瘍，預後差）；anti-TIF1-γ 與 anti-NXP2（與『成人癌症相關肌炎』，尤其 DM 須篩癌）；anti-Mi-2（典型皮疹、預後較好、癌症關聯低）；anti-SRP/HMGCR（壞死性肌病）。皮肌炎（尤其>40 歲、anti-TIF1-γ）合併惡性腫瘤風險明顯升高，須積極篩檢。診斷靠肌酵素、肌電圖、MRI、肌肉切片與 MSA；治療以高劑量類固醇＋免疫抑制劑（MTX、azathioprine、MMF、IVIG，RP-ILD 需積極合併治療）。 本例特徵性分布皮疹（手背指關節 Gottron 區、上背 shawl sign）＋近端肌無力（爬樓梯/蹲起困難）＋伴隨惡性腫瘤（乳癌）＋ANA(+)，即使 CK 正常仍符合皮肌炎（可為 amyopathic/hypomyopathic）。皮肌炎與成人癌症關聯強（尤其 anti-TIF1-γ）。乾癬、副腫瘤天疱瘡、亞急性皮膚狼瘡、Lambert-Eaton 皆與此皮疹分布與肌無力不符。","options":{"A":"乾癬為銀白厚鱗斑塊，分布與此 Gottron/shawl 樣皮疹不同。","B":"正確。手背指關節 Gottron 區皮疹＋近端肌無力＋伴癌（乳癌），最符合皮肌炎。","C":"副腫瘤天疱瘡為黏膜糜爛/水疱，非此皮疹型態。","D":"亞急性皮膚紅斑狼瘡為環狀/丘疹鱗屑斑，且 anti-Ro 多陽性（本例陰性）。","E":"Lambert-Eaton 為神經肌肉接合處疾病（肌無力＋自律神經），無此皮疹。"},"sources":["Harrison 21e, Ch. Dermatomyositis","Kelley & Firestein 11e, IIM & Malignancy"]}},"111-120":{"quick":"眼瞼紅斑水腫（heliotrope）＋臉前胸紅斑＋手背指關節脫屑（Gottron）＋肌無力＋快速進展呼吸衰竭 → 皮肌炎；最有預後價值的是 anti-MDA5 抗體。","detail":{"background":"特發性發炎性肌病（idiopathic inflammatory myopathies, IIM）包括皮肌炎（DM）、多發性肌炎（PM）、免疫媒介壞死性肌病（IMNM）與包涵體肌炎（IBM）。共同特徵為『近端、對稱性肌無力』（如蹲下站不起、舉手梳頭困難）與肌肉酵素上升（creatine kinase, CK/CPK 最敏感，亦升 aldolase、AST/ALT、LDH）。皮肌炎特徵性皮疹：Gottron 丘疹/徵候（指關節伸側紫紅丘疹）、heliotrope rash（眼瞼紫紅斑＋水腫）、shawl/V sign、mechanic's hand。肌炎特異抗體（MSA）有重要臨床對應：anti-Jo-1（與抗合成酶症候群——ILD、關節炎、mechanic's hand、發燒、雷諾）；anti-MDA5（臨床無肌病型皮肌炎 clinically amyopathic DM，合併『快速進行性間質性肺病 RP-ILD』、皮膚潰瘍，預後差）；anti-TIF1-γ 與 anti-NXP2（與『成人癌症相關肌炎』，尤其 DM 須篩癌）；anti-Mi-2（典型皮疹、預後較好、癌症關聯低）；anti-SRP/HMGCR（壞死性肌病）。皮肌炎（尤其>40 歲、anti-TIF1-γ）合併惡性腫瘤風險明顯升高，須積極篩檢。診斷靠肌酵素、肌電圖、MRI、肌肉切片與 MSA；治療以高劑量類固醇＋免疫抑制劑（MTX、azathioprine、MMF、IVIG，RP-ILD 需積極合併治療）。 本例為皮肌炎（heliotrope、Gottron），且『快速進行性間質性肺病導致呼吸衰竭住 ICU』是 anti-MDA5 抗體相關 DM 的典型危急表現（常為臨床無肌病型、皮膚潰瘍、RP-ILD、預後差）。故 anti-MDA5 抗體對診斷與『病情預後』最有幫助。anti-RNP、anti-Scl-70、anti-SSA/SSB 偏其他疾病。","options":{"A":"anti-RNP 偏 MCTD，非此 RP-ILD 預後標記。","B":"正確。anti-MDA5 與快速進行性間質性肺病、皮膚潰瘍相關，對診斷與預後最有幫助。","C":"anti-Scl-70 偏硬皮症。","D":"anti-SSA/Ro 偏 Sjögren。","E":"anti-SSB/La 偏 Sjögren。"},"sources":["Harrison 21e, Ch. Dermatomyositis — MSA","Kelley & Firestein 11e, anti-MDA5"]}},"111-160":{"quick":"搔癢皮疹（前胸/上背/手背）＋吞嚥困難＋爬樓梯無力＋近期乳癌＋ANA(+)、CK 正常 → 皮肌炎（dermatomyositis）。","detail":{"background":"特發性發炎性肌病（idiopathic inflammatory myopathies, IIM）包括皮肌炎（DM）、多發性肌炎（PM）、免疫媒介壞死性肌病（IMNM）與包涵體肌炎（IBM）。共同特徵為『近端、對稱性肌無力』（如蹲下站不起、舉手梳頭困難）與肌肉酵素上升（creatine kinase, CK/CPK 最敏感，亦升 aldolase、AST/ALT、LDH）。皮肌炎特徵性皮疹：Gottron 丘疹/徵候（指關節伸側紫紅丘疹）、heliotrope rash（眼瞼紫紅斑＋水腫）、shawl/V sign、mechanic's hand。肌炎特異抗體（MSA）有重要臨床對應：anti-Jo-1（與抗合成酶症候群——ILD、關節炎、mechanic's hand、發燒、雷諾）；anti-MDA5（臨床無肌病型皮肌炎 clinically amyopathic DM，合併『快速進行性間質性肺病 RP-ILD』、皮膚潰瘍，預後差）；anti-TIF1-γ 與 anti-NXP2（與『成人癌症相關肌炎』，尤其 DM 須篩癌）；anti-Mi-2（典型皮疹、預後較好、癌症關聯低）；anti-SRP/HMGCR（壞死性肌病）。皮肌炎（尤其>40 歲、anti-TIF1-γ）合併惡性腫瘤風險明顯升高，須積極篩檢。診斷靠肌酵素、肌電圖、MRI、肌肉切片與 MSA；治療以高劑量類固醇＋免疫抑制劑（MTX、azathioprine、MMF、IVIG，RP-ILD 需積極合併治療）。 同型病例：特徵性皮疹分布＋近端肌無力＋吞嚥困難（咽部肌侵犯）＋伴隨乳癌，符合皮肌炎（即使 CK 正常，可為 amyopathic）。皮肌炎與成人惡性腫瘤強相關。硬皮症、副腫瘤天疱瘡、亞急性皮膚狼瘡、包涵體肌炎皆不符此皮疹與伴癌型態。","options":{"A":"全身性硬化症為皮膚硬化、雷諾，非此搔癢 Gottron 樣皮疹。","B":"正確。特徵皮疹＋近端肌無力＋伴乳癌，最符合皮肌炎。","C":"副腫瘤天疱瘡為黏膜糜爛水疱。","D":"亞急性皮膚狼瘡 anti-Ro 多陽性（本例陰性），皮疹型態不同。","E":"包涵體肌炎為遠端＋近端、緩慢進展、對類固醇反應差，無此皮疹與急性伴癌。"},"sources":["Harrison 21e, Ch. Dermatomyositis","Kelley & Firestein 11e, IIM"]}},"112-125":{"quick":"皮肌炎抗體–症狀對應正確者：anti-MDA-5 與快速進行性間質性肺病（RP-ILD）相關。","detail":{"background":"特發性發炎性肌病（idiopathic inflammatory myopathies, IIM）包括皮肌炎（DM）、多發性肌炎（PM）、免疫媒介壞死性肌病（IMNM）與包涵體肌炎（IBM）。共同特徵為『近端、對稱性肌無力』（如蹲下站不起、舉手梳頭困難）與肌肉酵素上升（creatine kinase, CK/CPK 最敏感，亦升 aldolase、AST/ALT、LDH）。皮肌炎特徵性皮疹：Gottron 丘疹/徵候（指關節伸側紫紅丘疹）、heliotrope rash（眼瞼紫紅斑＋水腫）、shawl/V sign、mechanic's hand。肌炎特異抗體（MSA）有重要臨床對應：anti-Jo-1（與抗合成酶症候群——ILD、關節炎、mechanic's hand、發燒、雷諾）；anti-MDA5（臨床無肌病型皮肌炎 clinically amyopathic DM，合併『快速進行性間質性肺病 RP-ILD』、皮膚潰瘍，預後差）；anti-TIF1-γ 與 anti-NXP2（與『成人癌症相關肌炎』，尤其 DM 須篩癌）；anti-Mi-2（典型皮疹、預後較好、癌症關聯低）；anti-SRP/HMGCR（壞死性肌病）。皮肌炎（尤其>40 歲、anti-TIF1-γ）合併惡性腫瘤風險明顯升高，須積極篩檢。診斷靠肌酵素、肌電圖、MRI、肌肉切片與 MSA；治療以高劑量類固醇＋免疫抑制劑（MTX、azathioprine、MMF、IVIG，RP-ILD 需積極合併治療）。 各對應：①anti-Mi-2 與『典型皮疹、預後較好、癌症關聯低』（非與癌症相關）；②anti-TIF1-γ 與『癌症相關肌炎』（非僅皮膚炎）；③anti-MDA-5 與『快速進行性間質性肺病』（正確）；④anti-NXP2 與癌症及鈣質沉著相關，非 inclusion body；⑤anti-aminoacyl-tRNA（如 anti-Jo-1）與抗合成酶症候群（ILD、關節炎、mechanic's hand），非 cardiomyopathy。","options":{"A":"anti-Mi-2 與癌症關聯『低』、預後較好，敘述相反。","B":"anti-TIF1-γ 與癌症相關（不只皮膚炎）。","C":"正確。anti-MDA-5 與快速進行性間質性肺病（RP-ILD）相關。","D":"anti-NXP2 與鈣質沉著/癌症相關，非 inclusion body。","E":"anti-aminoacyl-tRNA（anti-Jo-1 等）與抗合成酶症候群（ILD）相關，非 cardiomyopathy。"},"sources":["Kelley & Firestein 11e, Myositis-Specific Antibodies","Harrison 21e, Ch. IIM"]}},"114-159":{"quick":"圖示眼瞼 heliotrope 紫紅斑與手背 Gottron 丘疹樣皮疹 → 皮肌炎（dermatomyositis）。","detail":{"background":"特發性發炎性肌病（idiopathic inflammatory myopathies, IIM）包括皮肌炎（DM）、多發性肌炎（PM）、免疫媒介壞死性肌病（IMNM）與包涵體肌炎（IBM）。共同特徵為『近端、對稱性肌無力』（如蹲下站不起、舉手梳頭困難）與肌肉酵素上升（creatine kinase, CK/CPK 最敏感，亦升 aldolase、AST/ALT、LDH）。皮肌炎特徵性皮疹：Gottron 丘疹/徵候（指關節伸側紫紅丘疹）、heliotrope rash（眼瞼紫紅斑＋水腫）、shawl/V sign、mechanic's hand。肌炎特異抗體（MSA）有重要臨床對應：anti-Jo-1（與抗合成酶症候群——ILD、關節炎、mechanic's hand、發燒、雷諾）；anti-MDA5（臨床無肌病型皮肌炎 clinically amyopathic DM，合併『快速進行性間質性肺病 RP-ILD』、皮膚潰瘍，預後差）；anti-TIF1-γ 與 anti-NXP2（與『成人癌症相關肌炎』，尤其 DM 須篩癌）；anti-Mi-2（典型皮疹、預後較好、癌症關聯低）；anti-SRP/HMGCR（壞死性肌病）。皮肌炎（尤其>40 歲、anti-TIF1-γ）合併惡性腫瘤風險明顯升高，須積極篩檢。診斷靠肌酵素、肌電圖、MRI、肌肉切片與 MSA；治療以高劑量類固醇＋免疫抑制劑（MTX、azathioprine、MMF、IVIG，RP-ILD 需積極合併治療）。 圖示為皮肌炎特徵性皮疹（heliotrope rash 與 Gottron 丘疹/徵候）。盤狀紅斑狼瘡為附鱗屑盤狀斑、血管炎為可觸性紫斑、硬皮症為皮膚硬化、類澱粉沉著為蠟樣丘疹/紫斑，皆與此特徵皮疹不同。皮肌炎須評估近端肌無力、肌酵素並篩檢惡性腫瘤。","options":{"A":"盤狀紅斑狼瘡為界限分明附鱗屑盤狀斑塊，非 Gottron/heliotrope。","B":"正確。heliotrope 與 Gottron 皮疹是皮肌炎的特徵。","C":"血管炎為可觸性紫斑，分布與型態不同。","D":"硬皮症為皮膚硬化，非此紫紅丘疹。","E":"類澱粉沉著為蠟樣丘疹/眶周紫斑，非 Gottron/heliotrope。"},"sources":["Harrison 21e, Ch. Dermatomyositis","Kelley & Firestein 11e, IIM Skin"]}},"101-綜-8":{"quick":"確診乾燥症的必要檢查：Schirmer test(1)＋唾液腺閃爍攝影(3)＋anti-SSA/SSB(6)→ E（評估乾眼、唾液腺功能與特異抗體）。","detail":{"background":"乾燥症（Sjögren's syndrome）是侵犯外分泌腺（淚腺、唾液腺）的自體免疫疾病，導致乾眼（keratoconjunctivitis sicca）與口乾（xerostomia），可原發或續發於 RA、SLE 等。血清學以 anti-SSA/Ro 與 anti-SSB/La 為特徵，ANA、RF 常陽性，可有高球蛋白血症。診斷工具：Schirmer test（淚液分泌）、唾液腺閃爍攝影（sialoscintigraphy）/唾液流量、小唾液腺切片（focal lymphocytic sialadenitis, focus score≥1）與抗體。腺體外（extraglandular）表現：間質性腎炎與『遠端腎小管酸中毒（type 1 RTA）』、間質性肺病、周邊神經病變、紫斑/血管炎、關節炎。最重要的長期併發症是『非何杰金氏淋巴瘤（黏膜相關淋巴組織 MALT lymphoma）』風險增加約 5–10 倍，預測因子包括『持續性腮腺腫大』、紫斑、低補體、cryoglobulin、淋巴結腫大。 確立乾燥症需證明『乾眼（Schirmer test）＋唾液腺功能異常（sialoscintigraphy/唾液流量或小唾液腺切片）＋特異抗體（anti-SSA/SSB）』。RF、ANA、血清電泳雖常異常但非診斷必要的特異組合，故最佳為 (1)+(3)+(6)。","options":{"A":"含(2)RF、(4)ANA，雖常見但非確診乾燥症的必要特異檢查。","B":"含(5)血清電泳，非確診必要。","C":"含(2)RF、(4)ANA，非最特異組合。","D":"含(2)RF，非最特異。","E":"正確。Schirmer test(1)＋唾液腺閃爍攝影(3)＋anti-SSA/SSB(6) 對確診乾燥症最必要。"},"sources":["Kelley & Firestein 11e, Sjögren Syndrome","2016 ACR/EULAR Sjögren criteria"]}},"109-146":{"quick":"診斷 IgG4-RD「最不適合」的是組織有中性白血球浸潤(4)＋血清 anti-dsDNA 升高(5)→ D；IgG4-RD 為淋巴漿細胞浸潤、非中性球、非 dsDNA。","detail":{"background":"IgG4 相關疾病（IgG4-RD）是一群可侵犯多器官的纖維化發炎疾病，特徵為腫塊樣病灶、血清 IgG4 常升高、組織見『大量淋巴漿細胞浸潤＋席紋狀纖維化（storiform fibrosis）＋閉塞性靜脈炎＋IgG4+ 漿細胞浸潤（IgG4+/IgG+ 比例升高、常>40%）』，類固醇反應良好。常見侵犯器官：自體免疫性胰臟炎（type 1）、唾液腺（Mikulicz、下顎下腺）、淚腺、後腹腔纖維化、膽道、腎、肺、主動脈周圍；典型『不』侵犯髖等大關節。診斷不能只靠血清 IgG4（可正常或他病也升高），須結合臨床、影像、血清與『組織病理＋IgG4 免疫染色』。anti-SSA/SSB 多陰性（可與 Sjögren 鑑別）。 IgG4-RD 的組織學是『淋巴漿細胞（lymphoplasmacytic）浸潤＋席紋狀纖維化＋IgG4+ 漿細胞』，而非中性白血球浸潤；且其抗體並非 anti-dsDNA（那是 SLE）。故『中性白血球浸潤(4)＋anti-dsDNA(5)』最不適合用來診斷 IgG4-RD。血清 IgG4 升高(1)、淋巴漿細胞(2)、漿細胞浸潤(3) 皆為支持診斷的特徵。","options":{"A":"(1)血清 IgG4 升高、(2)淋巴漿細胞浸潤皆支持 IgG4-RD。","B":"(1)IgG4 升高、(3)漿細胞浸潤皆支持。","C":"(2)(3) 淋巴漿細胞/漿細胞浸潤皆支持。","D":"正確。中性白血球浸潤(4) 與 anti-dsDNA(5)（SLE 抗體）皆與 IgG4-RD 不符，最不適合診斷。","E":"(2)淋巴漿細胞浸潤支持 IgG4-RD，只有(4)不符，組合不如 D 完整錯誤。"},"sources":["Harrison 21e, Ch. IgG4-Related Disease","Kelley & Firestein 11e, IgG4-RD"]}},"109-147":{"quick":"IgG4-RD 為纖維化發炎疾病，最少侵犯髖關節（hip joint）；典型侵犯淚腺、唾液腺、肺、後腹腔等。","detail":{"background":"IgG4 相關疾病（IgG4-RD）是一群可侵犯多器官的纖維化發炎疾病，特徵為腫塊樣病灶、血清 IgG4 常升高、組織見『大量淋巴漿細胞浸潤＋席紋狀纖維化（storiform fibrosis）＋閉塞性靜脈炎＋IgG4+ 漿細胞浸潤（IgG4+/IgG+ 比例升高、常>40%）』，類固醇反應良好。常見侵犯器官：自體免疫性胰臟炎（type 1）、唾液腺（Mikulicz、下顎下腺）、淚腺、後腹腔纖維化、膽道、腎、肺、主動脈周圍；典型『不』侵犯髖等大關節。診斷不能只靠血清 IgG4（可正常或他病也升高），須結合臨床、影像、血清與『組織病理＋IgG4 免疫染色』。anti-SSA/SSB 多陰性（可與 Sjögren 鑑別）。 IgG4-RD 好發於腺體與軟組織器官（淚腺、唾液腺、胰、膽道、後腹腔、肺、腎、主動脈周圍），『大關節（如髖關節）』非典型侵犯部位。故最少侵犯髖關節。","options":{"A":"淚腺為 IgG4-RD 常見侵犯部位（淚腺炎/Mikulicz）。","B":"肺可被 IgG4-RD 侵犯（結節、間質病變）。","C":"唾液腺為常見侵犯部位。","D":"後腹腔纖維化為 IgG4-RD 典型表現。","E":"正確。髖關節等大關節是 IgG4-RD 最少侵犯的部位。"},"sources":["Harrison 21e, Ch. IgG4-RD","Kelley & Firestein 11e, IgG4-RD"]}},"109-153":{"quick":"口乾眼乾＋對稱腮腺腫＋眼皮浮腫，但 anti-SSA/SSB 陰性＋曾診斷胰臟炎 → IgG4 相關疾病（非乾燥症）。","detail":{"background":"IgG4 相關疾病（IgG4-RD）是一群可侵犯多器官的纖維化發炎疾病，特徵為腫塊樣病灶、血清 IgG4 常升高、組織見『大量淋巴漿細胞浸潤＋席紋狀纖維化（storiform fibrosis）＋閉塞性靜脈炎＋IgG4+ 漿細胞浸潤（IgG4+/IgG+ 比例升高、常>40%）』，類固醇反應良好。常見侵犯器官：自體免疫性胰臟炎（type 1）、唾液腺（Mikulicz、下顎下腺）、淚腺、後腹腔纖維化、膽道、腎、肺、主動脈周圍；典型『不』侵犯髖等大關節。診斷不能只靠血清 IgG4（可正常或他病也升高），須結合臨床、影像、血清與『組織病理＋IgG4 免疫染色』。anti-SSA/SSB 多陰性（可與 Sjögren 鑑別）。 本例雖有乾燥症狀與腮腺腫，但 anti-SSA/SSB『陰性』且有自體免疫性胰臟炎病史，最符合 IgG4-RD（可表現 Mikulicz 樣淚腺/唾液腺腫＋胰臟炎）。Sjögren 多 anti-SSA/SSB 陽性；慢性胰臟炎、淋巴瘤、肉狀瘤病無法同時解釋此多腺體＋胰臟＋抗體陰性的組合。","options":{"A":"Sicca/Sjögren 多 anti-SSA/SSB 陽性，與此陰性＋胰臟炎不符。","B":"正確。anti-SSA/SSB 陰性＋腺體腫＋胰臟炎，最符合 IgG4 相關疾病。","C":"慢性胰臟炎無法解釋雙側淚腺/唾液腺腫與眼皮浮腫。","D":"淋巴瘤需病理證實，且不符此典型 IgG4-RD 多腺體型態。","E":"肉狀瘤病（sarcoidosis）雖可腺體腫，但此處胰臟炎＋型態更指向 IgG4-RD。"},"sources":["Harrison 21e, Ch. IgG4-RD","Kelley & Firestein 11e, IgG4-RD"]}},"110-125":{"quick":"乾燥症狀＋雙側腮腺腫＋眼皮浮腫，但 anti-SSA/SSB 陰性＋amylase 升高 → 最有助診斷為腮腺浸潤淋巴球的 IgG4 染色（診斷 IgG4-RD）。","detail":{"background":"IgG4 相關疾病（IgG4-RD）是一群可侵犯多器官的纖維化發炎疾病，特徵為腫塊樣病灶、血清 IgG4 常升高、組織見『大量淋巴漿細胞浸潤＋席紋狀纖維化（storiform fibrosis）＋閉塞性靜脈炎＋IgG4+ 漿細胞浸潤（IgG4+/IgG+ 比例升高、常>40%）』，類固醇反應良好。常見侵犯器官：自體免疫性胰臟炎（type 1）、唾液腺（Mikulicz、下顎下腺）、淚腺、後腹腔纖維化、膽道、腎、肺、主動脈周圍；典型『不』侵犯髖等大關節。診斷不能只靠血清 IgG4（可正常或他病也升高），須結合臨床、影像、血清與『組織病理＋IgG4 免疫染色』。anti-SSA/SSB 多陰性（可與 Sjögren 鑑別）。 本例 anti-SSA/SSB 陰性、雙側腮腺腫＋眼皮浮腫＋胰澱粉酶升高，指向 IgG4-RD。診斷關鍵是組織病理＋IgG4 免疫染色（腮腺浸潤淋巴漿細胞的 IgG4 染色），而非單靠血清抗體或閃爍攝影。","options":{"A":"正確。腮腺浸潤淋巴球的 IgG4 染色（組織病理）對診斷 IgG4-RD 最有幫助。","B":"Serum IgG-RF 非 IgG4-RD 診斷關鍵。","C":"血清 cryoglobulin 與冷凝球蛋白血症相關，非此情境。","D":"anti-EBV 抗體非 IgG4-RD 診斷。","E":"Sialoscintigraphy 評估唾液腺功能，但不能診斷 IgG4-RD（需組織 IgG4 染色）。"},"sources":["Harrison 21e, Ch. IgG4-RD","Kelley & Firestein 11e, IgG4-RD"]}},"111-118":{"quick":"乾燥症最會導致淋巴瘤的危險因子是「長期腮腺腫大」（持續性腮腺腫）。","detail":{"background":"乾燥症（Sjögren's syndrome）是侵犯外分泌腺（淚腺、唾液腺）的自體免疫疾病，導致乾眼（keratoconjunctivitis sicca）與口乾（xerostomia），可原發或續發於 RA、SLE 等。血清學以 anti-SSA/Ro 與 anti-SSB/La 為特徵，ANA、RF 常陽性，可有高球蛋白血症。診斷工具：Schirmer test（淚液分泌）、唾液腺閃爍攝影（sialoscintigraphy）/唾液流量、小唾液腺切片（focal lymphocytic sialadenitis, focus score≥1）與抗體。腺體外（extraglandular）表現：間質性腎炎與『遠端腎小管酸中毒（type 1 RTA）』、間質性肺病、周邊神經病變、紫斑/血管炎、關節炎。最重要的長期併發症是『非何杰金氏淋巴瘤（黏膜相關淋巴組織 MALT lymphoma）』風險增加約 5–10 倍，預測因子包括『持續性腮腺腫大』、紫斑、低補體、cryoglobulin、淋巴結腫大。 在乾燥症的淋巴瘤（多為腮腺 MALT lymphoma）風險因子中，『持續性腮腺腫大』是最重要的臨床預測因子，其他包括紫斑、低補體（尤其低 C4）、cryoglobulin、淋巴結腫大、單株球蛋白。單純 ESR 上升、貧血、關節痛、肝功能異常並非主要淋巴瘤預測因子。","options":{"A":"ESR 上升非特異的淋巴瘤預測因子。","B":"貧血非主要淋巴瘤風險因子。","C":"正確。長期（持續性）腮腺腫大是乾燥症淋巴瘤最重要的預測因子。","D":"關節痛非淋巴瘤預測因子。","E":"肝功能異常非淋巴瘤主要預測因子。"},"sources":["Kelley & Firestein 11e, Sjögren & Lymphoma","Harrison 21e, Ch. Sjögren"]}},"111-125":{"quick":"乾燥症的腺體外併發症之一是遠端腎小管酸中毒（distal/type 1 RTA，源於間質性腎炎）。","detail":{"background":"乾燥症（Sjögren's syndrome）是侵犯外分泌腺（淚腺、唾液腺）的自體免疫疾病，導致乾眼（keratoconjunctivitis sicca）與口乾（xerostomia），可原發或續發於 RA、SLE 等。血清學以 anti-SSA/Ro 與 anti-SSB/La 為特徵，ANA、RF 常陽性，可有高球蛋白血症。診斷工具：Schirmer test（淚液分泌）、唾液腺閃爍攝影（sialoscintigraphy）/唾液流量、小唾液腺切片（focal lymphocytic sialadenitis, focus score≥1）與抗體。腺體外（extraglandular）表現：間質性腎炎與『遠端腎小管酸中毒（type 1 RTA）』、間質性肺病、周邊神經病變、紫斑/血管炎、關節炎。最重要的長期併發症是『非何杰金氏淋巴瘤（黏膜相關淋巴組織 MALT lymphoma）』風險增加約 5–10 倍，預測因子包括『持續性腮腺腫大』、紫斑、低補體、cryoglobulin、淋巴結腫大。 乾燥症的腎侵犯以『間質性腎炎』為主，導致遠端腎小管酸中毒（type 1 RTA，可致低血鉀、腎結石、骨病變）。葡萄膜炎偏脊椎關節病、慢性胰臟炎偏 IgG4-RD、後腹腔纖維化偏 IgG4-RD；貧血雖可見但非『特異』腺體外併發症，故最佳答案為 RTA。","options":{"A":"葡萄膜炎較偏脊椎關節病，非乾燥症典型腺體外併發症。","B":"慢性胰臟炎偏 IgG4-RD。","C":"後腹腔纖維化偏 IgG4-RD。","D":"正確。遠端腎小管酸中毒（type 1 RTA）是乾燥症的腺體外併發症（間質性腎炎所致）。","E":"貧血非乾燥症特異的腺體外併發症。"},"sources":["Harrison 21e, Ch. Sjögren — Renal","Kelley & Firestein 11e, Sjögren"]}},"112-115":{"quick":"肺腫塊＋淋巴漿細胞浸潤＋類固醇迅速改善 → IgG4-RD；最優先檢查為血清 IgG/IgG4(2)＋組織抗 IgG4 免疫染色(4)。","detail":{"background":"IgG4 相關疾病（IgG4-RD）是一群可侵犯多器官的纖維化發炎疾病，特徵為腫塊樣病灶、血清 IgG4 常升高、組織見『大量淋巴漿細胞浸潤＋席紋狀纖維化（storiform fibrosis）＋閉塞性靜脈炎＋IgG4+ 漿細胞浸潤（IgG4+/IgG+ 比例升高、常>40%）』，類固醇反應良好。常見侵犯器官：自體免疫性胰臟炎（type 1）、唾液腺（Mikulicz、下顎下腺）、淚腺、後腹腔纖維化、膽道、腎、肺、主動脈周圍；典型『不』侵犯髖等大關節。診斷不能只靠血清 IgG4（可正常或他病也升高），須結合臨床、影像、血清與『組織病理＋IgG4 免疫染色』。anti-SSA/SSB 多陰性（可與 Sjögren 鑑別）。 本例肺腫塊、病理為大量淋巴漿細胞浸潤、類固醇反應佳，高度懷疑 IgG4-RD。最優先的是『血清 IgG 與 IgG4 濃度』＋『腫塊組織抗 IgG4 免疫染色（IHC）』以確立診斷。ANA、ANCA 對 IgG4-RD 診斷幫助有限。","options":{"A":"(1)ANA 對 IgG4-RD 診斷幫助有限。","B":"(3)ANCA 偏血管炎，非 IgG4-RD。","C":"(1)ANA 非首選。","D":"(3)ANCA 非 IgG4-RD 診斷。","E":"正確。血清 IgG/IgG4(2)＋組織抗 IgG4 染色(4) 是診斷 IgG4-RD 最優先的檢查。"},"sources":["Harrison 21e, Ch. IgG4-RD","Kelley & Firestein 11e, IgG4-RD Diagnosis"]}},"112-120":{"quick":"乾燥症併發淋巴瘤的最佳預測因子是「腮腺長期腫大」（持續性腮腺腫大）。","detail":{"background":"乾燥症（Sjögren's syndrome）是侵犯外分泌腺（淚腺、唾液腺）的自體免疫疾病，導致乾眼（keratoconjunctivitis sicca）與口乾（xerostomia），可原發或續發於 RA、SLE 等。血清學以 anti-SSA/Ro 與 anti-SSB/La 為特徵，ANA、RF 常陽性，可有高球蛋白血症。診斷工具：Schirmer test（淚液分泌）、唾液腺閃爍攝影（sialoscintigraphy）/唾液流量、小唾液腺切片（focal lymphocytic sialadenitis, focus score≥1）與抗體。腺體外（extraglandular）表現：間質性腎炎與『遠端腎小管酸中毒（type 1 RTA）』、間質性肺病、周邊神經病變、紫斑/血管炎、關節炎。最重要的長期併發症是『非何杰金氏淋巴瘤（黏膜相關淋巴組織 MALT lymphoma）』風險增加約 5–10 倍，預測因子包括『持續性腮腺腫大』、紫斑、低補體、cryoglobulin、淋巴結腫大。 乾燥症淋巴瘤的預測因子以『持續性腮腺腫大』最重要，並含低補體、紫斑、cryoglobulin、淋巴結腫大。補體『增加』、白血球增加、anti-DNA 增加、IgE 增加皆非淋巴瘤預測因子（反而低補體才是危險因子）。","options":{"A":"補體『增加』非預測因子（低補體才是風險）。","B":"白血球增加非預測因子。","C":"正確。腮腺長期腫大是乾燥症淋巴瘤最重要的預測因子。","D":"anti-DNA 抗體增加偏 SLE，非乾燥症淋巴瘤預測因子。","E":"IgE 增加非淋巴瘤預測因子。"},"sources":["Kelley & Firestein 11e, Sjögren & Lymphoma","Harrison 21e, Ch. Sjögren"]}},"113-126":{"quick":"IgG4-RD 正確敘述：常見唾液腺腫大；可侵犯膽道與肝、anti-SSA 多陰性、較少視神經炎與多關節炎。","detail":{"background":"IgG4 相關疾病（IgG4-RD）是一群可侵犯多器官的纖維化發炎疾病，特徵為腫塊樣病灶、血清 IgG4 常升高、組織見『大量淋巴漿細胞浸潤＋席紋狀纖維化（storiform fibrosis）＋閉塞性靜脈炎＋IgG4+ 漿細胞浸潤（IgG4+/IgG+ 比例升高、常>40%）』，類固醇反應良好。常見侵犯器官：自體免疫性胰臟炎（type 1）、唾液腺（Mikulicz、下顎下腺）、淚腺、後腹腔纖維化、膽道、腎、肺、主動脈周圍；典型『不』侵犯髖等大關節。診斷不能只靠血清 IgG4（可正常或他病也升高），須結合臨床、影像、血清與『組織病理＋IgG4 免疫染色』。anti-SSA/SSB 多陰性（可與 Sjögren 鑑別）。 IgG4-RD 的正確特徵：①anti-SSA 多『陰性』（與 Sjögren 鑑別）；②常侵犯膽道與肝（硬化性膽管炎、自體免疫胰臟炎），故『不會有膽道肝臟症狀』錯誤；③唾液腺（下顎下腺）腫大常見（正確）；④以纖維化發炎為主，視神經炎非典型；⑤多關節炎非典型表現。","options":{"A":"IgG4-RD 之 anti-SSA 多陰性。","B":"錯誤。IgG4-RD 常侵犯膽道與肝（硬化性膽管炎、自體免疫胰臟炎）。","C":"正確。唾液腺腫大（下顎下腺）為 IgG4-RD 常見表現。","D":"視神經發炎非 IgG4-RD 典型（眼部多為淚腺/眼眶病變）。","E":"多發性關節炎非 IgG4-RD 典型表現。"},"sources":["Harrison 21e, Ch. IgG4-RD","Kelley & Firestein 11e, IgG4-RD"]}},"114-115":{"quick":"IgG4-RD 組織病理診斷指標：IgG4+/IgG+ 漿細胞比例 >40%（合併席紋狀纖維化等）；血清 IgG4 不一定升高。","detail":{"background":"IgG4 相關疾病（IgG4-RD）是一群可侵犯多器官的纖維化發炎疾病，特徵為腫塊樣病灶、血清 IgG4 常升高、組織見『大量淋巴漿細胞浸潤＋席紋狀纖維化（storiform fibrosis）＋閉塞性靜脈炎＋IgG4+ 漿細胞浸潤（IgG4+/IgG+ 比例升高、常>40%）』，類固醇反應良好。常見侵犯器官：自體免疫性胰臟炎（type 1）、唾液腺（Mikulicz、下顎下腺）、淚腺、後腹腔纖維化、膽道、腎、肺、主動脈周圍；典型『不』侵犯髖等大關節。診斷不能只靠血清 IgG4（可正常或他病也升高），須結合臨床、影像、血清與『組織病理＋IgG4 免疫染色』。anti-SSA/SSB 多陰性（可與 Sjögren 鑑別）。 IgG4-RD 的病理診斷重點之一是『IgG4+/IgG+ 漿細胞比例 >40%』，並結合每高倍視野 IgG4+ 細胞數、席紋狀纖維化與閉塞性靜脈炎。血清 IgG4 升高支持但『非必要』（可正常，他病也可升高），故『必定升高』為錯。","options":{"A":"錯誤。血清 IgG4 不一定升高（可正常）。","B":"正確。組織 IgG4+/IgG+ 漿細胞比例 >40% 是 IgG4-RD 的病理診斷指標。","C":">10% 比例過低，非診斷標準閾值。","D":"血清 IgG4>15 mg/dL 非診斷閾值（臨床多以 >135 mg/dL 為參考）。","E":"血清 IgG4>35 mg/dL 亦非標準診斷閾值。"},"sources":["2019 ACR/EULAR IgG4-RD Classification Criteria","Harrison 21e, Ch. IgG4-RD"]}},"114-122":{"quick":"乾燥症狀＋腮腺/頸淋巴腫＋眼皮浮腫，但 ANA/anti-SSA/SSB 陰性＋amylase 升高 → IgG4 相關疾病。","detail":{"background":"IgG4 相關疾病（IgG4-RD）是一群可侵犯多器官的纖維化發炎疾病，特徵為腫塊樣病灶、血清 IgG4 常升高、組織見『大量淋巴漿細胞浸潤＋席紋狀纖維化（storiform fibrosis）＋閉塞性靜脈炎＋IgG4+ 漿細胞浸潤（IgG4+/IgG+ 比例升高、常>40%）』，類固醇反應良好。常見侵犯器官：自體免疫性胰臟炎（type 1）、唾液腺（Mikulicz、下顎下腺）、淚腺、後腹腔纖維化、膽道、腎、肺、主動脈周圍；典型『不』侵犯髖等大關節。診斷不能只靠血清 IgG4（可正常或他病也升高），須結合臨床、影像、血清與『組織病理＋IgG4 免疫染色』。anti-SSA/SSB 多陰性（可與 Sjögren 鑑別）。 本例乾燥症狀＋雙側腮腺及眼眶/眼皮腫＋胰澱粉酶升高，但自體抗體（ANA、anti-SSA/SSB）皆陰性，最符合 IgG4-RD（Mikulicz 樣＋自體免疫胰臟炎）。Sjögren 多 anti-SSA/SSB 陽性；慢性胰臟炎、淋巴瘤、鼻咽癌無法解釋此多腺體＋抗體陰性組合。","options":{"A":"Sjögren 多 anti-SSA/SSB 陽性，與此陰性不符。","B":"慢性胰臟炎無法解釋雙側腺體腫與眼皮浮腫。","C":"正確。抗體陰性＋多腺體腫＋amylase 升高，最符合 IgG4 相關疾病。","D":"淋巴瘤需病理證實，型態不符典型 IgG4-RD。","E":"鼻咽癌不符此對稱多腺體＋胰臟表現。"},"sources":["Harrison 21e, Ch. IgG4-RD","Kelley & Firestein 11e, IgG4-RD"]}},"114-126":{"quick":"最容易發生「腺體外淋巴瘤（extranodal lymphoma）」的自體免疫病是乾燥症（Sjögren）——多為腮腺 MALT lymphoma。","detail":{"background":"乾燥症（Sjögren's syndrome）是侵犯外分泌腺（淚腺、唾液腺）的自體免疫疾病，導致乾眼（keratoconjunctivitis sicca）與口乾（xerostomia），可原發或續發於 RA、SLE 等。血清學以 anti-SSA/Ro 與 anti-SSB/La 為特徵，ANA、RF 常陽性，可有高球蛋白血症。診斷工具：Schirmer test（淚液分泌）、唾液腺閃爍攝影（sialoscintigraphy）/唾液流量、小唾液腺切片（focal lymphocytic sialadenitis, focus score≥1）與抗體。腺體外（extraglandular）表現：間質性腎炎與『遠端腎小管酸中毒（type 1 RTA）』、間質性肺病、周邊神經病變、紫斑/血管炎、關節炎。最重要的長期併發症是『非何杰金氏淋巴瘤（黏膜相關淋巴組織 MALT lymphoma）』風險增加約 5–10 倍，預測因子包括『持續性腮腺腫大』、紫斑、低補體、cryoglobulin、淋巴結腫大。 在系統性自體免疫病中，乾燥症的非何杰金氏（尤其腮腺 MALT）淋巴瘤風險最高（約 5–16 倍），與持續性腺體淋巴增生相關。SLE、RA、皮肌炎、硬皮症雖也略增淋巴瘤風險，但遠不及乾燥症的腺體外淋巴瘤傾向。","options":{"A":"正確。乾燥症最易發生腺體外（MALT）淋巴瘤。","B":"SLE 淋巴瘤風險略增，但不如乾燥症的腺體外淋巴瘤傾向。","C":"RA 淋巴瘤風險與疾病活動相關，但非腺體外為主。","D":"皮肌炎以實體癌（伴腫瘤肌炎）為主，非腺體外淋巴瘤。","E":"硬皮症與肺癌等相關，非腺體外淋巴瘤。"},"sources":["Kelley & Firestein 11e, Sjögren & Lymphoma","Harrison 21e, Ch. Sjögren"]}},"109-159":{"quick":"APS 診斷組合：深層靜脈栓塞(1)＋胎兒死亡(3)＋anti-β2-GPI 抗體陽性(5)→ A（臨床血栓/病態妊娠＋抗磷脂抗體）。","detail":{"background":"自體抗體與 HLA 是風濕免疫疾病診斷的核心工具。重要自體抗體對應：anti-dsDNA／anti-Sm↔SLE（高特異）；anti-ACPA（anti-CCP）↔RA（高特異）；anti-SSA/SSB↔Sjögren、新生兒狼瘡；anti-Scl-70／anti-centromere↔硬皮症；anti-Jo-1／anti-MDA5↔肌炎；anti-PR3（cANCA）↔GPA、anti-MPO（pANCA）↔MPA/EGPA；anti-RNP↔混合性結締組織病（MCTD）；anti-histone↔藥物誘發狼瘡；anti-mitochondrial↔PBC。HLA 疾病關聯（考試常考）：HLA-B27↔僵直性脊椎炎（關聯最強，OR 很高）與其他脊椎關節病；HLA-DR4／DRB1 shared epitope↔RA；HLA-B51↔Behçet；HLA-B*5701↔abacavir 過敏；HLA-B*5801↔allopurinol SJS/TEN。抗磷脂症候群（APS）：反覆動/靜脈血栓或病態妊娠（≥3 次<10 週流產、≥1 次≥10 週胎死、子癇前症早產）＋持續陽性抗磷脂抗體（lupus anticoagulant、anti-cardiolipin、anti-β2-glycoprotein I，間隔≥12 週兩次陽性）。APS 實驗室特徵：aPTT 延長（lupus anticoagulant 體外現象）但體內反而『高血栓』；可併血小板低下。治療以抗凝（warfarin；產科 APS 用 aspirin＋heparin）。 APS 分類需『臨床（血管栓塞或病態妊娠）＋實驗室（抗磷脂抗體持續陽性）』。題中 deep vein thrombosis（血栓）、fetal loss（病態妊娠）、anti-β2-GPI 陽性（抗體）三者皆為 APS 標準項目。皮膚瘀點、溶血、出血時間延長、抗血小板抗體、癲癇、關節炎、白血球增多、肺動脈高壓並非 APS 分類標準。","options":{"A":"正確。DVT(1)＋fetal loss(3)＋anti-β2-GPI(5) 皆為 APS 分類標準項目。","B":"cutaneous petechia(2)、hemolytic anemia(4)、anti-platelet antibody(8) 非 APS 分類項目。","C":"arthritis(10) 非 APS 分類項目。","D":"leukocytosis(11)、pulmonary hypertension(12) 非 APS 分類標準。","E":"prolong bleeding time(6)、premature delivery(7)（須伴子癇前症等條件）、epilepsy(9) 此組合不符標準。"},"sources":["Sydney/Revised APS Classification Criteria","Harrison 21e, Ch. Antiphospholipid Syndrome"]}},"110-122":{"quick":"HLA–疾病關聯最強的配對是 Rheumatoid arthritis ↔ HLA-DR4。","detail":{"background":"自體抗體與 HLA 是風濕免疫疾病診斷的核心工具。重要自體抗體對應：anti-dsDNA／anti-Sm↔SLE（高特異）；anti-ACPA（anti-CCP）↔RA（高特異）；anti-SSA/SSB↔Sjögren、新生兒狼瘡；anti-Scl-70／anti-centromere↔硬皮症；anti-Jo-1／anti-MDA5↔肌炎；anti-PR3（cANCA）↔GPA、anti-MPO（pANCA）↔MPA/EGPA；anti-RNP↔混合性結締組織病（MCTD）；anti-histone↔藥物誘發狼瘡；anti-mitochondrial↔PBC。HLA 疾病關聯（考試常考）：HLA-B27↔僵直性脊椎炎（關聯最強，OR 很高）與其他脊椎關節病；HLA-DR4／DRB1 shared epitope↔RA；HLA-B51↔Behçet；HLA-B*5701↔abacavir 過敏；HLA-B*5801↔allopurinol SJS/TEN。抗磷脂症候群（APS）：反覆動/靜脈血栓或病態妊娠（≥3 次<10 週流產、≥1 次≥10 週胎死、子癇前症早產）＋持續陽性抗磷脂抗體（lupus anticoagulant、anti-cardiolipin、anti-β2-glycoprotein I，間隔≥12 週兩次陽性）。APS 實驗室特徵：aPTT 延長（lupus anticoagulant 體外現象）但體內反而『高血栓』；可併血小板低下。治療以抗凝（warfarin；產科 APS 用 aspirin＋heparin）。 選項中正確且關聯成立的是 RA↔HLA-DR4（DRB1 shared epitope）。SLE 與 HLA-DR2/DR3 相關（非 B8）；Behçet↔HLA-B51（非 DR3）；Sjögren↔HLA-DR3（非 B27）；allopurinol 過敏↔HLA-B*5801（非 DR2）。","options":{"A":"正確。RA 與 HLA-DR4（shared epitope）相關。","B":"SLE 與 HLA-DR2/DR3 相關，非 B8（此配對不正確）。","C":"Behçet 與 HLA-B51 相關，非 DR3。","D":"Sjögren 與 HLA-DR3 相關，非 B27。","E":"allopurinol 過敏與 HLA-B*5801 相關，非 DR2。"},"sources":["Harrison 21e, Ch. HLA & Disease Association","Kelley & Firestein 11e"]}},"111-121":{"quick":"HLA loci 與免疫疾病關聯「最強」的是 Ankylosing spondylitis ↔ HLA-B27。","detail":{"background":"自體抗體與 HLA 是風濕免疫疾病診斷的核心工具。重要自體抗體對應：anti-dsDNA／anti-Sm↔SLE（高特異）；anti-ACPA（anti-CCP）↔RA（高特異）；anti-SSA/SSB↔Sjögren、新生兒狼瘡；anti-Scl-70／anti-centromere↔硬皮症；anti-Jo-1／anti-MDA5↔肌炎；anti-PR3（cANCA）↔GPA、anti-MPO（pANCA）↔MPA/EGPA；anti-RNP↔混合性結締組織病（MCTD）；anti-histone↔藥物誘發狼瘡；anti-mitochondrial↔PBC。HLA 疾病關聯（考試常考）：HLA-B27↔僵直性脊椎炎（關聯最強，OR 很高）與其他脊椎關節病；HLA-DR4／DRB1 shared epitope↔RA；HLA-B51↔Behçet；HLA-B*5701↔abacavir 過敏；HLA-B*5801↔allopurinol SJS/TEN。抗磷脂症候群（APS）：反覆動/靜脈血栓或病態妊娠（≥3 次<10 週流產、≥1 次≥10 週胎死、子癇前症早產）＋持續陽性抗磷脂抗體（lupus anticoagulant、anti-cardiolipin、anti-β2-glycoprotein I，間隔≥12 週兩次陽性）。APS 實驗室特徵：aPTT 延長（lupus anticoagulant 體外現象）但體內反而『高血栓』；可併血小板低下。治療以抗凝（warfarin；產科 APS 用 aspirin＋heparin）。 在所有 HLA–疾病關聯中，僵直性脊椎炎↔HLA-B27 的相對風險最高（OR 可達數十至上百倍），是關聯最強者。SLE↔DR2/DR3（非僅 DR2 且關聯較弱）；MG↔B8/DR3；Behçet↔B51；慢性活動性肝炎↔DR3。相較之下 AS↔B27 關聯最強。","options":{"A":"SLE 與 DR2/DR3 相關，但關聯強度不如 AS↔B27。","B":"正確。Ankylosing spondylitis 與 HLA-B27 關聯最強。","C":"重症肌無力與 HLA-B8 有關聯，但不如 AS↔B27 強。","D":"Behçet 與 HLA-B51 相關，但關聯強度不及 AS↔B27。","E":"慢性活動性肝炎與 DR3 相關，關聯較弱。"},"sources":["Harrison 21e, Ch. HLA & Disease","Kelley & Firestein 11e, AS"]}},"111-122":{"quick":"自體免疫病–自體抗體配對正確者：Granulomatosis with polyangiitis（GPA）↔ anti-proteinase 3 抗體（cANCA）。","detail":{"background":"自體抗體與 HLA 是風濕免疫疾病診斷的核心工具。重要自體抗體對應：anti-dsDNA／anti-Sm↔SLE（高特異）；anti-ACPA（anti-CCP）↔RA（高特異）；anti-SSA/SSB↔Sjögren、新生兒狼瘡；anti-Scl-70／anti-centromere↔硬皮症；anti-Jo-1／anti-MDA5↔肌炎；anti-PR3（cANCA）↔GPA、anti-MPO（pANCA）↔MPA/EGPA；anti-RNP↔混合性結締組織病（MCTD）；anti-histone↔藥物誘發狼瘡；anti-mitochondrial↔PBC。HLA 疾病關聯（考試常考）：HLA-B27↔僵直性脊椎炎（關聯最強，OR 很高）與其他脊椎關節病；HLA-DR4／DRB1 shared epitope↔RA；HLA-B51↔Behçet；HLA-B*5701↔abacavir 過敏；HLA-B*5801↔allopurinol SJS/TEN。抗磷脂症候群（APS）：反覆動/靜脈血栓或病態妊娠（≥3 次<10 週流產、≥1 次≥10 週胎死、子癇前症早產）＋持續陽性抗磷脂抗體（lupus anticoagulant、anti-cardiolipin、anti-β2-glycoprotein I，間隔≥12 週兩次陽性）。APS 實驗室特徵：aPTT 延長（lupus anticoagulant 體外現象）但體內反而『高血栓』；可併血小板低下。治療以抗凝（warfarin；產科 APS 用 aspirin＋heparin）。 各配對：①橋本氏甲狀腺炎↔anti-TPO/anti-thyroglobulin（『anti-TSH receptor』是 Graves 病）；②GPA↔anti-PR3（正確）；③SLE↔anti-dsDNA/Sm（非 anti-C3）；④RA↔ACPA/RF（非 anti-IgM）；⑤硬皮症↔anti-Scl-70/centromere（非 anti-epidermal cadherin，後者偏天疱瘡）。","options":{"A":"橋本氏甲狀腺炎為 anti-TPO/thyroglobulin；anti-TSH receptor 是 Graves 病。","B":"正確。GPA ↔ anti-proteinase 3 抗體（cANCA）。","C":"SLE 為 anti-dsDNA/Sm，非 anti-C3。","D":"RA 為 ACPA/RF，非 anti-IgM。","E":"硬皮症為 anti-Scl-70/centromere；anti-epidermal cadherin 偏天疱瘡。"},"sources":["Harrison 21e, Ch. Autoantibodies","Kelley & Firestein 11e"]}},"109-144":{"quick":"第 II 型（混合型）冷凝球蛋白血症最常見的原因是 C 型肝炎病毒感染。","detail":{"background":"冷凝球蛋白血症（cryoglobulinemia）是血清免疫球蛋白在低溫沉澱（37°C 再溶解）所致，分三型：第 I 型：單株免疫球蛋白（IgM 或 IgG），與淋巴增生疾病／漿細胞惡病質（多發性骨髓瘤、Waldenström、B 細胞淋巴瘤）相關，多表現高黏稠度與肢端缺血；第 II 型（混合型）：單株 IgM（具 RF 活性）＋多株 IgG，最常見原因是『C 型肝炎病毒感染』，表現可觸性紫斑、關節痛、周邊神經病變、膜增生性腎絲球腎炎（小血管炎）；第 III 型：多株 IgM＋IgG，多見於自體免疫病與感染。II/III 型合稱『混合型冷凝球蛋白血症』，是小血管免疫複合體血管炎。 第 II 型混合型冷凝球蛋白血症（單株 IgM-RF＋多株 IgG）絕大多數與『C 型肝炎病毒（HCV）』慢性感染相關，可表現下肢可觸性紫斑、關節痛、周邊神經病變與膜增生性腎絲球腎炎。治療針對 HCV（抗病毒 DAA）並依嚴重度加免疫治療。","options":{"A":"肺結核非第 II 型冷凝球蛋白血症的主要原因。","B":"正確。C 型肝炎病毒感染是第 II 型混合型冷凝球蛋白血症最常見的原因。","C":"梅毒非主要原因。","D":"淋病非冷凝球蛋白血症原因。","E":"念珠菌感染非冷凝球蛋白血症原因。"},"sources":["Harrison 21e, Ch. Cryoglobulinemia","Kelley & Firestein 11e, Cryoglobulinemic Vasculitis"]}},"109-145":{"quick":"B 細胞淋巴增生疾病引起的冷凝球蛋白血症是第一型（單株免疫球蛋白）。","detail":{"background":"冷凝球蛋白血症（cryoglobulinemia）是血清免疫球蛋白在低溫沉澱（37°C 再溶解）所致，分三型：第 I 型：單株免疫球蛋白（IgM 或 IgG），與淋巴增生疾病／漿細胞惡病質（多發性骨髓瘤、Waldenström、B 細胞淋巴瘤）相關，多表現高黏稠度與肢端缺血；第 II 型（混合型）：單株 IgM（具 RF 活性）＋多株 IgG，最常見原因是『C 型肝炎病毒感染』，表現可觸性紫斑、關節痛、周邊神經病變、膜增生性腎絲球腎炎（小血管炎）；第 III 型：多株 IgM＋IgG，多見於自體免疫病與感染。II/III 型合稱『混合型冷凝球蛋白血症』，是小血管免疫複合體血管炎。 第 I 型冷凝球蛋白為『單株』免疫球蛋白（IgM 或 IgG），與 B 細胞淋巴增生疾病／漿細胞惡病質（多發性骨髓瘤、Waldenström macroglobulinemia、慢性淋巴性白血病、B 細胞淋巴瘤）相關，臨床以高黏稠度與肢端缺血為主。","options":{"A":"正確。B 細胞淋巴增生疾病引起的是第一型（單株）冷凝球蛋白血症。","B":"第二型為單株 IgM＋多株 IgG，最常與 HCV 相關。","C":"第三型為多株，與自體免疫/感染相關。","D":"無第四型分類。","E":"無第五型分類。"},"sources":["Harrison 21e, Ch. Cryoglobulinemia","Williams Hematology, Cryoglobulinemia"]}},"110-80":{"quick":"每日高燒＋鮭魚色皮疹＋多關節炎＋白血球與鐵蛋白極度升高（ferritin 20000）→ 成人型 Still 病（AOSD）。","detail":{"background":"成人型 Still 病（adult-onset Still's disease, AOSD）是自體發炎疾病，三聯徵為『每日尖峰高燒、隨發燒出現的鮭魚色（salmon-pink）斑丘疹、關節炎/關節痛』，常伴咽痛、淋巴結與肝脾腫大、白血球（嗜中性球）顯著增多、肝功能異常。實驗室標誌為『血清鐵蛋白（ferritin）極度升高』且醣化鐵蛋白比例下降；ANA/RF 多為陰性（與 SLE/RA 鑑別）。為排除性診斷（須先排除感染、惡性腫瘤、其他結締組織病）。可併發巨噬細胞活化症候群（MAS/HLH）。 本例每日尖峰高燒、紅疹、關節炎、淋巴結與脾腫大、白血球 30000、CRP 高、ferritin 高達 20000，是 AOSD 的典型表現（極高 ferritin 為其特色）。SLE/SSc 有特定抗體與表現、AML 須骨髓檢查（但臨床型態不符）、AS 為中軸背痛，皆不符。","options":{"A":"SLE 多有特異抗體與多系統表現，ferritin 不會如此極端升高。","B":"全身性硬化症為皮膚硬化、雷諾，非每日高燒紅疹。","C":"正確。每日高燒＋鮭魚色疹＋關節炎＋極高 ferritin＋白血球增多，最符合成人型 Still 病。","D":"AML 以骨髓芽細胞增生為主，臨床型態與此自體發炎表現不符。","E":"僵直性脊椎炎為中軸發炎性背痛，與此全身性高燒紅疹不符。"},"sources":["Harrison 21e, Ch. Adult-Onset Still Disease","Yamaguchi criteria"]}},"110-115":{"quick":"SLE 病人高燒紅疹＋淋巴結腫＋骨髓噬血細胞 → 巨噬細胞活化症候群（MAS/HLH），最有幫助的是 ferritin(b)＋LDH(d)。","detail":{"background":"噬血症候群／巨噬細胞活化症候群（HLH/MAS）是過度發炎、細胞激素風暴導致的危急狀態，可原發（基因）或繼發（感染如 EBV/COVID、惡性腫瘤、自體免疫病如 SLE/AOSD）。診斷特徵（HLH-2004）：持續發燒、血球減少（≥2 系）、脾腫大、『高三酸甘油酯或低纖維蛋白原（fibrinogen↓）』、骨髓見噬血現象、『鐵蛋白（ferritin）極高（常>500，>10000 特異）』、低/無 NK 細胞活性、可溶性 IL-2 受體（sIL-2R/sCD25）升高。故典型實驗室組合為『ferritin↑、fibrinogen↓、sIL-2R↑、LDH↑』。治療依病因（控制基礎病＋類固醇/etoposide/IL-1 拮抗劑 anakinra 等）。 本例 SLE 併發 MAS（骨髓噬血現象），診斷與監測最有幫助的是『ferritin（極高）＋LDH（升高）』，此外纖維蛋白原下降、三酸甘油酯升高、sIL-2R 升高、血球減少亦支持。補體、ANA 對 SLE 本身有用，但對辨識『MAS』最具指標的是 ferritin 與 LDH。","options":{"A":"(a)補體＋(b)ferritin：補體反映 SLE 活動，但對 MAS 指標不如 LDH 直接。","B":"(a)補體＋(c)ANA 評估 SLE，但非 MAS 的關鍵指標。","C":"(b)ferritin＋(c)ANA：ANA 非 MAS 指標。","D":"正確。ferritin(b)＋LDH(d) 對辨識 SLE 併發的巨噬細胞活化症候群（MAS/HLH）最有幫助。","E":"(c)ANA＋(e)ALT 對 MAS 診斷幫助有限。"},"sources":["HLH-2004 criteria","Harrison 21e, Ch. HLH / MAS"]}},"112-114":{"quick":"COVID 併噬血症候群（HLH）的典型實驗室組合：ferritin↑、fibrinogen↓、sIL-2R↑→ 答 B（(1)上升(2)下降(3)上升）。","detail":{"background":"噬血症候群／巨噬細胞活化症候群（HLH/MAS）是過度發炎、細胞激素風暴導致的危急狀態，可原發（基因）或繼發（感染如 EBV/COVID、惡性腫瘤、自體免疫病如 SLE/AOSD）。診斷特徵（HLH-2004）：持續發燒、血球減少（≥2 系）、脾腫大、『高三酸甘油酯或低纖維蛋白原（fibrinogen↓）』、骨髓見噬血現象、『鐵蛋白（ferritin）極高（常>500，>10000 特異）』、低/無 NK 細胞活性、可溶性 IL-2 受體（sIL-2R/sCD25）升高。故典型實驗室組合為『ferritin↑、fibrinogen↓、sIL-2R↑、LDH↑』。治療依病因（控制基礎病＋類固醇/etoposide/IL-1 拮抗劑 anakinra 等）。 本例 COVID-19 誘發 HLH，符合 HLH-2004：鐵蛋白（ferritin）顯著上升、纖維蛋白原（fibrinogen）下降（因消耗/巨噬細胞活化）、可溶性 IL-2 受體（sIL-2R）上升。故 (1)ferritin↑、(2)fibrinogen↓、(3)sIL-2R↑。","options":{"A":"fibrinogen 應『下降』而非上升。","B":"正確。ferritin 上升、fibrinogen 下降、sIL-2R 上升，符合 HLH。","C":"sIL-2R 應上升而非下降。","D":"ferritin 應上升而非下降。","E":"ferritin 應上升、fibrinogen 應下降。"},"sources":["HLH-2004 criteria","Harrison 21e, Ch. HLH"]}},"113-124":{"quick":"貝西氏症的眼睛症狀以全葡萄膜炎（pan-uveitis）最常見且最嚴重（可致失明）。","detail":{"background":"貝西氏症（Behçet's disease）是侵犯各口徑血管的變異性血管炎，特徵為『反覆口腔潰瘍（必備）、生殖器潰瘍、眼睛侵犯（全葡萄膜炎 panuveitis、視網膜血管炎，可致失明）、皮膚病變（結節性紅斑、假性毛囊炎）』。其他：針刺反應（pathergy）陽性、可侵犯腸道、神經（neuro-Behçet）、大血管（動靜脈栓塞、肺動脈瘤）。與 HLA-B51 相關，好發於『絲路』地區（土耳其、中東、東亞）。眼睛侵犯以全葡萄膜炎最常見且嚴重，是失明主因。治療依器官，重症（眼/神經/血管）用類固醇＋免疫抑制劑（azathioprine、cyclosporine、抗 TNF）。 貝西氏症的眼侵犯以『全葡萄膜炎（pan-uveitis）』與視網膜血管炎最具特徵，常為雙側、反覆發作，是失明主因，須積極免疫治療。慢性結膜炎、鞏膜外層炎、單純視網膜炎、淚腺發炎皆非其典型眼表現。","options":{"A":"慢性結膜炎非貝西氏症典型眼表現。","B":"鞏膜外層炎較偏 RA 等，非貝西氏症典型。","C":"單純視網膜炎非最常見（多為合併葡萄膜的全葡萄膜炎）。","D":"正確。全葡萄膜炎（pan-uveitis）是貝西氏症最常見且嚴重的眼侵犯。","E":"淚腺發炎偏 Sjögren/IgG4-RD，非貝西氏症。"},"sources":["Harrison 21e, Ch. Behçet Syndrome","Kelley & Firestein 11e, Behçet"]}},"114-158":{"quick":"圖示口腔潰瘍＋結節性紅斑 → 貝西氏症（Behçet syndrome），核心臨床特徵為反覆口腔潰瘍與結節性紅斑等皮膚病變。","detail":{"background":"貝西氏症（Behçet's disease）是侵犯各口徑血管的變異性血管炎，特徵為『反覆口腔潰瘍（必備）、生殖器潰瘍、眼睛侵犯（全葡萄膜炎 panuveitis、視網膜血管炎，可致失明）、皮膚病變（結節性紅斑、假性毛囊炎）』。其他：針刺反應（pathergy）陽性、可侵犯腸道、神經（neuro-Behçet）、大血管（動靜脈栓塞、肺動脈瘤）。與 HLA-B51 相關，好發於『絲路』地區（土耳其、中東、東亞）。眼睛侵犯以全葡萄膜炎最常見且嚴重，是失明主因。治療依器官，重症（眼/神經/血管）用類固醇＋免疫抑制劑（azathioprine、cyclosporine、抗 TNF）。 圖示皮膚病灶＋題幹組合指向貝西氏症，其最重要臨床特徵為反覆口腔潰瘍（必備）與結節性紅斑等皮膚表現，並可有生殖器潰瘍、葡萄膜炎、針刺反應陽性。皮肌炎（Gottron）、RA（類風濕結節）、硬皮症（指端硬化）、感染性心內膜炎（Janeway）皆與此不符。","options":{"A":"正確。口腔潰瘍＋結節性紅斑為貝西氏症的核心臨床特徵。","B":"皮肌炎以 Gottron 徵候/heliotrope 為特徵，非結節性紅斑＋口腔潰瘍。","C":"類風濕結節為皮下結節，非此表現。","D":"硬皮症為指端硬化/潰瘍，非結節性紅斑。","E":"感染性心內膜炎的 Janeway 病灶為手掌足底無痛紅斑。"},"sources":["Harrison 21e, Ch. Behçet Syndrome","International Criteria for Behçet"]}},"112-159":{"quick":"圖示為皮肌炎（V/shawl 字胸前紅斑＋手背 Gottron）；皮肌炎「最不可能」有生殖器潰瘍(1)與虹彩炎/葡萄膜炎(5)→ 答 C。","detail":{"background":"皮肌炎（dermatomyositis）特徵性皮疹包括 heliotrope rash、Gottron 丘疹/徵候、以及光照分布的『V 字（前胸頸）／shawl（披肩）紅斑』與 mechanic's hand。皮肌炎常合併：間質性肺病（可致呼吸窘迫，尤其 anti-MDA5/抗合成酶）、ANA 等自體抗體陽性、皮膚『搔癢』（DM 皮疹常劇癢）；並與成人惡性腫瘤相關。相對地，『生殖器潰瘍』與『虹彩炎／葡萄膜炎』是貝西氏症與脊椎關節病的表現，並非皮肌炎特徵。故本例皮肌炎最不可能出現 (1) 生殖器潰瘍與 (5) 虹彩炎。","options":{"A":"(1)生殖器潰瘍與(2)呼吸窘迫——呼吸窘迫（ILD）可見於皮肌炎，故此組合非『皆不可能』。","B":"(2)呼吸窘迫、(3)ANA 陽性、(4)皮膚搔癢皆可見於皮肌炎，非『不可能』。","C":"正確。生殖器潰瘍(1)與虹彩炎/葡萄膜炎(5) 是貝西氏症/脊椎關節病特徵，皮肌炎最不可能出現。","D":"(4)皮膚搔癢可見於皮肌炎，非不可能。","E":"(3)ANA 陽性、(4)搔癢皆可見於皮肌炎。"},"sources":["Harrison 21e, Ch. Dermatomyositis","Kelley & Firestein 11e, IIM Skin"]}},"107-綜-9":{"quick":"中重度持續型過敏性鼻炎，除免疫療法外的首選藥物是鼻內類固醇噴劑（intranasal glucocorticoid）。","detail":{"background":"過敏免疫學常考主題：過敏性鼻炎（allergic rhinitis）為 IgE 媒介第一型過敏；中重度持續型的『最有效單一藥物』是鼻內類固醇噴劑（intranasal corticosteroid），優於口服抗組織胺；免疫療法（減敏）為改變病程的根治性選擇。藥物引起的蕁麻疹（urticaria）可經 IgE 或非免疫（直接肥大細胞去顆粒）機制，常見藥物包括鴉片類、NSAID、ACE 抑制劑（亦致血管性水腫）、顯影劑、抗生素；β2 交感神經興奮劑非典型誘因。 本例對塵蟎高度致敏的中度持續型過敏性鼻炎，除減敏免疫療法外，最有效的單一藥物是『鼻內類固醇噴劑』（可全面改善鼻塞、流涕、噴嚏與癢）。口服或全身類固醇不宜長期、抗 IgE 用於特定氣喘、口服去充血劑/抗組織胺效果不及鼻內類固醇。","options":{"A":"正確。鼻內類固醇噴劑是中重度持續型過敏性鼻炎最有效的首選藥物。","B":"中等劑量口服類固醇不宜長期使用，副作用多。","C":"抗 IgE 抗體（omalizumab）主要用於特定中重度氣喘/慢性蕁麻疹，非過敏性鼻炎首選。","D":"口服去充血劑（pseudoephedrine）僅緩解鼻塞、不宜長期。","E":"口服抗組織胺效果不及鼻內類固醇，且對鼻塞改善有限。"},"sources":["ARIA Guideline (Allergic Rhinitis)","Harrison 21e, Ch. Allergic Rhinitis"]}},"108-綜-8":{"quick":"生物製劑–適應症配對正確者：Anti-TNF-α 單株抗體 ↔ 類風濕性關節炎（RA）。","detail":{"background":"風濕免疫治療涵蓋傳統 DMARD、生物製劑與標靶藥，配對機轉與適應症是考試重點：抗 TNF-α（etanercept、adalimumab、infliximab）↔RA、AS、乾癬性關節炎、IBD（但抗 TNF 反而可能誘發藥物性狼瘡、惡化心衰與脫髓鞘）；抗 IL-6 受體 tocilizumab↔RA、巨細胞動脈炎、CAR-T 細胞激素風暴；抗 CD20 rituximab↔RA、ANCA 相關血管炎、B 細胞淋巴瘤（非急性 B 淋巴細胞白血病）；abatacept（CTLA-4-Ig）↔RA（T 細胞共刺激抑制）；belimumab（抗 BAFF）、anifrolumab（抗 IFNAR1）↔SLE；抗 IL-17（secukinumab）、抗 IL-23↔乾癬/乾癬性關節炎/AS；JAK 抑制劑（tofacitinib）↔RA。免疫檢查點抑制劑（PD-1/PD-L1、CTLA-4）會引發免疫相關不良事件（irAE），含關節炎、肌炎、乾燥症樣、甲狀腺炎、大腸炎、肝炎、肺炎等，處理以分級類固醇（中重度需『高劑量類固醇逐漸減量』），重症加其他免疫抑制。懷孕用藥安全（風濕病好發育齡女性）：可續用 hydroxychloroquine、sulfasalazine、azathioprine、低劑量類固醇、certolizumab；『禁用』methotrexate、mycophenolate、cyclophosphamide、leflunomide（致畸）。 各配對：①IVIG 用於川崎病、免疫缺乏、部分自體免疫（非 leukocytoclastic vasculitis 首選）；②抗 IgE（omalizumab）用於氣喘/慢性蕁麻疹，非過敏性休克（過敏性休克用腎上腺素）；③抗 TNF-α↔RA（正確）；④抗 CD20（rituximab）用於 RA/血管炎/淋巴瘤，非 CREST；⑤抗 CD3 非 SLE 治療。","options":{"A":"IVIG 並非 leukocytoclastic vasculitis 的標準對應治療。","B":"過敏性休克以腎上腺素為第一線，非抗 IgE 抗體。","C":"正確。抗 TNF-α 單株抗體用於類風濕性關節炎。","D":"抗 CD20（rituximab）非 CREST（limited SSc）治療。","E":"抗 CD3 單株抗體非 SLE 治療。"},"sources":["Harrison 21e, Ch. Biologic Therapies","Kelley & Firestein 11e"]}},"109-95":{"quick":"生物製劑–疾病配對正確者：Anti-TNF-α 單株抗體 ↔ 類風濕性關節炎（RA）。","detail":{"background":"風濕免疫治療涵蓋傳統 DMARD、生物製劑與標靶藥，配對機轉與適應症是考試重點：抗 TNF-α（etanercept、adalimumab、infliximab）↔RA、AS、乾癬性關節炎、IBD（但抗 TNF 反而可能誘發藥物性狼瘡、惡化心衰與脫髓鞘）；抗 IL-6 受體 tocilizumab↔RA、巨細胞動脈炎、CAR-T 細胞激素風暴；抗 CD20 rituximab↔RA、ANCA 相關血管炎、B 細胞淋巴瘤（非急性 B 淋巴細胞白血病）；abatacept（CTLA-4-Ig）↔RA（T 細胞共刺激抑制）；belimumab（抗 BAFF）、anifrolumab（抗 IFNAR1）↔SLE；抗 IL-17（secukinumab）、抗 IL-23↔乾癬/乾癬性關節炎/AS；JAK 抑制劑（tofacitinib）↔RA。免疫檢查點抑制劑（PD-1/PD-L1、CTLA-4）會引發免疫相關不良事件（irAE），含關節炎、肌炎、乾燥症樣、甲狀腺炎、大腸炎、肝炎、肺炎等，處理以分級類固醇（中重度需『高劑量類固醇逐漸減量』），重症加其他免疫抑制。懷孕用藥安全（風濕病好發育齡女性）：可續用 hydroxychloroquine、sulfasalazine、azathioprine、低劑量類固醇、certolizumab；『禁用』methotrexate、mycophenolate、cyclophosphamide、leflunomide（致畸）。 各配對：①soluble CTLA-4（abatacept）用於 RA（T 細胞共刺激抑制），非 T 細胞淋巴瘤；②抗 TNF-α↔RA（正確）；③IVIG 非多發性骨髓瘤治療；④抗 CD20（rituximab）用於 B 細胞淋巴瘤/RA/血管炎，非急性 B 淋巴細胞白血病；⑤抗 IL-6 受體（tocilizumab）用於 RA/GCA，非 SLE。","options":{"A":"abatacept（CTLA-4-Ig）用於 RA，非 T 細胞淋巴瘤。","B":"正確。抗 TNF-α 單株抗體 ↔ 類風濕性關節炎。","C":"IVIG 非多發性骨髓瘤的治療。","D":"rituximab（抗 CD20）非急性 B 淋巴細胞白血病的標準用藥。","E":"抗 IL-6 受體（tocilizumab）用於 RA/GCA，非 SLE。"},"sources":["Harrison 21e, Ch. Biologic Therapies","Kelley & Firestein 11e"]}},"112-124":{"quick":"使用 PD-1/PD-L1 免疫檢查點抑制劑時，最常引起的「自體免疫風濕」併發症是乾燥症（Sjögren’s）樣表現。","detail":{"background":"風濕免疫治療涵蓋傳統 DMARD、生物製劑與標靶藥，配對機轉與適應症是考試重點：抗 TNF-α（etanercept、adalimumab、infliximab）↔RA、AS、乾癬性關節炎、IBD（但抗 TNF 反而可能誘發藥物性狼瘡、惡化心衰與脫髓鞘）；抗 IL-6 受體 tocilizumab↔RA、巨細胞動脈炎、CAR-T 細胞激素風暴；抗 CD20 rituximab↔RA、ANCA 相關血管炎、B 細胞淋巴瘤（非急性 B 淋巴細胞白血病）；abatacept（CTLA-4-Ig）↔RA（T 細胞共刺激抑制）；belimumab（抗 BAFF）、anifrolumab（抗 IFNAR1）↔SLE；抗 IL-17（secukinumab）、抗 IL-23↔乾癬/乾癬性關節炎/AS；JAK 抑制劑（tofacitinib）↔RA。免疫檢查點抑制劑（PD-1/PD-L1、CTLA-4）會引發免疫相關不良事件（irAE），含關節炎、肌炎、乾燥症樣、甲狀腺炎、大腸炎、肝炎、肺炎等，處理以分級類固醇（中重度需『高劑量類固醇逐漸減量』），重症加其他免疫抑制。懷孕用藥安全（風濕病好發育齡女性）：可續用 hydroxychloroquine、sulfasalazine、azathioprine、低劑量類固醇、certolizumab；『禁用』methotrexate、mycophenolate、cyclophosphamide、leflunomide（致畸）。 免疫檢查點抑制劑（ICI）的風濕性免疫相關不良事件（rheumatic irAE）中，發炎性關節炎與『乾燥症樣（口乾眼乾、唾液腺炎）』表現最常見；SLE、ANCA 血管炎、肌炎相對少見。本題以 Sjögren’s 為最常引起者。","options":{"A":"正確。ICI 最常引起乾燥症（Sjögren’s）樣的風濕性免疫相關不良事件。","B":"ICI 誘發 SLE 相對少見。","C":"ICI 可誘發發炎性關節炎，但乾燥症樣表現於本題為最常見答案。","D":"ANCA 相關血管炎為 ICI 少見併發症。","E":"ICI 相關肌炎雖危險（可合併心肌炎）但發生率較乾燥症樣表現低。"},"sources":["Kelley & Firestein 11e, Immune-Related Adverse Events","Harrison 21e, Ch. Checkpoint Inhibitor Toxicity"]}},"112-157":{"quick":"藥物引起蕁麻疹「最不」常見的藥物類別是乙二型交感神經興奮劑（β2 agonists）。","detail":{"background":"過敏免疫學常考主題：過敏性鼻炎（allergic rhinitis）為 IgE 媒介第一型過敏；中重度持續型的『最有效單一藥物』是鼻內類固醇噴劑（intranasal corticosteroid），優於口服抗組織胺；免疫療法（減敏）為改變病程的根治性選擇。藥物引起的蕁麻疹（urticaria）可經 IgE 或非免疫（直接肥大細胞去顆粒）機制，常見藥物包括鴉片類、NSAID、ACE 抑制劑（亦致血管性水腫）、顯影劑、抗生素；β2 交感神經興奮劑非典型誘因。 常見引起蕁麻疹的藥物為鴉片類（直接肥大細胞去顆粒）、NSAID、ACE 抑制劑（亦致血管性水腫）、顯影劑、抗生素（如 β-lactam）。β2 交感神經興奮劑（如沙丁胺醇）非典型誘發蕁麻疹的藥物，故『最不』常見。","options":{"A":"鴉片類可直接促肥大細胞去顆粒引起蕁麻疹。","B":"NSAID 是常見引起蕁麻疹/血管性水腫的藥物。","C":"ACE 抑制劑可引起蕁麻疹與血管性水腫。","D":"正確。β2 交感神經興奮劑最不常引起藥物性蕁麻疹。","E":"顯影劑為常見引起急性蕁麻疹/過敏反應的藥物。"},"sources":["Harrison 21e, Ch. Urticaria & Drug Allergy","Kelley & Firestein 11e"]}},"113-117":{"quick":"SARS-CoV-2 感染後較會「活化」自體免疫病（SLE、RA、APS、T1DM）；肝癌（hepatoma）不會被免疫機制活化，故較少。","detail":{"background":"風濕免疫治療涵蓋傳統 DMARD、生物製劑與標靶藥，配對機轉與適應症是考試重點：抗 TNF-α（etanercept、adalimumab、infliximab）↔RA、AS、乾癬性關節炎、IBD（但抗 TNF 反而可能誘發藥物性狼瘡、惡化心衰與脫髓鞘）；抗 IL-6 受體 tocilizumab↔RA、巨細胞動脈炎、CAR-T 細胞激素風暴；抗 CD20 rituximab↔RA、ANCA 相關血管炎、B 細胞淋巴瘤（非急性 B 淋巴細胞白血病）；abatacept（CTLA-4-Ig）↔RA（T 細胞共刺激抑制）；belimumab（抗 BAFF）、anifrolumab（抗 IFNAR1）↔SLE；抗 IL-17（secukinumab）、抗 IL-23↔乾癬/乾癬性關節炎/AS；JAK 抑制劑（tofacitinib）↔RA。免疫檢查點抑制劑（PD-1/PD-L1、CTLA-4）會引發免疫相關不良事件（irAE），含關節炎、肌炎、乾燥症樣、甲狀腺炎、大腸炎、肝炎、肺炎等，處理以分級類固醇（中重度需『高劑量類固醇逐漸減量』），重症加其他免疫抑制。懷孕用藥安全（風濕病好發育齡女性）：可續用 hydroxychloroquine、sulfasalazine、azathioprine、低劑量類固醇、certolizumab；『禁用』methotrexate、mycophenolate、cyclophosphamide、leflunomide（致畸）。 COVID-19 可透過免疫失調、分子模擬與發炎，觸發或活化多種自體免疫疾病（SLE、RA、抗磷脂症候群、第一型糖尿病等）。肝癌（hepatoma）屬惡性腫瘤，並非免疫活化機制下『被活化』的疾病，故最少被 COVID 活化。","options":{"A":"SLE 可在 COVID 後被觸發/活化。","B":"RA 可在 COVID 後被觸發/活化。","C":"抗磷脂症候群（APS）可在 COVID 相關高凝/免疫下被活化。","D":"正確。肝癌非免疫活化機制下的疾病，最少被 COVID 活化。","E":"第一型糖尿病（自體免疫）可在 COVID 後被觸發。"},"sources":["Kelley & Firestein 11e, Infection & Autoimmunity","Harrison 21e, Ch. COVID-19"]}},"114-113":{"quick":"免疫療法（ICI）引起的肝炎用高劑量類固醇後，應『由高劑量逐漸減量再停藥』，不可驟停。","detail":{"background":"風濕免疫治療涵蓋傳統 DMARD、生物製劑與標靶藥，配對機轉與適應症是考試重點：抗 TNF-α（etanercept、adalimumab、infliximab）↔RA、AS、乾癬性關節炎、IBD（但抗 TNF 反而可能誘發藥物性狼瘡、惡化心衰與脫髓鞘）；抗 IL-6 受體 tocilizumab↔RA、巨細胞動脈炎、CAR-T 細胞激素風暴；抗 CD20 rituximab↔RA、ANCA 相關血管炎、B 細胞淋巴瘤（非急性 B 淋巴細胞白血病）；abatacept（CTLA-4-Ig）↔RA（T 細胞共刺激抑制）；belimumab（抗 BAFF）、anifrolumab（抗 IFNAR1）↔SLE；抗 IL-17（secukinumab）、抗 IL-23↔乾癬/乾癬性關節炎/AS；JAK 抑制劑（tofacitinib）↔RA。免疫檢查點抑制劑（PD-1/PD-L1、CTLA-4）會引發免疫相關不良事件（irAE），含關節炎、肌炎、乾燥症樣、甲狀腺炎、大腸炎、肝炎、肺炎等，處理以分級類固醇（中重度需『高劑量類固醇逐漸減量』），重症加其他免疫抑制。懷孕用藥安全（風濕病好發育齡女性）：可續用 hydroxychloroquine、sulfasalazine、azathioprine、低劑量類固醇、certolizumab；『禁用』methotrexate、mycophenolate、cyclophosphamide、leflunomide（致畸）。 免疫檢查點抑制劑引起的中重度免疫相關肝炎，以高劑量類固醇治療，症狀改善後須『逐漸減量（taper，常 4–6 週以上）再停藥』，以免發炎反彈；驟停（無論在 20 或 10 mg/日）皆不適當，也不應因副作用而不使用必要的類固醇。","options":{"A":"疫情控制與此無關，且不可立即停類固醇。","B":"此情境需要類固醇治療免疫相關肝炎，並非不適合使用。","C":"正確。類固醇應由高劑量逐漸減量至低劑量後再停藥。","D":"減至 20 mg/日仍不可直接停藥，須繼續緩慢減量。","E":"減至 10 mg/日仍不可直接停藥，須緩慢 taper 以免反彈。"},"sources":["ASCO/NCCN irAE Management Guideline","Kelley & Firestein 11e, irAE"]}},"114-120":{"quick":"風濕病懷孕用藥：hydroxychloroquine（HCQ）被視為孕期相對安全、應續用；MTX、MMF、cyclophosphamide 致畸禁用，抗 TNF 多數可用。","detail":{"background":"風濕免疫治療涵蓋傳統 DMARD、生物製劑與標靶藥，配對機轉與適應症是考試重點：抗 TNF-α（etanercept、adalimumab、infliximab）↔RA、AS、乾癬性關節炎、IBD（但抗 TNF 反而可能誘發藥物性狼瘡、惡化心衰與脫髓鞘）；抗 IL-6 受體 tocilizumab↔RA、巨細胞動脈炎、CAR-T 細胞激素風暴；抗 CD20 rituximab↔RA、ANCA 相關血管炎、B 細胞淋巴瘤（非急性 B 淋巴細胞白血病）；abatacept（CTLA-4-Ig）↔RA（T 細胞共刺激抑制）；belimumab（抗 BAFF）、anifrolumab（抗 IFNAR1）↔SLE；抗 IL-17（secukinumab）、抗 IL-23↔乾癬/乾癬性關節炎/AS；JAK 抑制劑（tofacitinib）↔RA。免疫檢查點抑制劑（PD-1/PD-L1、CTLA-4）會引發免疫相關不良事件（irAE），含關節炎、肌炎、乾燥症樣、甲狀腺炎、大腸炎、肝炎、肺炎等，處理以分級類固醇（中重度需『高劑量類固醇逐漸減量』），重症加其他免疫抑制。懷孕用藥安全（風濕病好發育齡女性）：可續用 hydroxychloroquine、sulfasalazine、azathioprine、低劑量類固醇、certolizumab；『禁用』methotrexate、mycophenolate、cyclophosphamide、leflunomide（致畸）。 孕期可續用且建議使用的是 hydroxychloroquine（降低狼瘡復發與新生兒心臟傳導阻滯風險）；methotrexate、mycophenolate、cyclophosphamide、leflunomide 為致畸劑須停用並避孕；抗 TNF-α（尤其 certolizumab 胎盤通過少）多數孕期可用，並非『有危險』。","options":{"A":"正確。hydroxychloroquine 孕期相對安全、應續用。","B":"錯誤。MTX 為致畸劑（流產、畸形），孕期禁用。","C":"錯誤。mycophenolate 致畸（顏面/耳畸形），孕期禁用。","D":"錯誤。cyclophosphamide 具致畸與性腺毒性，孕期禁用。","E":"錯誤。抗 TNF-α（尤其 certolizumab）多數孕期可用，並非對胎兒有危險。"},"sources":["2020 ACR Reproductive Health in Rheumatic Diseases Guideline","Kelley & Firestein 11e, Pregnancy"]}}},TO=["全身性紅斑性狼瘡 (SLE)", "類風濕性關節炎 (RA)", "脊椎關節病變與反應性關節炎", "痛風與晶體性關節病", "退化性關節炎與關節液分析", "血管炎", "全身性硬化症（硬皮症）與雷諾現象", "發炎性肌病（皮肌炎/多發性肌炎）", "乾燥症與 IgG4 相關疾病", "自體抗體、HLA 與抗磷脂症候群", "自體發炎、貝西氏症、冷凝球蛋白與噬血症候群", "免疫治療、過敏免疫與風濕藥理"];

const PKEY='im_rheum_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
