_answers":["A"],"topic":"6產科急症與產後生理","topic_num":"分娩併發症與手術產","topic_code":"O5","q_num":20,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"呈現病理性收縮環","B":"通常發生在分娩時或分娩剛結束","C":"常發生於羊膜破水後","D":"易出現心肺功能衰竭和休克"},"img":""}],E={"101030-N4-35":{"quick":"肛門瘻管不是剖腹產的合併症。","detail":{"background":"剖腹產(C/S)可能合併症:麻醉相關(低血壓、吸入性肺炎)、術中/術後出血、傷口感染與裂開、子宮內膜炎、腹腔(內臟)沾黏、泌尿道感染與膀胱損傷、麻醉後腸蠕動減弱致腹脹/腸阻塞、臥床致下肢深部靜脈血栓/血栓性靜脈炎、肺栓塞。「肛門瘻管」屬肛門直腸疾病,與剖腹產無關。本題「不是」剖腹產合併症者為「肛門瘻管」(C)。","options":{"A":"是。臥床致肢體血栓性靜脈炎。","B":"是。腹腔(內臟)沾黏。","C":"本題答案。肛門瘻管與剖腹產無關。","D":"是。傷口感染。"},"sources":["新文京《產科護理學》剖腹產合併症","手術產"]}},"102110-N4-20":{"quick":"剖腹產自恢復室返室,立即評估「不」包括Homan氏徵象。","detail":{"background":"剖腹產術後返室立即評估(優先):「意識/清醒程度、生命徵象(呼吸道與呼吸、血壓脈搏)、子宮收縮硬度與惡露量(出血)、傷口、輸液與導尿(尿量/尿色)、區域麻醉者下肢感覺恢復」。Homan氏徵象(評估深部靜脈血栓)屬「後續(產後數日)」評估,非剛返室的立即項目。本題「不包括」者為「Homan氏徵象」(D)。","options":{"A":"立即評估。意識警醒程度。","B":"立即評估。生命徵象。","C":"立即評估。子宮收縮硬度與惡露量。","D":"本題答案。Homan氏徵象屬後續血栓評估,非立即項目。"},"sources":["新文京《產科護理學》剖腹產術後","返室評估"]}},"103030-N4-21":{"quick":"剛返室的剖腹產產婦,「做產後完整衛教」不合宜。","detail":{"background":"剛接受剖腹產返室(麻醉未完全恢復、可能嗜睡/不適)的護理重點是「監測:測量血壓與生命徵象、觀察傷口、觀察尿色尿量(有無血尿、膀胱損傷)、子宮收縮與惡露」。「完整產後衛教」需在產婦清醒、穩定、能專注學習時(術後較後期)再進行,剛返室不合宜。本題「不合宜」者為「做產後完整衛教」(B)。","options":{"A":"合宜。測量血壓。","B":"不合宜(本題答案)。剛返室不宜做完整衛教(產婦未清醒專注)。","C":"合宜。觀察尿中有無血色。","D":"合宜。檢查傷口情形。"},"sources":["新文京《產科護理學》剖腹產術後","返室護理"]}},"103100-N4-14":{"quick":"剖腹產方式敘述中「子宮下段剖腹生產適合緊急剖腹手術」為錯誤。","detail":{"background":"剖腹產切口方式:「子宮下段橫切(低位橫切, lower segment transverse)」是目前最常用——出血少、癒合好、子宮破裂風險低、下一胎較可行VBAC,但「下段較窄、暴露較費時,不適合需快速取出胎兒的緊急情況」;「子宮上段(古典式)直切」手術空間大、胎兒易娩出,適合緊急或前置胎盤/橫位,但出血多、破裂風險高、下一胎不宜VBAC。故「子宮下段適合緊急手術」錯誤(緊急用上段)。本題「錯誤」者為B。","options":{"A":"正確。子宮上段切開手術空間大、胎兒易娩出。","B":"錯誤(本題答案)。緊急剖腹宜用上段,下段較費時不適合緊急。","C":"正確。前胎頭盆不對稱者不適合VBAC。","D":"正確。子宮低位橫切為目前常用方式。"},"sources":["新文京《產科護理學》剖腹產切口","手術產"]}},"105030-N4-21":{"quick":"緩解剖腹生產傷口疼痛,適當措施是「教導呼吸放鬆技巧」。","detail":{"background":"剖腹產傷口疼痛護理:教導「呼吸放鬆技巧、依醫囑給止痛劑、咳嗽/翻身時以手或枕頭支托傷口、漸進活動」。「環形中空坐墊」用於會陰傷口/痔瘡(非腹部剖腹傷口);「俯臥」會壓迫腹部傷口、不適;「避免擦澡/儘量臥床」錯誤——早期下床活動可促腸蠕動、防血栓與腸沾黏,清潔仍應維持。本題適當者為「教導呼吸放鬆技巧」(D)。","options":{"A":"環形中空坐墊用於會陰傷口,非腹部傷口。","B":"俯臥會壓迫腹部傷口,不宜。","C":"錯。不應避免擦澡或一味臥床(應漸進活動)。","D":"正確。教導呼吸放鬆技巧緩解傷口疼痛。"},"sources":["新文京《產科護理學》剖腹產傷口疼痛","術後護理"]}},"105090-N4-20":{"quick":"剖腹產後護理正確的是「必要時可於腹部塗抹薄荷油以促進腸蠕動、避免腹脹」。","detail":{"background":"剖腹產後護理:(1)「鼓勵早期下床活動促進腸蠕動、排氣、防血栓與沾黏」(非儘量臥床);(2)硬脊膜外麻醉「不須平躺8小時」(脊髓麻醉刺破硬膜才可能需平躺防頭痛);(3)母乳哺餵「不需因麻醉延後」(藥物進入乳汁量極微,鼓勵術後儘早哺餵、肌膚接觸);(4)「必要時腹部塗薄荷油/熱敷、多翻身活動可促腸蠕動、緩解腹脹」——正確。本題正確為「腹部塗薄荷油促腸蠕動」(D)。","options":{"A":"錯。硬脊膜外麻醉不須平躺8小時。","B":"錯。應早期下床活動,非儘量臥床。","C":"錯。不需因麻醉延後哺乳(鼓勵儘早哺乳)。","D":"正確。必要時腹部塗薄荷油促腸蠕動、避免腹脹。"},"sources":["新文京《產科護理學》剖腹產術後","腸蠕動"]}},"106111-N4-20":{"quick":"剖腹產術後第一天已排氣,開始進食之初宜選「新鮮果汁」(清流質起)。","detail":{"background":"剖腹產術後飲食漸進:術後禁食→「排氣後由清流質(如新鮮果汁、米湯)開始→全流質→半流質→普通飲食」。「米飯麵包」屬固體,進食之初過早;「麻油雞」油膩、「生化湯」屬產後傳統補品(且含活血成分,不宜術後初期立即用),皆非排氣後初進食的適合選擇。本題進食之初宜選「新鮮果汁」(C)。","options":{"A":"生化湯含活血成分,非排氣初進食首選。","B":"麻油雞油膩,非進食之初適合。","C":"正確。排氣後由清流質(新鮮果汁)開始。","D":"米飯麵包屬固體,進食之初過早。"},"sources":["新文京《產科護理學》剖腹產術後飲食","清流質"]}},"108110-N4-19":{"quick":"剖腹產術後照護敘述中「等產婦可下床活動時再哺餵母乳」為錯誤。","detail":{"background":"剖腹產術後照護:(1)平躺時頭側一邊避免分泌物阻塞呼吸道(麻醉未醒)——正確;(2)產後1小時內每15分鐘測生命徵象——正確;(3)導尿管常留置至少約8–12小時(待麻醉退、能自解尿)——正確;(4)「哺餵母乳不需等到可下床」——應「儘早(產後即可由人協助採側臥或橄欖球抱姿哺餵)」,愈早吸吮愈利泌乳與子宮收縮。故「等可下床才哺乳」錯誤。本題「錯誤」者為D。","options":{"A":"正確。平躺頭側一邊避免分泌物阻塞呼吸道。","B":"正確。產後1小時內每15分鐘測生命徵象。","C":"正確。導尿管留置至少約8小時。","D":"錯誤(本題答案)。應儘早哺乳,不需等可下床。"},"sources":["新文京《產科護理學》剖腹產術後","哺乳"]}},"109110-N4-21":{"quick":"剖腹產後第一天腹脹(叩診鼓音、子宮收縮良好、傷口無滲液),最優先護理是「協助翻身與下床、避免產氣食物」。","detail":{"background":"本例剖腹產後第一天主訴腹痛,評估「腹部叩診鼓音(腸脹氣)、子宮收縮良好、惡露正常、傷口無滲液」→腹痛主因是「術後腸蠕動減弱的腹脹(脹氣)」。最優先護理:「協助翻身與早期下床活動促腸蠕動排氣、避免進食產氣食物(豆類、奶類、甜食)」。傷口美容膠(免縫膠帶)防水、不需每日清潔更換;惡露少仍須評估非僅洗澡。本題最優先為「協助翻身與下床、避免產氣食物」(D)。","options":{"A":"惡露量少仍須評估,非僅洗澡。","B":"錯。美容膠防水、不需每日清潔更換。","C":"多喝水高纖有助,但「翻身下床活動」對排氣更直接優先。","D":"正確。協助翻身下床促腸蠕動、避免產氣食物。"},"sources":["新文京《產科護理學》剖腹產術後腹脹","早期下床"]}},"111030-N4-15":{"quick":"剖腹產手術前護理最適當的是「手術前1天及手術當天應聽診胎心音」。","detail":{"background":"剖腹產術前護理:(1)「手術前1天及手術當天聽診/監測胎心音」確認胎兒狀況——最適當;(2)劃線標記、剃毛(若需要)於手術當天進行,非前1天(過早增感染);(3)術前抗焦慮劑非常規於前一晚使用;(4)術前禁食(固體約8小時、清水約2小時),低渣飲食非「術前3天」常規。本題最適當為「術前1天及當天聽診胎心音」(D)。","options":{"A":"劃線標記應於手術當天,非前1天。","B":"抗焦慮劑非術前一晚常規。","C":"低渣飲食非術前3天常規。","D":"正確。術前1天及當天應聽診胎心音。"},"sources":["新文京《產科護理學》剖腹產術前","胎心音"]}},"112030-N4-23":{"quick":"剖腹產術前後護理正確的是「採區域性麻醉者,術後不必等排氣即可進食」。","detail":{"background":"剖腹產術前後:(1)術前禁食固體約「6–8小時」(非4小時)、清水約2小時;(2)若需剃毛範圍約「肚臍下至恥骨/陰阜」,「不」剃到大腿1/2;(3)「採區域(脊髓/硬膜外)麻醉者,腸蠕動受影響小,術後不必等排氣即可由溫水/清流質漸進進食」——正確(全身麻醉者才較需待腸蠕動恢復);(4)導尿管於麻醉退、能自解尿後即可移除(非「點滴移除後才移除」)。本題正確為「區域麻醉術後不必等排氣即可進食」(C)。","options":{"A":"術前禁食固體約6–8小時,非4小時。","B":"剃毛範圍至恥骨,不剃到大腿1/2。","C":"正確。區域麻醉術後不必等排氣即可進食。","D":"導尿管於能自解尿後移除,非待點滴移除後。"},"sources":["新文京《產科護理學》剖腹產術前後","區域麻醉"]}},"112110-N4-11":{"quick":"前置胎盤剖腹產的產後立即照護中「至少每4小時監測生命徵象一次」為錯誤。","detail":{"background":"前置胎盤剖腹產屬「出血高風險」,產後立即照護須「密集監測」:「最初每15分鐘監測生命徵象與出血(惡露量)、子宮底位置與張力(子宮收縮)、傷口出血」,並評估區域麻醉後下肢感覺恢復。「每4小時測一次」間隔過長、不符出血高風險產後的密集監測。本題「錯誤」者為「至少每4小時監測生命徵象一次」(A)。","options":{"A":"錯誤(本題答案)。產後立即應每15分鐘密集監測,非每4小時。","B":"正確。評估傷口出血及惡露量。","C":"正確。評估子宮底位置及張力。","D":"正確。每15分鐘評估下肢感覺恢復。"},"sources":["新文京《產科護理學》前置胎盤剖腹產","產後監測"]}},"114100-N4-12":{"quick":"剖腹產後第2天腹脹想不下床,最適當護理是「進行腸道評估,鼓勵下床活動緩解腹脹」。","detail":{"background":"剖腹產後第2天「腹脹不適、不想下床」:術後腸蠕動減弱致脹氣,「早期下床活動」是促腸蠕動排氣、緩解腹脹、防血栓與沾黏的關鍵。最適當護理:「先腸道評估(聽腸蠕動音、有無排氣),並鼓勵與協助下床活動緩解腹脹」(而非順其臥床、禁食或等腹脹改善才下床)。本題最適當為「腸道評估+鼓勵下床活動」(D)。","options":{"A":"僅給止痛藥未解決腹脹根源(腸蠕動)。","B":"錯。不應等腹脹改善才下床,下床本身助排氣。","C":"禁食非腹脹處置,且不利恢復。","D":"正確。腸道評估並鼓勵下床活動緩解腹脹。"},"sources":["新文京《產科護理學》剖腹產術後腹脹","早期下床"]}},"115030-N4-14":{"quick":"剖腹產(硬膜外麻醉)返室後進食指導,最適當是「現在就可開始喝溫水,若無噁心嘔吐即可進食」。","detail":{"background":"採「區域(硬膜外/脊髓)麻醉」的剖腹產,腸蠕動受影響小,術後「不必等排氣,清醒、生命徵象穩定後即可先試喝溫水,若無噁心嘔吐再漸進進食」。(全身麻醉者才較需待腸蠕動/排氣恢復。)故不需「等排氣」、「禁食6小時待腸蠕動聲」或「等肚子餓」。本例硬膜外麻醉、已返室,最適當為「現在就可開始喝溫水,無噁心嘔吐即可進食」(B)。","options":{"A":"區域麻醉不必等排氣才可進食。","B":"正確。現在可試喝溫水,無噁心嘔吐即可進食。","C":"禁食6小時待腸蠕動聲過於保守(區域麻醉)。","D":"「等肚子餓」非進食判斷依據。"},"sources":["新文京《產科護理學》剖腹產術後飲食","區域麻醉"]}},"101110-N4-61":{"quick":"VBAC敘述中「前胎是胎兒窘迫而剖腹產者此胎不宜行VBAC」為錯誤。","detail":{"background":"剖腹產後陰道生產(VBAC)條件:適合者——前胎採「子宮下段橫切」、單胎頭位、無頭盆不對稱、無前置胎盤、無子宮破裂史、設備可緊急剖腹。「前胎剖腹原因若為非重複性(如胎兒窘迫、臀位、前置胎盤已解除),此胎仍可考慮VBAC」;不宜VBAC者:前胎「子宮上段(古典式)直切」、曾子宮破裂、多次剖腹、本胎前置胎盤/頭盆不對稱。VBAC好處包括避免手術沾黏、增加正向生產經驗。本題「錯誤」者為「前胎胎兒窘迫剖腹此胎不宜VBAC」(D)。","options":{"A":"正確。前胎子宮上段切開者不鼓勵VBAC。","B":"正確。VBAC可避免骨盆腔沾黏。","C":"正確。VBAC能增加正向生產經驗。","D":"錯誤(本題答案)。前胎因胎兒窘迫(非重複性原因)此胎仍可考慮VBAC。"},"sources":["新文京《產科護理學》VBAC","手術產"]}},"108020-N4-13":{"quick":"吸入性麻醉全身麻醉剖腹產敘述中「一般以吸入性麻醉藥物作為麻醉誘導用藥」為錯誤。","detail":{"background":"剖腹產全身麻醉:「誘導(induction)」通常以「靜脈麻醉劑(如thiopental/propofol)＋肌肉鬆弛劑」快速誘導並插管(產科常用快速順序誘導RSI防吸入性肺炎),「吸入性麻醉劑」則用於誘導後的維持,非作為「誘導用藥」。吸入性麻醉劑會鬆弛子宮(影響收縮、增出血)、為脂溶性易過胎盤抑制新生兒;全身麻醉影響心血管易低血壓、有吸入性肺炎風險。本題「錯誤」者為「以吸入性麻醉作為誘導用藥」(C)。","options":{"A":"錯誤(本題答案)。誘導用靜脈麻醉劑,吸入性用於維持。","B":"正確。吸入性麻醉鬆弛子宮、影響收縮需注意出血。","C":"(原C正確敘述)全身麻醉影響心血管易低血壓。","D":"正確。吸入性麻醉脂溶性過胎盤、抑制新生兒神經行為。"},"sources":["新文京《產科護理學》全身麻醉","剖腹產麻醉"]}},"108020-N4-25":{"quick":"雙胞胎剖腹(硬脊膜外麻醉)返室,「不」是優先評估的是「腸蠕動」。","detail":{"background":"剖腹產(硬脊膜外麻醉)雙胞胎產婦剛返室的優先評估:「子宮收縮(子宮張大、收縮乏力出血風險高)、傷口出血與惡露、生命徵象、區域麻醉後下肢神經肌肉感覺恢復、母乳哺餵」。「腸蠕動恢復」是術後後續評估(排氣指標),非剛返室的優先項目。本題「不是優先」者為「腸蠕動」(C)。","options":{"A":"優先。子宮收縮(雙胞胎子宮過脹易收縮乏力出血)。","B":"優先。母乳哺餵(鼓勵儘早)。","C":"本題答案。腸蠕動為後續評估,非剛返室優先。","D":"優先。下肢神經肌肉感覺恢復(區域麻醉)。"},"sources":["新文京《產科護理學》剖腹產返室","優先評估"]}},"111110-N4-27":{"quick":"VBAC敘述正確的是「曾有子宮破裂病史者此胎不宜行VBAC」。","detail":{"background":"VBAC:(1)「曾子宮破裂病史→絕對禁忌,不宜VBAC」——正確;(2)前胎剖腹「次數會影響」(多次剖腹、上段古典直切→破裂風險高,不宜VBAC);(3)「前置胎盤」是本胎陰道產禁忌,不可VBAC;(4)前胎「子宮下段橫切」是適合VBAC的條件(非不宜)。本題正確為「曾子宮破裂病史者不宜VBAC」(D)。","options":{"A":"錯。前胎剖腹次數會影響VBAC(多次不宜)。","B":"錯。前置胎盤者不可VBAC。","C":"錯。前胎子宮下段橫切適合VBAC。","D":"正確。曾子宮破裂病史者不宜VBAC(絕對禁忌)。"},"sources":["新文京《產科護理學》VBAC禁忌","子宮破裂"]}},"112030-N4-18":{"quick":"剖腹產為減少藥物對胎兒副作用,宜採「腰椎硬膜外麻醉法」(區域麻醉)。","detail":{"background":"剖腹產麻醉選擇:「區域麻醉(腰椎硬膜外/脊髓麻醉)為首選」——母親清醒、藥物對胎兒影響小、可立即親子接觸、避免全身麻醉的吸入性肺炎與新生兒呼吸抑制。「靜脈/吸入性全身麻醉藥」會過胎盤抑制新生兒(僅用於緊急或區域麻醉禁忌時);「陰部阻斷(pudendal block)」用於陰道產會陰麻醉,非剖腹產。本題減少胎兒副作用宜採「腰椎硬膜外麻醉」(B)。","options":{"A":"靜脈全身麻醉劑過胎盤、影響胎兒。","B":"正確。腰椎硬膜外麻醉(區域麻醉)對胎兒影響小。","C":"陰部阻斷用於陰道產會陰,非剖腹產。","D":"吸入性全身麻醉過胎盤抑制新生兒。"},"sources":["新文京《產科護理學》剖腹產麻醉","區域麻醉"]}},"112180-N4-11":{"quick":"剖腹產前腰椎硬膜外麻醉,「麻醉前靜脈輸液1,000c.c.葡萄糖水」為不適當。","detail":{"background":"剖腹產前硬膜外麻醉:(1)協助產婦「側臥呈蝦米狀(弓背)」或坐姿穿刺、(2)穿刺部位約「L3–L4(脊髓圓錐以下)」、(3)藥物注入後密切監測生命徵象(防低血壓)、(4)「麻醉前先靜脈輸液擴容預防低血壓——但應用晶體液(如0.9%生理食鹽水或乳酸林格氏液),不可用葡萄糖水」(輸大量葡萄糖會致母體高血糖→胎兒高胰島素血症→出生後低血糖,且葡萄糖水留在血管內擴容效果差)。本題「不適當」者為「麻醉前靜脈輸液1000c.c.葡萄糖水」(B)。","options":{"A":"適當。協助側躺呈蝦米狀(弓背)。","B":"不適當(本題答案)。應給晶體液擴容,不可用葡萄糖水。","C":"適當。穿刺於L3或L4腰椎間。","D":"適當。藥物注入後密切監測生命徵象。"},"sources":["新文京《產科護理學》硬膜外麻醉","擴容晶體液"]}},"112180-N4-12":{"quick":"子宮下段橫切剖腹(脊髓麻醉)術後照護中「術後採辛式臥位」為錯誤。","detail":{"background":"脊髓(蜘蛛膜下腔)麻醉剖腹產術後照護:(1)導尿管留置至少約8小時(待麻醉退能自解尿)——正確;(2)「脊髓麻醉後因可能脊髓性頭痛(腦脊髓液滲漏),須平躺(去枕平躺)而非辛式臥位(左側臥/頭低)」,故「術後採辛式臥位」錯誤;(3)給足夠水分2500–3000c.c./天(補充並助脊髓性頭痛恢復)——正確;(4)「子宮下段橫切者下一胎可嘗試VBAC」——正確。本題「錯誤」者為「術後採辛式臥位」(B)。","options":{"A":"正確。導尿管術後留置至少8小時。","B":"錯誤(本題答案)。脊髓麻醉後應平躺,非辛式臥位。","C":"正確。給足夠水分2500–3000c.c./天。","D":"正確。子宮下段橫切下一胎可嘗試VBAC。"},"sources":["新文京《產科護理學》脊髓麻醉術後","脊髓性頭痛"]}},"105030-N4-12":{"quick":"會陰切開術敘述中「會陰部較短較常使用正中會陰切開術」為錯誤。","detail":{"background":"會陰切開術:「正中切開(median)」——沿會陰正中向肛門方向切,失血少、疼痛輕、易縫合癒合好,但「會陰體較短者不宜(易延伸成三、四度撕裂傷至肛門括約肌/直腸)」;「側斜切開(mediolateral)」——向側下方斜切,較不易延伸至肛門(適合會陰短者),但失血較多、較痛、不易縫合、癒合較久。實證不建議例行性會陰切開(僅必要時)。本題「錯誤」者為「會陰部較短較常用正中切開」(A,會陰短宜側斜)。","options":{"A":"錯誤(本題答案)。會陰部較短者宜用側斜切開,非正中切開。","B":"正確。正中切開失血量較少。","C":"正確。實證不建議例行性會陰切開。","D":"正確。側斜切開不易縫合、癒合時間長。"},"sources":["新文京《產科護理學》會陰切開","正中vs側斜"]}},"106111-N4-13":{"quick":"三度會陰撕裂傷範圍為「從皮膚、陰道黏膜、會陰肌肉延伸至肛門括約肌」。","detail":{"background":"會陰撕裂傷分度:第一度——皮膚與陰道黏膜(未及肌肉);第二度——延伸至會陰肌肉(未及肛門括約肌);第三度——延伸至肛門括約肌;第四度——貫穿肛門括約肌延伸至直腸黏膜。本題三度=「皮膚、陰道黏膜、會陰肌肉延伸至肛門括約肌」(D)。","options":{"A":"「延伸至直腸」屬第四度。","B":"「延伸至會陰肌肉」屬第二度。","C":"「僅皮膚或陰道黏膜」屬第一度。","D":"正確。三度=延伸至肛門括約肌。"},"sources":["新文京《產科護理學》會陰撕裂分度","產道損傷"]}},"107110-N4-25":{"quick":"REEDA評估會陰傷口中「R為Redness(發紅)」正確。","detail":{"background":"REEDA為評估會陰(或傷口)癒合的指標:R=Redness(發紅)、E=Edema(水腫)、E=Ecchymosis(瘀斑)、D=Discharge(分泌物)、A=Approximation(傷口對合程度)。各項評分愈高表癒合愈差/感染風險。本題正確配對為「R=Redness發紅」(A);E非Edge(邊緣)、D非Drain(引流)、A非Abscess(膿瘍)。","options":{"A":"正確。R為Redness(發紅)。","B":"錯。E為Edema(水腫)/Ecchymosis(瘀斑),非Edge。","C":"錯。D為Discharge(分泌物),非Drain。","D":"錯。A為Approximation(傷口對合),非Abscess。"},"sources":["新文京《產科護理學》REEDA","會陰傷口評估"]}},"114030-N4-9":{"quick":"會陰皮膚及陰道黏膜撕裂但未及肌肉層,應記錄為「第一度」會陰撕裂傷。","detail":{"background":"會陰撕裂分度:第一度——僅「皮膚與陰道黏膜」(未及肌肉);第二度——延伸至會陰肌肉;第三度——至肛門括約肌;第四度——至直腸黏膜。本例「會陰皮膚及陰道黏膜撕裂、未裂至肌肉層」=「第一度」(A)。 補充:第一度撕裂多可自癒或簡單縫合,護理採會陰護理(溫水沖洗、由前往後清潔、冰敷消腫初期、之後溫水坐浴促癒合)、以REEDA評估癒合;第二度以上需逐層縫合,第三、四度因涉及肛門括約肌/直腸,須注意排便(軟便劑、避免便秘用力)與感染、避免灌腸與肛溫測量。會陰撕裂分度與會陰切開術同屬產道損傷評估重點。","options":{"A":"正確。皮膚與陰道黏膜未及肌肉=第一度。","B":"第二度需延伸至會陰肌肉。","C":"第三度需至肛門括約肌。","D":"第四度需至直腸黏膜。"},"sources":["新文京《產科護理學》會陰撕裂分度","產道損傷"]}},"102110-N4-21":{"quick":"產後按摩子宮第一步「一手置於恥骨聯合上方支托子宮」的主要目的是「避免子宮內翻」。","detail":{"background":"產後按摩子宮(防/治子宮收縮乏力出血)的正確手法:「一手置於恥骨聯合上方支托子宮下段(固定子宮),另一手指腹在子宮底輕柔旋轉按摩」。下方手支托固定的「主要目的是避免按摩用力時子宮被往下推而發生子宮內翻(uterine inversion)」(子宮內翻是產科急症)。本題第一步驟主要目的為「避免子宮內翻」(C)。","options":{"A":"非主要為避免壓迫膀胱。","B":"非主要為方便按摩。","C":"正確。支托固定子宮以避免子宮內翻。","D":"感覺硬度是按摩底手的功能,非下方支托手的主要目的。"},"sources":["新文京《產科護理學》按摩子宮","子宮內翻"]}},"106110-N4-34":{"quick":"嚴重產後出血的徵象為「失血超過1000c.c.」。","detail":{"background":"產後出血(PPH)定義:陰道產>500c.c.、剖腹產>1000c.c.;「嚴重(大量)產後出血」一般指失血>1000c.c.或伴血流動力學不穩。低血容休克徵象為「血壓下降、心跳加快(>100)、皮膚濕冷蒼白、尿量減少」。選項中「失血超過1000c.c.」為嚴重出血徵象;血壓僅降15mmHg、心跳60次/分(偏慢)、體溫100.6°F(微燒)皆非嚴重出血的指標。本題為「失血超過1000c.c.」(C)。","options":{"A":"血壓僅降15mmHg非嚴重出血指標(休克時降更多)。","B":"心跳60次/分偏慢,出血應心跳加快。","C":"正確。失血超過1000c.c.為嚴重產後出血。","D":"體溫100.6°F屬微燒,非出血徵象。"},"sources":["新文京《產科護理學》產後出血","低血容休克"]}},"109110-N4-35":{"quick":"陰道產的產後出血定義是「產後24小時內出血超過500c.c.」。","detail":{"background":"產後出血(PPH)定義(以失血量):「陰道生產——產後24小時內失血>500c.c.」;剖腹產——>1000c.c.。依時間分:早期(原發性)=24小時內(最常子宮收縮乏力);晚期(續發性)=產後24小時至6週(常胎盤殘留/感染)。本題陰道產定義為「24小時內出血>500c.c.」(B)。","options":{"A":"時間為24小時內(非12小時)。","B":"正確。產後24小時內出血>500c.c.。","C":"量為>500c.c.(非250)。","D":"量為>500c.c.(非250)。"},"sources":["新文京《產科護理學》產後出血定義","PPH"]}},"112030-N4-32":{"quick":"胎盤碎片殘留所致產後出血,正確的是「胎盤小碎片殘留常是晚期產後出血之主因」。","detail":{"background":"胎盤碎片殘留:(1)「希氏法(Schultze)」胎盤由中央先剝離、較完整,「鄧氏法(Duncan)邊緣先剝離者較易碎片殘留」(故敘述A錯);(2)胎盤殘留是「第三產程(胎盤娩出)處理欠妥」(非第二產程);(3)「殘留的胎盤小碎片是晚期(續發性)產後出血(產後24小時至數週)的主因」——正確;(4)處置為「移除殘留組織(刮除/子宮收縮劑)」,雙手壓迫子宮法用於子宮收縮乏力出血、無法「把碎片排出」。本題正確為「胎盤小碎片殘留常是晚期產後出血主因」(C)。","options":{"A":"錯。鄧氏法(非希氏法)較易碎片殘留。","B":"錯。胎盤殘留屬第三產程處理欠妥,非第二產程。","C":"正確。胎盤小碎片殘留常是晚期產後出血主因。","D":"錯。雙手壓迫用於收縮乏力,無法排出殘留碎片。"},"sources":["新文京《產科護理學》胎盤殘留","晚期產後出血"]}},"113030-N4-9":{"quick":"分娩期預防產後出血,「進入第二產程前持續靜脈注射Methergine」為不適當。","detail":{"background":"預防產後出血措施:胎盤娩出後給子宮收縮劑(催產素為首選,Methergine/麥角新鹼次之)、檢查胎盤是否完整娩出、親子立即肌膚接觸(刺激催產素)、產後恢復室每15分鐘監測血壓與出血。「Methergine(麥角新鹼)使子宮強直性收縮,若在胎兒娩出前(第二產程前)使用會使胎兒受困/胎盤嵌頓、危及胎兒,故只能在胎盤娩出後給」。本題「不適當」者為「第二產程前持續靜注Methergine」(A)。","options":{"A":"不適當(本題答案)。Methergine只能於胎盤娩出後給,不可在胎兒娩出前用。","B":"適當。胎盤娩出後檢查胎盤完整性。","C":"適當。親子立即肌膚接觸刺激催產素。","D":"適當。產後每15分鐘監測血壓及出血量。"},"sources":["新文京《產科護理學》預防產後出血","Methergine時機"]}},"114100-N4-23":{"quick":"妊娠高血壓婦女預防產後大出血,「最不適當」的是「注射Ergonovine(麥角新鹼)」。","detail":{"background":"妊娠高血壓(子癇前症)婦女預防產後出血:可用「子宮按摩、評估子宮底位置與宮縮、監控惡露量與會陰傷口、催產素(oxytocin)」。但「Ergonovine/Methergine(麥角新鹼)會使血管收縮、升高血壓,妊娠高血壓/子癇前症者禁用(可能誘發高血壓危象/腦出血)」。本題「最不適當」者為「注射Ergonovine」(A)。","options":{"A":"最不適當(本題答案)。麥角新鹼升血壓,妊娠高血壓者禁用。","B":"適當。子宮按摩促收縮。","C":"適當。測宮底位置及宮縮。","D":"適當。監控惡露量與會陰傷口。"},"sources":["新文京《產科護理學》妊娠高血壓","麥角新鹼禁忌"]}},"115030-N4-23":{"quick":"陰道生產的早期產後出血定義為「產後24小時內出血量至少超過500c.c.」。","detail":{"background":"早期(原發性)產後出血定義:「陰道生產——產後24小時內失血量≥500c.c.」(剖腹產≥1000c.c.)。最常見原因為子宮收縮乏力(uterine atony),其次產道撕裂、胎盤殘留、凝血異常(4T:Tone/Trauma/Tissue/Thrombin)。本題陰道產早期產後出血為「24小時內>500c.c.」(A)。","options":{"A":"正確。陰道產24小時內出血>500c.c.。","B":"700c.c.非標準定義值。","C":"1000c.c.為剖腹產的定義值。","D":"1300c.c.非定義值。"},"sources":["新文京《產科護理學》產後出血定義","PPH"]}},"102030-N4-17":{"quick":"臀位、子宮頸4cm、大量陰道流水(疑破水),最優先的護理是「監測胎兒心跳速率」。","detail":{"background":"臀位待產婦「大量陰道流水(破水)」時,先露部(臀)較不規則、無法完全填塞骨盆,「破水後臍帶脫垂風險高(臍帶受壓→胎兒急性缺氧)」。最優先護理是「立即監測胎兒心跳速率」(評估有無臍帶脫垂致胎兒窘迫/心搏過緩),並視診陰道有無臍帶脫出。通知醫師、給輸液、準備生產為後續。本題最優先為「監測胎兒心跳速率」(B)。","options":{"A":"通知醫師為後續,先評估胎兒安危。","B":"正確。先監測胎心率(警覺臀位破水後臍帶脫垂)。","C":"給靜脈輸液非最優先。","D":"子宮頸僅4cm尚未近娩出,非首要。"},"sources":["新文京《產科護理學》臀位破水","臍帶脫垂"]}},"104030-N4-53":{"quick":"產鉗使用後左側顏面神經麻痺的徵象是「左眼無法閉合、口角流涎」。","detail":{"background":"產鉗(forceps)壓迫可致「顏面神經(CN VII)麻痺」——屬周邊型,患側「整個半邊臉肌肉無力」:額紋消失、眼瞼無法閉合、鼻唇溝變淺、口角下垂流涎(哭時嘴角歪向健側)。本例「左側」顏面神經麻痺→「左眼無法閉合、(左)口角流涎」。多數為暫時性、數週內恢復。本題左側顏面神經麻痺徵象為「左眼無法閉合、口角流涎」(B)。","options":{"A":"「哭時左臉扭曲」描述不符(患側無力、嘴歪向健側)。","B":"正確。左眼無法閉合、口角流涎。","C":"「右臉」消失不符左側麻痺。","D":"「右側」無抬眉不符左側麻痺。"},"sources":["新文京《產科護理學》產鉗","顏面神經麻痺"]}},"105090-N4-34":{"quick":"真空吸引協助胎兒娩出敘述中「適用胎頭骨盆不相對稱時」為錯誤。","detail":{"background":"真空吸引(vacuum extraction):用於第二產程延長、需協助娩出(母體疲憊、胎兒窘迫需快速娩出)時,條件為「子宮頸全開、胎頭已銜接且為頂位、無頭盆不對稱」。「頭盆不對稱(CPD)是禁忌(胎頭過大或骨盆過小,強行吸引危險),不適用」。抽吸罩放在胎頭枕骨處、由有經驗醫師執行、娩出後胎兒頭部可能有產瘤/頭血腫。本題「錯誤」者為「適用頭盆不相對稱時」(A)。","options":{"A":"錯誤(本題答案)。頭盆不對稱為禁忌,不適用真空吸引。","B":"正確。娩出後胎頭可能有血腫。","C":"正確。需由有經驗醫師執行。","D":"正確。抽吸罩放置於胎頭枕骨上。"},"sources":["新文京《產科護理學》真空吸引","頭盆不對稱"]}},"109110-N4-38":{"quick":"G4P3有急產經驗、子宮頸7cm一直有便意感,敘述中「請她先上廁所解便」為錯誤。","detail":{"background":"經產婦(G4P3)且「有急產(precipitous labor,總產程<3小時)經驗」者,產程進展可能極快;子宮頸7cm且「一直有便意感(先露下降壓迫直腸,接近用力)」時,「不可讓她去廁所解便——可能在廁所突然分娩(急產)、危險」。正確應:就地評估、聯絡醫師備生產環境、陰道內診了解擴張、教導「先別用力、採吹蠟燭/哈氣呼吸」抑制用力。本題「錯誤」者為「請她先上廁所解便」(A)。","options":{"A":"錯誤(本題答案)。急產經產婦有便意感不可讓她去廁所(恐廁所分娩)。","B":"正確。聯絡醫師並準備生產環境。","C":"正確。陰道內診了解子宮頸擴張。","D":"正確。教導先不用力、採吹蠟燭式呼吸。"},"sources":["新文京《產科護理學》急產","便意感處置"]}},"113180-N4-22":{"quick":"肩難產(shoulder dystocia)的處置宜採「教導待產婦快速屈曲大腿靠向腹部(1)＋注意胎心音變化(4)」。","detail":{"background":"肩難產(胎頭娩出後前肩卡在恥骨聯合後)的處置:首選「McRoberts手法——產婦雙腿屈曲、大腿用力靠向腹部(使恥骨聯合上旋、增骨盆出口)」＋「恥骨上方(suprapubic)加壓(壓前肩使內收娩出)」＋持續「注意胎心音變化」(胎兒缺氧風險);禁止「在子宮底(fundus)加壓」(會使肩更卡、增子宮破裂);也不應加強子宮收縮藥(oxytocin)。本題宜採「(1)屈大腿靠腹部＋(4)注意胎心音」即14(D)。","options":{"A":"含(3)加強子宮收縮藥,錯誤。","B":"含(2)子宮底施壓與(3)加藥,皆錯。","C":"含(2)子宮底施壓,錯誤。","D":"正確。(1)屈大腿靠腹部(McRoberts)＋(4)注意胎心音。"},"sources":["新文京《產科護理學》肩難產","McRoberts手法"]}},"114030-N4-21":{"quick":"待產突發腹部撕裂性疼痛、腹部明顯凹陷、測不到宮縮與胎心音,最可能為「子宮破裂」。","detail":{"background":"子宮破裂(uterine rupture,產科急症):常見於子宮有疤痕(前胎剖腹/手術)、過度刺激(催產素過量)、阻塞性難產。典型表現:「突發劇烈撕裂性腹痛、宮縮停止(測不到宮縮)、先露部上縮、腹部可摸到異常凹陷或兩塊腫塊(胎兒進入腹腔、子宮輪廓改變)、胎心音消失(胎兒窘迫/死亡)、母體休克」。本例症狀典型,最可能為「子宮破裂」(C)。處置:立即剖腹、輸血搶救。","options":{"A":"低張性子宮收縮為宮縮弱,非撕裂痛+宮縮停止。","B":"早期破水為羊水流出,無撕裂痛與凹陷。","C":"正確。撕裂性腹痛+腹部凹陷+宮縮胎心消失=子宮破裂。","D":"羊水栓塞以突發呼吸困難、休克、DIC為主,非腹部凹陷。"},"sources":["新文京《產科護理學》子宮破裂","產科急症"]}},"113100-N4-20":{"quick":"羊水栓塞敘述中「呈現病理性收縮環」為錯誤。","detail":{"background":"羊水栓塞(amniotic fluid embolism, AFE):羊水/胎兒物質進入母體循環引發過敏樣反應,「常發生於破水後、分娩時或分娩剛結束」,臨床「突發呼吸困難、發紺、低血壓、心肺功能衰竭與休克、繼發DIC(瀰漫性血管內凝血)大出血」,死亡率高。「病理性收縮環(Bandl ring)是阻塞性難產/先兆子宮破裂的徵象,非羊水栓塞」。本題「錯誤」者為「呈現病理性收縮環」(A)。","options":{"A":"錯誤(本題答案)。病理性收縮環屬阻塞性難產/先兆子宮破裂,非羊水栓塞。","B":"正確。通常發生在分娩時或分娩剛結束。","C":"正確。常發生於羊膜破水後。","D":"正確。易出現心肺功能衰竭和休克。"},"sources":["新文京《產科護理學》羊水栓塞","產科急症"]}},"107030-N4-34":{"quick":"胎盤早期剝離(承上)個案,適當措施是「依醫囑執行凝血篩檢試驗,以避免產時及產後出血合併症」。","detail":{"background":"承上題(妊娠29週、突發劇烈腹痛、子宮硬且壓痛、無陰道出血=隱性出血型胎盤早期剝離)。胎盤早期剝離(abruptio placentae)會釋出凝血活素消耗凝血因子→易併發「DIC(瀰漫性血管內凝血)」與產時/產後大出血。故適當措施是「依醫囑執行凝血篩檢試驗(PT/PTT、血小板、纖維蛋白原、D-dimer),監測並預防DIC與出血合併症」,並備血、評估胎兒、準備緊急生產。給抗生素(非感染)、腹部熱敷(會增出血)、降壓強心利尿(非此情境主軸)皆不適當。本題適當為「執行凝血篩檢試驗」(C)。","options":{"A":"非感染,抗生素非重點。","B":"錯。腹部熱敷會增加出血,不可。","C":"正確。執行凝血篩檢試驗以避免產時及產後出血(DIC)。","D":"降壓強心利尿非胎盤早剝的主要處置。"},"sources":["新文京《產科護理學》胎盤早期剝離","DIC"]}},"110110-N4-1":{"quick":"人性化生產的回應中「醫院生產前會有禁食、灌腸、會陰切開等常規處置」為較不適當。","detail":{"background":"人性化/友善生產:尊重產婦自主與舒適——「與產婦一起討論生產計畫、多元友善生產環境鼓勵家人參與分娩、產後立即親子肌膚接觸(早期母嬰同室)」。現代實證不主張將「禁食、灌腸、剃毛、會陰切開」當作常規處置(僅必要時施行),故「醫院生產前會有禁食、灌腸、會陰切開等常規處置」的回應較不適當。本題較不適當者為D。","options":{"A":"適當。與產婦一起討論生產計畫。","B":"適當。友善環境鼓勵家人參與分娩。","C":"適當。產後立即親子接觸。","D":"較不適當(本題答案)。禁食/灌腸/會陰切開非常規處置(僅必要時)。"},"sources":["新文京《產科護理學》人性化生產","常規處置"]}},"109030-N4-21":{"quick":"產後6~10天心跳次數較孕前減緩,最可能原因是「心輸出量增加」。","detail":{"background":"產後循環變化:分娩後子宮胎盤循環的血液回流體循環＋子宮收縮使大量血液回流＋細胞外液回收,使「心輸出量(每搏輸出量)短暫增加」,身體代償出現「產後最初約6–10天的生理性心搏過緩(bradycardia,約50–70次/分)」,屬正常。並非心臟負荷增加、產後出血(出血會心搏加快)或腹壓增加所致。本題最可能原因為「心輸出量增加」(A)。","options":{"A":"正確。心輸出量增加→代償性心搏過緩。","B":"心臟負荷增加會心搏加快,非減緩。","C":"產後出血會心搏加快,非減緩。","D":"腹壓增加非產後心搏過緩原因。"},"sources":["新文京《產科護理學》產後生理","心搏過緩"]}}},TO=["1剖腹產手術前後護理", "2剖腹產麻醉與VBAC", "3會陰切開術與會陰撕裂傷", "4產後出血定義徵象與預防", "5手術產輔助胎位異常與難產", "6產科急症與產後生理"],LEC={"1剖腹產手術前後護理":{"html":"<p><b>剖腹產(C/S)切口</b>:<b>子宮下段橫切(低位橫切)</b>=目前最常用,出血少、癒合好、子宮破裂風險低、下一胎較可VBAC,但暴露較費時<u>不適合最緊急情況</u>;<b>子宮上段(古典式)直切</b>手術空間大、胎兒易娩出,適合<u>緊急/前置胎盤/橫位</u>,但出血多、破裂風險高、<u>下一胎不宜VBAC</u>。</p><p><b>術前</b>:禁食(固體約6–8小時、清水約2小時)、剃毛至恥骨、術前1天及當天<b>聽診胎心音</b>、靜脈輸液、留置導尿。</p><p><b>術後</b>:返室立即評估<b>意識、生命徵象、子宮收縮硬度與惡露(出血)、傷口、尿色尿量、區域麻醉者下肢感覺</b>;產後1小時內每15分鐘測生命徵象;<b>早期下床活動</b>促腸蠕動排氣、防血栓與沾黏(腹脹用翻身下床、避產氣食物、必要時薄荷油);<u>儘早哺乳</u>(不需等下床或排氣);區域麻醉者術後不必等排氣即可漸進進食;<b>合併症</b>:出血、感染、沾黏、腸阻塞、血栓性靜脈炎、膀胱損傷(非肛門瘻管)。</p>"},"2剖腹產麻醉與VBAC":{"html":"<p><b>剖腹產麻醉</b>:<b>區域麻醉(脊髓/腰椎硬膜外)為首選</b>——母親清醒、對胎兒影響小、可立即親子接觸;麻醉前先以<u>晶體液(N/S或林格氏液,非葡萄糖水)</u>擴容防低血壓,穿刺約L3–4,監測血壓。<b>脊髓麻醉後須平躺</b>防脊髓性頭痛(<u>非辛式臥位</u>)。<b>全身麻醉</b>(誘導用靜脈麻醉劑+肌鬆,非吸入性作誘導)僅用於緊急或區域麻醉禁忌——吸入性麻醉脂溶性過胎盤抑制新生兒、鬆弛子宮增出血。</p><p><b>VBAC(剖腹產後陰道生產)</b>:<b>適合</b>=前胎子宮下段橫切、單胎頭位、無頭盆不對稱、無前置胎盤、可緊急剖腹;<b>禁忌</b>=前胎子宮上段(古典)直切、<u>曾子宮破裂</u>、多次剖腹、本胎前置胎盤/頭盆不對稱。前胎因<u>非重複性原因</u>(胎兒窘迫、臀位)剖腹者,此胎仍可考慮VBAC。好處:避免手術沾黏、增正向生產經驗。</p>"},"3會陰切開術與會陰撕裂傷":{"html":"<p><b>會陰切開</b>:<b>正中切開</b>失血少、易縫合癒合好,但<u>會陰短者不宜</u>(易延伸成三、四度);<b>側斜切開</b>較不易延伸至肛門(適合會陰短),但失血多、痛、不易縫合癒合久。實證<u>不建議例行性</u>會陰切開。</p><p><b>會陰撕裂分度</b>:<b>一度</b>=皮膚與陰道黏膜(未及肌肉);<b>二度</b>=延伸至會陰肌肉;<b>三度</b>=至肛門括約肌;<b>四度</b>=至直腸黏膜。三、四度須注意排便(軟便劑、避免便秘用力)、避免灌腸與肛溫。</p><p><b>REEDA(會陰/傷口癒合評估)</b>:R=Redness發紅、E=Edema水腫、E=Ecchymosis瘀斑、D=Discharge分泌物、A=Approximation傷口對合。</p>"},"4產後出血定義徵象與預防":{"html":"<p><b>定義</b>:<b>陰道產=產後24小時內失血>500c.c.;剖腹產>1000c.c.</b>。早期(原發性)=24小時內;晚期(續發性)=24小時至6週。</p><p><b>4T 原因</b>:<b>Tone</b>子宮收縮乏力(最常見)、<b>Trauma</b>產道撕裂、<b>Tissue</b>胎盤殘留(晚期出血主因,鄧氏法較易殘留)、<b>Thrombin</b>凝血異常。</p><p><b>嚴重出血/休克徵象</b>:失血>1000c.c.、血壓下降、<u>心跳加快(>100)</u>、皮膚濕冷蒼白、尿量減少。</p><p><b>預防/處置</b>:胎盤娩出後給<b>催產素(首選)</b>、按摩子宮(<u>一手恥骨上支托固定子宮防子宮內翻</u>、另一手按摩子宮底)、檢查胎盤完整、親子肌膚接觸、每15分鐘監測。<b>Methergine(麥角新鹼)</b>只能<u>胎盤娩出後</u>給,<u>升血壓→妊娠高血壓/子癇前症禁用</u>。</p>"},"5手術產輔助胎位異常與難產":{"html":"<p><b>產鉗 / 真空吸引</b>:條件=子宮頸全開、胎頭已銜接頂位、無頭盆不對稱(<u>頭盆不對稱為禁忌</u>)。產鉗壓迫可致<b>顏面神經(CN VII)麻痺</b>(患側眼瞼不能閉合、口角流涎、額紋消失,多暫時);真空吸引可致胎頭產瘤/頭血腫。</p><p><b>臀位破水</b>:先露不規則,<u>臍帶脫垂風險高</u>→破水後優先<b>監測胎心率</b>、視診臍帶。</p><p><b>急產(總產程<3小時)</b>:經產婦有急產史+便意感→<u>不可讓她去廁所解便</u>(恐廁所分娩);就地備產、勿用力(吹蠟燭呼吸)。</p><p><b>肩難產(shoulder dystocia)</b>:<b>McRoberts手法(雙腿屈曲大腿靠腹)＋恥骨上方加壓＋注意胎心</b>;<u>禁子宮底加壓、禁加催產素</u>。</p><p><b>子宮破裂</b>:突發撕裂性腹痛、<u>宮縮停止、腹部凹陷/兩塊腫塊、胎心消失、休克</u>→緊急剖腹輸血。</p>"},"6產科急症與產後生理":{"html":"<p><b>羊水栓塞(AFE)</b>:羊水/胎兒物質入母體循環,<u>常於破水後、分娩時或剛結束</u>突發<b>呼吸困難、發紺、低血壓、心肺衰竭休克、繼發DIC大出血</b>,死亡率高。(<u>病理性收縮環Bandl ring屬阻塞性難產/先兆子宮破裂,非AFE</u>。)</p><p><b>胎盤早期剝離</b>:子宮硬且壓痛、劇痛(隱性出血可無陰道流血),釋放凝血活素→易<b>DIC</b>→產時/產後大出血。處置:<u>凝血篩檢(PT/PTT、血小板、纖維蛋白原、D-dimer)</u>、備血、評估胎兒、準備緊急生產(<u>禁腹部熱敷</u>)。</p><p><b>人性化/友善生產</b>:討論生產計畫、家人參與、產後立即親子肌膚接觸;<u>禁食/灌腸/剃毛/會陰切開不再當常規</u>。</p><p><b>產後生理</b>:子宮胎盤血回流使心輸出量短暫增加→<b>產後6–10天生理性心搏過緩</b>(正常)。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_o5_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
