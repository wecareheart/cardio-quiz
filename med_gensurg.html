const Q=[{"exam_code":"103100","roc_year":103,"exam_round":"第二次","num":2,"stem":"當嚴重外傷病人於急診治療,最常見致命性的死因為嚴重腦外傷及出血性休克。身體中,下列之體腔(body cavity)容易積血而造成早期死亡,但何者除外?","options":{"A":"胸腔(thoracic cavity)","B":"腹腔(abdominal cavity)","C":"骨盆腔(pelvic cavity)","D":"後腹膜腔(retroperitoneal cavity)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"103100-2","topic_code":"T1","topic":"創傷急救與評估","id":"103100-2","q_num":2,"src":"民國103年第二次","img":""},{"exam_code":"103100","roc_year":103,"exam_round":"第二次","num":73,"stem":"當你接收到一位嚴重創傷已插有氣管內管插管(endotracheal tube)的轉診病人時,下列處置何者最適當?","options":{"A":"儘快接上呼吸器","B":"趕快評估其他未被發現的傷害","C":"迅速地拔除氣管內插管並給予足夠的氧氣","D":"檢查氣管內插管的位置是否在正確位置上"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"103100-73","topic_code":"T1","topic":"創傷急救與評估","id":"103100-73","q_num":73,"src":"民國103年第二次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":2,"stem":"25歲年輕男子,因騎乘重型機車發生事故,造成嚴重骨盆骨折(pelvic fracture)。抵達急診時呈現休克,經大量輸液與輸血灌救後,收縮壓高於90 mmHg,並隨即接受腹部電腦斷層攝影檢查。但發現骨盆腔出現顯影劑外滲(contrastextravasation)。下列何種治療方法治療出血性休克效果最佳?","options":{"A":"繼續輸血(transfusion)","B":"骨盆外固定(external fixation)","C":"剖腹手術結紮髂外動脈(external iliac artery ligation)","D":"血管栓塞術(angio-embolization)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"105020-2","topic_code":"T1","topic":"創傷急救與評估","id":"105020-2","q_num":2,"src":"民國105年第一次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":3,"stem":"當車禍事故的傷患被送至急診室急救時,如果發現呼吸道有異物、呼吸困難或神智不清時,應立即給予氣管內插管(endotracheal intubation)。下列何項為外傷病患緊急插管時,最應該注意之事項?","options":{"A":"保護頸椎(cervical spine protection)","B":"注意腦壓升高","C":"注意吸入性肺炎(aspiration pneumonia)","D":"注意麻藥劑量過多"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"105020-3","topic_code":"T1","topic":"創傷急救與評估","id":"105020-3","q_num":3,"src":"民國105年第一次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":77,"stem":"一輛學校校車和卡車對撞後,一位6歲小孩被送到急診室,這時小孩已生命垂危,但是二次施打周邊靜脈都失敗,此時最佳給予輸液路徑為:","options":{"A":"建立一個腹內導管(intraperitoneal catheter)","B":"脛骨的骨內針置入術(intraosseous cannulation)","C":"建立中心靜脈導管","D":"繼續嘗試建立周邊的靜脈導管"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"105100-77","topic_code":"T1","topic":"創傷急救與評估","id":"105100-77","q_num":77,"src":"民國105年第二次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":2,"stem":"腹部鈍傷時採用診斷性腹膜沖洗(diagnostic peritoneal lavage)的適應症,下列何者錯誤?","options":{"A":"理學檢查無法判斷的狀況","B":"脊椎損傷","C":"有剖腹探查的明顯適應症","D":"不明原因的休克或是低血壓"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106020-2","topic_code":"T1","topic":"創傷急救與評估","id":"106020-2","q_num":2,"src":"民國106年第一次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":4,"stem":"嚴重外傷病患呈現腹內大量出血及休克時,有時必須採用傷害控制手術(damage control surgery)於短時間內來控制出血及其他搶救步驟,以挽救生命。否則會出現致死三元素(lethal triad)。下列何者不屬於lethal triad?","options":{"A":"凝血機能不全(coagulopathy)","B":"代謝性酸中毒(metabolic acidosis)","C":"低體溫(hypothermia)","D":"敗血症(sepsis)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106020-4","topic_code":"T1","topic":"創傷急救與評估","id":"106020-4","q_num":4,"src":"民國106年第一次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":5,"stem":"血壓是判定傷病患是否呈現休克的重要指標,當災難事故發生時,若現場並無血壓量測工具時,可藉由橈動脈脈搏(radialpulse)、股動脈脈搏(femoral pulse)及頸動脈脈搏(carotid pulse)之檢測,來估計傷病患之血壓高低。下列為當血壓低於90 mmHg時,三種脈搏消失之先後次序,何者正確?","options":{"A":"股脈搏 → 頸脈搏 → 橈脈搏","B":"頸脈搏 → 股脈搏 → 橈脈搏","C":"橈脈搏 → 股脈搏 → 頸脈搏","D":"頸脈搏 → 橈脈搏 → 股脈搏"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106020-5","topic_code":"T1","topic":"創傷急救與評估","id":"106020-5","q_num":5,"src":"民國106年第一次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":76,"stem":"當你接收到一位嚴 ],"correction_note":"","images":[],"_id":"102030-3","topic_code":"T6","topic":"器官移植","id":"102030-3","q_num":3,"src":"民國102年第一次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":1,"stem":"對於calcineurin inhibitors的敘述,下列何者正確?","options":{"A":"tacrolimus(FK-506)和sirolimus都屬於calcineurin inhibitors,都作用在FK binding protein之上","B":"cyclosporine會有禿頭(alopecia)和牙齦增生(gingival hypertrophy)的副作用","C":"FK-506所引起的糖尿病有時候會在停藥之後恢復","D":"FK-506和cyclosporine都屬於腎臟移植術後用藥,不會有腎毒性的副作用"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106080-1","topic_code":"T6","topic":"器官移植","id":"106080-1","q_num":1,"src":"民國106年第二次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":3,"stem":"下列何者不是器官移植之後使用的抗排斥藥物?","options":{"A":"basiliximab","B":"rabbit antithymocyte globulin","C":"tacrolimus","D":"valacyclovir"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107020-3","topic_code":"T6","topic":"器官移植","id":"107020-3","q_num":3,"src":"民國107年第一次","img":""},{"exam_code":"109080","roc_year":109,"exam_round":"第二次","num":9,"stem":"器官移植病人通常需要長期使用抗排斥藥物,下列關於抗排斥藥物敘述何者正確?","options":{"A":"cyclosporin跟tacrolimus不同之處,主要是cyclosporin會抑制IL-2合成,而tacrolimus不會","B":"器官急性排斥時,以前主要使用藥物為類固醇,目前已經很少用","C":"使用cyclosporin時,和葡萄柚汁會有交互作用,此時可以考慮改成tacrolimus","D":"cyclosporin以及FK-506均具有腎毒性"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"109080-9","topic_code":"T6","topic":"器官移植","id":"109080-9","q_num":9,"src":"民國109年第二次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":3,"stem":"器官移植病患初期常使用高劑量的類固醇,下列敘述何者錯誤?","options":{"A":"長期合併類固醇使用仍是移植病患標準的給藥模式","B":"副作用的產生是dose dependent","C":"急性排斥往往需要高劑量類固醇注射治療","D":"類固醇初期高劑量使用會產生全身水腫情形"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"110020-3","topic_code":"T6","topic":"器官移植","id":"110020-3","q_num":3,"src":"民國110年第一次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":8,"stem":"下列何項關於人體器官移植的陳述是錯誤的?","options":{"A":"器官移植術後的排斥主要是跟人類白血球抗原(human leukocyte antigen)有關,此抗原基因在第六對染色體上","B":"器官移植術後的超急性排斥(hyperacute rejection)主要和捐贈者體內已存在抗體(preformed antibody)有關","C":"同種識別(allorecognition)可經由直接或間接路徑(direct or indirect pathway)發生,都是經由T細胞(T-cell)活化造成","D":"器官移植術後的急性排斥(acute rejection)依機轉主要分為細胞型排斥(cellular rejection)和體液型排斥(humoral rejection)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"110080-8","topic_code":"T6","topic":"器官移植","id":"110080-8","q_num":8,"src":"民國110年第二次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":6,"stem":"有關使用鈣調磷酸酶抑制劑(calcineurin inhibitors)的副作用,下列敘述何者錯誤?","options":{"A":"tacrolimus比cyclosporine較可能導致禿髮","B":"tacrolimus比cyclosporine較可能導致牙齦肥厚","C":"tacrolimus比cyclosporine有較高的神經毒性","D":"tacrolimus比cyclosporine有較高的移植後糖尿病發生率"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"113070-6","topic_code":"T6","topic":"器官移植","id":"113070-6","q_num":6,"src":"民國113年第二次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":16,"stem":"第一個異體臉部移植(facial transplantation)手術成功的案例是在那個國家?","options":{"A":"美國","B":"英國","C":"法國","D":"俄羅斯"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114020-16","topic_code":"T6","topic":"器官移植","id":"114020-16","q_num":16,"src":"民國114年第一次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":5,"stem":"關於免疫抑制劑(immunosuppressant)的敘述,下列何者錯誤?","options":{"A":"Azathioprine 會抑制骨髓","B":"Cyclosporine 可直接抑制macrophage 產生IL-1","C":"OKT3 會使T cell 釋出細胞激素(cytokine)而引起發燒、畏寒、低血壓等症狀","D":"Pulse steroid therapy 可能出現高血糖、高血壓、睡眠困擾等症狀"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"114070-5","topic_code":"T6","topic":"器官移植","id":"114070-5","q_num":5,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":8,"stem":"Rituximab 是一種單株抗體(monoclonal antibody),可以抑制B 細胞(B-cell)對移植器官的排斥反應,主要是針對B 細胞表面何種標誌(cell surface marker)?","options":{"A":"CD4","B":"CD8","C":"CD20","D":"CD34"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-8","topic_code":"T6","topic":"器官移植","id":"114070-8","q_num":8,"src":"民國114年第二次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":26,"stem":"下列有關下腔靜脈過濾網(inferior vena cava filter)置放的適應症敘述,何者錯誤?","options":{"A":"股靜脈有血栓形成易造成肺栓塞,不論有無抗凝血藥物治療皆須置放","B":"下肢深部靜脈栓塞患者,但不適宜接受抗凝血藥物治療者","C":"慢性肺栓塞合併產生肺高壓之患者","D":"使用抗凝血藥物治療後,仍持續反覆下肢深部靜脈栓塞"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"102110-26","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"102110-26","q_num":26,"src":"民國102年第二次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":43,"stem":"一位35 歲女性,因車禍至急診處,左大腿非開放性股骨骨折。經急診住院,預計第二天進行骨科手術。清晨病人非常焦慮,發燒38.7°C,心跳約110/分,頸部甲狀腺約三度腫大。此時最好的檢查及治療不包括下列何者?","options":{"A":"儘快施行骨科手術","B":"抽血檢驗T3、T4、TSH","C":"冰氈及退燒藥","D":"beta blockers,corticosteroid 靜脈注射"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"104030-43","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"104030-43","q_num":43,"src":"民國104年第一次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":9,"stem":"下列關於癌症和它的腫瘤標記(tumor markers)之配對,何者錯誤?","options":{"A":"carbohydrate antigen 19-9(CA19-9)and ovarian cancer","B":"alpha fetoprotein(AFP)and hepatocellular carcinoma","C":"carcinoembryonic antigen(CEA)and colon cancer","D":"human chorionic gonadotropin(HCG)and choriocarcinoma"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"105100-9","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"105100-9","q_num":9,"src":"民國105年第二次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":24,"stem":"下列情況何者可以暫不考慮放置下腔靜脈過濾器(vena cava filter)?","options":{"A":"首次急性之肺動脈栓塞","B":"深部靜脈栓塞,且不適合使用抗凝血劑","C":"深部靜脈栓塞,且有慢性肺栓塞,並已造成肺高壓","D":"在足量之抗凝血劑治療下,仍反復多次靜脈栓塞"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"108030-24","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"108030-24","q_num":24,"src":"民國108年第一次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":4,"stem":"有關人類惡性腫瘤之描述,下列何者錯誤?","options":{"A":"惡性腫瘤最常轉移的位置之一為肺臟及肋膜","B":"尿中Bence Jones protein是淋巴癌的腫瘤生物指標(tumor biomarker)","C":"手術切除肺臟、肝臟或腦部的單一轉移病灶,有機會延長病人存活率","D":"血液中癌胚蛋白(carcinoembryonic antigen, CEA)的敏感及專一性並不佳,但可做為手術後追蹤腫瘤復發的參考"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"110020-4","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"110020-4","q_num":4,"src":"民國110年第一次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":5,"stem":"高壓氧(hyperbaric oxygen therapy)為一有效改善組織缺氧之療法,應用於傷口組織缺氧治療最主要之先決條件為何?","options":{"A":"病人本身多重合併症需獲得良好控制","B":"確認傷口標的物本身之血液循環暢通","C":"傷口細菌培養不能有感染狀況","D":"傷口縫合必須堅固以防崩裂"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111080-5","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"111080-5","q_num":5,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":22,"stem":"有關深層靜脈栓塞(deep vein thrombosis),下列敘述何者錯誤?","options":{"A":"危險因子包括年齡、惡性腫瘤、先前手術及靜脈栓塞病史","B":"Virchow's triad 可解釋靜脈栓塞的可能成因","C":"protein C、protein S 及antithrombin III 的缺少也是常見成因","D":"May-Thurner syndrome 常為靜脈血栓的併發症"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-22","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"111080-22","q_num":22,"src":"民國111年第二次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":20,"stem":"在一些下肢深層靜脈栓塞(deep venous thrombosis, DVT)的病人,須放置下腔靜脈過濾器(IVC filter),但下列何者不需要?","options":{"A":"慢性下腔靜脈完全阻塞","B":"有絕對禁忌症無法使用抗凝血劑","C":"在足夠的抗凝血劑劑量下仍復發DVT","D":"慢性肺栓塞合併肺高壓"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112020-20","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"112020-20","q_num":20,"src":"民國112年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":57,"stem":"30歲男性病人左側股骨幹骨折,下午接受骨髓內鋼釘固定手術,值班時接到護理站通知病人意識模糊,皮膚點狀出血,瞳孔直徑正常,雙側等大,對光有反應,下列敘述何者最不適當?","options":{"A":"胸部X光片會出現暴風雪的外觀(\"snowstorm\" appearance)","B":"病人可能缺氧及血小板低下","C":"要懷疑有頭部外傷腦壓升高,應該儘速給與mannitol點滴注射降低腦壓","D":"給與支持性治療,必要時可加上類固醇治療"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-57","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"112080-57","q_num":57,"src":"民國112年第二次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":22,"stem":"下列何者為目前診斷深層靜脈栓塞(deep vein thrombosis)最常使用之工具?","options":{"A":"杜卜勒超音波(duplex ultrasound)","B":"核磁共振(magnetic resonance venography)","C":"靜脈攝影(venography)","D":"阻抗容積描記術(impedance plethysmography)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"113020-22","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"113020-22","q_num":22,"src":"民國113年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":38,"stem":"關於深層靜脈栓塞(deep venous thrombosis, DVT),下列敘述何者錯誤?","options":{"A":"臨床上可能有Homan sign,但敏感性(sensitivity)與特異性(specificity)皆不高","B":"用檢測D-dimer 作為唯一正確診斷之工具,但陰性預測值(negative predictive value)<90%","C":"可使用超音波(duplex ultrasound)幫助診斷,可檢視血栓,或以壓迫(compression)方式進行測試","D":"靜脈攝影(venography)可做較精確的診斷,缺點是較侵入性,且須注射顯影劑"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-38","topic_code":"T7","topic":"外科腫瘤學與靜脈栓塞","id":"115020-38","q_num":38,"src":"民國115年第一次","img":""}],E={"103100-2":{"quick":"易積血致早期死亡之體腔「除外」D:後腹膜腔。","detail":{"background":"嚴重外傷致命死因為腦外傷與出血性休克;易大量積血致早期失血死亡之體腔為『胸腔、腹腔、骨盆腔(及大腿)』;本題以『後腹膜腔』為除外(D)。","options":{"A":"胸腔可大量積血。","B":"腹腔可大量積血。","C":"骨盆腔可大量積血。","D":"★除外(本題答案):後腹膜腔(本題列為除外)。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"103100-73":{"quick":"插管轉診病人最適當 D:先「確認氣管內插管位置」是否正確。","detail":{"background":"嚴重創傷已插管之轉診病人接手後首要『確認氣管內插管位置是否正確(聽診雙肺、ETCO2)』(D);插管移位/誤入食道為立即致命。","options":{"A":"接呼吸器前須先確認管位。","B":"評估其他傷害為後續。","C":"不應貿然拔管。","D":"★正確(本題答案):先確認插管位置。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"105020-2":{"quick":"骨盆骨折顯影劑外滲、輸液後穩定→D:血管栓塞術(angio-embolization)。","detail":{"background":"骨盆骨折休克、輸液輸血後穩定、CT見顯影劑外滲(動脈出血)→『血管栓塞術(angio-embolization)』止血(D);骨盆出血多靜脈/骨,動脈出血宜栓塞。","options":{"A":"單純繼續輸血不止血。","B":"外固定處理骨性出血,動脈出血需栓塞。","C":"結紮髂外動脈非首選且風險高。","D":"★正確(本題答案):血管栓塞術。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"105020-3":{"quick":"外傷緊急插管最應注意 A:保護頸椎(cervical spine protection)。","detail":{"background":"外傷病人緊急插管最應注意『保護頸椎(維持中立、軸線固定)』(A);未排除頸椎傷前皆視為有頸椎損傷。","options":{"A":"★正確(本題答案):保護頸椎。","B":"腦壓非插管首要。","C":"吸入性肺炎為次要。","D":"麻藥劑量為次要。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"105100-77":{"quick":"6 歲危急、兩次周邊靜脈失敗→B:脛骨骨內針置入術(intraosseous)。","detail":{"background":"6歲危急、兩次周邊靜脈失敗→『脛骨近端骨內針(intraosseous)』為快速可靠之輸液路徑(B);兒童尤適用。","options":{"A":"腹內導管非輸液路徑。","B":"★正確(本題答案):骨內針置入。","C":"中心靜脈耗時、非首選。","D":"不應繼續嘗試周邊靜脈。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"106020-2":{"quick":"DPL 適應症「錯誤」者 C:已有明確剖腹探查指徵(直接手術,不需 DPL)。","detail":{"background":"診斷性腹膜灌洗(DPL)適應症:血流動力學不穩之鈍傷且FAST不確定、無法做CT;『已有明確剖腹探查指徵者應直接手術,不需DPL』(故C錯)。","options":{"A":"適應症:理學檢查無法判斷。","B":"適應症:脊椎損傷(理學受限)。","C":"★錯誤(本題答案):已有剖腹指徵者直接手術。","D":"適應症:不明休克/低血壓。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"106020-4":{"quick":"不屬致死三聯者 D:敗血症(三聯=凝血病變/代謝性酸中毒/低體溫)。","detail":{"background":"傷害控制手術之致死三聯(lethal triad)=『凝血病變、代謝性酸中毒、低體溫』;『敗血症不屬致死三聯』(D)。","options":{"A":"三聯:凝血機能不全。","B":"三聯:代謝性酸中毒。","C":"三聯:低體溫。","D":"★不屬(本題答案):敗血症。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"106020-5":{"quick":"以脈搏估血壓消失順序 C:橈脈搏→股脈搏→頸脈搏。","detail":{"background":"以脈搏估收縮壓:橈動脈約>80、股動脈約>70、頸動脈約>60 mmHg;故休克時脈搏消失順序為『橈→股→頸』(C)。","options":{"A":"順序錯。","B":"順序錯。","C":"★正確(本題答案):橈→股→頸(由淺至深消失)。","D":"順序錯。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"106080-76":{"quick":"不提示插管誤入食道者 D:管內可見霧氣進出(不可靠、非排除依據)。","detail":{"background":"嚴重創傷插管轉診病人疑誤入食道之線索:無ETCO2、無雙肺呼吸音、上腹脹氣、血氧下降;『管內可見霧氣進出不可靠、非排除依據』(D)。","options":{"A":"提示食道:end-tidal CO2 近零。","B":"提示食道:聽不到呼吸音。","C":"提示食道:胃部雜音。","D":"★除外(本題答案):管內霧氣不可靠。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"106080-77":{"quick":"4 歲 20 kg 休克→D:生理食鹽水 400 mL(20 mL/kg)重複 3 次,加 200 mL 全血。","detail":{"background":"4歲20 kg休克→兒童輸液『生理食鹽水20 mL/kg(=400 mL)推注、可重複3次,無反應再輸血10 mL/kg』(D)。","options":{"A":"劑量不符 20 mL/kg。","B":"劑量不符。","C":"200 mL 偏低(應 20 mL/kg=400)。","D":"★正確(本題答案):NS 400 mL×重複+輸血。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"107020-2":{"quick":"尿量灌流指標 B:成人>0.5、小孩>1 mL/kg/hr。","detail":{"background":"組織灌流之尿量指標:『成人>0.5 mL/kg/hr、小孩>1 mL/kg/hr』(B);反映復甦是否充足。","options":{"A":"數值顛倒。","B":"★正確(本題答案):成人>0.5、小孩>1。","C":"成人門檻過高。","D":"小孩門檻過低。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"107020-5":{"quick":"不做腹部 CT 者 D:血壓 65–72(血流動力學不穩定→應進手術室,非 CT)。","detail":{"background":"外傷病人『血流動力學不穩定(BP 65–72)者不做腹部CT,應直接進手術室』(D);CT僅用於穩定者。","options":{"A":"鈍傷穩定者可 CT。","B":"評估胰臟傷可 CT。","C":"理學不明可 CT。","D":"★正確(本題答案):不穩定者不做 CT。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"107020-75":{"quick":"外傷性窒息錯在 C:其相關傷害「需積極治療/監測」(非無需)。","detail":{"background":"外傷性窒息(traumatic asphyxia):胸部突發擠壓致上腔靜脈高壓→頭頸顏面瘀紫、結膜下出血、瘀斑;『相關傷害需積極監測治療』(故C『無需』錯)。","options":{"A":"正確:胸部受壓、結膜下出血、頭頸發紺。","B":"正確:常見胸部重物壓迫。","C":"★錯誤(本題答案):需積極治療。","D":"正確:上腔靜脈壓驟增所致。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"107080-47":{"quick":"3 歲 15 kg 休克→D:生理食鹽水 300 mL(20 mL/kg)一次×2,無反應再輸血。","detail":{"background":"3歲15 kg休克→兒童輸液『生理食鹽水20 mL/kg(=300 mL)推注×2,無反應再輸血』(D)。","options":{"A":"膠體非首選晶體復甦。","B":"FFP 非首選復甦液。","C":"150 mL 偏低(應 20 mL/kg=300)。","D":"★正確(本題答案):NS 300 mL×2 後輸血。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"107080-77":{"quick":"連枷胸+呼吸窘迫、叩診兩側類似→D:肺挫傷(底層肺損傷致呼吸窘迫)。","detail":{"background":"6公尺墜落、連枷胸(flail chest)+嚴重呼吸窘迫、兩側叩診類似→底層『肺挫傷(pulmonary contusion)』致呼吸窘迫(D);連枷胸致呼吸衰竭者多為肺挫傷。","options":{"A":"疼痛非主要呼吸窘迫原因。","B":"叩診類似不支持大量血胸/腹傷。","C":"心包積血非此表現。","D":"★正確(本題答案):肺挫傷。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"108030-27":{"quick":"非立即生命危險者 B:自發性氣胸(張力性氣胸才是立即致命)。","detail":{"background":"創傷初級評估(ABCDE)之立即致命傷:氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸+肺挫傷、心包填塞;『自發性氣胸非立即致命傷(張力性才是)』(B)。","options":{"A":"心包填塞為立即致命。","B":"★非立即危險(本題答案):自發性氣胸。","C":"氣道阻塞為立即致命。","D":"連枷胸+肺挫傷為立即致命。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"108030-76":{"quick":"老人外傷錯在 D:生命徵象變化「不易預測」(易代償後驟惡)。","detail":{"background":"老年外傷:生理儲備差、常用藥(β-blocker/抗凝)、易低估;『生命徵象變化不易預測、常代償後驟然惡化』(故D『可預測』錯)。","options":{"A":"正確:老人 SDH 較 EDH 多。","B":"正確:必要時及早輸血。","C":"正確:院內感染率較年輕人高。","D":"★錯誤(本題答案):生命徵象不易預測。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"108080-1":{"quick":"外傷死亡人數最多時段 A:0~15 分鐘(即刻死亡)。","detail":{"background":"外傷死亡時間三峰分布:『第一峰0–15分鐘(即刻死亡,腦/大血管/心,人數最多)』(A);第二峰數小時(黃金時間);第三峰數日(敗血/MOF)。","options":{"A":"★正確(本題答案):0–15 分鐘。","B":"1–24 小時為第二峰。","C":"3–7 天為第三峰。","D":"7–30 天較少。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"109020-77":{"quick":"腹部鈍傷最具特異性 D:腹部電腦斷層掃描。","detail":{"background":"腹部鈍傷『最具特異性之檢查為腹部電腦斷層(CT)』(D);FAST快速但敏感度有限,DPL敏感但特異性低。","options":{"A":"腹部 X 光特異性低。","B":"超音波(FAST)敏感但特異性較低。","C":"DPL 敏感但特異性低。","D":"★正確(本題答案):腹部 CT。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"110020-1":{"quick":"錯在 A:致死三聯為「低體溫、酸中毒、凝血病變」,非 hypotension。","detail":{"background":"傷害控制原則(Damage Control):止血、限制復甦、矯正致死三聯;『致死三聯為低體溫、酸中毒、凝血病變(非低血壓)』(故A錯)。","options":{"A":"★錯誤(本題答案):三聯不含 hypotension(應為凝血病變)。","B":"正確:積極復甦+快速止血。","C":"正確:PRBC:FFP:platelet 約 1:1:1。","D":"正確:TXA 可用於傷害控制。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"110020-49":{"quick":"刀傷、HR 105、脈壓窄、四肢濕冷=Class II→B:約 1,000 c.c.。","detail":{"background":"刀傷、HR 105、脈壓窄、四肢濕冷、焦慮=Class II出血(15–30%,750–1500 mL)→輸液約1000 c.c.晶體(B)。","options":{"A":"500 為 Class I。","B":"★正確(本題答案):約 1000 c.c.(Class II)。","C":"1700 為 Class III。","D":"2500 為 Class IV。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"110020-50":{"quick":"不適當 C:不應以升壓劑維持 SBP 120(止血前 permissive hypotension)。","detail":{"background":"穿透傷未控制出血前『不應以升壓劑強行維持SBP 120;應採許可性低血壓(permissive hypotension)』直到手術止血(故C不適當)。","options":{"A":"適當:插管維持氣道。","B":"適當:準備緊急手術止血。","C":"★不適當(本題答案):止血前不追求 SBP 120。","D":"適當:晶體液為輔。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"110020-75":{"quick":"頸痛+雙手麻木→A:先帶上頸圈(保護頸椎)。","detail":{"background":"機車車禍、後頸痛+雙手麻木→疑頸椎傷,『優先帶上頸圈(保護頸椎)』(A),再續處理其他傷。","options":{"A":"★正確(本題答案):頸圈固定。","B":"CT 為後續。","C":"加壓止血其次。","D":"副木固定其次。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"110080-2":{"quick":"錯在 B:張力性氣胸為「臨床診斷」,須立即針刺/胸管減壓,「不應等影像確認」。","detail":{"background":"創傷初級評估(primary survey):『張力性氣胸為臨床診斷,須立即針刺/胸管減壓,不應等影像確認』(故B錯)。","options":{"A":"正確:氣道檢查同時保護頸椎。","B":"★錯誤(本題答案):張力性氣胸立即減壓、不待影像。","C":"正確:可用腹部超音波偵測腹腔積液。","D":"正確:D/E 評估 GCS 與暴露。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"110080-57":{"quick":"壓砸傷錯在 B:疑橫紋肌溶解應「積極輸液」(非限水)以保腎、沖肌球蛋白。","detail":{"background":"大樓倒塌、雙下肢壓砸傷+休克→疑橫紋肌溶解/擠壓症候群,『應積極輸液(非限水)以保腎、沖刷肌球蛋白』(故B『限水』錯);注意高血鉀。","options":{"A":"正確:臨床有腔室症候群即筋膜切開,不必等測壓。","B":"★錯誤(本題答案):橫紋肌溶解應積極輸液。","C":"正確:5P 中疼痛最重要。","D":"正確:>30 mmHg 疑腔室症候群。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"110080-76":{"quick":"最不適當 C:高感染風險咬傷給抗生素應「較早(24–48 小時)」回診,非 3 日後。","detail":{"background":"動物咬傷:高感染風險傷口(貓咬、手部、深部)應給預防性抗生素並『較早(24–48小時)回診』(故C『3日後』最不適當)。","options":{"A":"正確:立即縫合增感染。","B":"正確:臉部單純淺撕裂可考慮縫合。","C":"★最不適當(本題答案):應較早回診。","D":"正確:貓咬感染率高於狗咬。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"111020-4":{"quick":"多處傷+低血壓+腹痛→D:立即剖腹探查(腹內出血來源)。","detail":{"background":"多處傷+低血壓+腹痛(疑腹內出血)→『立即剖腹探查止血』(D);血流動力學不穩之腹內出血不宜先CT。","options":{"A":"不穩定者不宜再 CT。","B":"雙側胸管非首要。","C":"未證實主動脈傷。","D":"★正確(本題答案):緊急剖腹探查。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"111020-7":{"quick":"HR 125、脈弱、BP 75/40、意識混亂=Class III→C:約 1,800 mL。","detail":{"background":"HR 125、脈弱、BP 75/40、意識混亂=Class III出血(30–40%,~1500–2000 mL)→約1800 mL(C)。","options":{"A":"<500 為 Class I。","B":"800 為 Class II。","C":"★正確(本題答案):約 1800 mL(Class III)。","D":"3000 為 Class IV。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"112020-29":{"quick":"正確為 A:肺穿刺傷縫合止血時,術中/術後可能發生「空氣栓塞」甚至死亡。","detail":{"background":"肺臟外傷外科:肺穿刺傷縫合/切除止血時『術中/術後可能發生空氣栓塞(致命)』(A正確);需警覺。","options":{"A":"★正確(本題答案):可能空氣栓塞。","B":"錯:全肺切除不增存活。","C":"錯:tractotomy 可有效止血。","D":"錯:全肺切除非常用。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"112020-75":{"quick":"最不適當 B:猴咬傷須涵蓋「Herpes B 病毒」+amoxicillin-clavulanate,非單純 fluoroquinolone。","detail":{"background":"動物咬傷與抗生素:多以amoxicillin-clavulanate;『猴咬傷須涵蓋Herpes B病毒(加抗病毒)+amoxicillin-clavulanate,非單純fluoroquinolone』(B最不適當)。","options":{"A":"正確:貓咬 amoxicillin-clavulanate。","B":"★最不適當(本題答案):猴咬須防 Herpes B。","C":"海水魚咬可 fluoroquinolone(Vibrio)。","D":"正確:狗咬 amoxicillin-clavulanate。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"113020-3":{"quick":"錯在 B:腹部腔室症候群「會影響呼吸器」(升氣道壓、礙通氣)。","detail":{"background":"腹部腔室症候群(ACS):腹內壓升高→『升高氣道壓、礙通氣(影響呼吸器)』、少尿、低心輸出;故B『不影響呼吸器』錯;治療減壓開腹。","options":{"A":"正確:腹壓增致器官灌流不足。","B":"★錯誤(本題答案):會影響呼吸器/通氣。","C":"正確:Foley 測膀胱壓估腹內壓。","D":"正確:降心輸出量。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"113020-76":{"quick":"墜樓、低血壓、骨盆骨折、US 無腹腔積液→A:安排緊急血管攝影(疑骨盆動脈出血)。","detail":{"background":"墜樓、低血壓、骨盆骨折、FAST無腹腔積液→出血來源疑骨盆動脈,『安排緊急血管攝影/栓塞』(A);骨盆綁帶固定。","options":{"A":"★正確(本題答案):緊急血管攝影栓塞。","B":"無腹腔積液剖腹非首選。","C":"骨盆加壓帶為暫時措施。","D":"TXA 應傷後 3 小時內即給,非延後。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"113020-77":{"quick":"最正確 C:傷處聽診有雜音→疑血管傷,立即照會血管外科。","detail":{"background":"穿刺性肢體傷之硬性血管傷徵象(搏動性出血、擴大血腫、無脈、雜音/震顫);『傷處聽診有雜音→疑血管傷,立即照會血管外科』(C)。","options":{"A":"下肢穿刺傷血管傷未必少於上肢。","B":"神經傷不必然血管傷,非「立即」絕對。","C":"★正確(本題答案):雜音疑血管傷,照會血管外科。","D":"噴血應直接加壓,勿盲夾血管。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"113070-76":{"quick":"最不符合轉送標準 D:右小腿脛骨開放性骨折(單一肢體傷、非立即致命)。","detail":{"background":"嚴重外傷30分鐘內送創傷中心之轉送標準:生理(休克/GCS低)、解剖(穿透傷、連枷胸、骨盆骨折)、機轉;『右小腿脛骨開放性骨折(單一肢體傷、非立即致命)最不符合』(D)。","options":{"A":"符合:GCS<14。","B":"符合:軀幹/近端穿透傷。","C":"符合:骨盆骨折。","D":"★最不符合(本題答案):單純小腿開放骨折。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"114070-4":{"quick":"錯在 D:抗蛇毒血清依「嚴重度」給予,「非依體重」計算劑量。","detail":{"background":"毒蛇咬傷:固定患肢、勿切吸綁;『抗蛇毒血清依「嚴重度(中毒程度)」給予,非依體重計算』(故D錯)。","options":{"A":"正確:百步蛇致腫脹劇痛瘀血、腔室症候群。","B":"正確:勿劃開/吸吮/綁止血帶。","C":"正確:依腫脹/瘀血/疼痛/生命徵象評估。","D":"★錯誤(本題答案):依嚴重度非體重。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"114070-75":{"quick":"最適合急診開胸 C:刺傷左前胸+到院 PEA(穿透性胸傷、剛喪失生命徵象)。","detail":{"background":"急診開胸(ED thoracotomy)最適合『穿透性胸傷(如刺傷左前胸)且剛喪失生命徵象(到院PEA)』(C);鈍傷停跳預後極差。","options":{"A":"墜樓鈍傷心跳停止預後極差。","B":"有血壓者宜進手術室,非急診開胸。","C":"★正確(本題答案):穿透性胸傷+PEA。","D":"鈍傷 PEA 預後差。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"115020-1":{"quick":"最適當 A:小孩頭皮撕裂傷流血易致失血性休克(相對血量小)。","detail":{"background":"小兒外傷:『頭皮撕裂傷流血易致失血性休克(相對血量小)』(A);兒童代償強、低血壓為晚期表現;肋骨彈性故可無骨折仍有內傷。","options":{"A":"★正確(本題答案):頭皮撕裂傷可致失血性休克。","B":"錯:小孩肋骨有彈性、較不易骨折。","C":"錯:小孩肝脾受胸廓保護較少。","D":"錯:小孩脾破裂非手術成功率較高。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"115020-77":{"quick":"最不適當 B:「並非任何部位」咬傷都高感染風險(臉/頭皮血供佳、風險較低)。","detail":{"background":"哺乳動物咬傷多數高感染風險(尤貓咬、手部、深部);『並非任何部位都高風險——臉/頭皮血供佳風險較低』(B最不適當,但仍須清創評估)。","options":{"A":"正確:貓咬常 Pasteurella multocida。","B":"★最不適當(本題答案):非任何部位都高風險。","C":"正確:臉/頭皮可考慮初級縫合。","D":"正確:人咬多重菌、葡萄/鏈球菌常見。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e"]}},"102110-75":{"quick":"本題多重答案(ABCD 均給分):外傷失血 20%(Class II)可伴寡尿/意識錯亂/低血壓/頻脈。","detail":{"background":"外傷失血約20%(Class II,750–1500 mL):可伴頻脈、脈壓變窄、焦慮、寡尿;本題ABCD均給分。","options":{"A":"(給分)寡尿。","B":"(給分)意識錯亂。","C":"(給分)低血壓。","D":"(給分)頻脈。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"103100-1":{"quick":"錯在 A:敗血性休克為「血管舒張(非收縮)」、暖休克。","detail":{"background":"休克分類:『敗血性休克為血管「舒張」(暖休克)、CVP低、心輸出常增』(故A『血管收縮』錯)。","options":{"A":"★錯誤(本題答案):敗血性休克為血管舒張。","B":"正確:暖休克心輸出高於正常。","C":"正確:滲透性增、需大量晶體。","D":"正確:輸液後仍低血壓給升壓劑。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"104030-2":{"quick":"不屬 SIRS 者 C:PaCO2「>32」(SIRS 標準為 PaCO2<32)。","detail":{"background":"全身性發炎反應症候群(SIRS)準則(≥2項):體溫>38或<36、HR>90、RR>20或『PaCO2<32』、WBC異常;故C『PaCO2>32』不屬SIRS。","options":{"A":"SIRS:核心體溫<36。","B":"SIRS:心率>90。","C":"★不屬(本題答案):應為 PaCO2<32。","D":"SIRS:白血球<4000。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"104030-4":{"quick":"BP 80/50、HR 120、神智不清=Class III→B:給乳酸林格氏液(晶體先行)。","detail":{"background":"機車外傷、BP 80/50、HR 120、神智不清=Class III出血→『先給乳酸林格氏液(晶體復甦)』(B),必要時輸血、止血。","options":{"A":"非第一級(已休克)。","B":"★正確(本題答案):第三級、晶體液復甦。","C":"初步以晶體非直接濃縮紅血球。","D":"非第二級。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"104030-10":{"quick":"心因性休克 B:CVP↑、動脈壓↓、心輸出↓、SvO2↓。","detail":{"background":"心因性休克之血流動力學:『CVP↑、動脈壓↓、心輸出↓、SvO2↓』(B);幫浦衰竭致前向不足。","options":{"A":"全↓為低血容性。","B":"★正確(本題答案):CVP↑其餘↓。","C":"SvO2↑不符。","D":"全↑不符。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"104090-3":{"quick":"不適當 B:敗血症復甦目標 CVP/PAWP 應「8–12」,非<8。","detail":{"background":"疑敗血症低血壓之復甦(SSC):前期晶體30 mL/kg、目標MAP≥65、ScvO2≥70;『CVP/PAWP目標8–12,非<8』(故B不適當)。","options":{"A":"適當:含血液之體液培養。","B":"★不適當(本題答案):CVP 目標非<8。","C":"適當:MAP>65、心率<120。","D":"適當:監測 SvO2 與尿量。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"105100-11":{"quick":"錯在 C:神經性休克四肢「溫暖、灌流不差」(血管舒張),非周邊灌流變差。","detail":{"background":"神經性休克(neurogenic shock,脊髓傷致交感失張):低血壓+心搏緩、『四肢溫暖、灌流不差(血管舒張)』(故C『周邊灌流變差』錯)。","options":{"A":"正確:低血壓。","B":"正確:心搏徐緩。","C":"★錯誤(本題答案):周邊溫暖非灌流差。","D":"正確:可用 α 致效劑。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"107020-8":{"quick":"低血容性休克 A:CVP↓、動脈壓↓、心輸出↓、SvO2↓(全部↓)。","detail":{"background":"低血容性休克:『CVP↓、動脈壓↓、心輸出↓、SvO2↓(全部↓)』(A)。","options":{"A":"★正確(本題答案):全部↓。","B":"CVP↑為心因性。","C":"SvO2↑不符。","D":"不符。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"107080-6":{"quick":"大量失血>2000 mL「不」常見表徵 B:脈壓上升(實為脈壓『變窄/下降』)。","detail":{"background":"成人急性大量失血>2000 mL:頻脈、低血壓、『脈壓變窄(下降)』、意識改變;故B『脈壓上升』非常見表徵。","options":{"A":"常見:焦慮/意識錯亂。","B":"★不是(本題答案):脈壓應變窄非上升。","C":"常見:血壓下降。","D":"常見:尿量減少。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"108080-3":{"quick":"SIRS 須符合 B:二種(≥2 項)。","detail":{"background":"SIRS診斷須符合『≥2項(二種以上)』(B):體溫、心跳、呼吸/PaCO2、白血球。","options":{"A":"一種不足。","B":"★正確(本題答案):≥2 種。","C":"非須三種。","D":"非須四種。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"109080-29":{"quick":"正確為 C:第三期出血量約占全身血量 30–40%。","detail":{"background":"出血性休克分期(60 kg):I<15%、II 15–30%、III 30–40%、IV>40%;『第三期約30–40%血量』(C)。","options":{"A":"第一期尿量>30 mL/h(非 5–15)。","B":"第二期呼吸 20–30 次/min。","C":"★正確(本題答案):第三期 30–40%。","D":"第四期心率>140。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"103030-8":{"quick":"錯在 B:需輸血時應以「成分輸血」為主(非全血優先)。","detail":{"background":"輸血原則:『需輸血時以成分輸血(紅血球/血漿/血小板)為主,非全血優先』(故B錯)。","options":{"A":"正確:術前停抗凝劑。","B":"★錯誤(本題答案):非以全血優先。","C":"正確:術中止血。","D":"正確:Hb>8 非急需者以紅血球輸血。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"105020-4":{"quick":"大量輸血「較少」出現 D:溶血性反應(正確配對下少見;稀釋性血小板減少/酸中毒/高血鉀常見)。","detail":{"background":"大量輸血併發症:稀釋性血小板減少/凝血病變、低體溫、高血鉀、低血鈣(檸檬酸)、酸中毒;『正確配對下溶血性反應較少見』(D)。","options":{"A":"常見:稀釋性血小板缺乏。","B":"常見:代謝性酸中毒。","C":"常見:高血鉀(舊血)。","D":"★較少(本題答案):溶血性反應。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"106080-3":{"quick":"錯在 A:大量輸血「不常規給碳酸氫鈉」(檸檬酸代謝成碳酸氫鹽易致鹼中毒)。","detail":{"background":"大量輸血:『不常規給碳酸氫鈉(檸檬酸代謝成碳酸氫鹽,易致代謝性鹼中毒)』(故A錯);注意低血鈣、低體溫。","options":{"A":"★錯誤(本題答案):不常規給碳酸氫鈉。","B":"正確:檸檬酸結合鈣致低血鈣。","C":"正確:稀釋性血小板減少。","D":"正確:舊血致高血鉀。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"109080-3":{"quick":"VKA(warfarin)擇期手術前停藥 5 天,使 INR 降至 C:1.5 以下。","detail":{"background":"warfarin(VKA)擇期手術前停藥約5天,使『INR降至1.5以下』(C)再手術;高風險者橋接。","options":{"A":"2.0 仍偏高。","B":"1.8 偏高。","C":"★正確(本題答案):INR<1.5。","D":"1.2 過嚴。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"109080-4":{"quick":"不屬致死三聯者 A:心律不整(三聯=酸中毒/低體溫/凝血病變)。","detail":{"background":"致死三聯(lethal triad)=『酸中毒、低體溫、凝血病變』;『心律不整不屬之』(A)。","options":{"A":"★不屬(本題答案):心律不整。","B":"三聯:酸中毒。","C":"三聯:低體溫。","D":"三聯:凝血病變。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"111020-38":{"quick":"胰臟癌術前、近期支架雙抗血小板(Plavix+aspirin)→D:告知主治醫師並暫停預定手術。","detail":{"background":"胰臟癌術前、近期心臟支架雙抗血小板(clopidogrel+aspirin):停藥有支架血栓風險→『與主治醫師討論並暫停預定手術(調整抗血小板/時機)』(D)。","options":{"A":"不應貿然手術。","B":"近期支架停雙抗血小板風險高。","C":"橋接低分子肝素不解決血小板問題。","D":"★正確(本題答案):告知主治、暫停手術。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"112020-1":{"quick":"緊急不知血型→B:可輸 O 型「紅血球」(O-neg)。","detail":{"background":"緊急輸血而不知血型→可輸『O型紅血球(O陰性,萬用紅血球)』(B);血漿則用AB型。","options":{"A":"不宜輸 O 型全血。","B":"★正確(本題答案):O 型紅血球。","C":"血漿應 AB 型(非 O 型)。","D":"危急不應等血型。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"112080-1":{"quick":"大量輸血流程最佳比例 D:血漿:血小板:紅血球=1:1:1(本題多重答案 C/D 均給分)。","detail":{"background":"大量輸血流程(MTP)最佳血品比例為『血漿:血小板:紅血球=1:1:1』(D,亦接受C);可降低創傷凝血病變死亡。","options":{"A":"1:1:4 比例不佳。","B":"1:1:3 比例不佳。","C":"(給分)1:1:2。","D":"★正確(本題答案):1:1:1。"},"sources":["ATLS 10th Edition","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Surviving Sepsis Campaign"]}},"115020-46":{"quick":"錯在 B:高血鈣危症應「大量生理食鹽水+loop 利尿(furosemide)」,thiazide 反升血鈣。","detail":{"background":"高血鈣危症(意識不清、重度昏迷)治療『大量生理食鹽水補水+loop利尿(furosemide);thiazide反升血鈣』(故B錯)。","options":{"A":"正確:查磷/PTH 鑑別高血鈣病因。","B":"★錯誤(本題答案):應用 furosemide 非 thiazide。","C":"正確:可給 bisphosphonate。","D":"正確:可給 calcitonin。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"102110-3":{"quick":"錯在 B:依本題,燒傷蛋白質需求之數值敘述被判錯誤(燒傷蛋白約 1.5–2.0 g/kg、熱量高)。","detail":{"background":"不同壓力下營養需求:燒傷/敗血為高代謝,蛋白需求約1.5–2.0 g/kg、熱量高;本題以燒傷蛋白質之數值敘述被判錯誤(B)。","options":{"A":"正確:mild stress 25–30 kcal/kg。","B":"★錯誤(本題答案):燒傷蛋白質需求數值。","C":"正確:燒傷熱量 35–40 kcal/kg。","D":"正確:NPC:N 約 150:1。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"103030-2":{"quick":"腸道營養優於靜脈營養之原因「錯誤」者 D:易引發吸入性肺炎(此為腸道營養的『缺點』非優點)。","detail":{"background":"腸道營養優於靜脈營養之原因:維持腸黏膜屏障/減少菌移位、較少導管感染、較生理;『易引發吸入性肺炎是腸道營養的缺點(非優點)』(故D錯)。","options":{"A":"正確優點:價格較低。","B":"正確優點:併發症較少。","C":"正確優點:腸黏膜較不萎縮。","D":"★錯誤(本題答案):吸入性肺炎為缺點。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"103030-3":{"quick":"非 TPN 適應症者 A:嚴重頭部外傷昏迷(仍可用腸道/鼻胃管營養)。","detail":{"background":"全靜脈營養(TPN)適應症:腸道無法使用(短腸、腸阻塞、高位瘻管、嚴重胰臟炎);『嚴重頭部外傷昏迷仍可用腸道/鼻胃管營養,非TPN適應症』(A)。","options":{"A":"★不是(本題答案):頭外傷昏迷可腸道營養。","B":"是:長期腸麻痺。","C":"是:腸皮瘻管。","D":"是:短腸症。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"103100-3":{"quick":"正常無壓力成人 TPN 蛋白質供應 B:1.0 g/kg/day。","detail":{"background":"無壓力正常成人TPN蛋白質供應約『1.0 g/kg/day』(B);壓力/燒傷時升至1.5–2.0。","options":{"A":"0.8 偏低。","B":"★正確(本題答案):1.0 g/kg/day。","C":"1.5 為壓力/重症。","D":"未列。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"103100-9":{"quick":"錯在 B:腫瘤溶解症候群造成「低血鈣」(+高鉀/高磷/高尿酸),非高血鈣。","detail":{"background":"腫瘤溶解症候群:細胞快速崩解釋出→『高鉀、高磷、高尿酸、低血鈣(磷結合)』;故B『高血鈣』錯。","options":{"A":"正確:副甲亢為高血鈣常見原因。","B":"★錯誤(本題答案):腫瘤溶解致低血鈣。","C":"正確:休克復甦後可急性低血鈣。","D":"正確:服毛地黃者鈣輸液勿太快。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"103100-10":{"quick":"腸道外營養適應症 C:胃腸道皮膚瘻管(需腸道休息)。","detail":{"background":"腸道外營養(parenteral)適應症為腸道無法吸收/須休息:『胃腸道皮膚瘻管(需腸道休息)』(C)。","options":{"A":"甲亢非適應症。","B":"急性膽囊炎非適應症。","C":"★正確(本題答案):腸皮瘻管。","D":"靜脈栓塞非適應症。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"104090-5":{"quick":"錯在 A:再餵食症候群「非」magnesium steal syndrome(核心為低血磷)。","detail":{"background":"再餵食症候群(refeeding syndrome):長期飢餓後給養→胰島素上升使K/P/Mg移入細胞→『低血磷為核心(伴低鉀低鎂)』;非magnesium steal syndrome(故A錯)。","options":{"A":"★錯誤(本題答案):非 magnesium steal syndrome。","B":"正確:補鎂/鉀/磷。","C":"正確:隨時調整 TPN。","D":"正確:大量嘔吐補鉀。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"104090-47":{"quick":"鼻胃管多量似膽汁分泌物→C:林格氏乳酸液(組成接近上消化液)補充最恰當。","detail":{"background":"鼻胃管多量似膽汁分泌物(上消化液流失)→補充組成接近之『林格氏乳酸液』(C)。","options":{"A":"生理食鹽水缺鉀/HCO3。","B":"葡萄糖水不補電解質。","C":"★正確(本題答案):林格氏乳酸液。","D":"半食鹽水不足。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"105100-3":{"quick":"非營養評估指標者 B:球蛋白(globulin)。","detail":{"background":"營養狀態評估指標:白蛋白、前白蛋白、運鐵蛋白、氮平衡、淋巴球數;『球蛋白(globulin)非營養評估指標』(B)。","options":{"A":"是:白蛋白。","B":"★除外(本題答案):球蛋白非營養指標。","C":"是:前白蛋白。","D":"是:轉鐵蛋白。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"106020-8":{"quick":"非中央靜脈導管併發症者 D:尿路感染。","detail":{"background":"中央靜脈導管(TPN)併發症:氣胸、血胸、空氣栓塞、導管相關血流感染、血栓;『尿路感染與中央靜脈導管無關』(D)。","options":{"A":"是:導管內血栓。","B":"是:氣胸(置放併發症)。","C":"是:臂叢神經損傷。","D":"★非(本題答案):尿路感染。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"108030-8":{"quick":"再餵食症候群早期應補 A:鉀、磷、鎂。","detail":{"background":"長期禁食後再餵食(防再餵食症候群),早期應注意補充『鉀、磷、鎂』(A)——胰島素上升使其移入細胞致低血鉀/低血磷/低血鎂,並補thiamine。","options":{"A":"★正確(本題答案):鉀、磷、鎂。","B":"含鈉/鈣不符。","C":"含鈣不符。","D":"含鈉不符。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"108030-48":{"quick":"TPN 致膽汁鬱積最理想治療 D:儘可能恢復腸道營養。","detail":{"background":"TPN致膽汁鬱積(cholestasis)之最理想治療為『儘可能恢復腸道營養(enteral feeding)』(D);並調整脂質、ursodeoxycholic acid。","options":{"A":"增加脂肪乳劑反加重。","B":"補脂溶性維生素非治本。","C":"MCT 配方非治本。","D":"★正確(本題答案):恢復腸道營養。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"108080-5":{"quick":"Na 117(重度低血鈉)→C:矯正速率<0.5 mEq/L/hr(避免滲透性脫髓鞘)。","detail":{"background":"血鈉117(重度低血鈉)→『矯正速率<0.5 mEq/L/hr(每日<8–10),以避免滲透性脫髓鞘(ODS)』(C)。","options":{"A":"錯:重度低鈉常有症狀。","B":"錯:117 屬重度(非中度)。","C":"★正確(本題答案):緩慢矯正<0.5 mEq/L/hr。","D":"錯:需治療不可只觀察。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"109080-8":{"quick":"錯在 C:膽汁 HCO3 濃度「不比胰液高」(胰液鹼性、HCO3 最高)。","detail":{"background":"開腹術後引流消化液之電解質注意:不同消化液成分不同;『胰液為鹼性、HCO3最高;膽汁之HCO3不比胰液高』(故C錯)。","options":{"A":"正確:胃液 1–2 L、大量流失致低鉀。","B":"正確:腸液分泌量最多、流失致酸中毒。","C":"★錯誤(本題答案):膽汁 HCO3 不高於胰液。","D":"正確:胰液鹼性、600–800 mL。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"110020-6":{"quick":"基礎能量消耗最接近 C:25–30 kcal × 體重(kg)。","detail":{"background":"重症病人基礎能量消耗(BEE)約『25–30 kcal/kg/day』(C)。","options":{"A":"10–15 過低。","B":"15–20 偏低。","C":"★正確(本題答案):25–30 kcal/kg。","D":"30–35 偏高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"110080-3":{"quick":"迴腸造口術後第八天倦怠+低血壓→D:大量體液自迴腸造口流失致電解質不平衡。","detail":{"background":"迴腸造口術後第八天倦怠+低血壓→『大量體液自迴腸造口流失致脫水與電解質不平衡』(D);高流量造口須補液補鉀鈉。","options":{"A":"非腎上腺功能不全。","B":"恢復良好非急性失血。","C":"非腹腔感染。","D":"★正確(本題答案):迴腸造口高排出致電解質失衡。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"111020-1":{"quick":"正確為 D:快速大量輸注等張氯化鈉→高氯性代謝性酸中毒。","detail":{"background":"快速大量輸注等張(0.9%)生理食鹽水→『高氯性代謝性酸中毒』(D);因氯負荷高。","options":{"A":"錯:上消化道/腹瀉失 HCO3 致酸血症(非鹼血症)。","B":"呼吸性酸中毒非此描述。","C":"錯:敗血性休克為代謝性酸中毒。","D":"★正確(本題答案):大量生理食鹽水致高氯酸中毒。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"111020-6":{"quick":"非術後低血鈉常見症狀者 B:心跳加速(常見為頭痛/噁心/虛弱/抽搐)。","detail":{"background":"術後低血鈉常見症狀:頭痛、噁心、虛弱、抽搐、意識改變;『心跳加速非常見症狀』(B)。","options":{"A":"常見:頭痛。","B":"★非(本題答案):心跳加速非典型。","C":"常見:噁心嘔吐。","D":"常見:虛弱疲乏。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"113020-7":{"quick":"Billroth II 術後常需補 C:鈣(及鐵、B12,因吸收不良)。","detail":{"background":"Billroth II術後因吸收不良常需補『鈣(及鐵、維生素B12)』(C)。","options":{"A":"非主要補鉀。","B":"非主要補鈉。","C":"★正確(本題答案):鈣。","D":"非主要補鎂。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"113070-3":{"quick":"最不適當 B:中心靜脈導管「不需每週常規更換」(只在感染/指徵時更換)。","detail":{"background":"TPN之中央靜脈導管感染:嚴格無菌、有感染徵象才換管;『不需每週常規更換導管』(故B最不適當)。","options":{"A":"正確:股靜脈導管感染率較高。","B":"★最不適當(本題答案):不需每週常規更換。","C":"正確:感染多葡萄球菌。","D":"正確:不明發燒應拔管培養。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"114020-6":{"quick":"不是 TPN 併發症者 B:腸道阻塞。","detail":{"background":"TPN併發症:導管相關感染/血栓、高血糖、電解質異常、肝膽功能異常、再餵食症候群;『腸道阻塞非TPN併發症』(B)。","options":{"A":"是:水分過多/過少致水腫/脫水。","B":"★不是(本題答案):腸道阻塞。","C":"是:微量元素缺乏。","D":"是:肝功能變差。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"114020-7":{"quick":"正確為 D:再餵食症候群可因「低血磷」造成心律不整。","detail":{"background":"再餵食症候群:可因『低血磷造成心律不整(及呼吸衰竭、橫紋肌溶解)』(D);餵食前後補K/P/Mg+thiamine。","options":{"A":"胰島素致電解質內移(磷/鉀/鎂)是機轉,但描述不全。","B":"錯:亦見於靜脈營養(非僅經口)。","C":"glutamine 非預防再餵食之關鍵。","D":"★正確(本題答案):低血磷致心律不整。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"114020-37":{"quick":"錯在 D:短腸症脂肪以「中鏈三酸甘油酯(MCT)」為佳,非短鏈。","detail":{"background":"短腸症候群(short bowel):吸收不良、腹瀉;脂肪宜用『中鏈三酸甘油酯(MCT,可直接吸收)』(故D『短鏈』錯)。","options":{"A":"正確:腹瀉/水電解質缺乏為標誌。","B":"正確:早期控制腹瀉、補水電解質、TPN。","C":"正確:初期高糖高蛋白。","D":"★錯誤(本題答案):應用 MCT 非短鏈。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"114070-2":{"quick":"術前須積極營養介入之指標「除外」D:前白蛋白<40 mg/dL(此非營養不良切點,正常約 15–35)。","detail":{"background":"術前須積極營養介入之不良指標:體重減輕>10–15%、白蛋白<3、前白蛋白低;『前白蛋白<40 mg/dL非營養不良切點(正常約15–35)』(D除外)。","options":{"A":"指標:BMI<18.5。","B":"指標:6 月內非刻意減重>10%。","C":"指標:白蛋白<3 g/dL。","D":"★除外(本題答案):pre-albumin<40 非營養不良切點。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"114070-6":{"quick":"長期 TPN+短腸+口周膿疱疹/腹瀉/變黑→D:鋅離子缺乏(腸病性肢端皮膚炎)。","detail":{"background":"長期TPN+短腸+口周膿疱疹/腹瀉/皮膚變黑→『鋅缺乏(腸病性肢端皮膚炎acrodermatitis enteropathica)』(D);TPN須補微量元素。","options":{"A":"非蛋白質缺乏典型。","B":"非脂肪酸缺乏典型。","C":"非維生素 B 典型。","D":"★正確(本題答案):鋅缺乏。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"114070-7":{"quick":"BEE 由高而低 D:嚴重燒燙傷>外科手術>飢餓。","detail":{"background":"創傷後基礎能量消耗(BEE)排序由高而低:『嚴重燒燙傷>大手術>飢餓』(D);燒傷高代謝最甚。","options":{"A":"飢餓不應高於手術。","B":"手術不高於燒傷。","C":"飢餓最低非最高。","D":"★正確(本題答案):燒傷>手術>飢餓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"115020-21":{"quick":"錯在 B:血液滲透壓約「290 mOsm/L」(非 315)。","detail":{"background":"血液滲透壓約『290 mOsm/L』(2×Na+glucose/18+BUN/2.8);故B『315』錯。","options":{"A":"正確:總體水分約 60%×70=42 kg(描述約 38 可接受)。","B":"★錯誤(本題答案):血漿滲透壓約 290。","C":"正確:ECF 含血漿與組織間液。","D":"正確:細胞內液約佔 2/3。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"115020-22":{"quick":"較不會高血鉀者 D:穩定使用 furosemide(loop 利尿致『低』血鉀)。","detail":{"background":"高血鉀常見原因:腎衰、組織崩解、酸中毒、保鉀利尿劑/ACEI、溶血;『穩定使用furosemide(loop利尿)致「低」血鉀,較不會高血鉀』(D)。","options":{"A":"壓砸傷釋鉀→高血鉀。","B":"超馬拉松橫紋肌溶解→高血鉀。","C":"敗血酸中毒→高血鉀。","D":"★較不會(本題答案):furosemide 致低血鉀。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN Nutrition Guideline"]}},"102030-5":{"quick":"錯在 C:肥胖與營養不良「會增加」傷口裂開機率。","detail":{"background":"傷口裂開(dehiscence)危險因子:高齡、肥胖、營養不良、糖尿病、類固醇、腹壓高、感染;『肥胖與營養不良會增加裂開機率』(故C『不會』錯)。","options":{"A":"正確:多數肺栓塞源自深層靜脈栓塞。","B":"正確:老人營養不良併發症高。","C":"★錯誤(本題答案):肥胖/營養不良增傷口裂開。","D":"正確:術後疼痛/輸液過多致高血壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"102030-6":{"quick":"錯在 B:肺擴張不全最常見於術後「24–48 小時」(非 5–7 天)。","detail":{"background":"術後併發症時序:『肺擴張不全(atelectasis)最常見於術後24–48小時』(故B『5–7天』錯)。","options":{"A":"正確:輸血反應可致術後發燒。","B":"★錯誤(本題答案):肺擴張不全多在 24–48 小時。","C":"正確:冠心病/高血壓/高齡增術後心衰。","D":"正確:肛周手術易尿滯留。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"102030-7":{"quick":"錯在 B:術後早期機械性腸阻塞多為「沾黏」,非腸套疊。","detail":{"background":"術後腸阻塞:早期機械性阻塞多為『沾黏』,『非腸套疊』(故B錯);麻痺性腸阻塞為術後常見。","options":{"A":"正確:後腹腔出血致麻痺性腸阻塞。","B":"★錯誤(本題答案):早期阻塞多為沾黏。","C":"正確:封閉迴路阻塞建議再剖腹。","D":"正確:CT 助診阻塞原因。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"102030-20":{"quick":"錯在 B:部分厚度傷口靠上皮再生、「膠原少」(非多)。","detail":{"background":"部分厚度傷口(partial thickness)癒合靠『上皮再生(附屬器/邊緣)』為主、『膠原少』、攣縮少(故B『膠原多』錯)。","options":{"A":"正確:靠上皮再生。","B":"★錯誤(本題答案):膠原少。","C":"正確:附屬器上皮複製覆蓋。","D":"可有收縮。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"102110-6":{"quick":"錯在 D:術前矯正凝血障礙「會降低」術後血腫機率。","detail":{"background":"術後血腫(hematoma):術中止血不全、凝血障礙、抗凝藥;『術前矯正凝血障礙會降低術後血腫機率』(故D『會增加』之敘述錯)。","options":{"A":"正確:血腫可感染。","B":"正確:多因止血不足。","C":"正確:頸部大血腫壓迫氣道。","D":"★錯誤(本題答案):矯正凝血可降低血腫。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"102110-19":{"quick":"錯在 C:纖維母細胞約「第 3–5 天」出現(非第 7 天)。","detail":{"background":"二次癒合(secondary intention):肉芽填充、收縮、上皮化;『纖維母細胞約第3–5天出現』(故C『第7天』錯)。","options":{"A":"正確:傷口收縮變小。","B":"正確:肌纖維母細胞參與。","C":"★錯誤(本題答案):纖維母細胞第 3–5 天出現。","D":"正確:污染傷口多二次癒合。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"103030-4":{"quick":"傷口裂開危險因子「錯誤」者 A:年輕人(應為高齡)。","detail":{"background":"傷口裂開危險因子:高齡、肥胖、糖尿病、營養不良、類固醇、感染、腹壓高;『年輕人非危險因子(應為高齡)』(故A錯)。","options":{"A":"★錯誤(本題答案):年輕人非危險因子。","B":"危險因子:肥胖。","C":"危險因子:糖尿病。","D":"危險因子:化療。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"103030-21":{"quick":"拆線時間正確為 D(134):頭皮 6–8、背部 12–14、四肢 12–14;眼皮應較短(非 10–14)。","detail":{"background":"拆線時間:頭皮6–8、臉/眼皮3–5、軀幹/背12–14、四肢12–14;故正確134(D)(眼皮非10–14)。","options":{"A":"124:含眼皮 10–14(過長)。","B":"123:含眼皮。","C":"234:含眼皮。","D":"★正確(本題答案):頭皮/背/四肢。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"104030-7":{"quick":"淺層 SSI 定義為術後 C:30 天內(本題多重答案 A/B/C 均給分)。","detail":{"background":"淺層手術部位感染(SSI)定義為術後『30天內』(A/B/C均給分);深部/器官腔SSI若有植入物可至90天。","options":{"A":"(給分)。","B":"(給分)。","C":"★正確(本題答案):30 天內。","D":"1 年為含植入物之深層。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"104030-8":{"quick":"錯在 C:正確使用預防性抗生素「仍須注意皮膚消毒」(抗生素不取代消毒)。","detail":{"background":"預防性抗生素:於切皮前60分鐘給、僅清潔污染/污染傷口或植入物;『仍須注意皮膚消毒,抗生素不取代消毒』(故C錯)。","options":{"A":"正確:胃癌根治切除為預防性抗生素適應症。","B":"正確:clean-contaminated 定義。","C":"★錯誤(本題答案):抗生素不取代皮膚消毒。","D":"正確:低風險 clean 可不用抗生素。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"105100-2":{"quick":"正確為 C:尿路感染為術後最常見之「非手術部位」感染。","detail":{"background":"術後感染:『尿路感染為術後最常見之「非手術部位」感染』(C,導尿相關)。","options":{"A":"錯:植入物感染不在肺部。","B":"錯:術後發燒非立即給抗生素。","C":"★正確(本題答案):UTI 最常見非手術部位感染。","D":"錯:經驗性治療非一律加抗厭氧菌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"105100-8":{"quick":"SSI 危險因子「錯誤」者 C:不抽菸的年輕病人(非危險因子)。","detail":{"background":"SSI危險因子:高齡、糖尿病、肥胖、抽菸、營養不良、長手術、污染傷口;『不抽菸的年輕病人非危險因子』(故C錯)。","options":{"A":"危險因子:傷口血腫。","B":"危險因子:低氧血症。","C":"★錯誤(本題答案):不抽菸年輕者非危險因子。","D":"危險因子:營養不良。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"106020-7":{"quick":"錯在 C:「並非所有」腹腔內感染都須手術(可經皮引流/抗生素)。","detail":{"background":"腹腔內感染:多須源頭控制;『並非所有腹腔內感染都須手術(可經皮引流/抗生素)』(故C錯)。","options":{"A":"正確:CT 助診腹腔內感染。","B":"正確:未處理致多器官衰竭。","C":"★錯誤(本題答案):非全須手術。","D":"正確:老人/營養不良併發症風險高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"106020-19":{"quick":"傷口攣縮主要細胞 A:肌纖維母細胞(myofibroblast)。","detail":{"background":"傷口攣縮(contraction)之主要細胞為『肌纖維母細胞(myofibroblast)』(A)。","options":{"A":"★正確(本題答案):肌纖維母細胞。","B":"B 淋巴球非主細胞。","C":"T 淋巴球非主細胞。","D":"巨噬細胞非攣縮主細胞。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"106080-63":{"quick":"正確為 A:cephalosporins 抑制細菌「細胞壁」合成。","detail":{"background":"抗生素機轉:『cephalosporins(β-lactam)抑制細菌細胞壁合成』(A正確)。","options":{"A":"★正確(本題答案):cephalosporin 抑細胞壁。","B":"錯:vancomycin 抑細胞壁(非蛋白質)。","C":"錯:rifampin 抑 RNA 聚合酶(非 DNA)。","D":"錯:quinolone 抑 DNA 旋轉酶(非 RNA)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"107080-4":{"quick":"錯在 C:預防性抗生素主要用於「clean-contaminated/污染傷口或有植入物」,非一般 clean 傷口手術。","detail":{"background":"傷口感染:預防性抗生素主要用於『clean-contaminated/contaminated傷口或有植入物者』;『非一般clean傷口手術常規』(故C錯)。","options":{"A":"正確:病因含細菌/局部/病人因素。","B":"正確:clean 傷口感染率<3%。","C":"★錯誤(本題答案):非用於一般清潔傷口。","D":"正確:>10^5/g 細菌致感染。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"108030-3":{"quick":"錯在 D:PEG(經皮內視鏡胃造口)用於「需長期腸道餵食」者,非高位腸阻塞(描述有誤)。","detail":{"background":"床邊外科處置:PEG/氣切/胸管等;『PEG(經皮內視鏡胃造口)用於需長期腸道餵食者,非高位腸阻塞』(故D錯)。","options":{"A":"正確:床邊手術用於選擇性重症病人。","B":"正確:床邊剖腹用於腹腔室症候群。","C":"正確:PDT 適用重症氣切。","D":"★錯誤(本題答案):PEG 為長期腸道餵食。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"108030-4":{"quick":"不是 SSI 危險因子者 A:癌症病患接受手術(本身非獨立 SSI 危險因子)。","detail":{"background":"SSI危險因子:糖尿病、肥胖、抽菸、營養不良、污染傷口、長手術;『癌症病患接受手術本身非獨立SSI危險因子』(A)。","options":{"A":"★不是(本題答案):單純癌症手術非危險因子。","B":"危險因子:長期抽菸。","C":"危險因子:術中輸血。","D":"危險因子:手術時間長。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"108030-15":{"quick":"傷口攣縮主要細胞 D:肌纖維母細胞(myofibroblast)。","detail":{"background":"傷口攣縮之主要細胞為『肌纖維母細胞(myofibroblast)』(D)。","options":{"A":"T 淋巴球非主細胞。","B":"B 淋巴球非主細胞。","C":"巨噬細胞非攣縮主細胞。","D":"★正確(本題答案):肌纖維母細胞。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"109020-2":{"quick":"第四級(dirty)傷口→D:採延遲縫合或二度縫合。","detail":{"background":"第四級(dirty,如腸穿孔/化膿)傷口→『採延遲縫合或二度縫合(不一期縫合)』(D)以降低感染。","options":{"A":"髒污傷口不宜直接縫合。","B":"清洗後仍不宜直接縫合。","C":"局部抗生素+縫合不足。","D":"★正確(本題答案):延遲/二次縫合。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"109020-3":{"quick":"正確為 C:術前避免遠處感染可防止手術部位感染。","detail":{"background":"SSI預防:『術前先治療/避免遠處感染(如UTI、皮膚)可降低手術部位感染』(C)。","options":{"A":"錯:抗生素不能可靠預防 UTI。","B":"錯:抗生素不預防導管相關血流感染。","C":"★正確(本題答案):控制遠處感染防 SSI。","D":"敘述不全。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"109080-5":{"quick":"錯在 A:依本題,clean wound 之定義/感染率敘述被判錯誤(clean 傷口感染率約 1–2%)。","detail":{"background":"傷口分類與SSI率:clean約1–2%、clean-contaminated、contaminated、dirty遞增;本題對clean wound之定義/感染率敘述被判錯誤(A)。","options":{"A":"★錯誤(本題答案):clean wound 敘述有誤。","B":"clean-contaminated 進空腔但控制。","C":"contaminated 為未控制溢出。","D":"dirty 為已感染/未處理溢出。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"110020-5":{"quick":"術後 48–72 小時發燒最常見原因 C:肺泡塌陷(atelectasis)。","detail":{"background":"術後48–72小時發燒最常見原因為『肺泡塌陷(atelectasis)』(C);更晚則尿路/傷口/導管感染。","options":{"A":"傷口感染多 5–7 天。","B":"腹內膿瘍較晚。","C":"★正確(本題答案):肺擴張不全。","D":"尿路感染多 3–5 天。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"112020-5":{"quick":"不是理想敷料特性者 B:創造「乾燥」環境(理想為維持濕潤)。","detail":{"background":"理想傷口敷料特性:維持濕潤、吸收滲液、保溫、防菌、易更換;『創造乾燥環境非理想(應維持濕潤癒合)』(故B錯)。","options":{"A":"理想:防微生物通透。","B":"★不是(本題答案):應維持濕潤非乾燥。","C":"理想:機械保護。","D":"理想:易操作。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"112080-2":{"quick":"較不易致肺水腫者 D:高血壓(相對胰臟炎/體液過量/左心衰)。","detail":{"background":"術後肺水腫原因:體液過量、左心衰、ARDS、急性胰臟炎、輸血相關;『高血壓相對較不易致肺水腫』(D)。","options":{"A":"胰臟炎可致 ARDS/肺水腫。","B":"體液過量致肺水腫。","C":"急性左心衰致肺水腫。","D":"★較不易(本題答案):高血壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"112080-3":{"quick":"錯在 C:C. difficile 治療為「停用致病抗生素+口服 vancomycin/fidaxomicin」,非廣效抗革蘭氏陰性菌。","detail":{"background":"困難梭狀芽孢桿菌感染(CDI):抗生素相關腹瀉;治療為『停用致病抗生素+口服vancomycin/fidaxomicin』(故C『廣效抗G陰性菌』錯)。","options":{"A":"正確:水瀉/血便/發燒。","B":"正確:糞便毒素/大腸鏡診斷。","C":"★錯誤(本題答案):應口服 vancomycin,非廣效抗 G(-)。","D":"正確:補水分電解質。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"113020-4":{"quick":"錯在 D:氣管內插管「與肺坍塌有關」(分泌物積留/通氣分布改變)。","detail":{"background":"術後肺坍塌(atelectasis):分泌物滯留、淺呼吸、臥床;『氣管內插管與肺坍塌有關(分泌物積留/通氣分布改變)』(故D『無關』錯)。","options":{"A":"正確:麻醉降咳嗽反射。","B":"正確:術後表面張力素下降。","C":"正確:肺坍塌為最常見肺併發症。","D":"★錯誤(本題答案):插管與肺坍塌有關。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"114020-4":{"quick":"感染源控制原則「錯誤」者 D:強效抗生素使用(源控制為引流/清創/移除異物,非僅抗生素)。","detail":{"background":"感染源控制(source control)原則:引流膿瘍、清創壞死、移除異物/導管、修補滲漏;『非僅靠強效抗生素』(故D錯)。","options":{"A":"原則:有效引流。","B":"原則:移除異物。","C":"原則:清創。","D":"★錯誤(本題答案):抗生素非源控制本身。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"115020-25":{"quick":"最不適當 C:預防性抗生素應於「切皮前 60 分鐘內」給,非術前一週預先施打。","detail":{"background":"減少SSI:『預防性抗生素應於切皮前60分鐘內給,非術前一週預先施打』(故C最不適當);控糖、戒菸、正常體溫、適當備皮。","options":{"A":"適當:肥胖者術前減重。","B":"適當:腹部手術腸道準備。","C":"★最不適當(本題答案):不應提前一週給抗生素。","D":"適當:手術時才除毛(減污染)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","CDC SSI Prevention Guideline","IDSA Guideline"]}},"101030-23":{"quick":"正確為 D:cyclosporine 無明顯骨髓抑制,常與 prednisolone 併用。","detail":{"background":"肺移植免疫抑制:鈣調磷酸酶抑制劑(cyclosporine/tacrolimus)+類固醇+抗代謝藥;『cyclosporine無明顯骨髓抑制,常與prednisolone併用』(D正確)。","options":{"A":"類固醇長期可致高血壓等,描述有誤差。","B":"azathioprine 致白血球低為其副作用。","C":"錯:MMF 為抗增殖劑(非 CNI)。","D":"★正確(本題答案):cyclosporine 無骨髓抑制。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"102030-3":{"quick":"錯在 C:Sirolimus(rapamycin)為「mTOR 抑制劑」,非 calcineurin inhibitor。","detail":{"background":"免疫抑制劑:鈣調磷酸酶抑制劑(cyclosporine、tacrolimus);『Sirolimus(rapamycin)為mTOR抑制劑,非calcineurin inhibitor』(故C錯)。","options":{"A":"正確:tacrolimus 致移植後糖尿病。","B":"正確:cyclosporine 致牙齦增生/多毛。","C":"★錯誤(本題答案):sirolimus 為 mTOR 抑制劑。","D":"正確:兩 CNI 皆腎毒。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"106080-1":{"quick":"正確為 C:FK-506 所致糖尿病停藥後有時可恢復。","detail":{"background":"鈣調磷酸酶抑制劑(CNI):cyclosporine、tacrolimus(FK-506);副作用腎毒性、高血糖;『FK-506所致糖尿病停藥後有時可恢復』(C正確)。","options":{"A":"錯:sirolimus 非 CNI。","B":"錯:cyclosporine 為多毛+牙齦增生(非禿髮)。","C":"★正確(本題答案):FK-506 糖尿病可恢復。","D":"錯:兩者皆腎毒。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"107020-3":{"quick":"不是抗排斥藥者 D:valacyclovir(抗病毒藥)。","detail":{"background":"器官移植抗排斥藥:類固醇、CNI、抗代謝藥(MMF/azathioprine)、mTOR抑制劑、單株抗體;『valacyclovir為抗病毒藥,非抗排斥藥』(D)。","options":{"A":"basiliximab 為抗 IL-2R。","B":"兔抗胸腺球蛋白為抗排斥。","C":"tacrolimus 為 CNI。","D":"★正確(本題答案):valacyclovir 為抗病毒。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"109080-9":{"quick":"正確為 D:cyclosporin 與 FK-506 均具腎毒性。","detail":{"background":"抗排斥藥:『cyclosporine與tacrolimus(FK-506)均具腎毒性』(D);機轉皆抑制calcineurin-IL-2。","options":{"A":"錯:兩者皆抑制 IL-2。","B":"錯:急性排斥仍常用類固醇。","C":"錯:葡萄柚汁與兩者皆交互作用。","D":"★正確(本題答案):皆腎毒。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"110020-3":{"quick":"錯在 A:長期類固醇「非」標準模式(現多採減量/類固醇 sparing)。","detail":{"background":"器官移植初期常用類固醇;『長期高劑量類固醇非標準模式(現多採減量/類固醇sparing)』(故A錯)。","options":{"A":"★錯誤(本題答案):長期類固醇非標準。","B":"正確:副作用劑量依賴。","C":"正確:急性排斥用高劑量類固醇。","D":"正確:初期高劑量致全身水腫。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"110080-8":{"quick":"錯在 B:超急性排斥主要與「受贈者」預存抗體有關(非捐贈者)。","detail":{"background":"器官移植:『超急性排斥主要與「受贈者」預存抗體(對供者HLA/ABO)有關』(故B『捐贈者』錯);發生於數分鐘–小時。","options":{"A":"正確:排斥與 HLA 相關。","B":"★錯誤(本題答案):為受贈者預存抗體。","C":"正確:同種識別經直接/間接路徑。","D":"正確:急性排斥分細胞型/抗體型。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"113070-6":{"quick":"錯在 B:tacrolimus 較「不」會牙齦肥厚(牙齦增生為 cyclosporine 特徵)。","detail":{"background":"鈣調磷酸酶抑制劑副作用:cyclosporine致牙齦增生、多毛;『tacrolimus較不會牙齦肥厚』(故B錯);兩者皆腎毒性、致糖尿病。","options":{"A":"正確:tacrolimus 較易禿髮。","B":"★錯誤(本題答案):牙齦肥厚為 cyclosporine。","C":"正確:tacrolimus 神經毒性較高。","D":"正確:tacrolimus 移植後糖尿病較高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"114020-16":{"quick":"首例異體臉部移植成功國家 C:法國(2005)。","detail":{"background":"首例異體臉部移植成功於『法國(2005,Dubernard團隊)』(C)。","options":{"A":"非美國。","B":"非英國。","C":"★正確(本題答案):法國。","D":"非俄羅斯。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"114070-5":{"quick":"錯在 B:Cyclosporine 主要抑制「T 細胞之 IL-2」,非直接抑制巨噬細胞產生 IL-1。","detail":{"background":"免疫抑制劑:『Cyclosporine主要抑制T細胞之IL-2產生(經calcineurin)』(故B『直接抑制巨噬細胞IL-1』錯)。","options":{"A":"正確:azathioprine 抑骨髓。","B":"★錯誤(本題答案):cyclosporine 抑 IL-2(非直接抑 IL-1)。","C":"正確:OKT3 致細胞激素釋放發燒。","D":"正確:脈衝類固醇致高血糖/高血壓/睡眠困擾。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"114070-8":{"quick":"Rituximab 針對 B 細胞表面標誌 C:CD20。","detail":{"background":"Rituximab為抗『CD20』單株抗體,清除B細胞,用於抗體相關排斥/減敏(C)。","options":{"A":"CD4 為輔助 T 細胞。","B":"CD8 為毒殺 T 細胞。","C":"★正確(本題答案):CD20。","D":"CD34 為造血幹細胞。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Transplant Immunology"]}},"102110-26":{"quick":"IVC 濾網適應症「錯誤」者 A:股靜脈血栓「不論有無抗凝皆須置放」(過度,僅抗凝禁忌/失敗才放)。","detail":{"background":"下腔靜脈濾網(IVC filter)適應症:VTE且抗凝禁忌/失敗、抗凝下仍復發;『股靜脈血栓不論有無抗凝皆置放屬過度』(故A錯)。","options":{"A":"★錯誤(本題答案):非一律置放。","B":"適應症:DVT 但不適合抗凝。","C":"適應症:慢性肺栓塞合併肺高壓。","D":"適應症:足量抗凝下仍反覆 DVT。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"104030-43":{"quick":"術前甲狀腺風暴→「不包括」A:儘快施行骨科手術(須先控制風暴)。","detail":{"background":"術前甲狀腺風暴(發燒、心搏快、甲狀腺腫):應先控制風暴(β-blocker、抗甲狀腺藥、碘、類固醇);『不包括儘快施行骨科手術(風暴未控制不宜手術)』(A除外)。","options":{"A":"★不包括(本題答案):不可貿然手術。","B":"應查 T3/T4/TSH。","C":"冰氈/退燒降溫。","D":"β-blocker+類固醇靜注。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"105100-9":{"quick":"腫瘤標記配對「錯誤」者 A:CA19-9 應對「胰臟/膽道癌」(非卵巢癌;卵巢為 CA-125)。","detail":{"background":"腫瘤標記配對:CEA(大腸)、AFP(肝/生殖)、CA-125(卵巢)、PSA(攝護腺)、CA19-9(胰/膽);『CA19-9對胰/膽道癌非卵巢癌』(故A錯)。","options":{"A":"★錯誤(本題答案):CA19-9 為胰膽癌。","B":"正確:AFP-肝細胞癌。","C":"正確:CEA-大腸癌。","D":"正確:hCG-絨毛膜癌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"108030-24":{"quick":"可暫不放 IVC 濾網者 A:首次急性肺動脈栓塞(可抗凝)。","detail":{"background":"IVC濾網:用於抗凝禁忌/失敗、復發性PE;『首次急性肺栓塞可抗凝者可暫不放濾網』(A)。","options":{"A":"★正確(本題答案):首次急性 PE 可抗凝。","B":"抗凝禁忌須放濾網。","C":"慢性肺栓塞+肺高壓須放。","D":"足量抗凝仍反覆須放。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"110020-4":{"quick":"錯在 B:Bence Jones 蛋白為「多發性骨髓瘤」標記(非淋巴癌)。","detail":{"background":"惡性腫瘤標記:『Bence Jones蛋白為多發性骨髓瘤(輕鏈)標記,非淋巴癌』(故B錯)。","options":{"A":"正確:常轉移肺/肋膜。","B":"★錯誤(本題答案):Bence Jones 為多發性骨髓瘤。","C":"正確:切除單一轉移可延長存活。","D":"正確:CEA 敏感/特異性不佳、用於追蹤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"111080-5":{"quick":"高壓氧治療傷口缺氧先決條件 B:確認標的傷口本身血液循環暢通(氧才能送達)。","detail":{"background":"高壓氧治療傷口缺氧之先決條件:『標的傷口本身血液循環需暢通(氧才能送達組織)』(B);用於難癒/放射性傷口/壞死性感染。","options":{"A":"合併症控制非最主要先決。","B":"★正確(本題答案):傷口血流暢通。","C":"感染非絕對禁忌。","D":"縫合堅固非先決。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"111080-22":{"quick":"錯在 D:May-Thurner 症候群為靜脈血栓的「成因」(左髂靜脈受壓),非併發症。","detail":{"background":"深層靜脈栓塞(DVT):Virchow三要素;『May-Thurner症候群(左髂靜脈受右髂動脈壓迫)為DVT之成因,非併發症』(故D錯)。","options":{"A":"正確:危險因子含年齡/惡性腫瘤/手術/病史。","B":"正確:Virchow 三要素。","C":"正確:protein C/S/AT III 缺乏為成因。","D":"★錯誤(本題答案):May-Thurner 為成因非併發症。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"112020-20":{"quick":"不需放 IVC 濾網者 A:慢性下腔靜脈完全阻塞(無法/不需置放)。","detail":{"background":"IVC濾網用於DVT且抗凝禁忌/失敗者;『慢性下腔靜脈完全阻塞者不需/無法置放』(A)。","options":{"A":"★正確(本題答案):慢性 IVC 完全阻塞不需。","B":"需放:抗凝絕對禁忌。","C":"需放:足量抗凝仍復發。","D":"需放:慢性肺栓塞+肺高壓。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"112080-57":{"quick":"長骨骨折後意識模糊+點狀出血→脂肪栓塞;最不適當 C:誤當腦壓升高給 mannitol(應支持治療)。","detail":{"background":"長骨(股骨幹)骨折後意識模糊+皮膚點狀出血→『脂肪栓塞症候群』;最不適當為C『誤當腦壓升高給mannitol』(應支持治療、供氧)。","options":{"A":"正確:CXR 暴風雪外觀。","B":"正確:可低血氧及血小板低下。","C":"★最不適當(本題答案):非腦壓升高,不需 mannitol。","D":"正確:支持治療±類固醇。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"113020-22":{"quick":"診斷 DVT 最常用工具 A:杜卜勒(duplex)超音波。","detail":{"background":"診斷DVT最常用『杜卜勒(duplex)超音波』(A);D-dimer用於排除。","options":{"A":"★正確(本題答案):duplex 超音波。","B":"MRV 非最常用。","C":"靜脈攝影侵入性。","D":"阻抗容積描記術較少用。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}},"115020-38":{"quick":"錯在 B:D-dimer「不可作為唯一確診工具」(陰性預測值高、用於排除,非確診)。","detail":{"background":"DVT:D-dimer『陰性預測值高、用於排除,不可作為唯一確診工具』(故B錯);確診靠duplex超音波。","options":{"A":"正確:Homan sign 敏感/特異性低。","B":"★錯誤(本題答案):D-dimer 非唯一確診。","C":"正確:超音波可視血栓/壓迫測試。","D":"正確:靜脈攝影較準但侵入。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","DeVita Cancer","ACCP VTE Guideline"]}}},TO=["創傷急救與評估", "休克與全身炎症反應", "輸血與凝血", "體液‧電解質‧酸鹼‧營養", "手術併發症與外科感染", "器官移植", "外科腫瘤學與靜脈栓塞"],LEC={"創傷急救與評估":{"title":"創傷急救與評估","html":"\n<p><b>ATLS 初級評估 ABCDE:</b>Airway(保護頸椎下維持氣道)、Breathing、Circulation(止血+輸液)、Disability(GCS)、Exposure。<b>立即致命傷</b>=氣道阻塞、張力性氣胸、開放性氣胸、大量血胸、連枷胸/肺挫傷、心包填塞(自發性氣胸非立即致命)。張力性氣胸為「臨床診斷」即刻減壓,勿等影像。</p>\n<p><b>輸液復甦:</b>晶體液(LR/NS)<b>20 mL/kg bolus</b>,小孩重複 2 次後輸血;尿量目標<b>成人>0.5、小孩>1 mL/kg/hr</b>。插管首重「頸椎保護」、插管後先「確認位置」。脈搏估收縮壓:橈≈>80、股>70、頸>60(消失序橈→股→頸)。失敗 IV 用「骨內針」。</p>\n<p><b>創傷處置:</b>死亡三峰,<b>0–15 分即刻死亡最多</b>;致死三聯=低體溫+酸中毒+凝血病變→傷害控制手術。腹部鈍傷穩定者 CT 特異性最高、不穩定者進手術室;骨盆骨折出血(穩定後)→血管栓塞。重大創傷 30 分內送創傷中心(單純小腿開放骨折非優先)。橫紋肌溶解/壓砸傷→積極輸液(非限水)。<b>動物咬傷</b>多 amoxicillin-clavulanate;蛇毒血清依「嚴重度(非體重)」。ED 開胸最適「穿透性胸傷+剛喪失生命徵象」。</p>\n"},"休克與全身炎症反應":{"title":"休克與全身炎症反應","html":"\n<p><b>休克血流動力學:</b>低血容/失血(CVP↓動脈↓CO↓SvO2↓,全↓)、心因性(CVP↑其餘↓)、分布性(敗血/神經,血管舒張、暖休克)。<b>敗血性休克=血管舒張</b>、輸液後仍低血壓給 norepinephrine;<b>神經性休克=低血壓+心搏徐緩+四肢溫暖</b>。Surviving Sepsis:MAP≥65、CVP 8–12、早期培養+抗生素。</p>\n<p><b>SIRS(≥2 項):</b>體溫>38 或<36、心率>90、呼吸>20 或 <b>PaCO2<32</b>、白血球>12000 或<4000。</p>\n<p><b>失血性休克分級:</b>I<15%、<b>II 15–30%(脈壓變窄、心率>100、焦慮)</b>、<b>III 30–40%(低血壓、心率>120、意識混亂)</b>、IV>40%(心率>140)。先晶體液後血品。大量失血脈壓「變窄」(非上升)。</p>\n"},"輸血與凝血":{"title":"輸血與凝血","html":"<p><b>血品與適應症：</b><b>濃縮紅血球(PRBC)</b>(每單位約升 Hb 1g/dL，穩定病人常用 Hb<7 閾值，活動性出血依臨床)；<b>血小板</b>(出血或<10k 預防)；<b>新鮮冷凍血漿(FFP)</b>(多重凝血因子缺乏、warfarin 急逆轉、大量輸血)；<b>冷凍沉澱品</b>(纖維蛋白原、第八因子、vWF)。輸血只與 <b>0.9% NS</b> 併輸；須 ABO/Rh 配型＋交叉試驗。</p>\n<p><b>大量輸血：</b>定義 24h 內≥10 單位或 1h≥4 單位；併發<b>低體溫、低血鈣(枸櫞酸)、高血鉀、凝血病(稀釋)</b>；現代採 <b>PRBC:FFP:血小板≈1:1:1</b>＋止血復甦、避免大量晶體。</p>\n<p><b>輸血反應：</b><b>急性溶血(ABO 不合)</b>→停輸、保留靜脈、輸液利尿；發熱非溶血、過敏(IgA 缺乏致過敏性休克)、<b>TRALI</b>(輸血後急性肺水腫、抗 HLA/HNA)、<b>TACO</b>(容積過載)、遲發性溶血。</p>\n<p><b>凝血評估：</b><b>PT/INR</b>(外在路徑、warfarin/肝病/維生素 K)、<b>aPTT</b>(內在路徑、heparin/血友病)、<b>血小板/出血時間</b>(初級止血)；<b>DIC</b>＝PT/aPTT 延長、血小板低、纖維蛋白原低、D-dimer 升。維生素 K 逆轉 warfarin、魚精蛋白逆轉 heparin。</p>\n<p><b>★考點：</b>FFP=多因子、冷凍沉澱=纖維蛋白原；大量輸血 1:1:1＋注意低鈣低溫高鉀；輸血即發燒血紅素尿＝ABO 急性溶血(停輸)；PT=外在(warfarin)、aPTT=內在(heparin)；DIC 四項。</p>"},"體液‧電解質‧酸鹼‧營養":{"title":"體液‧電解質‧酸鹼‧營養","html":"\n<p><b>營養:</b>BEE 約 <b>25–30 kcal/kg/day</b>;正常蛋白 1.0、重症/燒傷 1.5–2.0 g/kg;NPC:N 約 150:1;創傷後 BEE「燒傷>手術>飢餓」。<b>腸道營養優於 TPN</b>(便宜/併發症少/腸黏膜不萎縮);TPN 適應症=腸麻痺/腸瘻管/短腸(頭外傷昏迷可腸道營養)。指標:白蛋白/前白蛋白/轉鐵蛋白(球蛋白非)。<b>再餵食症候群</b>=低血磷/鉀/鎂、心律不整,補磷鉀鎂。短腸用 <b>MCT</b>;長期 TPN+口周膿疱疹/腹瀉→<b>鋅缺乏</b>;TPN 膽汁鬱積→恢復腸道營養。</p>\n<p><b>體液電解質酸鹼:</b>總體水分約 60%、血漿滲透壓約 <b>290 mOsm/L</b>。消化液:胃液(失→低鉀/鹼中毒)、胰液(HCO3 最高)、腸液(分泌最多,失→酸中毒)、迴腸造口高排出。<b>Billroth II 補鈣</b>。<b>腫瘤溶解→低血鈣</b>;高鈣危症=生理食鹽水+<b>furosemide</b>(thiazide 反升鈣);furosemide 致低血鉀。重度低血鈉矯正<0.5 mEq/L/hr(避免滲透性脫髓鞘)。大量等張食鹽水→高氯性代謝性酸中毒。</p>\n"},"手術併發症與外科感染":{"title":"手術併發症與外科感染","html":"\n<p><b>術後發燒 5W:</b>Wind(<b>肺擴張不全,24–48h 最常見</b>、術後最常見肺併發症)、Water(UTI 3–5d,術後最常見『非手術部位』感染)、Wound(5–7d)、Walking(DVT)、Wonder drug。術後 48–72h 發燒多為肺擴張不全。術後血腫多因止血不足,矯正凝血可降低。理想敷料維持「濕潤」。</p>\n<p><b>傷口癒合:</b>部分厚度靠上皮再生、膠原少;二次癒合靠肉芽+收縮、<b>肌纖維母細胞為攣縮主細胞</b>、纖維母細胞第 3–5 天出現。拆線:頭/臉 5–7、軀幹/四肢 12–14 天。裂開危險:肥胖/糖尿/營養不良/化療/高齡(年輕非)。</p>\n<p><b>SSI:</b>淺層定義術後 30 天(植入物 90 天)。傷口分級 clean/clean-contaminated/contaminated/dirty,<b>第四級(dirty)→延遲或二次縫合</b>。預防:控制遠處感染/血糖/戒菸/<b>切皮前 60 分鐘給預防抗生素(非提前一週)</b>/手術時才除毛/皮膚消毒(抗生素不取代)。預防抗生素用於 clean-contaminated/污染/植入物。<b>感染源控制=引流/清創/移除異物</b>(非僅強效抗生素)。腹腔內感染非全須手術。<b>C. difficile</b>→停致病抗生素+口服 vancomycin/fidaxomicin。抗生素機轉:cephalosporin/vancomycin 抑細胞壁、quinolone 抑 DNA 旋轉酶、rifampin 抑 RNA 聚合酶。</p>\n"},"器官移植":{"title":"器官移植","html":"\n<p><b>免疫抑制劑:</b>①<b>鈣調磷酸酶抑制劑(CNI)</b>—cyclosporine(牙齦增生、多毛、腎毒)、tacrolimus(神經毒/移植後糖尿病高、禿髮、腎毒;PTDM 停藥可恢復);②抗增殖—azathioprine(<b>骨髓抑制/白血球低</b>)、MMF;③mTOR 抑制劑—<b>sirolimus(非 CNI)</b>;④類固醇(急性排斥用、長期已減量);⑤生物製劑—basiliximab(抗 IL-2R)、ATG、OKT3(致細胞激素釋放發燒)、<b>rituximab(抗 CD20)</b>。valacyclovir 為抗病毒非抗排斥。CNI 與葡萄柚汁交互作用、皆腎毒。</p>\n<p><b>排斥:</b><b>超急性=受贈者『預存抗體』</b>(非捐贈者);急性分細胞型/抗體型;與 HLA 相關。首例異體臉部移植 2005 年於<b>法國</b>。</p>\n"},"外科腫瘤學與靜脈栓塞":{"title":"外科腫瘤學與靜脈栓塞","html":"\n<p><b>腫瘤標記:</b>AFP(肝癌/生殖細胞)、CEA(大腸癌,敏感/特異性差、用於追蹤)、<b>CA19-9(胰膽癌)</b>、CA-125(卵巢癌)、hCG(絨毛膜癌)、<b>Bence Jones 蛋白(多發性骨髓瘤)</b>。單一轉移病灶(肺/肝/腦)切除可能延長存活。術前甲狀腺風暴須先控制(β-blocker/類固醇/抗甲狀腺藥/降溫)、勿貿然手術。高壓氧治療傷口缺氧先決=「標的傷口血流暢通」。</p>\n<p><b>靜脈栓塞(VTE):</b>Virchow 三要素;危險因子年齡/惡性腫瘤/手術/病史/protein C·S·AT III 缺乏/May-Thurner(成因非併發症)。<b>診斷首選 duplex 超音波</b>;D-dimer 排除用(非確診);多數 PE 源自下肢 DVT。<b>IVC 濾網</b>:抗凝禁忌、足量抗凝仍反覆、慢性肺栓塞+肺高壓;首次單純急性 PE 可抗凝(不需濾網)。<b>脂肪栓塞症候群</b>(長骨骨折+意識改變+點狀出血+低血氧、CXR 暴風雪狀)→支持治療(非腦壓升高、勿給 mannitol)。</p>\n"}};

let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_gensurg_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
