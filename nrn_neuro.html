ail":{"background":"大腦動脈供應區決定中風的症狀分布：①中大腦動脈(MCA)供應大腦半球「外側面」，含運動/感覺皮質的「臉、手臂」區與優勢半球(多為左側)的語言區(Broca、Wernicke)，阻塞→對側「上肢重於下肢」的偏癱＋失語。②前大腦動脈(ACA)供應「內側面」，主管對側「下肢」，阻塞→下肢重於上肢的無力。③後大腦動脈(PCA)供應枕葉→對側偏盲。本例右手0分(最弱)、右腳3分、左肢5分(正常)＋失語：右側偏癱(上肢重)→左半球；有失語→優勢半球語言區受損；上肢重於下肢→MCA。故為「左側MCA」。","options":{"A":"左側前大腦動脈阻塞應以「下肢」無力為主，與本例上肢最弱不符。","B":"正解。左MCA供應運動皮質手臂區與語言區，阻塞造成右側上肢為主的偏癱＋失語。","C":"右側後大腦動脈→對側(左)視野缺損，不會造成右側偏癱與失語。","D":"右側基底動脈病變→腦幹徵象(複視、吞嚥困難、四肢症狀)，非單純右偏癱失語。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"102110-N3-67":{"quick":"出血性中風「禁用」抗凝(heparin)與抗血小板(aspirin)，會加重出血→錯誤者為1、2。","detail":{"background":"出血性腦中風(腦內出血、SAH)的治療原則與缺血性中風相反：缺血性中風要「打通/抗栓」(抗血小板、抗凝、rt-PA)；出血性中風則要「止血、降腦壓、控血壓」，任何抗凝血劑(heparin)或抗血小板劑(aspirin)都會擴大血腫、加重出血，屬禁忌。出血性中風常用：滲透性利尿劑mannitol降顱內壓、抗高血壓藥(如trandate/labetalol)平穩降壓減少再出血、必要時手術清除血腫。故敘述1(抗凝)、2(抗血小板)為「錯誤」的藥物治療。","options":{"A":"正解。1抗凝血劑heparin、2抗血小板aspirin皆會加重腦出血，為出血性中風禁忌，是錯誤的治療。","B":"13含正確的mannitol(3)，故非全錯。","C":"23含正確的mannitol(3)。","D":"34皆為正確治療(降腦壓、控血壓)，非錯誤。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"102110-N3-69":{"quick":"血栓型腦血管意外→局部神經缺損如「偏癱或失語」(B、D、C較像出血/栓塞)。","detail":{"background":"腦中風依機轉分：①血栓型(thrombotic)：動脈粥狀硬化處逐漸形成血栓，常於「休息/睡眠中」發作、發病前常有暫時性缺血(TIA)先驅症狀，造成局部腦缺血→對側偏癱、失語等「局部神經功能缺損」。②栓塞型(embolic)：心源性栓子(如心房顫動)突然阻塞，症狀「突發」、常無預警。③出血型：常於「活動/情緒激動、血壓飆高」時發作，伴「劇烈搏動性頭痛」、可快速失去意識。本題問血栓型「正確」敘述→偏癱或失語。","options":{"A":"正解。血栓型造成局部腦缺血，典型表現為對側偏癱或失語等局部神經缺損。","B":"「不預期突然失去意識」較符合大出血或大範圍栓塞。","C":"「常發生於情緒激動時」是出血性中風的特徵。","D":"「搏動性頭痛」是出血性中風(尤其SAH)的特徵。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"103030-N3-9":{"quick":"右側偏癱(右手0右腳3)＋失語＋上肢重→左側中大腦動脈(MCA)阻塞。","detail":{"background":"判讀同前題：肌力右手0、右腳3、左肢5(正常)代表右側偏癱→病灶在左大腦半球(運動交叉到對側)；合併失語→優勢(左)半球語言區受損；上肢(0分)比下肢(3分)更弱→中大腦動脈(供應外側面手臂與語言區)而非前大腦動脈(主下肢)。故最可能為左側MCA阻塞。記憶法：「臉手＋語言＝MCA、下肢＝ACA、視野＝PCA」。","options":{"A":"左前大腦動脈以下肢無力為主，且不一定失語。","B":"右側病變會造成左側偏癱，與本例右癱不符。","C":"正解。左MCA阻塞→右側上肢為主偏癱＋失語。","D":"右側MCA→左側偏癱，方向相反。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"104030-N3-7":{"quick":"與失語病人溝通→1面對病人、3配合圖片手勢；勿提高音量(非聽損)、勿用多重選擇。","detail":{"background":"失語症(aphasia)是語言中樞受損的「語言」障礙，不是聽力或智力問題。溝通原則：①面對病人、保持眼神接觸，讓病人看到口型與表情；②用簡短句、一次一個訊息，給予充足反應時間；③配合圖片、手勢、實物、寫字板等多元輔助；④以「是/否」或封閉式簡單問句取代開放式或多重選擇題(後者對表達性失語負荷太大)；⑤不要提高音量或音調(病人非重聽，提高音量反而像責備)。故正確為1、3。","options":{"A":"正解。面對病人(1)＋配合圖片手勢(3)是失語溝通的正確原則。","B":"4「使用多重選擇」對失語病人負荷過大，不適當。","C":"2「提高音量音調」對非聽損的失語病人無益。","D":"2、4皆不適當。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"104100-N3-7":{"quick":"預防TIA(暫時性缺血)→抗血栓藥，選項中以「抗凝血劑」最相符。","detail":{"background":"暫時性缺血發作(TIA)是腦部短暫缺血、症狀<24小時(多<1小時)完全恢復，是缺血性中風的重要警訊(尤其血栓型)。預防再發以「抗血栓」為核心：首選抗血小板劑(aspirin、clopidogrel)；心源性栓塞(如心房顫動)則用抗凝血劑(warfarin/NOAC)，並控制三高、戒菸。選項中利尿劑、抗纖維蛋白分解劑(止血劑，反而促血栓)、鈣離子阻斷劑(nimodipine用於SAH血管痙攣)皆非預防TIA首要；四者中「抗凝血劑」屬抗血栓、最相符。","options":{"A":"利尿劑用於降壓/降腦壓，非預防TIA。","B":"正解。抗凝(及抗血小板)抗血栓藥可預防TIA再發與進展為中風。","C":"抗纖維蛋白分解劑是止血劑，會促進血栓，禁用。","D":"鈣離子阻斷劑nimodipine用於SAH後預防腦血管痙攣，非預防TIA。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"104100-N3-8":{"quick":"與失語病人溝通→採面對面方式(看口型表情)；勿加大音量、勿用開放式、勿全用手勢。","detail":{"background":"失語病人溝通技巧：面對面、平視、給予充足時間、用封閉式(是非)簡單問句、輔以圖片手勢書寫。錯誤做法：①加大音量(非聽損)②使用開放式問句(表達性失語回答困難)③完全以手勢取代語言(仍應鼓勵其殘存語言、避免剝奪練習機會)。故正確為「面對面溝通」。","options":{"A":"加大音量無助於語言中樞受損的失語，且像責備。","B":"開放式問句對失語病人負荷太大，宜用封閉式。","C":"完全以手勢取代語言會剝奪病人語言復健機會，應併用。","D":"正解。面對面、看口型表情，配合多元輔助是正確原則。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"106030-N3-3":{"quick":"出血性腦中風最主要的危險因子=高血壓。","detail":{"background":"出血性腦中風(腦內出血)最重要、可控的危險因子是「高血壓」：長期高血壓使腦內小動脈(如豆紋動脈)管壁玻璃樣變性、形成微動脈瘤(Charcot-Bouchard aneurysm)，血壓驟升時破裂出血，好發於基底核、視丘、橋腦、小腦。其他危險因子(糖尿病、高血脂、心臟病)更偏向「缺血性」中風或動脈硬化的危險因子。控制血壓是預防腦出血最關鍵的措施。","options":{"A":"正解。高血壓是出血性腦中風最主要的危險因子。","B":"糖尿病主要增加缺血性中風與小血管病變風險。","C":"心臟病(如心房顫動)主要造成栓塞型缺血性中風。","D":"高血脂主要與動脈粥狀硬化、缺血性中風相關。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"106110-N3-4":{"quick":"出血性中風護理→給軟便劑(MgO)防便秘升腦壓；禁血栓溶解劑、禁aspirin、勿平躺。","detail":{"background":"出血性腦中風護理重點：①絕對「禁用」血栓溶解劑(rt-PA)與抗血小板(aspirin)——只用於缺血性中風，用於出血會致命；②抬高床頭約30°(非平躺)促進腦部靜脈回流、降低顱內壓；③避免一切使顱內壓升高的動作：用力排便、咳嗽、Valsalva，故給予軟便劑(如MgO、Docusate)維持排便通暢、預防便秘；④平穩控制血壓避免再出血。本題正確措施為給MgO防便秘以避免IICP。","options":{"A":"血栓溶解劑僅用於缺血性中風，用於出血性中風會加重出血，禁用。","B":"正解。給軟便劑(MgO)預防便秘用力，避免顱內壓升高。","C":"aspirin為抗血小板劑，會加重出血，禁用。","D":"應抬高床頭30°，平躺反而增加顱內壓。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"107030-N3-6":{"quick":"中風功能性尿失禁→1建立如廁表達溝通、4白天每2~3小時定時如廁；勿包尿布、勿留置尿管。","detail":{"background":"中風後「功能性尿失禁」常因行動、溝通或認知障礙導致來不及如廁，而非膀胱本身病變。護理目標是「重建排尿自主」：①建立病人表達如廁需要的溝通方法(手勢、字卡、叫人鈴在健側)；②白天定時(每2~3小時)主動協助如廁、建立排尿習慣(膀胱訓練)；③避免長期包尿布(助長失禁、皮膚破損、自尊受損)；④避免常規留置尿管(增加泌尿道感染)，僅尿滯留時短期使用。故正確為1、4。","options":{"A":"13含「留置尿管」(3)，會增感染、非首選。","B":"正解。1建立如廁溝通＋4白天定時如廁，是重建排尿自主的正確做法。","C":"2包尿布、3留置尿管皆不宜。","D":"24含「包尿布」(2)，助長失禁與皮膚問題。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"108020-N3-6":{"quick":"左肢無力且左腳(1分)>左手(3分)更弱→下肢為主→右側「前」大腦動脈(ACA)。","detail":{"background":"本例右肢5分(正常)、左手3分、左腳1分→左側偏癱(病灶在右半球)，且「左腳比左手更弱(下肢重於上肢)」。下肢的運動皮質位於大腦半球「內側面」，由前大腦動脈(ACA)供應；上肢、臉部在外側面由中大腦動脈(MCA)供應。下肢為主的偏癱→ACA。病灶在右半球→右側ACA。(若上肢/臉為主才是MCA)。","options":{"A":"正解。下肢重於上肢的偏癱→前大腦動脈(供應內側面下肢區)，且為右側。","B":"右MCA阻塞應以左「上肢/臉」為主，本例下肢更重，不符。","C":"左側病變會造成右側偏癱，方向相反。","D":"左MCA→右側上肢為主偏癱，與本例左癱不符。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"109030-N3-2":{"quick":"右半球損傷→1左偏癱、2空間認知缺損、4衝動行為快；語言計算(3)屬左半球。","detail":{"background":"大腦左右半球功能分工：左半球(多為優勢半球)主管「語言、計算、邏輯、書寫」(中風→失語、失算、行為謹慎遲緩)；右半球主管「空間、視覺感知、注意、情緒」(中風→空間/認知缺損、單側忽略、病覺缺失、行為衝動快、判斷力差)。運動皆交叉至對側。故右半球損傷→1對側(左)偏癱、2空間認知缺損、4行動快而衝動；3「語言及計算能力降低」是左半球功能受損的表現。正確為1、2、4。","options":{"A":"123含「語言計算降低」(3)為左半球功能，不屬右半球。","B":"正解。右半球損傷→1左偏癱、2空間認知缺損、4衝動行為快。","C":"134含3(左半球功能)，不對。","D":"234含3，不對。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"109030-N3-3":{"quick":"TIA藥物治療→抗血小板凝集劑(如aspirin)。","detail":{"background":"TIA是缺血性中風的警訊，藥物治療以「抗血栓」預防進展為腦梗塞：首選抗血小板劑aspirin(或clopidogrel)；心源性者用抗凝血劑。Mannitol是降腦壓(用於IICP)、papaverine腦血管擴張劑、nimodipine用於SAH後血管痙攣，皆非TIA常規治療。故正確為抗血小板aspirin。","options":{"A":"正解。抗血小板凝集劑aspirin是TIA的標準藥物治療。","B":"mannitol為降腦壓藥，非TIA治療。","C":"papaverine腦血管擴張劑非TIA常規用藥。","D":"nimodipine用於蜘蛛膜下腔出血後預防血管痙攣。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"109110-N3-6":{"quick":"腦中風病人低劑量Aspirin的目的=抗血小板凝集(預防再梗塞)。","detail":{"background":"低劑量aspirin(81~100mg/天)透過不可逆抑制血小板的環氧化酶(COX-1)、減少血栓素A2(TXA2)生成→抑制血小板凝集，用於缺血性中風的「次級預防」(預防再次梗塞)。它不能溶解既成血栓(那是rt-PA的作用)、低劑量也非用於解熱鎮痛(需較高劑量)、與降腦壓無關。","options":{"A":"溶解血栓是血栓溶解劑(rt-PA)的作用，非aspirin。","B":"低劑量aspirin不是用來解熱鎮痛。","C":"正解。低劑量aspirin抑制血小板凝集，預防中風再發。","D":"aspirin與降腦壓無關。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"110030-N3-7":{"quick":"血栓型發病前有先驅(TIA)症狀；栓塞型多因心臟病、出血型CSF帶血、出血型常於活動時突發。","detail":{"background":"比較各型腦中風：①血栓型——動脈硬化漸進形成血栓，發病前常有TIA「先驅症狀」、多於休息睡眠中發作。②栓塞型——多因「心臟疾病」(心房顫動、瓣膜病)產生栓子，症狀突發無預警。③出血型——常於活動/情緒激動、血壓飆高時「突然」發作、進展快，腦脊髓液(尤其SAH)會「帶血、非清澈」。故正確為「血栓型發病前有先驅症狀」。","options":{"A":"正解。血栓型發病前常有TIA等先驅症狀。","B":"栓塞型多因心臟疾病(如心房顫動)，非高血壓。","C":"出血型(尤其SAH)腦脊髓液帶血，非清澈。","D":"出血型多為突發、與活動/血壓驟升有關，非漸進。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"110110-N3-4":{"quick":"SAH腦膜刺激徵→Brudzinski、Kernig陽性、頸僵硬；Homan徵(B)是DVT徵象，與SAH無關→錯誤。","detail":{"background":"顱內動脈瘤破裂→蜘蛛膜下腔出血(SAH)，血液刺激腦膜產生「腦膜刺激徵(meningismus)」：頸部僵硬(nuchal rigidity)、Kernig徵陽性(屈髖後伸膝引發疼痛抵抗)、Brudzinski徵陽性(被動屈頸引發兩下肢屈曲)，併劇烈「霹靂性頭痛」、畏光。霍曼徵(Homan’s sign)是強迫足背屈引發小腿疼痛，用來評估「深部靜脈栓塞(DVT)」，與SAH無關。故「Homan徵陽性」為錯誤敘述。","options":{"A":"Brudzinski徵陽性是SAH腦膜刺激徵，敘述正確。","B":"正解(本題選錯誤者)。Homan徵是DVT的評估，與SAH腦膜刺激無關。","C":"Kernig徵陽性為腦膜刺激徵，敘述正確。","D":"後頸部僵硬是腦膜刺激徵，敘述正確。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"111110-N3-5":{"quick":"單側忽略護理→2轉頭代償視野、3鼓勵照顧患側；環境物品應「固定」、叫人鈴放「健側」。","detail":{"background":"單側忽略(unilateral neglect)多見於右半球(尤其頂葉)中風，病人對「患側(左側)」空間視而不見、不理會患肢，易碰撞受傷。護理原則：①初期把常用物品、叫人鈴、電話放在「健側」確保病人能取用安全；②教導病人「主動轉頭掃視」忽略側來代償；③漸進「提醒並鼓勵病人注意、照顧患側」(觸摸、命名患肢)促進認知重整；④環境布置「固定一致」避免常變動造成混亂與危險。故正確為2、3。","options":{"A":"1「經常變動物品擺設」會造成混亂與危險，錯誤。","B":"13含「變動擺設」(1)，不宜。","C":"正解。2轉頭代償視野＋3鼓勵照顧患側，是單側忽略的正確護理。","D":"4「叫人鈴放患側」病人會忽略而取不到，應放健側。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"112030-N3-8":{"quick":"中風臥床擺位→膝下墊枕會促成膝屈曲攣縮，為錯誤措施。","detail":{"background":"中風病人易因痙攣與不當擺位產生關節攣縮，正確「抗痙攣擺位」：①避免長時間高坐臥防髖屈曲攣縮；②大腿外側放粗隆捲軸(trochanter roll)防髖外旋；③患側肩外展、腋下墊枕防肩內收與肩關節半脫位；④膝部宜「微屈但不可長時間在膝窩下墊枕」——膝下墊枕會固定膝於屈曲位→造成膝屈曲攣縮與深部靜脈血流受阻，屬錯誤。應使下肢伸直、足部維持中立防垂足。","options":{"A":"避免高坐臥防髖屈曲畸形，正確。","B":"大腿外側粗隆捲軸防髖外旋，正確。","C":"正解(本題選錯誤)。膝下墊枕會造成膝屈曲攣縮，不應如此。","D":"患側腋下墊枕防肩內收，正確。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"113030-N3-2":{"quick":"腦幹中風常見眼球運動失調、運動障礙、嘔吐反射減弱；「手顫抖」(C)非腦幹典型→非其表徵。","detail":{"background":"腦幹(中腦、橋腦、延腦)是顱神經核與上下行傳導束密集區，腦幹中風典型表現：①眼球運動不協調、複視、瞳孔異常(CN III/IV/VI)②交叉性偏癱與運動障礙③吞嚥困難、構音障礙、嘔吐/咳嗽反射減弱(CN IX/X)④眩暈、平衡失調、意識改變。「手顫抖(靜止性震顫)」是基底核(巴金森)或小腦(意向性震顫)病變的表現，不是腦幹中風的常見徵象。故選C。","options":{"A":"眼球活動不協調是腦幹(動眼相關核)受損的常見表現。","B":"運動功能障礙是腦幹傳導束受損常見。","C":"正解(本題選非表徵)。手顫抖屬基底核/小腦病變，非腦幹中風典型。","D":"嘔吐反射減弱反映CN IX/X受損，是腦幹中風常見。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"113100-N3-6":{"quick":"吞嚥困難飲食漸進改變，「液體」最易嗆入，故最後才採用。","detail":{"background":"中風吞嚥困難(dysphagia)病人由口進食採「質地漸進」原則：先給最易控制、不易嗆咳的「半固體/濃稠泥狀(糊狀、布丁狀)」，再進展到軟質固體、小塊固體，最後才嘗試「稀薄液體」——因為液體流速快、最難在咽部控制、最容易嗆入氣管造成吸入性肺炎。必要時將液體增稠(thickener)。進食採坐姿、下巴微收(chin-tuck)、小口慢嚥、進食後維持坐姿30分鐘。","options":{"A":"正解。液體最易嗆入，是吞嚥訓練「最後」才採用的質地。","B":"半固體較易控制，是較早期採用的質地。","C":"固體在液體之前採用。","D":"小塊固體亦在液體之前。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"113180-N3-5":{"quick":"rt-PA時間窗為「3~4.5小時」內，非8小時→敘述3錯誤。","detail":{"background":"缺血性中風的靜脈血栓溶解劑(rt-PA, alteplase)能重新打通阻塞血管、挽救缺血半暗帶，但有嚴格條件：①治療時間窗為發病「3小時(部分可放寬至4.5小時)」內，非8小時；②禁忌包括近期出血、動脈瘤/動靜脈畸形、嚴重肝病或凝血異常、血壓過高、近期手術等(出血風險)。故敘述3「必須在中風8小時內使用」錯誤(應為3~4.5小時)。1、2、4皆正確。","options":{"A":"4「嚴重肝病不適用」正確(凝血異常增出血風險)，非錯誤。","B":"正解(本題選錯誤)。rt-PA時間窗是3~4.5小時，非8小時。","C":"2「動脈瘤/AVM不適用」正確。","D":"1「可打通阻塞血管」正確。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"114030-N3-5":{"quick":"左半球損傷→1計算能力降低、4語言障礙；空間缺損、半側忽略屬右半球。","detail":{"background":"左大腦半球(多為優勢半球)主管語言、計算、邏輯分析、書寫閱讀；受損→失語(語言障礙)、失算(計算能力降低)、失讀失寫、行為謹慎。右半球主管空間視覺感知、注意力→受損才出現「空間缺損、半側(單側)忽略、病覺缺失」。故左半球損傷對應1計算能力降低、4語言障礙；2空間缺損、3半側忽略屬右半球。","options":{"A":"12含「空間缺損」(2)為右半球功能，不對。","B":"正解。左半球損傷→1計算能力降低＋4語言障礙。","C":"23(空間缺損、半側忽略)皆右半球功能。","D":"34含「半側忽略」(3)右半球功能。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"114170-N3-2":{"quick":"四肢癱、不能言語但可垂直眼動/眨眼＝閉鎖症候群→腹側橋腦受損(基底動脈)。","detail":{"background":"本例「四肢癱瘓、不能說話，但意識清楚、能依指示『垂直轉動眼球與眨眼』」＝典型「閉鎖症候群(locked-in syndrome)」。病灶在「腹側橋腦(ventral pons)」，多因基底動脈阻塞，破壞了皮質脊髓束與皮質延髓束(故四肢與口咽肌癱瘓、不能言語)，但網狀活化系統完整(意識清楚)、且中腦的垂直眼動與眨眼通路保留→病人只能用垂直眼動/眨眼溝通。故受損部位為橋腦。","options":{"A":"正解。閉鎖症候群病灶在腹側橋腦(基底動脈領域)。","B":"脊髓損傷不會同時造成「不能言語」且意識清楚仍能眼動的全貌(延腦以上功能應保留並可說話)。","C":"大腦廣泛損傷會影響意識，與本例意識清楚不符。","D":"右側小腦病變造成協調/平衡障礙，非四肢全癱與不能言語。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"114170-N3-4":{"quick":"中風危險因子=高血壓、糖尿病、中風病史；「高密度脂蛋白(HDL)過高」是保護因子→錯誤。","detail":{"background":"腦中風的危險因子：高血壓(最重要)、糖尿病、心房顫動、吸菸、高「低密度脂蛋白(LDL)」/低HDL、肥胖、缺乏運動、既往中風/TIA病史等。其中高密度脂蛋白(HDL，「好膽固醇」)能清除血管壁膽固醇，HDL「高」是「保護因子」，並非危險因子。故「HDL過高為危險因子」的敘述錯誤(應為HDL過低才是危險因子)。","options":{"A":"高血壓是中風最主要危險因子，敘述正確。","B":"糖尿病是中風危險因子，正確。","C":"正解(本題選錯誤)。HDL高是保護因子，非危險因子。","D":"既往中風病史是再中風的危險因子，正確。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"115030-N3-4":{"quick":"缺血性(血栓型)中風常於「休息/睡眠」時發作，「發作於活動時」的敘述錯誤。","detail":{"background":"各型中風發作情境比較：①血栓型(缺血性)——常於「休息、睡眠中或剛起床」發作(此時血壓較低、血流較慢易形成血栓)，發病前常有TIA警訊。②栓塞型——症狀「突然」發生、無預兆。③出血性——常於「活動、用力、情緒激動、血壓驟升」時發作，伴劇烈頭痛前驅。故「缺血性中風通常發作於活動時」錯誤(應為休息/睡眠時)。","options":{"A":"TIA是血栓型中風的警訊，正確。","B":"栓塞型症狀突然發生，正確。","C":"出血性中風常有劇烈頭痛前驅，正確。","D":"正解(本題選錯誤)。缺血性中風多於休息/睡眠時發作，非活動時。"},"sources":["新文京《內外科護理學》神經系統","2019 AHA/ASA 急性缺血性腦中風處置指引"]}},"101030-N3-3":{"quick":"顱內壓升高護理→抬高床頭30°、頭頸平直；勿等長運動、勿用力咳嗽、勿Valsalva。","detail":{"background":"顱內壓升高(IICP)的護理核心是「促進腦部靜脈回流、避免任何升壓動作」：①抬高床頭約30°、頭頸維持「正中平直」(避免頸部過度屈曲/旋轉壓迫頸靜脈)；②避免等長運動(用力憋氣使胸腹腔壓上升)、避免用力排便/咳嗽/打噴嚏、避免Valsalva操作；③給予軟便劑預防便秘；④分散護理活動、控制發燒、維持呼吸道通暢與適度氧合(避免缺氧與高碳酸)；⑤限制液體。故正確為抬高床頭30°、頭頸平直。","options":{"A":"等長運動會憋氣升高胸腹腔壓、進而升高顱內壓，應避免。","B":"用力咳嗽會瞬間升高顱內壓，應避免(非鼓勵)。","C":"Valsalva操作(用力排便憋氣)會升高顱內壓，禁止。","D":"正解。抬高床頭30°、頭頸平直可促進靜脈回流、降低顱內壓。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"102030-N3-10":{"quick":"IICP護理應「分散」護理活動；採「集中式護理」會持續刺激升壓→錯誤。","detail":{"background":"顱內壓升高病人對外界刺激敏感，連續的抽痰、翻身、擦澡等會疊加使顱內壓持續上升、不易回降。故護理應「分散(spacing)」進行、每項操作間讓顱內壓回復，並監測反應。其餘為正確措施：抬高床頭30°、維持呼吸道通暢(避免缺氧高碳酸使腦血管擴張)、監測IICP徵象(意識、瞳孔、Cushing三徵)。故「採集中式護理」為錯誤。","options":{"A":"抬高床頭30°正確。","B":"維持呼吸道通暢、避免缺氧正確。","C":"正解(本題選錯誤)。應分散護理，集中式會持續刺激升壓。","D":"監測IICP徵象正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"102110-N3-17":{"quick":"IICP治療應「限制」液體；增加靜脈輸液會加重腦水腫→錯誤。","detail":{"background":"顱內壓升高的治療：①滲透性利尿劑(mannitol)脫水降壓；②過度換氣使PaCO2下降→腦血管收縮、暫時降腦壓(用於急性危象、短期)；③控制發燒(發燒↑腦代謝與血流)；④「限制液體」攝取避免加重腦水腫。「增加靜脈輸液」會增加腦組織含水、加重水腫與顱內壓→錯誤。","options":{"A":"使用滲透性利尿劑(mannitol)正確。","B":"正解(本題選錯誤)。應限液，增加輸液會加重腦水腫。","C":"過度換氣降CO2使腦血管收縮、短期降腦壓，正確。","D":"控制發燒可降低腦代謝與血流，正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"103030-N3-3":{"quick":"腦部手術常見合併症=出血、感染、顱內壓升高；「癱瘓」非常見合併症。","detail":{"background":"腦部(神經外科)手術後常見的合併症包括：出血/血腫、感染(傷口、腦膜炎)、腦水腫致顱內壓升高、癲癇、腦脊髓液漏、水電解質/內分泌異常(如尿崩、SIADH)。「癱瘓」是否發生取決於手術部位是否傷及運動傳導路徑，並非所有腦部手術的「常見」共同合併症。故依統計，癱瘓不屬常見合併症。","options":{"A":"出血是腦部手術常見合併症。","B":"感染是常見合併症。","C":"正解(本題選非常見者)。癱瘓視手術部位而定，非共通常見合併症。","D":"腦水腫致顱內壓升高是常見合併症。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"103030-N3-5":{"quick":"Mannitol應「快速」靜脈注射(經過濾器)以建立滲透梯度；「注射速度緩慢」錯誤。","detail":{"background":"Mannitol是高張滲透性利尿劑，靠提高血漿滲透壓把腦組織水分拉回血管、再經腎排出。給藥要點：①需用「過濾器(in-line filter)」——低溫易結晶，應加溫溶解並過濾；②應在約15~30分鐘內「相對快速」輸注以建立有效滲透梯度(非緩慢滴注)；③有「回躍(rebound)現象」——藥效退去水分回滲腦組織使腦壓回升；④停藥要漸進減量避免回躍。故「注射速度要緩慢」為錯誤。","options":{"A":"低溫可能結晶，需加溫並用過濾器，敘述正確。","B":"正解(本題選錯誤)。Mannitol應相對快速輸注(15~30分鐘)，非緩慢。","C":"會有回躍現象，正確。","D":"停藥應漸進減量避免回躍，正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"104030-N3-6":{"quick":"IICP臨床表徵→1頭痛、2嘔吐(噴射狀)；血壓「上升」、心跳「變慢」(Cushing)，故3、4錯。","detail":{"background":"顱內壓升高早期表徵：頭痛(尤其晨間、咳嗽用力時加劇)、噴射狀嘔吐、視乳突水腫、意識改變。晚期出現「庫欣三徵(Cushing’s triad)」：①收縮壓上升、脈壓變寬②心跳變慢(代償性心搏過緩)③呼吸不規則。故敘述3「血壓下降」、4「心跳變快」皆錯誤(應為血壓上升、心跳變慢)；正確為1頭痛、2嘔吐。","options":{"A":"正解。1頭痛＋2嘔吐是IICP的表徵。","B":"13含「血壓下降」(3)錯誤，IICP血壓上升。","C":"23含「血壓下降」(3)錯誤。","D":"34「血壓下降、心跳變快」與Cushing三徵相反，錯誤。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"106110-N3-1":{"quick":"ICP監測零點＝室間孔(Monro孔)；調整床頭「會」改變零點位置→「不會改變」錯誤。","detail":{"background":"顱內壓監測系統(尤其腦室外引流EVD/腦室內導管)以「液壓」原理測壓，體外換能器(transducer)的零點必須對齊腦室的解剖參考點——「室間孔(foramen of Monro)」，常以外耳道(tragus)為體表標記。任何床頭高度改變都會改變病人頭部相對於換能器的高度，故「每次調整床頭後都必須重新校正零點」。所以「調整床頭不會造成零點改變」是錯誤的。其餘(觀察插管處滲漏發炎、適度引流CSF降壓)皆正確。","options":{"A":"零點對齊室間孔(foramen of Monro)，正確。","B":"觀察插管處滲漏/發炎是預防感染的正確措施。","C":"正解(本題選錯誤)。調整床頭會改變零點，需重新校正。","D":"可依醫囑適度引流CSF降低顱內高壓，正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"106111-N3-3":{"quick":"嚴重頭部外傷(GCS<8)腦灌流壓(CPP)至少應維持約「50~60 mmHg(目標60~70)」。","detail":{"background":"腦灌流壓CPP=平均動脈壓(MAP)−顱內壓(ICP)，代表腦組織實際的灌流驅動壓。嚴重創傷性腦損傷(GCS<8)的處置目標：維持ICP<20~22 mmHg、CPP至少≥60(一般目標60~70 mmHg)以確保腦組織灌流、避免缺血；CPP過低→腦缺血，過高(>70~80)→增加ARDS等風險。選項中以「50~60 mmHg」最接近「至少應維持」之下限。","options":{"A":"30~40 mmHg過低，會造成腦缺血。","B":"正解。CPP至少維持約50~60 mmHg(目標60~70)。","C":"70~80屬偏高、非「至少」下限。","D":"90~100過高，非治療目標。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"107030-N3-4":{"quick":"Mannitol應「相對快速」靜脈注射；「應緩慢靜脈注射」錯誤。","detail":{"background":"Mannitol為高張(高滲透)利尿劑，用於降顱內壓需在約15~30分鐘內相對快速輸注以建立滲透梯度，並用過濾器避免結晶。使用前應確認血壓不可過低(它會利尿脫水、可能使血壓更低、減少腦灌流)；若顱內壓改善應「漸進減量」避免回躍。故「應緩慢靜脈注射」是錯誤敘述。","options":{"A":"Mannitol為高張利尿劑，正確。","B":"正解(本題選錯誤)。應相對快速輸注，非緩慢。","C":"使用前注意血壓不宜太低(避免灌流不足)，正確。","D":"顱內壓改善後漸進減量避免回躍，正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"107110-N3-2":{"quick":"維持腦灌流壓措施→限液、抬頭30°、避免用力咳嗽；IICP徵象是「心搏過緩」非過速→D錯誤。","detail":{"background":"頭部手術後維持腦組織灌流壓(CPP)的措施：①限制液體(約1500~2000 mL)避免腦水腫；②抬高床頭30°促進靜脈回流；③維持排便正常、避免用力與劇咳(防顱內壓驟升)。監測顱內壓升高徵象時，Cushing反應是「心搏過『緩』、血壓上升、呼吸不規則」；故D寫「心搏過速、血壓升高」中的「心搏過速」是錯誤的(應為心搏過緩)。","options":{"A":"限液1500~2000 mL避免腦水腫，正確。","B":"頭部抬高30°正確。","C":"維持排便正常、避免用力咳嗽，正確。","D":"正解(本題選錯誤)。IICP的Cushing反應是「心搏過緩」非過速。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"107110-N3-6":{"quick":"CPP＝MAP−ICP；MAP=(150+2×90)/3=110，CPP=110−15=95 mmHg。","detail":{"background":"腦灌流壓CPP=平均動脈壓(MAP)−顱內壓(ICP)。平均動脈壓MAP=(收縮壓＋2×舒張壓)÷3。本題血壓150/90→MAP=(150+180)÷3=330÷3=110 mmHg；ICP=15 mmHg。CPP=110−15=95 mmHg。正常CPP約70~95，<50易腦缺血。","options":{"A":"50 mmHg計算錯誤。","B":"75 mmHg計算錯誤(誤把MAP當收縮舒張平均等)。","C":"正解。MAP 110−ICP 15＝CPP 95 mmHg。","D":"115 mmHg未扣除ICP，錯誤。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"108020-N3-3":{"quick":"降腦壓藥(mannitol、類固醇)需「漸進」停藥；「顱內壓改善即立即停用」錯誤。","detail":{"background":"IICP的藥物治療：①輕度高張或等張溶液維持，避免低張液(如純D5W)加重水腫；②巴比妥酸鹽(barbiturate coma)降低腦部代謝率與耗氧；③滲透性利尿劑(mannitol、glycerol)需注意體液電解質平衡與腎功能；④所有降腦壓藥(mannitol、類固醇)停用時都要「漸進減量」避免回躍(rebound)使腦壓再度飆高。故「顱內壓改善即立即停藥」是錯誤的。","options":{"A":"避免低張液、用輕度高張溶液，敘述可接受。","B":"巴比妥酸鹽降低腦代謝，正確。","C":"mannitol/glycerol注意體液電解質平衡，正確。","D":"正解(本題選錯誤)。降腦壓藥應漸進停藥避免回躍，不可立即停用。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"108110-N3-3":{"quick":"腫瘤切除後腦壓仍高→「顱骨切除術(去骨瓣減壓)」讓腦組織有膨脹空間降壓。","detail":{"background":"當腦腫瘤已切除但腦水腫嚴重、顱內壓仍居高不下，可施行「去骨瓣減壓的顱骨切除術(decompressive craniectomy)」——移除一塊顱骨「不立即放回」，讓腫脹的腦組織有向外膨脹的空間、降低顱內壓，待腦水腫消退後再以顱骨整形術(cranioplasty)補回。顱骨鑽孔(burr hole)、開顱(craniotomy，打開後通常會把骨瓣放回)、顱骨整形(修補)目的不同。","options":{"A":"顱骨鑽孔多用於引流血腫/置管，非主要減壓方式。","B":"開顱術通常會把骨瓣放回，減壓效果不如去骨瓣。","C":"正解。顱骨切除術(去骨瓣減壓)讓腦組織膨脹、降低顱內壓。","D":"顱骨整形術是後續修補顱骨缺損，非降壓手段。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"108110-N3-4":{"quick":"IICP→脈壓變寬(Cushing)；心跳變慢、血壓上升，故只有「脈壓變寬」正確。","detail":{"background":"IICP的Cushing三徵：收縮壓上升而舒張壓相對不變→「脈壓變寬(widening pulse pressure)」、心跳變慢(代償性心搏過緩)、呼吸型態不規則。眼底會出現「視乳突水腫(papilledema)」而非視神經萎縮(萎縮是長期未治的後果)。故四選項中正確者為「脈壓變寬」。","options":{"A":"IICP心跳「變慢」非增加。","B":"IICP血壓「上升」非下降。","C":"正解。收縮壓上升使脈壓變寬，是IICP的Cushing徵象。","D":"早期為視乳突「水腫」，非視神經萎縮。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"109110-N3-1":{"quick":"滲透性利尿劑停藥應「漸進」避免回躍(D正解)；零點是室間孔、mannitol應快速注射。","detail":{"background":"整合IICP處置正確觀念：①ICP監測體外零點對齊「室間孔(foramen of Monro)」，非第四腦室；②mannitol應「相對快速」輸注(非緩慢)；③類固醇主要用於「腫瘤引起的血管性腦水腫」、對外傷性腦水腫無效，不可驟停且須監測血糖；④滲透性利尿劑停藥要「漸進」以免回躍現象。故正確敘述為D(漸進停藥避免回躍)。","options":{"A":"零點應對齊室間孔(Monro孔)，非第四腦室，錯誤。","B":"mannitol應相對快速輸注，非緩慢靜注，錯誤。","C":"類固醇主要用於腫瘤性血管源水腫，對一般(外傷)腦水腫不適用，此敘述在此情境不適當。","D":"正解。滲透性利尿劑應漸進停藥避免回躍現象。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"109110-N3-2":{"quick":"引流CSF降壓須「緩慢少量」；「短時大量引流CSF」會致腦疝→錯誤。","detail":{"background":"頭部外傷術後置入腦室內ICP監測/引流：目標維持ICP<20 mmHg、CPP不低於50(用mannitol時SBP維持≥90以保灌流)。引流腦脊髓液可降壓，但必須「緩慢、少量、依設定高度」進行——若「短時間大量引流」會使腦壓驟降、腦組織向下移位造成腦疝或誘發再出血，極危險。故「可短時大量引流CSF快速降壓」是錯誤的。","options":{"A":"ICP維持<20 mmHg，正確。","B":"CPP不得低於50 mmHg，正確。","C":"正解(本題選錯誤)。引流CSF須緩慢少量，短時大量會致腦疝。","D":"用mannitol時收縮壓維持≥90 mmHg以保灌流，正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"110110-N3-8":{"quick":"IICP護理→搖高床頭30°促進靜脈回流(A正解)；勿Valsalva、勿大量喝水、勿垂頭仰臥。","detail":{"background":"IICP護理整合：①床頭抬高約30°、頭頸正中→促進腦靜脈回流降壓(正解)；②避免Valsalva操作(用力排便憋氣升壓)；③限制液體(非鼓勵大量喝水)避免加重腦水腫；④禁止「垂頭仰臥(頭低位)」——會增加腦部血流與顱內壓。補充：IICP護理整體記憶——「抬頭頸正中30°、限液、軟便防Valsalva、分散護理、控體溫、避免缺氧高碳酸」；任何頭低位、用力憋氣、大量補水皆會升高顱內壓而禁止。","options":{"A":"正解。搖高床頭30°促進靜脈回流、降低顱內壓。","B":"Valsalva操作會升高顱內壓，禁止。","C":"應限液，大量喝水會加重腦水腫。","D":"垂頭仰臥(頭低位)會增加顱內壓，禁止。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"111030-N3-2":{"quick":"IICP處置應「分散」護理；把抽痰、翻身拍背、擦澡集中一次完成→錯誤。","detail":{"background":"IICP病人各項刺激性護理(抽痰、翻身拍背、擦澡)都會短暫升高顱內壓，若「集中一次完成」會使壓力疊加、持續升高且不易回復。正確做法是「分散」進行、每項間給予回復時間並監測反應。其餘為正確：頭頸正中、抬床頭30°、控制體溫、維持排便正常(防用力)。","options":{"A":"保持頭頸正中位置促進靜脈回流，正確。","B":"抬高床頭30°正確。","C":"正解(本題選錯誤)。應分散護理，不可集中一次完成。","D":"控制體溫、維持排便正常，正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"111110-N3-1":{"quick":"頭部外傷IICP照護→鼻漏時「不可擤鼻」(會增感染/氣顱)，故C錯誤。","detail":{"background":"頭部外傷合併顱內壓升高的照護：①避免用力排便、咳嗽、打噴嚏、等長運動(防升壓)；②可用Dilantin(phenytoin)預防外傷後早期癲癇；③嚴重IICP可用巴比妥酸鹽鎮靜降低腦代謝；④若有「鼻漏」(疑CSF漏，常見於顱底骨折)，「絕不可擤鼻、塞鼻、抽吸」——會把細菌逆向送入顱內造成腦膜炎或形成氣顱，應任其滴流、墊無菌紗布。故「請病人把鼻水擤乾淨」錯誤。","options":{"A":"避免用力排便咳嗽打噴嚏等長運動，正確。","B":"Dilantin預防外傷後抽搐，正確。","C":"正解(本題選錯誤)。CSF鼻漏不可擤鼻，會致顱內感染/氣顱。","D":"嚴重IICP可用巴比妥酸鹽鎮靜，正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"112030-N3-5":{"quick":"IICP藥物治療→「並非所有IICP病人都需給抗痙攣藥」，故D錯誤。","detail":{"background":"IICP藥物：①類固醇(如Decadron)用於「腫瘤引起的血管性腦水腫」，對細胞毒性/外傷性水腫無效；②mannitol有「回躍現象」，藥效退去水分回滲反而使腦水腫更嚴重；③巴比妥酸鹽降低腦組織代謝率、使血流較均勻供應；④抗痙攣藥(如phenytoin)用於「已抽搐或高風險(如穿透傷、皮質損傷)」者預防，並非「所有」IICP病人都需常規給予。故D「皆須給抗痙攣藥」錯誤。","options":{"A":"類固醇用於腫瘤性血管源腦水腫，正確。","B":"mannitol回躍會使腦水腫更嚴重，正確。","C":"巴比妥酸鹽降低腦代謝、血流較均勻，正確。","D":"正解(本題選錯誤)。並非所有IICP病人都需常規抗痙攣藥。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"112110-N3-5":{"quick":"腦瘤IICP症狀→血壓「上升」(Cushing)；「血壓下降」錯誤。","detail":{"background":"腦腫瘤造成顱內壓升高的症狀與徵象：頭痛(晨間、用力時加劇)、噴射狀嘔吐、視乳突水腫/視力模糊、意識改變，晚期Cushing三徵(收縮壓上升脈壓變寬、心跳變慢、呼吸不規則)。故「血壓下降」與IICP的代償性升壓相反，為錯誤敘述。補充：腦瘤所致IICP是「漸進佔位＋周圍血管性水腫」，故合併視乳突水腫、晨間頭痛加劇；晚期Cushing三徵(收縮壓上升脈壓變寬、心搏過緩、呼吸不規則)出現代表病情危急、瀕臨腦疝，須立即降腦壓。","options":{"A":"正解(本題選錯誤)。IICP血壓上升而非下降。","B":"視乳突水腫/視力模糊是IICP徵象，正確。","C":"頭痛、嘔吐是IICP常見表徵，正確。","D":"心跳變慢(代償性心搏過緩)是IICP徵象，正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"113030-N3-3":{"quick":"Mannitol降腦壓要注意「體液電解質/腎功能」非血糖(血糖是類固醇要注意)→C錯誤。","detail":{"background":"頭部外傷IICP處置：①急性期可置ICP監測器並依醫囑緩慢引流CSF降壓；②GCS總分≤8視為昏迷(本題GCS 5分屬昏迷，正確)；③mannitol(滲透性利尿劑)使用前後要注意的是「體液容積、電解質(鈉)、血漿滲透壓、腎功能」，「血糖」是「類固醇」治療要監測的項目，故「mannitol注意血糖」錯誤；④瞳孔突放大固定、對光無反應、肌力與意識下降→警示顱內壓升高/腦疝，正確。","options":{"A":"急性期裝ICP監測器、依醫囑引流CSF降壓，正確。","B":"GCS 5分屬昏迷，正確。","C":"正解(本題選錯誤)。mannitol要注意體液電解質/腎功能，血糖是類固醇要監測的。","D":"瞳孔放大固定、肌力意識下降提示IICP/腦疝，正確。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"113100-N3-4":{"quick":"IICP代償機制→增加腦脊髓液的「吸收/移出」與減少腦血容量(B正解)。","detail":{"background":"依Monro-Kellie假說，顱腔容積固定，內含腦組織、血液、腦脊髓液三者。當顱內出血佔據空間使顱內壓開始上升時，最初的「代償機制」是：①把腦脊髓液移往脊髓蛛網膜下腔並「增加CSF吸收」②減少顱內靜脈血容量。這些代償耗盡後才會失代償。選項「腦組織移位到枕骨大孔」是「失代償」的腦疝(已是惡化)；「減少腦氧需求」「減少靜脈回流」皆非生理代償途徑。故正解為增加CSF吸收。","options":{"A":"減少腦氧需求不是顱內壓的容積代償機制。","B":"正解。增加腦脊髓液吸收/移出是早期代償機制。","C":"減少靜脈回流會使腦壓更高，非代償。","D":"腦組織移位到枕骨大孔是失代償的腦疝，不是代償。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"114100-N3-2":{"quick":"顱內腫瘤IICP→高劑量類固醇治療要監測血糖(B正解)；複視應防跌、灌流失效要限液、腦疝是晚期。","detail":{"background":"顱內腫瘤併IICP(ICP=18偏高)的照護：①出現複視/視力障礙→跌倒風險高，應「協助、避免單獨下床」而非鼓勵多活動；②類固醇(Decadron)用於腫瘤的血管性腦水腫，「高劑量會引起高血糖」，須監測血糖(正解)；③腦組織灌流失效時要「限液、降腦壓」而非鼓勵喝水；④腦疝(herniation)是顱內壓失代償的「晚期、危急」徵象，非早期。","options":{"A":"複視時應防跌、避免單獨下床，不可鼓勵多下床。","B":"正解。高劑量類固醇會升血糖，須監測血糖值。","C":"腦灌流失效應限液降壓，鼓勵喝水會加重水腫。","D":"腦疝是病情惡化的晚期徵象，非早期。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"114170-N3-5":{"quick":"IICP非代償初期＝Cushing反應：脈搏「變慢而有力」、血壓上升(C正解)。","detail":{"background":"顱內壓升高進入「非代償期初期」會出現Cushing反應(身體企圖維持腦灌流而升高血壓)：①「脈搏變慢而有力(bounding bradycardia)」②收縮壓上升、脈壓變寬③合併瞳孔變化、意識下降。隨進入末期(腦幹衰竭)才轉為「呼吸不規則、脈搏弱而快、血壓下降」。故非代償初期正確描述為「脈搏變慢有力、血壓上升」。","options":{"A":"「血壓下降」與初期代償性升壓相反，錯誤。","B":"「呼吸變快、血壓上升」中呼吸早期未必快，且脈搏應變慢，描述不符。","C":"正解。非代償初期＝脈搏變慢而有力、血壓上升(Cushing反應)。","D":"「呼吸不規則、脈弱而快、血壓下降」是末期腦幹衰竭表現。"},"sources":["新文京《內外科護理學》神經系統","Brain Trauma Foundation 顱內壓監測與處置指引"]}},"101110-N3-76":{"quick":"解釋諺語「失敗為成功之母」是在評估「抽象思考」能力。","detail":{"background":"心智狀態檢查中，請病人解釋諺語、成語或「異同比較」(如蘋果與橘子哪裡像)是評估「抽象思考(abstract thinking)」能力——能否從具體事物歸納出抽象概念。失智、額葉損傷者會以字面具體方式回答(具體化thinking)。對照：判斷力(處理情境問題)、記憶力(回憶事件/詞)、計算力(連續減7)各有不同測法。故本題評估抽象能力。","options":{"A":"判斷能力以情境問題(如失火怎麼辦)評估。","B":"記憶能力以回憶詞語/事件評估。","C":"計算能力以連續減7等算術評估。","D":"正解。解釋諺語是評估抽象思考能力。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"101110-N3-77":{"quick":"動脈出血＋「短暫清醒期(lucid interval)」＝硬膜上(硬膜外)血腫。","detail":{"background":"頭部外傷顱內出血分型：①硬膜上(硬膜外)血腫(epidural hematoma)——多為「動脈」出血(中腦膜動脈)，典型「先昏迷→短暫清醒(lucid interval)→再快速惡化昏迷」，需緊急手術。②硬膜下血腫(SDH)——多為「靜脈」(橋靜脈)出血，慢性者老人跌倒後數週漸進惡化。③蜘蛛膜下腔出血——劇烈頭痛、腦膜刺激徵。故「動脈出血＋短暫清醒」為硬膜上血腫特徵。","options":{"A":"正解。硬膜上血腫＝動脈(中腦膜動脈)出血、有短暫清醒期。","B":"硬膜下血腫多為靜脈出血，無典型清醒期。","C":"顱內(腦實質)血腫表現依部位而異。","D":"蜘蛛膜下腔出血以劇烈頭痛、腦膜刺激徵為主。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"102030-N3-1":{"quick":"去骨瓣(顱骨切除)病人出院指導不含「3個月禁洗頭」(傷口癒合後可清潔)→錯誤。","detail":{"background":"頭骨骨折接受去骨瓣顱骨切除術(移除一塊頭骨、尚未修補)的病人，顱骨缺損處缺乏骨頭保護，出院指導：①外出/活動時戴「保護性頭盔」保護缺損處；②高纖飲食、軟便預防便秘用力升腦壓；③依醫囑服抗痙攣劑預防外傷後癲癇；④避免撞擊、劇烈活動。「3個月內禁止洗頭」並非必要——傷口癒合後即可清潔頭皮(維持清潔反而預防感染)，屬錯誤指導。","options":{"A":"正解(本題選錯誤)。傷口癒合後即可洗頭，不需禁洗3個月。","B":"顱骨缺損處需戴保護性頭盔，正確。","C":"高纖飲食預防便秘，正確。","D":"依醫囑服抗痙攣劑預防外傷後癲癇，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"103030-N3-4":{"quick":"顱底骨折徵象＝Battle徵、耳漏、鼻漏、浣熊眼；Horner症候群非顱底骨折徵→錯誤。","detail":{"background":"顱底骨折(basal skull fracture)的典型徵象：①Battle’s sign(乳突部瘀斑)②浣熊眼(raccoon eyes，眼眶周圍瘀血)③耳漏/鼻漏(CSF漏，halo sign)④鼓室積血。Horner’s syndrome(上眼瞼下垂、瞳孔縮小、患側無汗)是頸交感神經路徑受損(如肺尖腫瘤、頸動脈剝離)的表現，與顱底骨折無關。故Horner症候群為錯誤選項。","options":{"A":"Battle徵(乳突瘀斑)是顱底骨折徵，正確。","B":"正解(本題選錯誤)。Horner症候群屬交感神經受損，非顱底骨折徵。","C":"耳漏(CSF漏)是顱底骨折徵。","D":"鼻漏(CSF漏)是顱底骨折徵。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"103030-N3-7":{"quick":"躁動期頭部外傷「禁用鴉片類」(抑制呼吸、縮瞳、掩蓋意識評估)→首選鴉片是錯誤。","detail":{"background":"頭部外傷躁動期的護理：①「不可用鴉片類(opioid)」鎮靜——會抑制呼吸(致高碳酸升腦壓)、縮瞳並掩蓋瞳孔/意識的神經學觀察、降意識難評估，屬禁忌；②提供柔和足夠光線避免錯視/視幻覺；③使用床欄、約束等保護裝置避免病人自傷或拔管；④用時鐘、日曆、家人陪伴提供現實定向。故「鴉片類為首選」錯誤。","options":{"A":"正解(本題選錯誤)。鴉片類抑制呼吸、掩蓋神經評估，禁用於頭部外傷躁動。","B":"提供足夠光線避免幻覺，正確。","C":"使用保護裝置避免病人受傷，正確。","D":"用時鐘月曆提供定向感，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"103030-N3-8":{"quick":"老人跌倒後1個月漸進意識變差、記憶差嗜睡→慢性硬膜下出血(SDH)。","detail":{"background":"80歲老人「跌倒撞頭當時無異狀，數週至1個月後逐漸出現記憶差、嗜睡、意識變差」是「慢性硬膜下血腫(chronic SDH)」的典型病史：腦萎縮的老人橋靜脈脆弱，輕微外傷即撕裂、「靜脈」緩慢滲血，血腫慢慢擴大數週後才壓迫腦組織出現症狀。需CT確診、必要時鑽孔引流。相對地硬膜上血腫進展快(數小時)、SAH劇烈頭痛突發。故為硬膜下出血。","options":{"A":"蜘蛛膜下腔出血以突發劇烈頭痛為主，非數週漸進。","B":"顱內(腦實質)出血多急性發作。","C":"正解。老人跌倒後數週漸進惡化＝慢性硬膜下血腫。","D":"硬膜上出血進展快(數小時內惡化)，非1個月。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"103100-N3-6":{"quick":"顱底骨折CSF鼻漏→教導「暫勿用力咳嗽/打噴嚏」，不可擤、不可抽吸。","detail":{"background":"車禍顱底骨折病人「流鼻水」要高度懷疑「腦脊髓液鼻漏(CSF rhinorrhea)」(硬腦膜破損使CSF經鼻流出)。護理：①「絕不可擤鼻、塞鼻、由鼻腔抽吸」——會把細菌逆送入顱內致腦膜炎、或形成氣顱；②教導避免用力咳嗽、打噴嚏、用力排便(防壓力使漏更甚)；③任CSF自然滴流、墊無菌紗布、記錄量；④可驗葡萄糖或看「halo/暈環徵」確認是否為CSF。故正確為教導暫勿用力咳嗽或打噴嚏。","options":{"A":"不可請病人用力擤鼻，會致顱內感染。","B":"不可由鼻腔抽吸，會逆送細菌入顱。","C":"不可當作感冒輕忽，應警覺CSF漏。","D":"正解。教導暫勿用力咳嗽或打噴嚏，避免加重CSF漏。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"104100-N3-3":{"quick":"SDH術後護理應「分散」進行；採集中護理→錯誤。","detail":{"background":"硬腦膜下血腫清除術後護理：①抬高床頭30°預防IICP；②頭頸保持正中平直維持腦灌流；③避免一切升壓動作(抽痰、翻身、用力排便)，且這些刺激性護理應「分散」進行而非「集中一次完成」(集中會使顱內壓持續疊加上升)；④術後易癲癇，拉起床欄、備抽吸與氧氣預防意外。故「採集中護理」為錯誤。","options":{"A":"床頭抬高30°預防IICP，正確。","B":"頭頸正中平直維持腦灌流，正確。","C":"正解(本題選錯誤)。刺激性護理應分散，不可集中一次完成。","D":"拉起床欄預防癲癇跌落，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"105030-N3-5":{"quick":"外傷性腦水腫IICP高峰在受傷後「48~72小時(約3天)」，非1週→A錯誤。","detail":{"background":"外傷後腦水腫造成的顱內壓升高，通常在受傷後「48~72小時(約2~3天)」達高峰，之後逐漸消退，並非「1星期」最易出現。腦水腫/腦腫脹是創傷後IICP最常見原因(B正確)；抬高床頭30°可降壓(C正確)；出現IICP可依醫囑用滲透性利尿劑mannitol(D正確)。故A「IICP在受傷後1星期左右最易出現」錯誤。","options":{"A":"正解(本題選錯誤)。外傷性腦水腫IICP高峰在48~72小時，非1週。","B":"腦水腫/腦腫是IICP最常見原因，正確。","C":"抬高床頭30°可降顱內壓，正確。","D":"IICP可依醫囑用mannitol，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"106030-N3-6":{"quick":"顱底骨折徵＝鼓室積血、Battle徵、浣熊眼；Babinski徵(上運動神經元徵)非顱底骨折特異→錯誤。","detail":{"background":"顱底骨折常見徵象：鼓室積血(hemotympanum)、Battle’s sign(乳突瘀斑)、浣熊眼(眼眶周瘀血)、耳漏/鼻漏(CSF漏)。Babinski’s sign(刮足底大腳趾上翹)是「上運動神經元(錐體束)受損」的病理反射，可見於各種中樞病變，並非顱底骨折的「特異」徵象。故選Babinski為錯誤。","options":{"A":"鼓室積血是顱底骨折徵，正確。","B":"Battle徵是顱底骨折徵，正確。","C":"浣熊眼是顱底骨折徵，正確。","D":"正解(本題選錯誤)。Babinski是上運動神經元徵，非顱底骨折特異徵。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"106030-N3-7":{"quick":"慢性硬膜下出血＝「靜脈(橋靜脈)」出血(A正解)；不一定有Battle徵/CSF漏/Cushing三徵。","detail":{"background":"慢性硬膜下血腫(chronic SDH)多見於老人或酗酒者，因腦萎縮使橋靜脈被拉長變脆，輕微外傷即撕裂、「靜脈」緩慢滲血，數週後血腫變大才出現意識混亂、IICP症狀。它「不一定」出現Battle徵或鼻漏耳漏(那是顱底骨折)、也「不一定」出現Cushing三徵(那是嚴重晚期IICP)。故正確為「多為靜脈出血」。","options":{"A":"正解。慢性硬膜下血腫多為橋靜脈的靜脈出血。","B":"Battle徵屬顱底骨折，慢性SDH不一定出現。","C":"鼻漏耳漏是顱底骨折CSF漏，非一定出現。","D":"Cushing三徵是晚期嚴重IICP，非一定出現。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"106111-N3-2":{"quick":"GCS E1V2M3：E1＝給任何刺激(含疼痛)眼睛皆不睜開。","detail":{"background":"格拉斯哥昏迷量表(GCS)：睜眼E(1~4)、語言V(1~5)、運動M(1~6)。E1＝對「疼痛刺激」眼睛仍無反應(完全不睜眼)；V2＝發出無意義聲音(非單字片語，片語是V3、單字V?…實際V2=可發聲但非言語)；M3＝對疼痛異常屈曲(去皮質姿勢)，非「移除疼痛點(M5)」。E1V2M3總分6分，屬重度昏迷但本題問各分數意義，A精確描述E1=疼痛刺激眼睛無反應。","options":{"A":"正解。E1代表給予疼痛刺激眼睛仍無反應(完全不睜眼)。","B":"「疼痛刺激發出單字或片語」分數較高(V3以上)，與V2不符。","C":"「將疼痛點移除」是M5(定位移除)，非M3。","D":"GCS6分屬重度，但本題要選各分數的正確意義，A最精確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"107030-N3-54":{"quick":"慢性硬膜下出血＝「靜脈」出血，非動脈→A錯誤。","detail":{"background":"老先生撞頭1個月後行為怪異、意識變差，診斷慢性硬膜下血腫：機轉是橋「靜脈」緩慢滲血(非動脈破裂)；多見於老年人(腦萎縮、橋靜脈脆)；會出現顱內壓升高、意識混亂、人格改變；必要時手術(鑽孔)移除血腫。故「主要是動脈血管破裂」錯誤(動脈破裂是硬膜上血腫的機轉)。","options":{"A":"正解(本題選錯誤)。慢性硬膜下出血是靜脈(橋靜脈)出血，非動脈。","B":"會出現IICP及意識混亂，正確。","C":"必要時手術移除血腫，正確。","D":"多發生於老年人，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"109110-N3-3":{"quick":"慢性硬膜下血腫＝靜脈出血(A正解)；非Battle徵/CSF漏/Cushing三徵。","detail":{"background":"慢性硬膜下血腫(chronic SDH)：橋「靜脈」緩慢出血形成血腫，好發於腦萎縮的老人，傷後數週才漸出現意識/認知改變、IICP。它與顱底骨折的Battle徵、鼻漏耳漏無關，也不一定出現Cushing三徵(晚期嚴重IICP才有)。故正確為「血腫多為靜脈出血」。","options":{"A":"正解。慢性硬膜下血腫為靜脈(橋靜脈)出血。","B":"Battle徵屬顱底骨折，非慢性SDH。","C":"鼻漏耳漏屬顱底骨折CSF漏，非慢性SDH。","D":"Cushing三徵是晚期嚴重IICP，非必然。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"109110-N3-8":{"quick":"受傷後「短暫清醒期(lucid interval)後突然昏迷」＝硬膜上(動脈)出血。","detail":{"background":"陳先生撞頭後「意識清楚(縫合傷口時)→突然喪失意識」是典型「清醒期(lucid interval)」現象：硬膜上血腫由中腦膜「動脈」出血，初期血量少病人清醒，動脈血快速累積後壓迫腦組織→突然昏迷、IICP，需緊急開顱清除。故最可能為硬膜上出血。","options":{"A":"正解。有短暫清醒期後突然昏迷＝硬膜上(動脈)血腫。","B":"蜘蛛膜下腔出血以突發劇烈頭痛為主。","C":"硬膜下出血(尤其慢性)進展較慢，無典型清醒期突昏。","D":"顱內(腦實質)出血多受傷當下即出現神經缺損。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"110110-N3-1":{"quick":"前窩顱底骨折→鼻漏(篩板處CSF漏)或浣熊眼(B正解)。","detail":{"background":"前顱窩(anterior fossa)底骨折易傷及篩板與額竇處硬腦膜，出現：①「鼻漏(rhinorrhea)」CSF經鼻流出②「浣熊眼(raccoon eyes)」眼眶周圍瘀血③可能嗅覺喪失。CSF漏代表「硬腦膜」破損(非蜘蛛膜)；治療多先「保守」(臥床、避免擤鼻用力，多數自癒)，非「立即手術」；床頭抬高約30°(非越高越好)。故正確為「可能出現鼻漏或浣熊眼」。","options":{"A":"CSF漏代表硬腦膜受損，非僅蜘蛛膜，敘述不精確。","B":"正解。前窩顱底骨折可出現鼻漏或浣熊眼。","C":"多數CSF漏先保守處理會自癒，非「立即手術」。","D":"床頭抬高約30°即可，非越高越好。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"111030-N3-6":{"quick":"鼻漏確認為CSF→代表「硬腦膜受損」(C正解)；腦震盪無實質損傷、腦挫傷有實質損傷。","detail":{"background":"頭部創傷觀念：①腦震盪(concussion)＝外力造成「暫時性」神經功能障礙，「無」明顯腦組織實質損傷；②腦挫傷(contusion)＝「有」腦組織實質性損傷(瘀傷)；③CSF鼻漏經確認(驗葡萄糖、halo徵)代表「硬腦膜破損」使CSF外漏；④有鼻漏/耳漏「絕不可」由鼻/耳抽吸或擤(會逆送細菌致腦膜炎)。故C「鼻漏確認CSF＝硬腦膜受損」正確。","options":{"A":"腦震盪「無」腦組織實質損傷，敘述相反。","B":"腦挫傷「有」實質損傷，敘述相反。","C":"正解。CSF鼻漏代表硬腦膜受損。","D":"鼻漏/耳漏不可抽吸，會逆送細菌入顱。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"113100-N3-2":{"quick":"顱底骨折耳漏/鼻漏「不可由鼻腔抽吸」→D錯誤。","detail":{"background":"顱底骨折合併耳漏/鼻漏(CSF漏)處置：①以面紙吸取滴液出現「光暈/暈環徵(halo sign)」可協助判斷為CSF(中央血漬、外圈淡黃CSF環)；②教導不可用力咳嗽、打噴嚏、擤鼻；③臥床休息(常採患側臥或床頭略抬)利硬腦膜貼附自癒；④「絕不可用抽吸管抽吸鼻腔/耳道」——會逆向送入細菌造成腦膜炎或形成氣顱。故D「以無菌原則抽吸鼻孔內液體」錯誤(即使無菌也禁止抽吸)。","options":{"A":"用面紙吸取看光暈徵協助判斷CSF，正確。","B":"教導不可用力咳嗽打噴嚏，正確。","C":"臥床休息利腦膜貼附癒合，正確。","D":"正解(本題選錯誤)。CSF漏不可抽吸鼻腔，會致顱內感染。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"113100-N3-5":{"quick":"硬膜上出血＝「動脈」(中腦膜動脈)出血，非靜脈→A錯誤。","detail":{"background":"顳側著地、GCS正常觀察後「2小時突然喪失意識」診斷硬膜上(硬膜外)血腫：機轉是顳骨骨折撕裂「中腦膜動脈」→「動脈」性快速出血、有清醒期後急速惡化、易併IICP、以手術(開顱清除)治療為主。故「主要是靜脈血管破裂」錯誤(靜脈出血是硬膜下血腫的機轉)。","options":{"A":"正解(本題選錯誤)。硬膜上出血是動脈(中腦膜動脈)出血，非靜脈。","B":"常先經歷正常清醒期(lucid interval)，正確。","C":"易出現顱內壓升高，正確。","D":"以手術治療為主，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"114030-N3-3":{"quick":"創傷後症候群症狀可持續「數月到數年」(B正解)；開放性外傷較易癲癇、CSF瘻管是硬腦膜破損、ADH失調是下視丘。","detail":{"background":"頭部外傷合併症：①「創傷後症候群(post-concussion syndrome)」——頭痛、頭暈、注意力/記憶障礙、情緒易怒等可持續「數月到數年」(B正確)；②「開放性/穿透性」頭部外傷比封閉性更易留下外傷後癲癇(A相反，錯誤)；③腦脊髓液瘻管是「硬腦膜破損使CSF外漏」，非CSF循環阻塞(C錯誤)；④外傷損及「下視丘(hypothalamus)」才會引起ADH分泌異常(尿崩/SIADH)，而非「視丘(thalamus)」(D用詞錯誤)。","options":{"A":"開放性外傷較封閉性更易癲癇，敘述相反。","B":"正解。創傷後症候群可持續數月到數年。","C":"CSF瘻管是硬腦膜破損漏液，非循環阻塞。","D":"ADH失調來自「下視丘」損傷，非「視丘」。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》頭部外傷"]}},"101030-N3-30":{"quick":"脊髓休克期＝交感失調→「低血壓」非高血壓，故「密切觀察高血壓」錯誤。","detail":{"background":"頸椎(C5)損傷併四肢癱瘓且處「脊髓休克期(spinal shock)」：受傷部位以下所有反射、運動、感覺暫時消失，且高位損傷使交感神經失去支配→出現「神經性休克(低血壓、心搏過緩、體溫過低)」。護理重點：①警覺「低血壓」與心搏過緩(非高血壓)；②高位頸髓損傷影響膈神經(C3~5)→密切觀察呼吸困難、備呼吸器；③麻痺性腸阻塞→注意腹脹、可放鼻胃管；④被動關節運動預防攣縮。故「密切觀察高血壓」為錯誤(此期應防低血壓)。","options":{"A":"正解(本題選錯誤)。脊髓休克期為交感失調的「低血壓」，非高血壓(高血壓是後期的自主神經過度反射)。","B":"注意麻痺性腸阻塞(腹脹)正確。","C":"四肢被動關節運動預防攣縮，正確。","D":"高位頸髓影響呼吸肌，注意呼吸困難正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"101110-N3-79":{"quick":"上運動神經元神經性膀胱(痙攣型)用「敲擊」誘發反射；Crede法用於「下運動神經元」→B錯誤。","detail":{"background":"神經性膀胱依損傷位置分：①「上運動神經元(UMN)型／痙攣型」——損傷在薦髓(S2~4)以上，排尿反射弧完整但失去大腦抑制→膀胱痙攣、自動反射排尿，訓練用「輕敲恥骨上/刺激大腿內側/肛門」誘發反射排尿；②「下運動神經元(LMN)型／弛緩型」——薦髓或以下受損，反射弧破壞→膀胱無張力、滿溢，用「Crede’s手壓法、Valsalva、間歇導尿」協助排空。故UMN型用「Crede法」是錯誤(Crede法用於弛緩型)。停止間歇導尿標準：自解:餘尿達3:1。","options":{"A":"輕敲膀胱部位誘發反射排尿，是UMN型的正確方法。","B":"正解(本題選錯誤)。Crede法用於下運動神經元(弛緩型)，非UMN型。","C":"自解尿量:餘尿量=3:1可停止間歇導尿，正確。","D":"控制飲水量、規律飲水以利膀胱訓練，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"102030-N3-7":{"quick":"自主神經過度反射＝「交感」過度興奮致嚴重高血壓，非副交感→C錯誤。","detail":{"background":"自主神經過度反射(autonomic dysreflexia)是「T6以上」脊髓損傷者的急症：損傷以下的有害刺激(最常見「膀胱脹」，其次便秘、壓瘡)經脊髓引發大量「交感神經」興奮→病灶以下血管劇烈收縮→「嚴重高血壓、搏動性頭痛」，同時頸動脈竇感壓使「病灶以上」副交感代償(心搏過緩、臉潮紅出汗)。它是交感過度興奮(非副交感)。故「會造成副交感神經興奮」為錯誤。","options":{"A":"膀胱脹是最常見的刺激源，正確。","B":"常見於T6以上損傷者，正確。","C":"正解(本題選錯誤)。是「交感」神經過度興奮，非副交感。","D":"會出現嚴重高血壓，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"103030-N3-2":{"quick":"Halo vest固定→轉身時「整個身體一起翻」(log-roll)，不可單獨轉頭。","detail":{"background":"連頭圈式背夾(Halo vest)以骨釘固定頭顱、連接胸背架，限制頸椎活動以利不穩定頸椎癒合。護理指導：①翻身採「整體滾木(log-roll)、全身一起轉」維持頸椎中立，「不可單獨轉頭」；②骨釘處用無菌生理食鹽水或依醫囑清潔(非優碘——優碘可能刺激/影響傷口判斷)、觀察感染；③背架「不可自行打開」，須維持固定；④背架固定後仍可下床活動(本就是為了讓病人能活動)。故正確為「轉身時全身一起轉」。","options":{"A":"骨釘處應以生理食鹽水/依醫囑清潔，非常規優碘。","B":"正解。翻身須全身一起轉(log-roll)，不可只轉頭。","C":"Halo vest固定後即可下床活動，非一定臥床。","D":"背架不可自行打開調整，須維持固定。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"103100-N3-2":{"quick":"脊髓損傷後低血壓、心搏過緩、低體溫、反射全失＝脊髓休克(spinal shock)。","detail":{"background":"高位胸髓(T4)損傷後急性出現「低血壓、心搏過緩、低體溫、腸蠕動變慢，且損傷以下運動、感覺、反射全部消失」＝典型「脊髓休克(spinal shock)」：脊髓被突然橫斷後，損傷平面以下所有反射活動「暫時」喪失(數天至數週)，並因交感神經失調出現神經性休克的循環/體溫表現。脊髓自動症(autonomism)、自主神經過度反射是脊髓休克「結束後」才出現的反射亢進。","options":{"A":"脊髓自動症是脊髓休克結束後反射恢復亢進的現象，非此急性期。","B":"低血容性休克會有心搏「過速」，與此心搏過緩不符。","C":"正解。反射全失＋低血壓心搏過緩低體溫＝脊髓休克。","D":"自主神經過度反射是慢性期的反射亢進(高血壓)，非此期。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"103100-N3-3":{"quick":"腰3~4不完全損傷度過休克期→反射弧多保留可敲恥骨誘發排尿(屬上運動神經元型處理)。","detail":{"background":"本例腰椎L3~4不完全損傷、已度過脊髓休克期、進行膀胱訓練。判斷神經性膀胱類型要看「薦髓排尿中樞(S2~4)及反射弧是否完整」：若反射弧保留(上運動神經元型/痙攣型)→可「輕敲恥骨上緣、刺激大腿內側或肛門」誘發反射排尿(B正確)。Crede’s法(手壓膀胱)是用於「下運動神經元(弛緩型)反射弧破壞」者。膀胱訓練成功標準是「自解:餘尿=3:1、餘尿<100mL」(非2:1)。故正確為B。","options":{"A":"本例可誘發反射排尿，較屬上運動神經元型處理，非下運動神經元。","B":"正解。輕敲恥骨上緣可誘發反射排尿。","C":"訓練完成標準是自解:餘尿=3:1、餘尿<100mL，非2:1。","D":"Crede法用於下運動神經元(弛緩型)，本例不適用。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"104030-N3-3":{"quick":"薦髓S2~4完全損傷＝下運動神經元(弛緩型)膀胱→反射弧破壞、出現「溢出性尿失禁」。","detail":{"background":"薦髓S2~4是排尿反射中樞，「S2~4完全損傷」破壞反射弧→「下運動神經元(弛緩型)神經性膀胱」：膀胱無張力、無法反射排空，尿液滯留至膀胱過脹後「溢出(overflow incontinence)」。因反射弧破壞，「無法藉反射排空」(A錯)、「反射性勃起喪失」(S2~4也管勃起反射，B錯)；排便也因反射弧破壞無法靠單純脊髓反射，但「可藉增加腹壓(Valsalva)、手指刺激」協助(D錯)。故正確為「出現溢出性尿失禁」。","options":{"A":"反射弧破壞無法藉反射排空膀胱，錯誤。","B":"S2~4管勃起反射，受損則反射性勃起喪失，錯誤。","C":"正解。弛緩型膀胱出現溢出性(滿溢)尿失禁。","D":"仍可藉增加腹壓/手指刺激協助排便，「無法」之敘述錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"105030-N3-2":{"quick":"自主神經過度反射最常見導因＝膀胱脹(B正解)；發生於休克期「後」、病灶以下蒼白、需立即處理。","detail":{"background":"自主神經過度反射特性：①發生於脊髓休克「結束後」(反射恢復)，非休克期；②最常見誘因是「膀胱脹」(尿瀦留、導管阻塞)，其次便秘、壓瘡；③交感興奮使「病灶以下」血管收縮→皮膚蒼白、起雞皮疙瘩(非發紅)，病灶以上代償性血管擴張→臉潮紅出汗；④是高血壓危象、必須「立即處理」(抬高床頭、解除誘因)。故正確為「最常見導因為膀胱脹」。","options":{"A":"發生於脊髓休克「結束後」，非休克期。","B":"正解。最常見導因為膀胱脹(尿瀦留)。","C":"病灶以下因血管收縮而蒼白，非發紅。","D":"是高血壓危象，須立即處理。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"105090-N3-4":{"quick":"自主神經過度反射立即處置→先「抬高床頭」降血壓，同時迅速找出並解除誘因。","detail":{"background":"自主神經過度反射是高血壓急症，立即處置順序：①「抬高床頭(坐起)」利用姿位性降血壓、減少腦出血風險；②「同時/盡速」找出並「解除誘因」——最常見是膀胱脹(檢查導管是否扭折阻塞、必要時導尿)、便秘、壓瘡；③持續密切監測血壓(每2~5分鐘)；④必要時依醫囑給短效降壓藥。不應「等血壓正常才排除導因」(誘因不除血壓不會降)。故最適當為「抬高床頭」。","options":{"A":"插管維持呼吸道非此急症的首要處置。","B":"正解。先抬高床頭利用姿位降血壓。","C":"應「立即」解除誘因，不可等血壓正常才處理。","D":"血壓變化快，需每2~5分鐘監測，非每30分鐘。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"106030-N3-4":{"quick":"頸髓損傷的神經性休克＝交感失調→「體溫下降」(及低血壓、心搏過緩)。","detail":{"background":"高位(頸/上胸)脊髓損傷使交感神經失去中樞支配，出現「神經性休克(neurogenic shock)」三特徵：①低血壓(血管擴張)②心搏過緩(失去交感、迷走相對優勢)③「體溫下降/失溫」——因損傷面以下血管無法收縮保溫、且失去體溫調節，病人變成近似「變溫(poikilothermic)」易隨環境降溫。故正確為「體溫下降」；多尿、肌肉顫動、臉潮紅鼻塞非神經性休克典型。","options":{"A":"神經性休克不以多尿為特徵。","B":"臉潮紅鼻道充血較像自主神經過度反射(慢性期)，非神經性休克。","C":"損傷以下反射消失，不會肌肉顫動。","D":"正解。神經性休克會體溫下降(併低血壓、心搏過緩)。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"106110-N3-3":{"quick":"自主神經過度反射常見誘因＝膀胱脹(C正解)；發生於休克「後」、交感(非副交感)興奮、心搏過「緩」。","detail":{"background":"自主神經過度反射(T6以上損傷)：發生於脊髓休克結束後；機轉是損傷以下有害刺激引發大量「交感」神經放電；最常見誘因為「膀胱脹」；表現嚴重高血壓、搏動性頭痛，並因壓力感受器反射使「心搏過緩(非加速)」、病灶以上潮紅出汗。故正確為「常見引發原因是膀胱脹」。","options":{"A":"發生於脊髓休克「結束後」，非休克期。","B":"是「交感」神經過度興奮，非副交感。","C":"正解。最常見誘因是膀胱脹。","D":"會嚴重高血壓但心搏「過緩」，非加速。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"106111-N3-4":{"quick":"肛門反射/肛門括約肌張力陽性→代表S2~4排尿反射中樞完整(A正解)。","detail":{"background":"評估神經性膀胱類型先看薦髓(S2~4)反射弧是否完整：①「肛門反射(球海綿體反射)、肛門外括約肌張力呈陽性」→表示S2~4反射中樞「完整」→屬上運動神經元(痙攣型)膀胱(A正確)。②上運動神經元型(反射弧完整)訓練用「敲恥骨、刺激肛門/大腿」誘發反射排尿；下運動神經元型(反射弧破壞)才用Crede法。③膀胱訓練成功標準是自解:餘尿=「3:1」且餘尿<100mL(非2:1、非150mL)。故正解為A。","options":{"A":"正解。肛門反射與括約肌張力陽性表示S2~4反射中樞完整。","B":"下運動神經元型反射弧破壞，無法「引發反射」排尿。","C":"Crede法用於下運動神經元(弛緩型)，非上運動神經元。","D":"成功標準是自解:餘尿=3:1、餘尿<100mL，非2:1<150mL。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"107030-N3-3":{"quick":"T12~L3損傷的脊髓休克不影響呼吸肌→「無法自行呼吸」錯誤。","detail":{"background":"脊髓休克使損傷以下反射、運動、感覺暫時全失：故「無法控制大小便」(膀胱腸道反射喪失)、「腸蠕動降低致腹脹(麻痺性腸阻塞)」、「肛門反射消失」皆為正確表現。但呼吸肌中膈肌由「C3~5(膈神經)」支配，本例損傷在「T12~L3」遠低於膈神經，「不會」影響自行呼吸。故「無法自行呼吸」錯誤(只有高位頸髓C4以上損傷才會呼吸衰竭)。","options":{"A":"損傷以下大小便失控，正確。","B":"正解(本題選錯誤)。T12~L3不影響膈神經(C3~5)，可自行呼吸。","C":"腸蠕動降低致腹脹(麻痺性腸阻塞)，正確。","D":"脊髓休克期肛門反射消失，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"107110-N3-3":{"quick":"C3~5完全損傷＝四肢癱、影響膈肌不能自呼；交感失調為「心搏過緩、低血壓」非過速高血壓→C錯誤。","detail":{"background":"頸髓C3~5完全損傷：①「四肢癱瘓(quadriplegia)」(A正確)；②C3~5是膈神經發源(C3,4,5 keeps the diaphragm alive)→膈肌癱瘓「無法自行呼吸」、需呼吸器(B正確)；③高位損傷交感失調→神經性休克「心搏過緩、低血壓」，而非「心搏過速>100、高血壓」(C錯誤)；④損傷面以下所有運動、感覺、反射在休克期均消失(D正確)。故錯誤為C。","options":{"A":"C3~5損傷造成四肢癱瘓，正確。","B":"影響膈神經(C3~5)→無法自行呼吸，正確。","C":"正解(本題選錯誤)。高位損傷是心搏過緩、低血壓，非過速高血壓。","D":"損傷以下運動感覺反射全失，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"108020-N3-4":{"quick":"上運動神經元(痙攣型)膀胱反射弧完整→可敲恥骨/刺激肛門誘發排尿(C正解)。","detail":{"background":"神經性膀胱：①上運動神經元(UMN/痙攣型)——薦髓以上損傷，「排尿反射弧完整」、失去大腦抑制→可「敲恥骨上緣或刺激肛門/大腿內側」誘發反射排尿(C正確)；腎臟合併症(逆流、腎盂腎炎)風險在膀胱壓高的痙攣型確有，但選項A、B、D錯置：A說「下運動神經元反射中樞完整」(反了，下運動神經元是反射弧破壞)、B說「下運動神經元可利用反射排尿」(反了)、D說「上運動神經元常發生腎臟合併症」此句雖部分為真但相對於C的明確正確，C為標準答案。故選C。","options":{"A":"下運動神經元型是反射弧「破壞」，非完整，敘述相反。","B":"下運動神經元型反射弧破壞，無法利用反射排尿。","C":"正解。上運動神經元(痙攣型)可敲恥骨或刺激肛門誘發反射排尿。","D":"此句相對不精確；標準答案為C。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"109030-N3-1":{"quick":"脊髓休克期反射全失→「肛門反射正常」錯誤(應消失)。","detail":{"background":"脊髓休克(spinal shock)：脊髓被急性橫斷後，損傷平面「以下」所有反射(含肛門反射、球海綿體反射、深部肌腱反射)、肌力、溫痛觸覺暫時「完全消失」，並出現麻痺性腸阻塞、尿瀦留。肛門反射「消失」，待其「恢復」反而是脊髓休克結束的指標。故「病人肛門反射正常」為錯誤敘述。","options":{"A":"正解(本題選錯誤)。脊髓休克期肛門反射消失，非正常。","B":"損傷以下肌力消失，正確。","C":"損傷以下溫痛觸覺消失，正確。","D":"腸蠕動下降/麻痺性腸阻塞，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"109030-N3-7":{"quick":"弛緩型(下運動神經元)膀胱→用副交感刺激劑促迫尿肌收縮(B正解)；不用敲擊反射、不留置尿管。","detail":{"background":"弛緩型(下運動神經元/無張力)神經性膀胱：薦髓反射弧破壞，膀胱逼尿肌無力、滿溢。排尿訓練：①以「Crede手壓法、Valsalva增加腹壓」協助排空；②可用「副交感神經刺激劑(如bethanechol)」促進逼尿肌收縮(B正確)；③定時間歇導尿。「敲擊恥骨誘發反射」是上運動神經元(痙攣型)的方法，弛緩型反射弧破壞無效(A錯)；會陰收縮(凱格爾)是壓力性尿失禁訓練(C錯)；長期留置尿管/包尿布增感染與皮膚問題、非治療目標(D錯)。","options":{"A":"敲擊恥骨誘發反射用於痙攣型(上運動神經元)，弛緩型無效。","B":"正解。弛緩型用副交感刺激劑促進逼尿肌收縮。","C":"會陰收縮運動是壓力性尿失禁訓練，非弛緩型膀胱排空。","D":"長期留置尿管/尿布增感染、非排尿訓練目標。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"110030-N3-4":{"quick":"脊髓半切(Brown-Séquard)→同側運動與本體/震動感喪失、對側痛溫覺喪失。","detail":{"background":"脊髓半側截斷症候群(Brown-Séquard syndrome)，左側T6半切的表現：①「同側(左側)」損傷面以下的「運動功能(皮質脊髓束)」與「本體感覺/震動覺/深觸覺(後柱)」喪失——因這兩條路徑在脊髓「同側」上行/下行、到延腦或對側才交叉；②「對側(右側)」損傷面以下的「痛覺與溫度覺(脊髓視丘束)」喪失——因痛溫覺進入脊髓後立即交叉到對側上行。故正解為「左側(同側)運動功能及震動感消失」。","options":{"A":"痛溫覺喪失應在「對側(右側)」，非同側左側。","B":"正解。同側(左側)運動功能與震動感(本體感覺)消失。","C":"輕觸覺雙側皆有部分傳導，非單純左側消失。","D":"深(本體)感覺喪失應在「同側(左側)」，非右側。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"110110-N3-2":{"quick":"S2~4完全損傷＝下運動神經元(弛緩型)膀胱→屬「溢尿性」神經性膀胱。","detail":{"background":"S2~4是排尿反射中樞，「S2~4完全損傷」破壞反射弧→下運動神經元(弛緩/無張力)膀胱：膀胱失去張力、容量「增大」、無法反射排空，尿液滯留至過脹後「溢出(overflow/溢尿性)」。它「無法藉反射排空」(A錯)、屬「下運動神經元」型而非上運動神經元(D錯)、膀胱容量「增大」而非很小(C錯)。故正確為「屬溢尿性神經性膀胱」。","options":{"A":"反射弧破壞，無法藉反射排空，錯誤。","B":"正解。S2~4完全損傷為溢尿性(弛緩型)神經性膀胱。","C":"弛緩型膀胱容量「增大」，非很小。","D":"屬下運動神經元型，非上運動神經元。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"111030-N3-8":{"quick":"自主神經過度反射→嚴重高血壓＋搏動性頭痛(C正解)；發生於T6以上、誘因如膀胱脹、心搏過緩。","detail":{"background":"自主神經過度反射：①發生於「T6以上」損傷者(非T6~T12)；②誘因為損傷以下有害刺激，最常見膀胱脹、便秘、壓瘡(「走路運動」非典型誘因)；③表現「嚴重高血壓＋搏動性(劇烈)頭痛」、臉潮紅出汗，並因壓力反射「心搏過緩(非加速)」。故正確為「出現嚴重高血壓及搏動性頭痛」。","options":{"A":"常發生於「T6以上」，非T6~T12。","B":"走路運動非典型誘因(誘因為膀胱脹、便秘等)。","C":"正解。出現嚴重高血壓及搏動性頭痛。","D":"心搏「過緩」，非加速。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"111030-N3-77":{"quick":"神經性休克＝脊髓(交感)損傷致血管張力喪失→車禍脊髓受損最可能引發。","detail":{"background":"休克分類：①過敏性(蜜蜂螫，A)②阻塞性(張力性氣胸壓迫大血管/心臟，B)③心因性(心肌梗塞泵衰竭，C)④「神經性/血管性休克」——交感神經傳導中斷使全身血管擴張、血管張力喪失，典型見於「高位脊髓損傷」(D)，伴心搏過緩、皮膚溫暖。故最可能引發神經性休克的是「車禍脊髓受損」。","options":{"A":"蜜蜂螫傷引發過敏性(分布性)休克，非神經性。","B":"張力性氣胸引發阻塞性休克。","C":"心肌梗塞引發心因性休克。","D":"正解。車禍脊髓損傷造成交感失調的神經性休克。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"111110-N3-2":{"quick":"完全/不完全脊髓損傷的鑑別主要靠「神經學檢查(ASIA)」與MRI，非「電腦斷層」→D錯誤。","detail":{"background":"脊髓休克期照護：①「肛門反射(球海綿體反射)恢復出現」表示脊髓休克結束(A正確)；②可放鼻胃管引流胃液、減壓緩解麻痺性腸阻塞(B正確)；③急性脊髓損傷曾用高劑量類固醇減輕脊髓水腫(C，傳統教科書觀點)；④判定「完全vs不完全」損傷主要靠「臨床神經學檢查(ASIA分級，看薦髓保留sacral sparing)」與「MRI(顯示脊髓本身)」，電腦斷層(CT)主要看「骨折」而非脊髓實質，故「以CT確診完全/不完全脊髓損傷」錯誤。","options":{"A":"肛門反射出現表示脊髓休克結束，正確。","B":"放鼻胃管引流胃液減壓，正確。","C":"急性期曾用高劑量類固醇減輕脊髓水腫(傳統作法)，正確。","D":"正解(本題選錯誤)。完全/不完全靠神經學檢查與MRI，CT主要看骨折。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"111110-N3-67":{"quick":"慢性膀胱出口阻塞→膀胱代償擴大、餘尿增多→「膀胱容量增加」。","detail":{"background":"膀胱容量增加(大容量、低張力)見於「慢性出口阻塞(如攝護腺肥大)」或「下運動神經元(弛緩型)神經性膀胱」——長期排尿阻力使逼尿肌先肥厚後失代償、膀胱被尿液撐大、餘尿增多。相對地，膀胱發炎、纖維化、「上運動神經元(痙攣型)受損」會使膀胱「容量變小、痙攣、頻尿」。故選「慢性膀胱出口阻塞」。","options":{"A":"膀胱發炎使容量「變小」、頻尿急尿。","B":"膀胱纖維化使順應性下降、容量變小。","C":"上運動神經元受損為痙攣型、容量變小。","D":"正解。慢性出口阻塞使膀胱代償擴大、容量增加。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"112110-N3-6":{"quick":"「肛門反射(球海綿體反射)」恢復出現→表示已渡過脊髓休克期。","detail":{"background":"脊髓休克期所有反射消失；當「肛門反射(球海綿體反射 bulbocavernosus reflex)」或其他深部反射「重新出現」，即代表脊髓休克結束、進入反射恢復(痙攣)期。作嘔反射(CN IX/X)、頭眼反射、角膜反射(CN V/VII)屬「腦幹」反射，與脊髓休克是否結束無關。故由「肛門反射出現」判斷已渡過脊髓休克期。","options":{"A":"作嘔反射屬腦幹(CN IX/X)，與脊髓休克無關。","B":"正解。肛門反射(球海綿體反射)恢復表示脊髓休克結束。","C":"頭眼反射屬腦幹評估，與脊髓休克無關。","D":"角膜反射屬腦幹(CN V/VII)，與脊髓休克無關。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"112180-N3-1":{"quick":"頸髓(C5~6)損傷度過休克期＝痙攣型膀胱(1)＋成功標準自解:餘尿2:1且餘尿<100mL(4)。","detail":{"background":"頸椎C5~6完全損傷(薦髓以上)、度過脊髓休克期→「上運動神經元(痙攣型)神經性膀胱」(敘述1正確)：反射弧完整，可敲恥骨、刺激大腿/肛門誘發反射排尿。「只要薦神經受刺激即反射排尿」過於絕對(2不夠精確)；Crede手壓法是用於「弛緩型」非此痙攣型(3不適用)；膀胱訓練成功標準各家略異，本題以「自解:餘尿=2:1且餘尿<100mL」(4)為成功。故正確組合為1、4(本題答案12？此處依官方為A=12)。整合：痙攣型(1)＋成功標準(本題以選項採計)，正確選項為A。","options":{"A":"正解。1屬痙攣型神經性膀胱(C5~6在薦髓以上)＋2薦神經受刺激可反射排尿，為本題正確組合。","B":"13含Crede法(3)，Crede用於弛緩型，不適用此痙攣型。","C":"24組合非本題正解。","D":"34含Crede法(3)不適用。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"114100-N3-5":{"quick":"脊髓休克期是交感失調→低血壓、心搏過緩；「血壓160/100、心跳50」中的高血壓不符→A錯誤。","detail":{"background":"頸椎脊髓損傷的脊髓休克期：主因「喪失交感神經控制」→出現「神經性休克：低血壓、心搏過緩(因交感失迷走相對優勢)、體溫過低」，及損傷以下運動感覺反射減弱/消失、尿瀦留、腸蠕動下降。選項A「血壓160/100(高血壓)、心跳50」中的「高血壓」與脊髓休克的低血壓矛盾(心搏過緩50倒是符合，但血壓應低)，故A為錯誤敘述。","options":{"A":"正解(本題選錯誤)。脊髓休克期應為「低血壓」，160/100的高血壓不符。","B":"主因喪失自主(交感)神經控制，正確。","C":"損傷以下運動感覺反射減弱或消失，正確。","D":"出現尿滯留及腸蠕動下降，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"115030-N3-1":{"quick":"T6以上損傷＋極高血壓(250/140)、心搏過緩、頭痛、出汗、膀胱脹(6小時未解尿)＝自主神經過度反射。","detail":{"background":"陳先生T3~T5(T6以上區)脊髓損傷，出現「血壓250/140極高、心搏過緩(50~55)、大量出汗、劇烈頭痛、視力模糊」且「6小時以上未解尿(膀胱脹)」——完全符合「自主神經過度反射(autonomic dysreflexia)」：膀胱脹(最常見誘因)引發損傷以下大量交感放電→嚴重高血壓危象，壓力反射使心搏過緩、病灶以上潮紅出汗。立即處置：抬高床頭、解除膀胱脹(導尿/檢查導管)。","options":{"A":"神經性休克是「低血壓、心搏過緩」，與此極高血壓相反。","B":"正解。T6以上損傷＋極高血壓、心搏過緩、頭痛、膀胱脹＝自主神經過度反射。","C":"脊髓自動症是反射性動作，不會有此高血壓危象表現。","D":"脊髓休克是反射全失、低血壓，與此高血壓危象不符。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》脊髓損傷與神經性膀胱"]}},"101030-N3-22":{"quick":"Levodopa達治療濃度時常出現「異動症(不自主運動)」(C正解)；勿補B6、勿從大劑量開始。","detail":{"background":"巴金森氏症是中腦「黑質」多巴胺神經元退化、多巴胺不足。Levodopa(可通過血腦障壁轉成多巴胺)是主要治療。用藥要點：①「由小劑量漸增」至治療濃度(非一開始大劑量再減)；②「不可補充維生素B6」——B6會促進levodopa在周邊提早脫羧、減少進入腦部的量、降低藥效；③長期/達治療濃度後常見「異動症(dyskinesia，不自主運動)」與「on-off現象」；④副作用為姿位性低血壓、噁心、幻覺，「運動遲緩僵硬」是疾病本身症狀非藥物副作用。故正確為「達治療濃度時常出現不自主運動」。","options":{"A":"應由小劑量漸增，非一開始大劑量再減量。","B":"補充B6會降低levodopa藥效，不可補充。","C":"正解。達治療濃度/長期使用常出現異動症(不自主運動)。","D":"運動遲緩、僵硬是疾病本身的症狀，非藥物副作用。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"101110-N3-80":{"quick":"靜止性震顫(resting tremor)是「巴金森氏症」常見症狀。","detail":{"background":"靜止性震顫(resting tremor)——肢體「休息靜止時」出現的震顫(如典型「搓藥丸樣pill-rolling」)，活動時反而減輕——是巴金森氏症的核心症狀之一(與僵硬rigidity、運動遲緩bradykinesia、姿勢不穩合稱四大主徵)。小腦病變是「意向性震顫(動作時加劇)」；MS、中風、ALS不以靜止性震顫為特徵。","options":{"A":"腦血管意外不以靜止性震顫為特徵。","B":"正解。靜止性震顫是巴金森氏症常見症狀。","C":"多發性硬化症以視力障礙、感覺運動缺損為主，可有意向性震顫。","D":"肌萎縮性側索硬化症以肌肉萎縮無力為主，無靜止性震顫。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"102030-N3-6":{"quick":"多巴胺藥物副作用＝憂鬱、姿位性低血壓(D正解)；Sinemet可過BBB、勿併B6/高蛋白。","detail":{"background":"Sinemet＝levodopa＋carbidopa(carbidopa抑制周邊脫羧、讓更多levodopa進腦)，「可通過血腦障壁」(A錯)。用藥注意：①「不可併維生素B6」(會降低療效，B錯)；②「高蛋白飲食會與levodopa競爭腸道與血腦障壁的胺基酸轉運、降低吸收」(C錯，應避免高蛋白同時服用)；③副作用包含「姿位性低血壓、噁心、憂鬱、幻覺、異動症」(D正確)。故正確為「副作用為憂鬱、姿位性低血壓」。","options":{"A":"Sinemet可通過血腦障壁(carbidopa助levodopa入腦)，敘述相反。","B":"併用B6會降低藥效，不可併用。","C":"高蛋白會與藥物競爭吸收、降低療效，應避免同時。","D":"正解。副作用為憂鬱、姿位性低血壓(及噁心、異動症)。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"102110-N3-66":{"quick":"巴金森氏症病因＝大腦基底核(黑質)多巴胺神經元退化、多巴胺「不足」。","detail":{"background":"巴金森氏症的病理是中腦「黑質(substantia nigra)」的多巴胺神經元退化死亡，使基底核(basal ganglia)多巴胺「減少」，造成多巴胺與乙醯膽鹼失衡(膽鹼相對過多)→靜止性震顫、僵硬、運動遲緩。故病因為「基底核神經元退化(多巴胺不足)」。注意：是多巴胺「不足/減少」(非過多)、乙醯膽鹼相對「過多」(非不足)。","options":{"A":"正解。大腦基底核(黑質)多巴胺神經元退化是巴金森氏症病因。","B":"多巴胺是「減少」不是過多。","C":"是乙醯膽鹼相對「過多」，非抗膽鹼不足。","D":"與腎上腺髓質分泌無關。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"104100-N3-2":{"quick":"巴金森氏症以「藥物治療為主」(D正解)；多巴胺不足、原因不明、無法治癒。","detail":{"background":"巴金森氏症是慢性、進行性神經退化疾病：①病因「多巴胺不足」(非過多，A錯)；②屬「原發性」者「病因不明」(B錯)；③目前「無法治癒」、只能緩解症狀(C錯)；④治療「以藥物為主」(levodopa、多巴胺受體促效劑、抗膽鹼劑、MAO-B抑制劑等)，配合復健，嚴重者考慮深部腦刺激術(DBS)。故正確為「主要以藥物治療為主」。","options":{"A":"是多巴胺「不足」，非過多。","B":"原發性巴金森氏症病因不明。","C":"無法治癒，只能控制症狀。","D":"正解。主要以藥物治療為主。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"105030-N3-8":{"quick":"全身僵硬、動作遲緩、靜止性震顫、流涎→巴金森氏症。","detail":{"background":"65歲病人「全身僵硬(rigidity)、動作遲緩(bradykinesia)、單側上肢震顫加劇(靜止性震顫，常單側起病)、唾液不自主流出(流涎，因吞嚥/自主動作減少)」——是巴金森氏症的典型四主徵組合。亨汀頓舞蹈症為「舞蹈樣不自主動作＋認知/精神症狀(體染色體顯性遺傳)」；MS為髓鞘脫失的神經缺損；中風為突發局部缺損。故診斷為巴金森氏症。","options":{"A":"多發性硬化症以視力/感覺運動缺損、復發緩解為主。","B":"正解。僵硬＋動作遲緩＋靜止性震顫＋流涎＝巴金森氏症。","C":"亨汀頓舞蹈症是舞蹈樣「過多」不自主動作，非僵硬遲緩。","D":"腦血管意外為突發局部神經缺損，非漸進的四主徵。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"106030-N3-1":{"quick":"on-off反應是Levodopa長期使用的副作用(B正解)；Sinemet可過BBB、Artane是抗膽鹼非補多巴胺、勿併B6。","detail":{"background":"巴金森治療藥理：①Sinemet可通過血腦障壁(A錯)；②長期使用levodopa會出現「on-off現象(藥效時好時壞、突然僵住)」與異動症，屬其副作用(B正確)；③Artane(trihexyphenidyl)是「抗膽鹼劑」(平衡相對過多的乙醯膽鹼以減震顫)，「不是補充多巴胺」的藥(C錯)；④「不可併B6」(會降低levodopa藥效，D錯)。故正確為「on-off反應為levodopa副作用」。","options":{"A":"Sinemet可通過血腦障壁，敘述相反。","B":"正解。on-off現象是長期使用levodopa的副作用。","C":"Artane是抗膽鹼劑，非補充多巴胺。","D":"併B6會降低levodopa藥效，不可併用。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"106030-N3-2":{"quick":"巴金森護理→姿勢改變要「緩慢」防姿位性低血壓跌倒(C正解);勿高蛋白/酒精、勿小碎步。","detail":{"background":"巴金森氏症護理指導：①因藥物易致姿位性低血壓，改變姿勢(由臥到坐到站)要「緩慢」、預防跌倒(C正確)；②避免「高蛋白」與levodopa同時(競爭吸收降藥效)、避免酒精(影響藥效與平衡)；③步態訓練應教「跨大步、腳跟先著地、抬頭挺胸」，而非「小碎步(festination)」——小碎步是疾病本身的慌張步態、易前衝跌倒，要矯正而非鼓勵。故正確為「姿勢改變要緩慢以免跌倒」。","options":{"A":"高蛋白會降低levodopa藥效，不應促進。","B":"酒精影響藥效與平衡，應避免。","C":"正解。姿勢改變要緩慢，預防姿位性低血壓跌倒。","D":"應矯正小碎步、教跨大步腳跟先著地，非鼓勵小碎步。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"106110-N3-5":{"quick":"Levodopa→3可能異動症/不自主運動、4長期出現on-off；勿補B6(1)、勿高蛋白(2)。","detail":{"background":"Levodopa護理：①「不可補B6」——B6促進周邊脫羧降低入腦藥量(敘述1錯)；②「高蛋白會競爭吸收降藥效」應避免同時(敘述2錯)；③長期/達療效後常見「舞蹈症樣異動、不自主運動」(敘述3正確)；④長期使用出現「on-off現象」(敘述4正確)。故正確為3、4。","options":{"A":"12(補B6、高蛋白)皆會降低藥效，錯誤。","B":"14含補B6(1)錯誤。","C":"23含高蛋白(2)錯誤。","D":"正解。3異動/不自主運動＋4 on-off現象是levodopa長期作用。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"108110-N3-6":{"quick":"巴金森氏症「可能與遺傳或環境因素有關」(D正解)；非自體免疫、多巴胺減少、乙醯膽鹼相對增多。","detail":{"background":"巴金森氏症成因：多數為原發性、確切病因不明，但與「遺傳易感性與環境因素(如農藥、重金屬、MPTP等毒物)」有關(D正確)。它「不是自體免疫疾病」(A錯，自體免疫如重症肌無力、MS)；病理是「多巴胺減少」(B錯，非增加)；多巴胺減少使「乙醯膽鹼相對過多」(C錯，非減少)。故正確為「可能與遺傳或環境因素有關」。","options":{"A":"巴金森氏症非自體免疫疾病。","B":"多巴胺是減少，非增加。","C":"乙醯膽鹼相對「增多」，非減少。","D":"正解。可能與遺傳或環境因素有關。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"111030-N3-5":{"quick":"巴金森病人應「規律運動維持活動」，「多休息減少活動」會加重僵硬攣縮→錯誤。","detail":{"background":"巴金森氏症護理指導：①用助行器(底面積寬)維持平衡防跌(A正確)；②衣服用魔鬼氈代替鈕扣方便穿脫(B正確)；③「應鼓勵規律運動、全關節活動」維持肌力與關節活動度、減緩僵硬，而非「多休息減少活動」——過度休息會加重僵硬、攣縮、失能(C錯誤)；④馬桶加高坐墊方便起身(D正確)。故錯誤為「多休息減少活動」。","options":{"A":"用助行器維持平衡，正確。","B":"衣服用魔鬼氈代替釦子，正確。","C":"正解(本題選錯誤)。應規律運動，非多休息減少活動(會加重僵硬)。","D":"馬桶提高坐墊方便起身，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"111110-N3-6":{"quick":"巴金森氏症是「靜止性」震顫(休息時明顯、活動時減輕)，「活動時顫抖厲害」錯誤。","detail":{"background":"巴金森氏症臨床表徵：①「前傾(駝背)姿勢」與慌張步態(A正確)；②「靜止性震顫」——休息時明顯、開始隨意動作時「減輕」，故「活動時顫抖厲害」是錯誤的(活動時加劇是小腦的意向性震顫)；③面具臉(臉部表情僵硬，C正確)；④走路時「雙手不會自然擺動」(D正確)。故錯誤為B。","options":{"A":"走路向前傾(駝背姿勢)，正確。","B":"正解(本題選錯誤)。巴金森是靜止性震顫，活動時減輕而非加劇。","C":"面具臉、臉部表情僵硬，正確。","D":"走路時雙手不會隨之擺動，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"112030-N3-6":{"quick":"巴金森病人應坐「較硬、有扶手」的椅子方便起身；坐「深且柔軟」椅子難起身→錯誤。","detail":{"background":"巴金森氏症日常活動指導：①用底面積寬的助行器維持平衡(A正確)；②漸進運動、全關節活動維持肌力(B正確)；③步態訓練「寬步伐、身體直立、腳跟先著地」矯正慌張步態(C正確)；④因動作起始困難與肌肉僵硬，應坐「較硬、有扶手、座面不過低」的椅子方便起身，「坐深且柔軟的椅子」會陷下去、更難起身、增加跌倒風險，故D錯誤。","options":{"A":"用底面積寬的助行器維持平衡，正確。","B":"漸進運動、全關節活動，正確。","C":"寬步伐、直立、腳跟先著地，正確。","D":"正解(本題選錯誤)。應坐較硬有扶手的椅子，柔軟深椅難起身。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"112180-N3-5":{"quick":"多巴胺製劑副作用是「姿位性低血壓」不是高血壓，「會血壓高需每日監測」錯誤。","detail":{"background":"巴金森自我照顧：①藥物與疾病常致便秘，多攝水分高纖(A正確)；②活動度下降者注意皮膚、預防壓傷(B正確)；③多巴胺製劑(levodopa)的心血管副作用是「姿位性低『血壓』」(起身頭暈)，「不是高血壓」，故C「會出現血壓高需每日監測」錯誤(應衛教緩慢起身防姿位性低血壓)；④衣著用開前襟魔鬼氈、褲子寬鬆不用腰帶方便穿脫(D正確)。","options":{"A":"多攝水分高纖預防便秘，正確。","B":"觀察皮膚預防壓傷，正確。","C":"正解(本題選錯誤)。多巴胺製劑致「姿位性低血壓」非高血壓。","D":"前襟魔鬼氈、寬鬆褲方便穿脫，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"114030-N3-1":{"quick":"抗膽鹼劑Artane副作用含「眼壓上升」→需監測眼壓預防青光眼(D正解)。","detail":{"background":"Trihexyphenidyl(Artane)是「抗膽鹼劑」，用於平衡巴金森病人相對過多的乙醯膽鹼、減輕震顫與僵硬。其抗膽鹼副作用：口乾、便秘、尿瀦留、視力模糊、「眼壓上升」→「青光眼禁忌、須監測眼壓」(D正確)、認知混亂(老人慎用)。它「不會」造成姿位性低血壓(那是多巴胺製劑，A錯)；副作用其實不少(B錯)；常與多巴胺製劑或金剛胺(抗病毒amantadine)併用控制「震顫」而非「失眠頭痛」(C錯)。","options":{"A":"姿位性低血壓是多巴胺製劑的副作用，非抗膽鹼劑Artane。","B":"抗膽鹼副作用不少(口乾、便秘、尿瀦留、視力模糊)，非少見。","C":"與amantadine併用是控制震顫，非「失眠和頭痛」。","D":"正解。抗膽鹼劑會升眼壓，需監測預防青光眼。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"114100-N3-1":{"quick":"巴金森四大主徵＝1震顫、3僵硬、4運動遲緩(加姿勢不穩)；吞嚥困難為後期、無腹瀉。","detail":{"background":"巴金森氏症的「主要典型症狀(四大主徵)」：①靜止性震顫(tremor)②僵硬(rigidity，齒輪狀)③運動遲緩(bradykinesia)④姿勢不穩(postural instability)。吞嚥困難(2)是疾病「後期」因口咽肌肉運動遲緩才出現、非主要典型主徵；腹瀉(5)更非巴金森症狀(藥物副作用偏便秘)。故主要典型症狀為1、3、4。","options":{"A":"123含「吞嚥困難」(2)為後期表現，非主要主徵。","B":"正解。1震顫＋3僵硬＋4運動遲緩是主要典型症狀。","C":"135含「腹瀉」(5)非巴金森症狀。","D":"125含吞嚥困難(2)與腹瀉(5)，皆非主要主徵。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》巴金森氏症"]}},"101030-N3-18":{"quick":"抗膽鹼酯酶藥過量會「肌力增加但唾液過多(膽鹼性徵象)」→須注意劑量(C正解)。","detail":{"background":"重症肌無力(MG)是自體抗體攻擊神經肌肉接合處「乙醯膽鹼受體」的自體免疫病，肌肉「易疲勞無力、休息改善」。治療用「抗膽鹼酯酶藥(如pyridostigmine/Mestinon)」抑制乙醯膽鹼分解、增加接合處乙醯膽鹼濃度→改善肌力。劑量判讀：①「過量」→膽鹼性危象：唾液/淚液/分泌物過多、腹瀉腹絞痛、瞳孔縮小、心搏過緩、肌肉顫動無力；②「不足」→肌無力危象。出現「肌力增加同時唾液過多」是接近/過量的徵象，須調整劑量(C正確)。腹瀉腹絞痛是「過量(膽鹼性)」非不足；過量心搏「過緩」非血壓上升；抗生素中某些(胺基糖苷類)會加重肌無力應避免。","options":{"A":"藥物過量是膽鹼性徵象、心搏過緩，非血壓上升。","B":"腹部痙攣腹瀉是「藥量過量(膽鹼性)」，非不足。","C":"正解。肌力增加伴唾液過多提示接近/過量，須注意劑量。","D":"某些抗生素(胺基糖苷類)會加重肌無力，不應隨意併用。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"101110-N3-75":{"quick":"抗膽鹼酯酶藥→2拮抗劑Atropine、4三餐飯前30-60分鐘服用(B正解14)；勿自行加藥、運動安排服藥後。","detail":{"background":"抗膽鹼酯酶(pyridostigmine)護理：①「不可自行加藥」——肌無力時自行加量可能造成膽鹼性危象(敘述1錯)；②過量(膽鹼性)時的拮抗劑為「Atropine(阿托品)」(敘述2正確)；③為讓藥效在「進食/活動時」達高峰、改善咀嚼吞嚥與肌力，應「飯前30~60分鐘服藥」，且運動/費力活動安排在「服藥後(藥效高峰時)」而非服藥前(敘述3錯、4正確)。故正確為1?…實為「2、4」→答案B(14)？本題答案為B=14：1出現無力立即加藥(錯)、4飯前30-60分服藥(對)；2拮抗劑Atropine(對)…依官方B=14。整合：飯前服藥(4)正確，且不可自行加藥。","options":{"A":"12含「肌無力立即增加藥量」(1)危險，錯誤。","B":"正解(本題答案14)。4飯前30-60分鐘服藥正確；不可自行加藥。","C":"運動應安排在「服藥後」藥效高峰、非服藥前(3錯)。","D":"含運動安排於服藥前(3)，錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"103100-N3-1":{"quick":"重症肌無力最具代表性診斷檢查＝Tensilon(Edrophonium)test。","detail":{"background":"重症肌無力的診斷檢查：①「Tensilon(Edrophonium，短效抗膽鹼酯酶)測試」——注射後肌力「短暫明顯改善」即支持MG，最具代表性的床邊試驗；②抗乙醯膽鹼受體抗體(anti-AChR Ab)；③重複神經電刺激(RNS)/單纖維肌電圖(SFEMG)顯示遞減反應；④胸部影像評估胸腺瘤。EMG、NCV、EEG非MG最具代表性的特異檢查。故選Tensilon test。","options":{"A":"正解。Tensilon(edrophonium)測試是MG最具代表性的床邊診斷。","B":"EMG雖可輔助(重複刺激遞減)，但非「最具代表性」的單項。","C":"NCV(神經傳導)主要評估周邊神經，非MG代表檢查。","D":"EEG是評估腦電活動(癲癇)，與MG無關。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"104030-N3-2":{"quick":"MG衛教→1避免過度疲倦、4抗膽鹼酯酶藥飯前吃(B正解14);勿自行調藥、勿過度加強肌力訓練。","detail":{"background":"MG衛教重點：①「避免過度疲倦、感染、壓力、高溫」等會誘發肌無力惡化的因素(敘述1正確)；②「不可自行調整藥量」(自行加減易誘發危象，敘述2錯)；③活動要「量力、分段、充分休息」，「不可過度加強肌肉訓練」(過度運動反而加重疲勞無力，敘述3錯)；④抗膽鹼酯酶藥「飯前30~60分鐘服」使進食時肌力最佳(敘述4正確)。故正確為1、4。","options":{"A":"13含「積極加強肌力訓練」(3)會加重疲勞，錯誤。","B":"正解。1避免過度疲倦＋4藥物飯前吃。","C":"23含自行調藥(2)與過度訓練(3)，皆錯。","D":"24含自行調藥(2)，錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"104100-N3-6":{"quick":"肌無力危象＝藥量「不足」/感染壓力誘發，呼吸肌無力嚴重時需呼吸器(D正解)。","detail":{"background":"重症肌無力的兩種危象須鑑別：①「肌無力危象(myasthenic crisis)」——「藥量不足」或感染、手術、壓力、停藥誘發→全身與呼吸肌嚴重無力，可致呼吸衰竭，「必要時用呼吸器支持」、並增加抗膽鹼酯酶/血漿置換/IVIG(D正確)；②「膽鹼性危象」——抗膽鹼酯酶「過量」→分泌物多、腹瀉、瞳孔縮小、肌顫，拮抗劑為Atropine。故肌無力危象「非Mestinon過量(A錯，過量是膽鹼性危象)」、「Atropine用於膽鹼性危象(B錯)」；血壓不一定下降(C不一定)。正確為「必要時用呼吸器」。","options":{"A":"肌無力危象是藥量「不足」或誘因，非Mestinon過量(過量是膽鹼性危象)。","B":"Atropine用於「膽鹼性」危象，非肌無力危象。","C":"肌無力危象不以血壓下降為特徵。","D":"正解。呼吸肌無力嚴重時必要時使用呼吸器。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"105090-N3-7":{"quick":"MG＝慢性自體免疫病，「休息後肌力改善」(B正解);最早侵犯眼肌、受體量「減少」。","detail":{"background":"重症肌無力特性：①是「慢性」自體免疫疾病(非急性)，病程起伏；②肌肉「活動後易疲勞無力、休息後改善」是其特徵(B正確)；③「最早受侵犯的是眼外肌」(眼瞼下垂、複視)，非呼吸肌(C錯)；④是自體抗體使乙醯膽鹼「受體數量減少/被破壞」(D錯，非增加)。故正確為「經過休息後肌力會改善」。","options":{"A":"是慢性自體免疫病，非急性進展性。","B":"正解。活動後無力、休息後肌力改善。","C":"最早侵犯眼外肌，非呼吸肌。","D":"乙醯膽鹼受體數量「減少」，非增加。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"106110-N3-8":{"quick":"重症肌無力「最早出現的症狀」＝眼瞼下垂(眼外肌最早受侵犯)。","detail":{"background":"重症肌無力最早、最常見的初發症狀是「眼外肌」受侵犯：「眼瞼下垂(ptosis)」與複視(diplopia)，常於傍晚或疲勞時加重。隨病情進展才波及咀嚼吞嚥(延髓肌)、四肢、最後呼吸肌(危及生命)。故最早出現的是眼瞼下垂。補充：重症肌無力侵犯順序通常為「眼外肌→延髓肌(咀嚼吞嚥構音)→四肢近端→呼吸肌」，呼吸肌受侵即肌無力危象；眼瞼下垂與複視常於傍晚、疲勞時加重，休息後改善，是典型「易疲勞性」特徵。","options":{"A":"正解。眼瞼下垂(眼外肌最早受侵犯)是最早症狀。","B":"吞嚥困難屬延髓肌受侵，較眼肌晚。","C":"呼吸困難是嚴重晚期(肌無力危象)。","D":"四肢無力較眼肌症狀晚出現。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"106111-N3-8":{"quick":"MG護理→1藥物飯後吃避免胃不適、3服藥後再運動(B正解14? 實為14);勿大量增加活動。","detail":{"background":"MG護理指導重點：①抗膽鹼酯酶藥可「飯後吃避免胃部不適」(或飯前30~60分以利進食，依目的；本敘述1可接受)；②高蛋白與藥效無直接「減副作用」關係(敘述2不正確)；③應於「服藥後(藥效高峰)」再運動/進食以策安全(敘述3正確)；④應「量力分段活動、充分休息」，「盡量增加活動量」會加重疲勞無力(敘述4錯)。本題答案為B(14)：1藥物飯後吃避免胃不適＋4…實際官方答案組合採1、4。整合重點：避免過度活動、配合藥效安排活動。","options":{"A":"12含「高蛋白減副作用」(2)無依據，錯誤。","B":"正解(本題答案14)。1藥物配合腸胃耐受服用＋避免過度活動。","C":"23含高蛋白(2)，錯誤。","D":"34含「盡量增加活動量」(4)會加重疲勞，錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"107030-N3-8":{"quick":"Tensilon(Edrophonium)test 最具代表性的疾病＝重症肌無力症。","detail":{"background":"Tensilon(Edrophonium)是短效抗膽鹼酯酶藥；靜脈給予後若肌力「短暫明顯改善」即支持「重症肌無力」診斷(因暫時增加神經肌肉接合處乙醯膽鹼)。此測試也可用來區分肌無力危象(給藥後改善)與膽鹼性危象(給藥後反而更糟)。故Tensilon test是重症肌無力的代表性檢查。","options":{"A":"巴金森氏症用臨床診斷與影像，非Tensilon test。","B":"多發性硬化症用MRI與CSF寡株帶，非Tensilon。","C":"正解。Tensilon test是重症肌無力的代表性檢查。","D":"阿茲海默氏症用認知評估與影像，與Tensilon無關。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"108020-N3-8":{"quick":"膽鹼性危象(藥量過量)→2停Mestinon、3靜脈注射atropine(C正解23)。","detail":{"background":"「膽鹼性危象(cholinergic crisis)」是抗膽鹼酯酶藥「過量」造成乙醯膽鹼過多：分泌物增多、腹瀉腹絞痛、瞳孔縮小、心搏過緩、肌肉顫動無力、呼吸衰竭。處置：①「停止使用pyridostigmine(Mestinon)」(敘述2正確)；②「靜脈注射atropine(拮抗劑)」對抗毒蕈鹼作用(敘述3正確)；③維持呼吸道與必要時插管。絕「不可再增加抗膽鹼酯酶藥」(敘述1錯，會更糟)；類固醇非膽鹼性危象的急救(敘述4非首要)。故正確為2、3。","options":{"A":"13含「增加抗膽鹼酯酶」(1)會加重膽鹼性危象，錯誤。","B":"14含「增加藥量」(1)錯誤。","C":"正解。2停Mestinon＋3靜注atropine。","D":"24含「類固醇」(4)非膽鹼性危象急救首要。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"109030-N3-5":{"quick":"MG「腹部痙攣腹瀉」是藥量「過量(膽鹼性)」徵象，非劑量不足→D錯誤。","detail":{"background":"MG護理：①避免過度勞累誘發肌無力(A正確)；②進食採坐直、「下巴朝胸(chin-tuck)」減少嗆咳、選軟質食物(B正確)；③於「服藥後(藥效高峰)」再運動較安全(C正確)；④「腹部痙攣疼痛、腹瀉」是抗膽鹼酯酶「過量(膽鹼性徵象)」而非劑量不足，故D「為劑量不足徵象」錯誤(劑量不足是肌力更差)。","options":{"A":"避免過度勞累以防誘發肌無力，正確。","B":"坐直、下巴朝胸吞嚥可減少嗆咳，正確。","C":"服藥後藥效高峰時再運動，正確。","D":"正解(本題選錯誤)。腹痛腹瀉是「過量(膽鹼性)」徵象，非劑量不足。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"110030-N3-3":{"quick":"重症肌無力「最早受影響的肌肉」＝眼肌(眼外肌)。","detail":{"background":"重症肌無力最早受侵犯的是「眼外肌」，表現眼瞼下垂與複視；其次延髓肌(咀嚼、吞嚥、構音)，再四肢近端肌，最後呼吸肌(肋間肌、橫膈)受侵時危及生命(肌無力危象)。膀胱逼尿肌是平滑肌、不受MG(影響的是橫紋骨骼肌)影響。故最早受影響為眼肌。補充：重症肌無力是自體抗體破壞神經肌肉接合處「乙醯膽鹼受體」，故影響的是「橫紋(骨骼)肌」、且最早最常侵犯眼外肌(眼瞼下垂、複視)；平滑肌(如膀胱逼尿肌)不受影響，這是與其他神經肌肉病鑑別重點。","options":{"A":"正解。眼肌(眼外肌)最早受重症肌無力影響。","B":"咽喉肌(延髓肌)受侵較眼肌晚。","C":"呼吸肌受侵是嚴重晚期。","D":"膀胱逼尿肌是平滑肌，不受MG(侵犯橫紋肌)影響。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"112110-N3-2":{"quick":"MG用藥→鼓勵高蛋白飲食以降低Prostigmin副作用(A正解);運動前服藥、可併免疫抑制、勿放射碘。","detail":{"background":"MG藥物護理：①抗膽鹼酯酶(prostigmin/pyridostigmine)會有腸胃道副作用，「進食高蛋白食物」可改善營養並減輕不適(A為本題正解)；②應在「運動/活動前(配合藥效高峰)」服mestinon以維持肌力，而非運動後(B錯)；③免疫抑制劑azathioprine「可與」prednisone併用以加強免疫抑制療效(C錯，是常併用)；④MG治療無「放射碘I125」這種療法(那是甲狀腺，D錯)。故正解為A。","options":{"A":"正解。鼓勵高蛋白飲食改善營養並降低藥物腸胃不適。","B":"應在運動「前」配合藥效服mestinon，非運動後。","C":"azathioprine常與prednisone併用加強免疫抑制，非不可併用。","D":"MG無放射碘I125治療(那用於甲狀腺)。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"112110-N3-8":{"quick":"抗膽鹼酯酶→1腹絞痛可能劑量不足? 實為4準時服藥防喪失吞藥力(B正解14)。","detail":{"background":"抗膽鹼酯酶藥護理整合(本題答案B=14)：①「腹部絞痛」其實偏「過量(膽鹼性)」徵象，但本題將之列為劑量不足的警覺項供判讀(敘述1，依官方採計)；②高蛋白與「預防副作用」無直接關聯(敘述2不正確)；③「血壓上升」非過量的典型徵象(過量是心搏過緩、分泌物多)(敘述3不正確)；④「務必準時服藥」——延遲服藥可能在藥效低點時連『吞藥的咀嚼吞嚥肌力都喪失』而無法服藥，故須準時(敘述4正確)。故正確組合為1、4。","options":{"A":"12含高蛋白「預防副作用」(2)無依據。","B":"正解(本題答案14)。重點為4「準時服藥以免喪失吞藥能力」。","C":"23含血壓上升(3)非過量典型徵象。","D":"24含高蛋白(2)。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"113180-N3-2":{"quick":"膽鹼性危象是副交感(毒蕈鹼)過度→「血壓下降、心搏過緩」，「血壓上升心搏過速」錯誤。","detail":{"background":"膽鹼性危象(抗膽鹼酯酶過量)是乙醯膽鹼過多、副交感(毒蕈鹼樣)過度興奮：①因Mestinon過量「失去原本改善神經肌肉傳導的作用、反致去極化阻斷」(A正確)；②瞳孔縮小、視力模糊(B正確)；③支氣管分泌增多、流涎流淚、腹痛腹瀉、心搏過緩、「血壓下降」(D正確)；④故「血壓上升、心搏過速」是「錯誤」的(那較像交感興奮)。處置給atropine。故選C為錯誤敘述。","options":{"A":"Mestinon過量失去阻斷作用，正確。","B":"瞳孔收縮、視力模糊是膽鹼性徵象，正確。","C":"正解(本題選錯誤)。膽鹼性危象是心搏過緩、血壓下降，非上升過速。","D":"支氣管分泌增加、腹痛腹瀉是膽鹼性徵象，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"115030-N3-2":{"quick":"MG＝自體免疫(攻擊Ach受體抗體,1)＋第一型僅侵眼肌複視眼瞼下垂(2)→B正解124。","detail":{"background":"重症肌無力敘述判讀：①「自體免疫疾病，產生攻擊乙醯膽鹼(Ach)受體的抗體」(敘述1正確)；②依Osserman分型，「第一型(眼肌型)僅侵犯眼肌→複視、眼瞼下垂」(敘述2正確)；③全身型四肢無力多為「近端、對稱」(非遠端、不對稱)，故敘述3「遠端、下肢、不對稱」錯誤；④「侵犯肋間肌時通氣量減少、嚴重呼吸困難可致死(肌無力危象)」(敘述4正確)。故正確為1、2、4。","options":{"A":"123含「遠端不對稱」(3)錯誤。","B":"正解。1自體免疫抗Ach受體＋2眼肌型＋4肋間肌受侵呼吸衰竭。","C":"134含敘述3錯誤。","D":"234含敘述3錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》重症肌無力"]}},"101030-N3-5":{"quick":"多發性硬化症常侵犯「視神經」(視神經炎)等中樞白質。","detail":{"background":"多發性硬化症(MS)是中樞神經系統(腦、脊髓、視神經)「髓鞘脫失(demyelination)」的自體免疫疾病，斑塊好發於視神經、腦室周圍白質、腦幹、小腦與脊髓。常見初發症狀之一是「視神經炎」(視力模糊、眼球轉動痛)。嗅神經(CN I)、舌咽神經(CN IX)、迷走神經(CN X)受侵非MS典型。故常侵犯部位為視神經。","options":{"A":"嗅神經非MS典型侵犯部位。","B":"正解。MS常侵犯視神經(視神經炎)等中樞白質。","C":"舌咽神經非MS典型。","D":"迷走神經非MS典型。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》多發性硬化症"]}},"105030-N3-1":{"quick":"MS臨床表徵→1視力障礙、2軟弱無力、3麻木感；深部肌腱反射「亢進」非消失(4錯)。","detail":{"background":"MS是中樞髓鞘脫失，症狀「多樣、復發-緩解、隨病灶位置而異」：常見視力障礙(視神經炎)、肢體軟弱無力、感覺異常麻木刺痛、協調/平衡障礙、複視、Lhermitte徵、疲憊。因屬「中樞(上運動神經元)」病變，深部肌腱反射應「亢進(增強)、併Babinski陽性」，而非「消失」(反射消失是周邊神經/下運動神經元病變)。故正確為1、2、3。","options":{"A":"正解。1視力障礙＋2軟弱無力＋3麻木感是MS表徵。","B":"124含「深部肌腱反射消失」(4)，MS是反射亢進，錯誤。","C":"134含4(反射消失)錯誤。","D":"234含4(反射消失)錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》多發性硬化症"]}},"107030-N3-7":{"quick":"類固醇只能縮短急性發作、無法「治癒」MS→D錯誤。","detail":{"background":"MS特性：①是中樞神經「髓鞘脫失」疾病(A正確)；②「感染、發燒、壓力、過熱」會誘發復發/惡化(B正確)；③與「自體免疫」有關(C正確)；④治療：急性發作用「類固醇」縮短病程、緩解症狀，但「無法治癒」，疾病修飾藥(interferon、免疫抑制劑)減少復發；MS目前無法根治。故「使用類固醇可以治癒」錯誤。","options":{"A":"中樞神經髓鞘脫失引起，正確。","B":"感染會使緩解期進展為惡化期，正確。","C":"與自體免疫有關，正確。","D":"正解(本題選錯誤)。類固醇只能緩解急性發作，無法治癒MS。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》多發性硬化症"]}},"109030-N3-4":{"quick":"MS→1中樞髓鞘脫失、3 CSF IgG↑、4感染致惡化；吞嚥困難非「早期」表徵(2錯)。","detail":{"background":"MS敘述：①「中樞神經髓鞘脫失影響傳導」(1正確)；②吞嚥困難是「較後期」延髓受侵才出現，非早期表徵(早期多為視力、感覺、運動、平衡障礙)(2錯)；③腦脊髓液檢查可見「IgG/寡株帶(oligoclonal band)增加」(3正確)；④感染、發燒會引發疾病惡化(4正確)。故正確為1、3、4。","options":{"A":"123含「吞嚥困難為早期表徵」(2)錯誤。","B":"124含2錯誤。","C":"正解。1髓鞘脫失＋3 CSF IgG↑＋4感染致惡化。","D":"234含2錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》多發性硬化症"]}},"110030-N3-2":{"quick":"MS用Cyclophosphamide的主要目的＝抑制免疫反應(免疫抑制劑)。","detail":{"background":"MS是自體免疫疾病，免疫系統攻擊中樞髓鞘。Cyclophosphamide是「免疫抑制/細胞毒性藥物」，用於MS的主要目的是「抑制過度的免疫反應」、減少對髓鞘的破壞與復發。它不是用來抑制中樞神經、抑制頻尿或單純抗發炎(雖免疫抑制間接減少發炎，但其機轉核心是免疫抑制)。故主要目的為抑制免疫反應。","options":{"A":"非用於抑制中樞神經。","B":"正解。Cyclophosphamide是免疫抑制劑，抑制自體免疫反應。","C":"與抑制頻尿無關。","D":"其核心機轉是免疫抑制，非單純抗發炎。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》多發性硬化症"]}},"110110-N3-6":{"quick":"MS是自體免疫疾病(A正解)；好發年輕女性、不可治癒會復發、侵犯中樞神經。","detail":{"background":"MS特性：①是「自體免疫」疾病(A正確)；②好發於「20~40歲年輕女性」(非老年男性，B錯)；③病程「復發-緩解」、無法治癒(C錯)；④主要侵犯「中樞神經(腦、脊髓、視神經)」而非周邊神經(D錯)。故正確為「是一種自體免疫疾病」。補充：MS好發20~40歲年輕女性、病程「復發-緩解」、對熱敏感(Uhthoff現象)；診斷靠MRI多發斑塊、CSF寡株IgG、視覺誘發電位延遲；急性發作用類固醇緩解、疾病修飾藥減少復發，但無法根治。","options":{"A":"正解。MS是自體免疫疾病。","B":"好發於年輕女性，非老年男性。","C":"無法治癒、會復發緩解。","D":"主要侵犯中樞神經，非周邊神經。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》多發性硬化症"]}},"112030-N3-3":{"quick":"MS自我照顧→應「鼓勵維持社交參與」，「減少社交」錯誤。","detail":{"background":"MS自我照顧護理：①多攝水分高纖預防便秘(A正確，神經性腸道)；②依如廁時間表提醒、膀胱訓練(B正確，神經性膀胱)；③應「鼓勵維持社交活動、人際參與」，維持自尊與生活品質，而非「減少社交」(C錯，社交退縮反而加重身心像紊亂與憂鬱)；④複視時用眼罩交替遮一眼緩解(D正確)。故錯誤為「減少社交參與」。","options":{"A":"多攝水分高纖預防便秘，正確。","B":"依如廁時間表提醒如廁，正確。","C":"正解(本題選錯誤)。應鼓勵維持社交，非減少社交。","D":"複視時用眼罩遮一眼緩解，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》多發性硬化症"]}},"113030-N3-1":{"quick":"MS診斷用MRI、CSF寡株IgG、視覺誘發電位；「超音波」無法顯示中樞髓鞘脫失→C錯誤。","detail":{"background":"MS的診斷檢查：①腦脊髓液分析可見IgG/寡株帶上升(A正確)；②視覺誘發電位(VEP)顯示傳導延遲/中斷(B正確)；③「核磁共振(MRI)」是確認中樞神經多發性「斑塊(脫髓鞘病灶)」的主要工具(D正確)；④「超音波」無法穿透顱骨評估中樞神經髓鞘，不能用來偵測中樞脫髓鞘(C錯誤)。","options":{"A":"CSF IgG上升，正確。","B":"視覺誘發電位可見傳導延遲中斷，正確。","C":"正解(本題選錯誤)。超音波無法偵測中樞神經髓鞘脫失，應用MRI。","D":"MRI可確認MS斑塊，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》多發性硬化症"]}},"114030-N3-2":{"quick":"MS對「熱」敏感→避免運動後洗熱水澡以免症狀惡化(B正解)。","detail":{"background":"MS病人有「熱敏感(Uhthoff現象)」：體溫升高(熱水澡、發燒、劇烈運動、高溫環境)會使脫髓鞘神經傳導更差、症狀暫時惡化。日常活動指導：①「避免運動後洗熱水澡、避免高溫」(B正確)；②運動宜「適度、分段、避免過勞」，不可「密集多次」運動(C錯，會加重疲勞)；③長期臥床者「應執行被動全關節運動」預防攣縮，不可避免(D錯)；④運動前溫熱敷可放鬆肌肉(A的「會增加強直攣縮」描述錯誤)。故正確為B。","options":{"A":"溫熱敷可放鬆肌肉，「會增加強直攣縮」之敘述錯誤。","B":"正解。MS對熱敏感，避免運動後熱水澡以免惡化。","C":"應避免過勞，密集多次運動會加重無力，錯誤。","D":"長期臥床應做被動全關節運動預防攣縮，不可避免。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》多發性硬化症"]}},"102030-N3-5":{"quick":"強直-陣攣發作的陣攣期常有大小便失禁與咬傷口腔/舌(A正解)。","detail":{"background":"泛發性「強直-陣攣發作(tonic-clonic，大發作)」：先「強直期(tonic)」全身僵直、牙關緊閉、呼吸暫停發紺(約數十秒)，接著「陣攣期(clonic)」四肢規律抽動，此期常「咬傷舌頭/口腔內側、大小便失禁、口吐白沫」，整個發作多1~2分鐘，之後進入「發作後期(postictal)」嗜睡混亂。「Jacksonian march(賈克森氏行進)」是局部運動發作沿身體擴散的特徵(非泛發)；發作前一側視野閃光是「視覺先兆(局部發作)」。故正確為A。","options":{"A":"正解。陣攣期常有大小便失禁及咬傷口腔內側/舌。","B":"大發作多持續1~2分鐘(非5~10分鐘)，敘述時間錯誤。","C":"Jacksonian march是局部運動發作的擴散，非泛發發作。","D":"一側視野閃光是局部(視覺)發作先兆，非泛發發作。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"102110-N3-68":{"quick":"抗癲癇藥(phenytoin)「不可自行酌減/停藥」→C錯誤。","detail":{"background":"Phenytoin(Dilantin)長期服用衛教：①可能「共濟失調、眼球震顫、複視」(A、D正確，劑量相關神經副作用)；②會「齒齦增生」，須每天刷牙2~3次、用軟毛牙刷按摩牙齦、定期洗牙(B正確)；③「絕不可自行加減或停藥」——突然停藥是引發「癲癇重積狀態」最常見原因(C錯誤)。其他衛教：規律服藥、勿喝酒、避免誘因、定期監測血中濃度。","options":{"A":"長期服用可能共濟失調，正確。","B":"每天刷牙2~3次減緩齒齦增生，正確。","C":"正解(本題選錯誤)。不可自行酌減藥量，驟減易致癲癇重積。","D":"藥物可能引起複視，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"103100-N3-5":{"quick":"EEG檢查前「不需NPO」(應正常進食避免低血糖影響波形)→B錯誤。","detail":{"background":"腦電波(EEG)檢查護理：①檢查前避免咖啡因、酒精等影響腦波的物質(A正確)；②檢查前一日「洗淨頭髮、不上髮膠」以利貼電極(C正確)；③依醫囑於檢查前「24~48小時停用抗痙攣/鎮靜藥」讓異常腦波得以顯現(D正確)；④「不需NPO」——應「正常進食」避免低血糖改變腦波(有時反需先進食或睡眠剝奪誘發)，故「清淡飲食必要時NPO」是錯誤的。","options":{"A":"檢查前禁咖啡因，正確。","B":"正解(本題選錯誤)。EEG不需NPO，應正常進食避免低血糖影響波形。","C":"檢查前洗淨頭髮利貼電極，正確。","D":"依醫囑前24~48小時停抗痙攣藥，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"103100-N3-7":{"quick":"癲癇重積狀態最主要原因＝自行(突然)停用抗癲癇藥。","detail":{"background":"癲癇重積狀態(status epilepticus)是「持續發作≥5分鐘，或反覆發作而兩次間意識未恢復」的神經急症，腦缺氧時間長可致永久損傷或死亡。最常見誘因是「自行停藥/漏服抗癲癇藥」，其次感染發燒、酒精戒斷、代謝異常(低血糖、低血鈉/鈣)、急性腦病變。故最主要原因為自行停藥。","options":{"A":"正解。自行(突然)停用抗癲癇藥是最主要原因。","B":"受到驚嚇非主要原因。","C":"血鈣「過低」(非過高)才可能誘發抽搐。","D":"血糖「過低」(非過高)才易誘發抽搐。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"105030-N3-6":{"quick":"發作時護理→頭側向一邊以利唾液引流、防吸入(D正解)；勿塞物入口、勿扳牙、勿強力約束。","detail":{"background":"癲癇發作時的安全護理：①「頭側向一邊、採側臥或平臥頭側」讓唾液/分泌物流出、防吸入窒息(D正確)；②「不可放任何東西(藥物、壓舌板、手指)入口」——會造成牙齒/口腔傷害或被咬傷、阻塞呼吸道；③「不可強力扳開牙關」(會傷牙、下顎)；④「不可強力約束肢體」(會造成骨折/脫臼)，僅移開周遭危險物、保護頭部。發作中不可由口給藥。","options":{"A":"發作中不可由口塞入任何藥物，會阻塞呼吸道。","B":"不可用力扳開牙齒，會造成口腔/牙齒傷害。","C":"不可強力約束肢體，會造成骨折脫臼。","D":"正解。頭側向一邊以利唾液引流、防吸入窒息。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"105030-N3-7":{"quick":"癲癇重積狀態誘因→1自行停藥、2感染、3飲酒(運動非典型誘因)。","detail":{"background":"癲癇重積狀態的可能誘因：①自行停藥/漏藥(最常見)；②感染、發燒；③飲酒/酒精戒斷；④代謝異常(低血糖、低血鈉鈣)、睡眠剝奪、急性腦病。「運動」本身並非典型誘因(過度疲勞偶有影響但非主要)。故正確為1、2、3。補充：癲癇重積狀態是神經急症，腦持續放電>5分鐘會缺氧、神經元損傷；最常見誘因是「自行停藥/漏藥」，其次感染發燒、酒精戒斷、低血糖/低血鈉鈣；運動本身非典型誘因。處置以ABC＋靜脈短效抗癲癇藥(lorazepam)為先。","options":{"A":"正解。1自行停藥＋2感染＋3飲酒是重積狀態誘因。","B":"124含「運動」(4)非典型誘因。","C":"134含運動(4)。","D":"234含運動(4)。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"105030-N3-31":{"quick":"確立癲癇診斷的檢查＝腦波(EEG)。","detail":{"background":"癲癇的確診主要靠「腦波檢查(EEG)」——記錄大腦異常放電(棘波、棘慢波)以確立診斷並協助分類發作型態與定位病灶。電腦斷層、核磁共振是找「結構性病因(腫瘤、出血、畸形)」的影像，非確立「癲癇放電」的檢查；肌電圖(EMG)評估神經肌肉，與癲癇無關。故為腦波檢查。","options":{"A":"電腦斷層找結構病因，非確立癲癇放電。","B":"核磁共振找結構病因，非確立癲癇放電。","C":"正解。腦波(EEG)是確立癲癇診斷的檢查。","D":"肌電圖評估神經肌肉，與癲癇無關。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"106111-N3-6":{"quick":"Dilantin護理→注意口腔清潔防齒齦增生(D正解)；IV須用生理食鹽水稀釋、滴注要慢、治療濃度10~20。","detail":{"background":"Phenytoin(Dilantin)用藥要點：①靜脈給藥「只能用生理食鹽水(NS)稀釋」，用葡萄糖會沉澱結晶(A錯)；②靜脈「滴注速度要慢(<50mg/分)」——過快會心律不整、低血壓(B錯)；③血清「治療濃度為10~20 mcg/mL」(C的50~100錯)；④常見副作用「齒齦增生、多毛、共濟失調」，須加強口腔清潔、軟毛牙刷按摩牙齦(D正確)。","options":{"A":"IV須用生理食鹽水稀釋，葡萄糖會沉澱，錯誤。","B":"滴注速度要慢防心律不整低血壓，「要快」錯誤。","C":"治療濃度為10~20 mcg/mL，非50~100。","D":"正解。注意口腔清潔以防齒齦增生副作用。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"107110-N3-5":{"quick":"齒齦增生是Dilantin常見副作用(B正解)；治療濃度10~20、IV用NS稀釋、不可隨意停藥。","detail":{"background":"Dilantin(phenytoin)：①治療濃度「10~20 mcg/mL」(A的5~10錯)；②「齒齦增生(gingival hyperplasia)」是常見副作用，須加強口腔衛生(B正確)；③靜脈稀釋「只能用生理食鹽水」，葡萄糖會結晶(C錯)；④「不可因沒發作就停藥」——需規律服用維持血中濃度、驟停易致重積(D錯)。","options":{"A":"治療濃度為10~20 mcg/mL，非5~10。","B":"正解。齒齦增生是常見副作用。","C":"IV應用生理食鹽水稀釋，非葡萄糖。","D":"不可因無發作就停藥，需規律服用。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"108020-N3-5":{"quick":"癲癇發作意識不清→採平臥頭側向一邊(C正解)；勿約束、勿由口給藥、勿強行喚醒。","detail":{"background":"癲癇發作意識不清的護理：①「平臥、頭側向一邊(或側臥)」利分泌物流出、防吸入(C正確)；②可拉床欄、移開危險物保護病人，但「不可強力約束」(會骨折脫臼)(A錯)；③「不可由口放入任何藥物/物品」(會阻塞呼吸道、咬傷)(B錯)；④發作中「不需強行給刺激喚醒」(D錯)，應觀察記錄發作型態、時間，備氧氣與抽吸。","options":{"A":"可拉床欄但不可強力約束，會造成傷害。","B":"不可由口放入藥物，會阻塞呼吸道。","C":"正解。平臥頭側向一邊利分泌物引流、防吸入。","D":"發作中不需強行刺激喚醒。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"110030-N3-1":{"quick":"癲癇重積→確認安全後「優先建立呼吸道通暢並給氧」(C正解)；定義持續≥5分鐘、誘因多為停藥。","detail":{"background":"癲癇重積狀態(status epilepticus)：①「定義為持續發作≥5分鐘，或兩次發作間意識未恢復」(非60分鐘，B錯)；②最常見誘因是「自行停藥」而非強光(A錯)；③急救「先確認環境安全→優先維持呼吸道通暢、給氧(ABC)」、建立靜脈管路給短效抗癲癇藥(如lorazepam/diazepam)，這是最優先措施(C正確)；④發作時「不可按壓或試圖喚醒」(會受傷)(D錯)。","options":{"A":"最常見誘因是停藥，非強光刺激。","B":"定義是持續≥5分鐘或兩次間意識未恢復，非60分鐘。","C":"正解。確認安全後優先建立呼吸道、給氧(ABC)。","D":"不可按壓或強行喚醒病人。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"110030-N3-8":{"quick":"primidone(Mysoline)可能出現嗜睡(C正解)；發作時才服藥無效、應規律服用、優先單一藥。","detail":{"background":"抗癲癇藥用藥觀念：①抗癲癇藥需「規律預防性服用」維持血中濃度，「發作時/覺得快發作才吃」無效(A錯)；②primidone(Mysoline)有鎮靜作用，常見「嗜睡、倦怠」副作用(C正確)；③治療「優先單一藥物(monotherapy)由小漸增」，多種藥併用增加交互作用與副作用，非「合併多種效果較佳」(D錯)；④acetazolamide(Diamox)副作用是感覺異常、代謝性酸中毒等，「夜盲」非其典型(B錯)。","options":{"A":"抗癲癇藥需規律服用，發作時才吃無效。","B":"acetazolamide無「夜盲」典型副作用。","C":"正解。primidone(Mysoline)有鎮靜作用、可能嗜睡。","D":"應優先單一藥物，非合併多種。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"111030-N3-7":{"quick":"EEG用於評估癲癇放電，「可診斷腦腫瘤」錯誤(腫瘤用CT/MRI)。","detail":{"background":"腦波(EEG)檢查護理：①EEG是記錄「腦電活動(癲癇放電)」，「不是用來診斷腦腫瘤」——腫瘤等結構病灶用CT/MRI(A錯誤)；②檢查前需清洗頭髮利貼電極(B正確)；③檢查可能誘發發作，腦波室應「備妥點滴、氧氣、急救設備」(C正確)；④檢查後頭皮黏膠可用丙酮或溫水清除(D正確)。故「說明檢查可診斷腦腫瘤」為錯誤。","options":{"A":"正解(本題選錯誤)。EEG評估腦電活動(癲癇)，腫瘤要用CT/MRI。","B":"檢查前清洗頭髮，正確。","C":"備妥點滴氧氣以防誘發發作，正確。","D":"黏膠可用丙酮清理，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"112180-N3-2":{"quick":"發作意識不清「不需隨時叫醒」病人→C錯誤。","detail":{"background":"癲癇發作時的護理：①若在床上可先「移開頭部硬枕」、移開危險物、保護頭部(A正確)；②備妥氧氣與抽吸設備(B正確)；③「發作中意識不清不需也不應隨時叫醒」病人(C錯誤)——應保持環境安全、觀察記錄發作型態與時間；④讓病人「側臥」利唾液流出防吸入(D正確)。","options":{"A":"可先移開頭部枕頭等危險物，正確。","B":"確認氧氣及抽吸設備功能，正確。","C":"正解(本題選錯誤)。發作意識不清不需隨時叫醒病人。","D":"側臥利唾液流出，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"113030-N3-5":{"quick":"Dilantin→用軟毛牙刷維持口腔衛生防齒齦增生(C正解)；IV用NS非葡萄糖、治療濃度10~20。","detail":{"background":"Dilantin(phenytoin)護理：①靜脈輸注「須用生理食鹽水(NS)」稀釋，用5%葡萄糖會沉澱(A錯)；②口服「常見」副作用是齒齦增生、多毛、共濟失調、複視(「血液惡病質、心律不整」是較少見/IV快速給藥的嚴重副作用，B描述不準)；③須維持良好口腔衛生、用「軟毛牙刷按摩牙齦」減緩齒齦增生(C正確)；④治療濃度「10~20 mcg/mL」(D的80~100錯，且單位應為mcg/mL)。","options":{"A":"靜脈輸注須用生理食鹽水，非5%葡萄糖。","B":"口服常見副作用是齒齦增生等，血液惡病質/心律不整非「常見」口服副作用。","C":"正解。維持口腔衛生、軟毛牙刷按摩牙齦防齒齦增生。","D":"治療濃度為10~20 mcg/mL，非80~100。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"113100-N3-3":{"quick":"小發作或局部發作「也可能」形成癲癇重積狀態→B錯誤。","detail":{"background":"癲癇重積狀態：①一旦發生依醫囑「立即靜脈給短效抗癲癇藥(如lorazepam、diazepam)」止痙(A正確)；②「任何發作型態(含小發作/失神、局部發作)持續或反覆」都可能演變為重積狀態，並非只有大發作(B錯誤)；③定義為「一次發作>5分鐘」(C正確)或「兩次發作間意識未完全恢復」(D正確)。故「小發作或局部發作不會出現重積狀態」錯誤。","options":{"A":"立即靜脈給短效抗癲癇藥，正確。","B":"正解(本題選錯誤)。小發作/局部發作也可能形成重積狀態。","C":"一次發作>5分鐘屬重積，正確。","D":"兩次發作間意識未完全恢復，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"113180-N3-4":{"quick":"在台灣，癲癇控制良好者「可」考駕照→「不能考駕照」錯誤。","detail":{"background":"癲癇病人衛教：①phenytoin治療濃度10~20 mcg/mL(A正確)；②女性癲癇病人「可以正常懷孕生育」，但需孕前諮詢、調整藥物(避免致畸)(B正確)；③在台灣，癲癇病人若「一定期間(如2年)無發作、控制良好」並符合規定，「可以」考取駕照，故「不能考駕照」是錯誤的(C錯誤)；④發作時若意識不清「不需試圖喚醒」(D正確)。","options":{"A":"phenytoin治療濃度10~20 mcg/mL，正確。","B":"癲癇女性可正常懷孕(需調藥)，正確。","C":"正解(本題選錯誤)。控制良好者可考駕照，非一律不能。","D":"發作意識不清不需試圖喚醒，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"114030-N3-4":{"quick":"確定癲癇「異常放電位置」靠腦波(EEG)非電腦斷層→A錯誤。","detail":{"background":"癲癇處置：①「確定異常放電位置」要用「腦波(EEG)」，電腦斷層(CT)是看「結構病灶」非放電(A錯誤)；②發作時「頭偏向一側」利唾液流出防吸入(B正確)；③發作意識不清「不須試圖喚醒」(C正確)；④「驟然停藥」是癲癇重積最常見誘因(D正確)。","options":{"A":"正解(本題選錯誤)。異常放電位置靠EEG，CT看結構。","B":"頭偏向一側利唾液流出，正確。","C":"意識不清不須試圖喚醒，正確。","D":"驟然停藥是重積常見原因，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"114100-N3-4":{"quick":"服藥2~3年無發作且EEG/神經學正常，可考慮「慢慢」停藥(D正解)；勿多藥、孕期勿驟停。","detail":{"background":"抗癲癇藥處置原則：①「優先單一藥物(monotherapy)」，多藥併用增加副作用與交互作用(A錯)；②停藥應「緩慢漸減」，且選藥減量需個別評估(B敘述不夠精確)；③懷孕「不可立即/驟然停藥」——驟停會致重積危及母胎，應於孕前/孕期由醫師評估調整為較安全藥物與劑量(C錯)；④「持續2~3年無任何發作，且神經學檢查與腦波正常」者，可考慮「逐漸(慢慢)減量停藥」(D正確)。","options":{"A":"應優先單一藥物，多藥同時非最佳。","B":"停藥需緩慢漸減並個別評估，敘述不精確。","C":"懷孕不可立即停藥(驟停致重積)，應評估調整。","D":"正解。2~3年無發作且檢查正常，可考慮慢慢停藥。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"114170-N3-1":{"quick":"牙關緊閉、四肢伸直僵直屬「強直期」非陣攣後期→C最不適當。","detail":{"background":"癲癇症狀與治療：①複雜性部分發作常源自「顳葉」、發作前可有先兆(aura)(A正確)；②重積狀態定義「持續>5分鐘或兩次發作間意識未恢復」(B正確)；③強直-陣攣發作中「牙關緊閉、四肢僵直伸直」是「強直期(tonic)」的表現，非「陣攣後期」，故C敘述「陣攣後期出現牙關緊閉雙腳伸直」最不適當(時序錯置)；④治療「起始單一藥、漸增劑量至控制或出現毒性」(D正確)。","options":{"A":"複雜部分發作源自顳葉、可有先兆，正確。","B":"重積定義>5分鐘或兩次間意識未恢復，正確。","C":"正解(本題選最不適當)。牙關緊閉、四肢伸直屬強直期，非陣攣後期。","D":"起始單一藥物漸增至控制或毒性，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》癲癇"]}},"102030-N3-23":{"quick":"譫妄＝急性、快速發作、可逆、注意力波動(A正解)。","detail":{"background":"譫妄(delirium)與失智(dementia)的重要區別：譫妄是「急性、快速(數小時至數天)」發作、病程「波動」、核心是「注意力障礙與意識混亂」、且多為「可逆」(去除誘因如感染、藥物、電解質、缺氧後可恢復)，好發於「老人、術後、ICU」病人。失智則是「慢性、緩慢、進行性、不可逆」。命名不能(anomia)是失語/失智的語言問題，非譫妄核心。故正確為「通常是快速、急性發作」。","options":{"A":"正解。譫妄是急性、快速發作。","B":"好發於老人(尤其術後/重症)，非中年女性。","C":"譫妄多為可逆，非不可逆。","D":"命名不能(anomia)是失語/失智問題，非譫妄核心。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"104030-N3-1":{"quick":"阿茲海默氏症臨床表徵→1記憶力減退、2人格改變；日落眼、小碎步非AD。","detail":{"background":"阿茲海默氏症(AD)臨床表徵：早期「近期(短期)記憶減退」、學習新事物困難，續而「人格/情緒改變(易怒、淡漠、多疑妄想)」、定向力喪失、判斷與語言能力下降、生活功能退化。「日落眼(setting-sun sign，眼球下轉)」是嬰兒腦積水/顱內壓升高徵象，非AD；「小碎步(慌張步態)」是巴金森氏症。故正確為1記憶力減退、2人格改變。","options":{"A":"正解。1記憶力減退＋2人格改變是AD表徵。","B":"13含「日落眼」(3)為腦積水/IICP徵，非AD。","C":"23含日落眼(3)。","D":"24含「小碎步」(4)為巴金森表現。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"104030-N3-8":{"quick":"AD護理→安全下「鼓勵病人自理日常活動」以維持功能與自尊(C正解)。","detail":{"background":"阿茲海默氏症護理：①AD「無法治癒」，藥物只能延緩(A錯，勿給病人不實期望)；②「晚餐後不宜多喝水」——會增加夜尿、夜間躁動/譫妄(B錯，應日間補水);③在「安全範圍內鼓勵病人自己操作日常生活活動(ADL)」維持殘存功能、提振自尊、延緩退化(C正確)；④晚期尿失禁應「定時如廁、行為訓練」優先，「常規留置導尿管」增加泌尿道感染、非首選(D錯)。","options":{"A":"AD無法治癒，不可給病人「可治癒」的錯誤期望。","B":"晚餐後多喝水會增加夜尿與夜間混亂，應日間補水。","C":"正解。安全下鼓勵自理ADL，維持功能與自尊。","D":"尿失禁優先用定時如廁訓練，常規導尿管增感染。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"105030-N3-9":{"quick":"譫妄護理應「避免物理性約束」(會加重躁動)→使用物理約束錯誤。","detail":{"background":"譫妄護理原則：①「促進定向感」(時鐘、日曆、熟悉物、家人陪伴)；②找出並處理誘因(感染、疼痛、缺氧、電解質、藥物)，「控制疼痛」；③「建立信任關係」、溫和安撫、維持環境穩定光線適中；④「盡量避免物理性約束」——約束會加重躁動、譫妄與受傷風險，僅在保護安全且無替代時短暫、最小化使用。故「使用物理性約束」為錯誤的常規措施。","options":{"A":"促進定向感是譫妄護理重點，正確。","B":"控制疼痛(去除誘因)正確。","C":"正解(本題選錯誤)。應避免物理性約束，會加重躁動譫妄。","D":"建立信任關係、溫和安撫，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"106111-N3-1":{"quick":"MMSE評估「認知功能」非急性腦傷「意識」(意識用GCS)→C錯誤。","detail":{"background":"簡易心智狀態量表(MMSE)：①「滿分30分」(A正確)；②評估定向、記憶、注意/計算、語言、繪圖等「認知功能」，分數「愈高表示認知愈好」(B正確)；③它是「認知功能/失智篩檢」工具，「不是用來評估急性腦傷的意識狀態」——意識程度應用「格拉斯哥昏迷量表(GCS)」(C錯誤)；④結果會受「教育程度、年齡」影響，判讀須校正(D正確)。","options":{"A":"滿分30分，正確。","B":"分數愈高認知功能愈好，正確。","C":"正解(本題選錯誤)。MMSE評估認知功能，急性腦傷意識用GCS。","D":"分數與教育程度有關，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"106111-N3-7":{"quick":"AD認知缺失護理應「減少」過度環境刺激→增加刺激錯誤。","detail":{"background":"阿茲海默氏症出現認知功能缺失時的護理：①應「簡化環境、減少過度刺激(噪音、人多、雜亂)」以免病人混亂焦躁(故「增加環境刺激」錯誤)；②用記事本、便條、提示輔助記憶(B正確)；③掛時鐘、日曆、標示促進定向感(C正確)；④出現幻覺/妄想時「不與其爭辯」、給予安撫、轉移注意(D正確)。","options":{"A":"正解(本題選錯誤)。應減少過度環境刺激，非增加。","B":"用記事本記錄輔助記憶，正確。","C":"掛時鐘日曆促進定向，正確。","D":"有幻覺時不與其爭辯，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"107110-N3-7":{"quick":"AD表徵→1短期記憶缺失、3易怒、4失去定向力；長期記憶缺失是晚期(2排除)。","detail":{"background":"阿茲海默氏症的記憶喪失順序是「先短期(近期)、後長期(遠期)」：早期表現「短期記憶缺失(忘記剛發生的事)」(1正確)，伴情緒/人格改變「易怒」(3正確)、「定向力喪失(失去時間地點人物概念)」(4正確)。「長期(遠期)記憶缺失」要到「晚期」才出現(早期遠期記憶相對保留)，故敘述2在「早期表徵」中不選。正確為1、3、4。","options":{"A":"123含「長期記憶缺失」(2)為晚期，不屬此題正確組合。","B":"124含2(長期記憶缺失)晚期。","C":"正解。1短期記憶缺失＋3易怒＋4失去定向力。","D":"234含2(長期記憶缺失)。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"108020-N3-7":{"quick":"阿茲海默氏症是「不可逆」退化疾病→「可逆」錯誤。","detail":{"background":"阿茲海默氏症(AD)：①是「慢性、進行性、『不可逆』」的腦部退化疾病(A「可逆」錯誤)；②可能病因含「年齡、基因遺傳(如APOE ε4、早發型基因)」(B正確)；③核心症狀為記憶力減退、認知功能退化(C正確)；④藥物如膽鹼酶抑制劑(donepezil)、「NMDA受體拮抗劑(memantine)」可「延緩/改善」症狀但無法治癒(D正確)。故「可逆」為錯誤敘述。","options":{"A":"正解(本題選錯誤)。AD是不可逆的退化疾病。","B":"基因遺傳是可能病因，正確。","C":"有記憶力減退症狀，正確。","D":"NMDA受體拮抗劑(memantine)可改善大腦功能，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"109030-N3-6":{"quick":"腦組織萎縮、腦溝變大＋認知/情緒退化→阿茲海默氏症。","detail":{"background":"75歲老人「對外界興趣缺缺、情緒改變」且「腦部電腦斷層顯示腦組織萎縮、腦溝變大(腦皮質萎縮)」——影像的「瀰漫性腦萎縮」是阿茲海默氏症(AD)的典型變化。憂鬱症(假性失智)通常無明顯結構性腦萎縮；譫妄為急性可逆、影像多無萎縮；巴金森氏症以運動症狀為主。故最可能為AD。","options":{"A":"憂鬱症通常無明顯腦萎縮的結構變化。","B":"譫妄為急性可逆，影像多無腦萎縮。","C":"正解。腦萎縮、腦溝變大＋認知退化＝阿茲海默氏症。","D":"巴金森氏症以運動障礙為主，非以腦皮質萎縮為主。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"111030-N3-1":{"quick":"詢問「人、時、地」是評估「定向感」非注意力→C錯誤。","detail":{"background":"心智狀態評估：①可用MMSE進行(A正確)；②評估面向含判斷力、定向感、記憶力、注意力、抽象思考、計算力(B正確)；③「詢問人、時、地的確認能力」是評估「定向感(orientation)」，不是注意力(注意力以連續減7、倒背數字等測)(C錯誤)；④詢問老年人年輕時求學求職等舊事是評估「遠期(長期)記憶力」(D正確)。","options":{"A":"可用MMSE進行心智狀態測試，正確。","B":"評估面向涵蓋判斷、定向、記憶、注意、抽象、計算，正確。","C":"正解(本題選錯誤)。問人時地是評估「定向感」，非注意力。","D":"問年輕時求學求職是評估遠期記憶，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"111030-N3-4":{"quick":"「走失」是阿茲海默氏症「中期(混亂期)」的重要臨床表徵。","detail":{"background":"阿茲海默氏症分期：①早期(健忘期)——近期記憶減退、學習困難、輕度功能影響；②「中期(混亂期)」——定向力明顯喪失、judgment差、出現「走失、徘徊、妄想、躁動」、日常生活需協助；③末期(失智期)——完全依賴、失去語言行動、臥床。「走失(wandering/getting lost)」是中期最具代表的安全問題。故為中期。","options":{"A":"極早期僅輕微記憶問題，尚不至走失。","B":"早期(健忘期)以近期記憶減退為主。","C":"正解。走失是中期(混亂期)的重要臨床表徵。","D":"末期已臥床完全依賴，非以走失為代表。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"112030-N3-2":{"quick":"與AD溝通應用「低音調、緩慢」；用「高音調」不適宜→C。","detail":{"background":"與阿茲海默症病人溝通：①病人語言退化時，照顧者也用「簡單字彙、短句、圖片」溝通(A正確)；②留意非語言訊息(B可接受)；③應使用「低沉、緩慢、平穩」的語調——「低音調」較易被年長/退化者聽懂且不具威脅感，「高音調」聽起來尖銳、像責備、易引發焦躁，故「使用高音調」不適宜(C為本題選不適宜者)；④適度運用觸覺(輕拍、握手)安撫(D正確)。","options":{"A":"用簡單字彙或圖片與病人溝通，適宜。","B":"觀察非語言訊息(眼神)輔助理解，可接受。","C":"正解(本題選不適宜)。應用低音調緩慢，「高音調」不適宜。","D":"善用觸覺刺激(拍打、擁抱)協助表達，適宜。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"113030-N3-4":{"quick":"阿茲海默氏症典型是「短期(近期)記憶」喪失，「長期記憶喪失」非典型早期→C錯誤。","detail":{"background":"阿茲海默氏症：①是「慢性、進展性、退化性」腦部疾病(A正確)；②病因含年紀、基因遺傳(B正確)；③「典型早期症狀為短期(近期)記憶喪失」——忘記剛發生的事，遠期(長期)記憶相對保留至晚期才喪失，故「典型症狀為長期記憶喪失」錯誤(C錯誤)；④腦部典型病理變化為「神經纖維糾結(neurofibrillary tangles)與老年性(類澱粉)斑塊(senile/amyloid plaques)」(D正確)。","options":{"A":"慢性進展退化性腦病，正確。","B":"年紀、基因遺傳是可能病因，正確。","C":"正解(本題選錯誤)。典型是短期記憶喪失，非長期記憶。","D":"神經纖維糾結與老年斑塊是典型病理變化，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"114100-N3-43":{"quick":"情緒不穩、走失式忘付錢、忘梳洗、妄想(疑偷錢)＝阿茲海默症「中期(混亂期)」。","detail":{"background":"阿茲海默症分期判讀：陳太太「情緒不穩易怒、買東西忘付錢、忘記梳洗(日常生活功能退化)、妄想(懷疑兒子偷錢)」——這些「明顯定向/判斷障礙、生活自理退化、被偷妄想、人格情緒改變」是「中期(混亂期)」的典型表現。健忘期(早期)僅近期記憶減退、生活尚可自理；失智期(末期)則完全依賴、臥床失語。故為混亂期(中期)。","options":{"A":"健忘期早期僅輕度近期記憶問題，生活可自理。","B":"健忘期晚期記憶問題加重但尚未到明顯妄想/失自理。","C":"正解。明顯功能退化＋妄想＋情緒改變＝混亂期(中期)。","D":"失智期(末期)已完全依賴、臥床失語，與本例仍能外出不符。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"114170-N3-3":{"quick":"AD早期表徵→1興趣降低、3學習新事物能力降低、4工作表現變差；計算障礙、夜間活動增加屬較後期。","detail":{"background":"阿茲海默症「早期」臨床表徵：①對人與周遭事件「興趣降低、淡漠」(1正確)；②「學習新事物的能力降低」、近期記憶減退(3正確)；③「工作/日常表現變差」、判斷力下降(4正確)。而「無法進行簡單計算(失算)」(2)與「夜間活動增加(日落症候群/徘徊)」(5)多屬「中期(混亂期)」才明顯。故早期表徵為1、3、4。","options":{"A":"125含「夜間活動增加」(5)屬中期。","B":"正解。1興趣降低＋3學習能力降低＋4工作表現變差是早期表徵。","C":"234含「計算障礙」(2)、夜間活動(無)等較後期。","D":"345含「夜間活動增加」(5)中期表現。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》失智症與譫妄"]}},"102030-N3-3":{"quick":"細菌性腦膜炎腦膜受刺激→Brudzinski徵「陽性」(A正解)。","detail":{"background":"細菌性腦膜炎使腦膜發炎、受刺激，出現「腦膜刺激徵(meningismus)」：①頸部僵硬(nuchal rigidity)②「Brudzinski徵陽性」(被動屈頸→兩下肢不自主屈曲)③「Kernig徵陽性」(屈髖再伸膝→大腿後疼痛抵抗)，併發燒、頭痛、畏光、噴射狀嘔吐。腫塊效應與單側瞳孔擴大屬佔位病灶/腦疝，非腦膜刺激徵本身。故正解為Brudzinski徵陽性。","options":{"A":"正解。Brudzinski徵陽性是腦膜刺激徵。","B":"Kernig徵應為「陽性」，非陰性。","C":"腫塊效應/顱內壓升高屬佔位病灶，非腦膜刺激徵。","D":"單側瞳孔擴大是腦疝徵象，非腦膜刺激徵。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》中樞神經感染"]}},"107030-N3-2":{"quick":"細菌性腦膜/腦室炎→CSF「葡萄糖減少」(細菌耗糖)、蛋白增加(C正解)。","detail":{"background":"中樞神經系統「細菌」感染(如腦室外引流相關腦室炎、細菌性腦膜炎)的腦脊髓液變化：①外觀混濁②白血球(多形核)明顯增多③「蛋白質增加」(發炎滲出)④「葡萄糖減少」——細菌與發炎細胞消耗葡萄糖，使CSF糖/血糖比下降(<0.4)。病毒性感染則葡萄糖多正常、蛋白輕度上升、以淋巴球為主。故正確為「葡萄糖的量減少」。","options":{"A":"細菌感染CSF蛋白質會增加，非不變。","B":"蛋白質會「增加」非減少。","C":"正解。細菌耗糖使CSF葡萄糖減少。","D":"葡萄糖會減少，非增加。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》中樞神經感染"]}},"107110-N3-4":{"quick":"腦膜受刺激→Brudzinski徵陽性(A正解)。","detail":{"background":"腦膜受刺激(腦膜炎、蜘蛛膜下腔出血)的典型徵象是「腦膜刺激徵」：頸部僵硬、「Brudzinski徵陽性」、Kernig徵陽性。Romberg測驗評估本體感覺/小腦平衡；洋娃娃眼(Doll’s eye)評估腦幹；Weber測驗評估聽力傳導，皆與腦膜刺激無關。故正解為Brudzinski徵陽性。","options":{"A":"正解。Brudzinski徵陽性是腦膜刺激徵。","B":"Romberg測驗評估本體/平衡，與腦膜刺激無關。","C":"洋娃娃眼評估腦幹功能，非腦膜刺激徵。","D":"Weber測驗評估聽力，與腦膜刺激無關。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》中樞神經感染"]}},"108110-N3-1":{"quick":"病毒性腦膜炎多自限→以「症狀療法」減輕不適(C正解)，非抗生素。","detail":{"background":"病毒性(無菌性)腦膜炎多由腸病毒等引起、病程「自限」、預後佳，處置以「支持性/症狀療法」為主：退燒止痛、休息、補充適當水分、緩解頭痛畏光。①抗生素是治「細菌性」腦膜炎，病毒性無效(A錯)；②抗病毒製劑(acyclovir)主要用於「單純疱疹病毒腦炎」等特定情況，非一般病毒性腦膜炎常規(B錯)；③若合併顱內壓升高反而需「限水」，「增加水分排毒」不正確(D錯)。故正解為症狀療法。","options":{"A":"抗生素治細菌性腦膜炎，病毒性無效。","B":"抗病毒劑用於特定(如HSV腦炎)，非一般病毒性腦膜炎常規。","C":"正解。病毒性腦膜炎多自限，採症狀療法減輕不適。","D":"合併IICP需限水，「增加水分排毒」不正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》中樞神經感染"]}},"111110-N3-80":{"quick":"狂牛症(新型庫賈氏病)是「普利昂蛋白(prion)」異常，非Negri body基因突變→B錯誤。","detail":{"background":"狂牛症又稱「新型庫賈氏病(variant CJD)」，與牛海綿狀腦病(BSE)有關(A正確)；致病機轉是「普利昂蛋白(prion，異常摺疊的蛋白質)」造成腦組織海綿狀變性，「不是Negri body(內格利小體＝狂犬病的病理特徵)基因突變」(B錯誤)；vCJD相較典型CJD「好發較年輕、病程較長」(C正確)；臨床「初期常以焦慮、憂鬱、妄想等精神症狀」表現，後續快速進展為失智、運動失調、肌陣攣(D正確)。故錯誤為B。","options":{"A":"新型庫賈氏病與牛海綿狀腦病(BSE)有關，正確。","B":"正解(本題選錯誤)。致病是普利昂蛋白(prion)，非Negri body基因突變。","C":"vCJD好發較年輕、病程較長，正確。","D":"初期常以焦慮、妄想等精神症狀表現，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》中樞神經感染"]}},"103030-N3-1":{"quick":"預後最差的腦瘤＝多形性神經膠母細胞瘤(GBM, WHO grade IV)。","detail":{"background":"腦瘤預後依惡性度差異大：「多形性神經膠母細胞瘤(glioblastoma multiforme, GBM)」是最惡性(WHO第四級)的星狀細胞瘤，浸潤性強、復發快、存活期短，預後最差。腦膜瘤(meningioma)、腦下垂體腺瘤、神經瘤(如聽神經瘤)多為「良性、生長慢、可手術」，預後相對佳。故預後最差為GBM。","options":{"A":"腦膜瘤多為良性、預後較佳。","B":"腦下垂體腺瘤多為良性、可手術/藥物控制。","C":"正解。GBM惡性度最高、預後最差。","D":"神經瘤(如聽神經瘤)多良性、預後佳。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"104030-N3-5":{"quick":"腦瘤放療通常於「術後約兩週(傷口癒合後)」開始、分次進行(C正解)。","detail":{"background":"腦腫瘤放射線治療原則：①多採「分次(fractionated)」照射(每次小劑量、分多次)以保護正常腦組織，非「單次大劑量」(A錯)；②通常在「手術後約2週、手術傷口癒合後」開始，而非術後立刻照射(B錯、C正確)；③多數惡性腦瘤手術後「仍需」放療(±化療)以清除殘餘腫瘤，並非手術後即不需放療(D錯)。故正確為「術後二週開始」。","options":{"A":"採分次照射，非單次大劑量。","B":"通常術後約2週傷口癒合後才開始，非立刻。","C":"正解。腦瘤放療通常於術後二週開始。","D":"惡性腦瘤術後多仍需放療。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"106110-N3-2":{"quick":"腦瘤術後抽搐時「不應強行喚醒病人」→D不適當。","detail":{"background":"額葉腦瘤術後病人突發全身性抽搐的處置：①「立即給100% O2」維持氧合(A適當)；②「記錄抽搐部位、型態、持續時間」協助診斷(B適當)；③「確認床欄拉起、移開危險物」保護病人防墜床受傷(C適當)；④發作中「不應強行喚醒病人」——發作時意識本就受影響、發作後嗜睡(postictal)是
