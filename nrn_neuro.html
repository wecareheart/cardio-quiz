正常現象，強行喚醒無益且可能干擾(D不適當)。故選D。","options":{"A":"立即給100% O2維持氧合，適當。","B":"記錄抽搐部位與持續時間，適當。","C":"確認床欄拉起保護病人，適當。","D":"正解(本題選不適當)。發作時不應強行喚醒病人。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"108020-N3-73":{"quick":"腦下垂體切除術後應「抬高床頭」非平躺→C錯誤。","detail":{"background":"腦下垂體切除術(多經蝶竇)後護理：①密切觀察「低血容積/休克」——可能發生「尿崩症(DI)」大量排尿致脫水(A正確)；②觀察顱內壓升高症狀(B正確)；③應「抬高床頭(約30°)」減少手術區壓力、促進靜脈回流與引流、減輕頭痛，「保持平躺」是錯誤的(C錯誤)；④觀察「腦脊髓液鼻漏」(經蝶竇手術易CSF漏，且不可擤鼻、用吸管)(D正確)。","options":{"A":"觀察低血容積與休克(尿崩)，正確。","B":"觀察顱內壓升高症狀，正確。","C":"正解(本題選錯誤)。應抬高床頭，非保持平躺。","D":"觀察腦脊髓液外滲(鼻漏)，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"108110-N3-7":{"quick":"腦瘤敘述→2轉移性腦瘤常見肺癌乳癌、3突發抽搐是腦瘤指標(C正解23)；腦膜瘤好發女性、星狀細胞瘤好發男性。","detail":{"background":"腦瘤觀念：①「腦膜瘤好發於女性」(敘述1「好發男性」錯)；②「續發性(轉移性)腦瘤」最常來自「肺癌、乳癌」等原發癌轉移(敘述2正確)；③「突然發作的抽搐」常是腦瘤的明顯警訊/指標(成人新發癲癇要排除腦瘤)(敘述3正確)；④「星狀細胞瘤(astrocytoma)好發於男性」(敘述4「好發女性」錯)。故正確為2、3。","options":{"A":"12含「腦膜瘤好發男性」(1)錯誤。","B":"13含敘述1錯誤。","C":"正解。2轉移性腦瘤常見肺癌乳癌＋3突發抽搐是腦瘤指標。","D":"24含「星狀細胞瘤好發女性」(4)錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"109110-N3-4":{"quick":"「第五對(三叉神經)」管顏面感覺、壓迫不會複視→C錯誤(複視為CN III/IV/VI)。","detail":{"background":"顱內腫瘤壓迫對視覺的影響：①「第二對(視神經CN II)」壓迫→該眼視力下降甚至失明(A正確)；②「枕葉(視覺皮質)」壓迫→視野缺損(B正確)；③「複視(diplopia)」是「眼球運動神經(第3對動眼、第4對滑車、第6對外旋)」受壓造成眼球運動不協調，「第五對(三叉神經)」管顏面感覺與咀嚼，壓迫不會造成複視(C錯誤)；④「視交叉(optic chiasm)」壓迫(如腦下垂體瘤)→「雙顳側偏盲(bitemporal hemianopia)」(D正確)。","options":{"A":"CN II(視神經)壓迫引起眼盲，正確。","B":"枕葉壓迫引起視野缺損，正確。","C":"正解(本題選錯誤)。複視為CN III/IV/VI受壓，第五對(三叉)不會。","D":"視交叉壓迫引起雙顳側偏盲，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"111110-N3-4":{"quick":"腦下垂體中風＝腫瘤壓迫於「蝶鞍」處致鞍內壓上升(A正解)。","detail":{"background":"腦下垂體中風(pituitary apoplexy)是腦下垂體(常為已存在的腺瘤)突然「出血或梗塞」、體積驟增，於「蝶鞍(sella turcica)」這個骨性狹小空間內使「鞍內壓力上升」，壓迫周圍構造(視交叉→視力障礙、海綿竇→眼肌麻痺)，並可致急性腦下垂體功能低下(腎上腺危象)。故誘發原因為「腫瘤壓迫於蝶鞍處造成內部壓力上升」。","options":{"A":"正解。腫瘤於蝶鞍處出血/腫脹使鞍內壓上升。","B":"並非壓迫於腦室。","C":"並非下視丘的顱內出血。","D":"機轉以出血/腫脹為主，非單純鄰近血管梗塞。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"111110-N3-7":{"quick":"腦瘤用類固醇(Decadron)主要目的＝減輕(血管性)腦水腫。","detail":{"background":"腦腫瘤周圍會產生「血管源性腦水腫」使顱內壓升高、症狀惡化。類固醇(Dexamethasone/Decadron)能「穩定血腦障壁、減少微血管通透性」→「減輕腦水腫」、降低顱內壓、緩解症狀，是腦瘤的重要輔助用藥。它不是用於預防出血、預防感染，主要目的也非「抑制免疫」(雖類固醇有免疫抑制作用，但用於腦瘤的目的是消腦水腫)。故主要目的為減輕腦水腫。","options":{"A":"非用於預防出血。","B":"正解。減輕腫瘤周圍的血管性腦水腫、降顱內壓。","C":"非用於預防感染(類固醇反會增感染風險)。","D":"抑制免疫是副作用，非用於腦瘤的主要目的。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"112030-N3-1":{"quick":"伽馬刀(立體定位放射手術)→治療時「不會疼痛也不會流血」(B正解)、無切口無引流、腫瘤不會立即消失。","detail":{"background":"伽馬刀(gamma knife)是「立體定位放射『手術』」——以多束鈷-60伽馬射線聚焦於病灶，並非真的開刀切割：①「無皮膚切開傷口、不流血、過程不會疼痛」(B正確)；②術後「無手術切口、不需放引流管」(C錯)；③腫瘤是經放射使細胞逐漸壞死「數週至數月後才縮小」，「不會立即消失」(D錯)。故病人說「治療時不會疼痛也不會流血」顯示已了解。","options":{"A":"伽馬刀無皮膚切開傷口，此敘述顯示未了解。","B":"正解。治療不會疼痛也不會流血，表示已了解。","C":"無切口、不需引流管，此敘述錯誤。","D":"腫瘤需數週至數月才縮小，不會立即消失。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"112110-N3-7":{"quick":"伽馬刀→1適用<3cm腫瘤、2無切口、3約需半小時(C正解123)；用鈷-60伽馬射線非「碘」(4錯)。","detail":{"background":"伽馬刀立體定位放射手術特性：①適用於「直徑小於約3公分」的較小腫瘤/病灶(敘述1正確)；②「無手術切開傷口」、非侵入(敘述2正確)；③治療時間約「半小時至數小時」依計畫而定(敘述3正確)；④使用的是「鈷-60(Co-60)的伽馬射線」聚焦破壞腫瘤，「不是碘放射線射入腫瘤」(敘述4錯，碘植入是近接治療brachytherapy的另一種)。故正確為1、2、3。","options":{"A":"正解。1適用<3cm＋2無切口＋3約需半小時。","B":"124含「碘放射線」(4)錯誤。","C":"134含敘述4錯誤。","D":"234含敘述4錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"112180-N3-3":{"quick":"額葉腦瘤→注意力不集中、短期記憶喪失、偏癱(B正解)。","detail":{"background":"腦瘤症狀依「葉」定位：①「額葉(frontal)」——人格/行為改變、注意力不集中、短期記憶與判斷力下降、運動皮質受侵→對側偏癱、運動性失語(B正確)；②頂葉(parietal)——感覺異常、左右辨向障礙、部位失認(A屬頂葉)；③小腦——運動失調、平衡障礙(C屬小腦)；④枕葉——視野缺損、視覺辨識不能(D屬枕葉)。故額葉腦瘤對應B。","options":{"A":"感覺異常、左右辨向障礙、失認屬「頂葉」。","B":"正解。注意力不集中、短期記憶喪失、偏癱屬額葉。","C":"運動失調、失去平衡屬「小腦」。","D":"視野缺損、視覺辨識不能屬「枕葉」。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"113100-N3-1":{"quick":"本題「送分(各答案均給分)」；其中1 I125立體定位植入、4併化療治惡性/轉移腦瘤為正確概念。","detail":{"background":"腦瘤放射線治療概念：①「I-125立體定位植入(近接治療brachytherapy)」可將放射源直接植入腫瘤(敘述1正確)；②「不會在手術後立即」合併放療，通常待傷口癒合(約2週)(敘述2偏誤)；③多採「分次照射」而非「單次大劑量」(敘述3錯)；④「可與化學治療合併，用於惡性腦瘤與轉移癌」(敘述4正確)。本題因選項爭議「一律給分(送分)」，作答任一選項均算對。","options":{"A":"12(含立即合併放射2不精確)；本題送分，作答A亦給分。","B":"14(含立即合併概念)；本題送分，作答B亦給分。","C":"23；本題送分，作答C亦給分。","D":"34；本題送分，作答D亦給分。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》腦腫瘤"]}},"101030-N3-2":{"quick":"使用顯影劑的頭部CT「需簽署同意書」→「不需簽同意書」錯誤。","detail":{"background":"頭部電腦斷層(CT)護理：①若注射「含碘顯影劑」，檢查前須確認對「碘或貝類過敏」史(A正確)，且須「簽署檢查同意書」(因顯影劑有過敏/腎毒性風險)，故C「不需簽署同意書」錯誤；②檢查前移除頭部金屬/物件(髮夾、假髮、義齒等)避免影像假影(B正確)；③一般CT後可恢復活動，用顯影劑者鼓勵多喝水加速排除(D大致正確)。故錯誤為C。","options":{"A":"用顯影劑前確認碘/貝類過敏，正確。","B":"檢查前移除頭部物件(假髮等)避免假影，正確。","C":"正解(本題選錯誤)。用顯影劑的CT需簽署同意書。","D":"檢查後可恢復活動(用顯影劑者多喝水)，大致正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"101030-N3-10":{"quick":"到達現場「最優先」＝呼叫並輕搖病人確認有無意識反應(D正解)。","detail":{"background":"對倒下失去意識者的急救評估(BLS)第一步是「確認反應(check responsiveness)」——「拍肩/輕搖並大聲呼叫」看病人有無反應；確認無反應後才求救、檢查呼吸脈搏(看胸部起伏)、開始CPR。感覺口鼻氣息、看胸部起伏是「確認有無呼吸」(在確認意識之後)；開放氣道(壓額抬下巴)是在發現無呼吸後的步驟。故「最優先」是呼叫並輕搖確認意識。","options":{"A":"感覺口鼻氣息是評估「呼吸」，在確認意識之後。","B":"觀察胸部起伏是評估呼吸，非最先。","C":"開放氣道是確認無呼吸後的步驟。","D":"正解。最先確認反應(呼叫＋輕搖)有無意識。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"101030-N3-28":{"quick":"GCS E3V4M2→V4＝語言「混亂(confused)」(C正解)。","detail":{"background":"GCS各分項：睜眼E(4自動/3呼喚/2疼痛/1無)、語言V(5正常定向/4混亂confused/3不當字句/2無意義聲音/1無)、運動M(6遵指令/5定位移除/4正常屈曲回縮/3異常屈曲去皮質/2伸直去大腦/1無)。本例「E3 M2 V4」：E3=呼喚才睜眼、M2=對痛異常伸直(去大腦)、「V4=語言混亂」。故正確意義為「語言呈現混亂現象」。","options":{"A":"去皮質屈曲是M3，本例M2是去大腦伸直。","B":"因疼痛睜眼是E2，本例E3是因呼喚睜眼。","C":"正解。V4代表語言呈現混亂(confused)。","D":"手臂肌力虛弱非GCS的記分意義。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"101030-N3-29":{"quick":"皺眉、緊閉雙眼抵抗、吹口哨＝評估「顏面神經(CN VII)」。","detail":{"background":"顏面神經(CN VII)主管「臉部表情肌」的運動。評估方式：請病人「皺眉、緊閉雙眼(抵抗扳開)、露齒微笑、鼓腮、吹口哨」，觀察兩側是否對稱(顏面神經麻痺者患側不能閉眼、嘴角歪斜)。動眼神經(CN III)管眼球運動與瞳孔；三叉神經(CN V)管顏面感覺與咀嚼肌；舌咽神經(CN IX)管咽部感覺與吞嚥。故評估的是顏面神經。","options":{"A":"動眼神經(CN III)管眼球運動、瞳孔。","B":"三叉神經(CN V)管顏面感覺與咀嚼肌。","C":"正解。皺眉、閉眼、吹口哨評估顏面神經(CN VII)。","D":"舌咽神經(CN IX)管咽部感覺與吞嚥。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"101110-N3-74":{"quick":"體內裝「心臟節律器」者不可做MRI(磁場禁忌)。","detail":{"background":"MRI利用強磁場成像，「體內金屬植入物」是禁忌：心臟節律器(pacemaker，磁場會干擾使其失常)、動脈瘤金屬夾、人工耳蝸、金屬碎片(尤其眼內)、某些舊型人工關節等。固定假牙(陶瓷/部分材質)、缺血性或出血性腦中風病人本身並非MRI禁忌。故「裝心臟節律器」者不適合做MRI。","options":{"A":"固定假牙一般非MRI禁忌。","B":"正解。心臟節律器為MRI禁忌(磁場干擾)。","C":"缺血性腦中風病人可做MRI(且MRI對急性梗塞敏感)。","D":"出血性腦中風病人可做MRI/CT，非禁忌。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"101110-N3-78":{"quick":"自動睜眼E4、定向不清(混亂)V4、遵指令動作M6→E4V4M6。","detail":{"background":"依GCS評分：「會自動睜眼」＝E4；「人時地定向感不清楚(能說話但混亂)」＝V4(混亂confused)；「可遵照指示做出正確動作」＝M6(遵從指令)。故為E4V4M6(總分14)。補充：GCS三項——睜眼E(4自動/3呼喚/2疼痛/1無)、語言V(5定向/4混亂/3不當字/2聲音/1無)、運動M(6遵令/5定位/4屈曲回縮/3去皮質/2去大腦/1無)；本例自動睜眼E4、混亂V4、遵指令M6＝E4V4M6(14分)，分數越低意識越差，≤8分屬昏迷。","options":{"A":"正解。自動睜眼E4＋定向混亂V4＋遵指令M6＝E4V4M6。","B":"E3V3M5與「自動睜眼、能遵指令」不符。","C":"E2V2M4過低，與本例不符。","D":"E1V1M3屬深度昏迷，與本例不符。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"102030-N3-9":{"quick":"洋娃娃眼(Doll’s eye)陽性→代表「腦幹」功能正常。","detail":{"background":"洋娃娃眼現象(Doll’s eye / oculocephalic reflex)：將昏迷病人頭部快速左右轉動，若眼球「向頭轉動的相反方向」移動(陽性)，表示「腦幹(中腦、橋腦的眼動整合通路)」完整正常。若眼球隨頭固定不動(陰性)→腦幹功能受損、預後不佳。故陽性代表腦幹功能正常。(註：懷疑頸椎損傷者禁做此檢查。)","options":{"A":"此反射評估的是腦幹而非大腦。","B":"與腦下垂體功能無關。","C":"評估的是腦幹，非小腦。","D":"正解。洋娃娃眼陽性代表腦幹功能正常。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"102110-N3-16":{"quick":"腰椎穿刺常見合併症為頭痛、出血、感染；「癱瘓」非常見合併症→錯誤。","detail":{"background":"腰椎穿刺(LP)在L3~4或L4~5進行(脊髓圓錐止於L1~2，故不會傷及脊髓)。常見合併症：①「姿勢性頭痛(最常見，因CSF滲漏)」②穿刺部位出血/血腫③感染④背痛、神經根刺激。因穿刺位置在脊髓末端以下，「癱瘓」並非常見合併症。故錯誤(非常見合併症)為癱瘓。","options":{"A":"出血是LP合併症之一。","B":"頭痛是LP最常見合併症。","C":"感染是LP合併症之一。","D":"正解(本題選錯誤/非合併症)。LP在脊髓末端以下，癱瘓非常見合併症。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"102110-N3-18":{"quick":"眼前庭(溫熱)試驗「眼球不偏向(無反應)」表示腦幹『異常』→D錯誤。","detail":{"background":"眼前庭試驗(oculovestibular test，又稱caloric溫熱試驗)：向外耳道灌注冷/熱水刺激前庭，評估第「3、6、8」對腦神經與腦幹整合。檢查前須先確認「耳膜完整(無穿孔)」。「腦幹完整(正常)」時灌冷水會出現「眼球緩慢偏向灌注側並有眼振」；若「眼球不偏向、無反應」代表「腦幹功能異常/受損」。故D「眼球不偏向表示腦幹功能正常」錯誤(恰相反)。","options":{"A":"又稱溫熱試驗(caloric test)，正確。","B":"主要檢查第3、6、8對腦神經功能，正確。","C":"檢查前須確認耳膜完整性，正確。","D":"正解(本題選錯誤)。眼球「不偏向」代表腦幹異常，非正常。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"102110-N3-58":{"quick":"角膜反射弧＝傳入CN V(三叉)＋傳出CN VII(顏面)→第五對及第七對。","detail":{"background":"角膜反射(corneal reflex)的反射弧：①傳入(感覺)由「第五對三叉神經(CN V)眼支」偵測角膜被輕觸；②中樞在腦橋；③傳出(運動)由「第七對顏面神經(CN VII)」使眼輪匝肌收縮→雙眼眨眼。任一條受損則角膜反射異常。故角膜反射不正常代表「第五對與第七對」腦神經功能異常。","options":{"A":"第二、三對與角膜反射弧無關。","B":"第四對(滑車)不參與角膜反射。","C":"第六對(外旋)不參與角膜反射。","D":"正解。角膜反射＝CN V(傳入)＋CN VII(傳出)。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"103100-N3-4":{"quick":"腦血管攝影術後→1多喝水排顯影劑、3觀察穿刺側下肢循環(B正解13)；應臥床制動、勿早下床。","detail":{"background":"經股動脈腦血管攝影(angiography)術後護理：①「鼓勵多喝水」加速顯影劑排除、保護腎臟(敘述1正確)；②穿刺側肢體須「臥床、伸直、制動、加壓止血數小時」，「不可儘早下床」(敘述2錯)；③密切「觀察穿刺側(右)下肢的膚色、溫度、脈搏、活動度、感覺」以早期發現動脈栓塞或出血(敘述3正確)；④穿刺側下肢應「平放伸直制動」，而非抬高(敘述4錯)。故正確為1、3。","options":{"A":"12含「儘早下床」(2)錯誤。","B":"正解。1多喝水排顯影劑＋3觀察穿刺側下肢循環。","C":"23含「儘早下床」(2)錯誤。","D":"34含「抬高下肢」(4)錯誤。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"104030-N3-4":{"quick":"裝「心臟節律器」者不適合做MRI。","detail":{"background":"MRI禁忌為體內金屬/電子植入物：心臟節律器(磁場會干擾節律器運作)、動脈瘤夾、人工耳蝸、體內金屬碎片等。接受過開顱手術、使用抗凝血劑、裝固定假牙者一般可做MRI(假牙多無明顯禁忌、抗凝非禁忌)。故不適合者為「裝心臟節律器」。補充：MRI禁忌核心是「強磁場會吸引/干擾體內金屬與電子裝置」：心臟節律器(可致心律失常)、動脈瘤夾、人工耳蝸、眼內金屬碎片等；檢查前須詳問植入物史、移除身上金屬。固定假牙、抗凝治療、開顱術後一般非禁忌。","options":{"A":"開顱手術後的腦瘤病人可做MRI追蹤。","B":"使用抗凝血劑非MRI禁忌。","C":"正解。裝心臟節律器者不適合做MRI。","D":"固定假牙一般非MRI禁忌。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"105030-N3-3":{"quick":"腦池穿刺後「最重要」是評估有無呼吸困難、發紺(近腦幹風險)。","detail":{"background":"腦池穿刺(cisternal puncture)是在「枕骨下、靠近延腦(呼吸中樞)」處抽取CSF，風險較腰椎穿刺高。穿刺後「最重要」的評估是「呼吸狀態——有無呼吸困難、發紺」，因接近腦幹/延腦，若傷及或CSF動力改變可能影響呼吸而危及生命。頭痛、滲出液、穿刺處感染雖也需觀察，但「呼吸困難/發紺」是最優先的生命徵象。","options":{"A":"頭痛需觀察，但非最優先(生命威脅較低)。","B":"正解。最重要評估呼吸困難、發紺(近腦幹/延腦)。","C":"有無滲出液需觀察，但非最重要。","D":"穿刺部位感染需觀察，但非最優先。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"105030-N3-4":{"quick":"腰椎穿刺最常用部位＝L3~L4(脊髓末端以下、安全)。","detail":{"background":"成人脊髓末端(圓錐conus medullaris)約止於「L1~L2」，故腰椎穿刺選在其「下方」的「L3~L4或L4~L5」椎間隙進行，可安全抽取蜘蛛膜下腔CSF而不傷及脊髓。定位常以兩側髂嵴最高點連線(約對L4)為標記。故最常用部位為L3~L4。","options":{"A":"T12~L1太高、接近脊髓末端，不適合。","B":"L1~L2接近脊髓圓錐，較不安全。","C":"L2~L3亦可但臨床最常用為更下方。","D":"正解。L3~L4(脊髓末端以下)最常用且安全。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"105090-N3-1":{"quick":"腰椎穿刺後「最常見」合併症是『頭痛』非腰痛→B錯誤。","detail":{"background":"腰椎穿刺(LP)：①穿刺部位在「L3~4或L4~5」椎間隙(A正確)；②最常見合併症是「姿勢性(低顱壓)頭痛」——因穿刺孔CSF持續滲漏，坐起加重、平躺緩解，並非「腰痛」(B錯誤)；③檢查後「平躺休息、多喝水」補充CSF以減少頭痛(C正確)；④Queckenstedt’s test(壓頸試驗)是評估蜘蛛膜下腔是否阻塞的「腦脊髓液動力檢查」(D正確)。","options":{"A":"穿刺部位L3~4或L4~5，正確。","B":"正解(本題選錯誤)。LP最常見合併症是頭痛，非腰痛。","C":"檢查後多喝水補充CSF，正確。","D":"Queckenstedt test為CSF動力檢查，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"106030-N3-8":{"quick":"正常CSF：葡萄糖約為血糖的60~80%(C正解約80%)。","detail":{"background":"正常腦脊髓液(CSF)分析：①外觀「清澈無色」(紅色代表出血、混濁代表感染)；②白血球「<5/mm3」(>10000絕對異常)；③「葡萄糖約為血糖的60~80%(約50~80 mg/dL)」；④蛋白質「15~45 mg/dL」(>45為升高)；⑤壓力70~180 mmH2O。故選項中「葡萄糖約為血糖值的80%」屬正常範圍。","options":{"A":"紅色代表出血，非正常(正常為清澈無色)。","B":"白血球>10000嚴重異常(正常<5)。","C":"正解。葡萄糖約為血糖60~80%(約80%)屬正常。","D":"蛋白質>45 mg/dL為升高，非正常。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"106030-N3-42":{"quick":"慢性疼痛特徵＝持續較久(逾1個月/3個月)、常無明確原因、不隨時間消失。","detail":{"background":"急性vs慢性疼痛：急性疼痛通常有「明確原因(組織傷害)」、以「銳痛」為主、隨組織癒合「逐漸消失」、伴交感興奮(心跳血壓上升)。「慢性疼痛」則「持續較久(常定義超過3個月，至少>1個月)」、常「找不到明確/單一原因」、「不隨時間消失」、多為鈍痛/痠痛並影響情緒功能。選項中「持續1個月以上」最符合慢性疼痛特徵。","options":{"A":"慢性疼痛常「無」明確單一原因(那較像急性)。","B":"正解。慢性疼痛持續較久(逾1個月/3個月)。","C":"慢性疼痛「不隨時間消失」，非隨時間消失。","D":"慢性疼痛多為鈍痛/痠痛，急性才以銳痛為主。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"106110-N3-6":{"quick":"評估大腦各葉與腦幹功能的神經傳導性檢查＝誘發電位檢查。","detail":{"background":"「誘發電位(evoked potential, EP)」檢查(視覺VEP、聽覺BAEP、體感覺SSEP)是給予感覺刺激後記錄神經傳導路徑(經周邊→脊髓→腦幹→大腦皮質各葉)的電位反應，可評估「大腦各葉與腦幹」沿途傳導功能與是否有延遲/中斷(如MS、腦幹病變)。腦部掃描、MRI看「結構」、腦血流檢查看「灌流」，而非沿路「傳導功能」。故為誘發電位檢查。","options":{"A":"腦部掃描看結構/代謝，非傳導功能。","B":"MRI看結構，非神經傳導功能。","C":"腦血流檢查看灌流，非傳導功能。","D":"正解。誘發電位檢查評估各葉與腦幹的傳導功能。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"106110-N3-7":{"quick":"叢發性頭痛發作時應「給氧」、避免獨處熱敷之敘述錯誤。","detail":{"background":"叢發性頭痛(cluster headache)：①好發「成年男性」、為「單側(眼眶/顳部)劇痛」(A正確)；②伴患側「自律神經症狀」——流淚、結膜充血、鼻塞、皮膚發紅、Horner徵(B正確)；③常「無先兆、夜間於固定時段成群發作」(C正確)；④發作時的急性治療首選「吸入100%純氧」與曲普坦類(triptan)，「熱敷且讓其安靜獨處」並非有效處置(熱敷無助、病人發作時常坐立難安)，故D錯誤。","options":{"A":"好發成年男性之單側頭痛，正確。","B":"患側流淚、皮膚發紅(自律症狀)，正確。","C":"無先兆、夜間固定時段發作，正確。","D":"正解(本題選錯誤)。急性發作應給100%氧，非熱敷獨處。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"106110-N3-32":{"quick":"沒有輻射危害的檢查＝核磁共振(MRI，用磁場非游離輻射)。","detail":{"background":"影像檢查的輻射：①「核磁共振(MRI)」利用「強磁場與射頻波」成像，「沒有游離輻射」(D正解)；②骨掃描(注射放射性同位素)、電腦斷層(X光)、正子掃描(PET，放射性示蹤劑)皆有「游離輻射」。故無輻射危害者為MRI。補充：游離輻射來源——X光(CT、骨密度)、放射性同位素(骨掃描、PET、SPECT)；MRI以「磁場＋射頻波」成像「無游離輻射」，但體內金屬植入物者禁做。懷孕、需重複追蹤者選無輻射檢查較安全。","options":{"A":"骨掃描使用放射性同位素，有輻射。","B":"電腦斷層使用X光，有輻射。","C":"正子掃描使用放射性示蹤劑，有輻射。","D":"正解。核磁共振用磁場、無游離輻射。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"106111-N3-40":{"quick":"腰椎穿刺後應「去枕平躺」休息，非頭高腳低俯臥→C錯誤。","detail":{"background":"腰椎穿刺(LP)：①可採集CSF做「細胞學」判定中樞神經是否有惡性細胞(A正確)；②可「鞘內注射化療藥」治療中樞神經系統白血病/淋巴瘤(B正確)；③穿刺後應「去枕平躺(或俯臥)休息數小時、多喝水」以預防低顱壓頭痛，「頭高腳低俯臥」並不正確(C錯誤)；④穿刺部位在兩節腰椎間(L3~L5)(D正確)。","options":{"A":"採CSF做細胞學判定惡性細胞，正確。","B":"可鞘內注射化療治CNS白血病，正確。","C":"正解(本題選錯誤)。LP後應去枕平躺，非頭高腳低俯臥。","D":"穿刺部位在L3~L5椎間，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"107030-N3-1":{"quick":"小腦病變→Romberg陽性、tandem步態異常、單腳站不穩；Brudzinski(腦膜刺激)非小腦→D錯誤。","detail":{"background":"小腦病變評估結果：①Romberg測驗陽性(閉眼時搖晃不穩，反映本體/小腦平衡)(A正確)；②無法完成「足跟對腳尖一直線縱走(tandem walk)」(B正確)；③無法單腳站立(平衡障礙)(C正確)；④「Brudzinski徵」是「腦膜刺激徵」(腦膜炎/SAH)，「不是」小腦病變的評估(D錯誤)。小腦病變還有意向性震顫、辨距不良(dysmetria)、輪替動作障礙。","options":{"A":"Romberg測驗陽性是小腦/本體障礙表現，正確。","B":"無法tandem縱走是小腦失調表現，正確。","C":"無法單腳站立反映平衡障礙，正確。","D":"正解(本題選錯誤)。Brudzinski是腦膜刺激徵，非小腦病變。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"107110-N3-8":{"quick":"腦血管攝影術後穿刺側制動數小時即可，「絕對臥床24小時」過度→錯誤。","detail":{"background":"腦血管攝影(經股動脈)術後護理：①無禁忌時「鼓勵喝水」促顯影劑排除(A正確)；②穿刺側肢體「伸直、制動、加壓止血約6~8小時」即可，並非「絕對臥床24小時」(B錯誤)；③「評估穿刺側肢體循環(膚色、溫度、脈搏、感覺)」早期發現栓塞/出血(C正確)；④密切「監測生命徵象」(D正確)。","options":{"A":"無禁忌時鼓勵喝水排顯影劑，正確。","B":"正解(本題選錯誤)。穿刺側制動約6~8小時即可，非絕對臥床24小時。","C":"評估穿刺肢體循環，正確。","D":"監測生命徵象，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"108020-N3-1":{"quick":"GCS運動反應記錄「最佳(best)」反應，非最差→B錯誤。","detail":{"background":"GCS測量原則：①總分「≤8(低於7~8)」表示昏迷(A正確)；②「運動反應(M)以病人能做出的『最佳(best)』反應記錄」，不是最差(B錯誤)；③有插氣管內管無法發聲時，語言項以「T(或E)」標註(C的標註法依機構，本題以B為錯)；④眼部水腫/受傷無法睜眼時，睜眼項以「C(closed)」標註(D正確)。故錯誤為B。","options":{"A":"GCS≤8(低於7~8)表示昏迷，正確。","B":"正解(本題選錯誤)。運動反應記錄「最佳」反應，非最差。","C":"插管者語言項以特殊符號標註(依機構)，可接受。","D":"眼部水腫無法睜眼用「C」標註，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"108020-N3-2":{"quick":"正子斷層(PET)可測得腦部的「代謝活動」狀況(D正解)。","detail":{"background":"正子電腦斷層(PET)注射放射性示蹤劑(如FDG)，偵測組織「葡萄糖代謝/代謝活動」分布，用於腫瘤、失智(代謝下降)、癲癇灶定位等功能性評估(D正確)。測「腦血流灌流」較屬SPECT/灌流影像(A非PET主要);它「使用放射性示蹤劑屬核醫造影但為非侵入性掃描」(B「侵入性」描述不準)；頭部外傷急診最常用的是「CT」而非PET(C錯)。故正確為「可測得腦部代謝活動」。","options":{"A":"測腦血流灌流較屬SPECT/灌流影像，非PET主要功能。","B":"PET為非侵入性核醫掃描，「侵入性」描述不準。","C":"頭部外傷急診最常用CT，非PET。","D":"正解。PET可測得腦部代謝活動狀況。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"108110-N3-16":{"quick":"脊髓攝影用「水性顯影劑」後應「抬高床頭」防上行刺激，非立即平躺8小時→C錯誤。","detail":{"background":"脊髓攝影術(myelography)護理：①檢查前禁食(避免嘔吐吸入)(A正確)；②確認對「碘製劑」過敏史(B正確)；③「水性顯影劑」檢查後應「抬高床頭(半坐臥約30~45°)」、避免顯影劑往上流刺激腦膜引起頭痛/抽搐，「立即平躺8小時」不正確(那是舊式『油性』顯影劑的作法)(C錯誤)；④檢查後「多補充水分」促顯影劑排除、減少頭痛(D正確)。","options":{"A":"檢查前禁食8小時，正確。","B":"檢查前確認碘製劑過敏，正確。","C":"正解(本題選錯誤)。水性顯影劑後應抬高床頭，非立即平躺8小時。","D":"檢查後補充大量水分，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"109030-N3-14":{"quick":"CSF葡萄糖正常為血糖的60~80%；「20~30%」屬異常(細菌性感染)→B。","detail":{"background":"正常腦脊髓液(CSF)：外觀清澈(A正常)、葡萄糖「約血糖的60~80%」、蛋白質15~45 mg/dL(C正常)、側臥壓力70~180 mmH2O(D正常)。選項B「葡萄糖為血糖的20~30%」明顯偏低→「異常」(常見於細菌性腦膜炎，細菌與發炎細胞耗糖)。故異常者為B。","options":{"A":"外觀清澈是正常CSF。","B":"正解(本題選異常)。CSF糖僅血糖20~30%偏低，屬異常。","C":"蛋白質15~45 mg/dL為正常範圍。","D":"壓力70~180 mmH2O為正常範圍。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"109110-N3-5":{"quick":"壓中指遠端彈開→拇指屈曲＝霍夫曼氏反射(Hoffmann’s reflex)陽性(上運動神經元徵)。","detail":{"background":"霍夫曼氏反射(Hoffmann’s sign)：彈撥(壓住中指遠端指甲後迅速放開)誘發「拇指與食指屈曲」，陽性反映「上運動神經元(錐體束)病變、反射亢進」(如頸髓壓迫、中樞病變)。Trousseau徵是低血鈣(壓脈帶誘發腕痙攣)；Kernig徵是腦膜刺激；不對稱反射是泛指兩側反射不對稱。故此現象為Hoffmann’s reflex陽性。","options":{"A":"Trousseau徵是低血鈣的腕痙攣，非此。","B":"正解。彈中指誘發拇指屈曲＝Hoffmann反射陽性。","C":"Kernig徵是腦膜刺激徵，非此。","D":"不對稱反射是泛稱，非此特定徵象名稱。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"110030-N3-5":{"quick":"影響吞嚥的腦神經＝CN VII(2)、CN IX(3)、CN X(4)→C(234)。","detail":{"background":"吞嚥動作牽涉多對腦神經：①CN V(三叉)咀嚼、②「CN VII(顏面)」口腔期(味覺、唇/頰控制食團)、③「CN IX(舌咽)」咽部感覺與部分咽肌、④「CN X(迷走)」咽喉肌與食道蠕動、⑤CN XII(舌下)舌頭運動。選項中與吞嚥直接相關者為2(CN VII)、3(CN IX)、4(CN X)。CN III(動眼)管眼球、CN XI(副神經)管斜方肌/胸鎖乳突肌與吞嚥較無直接關係。故為234。","options":{"A":"123含CN III(1)眼球運動，與吞嚥無直接關係。","B":"145含CN III(1)、CN XI(5)，非吞嚥主要。","C":"正解。CN VII(2)＋CN IX(3)＋CN X(4)影響吞嚥。","D":"345含CN XI(5)，非吞嚥主要。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"110030-N3-6":{"quick":"由側臥翻成平躺，須注意原本側臥受壓的「踝部(外踝)」是否壓傷。","detail":{"background":"不同臥姿的壓傷好發點不同：平躺(仰臥)易壓「枕骨、肩胛、薦尾骨、足跟」；側臥則壓「耳廓、肩峰、大轉子、膝外側、『外踝(踝部)』」。協助昏迷病人「由側臥翻成平躺」時，應檢查「原本側臥受壓部位——踝部(外踝)」是否已形成壓傷(發紅、破皮)。故注意部位為踝部。","options":{"A":"枕骨是「平躺」受壓點，非側臥翻身要先查的原受壓處。","B":"尾椎骨是平躺受壓點。","C":"足跟是平躺受壓點。","D":"正解。踝部(外踝)是側臥受壓點，翻身後應檢查。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"110110-N3-5":{"quick":"頭眼反射「眼睛向相同方向移動」表示腦幹『異常』→D錯誤。","detail":{"background":"頭眼反射(oculocephalic reflex，又稱洋娃娃眼，A正確)：撐開昏迷病人眼睛、快速左右轉頭(B)，觀察眼球移動。「腦幹完整(正常)」時眼球會向「與頭轉動相反的方向」移動(維持注視)；若眼球「隨頭轉向相同方向(或固定不動)」表示「腦幹功能受損」。故D「眼睛向相同方向移動表示腦幹功能正常」錯誤(相反)。懷疑頸椎損傷者禁做(C正確)。","options":{"A":"又稱洋娃娃眼現象，正確。","B":"撐眼快速左右轉頭測試，正確。","C":"疑頸椎損傷不可做，正確。","D":"正解(本題選錯誤)。眼球向「相同」方向移動代表腦幹異常。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"110110-N3-7":{"quick":"評估腦幹功能的檢查＝頭眼反射(oculocephalic reflex)。","detail":{"background":"評估「腦幹」功能的反射：頭眼反射(oculocephalic)、眼前庭反射(caloric)、瞳孔對光反射、角膜反射、作嘔反射等。深腱反射(deep tendon reflex)、腹部反射、肛門反射屬「脊髓」反射弧，非評估腦幹。故為頭眼反射。","options":{"A":"深腱反射屬脊髓反射弧，非腦幹。","B":"腹部反射屬脊髓反射，非腦幹。","C":"正解。頭眼反射(oculocephalic)評估腦幹功能。","D":"肛門反射屬薦髓反射，非腦幹。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"112030-N3-7":{"quick":"叫喚睜眼E3、時間定向錯誤(混亂)V4、遵指令M6→E3V4M6。","detail":{"background":"依GCS：「無法自動睜眼、叫喚才睜眼」＝E3；「人、地清楚但時間回答錯誤(輕度混亂)」＝V4(混亂confused)；「能遵照指示做正確動作」＝M6(遵從指令)。故為E3V4M6(總分13)。補充：GCS評分——睜眼E(4自動/3呼喚/2疼痛/1無)、語言V(5定向/4混亂/3不當字/2聲音/1無)、運動M(6遵令/5定位/4回縮/3去皮質/2去大腦/1無)；本例叫喚才睜眼E3、時間答錯(混亂)V4、能遵指令M6＝E3V4M6(13分)。","options":{"A":"E4(自動睜眼)與本例「叫喚才睜眼」不符。","B":"M5是定位移除，本例能遵指令應為M6。","C":"正解。叫喚睜眼E3＋時間混亂V4＋遵指令M6。","D":"V3(不當字句)與本例僅時間答錯(混亂V4)不符。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"112110-N3-4":{"quick":"右眼外旋神經(CN VI)麻痺→「向右看」時右眼無法外展、複視最明顯(A正解)。","detail":{"background":"外旋(外展)神經CN VI支配「外直肌」使眼球「向外(往該側)」轉。右眼CN VI受血腫壓迫麻痺→右眼無法向右(外側)轉，故病人「向右看」時，兩眼影像無法對位、「複視最明顯」。向左看(右眼內收靠CN III)、向前看時複視較不明顯。故向右看時最明顯。","options":{"A":"正解。CN VI管外展，向右看時右眼無法外展、複視最明顯。","B":"向左看主要靠右眼內直肌(CN III)，複視不明顯。","C":"向前看複視較不明顯。","D":"閉左眼是單眼視物，反而消除複視。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"112180-N3-6":{"quick":"肱二頭肌反射屬「脊髓(深腱)反射」，不屬腦幹功能評估→B。","detail":{"background":"腦幹功能評估的反射：①瞳孔對光反射(中腦)②角膜反射(橋腦，CN V/VII)③作嘔反射(延腦，CN IX/X)④頭眼/眼前庭反射。而「肱二頭肌反射」是頸髓(C5~6)的「深部肌腱反射」，屬脊髓反射弧，「不屬於腦幹功能評估」。故選B。補充：腦幹反射(瞳孔對光=中腦、角膜反射=橋腦CN V/VII、作嘔反射=延腦CN IX/X、頭眼/眼前庭反射)用來評估昏迷病人腦幹是否完整、判斷預後；深部肌腱反射(如肱二頭肌C5~6、膝反射L3~4)屬脊髓反射弧，不能反映腦幹功能。","options":{"A":"瞳孔對光反射屬腦幹(中腦)評估。","B":"正解(本題選不屬)。肱二頭肌反射是脊髓深腱反射，非腦幹。","C":"角膜反射屬腦幹(橋腦)評估。","D":"作嘔反射屬腦幹(延腦)評估。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"113180-N3-1":{"quick":"腦血管攝影後不可立即下床(需臥床制動止血)→D錯誤。","detail":{"background":"診斷檢查護理：①腰椎穿刺將針插入「L3~L4蜘蛛膜下腔」(A正確)；②LP後「臥床休息、多喝水」預防低顱壓頭痛(B正確)；③腦波檢查前「洗淨頭髮、不擦髮油」利貼電極(C正確)；④「經股動脈腦血管攝影後」穿刺側肢體須「臥床、伸直制動、加壓止血數小時」，「不可立即下床」(早下床易出血/血腫/假性動脈瘤)，故D錯誤。","options":{"A":"LP插入L3~L4蜘蛛膜下腔，正確。","B":"LP後臥床休息加強水分，正確。","C":"腦波檢查前洗頭、不擦髮油，正確。","D":"正解(本題選錯誤)。腦血管攝影後須臥床制動，不可立即下床。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"115030-N3-3":{"quick":"細菌性腦膜炎CSF→蛋白質「增加」、葡萄糖「減少」；「蛋白減少、葡萄糖增加」錯誤→C。","detail":{"background":"腦膜炎病人腰椎穿刺：①「懷疑顱內壓升高時不宜執行LP」(避免腦疝)(A正確)；②穿刺由「第3、4腰椎椎間垂直穿入」(B正確)；③(細菌性)腦膜炎CSF分析應為「總蛋白質『增加』、葡萄糖『減少』、白血球增多、混濁」，故C「總蛋白質減少及葡萄糖增加」恰好相反，是錯誤的；④正常CSF壓力70~180 mmH2O(D正確)。","options":{"A":"疑IICP不宜LP(防腦疝)，正確。","B":"由L3~L4椎間垂直穿入，正確。","C":"正解(本題選錯誤)。腦膜炎CSF應蛋白增加、葡萄糖減少。","D":"正常CSF壓力70~180 mmH2O，正確。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}},"115030-N3-5":{"quick":"枕葉受損→視覺處理障礙「無法解析所看見的東西」(C正解)。","detail":{"background":"大腦各葉功能定位：①額葉——情緒/人格、運動、判斷(對應A「無法控制情緒」)；②頂葉——本體感覺、空間、左右辨向(對應B「無法辨識本體感受」)；③「枕葉(occipital)」——視覺皮質，受損→視野缺損、「視覺辨識不能(視覺失認，無法解析所見影像)」(C正確)；④顳葉/海馬——記憶、聽覺(對應D「記憶受損」)。故枕葉受損對應「無法解析所看見的東西」。","options":{"A":"無法控制情緒屬「額葉」功能。","B":"無法辨識本體感受屬「頂葉」功能。","C":"正解。枕葉(視覺皮質)受損→無法解析所看見的東西。","D":"近遠期記憶受損屬「顳葉/海馬」功能。"},"sources":["新文京《內外科護理學》神經系統","華杏《內外科護理學》神經系統評估與診斷檢查"]}}},TO=["N1腦中風與腦血管疾病", "N2顱內壓升高與腦疝", "N3頭部外傷", "N4脊髓損傷與神經性膀胱", "N5巴金森氏症與運動障礙", "N6重症肌無力", "N7多發性硬化症", "N8癲癇", "N9失智譫妄與認知障礙", "N10中樞神經感染與退化性疾病", "N11腦瘤", "N12神經系統評估與診斷檢查及其他"],LEC={"N1腦中風與腦血管疾病":{"title":"腦中風與腦血管疾病 複習講義","html":"<h3>一、分類與機轉</h3><p>缺血性(約80%)分「血栓型」(動脈硬化漸成血栓、休息/睡眠時發作、發病前常有<b>TIA</b>警訊)與「栓塞型」(心源性栓子如心房顫動，突發無預兆)；出血性分腦內出血(最大危險因子<b>高血壓</b>)與蜘蛛膜下腔出血(動脈瘤破裂，霹靂頭痛＋腦膜刺激徵)。</p><h3>二、血管定位</h3><p><b>MCA(中大腦動脈)</b>＝對側「臉、上肢為主」偏癱＋(優勢半球)失語；<b>ACA(前大腦動脈)</b>＝對側「下肢為主」無力；<b>PCA</b>＝對側偏盲。左半球＝語言、計算(失語、失算)；右半球＝空間、單側忽略、衝動。腦幹(基底動脈)＝閉鎖症候群。</p><h3>三、治療與護理</h3><p>缺血性：3~4.5小時內可用<b>rt-PA</b>(動脈瘤/AVM、嚴重肝病、近期出血禁用)、次級預防用低劑量aspirin(抗血小板)。出血性：<b>禁</b>抗凝/抗血小板/rt-PA，降腦壓控血壓、軟便防Valsalva。共通：抬床頭30°、吞嚥困難由濃稠漸進(液體最後)、單側忽略物品先放健側、抗痙攣擺位(膝下勿長墊枕)。</p>"},"N2顱內壓升高與腦疝":{"title":"顱內壓升高(IICP)與腦疝 複習講義","html":"<h3>一、Monro-Kellie與代償</h3><p>顱腔容積固定(腦組織＋血液＋CSF)。佔位病變使壓力上升時，先代償「增加CSF吸收/移出、減少腦血容量」；代償耗盡即失代償，最終腦組織移位＝<b>腦疝(枕骨大孔)</b>。</p><h3>二、表徵(Cushing三徵)</h3><p>早期頭痛(晨間/用力加劇)、噴射狀嘔吐、視乳突水腫、意識改變；晚期<b>收縮壓上升脈壓變寬、心搏過緩、呼吸不規則</b>。瞳孔放大固定對光無反應＝腦疝警訊。</p><h3>三、處置與計算</h3><p><b>CPP＝MAP−ICP</b>(目標ICP<20、CPP≥60)；MAP=(收縮壓+2×舒張壓)/3。護理：抬床頭30°頭頸正中、限液、軟便、<b>分散護理</b>(勿集中)、控體溫、避免缺氧高碳酸。Mannitol(高張利尿)須<b>快速</b>輸注、用過濾器、漸進停藥防回躍；引流CSF須<b>緩慢少量</b>(短時大量會腦疝)。類固醇用於「腫瘤血管性水腫」、需監測血糖。</p>"},"N3頭部外傷":{"title":"頭部外傷 複習講義","html":"<h3>一、顱內出血分型</h3><p><b>硬膜上(EDH)</b>＝動脈(中腦膜動脈)出血、典型「<b>清醒期(lucid interval)</b>後突然昏迷」、手術為主；<b>硬膜下(SDH)</b>＝靜脈(橋靜脈)出血，慢性者老人跌倒後數週漸進惡化；蜘蛛膜下腔出血＝劇烈頭痛＋腦膜刺激徵。</p><h3>二、顱底骨折</h3><p>徵象：Battle’s sign(乳突瘀斑)、浣熊眼(眼眶瘀血)、鼓室積血、<b>耳漏/鼻漏(CSF漏)</b>(用面紙看halo暈環徵)。CSF漏<b>絕不可</b>擤鼻、塞鼻、抽吸(會逆送細菌致腦膜炎/氣顱)，避免用力咳嗽打噴嚏。</p><h3>三、護理重點</h3><p>外傷性腦水腫IICP高峰在「48~72小時」；躁動期<b>禁鴉片</b>(抑制呼吸、掩蓋瞳孔意識評估)、提供光線、保護裝置、定向感。去骨瓣者戴頭盔保護缺損處。CSF鼻漏=硬腦膜破損。</p>"},"N4脊髓損傷與神經性膀胱":{"title":"脊髓損傷與神經性膀胱 複習講義","html":"<h3>一、脊髓休克 vs 神經性休克</h3><p><b>脊髓休克</b>=損傷面以下反射、運動、感覺「暫時全失」(肛門反射消失)；<b>肛門反射(球海綿體反射)恢復＝脊髓休克結束</b>。高位(頸/上胸)損傷併「<b>神經性休克</b>」=交感失調→低血壓、心搏過緩、體溫過低。C3~5損傷影響膈神經→不能自呼。</p><h3>二、自主神經過度反射(急症)</h3><p>見於<b>T6以上</b>、脊髓休克「結束後」。誘因最常見<b>膀胱脹</b>(其次便秘、壓瘡)→大量交感放電→嚴重高血壓、搏動性頭痛、心搏過緩、潮紅出汗。處置：<b>立即抬高床頭</b>＋盡速解除誘因(導尿/檢查導管)，每2~5分鐘量血壓。</p><h3>三、神經性膀胱</h3><p><b>上運動神經元(痙攣型)</b>=薦髓以上損傷、反射弧完整→敲恥骨/刺激肛門誘發反射排尿；<b>下運動神經元(弛緩型)</b>=S2~4損傷、反射弧破壞→Crede手壓法、Valsalva、副交感刺激劑、溢尿性失禁。肛門反射陽性＝S2~4中樞完整。</p>"},"N5巴金森氏症與運動障礙":{"title":"巴金森氏症 複習講義","html":"<h3>一、病因與症狀</h3><p>中腦<b>黑質多巴胺神經元退化</b>→多巴胺不足、乙醯膽鹼相對過多。四大主徵：<b>靜止性震顫(休息明顯、活動減輕)、僵硬、運動遲緩、姿勢不穩</b>；併面具臉、慌張小碎步、前傾駝背、雙手不擺動、流涎。</p><h3>二、藥物</h3><p><b>Levodopa(Sinemet)</b>由小漸增；<b>不可併B6</b>(降藥效)、<b>避免高蛋白同時服</b>(競爭吸收)；長期出現「on-off現象、異動症(不自主運動)」；副作用姿位性低血壓、噁心、幻覺。<b>Artane(抗膽鹼劑)</b>減震顫，副作用口乾便秘尿瀦留、<b>升眼壓(青光眼禁忌、監測眼壓)</b>。</p><h3>三、護理</h3><p>姿勢改變要慢防跌；步態訓練「跨大步、腳跟先著地、抬頭」矯正小碎步；規律運動勿過度休息(防僵硬攣縮)；魔鬼氈衣物、加高馬桶、有扶手硬椅；多纖水分防便秘。</p>"},"N6重症肌無力":{"title":"重症肌無力(MG) 複習講義","html":"<h3>一、本質與表現</h3><p>自體抗體攻擊神經肌肉接合處「<b>乙醯膽鹼受體</b>」的慢性自體免疫病；<b>橫紋肌易疲勞、休息後改善</b>。侵犯順序：<b>眼外肌(最早，眼瞼下垂/複視)</b>→延髓肌(咀嚼吞嚥構音)→四肢近端→呼吸肌。診斷：<b>Tensilon(Edrophonium)test</b>、抗AChR抗體、重複神經刺激。</p><h3>二、藥物與兩種危象</h3><p>抗膽鹼酯酶(<b>Mestinon/pyridostigmine</b>)「飯前30~60分」服、配合活動時藥效；不可自行加減。<b>肌無力危象</b>=藥量不足/感染壓力→無力、呼吸衰竭(必要時呼吸器)；<b>膽鹼性危象</b>=藥量過量→分泌物多、腹瀉腹絞痛、瞳孔縮小、心搏過緩、流涎流淚，拮抗劑<b>Atropine</b>。Tensilon可鑑別(肌無力危象用藥後改善、膽鹼性更糟)。</p><h3>三、護理</h3><p>避免過勞/感染/高溫；進食坐直、下巴朝胸(chin-tuck)、軟質；某些抗生素(胺基糖苷類)會加重無力應避免；可併免疫抑制劑(azathioprine＋prednisone)、血漿置換、IVIG。</p>"},"N7多發性硬化症":{"title":"多發性硬化症(MS) 複習講義","html":"<h3>一、本質</h3><p>中樞神經(腦、脊髓、<b>視神經</b>)「<b>髓鞘脫失</b>」的自體免疫病，好發<b>20~40歲年輕女性</b>，病程「復發-緩解」、不可治癒。常見視神經炎(視力障礙)、肢體無力、感覺麻木、複視、協調障礙；因中樞病變，深部肌腱反射「<b>亢進</b>」(非消失)。</p><h3>二、診斷與誘因</h3><p>MRI多發斑塊、CSF「IgG/寡株帶上升」、視覺誘發電位延遲(超音波無法看中樞髓鞘)。<b>感染、發燒、壓力、過熱</b>會誘發惡化(熱敏感Uhthoff現象)。</p><h3>三、治療與護理</h3><p>急性發作用類固醇縮短病程；疾病修飾藥(interferon)、免疫抑制劑(Cyclophosphamide)減少復發。護理：<b>避免運動後熱水澡/高溫</b>、適度勿過勞運動、鼓勵維持社交、複視用眼罩交替遮一眼、多纖水分與如廁訓練、臥床者做被動全關節運動防攣縮。</p>"},"N8癲癇":{"title":"癲癇 複習講義","html":"<h3>一、發作型態</h3><p>泛發強直-陣攣(大發作)：強直期僵直、牙關緊閉、呼吸暫停；<b>陣攣期</b>抽動、咬傷舌/口腔、大小便失禁；之後嗜睡混亂(postictal)。局部發作可有先兆(aura)、Jacksonian march。確診靠<b>腦波(EEG)</b>。</p><h3>二、發作護理</h3><p>移開危險物、保護頭、<b>頭側向一邊/側臥</b>利唾液引流防吸入；<b>不可</b>放任何東西入口、不可強扳牙、不可強力約束、不需強行喚醒；記錄發作部位與時間，備氧氣抽吸。</p><h3>三、藥物與重積狀態</h3><p><b>Phenytoin(Dilantin)</b>：治療濃度10~20 mcg/mL、IV只能用<b>生理食鹽水</b>稀釋且滴注要慢、副作用<b>齒齦增生</b>(軟毛牙刷口腔護理)、共濟失調；優先單一藥、不可自行停藥。<b>癲癇重積狀態</b>=發作>5分鐘或兩次間意識未恢復，最常見誘因<b>自行停藥</b>；急救先ABC給氧＋靜脈短效抗癲癇藥(lorazepam)。</p>"},"N9失智譫妄與認知障礙":{"title":"失智、譫妄與認知障礙 複習講義","html":"<h3>一、譫妄 vs 失智</h3><p><b>譫妄</b>=急性快速發作、波動、注意力障礙、<b>可逆</b>(去除感染/藥物/缺氧/電解質誘因)，好發老人術後重症；護理促進定向、控痛、建立信任、<b>避免物理約束</b>。<b>失智</b>=慢性、進行性、不可逆。</p><h3>二、阿茲海默氏症</h3><p>慢性不可逆退化、病理為「神經纖維糾結＋老年(類澱粉)斑塊」。記憶喪失「先短期後長期」；分期：早期(健忘期，近期記憶減退)→<b>中期(混亂期，走失、妄想、定向喪失、生活需協助)</b>→末期(失智期，完全依賴)。藥物memantine(NMDA拮抗劑)、donepezil延緩但不治癒。</p><h3>三、評估與護理</h3><p><b>MMSE</b>(滿分30，評認知非意識；意識用GCS)受教育程度影響。護理：簡化環境、<b>減少</b>過度刺激、時鐘日曆與記事本助定向、幻覺不爭辯、安全下鼓勵自理ADL、用低音調緩慢溝通、日間補水(晚餐後勿多水防夜間混亂)。</p>"},"N10中樞神經感染與退化性疾病":{"title":"中樞神經感染與退化性疾病 複習講義","html":"<h3>一、腦膜炎</h3><p>腦膜刺激徵：頸僵硬、<b>Brudzinski徵、Kernig徵陽性</b>，併發燒頭痛畏光。<b>細菌性</b>CSF：混濁、白血球↑、<b>蛋白質增加、葡萄糖減少</b>(細菌耗糖)；<b>病毒性</b>多自限、葡萄糖正常、以淋巴球為主、採症狀療法(抗生素無效)。疑IICP不宜貿然腰椎穿刺(防腦疝)。</p><h3>二、普利昂疾病(狂牛症/新型庫賈氏病)</h3><p>與牛海綿狀腦病(BSE)有關，致病為「<b>普利昂蛋白(prion)</b>」異常摺疊(非Negri body，Negri body是狂犬病特徵)；vCJD好發較年輕、病程較長，初期常以焦慮妄想等精神症狀表現，後進展失智、肌陣攣、運動失調。</p>"},"N11腦瘤":{"title":"腦瘤 複習講義","html":"<h3>一、分類與定位</h3><p>惡性度最高、預後最差＝<b>多形性神經膠母細胞瘤(GBM, grade IV)</b>；腦膜瘤(好發女性)、腦下垂體腺瘤、神經瘤多良性。轉移性腦瘤常來自<b>肺癌、乳癌</b>。葉定位：額葉(人格、注意、偏癱)、頂葉(感覺、失認)、枕葉(視野缺損)、小腦(平衡失調)。視交叉壓迫→雙顳側偏盲；CN II壓迫→眼盲；複視為CN III/IV/VI受壓(非CN V)。</p><h3>二、治療</h3><p>手術＋放療(術後約2週、傷口癒合後、<b>分次</b>照射)＋化療。<b>伽馬刀(立體定位放射手術)</b>：用鈷-60伽馬射線(非碘)、適用<3cm、<b>無切口無流血無痛、不需引流、腫瘤數週至數月才縮小</b>。類固醇(Decadron)主要<b>減輕血管性腦水腫</b>。</p><h3>三、特殊</h3><p>腦下垂體中風＝腺瘤於蝶鞍出血/腫脹使鞍內壓上升；腦下垂體切除(經蝶竇)術後抬床頭、觀察尿崩(低血容)、IICP、CSF鼻漏。</p>"},"N12神經系統評估與診斷檢查及其他":{"title":"神經系統評估與診斷檢查 複習講義","html":"<h3>一、意識評估(GCS)</h3><p>睜眼E(4自動/3呼喚/2疼痛/1無)、語言V(5定向/4混亂/3不當字/2聲音/1無)、運動M(6遵令/5定位/4回縮/3去皮質/2去大腦/1無)；運動取<b>最佳</b>反應、總分≤8昏迷。插管語言以T、眼水腫無法睜眼以C標註。</p><h3>二、腦神經與反射</h3><p>顏面神經CN VII(皺眉閉眼吹口哨)；角膜反射=CN V(傳入)＋CN VII(傳出)；吞嚥=CN VII/IX/X。<b>腦幹反射</b>：瞳孔對光、角膜、作嘔、<b>頭眼反射(洋娃娃眼)/眼前庭(溫熱)試驗</b>——正常時眼球向頭轉「相反方向」移動(腦幹完整)。Hoffmann反射陽性=上運動神經元徵。小腦病變=Romberg陽性、tandem步態異常。</p><h3>三、診斷檢查護理</h3><p><b>MRI</b>無輻射但<b>心臟節律器/金屬植入物禁忌</b>；含碘顯影劑CT/血管攝影須問碘過敏、簽同意、多喝水。<b>腰椎穿刺</b>L3~4或L4~5(脊髓末端以下)、最常見併發症<b>姿勢性頭痛</b>、術後去枕平躺多喝水、疑IICP不宜做。<b>腦血管攝影</b>術後穿刺側制動數小時、觀察肢體循環、不可立即下床。EEG前洗頭不擦髮油、停抗痙攣藥24~48h、不需NPO。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^N(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n3_neuro_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
