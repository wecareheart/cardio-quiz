und":"斷指重接(replantation):強適應症—「拇指、多指、小孩任一指、手掌/手腕/前臂、無法接受外觀缺損之單指(遠端)」;「相對不適合/最不適當—成人單一手指於 zone II(屈指淺肌近端)截斷、多段(multiple level)截斷、嚴重碾壓/污染、缺血過久」。斷指保存:乾紗布包覆→密封袋→置冰水(間接低溫,「勿直接泡水/冰」致浸潤壞死);傷處紗布加壓止血(勿綁紮)。缺血耐受:有肌肉部位熱缺血短;手指(無肌肉)熱缺血約 6–12 小時、冷缺血約 12–24 小時。","options":{"A":"2 小時偏短。","B":"4 小時偏短。","C":"(給分)8 小時。","D":"★正確(本題答案):約 12 小時。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"105020-55":{"quick":"冷缺血(間接低溫保存)最長 D:約 24 小時(本題多重答案 C/D 均給分)。","detail":{"background":"斷指重接(replantation):強適應症—「拇指、多指、小孩任一指、手掌/手腕/前臂、無法接受外觀缺損之單指(遠端)」;「相對不適合/最不適當—成人單一手指於 zone II(屈指淺肌近端)截斷、多段(multiple level)截斷、嚴重碾壓/污染、缺血過久」。斷指保存:乾紗布包覆→密封袋→置冰水(間接低溫,「勿直接泡水/冰」致浸潤壞死);傷處紗布加壓止血(勿綁紮)。缺血耐受:有肌肉部位熱缺血短;手指(無肌肉)熱缺血約 6–12 小時、冷缺血約 12–24 小時。","options":{"A":"4 小時偏短。","B":"8 小時偏短。","C":"(給分)12 小時。","D":"★正確(本題答案):約 24 小時。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"105100-10":{"quick":"錯在 A:CTS 受壓為「正中神經」,非橈神經。","detail":{"background":"腕隧道症候群(CTS):「正中神經」於腕橫韌帶下受壓。症狀—拇/食/中指及無名指橈側麻痛、夜間痛醒、甩手改善;曲腕加重;嚴重致魚際肌(正中神經支配:拇對掌肌、拇外展短肌、拇屈短肌淺頭)萎縮無力,但「拇內收肌(尺神經)不受影響」。診斷靠「神經傳導/肌電(電生理)」確定;Tinel/Phalen(腕彎曲)陽性。治療:副木→類固醇→「切斷腕橫韌帶」減壓(嚴重或保守無效)。並非一定有魚際肌萎縮。","options":{"A":"★錯誤(本題答案):為正中神經。","B":"正確:Tinel 陽性。","C":"正確:魚際肌萎縮代表嚴重運動壓迫。","D":"正確:神經傳導可確診。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"107080-60":{"quick":"錯在 C:屈指肌腱合併指動脈損傷,「不」必先做動脈吻合再縫肌腱(順序非絕對、多先處理肌腱/骨架)。","detail":{"background":"手指肌腱與畸形:鎚狀指(mallet finger)=遠端伸肌腱斷裂、DIP 下垂無法伸直;鈕扣指(boutonnière)=PIP 屈曲+DIP 過伸(中央束斷);天鵝頸(swan-neck)=PIP 過伸+DIP 屈曲。屈指肌腱五區(zone II 為「無人區」),zone I/II 有滑膜鞘;腕隧道為 zone IV;屈肌腱斷裂宜「7 天內縫合」,6 週後難直接縫合,術後復健重要。gamekeeper/skier thumb=拇指 MCP「尺側」副韌帶傷。","options":{"A":"正確:儘量 7 天內縫合。","B":"正確:6 週後幾乎無法直接縫合。","C":"★錯誤(本題答案):非必須先動脈吻合。","D":"正確:術後復健重要。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"108080-12":{"quick":"腕掌橈側刀傷、無法握拳+指腹麻木→C:正中神經受損。","detail":{"background":"腕隧道症候群(CTS):「正中神經」於腕橫韌帶下受壓。症狀—拇/食/中指及無名指橈側麻痛、夜間痛醒、甩手改善;曲腕加重;嚴重致魚際肌(正中神經支配:拇對掌肌、拇外展短肌、拇屈短肌淺頭)萎縮無力,但「拇內收肌(尺神經)不受影響」。診斷靠「神經傳導/肌電(電生理)」確定;Tinel/Phalen(腕彎曲)陽性。治療:副木→類固醇→「切斷腕橫韌帶」減壓(嚴重或保守無效)。並非一定有魚際肌萎縮。","options":{"A":"橈神經主管伸展。","B":"指神經為單指感覺。","C":"★正確(本題答案):正中神經。","D":"尺神經管小指側。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"108080-13":{"quick":"中指掌指關節基部結節+彈響→B:扳機指(trigger finger)。","detail":{"background":"狹窄性腱鞘炎:de Quervain 病(「媽媽手」)=腕背「第一」伸肌腔室(外展拇長肌 APL＋伸拇短肌 EPB)發炎,Finkelstein 試驗陽性,診斷靠臨床(非 X 光)。板機指(trigger finger)=屈指肌腱於「A1 滑車」狹窄、卡頓彈響、可致指關節無法完全伸直。交叉症候群於第一、二腔室交叉處。腕背六腔室:1=APL+EPB、2=ECRL+ECRB、3=EPL、4=EDC+EIP、5=EDM、6=ECU(尺側伸腕肌)。","options":{"A":"鎚狀指為末節下垂。","B":"★正確(本題答案):扳機指。","C":"de Quervain 在腕橈側。","D":"鈕扣指為 PIP 屈曲。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"108080-58":{"quick":"de Quervain 第一腔室肌腱含 D:外展拇長肌(APL)(與 EPB)。","detail":{"background":"狹窄性腱鞘炎:de Quervain 病(「媽媽手」)=腕背「第一」伸肌腔室(外展拇長肌 APL＋伸拇短肌 EPB)發炎,Finkelstein 試驗陽性,診斷靠臨床(非 X 光)。板機指(trigger finger)=屈指肌腱於「A1 滑車」狹窄、卡頓彈響、可致指關節無法完全伸直。交叉症候群於第一、二腔室交叉處。腕背六腔室:1=APL+EPB、2=ECRL+ECRB、3=EPL、4=EDC+EIP、5=EDM、6=ECU(尺側伸腕肌)。","options":{"A":"ECRB 在第 2 腔室。","B":"ECRL 在第 2 腔室。","C":"EPL 在第 3 腔室。","D":"★正確(本題答案):外展拇長肌(第 1)。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"109020-14":{"quick":"de Quervain 為 A:第一個腕背伸肌腔室之狹窄性腱鞘炎。","detail":{"background":"狹窄性腱鞘炎:de Quervain 病(「媽媽手」)=腕背「第一」伸肌腔室(外展拇長肌 APL＋伸拇短肌 EPB)發炎,Finkelstein 試驗陽性,診斷靠臨床(非 X 光)。板機指(trigger finger)=屈指肌腱於「A1 滑車」狹窄、卡頓彈響、可致指關節無法完全伸直。交叉症候群於第一、二腔室交叉處。腕背六腔室:1=APL+EPB、2=ECRL+ECRB、3=EPL、4=EDC+EIP、5=EDM、6=ECU(尺側伸腕肌)。","options":{"A":"★正確(本題答案):第一腔室。","B":"第 2 腔室為 ECRL/ECRB。","C":"第 3 腔室為 EPL。","D":"第 5 腔室為 EDM。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"109080-15":{"quick":"後骨間神經(PIN)傷「不會」無力者 B:橈側伸腕長肌(ECRL,由橈神經本幹支配,非 PIN)。","detail":{"background":"後骨間神經(PIN)=橈神經深支,支配「伸指總肌(EDC)、伸拇長/短肌、外展拇長肌、伸食指/小指肌、尺側伸腕肌」;「橈側伸腕長肌(ECRL)由橈神經『本幹』在分支前支配」,故 PIN 損傷時 ECRL 不受影響(仍可伸腕但偏橈側)。","options":{"A":"外展拇長肌受 PIN 支配。","B":"★正確(本題答案):ECRL 由橈神經本幹,不受 PIN 影響。","C":"伸拇長肌受 PIN 支配。","D":"伸指總肌受 PIN 支配。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"110080-13":{"quick":"錯在 B:併指最常見於「中指-無名指(第三蹼)」,非拇指-食指。","detail":{"background":"先天性併指症(syndactyly):可單獨或合併症候群(Poland、Apert);「最常見第三蹼(中-無名指)」;胚胎指分化涉細胞凋亡與 BMP-4;完全型指蹼重建用背側皮瓣(如苜蓿葉)+植皮。複合型(complex)含骨性黏合。","options":{"A":"正確:可合併 Poland 症候群。","B":"★錯誤(本題答案):最常見第三蹼(中-無名指)。","C":"正確:涉細胞凋亡與 BMP-4。","D":"正確:完全型用背側皮瓣重建指蹼。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"110080-14":{"quick":"最不適合斷指重接 B:單一手指的多段(multiple level)截斷。","detail":{"background":"斷指重接(replantation):強適應症—「拇指、多指、小孩任一指、手掌/手腕/前臂、無法接受外觀缺損之單指(遠端)」;「相對不適合/最不適當—成人單一手指於 zone II(屈指淺肌近端)截斷、多段(multiple level)截斷、嚴重碾壓/污染、缺血過久」。斷指保存:乾紗布包覆→密封袋→置冰水(間接低溫,「勿直接泡水/冰」致浸潤壞死);傷處紗布加壓止血(勿綁紮)。缺血耐受:有肌肉部位熱缺血短;手指(無肌肉)熱缺血約 6–12 小時、冷缺血約 12–24 小時。","options":{"A":"拇指為強適應症。","B":"★正確(本題答案):單指多段截斷最不適合。","C":"幼兒斷指為強適應症。","D":"遠端指節可考慮。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"110080-53":{"quick":"拇/食/中指麻痛、夜醒、甩手改善→A:腕隧道症候群。","detail":{"background":"腕隧道症候群(CTS):「正中神經」於腕橫韌帶下受壓。症狀—拇/食/中指及無名指橈側麻痛、夜間痛醒、甩手改善;曲腕加重;嚴重致魚際肌(正中神經支配:拇對掌肌、拇外展短肌、拇屈短肌淺頭)萎縮無力,但「拇內收肌(尺神經)不受影響」。診斷靠「神經傳導/肌電(電生理)」確定;Tinel/Phalen(腕彎曲)陽性。治療:副木→類固醇→「切斷腕橫韌帶」減壓(嚴重或保守無效)。並非一定有魚際肌萎縮。","options":{"A":"★正確(本題答案):腕隧道症候群。","B":"肘隧道為尺神經(小指側)。","C":"頸神經根病變有頸痛/反射異常。","D":"脊髓病變有上運動神經元徵象。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"110080-55":{"quick":"確診 CTS 之陽性檢查 C:手腕彎曲測試(Phalen’s test)。","detail":{"background":"腕隧道症候群(CTS):「正中神經」於腕橫韌帶下受壓。症狀—拇/食/中指及無名指橈側麻痛、夜間痛醒、甩手改善;曲腕加重;嚴重致魚際肌(正中神經支配:拇對掌肌、拇外展短肌、拇屈短肌淺頭)萎縮無力,但「拇內收肌(尺神經)不受影響」。診斷靠「神經傳導/肌電(電生理)」確定;Tinel/Phalen(腕彎曲)陽性。治療:副木→類固醇→「切斷腕橫韌帶」減壓(嚴重或保守無效)。並非一定有魚際肌萎縮。","options":{"A":"反射過度為上運動神經元。","B":"肘彎曲測試為肘隧道。","C":"★正確(本題答案):Phalen’s test。","D":"Spurling 測試為頸神經根。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"110080-58":{"quick":"Bennett 骨折移位最可能由 D:外展拇長肌(APL)牽拉所致。","detail":{"background":"Bennett 骨折=拇指掌骨基部關節內骨折併脫位;近端骨塊由掌側韌帶固定,「遠端掌骨幹被外展拇長肌(APL)牽拉」向橈、近、背側移位;治療需復位固定。","options":{"A":"非 ECRB。","B":"非 ECRL。","C":"非 EPL。","D":"★正確(本題答案):外展拇長肌(APL)。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"111020-23":{"quick":"正確為 B:CTS 手術為切斷腕橫韌帶(transverse carpal ligament)減壓。","detail":{"background":"腕隧道症候群(CTS):「正中神經」於腕橫韌帶下受壓。症狀—拇/食/中指及無名指橈側麻痛、夜間痛醒、甩手改善;曲腕加重;嚴重致魚際肌(正中神經支配:拇對掌肌、拇外展短肌、拇屈短肌淺頭)萎縮無力,但「拇內收肌(尺神經)不受影響」。診斷靠「神經傳導/肌電(電生理)」確定;Tinel/Phalen(腕彎曲)陽性。治療:副木→類固醇→「切斷腕橫韌帶」減壓(嚴重或保守無效)。並非一定有魚際肌萎縮。","options":{"A":"錯:曲腕(非伸展)加重。","B":"★正確(本題答案):切斷腕橫韌帶。","C":"錯:不一定有魚際肌萎縮。","D":"錯:應先副木保守再手術。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"111080-15":{"quick":"正確為 C(①②④):屈指肌腱可分五區、zone I/II/IV 有滑膜鞘、腕隧道為第四區;③(無 paratendon 處癒合較快)錯。","detail":{"background":"手指肌腱與畸形:鎚狀指(mallet finger)=遠端伸肌腱斷裂、DIP 下垂無法伸直;鈕扣指(boutonnière)=PIP 屈曲+DIP 過伸(中央束斷);天鵝頸(swan-neck)=PIP 過伸+DIP 屈曲。屈指肌腱五區(zone II 為「無人區」),zone I/II 有滑膜鞘;腕隧道為 zone IV;屈肌腱斷裂宜「7 天內縫合」,6 週後難直接縫合,術後復健重要。gamekeeper/skier thumb=拇指 MCP「尺側」副韌帶傷。","options":{"A":"僅①④:漏②。","B":"僅①③④:含③(錯)。","C":"★正確(本題答案):①②④。","D":"①②③④:含③(錯)。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"113020-61":{"quick":"最不適當斷指重接 D:單指多段(single finger multiple level)截斷。","detail":{"background":"斷指重接(replantation):強適應症—「拇指、多指、小孩任一指、手掌/手腕/前臂、無法接受外觀缺損之單指(遠端)」;「相對不適合/最不適當—成人單一手指於 zone II(屈指淺肌近端)截斷、多段(multiple level)截斷、嚴重碾壓/污染、缺血過久」。斷指保存:乾紗布包覆→密封袋→置冰水(間接低溫,「勿直接泡水/冰」致浸潤壞死);傷處紗布加壓止血(勿綁紮)。缺血耐受:有肌肉部位熱缺血短;手指(無肌肉)熱缺血約 6–12 小時、冷缺血約 12–24 小時。","options":{"A":"拇指截肢為強適應症。","B":"多指截肢為強適應症。","C":"小孩斷指為強適應症。","D":"★正確(本題答案):單指多段截斷最不適當。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"113070-14":{"quick":"遠端伸肌腱斷裂造成 A:鎚狀指(mallet finger)。","detail":{"background":"手指肌腱與畸形:鎚狀指(mallet finger)=遠端伸肌腱斷裂、DIP 下垂無法伸直;鈕扣指(boutonnière)=PIP 屈曲+DIP 過伸(中央束斷);天鵝頸(swan-neck)=PIP 過伸+DIP 屈曲。屈指肌腱五區(zone II 為「無人區」),zone I/II 有滑膜鞘;腕隧道為 zone IV;屈肌腱斷裂宜「7 天內縫合」,6 週後難直接縫合,術後復健重要。gamekeeper/skier thumb=拇指 MCP「尺側」副韌帶傷。","options":{"A":"★正確(本題答案):鎚狀指。","B":"天鵝頸畸形不同。","C":"鈕扣指為中央束斷。","D":"gamekeeper 為拇指尺側韌帶。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"113070-61":{"quick":"不在腕隧道中者 D:尺側屈腕肌(flexor carpi ulnaris,止於豌豆骨、不過腕隧道)。","detail":{"background":"腕隧道內容物:正中神經＋9 條肌腱(屈指淺肌 4、屈指深肌 4、屈拇長肌 1);「尺側屈腕肌(FCU)」止於豌豆骨,「不通過腕隧道」。","options":{"A":"屈拇長肌在腕隧道。","B":"食指屈指淺肌在腕隧道。","C":"無名指屈指深肌在腕隧道。","D":"★正確(本題答案):尺側屈腕肌不在腕隧道。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"114020-14":{"quick":"錯在 C:gamekeeper thumb 為拇指 MCP「尺側」副韌帶受損(非橈側)。","detail":{"background":"手指肌腱與畸形:鎚狀指(mallet finger)=遠端伸肌腱斷裂、DIP 下垂無法伸直;鈕扣指(boutonnière)=PIP 屈曲+DIP 過伸(中央束斷);天鵝頸(swan-neck)=PIP 過伸+DIP 屈曲。屈指肌腱五區(zone II 為「無人區」),zone I/II 有滑膜鞘;腕隧道為 zone IV;屈肌腱斷裂宜「7 天內縫合」,6 週後難直接縫合,術後復健重要。gamekeeper/skier thumb=拇指 MCP「尺側」副韌帶傷。","options":{"A":"正確:天鵝頸=PIP 過伸+DIP 屈曲。","B":"正確:鈕扣指=PIP 屈曲+DIP 過伸。","C":"★錯誤(本題答案):gamekeeper 為尺側副韌帶。","D":"正確:板機指為屈肌腱狹窄性腱鞘炎。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"114020-58":{"quick":"最適當 D:斷指處出血以紗布「加壓止血」。","detail":{"background":"斷指重接(replantation):強適應症—「拇指、多指、小孩任一指、手掌/手腕/前臂、無法接受外觀缺損之單指(遠端)」;「相對不適合/最不適當—成人單一手指於 zone II(屈指淺肌近端)截斷、多段(multiple level)截斷、嚴重碾壓/污染、缺血過久」。斷指保存:乾紗布包覆→密封袋→置冰水(間接低溫,「勿直接泡水/冰」致浸潤壞死);傷處紗布加壓止血(勿綁紮)。缺血耐受:有肌肉部位熱缺血短;手指(無肌肉)熱缺血約 6–12 小時、冷缺血約 12–24 小時。","options":{"A":"錯:勿泡開水(浸潤壞死),應乾紗布包。","B":"錯:不可直接放袋(需保護+間接低溫)。","C":"錯:不可直接泡水。","D":"★正確(本題答案):紗布加壓止血。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"114070-16":{"quick":"「非」絕對適應症 D:成人單一手指於屈指淺肌近端(zone II)截斷(功能預後差)。","detail":{"background":"斷指重接(replantation):強適應症—「拇指、多指、小孩任一指、手掌/手腕/前臂、無法接受外觀缺損之單指(遠端)」;「相對不適合/最不適當—成人單一手指於 zone II(屈指淺肌近端)截斷、多段(multiple level)截斷、嚴重碾壓/污染、缺血過久」。斷指保存:乾紗布包覆→密封袋→置冰水(間接低溫,「勿直接泡水/冰」致浸潤壞死);傷處紗布加壓止血(勿綁紮)。缺血耐受:有肌肉部位熱缺血短;手指(無肌肉)熱缺血約 6–12 小時、冷缺血約 12–24 小時。","options":{"A":"強適應症:多指截斷。","B":"強適應症:拇指截斷。","C":"強適應症:小孩任一指。","D":"★正確(本題答案):成人單指 zone II 近端截斷。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"114070-61":{"quick":"月狀骨缺血壞死(Kienböck)最不適當 A:橈骨『延長』術(關節高度調整應為橈骨縮短/尺骨延長)。","detail":{"background":"Kienböck 病(月狀骨缺血壞死):治療依分期—關節高度調整(尺負變異者「橈骨縮短或尺骨延長」減月狀骨負荷)、頭狀骨縮短、帶血管骨移植、晚期月狀骨切除+部分腕融合/近端腕骨列切除。「橈骨『延長』」會增加月狀骨負荷,最不適當。","options":{"A":"★最不適當(本題答案):橈骨延長(增負荷)。","B":"適當:頭狀骨縮短。","C":"適當:帶血管自體骨移植。","D":"適當:月狀骨切除+部分腕融合。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"115020-2":{"quick":"錯在 D:滑液囊腫不「好發於 A2 滑車」(屈肌腱鞘囊腫多在 A1);典型在腕背/腕掌/DIP。","detail":{"background":"滑液囊腫(ganglion cyst)好發:①腕背(最常見,與舟月韌帶相關)②腕掌側(近橈動脈)③DIP 黏液囊腫(mucous cyst,與骨刺/退化相關)④屈肌腱鞘囊腫(A1 滑車區,握物痛)。A2 滑車非典型好發處。","options":{"A":"正確:腕背最常見、與舟月韌帶相關。","B":"正確:腕掌側近橈動脈。","C":"正確:DIP 黏液囊腫。","D":"★錯誤(本題答案):非好發於 A2 滑車。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"115020-32":{"quick":"錯在 D:碾壓肢體重建順序應「骨骼先於神經」(先骨架穩定→血管→肌腱/神經),非神經優先。","detail":{"background":"嚴重碾壓肢體(mangled extremity)處理優先序:①生命優先於肢體;②血流(revascularization)儘速恢復;③反覆清創去除壞死/污染;④「骨骼固定(穩定支架)→血管→肌腱→神經」重建。神經重建不優先於骨骼。","options":{"A":"正確:生命優先於肢體。","B":"正確:血管重建。","C":"正確:反覆清創。","D":"★錯誤(本題答案):骨骼應先於神經重建。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"115020-33":{"quick":"最適當 C:板機指病變可導致指關節無法完全伸展(卡頓鎖住)。","detail":{"background":"狹窄性腱鞘炎:de Quervain 病(「媽媽手」)=腕背「第一」伸肌腔室(外展拇長肌 APL＋伸拇短肌 EPB)發炎,Finkelstein 試驗陽性,診斷靠臨床(非 X 光)。板機指(trigger finger)=屈指肌腱於「A1 滑車」狹窄、卡頓彈響、可致指關節無法完全伸直。交叉症候群於第一、二腔室交叉處。腕背六腔室:1=APL+EPB、2=ECRL+ECRB、3=EPL、4=EDC+EIP、5=EDM、6=ECU(尺側伸腕肌)。","options":{"A":"錯:de Quervain 影響第一腔室(非第二)。","B":"錯:交叉症候群於第一、二腔室交叉處(非 A1)。","C":"★正確(本題答案):板機指可致無法完全伸展。","D":"錯:de Quervain 診斷靠臨床(Finkelstein),非 X 光。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"115020-62":{"quick":"最不適當 C:併指「較常發生於第三蹼」,非第四蹼。","detail":{"background":"先天性併指症:單純型(僅皮膚黏合)、複合型(含骨性黏合);最常「第三蹼(中-無名指)」,第一蹼(拇-食)最少;手術分指+植皮重建指蹼。","options":{"A":"正確:複合型含骨黏合。","B":"正確:皆有皮膚黏合。","C":"★最不適當(本題答案):較常第三蹼,非第四蹼。","D":"正確:第一蹼較少發生。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"106080-10":{"quick":"唇顎裂(本題官方多重答案,ABCD 均給分):多科團隊照護、約 14% 合併其他畸形、唇修復約 3 月。","detail":{"background":"顏面外傷與唇顎裂:顏面外傷先評估「大出血/顱內出血/氣道」;嚴重鼻眼篩(NOE)或顱底骨折「避免鼻氣管插管」(恐插入顱內),用口氣管或氣切。眼眶底骨折→「下直肌(inferior rectus)卡住」致眼球上轉受限(blow-out)、眶下緣骨折,須眼眶 CT。鼻部外傷查鼻骨骨折,「鼻中膈血腫須即刻引流」(否則中膈壞死/鞍鼻)。頭皮分五層(SCALP);頭皮裂傷出血多,以「縫合結紮」止血。顏面骨折多「消腫後擇期」復位固定,非一律立即手術。唇顎裂(最常見顏面先天異常):rule of 10s;時程—唇黏合 1–2 月、唇及初步鼻修復約 3 月、顎修復約 9–12 月、齒槽植骨 9–11 歲、唇/鼻修正學齡前,「鼻整形定型待骨骼成熟(青春期後)」。顎裂術後最常見併發症=瘻管,其次語言/腭咽閉鎖不全。多科團隊照護。","options":{"A":"(給分)1234。","B":"(給分)2345。","C":"(給分)135。","D":"(給分)145。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"107080-17":{"quick":"錯在 B:嚴重鼻眼篩(NOE)/顱底骨折應「避免鼻氣管插管」(恐插入顱內)。","detail":{"background":"顏面外傷與唇顎裂:顏面外傷先評估「大出血/顱內出血/氣道」;嚴重鼻眼篩(NOE)或顱底骨折「避免鼻氣管插管」(恐插入顱內),用口氣管或氣切。眼眶底骨折→「下直肌(inferior rectus)卡住」致眼球上轉受限(blow-out)、眶下緣骨折,須眼眶 CT。鼻部外傷查鼻骨骨折,「鼻中膈血腫須即刻引流」(否則中膈壞死/鞍鼻)。頭皮分五層(SCALP);頭皮裂傷出血多,以「縫合結紮」止血。顏面骨折多「消腫後擇期」復位固定,非一律立即手術。唇顎裂(最常見顏面先天異常):rule of 10s;時程—唇黏合 1–2 月、唇及初步鼻修復約 3 月、顎修復約 9–12 月、齒槽植骨 9–11 歲、唇/鼻修正學齡前,「鼻整形定型待骨骼成熟(青春期後)」。顎裂術後最常見併發症=瘻管,其次語言/腭咽閉鎖不全。多科團隊照護。","options":{"A":"正確:前額骨折查前額竇/顱底。","B":"★錯誤(本題答案):NOE/顱底骨折避免鼻氣管插管。","C":"正確:上下頷骨折不一定需氣切。","D":"正確:下頷骨折強調穩定內固定+咬合。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"108030-19":{"quick":"錯在 C:唇顎裂手術非因「吸入性肺炎」於 3–6 週提早手術(唇約 3 月、顎約 9–12 月)。","detail":{"background":"顏面外傷與唇顎裂:顏面外傷先評估「大出血/顱內出血/氣道」;嚴重鼻眼篩(NOE)或顱底骨折「避免鼻氣管插管」(恐插入顱內),用口氣管或氣切。眼眶底骨折→「下直肌(inferior rectus)卡住」致眼球上轉受限(blow-out)、眶下緣骨折,須眼眶 CT。鼻部外傷查鼻骨骨折,「鼻中膈血腫須即刻引流」(否則中膈壞死/鞍鼻)。頭皮分五層(SCALP);頭皮裂傷出血多,以「縫合結紮」止血。顏面骨折多「消腫後擇期」復位固定,非一律立即手術。唇顎裂(最常見顏面先天異常):rule of 10s;時程—唇黏合 1–2 月、唇及初步鼻修復約 3 月、顎修復約 9–12 月、齒槽植骨 9–11 歲、唇/鼻修正學齡前,「鼻整形定型待骨骼成熟(青春期後)」。顎裂術後最常見併發症=瘻管,其次語言/腭咽閉鎖不全。多科團隊照護。","options":{"A":"正確:最常見顏面先天異常。","B":"正確:家族傾向+孕期藥物/感染/吸菸有關。","C":"★錯誤(本題答案):非 3–6 週提早手術。","D":"正確:顎裂術後最常見併發症為瘻管。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"108080-17":{"quick":"錯在 B:頭皮持續出血最好以「縫合結紮」止血(頭皮血供豐富),非僅加壓+輸血。","detail":{"background":"顏面外傷與唇顎裂:顏面外傷先評估「大出血/顱內出血/氣道」;嚴重鼻眼篩(NOE)或顱底骨折「避免鼻氣管插管」(恐插入顱內),用口氣管或氣切。眼眶底骨折→「下直肌(inferior rectus)卡住」致眼球上轉受限(blow-out)、眶下緣骨折,須眼眶 CT。鼻部外傷查鼻骨骨折,「鼻中膈血腫須即刻引流」(否則中膈壞死/鞍鼻)。頭皮分五層(SCALP);頭皮裂傷出血多,以「縫合結紮」止血。顏面骨折多「消腫後擇期」復位固定,非一律立即手術。唇顎裂(最常見顏面先天異常):rule of 10s;時程—唇黏合 1–2 月、唇及初步鼻修復約 3 月、顎修復約 9–12 月、齒槽植骨 9–11 歲、唇/鼻修正學齡前,「鼻整形定型待骨骼成熟(青春期後)」。顎裂術後最常見併發症=瘻管,其次語言/腭咽閉鎖不全。多科團隊照護。","options":{"A":"正確:頭皮分五層(SCALP)。","B":"★錯誤(本題答案):應縫合結紮止血。","C":"正確:4–8 cm² 缺損可用局部皮瓣/組織擴張。","D":"正確:大缺損可游離皮瓣顯微重建。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"109020-15":{"quick":"錯在 C:眼球上轉受限是「下直肌(inferior rectus)」卡在眼眶底骨折,非上直肌。","detail":{"background":"顏面外傷與唇顎裂:顏面外傷先評估「大出血/顱內出血/氣道」;嚴重鼻眼篩(NOE)或顱底骨折「避免鼻氣管插管」(恐插入顱內),用口氣管或氣切。眼眶底骨折→「下直肌(inferior rectus)卡住」致眼球上轉受限(blow-out)、眶下緣骨折,須眼眶 CT。鼻部外傷查鼻骨骨折,「鼻中膈血腫須即刻引流」(否則中膈壞死/鞍鼻)。頭皮分五層(SCALP);頭皮裂傷出血多,以「縫合結紮」止血。顏面骨折多「消腫後擇期」復位固定,非一律立即手術。唇顎裂(最常見顏面先天異常):rule of 10s;時程—唇黏合 1–2 月、唇及初步鼻修復約 3 月、顎修復約 9–12 月、齒槽植骨 9–11 歲、唇/鼻修正學齡前,「鼻整形定型待骨骼成熟(青春期後)」。顎裂術後最常見併發症=瘻管,其次語言/腭咽閉鎖不全。多科團隊照護。","options":{"A":"正確:可能眶下緣骨折。","B":"正確:可能眼眶底骨折。","C":"★錯誤(本題答案):為下直肌卡住。","D":"正確:需眼眶 CT。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"109020-16":{"quick":"錯在 B:鼻中膈血腫(septal hematoma)應「即刻引流」,非保守等吸收(否則中膈壞死/鞍鼻)。","detail":{"background":"顏面外傷與唇顎裂:顏面外傷先評估「大出血/顱內出血/氣道」;嚴重鼻眼篩(NOE)或顱底骨折「避免鼻氣管插管」(恐插入顱內),用口氣管或氣切。眼眶底骨折→「下直肌(inferior rectus)卡住」致眼球上轉受限(blow-out)、眶下緣骨折,須眼眶 CT。鼻部外傷查鼻骨骨折,「鼻中膈血腫須即刻引流」(否則中膈壞死/鞍鼻)。頭皮分五層(SCALP);頭皮裂傷出血多,以「縫合結紮」止血。顏面骨折多「消腫後擇期」復位固定,非一律立即手術。唇顎裂(最常見顏面先天異常):rule of 10s;時程—唇黏合 1–2 月、唇及初步鼻修復約 3 月、顎修復約 9–12 月、齒槽植骨 9–11 歲、唇/鼻修正學齡前,「鼻整形定型待骨骼成熟(青春期後)」。顎裂術後最常見併發症=瘻管,其次語言/腭咽閉鎖不全。多科團隊照護。","options":{"A":"正確:疑鼻骨骨折可 X 光。","B":"★錯誤(本題答案):中膈血腫須即刻引流。","C":"正確:鼻部分皮膚/支撐/黏膜內襯三層。","D":"正確:鼻唇/前額旁正中皮瓣用於鼻重建。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"111020-25":{"quick":"錯在 C:顏面骨折「非一律立即手術」,多消腫後擇期復位固定。","detail":{"background":"顏面外傷與唇顎裂:顏面外傷先評估「大出血/顱內出血/氣道」;嚴重鼻眼篩(NOE)或顱底骨折「避免鼻氣管插管」(恐插入顱內),用口氣管或氣切。眼眶底骨折→「下直肌(inferior rectus)卡住」致眼球上轉受限(blow-out)、眶下緣骨折,須眼眶 CT。鼻部外傷查鼻骨骨折,「鼻中膈血腫須即刻引流」(否則中膈壞死/鞍鼻)。頭皮分五層(SCALP);頭皮裂傷出血多,以「縫合結紮」止血。顏面骨折多「消腫後擇期」復位固定,非一律立即手術。唇顎裂(最常見顏面先天異常):rule of 10s;時程—唇黏合 1–2 月、唇及初步鼻修復約 3 月、顎修復約 9–12 月、齒槽植骨 9–11 歲、唇/鼻修正學齡前,「鼻整形定型待骨骼成熟(青春期後)」。顎裂術後最常見併發症=瘻管,其次語言/腭咽閉鎖不全。多科團隊照護。","options":{"A":"正確:先評估大出血/顱內出血。","B":"正確:大出血指>3 單位或 Hct<29%。","C":"★錯誤(本題答案):非確認骨折即立即手術。","D":"正確:撞眼眶可致失明/視神經壓迫/眼壓升高。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"111080-16":{"quick":"錯在 D:唇/鼻「修正(revision)」時程—定型鼻整形宜「待骨骼成熟(青春期後)」,非一律 5 歲前完成。","detail":{"background":"顏面外傷與唇顎裂:顏面外傷先評估「大出血/顱內出血/氣道」;嚴重鼻眼篩(NOE)或顱底骨折「避免鼻氣管插管」(恐插入顱內),用口氣管或氣切。眼眶底骨折→「下直肌(inferior rectus)卡住」致眼球上轉受限(blow-out)、眶下緣骨折,須眼眶 CT。鼻部外傷查鼻骨骨折,「鼻中膈血腫須即刻引流」(否則中膈壞死/鞍鼻)。頭皮分五層(SCALP);頭皮裂傷出血多,以「縫合結紮」止血。顏面骨折多「消腫後擇期」復位固定,非一律立即手術。唇顎裂(最常見顏面先天異常):rule of 10s;時程—唇黏合 1–2 月、唇及初步鼻修復約 3 月、顎修復約 9–12 月、齒槽植骨 9–11 歲、唇/鼻修正學齡前,「鼻整形定型待骨骼成熟(青春期後)」。顎裂術後最常見併發症=瘻管,其次語言/腭咽閉鎖不全。多科團隊照護。","options":{"A":"正確:唇黏合 1–2 月。","B":"正確:唇及初步鼻修復 3–6 月。","C":"正確:顎修復 10–12 月。","D":"★錯誤(本題答案):定型鼻修正待骨骼成熟。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"102030-22":{"quick":"正確為 A:血管瘤會退化(involute),血管畸形不會退化。","detail":{"background":"血管異常(Mulliken 分類):①血管瘤(hemangioma,「腫瘤」)—出生後增生、約 1 歲內快速增生後「約 12–18 個月起退化(involution)」、多數數年內消退、女>男(約 3:1)、增生期肥大細胞增加;②血管畸形(malformation)—與生俱來、「不會自行退化」、隨體成長(微靜脈/靜脈/淋巴/動靜脈型)。AVM 治療以「栓塞+切除」(非硬化劑為最佳)。球狀血管瘤(glomus tumor)好發「手指(甲下)」、劇痛/冷敏。","options":{"A":"★正確(本題答案):血管瘤退化、畸形不退化。","B":"錯:血管瘤女>男(約 3:1)。","C":"錯:肥大細胞於血管瘤增生期增加。","D":"錯:非兩者都壓迫骨頭。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"105100-19":{"quick":"血管瘤約 D:12–18 個月開始退化。","detail":{"background":"血管異常(Mulliken 分類):①血管瘤(hemangioma,「腫瘤」)—出生後增生、約 1 歲內快速增生後「約 12–18 個月起退化(involution)」、多數數年內消退、女>男(約 3:1)、增生期肥大細胞增加;②血管畸形(malformation)—與生俱來、「不會自行退化」、隨體成長(微靜脈/靜脈/淋巴/動靜脈型)。AVM 治療以「栓塞+切除」(非硬化劑為最佳)。球狀血管瘤(glomus tumor)好發「手指(甲下)」、劇痛/冷敏。","options":{"A":"1 個月仍增生期。","B":"3–6 月增生期。","C":"6–9 月多仍增生。","D":"★正確(本題答案):12–18 個月起退化。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"106080-12":{"quick":"錯在 C:臉部切口須「平行」皮膚皺紋/鬆弛張力線(非垂直)。","detail":{"background":"皮膚癌與疤痕:①基底細胞癌(BCC)—最常見、日曬部位(臉/鼻)、珍珠樣/蠟狀光澤、表面末梢血管擴張、可中央潰瘍、極少轉移;②鱗狀細胞癌(SCC)；③黑色素瘤(melanoma)—ABCDE,可發生於除掌蹠外各處(淺層擴散型最常見);切片可用切取式(incisional)、預後依厚度,放療非等同手術。先天黑色素痣(CMN):20–49.9 cm 大型、>50 cm 巨大,大/巨大型惡性轉化風險高於小型。疤痕瘤(keloid)—好發「鎖骨以上(耳/臉/上胸/肩/上背)」、深膚色人種、盛行率高、難預防、療效不彰。臉部切口應「平行皮膚鬆弛張力線(RSTL)/皺紋」、消死腔、細縫線。拉皮後細紋以「分段式 CO2 雷射(ablative)」。抽脂腫脹液(tumescent)因稀釋+腎上腺素,lidocaine 安全上限可達約 35 mg/kg(甚至更高)。","options":{"A":"正確:切口須詳細計畫。","B":"正確:須平行鬆弛張力線。","C":"★錯誤(本題答案):應平行皺紋,非垂直。","D":"正確:消死腔、用細縫線。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"107080-16":{"quick":"日曬鼻尖、珍珠/蠟狀光澤+末梢血管擴張+潰瘍→A:基底細胞癌(BCC)。","detail":{"background":"皮膚癌與疤痕:①基底細胞癌(BCC)—最常見、日曬部位(臉/鼻)、珍珠樣/蠟狀光澤、表面末梢血管擴張、可中央潰瘍、極少轉移;②鱗狀細胞癌(SCC)；③黑色素瘤(melanoma)—ABCDE,可發生於除掌蹠外各處(淺層擴散型最常見);切片可用切取式(incisional)、預後依厚度,放療非等同手術。先天黑色素痣(CMN):20–49.9 cm 大型、>50 cm 巨大,大/巨大型惡性轉化風險高於小型。疤痕瘤(keloid)—好發「鎖骨以上(耳/臉/上胸/肩/上背)」、深膚色人種、盛行率高、難預防、療效不彰。臉部切口應「平行皮膚鬆弛張力線(RSTL)/皺紋」、消死腔、細縫線。拉皮後細紋以「分段式 CO2 雷射(ablative)」。抽脂腫脹液(tumescent)因稀釋+腎上腺素,lidocaine 安全上限可達約 35 mg/kg(甚至更高)。","options":{"A":"★正確(本題答案):基底細胞癌。","B":"鱗狀細胞癌多角化/潰瘍。","C":"黑色素瘤為色素病灶。","D":"默克細胞癌罕見、快速。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"109080-19":{"quick":"正確為 B:此型黑色素瘤可發生於「除手腳外」全身皮膚(肢端型才在掌蹠)。","detail":{"background":"皮膚癌與疤痕:①基底細胞癌(BCC)—最常見、日曬部位(臉/鼻)、珍珠樣/蠟狀光澤、表面末梢血管擴張、可中央潰瘍、極少轉移;②鱗狀細胞癌(SCC)；③黑色素瘤(melanoma)—ABCDE,可發生於除掌蹠外各處(淺層擴散型最常見);切片可用切取式(incisional)、預後依厚度,放療非等同手術。先天黑色素痣(CMN):20–49.9 cm 大型、>50 cm 巨大,大/巨大型惡性轉化風險高於小型。疤痕瘤(keloid)—好發「鎖骨以上(耳/臉/上胸/肩/上背)」、深膚色人種、盛行率高、難預防、療效不彰。臉部切口應「平行皮膚鬆弛張力線(RSTL)/皺紋」、消死腔、細縫線。拉皮後細紋以「分段式 CO2 雷射(ablative)」。抽脂腫脹液(tumescent)因稀釋+腎上腺素,lidocaine 安全上限可達約 35 mg/kg(甚至更高)。","opti ,"options":{"A":"僅13。","B":"23。","C":"★正確(本題答案):124 為錯誤敘述。","D":"134。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"112080-15":{"quick":"球狀血管瘤最常見於 C:手指(甲下)。","detail":{"background":"血管異常(Mulliken 分類):①血管瘤(hemangioma,「腫瘤」)—出生後增生、約 1 歲內快速增生後「約 12–18 個月起退化(involution)」、多數數年內消退、女>男(約 3:1)、增生期肥大細胞增加;②血管畸形(malformation)—與生俱來、「不會自行退化」、隨體成長(微靜脈/靜脈/淋巴/動靜脈型)。AVM 治療以「栓塞+切除」(非硬化劑為最佳)。球狀血管瘤(glomus tumor)好發「手指(甲下)」、劇痛/冷敏。","options":{"A":"髖關節非好發。","B":"手肘非好發。","C":"★正確(本題答案):手指甲下。","D":"頭頸部非好發。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"112080-17":{"quick":"拉皮後去細紋最適 C:分段式二氧化碳雷射(fractional CO2,消融式)。","detail":{"background":"皮膚癌與疤痕:①基底細胞癌(BCC)—最常見、日曬部位(臉/鼻)、珍珠樣/蠟狀光澤、表面末梢血管擴張、可中央潰瘍、極少轉移;②鱗狀細胞癌(SCC)；③黑色素瘤(melanoma)—ABCDE,可發生於除掌蹠外各處(淺層擴散型最常見);切片可用切取式(incisional)、預後依厚度,放療非等同手術。先天黑色素痣(CMN):20–49.9 cm 大型、>50 cm 巨大,大/巨大型惡性轉化風險高於小型。疤痕瘤(keloid)—好發「鎖骨以上(耳/臉/上胸/肩/上背)」、深膚色人種、盛行率高、難預防、療效不彰。臉部切口應「平行皮膚鬆弛張力線(RSTL)/皺紋」、消死腔、細縫線。拉皮後細紋以「分段式 CO2 雷射(ablative)」。抽脂腫脹液(tumescent)因稀釋+腎上腺素,lidocaine 安全上限可達約 35 mg/kg(甚至更高)。","options":{"A":"Nd:YAG 非首選去細紋。","B":"脈衝染料雷射治血管病灶。","C":"★正確(本題答案):分段式 CO2 雷射。","D":"紅寶石雷射用於色素。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"114020-17":{"quick":"抽脂腫脹液 lidocaine 安全上限 D:約 35 mg/kg(稀釋+腎上腺素延緩吸收)。","detail":{"background":"皮膚癌與疤痕:①基底細胞癌(BCC)—最常見、日曬部位(臉/鼻)、珍珠樣/蠟狀光澤、表面末梢血管擴張、可中央潰瘍、極少轉移;②鱗狀細胞癌(SCC)；③黑色素瘤(melanoma)—ABCDE,可發生於除掌蹠外各處(淺層擴散型最常見);切片可用切取式(incisional)、預後依厚度,放療非等同手術。先天黑色素痣(CMN):20–49.9 cm 大型、>50 cm 巨大,大/巨大型惡性轉化風險高於小型。疤痕瘤(keloid)—好發「鎖骨以上(耳/臉/上胸/肩/上背)」、深膚色人種、盛行率高、難預防、療效不彰。臉部切口應「平行皮膚鬆弛張力線(RSTL)/皺紋」、消死腔、細縫線。拉皮後細紋以「分段式 CO2 雷射(ablative)」。抽脂腫脹液(tumescent)因稀釋+腎上腺素,lidocaine 安全上限可達約 35 mg/kg(甚至更高)。","options":{"A":"7 mg/kg 為含腎上腺素一般局麻上限,非腫脹液。","B":"15 mg/kg 偏低。","C":"20 mg/kg 偏低。","D":"★正確(本題答案):約 35 mg/kg。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Mulliken & Young Vascular Anomalies","NCCN Melanoma Guideline"]}},"101030-4":{"quick":"錯在 D:眼球上轉受限是「下直肌(inferior rectus)」卡在眼眶底骨折,非上直肌。","detail":{"background":"眼眶底「打擊性骨折(blow-out fracture)」:鈍力使眶內壓驟升、眶底(上頷竇頂)塌陷,「下直肌/下斜肌或眶脂被夾住」→眼球「上轉受限」、複視;常合併眶下緣骨折、眶下神經(infraorbital nerve)受傷致頰部麻木、結膜下出血;以「眼眶 CT」確診;若持續複視/明顯內陷/大缺損需手術修復。","options":{"A":"正確:可能眼眶底打擊性骨折。","B":"正確:需眼眶 CT 確診。","C":"正確:可合併眶下神經受傷。","D":"★錯誤(本題答案):為下直肌卡住,非上直肌。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"101030-9":{"quick":"處置 D:增加輸液提高尿量、維持每小時尿量 75–130 mL 以上,沖出肌球蛋白、預防阻塞性腎病變。","detail":{"background":"橫紋肌溶解/肌球蛋白尿(暗紅/茶色尿、尿潛血陽性但無紅血球)見於電傷、擠壓、大面積燒傷:處置為「大量輸液、維持高尿量(成人約 1–2 mL/kg/hr,常要求 75–130 mL/hr 以上)」沖洗腎小管、必要時鹼化尿液與利尿,以預防肌球蛋白阻塞性腎病變(acute kidney injury)。不可減少輸液或限制尿量。","options":{"A":"錯:不可減少輸液。","B":"焦痂切開術用於整圈全層燒傷壓迫,非此處置重點。","C":"錯:不可維持尿量於 65 mL 以下(應提高)。","D":"★正確(本題答案):增加並維持高尿量沖出肌球蛋白。"},"sources":["Total Burn Care (Herndon)","Sabiston Textbook of Surgery, 21e","ATLS 10th Edition"]}},"101030-36":{"quick":"Grade IV(深及骨頭);最好以 D:清創後「局部臀大肌皮瓣」重建。","detail":{"background":"壓瘡分級:I 壓不反白發紅、II 部分皮層、III 全皮層達皮下脂肪、「IV 深及肌肉/骨/支持結構」。薦/臀部深部壓瘡(III/IV)清創後以「局部肌皮瓣(臀大肌)」重建提供耐壓墊襯與血供;換藥/植皮不耐壓、深部缺損不適合,游離皮瓣非首選(局部組織充足)。","options":{"A":"錯:Grade IV 非僅換藥。","B":"錯:深及骨非植皮可解。","C":"分級正確但薦/臀壓瘡不需顯微游離皮瓣。","D":"★正確(本題答案):Grade IV,局部臀大肌皮瓣重建。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","NPUAP/EPUAP Pressure Injury Staging"]}}},TO=["傷口癒合與慢性傷口‧壓瘡", "燒燙傷", "皮瓣與植皮重建", "手外科", "顏面外傷與唇顎裂", "皮膚軟組織腫瘤‧血管病變‧美容"],LEC={"傷口癒合與慢性傷口‧壓瘡":{"title":"傷口癒合與慢性傷口‧壓瘡","html":"\n<p><b>傷口癒合三期(序):</b>①<b>止血/發炎期</b>—血小板先到啟動(PDGF/TGF-β)、嗜中性球(最初發炎主細胞)→巨噬細胞(關鍵調控);②<b>增生期</b>—纖維母細胞(自局部遷移)合成膠原(先第三型後第一型)、血管新生、上皮化;③<b>成熟/重塑期</b>—第三型轉第一型、抗張力上升、肌纖維母細胞(約第 6 天)收縮。順序=凝血→發炎→增生→成熟。第一型膠原佔成人皮膚約 80%、合成在 RER。</p>\n<p><b>壓瘡分級:</b>I 壓不反白發紅;II 部分皮層(水泡);III 全皮層達皮下脂肪;<b>IV 深及肌肉/骨</b>。成因以「壓力(>~32 mmHg 持續;坐骨 60 mmHg、>1 小時)」為主。深部(III/IV)以「皮瓣(臀大肌)」重建。</p>\n<p><b>慢性不癒合傷口:</b>最常見原因<b>感染</b>;糖尿病足能否癒合「足背/後脛動脈搏動(灌流)」最具決定性;污染傷口(溝水)→重複清創+抗生素、延遲縫合;維生素 C(非 B12)缺乏impair膠原。<b>NPWT(負壓)</b>促肉芽、可縮小傷口。SSI 為手術部位 30 天(植入物 90 天)內感染,遠端肺炎不算。</p>\n"},"燒燙傷":{"title":"燒燙傷","html":"\n<p><b>面積(9 的規則):</b>頭頸 9、各上肢 9、軀幹前 18/後 18、各下肢 18、會陰 1。<b>深度:</b>淺二度(壓會反白、痛)、深二度(蒼白、不反白)、三度(皮革焦痂、無痛)、四度(及肌肉/骨)。</p>\n<p><b>輸液 Parkland:</b><b>4 mL×kg×%TBSA 乳酸林格(LR),24 小時,前 8 小時給一半</b>;只算二度以上;目標尿量成人 0.5 mL/kg/hr。膠質(白蛋白)多於 24 小時後加;<b>小孩<20 kg/<2 歲加葡萄糖</b>(防低血糖)。Curreri 熱量=25×kg+40×%TBSA。</p>\n<p><b>吸入性灼傷:</b>臉燻黑/鼻毛燒焦/聲啞/含碳痰提示,「缺乏不能排除」;支氣管鏡為診斷標準(CXR 早期常正常);上呼吸道水腫/低血氧→<b>及早插管</b>。<b>電傷</b>深入深部組織(神經/血管/肌肉)、橫紋肌溶解→肌球蛋白腎病變。</p>\n<p><b>感染與處置:</b>早期菌叢革蘭氏陽性(葡萄球菌)、後期陰性/黴菌;不給全身預防抗生素;<b>mafenide(磺胺米隆)穿透焦痂但致代謝性酸中毒</b>,silver sulfadiazine 不穿透焦痂。<b>焦痂切開術(escharotomy)只切焦痂達皮下脂肪(非筋膜)</b>,整圈全層肢體/胸廓壓迫之適應症。ABA 灼傷中心:二三度>10%、三度、臉手腳會陰關節、化學/電/吸入傷。</p>\n"},"皮瓣與植皮重建":{"title":"皮瓣與植皮重建","html":"\n<p><b>皮瓣:</b>隨意皮瓣(血供=皮下血管網、長寬比受限)、軸式皮瓣(命名皮動脈)、<b>穿通枝皮瓣(保留供區肌肉功能=優點;分離難/變異大=缺點)</b>。<b>重建階梯:</b>直接縫合→植皮→局部皮瓣→肌皮瓣→游離皮瓣;小腿遠 1/3 露骨→游離皮瓣;老人局部皮瓣較不可靠。</p>\n<p><b>Mathes-Nahai 肌肉血供五型:</b>I 單一(腓腸肌)、II 主+次(股薄肌)、III 兩主、<b>IV 節段(縫匠肌,最不適游離)</b>、V 一主+次節段(闊背肌、胸大肌)。下頷重建首選<b>腓骨皮瓣</b>(腓動脈、pedicle 長、可植牙)。胸大肌瓣由胸肩峰動脈。</p>\n<p><b>植皮:</b>分層(易存活、次發收縮多)vs 全層(初級收縮多、次發收縮少、美觀好、難存活);<b>真皮愈厚→次發攣縮愈少</b>。存活:浸潤期(0–48h)→黏合期(最脆弱)→血管再生。頭皮多毛不宜作全層供皮。</p>\n<p><b>顯微/游離皮瓣:</b>吻合多端對端;肌肉熱缺血耐受短(2–3h);栓塞多在術後 48h 內;抗凝劑非常規必用、不顯著提高成功率(技術最關鍵)。橈側前臂皮瓣=筋膜皮瓣 B 類(septocutaneous)。</p>\n"},"手外科":{"title":"手外科","html":"\n<p><b>腕隧道症候群(CTS):</b><b>正中神經</b>受壓;拇/食/中指麻痛、夜醒、甩手改善、曲腕加重;嚴重致魚際肌萎縮(拇對掌/外展短/屈短肌),「拇內收肌(尺神經)不受影響」;不一定有萎縮。診斷靠<b>電生理</b>;Phalen/Tinel 陽性;治療副木→切斷腕橫韌帶。</p>\n<p><b>狹窄性腱鞘炎:</b><b>de Quervain(媽媽手)=第一腔室(APL+EPB)</b>,Finkelstein 陽性、診斷靠臨床;<b>板機指=A1 滑車</b>、彈響、可致無法完全伸直。腕背六腔室:1 APL/EPB、2 ECRL/ECRB、3 EPL、4 EDC/EIP、5 EDM、6 ECU。</p>\n<p><b>肌腱/畸形:</b><b>鎚狀指=遠端伸肌腱斷</b>(DIP 下垂);鈕扣指=PIP 屈+DIP 過伸;天鵝頸=PIP 過伸+DIP 屈;gamekeeper thumb=拇 MCP「尺側」副韌帶。屈指肌腱五區(zone II 無人區);腕隧道=zone IV;7 天內縫合。後骨間神經(PIN)傷時 ECRL(橈神經本幹)不受影響。Bennett 骨折由 APL 牽拉移位。</p>\n<p><b>斷指重接:</b>強適應症—拇指、多指、小孩、手掌/腕;<b>最不適當—成人單指 zone II、單指多段、嚴重碾壓</b>。保存:乾紗布包→密封袋→置冰水(勿直接泡水)。手指熱缺血約 6–12h、冷缺血 12–24h。碾壓肢體序:命優先→血流→清創→<b>骨骼先於神經</b>。Kienböck(月狀骨壞死):橈骨『延長』最不適當。</p>\n"},"顏面外傷與唇顎裂":{"title":"顏面外傷與唇顎裂","html":"\n<p><b>顏面外傷:</b>先評估大出血/顱內出血/氣道;<b>嚴重鼻眼篩(NOE)/顱底骨折避免鼻氣管插管</b>(恐入顱);<b>眼眶底骨折→下直肌卡住、眼球上轉受限(blow-out)</b>,須眼眶 CT;<b>鼻中膈血腫須即刻引流</b>(否則壞死/鞍鼻);頭皮裂傷以縫合結紮止血;顏面骨折多消腫後擇期復位(非一律立即手術)。</p>\n<p><b>唇顎裂(最常見顏面先天異常):</b>rule of 10s;時程—唇黏合 1–2 月、<b>唇及初步鼻修復約 3 月</b>、顎修復約 9–12 月、齒槽植骨 9–11 歲、<b>定型鼻整形待骨骼成熟(青春期後)</b>。術後最常見併發症=瘻管,次為語言/腭咽閉鎖不全;多科團隊照護;約 14% 合併其他畸形。</p>\n"},"皮膚軟組織腫瘤‧血管病變‧美容":{"title":"皮膚軟組織腫瘤‧血管病變‧美容","html":"\n<p><b>血管異常(Mulliken):</b><b>血管瘤(腫瘤)</b>—出生後增生、約 1 歲內快速增生後<b>12–18 個月起退化</b>、女>男(3:1)、增生期肥大細胞增加;<b>血管畸形</b>—與生俱來、<b>不會退化</b>、隨成長(AVM 以栓塞+切除,非硬化劑)。球狀血管瘤(glomus)好發<b>手指甲下</b>(劇痛)。</p>\n<p><b>皮膚癌:</b><b>BCC(最常見)</b>—日曬部位、珍珠/蠟狀光澤、末梢血管擴張、可潰瘍、極少轉移;<b>黑色素瘤</b>—可發生除掌蹠外各處、切片可切取式、預後依厚度、放療非等同手術。<b>CMN</b>:20–49.9 cm 大型、>50 cm 巨大,大/巨大型惡變風險高。</p>\n<p><b>疤痕/美容:</b><b>疤痕瘤(keloid)</b>好發「鎖骨以上」(耳/臉/上胸/肩)、深膚色人種、難預防;<b>臉部切口平行皮膚鬆弛張力線(RSTL)/皺紋</b>、消死腔、細縫線;拉皮後細紋用<b>分段式 CO2 雷射</b>;抽脂腫脹液 lidocaine 安全上限約 <b>35 mg/kg</b>。</p>\n"}};

   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_plastic_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'\U0001F44B 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
