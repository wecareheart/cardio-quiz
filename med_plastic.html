e":"","images":[],"_id":"103030-5","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"103030-5","q_num":5,"src":"民國103年第一次","img":""},{"exam_code":"103100","roc_year":103,"exam_round":"第二次","num":19,"stem":"下圖是一位長期臥床的病人,在薦部發現一個傷口且有味道跟滲液,部份肌肉壞死腐爛但沒看到骨頭關節,下列敘述何者正確?1這是stage II 薦部褥瘡,每兩小時勤翻身,睡氣墊床能夠預防變壞發生 2良好的營養狀態,對於傷口的照顧有益 3適當的清創及使用VAC(vaccum assisted closure)設備是讓肉芽組織生長的方法之一 4超過80 mmHg 左右的壓力才有可能造成褥瘡的生成","options":{"A":"13","B":"14","C":"23","D":"24"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"103100-19","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"103100-19","q_num":19,"src":"民國103年第二次","img":""},{"exam_code":"103100","roc_year":103,"exam_round":"第二次","num":39,"stem":"一位56 歲的男性糖尿病患,有糖尿病足來到門診,與醫師討論有沒有可能憑藉換藥使傷口癒合,則下列何項最具決定性?","options":{"A":"抽血檢查HbA1c","B":"安排神經傳導及肌電圖檢查(NCV/EMG)","C":"做細菌培養","D":"檢查足背動脈與後脛動脈有無脈動"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"103100-39","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"103100-39","q_num":39,"src":"民國103年第二次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":6,"stem":"一位58 歲女性糖尿病病人,因跌落水溝造成右小腿撕裂傷,傷口曾浸於水溝水中,下列敘述何者是此傷口最適當的治療方法?","options":{"A":"以生理食鹽水沖洗後縫合傷口","B":"清創(débridement)後縫合傷口","C":"清創後縫合傷口,再給予局部抗生素治療","D":"對傷口重複清創,給予局部或全身性抗生素治療,待控制住感染後再行縫合傷口或植皮"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"104030-6","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"104030-6","q_num":6,"src":"民國104年第一次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":18,"stem":"當褥瘡(pressure ulcer)侵蝕到肌肉及骨頭的時候屬於:","options":{"A":"Stage I","B":"Stage II","C":"Stage III","D":"Stage IV"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"105020-18","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"105020-18","q_num":18,"src":"民國105年第一次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":21,"stem":"關於褥瘡的分級,下列敘述何者錯誤?","options":{"A":"第一級,皮膚完整但出現下壓不會反白的發紅區","B":"第二級,部分皮層缺損,呈現表淺性潰瘍,臨床上可看到擦傷、水泡、淺的火山口狀傷口","C":"第三級,部分皮層缺損,可看到組織被破壞與壞死","D":"第四級,全皮層缺損,可看到組織被嚴重破壞與壞死,壞死深及肌肉層、骨骼、支持性結構"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"105100-21","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"105100-21","q_num":21,"src":"民國105年第二次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":78,"stem":"罹患糖尿病10餘年的林老太太最近不小心腳部受了傷,傷口一直沒有癒合,在診所換藥1個多星期傷口仍然沒有起色,因此診所醫師建議林老太太到醫院住院治療。住院後被診斷為蜂窩性組織炎,經過抗生素以及傷口換藥治療,傷口並沒有進步,反而有擴大的趨勢,醫師建議林老太太應該要進行清創治療,但林老太太聽到要開刀就有點害怕,拒絕了清創治療的建議。又經過1個多星期,連小腿都出現嚴重紅腫的狀況,醫師建議林老太太需要進行截肢手術,否則傷口繼續擴大,恐怕有生命危險。林老太太考慮了很久,只答應願意接受清創手術,但不想接受截肢手術。手術中,醫師為了傷口將來的癒合,幫林老太太進行了截肢手術。依照現行法規,你認為醫師的做法是否正確?","options":{"A":"正確,醫師是為了搶救林老太太的生命,因此雖然違反了她的意願,但符合她的最佳利益","B":"正確,醫師依照醫療常規,進行了必要的截肢手術","C":"不正確,林老太太明確地表明了不想接受截肢手術,依照安寧緩和醫療條例,應該尊重其意願","D":"不正確,林老太太明確表明了不想接受截肢手術,而該手術也並非緊急手術,依此醫師不應該違反其意願而進行截肢手術"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106020-78","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"106020-78","q_num":78,"src":"民國106年第一次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":12,"stem":"負壓輔助傷口治療(negative pressure-assisted wound therapy, NPWT)是傷口治療方法之一,下列敘述何者錯誤?","options":{"A":"NPWT可以改善傷口微環境(microenvironment),可促進傷口癒合","B":"NPWT利用機器反覆壓縮放鬆(compression and relaxation)的原理,刺激傷口組織,可增加生長因子的釋放","C":"NPWT可適用於多種開放性傷口","D":"NPWT治療,不會改變傷口的面積"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107080-12","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"107080-12","q_num":12,"src":"民國107年第二次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":18,"stem":"關於各種不同的生物工程皮膚替代物(bioengineered skin substitutes)的優點與缺點,下列敘述何者錯誤?","options":{"A":"培養的異體角質細胞(allogeneic keratinocyte graft)有傷口覆蓋與促進癒合的優點","B":"培養的異體角質細胞(allogeneic keratinocyte graft)缺點是脆弱且無法避免傷口攣縮","C":"生物工程真皮替代物(bioengineered dermal replacement)大部分只能當作暫時性的傷口覆蓋","D":"生物工程真皮替代物(bioengineered dermal replacement)優點是具有優異的引導上皮化(re-epithelialization)的能力"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"108030-18","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"108030-18","q_num":18,"src":"民國108年第一次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":4,"stem":"對於慢性不癒合傷口的敘述,下列何者錯誤?","options":{"A":"最常見的原因是傷口感染","B":"放射線的暴露會造成內皮細胞(endothelial cell)的傷害和endarteritis,導致組織萎縮,纖維化和癒合延緩","C":"Vitamin B12缺乏會妨礙單核細胞的活化和fibronectin沉積,然後影響細胞的黏著和妨礙TGF-β receptors","D":"糖尿病會影響傷口癒合的每一個步驟"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"108080-4","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"108080-4","q_num":4,"src":"民國108年第二次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":49,"stem":"70歲老先生因中風長期臥床,在他的薦骨部有一面積10×8公分深可見骨的褥瘡(pressure sore)(如下圖),造成褥瘡的最主要原因是:","options":{"A":"摩擦(friction)","B":"壓力(pressure)","C":"剪力(shearing force)","D":"傷口衛生照顧不良(poor hygiene)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"108080-49","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"108080-49","q_num":49,"src":"民國108年第二次","img":""},{"exam_code":"109080","roc_year":109,"exam_round":"第二次","num":6,"stem":"有關傷口癒合過程的敘述,下列何者錯誤?","options":{"A":"組織受傷後首先進入發炎期(inflammatory phase),在此時期因血小板凝集後產生血管擴張物質,而導致血管管壁滲透力增加,增加血漿滲入細胞外組織,同時產生趨化因子(chemokine),使得發炎細胞如中性白血球移往受傷組織","B":"於增生期(proliferative phase)時,大部分的纖維母細胞(fibroblast)會經由巨噬細胞產生的趨化作用,自受傷處以外的組織隨血液循環運送至受傷部位,並於受傷組織中合成膠原蛋白(collagen)","C":"肌纖維母細胞(myofibroblast)於組織受傷後約6天形成,主要功能為分泌 α-平滑肌肌動蛋白(α-smoothmuscle actin)並形成應力纖維(stress fiber),於成熟期(maturation phase)負責傷口攣縮現象","D":"於傷口癒合過程中發生的基質(matrix)合成,第三型膠原蛋白較第一型膠原蛋白較早形成"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109080-6","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"109080-6","q_num":6,"src":"民國109年第二次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":13,"stem":"請選擇出急性傷口癒合過程(wound healing)正確的順序:1重塑期(remodeling) 2增生期(proliferation) 3成熟期(maturation) 4發炎期(inflammation) 5凝血(coagulation)","options":{"A":"1→2→3→4→5","B":"4→5→3→2→1","C":"5→4→1→2→3","D":"5→4→2→3→1"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110020-13","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"110020-13","q_num":13,"src":"民國110年第一次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":14,"stem":"傷口癒合的機轉中, 下列何者最先出現並扮演啟動癒合的角色?","options":{"A":"血小板(platelet)","B":"紅血球(RBC)","C":"巨噬細胞(macrophage)","D":"膠原蛋白(collagen)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"110020-14","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"110020-14","q_num":14,"src":"民國110年第一次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":5,"stem":"傷口癒合過程中,下列細胞出現於傷口的先後順序(time course)何者正確?","options":{"A":"neutrophil→macrophage→fibroblast→lymphocyte","B":"neutrophil→fibroblast→lymphocyte→macrophage","C":"macrophage→lymphocyte→fibroblast→neutrophil","D":"lymphocyte→fibroblast→neutrophil→macrophage"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"110080-5","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"110080-5","q_num":5,"src":"民國110年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":15,"stem":"下半身麻痺的病人坐在輪椅上,常有機會發生坐骨部壓瘡,在坐姿時坐骨隆凸部位受到多少壓力及最少持續多久壓力時間較容易開始發生壓瘡?","options":{"A":"60 mmHg,0.5小時以上","B":"60 mmHg,1小時以上","C":"30 mmHg,0.5小時以上","D":"30 mmHg,1小時以上"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"110080-15","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"110080-15","q_num":15,"src":"民國110年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":4,"stem":"造成傷口癒合延遲的最常見原因為:","options":{"A":"傷口感染","B":"縫合技巧不佳","C":"傷口流血","D":"病人本身之合併症"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112080-4","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"112080-4","q_num":4,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":5,"stem":"下列何種狀況,不符合「手術部位感染(surgical site infection)」之定義?","options":{"A":"77歲女性,消化性潰瘍穿孔術後,因呼吸衰竭持續使用呼吸器,於術後第21天發生肺炎與敗血症","B":"45歲男性,長期肝硬化與糖尿病,於接受未置入人工網膜之疝氣修補手術28天後,癒合不良產生分泌物與膿瘍","C":"69歲男性,接受膝關節置換手術11個月後,傷口出現紅腫,皮下穿刺之組織液細菌培養呈現陽性反應","D":"82歲女性,接受經腹腔鏡部分胃切除手術,腹部傷口正常,然而於術後第6天出現劇烈腹痛與發燒,電腦斷層發現腸胃道吻合處有膿瘍形成"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112080-5","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"112080-5","q_num":5,"src":"民國112年第二次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":18,"stem":"蘇老先生四年前中風後即長期臥床,近日家屬發現其臀部有四公分傷口,經整形外科醫師診斷為壓瘡(pressure sore),建議手術治療。術中發現傷口壞死範圍深及骨頭,此褥瘡的深度分級與最好的重建方法各為何?","options":{"A":"Stage II;清創後直接縫合是簡單可行的方法","B":"Stage III;清創後植皮覆蓋傷口","C":"Stage IV;清創後局部臀大肌皮瓣重建術","D":"Stage V;清創後顯微皮瓣重建術"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113070-18","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"113070-18","q_num":18,"src":"民國113年第二次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":77,"stem":"關於傷口處置,下列何者最適當?","options":{"A":"頭皮之傷口,以刮鬍刀剔除比用剪刀剪短毛髮可降低傷口感染率","B":"成人上眼眶的傷口,不應該剃除眉毛,以免毛髮無法生長","C":"傷口縫合後一律開立抗生素","D":"沖洗液加入雙氧水沖洗傷口有更好效果"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"114020-77","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"114020-77","q_num":77,"src":"民國114年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":24,"stem":"傷口癒合期間,不同細胞會分別出現於傷口。下列敘述何者正確?","options":{"A":"淋巴球(lymphocytes)為起始增生期之主要細胞","B":"嗜酸性球(eosinophils)為最初止血期之主要細胞","C":"嗜中性球(neutrophils)為最初發炎期之主要細胞","D":"纖維母細胞(fibroblasts)在傷口癒合最初期即達到數量高峰"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"115020-24","topic_code":"T1","topic":"傷口癒合與慢性傷口‧壓瘡","id":"115020-24","q_num":24,"src":"民國115年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":9,"stem":"承上題,此病患於受傷後第4 小時開始發生小便呈現暗紅色之情況,此時應採取下列何種處置?","options":{"A":"減少靜脈輸液量","B":"於兩側大腿外側進行焦痂切開手術(escharotomy)","C":"維持每小時小便量在65 ml 以下","D":"增加小便量,並維持每小時小便量在75-130 ml 以上"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"101030-9","topic_code":"T2","topic":"燒燙傷","id":"101030-9","q_num":9,"src":"民國101年第一次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":20,"stem":"下列有關electrical burns 之敘述,何者錯誤?","options":{"A":"電流在進入身體後,會走在身體組織中電阻最低的部分,通常是神經、血管和肌肉","B":"皮膚是一個電阻相對高的器官,通常較少受到影響","C":"高壓電電傷與一般的燒傷很類似,較少穿透到深部組織造成傷害","D":"肌肉受傷可能會造成橫紋肌溶解,釋放myoglobin 造成obstructive nephropathy"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"104030-20","topic_code":"T2","topic":"燒燙傷","id":"104030-20","q_num":20,"src":"民國104年第一次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":19,"stem":"20歲、60公斤體重健康大學生,於餐廳打工時不慎打翻熱茶桶。高溫熱茶潑及他的兩側下肢,造成此二肢體全部燙傷起水泡。依據「9的規則」(rule of nines)與「帕克蘭公式」(Parkland formula)估算,下列關於此學生之「燙傷面積」及「受傷後24小時靜脈輸液量」敘述,何者最適當?","options":{"A":"36%體表面積、8,640公撮(miniliters, mL.)晶質溶液(crystalloid)","B":"36%體表面積、3,240公撮晶質溶液(crystalloid)加上1,080公撮膠質溶液(colloid)","C":"45%體表面積、10,8000公撮晶質溶液","D":"45%體表面積、4,050公撮晶質溶液加上1,350公撮膠質溶液"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"105020-19","topic_code":"T2","topic":"燒燙傷","id":"105020-19","q_num":19,"src":"民國105年第一次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":76,"stem":"50歲男性,體重70公斤,被熱水燙傷造成頭頸部、胸部及背部約40%面積的二度燙傷,被送往急診室接受治療,下列處置何者不適當?","options":{"A":"依Parkland公式前8小時給予5.6公升的林格氏乳酸液","B":"給予烤燈避免低體溫","C":"可給予白蛋白(albumin)治療","D":"冷水沖洗約30分鐘"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"105020-76","topic_code":"T2","topic":"燒燙傷","id":"105020-76","q_num":76,"src":"民國105年第一次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":20,"stem":"下列關於燒燙傷深度(burn depths)的判斷,下列敘述何者錯誤?","options":{"A":"國中生到海水浴場玩,被太陽曬傷造成背部發紅及疼痛。發紅的皮膚受到壓迫會變白(blanch to the touch),壓力釋放後又變紅。這是一度燒燙傷","B":"老人家燒熱水洗澡。水太熱又忘了加冷水。一腳踏進浴缸的熱水裡被燙傷。患處皮膚蒼白、起水泡、受到壓迫不變色(donot blanch to touch),但是碰觸尖細物品仍會疼痛(painful to pinprick)。這是淺二度燒燙傷","C":"機車騎士出車禍。小腿遠端內側被灼熱的排氣管壓住造成灼傷。患處皮膚形成不痛的皮革狀焦痂(leathery eschar),這是三度燒燙傷","D":"情侶分手,女方極度沮喪而燒炭自殺。女方昏迷後被發現,送醫成功挽回生命。但患者在燒炭昏迷的過程中,右腳太靠近炭火,連肌肉都被烤焦了。這是四度燒燙傷"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"105100-20","topic_code":"T2","topic":"燒燙傷","id":"105100-20","q_num":20,"src":"民國105年第二次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":20,"stem":"根據American Burn Association所訂,須到灼傷中心住院的情況,下列敘述何者錯誤?","options":{"A":"二及三度燒傷大於10% TBSA","B":"三度燒傷","C":"inhalation injury","D":"5歲以下,50歲以上,二及三度燒傷大於5% TBSA"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106020-20","topic_code":"T2","topic":"燒燙傷","id":"106020-20","q_num":20,"src":"民國106年第一次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":49,"stem":"下圖是一位80歲的病人,體重60公斤,因洗澡跌倒被熱水燙傷,意識清醒下送往急診。請依此回答下列3題:下列敘述那些正確?1建立輸液管道 2此為1~2度燙傷 32~3度燙傷 418%體表面積受傷 59%體表面積受傷","options":{"A":"124","B":"125","C":"134","D":"235"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106080-49","topic_code":"T2","topic":"燒燙傷","id":"106080-49","q_num":49,"src":"民國106年第二次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":78,"stem":"小玉是17歲女學生,與已離婚的媽媽同住,親子關係良好。不幸地家裡發生火災,小玉因為逃生不及,被消防員救出時,全身皮膚有90%的燒燙傷,她媽媽傷心欲絕,在燒傷加護病房外等候,經歷3次清創,看到女兒全身包裹紗布處在鎮靜止痛的無意識狀態,主治醫師向她說明這麼大面積燒傷的感染與敗血症機會及死亡率很高。第4次要再進手術房清創時,媽媽拒絕進一步手術治療,因為她說女兒最愛漂亮,如果看到自己現在的樣子,一定寧可死了算了,於是簽署DNR(不予急救)。下列處置何者不恰當?","options":{"A":"應評估小玉行為能力,若判定有行為能力,則不能因應母親要求不予急救","B":"不論決策者為媽媽或是小玉本人,都應考量此決策是否符合小玉之最大醫療利益","C":"因為小玉沒有完全行為能力,可由媽媽決定不予急救","D":"持續地與小玉媽媽溝通,確認她了解不予急救的意涵與可能後果"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106080-78","topic_code":"T2","topic":"燒燙傷","id":"106080-78","q_num":78,"src":"民國106年第二次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":17,"stem":"40歲健康工人於密閉工廠工作時遭遇火警,逃生通道卻又被雜物堵塞。此工人經過一段時間搬離雜物才脫離火場。現場濃煙密布,他吸入不少煙霧;加上他的臉被燻黑、鼻毛及前額毛髮又被燒焦、兩側上肢也被燒傷,因而來急診求診。關於他的傷勢及醫療處置,下列敘述何者錯誤?","options":{"A":"此病患有可能遭受肺部吸入性灼傷(inhalation injury)","B":"因為此傷患沒有聲音沙啞(hoarseness)、哮喘(wheezing)、或含碳渣痰液(carbonaceoussputum),胸部X光也沒有異常因此不應該立即進行支氣管鏡或氣管插管等侵入性診治。","C":"臨床研究顯示,液體限制(fluid restriction)無法預防吸入性灼傷引起的肺水腫","D":"在後續的治療上,除非有證據顯示肺臟感染,不建議一開始就給予預防性抗生素"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"107020-17","topic_code":"T2","topic":"燒燙傷","id":"107020-17","q_num":17,"src":"民國107年第一次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":13,"stem":"根據Curreri formula,一個50公斤的病人,燒傷面積達70%體表面積,一天所需的卡洛里(calorie)約多少大卡(Kcal)?","options":{"A":"3,050","B":"3,650","C":"4,050","D":"4,550"},"answer":"C","answer_status":"送分","accepted_answers":["A","B","C","D"],"correction_note":"第13題一律給分","images":[],"_id":"107080-13","topic_code":"T2","topic":"燒燙傷","id":"107080-13","q_num":13,"src":"民國107年第二次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":14,"stem":"對於手部燒傷的治療,下列敘述何者錯誤?","options":{"A":"傷口儘早癒合,是避免攣縮最好的方式","B":"需要使用副木(splint),以維持掌指關節伸展(MP joint extension)及指間關節伸展(IP jointextension)","C":"維持手部功能姿勢(functional position),是為了避免伸展肌腱攣縮(extensor tendon contracture)","D":"拇指應維持在外展(abduction)的位置"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"108030-14","topic_code":"T2","topic":"燒燙傷","id":"108030-14","q_num":14,"src":"民國108年第一次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":75,"stem":"一輛校車和卡車對撞後,引起爆炸和火燒車,車內一位6歲男孩被送到急診室,他的眉毛、鼻毛被燒焦,且臉和頸部有大約12% body surface area(BSA)的燒傷,他的聲音沙啞、呼吸快淺,血紅素氧飽合度為70%。此時下列處置何者第一優先?","options":{"A":"動脈氣體分析(arterial blood gas)","B":"胸部X光","C":"給予靜脈輸液","D":"實行氣管內管插管(endotracheal intubation)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"108080-75","topic_code":"T2","topic":"燒燙傷","id":"108080-75","q_num":75,"src":"民國108年第二次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":12,"stem":"在大面積燒燙傷治療中,充分的體液復甦(fluid resuscitation)是避免休克的重要治療。對於30歲、70公斤的男性燒燙傷病人,二度及三度傷口共占體表面積(TBSA)40%,下列處置何者最不適當?","options":{"A":"建立靜脈管線(IV line)開始體液復甦(fluid resuscitation),並插尿管監測尿量","B":"如果按照Parkland formula靜脈輸液是給與lactated Ringer solution,從700cc/hr開始給與","C":"尿量須維持在35 cc/hr 以上","D":"給與lactated Ringer solution 2小時後,尿量突然變少,可再給與albumin,從0.5ml / Kg / % TBSA burn area開始給與"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110020-12","topic_code":"T2","topic":"燒燙傷","id":"110020-12","q_num":12,"src":"民國110年第一次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":12,"stem":"關於燒傷病人焦痂切開術(escharotomy)之敘述,何者錯誤?","options":{"A":"肢體的整圈全層燒燙傷,是手術的適應症","B":"胸廓的全層燒燙傷,造成呼吸困難,是手術的適應症","C":"焦痂切開術(escharotomy)需將筋膜切開","D":"緊急時可以在一般病房病床邊進行(bedside procedure)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"110080-12","topic_code":"T2","topic":"燒燙傷","id":"110080-12","q_num":12,"src":"民國110年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":16,"stem":"22歲的王同學是八仙塵爆的燒傷患者,這次來門診求助主要是因為手腕背側的帶狀疤痕攣縮影響彎曲活動,醫師建議施予simple Z-plasty 疤痕鬆懈手術(如附圖),如果術後預計比原先增加75%的延展長度,應設計多少角度的simple Z-plasty?","options":{"A":"Simple 30°-angle Z-plasty","B":"Simple 45°-angle Z-plasty","C":"Simple 60°-angle Z-plasty","D":"Simple 90°-angle Z-plasty"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"110080-16","topic_code":"T2","topic":"燒燙傷","id":"110080-16","q_num":16,"src":"民國110年第二次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":21,"stem":"關於燒燙傷的傷口感染,下列敘述何者正確?","options":{"A":"全身性預防性抗生素的使用,極為重要","B":"初期的感染菌株,多為革蘭氏(Gram stain)陰性菌","C":"初期的傷口,需要使用有強穿透力的抗生素藥膏,如磺胺銀(silver sulfadiazine)藥膏,以穿透焦痂","D":"磺胺米隆(mafenide acetate 11%)藥膏,可能造成代謝性酸中毒"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111020-21","topic_code":"T2","topic":"燒燙傷","id":"111020-21","q_num":21,"src":"民國111年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":7,"stem":"對於燒傷病人的淨體重損失(loss of lean body mass)相關合併症的發生,下列敘述何者最恰當?","options":{"A":"淨體重損失10%,增加延緩傷口癒合機率","B":"淨體重損失20%,會開始增加降低免疫機能(immune dysfunction)的風險","C":"淨體重損失30%,會開始增加肺炎及壓瘡(pressure sore)的風險","D":"淨體重損失40%,會開始增加脆弱性骨折的風險"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-7","topic_code":"T2","topic":"燒燙傷","id":"112080-7","q_num":7,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":19,"stem":"王同學和同學在KTV歡唱,突然電線走火引起火災。包廂內沙發地毯燃燒,煙霧瀰漫。王同學逃出現場後被送往醫院,發現面部燻黑,有水泡,雙上肢及下肢燒傷。此時如果你是值班外科醫師處理王同學,下列何項錯誤?","options":{"A":"懷疑有吸入性灼傷應照胸部X光,無法確認時再做胸部電腦斷層(CT scan)","B":"嚴重燒傷(severe burn),主要死因之一為吸入性灼傷","C":"上呼吸道有水腫時,即使病人意識清楚,仍要考慮插管治療的必要性","D":"不建議使用預防性抗生素,除非肺部出現感染現象"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112080-19","topic_code":"T2","topic":"燒燙傷","id":"112080-19","q_num":19,"src":"民國112年第二次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":19,"stem":"蔡女士不幸發生瓦斯氣爆燒傷,經救護車送至急診室,急診醫師檢查初步生命跡象穩定,發現燒傷水泡、脫皮範圍在整個雙側上肢、前胸及腹部深二度燒傷,於急診室測量體重為60公斤;依據“Rule of nines”其燒傷面積為何?又根據”Parkland formula”前8小時應給與多少輸液?","options":{"A":"36%;8640 ml乳酸鹽林格氏液(Lactated Ringer's solution)","B":"36%;4320 ml乳酸鹽林格氏液(Lactated Ringer's solution)","C":"27%;3888 ml 5%葡萄糖液(D5W)","D":"45%;6480 ml生理食鹽水(normal saline)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"114020-19","topic_code":"T2","topic":"燒燙傷","id":"114020-19","q_num":19,"src":"民國114年第一次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":19,"stem":"一位28 歲70 公斤的男性被送到急診時,初步評估全身有70%深二度燒傷,需評估前8 小時內體液的補充。根據Parkland formula 下列何者為最佳選擇?","options":{"A":"9,800 mL lactated Ringer(LR)輸液","B":"9,800 mL normal saline(NS)輸液","C":"4,900 mL 5% Dextrose 輸液","D":"4,900 mL lactated Ringer(LR)輸液"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"114070-19","topic_code":"T2","topic":"燒燙傷","id":"114070-19","q_num":19,"src":"民國114年第二次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":35,"stem":"體重小於20 公斤(或小於兩歲)之嚴重燒燙傷孩童,24 小時之輸液復甦(resuscitation),除乳酸林格氏液(Lactated Ringer's solution)外,建議添加下列何者最適當?","options":{"A":"鉀離子","B":"鈉離子","C":"鈣離子","D":"葡萄糖"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-35","topic_code":"T2","topic":"燒燙傷","id":"115020-35","q_num":35,"src":"民國115年第一次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":20,"stem":"脛骨遠端之重建可以用那一塊flap?","options":{"A":"pedicled gastrocnemius flap","B":"游離組織皮瓣移植(free flap transfer)","C":"pedicled extensor digitorum longus","D":"pedicled sartorius muscle flap"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"102110-20","topic_code":"T3","topic":"皮瓣與植皮重建","id":"102110-20","q_num":20,"src":"民國102年第二次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":21,"stem":"下列何種皮瓣不屬於局部皮瓣(local flap)?","options":{"A":"前移皮瓣(advanced flap)","B":"足趾至手指移植(toe to hand transfer)","C":"島型血管莖皮瓣(island-pedicled flap)","D":"臀大肌V-Y 肌皮前移皮瓣(gluteal maximal V-Y musculocutaneous advanced flap)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"102110-21","topic_code":"T3","topic":"皮瓣與植皮重建","id":"102110-21","q_num":21,"src":"民國102年第二次","img":""},{"exam_code":"103030","roc_year":103,"exam_round":"第一次","num":18,"stem":"最常用來重建下頷骨的骨皮瓣包括腓骨(fibula)、髂骨(iliac)、肩胛骨(scapula),下列敘述何者錯誤?","options":{"A":"腓骨皮瓣(fibula osteocutaneous flap)由腓動脈(peroneal artery)供應血流,對皮瓣提供處的後遺症最小","B":"髂骨皮瓣(iliac osteocutaneous flap)對皮瓣提供處的後遺症最小,所能帶的血管根蒂(pedicle)較短","C":"肩胛骨皮瓣(scapula osteocutaneous flap)由肩胛下動脈(subscapular artery)供應血流,可以連同周圍的骨頭、肌肉和皮膚一起取,形成複合式皮瓣","D":"對良性的下頷骨缺損,腓骨皮瓣(fibula osteocutaneous flap)可以合併牙科植體手術(osseointegratedimplantation for dentition or prosthetic anchors)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"103030-18","topic_code":"T3","topic":"皮瓣與植皮重建","id":"103030-18","q_num":18,"src":"民國103年第一次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":21,"stem":"一個隨意皮瓣(random flap)掀起來以後,它的血液供應來自:","options":{"A":"皮下血管網(subdermal plexus)","B":"肌皮穿透枝(musculocutaneous perforators)","C":"直接由主要的動脈(axial artery)供應其血液循環","D":"只靠組織液之滲透供應其所需之營養"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"104030-21","topic_code":"T3","topic":"皮瓣與植皮重建","id":"104030-21","q_num":21,"src":"民國104年第一次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":16,"stem":"重建手術時,小血管的吻合(anastomosis)最常使用的方式是:","options":{"A":"末端與末端吻合(end-to-end anastomosis)","B":"末端與側面的吻合(end-to-side anastomosis)","C":"末端與靜脈移植段(vein graft)之間的吻合","D":"末端與動脈移植段(arterial graft)之間的吻合"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"104090-16","topic_code":"T3","topic":"皮瓣與植皮重建","id":"104090-16","q_num":16,"src":"民國104年第二次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":19,"stem":"關於頭頸部重建,下列敘述何者錯誤?","options":{"A":"胸大肌肌皮瓣(pectoralis major myocutaneous flap)由胸肩峰動脈(thoracoacromialartery)供應血流,可以用來重建鼻咽處的組織缺損","B":"肩胸皮瓣(deltopectoral flap (Bakamjian flap))由內乳動脈(internal mammary artery)的肋間穿通支(intercostal perforating branches)供應血流,目前仍被廣泛應用於頭頸部重建","C":"橈側前臂皮瓣(radial forearm flaps)為目前重建頭頸部軟組織的重要來源","D":"1998年,在顯微手術的輔助下,成功完成第一例的人類異體喉移植"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"104090-19","topic_code":"T3","topic":"皮瓣與植皮重建","id":"104090-19","q_num":19,"src":"民國104年第二次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":20,"stem":"使用局部的轉位皮瓣(local rotational flaps)時有那些注意事項,但何者除外:","options":{"A":"轉位皮瓣的長與寬之比例","B":"縫合後轉位皮瓣周圍所承受的張力","C":"傷口包紮的鬆緊度","D":"縫線的顏色"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"105020-20","topic_code":"T3","topic":"皮瓣與植皮重建","id":"105020-20","q_num":20,"src":"民國105年第一次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":22,"stem":"與顯微組織皮瓣(microvascular free flaps)比較之下,局部皮瓣(local flaps)有下列限制,何者錯誤?","options":{"A":"局部皮瓣(local flaps)的覆蓋範圍是受限制的","B":"局部皮瓣(local flaps)的遠端之血液循環可能不好","C":"在外傷的情況下局部皮瓣(local flaps)可能受傷,不一定可靠","D":"老人的局部皮瓣(local flaps)與年輕病患的局部皮瓣一樣可靠"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"105100-22","topic_code":"T3","topic":"皮瓣與植皮重建","id":"105100-22","q_num":22,"src":"民國105年第二次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":21,"stem":"下列有關microvascular surgery時使用anticoagulant運用的敘述,何者錯誤?","options":{"A":"low dose aspirin的anti-platelet效果不錯","B":"heparin可全身性或局部使用","C":"fibrinolytic agent於microanastomosis thrombosis時有幫忙","D":"使用anticoagulant可使free flap transfer之成功率大量提高"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106020-21","topic_code":"T3","topic":"皮瓣與植皮重建","id":"106020-21","q_num":21,"src":"民國106年第一次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":11,"stem":"軸式皮瓣(axial pattern flap)的血液循環來自:","opt tions":{"A":"血漿浸潤(plasmatic circulation)是指在術後的72小時後,移植的皮膚(grafted skin)將直接吸收養分","B":"屍皮(cadaveric skin)覆蓋是屬於異種(xenograft)移植","C":"常見的手術失敗原因包括血腫、感染,但移植皮膚因位移產生缺失(loss)情況並不多見","D":"移植皮膚的真皮愈厚,愈不會產生傷口疤痕攣縮(scar contracture)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"108030-16","topic_code":"T3","topic":"皮瓣與植皮重建","id":"108030-16","q_num":16,"src":"民國108年第一次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":17,"stem":"在處理一個困難的傷口時,我們常以肌肉皮瓣(muscle flap)來重建缺損,根據 Mathes & Nahai 的分類,以下敘述何者正確?","options":{"A":"臀大肌(gluteus maximus)和腹直肌(rectus abdominis)皮瓣都屬於type II","B":"闊背肌(latissimus dorsi)由單一血管莖供應,屬於type I","C":"適合取較大肌肉來重建缺損的是屬於type I、III、V","D":"股薄肌(gracilis)是屬於type IV,所以只能取一小部分肌肉來重建缺損"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"108030-17","topic_code":"T3","topic":"皮瓣與植皮重建","id":"108030-17","q_num":17,"src":"民國108年第一次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":50,"stem":"承上題,在清創手術治療後,下列何種皮瓣最適宜覆蓋此處褥瘡傷口?","options":{"A":"臀大肌肌皮瓣(gluteus maximus myocutaneous flap)","B":"張闊筋膜肌皮瓣(tensor fascia latae myocutaneous flap)","C":"闊背肌肌皮瓣(latissimus dorsi myocutaneous flap)","D":"腹直肌肌皮瓣(rectus abdominis myocutaneous flap)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"108080-50","topic_code":"T3","topic":"皮瓣與植皮重建","id":"108080-50","q_num":50,"src":"民國108年第二次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":12,"stem":"下列有關skin graft之敘述,何者錯誤?","options":{"A":"skin graft的存活需要經過plasmatic circulation、organization and revascularization","B":"最常見手術失敗的原因是hematoma or seroma accumulation、infection and movement","C":"graft dermis越厚愈會contracture","D":"plasmatic circulation是指在術後48小時內graft直接吸收養分"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"109020-12","topic_code":"T3","topic":"皮瓣與植皮重建","id":"109020-12","q_num":12,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":17,"stem":"有關顯微手術的目的,下列敘述何者錯誤?","options":{"A":"為了轉移遠處的組織(distant tissue)到組織缺損的部位來做重建","B":"為了修補血管之傷害或缺損(vascular injury or vascular defects)","C":"可修補周圍神經(peripheral nerves)","D":"顯微手術通常是用來修補小面積的組織缺損"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"109020-17","topic_code":"T3","topic":"皮瓣與植皮重建","id":"109020-17","q_num":17,"src":"民國109年第一次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":11,"stem":"依據Mathes and Nahai對肌肉皮瓣(muscle flaps)血管供應做分類,下列那一型較少用來做顯微組織移植的肌肉皮瓣?","options":{"A":"第一型","B":"第二型","C":"第三型","D":"第四型"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110020-11","topic_code":"T3","topic":"皮瓣與植皮重建","id":"110020-11","q_num":11,"src":"民國110年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":24,"stem":"下列關於皮膚移植(skin graft)之敘述,何者錯誤?","options":{"A":"部分皮膚移植(split thickness skin graft)取皮時也會包含部分真皮層","B":"全層皮膚移植(full thickness skin graft)取皮時應包含全部的真皮層","C":"全層皮膚移植(full thickness skin graft)較不容易產生次發攣縮(secondary contracture)","D":"頭皮生長快速,毛囊豐富,所以是理想的全層皮膚移植(full thickness skin graft)供皮區"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111020-24","topic_code":"T3","topic":"皮瓣與植皮重建","id":"111020-24","q_num":24,"src":"民國111年第一次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":14,"stem":"顯微組織皮瓣(microvascular free flaps)移植後的術後照護,下列敘述何者錯誤?","options":{"A":"使用抗凝血藥物肝素(heparin)可減少血管栓塞,因而顯著增加皮瓣存活率,已是常規顯微手術必用藥物","B":"大部分的皮瓣移植後栓塞發生在術後48 小時內,這段時間內只要及早發現,救回皮瓣(flap salvage)的機會較高","C":"皮瓣是否存活,一般可以觀察其皮膚顏色變化、微血管充盈時間(capillary refilling time)和針刺後血流的顏色來協助判別","D":"血管縫合太鬆導致中膜(tunica media)外露,也是造成術後栓塞的原因"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"111080-14","topic_code":"T3","topic":"皮瓣與植皮重建","id":"111080-14","q_num":14,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":18,"stem":"最容易造成皮膚移植(skin graft)失敗是在那一期?","options":{"A":"浸潤期(imbibition)","B":"黏合期(inosculation)","C":"血管再生期(revascularization)","D":"增生期(proliferation)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111080-18","topic_code":"T3","topic":"皮瓣與植皮重建","id":"111080-18","q_num":18,"src":"民國111年第二次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":15,"stem":"有關顯微組織皮瓣(microvascular free flaps),下列敘述何者錯誤?","options":{"A":"肌肉可以忍受的熱缺血時間(warm ischemia time)為4~6小時","B":"不論是end-to-end或end-to-side的動脈接合方式,血液成功流通的機率其實差不多","C":"當兩條血管粗細不一樣時,end-to-side anastomoses是一個合適的解決方式","D":"為了預防皮瓣移植過程中發生vasospasm,可將血管的外膜(tunica adventitia)剝除以降低交感神經影響"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112020-15","topic_code":"T3","topic":"皮瓣與植皮重建","id":"112020-15","q_num":15,"src":"民國112年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":16,"stem":"根據Mathes-Nahai classification,下列各種肌肉皮瓣及其所屬類型配對,何者錯誤?","options":{"A":"type I:比目魚肌(gastrocnemius)","B":"type II:股薄肌(gracilis)","C":"type III:胸大肌(pectoralis major)","D":"type IV:縫匠肌(sartorius)"},"answer":"C","answer_status":"多重答案","accepted_answers":["A","C"],"correction_note":"第16題答Ａ或Ｃ者均給分","images":[],"_id":"112080-16","topic_code":"T3","topic":"皮瓣與植皮重建","id":"112080-16","q_num":16,"src":"民國112年第二次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":14,"stem":"肌肉皮瓣(muscle flap)依照血管供應肌肉的方式可分成五種類型,闊背肌肉皮瓣(latissimus dorsimuscle flap)屬於那一類型?","options":{"A":"type II","B":"type III","C":"type IV","D":"type V"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"113020-14","topic_code":"T3","topic":"皮瓣與植皮重建","id":"113020-14","q_num":14,"src":"民國113年第一次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":17,"stem":"關於頭頸部重建,下列敘述何者錯誤?","options":{"A":"頦下皮瓣(submental flap)的供應血管源於頦下動脈(submental artery),為facial artery 的分支之一,可用於口腔內部缺損重建","B":"胸大肌肌皮瓣(pectoralis major myocutaneous flap)由內乳動脈(internal mammary artery)供應血流,可用在全喉切除術(total laryngectomy)後的下咽部重建","C":"胸大肌肌皮瓣(pectoralis major myocutaneous flap)可應用於大血管暴露時,作為salvagereconstructive procedure","D":"鎖骨上皮瓣(supraclavicular flap)由鎖骨上動脈(supraclavicular artery)供應,可應用於臉部或頸部外側,需要做為較薄的皮瓣時使用"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"113020-17","topic_code":"T3","topic":"皮瓣與植皮重建","id":"113020-17","q_num":17,"src":"民國113年第一次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":15,"stem":"橈動脈前臂皮瓣(radial forearm flap)屬於Nahai-Mathes classification中對筋膜皮瓣(fasciocutaneous flap)的那一項分類?","options":{"A":"第A類","B":"第B類","C":"第C類","D":"第D類"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"113070-15","topic_code":"T3","topic":"皮瓣與植皮重建","id":"113070-15","q_num":15,"src":"民國113年第二次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":15,"stem":"下列何者不是穿通枝皮瓣(perforator flaps)的缺點?","options":{"A":"可保留供給區肌肉及肌膜的功能","B":"不易分離單獨的穿通枝血管","C":"穿通枝血管分離增加手術時間","D":"解剖學上血管部位的變異性大且血管較短小,管壁較薄"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"114020-15","topic_code":"T3","topic":"皮瓣與植皮重建","id":"114020-15","q_num":15,"src":"民國114年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":17,"stem":"陳太太因右手拇指及食指、中指常常半夜麻醒,至門診求診,下列何種檢查最能提供確定診斷是「腕隧道症候群(carpal tunnel syndrome)」?","options":{"A":"電生理檢查(Electrophysiology Study, EPS)","B":"核磁共振造影術(MRI)","C":"電腦斷層掃描(CT)","D":"手部超音波檢查(Sonography)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"102030-17","topic_code":"T4","topic":"手外科","id":"102030-17","q_num":17,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_y "img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":61,"stem":"30 歲的卡車司機,因手腕中央疼痛多年,影像學檢查發現月狀骨缺血性壞死。下列治療方式何者最不適當?","options":{"A":"橈骨延長術(radial lengthening)","B":"頭狀骨縮短術(capitate shortening)","C":"帶血管的自體骨移植(vascularized autograft)","D":"月狀骨切除及部分腕關節融合(lunate excision and partial carpal fusion)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"114070-61","topic_code":"T4","topic":"手外科","id":"114070-61","q_num":61,"src":"民國114年第二次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":2,"stem":"關於滑液囊腫(ganglion cyst)的好發位置,下列何者錯誤?","options":{"A":"最常發生於手腕背側,與舟月韌帶(scapholunate ligament)相關","B":"常見於手腕掌側,可能與橈動脈鄰近","C":"常見於手指遠端指間關節(DIP joint),亦稱為mucous cyst","D":"常發生於A2 pulley,可能影響屈指肌腱活動"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-2","topic_code":"T4","topic":"手外科","id":"115020-2","q_num":2,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":32,"stem":"下列處理嚴重碾壓肢體(mangled extremity)優先順序之敘述,何者錯誤?","options":{"A":"生命優先於肢體(life over limbs)","B":"血管重建(revascularization)","C":"反覆清創(repeated debridement)","D":"神經重建優先於骨骼重建(nerve over bone)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-32","topic_code":"T4","topic":"手外科","id":"115020-32","q_num":32,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":33,"stem":"關於狹窄性腱鞘炎(tenosynovitis),下列敘述何者最適當?","options":{"A":"de Quervain 病主要影響第二背側腱鞘區(second dorsal compartment)","B":"交叉症候群(intersection syndrome)的病變主要發生於A1 滑車(A1 pulley)","C":"板機指(trigger finger)的病變可能導致指關節無法完全伸展","D":"de Quervain 病的診斷主要依賴X 光檢查來區分其他疾病"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"115020-33","topic_code":"T4","topic":"手外科","id":"115020-33","q_num":33,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":62,"stem":"有關先天性併指症(syndactyly)的敘述 ,下列何者最不適當?","options":{"A":"複合併指(complex syndactyly)除軟組織的黏合之外,骨骼亦有黏合","B":"單純併指(simple syndactyly)及複合併指(complex syndactyly)都呈現皮膚黏合","C":"較常發生在第四蹼間(fourth web space)","D":"較少發生在第一蹼間(first web space)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"115020-62","topic_code":"T4","topic":"手外科","id":"115020-62","q_num":62,"src":"民國115年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":4,"stem":"有一位10 歲大的男孩,與同伴玩棒球時,被飛出來的棒球擊中左眼眶,小孩立刻產生左眼結膜下出血(sub-conjunctival hemorrhage),同時受傷的左眼無法向上移動,則下列何者錯誤?","options":{"A":"小孩有可能眼眶底打擊性骨折(blow-out fracture)","B":"小孩需要接受眼眶骨電腦斷層檢查以確定診斷","C":"小孩可能合併有左側眶下神經(infraorbital nerve)受傷","D":"小孩左眼無法向上移動,是因眼球之上直肌卡在骨折當中"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"101030-4","topic_code":"T5","topic":"顏面外傷與唇顎裂","id":"101030-4","q_num":4,"src":"民國101年第一次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":10,"stem":"關於下圖類型的病人,下列敘述那些是正確的?1約5000個活嬰可能會出現一個 2可能有14%的病人伴隨其他先天性的畸型 3病人後續的照顧需要多科專業的合作,包含整形外科、耳鼻喉科、小兒科、牙科、口腔外科、語言師、營養師、精神科醫師、社工等 4通常建議嘴唇在3個月修復,上顎於12個月修復 5若伴隨小耳症或耳朵缺失建議在7歲左右開始重建","options":{"A":"1234","B":"2345","C":"135","D":"145"},"answer":"B","answer_status":"多重答案","accepted_answers":["A","B","C","D"],"correction_note":"第10題答Ａ、Ｂ、Ｃ、Ｄ給分","images":[],"_id":"106080-10","topic_code":"T5","topic":"顏面外傷與唇顎裂","id":"106080-10","q_num":10,"src":"民國106年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":17,"stem":"有關顏面外傷與骨折(facial trauma & fracture)的處置,下列敘述何者錯誤?","options":{"A":"前額骨骨折(forehead fracture)要考慮前額竇及顱底是否傷害","B":"如果有嚴重鼻眼篩(nasal-orbitoethmoid)或顱底骨折應給予鼻氣管插管(nasotracheal intubation)維持呼吸道通暢","C":"上下頷顎骨骨折病人並不一定要做氣管切開術(tracheostomy),用氣管內管(endotracheal tube)也可維持呼吸道通暢","D":"下頜骨骨折(mandibular fracture)的處理,強調穩定的內固定及咬合的穩定"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"107080-17","topic_code":"T5","topic":"顏面外傷與唇顎裂","id":"107080-17","q_num":17,"src":"民國107年第二次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":19,"stem":"有關兔唇顎裂(cleft lip and palate)的敘述,下列何者錯誤?","options":{"A":"兔唇顎裂是最常見的顏面先天異常(anomaly)","B":"發生的原因有家族病史傾向,跟懷孕期間使用藥物、感染或吸菸也有關","C":"嚴重完整型唇顎裂(complete cleft lip/palate)可能導致吸入性肺炎,所以應該提早於3~6周進行手術","D":"顎裂矯正手術的併發症最常見的是瘻管(fistula),其次是無法完全矯正語言發音和腭咽不全(velopharyngeal insufficiency)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"108030-19","topic_code":"T5","topic":"顏面外傷與唇顎裂","id":"108030-19","q_num":19,"src":"民國108年第一次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":17,"stem":"35歲男性病人因騎機車車禍而頭部受傷,送至急診室,經檢查無顱內出血情形,主要症狀為右側頭皮裂傷(avulsion injury)和傷口出血,下列敘述何者錯誤?","options":{"A":"頭皮可分為皮膚、皮下組織(subcutaneous tissue)、腱膜(galea aponeurotica)、疏鬆蜂窩組織(looseareolar tissue)和顱骨膜(pericranium)五層","B":"若病患於急診留觀期間,傷口持續出血不止,最好的方法為加壓止血合併輸血治療","C":"若有頭皮缺損範圍較大(4~8 cm2),無法直接縫合者,除了局部皮瓣外,可以考慮使用組織擴張器(tissue expander)","D":"若有頭皮缺損範圍較大(8~10 cm2),考慮使用游離皮瓣顯微重建手術治療"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"108080-17","topic_code":"T5","topic":"顏面外傷與唇顎裂","id":"108080-17","q_num":17,"src":"民國108年第二次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":15,"stem":"一位小朋友左眼遭棒球擊中,眼眶部位立即腫大,結膜下出血,左眼球無法向上移動,下列敘述何者錯誤?","options":{"A":"小朋友可能有眼眶下緣骨折(infra-orbital rim fracture)","B":"小朋友可能有眼眶底部骨折(orbital floor fracture)","C":"左眼球無法向上移動是因為上直肌卡在眼眶底部骨折","D":"小朋友需要接受眼眶電腦斷層檢查(orbital CT)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"109020-15","topic_code":"T5","topic":"顏面外傷與唇顎裂","id":"109020-15","q_num":15,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":16,"stem":"25歲男性病人因騎機車車禍而顏面部受傷,主要症狀為右側鼻翼撕裂傷(avulsion injury)、流鼻血(epistaxis)和腫痛,送至急診室,下列敘述何者錯誤?","options":{"A":"要高度懷疑可能有鼻骨骨折的發生,可安排X-ray檢查","B":"經會診耳鼻喉科醫師,發現右側鼻中膈有血腫情形(septal hematoma),應保守治療,待其自行吸收","C":"鼻部主要組成可分為皮膚覆蓋(skin cover)、結構支撐(structural support)及黏膜內襯(mucosallining),治療時可以根據缺損的範圍,做不同的重建考量","D":"鼻唇皮瓣(nasolabial flaps)和前額旁正中皮瓣(paramedian forehead flaps)為鼻部重建時,最常用的兩種局部皮瓣"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109020-16","topic_code":"T5","topic":"顏面外傷與唇顎裂","id":"109020-16","q_num":16,"src":"民國109年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":25,"stem":"24歲男性騎機車自摔,造成顏面外傷(facial trauma)出血,被送到急診處理。有關顏面外傷的處置,下列敘述何者錯誤?","options":{"A":"要先評估是否有大出血或顱內出血","B":"生命威脅的大出血,是指3單位(unit)以上的失血或血比容(Hct)小於29%","C":"一旦X光片確認有顏面骨骨折,應立即手術復位及固定","D":"若撞及眼眶可能導致全盲及視神經壓迫或眼壓升高"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111020-25","topic_code":"T5","topic":"顏面外傷與唇顎裂","id":"111020-25","q_num":25,"src":"民國111年第一次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":16,"stem":"有關唇顎裂修復手術之時間表,下列何者錯誤?","options":{"A":"出生後1~2 個月可接受唇黏合術(lip adhesion)","B":"出生後3~6 個月可接受唇及初步鼻修復術(lip and primary nose repair)","C":"出生後10~12 個月可接受顎修復術(palate repair)","D":"5 歲前可接受唇或鼻修正術(lip or nose revision)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-16","topic_code":"T5","topic":"顏面外傷與唇顎裂","id":"111080-16","q_num":16,"src":"民國111年第二次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":22,"stem":"對血管瘤(hemangioma)與血管畸形(vascular malformation)的敘述,下列何者正確?","options":{"A":"血管瘤會萎縮,而血管畸形不會萎縮","B":"男女比例在兩者完全沒有差別","C":"Mast cell 在兩者都增加","D":"兩者都一定會壓迫到骨頭"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"102030-22","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"102030-22","q_num":22,"src":"民國102年第一次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":19,"stem":"大部份血管瘤(hemangioma)在多少歲開始退化?","options":{"A":"1個月","B":"3~6個月","C":"6~9個月","D":"12~18個月"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"105100-19","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"105100-19","q_num":19,"src":"民國105年第二次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":12,"stem":"關於臉部縫合技巧與如何減少疤痕增生之敘述,下列何者錯誤?","options":{"A":"臉部皮膚之切口(incision)須經詳細計畫與設計,不可任意切割傷口","B":"臉部皮膚之切口須與皮膚鬆弛線(relax skin tension line)儘量平行","C":"臉部皮膚之切口須儘量與皺紋方向垂直切開","D":"臉部傷口之縫合需消除皮下死腔(dead space),使用較細之縫線縫合傷口"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"106080-12","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"106080-12","q_num":12,"src":"民國106年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":16,"stem":"一位58歲長期在太陽下工作的工人鼻尖出現了一個不會疼痛的硬塊,身體檢查為一個8mm在皮膚表層不會移動的突起腫塊,表面是發亮蠟狀,並可看到表淺的末梢血管擴張現象,而且腫塊突起處有一小潰瘍,經切片證實為皮膚癌,最可能為下列何者?","options":{"A":"基底細胞癌(basal cell carcinoma)","B":"鱗狀細胞癌(squamous cell carcinoma)","C":"惡性黑色素細胞瘤(malignant melanoma)","D":"默克細胞癌(Merkel cell carcinoma)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"107080-16","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"107080-16","q_num":16,"src":"民國107年第二次","img":""},{"exam_code":"109080","roc_year":109,"exam_round":"第二次","num":19,"stem":"60歲孫先生因頭皮上快速增生的病灶(如下圖)而求醫,臨床診斷為惡性黑色素細胞瘤(malignantmelanoma)。以下敘述何者正確?","options":{"A":"此病灶之分型屬於結節型黑色素細胞瘤(nodular melanoma)","B":"此分型可能發生在身上除了手跟腳以外的所有部位皮膚上","C":"絕不可進行部分病灶切片(incisional biopsy),以免腫瘤擴散","D":"放射治療與手術有一樣的存活率"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109080-19","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"109080-19","q_num":19,"src":"民國109年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":6,"stem":"有關瘢痕瘤(Keloid),下列敘述何者錯誤?","options":{"A":"較易發生在臉部、低於鎖骨的軀幹部及下肢","B":"較常發生在皮膚顏色較深的人種例如非裔美國人、亞洲人及拉丁裔人","C":"其盛行率約15%~20%","D":"目前仍無法預防,不論內科或外科療法效果皆不彰"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"110080-6","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"110080-6","q_num":6,"src":"民國110年第二次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":14,"stem":"有關先天性黑色素細胞痣(congenital melanocytic nevus, CMN)的敘述,下列何者正確?120~49.9 cm為大型(large)CMN,>50 cm為巨大(giant)CMN 2大型和巨大CMN發展成黑色素細胞瘤的機率比小型CMN還高 3 大型和巨大CMN患者有較高的機會在腦膜有黑色素細胞異常增生(leptomeningeal involvement),可藉由MRI作診斷 4 小型CMN如果發展出黑色素細胞瘤,多發生在青春期後","options":{"A":"僅13","B":"僅24","C":"僅124","D":"1234"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-14","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"112020-14","q_num":14,"src":"民國112年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":14,"stem":"有關血管腫瘤和血管畸形,下列何者錯誤?1有一半比例的血管瘤(hemangioma)在一歲前會完全消失 2硬化劑注射(sclerotherapy)是治療動靜脈畸形(arteriovenous malformation)的最好方法 3血管腫瘤(vascular tumors)是因為內皮細胞異常增生,血管畸形(vascular malformations)是動靜脈或淋巴系統異常發展 4微血管畸形與動靜脈畸形不同,會隨著年紀增長而萎縮變小,甚至消失","options":{"A":"僅13","B":"23","C":"124","D":"134"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-14","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"112080-14","q_num":14,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":15,"stem":"球狀血管瘤(glomus tumor)最常見於下列那個位置?","options":{"A":"髖關節","B":"手肘","C":"手指","D":"頭頸部"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-15","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"112080-15","q_num":15,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":17,"stem":"拉皮手術後合併使用輔助性去除臉上細紋最適合用下列何種消融式雷射(ablative laser)?","options":{"A":"銣雅鉻雷射(Nd:YAG laser)","B":"脈衝式染料雷射(pulsed dye laser)","C":"分段式二氧化碳雷射(fractional CO2 laser)","D":"紅寶石雷射(ruby laser)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-17","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"112080-17","q_num":17,"src":"民國112年第二次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":17,"stem":"在抽脂手術中所使用的tumescent fluid(lidocaine 0.05% and epinephrine 1:1,000,000),lidocaine的最高安全劑量限制為:","options":{"A":"7 mg/kg","B":"15 mg/kg","C":"20 mg/kg","D":"35 mg/kg"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114020-17","topic_code":"T6","topic":"皮膚軟組織腫瘤‧血管病變‧美容","id":"114020-17","q_num":17,"src":"民國114年第一次","img":""}],E={"102030-19":{"quick":"較不正確 D:淋巴球出現較早(約第 5–7 天),非 8–14 天。","detail":{"background":"傷口癒合三期(序):①「止血/發炎期(coagulation→inflammation)」—血小板先到啟動(釋放 PDGF/TGF-β),嗜中性球(0–數天,最初發炎主細胞)→巨噬細胞(關鍵調控、約 2–3 天起);②「增生期(proliferation)」—纖維母細胞(自「局部」組織遷移)合成膠原(先第三型、後第一型)、血管新生、肉芽、上皮化;③「成熟/重塑期(maturation/remodeling)」—第三型轉第一型、抗張力上升(數月至年);肌纖維母細胞(約第 6 天)收縮傷口。淋巴球約第 5–7 天。第一型膠原佔成人皮膚約 80%。膠原合成在「粗糙內質網(RER)」組裝 pro-α 鏈。","options":{"A":"嗜中性球 0–數天合理。","B":"巨噬細胞 1–12 天合理。","C":"纖維母細胞 1–14 天合理。","D":"★較不正確(本題答案):淋巴球約 5–7 天。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"102110-17":{"quick":"錯在 C:膠原合成始於 pro-α 鏈在「粗糙內質網(RER)」組裝,非高爾基氏體。","detail":{"background":"傷口癒合三期(序):①「止血/發炎期(coagulation→inflammation)」—血小板先到啟動(釋放 PDGF/TGF-β),嗜中性球(0–數天,最初發炎主細胞)→巨噬細胞(關鍵調控、約 2–3 天起);②「增生期(proliferation)」—纖維母細胞(自「局部」組織遷移)合成膠原(先第三型、後第一型)、血管新生、肉芽、上皮化;③「成熟/重塑期(maturation/remodeling)」—第三型轉第一型、抗張力上升(數月至年);肌纖維母細胞(約第 6 天)收縮傷口。淋巴球約第 5–7 天。第一型膠原佔成人皮膚約 80%。膠原合成在「粗糙內質網(RER)」組裝 pro-α 鏈。","options":{"A":"正確:先合成第三型膠原。","B":"正確:膠原為傷口癒合主成分。","C":"★錯誤(本題答案):pro-α 鏈組裝於 RER。","D":"正確:第一型佔成人皮膚約 80%。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"103030-5":{"quick":"錯在 B:正確順序為 inflammatory→proliferative→maturational(非發炎→成熟→增生)。","detail":{"background":"傷口癒合三期(序):①「止血/發炎期(coagulation→inflammation)」—血小板先到啟動(釋放 PDGF/TGF-β),嗜中性球(0–數天,最初發炎主細胞)→巨噬細胞(關鍵調控、約 2–3 天起);②「增生期(proliferation)」—纖維母細胞(自「局部」組織遷移)合成膠原(先第三型、後第一型)、血管新生、肉芽、上皮化;③「成熟/重塑期(maturation/remodeling)」—第三型轉第一型、抗張力上升(數月至年);肌纖維母細胞(約第 6 天)收縮傷口。淋巴球約第 5–7 天。第一型膠原佔成人皮膚約 80%。膠原合成在「粗糙內質網(RER)」組裝 pro-α 鏈。","options":{"A":"正確:二級癒合疤痕較明顯。","B":"★錯誤(本題答案):順序應為發炎→增生→成熟。","C":"正確:血管新生屬增生期。","D":"正確:巨噬/嗜中性球於發炎期重要。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"103100-19":{"quick":"正確為 C(23):薦部肌肉壞死未見骨=Stage III(非 II);良好營養+清創+VAC 有益。","detail":{"background":"壓瘡(壓力性損傷)分級:I 皮膚完整、壓不反白之發紅;II 部分皮層缺損(表淺潰瘍/水泡);III「全皮層」缺損達皮下脂肪(未及筋膜/肌肉/骨);IV 全皮層缺損深及「肌肉、骨、肌腱、支持結構」。成因以「壓力(>微血管閉合壓 ~32 mmHg、持續)」為主(坐骨 ~60 mmHg、>1 小時),次為剪力/摩擦。處置:減壓翻身、營養、清創、VAC(負壓);深部(III/IV)以「皮瓣(如臀大肌肌皮瓣)」重建。","options":{"A":"13:含 1(誤判 stage II)。","B":"14:含 1。","C":"★正確(本題答案):2、3。","D":"24:漏 3 但含 2、4;依官方為 23。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"103100-39":{"quick":"最具決定性 D:檢查足背動脈與後脛動脈搏動(血流灌流決定糖尿病足能否癒合)。","detail":{"background":"慢性不癒合傷口:最常見原因「感染」;其他—缺血(動脈灌流不足)、放射(內皮損傷/閉塞性動脈內膜炎)、糖尿病(影響每一癒合步驟)、營養不良(維生素 C 缺乏impair膠原)、異物、靜脈鬱血。糖尿病足能否換藥癒合,「足背/後脛動脈搏動(血流灌流)」最具決定性;污染傷口(溝水/咬傷)需「重複清創+抗生素、延遲縫合」。NPWT(負壓)改善微環境、促肉芽、可縮小傷口面積。","options":{"A":"HbA1c 反映血糖控制,非癒合決定因子。","B":"神經傳導評估神經病變,非血流。","C":"細菌培養指導抗生素,非癒合決定。","D":"★正確(本題答案):動脈搏動(灌流)。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"104030-6":{"quick":"最適當 D:污染傷口(溝水+糖尿病)應「重複清創+局部/全身抗生素,控制感染後再縫合/植皮」。","detail":{"background":"慢性不癒合傷口:最常見原因「感染」;其他—缺血(動脈灌流不足)、放射(內皮損傷/閉塞性動脈內膜炎)、糖尿病(影響每一癒合步驟)、營養不良(維生素 C 缺乏impair膠原)、異物、靜脈鬱血。糖尿病足能否換藥癒合,「足背/後脛動脈搏動(血流灌流)」最具決定性;污染傷口(溝水/咬傷)需「重複清創+抗生素、延遲縫合」。NPWT(負壓)改善微環境、促肉芽、可縮小傷口面積。","options":{"A":"污染傷口不宜直接縫合。","B":"單次清創縫合感染風險高。","C":"局部抗生素+縫合不足。","D":"★正確(本題答案):重複清創+抗生素+延遲縫合。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"105020-18":{"quick":"壓瘡侵蝕至肌肉及骨頭=D:Stage IV。","detail":{"background":"壓瘡(壓力性損傷)分級:I 皮膚完整、壓不反白之發紅;II 部分皮層缺損(表淺潰瘍/水泡);III「全皮層」缺損達皮下脂肪(未及筋膜/肌肉/骨);IV 全皮層缺損深及「肌肉、骨、肌腱、支持結構」。成因以「壓力(>微血管閉合壓 ~32 mmHg、持續)」為主(坐骨 ~60 mmHg、>1 小時),次為剪力/摩擦。處置:減壓翻身、營養、清創、VAC(負壓);深部(III/IV)以「皮瓣(如臀大肌肌皮瓣)」重建。","options":{"A":"I 皮膚完整發紅。","B":"II 部分皮層。","C":"III 全皮層達皮下脂肪。","D":"★正確(本題答案):Stage IV。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"105100-21":{"quick":"錯在 C:第三級為「全皮層」缺損(達皮下脂肪),非部分皮層。","detail":{"background":"壓瘡(壓力性損傷)分級:I 皮膚完整、壓不反白之發紅;II 部分皮層缺損(表淺潰瘍/水泡);III「全皮層」缺損達皮下脂肪(未及筋膜/肌肉/骨);IV 全皮層缺損深及「肌肉、骨、肌腱、支持結構」。成因以「壓力(>微血管閉合壓 ~32 mmHg、持續)」為主(坐骨 ~60 mmHg、>1 小時),次為剪力/摩擦。處置:減壓翻身、營養、清創、VAC(負壓);深部(III/IV)以「皮瓣(如臀大肌肌皮瓣)」重建。","options":{"A":"正確:I 級壓不反白發紅。","B":"正確:II 級部分皮層/水泡。","C":"★錯誤(本題答案):III 級為全皮層缺損。","D":"正確:IV 級深及肌肉/骨。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"106020-78":{"quick":"D:糖尿病足非緊急截肢、病人明確拒絕→應尊重其意願,不可違反意願手術。","detail":{"background":"病人自主:非緊急手術且病人具決定能力並明確拒絕時,醫師「不應違反其意願」執行(尊重自主原則);安寧緩和醫療條例適用末期病人之 DNR,與此截肢決策無關。","options":{"A":"錯:非緊急、不可違反意願。","B":"錯:非依常規即可強制截肢。","C":"錯:安寧條例不適用此情境。","D":"★正確(本題答案):尊重病人拒絕、不應強制手術。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"107080-12":{"quick":"錯在 D:NPWT「會縮小傷口面積」(非不改變)。","detail":{"background":"慢性不癒合傷口:最常見原因「感染」;其他—缺血(動脈灌流不足)、放射(內皮損傷/閉塞性動脈內膜炎)、糖尿病(影響每一癒合步驟)、營養不良(維生素 C 缺乏impair膠原)、異物、靜脈鬱血。糖尿病足能否換藥癒合,「足背/後脛動脈搏動(血流灌流)」最具決定性;污染傷口(溝水/咬傷)需「重複清創+抗生素、延遲縫合」。NPWT(負壓)改善微環境、促肉芽、可縮小傷口面積。","options":{"A":"正確:改善微環境促癒合。","B":"正確:壓縮放鬆刺激生長因子。","C":"正確:適用多種開放傷口。","D":"★錯誤(本題答案):NPWT 可縮小傷口面積。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"108030-18":{"quick":"錯在 D:真皮替代物「引導上皮化」能力有限(需搭配表皮成分),非優異。","detail":{"background":"慢性不癒合傷口:最常見原因「感染」;其他—缺血(動脈灌流不足)、放射(內皮損傷/閉塞性動脈內膜炎)、糖尿病(影響每一癒合步驟)、營養不良(維生素 C 缺乏impair膠原)、異物、靜脈鬱血。糖尿病足能否換藥癒合,「足背/後脛動脈搏動(血流灌流)」最具決定性;污染傷口(溝水/咬傷)需「重複清創+抗生素、延遲縫合」。NPWT(負壓)改善微環境、促肉芽、可縮小傷口面積。","options":{"A":"正確:異體角質細胞可覆蓋促癒合。","B":"正確:脆弱、難避免攣縮。","C":"正確:真皮替代物多為暫時覆蓋。","D":"★錯誤(本題答案):真皮替代物上皮化能力有限。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"108080-4":{"quick":"錯在 C:妨礙膠原/癒合的是「維生素 C」缺乏,非 B12。","detail":{"background":"慢性不癒合傷口:最常見原因「感染」;其他—缺血(動脈灌流不足)、放射(內皮損傷/閉塞性動脈內膜炎)、糖尿病(影響每一癒合步驟)、營養不良(維生素 C 缺乏impair膠原)、異物、靜脈鬱血。糖尿病足能否換藥癒合,「足背/後脛動脈搏動(血流灌流)」最具決定性;污染傷口(溝水/咬傷)需「重複清創+抗生素、延遲縫合」。NPWT(負壓)改善微環境、促肉芽、可縮小傷口面積。","options":{"A":"正確:最常見原因為感染。","B":"正確:放射致內皮損傷/閉塞性動脈內膜炎。","C":"★錯誤(本題答案):應為維生素 C 缺乏。","D":"正確:糖尿病影響每一步驟。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"108080-49":{"quick":"薦部深可見骨褥瘡最主要成因 B:壓力(pressure)。","detail":{"background":"壓瘡(壓力性損傷)分級:I 皮膚完整、壓不反白之發紅;II 部分皮層缺損(表淺潰瘍/水泡);III「全皮層」缺損達皮下脂肪(未及筋膜/肌肉/骨);IV 全皮層缺損深及「肌肉、骨、肌腱、支持結構」。成因以「壓力(>微血管閉合壓 ~32 mmHg、持續)」為主(坐骨 ~60 mmHg、>1 小時),次為剪力/摩擦。處置:減壓翻身、營養、清創、VAC(負壓);深部(III/IV)以「皮瓣(如臀大肌肌皮瓣)」重建。","options":{"A":"摩擦為次要。","B":"★正確(本題答案):壓力。","C":"剪力為次要。","D":"衛生不良非主因。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"109080-6":{"qu ,"detail":{"background":"傷口癒合三期(序):①「止血/發炎期(coagulation→inflammation)」—血小板先到啟動(釋放 PDGF/TGF-β),嗜中性球(0–數天,最初發炎主細胞)→巨噬細胞(關鍵調控、約 2–3 天起);②「增生期(proliferation)」—纖維母細胞(自「局部」組織遷移)合成膠原(先第三型、後第一型)、血管新生、肉芽、上皮化;③「成熟/重塑期(maturation/remodeling)」—第三型轉第一型、抗張力上升(數月至年);肌纖維母細胞(約第 6 天)收縮傷口。淋巴球約第 5–7 天。第一型膠原佔成人皮膚約 80%。膠原合成在「粗糙內質網(RER)」組裝 pro-α 鏈。","options":{"A":"★正確(本題答案):嗜中性→巨噬→纖維母→淋巴球。","B":"順序錯。","C":"順序錯。","D":"順序錯。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"110080-15":{"quick":"坐骨壓瘡起始條件 B:60 mmHg、持續 1 小時以上。","detail":{"background":"壓瘡(壓力性損傷)分級:I 皮膚完整、壓不反白之發紅;II 部分皮層缺損(表淺潰瘍/水泡);III「全皮層」缺損達皮下脂肪(未及筋膜/肌肉/骨);IV 全皮層缺損深及「肌肉、骨、肌腱、支持結構」。成因以「壓力(>微血管閉合壓 ~32 mmHg、持續)」為主(坐骨 ~60 mmHg、>1 小時),次為剪力/摩擦。處置:減壓翻身、營養、清創、VAC(負壓);深部(III/IV)以「皮瓣(如臀大肌肌皮瓣)」重建。","options":{"A":"0.5 小時偏短。","B":"★正確(本題答案):60 mmHg、>1 小時。","C":"30 mmHg 偏低。","D":"30 mmHg 偏低。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"112080-4":{"quick":"傷口癒合延遲最常見原因 A:傷口感染。","detail":{"background":"慢性不癒合傷口:最常見原因「感染」;其他—缺血(動脈灌流不足)、放射(內皮損傷/閉塞性動脈內膜炎)、糖尿病(影響每一癒合步驟)、營養不良(維生素 C 缺乏impair膠原)、異物、靜脈鬱血。糖尿病足能否換藥癒合,「足背/後脛動脈搏動(血流灌流)」最具決定性;污染傷口(溝水/咬傷)需「重複清創+抗生素、延遲縫合」。NPWT(負壓)改善微環境、促肉芽、可縮小傷口面積。","options":{"A":"★正確(本題答案):感染。","B":"縫合技巧為次要。","C":"流血為次要。","D":"合併症為其一非最常見。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"112080-5":{"quick":"不符 SSI 定義者 A:術後肺炎/敗血症(非手術部位之遠端感染)。","detail":{"background":"手術部位感染(SSI):發生於「手術切口/器官腔」,淺/深層 30 天內、有植入物則 90 天內;遠端器官感染(如呼吸器相關肺炎)不屬 SSI。","options":{"A":"★不符(本題答案):肺炎敗血症為遠端,非 SSI。","B":"符合:疝氣修補後切口膿瘍。","C":"符合:人工關節後深部感染(植入物 90 天/更久)。","D":"符合:腹腔吻合處器官腔膿瘍。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"113070-18":{"quick":"深及骨頭=Stage IV;最好重建 C:清創後「局部臀大肌皮瓣」重建。","detail":{"background":"壓瘡(壓力性損傷)分級:I 皮膚完整、壓不反白之發紅;II 部分皮層缺損(表淺潰瘍/水泡);III「全皮層」缺損達皮下脂肪(未及筋膜/肌肉/骨);IV 全皮層缺損深及「肌肉、骨、肌腱、支持結構」。成因以「壓力(>微血管閉合壓 ~32 mmHg、持續)」為主(坐骨 ~60 mmHg、>1 小時),次為剪力/摩擦。處置:減壓翻身、營養、清創、VAC(負壓);深部(III/IV)以「皮瓣(如臀大肌肌皮瓣)」重建。","options":{"A":"Stage II 描述錯、直接縫合不足。","B":"Stage III 錯、植皮不耐壓。","C":"★正確(本題答案):Stage IV,臀大肌皮瓣重建。","D":"壓瘡分級無 Stage V;不需顯微皮瓣。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"114020-77":{"quick":"最適當 B:上眼眶傷口「不應剃眉毛」(眉毛不易再生)。","detail":{"background":"傷口處置:毛髮以「剪短(clip)」優於「剃刀剃除」(剃刀微傷增感染);「眉毛不剃」(難再生、為對位標記);非所有縫合傷口都需抗生素;雙氧水(H2O2)對組織有細胞毒性、不建議沖洗。","options":{"A":"錯:刮鬍刀剃除增感染,剪短較佳。","B":"★正確(本題答案):不剃眉毛。","C":"錯:非一律給抗生素。","D":"錯:雙氧水有細胞毒性。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"115020-24":{"quick":"正確為 C:嗜中性球為最初發炎期之主要細胞。","detail":{"background":"傷口癒合三期(序):①「止血/發炎期(coagulation→inflammation)」—血小板先到啟動(釋放 PDGF/TGF-β),嗜中性球(0–數天,最初發炎主細胞)→巨噬細胞(關鍵調控、約 2–3 天起);②「增生期(proliferation)」—纖維母細胞(自「局部」組織遷移)合成膠原(先第三型、後第一型)、血管新生、肉芽、上皮化;③「成熟/重塑期(maturation/remodeling)」—第三型轉第一型、抗張力上升(數月至年);肌纖維母細胞(約第 6 天)收縮傷口。淋巴球約第 5–7 天。第一型膠原佔成人皮膚約 80%。膠原合成在「粗糙內質網(RER)」組裝 pro-α 鏈。","options":{"A":"錯:淋巴球非增生期起始主細胞。","B":"錯:止血期為血小板(非嗜酸球)。","C":"★正確(本題答案):嗜中性球為發炎期主細胞。","D":"錯:纖維母細胞於增生期才達高峰。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NPUAP/EPUAP Pressure Injury Staging"]}},"104030-20":{"quick":"錯在 C:高壓電傷「會穿透深部組織」造成嚴重傷害(與一般燒傷不同)。","detail":{"background":"燒燙傷:面積用「9 的規則」(成人:頭頸 9、各上肢 9、軀幹前 18/後 18、各下肢 18、會陰 1)。深度:淺二度(紅、水泡、壓會反白、痛)、深二度(蒼白、水泡、壓不反白)、三度(皮革狀焦痂、無痛)、四度(深及肌肉/骨)。輸液 Parkland:「4 mL × 體重(kg) × %TBSA 之乳酸林格(LR)」於 24 小時,「前 8 小時給一半」;只算二度以上面積;目標尿量成人 iston Textbook of Surgery, 21e"]}},"110020-11":{"quick":"較少用於游離移植者 D:第四型(節段性多血管莖,如縫匠肌)。","detail":{"background":"皮瓣分類:①隨意皮瓣(random)—血供來自「皮下血管網(subdermal plexus)」,長寬比受限;②軸式皮瓣(axial)—有「命名皮動脈/靜脈」;③穿通枝皮瓣(perforator,如 DIEP)—「保留供區肌肉/筋膜功能」(優點),缺點為分離困難/增手術時間/血管變異大短小。重建階梯(由簡至繁):直接縫合→植皮→局部皮瓣→區域(肌)皮瓣→游離皮瓣。局部皮瓣覆蓋範圍有限、遠端血流差、外傷區不可靠、「老人較不可靠」;小腿遠 1/3 缺損露骨/肌腱→「游離皮瓣」。Mathes-Nahai 肌肉血供五型:I 單一血管莖(如腓腸肌 gastrocnemius、闊張筋膜)、II 主要+次要血管莖(如股薄肌 gracilis)、III 兩條主要血管莖、IV 節段性多血管莖(如縫匠肌 sartorius,「最不適合游離移植」)、V 一主要+次要節段(如闊背肌 latissimus、胸大肌)。胸大肌肌皮瓣由「胸肩峰動脈(thoracoacromial)」供應。下頷重建首選「腓骨皮瓣(腓動脈、pedicle 長、供區後遺症小、可植牙)」。","options":{"A":"第一型可靠。","B":"第二型常用。","C":"第三型可用。","D":"★正確(本題答案):第四型最不適合游離移植。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Mathes & Nahai Reconstructive Surgery","Sabiston Textbook of Surgery, 21e"]}},"111020-24":{"quick":"錯在 D:頭皮毛囊豐富,「不」適合作全層植皮供皮區(受區會長毛)。","detail":{"background":"植皮:分層(split,含表皮+部分真皮,易存活、後期次發收縮多)與全層(full,含全真皮,初級收縮多、次發收縮少、美觀好、較難存活)。「真皮愈厚→次發攣縮愈少」。存活三階段:①浸潤期(plasmatic imbibition,0–48 小時靠血漿養分)②黏合期(inosculation,微血管接合)③血管再生(revascularization);失敗主因—血腫/血清腫、感染、移植片位移(shearing)。頭皮因毛囊多「不適合」作全層供皮(會長毛)。顯微/游離皮瓣:小血管吻合多「端對端(end-to-end)」;血管粗細差異大用端對側;肌肉「熱缺血耐受短(約 2–3 小時)」;栓塞多發生術後 48 小時內,以皮色、微血管充填、針刺出血監測;抗凝劑(aspirin/heparin)非常規必用、不顯著提高成功率(技術最關鍵)。","options":{"A":"正確:分層含部分真皮。","B":"正確:全層含全真皮。","C":"正確:全層較少次發攣縮。","D":"★錯誤(本題答案):頭皮不宜作全層供皮。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Mathes & Nahai Reconstructive Surgery","Sabiston Textbook of Surgery, 21e"]}},"111080-14":{"quick":"錯在 A:肝素「非」常規必用、不顯著提高皮瓣存活(技術最關鍵)。","detail":{"background":"皮瓣分類:①隨意皮瓣(random)—血供來自「皮下血管網(subdermal plexus)」,長寬比受限;②軸式皮瓣(axial)—有「命名皮動脈/靜脈」;③穿通枝皮瓣(perforator,如 DIEP)—「保留供區肌肉/筋膜功能」(優點),缺點為分離困難/增手術時間/血管變異大短小。重建階梯(由簡至繁):直接縫合→植皮→局部皮瓣→區域(肌)皮瓣→游離皮瓣。局部皮瓣覆蓋範圍有限、遠端血流差、外傷區不可靠、「老人較不可靠」;小腿遠 1/3 缺損露骨/肌腱→「游離皮瓣」。Mathes-Nahai 肌肉血供五型:I 單一血管莖(如腓腸肌 gastrocnemius、闊張筋膜)、II 主要+次要血管莖(如股薄肌 gracilis)、III 兩條主要血管莖、IV 節段性多血管莖(如縫匠肌 sartorius,「最不適合游離移植」)、V 一主要+次要節段(如闊背肌 latissimus、胸大肌)。胸大肌肌皮瓣由「胸肩峰動脈(thoracoacromial)」供應。下頷重建首選「腓骨皮瓣 e。","D":"正確:鎖骨上皮瓣由鎖骨上動脈。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Mathes & Nahai Reconstructive Surgery","Sabiston Textbook of Surgery, 21e"]}},"113070-15":{"quick":"橈動脈前臂皮瓣屬筋膜皮瓣 B:第 B 類(septocutaneous 中隔皮膚穿通)。","detail":{"background":"Mathes-Nahai/Nahai 筋膜皮瓣分類:A 類=直接皮動脈、B 類=中隔皮膚穿通枝(septocutaneous,如橈側前臂皮瓣)、C 類=肌皮穿通枝。","options":{"A":"A 類為直接皮動脈。","B":"★正確(本題答案):B 類(中隔皮膚穿通)。","C":"C 類為肌皮穿通枝。","D":"無 D 類標準分法。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Mathes & Nahai Reconstructive Surgery","Sabiston Textbook of Surgery, 21e"]}},"114020-15":{"quick":"不是穿通枝皮瓣缺點者 A:可保留供區肌肉/筋膜功能(此為其『優點』)。","detail":{"background":"皮瓣分類:①隨意皮瓣(random)—血供來自「皮下血管網(subdermal plexus)」,長寬比受限;②軸式皮瓣(axial)—有「命名皮動脈/靜脈」;③穿通枝皮瓣(perforator,如 DIEP)—「保留供區肌肉/筋膜功能」(優點),缺點為分離困難/增手術時間/血管變異大短小。重建階梯(由簡至繁):直接縫合→植皮→局部皮瓣→區域(肌)皮瓣→游離皮瓣。局部皮瓣覆蓋範圍有限、遠端血流差、外傷區不可靠、「老人較不可靠」;小腿遠 1/3 缺損露骨/肌腱→「游離皮瓣」。Mathes-Nahai 肌肉血供五型:I 單一血管莖(如腓腸肌 gastrocnemius、闊張筋膜)、II 主要+次要血管莖(如股薄肌 gracilis)、III 兩條主要血管莖、IV 節段性多血管莖(如縫匠肌 sartorius,「最不適合游離移植」)、V 一主要+次要節段(如闊背肌 latissimus、胸大肌)。胸大肌肌皮瓣由「胸肩峰動脈(thoracoacromial)」供應。下頷重建首選「腓骨皮瓣(腓動脈、pedicle 長、供區後遺症小、可植牙)」。","options":{"A":"★正確(本題答案):保留供區功能是優點。","B":"缺點:不易分離單獨穿通枝。","C":"缺點:增加手術時間。","D":"缺點:血管變異大、短小、壁薄。"},"sources":["Grabb and Smith’s Plastic Surgery, 8e","Mathes & Nahai Reconstructive Surgery","Sabiston Textbook of Surgery, 21e"]}},"102030-17":{"quick":"確診 CTS 最佳檢查 A:電生理(神經傳導/肌電)。","detail":{"background":"腕隧道症候群(CTS):「正中神經」於腕橫韌帶下受壓。症狀—拇/食/中指及無名指橈側麻痛、夜間痛醒、甩手改善;曲腕加重;嚴重致魚際肌(正中神經支配:拇對掌肌、拇外展短肌、拇屈短肌淺頭)萎縮無力,但「拇內收肌(尺神經)不受影響」。診斷靠「神經傳導/肌電(電生理)」確定;Tinel/Phalen(腕彎曲)陽性。治療:副木→類固醇→「切斷腕橫韌帶」減壓(嚴重或保守無效)。並非一定有魚際肌萎縮。","options":{"A":"★正確(本題答案):電生理檢查。","B":"MRI 非確診首選。","C":"CT 非確診。","D":"超音波輔助非確診標準。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"102030-60":{"quick":"CTS「不受影響」者 C:拇內收肌(尺神經支配)。","detail":{"background":"腕隧道症候群(CTS):「正中神經」於腕橫韌帶下受壓。症狀—拇/食/中指及無名指橈側麻痛、夜間痛醒、甩手改善;曲腕加重;嚴重致魚際肌(正中神經支配:拇對掌肌、拇外展短肌、拇屈短肌淺頭)萎縮無力,但「拇內收肌(尺神經)不受影響」。診斷靠「神經傳導/肌電(電生理)」確定;Tinel/Phalen(腕彎曲)陽性。治療:副木→類固醇→「切斷腕橫韌帶」減壓(嚴重或保守無效)。並非一定有魚際肌萎縮。","options":{"A":"拇對掌肌(正中)受影響。","B":"拇屈短肌淺頭(正中)受影響。","C":"★正確(本題答案):拇內收肌(尺神經)不受影響。","D":"拇外展短肌(正中)受影響。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"103030-17":{"quick":"中指被球頂、末節下垂無法伸直→C:鎚狀指(mallet finger)。","detail":{"background":"手指肌腱與畸形:鎚狀指(mallet finger)=遠端伸肌腱斷裂、DIP 下垂無法伸直;鈕扣指(boutonnière)=PIP 屈曲+DIP 過伸(中央束斷);天鵝頸(swan-neck)=PIP 過伸+DIP 屈曲。屈指肌腱五區(zone II 為「無人區」),zone I/II 有滑膜鞘;腕隧道為 zone IV;屈肌腱斷裂宜「7 天內縫合」,6 週後難直接縫合,術後復健重要。gamekeeper/skier thumb=拇指 MCP「尺側」副韌帶傷。","options":{"A":"板機指為卡頓彈響。","B":"de Quervain 為腕橈側痛。","C":"★正確(本題答案):鎚狀指。","D":"鈕扣指為 PIP 屈曲。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"103030-19":{"quick":"腕背第六腔室內為 C:尺側伸腕肌(ECU)。","detail":{"background":"狹窄性腱鞘炎:de Quervain 病(「媽媽手」)=腕背「第一」伸肌腔室(外展拇長肌 APL＋伸拇短肌 EPB)發炎,Finkelstein 試驗陽性,診斷靠臨床(非 X 光)。板機指(trigger finger)=屈指肌腱於「A1 滑車」狹窄、卡頓彈響、可致指關節無法完全伸直。交叉症候群於第一、二腔室交叉處。腕背六腔室:1=APL+EPB、2=ECRL+ECRB、3=EPL、4=EDC+EIP、5=EDM、6=ECU(尺側伸腕肌)。","options":{"A":"伸食指肌在第 4 腔室。","B":"伸拇長肌在第 3 腔室。","C":"★正確(本題答案):尺側伸腕肌(第 6)。","D":"伸小指肌在第 5 腔室。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"103100-17":{"quick":"CTS 受壓神經為 C:正中神經(median nerve)。","detail":{"background":"腕隧道症候群(CTS):「正中神經」於腕橫韌帶下受壓。症狀—拇/食/中指及無名指橈側麻痛、夜間痛醒、甩手改善;曲腕加重;嚴重致魚際肌(正中神經支配:拇對掌肌、拇外展短肌、拇屈短肌淺頭)萎縮無力,但「拇內收肌(尺神經)不受影響」。診斷靠「神經傳導/肌電(電生理)」確定;Tinel/Phalen(腕彎曲)陽性。治療:副木→類固醇→「切斷腕橫韌帶」減壓(嚴重或保守無效)。並非一定有魚際肌萎縮。","options":{"A":"尺神經走 Guyon 管。","B":"橈神經非腕隧道。","C":"★正確(本題答案):正中神經。","D":"肌皮神經在上臂。"},"sources":["Green’s Operative Hand Surgery","Grabb and Smith’s Plastic Surgery, 8e","Sabiston Textbook of Surgery, 21e"]}},"104030-18":{"quick":"拇指根部痛、Finkelstein 陽性→D:外展拇長肌(APL)＋伸拇短肌(EPB)(第一腔室,de Quervain)。","detail":{"background":"狹窄性腱鞘炎:de Quervain 病(「媽媽手」)=腕背「第一」伸肌腔室(外展
