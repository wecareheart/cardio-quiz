tice,公平分配資源)。「告知檢查危險性、尊重病人本人的決定」=自主原則(A正確)。故自主原則(A)。","options":{"A":"正確(本題答案)。告知並尊重病人決定=自主原則。","B":"行善是做有益的事。","C":"不傷害是不造成傷害。","D":"公平是公平分配。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"101110-N2-5":{"quick":"病人自己決定簽不急救=自主原則。","detail":{"background":"醫師告知病情預後後,「病人『自己決定』簽下不急救同意書」=自主原則(autonomy,尊重病人自我決定的權利)(B正確)。公平、不傷害、行善皆非「病人自我決定」。故自主原則(B)。護理四大倫理原則:自主(autonomy,尊重病人自我決定、知情同意)、行善(beneficence,主動做有益病人/謀求最大利益的事)、不傷害(non-maleficence,不造成傷害、預防滲漏約束自傷、勿用有害藥)、公平正義(justice,公平分配資源)。其他:保密、誠實、尊重多元信仰價值觀。法定傳染病(愛滋)依法通報不違反保密。","options":{"A":"公平原則是公平分配。","B":"正確(本題答案)。病人自己決定=自主原則。","C":"不傷害是不造成傷害。","D":"行善是做有益的事。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"101110-N2-57":{"quick":"研究告知目的取得同意=自主原則。","detail":{"background":"執行臨床研究「告知病患研究目的、取得其同意(知情同意)」=自主原則(autonomy,尊重受試者自我決定是否參與)(A正確)。行善、正義、不傷害皆非「知情同意/自我決定」。故自主原則(A)。護理四大倫理原則:自主(autonomy,尊重病人自我決定、知情同意)、行善(beneficence,主動做有益病人/謀求最大利益的事)、不傷害(non-maleficence,不造成傷害、預防滲漏約束自傷、勿用有害藥)、公平正義(justice,公平分配資源)。其他:保密、誠實、尊重多元信仰價值觀。法定傳染病(愛滋)依法通報不違反保密。","options":{"A":"正確(本題答案)。告知並取得同意=自主原則。","B":"行善是做有益的事。","C":"正義是公平分配。","D":"不傷害是不造成傷害。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"102110-N2-53":{"quick":"「勿取服或用有害之藥」=不傷害原則。","detail":{"background":"南丁格爾誓言「勿取服或用有害之藥」強調護理師「不使用會傷害病人的藥物」=不傷害原則(non-maleficence,不造成傷害)(B正確)。行善、誠實、自主皆非「不用有害藥物」。故不傷害原則(B)。護理四大倫理原則:自主(autonomy,尊重病人自我決定、知情同意)、行善(beneficence,主動做有益病人/謀求最大利益的事)、不傷害(non-maleficence,不造成傷害、預防滲漏約束自傷、勿用有害藥)、公平正義(justice,公平分配資源)。其他:保密、誠實、尊重多元信仰價值觀。法定傳染病(愛滋)依法通報不違反保密。","options":{"A":"行善是做有益的事。","B":"正確(本題答案)。勿用有害藥=不傷害原則。","C":"誠實是不欺騙。","D":"自主是尊重決定。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"102110-N2-65":{"quick":"侵入性檢查前簽同意志願書=自主原則。","detail":{"background":"病患侵入性檢查前「填寫同意志願書並簽名(知情同意)」=自主原則(autonomy,尊重病人自我決定是否接受檢查)(D正確)。行善、不傷害、公平皆非「知情同意」。故自主原則(D)。護理四大倫理原則:自主(autonomy,尊重病人自我決定、知情同意)、行善(beneficence,主動做有益病人/謀求最大利益的事)、不傷害(non-maleficence,不造成傷害、預防滲漏約束自傷、勿用有害藥)、公平正義(justice,公平分配資源)。其他:保密、誠實、尊重多元信仰價值觀。法定傳染病(愛滋)依法通報不違反保密。","options":{"A":"行善是做有益的事。","B":"不傷害是不造成傷害。","C":"公平是公平分配。","D":"正確(本題答案)。簽同意書=自主原則。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"103030-N2-2":{"quick":"家屬擺衣物傳統信仰:評估目的、了解並尊重信仰價值觀。","detail":{"background":"照護腦膜炎昏迷孩童,發現家屬擺成人形衣物(傳統信仰):最適切是「評估家屬此行為的目的與想法,了解並尊重家屬的信仰與價值觀(C)」——尊重多元文化與信仰(自主、尊重原則)。A請家屬清除(否定信仰)、B要家屬相信科學勿迷信(批判)、D趁家屬不在清除(不尊重)皆不當。故C。","options":{"A":"請家屬清除否定信仰。","B":"要家屬勿迷信是批判。","C":"正確(本題答案)。評估並尊重家屬信仰價值觀。","D":"趁不在清除不尊重。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"105030-N2-2":{"quick":"倫理原則「錯誤」=愛滋病資料向衛生局報告違反保密原則。","detail":{"background":"護理倫理原則:B人體實驗事前告知並取得書面同意(對,自主);C告知抹片重要性是行善(對);D應末期病人要求不予維生治療不違反不傷害(對)。選項A「醫師將愛滋病病人資料向當地衛生局報告,『違反』保密原則」錯誤(本題答案)——愛滋病是『法定傳染病』,依法『應通報』衛生機關,屬法定義務、不違反保密原則。故A。","options":{"A":"錯誤(本題答案)。法定傳染病依法通報,不違反保密。","B":"人體實驗取得書面同意(對)。","C":"告知抹片重要性是行善(對)。","D":"依末期病人要求不予維生不違反不傷害(對)。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"105030-N2-75":{"quick":"醫師考量病人治療最大利益=行善原則。","detail":{"background":"化學治療前「醫師考量病人治療之『最大利益』」=行善原則(beneficence,主動做對病人有益、謀求最大福祉的事)(B正確)。自主(尊重決定)、不傷害(不造成傷害)、公平(公平分配)皆非「謀求最大利益」。故行善原則(B)。護理四大倫理原則:自主(autonomy,尊重病人自我決定、知情同意)、行善(beneficence,主動做有益病人/謀求最大利益的事)、不傷害(non-maleficence,不造成傷害、預防滲漏約束自傷、勿用有害藥)、公平正義(justice,公平分配資源)。其他:保密、誠實、尊重多元信仰價值觀。法定傳染病(愛滋)依法通報不違反保密。","options":{"A":"自主是尊重決定。","B":"正確(本題答案)。考量最大利益=行善原則。","C":"不傷害是不造成傷害。","D":"公平是公平分配。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"106110-N2-54":{"quick":"醫師研究多抽5cc血:告知醫師必須徵求孩童父母知情同意。","detail":{"background":"住院醫師研究、要求為4歲病童多抽5cc血液供研究——護理師應「告知醫師必須徵求孩童父母的知情同意(D)」(研究須經知情同意、未成年由父母代理同意)。A遵醫囑多抽(違反知情同意)、B無關倫理(錯,涉研究倫理)、C協助抽血(未經同意)皆違反研究倫理。故D。","options":{"A":"遵醫囑多抽違反知情同意。","B":"涉研究倫理,非無關。","C":"未經同意協助抽血違反倫理。","D":"正確(本題答案)。須徵求父母知情同意。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"108020-N2-7":{"quick":"家屬拒截肢手術只換藥可能違反=自主原則?本題答案B。","detail":{"background":"本題官方答案B(自主原則)。王老先生因動脈硬化大範圍傷口需截肢,但「家屬(代理)考量高齡拒絕手術、只接受換藥」——此情境下家屬代理決定可能未充分尊重「『病人本人』的自主意願」(若病人意識清楚應由病人自決),家屬代理拒絕治療涉及『自主原則』的爭議。本題以自主原則為答案。故B。","options":{"A":"不傷害是不造成傷害。","B":"正確(本題答案)。家屬代理決定涉自主原則。","C":"公平是公平分配。","D":"保密是保護隱私。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"108110-N2-19":{"quick":"評估注射部位防化療藥滲漏=不傷害原則。","detail":{"background":"化療時「評估注射部位是否紅腫、確認有無化學藥物滲漏(預防滲漏造成組織傷害)」=不傷害原則(non-maleficence,預防傷害發生)(D正確)。自主、正義、公平皆非「預防傷害」。故不傷害原則(D)。護理四大倫理原則:自主(autonomy,尊重病人自我決定、知情同意)、行善(beneficence,主動做有益病人/謀求最大利益的事)、不傷害(non-maleficence,不造成傷害、預防滲漏約束自傷、勿用有害藥)、公平正義(justice,公平分配資源)。其他:保密、誠實、尊重多元信仰價值觀。法定傳染病(愛滋)依法通報不違反保密。","options":{"A":"自主是尊重決定。","B":"正義是公平分配。","C":"公平是公平分配。","D":"正確(本題答案)。預防藥物滲漏傷害=不傷害原則。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"111110-N2-2":{"quick":"腎衰竭病人堅持出院:提供居家附近透析室訊息=資源公平原則。","detail":{"background":"意識清楚腎衰竭病人因路程遠、家人負擔而堅持出院不願透析——D「提供病人居家附近血液透析室的完整訊息,以符合『資源公平原則』(讓病人能就近獲得醫療資源)」正確。A「讓他出院符合『保密』」(錯,與保密無關)、B「不告知家屬符合正義」(錯)、C「強制留院符合施益」(錯,違反自主)皆不當。故D。","options":{"A":"讓出院與保密無關。","B":"不告知家屬與正義無關。","C":"強制留院違反自主。","D":"正確(本題答案)。提供就近透析資源=資源公平原則。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"112180-N2-4":{"quick":"助人專業倫理守則「錯誤」=善用社交關係與服務對象互惠。","detail":{"background":"護理人員助人專業倫理守則:A尊重個案價值觀信仰、B對服務對象隱私保密、D關心大眾健康與社會需要。選項C「善用『社交關係』與服務對象『互惠』」錯誤(本題答案)——護病關係是『專業治療性關係』,不應與服務對象建立『私人社交/互惠』關係(違反專業界限)。故C。","options":{"A":"尊重個案價值觀信仰(對)。","B":"對隱私保密(對)。","C":"錯誤(本題答案)。不應與服務對象社交互惠(違反專業界限)。","D":"關心大眾健康(對)。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"114170-N2-4":{"quick":"病人昏迷家人要求灌草藥,護理師不同意=不傷害原則。","detail":{"background":"車禍昏迷病人,家人要求灌食自備草藥,護理師「不同意灌食」=基於不傷害原則(non-maleficence,避免不明草藥造成傷害)(A正確)。保密、誠實、公平皆非「避免傷害」。故不傷害原則(A)。護理四大倫理原則:自主(autonomy,尊重病人自我決定、知情同意)、行善(beneficence,主動做有益病人/謀求最大利益的事)、不傷害(non-maleficence,不造成傷害、預防滲漏約束自傷、勿用有害藥)、公平正義(justice,公平分配資源)。其他:保密、誠實、尊重多元信仰價值觀。法定傳染病(愛滋)依法通報不違反保密。","options":{"A":"正確(本題答案)。不灌不明草藥避免傷害=不傷害原則。","B":"保密是保護隱私。","C":"誠實是不欺騙。","D":"公平是公平分配。"},"sources":["新文京《護理倫理》倫理原則","華杏《護理倫理與法律》四大原則"]}},"102110-N2-10":{"quick":"觸診正確=觸診前必須先經過病患同意。","detail":{"background":"觸診(身體評估):A「觸診前必須先經過病患同意(知情同意、尊重自主)」正確。B「檢查時一律戴手套」錯(視部位而定,非一律);C「顧及隱私不可掀開衣物」錯(必要時須適度暴露檢查部位、並注意遮蔽);D「動作越輕越快越好」錯(應輕柔但不一定越快、須仔細)。故A。","options":{"A":"正確(本題答案)。觸診前須經病患同意。","B":"非一律戴手套(視部位)。","C":"必要時須適度暴露,注意遮蔽。","D":"動作輕柔但非越快越好。"},"sources":["新文京《護理倫理與法律》病人權利","醫療法;病人自主權利法"]}},"102110-N2-46":{"quick":"告知權利「不包含」=有選擇護理師的權利。","detail":{"background":"病人在法律上的權利:A知道診斷病情治療內容、C閱讀索取自己病歷、D接受或拒絕治療護理。選項B「有『選擇護理師』的權利」不包含(本題答案)——病人有知情、拒絕治療、閱覽病歷等權利,但「選擇特定護理師」非法定權利(由機構安排)。故B。病人權利:知情同意(告知診斷病情治療、簽同意書、觸診前同意)、拒絕治療護理、閱讀影印自己病歷、隱私保護(開床旁桌徵得同意、以姓名稱呼非床號、不對媒體洩漏)。意識清楚有自決能力者由病人本人簽同意書。出院方式:同意出院MBD(醫師同意)、自動出院AAD(違反醫療建議自行出院)。「選擇護理人員/病床」非法定權利。","options":{"A":"知道診斷病情是病人權利。","B":"正確(本題答案)。選擇護理師非法定權利。","C":"閱讀索取病歷是病人權利。","D":"接受或拒絕治療是病人權利。"},"sources":["新文京《護理倫理與法律》病人權利","醫療法;病人自主權利法"]}},"103100-N2-54":{"quick":"維護病人認同自尊=開啟床旁桌要徵得病人同意。","detail":{"background":"維護住院病人認同與自尊:B「開啟床旁桌(屬病人私人物品)要徵得病人同意(尊重隱私與自主)」正確。A「以床號代替姓名」錯(應以姓名稱呼維護認同);C「規定一定要穿住院病人服」錯(尊重病人意願);D「執行新治療不需詳細解釋」錯(應詳細解釋知情同意)。故B。","options":{"A":"應以姓名稱呼,非床號。","B":"正確(本題答案)。開床旁桌徵得病人同意。","C":"尊重病人意願,非強制穿病人服。","D":"新治療須詳細解釋。"},"sources":["新文京《護理倫理與法律》病人權利","醫療法;病人自主權利法"]}},"104100-N2-51":{"quick":"經濟欠佳醫師勸說仍執意出院=自動出院。","detail":{"background":"出院方式:同意出院(MBD,醫師同意可出院)、自動出院(AAD,違反醫囑/醫師建議仍堅持出院,against advice discharge)。李太太「醫師勸說後『仍執意』填同意書出院」=自動出院(C正確,違反醫療建議自行出院)。故自動出院(C)。","options":{"A":"同意出院是醫師同意可出院。","B":"許可出院非標準用語。","C":"正確(本題答案)。違反勸說執意出院=自動出院。","D":"一般出院非此情境。"},"sources":["新文京《護理倫理與法律》病人權利","醫療法;病人自主權利法"]}},"106030-N2-58":{"quick":"強暴少女受照護「錯誤」=一一回答記者問題以協助破案。","detail":{"background":"處理被強暴少女(隱私保護):A提供隱蔽保密照護、B詳實記錄言行反應及受傷狀況(採證)、D男醫師檢查時女護理師陪同。選項C「一一回答記者的問題以協助破案」錯誤(本題答案)——應『保護病人隱私、不對媒體洩漏』,回答記者問題會洩漏隱私、造成二度傷害。故C。","options":{"A":"提供隱蔽保密照護(對)。","B":"詳實記錄採證(對)。","C":"錯誤(本題答案)。不可回答記者洩漏隱私。","D":"男醫師檢查女護理師陪同(對)。"},"sources":["新文京《護理倫理與法律》病人權利","醫療法;病人自主權利法"]}},"108110-N2-51":{"quick":"告知病人權利「不包含」=選擇護理人員及病床位置的權利。","detail":{"background":"護理師告知入院病人的權利:A知道診斷病情、B知道醫護人員名字工作範圍、C拒絕治療及護理措施。選項D「選擇護理人員及病床位置的權利」不包含(本題答案)——病人有知情、拒絕治療等權利,但「選擇特定護理人員及病床」非法定權利。故D。病人權利:知情同意(告知診斷病情治療、簽同意書、觸診前同意)、拒絕治療護理、閱讀影印自己病歷、隱私保護(開床旁桌徵得同意、以姓名稱呼非床號、不對媒體洩漏)。意識清楚有自決能力者由病人本人簽同意書。出院方式:同意出院MBD(醫師同意)、自動出院AAD(違反醫療建議自行出院)。「選擇護理人員/病床」非法定權利。","options":{"A":"知道診斷病情是權利。","B":"知道醫護名字工作範圍是權利。","C":"拒絕治療是權利。","D":"正確(本題答案)。選擇護理人員及病床非法定權利。"},"sources":["新文京《護理倫理與法律》病人權利","醫療法;病人自主權利法"]}},"110030-N2-55":{"quick":"「不」是病人權利=可延長住院期限獲取醫療保險給付。","detail":{"background":"病人的權利:B知道自己診斷進展治療內容、C閱讀影印自己病歷、D拒絕非其意願的治療護理。選項A「可延長住院期限獲取醫療保險給付」不是病人權利(本題答案)——「不當延長住院詐領保險」是違法行為,非病人權利。故A。病人權利:知情同意(告知診斷病情治療、簽同意書、觸診前同意)、拒絕治療護理、閱讀影印自己病歷、隱私保護(開床旁桌徵得同意、以姓名稱呼非床號、不對媒體洩漏)。意識清楚有自決能力者由病人本人簽同意書。出院方式:同意出院MBD(醫師同意)、自動出院AAD(違反醫療建議自行出院)。「選擇護理人員/病床」非法定權利。","options":{"A":"正確(本題答案)。延長住院詐領保險非病人權利(違法)。","B":"知道診斷治療是權利。","C":"閱讀影印病歷是權利。","D":"拒絕非意願治療是權利。"},"sources":["新文京《護理倫理與法律》病人權利","醫療法;病人自主權利法"]}},"112110-N2-2":{"quick":"意識清楚有自決能力病人簽MRI同意書=病人本人。","detail":{"background":"簽署檢查同意書的優先順序:病人「意識清醒、有自決能力」時,應由「病人『本人』簽署(A)」——意識清楚有自決能力者,自己是同意書的簽署人(尊重自主)。配偶、兒子、家屬代簽僅在病人無自決能力時。故病人本人(A)。病人權利:知情同意(告知診斷病情治療、簽同意書、觸診前同意)、拒絕治療護理、閱讀影印自己病歷、隱私保護(開床旁桌徵得同意、以姓名稱呼非床號、不對媒體洩漏)。意識清楚有自決能力者由病人本人簽同意書。出院方式:同意出院MBD(醫師同意)、自動出院AAD(違反醫療建議自行出院)。「選擇護理人員/病床」非法定權利。","options":{"A":"正確(本題答案)。意識清楚有自決能力由病人本人簽。","B":"配偶代簽僅在病人無自決能力時。","C":"兒子代簽僅在無自決能力時。","D":"非家屬自行決定。"},"sources":["新文京《護理倫理與法律》病人權利","醫療法;病人自主權利法"]}},"112110-N2-52":{"quick":"病情穩定可出院卻自行至他院要求住院=自動出院。","detail":{"background":"出院方式:王先生「病情穩定、主治醫師同意出院,但自認無法回家、『自行至他院』要求住院」——在原醫院屬「自動出院(against advice discharge,違反醫師出院建議自行離院)」(B正確)。同意出院(MBD,醫師同意)、抗拒出院、轉院皆非。故自動出院(B)。","options":{"A":"同意出院是醫師同意出院。","B":"正確(本題答案)。違反建議自行離院=自動出院。","C":"抗拒出院非標準分類。","D":"轉院是經正式轉介。"},"sources":["新文京《護理倫理與法律》病人權利","醫療法;病人自主權利法"]}},"101110-N2-65":{"quick":"護理機構負責人資格「除外」=具有專科護理師執照。","detail":{"background":"護理人員法施行細則所定護理機構負責人資格:A資深護理人員、B從事臨床護理工作護士7年以上、C護理師登記執業臨床年資4年以上(符合資歷者)。選項D「具有專科護理師執照」不是必備資格條件(本題答案,除外)——負責人資格依年資,非必須有專科護理師執照。故D。","options":{"A":"資深護理人員是資格之一。","B":"護士7年以上是資格之一。","C":"護理師4年以上是資格之一。","D":"正確(本題答案)。專科護理師執照非必備資格。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"102030-N2-76":{"quick":"執業登記繼續教育「錯誤」=領得證書逾5年首次申請可直接執業登記。","detail":{"background":"護理人員執業登記及繼續教育:A每6年接受150點繼續教育更新執照(對);C課程含專業課程/品質/倫理/相關法規(對)。選項D「領得護理人員證書『逾5年』,首次申請執業登記,得『以直接』申請執業登記」錯誤(本題答案)——領證逾5年首次執業,須『先完成一定積分(如近2年達一定點數)』才能執業登記,非直接登記。故D(B選項亦有爭議,但本題以D為錯誤)。","options":{"A":"每6年150點更新(對)。","B":"倫理法規課程(對應)。","C":"課程含四類(對)。","D":"錯誤(本題答案)。逾5年首次執業須先補積分,非直接登記。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"103100-N2-60":{"quick":"「不」是獨立性護理措施=醫療輔助行為。","detail":{"background":"護理人員法業務範圍:獨立性護理措施(A健康問題護理評估、B預防保健護理措施、C護理指導及諮詢);依賴性/協同性(醫療輔助行為,須依醫囑)。選項D「醫療輔助行為」不是獨立性護理措施(本題答案)——醫療輔助行為須『依醫師指示/醫囑』執行,屬依賴性。故D。","options":{"A":"護理評估是獨立性措施。","B":"預防保健是獨立性措施。","C":"護理指導諮詢是獨立性措施。","D":"正確(本題答案)。醫療輔助行為依醫囑,非獨立性。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"105030-N2-7":{"quick":"護理人員法第24條業務範圍「不包含」=醫療處置行為。","detail":{"background":"護理人員法第24條護理業務範圍:A健康問題護理評估、B預防保健護理措施、C護理指導及諮詢、醫療輔助行為(依醫囑)。選項D「醫療『處置』行為」不是護理人員的業務範圍(本題答案)——醫療處置(診斷、處方、手術)是『醫師』職權,護理人員只能執行『醫療輔助行為(依醫囑)』。故D。","options":{"A":"護理評估是業務範圍。","B":"預防保健是業務範圍。","C":"護理指導諮詢是業務範圍。","D":"正確(本題答案)。醫療處置行為是醫師職權,非護理業務。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"107110-N2-59":{"quick":"證照租借給無資格者=廢止其護理師證書。","detail":{"background":"護理人員法:護理師「將證照租借給不具護理師資格者使用」,處罰=「廢止其護理師證書」(A正確,情節重大)。罰鍰僅次要、廢止證書是嚴重處分。故廢止護理師證書(A)。護理人員法:第24條業務範圍=健康問題護理評估、預防保健、護理指導諮詢(獨立性)+醫療輔助行為(依醫囑);病情解釋/醫療處置是醫師職權非護理業務。執業登記/繼續教育:每6年150點(含專業課程/品質/倫理/法規)。停業歇業復業變更30日內報請備查(違反罰3000~30000元)。證照租借予無資格者→廢止護理師證書。僱用非護理科系執行護理業務罰2萬~10萬。","options":{"A":"正確(本題答案)。租借證照廢止護理師證書。","B":"一萬至二萬罰鍰不符。","C":"二萬至十萬罰鍰非此情節。","D":"十萬以上罰鍰不符。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"107110-N2-66":{"quick":"繼續教育辦法正確=積分須含專業課程品質倫理及相關法規。","detail":{"background":"醫事人員執業登記及繼續教育辦法:D「繼續教育課程積分必須包含專業課程、專業品質、專業倫理及專業相關法規(四大類)」正確。A「每『六年』150點」(對應,但本題以D為正解);B「五年內首次執業前一年完成25點」敘述須對應;C「未換證罰『聘僱機構』」錯(罰的是護理人員本人)。故D。","options":{"A":"每六年150點(對應,本題正解D)。","B":"首次執業積分敘述須對應。","C":"未換證罰護理人員本人,非聘僱機構。","D":"正確(本題答案)。積分含四大類課程。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"108110-N2-20":{"quick":"ICN護理師基本責任「不包括」=疾病診斷。","detail":{"background":"國際護理協會(ICN)護理人員倫理規範,護理師的四大基本責任:A健康促進、B疾病預防、C減輕痛苦、恢復健康。選項D「疾病診斷」不包括(本題答案)——「疾病診斷」是『醫師』的職責,非護理師的基本責任。故D。護理人員法:第24條業務範圍=健康問題護理評估、預防保健、護理指導諮詢(獨立性)+醫療輔助行為(依醫囑);病情解釋/醫療處置是醫師職權非護理業務。執業登記/繼續教育:每6年150點(含專業課程/品質/倫理/法規)。停業歇業復業變更30日內報請備查(違反罰3000~30000元)。證照租借予無資格者→廢止護理師證書。僱用非護理科系執行護理業務罰2萬~10萬。","options":{"A":"健康促進是護理師基本責任。","B":"疾病預防是基本責任。","C":"減輕痛苦是基本責任。","D":"正確(本題答案)。疾病診斷是醫師職責,非護理師。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"109030-N2-1":{"quick":"停業歇業應自事實發生日起30日內報請備查。","detail":{"background":"護理人員法第11條(109年):護理人員停業或歇業時,應自事實發生之日起『30日內』,報請原發執業執照機關備查(D正確)。故30日(D)。護理人員法:第24條業務範圍=健康問題護理評估、預防保健、護理指導諮詢(獨立性)+醫療輔助行為(依醫囑);病情解釋/醫療處置是醫師職權非護理業務。執業登記/繼續教育:每6年150點(含專業課程/品質/倫理/法規)。停業歇業復業變更30日內報請備查(違反罰3000~30000元)。證照租借予無資格者→廢止護理師證書。僱用非護理科系執行護理業務罰2萬~10萬。","options":{"A":"3日不符。","B":"10日不符。","C":"15日不符。","D":"正確(本題答案)。停業歇業30日內報請備查。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"111030-N2-59":{"quick":"護理長代言奶粉穿制服=不違法,但違背護理專業倫理。","detail":{"background":"產科護理長「應邀奶粉代言、身著護理師制服在媒體推薦產品」:A「不違法,但違背護理專業倫理(利用護理師形象為商品背書、違反專業倫理)」正確。B觸犯護理人員法應罰鍰(未必觸法)、C有助形象值得鼓勵(錯,違反倫理)、D違反消保法應檢舉(非消保法)皆不當。故A。","options":{"A":"正確(本題答案)。代言不違法但違背專業倫理。","B":"未必觸犯護理人員法罰鍰。","C":"違反倫理,非值得鼓勵。","D":"非違反消保法。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"111030-N2-72":{"quick":"可再發給執業執照=執業6年且完成繼續教育120點。","detail":{"background":"可再發給/更新護理執業執照者:B「執業6年,且完成繼續教育時數120點(達標即可更新)」正確。A販賣毒品判刑確定、C身心狀況不能執業、D被廢止護理人員證書者皆「不可」再發給執照(屬不予發給/廢止情形)。故B。護理人員法:第24條業務範圍=健康問題護理評估、預防保健、護理指導諮詢(獨立性)+醫療輔助行為(依醫囑);病情解釋/醫療處置是醫師職權非護理業務。執業登記/繼續教育:每6年150點(含專業課程/品質/倫理/法規)。停業歇業復業變更30日內報請備查(違反罰3000~30000元)。證照租借予無資格者→廢止護理師證書。僱用非護理科系執行護理業務罰2萬~10萬。","options":{"A":"販賣毒品判刑不可發給。","B":"正確(本題答案)。執業6年完成繼續教育可更新。","C":"身心不能執業不可發給。","D":"被廢止證書者不可發給。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"111110-N2-60":{"quick":"僱用非護理科系執行護理業務=2萬至10萬罰鍰。","detail":{"background":"護理人員法第29條:護理機構僱用非護理科系/不具護理資格者執行護理業務,處『新臺幣2萬元以上10萬元以下罰鍰』(B正確)。輔導教育、廢止執照、吊扣證書皆非此條罰則。故2萬至10萬罰鍰(B)。護理人員法:第24條業務範圍=健康問題護理評估、預防保健、護理指導諮詢(獨立性)+醫療輔助行為(依醫囑);病情解釋/醫療處置是醫師職權非護理業務。執業登記/繼續教育:每6年150點(含專業課程/品質/倫理/法規)。停業歇業復業變更30日內報請備查(違反罰3000~30000元)。證照租借予無資格者→廢止護理師證書。僱用非護理科系執行護理業務罰2萬~10萬。","options":{"A":"輔導教育40小時非此罰則。","B":"正確(本題答案)。2萬至10萬罰鍰。","C":"永久廢止開業執照過重。","D":"吊扣證書非此罰則。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"112030-N2-47":{"quick":"護理人員法第24條業務範圍「不包括」=進行病情解釋。","detail":{"background":"護理人員法第24條業務範圍:B評估健康問題、C提供護理指導、D執行預防性護理措施(及醫療輔助行為)。選項A「進行病情解釋」不包括(本題答案)——「病情解釋」是『醫師』職責,非護理人員的業務範圍。故A。護理人員法:第24條業務範圍=健康問題護理評估、預防保健、護理指導諮詢(獨立性)+醫療輔助行為(依醫囑);病情解釋/醫療處置是醫師職權非護理業務。執業登記/繼續教育:每6年150點(含專業課程/品質/倫理/法規)。停業歇業復業變更30日內報請備查(違反罰3000~30000元)。證照租借予無資格者→廢止護理師證書。僱用非護理科系執行護理業務罰2萬~10萬。","options":{"A":"正確(本題答案)。病情解釋是醫師職責,非護理業務。","B":"評估健康問題是業務範圍。","C":"提供護理指導是業務範圍。","D":"執行預防性護理是業務範圍。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"112110-N2-11":{"quick":"病歷注意「錯誤」=護理紀錄依護理人員法第25條應...(實為保存規定);本題答案C。","detail":{"background":"本題官方答案C。病歷注意:A離開工作車要關閉病人畫面維護隱私(對);B病人死亡後電子病歷仍須保存至少7年(對);D家屬要求觀看病歷,未經病人與主治醫師同意不可(對)。選項C「依護理人員法第25條,護理師執行業務製作的紀錄應(保存規定)」敘述有誤(護理紀錄屬病歷一部分,保存依醫療法;第25條條號/內容對應有誤),本題以C為錯誤。故C。","options":{"A":"關閉病人畫面維護隱私(對)。","B":"死亡後電子病歷保存7年(對)。","C":"錯誤(本題答案)。護理紀錄條號/保存規定對應有誤。","D":"未經同意不可觀看病歷(對)。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"113030-N2-4":{"quick":"違反停業歇業復業變更備查規定=3000至30000元罰鍰。","detail":{"background":"護理人員法(109修):護理人員停業、歇業、復業或變更執業處所應於規定時間(30日)內報請備查;違反者處『新臺幣3,000元以上30,000元以下罰鍰』(C正確)。故3000至30000元(C)。護理人員法:第24條業務範圍=健康問題護理評估、預防保健、護理指導諮詢(獨立性)+醫療輔助行為(依醫囑);病情解釋/醫療處置是醫師職權非護理業務。執業登記/繼續教育:每6年150點(含專業課程/品質/倫理/法規)。停業歇業復業變更30日內報請備查(違反罰3000~30000元)。證照租借予無資格者→廢止護理師證書。僱用非護理科系執行護理業務罰2萬~10萬。","options":{"A":"1000~10000不符。","B":"2000~20000不符。","C":"正確(本題答案)。3000~30000元罰鍰。","D":"4000~40000不符。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"113100-N2-7":{"quick":"病歷保存管理「錯誤」=住院期間方便查房可先將病歷放病人單位。","detail":{"background":"病歷保存管理:A病歷未經病人主治醫師許可不得洩漏病情(對);B病人想了解病情預後需由主治醫師說明(對);D成年人病歷至少保存7年(對)。選項C「住院期間,方便醫師查房可先將病歷放在『病人單位』」錯誤(本題答案)——病歷應放『護理站』妥善保管,不可置於病人單位(防遺失、洩漏隱私)。故C。","options":{"A":"病歷未經許可不得洩漏(對)。","B":"病情由主治醫師說明(對)。","C":"錯誤(本題答案)。病歷應放護理站,不可置病人單位。","D":"成年人病歷保存7年(對)。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"114170-N2-24":{"quick":"護理人員法「最適當」=證照租借予無資格者廢止其證書。","detail":{"background":"護理人員法規範:D「護理人員將證照租借予不具護理人員資格者使用,廢止其護理人員證書(情節重大)」最適當。A「停業應自發生日起『一年內』備查」錯(應30日內);B「停業逾『三年』應歇業」錯(停業逾一定期限規定不同);C「受停業處分仍執業,廢止『護理師證書』」——應是廢止執業執照/較重處分,本題以D為最適當。故D。","options":{"A":"停業應30日內備查,非一年。","B":"停業歇業期限規定須對應。","C":"受停業仍執業處分須對應。","D":"正確(本題答案)。租借證照廢止護理人員證書。"},"sources":["護理人員法","新文京《護理倫理與法律》護理人員法"]}},"101030-N2-74":{"quick":"醫療糾紛處理正確=請專責部門出面協助處理。","detail":{"background":"醫療糾紛處理:D「請專責部門(如社工、公關、法務、醫療糾紛處理小組)出面協助處理」正確。A「更改紀錄保護自己」(竄改紀錄違法)、B「與病患保持距離」(應持續關懷溝通)、C「一定爭取醫院利益」(應公正處理、以病人為中心)皆不當。故D。醫療糾紛預防:依SOP正確執行、熟知法令依法執業、善盡說明、態度誠懇同理、不保證療效。處理:了解原因分析導因、誠實面對病人家屬、請專責部門/第三者協助、即時處理抱怨(非拖延、非高姿態、非當事人現場解釋、非更改紀錄)。法律責任:民事(侵權賠償)、刑事(過失傷害罪,不免刑罰)、行政(懲戒委員會決定執照處分)。糾紛後關懷當事者+加強教育(非追究個人)。","options":{"A":"更改紀錄違法。","B":"應持續關懷溝通,非保持距離。","C":"應公正處理,非只爭醫院利益。","D":"正確(本題答案)。請專責部門協助處理。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"101110-N2-77":{"quick":"最容易產生醫療糾紛=護理人員未到醫師前先行插管電擊。","detail":{"background":"最容易產生醫療糾紛:C「緊急救護醫師未到前,護理人員先行幫病患插管、電擊(逾越業務範圍、執行非護理人員職權的醫療處置)」(C正確,逾越權限易致糾紛)。A態度從容誠懇溝通、B措施前說明清楚、D說明用聽得懂的話皆是『減少』糾紛的做法。故C。醫療糾紛預防:依SOP正確執行、熟知法令依法執業、善盡說明、態度誠懇同理、不保證療效。處理:了解原因分析導因、誠實面對病人家屬、請專責部門/第三者協助、即時處理抱怨(非拖延、非高姿態、非當事人現場解釋、非更改紀錄)。法律責任:民事(侵權賠償)、刑事(過失傷害罪,不免刑罰)、行政(懲戒委員會決定執照處分)。糾紛後關懷當事者+加強教育(非追究個人)。","options":{"A":"態度誠懇溝通減少糾紛。","B":"措施前說明減少糾紛。","C":"正確(本題答案)。逾越權限插管電擊易致糾紛。","D":"用聽得懂的話減少糾紛。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"103030-N2-70":{"quick":"醫療糾紛因應「最不適當」=在現場由當事人向病人解釋發生原因。","detail":{"background":"醫療糾紛因應:A態度冷靜誠懇、C請教法律專家、D由社工輔導人員協助出面。選項B「在『現場』由『當事人』向病人解釋發生原因」最不適當(本題答案)——糾紛當下當事人情緒易激動、易加劇衝突,應由「第三方/專責部門」冷靜處理,非當事人現場解釋。故B。","options":{"A":"態度冷靜誠懇(適當)。","B":"最不適當(本題答案)。不宜當事人現場解釋(易加劇衝突)。","C":"請教法律專家(適當)。","D":"由社工協助(適當)。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"103100-N2-59":{"quick":"預防醫療糾紛有效方法=依工作標準正確執行護理技術。","detail":{"background":"預防醫療糾紛的有效方法:A「能依工作標準(SOP)正確執行護理技術(減少疏失)」正確。B「向病患保證治療成效」(不可保證、易致糾紛)、C「給藥錯誤時立即通報」(是錯誤『發生後』的補救,非『預防』)、D「能力不足但態度良好」(能力不足仍易致糾紛)皆非有效『預防』。故A。","options":{"A":"正確(本題答案)。依標準正確執行技術預防糾紛。","B":"不可保證療效(易致糾紛)。","C":"立即通報是事後補救,非預防。","D":"能力不足仍易致糾紛。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"104100-N2-79":{"quick":"醫療糾紛處理步驟「錯誤」=用高姿態向病患或家屬溝通說明。","detail":{"background":"醫療糾紛處理:A了解原因分析重要導因、C請第三者協助、D找出令對方滿意的解決之道。選項B「用『高姿態』向病患或家屬溝通說明衝突」錯誤(本題答案)——應以「誠懇、同理、平等」的態度溝通,高姿態會激化衝突。故B。醫療糾紛預防:依SOP正確執行、熟知法令依法執業、善盡說明、態度誠懇同理、不保證療效。處理:了解原因分析導因、誠實面對病人家屬、請專責部門/第三者協助、即時處理抱怨(非拖延、非高姿態、非當事人現場解釋、非更改紀錄)。法律責任:民事(侵權賠償)、刑事(過失傷害罪,不免刑罰)、行政(懲戒委員會決定執照處分)。糾紛後關懷當事者+加強教育(非追究個人)。","options":{"A":"了解原因分析導因(對)。","B":"錯誤(本題答案)。不可高姿態溝通(激化衝突)。","C":"請第三者協助(對)。","D":"找令對方滿意的解決之道(對)。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"105030-N2-58":{"quick":"醫療糾紛「錯誤」=任何醫療行為均有風險故無法預防醫療糾紛。","detail":{"background":"醫療糾紛:A過程方式結果態度不好可能產生糾紛(對)、C糾紛後找原因改正彌補不滿(對)、D可能來自醫療/護理/溝通問題(對)。選項B「任何醫療行為均有風險,因此『無法預防』醫療糾紛」錯誤(本題答案)——醫療糾紛「可透過良好溝通、品質管理、依標準執業『預防/減少』」,非無法預防。故B。","options":{"A":"態度結果不好可能致糾紛(對)。","B":"錯誤(本題答案)。醫療糾紛可預防,非無法預防。","C":"糾紛後找原因改正(對)。","D":"可能來自溝通問題(對)。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"108110-N2-79":{"quick":"醫療糾紛後省思預防=關懷當事者(2)+加強在職教育提升品質(3)→「23」。","detail":{"background":"醫療糾紛處理後的省思與預防:2給予事故當事者關懷、協助走出傷痛(支持取代懲罰)、3加強在職教育、提升照護品質。選項1「徹底檢討『追究』事故當事者之疏失」不當(應系統思維、非追究個人);4...。故為「23」。醫療糾紛預防:依SOP正確執行、熟知法令依法執業、善盡說明、態度誠懇同理、不保證療效。處理:了解原因分析導因、誠實面對病人家屬、請專責部門/第三者協助、即時處理抱怨(非拖延、非高姿態、非當事人現場解釋、非更改紀錄)。法律責任:民事(侵權賠償)、刑事(過失傷害罪,不免刑罰)、行政(懲戒委員會決定執照處分)。糾紛後關懷當事者+加強教育(非追究個人)。","options":{"A":"12含1(追究個人)不當。","B":"13含1不當。","C":"正確(本題答案,23)。關懷當事者、加強在職教育。","D":"24不符。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"111030-N2-75":{"quick":"預防醫療糾紛正確=護理師需熟知法令確實依法執行業務。","detail":{"background":"護理人員預防醫療糾紛:B「需熟知法令規範,確實依法執行業務,以免誤觸法網」正確。A「多說話易出錯故減少與病人會談」錯(應充分溝通);C「不管態度如何都應建立良好關係」錯(態度很重要);D「經驗豐富者不需依標準執行」錯(無論資歷都應依SOP)。故B。","options":{"A":"應充分溝通,非減少會談。","B":"正確(本題答案)。熟知法令依法執業預防糾紛。","C":"態度很重要,不可忽視。","D":"無論資歷都應依標準執行。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"111030-N2-77":{"quick":"造成醫院危機的「外在」因素「錯誤」=財務結構不良。","detail":{"background":"造成醫院危機的『外在』因素:A大量傷患擁至、B發生醫療糾紛、D媒體負面報導(外部環境/事件)。選項C「財務結構不良」不是『外在』因素(本題答案)——財務結構是『內部』管理因素,非外在因素。故C。醫療糾紛預防:依SOP正確執行、熟知法令依法執業、善盡說明、態度誠懇同理、不保證療效。處理:了解原因分析導因、誠實面對病人家屬、請專責部門/第三者協助、即時處理抱怨(非拖延、非高姿態、非當事人現場解釋、非更改紀錄)。法律責任:民事(侵權賠償)、刑事(過失傷害罪,不免刑罰)、行政(懲戒委員會決定執照處分)。糾紛後關懷當事者+加強教育(非追究個人)。","options":{"A":"大量傷患是外在因素。","B":"醫療糾紛是外在因素。","C":"正確(本題答案)。財務結構不良是內部因素,非外在。","D":"媒體負面報導是外在因素。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"112110-N2-79":{"quick":"預防護理業務糾紛「最不適當」=病人抱怨待明日護理長上班再處理。","detail":{"background":"預防護理業務糾紛:A不斷充實護理專業知識、B尊重病人保護隱私善盡說明、D正確遵守標準作業程序。選項C「病人抱怨時,待『明日』護理長上班時再處理」最不適當(本題答案)——抱怨應『即時處理』,拖延會加劇不滿、惡化糾紛。故C。醫療糾紛預防:依SOP正確執行、熟知法令依法執業、善盡說明、態度誠懇同理、不保證療效。處理:了解原因分析導因、誠實面對病人家屬、請專責部門/第三者協助、即時處理抱怨(非拖延、非高姿態、非當事人現場解釋、非更改紀錄)。法律責任:民事(侵權賠償)、刑事(過失傷害罪,不免刑罰)、行政(懲戒委員會決定執照處分)。糾紛後關懷當事者+加強教育(非追究個人)。","options":{"A":"充實專業知識(適當)。","B":"尊重病人善盡說明(適當)。","C":"最不適當(本題答案)。抱怨應即時處理,非拖延。","D":"遵守標準作業程序(適當)。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"113100-N2-50":{"quick":"預防護理業務糾紛最適宜=建立護理技術及常規的標準作業程序。","detail":{"background":"護理主管預防護理業務糾紛:A「建立護理技術及常規的標準作業程序(SOP,確保照護品質一致、減少疏失)」最適宜。B「護理師不要相互支援」(錯,應互助);C「儘量不要回答病人問題」(錯,應善盡說明);D「年資增長自然能了解」(錯,須主動學習與制度)皆不當。故A。","options":{"A":"正確(本題答案)。建立SOP預防糾紛。","B":"應相互支援,非不支援。","C":"應善盡說明,非不回答。","D":"須主動學習,非靠年資自然。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"114030-N2-50":{"quick":"醫療結果不如預期糾紛處理優先=勇敢出來誠實面對病人或家屬。","detail":{"background":"醫療處置結果不如預期的糾紛處理,『優先』=C「勇敢出來誠實面對病人或家屬(誠實揭露disclosure、同理溝通)」。A請院長立即道歉(過早升級)、B收集前例(非優先)、D說明任何醫療有風險(像在卸責)皆非優先。故誠實面對(C)。醫療糾紛預防:依SOP正確執行、熟知法令依法執業、善盡說明、態度誠懇同理、不保證療效。處理:了解原因分析導因、誠實面對病人家屬、請專責部門/第三者協助、即時處理抱怨(非拖延、非高姿態、非當事人現場解釋、非更改紀錄)。法律責任:民事(侵權賠償)、刑事(過失傷害罪,不免刑罰)、行政(懲戒委員會決定執照處分)。糾紛後關懷當事者+加強教育(非追究個人)。","options":{"A":"請院長道歉非優先。","B":"收集前例非優先。","C":"正確(本題答案)。優先誠實面對病人家屬。","D":"說明有風險像卸責。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"115030-N2-1":{"quick":"醫療糾紛法律責任「錯誤」=護理人員法保障護理人員可免於刑罰。","detail":{"background":"醫療糾紛的法律責任:A對侵權行為負民事責任(金錢賠償)(對);B應注意而未注意致傷害可能面臨過失傷害罪(對,刑事);D地方衛生機關懲戒委員會決定執照撤銷停權(對,行政)。選項C「護理人員法保障護理人員在涉及刑法責任時,可『免於刑罰』」錯誤(本題答案)——護理人員若有過失致病人傷害,仍須負『刑事責任』,法律不豁免刑罰。故C。","options":{"A":"侵權行為負民事責任(對)。","B":"過失致傷害面臨過失傷害罪(對)。","C":"錯誤(本題答案)。護理人員過失仍須負刑責,非免刑罰。","D":"懲戒委員會決定執照處分(對)。"},"sources":["新文京《護理倫理與法律》醫療糾紛","華杏《護理行政學》醫療糾紛處理"]}},"101110-N2-66":{"quick":"異常事件通報正確=實施無懲罰制度。","detail":{"background":"建置異常事件通報系統:C「實施無懲罰制度(非懲罰性通報,鼓勵誠實通報、找系統根因)」正確。A「介入做事件調查瞭解原由」(調查像究責);B「提供人時地資料」(通報應去識別化、重點是學習);D「作為員工考核依據」(會抑制通報)皆不當。故無懲罰制度(C)。","options":{"A":"調查像究責(不當)。","B":"通報應去識別化學習。","C":"正確(本題答案)。實施無懲罰制度。","D":"作考核依據會抑制通報。"},"sources":["新文京《護理行政》病人安全通報","病人安全通報系統(TPR)原則"]}},"104100-N2-75":{"quick":"非強制性通報=跡近錯失。","detail":{"background":"醫療事件通報:強制性通報(嚴重事件:中毒、輸血錯誤致死、用藥錯誤致死等須強制通報);非強制(自願)性通報(如跡近錯失near miss,鼓勵自願通報學習)。選項D「跡近錯失」屬非強制性通報(D正確)。A中毒、B輸血致死、C用藥致死皆是強制通報。故跡近錯失(D)。","options":{"A":"中毒事件是強制通報。","B":"輸血致死是強制通報。","C":"用藥致死是強制通報。","D":"正確(本題答案)。跡近錯失是非強制(自願)通報。"},"sources":["新文京《護理行政》病人安全通報","病人安全通報系統(TPR)原則"]}},"108110-N2-73":{"quick":"異常事件通報最主要目的=避免同樣事件重複發生。","detail":{"background":"異常事件通報的最主要目的=A「避免同樣的事件重複發生(從錯誤中學習、系統改善預防)」。B進行懲罰、C避免醫療糾紛、D釐清責任皆非通報目的(通報是『非懲罰性、學習改善』,非究責)。故避免重複發生(A)。病人安全通報系統(TPR)原則:保密、不究責、共同學習、匿名、自願(非懲罰性、非強制、非實名)。主要目的=避免同樣事件重複發生(學習改善預防),非懲罰/究責/避免糾紛。強制通報=嚴重事件(中毒、輸血/用藥錯誤致死);非強制(自願)=跡近錯失near miss。","options":{"A":"正確(本題答案)。最主要目的=避免事件重複發生。","B":"通報非為懲罰。","C":"非為避免糾紛。","D":"非為釐清責任。"},"sources":["新文京《護理行政》病人安全通報","病人安全通報系統(TPR)原則"]}},"115030-N2-42":{"quick":"病安通報主要原則=匿名、自願(加保密不究責共同學習)。","detail":{"background":"台灣病人安全通報系統(TPR)的主要原則:保密、不究責、共同學習、『匿名、自願』(B正確)——匿名(去識別)、自願(非強制)通報,鼓勵誠實通報、學習改善。實名、強制皆會抑制通報。故匿名、自願(B)。病人安全通報系統(TPR)原則:保密、不究責、共同學習、匿名、自願(非懲罰性、非強制、非實名)。主要目的=避免同樣事件重複發生(學習改善預防),非懲罰/究責/避免糾紛。強制通報=嚴重事件(中毒、輸血/用藥錯誤致死);非強制(自願)=跡近錯失near miss。","options":{"A":"匿名、強制(強制抑制通報)。","B":"正確(本題答案)。匿名、自願。","C":"實名抑制通報。","D":"實名、強制皆抑制通報。"},"sources":["新文京《護理行政》病人安全通報","病人安全通報系統(TPR)原則"]}},"106030-N2-56":{"quick":"未簽意願書但曾口頭表示不CPR:女兒可代簽不施行CPR同意書後撤除。","detail":{"background":"末期病人意識清楚時曾口頭表示不希望CPR、但未簽意願書即意識不清,呼吸停止時:依安寧緩和醫療條例,C「(最近親屬)女兒可以代為簽署『不施行心肺復甦術同意書』後撤除(末期病人最近親屬可代簽DNR)」正確。A未簽無法撤除(錯,親屬可代簽)、B父母法律位階高於女兒(錯,最近親屬同順位)、D須召開倫理委員會(非必要)皆不當。故C。","options":{"A":"親屬可代簽,非無法撤除。","B":"最近親屬同順位,非父母優先。","C":"正確(本題答案)。女兒可代簽DNR同意書後撤除。","D":"非須召開倫理委員會。"},"sources":["安寧緩和醫療條例;病人自主權利法","新文京《護理倫理與法律》善終"]}},"111030-N2-56":{"quick":"「不是」最近親屬=65歲堂兄。","detail":{"background":"安寧緩和醫療條例「最近親屬」範圍(順序):配偶、成年子女孫子女、父母、兄弟姐妹、祖父母、曾祖父母/三親等旁系血親、一親等直系姻親。選項C「65歲堂兄(旁系血親較遠)」不是法定最近親屬(本題答案)——孫女、胞妹、父親皆在最近親屬範圍,堂兄(三親等以外旁系)非。故堂兄(C)。","options":{"A":"20歲孫女是最近親屬。","B":"55歲胞妹(兄弟姐妹)是最近親屬。","C":"正確(本題答案)。堂兄非法定最近親屬。","D":"85歲父親是最近親屬。"},"sources":["安寧緩和醫療條例;病人自主權利法","新文京《護理倫理與法律》善終"]}},"113100-N2-33":{"quick":"病人自主權利法正確=意願人參加預立醫療照護諮商後簽署預立醫療決定。","detail":{"background":"病人自主權利法(病主法):C「意願人得由個人參加『預立醫療照護諮商(ACP)』後,簽署『預立醫療決定(AD)』」正確。A「『重度衰弱』者為適用臨床條件之一」錯(五款條件:末期、不可逆昏迷、永久植物人、極重度失智、其他公告重症,無重度衰弱);B「昏迷時僅能由最近親屬出具同意書」錯(可依預立的AD);D「預立醫療決定可選擇接受或拒絕維生治療及人工營養」(此項其實對)。本題以C為正確答案。故C。","options":{"A":"重度衰弱非病主法五款臨床條件。","B":"可依預立AD,非僅親屬同意書。","C":"正確(本題答案)。ACP諮商後簽署AD。","D":"AD可選擇接受/拒絕維生與人工營養(亦對)。"},"sources":["安寧緩和醫療條例;病人自主權利法","新文京《護理倫理與法律》善終"]}},"114030-N2-32":{"quick":"安寧緩和醫療條例正確=意願人得預立醫療委任代理人並書面載明。","detail":{"background":"安寧緩和醫療條例:C「意願人得『預立醫療委任代理人』,並以書面載明,於其無法表達意願時(由代理人代為決定)」正確。A「『末期病人才可』簽署意願書」錯(任何意識清楚成年人皆可預立);B「無最近親屬者轉介社工由『里長』」敘述須對應;D「意識昏迷者有最近親屬代簽DNR,父...」敘述須對應。故C。","options":{"A":"任何成年人皆可預立,非僅末期病人。","B":"無親屬者處理敘述須對應。","C":"正確(本題答案)。得預立醫療委任代理人並書面載明。","D":"最近親屬代簽敘述須對應。"},"sources":["安寧緩和醫療條例;病人自主權利法","新文京《護理倫理與法律》善終"]}},"101110-N2-14":{"quick":"找不到醫師問病情:協助聯絡醫師請醫師為其解釋。","detail":{"background":"病患家屬找不到醫師問病情診斷預後,護理師應「協助聯絡醫師,請醫師為其解釋(D)」——病情/診斷/預後解釋是『醫師』職責,護理師不可越權解釋。A請實習醫師說明(實習醫師亦不宜)、B拿病歷給看、C拿病歷逐一解釋皆逾越護理師職權。故D。護理專業:病情/診斷/預後解釋是醫師職責(護理師協助聯絡醫師);護理紀錄最主要目的=溝通。工作說明書列客觀資格職責(不含愛心耐心經濟能力婚姻家庭隱私)。專業形象作為:提升文化素養、鼓勵進修(繼續教育)、行銷形象、更正被扭曲形象(呼籲勿濫用護理師制服);代言商品穿制服不違法但違背專業倫理。社群網站應具名負責、不洩漏隱私工作秘密。護病關係是專業治療性關係(接納非贊同、有期限、不社交互惠)。護理教育以學習者為中心(非師徒制)。","options":{"A":"實習醫師亦不宜說明病情。","B":"不可拿病歷給家屬看。","C":"護理師不可解釋病情(越權)。","D":"正確(本題答案)。協助聯絡醫師解釋。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"106110-N2-62":{"quick":"工作說明書「最不應包含」=具備愛心耐心及經濟能力。","detail":{"background":"組織工作說明書(job description,描述職務客觀條件):B大專以上護理學歷、C護理師或護士證照、D須輪值晚夜班(客觀資格與工作條件)。選項A「具備愛心、耐心及『經濟能力』」最不應包含(本題答案)——「愛心耐心」是主觀特質(難客觀評定)、「經濟能力」與工作無關,皆不應列入工作說明書。故A。","options":{"A":"正確(本題答案)。愛心耐心經濟能力不應列入工作說明書。","B":"護理學歷是客觀條件。","C":"護理證照是客觀條件。","D":"輪值晚夜班是工作條件。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"106111-N2-9":{"quick":"病歷保存正確=病人出院後病歷須保存十年?本題答案C。","detail":{"background":"本題官方答案C。病歷保存:C「病人出院後病歷須保存『十年』」——惟現行醫療法規定病歷至少保存『7年』(未成年至成年後7年);本題依當年題目以「十年」為答案(部分舊題/特定情境)。核心:病歷有法定保存年限(現行7年),非依各醫院規定、非保存到死亡。作答以官方C為準。","options":{"A":"非保存到死亡。","B":"非死亡後延長一年。","C":"正確(本題答案)。依當年題目保存年限(現行7年)。","D":"非依各醫院規定(有法定年限)。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"107030-N2-60":{"quick":"主任建議報導檳榔新聞=行銷護理專業形象?本題答案C。","detail":{"background":"本題官方答案C(行銷護理專業形象)。護理部主任就「檳榔西施穿護理師制服」新聞提出建議——透過媒體發聲、主動傳達護理專業價值=行銷護理專業形象(C,主動對外行銷、傳達專業)。本題以行銷專業形象為答案。故C。護理專業:病情/診斷/預後解釋是醫師職責(護理師協助聯絡醫師);護理紀錄最主要目的=溝通。工作說明書列客觀資格職責(不含愛心耐心經濟能力婚姻家庭隱私)。專業形象作為:提升文化素養、鼓勵進修(繼續教育)、行銷形象、更正被扭曲形象(呼籲勿濫用護理師制服);代言商品穿制服不違法但違背專業倫理。社群網站應具名負責、不洩漏隱私工作秘密。護病關係是專業治療性關係(接納非贊同、有期限、不社交互惠)。護理教育以學習者為中心(非師徒制)。","options":{"A":"提升文化素養是內部培養。","B":"鼓勵進修是能力培養。","C":"正確(本題答案)。媒體發聲傳達專業=行銷護理專業形象。","D":"更正扭曲是澄清誤解。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"107030-N2-61":{"quick":"呼籲檳榔西施勿穿護理師制服=更正被扭曲的專業形象。","detail":{"background":"護理界聲明「呼籲檳榔西施勿穿護理師制服」——目的是『更正/澄清被扭曲、誤用的護理師形象』=更正被扭曲的專業形象(D正確)。提升文化素養(內部培養)、鼓勵進修(能力)、行銷形象(主動行銷)皆非「更正被扭曲形象」。故D。護理專業:病情/診斷/預後解釋是醫師職責(護理師協助聯絡醫師);護理紀錄最主要目的=溝通。工作說明書列客觀資格職責(不含愛心耐心經濟能力婚姻家庭隱私)。專業形象作為:提升文化素養、鼓勵進修(繼續教育)、行銷形象、更正被扭曲形象(呼籲勿濫用護理師制服);代言商品穿制服不違法但違背專業倫理。社群網站應具名負責、不洩漏隱私工作秘密。護病關係是專業治療性關係(接納非贊同、有期限、不社交互惠)。護理教育以學習者為中心(非師徒制)。","options":{"A":"提升文化素養是內部培養。","B":"鼓勵進修是能力培養。","C":"行銷形象是主動行銷。","D":"正確(本題答案)。澄清誤用形象=更正被扭曲的專業形象。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"107030-N2-62":{"quick":"每6年繼續教育才能更新執照=鼓勵護理師進修培養專業能力。","detail":{"background":"護理師「每6年須接受繼續教育才能更新執照」——透過繼續教育持續提升=鼓勵護理師進修、培養專業能力(B正確,建立專業形象的作為)。提升文化素養、行銷形象、更正扭曲形象皆非「繼續教育進修」。故B。護理專業:病情/診斷/預後解釋是醫師職責(護理師協助聯絡醫師);護理紀錄最主要目的=溝通。工作說明書列客觀資格職責(不含愛心耐心經濟能力婚姻家庭隱私)。專業形象作為:提升文化素養、鼓勵進修(繼續教育)、行銷形象、更正被扭曲形象(呼籲勿濫用護理師制服);代言商品穿制服不違法但違背專業倫理。社群網站應具名負責、不洩漏隱私工作秘密。護病關係是專業治療性關係(接納非贊同、有期限、不社交互惠)。護理教育以學習者為中心(非師徒制)。","options":{"A":"提升文化素養非繼續教育。","B":"正確(本題答案)。繼續教育=鼓勵進修培養專業能力。","C":"行銷形象是對外行銷。","D":"更正扭曲是澄清誤解。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"107110-N2-11":{"quick":"痰液顏色改變書寫紀錄最主要目的=溝通。","detail":{"background":"護理紀錄的最主要目的=A「溝通(communication,團隊間傳遞病人病情資訊、確保照護連續性)」。法律證明文件、教育實習生、調查研究皆是護理紀錄的『次要』功能,『最主要』是溝通(醫療團隊間訊息傳遞)。故溝通(A)。護理專業:病情/診斷/預後解釋是醫師職責(護理師協助聯絡醫師);護理紀錄最主要目的=溝通。工作說明書列客觀資格職責(不含愛心耐心經濟能力婚姻家庭隱私)。專業形象作為:提升文化素養、鼓勵進修(繼續教育)、行銷形象、更正被扭曲形象(呼籲勿濫用護理師制服);代言商品穿制服不違法但違背專業倫理。社群網站應具名負責、不洩漏隱私工作秘密。護病關係是專業治療性關係(接納非贊同、有期限、不社交互惠)。護理教育以學習者為中心(非師徒制)。","options":{"A":"正確(本題答案)。護理紀錄最主要目的=溝通。","B":"法律證明是次要功能。","C":"教育實習生是次要功能。","D":"調查研究是次要功能。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"108020-N2-65":{"quick":"N2→N3訓練重點=護理倫理?本題答案D(危機處理)。","detail":{"background":"本題官方答案D(危機處理)。臨床專業能力進階N2→N3的訓練重點之一=危機處理(及教學能力)。醫療糾紛防範、案例分析(N1→N2)、護理倫理(各階段)皆非N2→N3的特定重點。本題以危機處理為答案。故D。護理專業:病情/診斷/預後解釋是醫師職責(護理師協助聯絡醫師);護理紀錄最主要目的=溝通。工作說明書列客觀資格職責(不含愛心耐心經濟能力婚姻家庭隱私)。專業形象作為:提升文化素養、鼓勵進修(繼續教育)、行銷形象、更正被扭曲形象(呼籲勿濫用護理師制服);代言商品穿制服不違法但違背專業倫理。社群網站應具名負責、不洩漏隱私工作秘密。護病關係是專業治療性關係(接納非贊同、有期限、不社交互惠)。護理教育以學習者為中心(非師徒制)。","options":{"A":"醫療糾紛防範非N2→N3特定重點。","B":"案例分析偏N1→N2。","C":"護理倫理是各階段共通。","D":"正確(本題答案)。N2→N3含危機處理。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"108020-N2-66":{"quick":"社群網站溝通「不適當」=可使用本名或匿名方式進行貼文。","detail":{"background":"臉書等社群網站溝通原則:A不回應個人醫療問題、建議就醫(對);C即使沒洩漏隱私也可能洩漏工作秘密(對,須謹慎);D應檢查刪除不適當留言(對)。選項B「可使用本名或『匿名』方式進行貼文」不適當(本題答案)——專業發言應『具名負責』,匿名發言可能不負責任、損及專業;且涉及專業內容應誠實具名。故B。","options":{"A":"不回應個人醫療問題建議就醫(對)。","B":"不適當(本題答案)。專業發言應具名負責,非匿名。","C":"可能洩漏工作秘密須謹慎(對)。","D":"應刪除不適當留言(對)。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"109110-N2-68":{"quick":"臨床教師指導、提供整體照護建議:鼓勵專科領域、參與行政。本題答案C。","detail":{"background":"本題官方答案C。急診護理師小美擔任臨床教師、能提供整體照護的具體建議(已具N3教學能力),護理長應鼓勵其往「專科領域、參與行政(C,N4方向:專科精進、行政研究)」發展。臨床教學能力(已具)、重症照護、倫理法律皆非「下一階段(N4)」發展方向。故C。","options":{"A":"臨床教學能力已具備。","B":"重症照護非下一階段重點。","C":"正確(本題答案)。鼓勵專科領域、參與行政(N4方向)。","D":"倫理法律是基礎概念。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"111030-N2-2":{"quick":"護理法律問題「錯誤」=一般醫療處置不經病人同意即可抽血。","detail":{"background":"護理法律問題:A未實測血壓而依過去數值做紀錄有法律責任(對,造假紀錄);B自殺傾向病人用病房延長線自殺成植物人,護理人員有(責任,環境安全未維護);D管制藥品只能依醫師指示、擅自攜出違法(對)。選項C「一般醫療處置時,護理人員『不經病人同意』即可進行抽血檢查」錯誤(本題答案)——任何侵入性處置(抽血)都須『先取得病人同意(知情同意)』,不可未經同意執行。故C。","options":{"A":"依過去數值造假紀錄有責任(對)。","B":"環境安全未維護有責任(對)。","C":"錯誤(本題答案)。抽血須經病人同意,不可未經同意。","D":"管制藥擅自攜出違法(對)。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"112030-N2-7":{"quick":"「不」屬專業性人際關係特點=需贊同病人的想法才能進行。","detail":{"background":"專業性(治療性)人際關係特點:A建立在協助解決個案健康問題、B依倫理守則進行權利義務、D有一定期限(治療性關係)。選項C「護病關係中『需贊同病人的想法』才能進行」不屬其特點(本題答案)——治療性關係是「接納、尊重」病人,但『不需贊同(同意)』病人的所有想法(可保持專業判斷)。故C。","options":{"A":"協助解決健康問題(特點)。","B":"依倫理守則(特點)。","C":"正確(本題答案)。不需贊同病人想法(接納≠贊同)。","D":"有一定期限(特點)。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"112030-N2-57":{"quick":"工作說明書「最不宜包含」=載明個人婚姻狀況家庭背景及經濟能力。","detail":{"background":"機構工作說明書內容:A護理師證照專長訓練護理學歷(客觀資格)、B達成主管交辦任務(職責)、C依病人需要擬定個別性照護計畫(職責)。選項D「載明個人『婚姻狀況、家庭背景及經濟能力』」最不宜包含(本題答案)——這些屬個人隱私、與工作職務無關,不應列入工作說明書。故D。","options":{"A":"證照學歷是客觀資格(宜)。","B":"達成交辦任務是職責(宜)。","C":"擬定照護計畫是職責(宜)。","D":"正確(本題答案)。婚姻家庭經濟屬隱私,不宜列入。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"112030-N2-58":{"quick":"作決策注意事項正確=選擇方案時權衡主要關係人權益、以決策倫理為基礎。","detail":{"background":"作決策注意事項:B「選擇方案時要權衡主要關係人的權益,以決策倫理為基礎」正確。A「以『個人』價值觀導引決策」錯(應避免個人偏見、考量整體);C「遇困難應馬上放棄」錯(應評估調整、非馬上放棄);D「推行方案時彈性調整『時間及目標』」錯(目標應穩定、不宜隨意改目標)。故B。","options":{"A":"應避免個人價值觀偏見。","B":"正確(本題答案)。權衡關係人權益、以決策倫理為基礎。","C":"遇困難應評估調整,非馬上放棄。","D":"目標應穩定,不宜隨意改。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"113100-N2-1":{"quick":"護理教育「錯誤」=應逐漸走向師徒制以提供教學內容為導向。","detail":{"background":"護理教育促進專業發展:A需因應社會政策與醫療型態轉變而調整(對)、B學生需學習新科技以勝任未來需求(對)、D重視知識技術、專業倫理與社會正義培養同等重要(對)。選項C「現今護理教育應逐漸走向『師徒制』、以『提供教學內容為導向』」錯誤(本題答案)——現代護理教育強調「以『學習者為中心』、能力導向、實證、批判思考」,非走回『師徒制/教學內容導向』。故C。","options":{"A":"因應社會醫療轉變調整(對)。","B":"學習新科技勝任未來(對)。","C":"錯誤(本題答案)。應以學習者為中心,非師徒制/內容導向。","D":"重視倫理與社會正義(對)。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"115030-N2-3":{"quick":"不計報酬支援大量傷患獲精神靈性昇華=苦行僧主義。","detail":{"background":"護理理念:苦行僧主義(asceticism,不計金錢報酬、犧牲奉獻、從服務中獲精神靈性昇華)。「不計報酬前往大量傷患醫院支援、獲個人精神與靈性昇華」=苦行僧主義(A正確)。浪漫主義、實用主義、人文存在主義皆非「犧牲奉獻獲靈性昇華」。故苦行僧主義(A)。","options":{"A":"正確(本題答案)。不計報酬犧牲奉獻獲靈性昇華=苦行僧主義。","B":"浪漫主義非此。","C":"實用主義重實用效益。","D":"人文存在主義重個人存在意義。"},"sources":["新文京《護理行政》護理專業","華杏《護理行政學》專業角色與形象"]}},"112030-N2-2":{"quick":"自傷精神病人不傷害原則=密切探視觀察、維護環境安全預防傷害發生。","detail":{"background":"照顧有自傷行為的精神科病人,符合「不傷害原則(non-maleficence)」者=D「密切探視觀察病人並維護周圍環境安全,預防傷害的發生(主動預防病人自我傷害)」正確。A「無同意書下約束病人」(涉自主/約束須評估醫囑);B「提供約束資訊讓病人自己決定」(涉自主);C「限制家人探視次數保護隱私」(涉保密)皆非「預防傷害」。故D(主動預防傷害=不傷害原則)。","options":{"A":"無同意書約束涉自主/須評估。","B":"讓病人自己決定涉自主原則。","C":"限制探視涉保密原則。","D":"正確(本題答案)。密切觀察維護環境安全預防傷害=不傷害原則。"},"sources":["新文京《護理倫理》四大原則","華杏《護理倫理與法律》不傷害原則"]}}},TO=["1護理倫理原則", "2病人權利知情同意與隱私", "3護理人員法業務範圍與執業規範", "4醫療業務糾紛預防與處理", "5病人安全通報與異常事件", "6安寧緩和病主法與善終", "7護理專業角色形象與其他"],LEC={"1護理倫理原則":{"html":"\n<p><b>護理四大倫理原則:</b><b>自主(autonomy)</b>=尊重病人自我決定、知情同意(告知檢查危險性、研究取得同意、自己簽不急救);<b>行善(beneficence)</b>=主動做有益病人、謀求<b>最大利益</b>的事;<b>不傷害(non-maleficence)</b>=不造成傷害(勿用有害藥、評估化療滲漏、不灌不明草藥、預防自傷);<b>公平正義(justice)</b>=公平分配醫療資源。</p>\n<p><b>其他:</b>保密、誠實、尊重多元信仰與價值觀。<b>注意:</b>法定傳染病(愛滋)依法『應通報』衛生機關,屬法定義務、<b>不違反保密原則</b>。</p>\n"},"2病人權利知情同意與隱私":{"html":"\n<p><b>病人權利:</b>知情同意(告知診斷病情治療、侵入性檢查/觸診前簽同意)、<b>拒絕治療護理</b>、閱讀影印自己病歷、隱私保護(開床旁桌徵得同意、以姓名稱呼非床號、不對媒體洩漏)。意識清楚、有自決能力者由<b>病人本人</b>簽同意書。</p>\n<p><b>非法定權利:</b>選擇特定護理人員/病床、延長住院詐領保險。</p>\n<p><b>出院方式:</b>同意出院(MBD,醫師同意可出院)、<b>自動出院(AAD,違反醫療建議自行出院)</b>。</p>\n"},"3護理人員法業務範圍與執業規範":{"html":"\n<p><b>護理人員法第24條業務範圍:</b>健康問題護理評估、預防保健、護理指導及諮詢(<b>獨立性</b>)＋醫療輔助行為(<b>依醫囑/依賴性</b>)。<b>病情解釋、醫療處置</b>是醫師職權,非護理業務。</p>\n<p><b>執業登記/繼續教育:</b>每<b>6年150點</b>(含專業課程、專業品質、專業倫理、專業相關法規)。停業、歇業、復業、變更執業處所<b>30日內</b>報請備查(違反罰3,000~30,000元)。</p>\n<p><b>罰則:</b><b>證照租借</b>予不具資格者→廢止護理師證書;機構僱用非護理科系執行護理業務→罰<b>2萬~10萬</b>。</p>\n"},"4醫療業務糾紛預防與處理":{"html":"\n<p><b>預防:</b>依SOP正確執行護理技術、熟知法令依法執業、善盡說明、態度誠懇同理、<b>不保證療效</b>;不可逾越業務範圍(未到醫師前先插管電擊易致糾紛)。醫療糾紛<b>可預防/減少</b>,非無法預防。</p>\n<p><b>處理:</b>了解原因分析導因、<b>誠實面對</b>病人家屬、請專責部門/第三者協助、<b>即時處理</b>抱怨(非拖延、非高姿態、非當事人現場解釋、非更改紀錄)。糾紛後<b>關懷當事者+加強教育</b>(非追究個人)。</p>\n<p><b>法律責任:</b>民事(侵權賠償)、刑事(過失傷害罪,<b>不免刑罰</b>)、行政(懲戒委員會決定執照處分)。</p>\n"},"5病人安全通報與異常事件":{"html":"\n<p><b>病人安全通報系統(TPR)原則:</b>保密、<b>不究責</b>、共同學習、<b>匿名、自願</b>(非懲罰性、非強制、非實名)。</p>\n<p><b>主要目的:</b>避免同樣事件<b>重複發生</b>(從錯誤中學習、系統改善預防),非懲罰/究責/避免糾紛。</p>\n<p><b>強制通報</b>=嚴重事件(中毒、輸血/用藥錯誤致死);<b>非強制(自願)通報</b>=跡近錯失(near miss)。</p>\n"},"6安寧緩和病主法與善終":{"html":"\n<p><b>安寧緩和醫療條例:</b>末期病人可預立「安寧緩和醫療暨維生醫療抉擇意願書」、預立<b>醫療委任代理人</b>;未簽意願書者,<b>最近親屬</b>(配偶/成年子女孫/父母/兄弟姐妹/祖父母…,<b>堂兄非</b>)可代簽「不施行心肺復甦術同意書」。</p>\n<p><b>病人自主權利法(病主法):</b>五款臨床條件(末期、不可逆昏迷、永久植物人、極重度失智、其他公告重症)。意願人經<b>預立醫療照護諮商(ACP)</b>後簽署<b>預立醫療決定(AD)</b>,可選擇接受或拒絕維持生命治療及人工營養。</p>\n"},"7護理專業角色形象與其他":{"html":"\n<p><b>角色界限:</b>病情/診斷/預後解釋是<b>醫師</b>職責(護理師協助聯絡醫師,不可越權解釋)。護理紀錄最主要目的=<b>溝通</b>。</p>\n<p><b>工作說明書</b>列客觀資格與職責(<b>不含</b>愛心耐心、經濟能力、婚姻家庭等隱私)。</p>\n<p><b>專業形象作為:</b>提升文化素養、鼓勵進修(繼續教育)、行銷形象、更正被扭曲形象(呼籲勿濫用護理師制服);<b>代言商品穿制服不違法但違背專業倫理</b>。社群網站應具名負責、不洩漏隱私與工作秘密。</p>\n<p><b>護病關係</b>是專業治療性關係(接納≠贊同、有期限、<b>不社交互惠</b>);護理理念苦行僧主義(不計報酬犧牲奉獻獲靈性昇華);護理教育以<b>學習者為中心</b>(非師徒制)。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_a4_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
