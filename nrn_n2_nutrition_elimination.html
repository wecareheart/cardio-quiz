"detail":{"background":"收集24小時尿液(CCr肌酸酐廓清試驗):A「收集當日7AM第一次解的尿『不要(棄去)』,之後每次解的尿液收集至次日7AM(含次日7AM最後一次)」正確。B收集期間遺漏一次「須重新收集」(非註明繼續);C不需插存留導尿(可自解者直接收集);D尿液收集桶應「冰存/加防腐劑」非放廁所室溫。故A正確。","options":{"A":"正確(本題答案)。首次7AM棄、收集至次日7AM。","B":"遺漏一次須重新收集,非註明繼續。","C":"可自解者不需插存留導尿。","D":"收集桶應冰存,非放廁所室溫。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"109030-N2-47":{"quick":"尿培養「不」應先用抗生素再收集(應給藥前採檢);稱先用抗生素為錯誤。","detail":{"background":"尿液培養檢體收集:B若30分鐘內無法送檢應置4~10°C冰箱(對,防雜菌增生);C病人無法自解需導尿取檢(對);D無菌取中段尿於無菌標本盒(對)。選項A「懷疑尿道感染時,應先使用抗生素再收集檢體」錯誤——尿培養應在「給予抗生素『之前』」採檢(抗生素會抑制細菌、致培養偽陰性、無法正確找病原與抗藥性),故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。尿培養應在給抗生素前採檢,非先用抗生素。","B":"正確。30分內未送檢冰存。","C":"正確。無法自解可導尿取檢。","D":"正確。無菌取中段尿。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"109110-N2-50":{"quick":"排尿時疼痛+尿呈暗紅色可能原因=尿道結石。","detail":{"background":"排尿時疼痛、尿液「暗紅色(血尿)」,最可能是「尿道(泌尿道)結石」——結石移動刮傷尿路黏膜致血尿與疼痛(D正確)。肝病變(尿呈深茶色膽紅素尿,非暗紅血尿)、念珠菌感染(白色分泌物)、綠膿桿菌感染(綠色尿/分泌物)皆非暗紅血尿典型。故尿道結石(D)。","options":{"A":"肝病變致膽紅素尿(深茶色),非暗紅血尿。","B":"念珠菌感染是白色分泌物。","C":"綠膿桿菌感染偏綠色。","D":"正確(本題答案)。排尿痛+暗紅血尿疑尿道結石。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"109110-N2-51":{"quick":"尿液培養目的=檢查細菌感染(1)、作為抗生素使用依據(4)→「14」。","detail":{"background":"尿液培養(urine culture)目的:1檢查尿中「是否有細菌感染」及菌種、4作為「抗生素使用(藥物敏感試驗)的依據」。選項2「測量腎小管再吸收能力」、3「檢驗腎臟過濾與排泄功能」是「腎功能檢查(CCr、GFR)」非尿培養。故尿培養目的為「14」。","options":{"A":"含2(腎小管再吸收)不符。","B":"含2、3不符。","C":"含3不符。","D":"正確(本題答案,14)。查細菌感染、作為抗生素依據。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"111030-N2-52":{"quick":"尿液呈螢光黃色最可能原因=服用維生素B群(B2/B12)。","detail":{"background":"尿液「螢光黃(亮黃)色」最常見原因是「服用維生素B群(尤其B2核黃素、B12)」——過量水溶性維生素由尿排出致尿色亮黃(B正確)。脂肪尿(乳糜尿,乳白)、綠膿桿菌感染(綠色)、尿道結石(暗紅血尿)皆非螢光黃。故服用維生素B(B)。尿液檢查:正常尿比重1.010~1.030、pH4.6~8、白血球<5/HPF;UTI=頻尿急尿解尿燒灼血尿混濁、酸化尿液抑菌;尿培養須給抗生素前採無菌中段尿、未送檢冰存;24小時尿首次棄、遺漏須重收;尿亮黃=維生素B。","options":{"A":"脂肪尿是乳白色。","B":"正確(本題答案)。服用維生素B群致尿螢光黃。","C":"綠膿桿菌感染偏綠色。","D":"尿道結石致暗紅血尿。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"112030-N2-32":{"quick":"UTI「鹼化」尿液「不能」抑菌(應酸化抑菌);稱鹼化抑菌為錯誤。","detail":{"background":"成人泌尿道感染:A大腸桿菌是常見致病菌(對);B輸尿管結石者(尿滯留)易感染(對);C常見症狀解尿燒灼感(對)。選項D「鹼化尿液能抑制細菌生長」錯誤——應「酸化尿液(蔓越莓汁、維生素C)」抑制細菌(多數UTI菌在酸性尿不易生長);鹼化尿液反而利於某些細菌(變形桿菌)與結石形成,故D為錯誤敘述(本題答案)。","options":{"A":"正確。大腸桿菌是常見致病菌。","B":"正確。輸尿管結石者易感染。","C":"正確。常見解尿燒灼感。","D":"錯誤(本題答案)。應酸化尿液抑菌,非鹼化。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"112180-N2-18":{"quick":"成人尿液分析異常=白血球20個/高倍視野(正常0~4)。","detail":{"background":"成人尿液分析:A尿量1450 mL/天(正常,約1000~2000);B葡萄糖2 mg/dL(微量、近正常,正常應陰性~微量);C尿蛋白5 mg/dL(微量,正常<10~15 mg/dL);D白血球「20個/高倍視野」異常——正常尿白血球<5(0~4)個/HPF,20個表示「膿尿/泌尿道感染」(D正確,本題異常項)。故白血球20/HPF異常(D)。","options":{"A":"尿量1450 mL/天正常。","B":"葡萄糖微量近正常。","C":"尿蛋白5 mg/dL微量正常。","D":"正確(本題答案)。白血球20/HPF異常(膿尿/感染)。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"101030-N2-11":{"quick":"獨立性護理措施=教導家屬每2小時翻身(護理師自主、不需醫囑)。","detail":{"background":"護理功能:獨立性=護理師依專業判斷「自主執行、不需醫囑」者(衛教、姿位、舒適護理)。選項B「教導病患家屬每2小時翻身」是護理師自主的衛教/預防措施,屬獨立性(B正確)。A依醫囑給靜脈輸液=依賴性;C與營養師擬定飲食=合作性;D依醫囑導尿=依賴性。故B正確。","options":{"A":"依醫囑給輸液=依賴性。","B":"正確(本題答案)。教導翻身=獨立性護理。","C":"與營養師擬飲食=合作性。","D":"依醫囑導尿=依賴性。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"101030-N2-12":{"quick":"「營養」相關資料=血中albumin 3.1(2)、體重49 kg(3)、主訴(4)→「234」。","detail":{"background":"收集入院資料歸類「營養」相關者:2血中albumin(白蛋白)濃度3.1 g/dl(反映蛋白質營養狀態)、3體重49 kg(營養指標)、4病人主訴(關於飲食/食慾)。選項1「BP 108/64 mmHg(血壓)」屬「循環/生命徵象」非營養。故營養相關資料為「234」。","options":{"A":"含1(血壓)非營養。","B":"正確(本題答案,234)。albumin、體重、主訴屬營養資料。","C":"含1不符。","D":"缺2(albumin)。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"101110-N2-8":{"quick":"客觀症狀(objective)=臉色潮紅(觀察可見)。","detail":{"background":"主觀資料(subjective)=病人主訴的感受(解尿疼痛、燒灼感、憂慮緊張,他人無法直接觀察);客觀資料(objective)=護理師「觀察/測量」可得的徵象。選項B「臉色潮紅」是觀察可見的客觀症狀(B正確)。A解尿疼痛、C憂慮緊張、D會陰燒灼感皆為病人主訴(主觀)。故臉色潮紅(B)。","options":{"A":"解尿疼痛是主觀主訴。","B":"正確(本題答案)。臉色潮紅是客觀(觀察可見)。","C":"憂慮緊張是主觀。","D":"會陰燒灼感是主觀主訴。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"102110-N2-50":{"quick":"體溫單記錄:活動介入後體溫應與之前以紅色虛線相連。本題答案B。","detail":{"background":"體溫單(生命徵象紀錄)記錄:B「發燒患者經治療/活動介入後測量的體溫,應與之前的體溫以紅色虛線相連接」正確(虛線表示中間有介入)。A「A.A.D.(自動出院)」非記錄在體溫欄位;C輸出入量非「白班量×3」;D灌腸後解便一次記錄為「1/E」(非僅1/C)。故B正確。","options":{"A":"A.A.D.非記在體溫欄位。","B":"正確(本題答案)。介入後體溫與前以紅色虛線相連。","C":"輸出入量非白班量×3。","D":"灌腸後解便記為1/E。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"103100-N2-75":{"quick":"送餐有誤:護理人員「不應」拿自己食物給病人吃(糖尿病飲食控制);稱拿自己餅乾給病人為較不合適。","detail":{"background":"糖尿病病人訂素食、送餐有誤:A護理人員立即道歉(對)、B立即通知營養室更換正確餐點(對)、C營養室負責人道歉後更換(對)。選項D「護理人員立即拿自己的餅乾或食物給病人吃」較不合適——糖尿病病人飲食須嚴格控制(熱量、醣類),隨意給自己食物可能不符治療飲食、影響血糖,故D為較不合適(本題答案)。應更換正確的治療餐點。","options":{"A":"合適。立即道歉。","B":"合適。通知營養室更換。","C":"合適。負責人道歉後更換。","D":"較不合適(本題答案)。不可隨意給自己食物(糖尿病須控制飲食)。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"104030-N2-14":{"quick":"闌尾術後最需立即通知醫師=血壓不穩定(可能出血/休克)。","detail":{"background":"闌尾炎術後第二天,最需「立即」通知醫師的是「血壓不穩定」(C正確)——可能為術後出血、感染性休克等危及生命的變化,須緊急處理。飲食情形、排氣情形、下床情形屬一般術後恢復評估,非立即危及生命。故血壓不穩定(C)。護理功能:獨立性(自主衛教姿位評估)、依賴性(依醫囑給藥導尿)、協同性(與營養師等專業合作);主觀=主訴、客觀=觀察測量;第一手=病人本人;優先序依ABC/馬斯洛(呼吸循環體液最優先);護理紀錄須客觀準確及時。","options":{"A":"飲食情形屬一般恢復評估。","B":"排氣是腸蠕動恢復指標,非緊急。","C":"正確(本題答案)。血壓不穩定可能出血休克,須立即通知。","D":"下床情形屬一般評估。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"105090-N2-6":{"quick":"HBsAg/HBeAg陽性者紙尿褲屬「可燃性感染性」廢棄物。","detail":{"background":"B肝(HBsAg/HBeAg陽性,具傳染性)病人的廢棄物:C「紙尿褲(沾染血液體液)屬可燃性『感染性』廢棄物」正確(紙類可燃+具感染性)。A餐具非感染性廢棄物(可清洗重複用);B耳溫套(若無血液體液)屬一般廢棄物;D鼻胃管引流裝置(塑膠+感染性)屬「可燃」感染性(非不可燃)。故C正確。","options":{"A":"餐具可清洗重複用,非感染性廢棄物。","B":"耳溫套無血液體液屬一般廢棄物。","C":"正確(本題答案)。紙尿褲屬可燃性感染性廢棄物。","D":"鼻胃管引流裝置(塑膠)屬可燃感染性,非不可燃。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"106030-N2-38":{"quick":"發燒護理「不」恰當=請多人來陪伴(增加交叉感染/病人耗能);稱請多人陪伴為不恰當。","detail":{"background":"發燒護理措施:A維持室內溫度低於一般室溫(對,助散熱)、B適時口腔衛生清潔(對,發燒口乾)、D少量多餐供清淡高熱量食品(對,補充消耗)。選項C「請家屬多些人來陪伴,以減少病人焦慮」不恰當——發燒病人需「休息」,過多人陪伴增加耗能、交叉感染風險、空氣不流通,故C為不恰當(本題答案)。","options":{"A":"恰當。室溫低於一般室溫助散熱。","B":"恰當。適時口腔衛生。","C":"不恰當(本題答案)。不宜多人陪伴(增耗能/感染風險)。","D":"恰當。少量多餐清淡高熱量。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"106030-N2-51":{"quick":"「不」屬入院護理範圍=開立病人治療飲食(醫師職責);稱開立治療飲食為非入院護理。","detail":{"background":"護理師的入院護理範圍:A測量生命徵象並記錄、B收集個人健康史、D病室環境介紹——皆屬護理師職責。選項C「開立病人治療飲食」不屬護理師入院護理範圍(本題答案)——開立治療飲食(醫囑)是「醫師」的職責,護理師依醫囑執行,故C不屬護理範圍(C)。","options":{"A":"屬入院護理。測量生命徵象。","B":"屬入院護理。收集健康史。","C":"正確(本題答案)。開立治療飲食是醫師職責,非護理範圍。","D":"屬入院護理。病室環境介紹。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"106110-N2-14":{"quick":"輸入1400(含輸血)、輸出2600(尿+引流):輸出>輸入(負平衡大):需報告醫師處理。","detail":{"background":"24小時輸入輸出量:輸入=點滴1200+輸血200=1400 mL;輸出=小便1500+傷口引流550+鼻胃管引流550=2600 mL;輸出(2600)遠大於輸入(1400),「負平衡約1200 mL」過多,有「脫水/電解質失衡」風險,最適宜「報告醫師處理」(C正確,需調整輸液)。A停鼻胃管由口進食、B繼續觀察、D限水調慢點滴皆不當(已負平衡不可再限水)。故C正確。","options":{"A":"負平衡不宜停引流由口進食。","B":"負平衡過多,不宜僅觀察。","C":"正確(本題答案)。輸出遠大於輸入,需報告醫師。","D":"已負平衡,不可再限水調慢點滴。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"107110-N2-6":{"quick":"照會營養師、追蹤進食=協同性(相互依賴)護理功能。","detail":{"background":"護理功能:照會「營養師」提供飲食計畫、護理師協助「持續追蹤病人進食狀態」,是與「其他專業人員(營養師)協同合作」執行,屬「協同性(相互依賴)護理功能」(D正確)。獨立性(自主)、依賴性(依醫囑)、機械性(非標準分類)皆非。故協同性護理功能(D)。","options":{"A":"獨立性是護理師自主執行。","B":"機械性非標準護理功能分類。","C":"依賴性是依醫囑執行。","D":"正確(本題答案)。與營養師協同=協同性護理功能。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"108020-N2-10":{"quick":"肺結核三問題優先序:先呼吸困難→發燒→營養不足。","detail":{"background":"依「生命危急程度(ABC、馬斯洛需求)」排序:「呼吸困難(影響氧合、立即危及生命)」最優先→「發燒(感染、體液電解質)」次之→「營養狀況少於身體所需(慢性、非立即危及)」最後(B正確)。呼吸(B)是生理基本需求中最優先。故B正確。護理功能:獨立性(自主衛教姿位評估)、依賴性(依醫囑給藥導尿)、協同性(與營養師等專業合作);主觀=主訴、客觀=觀察測量;第一手=病人本人;優先序依ABC/馬斯洛(呼吸循環體液最優先);護理紀錄須客觀準確及時。","options":{"A":"發燒非最優先,呼吸困難才是。","B":"正確(本題答案)。呼吸困難→發燒→營養不足。","C":"營養不足非優先於發燒。","D":"營養不足是最後,非最先。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"108020-N2-40":{"quick":"「不」會出現脈搏增加=禁食(其餘甲狀腺素增加/急性疼痛/低血氧皆增脈搏)。","detail":{"background":"脈搏次數增加的情況:B甲狀腺素增加(代謝亢進、心搏加速)、C急性疼痛(交感興奮)、D低血氧(代償性心搏加速)——皆使脈搏增加。選項A「禁食」較不會使脈搏增加(本題答案)——單純禁食不會直接刺激心率;反而長期飢餓代謝下降可能心率偏慢。故不會增脈搏者為禁食(A)。","options":{"A":"正確(本題答案)。禁食較不會使脈搏增加。","B":"甲狀腺素增加使脈搏增加。","C":"急性疼痛使脈搏增加。","D":"低血氧代償使脈搏增加。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"109030-N2-6":{"quick":"下班前才一次補記整班內容(非即時記錄)，最違反護理紀錄的「時效性」原則，故選B。","detail":{"background":"本題官方答案C(準確性)。護理紀錄四大原則:時效性(及時記錄)、準確性(數值/單位正確)、真實性(據實)、組織性(有條理)。本題紀錄「T.P.R BP:37.3°C、75次/分、20次/分、128/70 mmHg」若數值對應或記錄方式有誤(如溫度脈搏呼吸對應、單位),違反「準確性」原則(C正確,記錄須正確無誤)。故違反準確性(C)。","options":{"A":"紀錄依時間順序、條理清楚，符合組織性。","B":"正解：應即時記錄，下班前才一次補記違反「時效性」。","C":"數值記載大致正確，非主要違反項。","D":"據實記錄，符合真實性。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"109110-N2-17":{"quick":"護理目標應「可測量」:5/29病人能攝取2000大卡/天(具體可評值)。","detail":{"background":"「營養少於身體需求」的護理目標應「以病人為主詞、具體、可測量、有時間」。選項D「5/29病人能攝取2,000大卡熱量/天」是可測量、可評值的「病人結果目標」(D正確)。A提供高熱量飲食、B衛教家屬=「護理措施」非目標;C「達到理想體重」短期(到5/29)不切實際。故D正確。","options":{"A":"提供高熱量飲食是措施,非目標。","B":"衛教家屬是措施,非目標。","C":"短期達理想體重不切實際。","D":"正確(本題答案)。能攝取2000大卡/天是可測量目標。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"109110-N2-19":{"quick":"第一手資料=病人自述「我覺得胸悶好痛」。","detail":{"background":"第一手(初級)資料=直接來自「病人本人」的主訴/資料。選項A「病人:我覺得胸悶、好痛」是病人本人陳述,屬第一手資料(A正確)。B照服員、D家屬轉述是「第二手(次級)」資料;C護理師觀察雖客觀但屬護理師蒐集的次級來源(本題以病人本人主訴為第一手)。故A正確。","options":{"A":"正確(本題答案)。病人本人陳述=第一手資料。","B":"照服員轉述是第二手。","C":"護理師觀察是次級來源。","D":"家屬轉述是第二手。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"110110-N2-18":{"quick":"化療噁心嘔吐照會營養師、追蹤進食=合作性護理功能。","detail":{"background":"護理功能:化療致噁心嘔吐無法進食,「照會營養師」給飲食指導、護理師「追蹤進食狀態」,是與營養師「合作(協同/相互依賴)」執行,屬「合作性護理功能」(C正確)。依賴性(依醫囑)、治療性(非標準分類)、獨立性(自主)皆非。故合作性護理功能(C)。","options":{"A":"依賴性是依醫囑執行。","B":"治療性非標準護理功能分類。","C":"正確(本題答案)。與營養師合作=合作性護理功能。","D":"獨立性是護理師自主執行。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"110110-N2-23":{"quick":"瘦弱+傷口+偏癱+中度脫水:最優先處理「體液容積缺失」(危及生命)。","detail":{"background":"依馬斯洛需求/生命危急排序:「體液容積缺失(中度脫水)」影響循環血容量與電解質,最危及生命應「最優先處理」(C正確)。皮膚完整性受損(傷口)、活動功能障礙(偏癱)、營養少於身體需要屬重要但非立即危及生命。故體液容積缺失最優先(C)。護理功能:獨立性(自主衛教姿位評估)、依賴性(依醫囑給藥導尿)、協同性(與營養師等專業合作);主觀=主訴、客觀=觀察測量;第一手=病人本人;優先序依ABC/馬斯洛(呼吸循環體液最優先);護理紀錄須客觀準確及時。","options":{"A":"皮膚完整性受損非最危及生命。","B":"活動功能障礙非立即危及。","C":"正確(本題答案)。體液容積缺失(脫水)最危及生命,優先。","D":"營養不足非立即危及。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"111110-N2-11":{"quick":"病歷記錄錯誤=大便次數指整天(1對)、疼痛以黑色實心圓(2對)→錯誤者「34」?本題答案A=「12」正確。","detail":{"background":"本題官方答案A(12為「正確」原則)。病歷記錄:1大便次數記錄指「該天一整天(24小時)」所解次數(正確)、2疼痛指數以「黑色實心圓」記錄(正確)。選項3「輸出量包括大便、胸腔引流液」——輸出量通常以「液體(尿、引流、嘔吐)」計,大便一般另計(此項表述有爭議);4灌腸後才解的大便次數以「1/E」表示(非1/E錯誤則...)。本題以「12」為正確記錄原則(A)。","options":{"A":"正確(本題答案,12)。大便次數指整天、疼痛以黑色實心圓。","B":"34組合非本題正確原則。","C":"含3爭議。","D":"含4。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"111110-N2-12":{"quick":"多護理問題優先=無效性呼吸型態(影響氧合,最優先)。","detail":{"background":"依馬斯洛需求/ABC原則,「無效性呼吸型態」影響呼吸與氧合(生理最基本、最危及生命),應「優先處理」(A正確)。睡眠型態紊亂、便秘、身體心像紊亂屬重要但非立即危及生命。故無效性呼吸型態最優先(A)。護理功能:獨立性(自主衛教姿位評估)、依賴性(依醫囑給藥導尿)、協同性(與營養師等專業合作);主觀=主訴、客觀=觀察測量;第一手=病人本人;優先序依ABC/馬斯洛(呼吸循環體液最優先);護理紀錄須客觀準確及時。","options":{"A":"正確(本題答案)。無效性呼吸型態影響氧合,最優先。","B":"睡眠型態紊亂非立即危及。","C":"便秘非立即危及生命。","D":"身體心像紊亂是心理層面,非最優先。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"112030-N2-8":{"quick":"護理紀錄最適宜=客觀描述「左髖骨破皮1×2公分,乾燥無滲液」。","detail":{"background":"護理紀錄應「客觀、具體、可測量」。選項A「左髖骨破皮傷口1公分×2公分,乾燥無滲液」是客觀具體的描述(A正確)。B「病人不配合」是主觀評斷;C「惡露量多」量未具體(應寫量化);D「進食量少食慾差」籠統主觀。故A最適宜。護理功能:獨立性(自主衛教姿位評估)、依賴性(依醫囑給藥導尿)、協同性(與營養師等專業合作);主觀=主訴、客觀=觀察測量;第一手=病人本人;優先序依ABC/馬斯洛(呼吸循環體液最優先);護理紀錄須客觀準確及時。","options":{"A":"正確(本題答案)。客觀具體描述傷口大小與滲液。","B":"「不配合」是主觀評斷。","C":"「量多」未量化,不夠客觀。","D":"「食慾差」籠統主觀。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"112110-N2-9":{"quick":"糖尿病:與營養師討論制定住院飲食=協同性(相互依賴)護理功能。","detail":{"background":"護理功能:選項D「與營養師討論並制定林先生的住院中糖尿病飲食,共同照顧」是與「營養師(其他專業)」協同合作,屬「協同性(相互依賴)護理功能」(D正確)。A告訴病人飲食重要性、B提供家屬飲食訊息、C與兒子討論運動——A/B是護理師自主衛教(獨立性)、C是與家屬(非專業)合作。故D協同性(與營養師)。","options":{"A":"告知飲食重要性是獨立性衛教。","B":"提供家屬訊息是獨立性衛教。","C":"與兒子(非專業)討論,非專業協同。","D":"正確(本題答案)。與營養師制定飲食=協同性護理功能。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"112110-N2-37":{"quick":"發燒「不」應採高醣高脂低蛋白飲食(應高熱量高蛋白高維生素);稱高醣高脂低蛋白為錯誤。","detail":{"background":"發燒:A「低於39°C的發燒不一定對身體造成傷害」(相對輕);B外科手術後是常見發燒原因(對);D寒顫時給予保暖(對)。選項C「應採高醣、高脂肪、低蛋白飲食」錯誤——發燒代謝增加、組織分解,應補充「高熱量、高蛋白、高維生素、充足水分」(高蛋白補組織修復),非低蛋白,故C為錯誤敘述(本題答案)。","options":{"A":"低於39°C發燒相對輕(本題視為非錯誤)。","B":"正確。術後是常見發燒原因。","C":"錯誤(本題答案)。發燒應高熱量高蛋白,非低蛋白。","D":"正確。寒顫時給予保暖。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"114100-N2-2":{"quick":"身體評估(專業性、獨立)+依營養師建議追蹤(協同):屬專業性護理、協同性護理功能。本題答案D。","detail":{"background":"本題官方答案D。護理師「執行身體評估」(專業性護理)並「依營養師建議追蹤病人飲食」(與營養師協同),兩項分屬「專業性護理、協同性(相互依賴)護理功能」(D正確)。身體評估需專業判斷(專業性);追蹤飲食依營養師建議(協同性)。故D正確。護理功能:獨立性(自主衛教姿位評估)、依賴性(依醫囑給藥導尿)、協同性(與營養師等專業合作);主觀=主訴、客觀=觀察測量;第一手=病人本人;優先序依ABC/馬斯洛(呼吸循環體液最優先);護理紀錄須客觀準確及時。","options":{"A":"身體評估是專業性非次專業性。","B":"追蹤飲食依營養師建議是協同性非獨立性。","C":"身體評估是專業性非次專業性。","D":"正確(本題答案)。專業性護理+協同性護理功能。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"114100-N2-9":{"quick":"癌症病人拒用止痛藥:疼痛→無效呼吸型態→便秘優先序為「2→3→1」?本題答案B=231。","detail":{"background":"本題官方答案B(231)。三問題:1疼痛(病人堅持不用止痛藥)、2無效性呼吸型態、3便秘。依ABC/生命危急:「2無效性呼吸型態(氧合,最危及生命)」最優先→「3便秘(可能影響腹壓/不適,且病人拒止痛時疼痛處理受限)」→「1疼痛(病人堅持不用藥,處理受限置後)」。故優先序「231」(B)。核心:呼吸最優先;病人拒絕的處置(止痛)順位後置。","options":{"A":"123未把呼吸置最前。","B":"正確(本題答案,231)。呼吸→便秘→疼痛(病人拒藥置後)。","C":"321未把呼吸置最前。","D":"213順序不符。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"114170-N2-26":{"quick":"測量呼吸「不」應先告訴病人(以免病人刻意控制呼吸);稱測量前告知為最不適當。","detail":{"background":"測量呼吸注意:B測量前評估是否剛進食/運動(對,會影響);C觀察是否使用呼吸輔助肌(對);D評估面部表情和膚色(對,缺氧發紺)。選項A「測量前要先告訴病人,增加其準備度」最不適當——測呼吸應「在病人不知覺下進行(常接續測脈搏後不放手繼續數)」,事先告知會使病人「刻意控制呼吸」致數值不準,故A為最不適當(本題答案)。","options":{"A":"最不適當(本題答案)。測呼吸不應先告知(病人會刻意控制)。","B":"適當。評估是否剛進食運動。","C":"適當。觀察呼吸輔助肌。","D":"適當。評估面部表情膚色。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"102110-N2-8":{"quick":"使用過空針最具傳染性=驗CBC/DC(抽血,沾染血液)。","detail":{"background":"感染性/血液暴露:沾染「血液」的器材傳染性最高(血液傳染B肝、C肝、HIV)。選項C「驗CBC/DC(全血球計數)」需「抽血」,使用過的空針沾染血液、最具傳染性(C正確)。A IV bag加藥、B penicillin稀釋(藥物非血液)、D打水球固定導尿(無菌蒸餾水非血液)皆不沾血。故C正確。","options":{"A":"IV bag加藥未沾血液。","B":"penicillin稀釋未沾血液。","C":"正確(本題答案)。驗CBC/DC抽血,空針沾血最具傳染性。","D":"打水球用蒸餾水,未沾血液。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}},"115030-N2-12":{"quick":"適用鼻胃管灌食的藥物劑型=口服懸浮劑(液態)。","detail":{"background":"鼻胃管灌食給藥宜選「液態/可溶劑型」:口服懸浮劑(suspension)、糖漿、可溶散劑——液態易經管灌入、不阻塞(D正確,口服懸浮劑)。舌下錠(舌下吸收)、口含錠(口腔吸收)、軟膠囊(外殼難溶、易阻塞)皆不適合鼻胃管。故口服懸浮劑(D)。","options":{"A":"舌下錠須舌下吸收,不適合鼻胃管。","B":"口含錠須口腔吸收,不適合。","C":"軟膠囊外殼難溶易阻塞。","D":"正確(本題答案)。口服懸浮劑(液態)適合鼻胃管灌食。"},"sources":["新文京《基本護理學》護理過程與排泄營養照護","華杏《最新基本護理學》護理功能與記錄"]}}},TO=["1六大類營養素與每日飲食指南", "2營養評估理想體重與生化指標", "3治療飲食與吞嚥困難照護", "4鼻胃管灌食技術與管灌合併症", "5腸道外營養TPN與造口灌食", "6排便生理腸蠕動與糞便性狀", "7便秘腹瀉灌腸與瀉劑", "8糞便檢體採集與檢查", "9排尿生理導尿與膀胱灌洗", "10尿失禁與膀胱訓練", "11尿液檢查與泌尿道感染", "12營養排泄照護綜合(護理功能評估紀錄)"],LEC={"1六大類營養素與每日飲食指南":{"html":"\n<p><b>六大營養素:</b>醣類(4 kcal/g,主要能量、有蛋白質節省作用)、脂肪(9 kcal/g、構成細胞膜、攜脂溶性維生素)、蛋白質(4 kcal/g、組織修復)、維生素、礦物質、水。</p>\n<p><b>胺基酸:</b><b>必需胺基酸</b>=人體無法合成、須由食物攝取;<b>非必需</b>=人體可自行合成(仍需要)。蛋白質須分解成胺基酸才能利用。</p>\n<p><b>脂肪代謝:</b>HDL=好膽固醇、LDL=壞膽固醇(密度低脂質高);三酸甘油酯正常&lt;150 mg/dL。<b>醣類不足</b>時脂肪不完全氧化→<b>酮體增多→酮酸中毒</b>、尿中出現大量酮體。</p>\n<p><b>膳食纖維:</b>人體不能消化吸收,<b>增加</b>糞便體積、促進蠕動(高纖維非低渣)。脂溶性維生素ADEK須脂肪幫助吸收。每日飲食指南:均衡六大類,老年人仍需足夠全穀根莖。</p>\n"},"2營養評估理想體重與生化指標":{"html":"\n<p><b>理想體重(簡式):</b>女(身高cm−70)×0.6;<b>體重過輕</b>=低於理想10%以上、<b>消瘦症</b>=低於20%以上。</p>\n<p><b>BMI</b>=體重(kg)÷身高(m)²;18.5~24正常、24~27過重、≥27肥胖。<b>腰圍</b>女≥80、男≥90 cm為過粗(中心性肥胖);女腰臀比&gt;0.85肥胖。體脂女&gt;30%、男&gt;25%偏高。</p>\n<p><b>生化指標:</b><b>血清白蛋白</b>(albumin,正常3.5~5,半衰期約18~21天、反映較長期蛋白質狀態)、<b>運鐵蛋白</b>(transferrin,<b>肝臟</b>製造、半衰期短、反映近期營養)、三酸甘油酯/膽固醇、血紅素(鐵/葉酸)。</p>\n"},"3治療飲食與吞嚥困難照護":{"html":"\n<p><b>飲食質地階梯:</b><b>清流質</b>(透明無渣不含奶,大腸鏡/手術前準備、術後初期、不可長期)→<b>全流質</b>(液態可含奶、無渣)→<b>半流質</b>→<b>低渣</b>(去皮去筋肉、低纖維)→軟質→普通。轉換腸道營養第一階段=清流質。</p>\n<p><b>治療飲食對應:</b><b>高蛋白</b>=組織修復(燒傷、感染、發燒、術後);<b>低蛋白</b>=肝昏迷、尿毒症;<b>低油</b>=膽囊炎、胰臟炎、高血脂、減重;<b>低普林</b>=痛風;CKD=低蛋白限磷鉀鈉。</p>\n<p><b>吞嚥困難進食:</b>採坐姿/高坐臥姿、食物糊狀增稠、每口少量、<b>專注勿聊天分心</b>(易嗆入致吸入性肺炎)、進食後抬高床頭。</p>\n"},"4鼻胃管灌食技術與管灌合併症":{"html":"\n<p><b>插管:</b>採半坐臥;長度=<b>鼻尖經耳垂至劍突</b>(兒童約眉間至劍突);到口咽部時請病人低頭吞口水;水溶性潤滑劑;無法抬頭採右側臥。</p>\n<p><b>確認位置:</b>反抽有胃液(pH酸性1~5)、打入約20 c.c.空氣聽診胃部咕嚕聲、末端入水無連續氣泡。<b>確認位置正確才能灌食</b>,不可插管後立即灌。</p>\n<p><b>灌食:</b>每次量約250~350 mL(≤500)、時間15~20分以上(緩慢)、半坐臥;<b>灌前反抽</b>評估殘餘(>100 mL或前餐一半暫停)、咖啡色內容物疑出血不可打回應通報;<b>灌後抬高床頭30分</b>;灌完再灌少量溫開水沖淨防發酵。</p>\n<p><b>合併症:</b>速度太快/濃度太高/溫度太低/乳糖→腹瀉(處理:稀釋濃度、減慢、回溫);灌食前反抽防肺吸入。矽膠鼻胃管可放置約1個月、PVC約7~10天。</p>\n"},"5腸道外營養TPN與造口灌食":{"html":"\n<p><b>腸道外營養(靜脈營養):</b><b>PPN(周邊靜脈)</b>=等張製劑、無法長期提供足夠熱量;<b>TPN(全靜脈/中心靜脈)</b>=高濃度高熱量,經頸/鎖骨下中心靜脈。</p>\n<p><b>TPN照護:</b>嚴格無菌(瓶口雙重消毒)、<b>每袋及輸注管路24小時更換</b>、密切<b>監測血糖</b>(高濃度葡萄糖)、監控感染徵象;配方來不及時暫用10%葡萄糖防低血糖;<b>營養管路不可抽血</b>(增感染、干擾檢驗)。</p>\n<p><b>造口灌食:</b><b>PEG(經皮內視鏡胃造口)</b>為長期(>4~6週)腸道營養途徑;食道阻塞/狹窄無法經口或鼻胃管時用胃造口灌食。Colostomy是結腸造口(排便)、非灌食。</p>\n"},"6排便生理腸蠕動與糞便性狀":{"html":"\n<p><b>排便機轉:</b>直腸壓力接受器受刺激→訊息傳至<b>薦髓S2~4排便中樞</b>→副交感(骨盆神經)使直腸收縮、內外括約肌<b>放鬆</b>而排便;外括約肌受意志控制。</p>\n<p><b>大腸運動:</b>結腸袋攪拌、<b>質塊運動(大蠕動,每天僅數次、餐後)</b>;<b>胃結腸反射</b>(食物入胃刺激大腸,<b>早餐後最強</b>)、十二指腸結腸反射→定時排便基礎。</p>\n<p><b>糞便顏色:</b><b>黑色(柏油便)</b>=上消化道出血/鐵劑/豬肝;<b>紅色</b>=下消化道(直腸)出血;<b>灰白色</b>=膽道阻塞(缺糞膽素);黃棕=正常。正常成分含脂肪、糞膽素、鈣磷、死菌(無紅血球)。</p>\n<p><b>Valsalva(閉氣用力解便):</b>胸內壓上升→回心血量減少→心輸出量下降、血壓下降,放氣瞬間波動,對心臟病人危險(便盆先溫暖、給軟便劑)。</p>\n"},"7便秘腹瀉灌腸與瀉劑":{"html":"\n<p><b>灌腸技術:</b>採<b>左側臥(Sim位)</b>、溶液溫度<b>40.6~43.3°C</b>(過高致蠕動過速黏膜損傷暈厥、過低致括約肌痙攣)、液面距肛門45~60 cm、成人肛管插入<b>7.5~10 cm</b>;插管前請病人張口哈氣(減腹壓放鬆肛門);灌腸中腹痛→<b>減慢/暫停</b>。</p>\n<p><b>清潔(大量)灌腸</b>:生理食鹽水、750~1000 c.c.、保留5~10分鐘;<b>保留灌腸</b>(藥物/油/麻醉劑)量少(90~180 c.c.)、保留≥30分鐘。</p>\n<p><b>禁忌:</b>急腹症(裏急後重/疑腸阻塞)、嚴重痔瘡、產科安胎、直腸潰瘍;結腸造口者非禁忌。<b>長期依賴瀉劑/灌腸→排便反射遲緩、便秘加重</b>。</p>\n<p><b>便秘/腹瀉:</b>便秘=高纖、多水(2000~3000 mL)、運動、定時排便;<b>糞便嵌塞</b>(滲糞水、便意感)先<b>肛門指診</b>,指挖前塗含局麻潤滑、心悸即停。便秘藥=鐵劑/鈣阻斷劑/鴉片/含鋁制酸/抗膽鹼;腹瀉藥=抗生素/含鎂制酸。</p>\n"},"8糞便檢體採集與檢查":{"html":"\n<p><b>採集通則:</b>量約一顆<b>花生米大小</b>、以壓舌板取;<b>先排空膀胱</b>避免尿液污染;水便/稀便直接以容器留取(非棉花棒沾);培養可用無菌棉棒插肛門1~2 cm,不可挖馬桶糞便。</p>\n<p><b>潛血試驗(化學法):</b>對血基質敏感,檢查前3天忌<b>紅肉、動物內臟(豬肝)、深綠蔬菜(菠菜)、含鐵</b>食物以防偽陽性。</p>\n<p><b>寄生蟲:</b><b>阿米巴原蟲</b>需新鮮、保溫、立即鏡檢(非培養);<b>蟯蟲</b>於清晨睡醒未排便洗澡前以膠帶黏肛門周圍;糞便常規可查細菌、寄生蟲蟲卵;培養可查痢疾(細菌)。</p>\n"},"9排尿生理導尿與膀胱灌洗":{"html":"\n<p><b>排尿生理:</b>尿道<b>內括約肌(平滑肌、不隨意)</b>、外括約肌(骨骼肌、隨意);排尿反射為脊髓反射;正常<b>尿餘量&lt;50 c.c.</b>;尿瀦留因膀胱出口阻塞(前列腺肥大)、神經損傷、抗膽鹼/麻醉劑。</p>\n<p><b>導尿技術:</b>女性消毒由外而內、<b>尿道口最後</b>、棉球用一次、由上向下;<b>氣囊注無菌蒸餾水5~10 c.c.</b>、確認入膀胱再充氣(疼痛→抽出推入2 cm再注);導尿管固定下腹/大腿;膀胱過脹<b>分次導出</b>(防快速減壓出血)。</p>\n<p><b>留置照護:</b>尿袋在膀胱以下、2/3滿前排空、密閉系統;採尿自<b>採尿口無菌抽取</b>(不可由尿袋倒出);最常見致病菌<b>大腸桿菌</b>;長期(>1週)宜<b>矽膠</b>;選能維持引流的<b>最小號</b>;泌尿術後/膀胱灌洗用三路導尿管、18 Fr.以上。</p>\n"},"10尿失禁與膀胱訓練":{"html":"\n<p><b>尿失禁分型:</b><b>壓力性</b>(腹壓增加[咳嗽大笑快走]漏少量尿;多產、肥胖、停經;→Kegel骨盆底肌運動)、<b>急迫性</b>(突發強烈尿意憋不住)、<b>反射性</b>(脊髓損傷、無感覺反射排尿;→輕敲恥骨上方觸發)、<b>功能性</b>(行動/認知障礙來不及如廁)。</p>\n<p><b>處置:</b>Kegel運動增加尿道括約肌張力(壓力性);<b>Crede法</b>(以手向下壓恥骨上方)用於<b>尿瀦留/神經性膀胱排空</b>(非壓力性);膀胱訓練=定時排尿延長間隔;<b>避免咖啡因</b>(茶、咖啡、可可)刺激膀胱。</p>\n<p><b>預防UTI:</b>淋浴代盆浴、性活動前後解尿、勿憋尿、會陰由前往後擦、多喝水。</p>\n"},"11尿液檢查與泌尿道感染":{"html":"\n<p><b>正常尿液:</b>淡黃~琥珀色、清澈、尿比重1.010~1.030、pH 4.6~8、白血球&lt;5/HPF、無蛋白無糖無血。亮黃(螢光黃)尿=維生素B群;暗紅血尿=結石/出血;灰白便+深尿=膽道阻塞。</p>\n<p><b>泌尿道感染(UTI):</b>頻尿、尿急、解尿<b>燒灼感</b>、血尿、尿混濁異味;最常見<b>大腸桿菌</b>;處置=<b>酸化尿液</b>(蔓越莓汁、維生素C)抑菌、多喝水、會陰由前往後擦。</p>\n<p><b>檢體:</b>尿培養須在<b>給抗生素前</b>採<b>無菌中段尿</b>、未送檢冰存4~10°C;月經期採尿用單次導尿避經血污染;24小時尿(CCr)首次棄、收集至次日同時、遺漏須重收;少尿&lt;400、多尿&gt;2500、無尿&lt;100 mL/日。</p>\n"},"12營養排泄照護綜合(護理功能評估紀錄)":{"html":"\n<p><b>護理功能:</b><b>獨立性</b>(護理師自主、不需醫囑:衛教、翻身、誘尿、姿位、評估)、<b>依賴性</b>(依醫囑:給藥、導尿、輸液)、<b>協同性/合作性</b>(與營養師等其他專業協同)。</p>\n<p><b>資料:</b><b>主觀</b>=病人主訴感受(疼痛、燒灼);<b>客觀</b>=觀察/測量(臉色潮紅、血壓);<b>第一手</b>=病人本人陳述。營養相關資料=白蛋白、體重、飲食主訴。</p>\n<p><b>優先順序:</b>依ABC/馬斯洛——呼吸(氧合)→循環/體液容積→其餘;危及生命者(無效呼吸型態、體液容積缺失、血壓不穩)最優先。</p>\n<p><b>護理紀錄:</b>客觀、準確、及時、據實;傷口寫量化大小與滲液;灌腸後解便記1/E;介入後體溫以紅色虛線相連;測呼吸勿事先告知(病人會刻意控制)。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_b5_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
