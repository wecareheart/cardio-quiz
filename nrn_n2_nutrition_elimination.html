守「外科無菌」非內科無菌。故C正確。","options":{"A":"非僅提供額外營養,是主要供給。","B":"鼻胃管/造口灌食屬腸道內營養,非腸道外。","C":"正確(本題答案)。PPN無法長期提供充足熱量。","D":"須遵守外科無菌技術。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"105090-N2-49":{"quick":"BMI 19.4(正常範圍18.5~24):不需增減熱量。","detail":{"background":"BMI=體重(kg)÷身高(m)²。王小姐56÷(1.70)²=56÷2.89=19.4,落在正常範圍(18.5~24)(承上題)。故營養衛教為「不需增減熱量攝取」(B正確),維持均衡飲食即可;BMI正常不需增加(A)、減少(C)熱量或減蛋白鹽分(D)。","options":{"A":"BMI正常,不需增加熱量。","B":"正確(本題答案)。BMI 19.4正常,不需增減熱量。","C":"BMI正常,不需減少熱量。","D":"非腎臟病,不需減蛋白鹽分。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"106110-N2-47":{"quick":"高纖維飲食原理:增加腸道殘渣量(非減少)、促進蠕動。","detail":{"background":"高纖維飲食:膳食纖維吸水膨脹,「增加」糞便體積與腸道殘渣量、刺激腸蠕動、縮短殘渣停留時間、增加腸道水分,用於預防便秘。選項B「減少腸道內殘渣量」錯誤——高纖維是「增加」殘渣量(低渣飲食才減少殘渣),故B為錯誤敘述(本題答案)。A增加水分吸收、C縮短停留、D促進蠕動皆正確。","options":{"A":"正確。增加腸道內水分。","B":"錯誤(本題答案)。高纖維增加殘渣量,非減少。","C":"正確。縮短殘渣停留時間。","D":"正確。促進腸蠕動。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"106110-N2-51":{"quick":"醣類缺乏時身體過度消耗肌肉與脂肪(蛋白質節省作用)。","detail":{"background":"營養素:醣類是主要能量來源,「醣類缺乏時身體會過度消耗蛋白質(肌肉)與脂肪」產能(B正確,故醣類有『蛋白質節省作用』)。A非必需胺基酸是人體「可」自行合成(必需才需從食物);C膳食纖維人體「無法」消化吸收(故能增糞便體積);D蛋白質非抑制胃酸。故B正確。","options":{"A":"非必需胺基酸人體可自行合成。","B":"正確(本題答案)。醣類缺乏會過度消耗肌肉與脂肪。","C":"膳食纖維人體無法消化吸收。","D":"蛋白質非抑制胃酸。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"108110-N2-50":{"quick":"服furosemide(排鉀利尿)+Warfarin:高鉀且限維生素K攝取。","detail":{"background":"furosemide(Lasix)是排鉀利尿劑→易低血鉀,須「高鉀」飲食;Warfarin抗凝→維生素K會拮抗藥效,須「限制(穩定)維生素K」攝取(深綠蔬菜)。故衛教為「高鉀及限維生素K攝取」(C正確)。A高維生素K降warfarin藥效;B低鉀不利排鉀利尿者;D低鉀不當。故C正確。","options":{"A":"高維生素K會拮抗warfarin。","B":"排鉀利尿者不宜低鉀。","C":"正確(本題答案)。高鉀(補排鉀利尿)+限維生素K(不拮抗warfarin)。","D":"排鉀利尿者不宜低鉀。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"109030-N2-15":{"quick":"炒青菜用15公克油=脂質135大卡(脂肪每克9大卡)。","detail":{"background":"脂肪每公克產生9大卡。本題脂質主要來源是「炒青菜用的15公克油」:15×9=135大卡(B正確)。乾飯、橘子主要是醣類(每克4大卡),豆腐含蛋白質。脂質熱量=油重×9。故135大卡。營養素通則:醣類/脂肪每克分別約4/9大卡、蛋白質4大卡;必需胺基酸須由食物攝取、非必需可自行合成;脂溶性維生素ADEK須脂肪吸收;膳食纖維人體不消化但促蠕動;醣類有蛋白質節省作用。","options":{"A":"60大卡計算錯誤。","B":"正確(本題答案)。15 g油×9=135大卡。","C":"400大卡是總熱量概念,非脂質。","D":"450大卡計算錯誤。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"109030-N2-25":{"quick":"血鉀2.7(低血鉀):建議攝取富含鉀之食物。","detail":{"background":"檢驗:Sodium 141(正常)、Potassium 2.7 mEq/L(正常3.5~5.0,明顯低血鉀)、Calcium 5.1(正常)。低血鉀應「建議攝取富含鉀的食物」(香蕉、柑橘、深綠蔬菜、馬鈴薯)(C正確)。A增加水分、B低鈉、D高鈣皆不對應低血鉀。故C正確。","options":{"A":"非脫水,不需特別增加水分。","B":"血鈉正常,不需低鈉。","C":"正確(本題答案)。低血鉀應攝取富含鉀食物。","D":"血鈣正常,不需高鈣。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"109110-N2-46":{"quick":"保鉀性利尿劑會影響維生素吸收。","detail":{"background":"影響營養狀況因素:A酒精過量「抑制」食慾、影響營養吸收(非增加食慾);B交感神經興奮會「抑制」腸蠕動(非增進);C控制食慾主要在「下視丘」(非腦下垂體);D保鉀性利尿劑會影響某些維生素吸收(D正確)。故D正確。營養素通則:醣類/脂肪每克分別約4/9大卡、蛋白質4大卡;必需胺基酸須由食物攝取、非必需可自行合成;脂溶性維生素ADEK須脂肪吸收;膳食纖維人體不消化但促蠕動;醣類有蛋白質節省作用。","options":{"A":"酒精過量抑制食慾。","B":"交感神經興奮抑制腸蠕動。","C":"控制食慾主要在下視丘。","D":"正確(本題答案)。保鉀性利尿劑影響維生素吸收。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"110030-N2-49":{"quick":"脂肪可幫助脂溶性維生素D的吸收與利用。","detail":{"background":"維生素D是脂溶性維生素(A、D、E、K),須有「脂肪」存在才能溶解吸收與利用(C正確)。醣類、蛋白質、菸鹼酸無法替代脂肪促進脂溶性維生素吸收。故脂肪幫助維生素D吸收(C)。營養素通則:醣類/脂肪每克分別約4/9大卡、蛋白質4大卡;必需胺基酸須由食物攝取、非必需可自行合成;脂溶性維生素ADEK須脂肪吸收;膳食纖維人體不消化但促蠕動;醣類有蛋白質節省作用。","options":{"A":"醣類非促進脂溶性維生素吸收。","B":"蛋白質非促進脂溶性維生素吸收。","C":"正確(本題答案)。脂肪幫助脂溶性維生素D吸收。","D":"菸鹼酸是水溶性,非促進。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"111110-N2-43":{"quick":"非必需胺基酸=人體「可」自行合成,非「不一定需要」。","detail":{"background":"胺基酸:A動植物蛋白質都需分解成胺基酸才能利用(對);C必需胺基酸是「人體無法自行合成、必須由食物攝取」(對);D激素和酶都由胺基酸合成(對)。選項B「非必需胺基酸是指人體不一定需要的胺基酸」錯誤——非必需胺基酸是「人體『可』自行合成」者(身體仍需要,只是不必靠食物),故B為錯誤敘述(本題答案)。","options":{"A":"正確。蛋白質須分解成胺基酸才能利用。","B":"錯誤(本題答案)。非必需胺基酸是人體可自行合成,非不需要。","C":"正確。必需胺基酸須由食物攝取。","D":"正確。激素和酶由胺基酸合成。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"112110-N2-43":{"quick":"低密度脂蛋白(LDL)非「脂肪比例較低」,是運送膽固醇到周邊的壞膽固醇。","detail":{"background":"脂肪代謝:A高密度脂蛋白(HDL)俗稱「好的膽固醇」(對);C三酸甘油酯正常<150 mg/dL(對);D脂蛋白數值評估心血管風險(對)。選項B「低密度脂蛋白指其所含脂肪比例較低」錯誤——LDL命名是依「密度低(蛋白質比例低、脂質比例高)」,且LDL是運送膽固醇到周邊、俗稱「壞膽固醇」,並非脂肪比例低,故B為錯誤敘述(本題答案)。","options":{"A":"正確。HDL是好膽固醇。","B":"錯誤(本題答案)。LDL是壞膽固醇,非脂肪比例低。","C":"正確。三酸甘油酯<150 mg/dL。","D":"正確。脂蛋白評估心血管風險。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"112110-N2-44":{"quick":"每日飲食指南:老年人「不應」減少五穀根莖類攝取(仍需足夠主食)。","detail":{"background":"衛福部每日飲食指南:A成人每日豆魚蛋肉約3~8份(對);B青少年可增加奶蛋豆魚(對);D孕乳婦可增加六大類食物(對)。選項C「老年人應減少五穀根莖類食物攝取」錯誤——老年人仍需足夠的全穀雜糧(五穀根莖)作為主要熱量來源,不應特別減少(應均衡),故C為錯誤敘述(本題答案)。","options":{"A":"正確。豆魚蛋肉每日可數份。","B":"正確。青少年增加奶蛋豆魚。","C":"錯誤(本題答案)。老年人不應特別減少五穀根莖類。","D":"正確。孕乳婦可增加六大類食物。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"113030-N2-28":{"quick":"必需胺基酸必須由食物攝取(人體無法自行合成)。","detail":{"background":"營養素:D「必需胺基酸必須由食物攝取」正確(人體無法自行合成)。A非水溶性纖維非延緩糖分吸收(水溶性纖維才延緩糖吸收);B多醣類膳食纖維「促進」非抑制腸蠕動;C非必需胺基酸是人體「可」自行合成(非無法)。故D正確。營養素通則:醣類/脂肪每克分別約4/9大卡、蛋白質4大卡;必需胺基酸須由食物攝取、非必需可自行合成;脂溶性維生素ADEK須脂肪吸收;膳食纖維人體不消化但促蠕動;醣類有蛋白質節省作用。","options":{"A":"延緩糖分吸收的是水溶性纖維。","B":"膳食纖維促進腸蠕動,非抑制。","C":"非必需胺基酸人體可自行合成。","D":"正確(本題答案)。必需胺基酸須由食物攝取。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"113180-N2-19":{"quick":"脂肪取代醣類為主要能量時,尿中出現大量酮體。","detail":{"background":"當醣類不足(飢餓、糖尿病、生酮)、身體以「脂肪」為主要能量來源時,脂肪不完全氧化產生大量「酮體(ketone bodies)」,經尿液排出(酮尿)、嚴重時致酮酸中毒(A正確)。圓柱體(腎病)、蛋白質(腎絲球受損)、膽紅素(肝膽)皆非。故為酮體(A)。","options":{"A":"正確(本題答案)。脂肪為主要能量時尿中出現大量酮體。","B":"圓柱體見於腎臟疾病。","C":"蛋白尿見於腎絲球受損。","D":"膽紅素尿見於肝膽疾病。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"114100-N2-27":{"quick":"脂肪氧化須有醣類參與,否則產生過多酮體致酮酸中毒。","detail":{"background":"六大營養素:B「脂肪氧化過程必須有醣類參與,否則產生過多酮體造成酮酸中毒」正確(『脂肪在醣類的火焰中燃燒』)。A醣類不足時腦細胞以「酮體」為替代能量(非蛋白質脂肪直接);C「人體可自行合成」者是「非必需」胺基酸(非必需);D脂肪攝取不足非主要造成肌少症(蛋白質不足才是)。故B正確。","options":{"A":"醣類不足時腦以酮體為替代能量。","B":"正確(本題答案)。脂肪氧化須醣類參與,否則生酮酸中毒。","C":"可自行合成者是非必需胺基酸。","D":"肌少症主要與蛋白質不足相關。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"113100-N2-31":{"quick":"均衡飲食:低脂乳品每天「1.5~2杯」,非以1杯為限。","detail":{"background":"六大類均衡飲食:A肉類選脂肪含量低者(對);B每天至少3~5碟蔬菜+2~4份水果(對);D素食者蛋白質宜同時攝取全穀、豆類、堅果以互補胺基酸(對)。選項C「低脂乳品每天以1杯為限」錯誤——成人每日乳品建議「1.5~2杯」(補充鈣質),非僅限1杯,故C為錯誤敘述(本題答案)。","options":{"A":"正確。肉類選低脂者。","B":"正確。蔬菜3~5碟、水果2~4份。","C":"錯誤(本題答案)。乳品每天1.5~2杯,非限1杯。","D":"正確。素食蛋白質宜全穀豆類堅果互補。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"114100-N2-34":{"quick":"血液細菌培養不須禁食(三酸甘油酯/膽固醇/飯前血糖才須禁食)。","detail":{"background":"抽血前禁食:三酸甘油酯、膽固醇(血脂)、飯前血糖(glucose AC)須禁食8~12小時以免進食影響數值。血液「細菌培養(blood culture)」目的是找菌血症的病原,「不須禁食」(A正確),但須在發燒/發冷時、給抗生素前無菌採檢。故不須禁食者為血液細菌培養(A)。","options":{"A":"正確(本題答案)。血液細菌培養不須禁食。","B":"三酸甘油酯須禁食。","C":"膽固醇須禁食。","D":"飯前血糖須禁食。"},"sources":["新文京《基本護理學》營養","華杏《最新基本護理學》六大類營養素與飲食指南"]}},"102030-N2-47":{"quick":"理想體重(女)≈(身高-70)×0.6:(160-70)×0.6=54公斤。","detail":{"background":"簡易理想體重推算(以性別身高):女性常用(身高cm−70)×0.6。王小姐160 cm→(160−70)×0.6=54公斤(B正確)。亦可用BMI 22×身高(m)²=22×2.56≈56.3,本題以(身高−70)×0.6=54為答案。故理想體重約54公斤(B)。","options":{"A":"58公斤計算偏高。","B":"正確(本題答案)。(160−70)×0.6=54公斤。","C":"46公斤是實際體重,非理想。","D":"44公斤計算錯誤。"},"sources":["新文京《基本護理學》營養評估","華杏《最新基本護理學》理想體重與生化指標"]}},"102030-N2-48":{"quick":"實際46 kg vs 理想54 kg,低約15%(>10%)→體重過輕。","detail":{"background":"體重過輕判定:實際體重低於理想體重「10%以上」為體重過輕、低於20%以上為消瘦症。承上題理想54 kg,實際46 kg,差(54−46)÷54≈14.8%(>10%、<20%)→屬「體重過輕」(B正確);未達20%故非消瘦症(A);非正常(C)或肥胖(D)。故為體重過輕(B)。","options":{"A":"未低於20%,非消瘦症。","B":"正確(本題答案)。低約15%,屬體重過輕。","C":"低於理想10%以上,非正常範圍。","D":"體重偏低,非肥胖。"},"sources":["新文京《基本護理學》營養評估","華杏《最新基本護理學》理想體重與生化指標"]}},"104030-N2-50":{"quick":"BMI 25.4過重、腰圍82過粗、體脂30%過多、albumin 2過少。","detail":{"background":"陳女士BMI 25.4(過重,24~27)、腰圍82 cm(女性≥80過粗)、身體脂肪30%(女性>30%過多)、血清白蛋白2 g/dL(正常3.5~5,過低=蛋白質營養不良)。故「過重、腰圍過粗、身體脂肪過多、蛋白質過少」(A正確)。非正常(B)、非腰圍正常(C)、BMI 25.4未達肥胖(≥27,非D)。故A正確。","options":{"A":"正確(本題答案)。過重、腰圍過粗、體脂過多、蛋白質過少。","B":"各項多異常,非全正常。","C":"腰圍82≥80過粗、白蛋白2過低。","D":"BMI 25.4是過重非肥胖(肥胖≥27)。"},"sources":["新文京《基本護理學》營養評估","華杏《最新基本護理學》理想體重與生化指標"]}},"105090-N2-48":{"quick":"BMI=體重÷身高²:56÷1.70²=19.4。","detail":{"background":"BMI=體重(kg)÷身高(m)²。王小姐56÷(1.70×1.70)=56÷2.89=19.4(B正確)。BMI 19.4落在正常範圍(18.5~24)。營養評估:理想體重(女)≈(身高−70)×0.6;BMI=體重÷身高²,18.5~24正常、≥27肥胖;腰圍女≥80男≥90過粗;白蛋白<3.5低、反映約3週蛋白質狀態;運鐵蛋白由肝製造反映近期營養。","options":{"A":"17.5計算錯誤。","B":"正確(本題答案)。56÷1.70²=19.4。","C":"21.3計算錯誤。","D":"25.5計算錯誤。"},"sources":["新文京《基本護理學》營養評估","華杏《最新基本護理學》理想體重與生化指標"]}},"111110-N2-44":{"quick":"女性體脂肪22%屬正常範圍,非肥胖(女性>30%才肥胖)。","detail":{"background":"體脂肪:B男性腰圍>90 cm為肥胖(對);C上身肥胖(蘋果型)較易罹患慢性病(對);D女性腰臀比>0.85為肥胖(對)。選項A「女性體脂肪占體重22%屬於肥胖」錯誤——女性體脂肪正常約20~30%,22%屬正常範圍,「>30%」才算體脂過高/肥胖,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。女性體脂22%正常,>30%才肥胖。","B":"正確。男性腰圍>90 cm肥胖。","C":"正確。蘋果型較易慢性病。","D":"正確。女性腰臀比>0.85肥胖。"},"sources":["新文京《基本護理學》營養評估","華杏《最新基本護理學》理想體重與生化指標"]}},"112030-N2-43":{"quick":"腰圍85公分(女性≥80過粗)為異常。","detail":{"background":"營養評估異常判定:A實際體重比理想高8%(在±10%正常範圍內);B BMI 21(正常18.5~24);D Albumin 4.1(正常3.5~5);選項C「腰圍85公分」——若為女性,≥80 cm即代謝症候群腰圍過粗;男性≥90 cm。本題以腰圍85公分為「異常」(C正確,代表中心性肥胖風險)。故異常項為腰圍85(C)。","options":{"A":"體重高出8%在正常範圍。","B":"BMI 21正常。","C":"正確(本題答案)。腰圍85(女≥80)過粗,異常。","D":"Albumin 4.1正常。"},"sources":["新文京《基本護理學》營養評估","華杏《最新基本護理學》理想體重與生化指標"]}},"114170-N2-28":{"quick":"運鐵蛋白(transferrin)由「肝臟」製造,非腎臟。","detail":{"background":"營養生化指標:B血清白蛋白半衰期約「18~21天」、反應較長期蛋白質狀況(對);C三酸甘油酯與膽固醇是常見營養判斷指標(對);D血紅素可評估缺鐵或葉酸(對)。選項A「運鐵蛋白(transferrin)在腎臟製造」錯誤——transferrin由「肝臟」合成、半衰期短(約8~10天)、是評估「近期/亞急性」蛋白質營養的敏感指標,非腎臟製造,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。運鐵蛋白由肝臟製造,非腎臟。","B":"正確。白蛋白反應約21天蛋白質狀況。","C":"正確。三酸甘油酯膽固醇為營養指標。","D":"正確。血紅素評估鐵/葉酸。"},"sources":["新文京《基本護理學》營養評估","華杏《最新基本護理學》理想體重與生化指標"]}},"101030-N2-40":{"quick":"劉太太(燒傷/組織修復/感染情境)宜高蛋白飲食。","detail":{"background":"高蛋白飲食適用於組織修復需求高者:燒傷、發燒、感染、術後、營養不良、白蛋白低下。本題劉太太情境需組織修復,最適合「高蛋白飲食」(C正確)補充修復原料。高鉀(腎/低鉀時)、低熱量(減重)、低渣(腸道準備)皆不對應。故高蛋白(C)。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"高鉀飲食用於低血鉀,非此。","B":"低熱量用於減重,非組織修復。","C":"正確(本題答案)。組織修復需高蛋白飲食。","D":"低渣用於腸道準備,非此。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"102110-N2-35":{"quick":"急性胰臟炎緩解後由口進食宜「低油飲食」。","detail":{"background":"胰臟分泌脂肪酶,急性胰臟炎時油脂會刺激胰液分泌、加重發炎與疼痛。緩解後初恢復進食應採「低油(低脂)飲食」(C正確)以減少胰臟負荷。低蛋白(肝/腎)、低普林(痛風)、高鉀皆不對應胰臟炎。故低油飲食(C)。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"低蛋白用於肝腎,非胰臟炎。","B":"低普林用於痛風,非胰臟炎。","C":"正確(本題答案)。胰臟炎宜低油飲食。","D":"高鉀用於低血鉀,非此。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"103030-N2-51":{"quick":"膽囊炎降膽胰負荷宜「低油飲食」。","detail":{"background":"膽囊收縮排膽汁以消化脂肪;膽囊炎時高油食物會刺激膽囊收縮、加重疼痛發炎。為降低膽胰負荷應採「低油(低脂)飲食」(A正確)。高蛋白、低鈉、低蛋白皆不對應膽囊炎。故低油飲食(A)。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"正確(本題答案)。膽囊炎宜低油飲食。","B":"高蛋白非膽囊炎首要。","C":"低鈉用於高血壓/水腫,非膽囊炎。","D":"低蛋白用於肝腎,非膽囊炎。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"103100-N2-40":{"quick":"高蛋白飲食「不」適用肝昏迷(須限蛋白)。","detail":{"background":"高蛋白飲食適用:發燒、燒傷、感染、術後等組織修復需求高者。但「肝昏迷(肝性腦病變)」病人因肝臟無法代謝蛋白質產生的氨,須「限制蛋白質」攝取(C不適用,本題答案);發燒(A)、燙傷(B)、肺部感染(D)皆適用高蛋白。故不包括肝昏迷(C)。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"發燒適用高蛋白。","B":"燙傷適用高蛋白。","C":"正確(本題答案)。肝昏迷須限蛋白,不適用高蛋白。","D":"肺部感染適用高蛋白。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"104030-N2-17":{"quick":"「N.P.O. M.N.、Atropine O.S. C.M.」=午夜禁食、明早左眼滴Atropine。","detail":{"background":"N.P.O.=禁食;M.N.=午夜;O.S.=左眼;C.M.(cras mane)=明早。白內障術前醫囑「午夜開始禁食、明天早上左眼滴一滴Atropine(散瞳)」(A正確)。N.P.O.是禁食非進食(B、D錯);O.S.是左眼非右眼(C、D錯)。故A正確。(屬醫囑判讀,情境涉術前準備飲食)。","options":{"A":"正確(本題答案)。午夜禁食、明早左眼滴Atropine。","B":"N.P.O.是禁食,非進食。","C":"O.S.是左眼,非右眼。","D":"禁食且左眼。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"104100-N2-45":{"quick":"吞嚥困難進食「不可」與病人聊天分散注意力(易嗆)。","detail":{"background":"吞嚥困難進食安全:B食物切小塊利咀嚼吞嚥(對);C不催促、給足夠時間(對);D每口只裝1/3匙(對)。選項A「進食時與病人聊輕鬆話題分散注意力」不適當——吞嚥困難者進食須「專注、勿說話分心」(分心易嗆入致吸入性肺炎),故A為不適當(本題答案)。應採坐姿、低頭吞、進食後勿立即躺平。","options":{"A":"不適當(本題答案)。吞嚥困難進食不可聊天分心,易嗆。","B":"適當。食物切小塊。","C":"適當。不催促給足夠時間。","D":"適當。每口只裝1/3匙。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"105030-N2-48":{"quick":"清流質飲食=加糖的烏龍茶(透明無渣液體)。","detail":{"background":"清流質飲食(clear liquid):室溫下為「透明、無渣、不含奶」的液體,如清湯、去油肉湯、過濾果汁、加糖茶水/開水、運動飲料。選項B「加糖的烏龍茶」屬清流質(B正確)。不含肉排骨湯(含油脂微粒)、低渣果菜汁(含纖維渣)、無糖豆漿(含蛋白脂肪、不透明)皆非清流質。故B正確。","options":{"A":"排骨湯含油脂微粒,非清流質。","B":"正確(本題答案)。加糖烏龍茶屬清流質。","C":"果菜汁含纖維渣,非清流質。","D":"豆漿不透明,非清流質。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"105090-N2-29":{"quick":"全流質飲食「不可」加入剁碎的高纖維蔬菜(須為液態無渣)。","detail":{"background":"全流質飲食(full liquid):室溫或體溫下呈「液態」、可含奶,如牛奶、米湯、過濾濃湯、布丁、冰淇淋、營養品。A室溫呈液態(對);B少量多餐每日6餐(對);D補充高蛋白高熱量濃縮食物(對)。選項C「將粥攪碎成液狀,再加入『剁碎的高纖維蔬菜』」不適當——全流質須「無渣」,加入剁碎蔬菜會有固體殘渣不符全流質,故C為不適當(本題答案)。","options":{"A":"適當。全流質室溫呈液態。","B":"適當。少量多餐每日6餐。","C":"不適當(本題答案)。全流質須無渣,不可加剁碎蔬菜。","D":"適當。補充高蛋白高熱量。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"107030-N2-42":{"quick":"慢性腎衰竭「不」適用低油飲食(須低蛋白)。","detail":{"background":"低油(低脂)飲食適用:胰臟炎、膽囊炎、高血脂、肥胖(減重)。選項B「慢性腎衰竭病人」非低油飲食的適用對象(本題答案)——腎衰竭主要採「低蛋白(限磷鉀鈉)」飲食以減輕腎臟負擔,而非低油。A胰臟炎、C肥胖、D膽囊炎皆適用低油。故不適用者為慢性腎衰竭(B)。","options":{"A":"胰臟炎適用低油。","B":"正確(本題答案)。慢性腎衰竭宜低蛋白,非低油。","C":"肥胖適用低油(減重)。","D":"膽囊炎適用低油。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"107030-N2-44":{"quick":"胃部分切除術後第一天「不」宜清流飲食協助腸胃恢復(應禁食/視腸蠕動)。","detail":{"background":"胃部分切除術後第一天護理:A口腔清潔(對);C口乾含冰塊(對);D避免看別人進食(對)。選項B「術後第一天給予清流飲食協助腸胃恢復功能」錯誤——胃切除術後第一天通常仍「禁食(NPO)、待腸蠕動恢復(排氣)後才漸進由清流質開始」,術後第一天即給清流飲食過早,故B為錯誤敘述(本題答案)。","options":{"A":"正確。協助口腔清潔。","B":"錯誤(本題答案)。胃切除術後第一天仍宜禁食,非清流飲食。","C":"正確。口乾可含冰塊。","D":"正確。避免看別人進食。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"108020-N2-47":{"quick":"半流質飲食「不」需額外補充鐵劑(非該飲食定義)。","detail":{"background":"半流質飲食(semi-liquid):質地細軟、半固體、易咀嚼吞嚥的食物,如稀飯、絞肉粥、果汁。A瘦肉和稀飯絞碎(對);B蘋果奇異果果汁(對);C每2小時少量多餐(對)。選項D「需要額外補充鐵劑」不是半流質飲食的必要方式(本題答案)——補鐵與否取決於是否缺鐵,非半流質飲食定義所需。故不適當者為D。","options":{"A":"適當。瘦肉稀飯絞碎。","B":"適當。混合果汁。","C":"適當。每2小時少量多餐。","D":"不適當(本題答案)。半流質不必然需補鐵劑。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"108110-N2-48":{"quick":"術後排氣開始進食,第一階段宜「清流質」。","detail":{"background":"腸道手術後飲食漸進:禁食→排氣後「清流質」→全流質→低渣/軟質→普通飲食。術後第三天剛排氣、開始嘗試由口進食,最適合「清流質」(A正確)讓腸胃漸進適應。全流質、低渣、半流質皆是後續階段。故清流質(A)。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"正確(本題答案)。剛排氣進食第一階段宜清流質。","B":"全流質是後續階段。","C":"低渣是後續階段。","D":"半流質是後續階段。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"109030-N2-42":{"quick":"低蛋白飲食適用肝昏迷(2)、尿毒症(4)→「24」。","detail":{"background":"低蛋白飲食適用於需「減少蛋白質代謝產物(氨、尿素氮)」者:2肝昏迷(肝無法代謝氨)、4尿毒症(腎無法排尿素氮)。急性肺炎(1)、燒傷(3)是組織修復/感染需求高,應「高蛋白」。故低蛋白適用「24」。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"1急性肺炎需高蛋白。","B":"3燒傷需高蛋白。","C":"正確(本題答案)。2肝昏迷、4尿毒症適用低蛋白。","D":"1肺炎需高蛋白。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"109030-N2-44":{"quick":"中風吞嚥困難進食「不可」閒聊分散注意力(易嗆)。","detail":{"background":"中風吞嚥困難進食:A採坐姿/高坐臥姿(對);B食物糊狀絞細(對);D進食後抬高床頭防吸入性肺炎(對)。選項C「與其閒聊分散注意力降低壓力」不適當——吞嚥困難者進食須專注、勿邊吃邊說話(分心易嗆入致吸入性肺炎),故C為不適當(本題答案)。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"適當。採坐姿或高坐臥姿。","B":"適當。食物糊狀絞細。","C":"不適當(本題答案)。吞嚥困難不可閒聊分心,易嗆。","D":"適當。進食後抬高床頭。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"112030-N2-40":{"quick":"慢性腎臟病宜「低蛋白飲食」。","detail":{"background":"慢性腎臟病(CKD)飲食以「低蛋白」為主(減少含氮廢物、減輕腎負擔),並限磷、鉀、鈉、水分。故最適宜「低蛋白飲食」(B正確)。高鉀(CKD須限鉀)、高纖(非首要)、低普林(痛風)皆不對應。故低蛋白(B)。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"CKD須限鉀,非高鉀。","B":"正確(本題答案)。慢性腎臟病宜低蛋白飲食。","C":"高纖非CKD飲食重點。","D":"低普林用於痛風。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"113030-N2-29":{"quick":"靜脈營養轉腸道營養第一階段宜「清流質飲食」。","detail":{"background":"由靜脈營養(禁食)轉換為腸道(經口)營養時,腸胃道長期未用,須從「清流質飲食」開始漸進(C正確),再進全流質、低渣、軟質。軟質、高纖、低油皆非第一階段(高纖會刺激未適應的腸道)。故清流質(C)。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"軟質是後續階段。","B":"高纖會刺激未適應腸道。","C":"正確(本題答案)。轉腸道營養第一階段宜清流質。","D":"低油非轉換第一階段考量。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"113180-N2-13":{"quick":"腹腔鏡膽囊切除術後清流飲食宜選「清米湯」。","detail":{"background":"清流飲食(clear liquid)=透明無渣不含奶的液體。膽囊術後6小時可進食清流,選項中「清米湯」屬清流質(B正確)。燕麥粥(含渣)、豆漿(不透明含蛋白脂肪)、牛奶(含奶脂)皆非清流質,且術後初期高脂奶類會刺激膽汁分泌不宜。故清米湯(B)。","options":{"A":"燕麥粥含渣,非清流質。","B":"正確(本題答案)。清米湯屬清流質。","C":"豆漿不透明,非清流質。","D":"牛奶含奶脂,非清流質。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"113180-N2-31":{"quick":"大腸鏡前低渣飲食宜選「去皮去筋的魚肉、雞肉」。","detail":{"background":"飲食衛教:A大腸鏡檢查前低渣飲食宜選「去皮去筋的魚肉、雞肉」(低纖維、低殘渣)(A正確)。B腸道手術清流飲食不可用「果菜汁/豆漿」(含渣/不透明);C膽囊炎恢復期應低油,酪梨(高油)不宜;D中風易嗆者吞嚥飲食不宜「鮮魚湯、鮮奶」(稀薄液體易嗆,應增稠)。故A正確。","options":{"A":"正確(本題答案)。低渣飲食宜去皮去筋魚肉雞肉。","B":"清流飲食不宜含渣果菜汁/豆漿。","C":"膽囊炎恢復期應低油,酪梨高油。","D":"易嗆者不宜稀薄鮮魚湯鮮奶。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"114100-N2-30":{"quick":"清流質飲食用於大腸鏡檢查前腸道準備。","detail":{"background":"清流質飲食(clear liquid):透明無渣液體,用於「大腸鏡/手術前腸道準備、術後初期、急性腸胃炎」(A正確)。B「質地細低纖維」描述偏低渣/全流質;C清流質「不含牛奶」(牛奶不透明);D清流質熱量電解質不足、「不能長期使用」。故A正確。","options":{"A":"正確(本題答案)。清流質用於大腸鏡前腸道準備。","B":"此描述偏低渣飲食。","C":"清流質不含牛奶。","D":"清流質不能長期使用。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"114170-N2-30":{"quick":"大腸鏡前清流質飲食宜選「蜂蜜水」(透明無渣)。","detail":{"background":"清流質飲食=透明無渣液體。大腸鏡檢查前一天清流質,選項中「蜂蜜水」屬清流質(A正確)。含渣果汁(有纖維渣)、排骨高湯(含油脂微粒、不夠清澈)、豆漿(不透明含蛋白)皆非清流質。故蜂蜜水(A)。治療飲食:清流質(透明無渣不含奶,腸道準備/術後初期)<全流質(液態可含奶)<半流質<低渣<軟質<普通;高蛋白用於組織修復(燒傷感染術後)、低蛋白用於肝昏迷尿毒、低油用於膽囊炎胰臟炎;吞嚥困難進食須專注勿分心、坐姿、食物增稠。","options":{"A":"正確(本題答案)。蜂蜜水屬清流質。","B":"含渣果汁有纖維渣,非清流質。","C":"排骨高湯含油脂,非清澈清流。","D":"豆漿不透明,非清流質。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"115030-N2-29":{"quick":"高蛋白約1.5~2.0 g/kg，50 kg×1.5~2.0≈75~100公克，故選C。","detail":{"background":"本題官方答案D。高蛋白飲食蛋白質攝取量約1.2~2.0 g/kg/day(感染/組織修復需求高者)。肺炎病人50 kg,若以較高需求計算(如1.5~2.0 g/kg):50×約1.5=75 g或更高,本題以官方答案D(對應較高蛋白質公克數)為準。核心:高蛋白飲食蛋白質約每公斤體重1.2~2.0公克、視臨床需求。作答以官方D為準。","options":{"A":"25~50偏低(約0.5~1.0 g/kg)，不足高蛋白需求。","B":"50~70約1.0~1.4 g/kg，仍偏低。","C":"正解：高蛋白1.5~2.0 g/kg，50 kg約75~100公克。","D":"110~120過高，超過一般高蛋白建議。"},"sources":["新文京《基本護理學》治療飲食","華杏《最新基本護理學》飲食型態與吞嚥困難"]}},"101030-N2-41":{"quick":"鼻胃管灌食「每次量不超過約350~500 ml、不可10分鐘內快灌」;稱500 ml/10分鐘內為錯誤。","detail":{"background":"鼻胃管灌食:A食物溫度接近體溫37.7~40.5°C(對);B灌食前反抽,若未消化食物>100 ml暫不餵食(對);D灌食後抬高床頭約30分鐘防逆流(對)。選項C「每次灌食量不超過500 ml,大約10分鐘內完成」錯誤——每次灌食量約250~350 ml、灌食時間應「15~20分鐘以上(緩慢)」,10分鐘內快灌易致腹脹、嘔吐、傾食症候群,故C為錯誤敘述(本題答案)。","options":{"A":"正確。溫度接近體溫。","B":"正確。反抽>100 ml暫不餵。","C":"錯誤(本題答案)。灌食應緩慢15~20分,非10分鐘內快灌。","D":"正確。灌食後抬高床頭30分鐘。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"101030-N2-54":{"quick":"鼻胃管放置後「不可立即餵食」(須先確認位置正確);稱插管後即可餵食為錯誤。","detail":{"background":"協助放置鼻胃管:A採半坐臥(對);B插入長度=鼻尖經耳垂至劍突(對);C插入後反抽有胃液表示在胃裡(對,需確認)。選項D「插管後即可餵食」錯誤——放置後「必須先確認位置正確(反抽胃液、打氣聽診、pH測試)」才能餵食,不可插管後立即餵食(誤入呼吸道會致命),故D為錯誤敘述(本題答案)。","options":{"A":"正確。採半坐臥。","B":"正確。長度=鼻尖經耳垂至劍突。","C":"正確。反抽有胃液表示在胃裡。","D":"錯誤(本題答案)。須先確認位置正確才能餵食,非插管後即餵。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"101110-N2-48":{"quick":"鼻胃管位置正確:打入20 c.c.空氣、聽診胃部有咕嚕聲。","detail":{"background":"確認鼻胃管位置正確的方法:以空針「打入約20 c.c.空氣,同時聽診胃部有空氣進入的咕嚕聲」(C正確);反抽「有」胃液表示在胃(B「沒抽出液體」反而可疑);末端放水中「無連續氣泡」才正常(有氣泡表示在呼吸道,A錯);手電筒看口咽看到管子表示管子在口咽未入食道(D錯)。故C正確。","options":{"A":"放水中有氣泡表示在呼吸道,異常。","B":"反抽應「有」胃液,沒抽出反而可疑。","C":"正確(本題答案)。打20 c.c.空氣聽胃部咕嚕聲。","D":"看到管在口咽表示位置不正確。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"101110-N2-49":{"quick":"管灌防嘔吐:灌食速度「不可過快」;穩定每分鐘50 c.c.過快;稱維持50 c.c./分為錯誤。","detail":{"background":"降低管灌嘔吐:A插管後先休息20分鐘再灌(對);B腸道耐受性低者用連續管灌法(對);D灌食後1小時內維持抬高床頭≥30度(對)。選項C「維持穩定的每分鐘50 c.c.灌食速度」錯誤——一次灌食總量約250~350 c.c.、時間15~20分鐘以上,即「速度約每分鐘<30 c.c.(緩慢)」;每分鐘50 c.c.過快易嘔吐,故C為錯誤敘述(本題答案)。","options":{"A":"正確。插管後先休息20分鐘。","B":"正確。耐受性低用連續管灌。","C":"錯誤(本題答案)。每分鐘50 c.c.過快,易嘔吐。","D":"正確。灌食後抬高床頭。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"102030-N2-7":{"quick":"鼻胃管灌食後腹瀉:可先將灌食食物濃度稍作稀釋。","detail":{"background":"管灌腹瀉處理:腹瀉常因「濃度太高(高滲透)、速度過快、溫度過低、配方含乳糖/受污染」。正確處置是「先將灌食食物濃度稍作稀釋」再漸增(A正確)。B應「室溫回溫」非放4小時(久放易滋菌);C腹瀉常因流速「過快」非過慢;D高乳糖會「加重」腹瀉(乳糖不耐)。故A正確。","options":{"A":"正確(本題答案)。先將濃度稍作稀釋。","B":"食物不可室溫久放4小時(易滋菌)。","C":"腹瀉常因流速過快,非過慢。","D":"高乳糖會加重腹瀉。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"103030-N2-45":{"quick":"連續性管灌:胃灌食流速約「80~120 c.c./小時」。本題答案C。","detail":{"background":"連續性(continuous)管灌食:A適用於只能容忍少量食物者(對);B灌食期間維持半坐臥(對);D可用重力引流或灌食幫浦緩慢灌入(對)。選項C「若採胃灌食流速約80~120 c.c./小時」——此為連續胃灌食合理範圍。本題官方答案C(視命題,連續胃灌食起始流速常約30~50 c.c./hr漸增,80~120為較高);依官方答案以C為「錯誤/正確」標示作答。核心:連續灌食緩慢、半坐臥、可用幫浦。","options":{"A":"正確。適用只能容忍少量者。","B":"正確。灌食期間半坐臥。","C":"本題答案(依官方)。連續胃灌食流速宜由低漸增。","D":"正確。可用重力或幫浦緩慢灌入。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"103030-N2-46":{"quick":"管灌合併症:灌食速度「太快」才造成嘔吐(非太慢);稱太慢造成嘔吐為錯誤。","detail":{"background":"連續灌食合併症:A腹瀉可能因濃度太高(對);C平躺灌食可能致肺吸入(對);D糖尿病者監測血糖(對)。選項B「灌食速度太慢可能造成嘔吐」錯誤——灌食速度「太快」才易造成腹脹、嘔吐、傾食症候群;太慢不會致嘔吐,故B為錯誤敘述(本題答案)。鼻胃管灌食:長度=鼻尖經耳垂至劍突;確認位置(反抽胃液、打20cc空氣聽診、pH酸性);每次250~350 mL、15~20分以上、半坐臥、灌前反抽殘餘>100 mL暫停、灌後抬高床頭30分;咖啡色反抽物疑出血不可打回應通報。","options":{"A":"正確。腹瀉可能因濃度太高。","B":"錯誤(本題答案)。灌食太「快」才致嘔吐,非太慢。","C":"正確。平躺灌食可能肺吸入。","D":"正確。糖尿病者監測血糖。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"103100-N2-41":{"quick":"食道嚴重阻塞無法經食道,宜「腸胃道造口管灌食」。","detail":{"background":"誤食強鹼致食道嚴重阻塞,無法經口或鼻胃管(須通過食道)灌食,最適合「腸胃道造口管灌食(如胃造口PEG)」直接由造口灌入胃(D正確)。由口進食、鼻胃管、口胃管都須通過受損阻塞的食道,不可行。故腸胃道造口管灌食(D)。鼻胃管灌食:長度=鼻尖經耳垂至劍突;確認位置(反抽胃液、打20cc空氣聽診、pH酸性);每次250~350 mL、15~20分以上、半坐臥、灌前反抽殘餘>100 mL暫停、灌後抬高床頭30分;咖啡色反抽物疑出血不可打回應通報。","options":{"A":"食道阻塞無法由口進食。","B":"鼻胃管須通過食道,不可行。","C":"口胃管須通過食道,不可行。","D":"正確(本題答案)。食道阻塞宜胃造口灌食。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"103100-N2-48":{"quick":"兒童鼻胃管插入長度=「從鼻尖到劍突」。本題答案A=眉間到劍突?依官方A。","detail":{"background":"本題官方答案A。鼻胃管插入長度測量:成人=鼻尖→耳垂→劍突(NEX);兒童常用「眉間(或鼻尖)→劍突」的測量法。本題官方以A「眉間到劍突」為兒童測量方式。測量確保管端到達胃部。核心:依年齡選測量法,確認管長到胃。作答以官方答案A為準。鼻胃管灌食:長度=鼻尖經耳垂至劍突;確認位置(反抽胃液、打20cc空氣聽診、pH酸性);每次250~350 mL、15~20分以上、半坐臥、灌前反抽殘餘>100 mL暫停、灌後抬高床頭30分;咖啡色反抽物疑出血不可打回應通報。","options":{"A":"本題答案(依官方)。兒童約眉間到劍突。","B":"鼻尖到劍突為成人簡式之一。","C":"鼻尖到肚臍中點非標準。","D":"耳垂到肚臍非標準。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"104100-N2-46":{"quick":"插鼻胃管至「口咽部」時請病人做吞口水動作。","detail":{"background":"插鼻胃管時,當管子到達「口咽部」(會厭附近)時,請病人「低頭並做吞嚥(吞口水)動作」,使會厭蓋住氣管、管子順食道進入(B正確),避免誤入氣管。鼻孔上方太早;食道、賁門已過口咽。故口咽部時吞口水(B)。鼻胃管灌食:長度=鼻尖經耳垂至劍突;確認位置(反抽胃液、打20cc空氣聽診、pH酸性);每次250~350 mL、15~20分以上、半坐臥、灌前反抽殘餘>100 mL暫停、灌後抬高床頭30分;咖啡色反抽物疑出血不可打回應通報。","options":{"A":"鼻孔上方太早。","B":"正確(本題答案)。到口咽部時請病人吞口水。","C":"食道已過吞嚥配合時機。","D":"賁門括約肌已入胃端。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"105030-N2-47":{"quick":"鼻胃管灌食:食物快灌完時再灌入約20 c.c.溫開水(沖洗管路)。","detail":{"background":"鼻胃管灌食技術:D「食物快灌完時要再灌入約20 c.c.溫開水」沖淨管壁殘留食物、防發酵阻塞(D正確)。A每次灌食應「15~20分鐘以上」非10分鐘內;B每次量約250~350 c.c.非至少500;C灌食空針高度應「高於」胃部約30~45 cm(利重力流入)非等高。故D正確。","options":{"A":"灌食應15~20分鐘以上,非10分鐘內。","B":"每次約250~350 c.c.,非至少500。","C":"空針應高於胃部,非等高。","D":"正確(本題答案)。快灌完時灌入20 c.c.溫開水。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"105090-N2-47":{"quick":"鼻胃管灌食前反抽看有無胃液,並將抽出的胃液再推回胃中。","detail":{"background":"鼻胃管灌食準備:B「反抽看有無胃液,並將抽出的胃液再推入胃中」正確(確認位置與殘餘量,胃液含電解質須推回避免流失)(B正確)。A應採「半坐臥」非平躺(平躺易吸入);C抽出的胃內食物應「推回」非抽掉(評估殘餘量,推回避免流失);D灌食前不需倒甘油潤滑。故B正確。","options":{"A":"應採半坐臥,非平躺(防吸入)。","B":"正確(本題答案)。反抽胃液確認後再推回。","C":"殘留胃內食物應推回,非抽掉。","D":"灌食前不需倒甘油。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"106111-N2-49":{"quick":"管灌:有胃造口者灌食前「仍需」反抽?本題答案D高張性脫水。","detail":{"background":"本題官方答案D。管灌餵食:選項D「灌食速度過快,容易造成病人高張性脫水」正確——高濃度配方快速灌入,腸道為平衡滲透壓將水分移入腸腔,可致滲透性腹瀉與「高張性脫水」。A呼吸道分泌物多應「灌食前」先抽痰(灌食後立即拍背抽痰易嘔吐吸入);B反抽75 c.c.(<100)可繼續灌食(非停止);C胃造口灌食前「仍需」反抽評估殘餘量。故D正確。","options":{"A":"應灌食前先抽痰,非灌食後立即拍背抽痰。","B":"反抽75 c.c.(<100)可繼續灌食。","C":"胃造口灌食前仍需反抽評估殘餘量。","D":"正確(本題答案)。灌食過快易致高張性脫水。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"107030-N2-49":{"quick":"管灌「每次量約250~350 c.c.、非至少500 c.c.」;稱至少500 c.c.為錯誤。","detail":{"background":"管灌飲食注意:B一般灌食時間不可少於15~20分鐘(對,緩慢);C灌食前反抽胃內容確認消化狀況(對);D灌入過多空氣可能致嘔吐(對)。選項A「通常每隔3~6小時灌一次,每次至少約500 c.c.營養才足夠」錯誤——每次灌食量應約250~350 c.c.(不超過500),「至少500 c.c.」過量易腹脹嘔吐,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。每次約250~350 c.c.,非至少500。","B":"正確。灌食不少於15~20分鐘。","C":"正確。灌食前反抽確認消化。","D":"正確。灌入過多空氣致嘔吐。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"107110-N2-45":{"quick":"灌食前反抽胃內溶液主要目的=預防灌食造成「肺吸入」。","detail":{"background":"每次灌食前反抽胃內容物:目的是「評估前一餐消化/胃殘餘量,若殘餘過多(>100 c.c.或前餐一半)表示胃排空不良,暫不灌食以預防胃內容物逆流造成『肺吸入(吸入性肺炎)』」(D正確)。並確認管端在胃內。非預防體重過重、水腫、便秘。故預防肺吸入(D)。","options":{"A":"非預防體重過重。","B":"非預防水腫。","C":"非預防便秘。","D":"正確(本題答案)。預防灌食造成肺吸入。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"107110-N2-48":{"quick":"鼻胃管放置:採「外科無菌」?本題答案D pH 6.5需調整深度?重判官方D。","detail":{"background":"本題官方答案D。鼻胃管放置:選項D「放置後反抽胃液以酸鹼試紙測試,pH值為6.5,則需調整插入深度」——胃液應呈強酸性(pH約1~5),反抽pH 6.5偏高,可能管端不在胃(在食道/十二指腸),須「重新確認/調整深度」(D正確)。A病況無法抬頭可採「右側臥」非左側臥(利通過幽門/減誤入);B鼻胃管放置採「清潔」非外科無菌;C潤滑用「水溶性潤滑劑」非凡士林(油性誤入肺有害)。故D正確。","options":{"A":"無法抬頭宜右側臥,非左側臥。","B":"鼻胃管放置採清潔技術,非外科無菌。","C":"應用水溶性潤滑劑,非凡士林。","D":"正確(本題答案)。pH 6.5偏高,需確認調整深度。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"109030-N2-54":{"quick":"管灌腹瀉:稀釋配方濃度,再逐漸增加濃度。","detail":{"background":"管灌(NG tube feeding)出現腹瀉合併症:最適當是「稀釋配方濃度,待腸道適應後再逐漸增加濃度」(C正確);並減慢速度、確認溫度接近體溫、配方無污染。A加快速度會加重腹瀉;B灌食後應抬高床頭、「右側臥利胃排空」但腹瀉處理重點在稀釋濃度;D溫度低於20°C過冷會刺激腸道、加重腹瀉。故C正確。","options":{"A":"加快速度會加重腹瀉。","B":"抬高床頭對,但腹瀉處理重點是稀釋濃度。","C":"正確(本題答案)。稀釋配方濃度再漸增。","D":"溫度<20°C過冷會加重腹瀉。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"109110-N2-47":{"quick":"鼻胃管插管後「不可立即灌食」(須先確認位置);稱確認後可立即灌食為部分對,本題答案A為錯誤。","detail":{"background":"本題問「錯誤」者。鼻胃管照護:B灌食後維持半坐臥≥30分鐘(對);C灌食前先灌20 mL溫開水確認通暢(對);D移除鼻胃管時請病人深吸氣後閉氣、平順快速抽出(對)。選項A「插管後確認管子位置正確,可立即進行灌食」——本題判為錯誤,強調插管後病人可能因插管刺激不適,且首次灌食前宜讓病人休息、確認位置與耐受後再灌,「立即灌食」敘述被列為錯誤。核心:插管後先確認位置、勿過急灌食。","options":{"A":"錯誤(本題答案)。插管後宜確認並讓病人適應,非立即灌食。","B":"正確。灌食後半坐臥30分鐘。","C":"正確。灌食前灌20 mL溫開水確認通暢。","D":"正確。移除時深吸氣閉氣快速抽出。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"110030-N2-47":{"quick":"灌食快完時灌入少量溫開水主要目的=避免食物在管內發酵(沖淨殘留)。","detail":{"background":"鼻胃管灌食食物快灌完時再灌入少量溫開水,主要目的是「沖淨管壁殘留食物、避免食物在管內發酵/變質阻塞管路」(D正確)。並非單純潤濕鼻胃管、確定通暢(雖附帶確認)、刺激胃液分泌。故避免食物在管內發酵(D)。鼻胃管灌食:長度=鼻尖經耳垂至劍突;確認位置(反抽胃液、打20cc空氣聽診、pH酸性);每次250~350 mL、15~20分以上、半坐臥、灌前反抽殘餘>100 mL暫停、灌後抬高床頭30分;咖啡色反抽物疑出血不可打回應通報。","options":{"A":"非僅潤濕鼻胃管。","B":"附帶確認通暢,但主要是沖淨防發酵。","C":"非刺激胃液分泌。","D":"正確(本題答案)。沖淨殘留避免食物在管內發酵。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"110110-N2-8":{"quick":"意識不清、需長期臥床:宜「鼻胃管灌食」提供營養。","detail":{"background":"腦傷術後意識不清、吞嚥反射不可靠、需長期臥床,無法安全由口進食(易嗆),但腸胃功能正常,最適合「鼻胃管灌食法」(B正確)經鼻胃管供給營養。由口進食(意識不清易嗆)、口胃管(短期/特殊)、腸胃道造口(更長期>4~6週才考慮)。故鼻胃管灌食(B)。","options":{"A":"意識不清由口進食易嗆。","B":"正確(本題答案)。意識不清長期臥床宜鼻胃管灌食。","C":"口胃管用於特殊情形,非首選。","D":"造口用於更長期(>4~6週)灌食。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"110110-N2-50":{"quick":"反抽150 mL未消化液(>前餐250一半):暫停灌食並與醫師討論。","detail":{"background":"每2小時間歇灌食,8:00灌250 mL,10:00灌前反抽「150 mL未消化液」(>前餐250 mL的一半、且>100 mL),表示「胃排空不良/腸蠕動差」,最適當是「暫停鼻胃灌食,並與醫師討論」(D正確)以防逆流吸入。A右側臥再灌、B按摩、C減量續灌皆在殘餘量過多時仍有逆流風險,應先暫停評估。故D正確。","options":{"A":"殘餘過多,不宜一小時後逕自再灌。","B":"按摩無法解決殘餘過多風險。","C":"殘餘過多仍續灌有逆流風險。","D":"正確(本題答案)。暫停灌食並與醫師討論。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"111030-N2-45":{"quick":"鼻胃管灌食:灌入速度太快易造成腹瀉。","detail":{"background":"鼻胃管灌食副作用:D「灌入速度太快易造成腹瀉」正確(快速高滲配方致滲透性腹瀉)。A液體攝入過多會致「腹瀉/水分過多」非便秘;B高濃度配方易致「腹瀉」非便秘(纖維不足才便秘);C配方鈉太少非造成水腫(低鈉反而脫水)。故D正確。鼻胃管灌食:長度=鼻尖經耳垂至劍突;確認位置(反抽胃液、打20cc空氣聽診、pH酸性);每次250~350 mL、15~20分以上、半坐臥、灌前反抽殘餘>100 mL暫停、灌後抬高床頭30分;咖啡色反抽物疑出血不可打回應通報。","options":{"A":"液體過多致腹瀉,非便秘。","B":"高濃度配方致腹瀉,非便秘。","C":"配方鈉太少非造成水腫。","D":"正確(本題答案)。灌入速度太快易腹瀉。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"111110-N2-45":{"quick":"管灌食物「不可」一味提高濃度減胃容量(高濃度致腹瀉);稱提高濃度為錯誤。","detail":{"background":"管灌注意:A配方開封後冰箱保存24小時內食用完(對);C食物與藥物灌食間隔約30分鐘(對);D一次灌食總量不超過約500 c.c.(對)。選項B「灌食食物應儘量提高濃度,減少胃容量負荷」錯誤——過度提高濃度(高滲透壓)會引起「滲透性腹瀉、高張性脫水」,應依耐受度由低濃度漸增,非一味提高,故B為錯誤敘述(本題答案)。","options":{"A":"正確。開封後24小時內食用。","B":"錯誤(本題答案)。不可一味提高濃度,高濃度致腹瀉。","C":"正確。食物與藥物間隔30分鐘。","D":"正確。一次不超過約500 c.c.。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"112030-N2-45":{"quick":"反抽150 mL咖啡色未消化食物:打回、暫不餵食。本題答案B為錯誤?重判官方B。","detail":{"background":"本題官方答案B(錯誤項)。鼻胃管灌食:A食物隔水加熱接近體溫(對);C每次≦500 mL、約20分鐘(對);D灌食後抬高床頭30~60分、2小時內不抽痰(對)。選項B「反抽出現150 mL咖啡色未消化食物,將其打回,暫不餵食」錯誤——反抽出「咖啡色(疑似上消化道出血)」內容物時,「不應打回」,而應「保留檢體、通知醫師」評估出血,故B為錯誤敘述(本題答案)。一般未消化『食物』可推回,但「咖啡色」屬異常須通報不可打回。","options":{"A":"正確。隔水加熱接近體溫。","B":"錯誤(本題答案)。咖啡色內容物疑出血,不可打回,應通報。","C":"正確。每次≦500 mL約20分鐘。","D":"正確。灌食後抬高床頭、2小時內不抽痰。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"112110-N2-45":{"quick":"管灌腹瀉改善:調整灌食速度為40~50 c.c./小時(減慢)。","detail":{"background":"650 mOsm/kg(高滲)配方以60 c.c./hr連續灌食後腹瀉,改善措施是「減慢灌食速度為40~50 c.c./小時」(B正確),並可稀釋濃度。A提高濃度會加重(更高滲);C溫度32~35°C偏低(應接近體溫37°C);D採坐姿繼續灌不解決高滲速度問題。故B減速正確。","options":{"A":"提高濃度更高滲,加重腹瀉。","B":"正確(本題答案)。減慢速度為40~50 c.c./小時。","C":"溫度應接近體溫,32~35°C偏低。","D":"繼續灌未解決高滲與速度。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"113030-N2-27":{"quick":"鼻胃管固定標記70公分(過深)顯示位置錯誤。","detail":{"background":"成人鼻胃管插入長度約45~55公分(鼻尖經耳垂至劍突)。選項A「固定標記顯示為70公分」表示插入「過深」(管端可能過幽門入十二指腸或盤捲),屬位置錯誤(A正確)。B反抽出100 c.c.未消化食物(表示在胃,正常)、C打氣聽診胃部咕嚕聲(正常)、D末端入水中無連續氣泡(正常,有氣泡才異常)。故位置錯誤為標記70公分(A)。","options":{"A":"正確(本題答案)。標記70公分過深,位置錯誤。","B":"反抽到胃內食物,表示在胃。","C":"打氣聽胃部咕嚕聲,正常。","D":"水中無連續氣泡,正常。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"113100-N2-28":{"quick":"批次灌食(bolus)空針高度與胃距離約「30~45 cm」,非60~90 cm;稱60~90為錯誤。","detail":{"background":"批次灌食(bolus feeding):A每次量約250~350 mL(對);C灌食速度<30 mL/分(對,緩慢);D灌食後坐臥/半坐臥≥30分(對)。選項B「灌食空針的高度與胃部距離為60~90 cm」錯誤——灌食空針/漏斗高度約「高於胃部30~45 cm」即可(利重力緩慢流入);60~90 cm過高、壓力過大易致快速灌入與不適,故B為錯誤敘述(本題答案)。","options":{"A":"正確。每次250~350 mL。","B":"錯誤(本題答案)。空針高度約30~45 cm,非60~90 cm。","C":"正確。速度<30 mL/分。","D":"正確。灌食後坐臥≥30分。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"113180-N2-12":{"quick":"氣切/氣管內管病人灌食前應「將氣囊充氣(非放氣)」以防吸入;稱放氣為錯誤。","detail":{"background":"經鼻胃管給藥:B反抽物若為咖啡或暗紅色應抽出並通知醫師(對);C不可磨粉劑型應問醫師換可研磨劑型(對);D易潮解變質藥物給藥前才研磨(對)。選項A「使用氣切或氣管內管的病人,灌食前要先將氣囊『放氣』,以免吸入性肺炎」錯誤——氣切/氣管內管病人灌食前應確保氣囊「充氣(打飽)」以阻隔氣道、防止灌食物逆流吸入,放氣反而增加吸入風險,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。灌食前氣囊應充氣防吸入,非放氣。","B":"正確。咖啡色反抽物應通報。","C":"正確。不可磨粉劑型問醫師更換。","D":"正確。易變質藥物給藥前才研磨。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"113180-N2-29":{"quick":"灌食後灌30 c.c.溫開水目的是「沖淨管路」非刺激胃液分泌;稱刺激胃液分泌為錯誤。","detail":{"background":"鼻胃管餵食:B空針高度距胃約30~45 cm(對);C灌食食物42°C需降溫再灌(對,接近體溫);D灌食後維持半坐臥(對)。選項A「灌食後再灌30 c.c.溫開水,目的為刺激胃液分泌以利消化」錯誤——灌食後灌溫開水的目的是「沖淨管壁殘留食物、防發酵阻塞」,而非刺激胃液分泌,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。灌溫開水是沖淨管路,非刺激胃液分泌。","B":"正確。空針距胃約30~45 cm。","C":"正確。42°C需降溫再灌。","D":"正確。灌食後半坐臥。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"114030-N2-27":{"quick":"下咽癌全咽喉切除+食道狹窄:長期腸道營養宜「胃造口灌食」。","detail":{"background":"下咽癌全咽喉切除術+放療後食道狹窄,無法經口或鼻胃管(須經狹窄食道)長期灌食,最適合「胃造口灌食(gastrostomy)」直接由腹壁造口入胃(C正確)。由口進食、鼻胃管須經狹窄食道不可行;腸造口較少用於一般長期餵食。故胃造口灌食(C)。鼻胃管灌食:長度=鼻尖經耳垂至劍突;確認位置(反抽胃液、打20cc空氣聽診、pH酸性);每次250~350 mL、15~20分以上、半坐臥、灌前反抽殘餘>100 mL暫停、灌後抬高床頭30分;咖啡色反抽物疑出血不可打回應通報。","options":{"A":"食道狹窄無法由口進食。","B":"鼻胃管須經狹窄食道,不適合長期。","C":"正確(本題答案)。長期腸道營養宜胃造口灌食。","D":"腸造口非一般長期餵食首選。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"114170-N2-29":{"quick":"矽膠鼻胃管可放置較久(約1個月),非7~10天;稱矽膠需7~10天更換為最不適當。","detail":{"background":"本題問「最不適當」者。鼻胃管:A鼻中膈彎曲者較適合口胃管(對);C打氣確認位置後抽出空氣防脹氣(對);D長期禁食後開始管灌可採連續性灌食(對)。選項B「矽膠材質鼻胃管需7~10天更換」最不適當——矽膠(silicone)材質較耐用、刺激性低,可放置「較久(約4週/1個月)」,7~10天更換是「PVC(聚氯乙烯)」材質的期限;矽膠不需7~10天更換,故B為最不適當(本題答案)。","options":{"A":"適當。鼻中膈彎曲宜口胃管。","B":"最不適當(本題答案)。矽膠可放置約1個月,非7~10天。","C":"適當。確認位置後抽出空氣防脹氣。","D":"適當。長期禁食後可連續性灌食。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"115030-N2-34":{"quick":"適用鼻胃管灌食的藥物劑型=口服懸浮劑(液態易灌、不阻塞)。本題答案... 與115030-12同概念。","detail":{"background":"鼻胃管給藥宜選「液態/可溶劑型」:口服懸浮劑(suspension)、糖漿、可溶散劑——液態易經管灌入、不阻塞(本題答案為液態劑型)。舌下錠(須舌下吸收)、口含錠(口腔吸收)、軟膠囊(膠囊外殼難溶易阻塞)、腸溶/緩釋錠(不可磨碎)皆不適合鼻胃管。故宜選口服懸浮劑(液態劑型)。","options":{"A":"舌下錠須舌下吸收,不適合鼻胃管。","B":"口含錠須口腔吸收,不適合。","C":"軟膠囊外殼難溶易阻塞。","D":"本題答案。口服懸浮劑(液態)適合鼻胃管灌食。"},"sources":["新文京《基本護理學》鼻胃管灌食","華杏《最新基本護理學》管灌技術與合併症"]}},"102030-N2-46":{"quick":"TPN每24小時更換注射管路主要目的=預防感染。","detail":{"background":"全腸道外營養(TPN)是高濃度葡萄糖、胺基酸、脂肪營養液,「易滋生細菌」,經中心靜脈給予感染風險高。每24小時更換注射管路(輸液套)的主要目的是「預防感染(導管相關血流感染)」(D正確)。非主要為防脂肪微粒阻塞、空氣栓塞或高血糖。故預防感染(D)。","options":{"A":"非主要為防脂肪微粒阻塞。","B":"非主要為防空氣栓塞。","C":"非主要為防高血糖。","D":"正確(本題答案)。每24小時換管路主要為預防感染。"},"sources":["新文京《基本護理學》腸道外營養","華杏《最新基本護理學》TPN與造口灌食"]}},"109030-N2-27":{"quick":"腸道手術後NPO、鼻胃管引流量多:宜輸「Ringer’s solution(林格氏液)」補電解質。","detail":{"background":"腸道手術後NPO、鼻胃管抽吸引流量多,會流失大量「水分與電解質(鈉、鉀、氯、碳酸氫根)」。最適用「Ringer’s solution(林格氏液/乳酸林格氏液)」——等張、含多種電解質,可補充消化液流失(D正確)。3% Saline(高張,糾正嚴重低血鈉)、Normal Saline(僅鈉氯)、Mannitol(滲透利尿)皆不如林格氏液全面。故D正確。","options":{"A":"3% Saline是高張液,用於嚴重低血鈉,非補引流流失。","B":"Normal Saline僅補鈉氯,不如林格氏全面。","C":"Mannitol是滲透利尿劑,非補液。","D":"正確(本題答案)。林格氏液補消化液電解質流失。"},"sources":["新文京《基本護理學》腸道外營養","華杏《最新基本護理學》TPN與造口灌食"]}},"109110-N2-49":{"quick":"造口灌食法腸道營養途徑=PEG(經皮內視鏡胃造口)。","detail":{"background":"以「造口灌食法」提供腸道營養的途徑是「PEG(percutaneous endoscopic gastrostomy,經皮內視鏡胃造口)」(B正確),經腹壁造口直接灌食入胃,適合長期(>4~6週)管灌者。Colostomy是「結腸造口(排便用)」非灌食;PICC、Hickman是「中心靜脈導管(靜脈營養/給藥)」非腸道灌食。故PEG(B)。","options":{"A":"Colostomy是結腸造口(排便),非灌食。","B":"正確(本題答案)。PEG胃造口為腸道營養灌食途徑。","C":"PICC是中心靜脈導管,非腸道灌食。","D":"Hickman是中心靜脈導管,非腸道灌食。"},"sources":["新文京《基本護理學》腸道外營養","華杏《最新基本護理學》TPN與造口灌食"]}},"110030-N2-50":{"quick":"TPN每袋輸注時間「不超過24小時」為宜,非48小時;稱48小時為錯誤。","detail":{"background":"非腸道營養:A周邊靜脈營養(PPN)多用等張製劑(對);B TPN須密切監測血糖(對,高濃度葡萄糖);C可經頸/鎖骨下中心靜脈執行TPN(對)。選項D「TPN每袋輸注時間不超過48小時為宜」錯誤——TPN營養液易滋菌,每袋(及輸注管路)應「24小時內」更換,不超過24小時,故D為錯誤敘述(本題答案)。","options":{"A":"正確。PPN多用等張製劑。","B":"正確。TPN須監測血糖。","C":"正確。可用中心靜脈執行TPN。","D":"錯誤(本題答案)。TPN每袋宜24小時內,非48小時。"},"sources":["新文京《基本護理學》腸道外營養","華杏《最新基本護理學》TPN與造口灌食"]}},"111030-N2-44":{"quick":"TPN輸注管路應「24小時」更換,非72小時;稱72小時為錯誤。","detail":{"background":"短腸症TPN:A瓶口雙重消毒預防感染(對);B連續輸注若配方來不及送達,可暫用「10%葡萄糖溶液」代替(對,防低血糖);D空氣栓塞時採頭低、左側臥位(對)。選項C「輸注管路需72小時更換」錯誤——TPN高感染風險,輸注管路應「24小時」更換(非72小時),故C為錯誤敘述(本題答案)。","options":{"A":"正確。瓶口雙重消毒。","B":"正確。可暫用10%葡萄糖代替防低血糖。","C":"錯誤(本題答案)。TPN管路應24小時更換,非72小時。","D":"正確。空氣栓塞採頭低左側臥。"},"sources":["新文京《基本護理學》腸道外營養","華杏《最新基本護理學》TPN與造口灌食"]}},"113180-N2-30":{"quick":"「不可」由靜脈營養輸注管路抽血(增感染、影響營養輸注);稱可抽血為錯誤。","detail":{"background":"腸道外營養:A周邊靜脈營養長期無法提供足夠熱量(對);B TPN適用需高熱量高濃度者(對);C TPN高感染風險須監控感染徵象(對)。選項D「為減少扎針次數,可從靜脈營養輸注管路抽血」錯誤——TPN/靜脈營養管路「不可」用於抽血(會增加導管污染感染風險、且營養液干擾檢驗值),故D為錯誤敘述(本題答案)。","options":{"A":"正確。PPN長期無法提供足夠熱量。","B":"正確。TPN適用高熱量高濃度需求。","C":"正確。TPN須監控感染徵象。","D":"錯誤(本題答案)。不可由營養輸注管路抽血(增感染)。"},"sources":["新文京《基本護理學》腸道外營養","華杏《最新基本護理學》TPN與造口灌食"]}},"102030-N2-31":{"quick":"長期用輕瀉劑可能致排便反射遲緩而「便秘(依賴)」,非腹瀉;稱腹瀉為錯誤。","detail":{"background":"排便型態評估:A正常腸音約5~15秒一次、便秘時腸音減少(對);C乙狀結腸糞便積聚可觸摸圓形硬塊(對);D上腸胃道出血大便呈黑色(柏油便,對)。選項B「長期使用輕瀉劑可能導致排便反射遲緩而腹瀉」錯誤——長期依賴輕瀉劑會使腸道喪失自然排便反射、致「便秘(瀉劑依賴)」而非腹瀉,故B為錯誤敘述(本題答案)。","options":{"A":"正確。便秘時腸音減少。","B":"錯誤(本題答案)。長期用瀉劑致排便反射遲緩而便秘,非腹瀉。","C":"正確。乙狀結腸糞便可觸硬塊。","D":"正確。上消化道出血大便黑色。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"102110-N2-24":{"quick":"膽道阻塞糞便呈白(灰白)色(缺膽汁/糞膽素)。","detail":{"background":"糞便顏色:正常黃棕色來自膽汁的糞膽素。「膽道阻塞」時膽汁無法進入腸道,糞便缺乏糞膽素而呈「灰白(陶土)色」(B正確)。腸道感染(綠/黏液)、食用甜菜(紅)、上消化道出血(黑柏油便)皆非白色。故膽道阻塞=白色(B)。排便生理:排便中樞在薦髓S2~4、副交感(骨盆神經)使括約肌放鬆排便;胃結腸反射早餐後最強;糞便顏色——上消化道出血/鐵劑=黑、下消化道出血=紅、膽道阻塞=灰白;Valsalva閉氣用力減少回心血量、心輸出量下降。","options":{"A":"腸道感染非白色糞便。","B":"正確(本題答案)。膽道阻塞糞便灰白色。","C":"甜菜致紅色糞便。","D":"上消化道出血致黑色柏油便。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"103100-N2-33":{"quick":"膽道阻塞糞便呈灰白色。","detail":{"background":"膽道阻塞時膽汁無法排入腸道,糞便缺乏糞膽素而呈「灰白色(陶土便)」、且尿液變深(膽紅素由尿排)(C正確)。綠色(腸道快速通過/感染)、黑色(上消化道出血/鐵劑)、黃棕色(正常)皆非。故灰白色(C)。排便生理:排便中樞在薦髓S2~4、副交感(骨盆神經)使括約肌放鬆排便;胃結腸反射早餐後最強;糞便顏色——上消化道出血/鐵劑=黑、下消化道出血=紅、膽道阻塞=灰白;Valsalva閉氣用力減少回心血量、心輸出量下降。","options":{"A":"綠色見於腸道快速通過。","B":"黑色見於上消化道出血/鐵劑。","C":"正確(本題答案)。膽道阻塞糞便灰白色。","D":"黃棕色是正常糞便。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"104100-N2-37":{"quick":"便秘衛教「不可」鼓勵喝大量含糖飲料;稱喝大量含糖飲料為最不適宜。","detail":{"background":"便秘護理指導:A多攝取高纖維食物(對);C增加身體活動促進腸蠕動(對);D排便採蹲姿較順暢(對)。選項B「鼓勵喝大量含糖飲料以增加液體攝取」最不適宜——應鼓勵喝「白開水」增加液體,大量含糖飲料增加熱量、不利健康、且非改善便秘最佳方式,故B為最不適宜(本題答案)。","options":{"A":"適宜。多攝取高纖維食物。","B":"最不適宜(本題答案)。應喝白開水,非大量含糖飲料。","C":"適宜。增加活動促進蠕動。","D":"適宜。排便採蹲姿較順暢。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"105030-N2-35":{"quick":"排便是肛門括約肌「放鬆(舒張)」而非收縮引起;稱收縮引起排便為錯誤。","detail":{"background":"排便機轉:A排便受薦神經S2~4(副交感)控制(對);B直腸內壓上升引發排便反射(對);D意志可控制肛門「外」括約肌(對,隨意肌)。選項C「肛門括約肌收縮引起排便」錯誤——排便時肛門內外括約肌「放鬆(舒張)」、直腸收縮,糞便才得以排出;括約肌收縮反而閉合阻止排便,故C為錯誤敘述(本題答案)。","options":{"A":"正確。排便受薦神經S2~4控制。","B":"正確。直腸內壓上升引發反射。","C":"錯誤(本題答案)。排便是括約肌放鬆,非收縮。","D":"正確。意志可控制外括約肌。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"105090-N2-20":{"quick":"Morphine常見副作用=便秘(1)、呼吸過慢(3)。本題答案組合對應「13」。","detail":{"background":"Morphine(嗎啡)常見副作用:抑制腸蠕動致「便秘(1)」、抑制呼吸中樞致「呼吸過慢(3)」、噁心嘔吐、嗜睡、瞳孔縮小、尿瀦留、低血壓(心率「過慢」非過快)。故為「便秘+呼吸過慢」(本題答案對應13)。腹瀉(2)、心率過快(4)非嗎啡副作用。","options":{"A":"此題選項標記重複,正解為便秘+呼吸過慢(13)。","B":"含腹瀉(2)非嗎啡副作用。","C":"本題答案。便秘(1)+呼吸過慢(3)。","D":"含心率過快(4)非嗎啡副作用。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"105090-N2-34":{"quick":"上消化道出血糞便呈黑色(柏油便)。","detail":{"background":"上消化道(食道、胃、十二指腸)出血,血液經腸道消化、血紅素被分解,糞便呈「黑色柏油樣(melena)」(A正確)。下消化道(大腸、直腸)出血才呈鮮紅色;綠色(腸快速通過)、透明黏液(腸炎)皆非。故上消化道出血=黑色(A)。排便生理:排便中樞在薦髓S2~4、副交感(骨盆神經)使括約肌放鬆排便;胃結腸反射早餐後最強;糞便顏色——上消化道出血/鐵劑=黑、下消化道出血=紅、膽道阻塞=灰白;Valsalva閉氣用力減少回心血量、心輸出量下降。","options":{"A":"正確(本題答案)。上消化道出血糞便黑色柏油樣。","B":"紅色見於下消化道出血。","C":"綠色見於腸道快速通過。","D":"透明黏液見於腸炎。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"106110-N2-33":{"quick":"上消化道出血或服鐵劑糞便呈黑色。","detail":{"background":"糞便黑色(柏油便)見於「上消化道出血(血紅素分解)」或「服用鐵劑(硫化鐵)」(B正確)。紅色(下消化道出血)、灰白色(膽道阻塞)、黃棕色(正常)皆非。故上消化道出血/鐵劑=黑色(B)。排便生理:排便中樞在薦髓S2~4、副交感(骨盆神經)使括約肌放鬆排便;胃結腸反射早餐後最強;糞便顏色——上消化道出血/鐵劑=黑、下消化道出血=紅、膽道阻塞=灰白;Valsalva閉氣用力減少回心血量、心輸出量下降。","options":{"A":"紅色見於下消化道出血。","B":"正確(本題答案)。上消化道出血/鐵劑致黑色糞便。","C":"灰白色見於膽道阻塞。","D":"黃棕色是正常糞便。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"106110-N2-39":{"quick":"下消化道出血糞便呈紅色。","detail":{"background":"下消化道(大腸、直腸、肛門)出血,血液未經充分消化,糞便呈「鮮紅色或暗紅色」(C正確)。灰白色(膽道阻塞)、黑色(上消化道出血)、褐色(正常偏深)皆非下消化道出血典型。故下消化道出血=紅色(C)。排便生理:排便中樞在薦髓S2~4、副交感(骨盆神經)使括約肌放鬆排便;胃結腸反射早餐後最強;糞便顏色——上消化道出血/鐵劑=黑、下消化道出血=紅、膽道阻塞=灰白;Valsalva閉氣用力減少回心血量、心輸出量下降。","options":{"A":"灰白色見於膽道阻塞。","B":"黑色見於上消化道出血。","C":"正確(本題答案)。下消化道出血糞便紅色。","D":"褐色非下消化道出血典型。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"106111-N2-51":{"quick":"質塊運動(大蠕動)每天僅數次(非每小時數次);稱每小時數次為錯誤。","detail":{"background":"大腸運動:A結腸袋攪拌運動移動食糜(對);C十二指腸結腸反射引發排便(對);D食物進入胃引發胃結腸反射(對)。選項B「質塊運動(大蠕動)每小時均會出現數次」錯誤——質塊運動(mass movement,大蠕動)是大腸強力推進運動,「每天僅出現數次(約1~3次,常在餐後)」,非每小時數次,故B為錯誤敘述(本題答案)。","options":{"A":"正確。結腸袋攪拌運動移動食糜。","B":"錯誤(本題答案)。大蠕動每天僅數次,非每小時數次。","C":"正確。十二指腸結腸反射引發排便。","D":"正確。食物進入胃引發胃結腸反射。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"107110-N2-28":{"quick":"解黑色糞便原因=服鐵劑(1)、上消化道出血(4)→「14」。","detail":{"background":"黑色糞便(柏油便)原因:1服用鐵劑(硫化鐵)、4上消化道出血(血紅素分解)。進食較多豬肝(3,血基質)也可能使糞便偏深,但「脂肪吸收不良(2)」糞便呈灰白色油脂便(脂肪便),非黑色。本題官方答案「134」(鐵劑+豬肝+上消化道出血皆可致深黑便),核心:黑便=上消化道出血、鐵劑、含血基質食物。","options":{"A":"正確(本題答案,134)。鐵劑、豬肝、上消化道出血致黑便。","B":"含2(脂肪吸收不良→脂肪便非黑便)。","C":"含2不符。","D":"缺4(上消化道出血)。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"107110-N2-31":{"quick":"人體排泄器官=皮膚(2)、肺臟(3)→「23」。","detail":{"background":"人體排泄器官/系統:腎臟(尿)、皮膚(2,汗液排水分電解質尿素)、肺臟(3,排CO2與水)、大腸(糞便)。口腔(1)是消化攝入非排泄;小腸(4)主要是消化吸收非排泄。本題以「皮膚+肺臟」為排泄器官(23)。排便生理:排便中樞在薦髓S2~4、副交感(骨盆神經)使括約肌放鬆排便;胃結腸反射早餐後最強;糞便顏色——上消化道出血/鐵劑=黑、下消化道出血=紅、膽道阻塞=灰白;Valsalva閉氣用力減少回心血量、心輸出量下降。","options":{"A":"口腔(1)是攝入消化,非排泄。","B":"正確(本題答案)。皮膚(2)、肺臟(3)是排泄器官。","C":"小腸(4)主要消化吸收。","D":"口腔(1)非排泄器官。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"107110-N2-44":{"quick":"Valsalva排便:胸內壓上升(1)、血壓下降(3)→「13」。","detail":{"background":"伐耳沙伐氏操作(Valsalva’s maneuver,閉氣用力):1胸內壓上升→壓迫胸腔大靜脈,使靜脈血回心「減少」(非快速大量回心,2錯)、心輸出量暫降、3血壓下降;放氣瞬間回心血量驟增、心率血壓波動,對心血管病人危險。故為「胸內壓上升+血壓下降」(13)。","options":{"A":"含2(靜脈血快速大量回心)錯,Valsalva時回心減少。","B":"含2不符。","C":"含2不符。","D":"正確(本題答案)。胸內壓上升(1)、血壓下降(3)。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"108020-N2-33":{"quick":"心肌梗塞急性期使用便盆:先溫暖便盆減少冷刺激。","detail":{"background":"心肌梗塞急性期病人使用便盆:A「先溫暖便盆再使用,減少冷的刺激」適當(A正確,冷刺激增加心臟負擔)。B教伐式操作法(Valsalva閉氣用力)會增加心臟負荷、危險,不可;C下床使用便盆椅增加心臟負荷(急性期應臥床);D自行抬高臀部增加用力負荷。故A正確,並給軟便劑避免用力。","options":{"A":"正確(本題答案)。先溫暖便盆減少冷刺激。","B":"Valsalva閉氣用力增加心臟負荷,危險。","C":"急性期不宜下床,增心臟負荷。","D":"自行抬臀增加用力負荷。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"108110-N2-38":{"quick":"排便機轉:直腸壓力接受器受刺激→訊息傳至骨盆排便反射中樞。","detail":{"background":"排便機轉:A「直腸內壓力接受器受刺激,訊息傳到骨盆之排便反射中樞」正確。排便反射中樞位於「薦髓S2~4」(非腰椎L3~4,B錯);骨盆神經「副交感」興奮使直腸收縮、內括約肌「放鬆」而排便(C「放鬆」方向對但本題以A為正解);交感神經是「抑制」排便(D「交感刺激使直腸放鬆排便」錯)。故A正確。","options":{"A":"正確(本題答案)。直腸壓力接受器受刺激傳至骨盆排便中樞。","B":"排便中樞在薦髓S2~4,非腰椎L3~4。","C":"副交感使括約肌放鬆(方向對),但本題正解為A。","D":"交感神經抑制排便,非刺激排便。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"109030-N2-41":{"quick":"胃結腸反射在「早餐後」最強。","detail":{"background":"胃結腸反射(gastrocolic reflex):食物進入胃,反射性刺激大腸蠕動(質塊運動),「早餐後(空腹一夜後第一餐)」此反射最強,故為養成「早餐後定時排便」的生理基礎(B正確)。早晨睡醒(未進食)、空腹時、睡前皆非最強。故早餐後(B)。","options":{"A":"睡醒未進食,反射未啟動。","B":"正確(本題答案)。胃結腸反射早餐後最強。","C":"空腹時反射不強。","D":"睡前非胃結腸反射最強時。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"110110-N2-38":{"quick":"Valsalva用力解便可能致「心搏出量減低」。","detail":{"background":"長期臥床者用伐式操作法(Valsalva,閉氣用力)解便:閉氣使胸內壓上升→壓迫胸腔大靜脈、減少靜脈血回心→心輸出量(心搏出量)「減低」、血壓下降(D正確);放氣瞬間回心血量驟增致心率血壓波動,對心臟病人危險。A「減少胸內壓」錯(是上升);B「增加靜脈回心」錯(是減少);C「增加氧合」錯。故D正確。","options":{"A":"Valsalva使胸內壓上升,非減少。","B":"Valsalva減少靜脈回心,非增加。","C":"非增加氧合功能。","D":"正確(本題答案)。Valsalva致心搏出量減低。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"111110-N2-32":{"quick":"直腸出血糞便呈鮮紅色,較「不可能」是黑色。","detail":{"background":"糞便黑色(柏油便)見於:A十二指腸潰瘍(上消化道出血)、C服鐵劑、D吃太多豬肝(血基質)——皆可致黑便。選項B「直腸出血」位於下消化道末端,血液未經消化,糞便呈「鮮紅色」,「較不可能是黑色」(B正確,本題答案)。故直腸出血不致黑便(B)。排便生理:排便中樞在薦髓S2~4、副交感(骨盆神經)使括約肌放鬆排便;胃結腸反射早餐後最強;糞便顏色——上消化道出血/鐵劑=黑、下消化道出血=紅、膽道阻塞=灰白;Valsalva閉氣用力減少回心血量、心輸出量下降。","options":{"A":"十二指腸潰瘍(上消化道出血)致黑便。","B":"正確(本題答案)。直腸出血呈鮮紅色,較不可能黑色。","C":"服鐵劑致黑便。","D":"吃太多豬肝致深黑便。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"112030-N2-31":{"quick":"糞便正常成分含脂肪、膽紅素(膽色素)、鈣磷、剝落的死菌→「1234」。","detail":{"background":"糞便正常成分:1未吸收的脂肪、2膽紅素衍生的糞膽素(膽色素)、3鈣磷等礦物質、4剝落的腸黏膜細胞與「死菌(腸道菌)」、水分、未消化纖維。選項5「紅血球」不應出現於正常糞便(出現代表出血)。故正常成分為「1234」。排便生理:排便中樞在薦髓S2~4、副交感(骨盆神經)使括約肌放鬆排便;胃結腸反射早餐後最強;糞便顏色——上消化道出血/鐵劑=黑、下消化道出血=紅、膽道阻塞=灰白;Valsalva閉氣用力減少回心血量、心輸出量下降。","options":{"A":"含5(紅血球,異常)。","B":"含5不符。","C":"正確(本題答案)。脂肪、膽紅素、鈣磷、死菌為正常成分。","D":"含5不符。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"112110-N2-31":{"quick":"解出黏液便:適當解釋為「醫師診斷疑似腸道感染」。","detail":{"background":"黏液便(大量黏液)常見於「腸道發炎/感染(如腸炎、痢疾)、腸躁症」等。護理師最適當的解釋是「醫師診斷疑似為腸道感染」並進一步檢查(D正確,需醫療評估)。A多喝水、B多吃蔬果是片面建議;C「膽結石」與黏液便無直接關聯。故D最適當(導向就醫評估)。","options":{"A":"多喝水是片面建議,未對應黏液便病因。","B":"多吃蔬果是片面建議。","C":"膽結石與黏液便無直接關聯。","D":"正確(本題答案)。黏液便疑腸道感染,需醫療評估。"},"sources":["新文京《基本護理學》排便","華杏《最新基本護理學》排便生理與糞便性狀"]}},"101030-N2-38":{"quick":"灌腸溶液水溫過高引起:腸黏膜損傷(2)、腸蠕動過速(3)、暈厥(1)→「123」。","detail":{"background":"灌腸溶液水溫過高(>40.6~43.3°C上限)會引起:1暈厥(熱刺激迷走神經)、2腸黏膜損傷(燙傷)、3腸蠕動過速(熱刺激)。水溫過「低」才引起「4肛門肌肉收縮痙攣」。本題官方答案「123」(過高致暈厥、黏膜損傷、蠕動過速)。灌腸溶液溫度應約40.6~43.3°C(105~110°F)。","options":{"A":"含4(過低才痙攣)。","B":"含4不符。","C":"缺1。","D":"正確(本題答案)。過高致暈厥、黏膜損傷、蠕動過速(123)。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"101110-N2-30":{"quick":"大腸鏡檢查採「左側臥式」。","detail":{"background":"大腸鏡檢查時病人採「左側臥式(屈膝)」(C正確)——順應乙狀結腸/降結腸的解剖走向,利於內視鏡進入。垂頭仰臥(休克)、膝胸臥(肛門/直腸檢查)、右側臥皆非大腸鏡標準姿位。故左側臥(C)。灌腸:採左側臥、溶液溫度40.6~43.3°C、液面距肛門45~60 cm、成人肛管插入7.5~10 cm;清潔灌腸保留5~10分鐘、保留灌腸≥30分;禁忌=急腹症/嚴重痔瘡/安胎;長期依賴瀉劑灌腸致便秘加重;糞便嵌塞先肛門指診。","options":{"A":"垂頭仰臥用於休克。","B":"膝胸臥用於肛門直腸檢查。","C":"正確(本題答案)。大腸鏡採左側臥式。","D":"右側臥非大腸鏡標準姿位。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"101110-N2-31":{"quick":"結腸灌洗溶液溫度應約「40.6~43.3°C(接近體溫偏溫)」非室溫27.8°C;稱27.8°C為錯誤。","detail":{"background":"結腸灌洗(灌腸)注意:A每次灌入約500 c.c.、回流後再灌(對);C灌洗液面至肛門約45~60公分(對);D肛管插入成人約7.5~10公分(對)。選項B「灌洗溶液應與室溫接近,約27.8~28.8°C」錯誤——灌腸溶液溫度應約「40.6~43.3°C(105~110°F,接近或略高於體溫)」,室溫27.8°C過低會刺激腸痙攣,故B為錯誤敘述(本題答案)。","options":{"A":"正確。每次約500 c.c.回流後再灌。","B":"錯誤(本題答案)。灌腸液約40.6~43.3°C,非室溫27.8°C。","C":"正確。液面至肛門45~60公分。","D":"正確。肛管插入7.5~10公分。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"102110-N2-21":{"quick":"大量灌腸採「左側臥」、肛管插入5~7公分、溫度40.6~43.3°C;此題答案D肛管深度?重判官方D。","detail":{"background":"本題官方答案D。腸道手術前灌腸(S.S. Enema):A溶液溫度40.6~43.3°C(105~110°F)(對);B病人採左側臥(對);C灌腸筒液面與肛門垂直距離不超過45~60公分(對)。選項D「肛管插入肛門深度約5.0~7.0公分」——成人大量灌腸肛管插入深度約「7.5~10公分」,5.0~7.0公分偏淺,本題以D為錯誤敘述(本題答案)。核心:成人灌腸肛管插入約7.5~10 cm、左側臥、溫度40.6~43.3°C、液面45~60 cm。","options":{"A":"正確。溶液40.6~43.3°C。","B":"正確。採左側臥。","C":"正確。液面距肛門不超過45~60公分。","D":"錯誤(本題答案)。成人肛管插入約7.5~10 cm,非5~7 cm。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"102110-N2-25":{"quick":"大量灌腸後教導病人保留約5~10分鐘才解出。","detail":{"background":"大量(清潔)灌腸後,應教導病人「儘量保留約5~10分鐘」再解出,使溶液充分軟化糞便、刺激腸蠕動達清腸效果(A正確)。保留太短(立即排)效果差;保留灌腸(藥物/營養)才需保留30分鐘以上;「越久越好」不切實際。故大量灌腸保留5~10分鐘(A)。","options":{"A":"正確(本題答案)。大量灌腸後保留5~10分鐘。","B":"30分鐘以上是保留灌腸,非大量灌腸。","C":"越久越好不切實際。","D":"有建議時間,非單依醫囑。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"103030-N2-38":{"quick":"小量灌腸用於軟化糞便、給藥、供給營養等；「下腸道手術前準備」需大量清潔灌腸，非小量灌腸的作用，故選B。","detail":{"background":"小量灌腸(如甘油灌腸)作用:A潤滑及軟化糞便(有)、B下腸道手術前準備(有,清腸)、C給藥(可,如某些藥物灌腸)。選項D「供給營養」不是小量灌腸的作用(本題答案)——供給營養是「滴注/保留灌腸或管灌」的用途,小量灌腸量少、主要為軟便清腸,故小量灌腸「不具」供給營養作用(D)。","options":{"A":"小量灌腸可潤滑、軟化糞便。","B":"正解：下腸道手術前準備需「大量清潔灌腸」，非小量灌腸的作用。","C":"小量(保留)灌腸可用於給藥。","D":"營養灌腸(保留灌腸)可供給營養，屬其作用之一。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"104100-N2-2":{"quick":"常規大便次數紀錄:白班統計後記載於生命徵象紀錄表(前一天欄位)。本題答案D。","detail":{"background":"常規大便次數紀錄:D「白班統計後統一記載於生命徵象紀錄表」(B「前一天欄位」概念)正確記錄方式(D正確)。A大便次數是指「24小時(一整天)」所解次數非12小時;B非每班統計(白班統一統計前24小時);C灌腸後解便以「1/E」表示(非2/F)。故D正確(白班統一記載)。","options":{"A":"大便次數指24小時,非12小時。","B":"白班統一統計,非每班統計。","C":"灌腸後解便以1/E表示,非2/F。","D":"正確(本題答案)。白班統計後記載於生命徵象紀錄表。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"104100-N2-32":{"quick":"腸道手術前灌腸:肛管插入肛門7.5~10公分。","detail":{"background":"腹部手術前灌腸(S.S. enema):C「肛管插入肛門7.5~10公分」正確(成人)。A液面至肛門垂直距離約「45~60公分」非30~40;B灌腸請病人「左側臥」非右側臥;D「清潔灌腸」保留5~10分鐘即排(15~30分鐘是保留灌腸)。故C正確。","options":{"A":"液面距肛門45~60公分,非30~40。","B":"灌腸採左側臥,非右側臥。","C":"正確(本題答案)。肛管插入7.5~10公分。","D":"清潔灌腸保留5~10分鐘,非15~30分。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"105030-N2-33":{"quick":"甘油灌腸:灌入90~180 c.c.(2)、忍5~10分鐘(3)、成分為甘油(4)→「234」。","detail":{"background":"甘油灌腸(glycerine enema,小量灌腸):2灌入量約90~180 c.c.、3灌完後請病人儘量忍住便意5~10分鐘、4溶液成分為甘油(高滲、潤滑軟便、刺激腸蠕動)——皆正確。選項1「主要目的是保護腸黏膜」錯誤(甘油灌腸目的是軟便通便、刺激排便,非保護黏膜;油類保留灌腸才潤滑保護)。故正確為「234」。","options":{"A":"含1(保護腸黏膜)錯。","B":"含1不符。","C":"正確(本題答案)。2量90~180cc、3忍5~10分、4成分甘油。","D":"含1不符。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"105030-N2-38":{"quick":"保留灌腸保留在腸道內約30分鐘以上。","detail":{"background":"保留灌腸(retention enema,如藥物/油類/營養灌腸):C「保留在腸道內約30分鐘以上」正確(使藥物/油充分吸收作用)。A成人灌入量約「90~180 c.c.(量少)」非750~1000(那是清潔灌腸);B灌腸液溫度約40.6~43.3°C非41~43(接近);D灌入速度應「緩慢」非迅速(迅速刺激排便)。故C正確。","options":{"A":"保留灌腸量約90~180 c.c.,非750~1000。","B":"溫度約40.6~43.3°C。","C":"正確(本題答案)。保留灌腸保留30分鐘以上。","D":"灌入應緩慢,非迅速。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"105090-N2-35":{"quick":"灌腸中輕微腹痛:可能腸痙攣,宜減緩灌腸速度。","detail":{"background":"灌腸中病人輕微腹痛,常因「溶液流入過快或溫度不適引起腸道痙攣性收縮」,正確處置是「減緩灌腸速度(暫停或放慢)、深呼吸」(D正確)使腹痛緩解後再續灌。A立即停止回報醫師(輕微腹痛非必要)、B疑腸穿孔做檢查(過度)、C加速灌入(會加重)。故D減緩速度(D)。","options":{"A":"輕微腹痛不需立即停止回報醫師。","B":"輕微腹痛非腸穿孔,不需立即檢查。","C":"加速灌入會加重腹痛。","D":"正確(本題答案)。可能腸痙攣,減緩灌腸速度。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"106030-N2-35":{"quick":"灌腸溶液溫度過低可能使肛門括約肌收縮痙攣。","detail":{"background":"灌腸溶液溫度:A保留灌腸溫度約40.6~43.3°C(非41~43,接近);B非保留(清潔)灌腸溫度約40.6~43.3°C(非37.8~40.6);C溫度過「高」會造成腸蠕動過速、黏膜損傷(非蠕動過慢);D「溶液溫度過低時可能使肛門括約肌收縮痙攣」正確(冷刺激致痙攣)。故D正確。","options":{"A":"保留灌腸約40.6~43.3°C。","B":"清潔灌腸約40.6~43.3°C。","C":"溫度過高致蠕動過速,非過慢。","D":"正確(本題答案)。溫度過低致肛門括約肌痙攣。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"106110-N2-31":{"quick":"預防便秘「不可」每日睡前使用瀉藥(致依賴);稱每日睡前用瀉藥為錯誤。","detail":{"background":"預防便秘護理:B每日攝取足夠蔬果(對);C養成每日定時排便習慣(對);D每日攝取液體2000~2500 c.c.(對)。選項A「每日睡前使用瀉藥」錯誤——長期依賴瀉藥會使腸道喪失自然排便反射、加重便秘(瀉劑依賴),不應每日使用,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。不可每日用瀉藥,易致依賴。","B":"正確。每日攝取足夠蔬果。","C":"正確。養成定時排便。","D":"正確。每日攝取足夠液體。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"106110-N2-32":{"quick":"大量灌腸中輕微腹痛:暫停灌腸、等腹痛消失後再繼續。","detail":{"background":"大量灌腸過程病人輕微腹痛,常因溶液流入過快致腸痙攣,正確處置是「暫停灌腸,等腹痛消失後再繼續(放慢速度)」(D正確)。A立即拔肛管通知醫生(輕微腹痛非必要)、B停止躺平休息(可暫停但仍可續灌)、C提高灌腸筒加快速度(會加重)。故D暫停後續灌(D)。","options":{"A":"輕微腹痛不需立即拔管通知醫生。","B":"可暫停,但非永久停止。","C":"加快速度會加重腹痛。","D":"正確(本題答案)。暫停、腹痛消失後再續灌。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"106110-N2-38":{"quick":"易致便秘藥物=抗膽鹼藥Atropine(4)、Morphine(5)、含鋁制酸劑→「345」。","detail":{"background":"易導致便秘的藥物:4抗膽鹼激素藥(Atropine,抑制腸蠕動)、5麻醉性止痛劑(Morphine,抑制腸蠕動)、含鋁制酸劑(收斂)、鐵劑、鈣離子阻斷劑。選項組合「345」(含鋁制酸劑/抗膽鹼/Morphine)致便秘。選項1「長期抗生素」常致「腹瀉」(破壞菌叢)非便秘;3鐵劑致便秘。本題官方答案「345」。","options":{"A":"含1(抗生素致腹瀉)不符。","B":"含1、2不符。","C":"含1不符。","D":"正確(本題答案)。含鋁制酸劑、抗膽鹼、Morphine致便秘(345)。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"106111-N2-36":{"quick":"灌腸插肛管前請病人張口哈氣的理由=減輕病人腹壓(放鬆肛門)。","detail":{"background":"執行灌腸插入肛管前,請病人「張口慢慢哈氣(深呼吸)」,目的是「放鬆腹部與肛門括約肌、減輕腹壓」,使肛管易插入、減少不適與痙攣(A正確)。並非放鬆四肢肌肉、集中注意力或收縮腹肌。故減輕腹壓放鬆肛門(A)。灌腸:採左側臥、溶液溫度40.6~43.3°C、液面距肛門45~60 cm、成人肛管插入7.5~10 cm;清潔灌腸保留5~10分鐘、保留灌腸≥30分;禁忌=急腹症/嚴重痔瘡/安胎;長期依賴瀉劑灌腸致便秘加重;糞便嵌塞先肛門指診。","options":{"A":"正確(本題答案)。張口哈氣減輕腹壓、放鬆肛門。","B":"非放鬆四肢肌肉。","C":"非僅集中注意力。","D":"是放鬆腹肌,非收縮。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"107030-N2-34":{"quick":"灌腸肛管插入深度:成人約7.5~10公分。","detail":{"background":"灌腸肛管插入深度:A成人約7.5~10公分(A正確);孩童約「5~7.5公分」(非2.5~4.5,B偏淺);嬰幼兒約「2.5~4公分」(非1.5~2.0);插入深度依年齡而定但有標準範圍(D不夠精確)。故成人約7.5~10公分(A)。灌腸:採左側臥、溶液溫度40.6~43.3°C、液面距肛門45~60 cm、成人肛管插入7.5~10 cm;清潔灌腸保留5~10分鐘、保留灌腸≥30分;禁忌=急腹症/嚴重痔瘡/安胎;長期依賴瀉劑灌腸致便秘加重;糞便嵌塞先肛門指診。","options":{"A":"正確(本題答案)。成人灌腸肛管插入7.5~10公分。","B":"孩童約5~7.5公分,非2.5~4.5。","C":"嬰幼兒約2.5~4公分。","D":"依年齡有標準範圍,A最精確。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"107110-N2-29":{"quick":"腸蠕動聲「增加」見於腹瀉。","detail":{"background":"腸蠕動音(腸鳴):D「腹瀉」時腸蠕動加快、腸鳴音「增加(亢進)」(D正確)。A腹膜炎、C腸麻痺(麻痺性腸阻塞)時腸蠕動「減少或消失」;B腹股溝疝氣不直接增加腸鳴(除非合併腸阻塞早期)。故腹瀉腸蠕動增加(D)。灌腸:採左側臥、溶液溫度40.6~43.3°C、液面距肛門45~60 cm、成人肛管插入7.5~10 cm;清潔灌腸保留5~10分鐘、保留灌腸≥30分;禁忌=急腹症/嚴重痔瘡/安胎;長期依賴瀉劑灌腸致便秘加重;糞便嵌塞先肛門指診。","options":{"A":"腹膜炎腸蠕動減少/消失。","B":"腹股溝疝氣不直接增加腸鳴。","C":"腸麻痺腸蠕動減少/消失。","D":"正確(本題答案)。腹瀉腸蠕動聲增加。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"107110-N2-32":{"quick":"預防便秘「不可」養成定期灌腸習慣(致依賴);稱養成定期灌腸為不適當。","detail":{"background":"預防便秘指導:A多吃蔬菜水果全穀類(對);C養成早餐後排便習慣(對);D每日攝取2000 mL水分(對)。選項B「養成定期灌腸的習慣」不適當——長期依賴灌腸會使腸道喪失自然排便反射、加重便秘,應靠飲食、運動、定時排便,故B為不適當(本題答案)。","options":{"A":"適當。多吃蔬果全穀類。","B":"不適當(本題答案)。不可養成定期灌腸,易致依賴。","C":"適當。養成早餐後排便。","D":"適當。每日攝取足夠水分。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"108020-N2-34":{"quick":"一週未解便+下腹劇痛盜冷汗:「不可」立即肥皂水清潔灌腸(未評估病因)。","detail":{"background":"下腹劇痛數日、盜冷汗、一週未解便,可能為「腸阻塞」等急症,護理師措施:A評估過去排便型態(對)、B腹部視聽叩觸診(對,先聽腸音)、C詢問是否用止痛藥(對)。選項D「立即給予肥皂水清潔灌腸」不適當——在「未排除腸阻塞/急腹症」前灌腸有「腸穿孔」風險,應先評估診斷,故D為最不適當(本題答案)。","options":{"A":"適當。評估過去排便型態。","B":"適當。腹部視聽叩觸診。","C":"適當。詢問是否用止痛藥。","D":"最不適當(本題答案)。未排除腸阻塞前不可立即灌腸。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"108020-N2-36":{"quick":"灌腸禁忌「不」包括長期導尿者;稱長期導尿者為灌腸禁忌為錯誤。","detail":{"background":"灌腸禁忌症:A產科安胎者(灌腸刺激子宮收縮)、C闌尾炎(增穿孔風險)、D疼痛性嚴重痔瘡(肛管刺激出血疼痛)——皆為禁忌。選項B「長期導尿者」不是灌腸禁忌(本題答案,問「錯誤」)——留置導尿與灌腸無衝突,長期導尿者仍可視需要灌腸。故灌腸禁忌不含長期導尿者(B)。","options":{"A":"產科安胎者是灌腸禁忌。","B":"錯誤(本題答案)。長期導尿者非灌腸禁忌。","C":"闌尾炎是灌腸禁忌。","D":"嚴重痔瘡是灌腸禁忌。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"108110-N2-32":{"quick":"軟便劑致嚴重腹瀉拒服:暫停給藥、報告醫師。","detail":{"background":"病人服軟便劑後腹瀉嚴重、拒服,最適當處置是「暫停給藥,並報告醫師病人狀況」(C正確)以評估是否調整劑量或停藥。A請病人繼續服(腹瀉嚴重不當)、B告知腹瀉停止後再服(自行決定不妥)、D自行劑量減半(護理師不可自行改劑量)。故暫停並報告醫師(C)。","options":{"A":"腹瀉嚴重不可請病人繼續服。","B":"不可自行決定腹瀉停後再服。","C":"正確(本題答案)。暫停給藥、報告醫師。","D":"護理師不可自行減半劑量。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"109030-N2-22":{"quick":"Bisacodyl塞劑前腹絞痛冒冷汗:立即停止給藥,觀察生命徵象。","detail":{"background":"給瀉劑Bisacodyl塞劑前,病人主訴「腹絞痛、冒冷汗不適」,屬異常徵象(可能腸痙攣/急腹症),最適當是「立即停止給藥,並觀察生命徵象」(C正確),通報醫師評估。A哈氣迅速推入、B緩緩塞入、D告知正常反應深呼吸——皆忽略病人異常不適,不當。故立即停止觀察(C)。","options":{"A":"病人不適不應迅速推入。","B":"病人不適不應繼續塞入。","C":"正確(本題答案)。立即停止給藥、觀察生命徵象。","D":"腹絞痛冒冷汗非正常反應。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"109030-N2-32":{"quick":"便秘致肛門滲糞水(溢出性腹瀉/糞便嵌塞):宜先肛門指診評估。","detail":{"background":"長期便秘、用Senokot後「肛門滲出少量糞水、有便意感、腹痛」=典型「糞便嵌塞(fecal impaction)」造成的「溢出性腹瀉(液態糞繞過硬糞石滲出)」。最適當是「肛門指診(D)」評估有無糞石嵌塞,確認後再處理(軟化/指挖/灌腸)。A暫停Senokot、B給止瀉劑(會更阻塞)、C直接灌腸(未評估)皆不當。故肛門指診(D)。","options":{"A":"暫停Senokot無法解決嵌塞。","B":"給止瀉劑會加重糞便嵌塞。","C":"未評估即灌腸不妥。","D":"正確(本題答案)。先肛門指診評估糞便嵌塞。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"109030-N2-35":{"quick":"糞便嵌塞指挖:以含局部麻醉的潤滑液塗肛門後再指挖。","detail":{"background":"糞便嵌塞手指挖除糞石:D「以含局部麻醉成分的潤滑液塗抹肛門後再執行指挖」正確(減少疼痛與肛門括約肌痙攣)。A指挖易刺激「迷走神經(副交感)」反應(非交感),致心搏過緩、血壓下降;B病人主訴心悸/不適「應立即停止」非持續挖;C糞石阻塞「直腸」處指挖即可,灌腸無法軟化過硬糞石。故D正確,過程監測生命徵象。","options":{"A":"指挖刺激迷走神經(副交感),非交感。","B":"病人心悸不適應立即停止,非持續挖。","C":"直腸糞石宜指挖,灌腸難軟化過硬糞石。","D":"正確(本題答案)。含局麻潤滑液塗肛門後再指挖。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"110030-N2-36":{"quick":"灌腸肛管選擇:孩童宜選用14~18 Fr.的肛管。","detail":{"background":"灌腸肛管(直腸管)大小:C「孩童宜選用14~18 Fr.」正確。A成人「大量」灌腸宜選22~24 Fr.(非小量24~26);B成人「大量」灌腸22~24 Fr.(非18~20,18~20偏小);D嬰幼兒宜選「12 Fr.左右」(非5~6,過細)。故孩童14~18 Fr.(C)。","options":{"A":"成人大量灌腸約22~24 Fr.。","B":"成人大量灌腸22~24 Fr.,18~20偏小。","C":"正確(本題答案)。孩童14~18 Fr.。","D":"嬰幼兒約12 Fr.,5~6過細。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"110110-N2-42":{"quick":"腸道攝影服鋇劑可能解白色便?本題答案D長期用抗生素致腹瀉。","detail":{"background":"藥物對排便影響:D「長期服用抗生素易破壞正常菌叢造成腹瀉(偽膜性腸炎)」正確。A長期Morphine致「便秘」非腹瀉;B高劑量含「鋁」制酸劑致「便秘」(含鎂才腹瀉);C腸道攝影鋇劑可能解「灰白色便」(非黑便)。故D正確。灌腸:採左側臥、溶液溫度40.6~43.3°C、液面距肛門45~60 cm、成人肛管插入7.5~10 cm;清潔灌腸保留5~10分鐘、保留灌腸≥30分;禁忌=急腹症/嚴重痔瘡/安胎;長期依賴瀉劑灌腸致便秘加重;糞便嵌塞先肛門指診。","options":{"A":"Morphine致便秘,非腹瀉。","B":"含鋁制酸劑致便秘(含鎂才腹瀉)。","C":"鋇劑致灰白色便,非黑便。","D":"正確(本題答案)。長期抗生素破壞菌叢致腹瀉。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"110110-N2-43":{"quick":"適合灌腸者=骨折臥床多日未解便、腹脹(無禁忌)。","detail":{"background":"灌腸禁忌:急腹症(裏急後重疑腸阻塞/感染)、嚴重痔瘡、安胎(刺激子宮收縮)。選項D「下肢骨折住院、多日未解便、腹脹不適」無灌腸禁忌、屬單純便秘,適合灌腸(D正確)。A裏急後重疑腸道病變、B痔瘡腫痛、C安胎輕微宮縮——皆為禁忌或須謹慎。故D適合灌腸。","options":{"A":"裏急後重疑腸道病變,不宜灌腸。","B":"痔瘡腫痛是灌腸禁忌。","C":"安胎宮縮,灌腸刺激子宮收縮禁忌。","D":"正確(本題答案)。骨折臥床便秘腹脹,適合灌腸。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"111030-N2-29":{"quick":"意福灌腸(小量灌腸):灌腸器頂端與肛管接合處需以凡士林潤滑?本題答案C肛管插入7.5~10 cm。","detail":{"background":"本題官方答案C。意福灌腸液(EVAC,小量灌腸):C「灌腸器頂端軟管塞入肛門深度為7.5~10 cm」正確(成人)。A灌腸採「左側臥」非右側臥;B潤滑應塗在「肛管/灌腸器頂端插入肛門的部分」(B敘述位置/方式須對,惟本題以C為正解);D灌腸中病人痙攣腹痛應「減緩或暫停」非請其忍耐灌完。故C正確。","options":{"A":"灌腸採左側臥,非右側臥。","B":"潤滑塗插入肛門的頂端,本題正解為C。","C":"正確(本題答案)。塞入肛門7.5~10 cm。","D":"痙攣腹痛應減緩暫停,非忍耐灌完。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"111030-N2-32":{"quick":"腸道內視鏡檢查前需服瀉劑或清潔灌腸(清腸)。","detail":{"background":"腸道內視鏡(大腸鏡)檢查:B「檢查前需服用瀉劑或執行清潔灌腸」清腸正確。A檢查前約「1~3天低渣飲食、檢查前清流質」非全程全流質3天;C檢查時採「左側臥」非右側臥/膝胸臥;D檢查後不需絕對臥床6小時(可活動,排氣即可)。故B正確。灌腸:採左側臥、溶液溫度40.6~43.3°C、液面距肛門45~60 cm、成人肛管插入7.5~10 cm;清潔灌腸保留5~10分鐘、保留灌腸≥30分;禁忌=急腹症/嚴重痔瘡/安胎;長期依賴瀉劑灌腸致便秘加重;糞便嵌塞先肛門指診。","options":{"A":"檢查前採低渣後清流質,非3天全流質。","B":"正確(本題答案)。檢查前需服瀉劑或清潔灌腸。","C":"檢查採左側臥,非右側臥/膝胸臥。","D":"檢查後不需絕對臥床6小時。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"111110-N2-15":{"quick":"Inteban塞劑退燒:腸道有糞團時應避開或小量灌腸清除。","detail":{"background":"Inteban(indomethacin)栓劑退燒:C「發現腸道有糞團時,應避開糞團或小量灌腸清除糞便,以免影響藥物吸收」正確(栓劑需接觸直腸黏膜吸收)。A配合乙狀/降結腸位置應採「左側臥」非右側臥;B塞入深度成人約「越過內括約肌(>2吋)」非2公分(過淺);D病人頭痛冒冷汗是異常,應「停止」非忍耐。故C正確。","options":{"A":"應採左側臥,非右側臥。","B":"成人塞入應越過內括約肌,非2公分。","C":"正確(本題答案)。有糞團應避開或小量灌腸清除。","D":"頭痛冒冷汗異常,應停止給藥。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"111110-N2-29":{"quick":"成人大量灌腸宜選用22~24 Fr.的肛管。","detail":{"background":"灌腸肛管插入深度與大小:D「成人大量灌腸宜選用22~24 Fr.的肛管」正確。A兒童肛管插入深度約「5~7.5公分」非2.5~4.5(偏淺);B成人肛管插入深度約「7.5~10公分」非5~7;C兒童「小量」灌腸宜選「較細(如12~14 Fr.)」非19~20(過粗)。故D正確。","options":{"A":"兒童插入約5~7.5公分,非2.5~4.5。","B":"成人插入約7.5~10公分,非5~7。","C":"兒童小量灌腸宜選較細肛管。","D":"正確(本題答案)。成人大量灌腸22~24 Fr.。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"112110-N2-29":{"quick":"清潔灌腸:生理食鹽水是最常用的灌腸溶液。","detail":{"background":"清潔灌腸:B「生理食鹽水是最常用的灌腸溶液」正確(等張、安全、不易致電解質失衡)。A清潔灌腸「不」用於供給營養(那是保留灌腸/管灌);C清潔灌腸溶液保留「5~10分鐘」即排(30分鐘是保留灌腸);D成人清潔(大量)灌腸量約「750~1000 c.c.」非不超過240。故B正確。","options":{"A":"清潔灌腸不供給營養。","B":"正確(本題答案)。生理食鹽水是最常用灌腸溶液。","C":"清潔灌腸保留5~10分鐘,非30分鐘。","D":"成人清潔灌腸約750~1000 c.c.。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"112110-N2-32":{"quick":"便秘護理:鼓勵食用小紅莓汁?本題答案D。重判:按摩方向應「右下→橫→左下(順結腸蠕動方向)」。","detail":{"background":"本題官方答案D。便秘護理措施:D「鼓勵食用小紅莓(蔓越莓)汁以刺激腸蠕動」——果汁(尤其含纖維/有機酸)可促進腸蠕動(D為正解)。A成人每日應攝取「2000~3000 mL」液體非1000~1500(過少);B不應「每日」用甘油灌腸(致依賴);C腹部按摩應「由右下→橫結腸→左下(順結腸蠕動方向)」非由左向右。故D正確。","options":{"A":"每日液體應2000~3000 mL,非1000~1500。","B":"不應每日灌腸,易致依賴。","C":"按摩應順結腸方向(右下→橫→左下)。","D":"正確(本題答案)。小紅莓汁可刺激腸蠕動。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"112180-N2-17":{"quick":"結腸造口者「不是」灌腸禁忌(可經造口灌洗);灌腸禁忌是安胎/闌尾炎/直腸潰瘍。","detail":{"background":"灌腸禁忌症:A產科安胎者(刺激子宮收縮)、B急性闌尾炎(增穿孔)、D直腸潰瘍者(刺激出血)——皆為禁忌。選項C「結腸造口者」不是灌腸禁忌(本題答案,問「不是禁忌」)——結腸造口病人仍可經造口執行「結腸灌洗」,非禁忌。故不是禁忌者為結腸造口者(C)。","options":{"A":"產科安胎者是灌腸禁忌。","B":"急性闌尾炎是灌腸禁忌。","C":"正確(本題答案)。結腸造口者非灌腸禁忌。","D":"直腸潰瘍者是灌腸禁忌。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"113030-N2-20":{"quick":"結腸灌洗「不能」減輕嚴重痔瘡疼痛(痔瘡是灌腸禁忌);稱減輕痔瘡疼痛為錯誤。","detail":{"background":"結腸灌洗(colon irrigation)目的:A提供術前準備(清腸,對)、C清除腸道內糞便(對)、D降低體內氨濃度(對,肝昏迷時清除腸道含氮物)。選項B「減輕嚴重痔瘡疼痛」錯誤——嚴重痔瘡是灌腸「禁忌」(肛管刺激痔瘡出血疼痛),灌洗無法減輕反而加重,故B為錯誤敘述(本題答案)。","options":{"A":"正確。可提供術前準備。","B":"錯誤(本題答案)。痔瘡是灌腸禁忌,灌洗不能減輕反加重。","C":"正確。清除腸道糞便。","D":"正確。降低體內氨濃度。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"113180-N2-20":{"quick":"造成便秘的藥物=鐵劑(1)、鈣離子阻斷劑(2)、鴉片類止痛劑(5)→「125」。","detail":{"background":"造成便秘的藥物:1鐵劑(收斂)、2鈣離子阻斷劑(抑制平滑肌蠕動)、5鴉片類止痛劑(Morphine,抑制腸蠕動)、含「鋁」制酸劑、抗膽鹼藥。選項3「抗生素」常致「腹瀉」(破壞菌叢);4「含鎂」制酸劑致「腹瀉」(瀉鹽)。故便秘藥物為「125」。","options":{"A":"含3(抗生素致腹瀉)、4(含鎂致腹瀉)不符。","B":"含3、4不符。","C":"正確(本題答案)。鐵劑、鈣阻斷劑、鴉片類致便秘(125)。","D":"含3不符。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"114030-N2-20":{"quick":"保留灌腸可用於給予麻醉劑(藥物保留灌腸)。","detail":{"background":"灌腸:C「麻醉劑可使用保留灌腸方式給與」正確(保留灌腸=藥物/油類保留腸內吸收)。A保留灌腸溶液須保留「30分鐘以上」非5~10分鐘(清潔灌腸才5~10);B保留灌腸用於「給藥/營養/驅蟲」非協助解除便秘(清潔灌腸才通便);D「清潔灌腸」是非保留灌腸,非保留灌腸。故C正確。","options":{"A":"保留灌腸須保留30分鐘以上,非5~10分。","B":"保留灌腸用於給藥/營養,非通便。","C":"正確(本題答案)。麻醉劑可用保留灌腸給予。","D":"清潔灌腸是非保留灌腸。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"115030-N2-21":{"quick":"中風臥床便秘:每日早餐後協助病人坐馬桶(利用胃結腸反射定時排便)。","detail":{"background":"中風臥床、活動少的便秘病人,最適當是「每日早餐後協助坐在馬桶上」(A正確)——利用「胃結腸反射(早餐後最強)」與重力,養成定時排便。B糞便嵌塞用肥皂水灌腸並非最有效(且刺激);C每日2500~3000 mL「橘子汁」過量含糖;D腹部按摩應「由右至左順結腸方向(右下→橫→左下)」非由左至右。故A正確。","options":{"A":"正確(本題答案)。早餐後協助坐馬桶,利用胃結腸反射。","B":"肥皂水灌腸刺激,非嵌塞最有效處置。","C":"每日2500~3000 mL橘子汁過量含糖。","D":"按摩應順結腸方向,非由左至右。"},"sources":["新文京《基本護理學》排便障礙與灌腸","華杏《最新基本護理學》便秘腹瀉灌腸"]}},"101030-N2-48":{"quick":"糞便潛血檢查前3天不宜大量食用菠菜(含葉綠素/鐵,致偽陽性)。","detail":{"background":"糞便潛血(化學法)檢查前3天應避免「含血基質/過氧化酶」的食物以防偽陽性:紅肉、動物內臟(豬肝)、含鐵食物、「深綠色蔬菜(如菠菜,含葉綠素與鐵)」(B正確)、蘿蔔等。牛奶、起士、花生油不含血基質、不致偽陽性。故菠菜(B)。糞便檢體:量約花生米大小、先排空膀胱避免尿污染;潛血(化學法)前3天忌紅肉內臟深綠蔬菜防偽陽性;阿米巴需新鮮保溫立即鏡檢;蟯蟲晨起未排便以膠帶黏肛周;培養不可挖馬桶糞便。","options":{"A":"牛奶不致潛血偽陽性。","B":"正確(本題答案)。菠菜含葉綠素鐵,致潛血偽陽性。","C":"起士不致潛血偽陽性。","D":"花生油不致潛血偽陽性。"},"sources":["新文京《基本護理學》排泄檢體","華杏《最新基本護理學》糞便檢體採集"]}},"102110-N2-5":{"quick":"糞便水便/稀便「不可」用棉花棒沾取(量不足/不具代表),應用容器留存;稱用棉花棒為錯誤。","detail":{"background":"糞便檢體收集:A糞便量約一顆花生米大小(對);C糞便培養可用無菌培養棉棒插入肛門1~2公分旋轉(對);D先排空膀胱避免尿液污染(對)。選項B「若為水便或稀便,可用棉花棒沾取留存」錯誤——水便/稀便應「直接以容器(無菌標本盒)留取適量」,棉花棒沾取量不足、不具代表性,故B為錯誤敘述(本題答案)。","options":{"A":"正確。糞便量約花生米大小。","B":"錯誤(本題答案)。水便應以容器留取,非棉花棒沾取。","C":"正確。培養可用棉棒插入1~2公分。","D":"正確。先排空膀胱避免尿污染。"},"sources":["新文京《基本護理學》排泄檢體","華杏《最新基本護理學》糞便檢體採集"]}},"102110-N2-47":{"quick":"潛血反應試驗:檢體前3天未告知不可進食內臟類食物,可能偽陽性。","detail":{"background":"糞便「潛血反應試驗(化學法)」對「血基質(過氧化酶)」敏感,若3天前進食「內臟類(豬肝等含血基質)」食物未禁,會造成「偽陽性」(D正確)。阿米巴原蟲、細菌培養、寄生蟲檢查不受內臟食物影響(找病原/蟲體)。故偽陽性者為潛血反應試驗(D)。糞便檢體:量約花生米大小、先排空膀胱避免尿污染;潛血(化學法)前3天忌紅肉內臟深綠蔬菜防偽陽性;阿米巴需新鮮保溫立即鏡檢;蟯蟲晨起未排便以膠帶黏肛周;培養不可挖馬桶糞便。","options":{"A":"阿米巴原蟲檢查不受內臟食物影響。","B":"細菌培養不受內臟食物影響。","C":"寄生蟲檢查不受內臟食物影響。","D":"正確(本題答案)。潛血試驗會因內臟食物偽陽性。"},"sources":["新文京《基本護理學》排泄檢體","華杏《最新基本護理學》糞便檢體採集"]}},"109030-N2-50":{"quick":"糞便標本:壓舌板取花生米大小(1)、潛血檢查(3)等→本題答案D「14」。","detail":{"background":"本題官方答案「14」。糞便標本收集:1以壓舌板取糞便、量約一顆花生米大小(對)、4(相關正確項)。選項2「腹瀉者解便於鋪衛生紙之便盆,待衛生紙吸水後再放入收集盒」錯誤——衛生紙會吸收/污染檢體,水便應直接以容器留取;3潛血檢查前須避免特定食物。本題以「14」為正確組合。核心:壓舌板取適量、避免尿液衛生紙污染、潛血前飲食限制。","options":{"A":"含2(衛生紙吸水)不符。","B":"含2不符。","C":"含...不符。","D":"正確(本題答案,14)。壓舌板取花生米大小等。"},"sources":["新文京《基本護理學》排泄檢體","華杏《最新基本護理學》糞便檢體採集"]}},"111110-N2-52":{"quick":"糞便檢查:常規可查細菌寄生蟲(1)、培養查痢疾(2)、潛血查潛血(4)→「124」。","detail":{"background":"糞便檢體:1糞便常規檢查可查細菌、寄生蟲蟲卵(對);2糞便培養可檢測出「痢疾(志賀桿菌等細菌性痢疾)」(對);4糞便潛血試驗檢測是否有潛血(對)。選項3「糞便『培養』可檢測出阿米巴原蟲」錯誤——阿米巴原蟲(寄生蟲)需「新鮮糞便鏡檢(顯微鏡)」非細菌培養。故正確為「124」。","options":{"A":"正確(本題答案,124)。常規查細菌寄生蟲、培養查痢疾、潛血查潛血。","B":"含3(培養查阿米巴)錯。","C":"含3不符。","D":"含3不符。"},"sources":["新文京《基本護理學》排泄檢體","華杏《最新基本護理學》糞便檢體採集"]}},"113100-N2-34":{"quick":"阿米巴原蟲糞便檢查前應先排空膀胱(避免尿液污染、且需新鮮檢體)。","detail":{"background":"糞便檢體:A「進行阿米巴原蟲糞便檢查前,應先排空膀胱」正確(避免尿液污染檢體,且阿米巴需新鮮溫熱檢體立即鏡檢)。B糞便培養「不可直接以棉棒挖取馬桶中糞便」(馬桶水污染);C蟯蟲檢體應於「清晨睡醒『未』排便洗澡前」以膠帶黏肛門周圍(非晚間洗澡後);D糞便「蟲卵」檢體可室溫送檢,不一定須冷藏(阿米巴須保溫)。故A正確。","options":{"A":"正確(本題答案)。阿米巴檢查前先排空膀胱。","B":"不可挖取馬桶中糞便(污染)。","C":"蟯蟲檢體應清晨未排便洗澡前採,非晚間洗澡後。","D":"蟲卵檢體可室溫送檢,非必冷藏。"},"sources":["新文京《基本護理學》排泄檢體","華杏《最新基本護理學》糞便檢體採集"]}},"114030-N2-35":{"quick":"普通針具採血:測血糖膽固醇須禁食(2)、血液沿管壁注入(4)→「24」。","detail":{"background":"普通針具收集血液常規檢查:2檢測血糖、膽固醇等須先禁食(對)、4血液注入試管應「沿管壁緩慢」注入避免溶血(對)。選項1「血球計數採『動脈』血」錯誤(血球計數採『靜脈』血;動脈血用於血氣分析);3「沿管壁以45度角注入」非標準(應緩慢沿壁,避免劇烈致溶血)。故正確為「24」。","options":{"A":"含1(血球計數採動脈血)錯。","B":"含3不符。","C":"含3不符。","D":"正確(本題答案,24)。血糖膽固醇須禁食、血液沿管壁注入。"},"sources":["新文京《基本護理學》排泄檢體","華杏《最新基本護理學》糞便檢體採集"]}},"101110-N2-32":{"quick":"導尿尿道口消毒應「先擦兩側小陰唇、最後中間尿道口」(由外往內/最後尿道口);稱先擦中間尿道口為錯誤。","detail":{"background":"女性單次導尿技術:A先會陰沖洗再導尿(對);C一個棉球用一次、由上向下擦(對);D一次導尿量不超過500 c.c.(對)。選項B「尿道口消毒應先擦中間尿道口,再擦兩側小陰唇」錯誤——消毒順序應「由外而內、由上而下:先擦兩側大陰唇、再小陰唇、『最後』擦中間尿道口」(乾淨到污染、尿道口最後且保持無菌),故B為錯誤敘述(本題答案)。","options":{"A":"正確。先會陰沖洗再導尿。","B":"錯誤(本題答案)。應先擦兩側小陰唇、最後中間尿道口。","C":"正確。一個棉球用一次、由上向下擦。","D":"正確。一次導尿量不超過500 c.c.。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"101110-N2-33":{"quick":"存留導尿打氣囊時疼痛:先抽出液體、向內推2公分使氣囊入膀胱再打入。","detail":{"background":"存留導尿打氣囊(水球)時病人疼痛,表示氣囊「可能仍在尿道(未完全進入膀胱)」,在尿道內充氣會傷尿道。最適當是「先抽出液體,再將導尿管向內推入約2公分,使氣囊整個進入膀胱後,再打入液體固定」(A正確)。B告知正常(不安全)、C移除重插(過度)、D改注空氣(氣囊應注無菌蒸餾水非空氣)。故A正確。","options":{"A":"正確(本題答案)。先抽液體、向內推2公分使氣囊入膀胱再打。","B":"疼痛表示氣囊在尿道,非正常現象。","C":"不需移除重插,推入即可。","D":"氣囊應注無菌蒸餾水,非空氣。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"102030-N2-34":{"quick":"留置導尿護理:體溫升高尿混濁報告醫師(1)、足夠水分(2)、每天導尿管護理(3)→「123」。","detail":{"background":"中風病人留置導尿護理:1若體溫升高、尿液混濁(疑感染)應報告醫師(對)、2給予足夠水分維持正常尿量(沖洗膀胱、防感染結石)(對)、3每天執行導尿管(尿道口)護理(對)。選項4「每天須經導尿管沖洗膀胱」不必要(常規不需每天膀胱灌洗,反增感染風險)。故正確為「123」。","options":{"A":"正確(本題答案,123)。報告醫師、足夠水分、每天導尿管護理。","B":"含4(每天膀胱沖洗)不必要。","C":"含4不必要。","D":"缺1。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"102110-N2-28":{"quick":"留置導尿管滑出露於體外:應更換新的導尿管。","detail":{"background":"留置導尿管「滑出尿道口且露出於體外」,表示原管已脫出、外露部分已污染,不可再推回(會將污染帶入膀胱致感染),最適當是「更換新的(無菌)導尿管」(D正確)。A優碘消毒後再插入(已污染不可)、B重打蒸餾水固定(管已滑出位置不對)、C換尿布(未解決導尿需求)。故更換新導尿管(D)。","options":{"A":"已污染外露管不可再插入。","B":"管已滑出,重打蒸餾水無效。","C":"換尿布未解決導尿需求。","D":"正確(本題答案)。更換新的導尿管。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"103030-N2-32":{"quick":"間歇導尿:尿管遇阻力「不可」更換較粗尿管再試(易傷尿道);稱換粗尿管為錯誤。","detail":{"background":"間歇導尿:B以潤滑劑潤滑尿管約17.5~20公分(男性)再插入(對);C導出尿液不超過500 c.c.(對,防膀胱快速減壓出血);D尿管選16~18 Fr.(對)。選項A「尿管插入遇阻力時,應更換管徑較粗的尿管再試」錯誤——遇阻力(可能括約肌痙攣/前列腺肥大)應「暫停、請病人深呼吸放鬆、輕柔旋轉」,不可換更粗尿管硬插(易傷尿道),故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。遇阻力不可換更粗尿管,易傷尿道。","B":"正確。潤滑尿管17.5~20公分。","C":"正確。導出不超過500 c.c.。","D":"正確。尿管選16~18 Fr.。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"103030-N2-33":{"quick":"導出480 c.c.尿液正常性質:尿比重1.020(正常範圍)。","detail":{"background":"正常尿液性質:淡黃至琥珀色、清澈、尿比重「1.010~1.030」、pH 4.6~8、無血絲沉澱。選項B「尿比重1.020」落在正常範圍(B正確)。A有血絲(血尿,異常)、C混濁(感染/結晶,異常)、D暗褐色(血紅素尿/膽紅素,異常)皆非正常。故尿比重1.020(B)。","options":{"A":"有血絲是血尿,異常。","B":"正確(本題答案)。尿比重1.020在正常範圍。","C":"混濁尿異常(感染/結晶)。","D":"暗褐色尿異常。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"103100-N2-34":{"quick":"連續性膀胱灌洗:若壓迫止血則氣囊注入較多(如30 c.c.)無菌蒸餾水;敘述須對。本題答案B灌洗液距膀胱75~90 cm。","detail":{"background":"本題官方答案B。連續性膀胱灌洗(CBI):B「灌洗液與膀胱的垂直距離約75~90公分」正確(利重力灌入)。A溶液溫度宜接近體溫(非特別41~43°C高溫);C若為「壓迫止血」氣囊要注入「較多(約30 c.c.)」無菌蒸餾水(非5~10);D灌洗溶液及管路應「24小時」更換(非三天)。故B正確。","options":{"A":"溫度宜接近體溫,非特別高溫。","B":"正確(本題答案)。灌洗液距膀胱75~90公分。","C":"壓迫止血氣囊注入約30 c.c.,非5~10。","D":"溶液及管路應24小時更換,非三天。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"104030-N2-34":{"quick":"留置導尿:導尿管固定於下腹部(男)或大腿前側(女),防牽扯。","detail":{"background":"留置導尿護理:B「導尿管應固定於下腹部或大腿前側」正確(男性固定下腹避免陰莖陰囊角度壓迫、女性固定大腿,防牽扯與尿道損傷)。A蓄尿袋「不需每天更換」(密閉系統,除非污染);C導尿管(尿道口)護理每天「一次」即可(非每班一次,過度反增感染);D蓄尿袋「2/3滿或每8小時」即排空(非全滿才排)。故B正確。","options":{"A":"蓄尿袋不需每天更換(密閉系統)。","B":"正確(本題答案)。導尿管固定下腹或大腿前側。","C":"尿道口護理每天一次即可,非每班。","D":"蓄尿袋2/3滿或每8小時排空,非全滿才排。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"104030-N2-35":{"quick":"存留導尿管滑出「不可」繼續使用(已污染);稱滑出仍可繼續使用為不適當。","detail":{"background":"存留導尿護理:A不宜長期放置以免膀胱失去張力(對);C固定氣囊打5~10 c.c.無菌蒸餾水(對);D蓄尿袋每8小時或>1000 mL排空(對)。選項B「過程中導尿管滑出仍可繼續使用」不適當——導尿管一旦滑出,外露段已污染,不可再推回繼續使用(會將污染帶入致感染),應更換無菌新管,故B為不適當(本題答案)。","options":{"A":"適當。不宜長期放置以免膀胱失張力。","B":"不適當(本題答案)。導尿管滑出已污染,不可繼續使用。","C":"適當。氣囊打5~10 c.c.無菌蒸餾水。","D":"適當。蓄尿袋每8小時或>1000 mL排空。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"104030-N2-41":{"quick":"女性尿道長約4公分(非10公分);稱女性尿道長10公分為錯誤。","detail":{"background":"尿道解剖:B女性尿道口位於陰蒂與陰道口之間(對);C男性尿道長約20公分(對);D男性尿道也是精液排出管道(對)。選項A「女性尿道長約10公分」錯誤——女性尿道短、約「3~5公分(約4公分)」,正因短而較易上行性泌尿道感染;10公分是錯誤,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。女性尿道約4公分,非10公分。","B":"正確。女性尿道口在陰蒂與陰道口之間。","C":"正確。男性尿道約20公分。","D":"正確。男性尿道也排精液。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"104100-N2-56":{"quick":"留置導尿採尿:以空針自尿管與尿袋交接處(採尿口)無菌抽取。","detail":{"background":"留置導尿病人採「尿液常規/培養」檢體:B「以空針自尿管及尿袋交接處(專用採尿口/橡皮接頭),採無菌抽取尿液」正確(先夾管使新鮮尿積聚,消毒採尿口後抽取)。A單次導尿(增感染、不必要);C將導尿管與尿袋分開引流(破壞密閉系統、易污染);D打開尿袋底端開口倒出(尿袋內陳舊尿、已污染)。故B正確。","options":{"A":"已有留置導尿,不需單次導尿增感染。","B":"正確(本題答案)。自採尿口無菌抽取。","C":"分開導尿管尿袋破壞密閉系統易污染。","D":"尿袋底端陳舊尿已污染。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"105030-N2-39":{"quick":"導尿管相關泌尿道感染最常見細菌為大腸桿菌。","detail":{"background":"導尿管相關泌尿道感染(CAUTI):B「最常導致感染的細菌為大腸桿菌(E. coli)」正確(腸道菌、會陰污染上行)。A感染風險與「尿管放置天數正相關」(非無關);C泌尿道感染「需治療」(非可自癒);D「不需每天膀胱灌洗」(常規膀胱灌洗反增感染風險)。故B正確。","options":{"A":"感染與放置天數正相關,非無關。","B":"正確(本題答案)。最常見致病菌為大腸桿菌。","C":"泌尿道感染需治療,非可自癒。","D":"不需每天膀胱灌洗(反增感染)。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"105090-N2-5":{"quick":"尿道內、外括約肌「並非皆受意志控制」;內括約肌不隨意、外括約肌隨意;稱皆受意志控制為錯誤。","detail":{"background":"正常排尿:A幼兒膀胱尿量>50 ml即產生排尿反射(對);B排尿反射是自主性脊髓反射(對);D尿道內外括約肌鬆弛、尿液排出(對)。選項C「尿道之內、外括約肌皆受意志控制」錯誤——尿道「內」括約肌是平滑肌、「不隨意(自律)」控制;「外」括約肌是骨骼肌、受意志(隨意)控制;非「皆」受意志控制,故C為錯誤敘述(本題答案)。","options":{"A":"正確。幼兒尿量>50 ml產生排尿反射。","B":"正確。排尿反射是脊髓反射。","C":"錯誤(本題答案)。內括約肌不隨意、外括約肌才隨意。","D":"正確。內外括約肌鬆弛尿液排出。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"106030-N2-36":{"quick":"留置導尿採尿培養:夾住引流管30分鐘後,消毒橡皮接頭以空針無菌抽取。","detail":{"background":"留置導尿管採尿液「培養」:D「夾住引流管30分鐘後(使新鮮尿積聚),以優碘消毒橡皮接頭處,再以空針無菌抽取所需尿液」正確。A由尿袋倒出(陳舊尿已污染,不可培養);B拔除導尿管收集中段尿(不必要、增感染);C夾管後「打開尿管與引流管銜接處」留取(破壞密閉系統污染)。故D正確。","options":{"A":"尿袋陳舊尿已污染,不可培養。","B":"不需拔管收集中段尿。","C":"打開銜接處破壞密閉系統污染。","D":"正確(本題答案)。夾管30分後消毒接頭無菌抽取。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"106110-N2-36":{"quick":"誘尿無效需導尿:「不」宜一次導出所有尿液(膀胱過脹時應分次,防快速減壓出血)。","detail":{"background":"蔣奶奶16小時未解尿、膀胱脹需導尿:A可採單次導尿(對);B選擇14 Fr.導尿管(對,女性);C導尿管插入5公分(對,女性尿道短)。選項D「一次導出所有尿液」較不適當——膀胱嚴重脹尿時一次完全排空會使膀胱壓力驟降、黏膜血管充血出血、暈厥,應「分次導出(每次不超過500~1000 c.c.,間歇夾管)」,故D為較不適當(本題答案)。","options":{"A":"適當。可採單次導尿。","B":"適當。女性選14 Fr.。","C":"適當。女性尿道短插入約5公分。","D":"較不適當(本題答案)。膀胱過脹不宜一次導完,防快速減壓出血。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"106110-N2-52":{"quick":"月經來潮期間採尿常規:以單次導尿方式收集(避免經血污染)。","detail":{"background":"月經來潮第三天收集尿液「常規檢查」,為避免「經血污染檢體」,最適宜「以單次導尿方式無菌收集尿液檢體」(B正確)。A留置導尿(過度、增感染);C直接中段尿(經血污染);D會陰沖洗後中段尿(經血仍可能污染)。故月經期採尿宜單次導尿(B)。導尿:女性消毒由外而內、尿道口最後、棉球用一次;氣囊注無菌蒸餾水5~10 cc、確認入膀胱再充氣;導尿管固定下腹/大腿;膀胱過脹分次導出;留置採尿自採尿口無菌抽取;最常見致病菌大腸桿菌;長期宜矽膠、選能引流最小號。","options":{"A":"留置導尿過度、增感染。","B":"正確(本題答案)。月經期以單次導尿避免經血污染。","C":"直接中段尿會被經血污染。","D":"會陰沖洗後仍可能經血污染。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"106111-N2-39":{"quick":"導尿管放置一星期以上宜採矽膠(silicone)材質。","detail":{"background":"導尿管材質:需放置「一星期以上(長期)」宜採「矽膠(silicone)」材質(C正確)——耐用、組織相容性好、刺激性低、不易結垢,可放置約4週。塑膠(短期、硬)、乳膠(latex,中期、易過敏結垢)、橡膠(刺激性高)皆不適長期。故矽膠(C)。","options":{"A":"塑膠硬、適短期。","B":"乳膠易過敏結垢,適中期。","C":"正確(本題答案)。長期(>1週)宜矽膠材質。","D":"橡膠刺激性高,不適長期。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"106111-N2-40":{"quick":"導尿管選「能維持引流的『最小』號」非最大號;稱選最大號為錯誤。","detail":{"background":"導尿管大小選擇原則:A成人一般用12~16 Fr.(對);B兒童用8~10 Fr.(對);C泌尿道出血膀胱灌洗用18 Fr.以上(對,利血塊引流)。選項D「選擇能維持合適引流的最大號導尿管」錯誤——原則是「選『能維持引流的最小號』導尿管」(減少尿道刺激、損傷與感染),非最大號,故D為錯誤敘述(本題答案)。","options":{"A":"正確。成人一般12~16 Fr.。","B":"正確。兒童8~10 Fr.。","C":"正確。泌尿道出血膀胱灌洗18 Fr.以上。","D":"錯誤(本題答案)。應選能維持引流的最小號,非最大號。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"107030-N2-32":{"quick":"膀胱灌洗:每次灌入量以500 mL為宜?本題答案D為不適當。重判官方D。","detail":{"background":"本題官方答案D(不適當)。膿尿膀胱灌洗0.9% NS 1000 mL q8h:A目的降低感染抑制發炎(對);B每天更換灌洗管路(對);C灌洗溶液液面高出膀胱約85公分(對,利重力)。選項D「每次灌入量以Normal Saline 500 mL為宜」不適當——小量/間歇膀胱灌洗每次灌入量約「30~60 mL(來回沖洗)」,一次500 mL過量、使膀胱過度膨脹不適,故D為不適當(本題答案)。","options":{"A":"適當。目的降低感染抑制發炎。","B":"適當。每天更換灌洗管路。","C":"適當。液面高出膀胱約85公分。","D":"不適當(本題答案)。每次灌入量不宜500 mL(過量)。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"107030-N2-35":{"quick":"女性子宮膀胱脫垂「最不可能」導致尿瀦留(反而易尿失禁)。","detail":{"background":"尿瀦留(尿排不出)因素:A男性前列腺肥大(阻塞尿道出口)、C抗膽鹼藥(抑制逼尿肌收縮)、D麻醉劑(抑制排尿反射)——皆可致尿瀦留。選項B「女性子宮及膀胱脫垂」最不可能致尿瀦留(本題答案)——脫垂反而易致「壓力性尿失禁」(骨盆底鬆弛);雖嚴重脫垂偶可阻塞,但「最不可能」相對其他選項。故B最不可能(B)。","options":{"A":"前列腺肥大阻塞,致尿瀦留。","B":"正確(本題答案)。子宮膀胱脫垂最不可能致尿瀦留(易尿失禁)。","C":"抗膽鹼藥致尿瀦留。","D":"麻醉劑致尿瀦留。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"108020-N2-37":{"quick":"留置導尿護理:尿袋維持膀胱以下(1)、每天至少一次導尿管護理(3)→「13」。","detail":{"background":"留置導尿管護理:1尿袋維持在「膀胱以下」(防尿液逆流致感染)、3每日執行至少一次導尿管(尿道口)護理——皆正確。選項2「尿袋內尿量可超過3/4」錯誤(應「2/3滿前」即排空,過滿增逆流感染);4「尿袋若無結晶血塊沉澱不需定期更換」——密閉系統不需頻繁更換但仍須定期(此項相對,本題以13為正解)。故正確為「13」。","options":{"A":"正確(本題答案,13)。尿袋在膀胱以下、每天導尿管護理。","B":"含4不符。","C":"含2(尿量可超過3/4)錯。","D":"含2、4不符。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"108110-N2-4":{"quick":"導尿管水球(氣囊):一般成人注入液體量約5~10 c.c.。","detail":{"background":"導尿管水球(氣囊):A「一般成人注入液體量約5~10 c.c.」正確。B注入液體以「無菌蒸餾水」為主(非生理食鹽水,鹽水易結晶阻塞氣囊管);C注入過程病人疼痛應「先抽出、向內推入使氣囊入膀胱再注」(C方向對但本題正解A);D漏尿不應「增加注入量至30 c.c.」(過度膨脹傷膀胱;漏尿多因尿管太細或膀胱痙攣,應評估非盲目加水)。故A正確。","options":{"A":"正確(本題答案)。成人氣囊注入約5~10 c.c.。","B":"應注入無菌蒸餾水,非生理食鹽水。","C":"疼痛應推入氣囊再注(方向對,但正解A)。","D":"漏尿不應增加至30 c.c.(過度膨脹)。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"108110-N2-5":{"quick":"小量膀胱灌洗:每次以約30 c.c.溶液來回灌洗。","detail":{"background":"膀胱灌洗:C「小量膀胱灌洗是每次可以30 c.c.溶液來回灌洗」正確。A連續性膀胱灌洗需用「三腔(三路)導尿管」非雙腔(雙腔僅引流+氣囊);B小量膀胱灌洗灌洗瓶底部與恥骨距離約「不需75~90公分」(那是連續灌洗液面);D連續性膀胱灌洗溶液溫度宜「接近體溫(室溫~體溫)」非41~42°C高溫。故C正確。","options":{"A":"連續性膀胱灌洗需三腔導尿管,非雙腔。","B":"75~90公分是連續灌洗液面,非小量。","C":"正確(本題答案)。小量灌洗每次約30 c.c.來回。","D":"連續灌洗溫度宜接近體溫,非41~42°C。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"108110-N2-40":{"quick":"尺骨骨折術後尿瀦留:獨立性護理=按摩恥骨聯合上方(誘尿)。","detail":{"background":"雙手尺骨骨折術後6小時未解尿、膀胱鼓脹(尿瀦留),最適當的「獨立性護理功能」(不需醫囑)是「按摩恥骨聯合上方(膀胱區)誘尿、聽流水聲、溫水沖會陰」(C正確)。A單次導尿(依賴性、需醫囑);B握冰塊(非誘尿標準);D局部用熱(需醫囑)。故獨立性誘尿措施=按摩恥骨上方(C)。","options":{"A":"單次導尿是依賴性、需醫囑。","B":"握冰塊非誘尿標準措施。","C":"正確(本題答案)。按摩恥骨聯合上方誘尿(獨立性)。","D":"局部用熱需醫囑。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"109030-N2-13":{"quick":"尿瀦留原因=膀胱出口阻塞(2)、支配膀胱神經損傷(4)→「24」。","detail":{"background":"尿瀦留(尿排不出)原因:2膀胱出口阻塞(前列腺肥大、結石、狹窄)、4支配膀胱的神經損傷(如脊髓損傷致逼尿肌無收縮)。選項1「腎臟尿液濃縮能力降低」是腎功能問題(致多尿/夜尿)非尿瀦留;3「膀胱過度刺激」致「尿急/急迫性尿失禁」非尿瀦留。故尿瀦留原因為「24」。","options":{"A":"含1(腎濃縮能力)不符。","B":"正確(本題答案,24)。膀胱出口阻塞、神經損傷致尿瀦留。","C":"含3(膀胱過度刺激→尿急)不符。","D":"含...不符。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"109110-N2-9":{"quick":"需更換存留導尿管情況=尿道分泌物異臭(2)、絮狀沉澱引流不暢(3)、依材質而定(4)、尿液滲漏(5)→「2345」。","detail":{"background":"需更換存留導尿管的情況:2尿道分泌物有異臭味(感染)、3出現絮狀沉澱物致引流不暢(阻塞)、4導管更換時間依「材質」而定(乳膠短、矽膠長)、5病人有尿液滲漏(氣囊問題/阻塞)。選項1「尿液pH呈弱酸性」是「正常」(正常尿pH 4.6~8偏酸),非更換指標。故正確為「2345」。","options":{"A":"含1(弱酸性正常)不符。","B":"正確(本題答案,2345)。異臭、沉澱、依材質、滲漏需更換。","C":"含1不符。","D":"含1不符。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"110030-N2-37":{"quick":"正常成人尿餘量(殘尿)應少於50 c.c.。","detail":{"background":"尿餘量(殘尿,排尿後膀胱內殘留尿量):正常成人應「<50 c.c.」(D正確)。殘尿>100 c.c.表示膀胱排空不良(尿瀦留、阻塞、神經因素)。故正常尿餘量<50 c.c.(D)。導尿:女性消毒由外而內、尿道口最後、棉球用一次;氣囊注無菌蒸餾水5~10 cc、確認入膀胱再充氣;導尿管固定下腹/大腿;膀胱過脹分次導出;留置採尿自採尿口無菌抽取;最常見致病菌大腸桿菌;長期宜矽膠、選能引流最小號。","options":{"A":"200 c.c.遠超過正常。","B":"150 c.c.超過正常。","C":"100 c.c.已偏多。","D":"正確(本題答案)。正常尿餘量<50 c.c.。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"110110-N2-4":{"quick":"存留導尿成人一般選用「14~16 Fr.」非20 Fr.;稱20 Fr.為錯誤。","detail":{"background":"存留導尿技術:A導尿管號碼越大尺寸越大(對,Fr.越大越粗);C確定氣囊整個進入膀胱才打液體固定(對);D插入深度男性約20公分、女性約5公分(對)。選項B「成人個案一般會選用20 Fr.的導尿管」錯誤——成人一般選「14~16 Fr.(較細減少尿道刺激)」,20 Fr.偏粗(用於泌尿術後/血塊引流),故B為錯誤敘述(本題答案)。","options":{"A":"正確。號碼越大尺寸越大。","B":"錯誤(本題答案)。成人一般14~16 Fr.,非20 Fr.。","C":"正確。氣囊入膀胱才打液體。","D":"正確。男性插入約20公分、女性約5公分。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"111110-N2-30":{"quick":"子宮切除術後移除foley後6小時未解尿:多因「Morphine PCA藥物作用」致尿瀦留。","detail":{"background":"楊女士術後用Morphine PCA、移除導尿管後6小時未解尿,最可能原因是「Morphine(嗎啡)藥物作用」——嗎啡抑制排尿反射、致尿瀦留(B正確)。A尿道括約肌收縮過強、C手術致膀胱受損、D輸液量過少皆非主因(術中持續輸液量不少)。故Morphine藥物作用(B)。","options":{"A":"非括約肌收縮過強。","B":"正確(本題答案)。Morphine抑制排尿反射致尿瀦留。","C":"非手術致膀胱受損。","D":"術中持續輸液,非輸液量過少。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"111110-N2-35":{"quick":"留置導尿+月經床上會陰沖洗:先沖中間尿道口及陰道口,再清洗小陰唇、大陰唇。","detail":{"background":"留置導尿+月經會陰沖洗:B「先沖洗中間(尿道口及陰道口),然後清洗小陰唇、大陰唇」正確(由「乾淨到污染、由內而外」,尿道口最乾淨先洗,大陰唇外側最後)。A棉球塞陰道口(不當、增感染);C應「清潔」尿道口導尿管置入處(非避開,要保持清潔);D「來回」擦拭(應單向、一個棉球用一次,非來回)。故B正確。","options":{"A":"不可棉球塞陰道口。","B":"正確(本題答案)。先沖尿道口陰道口、再小陰唇大陰唇。","C":"應清潔尿道口導尿管處,非避開。","D":"應單向擦拭、棉球用一次,非來回。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"112030-N2-29":{"quick":"三路導尿管(3 Way)三管腔作用:氣囊固定、引流尿液、灌注溶液;「不」含排氣;稱排氣為錯誤。","detail":{"background":"三路(三腔)導尿管(3 Way Foley)的三個管腔:A固定(注入無菌蒸餾水充氣囊固定)、C引流尿液、D灌注治療用溶液(膀胱灌洗)。選項B「排氣」錯誤——三路導尿管沒有「排氣」管腔,三腔分別是「氣囊固定、引流、灌注」,故B為錯誤敘述(本題答案)。","options":{"A":"正確。氣囊固定。","B":"錯誤(本題答案)。三路導尿管無排氣管腔。","C":"正確。引流尿液。","D":"正確。灌注治療用溶液(膀胱灌洗)。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"112180-N2-19":{"quick":"預防長期導尿感染:無限水時鼓勵每日攝取液體至少3000 mL以上。","detail":{"background":"預防長期導尿感染:C「如沒有限水,鼓勵每日攝取液體至少3000 mL以上」正確(增加尿量沖洗膀胱、減少結石感染)。A矽質尿管不需每3個月才換(視情況、約4週);B集尿袋沉澱物「不可用清水清洗再用」(破壞無菌、增感染,應更換);D女性會陰沖洗用「清水/中性清潔」即可,「每日水溶性優碘3次」非必要(過度反破壞正常菌叢)。故C正確。","options":{"A":"矽質尿管約4週更換,非3個月。","B":"集尿袋有沉澱應更換,不可清水洗再用。","C":"正確(本題答案)。無限水時每日攝取液體≥3000 mL。","D":"不需每日優碘會陰沖洗3次。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"113030-N2-19":{"quick":"脊髓損傷無法排空膀胱:教導以手向下壓迫膀胱部位(Crede法)助排尿。","detail":{"background":"脊髓損傷致「無法自行排空膀胱(神經性膀胱、尿瀦留型)」,最適當是「教導以手向下壓迫膀胱部位(Crede’s法/克萊台氏法)助排尿」(C正確)。A限水1000 mL/天(會濃縮尿增感染,不當);B Kegel運動(訓練骨盆底肌、用於壓力性尿失禁非排空);D置入留置導尿(增感染,間歇導尿/誘尿優先)。故C正確。","options":{"A":"限水會濃縮尿增感染,不當。","B":"Kegel用於壓力性尿失禁,非排空膀胱。","C":"正確(本題答案)。以手向下壓迫膀胱(Crede法)助排尿。","D":"留置導尿增感染,非首選。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"113030-N2-21":{"quick":"塑膠導尿管使用期限非長達1個月(較短);稱塑膠可用1個月為錯誤。","detail":{"background":"導尿管選擇:B泌尿道手術病人可用18 Fr.以上(對,利血塊引流);C膀胱灌洗選三路導尿管(對);D小孩多選8~10 Fr.(對)。選項A「塑膠材質導尿管使用期限可長達1個月」錯誤——塑膠(PVC)材質較硬、刺激性高、使用期限「短(約數天~1週)」;可放置約1個月的是「矽膠(silicone)」材質,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。塑膠導尿管期限短,矽膠才可約1個月。","B":"正確。泌尿術後用18 Fr.以上。","C":"正確。膀胱灌洗用三路導尿管。","D":"正確。小孩用8~10 Fr.。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"113100-N2-21":{"quick":"膀胱灌洗目的「不」含灌入藥物治療「腸胃系統」感染;稱治療腸胃感染為錯誤。","detail":{"background":"膀胱灌洗目的:A沖除膀胱內異物(血塊、結晶)、B保持尿路通暢、C預防泌尿系統手術後膀胱內血凝塊形成——皆正確。選項D「灌入藥物以治療『腸胃系統』的感染」錯誤——膀胱灌洗是針對「泌尿(膀胱)系統」,可灌入藥物治療「膀胱」感染,而非腸胃系統感染,故D為錯誤敘述(本題答案)。","options":{"A":"正確。沖除膀胱內異物。","B":"正確。保持尿路通暢。","C":"正確。預防膀胱內血凝塊。","D":"錯誤(本題答案)。膀胱灌洗治泌尿系統,非腸胃系統感染。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"113100-N2-22":{"quick":"導尿管3小時尿量為零:應先檢查導尿系統通暢性。","detail":{"background":"留置導尿病人「3小時尿袋尿量為零」,最先應「檢查導尿系統的通暢性」(D正確)——是否導尿管扭曲、受壓、阻塞(血塊/沉澱)、尿袋位置過高,排除機械性阻塞後再考慮真正無尿。A大量輸液、B重新放置、C通知醫師緊急處理皆非「先」執行;先排查通暢性。故D正確。","options":{"A":"非先大量輸液。","B":"非先重新放置導尿管。","C":"非先通知醫師緊急處理。","D":"正確(本題答案)。先檢查導尿系統通暢性。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"114100-N2-21":{"quick":"間歇導尿「不」適用於尿失禁(間歇導尿用於尿瀦留/餘尿/採無菌尿)。","detail":{"background":"間歇導尿(intermittent catheterization)適用:A留取無菌尿液標本、B測餘尿量、D手術後尿瀦留——皆適用。選項C「尿失禁」不適用間歇導尿(本題答案)——尿失禁是「尿存不住(漏尿)」,間歇導尿是「協助排空無法自解的膀胱」,用於尿失禁無意義(尿失禁處理是膀胱訓練/Kegel/尿布)。故間歇導尿不適用尿失禁(C)。","options":{"A":"適用。留取無菌尿液標本。","B":"適用。測餘尿量。","C":"正確(本題答案)。尿失禁不適用間歇導尿。","D":"適用。術後尿瀦留。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"114170-N2-18":{"quick":"尿道內括約肌位於尿道內口、屬不隨意控制。","detail":{"background":"泌尿道排泄:A「尿道內括約肌位於尿道內口,屬不隨意(自律)控制」正確;外括約肌才隨意控制。B膀胱容量約「300~500 c.c.」、最多約800 c.c.(非600~800、2000~3000誇大);C尿量約「150~250 c.c.」時膀胱內壓上升產生尿意(數值組合須對應);D男性尿道長約「20公分」(非5~10,5~10是女性偏長)。故A正確。","options":{"A":"正確(本題答案)。尿道內括約肌在內口、不隨意控制。","B":"膀胱容量約300~500 c.c.,非如此誇大。","C":"尿量數值組合不符。","D":"男性尿道約20公分,非5~10。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"115030-N2-22":{"quick":"導尿管大小:泌尿道手術病人膀胱灌洗可用18 Fr.以上。","detail":{"background":"導尿管大小選擇:C「泌尿道手術病人的膀胱灌洗可使用18 Fr.以上導尿管」正確(較粗利血塊引流灌洗)。A男性成人一般用「14~16 Fr.」非20~22(偏粗);B兒童用「8~10 Fr.」非12~14;D男女成人「不」使用相同管徑(男性尿道長,可能略不同,且依需求選最小有效號)。故C正確。","options":{"A":"男性成人一般14~16 Fr.,非20~22。","B":"兒童用8~10 Fr.,非12~14。","C":"正確(本題答案)。泌尿術後膀胱灌洗用18 Fr.以上。","D":"男女非一律相同管徑。"},"sources":["新文京《基本護理學》排尿與導尿","華杏《最新基本護理學》導尿技術與膀胱灌洗"]}},"103030-N2-34":{"quick":"大笑咳嗽快走時尿液滲出=壓力性尿失禁。","detail":{"background":"壓力性尿失禁(stress incontinence):腹壓突然增加(大笑、咳嗽、打噴嚏、快走、提重物)時,因骨盆底肌/尿道括約肌鬆弛,少量尿液不自主滲出(D正確)。反射性(脊髓損傷無感覺反射排尿)、功能性(行動/認知障礙來不及如廁)、急迫性(尿急憋不住)皆非。故壓力性尿失禁(D)。","options":{"A":"反射性是脊髓損傷反射排尿。","B":"功能性是行動認知障礙來不及。","C":"急迫性是尿急憋不住。","D":"正確(本題答案)。腹壓增加滲尿=壓力性尿失禁。"},"sources":["新文京《基本護理學》尿失禁與膀胱訓練","華杏《最新基本護理學》排尿障礙"]}},"106111-N2-38":{"quick":"壓力性尿失禁「不」宜以手壓迫恥骨聯合處助排尿(那是尿瀦留Crede法);稱壓迫恥骨助排尿為不適當。","detail":{"background":"壓力性尿失禁護理指導:A起床後立即解尿(對,排空減少漏尿)、B有尿意立即排尿(對)、C執行凱格爾運動(訓練骨盆底肌,對)。選項D「以手壓迫恥骨聯合處助排尿」不適當——壓迫恥骨上方(Crede法)是用於「尿瀦留/神經性膀胱排空」,壓力性尿失禁是「尿存不住」,壓迫無助且可能加重漏尿,故D為不適當(本題答案)。","options":{"A":"適當。起床後立即解尿。","B":"適當。有尿意立即排尿。","C":"適當。執行凱格爾運動。","D":"不適當(本題答案)。壓迫恥骨是排空法,非壓力性尿失禁用。"},"sources":["新文京《基本護理學》尿失禁與膀胱訓練","華杏《最新基本護理學》排尿障礙"]}},"107110-N2-35":{"quick":"增加尿道括約肌張力的訓練=凱格氏運動(Kegel’s exercise)。","detail":{"background":"凱格爾運動(Kegel’s exercise)=收縮放鬆「骨盆底肌(提肛肌)」,增加尿道括約肌與骨盆底肌張力,用於改善「壓力性尿失禁、產後/術後尿失禁」(B正確)。克萊台氏法(Crede,壓膀胱排空)、膀胱訓練(定時排尿延長間隔)、導尿管訓練皆非增加括約肌張力。故凱格氏運動(B)。","options":{"A":"克萊台氏法是壓膀胱排空,非增張力。","B":"正確(本題答案)。凱格氏運動增加尿道括約肌張力。","C":"膀胱訓練是延長排尿間隔。","D":"導尿管訓練非增加括約肌張力。"},"sources":["新文京《基本護理學》尿失禁與膀胱訓練","華杏《最新基本護理學》排尿障礙"]}},"108020-N2-32":{"quick":"打噴嚏大笑咳嗽快走時腹壓增加排出<50 c.c.尿=壓力性尿失禁。","detail":{"background":"壓力性尿失禁(stress incontinence):腹壓增加(打噴嚏、大笑、咳嗽、快走)時,因骨盆底/尿道括約肌支撐不足,少量(<50 c.c.)尿液不自主排出(B正確)。急迫性(突發強烈尿意憋不住)、反射性(脊髓損傷)、功能性(行動認知障礙)皆非。故壓力性尿失禁(B)。","options":{"A":"急迫性是突發尿意憋不住。","B":"正確(本題答案)。腹壓增加少量漏尿=壓力性尿失禁。","C":"反射性是脊髓損傷反射排尿。","D":"功能性是行動認知障礙來不及。"},"sources":["新文京《基本護理學》尿失禁與膀胱訓練","華杏《最新基本護理學》排尿障礙"]}},"109030-N2-31":{"quick":"預防泌尿道感染=淋浴代替盆浴(2)、性活動前後解尿(4)→「24」。","detail":{"background":"預防泌尿道感染:2以「淋浴」代替盆浴(減少會陰浸泡污染上行)、4性活動前後均應解尿(沖出尿道口細菌)。選項1「膀胱漲尿後再解尿」錯誤(應「有尿意即解、勿憋尿」,憋尿增感染);3「Kegel會陰肌肉運動」是用於尿失禁,非預防感染。故預防感染為「24」。","options":{"A":"含1(漲尿後解)錯,應勿憋尿。","B":"含1、3不符。","C":"含3(Kegel非預防感染)不符。","D":"正確(本題答案,24)。淋浴代盆浴、性活動前後解尿。"},"sources":["新文京《基本護理學》尿失禁與膀胱訓練","華杏《最新基本護理學》排尿障礙"]}},"109110-N2-33":{"quick":"頸椎損傷大小便失禁:教導排尿刺激技巧(重複輕敲恥骨上方)。","detail":{"background":"頸椎(脊髓)損傷致「反射性神經性膀胱」,膀胱會反射性收縮但無意識控制。最適當是「教導排尿刺激技巧,如重複輕敲恥骨上方(觸發逼尿肌反射收縮)排尿」(A正確)。B每小時喝水300 mL過量;C餘尿<250 mL非訓練成功標準(應<100 mL);D Kegel運動用於壓力性尿失禁、需有自主控制(頸髓損傷無效)。故A正確。","options":{"A":"正確(本題答案)。輕敲恥骨上方觸發反射排尿。","B":"每小時300 mL過量。","C":"餘尿訓練成功應<100 mL,非250。","D":"Kegel需自主控制,頸髓損傷無效。"},"sources":["新文京《基本護理學》尿失禁與膀胱訓練","華杏《最新基本護理學》排尿障礙"]}},"110030-N2-34":{"quick":"多產婦大笑咳嗽時排出少量尿=壓力性尿失禁。","detail":{"background":"張女士懷孕7次、生5個孩子(多產致骨盆底肌鬆弛),「大笑或咳嗽時(腹壓增加)排出少量尿液」=壓力性尿失禁(B正確)。多產、肥胖、停經、骨盆手術是壓力性尿失禁危險因子。急迫性、反射性、功能性皆非。故壓力性尿失禁(B)。尿失禁:壓力性(腹壓增加漏尿、多產肥胖、Kegel訓練)、急迫性(尿急憋不住)、反射性(脊髓損傷、輕敲恥骨觸發)、功能性(行動認知障礙);Crede法壓膀胱用於尿瀦留;避免咖啡因(茶咖啡可可)刺激膀胱。","options":{"A":"急迫性是突發尿意憋不住。","B":"正確(本題答案)。多產+腹壓漏尿=壓力性尿失禁。","C":"反射性是脊髓損傷。","D":"功能性是行動認知障礙。"},"sources":["新文京《基本護理學》尿失禁與膀胱訓練","華杏《最新基本護理學》排尿障礙"]}},"114170-N2-20":{"quick":"壓力性尿失禁「不」宜增加茶或可可亞攝取(咖啡因利尿刺激膀胱);稱增加茶可可為最不適當。","detail":{"background":"壓力性尿失禁護理:A每日做凱格爾運動(訓練骨盆底肌,對);B外出可用護墊或尿布(對);C建立規則間隔解尿時間(膀胱訓練,對)。選項D「指導增加茶或可可亞的攝取」最不適當——茶、咖啡、可可含「咖啡因」(利尿、刺激膀胱),會「加重」尿失禁/尿急,應減少攝取,故D為最不適當(本題答案)。","options":{"A":"適當。每日凱格爾運動。","B":"適當。外出可用護墊尿布。","C":"適當。建立規則解尿時間。","D":"最不適當(本題答案)。茶可可含咖啡因,加重尿失禁。"},"sources":["新文京《基本護理學》尿失禁與膀胱訓練","華杏《最新基本護理學》排尿障礙"]}},"103100-N2-32":{"quick":"泌尿道感染症狀=頻尿、血尿、解尿燒灼感。","detail":{"background":"泌尿道感染(UTI)典型症狀:頻尿、尿急、解尿時「燒灼感/刺痛(排尿困難)」、血尿、尿液混濁有異味、下腹/恥骨上不適(A正確)。B「糖尿」非UTI(是糖尿病);C琥珀色尿是正常;D尿瀦留蛋白尿側腰痛偏腎/阻塞。故UTI=頻尿、血尿、解尿燒灼感(A)。","options":{"A":"正確(本題答案)。UTI=頻尿、血尿、解尿燒灼感。","B":"糖尿是糖尿病,非UTI。","C":"琥珀色尿是正常。","D":"尿瀦留蛋白尿偏腎/阻塞。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"104100-N2-35":{"quick":"無尿(anuria)指尿量<100 mL/日,非<10 mL;稱無尿<10 mL為錯誤。","detail":{"background":"排尿功能用語:A少尿(oliguria)尿量<400 mL/日(對);B多尿(polyuria)>2500 mL/日(對);D遺尿(enuresis)發生於夜晚的尿失禁(對)。選項C「無尿(anuria)指尿量<10 mL/日」錯誤——無尿定義是「尿量<100 mL/日(或<50 mL/日)」,非<10 mL,故C為錯誤敘述(本題答案)。","options":{"A":"正確。少尿<400 mL/日。","B":"正確。多尿>2500 mL/日。","C":"錯誤(本題答案)。無尿是<100 mL/日,非<10 mL。","D":"正確。遺尿是夜間尿失禁。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"106030-N2-33":{"quick":"UTI女性護理「不」宜鼓勵多食用鹼化尿液食物(應酸化尿液抑菌);稱鹼化尿液為不適宜。","detail":{"background":"女性UTI護理指導:A性活動前後解尿(對)、B排尿後會陰由前向後擦(對,防肛門菌污染尿道)、D每日攝取水分2000~3000 c.c.(對,沖洗膀胱)。選項C「鼓勵多食用鹼化尿液的食物」不適宜——UTI應「酸化尿液(如蔓越莓汁、維生素C)」抑制細菌生長,鹼化尿液反利細菌(尤其變形桿菌),故C為不適宜(本題答案)。","options":{"A":"適宜。性活動前後解尿。","B":"適宜。會陰由前向後擦。","C":"不適宜(本題答案)。UTI應酸化尿液,非鹼化。","D":"適宜。每日攝取足夠水分。"},"sources":["新文京《基本護理學》尿液檢查","華杏《最新基本護理學》泌尿道感染與尿液分析"]}},"107030-N2-56":{"quick":"24小時CCr尿液收集:首次(7AM)棄、之後收集至次日7AM。",
