」一系列接種,可有效防止發病。其基因體為「負股RNA」(非環狀DNA);宿主「不只犬類」(蝙蝠、浣熊、狐、貓等多種哺乳類);病毒「會在肌肉細胞複製」。故B最適當。","options":{"A":"病毒會先在肌肉細胞複製—錯誤。","B":"咬傷後立即施打免疫球蛋白加疫苗可有效預防—正解。","C":"基因體為負股RNA、非環狀DNA—錯誤。","D":"宿主不只犬類(多種哺乳類)—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-12":{"quick":"C型肝炎病毒目前無疫苗,但可用DAA抗病毒藥治癒。","detail":{"background":"肝炎病毒疫苗與治療現況:①HAV、HBV「有疫苗」可預防(HBV疫苗亦可防HDV);②「C型肝炎病毒(HCV)目前『尚無疫苗』」(因病毒高度變異),但「直接抗病毒藥(DAA,如sofosbuvir/ledipasvir等組合)」已可在數週療程內「治癒(清除病毒)」,治癒率達95%以上;③HDV依賴HBV,可藉HBV疫苗間接預防。故「無疫苗但可抗病毒藥治癒」者為HCV。","options":{"A":"HAV有疫苗。","B":"HBV有疫苗。","C":"HCV無疫苗但DAA可治癒—正解。","D":"HDV可藉HBV疫苗間接預防。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-13":{"quick":"神經氨酸酶(NA)是oseltamivir的標的;amantadine抑制的是M2,「NA為amantadine抑制對象」錯誤。","detail":{"background":"流感神經氨酸酶(neuraminidase, NA):①為「酵素」,切斷子代病毒與宿主細胞表面唾液酸的連結,「幫助病毒離開宿主細胞」並擴散;②A型流感的NA有「多種亞型(N1-N9)」(與HA組合命名如H1N1、H3N2);③在病毒「外套膜上形成四聚體(tetramer)」(蘑菇狀);④是「神經氨酸酶抑制劑(oseltamivir、zanamivir)」的標的。「金剛烷胺(amantadine)」抑制的是「M2質子通道」而非NA。故「NA為amantadine主要抑制對象」錯誤。","options":{"A":"NA為酵素、幫助病毒離開細胞,正確。","B":"A型流感NA有多種亞型,正確。","C":"amantadine抑制M2而非NA—錯誤(正解)。","D":"NA在套膜上形成四聚體,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-14":{"quick":"輪狀病毒被蛋白酶部分裂解形成的ISVP「感染力增強」,「不具感染力」最不適當。","detail":{"background":"輪狀病毒(rotavirus,呼腸孤病毒科):①基因體為「分段(11段)的雙股RNA(dsRNA)」;②有三層蛋白衣殼、「無套膜」,對「腸胃道環境(酸、膽鹽)耐受性高」;③外層蛋白VP4被腸道「蛋白酶(如胰蛋白酶)部分裂解」後,形成「中間亞病毒顆粒(ISVP)」,此活化反而「增強病毒對腸上皮的感染/穿入能力」;④是嬰幼兒「嚴重水樣腹瀉與脫水」的主因,有口服活疫苗可預防。故「ISVP不具感染力」與其增強感染的事實相反,最不適當。","options":{"A":"輪狀病毒為雙股RNA病毒,正確。","B":"蛋白酶裂解形成的ISVP感染力增強、非不具感染力—錯誤(正解)。","C":"基因體由多段RNA組成,正確。","D":"對腸胃道環境耐受性高,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-15":{"quick":"麻疹紅疹由T細胞攻擊受感染上皮細胞所致,最為適當。","detail":{"background":"麻疹(measles)由「麻疹病毒(副黏液病毒科Paramyxovirus,『單一條(非分段)』單股負股RNA、有套膜,只有『一種血清型』)」引起。其全身「斑丘疹(maculopapular rash)」並非病毒直接破壞,而是「宿主T細胞(細胞媒介免疫)攻擊受病毒感染的血管內皮/上皮細胞」所造成的免疫反應(故免疫缺乏者可能不出疹但病情更重)。前驅期有Koplik斑、畏光、咳嗽鼻炎結膜炎。注意:麻疹屬「副黏液(paramyxo)」而非正黏液/Myxovirus,基因「非八段」(八段是流感),「單一血清型」。故D最適當。","options":{"A":"麻疹屬副黏液病毒(paramyxo)、非Myxovirus—不適當。","B":"麻疹基因為單一條RNA、非八段(八段為流感)—錯誤。","C":"麻疹只有單一血清型—錯誤。","D":"紅疹由T細胞攻擊受感染上皮所致—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-16":{"quick":"茲卡病毒為「正股(+)RNA」病毒,「負股RNA」最不適當。","detail":{"background":"茲卡病毒(Zika virus)屬「黃病毒科(Flaviviridae)」,為「正股(+)單股RNA、有套膜」病毒。傳播:主要經「埃及斑蚊」叮咬,但「也可不需蚊媒直接人傳人」——經「性接觸、母嬰(經胎盤)、輸血」傳播;猴子等為其宿主之一。臨床多為輕症,但「孕婦感染可致胎兒小頭症(microcephaly)」與其他先天缺陷(2015-2016美洲大流行的重大公衛問題),亦與Guillain-Barré症候群相關。故「遺傳基因為負股RNA」與其正股RNA本質不符,最不適當。","options":{"A":"猴子為茲卡宿主之一,正確。","B":"可不需蚊媒直接人傳人(性/母嬰/輸血),正確。","C":"茲卡為正股RNA、非負股—錯誤(正解)。","D":"孕婦感染可致胎兒小頭症,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-08":{"quick":"Zidovudine(AZT)為反轉錄酶抑制劑、用於HIV,最為適當。","detail":{"background":"抗病毒藥觀念:①「高效抗反轉錄病毒療法(HAART/cART)」採「『多種藥物併用』(如2 NRTI + 1 整合酶或蛋白酶抑制劑)」以壓制病毒並延緩抗藥(非單一藥物);②HCV的DAA「不全針對RNA聚合酶」(尚有NS3蛋白酶、NS5A抑制劑),且可治癒;③部分抗病毒藥具廣效(如ribavirin、干擾素),並非只對單一病毒;④「Zidovudine(AZT/Retrovir)」是「核苷類『反轉錄酶抑制劑』」,用於「HIV」。故最適當為D。","options":{"A":"HAART採多藥併用、非單一藥物—錯誤。","B":"HCV藥不全針對RNA聚合酶—錯誤。","C":"部分抗病毒藥具廣效、非只對單一病毒—錯誤。","D":"Zidovudine為反轉錄酶抑制劑、用於HIV—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-09":{"quick":"D型肝炎病毒須依賴HBV、經血液與性接觸傳播,最為適當。","detail":{"background":"肝炎病毒整理:①「HCV」目前「無疫苗」,經「血液/性/母嬰」傳播(非食水),DAA可治癒;②「HDV」為缺陷RNA病毒,「無法獨立複製,須依賴HBV的表面抗原(HBsAg)」組裝,經「血液與性接觸(及母嬰)」傳播,可藉HBV疫苗預防;③「HAV」經「糞口(食物/水)」傳播、「有疫苗」(非血液/性);④肝炎病毒中「HBV為DNA病毒」,HAV、HCV、HDV、HEV皆為RNA病毒(故「除HDV外皆RNA」錯誤,應為除HBV外皆RNA)。故最適當為B(HDV依賴HBV、經血液性接觸傳播)。","options":{"A":"HCV無疫苗、非食水傳播—錯誤。","B":"HDV須依賴HBV、經血液與性接觸傳播—正解。","C":"HAV經糞口而非血液性接觸—錯誤。","D":"HBV才是DNA病毒(非HDV)—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-14":{"quick":"Darunavir(蛋白酶抑制劑)與Raltegravir(整合酶抑制劑)皆為HIV抗病毒藥。","detail":{"background":"四藥對應:①「Sofosbuvir」——HCV的NS5B聚合酶抑制劑;②「Oseltamivir」——流感的神經氨酸酶(NA)抑制劑(抑制子代病毒『釋放』,非進入);③「Darunavir」——HIV的『蛋白酶抑制劑』(抑制病毒成熟);④「Raltegravir」——HIV的『整合酶抑制劑』。故「Darunavir與Raltegravir皆為HIV抗病毒藥」最適當。其餘:oseltamivir抑制釋放(非進入)、darunavir抑制成熟(非釋放);sofosbuvir為HCV藥(非HBV);sofosbuvir為聚合酶抑制劑、raltegravir為整合酶抑制劑(非蛋白酶)。","options":{"A":"Darunavir與Raltegravir皆為HIV抗病毒藥—正解。","B":"Oseltamivir抑制釋放(非進入)、Darunavir抑制成熟(非釋放)—錯誤。","C":"Sofosbuvir為HCV藥而非HBV—錯誤。","D":"Sofosbuvir為聚合酶、Raltegravir為整合酶抑制劑、非蛋白酶—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-16":{"quick":"正股RNA、二十面體、無套膜、糞口傳播、罕見癱瘓,屬小RNA病毒科(Picornaviridae)。","detail":{"background":"本題描述完全符合「小RNA病毒科(Picornaviridae)」:①「正股(+)單股RNA」(可直接作mRNA);②「二十面體衣殼、無套膜(裸病毒)」、對環境與酸耐受;③「經糞口傳播」;④代表為腸病毒/小兒麻痺病毒(poliovirus)——「罕見病例侵犯前角運動神經元造成癱瘓(paralysis)」。腺病毒為DNA病毒、呼腸孤病毒為雙股RNA、披衣病毒(Togaviridae)為有套膜的蟲媒病毒,皆不符。故為小RNA病毒科。","options":{"A":"腺病毒科為DNA病毒。","B":"小RNA病毒科(正股RNA、無套膜、糞口、致癱瘓)—正解。","C":"呼腸孤病毒科為雙股RNA。","D":"披衣病毒科為有套膜蟲媒病毒。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-24":{"quick":"未接種MMR的小美未染麻疹,最可能因周圍同學接種疫苗提供「群體免疫(herd immunity)」。","detail":{"background":"群體免疫(herd immunity)是指族群中「足夠高比例的人具免疫力(經疫苗或自然感染)」時,病原難以在人群中傳播,連帶「保護少數未具免疫力者(如未接種、嬰兒、免疫不全者)」。麻疹傳染力極強(R0約12-18),須約95%的疫苗覆蓋率才能維持群體免疫。本題小美未接種MMR(註:MMR與自閉症的關聯已被大型研究否定、屬假說),她至今未染麻疹「最可能是因班上多數同學已接種MMR、形成群體免疫保護了她」。她對麻疹抗原會正常反應、DTP(白喉破傷風百日咳)對麻疹無交叉保護、抗生素對病毒無效。故為群體免疫。","options":{"A":"小美對麻疹抗原會正常引起免疫反應—錯誤。","B":"同學多接種MMR提供群體免疫保護—正解。","C":"DTP對麻疹無交叉免疫保護—錯誤。","D":"抗生素對病毒無效、非未發病原因—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-10":{"quick":"雷巴威林(ribavirin)為核苷類似物,抑制病毒「RNA的生合成(核酸複製)」。","detail":{"background":"雷巴威林(ribavirin)是「鳥苷(guanosine)核苷類似物」,具廣效抗RNA病毒作用,機轉包括:抑制肌苷單磷酸脫氫酶(IMPDH)耗竭GTP池、干擾病毒mRNA加帽、嵌入並抑制「病毒RNA聚合酶(RdRp)、造成複製錯誤(致死性突變)」——總體即「抑制病毒RNA的生合成(核酸複製)」。臨床曾用於HCV(與干擾素併用,現多被DAA取代)、RSV、某些病毒性出血熱。其作用步驟是「核酸(RNA)合成」,非附著、脫殼或蛋白質合成。","options":{"A":"非抑制附著步驟。","B":"非抑制脫殼步驟。","C":"抑制病毒RNA的生合成(核酸複製)—正解。","D":"非直接抑制蛋白質合成。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-11":{"quick":"沙粒病毒由「齧齒類」傳播(可經氣霧/接觸),「經由蚊子傳播」最不適當。","detail":{"background":"沙粒病毒(Arenaviridae,如拉薩病毒、淋巴球性脈絡叢腦膜炎病毒LCMV):①「病毒顆粒組裝時包裹進宿主核糖體(ribosome)」,電鏡呈沙粒狀(故名arena);②主要以「齧齒類(鼠)」為儲存宿主,人「經吸入或接觸鼠尿糞的氣霧/污染物(空氣/接觸)」感染,「並非經蚊子(節肢動物)傳播」;③可造成「無菌性腦膜炎(LCMV)」或「病毒性出血熱(拉薩熱)」。故「經由蚊子傳播」與其齧齒類媒介的事實不符,最不適當。","options":{"A":"病毒顆粒中含核糖體,正確。","B":"沙粒病毒由齧齒類傳播、非蚊子—錯誤(正解)。","C":"可經氣霧(空氣)傳播,正確。","D":"可造成腦膜炎及出血性症狀,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-13":{"quick":"B19為小DNA病毒(Parvovirus),不屬於小RNA病毒科。","detail":{"background":"「小RNA病毒科(Picornaviridae)」為「正股單股RNA、無套膜、二十面體」的小病毒,包括:腸病毒屬(poliovirus小兒麻痺、coxsackie、echovirus、EV71)、鼻病毒(rhinovirus,感冒)、A型肝炎病毒(HAV)等。而「B19」是「小DNA病毒科(Parvoviridae)」——「線型單股『DNA』」病毒(致傳染性紅斑/巴掌臉),與小RNA病毒科無關(名稱皆有『小』但核酸不同)。故不屬小RNA病毒科者為B19。","options":{"A":"Poliovirus屬小RNA病毒科。","B":"B19為小DNA病毒(Parvovirus)、不屬小RNA病毒科—正解。","C":"A型肝炎病毒屬小RNA病毒科。","D":"鼻病毒屬小RNA病毒科。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-14":{"quick":"登革有四型且異型再感染可致重症,「感染後獲終身免疫」最不適當。","detail":{"background":"登革熱病毒(Dengue virus)為「黃病毒科」蟲媒病毒(arbovirus,經斑蚊傳播),「與茲卡病毒同屬黃病毒科」,有「四種血清型(DENV-1~4)」。感染某一型後「僅對該型產生長期免疫,對其他三型只有短暫交叉保護」;之後感染「異型」時,先前的非中和抗體可經「抗體依賴增強(ADE)」促進病毒進入巨噬細胞,反而增加「登革出血熱/休克症候群」的風險。故「感染後將獲終身(對所有型別)免疫」與其只對單型免疫、異型再感染易重症的事實相反,最不適當。","options":{"A":"登革病毒為蟲媒病毒(arbovirus),正確。","B":"與茲卡同屬黃病毒科,正確。","C":"僅對同型免疫、異型再感染可致重症、非終身全面免疫—錯誤(正解)。","D":"感染可能引起出血熱,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-10":{"quick":"RNA病毒因RdRp缺乏校對,複製錯誤率高於DNA病毒,最為適當。","detail":{"background":"病毒複製特性:①「RNA病毒」以RNA依賴RNA聚合酶(RdRp)複製,「缺乏校對(proofreading)功能」(冠狀病毒例外有部分校對),故「複製錯誤率(突變率)『高於』DNA病毒」——這是流感、HIV、HCV等高度變異、易抗藥/逃避免疫的原因;②病毒複製非單純等比級數,而是經「一輪潛伏後爆發大量子代」的「一步生長(one-step burst)」;③有套膜的「流感病毒對環境耐受性『低於』無套膜的腸病毒」(套膜易破壞);④「並非所有RNA病毒都在細胞質複製」——流感、反轉錄病毒等需進入細胞核。故最適當為A。","options":{"A":"RNA病毒複製錯誤率大於DNA病毒—正解。","B":"病毒複製非等比級數、而為一步爆發式—錯誤。","C":"有套膜的流感對環境耐受性低於無套膜腸病毒—錯誤。","D":"並非所有RNA病毒都在細胞質複製(流感/反轉錄病毒需進核)—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-18":{"quick":"補體(C3b)具調理作用,可增強巨噬細胞與嗜中性球的吞噬。","detail":{"background":"調理作用(opsonization)是把病原表面標記上「調理素(opsonin)」,使吞噬細胞表面有對應受體者更易辨識並吞噬。主要的調理素為:①「補體C3b」——沉積於病原表面,被吞噬細胞的「補體受體(CR1)」辨識;②「IgG抗體」——其Fc段被吞噬細胞的「Fc受體(FcγR)」辨識;③甘露糖結合凝集素(MBL)、C反應蛋白等。干擾素、IL-1、TNF-α為細胞激素(促發炎/抗病毒/活化),本身不直接作為調理素增強吞噬。故具調理作用者為補體。","options":{"A":"干擾素為抗病毒細胞激素、非調理素。","B":"IL-1為促發炎細胞激素、非調理素。","C":"TNF-α為促發炎細胞激素、非調理素。","D":"補體(C3b)具調理作用增強吞噬—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-22":{"quick":"腸道分泌型IgA不活化補體、不引發炎以清除共生菌,故C錯誤(本題C、D均給分)。","detail":{"background":"腸道對龐大的共生菌相維持「免疫耐受」而不發炎,機制包括:①共生菌不像致病菌帶毒力因子破壞上皮或誘發大量促炎細胞激素;②上皮與調節性細胞分泌「TGF-β、IL-10」等促進耐受;③腸道產生大量「分泌型IgA(sIgA)」與共生菌結合,進行「免疫排除(immune exclusion)」——「中和、限制其黏附與穿透」,「『不』活化補體、不引起發炎性清除」;④上皮對TLR配體反應受嚴格調控(低反應、區隔化)以避免對共生菌過度發炎。故C「IgA結合共生菌後引起補體活化清除」與sIgA非發炎性的特性相反。本題公告「C、D均給分」。","options":{"A":"共生菌不以毒力因子破壞上皮/誘發促炎,正確。","B":"上皮分泌TGF-β等促進耐受,正確。","C":"sIgA不活化補體、非以補體清除共生菌—錯誤(正解)。","D":"上皮對共生菌TLR反應受調控(本題判給分)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-18":{"quick":"白血球上使其牢固黏附於血管內皮的黏著分子是「整合素(integrins)」。","detail":{"background":"白血球滲出(leukocyte extravasation)分階段:①「滾動」——內皮上的「選擇素(selectin,如E-/P-selectin)」與白血球的醣配體弱結合;②「活化」——趨化素使白血球整合素構形活化;③「牢固黏附」——白血球上的「整合素(integrins,如LFA-1/Mac-1)」與內皮上的「ICAM」緊密結合;④「穿出」血管壁。故「存在於白血球上、使其黏附內皮」的是整合素。E-selectin與ICAM主要表現在內皮、fibronectin為細胞外基質蛋白。","options":{"A":"E-selectin主要表現於內皮(介導滾動)。","B":"ICAM主要表現於內皮(整合素的配體)。","C":"整合素在白血球上、介導牢固黏附—正解。","D":"fibronectin為細胞外基質蛋白。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-23":{"quick":"傳統途徑早期補體(C1/C2/C4)缺乏使免疫複合體無法清除,致免疫複合體疾病(本題A、B、C均給分)。","detail":{"background":"補體缺乏與感染/疾病的對應:①「傳統途徑早期成分(C1、C2、C4)缺乏」——主要造成「免疫複合體清除障礙」,堆積於組織致「免疫複合體疾病(類似系統性紅斑性狼瘡)」,亦較易化膿菌(pyogenic bacteria)感染;②「C3缺乏」——嚴重化膿菌反覆感染;③「終端成分(C5-C9/MAC)缺乏」——特別易反覆「奈瑟氏菌(腦膜炎雙球菌、淋球菌)」感染;④MBL缺乏——兒童期反覆感染。本題公告「A、B、C均給分」,其中最核心的概念是「無法清除免疫複合體而致免疫複合體疾病(B)」。","options":{"A":"MBL/早期補體缺乏與兒童期感染相關(本題判給分)。","B":"無法清除免疫複合體致免疫複合體疾病—正解。","C":"易有化膿菌感染(本題判給分)。","D":"Pneumocystis感染主要與T細胞免疫缺損相關、非早期補體缺乏—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-24":{"quick":"IL-5主要促進嗜伊紅性白血球的生成與活化。","detail":{"background":"嗜中性球與嗜伊紅球比較:①「嗜中性球(neutrophil)」——含髓過氧化酶(MPO),主要對抗化膿性「細菌與真菌」;②「嗜伊紅球(eosinophil)」——含「嗜伊紅過氧化酶(EPO)」與主要鹼性蛋白,主要對抗「寄生蟲(蠕蟲)」並參與過敏反應;其生成與活化由「IL-5」主導(故「IL-5主要促進嗜伊紅球生成」正確);其表面高表現趨化素受體「CCR3」(對eotaxin有反應)。寄生蟲感染時「嗜伊紅球」反應較強(非嗜中性球);兩種細胞「都含過氧化酶」。故B正確。","options":{"A":"兩者皆含過氧化酶(嗜伊紅含EPO)—錯誤。","B":"IL-5主要促進嗜伊紅球生成—正解。","C":"寄生蟲感染嗜伊紅球反應較強、非嗜中性球—錯誤。","D":"CCR3在嗜伊紅球表現較多、非嗜中性球—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-18":{"quick":"呼吸爆發產生超氧陰離子等活性氧,並非「大量釋出二氧化碳」,故B錯誤。","detail":{"background":"巨噬細胞與嗜中性球的殺菌:①「呼吸爆發(respiratory burst)」由「NADPH氧化酶」催化,把氧還原成「超氧陰離子(superoxide)」,再轉成過氧化氫、次氯酸等「活性氧(ROS)」殺菌——「並非大量釋出二氧化碳」;②嗜中性球被活化可進行特殊死亡釋出染色質形成「中性球胞外網(NETs)」捕捉微生物;③巨噬細胞在各組織特化(肝的Kupffer細胞、腦的微膠細胞、肺泡巨噬細胞、骨的破骨細胞等);④「NADPH氧化酶基因突變」使呼吸爆發失能,致「慢性肉芽腫病(CGD)」,對catalase陽性菌(金黃色葡萄球菌、麴菌)反覆感染。故B(呼吸爆發釋出大量CO2)錯誤。","options":{"A":"嗜中性球可形成NETs捕捉微生物,正確。","B":"呼吸爆發產生超氧陰離子(ROS)、非大量釋出CO2—錯誤(正解)。","C":"Kupffer細胞與微膠細胞為特化巨噬細胞,正確。","D":"NADPH氧化酶突變致CGD,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-18":{"quick":"B細胞屬「適應性(後天)免疫」,一般不歸類為先天免疫細胞。","detail":{"background":"免疫細胞分先天與適應性:①「先天(innate)免疫細胞」——巨噬細胞、嗜中性球、樹突細胞、自然殺手細胞、肥大細胞、嗜伊紅/嗜鹼球等,以模式辨識受體快速、非特異反應;②「適應性(adaptive)免疫細胞」——「T細胞與B細胞」,具抗原特異性受體(經基因重組產生多樣性)、有免疫記憶。樹突細胞是連接先天與適應性的「抗原呈現細胞」,仍屬先天起始。故一般不歸類為先天免疫細胞者為「B細胞」。","options":{"A":"巨噬細胞屬先天免疫細胞。","B":"B細胞屬適應性免疫、非先天—正解。","C":"嗜中性球屬先天免疫細胞。","D":"樹突細胞屬先天免疫(抗原呈現)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-19":{"quick":"RIG-I-like受體辨識的是「胞質RNA(病毒RNA)」而非DNA,故D錯誤。","detail":{"background":"模式辨識受體(PRR)辨識病原相關分子模式(PAMP):①「類鐸受體(Toll-like receptors, TLR)」——演化保守(連無脊椎動物也有),分布細胞膜/內體;「TLR3辨識雙股RNA、TLR7/8辨識單股RNA、TLR9辨識CpG DNA、TLR4辨識LPS、TLR2辨識肽聚醣/脂蛋白」;②「NOD-like受體(NLR)」——位於「胞質」,辨識胞內細菌的胜肽聚醣片段(如沙門氏菌、李斯特菌),部分組成發炎體;③「RIG-I-like受體(RLR)」——位於「胞質」,辨識「病毒『RNA』」,活化後誘發「第一型干擾素」。辨識「胞質DNA」的是cGAS-STING路徑。故D「RIG-I辨識DNA病毒的DNA」錯誤(應辨識RNA)。","options":{"A":"TLR古老保守、無脊椎動物亦有,正確。","B":"TLR3/TLR7分別辨識dsRNA/ssRNA,正確。","C":"NLR辨識胞內病原(胜肽聚醣片段),正確。","D":"RIG-I-like受體辨識胞質RNA而非DNA—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-19":{"quick":"CD59直接干擾C9聚合、抑制膜攻擊複合物(MAC)形成。","detail":{"background":"補體調控蛋白防止補體傷及自身細胞:①「CD59(protectin)」——結合C5b-8、「直接阻止C9聚合(插入與聚合)」,抑制「膜攻擊複合物(MAC)」形成(故陣發性夜間血紅素尿症PNH因GPI錨缺失失去CD59/DAF而溶血);②「DAF(CD55)」與「MCP(CD46)」——加速C3/C5轉化酶解離或作為輔因子使C3b被裂解,作用在「上游」轉化酶;③「C1 inhibitor」——抑制C1與接觸系統(缺乏致遺傳性血管性水腫)。故直接干擾C9聚合者為CD59。","options":{"A":"CD59直接干擾C9聚合、抑制MAC—正解。","B":"MCP(CD46)為C3b裂解輔因子、作用上游。","C":"DAF(CD55)加速轉化酶解離、作用上游。","D":"C1 inhibitor抑制C1與接觸系統。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-11":{"quick":"嗜中性白血球無CD4,並非HIV主要感染對象。","detail":{"background":"HIV進入細胞須結合「CD4」受體與共受體(CCR5或CXCR4)。因此HIV「主要感染表現CD4的細胞」:「CD4 T輔助細胞(主要標的,導致免疫缺損)、巨噬細胞、樹突細胞(及微膠細胞)」皆表現CD4與共受體而可被感染。「嗜中性白血球(neutrophil)」不表現CD4,「並非HIV主要感染對象」。故為嗜中性球。","options":{"A":"CD4 T細胞為HIV主要標的。","B":"嗜中性球不表現CD4、非HIV主要感染對象—正解。","C":"巨噬細胞表現CD4、可被HIV感染。","D":"樹突細胞可被HIV感染。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-18":{"quick":"自然殺手細胞無抗原特異性受體,「藉抗原特異性受體辨識」錯誤。","detail":{"background":"各免疫機制:①「自然殺手細胞(NK)」屬先天免疫,「『沒有』抗原特異性受體」,而是靠「活化受體與抑制受體的平衡」——當標的細胞MHC class I下降(missing self,常見於病毒感染或腫瘤)時失去抑制訊號而被殺,並可經抗體依賴細胞毒殺(ADCC);②巨噬細胞吞噬細菌、以溶酶體酵素分解;③補體活化後形成MAC在細菌膜穿孔致死;④抗體可中和病毒、阻斷其與受體結合。故A「NK藉抗原特異性受體辨識」錯誤。","options":{"A":"NK細胞無抗原特異性受體(靠missing-self)—錯誤(正解)。","B":"巨噬細胞吞噬並以溶酶體分解細菌,正確。","C":"補體活化形成MAC穿孔殺菌,正確。","D":"抗體可中和、阻斷病毒結合受體,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-22":{"quick":"吞噬細胞表面的「補體受體(如CR1)」辨識附著於病原的調理素C3b。","detail":{"background":"調理作用(opsonization)讓吞噬更有效:病原被「調理素(opsonin)」覆蓋後,被吞噬細胞表面對應受體辨識並促進吞噬。對應關係:①調理素「C3b」——由吞噬細胞的「補體受體(complement receptor, CR1/CR3)」辨識;②調理素「IgG」——由吞噬細胞的「Fcγ受體」辨識。Toll-like受體辨識PAMP(誘發發炎)、凝集素受體辨識醣類、趨化素受體介導趨化,皆非辨識C3b調理素。故為補體受體。","options":{"A":"TLR辨識PAMP、非調理素受體。","B":"補體受體辨識調理素C3b—正解。","C":"凝集素受體辨識醣類、非C3b。","D":"趨化素受體介導趨化、非調理。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-18":{"quick":"樹突細胞可由「骨髓系與淋巴系」前驅細胞分別產生。","detail":{"background":"造血幹細胞分化為「骨髓系(myeloid)」與「淋巴系(lymphoid)」兩大譜系:多數細胞屬單一譜系(如紅血球、血小板、嗜中性球、巨噬細胞為骨髓系;T、B、NK、先天淋巴細胞ILC為淋巴系)。但「樹突細胞(dendritic cell)」較特殊——「常規樹突細胞多源自骨髓系,而漿細胞樣樹突細胞(pDC)則與淋巴系前驅有關」,故「樹突細胞可由骨髓系及淋巴系前驅細胞產生」。ILC為淋巴系、紅血球與巨噬細胞為骨髓系。故為樹突細胞。","options":{"A":"樹突細胞可由骨髓系與淋巴系前驅產生—正解。","B":"先天淋巴細胞屬淋巴系。","C":"紅血球屬骨髓系。","D":"巨噬細胞屬骨髓系。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-19":{"quick":"發炎的紅腫熱痛是宿主免疫反應(血管擴張、通透性增加)所致,非病原毒力因子直接造成,故B錯誤。","detail":{"background":"發炎(inflammation)是局部感染/受傷初期的保護性反應:①目的是增加免疫效應分子與細胞到達病灶以「攻擊病原並促進癒合」;②「紅、腫、熱、痛」四徵是「宿主自身的發炎反應」——肥大細胞/巨噬細胞釋放組織胺、前列腺素、細胞激素等,造成「血管擴張(紅、熱)、血管通透性增加致滲出(腫)、致痛介質與壓迫(痛)」,「並非病原毒力因子直接造成」;③通透性增加使「補體等血漿成分」進入組織助清除病原;④全身性感染時大量「TNF-α」可致敗血性休克。故B(紅腫熱痛由毒力因子直接造成)錯誤。","options":{"A":"發炎增加效應分子以攻病原、促癒合,正確。","B":"紅腫熱痛由宿主發炎反應所致、非毒力因子直接造成—錯誤(正解)。","C":"通透性增加使補體進入助清除病原,正確。","D":"過度TNF-α可致敗血性休克,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-19":{"quick":"防禦素(defensin)為成孔抗菌胜肽,直接破壞病原菌細胞膜而殺菌。","detail":{"background":"先天免疫的直接殺菌分子中,「防禦素(defensin)」是富含半胱胺酸、帶正電的「抗菌胜肽」,可與病原(細菌、真菌、部分病毒)帶負電的細胞膜結合,「插入並形成孔洞、破壞膜完整性」造成滲漏死亡(類似的還有cathelicidin、溶菌酶從壁切入)。細胞激素(cytokine)是訊息分子、C反應蛋白(CRP)是調理素/急性期蛋白、Toll-like受體(TLR)是辨識受體,皆「不直接破壞病原菌細胞膜」。故為防禦素。","options":{"A":"cytokine為訊息分子、不直接破膜。","B":"CRP為調理/急性期蛋白、不直接破膜。","C":"TLR為辨識受體、不直接破膜。","D":"防禦素為成孔抗菌胜肽、直接破壞病原膜—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_113090-19":{"quick":"補體可由抗體(傳統)、病原表面(替代)、MBL(凝集素)三途徑活化,「僅能由抗體啟動」最不適當。","detail":{"background":"補體系統有「三條活化途徑」:①「傳統途徑(classical)」——由「抗體(IgM/IgG)結合抗原後」啟動C1;②「替代途徑(alternative)」——C3自發水解後直接沉積於「病原表面分子」而放大(不需抗體);③「凝集素途徑(lectin)」——「甘露糖結合凝集素(MBL)」辨識病原表面醣類而啟動。三途徑匯合於C3/C5,下游C5b結合C6-C9形成「膜攻擊複合體(MAC)」裂解病原;C3b調理促吞噬;C3a/C5a為過敏毒素活化肥大細胞促發炎。故「補體活化僅能由抗體啟動」忽略替代與凝集素途徑,最不適當。","options":{"A":"C5活化下游組成MAC裂解病原,正確。","B":"補體可由病原表面或MBL啟動、非僅抗體—錯誤(正解)。","C":"補體經調理作用促進吞噬,正確。","D":"C3a/C5a活化肥大細胞促發炎,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114090-24":{"quick":"革蘭氏陽性菌細胞壁的胜肽聚醣主要由Toll-like receptor 2(TLR2)辨識。","detail":{"background":"Toll-like受體(TLR)各有配體:①「TLR2(與TLR1或TLR6形成異二聚體)」——辨識革蘭氏陽性菌的「胜肽聚醣(peptidoglycan)、脂壁酸、脂蛋白」與真菌zymosan;②「TLR4」——辨識革蘭氏陰性菌的「脂多醣(LPS)」;③「TLR3」辨識dsRNA、「TLR7/8」辨識ssRNA、「TLR9」辨識細菌CpG DNA(皆在內體辨識核酸)。故革蘭氏陽性菌胜肽聚醣主要經TLR2辨識。","options":{"A":"TLR2辨識革蘭氏陽性菌胜肽聚醣—正解。","B":"TLR4辨識LPS(革蘭氏陰性)。","C":"TLR8辨識單股RNA。","D":"TLR9辨識CpG DNA。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-15":{"quick":"低伽瑪球蛋白血症(抗體缺乏)者清除腸病毒能力差,易發生嚴重持續的伊科病毒感染。","detail":{"background":"伊科病毒(echovirus)屬腸病毒(小RNA病毒),經糞口/呼吸道感染,多致輕症或無菌性腦膜炎。清除腸病毒「主要倚賴體液(抗體)免疫」(中和抗體)。因此「低伽瑪球蛋白血症(hypogammaglobulinemia)/無γ球蛋白血症(如X連鎖無丙種球蛋白血症)」等「抗體(B細胞)缺乏」者,「無法有效中和清除腸病毒」,易發生「嚴重、慢性、持續的伊科病毒感染(如慢性腦膜腦炎、播散感染)」。鐮狀細胞貧血(易莢膜菌/沙門骨髓炎)、發炎性腸病、消化性潰瘍與此無關。故為低伽瑪球蛋白血症。","options":{"A":"抗體缺乏者難清除腸病毒、易嚴重伊科病毒感染—正解。","B":"鐮狀細胞貧血易感染莢膜菌、非此。","C":"發炎性腸病與腸病毒清除無關。","D":"消化性潰瘍與此無關。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-17":{"quick":"第一型干擾素(IFN-α/β)主要抑制病毒的「蛋白質合成」步驟。","detail":{"background":"第一型干擾素(IFN-α、IFN-β)是病毒感染時細胞分泌的抗病毒細胞激素,以旁分泌方式使鄰近細胞進入「抗病毒狀態」:其誘導的抗病毒效應蛋白主要「抑制病毒蛋白質合成」——①「PKR」磷酸化起始因子eIF2α、停止轉譯;②「2′-5′寡腺苷酸合成酶(OAS)」活化RNase L降解病毒(與細胞)mRNA;③Mx蛋白等。整體效果是「阻斷病毒蛋白質合成(轉譯)」、限制病毒擴散,並上調MHC I促進清除。故主要抑制步驟為蛋白質合成。","options":{"A":"非主要抑制病毒入侵。","B":"非主要抑制病毒轉錄。","C":"第一型干擾素主要抑制病毒蛋白質合成—正解。","D":"非主要抑制病毒組裝。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-19":{"quick":"尿酸結晶經「NLRP3發炎體」活化IL-1β,參與痛風的發炎反應。","detail":{"background":"痛風(gout)是「單鈉尿酸鹽結晶(MSU)」沉積於關節後引發的急性發炎。其先天免疫機制核心是「NLRP3發炎體(inflammasome)」:吞噬細胞攝入尿酸結晶後活化「NLRP3」,促使caspase-1活化、把pro-IL-1β切成成熟「IL-1β」釋放,引發強烈的關節發炎(紅腫熱痛)——故IL-1拮抗劑可治療頑固性痛風。NLRP1為另一發炎體、MDA5辨識病毒RNA、cGAS辨識胞質DNA,皆非痛風的主要途徑。故為NLRP3。","options":{"A":"NLRP1為另一發炎體、非痛風主要途徑。","B":"尿酸結晶經NLRP3發炎體活化IL-1β致痛風發炎—正解。","C":"MDA5辨識病毒RNA。","D":"cGAS辨識胞質DNA。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-24":{"quick":"第二型干擾素(IFN-γ)由活化的T細胞/NK於後期產生,病毒剛感染呼吸道時最不可能產生。","detail":{"background":"病毒剛感染呼吸道時,屬「先天免疫早期」反應:受感染上皮與先天免疫細胞快速產生「第一型干擾素(IFN-α/β,抗病毒)」、趨化素「CCL2(招募單核球)」與「IL-18」等先天細胞激素。而「第二型干擾素(IFN-γ)」主要由「活化的T輔助1細胞(Th1)、毒殺T細胞與NK細胞」在免疫反應「較後期」分泌(屬適應性/活化後反應),「在病毒『剛』感染時最不可能立即大量產生」。故最不可能者為type II interferon(IFN-γ)。","options":{"A":"第一型干擾素為早期抗病毒反應、會產生。","B":"第二型干擾素(IFN-γ)由活化T/NK後期產生、剛感染最不可能—正解。","C":"CCL2為早期趨化素、會產生。","D":"IL-18為先天細胞激素、會產生。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-25":{"quick":"肺炎鏈球菌以「莢膜多醣」干擾補體活化與抗吞噬來逃脫免疫偵測。","detail":{"background":"肺炎鏈球菌(Streptococcus pneumoniae)為「胞外菌」、革蘭氏陽性。其逃脫宿主免疫(尤其補體與吞噬)的關鍵毒力因子是「多醣莢膜(capsular polysaccharide)」:莢膜「干擾補體(C3b)在菌表面的沉積與活化、阻止調理與吞噬」,使菌得以在血流/組織中存活(故無莢膜株毒力大減,疫苗以莢膜多醣為抗原)。肺炎鏈球菌為革蘭氏陽性「無LPS」、「不形成孢子」,逃避也非靠減少基因表達。故為莢膜多醣干擾補體活化。","options":{"A":"肺炎鏈球菌為革蘭氏陽性、無LPS—錯誤。","B":"肺炎鏈球菌不形成孢子—錯誤。","C":"非靠減少基因表達逃避免疫—錯誤。","D":"莢膜多醣干擾補體活化、抗吞噬—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-19":{"quick":"成熟B細胞同時表現膜型IgM與IgD,靠同一初級轉錄本的「選擇性剪接(alternative splicing)」。","detail":{"background":"未受抗原刺激的成熟初始B細胞可在表面「同時表現IgM與IgD」(同一抗原特異性)。其分子機制是:重鏈基因座的VDJ後接Cμ與Cδ外顯子,經「同一條長初級RNA轉錄本的『選擇性剪接(alternative splicing)』與不同polyA位點選擇」,分別產生μ或δ重鏈mRNA,故毋須改變DNA即可共表現IgM與IgD。對偶基因排除確保只表現一個對偶基因;V(D)J重組產生抗原特異性;基因轉換(鳥類等)為另一多樣性機制——皆非IgM/IgD共表現的機制。","options":{"A":"選擇性剪接使同時表現IgM與IgD—正解。","B":"對偶基因排除確保只用一個對偶基因、非此機制。","C":"V(D)J重組產生抗原特異性、非IgM/IgD共表現。","D":"基因轉換為另一多樣性機制、非此。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-20":{"quick":"膜型抗體轉為分泌型抗體,靠重鏈mRNA的「選擇性剪接(RNA splicing)」改變C端。","detail":{"background":"B細胞受抗原刺激分化為漿細胞後,抗體由「膜結合型」轉成「分泌型」。其機制是同一重鏈基因的初級RNA經「選擇性剪接與polyA位點選擇」:選擇較上游的polyA、去除編碼「穿膜段(membrane exon)」的部分,產生「分泌型(C端為親水尾)」重鏈;反之保留穿膜段則為膜型。此為「RNA層次的剪接調控」,DNA序列不變。DNA重組(類別轉換/VDJ)、蛋白酶切割、激酶修飾皆非膜型轉分泌型的機制。","options":{"A":"非DNA重組。","B":"重鏈mRNA選擇性剪接使膜型轉分泌型—正解。","C":"非蛋白酶切割。","D":"非蛋白激酶修飾。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-28":{"quick":"單株抗體「擬人化」是把其他物種抗體的CDR(抗原結合區)轉殖到人類抗體骨架上。","detail":{"background":"最初的單株抗體多為「鼠源」,用於人體會引發「人抗鼠抗體(HAMA)反應」、半衰期短、效應功能差。「擬人化(humanization)」即以基因工程「把鼠源抗體可變區中決定抗原專一性的『互補決定區(CDR)』移植到人類抗體的骨架(framework)與固定區上」(CDR grafting),使抗體絕大部分為人源序列、保留原抗原專一性,降低免疫原性(命名以-zumab表humanized、-umab表全人源)。其餘選項(與補體結合、經移除型抗體或抗淋巴球球蛋白純化)皆非擬人化定義。","options":{"A":"與補體結合非擬人化步驟。","B":"非經移除型抗體純化。","C":"非經抗淋巴球球蛋白純化。","D":"把其他物種CDR轉殖到人類抗體骨架—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-23":{"quick":"黏膜分泌型IgA大部分為「二聚體(dimer)」,由J chain連接並帶分泌片段。","detail":{"background":"免疫球蛋白的聚合狀態:血清中IgA多為「單體」;但「黏膜分泌型IgA(secretory IgA, sIgA)」主要為「二聚體(dimer)」——由兩個IgA單體經「J chain」連接,並在穿過上皮時獲得上皮細胞來源的「分泌片段(secretory component)」保護其抗蛋白酶分解。sIgA於黏膜進行「免疫排除」(中和病原與毒素、阻止黏附),是黏膜免疫的主力。IgM則為五聚體(pentamer)。故黏膜sIgA為二聚體。","options":{"A":"血清IgA為單體、但黏膜sIgA非單體。","B":"黏膜分泌型IgA主要為二聚體—正解。","C":"非三聚體。","D":"五聚體為IgM。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-24":{"quick":"T細胞端造成hyper-IgM的缺陷為CD40 ligand(CD40L)缺乏(X連鎖高IgM症候群)。","detail":{"background":"類別轉換(class switching)需要「T細胞輔助訊號」:活化的Th細胞表面「CD40 ligand(CD40L/CD154)」與B細胞表面「CD40」結合,提供B細胞進行類別轉換與生發中心反應的訊號;B細胞內再由「AID」執行轉換重組。高IgM症候群(hyper-IgM)即此路徑缺陷:①「T細胞端——CD40L基因缺陷」造成最常見的「X連鎖高IgM症候群」(故本題T細胞缺陷為CD40L);②B細胞端——CD40或AID缺陷亦致病;③NEMO缺陷影響NF-κB訊號。結果只能產IgM、缺IgG/IgA,易反覆感染(含伺機性如Pneumocystis)。故T細胞蛋白缺陷者為CD40 ligand。","options":{"A":"AID缺陷屬B細胞端(非T細胞)。","B":"CD40在B細胞上(非T細胞)。","C":"CD40 ligand缺陷(T細胞端)致X連鎖高IgM—正解。","D":"NEMO缺陷影響NF-κB、非典型T細胞CD40L路徑。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-20":{"quick":"體細胞高度突變(somatic hypermutation)發生在B細胞的抗原受體(免疫球蛋白)基因。","detail":{"background":"「體細胞高度突變(somatic hypermutation, SHM)」是B細胞在生發中心受抗原與T細胞輔助刺激後,於「免疫球蛋白可變區基因」引入高頻點突變,經濾泡樹突細胞篩選使「高親和力」B細胞被選出(親和力成熟)。此過程由「AID(activation-induced cytidine deaminase)」催化(C→U)再經DNA修復產生突變。T細胞的TCR「不進行體細胞高度突變」(僅靠V(D)J重組產生多樣性);巨噬細胞、NK細胞無抗原受體基因重排。故進行SHM者為B細胞。","options":{"A":"T細胞的TCR不進行體細胞高度突變。","B":"B細胞的免疫球蛋白基因進行體細胞高度突變—正解。","C":"巨噬細胞無抗原受體重排。","D":"自然殺手細胞無抗原受體重排。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-21":{"quick":"pre-T細胞抗原接受器(pre-TCR)具有TCR β鏈(與pre-Tα配對)。","detail":{"background":"T細胞於胸腺發育時,先重組「TCR β鏈」基因,成功者其「β鏈與不變的pre-Tα(pTα)配對」組成「pre-TCR」,傳遞訊號促使細胞增生、抑制β鏈進一步重組(β-selection)並啟動α鏈重組。故pre-TCR「具β鏈、尚無α鏈」,「此階段尚不能辨識外來抗原或進行MHC限制辨識」(那是雙陽性期經正/負選擇後)。MHC限制與抗原辨識能力是在完整αβ TCR形成並通過正選擇後才具備。故pre-TCR具TCR β鏈。","options":{"A":"pre-TCR尚無TCR α鏈(α鏈稍後才重組)。","B":"pre-TCR具有TCR β鏈—正解。","C":"此階段尚不能辨識外來抗原。","D":"MHC限制辨識在正選擇後才具備、非此階段。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-28":{"quick":"Natalizumab(抗α4整合素/VLA-4單株抗體)可用於治療多發性硬化症。","detail":{"background":"Natalizumab是「抗α4整合素(anti-VLA-4)」的單株抗體,藉阻斷淋巴球α4β1整合素與內皮VCAM-1的結合,「阻止活化淋巴球穿越血腦障壁進入中樞神經」,因而用於「多發性硬化症(multiple sclerosis)」(亦用於克隆氏病)。其副作用為增加「JC病毒再活化致進行性多灶性白質腦病(PML)」的風險。轉移性黑色素瘤(用免疫檢查點抑制劑)、慢性骨髓性白血病(用imatinib)、慢性氣喘(用抗IgE/抗IL-5)皆非其適應症。故為多發性硬化症。","options":{"A":"Natalizumab治療多發性硬化症—正解。","B":"轉移性黑色素瘤用檢查點抑制劑。","C":"慢性骨髓性白血病用imatinib。","D":"慢性氣喘用抗IgE/抗IL-5。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-18":{"quick":"M細胞的主要功能是捕捉並轉運腸腔抗原至下層淋巴組織(啟動黏膜免疫)。","detail":{"background":"M細胞(microfold cell)位於腸道Peyer’s patch等淋巴濾泡上方的濾泡相關上皮(FAE)。其特化功能是「以胞飲/穿胞作用(transcytosis)『捕捉腸腔內的抗原與微生物,並轉運(遞送)給下方的樹突細胞與淋巴細胞』」,啟動黏膜免疫(誘導sIgA)。M細胞缺乏緻密刷狀緣與厚黏液層,「本身不直接殺菌、不製造抗體、也非保護周邊上皮」;此特性也被某些病原(如沙門氏菌、志賀氏菌、脊髓灰質炎病毒)利用作為入侵門戶。故M細胞主要捕捉與轉運抗原。","options":{"A":"M細胞不直接殺菌。","B":"M細胞不製造抗體(由漿細胞分泌)。","C":"捕捉並轉運腸道抗原至下層淋巴組織—正解。","D":"非以保護周邊上皮為主要功能。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-21":{"quick":"帶有pre-BCR的pre-B細胞會進行快速細胞分裂(增生)。","detail":{"background":"B細胞在骨髓發育順序:pro-B(重鏈D-J、V-DJ重組)→重鏈成功後與「替代輕鏈(VpreB+λ5)」組成「pre-BCR」→此pre-BCR訊號使「large pre-B細胞『快速增生(clonal expansion)』」並抑制重鏈進一步重組(對偶排除),之後進入small pre-B進行「輕鏈基因重組」→成功者表現完整IgM成為「immature B細胞」。故「具pre-BCR的pre-B細胞」的特性是「快速分裂」;輕鏈重組在其後、表面完整IgM見於immature B、接受抗原刺激見於成熟B。","options":{"A":"輕鏈重組在pre-BCR訊號之後的small pre-B階段。","B":"表面完整IgM見於immature B細胞、非pre-B。","C":"帶pre-BCR的pre-B細胞快速增生—正解。","D":"接受專一性抗原刺激見於成熟B細胞。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-24":{"quick":"分泌型IgA的分泌片段由上皮細胞合成(來自pIgR的胞外裂解物)。","detail":{"background":"黏膜分泌型IgA(sIgA):①黏膜固有層漿細胞產生「二聚體IgA(J chain連接)」;②上皮細胞基底側的「聚合免疫球蛋白受體(pIgR)」結合二聚體IgA,經穿胞運送至腔面;③pIgR被切割,「其胞外部分留在IgA上即『分泌片段(secretory component)』」——「由上皮細胞合成」,保護sIgA免被蛋白酶分解。其餘:腸道以IgA2亞型較多(與血清比例不同)、誘導IgA的細胞激素為TGF-β/IL-5/IL-10(非IL-12,IL-12促Th1)、sIgA「不活化古典補體途徑」(屬非發炎性免疫排除)。故C正確。","options":{"A":"血清與腸道IgA亞型比例不一致(腸道IgA2較多)—錯誤。","B":"促IgA為TGF-β等、IL-12促Th1—錯誤。","C":"分泌片段由上皮細胞合成(pIgR裂解物)—正解。","D":"sIgA不啟動古典補體途徑—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-20":{"quick":"MHC class II主要表現於專業抗原呈現細胞與胸腺上皮,「主要表現於嗜中性球」錯誤。","detail":{"background":"MHC class II分子:①「呈現外源性抗原(經內體/溶酶體處理)給CD4 T細胞」;②抗原槽兩端開放,可結合「較長(約13-25個胺基酸)」的胜肽;③「主要表現於『專業抗原呈現細胞』——樹突細胞、巨噬細胞、B細胞」,以及「胸腺上皮細胞(參與正/負選擇)」與活化內皮等,「『不』恆定表現於嗜中性球」;④MHC class I則幾乎所有有核細胞皆表現、呈現內源性抗原給CD8 T細胞。故「MHC II主要表現於嗜中性球」錯誤。","options":{"A":"CD4 T細胞辨識MHC II呈現的抗原,正確。","B":"MHC II可呈現較長胜肽,正確。","C":"MHC II主要表現於專業APC與胸腺上皮、非嗜中性球—錯誤(正解)。","D":"胸腺上皮細胞表現MHC II,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-21":{"quick":"AID參與體細胞超突變/類別轉換,「不參與」V(D)J重組;RAG、DNA-PK、DNA ligase IV才是。","detail":{"background":"抗體可變區「V(D)J重組」由一組酵素完成:①「RAG-1/RAG-2」辨識重組訊號序列(RSS)並切開DNA;②「DNA-PK、Artemis」處理髮夾末端;③「TdT」加入N核苷酸增加連接多樣性;④「DNA ligase IV/XRCC4」經非同源末端接合(NHEJ)連接。而「AID(activation-induced cytidine deaminase)」是「生發中心」中執行「體細胞高度突變」與「類別轉換重組」的脫胺酶,「不參與V(D)J重組」。故沒有參與V(D)J重組者為AID。","options":{"A":"AID參與SHM/CSR、不參與V(D)J重組—正解。","B":"DNA-PK參與V(D)J重組末端處理。","C":"RAG啟動V(D)J重組的DNA切割。","D":"DNA ligase IV連接V(D)J重組斷端。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-23":{"quick":"體細胞超突變主要作用於免疫球蛋白「可變區」,「在變異區和固定區造成改變」錯誤。","detail":{"background":"親和力成熟(affinity maturation)發生於生發中心:①活化B細胞進行「體細胞超突變(SHM)」,在「免疫球蛋白『可變區(variable region)』」基因引入高頻點突變(『不』作用於固定區);②SHM由「AID」催化,使「胞嘧啶(C)脫胺成尿嘧啶(U)」,再經DNA修復產生突變;③突變可使BCR對抗原的親和力增或減;④經「濾泡樹突細胞(FDC)」上抗原競爭篩選,只有「高親和力」B細胞獲得存活訊號而增生、分化(其餘低親和力者凋亡)。故A「在變異區『和固定區』造成改變」錯誤(SHM限於可變區)。","options":{"A":"SHM作用於可變區、非固定區—錯誤(正解)。","B":"AID使C→U再修復致突變,正確。","C":"超突變可增可減親和力,正確。","D":"高親和力B細胞經FDC篩選存活增生,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-20":{"quick":"專業抗原呈現細胞大量表現「MHC class II」,以把抗原呈現給CD4 T細胞。","detail":{"background":"專業抗原呈現細胞(professional APC,包括樹突細胞、巨噬細胞、B細胞)能把抗原呈現給「CD4 T輔助細胞」,關鍵在於它們「大量(且可被誘導上調)表現MHC class II分子」(並具共同刺激分子如B7)。MHC class II呈現外源性抗原給CD4 T細胞。MHC class I幾乎所有有核細胞都表現(呈現給CD8);MHC class III編碼補體/TNF等、不呈現抗原;模式辨識受體偵測PAMP但非把抗原呈現給CD4 T細胞。故為MHC class II。","options":{"A":"MHC class I呈現給CD8、各有核細胞皆表現。","B":"專業APC大量表現MHC class II以呈現給CD4 T細胞—正解。","C":"MHC class III不呈現抗原。","D":"模式辨識受體偵測PAMP、非呈現抗原給CD4 T。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-21":{"quick":"類別(isotype)轉換改變抗體功能(Fc)但不改變抗原特異性,「貢獻抗體辨識多樣性」最不適當。","detail":{"background":"抗體「辨識(抗原結合)多樣性」的來源:①「組合多樣性」——多個V、(D)、J基因片段的不同組合(由Tonegawa發現其分子機制而獲諾貝爾獎);②「連接多樣性」——V(D)J接合處的核苷酸增刪(含TdT加N核苷酸);③體細胞超突變(親和力成熟)。這些都在B細胞發育/活化中改變「可變區」。而「類別(isotype/抗體)轉換」只改變「重鏈固定區(Fc),改變抗體的『效應功能』(如IgM→IgG/IgA/IgE),『不改變抗原特異性(可變區不變)』」,故「不貢獻抗原辨識的多樣性」。故D最不適當。","options":{"A":"Tonegawa因發現抗體多樣性機制獲諾貝爾獎,正確。","B":"抗體多樣性在B細胞發育中產生,正確。","C":"含組合多樣性與連接多樣性,正確。","D":"類別轉換改變功能、不增加辨識多樣性—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-23":{"quick":"不同IgG亞型與同一Fc受體的親和力「不一樣」,故B錯誤。","detail":{"background":"Fc受體(FcR)辨識抗體Fc段以連結抗體與效應細胞:①FcR可為單一受體或「多次單元複合體(含訊息傳遞鏈)」;②「不同抗體亞型(如IgG1-4)與同一種FcγR的親和力『不同』」(故功能各異)——B敘述錯誤;③游離抗體可低親和力結合FcR(如肥大細胞FcεRI預先載IgE),抗原結合後交聯FcR才傳遞活化或抑制訊號(如FcγRIIB為抑制性);④吞噬細胞(巨噬、嗜中性球)表現FcR,當細菌同時被「抗體(Fc)+補體C3b」覆蓋時,FcR與補體受體CR1「協同」可引發更強吞噬。故B(親和力都一樣)錯誤。","options":{"A":"Fc受體可為單體或複合體,正確。","B":"不同亞型抗體與同一Fc受體親和力不同、非都一樣—錯誤(正解)。","C":"游離抗體可結合FcR、抗原結合後傳訊,正確。","D":"FcR與CR1協同增強吞噬,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-24":{"quick":"黏膜對食物抗原(如麩質)主要產生的抗體為IgA。","detail":{"background":"黏膜免疫(腸道、呼吸道、泌尿生殖道)的主力抗體是「IgA」(以分泌型二聚體sIgA存在),負責中和病原與毒素、阻止其黏附、進行「免疫排除」而不引發發炎。對腸道接觸的「食物抗原(如麩質gluten)」主要也產生「IgA」(故乳糜瀉診斷常測抗組織轉麩醯胺酶IgA)。IgG為血清主要抗體、IgM為初次反應與五聚體、IgD多在B細胞表面;皆非黏膜對食物抗原的主要抗體。故為IgA。","options":{"A":"IgG為血清主要抗體、非黏膜主力。","B":"黏膜對食物抗原主要產生IgA—正解。","C":"IgM為初次反應抗體。","D":"IgD多在B細胞表面。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-24":{"quick":"CDR3由V(D)J接合處產生(歧異最大),但CDR1、CDR2由V片段本身編碼,故C錯誤。","detail":{"background":"免疫球蛋白基因重組:①「重鏈先重組(D-J,再V-DJ),之後輕鏈(先κ,κ兩對偶失敗才做λ)」;②抗原結合位由三個互補決定區(CDR1、CDR2、CDR3)構成——其中「CDR1與CDR2由『V基因片段』本身編碼」,而「『CDR3』恰位於V(D)J『接合處』,因接合處的核苷酸增刪而『歧異度最大』,是抗原結合的關鍵」;③完成一條染色體的重排後另一條停止(「對偶基因排除」),使一個B細胞只表現單一特異性。故C「CDR1、CDR2、CDR3都在接合處」錯誤(只有CDR3在接合處)。","options":{"A":"重鏈先D-J再V-DJ重組,正確。","B":"輕鏈先κ後λ,正確。","C":"CDR1、CDR2由V片段編碼、僅CDR3在接合處—錯誤(正解)。","D":"對偶基因排除使一個B細胞表現單一受體,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-26":{"quick":"類別轉換重組由「轉換區(switch region)」主導,「由RSS主導」錯誤(RSS是V(D)J重組的訊號)。","detail":{"background":"AID(activation-induced cytidine deaminase)是生發中心B細胞中啟動「體細胞超突變(SHM)」與「類別轉換重組(CSR)」的關鍵脫胺酶(Honjo發現AID,亦因PD-1獲2018諾貝爾獎):①在GC B細胞高表現、促進SHM(親和力成熟);②CSR可使抗體由IgM轉換為IgG/IgA/IgE(如轉為IgE);③CSR機制是AID把「轉換區(switch region, S region)」DNA上的C脫胺成U,經DNA修復產生「雙股斷裂」再重組,使重鏈固定區替換。重點:CSR是由重鏈固定區前的「轉換區(S region)」序列主導,「並非由V(D)J重組所用的『重組訊號序列(RSS)』主導」。故D錯誤。","options":{"A":"AID在GC B細胞高表現、促SHM,正確。","B":"轉為IgE亦由AID調控,正確。","C":"AID使C→U、修復致雙股斷裂而重組,正確。","D":"CSR由轉換區(S region)主導、非RSS—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111100-18":{"quick":"最能聯結先天與後天免疫的抗原呈現細胞是樹突細胞。","detail":{"background":"「樹突細胞(dendritic cell, DC)」是連結先天免疫與適應性(後天)免疫的「橋樑與最重要的專業抗原呈現細胞」:它以模式辨識受體(先天)偵測病原並在組織捕捉抗原,成熟後遷移至淋巴結,以「MHC + 共同刺激分子 + 細胞激素」把抗原「呈現並活化初始T細胞」,啟動適應性免疫(因此是唯一能有效活化naïve T細胞的APC)。NK細胞、嗜鹼球、嗜中性球屬先天免疫效應細胞,非主要的專業抗原呈現/活化naïve T細胞者。故為樹突細胞。","options":{"A":"NK細胞為先天免疫效應細胞、非專業APC。","B":"嗜鹼球非專業抗原呈現細胞。","C":"嗜中性球非活化naïve T細胞的APC。","D":"樹突細胞聯結先天與後天免疫(專業APC)—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111100-20":{"quick":"TCR多樣性相關者為①V由多片段、②V(D)J重組、③RAG1/2、⑤TdT、⑦N核苷酸添加(即12357)。","detail":{"background":"T細胞受體(TCR)多樣性的來源與B細胞抗體類似(但無體細胞超突變、無類別轉換):①「V區由數個基因片段(V、D、J)組成」並②「V(D)J DNA重組」隨機組合;③由「RAG-1、RAG-2」啟動切割;⑤「末端去氧核苷酸轉移酶(TdT)」在接合處⑦「加入N核苷酸」增加連接多樣性。故①②③⑤⑦相關。④「AIRE」基因表現於胸腺髓質、與「中樞耐受(負選擇)」有關,非多樣性;⑥「類別轉換重組」是B細胞抗體的機制,TCR沒有。故為12357。","options":{"A":"①②③⑤⑦(V多片段、V(D)J重組、RAG、TdT、N核苷酸)與TCR多樣性有關—正解。","B":"含④AIRE(屬耐受)不正確。","C":"含⑥類別轉換(B細胞機制)不正確。","D":"含⑥類別轉換不正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-20":{"quick":"與MHC class II抗原呈現有關的蛋白是「不變鏈(invariant chain, Ii/CD74)」。","detail":{"background":"MHC class II呈現外源抗原:新合成的MHC II在內質網中由「不變鏈(invariant chain, Ii/CD74)」佔據抗原結合槽(防止內質網中的內源胜肽結合),並引導MHC II運送至內體/溶酶體;在酸性內體中Ii被蛋白酶分解、僅留「CLIP」片段於槽中,再由HLA-DM催化以外源抗原胜肽置換CLIP,最後把抗原呈現給CD4 T細胞。Calnexin/Calreticulin(伴護蛋白)與TAP(把胞質胜肽運入內質網)是「MHC class I」途徑的分子。故與MHC II有關者為invariant chain。","options":{"A":"Calnexin為MHC class I途徑伴護蛋白。","B":"Calreticulin為MHC class I途徑伴護蛋白。","C":"不變鏈(invariant chain)參與MHC class II抗原呈現—正解。","D":"TAP為MHC class I途徑(運送胞質胜肽)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-21":{"quick":"膜BCR的功能是辨識抗原與傳訊;只有分泌型抗體的Fc才執行效應功能,故C錯誤。","detail":{"background":"TCR與BCR比較:①TCR由α、β鏈構成、BCR由兩組重鏈+輕鏈構成,兩者皆有可變區與固定區、抗原結合於可變區;②TCR只有一個抗原結合位、只在膜上;BCR有兩個結合位,可在膜上(受體)或以「抗體形式分泌」;③TCR須同時辨識「MHC + 抗原胜肽」(MHC限制),故能偵測被MHC呈現的病原胜肽。重點:「膜結合的BCR本身功能是『辨識抗原並經Igα/Igβ傳遞活化訊號』」;「Fc執行效應功能(活化補體、調理、ADCC)是『分泌型抗體』的事」,膜BCR的Fc並不直接執行這些效應功能。故C「BCR的Fc可活化效應功能」最不適當。","options":{"A":"TCR/BCR皆有變異區與固定區、抗原結合於變異區,正確。","B":"TCR一個結合位、只在膜上;BCR兩個結合位、可膜可分泌,正確。","C":"膜BCR以傳訊為主、效應功能屬分泌型抗體—錯誤(正解)。","D":"TCR同時辨識MHC與胜肽以偵測感染,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-23":{"quick":"中和作用由抗體的Fab(可變區)結合抗原達成,不是Fc的功能。","detail":{"background":"抗體分兩部分:①「Fab(含可變區)」——負責「辨識並結合抗原」,執行「中和(neutralization)」(阻斷病原/毒素與細胞結合);②「Fc(固定區)」——決定抗體類別與「效應功能」:活化「補體(古典途徑,IgM/IgG)」、被吞噬細胞Fc受體辨識而「調理(opsonization)」、ADCC、以及IgE的Fc使「肥大細胞/嗜鹼球去顆粒(degranulation)」。故「中和作用」是Fab的功能,「不是Fc部分的功能」。","options":{"A":"活化補體為Fc功能。","B":"中和作用由Fab(可變區)達成、非Fc功能—正解。","C":"調理作用(經Fc受體)為Fc功能。","D":"促肥大細胞去顆粒(IgE Fc)為Fc功能。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_113090-20":{"quick":"T細胞辨識的是MHC呈現的「線性短胜肽」,「需摺疊成複雜立體結構」錯誤。","detail":{"background":"T細胞與B細胞辨識抗原的方式不同:①「T細胞」辨識「被MHC分子呈現的『線性短胜肽』(抗原須先經抗原處理切成胜肽)」,即「MHC限制」——抗原『不需』保持原本的立體構形;②「B細胞/抗體」可直接辨識抗原表面的「構形(立體)抗原決定位」。此外,T細胞於「胸腺教育(正選擇辨識自身MHC、負選擇清除強烈自體反應者)」以建立自體耐受、區隔自體與外來。故C「抗原需摺疊成複雜立體結構才被T細胞辨識」與T細胞辨識線性胜肽的事實相反,最不適當。","options":{"A":"T細胞辨識短片段胜肽,正確。","B":"抗原須被MHC呈現才被T細胞辨識,正確。","C":"T細胞辨識線性胜肽、非立體構形—錯誤(正解)。","D":"胸腺教育建立自體耐受,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_113090-21":{"quick":"immature B細胞若辨識(自體)抗原會凋亡/編輯而非增生,「就開始細胞分裂」最不適當。","detail":{"background":"B細胞發育:①免疫球蛋白基因V(D)J「先重組重鏈」;②「μ重鏈 + 替代輕鏈(VpreB、λ5)」組成「pre-BCR」,其訊號對pre-B細胞繼續發育「必要」;③「Bruton’s tyrosine kinase(Btk)」是pre-BCR/BCR下游訊息傳遞必要蛋白,缺乏致「X連鎖無丙種球蛋白血症(XLA)」(B細胞發育停滯、無成熟B與抗體);④表現IgM的「immature B細胞」此時若在骨髓「辨識到(自體)抗原」,會進入「負選擇」——凋亡、受體編輯(receptor editing)或無能(anergy),『而非進行clonal expansion』(增生是成熟B在周邊遇外來抗原才發生)。故D最不適當。","options":{"A":"V(D)J重組先從重鏈開始,正確。","B":"pre-BCR對pre-B繼續發育必要,正確。","C":"Btk缺乏致XLA,正確。","D":"immature B辨識抗原應凋亡/編輯而非增生—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-06":{"quick":"超抗原「不需經抗原處理」,直接交聯MHC II與TCR Vβ而活化大量T細胞。","detail":{"background":"超抗原(superantigen,如金黃色葡萄球菌TSST-1/腸毒素、鏈球菌致熱性外毒素)的特性:「不需經抗原呈現細胞的『抗原處理(processing)』與裝載進MHC槽」,而是「在MHC class II分子外側與TCR的Vβ區直接『交聯(bridging)』」,因此能「非專一性地活化大量(約2-20%)T細胞」,引發大量細胞激素(IL-2、TNF、IFN-γ)釋放——導致中毒性休克症候群、食物中毒等。它不是成孔毒素、不抑制吞噬或去顆粒。故其特性為「不需抗原處理即可活化免疫細胞」。","options":{"A":"超抗原非成孔毒素。","B":"不需抗原處理、直接交聯MHC II與TCR活化大量T細胞—正解。","C":"非抑制巨噬細胞吞噬。","D":"非抑制去顆粒。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-20":{"quick":"MHC class III區編碼補體、TNF等免疫相關分子,「其產物在免疫無功能」最不適當。","detail":{"background":"MHC基因群:①MHC class I與II都是「多基因(polygenic,有多個基因座如HLA-A/B/C與HLA-DP/DQ/DR)」且「高度多型性(每個基因座有眾多對偶基因)」,使族群能呈現多樣抗原;②MHC class II的多型性差異「主要集中在β1區(抗原結合槽)」;③「MHC class III區」並非編碼抗原呈現分子,而是編碼「補體成分(C2、C4、factor B)、TNF-α/β、熱休克蛋白」等——「在免疫系統中具重要功能」。故B「MHC class III基因產物在免疫不具功能」最不適當。","options":{"A":"MHC I與II為多基因(polygenic),正確。","B":"MHC III產物(補體/TNF等)在免疫有功能、非無功能—錯誤(正解)。","C":"各MHC基因高度多型性,正確。","D":"MHC II差異主要在β1區,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-21":{"quick":"替代輕鏈缺陷會使發育停滯在pro-B/pre-B(因無法組pre-BCR),「停滯在immature B」最不適當。","detail":{"background":"B細胞發育與耐受:①「骨髓」是B細胞開始發育的器官;②會強烈辨識「自體抗原」的immature B細胞,可在「骨髓中被清除(中樞耐受:凋亡/受體編輯/無能)」;③逃逸到周邊者,在「脾臟等周邊」可被進一步清除或無能化(周邊耐受);④「替代輕鏈(surrogate light chain, VpreB+λ5)」是組成「pre-BCR」所需——「無法表現替代輕鏈,會使發育『停滯在pro-B/pre-B(無法通過pre-BCR檢查點)』」,而「不是停滯在較晚的immature B」。故D最不適當。","options":{"A":"骨髓為B細胞發育起始器官,正確。","B":"自體反應B細胞可在骨髓被清除,正確。","C":"亦可在脾臟(周邊)被清除,正確。","D":"替代輕鏈缺陷使停滯在pro-B/pre-B而非immature B—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-24":{"quick":"體細胞超突變由AID作用於「可變區」,「在Fc(固定)區造成點突變」最不適當。","detail":{"background":"體細胞超突變(somatic hypermutation, SHM):①「主要發生在生發中心的B細胞」;②由「AID(activation-induced cytidine deaminase)」催化,「在免疫球蛋白『可變區(V region)』」引入高頻點突變(『不是』在Fc/固定區);③是「親和力成熟」的主要機制(配合FDC篩選高親和力選殖);④增加抗體的多樣性。故B「AID在抗體Fc region造成點突變」錯誤(應為可變區)。","options":{"A":"主要發生在生發中心B細胞,正確。","B":"SHM作用於可變區、非Fc(固定)區—錯誤(正解)。","C":"為促進親和力成熟的主要機制,正確。","D":"可增加抗體多樣性,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114090-19":{"quick":"抗原-抗體結合為「非共價」交互作用,共價鍵參與最少。","detail":{"background":"抗原與抗體(Fab可變區)的結合是「可逆的『非共價』交互作用」,由多種弱作用力協同提供專一性與親和力:①「氫鍵」;②「靜電/離子鍵」;③「范德瓦爾斯力」;④「疏水作用」;⑤偶極-偶極等。這些弱鍵在抗原表位與抗體互補表面緊密貼合時數量眾多、累加而牢固。而「共價鍵」(強而不可逆)「不參與(或參與最少)」抗原抗體的結合。故參與最少者為共價鍵。","options":{"A":"范德瓦爾斯力參與抗原抗體結合。","B":"氫鍵參與抗原抗體結合。","C":"偶極-偶極力參與抗原抗體結合。","D":"共價鍵幾乎不參與抗原抗體結合—正解(參與最少)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114090-20":{"quick":"MHC class II由α、β兩鏈共同形成抗原槽,並無類似β2-microglobulin的「不接觸抗原的單一鏈」,故D錯誤。","detail":{"background":"MHC比較:①MHC class I呈現的胜肽「較短(約8-10個胺基酸,槽兩端封閉)」,class II「較長(約13-25,槽兩端開放)」;②class I呈現給「CD8」、class II呈現給「CD4」;③class II由「α與β兩鏈」組成,其「β鏈(尤其β1)變化性高於α鏈」;④class I由「重鏈(α)+不接觸抗原的『β2-microglobulin』」組成(β2m不參與抗原結合);但「class II的『α與β兩鏈共同構成抗原結合槽(α1+β1)』,兩鏈都接觸抗原」,「並沒有像β2m那樣一條完全不接觸抗原的鏈」。故D「class II中α chain不接觸抗原」最不適當。","options":{"A":"class I呈現短胜肽、class II較長,正確。","B":"class I→CD8、class II→CD4,正確。","C":"class II β鏈變化性高於α鏈,正確。","D":"class II α、β兩鏈共組抗原槽、α鏈亦接觸抗原(無β2m類比)—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114090-21":{"quick":"pre-B細胞受體(pre-BCR)由μ重鏈與「替代輕鏈(非κ鏈)」組成,「具κ輕鏈」最不適當。","detail":{"background":"pre-B細胞受體(pre-BCR)的組成與功能:①由「μ重鏈 + 『替代輕鏈(surrogate light chain,VpreB與λ5)』」組成,「尚『無』真正的κ或λ輕鏈」(真正輕鏈在其後的small pre-B階段才重組);②與訊息傳遞蛋白「Igα、Igβ」相聯結;③可「傳遞存活與增生訊號」使pre-B細胞繼續發育;④並「傳訊抑制重鏈基因進一步重組(對偶基因排除)」並啟動輕鏈重組。故A「具有κ輕鏈」與pre-BCR用替代輕鏈的事實不符,最不適當。","options":{"A":"pre-BCR用替代輕鏈、無κ鏈—錯誤(正解)。","B":"可傳遞存活訊號使pre-B繼續發育,正確。","C":"具Igα、Igβ訊息傳遞蛋白,正確。","D":"傳訊抑制重鏈進一步重組,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-20":{"quick":"MHC高度多型性增加族群可呈現的抗原種類,有利於抑制病毒在族群中傳播。","detail":{"background":"MHC(HLA)的「多型性(polymorphism)」指族群中同一基因座有眾多不同對偶基因,使「不同個體能呈現不同範圍的抗原胜肽」。其與抗病毒免疫最相關的意義是:「整個族群因MHC多樣,能呈現的病毒抗原種類大幅增加」,病毒很難演化出能同時逃避所有人MHC呈現的變異,因此「有利於限制病毒在族群層次的傳播與大流行」(族群層級的免疫優勢,平衡選擇)。其餘選項(呈現單一主要表位、消除年齡差異、避免自體免疫)皆非MHC多型性的核心意義。故最相關為A。","options":{"A":"多型性增加可呈現的抗原種類、有利族群抑制病毒傳播—正解。","B":"並非為呈現單一主要表位。","C":"與消除年齡別免疫差異無關。","D":"並非以避免自體免疫為MHC多型性主旨。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-22":{"quick":"無法類別轉換的缺陷為①AID、③CD40、④CD40 ligand(即134)。","detail":{"background":"類別轉換(class switch)需「T細胞輔助訊號 + B細胞執行酶」:①「CD40L(在T細胞)與CD40(在B細胞)」結合提供B細胞轉換訊號;②B細胞內「AID」執行轉換重組。故缺乏「①AID、③CD40、④CD40 ligand」皆造成「無法類別轉換」(表現為高IgM症候群,只能產IgM)。而「②腺苷脫胺酶(ADA)缺乏」造成嚴重複合型免疫缺乏(SCID,T/B皆缺)、「⑤RAG1缺乏」造成V(D)J重組失敗(SCID)——這兩者不是「特異造成類別轉換障礙」。故為①③④(134)。","options":{"A":"①AID、③CD40、④CD40L缺乏致無法類別轉換—正解。","B":"含②ADA、⑤RAG1(屬SCID)不正確。","C":"含②ADA、⑤RAG1不正確。","D":"含⑤RAG1(V(D)J重組)不正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-23":{"quick":"一個B細胞只表現單一特異性抗原受體,最主要靠「等位基因排除(allelic exclusion)」。","detail":{"background":"每個B(或T)細胞「只表現一種抗原特異性」的受體,最主要機制是「等位基因排除(allelic exclusion)」:當「一條同源染色體上的免疫球蛋白(重鏈或輕鏈)基因成功重組並表現功能性蛋白」後,會「傳訊抑制『另一條同源染色體』上對應基因的重組」,使該細胞只用一個對偶基因、只產生單一特異性的受體(輕鏈也有isotype/同型排除先κ後λ)。DNA重組(V(D)J)產生多樣性、RNA選擇性剪接調控膜/分泌或IgM/IgD、類別轉換改變Fc功能,皆非確保「單一特異性」的機制。故為等位基因排除。","options":{"A":"選擇性剪接調控膜/分泌或IgM/IgD、非確保單一特異性。","B":"DNA重組產生多樣性、非確保單一特異性。","C":"等位基因排除使每個B細胞只表現一種特異性—正解。","D":"類別轉換改變Fc功能、非確保單一特異性。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-21":{"quick":"IL-17主要招募「嗜中性球」對抗胞外菌/真菌,「吸引嗜酸性白血球」錯誤。","detail":{"background":"CD4輔助T細胞分化與細胞激素:①「Treg」分泌「TGF-β、IL-10」抑制效應T細胞(維持耐受);②「IL-6 + TGF-β」誘導CD4分化為「Th17」;③「Th17分泌IL-17」,主要「招募嗜中性球、誘導抗菌肽」以對抗「胞外細菌與真菌(如念珠菌)」——「並非吸引嗜酸性白血球」;④「Th2分泌IL-4、IL-5」,IL-4促B細胞轉換產IgE、IL-5活化嗜酸性球(抗寄生蟲/過敏)。故C「IL-17主要吸引嗜酸性白血球」錯誤(應招募嗜中性球)。","options":{"A":"Treg分泌TGF-β抑制效應T細胞,正確。","B":"IL-6與TGF-β促CD4分化為Th17,正確。","C":"IL-17主要招募嗜中性球、非嗜酸性球—錯誤(正解)。","D":"IL-4、IL-5由Th2分泌、助B產IgE,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-19":{"quick":"TCR本身胞內段短、無法傳訊,須依賴CD3 complex向細胞內傳遞訊息。","detail":{"background":"T細胞受體(TCR)的α、β鏈負責「辨識MHC-胜肽」,但其「胞內段極短、無訊息傳遞能力」。TCR須與「CD3複合體(CD3γ、δ、ε與ζ鏈)」組合成「TCR複合體」才能表現於細胞表面並傳訊:CD3各鏈胞內帶有「免疫受體酪胺酸活化模體(ITAM)」,TCR接合抗原後ITAM被Lck磷酸化、招募ZAP-70啟動下游訊息。CD2、CD4/CD8、CD28為輔助/共刺激分子,MHC是抗原呈現分子,皆非TCR的主要訊息傳遞單元。故為CD3。","options":{"A":"TCR胞內段短、本身無法傳訊。","B":"MHC為抗原呈現分子、非訊息傳遞。","C":"CD2為黏附/輔助分子。","D":"CD3 complex(含ITAM)負責TCR訊息傳遞—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-20":{"quick":"高抗體效價、巨噬內菌量多、嚴重組織破壞,屬腫瘤型痲瘋,與Th2活化有關。","detail":{"background":"痲瘋(漢生病)依免疫反應呈光譜:①「類結核型(tuberculoid)」——「Th1(細胞媒介)」強、IFN-γ活化巨噬殺菌,菌量少、病灶局限;②「腫瘤型(lepromatous)」——「Th2偏向、細胞免疫弱」,「巨噬細胞內菌量極多、抗體效價高(但抗體無保護力)」,瀰漫病灶。本題「高抗體效價、巨噬內菌多、嚴重組織破壞」即「腫瘤型」表現,與「Th2」活化(體液為主、CMI不足)有關。Th3/Treg為調節性,非此情境主因。故為Th2。","options":{"A":"Th1強對應類結核型(菌量少)、非此情境。","B":"Th2偏向對應腫瘤型(高抗體、菌量多)—正解。","C":"Th3為調節性、非此主因。","D":"調節性T細胞為抑制性、非此主因。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-19":{"quick":"TCR β鏈比α鏈多出「D(diversity)」基因片段。","detail":{"background":"TCR與抗體基因結構類似:①「TCR β鏈」由「V-D-J-C」片段組成(含『D片段』);②「TCR α鏈」由「V-J-C」組成(『無D片段』)。此與免疫球蛋白「重鏈有D、輕鏈無D」對應。D片段及其接合處增加了β鏈(與重鏈)的連接多樣性。故β鏈比α鏈多出的是「D」基因片段。","options":{"A":"V片段兩者皆有。","B":"β鏈多出D片段(α鏈無D)—正解。","C":"J片段兩者皆有。","D":"C片段兩者皆有。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-20":{"quick":"達成自我耐受相關者為①AIRE、②CTLA-4、③Fas、⑤負選擇、⑥Treg(即12356)。","detail":{"background":"自我耐受(self-tolerance)的機制:①「中樞耐受」——胸腺髓質上皮以「AIRE」表現周邊組織抗原,進行「⑤負選擇(negative selection)」清除強烈自體反應的T細胞,並生成「⑥natural Treg」;②「周邊耐受」——「②CTLA-4」傳遞抑制訊號(無能/抑制活化)、「③Fas(Fas-FasL)」介導活化誘導細胞死亡(AICD)清除自體反應細胞、Treg抑制。而「④正選擇(positive selection)」是篩選「能辨識自身MHC」的T細胞使其『存活發育』(確保MHC限制),「並非直接達成自我耐受」。故耐受相關為①②③⑤⑥(12356)。","options":{"A":"含④正選擇(非耐受機制)不正確。","B":"①AIRE②CTLA-4③Fas⑤負選擇⑥Treg皆與自我耐受相關—正解。","C":"遺漏①AIRE,不完整。","D":"遺漏⑥Treg,不完整。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-21":{"quick":"TGF-β為抑制性細胞激素,並非毒殺性CD8 T細胞執行毒殺所分泌者。","detail":{"background":"毒殺性CD8 T細胞(CTL)殺傷標的的方式:①「穿孔素(perforin)+顆粒酶(granzyme)」直接誘導凋亡;②「Fas-FasL」途徑;③分泌「IFN-γ、TNF-α、淋巴毒素(LT-α/TNF-β)」等促發炎/抗病毒細胞激素協助清除。而「TGF-β」是「抑制性(免疫調節)」細胞激素(由Treg等分泌、抑制效應T),「並非CTL用以執行毒殺的分泌物」。故非CTL毒殺所分泌者為TGF-β。","options":{"A":"TNF-α由CTL分泌參與毒殺/發炎。","B":"TGF-β為抑制性細胞激素、非CTL毒殺分泌—正解。","C":"LT-α(TNF-β)由CTL分泌。","D":"IFN-γ由CTL分泌。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-22":{"quick":"相關性辨識只需B與T辨識「同一抗原複合物」的不同表位即可,「B辨識表面蛋白、T辨識核心蛋白則無法協助」錯誤。","detail":{"background":"相關性辨識(linked recognition):胸腺依賴抗原活化B細胞時,「B細胞辨識的表位與輔助T細胞辨識的胜肽須來自『同一個抗原分子/複合物』」——B細胞以BCR攝入整個抗原(如完整病毒顆粒),處理後在MHC II上「呈現該抗原內部(如核心蛋白)的胜肽」給T,T被活化後再經CD40L給B第二訊號。故「B辨識病毒表面蛋白、T辨識其核心蛋白」這對「仍屬同一病毒顆粒」,「T『可以』協助該B細胞」(B攝入整顆病毒、處理後呈現核心胜肽)。此原理:①保障自我耐受(自體反應T與自體反應B須同時存在才產生自體抗體,機率低);②用於設計「結合型疫苗(把多醣與蛋白載體連接,使T能幫助對多醣的B反應)」對付莢膜菌如Hib;③解釋penicillin半抗原與自體蛋白結合致過敏。故A錯誤。","options":{"A":"同一病毒顆粒的不同表位仍可由T協助B、非無法協助—錯誤(正解)。","B":"相關性辨識有助維持自我耐受,正確。","C":"結合型疫苗利用此概念對付莢膜菌,正確。","D":"penicillin半抗原-蛋白載體經此致IgE過敏,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-19":{"quick":"單核球在GM-CSF + IL-4刺激下可分化為樹突細胞。","detail":{"background":"單核球(monocyte)進入組織後依環境細胞激素分化:①「M-CSF」主要促分化為「巨噬細胞」;②「GM-CSF + IL-4」則促分化為「樹突細胞(dendritic cell)」(實驗室常用此組合由單核球培養出單核球衍生樹突細胞moDC,再加TNF-α或LPS使其成熟)。IL-1β為促發炎細胞激素、單獨M-CSF或M-CSF+TNF-α不導向樹突細胞分化。故為GM-CSF+IL-4。","options":{"A":"M-CSF促分化為巨噬細胞。","B":"M-CSF+TNF-α非導向樹突細胞分化。","C":"IL-1β為促發炎細胞激素、非此用途。","D":"GM-CSF+IL-4促單核球分化為樹突細胞—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-22":{"quick":"腫瘤可誘導微環境T細胞分化為Treg以逃避免疫,敘述正確。","detail":{"background":"調節型T細胞(Treg,表面「CD4+CD25+、轉錄因子Foxp3」)抑制免疫反應、維持耐受:①來源有「胸腺衍生(natural Treg)」與「周邊誘導(induced Treg)」兩種(『並非都在周邊』);②功能異常時——「Treg『不足/失能』會致自體免疫」(『過度活化』則造成免疫抑制與『腫瘤/慢性感染逃脫』,非致自體免疫);③「腫瘤可改造微環境(分泌TGF-β等)誘導T細胞分化為Treg、抑制抗腫瘤免疫以逃避追殺」(故A正確);④Treg表面標記為「CD4」(非CD8)。故A正確。","options":{"A":"腫瘤可誘導微環境T分化為Treg以逃避免疫—正解。","B":"Treg「不足/失能」才致自體免疫、非過度活化—錯誤。","C":"Treg有胸腺與周邊兩種來源、非都在周邊—錯誤。","D":"Treg帶CD4(非CD8)—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-23":{"quick":"LPS+IL-2+IL-21無法完全替代TFH誘導IgG1轉換(IgG1需IL-4),故D錯誤。","detail":{"background":"濾泡輔助T細胞(TFH)是生發中心反應與抗體成熟的關鍵:①位於生發中心的「淺色區(light zone)」;②分化需轉錄因子「Bcl-6」;③高表現CD40L、ICOS、PD-1、CXCR5,並分泌「IL-21」(促進B細胞分化為漿細胞、生發中心反應)與IL-4等。重點:在小鼠B細胞體外刺激中,「不同抗體類別轉換需要不同細胞激素」——「IgG1轉換主要需要IL-4」;單以「LPS+IL-2+IL-21」缺乏IL-4,「無法有效替代TFH誘導IgG1」。故D最不適當(敘述錯誤)。","options":{"A":"TFH位於生發中心淺色區,正確。","B":"TFH分化需Bcl-6,正確。","C":"TFH分泌IL-21促漿細胞分化,正確。","D":"LPS+IL-2+IL-21缺IL-4、無法替代TFH誘導IgG1—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-25":{"quick":"肉芽腫中心周圍排列的活化巨噬細胞稱為「類上皮細胞(epithelioid cells)」。","detail":{"background":"當吞噬細胞無法清除胞內病原(如結核分枝桿菌)時,會形成「肉芽腫(granuloma)」局限感染:中心可有乾酪樣壞死(結核),周圍由「活化的巨噬細胞轉變成『類上皮細胞(epithelioid cells)』」(胞質豐富、排列緊密如上皮)以及融合的「Langhans多核巨細胞」包繞,外層為CD4 T淋巴細胞與纖維母細胞。類上皮細胞是肉芽腫的特徵性細胞(由巨噬細胞活化而來,非真正上皮細胞)。漿細胞、壞死嗜中性球並非肉芽腫中心整齊排列的那層細胞。故為類上皮細胞。","options":{"A":"非真正上皮細胞。","B":"類上皮細胞(活化巨噬細胞)包圍肉芽腫中心—正解。","C":"漿細胞非肉芽腫中心整齊排列的細胞層。","D":"壞死嗜中性球非該層細胞。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-26":{"quick":"「株落增殖(clonal proliferation)」是免疫活化反應,並非達成自我耐受的機轉。","detail":{"background":"自我耐受(self-tolerance)的機轉:①「中樞耐受(central tolerance)」——在胸腺/骨髓對自體反應細胞進行「株落刪除(clonal deletion,負選擇)」或受體編輯;②「周邊耐受(peripheral tolerance)」——「周邊無能(anergy)」、Treg抑制、活化誘導死亡(Fas)等。而「株落增殖(clonal proliferation)」是淋巴細胞「遇到抗原被『活化』後大量增生」的反應,是「啟動免疫」而非「建立耐受」。故不是自我耐受機轉者為株落增殖。","options":{"A":"周邊無能為周邊耐受機制。","B":"株落刪除為中樞耐受機制。","C":"株落增殖為免疫活化、非耐受機制—正解。","D":"中樞耐受為自我耐受機制。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108100-27":{"quick":"類固醇「誘導(而非降低)內核酸酶」促進淋巴球凋亡;其餘抗發炎作用敘述正確,故D為例外。","detail":{"background":"糖皮質類固醇(corticosteroid)的免疫抑制/抗發炎作用:①「降低促發炎細胞激素生成」(IL-1、TNF-α、IL-2、IL-4、IL-5等);②「抑制磷脂酶A2與COX,降低前列腺素(prostaglandins)、白三烯(leukotrienes)」;③「降低黏著分子表現」、抑制白血球聚集;④「在淋巴球中『誘導(增加)內核酸酶(endonuclease)』活性,促使DNA斷裂、淋巴球『凋亡(apoptosis)』」。故「降低內核酸酶生成」與其『誘導內核酸酶致淋巴球凋亡』的作用相反,為例外(非其作用)。","options":{"A":"降低IL-1、TNF-α、IL-4、IL-5生成,為其作用。","B":"降低前列腺素、白三烯,為其作用。","C":"降低黏著分子,為其作用。","D":"類固醇誘導(非降低)內核酸酶致凋亡—正解(例外)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-20":{"quick":"CD3複合體帶的是ITAM(活化模體)而非ITIM(抑制模體),故D錯誤。","detail":{"background":"TCR需與CD3組成複合體才能傳訊:①TCR的α、β鏈「胞內段非常短、無法進行訊息傳遞」;②TCR須「與CD3複合體結合才能表現於細胞表面」並穩定;③「CD3複合體的胞內段帶有『免疫受體酪胺酸活化模體(ITAM)』」,TCR辨識抗原後ITAM被酪胺酸激酶(Lck)磷酸化、招募ZAP-70啟動下游『活化』訊息。而「ITIM(免疫受體酪胺酸『抑制』模體)」是抑制性受體(如FcγRIIB、PD-1、CTLA-4)所帶,「會抑制而非促進訊息」,且不是CD3所帶。故D「CD3帶ITIM促進訊息」錯誤。","options":{"A":"TCR胞內段短、無法傳訊,正確。","B":"TCR與CD3結合才表現於表面,正確。","C":"CD3帶ITAM促進胞內訊息,正確。","D":"CD3帶的是ITAM而非ITIM(ITIM為抑制性)—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-22":{"quick":"分泌IL-17的CD4 T細胞(Th17)主要功能是清除胞外細菌(及真菌)感染。","detail":{"background":"CD4效應T細胞依分泌的細胞激素分工:①「Th1(IFN-γ)」——活化巨噬細胞清除「胞內病原」;②「Th2(IL-4/5/13)」——對抗「寄生蟲」、參與過敏;③「Th17(IL-17、IL-22)」——招募嗜中性球、誘導抗菌肽,主要清除「胞外細菌與真菌」(黏膜防禦,缺陷致慢性黏膜念珠菌病);④「Treg」——抑制免疫。故分泌IL-17者(Th17)主要清除胞外細菌(真菌)感染。","options":{"A":"清除胞內病原為Th1功能。","B":"Th17(分泌IL-17)主要清除胞外細菌(真菌)—正解。","C":"毒殺胞外寄生蟲主要與Th2/嗜酸性球有關。","D":"抑制過度發炎為Treg功能。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-18":{"quick":"IFN-α使正常細胞進入抗病毒狀態(不易被病毒感染),敘述正確。","detail":{"background":"干擾素-α(IFN-α)屬「第一型干擾素」、是「先天免疫」的抗病毒細胞激素:①「主要由病毒感染的細胞與漿細胞樣樹突細胞(pDC)產生」(IFN-γ才主要由活化T/NK產生);②以旁分泌作用使「鄰近正常細胞進入『抗病毒狀態』」(誘導PKR、2-5A合成酶等,抑制病毒蛋白質合成),使其「不易被病毒感染或限制病毒複製」;③屬「先天免疫」(非適應性);④非趨化激素。故B正確。","options":{"A":"IFN-α非趨化激素—錯誤。","B":"使正常細胞進入抗病毒狀態、不易被感染—正解。","C":"屬先天免疫而非適應性—錯誤。","D":"主要由病毒感染細胞/pDC產生(非活化T細胞)—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-19":{"quick":"先天免疫細胞主要靠「趨化素受體(chemokine receptors)」的刺激遷移至感染處。","detail":{"background":"感染處的先天免疫細胞招募(白血球趨化):受傷/感染組織釋放「趨化素(chemokines)」形成濃度梯度,血中白血球(嗜中性球、單核球等)表面的「趨化素受體(chemokine receptors,G蛋白偶聯)」受刺激後活化整合素、沿梯度「定向遷移(chemotaxis)」至感染區發揮功能。TCR/BCR是適應性淋巴球的抗原受體(辨識抗原非主導遷移)、Toll-like受體偵測PAMP(觸發發炎)但「主導遷移定向的是趨化素受體」。故為趨化素受體。","options":{"A":"TCR為T細胞抗原受體、非主導遷移。","B":"BCR為B細胞抗原受體、非主導遷移。","C":"趨化素受體刺激先天免疫細胞遷移至感染處—正解。","D":"TLR偵測PAMP觸發發炎、非主導定向遷移。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-22":{"quick":"IFN-γ為免疫調節細胞激素,與CTL的直接毒殺作用無直接關聯。","detail":{"background":"毒殺性T細胞(CTL)直接殺傷標的細胞的分子:①「穿孔素(perforin)」在標的細胞膜打孔;②「顆粒酶(granzyme)」經孔進入啟動caspase致凋亡;③「FasL」與標的細胞Fas結合誘導凋亡。這三者「直接執行毒殺」。「IFN-γ」雖由CTL分泌,但其作用是「活化巨噬細胞、上調MHC、抗病毒等『免疫調節』」,「與直接毒殺標的細胞無直接關聯」。故與CTL毒殺無直接關聯者為IFN-γ。","options":{"A":"FasL介導凋亡、與毒殺直接相關。","B":"穿孔素直接參與毒殺。","C":"顆粒酶直接誘導凋亡。","D":"IFN-γ為免疫調節、與直接毒殺無直接關聯—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-26":{"quick":"中樞耐受:中樞淋巴器官(胸腺)經AIRE呈現多種周邊組織抗原,以清除自體反應淋巴細胞。","detail":{"background":"自我耐受分中樞與周邊:①「中樞耐受(central tolerance)」發生在「中樞(初級)淋巴器官——胸腺(T細胞)與骨髓(B細胞)」:胸腺髓質上皮細胞藉「AIRE(autoimmune regulator)」異位表現『眾多周邊組織特異抗原』,把對自體強烈反應的T細胞「負選擇刪除(或轉成Treg)」;②「周邊耐受」則靠無能、Treg抑制、活化誘導死亡與「抗原隔離(免疫豁免部位)」等。故中樞耐受的特性是「在胸腺呈現多種周邊組織抗原以消除自體反應淋巴細胞」(B)。「在淋巴結消除」「細胞激素偏移」「組織隔絕」皆屬周邊機制或非中樞耐受定義。","options":{"A":"在淋巴結消除屬周邊機制、非中樞耐受。","B":"胸腺(經AIRE)呈現周邊組織抗原以消除自體反應細胞—正解。","C":"細胞激素偏移屬周邊調節、非中樞耐受。","D":"組織隔絕(抗原隔離)屬周邊機制。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-18":{"quick":"CD8 T細胞經TCR-MHC I直接毒殺,不執行ADCC;「CD8 T細胞進行ADCC」錯誤。","detail":{"background":"流感(病毒)的免疫清除時序:①「數小時內」——感染細胞與先天免疫產生「第一型/第三型干擾素」,使肺部細胞進入抗病毒狀態;②「數小時至數天」——「自然殺手細胞(NK)」殺死被病毒感染(MHC I下降)的細胞;③「數天後」——適應性免疫啟動,「CD8 T細胞經TCR辨識感染細胞MHC I上的病毒胜肽而『直接毒殺』(穿孔素/顆粒酶)」,B細胞分化為漿細胞分泌「中和抗體」清除病毒。重點:「抗體依賴細胞毒殺(ADCC)」是由「NK細胞(經其Fc受體辨識抗體包覆的細胞)」執行,「『CD8 T細胞不進行ADCC』」。故C「CD8 T細胞進行ADCC」錯誤。","options":{"A":"數小時內產生干擾素使肺細胞進入抗病毒狀態,正確。","B":"NK細胞殺死被感染細胞,正確。","C":"ADCC由NK執行、CD8 T細胞不進行ADCC—錯誤(正解)。","D":"B細胞分化為漿細胞分泌中和抗體,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-19":{"quick":"濾泡輔助T細胞(TFH)主要分泌的細胞激素為IL-21。","detail":{"background":"濾泡輔助T細胞(TFH)是生發中心反應的核心輔助細胞,高表現CXCR5(進入濾泡)、ICOS、PD-1、CD40L,轉錄因子為Bcl-6。其「主要分泌的細胞激素為『IL-21』」——促進B細胞增生、生發中心形成、體細胞超突變/親和力成熟與漿細胞分化(亦分泌IL-4協助類別轉換)。IL-22(Th22/Th17,上皮防禦)、IL-23(由樹突/巨噬分泌,維持Th17)、IL-27(調節)皆非TFH主要分泌物。故為IL-21。","options":{"A":"TFH主要分泌IL-21—正解。","B":"IL-22主要與Th22/Th17相關。","C":"IL-23由樹突/巨噬分泌、維持Th17。","D":"IL-27為調節性細胞激素。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-25":{"quick":"RORγt對應的是IL-17(Th17),與「IL-12」相關性最低。","detail":{"background":"CD4效應T細胞的「主轉錄因子—代表細胞激素」配對:①「Th2——GATA3——IL-4/IL-5/IL-13」;②「Treg——Foxp3——TGF-β/IL-10」;③「Th1——T-bet——IFN-γ」;④「Th17——RORγt——IL-17/IL-22」。其中「IL-12」是『誘導Th1』的細胞激素(由樹突/巨噬分泌),與Th1的T-bet/IFN-γ相關。故「RORγt(Th17主轉錄因子)」與「IL-12」的配對「相關性最低」(RORγt對應的是IL-17而非IL-12)。","options":{"A":"GATA3對應IL-4(Th2),配對正確。","B":"Foxp3對應TGF-β(Treg),配對合理。","C":"RORγt對應IL-17、與IL-12相關性最低—正解。","D":"T-bet對應IFN-γ(Th1),配對正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111100-21":{"quick":"CTL內在(粒線體)凋亡途徑的主要「抑制(調節)」分子為Bcl-2家族(抗凋亡)。","detail":{"background":"凋亡兩條途徑:①「外在途徑」——死亡受體(Fas/FasL、TNF)觸發;②「內在(粒線體)途徑」——細胞壓力使粒線體外膜通透,釋出細胞色素c形成apoptosome、活化caspase-9→caspase-3。內在途徑由「Bcl-2家族」調控其平衡:「抗凋亡成員(Bcl-2、Bcl-xL)『抑制』」粒線體通透、「促凋亡成員(Bax、Bak、BH3-only)促進」之。題問「主要『調節抑制』內在途徑的分子」——即「抗凋亡的Bcl-2家族」。Bax為促凋亡、caspase-3為執行者、p53為上游促凋亡轉錄因子。故為Bcl-2 family。","options":{"A":"Bcl-2家族(抗凋亡)為內在途徑的主要抑制調節分子—正解。","B":"Bax家族為促凋亡(非抑制)。","C":"caspase-3為執行者(effector caspase)。","D":"p53為上游促凋亡轉錄因子。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-21":{"quick":"正選擇:胸腺細胞辨識胸腺上皮MHC-胜肽並引發「中等」TCR訊號者被選出繼續發育。","detail":{"background":"胸腺中的T細胞選擇:①「正選擇(positive selection)」發生於皮質——雙陽性(CD4+CD8+)胸腺細胞的TCR「若能以『適中(中等強度)』親和力辨識胸腺『皮質上皮細胞』表面的自身MHC-胜肽」,即獲存活訊號被選出繼續發育(確保MHC限制);完全不能辨識MHC者「因疏忽而死亡(death by neglect)」;②「負選擇(negative selection)」發生於髓質——對自身MHC-胜肽「過強」反應者被「凋亡刪除」(AIRE表現周邊抗原協助此過程)。故正選擇的最適當敘述為B(中等TCR訊號者被選出)。A屬負選擇/AIRE、C為疏忽而死、D為負選擇。","options":{"A":"AIRE促周邊抗原表現屬負選擇/髓質,非正選擇。","B":"辨識MHC-胜肽引發中等TCR訊號者被選出—正解(正選擇)。","C":"無法辨識MHC者因疏忽死亡、非被選出。","D":"辨識自身MHC過強而凋亡屬負選擇。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-22":{"quick":"注射抗IL-4使免疫偏離Th2、增強Th1清除利什曼原蟲;機轉是抑制Th2反應。","detail":{"background":"利什曼原蟲(Leishmania major)是「胞內」寄生原蟲,清除需「Th1(IFN-γ活化巨噬細胞殺菌)」反應;若偏向「Th2(IL-4)」則巨噬細胞無法殺菌、感染惡化(此為Th1/Th2平衡的經典小鼠模型,易感品系偏Th2)。實驗中「注射抗IL-4抗體(中和IL-4)」可「抑制Th2反應」、使免疫偏向Th1,增強對胞內利什曼的清除而提高存活率。故其機轉是抑制Th2 response。","options":{"A":"抗IL-4並非抑制Th1(反而促Th1)。","B":"非抑制Th17。","C":"抗IL-4中和IL-4、抑制Th2反應—正解。","D":"非抑制趨化反應。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-23":{"quick":"TD抗原活化B的第一訊號來自抗原與BCR結合,A把第一訊號歸給MHC-TCR為錯誤。","detail":{"background":"TD與TI抗原:①「胸腺依賴(TD)抗原」多為「蛋白質」,B細胞完全活化需『兩個訊號』——『第一訊號是抗原與BCR結合』(B再以MHC II呈現胜肽給T),『第二訊號是B的CD40與T的CD40L結合』(及細胞激素)。題A把「第一訊號」說成『B的MHC-peptide與T的TCR結合』,實際那是B呈現抗原給T、屬第二訊號相關,『第一訊號應為抗原-BCR』,故A敘述錯誤;②「TI-1抗原(如LPS)」可不需T細胞、經有絲分裂原方式活化B(高劑量多株、非專一),「TI-2抗原(如多醣重複表位)」交聯BCR活化;③TD與TI-2經BCR辨識,TI-1可經BCR或非BCR;④嬰兒B細胞(對TI-2多醣反應不成熟)易感「莢膜菌」。故A錯誤。","options":{"A":"TD抗原第一訊號為抗原-BCR結合、非MHC-TCR—錯誤(正解)。","B":"LPS為TI-1、高劑量致非專一多株反應,正確。","C":"TD/TI-2經BCR辨識、TI-1可BCR或非BCR,正確。","D":"嬰兒B細胞未成熟易感莢膜菌,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-26":{"quick":"作用於「發炎處(周邊)」的自我耐受機制是調節型T細胞(Treg)。","detail":{"background":"自我耐受機制依作用位置:①「中樞耐受(central tolerance)」與「負選擇(negative selection)」——發生於『胸腺/骨髓』;②「抗原隔離(antigen segregation)」——把抗原侷限在『免疫豁免部位(眼、腦、睪丸)』使淋巴球接觸不到;③「調節型T細胞(Treg)」——屬『周邊耐受』,可遷移至「發炎/感染的周邊組織」現場,以分泌IL-10/TGF-β、消耗IL-2、抑制抗原呈現等方式『就地抑制』過度或自體免疫反應。故作用位置在「發炎處」者為Treg。","options":{"A":"中樞耐受發生於胸腺、非發炎處。","B":"抗原隔離發生於免疫豁免部位、非發炎處。","C":"負選擇發生於胸腺、非發炎處。","D":"調節型T細胞於發炎處(周邊)抑制反應—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-27":{"quick":"雷帕黴素(rapamycin)相對保留/促進Treg,「降低Treg數目」錯誤。","detail":{"background":"雷帕黴素(rapamycin/sirolimus)為免疫抑制劑:①「與FK結合蛋白(FKBP12)結合」,形成複合體「抑制mTOR(mTORC1)」;②阻斷T細胞對IL-2的增生訊號,「抑制T細胞(白血球)增生(proliferation)」並可促進活化T細胞凋亡;③用於器官移植抗排斥。重點:抑制mTOR「『相對保留甚至擴增』調節型T細胞(Treg)」(因Treg較不依賴mTOR/PI3K路徑、且rapamycin抑制效應T更多),「並『不』降低Treg數目」——這正是rapamycin被研究用於誘導耐受的原因。故D「降低Treg數目」錯誤。","options":{"A":"與FKBP結合,正確。","B":"可促進(活化)白血球凋亡,正確。","C":"抑制白血球增生,正確。","D":"rapamycin相對保留/促進Treg、非降低其數目—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-18":{"quick":"胸腺(thymus)是「中樞(初級)」淋巴器官,並非周邊免疫器官。","detail":{"background":"淋巴器官分:①「中樞(初級)淋巴器官」——「胸腺(T細胞成熟)」與「骨髓(B細胞生成成熟)」,是淋巴球發育成熟的場所;②「周邊(次級)淋巴器官」——「淋巴結、脾臟、扁桃腺與黏膜相關淋巴組織(MALT,如Peyer’s patch)」,是成熟淋巴球與抗原相遇、啟動適應性免疫反應的場所。故介紹「周邊免疫器官」時若指向「胸腺」即為錯誤(胸腺屬中樞)。扁桃腺、淋巴結、脾皆為周邊。","options":{"A":"扁桃腺為周邊淋巴器官。","B":"淋巴結為周邊淋巴器官。","C":"脾臟為周邊淋巴器官。","D":"胸腺為中樞(初級)淋巴器官、非周邊—正解(錯誤示範)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-20":{"quick":"TCR(與抗體)的抗原結合區中,「CDR3」變異度最大。","detail":{"background":"抗原受體(TCR/BCR)的抗原結合面由三個互補決定區(CDR1、CDR2、CDR3)構成:①「CDR1、CDR2」由「V基因片段」本身編碼,變異度較低;②「CDR3」位於「V(D)J(或VJ)基因片段的『接合處』」,因D片段、接合處核苷酸增刪(N核苷酸)而「變異度最大」,是直接接觸抗原胜肽(MHC呈現)的關鍵區。沒有CDR4。故變異度最大者為CDR3。","options":{"A":"CDR1由V片段編碼、變異度較低。","B":"CDR2由V片段編碼、變異度較低。","C":"CDR3位於接合處、變異度最大—正解。","D":"無CDR4。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-22":{"quick":"fingolimod(FTY720)作用於S1P受體(S1PR1),使淋巴球滯留淋巴結無法外流。","detail":{"background":"口服免疫調節劑「芬戈莫德(fingolimod, FTY720)」用於多發性硬化症,其機轉是「鞘胺醇-1-磷酸(S1P)受體調節劑」:fingolimod磷酸化後與T(及B)淋巴球表面的「S1P受體1(S1PR1)」結合並使其內化/下調,「使淋巴球失去隨S1P梯度離開淋巴結的能力、被『扣留(隔離)在次級淋巴器官』」,因而減少循環中自體反應淋巴球進入中樞神經,降低發炎。故機轉為作用於S1PR1路徑使淋巴球無法外流(題述以S1PR1為解)。非ADCC、非減IL-2、非阻斷IL-6訊號。","options":{"A":"非阻斷自體抗體ADCC。","B":"非以減少IL-2為主要機轉。","C":"非阻斷IL-6-IL6R的JAK/STAT。","D":"作用於S1PR1使淋巴球被扣留在淋巴結—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-24":{"quick":"口服耐受(oral tolerance)可能與分泌TGF-β的T輔助(調節)細胞有關。","detail":{"background":"口服耐受(oral tolerance)是黏膜免疫對「經口攝入的食物/共生抗原」建立的『主動』耐受,以避免對無害抗原過度反應。機制:①腸道環境(TGF-β、IL-10、視黃酸)使樹突細胞偏向耐受、誘導「分泌TGF-β/IL-10的調節型T細胞(如Th3/iTreg)」,抑制反應(故D正確);②並涉及周邊無能與刪除——「並非因消化成小分子就不刺激免疫、也不是在胸腺去除、也非所有食物都引發」。故與「分泌TGF-β的T輔助細胞」有關。","options":{"A":"非僅因小分子不刺激免疫—錯誤。","B":"非在胸腺去除相關T細胞(屬周邊耐受)—錯誤。","C":"非所有食物都引發口服耐受—錯誤。","D":"可能與分泌TGF-β的T輔助(調節)細胞有關—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_113090-22":{"quick":"促進B細胞抗體類別轉換相關性最高者為T細胞表面分子「CD40 ligand」。","detail":{"background":"抗體「類別轉換(isotype/class switch)」需要T細胞輔助訊號:活化的輔助T細胞(尤其TFH)表面「CD40 ligand(CD40L/CD154)」與B細胞「CD40」結合,提供B細胞進行類別轉換重組(配合AID)的關鍵訊號,並由不同細胞激素導向特定類別(IL-4→IgE/IgG1、TGF-β→IgA、IFN-γ→IgG2a)。故與促進類別轉換「相關性最高」的T細胞表面分子是「CD40 ligand」。IL-2(增生)、IL-10(調節)、CD28(共刺激T細胞自身)雖參與免疫,但對B細胞類別轉換的直接驅動以CD40L最關鍵。","options":{"A":"IL-2主促T細胞增生、非類別轉換主驅。","B":"IL-10為調節性、非類別轉換主驅。","C":"CD40 ligand與B細胞CD40結合驅動類別轉換—正解。","D":"CD28為T細胞共刺激分子、非B細胞類別轉換主驅。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-18":{"quick":"先天免疫缺乏專一性與有效記憶,最為適當。","detail":{"background":"先天(innate)免疫的特性:①「能有效『移除』病原」(吞噬、補體、NK殺傷、抗菌肽等),不只是監測;②「『缺乏抗原專一性』、也缺乏典型的『免疫記憶』(不像適應性免疫有專一記憶)」——這是先天與適應性免疫的關鍵區別(B正確);③先天免疫有嚴格的受體與調控(辨識PAMP),「並非摧毀一切、需後天抑制」;④其分泌的細胞激素/趨化素在正常調控下並非「沒有後天免疫就有毒」。故最適當為B。","options":{"A":"先天免疫能有效移除病原、非只監測—錯誤。","B":"先天免疫無專一性、缺乏有效記憶—正解。","C":"先天免疫有受體調控、非摧毀一切—錯誤。","D":"先天細胞激素受調控、非無後天就有毒—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-19":{"quick":"感染處最快到達的血中免疫細胞是嗜中性白血球(neutrophil)。","detail":{"background":"急性發炎時白血球招募的「時序」:①「嗜中性球(neutrophil)」反應最快、「最先(數小時內)大量湧入感染處」(故膿液主成分),進行吞噬與釋放抗菌物質、形成NETs;②「單核球/巨噬細胞」隨後到達(數小時至數天),清理與調節;③淋巴球(B、CD8 T、NK)屬適應性或較後期反應,非「最快」到達感染處者。故最快到達者為嗜中性白血球。","options":{"A":"B細胞屬適應性、非最快到達。","B":"NK細胞較後、非最先湧入。","C":"嗜中性白血球最快到達感染處—正解。","D":"CD8毒殺T細胞屬適應性、較後到達。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-22":{"quick":"T淋巴細胞的生成與發育(成熟)位置為胸腺(thymus)。","detail":{"background":"淋巴球的生成成熟場所:①「T淋巴細胞」——前驅細胞由骨髓產生後,「遷移至『胸腺(thymus)』進行發育、選擇(正/負選擇)與成熟」(故稱T=thymus);②「B淋巴細胞」——在「骨髓」中發育成熟。成熟後的T、B細胞再進入周邊(次級)淋巴器官(淋巴結、脾、MALT)執行功能。肺臟、脾臟、淋巴結皆非T細胞「發育成熟」的器官。故為胸腺。","options":{"A":"肺臟非T細胞發育場所。","B":"脾臟為周邊淋巴器官、非T細胞發育成熟處。","C":"淋巴結為周邊淋巴器官、非T細胞發育處。","D":"胸腺為T淋巴細胞發育成熟的器官—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114090-23":{"quick":"腸道穩態下樹突細胞受TGF-β與IL-10影響、增進對共生菌的耐受性。","detail":{"background":"在無感染的腸道穩態下,黏膜「樹突細胞(DC)」傾向「維持耐受」而非啟動強烈免疫:①腸道微環境的「TGF-β與IL-10」使DC呈現「耐受性表型」,增進對共生菌的耐受(誘導Treg、IgA);②穩態下DC「不大量分泌IL-12」(避免促Th1發炎)、共刺激分子(B7-1/CD80)表現較低(非高效能活化);③腸道DC可製造「視黃酸(retinoic acid)」,但其作用是「促進Treg分化與IgA類別轉換、誘導腸道歸巢」,「並非增進T毒殺細胞功能」。故最常見特徵為C(TGF-β/IL-10增進對共生菌耐受)。","options":{"A":"穩態下腸道DC不大量分泌IL-12—錯誤。","B":"穩態下共刺激分子低、非高效能APC—錯誤。","C":"TGF-β與IL-10增進DC對共生菌的耐受—正解。","D":"視黃酸促Treg/IgA、非增進毒殺T細胞—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-21":{"quick":"分泌IL-10的調節型CD4 T細胞扮演最重要的免疫抑制功能。","detail":{"background":"CD4效應T細胞分泌的細胞激素功能不同:①「IL-4」——Th2,促IgE/過敏、抗寄生蟲;②「IL-12」——是『誘導Th1』的細胞激素(由樹突/巨噬分泌),促發炎方向;③「TNF-α」——促發炎;④「IL-10」——由「調節型T細胞(Treg)」等分泌,是「最重要的免疫『抑制(抗發炎)』細胞激素」,抑制抗原呈現、促發炎細胞激素生成與T細胞反應(與TGF-β共為主要抑制性細胞激素)。故扮演最重要免疫抑制功能者為IL-10。","options":{"A":"IL-4為Th2促過敏、非主要抑制。","B":"IL-10為主要免疫抑制細胞激素—正解。","C":"IL-12促Th1/發炎、非抑制。","D":"TNF-α為促發炎、非抑制。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111100-23":{"quick":"口服耐受最可能經由抑制性細胞激素TGF-β(及IL-10)來達成。","detail":{"background":"口服耐受(oral tolerance)是黏膜免疫對經口攝入的食物與共生抗原建立的主動耐受,以避免對無害抗原過度反應。其關鍵機制是腸道環境誘導「調節型T細胞(如Th3/iTreg)」分泌「抑制性細胞激素TGF-β(以及IL-10)」,抑制效應T細胞反應、促進對該抗原的耐受(TGF-β亦促進腸道IgA類別轉換)。TNF-α、IL-2(促T增生)、IL-5(嗜酸性球/Th2)皆為促發炎或活化方向,非建立口服耐受的主要細胞激素。故為TGF-β。","options":{"A":"TGF-β(抑制性)為口服耐受的關鍵細胞激素—正解。","B":"TNF-α為促發炎、非耐受。","C":"IL-2促T細胞增生、非耐受。","D":"IL-5促嗜酸性球/Th2、非耐受。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-23":{"quick":"此抗氣喘藥使IgE與Th2細胞激素下降,療效靠誘導調節型T細胞;與Th17(及Th1)最不相關(本題A、C均給分)。","detail":{"background":"第一型過敏(氣喘)的核心是「Th2反應(分泌IL-4、IL-5、IL-13)促B細胞產IgE、活化嗜酸性球與肥大細胞」。本題藥物使「抗原特異性IgE下降、Th2細胞激素(IL-4/5/13)偵測不到」,顯示其經「免疫調節(誘導耐受、抑制Th2)」起效——此效果與「調節型T細胞(如TR1、CD4+CD25+Foxp3 Treg,分泌IL-10/TGF-β抑制Th2)」有關。而「Th17(分泌IL-17抗胞外菌/真菌)」與「Th1(IFN-γ,抗胞內病原)」與此抑制Th2、降IgE的療效「最不相關」。本題公告「A、C均給分」(Th1與Th17皆與此療效最不可能相關)。","options":{"A":"Th1(IFN-γ)與抑制Th2降IgE療效最不相關(本題判給分)。","B":"TR1為調節型T細胞、與誘導耐受相關。","C":"Th17與抑制Th2降IgE療效最不相關—正解。","D":"CD4+CD25+ Treg與誘導耐受相關。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-25":{"quick":"檢測過敏原特異性抗體主要是檢查血清中的IgE。","detail":{"background":"第一型(immediate/IgE介導)過敏(如過敏性鼻炎、氣喘、食物過敏)的免疫核心是「過敏原特異性IgE」:過敏原使Th2分泌IL-4促B細胞轉換產生IgE,IgE結合肥大細胞/嗜鹼球的高親和力受體FcεRI,再次接觸過敏原時交聯IgE使其去顆粒釋放組織胺等介質。臨床檢測「血清中對特定過敏原的特異性IgE(specific IgE,如ImmunoCAP)」可協助診斷過敏原,並可做皮膚點刺試驗。IgM、IgG、IgA非過敏原特異性檢測的主要抗體。故為IgE。","options":{"A":"IgM非過敏原檢測抗體。","B":"IgG非過敏原特異性檢測主體。","C":"過敏原特異性檢測主要測IgE—正解。","D":"IgA非過敏原檢測抗體。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-26":{"quick":"抗乙醯膽鹼受體抗體引起重症肌無力(第二型過敏,受體型)。","detail":{"background":"針對「細胞表面受體」的自體抗體可造成第二型過敏(抗體介導)或第五型(受體刺激/阻斷)的器官特異性自體免疫病:①「重症肌無力(myasthenia gravis)」——「抗乙醯膽鹼受體(anti-AChR)抗體」阻斷/破壞神經肌肉接合處的AChR,造成「易疲勞性肌肉無力(眼瞼下垂、複視)」;②葛瑞夫茲病——抗TSH受體刺激性抗體。對照:尋常天疱瘡(抗desmoglein-3,表皮)、多發性硬化症(T細胞攻擊髓鞘)、紅斑性狼瘡(抗核抗體、免疫複合體)機轉不同。故抗AChR抗體引起重症肌無力。","options":{"A":"抗AChR抗體引起重症肌無力—正解。","B":"尋常天疱瘡為抗desmoglein-3。","C":"多發性硬化症為T細胞攻擊髓鞘。","D":"紅斑性狼瘡為抗核抗體/免疫複合體。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-25":{"quick":"與自體免疫疾病相對危險值最高的基因類別是人類白血球抗原(HLA/MHC)基因。","detail":{"background":"與自體免疫疾病關聯性最強(相對危險值relative risk最高)的遺傳因素是「人類白血球抗原(HLA,即MHC)基因」的特定對偶基因。經典例子:HLA-B27與僵直性脊椎炎(相對危險值極高)、HLA-DR4與類風濕關節炎、HLA-DQ2/DQ8與乳糜瀉、HLA-DR3與第一型糖尿病/SLE等。HLA分子決定哪些(自身)胜肽被呈現給T細胞,因而影響自體免疫易感性。GM-CSF、CD4、Cdc42等基因雖與免疫有關,但與自體免疫的相對危險值不如HLA高。故為HLA。","options":{"A":"人類白血球抗原(HLA/MHC)基因相對危險值最高—正解。","B":"GM-CSF基因非自體免疫最強關聯。","C":"CD4基因非自體免疫最強關聯。","D":"Cdc42基因非自體免疫最強關聯。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-26":{"quick":"類風濕關節炎是自體免疫淋巴細胞反應與自體抗體所致的關節侵犯。","detail":{"background":"類風濕關節炎(rheumatoid arthritis, RA)是「自體免疫性、慢性、對稱性多關節炎」:自體反應的T、B淋巴細胞與「自體抗體(類風濕因子RF、抗瓜胺酸化蛋白抗體anti-CCP)」、發炎細胞激素(TNF-α、IL-6)驅動「滑膜增生(血管翳pannus)」,侵蝕軟骨與骨,典型侵犯「近端指間關節(PIP)、掌指關節、腕」等小關節並有晨僵。它「不是」巨噬細胞功能低下、「不是」風濕熱(那是A群鏈球菌後分子相似致心臟/關節)、「不是」感染直接後遺。故A正確(自體免疫性淋巴反應與自體抗體所致)。","options":{"A":"RA由自體免疫淋巴反應與自體抗體侵犯關節—正解。","B":"非巨噬細胞功能低下所致。","C":"非風濕熱的一部分。","D":"非感染症直接後遺。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-25":{"quick":"過敏原與一般抗原相同,需經抗原呈現細胞活化T細胞,最為正確。","detail":{"background":"第一型過敏(如氣喘)的過敏原(allergen)本質仍是「抗原」:①「與一般抗原相同,需先由抗原呈現細胞(DC)處理、呈現給CD4 T細胞活化」(在易感者導向Th2、產IgE),故A正確;②過敏「受遺傳與環境共同影響」,「同卵雙胞胎對特定過敏原『不一定』有完全相同反應(一致率高但非100%)」;③「並非所有過敏原都具蛋白酶活性」(部分塵蟎/花粉過敏原有蛋白酶輔助,但非全部);④雖多數IgE介導過敏可測到特異性IgE,但「『都』可檢出」之絕對化敘述不夠嚴謹。故最正確為A。","options":{"A":"過敏原須經抗原呈現細胞活化T細胞,最正確—正解。","B":"同卵雙胞胎反應不一定完全相同—錯誤。","C":"非所有過敏原都具蛋白酶功能—錯誤。","D":"「都」可檢出特異IgE之絕對化敘述不嚴謹—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-26":{"quick":"類風濕關節炎侵犯多處組織,屬「系統性」自體免疫疾病。","detail":{"background":"自體免疫病依侵犯範圍分:①「器官特異性」——只侵犯單一器官,如自體溶血性貧血(紅血球)、自體免疫愛迪森病(腎上腺)、橋本氏甲狀腺炎(甲狀腺)、第一型糖尿病(胰島)、重症肌無力;②「系統性(全身性)」——侵犯多種器官/組織,如「類風濕關節炎(關節、肺、血管、皮下結節等)」、系統性紅斑性狼瘡(皮膚、腎、關節、血液、CNS)、硬皮症。故四者中屬系統性者為類風濕關節炎(其餘三者皆器官特異)。","options":{"A":"自體溶血性貧血為器官特異(紅血球)。","B":"自體免疫愛迪森病為器官特異(腎上腺)。","C":"橋本氏甲狀腺炎為器官特異(甲狀腺)。","D":"類風濕關節炎侵犯多處、屬系統性—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-25":{"quick":"塵蟎過敏發作時,活化的肥大細胞釋放發炎介質(第一型過敏)。","detail":{"background":"塵蟎過敏致過敏性鼻炎/結膜炎是典型「第一型(IgE介導、立即型)過敏」:過敏原使Th2產生IL-4/IL-5,B細胞產生「過敏原特異性IgE」結合肥大細胞FcεRI(致敏);再次接觸塵蟎時過敏原交聯IgE,「活化肥大細胞『去顆粒』釋放組織胺、白三烯、前列腺素等發炎介質」,造成血管擴張、黏液分泌、瘙癢、噴嚏(流鼻水、眼睛癢)。其特徵是IgE與肥大細胞,「並非高TGF-β、非遲發型(第四型)、非以IgA為主」。故發作時為肥大細胞釋放發炎介質。","options":{"A":"非以高TGF-β為特徵。","B":"第一型過敏為立即型、非遲發型(第四型)。","C":"特異抗體為IgE而非IgA。","D":"活化肥大細胞釋放發炎介質—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-25":{"quick":"長期使用抗生素破壞菌相反而「增加」氣喘風險,「可減少氣喘發生」錯誤。","detail":{"background":"衛生假說(hygiene hypothesis):①「先進/衛生良好的環境」使兒童早期接觸的微生物與寄生蟲減少,免疫偏向Th2,「過敏疾病比率較高」;②「早期較多感染或微生物暴露」可訓練免疫、偏向Th1/Treg而「預防過敏」;③「驅蟲、過度清潔」減少免疫調節刺激,易致過敏;④「長期/早期使用抗生素」會破壞腸道共生菌相(dysbiosis),「『增加』而非減少氣喘與過敏風險」。故D「長期使用抗生素可減少氣喘發生」與證據相反,為錯誤。","options":{"A":"先進國家衛生好、過敏比率較高,正確。","B":"驅蟲後較易過敏,正確。","C":"早期較多感染可預防過敏,正確。","D":"長期抗生素增加(非減少)氣喘風險—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-10":{"quick":"第四型過敏與發炎由T細胞媒介,涉及細胞激素與多形核白血球(本題B、C、D均給分)。","detail":{"background":"第四型(遲發型/細胞媒介)過敏由「T細胞」主導,不依賴抗體:致敏T細胞(Th1/CTL)再遇抗原後「分泌細胞激素(IFN-γ、TNF等)」活化並招募「巨噬細胞與多形核白血球(嗜中性球)」,造成組織發炎與破壞(如結核菌素反應、接觸性皮膚炎、病毒感染的免疫病理)。故與第四型過敏及發炎相關的因子是「T細胞、細胞激素、招募來的多形核白血球、干擾素」等。本題公告「B、C、D均給分」;「病毒抗體(A)」屬體液免疫,與第四型(細胞媒介)無關。","options":{"A":"病毒抗體屬體液免疫、與第四型過敏無關。","B":"干擾素(細胞激素)參與第四型發炎(本題判給分)。","C":"多形核白血球參與第四型發炎—正解。","D":"細胞激素參與第四型發炎(本題判給分)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-28":{"quick":"過敏(氣喘/異位性皮膚炎)病人最常見高比例分泌IL-5的Th2細胞與高濃度IgE。","detail":{"background":"氣喘、異位性皮膚炎等過敏性疾病以「Th2偏向」為核心:過敏原驅動CD4 T細胞分化為Th2,分泌「IL-4、IL-5、IL-13」——IL-4促B細胞「類別轉換產生IgE」、IL-5「活化嗜酸性球」、IL-13促黏液與氣道高反應。因此這類病人「最常檢測到『高比例分泌IL-5(Th2)的T細胞』與『血清中高濃度IgE』」。IFN-γ為Th1(對抗胞內病原)、IgA為黏膜抗體,皆非過敏的標誌。故為高Th2(IL-5)+高IgE。","options":{"A":"IgA非過敏標誌(應為IgE)—錯誤。","B":"高比例分泌IL-5的T細胞與高濃度IgE—正解。","C":"IFN-γ屬Th1、IgA非過敏標誌—錯誤。","D":"IFN-γ屬Th1、非過敏Th2偏向—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111100-25":{"quick":"已開發國家第一型過敏盛行率上升,最能以「衛生假說」解釋。","detail":{"background":"已開發國家「第一型過敏(氣喘、季節性鼻炎、異位性皮膚炎)」盛行率逐年上升,「衛生假說(hygiene hypothesis)」最能解釋:衛生條件改善、兒童早期接觸的微生物/寄生蟲/內毒素減少,使免疫缺乏足夠的Th1/Treg訓練而「偏向Th2(過敏方向)」,過敏疾病因而增加;腸道菌相多樣性下降亦有關。群體免疫(疫苗族群保護)、連結辨識(B-T協同活化)、正向篩選(胸腺T細胞選擇)皆與此流行病學趨勢無關。故為衛生假說。","options":{"A":"群體免疫與過敏盛行趨勢無關。","B":"衛生假說最能解釋過敏盛行率上升—正解。","C":"連結辨識為B-T協同機制、與此無關。","D":"正向篩選為胸腺T細胞選擇、與此無關。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111100-26":{"quick":"干擾CD23(IgE低親和受體)最不可能造成類自體免疫副作用;CTLA-4、FasL、FoxP3缺陷才會致自體免疫。","detail":{"background":"維持自我耐受的關鍵分子若被干擾,會導致「自體免疫(自體抗體、淋巴增生)」:①「CTLA-4」——T細胞抑制性共受體,缺陷致免疫過度活化與自體免疫(如CTLA-4單倍劑量不足);②「FasL(Fas-FasL)」——介導活化誘導細胞死亡(AICD),缺陷致「自體免疫淋巴增生症候群(ALPS,脾/淋巴結腫大、自體抗體)」;③「FoxP3」——調節型T細胞主轉錄因子,缺陷致「IPEX症候群(嚴重多器官自體免疫)」。而「CD23」是「IgE的低親和力受體(FcεRII)」,與過敏/IgE調節有關,「干擾它最不可能造成題述的自體免疫副作用」。故最不可能的分子為CD23。","options":{"A":"CTLA-4缺陷致自體免疫。","B":"FasL缺陷致自體免疫淋巴增生(ALPS)。","C":"FoxP3缺陷致IPEX(嚴重自體免疫)。","D":"CD23為IgE受體、干擾它最不可能致此自體免疫副作用—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-11":{"quick":"病毒感染引發全身性類感冒症狀(發燒、肌痛)最可能的因子是干擾素(及發炎細胞激素)。","detail":{"background":"病毒感染早期出現的「全身性類感冒症狀(發燒、肌肉痠痛、倦怠、頭痛)」主要由「先天免疫的細胞激素」引起,其中「第一型干擾素(IFN-α/β)」與其他促發炎細胞激素(IL-1、IL-6、TNF)是重要介質——它們作用於下視丘體溫調節中樞致發燒、引起肌痛與全身不適(這也是干擾素作為藥物時的常見副作用)。抗體與免疫複合體屬適應性/後期、T細胞為適應性反應,皆非病毒感染「初期全身類感冒症狀」的主要即時因子。故為干擾素。","options":{"A":"T細胞屬適應性、非初期類感冒症狀主因。","B":"干擾素(及發炎細胞激素)引發全身類感冒症狀—正解。","C":"抗體屬適應性後期。","D":"免疫複合體非初期類感冒症狀主因。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-25":{"quick":"嬰幼兒成長於很乾淨的家中(微生物暴露少)與第一型過敏最相關(衛生假說)。","detail":{"background":"依「衛生假說」,「嬰幼兒早期成長於過度乾淨、微生物暴露不足的環境」會使免疫缺乏Th1/Treg訓練而偏向Th2,「與第一型(IgE介導)過敏疾病的發生最相關」。相對地:「2歲前較多細菌感染、有麻疹/A肝等感染史」反而提供免疫刺激、「降低」過敏風險;「高濃度的IgG2a(小鼠Th1相關抗體)」屬Th1方向、非過敏標誌(過敏為IgE)。故與第一型過敏最相關者為「成長於很乾淨的家中」。","options":{"A":"嬰幼兒成長於很乾淨家中(暴露少)與過敏最相關—正解。","B":"早期細菌感染反而降低過敏風險。","C":"麻疹/A肝感染史傾向降低過敏。","D":"高IgG2a屬Th1方向、非過敏標誌。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-26":{"quick":"SLE的anti-dsDNA免疫複合體主要經TLR9(辨識CpG DNA)活化致病。","detail":{"background":"系統性紅斑性狼瘡(SLE)中,凋亡細胞核裂解釋出的「DNA、染色質」與「抗dsDNA自體抗體」形成「免疫複合體」;這些複合體被B細胞/漿細胞樣樹突細胞(pDC)內吞後,其中的「DNA在內體被『TLR9』辨識(TLR9辨識非甲基化CpG DNA)」,觸發I型干擾素與B細胞活化,放大自體免疫反應(RNA相關複合體則經TLR7)。故anti-dsDNA介導的致病主要活化「TLR9」。TLR1(脂蛋白)、TLR4(LPS)、TLR7(ssRNA)非辨識DNA者。","options":{"A":"TLR1辨識脂蛋白、非DNA。","B":"TLR4辨識LPS、非DNA。","C":"TLR7辨識ssRNA(與RNA複合體相關)。","D":"TLR9辨識CpG DNA、為anti-dsDNA致病主要TLR—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_113090-25":{"quick":"免疫性血小板缺乏症(ITP)由抗血小板抗體所致,屬第二型過敏反應。","detail":{"background":"第二型(抗體介導/細胞毒性)過敏:自體或外來抗體(IgG/IgM)結合「細胞表面或基質抗原」,經由補體活化、調理吞噬或ADCC破壞細胞。「免疫性(自體免疫)血小板缺乏症(immune thrombocytopenia, ITP)」即「抗血小板膜醣蛋白(如GPIIb/IIIa)的自體抗體」覆蓋血小板,使其在脾臟被巨噬細胞吞噬清除,造成血小板低下與出血傾向——屬「第二型過敏」。第一型(IgE/肥大細胞)、第三型(免疫複合體)、第四型(T細胞)機轉不同。故為type II。","options":{"A":"第一型為IgE/肥大細胞、非ITP。","B":"ITP由抗血小板抗體所致、屬第二型過敏—正解。","C":"第三型為免疫複合體沉積、非ITP。","D":"第四型為T細胞媒介、非ITP。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_113090-26":{"quick":"調節型T細胞主要以「抑制」維持耐受,而非以細胞毒殺移除自體細胞,故B錯誤。","detail":{"background":"維持自我耐受與自體免疫:①「免疫豁免部位(如眼、睪丸、子宮等)」的組織抗原平時與免疫系統隔離,「若創傷使其暴露於周邊免疫細胞」,可能誘發自體免疫(如交感性眼炎);②「調節型T細胞(Treg)」主要以「『抑制』方式維持耐受(分泌IL-10/TGF-β、消耗IL-2、抑制抗原呈現細胞)」,「『並非』以細胞毒殺移除自體細胞」;③「周邊無能(peripheral anergy)」指T細胞在周邊接收抗原訊號但「缺乏共同刺激(第二訊號)」時變成無反應/抑制;④「中樞耐受」在「骨髓與胸腺」建立。故B「Treg以細胞毒殺移除自體細胞」最不適當。","options":{"A":"免疫豁免部位創傷暴露抗原可誘發自體免疫,正確。","B":"Treg以抑制維持耐受、非細胞毒殺—錯誤(正解)。","C":"周邊無能指缺共刺激致失能,正確。","D":"中樞耐受在骨髓與胸腺建立,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-26":{"quick":"多發性硬化症主要由T細胞攻擊中樞神經髓鞘、影響中樞神經功能。","detail":{"background":"多發性硬化症(multiple sclerosis, MS)是「中樞神經系統的自體免疫脫髓鞘疾病」:自體反應的「T細胞(Th1/Th17)與巨噬細胞攻擊中樞神經(腦與脊髓)的『髓鞘』」,造成多處、不同時間的脫髓鞘斑塊,臨床表現視神經炎、感覺/運動障礙、複視、共濟失調等(時間與空間多發)。類風濕關節炎(關節)、克隆氏症(腸道)、紅斑性狼瘡(多系統,主要抗體/免疫複合體)皆非「以T細胞攻擊中樞神經」為主。故為多發性硬化症。","options":{"A":"類風濕關節炎主要侵犯關節。","B":"多發性硬化症由T細胞攻擊中樞神經髓鞘—正解。","C":"克隆氏症主要侵犯腸道。","D":"紅斑性狼瘡為多系統、抗體/免疫複合體為主。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114090-25":{"quick":"並非「所有」自體免疫病人都有Treg異常,「病人都有Treg異常」最不適當。","detail":{"background":"自體免疫疾病難以治癒的原因:①病程中免疫系統「不斷接受自身抗原刺激」,形成「正回饋的慢性發炎」;②「無法移除自身抗原」(自身抗原持續存在);③「表位擴散(epitope spreading)」——隨組織破壞釋出更多自身抗原,使「更多辨識自身抗原的免疫細胞被活化」,反應範圍擴大;④缺乏專一性療法,多靠廣泛免疫抑制。而「『所有(都)』自體免疫病人都有調節型T細胞(Treg)異常」是「過度概化」——Treg異常見於部分(如IPEX)但「並非所有」自體免疫病的共同特徵。故D最不適當。","options":{"A":"持續抗原刺激形成正回饋發炎,正確。","B":"無法移除自身抗原,正確。","C":"表位擴散使更多自體反應細胞活化,正確。","D":"並非所有自體免疫病人都有Treg異常—錯誤(正解,過度概化)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-18":{"quick":"具特異性與免疫記憶的後天免疫應用,最符合者為疫苗。","detail":{"background":"適應性(後天)免疫的特徵是「抗原專一性」與「免疫記憶」(再遇相同病原時反應更快更強)。最能應用這些特性的是「疫苗(vaccine)」:接種疫苗以無害形式呈現病原抗原,誘導「專一性的記憶B/T細胞」,使日後遭遇真正病原時迅速產生強力保護(此即主動免疫的基礎)。抗生素(殺細菌、無記憶)、抗過敏藥(緩解症狀)、免疫抑制劑(壓制免疫)皆與「利用後天免疫的特異性與記憶」無關。故為疫苗。","options":{"A":"疫苗利用後天免疫的特異性與記憶—正解。","B":"抗生素殺菌、無免疫記憶。","C":"抗過敏藥緩解症狀、非利用免疫記憶。","D":"免疫抑制劑壓制免疫、非此應用。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-24":{"quick":"超高IgE症候群(Job症候群)最常由STAT3基因突變所致。","detail":{"background":"超高IgE症候群(hyper-IgE syndrome, HIES;經典體染色體顯性型即Job症候群)的最常見成因是「STAT3」基因功能喪失突變。STAT3參與IL-6、IL-21、IL-23等訊號,缺陷使Th17分化障礙,臨床表現「極高血清IgE、反覆金黃色葡萄球菌皮膚冷膿瘍與肺炎(肺氣囊)、濕疹、特殊臉容、乳齒滯留與結締組織/骨骼異常」。STAT1、JAK1、NEMO突變各致其他免疫缺陷(慢性黏膜念珠菌病、外胚層發育不良合併免疫缺陷等),非典型HIES主因。故為STAT3。","options":{"A":"STAT1突變致慢性黏膜念珠菌病等、非典型HIES。","B":"JAK1非HIES主因。","C":"NEMO突變致外胚層發育不良合併免疫缺陷。","D":"STAT3突變為超高IgE症候群最常見成因—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-27":{"quick":"「活化APC並促進共刺激訊號」是『增強』免疫,與腫瘤逃避免疫監測無關。","detail":{"background":"腫瘤逃避免疫監測的機制:①下調MHC class I與腫瘤抗原表現(讓CD8 T辨識不到);②分泌「TGF-β、IL-10」等抑制性細胞激素;③招募「調節型T細胞(Treg)、骨髓衍生抑制細胞(MDSC)、M2巨噬細胞」浸潤;④表現「PD-L1」等抑制配體;⑤誘導抗體使抗原內吞下調等。而「活化抗原呈現細胞並『大量表現共刺激訊號(co-stimulatory signals)』」是『促進』T細胞活化、增強抗腫瘤免疫的方向,「與腫瘤逃避免疫無關(甚至相反)」。故D與逃避免疫無關。","options":{"A":"抗體致腫瘤抗原內吞下調、屬逃避機制。","B":"促Treg浸潤、屬逃避機制。","C":"分泌TGF-β抑制免疫、屬逃避機制。","D":"活化APC並增加共刺激為增強免疫、與逃避無關—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_106100-28":{"quick":"轉殖人類CD59(補體調控蛋白)可減緩異種移植的超急性排斥。","detail":{"background":"豬器官移植入靈長類會發生「超急性排斥(hyperacute rejection)」:受者體內「預先存在的天然抗體(主要抗豬α-Gal抗原)」結合內皮並「強力活化補體」,在數分鐘至數小時內造成血栓、出血與移植物壞死。基因工程策略之一是讓豬器官「轉殖『人類補體調控蛋白』如CD59(抑制C9聚合、阻止MAC)、CD55(DAF)、CD46(MCP)」,使豬內皮抵抗人類補體攻擊、減緩超急性排斥(另結合敲除α-Gal)。IgG、補體本身、CD52(alemtuzumab標的)非用以抑制補體攻擊的轉殖標的。故為CD59。","options":{"A":"IgG非補體調控的轉殖標的。","B":"補體本身是攻擊者、非保護分子。","C":"CD52為alemtuzumab標的、非補體調控。","D":"轉殖人類CD59抑制MAC、減緩超急性排斥—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-22":{"quick":"吞噬正常但吞後無法殺菌、反覆感染並形成肉芽腫,符合慢性肉芽腫病(CGD)。","detail":{"background":"慢性肉芽腫病(chronic granulomatous disease, CGD)是「NADPH氧化酶」基因缺陷,使吞噬細胞「無法進行呼吸爆發、不能產生活性氧」,因此「吞噬功能正常(游走、吞入細菌均可),但吞入後無法有效殺死病原」,造成「對catalase陽性菌(金黃色葡萄球菌、Serratia、Burkholderia、Nocardia、麴菌)反覆感染」,並因清除不良而「形成肉芽腫(慢性發炎)」。白血球黏著缺損(整合素缺陷、白血球無法黏附滲出、傷口不化膿)、Wiskott-Aldrich(濕疹-血小板低-免疫缺陷)、DiGeorge(胸腺發育不良、T細胞缺乏)表現不同。故為CGD。","options":{"A":"白血球黏著缺損為黏附/滲出障礙、傷口不化膿。","B":"慢性肉芽腫病:吞噬正常但無法殺菌、形成肉芽腫—正解。","C":"Wiskott-Aldrich為濕疹-血小板低-免疫缺陷。","D":"DiGeorge為胸腺發育不良、T細胞缺乏。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_107100-27":{"quick":"CD8辨識MHC class I;腫瘤逃避CD8是下調MHC class I,「抑制MHC class II表現」與逃避CD8無關,故敘述錯誤。","detail":{"background":"毒殺性CD8 T細胞辨識的是「MHC class I + 腫瘤胜肽」。腫瘤逃避CD8攻擊的常見機制:①「下調自身MHC class I表現(讓CD8辨識不到)」;②不表現/丟失可被辨識的腫瘤抗原;③分泌抑制性細胞激素(TGF-β、IL-10)抑制T細胞活化;④形成抑制性微環境(Treg、PD-L1)使CD8無法浸潤或被抑制。而「抑制『MHC class II』表現」與「逃避CD8(辨識MHC I)」無關(MHC II呈現給CD4),故A為錯誤敘述(應為下調MHC class I)。","options":{"A":"CD8辨識MHC I、應下調MHC I而非II—錯誤(正解)。","B":"不表現免疫原性抗原可逃避CD8,正確。","C":"分泌抑制細胞激素可抑制T細胞活化,正確。","D":"形成不讓CD8浸潤的環境,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_108030-27":{"quick":"Pembrolizumab(anti-PD-1)屬免疫檢查點阻斷(checkpoint blockade)療法。","detail":{"background":"癌症抗體療法依機轉分:①「免疫檢查點阻斷(checkpoint blockade)」——阻斷T細胞抑制受體以「喚醒」抗腫瘤T細胞,如「Pembrolizumab/Nivolumab(anti-PD-1)」、atezolizumab(anti-PD-L1)、ipilimumab(anti-CTLA-4);②抗血管新生——Avastin(anti-VEGF);③直接靶向腫瘤抗原並經補體/ADCC——Rituximab(anti-CD20)、Trastuzumab(anti-HER2)。故屬checkpoint blockade者為Pembrolizumab(anti-PD-1)。","options":{"A":"Avastin為抗血管新生(anti-VEGF)、非checkpoint。","B":"Pembrolizumab(anti-PD-1)為免疫檢查點阻斷—正解。","C":"Rituximab為抗CD20(靶向B細胞)。","D":"Trastuzumab為抗HER2(靶向腫瘤)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-23":{"quick":"裸淋巴球症候群(MHC II缺乏)會使CD4 T細胞「數目減少」,「CD4數目正常」錯誤。","detail":{"background":"遺傳性免疫缺失:①「APECED(APS-1)」由「AIRE」基因缺陷致中樞耐受失常(自體免疫多腺體病-念珠菌病-外胚層失養);②「裸淋巴球症候群(bare lymphocyte syndrome, MHC class II缺乏)」——MHC class II無法表現,因「CD4 T細胞於胸腺正選擇需MHC II」,故「CD4 T細胞『數目減少(而非正常)』」、抗體反應差;③「Omenn症候群」多由「RAG1/RAG2」部分功能突變致(紅皮症、嗜酸性球增多、寡株T細胞);④白血球先天缺陷(如SCID、CGD)可用「造血幹細胞移植」治療。故B「CD4數目正常」錯誤。","options":{"A":"APECED由AIRE基因缺陷所致,正確。","B":"MHC II缺乏使CD4 T細胞數目減少、非正常—錯誤(正解)。","C":"Omenn症候群常因RAG1/RAG2突變,正確。","D":"白血球先天缺陷可造血幹細胞移植,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-26":{"quick":"Trastuzumab(Herceptin)針對乳癌過度表現的Her-2/neu分子。","detail":{"background":"Trastuzumab(Herceptin)是「抗HER-2/neu(ERBB2,一種受體酪胺酸激酶)」的單株抗體,用於「HER-2過度表現/擴增的乳癌(與胃癌)」:結合HER-2阻斷其訊號並引發ADCC,抑制腫瘤生長。MAGE、MUC-1為其他腫瘤相關抗原,CD-20為B細胞淋巴瘤標的(rituximab)。故trastuzumab針對Her-2/neu。","options":{"A":"trastuzumab針對Her-2/neu—正解。","B":"MAGE為癌-睪丸抗原、非trastuzumab標的。","C":"MUC-1為黏蛋白腫瘤抗原、非其標的。","D":"CD-20為B細胞淋巴瘤標的(rituximab)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-27":{"quick":"混合淋巴球反應(MLR)是「檢測」相容性的方法,不是「減少T細胞數目」以降低GVHD的手段。","detail":{"background":"植體抗宿主病(GVHD)由移植物中「成熟的供者T細胞」攻擊受者組織造成。減少GVHD的策略多在「去除/減少移植物中的成熟T細胞」或「提高相容性」:①「alemtuzumab(anti-CD52)」清除T(及B)細胞;②「抗胸腺球蛋白(ATG)」清除T淋巴球;③「選擇MHC class I與II相符的供者」降低異體反應。而「混合淋巴球反應(MLR)」是「『檢測』供受者淋巴球相容性(class II/HLA-DR)的試驗」,「並非用來『減少T細胞數目』」的處理方法。故除外者為B(以MLR減少T細胞數)。","options":{"A":"alemtuzumab(anti-CD52)清除成熟T細胞、可減GVHD。","B":"MLR是檢測相容性、非減少T細胞的方法—正解(除外)。","C":"選MHC相符供者可降低GVHD。","D":"ATG清除T淋巴球、可減GVHD。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109020-28":{"quick":"腫瘤缺乏MHC class I時,NK細胞因「失去抑制訊號(missing self)」而更能毒殺。","detail":{"background":"自然殺手細胞(NK)的毒殺受「活化受體」與「抑制受體」平衡調控:NK的抑制受體(如KIR)辨識自身「MHC class I」獲得『抑制訊號』而不殺正常細胞。當「腫瘤或病毒感染細胞『下調/缺乏MHC class I』」時,NK失去抑制訊號(『missing self』),活化受體佔上風而「更有效毒殺」該細胞——這正彌補了「下調MHC I以逃避CD8 T」的腫瘤。故腫瘤缺乏MHC class I時NK毒殺能力更好。MHC class II、HER-2/neu非NK抑制受體配體。","options":{"A":"腫瘤缺乏MHC class I時NK失去抑制、毒殺更強(missing self)—正解。","B":"MHC class II非NK抑制受體配體。","C":"T1非相關分子。","D":"HER-2/neu非NK抑制配體。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-13":{"quick":"流感活減毒(鼻噴)疫苗適用於健康2-49歲,「適用60歲以上成人」錯誤。","detail":{"background":"流感「活減毒疫苗(LAIV,鼻噴)」的特性:①病毒經「冷適應(cold-adapted)」,適合在較低溫(約25°C)的「鼻咽部」複製,「大部分在上呼吸道局部感染」;②可刺激「黏膜IgA」與細胞免疫;③「適用於『健康的2-49歲』者」,「『不』建議用於老人(≥50/65歲)、嬰幼兒(<2歲)、孕婦、免疫不全與慢性病者」(這些族群應用『去活化注射型(IIV)』)。故「適用60歲以上成人」錯誤(老人應用去活化疫苗)。","options":{"A":"冷適應、適合約25°C生長,正確。","B":"主要在鼻咽部感染,正確。","C":"易刺激IgA抗體,正確。","D":"活減毒鼻噴疫苗不適用60歲以上、應用去活化—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-24":{"quick":"小兒麻痺病毒「只感染人類」,「可感染人類與牛隻」錯誤。","detail":{"background":"小兒麻痺(脊髓灰質炎)疫苗有兩型:①「去活化注射型(IPV,Salk)」;②「口服活減毒型(OPV,Sabin,由三型減毒病毒株組成)」。重要觀念:「小兒麻痺病毒『只以人類為宿主』(無動物宿主)」——這也是它「可被根除」的原因。台灣現以「IPV(去活化)」為常規。OPV雖能誘發黏膜免疫且利於阻斷傳播,但有極罕見「疫苗衍生麻痺(VAPP/cVDPV)」風險。故「可感染人類與牛隻」與其人類專一宿主不符,為錯誤。","options":{"A":"分去活化與減毒兩型,正確。","B":"小兒麻痺病毒只感染人類、無牛隻宿主—錯誤(正解)。","C":"台灣以去活化疫苗為主,正確。","D":"口服疫苗由三型減毒病毒株組成,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-27":{"quick":"黑色素瘤的酪胺酸酶衍生胜肽高量呈現於MHC,可產生辨識腫瘤的T淋巴球,最為相關。","detail":{"background":"腫瘤抗原與T細胞辨識:①「癌-睪丸抗原(cancer-testis antigen,如睪丸蛋白MAGE)」在腫瘤異常表現,『可』被免疫系統當作腫瘤抗原『產生辨識的T細胞』(故A「無法產生辨識T細胞」錯誤);②「黑色素瘤」常見的「分化抗原(如酪胺酸酶tyrosinase衍生胜肽)」可「高量以胜肽:MHC形式呈現」,從而「產生辨識腫瘤的T淋巴球」(B正確,亦為黑色素瘤免疫治療基礎);③PD-L1/PD-L2是「腫瘤(或免疫細胞)」表現的抑制配體(非T細胞表現以辨識突變);④HER-2/neu是受體酪胺酸激酶、為腫瘤抗原本身,並非「直接抑制T細胞辨識」。故最相關為B。","options":{"A":"癌-睪丸抗原可產生辨識T細胞、非無法—錯誤。","B":"黑色素瘤酪胺酸酶胜肽高量呈現可產生辨識腫瘤的T—正解。","C":"PD-L1/L2由腫瘤表現、非T細胞辨識突變—錯誤。","D":"HER-2為腫瘤抗原、非直接抑制T辨識—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_109100-28":{"quick":"本題公告「一律給分」;原意HLA-G(多型性少)與排斥較不相關,而MHC I/II與次要組織抗原皆與排斥相關。","detail":{"background":"器官移植排斥的抗原基礎:①「MHC class I與II分子(HLA)」的不相符是『主要組織相容抗原』,引發強烈異體反應(直接與間接辨識),與急性/慢性排斥密切相關;②「次要組織相容抗原(minor histocompatibility antigen)」在MHC相符時仍可引發排斥;③「HLA-G」是「多型性極少、且具免疫抑制性」的非典型MHC class I分子(表現於胎盤,抑制NK/T以維持母胎耐受),相對與排斥『較不相關』。本題經評定「一律給分」(送分)。","options":{"A":"MHC class I與排斥相關。","B":"MHC class II與排斥相關。","C":"次要組織相容抗原與排斥相關。","D":"HLA-G多型少、具抑制性、與排斥較不相關(本題送分)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-17":{"quick":"現行百日咳疫苗主要為「無細胞(acellular)疫苗」(DTaP的aP成分)。","detail":{"background":"百日咳(Bordetella pertussis)的疫苗演進:早期為「全細胞百日咳疫苗(whole-cell, wP)」,因副作用較多,現行多改用「『無細胞(acellular, aP)』疫苗」——含純化的百日咳毒素類毒素與絲狀血凝素(FHA)、pertactin等成分,副作用較少,與白喉、破傷風類毒素合成「DTaP(兒童)/Tdap(青少年成人加強)」。故現行百日咳疫苗主要組成為無細胞疫苗。它非LPS、非減毒、非莢膜多醣疫苗。","options":{"A":"無細胞(acellular)疫苗為現行百日咳疫苗主成分—正解。","B":"非以脂多醣為疫苗成分。","C":"非減毒活疫苗。","D":"非莢膜多醣疫苗。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-22":{"quick":"CTLA-4表現在「T細胞」而非腫瘤細胞,「腫瘤表現CTLA-4抑制T」錯誤。","detail":{"background":"免疫與腫瘤交互作用(2018諾貝爾獎主題):①腫瘤若表現腫瘤特異抗原,可引發「專一性CTL」清除之;②「自然殺手細胞(NK)」亦可清除(尤其MHC I下降的腫瘤);③免疫檢查點分子——「CTLA-4與PD-1表現在『T細胞』上(抑制性受體)」,腫瘤表現的是「PD-L1(配體)」;④「抗CTLA-4或抗PD-1抗體」阻斷抑制訊號、活化T細胞清除腫瘤。故B「腫瘤累積突變後在『其細胞表面』表現CTLA-4抑制T」錯誤(CTLA-4在T細胞、腫瘤表現的是PD-L1)。","options":{"A":"腫瘤特異抗原可引發CTL清除,正確。","B":"CTLA-4表現於T細胞、非腫瘤表面—錯誤(正解)。","C":"NK細胞亦清除腫瘤,正確。","D":"anti-CTLA-4/PD-1阻斷抑制訊號活化T,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-26":{"quick":"腫瘤免疫編輯(immunoediting)描述腫瘤在免疫壓力下變異與逃脫,「促進毒殺使腫瘤縮小」非其敘述,故錯誤。","detail":{"background":"腫瘤免疫編輯(tumor immunoediting)分三期:「清除
