cepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_107100-23","q_num":23,"roc_year":"107","exam_code":"107100","src":"民國107年","topic":"M8先天免疫補體吞噬與發炎","stem":"傳統補體路徑(classical complement pathways)早期之補體如C1,C2,C4缺乏時,會產生下列何種現 象?","options":{"A":"影響到mannose-binding lectin之缺乏,易有兒童時期之感染","B":"無法清除immune complex,而有immune complex disease","C":"易有pyogenic bacteria之感染","D":"易有Pneumocystis jirovecii(先前稱Pneumocystis carinii)感染"},"answer":"B","accepted_answers":["A","B","C"],"answer_status":"多重答案","img":""},{"id":"med2_107100-24","q_num":24,"roc_year":"107","exam_code":"107100","src":"民國107年","topic":"M8先天免疫補體吞噬與發炎","stem":"關於嗜伊紅性白血球和嗜中性白血球的異同,下列敘述何者正確?","options":{"A":"嗜中性白血球含有過氧化酶,但嗜伊紅性白血球不含此酶","B":"IL-5主要促進嗜伊紅性白血球的生成","C":"真核寄生蟲感染時嗜中性白血球反應較強","D":"CCR3在嗜中性白血球表現較多"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_108030-18","q_num":18,"roc_year":"108","exam_code":"108030","src":"民國108年","topic":"M8先天免疫補體吞噬與發炎","stem":"巨噬細胞(macrophage)和嗜中性球(neutrophil)是體內最主要的吞噬細胞,它們都具有吞噬 (phagocytosis)並殺死病原的能力,有關這兩群細胞的敘述何者錯誤?","options":{"A":"當嗜中性球被細菌活化後,會進行一種特殊的細胞死亡的過程,把核內的染色質(chromatin)釋放到細胞 外的空間形成neutrophil extracellular traps(NETs),有效的抓住微生物","B":"這兩群細胞在受到細菌刺激後都會進行所謂的呼吸爆發(respiratory burst)的現象,這是因為胞內酵素的 作用,導致超氧離子(superoxide)的生成與二氧化碳大量釋出,藉以殺死細菌","C":"巨噬細胞在各個器官及組織都存在,比如在肝臟的庫氏細胞(Kupffer cell)及神經組織中的小神經膠質細 胞(microglia)等都是特化的巨噬細胞","D":"如果NADPH氧化酶(oxidase)的基因發生突變而失去功能,會導致這兩群主要的吞噬細胞不能有效地殺 死病原,結果造成慢性肉芽腫病(chronic granulomatous disease, CGD)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_108100-18","q_num":18,"roc_year":"108","exam_code":"108100","src":"民國108年","topic":"M8先天免疫補體吞噬與發炎","stem":"下列何種細胞一般不被歸類為先天免疫細胞?","options":{"A":"macrophage","B":"B cell","C":"neutrophil","D":"dendritic cell"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_109020-19","q_num":19,"roc_year":"109","exam_code":"109020","src":"民國109年","topic":"M8先天免疫補體吞噬與發炎","stem":"模式辨識受體(pattern recognition receptors, PRRs)是先天免疫系統用來識別病原相關分子模式(pathogen- associated molecular patterns, PAMPs)的抗原受體,在所有先天免疫細胞都會表現。有關模式辨識受體的敘述 何者錯誤?","options":{"A":"模式辨識受體中的類鐸受體(Toll-like receptors)是演化上古老而保守的病原辨識受體,即便在無脊椎動物 也有表現","B":"類鐸受體(Toll-like receptors)中TLR3和TLR7分別辨識源自於病毒的雙股及單股RNA","C":"模式辨識受體中的類NOD受體(nod-like receptors)主要是辨識胞內的病原菌,如沙門氏菌(Salmonella)及 李斯特菌(Listeria)的細胞壁成分","D":"模式辨識受體中的類RIG-I受體(RIG-I-like receptors)是辨識DNA病毒的DNA,而且免疫細胞的類RIG-I受 體和DNA結合後的訊息傳遞結果會產生第一型干擾素"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_110020-19","q_num":19,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"M8先天免疫補體吞噬與發炎","stem":"下列何種補體調控蛋白(complement-regulatory proteins)是直接干擾C9的聚合化以抑制膜攻擊複合物 (membrane attack complex, MAC)的形成?","options":{"A":"CD59","B":"membrane cofactor of proteolysis(MCP, CD46)","C":"decay-accelerating factor(DAF, CD55)","D":"C1 inhibitor"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_111020-11","q_num":11,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"M8先天免疫補體吞噬與發炎","stem":"下列何種細胞不是愛滋病毒(HIV)主要感染的對象?","options":{"A":"CD4 T細胞","B":"嗜中性白血球(neutrophil)","C":"巨噬細胞(macrophage)","D":"樹突細胞(dendritic cells)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_111020-18","q_num":18,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"M8先天免疫補體吞噬與發炎","stem":"對於免疫系統消滅病原體的描述何者錯誤?","options":{"A":"自然殺手細胞(natural killer cell)可藉由抗原特異性受體直接辨識抗原並清除病毒","B":"巨噬細胞(macrophage)可以吞噬細菌並利用溶酶體(lysosome)的酵素分解細菌","C":"被活化後的補體(complement)可以結合到細菌的細胞壁上穿孔並造成細菌死亡","D":"抗體可以阻斷病毒和細胞結合的接受器來防止病毒對細胞的感染"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_111020-22","q_num":22,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"M8先天免疫補體吞噬與發炎","stem":"調理作用(opsonization)產生原因之一是因為吞噬細胞(phagocytic cell)表面上具有下列何種受體,以辨識 附著於病菌上的調理素(opsonin)?","options":{"A":"Toll-like receptors","B":"complement receptors","C":"lectin-like receptors","D":"chemokine re ","C":"Toll-like receptor 8","D":"Toll-like receptor 9"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_115020-15","q_num":15,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"M8先天免疫補體吞噬與發炎","stem":"下列何種情況會使患者更容易受到伊科病毒(echovirus)感染呼吸道和胃腸道而引起嚴重疾病?","options":{"A":"低伽瑪球蛋白血症(hypogammaglobulinemia)","B":"鐮狀細胞貧血(sickle cell anemia)","C":"發炎性腸道疾病(inflammatory bowel disease)","D":"消化性潰瘍(peptic ulcer)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_115020-17","q_num":17,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"M8先天免疫補體吞噬與發炎","stem":"第一型干擾素(interferon)α及β做為抗病毒藥物,最主要是抑制病毒複製的下列何項步驟?","options":{"A":"病毒的入侵","B":"病毒轉錄","C":"病毒蛋白質合成","D":"病毒的組裝"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_115020-19","q_num":19,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"M8先天免疫補體吞噬與發炎","stem":"痛風(gout)是尿酸結晶(urate crystals)沉澱在關節組織後所引起的發炎症。下列那一種先天性免疫活 化途徑最可能參與上述發炎反應?","options":{"A":"NLRP1","B":"NLRP3","C":"MDA5","D":"cGAS"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_115020-24","q_num":24,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"M8先天免疫補體吞噬與發炎","stem":"呼吸道剛被病毒感染時,最不可能產生下列何種分子?","options":{"A":"type I interferon","B":"type II interferon","C":"CCL2","D":"IL-18"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_115020-25","q_num":25,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"M8先天免疫補體吞噬與發炎","stem":"Streptococcus pneumoniae 是一種胞外菌(extracellular bacteria)。下列何者最有可能幫助S. pneumoniae 逃脫免疫偵測?","options":{"A":"產生大量的lipopolysaccharide(LPS),毒殺免疫細胞","B":"形成孢子,躲避免疫偵測","C":"減少基因表達,避免刺激免疫反應","D":"細菌表面的莢膜多醣(capsular polysaccharide),干擾補體活化反應"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_106100-19","q_num":19,"roc_year":"106","exam_code":"106100","src":"民國106年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"成熟的B _year":"108","exam_code":"108100","src":"民國108年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"下列何種細胞的抗原接受器(antigen receptor)會進行體細胞高度突變(somatic hypermutation)?","options":{"A":"T細胞","B":"B細胞","C":"巨噬細胞","D":"自然殺手細胞"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_108100-21","q_num":21,"roc_year":"108","exam_code":"108100","src":"民國108年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"下列有關pre-T細胞抗原接受器(pre-T cell receptor)的敘述,何者最正確?","options":{"A":"具有TCR α鏈(TCR α chain)","B":"具有TCR β鏈(TCR β chain)","C":"可以辨識外來抗原","D":"此階段的細胞大部分都可以辨識自己的主要組織相容性抗原(MHC)"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_108100-28","q_num":28,"roc_year":"108","exam_code":"108100","src":"民國108年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"Natalizumab [anti-α4 integrin (anti-VLA-4) monoclonal antibody]目前已證實可以用來治療何種疾病?","options":{"A":"multiple sclerosis","B":"metastatic melanoma","C":"chronic myeloid leukemia","D":"chronic asthma"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_109020-18","q_num":18,"roc_year":"109","exam_code":"109020","src":"民國109年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"位於腸道底層免疫組織中之M細胞的主要免疫功能為:","options":{"A":"直接殺菌","B":"製造抗體","C":"捕捉及轉運腸道中的抗原至下層的淋巴組織","D":"保護周邊的腸道表皮細胞"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_109020-21","q_num":21,"roc_year":"109","exam_code":"109020","src":"民國109年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"具有前期B細胞抗原接受器(pre-B cell receptor)之B型細胞具有下列那一項生物特性?","options":{"A":"輕鏈基因重組(light chain gene rearrangement)","B":"細胞表面具IgM分子","C":"快速細胞分裂","D":"接受專一性抗原刺激"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_109020-24","q_num":24,"roc_year":"109","exam_code":"109020","src":"民國109年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"腸胃道中含有大量IgA,在黏膜免疫反應中可以有效阻斷病原菌入侵人體,相關的敘述何者最正確?","options":{"A":"血清與腸胃道中2種IgA亞型的抗體比例一致","B":"細胞激素IL-12可以促進B細胞分泌IgA","C":"分泌型IgA上的分泌片段(secretory component)是由上皮細胞合成的","D":"病原菌抗原結合IgA,可以有效啟動補體古典活化路徑"},"ans "normal","img":""},{"id":"med2_111020-26","q_num":26,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"2018年諾貝爾醫學獎得主Tasuku Honjo因為發現PD-1分子而獲獎,他另外一個著名的發現是AID(activation- induced cytidine deaminase)分子,下列有關AID的敘述何者錯誤?","options":{"A":"AID在germinal center B細胞表現量高,可促進somatic hypermutation","B":"B細胞所產生的抗體轉換為IgE時,也是由AID分子調控","C":"class switch recombination(CSR)起因為AID將cytosine轉變成uridine,之後的DNA修復過程產生DNA雙股斷 裂,最後造成DNA重組","D":"class switch recombination由特定的DNA序列recombination signal sequence(RSS)所主導,造成抗體重鏈的 固定區(constant region of heavy chain)從IgM轉換成其他類型"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_111100-18","q_num":18,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"下列何者最可以聯結先天免疫及後天免疫作用之抗原呈獻細胞(antigen-presenting cell)?","options":{"A":"NK cell","B":"basophil","C":"neutrophil","D":"dendritic cell"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_111100-20","q_num":20,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"T 細胞的抗原受體(T cell receptor, TCR)在發育過程中會產生多樣性,下列何種機制和TCR 多樣性有關? 1V region 由數個基因片段(gene segments)組成 2V(D)J DNA 重組 3RAG1 和RAG2 基因表現 4AIRE 基因表現 5terminal deoxynucleotidyl transferase (TdT) 基因表現 6類型轉換重組(class switch recombination) 7N-nucleotide addition","options":{"A":"12357","B":"13567","C":"12345","D":"12356"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_112020-20","q_num":20,"roc_year":"112","exam_code":"112020","src":"民國112年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"下列何種蛋白與MHC class II分子的抗原呈獻過程有重要關聯?","options":{"A":"Calnexin","B":"Calreticulin","C":"Invariant chain","D":"Transporters associated with antigen processing(TAPs)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_112100-21","q_num":21,"roc_year":"112","exam_code":"112100","src":"民國112年","topic":"M9免疫球蛋白抗原呈現與MHC","stem":"T細胞和B細胞的抗原接受器(antigen receptor) ["B"],"answer_status":"normal","img":""},{"id":"med2_108030-22","q_num":22,"roc_year":"108","exam_code":"108030","src":"民國108年","topic":"M10T與B淋巴球活化及細胞激素","stem":"胸腺依賴性(thymus-dependent)抗原活化B細胞需要輔助型T細胞的參與,而且這兩種細胞所辨識的抗原 是存在一種相關性辨識(linked recognition)的關係,有關相關性辨識的敘述,何者錯誤?","options":{"A":"如果一個B細胞的抗原接受器是辨識一種病毒的表面蛋白,而輔助型T細胞的抗原接受器是辨識此病毒內部 的核心蛋白,這個輔助型T細胞是無法協助前述B細胞的活化","B":"相關性辨識可以確保自我耐受性(self-tolerance)的產生,因為對自體有反應的(self-reactive)T細胞必 須碰到對自體有反應的B細胞才能引起自體抗體(autoantibody)的產生,而這種機率相當低","C":"我們可以利用相關性辨識的概念來設計疫苗幫助嬰兒產生有效的抗體,去對付具有莢膜構造的病菌,比如 流感嗜血桿菌(Haemophilus influenzae)","D":"很多人對盤尼西林(penicillin)過敏的原因是因為盤尼西林注射到體內會和自體的蛋白形成聚合物,此聚合 物會誘發TH2細胞的生成,再藉著相關性辨識去活化B細胞產生IgE引起過敏反應"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_108100-19","q_num":19,"roc_year":"108","exam_code":"108100","src":"民國108年","topic":"M10T與B淋巴球活化及細胞激素","stem":"進入組織之單核球(monocytes),經下列何種細胞素[cytokine(s)]刺激,可以分化成樹突細胞(dendritic cells)?","options":{"A":"M-CSF","B":"M-CSF+TNF-α","C":"IL-1β","D":"GM-CSF+IL-4"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_108100-22","q_num":22,"roc_year":"108","exam_code":"108100","src":"民國108年","topic":"M10T與B淋巴球活化及細胞激素","stem":"下列有關調節型T細胞(regulatory T cells, Treg)的敘述何者正確?","options":{"A":"腫瘤可以調控microenvironment 的T細胞分化成Treg細胞,以逃脫免疫系統的追殺","B":"Treg細胞的功能的過度活化,是許多自體免疫疾病發病的重要因素","C":"Treg細胞都是在周邊淋巴組織分化而成","D":"Treg細胞表面帶有CD8的標記,可以幫助清除胞內病原感染"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_108100-23","q_num":23,"roc_year":"108","exam_code":"108100","src":"民國108年","topic":"M10T與B淋巴球活化及細胞激素","stem":"T follicular helper(TFH)細胞對於體液免疫反應(humoral immune response)非常重要,關於TFH的描述何者 錯誤?","options":{"A":"TFH細胞位在germinal center的淺色區(light zone)","B":"TFH細胞的分化需要Bcl-6轉錄因子","C":"TFH細胞可以分泌IL-21和其他的細胞激素,IL-21促進漿細胞分化","D":"小鼠B細胞在體外培養時利用加入LPS、IL-2、及IL-21,可以替代TFH細胞功能來刺激IgG1抗體產生"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_108100-25","q_num":25,"roc_year":"108","exa "normal","img":""},{"id":"med2_109100-27","q_num":27,"roc_year":"109","exam_code":"109100","src":"民國109年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"T淋巴球能夠辨識腫瘤細胞並殺死腫瘤細胞,下列何者與腫瘤中T淋巴球辨識腫瘤抗原的情況最有關?","options":{"A":"腫瘤細胞常有許多基因變異,因而表現出其他組織器官的分子,例如睪丸的蛋白質,此時便無法產生辨識這 些蛋白質抗原的T淋巴球","B":"黑色素瘤常見的腫瘤抗原之一是由酪氨酸酶(tyrosinase)衍生的胜肽,因為非常高量的胜肽:MHC表現而 產生出了辨識腫瘤的T淋巴球","C":"腫瘤內部的T淋巴球偶有表現PD-L1或PD-L2分子,因而能夠辨識含有突變序列的腫瘤抗原","D":"多種腺癌表現出高量的HER-2/neu,是一種受體酪氨酸激酶(receptor tyrosine kinase),可直接抑制T淋巴球 對腫瘤抗原的辨識因而無法引發腫瘤毒殺作用"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_109100-28","q_num":28,"roc_year":"109","exam_code":"109100","src":"民國109年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"下列何者與器官移植後的排斥作用不相關?","options":{"A":"MHC class I分子","B":"MHC class II分子","C":"次要組織吻合抗原(minor histocompatibility antigen)","D":"一種多型變異(polymorphic)較少的MHC class I分子:HLA-G"},"answer":"D","accepted_answers":["A","B","C","D"],"answer_status":"送分","img":""},{"id":"med2_110020-17","q_num":17,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"目前預防博德氏百日咳桿菌(Bordetella pertussis)的疫苗,主要組成為何?","options":{"A":"無細胞疫苗(acellular vaccines)","B":"脂多醣體(lipopolysaccharides)","C":"減毒疫苗(attenuated vaccines)","D":"莢膜多醣體(capsular polysaccharides)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_110020-22","q_num":22,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"2018年諾貝爾醫學獎頒發給2位對癌症免疫療法有重大貢獻的科學家,James P. Allison與Tasuku Honjo因開發 CTLA-4與PD-1在癌症治療的應用而獲獎。下列有關免疫系統和腫瘤細胞交互作用的敘述,何者錯誤?","options":{"A":"腫瘤細胞如果表現腫瘤特定抗原,可以引發專一性的毒殺性T細胞(cytotoxic T cells)來清除腫瘤","B":"腫瘤細胞如果累積突變,可以表現CTLA-4在其細胞表面,因此抑制T細胞的反應","C":"除了毒殺性T細胞(cytotoxic T cells)之外,自然殺手細胞(natural killer cells)也會清除腫瘤","D":"讓癌症病人施打對抗CTLA-4或PD-1的抗體是一種癌症的免疫療法,可以阻斷抑制訊號,進而活化T細胞來 清除腫瘤"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_110020-26","q_num":26,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"有關tumor immunoediting的敘述,下列何者錯誤?","options":{"A":"免疫監測系統會導致腫瘤細胞產生突變","B":"免疫監測系統會導致腫瘤細胞產生的抗原表現消失","C":"免疫監測系統會導致腫瘤細胞產生的細胞特性改變","D":"促進T細胞對腫瘤細胞的毒殺能力,導致腫瘤縮小"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_110020-27","q_num":27,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"當病人接受腎臟移植後10分鐘內就發生排斥,其主要原因是:","options":{"A":"MHC class I不合","B":"MHC class II不合","C":"病人體內已存有對抗移植物的抗體","D":"H抗原不合"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_110020-28","q_num":28,"roc_year":"110","exam_code":"110020","src":"民國110年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"用來治療non-Hodgkin's lymphoma的Rituximab(anti-CD20 monoclonal antibody)主要可以剔除何種免疫細胞?","options":{"A":"CD4 T cell","B":"CD8 T cell","C":"B cell","D":"dendritic cell"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_111020-20","q_num":20,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"腫瘤免疫學是研究免疫系統和癌細胞之間的交互作用,希望發現可以用來發展治療癌症的新療法。關於免疫 系統和腫瘤的互動,下列那個敘述最不適當?","options":{"A":"健康人體內腫瘤細胞形成時通常可以被T細胞和自然殺手細胞辨識之後清除","B":"傳統治療方法中有單株抗體藥物,例如rituximab或trastuzumab(Herceptin)在體內結合到癌細胞後,可以啟 動補體活化或是ADCC(antibody-dependent cell-mediated cytotoxicity)來清除腫瘤細胞","C":"chimeric antigen receptor (CAR)-T 療法是取出健康人的T細胞,培養並改造這些T細胞使其表現專一性對抗腫 瘤的CARs,再打回癌症病人來攻擊清除腫瘤細胞","D":"checkpoint blockade 療法是要干擾在T細胞上的抑制受體,利用anti-CTLA-4或 anti-PD-1抗體來喚醒免疫系統 的T細胞攻擊腫瘤"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_111020-21","q_num":21,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"腫瘤細胞會表現下列何種分子以抑制宿主免疫反應?","options":{"A":"CD28","B":"PD-L1","C":"PD-1","D":"CTLA-4"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_111020-23","q_num":23,"roc_year":"111","exam_code":"111020","src":"民國111年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"共濟失調微血管擴張症候群(ataxia-telangiectasia)會出現免疫系統異常,導致B細胞與 T細胞數量減少。主 要因為下列何種機轉所致?","options":{"A":"V(D)J重組過程出現缺陷","B":"無法產生IgM抗體","C":"MHC class I辨識產生缺陷","D":"MHC class II辨識產生缺陷"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_111100-19","q_num":19,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"王小弟今年13 歲,因鼻腔內長了膿包並有持續擴大的跡象,而到醫院就診。醫生檢查結果有類似慢性發炎的 現象,問診發現以往王小弟也常有類似感染後,很緩慢痊癒的情況。經由詳細檢查發現他的CD8 T 細胞數量 異常的低,而其MHC class I 分子在細胞上的表現量也極少,因此醫生分析後認為王小弟最有可能得了:","options":{"A":"chronic granulomatous disease","B":"MHC class I deficiency","C":"MHC class II deficiency","D":"leukocyte adhesion deficiency"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_111100-22","q_num":22,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"我國目前嬰幼兒常規肺炎鏈球菌疫苗接種為結合型疫苗(pneumococcal conjugate vaccine, PCV),此疫苗是將莢 膜多醣(capsular polysaccharide)結合白喉毒素蛋白來施打,未滿一歲嬰幼兒常規接種是採用2+1(2 劑基礎 劑,1 劑追加劑)共3 劑接種。下列有關肺炎鏈球菌疫苗接種的敘述何者錯誤?","options":{"A":"接種後如果嬰幼兒產生良好的免疫反應,血清可以測到對抗莢膜多醣及抗白喉蛋白的專一性抗體","B":"主要是對抗莢膜多醣專一性抗體能夠保護嬰幼兒不被肺炎鏈球菌感染","C":"抗莢膜多醣抗體的產生,主因是專一性辨識莢膜多醣的CD4 輔助T 細胞(T helper cells)先產生之後,幫助 B 細胞進一步分化成漿細胞(plasma cells)","D":"莢膜多醣和白喉毒素蛋白必須以共價鍵(covalent bond)連結在一起,方能有效引發高親和力的抗體產生"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_111100-28","q_num":28,"roc_year":"111","exam_code":"111100","src":"民國111年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"針對慢性骨髓白血病(chronic myeloid leukemia)有很好的標靶藥物,是因為該藥物作用於下列何種標的物?","options":{"A":"Bcr-Ab1 酪胺酸激酶(tyrosine kinase)","B":"p53 蛋白","C":"Ras 蛋白","D":"Her-2/neu 抗原"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_112020-25","q_num":25,"roc_year":"112","exam_code":"112020","src":"民國112年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"HIV會造成慢性感染而且引起後天免疫不全症(acquired immune deficiency syndrome, AIDS)造成許多人死 亡,有關HIV慢性感染的原因,下列何者錯誤?","options":{"A":"在HIV感染的過程中,重要的效應細胞及分子(effector cell / molecule),如毒殺型CD8 T細胞及對HIV有專 一性的抗體都沒有產生","B":"HIV在複製的過程中會導致基因的突變,使得原本有效的免疫反應失去作用","C":"HIV的病毒因子會抑制第一型MHC(MHC class I)在被感染細胞的表現,以逃脫毒殺型CD8 T(cytotoxic CD8 T)細胞的攻擊","D":"HIV會感染免疫細胞包含CD4 T細胞、樹突細胞及巨噬細胞,且造成CD4 T細胞數目的減少"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_112020-28","q_num":28,"roc_year":"112","exam_code":"112020","src":"民國112年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"利用基因工程製備嵌合抗原受體T細胞(chimeric antigen receptor T cells, CAR-T)作為免疫細胞治療方式已經 成功用來治療ALL(acute lymphocytic leukemia),在此嵌合分子之組成中不包括下列何者?","options":{"A":"anti-CD19","B":"CTLA-4","C":"4-1 BB","D":"CD3ζ chain"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_112100-27","q_num":27,"roc_year":"112","exam_code":"112100","src":"民國112年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"器官移植後的慢性排斥(chronic rejection)作用,下列何情況最可能出現?","options":{"A":"活化的異體反應性natural killer(NK)cells經由血管進入移植體,而破壞植體組織結構","B":"植體內圓周型的小血管內皮細胞損壞,細胞浸潤,血管壁及血管硬化,植體蒼白缺血","C":"血液中的抗植體血型抗體造成血管發炎反應及血管完全阻塞,植體黑紫腫脹","D":"接受移植者本身體內出現突變的植體抗原,造成產生對抗異體抗原的抗體反應,進而破壞植體組織結構"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_112100-28","q_num":28,"roc_year":"112","exam_code":"112100","src":"民國112年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"下列關於anti-CTLA-4應用於腫瘤免疫療法之原理,何者正確?","options":{"A":"CTLA-4蛋白質是結合樹突細胞(dendritic cell)之主要組織相容複合體(major histocompatibility complex, MHC)","B":"CTLA-4蛋白質是結合樹突細胞(dendritic cell)上的PD-1","C":"CTLA-4蛋白質是結合樹突細胞(dendritic cell)上的CD80/CD86","D":"CTLA-4蛋白質是結合樹突細胞(dendritic cell)上的CD11b"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_113090-18","q_num":18,"roc_year":"113","exam_code":"113090","src":"民國113年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"人類的免疫系統由造血幹細胞分化而來,若有一病人缺乏了淋巴前驅細胞(common lymphoid progenitor),你預測此病人體內那一個部分的免疫系統會受到最大的影響?","options":{"A":"先天性免疫系統","B":"後天性免疫系統","C":"先天性以及後天性免疫系統同時受到相同程度的影響","D":"血液凝結系統"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_113090-23","q_num":23,"roc_year":"113","exam_code":"113090","src":"民國113年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"下列有關肺炎鏈球菌多醣體疫苗之敘述,何者最不適當?","options":{"A":"是多醣體連結蛋白質形成的疫苗","B":"以thymus-independent方式活化B細胞","C":"誘發出來的抗多醣體抗體可降低病菌感染","D":"可誘發記憶B細胞的產生"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_113090-27","q_num":27,"roc_year":"113","exam_code":"113090","src":"民國113年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"目前有許多癌症治療是透過給與免疫細胞或激活免疫系統而達成,關於癌症免疫治療,下列敘述何者最不適 當?","options":{"A":"mRNA癌症疫苗需先找到腫瘤的基因突變,根據病人的HLA預測新生抗原(neoantigen),再根據預測結果合 成mRNA,透過脂質奈米粒包覆mRNA,注射疫苗後激活腫瘤特異性細胞的免疫反應","B":"細胞激素激活殺手細胞(cytokine-induced killer, CIK),是將T細胞在含有多種促發炎細胞激素(pro- inflammatory cytokines)的環境下,進行體外培養,再回輸至病患體內,此種細胞,具有高度腫瘤特異 性","C":"單核球衍生樹突細胞(monocyte-derived dendritic cell, MoDC)透過體外培養,將單核球轉變成抗原呈 獻細胞,此種細胞會捕捉體內腫瘤抗原,並刺激與活化腫瘤特異性T細胞,以達到腫瘤毒殺作用","D":"嵌合抗原受體T細胞(chimeric antigen receptor-T, CAR-T),是透過病毒將CAR分子基因送入T細胞,此 CAR分子具有辨認腫瘤抗原與活化T細胞的特性"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_114020-27","q_num":27,"roc_year":"114","exam_code":"114020","src":"民國114年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"在腫瘤微環境(tumor microenvironment)中,下列何者是最不具免疫抑制性的分子或細胞?","options":{"A":"programmed death-1(PD-1)","B":"調節性T 細胞(regulatory T cell, Treg)","C":"M1 巨噬細胞(M1 macrophage)","D":"interleukin 10(IL-10)"},"answer":"C","accepted_answers":["C"],"answer_status":"normal","img":""},{"id":"med2_114020-28","q_num":28,"roc_year":"114","exam_code":"114020","src":"民國114年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"以PD-L1 單株抗體作為免疫癌症療法最主要的機轉,是阻斷下列何種細胞表現的PD-L1 與PD-1 的結合?","options":{"A":"巨噬細胞","B":"樹突細胞","C":"T 細胞","D":"腫瘤細胞"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_114090-22","q_num":22,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"下列何者最不可能高度表現於調節性T 細胞(Treg)?","options":{"A":"CD25","B":"IL-10","C":"CTLA-4","D":"B7"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_114090-26","q_num":26,"roc_year":"114","exam_code":"114090","src":"民國114年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"有關腫瘤免疫反應的敘述,下列何者最適當?","options":{"A":"有腫瘤特異性抗原的呈獻,可產生並存在著腫瘤專一性T 淋巴球","B":"免疫細胞無法進入腫瘤組織內,因而無法抑制腫瘤細胞的生長","C":"腫瘤細胞不斷生長增加時,亦產生性質變異,表現突變的細胞表面分子,進而造成免疫細胞的死亡","D":"因腫瘤細胞性質的變異,表現出腫瘤抑制基因(tumor suppressor gene)的產物,引起了腫瘤抑制自然殺 手細胞的效果"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""},{"id":"med2_115020-26","q_num":26,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"2018 年諾貝爾生醫獎,由James Allison 與Tasuku Honjo 共同獲得,表彰他們發展出利用免疫檢查點抑制 劑(immune checkpoint inhibitor, ICI)對抗癌療法的突破性研究,下列關於免疫檢查點抑制劑的描述, 何者最不適當?","options":{"A":"ICI 在癌症治療取得突破性的結果,如:黑色素瘤(melanoma)獲得較好的反應","B":"Pembrolizumab 與Nivolumab 是兩種常見的PD-1 抗體藥物,其治療反應率優於CTLA-4 抗體藥物","C":"Ipilimumab 是CTLA-4 抗體藥物,其治療副作用率高於PD-1 抗體藥物","D":"對於急性淋巴細胞白血病(acute lymphocytic leukemia, ALL),除了CAR-T 療法外,ICI 亦有顯著的療 效"},"answer":"D","accepted_answers":["D"],"answer_status":"normal","img":""},{"id":"med2_115020-27","q_num":27,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"移植前所進行捐贈者與受贈者之淋巴細胞混合反應(mixed lymphocyte reaction, MLR),最主要評估下列 何者之相容程度?","options":{"A":"HLA-A","B":"HLA-DR","C":"H2-D","D":"H2-K"},"answer":"B","accepted_answers":["B"],"answer_status":"normal","img":""},{"id":"med2_115020-28","q_num":28,"roc_year":"115","exam_code":"115020","src":"民國115年","topic":"M12免疫缺損移植腫瘤免疫與疫苗","stem":"抗CD20 抗體(Rituximab)可治療非霍奇金氏淋巴瘤(non-Hodgkin's lymphoma)。主要是經由下列何種機 轉引起B 細胞的凋亡,達到抗腫瘤效果?","options":{"A":"ADCC(經由活化Fc receptor)","B":"immunotoxin(抗體 + toxin)","C":"抗體結合chemotherapeutic drug","D":"免疫檢查點阻斷方法(immune checkpoint blockade)"},"answer":"A","accepted_answers":["A"],"answer_status":"normal","img":""}],E={"med2_106100-08":{"quick":"基因重組(選殖)三大工具為限制酶、DNA連接酶與選殖載體;DNA gyrase屬拓樸異構酶、非選殖工具。","detail":{"background":"分子選殖(molecular cloning)的核心工具:①限制酶(restriction enzyme/restriction endonuclease)辨識特定回文序列並切出帶黏端或平端的DNA片段;②DNA連接酶(DNA ligase)以磷酸二酯鍵把插入片段與載體接合;③選殖載體(cloning vector,如質體、噬菌體、cosmid、BAC)攜帶複製起點(ori)、篩選標記(抗藥基因)與多選殖位點(MCS),把外源基因送入宿主菌增殖。DNA gyrase(拓樸異構酶II)的功能是在複製時引入負超螺旋、解除拓撲張力,是「細菌自身複製酵素」也是fluoroquinolone的藥物標的,並非基因工程的選殖操作工具。故四者中最不常用於基因工程者為DNA gyrase。","options":{"A":"DNA gyrase為拓樸異構酶/quinolone標的,非選殖工具—正解(最不常用)。","B":"限制酶為切割DNA的基本工具。","C":"DNA連接酶接合DNA片段。","D":"選殖載體攜帶與增殖外源基因。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-03":{"quick":"aminoglycosides需氧依賴主動運輸進入菌體,厭氧菌天生抗性,故「厭氧菌對其具感受性」錯誤。","detail":{"background":"細菌抗藥性機制分四大類:①產生水解酵素(β-lactamase、aminoglycoside修飾酶);②藥物標的改變(PBP突變→β-lactam抗性、gyrase突變→quinolone抗性、核糖體甲基化→macrolide抗性);③降低通透或主動外排(porin減少、efflux pump);④代謝旁路(取得外源葉酸/胸腺嘧啶繞過抑制)。胺基糖苷類(aminoglycosides)的攝取需要「氧依賴的電子傳遞驅動主動運輸」把藥物送進細胞質作用於30S核糖體;厭氧菌因缺乏有氧電子傳遞而「無法攝入藥物」,對aminoglycosides呈天生(intrinsic)抗性,臨床上厭氧感染不可單用aminoglycoside。XDR-TB(廣泛抗藥)比MDR-TB抗更多種藥;NDM為新德里金屬β-內醯胺酶(metallo-carbapenemase),賦予廣泛β-lactam抗性;PBP改變導致penicillin抗性,皆為正確。","options":{"A":"XDR-TB抗藥範圍大於MDR-TB,正確。","B":"厭氧菌因無氧依賴運輸而對aminoglycosides天生抗性—錯誤(正解)。","C":"NDM金屬β-內醯胺酶賦予廣泛β-lactam抗性,正確。","D":"PBP改變導致penicillin抗性,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-04":{"quick":"致病島可位於染色體或移動元件(質體、噬菌體、轉位子)中,故「不存在於transposon」錯誤。","detail":{"background":"致病島(pathogenicity island, PAI)是一段「大片段DNA(數十kb)」,集中編碼多種毒力因子(如分泌系統、毒素、黏附素、鐵攝取系統)。其特徵:①GC含量與菌的核心基因組不同,顯示為「水平基因轉移」獲得;②常座落於tRNA基因旁、兩端帶正向重複序列或插入序列(IS);③可整合在染色體上,也可存在於質體、噬菌體或轉位子等可移動元件中,因此能在菌株間水平傳播;④可被環境訊號(溫度、pH、滲透壓)經單一調節因子協同活化整組毒力基因。故「PAI不存在於transposon之中」與其可移動本質相矛盾,為錯誤敘述。","options":{"A":"PAI可位於染色體或質體,正確。","B":"PAI亦可存在於轉位子等移動元件—此敘述錯誤(正解)。","C":"可被溫度/pH等單一因子協同活化,正確。","D":"由多基因組成、製造多種毒力因子,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-06":{"quick":"莢膜為多醣(少數多肽)、可抵抗吞噬,並非peptidoglycan、也非所有菌都有、不影響革蘭氏染色。","detail":{"background":"莢膜(capsule)是包覆於細胞壁外的「多醣(polysaccharide)」黏液層(少數菌例外,如炭疽桿菌為D-glutamate多肽莢膜)。功能:①抵抗白血球吞噬作用(antiphagocytic),是肺炎鏈球菌、腦膜炎雙球菌、流感嗜血桿菌、克雷白氏菌等致病的關鍵毒力因子,故「無莢膜株毒力大減」;②協助黏附與形成生物膜;③其多醣可作為「結合型或多醣體疫苗」的抗原。莢膜並非所有細菌都有,也與革蘭氏染色結果無關(革蘭氏染色取決於細胞壁peptidoglycan厚度與外膜)。莢膜成分非胜肽聚醣(那是細胞壁)。","options":{"A":"莢膜主成分為多醣,非胜肽聚醣—錯誤。","B":"並非所有細菌都有莢膜—錯誤。","C":"莢膜不影響革蘭氏染色反應—錯誤。","D":"莢膜可抵抗吞噬作用—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-09":{"quick":"23S rRNA腺嘌呤被erm甲基化會改變macrolide-lincosamide(clindamycin)結合位,造成MLSb抗性。","detail":{"background":"細菌50S核糖體大次單元的「23S rRNA」是大環內酯(macrolide)、林可醯胺(lincosamide,如clindamycin)與鏈陽性菌素B(streptogramin B)的共同結合區。erm基因產物為甲基轉移酶,使23S rRNA特定腺嘌呤甲基化(A2058),改變該結合位的構形,讓三類藥物都無法結合,稱為「MLSb抗性」,常表現可誘導性(inducible)或構成性(constitutive)。臨床上若菌株erythromycin抗藥、clindamycin看似敏感,須做D-test排除誘導型MLSb。慶大黴素作用於30S/16S rRNA、磺胺作用於葉酸合成、四環黴素作用於30S,皆非23S甲基化途徑。","options":{"A":"Gentamicin作用於30S,與23S甲基化無關。","B":"Sulfamethoxazole抑制葉酸合成。","C":"Tetracycline作用於30S。","D":"Clindamycin屬MLSb,23S rRNA甲基化造成其抗性—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-24":{"quick":"長期廣效抗生素會破壞腸道菌相、誘發困難梭菌等感染,「保持腸道健康」錯誤。","detail":{"background":"腸道共生菌相(gut microbiota)是人體最大的微生物社群,功能包括:①競爭排斥外來病原(colonization resistance);②合成維生素K與B群、產生短鏈脂肪酸(丁酸供結腸細胞能量);③訓練與調節宿主免疫;④其組成失衡(dysbiosis)與肥胖、糖尿病、發炎性腸病等代謝/免疫疾病相關。長期使用「廣效型抗生素」會大量殺滅共生菌、破壞colonization resistance,導致菌相失衡與「困難梭菌(C. difficile)偽膜性結腸炎」等伺機感染;免疫抑制劑使用者亦因防禦力下降而易發生腸道嚴重感染。故「廣效抗生素長期使用可保持腸道健康」為錯誤。","options":{"A":"長期廣效抗生素破壞菌相、誘發C. difficile感染—錯誤(正解)。","B":"共生菌對腸道有益,正確。","C":"菌相組成與代謝疾病相關,正確。","D":"免疫抑制劑可致腸道嚴重感染,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-05":{"quick":"肺炎鏈球菌疫苗以「莢膜多醣」為抗原(PPSV23多醣/PCV結合型),非表面蛋白質。","detail":{"background":"肺炎鏈球菌(Streptococcus pneumoniae)為α-溶血、catalase陰性、optochin敏感、膽鹽可溶的革蘭氏陽性雙球菌。致病關鍵:①「多醣莢膜」抵抗吞噬,是主要毒力因子,共逾90種血清型;②於肺泡腔增殖造成大葉性肺炎;③細胞壁的台口酸(teichoic acid)與胜肽聚醣碎片可活化「替代型補體路徑」並誘發發炎。疫苗以「莢膜多醣」為抗原:PPSV23為純多醣疫苗(涵蓋23血清型,對嬰幼兒免疫原性差),PCV13/15/20為「莢膜多醣-蛋白結合型疫苗」(可誘發T細胞依賴反應與免疫記憶,適用嬰幼兒)。故「疫苗由表面蛋白製備」錯誤(應為莢膜多醣)。","options":{"A":"莢膜抵抗吞噬,正確。","B":"肺泡腔大量增殖造成肺炎,正確。","C":"teichoic acid/peptidoglycan活化替代補體路徑,正確。","D":"疫苗抗原為莢膜多醣而非表面蛋白—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-06":{"quick":"O抗原是革蘭氏陰性菌外膜「脂多醣(LPS)」最外側的多醣重複單元(體抗原)。","detail":{"background":"革蘭氏陰性菌的血清學分型常用三種表面抗原:①O抗原(somatic antigen)=外膜LPS最外層的「O多醣側鏈(重複醣單元)」,熱穩定,用於血清型分群(如E. coli O157、Salmonella分型);②H抗原=鞭毛蛋白(flagellin);③K抗原=莢膜多醣。LPS結構由內而外為lipid A(內毒素活性核心)→核心多醣→O多醣側鏈。控制物質進出的通道是porin、維持細胞壁形態的是peptidoglycan,皆非O抗原。故O抗原為LPS的一部分。","options":{"A":"物質進出通道為porin,非O抗原。","B":"鞭毛蛋白為H抗原,非O抗原。","C":"O抗原為外膜LPS的一部分—正解。","D":"維持細胞壁形態者為peptidoglycan,非O抗原。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-03":{"quick":"class B為金屬β-內醯胺酶(metallo-β-lactamase),正是能水解carbapenems的carbapenemase,故「無法分解carbapenems」錯誤。","detail":{"background":"β-內醯胺酶(β-lactamase)依Ambler胺基酸序列分為A、B、C、D四類:A、C、D類為「serine β-lactamase」(活性中心為絲胺酸),B類為「metallo-β-lactamase(MBL)」,活性需Zn2+等金屬離子。臨床重要的MBL包括NDM、IMP、VIM,屬於「碳青黴烯酶(carbapenemase)」,能水解包括carbapenems在內的幾乎所有β-lactam(單環monobactam除外),且不被clavulanate等傳統抑制劑抑制,其基因多位於質體可水平傳播,是CRE(carbapenem抗藥腸桿菌)的重要機轉。故「class B無法分解carbapenems」與其carbapenemase本質相反,為錯誤。","options":{"A":"屬蛋白酶(水解酶)家族,正確。","B":"金屬β-內醯胺酶作用需金屬離子(Zn),正確。","C":"class B正是能水解carbapenems的carbapenemase—錯誤(正解)。","D":"基因多位於質體、可水平傳播,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-07":{"quick":"lac operon由repressor與CAP-cAMP(catabolite repression)調控,非定額感應(quorum-sensing)。","detail":{"background":"原核基因表現特色:①mRNA多為「多順反子(polycistronic)」,一條mRNA含多個ORF可轉譯出多種蛋白;②因無核膜,「轉錄與轉譯可同時偶聯進行(coupled)」;③operon調控以負/正調控結合。lac operon:LacI repressor在無乳糖時結合operator抑制轉錄;有乳糖時allolactose使repressor失活;同時受「葡萄糖效應(catabolite repression)」調控——葡萄糖少時cAMP升高、CAP-cAMP活化促進子。trp operon則以色胺酸為「共同抑制子(co-repressor)」啟動repressor並輔以衰減作用(attenuation)。「定額感應(quorum-sensing)」是依菌群密度經自誘導物(autoinducer)調控群體行為(生物膜、毒力),與lac operon無直接關係,故C錯誤。","options":{"A":"多順反子mRNA可轉譯多種蛋白,正確。","B":"轉錄與轉譯可偶聯同時進行,正確。","C":"lac operon受repressor與CAP-cAMP調控,非quorum-sensing—錯誤(正解)。","D":"trp operon中色胺酸為共同抑制子,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-02":{"quick":"porin位於革蘭氏陰性菌「外膜」,形成親水通道讓親水性小分子通過。","detail":{"background":"膜孔蛋白(porin)是革蘭氏陰性菌「外膜(outer membrane)」上的三聚體β-桶狀蛋白,構成充水通道,允許親水性小分子(營養物、離子,以及親水性抗生素如β-lactam)被動擴散通過外膜。臨床意義:porin表現減少或突變會降低藥物進入、造成抗藥性(如某些carbapenem抗藥)。porin與內毒素(LPS的lipid A)功能不同,也不是纖毛蛋白。其位於外膜而非內(細胞質)膜。故正確敘述為「可讓親水性分子通過」。","options":{"A":"porin位於外膜,非內膜—錯誤。","B":"可讓親水性分子通過—正解。","C":"與內毒素(LPS)功能不同—錯誤。","D":"非纖毛蛋白—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-04":{"quick":"metronidazole經厭氧還原生成自由基破壞DNA,非抑制蛋白質合成;其餘三者皆作用於核糖體。","detail":{"background":"依作用機轉分類抗生素:抑制細胞壁合成(β-lactam、vancomycin)、抑制蛋白質合成(aminoglycosides與tetracycline作用於30S;macrolide、clindamycin、chloramphenicol、linezolid作用於50S)、抑制核酸(quinolone抑gyrase、rifampin抑RNA聚合酶)、抑制葉酸(磺胺、trimethoprim)、破壞膜或DNA(metronidazole)。kanamycin屬aminoglycoside(30S)、clindamycin(50S)、tetracycline(30S)皆抑制蛋白質合成;metronidazole須先被厭氧/微需氧菌的低氧化還原電位系統「還原其硝基」生成具毒性的自由基中間產物,造成DNA斷裂,故僅對厭氧菌與某些原蟲有效。故C不屬抑制蛋白質合成。","options":{"A":"kanamycin(aminoglycoside)抑制蛋白質合成(30S)。","B":"clindamycin抑制蛋白質合成(50S)。","C":"metronidazole破壞DNA、非抑制蛋白質合成—正解。","D":"tetracycline抑制蛋白質合成(30S)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-04":{"quick":"質體為雙股環狀DNA、自主複製,可經接合在菌間傳遞抗藥基因;G+與G-皆有。","detail":{"background":"質體(plasmid)是獨立於染色體外的「雙股環狀DNA」,具自身複製起點而「自主複製(非與染色體同步)」。功能:攜帶非必需但具選擇優勢的基因,如抗藥性基因(R plasmid)、毒力因子、重金屬抗性、代謝基因等,並可經「接合(conjugation)」由供菌傳給受菌,是抗藥性水平傳播的主要載體。質體存在於革蘭氏陽性菌與陰性菌中,非僅G-。故「可在細菌間傳遞抗藥基因」最適當。","options":{"A":"質體可經接合在菌間傳遞抗藥基因—正解。","B":"質體自主複製,非與染色體同步—錯誤。","C":"質體為雙股環狀DNA,非線狀RNA—錯誤。","D":"G+與G-菌皆可有質體—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-05":{"quick":"只有乳糖時:乳糖使repressor失活、葡萄糖缺乏使cAMP升高活化CAP,兩者合致lac operon強力表現。","detail":{"background":"lac operon受「雙重控制」:①負調控——LacI repressor在無乳糖時結合operator阻斷轉錄;當培養液有乳糖,代謝產物allolactose結合repressor使其脫離operator(repressor被抑制);②正調控(catabolite repression)——細菌偏好葡萄糖,當「葡萄糖缺乏」時細胞內cAMP上升,cAMP-CAP複合體結合promoter上游,大幅增強RNA聚合酶招募。本題培養液「只含乳糖、無葡萄糖」:repressor被allolactose抑制(operator釋放)且cAMP高使CAP被活化→lac operon「強力表現」分解乳糖。故D(repressor被抑制+CAP被活化→促使表現)正確。","options":{"A":"CAP未活化則無法達最大表現—錯誤。","B":"無葡萄糖時CAP會被活化、operon會表現—錯誤。","C":"CAP活化應促進而非導致不表現—錯誤。","D":"repressor被抑制且CAP被活化,促使lac operon表現—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-16":{"quick":"MALDI-TOF MS鑑定細菌的偵測標的為「蛋白質」(以核糖體蛋白等構成質譜指紋)。","detail":{"background":"基質輔助雷射脫附飛行時間質譜(MALDI-TOF MS)已成為臨床微生物快速鑑定的主流工具:把單一菌落與基質混合,雷射游離後依「蛋白質的質荷比(m/z)」產生質譜指紋(主要來自含量豐富、保守的核糖體蛋白),與資料庫比對即可於數分鐘內鑑定到菌種層級。其優點為快速、低成本、可鑑定難培養菌;偵測標的物為「蛋白質」而非核酸、粒線體(細菌無)或微量元素。","options":{"A":"偵測標的為蛋白質(核糖體蛋白指紋)—正解。","B":"核酸為PCR/定序所測,非MALDI-TOF。","C":"細菌無粒線體。","D":"非偵測微量元素。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-24":{"quick":"共生菌相可協助合成維生素K與短鏈脂肪酸;菌種因部位/個體而異、非全抗藥、亦非完全無免疫反應。","detail":{"background":"人體共生菌相(commensal microbiota)在不同部位(口腔、皮膚、腸道、陰道)與不同個體間「組成各異」,受飲食、年齡、抗生素影響。其有益功能:①競爭排斥病原(colonization resistance);②代謝——腸道菌合成維生素K與B群、發酵纖維產生短鏈脂肪酸(丁酸、丙酸、乙酸)供宿主利用;③訓練免疫並維持耐受。免疫系統對共生菌「並非完全無反應」,而是以IgA、黏膜屏障與Treg維持「免疫耐受」與監控;共生菌也並非都具抗藥性。故「可協助產出維生素K與短鏈脂肪酸」最正確。","options":{"A":"不同部位/個體菌種並不一致—錯誤。","B":"共生菌並非都具抗藥性—錯誤。","C":"免疫系統以耐受機制監控、非完全無反應—錯誤。","D":"共生菌可協助合成維生素K與短鏈脂肪酸—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-03":{"quick":"DNA gyrase A次單元(gyrA)突變改變quinolone作用標的,造成ciprofloxacin等氟喹諾酮抗性。","detail":{"background":"氟喹諾酮(fluoroquinolone,如ciprofloxacin)的標的是DNA gyrase(拓樸異構酶II,革蘭氏陰性菌主要標的)與topoisomerase IV(革蘭氏陽性菌主要標的)。gyrase的A次單元(GyrA)上的「喹諾酮抗藥決定區(QRDR)」發生點突變,會降低藥物與酵素-DNA複合體的結合,造成對ciprofloxacin等quinolone的敏感性下降或抗藥。ampicillin/cephalosporin作用於PBP(細胞壁)、clindamycin作用於50S核糖體,皆非gyrase標的。故gyrA突變對應ciprofloxacin抗藥。","options":{"A":"ciprofloxacin以DNA gyrase為標的,gyrA突變致其抗藥—正解。","B":"ampicillin作用於PBP。","C":"cephalosporin作用於PBP。","D":"clindamycin作用於50S核糖體。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-04":{"quick":"形成「內孢子」是革蘭氏陽性菌(Bacillus/Clostridium)的特性,與革蘭氏陰性菌抗藥無關。","detail":{"background":"革蘭氏陰性菌的抗藥機制主要有:①分泌水解酵素(如β-lactamase水解β-lactam、aminoglycoside修飾酶);②藥物作用標的基因突變(PBP、gyrA、rpoB等);③降低藥物累積(porin減少使藥物難進、efflux pump主動把藥排出)。而「形成內孢子(endospore)停止代謝」是革蘭氏「陽性」桿菌(Bacillus、Clostridium)在不利環境的休眠機制,革蘭氏陰性菌不形成內孢子,因此與G-菌抗藥性無關。故D為與抗藥無關者。","options":{"A":"分泌水解酵素使抗生素失活,為抗藥機制。","B":"標的基因突變使藥物失去作用,為抗藥機制。","C":"加速外排(efflux)降低藥物濃度,為抗藥機制。","D":"形成內孢子為G+菌特性,與G-菌抗藥無關—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-08":{"quick":"有氧呼吸以O2為最終電子受體、能量產率最高,「無氧呼吸ATP更多」最不適當。","detail":{"background":"細菌產能方式比較:①有氧呼吸(aerobic respiration)以O2為最終電子受體,經電子傳遞鏈與氧化磷酸化產生最多ATP(電子傳遞鏈位於細菌「細胞膜」,因原核無粒線體);②無氧呼吸(anaerobic respiration)以NO3-、SO4^2-、fumarate等替代O2作為最終電子受體,因這些受體還原電位低於O2,產能少於有氧呼吸;③發酵(fermentation)以有機物為電子受體、僅靠受質階層磷酸化,ATP最少。兼性厭氧菌可依環境行有氧或無氧呼吸/發酵。故「無氧呼吸較有氧呼吸產生更多ATP」錯誤(應為有氧最多)。","options":{"A":"有氧呼吸ATP多於發酵,正確。","B":"細菌電子傳遞鏈位於細胞膜,正確。","C":"兼性厭氧可行無氧呼吸,正確。","D":"有氧呼吸ATP最多、無氧呼吸較少—此敘述錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-03":{"quick":"PBP為β-lactam(頭孢/碳青黴烯/單環)的標的,其突變不影響作用於葉酸的sulfonamides。","detail":{"background":"青黴素結合蛋白(penicillin-binding proteins, PBPs)是催化細胞壁胜肽聚醣交聯(transpeptidation)的酵素,也是所有「β-內醯胺類(β-lactam)」抗生素的作用標的,包括penicillins、cephalosporins、carbapenems、monobactams。PBP突變(如MRSA的mecA產生PBP2a、肺炎鏈球菌PBP改變)會降低β-lactam親和力而造成抗藥。磺胺類(sulfonamides)作用機轉完全不同——抑制二氫蝶酸合成酶(DHPS)阻斷葉酸合成,與PBP無關,故PBP突變「最不可能」造成磺胺抗藥。","options":{"A":"cephalosporins以PBP為標的,PBP突變可致抗藥。","B":"carbapenems以PBP為標的。","C":"monobactams以PBP為標的。","D":"sulfonamides作用於葉酸合成、與PBP無關—正解(最不可能)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-06":{"quick":"纖毛(fimbriae/pili)比鞭毛「更細更短」,「直徑更大」敘述錯誤。","detail":{"background":"細菌表面附屬構造:①鞭毛(flagellum)較長、由flagellin構成,負責運動(趨化);②纖毛/線毛(fimbriae/pili)比鞭毛「更細、更短、更多」,功能為「黏附(adhesion)」於宿主細胞或表面(common pili)與接合傳遞質體(sex pilus);③莢膜抵抗吞噬;④生物膜(biofilm)為菌體與胞外多醣基質形成的群落,協助黏附於組織與導管/植入物表面並增加抗藥/抗清除能力。故「纖毛比鞭毛直徑更大」與事實相反(纖毛更細),為最不適當。","options":{"A":"鞭毛為運動構造,正確。","B":"莢膜抵禦吞噬,正確。","C":"生物膜協助黏附器材/組織,正確。","D":"纖毛比鞭毛更細而非更大—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-09":{"quick":"metronidazole須經厭氧菌還原硝基才具毒性,可治Bacteroides fragilis等厭氧感染;對好氧菌與霍亂無效。","detail":{"background":"甲硝唑(metronidazole)為硝基咪唑(nitroimidazole)類,須先「被厭氧/微需氧菌與某些原蟲的低氧化還原電位電子傳遞系統還原其硝基」,生成具細胞毒性的自由基中間產物,造成DNA斷裂而殺菌——故僅對「厭氧菌與原蟲」(如Bacteroides fragilis、Clostridium difficile、Trichomonas、Giardia、Entamoeba)有效,對好氧菌無效(好氧菌無法還原活化藥物)。霍亂(Vibrio cholerae為兼性厭氧但治療以補液與doxycycline/azithromycin為主),metronidazole無效。故「可治療Bacteroides fragilis感染」最適當。","options":{"A":"霍亂治療以補液+doxycycline,metronidazole無效—錯誤。","B":"須經還原活化、非直接造成毒性—錯誤。","C":"可治療Bacteroides fragilis等厭氧感染—正解。","D":"對好氧菌無效—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-01":{"quick":"能攝取外源thymidine的菌可繞過trimethoprim對葉酸/胸苷合成的阻斷,造成trimethoprim抗性。","detail":{"background":"甲氧苄啶(trimethoprim)抑制二氫葉酸還原酶(DHFR),阻斷四氫葉酸生成、進而妨礙胸苷酸(dTMP)的從頭合成,使DNA合成停止(常與磺胺併用形成序列阻斷)。若細菌具有「胸苷補救途徑(thymidine salvage)」能攝取並利用環境中的外源thymidine,即可繞過trimethoprim造成的合成阻斷而繼續製造DNA,表現出對trimethoprim的抗藥性(此即臨床上含thymidine培養基會造成sulfa/trimethoprim偽抗藥的原因)。rifampin抑RNA聚合酶、clindamycin抑核糖體、ampicillin抑細胞壁,皆與thymidine利用無關。","options":{"A":"攝取外源thymidine可繞過trimethoprim的葉酸阻斷而抗藥—正解。","B":"rifampin作用於RNA聚合酶,與thymidine無關。","C":"clindamycin作用於核糖體。","D":"ampicillin作用於細胞壁。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-02":{"quick":"原生質體(protoplast)為細胞壁完全去除的菌體;G-菌僅去除部分壁、殘留外膜者稱spheroplast。","detail":{"background":"以溶菌酶或penicillin處理去除細胞壁後的菌體:①革蘭氏陽性菌(無外膜)去壁後完全裸露細胞膜,稱「原生質體(protoplast)」;②革蘭氏陰性菌因外膜難完全去除,殘留部分壁與外膜者稱「球狀體(spheroplast)」。去壁後菌體只剩細胞膜、呈球形,在低滲環境會因失去細胞壁的滲透保護而溶解,須在等滲環境維持。原生質體並非具莢膜、也非僅見於G+(G-亦有相應形式)、與耐極端環境的古細菌無關。故「細胞壁結構缺損之菌體」最適當。","options":{"A":"有莢膜並非原生質體定義—錯誤。","B":"細胞壁缺損之菌體即原生質體—正解。","C":"G-菌亦可形成(spheroplast),非只發生G+—錯誤。","D":"與耐極端的古細菌無直接關係—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-03":{"quick":"生物膜(biofilm)以胞外多醣基質包覆菌群,限制抗生素穿透並庇護持留菌,最能防抗生素清除。","detail":{"background":"生物膜(biofilm)是細菌附著於表面後分泌胞外聚合物(EPS,多醣/蛋白/eDNA)形成的立體群落,常見於導尿管、靜脈導管、人工關節、心臟瓣膜與慢性傷口。其抗藥/抗清除機制:①基質限制抗生素與免疫細胞穿透;②深層菌代謝緩慢形成「持留菌(persister)」對殺菌藥不敏感;③局部高密度促進抗藥基因水平轉移。故biofilm「最能防止抗生素清除細菌」。鞭毛主運動、線毛主黏附/接合、莢膜主抗吞噬,對抗生素清除的防護不如生物膜直接。","options":{"A":"鞭毛主運動,非防抗生素。","B":"線毛主黏附/接合,非主要防抗生素。","C":"生物膜限制藥物穿透並庇護持留菌,最能防抗生素清除—正解。","D":"莢膜主抗吞噬,對抗生素清除防護不如生物膜。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-02":{"quick":"大腸桿菌O157:H7的「H」代表鞭毛(flagella)抗原;O為LPS體抗原。","detail":{"background":"腸出血性大腸桿菌(EHEC)O157:H7的血清型命名:O抗原來自外膜「脂多醣(LPS)」最外側的O多醣側鏈(體抗原,熱穩定),H抗原來自「鞭毛(flagella)」的flagellin蛋白(熱不穩定),K抗原則為莢膜。O157:H7產生志賀樣毒素(Stx),可致出血性腸炎與溶血性尿毒症候群(HUS),感染來源常為未煮熟牛肉。故H7的H指鞭毛。","options":{"A":"H抗原為鞭毛(flagella)—正解。","B":"脂多醣對應O抗原。","C":"核心多醣為LPS中段,非H抗原。","D":"莢膜對應K抗原。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-06":{"quick":"溶菌酶切斷胜肽聚醣NAM-NAG間的β-1,4糖苷鍵,破壞細胞壁而抗菌。","detail":{"background":"溶菌酶(lysozyme)存在於淚液、唾液、鼻黏液、乳汁與嗜中性球顆粒中,是先天免疫的化學屏障。其機制為水解胜肽聚醣(peptidoglycan)骨架中N-乙醯胞壁酸(NAM)與N-乙醯葡萄糖胺(NAG)之間的「β-1,4糖苷鍵」,破壞細胞壁完整性,使菌體在低滲環境下溶解。對胜肽聚醣外露較多的革蘭氏陽性菌特別有效;革蘭氏陰性菌因外膜保護而較具抵抗(須先以補體或界面活性劑破壞外膜)。其作用標的是「細胞壁」而非細胞膜、電子傳遞鏈或線毛。","options":{"A":"溶菌酶作用於細胞壁而非細胞膜—錯誤。","B":"與電子傳遞鏈無關—錯誤。","C":"分解胜肽聚醣破壞細胞壁—正解。","D":"非切割線毛—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-07":{"quick":"兼性厭氧菌「有氧無氧皆可生長」,「無法在有氧生長」敘述最不適當。","detail":{"background":"細菌依對氧的關係分類:①絕對好氧菌(obligate aerobe)僅在有氧生長;②絕對厭氧菌(obligate anaerobe)有氧則死(缺SOD/catalase),其孢子(如Clostridium)可在有氧環境存活、待厭氧環境再萌發;③兼性厭氧菌(facultative anaerobe)「有氧或無氧皆可生長」(有氧時行呼吸、無氧時行發酵);④微需氧菌(microaerophile,如Campylobacter、Helicobacter)需低濃度O2(約5%),一般大氣環境(21% O2)無法正常生長;⑤耐氧厭氧菌。氧代謝會產生過氧化氫(H2O2)、超氧陰離子等活性氧,須由catalase、SOD清除。故A「兼性厭氧菌無法在有氧生長」與其定義相反,最不適當。","options":{"A":"兼性厭氧菌有氧無氧皆可生長—錯誤(正解)。","B":"微需氧菌在一般大氣無法正常生長,正確。","C":"H2O2為有害代謝產物,正確。","D":"絕對厭氧菌的孢子可在有氧留存,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-01":{"quick":"aminoglycosides的攝取需氧依賴主動運輸,故厭氧菌「天生抗性」,而非具感受性。","detail":{"background":"胺基糖苷類(aminoglycosides,如kanamycin、amikacin、gentamicin)結合30S核糖體(干擾16S rRNA與起始複合體、造成讀錯與抑制蛋白質合成),屬殺菌性。其進入菌體的關鍵步驟是「氧依賴(O2-dependent)的電子傳遞驅動主動運輸」把帶正電的藥物送進細胞質。因此:①「厭氧菌缺乏有氧電子傳遞→無法攝入藥物→天生抗性」,厭氧感染不可單用aminoglycoside;②降低藥物進入(攝取障礙)或產生修飾酶皆造成抗藥。故C「需厭氧環境穿膜、厭氧菌具感受性」完全錯誤(正好相反)。","options":{"A":"抑制蛋白質合成(30S),正確。","B":"降低藥物進入導致抗藥,正確。","C":"攝取需氧依賴運輸、厭氧菌反為天生抗性—錯誤(正解)。","D":"kanamycin/amikacin為此類抗生素,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-02":{"quick":"磺胺對哺乳類細胞無顯著毒性,因人類「不自行合成葉酸」(直接由食物攝取),缺乏可被抑制的DHPS。","detail":{"background":"磺胺類(sulfonamides)為對胺基苯甲酸(PABA)的結構類似物,競爭性抑制細菌的「二氫蝶酸合成酶(DHPS)」,阻斷由PABA合成葉酸(folate)的第一步,使細菌無法製造核酸所需的四氫葉酸,屬選擇性毒性(selective toxicity)的典範。其對哺乳類細胞低毒的根本原因是:人類細胞「不具葉酸合成途徑、不表現DHPS」,葉酸完全由飲食攝取,因此磺胺對人體無對應標的酵素可抑制。trimethoprim則抑制下游的DHFR(人類DHFR對其親和力遠低於細菌,故仍具選擇性)。故B正確。","options":{"A":"人類細胞根本不合成葉酸、無DHPS,非僅親和力低—不夠精確。","B":"哺乳類細胞不自行合成葉酸、無對應標的—正解。","C":"人類細胞不會合成葉酸衍生物替代—錯誤。","D":"葉酸確會被人體利用(由食物攝取)—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-12":{"quick":"CRISPR-Cas系統是細菌的「適應性免疫」,保護染色體不受噬菌體與外源質體嵌合。","detail":{"background":"CRISPR/Cas(規律間隔重複短迴文序列簇/CRISPR相關蛋白)是細菌與古菌的「後天/適應性免疫系統」:菌將曾入侵的噬菌體或質體DNA片段(spacer)整合進CRISPR陣列形成記憶,再轉錄成crRNA引導Cas核酸酶(如Cas9)辨識並切割再次入侵的同源外源DNA,藉此「保護染色體不受噬菌體與外源質體的嵌合」。SOS反應是DNA嚴重損傷時的應急誘導反應;易誤修復(error-prone/translesion)與裁除修復(excision repair)為DNA修復系統,皆非針對外源DNA入侵的防禦。CRISPR-Cas9並已被開發為基因編輯工具。","options":{"A":"SOS反應為DNA損傷應急反應,非防禦外源DNA。","B":"CRISPR-Cas防禦噬菌體與外源質體—正解。","C":"易誤修復為DNA修復機制。","D":"裁除式修復為DNA修復機制。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-02":{"quick":"炭疽桿菌在血液培養盤呈「非溶血」灰白菌落,故「大型β-溶血菌落」錯誤。","detail":{"background":"炭疽桿菌(Bacillus anthracis)為革蘭氏陽性、形成芽胞的大型桿菌,排列呈竹節狀。毒力因子有二:①「poly-D-glutamate多肽莢膜」(基因在質體pXO2)抵抗吞噬;②三元外毒素(基因在質體pXO1)——保護性抗原(PA)負責結合與運送,水腫因子(EF,鈣調素依賴腺苷酸環化酶)致水腫,致死因子(LF,鋅金屬蛋白酶切MAPKK)致細胞死亡。臨床分皮膚型(黑色焦痂eschar)、吸入型(=毛工病/wool-sorter’s disease,縱膈腔變寬、致死率高)與腸胃型。在血液瓊脂上菌落「非溶血」、灰白、邊緣呈捲髮狀(Medusa head)。故「大型β-溶血菌落」與其非溶血特性不符。","options":{"A":"多肽莢膜為重要毒力因子,正確。","B":"為毛工病(吸入性炭疽)致病菌,正確。","C":"炭疽桿菌為非溶血,非β-溶血—錯誤(正解)。","D":"毒素基因位於質體(pXO1),正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-16":{"quick":"3歲、會厭腫脹、吸氣性喘鳴與呼吸窘迫=急性會厭炎,典型致病菌為b型流感嗜血桿菌(Hib)。","detail":{"background":"急性會厭炎(acute epiglottitis)是會厭與聲門上組織的急速腫脹,典型於3-6歲幼兒,表現高燒、喉嚨劇痛、吞嚥困難、流口水、身體前傾三腳架姿勢與「吸氣性喘鳴」,側頸X光見會厭腫大的「拇指徵(thumbprint sign)」,為呼吸道急症(可致氣道阻塞)。經典致病菌為「b型流感嗜血桿菌(Haemophilus influenzae type b, Hib)」;自Hib結合型疫苗普及後發生率大降,成人病例改以其他菌(肺炎鏈球菌、A群鏈球菌)為主。無乳鏈球菌主要致新生兒疾病、腦膜炎雙球菌致腦膜炎/敗血症、李斯特菌致孕婦與新生兒感染,皆非典型會厭炎致病菌。","options":{"A":"b型流感嗜血桿菌為典型會厭炎致病菌—正解。","B":"無乳鏈球菌主要致新生兒敗血症/腦膜炎。","C":"腦膜炎雙球菌致流行性腦膜炎。","D":"李斯特菌致孕婦/新生兒感染。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-17":{"quick":"Hib最重要的毒力因子為多醣莢膜(PRP),抗吞噬並為結合型疫苗的標的。","detail":{"background":"b型流感嗜血桿菌(Hib)的關鍵毒力因子是「多醣莢膜——多核糖醇磷酸(polyribosyl-ribitol-phosphate, PRP)」,能抵抗補體與吞噬作用,使菌得以侵入血流造成菌血症、腦膜炎與會厭炎(侵襲性疾病僅見於有莢膜的b型)。Hib結合型疫苗即把PRP與蛋白載體(如破傷風類毒素)結合,誘發T細胞依賴反應與嬰幼兒免疫記憶,大幅降低侵襲性Hib感染。線毛主黏附、胜肽聚醣與內毒素參與發炎,但抗吞噬與侵襲的核心是多醣莢膜。","options":{"A":"線毛主黏附,非主要抗吞噬毒力因子。","B":"多醣莢膜(PRP)抗吞噬、為疫苗標的—正解。","C":"Hib致病非以細胞毒素為主。","D":"胜肽聚醣參與發炎,非主要毒力因子。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-01":{"quick":"金黃色葡萄球菌依「莢膜多醣」分為11種血清型。","detail":{"background":"金黃色葡萄球菌(Staphylococcus aureus)為革蘭氏陽性、葡萄串狀排列、catalase陽性、coagulase陽性、可發酵甘露醇、耐高鹽的兼性厭氧球菌。其表面莢膜多醣(capsular polysaccharide)具抗原多樣性,據此可分為11種血清型(其中第5、8型最常見於臨床分離株)。蛋白質A結合IgG的Fc段以抑制調理吞噬、脫皮毒素致燙傷樣症候群、腸毒素/TSST-1為超抗原,皆為毒力因子但非血清分型依據;胜肽聚醣為細胞壁成分。故血清型依莢膜多醣劃分。","options":{"A":"胜肽聚醣為細胞壁,非分型依據。","B":"蛋白質A為毒力因子,非血清分型。","C":"脫皮毒素致SSSS,非分型依據。","D":"依莢膜多醣分11種血清型—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-05":{"quick":"游泳者外耳炎、β-溶血、不發酵葡萄糖、氧化酶陽性,最符合綠膿桿菌。","detail":{"background":"游泳隊員長時間泡水導致的外耳炎(swimmer’s ear, otitis externa)經典致病菌為「綠膿桿菌(Pseudomonas aeruginosa)」:為革蘭氏陰性、需氧、氧化酶陽性、「不發酵葡萄糖(non-fermenter,僅氧化代謝)」的桿菌,產綠色pyocyanin與藍綠色素、有葡萄味,在血瓊脂可呈β-溶血,好濕熱環境(溫泉、泳池、醫院水源),亦致毛囊炎、燒傷與免疫不全者感染。草綠群鏈球菌(α-溶血、口腔菌)、表皮葡萄球菌(coagulase陰性)、肺炎鏈球菌(α-溶血)皆與題述特徵不符。","options":{"A":"草綠群鏈球菌為α-溶血口腔菌。","B":"表皮葡萄球菌coagulase陰性、非此情境。","C":"肺炎鏈球菌為α-溶血。","D":"綠膿桿菌致游泳者外耳炎、不發酵糖、β-溶血—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-10":{"quick":"胃潰瘍由幽門螺旋桿菌(H. pylori)引起,非葡萄球菌疾病。","detail":{"background":"葡萄球菌(主要S. aureus)所致疾病:①毒素型——腸毒素致食物中毒(嘔吐為主、潛伏期短)、脫皮毒素致燙傷樣皮膚症候群(SSSS)、TSST-1致中毒性休克症候群;②化膿型——膿皰瘡(impetigo)、毛囊炎、癤、膿瘍、傷口感染、骨髓炎、心內膜炎、肺炎。胃與十二指腸潰瘍的主因是「幽門螺旋桿菌(Helicobacter pylori)」(其次為NSAID),與葡萄球菌無關。故胃潰瘍非葡萄球菌疾病。","options":{"A":"食物中毒由葡萄球菌腸毒素引起。","B":"膿皰瘡為葡萄球菌(亦A群鏈球菌)感染。","C":"燙傷樣症候群由脫皮毒素引起。","D":"胃潰瘍由H. pylori引起、非葡萄球菌—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-01":{"quick":"肺炎鏈球菌對penicillin抗性主因為PBP改變(經轉形獲得馬賽克PBP基因),非產生penicillinase。","detail":{"background":"肺炎鏈球菌(Streptococcus pneumoniae)為自然轉形能力強的菌,可從環境攝取DNA重組形成「馬賽克(mosaic)PBP基因」,使青黴素結合蛋白(PBP)的構形改變、降低與β-lactam的親和力,造成penicillin敏感性下降至抗藥。其抗藥「不是靠分泌penicillinase(β-lactamase)」——這點與葡萄球菌不同。臨床上對高度抗藥株須提高劑量或改用第三代頭孢/vancomycin。阻擋藥物進入(porin/外膜)主要見於革蘭氏陰性菌,肺炎鏈球菌無外膜。","options":{"A":"肺炎鏈球菌不產生penicillinase—錯誤。","B":"PBP改變降低β-lactam親和力,為主要抗性機轉—正解。","C":"無外膜,非以阻擋藥物進入為主。","D":"細胞壁結構改變說法不精確,核心為PBP改變。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-05":{"quick":"李斯特菌「不形成芽胞」,故「形成內芽胞於低溫存活」錯誤;其冷藏耐受來自能在4°C生長。","detail":{"background":"單核球增多性李斯特菌(Listeria monocytogenes)為革蘭氏陽性、不形成芽胞的小桿菌,具特徵:①25°C時有鞭毛、呈「翻滾運動(tumbling motility)」;②兼性胞內寄生——藉listeriolysin O逃出吞噬泡,在細胞質內以肌動蛋白聚合形成「彗星尾(actin rocket)」於細胞間移行而躲避抗體;③能在「冷藏4°C生長(cold enrichment)」,故污染冷藏即食食品、軟乳酪、生菜;④高危族群為孕婦(經胎盤致流產/新生兒敗血症)、新生兒、老人與免疫低下者(腦膜炎)。其低溫存活靠「能在低溫增殖」而非靠芽胞(李斯特菌無芽胞)。","options":{"A":"為具運動性的革蘭氏陽性菌,正確。","B":"可在細胞質以肌動蛋白移行至鄰細胞,正確。","C":"主要經食物傳染,正確。","D":"李斯特菌不形成內芽胞—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-07":{"quick":"肉毒桿菌毒素是鋅金屬蛋白酶切SNARE蛋白、阻斷乙醯膽鹼釋放;使Rho-GTPase失活者為C. difficile毒素,故A錯誤。","detail":{"background":"肉毒桿菌(Clostridium botulinum)為絕對厭氧、產芽胞的革蘭氏陽性桿菌,其神經毒素(botulinum toxin, BoNT)是「最強的生物毒素」:屬鋅依賴金屬蛋白酶,進入運動神經末梢後「切割SNARE複合體蛋白(SNAP-25、syntaxin、synaptobrevin)」,阻斷突觸前乙醯膽鹼(ACh)釋放,造成「鬆弛性(弛緩性)麻痺」、複視、吞嚥困難與呼吸肌麻痺。型態:食源型(罐頭/醃漬厭氧食品中已形成的毒素)、嬰兒型(食入芽胞——如蜂蜜——於腸道產毒)、傷口型、吸入型(可作生化武器)。使Rho-GTPase葡萄糖化失活的是「C. difficile毒素A/B」,並非肉毒毒素。","options":{"A":"肉毒毒素切SNARE阻ACh釋放,非使Rho-GTPase失活—錯誤(正解)。","B":"食入受污染罐頭可致食源型肉毒症,正確。","C":"嬰兒食入芽胞(蜂蜜)致嬰兒肉毒症,正確。","D":"可作生化武器致吸入型肉毒症,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-01":{"quick":"奴卡氏菌為細胞壁含黴菌酸、部分抗酸的「需氧」放線菌,常致免疫不全者肺與皮膚感染。","detail":{"background":"奴卡氏菌(Nocardia)為革蘭氏陽性、絲狀分枝、「需氧」的放線菌,細胞壁含「黴菌酸(mycolic acid)」故呈「部分抗酸(modified acid-fast,弱抗酸)」陽性。臨床多侵犯細胞免疫低下者(類固醇、HIV、器官移植):經吸入致肺奴卡菌病(可空洞、似結核),經血行播散至腦(腦膿瘍);經外傷植入致皮膚/皮下感染(放線菌性足菌腫)。治療首選為磺胺(TMP-SMX)。索狀因子(cord factor, 海藻糖雙黴菌酸酯)是結核分枝桿菌的標誌毒力因子,Nocardia不以此為特徵。故「細胞壁含黴菌酸之需氧菌」正確。","options":{"A":"奴卡氏菌為革蘭氏陽性、非陰性—錯誤。","B":"常引起肺與皮膚感染—錯誤(敘述相反)。","C":"細胞壁含黴菌酸、為需氧菌、部分抗酸—正解。","D":"索狀因子為結核菌特徵,此題以C為正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-04":{"quick":"糞腸球菌最常引發泌尿道感染(亦心內膜炎、腹腔/膽道感染、菌血症)。","detail":{"background":"糞腸球菌(Enterococcus faecalis)為革蘭氏陽性、catalase陰性、能耐「膽鹽、6.5% NaCl與40-45°C」的腸道共生球菌(膽汁-esculin陽性、PYR陽性)。為重要院內伺機病原,最常造成「泌尿道感染」(尤其導尿管相關),其次為心內膜炎、腹腔/膽道感染與導管相關菌血症。臨床棘手在於對多種抗生素天生或獲得性抗藥,包括萬古黴素抗藥腸球菌(VRE,vanA/vanB改變細胞壁前驅物D-Ala-D-Ala為D-Ala-D-Lac)。肺炎、腦膜炎、食物中毒非其典型疾病。","options":{"A":"肺炎非腸球菌典型疾病。","B":"腦膜炎非腸球菌典型疾病。","C":"食物中毒非腸球菌引起。","D":"泌尿道感染為糞腸球菌最常見疾病—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-05":{"quick":"皮膚(膿皮症)鏈球菌感染ASO反應差,故「膿皮症病患易測得高ASO」錯誤。","detail":{"background":"A群鏈球菌(S. pyogenes)的「鏈球菌溶血素O(streptolysin O, SLO)」是膽固醇依賴性、對「氧敏感(oxygen-labile)」的成孔毒素,具強抗原性。咽喉感染後血中產生「抗鏈球菌溶血素O抗體(ASO)」上升,是診斷鏈球菌感染後「風濕熱」的重要依據。但在「皮膚(膿皮症/pyoderma)感染」中,皮膚脂質會抑制SLO,故ASO反應「不佳、效價多不上升」;此時以「anti-DNase B」較敏感,常用於評估皮膚鏈球菌感染後的急性腎絲球腎炎。SLO與肺炎鏈球菌的pneumolysin同屬膽固醇依賴細胞溶素、抗原相關。故C(膿皮症易測得高ASO)錯誤。","options":{"A":"SLO對氧敏感(oxygen-labile),正確。","B":"ASO效價為診斷風濕熱重要依據,正確。","C":"皮膚膿皮症ASO反應差、不易測得高效價—錯誤(正解)。","D":"與肺炎鏈球菌pneumolysin抗原相關,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-06":{"quick":"C5a peptidase是A群鏈球菌的毒力因子;金黃色葡萄球菌最不可能產生它。","detail":{"background":"金黃色葡萄球菌的酵素與毒素包括:coagulase(凝固酶,催化纖維蛋白形成包覆菌體以抗吞噬,是與表皮葡萄球菌鑑別的關鍵)、staphylokinase/fibrinolysin(溶解纖維蛋白助散播)、hyaluronidase(分解結締組織基質助擴散)、DNase、lipase、protein A、α/β/γ/δ毒素與超抗原(腸毒素、TSST-1)。「C5a peptidase」則是「A群鏈球菌(S. pyogenes)」的毒力因子——切割補體趨化素C5a以抑制嗜中性球募集。故金黃色葡萄球菌最不可能產生C5a peptidase。","options":{"A":"金黃色葡萄球菌可產hyaluronidase。","B":"可產纖溶酶(staphylokinase)。","C":"可產凝固酶(coagulase)。","D":"C5a peptidase為A群鏈球菌毒力因子,金黃色葡萄球菌不產—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-01":{"quick":"氣性壞疽最常見致病菌為產氣莢膜梭菌(C. perfringens),非化膿性鏈球菌。","detail":{"background":"氣性壞疽(gas gangrene, clostridial myonecrosis)是深部創傷(外傷、手術)後厭氧環境下的急性肌肉壞死,最常見致病菌為「產氣莢膜梭狀芽孢桿菌(Clostridium perfringens)」。其α毒素(lecithinase/phospholipase C)分解細胞膜磷脂,造成肌肉壞死、溶血與發酵產氣(組織內捻髮音/X光氣體),病灶沿肌肉間快速擴散並引發毒血症。治療須「廣泛清創、抗生素(penicillin+clindamycin)與高壓氧」並重;目前無有效疫苗。化膿性鏈球菌可致壞死性筋膜炎,但非氣性壞疽最常見病原。","options":{"A":"氣性壞疽最常見為C. perfringens而非化膿性鏈球菌—錯誤(正解)。","B":"為傷口感染之急性肌肉壞死、急速擴散,正確。","C":"治療含清創、抗生素與高壓氧,正確。","D":"目前無有效疫苗,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-02":{"quick":"人類是白喉桿菌唯一天然宿主;白喉非抗酸、毒素基因在噬菌體、已有疫苗。","detail":{"background":"白喉桿菌(Corynebacterium diphtheriae)為革蘭氏陽性、棒狀、排列呈柵欄/中文字狀的桿菌,以Albert或Loeffler染色可見「異染顆粒(metachromatic/Babes-Ernst granules)」(非抗酸染色)。其關鍵毒力因子「白喉毒素」的tox基因「位於溶原性β噬菌體(bacteriophage)上」(非質體),A次單元以ADP-ribosylation使延長因子EF-2失活、抑制蛋白質合成,造成偽膜性咽喉炎與心肌、神經毒性。「人類是唯一天然宿主」,可經類毒素疫苗(DPT)預防。","options":{"A":"白喉桿菌非抗酸菌(用異染顆粒鑑別)—錯誤。","B":"人類是唯一天然宿主—正解。","C":"毒素基因位於噬菌體而非質體—錯誤。","D":"已有DPT疫苗可預防—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-07":{"quick":"C. difficile感染因長期抗生素改變腸道菌群引起;治療用vancomycin/fidaxomicin而非ampicillin/clindamycin。","detail":{"background":"艱難梭狀芽孢桿菌(Clostridium difficile)為絕對厭氧、產芽胞的革蘭氏陽性桿菌。「長期或廣效抗生素(尤其clindamycin、fluoroquinolone、頭孢)破壞腸道正常菌群」後,C. difficile過度增殖並產生毒素A(enterotoxin)與毒素B(cytotoxin,使Rho-GTPase葡萄糖化失活、破壞細胞骨架),造成「抗生素相關腹瀉與偽膜性結腸炎」。治療應停用誘發抗生素並改用「口服vancomycin或fidaxomicin」(metronidazole用於輕症),復發者考慮糞便菌叢移植;以ampicillin/clindamycin治療反而會加重。其毒素作用於結腸黏膜、非引起肌肉痙攣;α毒素是C. perfringens的特徵。","options":{"A":"因長期抗生素改變菌群所致(偽膜性結腸炎)—正解。","B":"不可用ampicillin/clindamycin(反為誘因)—錯誤。","C":"毒素作用於結腸黏膜、非致肌肉痙攣—錯誤。","D":"α毒素為C. perfringens特徵—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-09":{"quick":"水腫因子(edema factor)是炭疽桿菌的毒素,非金黃色葡萄球菌毒力因子。","detail":{"background":"金黃色葡萄球菌常見毒力因子包括:protein A(結合IgG Fc抑制調理吞噬)、coagulase(凝固酶)、TSST-1與腸毒素(超抗原)、脫皮毒素、α/PV白血球毒素(PVL)、各種酵素(hyaluronidase、staphylokinase、DNase、lipase)與莢膜多醣。「水腫因子(edema factor, EF)」是炭疽桿菌三元毒素之一(鈣調素依賴腺苷酸環化酶,使cAMP升高致水腫),並非金黃色葡萄球菌的毒力因子。","options":{"A":"凝固酶為金黃色葡萄球菌毒力因子。","B":"TSST-1為其超抗原毒素。","C":"水腫因子為炭疽桿菌毒素、非金黃色葡萄球菌—正解。","D":"蛋白質A為其毒力因子。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-06":{"quick":"金黃色與表皮葡萄球菌皆catalase陽性,故catalase試驗無法區分兩者。","detail":{"background":"葡萄球菌均為catalase「陽性」(藉此與catalase陰性的鏈球菌、腸球菌區別),因此catalase試驗「無法」區分金黃色葡萄球菌與表皮葡萄球菌(兩者皆陽性)。可用以區分者:①coagulase——金黃色陽性、表皮陰性(coagulase-negative staphylococci, CoNS),為最關鍵的鑑別;②甘露醇發酵——金黃色可發酵(MSA培養基變黃)、表皮多不發酵;③溶血——金黃色多β-溶血、表皮不溶血;④此外金黃色novobiocin敏感、表皮敏感(腐生葡萄球菌則抗)。故catalase為兩者「共同陽性」、不能鑑別。","options":{"A":"coagulase可區分(金黃色+/表皮-)。","B":"甘露醇發酵可區分。","C":"溶血型態可區分。","D":"兩者皆catalase陽性,無法區分—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-08":{"quick":"厭氧菌天生抗aminoglycoside,故「可用aminoglycoside治療」錯誤(本題A、B均給分)。","detail":{"background":"厭氧性革蘭氏陽性球菌(如Peptostreptococcus、Finegoldia)為人體口腔、腸胃道、泌尿生殖道與皮膚的正常菌叢,多造成「伺機性、混合性」感染(膿瘍、深部組織感染)。其治療關鍵:厭氧菌「缺乏氧依賴運輸」而對「胺基糖苷類(aminoglycosides)天生抗藥」,故不可用aminoglycoside,應以β-lactam/β-lactamase抑制劑、clindamycin、metronidazole(對厭氧球菌效果較不一致)等治療。本題公告「A、B均給分」:選項A「都不會產生芽胞」之絕對化敘述與B「可用aminoglycoside治療」皆判為錯誤。","options":{"A":"以「都不會」絕對化陳述,被判為錯誤(均給分)。","B":"厭氧菌對aminoglycoside天生抗藥、不可用—錯誤(正解,均給分)。","C":"棲居口腔/腸胃/泌尿道/皮膚,正確。","D":"多屬伺機性感染,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-09":{"quick":"炭疽分皮膚型、腸胃型、吸入型(與注射型),並無「肌肉壞死型炭疽」。","detail":{"background":"炭疽桿菌依感染途徑分為:①皮膚型(最常見,黑色無痛焦痂eschar);②腸胃型(食入受污染肉品,致腸壞死出血);③吸入型(=毛工病,芽胞吸入後縱膈腔變寬、出血性縱膈炎、致死率最高);④注射型(注射毒品相關)。「肌肉壞死型(myonecrosis)」是「產氣莢膜梭菌氣性壞疽」的表現,並非炭疽的臨床型。故肌肉壞死型炭疽不存在。","options":{"A":"腸胃型炭疽存在。","B":"肌肉壞死型炭疽不存在(屬梭菌氣性壞疽)—正解。","C":"皮膚型炭疽存在(最常見)。","D":"吸入性炭疽存在(毛工病)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-10":{"quick":"STa/STb耐熱腸毒素是腸毒性大腸桿菌(ETEC)的毒力因子,非化膿性鏈球菌。","detail":{"background":"化膿性鏈球菌(S. pyogenes, A群鏈球菌)的毒力因子:M蛋白(抗吞噬、與風濕熱分子相似有關)、玻尿酸莢膜(抗吞噬、似宿主組織)、streptolysin O/S(溶血素)、致熱性外毒素(SpeA/C超抗原致猩紅熱與毒性休克)、streptokinase、DNase、C5a peptidase、hyaluronidase。「耐熱腸毒素STa與STb」則是「腸毒性大腸桿菌(ETEC)」造成旅行者腹瀉的毒素(STa活化guanylate cyclase),與化膿性鏈球菌無關。","options":{"A":"STa/STb為ETEC的耐熱腸毒素、非化膿性鏈球菌—正解。","B":"streptolysin O為其溶血素。","C":"M蛋白為其抗吞噬毒力因子。","D":"莢膜(玻尿酸)為其毒力因子。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-01":{"quick":"staphylokinase是「溶解」纖維蛋白以助散播,「促進纖維蛋白形成阻礙吞噬」錯誤(該作用為coagulase)。","detail":{"background":"金黃色葡萄球菌毒力因子辨析:①protein A結合IgG的Fc段,使抗體方向顛倒、抑制調理與吞噬;②腸毒素與TSST-1為「超抗原」,非專一性活化大量T細胞引發細胞激素風暴(食物中毒、中毒性休克);③脫皮毒素(exfoliative toxin)切desmoglein-1致表皮鬆解=燙傷樣皮膚症候群(SSSS);④coagulase「促進纖維蛋白形成」包覆菌體抗吞噬;⑤staphylokinase(=fibrinolysin)則「溶解纖維蛋白」促進菌體擴散——與D敘述相反。故D「staphylokinase促進fibrin形成、阻礙吞噬」錯誤。","options":{"A":"protein A結合IgG Fc抑制調理吞噬,正確。","B":"腸毒素與TSST-1為超抗原,正確。","C":"脫皮毒素致SSSS,正確。","D":"staphylokinase溶解fibrin助散播、非促進形成—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-03":{"quick":"李斯特菌為具運動性的革蘭氏陽性菌;為兼性胞內、能在4°C生長、經食物傳染。","detail":{"background":"單核球增生李斯特菌(Listeria monocytogenes):①革蘭氏陽性、「具運動性」(25°C有鞭毛,翻滾運動);②「兼性(非絕對)胞內」寄生,以listeriolysin O逃出吞噬泡並利用肌動蛋白於細胞間移行;③能於「冷藏4°C生長」,污染即食冷藏食品、軟乳酪、煙燻海產;④主要「經食物(口糞)傳染」,非飛沫;⑤孕婦、新生兒、老人與免疫低下者為高危(腦膜腦炎、菌血症、流產)。故「具運動性之革蘭氏陽性菌」正確。","options":{"A":"具運動性之革蘭氏陽性菌—正解。","B":"為兼性胞內、非絕對胞內—錯誤。","C":"可在4°C生長—錯誤。","D":"主要經食物傳染、非飛沫—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-04":{"quick":"化膿性鏈球菌軟組織感染最大挑戰為組織迅速壞死(壞死性筋膜炎)並引發敗血症。","detail":{"background":"化膿性鏈球菌(S. pyogenes)所致軟組織感染可從蜂窩組織炎進展為「壞死性筋膜炎(necrotizing fasciitis,俗稱食肉菌)」:其致熱性外毒素(超抗原)誘發大量細胞激素、SLO/SLS與多種酵素破壞組織,造成「沿筋膜面迅速壞死、劇痛與全身毒性」,並合併鏈球菌中毒性休克症候群(STSS),病程進展快、死亡率高。處置最大挑戰即「組織迅速壞死引發敗血症」,須緊急廣泛清創加高劑量penicillin+clindamycin(後者抑制毒素合成)。化膿性鏈球菌「對penicillin仍高度敏感、無抗藥」,亦非混合菌或持續性感染為主要難題。","options":{"A":"化膿性鏈球菌對penicillin仍敏感、無抗藥—錯誤。","B":"壞死性筋膜炎可為單一鏈球菌感染、非以混合為主—不夠精確。","C":"組織迅速壞死引發敗血症為最大挑戰—正解。","D":"非以持續性感染為主要難題—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-05":{"quick":"保護性抗原(PA)是炭疽疫苗的「主要免疫原」(效力最佳),故「PA免疫原效力較EF/LF差」錯誤。","detail":{"background":"炭疽桿菌三元外毒素由「保護性抗原(PA)」、「水腫因子(EF)」與「致死因子(LF)」組成:PA結合宿主細胞受體並形成孔道,把EF與LF運入細胞;EF為鈣調素依賴「腺苷酸環化酶」使cAMP升高致水腫;LF為「鋅金屬蛋白酶」切割MAPKK而致細胞死亡與免疫癱瘓。疫苗策略以「PA為主要免疫原」——誘發的抗PA中和抗體可阻止毒素進入細胞(效力最佳),現行人用炭疽疫苗(AVA)即以PA為主。故「PA作為免疫原效力較EF或LF差」與事實相反。多肽莢膜抗吞噬亦為毒力因子。","options":{"A":"莢膜抗吞噬為毒力因子,正確。","B":"PA為主要免疫原、效力最佳,非較EF/LF差—錯誤(正解)。","C":"致死因子LF具金屬蛋白酶活性,正確。","D":"水腫因子EF具腺苷酸環化酶活性,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-02":{"quick":"破傷風桿菌為絕對厭氧菌,僅能於厭氧系統或含氮操作箱培養。","detail":{"background":"破傷風梭菌(Clostridium tetani)為「絕對厭氧」、產末端芽胞(鼓棒狀/網球拍狀)的革蘭氏陽性桿菌,須在無氧的厭氧操作箱或厭氧培養系統才能生長。其外毒素「破傷風痙攣毒素(tetanospasmin)」沿神經逆行至中樞,阻斷抑制性神經傳遞(GABA、glycine)釋放,造成「痙攣性(僵直性)麻痺」(牙關緊閉、角弓反張)。仙人掌桿菌(Bacillus cereus)為需氧/兼性、金黃色葡萄球菌與李斯特菌為兼性厭氧,皆可在有氧環境生長。","options":{"A":"Bacillus cereus為需氧/兼性、可有氧生長。","B":"破傷風桿菌為絕對厭氧、僅厭氧培養—正解。","C":"金黃色葡萄球菌為兼性厭氧。","D":"李斯特菌為兼性厭氧。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-03":{"quick":"白喉毒素A次單元以ADP-ribosylation使延長因子EF-2失活,抑制蛋白質合成。","detail":{"background":"白喉毒素為A-B型外毒素:B次單元結合宿主細胞受體(heparin-binding EGF-like growth factor),經內吞後A次單元進入細胞質,催化「NAD+的ADP-ribose轉移到延長因子-2(EF-2)上的diphthamide殘基」,使EF-2失去活性、阻斷轉位(translocation)步驟而停止蛋白質合成,導致細胞死亡(咽喉偽膜、心肌炎、神經病變)。綠膿桿菌外毒素A亦以相同機轉作用於EF-2。核糖體40S/60S次單元、EF-3(真菌特有)皆非白喉毒素標的。","options":{"A":"40S次單元非白喉毒素標的。","B":"60S次單元非其標的。","C":"白喉毒素A使EF-2 ADP-ribosylation失活—正解。","D":"EF-3為真菌特有,非標的。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-07":{"quick":"耐膽鹽與高鹽、形成生物膜、高抗藥、好感染免疫不全者,最符合糞腸球菌。","detail":{"background":"糞腸球菌(Enterococcus faecalis)為腸道共生的革蘭氏陽性球菌,能耐「膽鹽、6.5% NaCl、寬溫度範圍」,可在導管、人工瓣膜等表面形成生物膜並具高度(含天生與獲得)抗藥性,常造成免疫不全或住院病人的泌尿道感染、心內膜炎、菌血症,VRE為院內感控重點。題述「免疫缺陷者、組織生物膜、高抗藥、耐膽鹽高鹽」即腸球菌特徵。轉糖鏈球菌致齲齒、化膿/肺炎鏈球菌不耐高鹽高膽鹽。","options":{"A":"肺炎鏈球菌不耐高鹽、非此特徵。","B":"化膿鏈球菌非耐膽鹽高鹽生物膜菌。","C":"轉糖鏈球菌主要致齲齒。","D":"糞腸球菌耐膽鹽高鹽、形成生物膜、高抗藥—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-08":{"quick":"無乳鏈球菌屬「B群」鏈球菌,故「屬A群」錯誤。","detail":{"background":"無乳鏈球菌(Streptococcus agalactiae)為「B群鏈球菌(GBS, Lancefield group B)」,β-溶血、「CAMP test陽性」(與金黃色葡萄球菌的β毒素協同擴大溶血)、馬尿酸水解陽性。其常「無症狀定殖於下生殖道與腸胃道」,孕婦帶菌者於生產時可垂直感染胎兒,造成「新生兒早發/晚發型敗血症、肺炎與腦膜炎」,故孕期35-37週篩檢GBS、陽性者產時給予預防性抗生素。把它歸為A群是錯誤(A群為S. pyogenes)。","options":{"A":"無乳鏈球菌屬B群、非A群—錯誤(正解)。","B":"CAMP test陽性,正確。","C":"常無症狀定殖腸胃/生殖泌尿道,正確。","D":"可致新生兒腦膜炎與肺炎,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-01":{"quick":"好氧、catalase陽性、coagulase陽性、耐高鹽,最符合金黃色葡萄球菌。","detail":{"background":"本題鑑定要點:「好氧(兼性)、catalase陽性→葡萄球菌;coagulase陽性→金黃色葡萄球菌(與表皮葡萄球菌區別);可在高鹽培養基(如mannitol salt agar, 7.5% NaCl)生長」,綜合即「金黃色葡萄球菌(S. aureus)」,可造成皮膚化膿、傷口感染、膿瘍。創傷弧菌與腸炎弧菌為革蘭氏陰性、氧化酶陽性、嗜鹽弧菌(海水/海鮮相關但非catalase/coagulase雙陽的球菌);表皮葡萄球菌coagulase陰性。","options":{"A":"創傷弧菌為G-弧菌、非coagulase陽性球菌。","B":"腸炎弧菌為G-弧菌。","C":"金黃色葡萄球菌(catalase+/coagulase+/耐高鹽)—正解。","D":"表皮葡萄球菌coagulase陰性。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-03":{"quick":"砂眼披衣菌細胞壁缺乏典型胜肽聚醣,與其他三種革蘭氏陽性菌不同。","detail":{"background":"胜肽聚醣(peptidoglycan)是大多數細菌細胞壁的主成分,革蘭氏陽性菌(如腸球菌、仙人掌桿菌、李斯特菌)細胞壁含厚層胜肽聚醣。但「砂眼披衣菌(Chlamydia trachomatis)」是絕對胞內寄生菌,其細胞壁「缺乏典型胜肽聚醣(無胞壁酸muramic acid)」,以富含半胱胺酸的外膜蛋白交聯維持結構,因此「不受作用於胜肽聚醣的β-lactam影響」,臨床以doxycycline或azithromycin治療。故四者中以胜肽聚醣為主要細胞壁成分的「例外」是砂眼披衣菌。","options":{"A":"砂眼披衣菌細胞壁缺乏典型胜肽聚醣—正解(例外)。","B":"糞腸球菌為G+、含厚層胜肽聚醣。","C":"仙人掌桿菌為G+、含胜肽聚醣。","D":"李斯特菌為G+、含胜肽聚醣。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-06":{"quick":"GBS主要定殖於「下生殖道與腸胃道」,故「主要棲居上呼吸道」錯誤。","detail":{"background":"無乳鏈球菌(GBS, B群鏈球菌)血清學鑑定的三大標誌:①Lancefield group B抗原(細胞壁多醣);②型特異性莢膜多醣(用於血清分型,如Ia、Ib、II-IX);③表面蛋白(如α/β C蛋白)。其「主要無症狀定殖於下生殖道與腸胃道(陰道、直腸)」,而非上呼吸道;孕婦帶菌可於生產時垂直感染新生兒致敗血症、肺炎、腦膜炎。故「主要棲居上呼吸道」錯誤。","options":{"A":"屬B群鏈球菌,正確。","B":"血清三大標誌(group B抗原/型特異莢膜多醣/表面蛋白),正確。","C":"主要定殖下生殖道與腸胃道、非上呼吸道—錯誤(正解)。","D":"可於生產時垂直感染嬰兒,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-07":{"quick":"本題公告「一律給分」;原答B(gravis biotype),其餘敘述(毒素作用EF-2、含短鏈黴菌酸、致呼吸道/皮膚病)皆為白喉桿菌正確特徵。","detail":{"background":"白喉桿菌(Corynebacterium diphtheriae):主要致病因子為白喉毒素,A次單元以ADP-ribosylation使延長因子EF-2失活、抑制蛋白質合成;細胞壁含「短鏈分枝菌酸(short-chain mycolic acids)」(棒狀桿菌與分枝桿菌、奴卡氏菌同屬含黴菌酸的放線菌類);主要造成呼吸道(偽膜性咽喉炎)或皮膚的疾病。依菌落型態分gravis、intermedius、mitis等生物型,毒力與生物型關聯非絕對。本題經評定後「一律給分」(送分)。","options":{"A":"白喉毒素作用於EF-2,正確。","B":"生物型與致病關聯非絕對(原訂答案,後送分)。","C":"細胞壁含短鏈分枝菌酸,正確。","D":"主要致呼吸道或皮膚疾病,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-01":{"quick":"5歲肺炎、α-溶血、catalase陰性、有莢膜,最符合肺炎鏈球菌。","detail":{"background":"本題鑑定:「catalase陰性→鏈球菌類(與葡萄球菌的catalase陽性區別);α-溶血(草綠);有莢膜;造成兒童細菌性肺炎」,綜合即「肺炎鏈球菌(Streptococcus pneumoniae)」,其多醣莢膜為主要毒力因子,optochin敏感、膽鹽可溶可進一步確認。化膿性鏈球菌為β-溶血(A群);表皮與金黃色葡萄球菌皆catalase陽性。","options":{"A":"化膿性鏈球菌為β-溶血、非α-溶血。","B":"肺炎鏈球菌(α-溶血、catalase陰性、有莢膜)—正解。","C":"表皮葡萄球菌catalase陽性。","D":"金黃色葡萄球菌catalase陽性。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-07":{"quick":"霍亂毒素為典型A-B5型毒素,使cAMP升高致大量分泌性腹瀉(腹痛、腹瀉)。","detail":{"background":"A-B型毒素由負責酵素活性的A次單元與負責結合宿主受體的B次單元組成。「霍亂毒素(cholera toxin)」是典型A-B5(一個A、五個B):B5結合腸黏膜GM1神經節苷脂,A次單元進入後ADP-ribosylate Gsα使腺苷酸環化酶持續活化、cAMP大量升高,促使腸上皮分泌Cl-與水,造成劇烈的「水樣(米湯樣)腹瀉」與脫水。金黃色葡萄球菌腸毒素為超抗原(致嘔吐)、C. perfringens α毒素為磷脂酶、listeriolysin O為成孔毒素,皆非此題的A-B型分泌性腹瀉毒素。","options":{"A":"葡萄球菌腸毒素為超抗原(致嘔吐),非典型A-B分泌性腹瀉毒素。","B":"α毒素為磷脂酶(致組織壞死),非分泌性腹瀉。","C":"霍亂毒素為A-B5、使cAMP升高致分泌性腹瀉—正解。","D":"listeriolysin O為成孔毒素,非分泌性腹瀉毒素。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-08":{"quick":"破傷風由土壤芽胞經傷口感染、非人傳人,「有群體免疫可降低感染」最不適當。","detail":{"background":"破傷風桿菌(Clostridium tetani)為絕對厭氧、產芽胞的菌,芽胞廣存土壤,經「傷口」進入厭氧傷口後產生tetanospasmin,逆行至中樞抑制GABA/glycine釋放,造成「痙攣性(僵直性)麻痺」。預防以「破傷風類毒素(toxoid)」主動免疫(有效疫苗),高危傷口可併用破傷風免疫球蛋白(TIG)被動免疫。重點:破傷風「不在人與人之間傳播」,而是環境芽胞經傷口感染,因此「沒有群體免疫(herd immunity)效應」——疫苗只保護接種者本人。故B最不適當。","options":{"A":"破傷風類毒素為有效疫苗,正確。","B":"破傷風非人傳人、無群體免疫效應—錯誤(正解)。","C":"造成痙攣性肌肉麻痺,正確。","D":"可產生內孢子,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-06":{"quick":"葡萄球菌腸毒素食物中毒潛伏期短(平均約2-6小時),毒素耐熱、症狀自限、不需抗生素。","detail":{"background":"金黃色葡萄球菌食物中毒屬「毒素型(預形成毒素intoxication)」:菌在食物(肉、奶、糕點、沙拉)中增殖預先製造「腸毒素(enterotoxin,為超抗原)」,此毒素「耐熱(煮沸仍具活性)」。食入後「潛伏期短(平均約2-6小時)」即出現劇烈嘔吐、噁心、腹瀉,屬「自限性」,約「24小時內緩解」,治療以補液為主、「不需抗生素」(毒素已形成、殺菌無益)。故「潛伏期平均約4小時」最符合(短潛伏期);其餘關於不耐熱、需大量抗生素、症狀持續4-5天皆錯誤。","options":{"A":"腸毒素耐熱、非不耐熱—錯誤。","B":"毒素型食物中毒不需抗生素—錯誤。","C":"潛伏期短(平均約2-6小時)—正解。","D":"症狀短(約24小時內緩解)、非持續4-5天—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-09":{"quick":"梭菌為絕對厭氧,「對氧氣有耐受性」與C. septicum厭氧特性不符。","detail":{"background":"敗血梭狀芽孢桿菌(Clostridium septicum)為絕對厭氧、產芽胞的革蘭氏陽性桿菌,於血液瓊脂上菌落呈「游走狀(swarming)」散布;可造成「非外傷性(自發性)肌肉壞死(myonecrosis)」與敗血症。臨床警訊:C. septicum敗血症常與「潛藏的大腸癌或血液惡性腫瘤」相關,須安排大腸鏡檢查。作為梭菌,它「絕對厭氧、對氧氣不耐受」,故「對氧氣有耐受性」與其特性不符,為非其特徵者。","options":{"A":"梭菌為絕對厭氧、對氧氣不耐受—錯誤(正解,非其特徵)。","B":"可見於潛藏大腸癌病人,正確。","C":"血瓊脂上呈游走狀散布,正確。","D":"導致非外傷性肌肉壞死,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-02":{"quick":"嬰兒誤食含芽胞蜂蜜後鬆弛性麻痺,為肉毒桿菌所致嬰兒肉毒症。","detail":{"background":"嬰兒肉毒症(infant botulism)是1歲以下嬰兒食入含「肉毒桿菌(Clostridium botulinum)芽胞」的食物(經典為「蜂蜜」),芽胞在尚未建立完整正常菌叢的腸道萌發、產生肉毒神經毒素所致。毒素阻斷神經肌肉接合處「乙醯膽鹼釋放」,造成「鬆弛性(弛緩性)麻痺」——便秘、吸吮無力、頸部癱軟(floppy baby)、眼瞼下垂、呼吸困難。故建議1歲以下勿餵食蜂蜜。破傷風致痙攣性麻痺、艱難梭菌致結腸炎、產氣莢膜梭菌致氣性壞疽/食物中毒,皆與此情境不符。","options":{"A":"艱難梭菌致偽膜性結腸炎,非鬆弛性麻痺。","B":"破傷風致痙攣性(非鬆弛性)麻痺。","C":"肉毒桿菌(蜂蜜芽胞)致嬰兒肉毒症、鬆弛性麻痺—正解。","D":"產氣莢膜梭菌致氣性壞疽/食物中毒。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-05":{"quick":"破傷風痙攣毒素(tetanospasmin)為蛋白質外毒素,加熱100°C易變性失活。","detail":{"background":"比較細菌毒素的熱穩定性:①蛋白質外毒素(如破傷風痙攣毒素tetanospasmin、白喉毒素、霍亂毒素)多「熱不穩定」,短暫100°C加熱即變性失活(故破傷風以類毒素免疫——加熱/甲醛去毒);②內毒素(LPS的lipid A)與腦膜炎雙球菌的脂寡糖(LOS)屬脂多醣,「耐熱」;③金黃色葡萄球菌的TSST-1與腸毒素為「相對耐熱」的超抗原(腸毒素煮沸仍具活性)。故四者中經短暫100°C加熱「較易失活」者為破傷風的蛋白質外毒素。","options":{"A":"內毒素(LPS)耐熱、不易失活。","B":"TSST-1超抗原相對耐熱。","C":"破傷風痙攣毒素為蛋白質、加熱易變性失活—正解。","D":"脂寡糖(LOS)耐熱。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-08":{"quick":"猩紅熱皮疹由「致熱性外毒素(超抗原)」引起,非鏈球菌激酶(streptokinase),故B錯誤。","detail":{"background":"化膿性鏈球菌(S. pyogenes)毒力因子:①M蛋白——抗吞噬、抗補體,並與風濕熱的分子相似有關;②致熱性外毒素(streptococcal pyrogenic exotoxin, SpeA/SpeC)為「超抗原」,引起「猩紅熱(scarlet fever)的瀰漫性紅疹、草莓舌」與鏈球菌中毒性休克;③streptolysin O(對氧敏感、具抗原性,誘發ASO)與streptolysin S;④streptokinase(纖溶酶原活化劑)與DNase、hyaluronidase助菌在組織內散播。故猩紅熱皮疹是「致熱性外毒素」造成,而非streptokinase,B為最不適當。","options":{"A":"M蛋白協助躲避吞噬,正確。","B":"猩紅熱紅疹由致熱性外毒素(超抗原)引起、非streptokinase—錯誤(正解)。","C":"SLO具抗原性、對氧敏感,正確。","D":"DNase助菌在組織散播,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-24":{"quick":"沙賓(Sabin)為口服活減毒小兒麻痺疫苗,先天免疫不全者禁用(可致疫苗相關麻痺)。","detail":{"background":"活減毒疫苗(live attenuated vaccine)含可複製的減毒病原,於先天/嚴重免疫不全者可能「不受控複製」而致疫苗相關疾病,故為禁忌。「沙賓(Sabin)口服小兒麻痺疫苗(OPV)」即活減毒疫苗,免疫不全者可發生「疫苗相關麻痺型小兒麻痺(VAPP)」,應改用「沙克(Salk)去活化注射型(IPV)」。相對地,B型肝炎疫苗(重組表面抗原)、DPT(類毒素+去活化)與「注射型流感疫苗(去活化)」皆非活疫苗,對免疫不全者較安全。故最不適合者為Sabin OPV。","options":{"A":"B型肝炎疫苗為重組蛋白、非活疫苗,可用。","B":"Sabin OPV為活減毒疫苗、免疫不全者禁用—正解(最不適合)。","C":"DPT為類毒素/去活化、可用。","D":"注射型流感疫苗為去活化、可用。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-07":{"quick":"放線菌(Actinomyces israelii)為厭氧、菌落呈臼齒狀、對penicillin敏感的革蘭氏陽性菌。","detail":{"background":"以色列放線菌(Actinomyces israelii)為「厭氧至微需氧」、革蘭氏陽性、絲狀分枝、非抗酸的菌,屬口腔正常菌叢。致放線菌病(actinomycosis):多在拔牙/外傷後形成慢性化膿肉芽腫,跨組織面蔓延形成竇道,排出含「硫磺顆粒(sulfur granules)」的膿液;培養菌落呈「臼齒(molar tooth)狀」。治療「對penicillin敏感」(長療程高劑量)。Actinomyces與丙酸桿菌(Propionibacterium/Cutibacterium)皆為「革蘭氏陽性」。故「具臼齒狀菌落」最適當。","options":{"A":"放線菌為厭氧、非絕對需氧—錯誤。","B":"菌落呈臼齒狀—正解。","C":"對penicillin敏感、非抗性—錯誤。","D":"放線菌與丙酸桿菌皆為革蘭氏陽性—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-01":{"quick":"大腸桿菌為兼性厭氧菌;結核菌需氧、破傷風與肉毒桿菌絕對厭氧。","detail":{"background":"依氧需求分類:①兼性厭氧菌(facultative anaerobe)——有氧無氧皆可生長,如「大腸桿菌(E. coli)」、腸桿菌科、葡萄球菌、鏈球菌、李斯特菌;②絕對需氧菌——如結核分枝桿菌、綠膿桿菌、Bacillus;③絕對厭氧菌——如破傷風桿菌、肉毒桿菌、產氣莢膜梭菌、Bacteroides;④微需氧菌——如Campylobacter、Helicobacter。故四者中兼性厭氧者為大腸桿菌。","options":{"A":"大腸桿菌為兼性厭氧—正解。","B":"結核桿菌為絕對需氧。","C":"破傷風桿菌為絕對厭氧。","D":"肉毒桿菌為絕對厭氧。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-05":{"quick":"產氣莢膜梭菌的α毒素(lecithinase/phospholipase C)是造成氣性壞疽的主要毒素。","detail":{"background":"產氣莢膜梭狀芽孢桿菌(Clostridium perfringens)依毒素型分A-E型;造成「氣性壞疽(clostridial myonecrosis)」的關鍵是「α毒素(alpha toxin)」——一種「卵磷脂酶(lecithinase/phospholipase C)」,水解細胞膜磷脂(卵磷脂),造成肌肉壞死、溶血、血管通透增加與組織產氣。臨床特徵為深部創傷後劇痛、捻髮音(crepitus)、惡臭與全身毒性,需緊急清創。β、ε、ι毒素與其他型(致壞死性腸炎或動物疾病)相關,但氣性壞疽主因為α毒素。C. perfringens亦以腸毒素致食物中毒。","options":{"A":"α毒素(lecithinase)為氣性壞疽主要毒素—正解。","B":"β毒素與壞死性腸炎相關,非氣性壞疽主因。","C":"ε毒素見於C/D型(動物腸毒血症)。","D":"ι毒素見於E型,非氣性壞疽主因。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-09":{"quick":"新生兒「壞死性筋膜炎」主要為A群鏈球菌等所致,與無乳鏈球菌(GBS)最無關。","detail":{"background":"無乳鏈球菌(GBS, B群鏈球菌)是孕婦下生殖道帶菌、垂直感染新生兒的主要病原,典型疾病:①新生兒早發型/晚發型「敗血症、肺炎、腦膜炎」;②孕婦的泌尿道感染、絨毛膜羊膜炎與產褥感染。但「壞死性筋膜炎(necrotizing fasciitis)」主要由A群鏈球菌(S. pyogenes)、混合厭氧菌或創傷弧菌等引起,並非GBS的典型疾病。故與GBS最無關者為新生兒筋膜炎。","options":{"A":"新生兒腦膜炎為GBS典型疾病。","B":"新生兒肺炎為GBS典型疾病。","C":"孕婦泌尿道感染與GBS相關。","D":"新生兒壞死性筋膜炎主要為A群鏈球菌、與GBS最無關—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-03":{"quick":"莢膜為毒力因子但「非細菌生長所必需」,故「對生長絕對必要」最不適當。","detail":{"background":"莢膜(capsule)是包覆細胞壁外的多醣(少數為多肽,如炭疽桿菌的poly-D-glutamate)黏液層。功能:①抵抗白血球吞噬(antiphagocytic),是肺炎鏈球菌、腦膜炎雙球菌、Hib、克雷白氏菌等的關鍵毒力因子;②促進與宿主組織或其他菌表面的黏附、形成生物膜;③其多醣可作為疫苗抗原。但莢膜「並非細菌生長存活所必需」——去莢膜的突變株在體外仍能生長(只是毒力下降),故「對細菌生長絕對必要」為最不適當。","options":{"A":"莢膜非細菌生長所必需—錯誤(正解)。","B":"炭疽桿菌產多肽莢膜,正確。","C":"莢膜抗吞噬,正確。","D":"莢膜促進黏附,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-07":{"quick":"孕婦類流感症狀且致流產或新生兒疾病,最符合單核細胞增生性李斯特菌。","detail":{"background":"孕婦感染「李斯特菌(Listeria monocytogenes)」常表現輕微「類流感(發燒、肌痛)」症狀,但菌可經血行至胎盤造成「絨毛膜羊膜炎、流產、死產或新生兒早發型敗血症/肉芽腫(granulomatosis infantiseptica)、晚發型腦膜炎」。感染源為冷藏即食食品、軟乳酪、未滅菌乳品(李斯特菌能在4°C生長)。故孕婦應避免高風險食品。化膿性鏈球菌、紅斑丹毒絲菌、流感嗜血桿菌皆非典型造成孕婦類流感合併流產/新生兒疾病的食源病原。","options":{"A":"化膿性鏈球菌非典型孕婦食源致流產病原。","B":"紅斑丹毒絲菌主要致職業性皮膚感染(類丹毒)。","C":"李斯特菌致孕婦類流感、流產與新生兒疾病—正解。","D":"流感嗜血桿菌非此情境。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-06":{"quick":"退伍軍人菌肺炎以巨環內酯(azithromycin)或fluoroquinolone治療;本題A、B均給分。","detail":{"background":"退伍軍人菌(Legionella pneumophila)為革蘭氏陰性、兼性「胞內」寄生菌,可在巨噬細胞與阿米巴原蟲內繁殖。因其位於細胞內,β-lactam(如ampicillin)穿透差、療效不佳;治療須選「能進入細胞內」的藥物——「巨環內酯(macrolide,如azithromycin)」或「氟喹諾酮(levofloxacin)」為首選。amphotericin B為抗黴菌藥、無效。本題官方公告「A、B均給分」(azithromycin為標準首選,clindamycin亦判給分)。","options":{"A":"clindamycin(本題判為給分)。","B":"azithromycin(巨環內酯)為退伍軍人菌肺炎首選—正解。","C":"ampicillin(β-lactam)對胞內菌療效差。","D":"amphotericin B為抗黴菌藥、無效。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-07":{"quick":"鼠疫桿菌(Yersinia pestis)引起鼠疫,萊姆病由疏螺旋體(Borrelia)經蜱傳播,故配對錯誤。","detail":{"background":"病原與疾病配對:①肺炎克雷白氏桿菌(Klebsiella pneumoniae)——在台灣為社區型「化膿性肝膿瘍」的主因(高黏液型K1/K2),亦致肺炎、UTI;②創傷弧菌(Vibrio vulnificus)——海水/生食牡蠣相關,於肝病/鐵過載者致「敗血症與壞死性軟組織感染」;③空腸彎曲桿菌(Campylobacter jejuni)——禽肉相關「腸胃炎」,與Guillain-Barré症候群有關;④鼠疫桿菌(Yersinia pestis)——經鼠蚤傳播引起「鼠疫(腺鼠疫/肺鼠疫)」。萊姆病(Lyme disease)則由「疏螺旋體Borrelia burgdorferi」經「蜱」傳播,與鼠疫桿菌無關。故D配對錯誤。","options":{"A":"Klebsiella–肝膿瘍,配對正確。","B":"Vibrio vulnificus–敗血症,配對正確。","C":"Campylobacter jejuni–腸胃炎,配對正確。","D":"鼠疫桿菌應致鼠疫而非萊姆病—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-03":{"quick":"重複加熱/室溫久置的米飯(炒飯)食物中毒最相關者為仙人掌桿菌(Bacillus cereus)。","detail":{"background":"仙人掌桿菌(Bacillus cereus)為革蘭氏陽性、產芽胞的桿菌,造成兩型食物中毒:①「嘔吐型(emetic)」——與「米飯(炒飯)」最相關,菌在煮熟後室溫久置的米飯中產生「耐熱的嘔吐毒素(cereulide)」,潛伏期短(1-6小時)、以噁心嘔吐為主(類似葡萄球菌食物中毒);②「腹瀉型」——攝入後在腸道產生不耐熱腸毒素,潛伏期較長(8-16小時)、以水瀉為主。故「受污染米飯」食物中毒最相關者為B. cereus。沙門氏菌(蛋/肉)、創傷弧菌(海鮮)、大腸桿菌(各式)非「米飯」典型病原。","options":{"A":"腸炎沙門氏菌多與蛋/家禽相關。","B":"創傷弧菌與海鮮/海水相關。","C":"仙人掌桿菌(耐熱嘔吐毒素)與米飯食物中毒最相關—正解。","D":"大腸桿菌非米飯典型病原。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-04":{"quick":"產志賀毒素大腸桿菌(STEC)正是產生stx1/stx2志賀樣毒素的菌,「不產生stx1或stx2」錯誤。","detail":{"background":"產志賀毒素大腸桿菌(Shiga toxin-producing E. coli, STEC,又稱EHEC),代表血清型「O157:H7」,經「未煮熟牛肉、生奶、受污染蔬菜」食源傳播。其關鍵毒力因子為「志賀樣毒素(Shiga toxin, stx1與stx2)」——抑制宿主60S核糖體(切28S rRNA)阻斷蛋白質合成,破壞腸與腎血管內皮,造成「出血性腸炎(血便)」與「溶血性尿毒症候群(HUS)」(尤其兒童),故抗生素可能增加HUS風險而不建議常規使用。STEC定義即「產生stx」,故「不產生stx1或stx2」與其本質矛盾,為錯誤。","options":{"A":"屬食源性疾病,正確。","B":"O157:H7為常見嚴重血清型,正確。","C":"可引起血性腹瀉,正確。","D":"STEC正是產生stx1/stx2者—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-07":{"quick":"肝硬化者經海水傷口感染、出現出血性水泡與組織壞死,最符合創傷弧菌。","detail":{"background":"創傷弧菌(Vibrio vulnificus)為革蘭氏陰性、嗜鹽(halophilic)的弧菌,存在溫暖海水與生鮮海產(牡蠣)。高危族群為「慢性肝病/肝硬化、血色素沉著症(鐵過載)、免疫低下者」。感染途徑:①「海水接觸傷口」→快速進展的「壞死性軟組織感染(出血性水泡bullae、蜂窩組織炎、壞死)」;②「生食牡蠣」→原發性敗血症。病程兇猛、死亡率高,須緊急抗生素(doxycycline+ceftriaxone)與清創。本題肝硬化、海邊割傷後出血性水泡與壞死即典型創傷弧菌感染。","options":{"A":"傷寒沙門桿菌經糞口、致全身性傷寒,非此情境。","B":"鮑曼不動桿菌多為院內感染。","C":"霍亂弧菌致水樣腹瀉、非傷口壞死。","D":"創傷弧菌(海水/肝病)致出血性水泡與組織壞死—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-05":{"quick":"傷寒沙門桿菌為人類專一病原、經糞口由人傳人,「由家禽家畜直接傳染」錯誤。","detail":{"background":"傷寒沙門桿菌(Salmonella Typhi)為革蘭氏陰性、兼性胞內的腸道病原,「以人類為唯一宿主」,主要經「糞口途徑(受污染的水或食物)」由「人(尤其帶原者)」傳人。致病:菌侵入小腸黏膜(M細胞、Peyer’s patch),經巨噬細胞播散至「肝、脾、骨髓」等網狀內皮系統,造成傷寒(持續高燒、相對緩脈、玫瑰疹、肝脾腫大);少數康復者成「無症狀帶原者」,菌「潛伏於膽囊(常合併膽結石)」隨膽汁排出。動物來源、經受污染肉蛋直接傳染者是「非傷寒型沙門氏菌(non-typhoidal Salmonella)」造成腸胃炎,與S. Typhi不同。故B錯誤。","options":{"A":"主要經糞口傳染,正確。","B":"傷寒沙門桿菌為人類專一、人傳人而非家禽家畜直接傳染—錯誤(正解)。","C":"會感染腸道並侵肝脾,正確。","D":"帶原者菌潛伏於膽囊,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-07":{"quick":"神奈川陽性的副溶血弧菌以產生「熱穩定直接溶血素(TDH)」作為毒力標誌。","detail":{"background":"副溶血弧菌(Vibrio parahaemolyticus)為嗜鹽的革蘭氏陰性弧菌,與「生食或未煮熟海鮮」相關,造成水樣腹瀉(亦可血便)。其毒力標誌為「熱穩定直接溶血素(thermostable direct hemolysin, TDH)」——在特殊血瓊脂(Wagatsuma agar)上產生β-溶血,稱「神奈川現象(Kanagawa phenomenon)陽性」,臨床致病株多為神奈川陽性。莢膜多醣、熱不安定腸毒素(屬ETEC/霍亂類)與LPS皆非神奈川試驗判定依據。","options":{"A":"莢膜多醣非神奈川判定依據。","B":"熱不安定腸毒素為ETEC/霍亂類,非此標誌。","C":"熱穩定直接溶血素(TDH)為神奈川陽性的依據—正解。","D":"脂多醣(LPS)非神奈川判定依據。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-09":{"quick":"退伍軍人菌為胞內菌,宿主防禦主要靠細胞媒介免疫,「藉抗莢膜抗體」錯誤。","detail":{"background":"退伍軍人菌(Legionella pneumophila)為革蘭氏陰性、「兼性胞內」寄生菌:①於自然界可存活並繁殖於「阿米巴原蟲」與生物膜中(供水系統、冷卻水塔、熱水器為感染源);②為挑剔菌,培養需「BCYE培養基(含L-cysteine與鐵)」,血瓊脂上不長;③造成退伍軍人症(嚴重肺炎,常伴低血鈉、腹瀉、神經症狀)與自限的龐提亞克熱;④治療用「macrolide或fluoroquinolone」(胞內穿透佳)。因屬胞內菌,宿主清除「主要靠細胞媒介免疫(活化巨噬細胞的Th1反應)」,而非抗莢膜抗體/體液免疫。故C錯誤。","options":{"A":"可存活於阿米巴原蟲體內,正確。","B":"培養需L-cysteine與鐵(BCYE),正確。","C":"防禦主要靠細胞媒介免疫、非抗莢膜抗體—錯誤(正解)。","D":"以macrolide/fluoroquinolone治療,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-08":{"quick":"鬆脆類桿菌「具有多醣莢膜」(致腹腔膿瘍關鍵),故「少數沒有莢膜」錯誤。","detail":{"background":"鬆脆類桿菌(Bacteroides fragilis)為革蘭氏陰性、絕對厭氧的桿菌,是腸道優勢厭氧菌,也是腹腔內膿瘍與厭氧菌血症最常見病原。毒力因子:①「多醣莢膜(capsular polysaccharide complex)」——抗吞噬並直接誘發膿瘍形成,是其最重要毒力因子;②腸毒素「脆弱類桿菌毒素(fragilysin/BFT)」——不耐熱的鋅金屬蛋白酶,致分泌性腹瀉;③其LPS的「脂質A結構特殊」(缺磷酸與醯基較少),內毒素活性微弱;④產β-lactamase對penicillin抗藥(治療用metronidazole、carbapenem、β-lactam/抑制劑)。故「少數沒有莢膜」與其有莢膜的事實相反。","options":{"A":"B. fragilis具多醣莢膜、非無莢膜—錯誤(正解)。","B":"產不耐熱鋅金屬蛋白酶毒素致腹瀉,正確。","C":"其LPS毒性微弱,正確。","D":"產β-lactamase對penicillin抗藥,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-04":{"quick":"上腹痛、尿素呼氣試驗→測幽門螺旋桿菌的尿素酶(urease)活性,偵測呼氣中的CO2。","detail":{"background":"幽門螺旋桿菌(Helicobacter pylori)為革蘭氏陰性、微需氧、螺旋狀彎曲、具多根鞭毛的桿菌,定殖於胃黏膜,是「消化性潰瘍、慢性胃炎、胃腺癌與黏膜相關淋巴組織淋巴瘤(MALT lymphoma)」的主因。其關鍵酵素「尿素酶(urease)」可把尿素分解為氨與CO2,中和胃酸以利定殖,也是診斷依據:「尿素呼氣試驗(urea breath test)」讓病人服用13C或14C標記的尿素,若胃中有H. pylori,其urease分解尿素後釋出「帶標記的CO2」由呼氣偵測即為陽性。故對應H. pylori、urease、CO2。","options":{"A":"傷寒沙門桿菌與尿素呼氣試驗無關。","B":"空腸彎曲桿菌雖urease弱陽,非尿素呼氣試驗標的菌。","C":"胃幽門桿菌、尿素酶、偵測CO2—正解。","D":"大腸桿菌非此檢測標的。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-05":{"quick":"退伍軍人菌為挑剔菌、血瓊脂上不長,「對生長條件不挑剔、可用血培養基」最不適當。","detail":{"background":"退伍軍人菌(Legionella)特性:①雖為「革蘭氏陰性」桿菌,但細胞壁脂質特殊,「不易以常規染劑著色」(常用銀染或直接螢光抗體);②為「兼性胞內」寄生菌,可在巨噬細胞(與阿米巴)內繁殖;③主要存在「天然水域與人工供水系統(冷卻水塔、熱水器、淋浴噴頭)」,經吸入含菌氣霧感染;④為「挑剔(fastidious)菌」,「無法在一般血瓊脂上生長」,須用含L-cysteine與鐵的「BCYE培養基」。故D「對生長條件不挑剔、可用血培養基培養」最不適當。","options":{"A":"不易以常規染劑著色,正確。","B":"兼性胞內寄生於巨噬細胞,正確。","C":"存在水域與供水系統,正確。","D":"為挑剔菌、血瓊脂不長,須BCYE—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-02":{"quick":"肝膿瘍、MacConkey上粉紅(乳糖發酵)且高黏性菌落,最符合高黏液型克雷伯氏菌。","detail":{"background":"本題鑑定:「肝膿瘍、MacConkey瓊脂上呈粉紅色(乳糖發酵陽性)、菌落高度黏稠」即「肺炎克雷白氏桿菌(Klebsiella pneumoniae)」,尤其台灣常見的「高黏液型(hypermucoviscous,K1/K2莢膜血清型)」高毒力株,可造成社區型化膿性肝膿瘍並轉移性感染(眼內炎、腦膜炎)。其厚多醣莢膜使菌落黏稠(拉絲試驗string test陽性)、抗吞噬。大腸桿菌雖亦乳糖發酵但菌落不具高黏性;弧菌在MacConkey上不發酵乳糖(無色)且非肝膿瘍典型菌。故為克雷伯氏菌。","options":{"A":"大腸桿菌乳糖發酵但菌落不具高黏性。","B":"創傷弧菌非肝膿瘍黏液型菌落。","C":"霍亂弧菌不發酵乳糖、非此情境。","D":"高黏液型克雷伯氏菌致肝膿瘍、黏稠菌落—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-05":{"quick":"分離退伍軍人菌的標準培養基為含L-cysteine與鐵的BCYE瓊脂。","detail":{"background":"各挑剔菌的選擇性培養基須記憶配對:①「退伍軍人菌(Legionella)」——「緩衝活性碳酵母萃取瓊脂(buffered charcoal yeast extract, BCYE)」,提供L-cysteine與鐵;②白喉桿菌——Cystine-tellurite(亞碲酸鹽,菌落呈黑色)或Loeffler血清;③百日咳桿菌——Bordet-Gengou或Regan-Lowe;④新型隱球菌——含咖啡酸(caffeic acid/birdseed)瓊脂,菌落呈咖啡色。故分離Legionella選BCYE。","options":{"A":"BCYE瓊脂為分離退伍軍人菌的培養基—正解。","B":"Caffeic acid agar用於隱球菌。","C":"Regan-Lowe用於百日咳桿菌。","D":"Cystine-tellurite用於白喉桿菌。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-04":{"quick":"退伍軍人菌為「革蘭氏陰性」桿菌,「為革蘭氏陽性桿菌」最不適當。","detail":{"background":"退伍軍人菌(Legionella)為「革蘭氏陰性」桿菌(但因脂質特殊不易常規染色),須以BCYE瓊脂(含L-cysteine與鐵)培養;經吸入含菌氣霧感染,「好發於夏末至秋天溫暖季節」(供水/冷卻系統繁殖)。臨床兩型:「退伍軍人症(Legionnaires’ disease)」為嚴重肺炎(常伴低血鈉、腹瀉、神經症狀);「龐提亞克熱(Pontiac fever)」為自限性流感樣疾病、不致肺炎。故「為革蘭氏陽性桿菌」與其革蘭氏陰性本質不符,最不適當。","options":{"A":"BCYE常用於培養退伍軍人菌,正確。","B":"退伍軍人菌為革蘭氏陰性、非陽性—錯誤(正解)。","C":"好發於夏末至秋天溫暖季節,正確。","D":"可造成龐提亞克熱,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-07":{"quick":"綠膿桿菌在囊狀纖維化病人肺部以「海藻酸鹽(alginate)」黏液型生物膜協助慢性定殖。","detail":{"background":"綠膿桿菌(Pseudomonas aeruginosa)是囊狀纖維化(cystic fibrosis)病人慢性肺部感染的主要病原。在CF的稠厚黏液環境中,綠膿桿菌轉為「黏液型(mucoid)」,大量分泌「海藻酸鹽(alginate)」形成生物膜外多醣基質,協助菌「黏附定殖、抵抗吞噬與抗生素穿透」,造成難以根除的慢性感染。其他毒力因子各有功能:serine protease/elastase破壞組織、pyocyanin產生活性氧造成氧化傷害、外毒素A抑制蛋白質合成,但在CF肺部「形成聚落(colonization)」最關鍵者是alginate。","options":{"A":"serine protease主破壞組織,非定殖核心。","B":"海藻酸鹽(alginate)形成黏液生物膜助慢性定殖—正解。","C":"pyocyanin造成氧化傷害,非定殖核心。","D":"鋅金屬蛋白酶破壞組織,非定殖核心。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-05":{"quick":"污染海鮮並產生熱穩定直接溶血素(神奈川溶血素)致食物中毒者為腸炎弧菌。","detail":{"background":"腸炎弧菌(=副溶血弧菌,Vibrio parahaemolyticus)為嗜鹽的革蘭氏陰性弧菌,常「污染海鮮(生食/未煮熟)」造成食物中毒(水樣或血性腹瀉、腹痛)。其毒力標誌為「熱穩定直接溶血素(thermostable direct hemolysin, TDH=Kanagawa hemolysin)」,在Wagatsuma血瓊脂上呈β-溶血(神奈川陽性)。大腸桿菌、霍亂弧菌(以霍亂毒素致水瀉)與金黃色葡萄球菌(腸毒素超抗原)皆非以神奈川溶血素致海鮮食物中毒者。","options":{"A":"大腸桿菌非神奈川溶血素菌。","B":"霍亂弧菌以霍亂毒素致水瀉、非TDH。","C":"腸炎弧菌產TDH(神奈川溶血素)致海鮮食物中毒—正解。","D":"金黃色葡萄球菌以腸毒素致食物中毒、非TDH。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-18":{"quick":"食入沙門氏菌後最先辨識並反應的部位是腸道的黏膜相關淋巴組織(GALT)。","detail":{"background":"腸道是抵禦食源病原的第一道專責免疫防線。沙門氏菌(Salmonella)經口進入後,於小腸的「腸黏膜相關淋巴組織(gut-associated lymphoid tissue, GALT,如Peyer’s patch)」被偵測:Peyer’s patch表面的「M細胞」會將管腔內抗原/病原轉運給下方的樹突細胞與淋巴細胞,啟動黏膜免疫(IgA、Th反應);沙門氏菌也常利用M細胞作為入侵門戶。脾臟、肝臟(網狀內皮)是後續播散後參與清除的器官,胸腺為T細胞發育器官,皆非「最先辨識腸道食源病原」的部位。故為腸黏膜相關淋巴組織。","options":{"A":"脾臟為後續全身性清除器官,非最先辨識腸道病原。","B":"胸腺為T細胞發育器官,非黏膜偵測。","C":"腸黏膜相關淋巴組織(GALT/Peyer’s patch)最先辨識—正解。","D":"肝臟為後續網狀內皮清除,非最先辨識。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-13":{"quick":"大腸桿菌第一型熱不穩定毒素(LT-I)與霍亂毒素機轉相同,皆使cAMP升高致分泌性腹瀉。","detail":{"background":"霍亂毒素(cholera toxin)為A-B5型毒素,A次單元「ADP-ribosylate刺激型G蛋白Gsα」使腺苷酸環化酶持續活化、cAMP大量升高,促使腸上皮分泌氯離子與水,造成水樣腹瀉。「腸毒性大腸桿菌(ETEC)的第一型熱不穩定毒素(LT-I)」結構與機轉「幾乎與霍亂毒素相同」(同為A-B5、結合GM1、ADP-ribosylate Gsα、升高cAMP),造成旅行者腹瀉。白喉毒素作用於EF-2、副溶血弧菌溶血素為成孔毒素、志賀桿菌侵入素介導細胞侵入,機轉皆不同。故與霍亂毒素類似者為LT-I。","options":{"A":"白喉毒素作用於EF-2,機轉不同。","B":"ETEC的LT-I與霍亂毒素機轉相同(cAMP升高)—正解。","C":"副溶血弧菌溶血素為成孔毒素,機轉不同。","D":"志賀桿菌侵入素介導細胞侵入,機轉不同。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-03":{"quick":"結核菌抑制EEA1以阻止「吞噬體(phagosome)與溶小體(lysosome)的融合」,得以在巨噬細胞內存活。","detail":{"background":"結核分枝桿菌(Mycobacterium tuberculosis)被巨噬細胞吞噬後,並不被殺死,反而「阻斷吞噬體成熟(phagosome maturation arrest)」而長期存活。EEA1(early endosomal autoantigen 1)是早期內體膜上促進囊泡融合的繫繩蛋白,負責讓吞噬體獲得溶小體酵素。結核菌分泌的效應因子(如脂質ManLAM、磷酸酶PtpA、SapM)會干擾EEA1與Rab募集,「抑制吞噬體與溶小體融合」,使菌不暴露於溶小體的酸性水解酶與活性氧而得以胞內存活、潛伏。此即結核免疫逃脫的核心機轉,也是肉芽腫形成與潛伏感染的基礎。","options":{"A":"阻止吞噬體與溶小體融合—正解。","B":"與抑制IL-11分泌無關。","C":"與cAMP上升無關。","D":"與GABA釋放無關(神經傳遞)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-04":{"quick":"Q熱致病菌Coxiella的急性期抗體主要對抗「第二相(phase II)」抗原。","detail":
