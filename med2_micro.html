{"background":"Q熱由「貝氏考克斯菌(Coxiella burnetii)」(絕對胞內、形成芽胞樣小細胞變異體、經氣霧/接觸家畜傳染)引起,具「抗原相變(phase variation)」現象:①「第一相(phase I)」具完整平滑型LPS(含O-antigen醣),為環境/自然感染的強毒型,慢性Q熱(心內膜炎)時「抗phase I IgG」升高;②「第二相(phase II)」經實驗室繼代後LPS截短、缺O-antigen側鏈、毒力減弱,「急性Q熱」病人主要產生「對抗phase II的IgM與IgG抗體」。相變源於LPS的改變而非鞭毛突變;抑制吞噬體-溶小體融合是其胞內存活機制(不分相)。故D正確。","options":{"A":"相變源於LPS改變、非鞭毛基因突變—錯誤。","B":"phase I含完整O-antigen(phase II才缺)—錯誤。","C":"抑制融合為其胞內存活機制、非phase II專屬—錯誤。","D":"急性期抗體主要對抗phase II抗原—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-05":{"quick":"男性尿道炎合併結膜炎,最可能致病菌為砂眼披衣菌(Chlamydia trachomatis)。","detail":{"background":"砂眼披衣菌(Chlamydia trachomatis)為絕對胞內寄生菌,具「原體(EB,感染型)與網狀體(RB,複製型)」雙相生活史。其血清型對應不同疾病:A-C致砂眼(致盲性眼結膜炎);D-K致泌尿生殖道感染(男性非淋菌性尿道炎、女性子宮頸炎、可上行致骨盆腔炎與不孕)、「包涵體性結膜炎」與新生兒結膜炎/肺炎;L1-3致花柳性淋巴肉芽腫(LGV)。本題男性「尿道炎合併結膜炎」即D-K血清型披衣菌(亦為反應性關節炎Reiter三聯之一)。治療用azithromycin或doxycycline。立克次體致斑疹熱、人類黴漿菌致泌尿道感染但非典型結膜炎組合。","options":{"A":"埃及嗜血桿菌致急性結膜炎(紅眼)、非尿道炎組合。","B":"立氏立克次體致洛磯山斑疹熱。","C":"人類黴漿菌與此典型組合不符。","D":"砂眼披衣菌致尿道炎合併結膜炎—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-06":{"quick":"在人類細胞內繁殖且經性行為傳染者為砂眼披衣菌(絕對胞內、STI)。","detail":{"background":"砂眼披衣菌(Chlamydia trachomatis)為「絕對胞內寄生」菌:感染型原體(EB)進入細胞後轉為網狀體(RB)在胞內包涵體中二分裂增殖,因缺乏自身能量代謝(無法產ATP,為「能量寄生」)而須依賴宿主。其D-K血清型經「性行為」傳染,造成男性非淋菌性尿道炎、女性子宮頸炎/骨盆腔炎,是最常見的細菌性性傳染病之一。傷寒桿菌經糞口、杜克氏嗜血桿菌雖經性接觸但非絕對胞內繁殖、普氏立克次體雖胞內但經體蝨傳非性傳染。故為砂眼披衣菌。","options":{"A":"傷寒桿菌經糞口、非性傳染。","B":"杜克氏嗜血桿菌致軟性下疳(性傳染)但非絕對胞內繁殖菌。","C":"普氏立克次體經體蝨傳染、非性傳染。","D":"砂眼披衣菌絕對胞內、性傳染—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-08":{"quick":"初期梅毒非密螺旋體試驗可能尚未陽性,「陰性即可排除」錯誤。","detail":{"background":"梅毒血清學分兩類:①「非密螺旋體試驗(VDRL/RPR)」測抗心脂質抗體,效價隨疾病活性與治療「上升或下降」,用於「篩檢與治療監測」,但有偽陽性(SLE、抗磷脂症候群、懷孕、其他感染);且「初期梅毒(下疳期)可能尚未轉陽(window period)」。②「密螺旋體試驗(TPPA/FTA-ABS)」測對T. pallidum的特異抗體,專一性高、一旦陽性「終生陽性、不受治療影響」,用於確認。判讀原則:生殖器潰瘍而非密螺旋體試驗陰性「不能排除」早期梅毒(須暗視野鏡檢或密螺旋體試驗/追蹤);SLE可致非密螺旋體偽陽性;AIDS病人血清反應可能異常,密螺旋體試驗陰性仍不能完全排除。故C錯誤。","options":{"A":"SLE可致非密螺旋體試驗長期偽陽性,正確。","B":"AIDS患者密螺旋體試驗陰性仍不能排除,正確。","C":"初期梅毒非密螺旋體試驗可能未轉陽、陰性不能排除—錯誤(正解)。","D":"密螺旋體試驗終生陽性、較不受治療影響,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-09":{"quick":"肺炎黴漿菌以P1黏附蛋白附著並破壞呼吸道纖毛上皮;無細胞壁故β-lactam無效、革蘭氏染色不顯色。","detail":{"background":"肺炎黴漿菌(Mycoplasma pneumoniae)是最小的自我複製細菌,「無細胞壁」(細胞膜含固醇),為非典型肺炎(walking pneumonia)的常見病原,好發於年輕族群。致病機轉:以「P1黏附蛋白(adhesin)」附著於呼吸道纖毛上皮細胞,產生過氧化氫與社區獲得性呼吸窘迫毒素(CARDS toxin),「破壞纖毛上皮」造成頑固乾咳;可誘發冷凝集素(cold agglutinin)與多系統表現。因「無細胞壁」,作用於細胞壁的β-lactam(penicillin、cephalosporin)與vancomycin「無效」,治療用「macrolide、doxycycline或fluoroquinolone」;革蘭氏染色「不顯色」。經呼吸道飛沫(非鳥糞——那是鸚鵡熱Chlamydia psittaci)傳染。","options":{"A":"無細胞壁、β-lactam/vancomycin無效—錯誤。","B":"以P1黏附蛋白破壞纖毛上皮—正解。","C":"無細胞壁、革蘭氏染色不顯色—錯誤。","D":"吸入鳥糞致病者為鸚鵡熱(Chlamydia psittaci)—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-21":{"quick":"卡介苗(BCG)為活減毒分枝桿菌,「會」引發細胞免疫反應,故「無法引發細胞免疫」錯誤。","detail":{"background":"卡介苗(Bacillus Calmette-Guérin, BCG)是「牛型分枝桿菌的活減毒株」,為我國嬰兒常規免費疫苗,主要在「預防嬰幼兒的重症結核(粟粒性結核、結核性腦膜炎)」。其作為活分枝桿菌「會引發細胞媒介免疫(T細胞、Th1)」(因此能訓練CMI)。施打後會使「結核菌素皮膚試驗(TST/PPD)呈偽陽性」(故無法以TST區分BCG反應與真感染,須改用IGRA)。BCG對成人肺結核的保護力有限,故「仍無令人滿意的疫苗」。「無法引發細胞免疫」與其活疫苗誘發CMI的事實相反。","options":{"A":"BCG是活的分枝桿菌,正確。","B":"BCG會引發細胞免疫反應—錯誤(正解)。","C":"為我國免費例行疫苗,正確。","D":"施打後增加結核菌素測驗偽陽性,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-02":{"quick":"禽型分枝桿菌群(MAC)治療以azithromycin(macrolide)合併ethambutol與rifabutin。","detail":{"background":"禽型分枝桿菌群(Mycobacterium avium complex, MAC)為環境中常見的非結核分枝桿菌,在「愛滋病(CD4<50)」等嚴重免疫低下者可造成「播散性感染」(發燒、體重減輕、貧血、肝脾腫大、腹瀉),亦可在慢性肺病者致肺部感染。治療採多藥併用:「巨環內酯(azithromycin或clarithromycin)」為核心,合併「ethambutol」與「rifabutin/rifampin」;CD4極低者另需預防性azithromycin。metronidazole(厭氧菌/原蟲)、clavulanic acid(β-lactamase抑制劑)、echinocandin(抗黴菌)皆非抗MAC藥物。","options":{"A":"azithromycin(巨環內酯)為MAC核心治療藥—正解。","B":"metronidazole用於厭氧菌/原蟲。","C":"clavulanic acid為β-lactamase抑制劑。","D":"echinocandin為抗黴菌藥。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-08":{"quick":"韋爾病的鉤端螺旋體經「尿液」排出污染環境,「由糞便分離致病菌」錯誤。","detail":{"background":"韋爾病(Weil disease)是「鉤端螺旋體病(leptospirosis)」的嚴重型,致病菌「鉤端螺旋體(Leptospira interrogans)」屬螺旋體,有鉤狀末端、運動活躍。動物(尤其「嚙齒類」)為保菌宿主,菌隨「尿液」排出污染水與土壤,人經皮膚黏膜接觸污染水(從事水中活動、農業、洪災)而感染,故診斷由「血液、腦脊液(早期)或尿液(後期)」分離培養。嚴重型(Weil disease)表現黃疸、急性腎衰竭、出血、廣泛血管炎與心肌炎。「由糞便分離致病菌」與其經尿液排出的事實不符。治療用doxycycline或penicillin。","options":{"A":"致病菌屬螺旋體,正確。","B":"嚴重型有黃疸、腎衰竭、血管炎、心肌炎,正確。","C":"與水中活動/接觸動物相關,正確。","D":"菌經尿液排出、非由糞便分離—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-02":{"quick":"肺炎黴漿菌無細胞壁,治療用紅黴素(macrolide);作用於細胞壁的β-lactam皆無效。","detail":{"background":"肺炎黴漿菌(Mycoplasma pneumoniae)「缺乏細胞壁」(細胞膜含固醇),因此凡是「作用於細胞壁的抗生素(penicillin、cephalosporin、carbapenem、vancomycin)皆無效」。治療須選作用於蛋白質合成或核酸的藥物:「巨環內酯(紅黴素erythromycin、azithromycin)」為兒童/年輕族群首選,亦可用doxycycline或fluoroquinolone。故四者中唯一有效者為紅黴素。","options":{"A":"penicillin作用於細胞壁、對無壁的黴漿菌無效。","B":"carbapenem作用於細胞壁、無效。","C":"cephalosporin作用於細胞壁、無效。","D":"紅黴素(macrolide)作用於核糖體、有效—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-03":{"quick":"鳥型分枝桿菌(MAC)常見於愛滋病人(CD4極低時播散感染)。","detail":{"background":"非結核分枝桿菌(NTM)分類與致病:①「鳥型分枝桿菌群(M. avium, MAC)」——環境菌,「常於愛滋病(CD4<50)等嚴重免疫低下者造成播散性感染」;②堪薩斯分枝桿菌(M. kansasii)——「可致似肺結核的慢性肺病,並非正常菌叢」;③海洋分枝桿菌(M. marinum)——「會造成人類感染」(游泳池/魚缸肉芽腫,皮膚結節);④牛型分枝桿菌(M. bovis)——「可感染人類致結核」(經未消毒牛奶,且BCG即由其減毒而來)。故正確敘述為「鳥型分枝桿菌常見於愛滋病人感染」。","options":{"A":"堪薩斯分枝桿菌為致病菌、非正常菌叢—錯誤。","B":"鳥型分枝桿菌常見於愛滋病人—正解。","C":"海洋分枝桿菌會造成人類感染(魚缸肉芽腫)—錯誤。","D":"牛型分枝桿菌可致人類結核—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-07":{"quick":"結核分枝桿菌屬慢速生長型(培養需數週);chelonae/fortuitum/abscessus為快速生長型。","detail":{"background":"分枝桿菌依在固體培養基上的生長速度分:①「慢速生長型(slow-growing,>7天才見菌落)」——「結核分枝桿菌(M. tuberculosis,培養常需2-6週)」、MAC、M. kansasii、M. marinum等,故TB培養耗時、需快速分子診斷輔助;②「快速生長型(rapid-growing,<7天)」——M. fortuitum、M. chelonae、M. abscessus(常致術後/導管/皮膚軟組織感染、對標準抗結核藥多抗藥)。故慢速生長者為結核分枝桿菌。","options":{"A":"龜分枝桿菌為快速生長型。","B":"結核分枝桿菌為慢速生長型—正解。","C":"偶發分枝桿菌為快速生長型。","D":"膿瘍分枝桿菌為快速生長型。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-03":{"quick":"以ESAT-6/CFP-10刺激T細胞釋放IFN-γ的IGRA,用於偵測結核分枝桿菌感染。","detail":{"background":"丙型干擾素釋放試驗(interferon-gamma release assay, IGRA,如QuantiFERON-TB、T-SPOT.TB)的原理:以「結核分枝桿菌特有抗原ESAT-6與CFP-10」刺激病人血中T細胞,若曾受結核感染、致敏T細胞會釋放「IFN-γ」,即判為陽性。其優點是這些抗原「不存在於BCG與多數非結核分枝桿菌」中,故「不受BCG接種干擾」,可彌補結核菌素皮膚試驗(TST)無法區分BCG偽陽性的缺點。故此試驗用於偵測結核分枝桿菌感染(潛伏或活動)。","options":{"A":"立氏立克次體非此抗原偵測對象。","B":"煙麴霉菌(黴菌)非此偵測對象。","C":"肺炎黴漿菌非此偵測對象。","D":"以ESAT-6/CFP-10偵測結核分枝桿菌感染—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-04":{"quick":"人類單核細胞艾利希體症以doxycycline治療;β-lactam/aminoglycoside/macrolide「治療有效」錯誤。","detail":{"background":"人類單核細胞艾利希體症(human monocytic ehrlichiosis, HME)由「查菲艾利希體(Ehrlichia chaffeensis)」(立克次體目的絕對胞內菌)經「蜱」傳染。其在「單核球與巨噬細胞」內形成桑椹胚樣包涵體(morulae)增殖;臨床表現發燒、頭痛、肌痛,「血小板減少、白血球減少、肝功能(transaminase)升高」常見。診斷以「核酸增幅(PCR)或血清學」確認。治療「首選doxycycline(四環黴素類)」,如同其他立克次體類疾病;「β-lactam、aminoglycoside、macrolide對胞內立克次體類無效」。故A錯誤。","options":{"A":"應以doxycycline治療,β-lactam/aminoglycoside/macrolide無效—錯誤(正解)。","B":"在單核球/巨噬細胞內繁殖(morulae),正確。","C":"多伴transaminase升高與血小板減少,正確。","D":"以PCR或血清學診斷,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-08":{"quick":"經節肢動物叮咬且在人類細胞內繁殖者為③土拉弗朗西斯菌與④嗜吞噬細胞無形體。","detail":{"background":"判讀傳播途徑與胞內性:①「宋內志賀氏菌(Shigella sonnei)」——經糞口傳染、引起細菌性痢疾,雖能侵入腸上皮但非經節肢動物;②「馬爾他布魯氏菌(Brucella melitensis)」——經接觸感染動物或未滅菌乳製品傳染(胞內菌,但非節肢動物媒介);③「土拉弗朗西斯菌(Francisella tularensis)」——經「蜱/鹿蠅叮咬」(亦接觸/吸入)傳染,絕對胞內(致兔熱病tularemia);④「嗜吞噬細胞無形體(Anaplasma phagocytophilum)」——經「蜱」叮咬傳染,在嗜中性球內繁殖(致人類顆粒球無形體病)。故「經節肢動物叮咬且胞內繁殖」者為③④。","options":{"A":"①Shigella經糞口、②Brucella經動物接觸,非節肢媒介。","B":"③Francisella與④Anaplasma經蜱叮咬、胞內繁殖—正解。","C":"②Brucella非節肢媒介。","D":"①Shigella非節肢媒介。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-02":{"quick":"DNA分子診斷無法「精確完整判讀抗藥性」(完整藥敏仍需培養),其餘優點皆具備。","detail":{"background":"結核的核酸擴增檢測(NAAT,如GeneXpert MTB/RIF)與傳統培養相比的優點:①「快速」(數小時至1-2天 vs 培養2-6週);②「敏感度較高」(尤其抹片陰性者);③「專一性高」可直接鑑定菌種(區分結核複合群與NTM);④可同時偵測「特定抗藥基因突變」(如rpoB→rifampin抗藥)。但分子法「只能偵測『已知』的抗藥基因突變」,「無法完整、精確地判讀對所有抗生素的抗藥性表型」——完整的藥物敏感性試驗(DST)仍須依賴培養。故D不屬於分子診斷相對培養的優點。","options":{"A":"增加菌種鑑定專一性,屬其優點。","B":"敏感度較高,屬其優點。","C":"可快速診斷,屬其優點。","D":"無法精確完整判讀抗藥性(需培養藥敏)—正解(非其優點)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-04":{"quick":"WHO第一線抗結核藥包括①isoniazid與④ethambutol(及rifampin、pyrazinamide)。","detail":{"background":"WHO對「藥物敏感性結核」的標準第一線藥物(初始強化期RIPE四聯):「Rifampin、Isoniazid、Pyrazinamide、Ethambutol」。本題選項中屬第一線者為「①isoniazid(異菸鹼醯,抑制黴菌酸合成)」與「④ethambutol(乙胺丁醇,抑制arabinogalactan合成)」。「②melarsoprol(硫胂密胺)」用於非洲錐蟲病(腦期)、「③amphotericin B(兩性黴素B)」為抗黴菌藥,皆與抗結核無關。故為①④。","options":{"A":"③amphotericin B為抗黴菌藥、非抗結核。","B":"②③皆非抗結核第一線。","C":"①isoniazid與④ethambutol為第一線抗結核藥—正解。","D":"②melarsoprol為抗錐蟲藥、非抗結核。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-06":{"quick":"結核引起的是Th-1型(細胞媒介)免疫反應,「主要引起Th-2型」錯誤。","detail":{"background":"結核分枝桿菌(M. tuberculosis)特性:①細胞壁富含「黴菌酸(mycolic acid)」與複雜脂質,使其呈「抗酸染色(Ziehl-Neelsen)陽性」、疏水耐乾燥、抗消毒劑;②染色體「G+C含量高(約65%)」,高於大腸桿菌(約50%);③為絕對需氧、緩慢生長的胞內菌。宿主對結核的保護性免疫是「Th-1型細胞媒介免疫」——CD4 T細胞分泌IFN-γ活化巨噬細胞、形成肉芽腫以局限感染;「Th-2型(體液/IgE)反應」對胞內結核的清除無益,故「主要引起Th-2型免疫」與事實相反。","options":{"A":"抗酸染色陽性,正確。","B":"G+C含量高於大腸桿菌,正確。","C":"細胞壁富含黴菌酸,正確。","D":"結核引起Th-1而非Th-2型反應—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-25":{"quick":"結核菌免疫逃脫最適合的機制為「抑制吞噬體與溶酶體融合」而於巨噬細胞內存活。","detail":{"background":"各類病原免疫逃脫機制不同:①抗原漂變(antigenic drift,基因突變)——流感病毒;②基因轉換/重排(gene conversion)——錐蟲、淋球菌pilin變異;③阻斷MHC class I抗原呈現——疱疹病毒等。結核分枝桿菌的核心免疫逃脫機制是「被巨噬細胞吞噬後,抑制吞噬體(phagosome)與溶酶體(lysosome)融合(arrest phagosome maturation)」,使菌不暴露於溶酶體酵素與活性氧而長期胞內存活、潛伏。故最適合描述結核免疫逃脫者為D。","options":{"A":"抗原漂變為流感病毒機制。","B":"基因轉換為錐蟲/淋球菌機制。","C":"阻斷MHC I為疱疹病毒等病毒機制。","D":"抑制吞噬體與溶酶體融合—正解(結核機制)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-01":{"quick":"分枝桿菌的染色體G+C含量「較高」,「G+C比例較低」非其特點。","detail":{"background":"分枝桿菌屬(Mycobacterium)特點:①細胞壁富含「黴菌酸(mycolic acid)」與複雜脂質(arabinogalactan、LAM),使其疏水、抗乾燥、抗消毒劑;②因脂質壁,須以「抗酸染色(acid-fast stain)」才能染色(普通革蘭氏染色不易著色);③「生長緩慢」(結核分枝桿菌倍增約18-24小時、培養需數週),遠慢於大腸桿菌;④染色體「G+C含量高(約65%)」。故「G+C比例較低」與其高GC特性相反,不是分枝桿菌的特點。","options":{"A":"細胞壁具黴菌酸,為其特點。","B":"生長速度較大腸桿菌緩慢,為其特點。","C":"可用抗酸染色,為其特點。","D":"分枝桿菌G+C含量高、非較低—錯誤(正解,非其特點)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-05":{"quick":"一般細菌(含結核分枝桿菌)細胞膜不含固醇;黴漿菌例外含固醇,哺乳類與黴菌膜亦含固醇。","detail":{"background":"固醇(sterols,如膽固醇、麥角固醇)是調節膜流動性的成分:①哺乳類細胞膜含「膽固醇」;②黴菌細胞膜含「麥角固醇(ergosterol)」(抗黴菌藥的標的);③「黴漿菌(Mycoplasma)」是「唯一細胞膜含固醇的細菌」——因無細胞壁,須自宿主取得膽固醇穩定膜;④其他細菌(包括「結核分枝桿菌」)的細胞膜「不含固醇」。故四者中細胞膜不含固醇者為結核分枝桿菌。","options":{"A":"哺乳類細胞膜含膽固醇。","B":"結核分枝桿菌(一般細菌)細胞膜不含固醇—正解。","C":"黴漿菌例外、細胞膜含固醇。","D":"黴菌細胞膜含麥角固醇。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-06":{"quick":"遊走性紅斑(erythema migrans，牛眼狀紅斑)是萊姆病(Borrelia burgdorferi)的特殊皮膚表現。","detail":{"background":"萊姆病(Lyme disease)由「伯氏疏螺旋體(Borrelia burgdorferi)」經「硬蜱(Ixodes)」叮咬傳染。早期局部期的標誌性皮膚表現為「遊走性紅斑(erythema migrans)」——叮咬處出現逐漸擴大、中央漸退的「牛眼狀(bull’s-eye)」紅斑。若未治療可進展為早期播散期(多發性紅斑、心臟傳導阻滯、顏面神經麻痺、腦膜炎)與晚期(關節炎、神經病變)。治療用doxycycline或amoxicillin。Coxiella(Q熱)、Leptospira(鉤端螺旋體病)、Rickettsia rickettsii(洛磯山斑疹熱)皆無遊走性紅斑。","options":{"A":"Coxiella致Q熱、無遊走性紅斑。","B":"Leptospira致鉤端螺旋體病、無此皮疹。","C":"立氏立克次體致洛磯山斑疹熱(離心狀斑疹)。","D":"伯氏疏螺旋體致萊姆病、遊走性紅斑—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-02":{"quick":"花柳性淋巴肉芽腫(LGV)由披衣菌L1-3引起,首選治療為doxycycline。","detail":{"background":"花柳性淋巴肉芽腫(lymphogranuloma venereum, LGV)由「砂眼披衣菌L1-L3血清型」經性接觸傳染,特徵為原發小潰瘍後出現「腹股溝淋巴結腫大化膿(buboes)、可形成瘻管」與直腸炎。因披衣菌為絕對胞內、缺典型胜肽聚醣,「penicillin無效」;治療首選「doxycycline(四環黴素類,療程3週)」,替代為紅黴素/azithromycin。metronidazole(厭氧菌/原蟲)、isoniazid(抗結核)皆不適用。","options":{"A":"metronidazole用於厭氧菌/原蟲、非LGV。","B":"penicillin對披衣菌無效。","C":"doxycycline為LGV首選—正解。","D":"isoniazid為抗結核藥、非LGV。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-09":{"quick":"尿漿菌(Ureaplasma)屬無細胞壁的Mollicutes、細胞膜富含固醇;penicillin無效,主致泌尿生殖道感染。","detail":{"background":"尿素分解尿漿菌(Ureaplasma urealyticum)與黴漿菌同屬「Mollicutes(無細胞壁、細胞膜含固醇)」,具尿素酶。臨床上主要造成「泌尿生殖道感染」(非淋菌性尿道炎、子宮頸炎),亦與不孕、絨毛膜羊膜炎、早產及「產後熱」相關,並非主要造成皮膚病灶;目前「無疫苗」。因「無細胞壁」,作用於細胞壁的「penicillin無效」,治療用doxycycline或macrolide。其細胞膜「富含固醇(自宿主取得膽固醇)」為Mollicutes特徵,故A正確。","options":{"A":"細胞膜富含固醇(Mollicutes特徵)—正解。","B":"主要致泌尿生殖道感染、非皮膚病灶—錯誤。","C":"目前無此菌疫苗—錯誤。","D":"無細胞壁、penicillin無效—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-02":{"quick":"肺炎黴漿菌「不具胜肽聚醣(無細胞壁)」,故對β-lactam天生抗藥。","detail":{"background":"β-內醯胺類(β-lactam,含penicillin、cephalosporin、carbapenem)的作用機轉是與PBP結合、抑制「胜肽聚醣(peptidoglycan)」交聯而破壞細胞壁。「肺炎黴漿菌(Mycoplasma pneumoniae)缺乏細胞壁、不含胜肽聚醣」,因此β-lactam「沒有作用標的」,對其天生(intrinsic)抗藥——這是黴漿菌對β-lactam抗藥的根本原因,而非PBP突變、產β-lactamase或外排幫浦。治療須改用作用於核糖體或核酸的藥物(macrolide、doxycycline、fluoroquinolone)。","options":{"A":"非PBP突變,而是根本沒有胜肽聚醣標的—錯誤。","B":"不具胜肽聚醣、β-lactam無標的—正解。","C":"非靠分泌β-lactamase—錯誤。","D":"非靠外排幫浦—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-03":{"quick":"砂眼可因再感染復發致慢性瘢痕與失明,「症狀消除即痊癒不復發」最不適當。","detail":{"background":"砂眼(trachoma)由「砂眼披衣菌血清型A、B、Ba、C」感染結膜引起,是全球可預防失明的主因之一。傳播途徑包括「眼睛分泌物、受污染手/毛巾、飛沫,以及蒼蠅機械性傳播(亦可能糞口)」。反覆/慢性感染導致「結膜瘢痕、眼瞼內翻倒睫(trichiasis),摩擦角膜致角膜結痂與失明」。其病程為「反覆再感染、慢性進展」,「症狀消除後仍可再感染復發」並非一次痊癒即終結,故D最不適當。WHO以SAFE策略(手術、抗生素azithromycin、洗臉、環境改善)防治。","options":{"A":"由血清型A、B、Ba、C引起,正確。","B":"可致角膜結痂與失明,正確。","C":"可經分泌物、飛沫、蒼蠅/糞便傳播,正確。","D":"會反覆再感染復發、非一次即痊癒—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-06":{"quick":"發燒、四肢/軀幹斑丘疹、巧克力瓊脂生長的革蘭氏陰性雙球菌,最符合播散性淋病感染(淋病雙球菌)。","detail":{"background":"淋病雙球菌(Neisseria gonorrhoeae)為「革蘭氏陰性雙球菌」,挑剔、需含血紅素與營養的「巧克力瓊脂(或Thayer-Martin)」於5% CO2培養。除局部泌尿生殖道感染外,可發生「播散性淋菌感染(disseminated gonococcal infection, DGI)」,典型為「關節炎-皮膚炎症候群」:發燒、游走性多關節痛/腱鞘炎與「四肢遠端的膿皰性/出血性皮疹」。本題青年女性發燒、四肢與軀幹斑丘疹、血培養須巧克力瓊脂、革蘭氏陰性球菌即符合DGI。金氏菌、侵蝕艾肯菌與伊莉莎白菌雖亦為苛養或抗藥菌,但與此典型DGI表現不符(腦膜炎雙球菌亦可致類似敗血疹,本題答案以淋病雙球菌DGI為解)。","options":{"A":"金氏金氏菌致兒童骨關節感染、非此典型DGI。","B":"淋病雙球菌(巧克力瓊脂、G-雙球菌)致播散性淋菌感染—正解。","C":"侵蝕愛啃菌見於人咬傷/混合感染。","D":"伊莉莎白菌多為院內伺機感染。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-09":{"quick":"生長緩慢、菌落無色素、鏡下呈聚集(索狀)的抗酸桿菌即結核分枝桿菌。","detail":{"background":"本題描述要點:「抗酸性(acid-fast)桿菌、生長緩慢、菌落無色素(non-pigmented,粗糙buff色)、鏡下因索狀因子(cord factor, 海藻糖雙黴菌酸酯)造成菌體平行排列『聚集成索狀(serpentine cords)』」即「結核分枝桿菌(M. tuberculosis)」的特徵。金黃色葡萄球菌(革蘭氏陽性球菌、金黃色素)、綠膿桿菌(革蘭氏陰性、產綠色素、快速生長)、鬆脆類桿菌(厭氧革蘭氏陰性桿菌)皆非抗酸菌、與描述不符。","options":{"A":"金黃色葡萄球菌為產金黃色素的革蘭氏陽性球菌、非抗酸菌。","B":"結核分枝桿菌(慢生長、無色素、抗酸、索狀聚集)—正解。","C":"綠膿桿菌產綠色素、快速生長、非抗酸菌。","D":"鬆脆類桿菌為厭氧革蘭氏陰性桿菌、非抗酸菌。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-01":{"quick":"類結核型對lepromin高度反應、腫瘤型則反應低下,「兩型都對lepromin高度反應」最不適當。","detail":{"background":"痲瘋(漢生病,Mycobacterium leprae)依宿主細胞免疫強弱呈光譜:①「類結核型(tuberculoid, paucibacillary)」——細胞免疫(Th1)強,菌量少,病灶少而界線清楚、神經受損,「lepromin皮膚試驗陽性(高反應)」,免疫球蛋白量正常;②「腫瘤型(lepromatous, multibacillary)」——細胞免疫弱(偏Th2)、菌量極多、瀰漫性病灶、「lepromin陰性(低反應)」、高免疫球蛋白(但無保護),「傳染力較高」,可出現「結節性紅斑(ENL, type 2反應)」。故「兩型病人都對lepromin有高度免疫反應」錯誤(腫瘤型為陰性)。","options":{"A":"腫瘤型對lepromin反應低下、非兩型皆高—錯誤(正解)。","B":"類結核型免疫球蛋白量正常,正確。","C":"腫瘤型可出現結節性紅斑(ENL),正確。","D":"腫瘤型菌量多、傳染力較高,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-07":{"quick":"李斯特菌經食物傳染、非性傳染,為最不可能經由性行為傳染者。","detail":{"background":"最常見的性傳染病(STI)致病菌包括:淋病雙球菌(Neisseria gonorrhoeae,淋病)、梅毒螺旋體(Treponema pallidum,梅毒)、砂眼披衣菌(Chlamydia trachomatis,非淋菌性尿道炎/LGV),以及杜克氏嗜血桿菌(軟性下疳)等,皆經「性接觸」傳染。「單核細胞增多性李斯特菌(Listeria monocytogenes)」則經「受污染食物(口糞)」傳染,主要危害孕婦、新生兒與免疫低下者,「不屬性傳染病」。故最不可能經性行為傳染者為李斯特菌。","options":{"A":"淋病雙球菌為性傳染病。","B":"梅毒螺旋體為性傳染病。","C":"砂眼披衣菌為性傳染病。","D":"李斯特菌經食物傳染、非性傳染—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-01":{"quick":"結核菌素試驗無法區分感染與BCG時,加做IGRA(IFN-γ釋放試驗)進一步確認。","detail":{"background":"結核菌素皮膚試驗(TST/PPD)的限制是「無法區分真結核感染與BCG接種或非結核分枝桿菌致敏所致的反應(偽陽性)」。此時加做「丙型干擾素釋放試驗(IGRA,如QuantiFERON、T-SPOT)」進一步確認:以結核「特有抗原ESAT-6、CFP-10」刺激T細胞釋放IFN-γ,因這些抗原「不存在於BCG與多數NTM」,故IGRA「不受BCG接種干擾」,陽性較能反映真正的結核感染。北方點墨法(測RNA)、TNF-α釋放試驗、RT-PCR皆非此用途。","options":{"A":"RT-PCR非區分BCG與感染的標準確認法。","B":"IFN-γ釋放試驗(IGRA)不受BCG干擾、可進一步確認—正解。","C":"北方點墨法用於偵測RNA、非此用途。","D":"TNF-α釋放試驗非標準確認方法。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-04":{"quick":"PPD(純化蛋白衍生物)是從結核桿菌培養/菌體(細胞壁來源)純化的蛋白抗原。","detail":{"background":"結核菌素皮膚試驗(tuberculin skin test, Mantoux test)使用「純化蛋白衍生物(purified protein derivatives, PPD)」——由結核分枝桿菌培養濾液/菌體經沉澱純化得到的「蛋白質抗原混合物」(主要來自菌體與細胞壁相關蛋白)。皮內注射後,若個體曾受結核致敏,T細胞會引發「第四型(遲發型)過敏反應」,48-72小時於注射處出現硬結(induration)。PPD的來源是「細菌(細胞壁/菌體蛋白)」,而非宿主細胞核、單純染色體或質體。","options":{"A":"PPD源自結核桿菌的菌體/細胞壁蛋白—正解。","B":"非源自宿主細胞核。","C":"非單純染色體DNA。","D":"非質體。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-08":{"quick":"XDR-TB為MDR另加對「氟喹諾酮」與一種注射二線藥(kanamycin/amikacin/capreomycin)抗藥。","detail":{"background":"結核抗藥性分級:①「多重抗藥性結核(MDR-TB)」——至少同時對「isoniazid與rifampin」抗藥;②「廣泛抗藥性結核(XDR-TB)」——在MDR基礎上「再對任一『氟喹諾酮(fluoroquinolone)』抗藥」,「且」對「三種注射二線藥(kanamycin、amikacin、capreomycin)中至少一種」抗藥(本題已給定注射藥條件,問另需抗藥的是fluoroquinolone)。XDR-TB治療極困難,須用新藥(bedaquiline、linezolid、pretomanid等)。tazobactam(β-lactamase抑制劑)、itraconazole(抗黴菌)、miltefosine(抗利什曼)皆與抗結核無關。","options":{"A":"tazobactam為β-lactamase抑制劑、非抗結核。","B":"itraconazole為抗黴菌藥。","C":"XDR-TB額外對氟喹諾酮抗藥—正解。","D":"miltefosine為抗利什曼藥。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-09":{"quick":"普氏立克次體可潛伏並於日後復發(Brill-Zinsser disease),「不會潛伏於人體」最不適當。","detail":{"background":"普氏立克次體(Rickettsia prowazekii)是「流行性斑疹傷寒(epidemic typhus)」的病原,絕對胞內、經「人類體蝨(body louse)」叮咬與其糞便搔抓入皮膚傳染(戰亂、擁擠、衛生不良時流行)。重要特性:康復者菌可「潛伏於體內(如淋巴組織)」,於免疫力下降、年老或壓力時「再活化復發」,稱為「Brill-Zinsser disease」(較輕的復發型斑疹傷寒)。血清學以「微免疫螢光試驗(MIF)」為參考方法。故「病原菌不會潛伏於人體」與其可潛伏復發的事實相反,最不適當。","options":{"A":"為流行性斑疹傷寒病原,正確。","B":"經人類體蝨傳染,正確。","C":"可潛伏並復發(Brill-Zinsser disease)、非不會潛伏—錯誤(正解)。","D":"血清學以MIF為參考方法,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-23":{"quick":"結核肉芽腫以Th1(CD4/IFN-γ)為核心,「常見Th17圍繞融合巨噬細胞」最不適當。","detail":{"background":"結核肉芽腫(granuloma)是宿主局限結核感染的病理結構:中心為受感染、無法清除細菌的巨噬細胞,部分「融合成多核的Langhans巨細胞」與類上皮細胞,外圍由「CD4(Th1)淋巴細胞」與纖維包覆;Th1分泌「IFN-γ」活化巨噬細胞、TNF維持肉芽腫完整(故抗TNF生物製劑會使結核再活化)。肉芽腫形成主要靠「Th1反應」,Th17並非圍繞融合巨噬細胞的主要細胞,故「常見Th17圍繞」最不適當。慢性肉芽腫病(CGD,NADPH oxidase基因突變)雖也易形成肉芽腫,但結核肉芽腫本身不以NADPH oxidase突變為前提。","options":{"A":"巨噬細胞無法有效清除胞內結核,正確。","B":"被感染巨噬細胞可融合(Langhans巨細胞),正確。","C":"結核肉芽腫以Th1為主、非Th17圍繞—錯誤(正解)。","D":"NADPH oxidase突變(CGD)亦易形成肉芽腫,屬相對合理敘述。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-25":{"quick":"結核菌長期胞內潛伏最主要靠「抵抗吞噬體作用」(抑制吞噬體-溶小體融合)。","detail":{"background":"結核分枝桿菌在巨噬細胞內長期潛伏的「最主要機制」是「抵抗吞噬體的殺菌作用」——被吞噬後「抑制吞噬體與溶小體融合(阻斷吞噬體成熟)」,使菌不暴露於溶小體的酸性水解酶、活性氧/氮中間產物,並能中和酸性、抗活性氧,得以在巨噬細胞內存活、休眠形成潛伏感染。其複製繁殖力其實「緩慢」、並非靠高複製;結核菌「抗原相對保守、不以抗原變異逃脫」;抑制樹突細胞抗原呈現雖有助免疫逃脫,但「胞內潛伏存活」最關鍵的是抵抗吞噬體殺菌。","options":{"A":"結核菌生長緩慢、非靠高複製力潛伏。","B":"抵抗吞噬體作用(抑制吞噬體-溶小體融合)—正解。","C":"抑制樹突細胞抗原呈現非胞內潛伏最關鍵因素。","D":"結核菌抗原保守、非靠抗原變異。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-03":{"quick":"鉤端螺旋體為需氧螺旋體但「培養困難(需特殊培養基、生長數週)」,「容易培養」最不適當。","detail":{"background":"鉤端螺旋體病(leptospirosis)由「鉤端螺旋體(Leptospira interrogans)」引起,為纖細、末端帶鉤、運動活躍的螺旋體,屬「需氧」菌但「不易培養」(須EMJH等特殊培養基、生長緩慢需數週),臨床診斷多靠血清學(MAT)或PCR。傳播:「嚙齒類等動物為保菌宿主,菌隨『尿液』排出污染水與土壤」,人經皮膚黏膜接觸污染水/土(具主動穿透黏膜能力)感染,「不經性行為傳染」。治療與預防可用doxycycline。嚴重型即韋爾病(黃疸、腎衰竭、出血)。故「為絕對嗜氧菌、容易培養」中的「容易培養」最不適當。","options":{"A":"雖需氧但培養困難、非容易培養—錯誤(正解)。","B":"具主動穿透黏膜能力、不經性行為傳染,正確。","C":"以doxycycline治療或預防,正確。","D":"嚙齒類為保菌宿主、帶菌尿污染環境,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-04":{"quick":"XDR-TB為MDR另加對氟喹諾酮與一種注射二線藥(胺基糖苷類)抗藥。","detail":{"background":"廣泛抗藥性結核(XDR-TB)的定義:在「多重抗藥(MDR,同時抗isoniazid與rifampin)」基礎上,「再對任一氟喹諾酮(fluoroquinolone)抗藥」,「且」對「注射型二線藥」中至少一種抗藥——這些注射二線藥包括「胺基糖苷類(aminoglycoside,如kanamycin、amikacin)」與多胜肽類capreomycin。本題問「除氟喹諾酮外另須抗藥的第二線藥」即「胺基糖苷(aminoglycoside)」。四環黴素、β-lactam、紅黴素皆非抗結核二線注射藥。","options":{"A":"另對胺基糖苷類(注射二線藥)抗藥—正解。","B":"四環黴素非抗結核二線藥。","C":"β-lactam非抗結核藥。","D":"紅黴素非抗結核藥。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-08":{"quick":"斑疹傷寒(恙蟲病/scrub typhus)由恙蟎(chigger)傳染,非蜱媒,故最不可能經蜱傳染。","detail":{"background":"蜱(tick)媒傳染病:①「洛磯山斑疹熱(Rocky Mountain spotted fever, Rickettsia rickettsii)」——硬蜱;②「地方性回歸熱(endemic relapsing fever, Borrelia)」——軟蜱;③「萊姆病(Lyme disease, Borrelia burgdorferi)」——硬蜱(Ixodes)。而「斑疹傷寒中的『恙蟲病/叢林斑疹傷寒(scrub typhus, Orientia tsutsugamushi)』由『恙蟎(chigger,恙蟲幼蟲)』叮咬傳染」,非蜱媒;流行性斑疹傷寒則由體蝨傳。故四者中最不可能經蜱傳染者為scrub typhus。","options":{"A":"洛磯山斑疹熱經蜱傳染。","B":"地方性回歸熱經(軟)蜱傳染。","C":"恙蟲病(scrub typhus)由恙蟎傳染、非蜱—正解(最不可能)。","D":"萊姆病經硬蜱傳染。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-04":{"quick":"IFN-γ受體缺陷者對結核細胞免疫不足,罹患播散性結核的風險增加。","detail":{"background":"IFN-γ是抗分枝桿菌「細胞媒介免疫」的關鍵:CD4 Th1細胞與NK細胞分泌IFN-γ,經IFN-γ受體活化巨噬細胞增強殺菌與肉芽腫形成。先天「IFN-γ受體(或其訊息路徑IL-12/IL-23)缺陷」屬「孟德爾遺傳之分枝桿菌易感症(MSMD)」,患者無法有效活化巨噬細胞,對結核分枝桿菌、非結核分枝桿菌與BCG異常易感,「容易發生播散性(disseminated)分枝桿菌感染」(包括BCG接種後播散)。故結果是播散性結核風險增加,而非清除感染或完全免疫。","options":{"A":"缺乏IFN-γ訊息無法清除結核—錯誤。","B":"免疫反應減弱而非增強—錯誤。","C":"罹患播散性結核病的風險增加—正解。","D":"非完全抵抗、反而易感—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-05":{"quick":"XDR-TB是MDR另對氟喹諾酮與至少一種二線藥抗藥;仍為全球性問題、且有新藥可治。","detail":{"background":"廣泛抗藥性結核(XDR-TB)的正確定義:在「多重抗藥(MDR,同時抗isoniazid與rifampin)」之上,「再對氟喹諾酮(fluoroquinolone)」以及「至少一種其他二線藥」抗藥(WHO新近定義納入bedaquiline/linezolid等)。其特性:①「並非只發生於AIDS患者」,而是「全球公共衛生問題」;②「並非無藥可醫」,仍有新藥(bedaquiline、pretomanid、linezolid等)組合可治療,只是療程長、難度高;③對XDR接觸者的預防性治療尚無一致標準(不可一概給藥)。故最適當敘述為A。","options":{"A":"MDR另對氟喹諾酮與至少一種二線藥抗藥—正解。","B":"非只發生於AIDS、為全球性問題—錯誤。","C":"仍有新藥可治療、非只能隔離—錯誤。","D":"XDR接觸者預防性治療無一致標準—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-06":{"quick":"性行為後腹股溝淋巴結腫大化膿並形成瘻管,最符合披衣菌L型引起的花柳性淋巴肉芽腫(LGV)。","detail":{"background":"花柳性淋巴肉芽腫(lymphogranuloma venereum, LGV)由「砂眼披衣菌L1-L3血清型」經性接觸傳染。典型三期:①原發處(生殖器)出現短暫無痛小潰瘍/丘疹(常被忽略);②「腹股溝淋巴結腫大化膿(buboes)」,可融合、化膿並「形成瘻管/竇道」(經典「溝槽徵groove sign」);③晚期纖維化致生殖器象皮病或直腸狹窄。本題「性行為數週後腹股溝淋巴結疼痛腫大並形成瘻管」即LGV,治療用doxycycline。對照:淋病(尿道炎)、軟性下疳(杜克氏嗜血桿菌,痛性潰瘍+痛性淋巴腫)、腹股溝肉芽腫(Klebsiella granulomatis,無痛牛肉色潰瘍),表現不同。","options":{"A":"淋病雙球菌主要致尿道炎/子宮頸炎,非淋巴瘻管。","B":"砂眼披衣菌L型致LGV(腹股溝淋巴腫+瘻管)—正解。","C":"肉芽腫克雷伯氏菌致腹股溝肉芽腫(無痛潰瘍)。","D":"杜克氏嗜血桿菌致軟性下疳(痛性潰瘍)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-14":{"quick":"酵母型呈「舵輪(mariner’s wheel)」狀多重出芽的全身性雙形性黴菌是巴西副球黴菌。","detail":{"background":"雙形性(溫度依賴性)全身黴菌在組織/37°C呈酵母型、在環境/25°C呈黴(絲狀)型,經吸入孢子致全身感染。其組織型酵母各有特徵:①「巴西副球黴菌(Paracoccidioides brasiliensis)」——酵母型大,周圍多個小芽以細頸環繞母細胞,呈「舵輪/船舵(mariner’s wheel)樣多重出芽(pilot’s wheel,亦稱米老鼠頭)」,流行於中南美洲;②粗球黴菌——組織內形成含內孢子的「球形體(spherule)」;③莢膜組織胞漿菌——巨噬細胞內小型酵母;④皮炎芽生菌——寬基底單一出芽(broad-based budding)。故舵輪狀多重出芽者為副球黴菌。","options":{"A":"粗球黴菌組織型為含內孢子的球形體。","B":"巴西副球黴菌酵母型呈舵輪狀多重出芽—正解。","C":"莢膜組織胞漿菌為巨噬細胞內小酵母。","D":"皮炎芽生菌為寬基底單一出芽。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-15":{"quick":"在環境中產關節孢子、組織中形成厚壁含內孢子球形體(spherule)的真菌是粗球孢子菌。","detail":{"background":"「粗球孢子菌(Coccidioides immitis/posadasii)」流行於美國西南乾旱地區(聖華金谷熱):①在土壤/培養(黴型)產生易飛散的「關節孢子(arthroconidia)」,吸入致感染(具高度感染性);②在組織內轉為「厚壁的球形體(spherule)」,內含大量「內孢子(endospores)」,破裂後釋出再形成新球形體。臨床多為自限的肺部感染,免疫低下者可播散。鬚髮癬菌(皮癬菌)、申克孢子絲菌(皮下)、莢膜組織胞漿菌(巨噬細胞內小酵母)皆無「球形體+關節孢子」此組合。故為粗球孢子菌。","options":{"A":"鬚髮癬菌為皮癬菌,無球形體。","B":"申克孢子絲菌為皮下雙形菌,無球形體。","C":"莢膜組織胞漿菌組織型為巨噬細胞內小酵母。","D":"粗球孢子菌有關節孢子與球形體—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-16":{"quick":"副球黴菌酵母細胞壁中與致病力最相關的成分為1,3-α-葡聚醣。","detail":{"background":"巴西副球黴菌(Paracoccidioides brasiliensis)的「酵母型(致病型)」細胞壁富含「1,3-α-葡聚醣(α-1,3-glucan)」,其含量與「致病力(毒力)」高度相關:α-葡聚醣位於細胞壁最外層,可遮蔽會被宿主Dectin-1辨識的β-葡聚醣、抑制免疫辨識並協助菌在組織中存活;失去α-葡聚醣的突變株毒力明顯下降。相對地,1,3-β-葡聚醣是被宿主免疫辨識並為棘白菌素標的的結構、半乳甘露聚醣為麴菌診斷標記、幾丁質為一般真菌細胞壁骨架,皆非此菌致病力的最關鍵成分。","options":{"A":"1,3-α-葡聚醣與副球黴菌致病力最相關—正解。","B":"1,3-β-葡聚醣會被宿主辨識、為棘白菌素標的。","C":"半乳甘露聚醣為麴菌診斷標記。","D":"幾丁質為真菌細胞壁骨架,非致病力關鍵。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-17":{"quick":"組織中見厚壁、棕色硬化體(銅板狀muriform/sclerotic bodies)是產色芽生黴菌症的特徵。","detail":{"background":"「產色芽生黴菌症/著色芽生菌病(chromoblastomycosis)」是由「暗色(產黑色素)真菌(如Fonsecaea、Cladophialophora、Phialophora)」經外傷植入皮下,造成慢性疣狀/結節性皮膚病灶。其病理特徵為組織中可見「厚壁、棕色(含黑色素)、有橫隔分裂的『硬化體(sclerotic/muriform bodies,俗稱銅板copper pennies)』」,為診斷依據。黑癬為表淺暗色真菌感染(掌部褐斑)、孢子絲菌病為玫瑰園丁病(淋巴管型結節)、皮下黑化真菌病(phaeohyphomycosis)在組織中見「暗色菌絲」而非硬化體。故硬化體對應產色芽生黴菌症。","options":{"A":"黑癬為表淺暗色真菌感染、無硬化體。","B":"孢子絲菌病為淋巴管型皮下感染(雪茄狀酵母)。","C":"產色芽生黴菌症見厚壁棕色硬化體—正解。","D":"皮下黑化真菌病見暗色菌絲、非硬化體。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-16":{"quick":"馬爾尼菲青黴菌主要經呼吸道感染;為雙形菌、37°C呈酵母型(以分裂繁殖),本題B、D均給分。","detail":{"background":"馬爾尼菲篩狀青黴/馬爾尼菲籃狀菌(Talaromyces marneffei,舊稱Penicillium marneffei)是東南亞、華南地區「愛滋病等免疫低下者」重要的「雙形性」黴菌。特性:①「25°C黴型」產生似青黴的帚狀枝(penicillus)分生孢子梗,並「分泌鮮紅色色素滲入培養基」;②「35-37°C酵母型」,以「橫隔分裂(fission,而非出芽)」繁殖,鏡下見有橫隔的臘腸狀細胞;③主要「經呼吸道吸入孢子」感染,播散致發燒、體重減輕、皮膚臍凹樣丘疹、肝脾淋巴腫大。本題公告「B、D均給分」(D呼吸道為主要途徑;B關節孢子之敘述亦判給分)。","options":{"A":"37°C應為酵母型而非絲狀—錯誤。","B":"孢子型態相關敘述(本題判為給分)。","C":"會呈現類酵母菌型態—錯誤。","D":"主要經呼吸道感染—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-17":{"quick":"培養莢膜組織胞漿菌時加入放線菌酮(cycloheximide)以抑制污染的腐生真菌。","detail":{"background":"分離雙形性病原黴菌(如莢膜組織胞漿菌Histoplasma capsulatum)時,檢體常混有環境腐生真菌(快速生長、易覆蓋目標菌)。培養基中加入「放線菌酮(cycloheximide,環己醯亞胺)」可「抑制腐生(汙染)真菌的生長」,而對目標雙形性病原黴菌影響較小,藉此提高分離率(常合併抗細菌劑如chloramphenicol)。環絲胺酸(抗結核二線)、clofazimine(抗痲瘋)、quinupristin(抗革蘭氏陽性菌)皆非抑制汙染真菌的添加劑。","options":{"A":"環絲胺酸為抗結核藥、非抑真菌汙染。","B":"放線菌酮(cycloheximide)抑制汙染腐生真菌—正解。","C":"clofazimine為抗痲瘋藥。","D":"quinupristin為抗革蘭氏陽性菌藥。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-14":{"quick":"花斑癬可直接KOH鏡檢見「義大利麵與肉丸」短菌絲與酵母,故「無法直接鏡檢診斷」錯誤。","detail":{"background":"花斑癬(汗斑,pityriasis/tinea versicolor)由「皮膚正常嗜脂菌叢馬拉色菌(Malassezia furfur complex)」過度增殖引起,「好發於年輕人」皮脂分泌旺盛的軀幹,呈邊界清楚、脫屑、色素增/減的斑塊。Malassezia是「人類皮膚的常在嗜脂菌(非自然界腐生菌)」。診斷可「直接KOH鏡檢」見「短彎菌絲與成簇圓酵母(spaghetti and meatballs樣)」,並可Wood’s燈下呈黃綠螢光,故「無法直接鏡檢診斷」與事實相反,為錯誤。治療用外用azole或硒化硫。","options":{"A":"最常見於年輕人,正確。","B":"致病原為Malassezia furfur complex,正確。","C":"為人類皮膚常在嗜脂菌、非自然界腐生菌,正確。","D":"可直接KOH鏡檢見短菌絲與酵母、非無法鏡檢—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-15":{"quick":"制黴菌素與兩性黴素B同屬多烯類,作用機轉相同(結合ergosterol破壞膜)。","detail":{"background":"抗黴菌藥依作用部位分類:①「多烯類(polyenes)」——nystatin(制黴菌素)、amphotericin B,「直接與細胞膜的麥角固醇(ergosterol)結合」、形成孔洞造成胞內電解質外漏而殺菌;②azole/allylamine——抑制ergosterol『合成』(不同步驟);③echinocandin(caspofungin)——抑制細胞壁β-葡聚醣合成;④flucytosine——干擾核酸合成。故「制黴菌素(nystatin)」的機轉與「兩性黴素B(amphotericin B)」相同(同為多烯)。","options":{"A":"flucytosine干擾核酸合成、機轉不同。","B":"amphotericin B與nystatin同為多烯、機轉相同—正解。","C":"caspofungin抑制細胞壁葡聚醣、機轉不同。","D":"sordarin抑制真菌延長因子、機轉不同。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-17":{"quick":"真菌無性孢子分為「分生孢子(conidia)」與「囊孢子(sporangiospores)」兩大類。","detail":{"background":"真菌孢子分有性(meiotic,如ascospore、basidiospore、zygospore)與無性(mitotic)。「無性孢子」依形成方式主要分兩大類:①「分生孢子(conidia)」——在菌絲或分生孢子梗(conidiophore)末端「外生」形成,不被囊包覆(如Aspergillus、Penicillium的分生孢子,又可細分大/小分生孢子);②「囊孢子(sporangiospores)」——在「孢子囊(sporangium)內生」形成(如毛黴目Rhizopus、Mucor)。瓶孢子、厚膜孢子、分節孢子、芽生孢子等屬conidia的特化型態或產生方式,並非與conidia並列的兩「大類」。","options":{"A":"分生孢子與囊孢子為無性孢子兩大類—正解。","B":"瓶孢子/分節孢子為conidia的特化型態,非兩大類。","C":"厚膜孢子/分節孢子非並列兩大類。","D":"分節孢子/芽生孢子非並列兩大類。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-16":{"quick":"培養嗜脂的馬拉色菌須加入「橄欖油」等長鏈脂肪酸以提高生長。","detail":{"background":"馬拉色菌(Malassezia furfur,致花斑癬)為「嗜脂(lipophilic)酵母」,大多數菌種「無法自行合成中長鏈脂肪酸」,須由培養基外加脂質才能生長。因此實驗室培養時常在Sabouraud培養基上「覆蓋一層橄欖油(olive oil overlay)或其他長鏈脂肪酸(如Dixon培養基含吐溫、甘油單油酸酯)」以提供脂質、提高培養率。澱粉、L-半胱胺酸(退伍軍人菌需)、N-乙醯葡萄胺糖皆非馬拉色菌生長所需的關鍵脂質。","options":{"A":"澱粉非馬拉色菌所需脂質。","B":"L-半胱胺酸為退伍軍人菌培養所需。","C":"橄欖油提供嗜脂馬拉色菌所需脂質—正解。","D":"N-乙醯葡萄胺糖非其生長關鍵。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-17":{"quick":"光滑念珠菌(Candida glabrata)僅以單細胞酵母存在,通常不形成菌絲或假菌絲。","detail":{"background":"念珠菌屬的形態:多數念珠菌(如白色念珠菌C. albicans、熱帶念珠菌C. tropicalis、近平滑念珠菌C. parapsilosis)可形成「假菌絲(pseudohyphae)」,白色念珠菌更可形成「真菌絲(true hyphae)與芽管(germ tube)」(致病侵襲相關)。但「光滑念珠菌(Candida glabrata)」例外——「僅以單細胞小酵母存在,通常不形成菌絲或假菌絲」,且對azole(尤其fluconazole)易抗藥,為免疫低下者重要伺機病原。故通常不形成菌絲者為C. glabrata。","options":{"A":"熱帶念珠菌可形成假菌絲。","B":"白色念珠菌可形成假菌絲與真菌絲。","C":"光滑念珠菌僅單細胞、通常不形成菌絲—正解。","D":"近平滑念珠菌可形成假菌絲。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-11":{"quick":"愛滋病人卡波西肉瘤由第八型人類疱疹病毒(HHV-8/KSHV)伺機感染所致。","detail":{"background":"卡波西肉瘤(Kaposi sarcoma)是「第八型人類疱疹病毒(HHV-8,又稱卡波西肉瘤相關疱疹病毒KSHV)」引起的血管內皮腫瘤,在「愛滋病(AIDS)等細胞免疫嚴重低下」者為重要伺機性惡性病,表現皮膚黏膜紫紅色斑塊/結節,亦可侵犯內臟。HHV-8屬γ-疱疹病毒(DNA病毒),亦與原發性滲出液淋巴瘤、多中心型Castleman病相關。白色念珠菌(口咽念珠菌病)、人類黴漿菌、新型隱球菌(隱球菌腦膜炎)皆為愛滋病人其他伺機感染,但與卡波西肉瘤無關。","options":{"A":"白色念珠菌致念珠菌病、非卡波西肉瘤。","B":"人類黴漿菌與卡波西肉瘤無關。","C":"HHV-8(KSHV)致卡波西肉瘤—正解。","D":"新型隱球菌致隱球菌腦膜炎、非卡波西肉瘤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-16":{"quick":"吸入後在肺部形成含內孢子的球形體並致全身黴菌病者為粗球孢子菌。","detail":{"background":"「粗球孢子菌(Coccidioides immitis/posadasii)」流行於美國西南、墨西哥乾旱地區。其感染流程:環境黴型產生「關節孢子(arthroconidia)」隨塵埃飛散,人「吸入」後在肺部轉成「厚壁球形體(spherule)」,內部充滿「內孢子(endospores)」,球形體破裂釋出內孢子再形成新球形體,造成肺部與可能播散的全身性黴菌病(谷熱)。莢膜組織胞漿菌(巨噬細胞內小酵母)、皮炎芽生菌(寬基底出芽)、副球黴菌(舵輪狀)組織型皆非球形體+內孢子。故為粗球孢子菌。","options":{"A":"副球黴菌組織型為舵輪狀酵母。","B":"莢膜組織胞漿菌為巨噬細胞內小酵母。","C":"皮炎芽生菌為寬基底單一出芽。","D":"粗球孢子菌吸入後形成含內孢子的球形體—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-17":{"quick":"多烯類「直接結合」ergosterol破壞膜,並非「抑制ergosterol合成」。","detail":{"background":"抗黴菌藥與ergosterol的關係:①「azole(咪唑/三唑)」——抑制14-α-脫甲基酶(CYP51),阻斷羊毛甾醇轉為ergosterol;②「allylamine(烯丙胺,terbinafine)」——抑制squalene epoxidase,阻斷ergosterol合成上游;③以上兩類皆「抑制ergosterol『合成』」。而「多烯類(polyene,amphotericin B、nystatin)」則是「直接與已存在於膜上的ergosterol結合」、形成孔洞造成電解質外漏,「並非抑制其合成」。故作用機轉非抑制ergosterol合成者為多烯類。","options":{"A":"多烯類直接結合ergosterol、非抑制其合成—正解。","B":"烯丙胺抑制squalene epoxidase、阻斷ergosterol合成。","C":"咪唑類抑制14-α-脫甲基酶、阻斷ergosterol合成。","D":"三唑類抑制14-α-脫甲基酶、阻斷ergosterol合成。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-14":{"quick":"表皮癬菌屬(Epidermophyton)只產大分生孢子、不產小分生孢子,敘述正確。","detail":{"background":"皮癬菌(dermatophytes)三屬以分生孢子型態鑑別:①「表皮癬菌屬(Epidermophyton)」——產棍棒狀「大分生孢子(macroconidia,成簇)」,「不產生小分生孢子(microconidia)」;②「小孢癬菌屬(Microsporum)」——產「大量厚壁紡錘狀大分生孢子」(小分生孢子少);③「毛癬菌屬(Trichophyton)」——產「大量小分生孢子」(大分生孢子少且光滑壁)。皮癬菌侵犯角質(皮膚、毛髮、指甲)致體癬/足癬/頭癬,「可經人-人、動物-人或土壤接觸傳染」。故「表皮癬菌屬不產生小分生孢子」正確。","options":{"A":"皮癬菌可人傳人(及動物/土壤)—錯誤。","B":"表皮癬菌屬不產生小分生孢子—正解。","C":"小孢癬菌屬產大量(厚壁紡錘狀)大分生孢子—錯誤。","D":"毛癬菌屬產大量小分生孢子(非大分生孢子)—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-15":{"quick":"多烯類主要機轉為「直接與ergosterol結合、破壞細胞膜致電解質失衡」。","detail":{"background":"多烯類(polyenes,amphotericin B、nystatin)的主要抗黴機轉是「直接與真菌細胞膜上的麥角固醇(ergosterol)結合」,在膜上形成孔洞通道,造成「胞內鉀離子等電解質與小分子外漏、膜功能崩解」而殺菌(亦產生氧化傷害)。因人類膜含膽固醇、與ergosterol結構相近,amphotericin B有腎毒性等副作用。選項B(抑14-α-脫甲基酶)為azole、C(抑squalene epoxidase)為allylamine、D(抑1,3-β-葡聚醣合成)為echinocandin的機轉,皆非多烯類。","options":{"A":"直接結合ergosterol破壞膜致電解質不平衡—正解(多烯機轉)。","B":"抑14-α-脫甲基酶為azole機轉。","C":"抑squalene epoxidase為allylamine機轉。","D":"抑β-葡聚醣合成為echinocandin機轉。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-16":{"quick":"真菌菌絲的兩種基本形態為「有隔菌絲(septate)」與「無隔/多核體菌絲(coenocytic)」。","detail":{"background":"依細胞間是否有橫隔,菌絲(hyphae)基本分兩型:①「有隔菌絲(septate hyphae)」——細胞間有橫隔壁(septa,常有孔可讓胞質流通),如Aspergillus、皮癬菌、Fusarium;②「無隔/多核體菌絲(coenocytic/aseptate hyphae)」——少或無橫隔、寬大、多核共質,如毛黴目(Rhizopus、Mucor)。芽管(germ tube)、假菌絲(pseudohyphae)是酵母相關特化型態、鎖狀連接(clamp connection)見於擔子菌,皆非菌絲的兩「基本」形態分類。","options":{"A":"有隔菌絲與多核體(無隔)菌絲為兩種基本形態—正解。","B":"發芽管為酵母出芽延伸、非基本菌絲分類。","C":"假菌絲為酵母特化、非基本菌絲分類。","D":"鎖狀連接見於擔子菌、非基本分類。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-16":{"quick":"griseofulvin(灰黴素)阻斷真菌微小管(干擾紡錘體)、抑制有絲分裂,用於皮癬菌感染。","detail":{"background":"各抗黴菌藥作用標的:①「灰黴素(griseofulvin)」——「結合微小管(microtubule)蛋白、干擾紡錘體與有絲分裂」,並沉積於新生角質(指甲、毛髮)抑制皮癬菌,用於頑固頭癬/甲癬;②itraconazole(azole,抑ergosterol合成);③nystatin(多烯,結合ergosterol);④terbinafine(allylamine,抑squalene epoxidase)。故阻斷真菌微小管者為griseofulvin。","options":{"A":"itraconazole抑制ergosterol合成。","B":"griseofulvin阻斷真菌微小管—正解。","C":"nystatin結合ergosterol破壞膜。","D":"terbinafine抑制squalene epoxidase。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-17":{"quick":"新型隱球菌在niger seed(birdseed)瓊脂上產黑色素使菌落呈咖啡色,可與不產色酵母區分。","detail":{"background":"新型隱球菌(Cryptococcus neoformans)為有「多醣莢膜」的酵母,具「酚氧化酶(phenoloxidase/laccase)」可把二酚受質轉成黑色素(melanin)。在含咖啡酸的「黑鳥種子瓊脂(niger seed/birdseed agar)」上培養,隱球菌會「產生黑色素使菌落呈咖啡棕色」,而其他不產色的酵母菌落仍為白色,藉此快速鑑別。BCYE為退伍軍人菌培養、CHROMagar用於念珠菌顯色鑑別、cornmeal agar用於誘導念珠菌假菌絲/厚膜孢子,皆非隱球菌產色鑑別。隱球菌另以印度墨汁見莢膜、莢膜抗原檢測診斷。","options":{"A":"BCYE用於退伍軍人菌。","B":"CHROMagar用於念珠菌顯色鑑別。","C":"cornmeal agar用於念珠菌厚膜孢子/假菌絲。","D":"niger seed agar使隱球菌產黑色素呈咖啡色—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-17":{"quick":"寬大、無或少橫隔的菌絲(coenocytic)是毛黴目Rhizopus的特徵。","detail":{"background":"毛黴目(Mucorales,如Rhizopus、Mucor、Lichtheimia)造成「毛黴菌病(mucormycosis)」(好發於糖尿病酮酸中毒、免疫低下者,鼻腦型、肺型,進展快速、組織壞死、血管侵犯),其菌絲特徵為「寬大、扁帶狀、無或少橫隔(coenocytic/aseptate)、常呈直角分枝」。相對地,Fusarium、Scedosporium為「有隔菌絲」的透明黴菌,Trichosporon為酵母樣(產關節孢子)。故寬大無隔菌絲者為Rhizopus。","options":{"A":"Fusarium為有隔菌絲。","B":"Trichosporon為酵母樣/產關節孢子。","C":"Rhizopus為寬大、無/少橫隔的菌絲—正解。","D":"Scedosporium為有隔菌絲。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-16":{"quick":"麴菌CYP51A基因突變改變azole作用標的,是「三唑(triazole)」抗藥的主因。","detail":{"background":"唑類(azole/triazole,如itraconazole、voriconazole、posaconazole)的作用標的是「14-α-脫甲基酶(由CYP51基因編碼)」,抑制羊毛甾醇轉為ergosterol。在「煙麴菌(Aspergillus fumigatus)」,「CYP51A基因突變(如TR34/L98H)」會改變酵素構形、降低azole結合,是臨床「三唑抗藥」的主要機轉(部分與農用azole殺真菌劑環境暴露有關)。echinocandin作用於β-葡聚醣合成酶、polyene結合ergosterol、allylamine抑squalene epoxidase,與CYP51A無關。故CYP51A突變對應三唑抗藥。","options":{"A":"CYP51A突變改變唑類標的、致三唑抗藥—正解。","B":"echinocandin作用於β-葡聚醣合成酶。","C":"多烯結合ergosterol、與CYP51A無關。","D":"烯丙胺抑squalene epoxidase。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-17":{"quick":"HIV病人、25°C絲狀並分泌鮮紅色素、37°C酵母型,最符合馬爾尼菲籃狀菌。","detail":{"background":"本題描述為「雙形性黴菌」:在「25°C黴(絲狀)型」並「分泌鮮紅色色素滲入培養基」、在「35-37°C酵母型」,且發生於「HIV/AIDS」病人——即「馬爾尼菲籃狀菌(Talaromyces marneffei,舊稱Penicillium marneffei)」,流行於東南亞、華南,經呼吸道感染後播散(發燒、皮膚臍凹丘疹、肝脾淋巴腫大),其酵母型以「橫隔分裂(fission)」繁殖。Emergomyces、Scedosporium、Paracoccidioides雖部分為雙形或致病黴菌,但「25°C黴型分泌鮮紅色素」是T. marneffei的標誌。","options":{"A":"Emergomyces無鮮紅色素此特徵。","B":"Scedosporium為有隔透明黴菌、非此特徵。","C":"巴西副球黴菌組織型為舵輪狀、非紅色素。","D":"馬爾尼菲籃狀菌(紅色素、雙形、HIV)—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-16":{"quick":"棘白菌素作用於「細胞壁(β-葡聚醣合成)」,與其他作用於細胞膜ergosterol的藥物部位不同。","detail":{"background":"抗黴菌藥的作用部位:①「細胞膜ergosterol」相關——三唑(抑制ergosterol合成)、烯丙胺(抑squalene epoxidase、阻ergosterol合成)、多烯(直接結合ergosterol破壞膜);這三者都作用於「細胞膜的ergosterol路徑」。②「細胞壁」相關——「棘白菌素(echinocandin,如caspofungin)」抑制「1,3-β-葡聚醣合成酶」,破壞真菌細胞壁。故四者中作用部位與其他不同者為「棘白菌素(作用於細胞壁)」。","options":{"A":"三唑作用於細胞膜ergosterol合成。","B":"棘白菌素作用於細胞壁β-葡聚醣合成、部位不同—正解。","C":"烯丙胺作用於細胞膜ergosterol合成。","D":"多烯作用於細胞膜ergosterol。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-17":{"quick":"紅酵母(Rhodotorula)合成類胡蘿蔔素色素,使菌落呈粉紅至紅色。","detail":{"background":"「紅酵母屬(Rhodotorula)」是環境中常見的酵母,「合成類胡蘿蔔素(carotenoid)色素」,使菌落呈「粉紅至橘紅色」,可造成免疫低下/導管相關的伺機性菌血症(對fluconazole/echinocandin天生較不敏感,治療多用amphotericin B)。Trichosporon(白/乳色,致白毛結節與播散感染)、Cryptococcus(白/奶油色、有莢膜)、Malassezia(嗜脂、致花斑癬)皆非產類胡蘿蔔素紅色素。故為Rhodotorula。","options":{"A":"Trichosporon菌落為白/乳色。","B":"紅酵母(Rhodotorula)產類胡蘿蔔素呈粉紅至紅色—正解。","C":"隱球菌菌落為白/奶油色(有莢膜)。","D":"馬拉色菌為嗜脂酵母、非紅色素。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-16":{"quick":"克魯斯念珠菌(Candida krusei)對fluconazole有先天(intrinsic)抗藥性。","detail":{"background":"念珠菌對fluconazole的敏感性差異是臨床選藥重點:①「克魯斯念珠菌(Candida krusei)」——對fluconazole「先天(intrinsic)抗藥」(其標的酵素親和力低),須改用voriconazole或echinocandin;②光滑念珠菌(C. glabrata)——對azole「劑量依賴性敏感或獲得性抗藥」;③白色念珠菌、熱帶念珠菌、近平滑念珠菌——多數對fluconazole敏感。故對fluconazole最具先天抗藥者為C. krusei。","options":{"A":"白色念珠菌多對fluconazole敏感。","B":"熱帶念珠菌多敏感。","C":"克魯斯念珠菌對fluconazole先天抗藥—正解。","D":"近平滑念珠菌多敏感。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-17":{"quick":"在感染組織中形成含內孢子的球形體(spherule)者為粗球黴菌(Coccidioides)。","detail":{"background":"各全身性雙形黴菌在「感染組織中的型態」:①「粗球黴菌(Coccidioides immitis)」——形成「厚壁的球形體(spherule)」,內含大量內孢子,為其組織型標誌;②莢膜組織胞漿菌——巨噬細胞內的小型卵圓酵母;③皮炎芽生黴菌——寬基底單一出芽的大酵母;④巴西副球黴菌——舵輪狀多重出芽酵母。故組織中形成球形體者為粗球黴菌。","options":{"A":"莢膜組織胞漿菌組織型為巨噬細胞內小酵母。","B":"皮炎芽生黴菌為寬基底單一出芽。","C":"巴西副球黴菌為舵輪狀多重出芽。","D":"粗球黴菌在組織形成含內孢子的球形體—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-16":{"quick":"芽管試驗(germ tube test)陽性者為白色念珠菌(及都柏林念珠菌)。","detail":{"background":"芽管試驗(germ tube test)是快速鑑別白色念珠菌的方法:把念珠菌置於血清(或蛋白)中37°C孵育約2-3小時,「白色念珠菌(Candida albicans)」會從酵母細胞長出「真正的芽管(germ tube,無縊縮、寬度一致)」呈陽性(都柏林念珠菌C. dubliniensis亦可陽性)。熱帶、近平滑、克魯斯念珠菌芽管試驗陰性(只形成假菌絲或不形成)。故germ tube陽性為C. albicans。","options":{"A":"熱帶念珠菌芽管試驗陰性。","B":"白色念珠菌芽管試驗陽性—正解。","C":"近平滑念珠菌芽管試驗陰性。","D":"克魯斯念珠菌芽管試驗陰性。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-17":{"quick":"酮康唑(ketoconazole,azole)抑制14-α-脫甲基酶、阻斷麥角固醇合成。","detail":{"background":"抑制「麥角固醇(ergosterol)合成」的抗黴菌藥包括azole與allylamine。「酮康唑(ketoconazole)」屬「唑類(azole)」,抑制「14-α-脫甲基酶(CYP51)」、阻斷羊毛甾醇轉成ergosterol,使膜缺ergosterol而功能受損。對照:nikkomycin Z抑制幾丁質(chitin)合成酶、caspofungin抑制β-葡聚醣合成(細胞壁)、nystatin為多烯「直接結合」ergosterol(非抑制合成)。故抑制ergosterol合成者為酮康唑。","options":{"A":"nikkomycin Z抑制幾丁質合成酶(細胞壁)。","B":"caspofungin抑制β-葡聚醣合成(細胞壁)。","C":"酮康唑(azole)抑制ergosterol合成—正解。","D":"nystatin直接結合ergosterol、非抑制合成。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-17":{"quick":"M. pachydermatis是唯一可在不含脂質培養基生長的馬拉色菌(非嗜脂依賴)。","detail":{"background":"馬拉色菌屬(Malassezia)多數為「嗜脂(lipid-dependent)」酵母,須在培養基外加脂質(橄欖油)才能生長(如M. furfur、M. globosa、M. sympodialis等,與人類花斑癬、脂漏性皮膚炎相關)。唯一例外是「M. pachydermatis」——「非脂質依賴」,可在一般Sabouraud(不加脂質)培養基上生長,常見於動物(犬耳炎),亦可致免疫低下新生兒(尤其使用脂質靜脈營養者)的導管相關菌血症。故可在不含脂質培養基生長者為M. pachydermatis。","options":{"A":"M. pachydermatis非脂質依賴、可在不含脂質培養基生長—正解。","B":"M. furfur為嗜脂依賴。","C":"M. globosa為嗜脂依賴。","D":"M. japonica為嗜脂依賴。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-10":{"quick":"光滑念珠菌(Candida glabrata)僅以單細胞酵母存在,不產生假菌絲或真菌絲。","detail":{"background":"念珠菌形態鑑別:白色念珠菌可形成假菌絲、真菌絲與芽管;熱帶、近平滑、克魯斯念珠菌可形成假菌絲。唯「光滑念珠菌(Candida glabrata)」一般情況「僅以單細胞小酵母型式存在,不形成假菌絲或真菌絲」,且對azole(尤fluconazole)易呈劑量依賴或抗藥,是免疫低下/留置導管者重要伺機病原。故僅單細胞、不產菌絲者為C. glabrata。","options":{"A":"克魯斯念珠菌可形成假菌絲。","B":"熱帶念珠菌可形成假菌絲。","C":"光滑念珠菌僅單細胞、不產假/真菌絲—正解。","D":"近平滑念珠菌可形成假菌絲。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_115020-11":{"quick":"吞噬細胞內呈「裂殖酵母(以橫隔分裂繁殖)」是馬爾尼菲籃狀菌感染(talaromycosis)的特徵。","detail":{"background":"馬爾尼菲籃狀菌(Talaromyces marneffei)感染(talaromycosis)是東南亞、華南地區HIV病人的重要播散性黴菌病。其組織/酵母型的標誌:在「巨噬細胞或吞噬細胞內」可見「以橫隔分裂(fission,非出芽)繁殖的酵母(fission yeast)」,呈臘腸狀、中央有橫隔——此與其他雙形黴菌(以出芽繁殖)不同,是鏡檢診斷依據。Emergomycosis(小出芽酵母)、Coccidioidomycosis(球形體+內孢子)、Histoplasmosis(巨噬細胞內小出芽酵母)皆非「裂殖酵母」。故為talaromycosis。","options":{"A":"Emergomycosis為小出芽酵母、非裂殖。","B":"Coccidioidomycosis為球形體+內孢子。","C":"Histoplasmosis為巨噬細胞內小出芽酵母。","D":"Talaromycosis見巨噬細胞內裂殖(分裂)酵母—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-10":{"quick":"HPV的E6與p53結合(致降解)、E7與pRB(p105RB)結合;「E5與p53結合」錯誤。","detail":{"background":"人類乳突瘤病毒(HPV)為無套膜、環狀雙股DNA病毒,感染皮膚與黏膜上皮。依致癌風險分:「低危險型(HPV-6、11)」致良性疣(尖銳濕疣);「高危險型(HPV-16、18)」與子宮頸癌、肛門生殖器與口咽癌相關。其致癌核心是兩個早期蛋白:「E6與腫瘤抑制蛋白p53結合並促進其泛素化降解」(失去細胞凋亡/修復把關);「E7與視網膜母細胞瘤蛋白pRB(p105RB)結合」、釋放E2F使細胞進入S期增生。E1與E2參與病毒DNA複製;E5為膜蛋白、增強生長因子受體訊號,「不結合p53」。故「E5與p53結合」錯誤(應為E6結合p53)。","options":{"A":"HPV-6、11為低危險型(致疣),正確。","B":"與p53結合者為E6而非E5—錯誤(正解)。","C":"E7與pRB(p105RB)結合,正確。","D":"E1與病毒複製有關,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-12":{"quick":"在細胞質產生「內基氏小體(Negri body)」的病毒是狂犬病病毒。","detail":{"background":"狂犬病病毒(rabies virus)屬桿狀病毒(Rhabdoviridae)、子彈型、單股負義RNA、有套膜,經感染動物咬傷後沿周邊神經逆行至中樞神經。其在「神經元細胞質」內形成嗜伊紅性包涵體「內基氏小體(Negri body)」,是病理診斷依據(海馬迴、小腦Purkinje細胞)。臨床經潛伏期後出現恐水、咽喉痙攣、躁動的腦炎,幾乎100%致死,故咬傷後須即時清創並接種疫苗加免疫球蛋白(暴露後預防)。天花(細胞質Guarnieri小體)、CMV(核內貓頭鷹眼包涵體)、VZV皆非Negri body。","options":{"A":"天花病毒形成Guarnieri小體、非Negri body。","B":"狂犬病病毒在神經元細胞質形成Negri body—正解。","C":"巨細胞病毒形成核內貓頭鷹眼包涵體。","D":"水痘-帶狀疱疹病毒非Negri body。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-13":{"quick":"腺病毒與B型克沙奇病毒共用「柯薩奇-腺病毒受體(CAR)」進入細胞。","detail":{"background":"病毒利用宿主細胞表面特定受體進入細胞。「腺病毒(adenovirus)」與「B型克沙奇病毒(Coxsackie B virus)」共用「柯薩奇-腺病毒受體(coxsackie-adenovirus receptor, CAR)」附著(腺病毒並以整合素為共受體進行內吞)。諾羅病毒利用組織血型抗原、巨細胞病毒利用多種受體(如整合素/EGFR)、流感病毒利用「唾液酸(sialic acid)」受體。故與腺病毒共用受體者為B型克沙奇病毒。","options":{"A":"腺病毒與B型克沙奇病毒共用CAR受體—正解。","B":"諾羅病毒利用組織血型抗原。","C":"巨細胞病毒利用不同受體。","D":"流感病毒利用唾液酸受體。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-02":{"quick":"慢性骨髓性白血病由BCR-ABL(費城染色體)引起,與EB病毒最無關。","detail":{"background":"EB病毒(Epstein-Barr virus, EBV)為γ-疱疹病毒,感染B細胞與咽部上皮並潛伏,與多種腫瘤相關:「鼻咽癌(nasopharyngeal carcinoma)」、「布奇氏淋巴瘤(Burkitt lymphoma,t(8;14)使c-myc活化)」、「霍金氏淋巴瘤(Hodgkin disease)」、移植後淋巴增生疾病、愛滋相關淋巴瘤等;亦致傳染性單核球增多症。「慢性骨髓性白血病(CML)」則由「BCR-ABL融合基因(費城染色體t(9;22))」造成的酪胺酸激酶活化引起,與EBV無關(治療用imatinib)。故與EBV最無關者為CML。","options":{"A":"鼻咽癌與EBV相關。","B":"慢性骨髓性白血病由BCR-ABL引起、與EBV最無關—正解。","C":"霍金氏淋巴瘤與EBV相關。","D":"布奇氏淋巴瘤與EBV相關。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-12":{"quick":"器官移植後最常見且抗病毒藥易抗藥者為巨細胞病毒(CMV);本題B、C均給分。","detail":{"background":"器官移植後因免疫抑制,潛伏的疱疹病毒易再活化。「巨細胞病毒(cytomegalovirus, CMV)」是移植後「最重要、最常見」的伺機性病毒感染(致發燒、骨髓抑制、肺炎、腸胃炎、移植物功能不良),且其抗病毒藥(ganciclovir等)在長期使用下因「UL97/UL54基因突變」而「容易產生抗藥性」。B型肝炎病毒在免疫抑制下亦可再活化並對核苷類似物(如lamivudine)產生抗藥。本題公告「B、C均給分」(CMV為標準答案,HBV亦判給分)。腺病毒、SARS冠狀病毒非移植後抗藥性問題的代表。","options":{"A":"腺病毒非移植後抗藥性代表病毒。","B":"巨細胞病毒最常見且抗病毒藥易抗藥—正解。","C":"B型肝炎病毒在免疫抑制下再活化、可抗藥(本題判為給分)。","D":"SARS冠狀病毒非移植後抗藥代表。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-15":{"quick":"有套膜病毒多藉「出芽」釋出而非細胞溶解,故D錯誤(本題C、D均給分)。","detail":{"background":"病毒複製與釋出特性:①「有外套膜(envelope)」的病毒因套膜易乾燥、被清潔劑/溶劑破壞,故「對環境抗性較低」、需密切接觸傳播;②「RNA病毒」多數在「細胞質」複製(流感、反轉錄病毒等少數例外進核);③RNA病毒須自帶RNA依賴RNA聚合酶(RdRp)複製基因體(但仍利用宿主核糖體轉譯),故「複製大部分不需宿主酵素」之絕對化敘述被判為部分不妥;④「有套膜病毒主要藉『出芽(budding)』從細胞膜或核膜獲得套膜並釋出」,而非靠細胞溶解(裸病毒才多靠溶解釋出)。本題公告「C、D均給分」,D「藉細胞溶解釋出」最為錯誤。","options":{"A":"有套膜病毒對環境抗性較低,正確。","B":"RNA病毒多在細胞質複製,正確。","C":"RNA病毒複製需自帶RdRp,絕對化敘述被判給分。","D":"有套膜病毒藉出芽釋出、非細胞溶解—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-11":{"quick":"鼻咽癌病人血中抗EBV蛋白抗體力價上升,可作為輔助診斷;故C正確。","detail":{"background":"EB病毒(EBV)經唾液傳播,主要感染「B細胞與咽部上皮」。臨床:青少年初次感染多致「傳染性單核球增多症」(發燒、咽炎、淋巴腺腫、異型淋巴球、嗜異性抗體陽性),而非帶狀疱疹(那是VZV)。EBV與「鼻咽癌、Burkitt淋巴瘤、Hodgkin病」相關;鼻咽癌病人血中「抗EBV(如VCA-IgA、EA)抗體力價上升」,可作為篩檢/追蹤輔助。EBV在B細胞潛伏時「仍表現少數潛伏基因(EBNA、LMP、EBER)」而非完全不表現。在愛滋病人EBV感染B細胞(非T細胞)。故C正確。","options":{"A":"成人初感染致單核球增多症、非帶狀疱疹—錯誤。","B":"EBV感染B細胞而非T細胞—錯誤。","C":"鼻咽癌病人抗EBV抗體力價上升、可輔助診斷—正解。","D":"潛伏時仍表現少數潛伏基因(EBNA/LMP)、非完全不表現—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-12":{"quick":"普利昂(prion)無核酸、無法有效刺激干擾素或免疫反應;故C正確。","detail":{"background":"傳染性蛋白(prion)是「不含核酸的錯誤摺疊蛋白(PrPSc)」,可誘導正常PrPC轉為PrPSc而累積,造成海綿狀腦病(庫賈氏病CJD、庫魯症、牛海綿狀腦病)。特性:①「不引發免疫反應(無抗原性)」、「無法有效刺激干擾素產生」(因無核酸);②「極度抗一般去活化方法」——對福馬林、紫外線、常規高壓滅菌、輻射皆抗,須以「強鹼(1N NaOH)、次氯酸或134°C延長高壓」處理;③造成神經海綿狀變性(空泡),非肺泡堅實化(那是病毒/細菌肺炎)。故「無法有效刺激干擾素」正確。","options":{"A":"prion無抗原性、不引免疫—錯誤。","B":"prion極抗福馬林與紫外線—錯誤。","C":"無核酸、無法有效刺激干擾素—正解。","D":"致海綿狀腦病、非肺泡堅實化—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-14":{"quick":"痘病毒在細胞質複製、自帶DNA聚合酶與轉錄酶,不需宿主DNA複製系統;故D正確。","detail":{"background":"痘病毒(Poxvirus,如天花variola、牛痘vaccinia、猴痘、傳染性軟疣)是最大的DNA病毒,有複雜結構,「獨特地在『細胞質』內複製」——「自身攜帶DNA依賴RNA聚合酶與DNA複製所需酵素,不需依賴宿主細胞核的DNA複製系統」。天花的根除是靠「全球接種牛痘(vaccinia)活疫苗」(交叉保護),而非死的猴痘疫苗或天花減毒疫苗;猴痘可感染人類(近年人類疫情)。故D正確。","options":{"A":"天花根除靠接種牛痘(vaccinia)活疫苗、非猴痘死疫苗—錯誤。","B":"用vaccinia而非天花減毒疫苗—錯誤。","C":"猴痘可感染人類—錯誤。","D":"痘病毒在細胞質複製、不需宿主DNA複製系統—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-15":{"quick":"玫瑰疹典型為「高燒3-5天後退燒出疹」,「幼兒通常不會發燒」錯誤。","detail":{"background":"嬰兒玫瑰疹(roseola infantum,第六病/exanthem subitum)由「人類疱疹病毒第六型(HHV-6,亦HHV-7)」引起,好發6個月-2歲幼兒。典型病程為「突發高燒3-5天(此時可能熱性痙攣),退燒後軀幹出現玫瑰色斑丘疹(熱退疹出)」。HHV-6在「T細胞、單核球」內潛伏;成人若(再)感染可呈單核球增多症樣表現。故「被感染幼兒通常不會發燒」與其高燒特徵相反,為錯誤。","options":{"A":"可由HHV-6感染引起,正確。","B":"成人感染可呈單核球增多症,正確。","C":"幼兒典型為高燒3-5天、非不發燒—錯誤(正解)。","D":"病毒在T細胞潛伏感染,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-08":{"quick":"VCA-IgM(+)、VCA-IgG(+)、EBNA(-)代表EB病毒的「急性原發感染」。","detail":{"background":"EB病毒血清學判讀:①「VCA(病毒殼抗原)IgM」陽性=「近期/急性感染」(數週後消退);②「VCA-IgG」陽性、終生存在;③「EA(早期抗原)」短暫陽性、見於急性或再活化;④「EBNA(EB病毒核抗原)抗體」要在「感染後數週至數月才出現」,「終生存在」,是「過去感染」的標誌。本題「VCA-IgM(+)、VCA-IgG(+)、EA(+/-)、EBNA(-)」——EBNA尚未出現代表「急性原發感染期(acute primary infection)」。若EBNA(+)且VCA-IgM(-)則為過去感染;若過去感染再活化則EA再度上升而EBNA仍(+)。","options":{"A":"VCA-IgM陽性且EBNA陰性=急性原發感染—正解。","B":"非慢性感染表現。","C":"過去感染應EBNA陽性、VCA-IgM陰性。","D":"再活化應EBNA陽性且EA上升。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-10":{"quick":"現可用「活減毒疫苗」最佳預防者為水痘-帶狀疱疹病毒(VZV)。","detail":{"background":"人類疱疹病毒中,目前有「活減毒疫苗」可有效預防者為「水痘-帶狀疱疹病毒(VZV)」:兒童「水痘活減毒疫苗(Oka株)」預防水痘,年長者「帶狀疱疹疫苗」(早期活減毒,現多用重組次單位疫苗)預防帶狀疱疹與後遺神經痛。單純疱疹病毒(HSV)、第八型人類疱疹病毒(HHV-8)、EB病毒(EBV)目前「尚無上市的有效疫苗」。故以減毒疫苗預防者為VZV。","options":{"A":"單純疱疹病毒目前無有效疫苗。","B":"HHV-8目前無疫苗。","C":"EB病毒目前無上市疫苗。","D":"水痘-帶狀疱疹病毒有活減毒疫苗—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-11":{"quick":"最常見、影響新生兒聽力與智能發展的先天感染病毒是巨細胞病毒(CMV)。","detail":{"background":"先天性巨細胞病毒(congenital CMV)感染是「最常見的先天性病毒感染」,也是「非遺傳性感音性聽力喪失」與神經發展遲緩的重要原因。母親原發或再活化感染經胎盤傳給胎兒,可致小頭、腦室周圍鈣化、肝脾腫大、血小板減少、黃疸、脈絡視網膜炎,以及「進行性聽力損失與智能/發展障礙」(部分出生時無症狀者日後才出現聽損)。麻疹(非典型先天)、HSV(多為產道感染致新生兒疱疹)、Parvovirus B19(致胎兒水腫/貧血)雖各有影響,但「最常見且影響聽力智能」者為CMV。","options":{"A":"麻疹病毒非典型先天性聽損病因。","B":"單純疱疹病毒多致產道感染的新生兒疱疹。","C":"巨細胞病毒最常見、影響新生兒聽力與智能—正解。","D":"Parvovirus B19主要致胎兒水腫/貧血。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-10":{"quick":"腺病毒感染上皮細胞、在細胞核內形成包涵體;且為無套膜的線型雙股DNA病毒。","detail":{"background":"腺病毒(adenovirus)為「無套膜(裸病毒)、線型雙股DNA、二十面體」病毒,表面有纖突(fiber)。感染呼吸道/結膜/腸道上皮,於「細胞核內複製並形成核內包涵體」,造成呼吸道感染、結膜炎(游泳池熱)、胃腸炎等,亦可在淋巴組織(扁桃腺、腺樣體)造成「潛伏/持續性感染」。腺病毒的致癌相關蛋白為「E1A(結合pRB)與E1B(結合p53)」(非HPV的E6/E7)。故B(核內包涵體)正確;它無套膜、在淋巴組織非溶解性而是潛伏。","options":{"A":"抑制p53的E6/E7為HPV、腺病毒為E1A/E1B—錯誤。","B":"感染上皮細胞、核內形成包涵體—正解。","C":"腺病毒無外套膜(裸病毒)—錯誤。","D":"在淋巴組織造成潛伏/持續感染、非溶解—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-11":{"quick":"以反轉錄酶(reverse transcriptase)複製基因體者為B型肝炎病毒(經RNA中間體反轉錄)。","detail":{"background":"B型肝炎病毒(HBV,屬hepadnavirus)雖是「DNA病毒」,但其複製「需經RNA中間體並由反轉錄酶(reverse transcriptase)合成DNA」——病毒進入細胞後,其鬆弛環狀DNA於核內修補成cccDNA,轉錄出前基因組RNA(pgRNA),再由病毒聚合酶的「反轉錄酶活性」逆轉錄成新的DNA基因組。此特性使HBV聚合酶可被核苷(酸)類似物抑制。乳突瘤病毒(雙股DNA直接複製)、西尼羅河病毒(黃病毒,RNA→RdRp)、呼吸道融合病毒(副黏液病毒,負義RNA)皆不使用反轉錄。故為HBV(reverse transcribing DNA virus;HIV等retrovirus亦反轉錄但本題選項僅HBV)。","options":{"A":"乳突瘤病毒為雙股DNA直接複製。","B":"西尼羅河病毒以RdRp複製RNA。","C":"B型肝炎病毒經反轉錄酶複製—正解。","D":"呼吸道融合病毒以RdRp複製負義RNA。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-13":{"quick":"在宿主神經元細胞質形成內格里小體(Negri body)者為狂犬病病毒。","detail":{"background":"內格里小體(Negri body)是狂犬病病毒(rabies virus,桿狀病毒)在「神經元細胞質」內形成的嗜伊紅性包涵體,為其病理診斷標誌(海馬迴錐體細胞、小腦Purkinje細胞)。狂犬病經感染動物咬傷,病毒沿周邊神經逆行至中樞致幾乎致死的腦炎(恐水、咽痙攣)。HSV形成核內Cowdry A型包涵體、痘病毒形成細胞質Guarnieri小體、HBV不形成Negri body。故為狂犬病病毒。","options":{"A":"狂犬病病毒形成細胞質Negri body—正解。","B":"HSV形成核內Cowdry A型包涵體。","C":"痘病毒形成Guarnieri小體。","D":"B型肝炎病毒不形成Negri body。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-12":{"quick":"小DNA病毒(Parvovirus)基因體為「線型單股DNA」,「線型雙股DNA」錯誤。","detail":{"background":"小DNA病毒(Parvovirus)是「最小、無套膜」的DNA病毒,基因體為「線型『單股』DNA(ssDNA)」。人類致病的「B19」感染紅血球前驅細胞:①兒童致「傳染性紅斑(第五病)」——雙頰整片發紅的「巴掌臉(slapped-cheek)」;②在「慢性溶血性貧血」者致暫時性再生不良危象;③在「免疫缺乏者」致慢性貧血;④孕婦感染可致胎兒水腫。B19「不自帶DNA聚合酶」,須借宿主S期的複製酵素,故「只在分裂中(生長)細胞複製」。因此「基因體為線型雙股DNA」與其單股DNA本質相反,為錯誤。","options":{"A":"Parvovirus為線型單股DNA、非雙股—錯誤(正解)。","B":"B19致巴掌臉(傳染性紅斑),正確。","C":"免疫缺乏者B19致慢性貧血,正確。","D":"不帶聚合酶、只在分裂細胞複製,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-15":{"quick":"JC病毒由「large T抗原」結合抑制p53與pRB,「small t抗原抑制p53及pRB」錯誤。","detail":{"background":"JC病毒(JC virus)屬多瘤病毒(polyomavirus),為無套膜環狀雙股DNA病毒,廣泛潛伏感染人群(腎臟)。其致病:①感染「寡突膠細胞(神經膠細胞)」;②在「免疫不全(尤其AIDS、使用natalizumab等)」者再活化,破壞髓鞘造成「進行性多灶性白質腦病(PML)」。其調控蛋白:「large T抗原」與DNA複製有關,並「結合並抑制腫瘤抑制蛋白p53與pRB(p105RB)」;「small t抗原」則主要結合PP2A、輔助轉化。故「small t抗原與抑制p53及pRB有關」錯誤(應為large T抗原)。","options":{"A":"JC病毒感染神經膠(寡突膠)細胞,正確。","B":"large T抗原與DNA複製有關,正確。","C":"抑制p53與pRB者為large T而非small t—錯誤(正解)。","D":"免疫不全者可致PML,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-10":{"quick":"紫外線消毒最不能去除prion感染力(prion極抗紫外線與常規消毒)。","detail":{"background":"傳染性蛋白(prion)缺乏核酸、構形極穩定,對「一般去活化方法高度抵抗」:常規高壓滅菌(121°C)、紫外線、輻射、福馬林、酒精皆無法可靠去活化。有效去除prion感染力的方法為「延長高壓(134°C, 反覆循環)、浸泡強鹼(1N NaOH)或高濃度次氯酸(5%hypochlorite)」破壞蛋白結構。本題比較中,「紫外線消毒」對prion「最無效」(prion無核酸,紫外線對其結構幾無作用);而題中121°C一小時、5%次氯酸、1M NaOH相對較能降低感染力。故最不能去除者為紫外線。","options":{"A":"高壓121°C一小時可部分降低感染力。","B":"5%次氯酸可破壞prion。","C":"1M NaOH可破壞prion。","D":"紫外線消毒最不能去除prion感染力—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-11":{"quick":"活化致癌相關的E1A/E1B是腺病毒的蛋白;HPV以E6(降解p53)、E7(結合pRB)致癌,故C錯誤。","detail":{"background":"人類乳突瘤病毒(HPV)為「無套膜、環狀雙股DNA」病毒,可感染「皮膚與黏膜」上皮。其致癌機轉是高危險型(HPV-16、18)的「E6使p53降解、E7結合並使pRB失活」,導致細胞週期失控而轉化。「E1A與E1B」則是「腺病毒(adenovirus)」的早期致癌蛋白(E1A結合pRB、E1B結合p53),並非HPV的蛋白。故「HPV的E1A與E1B可活化致癌基因」錯誤。","options":{"A":"HPV可感染皮膚與黏膜,正確。","B":"HPV無外套膜(裸病毒),正確。","C":"E1A/E1B為腺病毒蛋白、非HPV—錯誤(正解)。","D":"HPV-16、18與癌症相關,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-13":{"quick":"疱疹性咽峽炎(herpangina)由克沙奇A病毒(腸病毒)引起,非HHV-6,故配對錯誤。","detail":{"background":"疱疹病毒與疾病配對:①「HSV-1」——口唇疱疹與「疱疹性腦炎(好侵顳葉)」;②「EB病毒(EBV)」——傳染性「單核球增多症」;③「水痘-帶狀疱疹病毒(VZV)」——水痘(初感染)與「帶狀疱疹(再活化)」;④「HHV-6」——嬰兒玫瑰疹。而「疱疹性咽峽炎(herpangina,軟顎/咽部小水泡潰瘍)」是由「克沙奇A病毒(Coxsackie A,屬腸病毒)」引起,與HHV-6無關(名稱雖有herp-但非疱疹病毒)。故D配對錯誤。","options":{"A":"HSV-1致疱疹性腦炎,配對正確。","B":"EBV致單核球增多症,配對正確。","C":"VZV致帶狀疱疹,配對正確。","D":"疱疹性咽峽炎由克沙奇A(腸病毒)引起、非HHV-6—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-14":{"quick":"疱疹性膿性指頭疽(herpetic whitlow)由單純疱疹病毒引起,非痘病毒。","detail":{"background":"痘病毒(Poxvirus)引起的人類疾病包括:①「天花(variola)」(已根除);②「傳染性軟疣(molluscum contagiosum)」——中央臍凹的珍珠樣丘疹;③「Orf(羊口瘡)與牛痘結節」——接觸羊/牛經皮膚感染的parapoxvirus病灶(常在手指)。而「疱疹性膿性指頭疽(herpetic whitlow)」是「單純疱疹病毒(HSV)」感染手指造成的疼痛性水泡(常見於牙醫、醫護或吸吮手指的兒童),屬疱疹病毒、非痘病毒。故非痘病毒所致者為herpetic whitlow。","options":{"A":"天花由痘病毒(variola)引起。","B":"傳染性軟疣由痘病毒引起。","C":"Orf由副痘病毒(parapoxvirus)引起。","D":"疱疹性膿性指頭疽由HSV引起、非痘病毒—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-27":{"quick":"預防子宮頸癌的HPV疫苗涵蓋高危險型HPV-16(及18)。","detail":{"background":"子宮頸癌與「高危險型人類乳突病毒(HPV)」持續感染密切相關,其中「HPV-16與HPV-18」約佔子宮頸癌的70%。HPV疫苗(二價含16/18、四價另含6/11、九價再加5型高危型)以病毒類病毒顆粒(VLP,L1蛋白自組裝)誘發中和抗體,用於預防HPV感染與相關癌前病變/癌症。HPV-1、4(皮膚疣)、HPV-8(表皮發育不良)非疫苗子宮頸癌標的。故疫苗血清型為HPV-16(高危型)。","options":{"A":"HPV-1致皮膚疣、非子宮頸癌標的。","B":"HPV-4致皮膚疣、非標的。","C":"HPV-8與表皮發育不良相關、非標的。","D":"HPV-16為高危致癌型、疫苗標的—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-12":{"quick":"Anti-HBc抗體陽性可區分:自然感染康復者有anti-HBc,單純疫苗接種者沒有。","detail":{"background":"B型肝炎血清標記判讀關鍵:①「HBsAg」陽性=現行感染(急性或慢性);②「anti-HBs」陽性=免疫力(疫苗接種或感染康復皆會有);③「anti-HBc(核心抗體)」=「曾經自然感染」的標記(疫苗只含表面抗原HBsAg,不會誘發anti-HBc)。因此區分「僅接種疫苗(未曾感染)」與「曾自然感染已康復」的關鍵就是「anti-HBc」:自然感染康復者「anti-HBs(+)且anti-HBc(+)」;單純疫苗接種者「anti-HBs(+)但anti-HBc(−)」。故以anti-HBc陽性區分。","options":{"A":"Anti-HBc陽性=曾自然感染,可區分疫苗與感染—正解。","B":"Anti-HBs兩者皆陽性、無法區分。","C":"HBsAg陰性兩者皆是、無法區分。","D":"HBeAg陰性兩者皆是、無法區分。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112020-15":{"quick":"D型肝炎病毒為缺陷病毒、需HBsAg外殼,可藉B肝疫苗預防;故B正確。","detail":{"background":"D型肝炎病毒(HDV,delta agent)是「缺陷型RNA病毒」,自身只編碼delta抗原,「必須借用B型肝炎病毒的表面抗原(HBsAg)作為外殼」才能組裝成具感染性的病毒顆粒並進入肝細胞。因此HDV感染僅發生於HBV感染者(共同感染coinfection或重疊感染superinfection),且會「加重」B型肝炎病程(暴發性肝炎、肝硬化)。經「血液/體液/性」傳染(非糞口)。預防:既然依賴HBsAg,「接種B型肝炎疫苗預防HBV即可同時預防HDV」。HDV不會促進HBsAg抗體陽轉(反而使病情惡化)。所需外殼是HBsAg(表面抗原)而非HBc(核心)。故B正確。","options":{"A":"HDV經血液/體液傳染、非糞口—錯誤。","B":"可藉B型肝炎疫苗預防(依賴HBsAg)—正解。","C":"不促進HBsAg抗體陽轉、反加重病情—錯誤。","D":"需HBsAg(表面抗原)外殼而非HBc—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-13":{"quick":"新生兒先天性聽力受損與巨細胞病毒相關,與EB病毒較無關。","detail":{"background":"EB病毒(EBV)相關疾病:①傳染性「單核球增多症」;②「鼻咽癌」、Burkitt淋巴瘤、Hodgkin病;③愛滋病人的「口腔毛狀白斑(hairy leukoplakia)」與相關淋巴瘤;④移植後淋巴增生疾病。而「新生兒先天性感音性聽力受損」的主要病毒病因是「巨細胞病毒(CMV)」的「先天性感染」,與EBV無關。故與EBV較無關者為新生兒先天性聽力受損。","options":{"A":"口腔毛狀白斑與EBV相關。","B":"新生兒先天性聽損與CMV相關、與EBV較無關—正解。","C":"鼻咽癌與EBV相關。","D":"單核球增多症與EBV相關。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-10":{"quick":"病毒最常利用表面「醣蛋白(glycoprotein)」附著受體並進入細胞。","detail":{"background":"病毒進入宿主細胞的第一步是「附著(attachment)」——多藉病毒表面的「附著蛋白」與宿主細胞受體專一結合。對有套膜病毒而言,這些附著/融合蛋白多為「套膜上的醣蛋白(glycoprotein,如流感HA、HIV gp120、疱疹gB/gD)」;裸病毒則以衣殼蛋白上的結構附著。基質蛋白(連接套膜與核衣殼)、蛋白水解酶、核心蛋白皆非介導附著進入的主要表面蛋白。故病毒最常以醣蛋白進入細胞。","options":{"A":"基質蛋白連接套膜與核衣殼、非附著進入。","B":"蛋白水解酶非附著進入蛋白。","C":"病毒以表面醣蛋白附著受體進入細胞—正解。","D":"核心蛋白為內部結構、非附著進入。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-11":{"quick":"HIV較不會「直接」造成細胞增生形成腫瘤(其相關癌症由免疫缺損間接導致)。","detail":{"background":"直接致癌(轉化)的病毒會帶入致癌基因或使抑癌蛋白失活:「HBV」(慢性發炎+整合致肝癌)、「HTLV-1」(Tax蛋白活化T細胞致成人T細胞白血病)、「HPV」(E6/E7使p53、pRB失活致子宮頸癌)皆可直接促進細胞增生轉化。「HIV」本身「不直接轉化細胞」,而是「破壞CD4 T細胞造成免疫缺損(AIDS)」,使其他致癌病毒(HHV-8致卡波西肉瘤、EBV致淋巴瘤、HPV致子宮頸癌)趁機致癌——屬「間接」相關。故比較不會直接致腫瘤者為HIV。","options":{"A":"HBV可直接致肝癌。","B":"HTLV-1直接致成人T細胞白血病。","C":"HPV直接致子宮頸癌。","D":"HIV不直接致癌、經免疫缺損間接相關—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-10":{"quick":"單純疱疹病毒感染的細胞核內可形成Cowdry type A包涵體,最為適當。","detail":{"background":"病毒致細胞病變(CPE)各具特徵:①「單純疱疹病毒(HSV)」感染——細胞核內形成「Cowdry type A嗜伊紅包涵體」、多核巨細胞(Tzanck);②「呼吸道融合病毒(RSV)、麻疹、副黏液病毒」——使細胞融合形成「合胞體(syncytia)」(腸病毒不形成syncytia);③「狂犬病病毒」——細胞質Negri body(德國麻疹不形成Negri body);④「腺病毒」——無套膜、經「受體介導內吞」進入(非膜融合;膜融合是有套膜病毒的方式)。故A(HSV核內Cowdry A包涵體)最適當。","options":{"A":"HSV感染細胞核內形成Cowdry type A包涵體—正解。","B":"腸病毒不形成合胞體(syncytia為RSV/麻疹特徵)—錯誤。","C":"Negri body為狂犬病、非德國麻疹—錯誤。","D":"腺病毒無套膜、經內吞進入而非膜融合—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-13":{"quick":"帶狀疱疹「可復發多次」(尤其免疫低下),「終身只會得一次」最不適當。","detail":{"background":"水痘-帶狀疱疹病毒(VZV):初次感染致「水痘」,之後潛伏於「背根神經節(神經細胞)」;免疫力下降時「再活化(reactivation)」沿單一皮節造成「帶狀疱疹(皮蛇)」。重點:帶狀疱疹「可復發多次」——一般人雖復發率不高,但免疫低下者(老化、惡性腫瘤、免疫抑制)可「多次復發」,並非終身只發作一次。可用抗病毒藥(acyclovir、valacyclovir)治療,並有水痘與帶狀疱疹疫苗預防。故「終身只會得一次帶狀疱疹」最不適當。","options":{"A":"帶狀疱疹可復發多次、非終身一次—錯誤(正解)。","B":"有抗病毒藥可治療,正確。","C":"有水痘/帶狀疱疹疫苗,正確。","D":"潛伏於神經節(神經細胞),正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-10":{"quick":"基因體複製通常在早期蛋白之後、結構(晚期)蛋白合成「之前或同時」進行,「在結構蛋白合成之後才開始」最不適當。","detail":{"background":"病毒複製週期一般順序為:附著→穿入→脫殼→「早期基因表現(調控/酵素,如聚合酶)」→「基因體複製」→「晚期(結構)蛋白合成」→組裝→釋出。因此「基因體複製」是在合成複製所需酵素(早期蛋白)後即開始,並「先於或伴隨」結構蛋白合成,「並非等到結構蛋白合成完才開始」。其餘:多數病毒複製過程都需合成RNA(連DNA病毒也須轉錄mRNA);HBV的外套膜源自宿主膜(HBsAg組裝);隱蝕期(eclipse)指脫殼後子代尚未組裝、「測不到或極少感染性病毒」。故A最不適當。","options":{"A":"基因體複製不會等到結構蛋白合成之後才開始—錯誤(正解)。","B":"病毒複製過程多需合成RNA(含DNA病毒轉錄mRNA),大致正確。","C":"HBV外套膜來自宿主細胞膜,正確。","D":"隱蝕期感染性病毒極少,大致正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114090-11":{"quick":"SV40(多瘤病毒)的T抗原可與宿主腫瘤抑制蛋白(p53、pRB)結合,最為適當。","detail":{"background":"致癌病毒與抑癌蛋白的對應須精確:①「多瘤病毒(polyomavirus, SV40)」的「large T抗原」可「結合並抑制宿主腫瘤抑制蛋白p53與pRB」(在實驗動物/培養細胞致轉化);②SV40「在人類並不形成腫瘤」(主要為動物/體外致癌模型);③「乳突瘤病毒(HPV)」的「E6結合p53、E7結合pRB」(故「E7結合p53」錯);④「腺病毒」的「E1A結合pRB、E1B結合p53」(故「E1B結合pRB」錯)。故最適當者為A(SV40 T抗原結合腫瘤抑制蛋白)。","options":{"A":"SV40 T抗原可結合腫瘤抑制蛋白(p53、pRB)—正解。","B":"SV40不在人類形成腫瘤—錯誤。","C":"HPV的E7結合pRB、E6結合p53(非E7結合p53)—錯誤。","D":"腺病毒E1B結合p53、E1A結合pRB(非E1B結合pRB)—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-01":{"quick":"C型肝炎病毒與黃熱病毒同屬黃病毒科(Flaviviridae)。","detail":{"background":"肝炎病毒分屬不同科:A型(HAV)為小RNA病毒科(Picornaviridae);B型(HBV)為肝去氧核糖核酸病毒科(Hepadnaviridae,DNA病毒);「C型(HCV)為黃病毒科(Flaviviridae)」;D型(HDV)為缺陷RNA病毒;E型(HEV)為Hepeviridae。黃熱病毒(yellow fever virus)、登革病毒、日本腦炎、西尼羅、茲卡皆為「黃病毒科(Flaviviridae)」的蟲媒病毒。故與黃熱病毒同科的肝炎病毒為HCV。","options":{"A":"HAV屬小RNA病毒科。","B":"HBV屬肝DNA病毒科。","C":"HCV與黃熱病毒同屬黃病毒科—正解。","D":"HDV為缺陷RNA病毒。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-09":{"quick":"腺病毒為DNA病毒,可直接以PCR檢測,不需反轉錄;其餘為RNA病毒須RT-PCR。","detail":{"background":"核酸檢測前是否需「反轉錄」取決於病毒基因體型態:「DNA病毒」可直接以PCR擴增(以DNA為模板);「RNA病毒」須先以反轉錄酶把RNA轉成cDNA再PCR(即RT-PCR)。腺病毒(adenovirus)是「雙股DNA病毒」,故「可直接PCR、不需反轉錄」。A型流感病毒(分段負股RNA)、MERS-CoV(正股RNA)、呼吸道融合病毒(負股RNA)皆為RNA病毒,須RT-PCR。故直接PCR者為腺病毒。","options":{"A":"腺病毒為DNA病毒、可直接PCR—正解。","B":"A型流感為RNA病毒、需RT-PCR。","C":"MERS-CoV為RNA病毒、需RT-PCR。","D":"呼吸道融合病毒為RNA病毒、需RT-PCR。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_106100-11":{"quick":"呼腸病毒(Reovirus)通常不經垂直感染傳給胎兒;Rubella、CMV、HSV皆屬TORCH垂直感染。","detail":{"background":"會經「垂直(母嬰/胎盤/產道)傳染」造成先天感染的病原以「TORCH」記憶:弓蟲(Toxoplasma)、其他(梅毒、HBV、HIV、VZV等)、德國麻疹(Rubella)、巨細胞病毒(CMV)、單純疱疹(HSV)。本題中「德國麻疹病毒(致先天性德國麻疹症候群:白內障、心臟缺損、耳聾)、巨細胞病毒(最常見先天感染)、單純疱疹(產道感染致新生兒疱疹)」皆可垂直感染。而「呼腸病毒(Reovirus)」主要造成輕微呼吸道/腸胃道感染,「通常不經垂直感染傳給胎兒」。故為呼腸病毒。","options":{"A":"德國麻疹病毒可垂直感染致先天德國麻疹症候群。","B":"巨細胞病毒為最常見先天感染。","C":"呼腸病毒通常不經垂直感染—正解。","D":"單純疱疹可經產道感染新生兒。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-11":{"quick":"評估HAART(雞尾酒)治療AIDS療效的主要常規指標為「血漿HIV病毒量(viral load)」。","detail":{"background":"愛滋病(HIV)治療監測有兩大指標:①「CD4 T細胞數」——反映免疫功能與伺機感染風險(用於分期、起始預防);②「血漿HIV病毒量(viral load,以RT-PCR定量)」——「直接反映病毒複製活性」,是「評估抗病毒治療(HAART/cART)療效的主要指標」(治療目標是把病毒量壓到測不到U=U)。p24抗原、HIV抗原/抗體combo測試用於「診斷/篩檢」,CD4:CD8比例輔助評估免疫狀態,皆非療效追蹤的主要常規指標。故為血漿病毒量。","options":{"A":"p24抗原用於診斷/早期偵測,非療效主要指標。","B":"CD4:CD8比例為輔助免疫評估。","C":"血漿HIV病毒量為療效監測主要指標—正解。","D":"抗原/抗體combo測試用於篩檢診斷。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-13":{"quick":"A型肝炎病毒(HAV)經糞口傳染,最不會經由性接觸傳染。","detail":{"background":"各病毒主要傳染途徑:①「HTLV-1」——經輸血、性交、哺乳(母嬰)傳染;②「CMV」——經唾液、性接觸、輸血、器官移植、母嬰多途徑;③「HCV」——主要經血液(共用針具),亦可經性接觸(較低)與母嬰;④「A型肝炎病毒(HAV)」——經「糞口(受污染食物/水)」傳染,屬腸道病毒,雖男男性行為的口糞接觸可增風險,但其本質為糞口途徑,「最不會經由典型性接觸(血液/體液性傳染)而傳染」。故最不會性接觸傳染者為HAV。","options":{"A":"HTLV-1可經性交傳染。","B":"CMV可經性接觸傳染。","C":"A型肝炎病毒為糞口傳染、最不會經性接觸—正解。","D":"C型肝炎病毒可經血液與性接觸傳染。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_107100-14":{"quick":"腮腺炎病毒經呼吸道進入後會病毒血症播散全身,「只有呼吸道症狀」錯誤。","detail":{"background":"腮腺炎(mumps)由「腮腺炎病毒(副黏液病毒科,單股負股RNA、有套膜)」引起,「經呼吸道飛沫傳染」、先在呼吸道上皮與局部淋巴增殖,再「病毒血症播散全身」,故「不只呼吸道症狀」:典型為「雙側腮腺腫脹疼痛」,並可累及睪丸(青春期後睪丸炎可致不孕)、卵巢、胰腺、腦膜/腦,並可由「尿液」排出病毒。預防靠「減毒活疫苗(MMR三合一之一)」效果良好。故「只有呼吸道症狀、不會全身感染」與其全身性播散事實相反。","options":{"A":"經呼吸道上皮傳染,正確。","B":"會病毒血症播散全身(腮腺/睪丸/腦膜等)、非只呼吸道—錯誤(正解)。","C":"病毒可存在於尿液,正確。","D":"減毒疫苗效果好、為MMR成分,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-10":{"quick":"拉薩病毒(Lassa, Arenavirus)有兩段單股RNA、其中一段為雙義(ambisense)RNA。","detail":{"background":"依基因體編碼方向,有一類RNA病毒採「雙義(ambisense)」編碼——同一段RNA上,部分基因以正義方向、部分以負義方向編碼。「沙粒病毒科(Arenaviridae,如拉薩病毒Lassa)」與部分布尼亞病毒的基因體為「兩段(S、L)單股RNA」,其中「S段為ambisense」。拉薩熱為西非的病毒性出血熱,以多乳鼠為宿主。登革(Flaviviridae,單一正股RNA)、MERS-CoV(單一正股RNA)、克里米亞-剛果出血熱(布尼亞目、三段負股RNA)皆非「兩段且ambisense」此組合(本題以拉薩病毒為解)。","options":{"A":"拉薩病毒為兩段ssRNA、S段為ambisense—正解。","B":"登革病毒為單一正股RNA。","C":"MERS-CoV為單一正股RNA。","D":"克里米亞-剛果出血熱病毒為三段負股RNA。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108030-13":{"quick":"流感病毒的M2膜蛋白為質子通道,參與病毒脫殼/釋放至細胞質。","detail":{"background":"流感病毒套膜上的主要蛋白:①血球凝集素(HA)負責附著與膜融合;②神經氨酸酶(NA)負責子代釋放;③「M2膜蛋白」是「質子離子通道」——內吞後使病毒內部酸化,促進核衣殼解離(uncoating)、把病毒基因體釋放到細胞質。M2正是抗流感藥「amantadine」的標的(現多抗藥)。基質蛋白M1為套膜內襯結構、NP包覆RNA、PA為聚合酶次單元,皆非質子通道。故質子通道為M2。","options":{"A":"M1為套膜內襯結構蛋白、非質子通道。","B":"M2為質子通道、助脫殼釋放至細胞質—正解。","C":"NP為核衣殼蛋白、包覆RNA。","D":"PA為RNA聚合酶次單元。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-09":{"quick":"「病毒出芽抑制劑」並非現行FDA核可的HIV抗病毒藥類別。","detail":{"background":"目前FDA核可的抗HIV藥物作用於病毒生活史多個步驟:①「核苷/核苷酸類反轉錄酶抑制劑(NRTI)」與非核苷類(NNRTI);②「整合酶抑制劑(integrase inhibitor,如raltegravir)」;③「蛋白酶抑制劑(protease inhibitor,如darunavir)」;④進入/融合抑制劑(enfuvirtide融合抑制、maraviroc CCR5拮抗、附著/附著後抑制劑)。並無以「病毒出芽(budding)」為標的的核可藥物類別。故不屬於現行核可者為「病毒出芽抑制劑」。","options":{"A":"蛋白酶抑制劑為核可的HIV藥類。","B":"整合酶抑制劑為核可的HIV藥類。","C":"核苷類似物反轉錄酶抑制劑為核可的HIV藥類。","D":"病毒出芽抑制劑非現行核可藥類—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-12":{"quick":"兒童感染流感(或水痘)時服用aspirin等水楊酸最易誘發雷氏症候群。","detail":{"background":"雷氏症候群(Reye syndrome)是兒童在「病毒感染(尤其『流感』與水痘)」期間「服用aspirin等水楊酸類」後發生的急性腦病合併肝脂肪變性(嘔吐、意識改變、肝功能異常、可致命),機轉與粒線體功能受損有關。因此「兒童發燒(尤其流感、水痘)應避免使用aspirin」,改用acetaminophen或ibuprofen。德國麻疹、麻疹、狂犬病非典型誘發雷氏症候群的病毒。故為流感病毒。","options":{"A":"德國麻疹非典型雷氏症候群誘因。","B":"麻疹非典型雷氏症候群誘因。","C":"流感(及水痘)感染服aspirin最易誘發雷氏症候群—正解。","D":"狂犬病非雷氏症候群誘因。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-13":{"quick":"基孔肯雅病毒以「人」為主要擴增宿主(人-蚊-人),人類為其最明確宿主。","detail":{"background":"蟲媒病毒(arbovirus)依「擴增宿主」分:①以鳥/動物為主要宿主、人為偶發終端宿主者——辛德畢斯病毒、塞姆利基森林病毒、西尼羅腦炎病毒(鳥為儲存宿主、人為終端);②以「人」為主要擴增宿主、行「人-蚊-人」城市循環者——「基孔肯雅病毒(Chikungunya)」(與登革相似,埃及斑蚊/白線斑蚊傳播,人是主要病毒擴增宿主)。故人類為最明確天然宿主者為基孔肯雅病毒。","options":{"A":"辛德畢斯病毒以鳥/動物為主要宿主。","B":"塞姆利基森林病毒以動物為主要宿主。","C":"西尼羅病毒以鳥為儲存宿主、人為終端宿主。","D":"基孔肯雅病毒以人為主要擴增宿主—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_108100-16":{"quick":"AZT(疊氮胸苷)抑制HIV的反轉錄酶,而反轉錄酶由pol基因編碼。","detail":{"background":"HIV(反轉錄病毒)基因體有三個主要結構/酵素基因:「gag(編碼核心蛋白p24等)、pol(編碼反轉錄酶、整合酶、蛋白酶)、env(編碼套膜醣蛋白gp120/gp41)」,另有調控基因(tat、rev等)。「疊氮胸苷(zidovudine, AZT)」是「核苷類反轉錄酶抑制劑(NRTI)」,作為胸苷類似物嵌入新生DNA造成鏈終止,「抑制反轉錄酶」——而反轉錄酶是「pol」基因的產物。故AZT針對pol基因的產物。","options":{"A":"env編碼套膜醣蛋白、非AZT標的。","B":"gag編碼核心蛋白、非AZT標的。","C":"tat為轉活化調控蛋白、非AZT標的。","D":"AZT抑制反轉錄酶(pol基因產物)—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-12":{"quick":"奧斯他偉(oseltamivir)抑制流感病毒的神經氨酸酶(neuraminidase)。","detail":{"background":"奧斯他偉(oseltamivir,克流感)是「神經氨酸酶抑制劑(NA inhibitor)」:流感病毒的「神經氨酸酶(neuraminidase, NA)」負責切斷子代病毒與宿主細胞表面唾液酸的連結,使新病毒得以「釋出並擴散」;oseltamivir(及zanamivir、peramivir)抑制NA,使子代病毒聚集於細胞表面而無法有效擴散,須在症狀發作48小時內使用最有效。蛋白酶、胸苷激酶、反轉錄酶皆非oseltamivir標的。","options":{"A":"蛋白酶非oseltamivir標的。","B":"oseltamivir抑制神經氨酸酶(NA)—正解。","C":"胸苷激酶為acyclovir活化相關、非此標的。","D":"反轉錄酶為HIV/HBV藥標的。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-14":{"quick":"恩夫韋(enfuvirtide, T-20)為胜肽類HIV融合抑制劑。","detail":{"background":"抗病毒藥的化學類別中,「恩夫韋(enfuvirtide, T-20)」是一段「36個胺基酸的合成胜肽(peptide)」,模擬HIV套膜gp41的HR2區段、與gp41結合而「阻斷病毒套膜與宿主細胞膜的融合(fusion inhibitor)」,須皮下注射。其餘:ganciclovir(去氧鳥苷類似物,抗CMV)、lamivudine(核苷類似物,抗HBV/HIV)、oseltamivir(神經氨酸酶抑制劑,抗流感)皆為小分子、非胜肽。故胜肽類藥物為enfuvirtide。","options":{"A":"enfuvirtide為胜肽類融合抑制劑—正解。","B":"ganciclovir為核苷類似物(小分子)。","C":"lamivudine為核苷類似物(小分子)。","D":"oseltamivir為小分子NA抑制劑。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109020-15":{"quick":"德國麻疹常以血清學或RT-PCR診斷,「常規以喉拭子培養病毒」錯誤。","detail":{"background":"德國麻疹病毒(rubella virus,披衣病毒科Togaviridae、正股RNA、有套膜):①「人類為唯一宿主」;②「只有一種血清型」(故疫苗保護穩定);③可施打「MMR(麻疹-腮腺炎-德國麻疹)減毒活疫苗」預防,孕婦感染早期可致「先天性德國麻疹症候群(白內障、先天性心臟病、耳聾)」。診斷以「血清學(IgM/IgG)或RT-PCR」為主,病毒「培養困難、不作常規」。故「常規以喉拭子培養病毒診斷」與臨床實務不符,為錯誤。","options":{"A":"人類為唯一宿主,正確。","B":"只有一種血清型,正確。","C":"可施打MMR疫苗預防,正確。","D":"診斷以血清學/RT-PCR為主、非常規培養—錯誤(正解)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-01":{"quick":"冬季發燒、乾咳、肌痛,數日後續發細菌性肺炎與肌炎、家人接續發病,最符合流行性感冒。","detail":{"background":"本題情境:「冬季(12月)、突發發燒、頭痛、喉嚨痛、乾咳、肌肉痛(全身性)、病程數日,後續『繼發細菌性肺炎與肌炎』,且家人一週後出現類似症狀(高傳染性、有潛伏期)」——典型為「流行性感冒(influenza)」。流感破壞呼吸道纖毛上皮,易「繼發細菌性肺炎(肺炎鏈球菌、金黃色葡萄球菌)」,並可引起肌炎(肌肉痛、CK升高)。麻疹(有Koplik斑與紅疹)、RSV(嬰幼兒細支氣管炎)、EV71(手足口、神經症狀)表現不同。故為流感病毒。","options":{"A":"麻疹有Koplik斑與全身紅疹,表現不同。","B":"RSV主要致嬰幼兒細支氣管炎。","C":"流感(冬季、肌痛、繼發細菌性肺炎、家庭群聚)—正解。","D":"EV71致手足口病與神經症狀。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_109100-14":{"quick":"腸病毒71型致死主因是侵犯神經系統(腦幹腦炎、神經性肺水腫)。","detail":{"background":"腸病毒71型(EV71)經糞口/飛沫感染,多致「手足口病、疱疹性咽峽炎」,但與其他腸病毒不同的是「具高度神經親和性」:可「侵犯中樞神經系統」造成腦幹腦炎、無菌性腦膜炎,進而引發「神經性肺水腫與心肺衰竭」,是「兒童重症死亡的主因」。臨床警訊為持續高燒、嗜睡、嘔吐、肌躍型抽搐、心搏過速。其致死不是靠腸道脫落電解質失衡、不在M細胞潛伏多次再活化、也非抗體增強感染。故致死主因為侵犯神經系統。","options":{"A":"非以腸道脫落致電解質失衡為主要致死機轉。","B":"非潛伏於M細胞反覆再活化。","C":"侵犯神經系統(腦幹腦炎、神經性肺水腫)為致死主因—正解。","D":"非抗體增強感染力。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-08":{"quick":"HTLV-1感染者終生僅約2-5%發成人T細胞白血病,「約一半會發病」錯誤。","detail":{"background":"第一型人類嗜T淋巴球病毒(HTLV-1)為反轉錄病毒,經「輸血、性交、哺乳(母嬰)」傳染,其Tax蛋白活化宿主T細胞訊息致轉化,可致「成人T細胞白血病/淋巴瘤(ATLL)」與HTLV-1相關脊髓病變(HAM/TSP)。重點:多數感染者「終生無症狀」,「終生發ATLL的風險僅約2-5%」(潛伏期可達數十年),並非約一半會發病。ATLL「預後差」,治療多用「AZT(zidovudine)合併干擾素-α」或化療。故「約一半感染者會發病」錯誤。","options":{"A":"可經輸血、性交、哺乳傳染,正確。","B":"終生發病率僅約2-5%、非約一半—錯誤(正解)。","C":"多用AZT與干擾素-α治療,正確。","D":"ATLL預後差,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-09":{"quick":"環狀病毒亞科(Orbivirus)屬呼腸孤病毒科,不屬反轉錄病毒科。","detail":{"background":"反轉錄病毒科(Retroviridae)依特性分為亞科:「腫瘤病毒亞科(Oncovirinae,如HTLV)」、「慢病毒亞科(Lentivirinae,如HIV)」、「泡沫病毒亞科(Spumavirinae,foamy virus)」——三者皆為反轉錄病毒。而「環狀病毒(Orbivirus)」是「呼腸孤病毒科(Reoviridae)」的成員(雙股分段RNA、無反轉錄),如藍舌病毒、科羅拉多蜱熱病毒,與反轉錄病毒無關。故不屬反轉錄病毒科者為環狀病毒亞科。","options":{"A":"腫瘤病毒亞科屬反轉錄病毒科。","B":"環狀病毒屬呼腸孤病毒科、非反轉錄病毒—正解。","C":"慢病毒亞科(含HIV)屬反轉錄病毒科。","D":"泡沫病毒亞科屬反轉錄病毒科。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-12":{"quick":"HAV與HEV經糞口傳染,「常透過血液傳染」錯誤。","detail":{"background":"肝炎病毒的核酸與傳播:①HAV、HCV皆為「正股RNA」;HAV屬小RNA病毒科(無套膜)、HCV屬黃病毒科(有套膜);②「HBV、HCV皆有外套膜(envelope)」(HAV、HEV無套膜);③傳播——「HAV與HEV經糞口(腸道)傳染」(故C錯,非血液);HBV、HCV、HDV經血液/體液/性/母嬰傳染;④HBV雖為DNA病毒,但其複製需在「細胞核」內形成cccDNA並經反轉錄。故「HAV與HEV常透過血液傳染」與其糞口途徑相反,為錯誤。","options":{"A":"HAV與HCV皆為正股RNA,正確。","B":"HBV與HCV皆有外套膜,正確。","C":"HAV與HEV經糞口而非血液傳染—錯誤(正解)。","D":"HBV在細胞核內複製(cccDNA),正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_110020-13":{"quick":"gp120是HIV的套膜醣蛋白(負責附著CD4);p66為反轉錄酶、p55為Gag前驅。","detail":{"background":"HIV的蛋白由三個基因編碼:①「env→gp160,裂解為套膜醣蛋白gp120(表面,結合CD4與共受體)與gp41(穿膜,介導融合)」;②「gag→p55前驅,裂解為核心蛋白(p24衣殼、p17基質、p7核衣殼)」;③「pol→反轉錄酶(p66/p51)、整合酶(p32)、蛋白酶(p10)」。故套膜蛋白為gp120(與gp41)。p66是反轉錄酶、p55是Gag前驅蛋白、gp21非HIV套膜蛋白。","options":{"A":"gp120為HIV套膜醣蛋白(結合CD4)—正解。","B":"gp21非HIV套膜蛋白。","C":"p66為反轉錄酶。","D":"p55為Gag前驅蛋白。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-12":{"quick":"本題為送分題;baloxavir marboxil抑制流感聚合酶的cap-snatching核酸內切酶(PA次單元)。","detail":{"background":"新型抗流感藥「巴洛沙韋(baloxavir marboxil)」的作用機轉是抑制流感病毒RNA聚合酶複合體中的「cap依賴性核酸內切酶(cap-dependent endonuclease)」活性,此活性位於聚合酶的「PA次單元」,用於奪取宿主mRNA的5′端帽子(cap-snatching)以啟動病毒mRNA轉錄;抑制後病毒無法轉錄、複製受阻,單劑口服即可。本題公告「一律給分」(選項對聚合酶次單元的標示有歧義,故送分)。對照:M2為amantadine標的、HA為附著、NA為oseltamivir標的。","options":{"A":"聚合酶相關次單元(本題送分)。","B":"M2為amantadine標的、非baloxavir。","C":"HA為附著蛋白、非baloxavir標的。","D":"NA為oseltamivir標的、非baloxavir。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-14":{"quick":"伊波拉病毒經體液/血液接觸傳染、病毒不特別穩定,「穩定且經腸胃道傳染」錯誤。","detail":{"background":"伊波拉病毒(Ebola virus,絲狀病毒科Filoviridae,單股負股RNA、有套膜)造成嚴重的病毒性出血熱。傳播:經「直接接觸感染者的血液、體液、分泌物或遺體」,以及受污染器材,「並非經腸胃道/食物且病毒非特別穩定(有套膜、對環境抗性低)」。致病:病毒大量複製並感染「內皮細胞、單核球/巨噬細胞、肝細胞」,引發「細胞激素風暴」、內皮損傷使「血管通透性增加、凝血異常與出血」、多器官壞死與休克。故「病毒穩定、主要經腸胃道傳染」錯誤。","options":{"A":"伊波拉經體液接觸傳染、病毒非特別穩定—錯誤(正解)。","B":"感染內皮、單核球等並快速複製致壞死,正確。","C":"引發細胞激素風暴,正確。","D":"內皮損傷使血管通透增加致內出血,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-15":{"quick":"登革病毒與C型肝炎病毒同屬黃病毒科(Flaviviridae)。","detail":{"background":"登革病毒(Dengue virus)為「黃病毒科(Flaviviridae)」,正股RNA、「有外套膜」(故可被乙醚/氯仿等脂溶劑去活性),「與C型肝炎病毒同科」。其有四種血清型(DENV-1~4),「血球凝集抑制試驗因型間交叉反應而無法可靠區分四型,須以中和試驗區分」;先前感染後再感染異型,經抗體依賴增強(ADE)可致重症登革。目前「無特效抗病毒藥」(支持療法為主),疫苗有條件使用。故B正確。","options":{"A":"有套膜、可被乙醚/氯仿去活性—錯誤。","B":"登革病毒與HCV同屬黃病毒科—正解。","C":"血球凝集抑制因交叉反應難可靠區分四型—錯誤。","D":"目前無特效抗登革藥物—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111020-27":{"quick":"反覆感染流感最可能與「抗原原罪(original antigenic sin)」有關。","detail":{"background":"流感病毒抗原易變,致人反覆感染:①「抗原漂變(antigenic drift)」——HA/NA基因「點突變」累積的小變化,使既有抗體辨識力下降(年度流行與疫苗更新原因);②「抗原移型(antigenic shift)」——「基因『重組(reassortment)』」造成HA/NA大幅改變,可致大流行(非點突變)。本題情境另涉「抗原原罪(original antigenic sin)」:免疫系統傾向先動員針對「首次感染株」的記憶B細胞,對新變異株產生的抗體效力不足,使人對變種流感保護不全而再感染。選項B把「點突變」誤稱為antigenic shift(實為drift),敘述有誤;D「每年打疫苗就完全不會得流感」過度;故最合理為C。","options":{"A":"流感不潛伏於神經節—錯誤。","B":"點突變應為antigenic drift而非shift—敘述錯誤。","C":"抗原原罪使對變種流感保護不足而再感染—正解。","D":"疫苗無法保證完全不感染—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-10":{"quick":"SARS-CoV-2在「細胞質」中複製;HIV酵素由病毒基因編碼、Zika為正股RNA、腸病毒無套膜。","detail":{"background":"病毒複製與分類辨析:①「HIV」自身基因(pol)編碼反轉錄酶、整合酶、蛋白酶(由病毒帶入/表現),「並非由宿主基因轉譯」;②「茲卡病毒(Zika)」屬黃病毒科,為「正股(+)RNA」(非負股);③「新型冠狀病毒(SARS-CoV-2)」為正股RNA病毒,「在細胞質中複製」(於改造的內質網膜上形成複製胞器);④「腸病毒(enterovirus)」屬小RNA病毒科,「無外套膜(裸病毒)」。故正確者為C(SARS-CoV-2在細胞質複製)。","options":{"A":"HIV酵素由病毒基因編碼、非宿主基因—錯誤。","B":"茲卡病毒為正股RNA、非負股—錯誤。","C":"SARS-CoV-2在細胞質中複製—正解。","D":"腸病毒無外套膜—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-11":{"quick":"日本腦炎與黃熱病經「動物+節肢動物(蚊)」傳播;漢他經齧齒、狂犬經咬傷,無節肢媒介。","detail":{"background":"判讀傳播途徑:①「漢他病毒(hantavirus)」——以「齧齒類(鼠)」為宿主,經其排泄物氣霧傳染,「無節肢動物媒介」;②「日本腦炎病毒」——蟲媒病毒,以豬/鳥為擴增宿主、經「蚊」叮咬傳人;③「黃熱病病毒」——蟲媒病毒,以猴/人為宿主、經「蚊」傳播;④「狂犬病病毒」——經感染哺乳動物「咬傷」傳染,「無節肢媒介」。故「經動物暨節肢動物傳播」者為②③(日本腦炎、黃熱)。","options":{"A":"①漢他無節肢媒介。","B":"②日本腦炎與③黃熱皆經動物+蚊傳播—正解。","C":"④狂犬無節肢媒介。","D":"①漢他無節肢媒介。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-12":{"quick":"沙粒病毒(Arenavirus)病毒顆粒「會包裹宿主核糖體」,故「都沒有包裹核糖體」非二者共同特性。","detail":{"background":"布尼亞病毒目(Bunyavirales)與沙粒病毒科(Arenaviridae)的共同點:①多為「人畜共通(zoonoses)」的病毒(齧齒/節肢媒介);②基因體為「分段(segmented)的單股(多為負股或ambisense)RNA」;③可造成「病毒性出血熱」(如克里米亞-剛果出血熱、拉薩熱、漢他)。差異在於「沙粒病毒(arena=拉丁文『沙』)的病毒顆粒在組裝時會『包裹進宿主的核糖體』」,電鏡下呈沙粒狀外觀——故「二者病毒顆粒中都沒有包裹核糖體」並非共同特性(沙粒病毒有)。故D為「不是共同具有的特性」。","options":{"A":"二者多為人畜共通病毒,為共同特性。","B":"二者基因體皆為分段RNA,為共同特性。","C":"二者皆可能造成出血熱,為共同特性。","D":"沙粒病毒會包裹核糖體,「都沒有核糖體」非共同特性—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-13":{"quick":"登革熱病毒為「正股RNA」病毒,非負股RNA;流感/伊波拉/狂犬皆為負股。","detail":{"background":"負股(negative-sense)RNA病毒須自帶RNA依賴RNA聚合酶(RdRp)先把負股轉成正股mRNA才能轉譯,代表有:「正黏液病毒(流感,分段負股)、絲狀病毒(伊波拉)、桿狀病毒(狂犬)、副黏液病毒(麻疹、腮腺炎、RSV)、布尼亞/沙粒病毒」。而「登革熱病毒」屬「黃病毒科」,為「正股(positive-sense)RNA」——其基因體可直接作為mRNA轉譯。故四者中非負股RNA者為登革熱病毒。","options":{"A":"流感病毒為分段負股RNA。","B":"伊波拉病毒為負股RNA。","C":"狂犬病毒為負股RNA。","D":"登革熱病毒為正股RNA、非負股—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_111100-15":{"quick":"索華迪(sofosbuvir)是HCV的NS5B聚合酶(RNA polymerase)抑制劑。","detail":{"background":"C型肝炎(HCV)的「直接抗病毒藥(DAA)」依標的分:①「NS3/4A蛋白酶抑制劑(-previr,如boceprevir、grazoprevir)」;②「NS5A抑制劑(-asvir,如ledipasvir)」;③「NS5B聚合酶抑制劑(-buvir)」——「索華迪(sofosbuvir)」是核苷類NS5B「RNA聚合酶抑制劑」,為HCV治癒性療法的骨幹藥物。lamivudine作用於HBV/HIV反轉錄酶,並非HCV聚合酶。故抑制HCV聚合酶者為sofosbuvir。","options":{"A":"sofosbuvir抑制HCV NS5B聚合酶—正解。","B":"boceprevir為NS3蛋白酶抑制劑。","C":"lamivudine作用於HBV/HIV反轉錄酶。","D":"(其他選項非HCV聚合酶抑制劑)。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-12":{"quick":"布尼亞科病毒中漢他病毒以老鼠為媒介傳播;布尼亞為負股RNA、在細胞質複製、非人傳人。","detail":{"background":"布尼亞病毒目(Bunyavirales)病毒多為「分段、負股(或ambisense)RNA、有套膜」,在「細胞質」複製,多屬「人畜共通/蟲媒/齧齒媒介」傳播。其中「漢他病毒(hantavirus)」較特別——「以齧齒類(老鼠)為主要儲存宿主」,人經吸入鼠尿糞氣霧感染,致漢他病毒肺症候群或腎症候群出血熱,「一般不人傳人」(少數種類例外)。故最適當為「漢他病毒以老鼠為媒介傳播」。布尼亞為「負股」(非正股)、在「細胞質」(非細胞核)複製、非以人傳人為主。","options":{"A":"布尼亞為負股(或ambisense)RNA、非正股—錯誤。","B":"在細胞質而非細胞核複製—錯誤。","C":"漢他病毒以老鼠為媒介傳播—正解。","D":"一般非人傳人—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-14":{"quick":"HIV原病毒整合位置「隨機」、無固定位置,「只出現在固定位置」最不適當。","detail":{"background":"反轉錄病毒(retrovirus)特性:①病毒顆粒帶「兩套(diploid)單股正義RNA」與「反轉錄酶」;②反轉錄時「利用宿主的tRNA作為引子(primer)」起始DNA合成;③合成的雙股DNA(原病毒provirus)由整合酶「整合進宿主染色體」,但「整合位置是隨機(無固定位點)」(略偏好轉錄活躍區),並非固定位置。故A「原病毒只出現在固定位置」與隨機整合的事實不符,最不適當。","options":{"A":"原病毒整合位置隨機、非固定—錯誤(正解)。","B":"反轉錄時利用宿主tRNA為引子,正確。","C":"病毒顆粒帶兩套單股RNA(diploid),正確。","D":"病毒顆粒帶反轉錄酶,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_112100-15":{"quick":"SARS-CoV-2與蝙蝠冠狀病毒的親緣關係,是由病人檢體的病毒「基因序列」高度相似度判定。","detail":{"background":"新型冠狀病毒(SARS-CoV-2)在2019-2020年被鑑定的關鍵,是「對病人檢體進行高通量定序,取得病毒全基因序列」,再與資料庫比對發現其與「蝙蝠冠狀病毒(如RaTG13)序列有極高相似度(約96%)」,從而推斷其源頭與演化關係。電子顯微鏡可看到冠狀外形(但無法鑑別親緣)、臨床症狀不具特異性、抗體交叉反應也不能精確判定親緣;唯有「基因序列比對」能確立病毒分類與來源。故為序列相似度。","options":{"A":"電鏡僅見冠狀外形、無法判定親緣。","B":"病毒基因序列與蝙蝠冠狀病毒高度相似—正解。","C":"臨床症狀不具特異性。","D":"抗體交叉反應無法精確判定親緣。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-12":{"quick":"郵輪上群聚的急性嘔吐腹瀉、2-3天自限,最可能為諾羅病毒。","detail":{"background":"諾羅病毒(Norovirus,杯狀病毒科,正股RNA、無套膜)是「成人急性病毒性腸胃炎」最常見病原,特徵:①極低感染劑量、高度傳染,常在「郵輪、學校、安養院、餐廳」造成「群聚爆發」;②經糞口/嘔吐物氣霧/受污染食物(生蠔、沙拉)傳播;③潛伏期短(約24-48小時),以「突發嘔吐與水瀉」為主,「症狀自限,約2-3天緩解」;④酒精乾洗手效果差,須肥皂洗手與漂白水消毒。腺病毒40/41與輪狀病毒主要致嬰幼兒腹瀉;EV-D68致呼吸道。故為諾羅病毒。","options":{"A":"腺病毒40型主要致嬰幼兒腹瀉。","B":"諾羅病毒致郵輪群聚、自限性嘔吐腹瀉—正解。","C":"輪狀病毒A群主要致嬰幼兒腹瀉。","D":"腸病毒D68主要致呼吸道感染。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-13":{"quick":"進行性多灶性白質腦病(PML)由JC病毒引起,與麻疹較無關。","detail":{"background":"麻疹(measles,副黏液病毒)的臨床表現:前驅期發燒、咳嗽、鼻炎、結膜炎與「畏光(photophobia)」、口腔黏膜的「科氏斑(Koplik spots,藍白小點)」,接著由頭至軀幹的斑丘疹;併發症可有肺炎、中耳炎、「腦炎(急性)」與罕見的「亞急性硬化性全腦炎(SSPE)」。而「進行性多灶性白質腦病(PML)」是「JC病毒(多瘤病毒)」在免疫不全者再活化所致,與麻疹無關。故與麻疹較無關者為PML。","options":{"A":"麻疹可併發腦炎,相關。","B":"前驅期可有畏光,相關。","C":"科氏斑為麻疹特徵,相關。","D":"PML由JC病毒引起、與麻疹較無關—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-14":{"quick":"MERS冠狀病毒基因體為正股(+)RNA;以單峰駱駝為中間宿主,致呼吸衰竭而非出血休克。","detail":{"background":"中東呼吸症候群冠狀病毒(MERS-CoV)為「冠狀病毒科」,基因體為「正股(+)單股RNA、有套膜」,在細胞質複製。臨床致嚴重「下呼吸道感染、呼吸衰竭」與急性腎損傷(死亡率高),「並非出血及休克」。其「中間宿主為單峰駱駝(dromedary camel)」(果子狸/麝香貓是SARS-CoV的中間宿主),源頭可能與蝙蝠相關。其複製適合人體體溫,並非偏好25°C。故最適當為B(正股RNA)。","options":{"A":"MERS致呼吸衰竭而非出血休克—錯誤。","B":"MERS-CoV為正股RNA—正解。","C":"中間宿主為駱駝而非果子狸—錯誤。","D":"非偏好25°C複製—錯誤。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_113090-15":{"quick":"HIV蛋白酶切割的是「病毒自身的Gag-Pol前驅蛋白」,「作用於宿主蛋白」最不適當。","detail":{"background":"HIV(慢病毒)複製調控:①「蛋白酶(protease)」切割病毒「自身的Gag、Gag-Pol多蛋白前驅」,使結構蛋白與酵素成熟、病毒顆粒具感染力(故為蛋白酶抑制劑的標的)——「並非作用於宿主蛋白」;②「Rev蛋白」促進未剪接/部分剪接的病毒mRNA由核輸出至細胞質;③「Tat蛋白」是極強的「轉活化因子」,大幅增強病毒LTR的轉錄;④複製「早期表現多種剪接的mRNA(產生Tat、Rev、Nef等調控蛋白),晚期才表現結構蛋白」。故A「蛋白酶主要作用於宿主蛋白」最不適當。","options":{"A":"HIV蛋白酶切割病毒自身前驅蛋白、非宿主蛋白—錯誤(正解)。","B":"Rev調控病毒mRNA輸出至細胞質,正確。","C":"Tat為強轉活化因子,正確。","D":"複製早期產生多種剪接mRNA,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-11":{"quick":"金剛烷胺(amantadine)抑制流感M2質子通道,阻斷「進入後的脫殼(uncoating)」。","detail":{"background":"金剛烷胺(amantadine,及rimantadine)是抗A型流感藥,作用於病毒套膜上的「M2質子離子通道」:正常時病毒內吞進入細胞後,M2讓質子進入病毒核心使其酸化、促進核衣殼解離(脫殼/uncoating)並把基因體釋入細胞質;amantadine阻斷M2、抑制「穿膜進入後的脫殼步驟」,使病毒無法釋出基因體而中止複製。(因現行流行株M2普遍突變抗藥,臨床已少用。)其作用步驟為「進入後脫殼」,非附著、轉錄或蛋白質合成。","options":{"A":"附著為HA介導、非amantadine作用步驟。","B":"抑制穿膜進入後的脫殼(uncoating)—正解。","C":"病毒轉錄非amantadine標的。","D":"蛋白質合成非amantadine標的。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-12":{"quick":"E型肝炎病毒在孕婦可致高達約20%的致死率。","detail":{"background":"E型肝炎病毒(HEV,Hepeviridae,正股RNA、無套膜)經「糞口(受污染水)」傳染,流行於衛生不良地區,多為自限性急性肝炎(一般致死率約1-2%)。其特殊之處是「孕婦(尤其第三孕期)感染HEV的致死率可高達約20%」(易致猛爆性肝衰竭),為臨床重點。HAV亦糞口傳染但孕婦無此高致死率;HCV、HDV經血液/體液。故造成孕婦高致死率者為HEV。","options":{"A":"HAV糞口傳染但孕婦無此高致死率。","B":"HCV經血液傳染、非此特徵。","C":"HDV依賴HBV、非此特徵。","D":"HEV在孕婦致死率高達約20%—正解。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-14":{"quick":"腸病毒在腸道複製後可病毒血症播散至中樞神經等處,「只在腸胃道細胞複製」最不適當。","detail":{"background":"腸病毒(enterovirus,屬小RNA病毒科Picornaviridae,正股RNA、無套膜):①「經糞口為主要傳染途徑」;②先在咽部與「腸道淋巴組織複製」,再「病毒血症播散」至中樞神經(無菌性腦膜炎、麻痺)、心(心肌炎)、皮膚黏膜(手足口病、疱疹性咽峽炎)等「腸道以外」器官,「並非只在腸胃道複製」;③「大多數感染為輕症或無症狀」,僅少數(如polio、EV71)致麻痺或神經重症。故「只在腸胃道細胞複製」最不適當。","options":{"A":"腸病毒會病毒血症播散至腸道外、非只在腸胃道複製—錯誤(正解)。","B":"屬小RNA病毒科,正確。","C":"糞口為主要傳染途徑,正確。","D":"大多數感染不致重症,正確。"},"sources":["Levinson《醫用微生物學與免疫學》","Murray《Medical Microbiology》","Jawetz《Medical Microbiology》"]}},"med2_114020-15":{"quick":"狗咬傷後立即施打狂犬病免疫球蛋白(被動)加疫苗(主動)可有效預防發病,最為適當。","detail":{"background":"狂犬病病毒(rabies virus,桿狀病毒,單股負股RNA):咬傷後病毒「先在傷口局部肌肉複製」,再沿周邊神經逆行至中樞,潛伏期長(數週至數月)是暴露後預防有效的關鍵。「暴露後預防(PEP)」須:傷口徹底清創沖洗、注射「狂犬病免疫球蛋白(RIG,被動免疫立即中和)」並同時開始「疫苗(主動免疫)
