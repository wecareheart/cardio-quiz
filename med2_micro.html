(elimination)→平衡(equilibrium)→逃脫(escape)」。在「免疫監測的選擇壓力」下,免疫系統會:①「篩選出突變/抗原性低的腫瘤細胞(導致腫瘤抗原表現消失、細胞特性改變)」;②使腫瘤逐步「失去免疫原性、獲得抑制能力而『逃脫』免疫並持續生長」。其核心是「免疫壓力塑造(edit)腫瘤朝逃脫演化」。「『促進T細胞毒殺使腫瘤縮小』」是治療目標/清除期結果,「並非immunoediting(尤其逃脫機制)所描述的內容」,故D最不適當。","options":{"A":"免疫壓力導致腫瘤突變(被選擇),屬immunoediting。","B":"導致腫瘤抗原表現消失(逃脫),屬immunoediting。","C":"導致腫瘤細胞特性改變,屬immunoediting。","D":"促進毒殺使腫瘤縮小非immunoediting所描述—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-27":{"quick":"移植後數分鐘至數十分鐘即排斥,主因是受者體內已有對抗移植物的預形成抗體(超急性排斥)。","detail":{"background":"移植排斥依時間分:①「超急性排斥(hyperacute)」——「數分鐘至數小時內」發生,主因是「受者體內『預先存在』對抗移植物的抗體(如ABO血型不合、先前致敏產生的抗HLA抗體)」,結合內皮活化補體與凝血,造成血栓、缺血壞死;②「急性排斥」——數天至數週,T細胞媒介(MHC不合)或抗體媒介;③「慢性排斥」——數月至數年,血管硬化纖維化。本題「移植後10分鐘」即排斥屬「超急性」,故主因為「已存在抗移植物抗體」。","options":{"A":"MHC class I不合多致急性(T細胞)排斥、非10分鐘超急性。","B":"MHC class II不合多致急性排斥。","C":"已存在抗移植物抗體致超急性排斥—正解。","D":"H抗原(次要)不合致較慢排斥。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_110020-28":{"quick":"Rituximab(anti-CD20)主要剔除B細胞。","detail":{"background":"Rituximab是「抗CD20」的單株抗體;「CD20」表現於「B細胞(從前B細胞到成熟B,漿細胞不表現)」。Rituximab結合CD20後經「補體依賴細胞毒性(CDC)、抗體依賴細胞毒性(ADCC)與誘導凋亡」清除B細胞,用於「非霍奇金B細胞淋巴瘤、慢性淋巴性白血病」與多種自體免疫疾病(類風濕、ANCA血管炎等)。它不剔除CD4/CD8 T細胞或樹突細胞。故主要剔除B細胞。","options":{"A":"CD4 T細胞不表現CD20。","B":"CD8 T細胞不表現CD20。","C":"Rituximab(anti-CD20)剔除B細胞—正解。","D":"樹突細胞非其標的。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-20":{"quick":"CAR-T是取「病人『自體』T細胞」改造,「取出健康人的T細胞」錯誤。","detail":{"background":"腫瘤免疫療法:①健康人體內初形成的腫瘤常被T細胞與NK辨識清除(免疫監測);②單株抗體(rituximab、trastuzumab)結合腫瘤抗原後經「補體活化或ADCC」清除腫瘤細胞;③「嵌合抗原受體T細胞(CAR-T)」——「取『病人自體(autologous)』的T細胞」,以基因工程使其表現可辨識腫瘤抗原(如CD19)並活化T細胞的CAR,擴增後「回輸給該病人」攻擊腫瘤(用於B細胞惡性腫瘤);④免疫檢查點阻斷以anti-CTLA-4/PD-1喚醒T細胞。故C「取出『健康人』T細胞」錯誤(應為病人自體)。","options":{"A":"健康人腫瘤常被T/NK清除,正確。","B":"單株抗體經補體/ADCC清除腫瘤,正確。","C":"CAR-T取病人自體T細胞、非健康人—錯誤(正解)。","D":"checkpoint blockade干擾T細胞抑制受體,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-21":{"quick":"腫瘤細胞表現「PD-L1」以結合T細胞的PD-1,抑制宿主免疫反應。","detail":{"background":"免疫檢查點配體/受體:「PD-1、CTLA-4、CD28」都表現在「T細胞」上(CD28為共刺激活化、CTLA-4與PD-1為抑制性受體)。腫瘤細胞(及腫瘤微環境細胞)則「表現抑制性『配體』PD-L1(PD-L2)」,與T細胞上的「PD-1」結合後傳遞抑制訊號、使抗腫瘤T細胞功能耗竭(exhaustion),藉此「抑制宿主免疫」。故腫瘤表現以抑制免疫者為PD-L1(抗PD-L1/PD-1療法即阻斷此結合)。","options":{"A":"CD28為T細胞共刺激受體、非腫瘤表現。","B":"腫瘤表現PD-L1抑制T細胞(結合PD-1)—正解。","C":"PD-1為T細胞抑制受體、非腫瘤表現。","D":"CTLA-4為T細胞抑制受體、非腫瘤表現。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111020-23":{"quick":"共濟失調微血管擴張症候群(ATM缺陷)致V(D)J重組/DNA修復缺陷,使B、T細胞減少。","detail":{"background":"共濟失調微血管擴張症候群(ataxia-telangiectasia, A-T)由「ATM基因(ataxia-telangiectasia mutated)」突變所致;ATM是偵測「DNA雙股斷裂」並啟動修復與細胞週期檢查點的關鍵激酶。淋巴球發育中的「V(D)J重組(與類別轉換)會產生DNA雙股斷裂」,ATM缺陷使這些斷裂無法正常修復,導致「B、T細胞發育受損、數量減少」與免疫缺陷(反覆鼻竇肺部感染),並合併小腦共濟失調、眼結膜微血管擴張、對輻射敏感與癌症傾向。故機轉為V(D)J重組(DNA修復)缺陷。","options":{"A":"ATM缺陷致V(D)J重組/DNA修復缺陷、B/T細胞減少—正解。","B":"非單純無法產生IgM。","C":"非MHC class I辨識缺陷。","D":"非MHC class II辨識缺陷。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111100-19":{"quick":"CD8 T細胞數低且MHC class I表現極少,符合MHC class I缺乏症(裸淋巴球症候群第一型)。","detail":{"background":"本題「CD8 T細胞數量異常低、且細胞表面MHC class I表現極少、反覆感染緩慢痊癒」——符合「MHC class I缺乏症(裸淋巴球症候群第一型,常因TAP-1/TAP-2運輸蛋白缺陷,使胞質胜肽無法進入內質網裝載MHC I,導致MHC I表現極低)」。因「CD8 T細胞於胸腺正選擇需辨識MHC class I」,MHC I缺乏使「CD8 T細胞數量減少」,易反覆細菌感染與壞死性皮膚肉芽腫。CGD(吞噬殺菌缺陷)、MHC class II缺乏(CD4減少)、白血球黏著缺損(黏附障礙)表現不同。故為MHC class I deficiency。","options":{"A":"CGD為吞噬殺菌缺陷、非MHC I低表現。","B":"MHC class I缺乏症(CD8低、MHC I極少)—正解。","C":"MHC class II缺乏致CD4減少、非此。","D":"白血球黏著缺損為黏附障礙、非MHC I低。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111100-28":{"quick":"慢性骨髓性白血病的標靶藥(imatinib)作用於Bcr-Abl酪胺酸激酶。","detail":{"background":"慢性骨髓性白血病(CML)的分子標誌是「費城染色體t(9;22)」形成的「BCR-ABL融合基因」,產生「組成性活化的Bcr-Abl酪胺酸激酶」驅動白血病細胞增生。標靶藥「imatinib(基利克)」等酪胺酸激酶抑制劑(TKI)專一抑制Bcr-Abl的ATP結合位,使CML獲得良好控制(分子標靶治療的典範)。p53、Ras、HER-2/neu非CML的治療標的。故為Bcr-Abl酪胺酸激酶。","options":{"A":"CML標靶藥作用於Bcr-Abl酪胺酸激酶—正解。","B":"p53非CML標靶。","C":"Ras非CML標靶。","D":"HER-2/neu為乳癌等標的、非CML。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-28":{"quick":"CAR-T的嵌合分子不包括CTLA-4;其組成含抗原辨識區(anti-CD19)、共刺激區(4-1BB)與CD3ζ訊號區。","detail":{"background":"嵌合抗原受體(CAR)的分子結構由外而內:①「胞外抗原辨識區」——常用單鏈抗體(scFv),如「anti-CD19」辨識B細胞腫瘤;②「鉸鏈與穿膜區」;③「胞內共刺激區」——如「4-1BB(CD137)或CD28」,提供第二訊號增強持久性;④「胞內活化訊號區」——「CD3ζ鏈(含ITAM)」傳遞T細胞活化訊號。CAR-T(如tisagenlecleucel)成功用於B細胞急性淋巴性白血病(ALL)與淋巴瘤。「CTLA-4」是T細胞『抑制性受體』,「不會」被納入CAR的活化型嵌合分子。故不包括CTLA-4。","options":{"A":"anti-CD19為CAR的抗原辨識區。","B":"CTLA-4為抑制性受體、不納入CAR—正解(不包括)。","C":"4-1BB為CAR的共刺激區。","D":"CD3ζ鏈為CAR的活化訊號區。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-27":{"quick":"慢性排斥的特徵是移植物血管內皮損傷、內膜增厚與血管硬化,致缺血蒼白。","detail":{"background":"移植排斥三型:①「超急性」——預形成抗體致數分鐘血栓,植體黑紫腫脹;②「急性」——數天至數週,T細胞或抗體媒介的細胞浸潤;③「慢性排斥(chronic rejection)」——數月至數年,以「移植血管病變(transplant arteriosclerosis)」為特徵:「血管內皮反覆損傷、平滑肌與纖維增生使血管內膜『同心圓狀』增厚、管腔狹窄硬化」,導致移植物『慢性缺血、纖維化、蒼白與功能逐漸喪失』。故B(圓周型小血管內皮損壞、血管硬化、植體蒼白缺血)為慢性排斥表現。A(NK經血管破壞)、C(血型抗體致完全阻塞黑紫=超急性)、D非慢性排斥定義。","options":{"A":"NK經血管破壞非慢性排斥典型機轉。","B":"血管內皮損傷、內膜增厚硬化致缺血蒼白—正解(慢性排斥)。","C":"血型抗體致完全阻塞、植體黑紫屬超急性。","D":"非慢性排斥的機制描述。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112100-28":{"quick":"CTLA-4與樹突細胞上的CD80/CD86結合(高親和力),anti-CTLA-4阻斷此結合以增強T細胞活化。","detail":{"background":"T細胞活化第二訊號:T細胞上的「CD28」與抗原呈現細胞(樹突細胞)上的「CD80/CD86(B7-1/B7-2)」結合提供『活化』共刺激。而「CTLA-4」是T細胞上(活化後上調、Treg恆表現)的『抑制性受體』,「以更高親和力結合『CD80/CD86』」、競爭性奪走B7並傳遞抑制訊號,使T細胞活化被剎車。「anti-CTLA-4(ipilimumab)」阻斷CTLA-4與CD80/86的結合,『解除剎車』、增強抗腫瘤T細胞反應(免疫檢查點阻斷)。故CTLA-4結合的是樹突細胞上的CD80/CD86。","options":{"A":"CTLA-4不結合MHC。","B":"CTLA-4不結合PD-1(PD-1的配體是PD-L1)。","C":"CTLA-4結合樹突細胞上的CD80/CD86—正解。","D":"CTLA-4不結合CD11b。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_113090-18":{"quick":"缺乏共同淋巴前驅細胞會使「後天(適應性)免疫系統」受最大影響。","detail":{"background":"造血幹細胞分化為兩大前驅:①「共同骨髓前驅(CMP)」——分化出紅血球、血小板、嗜中性球、單核球/巨噬細胞、樹突細胞等(屬先天免疫與血液細胞);②「共同淋巴前驅(common lymphoid progenitor, CLP)」——分化出「T細胞、B細胞與NK細胞」。其中「T、B細胞」是『適應性(後天)免疫』的核心。因此「缺乏共同淋巴前驅細胞」會使「適應性免疫系統受到最大影響」(T、B細胞缺乏,類似SCID);先天免疫(來自骨髓系)相對保留。故受影響最大者為後天性免疫系統。","options":{"A":"先天免疫多來自骨髓系前驅、相對保留。","B":"缺乏淋巴前驅使後天(適應性)免疫受最大影響—正解。","C":"非兩系統受相同程度影響。","D":"與血液凝結系統無直接關係。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_113090-23":{"quick":"若為「多醣『結合(conjugate)』疫苗」則以T細胞依賴方式活化B細胞並誘發記憶,「以thymus-independent方式活化」最不適當。","detail":{"background":"肺炎鏈球菌疫苗有兩型:①「純多醣疫苗(PPSV23)」——以「T細胞非依賴(thymus-independent, TI-2)」方式活化B細胞,對「<2歲嬰幼兒免疫原性差、不誘發記憶」;②「『結合型(conjugate)』疫苗(PCV,把莢膜多醣『連結蛋白載體』)」——轉為「『T細胞依賴(thymus-dependent)』反應」,能在嬰幼兒誘發高效價抗體與「記憶B細胞」。本題選項A描述「多醣連結蛋白形成的疫苗」即『結合型』疫苗——其應「以TD方式」活化B細胞並誘發記憶,故B「以thymus-independent方式活化B細胞」最不適當。","options":{"A":"多醣連結蛋白即結合型疫苗,正確。","B":"結合型疫苗以T細胞依賴(非TI)方式活化B細胞—錯誤(正解)。","C":"誘發的抗多醣抗體可降低感染,正確。","D":"結合型疫苗可誘發記憶B細胞,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_113090-27":{"quick":"細胞激素誘導殺手細胞(CIK)非腫瘤『特異』(非MHC限制),「具高度腫瘤特異性」最不適當。","detail":{"background":"各癌症免疫治療:①「mRNA癌症疫苗」——依病人HLA預測腫瘤『新生抗原(neoantigen)』,以脂質奈米粒包覆mRNA注射,誘導腫瘤特異T細胞;②「單核球衍生樹突細胞(MoDC)」——體外培養成APC、捕捉腫瘤抗原並活化腫瘤特異T細胞;③「CAR-T」——以病毒把CAR基因送入T細胞,使其辨識腫瘤抗原並活化;④「細胞激素誘導殺手細胞(CIK)」——把T細胞在多種促發炎細胞激素中體外擴增,其殺傷「以非MHC限制、廣效(類NK/NKT)方式進行」,「並『非高度腫瘤特異性』」。故B「CIK具高度腫瘤特異性」最不適當。","options":{"A":"mRNA疫苗依HLA預測neoantigen誘導特異反應,正確。","B":"CIK為非MHC限制廣效殺傷、非高度腫瘤特異—錯誤(正解)。","C":"MoDC捕捉腫瘤抗原並活化特異T細胞,正確。","D":"CAR-T以病毒送入CAR基因辨識腫瘤抗原,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-27":{"quick":"M1巨噬細胞屬促發炎/抗腫瘤,最不具免疫抑制性(抑制性者為M2、Treg、PD-1、IL-10)。","detail":{"background":"腫瘤微環境(TME)中的免疫抑制成分:①「PD-1/PD-L1」軸——抑制T細胞;②「調節型T細胞(Treg)」——分泌IL-10/TGF-β抑制免疫;③「IL-10」——抑制性細胞激素;④「M2型(替代活化)巨噬細胞」、骨髓衍生抑制細胞(MDSC)——促進腫瘤、抑制免疫。而「M1型(古典活化)巨噬細胞」屬「促發炎、具抗腫瘤(吞噬與呈現抗原、分泌IL-12/TNF)」的表型,「最『不』具免疫抑制性」。故四者中最不具免疫抑制性者為M1巨噬細胞。","options":{"A":"PD-1為抑制性受體、具免疫抑制性。","B":"Treg分泌IL-10/TGF-β、具免疫抑制性。","C":"M1巨噬細胞為促發炎/抗腫瘤、最不具免疫抑制性—正解。","D":"IL-10為抑制性細胞激素。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114020-28":{"quick":"PD-L1單株抗體主要阻斷「腫瘤細胞」表現的PD-L1與T細胞PD-1的結合。","detail":{"background":"免疫檢查點PD-1/PD-L1軸:T細胞上的抑制性受體「PD-1」與「『腫瘤細胞』(及部分腫瘤微環境中的巨噬/樹突細胞)表現的配體PD-L1」結合後,傳遞抑制訊號使抗腫瘤T細胞功能耗竭。以「抗PD-L1單株抗體(如atezolizumab)」治療,「主要阻斷『腫瘤細胞』表現的PD-L1與T細胞PD-1的結合」,解除T細胞抑制、恢復抗腫瘤毒殺。故主要阻斷的是腫瘤細胞上的PD-L1。","options":{"A":"巨噬細胞雖可表現PD-L1、但題旨主要為腫瘤細胞。","B":"樹突細胞雖可表現PD-L1、非此題主要標的。","C":"PD-1表現在T細胞、非PD-L1。","D":"抗PD-L1主要阻斷腫瘤細胞PD-L1與PD-1結合—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114090-22":{"quick":"B7(CD80/86)為抗原呈現細胞的共刺激配體,最不可能高表現於Treg。","detail":{"background":"調節型T細胞(Treg)的標誌與功能分子:①「CD25(IL-2受體α鏈)」——高表現(Treg需消耗IL-2);②轉錄因子「Foxp3」;③「CTLA-4」——高表現(競爭B7、傳遞抑制);④分泌「IL-10、TGF-β」等抑制性細胞激素。而「B7(CD80/CD86)」是「抗原呈現細胞(樹突細胞、巨噬、B細胞)」上提供共刺激的『配體』,「並非Treg的特徵性高表現分子」(Treg表現的是與B7結合的抑制受體CTLA-4)。故最不可能高表現於Treg者為B7。","options":{"A":"CD25為Treg高表現標記。","B":"IL-10為Treg分泌的抑制性細胞激素。","C":"CTLA-4為Treg高表現的抑制分子。","D":"B7(CD80/86)為APC的共刺激配體、非Treg高表現—正解。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_114090-26":{"quick":"有腫瘤特異性抗原呈現時,可產生並存在腫瘤專一性T淋巴球,最為適當。","detail":{"background":"腫瘤免疫反應:①腫瘤細胞若帶有「腫瘤特異性抗原(如突變新生抗原neoantigen、癌-睪丸抗原)」並被MHC呈現,「可產生並存在『腫瘤專一性T淋巴球』」(這是腫瘤疫苗、CAR-T與檢查點治療的基礎),故A正確;②免疫細胞「可以」進入腫瘤組織(腫瘤浸潤淋巴球TIL),只是常被抑制;③腫瘤雖會變異與下調抗原以逃脫,但「並非以表現突變表面分子『直接造成免疫細胞死亡』為主」(主要是抑制與逃避);④腫瘤不會藉「表現腫瘤抑制基因產物去『抑制NK』」(腫瘤抑制基因失活才致癌)。故最適當為A。","options":{"A":"有腫瘤特異抗原呈現可產生腫瘤專一T淋巴球—正解。","B":"免疫細胞可進入腫瘤(TIL)、非完全無法—錯誤。","C":"腫瘤主要靠抑制/逃避、非直接致免疫細胞死亡—錯誤。","D":"非藉腫瘤抑制基因產物抑制NK—錯誤。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-26":{"quick":"免疫檢查點抑制劑對急性淋巴性白血病(ALL)療效不顯著(ALL以CAR-T為主),故D最不適當。","detail":{"background":"免疫檢查點抑制劑(ICI)現況:①在「黑色素瘤、非小細胞肺癌、腎癌」等『實體腫瘤(尤其腫瘤突變負荷高者)』反應較好(黑色素瘤是早期突破);②「PD-1抗體(pembrolizumab、nivolumab)」整體反應率與耐受性多優於「CTLA-4抗體(ipilimumab)」,後者副作用(免疫相關不良反應)較高;③「急性淋巴性白血病(ALL)」屬B細胞惡性血液腫瘤,「以『CAR-T(anti-CD19)』與雙特異抗體(blinatumomab)」為突破性療法,「ICI對ALL『療效不顯著』」。故D「ICI對ALL有顯著療效」最不適當。","options":{"A":"ICI對黑色素瘤反應較好,正確。","B":"PD-1抗體反應率優於CTLA-4抗體,正確。","C":"CTLA-4抗體(ipilimumab)副作用率較高,正確。","D":"ICI對ALL療效不顯著(ALL以CAR-T為主)—錯誤(正解)。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-27":{"quick":"混合淋巴球反應(MLR)主要評估HLA class II(HLA-DR)的相容程度。","detail":{"background":"移植前的相容性評估:①「血清學/分子分型」檢測HLA-A、B、DR等對偶基因;②「混合淋巴球反應(mixed lymphocyte reaction, MLR)」——把供、受者淋巴球混合培養,觀察「受者T細胞(CD4)對供者抗原呈現細胞的增生反應」,主要反映「『HLA class II(尤其HLA-DR)』的差異」(因CD4 T辨識MHC II);增生越強代表相容性越差。故MLR主要評估HLA-DR(class II)相容程度。HLA-A(class I)以細胞毒性試驗/分型評估;H2-D/H2-K為小鼠MHC I。","options":{"A":"HLA-A為class I、非MLR主要評估對象。","B":"MLR主要評估HLA-DR(class II)相容程度—正解。","C":"H2-D為小鼠MHC class I。","D":"H2-K為小鼠MHC class I。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_115020-28":{"quick":"Rituximab(anti-CD20)主要經抗體依賴細胞毒性(ADCC,經Fc受體)清除B細胞。","detail":{"background":"Rituximab是「裸抗體(未接毒素/藥物)」的抗CD20單株抗體,清除B細胞(治療非霍奇金B細胞淋巴瘤)的機轉包括:①「抗體依賴細胞毒性(ADCC)」——抗體Fc段被NK等效應細胞的「Fcγ受體」辨識,引發對標的B細胞的毒殺(主要機轉之一);②補體依賴細胞毒性(CDC);③直接誘導凋亡。本題答案強調「經由活化Fc受體的ADCC」。它「不是」免疫毒素(抗體+毒素)、不是抗體偶聯化療藥(ADC)、也不是免疫檢查點阻斷。故主要機轉為ADCC(經Fc受體)。","options":{"A":"經ADCC(活化Fc受體)清除B細胞—正解。","B":"rituximab為裸抗體、非免疫毒素。","C":"非抗體偶聯化療藥(ADC)。","D":"非免疫檢查點阻斷。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_111100-22":{"quick":"結合型疫苗中CD4 T細胞辨識的是「載體蛋白(白喉毒素)」胜肽、非莢膜多醣,故C錯誤。","detail":{"background":"肺炎鏈球菌「結合型疫苗(PCV)」把「莢膜多醣『共價連結』載體蛋白(如白喉類毒素CRM197)」,使原本屬「T細胞非依賴(TI-2)、嬰幼兒反應差」的多醣抗原,轉為「T細胞依賴(TD)」反應:B細胞以BCR辨識並攝入整個「多醣-蛋白結合物」,在MHC II上「呈現『載體蛋白』衍生的胜肽」給「辨識該蛋白的CD4輔助T細胞」,經「連結辨識(linked recognition)」由T細胞幫助辨識多醣的B細胞分化為漿細胞、產生「抗莢膜多醣的高親和力抗體」並形成記憶。重點:「CD4 T細胞辨識的是『載體蛋白』而非『莢膜多醣』」(多醣不被MHC呈現給T)。故C「辨識莢膜多醣的CD4 T細胞先產生再幫B」錯誤。多醣與蛋白須共價連結才有效(D正確)。","options":{"A":"可測到抗莢膜多醣與抗白喉蛋白的專一抗體,正確。","B":"主要靠抗莢膜多醣抗體保護,正確。","C":"CD4 T細胞辨識的是載體蛋白而非莢膜多醣—錯誤(正解)。","D":"多醣與蛋白須共價連結方有效,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}},"med2_112020-25":{"quick":"HIV感染確實會產生CD8 CTL與特異抗體(只是無法清除),「都沒有產生」錯誤。","detail":{"background":"HIV造成慢性感染與最終免疫崩潰(AIDS)的原因:①感染後「『會』產生抗HIV的毒殺性CD8 T細胞與特異性抗體」,但「無法清除病毒」(故A「都沒有產生」錯誤);②HIV的反轉錄酶易出錯,「高突變率使既有的CTL表位與中和抗體失效(免疫逃逸)」;③HIV的輔助蛋白(如Nef)可「下調被感染細胞的MHC class I」,逃避CD8 T毒殺;④HIV「感染並破壞CD4 T細胞」(亦感染樹突細胞、巨噬細胞作為儲存庫),使CD4數目進行性下降、免疫崩潰;⑤並能整合為潛伏前病毒躲避清除。故A錯誤(CTL與抗體有產生,只是無效)。","options":{"A":"CD8 CTL與特異抗體確會產生(只是無法清除)、非都沒產生—錯誤(正解)。","B":"高突變使既有免疫反應失效,正確。","C":"下調MHC I逃避CD8 T毒殺,正確。","D":"感染CD4/樹突/巨噬並使CD4減少,正確。"},"sources":["Abbas《細胞與分子免疫學》","Janeway《Immunobiology》","Levinson《醫用微生物學與免疫學》"]}}},TO=["M1細菌學總論構造遺傳與抗藥性", "M2革蘭氏陽性菌", "M3革蘭氏陰性菌", "M4分枝桿菌螺旋體黴漿菌披衣菌與立克次體", "M5真菌學", "M6病毒學總論與DNA病毒", "M7RNA病毒與反轉錄病毒", "M8先天免疫補體吞噬與發炎", "M9免疫球蛋白抗原呈現與MHC", "M10T與B淋巴球活化及細胞激素", "M11過敏反應與自體免疫疾病", "M12免疫缺損移植腫瘤免疫與疫苗"],LEC={"M1細菌學總論構造遺傳與抗藥性":{"title":"細菌構造、遺傳與抗藥機制總整理","html":"<p><b>細胞壁與構造</b>:革蘭氏陽性厚層胜肽聚醣+台口酸;革蘭氏陰性薄壁+外膜(LPS=lipid A內毒素+核心多醣+O抗原)、porin通道。莢膜(多醣;炭疽為多肽)抗吞噬;鞭毛=運動(H抗原);線毛/纖毛=黏附與接合;內孢子(G+ Bacillus/Clostridium)耐惡劣環境;生物膜助黏附與抗藥。</p><p><b>代謝與氧</b>:有氧呼吸ATP最多(電子傳遞鏈在細胞膜);無氧呼吸<有氧;發酵最少。絕對需氧/絕對厭氧(無SOD-catalase)/兼性厭氧(有氧無氧皆可)/微需氧(Campylobacter、Helicobacter)。</p><p><b>遺傳</b>:質體=雙股環狀DNA、自主複製、可經接合傳遞抗藥基因;水平轉移三途徑=轉形(transformation)、轉導(transduction,噬菌體)、接合(conjugation);致病島(PAI)集中編碼毒力因子、可水平轉移;CRISPR-Cas為細菌適應性免疫;lac operon=repressor(乳糖解抑)+CAP-cAMP(無葡萄糖時活化)雙重調控;trp operon色胺酸為co-repressor。</p><p><b>抗藥機制四類</b>:①水解酵素(β-lactamase;class B為metallo-/碳青黴烯酶需Zn)②標的改變(PBP突變→β-lactam、gyrA→quinolone、23S甲基化→MLS/clindamycin)③通透降低/外排(porin↓、efflux)④代謝旁路(取外源thymidine繞過trimethoprim)。aminoglycoside需氧依賴運輸→厭氧菌天生抗藥;磺胺對人無毒因人不自行合成葉酸。</p>"},"M2革蘭氏陽性菌":{"title":"革蘭氏陽性菌重點(葡萄球‧鏈球‧梭菌‧棒狀‧李斯特)","html":"<p><b>葡萄球菌(觸酶+)：</b><b>金黃葡萄球菌</b>(凝固酶+、β 溶血)：膿瘍/蜂窩織炎、食物中毒(腸毒素、快速嘔吐)、毒性休克(TSST-1)、燙傷樣皮膚症候群、心內膜炎(靜脈藥癮)、骨髓炎；<b>MRSA</b>(mecA/PBP2a)。表皮葡萄球菌(凝固酶−、導管/人工瓣，生物膜)；腐生葡萄球菌(年輕女性 UTI)。</p>\n<p><b>鏈球菌(觸酶−)：</b><b>A 群(化膿鏈球菌、β 溶血、bacitracin 敏感)</b>：咽炎、猩紅熱、丹毒、壞死性筋膜炎、<b>風濕熱(M 蛋白分子相似)、急性腎絲球腎炎</b>；<b>B 群(無乳、新生兒腦膜炎/敗血)</b>；<b>肺炎鏈球菌(α 溶血、optochin 敏感、莢膜、最常見社區肺炎/中耳炎/腦膜炎)</b>；草綠色鏈球菌(亞急性心內膜炎、齲齒)；腸球菌(膽道/UTI、VRE)。</p>\n<p><b>其他 G+：</b>白喉桿菌(外毒素抑 EF-2、偽膜、Elek)；李斯特菌(冷增殖、孕婦/新生兒/免疫不全腦膜炎、肌動蛋白火箭)；<b>梭菌</b>(厭氧芽孢：破傷風 tetanospasmin 抑制甘胺酸/GABA、肉毒抑 ACh、產氣莢膜壞疽、困難梭菌偽膜性結腸炎)；炭疽。</p>\n<p><b>★考點：</b>凝固酶+=金黃葡萄球菌；A 群鏈球菌後遺症風濕熱/腎炎；肺炎鏈球菌 optochin 敏感+莢膜；李斯特冷增殖孕婦腦膜炎；困難梭菌偽膜性結腸炎；破傷風 vs 肉毒機轉。</p>"},"M3革蘭氏陰性菌":{"title":"革蘭氏陰性菌重點(腸桿菌‧弧菌‧假單胞‧特殊菌)","html":"<p><b>腸桿菌科</b>:O(LPS)/H(鞭毛)/K(莢膜)抗原。E. coli O157:H7(EHEC/STEC,志賀毒素stx→出血性腸炎+HUS,忌抗生素);Salmonella Typhi(人類專一、糞口、侵肝脾、帶原潛伏膽囊);Klebsiella(肝膿瘍高黏液型K1/K2、MacConkey粉紅乳糖+);Shigella(糞口、侵入)。</p><p><b>弧菌</b>:Vibrio cholerae(霍亂毒素A-B5→cAMP↑米湯樣瀉);V. parahaemolyticus(海鮮、TDH神奈川陽性);V. vulnificus(肝病者海水傷口→出血性水泡壞死/敗血)。</p><p><b>其他</b>:Pseudomonas aeruginosa(氧化酶+、不發酵糖、pyocyanin、游泳者外耳炎、CF以alginate慢性定殖);Legionella(BCYE培養需L-cysteine+鐵、胞內、水源氣霧、macrolide/fluoroquinolone、CMI防禦);Helicobacter pylori(尿素酶→尿素呼氣試驗測CO2、消化性潰瘍/胃癌/MALToma);Hib(會厭炎、PRP莢膜、結合型疫苗);Bordetella(百日咳、無細胞疫苗);Bacteroides fragilis(厭氧、有莢膜、腹腔膿瘍、metronidazole)。霍亂類毒素=ETEC LT-I(同機轉)。</p>"},"M4分枝桿菌螺旋體黴漿菌披衣菌與立克次體":{"title":"分枝桿菌‧螺旋體‧黴漿菌‧披衣菌‧立克次體","html":"<p><b>分枝桿菌(抗酸):</b><b>結核菌</b>(蠟質細胞壁、肉芽腫、潛伏、IGRA/PPD、RIPE 治療)；<b>痲瘋</b>(結核樣 vs 麻風型、周邊神經、無法培養)；非結核分枝桿菌(MAC，AIDS 播散)。</p>\n<p><b>螺旋體：</b><b>梅毒(蒼白密螺旋體)</b>：一期硬性下疳、二期全身疹(手掌腳掌)/扁平濕疣、三期膠樣腫/心血管/神經、先天；暗視野/血清(VDRL/RPR 篩、TPHA 確認)。<b>萊姆病(伯氏疏螺旋體、蜱、遊走性紅斑)</b>；鉤端螺旋體(動物尿/洪水、Weil 氏症)；回歸熱。</p>\n<p><b>無細胞壁/胞內：</b><b>黴漿菌</b>(無細胞壁、非典型肺炎/冷凝集素、紅黴素/四環素，β-內醯胺無效)；<b>披衣菌</b>(胞內、沙眼/性病 LGV/非淋菌尿道炎、肺炎)；<b>立克次體</b>(蜱/蝨媒、洛磯山斑點熱/恙蟲病/斑疹傷寒、Weil-Felix、doxycycline)；Q 熱(伯納特氏)。</p>\n<p><b>★考點：</b>梅毒二期手掌腳掌疹、VDRL 篩 TPHA 確認；黴漿菌無細胞壁/冷凝集素/β-內醯胺無效;披衣菌胞內;立克次體 doxycycline;萊姆病蜱+遊走性紅斑。</p>"},"M5真菌學":{"title":"真菌學重點(雙形菌‧念珠菌‧抗黴藥)","html":"<p><b>細胞壁與膜</b>:細胞壁含幾丁質、β-葡聚醣;細胞膜含麥角固醇(ergosterol)。無性孢子分conidia(分生)與sporangiospore(囊孢子);菌絲分有隔(septate)與無隔/多核體(coenocytic,毛黴目寬大無隔)。</p><p><b>雙形性全身黴菌</b>(25°C黴型/37°C酵母型):粗球黴菌(關節孢子→組織spherule內含內孢子)、組織胞漿菌(巨噬內小酵母、cycloheximide抑汙染)、皮炎芽生菌(寬基底出芽)、副球黴菌(舵輪狀多重出芽、α-glucan毒力)、Talaromyces marneffei(東南亞AIDS、25°C紅色素、酵母型裂殖fission)。</p><p><b>念珠菌與其他</b>:C. albicans(芽管germ tube+、可真菌絲);C. glabrata(僅單細胞、不形成假菌絲、azole抗);C. krusei(fluconazole先天抗藥)。隱球菌(莢膜、墨汁、niger seed產黑色素)。Malassezia(嗜脂、橄欖油培養、花斑癬可直接KOH鏡檢;M. pachydermatis非嗜脂)。麴菌(CYP51A突變→azole抗);毛黴(糖尿病酮酸、寬大無隔)。產色芽生菌→硬化體;Rhodotorula→紅色類胡蘿蔔素。</p><p><b>抗黴藥</b>:作用於細胞膜ergosterol——azole(抑14α-demethylase合成)、allylamine(抑squalene epoxidase)、polyene(直接結合ergosterol破膜,如amphotericin B/nystatin);作用於細胞壁——echinocandin(抑β-葡聚醣合成);griseofulvin(阻微小管);flucytosine(核酸)。</p>"},"M6病毒學總論與DNA病毒":{"title":"病毒總論與DNA病毒(疱疹‧HPV‧肝炎B)","html":"<p><b>病毒總論</b>:以表面醣蛋白附著受體進入;複製順序=附著→穿入→脫殼→早期蛋白→基因體複製→晚期(結構)蛋白→組裝→釋出(有套膜多藉出芽、裸病毒多藉溶解)。RNA病毒突變率>DNA(RdRp無校對);有套膜對環境抗性低。prion=無核酸錯誤摺疊蛋白、不引免疫不誘干擾素、極抗消毒(需NaOH/134°C/次氯酸)。</p><p><b>疱疹病毒(DNA)</b>:HSV-1(疱疹性腦炎、核內Cowdry A);VZV(水痘→潛伏神經節→帶狀疱疹可多次復發、有疫苗);CMV(最常見先天感染、致聽損智能障礙、移植後抗藥);EBV(感染B細胞、單核球增多症、鼻咽癌/Burkitt/Hodgkin、血清VCA-IgM急性、EBNA過去);HHV-6(玫瑰疹熱退疹出);HHV-8(卡波西肉瘤)。</p><p><b>其他DNA</b>:腺病毒(裸、雙股DNA、核內包涵體、與克沙奇B共用CAR、E1A/E1B);HPV(裸環狀DNA、E6→p53降解、E7→pRB、16/18致子宮頸癌、疫苗為VLP);多瘤(JC病毒→PML、large T結合p53/pRB;SV40 T抗原);痘病毒(細胞質複製、自帶酵素、天花以vaccinia根除);Parvovirus B19(線型單股DNA、巴掌臉、慢性貧血);HBV(雖DNA但經反轉錄、核內cccDNA、anti-HBc區分感染vs疫苗)。</p>"},"M7RNA病毒與反轉錄病毒":{"title":"RNA病毒與反轉錄病毒(肝炎‧流感‧HIV)","html":"<p><b>肝炎：</b><b>HAV/HEV(糞口、急性，HEV 孕婦重)</b>；<b>HCV(血液、慢性化高、肝硬化/肝癌、DAA 可治癒)</b>。(HBV 為 DNA 病毒)。</p>\n<p><b>呼吸道：</b><b>流感(正黏液病毒、HA/NA 抗原漂變/移型、大流行、oseltamivir 抑 NA)</b>、副流感(哮吼)、RSV(嬰兒細支氣管炎)、麻疹(Koplik 斑、SSPE)、腮腺炎、德國麻疹(先天感染)、冠狀病毒。</p>\n<p><b>腸道/蟲媒/其他：</b>輪狀/諾羅(腹瀉)、小兒麻痺/腸病毒 71(手足口/腦炎)、<b>登革(伊蚊、出血熱/休克、ADE)、日本腦炎、茲卡(小頭)、黃熱</b>、狂犬(Negri 小體、致命)。</p>\n<p><b>反轉錄病毒(HIV)：</b>反轉錄酶/嵌入酶、感染 <b>CD4 T 細胞</b>(gp120-CD4+CCR5/CXCR4)、CD4↓→伺機感染(PCP/CMV/弓蟲/隱球菌/MAC/Kaposi)；HAART(NRTI/NNRTI/蛋白酶/嵌入酶抑制劑)。HTLV-1→成人 T 細胞白血病。</p>\n<p><b>★考點：</b>HCV 慢性化高→肝硬化/癌、DAA 治癒；流感抗原漂變/移型、oseltamivir 抑 NA；登革 ADE 二次感染重症；HIV 感染 CD4(CCR5)；麻疹 Koplik 斑/SSPE；狂犬 Negri。</p>"},"M8先天免疫補體吞噬與發炎":{"title":"先天免疫:補體‧吞噬‧發炎‧PRR","html":"<p><b>細胞與辨識</b>:先天免疫細胞(巨噬、嗜中性、樹突、NK、肥大、嗜酸/鹼球)以模式辨識受體(PRR)辨識PAMP:TLR2(G+胜肽聚醣)、TLR4(LPS)、TLR3(dsRNA)、TLR7/8(ssRNA)、TLR9(CpG DNA);NLR(胞質細菌、發炎體);RIG-I(胞質RNA→I型干擾素);cGAS(胞質DNA)。NK靠missing-self(MHC I↓)殺傷。發炎四徵(紅腫熱痛)為宿主反應。</p><p><b>吞噬與殺菌</b>:嗜中性球最快到感染處;呼吸爆發(NADPH氧化酶→超氧陰離子/ROS,缺陷=CGD);NETs;防禦素/溶菌酶(切胜肽聚醣)直接破壞病原。白血球滲出:selectin(滾動)→整合素-ICAM(牢固黏附)→穿出。</p><p><b>補體</b>:三途徑——傳統(抗體)、替代(病原表面)、凝集素(MBL)。功能:C3b調理(經吞噬細胞CR1)、C3a/C5a過敏毒素(活化肥大細胞)、C5b-9膜攻擊複合體(MAC)裂解。調控:CD59抑C9聚合、DAF(CD55)/MCP(CD46)作用上游、C1抑制劑。早期C1/C2/C4缺乏→免疫複合體病;終端缺乏→易奈瑟氏菌感染。第一型干擾素抑病毒蛋白質合成;痛風尿酸→NLRP3發炎體→IL-1β。</p>"},"M9免疫球蛋白抗原呈現與MHC":{"title":"抗體‧B/T受體基因‧MHC抗原呈現","html":"<p><b>免疫球蛋白</b>:膜型IgM/IgD共表現靠選擇性剪接;膜型→分泌型亦剪接;黏膜sIgA為二聚體(J chain+分泌片段[上皮pIgR裂解]);類別轉換需CD40-CD40L+AID(缺陷=hyper-IgM:T端CD40L、B端CD40/AID);體細胞超突變(AID於生發中心、作用於V區、親和力成熟);抗原抗體為非共價結合。</p><p><b>受體基因重組</b>:V(D)J由RAG1/2+DNA-PK/Artemis+TdT(N核苷酸)+DNA ligase IV;重鏈先(D-J→V-DJ)、輕鏈後(先κ後λ);CDR3在接合處變異最大(CDR1/2由V編碼);對偶基因排除使一細胞單一特異性。TCR β有D片段(α無);pre-TCR含β鏈+pTα;pre-BCR含μ重鏈+替代輕鏈(VpreB+λ5),缺則停滯pro/pre-B。</p><p><b>MHC</b>:多基因+高度多型性(增加族群可呈現抗原、抑病毒傳播)。class I(各有核細胞、呈現內源胜肽8-10aa給CD8;伴護蛋白calnexin/calreticulin、TAP運送、β2m不接觸抗原);class II(專業APC與胸腺上皮、呈現外源胜肽13-25aa給CD4;invariant chain占槽→CLIP→HLA-DM置換;β1變異大)。class III編碼補體/TNF。超抗原不需處理直接交聯MHC II與TCR Vβ。</p>"},"M10T與B淋巴球活化及細胞激素":{"title":"T/B細胞活化‧分化‧耐受‧細胞激素","html":"<p><b>T細胞</b>:TCR需CD3(含ITAM)傳訊;胸腺正選擇(中等辨識自身MHC→存活)、負選擇(過強→凋亡、AIRE表現周邊抗原)。CD4分化:Th1(T-bet/IFN-γ,胞內病原)、Th2(GATA3/IL-4-5-13,寄生蟲/過敏/IgE)、Th17(RORγt/IL-17,胞外菌真菌、招嗜中性球)、Treg(Foxp3/CD25/IL-10/TGF-β,抑制);TFH(Bcl-6/IL-21,生發中心)。CTL毒殺:perforin/granzyme、FasL(IFN-γ為調節非直接毒殺;內在凋亡途徑Bcl-2抑制)。</p><p><b>自我耐受</b>:中樞(胸腺/骨髓:負選擇、AIRE);周邊(無能[缺共刺激]、Treg於發炎處抑制、Fas-AICD、抗原隔離)。口服耐受靠TGF-β/IL-10的調節T。</p><p><b>抗原呈現與細胞激素</b>:樹突細胞聯結先天與後天、唯一活化naïve T;專業APC大量表現MHC II呈現給CD4。IL-1/TNF促發炎、IL-12誘Th1、IL-4誘Th2、IL-10/TGF-β抑制、第一型干擾素抗病毒、IFN-γ活化巨噬。免疫抑制劑:類固醇(降細胞激素、誘內核酸酶致淋巴球凋亡)、rapamycin(FKBP-mTOR、相對保留Treg)、fingolimod(S1PR1扣留淋巴球)。</p>"},"M11過敏反應與自體免疫疾病":{"title":"過敏四型與自體免疫","html":"<p><b>Gell-Coombs 四型過敏：</b><b>I 型(IgE/肥大細胞、立即，過敏性休克/氣喘/蕁麻疹/異位)</b>；<b>II 型(IgG/IgM 對細胞抗原，溶血/ITP/Goodpasture/類天疱瘡/急性溶血輸血/葛瑞夫茲、重症肌無力)</b>；<b>III 型(免疫複合體沉積，SLE/血清病/鏈球菌後腎炎/PAN)</b>；<b>IV 型(T 細胞遲發，接觸性皮炎/結核菌素/移植排斥/第一型糖尿病)</b>。</p>\n<p><b>自體免疫與抗體：</b>SLE(<b>ANA 篩、anti-dsDNA/Sm 特異</b>)、類風濕(anti-CCP/RF)、Sjögren(anti-Ro/La)、硬皮(Scl-70/centromere)、肌炎(Jo-1)、混合結締組織(anti-U1RNP)、原發膽汁性膽管炎(AMA)、自體免疫肝炎(anti-SM)、GPA(c-ANCA/PR3)、MPA(p-ANCA)。</p>\n<p><b>耐受與機轉：</b>中樞耐受(胸腺/骨髓刪除自體反應)、週邊耐受(無能/調節 T)、分子相似(風濕熱)。<b>免疫缺乏</b>：X 性聯無丙球(Bruton)、CVID、DiGeorge(胸腺/T)、SCID、慢性肉芽腫(NADPH 氧化酶)、補體缺乏。</p>\n<p><b>★考點：</b>四型過敏配對(I IgE、II 細胞毒、III 免疫複合體、IV T 細胞遲發)；ANA 篩 SLE、anti-dsDNA/Sm 特異;c-ANCA=GPA;接觸性皮炎/結核菌素=IV 型;Bruton/DiGeorge/CGD。</p>"},"M12免疫缺損移植腫瘤免疫與疫苗":{"title":"免疫缺損‧移植‧腫瘤免疫‧疫苗","html":"<p><b>免疫缺損</b>:CGD(NADPH氧化酶、吞噬正常但無法殺菌、肉芽腫、catalase+菌);hyper-IgE(STAT3/Job);MHC I缺乏(TAP、CD8低)/MHC II缺乏(裸淋巴球、CD4低);Omenn(RAG);A-T(ATM、V(D)J/DNA修復);APECED(AIRE);共同淋巴前驅缺→後天免疫受最大影響。白血球缺陷可造血幹細胞移植。</p><p><b>移植</b>:超急性(數分鐘,預形成抗體/ABO,植體黑紫)、急性(數週,T細胞/抗體)、慢性(數月年,血管內膜增厚硬化缺血)。MHC I/II與次要組織抗原相關;MLR評估HLA-DR(class II)。GVHD由供者成熟T細胞致(去T:alemtuzumab[CD52]、ATG、MHC配對)。異種移植轉殖人類CD59防補體。</p><p><b>腫瘤免疫與療法</b>:腫瘤逃避=下調MHC I(被NK missing-self殺)、不表現抗原、分泌TGF-β/IL-10、招Treg/M2/MDSC、表現PD-L1。檢查點:CTLA-4結合APC的CD80/86、PD-1結合腫瘤PD-L1;阻斷(ipilimumab/pembrolizumab/nivolumab)喚醒T(黑色素瘤佳)。CAR-T(自體T、anti-CD19+4-1BB+CD3ζ,治ALL);標靶抗體trastuzumab(HER-2)、rituximab(CD20,經ADCC)、imatinib(Bcr-Abl)。疫苗:活減毒(VZV、OPV、流感鼻噴=健康2-49歲)禁免疫不全;結合型(多醣+蛋白載體→TD反應誘記憶,CD4辨識載體蛋白);無細胞百日咳。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^M(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='med2_micro_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
