iere ' s disease )", "B": "中樞性眩暈 ( central vertigo )", "C": "急性前庭神經炎 ( acute vestibular neuritis )", "D": "良性陣發性姿勢性眩暈 ( benign paroxysmal positional vertigo )"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "114_進階_家庭_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "眩暈腦神經與其他", "topic_code": "N6", "topic_num": 6, "correction_note": ""}, {"id": "114-通論-5分科-59", "roc_year": 114, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 59, "stem": "73 歲男性雙耳聽力逐漸減退已 5 年,在嘈雜環境中難以聽清他人對話。主訴無耳痛、耳漏 或眩暈,無明顯噪音暴露史或耳毒性藥物使用史。雙側鼓膜完整,韋伯測試 ( Weber ' s test ) 兩側聲音一致,林內測試 ( Rinne test ) 雙側空氣傳導時間皆大於骨傳導,雙側對稱性高頻 聽力喪失。下列何者為此病人最可能之診斷?", "options": {"A": "耳垢填塞 ( cerumen impaction )", "B": "老年性聽力喪失 ( presbycusis )", "C": "雙側耳硬化症 ( bilateral otosclerosis )", "D": "噪音性聽力喪失 ( noise - induced hearing loss )"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_通論_5分科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "眩暈腦神經與其他", "topic_code": "N6", "topic_num": 6, "correction_note": ""}, {"id": "114-進階-外科-64", "roc_year": 114, "subject_group": "進階專科護理", "branch": "外科", "q_num": 64, "stem": "有關成人良性腦瘤中,下列何種腫瘤最常見?", "options": {"A": "腦膜瘤 ( meningioma )", "B": "腦下垂體腺瘤 ( pituitary adenoma )", "C": "聽神經瘤 ( acoustic neuroma )", "D": "脂肪瘤 ( lipoma )"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "114_進階_外科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic": "眩暈腦神經與其他", "topic_code": "N6", "topic_num": 6, "correction_note": ""}], E={"105-TNPA-通論-13": {"quick": "理解性失語（Wernicke）＋同側偏盲＋對側感覺異常，與後／優勢半球供血區受損有關；B、C、D 皆錯，故 (A)。", "detail": {"background": "本題以「排除法」最穩。語言區：Broca 區（額葉，優勢半球）受損為「運動性（表達性）失語」——話說不出但能理解；Wernicke 區（顳葉）受損為「感覺性（理解性）失語」——「無法理解說話內容」。本例為「理解障礙」，故與 Broca 無關（B 錯）。同側偏盲（homonymous hemianopia）來自視放射／枕葉視覺路徑受損，與第三對腦神經（動眼神經，管眼瞼下垂、瞳孔、眼球運動）無關（D 錯）。動作協調（小腦功能）以「指鼻、跟膝脛」測試，Romberg test 測的是「本體感覺／平衡」而非協調（C 錯）。故唯一可選為 (A)（題目鍵定與後大腦動脈供血區—枕葉視覺、視丘感覺—受損相關）。", "options": {"A": "正確（官方鍵）。視覺（偏盲）＋感覺異常等與後／枕顳區供血受損相關。", "B": "錯。理解障礙是 Wernicke（感覺性失語），非 Broca（運動性失語）。", "C": "錯。協調用指鼻／跟膝脛；Romberg 測本體感覺平衡。", "D": "錯。同側偏盲來自視覺路徑，非第三對腦神經（動眼神經）。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "105-TNPA-內科-56": {"quick": "血糖<50 或>400 mg/dL 不適合 rtPA，故 (D)。", "detail": {"background": "急性缺血性中風靜脈血栓溶解劑（rtPA, alteplase）：劑量「0.9 mg/kg（最大 90 mg）」，10% 推注、其餘 60 分鐘滴注；黃金時間「症狀發作 4.5 小時內」。給藥前血壓須<185/110 mmHg（過高先降壓），治療中與後 24 小時維持<180/105。禁忌與排除：近期出血／手術、抗凝、血小板過低、INR 高、近期中風或頭部外傷、CT 已見出血或大範圍低密度（>1/3 MCA）、「血糖<50 或>400 mg/dL」（需先矯正）、NIHSS 過高或過低需個別評估。治療中若神經功能惡化應「停止滴注並做 CT 排除出血」。故正確為 (D)。", "options": {"A": "錯。劑量為 0.9 mg/kg、最大 90 mg。", "B": "錯。血壓門檻為>185/110 才暫不給／先降壓，非 160/110。", "C": "錯。治療中惡化應停藥並排除出血，非繼續滴注。", "D": "正確。血糖<50 或>400 mg/dL 不適合 rtPA。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "105-TNPA-外科-68": {"quick": "慢性硬腦膜下出血鑽孔引流後應「平躺」以利腦再擴張，「頭抬高 30–45 度」錯誤，故 (D)。", "detail": {"background": "慢性硬腦膜下出血（chronic SDH）好發老人（輕微頭部外傷後數週、橋靜脈滲血），常見漸進性偏癱、意識/認知改變。手術多採「顱骨鑽孔（Burr hole）引流」。術後照護關鍵：「保持『平躺（平臥）』並適度補充輸液（如維持水分、可稍多）」，目的是「促進受壓的腦組織再擴張、填補硬膜下腔、減少復發」——故「頭抬高 30–45 度（降腦壓）」反而不利腦再擴張，為錯誤敘述（D）。對照急性 ICP 升高才需頭抬高。A（Burr hole）、B（術後可稍多輸液）、C（平躺≥24 小時）皆正確。", "options": {"A": "正確。常採顱骨鑽孔引流。", "B": "正確。術後可適度補充輸液助腦再擴張。", "C": "正確。術後平躺以利腦再擴張。", "D": "錯誤（為答案）。應平躺，非頭抬高 30–45 度（後者不利腦再擴張）。"}, "sources": ["Harrison 21e（Chronic subdural hematoma）"]}}, "106-106a-通論-41": {"quick": "暫時性腦缺血（TIA）非「1 小時內回復」之定義，故敘述 (A) 錯。", "detail": {"background": "缺血性腦中風的時間窗：(A) TIA（短暫性腦缺血）傳統定義為「症狀<24 小時內完全回復」，現代採「組織學定義—無梗塞證據」（多數實際<1 小時，但定義非「1 小時內回復」）——故此敘述錯誤。(B) 靜脈血栓溶解劑（rtPA）黃金時間「3–4.5 小時」內——正確。(C) >80 歲或糖尿病等，rtPA 時間窗以「3 小時」為限（4.5 小時延長窗的排除條件）——正確。(D) 大血管阻塞者「動脈血栓移除術（thrombectomy）」黃金時間約「6 小時內（影像篩選下可延長至 24 小時）」——本題敘述 6–8 小時，方向正確。故錯誤者為 (A)。", "options": {"A": "錯誤（為答案）。TIA 非「1 小時內回復」之定義（傳統<24 小時／組織學無梗塞）。", "B": "正確。rtPA 黃金時間 3–4.5 小時。", "C": "正確。>80 歲/糖尿病以 3 小時為限。", "D": "正確。大血管阻塞動脈取栓黃金時間約 6（–24）小時。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "106-106a-內科-44": {"quick": "缺血性中風血壓 230/120 且不適合 tPA，應靜脈 labetalol 緩降血壓，故 (B)。", "detail": {"background": "急性缺血性中風的血壓處置：若「不打 tPA」，僅在「血壓>220/120 mmHg」時才緩降（前 24 小時降幅約 15%），以免過度降壓減少缺血半暗帶灌流；用藥首選「靜脈 labetalol 或 nicardipine」（可控、平緩），「不可用舌下含服 nifedipine」（血壓驟降危險）。本例 230/120、發作 4 小時（且血壓過高）→不適合 tPA，應先靜脈 labetalol 緩降（B）。mannitol 用於明顯腦水腫/ICP 升高，非首要。若要打 tPA 則須先把血壓降到<185/110。", "options": {"A": "錯。舌下 nifedipine 致血壓驟降，禁用於中風急性期。", "B": "正確。靜脈 labetalol 緩降血壓（>220/120 才降）。", "C": "錯。發作 4 小時且血壓過高，不適合 tPA。", "D": "錯。mannitol 用於明顯腦水腫，非此時首要。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "106-106a-內科-69": {"quick": "動脈粥狀硬化性缺血中風的初級預防不用 warfarin（用於心因性栓塞），故 (B) 最不適當。", "detail": {"background": "缺血性中風的「初級預防」針對動脈粥狀硬化危險因子：(A) 抗血小板（aspirin，在適當風險族群）、(C) 他汀（statin，降 LDL、穩定斑塊）、(D) 「血壓控制」（最重要的可改變因子），以及戒菸、控糖、運動。(B) 「warfarin（口服抗凝劑）」用於「心因性栓塞（如心房顫動）」的預防，「不」用於動脈粥狀硬化性中風的一般初級預防（抗凝對非心源性中風無益且增出血），故最不適當（答案 B）。", "options": {"A": "適當。抗血小板（aspirin）為初級預防之一。", "B": "最不適當（為答案）。warfarin 用於心因性栓塞（如 AF），非動脈粥狀硬化初級預防。", "C": "適當。statin 穩定斑塊、降 LDL。", "D": "適當。血壓控制為最重要的可改變危險因子。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "106-106a-內科-70": {"quick": "懷疑蜘蛛膜下腔出血（SAH），初期最適當檢查為「非顯影頭部電腦斷層」，故 (C)。", "detail": {"background": "突發「此生最劇烈頭痛（thunderclap）」要高度懷疑蜘蛛膜下腔出血（SAH，多為動脈瘤破裂）。初期首選「『非顯影』頭部電腦斷層（non-contrast CT）」——對急性出血敏感、快速。若 CT 陰性但臨床高度懷疑，再做「腰椎穿刺」看 CSF 是否有血或黃變（xanthochromia）。確認後以「腦血管攝影（CTA/DSA）」找出動脈瘤以治療（夾閉或栓塞）。腦電波（B）對 SAH 無診斷價值。故初期最適當為 (C)。", "options": {"A": "腦血管攝影用於找動脈瘤（確診後），非初期第一線。", "B": "腦電波對 SAH 無診斷價值。", "C": "正確。非顯影頭部 CT 為 SAH 初期首選檢查。", "D": "腰椎穿刺在 CT 陰性但高度懷疑時才做（看 xanthochromia）。"}, "sources": ["Harrison 21e（Subarachnoid hemorrhage）"]}}, "107-TNPA-內科-1": {"quick": "突發「快爆開」的劇烈頭痛＋嘔吐，應優先考量蜘蛛膜下腔出血，故 (D)。", "detail": {"background": "「突發、瞬間達到最高強度（thunderclap）、此生最痛」的頭痛合併噁心嘔吐、頸僵、畏光，是「蜘蛛膜下腔出血（SAH）」的警訊（最常為腦動脈瘤破裂），屬神經急症，須立即非顯影 CT（±腰椎穿刺）診斷。對照：三叉神經痛為臉部短暫電擊樣痛、偏頭痛為反覆搏動性中重度頭痛伴畏光（非突發爆裂）、鬱症非急性劇烈頭痛。漏診 SAH 後果嚴重（再出血、血管痙攣），故突發爆裂頭痛優先排除 SAH（D）。", "options": {"A": "三叉神經痛為臉部短暫電擊樣痛。", "B": "偏頭痛為反覆搏動性頭痛，非突發爆裂。", "C": "鬱症非急性劇烈頭痛。", "D": "正確。突發爆裂劇烈頭痛＋嘔吐優先考量 SAH。"}, "sources": ["Harrison 21e（SAH; thunderclap headache）"]}}, "107-TNPA-通論-41": {"quick": "中風後情緒不穩、人格改變最可能傷及「前大腦動脈」（額葉），故 (A)。", "detail": {"background": "各腦動脈供血區決定中風症狀：「前大腦動脈（ACA）」供應額葉內側與旁中央小葉，受損造成「對側下肢為主的無力、尿失禁，以及『額葉相關的情緒不穩、人格改變、判斷力與動機障礙（abulia）』」。「中大腦動脈（MCA）」供應大部分外側皮質→對側臉與上肢為主的偏癱、偏身感覺缺失、（優勢半球）失語、（非優勢）忽略。「後大腦動脈（PCA）」→對側同側偏盲、視覺障礙。「內頸動脈」可致大範圍 MCA±ACA 症狀。故情緒/人格改變最相關為 ACA（A，額葉）。", "options": {"A": "正確。前大腦動脈供應額葉內側→情緒不穩、人格改變。", "B": "中大腦動脈→對側臉/上肢偏癱、失語、忽略。", "C": "後大腦動脈→偏盲、視覺障礙。", "D": "內頸動脈→大範圍 MCA±ACA 症狀。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "107-TNPA-內科-66": {"quick": "rtPA 治療條件之一為「年齡>18 歲」，故 (A)。", "detail": {"background": "急性缺血性中風 rtPA 的主要適應/排除條件：(A) 「年齡≥18 歲」、臨床診斷缺血性中風且有可量測的神經學缺損——正確。(B) 時間窗為「症狀發作『4.5 小時』內」（非 6 小時）。(C) 「NIHSS 過高（如>25）」屬相對排除（出血風險高、大梗塞）——非適應條件。(D) CT 顯示「梗塞範圍>1/3 MCA 灌流區」屬排除條件（出血轉化風險高）。其他排除：BP>185/110、出血、抗凝、血糖<50/>400 等。故符合者為 (A)。", "options": {"A": "正確。年齡>18 歲為 rtPA 條件之一。", "B": "錯。時間窗為 4.5 小時內，非 6 小時。", "C": "錯。NIHSS>25 為相對排除（非適應）。", "D": "錯。>1/3 MCA 範圍為排除條件。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "107-TNPA-內科-67": {"quick": "45 歲以下成年人腦中風最常與「安非他命」等擬交感神經興奮劑相關，故 (D)。", "detail": {"background": "年輕（<45 歲）成年人腦中風的病因與年長者不同，除心源性、血管病變、凝血異常外，「擬交感神經興奮劑（安非他命 amphetamine、古柯鹼 cocaine、MDMA）」是重要可預防原因——其急性升高血壓、誘發血管痙攣與血管炎，可造成「缺血性或出血性中風」。選項中「安非他命（D）」最相關（古柯鹼亦是）。嗎啡、海洛因（鴉片類）以呼吸抑制為主、大麻與中風關聯較弱。故選 (D)。年輕中風應詳問藥物使用史並做毒物篩檢。", "options": {"A": "嗎啡（鴉片類）以呼吸抑制為主，非典型致中風物質。", "B": "大麻與中風關聯較弱。", "C": "海洛因（鴉片類）非典型致中風物質。", "D": "正確。安非他命（擬交感興奮劑）最常引發年輕人腦中風。"}, "sources": ["Harrison 21e（Stroke in the young; sympathomimetic drugs）"]}}, "108b-TNPA-通論-25": {"quick": "左側 MCA 中風時雙眼會「偏向病灶側（左）」，故「向右側」非典型，為 (C)。", "detail": {"background": "左側中大腦動脈（MCA）阻塞的典型表現：(A) 「對側（右側）肢體無力與感覺缺失」（臉/上肢為主）；(B) 「失語症」（左半球為語言優勢）；(D) 大梗塞可「意識改變」。眼球凝視：大腦皮質凝視中樞（額葉眼動區）受損時，雙眼「凝視『偏向病灶側』」（即向左）、「無法看向偏癱側（右）」——故「眼睛聚焦向右側（C）」與典型相反，為「不包括」之項目（答案 C）。記憶：皮質病灶「眼睛看向病灶、背離癱瘓側」。", "options": {"A": "典型。對側（右側）肢體無力。", "B": "典型。左半球 MCA→失語症。", "C": "非典型（為答案）。眼球偏向病灶側（左），非向右。", "D": "典型。大梗塞可致意識改變。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "108a-TNPA-外科-44": {"quick": "SAH 血管痙攣：①介質誘發、②70% 影像/35% 症狀、④好發 MCA/ACA；治療是「提高」灌流壓非降低，故 ①②④＝(A)。", "detail": {"background": "蜘蛛膜下腔出血（SAH）後「腦血管痙攣（vasospasm）」是延遲性神經惡化主因，多發於「出血後 4–14 天（高峰 7–10 天）」。① 機轉與血中分解產物釋放的 catecholamine、serotonin、prostaglandin 等血管收縮介質有關——正確。② 約「70% 血管攝影可見痙攣，但僅約 1/3 出現症狀性神經惡化」——正確。④ 好發於「中大腦動脈與前大腦動脈」——正確。③ 治療目標是「『提高』腦灌注壓（過去的 triple-H：高血容、高血壓、血液稀釋；現多維持正常血容＋誘導性高血壓）並給 nimodipine」，而非「降低灌注壓」——故③錯誤。正確為 ①②④＝(A)。", "options": {"A": "正確。①介質誘發＋②70%影像/35%症狀＋④好發 MCA/ACA。", "B": "含③（降灌注壓）錯誤。", "C": "含③錯誤。", "D": "含③錯誤。"}, "sources": ["Harrison 21e（SAH; cerebral vasospasm）"]}}, "108a-TNPA-通論-57": {"quick": "反覆群發、單側眼眶周圍劇痛＋同側流淚流鼻水＝叢集性頭痛，故 (B)。", "detail": {"background": "本例「短時間（20 分鐘）、單側眼眶周圍劇烈搏動痛、每天多次（7–8 次/天）、合併同側自律神經症狀（流淚、流鼻水、臉泛紅）、且呈『群發期—數週後自行緩解』」——是「叢集性頭痛（cluster headache）」的典型（好發年輕男性，發作密集成簇、伴同側副交感過度活化）。對照：偏頭痛為「中重度搏動痛、持續數小時至 3 天、單次發作、伴噁心畏光畏聲」；張力性頭痛為「雙側緊箍壓迫感、輕中度」；三叉神經痛為「臉部短暫電擊樣痛」。故選 (B)。急性發作用高流量氧氣與 sumatriptan，預防用 verapamil。", "options": {"A": "偏頭痛持續數小時至 3 天、單次發作，非密集成簇。", "B": "正確。短時密集、單側眼眶痛＋同側自律神經症狀＝叢集性頭痛。", "C": "張力性頭痛為雙側緊箍壓迫感。", "D": "三叉神經痛為臉部短暫電擊樣痛。"}, "sources": ["Harrison 21e（Cluster headache）"]}}, "108a-TNPA-內科-79": {"quick": "rtPA 最符合的條件是「中風症狀出現後<4.5 小時」，故 (B)。", "detail": {"background": "急性缺血性中風 rtPA：時間窗「症狀發作<4.5 小時」（B 正確）。排除/禁忌：(A) 血壓>185/110（須先降壓，否則不給）——故 A 不符；(C) CT 顯示出血或大範圍梗塞（>1/3）——排除；(D) 年齡須≥18 歲（>14 歲不符成人標準門檻）。其他排除含抗凝、近期手術出血、血糖極端等。故最符合者為 (B)。", "options": {"A": "錯。BP>185/110 須先降壓，否則不適合給藥。", "B": "正確。症狀發作<4.5 小時。", "C": "錯。CT 出血/大範圍梗塞為排除。", "D": "錯。年齡須≥18 歲。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "109-進階-外科-60": {"quick": "SAH（威廉氏環動脈瘤）應控制血壓不過高（SBP 約 120–150），故 (A)。", "detail": {"background": "威廉氏環（Circle of Willis）是腦動脈瘤好發處，破裂致 SAH（雷擊般劇烈頭痛、頸僵）。處置重點：(A) 「在動脈瘤未處理前控制血壓『不可太高』」（降低再出血，目標 SBP 約<140–160，題給 120–150 合理）——正確。(B) SAH 常見「『低血鈉』（腦耗鹽症候群 CSW 或 SIADH）」而非高血鈉——故 B 錯。(C) 應「維持正常血容（避免脫水）」以預防血管痙攣，「不」限水（限水反增痙攣/梗塞）——故 C 錯。(D) 血管痙攣「好發出血後 4–14 天（非前 3 天）」——故 D 錯。故正確為 (A)。動脈瘤需盡早夾閉或栓塞，並用 nimodipine 預防痙攣。", "options": {"A": "正確。動脈瘤處理前控制血壓不過高（SBP 約 120–150）。", "B": "錯。SAH 常見低血鈉（CSW/SIADH），非高血鈉。", "C": "錯。應維持正常血容，不限水（限水增痙攣風險）。", "D": "錯。血管痙攣好發出血後 4–14 天，非前 3 天。"}, "sources": ["Harrison 21e（SAH management）"]}}, "109-進階-外科-64": {"quick": "腦灌流壓（CPP）應避免低於 50 mmHg，故 (B)。", "detail": {"background": "顱內壓（ICP）監測與腦外傷重症照護目標：(A) ICP 應維持「<20–22 mmHg」（非<30）；(B) 「腦灌流壓 CPP＝MAP−ICP，應避免低於 50 mmHg」（一般目標 60–70）——正確；(C) 氧合應「維持 SaO2≥94%、避免低血氧」（非>80%）；(D) 用 mannitol 等降腦壓時須「維持足夠血壓（SBP 通常≥90–100、避免低血壓減少 CPP）」（非 80）。故正確為 (B)。處置含頭抬高 30 度、鎮靜止痛、控制 PaCO2、滲透治療（mannitol/高張鹽水）、必要時手術減壓。", "options": {"A": "錯。ICP 應<20–22 mmHg（非<30）。", "B": "正確。CPP 應避免低於 50 mmHg（目標 60–70）。", "C": "錯。SaO2 應≥94%（非>80%）。", "D": "錯。降腦壓時血壓應維持足夠（≥90），非 80。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e"]}}, "109-進階-其他-73": {"quick": "小心使用 propofol 維持麻醉可降低顱內壓，故 (D)。", "detail": {"background": "顱內出血併顱內壓升高的麻醉/重症處置：(D) 「propofol」降低腦代謝率與腦血流，有助「降低 ICP」（並可控制血壓），是神經麻醉常用——正確。(A) 「降低 PaCO2（輕度過度換氣至約 30–35 mmHg）會使腦血管收縮而降 ICP」；維持 PaCO2 40–45 屬正常/偏高，「不」降 ICP——故 A 錯。(B) 「ketamine」傳統上認為會「升高 ICP」（增腦血流），應謹慎/避免——故 B 錯。(C) 「吸入性麻醉劑>1.0–1.2 MAC」造成腦血管擴張、「升高 ICP」——故 C 錯。故降 ICP 者為 (D)。", "options": {"A": "錯。維持 PaCO2 40–45 不降 ICP；輕度過度換氣（降 PaCO2）才降 ICP。", "B": "錯。ketamine 傳統認為升高 ICP，應謹慎。", "C": "錯。吸入性麻醉>1.2 MAC 致腦血管擴張、升 ICP。", "D": "正確。propofol 降腦代謝與腦血流，有助降 ICP。"}, "sources": ["Harrison 21e（Management of elevated ICP）"]}}, "110-進階-外科-25": {"quick": "高血糖不是自發性蜘蛛膜下腔出血的常見原因，故 (A)。", "detail": {"background": "自發性（非外傷性）蜘蛛膜下腔出血（SAH）最常見原因是「顱內動脈瘤破裂（約 80%）」，其次「顱內動靜脈畸形（AVM）破裂」、腫瘤出血、凝血異常、血管炎等。「高血糖（A）」並非 SAH 的原因（高血糖是中風後常見的併發/預後因子，但非致病原因）。故最不常見/非原因者為 (A)。診斷靠非顯影 CT＋必要時腰椎穿刺，確認後血管攝影找出血源處理。", "options": {"A": "正確（最不常見/非原因）。高血糖非 SAH 致病原因。", "B": "腫瘤出血可致 SAH。", "C": "顱內動脈瘤破裂為 SAH 最常見原因。", "D": "顱內動靜脈畸形破裂為 SAH 原因之一。"}, "sources": ["Harrison 21e（SAH; etiology）"]}}, "110-進階-外科-49": {"quick": "預防 SAH 後血管痙攣應維持足夠體液量並給鈣離子阻斷劑（nimodipine），故 ③④＝(C)。", "detail": {"background": "蜘蛛膜下腔出血（SAH）後預防/處理「腦血管痙攣」的原則：③「維持足夠體液量（正常血容，避免脫水/低血容）」——正確（過去 triple-H 之一，現強調維持正常血容＋必要時誘導性高血壓）；④「給予鈣離子阻斷劑 nimodipine」——是唯一證實能改善 SAH 預後、減少痙攣相關缺血的藥物，正確。① 「維持較高血比容」不正確（過度濃稠不利微循環；過去主張血液稀釋）；② 「維持較低動脈壓」不正確（應維持足夠/偏高灌注壓以對抗痙攣）。故 ③④＝(C)。", "options": {"A": "含①（高血比容）②（低血壓）皆不利。", "B": "含②（低血壓）不利。", "C": "正確。③維持足夠體液量＋④nimodipine。", "D": "含①（高血比容）不利。"}, "sources": ["Harrison 21e（SAH; nimodipine, vasospasm prevention）"]}}, "110-進階-內科-61": {"quick": "缺血性中風血壓 230/130 且不適合 tPA（6 小時），應靜脈 labetalol 緩降，故 (B)。", "detail": {"background": "本例右側偏癱、發作「6 小時」、MRI 缺血性中風、血壓 230/130。已超過 tPA 時間窗（4.5 小時），不適合 tPA（A 錯）。缺血性中風不打 tPA 者，血壓「>220/120」才緩降（避免過降減少半暗帶灌流），首選「靜脈 labetalol/nicardipine」（B 正確）。不可用「舌下 nifedipine」（驟降危險，D 錯）。mannitol 用於明顯腦水腫/ICP 升高（C 非首要）。故選 (B)。並評估是否符合大血管阻塞之動脈取栓（影像篩選下可至 24 小時）。", "options": {"A": "錯。發作 6 小時超過 tPA 窗。", "B": "正確。>220/120 以靜脈 labetalol 緩降。", "C": "錯。mannitol 用於明顯腦水腫，非首要。", "D": "錯。舌下 nifedipine 致驟降，禁用。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "111-進階-外科-51": {"quick": "顱內出血併顱內壓升高之重症照護，本題鍵定 (C)（glycerol 滲透治療之敘述為錯誤）。", "detail": {"background": "顱內大出血併顱內壓升高（IICP）的重症處置：(A) 給予鎮靜止痛避免躁動（躁動增 ICP）——正確；(B) 控制體溫、積極退燒（發燒增腦代謝與 ICP；目標性體溫管理）——大致正確；(D) 必要時「外科減壓手術」降腦壓——正確。本題官方答案為 (C)——「glycerol 1.0–1.5 g/kg IV drip」之敘述被列為錯誤：臨床急性 IICP 的滲透治療以「mannitol 或高張（高濃度）生理食鹽水」為主力，glycerol 並非急性靜脈降腦壓的標準藥（其角色與劑量/途徑不如 mannitol/高張鹽水），故列為不正確。記憶重點：急性 IICP 滲透治療＝mannitol／高張鹽水；頭抬高 30 度、鎮靜、控 PaCO2、退燒、必要時手術。", "options": {"A": "正確。鎮靜避免躁動以降 ICP。", "B": "大致正確。控制體溫、避免發燒。", "C": "錯誤（為答案）。急性 IICP 滲透治療以 mannitol／高張鹽水為主，glycerol 此用法非標準。", "D": "正確。必要時外科減壓降腦壓。"}, "sources": ["Harrison 21e（Management of elevated ICP; osmotherapy）"]}}, "112-進階-外科-61": {"quick": "SAH 血管痙攣多在出血後 7–10 天、約 70% 發生；故 ①④＝(D)。", "detail": {"background": "動脈瘤破裂 SAH 後「腦血管痙攣」：① 「大多發生在出血後 7–10 天內」（高峰，整體 4–14 天）——正確；④ 「約 70% 的 SAH 在血管攝影上會出現痙攣」（其中約 1/3 有症狀）——正確。② 「維持收縮壓<100 mmHg」不正確（應維持足夠/誘導性偏高血壓以對抗痙攣）；③ 「治療目標為『降低』大腦灌注壓」不正確（應『提高』灌注壓）。故正確為 ①④＝(D)。預防/治療：nimodipine、維持正常血容與適當血壓。", "options": {"A": "含②（低血壓）錯誤。", "B": "含③（降灌注壓）錯誤。", "C": "含②③皆錯誤。", "D": "正確。①出血後 7–10 天＋④約 70% 發生。"}, "sources": ["Harrison 21e（SAH; vasospasm）"]}}, "112-進階-內科-64": {"quick": "Warfarin 相關顱內出血可輸維生素 K 或 FFP（並 PCC）逆轉，故 (A)。", "detail": {"background": "出血性中風（顱內出血）治療：(A) 「warfarin 相關顱內出血」應立即逆轉抗凝——給「維生素 K＋新鮮冷凍血漿（FFP）或更快的『凝血酶原複合體濃縮物（PCC）』」——正確。(B) 「並非所有出血性中風都需預防性抗癲癇藥」（不常規預防，只在有癲癇發作時用）——故 B 錯。(C) 「重組凝血因子 VIIa」未被核准/未證實改善出血性中風預後（反增血栓）——故 C 錯。(D) 急性顱內出血的血壓目標多為「收縮壓降至約 140 mmHg（INTERACT2/ATACH）」，「<160」之絕對化敘述不夠精確——故 D 較不適當。故正確為 (A)。", "options": {"A": "正確。warfarin 相關 ICH 給維生素 K＋FFP（／PCC）逆轉。", "B": "錯。非所有出血性中風都需預防性抗癲癇藥。", "C": "錯。rFVIIa 未證實改善預後、未核准用於 ICH。", "D": "血壓目標多為 SBP≈140；「<160」敘述不夠精確。"}, "sources": ["Harrison 21e（Intracerebral hemorrhage）；INTERACT2"]}}, "112-通論-其他-72": {"quick": "單側頭痛在缺血性中風「較不常見」（頭痛較多見於出血性），故 (A)。", "detail": {"background": "缺血性腦中風的急性症狀以「突發的『局部神經學缺損』」為主：(B) 嘴角歪斜（顏面下垂）、(C) 單側肢體無力、(D) 言語不清（dysarthria）／失語，以及單側麻木、視野缺損、步態不穩、眩暈等（BE-FAST）。而「頭痛」在『缺血性』中風「較不常見」（若有明顯劇烈頭痛，較指向『出血性』中風或 SAH）。故「單側頭痛（A）」為缺血性中風較不常見的症狀（答案）。衛教民眾以 FAST/BE-FAST 辨識中風並把握黃金時間就醫。", "options": {"A": "正確（較不常見）。頭痛在缺血性中風較少；劇烈頭痛較指向出血。", "B": "常見。顏面下垂（嘴角歪斜）。", "C": "常見。單側肢體無力。", "D": "常見。言語發音不清。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "113-進階-內科-39": {"quick": "大範圍 MCA 梗塞併惡性腦水腫，應照會神經外科行減壓顱骨切開術，故 (B)。", "detail": {"background": "大範圍中大腦動脈（MCA）梗塞可發展為「惡性腦水腫（malignant MCA infarction）」，腦壓上升、中線位移、有腦疝致死風險（尤年輕病人）。當出現進展性腦壓上升/意識惡化，最有實證能降低死亡率的處置是「『減壓性顱骨切開術（decompressive craniectomy）』」（在發病 48 小時內，年齡<60 效益最佳）。對照：mannitol（A）只能「暫時」降腦壓、為過渡；高劑量類固醇（C）對缺血性腦水腫「無效且有害」；腰椎穿刺（D）在腦壓高/中線位移時「禁忌」（誘發腦疝）。故選 (B)。", "options": {"A": "mannitol 僅暫時降腦壓，非根本處置。", "B": "正確。惡性 MCA 梗塞腦水腫→減壓顱骨切開術降死亡率。", "C": "類固醇對缺血性腦水腫無效且有害。", "D": "腦壓高時腰椎穿刺禁忌（誘發腦疝）。"}, "sources": ["Harrison 21e（Malignant MCA infarction; decompressive craniectomy）"]}}, "113-進階-內科-45": {"quick": "80 歲、NIHSS 僅 4 分（輕微缺損）最不適合動脈取栓，故 (A)。", "detail": {"background": "顱內動脈「血栓移除術（thrombectomy）」適用於「大血管阻塞（如頸內動脈、MCA M1）且有『顯著神經學缺損』」者，並在時間窗內（6 小時，影像篩選下可至 24 小時且有可挽救的缺血半暗帶 penumbra）。(A) 「NIHSS 僅 4 分」代表缺損輕微，取栓的效益未明確、風險可能大於利益——「最不適合」。(B) 發病 1 小時、NIHSS 22（重度）——適合。(C) 5 小時但影像有明確 penumbra——適合（延長窗）。(D) CTA 顯示頸內動脈近端阻塞且無法靜脈溶栓——適合取栓。故最不適合者為 (A)。", "options": {"A": "正確（最不適合）。NIHSS 僅 4 分（輕微缺損），取栓效益未明。", "B": "適合。重度缺損（NIHSS 22）、發病 1 小時。", "C": "適合。有明確可挽救半暗帶（penumbra）。", "D": "適合。大血管近端阻塞且無法靜脈溶栓。"}, "sources": ["2018 AHA/ASA Endovascular Thrombectomy（DAWN/DEFUSE-3）"]}}, "113-通論-5分科-55": {"quick": "已用血栓溶解劑者血壓 170/100 在容許範圍，不需降壓，故 (B) 較不適當。", "detail": {"background": "缺血性中風血壓處置依「是否用 tPA」分流：(1) 「用 tPA 者」治療後 24 小時血壓須維持「<180/105 mmHg」——超過才降壓。故 (A)「用 tPA、200/110→降壓」適當；(B)「用 tPA、170/100→降壓」較不適當（170/100<180/105，在容許範圍，不需降壓，過度降壓反不利）——為答案。(2) 「未用 tPA 者」只在「>220/120」才緩降。故 (C)「未用 tPA、210/110→觀察」適當（<220/120）；(D)「未用 tPA、230/130→降壓」適當（>220/120）。故較不適當者為 (B)。", "options": {"A": "適當。用 tPA、200/110（>180/105）→降壓。", "B": "較不適當（為答案）。用 tPA、170/100（<180/105）不需降壓。", "C": "適當。未用 tPA、210/110（<220/120）→觀察。", "D": "適當。未用 tPA、230/130（>220/120）→降壓。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "113-進階-外科-60": {"quick": "顱內壓升高時不應為了血壓 140/45 而「降血壓」（會降腦灌流壓），故敘述 (D) 錯。", "detail": {"background": "腦出血併顱內壓（ICP）升高處置：(A) 「外科手術減壓」對適應症者是最直接有效的降腦壓手段——正確。(B) 「心跳慢、血壓高、呼吸不規則（Cushing 三聯）」暗示「腦幹受壓」——正確。(C) 「mannitol 效果不佳時可改用高濃度（高張）生理食鹽水」——正確。(D) 「血壓 140/45、ICP 25」時，腦灌流壓 CPP＝MAP−ICP，若再「降血壓」會使 CPP 不足、加重缺血——故「應降低血壓」錯誤（答案）。記憶：高 ICP 時要維持足夠 MAP 以保 CPP（60–70），不可盲目降壓。", "options": {"A": "正確。外科減壓為最直接有效降腦壓手段。", "B": "正確。Cushing 三聯暗示腦幹受壓。", "C": "正確。mannitol 不佳可改高張鹽水。", "D": "錯誤（為答案）。高 ICP 時降血壓會降 CPP、加重缺血。"}, "sources": ["Harrison 21e（ICP management; CPP）"]}}, "113-通論-5分科-61": {"quick": "急性橋腦出血最常見「深度昏迷合併四肢癱瘓」，故 (A)。", "detail": {"background": "橋腦（pons）位於腦幹，是上行下行神經傳導與意識網狀系統的要道。「急性橋腦出血」病情兇險，最常見「快速進入『深度昏迷』、『四肢癱瘓（quadriplegia）』、針點瞳孔（pinpoint pupils）、高熱、去大腦姿勢、呼吸異常」，死亡率高。對照：同側偏盲（B）為枕葉/視路病灶、平衡差（C）為小腦病灶、兩側瞳孔不等大（D）較見於天幕疝（單側動眼神經受壓）。故橋腦出血最常見為 (A)。", "options": {"A": "正確。橋腦出血→深度昏迷＋四肢癱瘓（＋針點瞳孔）。", "B": "同側偏盲為枕葉/視路病灶。", "C": "平衡差為小腦病灶。", "D": "瞳孔不等大較見於天幕疝（動眼神經受壓）。"}, "sources": ["Harrison 21e（Pontine hemorrhage）"]}}, "113-通論-5分科-62": {"quick": "偏頭痛的病生理為腦幹/下視丘單胺類感覺控制系統功能障礙（三叉血管系統活化），故 (C)。", "detail": {"background": "偏頭痛（migraine）的現代病生理觀：並非單純血管擴張，而是「中樞神經元的興奮性異常與『腦幹/下視丘的單胺類（serotonin 等）感覺調控系統功能障礙』，活化『三叉血管系統（trigeminovascular system）』釋放 CGRP 等神經肽，造成神經源性發炎與痛覺敏化」；皮質擴散性抑制（CSD）與先兆有關。故最符合者為 (C)。對照：(A) 頭頸肌肉廣泛收縮為「張力性頭痛」機轉；(B) 單純「血管擴張」是過時的血管理論；(D) 顏面神經受壓為「半面痙攣/三叉神經痛」概念。新藥 CGRP 拮抗劑（gepants、抗體）即據此機轉。", "options": {"A": "肌肉收縮為張力性頭痛機轉。", "B": "單純血管擴張為過時的血管理論。", "C": "正確。腦幹/下視丘單胺類感覺控制障礙（三叉血管系統活化）。", "D": "顏面/三叉神經壓迫為其他疾病機轉。"}, "sources": ["Harrison 21e（Migraine pathophysiology; trigeminovascular system）"]}}, "113-通論-家庭-71": {"quick": "單側頭痛在缺血性中風「最不常見」，故 (A)。", "detail": {"background": "同 112-通論-其他-72：缺血性腦中風以突發「局部神經學缺損」為主（顏面下垂、單側肢體無力、言語不清、感覺/視野缺損、步態不穩），而「頭痛」較不常見（明顯劇烈頭痛較指向出血性中風/SAH）。故「單側頭痛（A）」為最不常見之急性症狀。辨識用 BE-FAST（Balance、Eyes、Face、Arm、Speech、Time），把握黃金時間（4.5 小時 tPA）。", "options": {"A": "正確（最不常見）。缺血性中風頭痛較少；劇烈頭痛較指向出血。", "B": "常見。顏面下垂（嘴角歪斜）。", "C": "常見。單側肢體無力。", "D": "常見。言語發音不清。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "114-進階-家庭-34": {"quick": "單側搏動性頭痛＋噁心、畏光、畏聲、影響生活＝偏頭痛，故 (A)。", "detail": {"background": "偏頭痛（migraine）典型：「單側、搏動性（throbbing）、中重度、持續 4–72 小時、伴噁心嘔吐、畏光（photophobia）、畏聲（phonophobia）、活動加重、影響日常」，可有先兆。本例完全符合（A）。對照：張力性頭痛為「雙側、緊箍壓迫、輕中度、無噁心畏光」；叢集性頭痛為「單側眼眶極短劇痛、密集成簇、伴同側自律神經症狀」；顳動脈炎為「>50 歲、顳部痛、下頜跛行、ESR 高、視力風險」。故選 (A)。急性治療用 NSAID/triptan，頻繁者預防（β-blocker、topiramate、CGRP 拮抗劑）。", "options": {"A": "正確。單側搏動痛＋噁心畏光畏聲＝偏頭痛。", "B": "張力性頭痛為雙側緊箍壓迫、無畏光畏聲。", "C": "叢集性頭痛為極短劇痛密集成簇＋同側自律神經症狀。", "D": "顳動脈炎為>50 歲顳部痛、下頜跛行、ESR 高。"}, "sources": ["Harrison 21e（Migraine）"]}}, "114-進階-外科-62": {"quick": "腦疝（鉤回疝）最常見「同側瞳孔散大、對光反射消失」，故 (B)。", "detail": {"background": "顱內出血致顱內壓升高發生「腦疝脫（herniation）」時，最典型的是「鉤回疝（uncal herniation）」壓迫『同側動眼神經（CN III）』，造成「『同側』瞳孔散大（放大）且對光反射消失（blown pupil）」，並可進展為意識下降、對側偏癱（壓迫大腦腳）。故最常見瞳孔變化為 (B)。對照：橋腦病灶→雙側針點瞳孔（A 之縮小但機轉不同）；其餘選項方向不符。出現單側瞳孔散大固定是腦疝的緊急警訊，需立即降腦壓（過度換氣、滲透治療）並處理病因/手術。", "options": {"A": "雙側針點瞳孔見於橋腦病灶，非鉤回疝。", "B": "正確。鉤回疝壓迫同側 CN III→同側瞳孔散大、對光反射消失。", "C": "同側瞳孔縮小非腦疝典型（Horner 才縮小）。", "D": "對側瞳孔散大非典型（壓迫為同側）。"}, "sources": ["Harrison 21e（Brain herniation; uncal herniation, CN III）"]}}, "114-進階-外科-63": {"quick": "GCS 3（深度昏迷、極差等級）的 SAH 不必然「24 小時內立即手術」，故敘述 (D) 較不適當。", "detail": {"background": "自發性蜘蛛膜下腔出血（SAH）：(A) 最常見「動脈瘤破裂」——正確；(B) 也可見「動靜脈畸形破裂」——正確；(C) 主要症狀「劇烈頭痛、頸僵、畏光、意識不清」——正確。(D) 病人「深度昏迷（GCS 3，Hunt-Hess/WFNS 最差等級）」者預後極差，臨床上「並非一律必須在 24 小時內立即手術」——而是先「穩定生命徵象、處理顱內壓、評估神經學是否可恢復」後再決定是否介入（過差等級手術效益有限）；故「必須 24 小時內立即手術」之絕對化敘述較不適當（答案 D）。動脈瘤仍應盡早（多 24–72 小時內）夾閉/栓塞以防再出血，但須依等級與整體狀況個別判斷。", "options": {"A": "正確。常見於動脈瘤破裂。", "B": "正確。也可見於動靜脈畸形破裂。", "C": "正確。主要症狀為劇烈頭痛、頸僵、畏光、意識不清。", "D": "較不適當（為答案）。GCS 3 預後極差，非一律 24 小時內立即手術，須先穩定評估。"}, "sources": ["Harrison 21e（SAH; Hunt-Hess grading）"]}}, "114-通論-5分科-71": {"quick": "左腦中風→右側症狀：臉部不對稱（右）與舌偏，本題鍵 ③④＝(D)。", "detail": {"background": "大腦半球控制「對側」身體：「左腦」缺血性中風→「右側」肢體無力、右側顏面下垂、右側同向性偏盲，以及（優勢半球）失語。逐項：① 「左手左腳肌力下降」錯（應為『右側』）；② 「右眼視力模糊」不精確（應為『右側同向性偏盲』—雙眼右半視野缺損，非單一右眼）；③ 「臉部表情不對稱（右側下垂）」——正確；④ 伸舌時「舌下神經」受中樞影響、舌頭偏向患側方向——本題鍵定正確。官方答案為 ③④＝(D)。重點記憶：左腦病灶→右側顏面與肢體症狀＋（多為）失語。", "options": {"A": "14——①「左側無力」錯（應右側）。", "B": "23——②「右眼視力模糊」不精確（應右側偏盲）。", "C": "12——含①②皆不精確/錯。", "D": "正確（官方鍵）。③臉部不對稱＋④舌偏（左腦→右側症狀）。"}, "sources": ["Harrison 21e（Cerebrovascular diseases）；2019 AHA/ASA Acute Ischemic Stroke Guideline"]}}, "114-進階-家庭-75": {"quick": "兩週漸進性意識/步態變化（抗凝老人）最不可能是「硬腦膜外出血」（那是急性），故 (B)。", "detail": {"background": "本例 72 歲、服用抗凝劑、「兩週『漸進性』頭暈、反應遲鈍、嗜睡、步態不穩、無嘔吐發燒抽搐」。鑑別此「亞急性—慢性、漸進」型態：(D) 「慢性硬腦膜下腔血腫（chronic SDH）」最符合（老人＋抗凝＋輕微外傷後數週漸進，是『大模仿者』）；(A) 「低血鈉」與 (C) 「甲狀腺機能低下」也可造成漸進性意識/認知/步態變化——皆「可能」。(B) 「硬腦膜外出血（epidural hematoma）」是「『急性』」病程（典型動脈性出血、清醒期後快速惡化於數小時內），與「兩週漸進」不符，故「最不可能」（答案 B）。", "options": {"A": "可能。低血鈉可致漸進性意識/步態變化。", "B": "最不可能（為答案）。硬腦膜外出血為急性病程，與兩週漸進不符。", "C": "可能。甲狀腺機能低下可致漸進性認知/步態問題。", "D": "可能。慢性硬腦膜下血腫（老人＋抗凝）為典型漸進性表現。"}, "sources": ["Harrison 21e（Subdural vs epidural hematoma）"]}}, "114-進階-家庭-79": {"quick": "中央型（中風）顏面無力「額頭不受影響、雙眉仍可對稱上抬」，故 (B)。", "detail": {"background": "顏面神經麻痺的「中央型 vs 周邊型」鑑別關鍵在「額頭（上半臉）」：(1) 「中央型（核上性，如中風）」——因上半臉受『雙側』大腦皮質支配，故「『額頭不受影響』、雙側眉毛仍可對稱上抬、可閉眼」，僅「對側『下半臉』癱瘓（鼻唇溝變淺、嘴角下垂）」（B 正確）。(2) 「周邊型（如貝爾氏麻痺）」——同側「『整側臉』（含額頭）都癱瘓、不能皺眉抬眉、眼瞼閉合不全」，可伴聽覺過敏、味覺改變、流淚異常（A、C、D 描述）。故支持中央型（中風）的是 (B)。", "options": {"A": "周邊型（整側臉含額頭癱瘓、不能皺眉）。", "B": "正確。中央型（中風）額頭不受影響、雙眉可對稱上抬，僅下半臉癱。", "C": "周邊型（聽覺過敏、味覺改變、眼瞼閉合不全）。", "D": "周邊型（額頭癱、不能抬眉、眼瞼閉合不全）。"}, "sources": ["Harrison 21e（Central vs peripheral facial palsy）"]}}, "105-TNPA-外科-73": {"quick": "顱內壓（ICP）最好維持<20 mmHg，故 (C)。", "detail": {"background": "重度腦傷（GCS<8）的 ICP 監測與重症照護目標：ICP 維持「<20–22 mmHg」（C 正確）；腦灌流壓 CPP＝MAP−ICP「避免<50–60 mmHg（目標 60–70）」（故 B「避免<40」錯）；氧合「SaO2≥94%、避免低血氧」（故 A「>80%」錯）；用 mannitol 降腦壓時須「維持足夠血壓（SBP≥90–100）以保 CPP」（故 D「>80」錯）。其他措施：頭抬高 30 度、鎮靜止痛、控 PaCO2 35–40、滲透治療、必要時引流 CSF/手術。", "options": {"A": "錯。SaO2 應≥94%，非>80%。", "B": "錯。CPP 避免<50–60，非<40。", "C": "正確。ICP 維持<20 mmHg。", "D": "錯。用 mannitol 時 SBP 應≥90，非>80。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "106-106a-外科-70": {"quick": "ICP 升高時可引流 CSF 降腦壓，以每小時≤20 mL 為原則，故 (A)。", "detail": {"background": "腦室內 ICP 監測器兼具「引流腦脊髓液（CSF）」降腦壓功能：ICP 升高時可引流 CSF，但須「緩慢、限量（每小時不超過約 20 mL）」避免過度引流致腦塌陷/出血（A 正確）。CPP 避免<50–60（B「<40」錯）；ICP 目標<20–22（C「<25」錯）；用 mannitol 維持 SBP≥90（D「>80」錯）。降腦壓綜合措施：頭抬高 30 度、鎮靜、控 PaCO2、滲透治療、CSF 引流、必要時手術減壓。", "options": {"A": "正確。引流 CSF 降腦壓，每小時≤20 mL 為原則。", "B": "錯。CPP 避免<50–60，非<40。", "C": "錯。ICP 目標<20–22，非<25。", "D": "錯。用 mannitol 時 SBP 應≥90。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "106-106c-內科-71": {"quick": "carbamazepine 與 HLA-B*1502 相關之 SJS/多形性紅斑，台灣健保給付用藥前基因檢測，故 (A)。", "detail": {"background": "抗癲癇藥的嚴重皮膚不良反應（SCAR：Stevens-Johnson 症候群 SJS／毒性表皮壞死溶解 TEN／多形性紅斑）與基因有關：「carbamazepine」誘發的 SJS/TEN 與「HLA-B*1502」（漢人/亞洲人較多帶有）高度相關，故台灣健保「給付『使用 carbamazepine 前』先做 HLA-B*1502 基因檢測」，陽性者改用其他藥。phenytoin、lamotrigine 也與 B*1502 有些關聯但以 carbamazepine 最明確；valproate 風險低。（另 allopurinol 與 HLA-B*5801、abacavir 與 HLA-B*5701。）故答案為 (A)。", "options": {"A": "正確。carbamazepine—HLA-B*1502—SJS，健保給付用藥前基因檢測。", "B": "phenytoin 風險次之，非健保檢測之代表藥。", "C": "topiramate 非此關聯。", "D": "valproate SJS 風險低。"}, "sources": ["Harrison 21e；台灣健保 HLA-B*1502 給付規定"]}}, "107-TNPA-通論-43": {"quick": "Babinski 陽性代表上運動神經元（皮質脊髓徑）受損，非腦膜炎，故敘述 (C) 為非。", "detail": {"background": "意識不清病人的初步評估：(A) 「驗血糖」是必要且優先步驟（低血糖可迅速矯正且為可逆病因）——正確。(B) 「針狀（縮小）瞳孔」可見於「鴉片（嗎啡）中毒或有機磷中毒（膽鹼性）」、橋腦病灶——正確。(D) 「血壓高＋心跳慢（＋呼吸不規則＝Cushing 三聯）」提示「顱內壓增高」——正確。(C) 「Babinski 徵候陽性（足底刺激大腳趾背屈）」代表「上運動神經元／皮質脊髓徑受損」，並非「腦膜炎」的指標（腦膜炎看頸僵、Kernig、Brudzinski）——故為「非」（答案 C）。", "options": {"A": "正確。驗血糖為必要步驟（排除低血糖）。", "B": "正確。針狀瞳孔見於鴉片/有機磷中毒。", "C": "為非（答案）。Babinski 陽性代表上運動神經元受損，非腦膜炎。", "D": "正確。血壓高＋心跳慢提示顱內壓增高。"}, "sources": ["Harrison 21e（Approach to coma）"]}}, "107-TNPA-外科-68": {"quick": "依加拿大 CT 頭部準則，「僅嘔吐一次」最不需要 CT（標準為嘔吐≥2 次），故 (A)。", "detail": {"background": "加拿大輕度頭部外傷 CT 準則（Canadian CT Head Rule，適用 GCS 13–15）的「高風險」（需 CT）：受傷 2 小時後 GCS<15、疑開放性/凹陷性顱骨骨折、顱底骨折徵象、「嘔吐≥2 次」、「年齡≥65 歲」；「中風險」：受傷前>30 分鐘失憶、危險受傷機轉（如行人被撞、彈出車外、「從≥3 英尺/5 階樓梯跌落」）。逐項：(B) 年齡 68（≥65）→需 CT；(C) 2 小時後 GCS 仍 E3V5M6=14（<15）→需 CT；(D) 從 6 階樓梯跌落（危險機轉）→需 CT；(A) 「嘔吐『一次』」未達「≥2 次」門檻 →「最不需要 CT」（答案 A）。", "options": {"A": "正確（最不需要）。準則要求嘔吐≥2 次，僅一次不符。", "B": "年齡≥65（68 歲）為高風險，需 CT。", "C": "2 小時後 GCS<15（14 分）為高風險，需 CT。", "D": "從≥5 階樓梯跌落為危險機轉，需 CT。"}, "sources": ["Canadian CT Head Rule"]}}, "108b-TNPA-通論-20": {"quick": "嚴重腦傷目前僅建議維持 O2 saturation 高於 90%，故 (C)。", "detail": {"background": "創傷性腦傷（TBI）：(A) 「即使疑似藥物中毒導致意識障礙，仍應做頭部 CT」排除合併之外傷性出血（不可因藥物中毒就略過）——故 A 錯。(B) 「CT 無發現『不能』完全排除頭部外傷」——如「瀰漫性軸索損傷（DAI）」早期 CT 可正常，需 MRI——故 B 錯。(C) 嚴重腦傷的氧合目標是「維持 O2 saturation>90%（避免低血氧之繼發傷害）」——正確。(D) CPP 目標約「60–70 mmHg」，「積極提升>70」會增加 ARDS 等風險、不建議——故 D 錯。故正確為 (C)。TBI 處置核心是「避免繼發性傷害（低血壓、低血氧、高/低 PaCO2、發燒、抽搐）」。", "options": {"A": "錯。疑藥物中毒仍應做 CT 排除合併外傷出血。", "B": "錯。CT 正常不能排除（如 DAI 需 MRI）。", "C": "正確。嚴重腦傷維持 O2 sat>90%。", "D": "錯。CPP 目標 60–70；積極>70 增 ARDS 風險。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "108a-TNPA-通論-42": {"quick": "給 lorazepam 不需「預防性插管」，故敘述 (B) 錯。", "detail": {"background": "癲癇重積（status epilepticus，發作>5 分鐘或反覆未恢復）緊急處置：第一線「benzodiazepine（lorazepam IV／midazolam IM／diazepam）」——「不需預防性插管」才給藥（直接給藥並『監測呼吸道』，必要時才插管），故 (B)「給 lorazepam 前要預防性插管」錯誤（答案）。(A) 第二線 phenytoin/fosphenytoin 須「注意心臟疾病」（心律不整、低血壓，輸注勿過快）——正確。(C) 須「排除非癲癇病因（低血糖、低血鈉/鈣、中毒、感染）」——正確。(D) 長時間用 propofol 須「監測乳酸，避免 propofol infusion syndrome」——正確。處置順序：ABC＋驗血糖→benzodiazepine→phenytoin/valproate/levetiracetam→難治性用麻醉藥。", "options": {"A": "正確。phenytoin 須注意心臟疾病。", "B": "錯誤（為答案）。給 lorazepam 不需預防性插管（給藥並監測呼吸道）。", "C": "正確。須排除低血糖等非癲癇病因。", "D": "正確。長時間 propofol 須監測乳酸（PRIS）。"}, "sources": ["Harrison 21e（Seizures and epilepsy）"]}}, "108b-TNPA-內科-64": {"quick": "酒癮病人在給糖分前應先給維他命 B1（thiamine），預防 Wernicke 腦病變，故 (A)。", "detail": {"background": "意識改變病人處置注意事項：(A) 「酒癮（或營養不良）病人，在給葡萄糖『之前』應先給維他命 B1（thiamine）」——因葡萄糖會耗用 thiamine，先給糖可能誘發/惡化「Wernicke 腦病變」（眼肌麻痺、共濟失調、意識混亂）——正確。(B) naloxone 用於「鴉片過量」，其特徵是「『針點瞳孔』＋呼吸抑制」，題目寫「瞳孔擴大」不符鴉片——故 B 錯。(C) 三環抗憂鬱劑（TCA）過量「不可用 flumazenil」（flumazenil 是 benzodiazepine 拮抗劑，用於 TCA/混合過量會誘發癲癇）——故 C 錯。(D) 急性譫妄「不建議高劑量 benzodiazepine」（反加重，除非酒精/benzo 戒斷；一般用低劑量抗精神病藥如 haloperidol）——故 D 錯。故正確為 (A)。", "options": {"A": "正確。酒癮者給糖前先給 thiamine，預防 Wernicke 腦病變。", "B": "錯。鴉片過量為「針點瞳孔」＋呼吸抑制，非瞳孔擴大。", "C": "錯。TCA 過量不可用 flumazenil（誘發癲癇）。", "D": "錯。譫妄不宜高劑量 benzodiazepine（除戒斷外）。"}, "sources": ["Harrison 21e（Coma; Wernicke encephalopathy）"]}}, "108a-TNPA-外科-68": {"quick": "頭部外傷後「清醒期（lucid interval）」再昏迷＋同側瞳孔放大＝硬腦膜上（硬膜外）血腫，故 (A)。", "detail": {"background": "本例車禍頭部外傷、「當場昏迷→恢復意識（lucid interval 清醒期）→再陷昏迷」＋「右側瞳孔放大」——是「硬腦膜上（硬膜外）血腫（epidural hematoma, EDH）」的經典表現：多為「腦膜中動脈」撕裂之『動脈性』出血，CT 呈「雙凸透鏡狀（biconvex）高密度」，因動脈出血快，典型有清醒期後迅速惡化、同側 CN III 受壓瞳孔放大→需緊急手術清除。對照：硬腦膜下血腫（SDH）多為橋靜脈出血、CT「新月狀」、病程較慢；SAH 為瀰漫劇烈頭痛；腦內出血為局部。故選 (A)。清醒期＋同側瞳孔放大＝EDH 是必考。", "options": {"A": "正確。清醒期後再昏迷＋同側瞳孔放大＝硬腦膜上（硬膜外）血腫（EDH）。", "B": "硬腦膜下血腫多為靜脈出血、新月狀、病程較慢。", "C": "SAH 為瀰漫劇烈頭痛，非局部清醒期型態。", "D": "腦內出血為局部出血，非典型清醒期表現。"}, "sources": ["Harrison 21e（Epidural hematoma; lucid interval）"]}}, "108a-TNPA-內科-69": {"quick": "單一一次「無誘因」的癲癇發作不需立即開始抗癲癇藥，故 (A)。", "detail": {"background": "癲癇治療原則：(A) 「單一一次『無誘因（unprovoked）』的發作」，若神經學與檢查正常、復發風險不高，「不一定需立即開始抗癲癇藥（AED）」（可觀察；第二次發作或高復發風險才治療）——正確。(B) 「已找到『誘發病因（provoked，如低血糖、電解質、戒斷、感染）』的發作」應「治療其『病因』」而非一律長期 AED——故 B 錯。(C) 「懷孕婦女『可』使用 AED」（須權衡、選較安全藥如 levetiracetam、避免 valproate，且控制癲癇對母胎更重要）——「不可使用」錯，故 C 錯。(D) 起始治療應「『單一藥物（monotherapy）』」，非一開始就多藥併用——故 D 錯。故正確為 (A)。", "options": {"A": "正確。單一次無誘因發作不一定需立即用 AED。", "B": "錯。有誘因之發作應治療病因，非一律長期 AED。", "C": "錯。孕婦可用 AED（選較安全藥、避 valproate）。", "D": "錯。起始為單一藥物治療，非多藥併用。"}, "sources": ["Harrison 21e（Seizures and epilepsy）"]}}, "108a-TNPA-外科-69": {"quick": "疼痛下張眼 E2＋無法理解聲音 V2＋疼痛屈曲（去皮質）M3＝GCS 7 分，故 (C)。", "detail": {"background": "格拉斯哥昏迷指數（GCS）＝睜眼（E,1–4）＋語言（V,1–5）＋運動（M,1–6）。本例：「疼痛下才張眼」＝E2；「發出『無法理解』的聲音（呻吟）」＝V2；「疼痛刺激出現屈曲、握拳、旋前姿勢（去皮質僵直 decorticate）」＝M3。故 GCS＝2＋2＋3＝「7 分」（C）。記憶運動分級：M6 遵從指令、M5 定位疼痛、M4 疼痛回縮、M3 異常屈曲（去皮質）、M2 異常伸直（去大腦）、M1 無反應。GCS≤8 通常需考慮保護氣道（插管）。", "options": {"A": "5 分計算錯誤。", "B": "6 分計算錯誤。", "C": "正確。E2＋V2＋M3＝7 分。", "D": "8 分計算錯誤。"}, "sources": ["Glasgow Coma Scale；Harrison 21e"]}}, "108b-TNPA-內科-69": {"quick": "熱痙攣是「兒童」的癲癇原因，非老年人，故敘述 (C) 錯。", "detail": {"background": "老年人新發癲癇/發作的常見原因：(A) 「腦血管疾病（中風）」——是老年新發癲癇『最常見』原因；(B) 「阿茲海默症等神經退化疾病」；(D) 「酒精戒斷」、以及腦腫瘤、代謝異常（低血糖/鈉/鈣）、藥物等。(C) 「熱痙攣（febrile seizures）」是「6 個月–5 歲『兒童』」因發燒引發的良性抽搐，「不是老年人」的原因——故為錯誤敘述（答案 C）。老年新發癲癇務必查中風/結構性病因與代謝因素。", "options": {"A": "正確。腦血管疾病為老年新發癲癇最常見原因。", "B": "正確。阿茲海默等退化疾病可致老年癲癇。", "C": "錯誤（為答案）。熱痙攣是兒童的原因，非老年人。", "D": "正確。酒精戒斷可引發老年人癲癇。"}, "sources": ["Harrison 21e（Seizures and epilepsy）"]}}, "109-通論-其他-42": {"quick": "將病人頭部「降低」會妨礙靜脈回流、使 ICP 上升，應「抬高」頭部，故敘述 (D) 為非。", "detail": {"background": "顱內壓（ICP）：(A) 正常值約「5–15 mmHg」——正確。(B) 「高血壓或 PaCO2 上升（腦血管擴張）」會使 ICP 增加——正確。(C) ICP 過高的臨床表徵：頭痛、噁心嘔吐、視力模糊（視乳突水腫）、意識下降、Cushing 三聯——正確。(D) 「將頭部『降低』」會「妨礙顱內靜脈回流、使 ICP『上升』」——正確處置是「頭部『抬高約 30 度』、頸部中立」以利靜脈回流降 ICP——故 (D) 敘述為「非」（答案）。其他降 ICP：鎮靜、控 PaCO2 35–40（短期輕度過度換氣）、滲透治療、引流 CSF。", "options": {"A": "正確。ICP 正常值約 5–15 mmHg。", "B": "正確。高血壓或 PaCO2 上升使 ICP 增加。", "C": "正確。ICP 過高有頭痛、噁心嘔吐、視力模糊。", "D": "為非（答案）。頭部降低會妨礙靜脈回流、升高 ICP；應抬高頭部。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "109-進階-外科-61": {"quick": "valproate（Depakine）需注意血中 ammonia（高血氨腦病變），故 (B)。", "detail": {"background": "抗癲癇藥的特殊監測：「valproate（valproic acid / sodium valproate, Depakine）」可造成「高血氨（hyperammonemia）」甚至「高血氨腦病變（意識改變、嗜睡）」（與肝臟尿素循環受抑制有關），故須注意血中 ammonia 與肝功能、血小板（可致血小板低下、肝毒性、胰臟炎、體重增加、致畸胎—神經管缺損）。對照：levetiracetam（情緒/行為副作用）、phenytoin（齒齦增生、共濟失調、心律不整）、carbamazepine（低血鈉 SIADH、SJS/HLA-B1502、血液惡病質）。故需監測 ammonia 者為 valproate（B）。", "options": {"A": "levetiracetam 以情緒/行為副作用為主。", "B": "正確。valproate 可致高血氨，需監測 ammonia。", "C": "phenytoin 注意齒齦增生、心律不整。", "D": "carbamazepine 注意低血鈉、SJS（HLA-B1502）。"}, "sources": ["Harrison 21e（Seizures and epilepsy）"]}}, "110-進階-外科-50": {"quick": "過度換氣使 PaCO2 降到 20 mmHg 過低會致腦缺血，故敘述 (C) 錯。", "detail": {"background": "外傷性 SAH 併腦水腫、ICP 上升的處置：(A) 「床頭抬高 30 度」（利靜脈回流降 ICP）——正確。(B) 「給 3% 高張食鹽水」（滲透治療降 ICP）——正確。(D) 「mannitol 0.25–1.0 g/kg 靜脈注射」（滲透利尿降 ICP）——正確。(C) 「過度換氣使 PaCO2 維持在 20 mmHg」——『過度』（PaCO2<25–30）會使腦血管過度收縮、造成『腦缺血』，故僅在急性腦疝危象時短暫使用、目標約 30–35 mmHg，不可長期壓到 20——故此敘述錯誤（答案 C）。降 ICP 綜合：頭抬高、鎮靜、滲透治療、適度（非過度）換氣、引流、必要時手術。", "options": {"A": "正確。床頭抬高 30 度降 ICP。", "B": "正確。3% 高張鹽水為滲透治療。", "C": "錯誤（為答案）。PaCO2 壓到 20 過低致腦缺血；目標約 30–35、僅短暫用。", "D": "正確。mannitol 0.25–1.0 g/kg 降 ICP。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "110-進階-外科-55": {"quick": "右側病灶天幕疝（鉤回疝）→「右眼瞳孔放大、左側肢體麻痺」，故 (D)。", "detail": {"background": "天幕（鉤回）疝脫（transtentorial/uncal herniation）：右側幕上病灶（如右前額腦膜瘤＋水腫）使顳葉鉤回向下移位，壓迫「『同側（右側）』動眼神經（CN III）」→「右眼瞳孔放大、對光反射消失」；同時壓迫「同側大腦腳（皮質脊髓徑）」→「『對側（左側）』肢體麻痺」。故為「右眼瞳孔放大、左側肢體麻痺」（D）。（少數因 Kernohan’s notch 出現同側偏癱之假性定位）。記憶：鉤回疝＝同側瞳孔大、對側肢體癱。", "options": {"A": "左眼瞳孔放大不符（病灶在右側→右瞳孔大）。", "B": "右瞳孔大正確但肢體麻痺應為對側（左），非右側。", "C": "左眼瞳孔放大不符。", "D": "正確。右側病灶→右眼瞳孔放大＋左側（對側）肢體麻痺。"}, "sources": ["Harrison 21e（Uncal herniation; CN III）"]}}, "110-進階-外科-58": {"quick": "CPP＝MAP−ICP；MAP=(132+2×84)/3=100，CPP=100−14=86 mmHg，故 (B)。", "detail": {"background": "腦灌流壓（cerebral perfusion pressure, CPP）＝平均動脈壓（MAP）−顱內壓（ICP）。平均動脈壓 MAP＝(收縮壓＋2×舒張壓)/3。本例血壓 132/84：MAP＝(132＋2×84)/3＝(132＋168)/3＝300/3＝100 mmHg；ICP＝14。故 CPP＝100−14＝86 mmHg（B）。臨床維持 CPP 約 60–70 mmHg（避免<50–60 之缺血、與過高之水腫/ARDS）。本例 CPP 86 偏高但可接受。", "options": {"A": "74 計算錯誤。", "B": "正確。MAP 100−ICP 14＝CPP 86 mmHg。", "C": "98 計算錯誤。", "D": "110 計算錯誤。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "110-進階-內科-64": {"quick": "抽搐持續未緩解應檢驗血糖、血鈉、血鈣找可逆病因，故 (C)。", "detail": {"background": "抽搐發作（尤持續≥5 分鐘＝癲癇重積）的處置：(C) 「檢驗血糖、血鈉、血鈣（及鎂）」找出可逆/誘發病因——正確且必要。(A) 發作中應採「『側臥』」避免吸入、保護不受傷，「不是仰臥」（仰臥易吸入），且發作中不強行置入物品於口中——故 A 錯。(B) 「直接給葡萄糖」不正確——應先驗血糖，低血糖才給糖，且酒癮/營養不良者「先給 thiamine 再給糖」——故 B 錯。(D) 起始用「單一」抗抽搐藥（benzodiazepine），非「同時多種」——故 D 錯。處置：ABC＋側臥保護＋驗血糖＋benzodiazepine→第二線 AED。", "options": {"A": "錯。發作中採側臥避免吸入，非仰臥。", "B": "錯。應先驗血糖；低血糖（酒癮者先 thiamine）才給糖。", "C": "正確。檢驗血糖、血鈉、血鈣找可逆病因。", "D": "錯。起始單一藥物，非同時多種。"}, "sources": ["Harrison 21e（Seizures and epilepsy）"]}}, "110-進階-內科-65": {"quick": "carbamazepine 經肝代謝，應避免與 MAOI 併用，故 (D)。", "detail": {"background": "抗癲癇藥治療：(A) 發作時 diazepam「不」一次給 30 mg（過量致呼吸抑制；分次小劑量滴定）——故 A 錯。(B) phenytoin「需『負載劑量（loading dose）』」且「快速靜脈注射可致心律不整、低血壓與呼吸/心臟抑制」（須緩慢、心電監測）——故 B 錯（「不需負載、不會抑制呼吸」皆錯）。(C) valproic acid 與食物併服減少腸胃不適沒錯，但應「定期檢查『肝功能』與血小板/血氨」（非腎功能）——故 C 錯。(D) 「carbamazepine 經肝臟代謝（CYP 誘導劑），應避免與 MAOI 併用」（結構類似三環抗鬱劑、交互作用）——正確。故選 (D)。", "options": {"A": "錯。diazepam 不一次給 30 mg（呼吸抑制）。", "B": "錯。phenytoin 需負載劑量，快速靜注可致心律不整/抑制。", "C": "錯。valproic acid 應監測肝功能（非腎功能）。", "D": "正確。carbamazepine 經肝代謝，避免與 MAOI 併用。"}, "sources": ["Harrison 21e（Seizures and epilepsy）"]}}, "111-進階-外科-48": {"quick": "使用 mannitol 須監測電解質不平衡，故 (C)。", "detail": {"background": "Mannitol 是「高張（hypertonic）滲透性利尿劑」，用於降顱內壓——把組織水分拉入血管再經腎排出。要點：(C) 「須監測電解質與滲透壓（會造成脫水、低血鉀/低血鈉或高血鈉、腎損傷、滲透壓過高），並監測尿量與腎功能」——正確。(A) 「腦壓正常『不可立即停藥』」——驟停會「反彈性 ICP 升高」，應逐步減量——故 A 錯。(B) 給法是「『快速』輸注（約 15–30 分鐘 bolus）」較有效，非「慢速滴注」——故 B 錯。(D) mannitol 是「『高張』溶液」非低張——故 D 錯。需用過濾器（可能結晶），並避免在嚴重心衰/腎衰時過量。", "options": {"A": "錯。不可立即停藥（反彈性 ICP 升高），應漸減。", "B": "錯。應快速輸注（15–30 分鐘）較有效。", "C": "正確。須監測電解質不平衡與腎功能。", "D": "錯。mannitol 為高張溶液，非低張。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "111-進階-內科-63": {"quick": "抽搐＋嚴重低血鈉（Na 110）應給 3% 高張食鹽水，故 (A)。", "detail": {"background": "本例使用 thiazide 利尿劑（會致低血鈉）後抽搐，血鈉「110 mEq/L（嚴重低血鈉）」，鉀正常（3.7）。「嚴重低血鈉合併神經學症狀（抽搐、意識改變）」是給予「3% 高張食鹽水」的明確適應症——以小心、控制的速度提升血鈉（避免過快致橋腦中央髓鞘溶解；通常前數小時提升幅度有限、24 小時<8–10 mEq/L）。故選 (A)。鉀正常不需補 KCl（B）；此抽搐是「低血鈉誘發」，治療『病因（低血鈉）』比直接給 AED（C、D）更關鍵。", "options": {"A": "正確。嚴重低血鈉（Na 110）併抽搐應給 3% 高張食鹽水。", "B": "錯。鉀正常（3.7），不需補 KCl。", "C": "錯。應先矯正低血鈉（病因），非直接 phenytoin。", "D": "錯。應治療低血鈉，非直接 valproic acid。"}, "sources": ["Harrison 21e（Hyponatremia; seizure）"]}}, "112-進階-外科-28": {"quick": "疑顱底骨折（熊貓眼＋腦脊髓液漏）時不可插鼻胃管，故敘述 (B) 錯。", "detail": {"background": "本例頭部重擊、「熊貓眼（raccoon eyes，眶周瘀血）＋粉紅色液體從鼻孔/耳朵流出（腦脊髓液漏 CSF rhinorrhea/otorrhea）」——是「顱底骨折（basal skull fracture）」徵象（A 正確）。(B) 顱底骨折時「『不可插鼻胃管』」——鼻胃管可能經骨折處『誤入顱內』，應改「口胃管（orogastric）」——故 B 為錯誤處置（答案）。(C) GCS E1V2M4=7（<8）意識不清應「插管保護呼吸道」——正確。(D) 生命徵象穩定、無呼吸道問題後安排「頭部 CT」——正確。其他顱底骨折徵象：Battle’s sign（耳後瘀血）、鼓室積血、顱神經麻痺。", "options": {"A": "正確。熊貓眼＋CSF 漏為顱底骨折徵象。", "B": "錯誤（為答案）。顱底骨折禁插鼻胃管（恐誤入顱內），改口胃管。", "C": "正確。GCS 7 意識不清應插管保護呼吸道。", "D": "正確。穩定後安排頭部 CT。"}, "sources": ["Harrison 21e（Basal skull fracture）"]}}, "112-進階-外科-44": {"quick": "ICP＝MAP−CPP；MAP=(178+2×100)/3=126，ICP=126−98=28 mmHg，故 (B)。", "detail": {"background": "由 CPP＝MAP−ICP 可反推 ICP＝MAP−CPP。MAP＝(收縮壓＋2×舒張壓)/3＝(178＋2×100)/3＝(178＋200)/3＝378/3＝126 mmHg；CPP 已知 98。故 ICP＝126−98＝28 mmHg（B）。ICP 28 已>20–22 之閾值，屬升高，須處置（頭抬高、鎮靜、滲透治療、控 PaCO2 等）。此題考 MAP 與 CPP/ICP 三者關係之換算。", "options": {"A": "22 計算錯誤。", "B": "正確。MAP 126−CPP 98＝ICP 28 mmHg。", "C": "34 計算錯誤。", "D": "40 計算錯誤。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "112-進階-外科-62": {"quick": "加拿大 CT 頭部準則的年齡門檻是「≥65 歲」，「≥55 歲」不適當，故 (A)。", "detail": {"background": "加拿大輕度頭部外傷 CT 準則的高風險因子：受傷 2 小時後「GCS<15」（D 正確）、疑「開放性/凹陷性或顱底顱骨骨折」（C 正確）、「嘔吐≥2 次」（B 正確）、「年齡『≥65 歲』」。故 (A)「年齡≥55 歲」與準則的「≥65 歲」門檻不符，為「不適當」之敘述（答案）。中風險另含>30 分鐘逆行性失憶、危險受傷機轉。此準則用於 GCS 13–15 的輕度頭傷以決定是否需 CT。", "options": {"A": "不適當（為答案）。年齡門檻為≥65 歲，非≥55 歲。", "B": "適當。嘔吐≥2 次為高風險。", "C": "適當。疑顱骨骨折為高風險。", "D": "適當。受傷 2 小時後 GCS<15 為高風險。"}, "sources": ["Canadian CT Head Rule"]}}, "112-進階-內科-66": {"quick": "benzodiazepine 是癲癇重積初始治療的首選藥物類別，故 (D)。", "detail": {"background": "癲癇治療：(D) 「benzodiazepine（lorazepam/midazolam/diazepam）是『癲癇重積（status epilepticus）』初始（第一線）治療的首選」——正確（之後第二線 phenytoin/fosphenytoin、valproate、levetiracetam）。(A) 「不宜立即抗癲癇治療」過於絕對——須視情況（重積要立即治療）；(B) 「迷走神經刺激（VNS）」是『難治型癲癇』的『輔助/非藥物』療法，「非全身強直陣攣的第一線」——故 B 錯。(C) 對多種發作類型者，廣效的「valproic acid」常優先，不一定要先用 phenytoin/carbamazepine（後者對『局部』發作較適，對某些全身型可能加重）——故 C 敘述不當。故正確為 (D)。", "options": {"A": "過於絕對。癲癇重積須立即治療。", "B": "錯。VNS 為難治型癲癇之輔助療法，非第一線。", "C": "錯。多發作類型常優先廣效 valproic acid，非先 phenytoin/carbamazepine。", "D": "正確。benzodiazepine 為癲癇重積初始首選。"}, "sources": ["Harrison 21e（Seizures and epilepsy）"]}}, "113-進階-外科-63": {"quick": "同側瞳孔擴大「並非『所有』腦疝的共同徵象」（為鉤回疝特徵），故敘述 (C) 錯。", "detail": {"background": "腦疝（brain herniation）：(A) 起因是顱內壓上升造成腦組織移位——正確。(B) 「腰椎穿刺是禁忌」（會造成壓力梯度而惡化腦疝）——正確。(D) 「小腦扁桃體疝（cerebellotonsillar/枕骨大孔疝）」壓迫延髓可致「突發性呼吸心跳停止」——正確。(C) 「意識昏迷＋『同側』瞳孔擴大」是「『鉤回（uncal）疝』」壓迫同側 CN III 的特徵，「並非『所有』腦疝的共同徵象」——中央疝、扣帶回疝、小腦疝的瞳孔/表現各異，故此「所有腦疝共同徵象」之敘述錯誤（答案 C）。", "options": {"A": "正確。腦疝起因為 ICP 升高致腦組織移位。", "B": "正確。腦疝時腰椎穿刺為禁忌。", "C": "錯誤（為答案）。同側瞳孔擴大為鉤回疝特徵，非所有腦疝共同徵象。", "D": "正確。小腦扁桃體疝可致突發呼吸心跳停止。"}, "sources": ["Harrison 21e（Brain herniation syndromes）"]}}, "113-進階-內科-64": {"quick": "帶 HLA-B*1502 者，valproic acid 引起嚴重皮膚反應/SJS 的可能性最低，故 (C)。", "detail": {"background": "HLA-B*1502（亞洲人較多）與「芳香族類抗癲癇藥」誘發的 Stevens-Johnson 症候群（SJS）/TEN 高度相關，風險較高者為「carbamazepine（最明確）、phenytoin、lamotrigine、oxcarbazepine」。而「valproic acid（valproate）」屬非芳香族、與 B*1502 之 SJS 關聯「最低」，是帶此基因者較安全的替代選擇。故引起嚴重皮膚反應可能性最低者為 (C)。台灣健保給付 carbamazepine 用藥前的 HLA-B*1502 檢測。", "options": {"A": "phenytoin 與 B*1502 相關 SJS 風險較高。", "B": "carbamazepine 與 B*1502 相關 SJS 風險最高。", "C": "正確。valproic acid 與 B*1502 之 SJS 風險最低。", "D": "lamotrigine 亦有 SJS 風險（與 B*1502 部分相關）。"}, "sources": ["Harrison 21e；HLA-B*1502 與 AED 之 SJS"]}}, "113-進階-外科-71": {"quick": "CPP＝MAP−ICP；MAP=(140+2×52)/3≈81.3，CPP=81.3−20=61.3 mmHg，故 (C)。", "detail": {"background": "腦灌流壓 CPP＝MAP−ICP。MAP＝(收縮壓＋2×舒張壓)/3＝(140＋2×52)/3＝(140＋104)/3＝244/3≈81.3 mmHg；ICP＝20。故 CPP＝81.3−20＝61.3 mmHg（C）。CPP 61 落在建議目標（60–70）的下緣，尚可接受但須避免再降（避免<60 缺血）。此題同樣考 MAP 與 CPP 換算。", "options": {"A": "56.3 計算錯誤。", "B": "58.5 計算錯誤。", "C": "正確。MAP≈81.3−ICP 20＝CPP 61.3 mmHg。", "D": "63.5 計算錯誤。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "113-進階-外科-73": {"quick": "瀰漫性軸索損傷（DAI）病人「通常有顯著且持續的意識障礙」，故敘述 (C) 錯。", "detail": {"background": "瀰漫性軸索損傷（diffuse axonal injury, DAI）是頭部「加速—減速/旋轉」剪力造成白質軸突廣泛斷裂：(A) 「腦部 CT 可能僅見『微量點狀出血』」（甚至早期正常，MRI 較敏感）——正確。(B) 嬰幼兒之「嬰兒搖晃症候群（shaken baby syndrome）」是 DAI 的重要情境——正確。(D) 「治療效果有限，重點在『預防繼發性腦傷（低血壓/低血氧/高 ICP）』」——正確。(C) DAI 病人「『通常有顯著、且常為持續性』的意識障礙（昏迷）」（傷後立即且久），故「不太會有意識障礙」錯誤（答案 C）。", "options": {"A": "正確。CT 可能僅見微量點狀出血（MRI 較敏感）。", "B": "正確。須小心嬰兒搖晃症候群。", "C": "錯誤（為答案）。DAI 通常有顯著且持續的意識障礙。", "D": "正確。治療有限，重在預防繼發性腦傷。"}, "sources": ["Harrison 21e（Diffuse axonal injury）"]}}, "114-進階-內科-59": {"quick": "癲癇/意識改變的初步代謝檢查中，「血鉀」最不重要（鈉/鈣/鎂與葡萄糖更相關），故 (B)。", "detail": {"background": "癲癇發作與意識改變的初步「代謝性病因」評估，最相關的可逆原因是「低血糖、『低/高血鈉』、『低血鈣』、『低血鎂』」（這些電解質與葡萄糖異常都會降低癲癇閾值或致意識改變）。相對而言「血鉀（potassium）」異常較少『直接』引起癲癇（低/高血鉀主要影響心臟與肌肉，較少致抽搐），故在此情境「血鉀濃度（B）」是「最不重要」的初步檢查（答案）。當然臨床仍會驗全套電解質；本題比較相對重要性。", "options": {"A": "重要。血鈉異常常致抽搐/意識改變。", "B": "正確（最不重要）。血鉀較少直接引起癲癇（主要影響心肌/肌肉）。", "C": "重要。低血鈣可致抽搐。", "D": "重要。低血鎂可致抽搐。"}, "sources": ["Harrison 21e（Seizures and epilepsy）"]}}, "114-進階-內科-61": {"quick": "嚴重酒精戒斷引發癲癇者，給葡萄糖前應先給 thiamine，故 (B)。", "detail": {"background": "嚴重酒精戒斷可致「戒斷性癲癇與震顫性譫妄（DT）」。處置：(B) 「在給葡萄糖輸液『之前』先給 thiamine（維他命 B1）」——避免誘發 Wernicke 腦病變——正確。(A) 「benzodiazepine（lorazepam/diazepam）是酒精戒斷與其癲癇的『第一線』治療」（不應因怕呼吸抑制而避免，應監測下使用）——故 A 錯。(C) 酒精戒斷癲癇「首選 benzodiazepine」，「不」首選 carbamazepine（後者非戒斷重積首選）——故 C 錯。(D) 發作中「不應強行插入口咽呼吸道/物品防咬舌」（反致傷害），應側臥保護、給藥——故 D 錯。故正確為 (B)。", "options": {"A": "錯。benzodiazepine 是酒精戒斷（含癲癇）第一線，不應避免。", "B": "正確。給糖前先給 thiamine（防 Wernicke）。", "C": "錯。戒斷性癲癇首選 benzodiazepine，非 carbamazepine。", "D": "錯。發作中不應強行置入口咽呼吸道（致傷害）。"}, "sources": ["Harrison 21e（Alcohol withdrawal; Wernicke）"]}}, "114-進階-外科-61": {"quick": "CPP＝MAP−ICP；MAP=(109+2×70)/3≈83，CPP=83−22=61 mmHg，故 (B)。", "detail": {"background": "計算腦灌流壓：MAP＝(109＋2×70)/3＝(109＋140)/3＝249/3＝83 mmHg；ICP＝22。CPP＝83−22＝61 mmHg（B 正確，落在目標 60–70）。逐項：(A) 「應維持 CPP『小於』60」錯——應維持 CPP「≥60（60–70）」避免缺血。(C) 「PaCO2 維持<30 可降 ICP」——『過度』換氣（<30）會腦缺血，只在腦疝危象短暫使用，常規目標 35–40——故 C 錯。(D) 「急性硬腦膜下血腫有 lucid interval、CT 雙凸狀高密度」錯——「lucid interval 與『雙凸狀（biconvex）』是『硬腦膜外（epidural）』血腫」的特徵；硬腦膜下血腫 CT 為「新月狀」——故 D 錯。故正確為 (B)。", "options": {"A": "錯。CPP 應維持≥60（60–70），非<60。", "B": "正確。MAP 83−ICP 22＝CPP 61 mmHg。", "C": "錯。PaCO2<30 為過度換氣致缺血，常規目標 35–40。", "D": "錯。lucid interval 與雙凸狀為硬膜「外」血腫；硬膜下為新月狀。"}, "sources": ["Brain Trauma Foundation Guidelines；Harrison 21e（Raised intracranial pressure）"]}}, "105-TNPA-通論-28": {"quick": "失智症的「可逆病因」鑑別不含維生素 B6 缺乏（應為 B12），故 (C)。", "detail": {"background": "失智症（含阿茲海默症）診斷須先排除「可逆/可治療的病因」：常規評估包括「維生素『B12』缺乏、甲狀腺功能異常（低下）、正常壓力水腦症（NPH）、神經梅毒、HIV、慢性硬腦膜下血腫、憂鬱（假性失智）、藥物、電解質/肝腎/代謝異常」。其中「『維生素 B12』缺乏」是經典可逆原因，而「『維生素 B6』缺乏」並非失智症的常規鑑別（B6 缺乏多致周邊神經病變/皮膚黏膜炎）——故「不包括」者為 (C)。記憶：失智可逆病因＝B12、甲狀腺、NPH、感染（HIV/梅毒）、SDH、憂鬱。", "options": {"A": "屬鑑別。正常壓力水腦症（可逆，三聯：失智、步態、尿失禁）。", "B": "屬鑑別。HIV 感染可致認知障礙。", "C": "正確（不包括）。應為 B12 缺乏，非 B6。", "D": "屬鑑別。甲狀腺功能異常（低下）。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "105-TNPA-外科-36": {"quick": "CAM（混亂評估法）不含「昏迷指數（GCS）」，故 (A)。", "detail": {"background": "混亂評估法（Confusion Assessment Method, CAM）是床邊篩檢『譫妄』的工具，四特徵：①「『急性發作且病程波動』（acute onset & fluctuating）」、②「『注意力不集中』（inattention）」、③「『思考無組織』（disorganized thinking）」、④「『意識狀態改變』（altered level of consciousness）」。診斷譫妄需 ①＋②，再加 ③或④。其中「昏迷指數（GCS）」並非 CAM 的評估內容（GCS 評估意識深淺，非譫妄篩檢項目）——故 (A) 為答案。", "options": {"A": "正確（不是 CAM 內容）。昏迷指數（GCS）非 CAM 項目。", "B": "是 CAM 特徵。注意力不集中。", "C": "是 CAM 特徵。思考無組織。", "D": "是 CAM 特徵。意識狀態改變。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "106-106c-內科-43": {"quick": "DSM-5 認知障礙症六大認知範疇不含「人格」，故 (D)。", "detail": {"background": "DSM-5 將「認知障礙症（neurocognitive disorder）」的「六大認知範疇」定為：①複雜注意力（complex attention）、②執行功能（executive function）、③學習與記憶（learning & memory）、④語言（language）、⑤知覺—動作（perceptual-motor）、⑥社會認知（social cognition）。「人格（personality）」並非這六大認知範疇之一（人格改變是某些失智—如額顳葉型—的『表現』，但非 DSM-5 列的認知範疇）——故 (D) 為答案。重度（major）vs 輕度（mild）依是否影響日常自理區分。", "options": {"A": "是六大範疇。社會認知。", "B": "是六大範疇。複雜注意力。", "C": "是六大範疇。知覺—動作。", "D": "正確（不是）。人格非 DSM-5 六大認知範疇。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "106-106c-內科-52": {"quick": "benzodiazepine（lorazepam）會「加重」譫妄，並非安全常用，故敘述 (C) 較不適當。", "detail": {"background": "譫妄治療：(A) 「積極找出並治療潛在原因（感染、藥物、電解質、缺氧、疼痛、尿滯留等）」——是核心、正確。(B) 躁動干擾治療時可用「低劑量抗精神病藥 haloperidol」——可接受。(D) 「quetiapine（鎮靜、嗜睡）」有時用於譫妄症狀控制——可接受。(C) 「benzodiazepine（lorazepam）『安全且常用於譫妄』」不正確——benzodiazepine 反而「會加重/誘發譫妄」（除『酒精/benzo 戒斷』所致之譫妄外），不應作為一般譫妄的常規治療——故 (C) 較不適當（答案）。非藥物處置（重新定向、日夜節律、家人陪伴、避免約束）優先。", "options": {"A": "適當。積極治療潛在原因。", "B": "適當。haloperidol 處理躁動干擾行為。", "C": "較不適當（為答案）。benzodiazepine 會加重譫妄（除戒斷外），非安全常用。", "D": "適當。quetiapine 有時用於譫妄症狀控制。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "106-106a-通論-59": {"quick": "區分譫妄 vs 精神病的三大病史問題不含「本次是否有幻覺/胡言亂語」，故 (B)。", "detail": {"background": "區分「急性譫妄」與「急性精神病發作」的病史三大關鍵問題：① 「病人發病前的精神與認知『基準』狀態」（之前是否正常）；② 「最近的『藥物/物質』使用史」（中毒/戒斷）；③ 「本次發作的『時間與進程』」（急性突發且波動較像譫妄）。而「本次是否伴隨幻覺/胡言亂語（B）」並非『區分』的關鍵——因為「兩者都可能出現幻覺/思考混亂」，故無鑑別力，為「不包括」之項目（答案 B）。譫妄有意識/注意力波動＋可找到全身病因，精神病意識清醒。", "options": {"A": "是關鍵。發病前精神認知基準狀態。", "B": "正確（不包括）。幻覺/胡言亂語兩者皆可有，無鑑別力。", "C": "是關鍵。最近藥物使用史。", "D": "是關鍵。發作時間與進程。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "106-106c-內科-62": {"quick": "阿茲海默症照護應「鼓勵維持自理能力」，而非全程代勞，故敘述 (A) 錯。", "detail": {"background": "阿茲海默症（AD）照護原則：(B) 「擺放熟悉個人物品」增進定向感與安全感——正確；(C) 「忘詞時適度幫忙表達」減輕挫折——正確；(D) 「簡單規律作息、結構化團體活動」——正確。(A) 「協助其用餐、如廁、沐浴（全部代勞）以預防跌倒」不適當——應「『鼓勵並維持其殘存自理能力』、提供安全環境與適度協助」，過度代勞會加速功能退化、剝奪尊嚴；預防跌倒應從環境改善（照明、扶手、去除障礙）著手，而非剝奪活動。故錯誤者為 (A)。", "options": {"A": "錯誤（為答案）。應鼓勵維持自理能力，非全程代勞。", "B": "正確。熟悉物品增進定向感與安全感。", "C": "正確。忘詞時適度協助表達。", "D": "正確。簡單規律作息＋結構化活動。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "106-106c-內科-72": {"quick": "memantine 是 NMDA 受體拮抗劑，非乙醯膽鹼酶抑制劑，故 (C)。", "detail": {"background": "失智症（阿茲海默症）藥物兩大類：① 「可逆性乙醯膽鹼酯酶（acetylcholinesterase）抑制劑」——donepezil、galantamine、rivastigmine（增加突觸 ACh，用於輕中度 AD）；② 「NMDA 受體拮抗劑」——「memantine」（用於中重度 AD，調節麩胺酸毒性）。故「不屬於乙醯膽鹼酶抑制劑」者為「memantine（C）」。兩類可合併使用。乙醯膽鹼酯酶抑制劑常見腸胃道副作用（噁心、腹瀉、心搏過緩）。", "options": {"A": "donepezil 為乙醯膽鹼酯酶抑制劑。", "B": "galantamine 為乙醯膽鹼酯酶抑制劑。", "C": "正確（不是）。memantine 為 NMDA 受體拮抗劑。", "D": "rivastigmine 為乙醯膽鹼酯酶抑制劑。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "107-TNPA-內科-23": {"quick": "區分譫妄與失智，「病史詢問」幫助最大，故 (A)。", "detail": {"background": "臨床初步區分「譫妄 vs 失智」最關鍵的是「『病史詢問』」——了解「『發作的時間與進程』（譫妄急性、數小時至數天、病程波動；失智隱襲、數月至數年漸進）、『意識/注意力』（譫妄有意識波動與注意力不集中；失智早期意識清楚）、『發病前的認知基準』、藥物/全身病因」。影像、血液、儀器檢查是用來找「譫妄的潛在病因」或排除結構性問題，但「區分兩者」最有幫助的是病史（A）。譫妄＝急性、波動、可逆病因；失智＝慢性、進行性。", "options": {"A": "正確。病史詢問對區分譫妄與失智幫助最大。", "B": "影像用於找結構性病因，非首要區分依據。", "C": "血液檢驗用於找譫妄病因，非區分核心。", "D": "神經學儀器非區分兩者的首要工具。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "107-TNPA-通論-42": {"quick": "譫妄為急性發作，家人「通常清楚」發生時間，故最不可能的是 (D)。", "detail": {"background": "譫妄（delirium）特徵：(A) 「急性發作、病程波動（一天內起伏，常夜間加重 sundowning）」；(B) 「注意力不集中」；(C) 「意識狀態改變」。因為是「『急性突發』」，家人/照顧者「『通常能清楚指出發生的時間點』」（如「昨天傍晚突然開始」）——故 (D)「家人通常不清楚發生時間」與譫妄特性相反，為「最不可能」（答案）。對照失智是隱襲漸進，家人常說不出確切起點。", "options": {"A": "符合。譫妄急性發作、病程波動。", "B": "符合。注意力不集中。", "C": "符合。意識狀態改變。", "D": "最不可能（為答案）。譫妄急性突發，家人通常清楚發生時間。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "107-TNPA-內科-68": {"quick": "腦血管多發性梗塞（血管性失智）是「不可逆」失智常見原因，故 (D)。", "detail": {"background": "失智症分「可逆」與「不可逆」：可逆/可治療原因——酗酒（戒酒可部分改善）、藥物中毒、硫胺素（B1）缺乏、B12 缺乏、甲狀腺低下、NPH、憂鬱、感染等。不可逆/退化或結構破壞——「阿茲海默症、『血管性失智（腦血管多發性梗塞 multi-infarct）』、路易氏體、額顳葉、Creutzfeldt-Jakob」。故引發「不可逆」失智的常見原因為 (D) 多發性腦梗塞（血管性失智）。A、B、C 皆屬可逆/可治療範疇。", "options": {"A": "酗酒為可逆/可部分改善原因。", "B": "藥物中毒為可逆原因。", "C": "硫胺素（B1）缺乏為可逆原因。", "D": "正確。腦血管多發性梗塞（血管性失智）為不可逆常見原因。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "108b-TNPA-通論-34": {"quick": "處理導因後譫妄仍持續，可能有未診斷的失智症，故 (D)。", "detail": {"background": "譫妄：(A) 「躁動＝譫妄、缺乏反應＝失智」錯——譫妄分「過動型、低活動型（安靜嗜睡，常被忽略）、混合型」，低活動型不等於失智。(B) 「藥物優先 benzodiazepine」錯——BZD 會加重譫妄（除酒精/BZD 戒斷外），躁動干擾才用低劑量抗精神病藥。(C) 「增加『夜晚』照光」錯——應「白天充足光照、夜間安靜昏暗」維持日夜節律（增加夜間光反而干擾睡眠、加重）。(D) 「處理相關導因後仍持續譫妄，病人可能有『未診斷的失智症』」（失智是譫妄的重要危險因子，且兩者可並存）——正確（答案 D）。", "options": {"A": "錯。譫妄有過動/低活動/混合型，低活動非失智。", "B": "錯。BZD 加重譫妄（除戒斷外），非優先。", "C": "錯。應白天照光、夜間昏暗，非增加夜間光。", "D": "正確。處理導因後仍持續，可能有未診斷失智。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "108b-TNPA-通論-56": {"quick": "認知障礙＋視幻覺＋波動譫妄＋類巴金森症狀＝路易氏體失智症，故 (D)。", "detail": {"background": "路易氏體失智症（dementia with Lewy bodies, DLB）核心特徵：① 「波動性認知功能（attention/alertness 起伏）」、② 「反覆且鮮明的『視幻覺』」、③ 「自發性『類巴金森氏症（parkinsonism）』動作症狀」、④ 「快速動眼期睡眠行為障礙（RBD）」；對抗精神病藥『高度敏感』（易惡化）。本例 80 歲、認知異常＋視幻覺＋譫妄波動＋類巴金森——典型 DLB（D）。對照：阿茲海默以記憶為主、額顳葉以人格/行為或語言為主、血管性與中風史相關階梯惡化。故選 (D)。", "options": {"A": "阿茲海默以記憶缺損為主，非以視幻覺＋巴金森。", "B": "血管性失智與中風史、階梯式惡化相關。", "C": "額顳葉失智以人格/行為或語言障礙為主。", "D": "正確。視幻覺＋波動＋類巴金森＝路易氏體失智症。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "108a-TNPA-內科-73": {"quick": "tau 蛋白（神經纖維纏結）與阿茲海默症高度關聯，故 (A)。", "detail": {"background": "神經退化疾病的異常蛋白：「阿茲海默症（AD）」病理為「細胞外『β-類澱粉斑塊（Aβ plaque）』＋細胞內『tau 蛋白過度磷酸化形成的神經纖維纏結（neurofibrillary tangles）』」——故與「tau 蛋白」高度關聯（A）。對照：路易氏體失智與帕金森症之失智—「α-synuclein（路易氏體）」；Creutzfeldt-Jakob 病—「prion（普利昂蛋白）」。雖然 tau 也見於額顳葉退化等 tauopathy，但題目選項中與 tau 高度關聯且最具代表者為阿茲海默症（A）。", "options": {"A": "正確。AD 與 tau（神經纖維纏結）及 Aβ 斑塊高度關聯。", "B": "路易氏體失智與 α-synuclein 相關。", "C": "帕金森症之失智與 α-synuclein 相關。", "D": "Creutzfeldt-Jakob 病與 prion 蛋白相關。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "109-進階-其他-17": {"quick": "慢性氣喘不是術後譫妄的危險因素，故 (B)。", "detail": {"background": "術後譫妄（postoperative delirium）的危險因素：高齡、既有「失智/認知障礙」、「長期服用『精神作用藥物』（鎮靜安眠、抗膽鹼藥）」、「髖關節骨折/大手術」、「電解質不平衡」、感染、缺氧、疼痛控制不佳、約束、睡眠剝奪、多重用藥、視聽障礙等。「慢性氣喘（B）」並非術後譫妄的典型危險因素（除非急性缺氧）——故為答案。預防：維持定向、日夜節律、適當止痛、避免不必要藥物與約束、矯正感官障礙。", "options": {"A": "是危險因素。長期服用精神藥物。", "B": "正確（非危險因素）。慢性氣喘非術後譫妄典型危險因素。", "C": "是危險因素。髖關節骨折/大手術。", "D": "是危險因素。電解質不平衡。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "109-通論-其他-47": {"quick": "術後急性意識混亂＋鮮明視幻覺＋躁動定向障礙＝譫妄，故 (D)。", "detail": {"background": "本例術後第一天「看到天花板爬滿蟲（鮮明視幻覺）、堅持己見（即使戴眼鏡仍認定是蟲）、躁動吵著回家（定向/判斷障礙）」——整體是「『譫妄（delirium）』」（急性發作、知覺障礙＋注意/思考混亂＋躁動）。雖然單看「把吸音洞當成蟲」像「錯覺（illusion，對真實刺激的錯誤解讀）」，但合併急性意識/認知混亂與躁動，最完整的診斷是「譫妄」（D）。譫妄常含幻覺/錯覺，但其核心是「急性、波動的意識與注意力障礙＋可找到全身病因（術後、藥物、電解質、疼痛）」。故選 (D)。", "options": {"A": "恐懼是情緒，不能涵蓋此急性意識混亂。", "B": "幻覺只是其中一個表現，非完整診斷。", "C": "錯覺只是其中一個表現，非完整診斷。", "D": "正確。術後急性意識混亂＋知覺障礙＋躁動＝譫妄。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "109-進階-內科-79": {"quick": "酗酒（alcoholism）是 ICU 譫妄的危險因子之一，故 (B)。", "detail": {"background": "ICU 譫妄：(A) 「譫妄與 ICU 病人死亡率『有關』」（譫妄增加死亡率、住院天數、長期認知障礙）——故 A 錯。(B) 「酗酒（及戒斷）是譫妄的危險因子之一」——正確。(C) 「benzodiazepine 鎮靜『會增加』譫妄風險」——故「不會增加」錯。(D) 「dexmedetomidine（α2 致效劑）相較 benzodiazepine 『降低』譫妄發生」——故「會增加」錯。故正確為 (B)。ICU 預防譫妄：ABCDEF bundle（減少鎮靜、每日喚醒、早期活動、家人參與、評估與處理疼痛）。", "options": {"A": "錯。譫妄與 ICU 死亡率有關（增加死亡率）。", "B": "正確。酗酒/戒斷是譫妄危險因子。", "C": "錯。benzodiazepine 會增加譫妄風險。", "D": "錯。dexmedetomidine 相較 BZD 降低譫妄。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "110-通論-其他-55": {"quick": "失憶＋步態不穩＋尿失禁三聯＝正常壓力水腦症，故 (B)。", "detail": {"background": "本例「記憶退化＋『步態不穩（跌倒）』＋『尿失禁』」——是「正常壓力水腦症（NPH）」的經典三聯（口訣「wet, wacky, wobbly」：尿失禁、失智、步態障礙；步態障礙常最早最明顯）。NPH 是『可逆』失智之一，CSF 動力異常致腦室擴大但腦壓正常，「腦室引流分流術（VP shunt）」可改善（尤步態）。對照：阿茲海默以記憶為主、無早期步態/尿失禁；路易氏體有視幻覺＋巴金森；巴金森以動作障礙為主。故選 (B)。影像見腦室擴大與步態改善之放液試驗支持診斷。", "options": {"A": "阿茲海默以記憶為主，無早期步態/尿失禁三聯。", "B": "正確。失憶＋步態不穩＋尿失禁＝正常壓力水腦症。", "C": "路易氏體失智有視幻覺＋巴金森症狀。", "D": "巴金森氏症以靜止性顫抖、僵硬、動作遲緩為主。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "110-進階-內科-63": {"quick": "阿茲海默症的正子掃描呈「代謝『減低』（顳頂葉）」，故敘述 (D)（活躍）錯。", "detail": {"background": "阿茲海默症（AD）診斷檢查：(B) 「AD-8 量表 ≥2 題『是』提示可能早期失智」——正確；(C) 「CT/MRI 見大腦皮質萎縮、腦室擴大（尤海馬迴/顳頂葉）」——正確。(D) 「正子掃描（FDG-PET）在 AD 呈現『顳頂葉代謝『減低（hypometabolism）』」，而非「活躍」——故「代謝活動活躍」錯誤（答案 D）；類澱粉 PET 則見 Aβ 沉積。(A) 「MMSE 評估定向、注意、記憶、語言、口語…」大致正確（MMSE 主要評認知，不含『行動能力』之運動評估，敘述略寬，但本題以 D 為明確錯誤）。故答案為 (D)。", "options": {"A": "大致正確。MMSE 評估定向、注意、記憶、語言等（主為認知）。", "B": "正確。AD-8 ≥2 題「是」提示可能早期失智。", "C": "正確。CT/MRI 見皮質萎縮、腦室擴大。", "D": "錯誤（為答案）。AD 的 FDG-PET 為代謝『減低』，非活躍。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "111-進階-內科-68": {"quick": "短期記憶缺損＋海馬迴萎縮＋神經學正常＝阿茲海默症，故 (A)。", "detail": {"background": "阿茲海默症（AD）是最常見失智（約佔 60–70%），典型「隱襲、漸進的『情節記憶（短期記憶）』缺損」為先，影像見「『海馬迴與內側顳葉萎縮』」，早期神經學檢查（運動、感覺）多正常。本例完全符合（A）。對照：血管性失智有中風史與階梯式惡化、局部神經學徵象；路易氏體有視幻覺＋巴金森＋波動；Creutzfeldt-Jakob 為快速進行性失智＋肌陣攣＋EEG 特殊波。故選 (A)。", "options": {"A": "正確。短期記憶缺損＋海馬迴萎縮＋神經學正常＝阿茲海默症。", "B": "血管性失智有中風史、階梯式惡化、局部徵象。", "C": "路易氏體失智有視幻覺＋巴金森＋波動。", "D": "CJD 為快速進行性失智＋肌陣攣。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "111-通論-5分科-75": {"quick": "譫妄在「夜間會惡化（不是改善）」，故敘述 (D) 錯。", "detail": {"background": "譫妄（delirium）：(A) 「由多種原因引起」（感染、藥物、電解質、缺氧、疼痛等）——正確；(B) 「是『急性』混亂狀態」——正確；(C) 「建議使用評估量表（如 CAM、CAM-ICU）評估」——正確。(D) 「晚上譫妄會『改善』」錯誤——譫妄典型「『夜間惡化（sundowning，日落症候群）』」，白天較清醒、夜間混亂躁動加劇——故為答案。處置：找出並治療病因＋非藥物措施（定向、日夜節律、家人陪伴）＋躁動干擾時低劑量抗精神病藥。", "options": {"A": "正確。譫妄由多種原因引起。", "B": "正確。是急性混亂狀態。", "C": "正確。建議用量表（CAM）評估。", "D": "錯誤（為答案）。譫妄夜間惡化（sundowning），非改善。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "112-通論-其他-52": {"quick": "老年人譫妄「症狀突然發生且起起伏伏」，故 (D)。", "detail": {"background": "老年人譫妄特徵：(D) 「『急性（突然）發生、病程『波動（起起伏伏）』、常夜間加重」——正確。(A) 「症狀穩定且持續」錯（譫妄是波動的）。(B) 「症狀慢慢發展、意識沒有改變」錯（那像失智；譫妄有『意識/注意力改變』且急性）。(C) 「多重認知問題與記憶力缺失」較像『失智』的描述（譫妄核心是注意力與意識波動，而非以記憶缺失為主）。故正確為 (D)。臨床以 CAM 評估，找出可逆病因。", "options": {"A": "錯。譫妄症狀波動，非穩定持續。", "B": "錯。譫妄為急性且有意識改變，非慢慢發展、意識不變。", "C": "此較像失智（多重認知＋記憶缺失）。", "D": "正確。譫妄突然發生且起起伏伏（波動）。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "112-進階-內科-61": {"quick": "失智常規實驗室檢查應含維生素 B12 與 TSH，故 ①④＝(D)。", "detail": {"background": "美國神經醫學會（AAN）對「失智症」的常規實驗室評估建議包含「① 維生素 B12 濃度」與「④ 甲狀腺刺激素（TSH）」——用以排除「B12 缺乏」與「甲狀腺功能異常」這兩個常見『可逆』病因。② C-反應蛋白（CRP）與 ③ 血脂（lipid profile）並非失智的常規必要檢查（除非有特定臨床指引）。故常規應做者為 ①④＝(D)。其他依臨床可考慮：血球、電解質、肝腎功能、鈣、必要時神經影像、梅毒/HIV。", "options": {"A": "12——含② CRP，非常規。", "B": "23——含②③，非常規。", "C": "34——含② 或脂質，非常規必要。", "D": "正確。①維生素 B12＋④TSH 為失智常規檢查。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "112-進階-內科-62": {"quick": "乙醯膽鹼酯酶抑制劑具實證可延緩早期阿茲海默症認知惡化，故 (B)。", "detail": {"background": "早期阿茲海默症（AD）有實證可「延緩認知功能惡化」的藥物是「乙醯膽鹼酯酶抑制劑（cholinesterase inhibitors：donepezil、rivastigmine、galantamine）」（用於輕中度），中重度可加 memantine（NMDA 拮抗劑）。對照：維生素 E（A，證據薄弱、不建議常規）、抗精神病藥（C，neuroleptics，用於行為精神症狀但不改善認知且增風險）、NSAIDs（D，未證實有效）。新型抗類澱粉單株抗體（lecanemab 等）為近年發展。故具實證者為 (B)。", "options": {"A": "維生素 E 證據薄弱，不建議常規。", "B": "正確。乙醯膽鹼酯酶抑制劑可延緩早期 AD 認知惡化。", "C": "抗精神病藥用於行為症狀，不改善認知且增風險。", "D": "NSAIDs 未證實能延緩 AD。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "113-進階-外科-30": {"quick": "術前以 Mini-Cog 評估認知，是預測「術後譫妄」風險，故 (D)。", "detail": {"background": "「Mini-Cog」是快速認知篩檢工具（三個詞回憶＋畫鐘測驗），術前用來篩檢「既存認知障礙/失智」——而「術前認知障礙」是「『術後譫妄（postoperative delirium）』」最重要的危險因子之一。故 Mini-Cog 術前評估是為了「預測並預防術後譫妄」（D）。對於篩檢陽性者，術前後應採譫妄預防措施（定向、日夜節律、適當止痛、減少誘發藥物與約束）。其餘（肺塌陷、跌倒、心律不整）非 Mini-Cog 的預測標的。", "options": {"A": "肺部塌陷與認知篩檢無直接關係。", "B": "跌倒風險有多面向評估工具，非 Mini-Cog 主要目的。", "C": "心律不整與認知篩檢無關。", "D": "正確。Mini-Cog 篩認知障礙以預測術後譫妄。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "113-進階-內科-41": {"quick": "末期病人譫妄早期徵象包括日夜顛倒與心理狀態變化，故 (B)。", "detail": {"background": "末期病人（terminal/end-of-life）譫妄：(B) 「早期徵象包括『日夜顛倒（睡眠—清醒週期紊亂）』與心理/精神狀態變化（注意力、情緒、知覺改變）」——正確。(A) 譫妄是「『全腦』功能急性失調＋意識/注意力改變」，非「大腦『部分』失能」——故 A 敘述不精確。(C) 終末期譫妄出現時間「不固定」，並非「都在死亡前 3–5 天」——故 C 錯。(D) 譫妄多為「『急性』出現且病程波動」，且部分（找出可逆病因者）可逆——故「緩慢出現、多不可逆」錯。故正確為 (B)。安寧處置：找可逆因（藥物、便秘、尿滯留、疼痛、缺氧）＋非藥物＋必要時低劑量抗精神病藥。", "options": {"A": "不精確。譫妄為全腦功能急性失調，非「部分」失能。", "B": "正確。早期徵象含日夜顛倒與心理狀態變化。", "C": "錯。出現時間不固定，非都在死亡前 3–5 天。", "D": "錯。譫妄多急性出現、波動，部分可逆。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "113-通論-5分科-56": {"quick": "記憶下降＋語言＋行為改變（失智）與「重症肌無力」相關性最小，故 (A)。", "detail": {"background": "本例「記憶力下降、語言障礙、行為改變」是「失智症候群」表現。其相關病因：(B) 「維他命（B12 等）缺乏」、(C) 「多次腦中風（血管性失智）」、(D) 「水腦症（NPH）」——皆為失智的（可逆或結構性）原因。(A) 「重症肌無力（myasthenia gravis）」是「神經肌肉接合處的『運動』疾病（眼瞼下垂、複視、易疲勞無力）」，「不影響認知」——與失智表現相關性『最小』（答案 A）。故選 (A)。", "options": {"A": "正確（相關性最小）。重症肌無力是神經肌肉病，不致失智。", "B": "相關。維他命（B12）缺乏可致認知障礙。", "C": "相關。多次腦中風＝血管性失智。", "D": "相關。水腦症（NPH）為可逆失智之一。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "113-通論-家庭-72": {"quick": "譫妄建議用相關量表評估（如 CAM），故 (C)。", "detail": {"background": "譫妄：(C) 「建議使用相關『量表（如 CAM、CAM-ICU、4AT）』進行系統性評估」——正確。(A) 「常見『單一』原因」錯——譫妄多為「多因性（感染＋藥物＋電解質＋環境…）」。(B) 「是『慢性』混亂」錯——譫妄是「急性」混亂（失智才慢性）。(D) 「夜間症狀會緩解」錯——譫妄「夜間惡化（sundowning）」。故正確為 (C)。處置以找出並治療病因為核心，搭配非藥物措施。", "options": {"A": "錯。譫妄多為多因性，非單一原因。", "B": "錯。譫妄為急性混亂（非慢性）。", "C": "正確。建議用量表（CAM）評估。", "D": "錯。譫妄夜間惡化，非緩解。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "113-進階-家庭-74": {"quick": "阿茲海默症為進行性、不可逆的認知功能障礙，故 (D)。", "detail": {"background": "阿茲海默症（AD）：(D) 是「『進行性、不可逆』的神經退化性認知障礙」——正確。(A) 「盛行率低（10–15%）」錯——AD 是「『最常見』的失智（約佔 60–70%）」。(B) 「病程進展迅速、好發 50 歲後」錯——AD「『緩慢』進展、好發『65 歲後』（晚發型最多）」（少數早發型與基因相關）。(C) 「情節記憶較不受影響」錯——AD「『情節記憶（近期記憶）』『早期即顯著』受損」（忘記剛發生的事）。故正確為 (D)。", "options": {"A": "錯。AD 是最常見失智（約 60–70%）。", "B": "錯。AD 緩慢進展、好發 65 歲後。", "C": "錯。AD 情節（近期）記憶早期即受損。", "D": "正確。AD 為進行性、不可逆的認知障礙。"}, "sources": ["Harrison 21e（Dementia; Alzheimer disease）"]}}, "113-進階-家庭-75": {"quick": "嚴重失智老人新發肌陣攣＋嗜睡，無感染徵象時「腰椎穿刺」最不適當，故 (D)。", "detail": {"background": "本例嚴重失智老人「新發四肢不自主顫動（肌陣攣 myoclonus）＋今日嗜睡不易喚醒」，無發燒。處置：(A) 「詳細詢問過去病史與『用藥史』」——適當（藥物中毒/電解質/代謝是老人急性意識變化常見可逆因）；(B) 「抽血查 CBC、電解質、血糖、肝腎功能」——適當（找代謝性病因，如低血鈉、尿毒、低血糖、藥物）；(C) 「血氧偏低（92%）→排除肺炎安排胸部 X 光」——適當。(D) 「『懷疑中樞神經感染而做腰椎穿刺』」最不適當——病人『無發燒、無腦膜刺激徵』，且此急性表現（肌陣攣＋嗜睡）更可能是『代謝性/藥物性腦病變』，腰椎穿刺非首選（且嚴重失智、意識下降須先評估）——故為答案 (D)。", "options": {"A": "適當。詳問病史與用藥史（找可逆因）。", "B": "適當。抽血查電解質/血糖/肝腎（代謝性病因）。", "C": "適當。血氧偏低排除肺炎安排 CXR。", "D": "最不適當（為答案）。無感染徵象，腰椎穿刺非首選（先查代謝/藥物因）。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "114-進階-家庭-23": {"quick": "低血鉀最不可能引起譫妄（低血鈉/鎂/鈣較會），故 (B)。", "detail": {"background": "電解質異常與譫妄：「低血鈉（hyponatremia）、低血鎂、低血鈣、以及低血糖、尿毒、高血鈣」等都會引起意識混亂/譫妄。而「低血鉀（hypokalemia）」主要影響「『心臟（心律不整）與骨骼肌（無力）』」，「較少『直接』引起譫妄」——故「最不可能引起譫妄」者為 (B)。臨床評估譫妄的代謝病因仍會驗全套電解質與血糖、肝腎功能；本題比較相對可能性。", "options": {"A": "低血鈉常引起譫妄。", "B": "正確（最不可能）。低血鉀主要影響心臟與肌肉，較少致譫妄。", "C": "低血鎂可引起譫妄。", "D": "低血鈣可引起譫妄。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "114-進階-家庭-30": {"quick": "失智老人躁動譫妄、無發燒，最適當用低劑量 haloperidol，故 (C)。", "detail": {"background": "失智/譫妄病人出現「躁動、影響治療安全」時的藥物處置：首選「低劑量『抗精神病藥（haloperidol）』」短期使用控制躁動（C）。應「避免」：(A) 「diphenhydramine（抗組織胺，具『抗膽鹼』作用）」會「加重譫妄」；(B)、(D) 「benzodiazepine（如 lorazepam）」會「加重譫妄」（除酒精/BZD 戒斷外）。故最適當為 (C)。用藥前後仍須找出並處理譫妄的潛在病因，並優先非藥物措施（重新定向、家人陪伴、移除導管/約束、改善環境）。注意：失智（尤路易氏體）對抗精神病藥敏感，需小心、最低有效劑量、短期。", "options": {"A": "錯。diphenhydramine 具抗膽鹼作用，加重譫妄。", "B": "錯。benzodiazepine 加重譫妄（除戒斷外）。", "C": "正確。低劑量 haloperidol 控制躁動（短期）。", "D": "錯。lorazepam（BZD）加重譫妄。"}, "sources": ["Harrison 21e（Delirium and confusional states）"]}}, "106-106a-內科-6": {"quick": "帕金森氏症為「靜止性顫抖」，「動作時顫抖」非其常見症狀，故 (B)。", "detail": {"background": "帕金森氏症（PD）為黑質多巴胺神經元退化，核心運動症狀「TRAP」：靜止性顫抖（resting Tremor，搓藥丸樣，動作時減輕）、僵直（Rigidity，齒輪狀 cogwheel）、動作遲緩（Akinesia/bradykinesia）、姿勢不穩（Postural instability，晚期）。故 (A)(C)(D) 皆為 PD 常見，而 (B) 「動作時顫抖（action tremor）」是『原發性顫抖（essential tremor）』的特徵，非 PD（PD 是靜止顫抖、動作時反而改善）——故為「不是」之答案。", "options": {"A": "是。動作遲緩為 PD 核心症狀。", "B": "正確（不是）。動作時顫抖是原發性顫抖；PD 為靜止性顫抖。", "C": "是。姿勢不穩（晚期）。", "D": "是。齒輪狀僵直。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "106-106a-內科-54": {"quick": "PD 為「靜止性」顫抖、原發性（老年性）顫抖為「動作性」，敘述 (B) 把兩者顛倒，故錯。", "detail": {"background": "帕金森氏症（PD）vs 原發性/老年性顫抖（essential/senile tremor, ST）：(A) PD 顫抖頻率較慢（約 4–6 Hz）、ST 較快（約 6–12 Hz）——正確。(B) 「PD 的顫抖常發生在『動作時』、ST 在『靜止時』」——『顛倒』錯誤（正確是 PD＝靜止性顫抖、動作時減輕；ST＝姿勢性/動作性顫抖、靜止時消失）——故為答案。(C) PD 合併動作遲緩與僵直，ST 則無——正確。(D) PD 多由單側開始，ST 多兩側——正確。記憶：PD＝靜止顫抖＋僵直＋動作慢；ST＝動作/姿勢顫抖、喝酒改善、有家族史。", "options": {"A": "正確。PD 顫抖頻率較慢、ST 較快。", "B": "錯誤（為答案）。PD 為靜止性顫抖、ST 為動作性，敘述顛倒。", "C": "正確。PD 合併 bradykinesia/rigidity，ST 無。", "D": "正確。PD 多單側起始、ST 多兩側。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "107-TNPA-通論-48": {"quick": "帕金森病不需「急性左旋多巴負荷試驗」才能確診（為臨床診斷），故 (C) 為非。", "detail": {"background": "帕金森病（PD）：(A) 常見表徵—肢體（靜止性）顫抖、運動遲緩、步態不穩（小碎步、前衝）、肢體（齒輪狀）僵硬——正確。(B) 「無法以抽血或影像『確診』PD」（為『臨床診斷』，影像/檢驗用於排除其他病因）——正確。(D) 初期可有非運動症狀—易疲倦、輕微人格變化、嗅覺減退、便秘、睡眠（RBD）障礙、憂鬱——正確。(C) 「『須用急性左旋多巴負荷試驗才能確診』PD」不正確——PD 是臨床診斷，對左旋多巴有反應雖支持診斷，但「並非確診之必要條件」（有反應不等於確診、無反應也不全然排除）——故為「非」（答案 C）。", "options": {"A": "正確。表徵含顫抖、運動遲緩、步態不穩、僵硬。", "B": "正確。無法以抽血/影像確診（為臨床診斷）。", "C": "為非（答案）。不需左旋多巴負荷試驗才能確診（臨床診斷）。", "D": "正確。初期可有疲倦、人格變化、睡眠障礙等。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "107-TNPA-內科-69": {"quick": "多巴胺促進劑（dopamine agonist）長期使用可能出現幻覺，故 (C)。", "detail": {"background": "帕金森氏症藥物—「多巴胺促進劑（dopamine agonists：pramipexole、ropinirole、rotigotine）」：(C) 長期使用可能出現「幻覺、精神症狀，及『衝動控制障礙（賭博/購物/性慾亢進）』、嗜睡（突然睡著）」——正確。(A) 年輕早期可作為起始單藥，但「增強運動功能」之力道不如 levodopa，常為輔助/延後 levodopa 之用，非「單獨以增強運動功能」為主——故 A 不精確。(B) 副作用是「『姿位性低血壓』」（非血壓升高）——故 B 錯。(D) 多致「嗜睡/鎮靜」（非精神亢奮）——故 D 錯。故正確為 (C)。", "options": {"A": "不精確。其增強運動之力道不如 levodopa；多作早期/輔助。", "B": "錯。副作用為姿位性低血壓，非血壓升高。", "C": "正確。長期使用可能出現幻覺（及衝動控制障礙、嗜睡）。", "D": "錯。多致嗜睡/鎮靜，非精神亢奮。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "108a-TNPA-通論-58": {"quick": "帕金森氏症的運動症狀為「發聲過弱③」與「動作緩慢④」，故 (B)。", "detail": {"background": "帕金森氏症（PD）的運動症狀包含：③「發聲過弱（hypophonia，音量小、單調）」、④「動作緩慢（bradykinesia）」，以及靜止性顫抖、僵直、面具臉、「『眨眼『減少』』」、「『寫字『過小』症（micrographia）』」、小碎步前衝步態。逐項：① 「動作型顫抖（action tremor）」是原發性顫抖（PD 為靜止性）；② 「眨眼『增加』」錯（PD 是眨眼『減少』）；⑤ 「呼吸困難」非 PD 運動特徵；⑥ 「寫字『過大』症（macrographia）」錯（PD 是『過小』micrographia）。故正確為 ③④＝(B)。", "options": {"A": "①②錯（PD 為靜止顫抖、眨眼減少）。", "B": "正確。③發聲過弱＋④動作緩慢。", "C": "⑤⑥錯（呼吸困難非特徵；PD 寫字過小非過大）。", "D": "①⑥錯。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "109-進階-內科-76": {"quick": "levodopa 改善僵直，但副作用是「姿位性低血壓」非血壓升高，故敘述 (C) 較不正確。", "detail": {"background": "帕金森氏症藥物：(A) 「amantadine」加強多巴胺釋放（並有抗膽鹼、抗異動症作用）——正確。(B) 「抗膽鹼藥（如 trihexyphenidyl）對『顫抖』反應較佳」（用於年輕、以顫抖為主者）——正確。(D) 「sinemet（levodopa/carbidopa）長期使用後，『下個劑量前』可能出現『藥效消退（wearing-off / end-of-dose）的短暫惡化』」——正確。(C) 「levodopa 可改善肌肉僵直」沒錯，但其心血管副作用是「『姿位性低血壓』」而非「血壓升高」——故此敘述較不正確（答案 C）。levodopa 也可致噁心、異動症（dyskinesia）、幻覺。", "options": {"A": "正確。amantadine 加強多巴胺釋放。", "B": "正確。抗膽鹼藥對顫抖反應較佳。", "C": "較不正確（為答案）。levodopa 副作用為姿位性低血壓，非血壓升高。", "D": "正確。長期 sinemet 有藥效消退（wearing-off）。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "110-進階-內科-62": {"quick": "levodopa 與維生素 B6 併用會「降低」療效（增加周邊代謝），故敘述 (C) 錯。", "detail": {"background": "老年帕金森病人開始 levodopa 治療：(A) 「合併『多巴胺脫羧酶抑制劑（carbidopa）』」可減少 levodopa 在周邊被代謝、降低噁心嘔吐並增加進入腦部之量——正確。(B) 「wearing-off（藥效消退）現象＝藥物有效時間逐漸縮短」——正確。(D) 「噁心與姿位性低血壓可藉漸進式調整劑量避免」——正確。(C) 「與『維生素 B6（pyridoxine）』併用『增加療效』」錯誤——B6 是多巴脫羧酶的輔酶，會「『增加周邊代謝、降低』levodopa 進入腦部的量、削弱療效」（故服 levodopa 應避免大量 B6；含 carbidopa 的複方可部分抵消此效應）——故為答案 (C)。", "options": {"A": "正確。合併 carbidopa 減少噁心嘔吐。", "B": "正確。wearing-off＝藥效時間逐漸變短。", "C": "錯誤（為答案）。B6 增加周邊代謝、降低 levodopa 療效，非增加。", "D": "正確。漸進式調整可避免噁心與姿位性低血壓。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "110-進階-內科-67": {"quick": "原發性（老年性）顫抖為「動作時」、帕金森為「靜止時」，故 (C)。", "detail": {"background": "原發性/老年性顫抖（ST）vs 帕金森氏症（PD）：(C) 「ST 顫抖常發生在『動作時（姿勢性/動作性）』、PD 顫抖常發生在『靜止時』」——正確。(A) 「ST 頻率較慢、PD 較快」錯（相反：PD 較慢 4–6 Hz、ST 較快）。(B) 「ST 多由單側開始、PD 兩側同時」錯（相反：PD 多單側起始、ST 多兩側）。(D) 「ST 合併 bradykinesia/rigidity、PD 則無」錯（相反：PD 才合併僵直與動作遲緩）。故正確為 (C)。ST 常有家族史、喝酒可暫時改善、以姿勢性手抖與頭抖為主。", "options": {"A": "錯。PD 頻率較慢、ST 較快。", "B": "錯。PD 多單側起始、ST 多兩側。", "C": "正確。ST 為動作性顫抖、PD 為靜止性顫抖。", "D": "錯。PD 才合併 bradykinesia/rigidity。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "111-通論-5分科-71": {"quick": "姿勢/動作性顫抖、壓力加重、喝酒改善、有家族史、無僵直遲緩＝原發性顫抖，故 (B)。", "detail": {"background": "本例 68 歲男性「『姿勢/動作性』顫抖（保持姿勢久或壓力大時加重）、『喝酒可改善』、有『家族史』、且『無動作遲緩或僵直』」——是「原發性顫抖（essential tremor, ET）」的典型（最常見的動作障礙之一，自體顯性遺傳傾向，姿勢性/動作性手抖±頭抖、聲音抖，飲酒暫時改善）。對照：帕金森氏症為『靜止性』顫抖＋僵直＋動作遲緩；杭亭頓症為舞蹈症＋認知/精神症狀＋家族顯性遺傳；酒精戒斷為停酒後數小時的顫抖／自律神經亢進（本例是『喝酒改善』而非戒斷）。故選 (B)。治療：propranolol 或 primidone。", "options": {"A": "帕金森為靜止性顫抖＋僵直＋動作遲緩，本例無。", "B": "正確。姿勢/動作性顫抖＋喝酒改善＋家族史＝原發性顫抖。", "C": "杭亭頓症以舞蹈症＋認知精神症狀為主。", "D": "酒精戒斷為停酒後出現，本例反而喝酒改善。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "113-通論-5分科-54": {"quick": "癲癇發作不是帕金森氏症的三大典型症狀，故 (A)。", "detail": {"background": "帕金森氏症（PD）的「三大典型運動症狀」是「靜止性『顫抖（tremor）』、『動作緩慢（bradykinesia）』、『肢體僵硬（rigidity）』」（再加晚期『姿勢不穩』）。「癲癇發作（A）」並非 PD 的典型症狀——故為答案。PD 還有非運動症狀（嗅覺減退、便秘、RBD 睡眠障礙、憂鬱、姿位性低血壓、晚期失智）。治療以 levodopa 為核心。", "options": {"A": "正確（不是）。癲癇發作非 PD 三大典型症狀。", "B": "是。靜止性顫抖。", "C": "是。動作緩慢。", "D": "是。肢體僵硬。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "113-進階-內科-65": {"quick": "amantadine 是抗帕金森藥，最不可能造成藥物性帕金森症狀，故 (D)。", "detail": {"background": "「藥物性帕金森症候群（drug-induced parkinsonism）」由「阻斷多巴胺 D2 受體」的藥物引起：(A) haloperidol（典型抗精神病藥）、(C) risperidone（非典型抗精神病藥）、(B) metoclopramide（止吐藥/促腸蠕動，會過血腦障壁阻斷 D2）——都會造成靜止顫抖、動作遲緩、僵直等錐體外症狀。(D) 「amantadine」本身是『抗帕金森/抗異動症』藥物（增加多巴胺釋放），「不會」造成帕金森症狀——故「最不可能」為答案 (D)。藥物性帕金森症在停用致病藥後多可改善。", "options": {"A": "haloperidol 阻斷 D2，可致藥物性帕金森症。", "B": "metoclopramide 阻斷 D2，可致藥物性帕金森症。", "C": "risperidone 阻斷 D2，可致藥物性帕金森症。", "D": "正確（最不可能）。amantadine 為抗帕金森藥，不致帕金森症狀。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "113-通論-家庭-68": {"quick": "帕金森氏症為「小碎步、步距變窄」，「寬底步態」最不適當，故 (D)。", "detail": {"background": "帕金森氏症（PD）的臨床表現：(A) 「姿位性低血壓」（自律神經失調，常見且因藥物加重）——適當；(B) 「靜止性顫抖（resting tremor）」——適當；(C) 隨病程可出現膀胱功能障礙、尿失禁（自律神經）——適當。(D) PD 的步態是「『小碎步、前衝（festinating）、步距『變窄（short-stepped/shuffling）』、起步困難、轉身分解』」，「『寬底步態（wide-based gait）』」是『小腦或感覺性共濟失調』的特徵，「非」PD——故為最不適當（答案 D）。", "options": {"A": "適當。PD 可有姿位性低血壓（自律神經）。", "B": "適當。靜止性顫抖。", "C": "適當。病程可出現膀胱功能障礙。", "D": "最不適當（為答案）。PD 為小碎步窄步距，非寬底步態（後者為小腦/共濟失調）。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "113-進階-家庭-80": {"quick": "人格改變不是帕金森氏症的三大典型症狀，故 (C)。", "detail": {"background": "帕金森氏症（PD）三大典型運動症狀＝「顫抖（靜止性）、僵硬、運動遲緩」（＋晚期姿勢不穩）。「人格改變（C）」並非 PD 三大典型症狀（人格/行為改變較見於額顳葉失智；PD 晚期可有認知障礙與精神症狀，但非『三大典型』）——故為答案。其餘 (A) 震顫、(B) 僵硬、(D) 運動遲緩皆為三大典型。", "options": {"A": "是。震顫（靜止性）。", "B": "是。僵硬。", "C": "正確（不是）。人格改變非 PD 三大典型症狀。", "D": "是。運動遲緩。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "105-TNPA-通論-18": {"quick": "貝爾氏麻痺（顏面神經麻痺）應檢查第七對腦神經，故 (C)。", "detail": {"background": "貝爾氏麻痺（Bell’s palsy）是「第七對腦神經（顏面神經，CN VII）」的『周邊型（下運動神經元）』急性麻痺，特徵為「同側『整側臉』癱瘓（含額頭—不能皺眉抬眉、眼瞼閉合不全 Bell 現象、鼻唇溝變淺、嘴角下垂）」，可伴同側味覺改變、聽覺過敏、流淚異常。故評估應檢查 CN VII（C）。對照：CN V（三叉神經，臉部感覺/咀嚼）、CN VI（外旋神經，眼球外展）、CN VIII（聽神經，聽覺平衡）。中央型（核上性，如中風）則『額頭不受影響』。", "options": {"A": "第五對（三叉神經）管臉部感覺與咀嚼。", "B": "第六對（外旋神經）管眼球外展。", "C": "正確。貝爾氏麻痺為第七對腦神經（顏面神經）麻痺。", "D": "第八對（聽神經）管聽覺與平衡。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "105-TNPA-內科-74": {"quick": "重症肌無力的無力「『活動後加重、傍晚最明顯』」，早上最明顯之敘述 (A) 錯。", "detail": {"background": "重症肌無力（myasthenia gravis, MG）是「神經肌肉接合處『突觸後』乙醯膽鹼受體之自體免疫疾病（anti-AChR 抗體）」，特徵是「『易疲勞性肌無力』——『活動後加重、休息後改善』，故『傍晚/愈用愈無力』最明顯」（A 敘述「早上起床最明顯」錯誤——那較像發炎性肌病/晨僵）。(B) 「休息後改善」——正確；(C) 女性略多（年輕女性與年長男性兩高峰）——大致正確；(D) 「複視、上眼瞼下垂」是常見初期（眼肌型）症狀——正確。故錯誤者為 (A)。診斷：anti-AChR 抗體、重複神經刺激、單纖維肌電圖、冰敷試驗；治療：膽鹼酯酶抑制劑（pyridostigmine）、免疫治療、胸腺切除。", "options": {"A": "錯誤（為答案）。MG 無力為活動後加重、傍晚最明顯，非早上。", "B": "正確。休息後改善（易疲勞性）。", "C": "大致正確。女性略多（雙峰年齡）。", "D": "正確。複視、眼瞼下垂為初期常見症狀。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "106-106a-通論-42": {"quick": "肌張力增強、無萎縮、無感覺異常、牽張反射增加＝上運動神經元病變，故 (A)。", "detail": {"background": "運動系統病變的「上運動神經元（UMN）vs 下運動神經元（LMN）」定位：本題「肌張力『增強』（痙攣性）、肌肉『無萎縮』（早期）、『無感覺異常』、牽張（深部肌腱）反射『增加（亢進）』」——是典型「『上運動神經元（UMN）』病變」（皮質脊髓徑），常伴 Babinski 陽性。對照「下運動神經元（LMN）」病變：肌張力『下降（鬆弛）』、明顯『肌肉萎縮』與肌束顫動、反射『減弱/消失』。神經肌肉交界（如 MG）：易疲勞、反射正常；肌肉病變：近端無力、反射正常/減弱。故為 (A)。", "options": {"A": "正確。張力增、無萎縮、無感覺異常、反射亢進＝上運動神經元病變。", "B": "下運動神經元為張力降、萎縮、反射減弱。", "C": "神經肌肉交界（MG）為易疲勞、反射正常。", "D": "肌肉群病變為近端無力、反射正常/減弱。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "106-106b-內科-63": {"quick": "感染後上行性無力＋反射消失（疑 Guillain-Barré），神經傳導檢查最有助鑑別，故 (D)。", "detail": {"background": "本例兒童「感染（黴漿菌肺炎）後 1–2 週出現『上行性（由下肢往上）對稱性無力』、『深部肌腱反射消失』、意識清楚」——是「Guillain-Barré 症候群（GBS，急性發炎性脫髓鞘多發性神經根病變）」的典型。最有助鑑別的檢查是「『神經傳導檢查（nerve conduction study）／肌電圖』」——顯示脫髓鞘（傳導速度變慢、傳導阻滯、F 波延長），並可佐以腰椎穿刺見「『蛋白細胞分離（albuminocytologic dissociation）』—蛋白高而細胞數正常」。對照：腦部 MRI/EEG 評估中樞（本例為周邊）、肌肉切片用於肌病。故選 (D)。GBS 嚴重者可累及呼吸肌與自律神經，須監測；治療 IVIG 或血漿置換。", "options": {"A": "腦部 MRI 評估中樞，本例為周邊神經根病變。", "B": "腦波檢查用於癲癇/腦病變，非 GBS。", "C": "肌肉切片用於肌病，非 GBS。", "D": "正確。神經傳導檢查最有助診斷 GBS（脫髓鞘）。"}, "sources": ["Harrison 21e（Guillain-Barré syndrome）"]}}, "106-106a-內科-66": {"quick": "臉部短暫電擊樣劇痛、輕觸即誘發、MRI 正常＝三叉神經痛，故 (D)。", "detail": {"background": "本例老年女性「嘴唇/牙齦/臉頰『短暫、間歇、電擊樣劇痛』，輕觸（如碰嘴唇、移動舌頭）即可誘發密集疼痛，神經學與 MRI 正常」——是「三叉神經痛（trigeminal neuralgia，CN V）」的典型：陣發性、單側、沿三叉神經分布（多 V2/V3）的劇痛，有『扳機點（觸發區）』，多為血管壓迫神經根所致（年輕或非典型者須排除多發性硬化、腫瘤）。治療首選「carbamazepine（或 oxcarbazepine）」，難治者手術（微血管減壓）。對照：聽神經瘤以聽力/平衡為主、腦膜炎有發燒頸僵、ALS 為運動神經元無力。故選 (D)。", "options": {"A": "聽神經瘤以聽力減退、耳鳴、平衡障礙為主。", "B": "腦膜炎有發燒、頸僵、頭痛。", "C": "ALS 為運動神經元退化致無力，無此電擊樣臉痛。", "D": "正確。短暫電擊樣臉痛＋扳機點＝三叉神經痛。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "106-106a-內科-68": {"quick": "重症肌無力具代表性的診斷檢查是抗乙醯膽鹼受體抗體（anti-AChR），故 (A)。", "detail": {"background": "重症肌無力（MG）的診斷檢查：(A) 「抗乙醯膽鹼受體抗體（anti-AChR antibody radioimmunoassay）」是『最具代表性、特異度高』的血清學檢查（約 80–85% 全身型陽性；陰性者可查 anti-MuSK）——正確。(B) 「重複神經刺激（repetitive nerve stimulation）」見遞減反應（decrement）、(C) 「單纖維肌電圖（single-fiber EMG）」最敏感——皆為電生理輔助診斷。(D) MRI（如胸腺）用於評估胸腺瘤而非診斷 MG。另有冰敷試驗、edrophonium 試驗。故最具代表性者為 (A)。", "options": {"A": "正確。anti-AChR 抗體為 MG 最具代表性的診斷檢查。", "B": "重複神經刺激為電生理輔助（decrement）。", "C": "單纖維肌電圖最敏感，但為電生理檢查。", "D": "MRI 用於評估胸腺瘤，非診斷 MG。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "106-106a-外科-72": {"quick": "腕隧道症候群是「正中神經」受壓迫，故 (B)。", "detail": {"background": "手部周邊神經：(B) 「腕隧道症候群（carpal tunnel syndrome）＝『正中神經（median nerve）』在腕部受壓迫」——正確（拇、食、中指與半個無名指麻痛、大魚際萎縮、夜間加重）。(A) 「肱骨幹骨折」最常傷「『橈神經（radial nerve）』」（致垂腕 wrist drop），非腋神經（腋神經傷於肱骨外科頸/肩脫位）——故 A 錯。(C) 「肘隧道症候群＝『尺神經（ulnar nerve）』在肘部受壓」，非橈神經——故 C 錯。(D) 「大魚際肌萎縮＋手掌（拇食中指）麻木＝『正中神經』」，非尺神經（尺神經傷致小魚際/小指側、爪形手）——故 D 錯。故正確為 (B)。", "options": {"A": "錯。肱骨幹骨折最常傷橈神經（垂腕），非腋神經。", "B": "正確。腕隧道症候群為正中神經受壓。", "C": "錯。肘隧道症候群為尺神經受壓，非橈神經。", "D": "錯。大魚際萎縮＋拇食中指麻為正中神經，非尺神經。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "108a-TNPA-通論-2": {"quick": "Lachman’s test 是測膝十字韌帶，不用於診斷腕隧道症候群，故 (D)。", "detail": {"background": "腕隧道症候群（CTS，正中神經壓迫）的理學檢查：(A) 「拇指外展肌力測試（thumb abduction，測拇短外展肌—正中神經支配）」、(B) 「Tinel’s sign（輕敲腕部正中神經誘發手指麻刺）」、(C) 「Phalen’s test（腕屈曲維持誘發症狀）」——皆適用。(D) 「Lachman’s test」是檢查『膝『前十字韌帶（ACL）』』穩定度的理學檢查，與腕隧道症候群無關——故「較不適當」（答案 D）。確診靠神經傳導/肌電圖。", "options": {"A": "適用。拇指外展肌力測試（正中神經）。", "B": "適用。Tinel’s sign。", "C": "適用。Phalen’s test。", "D": "正確（不適當）。Lachman’s test 測膝 ACL，與 CTS 無關。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "108b-TNPA-通論-31": {"quick": "上運動神經元型神經性膀胱其肛門外括約肌張力試驗為陽性（反射存在），故 (D)。", "detail": {"background": "脊髓損傷的神經性膀胱（neurogenic bladder）分「上運動神經元（UMN，薦髓上病灶）」與「下運動神經元（LMN，薦髓或周邊病灶）」：UMN 型＝「『反射性（痙攣性）膀胱』」（逼尿肌過動、反射性排尿、容量小、可有逼尿肌-括約肌不協調），其「『肛門外括約肌張力/球海綿體反射『陽性（反射存在）』』」（D 正確）。LMN 型＝「『弛緩性膀胱』」（逼尿肌無收縮、『無限制脹滿、滿溢性尿失禁、無尿意』、反射『消失』）。逐項：(A) 錯（反射性排尿是 UMN，非 LMN）；(B) 錯（無限制脹滿無尿意是 LMN，非 UMN）；(C) 錯（LMN 反射『消失』，球海綿體反射陰性）；(D) 正確（UMN 反射存在→肛門括約肌張力試驗陽性）。", "options": {"A": "錯。反射性排尿是 UMN 型，非 LMN。", "B": "錯。無限制脹滿、無尿意是 LMN 型，非 UMN。", "C": "錯。LMN 型反射消失（球海綿體反射陰性）。", "D": "正確。UMN 型反射存在→肛門外括約肌張力試驗陽性。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "109-通論-其他-79": {"quick": "重症肌無力病人術前「不應常規停用」抗膽鹼酯酶治療，故 (B) 為非。", "detail": {"background": "重症肌無力（MG）病人接受麻醉：(A) MG 常以「漸進式的眼外肌（複視、眼瞼下垂）或延髓肌（吞嚥/構音）無力」表現——正確。(C) MG 病人對「『去極化』肌肉鬆弛劑（succinylcholine）『較不敏感（抗性）』」（需較大劑量）——正確。(D) MG 病人對「『非去極化』肌肉鬆弛劑『非常敏感』」（作用增強且延長，須減量並監測）——正確。(B) 「術前『應停用』抗膽鹼酯酶（pyridostigmine）治療」——『不正確（為非）』：一般「『不常規停藥』」（突然停會惡化肌無力；多維持或個別調整，並與麻醉團隊溝通）——故為答案 (B)。MG 術後須警覺呼吸衰竭/肌無力危象。", "options": {"A": "正確。MG 常以眼外肌/延髓肌漸進無力表現。", "B": "為非（答案）。術前不應常規停用抗膽鹼酯酶（恐惡化無力）。", "C": "正確。MG 對去極化肌鬆劑較不敏感（抗性）。", "D": "正確。MG 對非去極化肌鬆劑非常敏感。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "111-進階-外科-60": {"quick": "橈神經是肱骨幹骨折時最常受損的神經，故 (C)。", "detail": {"background": "橈神經（radial nerve）受傷：(C) 「橈神經是『肱骨幹（humeral shaft）骨折』時最常受損的神經」（橈神經溝走行）——正確。其損傷典型表現是「『垂腕（wrist drop）』——無法『伸』腕與伸指、手背虎口區感覺缺失」。逐項：(A) 「無法『屈』腕」錯（橈神經管『伸』腕；屈腕由正中/尺神經）；(B) 「大魚際肌萎縮」是『正中神經』（腕隧道）——非橈神經；(D) 「腕隧道症候群」是『正中神經』壓迫——非橈神經。故正確為 (C)。", "options": {"A": "錯。橈神經管「伸」腕/伸指；垂腕是無法伸腕。", "B": "錯。大魚際萎縮為正中神經。", "C": "正確。橈神經為肱骨幹骨折最常受損的神經。", "D": "錯。腕隧道症候群為正中神經壓迫。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "111-進階-內科-67": {"quick": "靜止性顫抖（睡眠消失）＋齒輪狀僵直＝帕金森氏症，故 (D)。", "detail": {"background": "本例「『不動時（靜止）』顫抖、『睡眠時消失』、肌力正常但『肌張力增加，扳動如轉動齒輪（cogwheel rigidity）』、CT 正常」——是「帕金森氏症（PD）」的典型（靜止性顫抖＋齒輪狀僵直＋動作遲緩；CT 多正常，為臨床診斷）。雖此題分在周邊神經主題，但答案為 PD（D）。對照：慢性脊髓病變（A）為長徑徵象/感覺平面、多發性硬化（B）為時空多發的中樞脫髓鞘、重症肌無力（C）為易疲勞性肌無力（無靜止顫抖/僵直）。故選 (D)。", "options": {"A": "慢性脊髓病變為長徑徵象/感覺異常，無靜止顫抖。", "B": "多發性硬化為中樞脫髓鞘、時空多發。", "C": "重症肌無力為易疲勞性肌無力，無靜止顫抖/齒輪僵直。", "D": "正確。靜止性顫抖＋齒輪狀僵直＝帕金森氏症。"}, "sources": ["Harrison 21e（Parkinson disease and movement disorders）"]}}, "111-通論-5分科-70": {"quick": "上運動神經元病變通常不造成感覺異常；脊髓（腦幹以下）病灶造成同側動作異常，故 (B)、(D) 均給分。", "detail": {"background": "上運動神經元（UMN，皮質脊髓徑）病變特徵：肌張力『增強（痙攣性）』、深部肌腱反射『亢進』、『Babinski sign 陽性』、無明顯肌肉萎縮（早期）、且因屬『運動』徑路「『通常不造成感覺異常』」（B 正確）。關於定位：皮質脊髓徑在『延髓錐體』交叉，故「『腦幹以下（脊髓）』的病灶（交叉之後）造成『同側』之動作異常」（D 正確，本題給分）。逐項：(A) 「肌張力下降、軟弱」錯（那是 LMN）；(C) 「反射增強但『無』Babinski」錯（UMN 有 Babinski 陽性）。故正確為 (B)、(D)（官方均給分）。", "options": {"A": "錯。肌張力下降軟弱無力是下運動神經元。", "B": "給分（正確）。UMN 通常不造成感覺異常。", "C": "錯。UMN 反射增強且 Babinski 陽性。", "D": "給分（正確）。腦幹以下（脊髓，交叉後）病灶造成同側動作異常。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "112-通論-其他-50": {"quick": "Phalen’s test 是「手背靠手背、手腕屈曲 90 度約 60 秒」誘發症狀，故 (B)。", "detail": {"background": "Phalen’s test（用於腕隧道症候群 CTS）：(B) 「請病人『手背靠手背』、使『手腕屈曲（flexion）呈 90 度』維持約 30–60 秒」，若誘發正中神經分布（拇、食、中指）的麻刺感即陽性（屈腕增加腕隧道內壓、壓迫正中神經）——正確。(A) 描述的是「拇指外展肌力測試」；(C) 「手掌對手掌、手腕『過度伸展』」是『反向 Phalen（prayer sign）』；(D) 描述的是「拇指對掌動作」。故正確為 (B)。CTS 另有 Tinel’s sign、確診靠神經傳導檢查。", "options": {"A": "此為拇指外展肌力測試，非 Phalen。", "B": "正確。手背靠手背、手腕屈曲 90 度約 60 秒誘發症狀。", "C": "此為反向 Phalen（手腕過度伸展）。", "D": "此為拇指對掌動作測試。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "113-通論-5分科-8": {"quick": "NP 發揮溝通協調角色不應只是「請病人直接找醫師」，故 (C) 最不適當。", "detail": {"background": "本例腕隧道術後仍麻痛、對醫師強烈不滿，專科護理師發揮「溝通協調」角色：(A) 「傾聽並同理」病人不適——適當；(B) 「耐心解釋術後可能併發症」——適當；(D) 「協助轉介復健科進行復健」——適當（積極解決問題）。(C) 「『請病人直接和手術醫師溝通並表達不滿』」是把問題『推回給病人/醫師』，未發揮 NP 的『居中協調、整合照護』功能——故為最不適當（答案 C）。NP 應主動協調醫病溝通、安排後續處置，而非單純轉介衝突。", "options": {"A": "適當。傾聽並同理病人不適。", "B": "適當。耐心解釋術後併發症可能。", "C": "最不適當（為答案）。只請病人直接找醫師，未發揮協調整合角色。", "D": "適當。協助轉介復健治療。"}, "sources": ["專科護理師溝通協調角色"]}}, "113-通論-5分科-59": {"quick": "前臂大魚際區疼痛、打電腦加重、痠麻、握不穩＝腕隧道症候群，故 (C)。", "detail": {"background": "本例「右前臂與『大魚際』區疼痛、『打電腦（重複手腕動作）加重』、痠麻、近期『握不穩（拇指側肌力下降）』」——是「腕隧道症候群（CTS，正中神經受壓）」的典型（拇、食、中指與半個無名指麻痛、夜間/重複動作加重、大魚際肌無力萎縮）。對照：(A) 急性中風為突發局部神經缺損；(B) 第五頸椎（C5）壓迫為肩/上臂外側症狀；(D) 尺神經損傷為小指/小魚際側與爪形手。故選 (C)。診斷靠 Tinel/Phalen 與神經傳導，處置含護腕、減少重複動作、局部注射、嚴重者手術。", "options": {"A": "急性中風為突發局部神經缺損，非反覆手部症狀。", "B": "C5 神經根壓迫為肩/上臂外側症狀。", "C": "正確。大魚際區痛＋打電腦加重＋握不穩＝腕隧道症候群。", "D": "尺神經損傷為小指/小魚際側、爪形手。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "113-通論-家庭-69": {"quick": "腕隧道症候群麻痛主要在「拇、食、中指」（正中神經），不在小指，故敘述 (A) 錯。", "detail": {"background": "腕隧道症候群（CTS，正中神經受壓）的臨床表徵：(A) 麻木疼痛「主要在『拇指、食指、中指與半個無名指』（正中神經分布）」，「『小指』屬『尺神經』不受影響」——故「主要出現在小指手掌處」錯誤（答案 A）。(B) 「腕屈曲（Phalen）會加重或誘發」——正確；(C) 「夜間症狀明顯加劇」（睡姿腕屈）——正確；(D) 「甩手/抬高或按摩可減輕」——正確（flick sign）。確診靠神經傳導檢查。", "options": {"A": "錯誤（為答案）。CTS 麻痛在拇食中指（正中神經）；小指屬尺神經不受影響。", "B": "正確。腕屈曲（Phalen）加重/誘發。", "C": "正確。夜間症狀加劇。", "D": "正確。甩手/按摩可減輕（flick sign）。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "113-進階-家庭-73": {"quick": "易疲勞、傍晚加重、休息改善、peek sign 陽性＝重症肌無力，故 (B)。", "detail": {"background": "本例「易疲勞、『說話久會構音不清（延髓肌）』、『吃到一半吞嚥困難』、『下午眼睛睜不開（眼瞼下垂）』，且『休息後改善』，peek sign（眼輪匝肌易疲勞，閉眼數秒後眼裂又露出）陽性」——是「重症肌無力（MG）」的典型（易疲勞性、活動後加重/傍晚明顯、休息改善，侵犯眼外肌與延髓肌）。對照：(A) 肉毒桿菌中毒為『下行性』麻痺＋瞳孔散大＋無感覺症狀，急性食因；(C) Guillain-Barré 為『上行性』無力＋反射消失；(D) Lambert-Eaton 為近端無力『活動後『短暫『改善』』（與 MG 相反）＋自律神經症狀＋常合併小細胞肺癌。故選 (B)。診斷 anti-AChR、重複神經刺激；治療 pyridostigmine＋免疫治療。", "options": {"A": "肉毒桿菌中毒為下行性麻痺＋瞳孔散大，急性食因。", "B": "正確。易疲勞、傍晚加重、休息改善、peek sign 陽性＝重症肌無力。", "C": "Guillain-Barré 為上行性無力＋反射消失。", "D": "Lambert-Eaton 為活動後短暫改善＋合併小細胞肺癌。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "114-進階-外科-60": {"quick": "C7 神經根病變最常出現「肩胛骨中間與肩膀」之痠麻痛（並中指/三頭肌），故 (C)。", "detail": {"background": "頸椎神經根病變（cervical radiculopathy）依神經根分布：C7 神經根受壓（常見 C6/7 椎間盤）典型「『肩胛骨內側/中間與肩膀』酸痛，並沿上臂後側、前臂背側放射至『中指』，三頭肌與伸腕/伸指肌力減弱、三頭肌反射減弱」。本題選項中最符合者為 (C) 「肩胛骨中間與肩膀痠麻痛」。對照：C5（肩/上臂外側、三角肌）、C6（前臂橈側、拇/食指、肱二頭肌）、C8（前臂尺側、小指）。故選 (C)。", "options": {"A": "後枕部痠麻較屬高位頸椎/枕神經，非 C7。", "B": "上臂外側較屬 C5。", "C": "正確。C7 根病變常見肩胛骨中間與肩膀痠麻痛（並中指/三頭肌）。", "D": "前胸痠麻非典型 C7 根分布。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "114-通論-5分科-74": {"quick": "腕隧道症候群＝正中神經受壓（①）＋拇指外展肌力減弱（③），故 (B)。", "detail": {"background": "腕隧道症候群（CTS）：① 「『正中神經（median nerve）』受壓迫所致」——正確；③ 「患肢『拇指外展肌力減弱』（拇短外展肌—正中神經支配，嚴重時大魚際萎縮）」——正確。② 「Phalen test＝『手掌心互相靠、手掌與前臂呈 90 度』」描述錯誤——Phalen 是「『手背靠手背、手腕『屈曲』90 度』」（掌心相靠、過度伸展是『反向 Phalen』）——故②錯。④ 「『整個手掌』都會麻」錯——只在『正中神經分布（拇食中指與半無名指）』，『小指（尺神經）不麻』——故④錯。故正確為 ①③＝(B)。", "options": {"A": "12——含②（Phalen 描述錯誤）。", "B": "正確。①正中神經受壓＋③拇指外展肌力減弱。", "C": "24——含②④皆錯。", "D": "34——含④（整手掌麻）錯誤。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "106-106a-通論-29": {"quick": "反覆旋轉性眩暈＋耳鳴＋耳脹＋波動性聽力障礙＝梅尼爾氏症，故 (C)。", "detail": {"background": "本例「突發旋轉性眩暈持續數小時、耳鳴時好時壞、兩耳重壓感（aural fullness）、眼震、其他腦神經正常」——是「梅尼爾氏症（Ménière disease，內淋巴水腫）」的典型，三/四聯為「『陣發性旋轉性眩暈（數十分鐘至數小時）＋耳鳴＋『波動性感覺神經性聽力喪失』＋耳脹滿感』」。對照：(A) 良性姿勢性眩暈（BPPV）＝『極短（<1 分鐘）、姿勢誘發』、無聽力/耳鳴；(B) 前庭神經炎＝持續性眩暈（數天）但『無聽力喪失/耳鳴』、常病毒後；(D) 聽神經瘤＝『漸進性』單側聽損/耳鳴＋平衡障礙。故選 (C)。治療：低鹽、利尿劑、急性期止暈止吐。", "options": {"A": "BPPV 為極短（<1 分）姿勢誘發，無耳鳴/聽損。", "B": "前庭神經炎為持續眩暈但無聽力喪失/耳鳴。", "C": "正確。反覆旋轉眩暈＋耳鳴＋耳脹＋波動聽損＝梅尼爾氏症。", "D": "聽神經瘤為漸進性單側聽損/耳鳴＋平衡障礙。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "107-TNPA-內科-64": {"quick": "懷疑小腦功能障礙時，腦波圖（EEG）較不需要，故 (A)。", "detail": {"background": "本例「眩暈、耳鳴、複視，眼球『橫向性眼震』、『快速交替動作（dysdiadochokinesia）與指對指（指鼻）測試異常』、精細動作協調差」——推測「小腦功能障礙」。鑑別與評估較需要：(B) 「電子眼球震顫儀（ENG）」評估前庭/眼震、(C) 「梅毒血清（VDRL）」排除神經梅毒等可治因、(D) 「MRI」看後顱窩/小腦結構（中風、腫瘤、脫髓鞘）。而 (A) 「腦波圖（EEG）」主要用於『癲癇/瀰漫性腦病變』，對『小腦功能障礙』的診斷『較不需要』——故為答案 (A)。", "options": {"A": "正確（較不需要）。EEG 用於癲癇，對小腦障礙診斷幫助小。", "B": "需要。ENG 評估前庭/眼震。", "C": "需要。VDRL 排除神經梅毒等可治因。", "D": "需要。MRI 看小腦/後顱窩結構病變。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "108b-TNPA-通論-21": {"quick": "梅尼爾氏症的三大典型症狀不含「嘔吐」（嘔吐為伴隨症狀），故 (A)。", "detail": {"background": "梅尼爾氏症（Ménière disease）的「三大典型症狀」是：「① 陣發性『旋轉性眩暈』（B 之外的 D）、② 『耳鳴（tinnitus）』、③ 『時好時壞（波動性）的『感覺神經性聽力喪失』』」（常再加耳脹滿感）。「嘔吐（A）」是眩暈發作時的『伴隨症狀（自律神經反應）』，並非梅尼爾氏症『定義性的三大典型症狀』——故為答案（敘述錯誤者）。本病為內淋巴水腫，治療低鹽、利尿、急性止暈。", "options": {"A": "錯誤（為答案）。嘔吐是伴隨症狀，非三大典型之一。", "B": "是。耳鳴。", "C": "是。波動性感覺神經性聽力喪失。", "D": "是。陣發性旋轉性眩暈。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "108a-TNPA-內科-65": {"quick": "角膜反射異常可能是第五對腦神經（三叉神經，傳入支）損傷，故 (D)。", "detail": {"background": "角膜反射（corneal reflex）的反射弧：『傳入（afferent）＝第五對腦神經（三叉神經 CN V，眼支 V1 感覺）』，『傳出（efferent）＝第七對腦神經（顏面神經 CN VII，眼輪匝肌閉眼）』。題目問「角膜反射異常『可能是哪一對腦神經損傷』」，選項中為「CN V（D）」——三叉神經（傳入支）損傷會使「『患側『感覺不到』』而無眨眼反應（雙側皆不眨）」。（若 CN VII 損傷則『患側無法閉眼』但對側仍眨。）本題答案為 (D) CN V。記憶：角膜反射＝V 進、VII 出。", "options": {"A": "CN II（視神經）管視覺，與角膜反射無關。", "B": "CN III（動眼神經）管眼球運動/瞳孔。", "C": "CN IV（滑車神經）管上斜肌。", "D": "正確。CN V（三叉神經，傳入支）損傷致角膜反射異常。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "109-通論-其他-36": {"quick": "極短（<1 分）、姿勢誘發、聽力正常、Epley 有效＝良性陣發性姿勢性眩暈（BPPV），故 (A)。", "detail": {"background": "本例「眩暈『持續<1 分鐘』、『變換姿勢時特別明顯（姿勢誘發）』、『聽力不受影響』、有眼震、其他腦神經正常，施行『Epley 復位術』後即改善」——是「良性陣發性姿勢性眩暈（BPPV）」的典型（耳石脫落進入半規管，頭位改變誘發短暫旋轉性眩暈；以 Dix-Hallpike 診斷、Epley 耳石復位術治療）。對照：(B) 前庭性偏頭痛（眩暈＋偏頭痛特徵）、(C) 梅尼爾氏症（數十分鐘–數小時＋耳鳴＋波動聽損）、(D) 聽神經瘤（漸進聽損）。故選 (A)。", "options": {"A": "正確。極短姿勢誘發＋聽力正常＋Epley 有效＝BPPV。", "B": "前庭性偏頭痛伴偏頭痛特徵。", "C": "梅尼爾氏症持續較久＋耳鳴＋波動聽損。", "D": "聽神經瘤為漸進性聽損。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "109-進階-內科-73": {"quick": "無法完成雙手快速翻轉拍打（dysdiadochokinesia）＝小腦功能損傷，故 (A)。", "detail": {"background": "本例「常跌倒、拿不住東西、『雙手無法完成快速翻轉拍打（rapid alternating movements）』」——「『輪替動作不能（dysdiadochokinesia）』」是『小腦功能損傷』的徵象（小腦負責協調、平衡、輪替與精細動作）。小腦病變還有：指鼻試驗辨距不良（dysmetria）、意向性顫抖、步態不穩（寬底）、眼震、構音障礙（scanning speech）。對照：(B) 第九對腦神經（舌咽）管吞嚥/味覺、(C) 「對指示不理解」屬語言/認知、(D) 前庭疾病以眩暈為主。故選 (A)。", "options": {"A": "正確。輪替動作不能（dysdiadochokinesia）＝小腦功能損傷。", "B": "第九對腦神經管吞嚥/味覺，非輪替動作。", "C": "對指示不理解屬語言/認知問題。", "D": "前庭疾病以眩暈為主，非輪替動作不能。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "110-通論-其他-53": {"quick": "漸進性單側聽損＋耳鳴＋Weber 偏向健側（感覺神經性聽損）＝聽神經瘤，故 (A)。", "detail": {"background": "本例「『漸進性』左側聽力變差、左耳鳴愈來愈嚴重、頭暈頭痛，『Weber 音叉偏向『右側（健側）』』」——「Weber 偏向健側」代表『患側（左）為感覺神經性聽力喪失（sensorineural）』；漸進性單側感覺神經性聽損＋耳鳴＋平衡/頭痛，最可能是「『聽神經瘤（acoustic neuroma / 前庭神經鞘瘤 vestibular schwannoma，CN VIII）』」（小腦橋腦角腫瘤，可壓迫 CN V、VII）。對照：(C) 中耳炎/(D) 耳垢填塞為『傳導性』聽損—Weber 會偏向『患側』；(B) 梅尼爾為波動性。故選 (A)。診斷以內聽道 MRI。（註：題目「左耳鼓膜較紅」為干擾；Weber 偏健側＋漸進單側感音性聽損指向聽神經瘤。）", "options": {"A": "正確。漸進單側感音性聽損＋耳鳴＋Weber 偏健側＝聽神經瘤。", "B": "梅尼爾氏症為波動性聽損＋反覆眩暈。", "C": "中耳炎為傳導性聽損（Weber 偏患側）。", "D": "耳垢填塞為傳導性聽損（Weber 偏患側）。"}, "sources": ["Harrison 21e（Dizziness and vertigo
