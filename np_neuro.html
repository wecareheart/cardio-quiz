; cranial nerves）"]}}, "112-通論-其他-49": {"quick": "評估顏面神經（CN VII）可請病人「鼓起雙頰」，故 (D)。", "detail": {"background": "顏面神經（CN VII）主管『臉部表情肌』，評估其運動功能可請病人做「『鼓起雙頰』、皺眉抬眉、緊閉雙眼、露齒微笑、吹口哨」等動作，觀察兩側是否對稱。本題選項中屬於 CN VII 的是「鼓起雙頰（D）」。對照：(A) 「咬緊牙關（咀嚼肌）」＝第五對（三叉神經運動支 CN V）；(B) 「伸出舌頭」＝第十二對（舌下神經 CN XII）；(C) 「打哈欠」非特定腦神經評估動作。故選 (D)。", "options": {"A": "咬緊牙關評估三叉神經（CN V 運動支）。", "B": "伸舌評估舌下神經（CN XII）。", "C": "打哈欠非特定腦神經評估動作。", "D": "正確。鼓起雙頰評估顏面神經（CN VII）。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "113-進階-家庭-44": {"quick": "胸腺瘤常合併重症肌無力：複視、眼瞼下垂、呼吸喘、吞嚥困難，故 (B) 1258。", "detail": {"background": "本例「縱膈腔擴大（前縱膈腫塊）」高度懷疑「胸腺瘤（thymoma）」，而胸腺瘤常「合併『重症肌無力（MG）』」（約 30–50% 胸腺瘤有 MG）。MG 的症狀組合：①「複視（眼外肌）」、②「眼瞼下垂（ptosis）」、⑤「呼吸喘（呼吸肌無力／肌無力危象）」、⑧「吞嚥困難（延髓肌）」——故高度懷疑胸腺瘤合併 MG 的症狀為 ①②⑤⑧＝(B)。其餘（③嘔吐、④咳血、⑥抽筋、⑦頭痛）非 MG 典型。診斷：胸部 CT、anti-AChR；治療：胸腺切除可改善 MG。", "options": {"A": "1237——含③⑦非 MG 典型。", "B": "正確。①複視＋②眼瞼下垂＋⑤呼吸喘＋⑧吞嚥困難＝MG（胸腺瘤）。", "C": "2467——含④⑥⑦非 MG。", "D": "3468——非 MG 典型組合。"}, "sources": ["Harrison 21e（Peripheral neuropathy; neuromuscular junction disorders）"]}}, "113-通論-5分科-60": {"quick": "眩暈＋交叉性感覺缺損（同側臉、對側肢體）＋吞嚥嗆咳＋共濟失調＝腦幹中風，故 (C)。", "detail": {"background": "本例「突發眩暈、走路不穩、『左側眼瞼下垂』、『『左側臉』與『右側肢體』對輕觸不敏感（交叉性/分離性感覺缺損）』、『喝水易嗆（延髓吞嚥）』、走路向左傾」——是「『腦幹中風』」的典型（『交叉性徵象 crossed signs』＝同側『臉部（腦神經核）』＋對側『肢體（已交叉的長徑）』，如外側延髓 Wallenberg 症候群：眩暈、Horner、吞嚥困難、同側臉/對側身體痛溫覺喪失、共濟失調）。對照：(A) BPPV（短暫姿勢性、無神經學缺損）、(D) 前庭神經炎（持續眩暈但無交叉徵象）、(B) 小腦中風（共濟失調但無『交叉性感覺』）。『交叉性徵象＋腦神經症狀』指向腦幹，故選 (C)，屬後循環中風急症。", "options": {"A": "BPPV 為短暫姿勢性眩暈，無神經學缺損。", "B": "小腦中風有共濟失調但無交叉性感覺缺損。", "C": "正確。交叉性感覺缺損＋吞嚥嗆咳＋眩暈＝腦幹中風。", "D": "前庭神經炎為持續眩暈但無交叉徵象。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "114-進階-家庭-35": {"quick": "極短（約 1 分）、頭位改變誘發、聽力正常的眩暈＝良性陣發性姿勢性眩暈（BPPV），故 (D)。", "detail": {"background": "本例「突發旋轉性眩暈『只持續約 1 分鐘』、『改變頭部姿勢時誘發』、『聽力無異常』」——是「良性陣發性姿勢性眩暈（BPPV）」的典型（耳石脫落入半規管，頭位改變引發短暫旋轉性眩暈，以 Dix-Hallpike 誘發、Epley 復位術治療）。對照：(A) 梅尼爾氏症（數十分鐘–數小時＋耳鳴＋波動聽損）、(C) 急性前庭神經炎（『持續數天』的眩暈、非姿勢性）、(B) 中樞性眩暈（伴其他腦神經/小腦徵象、不因單純頭位短暫發作）。故選 (D)。", "options": {"A": "梅尼爾氏症持續較久＋耳鳴＋聽損。", "B": "中樞性眩暈伴其他神經學徵象。", "C": "急性前庭神經炎為持續數天的眩暈，非姿勢性短暫。", "D": "正確。極短姿勢誘發＋聽力正常＝BPPV。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "114-通論-5分科-59": {"quick": "雙側對稱、漸進性、高頻感覺神經性聽損、無誘因＝老年性聽力喪失，故 (B)。", "detail": {"background": "本例 73 歲「雙耳『漸進性』聽力減退（吵雜環境聽不清）、無耳痛/耳漏/眩暈、無噪音/耳毒性藥物史、鼓膜完整、Weber 置中、Rinne 雙側『氣導>骨導（正常型，表感覺神經性）』、『雙側對稱性『高頻』聽力喪失』」——是「老年性聽力喪失（presbycusis）」的典型（年齡相關的雙側對稱、漸進、高頻為主之感覺神經性聽損）。對照：(A) 耳垢填塞/(C) 耳硬化症為『傳導性』（Rinne 骨導>氣導、Weber 偏患側）；(D) 噪音性聽損有噪音暴露史、特徵性 4kHz 凹陷。故選 (B)。處置：助聽器。", "options": {"A": "耳垢填塞為傳導性聽損（Rinne 異常）。", "B": "正確。雙側對稱漸進高頻感音性聽損＝老年性聽力喪失。", "C": "耳硬化症為傳導性聽損。", "D": "噪音性聽損有噪音暴露史、4kHz 凹陷。"}, "sources": ["Harrison 21e（Dizziness and vertigo; cranial nerves）"]}}, "114-進階-外科-64": {"quick": "成人最常見的良性腦瘤是腦膜瘤，故 (A)。", "detail": {"background": "成人「『良性』腦瘤」中最常見的是「『腦膜瘤（meningioma）』」（源自蛛網膜帽細胞，多為良性、生長緩慢、女性較多，可因壓迫產生局部症狀/癲癇；許多偶然發現可追蹤）。其次常見的良性腫瘤包括腦下垂體腺瘤（B）、聽神經瘤/前庭神經鞘瘤（C）等。脂肪瘤（D）罕見。（成人整體最常見的『原發惡性』腦瘤為膠質母細胞瘤 GBM；轉移性腦瘤則更常見。）本題問良性，故選 (A) 腦膜瘤。", "options": {"A": "正確。腦膜瘤為成人最常見的良性腦瘤。", "B": "腦下垂體腺瘤常見但次於腦膜瘤。", "C": "聽神經瘤較少見。", "D": "脂肪瘤罕見。"}, "sources": ["Harrison 21e（Primary CNS tumors; meningioma）"]}}, "108b-TNPA-通論-45": {"quick": "區分譫妄 vs 精神病的三大病史問題不含「本次是否有胡言亂語/幻覺」，故 (A)。", "detail": {"background": "區分「急性譫妄」與「急性精神病發作」的三大關鍵病史問題：①「病人發病前的精神與認知『基準』狀態」、②「最近的『藥物/物質』使用史」、③「本次發作的『時間與進程』」。而「本次發作是否伴隨胡言亂語或幻覺（A）」並非『區分』兩者的關鍵——因兩者皆可有幻覺/思考混亂，無鑑別力，故為「不包括」之項目（答案 A）。譫妄有意識/注意力急性波動且可找到全身病因，精神病則意識清醒。", "options": {"A": "正確（不包括）。幻覺/胡言亂語兩者皆可有，無鑑別力。", "B": "是關鍵。發病前精神認知基準狀態。", "C": "是關鍵。最近藥物使用史。", "D": "是關鍵。發作時間與進程。"}, "sources": ["Harrison 21e（Delirium vs psychosis）"]}}}, L={"腦血管疾病與頭痛": {"title": "腦血管疾病與頭痛", "html": "<p><b>核心概念：</b>缺血性／出血性中風的辨識與急性處置（rtPA、取栓、血壓）、蜘蛛膜下腔出血（SAH），以及頭痛鑑別。</p><p><b>缺血性中風：</b>突發局部神經缺損（顏面下垂、單側無力、言語不清；BE-FAST）；頭痛較少（劇烈頭痛偏出血/SAH）。<b>rtPA</b>：年齡≥18、發作<b>4.5 小時</b>內、無出血/大梗塞(>1/3 MCA)、血糖 50–400、血壓須<185/110；劑量 0.9 mg/kg(max 90)。<b>血壓</b>：未打 tPA 者>220/120 才緩降（labetalol/nicardipine，禁舌下 nifedipine）；打 tPA 後維持<180/105。大血管阻塞且顯著缺損→<b>動脈取栓</b>（6–24 小時影像篩選）；惡性 MCA 梗塞腦水腫→<b>減壓顱骨切開術</b>。動脈定位：ACA(額葉、下肢、人格)、MCA(臉/上肢、失語、眼看向病灶)、PCA(偏盲)。</p><p><b>出血性中風／SAH：</b>SAH＝雷擊般劇烈頭痛＋頸僵→<b>非顯影 CT</b>（陰性疑似再腰椎穿刺）→血管攝影找動脈瘤。SAH 處置：控血壓不過高、維持正常血容（不限水）、<b>nimodipine</b> 防血管痙攣（高峰 4–14 天）；常見低血鈉。warfarin 相關 ICH→維生素 K＋FFP/PCC 逆轉。橋腦出血＝深度昏迷＋四肢癱＋針點瞳孔。</p><p><b>頭痛：</b>偏頭痛（單側搏動、噁心畏光畏聲，機轉為腦幹/三叉血管系統）、叢集性（短時密集眼眶痛＋同側流淚鼻水）、張力性（雙側緊箍）；突發爆裂頭痛＝SAH。</p>"}, "癲癇意識障礙與顱內壓": {"title": "癲癇意識障礙與顱內壓", "html": "<p><b>核心概念：</b>癲癇與癲癇重積處置、抗癲癇藥要點、顱內壓（ICP）與腦灌流壓（CPP）管理、GCS 與頭部外傷。</p><p><b>癲癇：</b>單一次「無誘因」發作不一定立即用藥；有誘因（低血糖/鈉/鈣、戒斷）治病因。<b>癲癇重積（>5 分鐘）</b>：ABC＋驗血糖→第一線 <b>benzodiazepine</b>（不需預防性插管）→第二線 phenytoin/valproate/levetiracetam。AED 要點：<b>valproate</b>→監測血氨/肝；<b>carbamazepine</b>→HLA-B*1502 之 SJS（健保給付檢測）、低血鈉、避 MAOI；phenytoin 需負載劑量、快速靜注致心律不整；HLA-B*1502 帶原者 valproate 之 SJS 風險最低。酒精戒斷癲癇：benzodiazepine＋給糖前先 thiamine。</p><p><b>ICP/CPP：</b><b>CPP＝MAP−ICP</b>（MAP=(SBP+2DBP)/3）；目標 ICP<20–22、CPP 60–70（避免<50–60）。降 ICP：頭抬高 30 度、鎮靜、滲透治療（<b>mannitol／高張鹽水</b>）、適度（非過度，PaCO2 35–40；危象才短暫<30–35）、引流 CSF（≤20 mL/hr）、必要時手術；頭部「降低」會升 ICP。propofol 降 ICP，ketamine/吸入劑>1.2 MAC 升 ICP。</p><p><b>GCS/頭部外傷：</b>GCS＝E(4)+V(5)+M(6)；M3 去皮質屈曲、M2 去大腦伸直。鉤回疝＝同側瞳孔放大＋對側肢癱。<b>硬膜外（EDH）</b>＝動脈、清醒期、雙凸狀；<b>硬膜下（SDH）</b>＝靜脈、新月狀。顱底骨折（熊貓眼＋CSF 漏）禁鼻胃管。加拿大 CT 準則：GCS<15(2h)、疑顱骨骨折、嘔吐≥2、年齡≥65。</p>"}, "失智譫妄與認知障礙": {"title": "失智譫妄與認知障礙", "html": "<p><b>核心概念：</b>譫妄 vs 失智的鑑別、各型失智特徵與可逆病因、藥物與照護。</p><p><b>譫妄（delirium）：</b><b>急性、波動（夜間惡化 sundowning）、注意力不集中、意識改變</b>、多因性（感染/藥物/電解質/缺氧/疼痛）；以 <b>CAM</b> 評估（急性波動＋注意力不集中＋思考無組織或意識改變）。處置：找並治療病因＋非藥物（定向、日夜節律、家人）；躁動才用低劑量 <b>haloperidol</b>，<b>避免 benzodiazepine（加重，除戒斷外）與抗膽鹼藥（diphenhydramine）</b>。失智、術後（Mini-Cog 篩）、ICU、酗酒為危險因子。</p><p><b>失智（dementia）：</b><b>阿茲海默（最常見 60–70%）</b>＝隱襲漸進、情節（近期）記憶先損、海馬迴萎縮、tau/Aβ、PET 顳頂葉代謝『減低』、不可逆；藥物乙醯膽鹼酯酶抑制劑（donepezil 等）±memantine(NMDA 拮抗)。<b>血管性</b>（多發梗塞、階梯惡化）。<b>路易氏體</b>＝波動認知＋視幻覺＋類巴金森＋RBD（對抗精神病藥敏感）。<b>額顳葉</b>＝人格/行為或語言。可逆病因：B12、甲狀腺、NPH（失智＋步態＋尿失禁）、感染、憂鬱。常規檢查含 <b>B12、TSH</b>。DSM-5 六認知範疇（不含人格）。照護：維持自理、規律作息、熟悉環境。</p>"}, "神經退化與運動障礙": {"title": "神經退化與運動障礙", "html": "<p><b>核心概念：</b>帕金森氏症與原發性顫抖的鑑別、PD 藥物，及藥物性帕金森症。</p><p><b>帕金森氏症（PD）：</b>三大典型「<b>靜止性顫抖（搓藥丸、動作時減輕）＋僵直（齒輪狀）＋動作遲緩</b>」（＋晚期姿勢不穩）；非運動症狀（嗅覺減退、便秘、RBD、姿位性低血壓、晚期失智）；眨眼減少、面具臉、小碎步前衝、寫字過小（micrographia）、發聲過弱。為臨床診斷（不需左旋多巴試驗確診）。</p><p><b>vs 原發性/老年性顫抖（ET/ST）：</b>ET＝<b>動作/姿勢性</b>顫抖、頻率較快、兩側、<b>喝酒改善、有家族史、無僵直遲緩</b>；PD＝<b>靜止性</b>顫抖、較慢、單側起始、合併僵直遲緩。治療 ET：propranolol/primidone。</p><p><b>PD 藥物：</b><b>levodopa/carbidopa（sinemet）</b>—carbidopa 減噁心、長期有 <b>wearing-off（藥效消退）與異動症</b>、副作用姿位性低血壓、<b>避免大量維生素 B6（降療效）</b>；dopamine agonist—長期幻覺/衝動控制障礙/嗜睡；amantadine—增多巴胺釋放；抗膽鹼藥—對顫抖佳。<b>藥物性帕金森症</b>＝D2 阻斷藥（haloperidol、risperidone、metoclopramide）；amantadine 不會造成。</p>"}, "周邊神經與神經肌肉疾病": {"title": "周邊神經與神經肌肉疾病", "html": "<p><b>核心概念：</b>上 vs 下運動神經元、重症肌無力、GBS、常見壓迫性神經病變與三叉/顏面神經。</p><p><b>UMN vs LMN：</b>UMN＝張力增（痙攣）、反射亢進、Babinski 陽性、無萎縮、<b>無感覺異常</b>；LMN＝張力降、萎縮＋肌束顫動、反射減弱。皮質脊髓徑在延髓交叉，故脊髓（交叉後）病灶造成同側動作異常。</p><p><b>神經肌肉接合處：</b><b>重症肌無力（MG）</b>＝anti-AChR 抗體、<b>易疲勞性無力（活動後加重、傍晚明顯、休息改善）</b>、眼瞼下垂/複視/延髓肌、peek sign；診斷 anti-AChR（最具代表）、重複神經刺激、單纖維 EMG；治療 pyridostigmine＋免疫治療＋胸腺切除（常合併胸腺瘤）；對非去極化肌鬆劑非常敏感、術前不停抗膽鹼酯酶。Lambert-Eaton＝活動後短暫改善＋小細胞肺癌。</p><p><b>周邊神經：</b><b>Guillain-Barré（GBS）</b>＝感染後上行性對稱無力＋反射消失，神經傳導（脫髓鞘）＋CSF 蛋白細胞分離，IVIG/血漿置換。壓迫性：<b>腕隧道＝正中神經</b>（拇食中指麻、夜間加重、Phalen 屈腕/Tinel、大魚際萎縮；不含小指）；肘隧道＝尺神經；肱骨幹骨折＝橈神經（垂腕）；C7 根病變＝肩胛/中指/三頭肌。<b>貝爾氏麻痺＝CN VII 周邊型</b>（含額頭整側臉癱）；<b>三叉神經痛</b>＝CN V 短暫電擊樣臉痛＋扳機點，carbamazepine。脊髓損傷神經性膀胱：UMN 型反射性（括約肌反射陽性）、LMN 型弛緩滿溢。</p>"}, "眩暈腦神經與其他": {"title": "眩暈腦神經與其他", "html": "<p><b>核心概念：</b>周邊性眩暈三大鑑別、中樞性眩暈警訊、腦神經評估與聽力，及常見腦瘤。</p><p><b>周邊性眩暈：</b><b>BPPV</b>＝極短（<1 分）、頭位改變誘發、<b>聽力正常</b>，Dix-Hallpike 診斷、<b>Epley 復位術</b>治療。<b>梅尼爾氏症</b>＝反覆旋轉性眩暈（數十分–數小時）＋<b>耳鳴＋波動性感音聽損＋耳脹</b>（嘔吐是伴隨非三大典型）；低鹽利尿。<b>前庭神經炎</b>＝持續數天眩暈、無聽損（常病毒後）。</p><p><b>中樞性眩暈（警訊）：</b><b>腦幹中風</b>＝交叉性徵象（同側臉＋對側肢體）＋複視/吞嚥嗆咳/構音；<b>小腦</b>＝輪替不能（dysdiadochokinesia）、辨距不良、寬底步態、眼震。懷疑小腦/中樞用 MRI（EEG 較不需要）。</p><p><b>腦神經與聽力：</b>角膜反射＝CN V 進、CN VII 出；CN VII 評估＝鼓頰/皺眉/閉眼；CN XII＝伸舌。<b>聽神經瘤（前庭神經鞘瘤，CN VIII）</b>＝漸進單側感音聽損＋耳鳴＋平衡，Weber 偏健側，內聽道 MRI。傳導性聽損 Weber 偏患側（耳垢、中耳炎、耳硬化）；<b>老年性聽損</b>＝雙側對稱漸進高頻感音性。成人最常見良性腦瘤＝<b>腦膜瘤</b>。胸腺瘤常合併 MG（複視、眼瞼下垂、呼吸喘、吞嚥困難）。</p>"}};
const TORDER=["腦血管疾病與頭痛", "癲癇意識障礙與顱內壓", "失智譫妄與認知障礙", "神經退化與運動障礙", "周邊神經與神經肌肉疾病", "眩暈腦神經與其他"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if((q.answer_status||'').indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if((q.answer_status||'').indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if((q.answer_status||'').indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if((q.answer_status||'').indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 let opts='';
 for(const k of ['A','B','C','D','E']){ if(q.options[k]!==undefined) opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='np_neuro_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render); fKw.oninput=render;
expandBtn=$('#expand'); expandBtn.onclick=()=>{expand=!expand;expandBtn.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
