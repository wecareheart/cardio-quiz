swer_status":"normal","accepted_answers":["D"],"topic":"物質使用與成癮","topic_num":"物質使用與成癮","q_num":17,"roc_year":"113","exam_code":"113030","src":"民國113年","options":{"A":"成癮物質會直接活化酬償系統,產生愉悅感","B":"同儕互相影響是使用成癮物質的因素之一","C":"家庭功能失調是使用成癮物質的因素之一","D":"與對成癮物質的認知無關,不會想戒除"},"img":""},{"id":"113100-N5-14","code":"113100","roc":"113","cat":"N5","catname":"精神科與社區衛生護理學","num":14,"stem":"下列何者最可能為海洛因急性中毒的症狀?","opts":{"A":"講話滔滔不絕","B":"呼吸抑制、昏迷","C":"注意力集中","D":"活動量變大"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"物質使用與成癮","topic_num":"物質使用與成癮","q_num":14,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"講話滔滔不絕","B":"呼吸抑制、昏迷","C":"注意力集中","D":"活動量變大"},"img":""},{"id":"113180-N5-17","code":"113180","roc":"113","cat":"N5","catname":"精神科與社區衛生護理學","num":17,"stem":"林同學高中生,近半年常在週末深夜3~4 點回家,功課一落千丈,精神顯得恍惚、視覺模糊、協調性變差、心跳過速、血壓升高,近來常常夜尿頻繁而求診泌尿科,診斷為物質濫用導致的間質性膀胱炎。林同學最有可能使用下列那種毒品?","opts":{"A":"安非他命","B":"K他命","C":"大麻","D":"flunitrazepam(俗名FM2)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"物質使用與成癮","topic_num":"物質使用與成癮","q_num":17,"roc_year":"113","exam_code":"113180","src":"民國113年","options":{"A":"安非他命","B":"K他命","C":"大麻","D":"flunitrazepam(俗名FM2)"},"img":""},{"id":"114030-N5-17","code":"114030","roc":"114","cat":"N5","catname":"精神科與社區衛生護理學","num":17,"stem":"有關使用嗎啡之敘述,下列何者正確?","opts":{"A":"嗎啡能有效止痛且提神","B":"嗎啡使用後會產生欣快感","C":"嗎啡只能口服使用","D":"護理師可自行斟酌使用"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"物質使用與成癮","topic_num":"物質使用與成癮","q_num":17,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"嗎啡能有效止痛且提神","B":"嗎啡使用後會產生欣快感","C":"嗎啡只能口服使用","D":"護理師可自行斟酌使用"},"img":""},{"id":"114100-N5-18","code":"114100","roc":"114","cat":"N5","catname":"精神科與社區衛生護理學","num":18,"stem":"有關物質使用障礙症所指的耐受性(tolerance),下列敘述何者錯誤?","opts":{"A":"停止使用成癮物質後出現之身心不適","B":"腦部已適應較高的物質濃度,需要更多的物質","C":"需要增加使用量才能達到預期的效果","D":"與使用多種物質的交互作用有關"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"物質使用與成癮","topic_num":"物質使用與成癮","q_num":18,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"停止使用成癮物質後出現之身心不適","B":"腦部已適應較高的物質濃度,需要更多的物質","C":"需要增加使用量才能達到預期的效果","D":"與使用多種物質的交互作用有關"},"img":""},{"id":"114170-N5-1","code":"114170","roc":"114","cat":"N5","catname":"精神科與社區衛生護理學","num":1,"stem":"有關新興影響精神物質(new psychoactive substances, NPS),下列敘述何者最不適當?","opts":{"A":"常被用在派對中","B":"常以茶包、糖果等形式包裝販賣","C":"都是天然、容易被檢測","D":"藥物混用情形嚴重"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"物質使用與成癮","topic_num":"物質使用與成癮","q_num":1,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"常被用在派對中","B":"常以茶包、糖果等形式包裝販賣","C":"都是天然、容易被檢測","D":"藥物混用情形嚴重"},"img":""},{"id":"114170-N5-6","code":"114170","roc":"114","cat":"N5","catname":"精神科與社區衛生護理學","num":6,"stem":"有關抗焦慮藥戒斷症狀,下列何者正確?","opts":{"A":"焦慮、失眠、出汗","B":"記憶受損","C":"動作不協調","D":"言語含糊不清"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"物質使用與成癮","topic_num":"物質使用與成癮","q_num":6,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"焦慮、失眠、出汗","B":"記憶受損","C":"動作不協調","D":"言語含糊不清"},"img":""},{"id":"115030-N5-18","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":18,"stem":"有關愷他命(ketamine)的敘述,下列何者錯誤?","opts":{"A":"在醫學上是用於手術麻醉","B":"容易罹患急性膀胱間質炎","C":"常見中毒症狀是心搏過速、震顫、噁心嘔吐","D":"ketamine屬於第三級毒品"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"物質使用與成癮","topic_num":"物質使用與成癮","q_num":18,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"在醫學上是用於手術麻醉","B":"容易罹患急性膀胱間質炎","C":"常見中毒症狀是心搏過速、震顫、噁心嘔吐","D":"ketamine屬於第三級毒品"},"img":""}],E={"101030-N5-21":{"quick":"物質濫用＝持續使用某物質而不顧問題的惡化。","detail":{"background":"物質濫用的正確敘述:(C)『「持續使用某物質而不顧(因使用所造成)問題的惡化」』——即明知有害(身體、人際、職業、法律問題)仍持續使用。其他錯誤:A 流行的物質濫用種類『與時段、地域及社會階層「有關」』，並非無關;B 物質濫用是否成癮是『「藥物、生物遺傳、心理、社會」多因素交互影響』，並非「主要受遺傳」;D 各種物質濫用的『治療方法「有差異」(依物質不同而異，如替代療法、解毒)』，並非無差異。故 C 正確。","options":{"A":"物質濫用種類與時段、地域、社會階層有關，非無關。","B":"是否成癮是多因素交互影響，非主要受遺傳。","C":"正確。持續使用某物質而不顧問題的惡化。","D":"各種物質濫用的治療方法有差異，非無差異。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101030-N5-28":{"quick":"魏尼凱氏腦病：觀察定向感與記憶障礙以防柯沙科夫症②、補充 Vitamin B1 支持療法④(不可逆③錯)。","detail":{"background":"魏尼凱氏腦病(Wernicke encephalopathy)是酒癮長期酗酒導致『維生素 B1(thiamine)缺乏』的神經系統危害(①)。正確處置:(2)應觀察定向感及是否有持續的記憶障礙，以防範演變為「柯沙科夫症候群(Korsakoff syndrome)」;(4)以「補充 Vitamin B1」的支持療法治療。而(3)『魏尼凱氏腦病是「不可逆」的記憶障礙』錯誤——魏尼凱氏腦病「及時補充 B1 可逆」，若未治療才會進展為「不可逆」的柯沙科夫症候群。故正確為①②④(選 B)。","options":{"A":"123：含③(不可逆)，魏尼凱氏腦病及時治療可逆。","B":"正確。觀察定向感記憶以防柯沙科夫②、補充 B1 支持療法④。","C":"134：含③，錯誤。","D":"234：缺①、含③，錯誤。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","酒精相關"]}},"101030-N5-29":{"quick":"中樞作用：海洛因②、FM2③是抑制劑、古柯鹼④是興奮劑(MDMA①非抑制劑)。","detail":{"background":"藥物濫用對中樞神經的作用:(2)海洛因(heroin，鴉片類)是『中樞神經抑制劑』;(3)FM2(flunitrazepam，BZD)是『中樞神經抑制劑』;(4)古柯鹼(cocaine)是『中樞神經興奮劑』。而(1)『MDMA(搖頭丸)是中樞神經「抑制劑」』錯誤——MDMA 是『中樞神經「興奮劑」兼具迷幻作用』，而非抑制劑。故正確為②③④(選 D)。(記憶:鴉片類、BZD、酒精、強力膠是抑制劑;安非他命、古柯鹼、MDMA 是興奮劑。)","options":{"A":"123：含①(MDMA 抑制劑)，MDMA 是興奮劑。","B":"124：含①，錯誤。","C":"134：含①，錯誤。","D":"正確。海洛因②、FM2③是抑制劑、古柯鹼④是興奮劑。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","物質分類"]}},"101110-N5-9":{"quick":"藥物成癮與藥物本身①、生物遺傳②、社會因素④三者交互影響最有關(法律③非)。","detail":{"background":"藥物成癮的原因是『(1)藥物本身(成癮性)、(2)生物遺傳(體質易感性)、(4)社會因素(環境、同儕、家庭、可近性)』三者「交互影響」的結果。而(3)『法律因素』雖影響物質的可取得性，但「法律」本身並非成癮的「生物心理社會」交互影響因素之一(成癮的核心是藥物-個體-環境的交互作用)。故正確為①②④(選 B)。藥物成癮是「藥物、個體(生物心理)、社會環境」多因素交互的結果。","options":{"A":"123：含③(法律)，非成癮的交互影響因素。","B":"正確。藥物本身①、生物遺傳②、社會因素④交互影響。","C":"134：含③，錯誤。","D":"234：含③、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102030-N5-20":{"quick":"藥物濫用：海洛因是中樞神經抑制劑。","detail":{"background":"藥物濫用的正確敘述:(C)『海洛因(鴉片類)是中樞神經「抑制」劑(抑制呼吸、鎮靜、止痛)』。其他錯誤:A 抗焦慮劑(BZD)『長期使用「會」成癮(產生耐受性與依賴)』，並非安全性高、不會成癮;B 安非他命(興奮劑)中毒症狀(興奮、躁動、妄想)與酒精(抑制劑)中毒症狀『「不」類似』;D 強力膠(吸入劑)對中樞神經有『「抑制」作用』，並非興奮。故 C 正確。","options":{"A":"抗焦慮劑(BZD)長期使用會成癮，非不會。","B":"安非他命(興奮劑)與酒精(抑制劑)中毒症狀不類似。","C":"正確。海洛因是中樞神經抑制劑。","D":"強力膠對中樞神經有抑制作用，非興奮。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102030-N5-23":{"quick":"緩解鴉片(麻醉藥)所誘發的呼吸抑制＝naloxone(鴉片類拮抗劑)。","detail":{"background":"可緩解麻醉藥(鴉片類)所誘發呼吸抑制的藥物是(B)『naloxone(鴉片類「拮抗劑」)』——能競爭性地阻斷鴉片受體、逆轉鴉片過量造成的呼吸抑制、昏迷、針狀瞳孔。chlordiazepoxide(Librium)、lorazepam(Ativan)是 BZD(用於焦慮、酒精戒斷);disulfiram 是戒酒藥(制癮劑)。故 B 正確。naloxone 是鴉片過量(呼吸抑制)的解毒劑。","options":{"A":"chlordiazepoxide(Librium)是 BZD，用於焦慮/酒精戒斷。","B":"正確。naloxone 是鴉片類拮抗劑，可逆轉呼吸抑制。","C":"disulfiram 是戒酒藥(制癮劑)。","D":"lorazepam(Ativan)是 BZD，非鴉片拮抗劑。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鴉片過量"]}},"102030-N5-24":{"quick":"強烈心理依賴、易因精神壓力再發、易誘發妄想型精神病＝安非他命。","detail":{"background":"具有『強烈「心理依賴」、易因精神壓力而再發、危害持續性長、易誘發「妄想型精神病(amphetamine psychosis)」』特性的濫用物質是(C)『安非他命(amphetamine)』——長期使用易出現被害妄想、幻覺等類思覺失調的精神病症狀。海洛因以生理依賴/戒斷為著;古柯鹼也具強烈心理依賴但作用短暫;天使粉(PCP)以解離/暴力為著。本題強調「強烈心理依賴、誘發妄想型精神病」，最對應安非他命。故 C 正確。","options":{"A":"海洛因以生理依賴/戒斷為著。","B":"古柯鹼具強烈心理依賴但作用短暫。","C":"正確。安非他命強烈心理依賴、易誘發妄想型精神病。","D":"天使粉(PCP)以解離/暴力為著。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","安非他命"]}},"102110-N5-16":{"quick":"物質濫用：包含心理、社會與靈性層面的問題。","detail":{"background":"物質濫用最正確的敘述是(A)『包含「心理、社會與靈性」(以及生理)層面的問題(是一種多層面、生物心理社會的疾病)』。其他錯誤:B 物質濫用/成癮是一種『「慢性、易復發」的疾病』，並非「急性發作」;C 成癮『並非單純「缺乏意志力」，而是腦部功能改變的疾病，須「治療」而非僅靠「強制勒戒」』;D『多重藥物濫用者「更易」形成物質依賴』，並非較不易。故 A 正確。物質濫用是涉及生理心理社會靈性的慢性疾病。","options":{"A":"正確。物質濫用包含心理、社會與靈性層面的問題。","B":"物質濫用是慢性、易復發的疾病，非急性發作。","C":"成癮非單純缺乏意志力，須治療而非僅強制勒戒。","D":"多重藥物濫用者更易形成依賴，非較不易。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102110-N5-20":{"quick":"藥物濫用：安非他命會造成破壞性與攻擊性行為及精神症狀改變。","detail":{"background":"藥物濫用嚴重性的正確敘述:(A)『安非他命會造成破壞性與攻擊性行為，以及精神症狀的改變(妄想、幻覺)』。其他錯誤:B BZD 類藥物濫用『「會」產生心理依賴(及生理依賴)』，並非不會;C FM2(flunitrazepam)『長期使用「會」產生耐藥性(耐受性)』，並非不會;D 大麻濫用『「會」產生心理依賴與耐受性』，並非不會。故 A 正確。","options":{"A":"正確。安非他命會造成破壞性、攻擊性行為及精神症狀改變。","B":"BZD 濫用會產生心理依賴，非不會。","C":"FM2 長期使用會產生耐藥性，非不會。","D":"大麻濫用會產生心理依賴與耐受性，非不會。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102110-N5-22":{"quick":"BZD+酒精戒斷的護理「錯誤」者＝督促病人於短期住院中儘速改善。","detail":{"background":"王小姐長期用 BZD、離婚後酗酒+服 BZD 入院。護理處置「錯誤」者為(C)『提供所觀察的慣用防衛機轉，「督促」王小姐於短期住院中「儘速」改善』——錯誤，成癮與心理問題的改變是漸進的過程，「督促儘速改善」會造成壓力、不切實際，且「直接點出其防衛機轉」可能引起防衛。其他正確:A 針對焦慮、顫抖等戒斷症狀，提供安全舒適環境並觀察生命徵象;B 鼓勵表達內心感受、以合理方式處理衝突與壓力;D 與其討論可用的社會資源、鼓勵尋求協助。故本題選錯誤者為 C。","options":{"A":"針對戒斷症狀提供安全環境、觀察生命徵象，正確。","B":"鼓勵表達感受、以合理方式處理壓力，正確。","C":"正確(本題選錯誤者)。督促短期內儘速改善不切實際、造成壓力。","D":"與其討論社會資源、鼓勵尋求協助，正確。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102110-N5-40":{"quick":"美沙冬替代療法：具有減低疾病感染及犯罪的目的。","detail":{"background":"海洛因依賴者的「美沙冬(methadone)替代性療法」的正確敘述:(B)『具有「減低(共用針具的)疾病感染(如 HIV、肝炎)及減少(為購毒而生的)犯罪」之目的』(也維持社會功能)。其他錯誤:A 美沙冬是『「第二級」毒品/管制藥品』，非三級;C『吸毒累犯「也適用」(替代療法的對象包括累犯)』，並非不適用;D『接受替代療法的時間越「長(足夠維持)」，預後越好』，並非「越短越好」。故 B 正確。美沙冬替代療法可減少感染、犯罪、維持功能。","options":{"A":"美沙冬是第二級毒品/管制藥品，非三級。","B":"正確。具有減低疾病感染及犯罪的目的。","C":"吸毒累犯也適用替代療法，非不適用。","D":"接受替代療法時間越長(足夠維持)預後越好，非越短。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","毒品危害防制條例","美沙冬"]}},"103030-N5-37":{"quick":"美沙冬療法＝替代性治療。","detail":{"background":"「美沙冬(methadone)療法」是給海洛因依賴者「以口服、長效、合法管控的鴉片類藥物(美沙冬)取代海洛因」，屬『替代性治療(substitution/maintenance therapy)』——減少戒斷痛苦、降低靜脈注射感染與犯罪。解毒治療是急性戒斷期的處置;自助式團體治療如戒酒匿名會(AA);強制治療是依法強制。故 B 正確。美沙冬療法是以合法藥物替代非法毒品的替代性治療。","options":{"A":"解毒治療是急性戒斷期的處置。","B":"正確。美沙冬療法屬替代性治療。","C":"自助式團體治療如戒酒/戒毒匿名會。","D":"強制治療是依法強制的處置。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","毒品危害防制條例"]}},"103030-N5-39":{"quick":"漸進式成癮發展階段：好奇階段→濫用階段→成癮階段。","detail":{"background":"漸進式成癮發展階段的進展順序是『好奇階段(嘗試、好奇)→濫用階段(規律、過度使用)→成癮階段(生理心理依賴、戒斷、失控)』(選 A)。個體多由「好奇嘗試」開始，進展到「濫用」，最終「成癮」。其他選項的順序或名稱不符成癮發展的階段。故 A 正確。了解此進展有助在早期(好奇/濫用階段)即介入。","options":{"A":"正確。好奇階段→濫用階段→成癮階段。","B":"「習慣→依賴→成癮」非標準的漸進成癮階段名稱。","C":"「好奇→替代→依賴」順序/名稱不符。","D":"「依賴→成癮→替代」順序錯誤。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","成癮發展"]}},"103100-N5-27":{"quick":"「不是」安非他命中毒反應者＝情緒低落。","detail":{"background":"安非他命是「中樞神經興奮劑」，中毒反應為交感興奮:高血壓(A)、心跳增加(C)、失眠(D)、瞳孔放大、躁動、欣快、妄想幻覺等。而(B)『情緒低落』「不是」安非他命「中毒」的反應——情緒低落反而是安非他命「戒斷期(枯竭期)」或「抑制劑」的表現。故本題選不是者為 B。安非他命中毒以「興奮、亢進」為主，情緒低落見於戒斷期。","options":{"A":"高血壓是安非他命中毒(交感興奮)的反應。","B":"正確(本題選不是者)。情緒低落是戒斷期表現，非中毒反應。","C":"心跳增加是安非他命中毒的反應。","D":"失眠是安非他命中毒(興奮)的反應。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","安非他命"]}},"103100-N5-32":{"quick":"物質濫用尿液篩檢：檢視尿液的色澤及溫度(防造假)。","detail":{"background":"物質濫用個案的尿液篩檢，正確處置是(C)『檢視尿液的色澤及溫度(剛排出的尿液溫度約32~38℃)』——以「溫度、色澤」確認檢體為新鮮、真實的尿液，防止以他人尿液、清水或加料造假(這是尿篩防弊的重點)。A『安排「相同日期」反覆收集』不符(應隨機、不預告);B 尿篩『不需「無菌、中段」採集』(那是尿液培養的要求);D 收集時機應依「不同藥物的代謝/可偵測時間」決定，並非一律「72小時內」。故 C 正確。","options":{"A":"應隨機、不預告，非安排相同日期反覆收集。","B":"尿篩不需無菌、中段採集(那是尿液培養的要求)。","C":"正確。檢視尿液的色澤及溫度，防造假。","D":"收集時機依不同藥物的可偵測時間，非一律72小時內。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","尿液篩檢"]}},"104100-N5-20":{"quick":"服鋰鹽的躁鬱病人飲水充足仍口乾＝服用鋰鹽的副作用。","detail":{"background":"吳女士躁鬱症、服鋰鹽，每日飲水約2500cc(充足)、還吃水果，仍感口乾——這是『服用「鋰鹽」的副作用(口乾、口渴、多尿)』。鋰鹽會影響腎臟對水分的處理(可能致腎源性尿崩)，常見口乾、多尿、多飲。A『飲水不足』不符(已喝2500cc);B『酒精戒斷』與本題(躁鬱、服鋰鹽)無關;D『過於注意自己症狀』不符其客觀的口乾。故 C 正確。口乾、多尿、多飲是鋰鹽常見的副作用。","options":{"A":"已飲水2500cc，非飲水不足。","B":"酒精戒斷與本題(躁鬱、服鋰鹽)無關。","C":"正確。口乾是服用鋰鹽的副作用。","D":"她有客觀的口乾，非過於注意症狀。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR"]}},"105090-N5-10":{"quick":"酒精戒斷病人的家庭治療前收集資料「錯誤」者＝家庭的去社會化功能。","detail":{"background":"吳先生酒精戒斷住院、對太太有威脅言行。家庭治療前宜收集的資料:A 家庭的發展過程、B 家庭的因應能力、C 家庭的內外在結構，都是評估家庭功能的重點。而(D)『家庭的「去社會化功能」』錯誤——「去社會化」並非家庭治療評估的項目(家庭是「社會化」的場所，評估的是其發展、結構、因應、溝通、角色等功能)。故本題選錯誤者為 D。","options":{"A":"家庭的發展過程是家庭治療的評估重點。","B":"家庭的因應能力是評估重點。","C":"家庭的內外在結構是評估重點。","D":"正確(本題選錯誤者)。「去社會化功能」非家庭治療的評估項目。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","家庭治療"]}},"106030-N5-10":{"quick":"慢性間質性膀胱炎最常見於＝K他命(ketamine)使用障礙症病人。","detail":{"background":"慢性間質性膀胱炎(膀胱攣縮、頻尿、急尿、血尿、膀胱容量下降)最常見於『K 他命(ketamine)使用障礙症』病人——長期濫用 K 他命會造成『K 他命相關膀胱病變(ketamine-induced cystitis)』，是其特徵性的泌尿系統危害。古柯鹼、海洛因、安非他命不以「間質性膀胱炎」為特徵。故 A 正確。長期使用 K 他命會傷害膀胱，造成嚴重的頻尿、血尿與膀胱攣縮。","options":{"A":"正確。慢性間質性膀胱炎最常見於 K 他命使用障礙症。","B":"古柯鹼不以間質性膀胱炎為特徵。","C":"海洛因不以間質性膀胱炎為特徵。","D":"安非他命不以間質性膀胱炎為特徵。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","K他命"]}},"106030-N5-26":{"quick":"物質使用障礙症：使用過量/過久、想戒卻無效、仍對物質渴求的控制失調。","detail":{"background":"許小姐嗎啡成癮+併用安非他命。物質使用障礙症的正確敘述:(A)『有使用嗎啡過量或過久、持續想要戒除或調控均無效、仍對物質有渴求的「控制失調(impaired control)」』——這正是物質使用障礙的核心特徵(失控的使用與渴求)。其他錯誤:B『耐受性』是指「須「較高(非些微)」劑量」才能達到原效果;C 不同物質的耐受性「不會」互相抵免(用嗎啡有耐受性，不代表安非他命就不需較大量);D 嗎啡成癮會產生「生理依賴」，停藥導致的「身體」不適才是戒斷症狀(不只是心理依賴)。故 A 正確。","options":{"A":"正確。使用過量/過久、想戒卻無效、仍渴求的控制失調。","B":"耐受性是須較高劑量才達原效果，非些微劑量。","C":"不同物質的耐受性不會互相抵免。","D":"嗎啡成癮有生理依賴，戒斷是身體不適，不只心理依賴。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","物質使用障礙"]}},"106030-N5-27":{"quick":"嗎啡的主要戒斷症狀＝食慾不振、打呵欠、流鼻水、肌肉痠痛。","detail":{"background":"嗎啡(鴉片類)的主要戒斷症狀是『類似重感冒的自律神經亢進與不適』:(C)食慾不振、打呵欠、流鼻水、流淚、流汗、瞳孔放大、肌肉痠痛、噁心腹瀉、起雞皮疙瘩、焦躁失眠。A『頻尿、妄想』、D『被害妄想、短暫幻覺』偏向興奮劑(安非他命)的中毒/戒斷;B『呼吸、心跳、血壓「下降」』是鴉片「中毒(過量)」的表現，而非戒斷(戒斷時是交感亢進、血壓心跳「上升」)。故 C 正確。鴉片戒斷以「類流感」的自律神經亢進症狀為主。","options":{"A":"頻尿、妄想偏向興奮劑的表現。","B":"呼吸心跳血壓下降是鴉片中毒(過量)，非戒斷。","C":"正確。食慾不振、打呵欠、流鼻水、肌肉痠痛是嗎啡戒斷症狀。","D":"被害妄想、幻覺偏向興奮劑的表現。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鴉片戒斷"]}},"106030-N5-28":{"quick":"嗎啡(鴉片)中毒的主要症狀＝針狀瞳孔、嗜睡、心跳變慢。","detail":{"background":"嗎啡(鴉片類)中毒(過量)的主要症狀是『中樞抑制三聯徵』:(D)『針狀(縮)瞳孔(pinpoint pupil)、嗜睡/昏迷(意識降低)、呼吸抑制(及心跳變慢、血壓下降)』。A『血壓上升、心跳加快』、B『意識過於警覺、呼吸急促』、C『複視、影像變形、心跳過速』都偏向興奮劑或其他物質。鴉片過量的典型是「針狀瞳孔+呼吸抑制+昏迷」(可用 naloxone 解毒)。故 D 正確。","options":{"A":"血壓上升、心跳加快偏向興奮劑中毒。","B":"意識過於警覺、呼吸急促非鴉片中毒(鴉片是抑制)。","C":"複視、心跳過速非鴉片中毒的典型。","D":"正確。針狀瞳孔、嗜睡、心跳變慢，是鴉片中毒症狀。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鴉片中毒"]}},"106110-N5-22":{"quick":"停用後渴藥、流淚、發汗、瞳孔放大、噁心、骨頭酸痛、失眠＝鴉片類(Opioids)的戒斷反應。","detail":{"background":"長期大量使用後，停用/減用即出現『渴藥、不安、流淚、發汗、瞳孔放大、虛弱無力、噁心、腹痛、骨頭酸痛、失眠』——這是典型的『鴉片類(Opioids，如海洛因、嗎啡)戒斷反應』(類流感的自律神經亢進、瞳孔放大、肌肉骨頭痠痛)。天使塵(PCP)以解離/暴力為著;大麻戒斷較輕微;K 他命戒斷以心理渴求為主。本題症狀群是典型鴉片戒斷，故 A 正確。","options":{"A":"正確。渴藥、流淚、瞳孔放大、骨頭酸痛等是鴉片類的戒斷反應。","B":"天使塵(PCP)以解離/暴力為著。","C":"大麻類的戒斷較輕微。","D":"K 他命戒斷以心理渴求為主。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鴉片戒斷"]}},"106110-N5-26":{"quick":"長期嗅吸致鼻中膈穿孔、肺受損、靜脈注射感染＝古柯鹼(本題送分)。","detail":{"background":"長期「嗅吸」會造成鼻中膈穿孔、肺受損，並因靜脈注射造成感染疾病的濫用物質是『古柯鹼(cocaine)』——鼻吸古柯鹼會使鼻黏膜血管收縮、壞死而致鼻中膈穿孔。安非他命也可能有類似情形，故本題經評定為「送分(各選項均給分)」。理解重點:鼻吸性物質(古柯鹼、安非他命)長期使用會致鼻中膈穿孔，靜脈注射則增加感染風險。本題送分。","options":{"A":"古柯鹼長期鼻吸會致鼻中膈穿孔(本題送分)。","B":"安非他命亦可能致類似情形(本題送分)。","C":"本題送分，各選項均給分。","D":"本題送分，各選項均給分。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","送分題"]}},"107030-N5-26":{"quick":"海洛因物質障礙症的治療：美沙酮替代療法兼具急性解毒與長期維持的雙重角色。","detail":{"background":"古先生海洛因物質障礙症的治療，正確敘述是(C)『美沙酮(Methadone)替代療法用於海洛因的「急性解毒」和「長期維持治療」的雙重角色，且相對(於海洛因)成癮性較低、可控管』。其他錯誤:A 戒癮治療是『「生理、心理、社會」多元架構』，並非「以心理復健為主要架構」;B 美沙酮替代治療須『「在指定的醫療機構由醫護監督下服用」，不可領藥後在家自行服用』(防濫用、轉售);D 制癮劑(Disulfiram)是用於『「酒癮」』(飲酒後產生嫌惡反應)，並非海洛因。故 C 正確。","options":{"A":"戒癮治療是生理心理社會多元架構，非以心理復健為主。","B":"美沙酮須在醫療機構監督下服用，不可帶回家自行服用。","C":"正確。美沙酮替代療法兼具急性解毒與長期維持的雙重角色。","D":"Disulfiram(制癮劑)用於酒癮，非海洛因。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","毒品危害防制條例","美沙冬"]}},"107030-N5-28":{"quick":"成癮個案的五大層面評估：心理層面評估時，護理師須覺察自己對成癮行為的價值、態度與感受。","detail":{"background":"對成癮個案的五大層面評估，正確的是(B)『進行「心理層面」評估時，護理師必須「覺察自己對成癮行為的價值、態度與感受(自我覺察)」』——護理師對成癮者常有負面態度，自我覺察可避免影響治療關係與專業判斷。其他錯誤:A『海洛因的使用型態、影響、危險因子』屬「生理/行為(物質使用史)」層面，非「社會」層面;C 投射、外射等防衛機轉屬「心理」層面，非「智能」層面;D『對物質的渴求與生命的無望感』屬「心理」層面，非「社會」層面。故 B 正確。","options":{"A":"使用型態、影響、危險因子屬生理/物質使用史層面，非社會層面。","B":"正確。心理層面評估時，護理師須覺察自己對成癮行為的價值、態度與感受。","C":"防衛機轉屬心理層面，非智能層面。","D":"物質渴求與無望感屬心理層面，非社會層面。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","成癮評估"]}},"107110-N5-4":{"quick":"社區「認識網路成癮」宣導＝一級預防的社區心理健康活動。","detail":{"background":"里民中心與衛生所共同舉辦「認識網路成癮症候群」宣導——對「一般大眾」進行衛生教育、預防問題發生，屬『一級(初級)預防的社區心理健康活動』。二級預防是早期發現早期治療(篩檢、門診);三級預防是復健(精神復健)。對一般民眾的衛教宣導，是一級預防。故 A 正確。","options":{"A":"正確。對大眾的衛教宣導，屬一級預防的社區心理健康活動。","B":"二級預防是治療(早期發現早期治療)。","C":"門診衛教服務屬二級(已有對象/早期)。","D":"三級預防是精神復健活動。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","三段五級預防"]}},"107110-N5-5":{"quick":"酒精戒斷以交感神經興奮(正腎上腺素增加)為主。","detail":{"background":"羅太太酒精使用障礙、戒斷時有交感神經興奮症狀(心跳血壓上升、流汗、顫抖)。相對正確的敘述是(B)強調『酒精戒斷時「正腎上腺素增加」、交感神經活動增加』(這是酒精戒斷的核心機轉:長期酒精抑制中樞，戒斷時反彈性興奮)。其他明顯錯誤:A『提供微量酒精以緩解戒斷』錯誤(酒精戒斷應以「BZD」治療，不可再給酒精);C 酒精戒斷時 GABA 的抑制功能『「下降(反彈興奮)」』，並非提高;D 酒精性幻覺『多為「視幻覺、觸幻覺」』，並非嗅幻覺。故以 B 為正解。酒精戒斷的本質是中樞抑制的反彈、交感過度興奮。","options":{"A":"酒精戒斷應以 BZD 治療，不可再給酒精。","B":"正確。酒精戒斷以正腎上腺素增加、交感神經興奮為主。","C":"酒精戒斷時 GABA 抑制功能下降(反彈興奮)，非提高。","D":"酒精性幻覺多為視幻覺、觸幻覺，非嗅幻覺。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","酒精戒斷"]}},"107110-N5-7":{"quick":"MDMA(搖頭丸)：中樞神經興奮劑，最嚴重可致橫紋肌溶解或急性腎衰竭。","detail":{"background":"物質使用障礙的正確敘述:(D)『MDMA(搖頭丸)屬「中樞神經興奮劑」，最嚴重後果可能是「橫紋肌溶解或急性腎衰竭」(因過度活動、高體溫、脫水)』。其他錯誤:A 酒精使用障礙的中樞神經病變與『維生素「B1」缺乏』有關(非維生素 A)，且若進展為「柯沙科夫症候群」則是「不可逆」(非可逆，戒酒後也未必改善);B 海洛因「戒斷」最常見的是「類流感」症狀(瞳孔放大、肌肉痠痛、流淚)，而「呼吸抑制、針狀瞳孔、嗜睡」是「中毒(過量)」的三大症狀，非戒斷;C K 他命是「中樞神經「解離性麻醉劑」」，而非興奮劑，且戒斷症狀「不明顯」(以心理渴求為主)。故 D 正確。","options":{"A":"酒精中樞病變與 B1 缺乏有關(非 A)，柯沙科夫不可逆。","B":"呼吸抑制、針狀瞳孔、嗜睡是海洛因「中毒」三大症狀，非戒斷。","C":"K 他命是解離性麻醉劑，非興奮劑，戒斷不明顯。","D":"正確。MDMA 是中樞興奮劑，最嚴重可致橫紋肌溶解或急性腎衰竭。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","物質分類"]}},"108110-N5-28":{"quick":"物質使用障礙的護理態度：協助接納是疾病①、保持中立不批評③、需長期努力且第一步是禁止再使用④(不常合併道德法律問題②錯)。","detail":{"background":"護理師對物質使用障礙病人的態度:(1)應協助病人了解及接納這是一種「疾病」、需接受治療才可恢復;(3)護理師應保持「中立及不批評」的態度;(4)治療及復健需長期不斷努力、治療的第一步是「禁止再使用(停止使用物質)」。而(2)『這類病人「不常」合併道德與法律問題』錯誤——物質使用障礙病人「常」合併道德、法律問題(犯罪、家庭、職業問題)，護理師仍須自我評估態度。故正確為①③④(選 C)。","options":{"A":"123：含②(不常合併道德法律問題)，錯誤。","B":"124：含②，錯誤。","C":"正確。接納是疾病①、中立不批評③、長期努力且第一步禁止再使用④。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"109030-N5-8":{"quick":"酒癮病人家屬參加支持性團體的主要目的＝增進家屬的因應行為。","detail":{"background":"鼓勵酒精使用障礙病人的家屬參加「照顧者支持性團體」，其主要目的是(C)『增進「家屬」的因應行為(學習如何面對、照顧、設立界限、自我照顧、獲得支持)』——支持性團體的對象是「家屬」，目的在提升家屬的因應能力與支持，而非直接改變病人。A『改變病人的問題行為』、B『幫助病人獲得醫療照護』是針對病人;D『預防家屬出現物質濫用』非主要目的。故 C 正確。照顧者支持團體著重提升家屬自身的因應與支持。","options":{"A":"改變病人的問題行為是針對病人，非家屬團體的主要目的。","B":"幫助病人獲得醫療照護是針對病人。","C":"正確。增進家屬的因應行為，是家屬支持團體的主要目的。","D":"預防家屬物質濫用非主要目的。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","家屬支持團體"]}},"109030-N5-29":{"quick":"物質使用障礙「錯誤」者＝精神動力學說認為固著在「性蕾期」(應為口腔期)。","detail":{"background":"物質使用障礙的敘述，「錯誤」者為(B)『精神動力學說認為此種個案的發展固著在「性蕾期(性器期)」』——錯誤，精神動力學說認為成癮個案的發展固著在『「口腔期(oral stage)」』(以口腔的滿足、依賴來因應焦慮)。其他正確:A 酒精使用障礙與「乙醛脫氫酶(ALDH)」的代謝有關(代謝差者易臉紅、不適);C 父母為酗酒者，子女酗酒比例比一般人高(遺傳+環境);D 青少年常因好奇、尋求同儕認同，在朋友邀約慫恿下嘗試。故本題選錯誤者為 B。","options":{"A":"酒精使用障礙與乙醛脫氫酶(ALDH)代謝有關，正確。","B":"正確(本題選錯誤者)。精神動力學說認為固著在「口腔期」，非性蕾期。","C":"父母酗酒、子女酗酒比例較高，正確。","D":"青少年因好奇、尋求同儕認同而嘗試，正確。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"109030-N5-30":{"quick":"酒癮的護理目標：長期目標為持續追蹤、強化支持、預防再度使用。","detail":{"background":"酒精使用障礙的護理目標，正確的是(C)『「長期」目標為「持續追蹤、強化支持、預防再度使用(復發)」』。其他錯誤:A『斷絕酒精和其他物質來源』與 B『處理戒斷症狀和預防合併症』是「短期/急性期」的目標(戒斷期的安全處置)，並非中期目標的劃分如此;D『大多數能在短時間戒斷、可採漸進式戒除』錯誤——酒精戒斷可能危及生命(如震顫性譫妄)，且戒斷應以「完全戒除+醫療監測(BZD)」處理，並非「漸進式戒除(慢慢減量飲酒)」。故 C 正確。","options":{"A":"斷絕來源、處理戒斷是短期/急性期目標。","B":"處理戒斷症狀、預防合併症是急性期目標。","C":"正確。長期目標為持續追蹤、強化支持、預防再度使用。","D":"酒精戒斷有生命危險，應完全戒除+醫療監測，非漸進式戒除。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"110030-N5-25":{"quick":"耐受性(tolerance)＝腦部及身體已適應較高的物質濃度，需更多物質才能達原效果。","detail":{"background":"依 DSM-5，物質使用障礙的「耐受性(tolerance)」是(D)『腦部及身體已「適應較高的物質濃度」，因此「需要更多的物質」才能達到原來的效果(或同劑量的效果下降)』。其他選項是別的診斷準則:A『花時間尋找/使用物質』是「投入大量時間」;B『停止使用會導致身心不適』是「戒斷(withdrawal)」;C『明知對身體有害仍持續使用』是「不顧後果持續使用」。故 D 正確。耐受性的核心是「需更高劑量才能達原效果」。","options":{"A":"「花時間尋找使用物質」是「投入大量時間」的準則。","B":"「停止使用導致身心不適」是「戒斷」。","C":"「明知有害仍持續使用」是另一準則。","D":"正確。耐受性是需要更多物質才能達原來效果。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 物質使用障礙"]}},"110030-N5-26":{"quick":"美沙冬替代海洛因的原因「錯誤」者＝不會造成依賴。","detail":{"background":"美沙冬(Methadone)作為海洛因替代治療的原因，「錯誤」者為(D)『「不會」造成依賴』——錯誤，美沙冬本身也是鴉片類藥物、「會造成生理依賴」，只是「以合法、可控管、長效口服」的方式取代海洛因，使病人穩定、可逐步減量。其他正確(替代療法的優點):A 避免使用針頭、減少 HIV(及肝炎)傳染;B 較少欣快感、長效平穩;C 提升日常生活功能後較能正常就業。故本題選錯誤者為 D。","options":{"A":"避免針頭、減少 HIV 傳染，正確。","B":"較少欣快感、長效平穩，正確。","C":"提升日常功能後較能正常就業，正確。","D":"正確(本題選錯誤者)。美沙冬本身是鴉片類，會造成依賴。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","毒品危害防制條例","美沙冬"]}},"110030-N5-27":{"quick":"酒精成癮致維尼克氏腦症＝長期缺乏維生素 B1。","detail":{"background":"酒精成癮病人因長期缺乏『維生素 B1(thiamine，硫胺)』，導致『維尼克氏腦症(Wernicke encephalopathy)』:典型三聯徵為「意識障礙、眼肌麻痺(eye)、運動失調(ataxia)」。維生素 A、D、K 與此無關。故 B 正確。酒癮者因營養不良、B1 吸收與利用受損而缺乏 B1，治療與預防須「補充 B1」(且補糖前先給 B1，以免誘發 Wernicke)。","options":{"A":"維生素 A 缺乏與夜盲、皮膚有關，非 Wernicke。","B":"正確。長期缺乏維生素 B1 導致維尼克氏腦症。","C":"維生素 D 缺乏與骨骼有關，非 Wernicke。","D":"維生素 K 缺乏與凝血有關，非 Wernicke。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","Wernicke"]}},"110110-N5-12":{"quick":"BZD 的護理指導：長期服用可能造成依賴，戒斷時宜逐漸減量。","detail":{"background":"Benzodiazepine(BZD)的護理指導，最適當的是(D)『長期服用 BZD 可能造成「依賴」，「戒斷時宜逐漸減量(不可驟停)」』——驟停 BZD 可能引發反彈性焦慮、失眠、甚至癲癇，故須逐步減量。其他錯誤:A BZD 並非「改善記憶」(反而可能影響記憶);B BZD『「可以」用來抗焦慮(也鎮靜安眠)』，並非無法抗焦慮;C 建議勿飲酒的主因是『酒精與 BZD 都是中樞抑制劑，併用會「加重中樞抑制(呼吸抑制、過度鎮靜)」』，而非「酒精促排尿排出 BZD」。故 D 正確。","options":{"A":"BZD 並非改善記憶(反而可能影響)。","B":"BZD 可以用來抗焦慮，非無法抗焦慮。","C":"勿飲酒是因酒精+BZD 加重中樞抑制，非促排尿。","D":"正確。長期服用可能造成依賴，戒斷時宜逐漸減量。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","BZD"]}},"110110-N5-28":{"quick":"物質使用障礙心理治療「錯誤」者＝動機式晤談以「直接面質」為原則。","detail":{"background":"物質使用障礙心理治療的敘述，「錯誤」者為(B)『採用動機式晤談(motivational interview)法，以「直接面質」為治療的原則』——錯誤，動機式晤談強調『「同理、不爭辯、引發改變動機、尊重自主」』，「避免直接面質」(直接面質會引起抗拒)。其他正確:A 此治療多在個案恢復期執行，可疏導內心問題;C 與家庭及心理因素相關，須追索問題根源;D 可疏導內心問題、引導以正向方式發洩憤怒與不滿。故本題選錯誤者為 B。","options":{"A":"多在個案恢復期執行、疏導內心問題，正確。","B":"正確(本題選錯誤者)。動機式晤談以同理、不面質為原則，非直接面質。","C":"與家庭及心理因素相關、須追索根源，正確。","D":"疏導內心問題、引導正向發洩，正確。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","動機式晤談"]}},"110110-N5-29":{"quick":"美沙冬：為口服藥劑，可減少因共用針頭引起的疾病感染。","detail":{"background":"美沙冬(Methadone)的正確敘述:(D)『為「口服」藥劑，可減少因「共用針頭(靜脈注射海洛因)」引起的疾病感染(如 HIV、肝炎)』。其他錯誤:A 美沙冬用於『「海洛因(嗎啡類)」成癮』的替代，而非 K 他命;B 美沙冬『「會」有蓄積性、長期使用須適當調整劑量(可逐步減量)』，並非「不需減少劑量」;C 美沙冬本身是鴉片類，『「會」有呼吸抑制、欣快感(較弱)和戒斷症狀』，並非不會。故 D 正確。美沙冬以口服、長效取代靜脈注射海洛因，減少感染與犯罪。","options":{"A":"美沙冬用於海洛因(嗎啡類)成癮，非 K 他命。","B":"美沙冬會有蓄積性、須適當調整劑量。","C":"美沙冬是鴉片類，會有呼吸抑制、戒斷症狀。","D":"正確。為口服藥劑，可減少共用針頭引起的疾病感染。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","毒品危害防制條例","美沙冬"]}},"111030-N5-6":{"quick":"護理師因自身丈夫酗酒、對酒癮病人焦慮生氣＝負面情感反轉移。","detail":{"background":"陳護理師因「自己先生喝酒問題」的個人經驗，對即將接的酒精使用障礙病人「感到焦慮、生氣」——這是護理師把『對自身相關經驗(先生酗酒)的負面情緒，投射到「病人」身上』，屬『「負面」情感「反轉移(countertransference)」』(護理師對病人的情緒反應)。情感「轉移」是「病人對護理師」的情緒;本題是「護理師對病人」、且是負面的，故為負面情感反轉移。故 D 正確。","options":{"A":"正面情感轉移是病人對護理師的正面情緒。","B":"負面情感轉移是病人對護理師的負面情緒。","C":"正面情感反轉移是護理師對病人的正面情緒。","D":"正確。護理師對病人的負面情緒(源自自身經驗)，是負面情感反轉移。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","情感反轉移"]}},"111030-N5-7":{"quick":"接觸病人前優先：自我覺察「這類診斷的病人會讓自己感到不適」。","detail":{"background":"陳護理師察覺自己對酒癮病人有負面反轉移。與新病人接觸前，宜優先(C)『「自我覺察」這類診斷的病人會讓自己感到不適』——透過自我覺察、辨識自己的情緒與來源，才能避免反轉移影響專業照護(必要時尋求督導)。A『隱藏自己內心的焦慮與生氣』是壓抑、未處理;B『請護理長改由他人接』是逃避(且非優先，覺察與處理才是);D『不能有任何情緒』不切實際(人都有情緒，重點是覺察與管理)。故 C 正確。處理反轉移的第一步是自我覺察。","options":{"A":"隱藏焦慮生氣是壓抑、未處理。","B":"請他人接是逃避，非優先(先覺察處理)。","C":"正確。優先自我覺察這類病人會讓自己感到不適。","D":"「不能有任何情緒」不切實際，重點是覺察與管理。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","情感反轉移"]}},"111030-N5-27":{"quick":"海洛因中毒症狀「錯誤」者＝瞳孔放大(應為針狀/縮瞳)。","detail":{"background":"海洛因(鴉片類)中毒(過量)的症狀，「錯誤」者為(A)『瞳孔「放大」』——錯誤，海洛因中毒的典型是『「針狀(縮)瞳孔(pinpoint pupil)」』，而非放大。其他正確(鴉片中毒=中樞抑制):B 心跳變慢;C 昏迷(意識降低);D 呼吸抑制。故本題選錯誤者為 A。鴉片中毒的三大典型是「針狀瞳孔+呼吸抑制+昏迷」(瞳孔放大反而見於鴉片「戒斷」或興奮劑中毒)。","options":{"A":"正確(本題選錯誤者)。海洛因中毒是針狀(縮)瞳孔，非放大。","B":"心跳變慢是海洛因中毒(中樞抑制)的表現。","C":"昏迷是海洛因中毒的表現。","D":"呼吸抑制是海洛因中毒的表現。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鴉片中毒"]}},"111030-N5-28":{"quick":"酒精成癮治療「錯誤」者＝以 BZD 與「α1-Blockers」治療自主神經亢奮症狀。","detail":{"background":"酒精成癮治療的敘述，「錯誤」者為(B)『以 BZD 與「α1-Blockers」藥物治療自主神經亢奮症狀』——錯誤，酒精戒斷的自主神經亢奮主要以『「BZD」』為核心治療，必要時輔以「β-blocker 或 clonidine(α2-促效劑)」，而非「α1-blocker」。其他相對正確:A 以鴉片拮抗劑(naloxone)鑑別/矯正可能合併的鴉片性意識昏迷;C 戒酒發泡錠(disulfiram)抑制乙醛脫氫酶、干擾酒精代謝(飲酒後乙醛堆積產生嫌惡反應);D 宜合併心理治療。故本題選錯誤者為 B。","options":{"A":"以 naloxone 鑑別/矯正合併的鴉片性昏迷，相對可接受。","B":"正確(本題選錯誤者)。應以 BZD 為核心，輔以 β-blocker/clonidine，非 α1-blocker。","C":"disulfiram 干擾酒精代謝、產生嫌惡反應，正確。","D":"宜合併心理治療，正確。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","酒精戒斷治療"]}},"111110-N5-5":{"quick":"安非他命(安公子)的戒斷症狀＝全身耗竭虛脫、憂鬱沮喪。","detail":{"background":"安非他命(俗稱安公子，中樞興奮劑)的戒斷症狀最可能是(B)『全身耗竭虛脫、憂鬱沮喪(及嗜睡、疲倦、食慾增加、強烈渴求)』——興奮劑戒斷是「興奮的反向(枯竭期)」，出現精力耗竭、憂鬱、無力。A『精力旺盛』、D『注意力集中』是安非他命「中毒(使用中)」的表現;C『肌肉僵直』非典型。故 B 正確。安非他命戒斷以「枯竭、憂鬱、疲倦、渴求」為主(此期自殺風險須留意)。","options":{"A":"精力旺盛是安非他命中毒(使用中)的表現。","B":"正確。安非他命戒斷是全身耗竭虛脫、憂鬱沮喪。","C":"肌肉僵直非安非他命戒斷的典型。","D":"注意力集中是中毒(使用中)的表現。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","安非他命戒斷"]}},"111110-N5-7":{"quick":"BZD：可減緩病人因酒精戒斷產生的不適。","detail":{"background":"Benzodiazepine(BZD)的正確注意事項是(B)『可「減緩病人因酒精戒斷產生的不適」(BZD 是酒精戒斷的首選用藥，與酒精同為中樞抑制、可交叉耐受)』。其他錯誤:A 海洛因成癮替代療法的主要用藥是『「美沙冬」』，而非 BZD;C 短效型 BZD 的半衰期是『「短」(數小時)』，並非「12小時以上」;D 長期使用 BZD『「會」發生耐受性、成癮性和戒斷症狀』，並非不會。故 B 正確。BZD 是酒精戒斷的首選治療藥物。","options":{"A":"海洛因替代療法主要用美沙冬，非 BZD。","B":"正確。BZD 可減緩酒精戒斷產生的不適(首選用藥)。","C":"短效型 BZD 半衰期短(數小時)，非12小時以上。","D":"長期使用 BZD 會有耐受性、成癮性、戒斷症狀。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","BZD·酒精戒斷"]}},"111110-N5-26":{"quick":"長期飲酒、入院第二天心跳快血壓升大量流汗、看到蛇＝震顫性譫妄(delirium tremens)。","detail":{"background":"張先生長期飲酒、反覆戒酒、入院「第二天(戒斷後48~72小時)」出現『心跳過快、血壓升高、大量流汗(嚴重自律神經亢進)、看到蛇(視幻覺)』——這是酒精戒斷最嚴重的『震顫性譫妄(delirium tremens, DTs)』:意識混亂、定向感障礙、嚴重自律神經亢進、生動的幻覺(常見視幻覺、蟲蛇)，多在戒酒後48~96小時出現，有致命風險。酒精性失憶、躁症、癲癇不符此整體表現。故 D 正確。DTs 是醫療急症，須 BZD 治療與密切監測。","options":{"A":"酒精性失憶以記憶缺損為主，非本題的譫妄+幻覺。","B":"躁症發作是情緒高昂，非戒斷後的譫妄。","C":"癲癇發作是抽搐，本題是譫妄+幻覺。","D":"正確。戒斷後自律神經亢進+幻覺+意識混亂，是震顫性譫妄(DTs)。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","震顫性譫妄"]}},"111110-N5-27":{"quick":"心理依賴(psychological dependence)＝強烈對物質的渴求，為避免不愉快感受而持續/間歇使用。","detail":{"background":"物質使用障礙的「心理依賴(psychological dependence)」是(B)『「強烈對物質的渴求」，為「避免不愉快的感受(及追求愉悅)」，而持續或間歇式地使用該物質』——心理依賴的核心是「心理上的渴求與強迫性使用」。其他選項:A『花時間尋找物質』是另一準則;C『明知有害仍持續使用』是不顧後果使用;D『停止使用導致「身體」不適』是「生理(身體)依賴/戒斷」，而非心理依賴。故 B 正確。心理依賴=心理渴求;生理依賴=戒斷時的身體不適。","options":{"A":"「花時間尋找物質」是另一準則，非心理依賴的定義。","B":"正確。強烈渴求、為避免不愉快感受而持續/間歇使用，是心理依賴。","C":"「明知有害仍使用」是不顧後果使用。","D":"「停止使用導致身體不適」是生理依賴/戒斷。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","心理依賴"]}},"111110-N5-28":{"quick":"物質使用障礙追蹤輔導「錯誤」者＝主要採取「住院」方式實施輔導。","detail":{"background":"物質使用障礙個案的追蹤輔導，「錯誤」者為(C)『主要採取「住院」方式實施輔導』——錯誤，追蹤輔導(復發預防)主要在『「社區/門診」進行(定期諮商、社區支持、自助團體)』，而非住院(住院是急性戒斷/解毒期)。其他正確:A 降低個案渴求物質與預防再發(復發);B 建立健康與調適的生活型態;D 定期諮商以及協助個案參加治療。故本題選錯誤者為 C。追蹤輔導以社區/門診的持續支持為主。","options":{"A":"降低渴求、預防再發是追蹤輔導的目標，正確。","B":"建立健康與調適的生活型態，正確。","C":"正確(本題選錯誤者)。追蹤輔導以社區/門診為主，非住院。","D":"定期諮商、協助參加治療，正確。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"112030-N5-27":{"quick":"物質使用障礙治療「錯誤」者＝Wernicke 腦病變以維生素 C 治療(應為 B1)。","detail":{"background":"物質使用障礙治療原則，「錯誤」者為(D)『長期飲酒導致威尼克氏腦病變，可口服或注射「維生素 C」治療』——錯誤，Wernicke 腦病變是『維生素「B1(thiamine)」缺乏』所致，須補充「維生素 B1」(非維生素 C)。其他正確:A 安非他命中毒急性期可洗胃、給維生素 C「酸化尿液」以促排出;B 制癮劑(Disulfiram)使飲酒後不舒服而減少使用;C 美沙冬口服替代海洛因、減少共用針頭的感染。故本題選錯誤者為 D。","options":{"A":"安非他命中毒可洗胃、維生素 C 酸化尿液促排出，正確。","B":"Disulfiram 使飲酒後不適而減少使用，正確。","C":"美沙冬口服替代海洛因、減少針頭感染，正確。","D":"正確(本題選錯誤者)。Wernicke 須補充維生素 B1，非維生素 C。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","Wernicke"]}},"112030-N5-28":{"quick":"物質使用障礙的生理層面護理「較不適宜」＝儘可能協助病人日常生活自我照顧(應鼓勵自我照顧)。","detail":{"background":"物質使用障礙的生理層面護理，「較不適宜」者為(C)『「儘可能協助」病人日常生活自我照顧』——應「鼓勵並引導病人「自己」執行日常生活自我照顧(維持功能、避免依賴)」，而非「儘可能代為協助」(過度協助會助長依賴，與成癮治療強調的「負責、自主」相違)。其他適宜:A 監測生命徵象與戒斷症狀;B 提供安全的環境;D 維持營養與水分、電解質的平衡。故本題選較不適宜者為 C。","options":{"A":"監測生命徵象與戒斷症狀，適宜。","B":"提供安全的環境，適宜。","C":"正確(本題選較不適宜者)。應鼓勵病人自我照顧，非儘可能代為協助。","D":"維持營養與水分、電解質平衡，適宜。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"112030-N5-36":{"quick":"急診室藥物成癮最常見問題「錯誤」者＝夢遊。","detail":{"background":"急診室中藥物使用障礙(藥物成癮)最常見的問題，「錯誤(非常見)」者為(D)『夢遊』——夢遊(睡眠障礙的一種)並非藥物成癮在急診最常見的問題。其他屬常見的急診問題:A 海洛因戒斷症狀(如肌肉痙攣、骨頭痛);B 譫妄狀態(如酒精戒斷的震顫性譫妄);C 急性精神病(如安非他命中毒誘發的妄想幻覺)。故本題選錯誤者為 D。藥物成癮在急診常見中毒、戒斷、譫妄、急性精神病等問題。","options":{"A":"海洛因戒斷(肌肉痙攣、骨頭痛)是常見的急診問題。","B":"譫妄狀態(如戒斷譫妄)是常見的急診問題。","C":"急性精神病(如興奮劑中毒)是常見的急診問題。","D":"正確(本題選錯誤者)。夢遊非藥物成癮在急診最常見的問題。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"112110-N5-27":{"quick":"酒精使用障礙「錯誤」者＝常因維生素 E 缺乏而周圍神經病變(應為維生素 B 群)。","detail":{"background":"酒精使用障礙的敘述，「錯誤」者為(C)『常因營養不良及「維生素 E」缺乏，而發生周圍神經病變』——錯誤，酒癮者的周圍神經病變主要與『維生素「B1/B 群」缺乏』有關，而非維生素 E。其他正確:A 酒精主要在小腸吸收(空腹吸收快);B 酒精戒斷可能產生戒斷譫妄(delirium tremens);D 酒精戒斷會出現焦慮、手抖、流汗等自律神經亢進症狀。故本題選錯誤者為 C。酒癮的神經病變與 B 群維生素(尤其 B1)缺乏有關。","options":{"A":"酒精主要在小腸吸收，相對可接受。","B":"酒精戒斷可能產生戒斷譫妄，正確。","C":"正確(本題選錯誤者)。周圍神經病變與維生素 B 群缺乏有關，非維生素 E。","D":"戒斷會出現焦慮、手抖、流汗，正確。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","酒精相關"]}},"112110-N5-28":{"quick":"鴉片類物質越「短效」，引起的戒斷症狀「越短、愈強」。","detail":{"background":"鴉片類物質的作用與戒斷的通則:(B)『作用越「短效」的鴉片類(如海洛因)，引起的戒斷症狀「發作越快、強度越強、持續時間越短」』;反之，長效的鴉片類(如美沙冬)戒斷症狀「發作較慢、較緩和、持續較久」。這也是為何以「長效的美沙冬」替代「短效的海洛因」可使戒斷較平穩。故 B 正確。短效物質代謝快，戒斷來得快、強，但持續較短。","options":{"A":"短效物質的戒斷症狀持續較短，非越長愈強。","B":"正確。越短效，戒斷症狀越短、愈強。","C":"短效物質的戒斷強度大，非輕微。","D":"短效物質的戒斷強度大，非輕微。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鴉片戒斷"]}},"112180-N5-19":{"quick":"酒癮：戒斷症狀短時間內發生持續5~7天①、戒斷有焦慮厭食失眠顫抖③、常營養不良及維他命B群缺乏④(戒斷譫妄以聽幻覺為主②錯)。","detail":{"background":"酒癮病人的正確敘述:(1)停止喝酒後，戒斷症狀會在很短的時間內發生(數小時內)，且持續約5~7天;(3)戒斷症狀包括焦慮、厭食、失眠、顫抖等(自律神經亢進);(4)常有營養不良和維他命 B 群缺乏。而(2)『酒精戒斷譫妄以「聽幻覺」為主』錯誤——酒精戒斷譫妄(及酒精性幻覺)『以「視幻覺(及觸幻覺，如看到蟲蛇)」為主』，而非聽幻覺。故正確為①③④(選 B)。","options":{"A":"123：含②(以聽幻覺為主)，錯誤。","B":"正確。短時間發生持續5~7天①、戒斷有焦慮厭食失眠顫抖③、營養不良B群缺乏④。","C":"124：含②，錯誤。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","酒精戒斷"]}},"112180-N5-20":{"quick":"柯沙寇夫症候群(Korsakoff)的典型症狀＝近期記憶力喪失。","detail":{"background":"柯沙寇夫症候群(Korsakoff syndrome)是酒癮、維生素 B1 長期缺乏導致的『「不可逆」的記憶障礙』，典型症狀為(B)『近期記憶力喪失(無法形成新記憶)、虛談(confabulation，以虛構填補記憶空缺)、定向感障礙』。A『懷疑配偶不忠的嫉妒妄想』是酒精性嫉妒妄想(另一情形);C『聽到有人命令』是聽幻覺(思覺失調等);D『流鼻水、發燒、流淚、打呵欠』是鴉片戒斷。故 B 正確。柯沙寇夫的核心是近期記憶喪失與虛談。","options":{"A":"嫉妒妄想是酒精性嫉妒妄想，非柯沙寇夫的典型。","B":"正確。柯沙寇夫的典型是近期記憶力喪失(及虛談)。","C":"聽到命令是聽幻覺，非柯沙寇夫。","D":"流鼻水、打呵欠是鴉片戒斷。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","柯沙寇夫"]}},"113030-N5-15":{"quick":"美沙冬：成癮性比海洛因低，戒斷症狀也比海洛因輕微。","detail":{"background":"美沙冬(methadone)的正確敘述:(B)『成癮性比海洛因低、戒斷症狀也比海洛因「輕微(較緩和)」(長效、口服、可控管，故較平穩)』。其他錯誤:A 美沙冬是鴉片類，『「會」有呼吸抑制、欣快感(較弱)和戒斷症狀』，並非不會;C 美沙冬是「替代療法」，其治療是『「藥理上」取代海洛因(減少戒斷與渴求)』，並非「主要是心理安撫作用」;D 美沙冬『「不需」終身服用(可逐步減量)』，並非終身。故 B 正確。","options":{"A":"美沙冬是鴉片類，會有呼吸抑制、戒斷症狀。","B":"正確。成癮性比海洛因低，戒斷症狀也比海洛因輕微。","C":"美沙冬是藥理上取代海洛因，非主要心理安撫。","D":"美沙冬可逐步減量，非終身服用。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","毒品危害防制條例","美沙冬"]}},"113030-N5-17":{"quick":"物質使用障礙成因「錯誤」者＝與對成癮物質的認知無關、不會想戒除。","detail":{"background":"物質使用障礙成因的敘述，「錯誤」者為(D)『與對成癮物質的「認知」無關、不會想戒除』——錯誤，成癮『與個體對物質的「認知(信念、期待)」有關』，且成癮者『「常」有想戒除的念頭(只是控制失調、難以成功)』，並非「不會想戒除」。其他正確:A 成癮物質會直接活化「酬償系統(多巴胺獎賞迴路)」、產生愉悅感;B 同儕互相影響是使用成癮物質的因素之一;C 家庭功能失調是因素之一。故本題選錯誤者為 D。","options":{"A":"成癮物質會活化酬償系統、產生愉悅感，正確。","B":"同儕互相影響是因素之一，正確。","C":"家庭功能失調是因素之一，正確。","D":"正確(本題選錯誤者)。成癮與認知有關，且成癮者常想戒除(只是控制失調)。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"113100-N5-14":{"quick":"海洛因急性中毒的症狀＝呼吸抑制、昏迷。","detail":{"background":"海洛因(鴉片類)急性中毒(過量)是『中樞抑制』，最可能的症狀是(B)『呼吸抑制、昏迷(及針狀瞳孔、心跳變慢)』。A『講話滔滔不絕』、C『注意力集中』、D『活動量變大』都是「興奮」的表現(偏向安非他命等興奮劑)，與鴉片中毒的「抑制」相反。故 B 正確。鴉片急性中毒的三大典型是「呼吸抑制+昏迷+針狀瞳孔」(可用 naloxone 解毒)。","options":{"A":"講話滔滔不絕是興奮(興奮劑)的表現。","B":"正確。呼吸抑制、昏迷是海洛因急性中毒的症狀。","C":"注意力集中非鴉片中毒(中樞抑制)的表現。","D":"活動量變大是興奮的表現，與鴉片抑制相反。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鴉片中毒"]}},"113180-N5-17":{"quick":"週末深夜不歸、恍惚視覺模糊協調差、心跳快血壓升、間質性膀胱炎＝K他命(ketamine)。","detail":{"background":"林同學常週末深夜不歸、功課退步、『精神恍惚、視覺模糊、協調性變差(解離/麻醉作用)、心跳過速、血壓升高，並因「間質性膀胱炎」求診』——最符合『K 他命(ketamine)』濫用:K 他命是解離性麻醉劑(派對毒品)，長期使用會造成『K 他命相關膀胱病變(間質性膀胱炎，頻尿、夜尿、血尿)』，這是其特徵性危害。安非他命、大麻、FM2 不以「間質性膀胱炎」為特徵。故 B 正確。","options":{"A":"安非他命不以間質性膀胱炎為特徵。","B":"正確。解離症狀+間質性膀胱炎，是 K 他命濫用。","C":"大麻不以間質性膀胱炎為特徵。","D":"FM2(flunitrazepam)是 BZD 助眠藥，不致間質性膀胱炎。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","K他命"]}},"114030-N5-17":{"quick":"嗎啡：使用後會產生欣快感。","detail":{"background":"嗎啡(鴉片類)的正確敘述:(B)『嗎啡使用後會產生「欣快感(euphoria)」(這也是其成癮的原因之一)』。其他錯誤:A 嗎啡有效「止痛」，但會『「鎮靜(嗜睡)」而非「提神」』;C 嗎啡『可「口服、注射、貼片」等多種途徑』，並非只能口服;D 嗎啡是『「管制藥品」，須有醫囑、嚴格管控』，護理師「不可自行斟酌使用」。故 B 正確。嗎啡的欣快感與鎮靜、止痛、呼吸抑制是其重要藥理作用。","options":{"A":"嗎啡止痛但會鎮靜(嗜睡)，非提神。","B":"正確。嗎啡使用後會產生欣快感。","C":"嗎啡可口服、注射、貼片等多途徑，非只能口服。","D":"嗎啡是管制藥品，須醫囑，護理師不可自行斟酌使用。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鴉片類"]}},"114100-N5-18":{"quick":"耐受性(tolerance)「錯誤」者＝停止使用後出現的身心不適(那是戒斷)。","detail":{"background":"物質使用障礙的「耐受性(tolerance)」，「錯誤(不符)」者為(A)『停止使用成癮物質後出現之身心不適』——錯誤，那是『「戒斷(withdrawal)」』的定義，而非耐受性。其他正確(屬耐受性):B 腦部已適應較高的物質濃度、需要更多的物質;C 需要增加使用量才能達到預期的效果;D 與使用多種物質的交互作用有關(交叉耐受)。故本題選錯誤者為 A。耐受性=需更多劑量才達原效果;戒斷=停用後的身心不適。","options":{"A":"正確(本題選錯誤者)。停止使用後的身心不適是「戒斷」，非耐受性。","B":"腦部適應較高濃度、需更多物質，是耐受性。","C":"需增加使用量才達預期效果，是耐受性。","D":"與多種物質交互作用(交叉耐受)有關，正確。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","耐受性"]}},"114170-N5-1":{"quick":"新興影響精神物質(NPS)「最不適當」＝都是天然、容易被檢測。","detail":{"background":"新興影響精神物質(NPS)的敘述，「最不適當」者為(C)『「都是天然、容易被檢測」』——錯誤，NPS 多為『「人工合成」、且常修改化學結構以「規避法律與檢測」(難以被一般毒品篩檢驗出)』。其他正確:A 常被用在派對中(派對藥);B 常以「茶包、糖果、果凍」等形式包裝偽裝販賣(混入零食以欺騙、規避查緝);D 藥物「混用(多種成分混合)」情形嚴重(毒性與風險難預測)。故本題選最不適當者為 C。NPS 多為合成、偽裝、難檢測、混用，風險高。","options":{"A":"常被用在派對中，正確。","B":"常以茶包、糖果等形式包裝販賣，正確。","C":"正確(本題選最不適當者)。NPS 多為合成、難檢測，非天然易檢測。","D":"藥物混用情形嚴重，正確。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","毒品危害防制條例","新興毒品"]}},"114170-N5-6":{"quick":"抗焦慮藥(BZD)的戒斷症狀＝焦慮、失眠、出汗。","detail":{"background":"抗焦慮藥(BZD)的戒斷症狀是『中樞抑制的反彈性興奮』:(A)『焦慮、失眠、出汗(及顫抖、心悸、激動，嚴重時癲癇發作)』。B『記憶受損』、C『動作不協調』、D『言語含糊不清』是 BZD「中毒/過量(使用中)」的鎮靜副作用，而非「戒斷」症狀。故 A 正確。BZD 戒斷以反彈性焦慮、失眠、自律神經亢進為主(故戒斷須逐步減量，以免反彈或癲癇)。","options":{"A":"正確。BZD 戒斷症狀是焦慮、失眠、出汗(反彈性興奮)。","B":"記憶受損是 BZD 中毒/使用中的副作用，非戒斷。","C":"動作不協調是 BZD 中毒(鎮靜)的表現，非戒斷。","D":"言語含糊是 BZD 中毒(鎮靜)的表現，非戒斷。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","BZD 戒斷"]}},"115030-N5-18":{"quick":"愷他命(ketamine)「錯誤」者＝容易罹患「急性」膀胱間質炎(應為慢性)。","detail":{"background":"愷他命(ketamine)的敘述，「錯誤」者為(B)『容易罹患「急性」膀胱間質炎』——錯誤，長期使用 K 他命造成的是『「慢性」間質性膀胱炎(膀胱攣縮、頻尿、血尿、膀胱容量下降)』，是長期累積的慢性病變，而非「急性」。其他正確:A 在醫學上用於手術麻醉(解離性麻醉劑);C 常見中毒症狀是心搏過速、震顫、噁心嘔吐;D ketamine 屬「第三級」毒品/管制藥品。故本題選錯誤者為 B。","options":{"A":"醫學上用於手術麻醉(解離性麻醉劑)，正確。","B":"正確(本題選錯誤者)。K 他命致「慢性」間質性膀胱炎，非急性。","C":"中毒症狀是心搏過速、震顫、噁心嘔吐，正確。","D":"ketamine 屬第三級毒品/管制藥品，正確。"},"sources":["精神科護理學(新文京/華杏)·物質使用障礙","毒品危害防制條例","K他命"]}}},TO=["物質使用與成癮"],LEC={"物質使用與成癮":{"title":"物質使用與成癮　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「物質使用與成癮」的歷屆考題共 63 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};

const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_p6_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
