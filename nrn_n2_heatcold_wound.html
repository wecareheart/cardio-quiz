料"},"img":""},{"id":"114170-N2-21","code":"114170","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":21,"stem":"病人術後6 小時未自行解尿,護理人員欲協助誘尿,下列方法何者最不適當?","opts":{"A":"聽流水聲刺激大腦皮質產生尿意","B":"執行溫水坐浴以放鬆尿道括約肌","C":"依醫囑於病人的膀胱部位放置熱水袋","D":"足部施予熱敷刺激末梢神經"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"8護理紀錄評值溝通與綜合","topic_code":"B8-8","q_num":21,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"聽流水聲刺激大腦皮質產生尿意","B":"執行溫水坐浴以放鬆尿道括約肌","C":"依醫囑於病人的膀胱部位放置熱水袋","D":"足部施予熱敷刺激末梢神經"},"img":""}],E={"101030-N2-56":{"quick":"冰枕降體溫應用「傳導」原理。","detail":{"background":"散熱原理:傳導(直接接觸物體傳熱,如冰枕、冰敷)、輻射(不需介質,如體表散熱、移除被蓋)、對流(空氣/液體流動帶走熱,如吹電扇、空調)、蒸發(液體變氣體,如流汗、溫水拭浴)。「冰枕」直接接觸頭部以「傳導」帶走熱(B正確)。故傳導(B)。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"輻射不需介質直接接觸。","B":"正確(本題答案)。冰枕降溫是傳導原理。","C":"對流是空氣液體流動帶熱。","D":"蒸發是液體變氣體散熱。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"101110-N2-34":{"quick":"冷熱生理:冷熱覺經外側脊髓視丘徑傳至下視丘(1)、極冷極熱引發脊髓反射(3)→「13」。","detail":{"background":"冷熱生理反應:1冷、熱覺皆由「外側脊髓視丘徑」傳至下視丘(對)、3極冷或極熱刺激會引發「脊髓反射(保護機制)」(對)。選項2「熱覺接受器數目多於冷覺」錯(冷覺接受器較多,人對冷較敏感);4...。故正確為「13」。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"含2(熱覺接受器多於冷覺)錯。","B":"正確(本題答案,13)。經脊髓視丘徑傳下視丘、極冷熱引發脊髓反射。","C":"含2、4不符。","D":"含...不符。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"102110-N2-33":{"quick":"人體對冷熱敏感部位=頸部(1)、手腕內側(3)、前臂內側(4)、會陰(6)→「1346」。","detail":{"background":"人體對冷熱「較敏感」的部位是皮膚薄、神經分布密集處:1頸部、3手腕內側、4前臂內側、6會陰部位(及眼瞼)。手掌(2)、腳底(5)皮膚厚、相對較不敏感。故敏感部位為「1346」。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"含2(手掌)、5(腳底)不符。","B":"正確(本題答案,1346)。頸部、手腕內側、前臂內側、會陰。","C":"含2不符。","D":"含5不符。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"103100-N2-25":{"quick":"輻射散熱:室溫中以輻射散失能量最多(1)、表面血管擴張利輻射降溫(2)、皮膚顏色影響輻射(3)→「123」。","detail":{"background":"人體輻射性散熱:1人體在室溫中以「輻射」方式散失的能量「最多(約60%)」、2表面血管擴張時可藉輻射散熱降溫、3皮膚顏色會影響輻射(深色吸收/散發較多)——皆正確。故為「123」。輻射不需介質,是室溫下主要散熱方式。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"正確(本題答案,123)。輻射室溫散熱最多、血管擴張利輻射、膚色影響輻射。","B":"含4不符。","C":"含4不符。","D":"缺1不完整。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"104030-N2-29":{"quick":"冰敷反彈現象=超過冷熱應用最大治療效應時間後產生的相反反應。","detail":{"background":"反彈現象(rebound phenomenon):D「超過冷熱應用『最大治療效應的時間』後,所產生之『相反』的反應」正確——如冷敷過久(>1小時)血管反而擴張(本欲收縮)、熱敷過久反而血管收縮。A是「溫度接受器適應」;B是「交感性(遠處)反應」;C是「核心溫度維持反應」。故反彈是超時後的相反反應(D)。","options":{"A":"是溫度接受器適應現象。","B":"是交感性(遠處)反應。","C":"是核心溫度維持反應。","D":"正確(本題答案)。超過最大效應時間後產生相反反應。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"104100-N2-23":{"quick":"影響冷熱感受度=身體部位敏感度(1)、用冷熱範圍大小(2)、皮膚是否受損(5)→「125」。","detail":{"background":"影響身體對冷熱感受度的因素:1身體部位的敏感度(薄皮膚神經密處敏感)、2用冷/用熱範圍大小(範圍越大感受越強)、5皮膚是否受損(受損處更敏感易傷)。選項3「心情好壞」、4「身高差異」與冷熱感受度無直接關係。故為「125」。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"含4(身高)不符。","B":"正確(本題答案,125)。部位敏感度、範圍大小、皮膚受損。","C":"含3、4不符。","D":"含3、4不符。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"105090-N2-4":{"quick":"人體主要散熱方式=經由皮膚輻射散熱。","detail":{"background":"人體在常溫下「主要」的散熱方式是「經由皮膚『輻射』散熱(約佔60%)」(C正確);其次為傳導、對流、蒸發(流汗)。高溫或運動時蒸發(流汗)比例增加。故主要為皮膚輻射(C)。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"傳導非主要散熱方式。","B":"呼吸對流非主要。","C":"正確(本題答案)。主要經皮膚輻射散熱。","D":"蒸發在高溫運動時增加,非常溫主要。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"106030-N2-27":{"quick":"冷熱應用:手掌相較頸部對冷熱耐受力「較高(較不敏感)」非較低;稱手掌耐受力較低為錯誤。","detail":{"background":"冷熱應用部位:B血液循環好的部位效果較好(對);C皮膚深層對熱比對冷更敏感(對);D冷熱面積越大效果越佳(對)。選項A「手掌相較於頸部,對冷熱的耐受力『較低』」錯誤——頸部皮膚薄、敏感、耐受力低;手掌皮膚厚、較不敏感、耐受力「較高」,A敘述顛倒,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。手掌耐受力較高(較不敏感),非較低。","B":"正確。血循好部位效果較好。","C":"正確。皮膚深層對熱較敏感。","D":"正確。面積越大效果越佳。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"106110-N2-22":{"quick":"右手熱敷致左手血管擴張=交感性反應(consensual response)。","detail":{"background":"為身體一側熱敷,「對側」相同部位也產生血管擴張的現象,稱為「交感性反應(consensual response,遠處效應)」(A正確)——透過交感神經反射,身體其他部位產生同樣生理反應。適應(溫度接受器習慣)、反彈(超時相反反應)、續發性反應皆非。故交感性反應(A)。","options":{"A":"正確(本題答案)。對側產生同樣反應=交感性反應。","B":"適應是溫度接受器習慣。","C":"反彈是超時相反反應。","D":"續發性反應非此定義。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"106110-N2-41":{"quick":"身體散熱主要途徑=皮膚。","detail":{"background":"身體散熱的主要途徑是「皮膚」(A正確)——透過皮膚的輻射、傳導、對流、蒸發(流汗)散熱;皮膚是最大的散熱器官。呼吸(少量)、排尿、唾液非主要散熱途徑。故皮膚(A)。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"正確(本題答案)。身體散熱主要經皮膚。","B":"呼吸散熱量少。","C":"排尿非散熱主要途徑。","D":"唾液非散熱途徑。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"106111-N2-5":{"quick":"照護順序:先照護免疫力低/保護性者,MRSA(抗藥菌)病人「最後」照護。本題答案D。","detail":{"background":"本題官方答案D。一人照護多位病人時,依「感染控制」原則應「先照護乾淨/免疫力低(保護性隔離)的病人,『最後』照護有抗藥性菌(如MRSA)/感染源的病人」,避免交叉感染。MRSA病人(感染源)應排在最後。選項D的順序(MRSA最後)符合此原則。故D。","options":{"A":"MRSA未排最後,不符。","B":"順序不符。","C":"順序不符。","D":"正確(本題答案)。MRSA(感染源)最後照護。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"107110-N2-24":{"quick":"冷、熱敷共同作用=減緩充血和腫脹。","detail":{"background":"冷療與熱療的「共同作用」是「減緩(改善)充血和腫脹」(A正確)——冷療收縮血管減滲出消腫,熱療促進循環將滲液帶走消腫,兩者皆能減輕腫脹。B抑制炎症(冷療)、C增加肌肉收縮力(非共同)、D增加基礎代謝率(熱療)非共同作用。故減緩充血腫脹(A)。","options":{"A":"正確(本題答案)。冷熱共同作用=減緩充血腫脹。","B":"抑制炎症是冷療作用。","C":"增加肌肉收縮力非共同。","D":"增加代謝率是熱療作用。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"108020-N2-39":{"quick":"睡涼蓆是利用「傳導」散熱,非對流;稱涼蓆對流散熱為錯誤。","detail":{"background":"散熱方式:A冰枕利用「傳導」散熱(對);B身體伸展增加體表面積、經「輻射」散熱(對);C流汗利用「蒸發」散熱(對)。選項D「睡在涼爽的蓆子上是利用『對流』方式散熱」錯誤——睡涼蓆是身體「直接接觸」涼蓆,以「傳導」方式散熱,非對流(對流是空氣/液體流動),故D為錯誤敘述(本題答案)。","options":{"A":"正確。冰枕是傳導散熱。","B":"正確。身體伸展經輻射散熱。","C":"正確。流汗是蒸發散熱。","D":"錯誤(本題答案)。睡涼蓆是傳導散熱,非對流。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"108110-N2-43":{"quick":"體溫調節用「負回饋」非正回饋;稱用正回饋為錯誤。","detail":{"background":"體溫調節生理:A皮膚對冷的感覺較敏銳(對,冷接受器多);C血管收縮為「產熱(保溫)」機制(對);D汗腺分泌為「散熱」機制(對)。選項B「利用『正回饋』來調節產熱及散熱」錯誤——體溫調節是由下視丘以「負回饋(negative feedback)」維持恆定(體溫升高→啟動散熱;降低→啟動產熱),非正回饋,故B為錯誤敘述(本題答案)。","options":{"A":"正確。皮膚對冷較敏銳。","B":"錯誤(本題答案)。體溫調節用負回饋,非正回饋。","C":"正確。血管收縮是產熱機制。","D":"正確。汗腺分泌是散熱機制。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"109110-N2-25":{"quick":"冷熱應用反射區「胸後區:心臟」錯誤(前胸區才對應心臟);稱胸後區對應心臟為錯誤。","detail":{"background":"冷熱應用部位與反射區:A四肢↔腦(對)、B前額↔鼻黏膜(對,前額冰敷止鼻血)、D後腰部↔腎(對)。選項C「胸後區↔心臟」錯誤——對應「心臟」的反射區是「前胸(左前胸)」非「胸後區」,故C為錯誤敘述(本題答案)。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"正確。四肢↔腦。","B":"正確。前額↔鼻黏膜。","C":"錯誤(本題答案)。心臟對應前胸,非胸後區。","D":"正確。後腰部↔腎。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"109110-N2-26":{"quick":"零下5°C久待臉部發紅=反彈現象。","detail":{"background":"在零下5°C的環境久待(>1小時),臉部皮膚「本應血管收縮蒼白」卻反而「發紅(血管擴張)」,這是「反彈現象(rebound phenomenon)」(A正確)——超過冷療最大效應時間後產生相反反應(防組織凍傷的保護)。適應、交感性反應、持續性反應皆非。故反彈現象(A)。","options":{"A":"正確(本題答案)。久冷後臉發紅=反彈現象。","B":"適應是溫度接受器習慣。","C":"交感性反應是對側同樣反應。","D":"持續性反應非此定義。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"109110-N2-27":{"quick":"運動後呼吸快、水分散失降溫=利用「蒸發」原理。","detail":{"background":"能量轉換散熱:D「運動後呼吸速率變快,水分散失增加以降溫,主要利用『蒸發(evaporation)』原理」正確(水分由液體變氣體帶走熱)。A發燒減少被蓋是「輻射」(非對流);B高溫環境表面血管擴張是「輻射」散熱(非傳導);C暖暖包提高體溫是「傳導」(非輻射)。故D正確。","options":{"A":"發燒減被蓋是輻射,非對流。","B":"表面血管擴張散熱是輻射,非傳導。","C":"暖暖包是傳導,非輻射。","D":"正確(本題答案)。呼吸快水分散失降溫是蒸發。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"110030-N2-30":{"quick":"溫水拭浴同時運用「蒸發(2)+傳導(3)」降溫→「23」。","detail":{"background":"溫水拭浴降溫同時運用兩種能量轉移:「傳導(3,溫水直接接觸皮膚傳熱)」+「蒸發(2,水分由皮膚蒸發帶走熱)」(C「23」正確)。輻射(1)、對流(4)非溫水拭浴的主要機制。故為「23」。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"12含輻射不符。","B":"14含輻射對流不符。","C":"正確(本題答案,23)。蒸發+傳導降溫。","D":"34含對流不符。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"110030-N2-39":{"quick":"下視丘對「核心(內部)溫度」較敏感,非體表溫度;稱對體表溫度較敏感為錯誤。","detail":{"background":"體溫調節:A下視丘利用「負回饋」統整產熱散熱(對);B效應系統指血管、骨骼肌、汗腺(對);C病人調整室內溫度屬「行為機轉」(對)。選項D「下視丘對於『體表溫度』較為敏感」錯誤——下視丘體溫調節中樞主要偵測並對「核心(血液/內部)溫度」較敏感;體表(皮膚)溫度由周邊接受器偵測,故D為錯誤敘述(本題答案)。","options":{"A":"正確。下視丘用負回饋統整。","B":"正確。效應系統含血管骨骼肌汗腺。","C":"正確。調整室溫屬行為機轉。","D":"錯誤(本題答案)。下視丘對核心溫度較敏感,非體表。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"111030-N2-28":{"quick":"腳踝冷敷30分後肢體發紅=反彈現象。","detail":{"background":"腳踝冷敷「30分鐘後」肢體出現「發紅(血管擴張)」現象,是「反彈現象(rebound phenomenon)」(A正確)——冷敷超過約20~30分鐘(最大治療效應時間)後,血管反而擴張(防凍傷的保護性相反反應)。溫度適應、遠處效應、交感性反應皆非。故反彈現象(A)。","options":{"A":"正確(本題答案)。冷敷超時後發紅=反彈現象。","B":"溫度適應是接受器習慣。","C":"遠處效應是對側反應。","D":"交感性反應是對側同樣反應。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"112110-N2-25":{"quick":"輻射:不需介質即可達能量喪失(如增減被蓋)。","detail":{"background":"能量轉移原理:A「輻射方式不須透過其他物質(介質)即可達成能量喪失,如增減被蓋」正確。B「蒸發是『液體變氣體』」(非藉液體氣體為介質);C「傳導是直接接觸傳熱」(非空調,空調是對流);D「對流是『氣體/液體流動』帶熱」(非水分變氣體,水分變氣體是蒸發)。故A正確。","options":{"A":"正確(本題答案)。輻射不需介質,如增減被蓋。","B":"蒸發是液體變氣體,非藉介質。","C":"傳導是直接接觸,空調是對流。","D":"對流是流體流動,非水變氣(蒸發)。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"112110-N2-27":{"quick":"冷熱應用若需重複使用應間隔30~60分鐘。","detail":{"background":"冷熱應用注意:C「若需重複使用,應間隔30~60分鐘」正確(讓組織恢復、避免反彈與凍傷燙傷)。A一般治療時間「20~30分鐘」(非40~50);B治療過程應「每5~10分鐘」評估皮膚(非30分鐘);D「不可」讓病人依自己感覺調整溫度(感覺不可靠、易燙傷凍傷)。故C正確。","options":{"A":"一般治療20~30分鐘,非40~50。","B":"應每5~10分鐘評估,非30分鐘。","C":"正確(本題答案)。重複使用間隔30~60分鐘。","D":"不可讓病人自行調溫(易傷)。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"112180-N2-16":{"quick":"極度冷熱刺激時脊髓反射產生保護機制。","detail":{"background":"人體溫度調控:A「出現極度冷熱刺激時,脊髓反射作用會產生保護機制以避免傷害(如縮手反射)」正確。B皮膚「冷」的接受器較多、對冷較敏感(非熱接受器四肢多);C時間愈久溫度接受器「適應」、敏感度「降低」(非增加);D室溫增加時血管「擴張」散熱(非收縮)。故A正確。","options":{"A":"正確(本題答案)。極度冷熱刺激脊髓反射保護。","B":"冷接受器較多,對冷較敏感。","C":"時間久接受器適應、敏感度降低。","D":"室溫增加血管擴張散熱,非收縮。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"113030-N2-14":{"quick":"熱敷超過45分鐘引起血管收縮=反彈現象。","detail":{"background":"熱敷時間超過45分鐘(>最大治療效應時間),血管「本應擴張」卻反而「收縮」,是「反彈現象(rebound phenomenon)」(B正確)——超時後產生相反反應。適應、交感反應、保護性反應皆非。故反彈現象(B)。散熱原理:傳導(直接接觸,冰枕/冰敷/睡涼蓆)、輻射(不需介質、室溫散熱最多,增減被蓋)、對流(空氣流動,吹電扇/空調)、蒸發(液體變氣體,流汗/溫水拭浴)。反彈現象=超過最大效應時間後相反反應;交感性反應=對側同樣反應;適應=接受器久了敏感度降低。冷熱共同作用:減緩疼痛、減緩充血腫脹。","options":{"A":"適應是接受器習慣溫度。","B":"正確(本題答案)。熱敷超時血管收縮=反彈現象。","C":"交感反應是對側同樣反應。","D":"保護性反應非此定義。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"113180-N2-17":{"quick":"中暑溫水拭浴降溫主要利用「蒸發+傳導」非「轉換」;稱利用轉換為錯誤。","detail":{"background":"能量轉換散熱:A失溫用電毯提高體溫是「傳導」(對);C寒冷用烤燈是「輻射」(對);D發燒調降空調是「對流」(對)。選項B「中暑溫水拭浴降溫主要利用『轉換(conversion)』」錯誤——溫水拭浴降溫主要是「蒸發+傳導」(水分蒸發帶熱、溫水接觸傳熱),「轉換」非標準散熱原理用詞,故B為錯誤敘述(本題答案)。","options":{"A":"正確。電毯提高體溫是傳導。","B":"錯誤(本題答案)。溫水拭浴是蒸發+傳導,非轉換。","C":"正確。烤燈是輻射。","D":"正確。調降空調是對流。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"114170-N2-14":{"quick":"冷熱耐受性:暴露面積愈大、耐受力愈低、對身體影響愈大。","detail":{"background":"影響溫度耐受性:A「暴露冷熱的面積愈大,耐受力愈低,對身體影響也愈大」正確。B暴露時間愈長耐受力愈低、危險性增(此項也對,但本題以A為最適當);C神經感覺功能不良者「感覺不到」、耐受力「看似高」但「易受傷」(C「耐受力較低」敘述須斟酌);D老人小孩耐受力「較低」、損傷風險高(非耐受力高)。故A最適當。","options":{"A":"正確(本題答案)。面積愈大耐受力愈低、影響愈大。","B":"時間長耐受低也對,但A最適當。","C":"感覺不良者感覺不到、易受傷。","D":"老人小孩耐受力較低,非較高。"},"sources":["新文京《基本護理學》冷熱療法","華杏《最新基本護理學》散熱原理與冷熱生理"]}},"101110-N2-24":{"quick":"冷熱療法共同功能=緩解疼痛。","detail":{"background":"冷療與熱療的「共同功能」是「緩解疼痛」(D正確)——冷療降低神經傳導、熱療放鬆肌肉皆能止痛。A抑制炎症(冷療)、B止血消腫(冷療)、C促進新陳代謝(熱療)皆非「共同」功能。故緩解疼痛(D)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"抑制炎症是冷療功能。","B":"止血消腫是冷療功能。","C":"促進新陳代謝是熱療功能。","D":"正確(本題答案)。緩解疼痛是冷熱共同功能。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"102030-N2-28":{"quick":"靜脈注射部位發紅微腫壓痛(靜脈炎/浸潤):拔除點滴隨後給予冷敷。","detail":{"background":"靜脈注射部位「發紅、微腫脹、觸壓疼痛」(早期靜脈炎),且針頭處有回血(在血管內),最適宜「拔除點滴(停止該部位),隨後給予『冷敷』」(D正確)——冷敷收縮血管、減輕急性發炎腫脹疼痛。A、B繼續注射(會加重)、C「熱敷」是後期(急性發炎期先冷敷)。故拔除後冷敷(D)。","options":{"A":"發炎不應繼續注射。","B":"不應按摩注射處(靜脈炎不可按摩)。","C":"急性發炎期先冷敷,非熱敷。","D":"正確(本題答案)。拔除點滴後給予冷敷。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"102110-N2-19":{"quick":"扭傷冰敷主要機轉=降低微血管通透性。","detail":{"background":"運動扭傷立即冰敷,主要作用機轉是「降低微血管通透性」(B正確)——冷使血管收縮、降低微血管通透性、減少組織液滲出與出血、消腫止痛。A降低血小板凝集(反)、C增加吞噬細胞(熱療)、D增加神經傳導(冷療是『降低』神經傳導止痛)皆非。故降低微血管通透性(B)。","options":{"A":"冷療不降低血小板凝集。","B":"正確(本題答案)。冰敷降低微血管通透性消腫。","C":"增加吞噬細胞是熱療。","D":"冷療降低神經傳導,非增加。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"103030-N2-24":{"quick":"冷療中皮膚出現「皺褶」不需暫停;青紫/疼痛/麻木需暫停。","detail":{"background":"冷療過程中皮膚出現下列徵象「需暫停」:A青紫(發紺、血循受阻)、B疼痛、C麻木(神經受影響)——皆是組織受損警訊。選項D「皺褶」不需暫停治療(本題答案)——皮膚皺褶(浸潤)是濕冷敷常見、非危險徵象。故不需暫停者為皺褶(D)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"青紫(血循受阻)需暫停。","B":"疼痛需暫停。","C":"麻木需暫停。","D":"正確(本題答案)。皺褶不需暫停治療。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"103030-N2-31":{"quick":"肌肉拉傷用冷目的=降低微血管通透性,減輕水腫。","detail":{"background":"運動傷害肌肉拉傷「用冷」的目的是「降低微血管通透性,減少組織液滲出、減輕水腫(及出血)」(A正確)。B增加氧氣供應移除廢物(熱療)、C增進白血球吞噬活性(熱療)、D增加神經傳導放鬆肌肉(冷療是降低神經傳導)皆非冷療目的。故降低微血管通透性減水腫(A)。","options":{"A":"正確(本題答案)。冷療降低微血管通透性減水腫。","B":"增氧移除廢物是熱療。","C":"增白血球吞噬是熱療。","D":"冷療降低神經傳導,非增加。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"103100-N2-24":{"quick":"濕冷敷皮膚顏色不會出現「發紅」(冷療使蒼白/藍紫/發黑);稱發紅為答案。","detail":{"background":"肢體末端接受「濕冷敷」時皮膚顏色變化:A蒼白(血管收縮)、C發黑(嚴重缺血/凍傷)、D藍紫色(發紺)——皆可能出現(冷療使血循減少)。選項B「膚色發紅」「不會」出現(本題答案)——發紅是「血管擴張(熱療或反彈現象)」,正常冷療使膚色變蒼白/青紫,故不會出現發紅(B)。","options":{"A":"蒼白會出現(血管收縮)。","B":"正確(本題答案)。冷敷不會發紅(發紅是血管擴張)。","C":"發黑可能出現(嚴重缺血)。","D":"藍紫(發紺)會出現。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"104030-N2-30":{"quick":"頭部外傷不宜冷療:會使血管緊縮、阻礙血循、腦細胞缺氧加重病情。","detail":{"background":"頭部外傷不宜用「冷療」的原因:B「冷會使血管緊縮、阻礙血循,腦細胞氧氣和養分減少,加重病情」正確。A是冷療一般作用(非頭部外傷禁忌理由);C增加代謝需氧(是熱療對頭部的問題);D顱內壓上升腦充血(是『熱療』對頭部的禁忌理由)。故B正確(冷療使腦血循減少)。","options":{"A":"是冷療一般作用,非頭部禁忌理由。","B":"正確(本題答案)。冷使血管緊縮、腦細胞缺氧加重病情。","C":"增代謝需氧是熱療問題。","D":"顱內壓上升腦充血是熱療禁忌。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"104100-N2-22":{"quick":"鼻黏膜冰敷後反而血管擴張=反彈反應。","detail":{"background":"鼻黏膜出血用冰敷止血,「1小時後」鼻黏膜微血管反而「擴張」,此現象是「反彈反應(rebound phenomenon)」(D正確)——冷敷超過最大效應時間(約20~30分鐘以上、本題1小時)後血管反而擴張。溫度適應、交感反應、用冷禁忌皆非。故反彈反應(D)。","options":{"A":"溫度接受器適應非此。","B":"交感神經反應是對側反應。","C":"用冷禁忌非此現象。","D":"正確(本題答案)。冰敷過久血管擴張=反彈反應。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"104100-N2-27":{"quick":"用冷生理反應=血液黏稠度增加(1)、血管收縮血壓上升(3)→「13」。","detail":{"background":"人體對「用冷」的生理反應:1血液黏稠度增加(血流變慢)、3血管收縮、血壓上升(週邊阻力增)。選項2「刺激『副交感』神經產生雞皮疙瘩」錯(雞皮疙瘩是『交感』神經立毛肌收縮);4「淋巴流動與白血球機動性『增加』」是「用熱」反應(冷療是減少)。故用冷反應為「13」。","options":{"A":"含2(副交感)錯。","B":"正確(本題答案,13)。血液黏稠度增加、血管收縮血壓上升。","C":"含2、4不符。","D":"含4(用熱反應)不符。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"105030-N2-32":{"quick":"靜脈炎處置:停止該靜脈注射更換部位(1)、給予濕冷敷(2)→「12」。","detail":{"background":"注射部位靜脈炎的最適當處理:1停止該靜脈的注射、更換注射部位、2給予「濕冷敷」(減輕急性發炎腫痛)。選項3「按摩」錯(靜脈炎/血栓不可按摩,防血栓脫落);4...。故為「12」。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"正確(本題答案,12)。停止注射更換部位、給濕冷敷。","B":"含3(按摩)錯。","C":"含...不符。","D":"含3不符。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"105030-N2-40":{"quick":"發燒「移除過厚衣物被蓋」係依「輻射原理」降溫。本題答案C。","detail":{"background":"本題官方答案C。依「輻射原理」設計的發燒降溫措施:C「移除過厚的衣物或被蓋」——減少衣物使體表熱量以輻射方式直接散失。A冰枕是「傳導」、B維持病室空氣流通是「對流」、D鼓勵攝取水分是補充體液(非散熱原理)。故移除衣物被蓋是輻射(C)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"冰枕是傳導原理。","B":"空氣流通是對流原理。","C":"正確(本題答案)。移除衣物被蓋是輻射散熱。","D":"攝取水分非散熱原理。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"105090-N2-24":{"quick":"「開放性傷口」不適合局部冷療法。","detail":{"background":"局部冷療法適用:A靜脈炎(消炎止痛)、B扭傷初期(消腫止血)、C流鼻血(止血)。選項D「開放性傷口」「不適合」冷療(本題答案)——冷療使血管收縮、減少血流,會「影響傷口癒合(組織缺氧)」,開放性傷口不宜冷療。故不適合者為開放性傷口(D)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"靜脈炎適合冷療。","B":"扭傷初期適合冷療。","C":"流鼻血適合冷療止血。","D":"正確(本題答案)。開放性傷口不適合冷療(影響癒合)。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"105090-N2-56":{"quick":"腎衰竭發燒「不」宜建議每日飲水3000 c.c.(腎衰須限水);稱每日飲水3000為較不適當。","detail":{"background":"腎臟衰竭、體溫38.7°C的護理:A維持室溫26°C(對,利散熱);C口腔護理(對);D使用冰枕降溫(對)。選項B「建議每日飲水3,000 c.c.」較不適當——腎臟衰竭病人「腎功能差、需限制水分攝取(防水腫、肺水腫、心衰)」,大量飲水會加重負擔,故B為較不適當(本題答案)。","options":{"A":"適當。維持室溫26°C利散熱。","B":"較不適當(本題答案)。腎衰須限水,非每日3000 c.c.。","C":"適當。口腔護理。","D":"適當。使用冰枕降溫。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"106110-N2-26":{"quick":"鼻黏膜出血應於「前額」冰敷止血。","detail":{"background":"鼻黏膜出血(流鼻血)應於「前額(及鼻樑)」冰敷以達止血目的(B正確)——前額是鼻黏膜的反射區,冷敷使鼻部血管反射性收縮止血。直接冰鼻子(可)、前頸、臉頰二側非標準止血部位。故前額(B)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"鼻子可冰但前額為反射區答案。","B":"正確(本題答案)。鼻出血於前額冰敷止血。","C":"前頸非止血部位。","D":"臉頰二側非止血部位。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"106111-N2-23":{"quick":"冰枕注意:不需醫囑(1)、排出空氣以利傳導(3)→「13」。","detail":{"background":"使用冰枕注意:1使用冰枕「不需醫囑」(屬獨立性護理,可自主執行)、3置放夾子前「需將空氣排出」以免影響傳導效果。選項2「碎冰需加水以延長冷療時間」錯(碎冰加少量水是為去除尖角防破裂、非延長時間,且加太多水降低冷度);4...。故為「13」。","options":{"A":"含2不符。","B":"正確(本題答案,13)。冰枕不需醫囑、排出空氣利傳導。","C":"含2、4不符。","D":"含4不符。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"106111-N2-28":{"quick":"用冷全身合併症「不」包括皮膚發紅疼痛(那是局部反應);稱皮膚發紅疼痛為答案。","detail":{"background":"用冷治療的「全身」合併症:A水腫、B體液平衡障礙、D心律不整甚至心跳停止(全身性低溫影響)——皆是全身合併症。選項C「皮膚發紅疼痛」「不」是全身合併症(本題答案)——皮膚發紅疼痛是「局部」反應/合併症。故不包括者為皮膚發紅疼痛(C)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"水腫是全身合併症。","B":"體液平衡障礙是全身合併症。","C":"正確(本題答案)。皮膚發紅疼痛是局部反應,非全身。","D":"心律不整心跳停止是全身合併症。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"107030-N2-24":{"quick":"冰敷最好療效每次時間20~30分鐘。","detail":{"background":"為達冰敷(冷療)最好療效,每次冰敷時間以「20~30分鐘」為宜(B正確)——時間太短(<20分)效果不足,太長(>30分~1小時)會產生「反彈現象」或凍傷。故20~30分鐘(B)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"5~10分鐘效果不足。","B":"正確(本題答案)。冰敷每次20~30分鐘。","C":"40~50分鐘過久(易反彈凍傷)。","D":"1小時過久。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"108110-N2-6":{"quick":"冷熱敷用於嬰幼兒或老人時應特別小心。","detail":{"background":"冷敷或熱敷:D「使用於嬰幼兒或老年病人時,應特別小心」正確(皮膚薄、感覺與循環差、耐受力低、易凍傷燙傷)。A冷熱敷「不」直接接觸皮膚(須用布包裹防凍傷燙傷);B冷敷用於疼痛是「收縮血管止痛」非鬆弛肌肉(熱療才鬆肌肉);C熱敷用於疼痛是「促進循環」非降低炎症(冷療降炎症)。故D正確。","options":{"A":"冷熱敷不直接接觸皮膚。","B":"冷敷止痛是收縮血管,非鬆弛肌肉。","C":"熱敷是促進循環,非降低炎症。","D":"正確(本題答案)。嬰幼兒老人使用應特別小心。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"108110-N2-33":{"quick":"發燒「調整室內空調溫度」應用「對流原理」。","detail":{"background":"本題依「對流原理」的發燒降溫措施:B「調整室內空調溫度(空氣流動帶走熱)」=對流(B正確)。A移除過厚衣物是「輻射」、C冰枕是「傳導」、D溫水拭浴是「蒸發+傳導」。故調整空調是對流(B)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"移除衣物是輻射。","B":"正確(本題答案)。調整空調是對流原理。","C":"冰枕是傳導。","D":"溫水拭浴是蒸發+傳導。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"108110-N2-34":{"quick":"靜脈走向發紅觸痛(靜脈炎):停止輸液、更換新設備重新注射。","detail":{"background":"靜脈輸液流速變慢、沿靜脈走向「發紅且有觸痛感」=靜脈炎,立即處置是「停止輸液,更換新設備重新注射(另選部位)」(C正確),原部位可濕冷敷。A黃藥水濕冷敷(可緩解但首要停止);B按摩(靜脈炎不可按摩);D熱敷(急性發炎期應冷敷)。故停止並重新注射(C)。","options":{"A":"濕冷敷可緩解,但首要停止更換。","B":"靜脈炎不可按摩。","C":"正確(本題答案)。停止輸液、更換新設備重新注射。","D":"急性發炎期應冷敷,非熱敷。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"110030-N2-23":{"quick":"局部用冷生理現象=減輕組織腫脹(1)、降低細胞代謝(3)、減輕疼痛(5)→「135」。","detail":{"background":"局部用冷的生理現象:1減輕組織腫脹(血管收縮減滲出)、3降低細胞新陳代謝、5減輕疼痛(降低神經傳導)。選項2「鬆弛僵硬組織」是「用熱」;4「容易導致寒顫」是「全身」用冷(局部冷不致全身寒顫)。故局部用冷為「135」。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"含4(寒顫是全身)不符。","B":"正確(本題答案,135)。減腫脹、降代謝、減疼痛。","C":"含2(鬆弛是熱)、4不符。","D":"含2、4不符。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"110110-N2-30":{"quick":"冷接受器在皮膚淺層,人體對冷刺激較敏感。","detail":{"background":"冷熱效用:B「冷接受器在皮膚淺層,故人體對冷刺激較為敏感」正確。A空氣導熱滲透力「低於」水(故濕冷熱效果較好、危險性較高);C濕冷效果比乾冷佳,使用濕冷時溫度應「較乾冷『高』(較不冷)」以防凍傷(濕冷穿透強,同溫更冷);D皮膚接觸冷熱時間越久,溫度敏感性「降低(適應)」非增高。故B正確。","options":{"A":"空氣導熱滲透力低於水,非高於。","B":"正確(本題答案)。冷接受器在淺層,對冷較敏感。","C":"濕冷溫度應較乾冷高(防凍傷)。","D":"時間越久敏感性降低(適應)。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"110110-N2-31":{"quick":"前額冰敷止鼻血原理=收縮淺層皮膚血管使血循變慢。","detail":{"background":"鼻黏膜出血於前額冰敷止血的原理是「收縮淺層皮膚(鼻部反射區)血管,使局部血液循環變慢、減少出血」(A正確)。B「降低微血管通透性」是冷療另一作用但非「止血」直接原理;C「提升凝血因子活性」錯(冷反而減慢酶活性);D「減少血流與淋巴降代謝」是消炎非止血主因。故收縮血管使血循變慢(A)。","options":{"A":"正確(本題答案)。冰敷收縮淺層血管使血循變慢止血。","B":"降低通透性非止血直接原理。","C":"冷療減慢酶活性,非提升凝血因子。","D":"降代謝是消炎,非止血主因。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"111110-N2-25":{"quick":"冷療抑制炎症原理=血管收縮,減緩白血球淋巴球送至組織。","detail":{"background":"冷療抑制炎症反應的主要原理是「血管收縮,減緩(減少)將白血球、淋巴球等送至組織」(D正確)——血流減少、發炎介質與細胞減少、降低發炎反應與腫脹。A增加血流送氧抗體、B增加微血管通透性、C增加心輸出量延展度皆是「促進(熱療)」非抑制炎症。故D正確。","options":{"A":"增血流送氧抗體是促進(熱療)。","B":"增加通透性是促進發炎。","C":"增心輸出延展度非抑炎。","D":"正確(本題答案)。血管收縮減白血球淋巴球至組織抑炎。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"112030-N2-21":{"quick":"長時間局部用冷組織受損徵象「不」含出現汗珠;含麻木僵硬疼痛。","detail":{"background":"長時間局部用冷致組織受損(凍傷)徵象:B麻木感、C僵硬感、D疼痛感、皮膚蒼白青紫水泡。選項A「出現汗珠」「不」是冷療組織受損的徵象(本題答案)——出汗是「散熱/熱反應」,冷療不會出汗。故不包含汗珠(A)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"正確(本題答案)。出汗非冷療組織受損徵象。","B":"麻木感是受損徵象。","C":"僵硬感是受損徵象。","D":"疼痛是受損徵象。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"112030-N2-26":{"quick":"用冷降低炎症的原理=降低白血球數量和活動。","detail":{"background":"用冷降低炎症過程的主要原理是「降低白血球數量和活動(血管收縮、血流減少、白血球聚集減少)」(C正確)。A增加細胞代謝、B增加微血管通透性、D減少血液黏稠度皆與「降炎症」相反(那是促發炎/熱療)。故降低白血球數量活動(C)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"增加代謝非降炎症。","B":"增加通透性是促發炎。","C":"正確(本題答案)。降低白血球數量和活動以降炎症。","D":"冷療增加血液黏稠度,非減少。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"112030-N2-27":{"quick":"靜脈炎適合用冷療。","detail":{"background":"冷熱應用適應症:A「靜脈炎適合用『冷』療」正確(消炎止痛消腫)。B骨骼肌肉拉傷「48小時後」應用「熱療」(促循環散瘀);C心臟手術用低溫是「降低代謝/保護」非促進代謝;D類風濕性關節炎「急性期」應用「冷療」(消炎),慢性期才熱療。故靜脈炎用冷療(A)。","options":{"A":"正確(本題答案)。靜脈炎適合用冷療。","B":"拉傷48小時後應用熱療。","C":"低溫是降低代謝保護,非促進。","D":"類風濕急性期用冷療,非熱療。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"113030-N2-17":{"quick":"冷敷中患處有「涼的感覺」可持續使用;麻木/藍斑/疼痛需暫停。","detail":{"background":"冷敷過程中患處出現:A「涼的感覺」是正常反應,「可持續使用」(A正確)。B麻木感(神經受影響)、C藍斑(發紺、血循受阻)、D疼痛——皆是組織受損警訊,「需暫停」。故可持續者為涼的感覺(A)。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"正確(本題答案)。涼的感覺正常,可持續使用。","B":"麻木感需暫停。","C":"藍斑(發紺)需暫停。","D":"疼痛需暫停。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"114030-N2-18":{"quick":"冷療：2冰袋冰枕不可直接接觸皮膚、3冰領用於甲狀腺術後止血止痛→「23」，故選C。","detail":{"background":"本題官方答案「13」。冷療應用:1濕冷敷較乾冷的「穿透力佳」(對,水導熱強);3冰領適用於甲狀腺術後的「止痛與止血」(對,冷使血管收縮)。選項2「冰袋及冰枕不能直接用於皮膚」(對,須布包裹)——惟本題正確組合為「13」;4...。核心:濕冷穿透力強(同溫更傷,須提高溫度防凍傷)、冰領用於甲狀腺術後止血。","options":{"A":"含1(濕冷對組織傷害較大,非較小)錯。","B":"含1錯。","C":"正解(23)：冰袋冰枕需包布、冰領用於甲狀腺術後止血止痛。","D":"含4(低溫毯是降低非促進新陳代謝率)錯。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"114100-N2-16":{"quick":"踝扭傷出血:48小時內冰敷,48小時後熱敷。本題答案D。","detail":{"background":"本題官方答案D。足踝扭傷(無骨折)離院護理指導:急性期(受傷「48小時內」)應「冰敷(消腫止血止痛)」,「48小時後」改「熱敷(促進血液循環、散瘀、加速修復)」(D「48小時後熱敷促進血液循環」正確)。A交替冷熱、B持續泡冷水、C「48小時內冰敷『減少關節僵硬』」(冰敷是消腫非減僵硬)皆不適當。故D正確。","options":{"A":"不宜立即交替冷熱。","B":"不宜持續泡冷水。","C":"48小時內冰敷是消腫,非減僵硬。","D":"正確(本題答案)。48小時後熱敷促進血液循環。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"114170-N2-16":{"quick":"血栓靜脈炎處置:立即移除原注射針。","detail":{"background":"靜脈輸注發生「血栓靜脈炎」的最適當處理是「立即移除原注射針(停止該部位注射)」(A正確),另選部位重新注射,原部位可濕冷敷、抬高(但不可按摩防血栓脫落)。B調慢滴速(無效)、C「按摩」(血栓不可按摩)、D單純抬高(不足)。故立即移除原注射針(A)。","options":{"A":"正確(本題答案)。血栓靜脈炎立即移除原注射針。","B":"調慢滴速無法解決。","C":"血栓不可按摩(防脫落)。","D":"單純抬高不足,應先移除。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"114170-N2-17":{"quick":"冷、熱共同效果=減緩疼痛(2)、減緩充血與腫脹(4)→「24」。","detail":{"background":"冷療與熱療「共同」達成的效果:2減緩疼痛(冷降神經傳導、熱鬆肌肉)、4減緩充血與腫脹(冷減滲出、熱促循環帶走滲液)。選項1「減緩炎症反應」是「冷療」(熱療反而促炎);3「減緩關節僵硬」是「熱療」(冷療反增僵硬)。故共同效果為「24」。用冷:血管收縮、降微血管通透性、降白血球活性、降代謝、降神經傳導→止血消腫止痛抑炎。適用扭傷初期(48小時內)、靜脈炎、流鼻血(前額冰敷)、甲狀腺術後(冰領);禁開放性傷口、循環不良、頭部外傷。每次20~30分鐘,超時致反彈或凍傷;冰敷須布包不直接接觸皮膚。","options":{"A":"含1(減炎是冷療)不符。","B":"正確(本題答案,24)。減緩疼痛、減緩充血腫脹。","C":"含1、3不符。","D":"含3(減僵硬是熱療)不符。"},"sources":["新文京《基本護理學》用冷療法","華杏《最新基本護理學》冷療應用"]}},"101030-N2-18":{"quick":"烤燈:應隨時觀察皮膚不可「照到說不冷為止」(過久燙傷);稱照到說不冷為止為錯誤。","detail":{"background":"產後寒顫用烤燈:A需先清潔擦乾身體(對);B每2~5分鐘檢查皮膚反應(對);C用40W燈泡、距離18~24吋(對)。選項D「照射到趙女士說不冷為止」錯誤——烤燈使用應「定時(約15~20分鐘)、隨時觀察皮膚」,不可「照到說不冷為止」(時間不定、易燙傷),故D為錯誤敘述(本題答案)。","options":{"A":"正確。先清潔擦乾身體。","B":"正確。每2~5分檢查皮膚。","C":"正確。40W、距離18~24吋。","D":"錯誤(本題答案)。應定時觀察,非照到不冷為止。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"101030-N2-19":{"quick":"產後溫水坐浴最適合「1:100水溶性優碘」溶液。","detail":{"background":"產後會陰傷口溫水坐浴溶液:選「1:100水溶性優碘(beta-iodine)」(D正確)——具消毒、預防感染、促進癒合作用,適合產後會陰傷口。溫開水(清潔)、硫酸鎂(消腫收斂、用於痔瘡)、高錳酸鉀(濃度需正確)各有用途,但產後會陰傷口以稀釋優碘消毒最適合。故1:100優碘(D)。","options":{"A":"溫開水僅清潔,無消毒。","B":"硫酸鎂用於痔瘡消腫收斂。","C":"高錳酸鉀1:400非首選。","D":"正確(本題答案)。產後坐浴用1:100優碘消毒。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"101030-N2-20":{"quick":"產後溫水坐浴最主要目的=促進傷口癒合。","detail":{"background":"產後會陰傷口溫水坐浴的最主要目的是「促進(會陰)傷口癒合」(B正確)——溫熱促進血液循環、消腫止痛、清潔、加速組織修復。減輕肌肉痙攣(次要)、促進排泄、升高體溫皆非主要。故促進傷口癒合(B)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"減輕肌肉痙攣是次要。","B":"正確(本題答案)。產後坐浴主要促進傷口癒合。","C":"促進排泄非主要目的。","D":"非為升高體溫。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"101110-N2-23":{"quick":"痔瘡術後溫水坐浴:溫度40.5~43°C促進血液循環。","detail":{"background":"痔瘡術後溫水坐浴:B「治療溫度維持於40.5~43°C,以促進血液循環」正確。A「不需注滿無菌水全身浸泡」(坐浴只浸臀部會陰,非全身);C治療藥物非「石蠟油礦物油1:1」(坐浴用溫水或藥液如優碘、硫酸鎂);D坐浴時間「15~20分鐘」非至少1小時(過久致低血壓)。故B正確。","options":{"A":"坐浴只浸臀部會陰,非全身。","B":"正確(本題答案)。溫度40.5~43°C促進血循。","C":"坐浴用溫水/藥液,非石蠟礦物油。","D":"坐浴15~20分鐘,非1小時。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"102030-N2-23":{"quick":"溫水坐浴適用:經痛鬆弛骨盆肌(1)、痔瘡促循環減痛(2)、清潔會陰(4)→「124」。","detail":{"background":"溫水坐浴適用:1經痛時鬆弛骨盆肌肉、減輕痙攣、2痔瘡疼痛時促進血液循環減痛、4清潔會陰肛門區、促進產後/術後傷口癒合。選項3「發燒>39°C促進排汗降溫」錯誤(發燒降溫用溫水拭浴/冰枕,非坐浴;坐浴是『熱療促循環』反而可能升溫)。故為「124」。","options":{"A":"正確(本題答案,124)。經痛、痔瘡、清潔會陰適用坐浴。","B":"含3(發燒降溫)不符。","C":"含3、5不符。","D":"含5不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"102030-N2-24":{"quick":"冷熱應用:冰枕未排空氣會影響傳導(2)、痔瘡用熱坐浴(4)?本題答案C=「24」。","detail":{"background":"本題官方答案「24」。冷熱應用:2「使用冰枕若未將袋內空氣排出,會影響溫度的傳導,妨礙治療效果」(對)、4「痔瘡用溫水坐浴(熱療促循環)」(對)。選項1「全身用熱主要促進化膿與組織癒合」錯(全身用熱目的非促化膿);3...。故為「24」。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"含1(促化膿)錯。","B":"含1、3不符。","C":"正確(本題答案,24)。冰枕排空氣、痔瘡用熱坐浴。","D":"含3不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"102030-N2-25":{"quick":"溫水坐浴中眩暈:協助身體前傾使頭部低於心臟。","detail":{"background":"溫水坐浴過程中病人「眩暈不適」(因下半身血管擴張致姿位性低血壓、腦血流減少),最適宜「協助病人身體前傾,使頭部低於心臟」(D正確)以增加腦部血流。A當正常現象不處理、B當缺氧深呼吸、C加冷水降溫皆未對應姿位性低血壓。故身體前傾頭低於心臟(D)。","options":{"A":"眩暈非正常,需處理。","B":"非缺氧,是姿位性低血壓。","C":"非水溫太高,是姿位性低血壓。","D":"正確(本題答案)。身體前傾使頭低於心臟。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"102110-N2-20":{"quick":"發燒護理:頭部使用冰枕時選擇測量「腋溫」。","detail":{"background":"發燒病患護理:B「頭部使用冰枕時,則選擇測量腋溫」正確(頭部冰枕會影響耳溫/口溫,改測腋溫較準)。A溫水拭浴水溫「32~37°C(接近體溫偏涼)」非37.7~40°C(過熱);C烤燈是「保暖」非促排汗降溫(發燒不用烤燈);D不可用「25°C冷水浸泡」(過冷致寒顫、血管收縮反不利散熱)。故B正確。","options":{"A":"溫水拭浴32~37°C,非37.7~40°C。","B":"正確(本題答案)。頭部冰枕時測腋溫。","C":"烤燈是保暖,非發燒降溫。","D":"不可用25°C冷水浸泡(致寒顫)。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"103100-N2-23":{"quick":"烤燈:25W烤燈與照射部位安全距離為16吋?本題答案A。","detail":{"background":"本題官方答案A。烤燈使用:A「25W烤燈與照射部位的安全距離為16吋(約40 cm)」(小烤燈25~40W距離較近約14~18吋)。B烤燈使用時間「15~20分鐘」非持續30分鐘;C烤燈「不適用昏迷低體溫病患」(昏迷者感覺差易燙傷);D烤燈作用是「輻射」非蒸發。故A正確。","options":{"A":"正確(本題答案)。25W烤燈安全距離約16吋。","B":"烤燈15~20分鐘,非30分鐘。","C":"昏迷者感覺差,不適用烤燈。","D":"烤燈是輻射,非蒸發。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"104030-N2-28":{"quick":"痔瘡術後溫水坐浴:可刺激排尿與促進肌肉鬆弛。","detail":{"background":"痔瘡切除術後溫水坐浴:B「可以刺激排尿與促進肌肉(括約肌)鬆弛」正確(溫熱放鬆會陰括約肌、誘導排尿、減痛)。A「促進血液循環水溫『40.5~43°C』」非37.8~40(清潔才37.8~40,促循環需稍高);C坐浴「不」刺激腸蠕動(那是灌腸);D坐浴時間「15~20分鐘」非愈長愈好。故B正確。","options":{"A":"促循環水溫約40.5~43°C,非37.8~40。","B":"正確(本題答案)。刺激排尿與促進肌肉鬆弛。","C":"坐浴不刺激腸蠕動。","D":"坐浴15~20分鐘,非愈長愈好。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"104030-N2-31":{"quick":"烤燈:運用輻射原理促血循(1)、適用植皮受皮區(2)→「12」。","detail":{"background":"烤燈使用:1運用「輻射」原理提供輻射熱促進血液循環、2適用於「植皮受皮區(供皮/受皮區)」促進乾燥與癒合。選項3「小烤燈(40瓦)須距離皮膚『25~30吋』」錯(40W小烤燈距離約14~18吋,25~30吋太遠);4使用烤燈前須清潔皮膚(此項其實對,但本題正確組合為12)。故為「12」。","options":{"A":"正確(本題答案,12)。輻射促血循、適用植皮受皮區。","B":"含...不符。","C":"含3(距離25~30吋)錯。","D":"含3不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"104100-N2-24":{"quick":"溫水坐浴「不」收縮膀胱括約肌(是『鬆弛』括約肌刺激排尿);稱收縮括約肌為錯誤。","detail":{"background":"溫水坐浴治療原理:A鬆弛骨盆肌肉減輕充血痙攣疼痛(對);B促進肛門會陰血循助癒合(對);D清潔會陰預防感染(對)。選項C「可『收縮』膀胱括約肌,對尿瀦留刺激排尿」錯誤——溫水坐浴是「『鬆弛』(放鬆)尿道/膀胱括約肌」以刺激排尿(熱使肌肉放鬆),非收縮,故C為錯誤敘述(本題答案)。","options":{"A":"正確。鬆弛骨盆肌減充血痙攣。","B":"正確。促會陰血循助癒合。","C":"錯誤(本題答案)。坐浴鬆弛括約肌刺激排尿,非收縮。","D":"正確。清潔會陰預防感染。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"104100-N2-39":{"quick":"凍瘡:可浸泡溫水、水溫由10~15°C開始漸升。","detail":{"background":"凍瘡(frostbite/chilblain):D「凍瘡處可浸泡溫水,水溫『由10~15°C開始』漸進升溫復溫」正確(緩慢復溫防組織進一步傷害)。A凍瘡常發生於「肢體末梢(手指腳趾耳鼻)」非軀幹;B凍瘡「不可用烤燈(直接高溫)」(易燙傷壞死);C「不可按摩」凍瘡處(會傷已凍傷組織)。故D正確。","options":{"A":"凍瘡好發肢體末梢,非軀幹。","B":"凍瘡不可用烤燈(易燙傷)。","C":"凍瘡不可按摩(傷組織)。","D":"正確(本題答案)。浸泡溫水由10~15°C漸升復溫。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"105030-N2-30":{"quick":"冷熱優缺:乾冷乾熱不受蒸發影響保溫久(1)、濕冷濕熱穿透力強(3)→「13」。","detail":{"background":"冷熱療法優缺點:1「乾冷、乾熱不會受蒸發影響,能保持溫度較久」(對)、3「濕冷、濕熱深入組織層,穿透力強」(對,水導熱好)。選項2「乾冷乾熱較容易造成凍傷與燙傷」錯(是『濕冷濕熱』穿透強較易凍傷燙傷);4...。故為「13」。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"含2(乾冷熱易凍傷燙傷)錯。","B":"正確(本題答案,13)。乾冷熱保溫久、濕冷熱穿透強。","C":"含2、4不符。","D":"含4不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"105090-N2-2":{"quick":"熱水袋適宜溫度約50°C。","detail":{"background":"使用熱水袋的適宜溫度:成人約「48.9~52°C(約50°C)」(B正確);意識不清/老人/嬰幼兒/感覺遲鈍者應更低(約40.5~46°C)。30°C太低無效、70°C/100°C過高會燙傷。故約50°C(B)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"30°C太低無熱療效果。","B":"正確(本題答案)。熱水袋約50°C。","C":"70°C過高易燙傷。","D":"100°C(沸水)會燙傷。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"105090-N2-27":{"quick":"7個月嬰兒紅臀較佳熱療法=烤燈。","detail":{"background":"嬰兒「紅臀(尿布疹)」較佳的熱療法是「烤燈」(B正確)——烤燈(輻射熱)使臀部「乾燥、促進血循、改善紅臀」,且不直接接觸皮膚、相對安全。熱水袋、電熱毯(直接接觸、嬰兒易燙傷)、化學加熱包皆不適合嬰兒紅臀。故烤燈(B)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"熱水袋直接接觸,嬰兒易燙傷。","B":"正確(本題答案)。嬰兒紅臀用烤燈(乾燥促循環)。","C":"電熱毯直接接觸,嬰兒易燙傷。","D":"化學加熱包不適合嬰兒紅臀。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"106110-N2-25":{"quick":"乾冷或乾熱:不會造成皮膚浸潤。","detail":{"background":"乾冷/乾熱應用:A「不會造成皮膚浸潤(乾燥不泡水)」正確。B「可減少乾燥、軟化傷口滲出物」是「濕熱」(濕潤);C「溫度容易受蒸發干擾」是「濕」冷熱(乾的不受蒸發);D「比濕熱更容易燙傷」錯(是『濕熱』穿透強更易燙傷)。故乾冷乾熱不造成皮膚浸潤(A)。","options":{"A":"正確(本題答案)。乾冷乾熱不造成皮膚浸潤。","B":"軟化滲出物是濕熱。","C":"受蒸發干擾是濕冷熱。","D":"濕熱更易燙傷,非乾熱。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"106110-N2-27":{"quick":"扭傷48小時後熱敷主要目的=促進血液循環,減輕充血腫脹。","detail":{"background":"扭傷「48小時後」用熱敷的主要目的是「促進血液循環,減輕(已形成的)充血腫脹(散瘀)、加速修復」(B正確)。A增加血液黏稠度促凝血(冷療)、C降低微血管通透性減液體進組織(冷療)、D降低神經傳導減痛(冷療)皆是冷療作用。故熱敷促循環減充血腫脹(B)。","options":{"A":"增黏稠度促凝血是冷療。","B":"正確(本題答案)。48小時後熱敷促循環減充血腫脹。","C":"降通透性是冷療。","D":"降神經傳導是冷療。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"106110-N2-28":{"quick":"溫水坐浴頭暈應保持「足部低於心臟」?本題答案D為錯誤(應頭低於心臟)。","detail":{"background":"溫水坐浴:A清潔用途水溫37.8~40.5°C(對);B採舒適坐姿、肛門會陰浸於溶液(對);C一般坐浴時間15~20分鐘(對)。選項D「坐浴當中若頭暈,可保持『足部低於心臟』」錯誤——坐浴頭暈(姿位性低血壓)應使「『頭部』低於心臟(身體前傾)」增加腦血流,非足部低於心臟,故D為錯誤敘述(本題答案)。","options":{"A":"正確。清潔水溫37.8~40.5°C。","B":"正確。肛門會陰浸於溶液。","C":"正確。坐浴15~20分鐘。","D":"錯誤(本題答案)。頭暈應頭低於心臟,非足部低於心臟。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"106111-N2-29":{"quick":"溫水拭浴:溫度接近體溫的溫水(37~42°C)、輕拍方式進行→「13」。","detail":{"background":"溫水拭浴注意:1以「輕拍(拍拭)」方式進行(刺激血管擴張散熱、避免摩擦生熱)、3溫度接近... 選項2「溫度37~42°C」——溫水拭浴水溫一般約「32~37°C(略低於體溫)」,本題2若標37~42偏高。本題官方答案「13」(輕拍+相關正確項)。核心:溫水拭浴輕拍、水溫略低於體溫、腋下手心腹股溝多停留、頭部冰枕。","options":{"A":"正確(本題答案,13)。輕拍方式、相關正確項。","B":"含2(溫度偏高)不符。","C":"含2不符。","D":"含...不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"106111-N2-35":{"quick":"下肢冰涼口頭指導=穿透氣保暖襪促進溫暖(意識不清者勿用熱水袋暖暖包泡熱水易燙傷)。","detail":{"background":"李先生(意識不清/感覺差)下肢冰涼,口頭指導家屬最適當是「穿透氣保暖襪以促進溫暖」(D正確)——被動保暖、安全。A熱水袋、B暖暖包、C泡熱水皆是「直接高溫接觸」,意識不清/感覺遲鈍者「易燙傷」,不可用。故穿保暖襪(D)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"意識不清用熱水袋易燙傷。","B":"暖暖包直接接觸易燙傷。","C":"泡熱水易燙傷。","D":"正確(本題答案)。穿透氣保暖襪安全促溫暖。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"107030-N2-20":{"quick":"可用熱療法緩解=下背部疼痛。","detail":{"background":"可用「熱療法」緩解不適者:C「下背部疼痛」(熱敷促進血循、放鬆肌肉、緩解慢性肌肉痠痛)(C正確)。A「腹痛到急診(不明原因急性腹痛)」不可熱敷(可能掩蓋病情/加重發炎,如闌尾炎);B「牙髓發炎(急性發炎)」應冷敷;D「鼻出血」應冷敷止血。故下背部疼痛用熱療(C)。","options":{"A":"不明原因急性腹痛不可熱敷。","B":"牙髓發炎(急性)應冷敷。","C":"正確(本題答案)。下背部疼痛可用熱療緩解。","D":"鼻出血應冷敷止血。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"107030-N2-23":{"quick":"瘦弱感覺差老人冷熱護理:用乾熱時宜低於成人建議溫度5°C。","detail":{"background":"李奶奶(90歲、瘦弱、皮膚薄、感覺差)冷熱護理:C「使用乾熱時,宜低於成人建議溫度5°C」正確(老人感覺遲鈍易燙傷,降溫使用較安全)。A「發冷時熱水浸泡」不安全(易燙傷);B「發高燒用『酒精』拭浴」錯(酒精揮發快致寒顫、吸收中毒,應用溫水);D「持續四肢放熱水袋」(瘦弱感覺差易燙傷)。故C正確。","options":{"A":"發冷熱水浸泡不安全(易燙傷)。","B":"高燒不可用酒精拭浴(致寒顫中毒)。","C":"正確(本題答案)。乾熱宜低於成人溫度5°C。","D":"持續放熱水袋易燙傷。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"107030-N2-25":{"quick":"頭部不宜直接用熱:會使顱內壓上升、頭痛噁心嘔吐、腦充血。","detail":{"background":"頭部不宜直接用「熱療」的原因:C「會使頭部『顱內壓上升』,產生頭痛、噁心嘔吐、甚至引起腦充血」正確(熱使腦血管擴張、血流增、顱內壓升)。A、B、D是「冷療」對頭部的影響(降通透性/降血循/降代謝)。故熱療使顱內壓上升腦充血(C)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"降通透性是冷療作用。","B":"降血循是冷療作用。","C":"正確(本題答案)。熱使顱內壓上升、腦充血。","D":"降破壞酶活性是冷療作用。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"107110-N2-23":{"quick":"濕熱比乾熱更須小心「不」是因濕熱溫度比乾熱高;濕熱同溫穿透強更易燙傷。","detail":{"background":"濕熱敷比乾熱更須小心的理由:A水的傳導能力比空氣強、效果快(對);C水是良好導體、容易燙傷(對);D濕熱對組織傷害性更大(對)。選項B「因濕熱所用的溫度比乾熱『高』,才能達到相同效果」錯誤——濕熱穿透力強,「相同溫度」下濕熱效果更強更易燙傷,故濕熱用的溫度應「較低(非較高)」,B敘述顛倒,故B為錯誤敘述(本題答案)。","options":{"A":"正確。水傳導比空氣強、效果快。","B":"錯誤(本題答案)。濕熱溫度應較低,非較高。","C":"正確。水是良好導體易燙傷。","D":"正確。濕熱對組織傷害更大。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"107110-N2-25":{"quick":"冷熱應用:全身用熱使血管擴張腦血流減少致頭暈(2)、全身...→本題答案C「24」。","detail":{"background":"本題官方答案「24」。冷熱應用:2「全身用熱會使血管擴張、血循改變,腦血流減少導致頭暈」(對)、4(全身相關正確項)。選項1「冷熱應用面積越大,效果越好,『耐受力也越佳』」錯(面積大耐受力『越差』);3...。故為「24」。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"含1(耐受力越佳)錯。","B":"含1、3不符。","C":"正確(本題答案,24)。全身用熱致腦血流減少頭暈。","D":"含3不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"108020-N2-22":{"quick":"sitz bath(坐浴)水溫不應50°C(約40~43°C);稱50°C為錯誤。","detail":{"background":"產後痔瘡溫水坐浴(sitz bath bid):B臀部應完全浸入水中(對);C坐浴時間20分鐘(對);D目的促進血循減輕局部充血(對)。選項A「準備的水溫應為50°C」錯誤——溫水坐浴水溫約「40~43°C(清潔37.8~40.5°C、促循環40.5~43°C)」,50°C過高會燙傷,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。坐浴水溫約40~43°C,非50°C。","B":"正確。臀部完全浸入水中。","C":"正確。坐浴時間20分鐘。","D":"正確。目的促進血循減充血。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"108020-N2-26":{"quick":"局部用熱生理反應=血管擴張血流增(1)、增組織氧量(5)、減輕疼痛(6)→「156」。","detail":{"background":"局部用熱的生理反應:1血管擴張、血流增加、5增加組織氧量(供氧增加)、6減輕疼痛(放鬆肌肉)。選項2「增加血液黏稠性」是冷療(熱療反而降黏稠度);3「使神經傳導變慢」是冷療;4「減少肌肉張力」是對(熱療鬆肌肉)但本題正確組合為156。故用熱反應為「156」。","options":{"A":"含3(神經傳導變慢是冷療)不符。","B":"正確(本題答案,156)。血管擴張、增組織氧、減痛。","C":"含2(增黏稠是冷療)不符。","D":"含3不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"108020-N2-28":{"quick":"電熱墊:中溫51.8~57.3°C防燙傷(1)、使用前皮膚擦乾防電擊(2)→「12」。","detail":{"background":"電熱墊使用注意:1一般使用「中溫51.8~57.3°C(125~135°F)」以免燙傷、2使用前「皮膚必須擦乾」以免造成電擊/休克(電器避免接觸潮濕)。選項3、4...。故官方答案「12」。核心:電熱墊中溫、皮膚乾燥防電擊、不可摺疊、避免壓躺睡著。","options":{"A":"正確(本題答案,12)。中溫51.8~57.3°C、皮膚擦乾防電擊。","B":"含4不符。","C":"含3不符。","D":"含3、4不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"108020-N2-29":{"quick":"濕冷熱比乾冷熱危險性高(水傳導滲透性佳);稱乾冷熱效果較好為錯誤,B正確。","detail":{"background":"影響冷熱效用:B「水的傳導和滲透性較空氣為佳,故『濕』冷熱較『乾』冷熱在運用上的危險性也較高」正確。A「空氣的傳導滲透性較水佳,乾冷熱效果較好」錯(顛倒,水比空氣傳導好);C「濕熱溫度應較乾熱『高』」錯(濕熱穿透強,溫度應較低);D「乾冷比濕冷溫度為『高』」錯(濕冷穿透強,濕冷溫度需較高防凍傷)。故B正確。","options":{"A":"水比空氣傳導好,乾冷熱效果非較好。","B":"正確(本題答案)。濕冷熱危險性較高。","C":"濕熱溫度應較低,非較高。","D":"濕冷溫度需較高,敘述顛倒。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"108110-N2-3":{"quick":"濕熱療法=溫水坐浴(2)、石蠟浴(4)、溫水浸泡(5)→「245」。","detail":{"background":"臨床常用「濕熱療法」(以水/液體為介質):2溫水坐浴、4石蠟浴、5溫水浸泡——皆濕熱。選項1「熱水袋」、3「烤燈」是「乾熱」療法(不直接以水接觸)。故濕熱療法為「245」。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"含1(熱水袋乾熱)、3(烤燈乾熱)不符。","B":"含1不符。","C":"含3不符。","D":"正確(本題答案,245)。坐浴、石蠟浴、溫水浸泡。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"109030-N2-24":{"quick":"關節炎「不」是熱療法高危險族群;心律調節器/脊髓損傷/糖尿病足是高危。","detail":{"background":"執行熱療法的「高危險族群」(感覺差、循環差、易燙傷):A裝置心臟節律器患者(電熱可能干擾)、C脊髓損傷患者(感覺喪失)、D糖尿病足部病變(感覺神經病變、循環差)——皆高危。選項B「關節炎患者」不是熱療高危族群(本題答案)——關節炎反而「適合」熱療(緩解僵硬疼痛)。故不是高危者為關節炎(B)。","options":{"A":"心臟節律器患者是熱療高危。","B":"正確(本題答案)。關節炎適合熱療,非高危。","C":"脊髓損傷(感覺喪失)是高危。","D":"糖尿病足(感覺差循環差)是高危。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"109110-N2-8":{"quick":"熱水袋:意識不清病人適用溫度約40.5~46.1°C(較低)。","detail":{"background":"熱水袋使用:A「意識不清病人的適用溫度約為40.5~46.1°C」正確(意識不清/感覺差者用較低溫防燙傷;成人約48.9~52°C)。B使用時間「20~30分鐘」非1小時;C應「先放橡皮治療巾(布套)再貼放皮膚」(非貼皮膚後再放,須隔開防燙傷);D「排出空氣」(非留空氣,空氣影響傳導)。故A正確。","options":{"A":"正確(本題答案)。意識不清者用較低溫40.5~46.1°C。","B":"使用20~30分鐘,非1小時。","C":"應先放布套隔開再貼皮膚。","D":"應排出空氣,非留空氣。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"109110-N2-28":{"quick":"用熱生理反應=增淋巴流動與白血球機動性(4)、(其他)→本題答案C「14」?重判官方C。","detail":{"background":"本題官方答案C(14)。用熱的生理反應:4「增加淋巴流動與白血球機動性」(對,促進發炎修復)、1「減緩充血與腫脹」(對,熱促循環帶走滲液)。選項2「增加血液黏稠度」是冷療;3「抑制炎症反應」是冷療(熱療反而促炎修復)。故用熱反應為「14」。","options":{"A":"12含2(增黏稠是冷療)不符。","B":"34含3(抑炎是冷療)不符。","C":"正確(本題答案,14)。減充血腫脹、增淋巴白血球機動性。","D":"23不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"110030-N2-25":{"quick":"熱水袋「不」能安全用於老人嬰幼兒且須考慮燙傷;稱不須考慮燙傷為錯誤。","detail":{"background":"用熱方式與目的:A石蠟浴用於類風濕關節炎(對);B溫水浸泡促糖尿病足血循(對,須注意溫度);C烤燈用於植皮供皮區促癒合(對)。選項D「熱水袋能『安全』地使用於老人和嬰幼兒,且『不須考慮燙傷』問題」錯誤——老人嬰幼兒皮膚薄、感覺差,熱水袋「須降低溫度、特別小心防燙傷」,並非不須考慮,故D為錯誤敘述(本題答案)。","options":{"A":"正確。石蠟浴用於類風濕關節炎。","B":"正確。溫水浸泡促糖尿病足血循。","C":"正確。烤燈用於植皮供皮區。","D":"錯誤(本題答案)。老人嬰幼兒用熱水袋須防燙傷。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"110030-N2-29":{"quick":"適宜使用熱療=3天前腳踝扭傷(亞急性/慢性期)。","detail":{"background":"適宜使用「熱療」者:D「3天前腳踝扭傷」(受傷48小時後、亞急性期,熱療促循環散瘀修復)(D正確)。A不明原因腹痛(急性、不可熱敷掩蓋病情)、B持續出血(熱使血管擴張加重出血)、C齒齦發炎(急性發炎應冷敷)皆不宜熱療。故3天前扭傷(D)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"不明腹痛不可熱敷。","B":"持續出血熱敷加重出血。","C":"齒齦發炎(急性)應冷敷。","D":"正確(本題答案)。3天前扭傷適宜熱療。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"110110-N2-32":{"quick":"產後會陰烤燈「不」是促進血管收縮(是促進血液循環/乾燥消腫);稱促血管收縮為錯誤。","detail":{"background":"產後會陰傷口使用烤燈目的:A促進傷口乾燥(對)、C減輕腫脹(對)、D促進血液循環(對)。選項B「可促進血管『收縮』」錯誤——烤燈是「熱療」,使血管「擴張、促進血液循環」(非收縮),以乾燥、消腫、促進癒合,故B為錯誤敘述(本題答案)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"正確。烤燈促進傷口乾燥。","B":"錯誤(本題答案)。烤燈促血管擴張循環,非收縮。","C":"正確。減輕腫脹。","D":"正確。促進血液循環。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"110110-N2-33":{"quick":"便秘痔瘡凸出疼痛最適當冷熱處理=溫水坐浴。","detail":{"background":"便秘、痔瘡凸出疼痛,最適當的冷熱處理是「溫水坐浴」(C正確)——溫熱促進肛門會陰血液循環、鬆弛括約肌、減輕痔瘡充血疼痛、利排便。A肛門乾熱敷、B熱水袋(直接接觸不便)、D冷敷墊(痔瘡急性出血才冷敷止血)皆不如溫水坐浴。故溫水坐浴(C)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"乾熱敷不如坐浴全面。","B":"熱水袋直接接觸肛門不便。","C":"正確(本題答案)。痔瘡疼痛用溫水坐浴。","D":"冷敷用於痔瘡急性出血,非此。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"111030-N2-26":{"quick":"沐浴後寒顫用烤燈:使用時間15~20分鐘。","detail":{"background":"沐浴後寒顫用烤燈:D「使用時間以15~20分鐘為宜」正確。A烤燈是「輻射」原理非蒸發;B使用過程應保持皮膚「乾燥」非濕潤(烤燈促乾燥);C「40W燈泡距離18~24吋」(60W距離需更遠,本題C稱60W距18~24吋偏近)。故D正確(15~20分鐘)。","options":{"A":"烤燈是輻射,非蒸發。","B":"應保持皮膚乾燥,非濕潤。","C":"燈泡瓦數與距離須對應,60W距離須更遠。","D":"正確(本題答案)。烤燈使用15~20分鐘。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"111030-N2-27":{"quick":"心臟手術低溫毯「不」墊絨布增加冷傳導(絨布隔熱反減傳導);稱墊絨布增加冷傳導為錯誤。","detail":{"background":"冷敷應用:A冰領用於甲狀腺術後傳導降溫促止血(對);C溫水拭浴時頭部置冰枕防腦充血(對);D冰敷不直接接觸皮膚、須布類包裹(對)。選項B「心臟手術使用低溫毯時,墊上絨布可『增加』冷的傳導效果」錯誤——絨布是「隔熱(減少傳導)」材質,墊絨布會「降低」冷的傳導(保護皮膚但減效),非增加,故B為錯誤敘述(本題答案)。","options":{"A":"正確。冰領甲狀腺術後傳導止血。","B":"錯誤(本題答案)。絨布隔熱會減少冷傳導,非增加。","C":"正確。溫水拭浴頭置冰枕防腦充血。","D":"正確。冰敷須布類包裹。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"111110-N2-26":{"quick":"熱水袋「不」能促進循環以減緩懷孕宮縮(熱反而可能刺激);稱減緩宮縮為錯誤。","detail":{"background":"熱療法方式與目的:A溫水浸泡促燒傷焦痂軟化(對);B熱敷墊促肌肉鬆弛減下背痛(對);D烤燈促循環乾燥改善嬰兒紅臀(對)。選項C「熱水袋可促進循環,以『減緩懷孕宮縮』」錯誤——孕婦腹部「不宜熱敷」(可能影響胎兒、熱不能可靠減緩宮縮),減緩早產宮縮須用安胎藥,故C為錯誤敘述(本題答案)。","options":{"A":"正確。溫水浸泡軟化燒傷焦痂。","B":"正確。熱敷墊減下背痛。","C":"錯誤(本題答案)。熱水袋不能減緩懷孕宮縮。","D":"正確。烤燈改善嬰兒紅臀。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"111110-N2-27":{"quick":"局部惡性腫瘤不宜熱療:會促進血流增加、癌細胞獲更多氧養加速轉移。","detail":{"background":"不宜熱療的高危情況與理由:B「局部惡性腫瘤,會促進血流增加,癌細胞獲得更多氧氣與養分,加速其轉移」正確。A開放性傷口理由錯(對溫度『不敏感』敘述不當);C頭部外傷理由錯(熱使顱內壓升非降通透性);D末梢血管疾病理由錯(循環差散熱差易燙傷,非熱能易散發)。故B正確(腫瘤熱療促轉移)。","options":{"A":"開放性傷口理由敘述不當。","B":"正確(本題答案)。腫瘤熱療促血流增加加速轉移。","C":"頭部外傷是熱使顱內壓升。","D":"末梢血管疾病是散熱差易燙傷。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"111110-N2-28":{"quick":"高燒39°C溫水拭浴水溫應準備27~37°C。","detail":{"background":"溫水拭浴(發燒降溫)水溫應準備「27~37°C(略低於體溫的溫水)」(C正確)——比體溫略低、以傳導與蒸發帶走熱,又不致過冷引起寒顫(寒顫反產熱)。41~43°C(過熱)、38~40°C(偏高)、18~26°C(過冷致寒顫)皆不宜。故27~37°C(C)。","options":{"A":"41~43°C過熱,不利降溫。","B":"38~40°C偏高。","C":"正確(本題答案)。溫水拭浴水溫27~37°C。","D":"18~26°C過冷致寒顫。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"112030-N2-28":{"quick":"會陰切開術後坐浴溶液=1:100水溶性優碘,具消毒作用。","detail":{"background":"會陰切開術後產婦坐浴溶液:B「1:100水溶性優碘(beta-iodine),具消毒作用」正確(預防會陰傷口感染)。A 4% Hibiscrub(濃度過高、刺激);C「1:40高錳酸鉀」濃度過高(應更稀如1:4000~1:8000);D「80%硫酸鎂」濃度敘述(硫酸鎂10~50%用於消腫收斂,80%過高)。故B正確。","options":{"A":"4% Hibiscrub濃度過高刺激。","B":"正確(本題答案)。1:100優碘具消毒作用。","C":"1:40高錳酸鉀過濃(應1:4000以上)。","D":"硫酸鎂濃度敘述不當。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"112110-N2-26":{"quick":"使用輻射方式=紅外線(2)、烤燈(4)→「24」。","detail":{"background":"冷熱應用使用「輻射」方式者:2紅外線、4烤燈(皆輻射熱、不需介質)。選項1「冰枕」是傳導;3「溫水拭浴」是蒸發+傳導;5「熱水袋」是傳導。故輻射方式為「24」(紅外線、烤燈)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"13含冰枕(傳導)、溫水拭浴(蒸發)不符。","B":"正確(本題答案,24)。紅外線、烤燈是輻射。","C":"34含溫水拭浴、熱水袋不符。","D":"45含熱水袋(傳導)不符。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"112110-N2-28":{"quick":"高燒溫水拭浴:腋下、手心、腹股溝處須多停留數秒。","detail":{"background":"溫水拭浴(高燒39.5°C):C「拭浴時,腋下、手心與腹股溝處須多停留數秒鐘」正確(大血管經過處、散熱效果好)。A「頭放熱水袋」錯(頭應放冰枕防腦充血);B「以擦拭取代輕拍」錯(應「輕拍」促血管擴張、避免摩擦生熱);D「後頸後背足部不擦拭」錯(這些部位也應擦拭散熱)。故C正確。","options":{"A":"頭應放冰枕,非熱水袋。","B":"應輕拍,非擦拭。","C":"正確(本題答案)。腋下手心腹股溝多停留數秒。","D":"後頸後背足部也應擦拭。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"113030-N2-15":{"quick":"「所有冷熱敷設備均要直接接觸皮膚」錯誤(須布類隔開防凍傷燙傷);稱直接接觸為錯誤。","detail":{"background":"冷熱療法效果與目的:A熱敷處理疼痛、促進血循減充血腫脹(對);B冷敷用於靜脈炎、減緩血流降白血球活性阻止炎症(對);D濕熱敷塗凡士林保護防燙傷(對)。選項C「所有冷熱敷的設備均要『直接與皮膚接觸』,才能達到最大治療效果」錯誤——冷熱敷設備應「用布類包裹、不直接接觸皮膚」以防凍傷/燙傷,故C為錯誤敘述(本題答案)。","options":{"A":"正確。熱敷減充血腫脹。","B":"正確。冷敷阻止靜脈炎炎症。","C":"錯誤(本題答案)。冷熱敷不可直接接觸皮膚(防凍傷燙傷)。","D":"正確。濕熱敷塗凡士林防燙傷。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"113100-N2-14":{"quick":"用熱合併症「超過1小時血管收縮組織缺氧」?本題答案B為錯誤(全身症狀非心跳停止)。","detail":{"background":"本題官方答案B(錯誤)。用熱合併症:A用熱超過1小時血管反而收縮、組織缺氧(反彈現象,對);C引起局部皮膚發紅、敏感、疼痛或水泡(對,燙傷);D微血管通透性增加致水腫加劇(對)。選項B「出現全身症狀可能會『心跳停止』、體液失衡」——全身性「用熱」合併症是「血壓下降、虛脫、體液電解質失衡」,「心跳停止」是『用冷(低溫)』的全身嚴重合併症,故B描述為錯誤(本題答案)。","options":{"A":"正確。用熱超過1小時血管收縮缺氧。","B":"錯誤(本題答案)。心跳停止是用冷全身合併症,非用熱。","C":"正確。局部發紅疼痛水泡。","D":"正確。通透性增加致水腫。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"113180-N2-18":{"quick":"局部濕熱敷溫度「不」宜50.5~63°C(過高,約40~46°C);稱50.5~63°C為錯誤。","detail":{"background":"局部濕熱敷:A可於濕熱敷處先塗凡士林避免燙傷(對);B保持濕熱敷溫度、敷料應經常更換(對,濕熱散熱快);D使用時間每次約20~30分鐘(對)。選項C「濕熱敷溫度散失快,故溫度以50.5~63°C為宜」錯誤——濕熱敷溫度約「40.5~46°C(或43~46°C)」,50.5~63°C過高會燙傷(濕熱穿透強),故C為錯誤敘述(本題答案)。","options":{"A":"正確。先塗凡士林避免燙傷。","B":"正確。敷料應經常更換保溫。","C":"錯誤(本題答案)。濕熱敷溫度約40~46°C,非50.5~63°C。","D":"正確。每次20~30分鐘。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"114030-N2-17":{"quick":"溫水坐浴溶液「1:8優碘」濃度過高(應1:100);稱1:8優碘為錯誤。","detail":{"background":"溫水坐浴常用溶液:B 1:4000高錳酸鉀用於肛門會陰(對);C 10~50%硫酸鎂用於痔瘡術後具收斂作用(對);D 38~40°C溫水用於清潔促癒合(對)。選項A「1:8水溶性優碘用於產後會陰傷口消毒」錯誤——會陰坐浴優碘濃度應為「1:100」,1:8濃度過高(刺激黏膜),故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。坐浴優碘應1:100,非1:8(過濃)。","B":"正確。1:4000高錳酸鉀用於肛門會陰。","C":"正確。硫酸鎂痔瘡術後收斂。","D":"正確。38~40°C溫水清潔促癒合。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"114100-N2-6":{"quick":"植皮供皮區烤燈:25瓦烤燈距離皮膚須14~18吋。","detail":{"background":"植皮供皮區用烤燈:B「25瓦烤燈,距離皮膚須14~18吋」正確(小烤燈距離較近)。A烤燈是「輻射」熱傳導非對流;C使用時間「15~20分鐘」非至少30分鐘;D「不可塗凡士林」(油脂遇熱反易燙傷,且影響傷口),使用前清潔皮膚即可。故B正確。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"烤燈是輻射,非對流。","B":"正確(本題答案)。25瓦烤燈距離14~18吋。","C":"使用15~20分鐘,非30分鐘。","D":"不可塗凡士林(油脂遇熱易燙傷)。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"114100-N2-17":{"quick":"產後會陰41~43°C溫水坐浴最主要目的=促進傷口血液循環。","detail":{"background":"自然產後會陰傷口以41~43°C溫水坐浴,最主要目的是「促進(會陰)傷口血液循環」(A正確)——溫熱促進局部血循、消腫止痛、加速傷口癒合。促進肉芽形成(次要結果)、防腐作用(需藥液)、減少細菌繁殖(溫水本身不抑菌)皆非「最主要」。故促進傷口血液循環(A)。","options":{"A":"正確(本題答案)。產後坐浴主要促進傷口血液循環。","B":"促進肉芽是次要結果。","C":"防腐需藥液,非溫水主要作用。","D":"溫水本身不抑菌。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"114170-N2-13":{"quick":"用熱生理效應=降低血液黏稠度。","detail":{"background":"用熱的生理效應:B「降低血液黏稠度(血流增加、流動性佳)」正確。A「降低微血管通透性」是冷療(熱療是『增加』通透性);C「減少組織代謝率」是冷療(熱療是『增加』代謝);D「減輕心臟負擔」錯(全身用熱使血管擴張、心輸出增、可能『增加』心臟負擔)。故降低血液黏稠度(B)。","options":{"A":"降低通透性是冷療。","B":"正確(本題答案)。用熱降低血液黏稠度。","C":"減少代謝率是冷療。","D":"全身用熱可能增加心臟負擔。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"114170-N2-21":{"quick":"術後誘尿「最不適當」=足部熱敷(無助排尿);誘尿用聽流水/坐浴/膀胱熱敷。","detail":{"background":"術後尿瀦留誘尿方法:A聽流水聲刺激大腦皮質產生尿意(適當)、B溫水坐浴放鬆尿道括約肌(適當)、C依醫囑於膀胱部位放熱水袋(適當,熱使膀胱肌鬆弛)。選項D「足部施予熱敷刺激末梢神經」最不適當——「足部」熱敷與「排尿反射」無關,無法誘尿(誘尿應作用於膀胱/會陰/聽覺),故D為最不適當(本題答案)。","options":{"A":"適當。聽流水聲產生尿意。","B":"適當。溫水坐浴放鬆括約肌。","C":"適當。膀胱部位熱敷。","D":"最不適當(本題答案)。足部熱敷與排尿無關。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"115030-N2-14":{"quick":"扭傷3天後熱敷作用=增加微血管通透性,有利患部修復。","detail":{"background":"腳踝扭傷「3天後」(亞急性期,無水腫)熱敷的作用機轉:A「增加微血管通透性,有利患部修復(促進血循、帶來修復養分與細胞、移除廢物)」正確。B使神經傳導受阻減痛(冷療)、C增加血液黏滯性助凝血(冷療)、D減少結締組織伸展性(冷療)皆非熱療。故熱敷增加通透性利修復(A)。","options":{"A":"正確(本題答案)。熱敷增加微血管通透性利修復。","B":"神經傳導受阻是冷療。","C":"增血液黏滯是冷療。","D":"減少伸展性是冷療。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"115030-N2-15":{"quick":"溫水坐浴止痛是「促進循環」非麻痺末梢神經;稱透過麻痺末梢神經止痛為錯誤。","detail":{"background":"產後會陰撕裂傷溫水坐浴:B用1:100優碘消毒預防感染(對);C浸泡部位包含整個臀部(對);D浸泡約20分鐘、過長致低血壓(對)。選項A「透過『麻痺末梢神經』達止痛效果,以及避免體溫過低」錯誤——溫水坐浴止痛是「溫熱促進血循、鬆弛肌肉」,非麻痺末梢神經(麻痺神經是『冷療』或局麻);且坐浴是熱療不會避免體溫過低,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。坐浴止痛是促循環鬆肌肉,非麻痺末梢神經。","B":"正確。1:100優碘消毒。","C":"正確。浸泡含整個臀部。","D":"正確。浸泡約20分鐘。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"115030-N2-16":{"quick":"坐浴後頭暈心悸臉色蒼白(姿位性低血壓):協助身體前傾使頭部低於心臟。","detail":{"background":"溫水坐浴後出現「頭暈、心跳加快、無力、臉色蒼白」=「姿位性低血壓」(下半身血管擴張、回心血量減少、腦灌流不足)。最適切是「協助其身體前傾,並使頭部低於心臟」(C正確)增加腦血流。A「直接站起來」(更易暈倒)、B「加冷水降溫」(非水溫問題)、D「繼續浸泡」(會加重)皆不當。故身體前傾頭低於心臟(C)。","options":{"A":"直接站起更易暈倒。","B":"非水溫問題,是姿位性低血壓。","C":"正確(本題答案)。身體前傾使頭低於心臟。","D":"繼續浸泡會加重低血壓。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"110110-N2-5":{"quick":"誘尿需有醫囑才能執行者=熱水袋熱敷膀胱。","detail":{"background":"術後排尿困難的誘尿方法中,「需有醫囑」才能執行者是「C熱水袋熱敷膀胱(用熱屬醫療處置,部分機構需醫囑)」(C正確)。A聽流水聲、B手握冰塊、D溫水會陰沖洗皆是「獨立性護理」可自主執行。故需醫囑者為熱水袋熱敷膀胱(C)。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"聽流水聲是獨立性護理。","B":"手握冰塊是獨立性護理。","C":"正確(本題答案)。熱水袋熱敷膀胱需醫囑。","D":"溫水會陰沖洗是獨立性護理。"},"sources":["新文京《基本護理學》用熱療法","華杏《最新基本護理學》熱療與溫水坐浴"]}},"101110-N2-55":{"quick":"壓瘡傷口培養:不要清洗、直接取樣。","detail":{"background":"壓瘡傷口出現紅腫熱痛化膿,採傷口分泌物作「細菌培養」:應「不要作任何傷口清洗,直接取樣(取膿性分泌物深部組織)」(D正確)——先清洗(尤其用優碘/雙氧水消毒劑)會殺死細菌、影響培養結果(偽陰性)。A生理食鹽水洗、B雙氧水、C優碘洗皆會干擾培養。故直接取樣(D)。","options":{"A":"生理食鹽水洗會稀釋影響培養。","B":"雙氧水會殺菌影響培養。","C":"優碘殺菌影響培養。","D":"正確(本題答案)。不清洗、直接取樣。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"102110-N2-38":{"quick":"壓瘡照護「不」建議皆接受外科擴創手術(視傷口情況);稱一律外科擴創為錯誤。","detail":{"background":"壓瘡傷口照護示教:A用生理食鹽水清潔傷口、保持乾淨、減少破皮水泡受壓(對);B用膜性敷料(OP site/Tegaderm)覆蓋保護(對);D教導翻身擺位防壓瘡(對)。選項C「建議接受外科擴創手術進行傷口處置」錯誤——並非所有壓瘡都需「外科擴創(debridement)」,須視傷口分期與壞死組織情況決定,不可一律建議手術,故C為錯誤敘述(本題答案)。","options":{"A":"正確。生理食鹽水清潔、減少受壓。","B":"正確。膜性敷料覆蓋保護。","C":"錯誤(本題答案)。非一律外科擴創,須視傷口情況。","D":"正確。教導翻身擺位防壓瘡。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"105030-N2-8":{"quick":"頭部新鮮血漬沾髮宜用「冷水」清洗。","detail":{"background":"頭部外傷傷口有「新鮮血漬」沾污頭髮,宜用「冷水」清洗(D正確)——冷水不會使血液中蛋白質凝固(熱水會使血漬凝固更難清除),較易清除新鮮血漬。過氧化氫(雙氧水,用於陳舊血漬/痂皮)、丙酮、乙醚(刺激、危險)皆非首選。故冷水(D)。傷口無菌:打開包布先開遠側、鑷子握上1/3、敷料上方15公分放下、過程勿說話;傷口培養前不清洗(消毒會殺菌偽陰性);新鮮血漬用冷水、陳舊血漬/氣管內管痰漬用雙氧水;沾血敷料屬感染性可燃廢棄物;消毒劑75%酒精最佳、優碘不殺芽孢、來紓(酚類)用環境;開封生理食鹽水24小時內更換。","options":{"A":"雙氧水用於陳舊血漬/痂皮。","B":"丙酮刺激,非清血漬首選。","C":"乙醚刺激危險。","D":"正確(本題答案)。新鮮血漬用冷水清洗。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"107030-N2-15":{"quick":"減少傷口感染:打開無菌換藥碗包布時先開遠側端。","detail":{"background":"減少傷口感染的無菌技術:A「打開無菌換藥碗包布時,先開『遠側端』(由遠而近、避免手越過無菌區污染)」正確。B手持無菌棉枝/鑷子應握於「上1/3」非上1/2(下2/3保持無菌);C敷料應於換藥碗上方「約15公分(6吋)」放下非5~8公分(太近易污染);D換藥過程「不宜說話」(避免飛沫污染無菌區)。故A正確。","options":{"A":"正確(本題答案)。打開包布先開遠側端。","B":"鑷子握上1/3,非上1/2。","C":"敷料應於上方約15公分放下,非5~8公分。","D":"換藥過程不宜說話(防飛沫污染)。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"108110-N2-23":{"quick":"久未癒合傷口「最優先」=評估影響傷口癒合的因素。","detail":{"background":"脊髓損傷病人臀部「久未癒合(數月)」的壓瘡傷口,護理師「最優先」執行是「評估影響王先生傷口癒合的因素(C)」——找出久不癒合的原因(營養、血循、感染、持續受壓、糖尿病等),才能對症處理。A換藥覆蓋敷料、B訂照顧目標、D高蛋白飲食皆是「評估後」的措施。護理過程以評估為先。故C。","options":{"A":"換藥是評估後措施。","B":"訂目標是評估後。","C":"正確(本題答案)。最優先評估影響傷口癒合因素。","D":"飲食是評估後措施。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"109110-N2-12":{"quick":"沾血傷口紗布屬「感染性可燃」廢棄物。","detail":{"background":"沾到病人血液的傷口紗布(紙/棉類、具感染性)屬「感染性『可燃』廢棄物」(B正確)——紗布是可燃材質+沾血具感染性,置於紅色感染性廢棄物容器。一般性(無感染性)、不可燃(玻璃金屬)皆不符。故感染性可燃(B)。傷口無菌:打開包布先開遠側、鑷子握上1/3、敷料上方15公分放下、過程勿說話;傷口培養前不清洗(消毒會殺菌偽陰性);新鮮血漬用冷水、陳舊血漬/氣管內管痰漬用雙氧水;沾血敷料屬感染性可燃廢棄物;消毒劑75%酒精最佳、優碘不殺芽孢、來紓(酚類)用環境;開封生理食鹽水24小時內更換。","options":{"A":"沾血具感染性,非一般性。","B":"正確(本題答案)。沾血紗布是感染性可燃廢棄物。","C":"具感染性,非一般性不可燃。","D":"紗布可燃,非不可燃。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"110030-N2-2":{"quick":"清除布類舊血漬效果最佳=雙氧水。","detail":{"background":"清除布類「舊(陳舊)血漬」效果最佳是「雙氧水(過氧化氫,H2O2)」(B正確)——雙氧水的氧化與起泡作用可分解陳舊血漬。漂白水(會傷布料、變色)、肥皂水、溫開水對陳舊血漬效果差。新鮮血漬則用冷水。故陳舊血漬用雙氧水(B)。傷口無菌:打開包布先開遠側、鑷子握上1/3、敷料上方15公分放下、過程勿說話;傷口培養前不清洗(消毒會殺菌偽陰性);新鮮血漬用冷水、陳舊血漬/氣管內管痰漬用雙氧水;沾血敷料屬感染性可燃廢棄物;消毒劑75%酒精最佳、優碘不殺芽孢、來紓(酚類)用環境;開封生理食鹽水24小時內更換。","options":{"A":"漂白水會傷布料變色。","B":"正確(本題答案)。舊血漬用雙氧水清除最佳。","C":"肥皂水對舊血漬效果差。","D":"溫開水對舊血漬效果差。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"110110-N2-24":{"quick":"糖尿病潰瘍傷口護理目標=「二週後傷口縮小至3×2×1公分」(可測量有時限)。","detail":{"background":"糖尿病下肢潰瘍傷口清創術後的護理目標應「以病人為主、具體、可測量、實際可達」。選項B「二個星期後傷口可縮小至3×2×1公分」最適當(可測量、有時限、實際)(B正確)。A「一星期內完全癒合」(不切實際,糖尿病傷口慢);C「攝取適當營養」(籠統,且是措施);D「自述高熱量低蛋白飲食重要性」(低蛋白錯,傷口需『高蛋白』)。故B正確。","options":{"A":"一週完全癒合不切實際。","B":"正確(本題答案)。二週後縮小至3×2×1公分可測量。","C":"攝取營養籠統且是措施。","D":"傷口需高蛋白,低蛋白錯。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"112180-N2-2":{"quick":"來紓(Lysol,酚類)用於醫院環境(地板)消毒。","detail":{"background":"消毒劑:C「來紓(Lysol)是酚類化合物,一般用來對醫院環境的消毒,例如地板」正確。A「化學消毒劑濃度越高越好,95%酒精優於75%」錯(75%酒精殺菌最佳,95%使蛋白質表層凝固反降效);B「優碘能殺死所有黴菌病毒與芽孢」錯(優碘不能殺芽孢);D「黃藥水可濕敷開放性傷口」錯(黃藥水Rivanol用於完整皮膚/局部,不直接濕敷開放性傷口黏膜)。故C正確。","options":{"A":"75%酒精殺菌最佳,非95%。","B":"優碘不能殺芽孢。","C":"正確(本題答案)。來紓(酚類)用於環境消毒。","D":"黃藥水不直接濕敷開放性傷口。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"113180-N2-3":{"quick":"清除環境微生物:生理食鹽水開封後「不」是每7天更換(應24小時內);稱每7天更換為不適當。","detail":{"background":"清除環境微生物措施:B傷口敷料滲濕或污染時立即更換(對);C檢查引流管通暢及功能(對);D長期氧氣使用潮濕瓶定期更換(對)。選項A「瓶裝溶液應註記開封日期,生理食鹽水應每『7天』更換」不適當——開封的生理食鹽水/沖洗液應「24小時內」使用更換(易滋菌),非7天,故A為不適當(本題答案)。","options":{"A":"不適當(本題答案)。生理食鹽水開封後24小時內更換,非7天。","B":"適當。敷料滲濕污染立即更換。","C":"適當。檢查引流管通暢。","D":"適當。潮濕瓶定期更換。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"114100-N2-4":{"quick":"3%雙氧水可去除氣管內管的血漬、濃痰或軟化痂皮。","detail":{"background":"化學消毒劑:D「3%雙氧水(H2O2)可去除氣管內管的血漬、濃痰或軟化痂皮」正確(氧化起泡作用)。A「2% Chlorhexidine需搭配0.9%生理食鹽水」錯(Chlorhexidine不可與食鹽水混,會沉澱失效);B「95%酒精消毒效果優於75%」錯(75%最佳);C「10%碘酒用於消毒破皮傷口」錯(碘酒刺激性強、用於完整皮膚,不可用於破皮傷口黏膜)。故D正確。","options":{"A":"Chlorhexidine不可與食鹽水混(沉澱)。","B":"75%酒精最佳,非95%。","C":"碘酒刺激,不可用於破皮傷口。","D":"正確(本題答案)。3%雙氧水去血漬濃痰軟化痂皮。"},"sources":["新文京《基本護理學》傷口護理與無菌","華杏《最新基本護理學》傷口換藥與消毒劑"]}},"101030-N2-42":{"quick":"彈性繃帶包紮後須觀察末梢:顏色(1)、溫度(3)、脈搏(4)→「134」。","detail":{"background":"繃帶包紮後須觀察末梢肢體的「血液循環」徵象:1顏色(發紺/蒼白)、3溫度(冰冷)、4脈搏(變弱)、感覺、活動。選項2「出汗情形」、5「指甲長度」與包紮後血循觀察無關。故為「134」。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"含2(出汗)不符。","B":"正確(本題答案,134)。顏色、溫度、脈搏。","C":"含2、5不符。","D":"含2、5不符。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"101110-N2-46":{"quick":"繃帶包紮後患肢脈搏變弱時應立即重新包紮(過緊)。","detail":{"background":"繃帶包紮後評估:D「患肢脈搏變弱時應立即重新包紮(表示過緊、影響血循)」正確。A最初評估應在包紮後「立即及短時間內(非4小時)」;B患肢末梢「發紺」表示血循受阻、應「鬆開重新包紮」非僅抬高;C患肢「感覺麻痺」是過緊的異常徵象、「非必然現象」應處理。故D正確。","options":{"A":"最初評估應立即,非4小時後。","B":"發紺應鬆開重新包紮,非僅抬高。","C":"麻痺是過緊異常,非必然現象。","D":"正確(本題答案)。脈搏變弱表示過緊,應重新包紮。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"102030-N2-43":{"quick":"下肢挫傷流血應準備「棉布繃帶」(紗布/棉布吸血固定)。本題答案C。","detail":{"background":"本題官方答案C。學童跌倒下肢多處挫傷流血,健康中心護理師應準備「棉布(紗布)繃帶」(C)——用於覆蓋傷口、吸收滲血、固定敷料。法蘭絨繃帶(保暖)、石膏繃帶(固定骨折)、橡皮繃帶(防水加壓特殊用)皆非一般傷口包紮首選。故棉布繃帶(C)。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"法蘭絨繃帶用於保暖。","B":"石膏繃帶用於固定骨折。","C":"正確(本題答案)。傷口流血準備棉布繃帶。","D":"橡皮繃帶用於防水加壓特殊用。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"102030-N2-44":{"quick":"包紮:壓力均勻、第二圈覆蓋前一圈1/2~2/3。","detail":{"background":"繃帶包紮:B「包紮壓力應均勻,第二圈應覆蓋前一圈範圍的1/2~2/3」正確。A「應『露出』末梢肢體(觀察血循)」非完整包住(完整包住無法觀察);C應「由遠心端往近心端」包紮(非近往遠);D「不可在傷口部位結帶」(應在肢體外側、非傷口/關節/受壓處)。故B正確。","options":{"A":"應露出末梢肢體觀察血循,非完整包住。","B":"正確(本題答案)。壓力均勻、第二圈覆蓋1/2~2/3。","C":"應由遠心端往近心端包紮。","D":"不可在傷口處結帶。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"102030-N2-45":{"quick":"繃帶過緊徵象=肢體末梢脈搏變弱。","detail":{"background":"繃帶過緊(影響血循)需重新包紮的徵象:B「肢體末梢脈搏變弱」(血流受阻)(B正確)。A「皮膚顏色紅潤」(正常)、C「末梢溫暖」(正常)、D「結帶處繃帶鬆脫」(是太鬆非太緊)皆非過緊徵象。過緊徵象還有:發紺、蒼白、冰冷、麻木、疼痛、腫脹。故脈搏變弱(B)。","options":{"A":"皮膚紅潤是正常。","B":"正確(本題答案)。末梢脈搏變弱表示過緊。","C":"末梢溫暖是正常。","D":"繃帶鬆脫是太鬆,非太緊。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"103100-N2-47":{"quick":"踝關節扭傷:彈性繃帶包紮、抬高患肢。","detail":{"background":"踝關節扭傷立即護理:D「彈性繃帶包紮(加壓消腫支托),抬高患肢(促靜脈回流消腫)」正確,並冰敷、休息(RICE原則:Rest、Ice、Compression、Elevation)。A「彈性繃帶+『熱敷』」錯(急性期冷敷非熱敷);B橡皮繃帶非首選;C絨布繃帶非加壓。故彈性繃帶+抬高患肢(D)。","options":{"A":"急性期應冷敷,非熱敷。","B":"橡皮繃帶非扭傷首選。","C":"絨布繃帶非加壓用。","D":"正確(本題答案)。彈性繃帶包紮、抬高患肢。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"103100-N2-51":{"quick":"手腕傷口包紮採8字形包紮法。","detail":{"background":"手腕(關節部位)傷口包紮宜採「8字形(figure-of-eight)包紮法」(A正確)——適合關節處,可固定且不影響關節活動。B「右手下垂15分鐘後再包紮」錯(應抬高肢體再包紮,下垂致鬱血);C應「由遠心端往近心端」包紮(非近往遠);D後一圈應覆蓋前一圈「1/2~2/3」非1/3。故8字形包紮(A)。","options":{"A":"正確(本題答案)。手腕關節處採8字形包紮。","B":"應抬高肢體再包紮,非下垂。","C":"應由遠心端往近心端。","D":"後一圈覆蓋1/2~2/3,非1/3。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"103100-N2-52":{"quick":"長期仰臥容易壓瘡部位=枕骨(2)、尾骶骨(4)→「24」。","detail":{"background":"長期「仰臥」容易壓瘡的部位:2枕骨、4尾骶骨(及肩胛、足跟、肘)。選項1「耳朵」、3「肩峰突」、5「股骨粗隆」是「側臥」的受壓處。故仰臥壓瘡部位為「24」。壓瘡:分期一充血期(發紅壓之褪色解壓消退)、二缺血期(持續發紅壓之不褪色解壓不消退、水泡破皮)、三壞死期(全層壞死)、四潰瘍期(深及肌肉骨)。仰臥受壓=枕骨肩胛薦骨足跟肘;側臥=耳肩峰髖外踝;坐姿=坐骨結節。預防:每2小時翻身、移動抬高減剪力、溫和清潔勿用肥皂、補充蛋白質維生素C、勿用氣圈、發紅處不可按摩、Braden量表(不含年齡)。","options":{"A":"12含耳朵(側臥)不符。","B":"45含股骨粗隆(側臥)不符。","C":"正確(本題答案,24)。枕骨、尾骶骨。","D":"35含肩峰突股骨粗隆(側臥)不符。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"104030-N2-44":{"quick":"三角巾懸吊手臂:手腕應高於肘關節(3)、底邊在健側(4)→「34」。本題答案A=「23」。","detail":{"background":"本題官方答案A(23)。三角巾懸吊手臂注意:2使肘關節彎曲度「應小於90度?」——實際肘關節應彎曲「約90度」、3「手腕應高於肘關節」(促回流防腫)。選項1「在頸後結帶」(對但本題組合);4三角巾底邊朝向... 依官方答案「23」。核心:肘約90度、手腕略高於肘、結帶在頸側(非頸後正中、避免壓迫頸椎)、手指外露觀察。作答以官方A為準。","options":{"A":"正確(本題答案,23)。肘彎曲、手腕高於肘關節。","B":"14組合非官方。","C":"13不符。","D":"24不符。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"104030-N2-47":{"quick":"束腹帶「不」是為減緩傷口引流(是支托腹部/固定敷料/促進排氣);稱減緩引流為錯誤。","detail":{"background":"剖腹探查術後束腹帶目的:A支托腹部、促進舒適(對);C固定腹部傷口敷料(對);D促進腹部排氣(對,適度加壓)。選項B「減緩傷口引流」不是束腹帶的目的(本題答案)——束腹帶是支托固定、促進舒適與排氣,「不」會也不應減緩傷口引流(引流應保持通暢)。故不是目的者為減緩傷口引流(B)。","options":{"A":"是目的。支托腹部促進舒適。","B":"正確(本題答案)。減緩傷口引流非束腹帶目的。","C":"是目的。固定傷口敷料。","D":"是目的。促進腹部排氣。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"105030-N2-46":{"quick":"三角巾支托上石膏手臂:腕關節應微高於肘關節。","detail":{"background":"三角巾支托上石膏的左手臂:B「腕關節應微高於肘關節(促靜脈回流防腫)」正確。A「肘關節彎曲『小於60度』」錯(應約90度);C三角巾兩角應於「頸側(肩部)」打結非手腕處;D「拇指應朝『上』」非朝下(功能位置)。故B正確。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"肘關節應約90度,非小於60度。","B":"正確(本題答案)。腕關節微高於肘關節。","C":"三角巾於頸側打結,非手腕處。","D":"拇指應朝上(功能位置),非朝下。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"105030-N2-49":{"quick":"彈性繃帶包紮殘肢前應先清潔傷口並更換無菌敷料。","detail":{"background":"膝下截肢術後第1天彈性繃帶包紮殘肢前,應先「清潔傷口並更換無菌敷料」(C正確)——確保傷口乾淨、敷料覆蓋後再包紮。A測量生命徵象、B給鎮痛藥、D關節復健活動皆非「包紮前」的必要準備。故先清潔傷口換無菌敷料(C)。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"測量生命徵象非包紮前必要準備。","B":"給鎮痛藥非包紮前必要步驟。","C":"正確(本題答案)。包紮前先清潔傷口換無菌敷料。","D":"復健活動非包紮前準備。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"105090-N2-46":{"quick":"韌帶二級撕裂傷:彈性繃帶採8字形包紮患部。","detail":{"background":"腳踝扭傷、韌帶二級撕裂傷需繃帶包紮制動:C「以彈性繃帶採8字形包紮患部(踝關節)」正確——彈性繃帶加壓支托、8字形適合踝關節固定。A紗布繃帶螺旋形(非加壓制動)、B套入式網狀繃帶(固定敷料用)、D三角巾人字形(非踝關節)皆不適合。故彈性繃帶8字形(C)。","options":{"A":"紗布螺旋形非加壓制動。","B":"網狀繃帶用於固定敷料。","C":"正確(本題答案)。彈性繃帶8字形包紮踝關節。","D":"三角巾人字形非踝關節用。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"106030-N2-47":{"quick":"繃帶包紮:第一步驟以環形包紮法定帶。","detail":{"background":"繃帶包紮原則:C「第一步驟為以『環形包紮法』定帶(固定起點)」正確。A應「由遠心端往近心端」(順靜脈回流方向)非近往遠;B結帶部位在肢體外側是「正確做法」(B敘述為錯誤,不會致身體心像紊亂);D第二匝應覆蓋前一匝的「1/2~2/3」非1/4~1/3。故C正確。","options":{"A":"應由遠心端往近心端(順靜脈回流)。","B":"結帶在肢體外側是正確做法。","C":"正確(本題答案)。第一步以環形包紮定帶。","D":"第二匝覆蓋1/2~2/3,非1/4~1/3。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"106030-N2-48":{"quick":"繃帶束帶:固定夾板用急螺旋包紮(2)、粗細不同肢體用螺旋回反形(3)→本題答案「23」。","detail":{"background":"本題官方答案「23」(標記異常但核心):選項2「簡易固定夾板時,可採『急螺旋』包紮法」(對)、3「粗細不同的肢體,可採『螺旋回反形(回反摺)』包紮」(對,適應肢體粗細變化)。選項1「包紮四肢宜先將四肢『放低』後再包紮」錯(應『抬高』肢體促回流再包紮)。故正確為「23」。","options":{"A":"含1(放低)錯,應抬高。","B":"標記異常,核心23正確。","C":"標記異常。","D":"核心為23(急螺旋夾板、回反形粗細肢體)。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"106111-N2-45":{"quick":"人工膝關節術後傷口腫脹疼痛:檢查彈性繃帶是否綁得過緊。","detail":{"background":"人工膝關節置換術後第二天「傷口腫脹、疼痛不已、無法入睡」,最適當護理處置是「協助檢查膝關節處之彈性繃帶是否綁得過緊」(C正確)——腫脹疼痛可能是繃帶過緊影響血循,須先評估排除。A當正常疼痛給止痛(未評估)、B聊天轉移(未處理)、D給安眠藥(掩蓋問題)皆不當。故檢查繃帶是否過緊(C)。","options":{"A":"未評估即當正常疼痛不當。","B":"聊天轉移未處理問題。","C":"正確(本題答案)。檢查彈性繃帶是否過緊。","D":"給安眠藥掩蓋問題。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"108020-N2-48":{"quick":"繃帶包紮「不」需順人體循環方向(應由遠心端往近心端);稱順循環方向為錯誤。","detail":{"background":"繃帶與束帶:B「需先以環形包紮法定帶」(對);C「應露出肢體末梢(觀察血循)」(對);D「不可在肢體內側進行結帶」(對,應外側)。選項A「需採『順人體循環方向』包紮」錯誤——繃帶應「由遠心端往近心端(逆肢體、順靜脈回流方向)」包紮以促進靜脈回流;「順人體循環(動脈方向、由近往遠)」會阻礙回流,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。應由遠心端往近心端,非順循環方向。","B":"正確。先環形包紮定帶。","C":"正確。露出肢體末梢。","D":"正確。不可在肢體內側結帶。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"108110-N2-49":{"quick":"結帶應固定於肢體「外側」，不可在小腿「前方」(壓迫脛骨/血管神經)，此敘述錯誤，故選C。","detail":{"background":"本題官方答案B。小腿燒傷植皮(STSG)術後短腿石膏夾板固定:B「足踝處置放棉墊再包紮,以減少摩擦及受壓」正確(保護骨突處防壓瘡)。A包紮應「由遠心端朝近心端」(B選項已對,A方向其實也對但本題以B為正解);C結帶應於「肢體外側」非前方;D檢查足部溫度顏色麻木(對,但本題正解B)。核心:骨突處墊棉墊、由遠往近包、外側結帶、觀察末梢。","options":{"A":"由遠心端往近心端包紮促靜脈回流，正確。","B":"足踝置棉墊再包紮減少摩擦受壓，正確。","C":"正解(錯誤)：結帶應固定於肢體外側，不可在小腿前方。","D":"檢查足部溫度、顏色、麻木感(神經血管評估)，正確。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"110030-N2-43":{"quick":"繃帶包紮「不」由近心端往遠心端(應由遠往近);稱由近往遠為錯誤。","detail":{"background":"繃帶包紮原則:A先清洗傷口覆蓋無菌敷料後再包紮(對);B骨突處先墊棉墊或敷料(對);D壓力平均、第二圈覆蓋前一圈1/2~2/3(對)。選項C「包紮時,應抬高肢體,由『近心端往遠心端』包紮」錯誤——應「由『遠心端往近心端』」包紮(促進靜脈回流),C方向顛倒,故C為錯誤敘述(本題答案)。","options":{"A":"正確。先清洗覆蓋無菌敷料。","B":"正確。骨突處先墊棉墊。","C":"錯誤(本題答案)。應由遠心端往近心端,非近往遠。","D":"正確。第二圈覆蓋1/2~2/3。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"110030-N2-44":{"quick":"繃帶包紮完畢結帶固定於「上臂」(非傷口/關節/受壓處)。","detail":{"background":"繃帶包紮完畢結帶(打結固定)的位置:應在「肢體外側、平坦、非傷口/非關節/非受壓處」。選項C「上臂(肢體外側平坦處)」適合結帶(C正確)。A傷口區(不可,壓迫傷口)、B關節處(影響活動)、D易受壓處(致不適/壓瘡)皆不可結帶。故上臂(C)。","options":{"A":"傷口區不可結帶(壓迫傷口)。","B":"關節處不可結帶(影響活動)。","C":"正確(本題答案)。結帶固定於上臂(外側平坦處)。","D":"易受壓處不可結帶。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"110110-N2-10":{"quick":"股骨頭骨折術後下肢彈性繃帶主要目的=促進血液回流、防止鬱積。","detail":{"background":"股骨頭骨折手術後下肢以彈性繃帶包紮的主要目的是「促進血液回流、防止靜脈血鬱積(預防深層靜脈血栓)」(A正確)——術後臥床易DVT,彈性繃帶加壓促回流。保暖、固定敷料、加壓止血皆非「主要」目的。故促進血液回流防鬱積(A)。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"正確(本題答案)。彈性繃帶促血液回流防鬱積(防DVT)。","B":"非為保暖。","C":"非主要為固定敷料。","D":"非主要為加壓止血。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"111030-N2-49":{"quick":"繃帶包紮:每圈覆蓋前一圈1/2~2/3寬度。","detail":{"background":"繃帶包紮原則:C「繃帶包紮每圈應覆蓋前一圈『1/2~2/3』寬度為宜」正確(均勻、不滑脫)。A「肢體放低再包紮」錯(應『抬高』肢體促回流);B「由近心端往遠心端」錯(應由遠往近);D「於關節處結帶」錯(應在肢體外側平坦處、非關節)。故C正確。","options":{"A":"應抬高肢體,非放低。","B":"應由遠心端往近心端。","C":"正確(本題答案)。每圈覆蓋前一圈1/2~2/3。","D":"結帶在肢體外側,非關節處。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"111030-N2-50":{"quick":"截肢術後減腫脹加壓止血用「彈性繃帶」。","detail":{"background":"左下肢截肢術後,為「減輕腫脹及加壓止血」,應使用「彈性繃帶」(B正確)——彈性繃帶可均勻加壓、塑形殘肢、減腫止血。紗布繃帶(固定敷料)、石膏繃帶(固定骨折)、橡皮繃帶(防水)皆非。故彈性繃帶(B)。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"紗布繃帶用於固定敷料。","B":"正確(本題答案)。截肢術後減腫加壓用彈性繃帶。","C":"石膏繃帶用於固定骨折。","D":"橡皮繃帶用於防水。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"111110-N2-49":{"quick":"繃帶包紮後「不」需每30分鐘評估末梢(包紮後立即及定時觀察即可);稱每30分鐘為錯誤。","detail":{"background":"手腕擦傷腫脹傷口包紮:B繃帶宜經常更換保持清潔乾燥(對);C衛教若有分泌物告知醫護(對);D為促進舒適每8小時重新包紮(對)。選項A「包紮後每『30分鐘』需評估末梢血液循環」錯誤——包紮後應「立即評估」並「定時(如每數小時或視情況)」觀察末梢血循,「每30分鐘」過於頻繁、非常規,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。非每30分鐘評估末梢(過頻),立即及定時即可。","B":"正確。繃帶經常更換保持清潔。","C":"正確。有分泌物告知醫護。","D":"正確。每8小時重新包紮。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"111110-N2-50":{"quick":"腳踝壓傷傷口包紮採8字形包紮法。","detail":{"background":"腳踝(關節部位)傷口包紮宜採「8字形包紮法」(A正確)——適合關節處固定且不影響活動。B螺旋形(用於粗細均勻的肢體如前臂)、C「由近心端開始」錯(應遠心端開始)、D「肢體平放15~30分鐘」錯(應抬高肢體)。故8字形(A)。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"正確(本題答案)。腳踝關節處採8字形包紮。","B":"螺旋形用於粗細均勻肢體。","C":"應由遠心端開始包紮。","D":"應抬高肢體,非平放。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"112030-N2-49":{"quick":"繃帶包紮後患肢出現刺痛麻木應立即重新包紮(過緊)。","detail":{"background":"繃帶包紮:D「包紮後患肢出現刺痛、麻木感應立即重新包紮(表示過緊壓迫神經血管)」正確。A「由近心端往遠心端」錯(應遠往近);B「緩螺旋包紮法定帶」錯(定帶用『環形』包紮法);C「結帶固定於肢體內側」錯(應外側)。故D正確。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"應由遠心端往近心端包紮。","B":"定帶用環形包紮法,非緩螺旋。","C":"結帶應在肢體外側,非內側。","D":"正確(本題答案)。刺痛麻木應立即重新包紮。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"112030-N2-50":{"quick":"急螺旋包紮法常用於固定夾板包紮。","detail":{"background":"捲軸繃帶包紮法應用:A「急螺旋包紮法,常用於固定夾板包紮(快速纏繞固定)」正確。B「回反摺形包紮法,用於『粗細不均』肢體」(B敘述對,但本題正解A);C「多頭帶用於腹部/胸部大面積固定」非定帶結帶;D「人字形(8字形)用於『關節』」非截肢(截肢用回反摺形)。故A正確。","options":{"A":"正確(本題答案)。急螺旋包紮用於固定夾板。","B":"回反摺形用於粗細不均肢體(敘述對,本題正解A)。","C":"多頭帶用於大面積固定,非定帶結帶。","D":"人字形用於關節,截肢用回反摺形。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"112110-N2-49":{"quick":"大腸癌術後束腹帶「不」是減少傷口肉芽生成(是固定支托促排氣);稱減少肉芽生成為錯誤。","detail":{"background":"大腸癌術後束腹帶目的:A固定腹部手術傷口(對)、B預防咳嗽造成的疼痛(對,支托減震)、C支托腹部並促進引流及排氣(對)。選項D「減少傷口肉芽組織生成」不是束腹帶目的(本題答案)——束腹帶是支托固定、促排氣,「不」影響也不應減少肉芽組織(肉芽是傷口癒合所需)。故不是目的者為減少肉芽生成(D)。","options":{"A":"是目的。固定腹部傷口。","B":"是目的。預防咳嗽疼痛。","C":"是目的。支托促進排氣。","D":"正確(本題答案)。減少肉芽生成非束腹帶目的。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"112110-N2-50":{"quick":"彈性繃帶最常應用於加壓止血、減輕腫脹。","detail":{"background":"彈性繃帶最常應用於「加壓止血,減輕腫脹」(A正確)——彈性可均勻加壓、促進靜脈回流、消腫止血(用於扭傷、截肢殘肢、靜脈曲張)。B痛風減關節疼痛(非彈性繃帶)、C骨折支托(用石膏)、D矯正畸形肢體(用矯具)皆非。故加壓止血減腫脹(A)。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"正確(本題答案)。彈性繃帶用於加壓止血減腫脹。","B":"痛風止痛非彈性繃帶。","C":"骨折支托用石膏。","D":"矯正畸形用矯具。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"112180-N2-31":{"quick":"繃帶包紮「不」順人體循環方向(應由遠往近);稱順循環方向為錯誤。","detail":{"background":"傷口繃帶包紮注意:A適當露出肢體末端部位(對,觀察血循);C包紮者站在包紮部位前方或側方(對);D繃帶後一圈覆蓋前一圈1/2~2/3(對)。選項B「應『順著人體循環的方向』進行」錯誤——繃帶應「由遠心端往近心端(順『靜脈回流』方向)」包紮,「順人體循環(動脈、由近往遠)」會阻礙靜脈回流,故B為錯誤敘述(本題答案)。","options":{"A":"正確。露出肢體末端觀察血循。","B":"錯誤(本題答案)。應由遠往近(順靜脈回流),非順循環方向。","C":"正確。站在包紮部位前方或側方。","D":"正確。後一圈覆蓋1/2~2/3。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"113030-N2-30":{"quick":"三角巾托懸臂:肘關節彎曲<90度、手腕高於肘部→「14」。","detail":{"background":"三角巾托懸臂包紮法:1協助病人肘關節彎曲(約90度)、手掌朝上、「手腕高於肘部」(促回流)、4(三角巾底邊朝向健側/外側、頂角在患肘)。本題官方答案「14」。核心:肘約90度、手腕略高於肘、手指外露、結帶於頸側。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"正確(本題答案,14)。肘彎曲手腕高於肘部等。","B":"24組合不符。","C":"35不符。","D":"25不符。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"113100-N2-27":{"quick":"三角巾懸臂帶:手腕應高於手肘10~12公分。","detail":{"background":"三角巾懸臂帶包紮法:A「手腕應高於手肘10~12公分(促進靜脈回流防腫)」正確。B「肘關節應>90度」錯(應約90度或略小);C「手掌心朝外、手腕不可下垂」——手掌應朝向身體/內,手腕不下垂對但手掌朝外錯;D「三角巾底邊朝向患側」錯(底邊朝向健側/外側)。故A正確。","options":{"A":"正確(本題答案)。手腕高於手肘10~12公分。","B":"肘關節應約90度,非>90度。","C":"手掌應朝身體,非朝外。","D":"三角巾底邊朝向健側,非患側。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"114030-N2-28":{"quick":"膝上截肢術後殘肢包紮=回反摺形包紮法+環形定帶。本題答案D。","detail":{"background":"本題官方答案D。膝上截肢術後殘肢包紮:D「使用『回反摺形』包紮法,再以環形包紮法定帶」最適用——回反摺形(recurrent/回反)適合包覆「殘端(末端封閉的肢體末端)」,先環形定帶再回反摺包覆殘端。8字形(關節)、螺旋形(均勻肢體)、人字形皆不適合殘肢末端。故回反摺形+環形定帶(D)。","options":{"A":"環形+8字形非殘肢末端首選。","B":"8字形用於關節。","C":"緩螺旋非殘肢末端。","D":"正確(本題答案)。殘肢用回反摺形+環形定帶。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"114170-N2-31":{"quick":"繃帶包紮目的=加壓止血(1)、固定傷口(2)、保暖(4)→「124」。","detail":{"background":"繃帶包紮的目的:1加壓止血(減輕腫脹出血)、2固定傷口(敷料/夾板/患肢)、4保暖(法蘭絨繃帶)、5促進血液回流。選項3「增加關節活動度」錯誤(繃帶是『限制/固定』關節,非增加活動度)。本題官方答案「124」(加壓止血、固定傷口、保暖)。繃帶包紮:由遠心端往近心端(順靜脈回流)、抬高肢體、先環形定帶、每圈覆蓋前一圈1/2~2/3、露出末梢觀察血循、結帶於肢體外側(非傷口/關節/受壓處)、骨突處墊棉墊;過緊徵象=末梢脈搏弱/發紺/麻木刺痛→重新包紮。8字形用關節、回反摺形用殘肢、急螺旋用夾板、彈性繃帶加壓止血消腫。三角巾懸臂:肘約90度、手腕高於肘10~12公分。束腹帶=支托固定、促排氣、防咳嗽痛(非減少引流)。","options":{"A":"含3(增加關節活動度)錯。","B":"正確(本題答案,124)。加壓止血、固定傷口、保暖。","C":"含3不符。","D":"含3不符。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"115030-N2-27":{"quick":"肢體繃帶包紮「不」將肢體放低(應抬高);稱包紮時肢體放低為錯誤。","detail":{"background":"肢體繃帶包紮原則:B由遠心端往近心端開始包紮(對);C評估皮膚與循環狀況(對);D骨突處放紗布或棉墊(對)。選項A「包紮時應將肢體『放低』」錯誤——包紮時應「抬高肢體(促進靜脈回流、減少腫脹)」再包紮,放低會致鬱血腫脹,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。包紮時應抬高肢體,非放低。","B":"正確。由遠心端往近心端。","C":"正確。評估皮膚與循環。","D":"正確。骨突處放紗布棉墊。"},"sources":["新文京《基本護理學》繃帶與束帶","華杏《最新基本護理學》包紮法"]}},"101030-N2-25":{"quick":"心導管術後傷口用砂袋目的=加壓止血。","detail":{"background":"心導管檢查術後,穿刺傷口處放置砂袋的目的是「加壓止血」(A正確)——心導管由股動脈/橈動脈穿刺,術後須壓迫止血、防出血血腫,故用砂袋加壓並臥床平躺6小時。預防壓瘡、預防肢體外翻、預防垂足皆非砂袋於此的目的。故加壓止血(A)。壓瘡:分期一充血期(發紅壓之褪色解壓消退)、二缺血期(持續發紅壓之不褪色解壓不消退、水泡破皮)、三壞死期(全層壞死)、四潰瘍期(深及肌肉骨)。仰臥受壓=枕骨肩胛薦骨足跟肘;側臥=耳肩峰髖外踝;坐姿=坐骨結節。預防:每2小時翻身、移動抬高減剪力、溫和清潔勿用肥皂、補充蛋白質維生素C、勿用氣圈、發紅處不可按摩、Braden量表(不含年齡)。","options":{"A":"正確(本題答案)。心導管術後砂袋加壓止血。","B":"非預防壓瘡。","C":"非預防肢體外翻。","D":"非預防垂足。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"101030-N2-43":{"quick":"尾骶骨壓瘡「不」宜多用氣圈懸空(氣圈反致周圍受壓);稱多用氣圈為不適宜。","detail":{"background":"尾骶骨壓瘡護理:B每1~2小時更換臥姿(對);C移動時不拖拉(對,減剪力);D補充維生素C促組織修復(對)。選項A「多採用氣圈,協助壓瘡部位懸空」不適宜——「氣圈(甜甜圈墊)」會使「圈圈接觸處周圍組織受壓、血循受阻」,反而增加新壓瘡風險,現已不建議使用,故A為不適宜(本題答案)。","options":{"A":"不適宜(本題答案)。氣圈致周圍受壓,不建議使用。","B":"適宜。每1~2小時更換臥姿。","C":"適宜。移動不拖拉減剪力。","D":"適宜。補充維生素C促修復。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"102110-N2-37":{"quick":"尾骶骨皮膚發紅、解除壓力後不消退=第二期(缺血期)。本題答案B。","detail":{"background":"本題官方答案B。壓瘡分期(傳統四期):第一期(充血期,發紅、壓之褪色、解壓後消退)、第二期(缺血期,持續發紅、壓之不褪色、解壓後『不消退』、可能水泡破皮)、第三期(壞死期,全層皮膚壞死)、第四期(潰瘍期,深及肌肉骨骼)。陳先生尾骶骨「發紅、解壓後不消退」=第二期(缺血期)(B)。","options":{"A":"第一期解壓後會消退。","B":"正確(本題答案)。發紅解壓不消退=第二期(缺血期)。","C":"第三期是全層壞死。","D":"第四期深及肌肉骨骼。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"104030-N2-49":{"quick":"「高血壓」不是導致壓瘡的原因;小便失禁/脊髓損傷/水腫是。","detail":{"background":"導致壓瘡的原因:A小便失禁(潮濕浸潤皮膚)、C脊髓損傷(感覺喪失、不會移動)、D水腫(組織灌流差、皮膚脆弱)——皆是。選項B「高血壓」不是導致壓瘡的原因(本題答案)——壓瘡主因是「壓力、剪力、摩擦、潮濕、營養不良、感覺/活動障礙」,高血壓與壓瘡無直接因果。故不是原因者為高血壓(B)。","options":{"A":"小便失禁致皮膚潮濕,是壓瘡原因。","B":"正確(本題答案)。高血壓非壓瘡原因。","C":"脊髓損傷(感覺喪失)是原因。","D":"水腫(灌流差)是原因。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"106110-N2-48":{"quick":"長期坐輪椅最不可能壓瘡部位=大粗隆(那是側臥處);稱大粗隆為錯誤。","detail":{"background":"長期「坐輪椅」最可能壓瘡部位:A坐骨結節(坐姿主要承重)、B兩腳膝蓋內側(雙腿接觸)、C肩胛骨(靠背)。選項D「大粗隆(股骨大轉子)」是「側臥」的受壓處、坐姿較不受壓(本題答案,問「錯誤/最不可能」)。故坐輪椅最不可能壓瘡為大粗隆(D)。壓瘡:分期一充血期(發紅壓之褪色解壓消退)、二缺血期(持續發紅壓之不褪色解壓不消退、水泡破皮)、三壞死期(全層壞死)、四潰瘍期(深及肌肉骨)。仰臥受壓=枕骨肩胛薦骨足跟肘;側臥=耳肩峰髖外踝;坐姿=坐骨結節。預防:每2小時翻身、移動抬高減剪力、溫和清潔勿用肥皂、補充蛋白質維生素C、勿用氣圈、發紅處不可按摩、Braden量表(不含年齡)。","options":{"A":"坐骨結節是坐姿主要受壓處。","B":"膝蓋內側(雙腿接觸)是坐姿受壓。","C":"肩胛骨(靠背)是坐姿受壓。","D":"正確(本題答案)。大粗隆是側臥受壓,坐姿較不受壓。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"107110-N2-42":{"quick":"壓瘡護理:「不」用肥皂清潔皮膚(肥皂鹼性傷皮膚);稱用肥皂清潔為錯誤。","detail":{"background":"壓瘡護理:A至少每2小時改變姿勢(對);B移動時抬高個案方式移動(對,減剪力);D用氣墊床減壓(對)。選項C「可使用『肥皂』清潔皮膚,保持乾燥」錯誤——壓瘡/脆弱皮膚應用「溫和清潔劑/清水」清潔,「肥皂(鹼性)」會破壞皮膚保護層、使皮膚更乾燥脆弱,故C為錯誤敘述(本題答案)。","options":{"A":"正確。至少每2小時改變姿勢。","B":"正確。抬高移動減剪力。","C":"錯誤(本題答案)。壓瘡不用肥皂(鹼性傷皮膚)。","D":"正確。用氣墊床減壓。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"107110-N2-46":{"quick":"「坐姿先抬高床尾再抬高床頭」不是壓瘡原因;尿失禁未清/氣墊床未翻身/拖拉是。","detail":{"background":"造成壓瘡的原因:A大小便失禁未定時清理(潮濕)、B用氣墊床但未按時翻身(氣墊床不能取代翻身)、D用翻身單拖拉病患(剪力摩擦)——皆是。選項C「坐姿時先抬高床尾再抬高床頭」「不」是壓瘡原因(本題答案)——此為「防止身體下滑減少剪力」的正確擺位法。故不是原因者為C。","options":{"A":"尿失禁未清(潮濕)是壓瘡原因。","B":"氣墊床未翻身是壓瘡原因。","C":"正確(本題答案)。此擺位是防剪力的正確做法,非原因。","D":"拖拉病患(剪力)是壓瘡原因。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"109030-N2-17":{"quick":"預防壓瘡:每1~2小時協助翻身一次。","detail":{"background":"預防長期臥床壓瘡:C「視病人情況,應每1~2小時協助翻身一次」正確(間歇解除受壓)。A「氣圈放薦椎」錯(氣圈致周圍受壓,不建議);B「骨突處發紅應多按摩」錯(已發紅處按摩會加重組織損傷,不可按摩);D「大便失禁常用肥皂清洗臀部」錯(肥皂鹼性傷皮膚,應溫和清潔)。故C正確。","options":{"A":"氣圈致周圍受壓,不建議。","B":"發紅處不可按摩(加重損傷)。","C":"正確(本題答案)。每1~2小時翻身一次。","D":"失禁不用肥皂(鹼性傷皮膚)。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"110030-N2-48":{"quick":"長期側臥壓瘡部位=耳朵(1)、腸骨嵴(3)、踝部(5)→「135」。","detail":{"background":"長期「側臥」壓瘡部位:1耳朵、3腸骨嵴(髂嵴/髖骨側)、5踝部(外踝)、肩峰、膝外側。選項2「枕骨」、4「尾椎骨(薦骨)」是「仰臥」受壓處。故側臥壓瘡為「135」。壓瘡:分期一充血期(發紅壓之褪色解壓消退)、二缺血期(持續發紅壓之不褪色解壓不消退、水泡破皮)、三壞死期(全層壞死)、四潰瘍期(深及肌肉骨)。仰臥受壓=枕骨肩胛薦骨足跟肘;側臥=耳肩峰髖外踝;坐姿=坐骨結節。預防:每2小時翻身、移動抬高減剪力、溫和清潔勿用肥皂、補充蛋白質維生素C、勿用氣圈、發紅處不可按摩、Braden量表(不含年齡)。","options":{"A":"正確(本題答案,135)。耳朵、腸骨嵴、踝部。","B":"245含枕骨尾椎(仰臥)不符。","C":"123含枕骨不符。","D":"134含尾椎不符。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"110110-N2-48":{"quick":"「長期便秘」不是壓傷原因;營養不良/身體下滑剪力/不平整床褥是。","detail":{"background":"導致尾薦骨壓傷的可能原因:A營養不良(皮膚脆弱、癒合差)、B採半坐臥身體常下滑(產生剪力)、D躺臥於不平整床褥(局部受壓)——皆是。選項C「長期便秘」「不」是壓傷的可能原因(本題答案)——便秘與壓瘡無直接因果。故不是原因者為長期便秘(C)。","options":{"A":"營養不良是壓傷原因。","B":"身體下滑(剪力)是壓傷原因。","C":"正確(本題答案)。長期便秘非壓傷原因。","D":"不平整床褥(局部受壓)是原因。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"111030-N2-47":{"quick":"壓傷衛教：2補充蛋白質與維生素C促進修復、4小腿墊枕使腳跟騰空避免受壓→「24」，故選D。","detail":{"background":"本題官方答案「23」。尾骶骨第二期壓傷衛教:2「飲食補充蛋白質與維生素C,促進組織修復」(對)、3「尾骶骨處...(相關正確項)」。選項1「每3~4小時翻身」錯(應「每2小時」翻身,3~4小時太久);4「尾骶骨處使用氣墊圈(氣圈)促血循」錯(氣圈致周圍受壓,不建議)。故正確為「23」。","options":{"A":"含1(每3~4小時翻身過久,應每2小時)錯。","B":"含1、3(氣墊圈阻礙循環)錯。","C":"含3(氣墊圈)錯。","D":"正解(24)：補充蛋白質維生素C、小腿墊枕使腳跟騰空。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"112110-N2-46":{"quick":"Braden壓傷風險量表「不」含年齡因素;含活動潮濕營養。","detail":{"background":"Braden壓傷風險評估量表的六項評估項目:感覺知覺、潮濕度(B)、活動情況(A)、移動能力、營養狀況(C)、摩擦力與剪力。選項D「年齡因素」「不」是Braden量表的評估項目(本題答案)——年齡是危險因子但非Braden六項之一。故除外者為年齡因素(D)。","options":{"A":"活動情況是Braden項目。","B":"皮膚潮濕度是Braden項目。","C":"營養狀況是Braden項目。","D":"正確(本題答案)。年齡不是Braden評估項目。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"112180-N2-27":{"quick":"長期臥床:體內蛋白質分解速率大於合成、造成負氮平衡。","detail":{"background":"長期臥床的營養與代謝改變:D「體內蛋白質『分解』速率大於『合成』速率,造成負氮平衡」正確(肌肉流失、傷口難癒)。A甲狀腺素腎上腺素分泌與代謝率敘述須對應(長期臥床代謝率『降低』);B腸蠕動變慢、消化液分泌『減少』食慾差(非變多);C新陳代謝速率『降低』(非增加)。故D正確(負氮平衡)。","options":{"A":"長期臥床代謝率降低,敘述須對應。","B":"消化液分泌減少,非變多。","C":"新陳代謝速率降低,非增加。","D":"正確(本題答案)。蛋白質分解>合成,負氮平衡。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"112180-N2-28":{"quick":"平躺(仰臥)最易壓力性損傷部位=枕骨(1)、薦骨(2)→「12」。","detail":{"background":"病人大部分時間「平躺(仰臥)」最易壓力性損傷部位:1枕骨、2薦骨(及肩胛、足跟、肘)。選項3「肩峰突」、4「股骨粗隆」是「側臥」受壓處。故仰臥壓傷部位為「12」。壓瘡:分期一充血期(發紅壓之褪色解壓消退)、二缺血期(持續發紅壓之不褪色解壓不消退、水泡破皮)、三壞死期(全層壞死)、四潰瘍期(深及肌肉骨)。仰臥受壓=枕骨肩胛薦骨足跟肘;側臥=耳肩峰髖外踝;坐姿=坐骨結節。預防:每2小時翻身、移動抬高減剪力、溫和清潔勿用肥皂、補充蛋白質維生素C、勿用氣圈、發紅處不可按摩、Braden量表(不含年齡)。","options":{"A":"正確(本題答案,12)。枕骨、薦骨。","B":"23含肩峰突(側臥)不符。","C":"14含股骨粗隆(側臥)不符。","D":"34是側臥部位不符。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"114030-N2-30":{"quick":"壓瘡:相同刺激「受壓面積越大傷害越『小』」?本題答案B為錯誤(面積越小單位壓力越大傷害越大)。","detail":{"background":"壓力性損傷形成因素:A壓力高於組織血管壓力時阻礙血流致缺氧(對);C長時間小壓力比短時間大壓力傷害大(對,持續受壓);D剪力是深層壓瘡重要因素(對)。選項B「相同的刺激,受壓面積越大對組織的傷害越大」錯誤——相同壓力下「受壓面積越『小』,單位面積壓力越大、傷害越大」(如骨突處小面積受壓最易壓瘡),面積大反而分散壓力,故B為錯誤敘述(本題答案)。","options":{"A":"正確。壓力高於血管壓致缺氧。","B":"錯誤(本題答案)。面積越小單位壓力越大傷害越大,非面積越大。","C":"正確。長時間小壓力傷害大。","D":"正確。剪力是深層壓瘡重要因素。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"114170-N2-27":{"quick":"預防壓瘡最適當=鼓勵肢體主動運動促進血液循環。","detail":{"background":"預防壓力性損傷:D「鼓勵進行肢體的『主動運動』,以促進血液循環」最適當(增加活動、改善循環)。A「氣墊圈(氣圈)分散壓力」錯(氣圈致周圍受壓,不建議);B「烤燈促血循」錯(烤燈非預防壓瘡標準);C「按摩壓力性損傷部位」錯(已受損處按摩會加重損傷,不可按摩)。故D正確。","options":{"A":"氣墊圈致周圍受壓,不建議。","B":"烤燈非預防壓瘡標準。","C":"不可按摩壓傷部位(加重損傷)。","D":"正確(本題答案)。鼓勵主動運動促進血循。"},"sources":["新文京《基本護理學》壓力性損傷","華杏《最新基本護理學》壓瘡分期與預防"]}},"101030-N2-29":{"quick":"床上沐浴擦拭肢體由遠心端往近心端=促進靜脈血液回流。","detail":{"background":"床上沐浴擦拭肢體時「由遠心端擦往近心端」的目的是「促進靜脈血液的回流」(D正確)——順著靜脈回流方向擦拭,幫助血液回心。非為遵循步驟、清除毛囊灰塵或增加肌肉收縮力。故促進靜脈血液回流(D)。身體清潔:擦拭四肢由遠心往近心(促回流);更衣脫衣先脫健側、穿衣先穿患側;眼睛由內眥往外眥、棉棒用一次;會陰沖洗由上往下、先中間再左右、最後肛門、屈膝仰臥;背部按摩開始結束用按撫法、骨突處重擦法、大肌肉揉捏法、老人禁敲擊法/骨轉移禁叩擊;假牙不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤;口腔潰瘍用生理食鹽水/Xylocaine止痛(忌雙氧水優碘檸檬刺激);手指甲修弧形、腳趾甲平剪。","options":{"A":"非為遵循步驟。","B":"非為清除毛囊灰塵。","C":"非為增加肌肉收縮力。","D":"正確(本題答案)。由遠往近擦拭促進靜脈回流。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"101030-N2-31":{"quick":"化療口腔黏膜破損疼痛漱口水=麻醉劑溶液(Xylocaine)。","detail":{"background":"化療致口腔黏膜「破損疼痛」,最適宜的漱口水是「麻醉劑溶液(Xylocaine solution,局部麻醉)」(D正確)——減輕疼痛、利於進食。溫開水(僅清潔)、1%雙氧水(刺激破損黏膜)、2%硼酸水(消除口臭、非止痛)皆不適合疼痛。故Xylocaine(D)。","options":{"A":"溫開水僅清潔,不止痛。","B":"雙氧水刺激破損黏膜。","C":"硼酸水除口臭,非止痛。","D":"正確(本題答案)。破損疼痛用Xylocaine麻醉止痛。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"101110-N2-35":{"quick":"意識不清口腔黏膜破損:以口腔棉枝取代牙刷清潔。","detail":{"background":"意識不清、張口呼吸、口腔黏膜破損病人的口腔護理:B「以口腔棉枝(棉棒)取代牙刷清潔」正確——口腔棉枝柔軟、不傷破損黏膜、適合意識不清者。A高濃度鹽水(刺激破損黏膜);C減少刷牙次數(口腔護理應加強非減少);D暫停清潔(意識不清張口呼吸更需口腔護理防感染乾裂)。故口腔棉枝(B)。","options":{"A":"高濃度鹽水刺激破損黏膜。","B":"正確(本題答案)。以口腔棉枝取代牙刷。","C":"應加強口腔護理,非減少。","D":"不可暫停清潔(更需護理)。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"102030-N2-35":{"quick":"老人背部護理「禁用」敲擊法(tapotement,刺激強)。","detail":{"background":"為80歲老人做背部護理,應「禁用敲擊法(tapotement,叩擊)」(D正確)——敲擊刺激強、老人皮膚脆弱骨質疏鬆,不宜。按撫法(stroking,輕撫,開始與結束用)、揉捏法(kneading)、重擦法(friction,骨突處)皆相對溫和可用。故禁用敲擊法(D)。","options":{"A":"按撫法溫和可用。","B":"揉捏法可用。","C":"重擦法用於骨突處。","D":"正確(本題答案)。老人背部護理禁用敲擊法。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"102030-N2-36":{"quick":"會陰沖洗:沖洗壺口應朝向「會陰(床尾方向)」非床頭;稱壺口朝床頭為錯誤。","detail":{"background":"會陰沖洗:A每枝棉棒只用一次防交互感染(對);C沖洗液保持不間斷配合棉棒(對);D沖洗棉棒由上往下、避免肛門細菌帶至陰道口(對)。選項B「沖洗壺口朝向『床頭』」錯誤——沖洗壺口應朝向「會陰部/床尾方向」順著由上往下沖,壺口朝床頭方向不對(會將沖洗液往上沖),故B為錯誤敘述(本題答案)。","options":{"A":"正確。每棉棒只用一次。","B":"錯誤(本題答案)。沖洗壺口應朝會陰,非床頭。","C":"正確。沖洗液保持不間斷。","D":"正確。棉棒由上往下避免肛門菌帶至陰道。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"102110-N2-26":{"quick":"修剪指(趾)甲:指甲修弧形(2)、趾甲修平(3)→「23」。","detail":{"background":"修剪指(趾)甲:2「指甲(手)修剪成弧形」、3「趾甲(腳)修平(平剪)」——手指甲可修圓弧、腳趾甲應「平剪」(防嵌甲/甲溝炎)。選項1「指甲修平」、4「趾甲修弧形」皆顛倒。故為「23」(指甲弧形、趾甲修平)。身體清潔:擦拭四肢由遠心往近心(促回流);更衣脫衣先脫健側、穿衣先穿患側;眼睛由內眥往外眥、棉棒用一次;會陰沖洗由上往下、先中間再左右、最後肛門、屈膝仰臥;背部按摩開始結束用按撫法、骨突處重擦法、大肌肉揉捏法、老人禁敲擊法/骨轉移禁叩擊;假牙不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤;口腔潰瘍用生理食鹽水/Xylocaine止痛(忌雙氧水優碘檸檬刺激);手指甲修弧形、腳趾甲平剪。","options":{"A":"13含指甲修平不符。","B":"14含趾甲弧形不符。","C":"正確(本題答案,23)。指甲弧形、趾甲修平。","D":"24含趾甲弧形不符。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"103030-N2-16":{"quick":"「鞏膜」無法確實觀察發紺(發紺看皮膚指甲嘴唇黏膜)。","detail":{"background":"觀察「發紺(cyanosis,缺氧致發青)」的部位:A皮膚、B指甲床、C嘴唇黏膜——皆能觀察發紺。選項D「鞏膜(眼白)」無法確實觀察發紺(本題答案)——鞏膜是「黃疸」的觀察部位(變黃),不是發紺(發青)的觀察處。故無法觀察發紺者為鞏膜(D)。","options":{"A":"皮膚可觀察發紺。","B":"指甲床可觀察發紺。","C":"嘴唇可觀察發紺。","D":"正確(本題答案)。鞏膜觀察黃疸,非發紺。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"103030-N2-35":{"quick":"床上沐浴:穿衣服時先穿「右手(有點滴的患側)」。","detail":{"background":"左手有靜脈點滴的吳太太床上沐浴更衣:D「穿衣服時,先穿『右手(有點滴側/不便側)』」正確(穿衣先穿患側、脫衣先脫健側)。A「清洗四肢由近心向遠心」錯(應遠心往近心促回流);B「背部用50%酒精」(老人皮膚脆弱不宜酒精,且本題以D為正解);C「脫衣先脫右手」錯(脫衣應先脫健側左手)。故穿衣先穿右手(D)。","options":{"A":"清洗應由遠心往近心。","B":"老人皮膚不宜50%酒精。","C":"脫衣應先脫健側左手。","D":"正確(本題答案)。穿衣先穿患側右手。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"103030-N2-36":{"quick":"會陰沖洗:沖洗順序由上往下、先擦中間再擦左右。","detail":{"background":"會陰沖洗:D「沖洗順序由上往下擦,先擦中間(尿道口/陰道口)再擦左右(小陰唇大陰唇)」正確(由乾淨到污染、由內而外)。A應採「屈膝仰臥式」非半坐臥;B沖洗壺距會陰約「5~6吋」(此項其實對);C沖洗壺口應朝「會陰(往下)」非床頭、由「上(恥骨)往下」沖(C方向描述須對),本題以D為正解。故由上往下、先中間再左右(D)。","options":{"A":"應採屈膝仰臥式,非半坐臥。","B":"壺距約5~6吋(對,本題正解D)。","C":"壺口朝會陰、由上往下(本題正解D)。","D":"正確(本題答案)。由上往下、先中間再左右。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"103030-N2-37":{"quick":"清潔眼睛應「由內眥往外眥」擦洗,非由外往內;稱由外眥往內眥為錯誤。","detail":{"background":"眼耳鼻部清潔:A眼睛有乾燥分泌物先濕敷去痂皮再清洗(對);C活昆蟲入耳用光線照射使其爬出(對);D有鼻胃管以膠布固定、每天清潔更換膠布(對)。選項B「清潔眼睛時應用毛巾沾水由『外眥往內眥』擦洗」錯誤——清潔眼睛應「由『內眥(鼻側)往外眥(耳側)』」擦(由乾淨往污染、避免將分泌物帶入鼻淚管),故B為錯誤敘述(本題答案)。","options":{"A":"正確。乾燥分泌物先濕敷去痂。","B":"錯誤(本題答案)。眼睛應由內眥往外眥擦,非由外往內。","C":"正確。活昆蟲入耳用光線引出。","D":"正確。鼻胃管膠布每天清潔更換。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"103100-N2-35":{"quick":"剖腹產後會陰沖洗順序:先中間(1)→遠近側小陰唇(2)→大陰唇(3)→肛門(4)→「1→2→3→4」。本題答案C。","detail":{"background":"本題官方答案C(1→2→3→4)。剖腹產後會陰沖洗步驟順序(由乾淨往污染、由內而外):1分開小陰唇由上往下輕拭至肛門口(中間尿道口陰道口)→2輕拭遠側及近側小陰唇→3輕拭遠側及近側大陰唇→4最後肛門。故順序「1→2→3→4」(C)。核心:會陰沖洗由中央(尿道口)往外、最後肛門。","options":{"A":"2→1→3→4順序不符。","B":"2→3→1→4不符。","C":"正確(本題答案)。1→2→3→4(中間→小陰唇→大陰唇→肛門)。","D":"3→2→1→4不符。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"104100-N2-30":{"quick":"身體清潔:頭髮染血跡可用「50%酒精」擦洗?本題答案D。","detail":{"background":"本題官方答案D。身體清潔:D「頭髮若染有血跡時,可用50%酒精加以擦洗(溶解去除血漬)」正確。A「清潔四肢由近心往遠心」錯(應遠心往近心);B「75%酒精擦皮膚促血循涼爽」錯(酒精使皮膚乾燥,不建議常規擦拭);C「沐浴水溫22~27°C」錯(過低,應約43~46°C溫水)。故D正確(頭髮血跡用酒精擦洗)。","options":{"A":"清潔應由遠心往近心。","B":"酒精使皮膚乾燥,不建議常規擦。","C":"沐浴水溫應約43~46°C,非22~27°C。","D":"正確(本題答案)。頭髮血跡可用50%酒精擦洗。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"104100-N2-36":{"quick":"活動假牙「不」用熱水浸泡(熱水使假牙變形);稱熱水浸泡為錯誤。","detail":{"background":"假牙護理:B硬橡皮牙托不戴時泡在有水容器(對,防乾裂變形);C合成樹脂牙托不戴時放乾燥容器(對);D戴假牙前先泡水減摩擦易戴(對)。選項A「清潔活動假牙應用『熱水』浸泡以減少細菌孳生」錯誤——「熱水」會使假牙(樹脂/橡膠)「變形」,應用「冷水/溫水/假牙清潔劑」清潔,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。假牙不用熱水(會變形),用冷溫水。","B":"正確。硬橡皮牙托泡水保存。","C":"正確。合成樹脂牙托放乾燥容器。","D":"正確。戴前先泡水減摩擦。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"105030-N2-34":{"quick":"術後右手點滴更衣:先脫手術衣左側(健側)、先穿右側(患側)。本題答案... 重判官方。","detail":{"background":"本題官方答案D(14)?核心更衣原則:「脫衣先脫健側、穿衣先穿患側」。王太太右手有點滴(患側),應「先脫『左(健)』側衣袖、先穿『右(患)』側衣袖」。選項1「先脫右側」錯;2「先脫左側」對;3/4穿衣...。依官方答案組合(脫健側、穿患側)。作答以官方為準;核心:脫衣先脫健側、穿衣先穿患側(有點滴/受傷側)。","options":{"A":"13組合不符脫健穿患原則。","B":"23不符。","C":"24不符。","D":"本題答案(依官方)。脫左(健)、穿右(患)。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"105090-N2-31":{"quick":"背部按摩用於骨突處、足踝、指節=重擦法(friction)。","detail":{"background":"背部按摩方法:B「重擦法(friction)」用於「骨突處、足踝或指節處」(B正確)——以拇指/指尖在小面積骨突處做環形摩擦,促進血循。揉捏法(大肌肉)、敲擊法(叩擊大肌肉)、按撫法(開始結束的輕撫
