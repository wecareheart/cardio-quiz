)皆非骨突處用。故重擦法(B)。身體清潔:擦拭四肢由遠心往近心(促回流);更衣脫衣先脫健側、穿衣先穿患側;眼睛由內眥往外眥、棉棒用一次;會陰沖洗由上往下、先中間再左右、最後肛門、屈膝仰臥;背部按摩開始結束用按撫法、骨突處重擦法、大肌肉揉捏法、老人禁敲擊法/骨轉移禁叩擊;假牙不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤;口腔潰瘍用生理食鹽水/Xylocaine止痛(忌雙氧水優碘檸檬刺激);手指甲修弧形、腳趾甲平剪。","options":{"A":"揉捏法用於大肌肉。","B":"正確(本題答案)。重擦法用於骨突處足踝指節。","C":"敲擊法用於大肌肉叩擊。","D":"按撫法是開始結束的輕撫。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"106030-N2-29":{"quick":"口腔潰瘍疼痛最適合漱口水=生理食鹽水。本題答案D。","detail":{"background":"本題官方答案D。口腔癌兩頰潰瘍疼痛,最適合的漱口水是「生理食鹽水(0.9% NaCl)」(D)——溫和、不刺激、清潔促進黏膜癒合、無刺激性。多貝爾溶液(Dobell’s,含薄荷刺激)、2%硼酸水(消毒但刺激破損黏膜)、水溶性優碘(刺激破損黏膜)皆不適合潰瘍疼痛。故生理食鹽水(D)。","options":{"A":"多貝爾溶液含薄荷刺激。","B":"硼酸水刺激破損黏膜。","C":"優碘刺激破損黏膜。","D":"正確(本題答案)。潰瘍疼痛用生理食鹽水溫和。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"106030-N2-34":{"quick":"女性會陰沖洗棉棒「不」由上往下『來回』擦拭(應單向、一棉棒用一次);稱來回擦拭為錯誤。","detail":{"background":"女性會陰沖洗:A採屈膝仰臥姿勢(對);B以41~43°C水溫沖洗(對);D由陰道口依序向外沖(對,由乾淨往污染)。選項C「沖洗棉棒由上往下『來回』擦拭」錯誤——棉棒應「由上往下『單向』擦拭、一支棉棒只用一次」,「來回」擦會將肛門污染帶回尿道陰道,故C為錯誤敘述(本題答案)。","options":{"A":"正確。採屈膝仰臥姿勢。","B":"正確。41~43°C水溫。","C":"錯誤(本題答案)。棉棒應單向擦,非來回(防污染)。","D":"正確。由陰道口向外沖。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"106110-N2-34":{"quick":"口腔潰瘍「不」用10%雙氧水漱口(刺激破損黏膜);稱用10%雙氧水為不適當。","detail":{"background":"鼻咽癌化放療口腔潰瘍護理溶液:A生理食鹽水漱口清潔(適當)、B麻醉性溶液漱口止痛(適當)、D 2%硼酸水漱口消除口臭(尚可)。選項C「以『10%雙氧水』漱口清潔」不適當——雙氧水濃度高(10%)會「刺激、傷害破損的口腔黏膜」(且濃度應稀釋至1~3%),潰瘍處不宜,故C為不適當(本題答案)。","options":{"A":"適當。生理食鹽水漱口清潔。","B":"適當。麻醉溶液漱口止痛。","C":"不適當(本題答案)。10%雙氧水刺激破損黏膜。","D":"2%硼酸水尚可消除口臭。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"106111-N2-34":{"quick":"鼻胃管灌食「後」不可立即口腔護理(刺激嘔吐);稱灌食後立即口腔護理為不適當。","detail":{"background":"特別口腔護理:B用生理食鹽水清潔濕潤口腔(對);C舌頭用壓舌板包紗布沾漱口水清洗(對);D嘴唇以潤滑劑保護防乾裂(對)。選項A「鼻胃管灌食完後,『立即』給予口腔護理」不適當——灌食後立即口腔護理(刺激咽部)易引起「嘔吐、逆流吸入」,應「灌食前」或「灌食後休息一段時間」再執行,故A為不適當(本題答案)。","options":{"A":"不適當(本題答案)。灌食後不可立即口腔護理(致嘔吐)。","B":"適當。生理食鹽水清潔濕潤。","C":"適當。壓舌板包紗布清洗舌頭。","D":"適當。嘴唇潤滑劑防乾裂。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"106111-N2-47":{"quick":"鼻胃管進食特殊口腔護理:可用溫開水、檸檬水、茶葉水。","detail":{"background":"長期鼻胃管進食(意識清楚)的特殊口腔護理:C「可使用溫開水、新鮮檸檬水、茶葉水(清潔、刺激唾液分泌)」正確。A「灌食後10分鐘內口腔護理」錯(灌食後不宜立即,防逆流);B「白天夜間每2小時不論清醒與否都護理」過度;D「用托舌鉗固定舌部」錯(不需托舌鉗,意識清楚者可配合)。故C正確。","options":{"A":"灌食後不宜立即口腔護理。","B":"每2小時不論清醒過度。","C":"正確(本題答案)。可用溫開水、檸檬水、茶葉水。","D":"不需托舌鉗(意識清楚可配合)。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"107030-N2-30":{"quick":"全身癱瘓有異味:「不」用50%酒精按摩(皮膚乾燥);稱酒精按摩為最不恰當。","detail":{"background":"全身癱瘓有汗臭異味的護理:A肥皂清水床上沐浴(對,清潔)、C洗髮精床上洗頭(對)、D會陰護理清潔會陰(對)。選項B「以50%酒精按摩促進血液循環」最不恰當——酒精會使皮膚「乾燥」、長期臥床者皮膚已脆弱,且酒精按摩非清除異味的方法,故B為最不恰當(本題答案)。應以溫水清潔。","options":{"A":"恰當。肥皂清水床上沐浴。","B":"最不恰當(本題答案)。50%酒精按摩使皮膚乾燥。","C":"恰當。洗髮精床上洗頭。","D":"恰當。會陰護理清潔。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"107030-N2-33":{"quick":"重症病人預防感染口腔護理溶液=稀釋後Aq. beta-iodine(優碘)溶液。本題答案B。","detail":{"background":"本題官方答案B。為重症病人口腔護理「預防感染」,最合適溶液是「稀釋後的Aq. beta-iodine(水溶性優碘)溶液」(B)——具廣效抗菌、預防口腔感染。NaHCO3(小蘇打,鬆動分泌物)、Xylocaine(麻醉止痛)、1% H2O2(去痂但刺激)皆非「預防感染」首選。故稀釋優碘(B)。","options":{"A":"小蘇打是鬆動分泌物,非抗菌。","B":"正確(本題答案)。稀釋優碘預防口腔感染。","C":"Xylocaine是麻醉止痛。","D":"1% H2O2去痂但刺激。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"108020-N2-35":{"quick":"右手受傷脫衣:先脫左手(健側)再脫右手(患側)衣袖。","detail":{"background":"協助更衣原則「脫衣先脫健側、穿衣先穿患側」:A「右手受傷病人脫衣時,應先脫『左手(健側)』再脫右手(患側)衣袖」正確。B「右手點滴穿衣先穿左手(健側)」錯(穿衣應先穿患側右手);C「左腿受傷脫褲先脫左(患)側」錯(脫先脫健側右);D「左腿受傷穿褲先穿右(健)腿」錯(穿先穿患側左)。故A正確。","options":{"A":"正確(本題答案)。脫衣先脫健側左手、再脫患側右手。","B":"穿衣應先穿患側右手,非健側左。","C":"脫褲應先脫健側,非患側左。","D":"穿褲應先穿患側左,非健側右。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"109030-N2-12":{"quick":"老人背部護理開始與結束常用按撫法(stroking)。","detail":{"background":"為老人做背部護理,「開始與結束」時常用「按撫法(stroking,以手掌輕撫)」(A正確)——輕柔、使病人放鬆、促進舒適。揉捏法(大肌肉)、重擦法(骨突處)、敲擊法(刺激強,老人禁用)皆非開始結束用。故按撫法(A)。身體清潔:擦拭四肢由遠心往近心(促回流);更衣脫衣先脫健側、穿衣先穿患側;眼睛由內眥往外眥、棉棒用一次;會陰沖洗由上往下、先中間再左右、最後肛門、屈膝仰臥;背部按摩開始結束用按撫法、骨突處重擦法、大肌肉揉捏法、老人禁敲擊法/骨轉移禁叩擊;假牙不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤;口腔潰瘍用生理食鹽水/Xylocaine止痛(忌雙氧水優碘檸檬刺激);手指甲修弧形、腳趾甲平剪。","options":{"A":"正確(本題答案)。背部護理開始結束用按撫法。","B":"揉捏法用於大肌肉。","C":"重擦法用於骨突處。","D":"敲擊法刺激強,老人不宜。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"109030-N2-33":{"quick":"床上擦澡:先脫靠近護理師側的衣袖,再脫遠側衣袖。","detail":{"background":"床上擦澡更衣:A「先脫靠近護理師側之衣袖,再脫護理師遠側衣袖」正確(近側易操作)。B「同一條濕毛巾擦兩耳後再擦眼鼻」錯(應分區、不同部位用不同面/毛巾,先擦眼睛最乾淨處);C「毛巾由近心往遠心擦拭」錯(應遠心往近心促回流);D「用50%酒精輕拍頸背臀」錯(酒精使皮膚乾燥,老人不宜)。故A正確。","options":{"A":"正確(本題答案)。先脫近側衣袖再脫遠側。","B":"不可同毛巾擦耳後再擦眼鼻(交叉污染)。","C":"應由遠心往近心擦拭。","D":"酒精使皮膚乾燥,老人不宜。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"109110-N2-36":{"quick":"老年人床上沐浴:沐浴後建議使用乳液防止皮膚乾燥。","detail":{"background":"老年人床上沐浴:C「沐浴後建議使用乳液,防止皮膚乾燥」正確(老人皮脂少、易乾)。A「50%酒精擦拭」錯(酒精使皮膚更乾);B「不建議清水擦拭」錯(清水可清潔);D「鼠蹊部同時塗嬰兒油及爽身粉」錯(油與粉混合結塊、反致皮膚問題,不可同時用)。故C正確。","options":{"A":"酒精使皮膚更乾,不宜。","B":"清水可清潔,非不建議。","C":"正確(本題答案)。沐浴後用乳液防乾燥。","D":"油與粉不可同時用(結塊)。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"109110-N2-37":{"quick":"家屬拒減衣物:以乾毛巾擦拭身體、潮濕內層衣物應更換。","detail":{"background":"中風病人穿過多衣物冒汗有異味、家屬拒絕減衣:D「以乾毛巾擦拭病人身體,內層衣物如果潮濕就應更換」最適當(D正確)——尊重家屬同時兼顧衛生與舒適。A「強制減衣」(不尊重家屬);B「用爽身粉吸汗」(治標、結塊);C「用電扇調室溫」(中風病人吹電扇易受涼)皆不適當。故D正確。","options":{"A":"不可強制減衣(不尊重家屬)。","B":"爽身粉吸汗治標、易結塊。","C":"中風病人吹電扇易受涼。","D":"正確(本題答案)。乾毛巾擦拭、潮濕內衣應更換。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"109110-N2-48":{"quick":"化療口腔潰瘍:採用生理食鹽水清潔口腔,促進黏膜再生。","detail":{"background":"淋巴癌化療致口腔疼痛紅斑潰瘍的口腔護理:D「採用生理食鹽水清潔口腔,可促進黏膜再生(溫和不刺激)」適當。A「Dobell’s solution」含薄荷刺激(不宜潰瘍);B「減少口腔清潔頻次」錯(化療口腔炎更需加強護理);C「進食後立即特別口腔護理」(時機須適當,但本題以D為正解)。故D正確。","options":{"A":"Dobell’s含薄荷刺激潰瘍。","B":"化療口腔炎應加強護理,非減少。","C":"進食後立即護理時機須斟酌。","D":"正確(本題答案)。生理食鹽水清潔促進黏膜再生。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"110030-N2-27":{"quick":"腦血管損傷右手點滴更衣:右手後脫、先穿(患側後脫先穿)。","detail":{"background":"右手背有靜脈注射的更衣原則「脫衣先脫健側(後脫患側)、穿衣先穿患側」:B「右手(患側)『後脫、先穿』」正確——脫衣先脫健側左手、後脫患側右手;穿衣先穿患側右手。故右手後脫先穿(B)。身體清潔:擦拭四肢由遠心往近心(促回流);更衣脫衣先脫健側、穿衣先穿患側;眼睛由內眥往外眥、棉棒用一次;會陰沖洗由上往下、先中間再左右、最後肛門、屈膝仰臥;背部按摩開始結束用按撫法、骨突處重擦法、大肌肉揉捏法、老人禁敲擊法/骨轉移禁叩擊;假牙不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤;口腔潰瘍用生理食鹽水/Xylocaine止痛(忌雙氧水優碘檸檬刺激);手指甲修弧形、腳趾甲平剪。","options":{"A":"右手先脫(患側先脫)錯。","B":"正確(本題答案)。右手(患側)後脫、先穿。","C":"左手(健側)先脫對,但穿應先穿患側右。","D":"左手後脫先穿(健側)不符。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"110030-N2-33":{"quick":"背部護理開始與結束最常採按撫法(stroking)。","detail":{"background":"執行背部護理(背部按摩)的開始與結束,最常採用「按撫法(stroking,手掌輕撫)」(C正確)——輕柔放鬆、促進舒適、評估皮膚。重擦法(骨突處)、揉捏法(大肌肉)、敲擊法(叩擊)皆非開始結束用。故按撫法(C)。身體清潔:擦拭四肢由遠心往近心(促回流);更衣脫衣先脫健側、穿衣先穿患側;眼睛由內眥往外眥、棉棒用一次;會陰沖洗由上往下、先中間再左右、最後肛門、屈膝仰臥;背部按摩開始結束用按撫法、骨突處重擦法、大肌肉揉捏法、老人禁敲擊法/骨轉移禁叩擊;假牙不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤;口腔潰瘍用生理食鹽水/Xylocaine止痛(忌雙氧水優碘檸檬刺激);手指甲修弧形、腳趾甲平剪。","options":{"A":"重擦法用於骨突處。","B":"揉捏法用於大肌肉。","C":"正確(本題答案)。開始結束用按撫法。","D":"敲擊法是叩擊大肌肉。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"110030-N2-35":{"quick":"乳癌骨轉移床上沐浴:由肢體遠心端往近心端按摩擦洗。","detail":{"background":"乳癌骨轉移病人床上沐浴及背部護理:B「由肢體遠心端往近心端按摩擦洗四肢(促靜脈回流)」正確。A「水溫46.5~48°C」過高(應約43~46°C);C「50%酒精按摩背部」錯(酒精使皮膚乾);D「扣擊法按摩背肩頸」錯(骨轉移病人禁用叩擊/扣擊,易致病理性骨折)。故B正確。","options":{"A":"水溫過高,應約43~46°C。","B":"正確(本題答案)。由遠心往近心擦洗四肢。","C":"酒精按摩使皮膚乾燥。","D":"骨轉移禁用扣擊(易病理性骨折)。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"110110-N2-39":{"quick":"放療後洗髮:梳髮先梳髮尾再梳髮根。","detail":{"background":"腦瘤頭部放療後協助洗髮:C「梳髮時先梳髮尾再梳髮根(由下往上,減少拉扯掉髮)」正確(放療後頭髮脆弱易掉)。A「90%酒精梳理」錯(酒精刺激頭皮);B「吹風機直吹頭皮」錯(高溫傷脆弱頭皮頭髮);D「指尖洗頭兼止癢」錯(應用『指腹』輕揉,指尖/指甲會抓傷頭皮)。故C正確。","options":{"A":"酒精刺激頭皮,不宜。","B":"吹風機直吹頭皮傷頭皮頭髮。","C":"正確(本題答案)。梳髮先梳髮尾再梳髮根。","D":"應用指腹輕揉,非指尖抓。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"110110-N2-40":{"quick":"糖尿病足不宜泡腳、趾甲應平剪、乳液勿塗趾縫；趾甲旁肉刺應由專業人員協助小心剪除並消毒以免撕扯感染，故選C最適當。","detail":{"background":"本題官方答案A。糖尿病足部護理:A「先浸泡溫水15~30分鐘再修剪趾甲(軟化指甲)」正確(惟須注意水溫防燙傷)。B「趾甲修『圓形』」錯(應『平剪』防嵌甲);C「腳趾旁肉刺協助剪除消毒」錯(糖尿病足不可自行剪肉刺、易感染,應由專業處理);D「由大腿往腳趾塗乳液」錯(應由肢體遠端往近端、且趾縫間不塗乳液防潮濕黴菌)。故A正確。","options":{"A":"糖尿病足不宜泡腳(感覺遲鈍易燙傷、皮膚浸軟易破損)。","B":"趾甲應平剪，非圓形(圓剪易致嵌甲)。","C":"正解：趾甲旁肉刺(倒刺)由專業人員協助小心剪除並消毒，避免自行撕扯造成傷口。","D":"應「由腳趾往近心端」塗乳液且「趾縫不塗」，方向與部位皆錯。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"110110-N2-41":{"quick":"老年人背部護理「不」用敲擊法(tapotement,刺激強);稱敲擊法為不適當。","detail":{"background":"老年病人背部護理:A重擦法(骨突處)、B按撫法(開始結束輕撫)、D揉捏法(大肌肉)——皆可用。選項C「敲擊法(tapotement,叩擊)」不適當(本題答案)——敲擊刺激強,老人皮膚脆弱、骨質疏鬆,不宜用敲擊法。故不適當者為敲擊法(C)。身體清潔:擦拭四肢由遠心往近心(促回流);更衣脫衣先脫健側、穿衣先穿患側;眼睛由內眥往外眥、棉棒用一次;會陰沖洗由上往下、先中間再左右、最後肛門、屈膝仰臥;背部按摩開始結束用按撫法、骨突處重擦法、大肌肉揉捏法、老人禁敲擊法/骨轉移禁叩擊;假牙不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤;口腔潰瘍用生理食鹽水/Xylocaine止痛(忌雙氧水優碘檸檬刺激);手指甲修弧形、腳趾甲平剪。","options":{"A":"重擦法可用於骨突處。","B":"按撫法可用(開始結束)。","C":"正確(本題答案)。老人背部護理不用敲擊法。","D":"揉捏法可用於大肌肉。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"111030-N2-12":{"quick":"乳房切除床上沐浴急性疼痛主觀資料=「病人表示我好痛好不舒服」。","detail":{"background":"急性疼痛的「主觀資料(病人主訴)」:D「病人表示『我好痛好不舒服』」是病人陳述的主觀感受(D正確)。A「病人幾乎平躺不敢翻身」(觀察行為,客觀)、B「左前胸5×8公分傷口」(觀察測量,客觀)、C「病人表情皺眉害怕」(觀察,客觀)皆是客觀資料。故主觀資料為D。","options":{"A":"平躺不敢翻身是觀察(客觀)。","B":"傷口大小是測量(客觀)。","C":"皺眉表情是觀察(客觀)。","D":"正確(本題答案)。病人說「好痛」是主觀資料。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"111110-N2-33":{"quick":"老人背部護理「不」於開始與結束使用敲擊法(應按撫法);稱開始結束用敲擊法為錯誤。","detail":{"background":"老年病人背部護理:A可預防長期臥床皮膚合併症(對);C臀部及頸背部使用揉捏法(對,大肌肉);D以拇指及手掌心執行重擦法(對,骨突處)。選項B「開始與結束時使用『敲擊法』」錯誤——開始與結束應用「按撫法(stroking)」(輕柔),敲擊法刺激強、不宜老人且非開始結束用,故B為錯誤敘述(本題答案)。","options":{"A":"正確。預防臥床皮膚合併症。","B":"錯誤(本題答案)。開始結束用按撫法,非敲擊法。","C":"正確。臀部頸背用揉捏法。","D":"正確。拇指手掌心重擦法。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"112030-N2-34":{"quick":"口腔潰瘍適用=生理食鹽水(1)、麻醉劑溶液(4)→「14」。","detail":{"background":"口腔潰瘍病人適用的溶液:1生理食鹽水(溫和清潔、促癒合)、4麻醉劑溶液(Xylocaine,止痛利進食)。選項2「檸檬水」(酸性刺激潰瘍)、3「雙氧水(H2O2)」(刺激破損黏膜)皆不適合潰瘍。故為「14」。身體清潔:擦拭四肢由遠心往近心(促回流);更衣脫衣先脫健側、穿衣先穿患側;眼睛由內眥往外眥、棉棒用一次;會陰沖洗由上往下、先中間再左右、最後肛門、屈膝仰臥;背部按摩開始結束用按撫法、骨突處重擦法、大肌肉揉捏法、老人禁敲擊法/骨轉移禁叩擊;假牙不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤;口腔潰瘍用生理食鹽水/Xylocaine止痛(忌雙氧水優碘檸檬刺激);手指甲修弧形、腳趾甲平剪。","options":{"A":"含2(檸檬水酸刺激)不符。","B":"含3(雙氧水刺激)不符。","C":"正確(本題答案,14)。生理食鹽水、麻醉劑溶液。","D":"含2、3不符。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"112180-N2-21":{"quick":"中央靜脈導管/左手留置:脫衣先脫右(健)上肢、再脫左(患)上肢。","detail":{"background":"有中央靜脈導管及「左手留置靜脈管路」病人更衣:A「脫衣時,先脫右上肢(健側),再脫左上肢(患側)」正確(脫衣先脫健側)。B「穿衣先穿右(健)上肢」錯(穿衣應先穿患側左);C「直接反穿上衣扣背後鈕釦」(不當);D「不穿上衣蓋被單」(不維護尊嚴舒適)。故A正確(脫衣先脫健側右)。","options":{"A":"正確(本題答案)。脫衣先脫健側右上肢、再脫患側左。","B":"穿衣應先穿患側左,非健側右。","C":"反穿上衣不當。","D":"不穿上衣不維護尊嚴。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"112180-N2-22":{"quick":"化療口腔潰瘍:以麻醉性溶液(Xylocaine)漱口,減輕進食時疼痛。","detail":{"background":"化療致口腔黏膜潰瘍疼痛有異味的照護:D「以麻醉性溶液(xylocaine solution)漱口,減輕進食時(疼痛)」正確。A「冷水1:5稀釋優碘」(優碘刺激破損黏膜);B「口腔潰瘍處塗甘油促癒合」錯(甘油不促潰瘍癒合、且偏乾);C「2%雙氧水漱口消除異味」錯(雙氧水刺激破損黏膜)。故D正確。","options":{"A":"優碘刺激破損黏膜。","B":"甘油不促潰瘍癒合。","C":"雙氧水刺激破損黏膜。","D":"正確(本題答案)。麻醉溶液漱口減輕進食疼痛。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"113030-N2-22":{"quick":"橡膠活動假牙置入口腔前應先以水濕潤。","detail":{"background":"橡膠製活動假牙清潔與使用:C「假牙置於口腔前,應先以水濕潤之(減少摩擦、易戴入)」正確。A「泡在『蘇打水』中保存」錯(橡膠牙托不戴時泡在『清水』中);B「用50°C熱水清潔加強消毒」錯(熱水使假牙變形);D「整日持續配戴維持臉頰外觀」錯(假牙應取下清潔休息,不可整日戴)。故C正確。","options":{"A":"橡膠牙托泡清水,非蘇打水。","B":"熱水使假牙變形,不可用。","C":"正確(本題答案)。假牙置入前先以水濕潤。","D":"假牙不可整日持續配戴。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"114030-N2-23":{"quick":"骨轉移病人沐浴:41~43°C溫水擦澡後塗乳液(禁叩擊/熱水足浴)。","detail":{"background":"肺癌多處骨轉移、皮膚乾燥、足部靜脈栓塞病人的沐浴按摩:A「以41~43°C溫水擦澡後,再塗擦乳液(保濕)」適當。B「清潔四肢由近心往遠心」錯(應遠心往近心);C「背部叩擊」錯(骨轉移禁叩擊、易病理性骨折);D「熱水足浴後足部按摩」錯(下肢靜脈栓塞『禁按摩』、防血栓脫落,且糖尿病/血栓不宜熱水足浴)。故A正確。","options":{"A":"正確(本題答案)。41~43°C溫水擦澡後塗乳液。","B":"應由遠心往近心擦拭。","C":"骨轉移禁叩擊(防骨折)。","D":"下肢栓塞禁按摩(防血栓脫落)。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"114100-N2-20":{"quick":"右手點滴更衣:脫衣先脫左(健)側、穿衣先穿右(患)側。","detail":{"background":"右手打點滴(患側)更衣原則「脫衣先脫健側、穿衣先穿患側」:B「脫衣時先脫左側(健側),穿衣時先穿右側(患側)」正確。A「脫右穿左」(脫患穿健,顛倒);C「脫左穿左」(穿應先患側右);D「脫右穿右」(脫應先健側左)。故B正確。身體清潔:擦拭四肢由遠心往近心(促回流);更衣脫衣先脫健側、穿衣先穿患側;眼睛由內眥往外眥、棉棒用一次;會陰沖洗由上往下、先中間再左右、最後肛門、屈膝仰臥;背部按摩開始結束用按撫法、骨突處重擦法、大肌肉揉捏法、老人禁敲擊法/骨轉移禁叩擊;假牙不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤;口腔潰瘍用生理食鹽水/Xylocaine止痛(忌雙氧水優碘檸檬刺激);手指甲修弧形、腳趾甲平剪。","options":{"A":"脫衣應先健側,穿衣應先患側,A顛倒。","B":"正確(本題答案)。脫左(健)、穿右(患)。","C":"穿衣應先患側右,非左。","D":"脫衣應先健側左,非右。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"115030-N2-20":{"quick":"活動式假牙置入口腔前應先潤濕後再放入。","detail":{"background":"活動式假牙護理:A「置入口腔前應先潤濕(以水)後再放入(減少摩擦、易戴)」正確。B「宜24小時配戴維持咬合」錯(假牙應取下清潔、夜間取下讓口腔休息);C「橡皮牙托以乾燥方式保存」錯(橡皮牙托應泡『水中』防乾裂變形);D「浸泡熱水殺菌」錯(熱水使假牙變形)。故A正確。","options":{"A":"正確(本題答案)。假牙置入前先潤濕。","B":"假牙不可24小時配戴(夜間取下)。","C":"橡皮牙托應泡水保存,非乾燥。","D":"不可泡熱水(假牙變形)。"},"sources":["新文京《基本護理學》身體清潔","華杏《最新基本護理學》沐浴會陰口腔護理"]}},"101030-N2-3":{"quick":"評估壓力調適狀態錯誤=評估姊姊的交友狀況(與病人壓力無關)。","detail":{"background":"評估林女士(離婚、獨自撫養、車禍住院、傷口疼痛)的「壓力調適狀態」應聚焦病人本身:B過去因應壓力的方法、C住院後經濟來源、D病人認為造成壓力的因素——皆相關。選項A「姊姊的交友狀況」與林女士的壓力調適無關(本題答案)。故錯誤者為評估姊姊交友狀況(A)。","options":{"A":"正確(本題答案)。姊姊交友狀況與病人壓力無關。","B":"過去因應壓力方法是相關評估。","C":"住院經濟來源是相關壓力源。","D":"病人認為的壓力因素是相關評估。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"101030-N2-26":{"quick":"誘尿「不」可逆時鐘輕揉膀胱(應順時鐘);稱逆時鐘輕揉膀胱為錯誤。","detail":{"background":"誘尿措施:B手握冰塊利用冷刺激反射(對);C溫水會陰沖洗放鬆尿道括約肌(對);D聽流水聲刺激大腦皮質產生尿意(對)。選項A「可以『逆時鐘』方向輕揉膀胱部位」錯誤——按摩膀胱應「『順時鐘』方向(順腸/膀胱排空方向)」輕揉刺激排尿,逆時鐘方向不對,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。應順時鐘輕揉膀胱,非逆時鐘。","B":"正確。手握冰塊冷刺激。","C":"正確。溫水會陰沖洗放鬆括約肌。","D":"正確。聽流水聲產生尿意。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"102030-N2-14":{"quick":"客觀資料最適宜=「尾骶骨處有一3×3×0.2公分的壓瘡」(觀察測量)。","detail":{"background":"客觀資料(objective)=護理師觀察/測量的具體事實。選項B「個案尾骶骨處有一3×3×0.2公分的壓瘡」是觀察測量的客觀描述(B正確)。A「自覺頭暈」(主觀)、C「主訴疼痛」(主觀)、D「食慾不振」(籠統主觀)皆非客觀。故客觀資料為B。","options":{"A":"「自覺頭暈」是主觀。","B":"正確(本題答案)。壓瘡大小是客觀測量資料。","C":"「主訴疼痛」是主觀。","D":"「食慾不振」是主觀。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"102110-N2-1":{"quick":"評估壓力調適錯誤=腎上腺素分泌「減少」(壓力時應分泌增加);稱腎上腺素減少為錯誤。","detail":{"background":"評估病人(糖尿病足潰瘍住院)對壓力的調適:B壓力越大認知功能越差(對);C情緒可能有害怕焦慮悲傷(對);D可能出現退縮失眠易怒攻擊(對)。選項A「腎上腺素分泌『減少』」錯誤——壓力反應(警覺期/交感興奮)時「腎上腺素分泌『增加』」(戰或逃反應),故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。壓力時腎上腺素分泌增加,非減少。","B":"正確。壓力大認知功能差。","C":"正確。情緒有害怕焦慮悲傷。","D":"正確。可能退縮失眠易怒。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"103100-N2-10":{"quick":"焦點記錄DARE:「教導翻身減痛方法」屬E(衛教/教育)。本題答案C為錯誤?重判官方C。","detail":{"background":"本題官方答案C。焦點(DARE/DART)記錄:D(data資料:主訴傷口痛、TPR數值)、A(action措施:無菌技術換藥)、R(response反應)、E/T(teaching衛教:教導翻身減痛方法)。選項C「『R(response反應)』:盲腸破裂引發腹膜炎、術後第二天傷口疼痛」——這是「病史/問題背景(data)」非「response(病人對措施的反應)」,故C的歸類為錯誤(本題答案)。核心:R是病人對護理措施的反應,非病史。","options":{"A":"D是主訴與數值資料(正確)。","B":"A是無菌技術換藥措施(正確)。","C":"錯誤(本題答案)。病史背景應屬D,非R(反應)。","D":"E是教導減痛衛教(正確)。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"103100-N2-30":{"quick":"尿急解不出來誘尿:下腹部局部按摩。","detail":{"background":"車禍腦出血清醒病人下腹尿脹、尿急解不出(尿瀦留),誘尿措施:C「下腹部局部按摩(順時鐘輕揉膀胱)」正確。A「憋氣腹部用力(Valsalva)」不當(腦出血者增顱內壓危險);B「雙手握熱水袋」(無助排尿,且應作用於膀胱);D「下腹部局部『冷敷』」錯(誘尿用『熱敷/溫水』非冷敷,冷使膀胱收縮)。故下腹部局部按摩(C)。","options":{"A":"憋氣用力增顱內壓,危險。","B":"手握熱水袋無助排尿。","C":"正確(本題答案)。下腹部局部按摩誘尿。","D":"誘尿用熱不用冷(冷使膀胱收縮)。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"105090-N2-9":{"quick":"病人抱怨夜班護理師:回應「您能告訴我昨天夜裡當時的情況嗎?」(開放式探詢)。","detail":{"background":"病人抱怨夜班護理師態度差,最適當的回應是「您能告訴我,昨天夜裡當時的情況嗎?(C)」——用「開放式問句」傾聽、了解事件、不批判、不防衛。A「不可批評護理師、人手不足」(防衛、否定病人);B「不要想昨天的事」(迴避);D「我去問清楚、您心情還很差嗎」(轉移、防衛)皆非。故開放式探詢(C)。","options":{"A":"否定病人、防衛(人手不足)。","B":"「不要想」是迴避。","C":"正確(本題答案)。開放式探詢了解情況。","D":"轉移焦點、防衛。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"106030-N2-30":{"quick":"誘導小便方法=逆時鐘輕揉膀胱?應聽流水聲(2)+會陰沖洗(3)+溫水坐浴(4)。本題答案D。","detail":{"background":"本題官方答案D。林女士6小時未解尿、下腹脹,誘導排尿方法:2聽流水聲(刺激尿意)、3會陰沖洗(溫水放鬆括約肌)、4溫水坐浴(放鬆會陰促排尿)——皆有效。選項1「『逆時鐘』輕揉膀胱」錯(應『順時鐘』按摩)。本題以選項組合(排除逆時鐘)為答案D。核心:誘尿用聽流水、溫水會陰沖洗/坐浴、順時鐘按摩膀胱、手握冰塊。","options":{"A":"含1(逆時鐘)錯。","B":"組合不符。","C":"組合不符。","D":"正確(本題答案)。聽流水、會陰沖洗、溫水坐浴等誘尿。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"107110-N2-10":{"quick":"護病溝通「不」宜溝通時不直視病人、視線低於病人;稱不直視低於病人為不適宜。","detail":{"background":"促進護病溝通:A開放式溝通「昨晚睡得如何?」促進表達(適宜);B無法口語表達者可用封閉式問句(適宜);D不清楚時進一步澄清(適宜)。選項C「溝通時勿直視病人,保持視線『低於』病人眼睛以減輕威脅感」不適宜——溝通應「適度眼神接觸、視線與病人『同高(平視)』」表達尊重與關注;刻意不直視/視線過低反而不利溝通,故C為不適宜(本題答案)。","options":{"A":"適宜。開放式溝通促進表達。","B":"適宜。無法口語可用封閉式。","C":"不適宜(本題答案)。溝通應平視、適度眼神接觸,非不直視。","D":"適宜。不清楚時澄清。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"108020-N2-13":{"quick":"SOAP中「A(評估)」應為「手術後傷口疼痛」，寫成「傷口感染引發疼痛」並無感染證據，屬過度推論，記錄錯誤，故選C。","detail":{"background":"本題官方答案D。SOAP記錄:S(主觀:主訴傷口痛不敢翻身)、O(客觀:術後第二天皺眉、TPR數值)、A(評估/問題:傷口疼痛)、P(計畫/措施:以無菌技術換藥、教導翻身減痛方法)。選項D「『P』:以無菌技術換藥;教導翻身輕壓傷口慢慢翻身;教導減輕疼痛」是正確的計畫/措施歸類(D正確)。故D。","options":{"A":"S(主觀)記錄病人主訴，正確。","B":"O(客觀)記錄徵象與數值，正確。","C":"正解(錯誤記錄)：A應為「手術後傷口疼痛」，「傷口感染」無證據、為過度推論。","D":"P(計畫)記錄換藥與衛教措施，正確。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"108020-N2-15":{"quick":"護理評值最不適當=「褥瘡傷口已改善」(籠統不可測量)。","detail":{"background":"護理評值應「具體、可測量」。選項A「10/13褥瘡傷口已改善」最不適當(本題答案)——「已改善」籠統、不可測量(改善多少?)。B「能正確說出鉀含量高食物三種」、C「疼痛緩解疼痛指數3分」、D「3天內能下床用拐杖行走50公尺」皆是可測量的具體評值。故最不適當為A。","options":{"A":"最不適當(本題答案)。「已改善」籠統不可測量。","B":"能說出三種食物可測量。","C":"疼痛指數3分可測量。","D":"行走50公尺可測量。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"108020-N2-31":{"quick":"誘尿「不」用冷水沖洗會陰(應溫水);稱用冷水沖洗會陰為錯誤。","detail":{"background":"產後尿瀦留誘尿:B手握冰塊刺激末梢神經(對)、C依醫囑膀胱上方熱敷(對)、D順時鐘按摩膀胱部位(對)。選項A「使用『冷水』沖洗會陰部」錯誤——誘尿應用「『溫水』沖洗會陰」(溫熱放鬆尿道括約肌、刺激排尿),冷水會使括約肌收縮、不利排尿,故A為錯誤敘述(本題答案)。","options":{"A":"錯誤(本題答案)。誘尿應溫水沖洗會陰,非冷水。","B":"正確。手握冰塊刺激末梢。","C":"正確。膀胱上方熱敷。","D":"正確。順時鐘按摩膀胱。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"109030-N2-19":{"quick":"評估疼痛時間性質部位影響因素=獨立性護理功能。","detail":{"background":"護理師「評估病人疼痛的時間、性質、部位及影響因素」屬「獨立性護理功能」(D正確)——評估是護理師依專業判斷自主執行、不需醫囑。監督性、合作性(與他專業)、依賴性(依醫囑)皆非。故獨立性功能(D)。護理過程:護理目標以病人為主、具體可測量有時限;主觀(症狀,病人主訴)vs客觀(徵象,觀察測量);直接觀察=親自感官(非查病歷);SOAP(S主觀O客觀A評估P計畫)、焦點DARE(D資料A措施R反應E衛教);溝通用開放式探詢、治療性沉默、平視不防衛;誘尿=聽流水聲/溫水會陰沖洗/順時鐘按摩膀胱/手握冰塊(忌冷水/逆時鐘);評值記錄措施後可測量結果。","options":{"A":"監督性非標準分類。","B":"合作性是與他專業協同。","C":"依賴性是依醫囑執行。","D":"正確(本題答案)。評估疼痛是獨立性護理功能。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"109030-N2-20":{"quick":"護理紀錄最精確=「足跟壓瘡4×5 cm²,無紅腫、滲出液」(客觀具體)。","detail":{"background":"護理紀錄應「客觀、具體、可測量」。選項A「足跟壓瘡4×5 cm²,無紅腫、滲出液」最精確(具體大小+客觀描述)(A正確)。B「小便已自解二次」(未量化)、C「腹部傷口存,無疼痛主訴」(籠統)、D「病人不配合翻身」(主觀評斷)皆不夠精確。故A最精確。","options":{"A":"正確(本題答案)。壓瘡大小+無紅腫滲液最精確。","B":"「自解二次」未量化。","C":"「傷口存」籠統。","D":"「不配合」是主觀評斷。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"110030-N2-7":{"quick":"病人症狀(symptoms)資料=「腹部手術部位傷口疼痛」(病人主訴感受)。","detail":{"background":"症狀(symptoms)=病人「主觀」感受到並陳述的(主觀資料)。選項A「腹部手術部位傷口疼痛(病人感受)」是症狀(A正確)。B「空腹血糖180」、C「肺部X光肺泡浸潤」、D「痰結核桿菌陽性」皆是「徵象(signs,客觀檢查測量)」。故症狀為A(疼痛)。","options":{"A":"正確(本題答案)。傷口疼痛(病人感受)是症狀。","B":"血糖值是徵象(客觀)。","C":"X光所見是徵象。","D":"結核試驗陽性是徵象。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"110110-N2-2":{"quick":"只需記錄不需報告=「體溫37.6°C病人經衛教後能多喝水」(輕微、已處理)。","detail":{"background":"「只需記錄、不需報告(醫師)」者=輕微、非異常、已適當處理的情況。選項A「體溫37.6°C(輕微偏高),經衛教後能多喝水(已處理)」只需記錄(A正確)。B「足部潰瘍換藥後周圍明顯泛紅(感染惡化)」、C「姿位性低血壓病人跌倒(意外事件)」、D「躁症病人與他人衝突(安全事件)」皆「需報告」。故只需記錄者為A。","options":{"A":"正確(本題答案)。輕微體溫已處理,只需記錄。","B":"傷口泛紅(感染)需報告。","C":"跌倒(意外事件)需報告。","D":"病人衝突(安全事件)需報告。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"111030-N2-9":{"quick":"紀錄「10:00翻身發現破皮給予換藥」未遵守「準確性」原則。","detail":{"background":"護理紀錄原則:時效性(及時)、準確性(正確、客觀、量化)、扼要性(簡潔)、組織性(有條理)。本題「10:00協助翻身,發現腳跟破皮傷口,給予傷口換藥」——「破皮傷口」未具體描述(大小、深度、滲液),不夠「準確(精確客觀)」,故未遵守「準確性」原則(A正確)。應記錄傷口的客觀具體描述。","options":{"A":"正確(本題答案)。傷口未具體描述,違反準確性。","B":"扼要性是簡潔,非此問題。","C":"時效性是及時記錄。","D":"組織性是有條理。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"111110-N2-10":{"quick":"擦澡同時觀察骨突處壓傷屬「參與性」觀察。","detail":{"background":"觀察種類:B「參與性觀察(participant observation)」=護理師「一邊執行護理活動(擦澡)、一邊觀察(骨突處壓傷)」,參與在情境中觀察(B正確)。旁觀性(不參與、純旁觀)、自省性(反省自己)、被動性皆非。故參與性觀察(B)。","options":{"A":"旁觀性是不參與純旁觀。","B":"正確(本題答案)。擦澡同時觀察=參與性觀察。","C":"自省性是反省自己。","D":"被動性非此情境。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"113100-N2-9":{"quick":"客觀資料=「病人肌力檢查:右側下肢肌肉力量3分」(測量結果)。","detail":{"background":"客觀資料(objective)=護理師「檢查/測量」的結果。選項B「病人肌力檢查:右側下肢肌肉力量3分」是測量結果(B正確)。A「主訴肚子痛持續5分鐘」(主觀)、C「抱怨夜裡醒來3次」(主觀)、D「母親說傷口滲出血水」(家屬陳述、主觀)皆非客觀。故客觀資料為B。","options":{"A":"主訴肚子痛是主觀。","B":"正確(本題答案)。肌力檢查3分是客觀測量。","C":"抱怨醒來是主觀。","D":"母親陳述是主觀。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"113180-N2-9":{"quick":"疼痛評估:請病人說出當下疼痛感受所代表的分數等級。","detail":{"background":"以數字等級量表(NRS,0~10分)評估意識清楚病人的疼痛:C「請病人『自己說出』當下疼痛感受所代表的分數等級」正確(疼痛是主觀,由病人自評)。A「記錄腹痛頭痛的平均值」錯(應分別記錄);B「極度疼痛0分、不痛10分」錯(顛倒,應0=不痛、10=極痛);D「皺眉按住傷口是『主觀』資料」錯(那是觀察到的『客觀』資料)。故C正確。","options":{"A":"應分別記錄,非平均值。","B":"數字量表0=不痛、10=極痛,B顛倒。","C":"正確(本題答案)。請病人自評疼痛分數。","D":"皺眉按傷口是客觀資料,非主觀。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"103100-N2-43":{"quick":"辛氏臥式目的=協助意識不清/吞嚥困難病人引流口鼻分泌物。","detail":{"background":"辛氏臥式(Sim’s position,半俯臥/3/4俯臥)的目的是「協助意識不清或吞嚥困難病人引流口鼻分泌物(防吸入)」(C正確)。A會陰沖洗導尿便盆是「屈膝仰臥」;B肛門直腸檢查手術是「膝胸臥/截石位」;D下腔血液回流預防休克是「垂頭仰臥」。故辛氏臥式利分泌物引流(C)。","options":{"A":"會陰沖洗導尿是屈膝仰臥。","B":"肛門檢查是膝胸臥/截石位。","C":"正確(本題答案)。辛氏臥式利意識不清者分泌物引流。","D":"預防休克是垂頭仰臥。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"105030-N2-29":{"quick":"右腳踝扭傷腫脹:1~2天內先冷敷,1~2天後再熱敷→「14」。","detail":{"background":"腳踝扭傷腫脹護理指導:急性期(扭傷「1~2天(48小時)內」)先「冷敷(消腫止血止痛)」,「1~2天(48小時)後」再「熱敷(促進血循、散瘀、加速修復)」。選項2「先冷敷後熱敷」描述正確,本題答案組合為「14」(含正確的冷後熱、抬高患肢等)。核心:扭傷48小時內冰敷、48小時後熱敷、抬高患肢、RICE原則。","options":{"A":"13組合不符。","B":"正確(本題答案,14)。1~2天內冷敷、之後熱敷。","C":"23組合不符。","D":"24組合不符。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"106111-N2-4":{"quick":"床上沐浴換床單預防背部受傷=採取滑動方式移動病人。","detail":{"background":"床上沐浴並更換床單預防護理師背部受傷:D「可採取『滑動』方式來移動臥床的病人」正確(滑動省力、減少抬舉、保護下背)。A「縮小底面積」錯(應『擴大』底面積增穩定);B「至病床對側執行」錯(應在『同側(近側)』、靠近病人省力);C「運用肩部力量」錯(應用『大肌肉群(腿臀)』非肩部)。故D正確。","options":{"A":"應擴大底面積,非縮小。","B":"應在近側執行,非對側。","C":"應用大肌肉群,非肩部力量。","D":"正確(本題答案)。採滑動方式移動病人省力。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"107110-N2-30":{"quick":"會陰沖洗:沖洗壺嘴應朝向「會陰(床尾)」非床頭;稱壺嘴朝床頭為錯誤。","detail":{"background":"會陰沖洗:A沖洗前取得病人同意(對);B採屈膝仰臥式(對);C沖洗水溫約41°C(對)。選項D「沖洗壺嘴應朝向『床頭』」錯誤——沖洗壺嘴應朝向「會陰部(床尾方向)」,順著由上(恥骨)往下(肛門)沖洗,壺嘴朝床頭方向不對,故D為錯誤敘述(本題答案)。","options":{"A":"正確。沖洗前取得同意。","B":"正確。採屈膝仰臥式。","C":"正確。水溫約41°C。","D":"錯誤(本題答案)。沖洗壺嘴應朝會陰,非床頭。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"111030-N2-23":{"quick":"靜脈不明顯不易穿刺:給予該手臂局部濕熱敷以擴張血管。","detail":{"background":"手臂靜脈不明顯不易穿刺,擴張血管的措施:B「給予欲穿刺手臂部位局部『濕熱敷』」正確(熱使血管擴張、易穿刺)。A「用力拍打促抗組織胺」錯(輕拍即可、非用力);C「抬高欲穿刺部位高於心臟」錯(應『下垂』肢體使血管充盈,非抬高);D「不要緊張深呼吸放鬆手掌」錯(應『握拳』使血管浮現,非放鬆)。故B濕熱敷(B)。","options":{"A":"輕拍即可,非用力拍打。","B":"正確(本題答案)。局部濕熱敷擴張血管。","C":"應下垂肢體使血管充盈,非抬高。","D":"應握拳使血管浮現,非放鬆。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"111110-N2-23":{"quick":"注射部位冰冷腫脹壓痛(浸潤):停止輸注(1)、局部濕熱敷(2)、重新更換注射部位(4)→「124」。","detail":{"background":"注射部位「冰冷、腫脹、壓痛、輸注變慢」=「浸潤(infiltration,藥液漏皮下)」,處理:1停止輸注、2局部濕熱敷(促進吸收消腫)、4重新更換注射部位。選項3「給予解熱藥物」與浸潤無關;5...。故為「124」。用熱:血管擴張、增血流氧量、降血液黏稠度、促代謝→促循環散瘀、鬆肌肉、止痛、促癒合。乾熱(熱水袋50°C/烤燈輻射,意識不清老人嬰幼兒降溫防燙傷)、濕熱(坐浴/石蠟浴/溫水浸泡,穿透強更易燙傷,溫度40~46°C);禁急性發炎/出血/腫瘤/不明腹痛/孕婦腹部。坐浴40~43°C、15~20分,頭暈使頭低於心臟。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留。","options":{"A":"含3(解熱藥)不符。","B":"正確(本題答案,124)。停止輸注、濕熱敷、重新更換部位。","C":"含3不符。","D":"含3、5不符。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}},"113180-N2-27":{"quick":"子宮切除術後束腹帶「不」是為減少傷口引流物排出(是支托/促排氣/防咳嗽疼痛);稱減少引流為非目的。","detail":{"background":"子宮切除術後使用束腹帶的目的:A促進排氣(對,適度加壓)、B支托腹部(對)、C預防咳嗽引起疼痛(對,支托減震)。選項D「減少傷口引流物排出」「不」是束腹帶的目的(本題答案)——束腹帶是支托固定、促排氣,引流應保持通暢,不應減少引流物排出。故不是目的者為減少引流物排出(D)。","options":{"A":"是目的。促進排氣。","B":"是目的。支托腹部。","C":"是目的。預防咳嗽疼痛。","D":"正確(本題答案)。減少傷口引流物排出非束腹帶目的。"},"sources":["新文京《基本護理學》護理過程與紀錄","華杏《最新基本護理學》紀錄評值與溝通"]}}},TO=["1冷熱療法原理與散熱", "2用冷療法", "3用熱療法與坐浴", "4傷口換藥消毒與無菌", "5繃帶包紮三角巾與束帶", "6壓力性損傷(壓瘡)", "7身體清潔與口腔護理", "8護理紀錄評值溝通與綜合"],LEC={"1冷熱療法原理與散熱":{"html":"\n<p><b>散熱原理:</b><b>傳導</b>(直接接觸傳熱:冰枕、冰敷、睡涼蓆)、<b>輻射</b>(不需介質、室溫下散熱最多約60%:增減被蓋)、<b>對流</b>(空氣/液體流動帶熱:吹電扇、調空調)、<b>蒸發</b>(液體變氣體:流汗、溫水拭浴)。</p>\n<p><b>體溫調節:</b>下視丘以<b>負回饋</b>維持恆定、對<b>核心溫度</b>較敏感;血管收縮=產熱、汗腺分泌=散熱;冷接受器較多,對冷較敏感;極冷極熱引發脊髓反射保護。</p>\n<p><b>特殊現象:</b><b>反彈現象</b>=超過最大治療效應時間後產生『相反』反應(冷敷過久反而發紅);<b>交感性反應</b>=一側冷熱致對側同樣反應;<b>適應</b>=接受器久了敏感度降低。<b>冷熱共同作用</b>=減緩疼痛、減緩充血腫脹。面積愈大耐受力愈低。</p>\n"},"2用冷療法":{"html":"\n<p><b>生理反應:</b>血管收縮、降微血管通透性、降白血球數量活性、降代謝、降神經傳導、血液黏稠度增加、血壓上升 → <b>止血、消腫、止痛、抑制炎症</b>。</p>\n<p><b>適用:</b>扭傷初期(48小時內)、靜脈炎/血栓性靜脈炎、流鼻血(<b>前額</b>冰敷)、甲狀腺術後(冰領傳導止血)、急性發炎。<b>禁忌:</b>開放性傷口、循環不良、頭部外傷(冷使腦血循減少)。</p>\n<p><b>注意:</b>每次<b>20~30分鐘</b>(超時致反彈現象/凍傷);冰敷<b>須布類包裹、不直接接觸皮膚</b>;冰枕排出空氣以利傳導;組織受損徵象=蒼白青紫麻木疼痛(出汗非冷療徵象)。靜脈炎/浸潤:停止注射、更換部位、給濕冷敷(不可按摩)。</p>\n"},"3用熱療法與坐浴":{"html":"\n<p><b>生理反應:</b>血管擴張、增血流與組織氧量、<b>降血液黏稠度</b>、增微血管通透性、促代謝 → 促進循環、散瘀、鬆弛肌肉、止痛、促癒合。</p>\n<p><b>乾熱</b>(熱水袋約50°C、烤燈輻射熱)：意識不清/老人/嬰幼兒須降溫防燙傷(如熱水袋40.5~46°C)；<b>烤燈</b>用於植皮供皮區、嬰兒紅臀(輻射、乾燥、15~20分、25W距14~18吋)。<b>濕熱</b>(坐浴/石蠟浴/溫水浸泡)：穿透強、更易燙傷、溫度較低(40~46°C)。</p>\n<p><b>禁忌:</b>急性發炎、出血、惡性腫瘤(促轉移)、不明腹痛、孕婦腹部、頭部外傷(顱內壓升)。<b>溫水坐浴</b>40~43°C、15~20分鐘、促會陰循環助癒合、鬆弛括約肌誘尿;頭暈(姿位性低血壓)使<b>頭部低於心臟</b>。溫水拭浴27~37°C輕拍、腋下手心腹股溝多停留、頭置冰枕。</p>\n"},"4傷口換藥消毒與無菌":{"html":"\n<p><b>無菌技術:</b>打開無菌包布<b>先開遠側端</b>、鑷子握<b>上1/3</b>(下2/3無菌)、敷料於換藥碗上方<b>15公分</b>放下、過程<b>勿說話</b>(防飛沫污染)。<b>傷口培養前不清洗</b>(消毒會殺菌致偽陰性)、直接取深部分泌物。</p>\n<p><b>清洗劑:</b>新鮮血漬用<b>冷水</b>(熱水使血凝固)；陳舊血漬、氣管內管痰漬痂皮用<b>雙氧水</b>。</p>\n<p><b>消毒劑:</b><b>75%酒精</b>殺菌最佳(95%反差)；優碘<b>不能殺芽孢</b>；來紓(Lysol,酚類)用於環境地板；Chlorhexidine不可與食鹽水混。沾血敷料=<b>感染性可燃</b>廢棄物；開封生理食鹽水<b>24小時內</b>更換。</p>\n"},"5繃帶包紮三角巾與束帶":{"html":"\n<p><b>包紮原則:</b><b>抬高肢體</b>、<b>由遠心端往近心端</b>(順靜脈回流)、先以<b>環形包紮定帶</b>、每圈覆蓋前一圈<b>1/2~2/3</b>、<b>露出末梢</b>觀察血循、<b>結帶於肢體外側</b>(非傷口/關節/受壓處)、骨突處墊棉墊。</p>\n<p><b>過緊徵象:</b>末梢脈搏變弱、發紺、蒼白、冰冷、麻木刺痛 → 立即重新包紮。</p>\n<p><b>包紮法:</b><b>8字形</b>(關節/手腕踝)、<b>回反摺形</b>(殘肢末端)、<b>急螺旋</b>(固定夾板)、螺旋形(均勻肢體)、彈性繃帶(加壓止血消腫、截肢殘肢)。<b>三角巾懸臂帶</b>:肘約90度、<b>手腕高於肘10~12公分</b>、結帶於頸側、手指外露。<b>束腹帶</b>=支托固定、促排氣、防咳嗽痛(非減少引流)。</p>\n"},"6壓力性損傷(壓瘡)":{"html":"\n<p><b>分期(傳統四期):</b>一<b>充血期</b>(發紅、壓之褪色、解壓後消退)、二<b>缺血期</b>(持續發紅、壓之<b>不褪色</b>、解壓後<b>不消退</b>、水泡破皮)、三<b>壞死期</b>(全層皮膚壞死)、四<b>潰瘍期</b>(深及肌肉骨骼)。</p>\n<p><b>好發部位:</b>仰臥=枕骨、肩胛、薦骨、足跟、肘;側臥=耳、肩峰、髖骨側、外踝;坐姿=坐骨結節。</p>\n<p><b>預防:</b>每<b>2小時翻身</b>、移動時抬高減<b>剪力</b>、<b>溫和清潔勿用肥皂</b>(鹼性傷皮膚)、補充<b>蛋白質與維生素C</b>、用氣墊床;<b>勿用氣圈</b>(致周圍受壓)、<b>發紅處不可按摩</b>(加重損傷)。<b>Braden量表</b>:感覺、潮濕、活動、移動、營養、摩擦剪力(不含年齡)。</p>\n"},"7身體清潔與口腔護理":{"html":"\n<p><b>床上沐浴:</b>水溫約43~46°C、擦拭四肢<b>由遠心往近心</b>(促回流)、沐浴後用乳液保濕、勿用50%酒精/肥皂(使皮膚乾燥);骨轉移病人<b>禁叩擊</b>。</p>\n<p><b>更衣:</b>脫衣<b>先脫健側</b>、穿衣<b>先穿患側</b>(有點滴/受傷側)。</p>\n<p><b>會陰沖洗:</b>屈膝仰臥、水溫41~43°C、棉棒由上往下<b>單向</b>(一棒一次)、先中間(尿道口)再左右、最後肛門;沖洗壺嘴朝會陰(床尾)。<b>眼睛由內眥往外眥</b>。</p>\n<p><b>背部按摩:</b>開始結束用<b>按撫法</b>、骨突處<b>重擦法</b>、大肌肉<b>揉捏法</b>;<b>老人禁敲擊法</b>。<b>假牙</b>:不泡熱水(變形)、橡膠牙托泡水、置入前先濕潤、夜間取下。<b>口腔潰瘍</b>用生理食鹽水/Xylocaine止痛(忌雙氧水、優碘、檸檬刺激);手指甲修弧形、腳趾甲平剪(防嵌甲)。</p>\n"},"8護理紀錄評值溝通與綜合":{"html":"\n<p><b>護理目標:</b>以病人為主詞、具體、<b>可測量</b>、有時限(如「壓瘡二週後縮小至3×2×1公分」「能說出三種富鐵食物」);籠統的「已改善」不可測量。</p>\n<p><b>資料:</b><b>主觀(症狀)</b>=病人/家屬主訴感受;<b>客觀(徵象)</b>=護理師觀察測量(壓瘡大小、肌力、引流液顏色);<b>直接觀察</b>=親自感官評估(查病歷是間接);第一手=病人本人。</p>\n<p><b>記錄格式:</b>SOAP(S主觀/O客觀/A評估/P計畫)、焦點DARE/DART(D資料/A措施/R反應/E衛教);原則=時效、準確(具體量化)、扼要、組織。</p>\n<p><b>溝通:</b><b>開放式探詢</b>(「能告訴我當時情況嗎?」)、<b>治療性沉默</b>、平視不防衛。<b>誘尿:</b>聽流水聲、溫水會陰沖洗/坐浴、<b>順時鐘</b>按摩膀胱、手握冰塊(忌冷水沖會陰、逆時鐘)。評估壓力聚焦病人本身;壓力時腎上腺素分泌增加。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_b8_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
