:"十二指腸閉鎖:胚胎早期腸腔被上皮增生填實後應「空泡化再管腔化(recanalization)」,此過程失敗→閉鎖;常合併唐氏症與環狀胰臟,典型「雙氣泡徵(double bubble)」、膽汁性嘔吐。空腸迴腸閉鎖則多為「血管意外(缺血)」機制。","options":{"A":"血管缺血為空迴腸閉鎖機制。","B":"★正確(本題答案):再管腔化(空泡化)失敗。","C":"染色體異常為合併非主因。","D":"非產前創傷。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"104030-49":{"quick":"錯在 C:遠端食道「不宜」剝離過長(會傷其血供);上端盲袋可較長剝離以利吻合。","detail":{"background":"食道閉鎖(EA)/氣管食道瘻管(TEF):最常見型為「EA 併遠端 TEF(C 型,~85%)」(X 光腹部「有」腸氣;胃管打轉於上盲袋)。「EA 無 TEF」者腹部「無腸氣」。常合併 VACTERL(Vertebral 脊柱、Anal 肛門直腸、Cardiac 心臟、TE 食道、Renal 腎、Limb 橈骨/肢體);不含小腸閉鎖。臨床:大量唾液泡沫、餵食嗆咳發紺、吸入性肺炎。手術經胸腔外(extrapleural)結紮瘻管+食道吻合;遠端食道剝離過長會傷血供。","options":{"A":"正確:瘻管在氣管食道交界處結紮。","B":"正確:上端食道可剝離較長。","C":"★錯誤(本題答案):遠端食道過度剝離會傷血供。","D":"正確:多經胸腔外手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"104030-73":{"quick":"錯在 A:腸套疊多發生在「2 歲以下嬰幼兒」,非 10 歲以上。","detail":{"background":"腸套疊(intussusception):好發 6 個月–2 歲嬰幼兒、多原因不明(淋巴增生/病毒後),以「迴-結腸型」最常見。三聯徵:間歇性陣發哭鬧/腹痛、嘔吐、「果醬樣黏液血便」,右腹可摸到「香腸狀腫塊」。診斷首選「腹部超音波(靶心/甜甜圈徵)」;治療以「空氣或鋇劑/超音波導引灌腸復位」,失敗或腹膜炎/穿孔則手術。成人腸套疊常有腫瘤等導引點,多需手術。","options":{"A":"★錯誤(本題答案):好發 2 歲以下,非 10 歲以上。","B":"正確:嬰幼兒多原因不明。","C":"正確:以迴-結腸套最常見。","D":"正確:成人腸套疊常合併結腸腫瘤。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"104090-46":{"quick":"新生兒呼吸窘迫+CXR(疑橫膈疝),錯在 C:應避免「面罩正壓通氣」(會把氣灌入胸腔內腸道加重壓迫);應插管。","detail":{"background":"先天性橫膈疝氣(CDH):腹腔臟器疝入胸腔→肺發育不全與肺高壓;CXR 見胸腔內腸氣、縱膈移位。處置:立即「氣管插管」(避免面罩/袋瓣正壓通氣灌氣入腸道加重壓迫)、放胃管減壓、動靜脈導管監測,穩定肺高壓後再手術修補。","options":{"A":"正確:氣管內插管。","B":"正確:放胃管減壓。","C":"★錯誤(本題答案):避免面罩正壓通氣。","D":"正確:動靜脈導管監測。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"105020-8":{"quick":"Hirschsprung 診斷黃金標準為 C:直腸切片(無神經節細胞)。","detail":{"background":"巨結腸症(Hirschsprung disease):遠端腸壁「神經節細胞缺如(aganglionosis)」,自肛門往近端連續、出現「移行區(transition zone)」狹窄→近端擴張。表現:新生兒>48 小時未解胎便、腹脹、便秘;鋇劑灌腸見移行區、肛門直腸測壓無鬆弛反射;「直腸切片(無神經節細胞)為診斷黃金標準」。治療為切除無神經節腸段、拉下吻合(Soave/Swenson/Duhamel)。","options":{"A":"未解胎便為臨床線索非黃金標準。","B":"肛門測壓為輔助。","C":"★正確(本題答案):直腸切片(無神經節細胞)。","D":"鋇劑灌腸顯示移行區但非黃金標準。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"105020-47":{"quick":"最常見食道閉鎖型為 C:EA 併遠端 TEF(C 型,~85%)。","detail":{"background":"食道閉鎖(EA)/氣管食道瘻管(TEF):最常見型為「EA 併遠端 TEF(C 型,~85%)」(X 光腹部「有」腸氣;胃管打轉於上盲袋)。「EA 無 TEF」者腹部「無腸氣」。常合併 VACTERL(Vertebral 脊柱、Anal 肛門直腸、Cardiac 心臟、TE 食道、Renal 腎、Limb 橈骨/肢體);不含小腸閉鎖。臨床:大量唾液泡沫、餵食嗆咳發紺、吸入性肺炎。手術經胸腔外(extrapleural)結紮瘻管+食道吻合;遠端食道剝離過長會傷血供。","options":{"A":"EA 無瘻管約 8%。","B":"EA 併近端瘻管罕見。","C":"★正確(本題答案):EA 併遠端 TEF(~85%)。","D":"雙瘻管罕見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"105100-50":{"quick":"10 個月、嘔吐+陣哭+右下腹腫塊→C:腸套疊。","detail":{"background":"腸套疊(intussusception):好發 6 個月–2 歲嬰幼兒、多原因不明(淋巴增生/病毒後),以「迴-結腸型」最常見。三聯徵:間歇性陣發哭鬧/腹痛、嘔吐、「果醬樣黏液血便」,右腹可摸到「香腸狀腫塊」。診斷首選「腹部超音波(靶心/甜甜圈徵)」;治療以「空氣或鋇劑/超音波導引灌腸復位」,失敗或腹膜炎/穿孔則手術。成人腸套疊常有腫瘤等導引點,多需手術。","options":{"A":"闌尾炎罕見於嬰兒。","B":"腸旋轉不良為膽汁性嘔吐。","C":"★正確(本題答案):腸套疊。","D":"糞便阻塞無陣發哭鬧腫塊。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"105100-51":{"quick":"正確為 B(僅13):早產兒發生率高(1)、手術以疝囊高位結紮為主(3);多為間接型(2 錯)、診斷即手術不需等滿一歲(4 錯)。","detail":{"background":"兒童腹股溝疝氣:幾乎都是「間接型」(鞘狀突未閉);早產兒發生率較高、雙側機率高;手術為「疝囊高位結紮(high ligation)」、不需補網膜;一旦診斷即應手術(有嵌頓風險),不需等滿一歲。","options":{"A":"24:含 2(直接型,錯)、4(等滿一歲,錯)。","B":"★正確(本題答案):僅 1、3。","C":"134:含 4,錯。","D":"123:含 2,錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"106080-37":{"quick":"非 EA 合併畸型者為 C:小腸閉鎖(不屬 VACTERL)。","detail":{"background":"食道閉鎖(EA)/氣管食道瘻管(TEF):最常見型為「EA 併遠端 TEF(C 型,~85%)」(X 光腹部「有」腸氣;胃管打轉於上盲袋)。「EA 無 TEF」者腹部「無腸氣」。常合併 VACTERL(Vertebral 脊柱、Anal 肛門直腸、Cardiac 心臟、TE 食道、Renal 腎、Limb 橈骨/肢體);不含小腸閉鎖。臨床:大量唾液泡沫、餵食嗆咳發紺、吸入性肺炎。手術經胸腔外(extrapleural)結紮瘻管+食道吻合;遠端食道剝離過長會傷血供。","options":{"A":"屬 VACTERL:肛門直腸異常。","B":"屬 VACTERL:腎與橈骨(肢體)異常。","C":"★錯誤(本題答案):小腸閉鎖非 VACTERL。","D":"屬 VACTERL:脊柱缺損。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"106080-38":{"quick":"幽門狹窄表現為 C(234):超音波幽門肌增厚(2)、嘔吐胃內容物非膽汁(3)、低血氯鹼中毒(4);雙氣泡徵(1)為十二指腸閉鎖,錯。","detail":{"background":"嬰兒肥厚性幽門狹窄(HPS):約出生 3–6 週「噴射狀(非膽汁性)嘔吐」、右上腹「橄欖狀」硬塊;低血氯低血鉀代謝性鹼中毒;超音波見幽門肌增厚/延長(string/target),上消化道攝影見細線徵。「非外科急症」,先矯正脫水與電解質鹼中毒,再行「幽門肌肉切開術(pyloromyotomy,Ramstedt)」(非幽門成形)。雙氣泡徵是「十二指腸閉鎖」。","options":{"A":"134:含 1(雙氣泡=十二指腸閉鎖,錯)。","B":"124:含 1,錯。","C":"★正確(本題答案):2、3、4。","D":"僅13:含 1,錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"106080-54":{"quick":"5 天嬰、腹脹+延遲胎便+鋇劑移行區→C:巨結腸症。","detail":{"background":"巨結腸症(Hirschsprung disease):遠端腸壁「神經節細胞缺如(aganglionosis)」,自肛門往近端連續、出現「移行區(transition zone)」狹窄→近端擴張。表現:新生兒>48 小時未解胎便、腹脹、便秘;鋇劑灌腸見移行區、肛門直腸測壓無鬆弛反射;「直腸切片(無神經節細胞)為診斷黃金標準」。治療為切除無神經節腸段、拉下吻合(Soave/Swenson/Duhamel)。","options":{"A":"胎便栓塞為暫時性。","B":"細小左結腸症與母糖尿病相關。","C":"★正確(本題答案):Hirschsprung。","D":"直腸閉鎖無移行區。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"107020-28":{"quick":"TEF 臨床表現較不常見者為 B:呼吸喘鳴(stridor)。","detail":{"background":"食道閉鎖(EA)/氣管食道瘻管(TEF):最常見型為「EA 併遠端 TEF(C 型,~85%)」(X 光腹部「有」腸氣;胃管打轉於上盲袋)。「EA 無 TEF」者腹部「無腸氣」。常合併 VACTERL(Vertebral 脊柱、Anal 肛門直腸、Cardiac 心臟、TE 食道、Renal 腎、Limb 橈骨/肢體);不含小腸閉鎖。臨床:大量唾液泡沫、餵食嗆咳發紺、吸入性肺炎。手術經胸腔外(extrapleural)結紮瘻管+食道吻合;遠端食道剝離過長會傷血供。","options":{"A":"常見:大量氣管/口腔分泌物。","B":"★較不常見(本題答案):stridor。","C":"常見:遠端 TEF 致胃脹氣。","D":"常見:吸入性肺炎/呼吸道感染。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"107020-46":{"quick":"排便預後較佳者為 C:無肛症併直腸「會陰瘻(perineal fistula,低位)」。","detail":{"background":"先天性肛門直腸異常(無肛症):依瘻管高低分型。「低位(會陰瘻 perineal fistula)」可直接會陰肛門成形、預後(控便)較佳;「高位(直腸尿道/膀胱頸瘻、泄殖腔畸形)」常先做大腸造口、分期手術,預後較差。常合併 VACTERL;男性高位最常合併直腸尿道瘻。","options":{"A":"直腸尿道瘻為高位,預後較差。","B":"直腸陰道瘻預後較差。","C":"★正確(本題答案):會陰瘻(低位)預後最佳。","D":"泄殖腔畸形預後最差。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"107020-47":{"quick":"EA 腹部無腸氣→C:食道閉鎖「無」合併氣管食道瘻管(無遠端瘻管則無空氣入胃腸)。","detail":{"background":"食道閉鎖(EA)/氣管食道瘻管(TEF):最常見型為「EA 併遠端 TEF(C 型,~85%)」(X 光腹部「有」腸氣;胃管打轉於上盲袋)。「EA 無 TEF」者腹部「無腸氣」。常合併 VACTERL(Vertebral 脊柱、Anal 肛門直腸、Cardiac 心臟、TE 食道、Renal 腎、Limb 橈骨/肢體);不含小腸閉鎖。臨床:大量唾液泡沫、餵食嗆咳發紺、吸入性肺炎。手術經胸腔外(extrapleural)結紮瘻管+食道吻合;遠端食道剝離過長會傷血供。","options":{"A":"遠端 TEF 會有腸氣。","B":"近端瘻管罕見、腹部仍無氣。","C":"★正確(本題答案):EA 無 TEF(腹部無腸氣)。","D":"雙瘻管會有腸氣。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"107080-44":{"quick":"薦尾椎畸胎瘤,錯在 D:手術應「切除尾骨」(coccygectomy)以防復發,非「保留尾骨」。","detail":{"background":"薦尾椎畸胎瘤(sacrococcygeal teratoma):新生兒最常見生殖細胞腫瘤,女嬰多;巨大腫瘤可致高輸出心衰竭/盜血(vascular steal);術前 CT/MRI 評估骨盆內延伸。手術完全切除腫瘤「並切除尾骨」(殘留尾骨會復發),避免傷及肛門直腸與括約肌。","options":{"A":"正確:最可能為薦尾椎畸胎瘤。","B":"正確:留意腫瘤盜血致心衰竭。","C":"正確:CT/MRI 評估骨盆內延伸。","D":"★錯誤(本題答案):須切除尾骨,非保留。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"108030-44":{"quick":"正確為 D(僅123):低位直接肛門成形(1)、高位先造口分期(2)、合併 VACTERL(3);高位男性最常合併「直腸尿道瘻」非膀胱瘻(4 表述不精確)。","detail":{"background":"先天性肛門直腸異常(無肛症):依瘻管高低分型。「低位(會陰瘻 perineal fistula)」可直接會陰肛門成形、預後(控便)較佳;「高位(直腸尿道/膀胱頸瘻、泄殖腔畸形)」常先做大腸造口、分期手術,預後較差。常合併 VACTERL;男性高位最常合併直腸尿道瘻。","options":{"A":"12345:含 4(高位最常合併膀胱瘻,表述不精確)。","B":"僅1245:含 4。","C":"僅1345:含 4。","D":"★正確(本題答案):僅 1、2、3。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"108030-49":{"quick":"最正確為 A:幽門狹窄可由右上腹橄欖狀硬塊、超音波或上消化道攝影診斷。","detail":{"background":"嬰兒肥厚性幽門狹窄(HPS):約出生 3–6 週「噴射狀(非膽汁性)嘔吐」、右上腹「橄欖狀」硬塊;低血氯低血鉀代謝性鹼中毒;超音波見幽門肌增厚/延長(string/target),上消化道攝影見細線徵。「非外科急症」,先矯正脫水與電解質鹼中毒,再行「幽門肌肉切開術(pyloromyotomy,Ramstedt)」(非幽門成形)。雙氣泡徵是「十二指腸閉鎖」。","options":{"A":"★正確(本題答案):橄欖狀硬塊/超音波/UGI 診斷。","B":"錯:雙氣泡徵為十二指腸閉鎖。","C":"錯:非外科急症,先矯正脫水鹼中毒。","D":"錯:治療為幽門肌切開術,非幽門成形。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"108030-74":{"quick":"錯在 A:先天性 TEF 最常見為「EA 併遠端 TEF(C 型)」,非「H 型」。","detail":{"background":"食道閉鎖(EA)/氣管食道瘻管(TEF):最常見型為「EA 併遠端 TEF(C 型,~85%)」(X 光腹部「有」腸氣;胃管打轉於上盲袋)。「EA 無 TEF」者腹部「無腸氣」。常合併 VACTERL(Vertebral 脊柱、Anal 肛門直腸、Cardiac 心臟、TE 食道、Renal 腎、Limb 橈骨/肢體);不含小腸閉鎖。臨床:大量唾液泡沫、餵食嗆咳發紺、吸入性肺炎。手術經胸腔外(extrapleural)結紮瘻管+食道吻合;遠端食道剝離過長會傷血供。","options":{"A":"★錯誤(本題答案):最常見為遠端 TEF(C 型),非 H 型。","B":"正確:X 光可區別有無 EA。","C":"正確:胃管於閉鎖盲袋打轉證實。","D":"正確:常合併吸入性肺炎與其他畸型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"108080-39":{"quick":"無肛症女嬰+發紺+泡沫狀唾液→C:合併食道閉鎖(VACTERL)。","detail":{"background":"食道閉鎖(EA)/氣管食道瘻管(TEF):最常見型為「EA 併遠端 TEF(C 型,~85%)」(X 光腹部「有」腸氣;胃管打轉於上盲袋)。「EA 無 TEF」者腹部「無腸氣」。常合併 VACTERL(Vertebral 脊柱、Anal 肛門直腸、Cardiac 心臟、TE 食道、Renal 腎、Limb 橈骨/肢體);不含小腸閉鎖。臨床:大量唾液泡沫、餵食嗆咳發紺、吸入性肺炎。手術經胸腔外(extrapleural)結紮瘻管+食道吻合;遠端食道剝離過長會傷血供。","options":{"A":"十二指腸閉鎖無泡沫唾液。","B":"幽門狹窄無此新生兒表現。","C":"★正確(本題答案):食道閉鎖(泡沫唾液、嗆咳發紺)。","D":"橫膈疝以呼吸窘迫為主。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"102030-48":{"quick":"NEC 之下一步最不適當為 A:應「完全禁食(NPO)」腸道休息,而非「餵食量與濃度減半」。","detail":{"background":"壞死性腸炎(NEC):好發早產兒、開始餵食後;腹脹、活力差、血便、腹部 X 光「腸壁積氣(pneumatosis intestinalis)」、門脈積氣。內科處置:禁食(NPO,完全腸道休息)、鼻胃管減壓、廣效抗生素、矯正酸中毒/電解質、X 光追蹤。「手術」僅在「腸穿孔(氣腹)、腸壞死、臨床惡化」時施行,非穩定就立刻開刀。","options":{"A":"★最不適當(本題答案):NEC 應完全禁食,非減半餵食。","B":"適當:放胃管引流減壓。","C":"適當:靜脈抗生素。","D":"適當:腹部 X 光追蹤(找腸壁積氣/氣腹)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"108080-41":{"quick":"Ladd 手術用於 D:腸旋轉異常(malrotation/腸扭轉)。","detail":{"background":"Ladd 手術(治腸旋轉不良/中腸扭結):①逆時針解除腸扭轉;②分離 Ladd 索帶(盲腸/十二指腸間沾黏);③增寬小腸腸繫膜根部以防再扭轉;④闌尾切除(因盲腸移位日後闌尾炎難診斷);不將腸固定於腹壁。","options":{"A":"小腸閉鎖行切除吻合。","B":"十二指腸閉鎖行十二指腸吻合。","C":"巨結腸症行拉下術。","D":"★正確(本題答案):腸旋轉異常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"109020-38":{"quick":"腹部 X 光雙氣泡徵(double bubble)→B:十二指腸閉鎖。","detail":{"background":"雙氣泡徵(double bubble):胃與近端十二指腸同時脹氣,為「十二指腸閉鎖/環狀胰臟」典型,常合併唐氏症;幽門狹窄為單一胃泡(string sign)。","options":{"A":"幽門狹窄為單氣泡。","B":"★正確(本題答案):十二指腸閉鎖。","C":"小腸閉鎖為多個液平。","D":"肛門閉鎖為遠端無氣。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"109020-39":{"quick":"新生兒泡沫唾液+上腹微脹→B:食道閉鎖併遠端氣管食道瘻管。","detail":{"background":"食道閉鎖併遠端 TEF(最常見):大量泡沫狀唾液、餵食嗆咳發紺、胃管無法置入;因遠端瘻管通氣,「上腹會脹氣」。","options":{"A":"十二指腸閉鎖無泡沫唾液。","B":"★正確(本題答案):EA 併遠端 TEF。","C":"中腸扭結為膽汁性嘔吐。","D":"橫膈疝為舟狀腹、呼吸窘迫。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"109020-41":{"quick":"錯在 B:兒童腸套疊「大多不需手術」,以灌腸復位即可。","detail":{"background":"腸套疊好發 3 個月–2 歲、迴-結腸型最常見、多原因不明;果醬便+香腸狀腫塊;超音波診斷;「靜水壓(鋇/水)或空氣灌腸復位對大多數單純病例有效」,僅腹膜炎/穿孔/復位失敗才手術。","options":{"A":"正確:好發 3 個月–2 歲。","B":"★錯誤(本題答案):多數灌腸復位即可,非都需手術。","C":"正確:好發迴盲部。","D":"正確:已腹膜炎則手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"109020-42":{"quick":"錯在 C:NEC「並非所有病患都需手術」;先內科處置,手術限穿孔/壞死/惡化。","detail":{"background":"NEC 處置:禁食、口胃管減壓、廣效抗生素、補液電解質、矯正酸中毒、X 光追蹤;手術僅在腸穿孔(氣腹)、腸壞死、臨床惡化時,並非所有病患都需手術。","options":{"A":"正確:禁食+胃管減壓。","B":"正確:廣效抗生素。","C":"★錯誤(本題答案):非所有 NEC 都需手術。","D":"正確:補水分電解質。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"109020-79":{"quick":"此為短腸症長期 TPN 病人之治療抉擇;錯在 C:「不論如何需繼續治療」不當—應尊重自主、會診精神科評估、共同決策。","detail":{"background":"長期依賴全靜脈營養(TPN)的短腸症病人對治療感疲憊並反覆要求停止時:應評估其心智決定能力(會診精神科)、了解背後原因、與病人「充分討論各治療選項並尊重其自主決定」;「不論如何強制繼續治療」違反病人自主原則。","options":{"A":"尊重意願為自主原則之一(需先評估決定能力)。","B":"恰當:精神科評估心智並探究原因。","C":"★不當(本題答案):不應不論如何強制治療。","D":"恰當:共同決策、尊重選擇。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"109080-44":{"quick":"此為食道閉鎖(胃管無法置入、鋇劑);本題接受答案為 D—並非「必須立即緊急手術」,應先排除其他畸型、穩定後手術(註:A「必定有 TEF」亦不精確,EA 可無 TEF)。","detail":{"background":"EA 患兒第一次餵奶嗆咳發紺、胃管無法置入、鋇劑見上端盲袋;以 Gross C 型(EA+遠端 TEF)最常見。應先評估有無 VACTERL 其他畸型(尤其心臟)並穩定,「半擇期」手術(瘻管結紮+食道吻合),非分秒必爭的緊急刀;EA 也可「無 TEF」(腹部無腸氣),故「必定有 TEF」不精確。","options":{"A":"不精確:EA 未必有 TEF(無 TEF 型腹部無腸氣)。","B":"正確:常合併其他畸型,需檢查各系統。","C":"正確:以 Gross type C 最常見。","D":"★本題答案(視為錯誤):非分秒必爭緊急手術,應先穩定排除畸型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"110080-46":{"quick":"最正確為 C:解除扭轉、分離盲腸/十二指腸沾黏(Ladd 索帶)、增寬腸繫膜根、切除闌尾;「不」將結腸固定於腹壁。","detail":{"background":"Ladd 手術步驟:①逆時針解除中腸扭轉;②分離 Ladd 索帶(盲腸十二指腸間沾黏);③增寬小腸腸繫膜根部;④闌尾切除。刻意「不固定腸道於腹壁」(維持非旋轉位、腸繫膜寬基減少再扭轉)。","options":{"A":"缺「增寬腸繫膜根」。","B":"含「固定結腸於腹壁」,不正確。","C":"★正確(本題答案):分離沾黏+增寬腸繫膜根+闌尾切除。","D":"含「固定結腸於腹壁」,不正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"111020-54":{"quick":"最適當為 D:CDH 出生後應「置放胃管減壓」減少腸胃脹氣對肺的壓迫。","detail":{"background":"先天性橫膈疝氣(CDH):胸腹膜管未閉(約妊娠 8 週),最常見「左後外側 Bochdalek 缺損」;腹腔臟器入胸→患側(及對側)肺發育不全與「肺動脈高壓」。表現:出生呼吸窘迫、舟狀腹、患側腸氣。處置:立即「氣管插管」(避免面罩正壓灌氣入腸)、放胃管減壓、處理肺高壓穩定後「延遲手術」(非立即急診手術)。預後差因子:低體重、早產、合併心臟異常、氣胸、需 ECMO。","options":{"A":"錯:胎兒手術預後未必良好。","B":"錯:非出生 1 天內急修,應先穩定肺高壓。","C":"錯:應避免面罩正壓通氣(灌氣入腸)。","D":"★正確(本題答案):置胃管減壓。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"111020-55":{"quick":"腹裂較常合併 C:小腸閉鎖(腸子裸露受羊水刺激/血供受損→腸壁損傷、閉鎖)。","detail":{"background":"腹裂(gastroschisis):臍旁(多右側)全層腹壁缺損、「無囊膜」、腸子裸露於羊水中;較少合併其他器官/染色體異常,但因裸露腸缺血/壓迫易合併「小腸閉鎖、腸壁增厚發炎」。臍膨出(omphalocele)有囊膜、合併染色體與心臟異常較多。","options":{"A":"先天性心臟病較常見於臍膨出。","B":"染色體異常較常見於臍膨出。","C":"★正確(本題答案):小腸閉鎖。","D":"食道閉鎖非腹裂特別合併。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"111080-45":{"quick":"此無肛症,本題正確為 B(僅②③):腹脹/嘔吐應置胃管(②)、應檢查脊柱異常(③);依會陰所見此非高位(①稱高位不正確)。","detail":{"background":"新生兒無肛症處置:評估瘻管高低(會陰所見);腹脹/嘔吐時置胃管減壓;常合併 VACTERL—須檢查「脊柱(薦椎)、心臟、食道、泌尿生殖」異常。本題依會陰外觀判定型別,若非高位則「稱其為高位」之敘述不正確。","options":{"A":"僅①④:不符。","B":"★正確(本題答案):僅②③。","C":"僅①②③:含①(型別判定)。","D":"僅②③④:含④。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"111080-46":{"quick":"正確為 D:CDH 療程中「肺動脈高壓」是必須預防/積極處置的關鍵問題。","detail":{"background":"先天性橫膈疝氣(CDH):胸腹膜管未閉(約妊娠 8 週),最常見「左後外側 Bochdalek 缺損」;腹腔臟器入胸→患側(及對側)肺發育不全與「肺動脈高壓」。表現:出生呼吸窘迫、舟狀腹、患側腸氣。處置:立即「氣管插管」(避免面罩正壓灌氣入腸)、放胃管減壓、處理肺高壓穩定後「延遲手術」(非立即急診手術)。預後差因子:低體重、早產、合併心臟異常、氣胸、需 ECMO。","options":{"A":"錯:最常見為左「後外側」Bochdalek(非前內)。","B":"錯:可致雙側肺發育不全(非只同側)。","C":"錯:非出生立即修補,應先穩定。","D":"★正確(本題答案):肺動脈高壓為處置關鍵。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"111080-49":{"quick":"CDH 用 ECMO 預後最差者為 B:體重 1.7 公斤(低體重/早產預後差)。","detail":{"background":"先天性橫膈疝氣(CDH):胸腹膜管未閉(約妊娠 8 週),最常見「左後外側 Bochdalek 缺損」;腹腔臟器入胸→患側(及對側)肺發育不全與「肺動脈高壓」。表現:出生呼吸窘迫、舟狀腹、患側腸氣。處置:立即「氣管插管」(避免面罩正壓灌氣入腸)、放胃管減壓、處理肺高壓穩定後「延遲手術」(非立即急診手術)。預後差因子:低體重、早產、合併心臟異常、氣胸、需 ECMO。","options":{"A":"心臟超音波正常為較佳因子。","B":"★正確(本題答案):低體重(1.7 kg)預後差。","C":"36 週接近足月,相對較佳。","D":"氣胸雖不利但低體重更影響整體存活。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"112080-45":{"quick":"與 EA/TEF 預後較無關者為 C:手術矯正時機。","detail":{"background":"食道閉鎖預後預測(如 Spitz 分類)主要看「出生體重」與「有無重大心臟異常」,肺部狀況亦重要;「手術矯正的時機」與長期預後相關性較低(可先穩定再半擇期手術)。","options":{"A":"相關:出生體重。","B":"相關:重大心臟異常。","C":"★較無關(本題答案):手術時機。","D":"相關:肺部狀況。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"112080-49":{"quick":"切除無神經節腸段、有神經節腸段拉下與肛門端對端吻合→本題接受 A/B(拉下手術);此最符 Swenson(端對端)、Soave(經直腸黏膜剝離拉下)。","detail":{"background":"巨結腸症拉下手術(pull-through):Swenson(切除無神經節段、於肛門上方做端對端吻合)、Soave(經直腸黏膜剝離、將正常腸經肌鞘拉下)、Duhamel(將正常腸經直腸後拉下側側吻合)。Sistrunk 是甲狀舌管囊腫手術(無關)。本題答案鍵接受 A、B。","options":{"A":"★(給分)Swenson:端對端吻合。","B":"★(本題答案)Soave:經直腸拉下。","C":"Duhamel 為直腸後側側吻合。","D":"Sistrunk 為甲狀舌管囊腫手術,無關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"113020-49":{"quick":"最適當為 D:靜水壓(鋇/水)復位術對大多數單純腸套疊有效。","detail":{"background":"腸套疊好發 3 個月–2 歲、迴-結腸型最常見、多原因不明;果醬便+香腸狀腫塊;超音波診斷;「靜水壓(鋇/水)或空氣灌腸復位對大多數單純病例有效」,僅腹膜炎/穿孔/復位失敗才手術。","options":{"A":"錯:2 的法則是 Meckel 憩室,非腸套疊。","B":"錯:Tc-99m 掃描用於 Meckel。","C":"錯:最常見先天胃腸畸形非腸套疊。","D":"★正確(本題答案):靜水壓復位對多數單純病例有效。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"113070-45":{"quick":"3 個月嬰、長期便秘+滲便+移行區→疑巨結腸症;較無幫助者為 B:腹部電腦斷層。","detail":{"background":"嬰兒長期便秘+滲便(overflow)+鋇劑灌腸移行區→疑「巨結腸症」。有幫助處置:留置肛管/直腸灌洗減壓、24 小時後追蹤腹部 X 光看鋇劑滯留(支持診斷)、直腸切片(確診)。「腹部電腦斷層」對巨結腸症診斷幫助最小。","options":{"A":"有幫助:肛管/直腸灌洗減壓。","B":"★較無幫助(本題答案):腹部 CT。","C":"有幫助:直腸切片確診。","D":"有幫助:隔日追蹤腹部 X 光看鋇劑滯留。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"114020-44":{"quick":"新生兒術中腸道外觀→C:壞死性腸炎(NEC)。","detail":{"background":"NEC 術中可見腸壁壞死、變色、穿孔、腸壁積氣;好發早產兒餵食後。與胎便性腸阻塞(末端迴腸黏稠胎便、囊性纖維化相關)、胎便性腹膜炎(產前腸穿孔鈣化)、腸扭轉(扭轉缺血)表現不同。","options":{"A":"腸扭轉為扭轉缺血。","B":"胎便性腹膜炎有鈣化。","C":"★正確(本題答案):壞死性腸炎。","D":"胎便性腸阻塞為黏稠胎便阻塞。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"114020-45":{"quick":"NEC 敘述錯在 D:NEC 並非「只發生在早產兒」,足月兒(尤其有先天心病/窒息)亦可發生。","detail":{"background":"NEC:好發迴盲瓣附近末端迴腸、有時侵犯大腸;未必有白血球增多;病況加重常併血小板低下、酸中毒、瀰漫性血管內凝血。雖以早產兒為主,但「不只」發生於早產兒(足月兒有危險因子者亦可)。","options":{"A":"正確:好發末端迴腸,可侵犯大腸。","B":"正確:未必白血球增多。","C":"正確:常併血小板低下。","D":"★錯誤(本題答案):不只發生於早產兒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"114020-48":{"quick":"最不適當為 B:小腸閉鎖第「IIIb 型」為「蘋果皮(apple-peel)/聖誕樹」畸形,非「蘋果樹(apple tree)」。","detail":{"background":"先天性空迴腸閉鎖:多因「胎內腸繫膜血管意外(缺血)」造成;產前超音波羊水可能正常或過多;新生兒可能無法解胎便、膽汁性嘔吐、腹脹。分型(Grosfeld):IIIb 型為「蘋果皮(apple-peel)」畸形—近端閉鎖+遠端小腸環繞單一血管如蘋果皮/聖誕樹,血供差預後較差。","options":{"A":"適當:羊水可能正常。","B":"★最不適當(本題答案):IIIb 為「蘋果皮」非「蘋果樹」。","C":"適當:可能無法解胎便。","D":"適當:與腸繫膜血管發育(缺血)有關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"114020-50":{"quick":"小腸缺陷瘤性息肉+黏膜皮膚色素→B:STK11(LKB1)基因缺損(Peutz-Jeghers)。","detail":{"background":"Peutz-Jeghers 症候群:STK11(LKB1)突變、體染色體顯性,腸道缺陷瘤性息肉+唇/口腔/指端黑色素沈著,增加腸套疊與多種癌症風險。PTEN(Cowden)、APC(FAP)、p53(Li-Fraumeni)為其他症候群。","options":{"A":"PTEN 為 Cowden 症候群。","B":"★正確(本題答案):STK11(Peutz-Jeghers)。","C":"p53 為 Li-Fraumeni。","D":"APC 為 FAP。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"114070-45":{"quick":"錯在 D:一歲以下幼兒鼠蹊環雖窄,但「嵌頓性疝氣風險『較高』」,非較低。","detail":{"background":"兒童先天性鼠蹊疝氣:因「腹膜鞘突(processus vaginalis)未閉」(幾乎都是間接型);男>女、右>左;手術為「高位結紮鞘突」(不需網膜)。嬰幼兒(尤其<1 歲)嵌頓風險「較高」,故診斷即應安排手術,不宜久候。","options":{"A":"正確:鞘突未閉所致。","B":"正確:男>女、右>左。","C":"正確:手術為關閉鞘突(高位結紮)。","D":"★錯誤(本題答案):<1 歲嵌頓風險較高,非較低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"114070-46":{"quick":"CDH 敘述錯在 D:CDH「不」立即緊急手術;應先穩定(處理肺高壓/通氣)再延遲修補。","detail":{"background":"先天性橫膈疝氣(CDH):胸腹膜管未閉(約妊娠 8 週),最常見「左後外側 Bochdalek 缺損」;腹腔臟器入胸→患側(及對側)肺發育不全與「肺動脈高壓」。表現:出生呼吸窘迫、舟狀腹、患側腸氣。處置:立即「氣管插管」(避免面罩正壓灌氣入腸)、放胃管減壓、處理肺高壓穩定後「延遲手術」(非立即急診手術)。預後差因子:低體重、早產、合併心臟異常、氣胸、需 ECMO。","options":{"A":"正確:腸道經橫膈缺損入胸。","B":"正確:胸腹膜管(約 8 週)未閉。","C":"正確:肺動脈高壓常為致死原因。","D":"★錯誤(本題答案):非立即緊急手術,先穩定再修補。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"115020-49":{"quick":"2 歲、反覆無痛性大量暗紅便、疑 Meckel→C:Tc-99m pertechnetate 掃描(偵測異位胃黏膜)。","detail":{"background":"Meckel 憩室出血(小兒下消化道無痛大量出血):異位胃黏膜泌酸致潰瘍。最適檢查為「Tc-99m pertechnetate(Meckel)掃描」偵測異位胃黏膜;腹部 X 光/小腸攝影/立即腹腔鏡切除非首選初步診斷。","options":{"A":"腹部 X 光無法確診。","B":"小腸攝影非首選。","C":"★正確(本題答案):Meckel 掃描。","D":"未定位即立即切除非首選初步。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"115020-50":{"quick":"最適當為 D:兒童疝氣手術併發症含「輸精管與睪丸血管損傷」且術中不易察覺。","detail":{"background":"兒童腹股溝疝氣:幾乎都是「間接型」(鞘突未閉,非哭鬧造成的直接型);治療為「高位結紮」(不放網膜);一旦診斷即手術(嵌頓風險),不必等 3 歲/10 kg。手術併發症含輸精管、睪丸血管損傷(細小、術中不易察覺),需小心。","options":{"A":"錯:為間接型/先天鞘突未閉,非哭鬧致直接型。","B":"錯:兒童不放網膜。","C":"錯:診斷即手術,不需等 3 歲/10 kg。","D":"★正確(本題答案):可能傷輸精管/睪丸血管且不易察覺。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"115020-53":{"quick":"最不恰當為 B:氣道異物最常停留「右側」支氣管(右主支氣管較直),非左側。","detail":{"background":"兒童異物:花生可阻塞氣道致支氣管擴張、油脂引起脂質性肺炎;氣道異物最常卡「右主支氣管」(較垂直、較粗);上食道硬幣可試喉鏡輔助取出;「鈕扣電池」卡食道為急症(電解灼傷黏膜),須儘速取出。","options":{"A":"恰當:花生致支擴/肺炎。","B":"★最不恰當(本題答案):最常停右側支氣管,非左側。","C":"恰當:上食道硬幣可喉鏡輔助取出。","D":"恰當:食道鈕扣電池為急症。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"102110-7":{"quick":"正確為 C:刀刺傷致腸液外流的傷口屬「contaminated(污染)」傷口。","detail":{"background":"手術傷口分類與感染率:Clean(未進空腔臟器,如脂肪瘤/疝氣,感染~1–2%)、Clean-contaminated(進入控制良好的消化/呼吸/泌尿道,如選擇性腸胃道、單純闌尾切除,~3–5%)、Contaminated(顯著溢漏/急性發炎無膿/新鮮外傷如腸液外流,~10%)、Dirty(已感染/穿孔/膿瘍/陳舊外傷,~20–40%)。","options":{"A":"錯:脂肪瘤切除為 clean,感染~1–2%(非 8–15%)。","B":"錯:單純闌尾切除為 clean-contaminated,非 contaminated。","C":"★正確(本題答案):腸液外流為 contaminated。","D":"錯:狗咬一週化膿為 dirty/infected,感染率更高。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"103030-53":{"quick":"錯在 C:微創(腹腔鏡)手術經放大鏡頭「可有清楚視野」,並非無法清楚。","detail":{"background":"微創手術(MIS):放大視野、減少術後疼痛、腸功能恢復快、住院短、傷口小;大型試驗證實對大腸癌腫瘤清除與長期預後與開腹相當(不利於治療之說不成立),普及度逐年提高。","options":{"A":"正確:減痛、腸功能恢復快。","B":"正確:不影響大腸癌治療效果。","C":"★錯誤(本題答案):腹腔鏡有放大清楚視野。","D":"正確:普及度逐年提高。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"105020-6":{"quick":"預防 SSI 應 D:手術超過抗生素 2 倍半衰期時追加一次。","detail":{"background":"預防手術部位感染(SSI):預防抗生素應在「切皮前 60 分內」給予;手術超過抗生素「2 倍半衰期」或大量失血應追加;維持「正常體溫(>36°C)」、血糖<180–200、適當組織氧合與皮膚準備。","options":{"A":"錯:應切皮「前」給抗生素,非切開後。","B":"錯:血糖應控<180–200,非 200–250。","C":"錯:維持正常體溫>36°C,非 35.5–36 偏低。","D":"★正確(本題答案):超過 2 倍半衰期追加抗生素。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"106080-4":{"quick":"錯在 B:鼻胃管灌食抬高床頭「30–45°」即可,非 90° 坐姿。","detail":{"background":"營養支持原則:「腸道有功能就用腸道營養」(維持腸黏膜屏障與腸道免疫、較少感染與導管併發症);鼻胃管灌食時抬高床頭 30–45°(非 90°)、由低速起始、定期測胃殘量以減少吸入;嚴重血流動力學不穩定(休克、升壓劑大量)為腸道營養「禁忌」(腸缺血風險),此時用靜脈營養。","options":{"A":"正確:腸道有功能優先腸道營養。","B":"★錯誤(本題答案):抬床頭 30–45°,非 90°。","C":"正確:低速起始、測胃殘量。","D":"正確:造瘻口可肉芽增生。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"106080-43":{"quick":"術後 48 小時高燒最可能為 C:肺部膨脹不全(atelectasis,術後 1–2 天最常見發燒原因)。","detail":{"background":"術後發燒「5 W」依時序:術後 1–2 天「肺膨脹不全(Wind/atelectasis)」最常見;3–5 天泌尿道感染/靜脈炎、傷口感染;5–7 天吻合口漏/深部膿瘍;肺炎、藥物熱、深部靜脈血栓等。48 小時高燒以肺膨脹不全最可能,鼓勵深呼吸/咳嗽/下床。","options":{"A":"肺炎多稍晚。","B":"吻合口漏多術後 5–7 天。","C":"★正確(本題答案):肺膨脹不全(術後早期)。","D":"傷口感染多 3–5 天後。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"107080-1":{"quick":"錯在 B:放置鼻胃管「會增加」吸入性肺炎風險(妨礙下食道括約肌、增加逆流)。","detail":{"background":"術後吸入性肺炎:年長者風險高(80 歲以上為年輕人 9–10 倍);維持上半身 30–45° 直立、管灌前評估腸胃功能/測胃殘量可降低風險;放置鼻胃管「會增加」吸入風險(削弱 LES),故並非無風險。","options":{"A":"正確:年長者風險顯著上升。","B":"★錯誤(本題答案):NG 管會增加吸入肺炎風險。","C":"正確:30–45° 直立減少吸入。","D":"正確:評估腸胃功能/胃殘量減少吸入。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"107080-8":{"quick":"錯在 B:嚴重血流動力學不穩定者「不適合」腸道營養(腸缺血風險),為禁忌。","detail":{"background":"營養支持原則:「腸道有功能就用腸道營養」(維持腸黏膜屏障與腸道免疫、較少感染與導管併發症);鼻胃管灌食時抬高床頭 30–45°(非 90°)、由低速起始、定期測胃殘量以減少吸入;嚴重血流動力學不穩定(休克、升壓劑大量)為腸道營養「禁忌」(腸缺血風險),此時用靜脈營養。","options":{"A":"正確:多醣在大腸發酵維持菌落。","B":"★錯誤(本題答案):嚴重血流不穩為腸道營養禁忌。","C":"正確:腸道營養維持腸道免疫。","D":"正確:維持腸屏障功能。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"107080-51":{"quick":"錯在 C:腹腔鏡大腸切除「不一定」要關閉腸繫膜缺損(內疝率僅約 1%)。","detail":{"background":"腹腔鏡輔助大腸切除:減少術後疼痛、恢復快;腸繫膜內疝氣率低(約 1%,最常見於迴結腸吻合附近),故「並非一定」要常規關閉腸繫膜缺損(與某些減重/Roux-en-Y 需關閉不同)。","options":{"A":"正確:減少術後疼痛。","B":"正確:內疝率約 1%。","C":"★錯誤(本題答案):不一定要關閉腸繫膜缺損。","D":"正確:最常見於迴結腸附近。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"107080-53":{"quick":"非優點者為 B:腹腔鏡闌尾切除「不會縮短手術時間」(常較開腹略長)。","detail":{"background":"腹腔鏡闌尾切除相較開腹優點:傷口小/感染率低、術後疼痛少、住院短、可探查腹腔找其他病因(尤其女性);但「手術時間」通常不縮短(可能略長)。","options":{"A":"優點:減少住院天數。","B":"★非優點(本題答案):不縮短手術時間。","C":"優點:可探查腹腔其他疾病。","D":"優點:傷口感染率較低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"107080-80":{"quick":"依實證醫學,正確為 A:Level Ib(隨機對照試驗)證據等級高,可據以治療患者。","detail":{"background":"實證醫學(EBM)證據等級:Ia(系統性回顧/統合分析)、Ib(單一隨機對照試驗 RCT)為高等級。臨床決策應整合「最佳現有證據+臨床專業+病人價值」;Level Ib 屬高品質證據,可作為治療依據(仍須考量個別病人適用性)。","options":{"A":"★正確(本題答案):Level Ib 為高證據等級,可據以治療。","B":"過度要求本土證據非 EBM 核心。","C":"已上市療法非都需重新人體試驗。","D":"醫師宜參採最佳證據,非僅守舊常規。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"109080-46":{"quick":"最需預防抗生素者為 C:漏斗胸 Nuss 矯正「置入金屬板(植入物)」→需預防性抗生素。","detail":{"background":"預防性抗生素以「clean-contaminated/植入異物/感染後果嚴重」者最需要。漏斗胸 Nuss 手術置入金屬矯正板(植入物),感染後果嚴重→最需預防抗生素;單純疝氣、睪丸固定、淋巴管瘤切除屬 clean、低風險。","options":{"A":"雙側疝氣為 clean。","B":"睪丸固定為 clean。","C":"★正確(本題答案):Nuss 置入金屬板,最需預防抗生素。","D":"淋巴管瘤切除為 clean。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"110020-42":{"quick":"12 歲 45 kg 闌尾術後維持液→A:2000 mL/日含 5% 葡萄糖、0.45% NaCl、20 mEq/L 鉀。","detail":{"background":"小兒維持輸液(Holliday-Segar):每日 前 10 kg×100 mL/kg + 次 10 kg×50 mL/kg + 之後每 kg×20 mL。如 13.5 kg=1000+(3.5×50)=1175 mL。成人術後維持液常用含葡萄糖之低張電解質液加鉀。","options":{"A":"★正確(本題答案):含葡萄糖之低張電解質維持液+鉀。","B":"林格氏液為等張、缺葡萄糖,非維持液配方。","C":"代用血漿為擴容劑,非維持液。","D":"純生理食鹽水缺葡萄糖與鉀,非理想維持液。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"110020-47":{"quick":"非優點者為 B:腹腔鏡大腸切除「未」降低圍術期大腸切除相關併發症與死亡率(與開腹相當)。","detail":{"background":"年長病人腹腔鏡大腸腫瘤切除優點:傷口小、術後疼痛少、心肺併發症少、恢復快,且腫瘤清除率與開腹相當。但「圍術期大腸切除相關併發症及死亡率」與開腹相當,並未顯著降低。","options":{"A":"優點:減少心肺併發症。","B":"★非優點(本題答案):未降低圍術期併發症/死亡率。","C":"優點:傷口較小。","D":"優點:腫瘤清除率相當。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"110080-44":{"quick":"13.5 kg 幼兒每日維持輸液至少 C:1,175 mL(Holliday-Segar:1000+3.5×50)。","detail":{"background":"小兒維持輸液(Holliday-Segar):每日 前 10 kg×100 mL/kg + 次 10 kg×50 mL/kg + 之後每 kg×20 mL。如 13.5 kg=1000+(3.5×50)=1175 mL。成人術後維持液常用含葡萄糖之低張電解質液加鉀。","options":{"A":"900 過少。","B":"1,050 過少。","C":"★正確(本題答案):1,175 mL。","D":"2,700 過多。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"111020-14":{"quick":"錯在 D:經肛門內視鏡顯微手術(TEMS)用於「肛門距離約 ≤20–25 cm 內」之直腸/乙狀下段腫瘤,>25 cm 超出範圍無法切除。","detail":{"background":"自然孔洞內視鏡手術(NOTES):經口/肛/陰道等自然孔進入,傷口少、疼痛少;心理壓力大、學習曲線長。POEM(經口內視鏡肌肉切開)治 achalasia 創傷小。TEMS(經肛門內視鏡顯微手術)切除「下段直腸」腫瘤,有距離限制(約 ≤20–25 cm),>25 cm 超出器械可及範圍。","options":{"A":"正確:心理壓力大、學習曲線長。","B":"正確:POEM 創傷小。","C":"正確:傷口/疼痛/失能較少。","D":"★錯誤(本題答案):>25 cm 腫瘤超出 TEMS 範圍。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"111080-75":{"quick":"最不適當為 D:腹腔鏡小傷口「仍可能」造成腹壁或切口(port-site)疝氣。","detail":{"background":"腹腔鏡併發症:CO₂ 氣腹升高腹內壓→回心血量/心律改變、可致心律不整;CO₂ 栓塞(罕見但致命);套管針(trocar)置放可傷腸道/血管/臟器;「port-site/切口疝氣」雖小但仍可能發生(尤其≥10 mm 套管口未縫合筋膜)。","options":{"A":"正確:氣腹可致心律不整。","B":"正確:可能 CO₂ 栓塞。","C":"正確:trocar 可傷臟器。","D":"★最不適當(本題答案):小傷口仍可能切口疝氣。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"112020-77":{"quick":"最易致腸阻塞(麻痺性腸阻塞)者為 B:低血鉀(hypokalemia)。","detail":{"background":"電解質與腸蠕動:「低血鉀」會使腸道平滑肌興奮性下降、致麻痺性腸阻塞(ileus);術後食慾差/嘔吐/鼻胃管引流易低血鉀,須補充。低血鎂、高血鈣亦可影響腸蠕動,但低血鉀最常見且最易致 ileus。","options":{"A":"高血鈣亦可致便秘但非最易。","B":"★正確(本題答案):低血鉀最易致腸阻塞。","C":"高血鉀非典型致 ileus。","D":"低血鈣致神經肌肉興奮,非麻痺性腸阻塞。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"113070-5":{"quick":"最恰當為 C:未穿孔腸壞死、源頭已切除控制→抗生素「不超過 24 小時」。","detail":{"background":"腹內感染抗生素時程(源頭控制後):①外傷性腸穿孔<12 小時修補、未穿孔闌尾切除、源頭已控制的腸壞死切除→「24 小時內(或單劑)」即可;②已建立的腹內感染(穿孔性闌尾炎/腹膜炎,STOP-IT 試驗)→源頭控制後約 4 天。過長療程無益且增抗藥性。","options":{"A":"外傷穿孔<12 小時修補→24 小時即可,非 3 天。","B":"未穿孔闌尾切除→24 小時/單劑,非 3 天。","C":"★正確(本題答案):源頭控制的腸壞死切除→≤24 小時。","D":"穿孔性闌尾炎約 4 天,非 10 天。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"114070-76":{"quick":"最適當為 A:小腸阻塞發生率高於大腸阻塞。","detail":{"background":"腸阻塞:小腸阻塞(SBO)較大腸阻塞常見,成人 SBO 多因「術後沾黏、疝氣」。處置:禁食、鼻胃管減壓、補液電解質;「不」用抗痙攣藥(腸已脹),脂肪酶不會典型升 5 倍(那是胰臟炎);絞窄需手術。","options":{"A":"★正確(本題答案):SBO 多於 LBO。","B":"錯:不用抗痙攣藥(應減壓)。","C":"錯:脂肪酶升 5 倍是胰臟炎。","D":"錯:SBO 常因疝氣/術後沾黏。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"115020-54":{"quick":"正確為 B:左側/直腸切除術前準備,以「機械性腸道準備+口服抗生素」並用為目前常見方式。","detail":{"background":"大腸直腸 ERP/ERAS 術前術中:單獨機械性腸道準備「無法」有效降低感染,需「機械性準備+口服抗生素並用」(尤其左側/直腸手術);疼痛採「多模式、減少鴉片」(鴉片抑制腸蠕動延後恢復);不常規放腹腔引流;避免長時間禁食、術前碳水飲品。","options":{"A":"錯:單獨機械準備無法有效降感染。","B":"★正確(本題答案):機械準備+口服抗生素並用。","C":"錯:鴉片抑制腸蠕動,非首選且不促恢復。","D":"錯:不常規放腹腔引流。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ASPEN/ESPEN Nutrition；WHO/CDC SSI Guideline"]}},"111080-38":{"quick":"正確為 B:RYGB 後早期傾倒症候群可藉「飲食調整」改善。","detail":{"background":"傾倒症候群(dumping):胃切除/胃繞道後高滲食糜快速入小腸。早期(餐後 15–30 分):腹脹、噁心、心悸、冒汗、頭暈、腹瀉(液體移入腸腔+血管活性物質)。晚期(餐後 1–3 小時):腸促胰島素過度分泌→「反應性低血糖」。處置首選「飲食調整」(少量多餐、高蛋白高脂低單醣、避免餐中飲水);嚴重者 octreotide;極少需手術。","options":{"A":"錯:不需迷走神經切除矯正。","B":"★正確(本題答案):飲食調整改善。","C":"錯:多數不需 octreotide。","D":"錯:多數不需手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"114070-33":{"quick":"錯在 D:十二指腸潰瘍惡性機會極低但「並非完全沒有」,此絕對化敘述不正確。","detail":{"background":"十二指腸潰瘍(DU):藥物(根除 H. pylori+PPI)為第一線;頑固疼痛可考慮手術(如迷走神經切斷±胃竇切除);急性穿孔手術「越簡單越好」(縫合修補+大網膜貼補,Graham patch)、術後 PPI。DU 惡性機率極低(幾乎良性,通常不需切片),但胃潰瘍須切片排除惡性;說 DU「沒有惡性機會」過於絕對。","options":{"A":"正確:藥物為第一線。","B":"正確:頑固潰瘍可手術。","C":"正確:穿孔越簡單越好+術後 PPI。","D":"★錯誤(本題答案):DU 惡性機率極低但非「沒有」。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"113020-34":{"quick":"錯在 A:胃神經內分泌腫瘤(NET)源自「ECL 細胞」,非 Cajal 間質細胞(那是 GIST)。","detail":{"background":"胃神經內分泌腫瘤(NET/類癌)源自「腸嗜鉻樣(ECL)細胞」。分型:Type I(慢性萎縮性胃炎/高 gastrin、預後最好)、Type II(與 MEN1/Zollinger-Ellison 相關)、Type III(散發、不依賴 gastrin、預後最差)。局部腫瘤以完全切除為主。Cajal 間質細胞增生形成的是 GIST,非 NET。","options":{"A":"★錯誤(本題答案):NET 源自 ECL 細胞,非 Cajal 細胞。","B":"正確:Type II 與 MEN1 相關。","C":"正確:局部 NET 以完全切除為主。","D":"正確:Type III 預後最差。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"114020-33":{"quick":"最恰當為 A:局部侵犯性胃癌需足夠切除範圍,淋巴廓清對預後有幫助。","detail":{"background":"胃癌外科:局部侵犯性胃癌需「足夠切除緣+淋巴結廓清(D2)」改善預後與分期。原發性胃淋巴瘤(MALT)以根除 H. pylori/化放療為主、非先手術。已開發國家整體胃癌下降,但「近端/賁門」癌上升、遠端下降。早期胃癌仍約 10% 有淋巴轉移。","options":{"A":"★正確(本題答案):足夠切除緣+淋巴廓清有助預後。","B":"錯:胃淋巴瘤非先手術。","C":"錯:已開發國家近端癌上升、遠端下降。","D":"錯:早期胃癌仍可淋巴轉移。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"113020-31":{"quick":"結合限制+吸收不良者為 B:腹腔鏡 Roux-en-Y 胃繞道(RYGB)。","detail":{"background":"減重/代謝手術機轉分:限制型(restriction,如胃束帶 AGB、垂直束帶胃成形 VBG)、吸收不良型(malabsorption)、合併型(restriction+malabsorption,如 Roux-en-Y 胃繞道 RYGB)。袖狀胃切除(sleeve)近年最普遍。吸收不良型術後需補充脂溶性維生素、B12、鐵、鈣。代謝手術主治第二型糖尿病。術後早期(<3 天)吻合口/腸道滲漏為嚴重併發症,多需再手術。","options":{"A":"胃束帶為純限制型。","B":"★正確(本題答案):RYGB 為合併型。","C":"垂直束帶胃成形為限制型。","D":"胃內水球為限制型(暫時)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"112020-37":{"quick":"Billroth II 病人餐後上腹痛、吐大量苦液後緩解、amylase 上升→C:輸入環症候群。","detail":{"background":"輸入環症候群(afferent loop syndrome,Billroth II 後):輸入環(含膽胰液)阻塞→餐後膽胰液積聚、上腹脹痛、amylase 升高,壓力高至一定程度「噴射狀吐出大量膽汁(苦液)後疼痛緩解」(嘔吐物不含食物);需手術矯正(轉為 Roux-en-Y)。","options":{"A":"胃穿孔為持續腹膜炎,非吐後緩解。","B":"傾倒症候群為心悸冒汗,非苦液+amylase 升。","C":"★正確(本題答案):輸入環症候群。","D":"闌尾炎為右下腹痛。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"112080-75":{"quick":"錯在 B:晚期傾倒症候群主因是「反應性低血糖(hypoglycemia)」,非高血糖。","detail":{"background":"傾倒症候群(dumping):胃切除/胃繞道後高滲食糜快速入小腸。早期(餐後 15–30 分):腹脹、噁心、心悸、冒汗、頭暈、腹瀉(液體移入腸腔+血管活性物質)。晚期(餐後 1–3 小時):腸促胰島素過度分泌→「反應性低血糖」。處置首選「飲食調整」(少量多餐、高蛋白高脂低單醣、避免餐中飲水);嚴重者 octreotide;極少需手術。","options":{"A":"正確:依時間分早期/晚期。","B":"★錯誤(本題答案):晚期為反應性低血糖,非高血糖。","C":"正確:早期可腹瀉、晚期較無。","D":"正確:術後初期嚴格限糖、避免含糖飲料。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"112020-38":{"quick":"胃細胞中粒線體含量最高為 B:壁細胞(parietal cell,泌酸需大量能量)。","detail":{"background":"壁細胞(parietal cell)分泌鹽酸與內在因子,主動運輸 H⁺需大量 ATP,故「粒線體含量最高」;主細胞分泌 pepsinogen、黏液細胞分泌黏液、銀染(腸嗜鉻)細胞為內分泌細胞。","options":{"A":"主細胞分泌 pepsinogen。","B":"★正確(本題答案):壁細胞粒線體最多。","C":"銀染細胞為內分泌。","D":"黏液細胞分泌黏液。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"112080-37":{"quick":"最恰當為 A:近年減重手術以「袖狀胃切除(sleeve gastrectomy)」較普遍。","detail":{"background":"減重/代謝手術機轉分:限制型(restriction,如胃束帶 AGB、垂直束帶胃成形 VBG)、吸收不良型(malabsorption)、合併型(restriction+malabsorption,如 Roux-en-Y 胃繞道 RYGB)。袖狀胃切除(sleeve)近年最普遍。吸收不良型術後需補充脂溶性維生素、B12、鐵、鈣。代謝手術主治第二型糖尿病。術後早期(<3 天)吻合口/腸道滲漏為嚴重併發症,多需再手術。","options":{"A":"★正確(本題答案):袖狀胃切除近年最普遍。","B":"錯:代謝手術主治第二型糖尿病。","C":"錯:吸收不良型(非限制型)較需補充維生素。","D":"錯:<3 天腸道滲漏多需再手術,非保守。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}}},TO=["食道外科", "胃十二指腸外科", "小腸與腸繫膜", "大腸直腸外科", "肛門直腸良性疾病", "闌尾炎與急腹症", "腹壁疝氣", "小兒外科(消化道)", "外科原則"],LEC={"食道外科":{"title":"食道外科（含裂孔疝氣）","html":"\n<p><b>食道癌：</b>鱗狀細胞癌(SCC，全球最多；菸酒/熱食/achalasia/腐蝕傷/Plummer-Vinson，中上段) vs 腺癌(肥胖/GERD/Barrett，下段；歐美已超越 SCC)。最常見症狀＝<b>漸進性吞嚥困難</b>。T 分期：T1 黏膜下、T2 肌肉層、T3 外膜、T4 鄰近構造。<b>T 用 EUS 最準</b>。早期可 EMR；局部進展(II–III)→<b>術前同步放化療再手術</b>(Ivor Lewis：腹部+右開胸雙切口，中下段)。</p>\n<p><b>賁門失弛緩(achalasia)：</b>LES 不鬆弛+食道<b>無蠕動</b>；鋇劑鳥嘴狀、<b>測壓為診斷黃金標準</b>；治療氣球擴張/肉毒(短暫)/<b>Heller 肌肉切開+部分折疊</b>；長期惡變為 SCC。Chagas 病可致續發。</p>\n<p><b>GERD：</b>診斷黃金標準＝<b>24 小時 pH 監測</b>；生活調整+PPI 第一線；手術(Nissen 360°/Toupet 270°/Dor)用於 PPI 失敗、併發症(嚴重食道炎/狹窄/Barrett)、不願長期服藥。Barrett＝腸化生柱狀上皮、腺癌風險↑30–40 倍。</p>\n<p><b>食道穿孔：</b>Boerhaave＝劇烈嘔吐後遠端破裂；診斷首選<b>水溶性對比劑攝影/CT(勿先內視鏡)</b>；<12–24h 一期修補，延遲者引流/控制感染源優先。<b>食道憩室</b>(Zenker 偽憩室最常見，鋇劑診斷)、<b>裂孔疝氣</b>(I 滑動最多~95%；II 食道旁 rolling，阻塞症狀多、有症狀才修補)。</p>\n"},"胃十二指腸外科":{"title":"胃十二指腸外科（潰瘍/腫瘤/減重）","html":"\n<p><b>消化性潰瘍：</b>H. pylori、NSAID、胃酸。DU~90%、GU~75% 與 H. pylori 相關；DU 高酸、GU 正常/低酸。手術：truncal vagotomy <b>須加引流</b>、HSV 保留幽門支配、Billroth I＝胃十二指腸吻合/II＝胃空腸吻合。穿孔以<b>簡單修補(Graham patch)+PPI</b>。</p>\n<p><b>胃癌：</b>H. pylori(IARC 第一類)、萎縮性胃炎/腸化生、高鹽醃漬、男性。Laurén：腸型(分化好、血行、高發生區多、APC) vs 瀰漫型(印戒、預後差)。<b>早期胃癌＝侷限黏膜或黏膜下(不論淋巴結)</b>，約 10% 已淋巴轉移。診斷首選胃鏡切片；T＝侵犯深度；手術需取≥16 顆淋巴結、D2 廓清。</p>\n<p><b>其他腫瘤：</b><b>GIST</b>(Cajal 細胞、KIT/CD117、最常見於胃、少淋巴轉移→楔狀切除不需廓清、轉移用 imatinib)；<b>胃 MALT 淋巴瘤</b>(B 細胞、與 H. pylori 相關、根除可緩解~75%)；<b>神經內分泌瘤(NET)</b>源自 ECL 細胞(非 Cajal)。</p>\n<p><b>術後/減重：</b><b>傾倒症候群</b>(早期餐後 15–30 分腹脹心悸冒汗腹瀉；晚期反應性低血糖；飲食調整為主)、<b>輸入環症候群</b>(Billroth II，膽汁苦液噴吐後緩解+amylase↑)。減重手術：限制型(束帶/sleeve)、合併型(RYGB，治第二型糖尿病/GERD)；<b>sleeve 近年最普遍</b>，吸收不良型需補維生素。</p>\n"},"小腸與腸繫膜":{"title":"小腸與腸繫膜","html":"\n<p><b>小腸阻塞(SBO)：</b>成人最常見<b>術後沾黏</b>，其次疝氣、腫瘤。處置：鼻胃管減壓、禁食、補液、反覆影像；<b>鋇劑非必須</b>(水溶性對比劑挑戰可預測緩解)；絞窄(腸壁增厚積氣、發燒、白血球↑、腹膜炎)須緊急手術。</p>\n<p><b>短腸症候群：</b>剩餘<200cm、切<b>迴腸</b>(吸收 B12/膽鹽)、失迴盲瓣、全結腸切除為危險因子；切空腸可代償。老年人最常見原因＝<b>腸繫膜血管阻塞</b>。</p>\n<p><b>Meckel 憩室：</b>卵黃管殘留真憩室、<b>對腸繫膜側</b>、距迴盲瓣~2 英尺；2 法則；併發症出血(異位胃黏膜)/發炎/阻塞/腸套疊導引點；診斷用 <b>Tc-99m pertechnetate</b>。</p>\n<p><b>其他：</b>SMA 阻塞→小腸+右結腸缺血；成人小腸出血最常見<b>血管發育不良</b>；盲環症候群→B12 缺乏巨球性貧血；小腸瘻管多先保守 2–3 個月(多在 5 週內自閉)。</p>\n"},"大腸直腸外科":{"title":"大腸直腸外科","html":"\n<p><b>大腸直腸癌：</b>腺瘤-癌序列(~10 年；APC→KRAS→p53)。FAP＝APC(5q21)顯性、Lynch＝MMR(腸外以子宮內膜癌最常見)。T 分期：T1 黏膜下、T2 肌肉層、T3 漿膜下、T4a 臟層腹膜、T4b 鄰器官。<b>Stage III(或高風險 II)→FOLFOX</b>；直腸癌局部進展→<b>術前同步放化療</b>；轉移性 <b>RAS 野生型才用 anti-EGFR</b>。右側癌以貧血表現、左側以阻塞。<b>TME</b>(全直腸繫膜切除+神經保留)降復發、減少性/膀胱障礙。</p>\n<p><b>憩室炎：</b>好發乙狀結腸、CT 診斷。Hinchey：I 結腸旁膿瘍、II 骨盆膿瘍、III 化膿性腹膜炎、IV 糞性腹膜炎。手術：游離穿孔/腹膜炎、無法引流大膿瘍、瘻管、阻塞；<b>單次非複雜不需常規切除</b>；緩解後 4–8 週大腸鏡排除癌。</p>\n<p><b>發炎性腸病：</b>UC(連續、由直腸往上、血便，手術<b>可治癒</b>；猛爆/毒性巨結腸/分化不良為適應症) vs Crohn(全層跳躍、好發迴腸末端、瘻管狹窄，<b>手術不能治癒、保留腸段</b>、抽菸是危險因子)。</p>\n<p><b>解剖/扭轉：</b>升/降結腸、直腸附著後腹腔；橫結腸/乙狀結腸有繫膜、易扭轉；盲腸壁最薄最易穿孔。IMA 分支＝左結腸、乙狀結腸、上直腸動脈(中/下直腸來自內髂)。乙狀結腸扭轉(咖啡豆徵)可內視鏡復位、盲腸扭轉須手術。</p>\n"},"肛門直腸良性疾病":{"title":"肛門直腸良性疾病","html":"\n<p><b>痔瘡：</b>含動靜脈與平滑肌的肛墊、參與控便。內痔分級：I 無脫出、II 脫出可自動回復、III 需手動回復、IV 無法回復。多數<b>保守治療</b>；橡皮圈結紮用於「內痔」(外痔會痛不可結紮)；<b>切痔瘡不改善便秘</b>(便秘是因)。急性血栓性外痔 72h 內可切除。</p>\n<p><b>肛裂：</b>多在後中線、內括約肌高張+硬便惡性循環、劇痛+前哨皮垂；<b>80–90% 保守癒合</b>(高纖、坐浴、硝酸甘油/鈣阻斷劑)，頑固者側方內括約肌切開。</p>\n<p><b>肛門瘻管：</b>源自肛門腺感染；<b>Goodsall 法則</b>(外口後半→內口後正中 6 點彎曲；前半→直行)；複雜/高位瘻管不可一律切開(失禁風險，用 seton)。</p>\n<p><b>肛門腫瘤：</b>Bowen＝鱗狀<b>原位癌</b>(非腺癌)；惡性黑色素瘤可無色素型(amelanotic)；肛門鱗狀細胞癌以<b>同步放化療(Nigro)</b>為主、APR 為救援。人工肛門非所有直腸癌都需(低位前位切除可保肛)。</p>\n"},"闌尾炎與急腹症":{"title":"闌尾炎與急腹症","html":"\n<p><b>急性闌尾炎：</b>最常見腹部外科急症，<b>好發 10–30 歲</b>(非老年/兒童)。管腔阻塞→缺血/感染(E. coli、Bacteroides)→壞死穿孔。<b>疼痛由臟器性(肚臍周圍悶痛)轉為腹壁性(右下腹/McBurney 點反彈痛)</b>。診斷臨床+CT(敏感/特異~95%)；治療闌尾切除(腹腔鏡恢復快、可探查全腹)；約 1% 為闌尾腫瘤需病理。術後最常見併發症＝<b>手術部位/腹腔內感染</b>。</p>\n<p><b>闌尾腫塊/膿瘍(發炎數天)：</b>先<b>廣效抗生素</b>保守(±經皮引流)、日後間隔性闌尾切除；影像首選 CT。年長者右下腹腫塊須鑑別盲腸腫瘤/憩室炎。</p>\n<p><b>傷口分類：</b>單純闌尾切除＝clean-contaminated。<b>腹腔腔室症候群</b>：以膀胱(Foley)壓測腹內壓，>12 為腹內高壓、合併器官衰竭考慮減壓手術。</p>\n"},"腹壁疝氣":{"title":"腹壁疝氣","html":"\n<p><b>腹股溝疝氣：</b>~75% 疝氣在腹股溝、2/3 為間接型。<b>間接型</b>＝先天鞘狀突未閉、經內環(深環，位腹橫筋膜)、在腹壁下動脈外側；<b>直接型</b>＝後天，由 Hesselbach 三角(腹壁下動脈內側)鼓出。整體<b>男>女</b>；女性相對較常見股疝氣(腹股溝韌帶下方、易嵌頓壞死~20%)。提睪肌由腹內斜肌延伸、睪丸動脈來自腹主動脈。</p>\n<p><b>治療：</b>成人疝氣需<b>手術</b>才能治癒(疝氣帶非根治)；無張力網膜修補復發率低；腹腔鏡(TEP/TAPP)適合雙側/復發，復發率與開放相當。最常見術後併發症＝<b>疼痛</b>。嵌頓+表皮紫紅(絞窄)→<b>禁強行復位</b>、緊急手術；先鼻胃管減壓+輸液復甦。</p>\n<p><b>特殊疝氣：</b>Spigelian(腹直肌外側半月線)、Littré(含 Meckel)、Richter(腸壁部分嵌頓)、閉孔疝、切口疝(>大缺損用網膜)、<b>內部疝氣</b>(腸經腸繫膜缺損)。兒童疝氣幾乎都間接型、行高位結紮、不放網膜、<1 歲嵌頓風險高。</p>\n"},"小兒外科(消化道)":{"title":"小兒外科（消化道）","html":"\n<p><b>腸套疊：</b>3 個月–2 歲、迴-結腸型、多原因不明；果醬便+香腸狀腫塊；<b>超音波(靶心)診斷</b>、<b>空氣/鋇劑灌腸復位</b>(多數有效)，腹膜炎/穿孔才手術。</p>\n<p><b>巨結腸症(Hirschsprung)：</b>遠端神經節細胞缺如、移行區；>48h 未解胎便、便秘；<b>直腸切片(無神經節)為診斷黃金標準</b>；拉下術(Swenson/Soave/Duhamel)。</p>\n<p><b>食道閉鎖/TEF：</b>最常見<b>EA+遠端 TEF(C 型~85%，腹部有腸氣)</b>；EA 無 TEF 則腹部無腸氣；泡沫唾液、嗆咳發紺；合併 <b>VACTERL</b>(脊柱/肛門/心臟/食道/腎/肢體，不含小腸閉鎖)。</p>\n<p><b>其他：</b>十二指腸閉鎖(雙氣泡徵、再管腔化失敗、唐氏)；幽門狹窄(3–6 週噴射嘔吐、橄欖塊、低氯低鉀鹼中毒、<b>幽門肌切開</b>非急症)；NEC(早產、腸壁積氣、先內科處置、穿孔才手術)；malrotation(中腸扭結、<b>Ladd 手術</b>)；CDH(左後外側 Bochdalek、肺發育不全+肺高壓、插管勿面罩、<b>穩定後延遲手術</b>)；無肛症(低位會陰瘻預後佳、高位先造口)；腹裂(無囊膜、合併小腸閉鎖)、臍膨出(有囊膜、合併染色體/心臟異常)；兒童疝氣高位結紮。</p>\n"},"外科原則":{"title":"外科原則（營養/感染/微創/輸液/術後）","html":"\n<p><b>傷口分類與感染率：</b>Clean(~1–2%)、Clean-contaminated(腸胃道/單純闌尾，~3–5%)、Contaminated(腸液外流/急性發炎，~10%)、Dirty(感染/穿孔，~20–40%)。</p>\n<p><b>預防 SSI：</b>抗生素<b>切皮前 60 分內</b>、手術超過<b>2 倍半衰期</b>追加、維持<b>正常體溫>36°C</b>、血糖<180–200。植入物(如 Nuss 板)最需預防抗生素。</p>\n<p><b>營養：</b>腸道有功能優先<b>腸道營養</b>(維持腸屏障/免疫)；床頭抬 30–45°；<b>嚴重血流動力學不穩為腸道營養禁忌</b>。</p>\n<p><b>術後：</b>早期(1–2 天)發燒最常見<b>肺膨脹不全</b>；<b>低血鉀</b>最易致麻痺性腸阻塞；ERAS：機械準備+口服抗生素(左側/直腸)、減少鴉片、不常規放引流。小兒維持液 Holliday-Segar(100/50/20)。微創/腹腔鏡：放大視野、恢復快、腫瘤清除相當；併發症含 CO₂ 栓塞、trocar 傷臟器、<b>port-site 疝氣</b>。腹內感染源頭控制後抗生素多≤24h–4 天。</p>\n"}};
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
