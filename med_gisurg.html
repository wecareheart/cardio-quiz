ndrome)","B":"巨結腸症(Hirschsprung’s disease)","C":"細小左結腸症(small left colon syndrome)","D":"直腸閉鎖症(rectal atresia)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"101030-15","topic":"小兒外科(消化道)","topic_code":"T8","id":"101030-15","q_num":15,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":32,"stem":"有關食道癌之敘述,下列何者錯誤?","options":{"A":"目前全世界之食道癌以鱗狀細胞癌(squamous cell carcinoma)最常見","B":"在西方國家,制酸劑使用增加是食道癌的危險因子之一","C":"與食道遲緩不能(achalasia)有關的食道癌,最常見的細胞型態為腺癌(adenocarcinoma)","D":"評估術前淋巴轉移(N status for TNM stage, AJCC)的非侵犯性工具當中,正子攝影的正確性比電腦斷層佳"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"101030-32","topic":"食道外科","topic_code":"T1","id":"101030-32","q_num":32,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":33,"stem":"一位58 歲男性病人,因車禍導致腹膜炎接受剖腹探查手術,發現有多處小腸破裂併腸系膜血腫,最後接受25 公分長度的小腸切除及小腸吻合手術,10 日後發現引流管有腸道內容物成分,每日流出量40-80 ml,腹部平坦鬆軟無腹痛症狀,體溫37.4°C,則你的診斷為何?","options":{"A":"短腸症候群(short bowel syndrome)","B":"缺血性腸道疾病(ischemic bowel disease)","C":"沾黏性腸阻塞(adhesion ileus)","D":"癒合不全而可能形成腸道皮膚瘻管(enterocutaneous fistula)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"101030-33","topic":"小腸與腸繫膜","topic_code":"T3","id":"101030-33","q_num":33,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":39,"stem":"46 歲陳小姐因上腹痛接受胃鏡檢查時,發現在胃體部中間靠胃大彎處有一個4 公分腫瘤,表面黏膜完整,經內視鏡超音波檢查證實為黏膜下腫瘤,則下列何種處置最適當?","options":{"A":"腹腔鏡胃腫瘤切除手術","B":"門診追蹤觀察","C":"經內視鏡腫瘤切除","D":"接受放射線治療"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"101030-39","topic":"胃十二指腸外科","topic_code":"T2","id":"101030-39","q_num":39,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":54,"stem":"一位72 歲女性,主訴右下腹鈍痛已2 星期,並無發燒、噁心、便秘症狀,白血球5200/mm3,Seg 59%,接受下消化道鋇劑攝影(LGI series)(如下圖),最可能的病因為:","options":{"A":"闌尾炎(appendicitis)","B":"升結腸憩室炎(diverticulitis)","C":"盲腸腫瘤(cecal tumor)","D":"缺血性腸炎(ischemic colitis)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"101030-54","topic":"闌尾炎與急腹症","topic_code":"T6","id":"101030-54","q_num":54,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":55,"stem":"承上題,接下來何者為適當的檢查?","options":{"A":"血管攝影(angiography)","B":"大腸鏡(colonoscopy)","C":"腹腔鏡檢查(laparoscopy)","D":"靜脈泌尿道攝影(IVU)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"101030-55","topic":"闌尾炎與急腹症","topic_code":"T6","id":"101030-55","q_num":55,"src":"民國101年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":1,"stem":"一嬰兒出生幾天後發生嘔吐的現象,經診斷為腸道扭轉不全(Malrotation),引起此症狀最主要的原因為何?","options":{"A":"營養不良","B":"胎便排出困難","C":"肺形成不全","D":"十二指腸阻塞或中腸扭結(Midgut volvulus)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"102030-1","topic":"小兒外科(消化道)","topic_code":"T8","id":"102030-1","q_num":1,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":36,"stem":"有關食道自發性破裂(Boerhaave’s syndrome),下列何者正確?","options":{"A":"常與外傷有關","B":"常發生在激烈嘔吐之後","C":"破裂處常發生在頸部食道","D":"通常給予抗生素治療就可以解決病患的問題,如果感染無法控制再考慮外科手術"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"102030-36","topic":"食道外科","topic_code":"T1","id":"102030-36","q_num":36,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":40,"stem":"林先生因為上腸繫膜動脈血栓(superior mesenteric artery thrombi)併腹膜炎切除大部分小腸,則下列何者不是術後發生短腸症(short bowel syndrome)的危險因子?","options":{"A":"剩餘小腸長度小於200 公分","B":"切除迴盲瓣","C":"切除空腸","D":"切除迴腸"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"102030-40","topic":"小腸與腸繫膜","topic_code":"T3","id":"102030-40","q_num":40,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":41,"stem":"王先生因為病態性肥胖接受胃繞道手術(Roux-en-Y Gastric Bypass),手術後發現用餐後沒多久,就會有腹脹、噁心且伴隨有頭暈、心悸與呼吸不順。有關治療王先生的症狀,下列敘述何者正確?","options":{"A":"王先生的症狀與身體分泌Serotonin 有關,但服用Serotonin 拮抗劑(Serotonin antagonists)僅能部分改善症狀","B":"飲食習慣應建議王先生少量多餐,並避免蛋白或脂肪類等難消化食物","C":"飲食習慣應建議王先生少量多餐,餐中加湯或飲料,以促進食物消化","D":"王先生的症狀,皮下注射Sandostatin 可以有效改善胃腸症狀,但對於頭暈、心悸等症狀無效"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"102030-41","topic":"胃十二指腸外科","topic_code":"T2","id":"102030-41","q_num":41,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":44,"stem":"吳先生被送至醫院急診時,主訴為腹脹併腹絞痛兩天,當天並有嘔吐現象,過去兩天吳先生未排便但有排氣。身體診查體溫37.5°C,心跳速率每分鐘102 下,呼吸速率每分鐘18 下,血壓130/60 mmHg。腹部診查顯示有右腹部壓痛、反彈痛及右下腹闌尾切除術後疤痕。經抽血檢查及輸液補充,腹部X 光攝影顯示有小腸阻塞現象,於是進一步安排腹部電腦斷層檢查。則有關腹部電腦斷層檢查的敘述,下列何者錯誤?","options":{"A":"此時電腦斷層檢查通常須配合喝水溶性顯影劑(water soluble contrast)","B":"電腦斷層檢查中,水溶性顯影劑在24 小時內出現在大腸顯影,可作為腸阻塞緩解的指標","C":"水溶性顯影劑可以降低需要手術的機會","D":"水溶性顯影劑可以降低住院天數"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"102030-44","topic":"腹壁疝氣","topic_code":"T7","id":"102030-44","q_num":44,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":45,"stem":"有關箝閉性(Incarcerated)腹股溝疝氣之敘述,下列何者錯誤?","options":{"A":"通常合併有腸阻塞","B":"疝氣部位表皮若出現紫紅色變化,宜儘速給予疝氣復位(Reduction)","C":"會有局部疼痛及壓痛","D":"若手術中發現疝氣袋內小腸合併有缺血性壞死,小腸切除及吻合後,可同時進行疝氣修補手術"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"102030-45","topic":"腹壁疝氣","topic_code":"T7","id":"102030-45","q_num":45,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":48,"stem":"下一步處置何者最不適當?","options":{"A":"餵食量減半,濃度也減半","B":"放胃管引流","C":"靜脈抗生素","D":"安排腹部X 光攝影"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"102030-48","topic":"小兒外科(消化道)","topic_code":"T8","id":"1 07080-8","q_num":8,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":26,"stem":"關於Achalasia之敘述,下列何者錯誤?","options":{"A":"現在的理論是支配lower esophageal sphincter之神經受損所致","B":"長時間最易引起esophageal adenocarcinoma","C":"典型症狀為吞嚥困難、食物逆流及體重減輕","D":"其外科治療主要為esophagomyotomy"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"107080-26","topic":"食道外科","topic_code":"T1","id":"107080-26","q_num":26,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":30,"stem":"闌尾炎為常見之急性腹症,下列敘述何者不合宜?","options":{"A":"急性闌尾炎為最常見的腹部急症,常好發於老年人及兒童","B":"麥氏點(McBurney's point) 為右下腹髂前上棘(anterior superior iliac spine)與肚臍連線外三分之一處","C":"對於沒有發生併發症的急性闌尾炎可以考慮非手術治療,但目前仍以闌尾切除為標準治療","D":"約有1%的病患為闌尾惡性腫瘤,所以仍須作最後的病理檢查"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"107080-30","topic":"闌尾炎與急腹症","topic_code":"T6","id":"107080-30","q_num":30,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":33,"stem":"有關切除大量小腸後的短腸症(short bowel syndrome),下列敘述何者錯誤?","options":{"A":"切除少於50%的小腸,人體通常多可承受,而不致出現吸收不良的短腸症","B":"迴盲瓣若有保存,則較不易出現短腸症","C":"切除空腸(jejunum)比切除迴腸(ileum)較易出現短腸症","D":"小腸移植是嚴重短腸症的治療選項之一"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"107080-33","topic":"小腸與腸繫膜","topic_code":"T3","id":"107080-33","q_num":33,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":44,"stem":"下圖為一個足月的新生女嬰,檢查發現其薦尾椎有一個巨大的腫瘤,下列敘述何者錯誤?","options":{"A":"最可能的診斷為薦尾椎畸胎瘤(sacrococcygeal teratoma)","B":"不論在懷孕過程或是嬰兒出生之後,都要嚴密觀察嬰兒有無因為此巨大腫瘤產生的盜血現象(tumor-induced vascular steal syndrome)","C":"需再進一步的安排影像學檢查,如CT或MRI等,以了解除了外部看到的範圍之外,向內延伸到骨盆腔的範圍有多大","D":"手術的原則是要將腫瘤完全切除,過程中要避免傷害到肛門直腸及周邊的正常結構,並將尾骨保留"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107080-44","topic":"小兒外科(消化道)","topic_code":"T8","id":"107080-44","q_num":44,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":48,"stem":"15歲男孩因排黏液血便求診,詢問其家族史發現他的父親、叔叔及姑姑皆有大腸息肉或癌症病史,內視鏡發現其大腸約有數百個大小息肉,下列相關敘述何者正確?1致病成因為mismatch repair基因遺傳性突變 2基因突變位於5q21 3為顯性遺傳(autosomal dominance) 4此類病人大於50%之比率沒有家族史","options":{"A":"僅13","B":"1234","C":"僅124","D":"僅23"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107080-48","topic":"大腸直腸外科","topic_code":"T4","id":"107080-48","q_num":48,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":49,"stem":"有關大腸直腸癌的化學治療準則,下列敘述何者錯誤?","options":{"A":"StageI病人術後不需使用術後輔助性化療","B":"5-fluorouracil-based(5- FU)regimen被建議可用於stageII併有poor prognostic indicator的病人","C":"FOLFOX regimen可延長stageIII病患存活率","D":"Stage IV病人RAS mutation對於Anti-EGFR治療有好處"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107080-49","topic":"大腸直腸外科","topic_code":"T4","id":"107080-49","q_num":49,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":50,"stem":"有關大腸憩室炎(diverticulitis disease)的敘述,下列何者錯誤?","options":{"A":"評估大腸憩室炎的嚴重程度,目前較建議的診斷工具是電腦斷層","B":"急性大腸憩室炎臨床上可粗略分為非複雜性及複雜性;非複雜性(uncomplicated)可以採保守治療方式","C":"可建議大腸憩室炎患者在症狀改善後的4~6週接受大腸鏡檢查,藉此確診大腸憩室及排除大腸惡性腫瘤或大腸發炎性疾病之可能性","D":"一旦患者發生過大腸憩室炎,就必須建議患者接受常規部分大腸切除,以預防下次大腸憩室炎的發作"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107080-50","topic":"大腸直腸外科","topic_code":"T4","id":"107080-50","q_num":50,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":51,"stem":"下列關於微創手術施行大腸切除的敘述,何者錯誤?","options":{"A":"腹腔鏡輔助大腸切除手術相較於開腹手術,能減少術後疼痛","B":"腹腔鏡輔助大腸切除手術產生腸繫膜內疝氣(mesenteric internal hernia)的比率約只有1%","C":"腹腔鏡輔助大腸切除手術施行大腸切除後,一定要手術關閉腸繫膜缺損(mesenteric defect)","D":"最常見腸繫膜內疝氣的位置在迴腸結(ileocolic junction)附近"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"107080-51","topic":"外科原則","topic_code":"T9","id":"107080-51","q_num":51,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":52,"stem":"下列何者不是腹腔鏡腹股溝疝氣修補手術(laparoscopic inguinal hernia repair)之優點?","options":{"A":"能在腹膜前腔(preperitoneal space)放置大片人工網膜","B":"較容易以人工網膜覆蓋肌恥骨孔(myopectineal orifice)","C":"相較於傳統修補手術,有明顯較低的復發率","D":"適合治療雙側疝氣或復發性疝氣"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"107080-52","topic":"腹壁疝氣","topic_code":"T7","id":"107080-52","q_num":52,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":53,"stem":"相對於開腹手術,施行腹腔鏡闌尾切除手術(laparoscopic appendectomy)的優點不包括下列何者?","options":{"A":"減少住院天數","B":"縮短手術時間","C":"便於發現腹腔內其他可能疾病","D":"較低傷口感染率"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"107080-53","topic":"外科原則","topic_code":"T9","id":"107080-53","q_num":53,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":72,"stem":"關於食道癌(esophageal carcinoma),下列何者錯誤?","options":{"A":"95%為腺癌(adenocarcinoma)","B":"可分為腫塊型、潰瘍型及浸潤型","C":"早期病灶呈小型斑塊或表淺不規則潰瘍","D":"Plummer-Vinson氏症候群病患,發生食道癌之機率較常人高"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"107080-72","topic":"食道外科","topic_code":"T1","id":"107080-72","q_num":72,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":76,"stem":"闌尾炎術後最常發生的併發症為何?","options":{"A":"肺炎","B":"尿道感染","C":"腸皮下瘻管","D":"皮下和腹腔內的感染"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107080-76","topic":"闌尾炎與急腹症","topic_code":"T6","id":"107080-76","q_num":76,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":80,"stem":"一位84歲男性病患於幾年前罹患腦中風之後,長期臥床,常常有呼吸道感染或泌尿道感染。最近幾天病患開始出現發燒及腹瀉等現象。於急診經檢查確定為偽黏膜性大腸炎,醫師開始使用抗生素治療,但治療幾天後,症狀一直沒有具體改善。這時家屬詢問國外研究顯示,偽黏膜性大腸炎可以使用糞便移植治療,不知道醫師是否會考慮這種治療?經查詢相關文獻,發現該文獻的證據等級為Ib,證據等級相當高,但該療法並非台灣對於偽黏膜性大腸炎的常規治療。下列敘述,何者錯誤?","options":{"A":"依據實證醫學的理念,應該依據最新最好的證據來治療患者。本案中,既然該文獻的證據等級為Ib,屬於證據等級很高的文獻,可依照此治療方式來治療患者","B":"雖然該文獻證據等級很高,但並沒有本土相關文獻的證據,該文獻的結果是否可以應用於國內的患者,容有疑慮,應該有更多本土證據支持後,才較為可信","C":"不論證據等級高低,只要是新的治療方法,都必須經過衛生福利部核准後,進行人體試驗加以檢驗其治療效果以及治療相關安全性之後,才能應用於臨床患者","D":"臨床上,醫師有遵從醫療常規來治療病患的義務。但並沒有遵從最新最好的證據等級之文獻來治療患者的義務"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"107080-80","topic":"外科原則","topic_code":"T9","id":"107080-80","q_num":80,"src":"民國107年第二次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":31,"stem":"胃底折疊術(fundoplication)不是下列那一個疾病手術中的一個術式?","options":{"A":"食管裂孔疝氣(hiatal hernia)","B":"胃食道逆流(gastro-esophageal reflux)","C":"血管環(vascular ring)","D":"賁門弛緩不能症(achalasia)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"108030-31","topic":"食道外科","topic_code":"T1","id":"108030-31","q_num":31,"src":"民國108年第一次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":44,"stem":"有關無肛症(imperforate anus)之敘述,下列何者正確?1低位無肛症,一般是直接做肛門直腸成形手術2高位無肛症都是先做大腸造口,等幾個月後再做肛門直腸成形手術3容易合併的先天性異常包括脊柱、心臟、食道及泌尿系統4高位無肛症最常合併直腸膀胱瘻管5出生後要儘快照側面的腹部X光片來決定分型","options":{"A":"12345","B":"僅1245","C":"僅1345","D":"僅123"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"108030-44","topic":"小兒外科(消化道)","topic_code":"T8","id":"108030-44","q_num":44,"src":"民國108年第一次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":46,"stem":"下列有關腹股溝疝氣(inguinal hernia)與小兒陰囊水腫(hydrocele)之敘述,何者錯誤?","options":{"A":"小兒的腹股溝疝氣大多是間接型的腹股溝疝氣。疝氣囊的形成是因為在胎兒時期的鞘狀突(processusvaginalis)沒有閉合而造成的","B":"疝氣的手術治療可在內環(internal ring)的位置做疝氣囊高位結紮術(high ligation)","C":"小兒的腹股溝疝氣與陰囊水腫,其形成的原因及過程完全不同,故治療的方式也不一樣","D":"一個本來沒有陰囊水腫的小男生突然出現陰囊水腫時,要仔細辨別是否與睪丸腫瘤、創傷、扭轉或副睪炎有關。若有懷疑時,可安排陰囊超音波檢查"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[]," _code":"111080","roc_year":111,"exam_round":"第二次","num":46,"stem":"有關先天性橫膈膜疝氣(congenital diaphragmatic hernia),下列敘述何者正確?","options":{"A":"常見為橫膈膜前內(anteromedial)側缺損,又稱Bochdalek hernia","B":"腹部臟器經橫膈膜缺損滑入胸腔,只造成同側肺葉發育不良","C":"目前治療的策略為出生後立即修補缺損,以減少肺部壓迫","D":"療程中,肺動脈高壓為必須預防或積極處置的問題"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-46","topic":"小兒外科(消化道)","topic_code":"T8","id":"111080-46","q_num":46,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":49,"stem":"先天性橫膈疝氣(congenital diaphragmatic hernia)當需要使用葉克膜體外維生系統(ECMO)時,下列何種情況使用ECMO 治療最可能預後不佳?","options":{"A":"心臟超音波正常","B":"體重1.7 公斤","C":"妊娠週數(gestational age)36 週","D":"出現氣胸(pneumothorax)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111080-49","topic":"小兒外科(消化道)","topic_code":"T8","id":"111080-49","q_num":49,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":50,"stem":"潰瘍性大腸炎(ulcerative colitis)手術的適應症,下列何者錯誤?","options":{"A":"猛爆性腸炎(fulminant colitis)且藥物治療無效","B":"每日腹瀉5 次","C":"毒性巨結腸症(toxic megacolon)","D":"病理切片出現細胞分化不良的病灶"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111080-50","topic":"大腸直腸外科","topic_code":"T4","id":"111080-50","q_num":50,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":51,"stem":"下列那一段結腸或直腸(colon and rectum)並未附著於後腹腔(retroperitoneum)?","options":{"A":"升結腸","B":"降結腸","C":"橫結腸","D":"直腸"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111080-51","topic":"大腸直腸外科","topic_code":"T4","id":"111080-51","q_num":51,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":53,"stem":"考慮腹腔鏡修補腹股溝疝氣(inguinal hernia)的方法時,常用的技術包括腹腔鏡全腹膜外疝氣修補術(totallyextraperitoneal approach, TEP)與經腹腔腹膜前網片修補術(transabdominal preperitoneal approach, TAPP),下列有關此二種修補術之敘述何者錯誤?","options":{"A":"TEP 與TAPP 疝氣修補術方法和技術的主要區別在於進入腹膜前間隙的順序","B":"使用TEP 可以更快地進行腹膜前解剖,並將腹膜內臟損害的潛在風險降到最低","C":"和TEP 相比較,使用TAPP 手術操作空間較為有限","D":"在超過1,000 名患者的實證醫學證據分析(cochrane review)中,TAPP 與TEP 修補的疝氣復發率沒有差異"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111080-53","topic":"腹壁疝氣","topic_code":"T7","id":"111080-53","q_num":53,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":75,"stem":"有關腹腔鏡(laparoscopy)手術的併發症中,下列何者最不適當?","options":{"A":"腹腔鏡手術時所造成的腹部積氣(pneumoperitoneum),可能造成心律不整","B":"可能造成二氧化碳栓塞(carbon dioxide embolization)","C":"套管針(trocar)置放不當,可能造成腸道或其他腹內臟器傷害","D":"腹腔鏡手術所造成的腹壁小傷口,不會造成腹壁或切口疝氣(incisional hernia)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-75","topic":"外科原則","topic_code":"T9","id":"111080-75","q_num":75,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":77,"stem":"24 歲男性,腹痛三天後才就醫,醫師發現他右下腹痛得最厲害,診斷為闌尾炎,須接受手術,這位病人手術後最常發生的併發症為下列何者?","options":{"A":"肺炎","B":"腸阻塞","C":"腸皮下瘻管","D":"手術部位感染"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-77","topic":"闌尾炎與急腹症","topic_code":"T6","id":"111080-77","q_num":77,"src":"民國111年第二次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":7,"stem":"關於盲環症候群(blind loop syndrome)的病人,下列敘述何者最不恰當?","options":{"A":"容易發生脂肪瀉(steatorrhea)","B":"應補充維他命B12","C":"腸胃道中細菌過度孳生所致","D":"容易發生小紅血球貧血(microcytic anemia)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-7","topic":"小腸與腸繫膜","topic_code":"T3","id":"112020-7","q_num":7,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":25,"stem":"關於胃食道逆流(gastroesophageal reflux disease, GERD),下列敘述何者正確?","options":{"A":"微創內視鏡手術進步,傷害小,因此胃食道逆流以手術為最優先最佳之選擇","B":"胃食道逆流也可能會使病人產生氣喘症狀","C":"heartburn常見於心肌梗塞病人,很少發生在胃食道逆流 culated polyp),下列何項處理最適當?","options":{"A":"做內視鏡息肉切除(polypectomy)","B":"只做切片再觀察","C":"直接安排腹腔鏡前位切除(laparoscopic anterior resection)","D":"觀察即可"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"113020-50","topic":"大腸直腸外科","topic_code":"T4","id":"113020-50","q_num":50,"src":"民國113年第一次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":53,"stem":"關於腹腔鏡與開放式闌尾切除手術(laparoscopic appendectomy versus open appendectomy)的比較,下列何者錯誤?①總體來說,與開放手術相比,腹腔鏡手術的併發症發生率較低 ②開放式闌尾切除手術可以檢查整個腹膜腔,因此可排除其他腹腔內急性疾病,例如憩室炎或卵巢膿腫 ③不管採用何種方法,闌尾切除手術最重要的是安全地進行手術以維持病患安全 ④患者出現局部右下腹疼痛和發燒,理學及影像檢查發現可能為闌尾炎延遲發作(delayed presentation of appendicitis),此時腹腔鏡引流手術(laparoscopic drainage)因為沒有助益,不應施行","options":{"A":"①②③","B":"①②④","C":"僅②③","D":"僅②④"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"113020-53","topic":"闌尾炎與急腹症","topic_code":"T6","id":"113020-53","q_num":53,"src":"民國113年第一次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":5,"stem":"關於腹內感染之抗生素使用期間,下列敘述何者最恰當?","options":{"A":"外傷性腸穿孔於12小時內接受手術修補之病患,建議施打3天","B":"未穿孔之急性闌尾炎接受闌尾切除手術後,建議連續施打3天抗生素","C":"未穿孔之腸壞死,經切除腸道後,抗生素施打建議不超過24小時","D":"穿孔性闌尾炎術後,抗生素須施打10天"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113070-5","topic":"外科原則","topic_code":"T9","id":"113070-5","q_num":5,"src":"民國113年第二次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":25,"stem":"關於食道癌之敘述,下列何者正確?","options":{"A":"在美國,食道腺癌(adenocarcinoma)之近年發生率已高於食道鱗狀上皮細胞癌(squamous cellcarcinoma)","B":"食道鱗狀上皮細胞癌(squamous cell carcinoma)與巴瑞特氏食道炎(Barrett esophagus)有高度相關","C":"食道癌最常見症狀為聲音沙啞(hoarseness)","D":"在臺灣,喝酒、抽菸與食道腺癌(adenocarcinoma)有高度相關"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"113070-25","topic":"食道外科","topic_code":"T1","id":"113070-25","q_num":25,"src":"民國113年第二次","img":""},{"exam_code":"113070","roc_year":113,"exam_ },"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114070-45","topic":"小兒外科(消化道)","topic_code":"T8","id":"114070-45","q_num":45,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":46,"stem":"一名體重約2.5 公斤的女嬰,出生時有呼吸窘迫、腹部凹陷的現象。X 光檢查發現在左側胸腔內充滿腸氣(如圖)。下列敘述何者錯誤?","options":{"A":"此新生兒為先天性橫膈疝氣(congenital diaphragmatic hernia),其腸道經由橫膈缺損處進入胸腔","B":"此疾病的發生原因尚未十分清楚,但推測可能是在胚胎時期,胸腹膜管(pleuroperitoneal canal)沒有正常閉合造成,約80%發生在左側","C":"肺動脈高壓(pulmonary hypertension)常是罹患此病新生兒的致死原因","D":"因為腹部臟器在胸腔,會嚴重影響新生兒的呼吸與換氣,因此在出生後要立即安排緊急手術將腹部臟器復位並修補橫膈缺損"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114070-46","topic":"小兒外科(消化道)","topic_code":"T8","id":"114070-46","q_num":46,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":50,"stem":"關於大腸直腸癌的敘述,下列何者錯誤?","options":{"A":"絕大部分大腸直腸癌的生成是因為後天的基因突變","B":"在部分的大腸直腸癌病患的檢體中會發現K-ras 基因突變","C":"第三期結腸癌病患手術後都應接受標靶藥物治療","D":"目前的大腸直腸癌標靶藥物有針對血管新生因子(VEGF)及上皮細胞受器(EGFR)兩大類"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-50","topic":"大腸直腸外科","topic_code":"T4","id":"114070-50","q_num":50,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":51,"stem":"35 歲男性主訴2 週前用力解便後開始出現肛門疼痛,偶爾解便出血。在門診以肛門鏡檢查,發現肛門後側有一0.5 公分傷口,肛門外出現皮膚突起(skin tag),其最可能的診斷為何?","options":{"A":"痔瘡脫出(hemorrhoids prolapse)","B":"肛門膿瘍(abscess)","C":"肛裂(anal fissure)","D":"肛門瘻管(fistula in ano)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-51","topic":"肛門直腸良性疾病","topic_code":"T5","id":"114070-51","q_num":51,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":52,"stem":"60 歲男性,過去病史有高血壓,自訴從三個月前開始陸續解血便,近一個月有食慾不振,容易腹脹及排便習慣改變等症狀,體重在這一個月內由75 公斤下降至69 公斤。在診所接受乙狀結腸鏡檢查後,發現在乙狀結腸(距離肛門約20 公分處)有腫瘤,切片病理報告為惡性腫瘤。依據上述情況,下列敘述何者錯誤?","options":{"A":"可建議患者接受完整大腸鏡檢查,藉此確認右側大腸是否同時有腫瘤","B":"大多數的大腸惡性腫瘤為偶發性,且多數由腺性息肉轉變而來(adenoma-carcinoma sequence)","C":"如患者惡性腫瘤評估可以手術切除,根據大型臨床試驗如Colon Carcinoma Laparoscopic or OpenResection (COLOR)trial 的結果,應建議患者接受傳統開腹手術,而非腹腔鏡手術來切除惡性腫瘤","D":"安排患者接受影像學檢查(應包括胸腔,腹腔及骨盆腔),藉此來評估臨床分期"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-52","topic":"大腸直腸外科","topic_code":"T4","id":"114070-52","q_num":52,"src":"民國114年第二次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":76,"stem":"有關腸阻塞病人至急診,下列敘述何者最適當?","options":{"A":"小腸阻塞發生的機率多於大腸阻塞機率","B":"腸阻塞病人腸子蠕動變快,抗痙攣藥物如Buscopan(hyoscine butylbromide)應儘早使用","C":"常見血液中脂肪酶(lipase)濃度會上升5 倍以上","D":"小腸阻塞很少是因為疝氣或手術後造成的"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"114070-76","topic":"外科原則","topic_code":"T9","id":"114070-76","q_num":76,"src":"民國114年第二次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":6,"stem":"下列何者不是食道穿孔治療的重要原則?","options":{"A":"積極的引流控制感染","B":"早期診斷與治療","C":"維持腸道營養","D":"保留食道切勿切除"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-6","topic":"食道外科","topic_code":"T1","id":"115020-6","q_num":6,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":10,"stem":"腹股溝深環(deep inguinal ring)位於下列何結構?","options":{"A":"腹外斜肌腱膜(aponeurosis of external oblique muscle)","B":"腹內斜肌(internal oblique muscle)","C":"腹橫筋膜(transversalis fascia)","D":"錐狀肌(pyramidalis muscle)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"115020-10","topic":"腹壁疝氣","topic_code":"T7","id":"115020-10","q_num":10,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":15,"stem":"51 歲女性患者,每月仍有固定月經週期,近一年來體重緩慢下降且偶爾有飽餐後腹漲不適的感覺,但因腹部不適持續的時間不長,也就不以為意。在接受成人健康檢查時,發現血色素低到7.0 g/dL,且糞便潛血呈現陽性反應。在接受大腸鏡鏡檢時,意外發現升結腸有快要堵住腸腔的腫瘤,腸鏡也因腸道狹窄無法穿過腫瘤到達cecum。腸鏡切片結果為adenocarcinoma, microsatellite stable(MSS)。在電腦斷層檢查後,發現腫瘤疑似有侵犯臟層腹膜(visceral peritoneum),腫瘤附近可見6 顆直徑大於1 公分腫大的淋巴結,其他器官則沒有明顯轉移跡象。根據檢查結果,下列敘述何者錯誤?","options":{"A":"罹患右側大腸癌比左側大腸直腸癌易出現貧血的臨床表現","B":"此患者的臨床分期為cT3N2bM0","C":"對於此患者,標準的手術術式為radical right hemicolectomy with lymph node dissection","D":"目前的研究認為,immunotherapy 對於MSS 的colon adenocarcinoma 效果有限"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-15","topic":"大腸直腸外科","topic_code":"T4","id":"115020-15","q_num":15,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":16,"stem":"關於大腸憩室炎之敘述,下列何者正確?","options":{"A":"急性發作時,大腸鏡檢查是適合的處置","B":"目前的治療指南對於非複雜性的大腸憩室炎應進行手術切除","C":"膿瘍不管大小,一律建議在電腦斷層或腹部超音波下先進行經皮引流(percutaneous drainage)","D":"急性非複雜型的憩室炎在緩解後4~8 週要進行大腸鏡檢查"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-16","topic":"大腸直腸外科","topic_code":"T4","id":"115020-16","q_num":16,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":41,"stem":"關於Ivor Lewis 式食道切除術的描述,下列何者正確?","options":{"A":"Ivor Lewis 式食道切除術是一種微創手術,傷口小,恢復快","B":"主要適用於食道上段腫瘤","C":"需進行胸腔與上腹部的淋巴結清掃","D":"術後併發症發生率小於5%"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"115020-41","topic":"食道外科","topic_code":"T1","id":"115020-41","q_num":41,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":42,"stem":"關於腹股溝疝氣手術後復發之描述,何者最不適當?","options":{"A":"造成復發常見的原因與手術技術有關(technical factors)","B":"間接型疝氣相對於直接型疝氣,修補後比較容易復發","C":"大約有5~10%的股疝氣(femoral hernia)會在疝氣復發時被發現","D":"使用無張力(tension-free)與人造網膜(mesh)修補,可以有效降低再復發的機會"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-42","topic":"腹壁疝氣","topic_code":"T7","id":"115020-42","q_num":42,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":45,"stem":"胃食道逆流(gastroesophageal reflux disease, GERD)是相當常見的下食道疾病,通常是因為下食道括約肌的收縮功能異常,導致胃內容物逆流造成食道傷害。關於此疾病,下列敘述何者最不適當?","options":{"A":"大多數患者會出現胸口燒灼感(heartburn)的症狀","B":"通常建議改變生活飲食習慣,如減肥、戒菸、少量多餐可減緩症狀","C":"以制酸劑減少胃酸分泌,再加上改變生活飲食習慣可以治癒大多數患者","D":"手術治療以重建下食道括約肌為主,需要實施近端胃部切除再重建"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-45","topic":"食道外科","topic_code":"T1","id":"115020-45","q_num":45,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":49,"stem":"2 歲男童因反覆無痛性大量暗紅色便(melena)至急診就醫。理學檢查穩定,腹部軟,無壓痛。實驗室顯示輕度貧血。懷疑Meckel diverticulum。下列那一項初步處置或診斷方式最適當?","options":{"A":"腹部X 光可確定是否為Meckel diverticulum 出血","B":"立即行小腸攝影檢查確認病灶位置","C":"99mTc-pertechnetate 掃描檢查異位胃黏膜","D":"安排腹腔鏡立即切除並送病理以確認診斷"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"115020-49","topic":"小兒外科(消化道)","topic_code":"T8","id":"115020-49","q_num":49,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":50,"stem":"關於兒童腹股溝疝氣之敘述,下列何者最適當?","options":{"A":"兒童腹股溝疝氣發生的原因大多來自於大聲哭鬧,導致破壞腹壁肌肉組織強度,是直接型的疝氣(directtype)","B":"治療方式,應該予以植入人工網膜來補強其結構","C":"手術時機考量到麻醉的風險,應該年齡大於3 歲或體重10 公斤以上進行,較為安全","D":"手術的併發症包括輸精管以及睪丸血管損傷等,不易於手術中察覺"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-50","topic":"小兒外科(消化道)","topic_code":"T8","id":"115020-50","q_num":50,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":53,"stem":"關於兒童誤食或誤吸入異物的相關敘述,下列何者最不恰當?","options":{"A":"花生可能阻塞氣道造成支氣管擴張症(bronchiectasis),也容易因為其中的油脂成分引起氣道刺激與肺炎","B":"氣道異物吸入,最常見的停留位置是左側支氣管","C":"硬幣卡在上食道時,可嘗試使用咽喉鏡(laryngoscopy)輔助取出","D":"若誤食電池且在食道停留時間過久,可能引起食道黏膜及周邊組織的傷害,可以視為急症"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-53","topic":"小兒外科(消化道)","topic_code":"T8","id":"115020-53","q_num":53,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":54,"stem":"關於大腸直腸外科術後加速康復計畫(enhanced recovery protocol, ERP)的術前及術中處置,下列敘述何者正確?","options":{"A":"術前僅使用機械性腸道準備即可有效降低術後感染風險","B":"進行左側或直腸切除手術時,機械性腸道準備結合口服抗生素是目前常見的術前準備方式","C":"硫噴妥鈉(gabapentin)和鴉片類藥物是術後疼痛管理的首選方式,可促進腸功能恢復","D":"腹腔引流管應常規使用,以減少術後感染及腸道功能障礙"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-54","topic":"外科原則","topic_code":"T9","id":"115020-54","q_num":54,"src":"民國115年第一次","img":""}],E={"101030-32":{"quick":"錯在 C:與 achalasia 相關的食道癌是「鱗狀細胞癌」而非腺癌。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"正確:全球食道癌以鱗狀細胞癌最常見。","B":"正確:西方制酸劑使用(反映 GERD)與下段腺癌相關。","C":"★錯誤(本題答案):achalasia 相關食道癌為鱗狀細胞癌。","D":"正確:評估 N 分期 PET 正確性優於 CT。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"102030-36":{"quick":"正確為 B:Boerhaave 自發性食道破裂常發生在「劇烈嘔吐」後。","detail":{"background":"食道穿孔/破裂:自發性破裂(Boerhaave)常見於「劇烈嘔吐」後、破裂處多在「遠端左後外側」;醫源性(內視鏡)最常見。表現:胸痛、皮下氣腫、縱膈/胸膜感染,延誤>24 小時死亡率>50%。診斷首選「水溶性對比劑食道攝影或 CT」(不宜先用內視鏡,恐加重)。治療原則:早期診斷、清除污染、廣泛引流控制感染源、維持腸道營養;<12–24 小時可一期修補,延遲者「引流/控制感染源」比一期修補更重要;嚴重毀損或情況差者考慮支架/食道切除轉流,並非一律保留食道。","options":{"A":"錯:為自發性,非外傷相關。","B":"★正確(本題答案):劇烈嘔吐後致食道內壓驟升而破裂。","C":"錯:破裂處多在遠端(左後外側),非頸部。","D":"錯:須手術(引流/修補),非單靠抗生素。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"102110-28":{"quick":"最多者為 A:Type I 滑動型約佔 95%。","detail":{"background":"橫膈食道裂孔疝氣分型:Type I「滑動型(sliding,最常見約 95%)」—胃食道接合處上移,常伴胃酸逆流;Type II「食道旁(paraesophageal/rolling)」—胃底經食道旁疝入胸腔、接合處仍在腹腔;Type III「混合型」;Type IV—胃以外器官(大腸等)疝入胸腔。滑動型多無需手術(以抗逆流治療);食道旁疝氣有胃扭轉/嵌頓/壞死風險,「有症狀」者應修補(無症狀年長者可觀察),症狀以阻塞性(吞嚥困難)為主而非逆流;修補後常加抗逆流手術。","options":{"A":"★正確(本題答案):Type I 滑動型最常見(~95%)。","B":"Type II 食道旁疝氣較少。","C":"Type III 混合型較少。","D":"Type IV 罕見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"102110-32":{"quick":"GERD 黃金標準為 D:24 小時動態 pH 監測。","detail":{"background":"胃食道逆流(GERD):下食道括約肌(LES)壓力/長度/鬆弛異常+胃排空延遲致胃內容物逆流。正常人也有生理性逆流;診斷黃金標準為「24 小時動態 pH 監測」。治療階梯:生活型態調整(減重、戒菸、少量多餐、抬床頭)+質子幫浦抑制劑(PPI)為第一線。手術(抗逆流手術,如 Nissen 360°/Toupet 270°/Dor 部分包覆)適應症:PPI 治療失敗/無效、出現併發症(嚴重食道炎/潰瘍/狹窄/Barrett)、或病人不願長期服藥。可有食道外症狀(氣喘、夜咳、喉炎)。Barrett 食道=長期逆流致食道遠端鱗狀上皮化生為「腸化生柱狀上皮」,腺癌風險升高約 30–40 倍,需追蹤。","options":{"A":"雙重對比食道攝影非黃金標準。","B":"內視鏡看食道炎/併發症,非診斷逆流黃金標準。","C":"測壓評估蠕動/LES,非診斷逆流黃金標準。","D":"★正確(本題答案):24 小時 pH 監測為診斷 GERD 黃金標準。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"103030-31":{"quick":"錯在 C:食道三狹窄為環咽肌、主動脈弓/左主支氣管、橫膈處,非「肺靜脈」交會處。","detail":{"background":"食道有三個生理性狹窄:①環咽肌(cricopharyngeus,~會厭軟骨/C6 高度,最窄)；②主動脈弓與左主支氣管交會處(中段)；③穿過橫膈裂孔處(下段)。這些是異物與腐蝕傷易滯留處。","options":{"A":"正確:環咽肌處。","B":"正確:左主支氣管交會處。","C":"★錯誤(本題答案):無「肺靜脈」交會狹窄。","D":"正確:橫膈交會處。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"103100-29":{"quick":"錯在 C:正常人也會有生理性胃液逆流,並非「絕不會」。","detail":{"background":"胃食道逆流(GERD):下食道括約肌(LES)壓力/長度/鬆弛異常+胃排空延遲致胃內容物逆流。正常人也有生理性逆流;診斷黃金標準為「24 小時動態 pH 監測」。治療階梯:生活型態調整(減重、戒菸、少量多餐、抬床頭)+質子幫浦抑制劑(PPI)為第一線。手術(抗逆流手術,如 Nissen 360°/Toupet 270°/Dor 部分包覆)適應症:PPI 治療失敗/無效、出現併發症(嚴重食道炎/潰瘍/狹窄/Barrett)、或病人不願長期服藥。可有食道外症狀(氣喘、夜咳、喉炎)。Barrett 食道=長期逆流致食道遠端鱗狀上皮化生為「腸化生柱狀上皮」,腺癌風險升高約 30–40 倍,需追蹤。","options":{"A":"正確:主要由 LES 功能控制。","B":"正確:胃排空延遲可加重逆流。","C":"★錯誤(本題答案):正常人有生理性逆流。","D":"正確:LES 壓力與長度決定逆流。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"103100-30":{"quick":"錯在 A:腐蝕傷後的消化道「重建」應「延遲」至疤痕穩定(常 6 個月以上),非一律 3–6 個月內完成。","detail":{"background":"腐蝕性食道傷害(強鹼致液化壞死最嚴重):急性期禁催吐/禁中和/禁盲目放 NG 管,維持呼吸道、評估範圍(可小心內視鏡分級)。長期併發狹窄與「食道癌風險增約 1000 倍」。重建器官常用「胃」(或大腸),重建時機應延後至急性發炎與疤痕穩定(常 6 個月以上),非一律 3–6 個月內。","options":{"A":"★錯誤(本題答案):重建應延遲至疤痕穩定,非限 3–6 個月內。","B":"正確:食道癌風險增約 1000 倍。","C":"正確:開胸切除較不開胸(經食道裂孔鈍性剝離)安全評估之描述。","D":"正確:胃為常用重建器官。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"104030-31":{"quick":"食道憩室最佳診斷工具為 C:鋇劑食道攝影。","detail":{"background":"食道憩室分:Zenker(咽食道,壓出型/偽憩室,最常見)、中段(牽引型/真憩室)、橫膈上(epiphrenic,壓出型)。診斷首選「鋇劑食道攝影」(動態顯示囊袋與蠕動);內視鏡有刺破風險需小心。","options":{"A":"CT 非首選。","B":"MRI 非首選。","C":"★正確(本題答案):鋇劑食道攝影最佳。","D":"胃鏡有刺破憩室風險,非首選。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"104090-24":{"quick":"錯在 C:achalasia 食道體部是「無蠕動」,不是蠕動壓力過高。","detail":{"background":"賁門失弛緩症(achalasia):下食道括約肌(LES)神經節退化/受損(Auerbach 叢),致 LES「無法放鬆」+食道體部「無蠕動(aperistalsis)」。症狀:吞嚥困難(固體與液體皆是)、食物逆流、體重減輕、吸入性肺炎。鋇劑見「鳥嘴狀(bird-beak)」狹窄+近端食道擴張;確診以食道高解析測壓(manometry,標準工具):LES 鬆弛不全+食道無蠕動+LES 壓力高。治療:氣球擴張、肉毒桿菌注射(暫時)、Heller 肌肉切開術(最常用,常加 Dor/Toupet 部分包覆抗逆流);末期巨食道需切除重建。長期(>20 年)有惡性變化風險,為「鱗狀細胞癌」。Chagas 病(Trypanosoma cruzi)可致續發性 achalasia。","options":{"A":"正確:食道無正常蠕動。","B":"正確:LES 無法正常放鬆。","C":"★錯誤(本題答案):為無蠕動,非蠕動壓力過高。","D":"正確:LES 壓力過高。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"104090-25":{"quick":"上段食道癌多為 A:鱗狀細胞癌。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"★正確(本題答案):上/中段食道癌多為鱗狀細胞癌。","B":"腺癌好發下段(Barrett)。","C":"肉瘤罕見。","D":"腺鱗癌罕見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"104090-28":{"quick":"正確為 B(234):食道三狹窄=環咽/會厭軟骨附近(2)、主動脈或氣管分岔處(4)、近橫膈處(3);非鄰近左心房(1)。","detail":{"background":"食道三生理狹窄:環咽肌(會厭軟骨附近)、主動脈弓/氣管分岔(左主支氣管)、橫膈裂孔。左心房雖在食道前方(故 TEE 可看心臟),但非「狹窄」處。","options":{"A":"123:含 1(左心房,非狹窄)。","B":"★正確(本題答案):2、3、4。","C":"134:含 1,錯。","D":"124:含 1,錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"105020-25":{"quick":"食道癌 T 分期最準為 B:內視鏡超音波(EUS)。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"CT 看遠端轉移較佳,T 分期不如 EUS。","B":"★正確(本題答案):EUS 評估腫瘤侵犯深度(T)最準。","C":"MRI 非首選。","D":"PET 看遠端/代謝,非 T 分期。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"105020-27":{"quick":"最常見臨床表現為 C:漸進性吞嚥困難。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"發燒非典型。","B":"胸痛非最常見。","C":"★正確(本題答案):漸進性吞嚥困難(先固體後液體)。","D":"逆流非食道癌最常見表現。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"105100-29":{"quick":"正確為 D(134):1 可經開胸或開腹施行、3 LES 肌肉切開(Heller)最常用、4 加胃底折疊減少術後逆流;2 錯(多數不需切除重建)。","detail":{"background":"賁門失弛緩症(achalasia):下食道括約肌(LES)神經節退化/受損(Auerbach 叢),致 LES「無法放鬆」+食道體部「無蠕動(aperistalsis)」。症狀:吞嚥困難(固體與液體皆是)、食物逆流、體重減輕、吸入性肺炎。鋇劑見「鳥嘴狀(bird-beak)」狹窄+近端食道擴張;確診以食道高解析測壓(manometry,標準工具):LES 鬆弛不全+食道無蠕動+LES 壓力高。治療:氣球擴張、肉毒桿菌注射(暫時)、Heller 肌肉切開術(最常用,常加 Dor/Toupet 部分包覆抗逆流);末期巨食道需切除重建。長期(>20 年)有惡性變化風險,為「鱗狀細胞癌」。Chagas 病(Trypanosoma cruzi)可致續發性 achalasia。","options":{"A":"123:含 2(多需切除,錯)。","B":"124:含 2,錯。","C":"234:含 2,錯。","D":"★正確(本題答案):1、3、4。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"106080-20":{"quick":"錯在 B:GERD 手術適應症是「PPI 失敗/有併發症/不願長期服藥」;單純「預期需 PPI 超過 5 年」但控制良好者並非手術適應症。","detail":{"background":"胃食道逆流(GERD):下食道括約肌(LES)壓力/長度/鬆弛異常+胃排空延遲致胃內容物逆流。正常人也有生理性逆流;診斷黃金標準為「24 小時動態 pH 監測」。治療階梯:生活型態調整(減重、戒菸、少量多餐、抬床頭)+質子幫浦抑制劑(PPI)為第一線。手術(抗逆流手術,如 Nissen 360°/Toupet 270°/Dor 部分包覆)適應症:PPI 治療失敗/無效、出現併發症(嚴重食道炎/潰瘍/狹窄/Barrett)、或病人不願長期服藥。可有食道外症狀(氣喘、夜咳、喉炎)。Barrett 食道=長期逆流致食道遠端鱗狀上皮化生為「腸化生柱狀上皮」,腺癌風險升高約 30–40 倍,需追蹤。","options":{"A":"是適應症:PPI 無效。","B":"★錯誤(本題答案):控制良好僅長期服藥並非手術適應症。","C":"是適應症:合併嚴重潰瘍(併發症)。","D":"是適應症:Barrett 黏膜。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"107020-29":{"quick":"正確為 A:滑動型(type I)常伴胃酸逆流。","detail":{"background":"橫膈食道裂孔疝氣分型:Type I「滑動型(sliding,最常見約 95%)」—胃食道接合處上移,常伴胃酸逆流;Type II「食道旁(paraesophageal/rolling)」—胃底經食道旁疝入胸腔、接合處仍在腹腔;Type III「混合型」;Type IV—胃以外器官(大腸等)疝入胸腔。滑動型多無需手術(以抗逆流治療);食道旁疝氣有胃扭轉/嵌頓/壞死風險,「有症狀」者應修補(無症狀年長者可觀察),症狀以阻塞性(吞嚥困難)為主而非逆流;修補後常加抗逆流手術。","options":{"A":"★正確(本題答案):滑動型 type I 常伴逆流。","B":"錯:大腸小腸疝入是 type IV,非 paraesophageal。","C":"錯:可合併出現(混合型 III)。","D":"錯:多數滑動型不需手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"107080-26":{"quick":"錯在 B:長期 achalasia 易致「鱗狀細胞癌」,非腺癌。","detail":{"background":"賁門失弛緩症(achalasia):下食道括約肌(LES)神經節退化/受損(Auerbach 叢),致 LES「無法放鬆」+食道體部「無蠕動(aperistalsis)」。症狀:吞嚥困難(固體與液體皆是)、食物逆流、體重減輕、吸入性肺炎。鋇劑見「鳥嘴狀(bird-beak)」狹窄+近端食道擴張;確診以食道高解析測壓(manometry,標準工具):LES 鬆弛不全+食道無蠕動+LES 壓力高。治療:氣球擴張、肉毒桿菌注射(暫時)、Heller 肌肉切開術(最常用,常加 Dor/Toupet 部分包覆抗逆流);末期巨食道需切除重建。長期(>20 年)有惡性變化風險,為「鱗狀細胞癌」。Chagas 病(Trypanosoma cruzi)可致續發性 achalasia。","options":{"A":"正確:LES 支配神經受損。","B":"★錯誤(本題答案):惡性變化為鱗狀細胞癌。","C":"正確:典型三症狀。","D":"正確:外科治療為肌肉切開術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"107080-72":{"quick":"錯在 A:全球食道癌以鱗狀細胞癌最常見,非「95% 腺癌」。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"★錯誤(本題答案):非 95% 腺癌(全球以 SCC 為主)。","B":"正確:可分腫塊/潰瘍/浸潤型。","C":"正確:早期為小斑塊/表淺潰瘍。","D":"正確:Plummer-Vinson 增加食道癌風險。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"108030-31":{"quick":"胃底折疊術「不」用於 C:血管環(vascular ring)。","detail":{"background":"胃底折疊術(fundoplication)用於抗胃酸逆流:GERD、食道裂孔疝氣修補後、與 Heller 肌肉切開術合併(Dor/Toupet,治 achalasia 並防術後逆流)。血管環(vascular ring)是大血管異常壓迫氣管/食道,治療為分離血管環,與胃底折疊無關。","options":{"A":"用於:裂孔疝氣修補。","B":"用於:GERD。","C":"★不用於(本題答案):血管環需分離血管,非胃底折疊。","D":"用於:achalasia 肌肉切開後加部分折疊。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"108080-20":{"quick":"achalasia 黃金標準為 C:食道測壓(manometry)。","detail":{"background":"賁門失弛緩症(achalasia):下食道括約肌(LES)神經節退化/受損(Auerbach 叢),致 LES「無法放鬆」+食道體部「無蠕動(aperistalsis)」。症狀:吞嚥困難(固體與液體皆是)、食物逆流、體重減輕、吸入性肺炎。鋇劑見「鳥嘴狀(bird-beak)」狹窄+近端食道擴張;確診以食道高解析測壓(manometry,標準工具):LES 鬆弛不全+食道無蠕動+LES 壓力高。治療:氣球擴張、肉毒桿菌注射(暫時)、Heller 肌肉切開術(最常用,常加 Dor/Toupet 部分包覆抗逆流);末期巨食道需切除重建。長期(>20 年)有惡性變化風險,為「鱗狀細胞癌」。Chagas 病(Trypanosoma cruzi)可致續發性 achalasia。","options":{"A":"鋇劑攝影見鳥嘴,非確診黃金標準。","B":"內視鏡排除假性失弛緩(腫瘤),非黃金標準。","C":"★正確(本題答案):測壓為診斷黃金標準。","D":"pH 監測用於 GERD。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"109020-21":{"quick":"錯在 C:食道破裂手術治療常為「必要」,非「非必要」。","detail":{"background":"食道穿孔/破裂:自發性破裂(Boerhaave)常見於「劇烈嘔吐」後、破裂處多在「遠端左後外側」;醫源性(內視鏡)最常見。表現:胸痛、皮下氣腫、縱膈/胸膜感染,延誤>24 小時死亡率>50%。診斷首選「水溶性對比劑食道攝影或 CT」(不宜先用內視鏡,恐加重)。治療原則:早期診斷、清除污染、廣泛引流控制感染源、維持腸道營養;<12–24 小時可一期修補,延遲者「引流/控制感染源」比一期修補更重要;嚴重毀損或情況差者考慮支架/食道切除轉流,並非一律保留食道。","options":{"A":"正確:延誤>1 天死亡率常>50%。","B":"正確:常有頸胸皮下氣腫。","C":"★錯誤(本題答案):多數需手術(引流/修補)。","D":"正確:常合併膿胸與縱膈炎。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"110020-25":{"quick":"較不適當為 D:Nissen 是「360°完全」折疊,非部分折疊。","detail":{"background":"胃食道逆流(GERD):下食道括約肌(LES)壓力/長度/鬆弛異常+胃排空延遲致胃內容物逆流。正常人也有生理性逆流;診斷黃金標準為「24 小時動態 pH 監測」。治療階梯:生活型態調整(減重、戒菸、少量多餐、抬床頭)+質子幫浦抑制劑(PPI)為第一線。手術(抗逆流手術,如 Nissen 360°/Toupet 270°/Dor 部分包覆)適應症:PPI 治療失敗/無效、出現併發症(嚴重食道炎/潰瘍/狹窄/Barrett)、或病人不願長期服藥。可有食道外症狀(氣喘、夜咳、喉炎)。Barrett 食道=長期逆流致食道遠端鱗狀上皮化生為「腸化生柱狀上皮」,腺癌風險升高約 30–40 倍,需追蹤。","options":{"A":"正確:生活型態+PPI 為第一線。","B":"正確:內科到極限仍有症狀可手術。","C":"正確:長期 PPI 與胃神經內分泌(類癌)增生風險之描述。","D":"★較不適當(本題答案):Nissen 為 360°完全折疊。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"110080-25":{"quick":"正確為 B:中段食道憩室多為「右側的真性憩室(牽引型)」。","detail":{"background":"食道憩室:Zenker(咽食道,壓出型偽憩室,以鋇劑攝影診斷)、中段(牽引型/真憩室,常因縱膈淋巴結牽引,多在右側)、橫膈上(壓出型偽憩室,常合併蠕動異常)。Nissen 360° 並非一律較佳(易致吞嚥困難,蠕動差者用部分折疊);腐蝕傷不應盲放 NG 管。","options":{"A":"錯:Zenker 以鋇劑攝影診斷為主。","B":"★正確(本題答案):中段為右側真性(牽引型)憩室。","C":"錯:360° 非一律較佳。","D":"錯:腐蝕傷不應盲放 NG 管。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"110080-26":{"quick":"不適當為 A:食道穿孔不宜「先以食道鏡」為優先診斷(恐加重穿孔),應先水溶性對比劑攝影/CT。","detail":{"background":"食道穿孔/破裂:自發性破裂(Boerhaave)常見於「劇烈嘔吐」後、破裂處多在「遠端左後外側」;醫源性(內視鏡)最常見。表現:胸痛、皮下氣腫、縱膈/胸膜感染,延誤>24 小時死亡率>50%。診斷首選「水溶性對比劑食道攝影或 CT」(不宜先用內視鏡,恐加重)。治療原則:早期診斷、清除污染、廣泛引流控制感染源、維持腸道營養;<12–24 小時可一期修補,延遲者「引流/控制感染源」比一期修補更重要;嚴重毀損或情況差者考慮支架/食道切除轉流,並非一律保留食道。","options":{"A":"★不適當(本題答案):不宜先食道鏡,應先對比劑攝影/CT。","B":"正確:證實後立即治療。","C":"正確:<12 小時可考慮修補縫合。","D":"正確:情況差年長者可考慮支架。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"111020-34":{"quick":"非治療 GERD 之術式為 C:Kocher(十二指腸游離手法),非胃底折疊。","detail":{"background":"胃食道逆流(GERD):下食道括約肌(LES)壓力/長度/鬆弛異常+胃排空延遲致胃內容物逆流。正常人也有生理性逆流;診斷黃金標準為「24 小時動態 pH 監測」。治療階梯:生活型態調整(減重、戒菸、少量多餐、抬床頭)+質子幫浦抑制劑(PPI)為第一線。手術(抗逆流手術,如 Nissen 360°/Toupet 270°/Dor 部分包覆)適應症:PPI 治療失敗/無效、出現併發症(嚴重食道炎/潰瘍/狹窄/Barrett)、或病人不願長期服藥。可有食道外症狀(氣喘、夜咳、喉炎)。Barrett 食道=長期逆流致食道遠端鱗狀上皮化生為「腸化生柱狀上皮」,腺癌風險升高約 30–40 倍,需追蹤。","options":{"A":"Nissen 360° 抗逆流。","B":"Toupet 270° 抗逆流。","C":"★非(本題答案):Kocher 是十二指腸游離手法。","D":"Dor 部分前折疊抗逆流。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"111020-35":{"quick":"錯在 B:T1 侵犯黏膜固有層/黏膜下層,侵犯「肌肉層(muscularis propria)」是 T2。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"正確:Tis=高度分化不良。","B":"★錯誤(本題答案):侵犯肌肉層為 T2,非 T1。","C":"正確:T3 侵犯外膜。","D":"正確:T4b 侵犯氣管或主動脈。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"111020-42":{"quick":"Barrett、PPI 無效、無裂孔疝氣、蠕動正常→較合適為 D:Nissen 抗逆流手術。","detail":{"background":"胃食道逆流(GERD):下食道括約肌(LES)壓力/長度/鬆弛異常+胃排空延遲致胃內容物逆流。正常人也有生理性逆流;診斷黃金標準為「24 小時動態 pH 監測」。治療階梯:生活型態調整(減重、戒菸、少量多餐、抬床頭)+質子幫浦抑制劑(PPI)為第一線。手術(抗逆流手術,如 Nissen 360°/Toupet 270°/Dor 部分包覆)適應症:PPI 治療失敗/無效、出現併發症(嚴重食道炎/潰瘍/狹窄/Barrett)、或病人不願長期服藥。可有食道外症狀(氣喘、夜咳、喉炎)。Barrett 食道=長期逆流致食道遠端鱗狀上皮化生為「腸化生柱狀上皮」,腺癌風險升高約 30–40 倍,需追蹤。","options":{"A":"Heller 肌肉切開是治 achalasia,非 GERD。","B":"袖狀胃切除是減重術,非抗逆流。","C":"膽胰分流是減重術。","D":"★正確(本題答案):Nissen 胃底折疊抗逆流。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"111020-72":{"quick":"吞嚥困難+反覆吸入性肺炎+鋇劑鳥嘴→A:achalasia。","detail":{"background":"賁門失弛緩症(achalasia):下食道括約肌(LES)神經節退化/受損(Auerbach 叢),致 LES「無法放鬆」+食道體部「無蠕動(aperistalsis)」。症狀:吞嚥困難(固體與液體皆是)、食物逆流、體重減輕、吸入性肺炎。鋇劑見「鳥嘴狀(bird-beak)」狹窄+近端食道擴張;確診以食道高解析測壓(manometry,標準工具):LES 鬆弛不全+食道無蠕動+LES 壓力高。治療:氣球擴張、肉毒桿菌注射(暫時)、Heller 肌肉切開術(最常用,常加 Dor/Toupet 部分包覆抗逆流);末期巨食道需切除重建。長期(>20 年)有惡性變化風險,為「鱗狀細胞癌」。Chagas 病(Trypanosoma cruzi)可致續發性 achalasia。","options":{"A":"★正確(本題答案):鳥嘴狀狹窄為 achalasia。","B":"GERD 不致鳥嘴狀。","C":"胃淋巴瘤位於胃。","D":"裂孔疝氣影像不同。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"111080-25":{"quick":"最不適當為 C:延遲性食道破裂,「引流/控制感染源」比一期修補更重要(延遲修補易失敗)。","detail":{"background":"食道穿孔/破裂:自發性破裂(Boerhaave)常見於「劇烈嘔吐」後、破裂處多在「遠端左後外側」;醫源性(內視鏡)最常見。表現:胸痛、皮下氣腫、縱膈/胸膜感染,延誤>24 小時死亡率>50%。診斷首選「水溶性對比劑食道攝影或 CT」(不宜先用內視鏡,恐加重)。治療原則:早期診斷、清除污染、廣泛引流控制感染源、維持腸道營養;<12–24 小時可一期修補,延遲者「引流/控制感染源」比一期修補更重要;嚴重毀損或情況差者考慮支架/食道切除轉流,並非一律保留食道。","options":{"A":"適當:清除污染。","B":"適當:廣泛引流控制感染源。","C":"★最不適當(本題答案):延遲破裂應以引流為主,非優先一期修補。","D":"適當:早期腸道營養。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"111080-26":{"quick":"正確為 C:反覆 Barrett/逆流長期藥物無效可考慮抗逆流手術。","detail":{"background":"胃食道逆流(GERD):下食道括約肌(LES)壓力/長度/鬆弛異常+胃排空延遲致胃內容物逆流。正常人也有生理性逆流;診斷黃金標準為「24 小時動態 pH 監測」。治療階梯:生活型態調整(減重、戒菸、少量多餐、抬床頭)+質子幫浦抑制劑(PPI)為第一線。手術(抗逆流手術,如 Nissen 360°/Toupet 270°/Dor 部分包覆)適應症:PPI 治療失敗/無效、出現併發症(嚴重食道炎/潰瘍/狹窄/Barrett)、或病人不願長期服藥。可有食道外症狀(氣喘、夜咳、喉炎)。Barrett 食道=長期逆流致食道遠端鱗狀上皮化生為「腸化生柱狀上皮」,腺癌風險升高約 30–40 倍,需追蹤。","options":{"A":"錯:Barrett 是柱狀(腸化生)上皮取代鱗狀,非鱗狀往胃內生長。","B":"錯:Barrett 增加「腺癌」風險(約 30–40 倍),非鱗狀癌。","C":"★正確(本題答案):藥物無效可考慮抗逆流手術。","D":"錯:可有吞嚥困難症狀。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"112020-25":{"quick":"正確為 B:GERD 可引起氣喘(食道外症狀)。","detail":{"background":"胃食道逆流(GERD):下食道括約肌(LES)壓力/長度/鬆弛異常+胃排空延遲致胃內容物逆流。正常人也有生理性逆流;診斷黃金標準為「24 小時動態 pH 監測」。治療階梯:生活型態調整(減重、戒菸、少量多餐、抬床頭)+質子幫浦抑制劑(PPI)為第一線。手術(抗逆流手術,如 Nissen 360°/Toupet 270°/Dor 部分包覆)適應症:PPI 治療失敗/無效、出現併發症(嚴重食道炎/潰瘍/狹窄/Barrett)、或病人不願長期服藥。可有食道外症狀(氣喘、夜咳、喉炎)。Barrett 食道=長期逆流致食道遠端鱗狀上皮化生為「腸化生柱狀上皮」,腺癌風險升高約 30–40 倍,需追蹤。","options":{"A":"錯:GERD 非以手術為最優先。","B":"★正確(本題答案):GERD 可致氣喘等食道外症狀。","C":"錯:heartburn 為 GERD 典型,非 MI。","D":"錯:巨食道是 achalasia,非 GERD。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"112020-26":{"quick":"錯在 B:鳥嘴徵象是 achalasia 的表現,非食道癌診斷標準。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"正確:胃鏡切片確診。","B":"★錯誤(本題答案):鳥嘴徵象為 achalasia。","C":"正確:EMR 可取標本並知侵犯深度。","D":"正確:有吞嚥困難仍應胃鏡。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"112080-25":{"quick":"錯在 B:Zenker 是「偽憩室(壓出型)」,只含黏膜層與黏膜下層,不含肌肉層。","detail":{"background":"食道憩室三型:Zenker(咽食道,壓出型偽憩室,最常見)、氣管旁(中段)、橫膈上(epiphrenic,壓出型偽憩室)。偽憩室=黏膜+黏膜下經肌層薄弱處膨出,不含完整肌層;真憩室含全層(中段牽引型)。","options":{"A":"正確:三型如述。","B":"★錯誤(本題答案):Zenker 為偽憩室,不含肌肉層。","C":"正確:Zenker 最常見。","D":"正確:橫膈上為壓出型偽憩室。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"113020-25":{"quick":"錯在 A:食道淋巴「縱向」引流比橫向豐富,故腫瘤易縱向跳躍/遠處淋巴轉移。","detail":{"background":"食道淋巴引流網絡豐富(比動脈網更密)、主要在「黏膜下層」且以「縱向」引流為主(縱向遠多於橫向),故食道癌易沿黏膜下縱向跳躍轉移、需長段切除與廣泛淋巴清掃;頸段食道短距離即可穿出肌層至局部淋巴結。","options":{"A":"★錯誤(本題答案):縱向引流多於橫向(非橫向多 6 倍)。","B":"正確:淋巴網比動脈網豐富。","C":"正確:主要在黏膜下層。","D":"正確:頸段短距離即穿出至淋巴結。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"113020-26":{"quick":"錯在 D:achalasia 長期惡性變化為「鱗狀細胞癌」,非腺癌。","detail":{"background":"賁門失弛緩症(achalasia):下食道括約肌(LES)神經節退化/受損(Auerbach 叢),致 LES「無法放鬆」+食道體部「無蠕動(aperistalsis)」。症狀:吞嚥困難(固體與液體皆是)、食物逆流、體重減輕、吸入性肺炎。鋇劑見「鳥嘴狀(bird-beak)」狹窄+近端食道擴張;確診以食道高解析測壓(manometry,標準工具):LES 鬆弛不全+食道無蠕動+LES 壓力高。治療:氣球擴張、肉毒桿菌注射(暫時)、Heller 肌肉切開術(最常用,常加 Dor/Toupet 部分包覆抗逆流);末期巨食道需切除重建。長期(>20 年)有惡性變化風險,為「鱗狀細胞癌」。Chagas 病(Trypanosoma cruzi)可致續發性 achalasia。","options":{"A":"正確:測壓為標準診斷。","B":"正確:Chagas 病可致續發性 achalasia。","C":"正確:末期巨食道需切除重建。","D":"★錯誤(本題答案):惡性變化為鱗狀細胞癌。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"113070-25":{"quick":"正確為 A:美國近年食道腺癌發生率已超越鱗狀細胞癌。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"★正確(本題答案):美國腺癌發生率已高於 SCC。","B":"錯:Barrett 與「腺癌」高度相關。","C":"錯:最常見症狀為吞嚥困難。","D":"錯:菸酒與「鱗狀細胞癌」相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"113070-26":{"quick":"正確為 C:食道旁疝氣以「阻塞性(吞嚥困難)」症狀多於逆流。","detail":{"background":"橫膈食道裂孔疝氣分型:Type I「滑動型(sliding,最常見約 95%)」—胃食道接合處上移,常伴胃酸逆流;Type II「食道旁(paraesophageal/rolling)」—胃底經食道旁疝入胸腔、接合處仍在腹腔;Type III「混合型」;Type IV—胃以外器官(大腸等)疝入胸腔。滑動型多無需手術(以抗逆流治療);食道旁疝氣有胃扭轉/嵌頓/壞死風險,「有症狀」者應修補(無症狀年長者可觀察),症狀以阻塞性(吞嚥困難)為主而非逆流;修補後常加抗逆流手術。","options":{"A":"錯:有症狀/有併發風險應修補,非只藥物。","B":"錯:無症狀年長者多觀察,非一律手術。","C":"★正確(本題答案):阻塞性症狀多於逆流。","D":"錯:修補前宜測壓評估,非皆不需。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"113070-30":{"quick":"錯在 A:Pel-Ebstein 熱是「霍奇金淋巴瘤」典型,非縱隔腔感染。","detail":{"background":"縱隔腔感染(mediastinitis):常源自食道穿孔(好氧+厭氧混合感染,最致命)或心臟手術後胸骨感染,沿結締組織快速擴展。治療以「手術引流+廣效抗生素」。Pel-Ebstein 週期性發熱為霍奇金淋巴瘤特徵,與此無關。","options":{"A":"★錯誤(本題答案):Pel-Ebstein 熱為霍奇金淋巴瘤特徵。","B":"正確:沿結締組織擴展。","C":"正確:手術引流+抗生素。","D":"正確:食道穿孔好氧厭氧混合感染最致命。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"114020-25":{"quick":"T2(侵犯肌肉層未超過)+N2(3 顆淋巴)+M0,中度分化→AJCC8 病理分期為 C:IIIB。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"IB 不符(T 較淺、無 N)。","B":"IIB 不符。","C":"★正確(本題答案):T2N2M0 SCC=Stage IIIB。","D":"IVB 為遠端轉移,不符。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"114020-26":{"quick":"局部侵犯+淋巴轉移(stage III)→D:術前同步放化療再手術(neoadjuvant CRT→surgery)。","detail":{"background":"食道癌兩大組織型:鱗狀細胞癌(SCC,全球最常見,與抽菸/喝酒/熱食/亞硝胺/achalasia/腐蝕傷/Plummer-Vinson 相關,好發中上段)與腺癌(adenocarcinoma,與肥胖/GERD/Barrett 食道相關,好發下段;歐美近年發生率已超越 SCC)。最常見症狀為「漸進性吞嚥困難」(先固體後液體)+體重減輕。診斷以胃鏡切片;分期:T 用內視鏡超音波(EUS)最準、N 用 PET/EUS、M 用 CT/PET。AJCC T 分期:Tis(高度分化不良)、T1(黏膜固有層/黏膜下)、T2(肌肉層 muscularis propria)、T3(外膜 adventitia)、T4(鄰近構造,T4b=氣管/主動脈)。早期可內視鏡黏膜切除(EMR);局部侵犯/淋巴轉移(stage II–III)→術前同步放化療(neoadjuvant CRT)再手術(如 Ivor Lewis 食道切除術)。","options":{"A":"直接手術不適合局部進展期。","B":"單純化療再手術非標準。","C":"標靶非首選。","D":"★正確(本題答案):術前同步放化療再手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"114020-29":{"quick":"正確為 C:type II 又稱 rolling(食道旁)疝氣。","detail":{"background":"橫膈食道裂孔疝氣分型:Type I「滑動型(sliding,最常見約 95%)」—胃食道接合處上移,常伴胃酸逆流;Type II「食道旁(paraesophageal/rolling)」—胃底經食道旁疝入胸腔、接合處仍在腹腔;Type III「混合型」;Type IV—胃以外器官(大腸等)疝入胸腔。滑動型多無需手術(以抗逆流治療);食道旁疝氣有胃扭轉/嵌頓/壞死風險,「有症狀」者應修補(無症狀年長者可觀察),症狀以阻塞性(吞嚥困難)為主而非逆流;修補後常加抗逆流手術。","options":{"A":"錯:不一定有症狀。","B":"錯:type I 是滑動型,非食道旁。","C":"★正確(本題答案):type II=rolling/paraesophageal。","D":"錯:type III 是混合型,非滑動。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"114070-28":{"quick":"錯在 D:achalasia 的氣球擴張與肉毒桿菌注射效果「不一樣好」(肉毒效果短暫,氣球擴張較持久)。","detail":{"background":"賁門失弛緩症(achalasia):下食道括約肌(LES)神經節退化/受損(Auerbach 叢),致 LES「無法放鬆」+食道體部「無蠕動(aperistalsis)」。症狀:吞嚥困難(固體與液體皆是)、食物逆流、體重減輕、吸入性肺炎。鋇劑見「鳥嘴狀(bird-beak)」狹窄+近端食道擴張;確診以食道高解析測壓(manometry,標準工具):LES 鬆弛不全+食道無蠕動+LES 壓力高。治療:氣球擴張、肉毒桿菌注射(暫時)、Heller 肌肉切開術(最常用,常加 Dor/Toupet 部分包覆抗逆流);末期巨食道需切除重建。長期(>20 年)有惡性變化風險,為「鱗狀細胞癌」。Chagas 病(Trypanosoma cruzi)可致續發性 achalasia。","options":{"A":"正確:高解析測壓+pH 區分食道功能性疾病。","B":"正確:胡桃夾食道避免咖啡/過冷熱。","C":"正確:瀰漫性食道痙攣以藥物/內視鏡治療。","D":"★錯誤(本題答案):氣球擴張較肉毒注射持久,非一樣好。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"114070-29":{"quick":"較不適當為 C:腐蝕性誤吞「不應」立即放鼻胃管並用生理食鹽水沖洗(恐穿孔/再傷)。","detail":{"background":"誤吞腐蝕性液體處置:維持呼吸道(注意喉部水腫)、廣效抗生素、可小心內視鏡評估分級;禁催吐、禁中和、「禁盲目放 NG 管與沖洗」(增加穿孔與再暴露風險)。","options":{"A":"適當:廣效抗生素。","B":"適當:可小心以胃鏡評估。","C":"★較不適當(本題答案):不應立即放 NG 管沖洗。","D":"適當:注意呼吸道通暢。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"114070-30":{"quick":"最不適當為 A:食道旁疝氣並非「一律手術」;有症狀者修補,無症狀(尤其年長高風險)可觀察。","detail":{"background":"橫膈食道裂孔疝氣分型:Type I「滑動型(sliding,最常見約 95%)」—胃食道接合處上移,常伴胃酸逆流;Type II「食道旁(paraesophageal/rolling)」—胃底經食道旁疝入胸腔、接合處仍在腹腔;Type III「混合型」;Type IV—胃以外器官(大腸等)疝入胸腔。滑動型多無需手術(以抗逆流治療);食道旁疝氣有胃扭轉/嵌頓/壞死風險,「有症狀」者應修補(無症狀年長者可觀察),症狀以阻塞性(吞嚥困難)為主而非逆流;修補後常加抗逆流手術。","options":{"A":"★最不適當(本題答案):非一律手術,依症狀/風險決定。","B":"正確:由裂孔漸寬引起。","C":"正確:胃是最常疝出的器官。","D":"正確:阻塞性症狀最常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"115020-6":{"quick":"不是治療原則者為 D:嚴重毀損的食道未必保留,可能需切除/轉流,「切勿切除」非原則。","detail":{"background":"食道穿孔/破裂:自發性破裂(Boerhaave)常見於「劇烈嘔吐」後、破裂處多在「遠端左後外側」;醫源性(內視鏡)最常見。表現:胸痛、皮下氣腫、縱膈/胸膜感染,延誤>24 小時死亡率>50%。診斷首選「水溶性對比劑食道攝影或 CT」(不宜先用內視鏡,恐加重)。治療原則:早期診斷、清除污染、廣泛引流控制感染源、維持腸道營養;<12–24 小時可一期修補,延遲者「引流/控制感染源」比一期修補更重要;嚴重毀損或情況差者考慮支架/食道切除轉流,並非一律保留食道。","options":{"A":"是原則:積極引流控制感染。","B":"是原則:早期診斷與治療。","C":"是原則:維持腸道營養。","D":"★不是原則(本題答案):嚴重毀損可能需切除,非一律保留。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"115020-41":{"quick":"正確為 C:Ivor Lewis 食道切除術需做「胸腔+上腹部」淋巴清掃(剖腹+右開胸雙切口)。","detail":{"background":"Ivor Lewis 食道切除術:經「腹部(游離胃做管胃)+右開胸(切除食道、做胸內吻合)」的雙切口術式,適用於「中下段」食道腫瘤,需胸腹兩處淋巴結清掃。屬大手術(非微創定義),術後併發症(吻合口漏、肺炎)率遠高於 5%。","options":{"A":"錯:傳統為開放大手術(雖有微創改良)。","B":"錯:適用中下段,非上段。","C":"★正確(本題答案):需胸腔+上腹部淋巴清掃。","D":"錯:併發症率遠高於 5%。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"115020-45":{"quick":"最不適當為 D:抗逆流手術以「重建下食道括約肌(胃底折疊)」為主,不需「近端胃切除再重建」。","detail":{"background":"胃食道逆流(GERD):下食道括約肌(LES)壓力/長度/鬆弛異常+胃排空延遲致胃內容物逆流。正常人也有生理性逆流;診斷黃金標準為「24 小時動態 pH 監測」。治療階梯:生活型態調整(減重、戒菸、少量多餐、抬床頭)+質子幫浦抑制劑(PPI)為第一線。手術(抗逆流手術,如 Nissen 360°/Toupet 270°/Dor 部分包覆)適應症:PPI 治療失敗/無效、出現併發症(嚴重食道炎/潰瘍/狹窄/Barrett)、或病人不願長期服藥。可有食道外症狀(氣喘、夜咳、喉炎)。Barrett 食道=長期逆流致食道遠端鱗狀上皮化生為「腸化生柱狀上皮」,腺癌風險升高約 30–40 倍,需追蹤。","options":{"A":"正確:多數有 heartburn。","B":"正確:生活型態調整可緩解。","C":"正確:制酸劑+生活調整可治癒多數。","D":"★最不適當(本題答案):抗逆流手術為胃底折疊,非近端胃切除重建。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"101030-39":{"quick":"胃黏膜下腫瘤 4 cm(EUS 證實)→最適當為 A:腹腔鏡胃腫瘤(楔狀)切除。","detail":{"background":"胃黏膜下腫瘤(SMT)以 GIST 最常見,表面黏膜完整、EUS 可定位來源層。>2 cm 或有症狀/出血者應切除;GIST 行「楔狀/局部切除取陰性切緣、不需淋巴清掃」,腹腔鏡適合。內視鏡切除不適合 4 cm 深層 SMT(穿孔風險),亦不宜單純觀察或放療。","options":{"A":"★正確(本題答案):腹腔鏡胃腫瘤楔狀切除。","B":"4 cm SMT 不宜只觀察。","C":"內視鏡切除不適合 4 cm 深層 SMT。","D":"GIST/SMT 非放療為主。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"102030-41":{"quick":"RYGB 後早期傾倒症候群:A 正確—症狀與血清素等血管活性物質有關,血清素拮抗劑僅部分改善。","detail":{"background":"胃切除/胃繞道後併發症:傾倒症候群(dumping)—高滲透性食糜快速進入小腸,早期(餐後 15–30 分)有腹脹、噁心、心悸、冒汗、頭暈、腹瀉(液體移入腸腔+血管活性物質如血清素),晚期(1–3 小時)為反應性低血糖。飲食處置:少量多餐、「高蛋白高脂、低單醣」、「避免餐中喝湯/飲料」、餐後平躺;嚴重者 octreotide(對腸胃與血管運動症狀皆有效)。輸入環症候群(afferent loop syndrome,Billroth II)—輸入環阻塞致膽胰液積聚、上腹痛、噴射狀膽汁嘔吐後緩解、amylase 升高。","options":{"A":"★正確(本題答案):與血清素相關,拮抗劑部分改善。","B":"錯:應「高蛋白高脂、低單醣」,非避免蛋白脂肪。","C":"錯:應避免餐中喝湯/飲料。","D":"錯:octreotide 對頭暈心悸(血管運動)亦有效。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"102110-51":{"quick":"較不建議為 B:腹部抽脂不是減重(代謝)手術。","detail":{"background":"減重/代謝手術適應症:BMI≥37.5(或≥32.5 合併共病,亞洲標準)。常見術式:Roux-en-Y 胃繞道、胃袖狀切除、可調式胃束帶、膽胰分流。腹部抽脂(liposuction)是體型雕塑、移除皮下脂肪,「不改善代謝、非減重手術」。","options":{"A":"胃繞道是減重手術。","B":"★較不建議(本題答案):抽脂非減重手術。","C":"胃束帶是減重手術。","D":"胃袖狀切除是減重手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"103030-1":{"quick":"錯在 A:亞全胃切除屬清潔-污染手術,「需要」預防性抗生素。","detail":{"background":"消化道(胃/腸)手術屬「清潔-污染(clean-contaminated)」傷口,應給予「預防性抗生素」(切皮前 60 分內);外科無菌與感染預防原則還包括良好止血、不殘留異物、維持正常體溫(避免低體溫增加感染)、控制血糖。","options":{"A":"★錯誤(本題答案):胃切除需預防性抗生素。","B":"正確:良好止血。","C":"正確:不殘留異物。","D":"正確:維持正常體溫。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"103030-6":{"quick":"錯在 D:食道癌 EMR 條件是大小、侷限黏膜層、侵犯周徑<1/3,「腫瘤位置(中上段)」不是條件。","detail":{"background":"食道癌內視鏡黏膜切除(EMR)適應條件:腫瘤≦2 cm、侷限於黏膜層(未及黏膜下/無淋巴轉移風險)、侵犯周徑小於三分之一圈。腫瘤位於中上或下段「不是」EMR 的限制條件。","options":{"A":"是條件:≦2 cm。","B":"是條件:周徑<1/3。","C":"是條件:侷限黏膜層。","D":"★錯誤(本題答案):位置非 EMR 條件。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"103030-37":{"quick":"正確為 D:太大的胃潰瘍可做迷走神經幹切斷+胃竇切除。","detail":{"background":"消化性潰瘍:H. pylori、NSAID、胃酸三要素。十二指腸潰瘍(DU)~90%、胃潰瘍(GU)~75% 與 H. pylori 相關;DU 多酸分泌過多,GU 酸分泌正常或偏低。modified Johnson 胃潰瘍分型:I 胃小彎(正常/低酸)、II 胃+十二指腸(高酸)、III 幽門前(高酸)、IV 胃近賁門(低酸)、V NSAID 相關(任意位置)。潰瘍手術:迷走神經幹切斷(truncal vagotomy)會使胃排空變差,「須加引流」(幽門成形術或胃空腸吻合);高選擇性迷走神經切斷(HSV)只切支配胃體壁細胞的神經、保留幽門「鴉爪」支配,不需引流;Billroth I=胃十二指腸吻合、Billroth II=胃空腸吻合。大型胃潰瘍可 truncal vagotomy+胃竇切除(antrectomy)。","options":{"A":"錯:truncal vagotomy 須加引流(如幽門成形)。","B":"錯:HSV 保留胃竇/幽門支配,不切該神經。","C":"錯:Billroth I 是胃十二指腸吻合,非胃空腸。","D":"★正確(本題答案):大胃潰瘍可 truncal vagotomy+antrectomy。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"103100-33":{"quick":"最不恰當為 D:緊急十二指腸潰瘍出血以「縫合止血±迷走神經切斷」即可,做胃竇切除+Roux-en-Y 過度。","detail":{"background":"消化性潰瘍:H. pylori、NSAID、胃酸三要素。十二指腸潰瘍(DU)~90%、胃潰瘍(GU)~75% 與 H. pylori 相關;DU 多酸分泌過多,GU 酸分泌正常或偏低。modified Johnson 胃潰瘍分型:I 胃小彎(正常/低酸)、II 胃+十二指腸(高酸)、III 幽門前(高酸)、IV 胃近賁門(低酸)、V NSAID 相關(任意位置)。潰瘍手術:迷走神經幹切斷(truncal vagotomy)會使胃排空變差,「須加引流」(幽門成形術或胃空腸吻合);高選擇性迷走神經切斷(HSV)只切支配胃體壁細胞的神經、保留幽門「鴉爪」支配,不需引流;Billroth I=胃十二指腸吻合、Billroth II=胃空腸吻合。大型胃潰瘍可 truncal vagotomy+胃竇切除(antrectomy)。","options":{"A":"恰當:潰瘍縫合止血。","B":"恰當:縫合+HSV。","C":"恰當:縫合+truncal vagotomy+幽門成形。","D":"★最不恰當(本題答案):緊急出血做胃竇切除+Roux-en-Y 過度。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"103100-34":{"quick":"錯在 D:分泌 histamine 的是 ECL 細胞;D 細胞分泌的是「somatostatin」。","detail":{"background":"胃上皮細胞:表面黏液細胞(分泌黏液、PgII、碳酸氫鹽)、主細胞 chief cell(分泌 pepsinogen I/II)、壁細胞 parietal cell(粒線體最多,分泌鹽酸與內在因子)、ECL 細胞(分泌組織胺 histamine)、G 細胞(分泌 gastrin)、D 細胞(分泌 somatostatin)。","options":{"A":"正確:黏液細胞分泌黏液/PgII/碳酸氫鹽。","B":"正確:主細胞分泌 pepsinogen I/II。","C":"正確:壁細胞粒線體最多、分泌胃酸與內在因子。","D":"★錯誤(本題答案):D 細胞分泌 somatostatin,histamine 由 ECL 細胞分泌。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"103100-35":{"quick":"錯在 A:胃息肉以增生性/胃底腺息肉最多,「腺瘤性息肉」並非佔最高(非 75%)。","detail":{"background":"胃息肉:以增生性(hyperplastic)與胃底腺息肉最常見,是最常見胃良性瘤;增生性息肉仍有小幅癌化風險;腺瘤性息肉(adenomatous)雖比例不高但癌化風險最高、應切除;異位瘤/缺陷瘤癌化風險極低。","options":{"A":"★錯誤(本題答案):腺瘤性息肉非佔最高(75%)。","B":"正確:增生性息肉仍有癌化風險。","C":"正確:是最常見胃良性瘤。","D":"正確:異位/缺陷瘤癌化風險極低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"104090-30":{"quick":"不是致病因子者為 A:「高脂高蛋白攝取」非胃癌危險因子(高鹽/醃漬/亞硝胺才是)。","detail":{"background":"胃癌:危險因子為幽門桿菌(H. pylori,IARC 第一類致癌物)、慢性萎縮性胃炎與腸化生、高鹽/醃漬/亞硝胺飲食、抽菸、低社經、胃腺瘤性息肉、惡性貧血、曾胃部分切除、男性。Laurén 分型:腸型(intestinal,分化好、血行轉移、高發生區較多、與環境/萎縮性胃炎相關、APC/p53 突變)與瀰漫型(diffuse,印戒細胞、瀰漫浸潤 linitis plastica、預後差、E-cadherin/CDH1)。Borrmann 進行期分型:I 隆起型、II 潰瘍邊緣清楚、III 潰瘍邊緣浸潤不清(台灣最多)、IV 瀰漫浸潤。早期胃癌(EGC)=侷限黏膜或「黏膜下層」(不論淋巴結),約 10% 已有淋巴轉移。診斷首選胃鏡切片;T=侵犯深度,N 以「轉移淋巴結數目」定(1997 AJCC 改),手術需取≥16 顆淋巴結分期。","options":{"A":"★不是(本題答案):高脂高蛋白非胃癌危險因子。","B":"是:慢性萎縮性胃炎。","C":"是:腺瘤性息肉。","D":"是:曾胃部分切除。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"105020-33":{"quick":"胃癌 TNM 之「T」代表 C:腫瘤侵犯深度。","detail":{"background":"胃癌:危險因子為幽門桿菌(H. pylori,IARC 第一類致癌物)、慢性萎縮性胃炎與腸化生、高鹽/醃漬/亞硝胺飲食、抽菸、低社經、胃腺瘤性息肉、惡性貧血、曾胃部分切除、男性。Laurén 分型:腸型(intestinal,分化好、血行轉移、高發生區較多、與環境/萎縮性胃炎相關、APC/p53 突變)與瀰漫型(diffuse,印戒細胞、瀰漫浸潤 linitis plastica、預後差、E-cadherin/CDH1)。Borrmann 進行期分型:I 隆起型、II 潰瘍邊緣清楚、III 潰瘍邊緣浸潤不清(台灣最多)、IV 瀰漫浸潤。早期胃癌(EGC)=侷限黏膜或「黏膜下層」(不論淋巴結),約 10% 已有淋巴轉移。診斷首選胃鏡切片;T=侵犯深度,N 以「轉移淋巴結數目」定(1997 AJCC 改),手術需取≥16 顆淋巴結分期。","options":{"A":"位置非 T。","B":"大小非 T(胃癌 T 以深度定)。","C":"★正確(本題答案):T=侵犯深度。","D":"肉眼觀為 Borrmann 分型,非 T。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"105020-34":{"quick":"胃黏膜上皮中比例最高為 B:主細胞(chief cell)。","detail":{"background":"胃體黏膜腺體以「主細胞(chief cell)」數目最多(位於腺體底部,分泌 pepsinogen),壁細胞次之;表面與頸部為黏液細胞,內分泌細胞少。","options":{"A":"黏液細胞主要在表面/頸部。","B":"★正確(本題答案):主細胞比例最高。","C":"壁細胞次之。","D":"內分泌細胞少。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"105100-32":{"quick":"錯在 A:Mallory-Weiss 撕裂大多自行或內視鏡止血,「常需外科手術」不正確。","detail":{"background":"Mallory-Weiss 撕裂:劇烈嘔吐致食道胃接合處(胃側小彎)黏膜縱向撕裂出血,多見男性/飲酒後;內視鏡可確診與止血,大多自行停止或內視鏡處理,少數需血管栓塞/手術。","options":{"A":"★錯誤(本題答案):多自行/內視鏡止血,少需手術。","B":"正確:內視鏡確診。","C":"正確:多為男性。","D":"正確:位於胃小彎近食道胃接合處。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"105100-33":{"quick":"錯在 C:胃潰瘍病人胃酸分泌多「正常或偏低」,日夜酸分泌增加是「十二指腸潰瘍」的特徵。","detail":{"background":"消化性潰瘍:H. pylori、NSAID、胃酸三要素。十二指腸潰瘍(DU)~90%、胃潰瘍(GU)~75% 與 H. pylori 相關;DU 多酸分泌過多,GU 酸分泌正常或偏低。modified Johnson 胃潰瘍分型:I 胃小彎(正常/低酸)、II 胃+十二指腸(高酸)、III 幽門前(高酸)、IV 胃近賁門(低酸)、V NSAID 相關(任意位置)。潰瘍手術:迷走神經幹切斷(truncal vagotomy)會使胃排空變差,「須加引流」(幽門成形術或胃空腸吻合);高選擇性迷走神經切斷(HSV)只切支配胃體壁細胞的神經、保留幽門「鴉爪」支配,不需引流;Billroth I=胃十二指腸吻合、Billroth II=胃空腸吻合。大型胃潰瘍可 truncal vagotomy+胃竇切除(antrectomy)。","options":{"A":"正確:H. pylori、NSAID、胃酸三要素。","B":"正確:DU~90%、GU~75% 與 H. pylori 相關。","C":"★錯誤(本題答案):胃潰瘍酸分泌正常/偏低,非日夜增加。","D":"正確:酸分泌過多在 type II/III 較常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"105100-35":{"quick":"正確為 D:GIST 男性病患復發風險較高。","detail":{"background":"胃腸間質瘤(GIST):源自 Cajal 間質細胞,約 95% 表現 KIT(CD117)/DOG1,多 c-kit 或 PDGFRA 突變(非 k-ras)。最常見於「胃」(~60%),其次小腸。極少淋巴轉移→手術為「局部/楔狀切除取陰性切緣」,「不需」淋巴結廓清;轉移/不可切除者以 imatinib(標靶,抑制 KIT)效果良好,高復發風險者術後輔助 imatinib。風險與大小、有絲分裂數、位置相關。","options":{"A":"錯:GIST 切除不需淋巴清掃。","B":"錯:淋巴轉移機率很低,非 20%。","C":"錯:輔助為標靶 imatinib,非傳統化療。","D":"★正確(本題答案):男性復發風險較高。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"105100-36":{"quick":"術後 Billroth II 突發上腹痛+amylase 高+NG 少量回流+疑腹塊→D:輸入環症候群。","detail":{"background":"胃切除/胃繞道後併發症:傾倒症候群(dumping)—高滲透性食糜快速進入小腸,早期(餐後 15–30 分)有腹脹、噁心、心悸、冒汗、頭暈、腹瀉(液體移入腸腔+血管活性物質如血清素),晚期(1–3 小時)為反應性低血糖。飲食處置:少量多餐、「高蛋白高脂、低單醣」、「避免餐中喝湯/飲料」、餐後平躺;嚴重者 octreotide(對腸胃與血管運動症狀皆有效)。輸入環症候群(afferent loop syndrome,Billroth II)—輸入環阻塞致膽胰液積聚、上腹痛、噴射狀膽汁嘔吐後緩解、amylase 升高。","options":{"A":"胃癌復發不致急性 amylase 升高+輸入環表現。","B":"吻合口漏多伴腹膜炎/發燒,表現不同。","C":"急性胰臟炎可 amylase 高,但此情境為輸入環阻塞。","D":"★正確(本題答案):afferent loop syndrome(輸入環阻塞、膽胰液積聚)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"106020-35":{"quick":"液體胃排空 t½ 約 B:12 分鐘。","detail":{"background":"液體(等張水)以一階動力學(first-order)排空,半排空時間(t½)約 12 分鐘;固體經研磨後再排空、較慢。影響胃排空速率:熱量含量、營養成分(脂肪/蛋白延緩)、固態或液態、滲透壓等。","options":{"A":"5 分鐘過快。","B":"★正確(本題答案):約 12 分鐘。","C":"20 分鐘過慢。","D":"35 分鐘過慢。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"106020-36":{"quick":"錯在 D:台灣進行期胃癌以 Borrmann「type III」較多,非 type II。","detail":{"background":"胃癌:危險因子為幽門桿菌(H. pylori,IARC 第一類致癌物)、慢性萎縮性胃炎與腸化生、高鹽/醃漬/亞硝胺飲食、抽菸、低社經、胃腺瘤性息肉、惡性貧血、曾胃部分切除、男性。Laurén 分型:腸型(intestinal,分化好、血行轉移、高發生區較多、與環境/萎縮性胃炎相關、APC/p53 突變)與瀰漫型(diffuse,印戒細胞、瀰漫浸潤 linitis plastica、預後差、E-cadherin/CDH1)。Borrmann 進行期分型:I 隆起型、II 潰瘍邊緣清楚、III 潰瘍邊緣浸潤不清(台灣最多)、IV 瀰漫浸潤。早期胃癌(EGC)=侷限黏膜或「黏膜下層」(不論淋巴結),約 10% 已有淋巴轉移。診斷首選胃鏡切片;T=侵犯深度,N 以「轉移淋巴結數目」定(1997 AJCC 改),手術需取≥16 顆淋巴結分期。","options":{"A":"正確:type II 潰瘍邊緣清楚。","B":"正確:type III 邊緣浸潤不清。","C":"正確:type IV 瀰漫浸潤。","D":"★錯誤(本題答案):台灣以 type III 較多。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"106020-37":{"quick":"錯在 A:Johnson 第五型(NSAID 相關)胃潰瘍本身非「及早手術」適應症;年齡>60、DU>2 cm、可見血管才是。","detail":{"background":"消化性潰瘍:H. pylori、NSAID、胃酸三要素。十二指腸潰瘍(DU)~90%、胃潰瘍(GU)~75% 與 H. pylori 相關;DU 多酸分泌過多,GU 酸分泌正常或偏低。modified Johnson 胃潰瘍分型:I 胃小彎(正常/低酸)、II 胃+十二指腸(高酸)、III 幽門前(高酸)、IV 胃近賁門(低酸)、V NSAID 相關(任意位置)。潰瘍手術:迷走神經幹切斷(truncal vagotomy)會使胃排空變差,「須加引流」(幽門成形術或胃空腸吻合);高選擇性迷走神經切斷(HSV)只切支配胃體壁細胞的神經、保留幽門「鴉爪」支配,不需引流;Billroth I=胃十二指腸吻合、Billroth II=胃空腸吻合。大型胃潰瘍可 truncal vagotomy+胃竇切除(antrectomy)。","options":{"A":"★錯誤(本題答案):Johnson type V 非手術適應症。","B":"是:年齡>60。","C":"是:DU>2 cm。","D":"是:潰瘍底可見血管(高再出血)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"106080-26":{"quick":"錯在 C:「鹽分含量」非主要影響胃排空因素;熱量、營養成分、固/液態才是。","detail":{"background":"影響胃排空速率:食物的熱量含量(高熱量延緩)、營養成分(脂肪與蛋白延緩、碳水較快)、固態或液態(液體較快)、滲透壓與酸度。鹽分含量並非主要決定因素。","options":{"A":"是因素:熱量含量。","B":"是因素:營養成分。","C":"★錯誤(本題答案):鹽分非主要因素。","D":"是因素:固態或液態。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"106080-28":{"quick":"正確為 D:轉移/不可切除 GIST 用 imatinib 標靶效果良好。","detail":{"background":"胃腸間質瘤(GIST):源自 Cajal 間質細胞,約 95% 表現 KIT(CD117)/DOG1,多 c-kit 或 PDGFRA 突變(非 k-ras)。最常見於「胃」(~60%),其次小腸。極少淋巴轉移→手術為「局部/楔狀切除取陰性切緣」,「不需」淋巴結廓清;轉移/不可切除者以 imatinib(標靶,抑制 KIT)效果良好,高復發風險者術後輔助 imatinib。風險與大小、有絲分裂數、位置相關。","options":{"A":"錯:GIST 最常見於胃,非大腸最多。","B":"錯:GIST 表現 KIT(CD117),非 k-ras。","C":"錯:淋巴轉移很少,非 40%。","D":"★正確(本題答案):imatinib 對轉移/不可切除 GIST 效果良好。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"107020-31":{"quick":"錯在 C:瀰漫型胃癌在「高發生率區域」並非較腸型多(高發生區以腸型為主),瀰漫型預後較差正確但分布敘述錯。","detail":{"background":"胃癌:危險因子為幽門桿菌(H. pylori,IARC 第一類致癌物)、慢性萎縮性胃炎與腸化生、高鹽/醃漬/亞硝胺飲食、抽菸、低社經、胃腺瘤性息肉、惡性貧血、曾胃部分切除、男性。Laurén 分型:腸型(intestinal,分化好、血行轉移、高發生區較多、與環境/萎縮性胃炎相關、APC/p53 突變)與瀰漫型(diffuse,印戒細胞、瀰漫浸潤 linitis plastica、預後差、E-cadherin/CDH1)。Borrmann 進行期分型:I 隆起型、II 潰瘍邊緣清楚、III 潰瘍邊緣浸潤不清(台灣最多)、IV 瀰漫浸潤。早期胃癌(EGC)=侷限黏膜或「黏膜下層」(不論淋巴結),約 10% 已有淋巴轉移。診斷首選胃鏡切片;T=侵犯深度,N 以「轉移淋巴結數目」定(1997 AJCC 改),手術需取≥16 顆淋巴結分期。","options":{"A":"正確:Borrmann III 為潰瘍合併胃壁浸潤。","B":"正確:腸型分化好、血行轉移。","C":"★錯誤(本題答案):高發生區以腸型為主,非瀰漫型較多。","D":"正確:APC 突變較常見於腸型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"109020-23":{"quick":"H. pylori 被 IARC 列為 A:第一類致癌物(group I)。","detail":{"background":"胃癌:危險因子為幽門桿菌(H. pylori,IARC 第一類致癌物)、慢性萎縮性胃炎與腸化生、高鹽/醃漬/亞硝胺飲食、抽菸、低社經、胃腺瘤性息肉、惡性貧血、曾胃部分切除、男性。Laurén 分型:腸型(intestinal,分化好、血行轉移、高發生區較多、與環境/萎縮性胃炎相關、APC/p53 突變)與瀰漫型(diffuse,印戒細胞、瀰漫浸潤 linitis plastica、預後差、E-cadherin/CDH1)。Borrmann 進行期分型:I 隆起型、II 潰瘍邊緣清楚、III 潰瘍邊緣浸潤不清(台灣最多)、IV 瀰漫浸潤。早期胃癌(EGC)=侷限黏膜或「黏膜下層」(不論淋巴結),約 10% 已有淋巴轉移。診斷首選胃鏡切片;T=侵犯深度,N 以「轉移淋巴結數目」定(1997 AJCC 改),手術需取≥16 顆淋巴結分期。","options":{"A":"★正確(本題答案):H. pylori 為第一類致癌物。","B":"非第二類。","C":"非第三類。","D":"非第四類。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"109020-24":{"quick":"Billroth II 後餐後 20–30 分噁心、心悸、冒汗、腹瀉+心搏過速→C:傾倒症候群。","detail":{"background":"胃切除/胃繞道後併發症:傾倒症候群(dumping)—高滲透性食糜快速進入小腸,早期(餐後 15–30 分)有腹脹、噁心、心悸、冒汗、頭暈、腹瀉(液體移入腸腔+血管活性物質如血清素),晚期(1–3 小時)為反應性低血糖。飲食處置:少量多餐、「高蛋白高脂、低單醣」、「避免餐中喝湯/飲料」、餐後平躺;嚴重者 octreotide(對腸胃與血管運動症狀皆有效)。輸入環症候群(afferent loop syndrome,Billroth II)—輸入環阻塞致膽胰液積聚、上腹痛、噴射狀膽汁嘔吐後緩解、amylase 升高。","options":{"A":"輸入環症候群為膽汁嘔吐後緩解。","B":"輸出環症候群為阻塞性。","C":"★正確(本題答案):早期傾倒症候群。","D":"腸躁症非術後急性表現。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"109020-25":{"quick":"需切除者為 B:腺瘤性息肉(癌化風險最高)。","detail":{"background":"胃息肉處置:腺瘤性息肉(adenomatous)癌化風險最高、應切除;增生性息肉多與 H. pylori/發炎相關,>0.5–1 cm 或有異型增生才切;缺陷瘤/異位瘤癌化風險極低,通常不需切除。","options":{"A":"增生性息肉多不需切除(除非大/異型)。","B":"★正確(本題答案):腺瘤性息肉應切除。","C":"缺陷瘤癌化風險極低。","D":"異位瘤癌化風險極低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"109020-26":{"quick":"診斷胃癌最好方法為 A:內視鏡(可切片)。","detail":{"background":"胃癌:危險因子為幽門桿菌(H. pylori,IARC 第一類致癌物)、慢性萎縮性胃炎與腸化生、高鹽/醃漬/亞硝胺飲食、抽菸、低社經、胃腺瘤性息肉、惡性貧血、曾胃部分切除、男性。Laurén 分型:腸型(intestinal,分化好、血行轉移、高發生區較多、與環境/萎縮性胃炎相關、APC/p53 突變)與瀰漫型(diffuse,印戒細胞、瀰漫浸潤 linitis plastica、預後差、E-cadherin/CDH1)。Borrmann 進行期分型:I 隆起型、II 潰瘍邊緣清楚、III 潰瘍邊緣浸潤不清(台灣最多)、IV 瀰漫浸潤。早期胃癌(EGC)=侷限黏膜或「黏膜下層」(不論淋巴結),約 10% 已有淋巴轉移。診斷首選胃鏡切片;T=侵犯深度,N 以「轉移淋巴結數目」定(1997 AJCC 改),手術需取≥16 顆淋巴結分期。","options":{"A":"★正確(本題答案):內視鏡+切片。","B":"腹部超音波非首選。","C":"CT 用於分期非確診。","D":"上消化道攝影敏感度不足。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"109080-33":{"quick":"BMI 43+T2DM+GERD grade C→最適合 B:Roux-en-Y 胃繞道。","detail":{"background":"代謝減重手術選擇:Roux-en-Y 胃繞道(RYGB)對「第二型糖尿病改善」與「合併嚴重 GERD」效果最佳(改道避開酸逆流);胃袖狀切除可能加重 GERD。胃底折疊(抗逆流非減重)、垂直胃隔間(過時)、迷走神經切斷皆不適合此代謝需求。","options":{"A":"胃底折疊是抗逆流,非減重。","B":"★正確(本題答案):RYGB 對 DM 與 GERD 皆佳。","C":"垂直胃隔間術已過時。","D":"迷走神經切斷非減重術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"109080-34":{"quick":"錯在 A:早期胃癌定義為侷限「黏膜或黏膜下層」(不論淋巴結),侵犯黏膜下層「仍算」早期胃癌。","detail":{"background":"胃癌:危險因子為幽門桿菌(H. pylori,IARC 第一類致癌物)、慢性萎縮性胃炎與腸化生、高鹽/醃漬/亞硝胺飲食、抽菸、低社經、胃腺瘤性息肉、惡性貧血、曾胃部分切除、男性。Laurén 分型:腸型(intestinal,分化好、血行轉移、高發生區較多、與環境/萎縮性胃炎相關、APC/p53 突變)與瀰漫型(diffuse,印戒細胞、瀰漫浸潤 linitis plastica、預後差、E-cadherin/CDH1)。Borrmann 進行期分型:I 隆起型、II 潰瘍邊緣清楚、III 潰瘍邊緣浸潤不清(台灣最多)、IV 瀰漫浸潤。早期胃癌(EGC)=侷限黏膜或「黏膜下層」(不論淋巴結),約 10% 已有淋巴轉移。診斷首選胃鏡切片;T=侵犯深度,N 以「轉移淋巴結數目」定(1997 AJCC 改),手術需取≥16 顆淋巴結分期。","options":{"A":"★錯誤(本題答案):侵犯黏膜下層仍為早期胃癌。","B":"正確:約 10% EGC 已有淋巴轉移。","C":"正確:淋巴結不在 EGC 定義內。","D":"正確:約 70% EGC 分化良好。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"110020-30":{"quick":"正確為 C:胃低惡性度 MALT 淋巴瘤與幽門桿菌相關(根除可緩解)。","detail":{"background":"胃淋巴瘤:消化道淋巴瘤最常見於胃,多為「B 細胞」型。低惡性度 MALT 淋巴瘤與 H. pylori 高度相關,「根除幽門桿菌」即可使約 75% 緩解;治療以化療/放療/標靶為主,非以手術優先;對化療反應佳。","options":{"A":"錯:多為 B 細胞型,非 T 細胞。","B":"錯:非以手術優先。","C":"★正確(本題答案):MALT 淋巴瘤與 H. pylori 相關。","D":"錯:對化療反應佳。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"110080-34":{"quick":"非胃細胞分泌者為 C:adiponectin(由脂肪細胞分泌)。","detail":{"background":"胃分泌的荷爾蒙/胜肽:gastrin(G 細胞)、somatostatin(D 細胞)、ghrelin(飢餓素,胃底)、gastrin-releasing peptide、histamine(ECL)。adiponectin 由脂肪組織分泌,非胃。","options":{"A":"somatostatin 由胃 D 細胞分泌。","B":"gastrin-releasing peptide 由胃分泌。","C":"★正確(本題答案):adiponectin 由脂肪細胞分泌。","D":"ghrelin 由胃底分泌。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"111020-41":{"quick":"與胃癌癌前變化關聯最大為 C:萎縮性胃炎(→腸化生→異型增生→癌)。","detail":{"background":"胃癌:危險因子為幽門桿菌(H. pylori,IARC 第一類致癌物)、慢性萎縮性胃炎與腸化生、高鹽/醃漬/亞硝胺飲食、抽菸、低社經、胃腺瘤性息肉、惡性貧血、曾胃部分切除、男性。Laurén 分型:腸型(intestinal,分化好、血行轉移、高發生區較多、與環境/萎縮性胃炎相關、APC/p53 突變)與瀰漫型(diffuse,印戒細胞、瀰漫浸潤 linitis plastica、預後差、E-cadherin/CDH1)。Borrmann 進行期分型:I 隆起型、II 潰瘍邊緣清楚、III 潰瘍邊緣浸潤不清(台灣最多)、IV 瀰漫浸潤。早期胃癌(EGC)=侷限黏膜或「黏膜下層」(不論淋巴結),約 10% 已有淋巴轉移。診斷首選胃鏡切片;T=侵犯深度,N 以「轉移淋巴結數目」定(1997 AJCC 改),手術需取≥16 顆淋巴結分期。","options":{"A":"增生性息肉癌化風險低。","B":"慢性潰瘍癌化關聯較小。","C":"★正確(本題答案):萎縮性胃炎為主要癌前病變。","D":"異位胰臟與胃癌無關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"111080-7":{"quick":"胃癌高風險為 C:低社經階層。","detail":{"background":"胃癌:危險因子為幽門桿菌(H. pylori,IARC 第一類致癌物)、慢性萎縮性胃炎與腸化生、高鹽/醃漬/亞硝胺飲食、抽菸、低社經、胃腺瘤性息肉、惡性貧血、曾胃部分切除、男性。Laurén 分型:腸型(intestinal,分化好、血行轉移、高發生區較多、與環境/萎縮性胃炎相關、APC/p53 突變)與瀰漫型(diffuse,印戒細胞、瀰漫浸潤 linitis plastica、預後差、E-cadherin/CDH1)。Borrmann 進行期分型:I 隆起型、II 潰瘍邊緣清楚、III 潰瘍邊緣浸潤不清(台灣最多)、IV 瀰漫浸潤。早期胃癌(EGC)=侷限黏膜或「黏膜下層」(不論淋巴結),約 10% 已有淋巴轉移。診斷首選胃鏡切片;T=侵犯深度,N 以「轉移淋巴結數目」定(1997 AJCC 改),手術需取≥16 顆淋巴結分期。","options":{"A":"高脂高蛋白非胃癌危險因子。","B":"含氯飲用水非危險因子。","C":"★正確(本題答案):低社經階層為胃癌風險。","D":"男性風險高於女性(非女性)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"111080-36":{"quick":"錯在 C:3 cm 胃 GIST 標準治療是「局部/楔狀切除」,「不需」淋巴結廓清。","detail":{"background":"胃腸間質瘤(GIST):源自 Cajal 間質細胞,約 95% 表現 KIT(CD117)/DOG1,多 c-kit 或 PDGFRA 突變(非 k-ras)。最常見於「胃」(~60%),其次小腸。極少淋巴轉移→手術為「局部/楔狀切除取陰性切緣」,「不需」淋巴結廓清;轉移/不可切除者以 imatinib(標靶,抑制 KIT)效果良好,高復發風險者術後輔助 imatinib。風險與大小、有絲分裂數、位置相關。","options":{"A":"正確:胃癌分期至少取 16 顆淋巴結。","B":"正確:1997 AJCC 改以淋巴轉移「數目」定 N。","C":"★錯誤(本題答案):GIST 不需淋巴廓清。","D":"正確:胃 MALT 淋巴瘤根除 H. pylori 約 75% 緩解。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Sleisenger & Fordtran’s GI and Liver Disease"]}},"101030-33":{"quick":"術後第 10 天引流管出現腸道內容物(40–80 mL/日)、腹軟無腹膜炎→D:腸皮膚瘻管(吻合癒合不全)。","detail":{"background":"腸道吻合後癒合不全會形成「腸皮膚瘻管(enterocutaneous fistula)」:引流管出現腸道內容物。處置以「SNAP」原則:控制敗血(Sepsis)、營養(Nutrition,常需 TPN)、保護皮膚(skin)、評估解剖(Anatomy);多數低流量、無遠端阻塞/感染/上皮化者可保守觀察數週自行閉合。","options":{"A":"短腸症為吸收不良,非引流出腸液。","B":"缺血性腸
