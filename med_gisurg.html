病為腹痛/壞死,非瘻管。","C":"沾黏阻塞為阻塞症狀,非引流腸液。","D":"★正確(本題答案):腸皮膚瘻管。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"102030-40":{"quick":"不是短腸症危險因子者為 C:切除「空腸」相對可代償;切除迴腸/迴盲瓣、剩餘<200 cm 才是危險因子。","detail":{"background":"短腸症候群(short bowel syndrome):大量小腸切除後吸收不良。危險因子:剩餘小腸 <200 cm、切除「迴腸」(吸收 B12、膽鹽、且適應力差)、未保留「迴盲瓣」(失去防逆流與調節)、合併全結腸切除。切除「空腸」相對較可代償(迴腸可適應替代空腸功能),故非主要危險因子。老年人短腸最常見原因為「腸繫膜血管阻塞」。治療:腸道適應、腸外營養(TPN)、teduglutide(GLP-2)、嚴重者小腸移植。","options":{"A":"是:剩餘<200 cm。","B":"是:切除迴盲瓣。","C":"★不是(本題答案):切除空腸可代償,非主要危險因子。","D":"是:切除迴腸(吸收 B12/膽鹽)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"102030-55":{"quick":"成人小腸阻塞最常見原因為 A:術後沾黏。","detail":{"background":"成人機械性小腸阻塞最常見原因為「術後沾黏(adhesions)」,其次疝氣、腫瘤。表現:腹脹、腹絞痛、嘔吐、停止排氣排便;立位 X 光見階梯狀液平。處置:鼻胃管減壓、禁食、補液與電解質、反覆 X 光/CT 追蹤;「上消化道鋇劑攝影並非必須」(恐加重、可用水溶性對比劑或 CT)。出現絞窄(腸壁增厚、積氣、發燒、白血球升高、腹膜炎、氣體被腸內液體取代而腸音消失)→須緊急手術。","options":{"A":"★正確(本題答案):術後沾黏最常見。","B":"疝氣次之。","C":"腫瘤較少。","D":"腸套疊為小兒常見,成人少。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"102110-41":{"quick":"最不相符為 A:腸音靜止、氣體被液體取代、無排氣排便→是「轉為完全性/絞窄」而非「轉為部分性阻塞」。","detail":{"background":"成人機械性小腸阻塞最常見原因為「術後沾黏(adhesions)」,其次疝氣、腫瘤。表現:腹脹、腹絞痛、嘔吐、停止排氣排便;立位 X 光見階梯狀液平。處置:鼻胃管減壓、禁食、補液與電解質、反覆 X 光/CT 追蹤;「上消化道鋇劑攝影並非必須」(恐加重、可用水溶性對比劑或 CT)。出現絞窄(腸壁增厚、積氣、發燒、白血球升高、腹膜炎、氣體被腸內液體取代而腸音消失)→須緊急手術。","options":{"A":"★最不相符(本題答案):病情惡化為完全/絞窄,非轉部分性。","B":"相符:CT 腸壁增厚積氣示絞窄。","C":"相符:絞窄初期白血球可未升。","D":"相符:初期體溫可未上升。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"103030-47":{"quick":"錯在 D:Meckel 憩室併發症為出血、發炎、阻塞,「惡性變化」罕見。","detail":{"background":"梅克耳憩室(Meckel diverticulum):卵黃管(vitelline duct)殘留之「真憩室」,位於「迴腸『對腸繫膜側(antimesenteric)』」、距迴盲瓣約 2 英『尺(feet)』;「2 法則」:2% 人口、2 歲前發病、2 英尺、2 吋長、2 種異位組織(以「胃」黏膜最常見、其次胰臟)。併發症:出血(異位胃黏膜泌酸致潰瘍,小兒下消化道出血常見原因)、發炎(類闌尾炎)、腸阻塞(可為腸套疊導引點)、嵌入疝氣袋(Littré 疝)。「惡性變化」罕見。診斷出血用「Tc-99m pertechnetate(Meckel scan)」偵測異位胃黏膜。","options":{"A":"正確:出血(異位胃黏膜)。","B":"正確:發炎(類闌尾炎)。","C":"正確:阻塞(可為腸套疊導引點)。","D":"★錯誤(本題答案):惡性變化罕見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"103100-36":{"quick":"錯在 A:術後沾黏阻塞「不需」上消化道鋇劑攝影定位(恐加重);以鼻胃管減壓、補液、反覆 X 光/CT。","detail":{"background":"成人機械性小腸阻塞最常見原因為「術後沾黏(adhesions)」,其次疝氣、腫瘤。表現:腹脹、腹絞痛、嘔吐、停止排氣排便;立位 X 光見階梯狀液平。處置:鼻胃管減壓、禁食、補液與電解質、反覆 X 光/CT 追蹤;「上消化道鋇劑攝影並非必須」(恐加重、可用水溶性對比劑或 CT)。出現絞窄(腸壁增厚、積氣、發燒、白血球升高、腹膜炎、氣體被腸內液體取代而腸音消失)→須緊急手術。","options":{"A":"★錯誤(本題答案):鋇劑攝影非必須。","B":"正確:鼻胃管減壓與禁食。","C":"正確:補液與電解質。","D":"正確:反覆 X 光追蹤。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"104030-37":{"quick":"老年人術後短腸症最常見原因為 C:腸繫膜血管阻塞。","detail":{"background":"短腸症候群(short bowel syndrome):大量小腸切除後吸收不良。危險因子:剩餘小腸 <200 cm、切除「迴腸」(吸收 B12、膽鹽、且適應力差)、未保留「迴盲瓣」(失去防逆流與調節)、合併全結腸切除。切除「空腸」相對較可代償(迴腸可適應替代空腸功能),故非主要危險因子。老年人短腸最常見原因為「腸繫膜血管阻塞」。治療:腸道適應、腸外營養(TPN)、teduglutide(GLP-2)、嚴重者小腸移植。","options":{"A":"IBD 多見年輕。","B":"腸套疊為小兒。","C":"★正確(本題答案):腸繫膜血管阻塞(老年動脈硬化/AF 栓塞)。","D":"小腸腫瘤較少致短腸。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"104030-46":{"quick":"正確為 D:Meckel 是腸套疊常見導引點(lead point)。","detail":{"background":"梅克耳憩室(Meckel diverticulum):卵黃管(vitelline duct)殘留之「真憩室」,位於「迴腸『對腸繫膜側(antimesenteric)』」、距迴盲瓣約 2 英『尺(feet)』;「2 法則」:2% 人口、2 歲前發病、2 英尺、2 吋長、2 種異位組織(以「胃」黏膜最常見、其次胰臟)。併發症:出血(異位胃黏膜泌酸致潰瘍,小兒下消化道出血常見原因)、發炎(類闌尾炎)、腸阻塞(可為腸套疊導引點)、嵌入疝氣袋(Littré 疝)。「惡性變化」罕見。診斷出血用「Tc-99m pertechnetate(Meckel scan)」偵測異位胃黏膜。","options":{"A":"錯:距迴盲瓣約 2 英『尺』,非 2 吋。","B":"錯:出血多在 2 歲前,非 3–6 歲。","C":"錯:異位組織以「胃」最常見,非腎臟。","D":"★正確(本題答案):是腸套疊常見導引點。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"104030-51":{"quick":"錯在 D:十二指腸憩室主要好發「第二部(periampullary)」,非第一部。","detail":{"background":"腸道憩室好發:大腸最多、小腸次之;真憩室含全層、偽憩室(false)缺肌肉層(經肌層薄弱處膨出);診斷多>40 歲。十二指腸憩室最常見於「第二部(降部、壺腹周圍 periampullary)」,非第一部。","options":{"A":"正確:小腸僅次大腸。","B":"正確:偽憩室缺肌肉層。","C":"正確:多>40 歲。","D":"★錯誤(本題答案):十二指腸憩室好發第二部。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"104030-53":{"quick":"錯在 C:術後沾黏阻塞「不需」上消化道鋇劑攝影定位;有小腸缺血則應手術。","detail":{"background":"成人機械性小腸阻塞最常見原因為「術後沾黏(adhesions)」,其次疝氣、腫瘤。表現:腹脹、腹絞痛、嘔吐、停止排氣排便;立位 X 光見階梯狀液平。處置:鼻胃管減壓、禁食、補液與電解質、反覆 X 光/CT 追蹤;「上消化道鋇劑攝影並非必須」(恐加重、可用水溶性對比劑或 CT)。出現絞窄(腸壁增厚、積氣、發燒、白血球升高、腹膜炎、氣體被腸內液體取代而腸音消失)→須緊急手術。","options":{"A":"正確:鼻胃管減壓、補液。","B":"正確:多次 X 光追蹤。","C":"★錯誤(本題答案):鋇劑攝影非必須。","D":"正確:腸缺血宜手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"104090-36":{"quick":"成人機械性腸阻塞最主要成因為 C:術後沾黏。","detail":{"background":"成人機械性小腸阻塞最常見原因為「術後沾黏(adhesions)」,其次疝氣、腫瘤。表現:腹脹、腹絞痛、嘔吐、停止排氣排便;立位 X 光見階梯狀液平。處置:鼻胃管減壓、禁食、補液與電解質、反覆 X 光/CT 追蹤;「上消化道鋇劑攝影並非必須」(恐加重、可用水溶性對比劑或 CT)。出現絞窄(腸壁增厚、積氣、發燒、白血球升高、腹膜炎、氣體被腸內液體取代而腸音消失)→須緊急手術。","options":{"A":"疝氣次之。","B":"癌症較少。","C":"★正確(本題答案):術後沾黏。","D":"腸扭轉/旋轉不良為小兒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"106020-32":{"quick":"空腸+迴腸+右側結腸缺血壞死→A:上腸繫膜動脈(SMA)血栓(SMA 供應全小腸與右結腸)。","detail":{"background":"腸繫膜缺血:上腸繫膜動脈(SMA)供應「全小腸+升結腸/右半結腸」;SMA 阻塞(栓塞多來自 AF 心源性、血栓多於既有粥狀硬化)→該範圍廣泛缺血壞死。下腸繫膜動脈供應左結腸;腸繫膜靜脈栓塞與非阻塞性缺血(NOMI,低灌流)表現不同。","options":{"A":"★正確(本題答案):SMA 血栓致小腸+右結腸缺血。","B":"IMA 供應左結腸,範圍不符。","C":"SMV 血栓表現較緩、非廣泛動脈分布。","D":"NOMI 為低灌流,非血栓阻塞分布。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"106020-51":{"quick":"Meckel 下消化道出血診斷用 A(13):Tc-99m pertechnetate 同位素掃描(1)+腹腔鏡探查(3)。","detail":{"background":"梅克耳憩室(Meckel diverticulum):卵黃管(vitelline duct)殘留之「真憩室」,位於「迴腸『對腸繫膜側(antimesenteric)』」、距迴盲瓣約 2 英『尺(feet)』;「2 法則」:2% 人口、2 歲前發病、2 英尺、2 吋長、2 種異位組織(以「胃」黏膜最常見、其次胰臟)。併發症:出血(異位胃黏膜泌酸致潰瘍,小兒下消化道出血常見原因)、發炎(類闌尾炎)、腸阻塞(可為腸套疊導引點)、嵌入疝氣袋(Littré 疝)。「惡性變化」罕見。診斷出血用「Tc-99m pertechnetate(Meckel scan)」偵測異位胃黏膜。","options":{"A":"★正確(本題答案):Meckel scan(1)與腹腔鏡(3)。","B":"25:超音波/大腸鏡不適合診斷 Meckel 出血。","C":"45:鋇劑/大腸鏡不適合。","D":"24:含超音波/鋇劑,不適合。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"106020-53":{"quick":"錯在 C:Meckel 憩室長在「對腸繫膜側(antimesenteric)」,非腸繫膜側。","detail":{"background":"梅克耳憩室(Meckel diverticulum):卵黃管(vitelline duct)殘留之「真憩室」,位於「迴腸『對腸繫膜側(antimesenteric)』」、距迴盲瓣約 2 英『尺(feet)』;「2 法則」:2% 人口、2 歲前發病、2 英尺、2 吋長、2 種異位組織(以「胃」黏膜最常見、其次胰臟)。併發症:出血(異位胃黏膜泌酸致潰瘍,小兒下消化道出血常見原因)、發炎(類闌尾炎)、腸阻塞(可為腸套疊導引點)、嵌入疝氣袋(Littré 疝)。「惡性變化」罕見。診斷出血用「Tc-99m pertechnetate(Meckel scan)」偵測異位胃黏膜。","options":{"A":"正確:卵黃管退化而成。","B":"正確:小兒下消化道出血原因之一。","C":"★錯誤(本題答案):位於對腸繫膜側。","D":"正確:掉入疝氣袋稱 Littré 疝。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"107020-7":{"quick":"錯在 A:腳氣病(beriberi)是缺乏「維生素 B1(thiamine)」,非硒。","detail":{"background":"微量元素/維生素缺乏:腳氣病=B1(thiamine)缺乏(乾型神經病變、濕型心衰竭);鋅缺乏→禿髮、皮膚炎、傷口癒合差、味覺異常;胃切除後易缺鐵(與 B12);維生素 D 缺乏→骨質疏鬆/軟骨症;硒缺乏→克山病(心肌病)。","options":{"A":"★錯誤(本題答案):beriberi 是缺 B1,非硒。","B":"正確:缺鋅致禿髮。","C":"正確:胃切除後易缺鐵。","D":"正確:缺維生素 D 致骨質疏鬆。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"107080-33":{"quick":"錯在 C:切除「迴腸」比切除空腸較易短腸症(迴腸吸收 B12/膽鹽、適應力差)。","detail":{"background":"短腸症候群(short bowel syndrome):大量小腸切除後吸收不良。危險因子:剩餘小腸 <200 cm、切除「迴腸」(吸收 B12、膽鹽、且適應力差)、未保留「迴盲瓣」(失去防逆流與調節)、合併全結腸切除。切除「空腸」相對較可代償(迴腸可適應替代空腸功能),故非主要危險因子。老年人短腸最常見原因為「腸繫膜血管阻塞」。治療:腸道適應、腸外營養(TPN)、teduglutide(GLP-2)、嚴重者小腸移植。","options":{"A":"正確:切除<50% 多可承受。","B":"正確:保留迴盲瓣較不易短腸。","C":"★錯誤(本題答案):切除迴腸較易短腸,非空腸。","D":"正確:小腸移植為嚴重短腸選項。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"108080-27":{"quick":"錯在 B:小腸不分泌 histamine(由 ECL/肥大細胞分泌);小腸分泌 somatostatin、CCK、secretin、motilin 等。","detail":{"background":"小腸內分泌:分泌 secretin(S 細胞)、cholecystokinin CCK(I 細胞)、somatostatin(D 細胞)、motilin、GIP、GLP 等。histamine 由胃 ECL 細胞與肥大細胞分泌,非小腸功能。","options":{"A":"正確:分泌 somatostatin。","B":"★錯誤(本題答案):小腸不分泌 histamine。","C":"正確:分泌 CCK。","D":"正確:分泌 secretin。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"108080-28":{"quick":"錯在 D:小腸腫瘤即使已腸繫膜轉移,若有出血或腸阻塞仍應做姑息性手術。","detail":{"background":"小腸腫瘤:腺癌好發十二指腸與上端空腸;十二指腸以外者術前正確診斷率僅約 50%;手術完全切除才較有治癒機會,化放療效果有限。即便已轉移、預後差,合併「出血或腸阻塞」等症狀仍應行「姑息性手術」緩解症狀。","options":{"A":"正確:腺癌好發近端小腸。","B":"正確:遠端小腸癌術前診斷率約 50%。","C":"正確:完全切除才較有治癒機會。","D":"★錯誤(本題答案):有出血/阻塞仍應姑息手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"110080-31":{"quick":"正確為 D:此複雜心臟病人(近期 MI+支架)選擇性疝氣手術應「待 MI 後 6 個月」再考慮。","detail":{"background":"圍術期心臟風險:近期心肌梗塞是大手術重大風險,選擇性手術一般延後(傳統 6 個月,現代依風險分層至少數週至數月);需麻醉科術前評估、檢視並處理抗凝/抗血小板用藥(支架後)。心血管疾病是腹部手術圍術期死亡重要原因。","options":{"A":"錯:仍需麻醉科術前評估。","B":"錯:用藥檢視重要(抗凝劑須妥善處理)。","C":"錯:心血管疾病與圍術期死亡高度相關。","D":"★正確(本題答案):MI 後 6 個月再考慮選擇性手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"110080-32":{"quick":"錯在 C:小腸最常見「惡性」腫瘤傳統上為腺癌/神經內分泌瘤,稱 GIST 為「小腸最常見惡性腫瘤」不正確。","detail":{"background":"小腸:具消化、吸收、內分泌與免疫(GALT)功能。阻塞最常見原因為術後沾黏。小腸惡性腫瘤包括腺癌、神經內分泌瘤(類癌)、淋巴瘤、GIST;GIST 源自間質(Cajal)細胞、少淋巴轉移、手術不需淋巴廓清,但「小腸最常見惡性腫瘤」並非 GIST。","options":{"A":"正確:小腸具多重功能與免疫角色。","B":"正確:阻塞最常見為術後沾黏。","C":"★錯誤(本題答案):GIST 非小腸最常見惡性腫瘤。","D":"正確:GIST 少淋巴轉移、不需淋巴廓清。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"111080-32":{"quick":"不是短腸症危險因子者為 A:單純切除空腸 200 cm(若保留迴腸/迴盲瓣可代償);切除迴盲瓣、全結腸、Crohn 才是。","detail":{"background":"短腸症候群(short bowel syndrome):大量小腸切除後吸收不良。危險因子:剩餘小腸 <200 cm、切除「迴腸」(吸收 B12、膽鹽、且適應力差)、未保留「迴盲瓣」(失去防逆流與調節)、合併全結腸切除。切除「空腸」相對較可代償(迴腸可適應替代空腸功能),故非主要危險因子。老年人短腸最常見原因為「腸繫膜血管阻塞」。治療:腸道適應、腸外營養(TPN)、teduglutide(GLP-2)、嚴重者小腸移植。","options":{"A":"★不是(本題答案):空腸切除可代償。","B":"是:未保留迴盲瓣。","C":"是:合併全結腸切除。","D":"是:Crohn 病(反覆切除)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"111080-35":{"quick":"最恰當為 C:類癌(NET)易合併類癌症候群,可手術者應儘量完全切除。","detail":{"background":"小腸腫瘤:良性最常見為平滑肌瘤/脂肪瘤;惡性中腺癌好發「近端(十二指腸/空腸)」、神經內分泌瘤(類癌)好發迴腸且可合併類癌症候群(分泌血清素,肝轉移時)、淋巴瘤、GIST。GIST 預後依「大小+有絲分裂數+位置」綜合評估,與大小有關。","options":{"A":"錯:良性最常見為平滑肌瘤/脂肪瘤(脂肪瘤未必無症狀)。","B":"錯:腺癌好發近端,非迴腸。","C":"★正確(本題答案):類癌可手術應完全切除。","D":"錯:GIST 預後與大小有關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"112020-7":{"quick":"最不恰當為 D:盲環症候群為「大球性(巨芽細胞)貧血」(B12 被細菌耗用),非小紅血球貧血。","detail":{"background":"盲環(blind loop)/小腸細菌過度孳生症候群:停滯腸段細菌過度增生,消耗維生素 B12、解離膽鹽→脂肪瀉、B12 缺乏致「巨球性(macrocytic/megaloblastic)貧血」。治療:抗生素、補充 B12、矯正解剖。","options":{"A":"正確:脂肪瀉(膽鹽解離)。","B":"正確:補充 B12。","C":"正確:細菌過度孳生所致。","D":"★最不恰當(本題答案):為巨球性貧血,非小紅血球(微球性)貧血。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"112020-35":{"quick":"正確為 D:小腸瘻管多先保守治療 2–3 個月,大多可自發閉合者於約 5 週內閉合,先保守再手術成功率較高。","detail":{"background":"腸瘻管自發閉合不利因素(FRIENDS):異物(Foreign body)、放射(Radiation)、發炎/IBD、上皮化(Epithelialization)、腫瘤(Neoplasm)、遠端阻塞(Distal obstruction)、敗血/類固醇(Sepsis)、高流量。處置:控制敗血、營養、保護皮膚;octreotide 可減少滲出量但對「閉合率/時間」實證有限。多先保守 2–3 個月,可閉合者多在約 5 週內閉合。","options":{"A":"錯:時間/比例描述不準確。","B":"錯:上皮化是「不利」閉合因素(列為促進閉合則錯)。","C":"錯:octreotide 減滲出量,但對閉合率/時間實證有限。","D":"★正確(本題答案):先保守 2–3 個月,可閉合者多 5 週內閉合。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"113020-30":{"quick":"成人小腸出血較常見原因為 B:血管發育不良(angiodysplasia)。","detail":{"background":"小腸(中段消化道)出血:成人最常見原因為「血管發育不良(angiodysplasia)」,其次小腸腫瘤、Crohn、NSAID 潰瘍、Dieulafoy;Meckel 憩室是「兒童/年輕人」常見原因。診斷用膠囊內視鏡、小腸鏡、CT/血管攝影、Tc-99m 掃描。","options":{"A":"小腸腫瘤次之。","B":"★正確(本題答案):成人以血管發育不良最常見。","C":"Crohn 較少。","D":"Meckel 為兒童/年輕人常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"115020-15":{"quick":"錯在 B:腫瘤侵犯「臟層腹膜」應為 T4a(非 T3);6 顆>1 cm 淋巴=N2b,故臨床分期為 cT4aN2bM0。","detail":{"background":"右側(升)結腸腺癌常以「缺血性貧血(慢性失血)」表現(管腔大、糞便液態,易隱性出血);左側多以阻塞/排便習慣改變表現。大腸癌 T 分期:T3 侵穿肌肉層至漿膜下,T4a「侵犯臟層腹膜表面」,T4b 侵犯鄰近器官。N2b=≥7 顆(此題 6 顆為 N2a~邊界,>1cm 多顆);標準術式為根除性右半結腸切除+淋巴清掃;MSS 大腸癌對免疫治療反應有限(MSI-H 才有效)。","options":{"A":"正確:右側大腸癌較易貧血。","B":"★錯誤(本題答案):侵犯臟層腹膜為 T4a,非 T3。","C":"正確:標準為根除性右半結腸切除+淋巴清掃。","D":"正確:免疫治療對 MSS 效果有限。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Shackelford’s Surgery of the Alimentary Tract"]}},"101030-11":{"quick":"息肉切除後病理為「莖部近基部有侵犯性腺癌」、病人健康→D:直腸前位切除術(根除性切除)。","detail":{"background":"有莖息肉(pedunculated)若惡性侷限頭部、切緣乾淨、分化好、無淋巴血管侵犯→息肉切除即足;但若侵犯到「莖/基部、切緣陽性、分化差、淋巴血管侵犯」→殘留/淋巴轉移風險高,應行「節段性根除手術(如直腸前位切除 anterior resection)」。本例侵犯近基部→根除切除。","options":{"A":"再內視鏡黏膜切除無法廓清淋巴。","B":"經肛門局部切除不足。","C":"已侵犯基部不可只觀察。","D":"★正確(本題答案):直腸前位切除根除。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"102030-52":{"quick":"錯在 D:T2 直腸癌「不」適合局部切除保肛,需根除手術(±術前放化療);局部切除僅限選擇性 T1。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"正確:手術切除最有效。","B":"正確:低位直腸癌術前放療降低局部復發。","C":"正確:Stage III 輔助化療提升存活。","D":"★錯誤(本題答案):T2 直腸癌需根除手術,非局部切除。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"102030-54":{"quick":"非初級預防者為 D:息肉篩檢屬「次級預防(早期發現)」。","detail":{"background":"大腸癌「初級預防(primary prevention)」=降低發生:飲食調整(高纖、少紅肉)、避免環境致癌因子、化學預防(aspirin/NSAID)。「息肉/糞潛血/大腸鏡篩檢」屬「次級預防」—早期發現與切除癌前病灶。","options":{"A":"初級:飲食調整。","B":"初級:避免環境危害。","C":"初級:化學預防。","D":"★非初級(本題答案):息肉篩檢為次級預防。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"102110-54":{"quick":"錯在 C:T1、T2 局部切除後並非皆不需進一步治療;T2 淋巴/復發風險高,需追加治療或改根除手術。","detail":{"background":"直腸癌經肛門局部切除適應症:腫瘤<4 cm、距肛門<6–8 cm、分化良好/中度、活動度佳、無淋巴血管侵犯,「最適合 T1」。T2 因淋巴轉移率高,局部切除後須追加放化療或改根除手術,並非「T1/T2 皆不需進一步治療」。","options":{"A":"正確:須<4 cm 的 T1/T2。","B":"正確:距肛門<6 cm。","C":"★錯誤(本題答案):T2 局部切除後仍需追加治療。","D":"正確:須分化良好/中度。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"103030-54":{"quick":"不需優先大腸鏡者為 C:單純長期便秘(無警訊)。","detail":{"background":"大腸鏡優先適應:糞便潛血陽性、大腸癌家族史、大腸息肉病史、排便習慣改變/血便/體重減輕等警訊。單純「長期便秘」而無警訊症狀者,不需優先安排大腸鏡。","options":{"A":"需:糞潛血陽性。","B":"需:大腸癌家族史。","C":"★不需優先(本題答案):單純長期便秘。","D":"需:大腸息肉病史。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"104030-54":{"quick":"最不可能為 B:20 歲年輕女性的直腸黏膜發炎,缺血性大腸炎極少見(好發老年血管病變)。","detail":{"background":"年輕人直腸/結腸黏膜發炎鑑別:潰瘍性結腸炎、感染性大腸炎、藥物(抗生素相關/NSAID)性大腸炎較常見;「缺血性大腸炎」好發於老年、有心血管疾病者(分水嶺如脾曲),20 歲健康女性極少見。","options":{"A":"可能:潰瘍性大腸炎好發年輕。","B":"★最不可能(本題答案):缺血性大腸炎好發老年。","C":"可能:藥物性大腸炎。","D":"可能:感染性大腸炎。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"104030-55":{"quick":"非治療選項者為 B:潰瘍性結腸炎以 5-ASA/磺胺(sulfasalazine)、類固醇、飲食調整治療,「抗生素」非標準治療。","detail":{"background":"發炎性腸道疾病:潰瘍性結腸炎(UC)—黏膜層連續性發炎、由直腸往近端、血便,手術(全大腸直腸切除)「可治癒」,適應症:猛爆性/藥物無效、毒性巨結腸、穿孔、大出血、分化不良/癌變。克隆氏症(Crohn)—全層、跳躍、口到肛任何處(好發迴腸末端)、瘻管/狹窄/膿瘍,「手術不能治癒」(易復發),以藥物為主、手術保留腸段只處理併發症;相對好發較高社經、「抽菸是危險因子」(與 UC 相反)。","options":{"A":"是:禁乳製品(部分不耐)。","B":"★非選項(本題答案):UC 非以抗生素治療。","C":"是:類固醇誘導緩解。","D":"是:磺胺類(sulfasalazine)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"104090-51":{"quick":"大腸癌最常見轉移路徑為 C(亦接受 D):經由淋巴系統轉移(血行轉移肝為遠端最常見部位)。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"腸壁直接侵犯非「轉移」。","B":"腹膜種植較晚。","C":"★正確(本題答案):淋巴轉移為最常見區域轉移路徑。","D":"血行轉移(肝)亦給分。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"105020-50":{"quick":"錯在 A:腸氣(flatus)主要來自「腸道細菌發酵」,非以吞入的大氣為主。","detail":{"background":"大腸生理:腸氣主要為細菌發酵產生(氫、甲烷、CO₂),吞入空氣為次;遠端大腸缺醣類,細菌行蛋白腐敗(putrefaction)產生毒素,與遠端大腸癌好發有關;短鏈脂肪酸(乙酸/丙酸/丁酸)為結腸細胞重要能量、抑制癌變;水溶性纖維被細菌分解產短鏈脂肪酸、非水溶性纖維增加糞便體積治便秘。","options":{"A":"★錯誤(本題答案):腸氣主要來自細菌發酵。","B":"正確:遠端腐敗過程與毒素。","C":"正確:短鏈脂肪酸對結腸細胞重要。","D":"正確:水溶/非水溶纖維作用。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"105020-51":{"quick":"錯在 D:免疫法糞潛血(FIT)「不需」飲食限制;需避免紅肉/維生素 C 的是化學法(guaiac)。","detail":{"background":"糞便潛血(FOBT):是無症狀者良好的大腸癌篩檢工具。免疫法(FIT)以抗體偵測人類血紅素,特異度較化學(guaiac)法高,且因上消化道血紅素已被分解,FIT 陽性反映「下消化道(大腸直腸)」出血;FIT「不需」飲食限制(化學法才需術前 3 天避免紅肉、維生素 C)。","options":{"A":"正確:無危險因子者良好篩檢工具。","B":"正確:免疫法特異度較化學法高。","C":"正確:FIT 反映下消化道出血。","D":"★錯誤(本題答案):FIT 不需避免紅肉(化學法才需)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"105020-52":{"quick":"克隆氏症最常見症狀為 A:腹瀉與腹痛。","detail":{"background":"發炎性腸道疾病:潰瘍性結腸炎(UC)—黏膜層連續性發炎、由直腸往近端、血便,手術(全大腸直腸切除)「可治癒」,適應症:猛爆性/藥物無效、毒性巨結腸、穿孔、大出血、分化不良/癌變。克隆氏症(Crohn)—全層、跳躍、口到肛任何處(好發迴腸末端)、瘻管/狹窄/膿瘍,「手術不能治癒」(易復發),以藥物為主、手術保留腸段只處理併發症;相對好發較高社經、「抽菸是危險因子」(與 UC 相反)。","options":{"A":"★正確(本題答案):腹瀉與腹痛最常見。","B":"直腸出血較常見於 UC。","C":"肛門膿瘍為併發症非最常見。","D":"腸皮瘻管為併發症。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"105020-53":{"quick":"第三期直腸癌→C:術前放射線合併化學治療(neoadjuvant CRT)。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"單獨放療不足。","B":"單獨化療不足。","C":"★正確(本題答案):術前同步放化療再手術。","D":"局部進展不宜直接手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"106020-54":{"quick":"不需要的檢查為 D:甲型胎兒蛋白(AFP)用於肝/生殖細胞癌,非大腸癌;大腸癌標記為 CEA。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"需:大腸鏡切片確診。","B":"需:CT 分期。","C":"需:CEA(大腸癌標記)。","D":"★不需(本題答案):AFP 非大腸癌標記。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"106020-55":{"quick":"錯在 C:盲腸扭轉「不」適合大腸鏡還原後擇期手術;盲腸扭轉應手術(右半結腸切除/盲腸固定)。乙狀結腸扭轉才先內視鏡復位。","detail":{"background":"結腸扭轉:乙狀結腸最常見(可先軟式內視鏡復位再擇期手術),盲腸次之。盲腸扭轉危險因子含高纖大量攝取、精神科用藥、腹部手術史,常合併升結腸扭轉;治療以「手術(右半結腸切除或盲腸固定)」為主,不宜僅內視鏡復位。","options":{"A":"正確:乙狀結腸最常見。","B":"正確:盲腸扭轉危險因子。","C":"★錯誤(本題答案):盲腸扭轉應手術,非內視鏡復位。","D":"正確:常合併升結腸扭轉。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"106080-39":{"quick":"HNPCC(Lynch)最常見腸外腫瘤為 C:子宮內膜癌。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"泌尿道癌較少。","B":"胃癌較少。","C":"★正確(本題答案):子宮內膜癌最常見腸外腫瘤。","D":"卵巢癌較少。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"106080-41":{"quick":"錯在 A:單一 APC 突變「不足以」直接產生大腸癌,需累積多個基因突變(腺瘤-癌序列)。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"★錯誤(本題答案):APC 突變僅起始,需累積多突變才致癌。","B":"正確:APC 是 FAP 成因。","C":"正確:FAP 為顯性遺傳。","D":"正確:FAP 為大腸癌高危險群。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"107020-49":{"quick":"錯在 C:腎功能不佳者「應避免」磷酸鈉(sodium phosphate)灌腸劑(磷酸鹽腎病/高血磷風險)。","detail":{"background":"選擇性大腸手術術前準備新觀念:大腸最常見菌為厭氧 Bacteroides;預防抗生素切皮前 30–60 分內施打、長手術每數小時補充;快速康復(fast-track/ERAS)反對長時間禁食(致腸黏膜萎縮)。機械性清腸用 PEG 較安全;「磷酸鈉」在腎功能不佳者會致急性磷酸鹽腎病/高血磷,應避免。","options":{"A":"正確:大腸最常見菌為厭氧 Bacteroides。","B":"正確:抗生素切皮前 30 分內、長手術補充。","C":"★錯誤(本題答案):腎功能差者應避免磷酸鈉灌腸劑。","D":"正確:ERAS 反對長時間禁食。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"107020-54":{"quick":"升結腸大量出血、休克、老年→B:大腸憩室出血(下消化道大量出血最常見原因)。","detail":{"background":"老年人下消化道大量出血(致休克)最常見原因為「憩室出血」(右側憩室易大出血,常自限)與血管發育不良。本例升結腸出血→憩室出血。處置:輸液復甦、內視鏡/血管攝影定位與止血。","options":{"A":"大腸癌出血多慢性少致休克。","B":"★正確(本題答案):憩室出血。","C":"UC 為慢性血便。","D":"Crohn 非典型大量出血。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"107020-55":{"quick":"較不恰當為 A:憩室「出血」非感染,抗生素非治療;應內視鏡/血管攝影止血,無效則手術。","detail":{"background":"憩室「出血」與憩室「炎」不同:出血是無痛大量血便,治療為復甦+內視鏡止血/血管攝影栓塞,保守無效則手術切除;「抗生素」是治療憩室炎(感染),對憩室出血無治療角色。","options":{"A":"★較不恰當(本題答案):抗生素非憩室出血治療。","B":"恰當:大腸鏡止血。","C":"恰當:血管攝影栓塞。","D":"恰當:保守無效則手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"107080-48":{"quick":"FAP(數百顆息肉、家族史、青少年)→D(僅23):基因在 5q21(2)、顯性遺傳(3);非錯配修復(1 為 HNPCC)、FAP 多有家族史(4 錯)。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"僅13:含 1(MMR 為 HNPCC,錯)。","B":"1234:含 1、4 錯。","C":"僅124:含 1、4 錯。","D":"★正確(本題答案):僅 2、3(5q21、顯性遺傳)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"107080-49":{"quick":"錯在 D:Stage IV 之「RAS 突變」對 anti-EGFR「無效」;只有 RAS 野生型才受益。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"正確:Stage I 術後不需輔助化療。","B":"正確:高風險 Stage II 可用 5-FU。","C":"正確:FOLFOX 延長 Stage III 存活。","D":"★錯誤(本題答案):RAS 突變對 anti-EGFR 無效。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"107080-50":{"quick":"錯在 D:單次憩室炎發作「不需」常規切除預防復發;依複雜度/反覆發作個別評估。","detail":{"background":"大腸憩室炎:好發乙狀結腸,診斷首選 CT。分非複雜性(可保守—抗生素/支持)與複雜性(膿瘍、穿孔、瘻管、阻塞)。Hinchey 分期:I 結腸旁膿瘍、II 骨盆膿瘍、III 廣泛化膿性腹膜炎、IV 糞性腹膜炎。手術適應症:游離穿孔併腹膜炎、無法引流的大膿瘍、瘻管(如結腸膀胱瘻)、阻塞、反覆發作影響生活。小膿瘍(<3–4 cm)可抗生素,較大者經皮引流。單次非複雜發作「不需」常規切除;緩解後 4–8 週做大腸鏡排除癌症(急性期不做大腸鏡)。","options":{"A":"正確:CT 評估嚴重度。","B":"正確:非複雜性可保守治療。","C":"正確:緩解後 4–6 週大腸鏡排除癌症。","D":"★錯誤(本題答案):單次發作不需常規切除。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"108080-54":{"quick":"非立刻安排者為 D:CT 非門診當下「立刻」做的;理學檢查、肛門指診、陰道指診才是即時評估。","detail":{"background":"下腹痛+排便頻繁的婦女門診即時評估:腹部理學檢查、肛門指診(找腫塊/血)、陰道指診(婦科鑑別)。電腦斷層非門診當下立刻安排的項目(後續視需要)。","options":{"A":"即時:腹部理學檢查。","B":"即時:肛門指診。","C":"即時:陰道指診(婦科鑑別)。","D":"★非立刻(本題答案):CT 非門診當下即做。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"108080-55":{"quick":"糞便有血、直腸無異常→C:大腸鏡纖維內視鏡檢查(最適後續)。","detail":{"background":"糞便潛血/帶血而直腸指診/鏡檢正常→應安排「大腸鏡」全大腸評估(可切片、息肉切除),為診斷與處置兼具的最適工具,優於鋇劑攝影/CT/超音波。","options":{"A":"CT 非首選確診。","B":"鋇劑攝影不如大腸鏡。","C":"★正確(本題答案):大腸鏡。","D":"腹部超音波不適合。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"109020-45":{"quick":"TME「不會」造成 A:性無能機率增高;全直腸繫膜切除+神經保留反而「減少」性/膀胱功能障礙。","detail":{"background":"全直腸繫膜切除(TME):沿直腸繫膜筋膜平面銳性剝離、保留自律神經,可降低局部復發、改善長期預後、並「減少」膀胱與性功能障礙(神經保留)。故「性無能機率增高」不會發生。","options":{"A":"★不會(本題答案):TME 神經保留減少而非增加性功能障礙。","B":"會:長期預後較佳。","C":"會:局部復發減少。","D":"會:膀胱功能障礙減少。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"109080-48":{"quick":"憩室炎手術適應症為 B(僅13):游離穿孔併腹膜炎(1)、結腸膀胱瘻(3);局部 2 cm 膿瘍無腹膜炎(2)可引流/保守、貧血 Hb 9.9(4)非手術適應症。","detail":{"background":"大腸憩室炎:好發乙狀結腸,診斷首選 CT。分非複雜性(可保守—抗生素/支持)與複雜性(膿瘍、穿孔、瘻管、阻塞)。Hinchey 分期:I 結腸旁膿瘍、II 骨盆膿瘍、III 廣泛化膿性腹膜炎、IV 糞性腹膜炎。手術適應症:游離穿孔併腹膜炎、無法引流的大膿瘍、瘻管(如結腸膀胱瘻)、阻塞、反覆發作影響生活。小膿瘍(<3–4 cm)可抗生素,較大者經皮引流。單次非複雜發作「不需」常規切除;緩解後 4–8 週做大腸鏡排除癌症(急性期不做大腸鏡)。","options":{"A":"僅123:含 2(小膿瘍可保守)。","B":"★正確(本題答案):僅 1、3。","C":"僅24:非手術適應症。","D":"1234:含 2、4。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"109080-50":{"quick":"錯在 A:提肛肌(levator ani)由恥骨尾骨肌、恥骨直腸肌「與髂骨尾骨肌(iliococcygeus)」組成,A 敘述不完整(遺漏 iliococcygeus)。","detail":{"background":"骨盆底提肛肌(levator ani)=恥骨尾骨肌(pubococcygeus)+恥骨直腸肌(puborectalis)+髂骨尾骨肌(iliococcygeus)。恥骨直腸肌呈 U 形繞直腸,收縮時維持肛門直腸銳角(控便)、「放鬆時角度拉直」利排便。骨盆底功能障礙致排便異常。","options":{"A":"★錯誤(本題答案):提肛肌組成遺漏髂骨尾骨肌。","B":"正確:維持張力支撐器官、協調控便。","C":"正確:恥骨直腸肌放鬆使肛直角拉直。","D":"正確:功能障礙致排便異常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"109080-72":{"quick":"IMA 血管攝影箭號所指出血源→B:上直腸動脈(superior rectal artery,IMA 終末分支)。","detail":{"background":"大腸解剖:升結腸、降結腸、直腸「附著於後腹腔(腹膜後)」;橫結腸與乙狀結腸有腸繫膜、「腹膜內」、活動度大易扭轉。盲腸壁最薄(阻塞時依 Laplace 最易穿孔);乙狀結腸壁較降結腸厚。胚胎:前腸(腹腔動脈)、中腸(SMA,遠端十二指腸至近端 2/3 橫結腸)、後腸(IMA,遠端 1/3 橫結腸至上肛管)。IMA 分支:左結腸動脈、乙狀結腸動脈、上直腸動脈(中/下直腸動脈來自內髂動脈)。","options":{"A":"內陰部動脈來自內髂動脈。","B":"★正確(本題答案):上直腸動脈為 IMA 終末分支。","C":"下臀動脈來自內髂動脈。","D":"上膀胱動脈來自內髂動脈。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"110020-44":{"quick":"廣泛化膿性腹膜炎屬 B:Hinchey stage III。","detail":{"background":"大腸憩室炎:好發乙狀結腸,診斷首選 CT。分非複雜性(可保守—抗生素/支持)與複雜性(膿瘍、穿孔、瘻管、阻塞)。Hinchey 分期:I 結腸旁膿瘍、II 骨盆膿瘍、III 廣泛化膿性腹膜炎、IV 糞性腹膜炎。手術適應症:游離穿孔併腹膜炎、無法引流的大膿瘍、瘻管(如結腸膀胱瘻)、阻塞、反覆發作影響生活。小膿瘍(<3–4 cm)可抗生素,較大者經皮引流。單次非複雜發作「不需」常規切除;緩解後 4–8 週做大腸鏡排除癌症(急性期不做大腸鏡)。","options":{"A":"stage IV 為糞性腹膜炎。","B":"★正確(本題答案):stage III 化膿性腹膜炎。","C":"stage II 為骨盆膿瘍。","D":"stage I 為結腸旁膿瘍。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"110020-46":{"quick":"錯在 D:腺瘤-癌序列約需「10 年」,非 1–2 年。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"正確:多基因變異漸成癌。","B":"正確:腺瘤越大癌化率越高。","C":"正確:絨毛狀腺瘤癌化率高於管狀。","D":"★錯誤(本題答案):腺瘤癌變約需 10 年。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"110080-47":{"quick":"錯在 D:肥胖與久坐「增加」而非減少大腸直腸癌發生率。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"正確:~90% 病例>50 歲。","B":"正確:約八成偶發、兩成家族史。","C":"正確:高動物脂肪低纖維者好發。","D":"★錯誤(本題答案):肥胖久坐增加 CRC 風險。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"110080-49":{"quick":"錯在 D:乙狀結腸壁「較厚」於降結腸;盲腸壁最薄、阻塞時最易穿孔(Laplace)。","detail":{"background":"大腸解剖:升結腸、降結腸、直腸「附著於後腹腔(腹膜後)」;橫結腸與乙狀結腸有腸繫膜、「腹膜內」、活動度大易扭轉。盲腸壁最薄(阻塞時依 Laplace 最易穿孔);乙狀結腸壁較降結腸厚。胚胎:前腸(腹腔動脈)、中腸(SMA,遠端十二指腸至近端 2/3 橫結腸)、後腸(IMA,遠端 1/3 橫結腸至上肛管)。IMA 分支:左結腸動脈、乙狀結腸動脈、上直腸動脈(中/下直腸動脈來自內髂動脈)。","options":{"A":"正確:闌尾基部位於盲腸結腸帶聚合處。","B":"正確:Treves 皺襞可定位闌尾。","C":"正確:直腸無結腸帶與腸脂垂。","D":"★錯誤(本題答案):乙狀結腸壁較厚;盲腸最易穿孔。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"111020-9":{"quick":"pT3N1(Stage III)結腸癌→B:FOLFOX(oxaliplatin 為主)輔助化療。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"Stage III 不應只追蹤。","B":"★正確(本題答案):FOLFOX 輔助化療。","C":"FOLFIRI 用於轉移性,非輔助首選。","D":"非轉移性不常規加標靶。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"111020-10":{"quick":"錯在 B:中腸衍生結構為「遠端十二指腸至近端 2/3 橫結腸」,非「近端空腸至遠端橫結腸」。","detail":{"background":"大腸解剖:升結腸、降結腸、直腸「附著於後腹腔(腹膜後)」;橫結腸與乙狀結腸有腸繫膜、「腹膜內」、活動度大易扭轉。盲腸壁最薄(阻塞時依 Laplace 最易穿孔);乙狀結腸壁較降結腸厚。胚胎:前腸(腹腔動脈)、中腸(SMA,遠端十二指腸至近端 2/3 橫結腸)、後腸(IMA,遠端 1/3 橫結腸至上肛管)。IMA 分支:左結腸動脈、乙狀結腸動脈、上直腸動脈(中/下直腸動脈來自內髂動脈)。","options":{"A":"正確:前腸由腹腔動脈供血。","B":"★錯誤(本題答案):中腸範圍為遠端十二指腸至近端 2/3 橫結腸。","C":"正確:肛門內括約肌由直腸環肌延伸。","D":"正確:泌尿生殖膈尾向分隔。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"111020-11":{"quick":"錯在 C:腸道菌的尿素再循環產氨,在「肝衰竭」病人「有害」(加重肝腦病變),非有助。","detail":{"background":"大腸菌叢:維持上皮完整與營養功能、Bacteroides 約佔三分之二、參與尿素再循環產氨。在肝衰竭時腸道產氨會加重肝腦病變,故臨床用 lactulose/rifaximin「減少」產氨,「有助肝衰竭」之敘述錯誤。大腸吸收面積約 900 cm²、再吸收大量水分。","options":{"A":"正確:菌叢維持上皮完整與營養。","B":"正確:Bacteroides 約佔三分之二。","C":"★錯誤(本題答案):產氨對肝衰竭有害,非有助。","D":"正確:再吸收大量水分。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"111020-12":{"quick":"較不適宜為 D:血便+休克(HR 120、BP 90/56)應先「復甦、定位出血」,而非直接安排緊急手術。","detail":{"background":"下消化道大量出血併血流動力不穩:先 ABC 復甦(兩條大管路輸液/備血、血型配對)、完整病史(抗凝劑/息肉切除史)、肛門檢查、放鼻胃管或上消化道鏡排除上消化道源、再內視鏡/血管攝影定位止血;「直接安排緊急手術」過早,手術保留給定位後止血失敗者。","options":{"A":"適宜:病史用藥+肛門檢查。","B":"適宜:輸液、配血。","C":"適宜:鼻胃管/上消化道鏡排除上源。","D":"★較不適宜(本題答案):應先復甦定位,非直接緊急手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"111080-50":{"quick":"錯在 B:每日腹瀉 5 次本身非 UC 手術適應症;猛爆性藥物無效、毒性巨結腸、分化不良才是。","detail":{"background":"發炎性腸道疾病:潰瘍性結腸炎(UC)—黏膜層連續性發炎、由直腸往近端、血便,手術(全大腸直腸切除)「可治癒」,適應症:猛爆性/藥物無效、毒性巨結腸、穿孔、大出血、分化不良/癌變。克隆氏症(Crohn)—全層、跳躍、口到肛任何處(好發迴腸末端)、瘻管/狹窄/膿瘍,「手術不能治癒」(易復發),以藥物為主、手術保留腸段只處理併發症;相對好發較高社經、「抽菸是危險因子」(與 UC 相反)。","options":{"A":"是:猛爆性且藥物無效。","B":"★錯誤(本題答案):腹瀉 5 次/日非手術適應症。","C":"是:毒性巨結腸。","D":"是:出現分化不良病灶。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"111080-51":{"quick":"未附著後腹腔者為 C:橫結腸(有腸繫膜、腹膜內);升/降結腸與直腸附著後腹腔。","detail":{"background":"大腸解剖:升結腸、降結腸、直腸「附著於後腹腔(腹膜後)」;橫結腸與乙狀結腸有腸繫膜、「腹膜內」、活動度大易扭轉。盲腸壁最薄(阻塞時依 Laplace 最易穿孔);乙狀結腸壁較降結腸厚。胚胎:前腸(腹腔動脈)、中腸(SMA,遠端十二指腸至近端 2/3 橫結腸)、後腸(IMA,遠端 1/3 橫結腸至上肛管)。IMA 分支:左結腸動脈、乙狀結腸動脈、上直腸動脈(中/下直腸動脈來自內髂動脈)。","options":{"A":"升結腸附著後腹腔。","B":"降結腸附著後腹腔。","C":"★正確(本題答案):橫結腸為腹膜內、有腸繫膜。","D":"直腸(中下段)位於腹膜後/外。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"112020-50":{"quick":"錯在 C:克隆氏症「不」以切除發炎腸段為主要治療(易復發、保留腸段),以藥物為主、手術僅處理併發症。","detail":{"background":"發炎性腸道疾病:潰瘍性結腸炎(UC)—黏膜層連續性發炎、由直腸往近端、血便,手術(全大腸直腸切除)「可治癒」,適應症:猛爆性/藥物無效、毒性巨結腸、穿孔、大出血、分化不良/癌變。克隆氏症(Crohn)—全層、跳躍、口到肛任何處(好發迴腸末端)、瘻管/狹窄/膿瘍,「手術不能治癒」(易復發),以藥物為主、手術保留腸段只處理併發症;相對好發較高社經、「抽菸是危險因子」(與 UC 相反)。","options":{"A":"正確:UC 藥物無效可手術。","B":"正確:UC 手術為全大腸直腸切除+迴腸造口/IPAA。","C":"★錯誤(本題答案):Crohn 非以切除為主要治療。","D":"正確:Crohn 腸皮瘻管可手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"112080-50":{"quick":"74歲、左下腹痛+發燒+憩室炎史+硬塊局部腹膜炎→C:乙狀結腸憩室炎破裂併膿瘍。","detail":{"background":"大腸憩室炎:好發乙狀結腸,診斷首選 CT。分非複雜性(可保守—抗生素/支持)與複雜性(膿瘍、穿孔、瘻管、阻塞)。Hinchey 分期:I 結腸旁膿瘍、II 骨盆膿瘍、III 廣泛化膿性腹膜炎、IV 糞性腹膜炎。手術適應症:游離穿孔併腹膜炎、無法引流的大膿瘍、瘻管(如結腸膀胱瘻)、阻塞、反覆發作影響生活。小膿瘍(<3–4 cm)可抗生素,較大者經皮引流。單次非複雜發作「不需」常規切除;緩解後 4–8 週做大腸鏡排除癌症(急性期不做大腸鏡)。","options":{"A":"缺血壞死表現不同。","B":"乙狀結腸扭轉為阻塞,非發燒膿瘍。","C":"★正確(本題答案):乙狀結腸憩室炎破裂併膿瘍。","D":"空腸繫膜膿瘍位置不符(左下腹)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"112080-51":{"quick":"非源自 IMA 者為 D:中直腸動脈(來自內髂動脈)。IMA 分支=左結腸、乙狀結腸、上直腸動脈。","detail":{"background":"大腸解剖:升結腸、降結腸、直腸「附著於後腹腔(腹膜後)」;橫結腸與乙狀結腸有腸繫膜、「腹膜內」、活動度大易扭轉。盲腸壁最薄(阻塞時依 Laplace 最易穿孔);乙狀結腸壁較降結腸厚。胚胎:前腸(腹腔動脈)、中腸(SMA,遠端十二指腸至近端 2/3 橫結腸)、後腸(IMA,遠端 1/3 橫結腸至上肛管)。IMA 分支:左結腸動脈、乙狀結腸動脈、上直腸動脈(中/下直腸動脈來自內髂動脈)。","options":{"A":"左結腸動脈源自 IMA。","B":"乙狀結腸動脈源自 IMA。","C":"上直腸動脈源自 IMA。","D":"★正確(本題答案):中直腸動脈源自內髂動脈。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"112080-52":{"quick":"缺陷瘤性息肉+唇/口腔/指端黑色素沈澱→B:Peutz-Jeghers 症候群。","detail":{"background":"Peutz-Jeghers 症候群:STK11(LKB1)突變、體染色體顯性,特徵為消化道「缺陷瘤性(hamartomatous)息肉」+「皮膚黏膜黑色素沈著(唇、口腔、指端)」,增加多種癌症風險。Juvenile polyposis、Lynch、FAP 無此色素特徵。","options":{"A":"幼年型息肉症無色素沈著。","B":"★正確(本題答案):Peutz-Jeghers 症候群。","C":"Lynch 無缺陷瘤/色素。","D":"FAP 為腺瘤性息肉。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"113020-33":{"quick":"最恰當為 C:克隆氏症相對好發較高社經、「抽菸是危險因子」。","detail":{"background":"發炎性腸道疾病:潰瘍性結腸炎(UC)—黏膜層連續性發炎、由直腸往近端、血便,手術(全大腸直腸切除)「可治癒」,適應症:猛爆性/藥物無效、毒性巨結腸、穿孔、大出血、分化不良/癌變。克隆氏症(Crohn)—全層、跳躍、口到肛任何處(好發迴腸末端)、瘻管/狹窄/膿瘍,「手術不能治癒」(易復發),以藥物為主、手術保留腸段只處理併發症;相對好發較高社經、「抽菸是危險因子」(與 UC 相反)。","options":{"A":"錯:手術不能治癒 Crohn。","B":"錯:可侵犯全消化道(好發迴腸末端),非主要在大腸。","C":"★正確(本題答案):較高社經、抽菸為危險因子。","D":"錯:壞疽性膿皮症/僵直性脊椎炎與腸道發炎嚴重度未必正相關(AS 不相關)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"113020-50":{"quick":"糞潛血陽性、乙狀結腸 1 cm 莖性息肉→A:內視鏡息肉切除。","detail":{"background":"大腸鏡發現有莖息肉(pedunculated,約 1 cm)→「內視鏡息肉切除(polypectomy)」兼具診斷與治療(完整病理),非只切片或觀察;除非病理顯示侵犯性癌切緣陽性才需進一步根除手術。","options":{"A":"★正確(本題答案):內視鏡息肉切除。","B":"只切片不完整。","C":"1 cm 息肉不需直接根除手術。","D":"不可只觀察。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"113070-50":{"quick":"正確為 C:未固定於後腹腔、腸繫膜較長的結腸(乙狀、盲腸)較易扭轉。","detail":{"background":"結腸扭轉好發於「活動度大、腸繫膜長、未固定後腹腔」的乙狀結腸(最常見)與盲腸。好發於慢性便秘的「老年」、低纖/長期臥床/精神科用藥者(非年輕高纖)。乙狀結腸扭轉 X 光見「咖啡豆/omega 徵象」(非琴鍵徵—琴鍵是小腸瓣膜皺襞)。","options":{"A":"錯:好發乙狀結腸,非橫結腸。","B":"錯:好發老年便秘、非年輕高纖。","C":"★正確(本題答案):未固定、長腸繫膜易扭轉。","D":"錯:乙狀結腸扭轉為咖啡豆徵,非琴鍵徵。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"113070-51":{"quick":"最不適合(亦接受 B)為 D:檸檬酸鎂(magnesium citrate)在腎功能不佳會致「高血鎂」,應避免。","detail":{"background":"腎功能不佳者清腸:應避免「含鎂(檸檬酸鎂)」與「磷酸鈉」製劑(高血鎂/高血磷/磷酸鹽腎病風險)。聚乙二醇(PEG)等張溶液相對安全為首選;bisacodyl、灌腸亦可。(本題答案鍵接受 B、D 給分,核心為避免含鎂瀉劑。)","options":{"A":"bisacodyl 可用。","B":"PEG 為較安全選擇(給分)。","C":"灌腸可用。","D":"★最不適合(本題答案):檸檬酸鎂致高血鎂,腎功能差應避免。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"113070-52":{"quick":"侵犯至肌肉層(muscularis propria)但未穿越→B:T2。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"T1 為侵犯黏膜下層。","B":"★正確(本題答案):T2 侵犯肌肉層未穿越。","C":"T3 穿越肌層至漿膜下。","D":"T4 侵臟層腹膜/鄰器官。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"114070-50":{"quick":"錯在 C:Stage III 結腸癌術後輔助為「化療(FOLFOX)」,並非「都應接受標靶藥物」(標靶用於轉移性)。","detail":{"background":"大腸直腸癌(CRC):多為後天累積基因突變(腺瘤-癌序列,需約 10 年;APC→KRAS→p53)。風險:年齡(~90% >50 歲)、動物脂肪高/纖維低、肥胖久坐、家族史、IBD、遺傳症候群。家族性大腸息肉症(FAP)=APC(5q21)突變、體染色體顯性、數百顆息肉、近乎 100% 癌變;Lynch/HNPCC=錯配修復(MMR)基因突變,腸外腫瘤以「子宮內膜癌」最常見。T 分期:T1 黏膜下、T2 肌肉層(muscularis propria)、T3 穿肌層至漿膜下、T4a 侵臟層腹膜、T4b 侵鄰器官。治療:手術為主;Stage III(或高風險 II)→輔助 FOLFOX(oxaliplatin)化療;直腸癌局部進展(III)→術前同步放化療;轉移性 RAS「野生型」才用 anti-EGFR(cetuximab),RAS 突變無效;另有 anti-VEGF(bevacizumab)。CEA 為追蹤標記(非 AFP)。","options":{"A":"正確:多為後天基因突變。","B":"正確:部分有 K-ras 突變。","C":"★錯誤(本題答案):Stage III 輔助為化療,非都用標靶。","D":"正確:標靶分 VEGF 與 EGFR 兩類。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"115020-16":{"quick":"正確為 D:急性非複雜憩室炎緩解後 4–8 週做大腸鏡(排除癌症)。","detail":{"background":"大腸憩室炎:好發乙狀結腸,診斷首選 CT。分非複雜性(可保守—抗生素/支持)與複雜性(膿瘍、穿孔、瘻管、阻塞)。Hinchey 分期:I 結腸旁膿瘍、II 骨盆膿瘍、III 廣泛化膿性腹膜炎、IV 糞性腹膜炎。手術適應症:游離穿孔併腹膜炎、無法引流的大膿瘍、瘻管(如結腸膀胱瘻)、阻塞、反覆發作影響生活。小膿瘍(<3–4 cm)可抗生素,較大者經皮引流。單次非複雜發作「不需」常規切除;緩解後 4–8 週做大腸鏡排除癌症(急性期不做大腸鏡)。","options":{"A":"錯:急性發作不宜大腸鏡(穿孔風險)。","B":"錯:非複雜性以保守治療,非手術切除。","C":"錯:小膿瘍(<3–4 cm)可抗生素,非一律引流。","D":"★正確(本題答案):緩解後 4–8 週大腸鏡排除癌症。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery","NCCN Colorectal Cancer Guideline"]}},"102110-53":{"quick":"錯在 A:肛門 Bowen 氏病是「鱗狀細胞原位癌(squamous cell carcinoma in situ)」,非原位「腺癌」。","detail":{"background":"肛門 Bowen 氏病=皮膚/肛門周圍「鱗狀細胞原位癌」,病灶侷限表皮、很少轉移;多無症狀或輕微;治療為局部廣泛切除,術中冷凍切片協助確認切緣。屬鱗狀上皮病變,非腺癌。","options":{"A":"★錯誤(本題答案):為鱗狀細胞原位癌,非原位腺癌。","B":"正確:多無症狀。","C":"正確:局部廣泛切除可治癒。","D":"正確:冷凍切片助定切除範圍。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"102110-55":{"quick":"錯在 C:肛門惡性黑色素瘤可為「無色素型(amelanotic)」,並非必為黑色素型。","detail":{"background":"肛門肛管惡性黑色素瘤:罕見、預後差(五年存活約 26% 或更低),可表現肛門出血/腫塊;可為色素型或「無色素型(amelanotic)」。腹會陰切除(APR)未必優於廣泛局部切除(預後主要取決於腫瘤厚度/分期)。","options":{"A":"正確:可肛門出血。","B":"正確:五年存活約 26% 或更低。","C":"★錯誤(本題答案):可為無色素型。","D":"正確:APR 未必優於局部切除。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"103030-52":{"quick":"錯在 C(亦接受 B):轉移性肛門上皮癌「不」以腹會陰切除(APR)為首選;主要治療是「同步放化療(Nigro)」,APR 為局部失敗的救援。","detail":{"background":"肛門上皮樣(鱗狀)細胞癌:細胞型態不同於直腸腺癌;「同步放化療(Nigro protocol,5-FU+mitomycin+放療)」為主要治療,保留肛門功能;APR 僅為放化療後局部殘留/復發的「救援手術」,非轉移性首選。鼠蹊淋巴轉移時預後較差。","options":{"A":"正確:細胞型態不同於直腸癌。","B":"(給分)同步放化療是主要治療(本敘述本身正確)。","C":"★錯誤(本題答案):轉移性非以 APR 為首選。","D":"正確:鼠蹊淋巴轉移預後差。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"103100-51":{"quick":"錯在 B:並非所有肛門瘻管皆可「安全切除」;高位/複雜瘻管切開恐傷括約肌致失禁,需掛線(seton)等。","detail":{"background":"肛門瘻管(fistula-in-ano):多源自肛門腺體感染(肛門膿瘍)後形成。Goodsall 法則:以肛門橫線為界,外口在「後半」者瘻管彎曲、內口在「後正中(6 點)」;外口在「前半」者瘻管直行、內口在對應放射狀位置。並非所有瘻管皆可安全一次切開(高位/複雜瘻管切開恐失禁,需掛線 seton)。","options":{"A":"正確:Goodsall 法則助定位內口。","B":"★錯誤(本題答案):複雜/高位瘻管不可一律切開。","C":"正確:男女發生率不同(男較多)。","D":"正確:肛門腺體發炎為主因。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"104030-52":{"quick":"錯在 D:切除痔瘡「不會」改善便秘(便秘是因、痔瘡是果);應評估嚴重度、排除大腸癌、治療便秘。","detail":{"background":"痔瘡:肛門黏膜下含動靜脈叢與平滑肌的「肛墊」,參與控便(精細控制),非單純血管曲張。內痔分級:I 無脫出(僅出血)、II 脫出可「自動」回復、III 脫出需「手動」回復、IV 無法回復/嵌頓。多數痔瘡以保守治療(高纖、多喝水、溫水坐浴、局部藥)改善,並非全部需手術;痔瘡切除術用於保守無效或 III–IV 度。「便秘致痔瘡」非反之,切痔瘡不會改善便秘。痔瘡橡皮圈結紮(banding)適用於「內痔」(I–III),不用於外痔(有體神經、會痛)。","options":{"A":"恰當:檢查痔瘡嚴重度。","B":"恰當:安排大腸鏡排除大腸癌(60 歲血便)。","C":"恰當:評估肛門收縮力。","D":"★錯誤(本題答案):切痔瘡不改善便秘。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"104090-48":{"quick":"錯在 A:脫出後可「自動回復」的內痔屬第「二」度,非第三度。","detail":{"background":"痔瘡:肛門黏膜下含動靜脈叢與平滑肌的「肛墊」,參與控便(精細控制),非單純血管曲張。內痔分級:I 無脫出(僅出血)、II 脫出可「自動」回復、III 脫出需「手動」回復、IV 無法回復/嵌頓。多數痔瘡以保守治療(高纖、多喝水、溫水坐浴、局部藥)改善,並非全部需手術;痔瘡切除術用於保守無效或 III–IV 度。「便秘致痔瘡」非反之,切痔瘡不會改善便秘。痔瘡橡皮圈結紮(banding)適用於「內痔」(I–III),不用於外痔(有體神經、會痛)。","options":{"A":"★錯誤(本題答案):自動回復為第二度,非三度。","B":"正確:多數可飲食調整改善。","C":"正確:須肛門指診排除腫瘤。","D":"正確:>40 歲+家族史+血便應大腸鏡。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"104090-49":{"quick":"錯在 D:rectosacral fascia(Waldeyer 筋膜)不是 Denonvilliers 筋膜;Denonvilliers 是直腸「前方」的直腸膀胱/陰道筋膜。","detail":{"background":"直腸繫膜剝離解剖:rectosacral(Waldeyer)筋膜在約 S4 連接骶前筋膜與直腸固有筋膜,後方剝離若穿破會傷骶前靜脈叢大出血;前方為 Denonvilliers 筋膜(直腸膀胱/直腸陰道隔)。沿正確平面(TME)剝離可避免出血與腫瘤殘留。Waldeyer ≠ Denonvilliers。","options":{"A":"正確:S4 連接骶前筋膜與固有筋膜。","B":"正確:穿破往後傷骶前靜脈叢大出血。","C":"正確:偏前破壞固有筋膜增局部復發。","D":"★錯誤(本題答案):非 Denonvilliers 筋膜。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"104090-50":{"quick":"外口在 8 點(後半)→Goodsall 法則內口在後正中 6 點(B)。","detail":{"background":"肛門瘻管(fistula-in-ano):多源自肛門腺體感染(肛門膿瘍)後形成。Goodsall 法則:以肛門橫線為界,外口在「後半」者瘻管彎曲、內口在「後正中(6 點)」;外口在「前半」者瘻管直行、內口在對應放射狀位置。並非所有瘻管皆可安全一次切開(高位/複雜瘻管切開恐失禁,需掛線 seton)。","options":{"A":"3 點不符。","B":"★正確(本題答案):後半外口→內口在後正中 6 點。","C":"9 點不符。","D":"12 點為前正中,不符。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"105100-53":{"quick":"最廣用有效為 D:局部切除加電燒灼(fulguration)。","detail":{"background":"肛門尖形濕疣(condyloma acuminatum,HPV 感染):治療多元—局部腐蝕劑(podophyllin、三/二氯醋酸)、免疫(imiquimod)、冷凍、CO₂ 雷射;病灶較大/多者「局部切除+電燒灼(fulguration)」為最廣用且有效;易復發需追蹤、注意 HPV 相關肛門上皮內病變。","options":{"A":"CO₂ 雷射為選項之一,非最廣用。","B":"干擾素注射非首選。","C":"局部腐蝕用於小病灶。","D":"★正確(本題答案):局部切除+電燒灼最廣用有效。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"105100-54":{"quick":"錯在 D:直腸癌病人「並非都需」永久人工肛門;低位前位切除可保留,僅極低位/APR 才需永久造口。","detail":{"background":"人工肛門(造口)位置原則:術前定位、置於腹直肌內、病人可見可操作、避開疤痕與骨突、皮膚平整,對生活品質重要。直腸癌依腫瘤高度決定:多數可低位前位切除(LAR)保留肛門±暫時迴腸造口;僅極低位或侵犯括約肌需腹會陰切除(APR)+永久造口,「並非都需」永久人工肛門。","options":{"A":"正確:位置影響生活品質。","B":"正確:置於腹直肌內、可見可操作。","C":"正確:避開疤痕與骨突。","D":"★錯誤(本題答案):非所有直腸癌都需永久造口。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"105100-55":{"quick":"錯在 D:並非所有痔瘡都需手術;多數保守治療即可。","detail":{"background":"痔瘡:肛門黏膜下含動靜脈叢與平滑肌的「肛墊」,參與控便(精細控制),非單純血管曲張。內痔分級:I 無脫出(僅出血)、II 脫出可「自動」回復、III 脫出需「手動」回復、IV 無法回復/嵌頓。多數痔瘡以保守治療(高纖、多喝水、溫水坐浴、局部藥)改善,並非全部需手術;痔瘡切除術用於保守無效或 III–IV 度。「便秘致痔瘡」非反之,切痔瘡不會改善便秘。痔瘡橡皮圈結紮(banding)適用於「內痔」(I–III),不用於外痔(有體神經、會痛)。","options":{"A":"正確:含動靜脈與平滑肌的肛墊。","B":"正確:參與控便。","C":"正確:保守無效可手術。","D":"★錯誤(本題答案):非所有痔瘡都需手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"110020-43":{"quick":"錯在 D:肛裂 80–90% 以保守治療癒合,「需手術」者僅少數。","detail":{"background":"肛裂(anal fissure):齒狀線至肛門緣的上皮裂傷,多在「正後方(或正前方)」中線,因內括約肌高張+硬便惡性循環;劇痛(體神經)、解便出血、慢性者有前哨皮垂(sentinel tag)與肥大乳突。80–90% 以保守治療癒合(高纖、坐浴、局部硝酸甘油/鈣離子阻斷劑鬆弛內括約肌、肉毒);頑固者行「側方內括約肌切開術」。","options":{"A":"正確:多在肛門正後/前方中線。","B":"正確:體神經致劇痛。","C":"正確:硬便-肛裂惡性循環致慢性潰瘍。","D":"★錯誤(本題答案):多數保守癒合,非 80–90% 需手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"110080-48":{"quick":"1.5 cm 栓塞外痔、第二天→A(13):局部手術切除(1)+溫水坐浴局部治療(3);單純切開(2)易復發、硬化劑(4)不用於外痔。","detail":{"background":"急性血栓性外痔:48–72 小時內劇痛者可「切除(excision,連同血栓與痔組織)」較單純切開復發少;超過急性期或症狀緩解者「溫水坐浴+局部治療」保守即可。單純切開引流易復發、硬化劑注射用於內痔非外痔。","options":{"A":"★正確(本題答案):切除(1)或保守坐浴(3)。","B":"僅24:切開易復發、硬化劑不用於外痔。","C":"124:含 2(切開易復發)。","D":"23:含 2(切開)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"114020-52":{"quick":"痔瘡橡皮圈結紮術最適合 D:內痔。","detail":{"background":"痔瘡:肛門黏膜下含動靜脈叢與平滑肌的「肛墊」,參與控便(精細控制),非單純血管曲張。內痔分級:I 無脫出(僅出血)、II 脫出可「自動」回復、III 脫出需「手動」回復、IV 無法回復/嵌頓。多數痔瘡以保守治療(高纖、多喝水、溫水坐浴、局部藥)改善,並非全部需手術;痔瘡切除術用於保守無效或 III–IV 度。「便秘致痔瘡」非反之,切痔瘡不會改善便秘。痔瘡橡皮圈結紮(banding)適用於「內痔」(I–III),不用於外痔(有體神經、會痛)。","options":{"A":"血栓性外痔有體神經會痛,不適合結紮。","B":"血栓性內痔急性期不宜。","C":"混合痔的外痔部分不宜結紮。","D":"★正確(本題答案):內痔(I–III 度)適合結紮。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"114070-51":{"quick":"後側 0.5 cm 傷口+前哨皮垂+解便痛/出血→C:肛裂。","detail":{"background":"肛裂(anal fissure):齒狀線至肛門緣的上皮裂傷,多在「正後方(或正前方)」中線,因內括約肌高張+硬便惡性循環;劇痛(體神經)、解便出血、慢性者有前哨皮垂(sentinel tag)與肥大乳突。80–90% 以保守治療癒合(高纖、坐浴、局部硝酸甘油/鈣離子阻斷劑鬆弛內括約肌、肉毒);頑固者行「側方內括約肌切開術」。","options":{"A":"痔瘡脫出為腫塊脫出,非中線小裂傷。","B":"肛門膿瘍為紅腫熱痛硬塊。","C":"★正確(本題答案):肛裂(後側裂傷+前哨皮垂)。","D":"肛門瘻管有外口流膿。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"114070-52":{"quick":"錯在 C:大型試驗(COLOR/COST)證實「腹腔鏡」大腸癌切除腫瘤學結果與開腹相當,可安全施行;若敘述否定腹腔鏡則錯。","detail":{"background":"乙狀結腸癌(距肛門 20 cm)處置:應做完整大腸鏡排除同時性(synchronous)右側腫瘤;大多偶發、由腺瘤-癌序列而來;COLOR/COST/CLASICC 等大型隨機試驗證實「腹腔鏡」大腸癌切除在存活與復發上「不劣於」開腹,可安全施行;術前影像分期應含胸、腹、骨盆腔。","options":{"A":"正確:完整大腸鏡排除右側同時性腫瘤。","B":"正確:多偶發、腺瘤-癌序列。","C":"★錯誤(本題答案):腹腔鏡切除腫瘤學結果與開腹相當(COLOR/COST)。","D":"正確:胸腹骨盆影像分期。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Corman’s Colon and Rectal Surgery"]}},"101030-5":{"quick":"52F、右下腹腫塊+5 天病程+發燒+白血球升高→最適進一步檢查為 A:腹部 CT(評估闌尾膿瘍/腫塊、鑑別)。","detail":{"background":"闌尾發炎已數天形成「闌尾腫塊/蜂窩組織炎(phlegmon)或膿瘍」:先「廣效抗生素」保守(±經皮引流),待發炎消退後可考慮間隔性闌尾切除(interval appendectomy);此時立即手術剝離困難、易傷腸道。影像首選腹部 CT。年長病人右下腹腫塊需與盲腸腫瘤、憩室炎鑑別,緩解後大腸鏡排除惡性。","options":{"A":"★正確(本題答案):腹部 CT 評估腫塊/膿瘍。","B":"X 光資訊不足。","C":"急性期不宜鋇劑灌腸。","D":"急性期不宜大腸鏡。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"101030-6":{"quick":"闌尾腫塊/膿瘍最優先處置為 D:廣效性抗生素(保守,±引流,日後間隔手術)。","detail":{"background":"闌尾發炎已數天形成「闌尾腫塊/蜂窩組織炎(phlegmon)或膿瘍」:先「廣效抗生素」保守(±經皮引流),待發炎消退後可考慮間隔性闌尾切除(interval appendectomy);此時立即手術剝離困難、易傷腸道。影像首選腹部 CT。年長病人右下腹腫塊需與盲腸腫瘤、憩室炎鑑別,緩解後大腸鏡排除惡性。","options":{"A":"急性腫塊期腹腔鏡剝離困難。","B":"立即闌尾切除易傷腸。","C":"剖腹探查非首選。","D":"★正確(本題答案):廣效抗生素保守治療。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"101030-54":{"quick":"72F、右下腹鈍痛 2 週、無發燒、白血球正常、鋇劑影像→最可能 C:盲腸腫瘤。","detail":{"background":"老年人慢性右下腹鈍痛、無發炎徵象(無發燒、白血球正常)、鋇劑見充盈缺損/狹窄→「盲腸腫瘤」可能性高;需與闌尾炎(急性發炎)、憩室炎、缺血性腸炎鑑別。","options":{"A":"闌尾炎為急性發炎,與此慢性無發炎不符。","B":"憩室炎有發炎徵象。","C":"★正確(本題答案):盲腸腫瘤。","D":"缺血性腸炎為急性血便。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"101030-55":{"quick":"疑盲腸腫瘤→B:大腸鏡(切片確診)。","detail":{"background":"疑似盲腸/右結腸腫瘤,下一步為「大腸鏡」直接觀察+切片確診(並評估同時性病灶),優於血管攝影/腹腔鏡/泌尿道攝影。","options":{"A":"血管攝影用於出血定位。","B":"★正確(本題答案):大腸鏡切片確診。","C":"腹腔鏡非診斷首選。","D":"IVU 為泌尿檢查。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"102110-46":{"quick":"12F、右下腹反彈痛+WBC 16500、CT→C:闌尾切除術。","detail":{"background":"急性闌尾炎:最常見的腹部外科急症,好發「10–30 歲」(非老年/兒童)。病生理:闌尾管腔阻塞(糞石/淋巴增生)→管內壓升→缺血、細菌(E. coli、Bacteroides)增生→發炎、壞死、穿孔。典型疼痛:先「肚臍周圍臟器性悶痛(visceral)」(內臟自律神經、定位不清),數小時後闌尾發炎刺激壁層腹膜轉為「右下腹體壁性痛(parietal)」、McBurney 點(髂前上棘與肚臍連線外 1/3)壓痛/反彈痛。診斷以臨床+CT(敏感/特異度~95%、降低陰性闌尾切除率);治療為闌尾切除(腹腔鏡恢復快、傷口美觀);約 1% 為闌尾腫瘤需病理。","options":{"A":"體外震波碎石為結石治療。","B":"輸尿管鏡為泌尿。","C":"★正確(本題答案):闌尾切除術。","D":"非單純喝水抗生素可解。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"103030-39":{"quick":"不適當為 B:CT 對闌尾炎敏感度/特異度其實「更高(~95%)」,題中數字(90%/85%)偏低,且 CT 為降低陰性闌尾切除率的主力。","detail":{"background":"急性闌尾炎:最常見的腹部外科急症,好發「10–30 歲」(非老年/兒童)。病生理:闌尾管腔阻塞(糞石/淋巴增生)→管內壓升→缺血、細菌(E. coli、Bacteroides)增生→發炎、壞死、穿孔。典型疼痛:先「肚臍周圍臟器性悶痛(visceral)」(內臟自律神經、定位不清),數小時後闌尾發炎刺激壁層腹膜轉為「右下腹體壁性痛(parietal)」、McBurney 點(髂前上棘與肚臍連線外 1/3)壓痛/反彈痛。診斷以臨床+CT(敏感/特異度~95%、降低陰性闌尾切除率);治療為闌尾切除(腹腔鏡恢復快、傷口美觀);約 1% 為闌尾腫瘤需病理。","options":{"A":"適當:超音波操作者依賴。","B":"★不適當(本題答案):CT 敏感/特異度更高(~95%)。","C":"適當:最常分離 E. coli、Bacteroides。","D":"適當:腹腔鏡恢復快、美觀。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"103030-72":{"quick":"CT 影像→B:腸套疊(intussusception)致腸阻塞(典型靶心/香腸狀)。","detail":{"background":"成人腸套疊較少見、常有導引點(腫瘤、Meckel、息肉),CT 見「靶心(target)/香腸狀」腸中腸影像;處置與小兒(可空氣/鋇劑復位)不同,成人多需手術切除(找潛在腫瘤)。本題影像對應腸套疊。","options":{"A":"植物糞石致阻塞影像不同。","B":"★正確(本題答案):腸套疊。","C":"腹股溝疝氣為疝出影像。","D":"腸扭轉為扭轉影像。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"105100-5":{"quick":"錯在 A:急性闌尾炎發生率「年輕人較高」(好發 10–30 歲),非老年人較高。","detail":{"background":"急性闌尾炎:最常見的腹部外科急症,好發「10–30 歲」(非老年/兒童)。病生理:闌尾管腔阻塞(糞石/淋巴增生)→管內壓升→缺血、細菌(E. coli、Bacteroides)增生→發炎、壞死、穿孔。典型疼痛:先「肚臍周圍臟器性悶痛(visceral)」(內臟自律神經、定位不清),數小時後闌尾發炎刺激壁層腹膜轉為「右下腹體壁性痛(parietal)」、McBurney 點(髂前上棘與肚臍連線外 1/3)壓痛/反彈痛。診斷以臨床+CT(敏感/特異度~95%、降低陰性闌尾切除率);治療為闌尾切除(腹腔鏡恢復快、傷口美觀);約 1% 為闌尾腫瘤需病理。","options":{"A":"★錯誤(本題答案):好發年輕人,非老年較高。","B":"正確:老年症狀不典型、診斷易延遲。","C":"正確:老年穿孔率高、併發症多。","D":"正確:與盲腸憩室炎鑑別不易。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"107020-35":{"quick":"17M、肚臍周圍痛轉移右下腹+低燒→B:急性闌尾炎。","detail":{"background":"急性闌尾炎:最常見的腹部外科急症,好發「10–30 歲」(非老年/兒童)。病生理:闌尾管腔阻塞(糞石/淋巴增生)→管內壓升→缺血、細菌(E. coli、Bacteroides)增生→發炎、壞死、穿孔。典型疼痛:先「肚臍周圍臟器性悶痛(visceral)」(內臟自律神經、定位不清),數小時後闌尾發炎刺激壁層腹膜轉為「右下腹體壁性痛(parietal)」、McBurney 點(髂前上棘與肚臍連線外 1/3)壓痛/反彈痛。診斷以臨床+CT(敏感/特異度~95%、降低陰性闌尾切除率);治療為闌尾切除(腹腔鏡恢復快、傷口美觀);約 1% 為闌尾腫瘤需病理。","options":{"A":"大腸癌破裂罕見於青少年。","B":"★正確(本題答案):急性闌尾炎(轉移痛)。","C":"憩室炎好發老年。","D":"腸套疊好發嬰幼兒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"107080-5":{"quick":"單純闌尾切除、無內容物外漏→B:clean-contaminated(清潔-污染)。","detail":{"background":"手術傷口分類:Clean(未進入消化/呼吸/泌尿道,如疝氣)、Clean-contaminated(進入但控制良好、無顯著污染,如「單純闌尾切除、選擇性腸胃道手術」)、Contaminated(顯著溢漏/急性發炎無膿、新鮮外傷)、Dirty(已感染/穿孔/膿瘍)。單純闌尾炎切除屬 clean-contaminated。","options":{"A":"clean 為未進空腔臟器。","B":"★正確(本題答案):clean-contaminated。","C":"contaminated 為顯著污染。","D":"dirty 為已感染/穿孔。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"107080-30":{"quick":"不合宜為 A:急性闌尾炎好發「青少年與年輕成人」,非老年與兒童。","detail":{"background":"急性闌尾炎:最常見的腹部外科急症,好發「10–30 歲」(非老年/兒童)。病生理:闌尾管腔阻塞(糞石/淋巴增生)→管內壓升→缺血、細菌(E. coli、Bacteroides)增生→發炎、壞死、穿孔。典型疼痛:先「肚臍周圍臟器性悶痛(visceral)」(內臟自律神經、定位不清),數小時後闌尾發炎刺激壁層腹膜轉為「右下腹體壁性痛(parietal)」、McBurney 點(髂前上棘與肚臍連線外 1/3)壓痛/反彈痛。診斷以臨床+CT(敏感/特異度~95%、降低陰性闌尾切除率);治療為闌尾切除(腹腔鏡恢復快、傷口美觀);約 1% 為闌尾腫瘤需病理。","options":{"A":"★不合宜(本題答案):好發年輕族群,非老年兒童。","B":"正確:McBurney 點定義。","C":"正確:單純闌尾炎可考慮非手術,但仍以切除為標準。","D":"正確:約 1% 為闌尾腫瘤,須病理。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"107080-76":{"quick":"闌尾切除術後最常見併發症為 D:皮下與腹腔內感染(手術部位感染)。","detail":{"background":"闌尾切除術後最常見併發症為「手術部位感染(切口/腹腔內膿瘍)」,尤其穿孔性闌尾炎風險高;腹腔內膿瘍多在術後 5–7 天出現發燒、腹痛。其他如腸阻塞、瘻管較少。","options":{"A":"肺炎較少。","B":"尿道感染較少。","C":"腸皮瘻管罕見。","D":"★正確(本題答案):手術部位/腹腔內感染。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"108080-24":{"quick":"闌尾炎之肚臍周圍痛轉右下腹→B:由臟器性疼痛轉為腹壁性疼痛。","detail":{"background":"急性闌尾炎:最常見的腹部外科急症,好發「10–30 歲」(非老年/兒童)。病生理:闌尾管腔阻塞(糞石/淋巴增生)→管內壓升→缺血、細菌(E. coli、Bacteroides)增生→發炎、壞死、穿孔。典型疼痛:先「肚臍周圍臟器性悶痛(visceral)」(內臟自律神經、定位不清),數小時後闌尾發炎刺激壁層腹膜轉為「右下腹體壁性痛(parietal)」、McBurney 點(髂前上棘與肚臍連線外 1/3)壓痛/反彈痛。診斷以臨床+CT(敏感/特異度~95%、降低陰性闌尾切除率);治療為闌尾切除(腹腔鏡恢復快、傷口美觀);約 1% 為闌尾腫瘤需病理。","options":{"A":"非投射痛。","B":"★正確(本題答案):臟器性(visceral)→腹壁性(parietal)。","C":"方向相反,錯。","D":"非慢性疼痛。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"109020-5":{"quick":"錯在 B:腹內壓間接測量主要用「膀胱(Foley)壓」,非鼻胃管。","detail":{"background":"腹腔腔室症候群(ACS):多見於多重創傷、大量輸液、腹部術後/加護病患。標準間接測量腹內壓為「經膀胱(Foley)壓」。正常約 5 mmHg,>12 為腹內高壓(影響呼吸/灌流),~20–25 壓迫下腔靜脈、致器官衰竭。決定減壓手術依腹內高壓「合併器官衰竭」。","options":{"A":"正確:多見創傷/加護病患。","B":"★錯誤(本題答案):以膀胱壓測量,非鼻胃管。","C":"正確:壓力與生理影響之描述。","D":"正確:依腹內高壓+器官衰竭決定手術。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"111020-13":{"quick":"錯在 C:年長病患腹腔鏡闌尾切除有較高「轉開腹率、整體併發症、複雜病理」,但「感染相關併發症較高」非特別成立。","detail":{"background":"年長病患急性闌尾炎:症狀不典型、診斷延遲、穿孔/複雜闌尾炎與其他病理(如腫瘤)比率高、整體手術併發症與轉開腹率較高。但「感染相關併發症較年輕人高」並非此題成立的差異點(題意以 C 為錯)。","options":{"A":"正確:年長轉開腹率較高。","B":"正確:年長手術併發症較高。","C":"★錯誤(本題答案):非以感染併發症較高為特徵。","D":"正確:年長較多複雜闌尾炎/其他病理。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"111020-39":{"quick":"幫助最少為 D:藥物過敏史對「右下腹痛病因鑑別」幫助最少;月經/性史、發燒關節炎手術史、症狀時序才關鍵。","detail":{"background":"年輕女性右下腹痛鑑別需問:月經週期與性生活史(子宮外孕、骨盆腔發炎、卵巢扭轉/破裂)、發燒/關節炎/腹部手術史(沾黏、IBD)、胃腸症狀時序(闌尾炎轉移痛)。藥物過敏史與「病因鑑別」關聯最小(雖術前仍需了解)。","options":{"A":"重要:月經/性史(婦科鑑別)。","B":"重要:發燒/關節炎/手術史。","C":"重要:症狀時序(闌尾炎)。","D":"★幫助最少(本題答案):藥物過敏史對鑑別病因幫助最小。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"111080-77":{"quick":"闌尾炎術後最常見併發症為 D:手術部位感染。","detail":{"background":"闌尾切除(尤其延遲就醫、可能穿孔者)術後最常見併發症為「手術部位感染(切口/腹腔內膿瘍)」。","options":{"A":"肺炎較少。","B":"腸阻塞較少。","C":"腸皮瘻管罕見。","D":"★正確(本題答案):手術部位感染。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"113020-53":{"quick":"錯在 D(僅②④):②說「開腹才能檢查整個腹膜腔排除他病」錯—腹腔鏡探查全腹腔更佳;④亦為錯誤敘述。腹腔鏡併發症較低、對婦科/不確定診斷探查更有利。","detail":{"background":"腹腔鏡 vs 開腹闌尾切除:腹腔鏡傷口感染與整體併發症較低、恢復快、傷口美觀,且「探查整個腹腔」鑑別其他病因(憩室炎、卵巢病變)能力「優於」開腹—尤其女性與診斷不確定者。故「開腹才能檢查整腹腔」之敘述錯誤。","options":{"A":"①②③:不符答案。","B":"①②④:不符答案。","C":"僅②③:不符答案。","D":"★正確(本題答案):僅②④為錯誤敘述。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"113070-73":{"quick":"46F、月經後右下腹痛+超音波→C:闌尾炎(需與婦科鑑別)。","detail":{"background":"急性闌尾炎:最常見的腹部外科急症,好發「10–30 歲」(非老年/兒童)。病生理:闌尾管腔阻塞(糞石/淋巴增生)→管內壓升→缺血、細菌(E. coli、Bacteroides)增生→發炎、壞死、穿孔。典型疼痛:先「肚臍周圍臟器性悶痛(visceral)」(內臟自律神經、定位不清),數小時後闌尾發炎刺激壁層腹膜轉為「右下腹體壁性痛(parietal)」、McBurney 點(髂前上棘與肚臍連線外 1/3)壓痛/反彈痛。診斷以臨床+CT(敏感/特異度~95%、降低陰性闌尾切除率);治療為闌尾切除(腹腔鏡恢復快、傷口美觀);約 1% 為闌尾腫瘤需病理。","options":{"A":"子宮發炎位置/表現不符。","B":"卵巢膿瘍為婦科,影像不同。","C":"★正確(本題答案):闌尾炎。","D":"Crohn 為慢性,非急性右下腹。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Cameron Current Surgical Therapy"]}},"102030-44":{"quick":"此為闌尾切除後沾黏性小腸阻塞;C 為錯誤敘述—水溶性顯影劑(Gastrografin)主要是「診斷/預後」工具,本身不直接「降低需要手術的機會」。","detail":{"background":"沾黏性小腸阻塞的「水溶性顯影劑(Gastrografin)挑戰」:口服後追蹤,「24 小時內顯影劑到達大腸」可預測非手術可緩解、並縮短住院天數(高滲透性把水分引入腸腔);其角色為「診斷與預後預測」,而非本身治療性地降低需手術機率。","options":{"A":"正確:CT 常配合口服水溶性顯影劑。","B":"正確:24 小時內到大腸為阻塞緩解指標。","C":"★錯誤(本題答案):水溶性顯影劑主要為診斷/預後,非直接降低手術機會。","D":"正確:可縮短住院天數。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"102030-45":{"quick":"錯在 B:疝氣表皮呈紫紅(絞窄/壞死徵象)時「不可」強行復位(會把壞死腸推回腹腔),應緊急手術。","detail":{"background":"箝閉/嵌頓(incarcerated)疝氣常合併腸阻塞:局部疼痛壓痛、無法回復;若表皮呈紫紅(絞窄/壞死)「不可」強行回復(會把壞死腸推回腹腔致腹膜炎),應緊急手術。處置先「鼻胃管減壓+充分輸液復甦」矯正脫水/電解質,再手術;術中若腸壞死則切除吻合,可同時修補疝氣。","options":{"A":"正確:箝閉疝氣常合併腸阻塞。","B":"★錯誤(本題答案):紫紅變化提示壞死,禁強行復位,應手術。","C":"正確:局部疼痛壓痛。","D":"正確:腸壞死切除吻合後可同時修補。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"103030-40":{"quick":"83 歲女性、腹股溝韌帶下緣 2 cm 突出+腸阻塞→C:右側股疝氣合併腸阻塞。","detail":{"background":"股疝氣(femoral hernia):疝囊經股管、在「腹股溝韌帶下方、股靜脈內側」突出,好發年長女性,股環狹窄、最易嵌頓壞死(約 20%)。本例年長女性、腹股溝韌帶下方腫塊+腸阻塞→股疝氣合併阻塞。","options":{"A":"闌尾炎破裂無腹股溝腫塊。","B":"PID 為婦科,無腸阻塞腫塊。","C":"★正確(本題答案):右股疝氣合併腸阻塞。","D":"升結腸腫瘤無腹股溝突出。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"103030-41":{"quick":"口渴尿少深色(脫水)→A:先鼻胃管減壓+充足靜脈輸液復甦,再手術。","detail":{"background":"箝閉/嵌頓(incarcerated)疝氣常合併腸阻塞:局部疼痛壓痛、無法回復;若表皮呈紫紅(絞窄/壞死)「不可」強行回復(會把壞死腸推回腹腔致腹膜炎),應緊急手術。處置先「鼻胃管減壓+充分輸液復甦」矯正脫水/電解質,再手術;術中若腸壞死則切除吻合,可同時修補疝氣。","options":{"A":"★正確(本題答案):鼻胃管減壓+充分輸液復甦。","B":"未矯正脫水即手術風險高。","C":"非婦科問題。","D":"阻塞時禁促蠕動/灌腸。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"103100-38":{"quick":"一定需再手術者為 C:陰囊內大量血腫(壓迫/持續出血需清除止血)。","detail":{"background":"腹股溝疝氣修補術後併發症多可保守:陰囊腫脹/水腫多自行吸收、傷口感染抗生素換藥、睪丸萎縮(精索血供受損)無法逆轉但非急需再手術。唯「陰囊內大量血腫(活動性出血/壓迫)」需再次手術清除止血。","options":{"A":"睪丸萎縮無法以再手術逆轉。","B":"陰囊水腫多自行吸收。","C":"★正確(本題答案):大量血腫需再手術清除止血。","D":"傷口感染多保守處理。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"104030-39":{"quick":"正確為 A:腹股溝疝氣最常見的術後與長期併發症都是「疼痛」。","detail":{"background":"疝氣:器官/組織經腹壁缺損突出。約 75% 在腹股溝;腹股溝疝氣中約 2/3 為間接型。間接型(indirect)=先天性「鞘狀突未閉」,經內環(深環,位於腹橫筋膜)、在「腹壁下動脈外側」進入;直接型(direct)=後天腹壁薄弱,由 Hesselbach 三角(腹壁下動脈內側)鼓出。腹股溝疝氣整體「男>女」;但女性「相對」較易出現股疝氣(femoral,在腹股溝韌帶下方、易嵌頓壞死)。馬褲型(pantaloon)=直接+間接並存。提睪肌由腹內斜肌延伸;睪丸動脈源自「腹主動脈」(非內髂)。手術:成人疝氣需手術才能治癒(疝氣帶/觀察非根治),無張力人工網膜(mesh)修補復發率低;腹腔鏡(TEP 全腹膜外、TAPP 經腹腔腹膜前)適合雙側/復發性,於腹膜前腔置大網膜覆蓋肌恥骨孔,復發率與開放相當(非明顯較低)。最常見術後併發症為「疼痛(含慢性疼痛)」。","options":{"A":"★正確(本題答案):最常見併發症為疼痛。","B":"錯:整體女性仍以腹股溝疝氣較股疝氣多(但股疝氣相對較常見於女性)。","C":"錯:腹腔鏡不易學、復發率未明顯較低。","D":"錯:男女皆以間接型為主。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"104030-41":{"quick":"正確為 A:成人腹股溝疝氣需手術治療才能痊癒。","detail":{"background":"疝氣:器官/組織經腹壁缺損突出。約 75% 在腹股溝;腹股溝疝氣中約 2/3 為間接型。間接型(indirect)=先天性「鞘狀突未閉」,經內環(深環,位於腹橫筋膜)、在「腹壁下動脈外側」進入;直接型(direct)=後天腹壁薄弱,由 Hesselbach 三角(腹壁下動脈內側)鼓出。腹股溝疝氣整體「男>女」;但女性「相對」較易出現股疝氣(femoral,在腹股溝韌帶下方、易嵌頓壞死)。馬褲型(pantaloon)=直接+間接並存。提睪肌由腹內斜肌延伸;睪丸動脈源自「腹主動脈」(非內髂)。手術:成人疝氣需手術才能治癒(疝氣帶/觀察非根治),無張力人工網膜(mesh)修補復發率低;腹腔鏡(TEP 全腹膜外、TAPP 經腹腔腹膜前)適合雙側/復發性,於腹膜前腔置大網膜覆蓋肌恥骨孔,復發率與開放相當(非明顯較低)。最常見術後併發症為「疼痛(含慢性疼痛)」。","options":{"A":"★正確(本題答案):需手術才能治癒。","B":"錯:不手術可能嵌頓/絞窄。","C":"錯:疝氣帶非根治。","D":"錯:不一定需人工網膜(視情況)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"105100-75":{"quick":"由腹直肌外側鼓出的疝氣為 C:Spigelian 疝氣(半月線疝)。","detail":{"background":"特殊疝氣:Spigelian 疝(經半月線、腹直肌外側緣的腹壁缺損突出,常在弓狀線下方);Littré 疝(疝囊含 Meckel 憩室);Richter 疝(僅腸壁一側被嵌頓,可絞窄但不一定全阻塞);閉孔疝(經閉孔管,瘦弱老年女性,Howship-Romberg 徵)。","options":{"A":"Littré 疝含 Meckel 憩室。","B":"Richter 疝為腸壁部分嵌頓。","C":"★正確(本題答案):Spigelian 疝(腹直肌外側)。","D":"閉孔疝經閉孔管。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"106020-34":{"quick":"錯在 C:切口疝氣洞口>5 cm「應使用人工網膜」修補,不宜僅直接縫合(復發率高)。","detail":{"background":"切口疝氣(incisional hernia):腹部手術傷口張力大/癒合不良/感染/肥胖致筋膜裂開突出;手術為唯一有效治療。缺損較大(>2–5 cm)應以人工網膜無張力修補(直接縫合復發率高)。股疝氣與間接型腹股溝疝氣皆以右側為主;股疝氣最易腸壞死(~20%),診斷即應手術。","options":{"A":"正確:股疝氣與間接型多右側。","B":"正確:股疝氣易壞死,應儘早手術。","C":"★錯誤(本題答案):>5 cm 缺損應用網膜,非直接縫合。","D":"正確:肥胖與傷口感染增加切口疝。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"106080-24":{"quick":"錯在 C:腹股溝疝氣發生率「男性多於女性」,非女性多於男性。","detail":{"background":"疝氣:器官/組織經腹壁缺損突出。約 75% 在腹股溝;腹股溝疝氣中約 2/3 為間接型。間接型(indirect)=先天性「鞘狀突未閉」,經內環(深環,位於腹橫筋膜)、在「腹壁下動脈外側」進入;直接型(direct)=後天腹壁薄弱,由 Hesselbach 三角(腹壁下動脈內側)鼓出。腹股溝疝氣整體「男>女」;但女性「相對」較易出現股疝氣(femoral,在腹股溝韌帶下方、易嵌頓壞死)。馬褲型(pantaloon)=直接+間接並存。提睪肌由腹內斜肌延伸;睪丸動脈源自「腹主動脈」(非內髂)。手術:成人疝氣需手術才能治癒(疝氣帶/觀察非根治),無張力人工網膜(mesh)修補復發率低;腹腔鏡(TEP 全腹膜外、TAPP 經腹腔腹膜前)適合雙側/復發性,於腹膜前腔置大網膜覆蓋肌恥骨孔,復發率與開放相當(非明顯較低)。最常見術後併發症為「疼痛(含慢性疼痛)」。","options":{"A":"正確:約 75% 疝氣在腹股溝。","B":"正確:腹股溝疝氣 2/3 為間接型。","C":"★錯誤(本題答案):腹股溝疝氣男>女。","D":"正確:股疝氣女多於男。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"107080-52":{"quick":"非優點者為 C:腹腔鏡修補復發率與開放手術「相當」,並非明顯較低。","detail":{"background":"疝氣:器官/組織經腹壁缺損突出。約 75% 在腹股溝;腹股溝疝氣中約 2/3 為間接型。間接型(indirect)=先天性「鞘狀突未閉」,經內環(深環,位於腹橫筋膜)、在「腹壁下動脈外側」進入;直接型(direct)=後天腹壁薄弱,由 Hesselbach 三角(腹壁下動脈內側)鼓出。腹股溝疝氣整體「男>女」;但女性「相對」較易出現股疝氣(femoral,在腹股溝韌帶下方、易嵌頓壞死)。馬褲型(pantaloon)=直接+間接並存。提睪肌由腹內斜肌延伸;睪丸動脈源自「腹主動脈」(非內髂)。手術:成人疝氣需手術才能治癒(疝氣帶/觀察非根治),無張力人工網膜(mesh)修補復發率低;腹腔鏡(TEP 全腹膜外、TAPP 經腹腔腹膜前)適合雙側/復發性,於腹膜前腔置大網膜覆蓋肌恥骨孔,復發率與開放相當(非明顯較低)。最常見術後併發症為「疼痛(含慢性疼痛)」。","options":{"A":"優點:腹膜前腔放大網膜。","B":"優點:易覆蓋肌恥骨孔。","C":"★非優點(本題答案):復發率與開放相當,非明顯較低。","D":"優點:適合雙側/復發性疝氣。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"108030-46":{"quick":"錯在 C:小兒腹股溝疝氣與陰囊水腫成因「相同」(鞘狀突未閉),非完全不同。","detail":{"background":"小兒腹股溝疝氣與陰囊水腫同源於「鞘狀突(processus vaginalis)未閉」:未閉大→腸子下來成「間接型疝氣」,未閉小僅液體下來成「交通性陰囊水腫」。手術皆在內環處行「疝囊高位結紮」。新發陰囊水腫須留意睪丸腫瘤/扭轉/創傷/副睪炎,可超音波評估。","options":{"A":"正確:小兒多間接型,鞘狀突未閉。","B":"正確:內環處高位結紮。","C":"★錯誤(本題答案):兩者同源(鞘狀突未閉)。","D":"正確:新發陰囊水腫須鑑別睪丸病變。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"108080-29":{"quick":"錯在 D:切口疝氣「不一定」要用人工網膜;小缺損可直接縫合(但網膜可降低復發)。","detail":{"background":"切口疝氣:源自傷口張力大/癒合不良/感染/肥胖,手術為唯一有效治療。較大缺損用人工網膜無張力修補可降低復發,但小缺損可直接縫合,並非「一定」要用網膜。","options":{"A":"正確:傷口張力大/癒合不良。","B":"正確:術後感染為原因之一。","C":"正確:手術為唯一有效治療。","D":"★錯誤(本題答案):不一定要用網膜。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"110020-48":{"quick":"TEP「不需」執行 A:結紮股外側皮神經(應避免傷及/保留,而非結紮)。","detail":{"background":"全腹膜外腹股溝疝氣修補(TEP):在腹膜前腔操作—復位疝囊、自恥骨聯合分離 Cooper 韌帶、向側邊剝離至髂前上棘以放置大網膜覆蓋肌恥骨孔。「股外側皮神經、生殖股神經」位於「疼痛三角」,應「避免」釘合/傷及(否則慢性神經痛),絕不「結紮」。","options":{"A":"★不需(本題答案):不結紮股外側皮神經(應保留避免)。","B":"需:復位疝囊。","C":"需:分離 Cooper 韌帶。","D":"需:側邊剝離至髂前上棘。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"111080-53":{"quick":"錯在 C:相較 TEP,TAPP 經腹腔操作空間「較大」,非較有限。","detail":{"background":"腹腔鏡腹股溝疝氣:TEP(全腹膜外,不進腹腔、降低臟器損傷風險、腹膜前解剖快)與 TAPP(經腹腔進腹膜前,操作「空間較大」、易處理複雜/嵌頓疝、可探查對側)。兩者主要差別在「進入腹膜前間隙的途徑」;Cochrane 分析顯示兩者復發率無差異。","options":{"A":"正確:差別在進入腹膜前間隙的途徑。","B":"正確:TEP 腹膜前解剖快、降低臟器損傷。","C":"★錯誤(本題答案):TAPP 操作空間較大,非較有限。","D":"正確:兩者復發率無差異。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"112020-46":{"quick":"術後短期最常見併發症為 A:疼痛。","detail":{"background":"疝氣:器官/組織經腹壁缺損突出。約 75% 在腹股溝;腹股溝疝氣中約 2/3 為間接型。間接型(indirect)=先天性「鞘狀突未閉」,經內環(深環,位於腹橫筋膜)、在「腹壁下動脈外側」進入;直接型(direct)=後天腹壁薄弱,由 Hesselbach 三角(腹壁下動脈內側)鼓出。腹股溝疝氣整體「男>女」;但女性「相對」較易出現股疝氣(femoral,在腹股溝韌帶下方、易嵌頓壞死)。馬褲型(pantaloon)=直接+間接並存。提睪肌由腹內斜肌延伸;睪丸動脈源自「腹主動脈」(非內髂)。手術:成人疝氣需手術才能治癒(疝氣帶/觀察非根治),無張力人工網膜(mesh)修補復發率低;腹腔鏡(TEP 全腹膜外、TAPP 經腹腔腹膜前)適合雙側/復發性,於腹膜前腔置大網膜覆蓋肌恥骨孔,復發率與開放相當(非明顯較低)。最常見術後併發症為「疼痛(含慢性疼痛)」。","options":{"A":"★正確(本題答案):疼痛最常見。","B":"泌尿道感染/睪丸炎較少。","C":"傷口感染較少。","D":"復發為長期問題。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"113020-45":{"quick":"正確為 C:提睪肌由腹內斜肌延伸而來。","detail":{"background":"疝氣:器官/組織經腹壁缺損突出。約 75% 在腹股溝;腹股溝疝氣中約 2/3 為間接型。間接型(indirect)=先天性「鞘狀突未閉」,經內環(深環,位於腹橫筋膜)、在「腹壁下動脈外側」進入;直接型(direct)=後天腹壁薄弱,由 Hesselbach 三角(腹壁下動脈內側)鼓出。腹股溝疝氣整體「男>女」;但女性「相對」較易出現股疝氣(femoral,在腹股溝韌帶下方、易嵌頓壞死)。馬褲型(pantaloon)=直接+間接並存。提睪肌由腹內斜肌延伸;睪丸動脈源自「腹主動脈」(非內髂)。手術:成人疝氣需手術才能治癒(疝氣帶/觀察非根治),無張力人工網膜(mesh)修補復發率低;腹腔鏡(TEP 全腹膜外、TAPP 經腹腔腹膜前)適合雙側/復發性,於腹膜前腔置大網膜覆蓋肌恥骨孔,復發率與開放相當(非明顯較低)。最常見術後併發症為「疼痛(含慢性疼痛)」。","options":{"A":"錯:間接型在腹壁下動脈「外側」,非內側。","B":"錯:與精索一同穿出外環者為「髂腹股溝神經(ilioinguinal)」,非髂腹下神經。","C":"★正確(本題答案):提睪肌由腹內斜肌延伸。","D":"錯:睪丸動脈源自腹主動脈,非內髂動脈。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"114020-46":{"quick":"腸道經「腹膜腔內腸繫膜缺損」突出稱為 B:內部疝氣(internal hernia)。","detail":{"background":"內部疝氣(internal hernia):腸道經腹膜腔內的異常孔隙/繫膜缺損(如術後繫膜缺損、十二指腸旁窩、Roux-en-Y 後 Petersen 缺損)突入,可致閉袢性絞窄阻塞;外部疝氣經腹壁缺損突出(腹股溝、切口、腹壁)。","options":{"A":"外部疝氣經腹壁突出。","B":"★正確(本題答案):內部疝氣(腸繫膜缺損)。","C":"鼠蹊疝氣為外部疝氣。","D":"腹壁疝氣為外部疝氣。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"114070-31":{"quick":"錯在 C:間接型疝氣是「先天鞘狀突未閉」經內環突出,非「因腹壓增加間接形成」(那較像直接型的後天機轉)。","detail":{"background":"疝氣:器官/組織經腹壁缺損突出。約 75% 在腹股溝;腹股溝疝氣中約 2/3 為間接型。間接型(indirect)=先天性「鞘狀突未閉」,經內環(深環,位於腹橫筋膜)、在「腹壁下動脈外側」進入;直接型(direct)=後天腹壁薄弱,由 Hesselbach 三角(腹壁下動脈內側)鼓出。腹股溝疝氣整體「男>女」;但女性「相對」較易出現股疝氣(femoral,在腹股溝韌帶下方、易嵌頓壞死)。馬褲型(pantaloon)=直接+間接並存。提睪肌由腹內斜肌延伸;睪丸動脈源自「腹主動脈」(非內髂)。手術:成人疝氣需手術才能治癒(疝氣帶/觀察非根治),無張力人工網膜(mesh)修補復發率低;腹腔鏡(TEP 全腹膜外、TAPP 經腹腔腹膜前)適合雙側/復發性,於腹膜前腔置大網膜覆蓋肌恥骨孔,復發率與開放相當(非明顯較低)。最常見術後併發症為「疼痛(含慢性疼痛)」。","options":{"A":"正確:分直接與間接型。","B":"正確:馬褲型為兩者並存。","C":"★錯誤(本題答案):間接型為先天鞘狀突未閉,非腹壓間接形成。","D":"正確:直接型由 Hesselbach 三角鼓出。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"115020-10":{"quick":"腹股溝深環(內環)位於 C:腹橫筋膜(transversalis fascia)。","detail":{"background":"疝氣:器官/組織經腹壁缺損突出。約 75% 在腹股溝;腹股溝疝氣中約 2/3 為間接型。間接型(indirect)=先天性「鞘狀突未閉」,經內環(深環,位於腹橫筋膜)、在「腹壁下動脈外側」進入;直接型(direct)=後天腹壁薄弱,由 Hesselbach 三角(腹壁下動脈內側)鼓出。腹股溝疝氣整體「男>女」;但女性「相對」較易出現股疝氣(femoral,在腹股溝韌帶下方、易嵌頓壞死)。馬褲型(pantaloon)=直接+間接並存。提睪肌由腹內斜肌延伸;睪丸動脈源自「腹主動脈」(非內髂)。手術:成人疝氣需手術才能治癒(疝氣帶/觀察非根治),無張力人工網膜(mesh)修補復發率低;腹腔鏡(TEP 全腹膜外、TAPP 經腹腔腹膜前)適合雙側/復發性,於腹膜前腔置大網膜覆蓋肌恥骨孔,復發率與開放相當(非明顯較低)。最常見術後併發症為「疼痛(含慢性疼痛)」。","options":{"A":"外環在腹外斜肌腱膜。","B":"非腹內斜肌。","C":"★正確(本題答案):深環為腹橫筋膜的開口。","D":"錐狀肌與此無關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"115020-42":{"quick":"最不適當為 B:間接型相對直接型「較不易」復發;直接型/技術因素復發較多。","detail":{"background":"疝氣:器官/組織經腹壁缺損突出。約 75% 在腹股溝;腹股溝疝氣中約 2/3 為間接型。間接型(indirect)=先天性「鞘狀突未閉」,經內環(深環,位於腹橫筋膜)、在「腹壁下動脈外側」進入;直接型(direct)=後天腹壁薄弱,由 Hesselbach 三角(腹壁下動脈內側)鼓出。腹股溝疝氣整體「男>女」;但女性「相對」較易出現股疝氣(femoral,在腹股溝韌帶下方、易嵌頓壞死)。馬褲型(pantaloon)=直接+間接並存。提睪肌由腹內斜肌延伸;睪丸動脈源自「腹主動脈」(非內髂)。手術:成人疝氣需手術才能治癒(疝氣帶/觀察非根治),無張力人工網膜(mesh)修補復發率低;腹腔鏡(TEP 全腹膜外、TAPP 經腹腔腹膜前)適合雙側/復發性,於腹膜前腔置大網膜覆蓋肌恥骨孔,復發率與開放相當(非明顯較低)。最常見術後併發症為「疼痛(含慢性疼痛)」。","options":{"A":"適當:復發常與手術技術有關。","B":"★最不適當(本題答案):非間接型較直接型易復發。","C":"適當:約 5–10% 股疝氣在復發時被發現。","D":"適當:無張力網膜修補降低復發。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Nyhus and Condon’s Hernia"]}},"101030-14":{"quick":"8 個月嬰、陣發哭鬧+嘔吐+黏液血便→C:腸套疊。","detail":{"background":"腸套疊(intussusception):好發 6 個月–2 歲嬰幼兒、多原因不明(淋巴增生/病毒後),以「迴-結腸型」最常見。三聯徵:間歇性陣發哭鬧/腹痛、嘔吐、「果醬樣黏液血便」,右腹可摸到「香腸狀腫塊」。診斷首選「腹部超音波(靶心/甜甜圈徵)」;治療以「空氣或鋇劑/超音波導引灌腸復位」,失敗或腹膜炎/穿孔則手術。成人腸套疊常有腫瘤等導引點,多需手術。","options":{"A":"腸胃炎無香腸狀腫塊/血便三聯徵。","B":"腸旋轉不良多更早、膽汁性嘔吐。","C":"★正確(本題答案):腸套疊。","D":"腹股溝疝氣為腹股溝腫塊。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"101030-15":{"quick":"2 週嬰、腹脹便秘+鋇劑直腸窄到乙狀結腸漸粗(移行區)→B:巨結腸症。","detail":{"background":"巨結腸症(Hirschsprung disease):遠端腸壁「神經節細胞缺如(aganglionosis)」,自肛門往近端連續、出現「移行區(transition zone)」狹窄→近端擴張。表現:新生兒>48 小時未解胎便、腹脹、便秘;鋇劑灌腸見移行區、肛門直腸測壓無鬆弛反射;「直腸切片(無神經節細胞)為診斷黃金標準」。治療為切除無神經節腸段、拉下吻合(Soave/Swenson/Duhamel)。","options":{"A":"胎糞栓塞為暫時性。","B":"★正確(本題答案):Hirschsprung(移行區)。","C":"細小左結腸症與母糖尿病相關、暫時。","D":"直腸閉鎖無移行區。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"102030-1":{"quick":"腸旋轉不良嘔吐主因為 D:十二指腸阻塞或中腸扭結(midgut volvulus)。","detail":{"background":"腸旋轉不良(malrotation):中腸旋轉固定異常,Ladd 索帶壓迫十二指腸+腸繫膜根部窄→易發生「中腸扭結(midgut volvulus)」致十二指腸阻塞(膽汁性嘔吐)與腸缺血,為新生兒外科急症,行 Ladd 手術。","options":{"A":"營養不良非主因。","B":"胎便排出困難見於巨結腸/胎便阻塞。","C":"肺發育不全與 CDH 相關。","D":"★正確(本題答案):十二指腸阻塞/中腸扭結。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"102110-49":{"quick":"無肛症+尿中有胎便(直腸尿道瘻,高位)→C:結腸造口術(分期手術)。","detail":{"background":"先天性肛門直腸異常(無肛症):依瘻管高低分型。「低位(會陰瘻 perineal fistula)」可直接會陰肛門成形、預後(控便)較佳;「高位(直腸尿道/膀胱頸瘻、泄殖腔畸形)」常先做大腸造口、分期手術,預後較差。常合併 VACTERL;男性高位最常合併直腸尿道瘻。","options":{"A":"導尿灌洗無法解決。","B":"高位無肛症不直接做肛門成形。","C":"★正確(本題答案):先結腸造口,日後肛門直腸成形。","D":"膀胱造口非適當處置。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"103100-46":{"quick":"10 個月、果醬便+香腸狀腫塊→確診首選 A:腹部超音波(靶心徵)。","detail":{"background":"腸套疊(intussusception):好發 6 個月–2 歲嬰幼兒、多原因不明(淋巴增生/病毒後),以「迴-結腸型」最常見。三聯徵:間歇性陣發哭鬧/腹痛、嘔吐、「果醬樣黏液血便」,右腹可摸到「香腸狀腫塊」。診斷首選「腹部超音波(靶心/甜甜圈徵)」;治療以「空氣或鋇劑/超音波導引灌腸復位」,失敗或腹膜炎/穿孔則手術。成人腸套疊常有腫瘤等導引點,多需手術。","options":{"A":"★正確(本題答案):腹部超音波。","B":"上消化道鋇劑非首選。","C":"胃鏡不適合。","D":"核醫掃描用於 Meckel。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"103100-47":{"quick":"早產兒+腸壁積氣(NEC),錯在 D:情況穩定「不」應立刻開刀;手術僅限穿孔/壞死/惡化。","detail":{"background":"壞死性腸炎(NEC):好發早產兒、開始餵食後;腹脹、活力差、血便、腹部 X 光「腸壁積氣(pneumatosis intestinalis)」、門脈積氣。內科處置:禁食(NPO,完全腸道休息)、鼻胃管減壓、廣效抗生素、矯正酸中毒/電解質、X 光追蹤。「手術」僅在「腸穿孔(氣腹)、腸壞死、臨床惡化」時施行,非穩定就立刻開刀。","options":{"A":"正確:禁食+鼻胃管減壓。","B":"正確:廣效抗生素。","C":"正確:矯正酸中毒+X 光追蹤。","D":"★錯誤(本題答案):穩定者非立刻開刀。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"104030-47":{"quick":"臍部有腸道內容物流出→C:開放性臍腸管(卵黃管未閉)。","detail":{"background":"臍部異常:開放性「臍腸管(omphalomesenteric/vitelline duct)」未閉→臍部有「腸道內容物/糞便」流出;開放性「臍尿管(urachus)」→臍部漏「尿」;臍疝氣為腹膜覆蓋的可回復突出;臍膨出(omphalocele)為腹壁缺損臟器外突有囊膜。","options":{"A":"臍尿管未閉漏尿,非腸內容物。","B":"臍疝氣為可回復突出。","C":"★正確(本題答案):臍腸管未閉漏腸內容物。","D":"臍膨出為有囊膜的臟器外突。"},"sources":["Harrison’s Principles of Internal Medicine, 21e","Sabiston Textbook of Surgery, 21e","Coran Pediatric Surgery","Holcomb & Ashcraft’s Pediatric Surgery"]}},"104030-48":{"quick":"十二指腸閉鎖成因為 B:胚胎期「空泡化(再管腔化)失敗」。","detail":{"background"
