,"D":"三酸甘油酯(TG)"},"img":""},{"id":"113030-N2-42","code":"113030","roc":"113","cat":"N2","catname":"基本護理學與護理行政","num":42,"stem":"下列那些臨床專業能力訓練課程,屬於N2進階N3層級的訓練重點?1重症病人護理 2危機處理 3教學原 理與方法 4護理與法律","opts":{"A":"12","B":"23","C":"34","D":"14"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"9醫療品質成本制度與其他","topic_code":"A3-9","q_num":42,"roc_year":"113","exam_code":"113030","src":"民國113年","options":{"A":"12","B":"23","C":"34","D":"14"},"img":""},{"id":"114030-N2-9","code":"114030","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":9,"stem":"病人抱怨:「你們醫院的高血壓藥品質不好,吃了好像都沒有效果!」護理人員回覆:「不會吧! 我們醫院的藥物都是用最好的。」護理人員的回覆為下列何種非治療溝通技巧?","opts":{"A":"過度負荷","B":"批判的態度","C":"防衛性態度","D":"改變話題"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"9醫療品質成本制度與其他","topic_code":"A3-9","q_num":9,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"過度負荷","B":"批判的態度","C":"防衛性態度","D":"改變話題"},"img":""},{"id":"114030-N2-41","code":"114030","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":41,"stem":"有關病人分類系統的實施原則,下列敘述何者最適當?","opts":{"A":"要確保資料的完整性,不宜設置稽核機制","B":"考量臨床實務,不宜太重視分類量表的信效度","C":"方便易操作,不可影響臨床護理照護時數","D":"為強化效益,分類系統應採單一功能發展"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"9醫療品質成本制度與其他","topic_code":"A3-9","q_num":41,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"要確保資料的完整性,不宜設置稽核機制","B":"考量臨床實務,不宜太重視分類量表的信效度","C":"方便易操作,不可影響臨床護理照護時數","D":"為強化效益,分類系統應採單一功能發展"},"img":""},{"id":"114100-N2-43","code":"114100","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":43,"stem":"某護理師在臨床工作一年半,已進階N1,準備申請N2 進階,應該參加下列那些訓練課程?1教學原理與 方法 2危機處理 3重症病人護理 4護理標準制定","opts":{"A":"12","B":"23","C":"34","D":"14"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"9醫療品質成本制度與其他","topic_code":"A3-9","q_num":43,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"12","B":"23","C":"34","D":"14"},"img":""},{"id":"114100-N2-47","code":"114100","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":47,"stem":"傑克斯(Jaques, 1961)指出,員工的工作滿意度取決於能力(capacity, C)、生產力(work productivity, W) 及報酬(pay level, P)三者之間的關係,下列何種狀況會讓員工有被剝削懲罰感?","opts":{"A":"W>C>P","B":"C=W>P","C":"C>P=W","D":"W=P>C"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"9醫療品質成本制度與其他","topic_code":"A3-9","q_num":47,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"W>C>P","B":"C=W>P","C":"C>P=W","D":"W=P>C"},"img":""}],E={"101030-N2-77":{"quick":"護理部預算占比最大=人事預算。","detail":{"background":"護理部編列的預算中,以「人事預算(人力薪資福利)」所占比例最大(A正確)——護理是勞力密集,人事成本通常占5-6成以上。教學、品管、研究預算皆遠低於人事。故人事預算(A)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"正確(本題答案)。人事預算占比最大。","B":"教學預算占比小。","C":"品管預算占比小。","D":"研究預算占比小。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"101110-N2-75":{"quick":"侵入性檢查前做病人辨識=過程控制。","detail":{"background":"控制類型(Donabedian):結構控制(投入資源:設備人力制度)、過程控制(照護執行過程:病人辨識、技術執行)、結果控制(結果指標)。「侵入性檢查前做病人辨識(執行過程的查核)」=過程控制(C正確)。故過程(C)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"策略非控制構面。","B":"結構是投入資源。","C":"正確(本題答案)。病人辨識是過程控制。","D":"結果是結果指標。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"102110-N2-64":{"quick":"考核技術指引是否含無菌原則=結構考核。","detail":{"background":"Donabedian:考核「醫院訂定的肌肉注射技術『指引』是否包含無菌技術原則(制度/標準的完備性)」=結構考核(B正確,結構=制度標準設備人力的完備)。結果考核(病人結果)、過程考核(實際執行過程)皆非「考核指引內容」。故結構考核(B)。","options":{"A":"結果考核是病人結果。","B":"正確(本題答案)。考核指引內容完備=結構考核。","C":"過程考核是實際執行。","D":"執行考核非標準分類。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"102110-N2-76":{"quick":"護理品管委員會制定護理技術=護理標準組。","detail":{"background":"護理品管委員會分組:護理標準組(制定護理技術標準/常規)、護理臨床稽核組(稽核執行)、護理品質指標監測組(監測指標)、護理成本控制組。「制定護理技術」=護理標準組(A正確)。故護理標準組(A)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"正確(本題答案)。制定護理技術=護理標準組。","B":"臨床稽核組是稽核執行。","C":"品質指標監測組是監測指標。","D":"成本控制組是控成本。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"103030-N2-68":{"quick":"Donabedian過程面指標=導尿技術正確性。","detail":{"background":"Donabedian結構/過程/結果:過程面(照護『執行』過程,如技術正確性)。選項D「導尿技術正確性(照護執行過程)」=過程面(D正確)。A護理師持證書比率=結構面;B泌尿道感染率=結果面;C病人滿意度=結果面。故導尿技術正確性(D)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"持證書比率是結構面。","B":"泌尿道感染率是結果面。","C":"滿意度是結果面。","D":"正確(本題答案)。導尿技術正確性是過程面。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"103100-N2-79":{"quick":"Donabedian結果面指標=給藥異常發生率。","detail":{"background":"Donabedian結果面(病人/照護的『結果』指標)。選項A「給藥異常發生率(照護結果)」=結果面(A正確)。B急救車設備完整=結構面;C教育訓練計畫周全=結構面;D接受訓練人數=結構面。故給藥異常發生率(A)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"正確(本題答案)。給藥異常發生率是結果面。","B":"急救車設備是結構面。","C":"教育訓練計畫是結構面。","D":"接受訓練人數是結構面。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"104100-N2-76":{"quick":"醫院評鑑要求各病房有洗手設備=結構控制。","detail":{"background":"Donabedian:「要求各病房應有洗手的『設備』(投入資源/設施的完備)」=結構控制(A正確,結構=設備人力制度)。過程(執行)、結果(結果指標)、策略皆非「設備設施」。故結構(A)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"正確(本題答案)。洗手設備是結構控制。","B":"過程是執行過程。","C":"結果是結果指標。","D":"策略非控制構面。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"105030-N2-80":{"quick":"過程品質指標=手術流程。","detail":{"background":"Donabedian品質指標:過程品質(照護『執行過程』,如手術流程、技術)。選項C「手術流程」=過程品質(C正確)。A滿意度=結果;B護理師人數=結構;D跌倒率=結果。故手術流程(C)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"滿意度是結果品質。","B":"護理師人數是結構品質。","C":"正確(本題答案)。手術流程是過程品質。","D":"跌倒率是結果品質。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"106030-N2-78":{"quick":"血液管路感染率=Donabedian結果面。","detail":{"background":"Donabedian:血液管路感染率是「病人照護的『結果』指標」=結果面(C正確)。結構面(設備人力制度)、過程面(執行過程)、綜合面皆非「感染結果」。故結果面(C)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"結構面是設備人力制度。","B":"過程面是執行過程。","C":"正確(本題答案)。感染率是結果面。","D":"綜合面非標準構面。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"106111-N2-76":{"quick":"忘記告知禁食致手術延期=因投入過程不當產生的問題。","detail":{"background":"護理師「忘記告知病人禁食,導致手術延期」——是照護『執行過程』中的疏失=因投入過程不當產生的問題(C正確,過程面問題)。因時間/地點/權限不同產生的問題皆非「執行過程疏失」。故投入過程不當(C)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"非因時間不同。","B":"非因地點不同。","C":"正確(本題答案)。忘記告知禁食=投入過程不當。","D":"非因權限不同。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"107030-N2-72":{"quick":"觀察發藥是否遵三讀五對=過程考核。","detail":{"background":"Donabedian:護理部「定期至病房『觀察護理師發藥是否遵照三讀五對』(照護執行過程的查核)」=過程考核(B正確)。結構考核(制度設備)、成果考核(結果)、績效考核皆非「觀察執行過程」。故過程考核(B)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"結構考核是制度設備。","B":"正確(本題答案)。觀察三讀五對是過程考核。","C":"成果考核是結果。","D":"績效考核非此分類。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"108020-N2-76":{"quick":"過程品質指標=洗手遵從率。","detail":{"background":"Donabedian:過程品質(執行過程的遵從/正確)。選項D「洗手遵從率(執行過程的遵從度)」=過程品質(D正確)。A跌倒發生率=結果;B護理師編制=結構;C壓瘡發生率=結果。故洗手遵從率(D)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"跌倒發生率是結果品質。","B":"護理師編制是結構品質。","C":"壓瘡發生率是結果品質。","D":"正確(本題答案)。洗手遵從率是過程品質。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"109110-N2-71":{"quick":"糖尿病素食送餐有誤檢討「最不適當」=找出犯錯者並調離單位。","detail":{"background":"送餐有誤的檢討改進(系統/品質思維):A仔細檢討送錯的導因、C檢討員工知識技能是否足夠、D加強準備正確性的稽核。選項B「找出犯錯者並將他調到其他單位」最不適當(本題答案)——品質改善應「對事不對人、找系統根因」,而非「懲處/調離個人」(懲罰文化不利通報與改善)。故B。","options":{"A":"檢討送錯導因(適當)。","B":"最不適當(本題答案)。應找系統根因,非懲處調離個人。","C":"檢討員工知識技能(適當)。","D":"加強稽核(適當)。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"111030-N2-78":{"quick":"線性溝通模式品質關鍵要素=來源、訊息、管道及接收者。","detail":{"background":"線性溝通模式(Shannon-Weaver)的關鍵要素:來源(發訊者)、訊息(message)、管道(channel)、接收者(receiver)及干擾(noise)。選項D「來源、訊息、管道及接收者」正確。其餘選項用詞不符(溝通者、員工、傳遞者非標準要素)。故D。","options":{"A":"「溝通者」非標準要素。","B":"「溝通者」非標準要素。","C":"「員工、傳遞者」非標準要素。","D":"正確(本題答案)。來源、訊息、管道、接收者。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"112030-N2-73":{"quick":"控制概念正確=預算編列屬於事前控制。","detail":{"background":"控制(controlling)分類:事前控制(預防性,如預算編列、計畫)、事中控制(過程中)、事後控制(結果)。選項B「預算編列屬於事前控制」正確。A「策略控制適用基層」錯(策略控制適用高層);C「病人辨識屬結構控制」錯(屬過程控制);D「顧客反應屬過程控制」錯(屬結果控制)。故B。","options":{"A":"策略控制適用高層,非基層。","B":"正確(本題答案)。預算編列屬事前控制。","C":"病人辨識是過程控制,非結構。","D":"顧客反應是結果控制,非過程。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"112110-N2-61":{"quick":"醫療服務過程面指標=護理師手部衛生執行正確率。","detail":{"background":"Donabedian過程面(執行過程的正確/遵從)。選項A「護理師手部衛生執行正確率」=過程面(A正確)。B生理監測儀數量=結構面;C護理人員數與病床數比率=結構面;D加護病房住院死亡率=結果面。故手部衛生執行正確率(A)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"正確(本題答案)。手部衛生執行正確率是過程面。","B":"監測儀數量是結構面。","C":"護病比是結構面。","D":"死亡率是結果面。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"112180-N2-46":{"quick":"Donabedian正確=評值導尿給藥技術是否正確屬過程標準。","detail":{"background":"Donabedian醫療品質評估模式:B「評值護理師執行導尿、給藥技術是否正確,屬『過程標準』(執行過程)」正確。A「提供照護所執行的活動合乎標準屬結構標準」錯(屬過程);C「評值設備設施是否符合需求屬結果標準」錯(屬結構);D「監測尿路感染率、跌倒傷害率屬測量標準」錯(屬結果標準)。故B。","options":{"A":"執行活動合標準屬過程,非結構。","B":"正確(本題答案)。技術是否正確屬過程標準。","C":"設備設施屬結構,非結果。","D":"感染率跌倒率屬結果標準,非測量。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"113030-N2-47":{"quick":"Donabedian過程面指標=護理紀錄完整性(1)+術前預防性給抗生素比率(2)。本題答案A「12」。","detail":{"background":"本題官方答案「12」。Donabedian過程面(執行過程):1護理紀錄完整性、2手術前預防性給予抗生素比率(皆為照護執行過程的指標)。選項3、4...為結構或結果面。故過程面為「12」。核心:過程面=照護執行過程(紀錄、技術、給藥流程)。","options":{"A":"正確(本題答案,12)。護理紀錄完整性、術前給抗生素比率=過程面。","B":"23含結果面項目。","C":"14不符。","D":"34不符。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"113180-N2-48":{"quick":"護理師延誤給藥家屬抱怨:釐清事件向家屬說明事實與後續處理。","detail":{"background":"病人家屬抱怨護理師延誤給藥,護理長最適宜=C「釐清事件,以便向家屬說明事實與後續處理」——先了解真相、再向家屬說明並處理。A不理會(忽視)、B請醫師溝通護理長不出面(推卸)、D直接轉法務(過早升級)皆不當。故釐清事件說明處理(C)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"不理會是忽視。","B":"護理長不出面是推卸。","C":"正確(本題答案)。釐清事件向家屬說明處理。","D":"直接轉法務過早升級。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"113180-N2-49":{"quick":"泌尿道感染發生率=Donabedian結果品質。","detail":{"background":"Donabedian:泌尿道感染發生率是「病人照護的『結果』指標」=結果品質(A正確)。過程品質(執行過程)、流程品質、結構品質(設備人力)皆非「感染結果」。故結果品質(A)。Donabedian醫療品質三構面(SPO):結構(structure,投入資源:人力資格、設備、制度、指引、護病比)、過程(process,照護執行:技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識)、結果(outcome,病人結果:感染率、跌倒率、壓瘡率、死亡率、滿意度)。控制類型:事前控制(預算編列、計畫)、事中、事後。護理品管委員會:標準組(制定技術)、稽核組、指標監測組。","options":{"A":"正確(本題答案)。泌尿道感染率是結果品質。","B":"過程品質是執行過程。","C":"流程品質非標準分類。","D":"結構品質是設備人力。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"115030-N2-48":{"quick":"改進品管主題考量=發生頻率較高的護理活動。","detail":{"background":"選擇品質改善主題的考量:C「發生頻率較高的護理活動(高頻問題影響面大、改善效益高)」正確。A「繼續執行前一年活動」(未必符合當前需求)、B「較低風險性活動」(應選高風險優先)、D「簡單不耗成本」(不應只挑簡單的)皆非。故發生頻率較高(C)。","options":{"A":"未必繼續前一年活動。","B":"應選高風險優先,非低風險。","C":"正確(本題答案)。選發生頻率較高的活動。","D":"不應只挑簡單的。"},"sources":["新文京《護理行政》品質管理","華杏《護理行政學》Donabedian品質模式"]}},"102030-N2-65":{"quick":"FOCUS-PDCA「錯誤」=A:尋找協助(A應為Act行動)。","detail":{"background":"FOCUS-PDCA品管步驟:Find(發現問題)、Organize(組成小組)、Clarify(釐清現況)、Understand(瞭解變異)、Select(選擇對策);PDCA=Plan(計畫)、Do(執行)、Check(查核)、Act(行動/標準化)。選項D「A:尋找協助(assistance)」錯誤(本題答案)——A是「Act(行動/處置)」,非尋找協助。故D。","options":{"A":"F:發現問題(對)。","B":"O:組成小組(對)。","C":"P:擬定計畫(對)。","D":"錯誤(本題答案)。A是Act行動,非尋找協助。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"102110-N2-62":{"quick":"品管圈成員無法形成共識延誤進度=任務性衝突。","detail":{"background":"品管圈衝突類型:任務性衝突(對工作任務/目標內容的歧見)、程序性衝突(對流程方法)、關係性衝突(人際情感)。「成員無法對『主題』形成共識、延誤進度」=任務性衝突(A正確,對任務內容的歧見)。故任務性衝突(A)。PDCA循環:Plan(計畫)、Do(執行)、Check(查核成效)、Act(行動/標準化)。FOCUS-PDCA:Find發現問題、Organize組小組、Clarify釐清、Understand瞭解變異、Select選對策。品質發展:QC品質控制→QA品質保證(依標準)→TQC全面品質管制→TQM全面品質管理(全員參與)。5W1H目標(Why/What/Who/Where/When/How)。改善主題選發生頻率高者(80/20)。","options":{"A":"正確(本題答案)。對主題無共識=任務性衝突。","B":"功能性衝突是建設性衝突。","C":"程序性衝突是對流程方法。","D":"關係性衝突是人際情感。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"102110-N2-72":{"quick":"服務滿意度調查分析=PDCA的Check步驟。","detail":{"background":"PDCA循環:Plan(計畫)、Do(執行)、Check(查核/檢核成效)、Act(行動/標準化)。「作服務滿意度『調查分析(檢核成效)』」=Check步驟(C正確)。故Check(C)。PDCA循環:Plan(計畫)、Do(執行)、Check(查核成效)、Act(行動/標準化)。FOCUS-PDCA:Find發現問題、Organize組小組、Clarify釐清、Understand瞭解變異、Select選對策。品質發展:QC品質控制→QA品質保證(依標準)→TQC全面品質管制→TQM全面品質管理(全員參與)。5W1H目標(Why/What/Who/Where/When/How)。改善主題選發生頻率高者(80/20)。","options":{"A":"Plan是訂計畫。","B":"Do是執行。","C":"正確(本題答案)。滿意度調查分析=Check查核。","D":"Act是行動標準化。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"104030-N2-63":{"quick":"鼓勵員工踴躍參加品管圈=Y理論。","detail":{"background":"鼓勵員工「踴躍參加品管圈活動(自發參與、發揮潛能)」較接近Y理論觀點(D正確,人性本善、自動自發、樂於參與)。系統理論、權變理論、Z理論皆非「鼓勵自發參與」核心(Y理論最貼近)。故Y理論(D,選項標示為Y理論)。PDCA循環:Plan(計畫)、Do(執行)、Check(查核成效)、Act(行動/標準化)。FOCUS-PDCA:Find發現問題、Organize組小組、Clarify釐清、Understand瞭解變異、Select選對策。品質發展:QC品質控制→QA品質保證(依標準)→TQC全面品質管制→TQM全面品質管理(全員參與)。5W1H目標(Why/What/Who/Where/When/How)。改善主題選發生頻率高者(80/20)。","options":{"A":"系統理論是輸入輸出。","B":"權變理論是因情境調整。","C":"Z理論偏團體參與(亦相關)。","D":"正確(本題答案)。鼓勵自發參與=Y理論。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"106030-N2-57":{"quick":"培養5位N2進階N3、5W缺=When(時間)。","detail":{"background":"工作目標應含5W1H:Why(為何-提升品質)、What(做什麼-進階N3)、Who(誰-5位N2)、Where(哪裡)、When(何時)、How。「培養5位N2護理師完成進階至N3」——有Why、What、Who,但「缺少When(時間/期限)」(B正確)。故When(B)。","options":{"A":"Why有(提升品質)。","B":"正確(本題答案)。缺When(完成時間)。","C":"Where非此目標關鍵缺項。","D":"Who有(5位N2)。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"107030-N2-77":{"quick":"品管圈「錯誤」=數據是唯一控制的指標。","detail":{"background":"品管圈(QCC):A先從計畫(Plan)著手、B擬定對策實施並檢討、C確認效果以利改進。選項D「數據是唯一控制的指標」錯誤(本題答案)——品質控制除量化數據外,也須考量「質性面向(病人感受、流程合理性等)」,數據非唯一指標。故D。PDCA循環:Plan(計畫)、Do(執行)、Check(查核成效)、Act(行動/標準化)。FOCUS-PDCA:Find發現問題、Organize組小組、Clarify釐清、Understand瞭解變異、Select選對策。品質發展:QC品質控制→QA品質保證(依標準)→TQC全面品質管制→TQM全面品質管理(全員參與)。5W1H目標(Why/What/Who/Where/When/How)。改善主題選發生頻率高者(80/20)。","options":{"A":"品管圈先從計畫著手(對)。","B":"擬定對策實施檢討(對)。","C":"確認效果改進(對)。","D":"錯誤(本題答案)。數據非唯一控制指標。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"107030-N2-78":{"quick":"病人排隊抱怨,品管中心第一步=定義問題找出差異。","detail":{"background":"品管中心解決問題的「第一步」=C「定義問題,找出排隊等候抽血情境與『預期的有多少差異』(界定問題與落差)」——先界定問題與現況落差,才能後續分析、找方案。A增加人力(未先界定)、B討論補償(未解決根本)、D腦力激盪發展方法(界定後)皆非第一步。故定義問題(C)。","options":{"A":"增加人力未先界定問題。","B":"討論補償未解決根本。","C":"正確(本題答案)。第一步定義問題找出差異。","D":"腦力激盪是界定後步驟。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"109110-N2-59":{"quick":"效果(效能)目標=病人壓瘡發生率降低至閾值0.005%。","detail":{"background":"規劃改善的目標依評值標準分:效果/效能目標(outcome,病人結果指標,如壓瘡發生率)、過程/執行目標(執行率、落後率)。選項A「病人壓瘡發生率降低至閾值0.005%(病人結果)」=效果(效能)目標(A正確)。B經費執行率、C建置落後率、D完成率皆是「過程/執行」目標。故A。","options":{"A":"正確(本題答案)。壓瘡發生率(結果)=效果目標。","B":"經費執行率是過程目標。","C":"建置落後率是過程目標。","D":"完成率是過程目標。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"110030-N2-67":{"quick":"品質改善優先項目=最高發生頻率。","detail":{"background":"選擇品質改善項目的優先順序:應優先選「最高發生頻率(C)」——高頻問題影響面廣、改善效益最大(80/20法則,聚焦關鍵多數)。最困難改善、最容易改善、最低花費皆非優先依據(應以「重要性/頻率/影響」為優先)。故最高發生頻率(C)。PDCA循環:Plan(計畫)、Do(執行)、Check(查核成效)、Act(行動/標準化)。FOCUS-PDCA:Find發現問題、Organize組小組、Clarify釐清、Understand瞭解變異、Select選對策。品質發展:QC品質控制→QA品質保證(依標準)→TQC全面品質管制→TQM全面品質管理(全員參與)。5W1H目標(Why/What/Who/Where/When/How)。改善主題選發生頻率高者(80/20)。","options":{"A":"最困難改善非優先。","B":"最容易改善非優先依據。","C":"正確(本題答案)。最高發生頻率優先。","D":"最低花費非優先依據。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"111030-N2-73":{"quick":"品質管理發展順序=QC→QA→TQC→TQM(1423)。本題答案B。","detail":{"background":"本題官方答案B(1423)。品質管理概念發展先後:1品質控制QC(quality control)→4品質保證QA→2全面品質管制TQC(total quality control)→3全面品質管理TQM(total quality management)。故順序「1423」(B)。核心:由檢驗管制(QC)→保證(QA)→全面管制(TQC)→全面管理(TQM,全員參與持續改善)。","options":{"A":"1234順序不符。","B":"正確(本題答案,1423)。QC→QA→TQC→TQM。","C":"2314不符。","D":"4132不符。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"111030-N2-76":{"quick":"將危機管理納入品質模式=阿丹兒(Adair)的QUACERS。","detail":{"background":"品質管理模式:A「阿丹兒(Adair)的QUACERS」將「危機管理(Risk management)」納入品質管理模式(A正確,QUACERS含Quality/Utilization/Access/Cost/Effectiveness/Risk/Satisfaction等面向)。戴明PDCA、Donabedian SPO、ANA品質保證模式皆未特別納入危機管理。故Adair的QUACERS(A)。","options":{"A":"正確(本題答案)。QUACERS納入危機管理。","B":"戴明PDCA是改善循環。","C":"Donabedian SPO是結構過程結果。","D":"ANA品質保證模式未特別納危機。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"113100-N2-49":{"quick":"品質管理正確=品質保證(QA)是依照標準。","detail":{"background":"品質管理:B「品質保證(quality assurance,QA)是依照『標準』(設定標準、評值是否達標)」正確。A「品質管理是追求『主管』滿意」錯(應追求病人/顧客滿意);C「石川馨提出TQM」敘述須對應(石川馨提出魚骨圖/品管圈);D「戴明提出全員參與品質保證」敘述須對應(戴明提PDCA)。故B。","options":{"A":"品質管理追求病人/顧客滿意,非主管。","B":"正確(本題答案)。品質保證依照標準。","C":"石川馨提出魚骨圖/品管圈。","D":"戴明提出PDCA。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"113180-N2-38":{"quick":"滿意度提升到90%目標,5W缺=why。","detail":{"background":"工作目標5W:「本年度(When)各病房(Where)病人服務滿意度提升到90%(What)」——有When、Where、What,但「缺少Why(為何要做、目的)」(A正確)。故why(A)。PDCA循環:Plan(計畫)、Do(執行)、Check(查核成效)、Act(行動/標準化)。FOCUS-PDCA:Find發現問題、Organize組小組、Clarify釐清、Understand瞭解變異、Select選對策。品質發展:QC品質控制→QA品質保證(依標準)→TQC全面品質管制→TQM全面品質管理(全員參與)。5W1H目標(Why/What/Who/Where/When/How)。改善主題選發生頻率高者(80/20)。","options":{"A":"正確(本題答案)。缺why(目的)。","B":"when有(本年度)。","C":"where有(各病房)。","D":"who非此目標關鍵缺項。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"114030-N2-48":{"quick":"PDCA應用老人跌倒改善:Check=查核跌倒評估落實度及扶手使用率。","detail":{"background":"PDCA應用於老人跌倒品質改善:C「Check:查核跌倒評估的落實度及浴廁扶手使用率(查核成效)」正確。A「Plan:依事先計畫執行」錯(那是Do);B「Do:擬定計畫」錯(擬定計畫是Plan);D「Act:依跌倒原因採取行動方案」——Act是依查核結果標準化/再改善(D敘述偏Plan)。故C。","options":{"A":"依計畫執行是Do,非Plan。","B":"擬定計畫是Plan,非Do。","C":"正確(本題答案)。查核落實度與使用率=Check。","D":"依原因採行動偏Plan,Act是標準化。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"115030-N2-36":{"quick":"培養3位N3短期出國培訓,5W1H缺=完成時間性。","detail":{"background":"工作目標5W1H:「為提升品質(Why)、培養三位N3護理師(Who/What)、短期出國完成專科培訓(How/What)」——但「缺少完成時間性(When,何時完成/期限)」(D正確)。故完成時間性(D)。PDCA循環:Plan(計畫)、Do(執行)、Check(查核成效)、Act(行動/標準化)。FOCUS-PDCA:Find發現問題、Organize組小組、Clarify釐清、Understand瞭解變異、Select選對策。品質發展:QC品質控制→QA品質保證(依標準)→TQC全面品質管制→TQM全面品質管理(全員參與)。5W1H目標(Why/What/Who/Where/When/How)。改善主題選發生頻率高者(80/20)。","options":{"A":"執行困難度非5W1H要素。","B":"目標具體性有(培養3位N3)。","C":"單位共識性非5W1H要素。","D":"正確(本題答案)。缺完成時間性(When)。"},"sources":["新文京《護理行政》品質改善","華杏《護理行政學》PDCA與品管圈"]}},"101030-N2-76":{"quick":"分析跌倒因素最適=樹狀圖?本題答案B。","detail":{"background":"本題官方答案B(樹狀圖)。分析病患跌倒『因素/原因』,可用樹狀圖(系統圖,將問題逐層展開找原因)。甘特圖(進度排程)、矩陣圖(關係比較)、控制圖(監測變異)皆非「分析原因」。本題以樹狀圖為答案;魚骨圖亦常用於分析原因。故B。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"甘特圖是進度排程。","B":"正確(本題答案)。樹狀圖展開分析跌倒原因。","C":"矩陣圖是關係比較。","D":"控制圖是監測變異。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"101110-N2-69":{"quick":"以箭頭表示過程問題因果關係=系統圖。","detail":{"background":"品質分析工具:系統圖(systematic diagram,以箭頭層層展開、表示過程中問題產生的因果關係/手段目的)。題幹「有系統地以箭頭表示過程中問題的因果關係」=系統圖(B正確)。矩陣法、要逕法、計畫評核術皆非。故系統圖(B)。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"矩陣法是關係比較。","B":"正確(本題答案)。箭頭表因果關係=系統圖。","C":"要逕法是排程。","D":"計畫評核術是排程。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"102030-N2-66":{"quick":"以圖表表達結果與原因關係=魚骨圖。","detail":{"background":"品質工具:魚骨圖(cause-effect/fishbone,特性要因圖,以圖表表達『結果(特性)與原因(要因)』的關係)。題幹「以圖表表達結果與原因的關係」=魚骨圖(B正確)。甘特圖(進度)、矩陣圖、箭線圖皆非「結果與原因關係」。故魚骨圖(B)。","options":{"A":"甘特圖是進度排程。","B":"正確(本題答案)。結果與原因關係=魚骨圖。","C":"矩陣圖是關係比較。","D":"箭線圖是排程。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"103030-N2-62":{"quick":"找出感染率問題的原因呈現=魚骨圖。","detail":{"background":"醫品圈對「降低感染率」經腦力激盪找出『問題的原因』,呈現最佳=魚骨圖(cause-effect diagram,展現問題的各類原因)(D正確)。甘特圖(進度)、派圖(比例)、直方圖(分布)皆非「找原因」。故魚骨圖(D)。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"甘特圖是進度排程。","B":"派圖是比例呈現。","C":"直方圖是次數分布。","D":"正確(本題答案)。找出原因=魚骨圖。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"103030-N2-74":{"quick":"找出重要品管問題加以改善=柏拉圖。","detail":{"background":"品質工具:柏拉圖(Pareto,80/20法則,將問題依發生頻率排序、找出『重要少數(關鍵問題)』優先改善)。「找出重要品管問題加以改善」=柏拉圖(B正確)。查檢表(收集資料)、直方圖(分布)、推移圖(趨勢)皆非「找重要問題」。故柏拉圖(B)。","options":{"A":"查檢表是收集資料。","B":"正確(本題答案)。找重要問題=柏拉圖。","C":"直方圖是次數分布。","D":"推移圖是趨勢。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"104100-N2-74":{"quick":"應用80/20找品質問題重要導因=柏拉圖。","detail":{"background":"品質工具:柏拉圖(Pareto)應用「80/20法則」——找出造成品質問題的「重要導因(關鍵少數)」(A正確)。魚骨圖(找各類原因)、直方圖(分布)、管制圖(監測)皆非「80/20找重要導因」。故柏拉圖(A)。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"正確(本題答案)。80/20找重要導因=柏拉圖。","B":"魚骨圖是找各類原因。","C":"直方圖是次數分布。","D":"管制圖是監測變異。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"105030-N2-74":{"quick":"針對異常事件找重要導因=柏拉圖。","detail":{"background":"品質工具:柏拉圖(Pareto,依頻率排序找重要導因)可「針對異常事件找出重要導因(關鍵少數)」(D正確)。直方圖(分布)、魚骨圖(找各類原因)、推移圖(趨勢)皆非「找重要導因排序」。故柏拉圖(D)。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"直方圖是次數分布。","B":"魚骨圖是找各類原因。","C":"推移圖是趨勢。","D":"正確(本題答案)。找重要導因=柏拉圖。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"106030-N2-76":{"quick":"柏拉圖「錯誤」=以查核表方式刪除極端案例。","detail":{"background":"柏拉圖(Pareto)原理:A統計發生次數找導因(對)、B應用80/20找改善策略(對)、D可用於點滴滴速控制失常改善(對,找主要失常原因)。選項C「以查核表方式刪除極端案例」錯誤(本題答案)——柏拉圖是「依頻率排序找重要少數」,非「刪除極端案例」(且查核表是另一工具)。故C。","options":{"A":"統計次數找導因(對)。","B":"80/20找改善策略(對)。","C":"錯誤(本題答案)。柏拉圖非刪除極端案例。","D":"可用於滴速控制改善(對)。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"106030-N2-80":{"quick":"病人抱怨次數=平衡計分卡的顧客面。","detail":{"background":"平衡計分卡(BSC)四構面:財務面、顧客面(顧客滿意/抱怨)、內部流程面、員工學習與成長面。「病人抱怨的次數」=顧客面(B正確,反映顧客滿意度)。故顧客面(B)。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"財務面是財務指標。","B":"正確(本題答案)。病人抱怨次數=顧客面。","C":"內部流程面是流程指標。","D":"員工學習成長面是員工發展。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"106110-N2-60":{"quick":"80/20「錯誤」=運用關鍵的多數掌握重要的少數。","detail":{"background":"80/20原理(巴瑞多/柏拉圖):B義大利經濟學者提出(對)、C 20%投入得80%產出(對)、D巴瑞多原理(對)。選項A「運用關鍵的『多數』,就能掌握重要的『少數』」錯誤(本題答案)——80/20是「掌握『重要少數(關鍵的20%)』就能解決『瑣碎多數(80%)』的問題」,A把多數少數說反。故A。","options":{"A":"錯誤(本題答案)。應掌握重要少數,非關鍵多數。","B":"義大利經濟學者提出(對)。","C":"20%投入得80%產出(對)。","D":"巴瑞多原理(對)。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"106110-N2-64":{"quick":"跌倒因夜間如廁無人扶持=人力問題。","detail":{"background":"跌倒原因歸類:病人「夜間如廁、『無人扶持』」造成跌倒——歸類於「人力問題(A)」(人力不足無法即時協助)。技術問題、營運問題、設備問題皆非「無人扶持」。故人力問題(A)。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"正確(本題答案)。無人扶持=人力問題。","B":"技術問題是技能不足。","C":"營運問題是經營面。","D":"設備問題是設施。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"106110-N2-76":{"quick":"收集資料後依問題解決過程整理=依時間順序找等候過程與時間關聯。本題答案C。","detail":{"background":"本題官方答案C。品管專員為解決「抽血等候時間過長」,實地勘查收集資料後,依問題解決過程分析資料:C「依資料『時間順序』排列,找出等候過程與時間的關聯(找出哪個環節耗時)」最適當。A篩選最省錢方案(過早)、B依人事時地物分類(可,但本題以C為正解)、D用魚骨圖整理因果(後續)。核心:等候時間問題應先分析「時間流程」找瓶頸。故C。","options":{"A":"篩選方案過早。","B":"依人事時地物分類(本題正解C)。","C":"正確(本題答案)。依時間順序找等候過程關聯。","D":"魚骨圖整理因果是後續。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"106110-N2-77":{"quick":"新七手法「不適用」=柏拉圖(柏拉圖屬舊七手法)。","detail":{"background":"找出改善『策略』的「新七手法」:A關聯圖、C系統圖、D矩陣圖(皆新七手法)。選項B「柏拉圖」不適用(本題答案)——柏拉圖屬「『舊』QC七手法(用於找問題/排序)」,非新七手法。故柏拉圖(B)。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"關聯圖是新七手法。","B":"正確(本題答案)。柏拉圖是舊七手法,非新七手法。","C":"系統圖是新七手法。","D":"矩陣圖是新七手法。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"107030-N2-79":{"quick":"找跌倒超閾值導因「不適用」=管制圖。","detail":{"background":"找出「跌倒發生率超閾值之『導因』」可用:B魚骨圖(找原因)、C查檢表(收集資料)、D柏拉圖(找重要導因)。選項A「管制圖(control chart)」不適用(本題答案)——管制圖是「監測指標是否在『控制範圍內(變異監測)』」,非「找導因」。故管制圖(A)。","options":{"A":"正確(本題答案)。管制圖是監測變異,非找導因。","B":"魚骨圖找原因(適用)。","C":"查檢表收集資料(適用)。","D":"柏拉圖找重要導因(適用)。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"108020-N2-59":{"quick":"不符80/20原理=只要掌握80%結果由20%原因造成就能解決「全部」。","detail":{"background":"巴瑞多80/20原理:A原因結果/投入產出/努力報酬間不成正比(對)、B多數付出只造少許影響、少數付出造主要影響(對)、C強調重要少數與瑣碎多數(對)。選項D「只要掌握80%的結果是由那20%原因造成的就能解決『全部』」不符(本題答案)——80/20是「掌握關鍵20%可解決『主要(80%)』問題」,非「解決全部」(D誇大為全部)。故D。","options":{"A":"原因結果不成正比(對)。","B":"少數付出造主要影響(對)。","C":"重要少數瑣碎多數(對)。","D":"不符(本題答案)。非解決「全部」,是主要部分。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"108020-N2-80":{"quick":"分析跌倒因素最適=樹狀圖。本題答案B。","detail":{"background":"本題官方答案B(樹狀圖)。分析病人跌倒『因素』,以樹狀圖(Tree Diagrams,將問題逐層展開分析原因/對策)最適宜。甘特圖(排程)、矩陣圖(關係)、控制圖(監測)皆非「分析因素」。本題以樹狀圖為答案。故B。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"甘特圖是排程。","B":"正確(本題答案)。樹狀圖分析跌倒因素。","C":"矩陣圖是關係比較。","D":"控制圖是監測。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"108110-N2-80":{"quick":"降MDRO對策「每位...」用稽核表。本題答案D。","detail":{"background":"本題官方答案D(稽核表)。降低多重抗藥性微生物(MDRO)發生率,改善對策「每位(護理師執行手部衛生等)」的『落實度查核』→用稽核表(Check Sheet,查核執行是否落實)。魚骨圖(找原因)、甘特圖(排程)、直方圖(分布)皆非「查核落實」。故稽核表(D)。","options":{"A":"魚骨圖是找原因。","B":"甘特圖是排程。","C":"直方圖是分布。","D":"正確(本題答案)。查核落實=稽核表。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"109110-N2-73":{"quick":"平衡計分卡管理構面=財務面、顧客面、內部流程、員工學習與成長。","detail":{"background":"平衡計分卡(BSC)四大管理構面=A「財務面、顧客面、內部流程、員工學習與成長」(A正確)。B優劣勢機會威脅是SWOT;C有形無形資產敘述非BSC;D目標設定行動規劃是MBO。故A。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"正確(本題答案)。財務/顧客/內部流程/學習成長=BSC四構面。","B":"優劣勢機會威脅是SWOT。","C":"有形無形資產非BSC構面。","D":"目標設定行動規劃是MBO。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"109110-N2-79":{"quick":"監測給藥異常是否在控制範圍=管制圖。","detail":{"background":"品質工具:管制圖(control chart)用於「監測指標(如給藥異常發生率)是否在『控制範圍內(上下管制界限)』、偵測異常變異」(A正確)。系統圖(因果展開)、柏拉圖(找重要導因)、特性要因圖(魚骨圖找原因)皆非「監測控制範圍」。故管制圖(A)。","options":{"A":"正確(本題答案)。監測是否在控制範圍=管制圖。","B":"系統圖是因果展開。","C":"柏拉圖是找重要導因。","D":"特性要因圖是找原因。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"110030-N2-80":{"quick":"平衡計分卡「錯誤」=包含「品質構面」(BSC是財務顧客流程學習,非品質構面)。","detail":{"background":"平衡計分卡(BSC):B是績效評核指標的管理工具(對)、C以願景策略訂可衡量指標(對)、D可作與員工溝通的工具(對)。選項A「包含『品質構面』、顧客、內部流程、學習與成長4項構面」錯誤(本題答案)——BSC四構面是「『財務』、顧客、內部流程、學習與成長」,第一項是『財務面』非『品質構面』。故A。","options":{"A":"錯誤(本題答案)。BSC第一構面是財務面,非品質構面。","B":"BSC是績效評核工具(對)。","C":"依願景策略訂指標(對)。","D":"可作員工溝通工具(對)。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"111030-N2-57":{"quick":"柏拉圖80/20正確=日常事務中緊急且重要只占少數。","detail":{"background":"柏拉圖80/20法則:C「日常事務中,緊急且重要的只占少數(關鍵少數)」正確(80/20=少數關鍵造成多數結果)。A「把握關鍵『多數』獲得重要『少數』」錯(應把握關鍵少數);B「投入時間越多成果越大」錯(非線性正比);D「掌握80%時間解決20%問題」錯(應掌握20%關鍵解決80%問題)。故C。","options":{"A":"應把握關鍵少數,非多數。","B":"非線性正比。","C":"正確(本題答案)。緊急且重要只占少數。","D":"應掌握20%關鍵解決80%問題。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"111110-N2-72":{"quick":"分析問題發生原因最適=魚骨圖。","detail":{"background":"分析「問題發生的『原因』」最適合的圖=魚骨圖(cause-effect/特性要因圖,展開問題的各類原因)(D正確)。趨勢圖(時間趨勢)、矩陣圖(關係)、散布圖(相關)皆非「分析原因」。故魚骨圖(D)。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"趨勢圖是時間趨勢。","B":"矩陣圖是關係比較。","C":"散布圖是相關分析。","D":"正確(本題答案)。分析原因=魚骨圖。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"112110-N2-74":{"quick":"分析儀器設備問題的因果關係=魚骨圖。","detail":{"background":"分析「儀器設備使用問題的『因果關係』」可用魚骨圖(cause-effect diagram,展開問題的各類原因)(D正確)。趨勢圖(時間)、流程圖(流程)、長條圖(比較)皆非「分析因果關係」。故魚骨圖(D)。QC七手法找問題/原因:魚骨圖(特性要因/cause-effect,結果與原因關係、找各類原因)、柏拉圖(Pareto,80/20依頻率排序找重要少數/導因)、管制圖(control chart,監測是否在控制範圍內)、直方圖(分布)、查檢表(收集資料)、推移圖(趨勢)、散布圖(相關)。新七手法:關聯圖、系統圖、矩陣圖。平衡計分卡BSC四構面:財務、顧客、內部流程、學習與成長。","options":{"A":"趨勢圖是時間趨勢。","B":"流程圖是流程步驟。","C":"長條圖是數量比較。","D":"正確(本題答案)。分析因果關係=魚骨圖。"},"sources":["新文京《護理行政》品質管理工具","華杏《護理行政學》QC七手法"]}},"101110-N2-76":{"quick":"藥局少配藥即時發現=幾近錯失(near miss)。","detail":{"background":"異常事件類型:幾近錯失/跡近錯失(near miss,錯誤被『及時發現、未真正發生』於病人)、不良事件(已發生造成傷害)、警訊事件(嚴重)。「藥局少配降壓藥、護理師發現後即打電話(未給病人)」=幾近錯失(C正確)。故near miss(C)。","options":{"A":"意外事件已發生。","B":"醫療錯誤是已發生的錯誤。","C":"正確(本題答案)。即時發現未到病人=幾近錯失。","D":"不良事件已造成傷害。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"104100-N2-62":{"quick":"評核給藥過程、檢體採集運送流程=病人安全。","detail":{"background":"「評核給藥過程、病患檢體採集與運送的『作業流程』(確保流程正確安全)」是關心「病人安全(A)」護理業務重點——這些流程的正確性直接關係病人安全。員工福利、人員管理、教育訓練皆非「給藥/檢體流程」對應。故病人安全(A)。異常事件:跡近錯失/幾近錯失(near miss,錯誤被攔截、未到病人)、無傷害事件(到病人但無傷害)、不良事件(已造成傷害)、警訊/哨兵事件(sentinel,非預期死亡/永久功能喪失/嬰兒失竊/自殺/手術部位錯誤)。通報系統=非懲罰性、學習改善、預防再發生(非究責)。RCA根本原因分析(事後、組小組、找根本原因);FMEA失效模式與效應分析(事前/預應式)。傷害行為事件=暴力毆打醫護。","options":{"A":"正確(本題答案)。給藥檢體流程=病人安全。","B":"員工福利是福利面。","C":"人員管理是人力面。","D":"教育訓練是訓練面。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"106110-N2-79":{"quick":"藥物退回未發給病人=跡近錯失(near miss)。","detail":{"background":"異常事件:核對醫囑後將錯誤藥物退回藥局、「該錯誤藥物『尚未發給病人使用』」=跡近錯失(near miss,錯誤被攔截、未到病人)(C正確)。意外事件、哨兵(警訊)事件、無傷害事件皆非「未到病人」。故跡近錯失(C)。異常事件:跡近錯失/幾近錯失(near miss,錯誤被攔截、未到病人)、無傷害事件(到病人但無傷害)、不良事件(已造成傷害)、警訊/哨兵事件(sentinel,非預期死亡/永久功能喪失/嬰兒失竊/自殺/手術部位錯誤)。通報系統=非懲罰性、學習改善、預防再發生(非究責)。RCA根本原因分析(事後、組小組、找根本原因);FMEA失效模式與效應分析(事前/預應式)。傷害行為事件=暴力毆打醫護。","options":{"A":"意外事件已發生。","B":"哨兵(警訊)事件是嚴重已發生。","C":"正確(本題答案)。未發給病人=跡近錯失。","D":"無傷害事件是已到病人但無傷害。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"106111-N2-1":{"quick":"異常事件通報「錯誤」=多為個人疏失應予懲處。","detail":{"background":"鼓勵異常事件通報的執行策略:A營造通報文化、B對事件進行根本原因分析、D鼓勵參與全國性通報系統。選項C「多為個人疏失,應予懲處」錯誤(本題答案)——病安強調「非懲罰性通報、系統思維(找系統根因而非懲處個人)」,懲處會抑制通報。故C。異常事件:跡近錯失/幾近錯失(near miss,錯誤被攔截、未到病人)、無傷害事件(到病人但無傷害)、不良事件(已造成傷害)、警訊/哨兵事件(sentinel,非預期死亡/永久功能喪失/嬰兒失竊/自殺/手術部位錯誤)。通報系統=非懲罰性、學習改善、預防再發生(非究責)。RCA根本原因分析(事後、組小組、找根本原因);FMEA失效模式與效應分析(事前/預應式)。傷害行為事件=暴力毆打醫護。","options":{"A":"營造通報文化(對)。","B":"進行根本原因分析(對)。","C":"錯誤(本題答案)。應非懲罰性、找系統根因,非懲處個人。","D":"鼓勵參與通報系統(對)。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"106111-N2-75":{"quick":"兒子質疑打胰島素護理師查證=跡近錯失(near miss)。","detail":{"background":"護理師準備打胰島素,病人兒子質疑「我媽沒糖尿病、血糖正常,為何打胰島素?」——若護理師因此查證而『未誤打』,屬跡近錯失(near miss,錯誤被攔截未到病人)(B正確)。給藥錯誤(已誤給)、不可逆事件、醫療過失皆非「被攔截未發生」。故跡近錯失(B)。","options":{"A":"給藥錯誤是已誤給。","B":"正確(本題答案)。被質疑攔截未誤打=跡近錯失。","C":"不可逆事件非此。","D":"醫療過失是已造成傷害。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"107030-N2-76":{"quick":"氧氣面罩未開臉發黑:立即調整氧氣流量並通知醫生。","detail":{"background":"護理長巡房發現病人「臉色發黑、氧氣面罩開關未開」(病人安全危急),應「立即調整正確的氧氣流量並通知醫生(D)」——病人生命安全優先,先處置危機。A當面教導、B嚴肅糾正、C列入考核皆非「當下優先處置病人」。故D。異常事件:跡近錯失/幾近錯失(near miss,錯誤被攔截、未到病人)、無傷害事件(到病人但無傷害)、不良事件(已造成傷害)、警訊/哨兵事件(sentinel,非預期死亡/永久功能喪失/嬰兒失竊/自殺/手術部位錯誤)。通報系統=非懲罰性、學習改善、預防再發生(非究責)。RCA根本原因分析(事後、組小組、找根本原因);FMEA失效模式與效應分析(事前/預應式)。傷害行為事件=暴力毆打醫護。","options":{"A":"當面教導非當下優先。","B":"嚴肅糾正非當下優先。","C":"列入考核非當下處置。","D":"正確(本題答案)。立即調整氧氣流量並通知醫生。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"110110-N2-79":{"quick":"醫療糾紛「錯誤」=任何醫療行為均有風險故無法預防糾紛。","detail":{"background":"醫療糾紛:A醫療過程方式結果收費或態度不好所致紛爭(對)、C重大糾紛後應做根本原因分析改正(對)、D可能來自醫病/護病溝通不良(對)。選項B「任何醫療行為均有風險,因此『無法預防』醫療糾紛」錯誤(本題答案)——醫療糾紛「可透過良好溝通、品質改善、風險管理『預防/減少』」,非無法預防。故B。","options":{"A":"糾紛來自過程結果態度(對)。","B":"錯誤(本題答案)。醫療糾紛可預防減少,非無法預防。","C":"重大糾紛後做RCA(對)。","D":"可能來自溝通不良(對)。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"111030-N2-63":{"quick":"非預期死亡或永久性功能喪失=警訊事件(sentinel event)。","detail":{"background":"異常事件:警訊事件/哨兵事件(sentinel event,造成『非預期死亡或永久性功能喪失』等嚴重後果的事件)。題幹描述=警訊事件(A正確)。意外事件、跡近錯失(未到病人)、醫療不良事件(已傷害但未必嚴重至此)皆非「非預期死亡/永久功能喪失」。故警訊事件(A)。","options":{"A":"正確(本題答案)。非預期死亡/永久功能喪失=警訊事件。","B":"意外事件較廣泛。","C":"跡近錯失未到病人。","D":"醫療不良事件未必嚴重至此。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"111110-N2-63":{"quick":"「不」屬警訊事件=病人跌倒無受傷。","detail":{"background":"警訊事件(sentinel event,嚴重的非預期事件):A嬰兒失竊、C病人自殺未死亡、D手術部位錯誤——皆屬警訊事件。選項B「病人跌倒『無受傷』」不屬警訊事件(本題答案)——無傷害的跌倒屬「無傷害事件/跡近錯失」,非嚴重的警訊事件。故B。","options":{"A":"嬰兒失竊是警訊事件。","B":"正確(本題答案)。跌倒無受傷非警訊事件。","C":"自殺未死亡是警訊事件。","D":"手術部位錯誤是警訊事件。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"111110-N2-74":{"quick":"腦術後7天轉出病人有壓傷感染無人照顧,查證重點=123。本題答案A。","detail":{"background":"本題官方答案A(123)。評鑑查證腦部手術後病人(尾骶骨壓傷、傷口感染、無人照顧):1加護病房預防壓傷之措施、2(傷口感染照護)、3(照護人力/陪伴)等查證重點。選項4...非重點。核心:以病人實際問題追蹤查證相關照護措施(PFM)。作答以官方A為準。","options":{"A":"正確(本題答案,123)。預防壓傷、傷口感染照護等查證重點。","B":"124不符。","C":"234不符。","D":"134不符。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"112030-N2-62":{"quick":"病安異常事件通報系統最適=建立非懲罰性通報制度。","detail":{"background":"病人安全異常事件通報系統的建置:A「建立『非懲罰性』通報制度(鼓勵誠實通報、找系統根因)」最適宜。B「作為醫療糾紛佐證」、C「提供責任釐清參考」、D「作為部門溝通依據」皆非通報系統的目的(通報是為『學習改善、預防再發生』,非究責)。故非懲罰性通報(A)。","options":{"A":"正確(本題答案)。建立非懲罰性通報制度。","B":"非作醫療糾紛佐證。","C":"非為責任釐清。","D":"非部門溝通依據。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"112110-N2-77":{"quick":"風險管理事前分析=失效模式與效應分析(FMEA)。","detail":{"background":"醫療風險管理工具:FMEA(failure mode and effects analysis,失效模式與效應分析)是「『事前(預應式)』分析」——在錯誤發生前,前瞻性找出可能的失效模式並預防。RCA(根本原因分析,事後)、PDCA、個案報告皆非「事前分析」。故FMEA(A)。","options":{"A":"正確(本題答案)。FMEA是事前(預應式)分析。","B":"RCA是事後分析。","C":"PDCA是改善循環。","D":"個案報告非事前分析。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"112180-N2-40":{"quick":"病人安全通報系統主要目的=預防錯誤再發生。","detail":{"background":"建立病人安全通報系統的「主要目的」=C「預防錯誤再發生(學習改善、系統防錯)」。A資訊公開透明、B釐清責任歸屬、D方便介入調查皆非主要目的(通報核心是『非懲罰性、學習改善、預防再發生』)。故預防錯誤再發生(C)。異常事件:跡近錯失/幾近錯失(near miss,錯誤被攔截、未到病人)、無傷害事件(到病人但無傷害)、不良事件(已造成傷害)、警訊/哨兵事件(sentinel,非預期死亡/永久功能喪失/嬰兒失竊/自殺/手術部位錯誤)。通報系統=非懲罰性、學習改善、預防再發生(非究責)。RCA根本原因分析(事後、組小組、找根本原因);FMEA失效模式與效應分析(事前/預應式)。傷害行為事件=暴力毆打醫護。","options":{"A":"資訊公開非主要目的。","B":"釐清責任非通報目的(非懲罰性)。","C":"正確(本題答案)。主要目的=預防錯誤再發生。","D":"方便調查非主要目的。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"113030-N2-3":{"quick":"病人安全正確=感覺功能障礙者須注意用熱導致溫度傷害。","detail":{"background":"病人安全:D「感覺功能障礙者須注意『用熱』導致的溫度傷害(感覺差易燙傷)」正確。A「給藥錯誤屬物理性傷害」錯(給藥錯誤是『用藥/化學』相關);B「跌倒屬化學性傷害」錯(跌倒是『物理性』傷害);C「照護老年人或使用鎮定劑病人應給予約束」錯(約束應有醫囑與評估,非常規給予)。故D。","options":{"A":"給藥錯誤非物理性傷害。","B":"跌倒是物理性傷害,非化學。","C":"約束須醫囑評估,非常規。","D":"正確(本題答案)。感覺障礙者注意用熱溫度傷害。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"114100-N2-40":{"quick":"及時介入使意外未發生=跡近錯失(near miss)。","detail":{"background":"病人安全事件:跡近錯失(near miss)——「因及時介入行動,使原本可能導致的意外『未真正發生』」(C正確)。警訊事件(嚴重已發生)、意外事件(已發生)、醫療不良事件(已傷害)皆非「未真正發生」。故跡近錯失(C)。異常事件:跡近錯失/幾近錯失(near miss,錯誤被攔截、未到病人)、無傷害事件(到病人但無傷害)、不良事件(已造成傷害)、警訊/哨兵事件(sentinel,非預期死亡/永久功能喪失/嬰兒失竊/自殺/手術部位錯誤)。通報系統=非懲罰性、學習改善、預防再發生(非究責)。RCA根本原因分析(事後、組小組、找根本原因);FMEA失效模式與效應分析(事前/預應式)。傷害行為事件=暴力毆打醫護。","options":{"A":"警訊事件是嚴重已發生。","B":"意外事件是已發生。","C":"正確(本題答案)。及時介入未發生=跡近錯失。","D":"醫療不良事件是已傷害。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"114100-N2-45":{"quick":"病安通報系統發展概念「不包含」=釐清責任歸屬。","detail":{"background":"建構病人安全通報系統的發展概念:B分析事件原因防錯誤再發生、C鼓勵通報、D建構異常事件學習與資訊分享平台。選項A「釐清責任歸屬」不包含(本題答案)——通報系統是『非懲罰性、學習改善』,不以「釐清責任/究責」為目的(究責會抑制通報)。故A。異常事件:跡近錯失/幾近錯失(near miss,錯誤被攔截、未到病人)、無傷害事件(到病人但無傷害)、不良事件(已造成傷害)、警訊/哨兵事件(sentinel,非預期死亡/永久功能喪失/嬰兒失竊/自殺/手術部位錯誤)。通報系統=非懲罰性、學習改善、預防再發生(非究責)。RCA根本原因分析(事後、組小組、找根本原因);FMEA失效模式與效應分析(事前/預應式)。傷害行為事件=暴力毆打醫護。","options":{"A":"正確(本題答案)。釐清責任歸屬非通報系統概念。","B":"分析原因防再發生(是概念)。","C":"鼓勵通報(是概念)。","D":"建構學習分享平台(是概念)。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"114100-N2-49":{"quick":"根本原因分析(RCA)最適當=組織一個小組進行分析。","detail":{"background":"根本原因分析(RCA):C「組織一個『小組』進行分析(團隊跨領域分析事件根因)」最適當。A「屬預應式系統分析」錯(RCA是『事後/回溯式』,FMEA才是預應式);B「主要分析近端原因」錯(RCA分析『根本/遠端』原因);D「應用於風險評估三至四級事件」——RCA用於嚴重事件(風險高的事件)。故C。","options":{"A":"RCA是事後回溯式,非預應式。","B":"RCA分析根本原因,非近端。","C":"正確(本題答案)。RCA組織小組進行分析。","D":"RCA用於嚴重事件。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"114170-N2-45":{"quick":"病人毆打護理師通報TPR=傷害行為事件。","detail":{"background":"病人安全通報系統(TPR)事件分類:傷害行為事件(暴力行為、毆打醫護)。病人「住院期間大聲爭吵、出手毆打勸架護理師」=傷害行為事件(C正確)。治安事件、其他事件、公共意外事件皆非「對醫護的傷害行為」。故傷害行為事件(C)。異常事件:跡近錯失/幾近錯失(near miss,錯誤被攔截、未到病人)、無傷害事件(到病人但無傷害)、不良事件(已造成傷害)、警訊/哨兵事件(sentinel,非預期死亡/永久功能喪失/嬰兒失竊/自殺/手術部位錯誤)。通報系統=非懲罰性、學習改善、預防再發生(非究責)。RCA根本原因分析(事後、組小組、找根本原因);FMEA失效模式與效應分析(事前/預應式)。傷害行為事件=暴力毆打醫護。","options":{"A":"治安事件偏一般治安。","B":"其他事件非特定。","C":"正確(本題答案)。毆打護理師=傷害行為事件。","D":"公共意外事件非暴力行為。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"115030-N2-41":{"quick":"COVID確診病人持刀傷護理師=傷害行為事件。","detail":{"background":"病人安全異常事件分類:傷害行為事件(暴力傷害醫護)。COVID-19確診住院病人「持刀傷害護理師」=傷害行為事件(D正確)。醫療照護事件、公共意外事件、治安事件皆非「對醫護的暴力傷害」。故傷害行為事件(D)。異常事件:跡近錯失/幾近錯失(near miss,錯誤被攔截、未到病人)、無傷害事件(到病人但無傷害)、不良事件(已造成傷害)、警訊/哨兵事件(sentinel,非預期死亡/永久功能喪失/嬰兒失竊/自殺/手術部位錯誤)。通報系統=非懲罰性、學習改善、預防再發生(非究責)。RCA根本原因分析(事後、組小組、找根本原因);FMEA失效模式與效應分析(事前/預應式)。傷害行為事件=暴力毆打醫護。","options":{"A":"醫療照護事件是照護相關。","B":"公共意外事件非暴力。","C":"治安事件偏一般治安。","D":"正確(本題答案)。持刀傷護理師=傷害行為事件。"},"sources":["新文京《護理行政》病人安全","華杏《護理行政學》異常事件與通報"]}},"103100-N2-70":{"quick":"醫院環境危害因素「錯誤」=金屬因素。","detail":{"background":"醫院環境危害因素:A化學因素(消毒劑、化療藥)、B物理因素(輻射、噪音、高溫)、D生物因素(病原微生物)。選項C「金屬因素」不是標準的醫院環境危害分類(本題答案)——環境危害分物理、化學、生物、人因/心理,無「金屬因素」一類。故C。火災RACE:R(Rescue救援移病人)、A(Alarm啟動警報通報消防)、C(Confine關門侷限火煙)、E(Extinguish滅火/Evacuate疏散)。滅火器:A類普通火災用水/乾粉、B類油類用泡沫、C類電氣用二氧化碳、D類金屬用乾粉。地震疏散先能行動者後無法行動者。輻射防護三原則:時間短、距離遠(強度與距離平方成反比)、屏蔽,戴感光片追蹤劑量;α穿透弱、γ最強。手術室20~27°C、濕度50~70%。環境危害:物理(輻射噪音高溫)、化學、生物。","options":{"A":"化學因素是危害分類。","B":"物理因素是危害分類。","C":"正確(本題答案)。金屬因素非標準危害分類。","D":"生物因素是危害分類。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"106110-N2-4":{"quick":"火災濃煙密布第一時間=進行病人疏散。","detail":{"background":"病房確定發生火災且濃煙密布時,第一時間應「進行病人疏散(B)」——RACE原則中,確認火災且危急時優先「救援/疏散病人(Rescue)」確保生命安全。A關氧氣電器(Confine之一,但救人優先)、C打開門窗(會助燃、引入更多氧氣)、D拿滅火器(火大濃煙時應先撤離)皆非第一優先。故進行病人疏散(B)。","options":{"A":"關氧氣電器非第一優先(救人優先)。","B":"正確(本題答案)。濃煙密布優先疏散病人。","C":"打開門窗會助燃。","D":"火大濃煙應先撤離,非滅火。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"108110-N2-18":{"quick":"地震處理「錯誤」=疏散先抬無法行動者其次能行動者。","detail":{"background":"醫院地震預防處理:A衛教遇地震不靠近窗戶、B床頭燈上方勿放花瓶罐子、D氣體鋼瓶鎖鍊固定化學藥品防震分類存放。選項C「疏散病人,『先』將無法行動者抬離,其次協助能行動者」錯誤(本題答案)——疏散原則應「先疏散『能自行行動者』(快速離開)、後協助『無法行動者』」,C順序顛倒。故C。","options":{"A":"遇地震不靠近窗戶(對)。","B":"床頭勿放花瓶罐子(對)。","C":"錯誤(本題答案)。疏散應先能行動者,後無法行動者。","D":"鋼瓶固定藥品防震分類(對)。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"109030-N2-3":{"quick":"病人安全措施=火災演練(1)+乾洗手(3)+條碼(4)?本題答案B「134」。","detail":{"background":"本題官方答案「134」。滿足病人安全需求的措施:1定期舉辦火災防災演練、3公共空間放置乾洗手液(手部衛生)、4利用條碼技術辨識(防給藥錯誤)。選項2「『嚴格限制』訪客」非病人安全核心措施(過度限制不必要)。故134。火災RACE:R(Rescue救援移病人)、A(Alarm啟動警報通報消防)、C(Confine關門侷限火煙)、E(Extinguish滅火/Evacuate疏散)。滅火器:A類普通火災用水/乾粉、B類油類用泡沫、C類電氣用二氧化碳、D類金屬用乾粉。地震疏散先能行動者後無法行動者。輻射防護三原則:時間短、距離遠(強度與距離平方成反比)、屏蔽,戴感光片追蹤劑量;α穿透弱、γ最強。手術室20~27°C、濕度50~70%。環境危害:物理(輻射噪音高溫)、化學、生物。","options":{"A":"123含2(嚴格限制訪客)不符。","B":"正確(本題答案,134)。火災演練、乾洗手、條碼。","C":"234含2不符。","D":"245不符。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"110030-N2-9":{"quick":"火災RACE原則A=啟動警報系統通知消防。","detail":{"background":"RACE火災應變原則:R(Rescue,救援/移開病人)、A(Alarm,啟動警報系統、通知消防)、C(Confine,侷限火煙、關門)、E(Extinguish/Evacuate,滅火/疏散)。「A」=啟動警報系統通知消防單位(B正確)。故A=Alarm(B)。","options":{"A":"關電器是Confine。","B":"正確(本題答案)。A=啟動警報通知消防(Alarm)。","C":"移開病人是Rescue(R)。","D":"使用滅火器是Extinguish(E)。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"110110-N2-14":{"quick":"滅火器「錯誤」=燃紙火災適用二氧化碳滅火器。","detail":{"background":"火災種類與滅火器:A配電盤(電氣火災)用二氧化碳(對)、B實驗室鎂(金屬火災)用乾粉(對)、C油漆(油類)用泡沫(對)。選項D「燃紙(普通固體A類火災)用二氧化碳滅火器」錯誤(本題答案)——燃紙(A類普通火災)應用「水或乾粉/泡沫」,二氧化碳(主要用於電氣/油類)對A類固體火災效果差(易復燃)。故D。","options":{"A":"電氣火災用二氧化碳(對)。","B":"金屬火災用乾粉(對)。","C":"油類火災用泡沫(對)。","D":"錯誤(本題答案)。燃紙(A類)不宜用二氧化碳。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"110110-N2-15":{"quick":"輻射防護正確=操作人員須隨時戴感光片定期追蹤輻射量。","detail":{"background":"輻射防護:C「操作人員須隨時戴上感光片(劑量佩章),並定期追蹤所接受輻射量」正確。A「短時間多次照護」錯(輻射防護三原則是『時間短、距離遠、屏蔽』,應減少暴露時間);B「強度與距離平方成正比」錯(成『反比』,距離越遠輻射越弱);D「α射線穿透力最強」錯(α穿透力『最弱』,γ最強)。故C。","options":{"A":"應減少暴露時間,非多次。","B":"強度與距離平方成反比,非正比。","C":"正確(本題答案)。戴感光片定期追蹤輻射量。","D":"α穿透力最弱,γ最強。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"110110-N2-17":{"quick":"手術室室溫20~27°C、相對濕度50~70%。","detail":{"background":"手術室環境:最適宜室溫約「20~27°C(約20~24°C)」、相對濕度「50~70%(約50~60%)」(D正確)——適當溫濕度可抑菌、防靜電、維持舒適。15~20°C過低、濕度30~50%過乾。故20~27°C、50~70%(D)。火災RACE:R(Rescue救援移病人)、A(Alarm啟動警報通報消防)、C(Confine關門侷限火煙)、E(Extinguish滅火/Evacuate疏散)。滅火器:A類普通火災用水/乾粉、B類油類用泡沫、C類電氣用二氧化碳、D類金屬用乾粉。地震疏散先能行動者後無法行動者。輻射防護三原則:時間短、距離遠(強度與距離平方成反比)、屏蔽,戴感光片追蹤劑量;α穿透弱、γ最強。手術室20~27°C、濕度50~70%。環境危害:物理(輻射噪音高溫)、化學、生物。","options":{"A":"15~20°C過低、30~50%過乾。","B":"15~20°C過低。","C":"30~50%濕度過低。","D":"正確(本題答案)。20~27°C、50~70%。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"111110-N2-7":{"quick":"RACE原則「錯誤」=E:立即撤離著火房間再進行初期滅火。","detail":{"background":"RACE:R(Rescue移病人)、A(Alarm警報)、C(Confine關門侷限火煙)、E(Extinguish滅火/Evacuate疏散)。選項D「E:立即撤離著火房間『再進行初期滅火』」錯誤(本題答案)——E是「使用合適滅火器進行『初期滅火』(火勢小時)或疏散」;「撤離後再回去滅火」順序矛盾不安全。本題以D敘述為錯誤。故D。","options":{"A":"R:移病人出火源區(對)。","B":"A:啟動警報通報(對)。","C":"C:關門侷限火煙(對)。","D":"錯誤(本題答案)。E敘述矛盾,初期滅火應在火勢小時。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"113100-N2-4":{"quick":"RACE「錯誤」=關閉氧氣電器並「打開門窗」。","detail":{"background":"RACE火災應變:A撤離疏散病人(R,對)、B通報啟動警報(A,對)、D油類電氣火災用乾粉滅火(E,對)。選項C「關閉氧氣與電器設備並『打開門窗』」錯誤(本題答案)——應「『關閉』門窗(Confine侷限火煙、防止助燃)」,打開門窗會引入氧氣助燃、使火煙擴散。故C。","options":{"A":"撤離疏散病人(對)。","B":"通報啟動警報(對)。","C":"錯誤(本題答案)。應關閉門窗侷限火煙,非打開。","D":"油類電氣火災用乾粉(對)。"},"sources":["新文京《護理行政》環境安全","華杏《護理行政學》災害防護與消防"]}},"111030-N2-64":{"quick":"針扎屬生物性危害。","detail":{"background":"職業危害分類:物理性(輻射、噪音、高溫)、化學性(消毒劑、化療藥)、生物性(病原微生物、針扎感染血液病原)、心理性(壓力)、人因性(姿勢)。「針扎(可能感染血液傳染病原)」=生物性危害(B正確)。故生物性危害(B)。職業危害分類:物理性(輻射、噪音、高溫、採光、振動)、化學性(消毒劑、化療藥)、生物性(病原微生物、針扎血液病原)、心理性(壓力)、人因性(姿勢、搬運)。針扎=生物性危害。醫院環境安全管理:室內空氣品質、廢棄物處理、噪音管理、毒化物管理。","options":{"A":"物理性是輻射噪音高溫。","B":"正確(本題答案)。針扎(感染病原)=生物性危害。","C":"化學性是消毒劑化療藥。","D":"心理性是壓力。"},"sources":["職業安全衛生法;勞工健康保護規則","新文京《護理行政》職業危害"]}},"112110-N2-63":{"quick":"醫院環境安全管理要項=室外空氣品質(1)+廢棄物(2)+噪音(3)+毒化物(4)→「234」?本題答案D。","detail":{"background":"本題官方答案D(234)。醫院環境安全管理系統建構要項:2廢棄物處理、3噪音管理、4毒化物管理(及室內空氣品質)。選項1「『室外』空氣品質」非醫院環境安全管理的核心要項(醫院管『室內』空氣品質)。故234。職業危害分類:物理性(輻射、噪音、高溫、採光、振動)、化學性(消毒劑、化療藥)、生物性(病原微生物、針扎血液病原)、心理性(壓力)、人因性(姿勢、搬運)。針扎=生物性危害。醫院環境安全管理:室內空氣品質、廢棄物處理、噪音管理、毒化物管理。","options":{"A":"123含1(室外空氣)不符。","B":"124不符。","C":"134不符。","D":"正確(本題答案,234)。廢棄物、噪音、毒化物管理。"},"sources":["職業安全衛生法;勞工健康保護規則","新文京《護理行政》職業危害"]}},"113100-N2-40":{"quick":"輻射噪音高溫採光不當=物理性危害。","detail":{"background":"職業危害分類:「醫院輻射、噪音、高溫、空調溫濕度、採光照明不當」=物理性危害(A正確,物理因素:能量/環境物理條件)。生物性(病原)、化學性(化學物)、心理性(壓力)皆非「輻射噪音高溫採光」。故物理性危害(A)。職業危害分類:物理性(輻射、噪音、高溫、採光、振動)、化學性(消毒劑、化療藥)、生物性(病原微生物、針扎血液病原)、心理性(壓力)、人因性(姿勢、搬運)。針扎=生物性危害。醫院環境安全管理:室內空氣品質、廢棄物處理、噪音管理、毒化物管理。","options":{"A":"正確(本題答案)。輻射噪音高溫採光=物理性危害。","B":"生物性是病原微生物。","C":"化學性是化學物質。","D":"心理性是壓力。"},"sources":["職業安全衛生法;勞工健康保護規則","新文京《護理行政》職業危害"]}},"101110-N2-78":{"quick":"護理資訊應用於臨床照護「錯誤」=可減少接觸病患的時間。","detail":{"background":"護理資訊應用於「臨床照護」的目的:A縮短資料統計時間、C迅速查詢病患檢查結果、D降低通報時間。選項B「可減少接觸病患的時間」錯誤(本題答案)——資訊化是為「提升效率、釋出更多時間『直接照護病患』」,目的非「減少接觸病患」。故B。病歷保存(醫療法):至少7年;未成年者至成年(18歲)後7年(=25歲);電子病歷同須保存7年。資訊安全:以自己帳號親自操作、讀取後登出、不外帶下載病人資料、不借用他人帳號、不外傳病人圖片、簽章後下班。結構化溝通ISBAR:Introduction/Situation情境/Background背景/Assessment評估/Recommendation建議。護理資訊系統不能取代臨床評估探視。","options":{"A":"縮短資料統計時間(對)。","B":"錯誤(本題答案)。資訊化非為減少接觸病患。","C":"迅速查詢檢查結果(對)。","D":"降低通報時間(對)。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"105030-N2-17":{"quick":"病歷保存正確=依醫療法病歷需由院方保存至少7年。","detail":{"background":"病歷保存(醫療法):B「依我國醫療法規定,病歷需由院方保存『至少7年』(未成年者至成年後7年)」正確。A「護理師因研究可自行調閱病歷」錯(須經審查/授權);C「請病人自行攜帶病歷至檢查室」錯(病歷由院方保管、不交病人攜帶);D「向訪客透露病歷紀錄內容」錯(違反保密)。故B。","options":{"A":"研究調閱病歷須經審查,非自行。","B":"正確(本題答案)。病歷院方保存至少7年。","C":"病歷不交病人攜帶。","D":"不可向訪客透露病歷(保密)。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"105030-N2-79":{"quick":"使用醫療資訊系統「不適宜」=忙碌時請他人讀取後代為記錄。","detail":{"background":"使用醫療資訊系統:A讀取後要登出、C用自己身分進入系統、D不隨意列印病人資料(皆適宜、保護資安)。選項B「忙碌時請他人讀取後代為記錄」不適宜(本題答案)——應「以自己帳號親自操作」,請他人用自己帳號代為操作會「違反資安、責任不清」。故B。病歷保存(醫療法):至少7年;未成年者至成年(18歲)後7年(=25歲);電子病歷同須保存7年。資訊安全:以自己帳號親自操作、讀取後登出、不外帶下載病人資料、不借用他人帳號、不外傳病人圖片、簽章後下班。結構化溝通ISBAR:Introduction/Situation情境/Background背景/Assessment評估/Recommendation建議。護理資訊系統不能取代臨床評估探視。","options":{"A":"讀取後登出(適宜)。","B":"不適宜(本題答案)。不可請他人代為讀取記錄(資安)。","C":"用自己身分進入(適宜)。","D":"不隨意列印病人資料(適宜)。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"107110-N2-12":{"quick":"病歷保存「錯誤」=人體實驗之病歷應保存七年。","detail":{"background":"病歷保存:A住院期間病歷放護理站不置病人單位(對)、B病歷未經許可不可洩漏(對)、C病歷屬醫院財產、依醫療法保存7年(對)。選項D「『人體實驗』之病歷應保存七年」錯誤(本題答案)——人體試驗(研究)相關紀錄依規定須保存更久(如人體研究法規定至少3年、但試驗相關文件常須保存更長,且非一般7年),本題以D敘述為錯誤。故D(人體實驗病歷保存年限不同於一般7年)。","options":{"A":"住院病歷放護理站(對)。","B":"病歷不可洩漏(對)。","C":"病歷保存7年(對)。","D":"錯誤(本題答案)。人體實驗病歷保存規定不同於一般7年。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"108110-N2-64":{"quick":"ISBAR「錯誤」=S是Share與團隊分享。","detail":{"background":"結構化溝通模式ISBAR:I(Introduction介紹)、S(Situation情境/現況)、B(Background背景)、A(Assessment評估)、R(Recommendation建議)。選項A「S是『Share』,與團隊分享」錯誤(本題答案)——S是「Situation(病人現況/發生什麼事)」,非Share。故A。","options":{"A":"錯誤(本題答案)。S是Situation(情境),非Share。","B":"B是Background背景(對)。","C":"A是Assessment評估(對)。","D":"R是Recommendation建議(對)。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"108110-N2-71":{"quick":"資訊系統上線教育訓練不足=「事」的影響因素。","detail":{"background":"影響護理資訊系統發展因素(人/事/物/時):「資訊系統上線時『教育訓練不足』」屬「『事』的影響因素(B)」——教育訓練是『事務/作業面』的因素。人(使用者態度)、物(硬體設備)、時間皆非「教育訓練」。故事的影響因素(B)。病歷保存(醫療法):至少7年;未成年者至成年(18歲)後7年(=25歲);電子病歷同須保存7年。資訊安全:以自己帳號親自操作、讀取後登出、不外帶下載病人資料、不借用他人帳號、不外傳病人圖片、簽章後下班。結構化溝通ISBAR:Introduction/Situation情境/Background背景/Assessment評估/Recommendation建議。護理資訊系統不能取代臨床評估探視。","options":{"A":"人的因素是使用者態度。","B":"正確(本題答案)。教育訓練不足=事的影響因素。","C":"物的因素是硬體設備。","D":"時間因素非此。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"109030-N2-75":{"quick":"護理資訊系統「錯誤」=能處理照護訊息不須擔心資料保密性。","detail":{"background":"護理資訊系統:A結合護理/電腦/資訊科學的知識(對)、B包含資訊結構過程技術(對)、C建構過程與護理過程一樣(對)。選項D「能處理護理照護訊息,『不須擔心』資料的保密性」錯誤(本題答案)——護理資訊系統含大量病人隱私資料,「必須重視資料保密與資安」,非不須擔心。故D。","options":{"A":"結合護理電腦資訊科學(對)。","B":"包含資訊結構過程技術(對)。","C":"建構過程與護理過程一樣(對)。","D":"錯誤(本題答案)。須重視資料保密性,非不須擔心。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"109110-N2-14":{"quick":"病歷注意正確=電子病歷須至少保存七年。","detail":{"background":"病歷注意事項:C「電子病歷須至少保存『七年』(同紙本病歷)」正確。A「病人可自行攜帶病歷至檢查室」錯(病歷由院方保管);B「護理師可依病歷向病人解釋病情」錯(病情解釋是醫師職責);D「醫療人員可依研究需求自行調閱病歷」錯(須經審查授權)。故C。","options":{"A":"病歷不交病人自行攜帶。","B":"病情解釋是醫師職責。","C":"正確(本題答案)。電子病歷至少保存七年。","D":"研究調閱須經審查,非自行。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"110030-N2-66":{"quick":"「不」是運用資訊科技促進病人安全=張貼標示禁止查詢病人隱私。","detail":{"background":"運用『資訊科技』促進病人安全:A藥物資訊列印於藥袋標籤、C條碼協助藥物辨識、D線上查詢藥物交互作用(皆運用資訊科技)。選項B「張貼標示禁止查詢病人隱私」不是運用資訊科技(本題答案)——「張貼標示」是行政公告/管理措施,非『資訊科技』應用。故B。","options":{"A":"藥袋標籤資訊是資訊科技應用。","B":"正確(本題答案)。張貼標示非資訊科技應用。","C":"條碼辨識是資訊科技。","D":"線上查詢交互作用是資訊科技。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"110110-N2-75":{"quick":"電腦資訊系統護理應用「錯誤」=自動記錄病情變化無須探視評估病患。","detail":{"background":"電腦資訊系統護理應用效益:A監控床位數及住院天數、C評估護理措施改善資源應用、D電子病歷提升紀錄完整持續性。選項B「可自動化記錄病患病情變化,『無須探視或評估』病患」錯誤(本題答案)——資訊系統輔助記錄,但「護理師仍須親自探視、評估病患」,系統不能取代臨床評估。故B。","options":{"A":"監控床位住院天數(對)。","B":"錯誤(本題答案)。仍須親自探視評估,系統不能取代。","C":"評估護理措施改善資源(對)。","D":"電子病歷提升完整持續性(對)。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"112030-N2-9":{"quick":"14歲氣喘病人病歷保存至年滿25歲。本題答案C。","detail":{"background":"本題官方答案C(年滿25歲)。依醫療法,病歷至少保存7年;但「未成年者」之病歷應保存至其『成年(滿20歲)後7年』=滿27歲?——本題官方答案為「年滿25歲」,係依「成年(18歲)後7年=25歲」計(2023年起民法成年下修為18歲,18+7=25)。故年滿25歲(C)。核心:未成年病歷保存至成年(18歲)後7年。","options":{"A":"年滿20歲不符。","B":"年滿21歲不符。","C":"正確(本題答案)。成年18歲後7年=25歲。","D":"年滿27歲(舊制20歲成年+7)。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"113100-N2-46":{"quick":"資訊安全正確=確認照護記錄簽章後再下班。","detail":{"background":"資訊安全:D「確認照護記錄『簽章』後再下班(完成記錄與責任歸屬)」正確。A「下載資料回家整理個案報告」錯(病人資料不可外帶、違反資安);B「幫同事打下班卡」錯(代打卡違規);C「借用醫師帳號瀏覽病況」錯(借用他人帳號違反資安)。故D。病歷保存(醫療法):至少7年;未成年者至成年(18歲)後7年(=25歲);電子病歷同須保存7年。資訊安全:以自己帳號親自操作、讀取後登出、不外帶下載病人資料、不借用他人帳號、不外傳病人圖片、簽章後下班。結構化溝通ISBAR:Introduction/Situation情境/Background背景/Assessment評估/Recommendation建議。護理資訊系統不能取代臨床評估探視。","options":{"A":"病人資料不可外帶。","B":"代打卡違規。","C":"借用他人帳號違反資安。","D":"正確(本題答案)。確認照護記錄簽章後再下班。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"114030-N2-47":{"quick":"資訊系統提升護理效能=減少護理紀錄重複抄寫(2)+增進護理管理效率(3)→「23」。","detail":{"background":"資訊系統提升護理效能:2減少護理紀錄重複抄寫時間、3增進護理管理效率(及4其他正確項)。選項1「使用條碼辨識病人,可『減少』給藥三讀五對流程」錯——條碼是『輔助/強化』辨識安全,『不能取代/減少』三讀五對(三讀五對仍須執行)。故為「23」。","options":{"A":"12含1(減少三讀五對)錯。","B":"正確(本題答案,23)。減少重複抄寫、增進管理效率。","C":"34不符。","D":"14含1錯。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"115030-N2-50":{"quick":"護理資訊系統目的「錯誤」=減少直接護理時間。","detail":{"background":"發展護理資訊系統目的:A改善護理資源運用、C簡化護理紀錄程序、D使數據監測自動化。選項B「減少直接護理時間」錯誤(本題答案)——資訊系統是「減少『間接』事務時間(如書寫)、釋出更多時間做『直接』護理」,目的非減少直接護理時間。故B。病歷保存(醫療法):至少7年;未成年者至成年(18歲)後7年(=25歲);電子病歷同須保存7年。資訊安全:以自己帳號親自操作、讀取後登出、不外帶下載病人資料、不借用他人帳號、不外傳病人圖片、簽章後下班。結構化溝通ISBAR:Introduction/Situation情境/Background背景/Assessment評估/Recommendation建議。護理資訊系統不能取代臨床評估探視。","options":{"A":"改善護理資源運用(對)。","B":"錯誤(本題答案)。應增加直接護理時間,非減少。","C":"簡化護理紀錄程序(對)。","D":"數據監測自動化(對)。"},"sources":["醫療法;個人資料保護法","新文京《護理行政》護理資訊與病歷"]}},"102110-N2-78":{"quick":"資深護理師危機處理、營造向心力、達全人照護=領導者角色。","detail":{"background":"資深護理師「表現優異、具危機處理能力、營造同仁向心力、達全人照護目標與精神」=扮演領導者(leader)角色(D正確,影響並帶領團隊達成目標、營造向心力)。策劃者、追隨者、工作者皆非「帶領營造向心力」。故領導者(D)。危機類型:成長危機(發展階段)、情境危機(突發疾病意外)。危機處理步驟:先評估壓力事件感受與影響→找過去調適方法→訂減壓目標→評值。危機管理階段:偵測→防範→控制→學習→回復。醫學中心宜常態固定編組分工;災後持續品質改善用PDCA、找根因用RCA。主管須熟悉法令與危機報告機制。","options":{"A":"策劃者偏規劃。","B":"追隨者是被領導。","C":"工作者是執行者。","D":"正確(本題答案)。危機處理、營造向心力=領導者角色。"},"sources":["新文京《護理行政》危機管理","華杏《護理行政學》危機處理"]}},"103030-N2-73":{"quick":"中風無法滿足日常需求=情境危機。","detail":{"background":"危機類型:成長危機(發展階段的危機,如青春期)、情境危機(situational,突發外在事件造成,如疾病、意外、失業)。「病人因中風造成無法滿足日常生活基本需求」=情境危機(B正確,突發疾病造成的危機)。社會危機、組織危機皆非個人疾病情境。故情境危機(B)。","options":{"A":"成長危機是發展階段危機。","B":"正確(本題答案)。中風致無法自理=情境危機。","C":"社會危機是社會層面。","D":"組織危機是組織層面。"},"sources":["新文京《護理行政》危機管理","華杏《護理行政學》危機處理"]}},"104030-N2-79":{"quick":"氣爆後建立危機機制並事後分析=根因分析?本題答案B。","detail":{"background":"本題官方答案B(根因分析,RCA)。醫院遇大量氣爆傷患災難後,「事後分析、建立危機管理機制、以利持續(改善)」=根本原因分析(RCA,事後回溯找根本原因防再發生)。循環(PDCA)、危害分析(事前)、異常事件通報分析皆非「事後找根本原因」首選。故根因分析(B)。","options":{"A":"循環(PDCA)是改善循環。","B":"正確(本題答案)。事後分析找根因=根因分析(RCA)。","C":"危害分析是事前。","D":"異常事件通報分析非此。"},"sources":["新文京《護理行政》危機管理","華杏《護理行政學》危機處理"]}},"104100-N2-63":{"quick":"排班應考量原則=護理品質及護理人員之負荷。","detail":{"background":"病房排班應考量的原則:B「應考量『護理品質』及『護理人員之負荷』(確保照護品質與避免過勞)」正確。A「視排班為獎懲工具」錯(排班不應作獎懲);C「具機動性可任意更換」錯(排班應穩定、不可任意更換);D「免於事先公開」錯(排班應事先公開讓人員知悉)。故B。","options":{"A":"排班不應作獎懲工具。","B":"正確(本題答案)。應考量護理品質及人員負荷。","C":"排班不可任意更換。","D":"排班應事先公開。"},"sources":["新文京《護理行政》危機管理","華杏《護理行政學》危機處理"]}},"106030-N2-70":{"quick":"醫學中心危機管理=常態固定編組分工計畫。","detail":{"background":"危機管理策略,醫學中心(大型機構)宜採「常態固定編組分工計畫(C)」——平時即建立固定的危機應變組織編組與分工,危機時可立即啟動。全員參與(混亂)、任務編組(臨時)、彈性編組皆不如「常態固定編組」能快速有效應變。故常態固定編組(C)。危機類型:成長危機(發展階段)、情境危機(突發疾病意外)。危機處理步驟:先評估壓力事件感受與影響→找過去調適方法→訂減壓目標→評值。危機管理階段:偵測→防範→控制→學習→回復。醫學中心宜常態固定編組分工;災後持續品質改善用PDCA、找根因用RCA。主管須熟悉法令與危機報告機制。","options":{"A":"全員參與易混亂。","B":"任務編組是臨時編組。","C":"正確(本題答案)。醫學中心宜常態固定編組分工。","D":"彈性編組不如固定編組快速。"},"sources":["新文京《護理行政》危機管理","華杏《護理行政學》危機處理"]}},"106111-N2-73":{"quick":"危機處理步驟應先=評估對壓力事件的感受及對生活的影響。","detail":{"background":"危機處理步驟:首先「A評估對壓力事件的感受、對生活上的影響(評估個案的危機狀態與衝擊)」——先評估了解現況,才能後續找調適方法、訂目標、評值。B找過去調適方法、C訂減壓方法目標、D評值改善計畫皆是評估後的步驟。故先評估感受與影響(A)。危機類型:成長危機(發展階段)、情境危機(突發疾病意外)。危機處理步驟:先評估壓力事件感受與影響→找過去調適方法→訂減壓目標→評值。危機管理階段:偵測→防範→控制→學習→回復。醫學中心宜常態固定編組分工;災後持續品質改善用PDCA、找根因用RCA。主管須熟悉法令與危機報告機制。","options":{"A":"正確(本題答案)。先評估壓力事件感受及影響。","B":"找過去調適方法是後續。","C":"訂減壓目標是後續。","D":"評值改善是最後。"},"sources":["新文京《護理行政》危機管理","華杏《護理行政學》危機處理"]}},"108020-N2-75":{"quick":"危機處理正確=偵測防範控制學習回復(1)+建立指揮中心(4)?本題答案D「135」。","detail":{"background":"本題官方答案「135」。危機發生時處理:1偵測>防範>控制>學習>回復(危機管理階段)、3評估風險危害程度、5(危機溝通等)。選項2「全體同仁共同參與危機討論」非危機當下的有效做法(危機應由核心指揮);4「建立指揮中心」(此項其實對,但本題正確組合為135)。故135。","options":{"A":"123含2(全員參與)不符。","B":"234不符。","C":"345不符。","D":"正確(本題答案,135)。危機階段、評估風險、危機溝通。"},"sources":["新文京《護理行政》危機管理","華杏《護理行政學》危機處理"]}},"110030-N2-79":{"quick":"大量粉塵爆後持續品質改善工具=PDCA循環。","detail":{"background":"醫院遇大量粉塵爆傷患災難後,推動「持續品質改善機制」的事後分析工具=B「PDCA循環(計畫-執行-查核-行動,持續改善)」最適合。危害分析(事前)、失效模式分析FMEA(事前)、SWOT分析(策略)皆非「持續品質改善循環」。故PDCA循環(B)。","options":{"A":"危害分析是事前。","B":"正確(本題答案)。持續品質改善=PDCA循環。","C":"FMEA是事前分析。","D":"SWOT是策略分析。"},"sources":["新文京《護理行政》危機管理","華杏《護理行政學》危機處理"]}},"112180-N2-50":{"quick":"護理主管面對危機職責=熟悉相關法令規則及醫院危機事件報告機制。","detail":{"background":"護理主管面對危機的職責:A「熟悉當今護理業務相關法令、規則及醫院危機事件報告機制」正確。B「督導完成紀錄不須要求書寫品質」錯(品質也要要求);C「非上班時間完全交由值班人員」錯(主管仍須掌握、可被聯繫);D「學校已培育不須特別安排危機訓練」錯(機構仍須持續危機訓練)。故A。","options":{"A":"正確(本題答案)。熟悉法令規則及危機報告機制。","B":"紀錄品質也要要求。","C":"非上班時間主管仍須掌握。","D":"機構仍須安排危機訓練。"},"sources":["新文京《護理行政》危機管理","華杏《護理行政學》危機處理"]}},"103100-N2-68":{"quick":"DRG特性=住院給付是固定的。","detail":{"background":"診斷關係群(DRG,Diagnosis Related Groups):依「診斷分類」給付,同一DRG「住院給付是固定的(包裹式定額給付)」(A正確)——不論實際花費多少,同診斷群給付固定,激勵醫院控制成本。以基本診療/特定檢查/病人量為支付基礎皆非DRG(那是論量計酬)。故住院給付固定(A)。","options":{"A":"正確(本題答案)。DRG住院給付固定(定額)。","B":"非以基本診療為基礎(那是論量)。","C":"非以特定檢查為基礎。","D":"非以病人量為基礎(論量計酬)。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"104030-N2-55":{"quick":"選擇抗生素種類的指標=Urine Culture(尿液培養)。","detail":{"background":"本題為臨床檢驗題(歸品質站係分類所致)。選擇抗生素種類的指標=A「Urine Culture(尿液培養,含菌種鑑定與抗生素敏感性試驗)」——培養可鑑定病原菌並做藥敏試驗,指引抗生素選擇。CBC(血球計數)、CRP(發炎指標)、Sputum Routine(痰液常規)皆非「指引抗生素種類選擇」(培養+藥敏才是)。故Urine Culture(A)。","options":{"A":"正確(本題答案)。培養+藥敏指引抗生素選擇。","B":"CBC是血球計數。","C":"CRP是發炎指標。","D":"痰液常規非藥敏。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"104100-N2-59":{"quick":"衡量生產力指標「不包括」=顧客滿意度。","detail":{"background":"醫療機構衡量「生產力」的指標:B病人看診量、C疾病給付點值、D醫材使用量(產出/投入相關)。選項A「顧客滿意度」不包括(本題答案)——顧客滿意度是「品質/顧客面」指標,非「生產力(產出效率)」指標。故A。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"正確(本題答案)。顧客滿意度是品質指標,非生產力。","B":"病人看診量是生產力指標。","C":"疾病給付點值是生產力指標。","D":"醫材使用量是生產力指標。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"104100-N2-64":{"quick":"基層護理進階訓練重點「錯誤」=N3敘述?本題答案D。","detail":{"background":"本題官方答案D。基層護理人員專業能力訓練重點:N1(常見技術、護理問題、紀錄、問題分析處理)、N2(重症照護、醫療糾紛案例、案例分析審查)、N3(可擔任N1/N2教師、主持團體衛教、獨立...)。選項D「(N4):教與學、危機處理、通過個案報告審查、執行護理品管活動」——此敘述對應有誤(教與學是N3、品管是N3/N4),本題以D為錯誤敘述。作答以官方D為準。","options":{"A":"N1訓練重點(對)。","B":"N2訓練重點(對)。","C":"N3訓練重點(對)。","D":"錯誤(本題答案)。N4敘述對應有誤。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"105030-N2-60":{"quick":"每類病人數乘以嚴重度指數之和=工作量。","detail":{"background":"護理人力指標:「將每一類病人人數乘以嚴重度指數所得之和」=工作量(workload)指標(B正確)——綜合病人數與嚴重度,反映護理工作的總負荷量。嚴重度(單一指數)、病人數(僅人數)、依賴度皆非「人數×嚴重度之和」。故工作量(B)。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"嚴重度是單一指數。","B":"正確(本題答案)。人數×嚴重度之和=工作量。","C":"病人數僅人數。","D":"依賴度非此計算。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"105090-N2-67":{"quick":"因素分類法依「護理活動項目」分類。","detail":{"background":"病人分類法:因素分類法(factor)依「『護理活動項目』計分加總分類病人」(A正確)。病人診斷、疾病嚴重度、疾病階段皆非「因素分類法」的分類依據(因素法是依個別護理活動項目計分)。故護理活動項目(A)。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"正確(本題答案)。因素分類法依護理活動項目。","B":"病人診斷非因素法依據。","C":"疾病嚴重度非因素法核心。","D":"疾病階段非因素法依據。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"107030-N2-74":{"quick":"DRGs給付制度=預先設定好且固定的健保給付方式。","detail":{"background":"診斷關聯群(DRGs)給付:A「一種預先設定好且固定的健保給付方式(包裹式定額)」正確。B「能縮短長照與居家服務使用量」錯(DRG可能『增加』出院後照護需求);C「不影響住院天數」錯(DRG激勵『縮短』住院天數);D「能增加作業服務成本」錯(DRG激勵『降低』成本)。故A。","options":{"A":"正確(本題答案)。DRG是預設固定的健保給付。","B":"可能增加出院後照護需求。","C":"DRG激勵縮短住院天數。","D":"DRG激勵降低成本。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"107110-N2-72":{"quick":"訓練專業知識技能提供整合連續照護=教育委員會。","detail":{"background":"為「訓練護理師專業知識技能、提供整合性與連續性照護」設立的委員會=教育委員會(C正確,負責教育訓練)。品管委員會(品質)、人事委員會(人事)、研究委員會(研究)皆非「教育訓練」。故教育委員會(C)。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"品管委員會是品質。","B":"人事委員會是人事。","C":"正確(本題答案)。訓練專業知能=教育委員會。","D":"研究委員會是研究。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"108110-N2-57":{"quick":"對護理專業形象不良影響=將病人臉部傷口相片放個人臉書。","detail":{"background":"對護理專業形象「產生不良影響」者:C「將所服務病人的臉部傷口相片放置於個人臉書(洩漏病人隱私、違反保密與專業倫理)」(C正確)。A非執勤時提供緊急救助、B參與國際護理活動、D參與病人安全文化建立皆是「正面」形象。故C。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"緊急救助是正面形象。","B":"參與國際活動是正面形象。","C":"正確(本題答案)。放病人傷口相片於臉書損形象(洩隱私)。","D":"參與病安活動是正面形象。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"109030-N2-78":{"quick":"提升護理生產力「錯誤」=減少收治重症病人。","detail":{"background":"提升護理生產力策略:A創造組織學習文化、B發展資訊系統改善作業環境、C運用績效考核激勵。選項D「減少收治重症病人」錯誤(本題答案)——不能為提升生產力而「拒收重症病人」(違背照護責任),應以提升效率達成。故D。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"創造學習文化(對)。","B":"發展資訊系統(對)。","C":"績效考核激勵(對)。","D":"錯誤(本題答案)。不能減少收治重症病人。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"109110-N2-78":{"quick":"「不」是衡量生產力指標=病人服務滿意度。","detail":{"background":"醫療機構衡量「生產力」的指標:A健保給付點值、B門診就診人次、D醫材使用量。選項C「病人服務滿意度」不是生產力指標(本題答案)——滿意度是「品質/顧客面」指標,非生產力(產出效率)指標。故C。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"健保給付點值是生產力指標。","B":"門診就診人次是生產力指標。","C":"正確(本題答案)。滿意度是品質指標,非生產力。","D":"醫材使用量是生產力指標。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"111030-N2-43":{"quick":"評估慢性營養不良最佳指標=血清白蛋白(Albumin)。","detail":{"background":"本題為臨床檢驗題。評估「『慢性』營養不良」最佳生化指標=A「血清白蛋白(Albumin,半衰期約20天,反映長期/慢性營養狀態)」。GPT(肝功能)、HDL(高密度脂蛋白)、TG(三酸甘油酯)皆非「慢性營養不良」指標。故血清白蛋白(A)。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"正確(本題答案)。白蛋白(半衰期長)評估慢性營養不良。","B":"GPT是肝功能。","C":"HDL是膽固醇。","D":"TG是三酸甘油酯。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"113030-N2-42":{"quick":"N2進階N3訓練重點=危機處理(2)+教學原理與方法(3)→「23」。","detail":{"background":"N2進階N3的訓練重點(教學/管理方向):2危機處理、3教學原理與方法(N3=臨床教學)。選項1「重症病人護理」是N1→N2;4「護理與法律」是N1→N2。故N2→N3為「23」。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"12含1(重症是N1→N2)不符。","B":"正確(本題答案,23)。危機處理、教學原理方法。","C":"34含4(法律是N1→N2)不符。","D":"14不符。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"114030-N2-9":{"quick":"「我們醫院藥物都用最好的」=防衛性態度。","detail":{"background":"病人抱怨高血壓藥沒效,護理人員回「不會吧!我們醫院藥物都用最好的」=防衛性態度(defensive,維護自己/醫院、否定病人感受)(C正確,非治療性溝通)。過度負荷、批判的態度、改變話題皆非「防衛維護」。故防衛性態度(C)。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"過度負荷非此。","B":"批判態度是批評病人。","C":"正確(本題答案)。維護否定病人=防衛性態度。","D":"改變話題是轉移。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"114030-N2-41":{"quick":"病人分類系統實施原則=方便易操作,不可影響臨床照護時數。","detail":{"background":"病人分類系統實施原則:C「方便易操作,不可影響臨床護理照護時數(分類本身不應佔用過多照護時間)」最適當。A「不宜設置稽核機制」錯(應設稽核確保資料正確);B「不宜太重視信效度」錯(應重視信效度);D「應採單一功能發展」錯(應多功能發展)。故C。","options":{"A":"應設稽核機制確保正確。","B":"應重視信效度。","C":"正確(本題答案)。方便易操作不影響照護時數。","D":"應多功能發展,非單一。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"114100-N2-43":{"quick":"N1申請N2應參加=危機處理(2)+重症病人護理(3)→「23」。","detail":{"background":"N1進階N2的訓練課程(重症方向):2危機處理、3重症病人護理(N2訓練重點是重症照護)。選項1「教學原理與方法」是N2→N3;4「護理標準制定」偏N3/N4。故N1→N2為「23」。DRG診斷關係群=依診斷分類的包裹式『定額固定』給付,激勵縮短住院、控制成本。生產力指標=看診量/給付點值/醫材使用量(滿意度是品質指標非生產力)。病人分類因素分類法依護理活動項目計分;工作量=病人數×嚴重度指數之和。進階訓練:N1→N2(重症、危機處理)、N2→N3(教學原理方法)。Jaques能力C-生產力W-報酬P決定滿意度(C=W>P不滿意)。","options":{"A":"12含1(教學是N2→N3)不符。","B":"正確(本題答案,23)。危機處理、重症病人護理。","C":"34不符。","D":"14不符。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"114100-N2-47":{"quick":"Jaques工作滿意度=C=W>P(能力與生產力相等且高於報酬)。本題答案B。","detail":{"background":"本題官方答案B(C=W>P)。Jaques指出員工工作滿意度取決於能力(C)、生產力(W)、報酬(P)的關係。當「C=W>P(能力與生產力相等且皆高於報酬)」時,員工感到付出多於回報、不滿意。本題以此組合為答案。故C=W>P(B)。核心:能力生產力高於報酬→不滿意。","options":{"A":"W>C>P敘述不符。","B":"正確(本題答案)。C=W>P能力生產力高於報酬。","C":"C>P=W不符。","D":"W=P>C不符。"},"sources":["新文京《護理行政》品質與成本","華杏《護理行政學》DRG與生產力"]}},"107110-N2-78":{"quick":"護理資訊系統正確=善盡保管帳密(1)+考量資料安全隱私(2)+...→「124」。","detail":{"background":"依國際醫療資訊協會規定,護理師執行護理資訊系統:1善盡保管帳號及密碼的責任、2考量病人資料安全及隱私、4(依規範使用、不外洩)。選項3「下載病人受傷圖片(外傳/外洩病人資料)」違反資安與隱私,不可。本題官方答案D「124」。核心:資訊系統使用須保管帳密、維護病人資料安全隱私、不外洩。","options":{"A":"123含3(下載病人圖片)不符。","B":"234含3不符。","C":"345含3不符。","D":"正確(本題答案,124)。保管帳密、資料安全隱私、依規範使用。"},"sources":["醫療法;個人資料保護法","國際醫療資訊協會規範"]}}},TO=["1醫療品質管理概念與Donabedian模式", "2品質改善循環PDCA與品管圈", "3品質管理工具", "4病人安全與異常事件", "5環境安全與災害防護", "6職業安全衛生危害", "7病歷保存與護理資訊系統", "8危機管理", "9醫療品質成本制度與其他"],LEC={"1醫療品質管理概念與Donabedian模式":{"html":"\n<p><b>Donabedian醫療品質三構面(SPO):</b><b>結構(structure)</b>=投入資源(人力資格、設備、制度、技術指引、護病比、洗手設備);<b>過程(process)</b>=照護執行(技術正確性、手部衛生執行率、護理紀錄完整性、術前給抗生素、病人辨識、三讀五對);<b>結果(outcome)</b>=病人結果(感染率、跌倒率、壓瘡率、死亡率、給藥異常率、滿意度)。</p>\n<p><b>控制類型:</b>事前控制(預算編列、計畫,預防性)、事中控制、事後控制(結果)。護理品管委員會:標準組(制定護理技術)、稽核組、指標監測組、成本控制組。</p>\n"},"2品質改善循環PDCA與品管圈":{"html":"\n<p><b>PDCA循環:</b>Plan(計畫)→Do(執行)→<b>Check(查核成效,如滿意度調查、落實度查核)</b>→Act(行動/標準化)。<b>FOCUS-PDCA:</b>Find發現問題、Organize組小組、Clarify釐清、Understand瞭解變異、Select選對策。</p>\n<p><b>品質管理發展:</b>QC品質控制→QA品質保證(依標準)→TQC全面品質管制→TQM全面品質管理(全員參與)。</p>\n<p><b>目標5W1H</b>(Why/What/Who/Where/When/How);改善主題優先選<b>發生頻率高</b>者(80/20)。鼓勵員工參加品管圈接近Y理論。</p>\n"},"3品質管理工具":{"html":"\n<p><b>找原因:</b><b>魚骨圖</b>(特性要因/cause-effect,表達結果與原因的關係、展開各類原因);<b>系統圖/樹狀圖</b>(以箭頭層層展開因果)。</p>\n<p><b>找重要少數:</b><b>柏拉圖(Pareto)</b>=80/20法則,依發生頻率排序、找出重要導因(關鍵的20%);掌握重要少數解決瑣碎多數。</p>\n<p><b>監測:</b><b>管制圖(control chart)</b>=監測指標是否在控制範圍內(偵測異常變異)。其他:直方圖(分布)、查檢/稽核表(收集查核)、推移/趨勢圖(時間)、散布圖(相關);新七手法(關聯圖、系統圖、矩陣圖)。<b>平衡計分卡BSC</b>四構面:財務、顧客(病人抱怨)、內部流程、學習與成長。</p>\n"},"4病人安全與異常事件":{"html":"\n<p><b>異常事件分級:</b><b>跡近/幾近錯失(near miss)</b>=錯誤被及時攔截、<b>未到病人</b>(如藥物退回、被質疑而查證);無傷害事件(到病人但無傷害);不良事件(已造成傷害);<b>警訊/哨兵事件(sentinel)</b>=非預期死亡、永久功能喪失、嬰兒失竊、自殺、手術部位錯誤。<b>傷害行為事件</b>=暴力毆打/持刀傷醫護。</p>\n<p><b>通報系統:</b><b>非懲罰性</b>、學習改善、<b>預防錯誤再發生</b>(非究責/釐清責任)。<b>RCA</b>根本原因分析(事後、組小組、找根本原因、用於嚴重事件);<b>FMEA</b>失效模式與效應分析(<b>事前/預應式</b>)。氧氣未開臉發黑→立即處置病人優先。</p>\n"},"5環境安全與災害防護":{"html":"\n<p><b>火災RACE:</b>R(Rescue救援移病人)、A(Alarm啟動警報通報消防)、C(Confine<b>關門</b>侷限火煙)、E(Extinguish滅火/Evacuate疏散)。濃煙密布優先<b>疏散病人</b>;不可打開門窗(助燃)。</p>\n<p><b>滅火器:</b>A類普通(燃紙)用水/乾粉、B類油類用泡沫、C類電氣用二氧化碳、D類金屬(鎂)用乾粉。<b>地震疏散</b>先能行動者、後無法行動者。</p>\n<p><b>輻射防護</b>三原則:時間短、距離遠(強度與距離平方成<b>反比</b>)、屏蔽;戴感光片追蹤劑量;α穿透弱、γ最強。<b>手術室</b>室溫20~27°C、相對濕度50~70%。環境危害:物理/化學/生物(無金屬類)。</p>\n"},"6職業安全衛生危害":{"html":"\n<p><b>職業危害分類:</b><b>物理性</b>(輻射、噪音、高溫、採光照明不當、振動);<b>化學性</b>(消毒劑、化療藥);<b>生物性</b>(病原微生物、<b>針扎</b>感染血液病原);心理性(壓力);人因性(姿勢、搬運致背扭傷、靜脈曲張、椎間盤)。</p>\n<p><b>醫院環境安全管理要項:</b>室內空氣品質、廢棄物處理、噪音管理、毒化物管理。</p>\n"},"7病歷保存與護理資訊系統":{"html":"\n<p><b>病歷保存(醫療法):</b>至少<b>7年</b>;未成年者保存至成年(現行18歲)後7年(=<b>25歲</b>);電子病歷同須保存7年。病歷由院方保管、不交病人攜帶、不可洩漏。</p>\n<p><b>資訊安全:</b>以<b>自己帳號</b>親自操作、讀取後登出、<b>不外帶/下載病人資料</b>、不借用他人帳號、不外傳病人圖片、簽章後下班。</p>\n<p><b>結構化溝通ISBAR:</b>Introduction介紹、<b>Situation情境(現況,非Share)</b>、Background背景、Assessment評估、Recommendation建議。資訊系統輔助但<b>不能取代</b>臨床探視評估。</p>\n"},"8危機管理":{"html":"\n<p><b>危機類型:</b>成長危機(發展階段)、<b>情境危機</b>(突發疾病、意外、中風致無法自理)。</p>\n<p><b>危機處理步驟:</b>先<b>評估</b>對壓力事件的感受與影響→找過去調適方法→訂減壓目標→評值。危機管理階段:偵測→防範→控制→學習→回復。</p>\n<p><b>策略:</b>醫學中心宜<b>常態固定編組分工</b>(平時建立、危機可立即啟動);災後持續品質改善用<b>PDCA</b>、找根本原因用<b>RCA</b>。護理主管須熟悉法令與危機事件報告機制。排班應考量護理品質與人員負荷。</p>\n"},"9醫療品質成本制度與其他":{"html":"\n<p><b>DRG診斷關係群:</b>依診斷分類的<b>包裹式『定額固定』</b>給付,激勵醫院<b>縮短住院、控制成本</b>(非論量計酬)。</p>\n<p><b>生產力指標:</b>看診/門診量、健保給付點值、醫材使用量(<b>滿意度是品質指標、非生產力</b>);不可為提升生產力而減收重症病人。</p>\n<p><b>病人分類:</b>因素分類法依<b>護理活動項目</b>計分;工作量=病人數×嚴重度指數之和。<b>進階訓練:</b>N1→N2(重症照護、危機處理)、N2→N3(教學原理與方法)。Jaques能力(C)-生產力(W)-報酬(P)決定滿意度(C=W>P 不滿意)。慢性營養不良最佳指標=白蛋白。</p>\n"}};
const $=s=>document.querySelector(s);

const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';

   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';

  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+

}

 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans

function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
