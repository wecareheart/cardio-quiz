,{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":12,"stem":"病人在接受甲狀腺手術後,平時講話尚可並無聲帶麻痺現象,但唱歌時無法發出高音,最可能的原因為下列何者?","options":{"A":"舌下神經(hypoglossal nerve)損傷","B":"上喉神經外分枝(external branch of the superior laryngeal nerve)損傷","C":"喉返神經(recurrent laryngeal nerve)損傷","D":"迷走神經(vagus nerve)損傷"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-12","topic":"甲狀腺","topic_code":"T5","id":"115020-12","q_num":12,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":13,"stem":"關於甲狀腺癌的腫瘤生成與致癌機轉,下列敘述何者最不適當?","options":{"A":"BRAF 基因突變常見於乳突癌(papillary thyroid carcinoma)與未分化癌(anaplastic thyroidcarcinoma)腫瘤","B":"RET 基因突變可見於甲狀腺髓質癌(medullary thyroid carcinoma)腫瘤","C":"RAS 基因突變可見於甲狀腺濾泡腺瘤與濾泡癌(follicular thyroid adenoma and carcinoma)腫瘤","D":"p53 基因是一種致癌基因,其突變常見於未分化甲狀腺癌(anaplastic thyroid cancer)腫瘤"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-13","topic":"甲狀腺","topic_code":"T5","id":"115020-13","q_num":13,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":14,"stem":"40 歲女性,家裡有乳癌病史,自己也有BRCA1 mutation。兩週前自己感覺到左乳房有硬塊。到門診做進一步檢查,懷疑有惡性可能。該患者從來沒有接受過任何乳房檢查。接下來將安排之檢查,下列何者最不適合?","options":{"A":"乳房超音波(ultrasonography)","B":"乳房攝影(mammography)","C":"磁振造影(magnetic resonance imaging)","D":"正子斷層造影(positron emission tomography)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-14","topic":"乳癌手術‧腋下淋巴‧輔助治療","topic_code":"T2","id":"115020-14","q_num":14,"src":"民國115年第一次","img":""}],E={"102030-2":{"quick":"46F、3 cm 不規則可移動腫塊+低回音→D:門診粗針穿刺切片(取組織確診)。","detail":{"background":"可觸及之乳房腫塊(不規則、低回音、可移動3cm)→應『粗針穿刺切片(core biopsy)』取組織病理確診(D),並評估ER/PR/HER2。","options":{"A":"未組織確診不可直接乳房切除。","B":"有可疑腫塊不可只追蹤 6 月。","C":"不可只追蹤,應切片。","D":"★正確(本題答案):粗針穿刺切片。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"102030-32":{"quick":"正確為 C:乳房脂肪比例會影響乳房攝影敏感度(緻密乳房較差)。","detail":{"background":"乳房攝影(mammography):『乳房脂肪比例影響敏感度——緻密乳房(年輕)敏感度較差』(C),故>50歲脂肪退化後篩檢效果較佳。","options":{"A":"錯:<30 歲應先用超音波,非乳房攝影。","B":"錯:>50 歲敏感度較佳(非較差)。","C":"★正確(本題答案):脂肪比例影響敏感度。","D":"錯:乳房攝影非操作者依賴(超音波才是)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"102030-34":{"quick":"正確為 A:乳房理學檢查首先端坐視診對稱/皮膚/乳頭變化,紅斑須警覺發炎性癌。","detail":{"background":"乳房理學檢查首先『端坐視診』觀察兩側對稱、皮膚凹陷/橘皮、乳頭內陷或濕疹、發紅(警覺發炎性癌)(A),再觸診。","options":{"A":"★正確(本題答案):先端坐視診。","B":"錯:壓痛多偏良性,無法鑑別惡性。","C":"錯:FNA 無法分侵襲 vs 原位。","D":"錯:超音波非無症狀婦女篩檢首選(攝影才是)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"102110-44":{"quick":"正確為 C:DCIS 癌細胞仍在基底膜內未侵犯,可分數型(粉刺/篩狀/乳突/實心/微乳突),粉刺型復發較高。","detail":{"background":"乳管原位癌(DCIS):癌細胞侷限基底膜內未侵犯,分粉刺/篩狀/乳突/實心/微乳突型,『粉刺(comedo)型壞死、惡性度高、復發較高』(C)。","options":{"A":"DCIS 常以群聚微鈣化表現(本敘述合理)。","B":"可能合併侵襲癌、可加前哨淋巴結(合理)。","C":"★正確(本題答案):DCIS 在基底膜內、分數型。","D":"tamoxifen 降低復發(NSABP B-24,合理)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"102110-45":{"quick":"錯在 D:粗針穿刺取「組織」可獲得 ER、PR、HER2/neu 資訊(非無法獲得)。","detail":{"background":"乳房粗針(core needle)切片:取『組織』可作組織學診斷並獲得『ER、PR、HER2/neu』資訊(故D『無法獲得』錯),優於細針細胞學。","options":{"A":"正確:用 14/16/18 號針。","B":"正確:需局部麻醉。","C":"正確:可避免再做切片。","D":"★錯誤(本題答案):粗針可得 ER/PR/HER2。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"103030-45":{"quick":"錯在 D:FNAC 陽性+BI-RADS 4 仍「不能」直接確診乳癌並切除全乳房;需粗針/切片組織學確認與評估侵襲。","detail":{"background":"細針抽吸細胞學(FNAC):取細胞、可初步區分良惡但無法判侵襲性與分子標記;『FNAC陽性+BI-RADS 4仍不能直接確診並全乳切除(故D錯)』,須組織學確認。","options":{"A":"正確:FNAC 可能偽陽性。","B":"正確:可能偽陰性。","C":"正確:無法分原位 vs 侵襲。","D":"★錯誤(本題答案):不能僅憑 FNAC 確診切全乳。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"103100-44":{"quick":"55 歲停經女性篩檢為 D:每兩年乳房攝影(國健署 45–69 歲每 2 年)。","detail":{"background":"國健署乳癌篩檢:45–69歲(及40–44歲具家族史)『每2年一次乳房攝影』;55歲停經健康女性→每兩年乳房攝影(D)。","options":{"A":"非每半年超音波。","B":"非每年攝影。","C":"非每年超音波。","D":"★正確(本題答案):每兩年乳房攝影。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"104030-45":{"quick":"正確為 C:乳頭出血但無腫塊,最可能為良性「乳管內乳突瘤(intraductal papilloma)」。","detail":{"background":"乳頭出血但無腫塊:最常見為良性『乳管內乳突瘤(intraductal papilloma)』(C),仍須評估排除乳管原位癌。","options":{"A":"乳癌可能性非達 40%。","B":"侵襲性乳管癌非最常見。","C":"★正確(本題答案):乳管內乳突瘤。","D":"乳房發炎表現不同。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"104090-54":{"quick":"錯在 D:即時乳房重建「不會」降低存活率,不需間隔兩年。","detail":{"background":"乳癌手術選擇:即時乳房重建『不會降低存活率、不需間隔兩年』(故D錯);BCT與全切存活相當。","options":{"A":"正確:全切 vs 保留存活率相近。","B":"正確:保留手術同側局部復發率略高。","C":"正確:切緣乾淨即可。","D":"★錯誤(本題答案):即時重建不降低存活、不需延兩年。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"105020-42":{"quick":"正確為 D:隨年齡脂肪增加(退化),乳房攝影影像較清晰。","detail":{"background":"乳房攝影隨年齡:『年長者乳腺退化、脂肪增加,攝影對比較佳、病灶較清晰』(D);年輕緻密乳房敏感度差。","options":{"A":"非脂肪減少。","B":"非影像模糊。","C":"非影像模糊。","D":"★正確(本題答案):脂肪增加、影像清晰。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"105020-48":{"quick":"不是惡性超音波特徵者為 C:腫瘤>3 cm(大小本身非惡性特徵)。","detail":{"background":"乳房超音波之惡性特徵:低回音、邊緣不規則/毛刺、縱長>橫、後方陰影、微鈣化;『腫瘤>3cm(大小本身)非惡性特徵』(C)。","options":{"A":"惡性特徵:低回音。","B":"惡性特徵:縱比橫大。","C":"★不是(本題答案):>3 cm 非惡性特徵。","D":"惡性特徵:後方陰影衰減。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"105100-44":{"quick":"錯在 C:超音波「非」無症狀婦女篩檢首選(乳房攝影才是);超音波為緻密乳房/症狀者輔助。","detail":{"background":"乳癌篩檢:『乳房攝影為無症狀婦女篩檢首選;超音波非篩檢首選(C錯)』,超音波用於緻密乳房或症狀者輔助。","options":{"A":"正確:攝影含 CC 與 MLO 兩視角。","B":"正確:數位攝影對緻密乳房較佳。","C":"★錯誤(本題答案):超音波非無症狀篩檢首選。","D":"正確:MRI 對緻密乳房/小葉癌評估有用。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"106020-45":{"quick":"錯在 C(亦接受 D):腫瘤標記 CEA/CA15-3「不能用來排除乳癌」(非診斷/排除工具);D 不應僅憑此即儘快手術。","detail":{"background":"乳頭血樣分泌+乳暈下硬塊:『腫瘤標記CEA/CA15-3不能用來排除或診斷乳癌(C,亦D)』;應影像+組織切片評估。","options":{"A":"正確:乳房攝影+超音波。","B":"正確:可乳管攝影。","C":"★錯誤(本題答案):腫瘤標記不能排除乳癌。","D":"(亦給分)應先確診而非僅憑此儘快手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"106020-47":{"quick":"錯在 A:細針抽吸(FNA)用「較細針頭(21–25 號)」,16/18 號是粗針(core needle)。","detail":{"background":"乳房細針抽吸(FNA)用『較細針頭(21–25號)』取細胞;『16/18號為粗針(core needle)』(故A錯),兩者用途不同。","options":{"A":"★錯誤(本題答案):FNA 用細針,非 16/18 號。","B":"正確:FNA 不需局部麻醉。","C":"正確:可分實質腫瘤或囊腫。","D":"正確:發現癌細胞仍需切片確認。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"106080-33":{"quick":"本題一律給分:乳房 MRI 對侵襲癌/DCIS 敏感度高、特異度中等、對隱匿癌有用、可作高風險篩檢。","detail":{"background":"乳房MRI:對侵襲癌與DCIS敏感度高、特異度中等、可偵測隱匿/多中心病灶、用於高風險(BRCA)篩檢;本題敘述爭議故一律給分。","options":{"A":"(給分):DCIS 敏感度可達 90%。","B":"(給分):特異度中等。","C":"(給分):對隱匿癌有用。","D":"(給分):高風險可作篩檢。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"106080-35":{"quick":"BI-RADS 0(資料不全)→D:加做乳房超音波(補充影像)。","detail":{"background":"乳房攝影BI-RADS 0(資料不完整、需追加影像)→處置為『加做乳房超音波或加照影像』(D)再評估。","options":{"A":"BI-RADS 0 非一年後追蹤(那是 BI-RADS 1/2)。","B":"非直接切片。","C":"非細針。","D":"★正確(本題答案):加做超音波等補充影像。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"107020-40":{"quick":"70M 乳暈下腫塊,最不需要為 A:胸部 X 光。","detail":{"background":"70歲男性乳暈下腫塊(疑男性女乳/乳癌):評估含理學、乳房攝影/超音波、必要時切片;『胸部X光最不需要』(A)。","options":{"A":"★最不需要(本題答案):胸部 X 光。","B":"需要:乳房超音波。","C":"需要:荷爾蒙檢查(找 gynecomastia 病因)。","D":"需要:細針抽取細胞。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"107020-41":{"quick":"20F、1 cm 平滑可移動腫瘤(疑纖維腺瘤)→C:乳房超音波(年輕緻密乳房首選影像)。","detail":{"background":"20歲女性平滑可移動之1cm腫瘤(疑纖維腺瘤):年輕緻密乳房首選影像為『乳房超音波』(C);攝影較不適合年輕族群。","options":{"A":"胸部 X 光非乳房檢查。","B":"年輕乳房攝影敏感度差。","C":"★正確(本題答案):乳房超音波。","D":"未診斷不直接手術切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"108030-43":{"quick":"錯在 C:BI-RADS 5 代表「高度可疑惡性」,並非「已證實為乳癌」(已證實為 BI-RADS 6)。","detail":{"background":"乳癌影像:『BI-RADS 5代表高度可疑惡性(≥95%),並非已證實為癌(已切片證實為BI-RADS 6)』(故C錯)。","options":{"A":"正確:BI-RADS 評估惡性可能。","B":"正確:BI-RADS 3 可能良性、短期追蹤。","C":"★錯誤(本題答案):5 為高度可疑,非已證實。","D":"正確:MRI 用於隱匿原發癌/佩吉特氏病。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"108080-37":{"quick":"聚集微鈣化、BI-RADS IV屬可疑惡性,需切片取得病理,不可只追蹤;故『3–6個月後再追蹤乳房攝影』(C)不宜。","detail":{"background":"聚集微鈣化、BI-RADS IV屬可疑惡性,需切片取得病理,不可只追蹤;故『3–6個月後再追蹤乳房攝影』(C)不宜。","options":{"A":"可行。定位切片手術(wire-localized excision)為取得病理之一法。","B":"首選。立體定位粗針穿刺切片(stereotactic core needle biopsy)。","C":"★不宜(本題答案)。BI-RADS IV不可只追蹤,應切片確診。","D":"可輔助。乳房超音波雖常看不到微鈣化,但非『不宜』之處置。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"109020-35":{"quick":"錯在 B:無皮膚凹陷「不能排除」乳癌。","detail":{"background":"乳房腫塊評估:『無皮膚凹陷不能排除乳癌』(故B錯);須三合一評估(理學+影像+切片)。","options":{"A":"正確:皮膚凹陷陽性預測值高於硬度。","B":"★錯誤(本題答案):無凹陷不能排除乳癌。","C":"正確:腋下淋巴結增加乳癌可能。","D":"正確:凹陷與 Cooper 韌帶有關。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"109020-37":{"quick":"45F 乳房腫塊→C:先安排乳房超音波檢查。","detail":{"background":"45歲女性可觸及乳房腫塊→先安排『乳房超音波』(±攝影)評估,再決定切片(C)。","options":{"A":"不可正常即半年追蹤(有腫塊)。","B":"不可未診斷即手術。","C":"★正確(本題答案):先乳房超音波。","D":"CA15-3 非診斷工具。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"110080-38":{"quick":"錯在 A:乳房超音波偵測微鈣化「不如」乳房攝影(攝影較佳)。","detail":{"background":"乳房超音波vs攝影:超音波利於緻密乳房/囊實區分,但『偵測微鈣化不如乳房攝影』(故A『超音波較佳』錯)。","options":{"A":"★錯誤(本題答案):超音波偵測微鈣化不如攝影。","B":"正確:<50 歲攝影敏感度較差。","C":"正確:緻密乳房攝影敏感度差。","D":"正確:>50 歲無症狀篩檢用攝影。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"110080-39":{"quick":"叢聚微鈣化、BI-RADS 4、超音波正常→A:應建議切片(攝影微鈣化超音波常看不到)。","detail":{"background":"叢聚微鈣化、BI-RADS 4(惡性>2%)、超音波正常→『應安排切片(立體定位)』(A),因微鈣化超音波常看不到。","options":{"A":"★正確(本題答案):應建議切片。","B":"超音波正常不能取消切片。","C":"BI-RADS 4 惡性>2%,非<1%。","D":"切片可能為 DCIS/侵襲,不一定 IDC。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"111020-49":{"quick":"BI-RADS 4A 表示 B:懷疑惡性腫瘤(4=可疑,須切片)。","detail":{"background":"乳房攝影BI-RADS 4A表示『低度懷疑惡性(可疑,須切片)』(B);4分為4A/4B/4C不同惡性風險。","options":{"A":"需加做影像是 BI-RADS 0。","B":"★正確(本題答案):4 為可疑惡性。","C":"正常是 BI-RADS 1。","D":"可能良性 6 月追蹤是 BI-RADS 3。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"112020-18":{"quick":"照片乳房病灶→B:佩吉特氏病(Paget disease,乳頭乳暈濕疹樣變化)。","detail":{"background":"乳頭乳暈濕疹樣變化(脫屑、滲液、糜爛)之臨床照→『乳房Paget氏病』(B),須切片並評估下方乳管癌。","options":{"A":"Mondor 病為淺靜脈炎條索。","B":"★正確(本題答案):Paget 氏病。","C":"乳管擴張表現不同。","D":"急性乳腺炎為哺乳期紅腫熱痛。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"112080-41":{"quick":"最不恰當為 D:術前細針細胞學(FNA)若惡性,「不能」直接切除全乳(需組織學確認侵襲與分子標記)。","detail":{"background":"乳房切片:『術前細針細胞學(FNA)即使惡性也不能直接全乳切除(D最不恰當)』;需粗針/切片組織學確認侵襲與分子標記。","options":{"A":"正確:粗針屬切取式切片。","B":"正確:真空輔助取更多、偽陰性低。","C":"正確:粗針可分原位 vs 侵襲。","D":"★最不恰當(本題答案):FNA 惡性不能直接切全乳。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"112080-42":{"quick":"最不常見惡性超音波特徵為 C:病灶後回音「加強(enhancement)」(惡性多為後方陰影衰減;加強見於囊腫)。","detail":{"background":"乳房超音波惡性特徵:低回音、毛刺、縱長>橫、後方陰影衰減、微鈣化;『後方回音加強(enhancement)』多見於囊腫,惡性最不常見(C)。","options":{"A":"惡性:縱比橫大。","B":"惡性:角狀邊緣。","C":"★最不常見(本題答案):後方回音加強(屬良性/囊腫)。","D":"惡性:低回音。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"113020-42":{"quick":"錯在 C:乳房攝影在「緻密乳房敏感度差」,>50 歲篩檢效果較好是因脂肪退化(非因攝影在緻密乳房較好)。","detail":{"background":"乳房攝影篩檢:『緻密乳房敏感度差;>50歲篩檢效果較好是因脂肪退化使影像對比佳(故C「攝影在緻密乳房較好」錯)』。","options":{"A":"正確:攝影為大量篩檢最常用。","B":"正確:超音波操作者依賴。","C":"★錯誤(本題答案):攝影在緻密乳房敏感度差。","D":"正確:<50 歲腫瘤進展較快,篩檢效果較差。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"113020-43":{"quick":"21F、纖維腺瘤、BI-RADS 2,較不考慮為 B:加做乳房攝影(年輕、良性,不需攝影)。","detail":{"background":"21歲女性、纖維腺瘤、BI-RADS 2(良性):可追蹤/超音波;『加做乳房攝影較不考慮(B)』——年輕緻密乳房攝影價值低、輻射顧慮。","options":{"A":"考慮:半年至一年超音波追蹤。","B":"★較不考慮(本題答案):年輕良性不需乳房攝影。","C":"可考慮切片(若有疑慮)。","D":"考慮:疼痛嚴重給止痛。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"113070-43":{"quick":"國健署乳癌攝影篩檢起始年齡為 C:45 歲(無家族史、無症狀者)。","detail":{"background":"國健署乳癌攝影篩檢:對無家族史、無症狀婦女自『45歲』開始(40–44歲具一等親家族史亦可),每2年一次(C)。","options":{"A":"非 35 歲。","B":"非 40 歲(40–44 歲須有家族史)。","C":"★正確(本題答案):45 歲。","D":"非 50 歲。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"113070-44":{"quick":"59F、侵襲性乳管癌 2 cm、N0、ER+→本題答案 D(1234 全對):術後依風險可荷爾蒙治療±化療、乳房保留後放療等皆適當。","detail":{"background":"59F、IDC 2cm、N0、ER+:術後依風險可『荷爾蒙治療±化療、乳房保留後放療』皆適當(D,1234全對);ER+用內分泌治療。","options":{"A":"僅123:不完整。","B":"僅234:不完整。","C":"僅134:不完整。","D":"★正確(本題答案):1234 皆適當。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"114020-18":{"quick":"BI-RADS 0→D:需進一步安排其他影像學檢查診斷。","detail":{"background":"乳房攝影BI-RADS 0(評估不完整)→應『加做其他影像學(超音波/加照/必要時MRI)』(D)再給最終分類。","options":{"A":"BI-RADS 0 非陰性。","B":"非良性追蹤。","C":"懷疑異常為 BI-RADS 4。","D":"★正確(本題答案):需加做其他影像。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"114070-42":{"quick":"可能為乳癌高危險群的病理為 C:放射狀疤痕(radial scar,與乳癌風險增加相關)。","detail":{"background":"乳房病理之乳癌高危險病變:非典型增生(ADH/ALH)、原位小葉癌、『放射狀疤痕(radial scar)』(C)——與乳癌風險增加相關,常需切除。","options":{"A":"乳突瘤風險增加較小。","B":"硬化腺症風險增加較小。","C":"★正確(本題答案):放射狀疤痕為高危險群。","D":"纖維腺瘤風險增加極小。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"114070-43":{"quick":"錯在 C:DCIS 亞型中「粉刺(comedo)型」為高惡性度,其敘述對亞型惡性度分類有誤。","detail":{"background":"乳房疾病:DCIS亞型中『粉刺(comedo)型為高惡性度』;本題C對亞型惡性度之敘述有誤(錯)。","options":{"A":"正確:超音波分辨纖維腺瘤 vs 水囊。","B":"正確(可接受):微鈣化切片常見良性。","C":"★錯誤(本題答案):DCIS 亞型惡性度描述有誤(粉刺型最高惡性度)。","D":"正確:預後與分化/ER/PR/HER2 有關。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","衛福部國健署乳癌篩檢指引","NCCN Breast Cancer Guideline"]}},"101030-20":{"quick":"避免傷胸長神經之主因為 B:避免翼狀肩胛(winged scapula);胸長神經支配前鋸肌。","detail":{"background":"乳房腋下淋巴廓清避免傷『胸長神經(long thoracic nerve)』——支配前鋸肌,受傷致『翼狀肩胛(winged scapula)』(B)。","options":{"A":"非胸小肌萎縮。","B":"★正確(本題答案):避免翼狀肩胛。","C":"非手臂麻痺。","D":"淋巴水腫與腋下清掃範圍相關,非胸長神經。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"101030-38":{"quick":"35F、外側 1 cm IDC、N0→D:乳房部分切除+前哨淋巴結手術(BCT+SLNB)。","detail":{"background":"早期乳癌(35F、外側1cm IDC、N0):可行『乳房保留手術+前哨淋巴結切片(BCT+SLNB)』(D),術後放療,存活與全切相當。","options":{"A":"MRM 對早期小腫瘤過度。","B":"乳房保留但未含腋下評估。","C":"部分切除未含淋巴評估。","D":"★正確(本題答案):部分切除+前哨淋巴結。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"102030-33":{"quick":"38F、3.5 cm IDC、ER−/PR−/HER2−(三陰性)→B:輔助化學治療。","detail":{"background":"三陰性乳癌(ER−/PR−/HER2−):無荷爾蒙/標靶標的,輔助治療以『化學治療』為主(B);本例停經前3.5cm IDC三陰性→化療。","options":{"A":"三陰性需輔助化療,非不治療。","B":"★正確(本題答案):輔助化療。","C":"HER2 陰性無標靶對象。","D":"ER 陰性無抗荷爾蒙適應。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"103030-7":{"quick":"25F、2.1 cm IDC、N0、M0→B:T2N0M0(T2=2–5 cm)。","detail":{"background":"乳癌臨床分期(cTNM):腫瘤2.1cm(T2=2–5cm)、腋下未觸及(N0)、無遠端(M0)→『T2N0M0』(B)。","options":{"A":"T1≤2 cm,不符(2.1 cm)。","B":"★正確(本題答案):T2N0M0。","C":"N0 非 N1。","D":"N0 非 N1。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"104030-42":{"quick":"錯在 C:本例 ER/PR「陽性」→「不是」三陰性(basal-like);三陰性指 ER−/PR−/HER2−。","detail":{"background":"三陰性乳癌定義為ER−/PR−/HER2−(basal-like);本例ER/PR『陽性』→『不是三陰性』(故C錯);治療含荷爾蒙治療。","options":{"A":"正確:荷爾蒙受體與 HER2 為重要預後因子。","B":"正確:三陰性預後較差。","C":"★錯誤(本題答案):ER/PR 陽性者非三陰性。","D":"ER 陽性應加抗荷爾蒙(tamoxifen)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"104030-44":{"quick":"最可能需手術者為 B:乳頭「單一管道自然性出血」(疑乳管內乳突瘤/乳管內病變)。","detail":{"background":"乳房症狀中『單一乳管自然性血樣分泌』最需手術評估(疑乳管內乳突瘤或乳管內病變)(B);雙側多孔乳狀分泌多為良性。","options":{"A":"乳房疼痛多良性。","B":"★正確(本題答案):單一乳管自發血性分泌。","C":"多管白色分泌多生理性。","D":"Montgomery 腺突起為正常。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"104090-40":{"quick":"前哨淋巴結偵測最常用 A:放射同位素掃描法(常合併藍染)。","detail":{"background":"前哨淋巴結偵測最常用『放射性同位素(Tc-99m)掃描』,常合併『藍染』雙標定提高成功率(A)。","options":{"A":"★正確(本題答案):放射同位素掃描。","B":"非 X 光定位。","C":"肉眼非定位法。","D":"物理檢查無法定位。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"104090-41":{"quick":"錯在 C:乳癌病人「並非」術後均需化療;依分期與生物分型決定。","detail":{"background":"乳癌治療個別化:『並非所有病人術後都需化療』(故C錯);依分期、ER/PR/HER2、Ki-67、復發風險決定化療/荷爾蒙/標靶。","options":{"A":"正確:腋下淋巴轉移為最重要預後指標之一。","B":"正確:ER 陽性應抗荷爾蒙。","C":"★錯誤(本題答案):非均需化療。","D":"正確:I/II 期保留與切除存活相當。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"104090-42":{"quick":"非歐美乳癌死亡率下降主因者為 A:乳房自我檢查(BSE,未證實降低死亡率)。","detail":{"background":"歐美乳癌死亡率下降歸功『乳房攝影篩檢早期發現』與輔助全身治療進步;『乳房自我檢查(BSE)未證實降低死亡率』(故A非主因)。","options":{"A":"★非(本題答案):BSE 未降低死亡率。","B":"是:乳房攝影篩檢。","C":"是:輔助荷爾蒙治療。","D":"是:輔助化療。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"104090-55":{"quick":"錯在 D:前哨淋巴結切片「可以避免」全腋下清掃的併發症(正是其目的),非無法避免。","detail":{"background":"改良式根治性乳房切除(MRM):切全乳+腋下level I-II淋巴,保留胸大小肌;『前哨淋巴結切片可避免全腋清掃之併發症(淋巴水腫)』(故D『無法避免』錯)。","options":{"A":"正確:MRM 清除 level I/II 淋巴。","B":"正確:腋下清掃界線(腋靜脈/胸壁/背闊肌)。","C":"正確:併發症含疼痛、活動受限、淋巴水腫。","D":"★錯誤(本題答案):SLNB 正可避免清掃併發症。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"105020-44":{"quick":"85F、T1N0M0 三陰性、乳房保留術後→本題接受 A、C:乳房保留後需「放射線治療(C)」;三陰性可考慮「化療(A)」(高齡個別評估)。","detail":{"background":"高齡(85F)T1N0M0三陰性、乳房保留術後:保留手術後需『放射線治療(C)』;三陰性可考慮『化療(A)』(高齡個別評估);本題A、C均給分。","options":{"A":"★(給分)三陰性可考慮化療。","B":"無荷爾蒙受體,荷爾蒙治療無效。","C":"★(本題答案)乳房保留後放射治療。","D":"HER2 陰性無標靶對象。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"105020-46":{"quick":"前哨淋巴結指 C:第一顆可能轉移的腋下淋巴結(亦接受 A:第一群 level I)。","detail":{"background":"前哨淋巴結=『腫瘤淋巴引流第一站之淋巴結(第一顆/第一群level I)』(C,亦接受A);以同位素+藍染定位,陰性可免全腋清掃。","options":{"A":"(給分)第一群 level I。","B":"level II 非前哨。","C":"★正確(本題答案):第一顆可能轉移的淋巴結。","D":"非第二顆。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"105100-47":{"quick":"35F、T1N2M0、三陰性、MRM 後→D:化療+標靶+放療全需(N2≥4 顆需化療+放療;HER2 陽性則加標靶)。","detail":{"background":"35F、T1N2M0(腋下≥4顆)、三陰性、MRM後:N2需『化療+放療』;HER2陽性加標靶;本例屬高風險須全身+局部輔助治療(D)。","options":{"A":"N2 不可不治療。","B":"不只放療。","C":"不只標靶。","D":"★正確(本題答案):化療+標靶+放療全需。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"105100-48":{"quick":"術後手臂內側感覺麻木為 B:肋間臂神經(intercostobrachial nerve)受傷。","detail":{"background":"乳癌術後『上臂內側感覺麻木』因『肋間臂神經(intercostobrachial nerve,T2)』於腋下清掃時被切斷(B)。","options":{"A":"胸背神經支配背闊肌。","B":"★正確(本題答案):肋間臂神經(上臂內側感覺)。","C":"胸長神經致翼狀肩胛。","D":"肋間神經非此分布。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"105100-49":{"quick":"前哨淋巴結切片最重要目的為 B:減少全腋下淋巴清掃引起的併發症。","detail":{"background":"前哨淋巴結切片最重要目的為『以最少手術正確分期,減少全腋清掃所致之淋巴水腫等併發症』(B)。","options":{"A":"非預防乳癌再發。","B":"★正確(本題答案):減少清掃併發症。","C":"非美觀。","D":"與乳房能否全切無關。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"106020-48":{"quick":"25F、1 cm IDC、ER+→C:左外側乳房部分切除+前哨淋巴結切除(BCT+SLNB)。","detail":{"background":"早期ER陽性乳癌(25F、1cm IDC、ER+):可『乳房部分切除+前哨淋巴結切片(BCT+SLNB)』(C),術後放療+荷爾蒙治療。","options":{"A":"早期小腫瘤不需全切除。","B":"部分切除未含淋巴評估。","C":"★正確(本題答案):部分切除+前哨淋巴結。","D":"不可只荷爾蒙治療不手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"106020-49":{"quick":"MRM 需避免傷害的神經為 A(123):胸背神經、胸長神經、(胸內側神經等);膈神經(4)不在腋下手術區。","detail":{"background":"改良式根治性乳房切除須避免傷『胸背神經(闊背肌)、胸長神經(前鋸肌)、胸內側神經』(123);『膈神經(4)』不在腋下手術區(A)。","options":{"A":"★正確(本題答案):1、2、3。","B":"僅23:漏 1。","C":"34:含膈神經(4),錯。","D":"14:含膈神經(4),錯。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"106080-34":{"quick":"翼狀肩胛畸形表示 B:胸長神經(long thoracic nerve,前鋸肌)受損。","detail":{"background":"MRM後『翼狀肩胛(winged scapula)』表示『胸長神經(long thoracic nerve)』受損(前鋸肌失能)(B)。","options":{"A":"胸背神經致背闊肌無力。","B":"★正確(本題答案):胸長神經→翼狀肩胛。","C":"胸內側神經支配胸肌。","D":"肋間臂神經為上臂感覺。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"107080-39":{"quick":"BRCA1 基因變異與 C:類基底型(basal-like,三陰性)乳癌最相關。","detail":{"background":"BRCA1突變相關乳癌多為『類基底型(basal-like)/三陰性』(C),組織分級高、發病年輕;BRCA2較多ER陽性。","options":{"A":"管腔 A 型 ER 陽性,非 BRCA1。","B":"管腔 B 型,非 BRCA1。","C":"★正確(本題答案):類基底型(三陰性)。","D":"HER2 過度表現型,非 BRCA1。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","AJCC Cancer Staging 8e"]}},"107080-40":{"quick":"不必列入乳癌高危險考慮者為 C:甲狀腺病史。","detail":{"background":"乳癌高危險因子:年齡、初經早/停經晚、未生育/晚產、家族史/BRCA、胸部放射、荷爾蒙、增生性病變;『甲狀腺病史』非危險因子(C不必列入)。","options":{"A":"是:停經>55 歲。","B":"是:未產婦。","C":"★不必(本題答案):甲狀腺病史非乳癌風險。","D":"是:初經<12 歲。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"108030-41":{"quick":"原位癌「不必」全乳切除的除外情況為 A:首次局部切除無乾淨切緣→可「再次切除」即可,非一定全乳。","detail":{"background":"乳房原位癌(DCIS)多需全乳切除或BCT+放療;『首次局部切除切緣不乾淨者可再次局部廣泛切除取得乾淨切緣』而不一定全乳(A除外)。","options":{"A":"★除外(本題答案):切緣不淨可再切除。","B":"瀰漫性鈣化需全乳切除。","C":"病人不願保留→全乳切除。","D":"無法放療→全乳切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"108080-35":{"quick":"錯在 B:學習曲線中前 100 例「偶有偽陰性」不代表應停止做 SLNB;以可接受的偽陰性率驗證即可。","detail":{"background":"前哨淋巴結切片(SLNB):同位素/藍染定位、準確分期、減少併發症;『學習曲線初期偶有偽陰性不代表應停做』,以可接受偽陰性率驗證即可(故B錯)。","options":{"A":"正確:SLNB 減少淋巴水腫。","B":"★錯誤(本題答案):單一偽陰性不應停止 SLNB。","C":"正確:全乳切除者亦可 SLNB。","D":"正確:理學摸到淋巴結者不適合 SLNB。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"109020-34":{"quick":"輔助化療必要參考因子為 C(124):腫瘤大小、淋巴轉移、荷爾蒙受體(3 位置非因子)。","detail":{"background":"判斷乳癌輔助化療之必要因子:①腫瘤大小、②淋巴結、④荷爾蒙受體(及HER2/Ki-67);『③腫瘤位置』非決定化療之因子→124(C)。","options":{"A":"123:含 3(位置,非因子)。","B":"134:含 3。","C":"★正確(本題答案):1、2、4。","D":"234:含 3。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"109080-40":{"quick":"正確為 A:浸潤性乳管癌是最常見乳癌,約占侵襲性乳癌 50–70%。","detail":{"background":"浸潤性乳管癌(IDC)為『最常見之侵襲性乳癌,約占50–70%』(A);本例ER/PR強陽性、HER2(1+)→以荷爾蒙治療為主。","options":{"A":"★正確(本題答案):IDC 最常見(50–70%)。","B":"錯:停經前用 tamoxifen,非 AI。","C":"錯:HER2 1+為陰性,不需標靶。","D":"錯:術後為 pT1bN0M0(病理),非 cT。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"109080-41":{"quick":"正確為 B:全乳切除 vs 乳房保留+放療,長期存活率無顯著差異。","detail":{"background":"早期乳癌『全乳切除 vs 乳房保留+放療長期存活率無顯著差異』(B);選擇依腫瘤/乳房比例、病人意願、放療可行性。","options":{"A":"錯:即時重建不降低存活/不增局部復發。","B":"★正確(本題答案):兩者長期存活無顯著差異。","C":"錯:切緣「無墨染腫瘤」即可,不需>2 mm。","D":"錯:乳房保留同側局部復發率略高於全切。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"110020-35":{"quick":"腋下 level II 位於 D:小胸肌「下方(後方)」。","detail":{"background":"腋下淋巴分三區:level I(胸小肌外側)、level II(胸小肌『後/下方』)、level III(胸小肌內側);故level II位於胸小肌下方(D)。","options":{"A":"非以胸背動脈分界。","B":"非以胸背動脈分界。","C":"胸小肌上方非 level II。","D":"★正確(本題答案):胸小肌下方/後方。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"110020-36":{"quick":"錯在 C:前哨淋巴結陽性「不是」乳房保留手術的禁忌(仍可 BCT+腋下處理)。","detail":{"background":"乳房保留手術禁忌:多中心病灶、瀰漫惡性微鈣化、無法放療(孕婦/曾胸部放療)、切緣持續陽性;『前哨淋巴結陽性不是BCT禁忌』(故C錯)。","options":{"A":"正確:無法放療不宜 BCT。","B":"正確:腫瘤相對乳房過大影響外觀不宜 BCT。","C":"★錯誤(本題答案):前哨淋巴陽性非 BCT 禁忌。","D":"正確:多發不同象限不宜 BCT。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"110080-40":{"quick":"錯在 B:乳房保留手術「並未」統計上「增加」存活率(與全切相當,非增加)。","detail":{"background":"乳房保留手術『與全切存活率相當,並未統計上增加存活』(故B『增加存活』錯);其優點為保留乳房外觀,需配合放療。","options":{"A":"正確:根治切除曾為 1970 年代前基礎。","B":"★錯誤(本題答案):BCT 非增加存活(與全切相當)。","C":"正確:切緣殘留增加局部復發。","D":"正確:嚴重肺病者放療受限。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"111080-43":{"quick":"最不適當為 D:乳房保留之侵襲性乳癌,<60 歲「不能」以化療取代放療。","detail":{"background":"乳房保留之侵襲性乳癌術後須放療;『年輕(<60歲)病人不能以化療取代放療』(D最不適當)——化放療角色不同。","options":{"A":"適當:DCIS 保留術後放療降復發。","B":"適當:>70 歲、T1、ER+、N0 可考慮省略放療。","C":"適當:全切後多淋巴/>5 cm 仍需放療。","D":"★最不適當(本題答案):化療不能取代放療。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"111080-44":{"quick":"最不適當為 C:停經後婦女「可以」使用 tamoxifen(敘述說不應選用,錯誤)。","detail":{"background":"乳癌荷爾蒙治療:ER/PR陽性者受益;『停經後婦女可使用tamoxifen或芳香環酶抑制劑』(故C『停經後不應用tamoxifen』錯)。","options":{"A":"正確:停經前不直接用 AI。","B":"正確:ER 陽性即使 PR 陰性仍可抗荷爾蒙。","C":"★最不適當(本題答案):停經後可用 tamoxifen。","D":"正確:抗荷爾蒙多於化療後才開始。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"112020-43":{"quick":"錯在 B:術前診斷 DCIS 預計「全乳切除」者「應」做前哨淋巴結切片(全切後無法補做、且可能藏侵襲癌)。","detail":{"background":"乳癌腋下淋巴分期:『預計全乳切除之DCIS應同時做SLNB』(因全切後無法補做、且可能藏侵襲癌)(故B『不需』錯)。","options":{"A":"正確:確診 DCIS(已切除)不需再 SLNB。","B":"★錯誤(本題答案):DCIS 全乳切除應做 SLNB。","C":"侵襲癌 BCT 前哨陰性處置合理。","D":"侵襲癌全切發現 1 顆陽性處置合理。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"112020-44":{"quick":"最恰當為 B:小紅莓(anthracycline)可致白血球低下,最低點(nadir)約化療後第 10–14 天。","detail":{"background":"三陰性乳癌化療含anthracycline(小紅莓)+taxane;anthracycline致『骨髓抑制(白血球低下),nadir約化療後第10–14天』(B),並有心毒性。","options":{"A":"錯:心毒性是 anthracycline,非 taxane。","B":"★正確(本題答案):anthracycline 白血球 nadir 約 10–14 天。","C":"錯:手腳刺麻為 taxane 副作用。","D":"敘述不符。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"112080-43":{"quick":"最不常用於乳癌的化療藥為 C:etoposide(多用於肺癌/生殖細胞瘤)。","detail":{"background":"乳癌常用化療:anthracycline、taxane、cyclophosphamide、5-FU、capecitabine;『etoposide』多用於肺癌/生殖細胞瘤,最不常用於乳癌(C)。","options":{"A":"常用:doxorubicin。","B":"常用:docetaxel。","C":"★最不常用(本題答案):etoposide。","D":"常用:epirubicin。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"113020-41":{"quick":"最不適合乳房保留者為 C:多處不同象限的惡性可疑微鈣化(多中心病灶=BCT 禁忌)。","detail":{"background":"乳房保留手術禁忌之一為『多中心(不同象限)惡性可疑微鈣化』(C)——無法以單一切除取得乾淨切緣並保留外觀。","options":{"A":"E 罩杯、2 cm 腫瘤適合 BCT。","B":"腋下淋巴轉移非 BCT 禁忌。","C":"★最不適合(本題答案):多中心(不同象限)微鈣化。","D":"侵襲性乳癌本身非禁忌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"113070-42":{"quick":"除前哨切片外「還應」腋下清掃者為 A:侵襲性乳癌「全乳切除」後 1 顆前哨陽性(Z0011 僅適用 BCT+放療,不適用全切)。","detail":{"background":"Z0011:BCT+全乳放療之臨床T1-2、1-2顆前哨陽性可免腋下清掃;『全乳切除後1顆前哨陽性者仍應腋下清掃(A)』(不適用Z0011)。","options":{"A":"★正確(本題答案):全乳切除+前哨陽性→需腋下清掃。","B":"DCIS 全切前哨陰性不需清掃。","C":"前哨陰性不需清掃。","D":"BCT+2 顆前哨陽性+放療+全身治療→Z0011 可免清掃。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"114020-43":{"quick":"PARP 抑制劑最適合 B:三陰性(ER−/PR−/HER2−)且具 BRCA1/2 突變之轉移性乳癌。","detail":{"background":"PARP抑制劑(olaparib/talazoparib)用於『具BRCA1/2胚系突變之HER2陰性(含三陰性)轉移性乳癌』(B),利用合成致死。","options":{"A":"ER 陽性無 BRCA 突變,非最適。","B":"★正確(本題答案):三陰性+BRCA 突變。","C":"HER2 3+用標靶,非 PARP。","D":"ER 陽性 HER2 3+,非 PARP。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"115020-14":{"quick":"40F、BRCA1、乳房硬塊,最不適合為 D:正子斷層(PET)(非初步乳房評估工具)。","detail":{"background":"BRCA1帶因、乳房硬塊疑惡性之初步評估:乳房攝影+超音波±MRI、組織切片;『正子斷層(PET)非乳房初步診斷工具』(D最不適合)。","options":{"A":"適合:乳房超音波。","B":"適合:乳房攝影。","C":"適合:MRI(高風險)。","D":"★最不適合(本題答案):PET(非初步乳房評估)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","NCCN Breast Cancer Guideline","ACOSOG Z0011"]}},"101030-42":{"quick":"最不適合作乳房重建的皮瓣為 D:腹網膜瓣(omental flap)。","detail":{"background":"乳房重建常用皮瓣:TRAM/DIEP(腹部)、闊背肌(LD)、義乳;『腹網膜瓣(omental flap)』非乳房重建常用(D最不適合)。","options":{"A":"闊背肌皮瓣可用於重建。","B":"TRAM 為常用重建皮瓣。","C":"上臀動脈穿通枝皮瓣可用。","D":"★最不適合(本題答案):腹網膜瓣。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"103030-20":{"quick":"本題一律給分:帶莖 TRAM 血供來自深下腹動脈;非任何乳房皆適合;抽菸/肥胖為相對禁忌;單根蒂時 zone IV 血流最差。","detail":{"background":"帶莖橫腹直肌肌皮瓣(TRAM):血供來自上腹深動脈(經腹直肌);非任何乳房皆適合、抽菸/肥胖為相對禁忌、單蒂時對側zone IV血流最差;本題敘述爭議故一律給分。","options":{"A":"(給分):血供敘述。","B":"(給分):非任何乳房皆適合。","C":"(給分):抽菸/肥胖相對禁忌。","D":"(給分):zone IV 血流最差。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"103100-20":{"quick":"錯在 C:大而下垂的乳房,「單用闊背肌皮瓣」組織量不足,常需合併義乳。","detail":{"background":"肥胖、抽菸、橫式剖腹疤、E罩杯之乳房重建:『單用闊背肌(LD)皮瓣組織量不足,大而下垂乳房常需合併義乳』(故C錯);TRAM相對禁忌。","options":{"A":"正確:帶莖 TRAM 有脂肪壞死/部分皮瓣壞死風險。","B":"正確:剖腹產史仍可選游離肌肉保留 TRAM。","C":"★錯誤(本題答案):大下垂乳房單用 LD 不足。","D":"正確:DIEP 對腹部供區後遺症最小。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"103100-21":{"quick":"帶莖 TRAM 最大缺點為 B:腹肌無力,甚至腹部疝氣。","detail":{"background":"帶莖TRAM皮瓣最大缺點為『犧牲腹直肌致腹壁無力,甚至腹部疝氣/膨出』(B);DIEP則保留腹直肌可減此後遺症。","options":{"A":"腹部疤痕非最大缺點。","B":"★正確(本題答案):腹肌無力/疝氣。","C":"重建乳房外觀通常自然。","D":"TRAM 皮瓣體積通常足夠。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"107080-41":{"quick":"錯在 A:闊背肌皮瓣組織量有限、常需合併義乳,「最常被使用」之說不正確(自體大量組織多用 TRAM/DIEP)。","detail":{"background":"乳房重建皮瓣:自體大量組織多用『TRAM/DIEP』;『闊背肌(LD)組織量有限、常需合併義乳,非「最常使用」之大量自體重建』(故A錯)。","options":{"A":"★錯誤(本題答案):LD 非最常用(組織量有限)。","B":"正確:LD 可合併義乳。","C":"正確:多數可即時重建。","D":"正確:自體皮瓣有壞死風險。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"108080-14":{"quick":"錯在 C:深下腹動脈穿通支皮瓣(DIEP)「保留腹直肌」(供區後遺症小),若敘述其犧牲腹直肌則錯。","detail":{"background":"乳房重建:DIEP(深下腹動脈穿通支皮瓣)『保留腹直肌、供區後遺症小』;若敘述其犧牲腹直肌則錯(C)。","options":{"A":"正確:帶莖 TRAM 為重建選項。","B":"正確:淺下腹動脈皮瓣(SIEA)可用。","C":"★錯誤(本題答案):DIEP 保留腹直肌(非犧牲)。","D":"正確:游離皮瓣受區血管常接胸背動靜脈。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"108080-36":{"quick":"10 歲女童乳暈下硬塊→D 錯:此為乳房芽(乳腺發育 thelarche)/青春前期變化,「觀察」即可,不應切片(切片會破壞乳腺芽)。","detail":{"background":"10歲女童乳暈下硬塊多為『乳房芽(發育性thelarche)/青春前期變化』,應『觀察』,『不可切片』(切片破壞乳腺芽致發育不良)(故D錯)。","options":{"A":"(屬可接受敘述):青春前期乳房發育。","B":"正確:對側可能隨後出現。","C":"正確:觀察追蹤即可。","D":"★錯誤(本題答案):不應切片(會破壞乳腺芽)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"109080-20":{"quick":"本題答案 D:義乳為多數人選擇、放療致纖維化/脂肪壞死、LD 適小乳房;TRAM/DIEP 重建外觀佳之敘述若被判錯,係因其忽略供區後遺症等限制(依答案鍵 D)。","detail":{"background":"乳房重建各法限制:義乳常見但有莢膜攣縮、放療致纖維化/脂肪壞死、LD適小乳房;本題依答案鍵D,係其對自體皮瓣外觀/限制之敘述判定。","options":{"A":"正確:義乳重建為多數人選擇。","B":"正確:放療致纖維化/脂肪壞死。","C":"正確:LD 適小乳房。","D":"★本題答案:依答案鍵此敘述被判為不完整/錯誤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"110020-37":{"quick":"錯在 C:義乳外觀「會隨時間改變」(莢膜攣縮、下垂不對稱),滿意度隨時間下降,非五年後仍 90%。","detail":{"background":"義乳重建:『外觀會隨時間改變(莢膜攣縮、下垂與對側不對稱),滿意度隨時間下降』(故C『五年後仍90%滿意』錯)。","options":{"A":"正確:義乳對稱性較自體皮瓣好。","B":"正確:近期要放療者須評估適用性。","C":"★錯誤(本題答案):義乳外觀會隨時間改變、滿意度下降。","D":"正確:適合無法久麻者。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"110080-41":{"quick":"錯在 C:闊背肌皮瓣組織量「有限」,「不」適合大乳房重建(需合併義乳)。","detail":{"background":"乳房重建:『闊背肌(LD)皮瓣組織量有限,不適合單獨重建大乳房』(故C錯),大乳房需合併義乳或腹部皮瓣。","options":{"A":"正確:義乳為雙側重建適應症之一。","B":"正確:義乳維持對稱但難自然下垂。","C":"★錯誤(本題答案):LD 組織量有限,不適大乳房單獨重建。","D":"正確:腹部手術史為 TRAM 相對禁忌。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"111020-50":{"quick":"錯在 C:抽菸、喝酒「會影響」TRAM 皮瓣(血流/壞死),非無影響。","detail":{"background":"帶莖TRAM皮瓣:『抽菸、飲酒會影響皮瓣血流,增加部分壞死/脂肪壞死風險』(故C『無影響』錯),為相對禁忌。","options":{"A":"正確:TRAM 可全乳房重建。","B":"正確:肥胖/腹部手術史為相對禁忌。","C":"★錯誤(本題答案):抽菸喝酒會影響皮瓣。","D":"正確:需恢復後才劇烈運動(避免疝氣)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"111080-19":{"quick":"錯在 D:延遲重建不一定「需等 2 年」;乳癌控制後即可,時機個別化。","detail":{"background":"乳房重建時機個別化:可即時或延遲;『延遲重建不一定須等2年』(故D錯),乳癌控制後即可考量。","options":{"A":"正確:每位患者有重建權利、醫師應告知。","B":"正確:義乳重建不影響復發偵測。","C":"正確:常需多步驟手術。","D":"★錯誤(本題答案):延遲重建不一定等 2 年。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"113020-18":{"quick":"正確為 B:義乳重建可能併發不自然、莢膜攣縮等。","detail":{"background":"乳房重建:義乳重建可能併發『外觀不自然、莢膜攣縮、感染/移位』(B正確);自體皮瓣外觀較自然但有供區後遺症。","options":{"A":"DIEP 為穿通支皮瓣(自體),非「最…」絕對化。","B":"★正確(本題答案):義乳併發莢膜攣縮/不自然。","C":"自體游離皮瓣需顯微血管吻合。","D":"BIA-ALCL 與特定義乳相關(罕見),非絕無。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"114070-44":{"quick":"錯在 C:乳房重建「不必」等化療結束半年;即時重建很常見、時機個別化。","detail":{"background":"乳房重建時機:即時重建常見、時機個別化;『不必等化療結束半年才重建』(故C錯)。","options":{"A":"正確:外科醫師建議影響病患選擇。","B":"正確:重建分自體皮瓣與義乳。","C":"★錯誤(本題答案):不必等化療後半年才重建。","D":"(描述性):考慮重建者常較年輕。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"101030-40":{"quick":"正確為 B:發炎性乳癌治療須「多管齊下」(化療+放療+手術),屬 T4、預後差、常已淋巴/遠端轉移。","detail":{"background":"發炎性乳癌:皮膚紅腫熱、橘皮樣、屬T4d、預後差、常已淋巴/遠端轉移;治療須『多模式(先全身化療→手術→放療)』(B正確),非單純抗生素。","options":{"A":"錯:預後差。","B":"★正確(本題答案):化療+放療+手術多管齊下。","C":"錯:屬 T4(非 T3)。","D":"錯:常已淋巴/遠端轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"102030-37":{"quick":"錯在 D:橘皮變化是癌細胞阻塞皮下淋巴所致,「不應只給抗生素」(非感染)。","detail":{"background":"橘皮樣變化(peau d'orange):癌細胞阻塞皮下淋巴致皮膚水腫毛孔凹陷,為侵襲性乳癌徵象,『不應只給抗生素當感染處理』(故D錯),須病理評估。","options":{"A":"正確:癌阻塞皮下淋巴所致。","B":"正確:Stage I 不會有此表現。","C":"正確:可能為發炎性乳癌。","D":"★錯誤(本題答案):非感染,不應只給抗生素。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"102110-5":{"quick":"56F、HRT、雙側光滑小結節→C:近期內安排進一步影像學檢查。","detail":{"background":"停經後長期HRT婦女、乳房攝影BI-RADS 0(不完整)/雙側良性結節→『近期內安排進一步影像學檢查(超音波/加照)』釐清(C)。","options":{"A":"有結節不宜只每年追蹤。","B":"非每半年超音波。","C":"★正確(本題答案):近期進一步影像檢查。","D":"非立即對所有結節粗針切片。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"103030-44":{"quick":"不是乳癌危險因子者為 C:曾罹患乳房纖維腺瘤。","detail":{"background":"乳癌危險因子:女性、年齡、初經早停經晚、未生育、家族史/BRCA、非典型增生、胸部放射、肥胖、荷爾蒙;『曾有乳房纖維腺瘤(良性)』非危險因子(C)。","options":{"A":"是:40 歲初產(初產晚)。","B":"是:BRCA1 突變。","C":"★不是(本題答案):纖維腺瘤病史。","D":"是:非典型管道增生(ADH)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"103100-45":{"quick":"正確為 D:粗針切片為「非典型管道增生(ADH)」應切除(有升級為癌風險)。","detail":{"background":"良性乳房腫瘤:纖維腺瘤可觀察;『粗針切片為非典型管道增生(ADH)者應手術切除』(D)——ADH有升級為DCIS/癌之風險。","options":{"A":"良性瘤非均需切除。","B":"非以>2 cm 為切除依據。","C":"纖維囊腫變化多追蹤。","D":"★正確(本題答案):ADH 應切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"105020-45":{"quick":"不是乳癌危險因子者為 D:嬸嬸罹患乳癌(非一等親,風險增加有限)。","detail":{"background":"乳癌危險因子以『一等親(母/姊妹)』家族史為重;『嬸嬸(非一等親)罹乳癌』風險增加有限,非主要危險因子(D)。","options":{"A":"是:一等親姊妹罹病。","B":"是:40 歲初產。","C":"是:長期 HRT。","D":"★不是(本題答案):嬸嬸(非一等親)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"105100-46":{"quick":"Mondor 病最佳處置為 D:支持性治療。","detail":{"background":"Mondor氏病(乳房/胸壁淺表靜脈血栓性靜脈炎):可觸及壓痛索狀物,為自限性良性疾病,以『支持性治療』為主(D)。","options":{"A":"非手術切除。","B":"非放療。","C":"非荷爾蒙治療。","D":"★正確(本題答案):支持性治療。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"106080-36":{"quick":"錯在 B:有「子宮頸癌」家族/個人史非乳癌危險因子(卵巢癌才是)。","detail":{"background":"乳癌危險因子含家族『乳癌/卵巢癌』史;『子宮頸癌家族/個人史非乳癌危險因子』(故B錯)——卵巢癌(BRCA相關)才是。","options":{"A":"正確:母/姊妹乳癌風險高。","B":"★錯誤(本題答案):子宮頸癌非乳癌危險因子。","C":"正確:卵巢癌(BRCA)增加風險。","D":"正確:初經早/停經晚。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"108030-42":{"quick":"同期別預後最好的組織型為 B:黏液癌(mucinous carcinoma)。","detail":{"background":"同期別下『黏液癌(mucinous/colloid)』與管狀癌等特殊型預後最好(B);發炎性/未分化預後差。","options":{"A":"髓質癌預後尚可但非最好。","B":"★正確(本題答案):黏液癌預後最好。","C":"化生癌預後差。","D":"IDC 為一般型。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"108080-38":{"quick":"錯在 B:Paget 氏病原始病灶在「乳頭(及下方乳管)」,非乳暈。","detail":{"background":"乳房Paget氏病:原始病灶在『乳頭(及其下乳管)』之濕疹樣變化(故B『乳暈』錯),常合併下方乳管原位/侵襲癌。","options":{"A":"正確:由乳管內癌生成。","B":"★錯誤(本題答案):原始病灶在乳頭,非乳暈。","C":"正確:濕疹樣/牛皮癬樣變化。","D":"正確:需切片鑑別。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"109080-1":{"quick":"錯在 C:零期乳癌(原位癌)手術「不」包含 level II 腋下淋巴廓清(原位癌無淋巴轉移;僅全乳切除或疑侵襲時做 SLNB)。","detail":{"background":"零期乳癌(DCIS):癌細胞未穿基底膜、無淋巴轉移;手術『不需做level II腋下淋巴廓清』(C),僅全乳切除或疑侵襲時加SLNB。","options":{"A":"正確:常伴微鈣化。","B":"正確:較易多發。","C":"★錯誤(本題答案):原位癌不需 level II 腋下廓清。","D":"正確:切除後不需化療。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"111020-48":{"quick":"正確為 D:Paget 氏病為癌病灶侵犯乳頭,「常合併下方腫瘤且可有腋下淋巴轉移」。","detail":{"background":"乳房Paget氏病:乳頭乳暈濕疹樣脫屑/滲液,為癌侵犯乳頭表皮,『常合併下方乳管癌且可有腋下淋巴轉移』(D正確)。","options":{"A":"錯:非單純皮膚病、類固醇無效。","B":"錯:非單純癌前、非僅局部切除。","C":"錯:合併侵襲癌時可有腋下轉移。","D":"★正確(本題答案):常合併腫瘤且可腋下轉移。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"111080-42":{"quick":"錯在 B:橘皮變化是「皮下淋巴管被腫瘤阻塞」所致,非 Cooper 韌帶侵犯(Cooper 韌帶侵犯造成的是皮膚『凹陷 dimpling』)。","detail":{"background":"乳房皮膚變化:『橘皮樣(peau d'orange)為皮下淋巴管阻塞所致』(故B『Cooper韌帶侵犯』錯,Cooper韌帶受牽拉造成的是皮膚『凹陷dimpling』)。","options":{"A":"正確:單側腋下轉移須先排除乳癌(隱匿癌)。","B":"★錯誤(本題答案):橘皮為淋巴阻塞,非 Cooper 韌帶侵犯。","C":"正確:乳頭濕疹須排除 Paget。","D":"正確:硬塊因 desmoplastic 反應。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"112080-18":{"quick":"錯在 D:Klinefelter 症候群病患的男性女乳症「與乳癌風險『有』關聯」(Klinefelter 增加男性乳癌風險)。","detail":{"background":"男性女乳症(gynecomastia):雌雄激素失衡致乳腺增生;『Klinefelter症候群之男性女乳與男性乳癌風險「有」關聯』(故D『無關』錯)。","options":{"A":"正確:spironolactone 等藥物可致。","B":"正確:一般良性、與乳癌風險較無關。","C":"正確:生理性見於新生兒/青春期/老年。","D":"★錯誤(本題答案):Klinefelter 增加乳癌風險。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"114020-41":{"quick":"正確為 A:纖維囊腫變化(fibrocystic change)為生理性,追蹤即可、不必手術。","detail":{"background":"纖維囊腫變化(fibrocystic change):與荷爾蒙相關之生理性良性變化(經前脹痛、囊腫),『追蹤即可、不必手術』(A正確)。","options":{"A":"★正確(本題答案):纖維囊腫變化追蹤即可。","B":"錯:ADH 應切除,非僅追蹤。","C":"錯:纖維腺瘤惡性潛能低。","D":"錯:惡性葉狀瘤以廣泛切除為主,非常規輔助化療。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Grabb and Smith’s Plastic Surgery","NCCN Breast Cancer Guideline"]}},"101030-18":{"quick":"FNA 診斷價值最高為 B:乳突癌(細胞學特徵明確);濾泡癌需組織學看被膜/血管侵犯,FNA 無法區分。","detail":{"background":"甲狀腺FNA細胞學對『乳突癌』診斷價值最高(核毛玻璃、核溝、核內包涵體、砂粒體);『濾泡癌』需看被膜/血管侵犯,FNA無法區分良惡(故乳突癌B最高)。","options":{"A":"濾泡癌 FNA 無法分良惡。","B":"★正確(本題答案):乳突癌。","C":"髓質癌需 calcitonin/免疫染色輔助。","D":"未分化癌診斷靠切片。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"101030-19":{"quick":"橫斷帶狀肌應在「高位近環狀軟骨」以保留 C:頸襻(ansa,支配帶狀肌的運動神經由下方進入)。","detail":{"background":"甲狀腺手術橫斷帶狀肌(胸甲狀肌、胸舌骨肌)應在『高位近環狀軟骨』處,以保留支配帶狀肌之運動神經『頸襻(ansa cervicalis)』——其由下方進入肌肉(C)。","options":{"A":"上喉神經非帶狀肌支配。","B":"返喉神經支配喉內肌。","C":"★正確(本題答案):頸襻(ansa)。","D":"非脊髓神經。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"102030-46":{"quick":"錯在 B:副濾泡細胞(parafollicular/C cells)分泌「calcitonin」,thyroglobulin 由濾泡細胞分泌。","detail":{"background":"甲狀腺組織學:濾泡細胞分泌甲狀腺球蛋白與T3/T4;『副濾泡細胞(C細胞)分泌降鈣素(calcitonin)』非thyroglobulin(故B錯)。","options":{"A":"正確:T4 半衰期約一週。","B":"★錯誤(本題答案):C 細胞分泌 calcitonin,非 thyroglobulin。","C":"正確:T3 半衰期約 8–12 小時。","D":"正確:髓質癌源自 C 細胞。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"102110-4":{"quick":"52F、5 cm 硬固定、侵犯肌肉氣管、疑惡性→C:先行甲狀腺全切除術。","detail":{"background":"甲狀腺結節惡性徵象:硬而固定、侵犯肌肉/氣管、超音波低回音+邊緣不規則、FNA疑乳突癌→應行『甲狀腺全切除術』(C)取得根治並評估淋巴。","options":{"A":"碘 131 用於術後輔助,非首選。","B":"惡性不可只追蹤。","C":"★正確(本題答案):甲狀腺全切除。","D":"體外放療非首選(分化癌)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"102110-43":{"quick":"甲狀腺毒性腺瘤(單一自主結節)最佳手術為 A:患側單葉切除。","detail":{"background":"甲狀腺毒性腺瘤(單一自主性高功能結節):甲亢來自單一結節;手術以『患側單葉切除』即可(A),或放射碘;非全切。","options":{"A":"★正確(本題答案):患側單葉切除。","B":"次全切除可能殘留。","C":"對側正常不需處理。","D":"雙側全切除過度。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"103030-42":{"quick":"長期類固醇病人術後發燒→應檢查 D:血中可體松(cortisol)及 ACTH(評估腎上腺功能不全/危象)。","detail":{"background":"長期服類固醇病人手術為壓力源,術後可發生『急性腎上腺功能不全/危象』(發燒、無力、低血壓);應檢查『血中cortisol與ACTH』(D)並補充類固醇。","options":{"A":"T3 非首要。","B":"T4 非首要。","C":"TSH 非首要。","D":"★正確(本題答案):cortisol 與 ACTH(評估腎上腺危象)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"103030-43":{"quick":"腎上腺危象治療為 C(124):0.9% 鹽水(1)、hydrocortisone(2)、5% 葡萄糖(4);不需甲狀腺素(3)。","detail":{"background":"腎上腺危象治療:大量『0.9%生理食鹽水』補血容(1)、立即『hydrocortisone』(2)、合併低血糖給『5%葡萄糖』(4);本例非甲狀腺低下故『不需甲狀腺素(3)』→124(C)。","options":{"A":"123:含 3(甲狀腺素,不需)。","B":"234:含 3。","C":"★正確(本題答案):1、2、4。","D":"134:含 3。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"103100-42":{"quick":"較不宜手術的甲亢病人為 A:藥物反應佳且無甲狀腺腫瘤(無手術指徵)。","detail":{"background":"甲亢手術指徵:大甲狀腺腫壓迫、合併可疑結節、藥物無效/不耐、孕婦無法用藥、美觀/快速控制需求;『藥物反應佳且無甲狀腺腫瘤者』無手術指徵(A較不宜)。","options":{"A":"★較不宜(本題答案):藥物反應佳、無腫瘤。","B":"年輕者可考慮手術根治。","C":"計畫懷孕可手術(避碘/藥)。","D":"嚴重凸眼可手術。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"104090-39":{"quick":"正確為 D:乳突癌的高細胞、島細胞、圓柱細胞變異「預後較差」。","detail":{"background":"甲狀腺乳突癌:最常見、預後佳、淋巴轉移為主;但『高細胞型、島狀、圓柱細胞等變異型預後較差』(D正確),屬侵襲性亞型。","options":{"A":"錯:女性發生率較男性高。","B":"錯:乳突癌以淋巴轉移為主、血行(肺)較少。","C":"錯:乳突癌常多發。","D":"★正確(本題答案):高細胞/島細胞/圓柱細胞變異預後差。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"105020-39":{"quick":"錯在 D:甲狀腺風暴退燒應用「acetaminophen」,「禁用阿斯匹靈」(水楊酸使游離 T4 上升)。","detail":{"background":"甲狀腺風暴治療:β-blocker、PTU/methimazole、碘劑、類固醇、降溫。退燒用『acetaminophen』,『禁用aspirin/水楊酸』(置換結合使游離T4上升,故D錯)。","options":{"A":"正確:抗甲狀腺藥(PTU)抑 T4→T3。","B":"正確:β-blocker 抑 T4→T3。","C":"正確:Lugol 碘劑抑荷爾蒙釋放。","D":"★錯誤(本題答案):禁阿斯匹靈,應用 acetaminophen。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"105020-40":{"quick":"錯在 A:未分化癌「可能」由分化良好型甲狀腺癌「去分化」而來。","detail":{"background":"未分化(anaplastic)甲狀腺癌:極惡性、老年、快速增大壓迫;『可能由分化良好型去分化而來』(故A『不會』錯);預後極差。","options":{"A":"★錯誤(本題答案):可由分化良好癌去分化而來。","B":"正確:常需切片或氣切(壓迫)。","C":"正確:放化療效果不彰。","D":"正確:很少能根除、預後極差。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"105020-41":{"quick":"錯在 C:髓質癌若「合併嗜鉻細胞瘤(MEN2)」,應「先處理嗜鉻細胞瘤(腎上腺切除)」再做甲狀腺手術(避免術中高血壓危象)。","detail":{"background":"甲狀腺髓質癌:源自C細胞、分泌calcitonin、可為MEN2;『若合併嗜鉻細胞瘤,應先處理嗜鉻細胞瘤(腎上腺切除)再做甲狀腺手術』以免術中高血壓危象(故C先甲狀腺錯)。","options":{"A":"正確:全切除+中央區淋巴清掃。","B":"正確:診斷用 CEA、calcitonin、細胞學。","C":"★錯誤(本題答案):應先處理嗜鉻細胞瘤。","D":"正確:碘 131 對髓質癌無效。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"105100-43":{"quick":"分化良好甲狀腺癌頸部淋巴轉移最常見/最少見為 D:第六區(中央,最常見)及第一區(最少見)。","detail":{"background":"分化良好甲狀腺癌頸部淋巴轉移以『第六區(中央/氣管旁)最常見』,『第一區(頦下/頷下)最少見』(D);故中央區廓清為常規考量。","options":{"A":"非 level I/II。","B":"非 level III/IV。","C":"非 level V/VI 組合。","D":"★正確(本題答案):第六區最常見、第一區最少見。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"105100-45":{"quick":"錯在 C:喉返神經切斷「可嘗試縫補(神經吻合)」,非不宜縫補。","detail":{"background":"喉返神經(RLN)受傷:單側致同側聲帶麻痺/沙啞,雙側致呼吸道阻塞;『術中切斷可嘗試立即神經吻合(縫補)』以利恢復(故C『不宜縫補』錯)。","options":{"A":"正確:聲帶麻痺於旁中位。","B":"正確:聲音沙啞。","C":"★錯誤(本題答案):可嘗試縫補修復。","D":"正確:環甲肌由上喉神經外支支配,不受 RLN 影響。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"106020-44":{"quick":"錯在 A:濾泡癌多「單發(unifocal)」,乳突癌才常多發。","detail":{"background":"甲狀腺濾泡癌:多為『單發(unifocal)』、經血行轉移(肺/骨)、需被膜/血管侵犯確診;『乳突癌』才常多發/淋巴轉移(故A『濾泡癌多發』錯)。","options":{"A":"★錯誤(本題答案):濾泡癌多單發。","B":"正確:有被膜侵犯。","C":"正確:有血管侵犯。","D":"正確:較少淋巴轉移(以血行為主)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"106080-30":{"quick":"乳突癌 T3N1a 最佳術式為 B:甲狀腺全切除+頸部第六區(中央)淋巴廓清。","detail":{"background":"甲狀腺乳突癌T3N1a:治療為『甲狀腺全切除+中央區(level VI)淋巴廓清』(B),術後視風險給放射碘與TSH抑制。","options":{"A":"有 N1a 中央轉移,需加中央區廓清。","B":"★正確(本題答案):全切除+第六區廓清。","C":"N1a 為中央,不需 level IV/V。","D":"無側頸轉移不需 level II–V。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"106080-31":{"quick":"不是胚胎發育異常之甲狀腺位置變異者為 C:迷路甲狀腺(lateral aberrant thyroid,實為乳突癌之頸側淋巴轉移)。","detail":{"background":"甲狀腺胚胎異位:舌甲狀腺、甲狀舌管殘留、胸骨後甲狀腺;『側位迷路甲狀腺(lateral aberrant thyroid)』實為乳突癌之頸側淋巴轉移,非胚胎異位(C)。","options":{"A":"舌後甲狀腺為發育變異。","B":"異位甲狀腺為發育變異。","C":"★不是(本題答案):側方迷路甲狀腺實為乳突癌淋巴轉移。","D":"甲狀舌管囊腫為發育變異。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"107020-39":{"quick":"放射碘治療敘述錯在 D:第「I 期」(低風險)病人一般「不需」常規放射碘。","detail":{"background":"分化良好甲狀腺癌之放射碘(RAI)用於中高風險(殘餘、淋巴/遠端轉移、侵犯);『第I期低風險病人一般不需常規RAI』(故D錯)。","options":{"A":"正確:III、IV 期病人。","B":"正確:II 期<45 歲。","C":"正確:大部分 II 期>45 歲。","D":"★錯誤(本題答案):I 期低風險不需常規 RAI。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"107080-36":{"quick":"錯在 D:頸交感幹受傷導致「Horner 症候群」(非 Werner 症候群)。","detail":{"background":"甲狀腺手術神經損傷:RLN(聲帶)、上喉神經外分枝(環甲肌/高音);『頸交感幹受傷→Horner症候群』,非Werner症候群(故D錯)。","options":{"A":"正確:傷返喉神經→聲帶麻痺。","B":"正確:傷上喉神經外支→高音/發聲無力。","C":"正確:上喉神經內支(感覺)手術不易傷。","D":"★錯誤(本題答案):頸交感幹傷致 Horner 症候群。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"108080-34":{"quick":"全切除後「不」適合碘 131 者為 C:甲狀腺髓質癌(C 細胞不攝碘,RAI 無效)。","detail":{"background":"甲狀腺全切除後碘-131用於分化型(乳突/濾泡)癌;『髓質癌(C細胞不攝碘)不適合RAI』(C);未分化癌亦不攝碘。","options":{"A":"乳突癌可 RAI。","B":"濾泡癌可 RAI。","C":"★正確(本題答案):髓質癌不攝碘,RAI 無效。","D":"Hürthle 細胞癌攝碘較差但仍屬分化型。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"108080-46":{"quick":"錯在 C:常規甲狀腺手術(清潔傷口)「不需」預防性抗生素。","detail":{"background":"甲狀腺手術前照護:評估功能(甲亢先控制)、聲帶、鈣;『常規甲狀腺手術屬清潔傷口,不需預防性抗生素』(故C錯)。","options":{"A":"正確:Graves 術前給 Lugol。","B":"正確:甲亢先抗甲狀腺藥。","C":"★錯誤(本題答案):清潔手術不需預防抗生素。","D":"正確:聲啞者術前喉鏡檢查。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline"]}},"109020-31":{"quick":"錯在 A:全切除「增加」副甲狀腺低下及喉返神經傷併發症(非減少)。","detail":{"background":"甲狀腺全切除vs單葉:全切利於RAI追蹤Tg,但『增加副甲狀腺低下與雙側喉返神經損傷之併發症』(故A『減少併發症』錯)。","options":{"A":"★錯誤(本題答案):全切除增加併發症。","B":"正確:可用 thyroglobulin 追蹤。","C":"正確:利於術後 I-131。","D":"正確:需終生補甲狀腺素。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"109020-32":{"quick":"甲狀腺風暴不宜給 B:amiodarone(富含碘,惡化甲亢)。","detail":{"background":"甲狀腺風暴『不宜』給『amiodarone』(B,富含碘惡化甲亢);應用β-blocker、抗甲狀腺藥、碘劑(在抗甲狀腺藥後)、類固醇。","options":{"A":"可用:β-blocker。","B":"★不宜(本題答案):amiodarone 含碘。","C":"可用:類固醇。","D":"可用:PTU。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"109020-33":{"quick":"甲狀腺結節最不優先為 C:正子攝影(PET)。","detail":{"background":"甲狀腺結節評估首選TSH與『超音波』、視情況FNA;『正子攝影(PET)』非結節常規檢查(C)。","options":{"A":"優先:超音波+FNA。","B":"胸骨後甲狀腺腫用 CT/MRI 合理。","C":"★不優先(本題答案):PET。","D":"TSH 低之濾泡瘤可用核醫掃描看功能。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"109080-37":{"quick":"正確為 D:乳突癌合併頸淋巴及肺轉移,「全切除+術後 I-131」為治療選項。","detail":{"background":"甲狀腺乳突癌合併頸淋巴及肺轉移仍以『全甲狀腺切除+術後放射碘(I-131)』為治療選項(D,分化型遠端轉移仍可RAI),配合TSH抑制。","options":{"A":"錯:非首選化療(paclitaxel 無效)。","B":"錯:乳突癌即使轉移預後仍佳,非一年內死亡。","C":"錯:methimazole 不抑腫瘤。","D":"★正確(本題答案):全切除+I-131。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"110020-53":{"quick":"使懷疑惡性者「除外」B:心悸(屬甲亢功能性,非惡性徵象)。","detail":{"background":"甲狀腺結節惡性線索:硬固定、聲音改變、快速增大、頸淋巴腫、放射史、家族髓質癌史;『心悸』屬甲亢(功能性)而非惡性徵象(B除外)。","options":{"A":"惡性徵象:聲音沙啞。","B":"★除外(本題答案):心悸(功能性)。","C":"惡性徵象:吞嚥困難。","D":"惡性徵象:頸部淋巴腫大。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"110020-54":{"quick":"濾泡型腫瘤(Bethesda IV)惡性機率約 B:15~30%。","detail":{"background":"Bethesda甲狀腺細胞學:濾泡型腫瘤(Bethesda IV)惡性機率約『15–30%』(B);FNA無法區分濾泡腺瘤與癌,常需手術確診。","options":{"A":"5–15% 偏低。","B":"★正確(本題答案):15–30%。","C":"60–75% 過高。","D":"97–99% 為 Bethesda VI。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"110020-55":{"quick":"不影響病理預後者為 B:性別。","detail":{"background":"甲狀腺癌TNM病理分期之決定因子:腫瘤大小、被膜外侵犯、淋巴結、遠端轉移、年齡分界;『性別』不影響甲狀腺癌TNM分期(B)。","options":{"A":"影響:年齡。","B":"★不影響(本題答案):性別。","C":"影響:侵犯甲狀腺旁肌肉(被膜外侵犯)。","D":"影響:腫瘤大小。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"110080-36":{"quick":"不是供應甲狀腺的動脈為 B:中甲狀腺動脈(只有中甲狀腺『靜脈』)。","detail":{"background":"甲狀腺血供:上甲狀腺動脈(外頸動脈)、下甲狀腺動脈(甲狀頸幹);『無中甲狀腺動脈,只有中甲狀腺靜脈』(故B不是供應動脈)。","options":{"A":"上甲狀腺動脈供應。","B":"★不是(本題答案):無中甲狀腺動脈。","C":"下甲狀腺動脈供應。","D":"最下甲狀腺動脈(變異)。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"111020-45":{"quick":"對存活率影響力最弱為 B:術前甲狀腺功能高低。","detail":{"background":"分化良好甲狀腺癌預後因子(AMES/AGES):年齡、遠端轉移、腫瘤大小/侵犯、分級為重;『術前甲狀腺功能高低』對存活影響力最弱(B)。","options":{"A":"影響:腫瘤大小。","B":"★影響最弱(本題答案):術前甲狀腺功能。","C":"影響:遠處轉移。","D":"影響:年齡。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"111020-46":{"quick":"甲狀腺術後呼吸困難最不可能為 C:甲狀腺功能低下致氣管黏膜水腫。","detail":{"background":"甲狀腺術後呼吸困難:傷口血腫壓迫、雙側喉返神經麻痺、低血鈣致喉痙攣、氣管軟化;『甲狀腺功能低下致氣管黏膜水腫』最不可能於術後急性發生(C)。","options":{"A":"可能:術後血腫壓迫。","B":"可能:雙側喉返神經傷。","C":"★最不可能(本題答案):甲低致黏膜水腫。","D":"可能:困難插管喉頭水腫。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"111080-41":{"quick":"超音波顯示之乳突癌特性最可能為 B:甲狀腺被膜外侵犯(extrathyroidal extension)。","detail":{"background":"甲狀腺乳突癌超音波惡性特徵(低回音、微鈣化、邊界不規則、縱長>橫);若見『被膜外侵犯(extrathyroidal extension)』提示侵襲性(B),影響分期與術式。","options":{"A":"側頸淋巴轉移需見淋巴結。","B":"★正確(本題答案):被膜外侵犯。","C":"氣管侵犯需見氣管受累。","D":"食道侵犯需見食道受累。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"112020-40":{"quick":"30M、3 cm 乳突癌+level IV+肺轉移,AJCC8 為 B:stage II(<55 歲有遠端轉移=II)。","detail":{"background":"甲狀腺乳突癌AJCC第8版:『年齡<55歲』者即使有遠端(肺)轉移最高僅『第II期』;≥55歲才依T/N/M升期。本例30歲+肺轉移=stage II(B)。","options":{"A":"<55 歲無遠端為 stage I。","B":"★正確(本題答案):<55 歲有遠端轉移=stage II。","C":"<55 歲無 stage III。","D":"<55 歲無 stage IV。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"112080-38":{"quick":"FNA 為 nondiagnostic(Bethesda I)→A:重做細針穿刺細胞學檢查。","detail":{"background":"甲狀腺FNA為『nondiagnostic(Bethesda I)』時,處置為『超音波導引下重做FNA』(A);反覆nondiagnostic或臨床可疑再考慮手術。","options":{"A":"★正確(本題答案):重做 FNA。","B":"放射碘非診斷步驟。","C":"未確診不宜直接切葉。","D":"nondiagnostic 不宜只追蹤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"113020-39":{"quick":"術後亞臨床甲低(TSH 6.0、fT4 正常),「不」屬給予甲狀腺素考量者為 D:TSH 受體抗體(Graves 標記,與補充甲狀腺素無關)。","detail":{"background":"甲狀腺單葉切除後亞臨床甲低(TSH略升、fT4正常)且有橋本氏炎,考量補充甲狀腺素之因素含TSH、抗體、症狀;『TSH受體抗體(Graves標記)』與是否補充無關(D)。","options":{"A":"考量:懷孕(目標 TSH 較低)。","B":"考量:對側結節性甲狀腺腫。","C":"考量:冠心病(須謹慎)。","D":"★非考量(本題答案):TSH 受體抗體。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"113070-40":{"quick":"suspicious for malignancy 術後病理為 B:被膜內濾泡變異型乳突癌(encapsulated follicular variant of PTC)。","detail":{"background":"甲狀腺FNA『suspicious for malignancy(Bethesda V)』惡性風險高,手術後常為乳突癌變異;本例病理為『被膜內濾泡變異型乳突癌(encapsulated FVPTC)』預後佳(B)。","options":{"A":"非 Hürthle 細胞腫瘤。","B":"★正確(本題答案):被膜內濾泡變異型乳突癌。","C":"側方迷路甲狀腺為轉移用語,非此。","D":"低風險不需高劑量 I-131。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"114020-40":{"quick":"Tg 3872 卻 WBS 陰性(碘抗性/TENIS),「最不適當」為 A:再予大劑量放射碘(無效);應考慮 TKI 與緩解性放療。","detail":{"background":"濾泡癌全切除+多次RAI後『Tg升高(3872)但全身碘掃描陰性(碘抗性/TENIS)』:再給大劑量RAI無效(A最不適當);FDG-PET陽性病灶考慮酪胺酸激酶抑制劑與局部放療。","options":{"A":"★最不適當(本題答案):碘抗性再給 RAI 無效。","B":"適當:sorafenib(TKI)。","C":"適當:lenvatinib(TKI)。","D":"適當:骨轉移緩解性放療。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"114070-39":{"quick":"錯在 D:濾泡癌多「單發(unifocal)」,非經常多發。","detail":{"background":"甲狀腺濾泡癌:多『單發(unifocal)』、經血行轉移肺/骨、需被膜/血管侵犯確診;故D『經常多發』錯誤(多發為乳突癌特徵)。","options":{"A":"正確:食鹽加碘後發生率下降。","B":"正確:FNA 無法術前確診濾泡癌(需看被膜/血管侵犯)。","C":"正確:頸淋巴轉移率較低(以血行為主)。","D":"★錯誤(本題答案):濾泡癌多單發,非多發。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"114070-41":{"quick":"胸內甲狀腺腫致上腔靜脈壓迫之徵象為 D:Pemberton 徵象(舉臂後顏面充血/發紺)。","detail":{"background":"胸內甲狀腺腫致上腔靜脈/胸廓入口阻塞之徵象為『Pemberton徵象』:雙臂上舉後顏面充血、發紺、頭頸靜脈怒張(D)。","options":{"A":"Carnett 徵象為腹壁痛。","B":"Kehr 徵象為脾破裂轉移痛。","C":"Phalen 徵象為腕隧道。","D":"★正確(本題答案):Pemberton 徵象。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"115020-12":{"quick":"講話正常但唱不出高音→B:上喉神經外分枝(支配環甲肌)損傷。","detail":{"background":"甲狀腺術後『講話正常但唱不出高音』→『上喉神經外分枝損傷』(支配環甲肌,負責聲帶緊張與高音)(B);喉返神經損傷則為說話沙啞/聲帶麻痺。","options":{"A":"舌下神經支配舌肌。","B":"★正確(本題答案):上喉神經外支(環甲肌→高音)。","C":"喉返神經傷致聲帶麻痺/聲啞。","D":"迷走神經傷影響更廣。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"115020-13":{"quick":"最不適當為 D:p53 為「抑癌基因(tumor suppressor)」,非致癌基因(oncogene)。","detail":{"background":"甲狀腺癌致癌機轉:RET/PTC重組、BRAF V600E、RAS突變為致癌(oncogene)事件;『p53為抑癌基因』非致癌基因(D最不適當)。","options":{"A":"正確:BRAF 突變見於乳突癌/未分化癌。","B":"正確:RET 突變見於髓質癌。","C":"正確:RAS 突變見於濾泡腺瘤/濾泡癌。","D":"★最不適當(本題答案):p53 為抑癌基因,非致癌基因。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","ATA Thyroid Cancer Guideline","AJCC Cancer Staging 8e"]}},"101030-10":{"quick":"洗腎 6 年、高鈣高磷 iPTH 1045+骨痛搔癢=三發性副甲亢→D:副甲狀腺切除術。","detail":{"background":"三發性副甲狀腺機能亢進:長期續發性副甲亢(慢性腎衰/透析)使副甲狀腺自主增生,即使矯正鈣磷仍持續高鈣、iPTH極高(>800–1000)、骨痛搔癢、鈣化防禦;對藥物反應不佳者→副甲狀腺切除術(D)。","options":{"A":"維他命 D 無法解決自主分泌。","B":"類固醇非適應。","C":"鋁劑為磷結合劑但治標。","D":"★正確(本題答案):副甲狀腺切除。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"102030-47":{"quick":"原發性副甲亢(高血壓、潰瘍、輸尿管結石、倦怠無力)→最無診斷價值者 D:三酸甘油脂。","detail":{"background":"原發性副甲亢典型『結石、骨病、腹痛、精神症狀』:高血壓、消化性潰瘍、輸尿管結石、倦怠肌無力。診斷查血鈣、iPTH、24h尿鈣;『三酸甘油脂』與診斷無關(D最無價值)。","options":{"A":"有價值:血鈣。","B":"有價值:鹼性磷酸酶(骨轉換)。","C":"有價值:iPTH。","D":"★最無價值(本題答案):三酸甘油脂。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"102110-42":{"quick":"高鈣風暴敘述錯在 A:病人多「意識抑制/嗜睡」,非焦躁興奮。","detail":{"background":"高鈣風暴(血鈣>14):嚴重脫水、多尿、噁心嘔吐、腎衰、心律不整,神經學上多為『意識抑制/嗜睡/木僵』而非焦躁興奮(故A錯);急救以大量生理食鹽水+利尿、calcitonin/bisphosphonate。","options":{"A":"★錯誤(本題答案):意識抑制非興奮。","B":"正確:血鈣常>16。","C":"正確:副甲增生/癌較易發生。","D":"正確:生理食鹽水+furosemide。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"103100-43":{"quick":"不是復發性副甲手術理由者 A:血鋁>2(鋁中毒骨病是另一問題,非副甲手術指徵)。","detail":{"background":"復發性副甲狀腺手術之理由:殘留/異位增生腺體致持續或復發性高鈣與高iPTH。『血鋁>2(鋁中毒性骨病)』是另一種透析相關骨病,非副甲切除指徵(故A不是理由)。","options":{"A":"★不是(本題答案):血鋁高為鋁骨病,非副甲手術指徵。","B":"是:骨痛搔癢。","C":"是:高鈣+iPTH>1000。","D":"是:骨密度 T<−2.5。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"104090-38":{"quick":"副甲腺瘤術前定位最有效為 B:MIBI(sestamibi)掃描。","detail":{"background":"副甲狀腺腺瘤術前定位:首選『MIBI(99mTc-sestamibi)掃描』(B),常合併頸部超音波,有助微創單腺體切除。","options":{"A":"超音波輔助但敏感度較低。","B":"★正確(本題答案):MIBI/sestamibi。","C":"PET 非首選。","D":"MRI 非首選。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"105100-42":{"quick":"透析後腎移植、iPTH 205+血鈣 12 持續高→C:三發性副甲狀腺機能亢進。","detail":{"background":"三發性副甲亢:長期透析致副甲狀腺自主增生,『腎移植後鈣磷代謝應恢復,卻仍持續高鈣(12)、iPTH升(205)』表示自主分泌→三發性HPT(C),須考慮手術。","options":{"A":"原發性無腎病背景。","B":"續發性多低/正常鈣。","C":"★正確(本題答案):三發性(移植後自主)。","D":"復發性指術後再發。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"106020-46":{"quick":"三發性副甲亢正確為 A:腎移植後一年鈣/PTH 持續升高,應手術治療。","detail":{"background":"三發性副甲亢:腎移植矯正尿毒後,自主增生之副甲狀腺仍持續分泌→持續高鈣高PTH;『移植後一年仍鈣/PTH升高應手術治療』(A正確)。","options":{"A":"★正確(本題答案):移植後持續高鈣/PTH 應手術。","B":"症狀不嚴重非絕對手術。","C":"骨密度未降非手術主因。","D":"不全切除易再發。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"107020-37":{"quick":"MEN 敘述錯在 D:「無 MEN 2C」(嗜鉻細胞瘤見於 MEN2A、2B)。","detail":{"background":"多發性內分泌贅瘤(MEN):MEN1(副甲狀腺、胰島、腦垂體)、MEN2A(髓質癌+嗜鉻細胞瘤+副甲亢)、MEN2B(髓質癌+嗜鉻+黏膜神經瘤);『無MEN 2C型』(故D錯)。","options":{"A":"正確:MEN1 含副甲亢。","B":"正確:MEN2A 含髓質癌。","C":"正確:MEN2B 含髓質癌。","D":"★錯誤(本題答案):無 MEN 2C。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"107080-37":{"quick":"無症狀原發性副甲亢「非」手術適應症者 D:年齡>60(指引為「年齡<50」)。","detail":{"background":"無症狀原發性副甲亢之手術指引:血鈣高於上限>1mg/dL、eGFR<60、骨密度T<−2.5或骨折、尿鈣高、『年齡<50歲』。故D『年齡>60』非手術指徵(年輕者才建議手術)。","options":{"A":"適應症:T<−2.5。","B":"適應症:CrCl<60。","C":"適應症:血鈣>上限 1.0 mg/dL。","D":"★非適應症(本題答案):指引為年齡<50,非>60。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"108030-39":{"quick":"MEN1+副甲亢,10 年前手術後又升高→D:復發性(recurrent)副甲狀腺機能亢進。","detail":{"background":"副甲亢『復發(recurrent)』:術後血鈣/iPTH曾恢復正常≥6個月後再升高(MEN1易多腺體增生復發);與『持續性(persistent,術後未曾正常)』不同→本例為復發性(D)。","options":{"A":"非續發性。","B":"非三發性。","C":"持續性指術後未曾正常。","D":"★正確(本題答案):曾正常後再發=復發性。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"109080-38":{"quick":"續發性副甲亢應手術者 D:下肢疼痛性缺血皮膚壞死(鈣化防禦 calciphylaxis)。","detail":{"background":"續發性副甲亢(透析)之手術適應症:藥物無法控制之高PTH合併骨痛/骨折、頑固搔癢、轉移性鈣化、『鈣化防禦(下肢疼痛性缺血皮膚壞死)』(D)為強適應症。","options":{"A":"鈣磷乘積 45 不算極高。","B":"PTH 200 未達手術門檻。","C":"維生素 D 16 ng/mL 非手術指徵。","D":"★正確(本題答案):calciphylaxis。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"110080-37":{"quick":"原發性副甲亢+尿鈣 450(高)+甲狀腺結節+抑鈣素→B:MEN 2A(髓質癌+副甲亢)。","detail":{"background":"原發性副甲亢合併甲狀腺結節且『抑鈣素(calcitonin)明顯升高』+尿鈣高→提示甲狀腺髓質癌+副甲亢=MEN 2A(B);須查RET基因與嗜鉻細胞瘤。","options":{"A":"MEN1 無髓質癌。","B":"★正確(本題答案):MEN 2A。","C":"FHH 尿鈣低,本例尿鈣高排除。","D":"HPT-jaw 為頜骨腫瘤症候群,非此組合。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"112080-8":{"quick":"腦垂體瘤「非」以手術為第一優先者 D:泌乳激素瘤(prolactinoma,首選多巴胺促效劑)。","detail":{"background":"腦垂體腫瘤治療:多數(生長激素瘤、ACTH瘤、無功能壓迫瘤)以經蝶骨手術為第一線;惟『泌乳激素瘤(prolactinoma)』首選『多巴胺促效劑』藥物而非手術(D)。","options":{"A":"ACTH 瘤手術優先。","B":"GH 瘤手術優先。","C":"TSH 瘤手術優先。","D":"★正確(本題答案):泌乳素瘤藥物優先。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"112080-39":{"quick":"MEN2 術後追蹤錯在 C:CEA/calcitonin 升高應查「髓質癌復發」,「不」做放射碘掃描(髓質癌不攝碘)。","detail":{"background":"MEN2(髓質癌+嗜鉻細胞瘤)術後追蹤:以calcitonin、CEA監測髓質癌復發。髓質癌源自C細胞『不攝碘』,故『放射碘掃描/治療無效』(C不適當);應以影像找復發。","options":{"A":"正確:追蹤鈣磷 PTH 排除副甲亢。","B":"正確:CEA/calcitonin 追蹤髓質癌。","C":"★錯誤(本題答案):髓質癌不攝碘,不做 I-131 掃描。","D":"正確:VMA/腹部 CT 追蹤嗜鉻細胞瘤。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"112080-40":{"quick":"追查 MEN2 家族男童是否會得髓質癌,最佳為 B:檢驗 RET 原癌基因突變。","detail":{"background":"MEN2為體染色體顯性,致病基因為『RET原癌基因』突變;家族成員(尤其幼童)應做『RET基因檢測』(B)以早期診斷並考慮預防性甲狀腺切除。","options":{"A":"thyroglobulin 非髓質癌標記。","B":"★正確(本題答案):RET 基因檢測。","C":"超音波較晚才見腫瘤。","D":"CEA/calcitonin 為已發病後標記。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"113070-39":{"quick":"全副甲切除+自體移植後,「不」因此改善者 C:尿量(可改善骨密度/貧血/長期存活,與尿量無關)。","detail":{"background":"透析續發性副甲亢行全副甲切除+自體移植後:可改善高PTH相關骨病、貧血、搔癢、心血管風險與長期存活;但『與尿量無關』(C)——尿量取決於殘餘腎功能。","options":{"A":"可改善:骨密度。","B":"可改善:血色素(貧血)。","C":"★不改善(本題答案):尿量。","D":"可改善:長期存活。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"114020-38":{"quick":"雙側腎上腺切除後 Nelson 症候群,與其「無關」之症狀 D:聽力障礙。","detail":{"background":"Nelson症候群:雙側腎上腺切除後失去皮質醇負回饋,使垂體ACTH瘤增大、ACTH/MSH大量分泌→皮膚色素沉著、視野缺損、頭痛;與『聽力障礙』無關(D)。","options":{"A":"相關:皮膚色素沈著。","B":"相關:視野缺損。","C":"相關:頭痛。","D":"★無關(本題答案):聽力障礙。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"114070-40":{"quick":"原發性副甲亢正確為 D:sestamibi 掃描對副甲腺瘤定位敏感度高。","detail":{"background":"原發性副甲亢:多為單一腺瘤,高血鈣+iPTH不被抑制;『sestamibi(MIBI)掃描對腺瘤定位敏感度高』(D),術前合併超音波利於微創切除。","options":{"A":"錯:僅少數合併 MEN(非 80%)。","B":"錯:副甲狀腺通常四顆、腺瘤多為單顆。","C":"錯:腺瘤非如此描述。","D":"★正確(本題答案):sestamibi 定位敏感度高。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"103030-50":{"quick":"胸鎖乳突肌下 1/3 前緣小孔流黏液→B:第二對鰓裂瘻管(最常見)。","detail":{"background":"嬰兒『胸鎖乳突肌下1/3前緣之小孔流透明黏液』→『第二對鰓裂瘻管(最常見)』(B),管道通向扁桃窩。","options":{"A":"第一對近外耳/下頷。","B":"★正確(本題答案):第二對鰓裂瘻管。","C":"第三對罕見。","D":"第四對罕見。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"104090-44":{"quick":"甲狀舌管囊腫敘述錯在 D:「不」常發現於新生兒(多在兒童/較大才表現)。","detail":{"background":"甲狀舌管囊腫(thyroglossal duct cyst):頸部中線、隨吞嚥/伸舌上下移動;『多在兒童/較大才表現,「非」常見於新生兒』(故D錯)。","options":{"A":"正確:前頸中央上方。","B":"正確:隨吞嚥上下移動。","C":"正確:需切舌骨中段。","D":"★錯誤(本題答案):非常見於新生兒。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"105100-1":{"quick":"Sistrunk 手術為減少復發須切除 C:舌骨(hyoid bone)中段。","detail":{"background":"甲狀舌管囊腫之Sistrunk手術:為減少復發,除囊腫與管道外須一併切除『舌骨(hyoid bone)中段』(C)。","options":{"A":"非甲狀軟骨。","B":"非環狀軟骨。","C":"★正確(本題答案):舌骨中段。","D":"非杓狀軟骨。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"106080-32":{"quick":"甲狀舌管囊腫敘述錯在 B:「可能」發生乳突癌(雖罕見)。","detail":{"background":"甲狀舌管囊腫:胚胎甲狀腺下降殘留、位中線、隨伸舌移動;『可能(雖罕見)發生乳突癌』(故B『不會』錯);治療為Sistrunk手術。","options":{"A":"正確:頸部中央。","B":"★錯誤(本題答案):可能發生乳突癌。","C":"正確:有時細菌感染。","D":"正確:切舌骨中央。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"107080-45":{"quick":"Sistrunk 手術最正確為 B:切除囊腫、舌骨中段及相連至舌底之管道。","detail":{"background":"Sistrunk手術:切除『甲狀舌管囊腫+舌骨中段+其上連至舌底盲孔之管道』以降低復發(B)。","options":{"A":"不完整(漏管道)。","B":"★正確(本題答案):囊腫+舌骨中段+舌底管道。","C":"不需切甲狀腺。","D":"不需切甲狀腺。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}},"113020-46":{"quick":"胸鎖乳突肌前緣小開口有分泌物→B:第二對鰓裂遺跡瘻管。","detail":{"background":"嬰兒『胸鎖乳突肌前緣皮膚小開口有分泌物』→『第二對鰓裂遺跡瘻管』(B,最常見);須完整切除管道。","options":{"A":"甲狀舌管在中線。","B":"★正確(本題答案):第二對鰓裂瘻管。","C":"淋巴結炎無竇道開口。","D":"淋巴管瘤為囊狀病灶。"},"sources":["Sabiston Textbook of Surgery, 21e","Schwartz’s Principles of Surgery, 11e","Endocrine Society Guideline"]}}},TO=["乳癌影像診斷與篩檢", "乳癌手術‧腋下淋巴‧輔助治療", "乳房重建", "良性乳房疾病與特殊乳癌", "甲狀腺", "副甲狀腺‧鈣‧MEN‧腎上腺‧腦垂體", "頸部先天囊腫"],LEC={"乳癌影像診斷與篩檢":{"title":"乳癌影像診斷與篩檢","html":"\n<p><b>三重評估(triple assessment)：</b>理學檢查＋影像(超音波/乳房攝影)＋切片(粗針/真空輔助)。三者一致才可信。</p>\n<p><b>影像選擇：</b><b>乳房攝影(mammography)</b>對「微鈣化」最敏感、是大量篩檢工具，但「緻密/年輕乳房敏感度差」；<b>超音波</b>分辨實質 vs 囊腫佳、無輻射、適年輕/緻密乳房，但偵測微鈣化不如攝影、操作者依賴；<b>MRI</b>用於高風險(BRCA)、隱匿原發癌、評估範圍。</p>\n<p><b>BI-RADS：</b>0=資料不全需加做影像；1 正常；2 良性；3 可能良性(惡性<2%，6 月追蹤)；4 可疑(惡性 2–95%，須切片；4A低/4B中/4C高)；<b>5 高度可疑(>95%，但「非已證實」)</b>；<b>6 已病理證實之癌</b>。</p>\n<p><b>惡性影像特徵：</b>超音波—低回音、<b>縱比橫大(taller-than-wide)</b>、邊緣不規則/角狀/毛刺、<b>後方陰影衰減</b>、微鈣化；後方回音「加強」反見於囊腫(良性)。皮膚凹陷(dimpling，Cooper 韌帶牽扯)、橘皮(淋巴阻塞)為惡性徵。</p>\n<p><b>切片：</b>粗針(core)可分原位 vs 侵襲、測 ER/PR/HER2；真空輔助偽陰性更低；FNA 僅細胞學、不能確認侵襲，不可僅憑此切全乳。<b>單一乳管自發血性分泌</b>(乳突瘤/乳管內病變)、<b>放射狀疤痕/ADH</b>需切除確認。</p>\n<p><b>台灣國健署篩檢：</b><b>45–69 歲(及 40–44 歲有家族史)每 2 年免費乳房攝影</b>。</p>\n"},"乳癌手術‧腋下淋巴‧輔助治療":{"title":"乳癌手術‧腋下淋巴‧輔助治療","html":"\n<p><b>手術：</b>早期(I/II、無多發、可達乾淨切緣)→<b>乳房保留手術(BCT)＋全乳放療，存活率與全乳切除相當</b>；改良式根治切除(MRM)=全乳＋腋下 level I/II 淋巴清掃(保留胸大小肌)。<b>BCT 禁忌</b>：多中心(不同象限)、瀰漫惡性微鈣化、無法放療、無法乾淨切緣、腫瘤相對乳房過大。</p>\n<p><b>腋下：前哨淋巴結切片(SLNB)</b>=放射同位素＋藍染偵測第一顆可能轉移淋巴；陰性可<b>免全腋下清掃、減少淋巴水腫</b>。<b>Z0011</b>：BCT＋全乳放療＋全身治療下，1–2 顆前哨陽性可免清掃；<b>但全乳切除或前哨≥3 顆仍需清掃</b>。腋下清掃須避免傷胸長神經(→翼狀肩胛)、胸背神經(背闊肌)、<b>肋間臂神經(上臂內側麻木)</b>。</p>\n<p><b>分期(AJCC)：</b>T1≤2 cm、T2 >2–5、T3>5、T4 侵犯胸壁/皮膚(含發炎性癌 T4d)；N1 1–3、N2 4–9、N3≥10/鎖骨上下。</p>\n<p><b>輔助治療(依生物分型)：</b>ER/PR 陽性→抗荷爾蒙(<b>停經前 tamoxifen、停經後 AI 或 tamoxifen</b>；ER 陽性即使 PR 陰性仍可用)；HER2 陽性→trastuzumab 標靶；<b>三陰性(ER−/PR−/HER2−，多 basal-like/BRCA1 相關、預後差)→化療為主，BRCA 突變者可加 PARP 抑制劑</b>。化療常用 anthracycline(心毒性、白血球 nadir d10–14)、taxane(周邊神經病變)。BCT 後需放療、化療不能取代放療。乳房自我檢查(BSE)未證實降低死亡率。</p>\n"},"乳房重建":{"title":"乳房重建","html":"\n<p><b>義乳植入(implant)：</b>對稱性佳、適合無法久麻者；缺點：不自然下垂、<b>莢膜攣縮</b>、外觀「會隨時間改變」滿意度下降、放療易纖維化/脂肪壞死、罕見 BIA-ALCL。是雙側重建適應症之一。</p>\n<p><b>自體皮瓣：</b><b>闊背肌(LD)</b>—組織量「有限」，適小乳房或合併義乳；<b>橫腹直肌(TRAM)</b>—帶莖犧牲腹直肌→腹壁無力/疝氣，抽菸/肥胖/腹部手術史為相對禁忌，單根蒂時 zone IV 血流最差；<b>DIEP(深下腹動脈穿通支)</b>—「保留腹直肌」、供區後遺症最小；游離皮瓣受區血管常接胸背動靜脈。自體皮瓣有皮瓣壞死風險。</p>\n<p><b>時機：</b>可即時或延遲；常需多步驟手術；<b>不需等化療結束半年</b>，時機個別化。每位患者都有重建權利、醫師應告知。</p>\n"},"良性乳房疾病與特殊乳癌":{"title":"良性乳房疾病與特殊乳癌","html":"\n<p><b>纖維囊腫變化</b>(生理性、追蹤)、<b>纖維腺瘤</b>(年輕、惡性潛能低)、葉狀瘤(惡性者廣泛切除)。<b>非典型增生(ADH/ALH)、放射狀疤痕、小葉原位癌→乳癌風險增加，粗針後應切除</b>。Mondor 病(胸壁淺靜脈炎)支持治療。<b>男性女乳症</b>(藥物 spironolactone、生理性於新生兒/青春期/老年；一般與乳癌風險低，<b>但 Klinefelter 增加男性乳癌風險</b>)。10 歲女童乳暈下硬塊=乳房芽，觀察勿切片。</p>\n<p><b>危險因子：</b>年齡、一等親乳癌/BRCA、<b>個人或家族卵巢癌</b>、初經早(<12)/停經晚(>55)、未產/初產晚、HRT、ADH。子宮頸癌、纖維腺瘤病史、二等親(嬸嬸)非危險因子。</p>\n<p><b>Paget 氏病：</b>乳管內癌侵犯「乳頭」表皮(Paget 細胞)，乳頭乳暈濕疹/牛皮癬樣變化，常合併下方 DCIS/侵襲癌、可有腋下轉移，須切片與濕疹鑑別。</p>\n<p><b>發炎性乳癌：</b>橘皮、皮膚紅腫、屬 T4d、預後差、常已轉移；治療「先化療→全乳切除→放療」多管齊下。橘皮=皮下淋巴阻塞(非感染、勿只給抗生素)。<b>特殊型預後</b>：黏液癌(mucinous)最好、管狀/髓質次之；化生癌差。<b>零期癌(DCIS)</b>無淋巴轉移途徑，不需腋下廓清、切除後不需化療。</p>\n"},"甲狀腺":{"title":"甲狀腺","html":"\n<p><b>甲狀腺癌：</b>①<b>乳突癌</b>(最常見、女多、淋巴轉移、常多發、<b>FNA 診斷價值高</b>、預後佳；高細胞/島細胞/圓柱變異差；BRAF/RET 突變)；②<b>濾泡癌</b>(單發、被膜/血管侵犯、血行轉移、FNA 無法分良惡需組織學；RAS 突變)；③<b>髓質癌</b>(C 細胞、calcitonin/CEA、MEN2、<b>不攝碘 RAI 無效</b>、RET)；④<b>未分化癌</b>(可由分化良好癌去分化、預後極差)。</p>\n<p><b>手術與併發症：</b>全切除可用 thyroglobulin 追蹤、利於 I-131、需終生補甲狀腺素，但「增加副甲低下與喉返神經傷」。<b>喉返神經(RLN)傷</b>→聲帶麻痺(旁中位)、聲啞(可嘗試縫補)；<b>上喉神經外支</b>(環甲肌)傷→唱不出高音；頸交感幹傷→<b>Horner</b>；雙側 RLN 傷→呼吸道阻塞。淋巴轉移最常見「第六區(中央)」、最少見「第一區」。血流：上/下/最下甲狀腺動脈，<b>無「中」甲狀腺動脈</b>。</p>\n<p><b>分期/Bethesda：</b>AJCC8 <b><55 歲僅 stage I(無遠端)/II(有遠端)</b>；≥55 才依 T/N/M 分 I–IV。Bethesda：濾泡型(IV)惡性 15–30%；nondiagnostic(I)→重做 FNA；suspicious(V)。RAI 用於高風險(III/IV、部分 II)，I 期低風險不需。Tg 高但 WBS 陰性=碘難治(TENIS)→TKI(sorafenib/lenvatinib)。</p>\n<p><b>甲狀腺風暴：</b>抗甲狀腺藥(PTU)、β-blocker、碘劑(藥後給)、類固醇、<b>退燒用 acetaminophen 禁阿斯匹靈</b>；<b>amiodarone 含碘禁用</b>。毒性腺瘤→患側單葉切除。胸內甲狀腺腫上腔靜脈壓迫→<b>Pemberton 徵</b>。</p>\n"},"副甲狀腺‧鈣‧MEN‧腎上腺‧腦垂體":{"title":"副甲狀腺‧鈣‧MEN‧腎上腺‧腦垂體","html":"\n<p><b>副甲狀腺機能亢進：</b>①<b>原發性</b>(腺瘤 85%；高鈣低磷高 iPTH；無症狀手術指徵—血鈣>上限 1.0、CrCl<60、骨密度 T<−2.5/骨折、<b>年齡<50</b>；定位首選 <b>sestamibi/MIBI</b>)；②<b>續發性</b>(慢性腎病低鈣刺激增生、高磷；手術—藥物無法控制、鈣磷乘積高、<b>calciphylaxis</b>、嚴重骨病/搔癢)；③<b>三發性</b>(長期續發後自主，常見<b>腎移植後仍持續高鈣高 PTH</b>→手術)。<b>高鈣風暴</b>：血鈣>14–16、<b>意識抑制嗜睡(非興奮)</b>，大量生理食鹽水＋furosemide。鋁骨病非副甲手術指徵。</p>\n<p><b>MEN：</b><b>MEN1</b>=副甲＋胰島＋腦垂體(3P)；<b>MEN2A</b>=髓質癌＋嗜鉻細胞瘤＋副甲；<b>MEN2B</b>=髓質癌＋嗜鉻＋黏膜神經瘤/馬凡體型；<b>無 MEN2C</b>。家族以 <b>RET 原癌基因</b>篩檢。合併嗜鉻細胞瘤時「先處理嗜鉻細胞瘤」再甲狀腺手術。</p>\n<p><b>腎上腺/垂體：</b>腦垂體瘤多經蝶竇手術，唯<b>泌乳素瘤首選多巴胺促效劑</b>。雙側腎上腺切除後失負回饋→<b>Nelson 症候群</b>(色素沈著、視野缺損、頭痛)。嗜鉻細胞瘤術前須 α-阻斷。</p>\n"},"頸部先天囊腫":{"title":"頸部先天囊腫","html":"\n<p><b>甲狀舌管囊腫(thyroglossal duct cyst)：</b>頸部「中線」、舌骨附近，隨吞嚥/伸舌上下移動；多在兒童期(非新生兒)；可細菌感染；少數異位甲狀腺組織生乳突癌。<b>Sistrunk 手術</b>=切除囊腫＋<b>舌骨中段</b>＋通往舌底盲孔的管道，降低復發。</p>\n<p><b>鰓裂異常(branchial cleft)：</b><b>第二對最常見</b>，瘻管開口於「胸鎖乳突肌前緣中下 1/3」、自幼流黏液，管道經頸內外動脈之間至扁桃窩；第一對近外耳/下頷；三、四對罕見(近梨狀窩/甲狀腺)。</p>\n"}};

yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_breast_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
