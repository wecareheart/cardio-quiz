const Q=[{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":10,"stem":"病人46 歲女性,慢性腎衰竭,規則血液透析6 年,一年前開始有骨頭疼痛及皮膚發癢感,經查血鈣11.0 mg/dL(8.5-10.5),磷5.7 mg/dL(2.7-4.5),iPTH 1045 pg/mL(12-65),經給予降磷劑及維他命D3 治療後,鈣降至9.0 mg/dL,磷降至4.2 mg/dL,iPTH 750 pg/mL,症狀減輕,但經過2 個月後,骨頭疼痛及皮膚發癢等症狀再度發作,經檢查iPTH 1650 pg/mL,鈣11.5 mg/dL,而且副甲狀腺核醫掃描發現二側上下副甲狀腺腫大,下列何者是最好的治療?","options":{"A":"維他命D3 口服0.5 mg/QD","B":"口服類固醇治療","C":"aluminum hydroxy 膠囊口服3 顆/QD","D":"副甲狀腺切除術"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"101030-10","topic":"副甲狀腺‧鈣‧MEN‧腎上腺‧腦垂體","topic_code":"T6","id":"101030-10","q_num":10,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":18,"stem":"細針抽吸(FNA)細胞學檢查,對於下列何種甲狀腺癌診斷價值最高?","options":{"A":"濾泡癌(follicular carcinoma)","B":"乳突狀癌(papillary carcinoma)","C":"髓樣癌(medullary carcinoma)","D":"分化不全癌(anaplastic carcinoma)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"101030-18","topic":"甲狀腺","topic_code":"T5","id":"101030-18","q_num":18,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":19,"stem":"甲狀腺手術時,如果需要橫斷胸甲狀肌(sternothyroid m.)及胸舌骨肌(sternohyoid m.)時,最好打斷的位置在較高位接近環狀軟骨水平(cricoid level)位置,以保留何種運動神經?","options":{"A":"上喉神經(superior laryngeal nerve)","B":"返喉神經(recurrent laryngeal nerve)","C":"舌下神經襻(ansa hypoglossi)","D":"脊髓神經(spinal nerve)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"101030-19","topic":"甲狀腺","topic_code":"T5","id":"101030-19","q_num":19,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":20,"stem":"乳房手術中,廓清腋下淋巴時,最重要避免對長胸神經(long thoracic nerve)之傷害,其主要原因為何?","options":{"A":"會引起胸小肌(pectoralis minor muscle)萎縮","B":"避免引起翼肩胛骨(winged scapula)","C":"會引起手臂內部麻痺(paralysis)","D":"引起淋巴水腫(lymphedema)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"101030-20","topic":"乳癌手術‧腋下淋巴‧輔助治療","topic_code":"T2","id":"101030-20","q_num":20,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":38,"stem":"35 歲年輕女性,左外側乳癌,離乳暈3 公分處,腫瘤大小1 公分×1 公分,術前粗針切片(core biopsy)病理證實為浸潤性管道腺癌,腋下無觸摸到之淋巴結,則下列何種手術方法最適當?","options":{"A":"改良性根除性乳房全切除術(modified radical mastectomy)","B":"乳房保留性手術(breast conserving surgery)","C":"乳房部分切除術(partial mastectomy)","D":"乳房部分切除術(partial mastectomy)+哨兵淋巴結手術(sentinel node biopsy)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"101030-38","topic":"乳癌手術‧腋下淋巴‧輔助治療","topic_code":"T2","id":"101030-38","q_num":38,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":40,"stem":"下列對於乳房之發炎性癌(inflammatory carcinoma)的敘述,何者正確?","options":{"A":"預後佳","B":"治療方式常須多管齊下,包括化學治療、放射線治療及手術治療","C":"在乳癌分期上,屬TNM 系統的T3","D":"這些患者常沒有腋下淋巴結轉移或全身其他器官轉移"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"101030-40","topic":"良性乳房疾病與特殊乳癌","topic_code":"T4","id":"101030-40","q_num":40,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":42,"stem":"林小姐罹患乳癌須接受一側乳房切除,她想同時接受乳房重建手術,則下列那一個皮瓣最不適合用來作為乳房重建之用?","options":{"A":"闊背肌肌皮瓣(latissimus dorsi muscle flap)","B":"橫腹直肌皮瓣(transverse rectus abdominis myocutaneous flap)","C":"上臀動脈穿通枝皮瓣(superior gluteal artery perforator flap)","D":"腹網膜瓣(omental flap)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"101030-42","topic":"乳房重建","topic_code":"T3","id":"101030-42","q_num":42,"src":"民國101年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":2,"stem":"一位46 歲經期規則婦女,未曾生育,發現左側乳房有一腫塊約兩個月,至門診就診。乳房檢查外觀對稱,皮膚無凹陷。觸診發現左側乳房2 點鐘方向有一腫瘤,外緣不規則,但是可以移動,約3 公分大小。超音波檢查顯示低回音病灶(hypoechoic lesion),乳房X 光攝影(mammography)也顯示左乳房腫瘤併微小鈣化(microcalcifications),兩者檢查結果報告均為BI-RADS(Breast Imaging Reportingand Data System)Category: 4。則下列何者為對病患最適宜的建議?","options":{"A":"高度懷疑為惡性腫瘤可直接安排乳房切除手術(mastectomy)","B":"可安排門診6 個月後再追蹤","C":"可追蹤3 個月再安排超音波及乳房X 光攝影檢查","D":"安排門診粗針穿刺切片檢查(core needle biopsy)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"102030-2","topic":"乳癌影像診斷與篩檢","topic_code":"T1","id":"102030-2","q_num":2,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":32,"stem":"有關乳房X 光攝影(mammography)檢查的敘述,何者正確?","options":{"A":"小於30 歲的年輕婦女懷疑乳房有硬塊,應先排乳房X 光攝影","B":"50 歲以上婦女mammography sensitivity 較50 歲以下婦女差","C":"乳房脂肪比例會影響mammography sensitivity","D":"mammography 會因不同檢查者而影響檢查結果,亦即operator-dependent"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"102030-32","topic":"乳癌影像診斷與篩檢","topic_code":"T1","id":"102030-32","q_num":32,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":33,"stem":"38 歲停經前女性,其乳癌病理為浸潤性乳腺管道腺癌,腫瘤大小為3.5 公分,女性賀爾蒙接受器(Estrogen Receptor)陰性,黃體酮接受器(Progesterone Receptor)陰性,第二型上皮成長因子接受器(HER2/NEU)為陰性,則其手術後該如何處理?","options":{"A":"不用輔助性治療","B":"輔助性化學藥物治療(Chemotherapy)","C":"輔助性標靶治療(Target therapy)","D":"輔助性抗賀爾蒙治療(Anti-estrogen therapy)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"102030-33","topic":"乳癌手術‧腋下淋巴‧輔助治療","topic_code":"T2","id":"102030-33","q_num":33,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":34,"stem":"王小姐48 歲,平時生理週期規律正常,一週前在左側乳房摸到一個腫塊,因此她到外科門診希望接受進一步診療。對於王小姐的主訴首先施行的診療措施,下列敘述何者正確?","options":{"A":"進行乳房的身體診查時,首先應請病患端坐,目視兩側乳房是否為對稱、皮膚有無變化、乳頭是否凹陷等徵象。若皮膚呈紅斑(erythema)及水腫(edema)則應考慮切片檢查","B":"觸診乳房如果腫塊較硬且界線不明,移動時會牽扯到周圍鄰近的組織,就要懷疑有惡性的可能。尤其當腫塊有壓痛的症狀時,對於鑑別良性與惡性腫瘤很有助益","C":"於門診施行細針穿刺(fine-needle aspiration)檢查,可以鑑別診斷是屬於侵襲癌或原位癌,尤其針對鑑別腫塊是實質腫瘤(solid)或是囊狀腫瘤(cystic)幫助很大","D":"乳房攝影檢查的敏感性,在年輕的或乳房緻密的病人則較差,所以目前乳房超音波成為無症狀婦女篩檢乳癌的影像檢查首選"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"102030-34","topic":"乳癌影像診斷與篩檢","topic_code":"T1","id":"102030-34","q_num":34,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":37,"stem":"身體診查發現乳房出現橘子皮變化(peau d’orange 或orange peel appearance)時,下列敘述何者錯誤?","options":{"A":"此變化乃因癌細胞阻塞皮下淋巴循環造成","B":"Stage I 乳癌不會有此表現","C":"有可能是發炎性乳癌(inflammatory breast cancer)","D":"應給予抗生素"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"102030-37","topic":"良性乳房疾病與特殊乳癌","topic_code":"T4","id":"102030-37","q_num":37,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":46,"stem":"下列有關甲狀腺之敘述,何者錯誤?","options":{"A":"成人T4 之半衰期約一星期","B":"Parafollicular cells 分泌thyroglobulin","C":"成人T3 之半衰期約8 至12 小時","D":"甲狀腺髓質癌由parafollicular cells 病變而來"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"102030-46","topic":"甲狀腺","topic_code":"T5","id":"102030-46","q_num":46,"src":"民國102年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":47,"stem":"50 歲男性,過去有高血壓及十二指腸潰瘍病史,上個月曾經因為左側輸尿管結石去過急診,最近常感到倦怠、四肢肌肉無力,則下列何種檢查,較無診斷價值?","options":{"A":"血鈣濃度","B":"血中鹼性磷酸酶(alkaline phosphatase)濃度","C":"血中副甲狀腺素(iPTH)濃度","D":"血中三酸甘油脂(triglyceride)濃度情況:一週大的早產兒出現腹脹、嘔吐且大便潛血呈陽性。依此回答下列第48 題至第50 題:"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"102030-47","topic":"副甲狀腺‧鈣‧MEN‧腎上腺‧腦垂體","topic_code":"T6","id":"102030-47","q_num":47,"src":"民國102年第一次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":4,"stem":"一位52 歲女性病人,有前頸部腫瘤,無心悸等症狀,身體診查發現5 公分結節,在左葉甲狀腺位置硬而不易移動,甲狀腺功能正常,超音波掃描顯示低回音及邊緣不規則,且有周圍肌肉及氣管界線不清之現象,細胞穿刺檢查為疑似甲狀腺乳突癌(papillary carcinoma),無淋巴腺腫大,胸部放射線影像及骨頭掃描正常,下列何者是最好的治療?","options":{"A":"先行碘131 治療","B":"繼續追蹤觀察","C":"先行甲狀腺全切除術","D":"先行體外放射線照射治療圖一圖二"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"102110-4","topic":"甲狀腺","topic_code":"T5","id":"102110-4","q_num":4,"src":"民國102年第二次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":5,"stem":"一位56 歲停經婦女,育有一男一女,長期服用荷爾蒙藥物改善更年期症狀,因電視報導乳癌發生率上升,心生恐懼,至門診求診。乳房檢查外觀對稱,皮膚無凹陷,觸診兩側乳房皆有光滑小結節。安排乳房攝影檢查(mammography),檢查結果報告為BI-RADS category:0。下列何者是門診醫師對病患最適宜的建議?","options":{"A":"每年定期乳房攝影檢查追蹤","B":"每半年定期超音波檢查追蹤","C":"近期內需安排進一步影像學檢查","D":"需立即安排門診粗針穿刺檢查(core needle biopsy)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"102110-5","topic":"良性乳房疾病與特殊乳癌","topic_code":"T4","id":"102110-5","q_num":5,"src":"民國102年第二次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":42,"stem":"有關高鈣風暴(hypercalcemic crisis),下列敘述何者錯誤?","options":{"A":"病人多焦躁不安,意識興奮","B":"血鈣超過16 mg/dL","C":"副甲狀腺增生或癌較易發生","D":"治療應給予normal saline infusion 及furosemide"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"102110-42","topic":"副甲狀腺‧鈣‧MEN‧腎上腺‧腦垂體","topic_code":"T6","id":"102110-42","q_num":42,"src":"民國102年第二次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":43,"stem":"甲狀腺毒性腺瘤(toxic adenoma)的手術治療選擇,下列何者最佳?","options":{"A":"患側單葉切除術","B":"患側次全切除術","C":"患側單葉切除及對側次全切除術","D":"雙側全切除術"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"102110-43","topic":"甲狀腺","topic_code":"T5","id":"102110-43","q_num":43,"src":"民國102年第二次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":44,"stem":"王小姐35 歲,於1 週前在左側乳房摸到1 個腫塊,初步檢查後接受了腫塊的組織穿刺檢查,病理化驗報告為ductal carcinoma in situ(DCIS)。你於門診告知其結果後,王小姐與你進一步討論相關的問題與治療計畫。下列敘述何者錯誤?","options":{"A":"王小姐的乳房攝影檢查發現左側乳房有廣泛性的群聚微鈣化點(clustered microcalcification),可能手術切除腫塊組織的邊緣難以乾淨無虞(clear margin),治療可能需要做乳房全切除術","B":"王小姐除了DCIS 外,也有合併侵襲性癌(invasive carcinoma)的可能,手術可以選擇加入前哨淋巴結(sentinel node)切片手術","C":"DCIS 表示癌細胞還在基底膜內沒有侵犯組織,在組織型態上可歸為數類。其中屬於乳突型(papillary type)者轉變為侵襲癌的過程進展快速,惡性度高,如果屬於面皰型(comedo type)者,則相對轉變為侵襲癌的過程較緩慢","D":"DCIS 患者術後接受tamoxifen 的治療,目前臨床試驗(如NSABPB-24 tr s":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112020-40","topic":"甲狀腺","topic_code":"T5","id":"112020-40","q_num":40,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":43,"stem":"有關乳癌的axillary lymph node staging,下列敘述何者錯誤?","options":{"A":"手術後確認診斷ductal carcinoma in situ(DCIS),不需sentinel lymph node biopsy(SLNB)","B":"術前診斷 ductal carcinoma in situ(DCIS)預計全乳房切除,不應做sentinel lymph node biopsy(SLNB)","C":"invasive cancer預計做乳房保留手術併術後放射線治療和化學治療,若有2顆metastatic sentinel nodes,可以不必做axillary lymph node dissection(ALND)","D":"invasive carcinoma做乳房全切除,發現1顆metastatic sentinel lymph node,應做axillary lymph nodedissection(ALND)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112020-43","topic":"乳癌手術‧腋下淋巴‧輔助治療","topic_code":"T2","id":"112020-43","q_num":43,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":44,"stem":"小美被診斷出三陰性乳癌第二期,手術後醫師建議她接受化學藥物治療,其中包含小紅莓類(anthracycline)及紫杉醇類(taxane)藥物。關於這些藥物的副作用描述,下列何者最恰當?","options":{"A":"紫杉醇類(taxane)藥物具心毒性,使用前應安排檢查評估心臟功能","B":"使用小紅莓類(anthracycline)藥物可能造成白血球低下,平均白血球在使用此化療後的第10~14天降至最低,之後逐漸回升","C":"小美在化療期間抱怨手腳刺麻泛紅及下肢水腫,這些副作用較有可能是小紅莓所造成","D":"若小美接受紫杉醇後第10天測得嗜中性白血球(absolute neutrophil count, ANC)降至900/mm3,即使無症狀仍建議施打白血球生長素(granulocyte colony stimulating factor, G-CSF)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112020-44","topic":"乳癌手術‧腋下淋巴‧輔助治療","topic_code":"T2","id":"112020-44","q_num":44,"src":"民國112年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":8,"stem":"有關腦下垂體(pituitary)腫瘤治療,下列何者不是以手術切除為第一優先?","options":{"A":"促腎上腺皮質素瘤(ACTH secreting tumor)","B":"生長激素瘤(growth homone secreting tumor)","C":"甲狀腺刺激素瘤(TSH secreting tumor)","D":"泌乳激素瘤(prolactinoma)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112080-8","topic":"副甲狀腺‧鈣‧MEN‧腎上腺‧腦垂體","topic_code":"T6","id":"112080-8","q_num":8,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":18,"stem":"關於男性女乳症(gynecomastia),下列敘述何者錯誤?","options":{"A":"藥物的作用可能導致男性女乳症的發生,如spironolactone等","B":"一般而言,男性女乳症是一種良性的男性乳房組織增生,與罹患乳癌風險較無關聯","C":"生理性男性女乳症在新生兒期(neonatal period)、青春期(adolescence)及晚年期(senescence)皆可發生","D":"男性女乳症會發現在Klinefelter's syndrome的病患,且與罹患乳癌風險較無關聯"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112080-18","topic":"良性乳房疾病與特殊乳癌","topic_code":"T4","id":"112080-18","q_num":18,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":38,"stem":"一位45歲女性發現左頸部有一腫塊,頸部超音波顯示有一2公分實心(solid)甲狀腺結節,細針穿刺細胞學檢查依Bethesda criteria分類,診斷為nondiagnostic,下列何項進一步處置最為適當?","options":{"A":"重做細針穿刺細胞學檢查","B":"放射性碘治療(radioactive iodine therapy)","C":"左側甲狀腺葉切除","D":"6個月後超音波追蹤檢查"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112080-38","topic":"甲狀腺","topic_code":"T5","id":"112080-38","q_num":38,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":39,"stem":"一位62歲女性病患曾因右側腎上腺嗜鉻細胞瘤(pheochromocytoma)接受右側腎上腺切除手術,術後因左側甲狀腺髓質癌(medullary thyroid carcinoma)接受全甲狀腺切除。下列何者不是適當的追蹤檢查及處置?","options":{"A":"定期檢驗血中鈣、磷、副甲狀腺素以排除原發性副甲狀腺亢進","B":"定時檢驗血中CEA及calcitonin以排除甲狀腺髓質癌再復發","C":"假使CEA及calcitonin有增高,應安排全身放射碘檢查(131I whole body scan)以定位甲狀腺髓質癌再復發位置","D":"定時檢驗尿中VMA及腹部電腦斷層以排除腎上腺嗜鉻細胞瘤再復發"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-39","topic":"副甲狀腺‧鈣‧MEN‧腎上腺‧腦垂體","topic_code":"T6","id":"112080-39","q_num":39,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":40,"stem":"承上題,因上述這位病患確診為第二型多發性內分泌瘤(MEN 2),她的家人檢查結果:妹妹亦罹患甲狀腺髓質癌,女兒罹患腎上腺嗜鉻細胞瘤。她女兒有個2歲的兒子。下列有關追查這位男童是否亦可能罹患甲狀腺髓質癌,何者最適宜?","options":{"A":"定時檢驗血中thyroglobulin","B":"檢驗RET proto-oncogene有無基因突變","C":"定時利用頸超音波檢查以發現甲狀腺腫瘤","D":"定時檢驗血中CEA及calcitonin"},"ans
