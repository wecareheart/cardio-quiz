_num":17,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"過度的悲痛與罪惡感","B":"人際疏離,無法感受到快樂","C":"失眠、反覆的噩夢","D":"經常重返事故地點"},"img":""}],E={"101030-N5-34":{"quick":"抗焦慮劑(BZD)的機轉＝增加 GABA-A 接受體的親和性。","detail":{"background":"抗焦慮劑(benzodiazepine, BZD)的作用機轉是(D)『增加 GABA-A 接受體對 GABA 的親和性，增強氯離子內流、加強中樞「抑制(GABA)」作用』，達到抗焦慮、鎮靜、肌肉鬆弛、抗痙攣效果。A『抑制血清素及正腎上腺素再吸收』是抗憂鬱劑(SNRI)機轉;B『增加鈉內流、鉀外流』非抗焦慮劑機轉;C『阻斷多巴胺傳遞』是抗精神病藥機轉。故 D 正確。BZD 透過增強 GABA 抑制系統來抗焦慮。","options":{"A":"抑制血清素/正腎上腺素再吸收是抗憂鬱劑(SNRI)機轉。","B":"增加鈉內流、鉀外流非抗焦慮劑機轉。","C":"阻斷多巴胺傳遞是抗精神病藥機轉。","D":"正確。增加 GABA-A 接受體的親和性，增強中樞抑制。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","抗焦慮劑"]}},"101110-N5-10":{"quick":"38歲恐慌症的焦慮(生命週期觀點)：與建立生涯的工作壓力源有關。","detail":{"background":"王小姐38歲(成人中期)、恐慌症、目前失業。以生命週期(發展任務)的觀點，最適當的焦慮原因是(B)『與「建立生涯/工作」的壓力源有關』——成人中期的發展任務是建立事業、家庭，失業正是此階段的重大壓力源。A『沒有親密人際關係』偏向成人早期(親密vs孤立)的議題;C『離開父母安全感』偏向青少年/成人早期;D『失去身體功能』偏向老年期。本題38歲、失業，最對應「生涯/工作壓力」。故 B 正確。","options":{"A":"親密關係議題偏向成人早期。","B":"正確。38歲成人中期，與建立生涯的工作壓力源有關。","C":"離開父母安全感偏向青少年/成人早期。","D":"失去身體功能偏向老年期。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","發展·焦慮"]}},"101110-N5-11":{"quick":"恐慌症出院的長期護理目標＝病患能適當調適其焦慮。","detail":{"background":"為恐慌症病人準備出院，最適當的『長期』護理目標是(C)『病患能「適當調適」其焦慮(學會因應、自我管理焦慮)』——這是出院後能在生活中持續運用的長期目標。A『建立治療性人際關係』是短期/過程目標(住院初期);B『確認焦慮來源』、D『描述感覺與行為目的』是過程中的階段性目標。長期目標應著重病人「能自我調適焦慮」的能力。故 C 正確。","options":{"A":"建立治療性人際關係是短期/過程目標。","B":"確認焦慮來源是階段性目標。","C":"正確。病患能適當調適其焦慮，是長期護理目標。","D":"描述感覺與行為目的是過程中的階段性目標。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-12":{"quick":"協助確認焦慮來源「最不適當」＝提供與此疾病相關的知識。","detail":{"background":"協助病人「確認焦慮的來源」，最不適當者為(D)『提供與此疾病相關的「知識」』——提供疾病知識是衛教，與「協助病人確認自身焦慮來源(探索個人的壓力源、情緒與行為的關聯)」不同層次，無法直接幫助病人找出焦慮來源。其他適當:A 鼓勵討論過去相關的壓力源;B 指出情緒與行為間的相關以促進自我了解;C 協助以不同角度解釋事件。故本題選最不適當者為 D。確認焦慮來源著重「個人化的探索與自我覺察」。","options":{"A":"鼓勵討論過去相關的壓力源，有助確認來源。","B":"指出情緒與行為的相關，促進自我了解。","C":"協助以不同角度解釋事件，有助覺察。","D":"正確(本題選最不適當者)。提供疾病知識是衛教，非協助確認個人焦慮來源。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-13":{"quick":"教導放鬆技巧緩解焦慮＝根據「學習(行為)理論」設計。","detail":{"background":"護理師教導焦慮個案『學習有效的放鬆技巧(如深呼吸、漸進式肌肉放鬆)』以緩解焦慮——這是根據『學習(行為)理論』設計的措施(透過學習新的反應/行為來取代焦慮反應，如放鬆訓練、系統減敏感法)。精神分析理論著重潛意識衝突;認知理論著重改變不合理信念;遊戲理論用於兒童。本題是「學習放鬆技巧」這個行為訓練，故為學習理論。故 B 正確。","options":{"A":"精神分析理論著重潛意識衝突。","B":"正確。教導學習放鬆技巧，是根據學習(行為)理論。","C":"認知理論著重改變不合理信念。","D":"遊戲理論主要用於兒童。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","行為理論"]}},"101110-N5-22":{"quick":"風災目睹母親罹難、災後3個月：不斷強烈害怕無助①、症狀至少1個月以上③、反覆經驗再現④(立即社交恐懼②非)。","detail":{"background":"林小姐風災失去民宿、目睹母親被土石流掩埋、災後3個月持續出現症狀——符合『創傷後壓力症(PTSD)』。正確敘述:(1)會不斷出現強烈的害怕與無助感受;(3)PTSD 的診斷要求症狀『至少持續1個月以上』(未滿1個月為急性壓力症);(4)對災難事件不斷反覆的『經驗再現(flashback)』。而(2)『立即出現「對社交情境」的恐懼與恐慌』不符——那是社交焦慮症的描述，非 PTSD。故正確為①③④(選 B)。","options":{"A":"123：含②(社交情境恐懼)，非 PTSD。","B":"正確。強烈害怕無助①、症狀至少1個月③、反覆經驗再現④。","C":"234：含②、缺①，錯誤。","D":"124：含②，錯誤。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","PTSD"]}},"101110-N5-25":{"quick":"心因性厭食症：個案強烈地害怕變胖。","detail":{"background":"心因性厭食症(anorexia nervosa)的正確敘述:(D)『個案強烈地「害怕變胖」(即使體重已過輕仍怕胖)』，並有體重過輕、限制進食、體像扭曲。其他錯誤:A『多數為「女性」(尤其青少年女性)』，非男性;B『好發於「青少年」』，非中年;C DSM-5『已移除「閉經(月經停止)」作為診斷標準』(且「至少6次週期沒出現」的描述也非現行標準)。故 D 正確。厭食症的核心是怕胖、限制進食、體重過輕、體像扭曲。","options":{"A":"多數患者為女性，非男性。","B":"好發於青少年，非中年。","C":"DSM-5 已移除閉經作為診斷標準。","D":"正確。厭食症個案強烈地害怕變胖。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"102030-N5-16":{"quick":"失眠早醒、食慾不佳、莫名哭泣、失去興趣、割腕、被開除想不開＝重鬱症。","detail":{"background":"陳小姐『嚴重失眠(半夜3~4點即醒=早醒)、食慾不佳、莫名哭泣、對許多事失去興趣、注意力不集中、被開除後有自殺念頭、曾因不吃不喝住院』——符合『重鬱症(major depression)』的核心症狀(情緒低落、興趣喪失、睡眠食慾改變、早醒、無望、自殺意念)。體化症以多重身體症狀為主;恐慌症以反覆恐慌發作為主;焦慮症以過度擔憂為主。本題以憂鬱症狀與自殺為核心，故為重鬱症。故 D 正確。","options":{"A":"體化症以多重身體症狀為主。","B":"恐慌症以反覆突發的恐慌發作為主。","C":"焦慮症以過度擔憂為主。","D":"正確。憂鬱症狀(早醒、失去興趣、自殺)為核心，是重鬱症。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR"]}},"102030-N5-26":{"quick":"廣泛性焦慮疾患重要的臨床表徵＝過度擔心。","detail":{"background":"廣泛性焦慮疾患(GAD)最重要的臨床表徵是(B)『過度、難以控制的「擔心(worry)」(對多種事件持續擔憂≥6個月)』，並伴隨坐立難安、易疲倦、注意力不集中、易怒、肌肉緊張、睡眠障礙。去人格化反應、解離型失憶、感覺麻木是「解離症」的表現。本題GAD的核心是「過度擔心」。故 B 正確。","options":{"A":"去人格化反應是解離症的表現。","B":"正確。過度擔心是廣泛性焦慮疾患的重要臨床表徵。","C":"解離型失憶是解離症的表現。","D":"感覺麻木是解離/創傷相關的表現。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","GAD"]}},"102030-N5-27":{"quick":"反覆檢查門鎖、瓦斯、折返家中＝強迫症(OCD)。","detail":{"background":"何小姐『每次出門總反覆檢查門鎖及瓦斯、甚至到市場仍不放心而多次折返』——這是『強迫思考(怕沒鎖好、瓦斯沒關)引發強迫行為(反覆檢查、折返)』，符合『強迫症(obsessive-compulsive disorder, OCD)』。憂鬱症以情緒低落為主;思覺失調(精神分裂症)以妄想幻覺為主;躁鬱症以情緒高低起伏為主。本題核心是「反覆檢查的強迫行為」，故為強迫症。故 D 正確。","options":{"A":"憂鬱症以情緒低落為主。","B":"精神分裂症(思覺失調)以妄想幻覺為主。","C":"躁鬱症以情緒高低起伏為主。","D":"正確。反覆檢查門鎖瓦斯、折返，是強迫症。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","強迫症"]}},"102030-N5-30":{"quick":"心因性厭食症好發於＝年輕女性。","detail":{"background":"心因性厭食症(anorexia nervosa)好發於『年輕女性(青少年至年輕成人女性)』——與青春期身體形象、社會審美壓力、控制感等因素有關。故好發族群為年輕女性(選 B)。厭食症的典型對象是青少年/年輕女性，男性、年長者較少見。","options":{"A":"年長女性非厭食症的好發族群。","B":"正確。心因性厭食症好發於年輕女性。","C":"年長男性非好發族群。","D":"年輕男性較少見(以女性為主)。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"102110-N5-15":{"quick":"非常害怕蜘蛛、看到就大叫哭泣＝特殊畏懼症(specific phobia)。","detail":{"background":"林同學『非常害怕蜘蛛、連圖片都不敢看、看到就緊張大叫哭泣』——對「特定的物體(蜘蛛)」產生過度、不合理的恐懼，屬『特殊(特定)畏懼症(specific phobia)』。社交畏懼症是怕社交/被評價的情境;懼曠症是怕難以逃離/求助的場所(如人群、廣場);懼學症是拒學。本題是對「特定動物(蜘蛛)」的恐懼，故為特殊畏懼症。故 A 正確。","options":{"A":"正確。對特定物體(蜘蛛)的過度恐懼，是特殊畏懼症。","B":"社交畏懼症是怕社交/被評價的情境。","C":"懼曠症是怕難以逃離/求助的場所。","D":"懼學症是拒學。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","畏懼症"]}},"102110-N5-21":{"quick":"在會議、聚餐等特定場合才焦躁＝情境性焦慮(situational anxiety)。","detail":{"background":"王先生『在會議和聚餐的「特定場合」特別容易焦躁不安』——焦慮是由「特定情境」引發，屬『情境性焦慮(situational anxiety)』。急性焦慮是突發、強烈的焦慮;廣泛性焦慮是對多種事件「持續、廣泛」的擔憂(非限於特定情境);重度焦慮是焦慮的「程度」分級。本題焦慮限於特定場合(會議、聚餐)，故為情境性焦慮。故 B 正確。","options":{"A":"急性焦慮是突發、強烈的焦慮。","B":"正確。在特定場合(會議、聚餐)引發，是情境性焦慮。","C":"廣泛性焦慮是對多種事件持續、廣泛的擔憂。","D":"重度焦慮是焦慮的程度分級。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"103030-N5-3":{"quick":"突然心跳加快、發抖、呼吸困難、害怕快死掉＝恐慌(panic)。","detail":{"background":"王先生『突然心跳加快、發抖、呼吸困難、極度害怕、擔心自己快死掉』——這是『恐慌(panic)發作』的典型表現:突然發作、強烈的恐懼伴隨自律神經症狀(心悸、發抖、呼吸困難、瀕死感、失控感)，常於數分鐘達高峰。欣快感是過度愉悅;激動是躁動不安;易怒心情是易被激怒。本題是突發的強烈恐懼伴身體症狀，故為恐慌。故 C 正確。","options":{"A":"欣快感是過度愉悅。","B":"激動是躁動不安。","C":"正確。突然心跳加快、呼吸困難、瀕死感，是恐慌(panic)發作。","D":"易怒心情是易被激怒。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","恐慌"]}},"103030-N5-28":{"quick":"近半年對很多事緊張不安、心跳加速、失眠、無法集中＝廣泛性焦慮疾患(GAD)。","detail":{"background":"李先生『近半年對很多事感到緊張不安、心跳加速、經常失眠、工作無法集中』——對多種事件「持續、廣泛」的擔憂(≥6個月)伴隨身體與認知症狀，符合『廣泛性焦慮疾患(GAD)』。恐慌症是反覆突發的恐慌發作;社交恐懼症是怕社交情境;PTSD 是創傷後的再經驗、逃避、過度警覺。本題是「對很多事持續緊張、半年」，故為 GAD。故 B 正確。","options":{"A":"恐慌症是反覆突發的恐慌發作。","B":"正確。對很多事持續緊張、心跳加速、失眠近半年，是廣泛性焦慮疾患。","C":"社交恐懼症是怕社交情境。","D":"PTSD 是創傷後的再經驗、逃避、過度警覺。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","GAD"]}},"103100-N5-25":{"quick":"焦慮促發理論「錯誤」者＝精神分析學派認為情緒困擾源自「不合理的信念」(應為認知學派)。","detail":{"background":"焦慮促發因素理論，「錯誤」者為(C)『「精神分析」學派觀點認為情緒困擾源自於個人對引發事件有「不合理的信念」』——錯誤，「不合理信念」引發情緒困擾是『「認知」學派(如 Ellis 的理性情緒療法 ABC)』的觀點，而非精神分析(精神分析認為焦慮源自「潛意識的衝突」)。其他正確:A 人際關係學派認為未被重要他人認可會引發焦慮;B 行為學派認為焦慮是學習而來、可透過學習消除;D 衝突學派認為焦慮產生無助感、使衝突更嚴重。故本題選錯誤者為 C。","options":{"A":"人際關係學派的觀點，正確。","B":"行為學派的觀點，正確。","C":"正確(本題選錯誤者)。「不合理信念」是認知學派的觀點，非精神分析。","D":"衝突學派的觀點，正確。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","焦慮理論"]}},"104030-N5-8":{"quick":"鈉離子滯留於神經細胞內濃度高出200%＝與雙極性疾患最相關。","detail":{"background":"鈉離子滯留於神經細胞內的濃度較一般人高出約200%——與『雙極性(雙相)情感疾患』最有相關(離子假說:鈉/鈣等電解質在神經細胞內外的分布異常，影響神經興奮性與情緒調節，故以鋰鹽治療)。焦慮性、解離性、身體性疾患並非以「細胞內鈉滯留」為主要的生物機轉。故 B 正確。雙相障礙與細胞內鈉、鈣離子的失調(離子假說)有關。","options":{"A":"焦慮性疾患非以細胞內鈉滯留為主要機轉。","B":"正確。細胞內鈉滯留與雙極性疾患最相關(離子假說)。","C":"解離性疾患非以細胞內鈉滯留為機轉。","D":"身體性疾患非以細胞內鈉滯留為機轉。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR"]}},"104030-N5-27":{"quick":"在公眾場合說話/用餐窘迫、覺得被嘲笑而退縮逃避＝社交畏懼症(social phobia)。","detail":{"background":"黃先生『在公眾場合說話或用餐會窘迫不安、覺得大家都在嘲笑他，因而退縮在家、逃避公眾活動』——對「社交/被他人評價的情境」過度恐懼並逃避，符合『社交畏懼症(社交焦慮症 social phobia)』。恐慌症是反覆突發的恐慌;廣泛性焦慮是對多事的持續擔憂;強迫症是強迫思考/行為。本題核心是「怕在社交情境被評價/嘲笑而逃避」，故為社交畏懼症。故 B 正確。","options":{"A":"恐慌症是反覆突發的恐慌發作。","B":"正確。怕在社交情境被評價、逃避，是社交畏懼症。","C":"廣泛性焦慮是對多種事件的持續擔憂。","D":"強迫症是強迫思考/行為。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社交畏懼症"]}},"104100-N5-3":{"quick":"過分專注瑣碎細節、認知範圍縮小、學習能力差(佩普洛)＝嚴重焦慮。","detail":{"background":"依佩普洛(Peplau)焦慮程度分類:(C)『嚴重(重度)焦慮』時，認知範圍「明顯縮小」、過分專注於瑣碎細節、無法看到全貌、學習與問題解決能力明顯受限。對照:輕度焦慮時警覺性提高、學習力佳;中度焦慮時知覺範圍稍縮小但仍可學習(有選擇性注意);恐慌(panic)時則完全失去理性思考與功能、可能有混亂或解離。本題「認知範圍明顯縮小、學習差、問題解決受限」對應嚴重焦慮。故 C 正確。","options":{"A":"輕度焦慮時警覺性提高、學習力佳。","B":"中度焦慮知覺稍縮小但仍可學習(選擇性注意)。","C":"正確。認知範圍明顯縮小、學習差，是嚴重焦慮。","D":"恐慌時完全失去理性思考與功能。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","Peplau 焦慮分級"]}},"104100-N5-8":{"quick":"乳癌康復後仍緊張、心跳快、胃痛、肌肉痠痛＝焦慮(Anxiety)。","detail":{"background":"乳癌病患完成治療、預後良好，但『仍常感到緊張、伴心跳快、胃痛、肌肉痠痛』——這是對「不確定的未來/復發可能」的持續擔憂，伴隨自律神經與肌肉緊張的身體症狀，最符合『焦慮(anxiety)』。恐慌是突發、強烈、數分鐘達高峰的恐懼發作;激動是躁動不安;易怒是易被激怒。本題是「持續的緊張擔憂伴身體症狀」，故為焦慮。故 A 正確。","options":{"A":"正確。持續緊張、心跳快、胃痛、肌肉痠痛，是焦慮(anxiety)。","B":"恐慌是突發、數分鐘達高峰的強烈恐懼發作。","C":"激動是躁動不安。","D":"易怒是易被激怒。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"105030-N5-25":{"quick":"身體症狀障礙症的治療目標：了解情緒對症狀的影響①、增進自我察覺③、以壓力因應取代身體化④(鼓勵以身體症狀表達情緒②錯)。","detail":{"background":"與身體症狀障礙症(somatic symptom disorder)病人共訂的治療目標:(1)了解情緒壓力對身體症狀的影響、確認症狀的誘因;(3)鼓勵與他人分享對自己的看法、增進自我察覺;(4)以有效的「壓力因應策略」處理壓力感受，「不再以身體化症狀呈現」。而(2)『鼓勵「以身體症狀表達情緒」』錯誤——治療目標正是要『減少身體化、改以「語言/適當方式」表達情緒』，而非鼓勵以身體症狀表達。故正確為①③④(選 C)。","options":{"A":"123：含②(鼓勵以身體症狀表達情緒)，與治療目標相反。","B":"124：含②，錯誤。","C":"正確。了解情緒對症狀的影響①、增進自我察覺③、以壓力因應取代身體化④。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·身體症狀障礙症","DSM-5-TR"]}},"105030-N5-27":{"quick":"餵食及飲食障礙症「錯誤」者＝婦女停經後體重增加而好發厭食症。","detail":{"background":"餵食及飲食障礙症的敘述，「錯誤」者為(A)『婦女由於「停經後」體重增加，因此好發「厭食症」』——錯誤，厭食症『好發於「青少年/年輕女性」』，而非停經後的婦女。其他正確:B 病人的自我評價過度受體重與外形影響(體像扭曲);C 媒體將胖瘦與美麗成功連結，會引發飲食相關障礙(社會文化因素);D 厭食症病人有生命危險(嚴重低體重、電解質失衡)時，需住院維持攝食與營養均衡。故本題選錯誤者為 A。","options":{"A":"正確(本題選錯誤者)。厭食症好發於青少年/年輕女性，非停經後婦女。","B":"病人自我評價過度受體重外形影響，正確。","C":"媒體將胖瘦與美麗成功連結會引發飲食障礙，正確。","D":"厭食症有生命危險時需住院維持營養，正確。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"105030-N5-28":{"quick":"改善暴食症常用藥物＝imipramine(三環抗憂鬱劑)。","detail":{"background":"臨床治療暴食症(bulimia nervosa)常使用『抗憂鬱劑』，選項中(B)『imipramine(三環抗憂鬱劑 TCA)』屬之(SSRI 如 fluoxetine 也常用於暴食症)。cyproheptadine 是抗組織胺/促食慾劑(曾用於厭食症增重);propranolol 是乙型阻斷劑(用於心血管/表現焦慮);amphetamine 是中樞興奮劑(會抑制食慾、不用於暴食症)。故 B 正確。暴食症常以抗憂鬱劑(如 SSRI、TCA)治療以減少暴食/清除行為。","options":{"A":"cyproheptadine 是促食慾劑(曾用於厭食症)。","B":"正確。imipramine(三環抗憂鬱劑)常用於改善暴食症。","C":"propranolol 是乙型阻斷劑，非暴食症用藥。","D":"amphetamine 是中樞興奮劑，會抑制食慾，不用於暴食症。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"105030-N5-37":{"quick":"風災創傷的立即介入：尊重盧太太的自主性，依其症狀再提供適切服務。","detail":{"background":"盧太太經歷風災(房屋淹沒、骨折開刀、喪偶)、有過度警覺、經驗再現、麻木、失眠(急性創傷反應)。關於立即介入，正確的是(D)『對盧太太的「關懷與支持」，可「尊重其自主性」，依其症狀再提供適切的服務』——創傷後立即介入以提供安全、安心、連結與支持為主，尊重個別步調與自主。其他錯誤:A『Debriefing 可預防日後思覺失調症』錯誤(Debriefing 與預防思覺失調無關，且其預防 PTSD 的效果已受質疑);B『風災3週後實施 Debriefing』時機/做法不符;C『Critical Incident Debriefing 六步驟』選項所列步驟有誤(無「依賴期」)。故 D 正確。","options":{"A":"Debriefing 與預防思覺失調症無關，且預防 PTSD 效果受質疑。","B":"「風災3週後實施 Debriefing」時機/做法不符。","C":"CISD 六步驟所列有誤(無「依賴期」)。","D":"正確。尊重盧太太的自主性，依其症狀再提供適切服務。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","創傷·危機介入"]}},"105030-N5-39":{"quick":"哭泣、踱步、不斷搓手、言談困難、無法接受衛教＝嚴重焦慮。","detail":{"background":"蘇小姐長期過度擔心(GAD)，剛住院時已有失眠、認知侷限、易怒、神經質、說話快、口乾等(中至重度焦慮);「今起」出現『哭泣、踱步、不斷搓手、言談困難、無法接受衛教』——焦慮已升高到『嚴重(重度)焦慮』:明顯的運動性不安(踱步、搓手)、認知與溝通功能明顯受損(言談困難、無法學習/接受衛教)。其他選項:A、B 把她誤判為分離焦慮/社交焦慮(其診斷是 GAD);D『容易引發貧血的共病』無關。故 C 正確。","options":{"A":"其診斷是廣泛性焦慮，非分離焦慮症。","B":"其診斷是廣泛性焦慮，非社交焦慮症。","C":"正確。哭泣、踱步、搓手、言談困難，處於嚴重焦慮。","D":"「容易引發貧血」與焦慮無關。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","焦慮分級"]}},"105030-N5-40":{"quick":"嚴重焦慮：可能演變到胃痛、頭痛，甚至出現換氣過度。","detail":{"background":"蘇小姐處於『嚴重(重度)焦慮』，對個人的影響:(D)『此階段可能演變到胃痛、頭痛，甚至出現換氣過度(過度換氣)等身體化/自律神經反應』(嚴重焦慮會引發明顯的生理症狀)。其他錯誤:A『認知範圍較平常「增加」、提升學習』是「輕度」焦慮;B『認知範圍侷限、選擇性注意』是「中度」焦慮;C『認知不至於縮小、仍能在指導下學習』也是「中度」焦慮。故 D 正確。嚴重焦慮時認知明顯窄化、功能受損，並出現顯著身體症狀。","options":{"A":"認知增加、提升學習是輕度焦慮。","B":"選擇性注意是中度焦慮。","C":"認知不至於縮小、仍能學習是中度焦慮。","D":"正確。嚴重焦慮可能演變到胃痛、頭痛，甚至換氣過度。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","焦慮分級"]}},"105030-N5-56":{"quick":"病人對體型表達煩惱：以開放探詢「對於體型，妳有什麼樣的煩惱?」","detail":{"background":"張小姐(BMI 正常)表示「我對我的體型感到煩惱」。最適當的反應是(C)『開放探詢:「對於體型，妳有什麼樣的煩惱?」』——以開放、不評判的方式鼓勵她表達，了解其內在困擾(可能是體像、自我概念問題)。A『看起來很正常有什麼好煩惱』是否定其感受;B『換算 BMI 後是正常』只給客觀數據、未處理其主觀困擾;D『採取均衡飲食就不必煩惱』是給建議、未先了解。故 C 正確。對主觀困擾，先開放探詢、了解感受。","options":{"A":"「有什麼好煩惱」是否定其感受。","B":"只給 BMI 數據、未處理其主觀困擾。","C":"正確。開放探詢「對於體型，妳有什麼樣的煩惱?」","D":"「均衡飲食就不必煩惱」是給建議、未先了解。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"105090-N5-12":{"quick":"「不是」轉化症常見的轉化症狀＝腹瀉。","detail":{"background":"轉化症(conversion disorder)是心理衝突『轉化為「神經系統(運動或感覺)」功能症狀』。常見的轉化症狀:麻痺(運動)、失明(感覺)、不語(失聲)、抽搐、無法行走等「假性神經症狀」。而(A)『腹瀉』是腸胃道(自律神經)症狀，「不是」轉化症典型的轉化症狀。故本題選不是者為 A。轉化症的症狀以「神經學(運動/感覺)」表現為主。","options":{"A":"正確(本題選不是者)。腹瀉是腸胃道症狀，非轉化症的神經學轉化症狀。","B":"麻痺是常見的運動性轉化症狀。","C":"失明是常見的感覺性轉化症狀。","D":"不語(失聲)是常見的轉化症狀。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙","DSM-5-TR"]}},"105090-N5-26":{"quick":"考試焦慮藉打球運動舒緩＝行為取向的適應機轉。","detail":{"background":"林同學考試焦慮時『藉由「打球運動」來舒緩焦慮』——透過「行為/活動」來因應壓力，屬『行為取向(behavioral)』的適應機轉。認知取向是改變想法/認知;情緒取向是處理/宣洩情緒;生理取向是放鬆、調節生理(如深呼吸)。本題是「以運動(行為)」因應，故為行為取向。故 A 正確。","options":{"A":"正確。藉打球運動(行為/活動)舒緩焦慮，是行為取向。","B":"認知取向是改變想法/認知。","C":"情緒取向是處理/宣洩情緒。","D":"生理取向是放鬆、調節生理。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","因應機轉"]}},"105090-N5-35":{"quick":"廣泛性焦慮的環境治療：安排結構性的活動，減少不安與焦慮。","detail":{"background":"馬先生廣泛性焦慮症住院，環境治療的正確原則是(B)『安排「結構性(規律、可預期)」的活動，減少病人的不安與焦慮』——結構化、可預期的環境能降低焦慮。其他錯誤:A『安排美侖美奐的病房「即可」治療焦慮』錯誤(環境美觀非治療焦慮的關鍵);C『讓病人「快速」參與人際互動』錯誤(對焦慮病人應循序漸進，非快速);D『進行面質與挑戰』錯誤(對焦慮病人面質會升高焦慮，應支持為主)。故 B 正確。對焦慮病人，提供結構化、可預期、支持性的環境。","options":{"A":"病房美觀非治療焦慮的關鍵。","B":"正確。安排結構性的活動，減少不安與焦慮。","C":"對焦慮病人應循序漸進，非快速參與人際。","D":"對焦慮病人面質會升高焦慮，不宜。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","環境治療"]}},"106030-N5-21":{"quick":"先生外遇後1個月內心情低落、哭泣、失眠、食慾差＝適應障礙症。","detail":{"background":"林女士因明確壓力源(先生外遇)、『1個月內』出現心情低落、哭泣、失眠、食慾差等情緒症狀——在『明確的壓力事件後短期內(3個月內)出現、且未達重鬱症完整診斷準則』的情緒/行為困擾，最可能為『適應障礙症(adjustment disorder)』。重鬱症需症狀「持續至少2週、達一定數目」且非單純壓力反應;焦慮症以過度擔憂為主;身體症狀障礙以身體症狀為主。本題強調「明確壓力源、1個月內」，故為適應障礙症。故 B 正確。","options":{"A":"焦慮症以過度擔憂為主，非本題。","B":"正確。明確壓力源後1個月內的情緒困擾，是適應障礙症。","C":"重鬱症需達一定的症狀數目與持續，非單純壓力反應。","D":"身體症狀障礙以身體症狀為主。"},"sources":["精神科護理學(新文京/華杏)·壓力與適應","DSM-5-TR"]}},"106030-N5-29":{"quick":"強迫症的強迫行為與「抵消(undoing)」防衛機轉最相關。","detail":{"background":"強迫症(OCD)的『強迫行為(如反覆洗手、檢查)』與『抵消(undoing)』防衛機轉最相關——藉由某種「象徵性的行為(儀式)」來「消除/抵消」內心不被接受的想法或衝動所引發的焦慮(如反覆洗手以消除「被污染/罪惡」的念頭)。外射(投射)是把內在歸於外界;昇華是把衝動導向社會認可的活動;潛抑是把念頭壓入潛意識。本題強迫行為的核心是「以儀式抵消焦慮」，故為抵消。故 D 正確。","options":{"A":"外射(投射)是把內在歸因於外界。","B":"昇華作用是把衝動導向社會認可的活動。","C":"潛抑作用是把念頭壓入潛意識。","D":"正確。強迫行為與抵消(undoing)防衛機轉最相關。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","防衛機轉·強迫症"]}},"106030-N5-32":{"quick":"飲食障礙住院第一階段的飲食行為約定＝防止過度運動。","detail":{"background":"飲食障礙病人(尤其厭食症)急性病房住院第一階段的飲食行為約定，正確的是(C)『防止過度運動(以免持續消耗熱量、阻礙體重恢復)』。其他錯誤:A 體重監測的時間應『「固定」由醫療團隊安排』，而非由病人決定;B 應『在「規定的用餐區、有監督」下進食』，而非在病人房間內(避免藏食/丟棄);D『不可由病人決定把食物給別人』(避免規避進食)。故 C 正確。飲食障礙的行為約定須結構化、有監督，並防止過度運動、藏食。","options":{"A":"體重監測時間應固定由團隊安排，非病人決定。","B":"應在規定區、有監督下進食，非病人房間內。","C":"正確。防止過度運動，避免持續消耗熱量。","D":"不可由病人決定把食物給別人(避免規避進食)。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"106110-N5-13":{"quick":"從容不迫者面臨資格考才焦慮＝情境性焦慮(situational anxiety)。","detail":{"background":"周同學「一向從容不迫」，但「在面臨學位資格考時」表現非常焦慮——焦慮是由「特定情境(資格考)」引發、平時並不焦慮，屬『情境性焦慮(situational anxiety)』。特質性焦慮是「人格特質」上長期偏向焦慮(他平時從容，故非);慢性焦慮是長期持續的焦慮;重度焦慮是焦慮的「程度」分級。本題焦慮限於特定情境，故為情境性焦慮。故 C 正確。","options":{"A":"特質性焦慮是人格上長期偏焦慮(他平時從容，故非)。","B":"慢性焦慮是長期持續的焦慮。","C":"正確。由特定情境(資格考)引發，是情境性焦慮。","D":"重度焦慮是焦慮的程度分級。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"106110-N5-29":{"quick":"地震目睹家園女兒被海嘯吞噬、惡夢逃避失眠易怒持續一個月＝創傷後壓力症(PTSD)。","detail":{"background":"陳太太經歷大地震/海嘯(目睹家園與女兒被吞噬、自身受傷)，事後出現『反覆惡夢(再經驗)、不想參加活動/不願談論海嘯(逃避)、對未來悲觀(負面認知情緒)、失眠易怒(過度警覺)，「症狀持續一個月」仍未改善』——完全符合『創傷後壓力症(PTSD，症狀持續≥1個月)』。急性壓力症的症狀是創傷後「3天至1個月內」(本題已滿1個月);恐慌症、解離症的核心不同。故 A 正確。","options":{"A":"正確。創傷後再經驗、逃避、負面認知、過度警覺且持續≥1個月，是 PTSD。","B":"恐慌症是反覆突發的恐慌發作。","C":"急性壓力症是創傷後3天至1個月內(本題已滿1個月)。","D":"解離症以解離(失憶、去現實感)為核心。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","PTSD"]}},"106110-N5-40":{"quick":"「吃麵包變胖、所以嚴禁所有碳水以免發胖」＝過度推論(over generalization)。","detail":{"background":"14歲飲食障礙病患說「之前吃麵包變胖，所以現在必須「嚴禁吃任何碳水化合物」以免發胖」——從「單一事件(吃麵包)」過度推廣到「全面、絕對的結論(禁所有碳水)」，屬『過度推論(過度概化 over generalization)』的認知扭曲。控制的謬誤是覺得一切由自己/他人控制;情緒推理是「我覺得…所以一定是…」;讀心術是臆測他人想法。本題是「以單一經驗推及全面禁止」，故為過度推論。故 D 正確。","options":{"A":"控制的謬誤是覺得一切由自己或他人控制。","B":"情緒推理是「我覺得…所以一定是…」。","C":"讀心術是臆測他人的想法。","D":"正確。從單一事件過度推及全面結論，是過度推論。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR","認知扭曲"]}},"106111-N5-5":{"quick":"Zolpidem(Stilnox)：日間思睡暈眩②、肌肉鬆弛作用低③、第四級管制藥④(抗焦慮作用高①錯)。","detail":{"background":"Zolpidem(Stilnox)的正確敘述:(2)可能有『日間思睡及暈眩』等殘餘鎮靜副作用;(3)『肌肉鬆弛作用低』(相較於 BZD，zolpidem 選擇性作用於助眠，肌肉鬆弛/抗焦慮作用較弱);(4)屬『第四級管制藥品』。而(1)『抗焦慮作用高』錯誤——zolpidem 主要用於『助眠(誘導入睡)』，其『抗焦慮作用低』(不像 BZD 有明顯抗焦慮效果)。故正確為②③④(選 D)。","options":{"A":"123：含①(抗焦慮作用高)，zolpidem 抗焦慮作用低。","B":"124：含①，錯誤。","C":"134：含①，錯誤。","D":"正確。日間思睡暈眩②、肌肉鬆弛作用低③、第四級管制藥④。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鎮靜安眠藥"]}},"106111-N5-8":{"quick":"逃避行為、反覆經歷創傷、醒覺過高、負面情緒認知＝創傷後壓力症的核心症狀。","detail":{"background":"各精神症狀的正確敘述:(C)『「逃避行為、反覆經歷創傷相關症狀(再經驗)、醒覺程度過高(過度警覺)、負面情緒與認知」是創傷後壓力症(PTSD)的主要核心症狀群』。其他錯誤:A『緊張、心神不寧、肌肉緊繃、易疲倦、隨時有不合理焦慮』是「廣泛性焦慮(GAD)」的典型，非恐慌症;B 強迫症『「不一定」要同時出現「強迫思考、強迫行為與功能失調」三項』(有強迫思考或強迫行為即可，造成困擾/耗時);D 解離症的常見症狀是『失憶、去人格化/去現實感、身分混亂』，「失禁、失明、抽搐」是「轉化症」的症狀。故 C 正確。","options":{"A":"緊張、肌肉緊繃、易疲倦是 GAD 的典型，非恐慌症。","B":"強迫症不一定三項同時出現，有強迫思考或行為即可。","C":"正確。逃避、再經驗、過度警覺、負面認知情緒是 PTSD 核心症狀。","D":"失禁、失明、抽搐是轉化症的症狀，非解離症。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","PTSD"]}},"106111-N5-25":{"quick":"強迫症反覆洗手、溝通時仍專注洗手(選擇性注意)＝中度焦慮。","detail":{"background":"林太太強迫症、不斷洗手、護理師溝通時「仍然專注在洗手」——她的『知覺/注意力窄化、選擇性地專注在洗手(對外界其他訊息減少注意)、但仍能進行有目標的行為』，屬『中度焦慮』(中度焦慮的特徵是知覺範圍縮小、選擇性注意)。輕度焦慮時警覺、學習力佳;重度焦慮時認知明顯窄化、功能受損、無法完成目標行為;預期焦慮是對未來事件的焦慮(非焦慮程度分級)。本題是「選擇性注意洗手」，故為中度焦慮。故 C 正確。","options":{"A":"預期焦慮是對未來事件的焦慮，非程度分級。","B":"輕度焦慮時警覺、學習力佳。","C":"正確。選擇性注意(專注洗手)、知覺窄化，是中度焦慮。","D":"重度焦慮時認知明顯窄化、功能受損。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","焦慮分級"]}},"107030-N5-23":{"quick":"強迫行為源自「抵消作用(undoing)」：藉象徵性行為消除不被接受的想法/行為。","detail":{"background":"心理防禦機轉的正確敘述:(A)『強迫行為源自「抵消作用(undoing)」，目的是藉由某「象徵性行為(儀式)」以消除不被接受的行為或想法(所引發的焦慮)』。其他錯誤:B 強迫思考並非源自「轉移作用」(轉移是把對某對象的感受轉向另一較不具威脅的對象);C『過度使用條理、邏輯、遵守規範以避免焦慮』是『「理智化(intellectualization)」或人格特質』，並非「反向作用」;D 強迫行為亦非源自「理智化」(理智化是以理性思考迴避情緒，且「有意識地將痛苦隔除」較接近「隔離 isolation」)。故 A 正確。","options":{"A":"正確。強迫行為源自抵消作用，藉象徵性行為消除不被接受的想法/行為。","B":"強迫思考非源自轉移作用。","C":"過度條理邏輯規範是理智化/人格特質，非反向作用。","D":"強迫行為非源自理智化。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","防衛機轉"]}},"107030-N5-25":{"quick":"強迫症重複洗手：以系統減敏法改善重複洗手行為。","detail":{"background":"蘇小姐強迫症、重複洗手。最適切的治療策略是(B)『以「系統減敏法(漸進式暴露+放鬆)」改善重複洗手行為』——透過漸進、可控的暴露搭配放鬆，逐步降低焦慮與強迫行為(屬暴露不反應預防的人道、漸進做法)。其他錯誤:A『不宜觀察其思考與感受，直接進行行為治療』錯誤(評估思考與感受是治療的基礎);C『採用洪水法，「立即」讓她不斷面對畏懼情境』過於激烈、易造成創傷(不如漸進);D『洗手一出現就約束隔離、四肢約束』是錯誤且不人道的處置。故 B 正確。","options":{"A":"評估思考與感受是治療基礎，不應略過。","B":"正確。以系統減敏法(漸進暴露+放鬆)改善重複洗手行為。","C":"洪水法立即面對過於激烈、易造成創傷。","D":"出現就約束隔離是錯誤且不人道的處置。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","行為治療·OCD"]}},"107030-N5-31":{"quick":"最常與飲食障礙症成為共病的疾患＝憂鬱症。","detail":{"background":"最常與飲食障礙症(厭食症、暴食症)共病的疾患是『憂鬱症』——飲食障礙病人常合併憂鬱、焦慮、自殺意念，其中憂鬱症最常見。思覺失調症、強迫症、解離症雖可能合併，但飲食障礙最常見的共病是「情緒障礙(憂鬱)」。故 C 正確。臨床照護飲食障礙病人時，須評估與處理共病的憂鬱與自殺風險。","options":{"A":"思覺失調症非飲食障礙最常見的共病。","B":"強迫症可能合併，但非最常見。","C":"正確。憂鬱症是最常與飲食障礙共病的疾患。","D":"解離症非飲食障礙最常見的共病。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"107110-N5-2":{"quick":"心理壓力轉以身體(運動/感覺)症狀呈現＝轉化作用(conversion)。","detail":{"background":"個體在心理壓力/衝突下，較難以語言或情緒表達，『轉而以「身體症狀(如運動或感覺功能失常)」呈現』——這是『轉化作用(conversion)』，把心理衝突「轉化」為神經學(運動/感覺)症狀(如癱瘓、失明、失聲)。轉移作用是把對某對象的情緒轉向另一對象;補償作用是以其他成就彌補不足;解離作用是把痛苦的記憶/意識分離。本題是「心理衝突轉為身體(神經)症狀」，故為轉化作用。故 B 正確。","options":{"A":"轉移作用是把對某對象的情緒轉向另一對象。","B":"正確。心理衝突轉為身體(運動/感覺)症狀，是轉化作用。","C":"補償作用是以其他成就彌補不足。","D":"解離作用是把痛苦的記憶/意識分離。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙","DSM-5-TR","防衛機轉"]}},"107110-N5-8":{"quick":"「不斷抱怨病房有蛇、但別人都沒看到」＝視幻覺(visual hallucination)。","detail":{"background":"臨床精神症狀的正確敘述:(B)『病人不斷抱怨病房有蛇、但其他人都沒看到——在「沒有真實刺激下看到不存在的東西」，是「視幻覺(visual hallucination)」』。其他錯誤:A『杯弓蛇影』是把「真實刺激(弓影)」錯誤解讀，是「錯覺(illusion)」，非視幻覺;C『腸胃有蟲在爬、腦內滴血』是「身體(體幻覺 somatic/cenesthetic hallucination)」，非觸幻覺(觸幻覺是皮膚被觸碰感);D『舌頭有苦味』是「味幻覺」、「皮膚電麻感」是「觸幻覺」，並非「身體幻覺」。故 B 正確。","options":{"A":"杯弓蛇影是對真實刺激的錯誤解讀，是錯覺，非視幻覺。","B":"正確。看到不存在的蛇(別人沒看到)，是視幻覺。","C":"腸胃有蟲、腦內滴血是身體(體)幻覺，非觸幻覺。","D":"舌頭苦味是味幻覺、皮膚電麻是觸幻覺，非身體幻覺。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學","DSM-5-TR"]}},"108110-N5-12":{"quick":"認知治療：認知的再建構①、安排作業練習②、建立替代想法④(僅強調過去經驗③錯)。","detail":{"background":"針對嚴重強迫症的認知治療，適切的內容:(1)『認知的再建構(辨識並修正不合理的認知)』;(2)『安排作業練習(家庭作業，將治療延伸到生活)』;(4)『建立替代想法(以較合理的想法取代)』。而(3)『「僅」強調過去經驗』錯誤——認知治療著重『「此時此地」的當前想法與信念』，而非「僅」探討過去經驗(探討過去是精神分析的取向)。故正確為①②④(選 B)。","options":{"A":"123：含③(僅強調過去經驗)，錯誤。","B":"正確。認知再建構①、安排作業練習②、建立替代想法④。","C":"134：含③，錯誤。","D":"234：含③、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","認知治療"]}},"108110-N5-31":{"quick":"厭食/暴食症「不是」認知扭曲者＝「衣服拉鍊以前能拉、現在不行，表示變胖」。","detail":{"background":"飲食障礙個案常有認知扭曲。本題「不是」認知扭曲者為(A)『上個月這件衣服拉鍊還能拉上、今天已經不行，表示我變胖了』——這是『根據客觀事實(衣服變緊)做出的合理推論(可能真的變胖)』，並非認知扭曲。其他屬認知扭曲:B『別人看我=我該減肥了』是讀心/個人化;C『增加1公斤、未來會繼續增加40公斤』是災難化/過度推論;D『唯一能控制的就是體重』是控制的謬誤(全有全無)。故本題選不是認知扭曲者為 A。","options":{"A":"正確(本題選不是者)。依客觀事實(衣服變緊)的合理推論，非認知扭曲。","B":"「別人看我=該減肥」是讀心/個人化的扭曲。","C":"「增1公斤會繼續增40公斤」是災難化/過度推論。","D":"「唯一能控制的是體重」是控制的謬誤。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR","認知扭曲"]}},"108110-N5-32":{"quick":"分離焦慮症兒童的護理：增強安全感①、教導因應能力③、訓練獨立性④(增加分離次數②錯)。","detail":{"background":"罹患分離焦慮症的兒童，護理重點:(1)增強病童的「安全感」;(3)教導病童的「因應能力(如何面對分離的焦慮)」;(4)訓練病童的「獨立性」。而(2)『「增加分離的次數」』錯誤——不是單純「增加分離次數」就好，而應『「漸進式、循序」地延長分離時間並搭配安全感建立(系統減敏)』，單純增加分離次數(突然或頻繁分離)反而會加重焦慮。故正確為①③④(選 D)。","options":{"A":"124：含②(增加分離次數)，錯誤。","B":"234：含②、缺①，錯誤。","C":"123：含②，錯誤。","D":"正確。增強安全感①、教導因應能力③、訓練獨立性④。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","分離焦慮症"]}},"109030-N5-25":{"quick":"焦慮病人聚焦於生病角色以獲得他人關心＝附帶收穫(secondary gain)。","detail":{"background":"廣泛性焦慮病人「一直聚焦在「生病的角色」上而獲得他人的關心」——透過「生病」這個角色得到關注、照顧、免除責任等「附帶的好處」，稱為『附帶收穫(次發性獲益 secondary gain)』。解離症狀是失憶、去現實感;虛談現象是以虛構填補記憶空缺(常見於失憶症);作態行為是怪異、重複的動作。本題核心是「藉生病獲得關心(好處)」，故為附帶收穫。故 A 正確。","options":{"A":"正確。藉生病角色獲得他人關心(好處)，是附帶收穫(secondary gain)。","B":"解離症狀是失憶、去現實感。","C":"虛談現象是以虛構填補記憶空缺。","D":"作態行為是怪異、重複的動作。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙","DSM-5-TR"]}},"109030-N5-27":{"quick":"身體症狀障礙症照護：除非心理問題改善，否則身體症狀不易改善。","detail":{"background":"對身體症狀及相關障礙症病人的照護，較適切的是(B)『除非心理問題已獲得改善，否則身體症狀不容易改善(身體症狀是心理困擾的表現)』——須處理其潛在的心理壓力，身體症狀才會緩解。其他錯誤:A『強調是心理問題、「不需評估生理層面」』錯誤(仍須先排除/評估真實的生理疾病，不可輕忽);C 身體症狀障礙病人最常使用的並非「合理化」、且『「指出其矛盾」會引起防衛』，不宜;D『告知身體症狀能「在短期內」改善』是不實的保證。故 B 正確。","options":{"A":"仍須評估生理層面、排除真實疾病，不可輕忽。","B":"正確。除非心理問題改善，否則身體症狀不易改善。","C":"指出其矛盾會引起防衛，不宜。","D":"「短期內改善」是不實的保證。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙","DSM-5-TR"]}},"109030-N5-28":{"quick":"焦慮症的生理機制＝正腎上腺素(norepinephrine)分泌濃度過高。","detail":{"background":"最能說明焦慮症生理機制的神經傳導物質變化是(A)『正腎上腺素(norepinephrine)分泌濃度「過高」』——正腎上腺素過度活化(藍斑核)會引發交感神經興奮、心悸、發抖等焦慮的生理症狀。其他錯誤:B 焦慮與 GABA『「不足/過低」』有關(GABA 是抑制性，不足才焦慮)，非過高;C 焦慮與壓力時醣皮質素(皮質醇)『「增加」』有關，非過低;D 乙醯膽鹼過低與「阿茲海默症」有關，非焦慮症。故 A 正確。焦慮與正腎上腺素過高、GABA 不足、血清素失調有關。","options":{"A":"正確。正腎上腺素分泌過高，引發交感興奮與焦慮症狀。","B":"焦慮與 GABA 不足有關，非過高。","C":"焦慮時醣皮質素增加，非過低。","D":"乙醯膽鹼過低與阿茲海默症有關，非焦慮症。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","焦慮·神經傳導物質"]}},"109110-N5-9":{"quick":"車禍後睡不著、惡夢、聽到剎車聲、不敢經過車禍地點、持續1個月以上＝創傷後壓力症(PTSD)。","detail":{"background":"林先生嚴重車禍(創傷)後，『睡不著、惡夢連連、聽到撞車剎車聲(再經驗/flashback)、不敢經過車禍地點(逃避)、常獨自生氣(易怒/負面情緒)，症狀持續1個月以上』——完全符合『創傷後壓力症(PTSD，症狀持續≥1個月)』。重度憂鬱以情緒低落為核心;思覺失調以妄想幻覺為核心;恐慌症是反覆突發的恐慌。本題以創傷後的再經驗、逃避、過度警覺為主，故為 PTSD。故 B 正確。(註:幻肢痛是截肢後的常見現象，非診斷重點。)","options":{"A":"重度憂鬱以情緒低落為核心，非本題。","B":"正確。創傷後再經驗、逃避、過度警覺且持續≥1個月，是 PTSD。","C":"思覺失調以妄想幻覺為核心。","D":"恐慌症是反覆突發的恐慌發作。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","PTSD"]}},"109110-N5-11":{"quick":"Triazolam(Halcion，BZD)服藥指導：注意暈眩防跌①、避免葡萄柚③、避免併用紅黴素④(靜坐困難②非)。","detail":{"background":"Triazolam(Halcion，短效 BZD 助眠藥)的服藥注意事項:(1)『注意暈眩並防跌倒』(鎮靜、肌肉鬆弛易致跌倒，尤其老人);(3)『避免同時吃葡萄柚(抑制 CYP3A4，使藥物濃度上升)』;(4)『避免同時服用紅黴素 erythromycin(也抑制 CYP3A4，使濃度上升)』。而(2)『造成靜坐不能(akathisia)』是『抗精神病藥的錐體外症狀(EPS)』，並非 BZD 的副作用。故正確為①③④(選 C)。","options":{"A":"123：含②(靜坐困難)，那是抗精神病藥的 EPS。","B":"124：含②，錯誤。","C":"正確。注意暈眩防跌①、避免葡萄柚③、避免併用紅黴素④。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鎮靜安眠藥"]}},"109110-N5-27":{"quick":"在電梯、地下室等場所焦慮迴避、自知不合理卻無法控制＝特定場所恐懼症(懼曠症 agoraphobia)。","detail":{"background":"王小姐『在電梯內、地下室(難以逃離/求助的封閉場所)特別焦慮恐懼、儘量迴避、自知不合理卻無法控制』——符合『特定場所恐懼症(懼曠症 agoraphobia)』:對「難以逃離或得到協助的場所(如電梯、密閉空間、人群、大眾運輸)」感到恐懼而迴避。社交畏懼症是怕「社交/被評價」;恐慌症是反覆突發的恐慌發作;漂浮型(廣泛性)焦慮是對多種事件持續擔憂。本題核心是「對特定難逃離場所的恐懼迴避」，故為懼曠症。故 C 正確。","options":{"A":"社交畏懼症是怕社交/被評價的情境。","B":"恐慌症是反覆突發的恐慌發作。","C":"正確。對電梯、地下室等難逃離場所的恐懼迴避，是懼曠症。","D":"廣泛性(漂浮型)焦慮是對多種事件持續擔憂，非限於特定場所。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","懼曠症"]}},"109110-N5-32":{"quick":"厭食症、半年由56降至36公斤、昏厥住院：住院第一週首要＝建立飲食行為約定。","detail":{"background":"李小姐厭食症、半年內體重由56急降至36公斤(嚴重低體重)、昏厥住院。住院第一週的首要護理措施是(B)『建立飲食行為約定(明確的進食、體重監測、活動規範)』——在急性、嚴重營養不良階段，首要是『以結構化的飲食行為約定恢復進食與體重(維持生命)』。精神動力分析、認知治療、家庭治療是後續、在生理穩定後才進行的心理治療。對嚴重低體重的厭食症，首要是恢復進食(飲食行為約定)。故 B 正確。","options":{"A":"精神動力分析是後續的心理治療，非首要。","B":"正確。住院第一週首要建立飲食行為約定，恢復進食與體重。","C":"認知治療是後續、生理穩定後才進行。","D":"家庭治療是後續的處置。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"110030-N5-19":{"quick":"社交焦慮症：病人因自覺身處於「被觀察」的社交情境而引發焦慮。","detail":{"background":"社交焦慮症(social anxiety disorder)的正確敘述:(C)『病人會因「自覺身處於被觀察/被評價的社交情境」而引發焦慮(害怕表現不佳、被負面評價、出糗)』。其他錯誤:A『反覆突發的害怕失控/發瘋』是「恐慌症」的表現;B『對任何社交情境都焦慮、漂浮型焦慮』偏向廣泛性焦慮的描述(社交焦慮是針對「社交/被評價」情境，非「任何情境的漂浮焦慮」);D『與肥胖症有關』不符(社交焦慮的恐懼不限於、也非源於肥胖)。故 C 正確。","options":{"A":"反覆突發的害怕失控是恐慌症的表現。","B":"「對任何情境的漂浮型焦慮」偏向廣泛性焦慮。","C":"正確。因自覺身處被觀察的社交情境而引發焦慮。","D":"社交焦慮的恐懼不限於、也非源於肥胖。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社交焦慮症"]}},"110030-N5-20":{"quick":"強迫思考+持續洗手：須評估自我傷害的可能性，必要時可戴手套洗手。","detail":{"background":"病人反覆強迫思考+持續洗手而入院。較適當的敘述是(D)『須評估病人「自我傷害(如洗手致皮膚破損)」的可能性，必要時可戴手套洗手(減少傷害)』。其他錯誤:A 病人的強迫思考內容對「病人自己」而言並非無意義(病人覺得這些侵入性想法很重要/有威脅，雖明知不合理仍難擺脫);B『以「直接中止」洗手症狀為最優先』錯誤(強行中止會大幅升高焦慮，應漸進);C 洗手是藉以「抵消(undoing)」內在焦慮的手段，而非「內射」。故 D 正確。對強迫行為，先確保安全、漸進處理，不強行中止。","options":{"A":"強迫思考對病人而言並非無意義(病人覺得有威脅、難擺脫)。","B":"直接中止洗手會大幅升高焦慮，非最優先。","C":"洗手是「抵消」內在焦慮的手段，非「內射」。","D":"正確。須評估自我傷害可能性，必要時可戴手套洗手。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","強迫症護理"]}},"110030-N5-21":{"quick":"PTSD 的治療：認知治療引導病人修正對創傷事件起因與結果的扭曲認知。","detail":{"background":"創傷後壓力症(PTSD)的治療處置，較適當的是(D)『若採用「認知治療」，治療重點為引導病人「修正對創傷事件起因與結果的扭曲認知」(如過度自責、世界很危險)』。其他錯誤:A 藥物治療以『SSRI(非鋰鹽)』為主;B 精神分析/家庭治療的「家庭系統學說」並非 PTSD 的核心治療重點;C 行為治療的暴露療法應以『「漸進/系統性」暴露』為主，「洪水法」是「立即、強烈、非逐步」的暴露(且選項稱「逐步控制」自相矛盾)。故 D 正確。PTSD 常用 SSRI 藥物與創傷焦點的認知行為治療。","options":{"A":"PTSD 藥物以 SSRI 為主，非鋰鹽。","B":"家庭系統學說非 PTSD 的核心治療重點。","C":"洪水法是立即、強烈的暴露，非「逐步」。","D":"正確。認知治療引導病人修正對創傷起因與結果的扭曲認知。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","PTSD 治療"]}},"110030-N5-30":{"quick":"暴食症特徵「錯誤」者＝暴食與補償行為持續「一個月」即可診斷(應為平均每週≥1次、持續3個月)。","detail":{"background":"暴食症(bulimia nervosa)特徵，「錯誤」者為(D)『暴食症狀與不當補償行為同時出現、並持續「一個月」即可達診斷標準』——錯誤，DSM-5 的暴食症診斷要求『暴食與不當補償行為「平均每週至少1次、持續3個月」』，而非「一個月」。其他正確:A 短時間內吃下大量食物;B 覺得無法控制進食的種類與數量;C 禁食或過度運動也可能是其補償行為之一(非僅催吐)。故本題選錯誤者為 D。","options":{"A":"短時間內吃下大量食物，正確。","B":"覺得無法控制進食，正確。","C":"禁食或過度運動也是補償行為之一，正確。","D":"正確(本題選錯誤者)。應為平均每週≥1次、持續3個月，非一個月。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"110110-N5-23":{"quick":"特定畏懼症的學習途徑(學習理論)＝過去曾有被畏懼對象傷害的不愉快經驗。","detail":{"background":"依「學習(行為)理論」，特定畏懼症病人學習恐懼的途徑，最適當的是(A)『過去曾有「被畏懼對象傷害的不愉快經驗(古典制約)」』——將中性刺激(如狗)與不愉快經驗(被咬)連結而產生恐懼。B『未能從失落事件學習處理焦慮』偏向其他理論;C『未被重要他人認可』是人際關係學派的焦慮觀;D『無法忽略/壓抑反覆的想法』是「強迫症」的描述。本題從學習理論看，畏懼是「制約學習而來」，故 A 正確。","options":{"A":"正確。過去被畏懼對象傷害的不愉快經驗(古典制約)，是學習途徑。","B":"「未從失落事件學習」非特定畏懼症的學習途徑。","C":"「未被重要他人認可」是人際關係學派的焦慮觀。","D":"「無法壓抑反覆想法」是強迫症的描述。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","畏懼症·學習理論"]}},"110110-N5-24":{"quick":"強迫症：病人發病前即有求全、完美的傾向，強調是非、缺少通融。","detail":{"background":"強迫症(OCD)病人的正確敘述:(C)『病人通常發病前即有「求全、完美(perfectionism)」的傾向，強調事情的是非對錯、缺少通融變化(強迫型人格特質)』。其他錯誤:A 強迫症病人『通常「有」病識感、能理解這些想法不合理』，並非缺乏病識感;B 強迫症常用的防衛機轉是『「抵消(undoing)、隔離、反向」』，並非「內射」;D 病人對其強迫思想/行為雖覺得不合理、並非自己所願，但『「難以抗拒」(無法抗拒才會反覆執行)』，並非「尚可抗拒」。故 C 正確。","options":{"A":"強迫症病人通常有病識感、能理解想法不合理。","B":"常用抵消、隔離、反向，非內射。","C":"正確。發病前即有求全、完美傾向，強調是非、缺少通融。","D":"病人難以抗拒強迫思想/行為，非尚可抗拒。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","強迫症"]}},"110110-N5-25":{"quick":"急性壓力症「錯誤」者＝診斷對象「限於」直接經歷創傷事件者。","detail":{"background":"急性壓力症(acute stress disorder)的敘述，「錯誤」者為(B)『診斷的對象「限於」直接經歷創傷事件者』——錯誤，創傷暴露的方式包括『直接經歷、「親眼目睹」他人遭遇、「得知」親近者遭遇創傷、反覆暴露於創傷細節』，並不限於直接經歷者。其他正確:A 會出現易怒行為和無預警發怒;C 症狀困擾須持續3天至1個月(「至少3天以上」);D 會避免接觸與創傷有關的物件或場合。故本題選錯誤者為 B。","options":{"A":"會出現易怒和無預警發怒，正確。","B":"正確(本題選錯誤者)。創傷暴露不限於直接經歷者(含目睹、得知親近者)。","C":"症狀至少須持續3天以上，正確。","D":"會避免接觸與創傷有關的物件或場合，正確。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","急性壓力症"]}},"110110-N5-27":{"quick":"模擬考時右手無力、檢查無生理病變＝轉化症(conversion disorder)。","detail":{"background":"邱同學『每次學校模擬考(心理壓力)時就右手無力(神經學症狀)、但多科檢查找不到生理病變』——心理壓力轉化為「神經學(運動)功能症狀」、且無相符的生理病因，符合『轉化症(conversion disorder，功能性神經症狀障礙)』。身體症狀障礙症是對多重身體症狀過度關注;罹病焦慮症是過度擔心罹患重病(但少有實際症狀);人為障礙症是「刻意偽裝/製造」症狀以扮演病人角色。本題是「壓力下出現無生理基礎的神經症狀」，故為轉化症。故 C 正確。","options":{"A":"身體症狀障礙症是對多重身體症狀過度關注。","B":"罹病焦慮症是過度擔心罹病，少有實際症狀。","C":"正確。壓力下右手無力、無生理病變，是轉化症。","D":"人為障礙症是刻意偽裝/製造症狀。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙","DSM-5-TR"]}},"111030-N5-21":{"quick":"協助強迫症病人覺察焦慮與行為的關聯：「我看到妳在咬指甲、走來走去，妳現在覺得怎麼樣?」","detail":{"background":"李小姐與母親爭執後焦躁不安。最有助於協助病人「覺察自己的焦慮與行為間關聯」的說法是(C)『「我看到妳在咬指甲和走來走去(描述其行為)，妳現在覺得怎麼樣?(連結到感受)」』——以「描述觀察到的行為+詢問感受」，引導病人連結自己的「行為(咬指甲、走來走去)」與「焦慮情緒」。A『多告訴我妳對強迫症的看法』偏向認知層面、未連結當下的行為與情緒;B『妳的強迫症狀是正常的』是不當的保證;D『我們來聽音樂消除焦慮』直接給介入、未促進覺察。故 C 正確。","options":{"A":"問對強迫症的看法未連結當下的行為與情緒。","B":"「妳的強迫症狀是正常的」是不當的保證。","C":"正確。描述其行為(咬指甲、走來走去)+詢問感受，促進覺察。","D":"直接聽音樂介入，未促進覺察。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"111030-N5-25":{"quick":"廣泛性焦慮、坐立不安：會談重點＝「請你說說你現在覺得怎麼樣?」","detail":{"background":"王先生廣泛性焦慮症、住院第一天坐立不安、肌肉緊繃(處於焦慮中)。此時會談的重點是(D)『「請你說說你現在覺得怎麼樣?」』——以開放、聚焦「此時此地」的感受，鼓勵病人表達當下的情緒，是焦慮急性期建立關係、了解狀態的起點。A『以前緊張怎麼處理』、B『是否因擔心工作』、C『和家人相處狀況』都偏向探究原因/過去，在病人正高度焦慮時不是當下的會談重點(過早探究會增加焦慮)。故 D 正確。對急性焦慮，先聚焦當下感受、提供支持。","options":{"A":"探究過去的因應方式在急性焦慮時非當下重點。","B":"探究原因(擔心工作)在病人高度焦慮時過早。","C":"問家人相處偏離當下的情緒狀態。","D":"正確。「請你說說你現在覺得怎麼樣?」聚焦當下感受。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"111110-N5-23":{"quick":"強迫症的主要症狀＝出現難以控制的重複性行為及思想。","detail":{"background":"強迫症(OCD)的主要臨床症狀是(D)『出現難以控制的重複性「行為(強迫行為)」及「思想(強迫思考)」』。其他選項描述的是別的疾病:A『10分鐘內達到極重度焦慮、呼吸困難』是「恐慌發作」;B『刻意逃避社交場所』是「社交畏懼症」;C『有特定對象(如針筒)引發焦慮』是「特定畏懼症」。故 D 正確。強迫症的核心是反覆、侵入、難以控制的強迫思考與強迫行為。","options":{"A":"10分鐘內極重度焦慮、呼吸困難是恐慌發作。","B":"刻意逃避社交場所是社交畏懼症。","C":"特定對象(如針筒)引發焦慮是特定畏懼症。","D":"正確。出現難以控制的重複性行為及思想，是強迫症。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","強迫症"]}},"111110-N5-24":{"quick":"急性壓力症「錯誤」者＝創傷後「次日」即可確定診斷(應為症狀持續3天至1個月)。","detail":{"background":"急性壓力症(acute stress disorder)的敘述，「錯誤」者為(A)『創傷後「次日」即可確定診斷』——錯誤，急性壓力症要求『症狀「持續3天至1個月」』，創傷後「次日(未滿3天)」尚不能確診(若超過1個月則為 PTSD)。其他正確:B 暴露於真正或具威脅性的死亡或重傷(創傷暴露);C 會出現逃避、解離、警覺等症狀;D 會引起社交、職業等功能減損。故本題選錯誤者為 A。","options":{"A":"正確(本題選錯誤者)。急性壓力症須症狀持續3天至1個月，非次日即可診斷。","B":"暴露於死亡或重傷的創傷，正確。","C":"會出現逃避、解離、警覺等症狀，正確。","D":"會引起社交、職業功能減損，正確。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","急性壓力症"]}},"111110-N5-25":{"quick":"焦慮：伴隨的身體症狀主要以自主神經系統反應為主。","detail":{"background":"焦慮的正確敘述:(C)『焦慮伴隨的身體症狀，主要以「自主(自律)神經系統」反應為主(心悸、出汗、發抖、口乾、腸胃不適、呼吸急促等交感興奮)』。其他錯誤:A 焦慮是主觀感受，但『「未必」與情境無關(可由情境誘發，如情境性焦慮)』;B『「中度」焦慮時注意力「窄化、選擇性」』，是「輕度」焦慮才提升學習(中度已開始影響);D『防衛機轉「可以」降低焦慮(是潛意識用來緩解焦慮的方式)』，並非不能。故 C 正確。","options":{"A":"焦慮未必與情境無關(可由情境誘發)。","B":"輕度焦慮才提升學習，中度已窄化、影響學習。","C":"正確。焦慮的身體症狀主要以自主神經系統反應為主。","D":"防衛機轉可以降低焦慮，非不能。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"111110-N5-29":{"quick":"厭食症臨床特徵「最不適當」＝臨床上常見合併思覺失調症。","detail":{"background":"厭食症(anorexia nervosa)的臨床特徵，「最不適當」者為(C)『臨床上常見合併「思覺失調症」』——錯誤，厭食症最常合併的是『「憂鬱、焦慮、強迫」等情緒/焦慮疾患』，而非思覺失調症。其他正確:A 好發於年輕女性;B 強烈害怕體重增加或變胖;D 限制攝取身體所需的能量(導致顯著低體重)。故本題選最不適當者為 C。","options":{"A":"好發於年輕女性，正確。","B":"強烈害怕體重增加或變胖，正確。","C":"正確(本題選最不適當者)。厭食症常合併憂鬱、焦慮，非思覺失調症。","D":"限制攝取身體所需能量，正確。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"112030-N5-22":{"quick":"焦慮病人的護理評估：從語言/非語言訊息評估②、評估認知層面③、評估靈性層面④(焦慮不須生理層面評估①錯)。","detail":{"background":"焦慮病人的護理評估，適宜的:(2)護理人員應從病人的「語言及非語言訊息」評估情緒問題;(3)評估病人的「認知層面」有助了解焦慮的程度(如知覺範圍、注意力);(4)評估病人的「靈性層面」有助了解其因應行為的來源(信仰、價值、意義)。而(1)『焦慮是精神疾患，「不須注重生理層面評估」』錯誤——焦慮會引發明顯的「生理(自律神經)症狀」，且須排除生理疾病，故「須」評估生理層面。故正確為②③④(選 D)。","options":{"A":"123：含①(不須生理層面評估)，錯誤。","B":"124：含①，錯誤。","C":"134：含①，錯誤。","D":"正確。語言/非語言訊息②、認知層面③、靈性層面④。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"112030-N5-23":{"quick":"恐慌發作(心跳加速、呼吸困難)：最優先＝與病人一起進行呼吸放鬆，必要時給予紙袋。","detail":{"background":"謝女士恐慌發作(心跳加速、呼吸困難、頭暈、胸悶)前來求助。最優先的護理處置是(D)『陪伴並「與謝女士一起進行呼吸放鬆」，必要時給予「紙袋(處理過度換氣導致的呼吸性鹼中毒)」』——立即協助其穩定呼吸、緩解急性症狀、提供安全感。A『提醒她不要誇大解釋症狀』在發作當下是否定、不當;B『安撫此為前兆、要學習與症狀共存』非急性發作當下的處置;C『詳細詢問所有可能誘因』在急性發作、難以溝通時不適合。故 D 正確。恐慌急性發作時，先陪伴、協助呼吸放鬆、確保安全。","options":{"A":"發作當下提醒「不要誇大」是否定、不當。","B":"「學習與症狀共存」非急性發作當下的處置。","C":"急性發作時詳細詢問誘因不適合。","D":"正確。與病人一起進行呼吸放鬆，必要時給予紙袋。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","恐慌處置"]}},"112030-N5-30":{"quick":"厭食症「錯誤」者＝常用抗精神病藥 Haloperidol 改善症狀。","detail":{"background":"厭食症(anorexia nervosa)的敘述，「錯誤」者為(C)『常用抗精神病藥「Haloperidol」來改善症狀』——錯誤，厭食症並非以 haloperidol(抗精神病藥)為主要治療;其治療以『營養恢復、心理治療(認知行為、家庭治療)、必要時用抗憂鬱劑/促食慾劑(如 olanzapine 有時用於增重)』為主。其他正確:A 好發於年輕女性;B 強烈害怕發胖、拒絕維持正常體重;D 常合併憂鬱、焦慮等症狀。故本題選錯誤者為 C。","options":{"A":"好發於年輕女性，正確。","B":"強烈害怕發胖、拒絕維持正常體重，正確。","C":"正確(本題選錯誤者)。厭食症非以 haloperidol 治療。","D":"常合併憂鬱、焦慮等症狀，正確。"},"sources":["精神科護理學(新文京/華杏)·飲食疾患","DSM-5-TR"]}},"112110-N5-10":{"quick":"屬於 BZD 類「抗焦慮」藥物者＝lorazepam(Ativan)。","detail":{"background":"屬於 benzodiazepine(BZD)類「抗焦慮」藥物的是(B)『lorazepam(Ativan)』——是典型的 BZD 抗焦慮劑(也用於急性激躁、酒精戒斷)。其他:A『zolpidem(Stilnox)』是「非 BZD(Z-drug)」的助眠藥;C『estazolam(Eurodin)』、D『flunitrazepam(Rohypnol)』雖也是 BZD，但臨床主要作為「助眠(hypnotic)」用藥。本題問 BZD 類「抗焦慮」藥物，以 lorazepam 最對應。故 B 正確。","options":{"A":"zolpidem 是非 BZD(Z-drug)的助眠藥。","B":"正確。lorazepam(Ativan)是 BZD 類抗焦慮藥物。","C":"estazolam 是 BZD，但主要作為助眠用。","D":"flunitrazepam 是 BZD，但主要作為助眠用。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","抗焦慮劑"]}},"112110-N5-22":{"quick":"擔心疾病復發而焦慮的護理「最不適切」＝教導家屬日夜督促病人準備考試。","detail":{"background":"陳同學及父母擔心疾病復發而焦慮。護理措施「最不適切」者為(C)『教導家屬「日夜督促病人準備考試」的方法』——督促考試會「增加壓力源」，反而可能誘發復發、加重焦慮(與減壓的目標相反)。其他適切:A 教導病人與疾病共存的技巧;B 教導病人壓力紓解的方法;D 教導家屬預防疾病復發的方法。故本題選最不適切者為 C。對擔心復發的病人與家屬，應協助減壓、預防復發，而非增加壓力。","options":{"A":"教導病人與疾病共存的技巧，適切。","B":"教導病人壓力紓解的方法，適切。","C":"正確(本題選最不適切者)。督促考試會增加壓力、誘發復發。","D":"教導家屬預防疾病復發的方法，適切。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"112110-N5-24":{"quick":"以身體症狀帶來的附帶收穫(secondary gain)＝滿足依賴需求、減輕需負的責任。","detail":{"background":"病人以「身體症狀」帶來的『附帶收穫(secondary gain)』，最適切的敘述是(B)『「滿足病人依賴的需求、減輕其需負的責任(及獲得他人關注、照顧)」』——即藉「生病」這個角色得到的外在好處(被照顧、免除義務)。A『增加病識感與服藥意願』、D『增加社會互動意願』與附帶收穫的概念相反(附帶收穫反而可能「維持」病態);C『記憶力與定向感下降』與附帶收穫無關(那是認知障礙)。故 B 正確。附帶收穫是病人藉症狀獲得的外在好處，可能不自覺地維持症狀。","options":{"A":"附帶收穫反而可能維持病態，非增加病識感。","B":"正確。滿足依賴需求、減輕需負的責任(及獲得關注)。","C":"記憶力與定向感下降與附帶收穫無關。","D":"附帶收穫與「增加社會互動意願」相反。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙","DSM-5-TR"]}},"112110-N5-25":{"quick":"反覆突發胸痛心悸發抖、失去現實感、數分鐘緩解、持續擔心再發作＝恐慌症(panic disorder)。","detail":{"background":"陳先生『近三個月「多次忽然」感到胸痛、心悸、發抖、透不過氣、失去現實感，數分鐘後緩解，檢查無生理疾病，且持續擔心會再發作並死亡』——符合『恐慌症(panic disorder)』:反覆、非預期的恐慌發作(突發、數分鐘達高峰的強烈身體與恐懼症狀)，加上「持續擔心再發作(預期焦慮)」。創傷後壓力症需有創傷事件;廣泛性焦慮是對多事的持續擔憂;社交畏懼症是怕社交情境。本題是「反覆突發的恐慌+預期焦慮」，故為恐慌症。故 B 正確。","options":{"A":"創傷後壓力症需有創傷事件，本題無。","B":"正確。反覆突發的恐慌發作+持續擔心再發作，是恐慌症。","C":"廣泛性焦慮是對多種事件的持續擔憂。","D":"社交畏懼症是怕社交情境。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","恐慌症"]}},"112110-N5-26":{"quick":"半年坐立不安、肌肉緊繃、易疲勞、入睡困難、過度擔心工作家庭＝廣泛性焦慮症。","detail":{"background":"王女士『半年來坐立不安、肌肉緊繃、容易疲勞、入睡困難、總是過度擔心工作或家庭會發生問題』——對多種事件「過度、難以控制的擔心」持續≥6個月，伴坐立難安、肌肉緊張、易疲倦、睡眠障礙，符合『廣泛性焦慮症(GAD)』。慮病症是過度擔心罹病;畏懼症是對特定對象/情境的恐懼;恐慌症是反覆突發的恐慌發作。本題是「對多事的持續過度擔心」，故為廣泛性焦慮症。故 D 正確。","options":{"A":"慮病症是過度擔心罹患重病。","B":"畏懼症是對特定對象/情境的恐懼。","C":"恐慌症是反覆突發的恐慌發作。","D":"正確。對多事過度擔心半年、伴身體症狀，是廣泛性焦慮症。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","GAD"]}},"112180-N5-17":{"quick":"上台報告極度恐懼、無法公共場所用餐、避免與人交談＝社交畏懼症(social phobia)。","detail":{"background":"林同學『上台報告極度恐懼/焦慮、無法在公共場所用餐、儘量避免與他人交談互動』——對「被他人觀察、評價的社交/表現情境」過度恐懼並逃避，符合『社交畏懼症(社交焦慮症 social phobia)』。轉化症是無生理基礎的神經症狀;選擇性不語症是在特定社交情境(如學校)選擇性地不說話(多見於兒童，雖相關但本題是廣泛的社交恐懼與逃避);廣泛性焦慮是對多種事件的持續擔憂。本題核心是「怕社交/表現被評價而逃避」，故為社交畏懼症。故 A 正確。","options":{"A":"正確。怕社交/表現被評價而逃避，是社交畏懼症。","B":"轉化症是無生理基礎的神經症狀。","C":"選擇性不語症是特定情境選擇性不說話(多見兒童)。","D":"廣泛性焦慮是對多種事件的持續擔憂。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社交畏懼症"]}},"112180-N5-18":{"quick":"恐慌發作大喊「快死了」：以「你現在人在醫院，我們陪著你，你很安全」回應。","detail":{"background":"葉先生恐慌發作(喘不過氣、胸痛、四肢麻痺、大喊「快死了」)。最適宜的處置是(D)『「你現在人在醫院，我們陪著你。你很安全」』——以『簡短、堅定、提供安全感與陪伴』的方式安撫(恐慌發作時病人理性受限，需簡單、安定的話語與陪伴)。A『不會、你不會死、不用想太多』帶否定、說教;B『冷靜一下、好好說清楚發作的感覺』在急性發作、難以表達時不適合;C『以前都怎麼處理』在發作當下不是重點。故 D 正確。恐慌急性發作時，以簡短安定的話語提供安全感與陪伴。","options":{"A":"「不會死、不用想太多」帶否定、說教。","B":"急性發作、難以表達時，要他說清楚不適合。","C":"問「以前怎麼處理」在發作當下不是重點。","D":"正確。「你在醫院、我們陪著你、你很安全」提供安全感與陪伴。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","恐慌處置"]}},"113030-N5-6":{"quick":"強迫症(覺得門把髒、用紙包覆才轉)：提供紙張，直到他的焦慮減輕。","detail":{"background":"汪小姐剛入住、強迫症(覺得門把髒、用紙包覆才願轉動)。最適宜的護理是(D)『「提供他紙張」，直到他的焦慮減輕』——在治療初期，先「接納其因應方式、降低焦慮、建立信任」，不在初期強行剝奪其強迫行為(強行剝奪會大幅升高焦慮)。A『不給紙張、強迫適應』、C『要他清洗門把』都會大幅升高焦慮、像懲罰;B『解說拿紙張不必要』是爭辯、否定(強迫症病人多已知不合理仍無法控制)。故 D 正確。對強迫行為，初期宜接納、降低焦慮，待關係建立後再以行為治療漸進處理。","options":{"A":"不給紙張、強迫適應會大幅升高焦慮。","B":"解說「不必要」是爭辯、否定(病人已知不合理仍難控制)。","C":"要他清洗門把像懲罰、會升高焦慮。","D":"正確。提供紙張、直到焦慮減輕，先接納、降低焦慮。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","強迫症護理"]}},"113030-N5-14":{"quick":"恐慌症「最不適切」者＝預期中的反覆發作(應為「非預期」突發發作)。","detail":{"background":"恐慌症的敘述，「最不適切」者為(A)『「預期中」的反覆發作』——錯誤，恐慌症的恐慌發作是『「非預期(unexpected)、突發」的(無明顯誘因、突如其來)』，並非「預期中」。其他正確:B 突發的恐懼會於「幾分鐘內達最高峰」;C 常見心悸、喘不過氣、胸痛等(自律神經)症狀;D 可能出現「失真感(去現實感)、失自我感(去人格化)」。故本題選最不適切者為 A。恐慌發作的核心特徵是「非預期、突發、數分鐘達高峰」。","options":{"A":"正確(本題選最不適切者)。恐慌發作是非預期、突發的，非預期中。","B":"突發恐懼幾分鐘內達最高峰，正確。","C":"常見心悸、喘不過氣、胸痛，正確。","D":"可能出現失真感、失自我感，正確。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","恐慌症"]}},"113030-N5-23":{"quick":"災難急性期的安心團體(debriefing)：治療者協助個案回顧、經歷並整合創傷的過程。","detail":{"background":"災難急性期運用安心團體(debriefing)，最適切的是(B)『治療者協助個案「回顧、經歷並整合」創傷的過程(在支持的團體中分享經驗與感受、正常化反應、提供支持)』。其他錯誤:A『於創傷後「三個月」開始實施』錯誤(debriefing 是「急性期、創傷後數天內」的危機介入，非三個月後);C 它是『「危機介入/支持性」團體』，並非「精神分析類」;D 其步驟以「分享、支持、教育」為主，並非「駁斥、面質」(面質不適用於急性創傷)。故 B 正確。","options":{"A":"debriefing 是急性期(數天內)的介入，非三個月後。","B":"正確。治療者協助個案回顧、經歷並整合創傷的過程。","C":"屬危機介入/支持性團體，非精神分析類。","D":"以分享、支持、教育為主，非駁斥、面質。"},"sources":["精神科護理學(新文京/華杏)·創傷及壓力相關疾患","DSM-5-TR","危機介入"]}},"113100-N5-5":{"quick":"恐慌症：發作時應以病人「安全」為優先處置。","detail":{"background":"恐慌症的正確敘述:(D)『發作時應以「病人安全」為優先處置(陪伴、確保安全、協助呼吸放鬆)』。其他錯誤:A 恐慌症是『焦慮疾患(與正腎上腺素、血清素、GABA 失調及心理因素有關)』，並非「器質性因素引起的急性混亂」;B 藥物治療以『SSRI/SNRI(抗憂鬱劑)及 BZD』為主，並非「鋰鹽」;C 心理治療(認知行為治療、放鬆訓練)『「有助」於改善病情』，並非無助。故 D 正確。恐慌發作時，以陪伴、安全與緩解急性症狀為優先。","options":{"A":"恐慌症是焦慮疾患，非器質性因素引起的急性混亂。","B":"藥物以 SSRI/SNRI、BZD 為主，非鋰鹽。","C":"心理治療(CBT、放鬆)有助改善，非無助。","D":"正確。發作時應以病人安全為優先處置。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","恐慌症"]}},"113100-N5-17":{"quick":"PTSD「最不適切」者＝症狀需持續六個月以上(應為≥1個月)。","detail":{"background":"創傷後壓力症(PTSD)的敘述，「最不適切」者為(A)『症狀需持續「六個月」以上』——錯誤，PTSD 的診斷要求『症狀持續「超過1個月」』(未滿1個月為急性壓力症);「症狀延遲6個月後才出現」是「延遲表現型」的另一概念，但「需持續六個月以上」並非診斷要件。其他正確:B 會對意外的原因或結果「歸咎自己(負面認知)」;C 不斷出現火車出軌的畫面(再經驗);D 可能出現口語或肢體攻擊性行為(過度警覺/易怒)。故本題選最不適切者為 A。","options":{"A":"正確(本題選最不適切者)。PTSD 症狀需持續超過1個月，非六個月。","B":"會歸咎自己(負面認知)，正確。","C":"不斷出現出軌畫面(再經驗)，正確。","D":"可能出現口語或肢體攻擊(易怒)，正確。"},"sources":["精神科護理學(新文京/華杏)·創傷及壓力相關疾患","DSM-5-TR"]}},"113180-N5-16":{"quick":"身體症狀障礙症「較不適切」者＝與人格特質有關、但與生活壓力「無關」。","detail":{"background":"身體症狀障礙症(somatic symptom disorder)的敘述，「較不適切」者為(A)『與人格特質有關，「但與生活壓力無關」』——錯誤，身體症狀障礙症『「與生活壓力有關」(心理社會壓力會誘發、加重身體症狀)』。其他正確(屬其特徵/附帶收穫):B 藉此引起周遭他人的注意;C 藉此獲得親朋好友的支持與同情;D 以身體症狀掩飾情緒困擾。故本題選較不適切者為 A。身體症狀障礙與心理壓力密切相關。","options":{"A":"正確(本題選較不適切者)。身體症狀障礙與生活壓力有關，非無關。","B":"藉此引起他人注意，是其附帶收穫。","C":"藉此獲得支持與同情，是其附帶收穫。","D":"以身體症狀掩飾情緒困擾，正確。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙","DSM-5-TR"]}},"114030-N5-15":{"quick":"PTSD：會出現解離反應，感到創傷事件重演。","detail":{"background":"創傷後壓力症(PTSD)的正確敘述:(A)『會出現「解離反應(flashback)」，感到創傷事件「重演(彷彿再次發生)」』。其他錯誤:B 創傷暴露『「包含」目擊創傷發生在他人身上的經驗』，並非不包含;C 創傷相關線索『「會」產生明顯的生理反應(心悸、出汗等)』，並非不會;D 負面情緒『「包含」易怒或無預兆的發怒』，並非不包含。故 A 正確。PTSD 的核心症狀群包括再經驗(含解離性 flashback)、逃避、負面認知情緒、過度警覺。","options":{"A":"正確。會出現解離反應(flashback)，感到創傷事件重演。","B":"PTSD 的創傷暴露包含目擊他人遭遇，非不包含。","C":"創傷線索會產生明顯生理反應，非不會。","D":"負面情緒包含易怒或無預兆發怒，非不包含。"},"sources":["精神科護理學(新文京/華杏)·創傷及壓力相關疾患","DSM-5-TR"]}},"114030-N5-16":{"quick":"看到妹妹就默念圓周率以減輕「希望妹妹死」的念頭＝抵消(undoing)。","detail":{"background":"辛小姐強迫症、反覆出現「希望妹妹死掉」的念頭(強迫思考)而焦慮，於是「看到妹妹時就在心中默念圓周率」以減輕焦慮(強迫行為)——這是藉由某「象徵性的行為(默念數字)」來「抵消/消除」內心不被接受的念頭(希望妹妹死)所引發的焦慮，屬『抵消(undoing)』。投射是把內在歸於外界;解離是把意識/記憶分離。C『證明數學好(自我肯定)』與其焦慮無關。本題核心是「以儀式行為抵消負面念頭」，故為抵消。故 A 正確。","options":{"A":"正確。以默念數字的儀式抵消「希望妹妹死」的念頭，是抵消(undoing)。","B":"投射是把內在歸因於外界。","C":"「證明數學好」與其焦慮無關。","D":"解離是把意識/記憶分離。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","防衛機轉·強迫症"]}},"114100-N5-15":{"quick":"創傷知情照護「最不適當」＝讓病人努力回憶及描述創傷事件的過程。","detail":{"background":"創傷知情照護(trauma-informed care)的原則中，「最不適當」者為(C)『讓病人「努力回憶及描述創傷事件的過程」』——錯誤，創傷知情照護強調『「避免再創傷(re-traumatization)」、提供安全、不強迫病人重述創傷細節』，不應「讓病人努力回憶/詳述創傷」(那可能造成再次創傷)。其他適當:A 協助病人辨識和處理創傷相關的症狀;B 理解創傷對病人生活/行為的影響;D 提供病人安全環境與心理上的安全感。故本題選最不適當者為 C。","options":{"A":"協助辨識和處理創傷相關症狀，適當。","B":"理解創傷對生活/行為的影響，適當。","C":"正確(本題選最不適當者)。不應強迫病人努力回憶/詳述創傷，以免再創傷。","D":"提供安全環境與心理安全感，適當。"},"sources":["精神科護理學(新文京/華杏)·創傷及壓力相關疾患","DSM-5-TR"]}},"114100-N5-16":{"quick":"在意成績、考試時手能握筆卻突然無法寫字、檢查正常＝轉化症(功能性神經症狀障礙症)。","detail":{"background":"李同學「非常在意成績」，在「考試(壓力)」時『手能握筆卻突然無法寫字、神經內科檢查手部功能正常』——心理壓力轉化為「無生理基礎的神經(運動)功能症狀(寫字障礙)」，符合『轉化症(功能性神經症狀障礙症 conversion disorder)』。罹病焦慮症是過度擔心罹病;身體症狀障礙症是對多重身體症狀過度關注;自我感障礙症(去人格化)是覺得自己不真實。本題是「壓力下出現無生理基礎的運動功能障礙」，故為轉化症。故 A 正確。","options":{"A":"正確。壓力下手無法寫字、檢查正常，是轉化症(功能性神經症狀障礙症)。","B":"罹病焦慮症是過度擔心罹病。","C":"身體症狀障礙症是對多重身體症狀過度關注。","D":"自我感障礙症是覺得自己不真實。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙","DSM-5-TR"]}},"114100-N5-25":{"quick":"災難倖存者急性期反應「最不適當」＝會接納自己與家人的遭遇。","detail":{"background":"小美在大地震中失去父親、自己雙腿截肢。災難倖存者「急性期」的反應，「最不適當(不符)」者為(D)『會「接納」自己與家人的遭遇』——錯誤，在急性期，倖存者通常『「難以接納」、處於震驚、否認、憤怒、罪惡感、麻木』等狀態，「接納」是哀傷歷程「後期」才可能達到的，並非急性期的表現。其他符合急性期反應:A 會有揮之不去的印記(再經驗);B 因親人死亡伴隨罪惡感(倖存者罪惡感);C 出現無端的憤怒。故本題選最不適當者為 D。","options":{"A":"會有揮之不去的印記(再經驗)，符合急性期。","B":"因親人死亡伴隨罪惡感(倖存者罪惡感)，符合。","C":"出現無端的憤怒，符合急性期。","D":"正確(本題選最不適當者)。急性期難以接納，接納是後期才可能達到。"},"sources":["精神科護理學(新文京/華杏)·創傷及壓力相關疾患","DSM-5-TR"]}},"114170-N5-5":{"quick":"特定場所畏懼症(懼曠症)「最不適當」＝恐懼僅與社交場合有關(應為怕難逃離的場所)。","detail":{"background":"特定場所畏懼症(懼曠症 agoraphobia)的敘述，「最不適當」者為(C)『恐懼或焦慮「僅與社交場合有關」』——錯誤，懼曠症的恐懼是對『「難以逃離或得到協助的場所(如大眾運輸、開放空間、密閉空間、人群、獨自外出)」』，而「僅與社交場合有關」是「社交畏懼症」的描述，非懼曠症。其他較符合:A 病人知道這種害怕不合理、反應過度;D 病人會出現恐懼或主動逃避這些特定場合。故本題選最不適當者為 C。","options":{"A":"病人知道害怕不合理、反應過度，符合。","B":"對特定情境表現顯著恐懼(本題以 C 為最不適當)。","C":"正確(本題選最不適當者)。「僅與社交場合有關」是社交畏懼症，非懼曠症。","D":"會出現恐懼或主動逃避特定場合，符合。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","懼曠症"]}},"114170-N5-9":{"quick":"PTSD「最不適當」者＝不會影響社交、職業或其他重要領域的功能。","detail":{"background":"創傷後壓力症(PTSD)的敘述，「最不適當」者為(D)『「不會」影響社交、職業或其他重要領域的功能』——錯誤，PTSD『「會」造成社交、職業或其他重要領域功能的顯著減損(這是診斷要件之一)』。其他正確:A 親身目擊事件者可能也是受創者(創傷暴露包含目睹);B 會出現解離、記憶重現(flashback)等反應;C 努力逃避與創傷事件相關的痛苦記憶。故本題選最不適當者為 D。","options":{"A":"目擊者可能也是受創者，正確。","B":"會出現解離、記憶重現，正確。","C":"努力逃避與創傷相關的痛苦記憶，正確。","D":"正確(本題選最不適當者)。PTSD 會影響社交、職業功能。"},"sources":["精神科護理學(新文京/華杏)·創傷及壓力相關疾患","DSM-5-TR"]}},"114170-N5-10":{"quick":"解離性失憶症的護理：引導病人表達情緒和感受。","detail":{"background":"解離性失憶症(dissociative amnesia)的護理措施，最適當的是(C)『引導病人「表達情緒和感受」』——解離性失憶常是面對創傷/壓力的心理防衛，護理重點在提供安全、支持，協助病人逐步表達與處理被解離的情緒(而非急於恢復記憶)。其他不適當:A『「主要」目標是把缺損記憶回憶起來』錯誤(不應急於、強迫喚回記憶，以免再創傷);B『因應日常生活「嚴重失能」』不符(解離性失憶病人的日常功能多大致保留);D『鼓勵聚焦於身體症狀』錯誤(不應強化症狀)。故 C 正確。","options":{"A":"不應急於、強迫喚回記憶，非主要目標。","B":"解離性失憶病人日常功能多保留，非嚴重失能。","C":"正確。引導病人表達情緒和感受，提供安全與支持。","D":"不應鼓勵聚焦於身體症狀(強化症狀)。"},"sources":["精神科護理學(新文京/華杏)·身體症狀及解離障礙","DSM-5-TR","解離症"]}},"114170-N5-15":{"quick":"大火後房屋全毀、燒傷、強烈焦慮憂鬱：首要的災難危機處置目標＝穩定狀態、減緩症狀。","detail":{"background":"小宣18歲、家中大火房屋全毀、腿部燒傷、有強烈焦慮及憂鬱反應(急性危機)。目前「首要」的災難危機處置目標是(B)『「穩定狀態、減緩症狀」(提供安全、安心、穩定情緒、緩解急性焦慮憂鬱)』——危機介入的首要是穩定當前的危機與情緒。安排工作訓練/就業輔導、房屋重建、休閒娛樂都是後續、長期的處置，非急性危機期的首要。故 B 正確。災難危機介入的首要目標是穩定狀態、確保安全、減緩急性症狀。","options":{"A":"工作訓練/就業輔導是後續的長期處置。","B":"正確。首要是穩定狀態、減緩症狀(危機介入)。","C":"房屋重建是後續的長期處置。","D":"安排休閒娛樂非急性危機期的首要。"},"sources":["精神科護理學(新文京/華杏)·創傷及壓力相關疾患","DSM-5-TR","危機介入"]}},"115030-N5-15":{"quick":"恐慌發作後最可能：避免現身於不熟悉的情境，以免恐慌發作(預期焦慮+迴避)。","detail":{"background":"恐慌症病人在至少一次恐慌發作後，最有可能出現(D)『避免現身於不熟悉的情境(以免恐慌發作)』——即『預期焦慮(擔心再發作)+迴避行為(避開可能誘發或難以逃離的場所，可能進展為懼曠症)』。其他錯誤:A 會『「更加關注」自己的身體感受(對身體訊號過度警覺)』，並非減少關注;B 會『「持續擔憂」下一次發作』，並非試圖忽略;C『時常出現解離症狀』非恐慌症發作後的典型表現。故 D 正確。恐慌症發作後的核心是「持續預期焦慮+迴避行為」。","options":{"A":"會更加關注身體感受，非減少關注。","B":"會持續擔憂下一次發作，非試圖忽略。","C":"解離症狀非恐慌症發作後的典型表現。","D":"正確。避免現身不熟悉情境(預期焦慮+迴避)。"},"sources":["精神科護理學(新文京/華杏)·焦慮及相關疾患","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","恐慌症"]}},"115030-N5-17":{"quick":"PTSD「最不可能」的反應＝經常重返事故地點(PTSD 是「逃避」而非重返)。","detail":{"background":"林先生土石流目睹父親死亡後罹患 PTSD，每當下大雨/看到土石流新聞時，「最不可能」出現的反應是(D)『「經常重返事故地點」』——錯誤，PTSD 的核心症狀之一是『「逃避(avoidance)」與創傷相關的人事物、地點』，病人會「避開」而非「重返」事故地點。其他符合 PTSD:A 過度的悲痛與罪惡感(負面認知情緒);B 人際疏離、無法感受到快樂(負面情緒、情感麻木);C 失眠、反覆的噩夢(過度警覺、再經驗)。故本題選最不可能者為 D。","options":{"A":"過度的悲痛與罪惡感(負面認知情緒)，符合 PTSD。","B":"人際疏離、無法感受快樂(情感麻木)，符合。","C":"失眠、反覆噩夢(再經驗、過度警覺)，符合。","D":"正確(本題選最不可能者)。PTSD 是逃避事故地點，非重返。"},"sources":["精神科護理學(新文京/華杏)·創傷及壓力相關疾患","DSM-5-TR"]}}},TO=["焦慮強迫創傷解離身體症狀與飲食疾患"],LEC={"焦慮強迫創傷解離身體症狀與飲食疾患":{"title":"焦慮強迫創傷與飲食疾患　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「焦慮強迫創傷解離身體症狀與飲食疾患」的歷屆考題共 95 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_p5_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
