『『『無『『神經『後遺症(『與『『細菌性『不同;細菌性『才『易『後遺症)』」。本題「錯誤」者為B。","options":{"A":"正確。採支持性療法或症狀治療。","B":"錯誤(本題答案)。病毒性腦膜炎大多無神經後遺症(預後良好)。","C":"正確。持續監測生命徵象。","D":"正確。合併細菌感染才給抗生素。"},"sources":["Nelson《兒科學》病毒性腦膜炎","預後"]}},"112110-N4-58":{"quick":"6歲三斑家蚊叮咬後發燒頭痛痙攣頸僵(日本腦炎)CSF正確的是「蛋白質上升」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:『細菌性『外觀『混濁、『蛋白質『『升高、『葡萄糖『『『降低、『『嗜中性『白血球『增加、壓力『升』;『病毒/無菌性『外觀『清澈、『蛋白質『輕微升、『葡萄糖『『正常、『『淋巴球『為主、壓力『正常或稍升』。腦膜刺激徵:『『布魯辛斯基徵象(Brudzinski)『=『『平躺『將『頸部『迅速『前『屈→『『膝/髖『不自主『屈曲』;『『柯林氏徵象(Kernig)『=『『平躺『將『髖膝『屈曲90度→『『伸直『小腿『有『阻力/疼痛』;角弓反張(opisthotonos)』。護理:『細菌性『靜脈『抗生素『≥10天、『維持『體溫、『『『減少『聲光『刺激(『非『增加;『畏光/躁動)』、姿勢調整減痛』。腰椎穿刺(LP):『採『『側臥『『抱膝『蝦米『姿(『非『俯臥)』、無菌技術、『穿刺『後『『『平躺『4~6小時『減頭痛』、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)』。日本腦炎:『『三斑家蚊『媒介(『黃昏『避『外出)、『『不『人傳人/不需『隔離『血液分泌物』、有疫苗』。腮腺炎(mumps)最常見併發症=『無菌性『腦膜炎』。 日本腦炎(病毒性腦炎)『CSF』:『『『蛋白質『『『上升、『『淋巴球『增加、『『葡萄糖『『『正常(『非『下降)、壓力『升、外觀清/微濁』。本題正確為「蛋白質上升」(A);血小板下降(B非CSF項目)、球蛋白陰性(C錯)、葡萄糖下降(D錯,病毒性葡萄糖正常)。本題為A。","options":{"A":"正確。日本腦炎CSF蛋白質上升。","B":"血小板是血液項目(非CSF)。","C":"錯。球蛋白反應多陽性。","D":"錯。病毒性葡萄糖正常(非下降;下降是細菌性)。"},"sources":["疾管署 日本腦炎","CSF"]}},"112180-N4-50":{"quick":"無菌性腦膜炎(aseptic meningitis)CSF正確的是「腦脊髓壓力正常或稍上升」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:『細菌性『外觀『混濁、『蛋白質『『升高、『葡萄糖『『『降低、『『嗜中性『白血球『增加、壓力『升』;『病毒/無菌性『外觀『清澈、『蛋白質『輕微升、『葡萄糖『『正常、『『淋巴球『為主、壓力『正常或稍升』。腦膜刺激徵:『『布魯辛斯基徵象(Brudzinski)『=『『平躺『將『頸部『迅速『前『屈→『『膝/髖『不自主『屈曲』;『『柯林氏徵象(Kernig)『=『『平躺『將『髖膝『屈曲90度→『『伸直『小腿『有『阻力/疼痛』;角弓反張(opisthotonos)』。護理:『細菌性『靜脈『抗生素『≥10天、『維持『體溫、『『『減少『聲光『刺激(『非『增加;『畏光/躁動)』、姿勢調整減痛』。腰椎穿刺(LP):『採『『側臥『『抱膝『蝦米『姿(『非『俯臥)』、無菌技術、『穿刺『後『『『平躺『4~6小時『減頭痛』、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)』。日本腦炎:『『三斑家蚊『媒介(『黃昏『避『外出)、『『不『人傳人/不需『隔離『血液分泌物』、有疫苗』。腮腺炎(mumps)最常見併發症=『無菌性『腦膜炎』。 無菌性(病毒性)腦膜炎CSF:(1)『外觀『『『清澈(非白濁濃稠)』』,A錯;(2)『蛋白質『『輕微『升(『非『大幅『下降)』』,B錯;(3)「『『壓力『『正常『或『『稍『『上升』」——正確;(4)『葡萄糖『『『『正常(非『大幅『上升)』』,D錯。本題為C。","options":{"A":"錯。無菌性外觀清澈(非白濁濃稠;白濁是細菌性)。","B":"錯。蛋白質輕微升(非大幅下降)。","C":"正確。腦脊髓壓力正常或稍上升。","D":"錯。葡萄糖正常(非大幅上升)。"},"sources":["Nelson《兒科學》無菌性腦膜炎","CSF"]}},"113100-N4-37":{"quick":"日本腦炎症狀與處置『錯誤』的是「預防感染需要隔離病患的血液和分泌物」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:『細菌性『外觀『混濁、『蛋白質『『升高、『葡萄糖『『『降低、『『嗜中性『白血球『增加、壓力『升』;『病毒/無菌性『外觀『清澈、『蛋白質『輕微升、『葡萄糖『『正常、『『淋巴球『為主、壓力『正常或稍升』。腦膜刺激徵:『『布魯辛斯基徵象(Brudzinski)『=『『平躺『將『頸部『迅速『前『屈→『『膝/髖『不自主『屈曲』;『『柯林氏徵象(Kernig)『=『『平躺『將『髖膝『屈曲90度→『『伸直『小腿『有『阻力/疼痛』;角弓反張(opisthotonos)』。護理:『細菌性『靜脈『抗生素『≥10天、『維持『體溫、『『『減少『聲光『刺激(『非『增加;『畏光/躁動)』、姿勢調整減痛』。腰椎穿刺(LP):『採『『側臥『『抱膝『蝦米『姿(『非『俯臥)』、無菌技術、『穿刺『後『『『平躺『4~6小時『減頭痛』、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)』。日本腦炎:『『三斑家蚊『媒介(『黃昏『避『外出)、『『不『人傳人/不需『隔離『血液分泌物』、有疫苗』。腮腺炎(mumps)最常見併發症=『無菌性『腦膜炎』。 日本腦炎:三斑家蚊媒介、黃昏避免戶外防病媒蚊、前驅期頭痛倦怠皆正確。「『『需『『隔離『『血液『和『分泌物』」錯誤——『日本腦炎『『『不『人傳人(『須『蚊媒)』,『『『『不需『『隔離『病患『血液『分泌物』」。本題「錯誤」者為C。","options":{"A":"正確。傳播媒介以三斑家蚊為主。","B":"正確。黃昏避免至戶外防病媒蚊叮咬。","C":"錯誤(本題答案)。日本腦炎不人傳人,不需隔離血液分泌物。","D":"正確。前驅期出現頭痛、倦怠。"},"sources":["疾管署 日本腦炎","不隔離"]}},"114030-N4-48":{"quick":"9歲病毒性腦膜炎症狀和治療『錯誤』的是「最主要的治療是儘早給與抗生素」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:『細菌性『外觀『混濁、『蛋白質『『升高、『葡萄糖『『『降低、『『嗜中性『白血球『增加、壓力『升』;『病毒/無菌性『外觀『清澈、『蛋白質『輕微升、『葡萄糖『『正常、『『淋巴球『為主、壓力『正常或稍升』。腦膜刺激徵:『『布魯辛斯基徵象(Brudzinski)『=『『平躺『將『頸部『迅速『前『屈→『『膝/髖『不自主『屈曲』;『『柯林氏徵象(Kernig)『=『『平躺『將『髖膝『屈曲90度→『『伸直『小腿『有『阻力/疼痛』;角弓反張(opisthotonos)』。護理:『細菌性『靜脈『抗生素『≥10天、『維持『體溫、『『『減少『聲光『刺激(『非『增加;『畏光/躁動)』、姿勢調整減痛』。腰椎穿刺(LP):『採『『側臥『『抱膝『蝦米『姿(『非『俯臥)』、無菌技術、『穿刺『後『『『平躺『4~6小時『減頭痛』、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)』。日本腦炎:『『三斑家蚊『媒介(『黃昏『避『外出)、『『不『人傳人/不需『隔離『血液分泌物』、有疫苗』。腮腺炎(mumps)最常見併發症=『無菌性『腦膜炎』。 病毒性腦膜炎:多由腸病毒及腮腺炎病毒引起、CSF外觀清澈、少有神經後遺症皆正確。「『『最主要『治療『『『『儘早『『『抗生素』」錯誤——『『病毒性『腦膜炎『『『『抗生素『『『『無效』,『『主要『『『『支持/症狀『治療(『抗生素『『只用於『『細菌性『或『合併『細菌『感染)』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。病毒性腦膜炎抗生素無效,主要支持療法。","B":"正確。大部分由腸病毒及腮腺炎病毒引起。","C":"正確。腦脊髓液外觀通常清澈。","D":"正確。少有神經功能障礙後遺症。"},"sources":["Nelson《兒科學》病毒性腦膜炎","支持療法"]}},"114170-N4-49":{"quick":"15個月疑似腦膜炎最適當的是「細菌性腦膜炎之脊髓液中蛋白質值明顯升高」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:『細菌性『外觀『混濁、『蛋白質『『升高、『葡萄糖『『『降低、『『嗜中性『白血球『增加、壓力『升』;『病毒/無菌性『外觀『清澈、『蛋白質『輕微升、『葡萄糖『『正常、『『淋巴球『為主、壓力『正常或稍升』。腦膜刺激徵:『『布魯辛斯基徵象(Brudzinski)『=『『平躺『將『頸部『迅速『前『屈→『『膝/髖『不自主『屈曲』;『『柯林氏徵象(Kernig)『=『『平躺『將『髖膝『屈曲90度→『『伸直『小腿『有『阻力/疼痛』;角弓反張(opisthotonos)』。護理:『細菌性『靜脈『抗生素『≥10天、『維持『體溫、『『『減少『聲光『刺激(『非『增加;『畏光/躁動)』、姿勢調整減痛』。腰椎穿刺(LP):『採『『側臥『『抱膝『蝦米『姿(『非『俯臥)』、無菌技術、『穿刺『後『『『平躺『4~6小時『減頭痛』、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)』。日本腦炎:『『三斑家蚊『媒介(『黃昏『避『外出)、『『不『人傳人/不需『隔離『血液分泌物』、有疫苗』。腮腺炎(mumps)最常見併發症=『無菌性『腦膜炎』。 (1)「『『細菌性『腦膜炎『CSF『『蛋白質『『『明顯『『升高』」——正確;(2)『病毒性『葡萄糖『『『正常(非『明顯『升高)』』,B錯;(3)『細菌性『症狀『『『重、病程『『急(非『輕)』』,C錯;(4)『Kernig『等『腦膜刺激徵『『嬰幼兒『『『『不一定『明顯(月齡小『可能『不典型)』』,D不一定。本題為A。","options":{"A":"正確。細菌性腦膜炎CSF蛋白質明顯升高。","B":"錯。病毒性葡萄糖正常(非明顯升高)。","C":"錯。細菌性症狀重、病程急(非輕)。","D":"嬰幼兒Kernig不一定明顯。"},"sources":["Nelson《兒科學》腦膜炎","蛋白質"]}},"101030-N4-78":{"quick":"癲癇兒童生酮飲食中比例需高達70~80%的成分是「脂肪」。","detail":{"background":"癲癇/痙攣護理:『發作時『『『側臥(利分泌物流出)、『移開『尖銳『硬物『防撞傷、『『勿『『強行『『放『壓舌板/扳開『牙關、『『勿『約束『肢體、『『勿『口對口『人工呼吸(發作『短暫;觀察記錄『型態時間)』』。失神性發作(absence)』:『『數秒『動作『停止『發呆/作白日夢、『『無『跌倒/抽搐、發作後『『無『嗜睡』』,『可『正常『活動(『游泳『須『有人『陪/救生衣)』。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:『『『定時『回診『監測『血中『藥物『濃度、『『發作『控制『『『也『『不可『『自行『停藥(『驟停『致『癲癇『重積)、『phenytoin(Dilantin)『副作用『『牙齦『增生『須『口腔『護理』;『Dilantin『靜脈『須『『生理食鹽水『稀釋(『『非『葡萄糖,『會『沈澱)』、『不與『牛奶『同服』。熱性痙攣(febrile convulsion):『6個月~5歲、『『發燒『誘發(體溫『驟升)、『單純型『『全身性『<15分鐘、『預後『良好『『少『後遺症/少『轉『癲癇、『『『非『終生『服藥』;發作側臥、退燒、床欄護墊』。生酮飲食:『『『高脂肪(70~80%)、低醣、適量蛋白』、『『酮體『穩定『神經『傳導『鎮定』、用於『『頑固型/藥效不佳『癲癇』。腮腺炎最常見併發症=無菌性腦膜炎。 『生酮『飲食』:『『『脂肪『『佔『『『70~80%』(『高脂、低醣、適量蛋白)』→『產生『酮體『穩定『神經『傳導『達『抗癲癇』。本題為「脂肪」(A);蛋白質適量、醣類低、纖維質非70~80%。本題為A。","options":{"A":"正確。生酮飲食脂肪佔70~80%。","B":"蛋白質適量(非70~80%)。","C":"醣類須低(非高)。","D":"纖維質非主要比例。"},"sources":["Nelson《兒科學》生酮飲食","脂肪"]}},"101110-N4-22":{"quick":"失神性發作(absence seizure)正確的是「發作時,會有數秒鐘動作停止」。","detail":{"background":"癲癇/痙攣護理:『發作時『『『側臥(利分泌物流出)、『移開『尖銳『硬物『防撞傷、『『勿『『強行『『放『壓舌板/扳開『牙關、『『勿『約束『肢體、『『勿『口對口『人工呼吸(發作『短暫;觀察記錄『型態時間)』』。失神性發作(absence)』:『『數秒『動作『停止『發呆/作白日夢、『『無『跌倒/抽搐、發作後『『無『嗜睡』』,『可『正常『活動(『游泳『須『有人『陪/救生衣)』。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:『『『定時『回診『監測『血中『藥物『濃度、『『發作『控制『『『也『『不可『『自行『停藥(『驟停『致『癲癇『重積)、『phenytoin(Dilantin)『副作用『『牙齦『增生『須『口腔『護理』;『Dilantin『靜脈『須『『生理食鹽水『稀釋(『『非『葡萄糖,『會『沈澱)』、『不與『牛奶『同服』。熱性痙攣(febrile convulsion):『6個月~5歲、『『發燒『誘發(體溫『驟升)、『單純型『『全身性『<15分鐘、『預後『良好『『少『後遺症/少『轉『癲癇、『『『非『終生『服藥』;發作側臥、退燒、床欄護墊』。生酮飲食:『『『高脂肪(70~80%)、低醣、適量蛋白』、『『酮體『穩定『神經『傳導『鎮定』、用於『『頑固型/藥效不佳『癲癇』。腮腺炎最常見併發症=無菌性腦膜炎。 失神性發作:『『『數秒『『『動作『『停止(『發呆/凝視/作白日夢)』、『『無『抽搐/跌倒、『『無『尿失禁、『『發作後『『『『無『嗜睡(立即『恢復)』。本題正確為「數秒動作停止」(A);臉部半邊抽搐(B是局部發作)、尿失禁(C是全身性)、發作後嗜睡(D是全身性)非失神性。本題為A。","options":{"A":"正確。失神性發作有數秒鐘動作停止(凝視)。","B":"臉部半邊抽搐是局部發作。","C":"尿失禁是全身性發作。","D":"發作後嗜睡是全身性發作(失神性無嗜睡)。"},"sources":["Nelson《兒科學》失神性發作","凝視"]}},"102030-N4-49":{"quick":"小學二年級教室內全身性發作癲癇最適當處置是「移除小玲身旁的桌椅與尖銳物,以避免撞傷」。","detail":{"background":"癲癇/痙攣護理:『發作時『『『側臥(利分泌物流出)、『移開『尖銳『硬物『防撞傷、『『勿『『強行『『放『壓舌板/扳開『牙關、『『勿『約束『肢體、『『勿『口對口『人工呼吸(發作『短暫;觀察記錄『型態時間)』』。失神性發作(absence)』:『『數秒『動作『停止『發呆/作白日夢、『『無『跌倒/抽搐、發作後『『無『嗜睡』』,『可『正常『活動(『游泳『須『有人『陪/救生衣)』。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:『『『定時『回診『監測『血中『藥物『濃度、『『發作『控制『『『也『『不可『『自行『停藥(『驟停『致『癲癇『重積)、『phenytoin(Dilantin)『副作用『『牙齦『增生『須『口腔『護理』;『Dilantin『靜脈『須『『生理食鹽水『稀釋(『『非『葡萄糖,『會『沈澱)』、『不與『牛奶『同服』。熱性痙攣(febrile convulsion):『6個月~5歲、『『發燒『誘發(體溫『驟升)、『單純型『『全身性『<15分鐘、『預後『良好『『少『後遺症/少『轉『癲癇、『『『非『終生『服藥』;發作側臥、退燒、床欄護墊』。生酮飲食:『『『高脂肪(70~80%)、低醣、適量蛋白』、『『酮體『穩定『神經『傳導『鎮定』、用於『『頑固型/藥效不佳『癲癇』。腮腺炎最常見併發症=無菌性腦膜炎。 全身性發作處置:『『『移除『『身旁『『桌椅/尖銳『硬物『防『撞傷』、側臥、勿放壓舌板、勿約束。本題最適當為「移除桌椅尖銳物避免撞傷」(C);課本墊頭(A,不宜墊高頭)、抱緊/包裹(D,勿約束)、頭部擺正(B,應側臥)非最適當。本題為C。","options":{"A":"不宜用課本墊高頭部。","B":"應協助側臥(非僅擺正)。","C":"正確。移除桌椅與尖銳物避免撞傷。","D":"錯。勿抱緊/包裹約束。"},"sources":["Nelson《兒科學》癲癇發作","移除硬物"]}},"102030-N4-77":{"quick":"靜脈注射Dilantin(癲能停)控制癲癇『錯誤』的是「Dilantin需以5%葡萄糖的靜脈輸液稀釋」。","detail":{"background":"癲癇/痙攣護理:『發作時『『『側臥(利分泌物流出)、『移開『尖銳『硬物『防撞傷、『『勿『『強行『『放『壓舌板/扳開『牙關、『『勿『約束『肢體、『『勿『口對口『人工呼吸(發作『短暫;觀察記錄『型態時間)』』。失神性發作(absence)』:『『數秒『動作『停止『發呆/作白日夢、『『無『跌倒/抽搐、發作後『『無『嗜睡』』,『可『正常『活動(『游泳『須『有人『陪/救生衣)』。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:『『『定時『回診『監測『血中『藥物『濃度、『『發作『控制『『『也『『不可『『自行『停藥(『驟停『致『癲癇『重積)、『phenytoin(Dilantin)『副作用『『牙齦『增生『須『口腔『護理』;『Dilantin『靜脈『須『『生理食鹽水『稀釋(『『非『葡萄糖,『會『沈澱)』、『不與『牛奶『同服』。熱性痙攣(febrile convulsion):『6個月~5歲、『『發燒『誘發(體溫『驟升)、『單純型『『全身性『<15分鐘、『預後『良好『『少『後遺症/少『轉『癲癇、『『『非『終生『服藥』;發作側臥、退燒、床欄護墊』。生酮飲食:『『『高脂肪(70~80%)、低醣、適量蛋白』、『『酮體『穩定『神經『傳導『鎮定』、用於『『頑固型/藥效不佳『癲癇』。腮腺炎最常見併發症=無菌性腦膜炎。 Dilantin:定期查血中濃度、副作用牙齦增生、不可驟停防癲癇重積皆正確。「『以『『5%『『葡萄糖『『稀釋』」錯誤——『『Dilantin(phenytoin)『『須『以『『『『生理食鹽水(N/S)『『稀釋』,『『『『『葡萄糖『會『『使『『藥物『『沈  母親『『剛『得知『『惡性『腦瘤『診斷,『『表達『『「不想談」』→『『護理師『應『『『『尊重『其『『情緒『與『『步調』,『『『表達『『『隨時『『支持(『『不『強迫)』。本題最適當為「當妳想談時隨時可找我」(A);最好現在談(B強迫)、分享其他媽媽感受(C未尊重當下)、儘早知道想法(D以護理師為中心)。本題為A。","options":{"A":"正確。尊重情緒,表達隨時支持(不強迫)。","B":"錯。「最好現在談」是強迫。","C":"未尊重當下不想談的情緒。","D":"以護理師需求為中心(非個案)。"},"sources":["Nelson《兒科學》腦瘤","支持"]}},"106030-N4-76":{"quick":"9歲惡性腦瘤母親隱瞞病情整天笑,病童感覺媽媽不愛她,較適當措施是「鼓勵母親和李小妹分享彼此的感受,共同面對疾病挑戰」。","detail":{"background":"兒童腦瘤:『多『『幕下(小腦/腦幹/第四腦室)』;症狀依『位置』:『『小腦『→『『平衡/協調『障礙(走路偏斜跌倒)』;『『腦幹『→『『腦神經『麻痺(吞嚥/說話/嘔吐)』;『常見『IICP『徵象『晨起『頭痛、噴射『嘔吐、複視』。手術後:『監測『意識『生命徵象、觀察『傷口『紅腫熱痛、『『避免『『用力『咳嗽/解便(『增IICP)、『『抬高『床頭(『非『抬高『床尾)』。放射治療『皮膚『護理』:『『『避免『『日曬(遮陽帽傘)、『勿『冰敷/熱敷/酒精/碘酒『刺激『照射部位、『保持『乾燥『勿『摩擦、『勿『塗『未經『醫囑『乳液』。情緒/心理:『『同理『陪伴、『『鼓勵『家屬『與『病童『『『分享『感受『共同『面對(『非『隱瞞)、『手足『退化『行為『以『遊戲『引導『了解』。 母親『隱瞞『病情『反『使『病童『『困惑/不被『理解』。較適當:『『鼓勵『『『母親『與『病童『『『分享『『彼此『『感受、『『『共同『面對『疾病』(『誠實『溝通『增進『連結)』。本題為C;母親告知(A,方式重要但核心是分享)、醫師告知(B)、學病友經驗(D)非最適。本題為C。","options":{"A":"告知方式重要,但核心是分享感受。","B":"由醫師告知非最適(應親子分享)。","C":"正確。鼓勵母親與病童分享感受,共同面對。","D":"學病友經驗非此情境最適。"},"sources":["Nelson《兒科學》腦瘤","分享感受"]}},"106111-N4-56":{"quick":"3歲嘔吐、吞嚥困難、說話不清診斷腦瘤,位置最可能在「腦幹」。","detail":{"background":"兒童腦瘤:『多『『幕下(小腦/腦幹/第四腦室)』;症狀依『位置』:『『小腦『→『『平衡/協調『障礙(走路偏斜跌倒)』;『『腦幹『→『『腦神經『麻痺(吞嚥/說話/嘔吐)』;『常見『IICP『徵象『晨起『頭痛、噴射『嘔吐、複視』。手術後:『監測『意識『生命徵象、觀察『傷口『紅腫熱痛、『『避免『『用力『咳嗽/解便(『增IICP)、『『抬高『床頭(『非『抬高『床尾)』。放射治療『皮膚『護理』:『『『避免『『日曬(遮陽帽傘)、『勿『冰敷/熱敷/酒精/碘酒『刺激『照射部位、『保持『乾燥『勿『摩擦、『勿『塗『未經『醫囑『乳液』。情緒/心理:『『同理『陪伴、『『鼓勵『家屬『與『病童『『『分享『感受『共同『面對(『非『隱瞞)、『手足『退化『行為『以『遊戲『引導『了解』。 『『嘔吐、『『吞嚥『困難、『『說話『『不清(『腦神經『功能『障礙)』→『『腦瘤『『位置『最可能『在『『『『腦幹(『『腦神經『核『所在;『影響『第IX/X/XII『腦神經)』。本題為「腦幹」(C);枕葉(視覺)、小腦(平衡協調)、腦室(IICP)非此症狀組合。本題為C。","options":{"A":"枕葉影響視覺(非吞嚥說話)。","B":"小腦影響平衡協調。","C":"正確。嘔吐吞嚥困難說話不清→腦幹(腦神經障礙)。","D":"腦室以IICP為主。"},"sources":["Nelson《兒科學》腦瘤","腦幹"]}},"106111-N4-72":{"quick":"腦瘤頭部放射治療皮膚護理正確的是「使用遮陽傘帽,避免治療部位日曬」。","detail":{"background":"兒童腦瘤:『多『『幕下(小腦/腦幹/第四腦室)』;症狀依『位置』:『『小腦『→『『平衡/協調『障礙(走路偏斜跌倒)』;『『腦幹『→『『腦神經『麻痺(吞嚥/說話/嘔吐)』;『常見『IICP『徵象『晨起『頭痛、噴射『嘔吐、複視』。手術後:『監測『意識『生命徵象、觀察『傷口『紅腫熱痛、『『避免『『用力『咳嗽/解便(『增IICP)、『『抬高『床頭(『非『抬高『床尾)』。放射治療『皮膚『護理』:『『『避免『『日曬(遮陽帽傘)、『勿『冰敷/熱敷/酒精/碘酒『刺激『照射部位、『保持『乾燥『勿『摩擦、『勿『塗『未經『醫囑『乳液』。情緒/心理:『『同理『陪伴、『『鼓勵『家屬『與『病童『『『分享『感受『共同『面對(『非『隱瞞)、『手足『退化『行為『以『遊戲『引導『了解』。 放射治療『皮膚『護理』:『『『避免『『治療『部位『『日曬(『遮陽『帽傘)』、『勿『冰/熱敷、勿『酒精/碘酒『摩擦、保持『乾燥』。本題正確為「遮陽傘帽避免日曬」(C);冰敷(A,勿冰敷)、塗乳液保溼(B,須經醫囑勿自行塗)、75%酒精清洗(D,勿酒精刺激)非正確。本題為C。","options":{"A":"錯。勿冰敷治療部位。","B":"勿自行塗乳液(須經醫囑)。","C":"正確。使用遮陽傘帽避免治療部位日曬。","D":"錯。勿用75%酒精清洗(刺激)。"},"sources":["Nelson《兒科學》放射治療","防曬"]}},"107030-N4-64":{"quick":"3歲腦瘤手術住院,7歲哥哥在學校變易怒打同學,措施『不適當』的是「建議父母直接糾正並處罰小芳哥哥的不當行為」。","detail":{"background":"手足『因『『弟妹『生病『住院『而『『『行為『退化/易怒(『焦慮/被『忽略/罪惡感)』。措施:觀察是否承受同儕壓力、討論至醫院探訪、以玩偶引導了解原因皆適當。「『『直接『『糾正『『處罰』」不適當——『『手足『的『『行為『是『『『情緒『『反應』,『『應『『『理解/引導/表達(『非『『直接『處罰『加重『焦慮)』」。本題不適當者為C。","options":{"A":"適當。觀察哥哥是否承受學校友伴壓力。","B":"適當。討論哥哥至醫院探訪的可能性。","C":"不適當(本題答案)。不應直接糾正處罰(行為是情緒反應)。","D":"適當。以玩偶設計引導哥哥了解住院原因。"},"sources":["Nelson《兒科學》手足","情緒"]}},"107110-N4-80":{"quick":"腦瘤接受手術護理措施『錯誤』的是「抬高床尾,增加腦部組織灌流」。","detail":{"background":"兒童腦瘤:『多『『幕下(小腦/腦幹/第四腦室)』;症狀依『位置』:『『小腦『→『『平衡/協調『障礙(走路偏斜跌倒)』;『『腦幹『→『『腦神經『麻痺(吞嚥/說話/嘔吐)』;『常見『IICP『徵象『晨起『頭痛、噴射『嘔吐、複視』。手術後:『監測『意識『生命徵象、觀察『傷口『紅腫熱痛、『『避免『『用力『咳嗽/解便(『增IICP)、『『抬高『床頭(『非『抬高『床尾)』。放射治療『皮膚『護理』:『『『避免『『日曬(遮陽帽傘)、『勿『冰敷/熱敷/酒精/碘酒『刺激『照射部位、『保持『乾燥『勿『摩擦、『勿『塗『未經『醫囑『乳液』。情緒/心理:『『同理『陪伴、『『鼓勵『家屬『與『病童『『『分享『感受『共同『面對(『非『隱瞞)、『手足『退化『行為『以『遊戲『引導『了解』。 腦瘤術後:監測生命徵象意識、觀察傷口紅腫熱痛、避免用力咳嗽解便皆正確。「『『抬高『『『床『『尾』」錯誤——『『腦瘤『術後『『應『『『『抬高『『床『『頭『約『30度(『利『靜脈『回流『減『IICP)』;『『抬高『『床『尾(『頭低)『『反『『增『IICP』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。應抬高床『頭』30度(抬高床尾頭低增IICP)。","B":"正確。監測生命徵象及意識狀況。","C":"正確。觀察傷口紅腫熱痛現象。","D":"正確。教導避免用力咳嗽或解便。"},"sources":["Nelson《兒科學》腦瘤術後","抬高床頭"]}},"110110-N4-43":{"quick":"12歲走路偏斜跌倒情緒暴躁遺忘事情診斷惡性腦瘤,母親自責,護理師最適當處理是「媽媽聽了醫師病情解釋後,心理一定非常傷心難過,如果想哭就哭出來」。","detail":{"background":"兒童腦瘤:『多『『幕下(小腦/腦幹/第四腦室)』;症狀依『位置』:『『小腦『→『『平衡/協調『障礙(走路偏斜跌倒)』;『『腦幹『→『『腦神經『麻痺(吞嚥/說話/嘔吐)』;『常見『IICP『徵象『晨起『頭痛、噴射『嘔吐、複視』。手術後:『監測『意識『生命徵象、觀察『傷口『紅腫熱痛、『『避免『『用力『咳嗽/解便(『增IICP)、『『抬高『床頭(『非『抬高『床尾)』。放射治療『皮膚『護理』:『『『避免『『日曬(遮陽帽傘)、『勿『冰敷/熱敷/酒精/碘酒『刺激『照射部位、『保持『乾燥『勿『摩擦、『勿『塗『未經『醫囑『乳液』。情緒/心理:『『同理『陪伴、『『鼓勵『家屬『與『病童『『『分享『感受『共同『面對(『非『隱瞞)、『手足『退化『行為『以『遊戲『引導『了解』。 母親『『自責『「我做錯什麼」』→『『護理師『應『『『『同理『『情緒、『『允許『『『表達/宣洩(『接納『難過、『鼓勵『哭出來)』。本題最適當為「同理難過、想哭就哭出來」(C);保證醫好(A,空泛保證)、上帝幫助(B,宗教不當)、別想太多(D,否定情緒)非適當。本題為C。","options":{"A":"「醫師一定醫好」是空泛保證。","B":"「上帝幫助」宗教介入不當。","C":"正確。同理難過、允許情緒表達(想哭就哭出來)。","D":"「別想太多」否定情緒。"},"sources":["Nelson《兒科學》腦瘤","同理"]}},"114170-N4-45":{"quick":"3歲腦瘤女童出現『何種徵象』需進一步評估IICP上升,是「頭痛、噴射狀嘔吐」。","detail":{"background":"兒童腦瘤:『多『『幕下(小腦/腦幹/第四腦室)』;症狀依『位置』:『『小腦『→『『平衡/協調『障礙(走路偏斜跌倒)』;『『腦幹『→『『腦神經『麻痺(吞嚥/說話/嘔吐)』;『常見『IICP『徵象『晨起『頭痛、噴射『嘔吐、複視』。手術後:『監測『意識『生命徵象、觀察『傷口『紅腫熱痛、『『避免『『用力『咳嗽/解便(『增IICP)、『『抬高『床頭(『非『抬高『床尾)』。放射治療『皮膚『護理』:『『『避免『『日曬(遮陽帽傘)、『勿『冰敷/熱敷/酒精/碘酒『刺激『照射部位、『保持『乾燥『勿『摩擦、『勿『塗『未經『醫囑『乳液』。情緒/心理:『『同理『陪伴、『『鼓勵『家屬『與『病童『『『分享『感受『共同『面對(『非『隱瞞)、『手足『退化『行為『以『遊戲『引導『了解』。\nIICP上升徵象:『『『頭痛(晨起重)、『『噴射狀『嘔吐、躁動、囟門膨出(嬰兒)、複視』。本題IICP徵象為「頭痛、噴射狀嘔吐」(C);心跳過快血壓下降(A是休克,IICP是『心搏『緩『血壓『升』)、頻尿尿多(B非IICP)、活動量大貓哭聲(D非IICP)非IICP。本題為C。","options":{"A":"心跳快血壓降是休克(IICP是心搏緩血壓升)。","B":"頻尿尿多非IICP徵象。","C":"正確。頭痛、噴射狀嘔吐是IICP上升徵象。","D":"活動量大貓哭聲非IICP。"},"sources":["Nelson《兒科學》IICP","頭痛嘔吐"]}},"101030-N4-80":{"quick":"腦性麻痺兒童健康問題『錯誤』的是「進行性神經病變」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺健康問題:肢體麻痺、手眼協調困難、發音/構音困難皆可能。「『『進行性『『神經『病變』」錯誤——『腦性麻痺『是『『『『『非『進行性(non-progressive)』『的『腦『損傷(『『腦『損傷『『不再『惡化;『但『『肌肉骨骼『次發『變化『可隨『成長『顯現)』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。腦性麻痺是『非進行性』神經病變(非進行性)。","B":"可能。肢體麻痺。","C":"可能。手眼協調困難。","D":"可能。發音或構音困難。"},"sources":["Nelson《兒科學》腦性麻痺","非進行性"]}},"103030-N4-78":{"quick":"腦性麻痺兒童及家庭護理指導『錯誤』的是「為預防下肢攣縮,可以雙手控制膝關節,將雙腿內轉合併」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺護理:三指下顎控制法協助咀嚼吞嚥、鼓勵獨立自我照顧、鼓勵就學社交皆正確。「『『將『『雙腿『『『內轉『『合併』」錯誤——『痙攣型『腦性麻痺『常『『『『內收『『剪刀『腿』,『『『『不可『『再『『內轉『合併』(『會『『加重『攣縮);『『應『『『『外展『『分開『擺位』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。不可將雙腿內轉合併(應外展分開,防加重剪刀腿攣縮)。","B":"正確。三指下顎控制法協助閉嘴咀嚼吞嚥。","C":"正確。鼓勵獨立完成自我照顧並給予肯定。","D":"正確。鼓勵就學與其他兒童互動。"},"sources":["Nelson《兒科學》腦性麻痺","外展"]}},"104100-N4-78":{"quick":"8歲痙攣型腦性麻痺協助家庭生活正常化護理正確的是「建議小明與父母將復健計畫併入家庭生活」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 家庭『正常化』:『『『將『『復健『『計畫『『『併入『『日常『『家庭『生活(『使『復健『成『生活『一部分,『不『過度『醫療化)』。本題正確為「復健計畫併入家庭生活」(C);就讀資源班(A,不一定;鼓勵融合)、照搬其他家庭做法(B,每家不同)、別談疾病衝擊(D,應開放討論)非正確。本題為C。","options":{"A":"不一定就讀資源班(鼓勵融合教育)。","B":"照搬其他家庭做法不適(每家不同)。","C":"正確。將復健計畫併入家庭生活。","D":"錯。不應勸別談疾病衝擊(應開放討論)。"},"sources":["Nelson《兒科學》腦性麻痺","正常化"]}},"105090-N4-54":{"quick":"15個月輕微腦性麻痺,指導24個月預期性發展任務『不適當』的是「增強對痛覺反應的能力」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺『發展『任務』:促進自理能力掌控、建立正向身體心像、提供活動所需額外熱量皆適當。「『『增強『『對『『痛覺『『反應『能力』」不適當——『『「增強『痛覺『反應」『『『不是『『發展『任務』(『痛覺『反應『是『感覺『神經『功能,『非『發展『目標;『發展『任務『重『自理/動作/心理社會)』」。本題不適當者為C。","options":{"A":"適當。促進自理能力的掌控。","B":"適當。建立正向的身體心像。","C":"不適當(本題答案)。「增強痛覺反應」非發展任務。","D":"適當。提供活動所需的額外熱量(肌張力高耗能)。"},"sources":["Nelson《兒科學》腦性麻痺","發展任務"]}},"106030-N4-50":{"quick":"15個月輕微腦性麻痺(雙親忙、外傭帶復健)主要護理措施是「促進成長及發展」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺『嬰幼兒』的『『『主要『護理『目標』=『『『『促進『『『成長『『及『『『發展(『最大化『動作/認知/語言『潛能)』。本題為「促進成長及發展」(D);保護避免傷害(A,部分但非主要)、解釋病因(B)、改善身體心像(C,較大兒童)非此階段主要。本題為D。","options":{"A":"保護避免傷害是部分(非主要)。","B":"解釋病因非主要護理措施。","C":"身體心像是較大兒童議題。","D":"正確。15個月主要護理是促進成長及發展。"},"sources":["Nelson《兒科學》腦性麻痺","成長發展"]}},"106030-N4-79":{"quick":"腦性麻痺咀嚼吞嚥困難幫助吞嚥護理措施正確的是「食物置於舌頭後方」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺『吞嚥『協助』:『『『坐起『『身體『『正中『位置、『『『食物『『放『『『『舌頭『『中『『後『方(『利『吞嚥『反射;『非『前方/後仰)』、三指下顎控制法。本題正確為「食物置於舌頭後方」(B);頭後仰(A,易嗆)、肩向後傾(C)、雙腳下垂(D)非正確。本題為B。","options":{"A":"錯。頭後仰易嗆(應正中)。","B":"正確。食物置於舌頭後方利吞嚥。","C":"肩向後傾不利吞嚥。","D":"雙腳下垂非吞嚥重點。"},"sources":["Nelson《兒科學》腦性麻痺","舌後方"]}},"106111-N4-55":{"quick":"15個月輕微腦性麻痺家庭因應評估『非』重點的是「各家庭成員未來的目標」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺『家庭『因應『評估『重點』:『『現有『支持『系統『資源、『『對『診斷『的『情緒『反應、『『對『疾病『的『認知『了解』。「『『各『家庭『成員『『『『未來『的『『目標』」『非』目前評估重點——『『目前『重點『是『『『『家庭『『當前『的『『因應/適應/資源』(『非『『各成員『未來『目標)』」。本題非重點者為D。","options":{"A":"是重點。現有的支持系統和資源。","B":"是重點。對疾病診斷的情緒反應。","C":"是重點。對腦性麻痺的認知及了解。","D":"本題答案(非重點)。各家庭成員未來目標非當前評估重點。"},"sources":["Nelson《兒科學》腦性麻痺","家庭因應"]}},"108020-N4-79":{"quick":"學齡前腦性麻痺吞嚥困難進食護理正確的是「協助病童坐起、身體維持正中位置」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺『進食』:『『『坐起『『『身體『『正中『位置』、『食物『放『舌中後方、三指下顎控制、增稠。本題正確為「坐起、身體正中位置」(A);肩前屈膝低於大腿(B,姿勢不利)、食物高於嘴放舌前方(C,易嗆)、完全由照顧者餵(D,應鼓勵獨立)非正確。本題為A。","options":{"A":"正確。協助坐起、身體維持正中位置。","B":"肩前屈膝低於大腿姿勢不利。","C":"錯。食物應放舌中後方(非前方,易嗆)。","D":"錯。應鼓勵獨立(非完全由照顧者餵)。"},"sources":["Nelson《兒科學》腦性麻痺","正中位置"]}},"109030-N4-80":{"quick":"腦性麻痺(cerebral palsy)敘述正確的是「治療目標在增進運動功能和預防殘障加重」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 (1)『腦性麻痺『『『『非『『病毒『傳染『侵犯『脊髓(『那是『『小兒『麻痺/脊髓灰白質炎)』』,A錯;(2)「『『治療『目標『『增進『『運動『功能『『預防『『殘障『加重』」——正確;(3)『吞嚥『困難『食物『放『『『舌『『『中後方(『非『前方)』』,C錯;(4)『腦性麻痺『智能『『『『多數『『正常(『非『大部分『智障)』』,D「大部分正常」其實對,但本題以B為答。本題為B。","options":{"A":"錯。腦性麻痺非病毒傳染侵犯脊髓(那是小兒麻痺)。","B":"正確。治療目標增進運動功能、預防殘障加重。","C":"錯。食物放舌中後方(非前方)。","D":"智能多正常(此項其實對,但本題答B)。"},"sources":["Nelson《兒科學》腦性麻痺","治療目標"]}},"110030-N4-80":{"quick":"兒童腦性麻痺型態及表徵『不適當』的是「徐動型(athetoid)因基底核受損而使雙下肢麻痺」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺型態:運動失調型(小腦,平衡協調障礙)、痙攣型(錐體徑路,肌張力高)、運動困難型(錐體外,不自主運動)皆正確。「『『徐動型(athetoid)『因『基底核『受損『『『雙『下肢『麻痺』」不適當——『『徐動型(基底核)『『『以『『『『不自主『『扭動(『手足『徐動)『為『特徵』,『『『非『『「雙下肢『麻痺」』(『雙下肢『麻痺『是『『痙攣型『雙邊『麻痺『的『描述)』」。本題不適當者為D。","options":{"A":"適當。運動失調型(ataxic)小腦病變致平衡協調障礙。","B":"適當。痙攣型(spastic)錐體徑路病變,肌張力高。","C":"適當。運動困難型(dyskinetic)錐體外病變,不自主運動。","D":"不適當(本題答案)。徐動型(基底核)以不自主扭動為特徵(非雙下肢麻痺)。"},"sources":["Nelson《兒科學》腦性麻痺","徐動型"]}},"110110-N4-77":{"quick":"5歲腦性麻痺咀嚼吞嚥差進食量少護理正確的是「提供高熱量、高蛋白質的流質食物,以增加進食量」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 (1)「『『提供『『『高熱量『『高蛋白『『流質(或『增稠)『食物『『增『進食『量』(『腦性麻痺『肌張力高『耗能『需『高熱量)」——正確;(2)『食物『放『『舌『『『中後方(『非『後方『過深;但『非『「儘量後方」之『不當)』』,B欠妥;(3)『『膝蓋『『高於『大腿『身體『正中(『非『膝低於大腿『雙腳『下垂)』』,C錯;(4)『『鼓勵『『使用『輔具『學『獨立『進食(『非『不鼓勵)』』,D錯。本題為A。","options":{"A":"正確。提供高熱量高蛋白流質食物增加進食量。","B":"食物置舌中後方,「儘量後方」欠妥。","C":"錯。應身體正中(非膝低於大腿雙腳下垂)。","D":"錯。應鼓勵使用輔具學獨立進食。"},"sources":["Nelson《兒科學》腦性麻痺","高熱量"]}},"111110-N4-79":{"quick":"腦性麻痺兒童常見健康問題『較不適當』的是「皆合併有智力障礙」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺:普遍有粗動作發展遲緩、常合併發音困難語言障礙、非進行性神經病變皆正確。「『『『皆『合併『『智力『障礙』」較不適當——『腦性麻痺『『『『『『多數『『智力『『『『正常(『約『『半數『智力『正常;『非『『「皆」『智障)』」。本題較不適當者為A。","options":{"A":"較不適當(本題答案)。腦性麻痺多數智力正常(非「皆」智障)。","B":"適當。普遍有粗動作發展遲緩。","C":"適當。常合併發音困難或語言障礙。","D":"適當。非進行性神經病變。"},"sources":["Nelson《兒科學》腦性麻痺","智力"]}},"112030-N4-80":{"quick":"痙攣型腦性麻痺臨床表徵正確的是「伸展反射增加」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 『痙攣型(spastic)『腦性麻痺』:『『錐體徑路『病變→『『『肌張力『『『增高、『『『『伸展『反射『『『增加、『『肌腱反射『『『亢進、『『『剪刀步『態(『非『跨大步)』。本題正確為「伸展反射增加」(B);不自主扭動(A是徐動型)、肌腱反射降低(C錯,應亢進)、跨大步行走(D是失調型)非痙攣型。本題為B。","options":{"A":"不自主扭動是徐動型(非痙攣型)。","B":"正確。痙攣型伸展反射增加。","C":"錯。肌腱反射亢進(非降低)。","D":"跨大步行走是失調型。"},"sources":["Nelson《兒科學》腦性麻痺","痙攣型"]}},"112110-N4-79":{"quick":"5歲中度腦性麻痺咀嚼吞嚥困難飲食居家照顧『錯誤』的是「儘量將食物置於舌頭前方,避免哽塞」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺進食:三指下顎控制法、餵食頭正中肩前屈、液態過稀用增稠劑皆正確。「『『食物『置『『『舌頭『『『前方』」錯誤——『『食物『應『『『放『『『舌『『『中『『後『『方(『利『『吞嚥『反射;『放『前方『反『易『被『舌『推出/哽塞)』」。本題「錯誤」者為B。","options":{"A":"正確。三指下顎控制法協助進食。","B":"錯誤(本題答案)。食物應置舌中後方(非前方)。","C":"正確。餵食姿勢頭部正中、肩部前屈。","D":"正確。液態過稀用增稠劑利吞嚥。"},"sources":["Nelson《兒科學》腦性麻痺","舌後方"]}},"113180-N4-48":{"quick":"7歲腦性麻痺因基底核錐體外病變產生不自主運動四肢抖動,型態是「手足徐動型(athetoid type)」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 『『基底核『+『錐體外『病變『→『『『不自主『『扭動/抖動(『尤『影響『手部『書寫)』=『『『『手足『徐動型(athetoid)』。本題為「手足徐動型」(C);痙攣型(錐體徑路,肌張力高)、運動失調型(小腦,平衡)、無張力型非此。本題為C。","options":{"A":"痙攣型是錐體徑路病變(肌張力高)。","B":"運動失調型是小腦病變(平衡協調)。","C":"正確。基底核/錐體外病變不自主扭動=手足徐動型。","D":"無張力型非此。"},"sources":["Nelson《兒科學》腦性麻痺","手足徐動型"]}},"115030-N4-50":{"quick":"腦性麻痺兒童敘述『錯誤』的是「智能障礙為主要發展問題,應於學會溝通後開始接受語言訓練」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):『『出生前/生產時/生產後『『腦部『『『缺氧/損傷(『『非『『進行性『病變)』所致『『『運動『功能『障礙』;『『型態:『痙攣型(spastic,『『錐體徑路『病變,『『肌張力『高/伸展反射增/肌腱反射亢進/剪刀步)』、『運動失調型(ataxic,『小腦,平衡協調差)』、『手足徐動/運動困難型(athetoid/dyskinetic,『『基底核/錐體外,『不自主『扭動)』;『『智力『『『多數『『『正常(『肢體『障礙『為主;『非『皆『智障)』、可『合併『癲癇/吞嚥困難/語言障礙』。護理:『『進食『『『坐起『『身體『正中、『『三指『下顎『控制法『協助『閉嘴『咀嚼『吞嚥、『食物『『放『『『舌『『中後『方(『非『前方;『非『後仰)、『增稠『液體『防嗆、『鼓勵『『獨立『自我『照顧『與『社交『就學、『復健『併入『家庭『生活、額外『熱量(肌張力高耗能)』;『主要『護理『目標『=『『增進『運動『功能『預防『殘障『加重、促進『成長『發展』。 腦性麻痺:長期腦缺氧為出生前/生產時最常致病原因、非進行性運動功能障礙、伸展反射深層肌腱反射肌張力增加皆正確。「『『智能『障礙『為『『主要『發展『問題、『『學會『溝通『『『後『『再『語言『訓練』」錯誤——『『腦性麻痺『『『主要『是『『『運動『障礙(『智能『多『正常)』,『『且『『語言『訓練『『『應『『『早期『『開始(『非『等『學會『溝通『後)』」。本題「錯誤」者為B。","options":{"A":"正確。長期腦缺氧是出生前/生產時最常致病原因。","B":"錯誤(本題答案)。腦性麻痺主要是運動障礙(智能多正常),語言訓練應早期開始。","C":"正確。屬非進行性運動功能障礙。","D":"正確。身體特徵為伸展反射、深層肌腱反射及肌張力增加。"},"sources":["Nelson《兒科學》腦性麻痺","早期語言"]}},"101030-N4-79":{"quick":"重症肌無力臨床表徵『錯誤』的是「最早出現的症狀為步態改變的行動障礙」。","detail":{"background":"重症肌無力(myasthenia gravis):『『神經肌肉『接合處『『乙醯膽鹼『受體『抗體』→『『肌肉『『無力『『『活動後『『『加重(『非『改善)、『休息『改善』;『『『眼瞼『下垂/複視『『『常為『『最早『症狀』、吸吮吞嚥困難、呼吸肌『無力』;『護理『『避免『費力『活動(『加重)、『複視『防跌、『觀察『呼吸困難痰咳出』。雷氏症候群(Reye syndrome):『『『急性『腦病變『+『『『肝『脂肪『變性』,『『多『發生『病毒『感染(『流感/水痘)『後『『『使用『『阿斯匹靈(aspirin)』』;『『早期『『嘔吐、『『肝功能『障礙(AST/ALT/SGOT/SGPT『升)、血氨『『升、低血糖、凝血『時間『延長、腦水腫『去大腦『僵直』;『『兒童『『『勿『用『aspirin『退燒』。裘馨氏假肥大性肌失養症(Duchenne MD):『『性聯『隱性、『『dystrophin『缺乏』、『『進行性『近端『肌『無力、『小腿『假性『肥大、Gower徵象、CPK/aldolase/AST『升』;『護理『『游泳『保『肌力『預防『攣縮、『胸部『物理『治療『防『肺炎、控制『體重、『鼓勵『深呼吸』。妥瑞氏症(Tourette):『『18歲前『出現『『動作型(『最常『眨眼/聳肩)+『『聲語型『抽動』、『『智能『『正常(『非『影響『智能)』。自閉症(autism):『『社交『障礙、『『固著『偏好『『『不變『生活(『非『多變)、『廣泛『發展『遲緩』。小腦『功能=『協調/平衡/精細『動作。 重症肌無力:新生兒期吸吮吞嚥困難、嬰兒期頭頸控制不佳、肌無力活動後顯現皆正確。「『『最早『症狀『『步態『『改變『行動『障礙』」錯誤——『重症肌無力『『『最早『『『多『『『『眼部『症狀(『『眼瞼『下垂/複視)』,『『『非『『步態『改變(『步態『改變『是『『肌失養症『的『早期)』」。本題「錯誤」者為C。","options":{"A":"正確。新生兒期可能吸吮及吞嚥困難。","B":"正確。嬰兒期頭頸部控制不佳。","C":"錯誤(本題答案)。最早多為眼部症狀(眼瞼下垂/複視),非步態改變。","D":"正確。肌肉無力症狀在活動後逐漸顯現。"},"sources":["Nelson《兒科學》重症肌無力","眼瞼下垂"]}},"102030-N4-78":{"quick":"兒童肌肉骨骼身體檢查評估『錯誤』的是「觸診時從受傷的部位先檢查」。","detail":{"background":"肌肉骨骼評估:視診體態兩腿長度對稱、詢問穿鞋不適、評估處理情緒反應皆正確。「『『觸診『『從『『『受傷『『部位『『先『檢查』」錯誤——『『觸診『應『『『『從『『『『未『受傷/健側『『先『開始,『『『『最後『『再『檢查『『受傷『部位(『減『疼痛/恐懼、便於『比較)』」。本題「錯誤」者為B。","options":{"A":"正確。視診體態、兩腿長度是否對稱。","B":"錯誤(本題答案)。觸診應從健側/未受傷處先(受傷處最後)。","C":"正確。詢問穿鞋是否有不適。","D":"正確。必須評估及處理兒童的情緒反應。"},"sources":["Nelson《兒科學》肌肉骨骼評估","健側先"]}},"102110-N4-77":{"quick":"雷氏症候群(Reye’s syndrome)的病徵是「急性腦病變,出現肝功能、代謝功能及神經功能障礙」。","detail":{"background":"重症肌無力(myasthenia gravis):『『神經肌肉『接合處『『乙醯膽鹼『受體『抗體』→『『肌肉『『無力『『『活動後『『『加重(『非『改善)、『休息『改善』;『『『眼瞼『下垂/複 30-N4-52":{"quick":"41週巨嬰鎖骨骨折(生產損傷)『錯誤』的是「為其執行圍巾徵象(Scarf signs)之評估」。","detail":{"background":"石膏護理:『『剛上『石膏『『溫熱『(石膏『硬化『放熱)、『敷石膏『肢體『『翻動『使『內外『乾燥、『邊緣『平滑『無刺激、『評估『末梢『脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;『非『瘀斑purpura)』;『『『勿『『烤燈/吹風機『加速『乾燥(『燙傷;『自然『風乾)、『『癢『勿『伸物『搔抓(『用『扇/冷風)、『抬高『患肢『促『靜脈『回流(『未乾『時『勿『放低)、『未『石膏『固定『之『『上下『關節『『維持『正常『活動(『非『固定『不動)、『出院『鼓勵『健肢『活動、『弄濕/灼熱點/異味『就醫』。發展性髖關節發育不良(DDH):『『歐氏徵象(Ortolani,『屈曲『外展『股骨頭『滑入『有『卡嗒聲)、『巴羅徵象(Barlow,『內收『下壓『股骨頭『滑出)、『臀部『大腿『皮膚『皺褶『不對稱、『患側『股骨『『『短(Galeazzi)、『外展『受限』;『治療『『帕米利克『背帶(Pavlik,『維持『髖『屈曲『外展;『6個月內『黃金期)、『走路後『人字形『石膏(spica)』。鎖骨骨折(新生兒產傷):『擁抱反射『不對稱、觸痛腫脹、『患側『先穿『後脫『衣、『勿『趴睡『壓患部、『抱『支持『後背臀部『勿『自『手臂『抱、『勿『測『圍巾徵象』。5歲下『跌倒『易『髖部『脫臼』。 鎖骨骨折(生產損傷):沿鎖骨觸摸有骨磨擦/裂開感、驚嚇反射不對稱手臂上舉、抱起支持後背臀部勿自手臂抱皆正確。「『『執行『『圍巾『徵象(Scarf sign,『將『手肘『越過『對側)』』錯誤——『『鎖骨『骨折『『『『『不可『『執行『圍巾『徵象(『『將『手臂『『拉『越過『胸前『會『『牽扯『『骨折『處『致『疼痛/移位)』」。本題「錯誤」者為C。","options":{"A":"正確。沿鎖骨觸摸有骨磨擦及裂開感。","B":"正確。驚嚇反射表現不對稱手臂上舉。","C":"錯誤(本題答案)。不可執行圍巾徵象(牽扯骨折處)。","D":"正確。抱起時支持後背及臀部,避免自手臂抱起。"},"sources":["Nelson《兒科學》鎖骨骨折","圍巾徵象"]}},"106111-N4-79":{"quick":"9歲左腓骨骨折剛上石膏護理措施『錯誤』的是「石膏未乾燥前,為減輕疼痛,可以將小妹的患肢放低」。","detail":{"background":"石膏護理:『『剛上『石膏『『溫熱『(石膏『硬化『放熱)、『敷石膏『肢體『『翻動『使『內外『乾燥、『邊緣『平滑『無刺激、『評估『末梢『脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;『非『瘀斑purpura)』;『『『勿『『烤燈/吹風機『加速『乾燥(『燙傷;『自然『風乾)、『『癢『勿『伸物『搔抓(『用『扇/冷風)、『抬高『患肢『促『靜脈『回流(『未乾『時『勿『放低)、『未『石膏『固定『之『『上下『關節『『維持『正常『活動(『非『固定『不動)、『出院『鼓勵『健肢『活動、『弄濕/灼熱點/異味『就醫』。發展性髖關節發育不良(DDH):『『歐氏徵象(Ortolani,『屈曲『外展『股骨頭『滑入『有『卡嗒聲)、『巴羅徵象(Barlow,『內收『下壓『股骨頭『滑出)、『臀部『大腿『皮膚『皺褶『不對稱、『患側『股骨『『『短(Galeazzi)、『外展『受限』;『治療『『帕米利克『背帶(Pavlik,『維持『髖『屈曲『外展;『6個月內『黃金期)、『走路後『人字形『石膏(spica)』。鎖骨骨折(新生兒產傷):『擁抱反射『不對稱、觸痛腫脹、『患側『先穿『後脫『衣、『勿『趴睡『壓患部、『抱『支持『後背臀部『勿『自『手臂『抱、『勿『測『圍巾徵象』。5歲下『跌倒『易『髖部『脫臼』。 腓骨骨折石膏:勿烤燈吹風機、經常檢查左下肢膚色溫度評估神經壓迫、依體能活動健肢皆正確。「『『石膏『未乾『前『『將『『患肢『『『放低』」錯誤——『『石膏『未乾『前『『應『『『『抬高『患肢』(『『促『靜脈『回流『『減『腫脹『與『疼痛;『放低『反『增『腫脹)』」。本題「錯誤」者為B。","options":{"A":"正確。不用烤燈或吹風機加速石膏乾燥。","B":"錯誤(本題答案)。石膏未乾應抬高患肢(放低反增腫脹)。","C":"正確。經常檢查左下肢膚色溫度評估神經壓迫。","D":"正確。返家後依體能活動健側肢體。"},"sources":["Nelson《兒科學》石膏護理","抬高"]}},"107110-N4-51":{"quick":"10歲腦膜炎徵象,『不是』腦膜炎徵象的是「歐氏徵象(Ortolani)」。","detail":{"background":"腦膜炎『徵象』:『『柯林氏(Kernig)、布魯辛斯基(Brudzinski)、角弓反張(opisthotonic)』。「『『歐氏『徵象(Ortolani)』」『不是』腦膜炎徵象——『『Ortolani『是『『『發展性『髖關節『發育『不良(DDH)』的『評估』(非『腦膜炎)』」。本題不是者為A。","options":{"A":"本題答案(非腦膜炎徵象)。Ortolani是DDH評估。","B":"是腦膜炎徵象。Kernig徵象。","C":"是腦膜炎徵象。Brudzinski徵象。","D":"是腦膜炎徵象。角弓反張。"},"sources":["Nelson《兒科學》腦膜炎","Ortolani非"]}},"108020-N4-63":{"quick":"新生兒先天性梅毒敘述『錯誤』的是「早期症狀會造成軍刀狀脛骨及痙攣性麻痺」。","detail":{"background":"先天性梅毒:病理性骨折(溫伯格徵象Wimberger)、背臀圓形丘疹病灶具傳染力、肝脾腫大黃疸貧血紅血球母細胞增多皆為『早期』。「『『早期『『『『軍刀狀『脛骨『及『痙攣性『麻痺』」錯誤——『『『軍刀狀『脛骨(saber shin)、間質性『角膜炎、Hutchinson『齒『是『『『『『晚期』先天性梅毒『的『表現』(『非『早期)』」。本題「錯誤」者為D。","options":{"A":"(早期)病理性骨折稱溫伯格徵象。","B":"正確(早期)。背臀圓形丘疹病灶具傳染力。","C":"正確(早期)。肝脾腫大、黃疸、貧血、紅血球母細胞增多。","D":"錯誤(本題答案)。軍刀狀脛骨是『晚期』表現(非早期)。"},"sources":["Nelson《兒科學》先天性梅毒","晚期"]}},"108020-N4-64":{"quick":"新生兒生產過程鎖骨骨折護理措施『錯誤』的是「建議採趴睡姿勢,以利患部癒合」。","detail":{"background":"石膏護理:『『剛上『石膏『『溫熱『(石膏『硬化『放熱)、『敷石膏『肢體『『翻動『使『內外『乾燥、『邊緣『平滑『無刺激、『評估『末梢『脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;『非『瘀斑purpura)』;『『『勿『『烤燈/吹風機『加速『乾燥(『燙傷;『自然『風乾)、『『癢『勿『伸物『搔抓(『用『扇/冷風)、『抬高『患肢『促『靜脈『回流(『未乾『時『勿『放低)、『未『石膏『固定『之『『上下『關節『『維持『正常『活動(『非『固定『不動)、『出院『鼓勵『健肢『活動、『弄濕/灼熱點/異味『就醫』。發展性髖關節發育不良(DDH):『『歐氏徵象(Ortolani,『屈曲『外展『股骨頭『滑入『有『卡嗒聲)、『巴羅徵象(Barlow,『內收『下壓『股骨頭『滑出)、『臀部『大腿『皮膚『皺褶『不對稱、『患側『股骨『『『短(Galeazzi)、『外展『受限』;『治療『『帕米利克『背帶(Pavlik,『維持『髖『屈曲『外展;『6個月內『黃金期)、『走路後『人字形『石膏(spica)』。鎖骨骨折(新生兒產傷):『擁抱反射『不對稱、觸痛腫脹、『患側『先穿『後脫『衣、『勿『趴睡『壓患部、『抱『支持『後背臀部『勿『自『手臂『抱、『勿『測『圍巾徵象』。5歲下『跌倒『易『髖部『脫臼』。 鎖骨骨折護理:穿脫衣患側先穿後脫、避免測圍巾徵象、抱起支持後背臀部皆正確。「『『採『『『趴睡(『俯臥)『姿勢』」錯誤——『『鎖骨『骨折『『『趴睡『會『『『壓迫『『患部『致『『疼痛/移位』;『且『嬰兒『『俯臥『增『『嬰兒猝死『風險』」。本題「錯誤」者為B。","options":{"A":"正確。穿脫衣採患側先穿後脫。","B":"錯誤(本題答案)。趴睡會壓迫患部(且增SIDS風險)。","C":"正確。避免測圍巾徵象(將手肘越過對側)。","D":"正確。抱起支持後背及臀部,避免自手臂抱。"},"sources":["Nelson《兒科學》鎖骨骨折","勿趴睡"]}},"108110-N4-76":{"quick":"5歲以下兒童跌倒容易導致脫臼的部位是「髖部」。","detail":{"background":"石膏護理:『『剛上『石膏『『溫熱『(石膏『硬化『放熱)、『敷石膏『肢體『『翻動『使『內外『乾燥、『邊緣『平滑『無刺激、『評估『末梢『脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、 ":{"background":"石膏護理:『『剛上『石膏『『溫熱『(石膏『硬化『放熱)、『敷石膏『肢體『『翻動『使『內外『乾燥、『邊緣『平滑『無刺激、『評估『末梢『脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;『非『瘀斑purpura)』;『『『勿『『烤燈/吹風機『加速『乾燥(『燙傷;『自然『風乾)、『『癢『勿『伸物『搔抓(『用『扇/冷風)、『抬高『患肢『促『靜脈『回流(『未乾『時『勿『放低)、『未『石膏『固定『之『『上下『關節『『維持『正常『活動(『非『固定『不動)、『出院『鼓勵『健肢『活動、『弄濕/灼熱點/異味『就醫』。發展性髖關節發育不良(DDH):『『歐氏徵象(Ortolani,『屈曲『外展『股骨頭『滑入『有『卡嗒聲)、『巴羅徵象(Barlow,『內收『下壓『股骨頭『滑出)、『臀部『大腿『皮膚『皺褶『不對稱、『患側『股骨『『『短(Galeazzi)、『外展『受限』;『治療『『帕米利克『背帶(Pavlik,『維持『髖『屈曲『外展;『6個月內『黃金期)、『走路後『人字形『石膏(spica)』。鎖骨骨折(新生兒產傷):『擁抱反射『不對稱、觸痛腫脹、『患側『先穿『後脫『衣、『勿『趴睡『壓患部、『抱『支持『後背臀部『勿『自『手臂『抱、『勿『測『圍巾徵象』。5歲下『跌倒『易『髖部『脫臼』。 石膏『患肢『循環/神經『異常『徵象(5P)』:『『『疼痛(pain)、『『蒼白(pallor)、『『脈搏『減少(pulselessness)、『『感覺『異常(paresthesia)、『『麻痺(paralysis)』。「『『瘀斑(purpura)』」『不是』5P之一——『『瘀斑(『紫斑/出血點)『是『『『『凝血/血小板『問題』,『『非『『石膏『壓迫『的『循環/神經『徵象』」。本題不適當者為D。","options":{"A":"是5P。疼痛(pain)。","B":"是5P。脈搏減少(pulselessness)。","C":"是5P。感覺異常(paresthesia)。","D":"本題答案(非5P)。瘀斑(purpura)是凝血問題(非循環/神經徵象)。"},"sources":["Nelson《兒科學》石膏","5P"]}},"102030-N4-31":{"quick":"待產婦臍帶脫垂應避免採用「半坐臥式」。","detail":{"background":"臍帶脫垂(緊急)』處置『姿勢』:『『『『抬高『臀部『減『胎『先露『部『壓迫『臍帶』——『『膝胸臥式、垂頭仰臥(Trendelenburg)、下肢抬高側臥』皆『適當』。「『『半坐臥式』」應『避免』——『『半坐臥『『會『『使『『胎『先露『部『『『下降『『『更『『壓迫『臍帶』(『加重『胎兒『缺氧)』」。本題應避免者為C。","options":{"A":"適當。膝胸臥式抬高臀部減臍帶壓迫。","B":"適當。垂頭仰臥式(Trendelenburg)。","C":"本題答案(應避免)。半坐臥使先露部下降更壓迫臍帶。","D":"適當。下肢抬高之側臥式。"},"sources":["新文京《產科護理學》臍帶脫垂","膝胸臥"]}},"102110-N4-8":{"quick":"孕婦服葉酸減少胎兒腦神經管缺損,以「妊娠第一期」服用效果較佳。","detail":{"background":"『葉酸『預防『『神經管『缺損』:『『『神經管『『約『『懷孕『『『3~4週(『第一孕期)『『關閉』,『『故『『『『懷孕『前『及『『『第一『孕期(妊娠第一期)『『補充『葉酸『『效果『最佳』。本題為「妊娠第一期」(A)。","options":{"A":"正確。妊娠第一期(神經管早期關閉)補葉酸效果最佳。","B":"妊娠第二期已過神經管關閉期。","C":"妊娠第三期太晚。","D":"整個懷孕期非「效果較佳」的最佳時機。"},"sources":["新文京《產科護理學》葉酸","第一期"]}},"102110-N4-16":{"quick":"待產暈眩、嘴唇麻刺(換氣過度),最佳措施是「教導以手拱成杯狀,摀著口鼻緩慢呼吸」。","detail":{"background":"待產『陣痛『換氣『過度(呼吸性鹼中毒)』→『『『暈眩、嘴唇『麻刺』。最佳措施:『『『以『『手『『拱『『杯狀『『摀『『口鼻『『緩慢『呼吸(『『『回吸『『CO2『『矯正『鹼中毒)』(或『紙袋『呼吸)』。本題為A;保持安靜促睡(B)、補水(C,非脫水)、抬高下肢(D)非此。本題為A。","options":{"A":"正確。手拱杯狀摀口鼻緩慢呼吸(回吸CO2矯正鹼中毒)。","B":"非促睡眠。","C":"非脫水(是換氣過度)。","D":"非抬高下肢。"},"sources":["新文京《產科護理學》換氣過度","回吸CO2"]}},"102110-N4-31":{"quick":"42歲子宮鏡切除子宮內頸息肉術後護理正確的是「若發生子宮痙攣疼痛,可依醫囑予鎮痛劑」。","detail":{"background":"子宮鏡『息肉『切除『術後』:(1)「『『子宮『痙攣『疼痛『『依醫囑『給『『鎮痛劑」——正確;(2)『『肩痛(『CO2『刺激『橫膈)『『採『『『平躺/膝胸『(非『半坐臥;『半坐臥『反『增『肩痛?『其實『左側『或『平躺『助『氣『吸收)』』,B欠妥;(3)『術後『性生活『禁『約『『1~2週(非『3個月)』』,C錯;(4)『『陰道『『勿『放『棉條(『感染『風險)』』,D錯。本題為A。","options":{"A":"正確。子宮痙攣疼痛可依醫囑給鎮痛劑。","B":"肩痛處置敘述欠妥(非半坐臥)。","C":"錯。術後禁性生活約1~2週(非3個月)。","D":"錯。陰道勿放棉條(感染風險)。"},"sources":["Berek婦科 子宮鏡","術後"]}},"102110-N4-40":{"quick":"D&C術後護理指導正確的是「術後最初2天有少量陰道出血是正常的」。","detail":{"background":"子宮頸擴張刮除術(D&C)術後:(1)「『『術後『最初『『1~2天『『少量『『陰道『『出血『『正常」——正確;(2)『『『劇烈『『痙攣『痛『『『異常(非正常)』』,B錯;(3)『『陰道『紗布『『由『『醫護『『取出(『非『等不出血『自行取)』』,C錯;(4)『術後『『『初期『『勿『盆浴/坐浴(『感染;『約『傷口『癒合『後)』』,D欠妥。本題為A。","options":{"A":"正確。術後最初2天少量陰道出血是正常。","B":"錯。劇烈痙攣痛是異常(非正常)。","C":"錯。陰道紗布由醫護取出(非自行)。","D":"術後初期勿坐浴(感染)。"},"sources":["Berek婦科 D&C","術後出血"]}},"103100-N4-72":{"quick":"1個月先天性甲狀腺功能低下敘述正確的是「不容易餵食,體重增加緩慢」。","detail":{"background":"先天性甲狀腺功能低下:(1)『出生體重『『多『『正常或『偏『『大(『非『比『正常『低)』』,A欠精確;(2)「『『不『『容易『『餵食(『吸吮『差/嗜睡)、『『體重『增加『『緩慢」——正確;(3)『『『嗜睡『安靜『少哭(『非『好動愛哭)』』,C錯;(4)『『『『出生後『『『『儘早(『『新生兒『篩檢『『陽性『即『治療,『『非『6~12個月『才治)『『避免『智能『遲緩』』,D錯。本題為B。","options":{"A":"出生體重多正常/偏大(非偏低)。","B":"正確。不容易餵食、體重增加緩慢(嗜睡吸吮差)。","C":"錯。嗜睡安靜少哭(非好動愛哭)。","D":"錯。應新生兒篩檢陽性即治療(非6~12月才治)。"},"sources":["Nelson《兒科學》先天甲低","餵食"]}},"104030-N4-5":{"quick":"絨毛膜取樣術『無法』檢查出的胎兒異常是「中樞神經管缺損」。","detail":{"background":"絨毛膜『取樣『(CVS)』『可『『查『『『染色體/基因『異常(『唐氏症、地中海貧血、G-6-PD)』;『『『『無法『查『『『『中樞『『神經管『『缺損(『神經管缺損『須『『『母血『AFP『或『『超音波/羊水『AFP』)』。本題無法檢查者為「中樞神經管缺損」(A)。","options":{"A":"正確。絨毛膜取樣無法查神經管缺損(須AFP/超音波)。","B":"可查地中海型貧血(基因)。","C":"可查G-6-PD(基因)。","D":"可查唐氏症候群(染色體)。"},"sources":["新文京《產科護理學》CVS","神經管缺損"]}},"105030-N4-69":{"quick":"副甲狀腺功能低下症病童照護『錯誤』的是「鼓勵攝取高纖食物,改善便秘症狀」。","detail":{"background":"副甲狀腺『功能『低下』→『『『低血鈣』→『『手足『抽搐、喉頭『痙攣』。照護:監測抽搐避免二次傷害、減少聲光刺激、監測呼吸防喉頭痙攣皆正確。「『『鼓勵『『高纖『食物『改善『便秘』」錯誤——『『副甲狀腺『低下『『重點『是『『『『補『『鈣、『『高鈣『低磷『飲食』,『『『『非『『「高纖『改善『便秘」(『且『便秘『非『主要『問題)』」。本題「錯誤」者為D。","options":{"A":"正確。監測抽搐症狀避免二次傷害。","B":"正確。減少病童周圍環境聲光刺激。","C":"正確。監測呼吸型態避免喉頭痙攣致呼吸困難。","D":"錯誤(本題答案)。副甲低下重點補鈣高鈣低磷(非高纖改善便秘)。"},"sources":["Nelson《兒科學》副甲低下","補鈣"]}},"105090-N4-26":{"quick":"新生兒身體評估『錯誤』的是「鼻尖的小白點為粟粒疹,出生後3~5天即會消失」。","detail":{"background":"新生兒身體評估:外耳翼頂低於眼外眥可能染色體異常、乳頭白色分泌物受母親雌性素影響、Ortolani聽見喀答聲表髖脫位皆正確。「『『粟粒疹『『出生後『『『3~5天『『消失』」錯誤——『『粟粒疹(milia,『鼻尖『皮脂腺『阻塞『小白點)『『『約『『『『『數週『(2~4週)『『『才『『消失』(『『非『3~5天)』」。本題「錯誤」者為B。","options":{"A":"正確。外耳翼頂點低於眼外眥可能染色體異常。","B":"錯誤(本題答案)。粟粒疹約數週(2~4週)消失(非3~5天)。","C":"正確。乳頭白色分泌物受母親雌性素影響。","D":"正確。Ortolani聽見喀答聲表髖關節脫臼。"},"sources":["Nelson《兒科學》新生兒評估","粟粒疹"]}},"106111-N4-5":{"quick":"孕期葉酸攝取護理指導『錯誤』的是「豆類是葉酸最佳來源之一」(本題C)?——本題答C。","detail":{"background":"孕期『葉酸』:懷孕前可開始補充、預防胎兒脊柱裂、葉酸易受高溫紫外線破壞須注意保存皆正確。本題『錯誤』為C:依官方,『「『『豆類『『是『『葉酸『最佳『來源『之一」』『的『敘述『被『判『『錯誤』——『『『葉酸『『最佳『『來源『『是『『『『深綠色『『蔬菜(『菠菜等)』、『肝臟、『酵母;『『豆類『『雖『含『葉酸『但『『官方『此題『以『『「深綠『蔬菜」『為『最佳』』。本題「錯誤」者為C。","options":{"A":"正確。懷孕前可開始補充葉酸。","B":"正確。孕期葉酸攝取可預防胎兒脊柱裂。","C":"錯誤(本題答案,官方)。葉酸最佳來源是深綠色蔬菜(豆類非「最佳」)。","D":"正確。葉酸易受高溫和紫外線破壞須注意保存。"},"sources":["新文京《產科護理學》葉酸","深綠蔬菜"]}},"108020-N4-54":{"quick":"青少年憂鬱症治療與處置正確的是「可多攝取多醣類、奶製品、魚油及維生素的食物」。","detail":{"background":"青少年憂鬱症:(1)『藥物『『『SSRI『為『『首選(『非『三環抗鬱劑;三環『副作用多)』』,A錯;(2)『電氣痙攣『治療『『用於『『『嚴重/頑固(『非『輕度)』』,B錯;(3)「『『多『攝取『『多醣類、奶製品、『魚油(omega-3)、維生素『食物』(『助『情緒)」——正確;(4)『『『應『『『聚焦/處理『『人際『困擾『議題(『非『避免)』』,D錯。本題為C。","options":{"A":"錯。SSRI為首選(非三環抗鬱劑)。","B":"錯。電氣痙攣用於嚴重/頑固(非輕度)。","C":"正確。多攝取多醣類、奶製品、魚油及維生素。","D":"錯。應處理人際困擾議題(非避免)。"},"sources":["DSM-5 青少年憂鬱","SSRI"]}},"108020-N4-76":{"quick":"副甲狀腺功能低下(Hypoparathyroidism)兒童臨床表徵正確的是「喉部肌肉痙攣及喘鳴現象」。","detail":{"background":"副甲狀腺功能低下→『『低血鈣』:(1)『血鈣『『『『『『降低『『(『『『<『約7;『非『12~15)』』,A錯;(2)『血磷『『『『『升高(『非『2.5~3.5『正常)』』,B錯;(3)「『『『喉部『『肌肉『『痙攣『『及『『喘鳴(『低血鈣『致『喉痙攣)」——正確;(4)『『副甲『低下『『鈣『『『沉積/不足『但『『骨『『非『「大量『流失」(『骨『流失『是『副甲『『亢進)』』,D錯。本題為C。","options":{"A":"錯。副甲低下血鈣降低(非12~15高鈣)。","B":"錯。血磷升高(非2.5~3.5正常)。","C":"正確。喉部肌肉痙攣及喘鳴(低血鈣喉痙攣)。","D":"錯。骨流失是副甲『亢進』(非低下)。"},"sources":["Nelson《兒科學》副甲低下","喉痙攣"]}},"108110-N4-45":{"quick":"1歲主動脈狹窄(coarctation)『不是』其症狀的是「肺血管阻力升高而有發紺現象」。","detail":{"background":"主動脈狹窄(coarctation,『『非『發紺型)』:『『『上肢『血壓『>『下肢、『主訴『頭痛『暈眩、『股動脈『搏動『弱『甚至『摸不到』皆是。「『『肺血管『阻力『升高『『『發紺』」『不是』主動脈狹窄症狀——『『主動脈『狹窄『是『『『『左『心『阻塞(『『非『發紺型;『無『右→左『分流)』,『『『『『不會『『發紺』」。本題不是症狀者為B。","options":{"A":"是症狀。上肢血壓比下肢高。","B":"本題答案(非症狀)。主動脈狹窄非發紺型,不會發紺。","C":"是症狀。常主訴頭痛、暈眩。","D":"是症狀。股動脈搏動較弱甚至摸不到。"},"sources":["Nelson《兒科學》主動脈狹窄","非發紺"]}},"109110-N4-43":{"quick":"臺灣發展遲緩早期療育負責協調整合管理的窗口是「兒童早期療育通報轉介中心」。","detail":{"background":"臺灣『發展遲緩『早期療育『流程』:『『『『通報『→『『『『『兒童『早期療育『『通報『轉介『中心(『協調『整合『管理『窗口)』→『聯合『評估『中心『評估『→『療育』。本題協調整合管理窗口為「兒童早期療育通報轉介中心」(A);聯合評估中心(評估)、衛生局、療育中心(服務)非協調整合窗口。本題為A。","options":{"A":"正確。兒童早期療育通報轉介中心是協調整合管理窗口。","B":"聯合評估中心負責評估。","C":"衛生局非協調整合窗口。","D":"療育中心負責服務提供。"},"sources":["早療制度","通報轉介中心"]}},"110030-N4-2":{"quick":"產婦腰椎硬膜外麻醉合併症『錯誤』的是「胎兒心跳變異性增加」。","detail":{"background":"腰椎『硬膜外『麻醉『合併症』:『『低血壓、『脊髓性『頭痛、『排尿『困難』皆是。「『『胎兒『心跳『變異性『『『增加』」錯誤——『『硬膜外『麻醉『致『『母『低血壓→『『胎盤『灌流『減→『『『胎兒『心跳『變異性『『『『減少(『非『增加)』」。本題「錯誤」者為B。","options":{"A":"是合併症。低血壓。","B":"錯誤(本題答案)。胎兒心跳變異性『減少』(非增加;母低血壓致胎盤灌流減)。","C":"是合併症。脊髓性頭痛。","D":"是合併症。排尿困難。"},"sources":["新文京《產科護理學》硬膜外麻醉","變異性"]}},"110030-N4-49":{"quick":"兒童鴉片類製劑(opioids)疼痛處置正確的是「此類藥物適用於兒童中度至重度的疼痛」。","detail":{"background":"鴉片類(opioids):(1)「『『適用『『中度『至『『重度『『疼痛』」——正確;(2)『鴉片『『作用『『中樞『『鴉片『受體(『非『抑制『前列腺素;『那是『NSAID)』』,B錯;(3)『鴉片『副作用『『便秘/呼吸抑制/嗜睡(『非『胃潰瘍/出血性腎炎;那是『NSAID)』』,C錯;(4)『『與『『雷氏症候群『有關『的『是『『『aspirin(『非『morphine)』』,D錯。本題為A。","options":{"A":"正確。鴉片類適用於中度至重度疼痛。","B":"錯。抑制前列腺素是NSAID(鴉片作用中樞受體)。","C":"錯。胃潰瘍/出血是NSAID(鴉片副作用便秘/呼吸抑制)。","D":"錯。與雷氏症候群有關是aspirin(非morphine)。"},"sources":["藥理 opioids","中重度疼痛"]}},"110030-N4-64":{"quick":"6個月心導管檢查前準備適當的是「確認禁食4~6小時」。","detail":{"background":"心導管『檢查『前『準備』:(1)『『須『測『『『下肢『血壓(『檢查後『比較『循環)』』,A錯(不應避免);(2)「『『確認『『禁食『『『4~6『小時』(『防『鎮靜『嘔吐『吸入)」——正確;(3)『『確認『『『股『動脈/足『背『脈搏『『最強處『標記『(『非『鼠蹊『脈搏;『其實『標記『遠端『脈搏『利『術後『比較)』』,C欠精確;(4)『『『可『『給『鎮靜劑『與『『預防性『抗生素(『非『不宜)』』,D錯。本題為B。","options":{"A":"錯。須測下肢血壓(非避免)。","B":"正確。確認禁食4~6小時(防鎮靜嘔吐吸入)。","C":"標記遠端脈搏(敘述欠精確)。","D":"錯。可給鎮靜劑與預防性抗生素。"},"sources":["Nelson《兒科學》心導管","禁食"]}},"110030-N4-76":{"quick":"膀胱輸尿管逆流(VUR)初期臨床表徵正確的是「排尿疼痛有灼熱感」。","detail":{"background":"膀胱輸尿管逆流(VUR)』初期『多『『以『『『泌尿道『感染『表現』:『『『『排尿『『疼痛『『灼熱『感、發燒、頻尿』。本題正確為「排尿疼痛有灼熱感」(A);無尿意感(B)、骨突處凹陷性水腫(C是腎病/心衰)、膽固醇三酸甘油脂上升(D是腎病症候群)非VUR初期。本題為A。","options":{"A":"正確。VUR初期以UTI表現(排尿疼痛灼熱感)。","B":"無尿意感非VUR初期表徵。","C":"凹陷性水腫是腎病/心衰(非VUR)。","D":"膽固醇三酸甘油脂上升是腎病症候群。"},"sources":["Nelson《兒科學》VUR","UTI"]}},"110110-N4-25":{"quick":"胎兒窘迫剖腹生產採腰椎硬膜外麻醉術後姿勢護理最適當的是「採辛氏臥位頭側向一邊,避免分泌物阻塞呼吸道」。","detail":{"background":"剖腹產『硬膜外『麻醉『術後』:(1)『垂頭『仰臥『非『標準(『增『顱壓/誤吸)』』,A欠妥;(2)『『硬膜外『『『不一定『須『『平躺8小時(『脊髓『穿刺『才『須『平躺『防『頭痛;硬膜外『較少)』』,B欠精確;(3)「『『採『『辛氏『臥位(『側臥)『『頭『側『一邊『『避免『『分泌物『阻塞『呼吸道(『麻醉『未『全退『防『誤吸)」——正確;(4)『『左側『躺『增『子宮『血流『是『『產『『前/待產』之『考量(『術後『以『呼吸道『安全『為先)』』,D欠妥。本題為C。","options":{"A":"垂頭仰臥欠妥(增顱壓/誤吸)。","B":"硬膜外不一定須平躺8小時(脊髓穿刺才須)。","C":"正確。辛氏臥位頭側一邊,避免分泌物阻塞呼吸道。","D":"左側躺增子宮血流是待產考量(術後以呼吸道安全為先)。"},"sources":["新文京《產科護理學》術後姿勢","辛氏臥位"]}},"111030-N4-24":{"quick":"脊髓阻斷麻醉剖腹產後第1天起床頭痛、躺下緩解,適當指導是「說明是腦脊髓液不平衡,建議暫時頭不抬高平躺並補充水分」。","detail":{"background":"脊髓(蜘蛛膜下)『麻醉『後『『『脊髓性『頭痛』:『『『CSF『『經『穿刺『孔『『滲漏『→『『『『起身『頭痛、『『躺下『『緩解(『姿勢性)』。指導:『『『『平躺(『暫『不『抬高『頭)、『『『補充『『水分(『增『CSF『生成)、『咖啡因、必要時『血液『貼片』。本題為B;說禁食低血糖(A,非)、麻醉藥代謝(C,非)、焦慮(D,非)皆誤判。本題為B。","options":{"A":"錯。非禁食低血糖(是脊髓性頭痛)。","B":"正確。脊髓性頭痛,平躺不抬頭並補充水分。","C":"錯。非麻醉藥代謝問題。","D":"錯。非焦慮引起(是姿勢性頭痛)。"},"sources":["新文京《產科護理學》脊髓性頭痛","平躺"]}},"112030-N4-66":{"quick":"10歲主動脈狹窄(COA)臨床表徵『不適當』的是「下肢比上肢血壓高20 mmHg」。","detail":{"background":"主動脈狹窄(COA)』:『『股動脈『搏動『微弱、『主訴『頭痛『暈眩、『腳部『冰冷』皆是。「『『『下肢『『比『『上肢『『血壓『『高』」不適當——『『主動脈『狹窄『『『『上肢『血壓『『『『>『『下肢(『狹窄『在『主動脈弓『遠端,『上肢『血『多『下肢『血『少)』,『『『非『『下肢『高』」。本題不適當者為A。","options":{"A":"不適當(本題答案)。COA是上肢血壓>下肢(非下肢高)。","B":"是表徵。股動脈搏動微弱。","C":"是表徵。主訴頭痛、暈眩。","D":"是表徵。主訴腳部冰冷。"},"sources":["Nelson《兒科學》COA","上肢高"]}},"112110-N4-4":{"quick":"懷孕期營養指導最適當的是「懷孕前及第一孕期注意葉酸的攝取,可預防胎兒神經管缺損」。","detail":{"background":"懷孕『營養』:(1)「『『懷孕前『及『第一孕期『『注意『『葉酸『『預防『神經管『缺損』」——正確;(2)『『咖啡因『『『『適量(『非『絕對『不可)』』,B錯;(3)『『水分『『充足(『非『限制『500~1000mL)』』,C錯;(4)『第二孕期『補『『鐵劑『與『『鈣(『非『維生素K)』』,D錯。本題為A。","options":{"A":"正確。懷孕前及第一孕期注意葉酸,預防神經管缺損。","B":"錯。咖啡因適量(非絕對不可)。","C":"錯。水分應充足(非限制500~1000mL)。","D":"錯。第二孕期補鐵劑(非維生素K)。"},"sources":["新文京《產科護理學》孕期營養","葉酸"]}},"112110-N4-6":{"quick":"懷孕33週膨大子宮使姿勢改變為「腰、背、脊柱向前方凸起」。","detail":{"background":"懷孕『後期『姿勢『改變』:『『『膨大『子宮『『使『『身體『『重心『『『前移』→『『『代償『『『腰椎『『『前凸(『腰、背、脊柱『『向『『前方『凸起;『骨盆『前傾)』→『『下背『痛』。本題為「腰背脊柱向前方凸起」(B);重心後移(A錯,前移)、腹肌張力增(C錯,鬆弛)、骨盆關節緊實(D錯,鬆弛)非此。本題為B。","options":{"A":"錯。重心前移(非後移)。","B":"正確。腰、背、脊柱向前方凸起(腰椎前凸)。","C":"錯。腹肌張力鬆弛(非增加)。","D":"錯。骨盆關節鬆弛(非緊實)。"},"sources":["新文京《產科護理學》孕期姿勢","腰椎前凸"]}},"112110-N4-74":{"quick":"6歲疑似闌尾炎評估最適當的是「羅氏徵象(Rovsing’s sign)」。","detail":{"background":"闌尾炎『評估『徵象』:『『『羅氏徵象(Rovsing,『壓『左下腹『右下腹『痛)、『反彈痛(Blumberg,『但『Blumberg是『腹膜炎『通用)、麥氏點『壓痛、腰肌徵象』。本題最適當為「羅氏徵象(Rovsing)」(C);柯林氏(Kernig,腦膜炎)、墨菲氏(Murphy,膽囊炎)非闌尾炎;布魯伯氏(Blumberg反彈痛)為腹膜刺激『通用』。本題依官方為C。","options":{"A":"柯林氏(Kernig)是腦膜炎徵象。","B":"布魯伯氏(Blumberg)是腹膜刺激通用(非闌尾特異)。","C":"正確。羅氏徵象(Rovsing)是闌尾炎評估。","D":"墨菲氏(Murphy)是膽囊炎徵象。"},"sources":["Nelson《兒科學》闌尾炎","Rovsing"]}},"112180-N4-42":{"quick":"兒童副甲狀腺功能低下症(hypoparathyroidism)『錯誤』的是「X光檢查發現骨質疏鬆」。","detail":{"background":"副甲狀腺功能低下→『低血鈣『高血磷』:血鈣<7、手足痙攣、避免高磷食物皆正確。「『『X光『『發現『『『骨質『疏鬆』」錯誤——『『副甲狀腺『『『『亢進』(『PTH『高)『才『『『骨『流失『『骨質『疏鬆』;『『副甲『『『『低下』(『PTH『低)『『骨『『『不會『流失(『反『可『鈣『沉積/正常)』」。本題「錯誤」者為C。","options":{"A":"正確。通常血鈣濃度小於7.0 mg/dL。","B":"正確。手足痙攣為常見症狀(低血鈣)。","C":"錯誤(本題答案)。骨質疏鬆是副甲『亢進』(低下不致骨流失)。","D":"正確。避免食用含高磷的食物。"},"sources":["Nelson《兒科學》副甲低下","非骨鬆"]}},"113030-N4-24":{"quick":"逆行性射精敘述『錯誤』的是「接受精子捐贈進行人工授精為唯一的治療方式」。","detail":{"background":"逆行性射精:常見於脊髓損傷/糖尿病神經病變、可為腹腔/骨盆手術併發症、流至尿道的精液逆流至膀胱皆正確。「『『接受『『精子『『捐贈『『人工授精『『『『唯一『『治療』」錯誤——『『逆行性射精『『治療『『可『『藥物(『擬交感神經藥『α-agonist)、『『或『『『『『自『『膀胱『尿液『『取『精子『做『人工生殖』(『『非『『「唯一『精子捐贈」)』」。本題「錯誤」者為D。","options":{"A":"正確。常見於脊髓損傷或糖尿病合併神經病變。","B":"正確。可能為腹腔或骨盆腔手術後併發症。","C":"正確。流至尿道的精液逆流至膀胱。","D":"錯誤(本題答案)。可藥物或自膀胱取精,非「唯一精子捐贈」。"},"sources":["泌尿學 逆行性射精","治療"]}},"113180-N4-6":{"quick":"第三孕期下肢腫脹護理指導『不適當』的是「穿著及膝彈性襪」。","detail":{"background":"第三孕期『下肢『水腫(『子宮『壓迫『靜脈『回流『減)』:『穿舒適軟質包鞋、足背屈曲運動、左側臥皆適當。「『『穿著『『『『及膝『『彈性襪』」不適當——『『『及膝(『短)『彈性襪『『『『上緣『『會『『束『『膝/小腿『『『『反『『阻『靜脈『回流『加重『水腫』;『『應『穿『『『『及『大腿/全腿『『彈性襪』」。本題不適當者為B。","options":{"A":"適當。可穿舒適軟質包鞋。","B":"不適當(本題答案)。及膝彈性襪上緣束膝反阻回流(應全腿彈性襪)。","C":"適當。可做足背屈曲運動促回流。","D":"適當。臥床休息採左側臥。"},"sources":["新文京《產科護理學》孕期水腫","彈性襪"]}},"114100-N4-27":{"quick":"1歲嬰兒誤食家用清潔劑(呼吸穩定但流口水咳嗽)較適當處置是「保持呼吸道通暢,持續觀察意識狀態」。","detail":{"background":"誤食『腐蝕性『清潔劑』:『『『『『勿『『『催吐(『『腐蝕劑『再『經『食道『二次『灼傷)、『『勿『『中和(『產熱/產氣)、『勿『『洗胃』;『『『『保持『『呼吸道『『通暢、『觀察『意識、『就醫評估』。本題較適當為「保持呼吸道通暢、觀察意識」(B);溫水催吐(A,禁催吐)、牛奶中和(C,勿中和)、吐根糖漿(D,禁催吐)皆錯。本題為B。","options":{"A":"錯。腐蝕劑禁催吐(二次灼傷)。","B":"正確。保持呼吸道通暢、持續觀察意識狀態。","C":"錯。勿給牛奶中和(勿中和)。","D":"錯。腐蝕劑禁吐根糖漿催吐。"},"sources":["Nelson《兒科學》誤食腐蝕劑","勿催吐"]}},"115030-N4-6":{"quick":"懷孕30週下背痛可優先教導的運動是「骨盆搖擺運動」。","detail":{"background":"懷孕『下背痛(『腰椎『前凸『代償)』:『『『『骨盆『『搖擺/傾斜『運動(pelvic tilt/rocking)』『『『可『『減輕『『腰背『『負擔『與『『疼痛』。本題優先為「骨盆搖擺運動」(B);骨盆底陰道收縮(凱格爾,防尿失禁非下背痛)、雙下肢抬舉(增腰負擔)、盤腿坐式(非針對下背痛)非首選。本題為B。","options":{"A":"骨盆底收縮(凱格爾)是防尿失禁非下背痛。","B":"正確。骨盆搖擺運動減輕腰背負擔。","C":"雙下肢抬舉增腰負擔。","D":"盤腿坐式非針對下背痛首選。"},"sources":["新文京《產科護理學》下背痛","骨盆搖擺"]}}},TO=["1腦膜炎與中樞神經感染", "2癲癇與熱性痙攣", "3顱內壓升高水腦症與腦室引流", "4頭部外傷與GCS", "5腦瘤", "6腦性麻痺", "7神經肌肉與神經發展疾病", "8脊柱側彎脊髓膨出成骨不全骨髓炎", "9骨折石膏與髖關節發育不良", "10母嬰產科與其他借題"],LEC={"1腦膜炎與中樞神經感染":{"html":"<p><b>腦膜炎CSF</b>:細菌性=混濁、<b>蛋白↑葡萄糖↓</b>、嗜中性球↑;病毒/無菌性=清澈、淋巴球↑、葡萄糖正常。<b>Brudzinski</b>=頸部前屈引發膝髖屈曲;<b>Kernig</b>=屈髖膝90度伸小腿有阻力。護理:抗生素≥10天、<b>減少聲光刺激</b>(畏光)、姿勢減痛。腰椎穿刺<b>側臥抱膝蝦米姿</b>、後平躺4~6小時。</p><p><b>日本腦炎</b>:三斑家蚊媒介、黃昏避外出、<b>不人傳人不需隔離</b>。腮腺炎最常見併發症=無菌性腦膜炎。</p>"},"2癲癇與熱性痙攣":{"html":"<p><b>發作護理</b>:<b>側臥、移開硬物、勿放壓舌板、勿約束、勿口對口人工呼吸</b>、觀察記錄。<b>失神性</b>=數秒凝視、無抽搐、無嗜睡。抗癲癇藥:<b>定時監測血中濃度、不可自行停藥</b>(防癲癇重積)、Dilantin牙齦增生(用生理食鹽水稀釋非葡萄糖)。</p><p><b>熱性痙攣</b>:6個月~5歲、發燒誘發、單純型全身性<15分鐘、<b>預後良好非終生服藥</b>。<b>生酮飲食</b>:高脂70~80%、低醣、限液體、酮體穩定神經傳導,用於頑固型癲癇。</p>"},"3顱內壓升高水腦症與腦室引流":{"html":"<p><b>IICP</b>:早期<b>噴射狀嘔吐</b>、晨起頭痛;晚期瞳孔放大、Cushing三徵(血壓升、心搏緩、呼吸不規則)、嬰兒囟門膨出落日眼。處置:<b>抬高床頭30度頭頸平直</b>(非頭低)、避免用力咳嗽解便、Mannitol快輸、過度換氣PaCO2降至27~30。IICP>15 mmHg。</p><p><b>V-P shunt</b>:術後觀察傷口紅腫(感染)、囟門膨出/噴射嘔吐(<b>分流阻塞=IICP再現</b>)、採對側臥避壓分流。早產兒IVH:抬高床頭、集中照護減打擾。</p>"},"4頭部外傷與GCS":{"html":"<p><b>GCS</b>=睜眼E(4-1)+語言V(5-1)+運動M(6-1),總分3~15,<b>≤8昏迷</b>。<b>去皮質僵直</b>=手臂屈曲向胸(皮質病變);<b>去大腦僵直</b>=四肢伸展內轉(中腦/腦幹,較嚴重)。頭部外傷護理:監測意識生命徵象、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS)用<b>收縮壓</b>(非舒張壓)。</p>"},"5腦瘤":{"html":"<p><b>兒童腦瘤</b>多幕下(小腦/腦幹);症狀依位置:小腦→平衡協調障礙、<b>腦幹→吞嚥說話困難</b>。術後:抬高床頭、避免用力咳嗽解便。<b>放療皮膚</b>:避免日曬、勿冰熱敷/酒精/碘酒、勿自塗乳液。心理:<b>同理陪伴、鼓勵親子分享感受共同面對</b>(非隱瞞)。</p>"},"6腦性麻痺":{"html":"<p><b>腦性麻痺(CP)</b>:腦缺氧損傷致<b>非進行性</b>運動障礙、<b>智力多正常</b>。型態:痙攣型(錐體徑路,肌張力高伸展反射增剪刀步)、失調型(小腦,平衡差)、<b>手足徐動型(基底核/錐體外,不自主扭動)</b>。</p><p><b>進食</b>:坐起身體正中、三指下顎控制法、<b>食物放舌中後方</b>(非前方/後仰)、增稠防嗆。鼓勵獨立自我照顧社交、復健併入家庭、額外熱量。主要目標=增進運動功能預防殘障加重。</p>"},"7神經肌肉與神經發展疾病":{"html":"<p><b>重症肌無力</b>:乙醯膽鹼受體抗體、<b>活動後加重休息改善</b>、眼瞼下垂/複視常為最早、避免費力活動。<b>雷氏症候群</b>:急性腦病變+肝脂肪變性、病毒感染後用<b>aspirin</b>有關、嘔吐/肝酵素升/血氨升/低血糖、兒童勿用aspirin。</p><p><b>裘馨氏肌失養(Duchenne)</b>:性聯隱性、dystrophin缺乏、近端肌無力、小腿假性肥大、Gower徵象、游泳保肌力。<b>妥瑞氏</b>:18歲前抽動(眨眼/聳肩)、智能正常。<b>自閉症</b>:社交障礙、<b>固著抗拒改變</b>。小腦=協調平衡精細動作。</p>"},"8脊柱側彎脊髓膨出成骨不全骨髓炎":{"html":"<p><b>脊髓膜膨出</b>:神經管缺損、<b>俯臥+無菌濕紗布覆蓋囊</b>、腿外展防髖脫位、監測頭圍(合併水腦頭腳同高勿頭低)。<b>脊柱側彎</b>:Cobb角評估、兩肩不等高、<b>彎腰單側突起</b>、輕度游泳/中度背架穿到骨成熟/重度脊柱融合。</p><p><b>成骨不全</b>:膠原缺陷骨脆易折、藍色鞏膜、聽力喪失、<u>不可完全固定不動</u>(廢用使骨更脆)、適度運動。<b>骨髓炎</b>:抗生素療程長、高熱量高蛋白維生素C、<b>患肢固定制動</b>(非多活動)。</p>"},"9骨折石膏與髖關節發育不良":{"html":"<p><b>石膏護理</b>:剛上溫熱、翻動使乾、<b>勿烤燈吹風機</b>(自然風乾)、癢勿伸物抓、<b>抬高患肢</b>促回流、未固定關節維持活動、5P(疼痛/蒼白/脈搏弱/感覺異常/麻痺)。</p><p><b>DDH</b>:<b>Ortolani</b>(屈曲外展滑入卡嗒)、<b>Barlow</b>(內收下壓滑出)、皮膚皺褶不對稱、<b>患側股骨短(Galeazzi)</b>、外展受限;<b>Pavlik背帶</b>(6個月內黃金期)、走路後人字形石膏。<b>鎖骨骨折</b>(產傷):擁抱反射不對稱、患側先穿後脫、勿趴睡、勿測圍巾徵象。</p>"},"10母嬰產科與其他借題":{"html":"<p><b>產科</b>:臍帶脫垂避免半坐臥(用膝胸臥);<b>葉酸第一孕期</b>預防神經管缺損(深綠蔬菜為佳);換氣過度手拱杯狀摀口鼻;硬膜外麻醉合併症胎心變異性<b>減少</b>;脊髓性頭痛平躺補水;主動脈狹窄<b>上肢血壓>下肢非發紺型</b>;懷孕後期腰椎前凸下背痛(骨盆搖擺運動)。</p><p><b>其他</b>:副甲狀腺低下=低血鈣高血磷喉痙攣(非骨鬆);誤食腐蝕劑<b>勿催吐勿中和</b>;闌尾炎Rovsing徵象;鴉片類用中重度疼痛;青少年憂鬱SSRI首選;絨毛膜取樣無法查神經管缺損。</p>"}};

 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+

}

const TOTAL=Q.length, KEY='n4_c7_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
