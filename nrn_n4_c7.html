偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 裘馨氏MD護理:彈性調整家中環境、每日胸部物理治療防肺炎、飲食計畫控制體重皆適當。「參與高密度游泳增強肌肉張力」最不適當——游泳有助保肌力預防攣縮,但「高密度/過度」運動反使肌肉疲乏損傷(適度非高密度;且肌失養是肌退化無法「增強張力」)」。本題最不適當者為B。","options":{"A":"適當。鼓勵家屬彈性調整家中環境。","B":"最不適當(本題答案)。高密度游泳反使肌肉疲乏損傷(應適度)。","C":"適當。每日胸部物理治療降低肺炎風險。","D":"適當。飲食計畫控制體重減少負荷。"},"sources":["Nelson《兒科學》裘馨氏MD","適度"]}},"114170-N4-27":{"quick":"自閉症(autism)病童行為表現錯誤的是「喜歡彈性多變的生活型態」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 自閉症:有社交技巧障礙、對特殊固定事物有強烈依戀、屬廣泛性發展遲緩皆正確。「喜歡彈性多變生活型態」錯誤——自閉症偏好固定/不變的常規/環境,抗拒改變(非喜歡多變)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。自閉症偏好固定不變、抗拒改變(非喜歡多變)。","B":"正確。有社交技巧障礙問題。","C":"正確。對某些特殊固定事物有強烈依戀。","D":"正確。屬於廣泛性發展遲緩。"},"sources":["Nelson《兒科學》自閉症","固著"]}},"102110-N4-51":{"quick":"37週脊髓脊髓膜膨出照護錯誤的是「以無菌乾紗布覆蓋於膨出的囊上,避免囊袋破裂」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 脊髓膜膨出:小坡度垂頭俯臥、臀部會陰清潔避污染、監測頭圍囟門皆正確。「以乾紗布覆蓋」錯誤——應以無菌濕(生理食鹽水浸潤)紗布覆蓋囊(乾紗布會使囊乾燥沾黏破裂)」。本題「錯誤」者為B。","options":{"A":"正確。最理想姿勢是小坡度垂頭俯臥式。","B":"錯誤(本題答案)。應以無菌濕紗布覆蓋(乾紗布會乾燥沾黏破裂)。","C":"正確。注意臀部及會陰部清潔避免污染。","D":"正確。密切監測頭圍及囟門壓力(合併水腦)。"},"sources":["Nelson《兒科學》脊髓膜膨出","濕紗布"]}},"103030-N4-79":{"quick":"成骨不全(osteogenesis imperfecta)醫療護理指導錯誤的是「因骨骼脆弱易發生骨折,應儘量完全固定不動」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 成骨不全:骨內固定加強長骨、脊椎固定桿矯正變形、活動限制下做主動運動防萎縮皆正確。「應儘量完全固定不動」錯誤——成骨不全不可完全固定不動(廢用使骨更脆弱、肌肉萎縮);應在活動限制下適度運動」。本題「錯誤」者為C。","options":{"A":"正確。骨內固定物做骨髓內固定加強長骨。","B":"正確。脊椎固定桿合併骨水泥矯正變形。","C":"錯誤(本題答案)。不可完全固定不動(廢用使骨更脆)。","D":"正確。活動限制下執行主動運動防肌肉萎縮。"},"sources":["Nelson《兒科學》成骨不全","勿完全固定"]}},"104100-N4-79":{"quick":"1歲脊髓脊髓膜膨出合併水腦,術前臥位是「俯臥,維持頭腳同高的姿勢」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 脊髓膜膨出合併水腦術前臥位:俯臥(減囊袋壓力、避破裂)+頭腳同高(合併水腦時勿頭低增IICP、亦勿頭高致CSF經囊漏)。本題為「俯臥、頭腳同高」(D);垂頭俯臥(A,合併水腦不宜頭低)、仰臥(B,壓囊)、側臥抬高床頭(C)非此。本題為D。","options":{"A":"垂頭俯臥(頭低)合併水腦不宜(增IICP)。","B":"仰臥會壓迫囊袋。","C":"側臥抬高床頭非此。","D":"正確。俯臥、頭腳同高(減囊壓又不增IICP)。"},"sources":["Nelson《兒科學》脊髓膜膨出","俯臥頭腳同高"]}},"105090-N4-44":{"quick":"13歲脊柱側彎術後住院2週護理措施較不合適的是「為小美訂定一份生活作息表」。","detail":{"background":"青少年(13歲)脊柱側彎住院2週:安排課業輔導、鼓勵參與身體活動安排、鼓勵邀同學探視皆合適(維持同儕/學業/自主)。「為小美訂定一份生活作息表」較不合適——青少年發展自主性,應讓其參與規劃(非替她訂定;剝奪自主)」。本題較不合適者為A。","options":{"A":"較不合適(本題答案)。青少年應參與規劃(非替她訂定,剝奪自主)。","B":"合適。安排醫院課業輔導老師教導。","C":"合適。鼓勵參與身體活動之安排。","D":"合適。鼓勵打電話邀同學探視。"},"sources":["Nelson《兒科學》青少年","自主"]}},"106030-N4-78":{"quick":"出生6天脊髓脊髓膜膨出術後護理措施錯誤的是「提供安靜與昏暗的環境,以減少視聽覺刺激」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 脊髓膜膨出術後:觀察神經功能評估腦膜炎徵象、被動運動按摩防攣縮、監測哭聲頭圍早期發現合併症皆正確。「提供安靜昏暗環境減視聽刺激」錯誤——脊髓膜膨出術後不以減視聽刺激為重點(那是IICP/腦膜炎的護理;此階段重傷口/神經/水腦監測;過度限制刺激不利發展)」。本題「錯誤」者為C。","options":{"A":"正確。觀察神經功能評估腦膜炎徵象。","B":"正確。被動運動及按摩預防肢體攣縮。","C":"錯誤(本題答案)。減視聽刺激非此階段重點(重傷口/神經/水腦監測)。","D":"正確。監測哭聲與頭圍早期發現合併症。"},"sources":["Nelson《兒科學》脊髓膜膨出","術後"]}},"106110-N4-79":{"quick":"出生3天脊髓膜膨出合併水腦術前護理錯誤的是「維持垂頭俯臥姿勢,以利脊髓液回流」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 脊髓膜膨出合併水腦術前:腿外展防髖脫位、軟小孔奶嘴防吞氣、臀部會陰乾淨減污染皆正確。「維持垂頭俯臥利脊髓液回流」錯誤——合併水腦時,垂頭(頭低)會增IICP,應俯臥頭腳同高(非垂頭)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。合併水腦時垂頭(頭低)增IICP,應俯臥頭腳同高。","B":"正確。腿部外展預防髖關節脫位。","C":"正確。質軟小孔奶嘴餵食防吞食過量空氣。","D":"正確。維持臀部會陰乾淨減糞便污染囊。"},"sources":["Nelson《兒科學》脊髓膜膨出","頭腳同高"]}},"106111-N4-78":{"quick":"12歲脊柱側彎護理措施及指導正確的是「若側彎程度不嚴重,建議羅妹妹多游泳,以預防惡化」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 (1)「側彎不嚴重多游泳預防惡化(對稱運動強化背肌)」——正確;(2)脊柱側彎追蹤多用X光(Cobb角;非每半年電腦斷層),B錯;(3)背架除洗澡睡覺外須穿(非「除睡覺外」;多數方案睡覺也穿或洗澡睡覺可脫),C欠精確;(4)鼓勵參加戶外活動(非不參加),D錯。本題為A。","options":{"A":"正確。側彎不嚴重多游泳預防惡化。","B":"錯。追蹤用X光(Cobb角),非每半年電腦斷層。","C":"背架穿戴時間敘述欠精確。","D":"錯。鼓勵參加戶外活動(非不參加)。"},"sources":["Nelson《兒科學》脊柱側彎","游泳"]}},"111030-N4-78":{"quick":"13歲脊柱側彎角度30度醫療護理措施正確的是「需持續穿著背架直到骨成熟為止」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 脊柱側彎(30度,中度):(1)背架除洗澡及睡覺外都穿(非「除洗澡睡覺外」之反向;但主要敘述),A欠精確(部分方案睡覺也穿);(2)「需持續穿著背架直到骨成熟為止」——正確;(3)30度不需同步脊柱融合(融合多>40~50度),C錯;(4)穿背架時不宜劇烈運動(運動時多可短暫脫除),D欠妥。本題為B。","options":{"A":"背架穿戴時間敘述欠精確。","B":"正確。需持續穿著背架直到骨成熟為止。","C":"錯。30度不需同步脊柱融合術(多>40~50度才融合)。","D":"穿背架不宜劇烈運動(敘述欠妥)。"},"sources":["Nelson《兒科學》脊柱側彎","骨成熟"]}},"111030-N4-79":{"quick":"成骨不全(osteogenesis imperfecta)護理措施錯誤的是「鼓勵儘量固定不動以避免多重骨折」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 成骨不全:雙磷化合物降低骨折頻率、固定不動時健側多運動、骨髓內固定增強骨強度皆正確。「鼓勵儘量固定不動」錯誤——成骨不全不可完全固定不動(廢用使骨更脆、肌肉萎縮);應適度活動/運動」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。不可儘量固定不動(廢用使骨更脆)。","B":"正確。使用雙磷化合物降低骨折頻率。","C":"正確。固定不動時宜在健側多做運動。","D":"正確。可做骨髓內固定增強骨的強度。"},"sources":["Nelson《兒科學》成骨不全","勿固定"]}},"113100-N4-48":{"quick":"14歲脊柱側彎(scoliosis)疾病特性和臨床表徵錯誤的是「彎腰時,雙側背部呈現明顯的突峰」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 脊柱側彎:站立兩肩高度不一、Cobb氏量角法評估嚴重度、骨盆傾斜皆正確。「彎腰時雙側背部明顯突峰」錯誤——脊柱側彎彎腰(Adams前彎測試)時單側(凸側)背部隆起突峰(非雙側)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。彎腰時單側(凸側)背部隆起突峰(非雙側)。","B":"正確。站立時二邊肩膀高度不一。","C":"正確。可用Cobb氏量角法評估嚴重度。","D":"正確。骨盆傾斜。"},"sources":["Nelson《兒科學》脊柱側彎","單側突峰"]}},"113180-N4-28":{"quick":"成骨不全(osteogenesis imperfecta)錯誤的是「需要限制任何活動」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 成骨不全:藍色鞏膜為典型、可能喪失聽力、四肢短彎弓形肌張力減退皆正確。「需要限制任何活動」錯誤——成骨不全不可限制所有活動(廢用使骨更脆);應適度活動/運動防萎縮」。本題「錯誤」者為C。","options":{"A":"正確。藍色鞏膜為典型症狀之一。","B":"正確。可能會喪失聽力。","C":"錯誤(本題答案)。不可限制任何活動(廢用使骨更脆,應適度運動)。","D":"正確。四肢極短且彎曲呈弓形、肌肉張力減退。"},"sources":["Nelson《兒科學》成骨不全","適度運動"]}},"114100-N4-32":{"quick":"6歲骨髓炎(osteomyelitis)護理措施不適當的是「患肢不需固定,鼓勵多活動,以利手術傷口引流」。","detail":{"background":"脊髓脊髓膜膨出(myelomeningocele):神經管缺損(葉酸不足相關);護理:術前俯臥或小坡度垂頭俯臥(減囊袋壓力)、無菌濕紗布覆蓋囊避免破裂乾燥、臀部會陰清潔避糞便污染、監測頭圍囟門(合併水腦)、腿外展防髖脫位。脊柱側彎(scoliosis):Cobb氏量角評嚴重度、站立兩肩不等高、骨盆傾斜、彎腰一側背部突起(非雙側);治療輕度觀察/游泳、中度背架(除洗澡睡覺外須穿;持續穿到骨成熟)、重度脊柱融合術。成骨不全(osteogenesis imperfecta):膠原缺陷骨脆弱易骨折、藍色鞏膜、聽力喪失、骨髓內固定/雙磷酸鹽降骨折;護理不可完全固定不動(致廢用骨更脆)、在活動限制下做運動防萎縮、健側多運動。骨髓炎(osteomyelitis):靜脈/口服抗生素療程長、高熱量高蛋白維生素C飲食、患肢固定/制動(非鼓勵多活動)、觀察傷口腫熱痛。 骨髓炎:出院繼續口服抗生素、高熱量高蛋白維生素C飲食、評估傷口腫熱觸痛皆適當。「患肢不需固定鼓勵多活動」不適當——骨髓炎患肢須固定/制動(減疼痛、防病理骨折、利癒合),非鼓勵多活動」。本題不適當者為D。","options":{"A":"適當。出院後需繼續口服抗生素的重要性。","B":"適當。提供高熱量、高蛋白及富含維生素C飲食。","C":"適當。評估傷口有無腫脹、發熱及觸痛。","D":"不適當(本題答案)。患肢須固定/制動(非鼓勵多活動)。"},"sources":["Nelson《兒科學》骨髓炎","固定"]}},"101110-N4-39":{"quick":"下肢骨折上石膏後立即護理不恰當的是「敷石膏的肢體應平放,以便內外均能乾燥」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 上石膏立即護理:解釋剛上石膏溫熱、邊緣平滑無刺激、評估末梢脈搏膚色溫度皆恰當。「敷石膏肢體平放」不恰當——應翻動/抬高使內外均勻乾燥(平放會使下方不易乾、且不利消腫;應抬高患肢)」。本題不恰當者為B。","options":{"A":"恰當。解釋剛上石膏會覺溫熱(硬化放熱)。","B":"不恰當(本題答案)。應翻動/抬高使內外均勻乾燥(非平放)。","C":"恰當。確保石膏邊緣平滑無刺激皮膚突出面。","D":"恰當。評估敷石膏肢體末梢脈搏、膚色、溫度。"},"sources":["Nelson《兒科學》石膏護理","乾燥"]}},"102110-N4-78":{"quick":"下肢骨折上石膏出院護理指導不恰當的是「患肢可能會影響活動能力,應多臥床休息以免不適」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 石膏出院:癢用扇搧或輕拍石膏、弄濕自然風乾勿吹風機、時常檢查患肢膚色感覺運動皆恰當。「多臥床休息」不恰當——上石膏仍鼓勵適度活動(未固定關節維持活動、健肢活動;過度臥床致廢用/血栓)」。本題不恰當者為A。","options":{"A":"不恰當(本題答案)。應鼓勵適度活動(非多臥床,防廢用/血栓)。","B":"恰當。石膏內癢用扇搧涼或輕拍石膏。","C":"恰當。弄濕自然風乾,不可吹風機。","D":"恰當。時常檢查患肢顏色、感覺或運動。"},"sources":["Nelson《兒科學》石膏護理","活動"]}},"102110-N4-79":{"quick":"出生3天歐氏徵象(Ortolani)陽性代表「是一種發展性髖關節發育不良,當下肢屈曲外展時,股骨頭滑過髖臼緣所產生的聲音」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 歐氏徵象(Ortolani)=發展性髖關節發育不良(DDH)的評估,下肢屈曲外展時股骨頭滑過/入髖臼緣產生卡嗒聲。本題為A;先天肌肉萎縮(B)、雙側足內翻(C)、肌肉炎攣縮(D)非Ortolani。本題為A。","options":{"A":"正確。Ortolani=DDH,屈曲外展股骨頭滑過髖臼緣的聲音。","B":"非肌肉萎縮。","C":"非足內翻。","D":"非肌肉炎攣縮。"},"sources":["Nelson《兒科學》DDH","Ortolani"]}},"103100-N4-78":{"quick":"10歲頭部側撞顳骨骨折對聲音反應差,神經功能評估正確的是「進行眼底鏡檢查,觀察是否有視乳突水腫」。","detail":{"background":"頭部外傷神經評估:(1)眼前庭反射測腦幹(非僅橋腦中樞),A欠精確;(2)「眼底鏡檢查觀察視乳突水腫(papilledema,IICP徵象)」——正確;(3)熱測試(冷熱水灌耳)測前庭功能,顳骨骨折有耳損傷時不宜灌耳,C欠妥;(4)娃娃眼(眼前庭)反射非觀察落日眼,D錯。本題為B。","options":{"A":"眼前庭反射測腦幹(「橋腦中樞」欠精確)。","B":"正確。眼底鏡檢查觀察視乳突水腫(IICP)。","C":"顳骨骨折有耳損傷時不宜灌耳熱測試。","D":"錯。娃娃眼反射非觀察落日眼。"},"sources":["Nelson《兒科學》頭部外傷","視乳突水腫"]}},"104030-N4-78":{"quick":"15歲腦膜炎身體檢查會出現的徵象是「克爾尼格氏徵象(Kernig)」。","detail":{"background":"腦膜炎身體檢查出現腦膜刺激徵:Kernig徵象、Brudzinski徵象、角弓反張。本題會出現者為「Kernig徵象」(D);歐氏徵象(Ortolani,髖關節)、葛氏徵象(Galeazzi,髖關節)、高爾氏徵象(Gower,肌失養)皆非腦膜炎。本題為D。","options":{"A":"歐氏徵象(Ortolani)是髖關節(DDH)。","B":"葛氏徵象(Galeazzi)是髖關節。","C":"高爾氏徵象(Gower)是肌失養症。","D":"正確。Kernig徵象是腦膜刺激徵(腦膜炎)。"},"sources":["Nelson《兒科學》腦膜炎","Kernig"]}},"104030-N4-79":{"quick":"8歲右前臂骨折上石膏出院護理指導錯誤的是「若不小心弄濕石膏,可以用烤燈烘乾」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 石膏出院:評估前臂膚色溫度、鼓勵用左手執行日常活動、疼痛或異味就醫皆正確。「弄濕石膏用烤燈烘乾」錯誤——弄濕石膏不可烤燈/吹風機烘乾(燙傷風險、且不均勻乾燥致石膏變形;應自然風乾)」。本題「錯誤」者為B。","options":{"A":"正確。教導評估右前臂膚色和溫度是否正常。","B":"錯誤(本題答案)。弄濕石膏不可烤燈烘乾(燙傷,應自然風乾)。","C":"正確。鼓勵運用左手執行日常活動。","D":"正確。疼痛或有異味宜就醫檢查感染。"},"sources":["Nelson《兒科學》石膏護理","勿烤燈"]}},"104100-N4-77":{"quick":"12歲疑似腦膜炎宜進行的檢查是「布魯辛斯基徵象(Brudzinski)」。","detail":{"background":"腦膜炎身體評估:腦膜刺激徵Brudzinski、Kernig。本題宜進行者為「Brudzinski徵象」(B);歐特雷妮操作(Ortolani,髖)、特倫德倫伯格徵象(Trendelenburg,髖/臀肌)、卡列阿齊徵象(Galeazzi,髖)皆非腦膜炎評估。本題為B。","options":{"A":"歐特雷妮(Ortolani)是髖關節評估。","B":"正確。Brudzinski徵象是腦膜刺激徵評估。","C":"特倫德倫伯格(Trendelenburg)是臀肌/髖評估。","D":"卡列阿齊(Galeazzi)是髖關節評估。"},"sources":["Nelson《兒科學》腦膜炎","Brudzinski"]}},"105030-N4-52":{"quick":"41週巨嬰鎖骨骨折(生產損傷)錯誤的是「為其執行圍巾徵象(Scarf signs)之評估」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 鎖骨骨折(生產損傷):沿鎖骨觸摸有骨磨擦/裂開感、驚嚇反射不對稱手臂上舉、抱起支持後背臀部勿自手臂抱皆正確。「執行圍巾徵象(Scarf sign,將手肘越過對側)錯誤——鎖骨骨折不可執行圍巾徵象(將手臂拉越過胸前會牽扯骨折處致疼痛/移位)」。本題「錯誤」者為C。","options":{"A":"正確。沿鎖骨觸摸有骨磨擦及裂開感。","B":"正確。驚嚇反射表現不對稱手臂上舉。","C":"錯誤(本題答案)。不可執行圍巾徵象(牽扯骨折處)。","D":"正確。抱起時支持後背及臀部,避免自手臂抱起。"},"sources":["Nelson《兒科學》鎖骨骨折","圍巾徵象"]}},"106111-N4-79":{"quick":"9歲左腓骨骨折剛上石膏護理措施錯誤的是「石膏未乾燥前,為減輕疼痛,可以將小妹的患肢放低」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 腓骨骨折石膏:勿烤燈吹風機、經常檢查左下肢膚色溫度評估神經壓迫、依體能活動健肢皆正確。「石膏未乾前將患肢放低」錯誤——石膏未乾前應抬高患肢(促靜脈回流減腫脹與疼痛;放低反增腫脹)」。本題「錯誤」者為B。","options":{"A":"正確。不用烤燈或吹風機加速石膏乾燥。","B":"錯誤(本題答案)。石膏未乾應抬高患肢(放低反增腫脹)。","C":"正確。經常檢查左下肢膚色溫度評估神經壓迫。","D":"正確。返家後依體能活動健側肢體。"},"sources":["Nelson《兒科學》石膏護理","抬高"]}},"107110-N4-51":{"quick":"10歲腦膜炎徵象,不是腦膜炎徵象的是「歐氏徵象(Ortolani)」。","detail":{"background":"腦膜炎徵象:柯林氏(Kernig)、布魯辛斯基(Brudzinski)、角弓反張(opisthotonic)。「歐氏徵象(Ortolani)」不是腦膜炎徵象——Ortolani是發展性髖關節發育不良(DDH)的評估(非腦膜炎)」。本題不是者為A。","options":{"A":"本題答案(非腦膜炎徵象)。Ortolani是DDH評估。","B":"是腦膜炎徵象。Kernig徵象。","C":"是腦膜炎徵象。Brudzinski徵象。","D":"是腦膜炎徵象。角弓反張。"},"sources":["Nelson《兒科學》腦膜炎","Ortolani非"]}},"108020-N4-63":{"quick":"新生兒先天性梅毒敘述錯誤的是「早期症狀會造成軍刀狀脛骨及痙攣性麻痺」。","detail":{"background":"先天性梅毒:病理性骨折(溫伯格徵象Wimberger)、背臀圓形丘疹病灶具傳染力、肝脾腫大黃疸貧血紅血球母細胞增多皆為早期。「早期軍刀狀脛骨及痙攣性麻痺」錯誤——軍刀狀脛骨(saber shin)、間質性角膜炎、Hutchinson齒是晚期先天性梅毒的表現(非早期)」。本題「錯誤」者為D。","options":{"A":"(早期)病理性骨折稱溫伯格徵象。","B":"正確(早期)。背臀圓形丘疹病灶具傳染力。","C":"正確(早期)。肝脾腫大、黃疸、貧血、紅血球母細胞增多。","D":"錯誤(本題答案)。軍刀狀脛骨是晚期表現(非早期)。"},"sources":["Nelson《兒科學》先天性梅毒","晚期"]}},"108020-N4-64":{"quick":"新生兒生產過程鎖骨骨折護理措施錯誤的是「建議採趴睡姿勢,以利患部癒合」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 鎖骨骨折護理:穿脫衣患側先穿後脫、避免測圍巾徵象、抱起支持後背臀部皆正確。「採趴睡(俯臥)姿勢」錯誤——鎖骨骨折趴睡會壓迫患部致疼痛/移位;且嬰兒俯臥增嬰兒猝死風險」。本題「錯誤」者為B。","options":{"A":"正確。穿脫衣採患側先穿後脫。","B":"錯誤(本題答案)。趴睡會壓迫患部(且增SIDS風險)。","C":"正確。避免測圍巾徵象(將手肘越過對側)。","D":"正確。抱起支持後背及臀部,避免自手臂抱。"},"sources":["Nelson《兒科學》鎖骨骨折","勿趴睡"]}},"108110-N4-76":{"quick":"5歲以下兒童跌倒容易導致脫臼的部位是「髖部」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 5歲以下兒童跌倒容易導致髖部脫臼(髖關節發育未完全穩定)。本題為「髖部」(A);膝部、手肘(手肘常「牽拉肘」但5歲下跌倒最易髖)、腕部非5歲下跌倒最易脫臼處(依官方為髖部)。本題為A。","options":{"A":"正確。5歲以下兒童跌倒容易導致髖部脫臼。","B":"膝部非最易。","C":"手肘有牽拉肘但非此題答案。","D":"腕部非最易。"},"sources":["Nelson《兒科學》脫臼","髖部"]}},"109110-N4-51":{"quick":"出生3天左手活動受限、擁抱反射不對稱、兩肩不等高、局部觸痛腫脹,可能是「鎖骨骨折」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 本例出生3天、左手活動受限、擁抱反射不對稱、兩肩不等高、局部觸痛腫脹→鎖骨骨折(生產損傷最常見骨折)。本題為「鎖骨骨折」(A);橈骨、尺骨、肱骨骨折非生產損傷最常見。本題為A。","options":{"A":"正確。擁抱反射不對稱+兩肩不等高+觸痛腫脹=鎖骨骨折(生產損傷)。","B":"橈骨骨折非生產損傷最常見。","C":"尺骨骨折非此。","D":"肱骨骨折非最常見。"},"sources":["Nelson《兒科學》鎖骨骨折","生產損傷"]}},"109110-N4-78":{"quick":"發展性髖關節發育不良用帕米利克背帶(Pavlik harness)護理不適當的是「2歲以上的病童,只需穿戴此背帶直到骨盆發育穩定就會痊癒」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 Pavlik背帶:維持髖屈曲外展、正確位置做記號方便調整、維持背帶下皮膚清潔完整皆適當。「2歲以上只需穿背帶就痊癒」不適當——Pavlik背帶用於6個月以內(黃金期);2歲以上背帶無效,須手術/人字形石膏」。本題不適當者為B。","options":{"A":"適當。維持髖關節屈曲及外展。","B":"不適當(本題答案)。Pavlik用於6個月內(2歲以上無效,須手術)。","C":"適當。正確位置做記號方便調整。","D":"適當。維持背帶下皮膚清潔及完整性。"},"sources":["Nelson《兒科學》DDH","Pavlik"]}},"110030-N4-77":{"quick":"12歲右脛腓骨骨折上石膏護理措施錯誤的是「患肢未被石膏固定的上下關節儘量固定不動,避免疼痛」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、 」不適當——勿將物品伸入石膏內抓癢(刮傷皮膚致感染、物品遺留;用冷風吹)」。本題不適當者為B。","options":{"A":"適當。餵食採坐姿或仰臥抬頭抬高防嗆。","B":"不適當(本題答案)。勿將物品伸入石膏抓癢(刮傷感染)。","C":"適當。撫觸擁抱、玩具分散注意減不適。","D":"適當。經常更換尿布防石膏受糞便污染。"},"sources":["Nelson《兒科學》石膏護理","勿伸物抓癢"]}},"112180-N4-48":{"quick":"發展性髖關節發育不良護理措施錯誤的是「布萊安特氏(Bryant)牽引,是將雙腳與髖關節屈曲45度並向上做牽引」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 DDH:Pavlik背帶維持屈曲外展、走路後用人字形石膏、6個月前為黃金治療期皆正確。「Bryant牽引屈曲45度」錯誤——Bryant牽引(2歲下/體重<約12~14kg)是將雙下肢與髖屈曲90度向上牽引(臀部略離床),非45度」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。Bryant牽引是髖屈曲90度向上牽引(非45度)。","B":"正確。Pavlik背帶維持髖關節屈曲及外展。","C":"正確。走路後用髖部人字形石膏治療。","D":"正確。6個月以前為治療黃金時期。"},"sources":["Nelson《兒科學》DDH","Bryant"]}},"113180-N4-50":{"quick":"單側性發展性髖關節發育不良(DDH)臨床表徵錯誤的是「仰臥,將髖部曲折成90度時,健肢膝部會降低」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 單側DDH:臀部大腿皮膚皺褶不對稱、患肢單腿站立健側髖向下傾(Trendelenburg)、外展做卡嗒聲(Ortolani)皆正確。「仰臥髖屈90度健肢膝降低」錯誤——DDH(Galeazzi徵象):屈膝屈髖90度時患側膝降低(患側股骨短),非健肢」。本題「錯誤」者為C。","options":{"A":"正確。臀部及大腿皮膚皺褶左右不對稱。","B":"正確。患肢單腿站立健側髖向下傾(Trendelenburg)。","C":"錯誤(本題答案)。Galeazzi是患側膝降低(患側股骨短),非健肢。","D":"正確。患肢屈曲外展出現卡嗒(click)聲(Ortolani)。"},"sources":["Nelson《兒科學》DDH","Galeazzi"]}},"114170-N4-19":{"quick":"檢查新生兒髖關節先天發育不良正確的方法是「執行巴羅操作法(Barlow),將大腿內收、膝部下壓,股骨頭會在關節囊內滑動,為異常現象」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 DDH檢查:(1)大腿臀部皺褶不對稱是異常(非正常),A錯;(2)Ortolani出現卡嗒聲是異常(非正常),B錯;(3)Galeazzi:屈膝時患側股骨短(非較長),C錯;(4)「Barlow操作大腿內收膝下壓股骨頭滑出關節囊為異常」——正確。本題為D。","options":{"A":"錯。皮膚皺褶不對稱是異常(非正常)。","B":"錯。Ortolani出現卡嗒聲是異常(非正常)。","C":"錯。Galeazzi是患側股骨短(非較長)。","D":"正確。Barlow操作股骨頭滑出關節囊為異常。"},"sources":["Nelson《兒科學》DDH","Barlow"]}},"114170-N4-48":{"quick":"8歲右肱骨骨折上石膏護理措施最適當的是「患側未被石膏固定的關節,維持正常關節活動,減輕關節僵直」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 (1)上石膏肢體蒼白、麻痺是神經血管受壓異常須就醫(非做等長運動),A錯;(2)「未石膏固定的關節維持正常活動減關節僵直」——正確;(3)石膏灼熱點/滲出液是感染異常(非正常觀察),C錯;(4)弄濕石膏勿烤燈/吹風機(自然風乾),D錯。本題為B。","options":{"A":"錯。蒼白麻痺是神經血管受壓異常須就醫(非做等長運動)。","B":"正確。未石膏固定的關節維持正常活動,減關節僵直。","C":"錯。灼熱點/滲出液是感染異常(非正常)。","D":"錯。弄濕石膏勿烤燈/吹風機(自然風乾)。"},"sources":["Nelson《兒科學》石膏護理","關節活動"]}},"115030-N4-49":{"quick":"4歲右股骨骨折石膏治療患肢循環神經異常徵象不適當的是「瘀斑(purpura)」。","detail":{"background":"石膏護理:剛上石膏溫熱(石膏硬化放熱)、敷石膏肢體翻動使內外乾燥、邊緣平滑無刺激、評估末梢脈搏/膚色/溫度/感覺/運動(5P:pain疼痛、pallor蒼白、pulselessness脈搏弱、paresthesia感覺異常、paralysis麻痺;非瘀斑purpura);勿烤燈/吹風機加速乾燥(燙傷;自然風乾)、癢勿伸物搔抓(用扇/冷風)、抬高患肢促靜脈回流(未乾時勿放低)、未石膏固定之上下關節維持正常活動(非固定不動)、出院鼓勵健肢活動、弄濕/灼熱點/異味就醫。發展性髖關節發育不良(DDH):歐氏徵象(Ortolani,屈曲外展股骨頭滑入有卡嗒聲)、巴羅徵象(Barlow,內收下壓股骨頭滑出)、臀部大腿皮膚皺褶不對稱、患側股骨短(Galeazzi)、外展受限;治療帕米利克背帶(Pavlik,維持髖屈曲外展;6個月內黃金期)、走路後人字形石膏(spica)。鎖骨骨折(新生兒產傷):擁抱反射不對稱、觸痛腫脹、患側先穿後脫衣、勿趴睡壓患部、抱支持後背臀部勿自手臂抱、勿測圍巾徵象。5歲下跌倒易髖部脫臼。 石膏患肢循環/神經異常徵象(5P):疼痛(pain)、蒼白(pallor)、脈搏減少(pulselessness)、感覺異常(paresthesia)、麻痺(paralysis)。「瘀斑(purpura)」不是5P之一——瘀斑(紫斑/出血點)是凝血/血小板問題,非石膏壓迫的循環/神經徵象」。本題不適當者為D。","options":{"A":"是5P。疼痛(pain)。","B":"是5P。脈搏減少(pulselessness)。","C":"是5P。感覺異常(paresthesia)。","D":"本題答案(非5P)。瘀斑(purpura)是凝血問題(非循環/神經徵象)。"},"sources":["Nelson《兒科學》石膏","5P"]}},"102030-N4-31":{"quick":"待產婦臍帶脫垂應避免採用「半坐臥式」。","detail":{"background":"臍帶脫垂(緊急)處置姿勢:抬高臀部減胎先露部壓迫臍帶——膝胸臥式、垂頭仰臥(Trendelenburg)、下肢抬高側臥皆適當。「半坐臥式」應避免——半坐臥會使胎先露部下降更壓迫臍帶(加重胎兒缺氧)」。本題應避免者為C。","options":{"A":"適當。膝胸臥式抬高臀部減臍帶壓迫。","B":"適當。垂頭仰臥式(Trendelenburg)。","C":"本題答案(應避免)。半坐臥使先露部下降更壓迫臍帶。","D":"適當。下肢抬高之側臥式。"},"sources":["新文京《產科護理學》臍帶脫垂","膝胸臥"]}},"102110-N4-8":{"quick":"孕婦服葉酸減少胎兒腦神經管缺損,以「妊娠第一期」服用效果較佳。","detail":{"background":"葉酸預防神經管缺損:神經管約懷孕3~4週(第一孕期)關閉,故懷孕前及第一孕期(妊娠第一期)補充葉酸效果最佳。本題為「妊娠第一期」(A)。","options":{"A":"正確。妊娠第一期(神經管早期關閉)補葉酸效果最佳。","B":"妊娠第二期已過神經管關閉期。","C":"妊娠第三期太晚。","D":"整個懷孕期非「效果較佳」的最佳時機。"},"sources":["新文京《產科護理學》葉酸","第一期"]}},"102110-N4-16":{"quick":"待產暈眩、嘴唇麻刺(換氣過度),最佳措施是「教導以手拱成杯狀,摀著口鼻緩慢呼吸」。","detail":{"background":"待產陣痛換氣過度(呼吸性鹼中毒)→暈眩、嘴唇麻刺。最佳措施:以手拱杯狀摀口鼻緩慢呼吸(回吸CO2矯正鹼中毒)(或紙袋呼吸)。本題為A;保持安靜促睡(B)、補水(C,非脫水)、抬高下肢(D)非此。本題為A。","options":{"A":"正確。手拱杯狀摀口鼻緩慢呼吸(回吸CO2矯正鹼中毒)。","B":"非促睡眠。","C":"非脫水(是換氣過度)。","D":"非抬高下肢。"},"sources":["新文京《產科護理學》換氣過度","回吸CO2"]}},"102110-N4-31":{"quick":"42歲子宮鏡切除子宮內頸息肉術後護理正確的是「若發生子宮痙攣疼痛,可依醫囑予鎮痛劑」。","detail":{"background":"子宮鏡息肉切除術後:(1)「子宮痙攣疼痛依醫囑給鎮痛劑」——正確;(2)肩痛(CO2刺激橫膈)採平躺/膝胸(非半坐臥;半坐臥反增肩痛?其實左側或平躺助氣吸收),B欠妥;(3)術後性生活禁約1~2週(非3個月),C錯;(4)陰道勿放棉條(感染風險),D錯。本題為A。","options":{"A":"正確。子宮痙攣疼痛可依醫囑給鎮痛劑。","B":"肩痛處置敘述欠妥(非半坐臥)。","C":"錯。術後禁性生活約1~2週(非3個月)。","D":"錯。陰道勿放棉條(感染風險)。"},"sources":["Berek婦科 子宮鏡","術後"]}},"102110-N4-40":{"quick":"D&C術後護理指導正確的是「術後最初2天有少量陰道出血是正常的」。","detail":{"background":"子宮頸擴張刮除術(D&C)術後:(1)「術後最初1~2天少量陰道出血正常」——正確;(2)劇烈痙攣痛異常(非正常),B錯;(3)陰道紗布由醫護取出(非等不出血自行取),C錯;(4)術後初期勿盆浴/坐浴(感染;約傷口癒合後),D欠妥。本題為A。","options":{"A":"正確。術後最初2天少量陰道出血是正常。","B":"錯。劇烈痙攣痛是異常(非正常)。","C":"錯。陰道紗布由醫護取出(非自行)。","D":"術後初期勿坐浴(感染)。"},"sources":["Berek婦科 D&C","術後出血"]}},"103100-N4-72":{"quick":"1個月先天性甲狀腺功能低下敘述正確的是「不容易餵食,體重增加緩慢」。","detail":{"background":"先天性甲狀腺功能低下:(1)出生體重多正常或偏大(非比正常低),A欠精確;(2)「不容易餵食(吸吮差/嗜睡)、體重增加緩慢」——正確;(3)嗜睡安靜少哭(非好動愛哭),C錯;(4)出生後儘早(新生兒篩檢陽性即治療,非6~12個月才治)避免智能遲緩,D錯。本題為B。","options":{"A":"出生體重多正常/偏大(非偏低)。","B":"正確。不容易餵食、體重增加緩慢(嗜睡吸吮差)。","C":"錯。嗜睡安靜少哭(非好動愛哭)。","D":"錯。應新生兒篩檢陽性即治療(非6~12月才治)。"},"sources":["Nelson《兒科學》先天甲低","餵食"]}},"104030-N4-5":{"quick":"絨毛膜取樣術無法檢查出的胎兒異常是「中樞神經管缺損」。","detail":{"background":"絨毛膜取樣(CVS)可查染色體/基因異常(唐氏症、地中海貧血、G-6-PD);無法查中樞神經管缺損(神經管缺損須母血AFP或超音波/羊水AFP)。本題無法檢查者為「中樞神經管缺損」(A)。","options":{"A":"正確。絨毛膜取樣無法查神經管缺損(須AFP/超音波)。","B":"可查地中海型貧血(基因)。","C":"可查G-6-PD(基因)。","D":"可查唐氏症候群(染色體)。"},"sources":["新文京《產科護理學》CVS","神經管缺損"]}},"105030-N4-69":{"quick":"副甲狀腺功能低下症病童照護錯誤的是「鼓勵攝取高纖食物,改善便秘症狀」。","detail":{"background":"副甲狀腺功能低下→低血鈣→手足抽搐、喉頭痙攣。照護:監測抽搐避免二次傷害、減少聲光刺激、監測呼吸防喉頭痙攣皆正確。「鼓勵高纖食物改善便秘」錯誤——副甲狀腺低下重點是補鈣、高鈣低磷飲食,非「高纖改善便秘」(且便秘非主要問題)」。本題「錯誤」者為D。","options":{"A":"正確。監測抽搐症狀避免二次傷害。","B":"正確。減少病童周圍環境聲光刺激。","C":"正確。監測呼吸型態避免喉頭痙攣致呼吸困難。","D":"錯誤(本題答案)。副甲低下重點補鈣高鈣低磷(非高纖改善便秘)。"},"sources":["Nelson《兒科學》副甲低下","補鈣"]}},"105090-N4-26":{"quick":"新生兒身體評估錯誤的是「鼻尖的小白點為粟粒疹,出生後3~5天即會消失」。","detail":{"background":"新生兒身體評估:外耳翼頂低於眼外眥可能染色體異常、乳頭白色分泌物受母親雌性素影響、Ortolani聽見喀答聲表髖脫位皆正確。「粟粒疹出生後3~5天消失」錯誤——粟粒疹(milia,鼻尖皮脂腺阻塞小白點)約數週(2~4週)才消失(非3~5天)」。本題「錯誤」者為B。","options":{"A":"正確。外耳翼頂點低於眼外眥可能染色體異常。","B":"錯誤(本題答案)。粟粒疹約數週(2~4週)消失(非3~5天)。","C":"正確。乳頭白色分泌物受母親雌性素影響。","D":"正確。Ortolani聽見喀答聲表髖關節脫臼。"},"sources":["Nelson《兒科學》新生兒評估","粟粒疹"]}},"106111-N4-5":{"quick":"孕期葉酸攝取護理指導錯誤的是「豆類是葉酸最佳來源之一」(本題C)?——本題答C。","detail":{"background":"孕期葉酸:懷孕前可開始補充、預防胎兒脊柱裂、葉酸易受高溫紫外線破壞須注意保存皆正確。本題錯誤為C:依官方,「豆類是葉酸最佳來源之一」的敘述被判錯誤——葉酸最佳來源是深綠色蔬菜(菠菜等)、肝臟、酵母;豆類雖含葉酸但官方此題以「深綠蔬菜」為最佳。本題「錯誤」者為C。","options":{"A":"正確。懷孕前可開始補充葉酸。","B":"正確。孕期葉酸攝取可預防胎兒脊柱裂。","C":"錯誤(本題答案,官方)。葉酸最佳來源是深綠色蔬菜(豆類非「最佳」)。","D":"正確。葉酸易受高溫和紫外線破壞須注意保存。"},"sources":["新文京《產科護理學》葉酸","深綠蔬菜"]}},"108020-N4-54":{"quick":"青少年憂鬱症治療與處置正確的是「可多攝取多醣類、奶製品、魚油及維生素的食物」。","detail":{"background":"青少年憂鬱症:(1)藥物SSRI為首選(非三環抗鬱劑;三環副作用多),A錯;(2)電氣痙攣治療用於嚴重/頑固(非輕度),B錯;(3)「多攝取多醣類、奶製品、魚油(omega-3)、維生素食物(助情緒)」——正確;(4)應聚焦/處理人際困擾議題(非避免),D錯。本題為C。","options":{"A":"錯。SSRI為首選(非三環抗鬱劑)。","B":"錯。電氣痙攣用於嚴重/頑固(非輕度)。","C":"正確。多攝取多醣類、奶製品、魚油及維生素。","D":"錯。應處理人際困擾議題(非避免)。"},"sources":["DSM-5 青少年憂鬱","SSRI"]}},"108020-N4-76":{"quick":"副甲狀腺功能低下(Hypoparathyroidism)兒童臨床表徵正確的是「喉部肌肉痙攣及喘鳴現象」。","detail":{"background":"副甲狀腺功能低下→低血鈣:(1)血鈣降低(<約7;非12~15),A錯;(2)血磷升高(非2.5~3.5正常),B錯;(3)「喉部肌肉痙攣及喘鳴(低血鈣致喉痙攣)」——正確;(4)副甲低下鈣沉積/不足但骨非「大量流失」(骨流失是副甲亢進),D錯。本題為C。","options":{"A":"錯。副甲低下血鈣降低(非12~15高鈣)。","B":"錯。血磷升高(非2.5~3.5正常)。","C":"正確。喉部肌肉痙攣及喘鳴(低血鈣喉痙攣)。","D":"錯。骨流失是副甲亢進(非低下)。"},"sources":["Nelson《兒科學》副甲低下","喉痙攣"]}},"108110-N4-45":{"quick":"1歲主動脈狹窄(coarctation)不是其症狀的是「肺血管阻力升高而有發紺現象」。","detail":{"background":"主動脈狹窄(coarctation,非發紺型):上肢血壓>下肢、主訴頭痛暈眩、股動脈搏動弱甚至摸不到皆是。「肺血管阻力升高發紺」不是主動脈狹窄症狀——主動脈狹窄是左心阻塞(非發紺型;無右→左分流),不會發紺」。本題不是症狀者為B。","options":{"A":"是症狀。上肢血壓比下肢高。","B":"本題答案(非症狀)。主動脈狹窄非發紺型,不會發紺。","C":"是症狀。常主訴頭痛、暈眩。","D":"是症狀。股動脈搏動較弱甚至摸不到。"},"sources":["Nelson《兒科學》主動脈狹窄","非發紺"]}},"109110-N4-43":{"quick":"臺灣發展遲緩早期療育負責協調整合管理的窗口是「兒童早期療育通報轉介中心」。","detail":{"background":"臺灣發展遲緩早期療育流程:通報→兒童早期療育通報轉介中心(協調整合管理窗口)→聯合評估中心評估→療育。本題協調整合管理窗口為「兒童早期療育通報轉介中心」(A);聯合評估中心(評估)、衛生局、療育中心(服務)非協調整合窗口。本題為A。","options":{"A":"正確。兒童早期療育通報轉介中心是協調整合管理窗口。","B":"聯合評估中心負責評估。","C":"衛生局非協調整合窗口。","D":"療育中心負責服務提供。"},"sources":["早療制度","通報轉介中心"]}},"110030-N4-2":{"quick":"產婦腰椎硬膜外麻醉合併症錯誤的是「胎兒心跳變異性增加」。","detail":{"background":"腰椎硬膜外麻醉合併症:低血壓、脊髓性頭痛、排尿困難皆是。「胎兒心跳變異性增加」錯誤——硬膜外麻醉致母低血壓→胎盤灌流減→胎兒心跳變異性減少(非增加)」。本題「錯誤」者為B。","options":{"A":"是合併症。低血壓。","B":"錯誤(本題答案)。胎兒心跳變異性減少(非增加;母低血壓致胎盤灌流減)。","C":"是合併症。脊髓性頭痛。","D":"是合併症。排尿困難。"},"sources":["新文京《產科護理學》硬膜外麻醉","變異性"]}},"110030-N4-49":{"quick":"兒童鴉片類製劑(opioids)疼痛處置正確的是「此類藥物適用於兒童中度至重度的疼痛」。","detail":{"background":"鴉片類(opioids):(1)「適用中度至重度疼痛」——正確;(2)鴉片作用中樞鴉片受體(非抑制前列腺素;那是NSAID),B錯;(3)鴉片副作用便秘/呼吸抑制/嗜睡(非胃潰瘍/出血性腎炎;那是NSAID),C錯;(4)與雷氏症候群有關的是aspirin(非morphine),D錯。本題為A。","options":{"A":"正確。鴉片類適用於中度至重度疼痛。","B":"錯。抑制前列腺素是NSAID(鴉片作用中樞受體)。","C":"錯。胃潰瘍/出血是NSAID(鴉片副作用便秘/呼吸抑制)。","D":"錯。與雷氏症候群有關是aspirin(非morphine)。"},"sources":["藥理 opioids","中重度疼痛"]}},"110030-N4-64":{"quick":"6個月心導管檢查前準備適當的是「確認禁食4~6小時」。","detail":{"background":"心導管檢查前準備:(1)須測下肢血壓(檢查後比較循環),A錯(不應避免);(2)「確認禁食4~6小時(防鎮靜嘔吐吸入)」——正確;(3)確認股動脈/足背脈搏最強處標記(非鼠蹊脈搏;其實標記遠端脈搏利術後比較),C欠精確;(4)可給鎮靜劑與預防性抗生素(非不宜),D錯。本題為B。","options":{"A":"錯。須測下肢血壓(非避免)。","B":"正確。確認禁食4~6小時(防鎮靜嘔吐吸入)。","C":"標記遠端脈搏(敘述欠精確)。","D":"錯。可給鎮靜劑與預防性抗生素。"},"sources":["Nelson《兒科學》心導管","禁食"]}},"110030-N4-76":{"quick":"膀胱輸尿管逆流(VUR)初期臨床表徵正確的是「排尿疼痛有灼熱感」。","detail":{"background":"膀胱輸尿管逆流(VUR)初期多以泌尿道感染表現:排尿疼痛灼熱感、發燒、頻尿。本題正確為「排尿疼痛有灼熱感」(A);無尿意感(B)、骨突處凹陷性水腫(C是腎病/心衰)、膽固醇三酸甘油脂上升(D是腎病症候群)非VUR初期。本題為A。","options":{"A":"正確。VUR初期以UTI表現(排尿疼痛灼熱感)。","B":"無尿意感非VUR初期表徵。","C":"凹陷性水腫是腎病/心衰(非VUR)。","D":"膽固醇三酸甘油脂上升是腎病症候群。"},"sources":["Nelson《兒科學》VUR","UTI"]}},"110110-N4-25":{"quick":"胎兒窘迫剖腹生產採腰椎硬膜外麻醉術後姿勢護理最適當的是「採辛氏臥位頭側向一邊,避免分泌物阻塞呼吸道」。","detail":{"background":"剖腹產硬膜外麻醉術後:(1)垂頭仰臥非標準(增顱壓/誤吸),A欠妥;(2)硬膜外不一定須平躺8小時(脊髓穿刺才須平躺防頭痛;硬膜外較少),B欠精確;(3)「採辛氏臥位(側臥)頭側一邊避免分泌物阻塞呼吸道(麻醉未全退防誤吸)」——正確;(4)左側躺增子宮血流是產前/待產之考量(術後以呼吸道安全為先),D欠妥。本題為C。","options":{"A":"垂頭仰臥欠妥(增顱壓/誤吸)。","B":"硬膜外不一定須平躺8小時(脊髓穿刺才須)。","C":"正確。辛氏臥位頭側一邊,避免分泌物阻塞呼吸道。","D":"左側躺增子宮血流是待產考量(術後以呼吸道安全為先)。"},"sources":["新文京《產科護理學》術後姿勢","辛氏臥位"]}},"111030-N4-24":{"quick":"脊髓阻斷麻醉剖腹產後第1天起床頭痛、躺下緩解,適當指導是「說明是腦脊髓液不平衡,建議暫時頭不抬高平躺並補充水分」。","detail":{"background":"脊髓(蜘蛛膜下)麻醉後脊髓性頭痛:CSF經穿刺孔滲漏→起身頭痛、躺下緩解(姿勢性)。指導:平躺(暫不抬高頭)、補充水分(增CSF生成)、咖啡因、必要時血液貼片。本題為B;說禁食低血糖(A,非)、麻醉藥代謝(C,非)、焦慮(D,非)皆誤判。本題為B。","options":{"A":"錯。非禁食低血糖(是脊髓性頭痛)。","B":"正確。脊髓性頭痛,平躺不抬頭並補充水分。","C":"錯。非麻醉藥代謝問題。","D":"錯。非焦慮引起(是姿勢性頭痛)。"},"sources":["新文京《產科護理學》脊髓性頭痛","平躺"]}},"112030-N4-66":{"quick":"10歲主動脈狹窄(COA)臨床表徵不適當的是「下肢比上肢血壓高20 mmHg」。","detail":{"background":"主動脈狹窄(COA):股動脈搏動微弱、主訴頭痛暈眩、腳部冰冷皆是。「下肢比上肢血壓高」不適當——主動脈狹窄上肢血壓>下肢(狹窄在主動脈弓遠端,上肢血多下肢血少),非下肢高」。本題不適當者為A。","options":{"A":"不適當(本題答案)。COA是上肢血壓>下肢(非下肢高)。","B":"是表徵。股動脈搏動微弱。","C":"是表徵。主訴頭痛、暈眩。","D":"是表徵。主訴腳部冰冷。"},"sources":["Nelson《兒科學》COA","上肢高"]}},"112110-N4-4":{"quick":"懷孕期營養指導最適當的是「懷孕前及第一孕期注意葉酸的攝取,可預防胎兒神經管缺損」。","detail":{"background":"懷孕營養:(1)「懷孕前及第一孕期注意葉酸預防神經管缺損」——正確;(2)咖啡因適量(非絕對不可),B錯;(3)水分充足(非限制500~1000mL),C錯;(4)第二孕期補鐵劑與鈣(非維生素K),D錯。本題為A。","options":{"A":"正確。懷孕前及第一孕期注意葉酸,預防神經管缺損。","B":"錯。咖啡因適量(非絕對不可)。","C":"錯。水分應充足(非限制500~1000mL)。","D":"錯。第二孕期補鐵劑(非維生素K)。"},"sources":["新文京《產科護理學》孕期營養","葉酸"]}},"112110-N4-6":{"quick":"懷孕33週膨大子宮使姿勢改變為「腰、背、脊柱向前方凸起」。","detail":{"background":"懷孕後期姿勢改變:膨大子宮使身體重心前移→代償腰椎前凸(腰、背、脊柱向前方凸起;骨盆前傾)→下背痛。本題為「腰背脊柱向前方凸起」(B);重心後移(A錯,前移)、腹肌張力增(C錯,鬆弛)、骨盆關節緊實(D錯,鬆弛)非此。本題為B。","options":{"A":"錯。重心前移(非後移)。","B":"正確。腰、背、脊柱向前方凸起(腰椎前凸)。","C":"錯。腹肌張力鬆弛(非增加)。","D":"錯。骨盆關節鬆弛(非緊實)。"},"sources":["新文京《產科護理學》孕期姿勢","腰椎前凸"]}},"112110-N4-74":{"quick":"6歲疑似闌尾炎評估最適當的是「羅氏徵象(Rovsing’s sign)」。","detail":{"background":"闌尾炎評估徵象:羅氏徵象(Rovsing,壓左下腹右下腹痛)、反彈痛(Blumberg,但Blumberg是腹膜炎通用)、麥氏點壓痛、腰肌徵象。本題最適當為「羅氏徵象(Rovsing)」(C);柯林氏(Kernig,腦膜炎)、墨菲氏(Murphy,膽囊炎)非闌尾炎;布魯伯氏(Blumberg反彈痛)為腹膜刺激通用。本題依官方為C。","options":{"A":"柯林氏(Kernig)是腦膜炎徵象。","B":"布魯伯氏(Blumberg)是腹膜刺激通用(非闌尾特異)。","C":"正確。羅氏徵象(Rovsing)是闌尾炎評估。","D":"墨菲氏(Murphy)是膽囊炎徵象。"},"sources":["Nelson《兒科學》闌尾炎","Rovsing"]}},"112180-N4-42":{"quick":"兒童副甲狀腺功能低下症(hypoparathyroidism)錯誤的是「X光檢查發現骨質疏鬆」。","detail":{"background":"副甲狀腺功能低下→低血鈣高血磷:血鈣<7、手足痙攣、避免高磷食物皆正確。「X光發現骨質疏鬆」錯誤——副甲狀腺亢進(PTH高)才骨流失骨質疏鬆;副甲低下(PTH低)骨不會流失(反可鈣沉積/正常)」。本題「錯誤」者為C。","options":{"A":"正確。通常血鈣濃度小於7.0 mg/dL。","B":"正確。手足痙攣為常見症狀(低血鈣)。","C":"錯誤(本題答案)。骨質疏鬆是副甲亢進(低下不致骨流失)。","D":"正確。避免食用含高磷的食物。"},"sources":["Nelson《兒科學》副甲低下","非骨鬆"]}},"113030-N4-24":{"quick":"逆行性射精敘述錯誤的是「接受精子捐贈進行人工授精為唯一的治療方式」。","detail":{"background":"逆行性射精:常見於脊髓損傷/糖尿病神經病變、可為腹腔/骨盆手術併發症、流至尿道的精液逆流至膀胱皆正確。「接受精子捐贈人工授精唯一治療」錯誤——逆行性射精治療可藥物(擬交感神經藥α-agonist)、或自膀胱尿液取精子做人工生殖(非「唯一精子捐贈」)」。本題「錯誤」者為D。","options":{"A":"正確。常見於脊髓損傷或糖尿病合併神經病變。","B":"正確。可能為腹腔或骨盆腔手術後併發症。","C":"正確。流至尿道的精液逆流至膀胱。","D":"錯誤(本題答案)。可藥物或自膀胱取精,非「唯一精子捐贈」。"},"sources":["泌尿學 逆行性射精","治療"]}},"113180-N4-6":{"quick":"第三孕期下肢腫脹護理指導不適當的是「穿著及膝彈性襪」。","detail":{"background":"第三孕期下肢水腫(子宮壓迫靜脈回流減):穿舒適軟質包鞋、足背屈曲運動、左側臥皆適當。「穿著及膝彈性襪」不適當——及膝(短)彈性襪上緣會束膝/小腿反阻靜脈回流加重水腫;應穿及大腿/全腿彈性襪」。本題不適當者為B。","options":{"A":"適當。可穿舒適軟質包鞋。","B":"不適當(本題答案)。及膝彈性襪上緣束膝反阻回流(應全腿彈性襪)。","C":"適當。可做足背屈曲運動促回流。","D":"適當。臥床休息採左側臥。"},"sources":["新文京《產科護理學》孕期水腫","彈性襪"]}},"114100-N4-27":{"quick":"1歲嬰兒誤食家用清潔劑(呼吸穩定但流口水咳嗽)較適當處置是「保持呼吸道通暢,持續觀察意識狀態」。","detail":{"background":"誤食腐蝕性清潔劑:勿催吐(腐蝕劑再經食道二次灼傷)、勿中和(產熱/產氣)、勿洗胃;保持呼吸道通暢、觀察意識、就醫評估。本題較適當為「保持呼吸道通暢、觀察意識」(B);溫水催吐(A,禁催吐)、牛奶中和(C,勿中和)、吐根糖漿(D,禁催吐)皆錯。本題為B。","options":{"A":"錯。腐蝕劑禁催吐(二次灼傷)。","B":"正確。保持呼吸道通暢、持續觀察意識狀態。","C":"錯。勿給牛奶中和(勿中和)。","D":"錯。腐蝕劑禁吐根糖漿催吐。"},"sources":["Nelson《兒科學》誤食腐蝕劑","勿催吐"]}},"115030-N4-6":{"quick":"懷孕30週下背痛可優先教導的運動是「骨盆搖擺運動」。","detail":{"background":"懷孕下背痛(腰椎前凸代償):骨盆搖擺/傾斜運動(pelvic tilt/rocking)可減輕腰背負擔與疼痛。本題優先為「骨盆搖擺運動」(B);骨盆底陰道收縮(凱格爾,防尿失禁非下背痛)、雙下肢抬舉(增腰負擔)、盤腿坐式(非針對下背痛)非首選。本題為B。","options":{"A":"骨盆底收縮(凱格爾)是防尿失禁非下背痛。","B":"正確。骨盆搖擺運動減輕腰背負擔。","C":"雙下肢抬舉增腰負擔。","D":"盤腿坐式非針對下背痛首選。"},"sources":["新文京《產科護理學》下背痛","骨盆搖擺"]}}},TO=["1腦膜炎與中樞神經感染", "2癲癇與熱性痙攣", "3顱內壓升高水腦症與腦室引流", "4頭部外傷與GCS", "5腦瘤", "6腦性麻痺", "7神經肌肉與神經發展疾病", "8脊柱側彎脊髓膨出成骨不全骨髓炎", "9骨折石膏與髖關節發育不良", "10母嬰產科與其他借題"],LEC={"1腦膜炎與中樞神經感染":{"html":"<p><b>腦膜炎CSF</b>:細菌性=混濁、<b>蛋白↑葡萄糖↓</b>、嗜中性球↑;病毒/無菌性=清澈、淋巴球↑、葡萄糖正常。<b>Brudzinski</b>=頸部前屈引發膝髖屈曲;<b>Kernig</b>=屈髖膝90度伸小腿有阻力。護理:抗生素≥10天、<b>減少聲光刺激</b>(畏光)、姿勢減痛。腰椎穿刺<b>側臥抱膝蝦米姿</b>、後平躺4~6小時。</p><p><b>日本腦炎</b>:三斑家蚊媒介、黃昏避外出、<b>不人傳人不需隔離</b>。腮腺炎最常見併發症=無菌性腦膜炎。</p>"},"2癲癇與熱性痙攣":{"html":"<p><b>發作護理</b>:<b>側臥、移開硬物、勿放壓舌板、勿約束、勿口對口人工呼吸</b>、觀察記錄。<b>失神性</b>=數秒凝視、無抽搐、無嗜睡。抗癲癇藥:<b>定時監測血中濃度、不可自行停藥</b>(防癲癇重積)、Dilantin牙齦增生(用生理食鹽水稀釋非葡萄糖)。</p><p><b>熱性痙攣</b>:6個月~5歲、發燒誘發、單純型全身性<15分鐘、<b>預後良好非終生服藥</b>。<b>生酮飲食</b>:高脂70~80%、低醣、限液體、酮體穩定神經傳導,用於頑固型癲癇。</p>"},"3顱內壓升高水腦症與腦室引流":{"html":"<p><b>IICP</b>:早期<b>噴射狀嘔吐</b>、晨起頭痛;晚期瞳孔放大、Cushing三徵(血壓升、心搏緩、呼吸不規則)、嬰兒囟門膨出落日眼。處置:<b>抬高床頭30度頭頸平直</b>(非頭低)、避免用力咳嗽解便、Mannitol快輸、過度換氣PaCO2降至27~30。IICP>15 mmHg。</p><p><b>V-P shunt</b>:術後觀察傷口紅腫(感染)、囟門膨出/噴射嘔吐(<b>分流阻塞=IICP再現</b>)、採對側臥避壓分流。早產兒IVH:抬高床頭、集中照護減打擾。</p>"},"4頭部外傷與GCS":{"html":"<p><b>GCS</b>=睜眼E(4-1)+語言V(5-1)+運動M(6-1),總分3~15,<b>≤8昏迷</b>。<b>去皮質僵直</b>=手臂屈曲向胸(皮質病變);<b>去大腦僵直</b>=四肢伸展內轉(中腦/腦幹,較嚴重)。頭部外傷護理:監測意識生命徵象、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS)用<b>收縮壓</b>(非舒張壓)。</p>"},"5腦瘤":{"html":"<p><b>兒童腦瘤</b>多幕下(小腦/腦幹);症狀依位置:小腦→平衡協調障礙、<b>腦幹→吞嚥說話困難</b>。術後:抬高床頭、避免用力咳嗽解便。<b>放療皮膚</b>:避免日曬、勿冰熱敷/酒精/碘酒、勿自塗乳液。心理:<b>同理陪伴、鼓勵親子分享感受共同面對</b>(非隱瞞)。</p>"},"6腦性麻痺":{"html":"<p><b>腦性麻痺(CP)</b>:腦缺氧損傷致<b>非進行性</b>運動障礙、<b>智力多正常</b>。型態:痙攣型(錐體徑路,肌張力高伸展反射增剪刀步)、失調型(小腦,平衡差)、<b>手足徐動型(基底核/錐體外,不自主扭動)</b>。</p><p><b>進食</b>:坐起身體正中、三指下顎控制法、<b>食物放舌中後方</b>(非前方/後仰)、增稠防嗆。鼓勵獨立自我照顧社交、復健併入家庭、額外熱量。主要目標=增進運動功能預防殘障加重。</p>"},"7神經肌肉與神經發展疾病":{"html":"<p><b>重症肌無力</b>:乙醯膽鹼受體抗體、<b>活動後加重休息改善</b>、眼瞼下垂/複視常為最早、避免費力活動。<b>雷氏症候群</b>:急性腦病變+肝脂肪變性、病毒感染後用<b>aspirin</b>有關、嘔吐/肝酵素升/血氨升/低血糖、兒童勿用aspirin。</p><p><b>裘馨氏肌失養(Duchenne)</b>:性聯隱性、dystrophin缺乏、近端肌無力、小腿假性肥大、Gower徵象、游泳保肌力。<b>妥瑞氏</b>:18歲前抽動(眨眼/聳肩)、智能正常。<b>自閉症</b>:社交障礙、<b>固著抗拒改變</b>。小腦=協調平衡精細動作。</p>"},"8脊柱側彎脊髓膨出成骨不全骨髓炎":{"html":"<p><b>脊髓膜膨出</b>:神經管缺損、<b>俯臥+無菌濕紗布覆蓋囊</b>、腿外展防髖脫位、監測頭圍(合併水腦頭腳同高勿頭低)。<b>脊柱側彎</b>:Cobb角評估、兩肩不等高、<b>彎腰單側突起</b>、輕度游泳/中度背架穿到骨成熟/重度脊柱融合。</p><p><b>成骨不全</b>:膠原缺陷骨脆易折、藍色鞏膜、聽力喪失、<u>不可完全固定不動</u>(廢用使骨更脆)、適度運動。<b>骨髓炎</b>:抗生素療程長、高熱量高蛋白維生素C、<b>患肢固定制動</b>(非多活動)。</p>"},"9骨折石膏與髖關節發育不良":{"html":"<p><b>石膏護理</b>:剛上溫熱、翻動使乾、<b>勿烤燈吹風機</b>(自然風乾)、癢勿伸物抓、<b>抬高患肢</b>促回流、未固定關節維持活動、5P(疼痛/蒼白/脈搏弱/感覺異常/麻痺)。</p><p><b>DDH</b>:<b>Ortolani</b>(屈曲外展滑入卡嗒)、<b>Barlow</b>(內收下壓滑出)、皮膚皺褶不對稱、<b>患側股骨短(Galeazzi)</b>、外展受限;<b>Pavlik背帶</b>(6個月內黃金期)、走路後人字形石膏。<b>鎖骨骨折</b>(產傷):擁抱反射不對稱、患側先穿後脫、勿趴睡、勿測圍巾徵象。</p>"},"10母嬰產科與其他借題":{"html":"<p><b>產科</b>:臍帶脫垂避免半坐臥(用膝胸臥);<b>葉酸第一孕期</b>預防神經管缺損(深綠蔬菜為佳);換氣過度手拱杯狀摀口鼻;硬膜外麻醉合併症胎心變異性<b>減少</b>;脊髓性頭痛平躺補水;主動脈狹窄<b>上肢血壓>下肢非發紺型</b>;懷孕後期腰椎前凸下背痛(骨盆搖擺運動)。</p><p><b>其他</b>:副甲狀腺低下=低血鈣高血磷喉痙攣(非骨鬆);誤食腐蝕劑<b>勿催吐勿中和</b>;闌尾炎Rovsing徵象;鴉片類用中重度疼痛;青少年憂鬱SSRI首選;絨毛膜取樣無法查神經管缺損。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c7_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
