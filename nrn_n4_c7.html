、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 細菌性腦膜炎CSF:外觀混濁、嗜中性白血球增加、葡萄糖減少皆正確。「蛋白質較正常減少」錯誤——細菌性腦膜炎CSF蛋白質升高(非減少;細菌破壞+發炎滲出)」。本題「錯誤」者為D。","options":{"A":"正確。外觀較正常者混濁。","B":"正確。嗜中性白血球增加。","C":"正確。葡萄糖較正常者減少。","D":"錯誤(本題答案)。蛋白質較正常者升高(非減少)。"},"sources":["Nelson《兒科學》腦膜炎","CSF"]}},"102030-N4-80":{"quick":"布魯辛斯基氏徵象(Brudzinski)是「讓兒童平躺,將其頸部迅速抬高屈曲,會引發膝及腰部的屈曲」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速抬高屈曲→引發膝及腰/髖部屈曲。本題為B;A是柯林氏(Kernig)、C是巴賓斯基(Babinski)、D是頸部後仰反射非Brudzinski。本題為B。","options":{"A":"A描述是柯林氏徵象(Kernig)。","B":"正確。Brudzinski=頸部抬高屈曲引發膝腰屈曲。","C":"C描述是巴賓斯基徵象(Babinski)。","D":"D非Brudzinski。"},"sources":["Nelson《兒科學》腦膜刺激徵","Brudzinski"]}},"103030-N4-77":{"quick":"布魯辛斯基氏徵象(Brudzinski)陽性反應是「平躺時用手托高頭部,將其頸部迅速屈曲,病童會感到疼痛,膝部因而屈曲」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 Brudzinski陽性=平躺托頭將頸部迅速屈曲→病童疼痛、膝部因而屈曲。本題為A;B是Kernig、C是Babinski、D是娃娃眼反射非Brudzinski。本題為A。","options":{"A":"正確。頸部迅速屈曲→疼痛、膝部屈曲(Brudzinski)。","B":"B是柯林氏(Kernig)。","C":"C是巴賓斯基(Babinski)。","D":"D是娃娃眼反射。"},"sources":["Nelson《兒科學》腦膜刺激徵","Brudzinski"]}},"103100-N4-57":{"quick":"腰椎穿刺前後護理正確的是「穿刺後,應讓病童抬高床頭臥床約4至6小時,以減少頭痛發生」(本題C應為監測脊髓脫出;正確項本題答C)。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 腰椎穿刺:(1)穿刺須無菌(非清潔)手套,A不精確;(2)採側臥抱膝蝦米(非俯臥),B錯;(3)「穿刺後監測脊髓脫出症狀:呼吸快、心跳慢、血壓高(腦疝/IICP)」——本題以C為正確(監測脊髓脫出徵象);(4)穿刺後平躺(非抬高床頭)4~6小時,D錯。本題為C。","options":{"A":"穿刺須無菌(非清潔)手套。","B":"錯。採側臥抱膝蝦米姿(非俯臥)。","C":"正確。穿刺後監測脊髓脫出症狀(呼吸快、心跳慢、血壓高)。","D":"錯。穿刺後應平躺(非抬高床頭)4~6小時。"},"sources":["Nelson《兒科學》腰椎穿刺","脊髓脫出"]}},"103100-N4-62":{"quick":"日本腦炎傳染預防免疫錯誤的是「不需媒介直接經過飛沫傳染或接觸患者的尿液、血液及體液而傳染」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 日本腦炎:每年流行季前注射疫苗達預防、1歲下嬰兒有母抗體黃昏仍宜避免外出、患者血液腦脊髓液不需特別隔離皆正確。「不需媒介直接飛沫/接觸體液傳染」錯誤——日本腦炎須三斑家蚊媒介傳染(不人傳人、非飛沫/接觸直接傳染)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。日本腦炎須三斑家蚊媒介(非直接飛沫/接觸傳染)。","B":"正確。流行季前注射疫苗達95%預防。","C":"正確。1歲下嬰兒黃昏仍宜避免外出。","D":"正確。患者血液腦脊髓液不需特別隔離(非人傳人)。"},"sources":["疾管署 日本腦炎","三斑家蚊"]}},"103100-N4-79":{"quick":"細菌性與無菌性腦膜炎CSF比較正確的是「細菌性腦膜炎者的蛋白質值較無菌性腦膜炎者高」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 (1)細菌性葡萄糖較低(非高),A錯;(2)「細菌性蛋白質較無菌性高」——正確;(3)細菌性外觀混濁(非清澈),C錯;(4)細菌性嗜中性白血球多(無菌性淋巴球多),D錯。本題為B。","options":{"A":"錯。細菌性葡萄糖較低(非高)。","B":"正確。細菌性蛋白質值較無菌性高。","C":"錯。細菌性外觀混濁(非清澈)。","D":"錯。細菌性嗜中性球多(無菌性淋巴球多)。"},"sources":["Nelson《兒科學》腦膜炎","CSF"]}},"105030-N4-80":{"quick":"5歲頭部創傷後合併無菌性腦膜炎,CSF不會呈現的是「葡萄糖30 mg/dL」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 無菌性(病毒性)腦膜炎CSF:壓力正常或稍升、淋巴球增加、蛋白質輕微升、葡萄糖正常(約40~70 mg/dL)。「葡萄糖30 mg/dL(偏低)」不會出現——葡萄糖降低是細菌性腦膜炎的特徵(無菌性葡萄糖正常)」。本題不會呈現者為D。","options":{"A":"會。壓力60 mmH2O(正常或稍升)。","B":"會。淋巴球100/mm3(淋巴球增加)。","C":"會。蛋白質50 mg/dL(輕微升)。","D":"本題答案(不會)。葡萄糖30 mg/dL偏低是細菌性特徵(無菌性葡萄糖正常)。"},"sources":["Nelson《兒科學》無菌性腦膜炎","葡萄糖"]}},"108020-N4-50":{"quick":"細菌性腦膜炎護理措施錯誤的是「增加環境刺激預防病童嗜睡」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 細菌性腦膜炎護理:靜脈抗生素≥10天、維持體溫正常、姿勢調整減痛皆正確。「增加環境刺激預防嗜睡」錯誤——腦膜炎病童畏光、躁動、IICP,應減少聲光刺激(安靜昏暗環境),非增加刺激」。本題「錯誤」者為C。","options":{"A":"正確。靜脈注射抗生素至少10天。","B":"正確。維持病童體溫於正常範圍。","C":"錯誤(本題答案)。應減少聲光刺激(非增加,病童畏光躁動)。","D":"正確。運用姿勢調整以減輕疼痛。"},"sources":["Nelson《兒科學》腦膜炎","減少刺激"]}},"108110-N4-79":{"quick":"8歲細菌性腦膜炎徵象正確的是「布魯金斯基氏徵象(Brudzinski)陽性」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 細菌性腦膜炎腦膜刺激徵陽性:Brudzinski陽性、Kernig陽性、角弓反張。本題正確為「Brudzinski陽性」(B);巴氏徵象陰性(A,Barlow是髖關節非腦膜炎)、Kernig陰性(C錯,應陽性)、反彈痛(D是腹膜炎非腦膜炎)。本題為B。","options":{"A":"巴羅徵象(Barlow)是髖關節(非腦膜炎)。","B":"正確。Brudzinski陽性(腦膜刺激徵)。","C":"錯。Kernig應陽性(非陰性)。","D":"反彈痛是腹膜炎(非腦膜炎)。"},"sources":["Nelson《兒科學》腦膜炎","Brudzinski"]}},"108110-N4-80":{"quick":"腰椎穿刺錯誤的是「採俯臥平躺,以利穿刺針頭插入,避免傷害」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 腰椎穿刺:可做檢查/診斷/治療途徑、穿刺後觀察中樞感染脊髓脫出、平躺4~6小時避免頭痛皆正確。「採俯臥平躺」錯誤——腰椎穿刺應採側臥抱膝蝦米姿(脊柱前彎使椎間隙張開),非俯臥」。本題「錯誤」者為B。","options":{"A":"正確。可做為檢查、診斷或治療途徑。","B":"錯誤(本題答案)。應採側臥抱膝蝦米姿(非俯臥)。","C":"正確。穿刺後觀察中樞感染、脊髓脫出。","D":"正確。穿刺後平躺4~6小時避免頭痛。"},"sources":["Nelson《兒科學》腰椎穿刺","側臥"]}},"109110-N4-79":{"quick":"柯林氏徵象(Kernig)正確做法是「使平躺將小腿托高,使髖及膝關節屈曲成直角,再伸展小腿會產生阻力或疼痛」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 柯林氏徵象(Kernig)=平躺將髖及膝關節屈曲成直角(90度)→再伸展小腿→產生阻力或疼痛。本題為D;A是Babinski、B是Brudzinski、C是步態測試非Kernig。本題為D。","options":{"A":"A是巴賓斯基(Babinski)。","B":"B是布魯辛斯基(Brudzinski)。","C":"C是步態測試。","D":"正確。髖膝屈曲90度再伸展小腿有阻力/疼痛(Kernig)。"},"sources":["Nelson《兒科學》腦膜刺激徵","Kernig"]}},"110030-N4-65":{"quick":"病毒性腦膜炎護理措施錯誤的是「大多數病童會出現神經系統障礙的後遺症」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 病毒性腦膜炎:採支持/症狀治療、持續監測生命徵象、合併細菌感染才給抗生素皆正確。「大多數出現神經後遺症」錯誤——病毒性腦膜炎預後良好,大多無神經後遺症(與細菌性不同;細菌性才易後遺症)」。本題「錯誤」者為B。","options":{"A":"正確。採支持性療法或症狀治療。","B":"錯誤(本題答案)。病毒性腦膜炎大多無神經後遺症(預後良好)。","C":"正確。持續監測生命徵象。","D":"正確。合併細菌感染才給抗生素。"},"sources":["Nelson《兒科學》病毒性腦膜炎","預後"]}},"112110-N4-58":{"quick":"6歲三斑家蚊叮咬後發燒頭痛痙攣頸僵(日本腦炎)CSF正確的是「蛋白質上升」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 日本腦炎(病毒性腦炎)CSF:蛋白質上升、淋巴球增加、葡萄糖正常(非下降)、壓力升、外觀清/微濁。本題正確為「蛋白質上升」(A);血小板下降(B非CSF項目)、球蛋白陰性(C錯)、葡萄糖下降(D錯,病毒性葡萄糖正常)。本題為A。","options":{"A":"正確。日本腦炎CSF蛋白質上升。","B":"血小板是血液項目(非CSF)。","C":"錯。球蛋白反應多陽性。","D":"錯。病毒性葡萄糖正常(非下降;下降是細菌性)。"},"sources":["疾管署 日本腦炎","CSF"]}},"112180-N4-50":{"quick":"無菌性腦膜炎(aseptic meningitis)CSF正確的是「腦脊髓壓力正常或稍上升」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 無菌性(病毒性)腦膜炎CSF:(1)外觀清澈(非白濁濃稠),A錯;(2)蛋白質輕微升(非大幅下降),B錯;(3)「壓力正常或稍上升」——正確;(4)葡萄糖正常(非大幅上升),D錯。本題為C。","options":{"A":"錯。無菌性外觀清澈(非白濁濃稠;白濁是細菌性)。","B":"錯。蛋白質輕微升(非大幅下降)。","C":"正確。腦脊髓壓力正常或稍上升。","D":"錯。葡萄糖正常(非大幅上升)。"},"sources":["Nelson《兒科學》無菌性腦膜炎","CSF"]}},"113100-N4-37":{"quick":"日本腦炎症狀與處置錯誤的是「預防感染需要隔離病患的血液和分泌物」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 日本腦炎:三斑家蚊媒介、黃昏避免戶外防病媒蚊、前驅期頭痛倦怠皆正確。「需隔離血液和分泌物」錯誤——日本腦炎不人傳人(須蚊媒),不需隔離病患血液分泌物」。本題「錯誤」者為C。","options":{"A":"正確。傳播媒介以三斑家蚊為主。","B":"正確。黃昏避免至戶外防病媒蚊叮咬。","C":"錯誤(本題答案)。日本腦炎不人傳人,不需隔離血液分泌物。","D":"正確。前驅期出現頭痛、倦怠。"},"sources":["疾管署 日本腦炎","不隔離"]}},"114030-N4-48":{"quick":"9歲病毒性腦膜炎症狀和治療錯誤的是「最主要的治療是儘早給與抗生素」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 病毒性腦膜炎:多由腸病毒及腮腺炎病毒引起、CSF外觀清澈、少有神經後遺症皆正確。「最主要治療儘早抗生素」錯誤——病毒性腦膜炎抗生素無效,主要支持/症狀治療(抗生素只用於細菌性或合併細菌感染)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。病毒性腦膜炎抗生素無效,主要支持療法。","B":"正確。大部分由腸病毒及腮腺炎病毒引起。","C":"正確。腦脊髓液外觀通常清澈。","D":"正確。少有神經功能障礙後遺症。"},"sources":["Nelson《兒科學》病毒性腦膜炎","支持療法"]}},"114170-N4-49":{"quick":"15個月疑似腦膜炎最適當的是「細菌性腦膜炎之脊髓液中蛋白質值明顯升高」。","detail":{"background":"腦膜炎(meningitis)腦脊髓液(CSF)比較:細菌性外觀混濁、蛋白質升高、葡萄糖降低、嗜中性白血球增加、壓力升;病毒/無菌性外觀清澈、蛋白質輕微升、葡萄糖正常、淋巴球為主、壓力正常或稍升。腦膜刺激徵:布魯辛斯基徵象(Brudzinski)=平躺將頸部迅速前屈→膝/髖不自主屈曲;柯林氏徵象(Kernig)=平躺將髖膝屈曲90度→伸直小腿有阻力/疼痛;角弓反張(opisthotonos)。護理:細菌性靜脈抗生素≥10天、維持體溫、減少聲光刺激(非增加;畏光/躁動)、姿勢調整減痛。腰椎穿刺(LP):採側臥抱膝蝦米姿(非俯臥)、無菌技術、穿刺後平躺4~6小時減頭痛、觀察呼吸快心跳慢血壓高(脊髓脫出/腦疝)。日本腦炎:三斑家蚊媒介(黃昏避外出)、不人傳人/不需隔離血液分泌物、有疫苗。腮腺炎(mumps)最常見併發症=無菌性腦膜炎。 (1)「細菌性腦膜炎CSF蛋白質明顯升高」——正確;(2)病毒性葡萄糖正常(非明顯升高),B錯;(3)細菌性症狀重、病程急(非輕),C錯;(4)Kernig等腦膜刺激徵嬰幼兒不一定明顯(月齡小可能不典型),D不一定。本題為A。","options":{"A":"正確。細菌性腦膜炎CSF蛋白質明顯升高。","B":"錯。病毒性葡萄糖正常(非明顯升高)。","C":"錯。細菌性症狀重、病程急(非輕)。","D":"嬰幼兒Kernig不一定明顯。"},"sources":["Nelson《兒科學》腦膜炎","蛋白質"]}},"101030-N4-78":{"quick":"癲癇兒童生酮飲食中比例需高達70~80%的成分是「脂肪」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 生酮飲食:脂肪佔70~80%(高脂、低醣、適量蛋白)→產生酮體穩定神經傳導達抗癲癇。本題為「脂肪」(A);蛋白質適量、醣類低、纖維質非70~80%。本題為A。","options":{"A":"正確。生酮飲食脂肪佔70~80%。","B":"蛋白質適量(非70~80%)。","C":"醣類須低(非高)。","D":"纖維質非主要比例。"},"sources":["Nelson《兒科學》生酮飲食","脂肪"]}},"101110-N4-22":{"quick":"失神性發作(absence seizure)正確的是「發作時,會有數秒鐘動作停止」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 失神性發作:數秒動作停止(發呆/凝視/作白日夢)、無抽搐/跌倒、無尿失禁、發作後無嗜睡(立即恢復)。本題正確為「數秒動作停止」(A);臉部半邊抽搐(B是局部發作)、尿失禁(C是全身性)、發作後嗜睡(D是全身性)非失神性。本題為A。","options":{"A":"正確。失神性發作有數秒鐘動作停止(凝視)。","B":"臉部半邊抽搐是局部發作。","C":"尿失禁是全身性發作。","D":"發作後嗜睡是全身性發作(失神性無嗜睡)。"},"sources":["Nelson《兒科學》失神性發作","凝視"]}},"102030-N4-49":{"quick":"小學二年級教室內全身性發作癲癇最適當處置是「移除小玲身旁的桌椅與尖銳物,以避免撞傷」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 全身性發作處置:移除身旁桌椅/尖銳硬物防撞傷、側臥、勿放壓舌板、勿約束。本題最適當為「移除桌椅尖銳物避免撞傷」(C);課本墊頭(A,不宜墊高頭)、抱緊/包裹(D,勿約束)、頭部擺正(B,應側臥)非最適當。本題為C。","options":{"A":"不宜用課本墊高頭部。","B":"應協助側臥(非僅擺正)。","C":"正確。移除桌椅與尖銳物避免撞傷。","D":"錯。勿抱緊/包裹約束。"},"sources":["Nelson《兒科學》癲癇發作","移除硬物"]}},"102030-N4-77":{"quick":"靜脈注射Dilantin(癲能停)控制癲癇錯誤的是「Dilantin需以5%葡萄糖的靜脈輸液稀釋」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 Dilantin:定期查血中濃度、副作用牙齦增生、不可驟停防癲癇重積皆正確。「以5%葡萄糖稀釋」錯誤——Dilantin(phenytoin)須以生理食鹽水(N/S)稀釋,葡萄糖會使藥物沈澱/結晶」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。Dilantin須以生理食鹽水稀釋(葡萄糖會沈澱)。","B":"正確。應定期檢查血中Dilantin濃度。","C":"正確。常見副作用為牙齦增生。","D":"正確。不可驟然停用,防癲癇重積發作。"},"sources":["藥理 phenytoin","生理食鹽水"]}},"104030-N4-80":{"quick":"失神性癲癇發作日常照護錯誤的是「教導其記錄發作次數,以自行調整藥量」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 失神性癲癇照護:可參加體育課打球跑步、提醒老師勿責怪失神、發作時喪失意識給安全保護皆正確。「自行調整藥量」錯誤——抗癲癇藥須遵醫囑,不可自行調整/停藥(致癲癇重積);記錄發作是提供醫師調整參考」。本題「錯誤」者為D。","options":{"A":"正確。可參加學校體育課打球、跑步。","B":"正確。提醒老師勿責怪其失神、作白日夢。","C":"正確。發作喪失意識給予安全保護。","D":"錯誤(本題答案)。不可自行調整藥量(須遵醫囑)。"},"sources":["Nelson《兒科學》癲癇","遵醫囑"]}},"105030-N4-78":{"quick":"學齡兒童癲癇護理指導中運動較不適當的是「騎腳踏車」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 癲癇兒童運動安全:可打羽毛球、操場跑步、游泳須有人陪/救生衣。「騎腳踏車」較不適當——發作時若騎腳踏車可能跌倒/車禍嚴重撞傷(失去意識無法控制車輛)。本題較不適當者為A。","options":{"A":"較不適當(本題答案)。騎腳踏車發作時易跌倒/車禍。","B":"適當。著救生衣游泳(有保護)。","C":"適當。打羽毛球。","D":"適當。在操場跑步。"},"sources":["Nelson《兒科學》癲癇","運動安全"]}},"105090-N4-78":{"quick":"強直陣攣型癲癇在學校發作照護錯誤的是「立即進行口對口人工呼吸,以避免缺氧」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 強直陣攣發作照護:側臥利分泌物流出、疏散人潮維持通風、移除堅硬尖銳物皆正確。「立即口對口人工呼吸」錯誤——癲癇發作短暫自限,不需口對口人工呼吸(發作中牙關緊閉亦無法執行;觀察記錄即可)」。本題「錯誤」者為D。","options":{"A":"正確。協助側臥利口鼻分泌物流出。","B":"正確。疏散圍觀人潮維持通風。","C":"正確。移除身旁堅硬尖銳物。","D":"錯誤(本題答案)。不需口對口人工呼吸(發作短暫自限)。"},"sources":["Nelson《兒科學》癲癇發作","人工呼吸"]}},"106030-N4-80":{"quick":"1歲單純性熱性痙攣媽媽問是否再發作,較適當回答是「小玲的痙攣與發燒有關,只要避免其發燒,就較不會發作」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 熱性痙攣:發燒誘發(體溫驟升),控制發燒可減少發作。本題較適當為「與發燒有關,避免發燒就較不會發作」(A);與年齡(B,雖隨年齡漸少但非「>2歲就不會」)、腦波(C,腦波正常不保證不發作)、缺氧(D,非缺氧)皆不精確。本題為A。","options":{"A":"正確。熱性痙攣與發燒有關,控制發燒可減少發作。","B":"與年齡有關但非「>2歲就不會」。","C":"腦波正常不保證不發作。","D":"熱性痙攣非缺氧引起。"},"sources":["Nelson《兒科學》熱性痙攣","發燒"]}},"107110-N4-50":{"quick":"10個月中耳炎合併熱性痙攣護理措施正確的是「小珊發作後有嗜睡情形,故應協助其適當休息」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 (1)退燒控制體溫(非只控制於38度;應更積極降溫防再發),A不精確;(2)「發作後嗜睡協助適當休息」——正確;(3)單純性熱性痙攣非終生服藥,C錯;(4)仍須床欄護墊防發作受傷(非不必),D錯。本題為B。","options":{"A":"退燒應更積極降溫(非只控於38度)。","B":"正確。發作後嗜睡應協助適當休息。","C":"錯。單純性熱性痙攣非終生服藥。","D":"錯。仍須床欄護墊防受傷。"},"sources":["Nelson《兒科學》熱性痙攣","休息"]}},"108020-N4-51":{"quick":"10歲癲癇口服phenobarbital護理指導正確的是「定時帶大華回診抽血,監測血中藥物濃度」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 (1)「定時回診抽血監測血中藥物濃度」——正確;(2)phenobarbital尿不會變紅棕(變紅棕是其他藥如rifampin),B錯;(3)發作控制也不可停藥,C錯;(4)癲癇與低血糖無直接關係,不需發作後進食高碳水,D錯。本題為A。","options":{"A":"正確。定時回診抽血監測血中藥物濃度。","B":"錯。phenobarbital不會使尿變紅棕。","C":"錯。服藥6週未發作仍不可停藥。","D":"錯。癲癇與低血糖無關,不需發作後進食高碳水。"},"sources":["藥理 phenobarbital","血中濃度"]}},"109110-N4-77":{"quick":"長期服用抗癲癇藥物護理措施錯誤的是「需與牛奶一起服用,避免吸收不良」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 抗癲癇藥:定時回診監測血中濃度、發作頻率降低也不可自行停藥、phenytoin副作用牙齦增生皆正確。「與牛奶一起服用」錯誤——某些抗癲癇藥(如phenytoin)不宜與牛奶/制酸劑同服(影響吸收)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。某些抗癲癇藥不宜與牛奶同服(影響吸收)。","B":"正確。定時回診監測血中藥物濃度。","C":"正確。即使發作頻率降低也不可自行停藥。","D":"正確。phenytoin常見副作用是牙齦增生。"},"sources":["藥理 抗癲癇藥","牛奶"]}},"110110-N4-79":{"quick":"強直陣攣型痙攣發作護理措施最不適當的是「壓額抬下巴,通暢呼吸道」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 強直陣攣發作:移開損傷物品、勿強放壓舌板、觀察記錄發作型態時間皆適當。「壓額抬下巴通暢呼吸道」最不適當——發作時牙關緊閉、肌肉強直,不應強行壓額抬下巴/扳開口腔(易傷牙/下顎;發作後再側臥清分泌物)」。本題最不適當者為A。","options":{"A":"最不適當(本題答案)。發作中勿強行壓額抬下巴扳口腔(易傷牙顎)。","B":"適當。移開可能造成損傷的物品。","C":"適當。勿強行放置壓舌板於口內。","D":"適當。觀察並記錄發作型態與時間。"},"sources":["Nelson《兒科學》癲癇發作","勿扳口"]}},"110110-N4-80":{"quick":"8個月熱性痙攣最適當的是「發作時呈現全身性或局部性痙攣型態」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 (1)熱性痙攣多不續發為癲癇(少數才轉),A錯;(2)「發作呈全身性或局部性痙攣型態」——正確;(3)單純型痙攣<15分鐘(非>1小時),C錯;(4)熱性痙攣少後遺症(非常偏癱/智障),D錯。本題為B。","options":{"A":"錯。熱性痙攣多不續發為癲癇(少數才轉)。","B":"正確。發作呈全身性或局部性痙攣型態。","C":"錯。單純型<15分鐘(非>1小時)。","D":"錯。熱性痙攣少後遺症(非常偏癱/智障)。"},"sources":["Nelson《兒科學》熱性痙攣","型態"]}},"111110-N4-70":{"quick":"11個月單純性熱性痙攣護理措施錯誤的是「教導家屬終生服用抗痙攣藥物的重要性」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 單純性熱性痙攣:發作側臥維持呼吸道、床欄護墊、停止發燒約一週後做腦電波皆正確(或適當)。「終生服用抗痙攣藥物」錯誤——單純性熱性痙攣預後良好,不需終生服抗痙攣藥(以控制發燒為主)」。本題「錯誤」者為B。","options":{"A":"正確。發作時協助側臥維持呼吸道通暢。","B":"錯誤(本題答案)。單純性熱性痙攣不需終生服抗痙攣藥。","C":"正確。提供床欄護墊使用。","D":"正確。通常停止發燒後才執行腦電波檢查。"},"sources":["Nelson《兒科學》熱性痙攣","非終生服藥"]}},"111110-N4-78":{"quick":"7歲癲癇長期服Phenytoin及Valproic acid藥物護理錯誤的是「當疾病發作被控制時,可暫停服用藥物以降低副作用」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 抗癲癇藥:定時返院監測血中濃度、Dilantin牙齦增生須口腔護理、定時服藥維持正常生活皆正確。「發作被控制暫停服藥」錯誤——發作控制仍不可暫停/自行停藥(驟停致癲癇重積發作)」。本題「錯誤」者為B。","options":{"A":"正確。定時返院監測血中藥物濃度。","B":"錯誤(本題答案)。發作控制仍不可暫停服藥(驟停致癲癇重積)。","C":"正確。Dilantin易牙齦增生須口腔護理。","D":"正確。鼓勵維持正常生活習慣預防發作。"},"sources":["藥理 抗癲癇藥","勿停藥"]}},"113030-N4-37":{"quick":"腮腺炎(mumps)最常見的合併症是「無菌性腦膜炎」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 腮腺炎(mumps,流行性腮腺炎)最常見合併症是無菌性腦膜炎(病毒侵犯腦膜)(其他併發症睪丸炎/卵巢炎/胰臟炎/耳聾)。本題為「無菌性腦膜炎」(A);肺炎、熱性痙攣、續發性皮膚感染非腮腺炎最常見併發症。本題為A。","options":{"A":"正確。腮腺炎最常見併發症是無菌性腦膜炎。","B":"肺炎非腮腺炎最常見併發症。","C":"熱性痙攣非腮腺炎併發症。","D":"續發性皮膚感染非腮腺炎併發症。"},"sources":["Nelson《兒科學》腮腺炎","無菌性腦膜炎"]}},"113030-N4-50":{"quick":"熱性痙攣(febrile convulsion)最不適當的是「發燒介於37~38°C之間,且出現單側性的全身性僵直」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 熱性痙攣:是幼兒抽筋最常見原因之一、發燒(感染如上呼吸道)為誘發、發作牙關緊閉勿強扳皆適當。「發燒37~38°C出現單側性的全身性僵直」最不適當——熱性痙攣多體溫驟升>38.5~39°C時發作,且單純型為雙側全身性(非「37~38度單側」之矛盾描述)」。本題最不適當者為A。","options":{"A":"最不適當(本題答案)。熱性痙攣多>38.5°C發作、單純型為雙側全身性(非「37~38度單側」)。","B":"適當。是引起幼兒抽筋/痙攣最常見原因之一。","C":"適當。發燒是誘發,基礎為感染(如上呼吸道)。","D":"適當。發作牙關緊閉不可強行打開。"},"sources":["Nelson《兒科學》熱性痙攣","體溫"]}},"113100-N4-50":{"quick":"癲癇兒童生酮飲食療法正確的是「酮(ketones)可製造較多的穩定性神經傳導物質,具有鎮定效果」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 (1)生酮飲食高脂肪+低蛋白(適量)+低醣(非高蛋白),A不精確;(2)須限制液體(非增加;過多液體稀釋酮),B錯;(3)「酮體製造穩定性神經傳導物質鎮定效果」——正確;(4)多用於藥效不佳/頑固型癲癇(非藥效良好),D錯。本題為C。","options":{"A":"生酮是高脂肪、適量蛋白、低醣(非高蛋白)。","B":"錯。須限制液體(非增加)。","C":"正確。酮體製造穩定性神經傳導物質,具鎮定效果。","D":"錯。多用於藥效不佳/頑固型癲癇(非藥效良好)。"},"sources":["Nelson《兒科學》生酮飲食","酮體"]}},"113180-N4-49":{"quick":"10歲頑固型癲癇生酮飲食治療正確的是「高脂肪、低醣類」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 生酮飲食:高脂肪(70~80%)、低醣類、適量蛋白。本題正確為「高脂肪、低醣類」(B);高蛋白低醣(A錯,蛋白適量)、高醣高蛋白(C錯)、高纖低脂(D錯)。本題為B。","options":{"A":"錯。蛋白適量(非高蛋白)。","B":"正確。生酮飲食高脂肪、低醣類。","C":"錯。醣類須低(非高)。","D":"錯。脂肪須高(非低)。"},"sources":["Nelson《兒科學》生酮飲食","高脂低醣"]}},"114100-N4-40":{"quick":"6個月熱性痙攣全身抽搐再發作處置最適當的是「協助採側臥姿勢,以利口腔分泌物流出」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 熱性痙攣發作處置:側臥利口腔分泌物流出防吸入、移除硬物、勿約束、勿口對口人工呼吸、勿發作後立即餵藥。本題最適當為「側臥利分泌物流出」(A);口對口人工呼吸(B不需)、發作後立即餵藥(C,發作中無法餵)、約束肢體(D,勿約束)非適當。本題為A。","options":{"A":"正確。協助側臥利口腔分泌物流出。","B":"錯。不需口對口人工呼吸。","C":"錯。發作後不宜立即餵抗痙攣藥(無法吞)。","D":"錯。勿約束肢體。"},"sources":["Nelson《兒科學》熱性痙攣","側臥"]}},"115030-N4-48":{"quick":"8歲癲癇照護錯誤的是「生酮飲食治療主要以低脂肪為主,對穩定神經傳導物質有幫助」。","detail":{"background":"癲癇/痙攣護理:發作時側臥(利分泌物流出)、移開尖銳硬物防撞傷、勿強行放壓舌板/扳開牙關、勿約束肢體、勿口對口人工呼吸(發作短暫;觀察記錄型態時間)。失神性發作(absence):數秒動作停止發呆/作白日夢、無跌倒/抽搐、發作後無嗜睡,可正常活動(游泳須有人陪/救生衣)。強直陣攣(tonic-clonic):側臥、移除硬物、勿放壓舌板。抗癲癇藥:定時回診監測血中藥物濃度、發作控制也不可自行停藥(驟停致癲癇重積)、phenytoin(Dilantin)副作用牙齦增生須口腔護理;Dilantin靜脈須生理食鹽水稀釋(非葡萄糖,會沈澱)、不與牛奶同服。熱性痙攣(febrile convulsion):6個月~5歲、發燒誘發(體溫驟升)、單純型全身性<15分鐘、預後良好少後遺症/少轉癲癇、非終生服藥;發作側臥、退燒、床欄護墊。生酮飲食:高脂肪(70~80%)、低醣、適量蛋白、酮體穩定神經傳導鎮定、用於頑固型/藥效不佳癲癇。腮腺炎最常見併發症=無菌性腦膜炎。 癲癇照護:突然停藥致癲癇重積、Dilantin須口腔衛生、Depakine定期監測血中濃度皆正確。「生酮飲食以低脂肪為主」錯誤——生酮飲食是高脂肪(70~80%)、低醣(非低脂)」。本題「錯誤」者為C。","options":{"A":"正確。突然停抗癲癇藥易致癲癇重積。","B":"正確。服Dilantin須注意口腔衛生(牙齦增生)。","C":"錯誤(本題答案)。生酮飲食是高脂肪(非低脂)。","D":"正確。服Depakine期間定期監測血中藥物濃度。"},"sources":["Nelson《兒科學》生酮飲食","高脂"]}},"102030-N4-79":{"quick":"10歲急性水腦症腦室外引流術後護理不恰當的是「引流時,協助小丁採頭部下垂姿勢,以利引流」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 腦室外引流術後:監測IICP症狀、觀察意識瞳孔放大、避免快速坐起防CSF迅速減少皆恰當。「採頭部下垂姿勢利引流」不恰當——腦室外引流勿頭部下垂(會使CSF引流過快致低顱壓/出血;應床頭抬高至規定高度)」。本題不恰當者為C。","options":{"A":"恰當。監測生命徵象及IICP症狀。","B":"恰當。觀察意識改變、瞳孔放大。","C":"不恰當(本題答案)。勿頭部下垂(引流過快致低顱壓)。","D":"恰當。避免快速坐起防CSF迅速減少。"},"sources":["Nelson《兒科學》腦室外引流","勿頭低"]}},"102110-N4-76":{"quick":"學齡兒童顱內壓增高早期徵候是「噴射狀嘔吐」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 IICP早期徵候:噴射狀嘔吐、頭痛(晨起)、躁動。「噴射狀嘔吐」是早期徵候(C);去大腦皮質姿勢(A晚期)、瞳孔放大(B晚期)、落日眼(D晚期/嬰兒)為晚期徵候。本題早期徵候為C。","options":{"A":"去大腦皮質姿勢是晚期徵候。","B":"瞳孔放大是晚期徵候。","C":"正確。噴射狀嘔吐是IICP早期徵候。","D":"落日眼是晚期/嬰兒徵候。"},"sources":["Nelson《兒科學》IICP","早期"]}},"103030-N4-52":{"quick":"預防早產兒IICP造成顱內出血護理不適當的是「靜脈輸入低張溶液,補充體液時,需快速輸注」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 早產兒IICP/顱內出血預防:疼痛治療後安撫減哭泣、避免突然轉頭、隨需求調氧維持適當氧濃度皆適當。「靜脈輸低張溶液快速輸注」不適當——快速輸注+低張液會使腦血流波動增加顱內出血風險(應緩慢輸注、避免血壓/血流劇烈波動)」。本題不適當者為D。","options":{"A":"適當。疼痛治療後安撫減少哭泣不安。","B":"適當。避免突然將頭轉向一側而身體未隨之轉動。","C":"適當。隨需求調整給氧濃度維持適當氧濃度。","D":"不適當(本題答案)。快速輸注低張液增腦血流波動/出血風險。"},"sources":["Nelson《兒科學》早產兒IVH","緩慢輸注"]}},"103030-N4-76":{"quick":"6個月水腦症置V-P shunt出院護理指導不適當的是「教導父母協助小蘭採右側臥,以利引流」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 V-P shunt出院:觀察傷口紅腫、觀察前囟門膨出、同一人測頭圍皆適當。「採右側臥利引流」不適當——V-P shunt置於右側,應避免壓分流側(採手術對側或平躺;且早期勿使引流過快)」。本題不適當者為D。","options":{"A":"適當。觀察傷口周圍是否有紅腫。","B":"適當。觀察前囟門是否膨出(IICP)。","C":"適當。每日由同一人測量頭圍。","D":"不適當(本題答案)。分流側(右)應避免受壓,採對側或平躺。"},"sources":["Nelson《兒科學》V-P shunt","避壓分流側"]}},"104100-N4-68":{"quick":"5歲腦膜炎引起IICP,不會出現的臨床徵象是「落日眼」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 IICP徵象:心跳過慢(Cushing三徵)、頭痛、噴射狀嘔吐皆會出現。「落日眼(落日徵象)」不會出現於5歲兒童——落日眼是嬰兒水腦症的特徵(囟門未閉、眼球下移);學齡兒顱縫已閉合,不會出現落日眼」。本題不會出現者為D。","options":{"A":"會。心跳過慢(Cushing三徵)。","B":"會。頭痛。","C":"會。噴射式嘔吐。","D":"本題答案(不會)。落日眼是嬰兒水腦症特徵(5歲顱縫已閉不會出現)。"},"sources":["Nelson《兒科學》IICP","落日眼"]}},"106110-N4-77":{"quick":"水腦病嬰V-P shunt術後護理正確的是「觀察是否有噴射狀嘔吐或尖銳哭聲的發生」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 (1)頭圍測量自眉間繞枕骨最突出處(非枕部經耳垂至額頭上方),A不精確;(2)「觀察噴射狀嘔吐或尖銳哭聲(分流阻塞/IICP再現)」——正確;(3)採手術對側臥(非水平俯臥壓傷口),C錯;(4)可抱起餵奶(非避免;但動作輕緩勿引流過快),D錯。本題為B。","options":{"A":"頭圍測量自眉間繞枕骨最突出處(敘述不精確)。","B":"正確。觀察噴射狀嘔吐或尖銳哭聲(分流阻塞/IICP)。","C":"錯。採手術對側臥(非水平俯臥壓傷口)。","D":"錯。可抱起餵奶(動作輕緩)。"},"sources":["Nelson《兒科學》V-P shunt","阻塞徵象"]}},"108020-N4-80":{"quick":"4個月水腦V-P shunt術後護理錯誤的是「觀察引流管阻塞徵象是周圍皮膚出現紅、腫、熱」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 V-P shunt術後:記錄頭圍觸診前囟門膨出、觀察意識IICP徵象、植入處勿碰撞保持乾燥皆正確。「引流管阻塞徵象是周圍皮膚紅腫熱」錯誤——分流阻塞的徵象是IICP再現(前囟門膨出、噴射嘔吐、嗜睡、頭圍增);周圍皮膚紅腫熱是感染徵象(非阻塞)」。本題「錯誤」者為D。","options":{"A":"正確。記錄頭圍變化、觸診前囟門膨出。","B":"正確。觀察意識狀態及IICP徵象。","C":"正確。植入引流管處勿碰撞擠壓、保持乾燥。","D":"錯誤(本題答案)。皮膚紅腫熱是感染徵象(阻塞徵象是IICP再現)。"},"sources":["Nelson《兒科學》V-P shunt","阻塞vs感染"]}},"108110-N4-62":{"quick":"30週早產兒腦室內出血(IVH)護理措施錯誤的是「限制家屬探訪,避免造成感染」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 早產兒IVH:抬高床頭15~20度減IICP、密切監測出血(血壓降血比容下降)、觀察囟門膨出頭圍增IICP皆正確。「限制家屬探訪避免感染」錯誤——早產兒IVH護理不以限制探訪為重點(反鼓勵親子依附;感染控制靠手衛生無菌技術非限制探訪)」。本題「錯誤」者為D。","options":{"A":"正確。抬高床頭15~20度減少IICP。","B":"正確。密切監測出血徵狀(血壓降、血比容下降)。","C":"正確。觀察囟門膨出、頭圍增加等IICP現象。","D":"錯誤(本題答案)。不以限制探訪為重點(鼓勵親子依附;感染靠手衛生)。"},"sources":["Nelson《兒科學》IVH","探訪"]}},"109030-N4-52":{"quick":"2歲水腦V-P shunt術後第5天哭鬧不喝奶、體溫38.2°C,需優先執行的是「感染評估」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 V-P shunt術後第5天發燒38.2°C+哭鬧不喝奶→最須警覺分流感染(術後常見併發症,1~2個月內發生)。本題優先為「感染評估」(C);疼痛、意識、營養評估在感染評估之後。本題為C。","options":{"A":"疼痛評估非最優先。","B":"意識評估在感染評估之後。","C":"正確。術後發燒須優先評估分流感染。","D":"營養評估非最優先。"},"sources":["Nelson《兒科學》V-P shunt","感染"]}},"109030-N4-54":{"quick":"病童腰椎穿刺護理措施不恰當的是「穿刺時協助病童採半側臥、頭高腳低的舒適臥位」。","detail":{"background":"腰椎穿刺:穿刺前評估IICP徵象(IICP時禁穿,防腦疝)、穿刺前後監測脊髓脫出、穿刺後平躺減頭痛皆恰當。「穿刺時採半側臥、頭高腳低」不恰當——腰椎穿刺應側臥抱膝蝦米姿(頭屈向膝、脊柱前彎使椎間隙張開),非頭高腳低」。本題不恰當者為B。","options":{"A":"恰當。穿刺前評估有無IICP徵象(IICP禁穿防腦疝)。","B":"不恰當(本題答案)。應側臥抱膝蝦米姿(非頭高腳低)。","C":"恰當。穿刺前後監測脊髓脫出症狀。","D":"恰當。穿刺後教導平躺減頭痛及穿刺部位出血。"},"sources":["Nelson《兒科學》腰椎穿刺","蝦米姿"]}},"110110-N4-78":{"quick":"3歲V-P shunt感染移除接受腦室外引流(EVD)術後護理正確的是「此裝置可配合測量顱內壓」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 腦室外引流(EVD):(1)以外耳道/眼高度為壓力零點(可微調床頭;非嚴禁抬高),A不精確;(2)「EVD可配合測量顱內壓(ICP)」——正確;(3)EVD可關閉(移動病人/採檢時須關閉),C錯;(4)引流至密閉或半開放無菌收集系統(須無菌),D「半開放」描述本題以B為答。本題為B。","options":{"A":"EVD以外耳道/眼高度為壓力零點(非嚴禁抬高床頭)。","B":"正確。EVD可配合測量顱內壓。","C":"錯。EVD可關閉(移動病人時)。","D":"引流至無菌密閉/半開放系統(本題以B為答)。"},"sources":["Nelson《兒科學》EVD","測ICP"]}},"112030-N4-79":{"quick":"早產兒腦室內出血護理處置最適當的是「採取集中照護,減少不必要的打擾」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 早產兒IVH:(1)抬高床頭約15~30度(45度過高;但主要重點),A欠精確;(2)「採集中照護減少不必要打擾(減刺激/血流波動)」——正確;(3)減少聲光刺激(非增加),C錯;(4)高張藥/溶液須謹慎(非常規大量減腦血流),D錯。本題為B。","options":{"A":"抬高床頭約15~30度(45度過高)。","B":"正確。採集中照護減少不必要的打擾。","C":"錯。應減少聲光刺激(非增加)。","D":"錯。高張藥物須謹慎(非常規減腦血流)。"},"sources":["Nelson《兒科學》IVH","集中照護"]}},"112110-N4-80":{"quick":"3歲腦膜炎導致IICP,不會出現的臨床徵象是「前囟門鼓脹或膨出」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 IICP徵象:躁動不安、發燒、嘔吐皆會出現。「前囟門鼓脹/膨出」不會出現於3歲兒童——前囟門約12~18個月閉合,3歲囟門已閉合,無法以前囟門膨出評IICP」。本題不會出現者為A。","options":{"A":"本題答案(不會)。3歲前囟門已閉合,無法膨出。","B":"會。躁動不安。","C":"會。發燒。","D":"會。嘔吐。"},"sources":["Nelson《兒科學》IICP","囟門"]}},"112180-N4-49":{"quick":"兒童IICP臨床表徵及處置錯誤的是「給與全速靜脈輸注Mannitol」(本題D應為錯誤?實際Mannitol快速輸注是正確;本題答D)。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 本題問錯誤,答案D。IICP:晨起頭痛噴射嘔吐、Cushing三徵(呼吸不規則心搏緩血壓升)、>15 mmHg為升高皆正確。「給與全速靜脈輸注Mannitol」——依官方判D為錯誤:Mannitol雖須快速/限時輸注(約15~30分鐘)達脫水降IICP,但「全速(全開)」的過度快速輸注描述不適當(須依規定速率/限時、經過濾器、監測電解質)。本題「錯誤」者為D。","options":{"A":"正確。早上起床發生頭痛及噴射狀嘔吐。","B":"正確。呼吸不規則、心搏過緩、血壓升高(Cushing三徵)。","C":"正確。顱內壓>15 mmHg稱為IICP。","D":"錯誤(本題答案)。Mannitol須依規定速率/限時輸注(非「全速全開」)。"},"sources":["Nelson《兒科學》IICP","Mannitol"]}},"113030-N4-48":{"quick":"兒童腦神經疾病IICP護理措施正確的是「協助抬高床頭約30度,維持頭頸部自然平直」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 (1)過度換氣使PaCO2(非PaO2)降約27~30 mmHg,A錯(寫成PaO2);(2)維持安靜昏暗環境(非光線明亮),B錯;(3)「抬高床頭約30度維持頭頸自然平直(利靜脈回流減IICP)」——正確;(4)避免用力咳嗽/深呼吸(會增IICP),D錯。本題為C。","options":{"A":"錯。過度換氣使PaCO2降至27~30(非PaO2)。","B":"錯。維持安靜昏暗環境(非光線明亮)。","C":"正確。抬高床頭約30度、頭頸部自然平直(利靜脈回流)。","D":"錯。避免用力咳嗽(會增IICP)。"},"sources":["Nelson《兒科學》IICP","抬高床頭30度"]}},"101110-N4-37":{"quick":"6歲頭部外傷GCS:聽聲睜眼(E3)+說話含糊(V4)+痛刺激屈曲手臂(M5),昏迷指數是「12分」?——本題官方答B(9分;依其屈曲計分)。","detail":{"background":"葛氏昏迷量表(GCS):睜眼E(4自發/3呼喚/2疼痛/1無)+語言V(5正常/4混亂/3不當字/2發聲/1無;嬰幼兒以哭/互動計)+運動M(6遵命/5定位/4屈曲回縮/3異常屈曲/2伸直/1無),總分3~15;≤8昏迷。去皮質僵直(decorticate)=手臂屈曲內收向胸(大腦皮質/皮質脊髓病變);去大腦僵直(decerebrate)=四肢僵直伸展內轉(中腦/腦幹病變,較嚴重)。頭部外傷護理:監測意識生命徵象、觀察IICP症狀、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS):體重、呼吸道、收縮壓、意識、開放傷口、骨骼(非舒張壓)。 本例:聽到聲音睜眼=E3;說話含糊不清=V4;痛屈曲手臂——若以M2(官方此題將屈曲計較低分)。E3+V4+M2=9分(官方答B)。(註:GCS屈曲分異常屈曲M3與回縮M4,本題官方判9分。)本題為B。","options":{"A":"8分非官方計分。","B":"正確(官方)。E3+V4+M2=9分。","C":"10分非官方計分。","D":"11分非官方計分。"},"sources":["Nelson《兒科學》GCS","計分"]}},"103030-N4-80":{"quick":"18個月GCS:痛刺激睜眼(E2)+痛有退縮反應(M4)+呼叫無語言反應(V1),GCS是「7分」。","detail":{"background":"葛氏昏迷量表(GCS):睜眼E(4自發/3呼喚/2疼痛/1無)+語言V(5正常/4混亂/3不當字/2發聲/1無;嬰幼兒以哭/互動計)+運動M(6遵命/5定位/4屈曲回縮/3異常屈曲/2伸直/1無),總分3~15;≤8昏迷。去皮質僵直(decorticate)=手臂屈曲內收向胸(大腦皮質/皮質脊髓病變);去大腦僵直(decerebrate)=四肢僵直伸展內轉(中腦/腦幹病變,較嚴重)。頭部外傷護理:監測意識生命徵象、觀察IICP症狀、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS):體重、呼吸道、收縮壓、意識、開放傷口、骨骼(非舒張壓)。 本例:疼痛睜眼=E2;呼叫無反應(語言)=V1;疼痛退縮反應=M4。E2+V1+M4=7分。本題為「7分」(C)。","options":{"A":"3分過低。","B":"5分非此計分。","C":"正確。E2+V1+M4=7分。","D":"9分非此計分。"},"sources":["Nelson《兒科學》GCS","7分"]}},"103100-N4-50":{"quick":"1歲6個月頭部撞傷GCS:躁動無法安撫(V幼兒)+痛刺激睜眼(E2)+痛上臂收縮(M)的評分是「8分」。","detail":{"background":"葛氏昏迷量表(GCS):睜眼E(4自發/3呼喚/2疼痛/1無)+語言V(5正常/4混亂/3不當字/2發聲/1無;嬰幼兒以哭/互動計)+運動M(6遵命/5定位/4屈曲回縮/3異常屈曲/2伸直/1無),總分3~15;≤8昏迷。去皮質僵直(decorticate)=手臂屈曲內收向胸(大腦皮質/皮質脊髓病變);去大腦僵直(decerebrate)=四肢僵直伸展內轉(中腦/腦幹病變,較嚴重)。頭部外傷護理:監測意識生命徵象、觀察IICP症狀、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS):體重、呼吸道、收縮壓、意識、開放傷口、骨骼(非舒張壓)。 本例(幼兒):痛睜眼=E2;躁動無法安撫=幼兒V約3~4;痛上臂收縮(屈曲回縮)=M約2~3。依官方E2+V4+M2或相應計分=8分。本題為「8分」(B)。","options":{"A":"7分非官方計分。","B":"正確(官方)。約8分。","C":"9分非此計分。","D":"10分非此計分。"},"sources":["Nelson《兒科學》GCS","幼兒"]}},"104030-N4-77":{"quick":"3歲頭部受傷GCS觀察項目不包含「上臂對疼痛刺激之最佳反應」(本題D)?——GCS含睜眼/語言/運動,本題答D為「眼球最佳運動反應」非GCS項目。","detail":{"background":"葛氏昏迷量表(GCS):睜眼E(4自發/3呼喚/2疼痛/1無)+語言V(5正常/4混亂/3不當字/2發聲/1無;嬰幼兒以哭/互動計)+運動M(6遵命/5定位/4屈曲回縮/3異常屈曲/2伸直/1無),總分3~15;≤8昏迷。去皮質僵直(decorticate)=手臂屈曲內收向胸(大腦皮質/皮質脊髓病變);去大腦僵直(decerebrate)=四肢僵直伸展內轉(中腦/腦幹病變,較嚴重)。頭部外傷護理:監測意識生命徵象、觀察IICP症狀、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS):體重、呼吸道、收縮壓、意識、開放傷口、骨骼(非舒張壓)。 GCS三項:睜眼反應、言語反應、運動(最佳肢體運動)反應。本題問不包含,答案D:「對刺激之眼球最佳運動反應」不是GCS項目——眼球運動(娃娃眼/眼前庭)是腦幹反射評估,非GCS的三大項目」。本題不包含者為D。","options":{"A":"是GCS項目。睜眼之最佳反應。","B":"是GCS項目。上臂對疼痛之最佳運動反應。","C":"是GCS項目。最佳言語反應。","D":"本題答案(不包含)。眼球運動反應是腦幹反射(非GCS三項)。"},"sources":["Nelson《兒科學》GCS","三項"]}},"105030-N4-76":{"quick":"1歲頭部外傷GCS:躁動無法安撫(V)+痛有收縮(M)與睜眼(E),昏迷指數是「8分」。","detail":{"background":"葛氏昏迷量表(GCS):睜眼E(4自發/3呼喚/2疼痛/1無)+語言V(5正常/4混亂/3不當字/2發聲/1無;嬰幼兒以哭/互動計)+運動M(6遵命/5定位/4屈曲回縮/3異常屈曲/2伸直/1無),總分3~15;≤8昏迷。去皮質僵直(decorticate)=手臂屈曲內收向胸(大腦皮質/皮質脊髓病變);去大腦僵直(decerebrate)=四肢僵直伸展內轉(中腦/腦幹病變,較嚴重)。頭部外傷護理:監測意識生命徵象、觀察IICP症狀、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS):體重、呼吸道、收縮壓、意識、開放傷口、骨骼(非舒張壓)。 本例(幼兒):躁動無法安撫=幼兒V約4;痛睜眼=E2;痛收縮反應=M約2。E2+V4+M2=8分。本題為「8分」(B)。","options":{"A":"7分非此計分。","B":"正確。約8分。","C":"9分非此計分。","D":"10分非此計分。"},"sources":["Nelson《兒科學》GCS","8分"]}},"106030-N4-49":{"quick":"10歲頭部外傷躁動欲拔管需約束,護理措施正確的是「可採用雙套結約束法,用棉墊保護雙手,固定於床架上」。","detail":{"background":"約束護理:(1)配合翻身,每隔15~30分鐘觀察約束肢體循環(非每2小時),A不精確(過久);(2)約束固定勿綁床欄杆(搖床欄時拉扯傷肢;應固定床架),B錯;(3)「雙套結約束棉墊保護雙手固定床架」——正確;(4)木乃伊約束限制全身(過度;非此情境),D錯。本題為C。","options":{"A":"觀察應每15~30分鐘(非每2小時)。","B":"錯。固定帶綁床架(非床欄杆,搖欄拉扯)。","C":"正確。雙套結約束、棉墊保護、固定於床架。","D":"錯。木乃伊約束限制全身(過度)。"},"sources":["Nelson《兒科學》約束","床架"]}},"106111-N4-43":{"quick":"兒童創傷指數(PTS)不是評估項目的是「舒張壓」。","detail":{"background":"葛氏昏迷量表(GCS):睜眼E(4自發/3呼喚/2疼痛/1無)+語言V(5正常/4混亂/3不當字/2發聲/1無;嬰幼兒以哭/互動計)+運動M(6遵命/5定位/4屈曲回縮/3異常屈曲/2伸直/1無),總分3~15;≤8昏迷。去皮質僵直(decorticate)=手臂屈曲內收向胸(大腦皮質/皮質脊髓病變);去大腦僵直(decerebrate)=四肢僵直伸展內轉(中腦/腦幹病變,較嚴重)。頭部外傷護理:監測意識生命徵象、觀察IICP症狀、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS):體重、呼吸道、收縮壓、意識、開放傷口、骨骼(非舒張壓)。 兒童創傷指數(PTS)評估6項:體重、呼吸道、收縮壓(非舒張壓)、意識狀態、開放傷口、骨骼/骨折。「舒張壓」不是PTS評估項目(PTS用收縮壓)。本題不是評估項目者為B。","options":{"A":"是PTS項目。體重。","B":"本題答案(非PTS項目)。PTS用收縮壓(非舒張壓)。","C":"是PTS項目。意識狀態。","D":"是PTS項目。呼吸道。"},"sources":["Nelson《兒科學》PTS","收縮壓"]}},"107110-N4-73":{"quick":"8個月(7kg)心臟手術後第一天異常表徵是「24小時尿量60 c.c.」。","detail":{"background":"嬰兒(7kg)正常:肛溫37.2°C正常、PaO2 95 mmHg正常、PGCS 13分接近正常。「24小時尿量60 c.c.」異常——嬰兒正常尿量約1~2 mL/kg/hr,7kg一日應約168~336 c.c.;60 c.c./24hr過少(少尿,約0.36 mL/kg/hr,提示腎灌流不足/脫水)」。本題異常者為B。","options":{"A":"正常。肛溫37.2°C。","B":"本題答案(異常)。尿量60 c.c./24hr過少(正常應168~336 c.c.)。","C":"正常。PaO2 95 mmHg。","D":"PGCS 13分接近正常。"},"sources":["Nelson《兒科學》尿量","少尿"]}},"109030-N4-53":{"quick":"3歲頭部受傷腦壓增高早期臨床表徵不包括「瞳孔大小不對稱」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。\n本題問IICP早期表徵之不包括者。IICP早期:痙攣頭痛、斜眼複視、噴射狀嘔吐。「瞳孔大小不對稱」不包括於早期——瞳孔不對稱/放大是晚期(腦疝壓迫動眼神經)徵象。本題不包括(非早期)者為D。","options":{"A":"早期。痙攣、頭痛。","B":"早期。斜眼、複視。","C":"早期。噴射狀嘔吐。","D":"本題答案(非早期)。瞳孔大小不對稱是晚期(腦疝)徵象。"},"sources":["Nelson《兒科學》IICP","瞳孔"]}},"110030-N4-78":{"quick":"5歲頭部外傷開顱術後護理不適當的是「協助小畢採頭低臀高的姿勢,以促進頭部傷口引流」。","detail":{"background":"顱內壓升高(IICP):早期噴射狀嘔吐、頭痛(晨起重)、躁動;晚期瞳孔放大不對稱、意識改變、Cushing三徵(血壓升、心搏過緩、呼吸不規則)、去皮質/去大腦僵直、嬰兒前囟門膨出頭圍增、落日眼。處置:抬高床頭約30度頭頸平直(非頭低)、安靜昏暗減刺激、避免用力咳嗽/解便、Mannitol快速輸注、過度換氣使PaCO2降約27~30(非PaO2)。顱內壓>15 mmHg為升高。水腦(hydrocephalus)/腦室腹膜分流(V-P shunt):術後觀察傷口紅腫(感染)、前囟門膨出、同一人測頭圍、噴射狀嘔吐/尖銳哭聲(分流阻塞/IICP);採手術對側或平躺(避免壓分流管;引流不可過快)、分流阻塞徵=IICP再現(非傷口紅腫)。腦室外引流(EVD):以外耳道/眼高度為壓力零點、可測顱內壓、半開放無菌收集瓶、可關閉、勿頭部下垂(引流過快)。早產兒腦室內出血(IVH):抬高床頭、集中照護減打擾、避免突然轉頭、勿快速輸低張液。 開顱術後:評估意識生命徵象、觀察IICP症狀(頭痛嘔吐視力模糊)、安靜柔和環境減刺激皆適當。「採頭低臀高姿勢」不適當——開顱術後頭低會增顱內壓,應抬高床頭約30度(利靜脈回流減IICP)」。本題不適當者為C。","options":{"A":"適當。密切評估監測意識狀態與生命徵象。","B":"適當。觀察IICP症狀(頭痛、嘔吐、視力模糊)。","C":"不適當(本題答案)。頭低臀高增IICP(應抬高床頭30度)。","D":"適當。提供安靜光線柔和環境減刺激。"},"sources":["Nelson《兒科學》開顱術後","抬高床頭"]}},"112030-N4-77":{"quick":"GCS評估兒童意識正確的是「少於或等於7分定義為昏迷狀態」(本題C)?——GCS≤8為昏迷,本題官方答C(≤7)。","detail":{"background":"葛氏昏迷量表(GCS):睜眼E(4自發/3呼喚/2疼痛/1無)+語言V(5正常/4混亂/3不當字/2發聲/1無;嬰幼兒以哭/互動計)+運動M(6遵命/5定位/4屈曲回縮/3異常屈曲/2伸直/1無),總分3~15;≤8昏迷。去皮質僵直(decorticate)=手臂屈曲內收向胸(大腦皮質/皮質脊髓病變);去大腦僵直(decerebrate)=四肢僵直伸展內轉(中腦/腦幹病變,較嚴重)。頭部外傷護理:監測意識生命徵象、觀察IICP症狀、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS):體重、呼吸道、收縮壓、意識、開放傷口、骨骼(非舒張壓)。 GCS:(1)評估嬰幼兒須父母陪同(減焦慮/正確評反應),A錯;(2)評估睜眼、語言、運動反應(非瞳孔),B錯;(3)「≤7~8分定義昏迷(本題官方以≤7計;一般≤8昏迷)」——本題答C;(4)最高15分正常(非13),D錯。本題為C。","options":{"A":"錯。評估嬰幼兒須父母陪同。","B":"錯。評估睜眼、語言、運動反應(非瞳孔)。","C":"正確(官方)。≤7~8分定義為昏迷。","D":"錯。最高15分表示正常(非13)。"},"sources":["Nelson《兒科學》GCS","昏迷"]}},"114030-N4-50":{"quick":"15個月頭部受傷GCS:叫他睜眼(E3)+哭但可安撫(V幼兒4)+輕觸手臂收縮(M5),昏迷指數是「12分」。","detail":{"background":"葛氏昏迷量表(GCS):睜眼E(4自發/3呼喚/2疼痛/1無)+語言V(5正常/4混亂/3不當字/2發聲/1無;嬰幼兒以哭/互動計)+運動M(6遵命/5定位/4屈曲回縮/3異常屈曲/2伸直/1無),總分3~15;≤8昏迷。去皮質僵直(decorticate)=手臂屈曲內收向胸(大腦皮質/皮質脊髓病變);去大腦僵直(decerebrate)=四肢僵直伸展內轉(中腦/腦幹病變,較嚴重)。頭部外傷護理:監測意識生命徵象、觀察IICP症狀、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS):體重、呼吸道、收縮壓、意識、開放傷口、骨骼(非舒張壓)。 本例(幼兒):叫睜眼=E3;哭但可安撫=幼兒V4;輕觸收縮反應=M5(定位/回縮)。E3+V4+M5=12分。本題為「12分」(C)。","options":{"A":"7分過低。","B":"9分非此計分。","C":"正確。E3+V4+M5=12分。","D":"15分過高(滿分)。"},"sources":["Nelson《兒科學》GCS","12分"]}},"106030-N4-77":{"quick":"7歲頭部嚴重撞傷GCS3分,痛刺激手腳僵直內轉,是「去大腦性僵直姿勢,中腦功能異常」。","detail":{"background":"葛氏昏迷量表(GCS):睜眼E(4自發/3呼喚/2疼痛/1無)+語言V(5正常/4混亂/3不當字/2發聲/1無;嬰幼兒以哭/互動計)+運動M(6遵命/5定位/4屈曲回縮/3異常屈曲/2伸直/1無),總分3~15;≤8昏迷。去皮質僵直(decorticate)=手臂屈曲內收向胸(大腦皮質/皮質脊髓病變);去大腦僵直(decerebrate)=四肢僵直伸展內轉(中腦/腦幹病變,較嚴重)。頭部外傷護理:監測意識生命徵象、觀察IICP症狀、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS):體重、呼吸道、收縮壓、意識、開放傷口、骨骼(非舒張壓)。 去大腦僵直(decerebrate)=四肢僵直伸展內轉(角弓反張樣),代表中腦/腦幹病變(較嚴重)。本題為「去大腦性僵直、中腦功能異常」(D);去皮質僵直(手臂屈曲向胸,A、B錯,且去皮質是皮質病變非延腦/腦幹)、小腦(C錯)非此。本題為D。","options":{"A":"錯。去皮質僵直是手臂屈曲(且非延腦)。","B":"錯。去皮質僵直是手臂屈曲向胸。","C":"錯。四肢僵直伸展是去大腦(非小腦)。","D":"正確。去大腦性僵直(四肢伸展內轉)、中腦功能異常。"},"sources":["Nelson《兒科學》去大腦僵直","中腦"]}},"104030-N4-71":{"quick":"惡性腦瘤病童母親說「我現在不想談,讓我靜一靜」,護理師最適當回答是「當妳想找人談的時候,隨時都可以找我!」","detail":{"background":"兒童腦瘤:多幕下(小腦/腦幹/第四腦室);症狀依位置:小腦→平衡/協調障礙(走路偏斜跌倒);腦幹→腦神經麻痺(吞嚥/說話/嘔吐);常見IICP徵象晨起頭痛、噴射嘔吐、複視。手術後:監測意識生命徵象、觀察傷口紅腫熱痛、避免用力咳嗽/解便(增IICP)、抬高床頭(非抬高床尾)。放射治療皮膚護理:避免日曬(遮陽帽傘)、勿冰敷/熱敷/酒精/碘酒刺激照射部位、保持乾燥勿摩擦、勿塗未經醫囑乳液。情緒/心理:同理陪伴、鼓勵家屬與病童分享感受共同面對(非隱瞞)、手足退化行為以遊戲引導了解。 母親剛得知惡性腦瘤診斷,表達「不想談」→護理師應尊重其情緒與步調,表達隨時支持(不強迫)。本題最適當為「當妳想談時隨時可找我」(A);最好現在談(B強迫)、分享其他媽媽感受(C未尊重當下)、儘早知道想法(D以護理師為中心)。本題為A。","options":{"A":"正確。尊重情緒,表達隨時支持(不強迫)。","B":"錯。「最好現在談」是強迫。","C":"未尊重當下不想談的情緒。","D":"以護理師需求為中心(非個案)。"},"sources":["Nelson《兒科學》腦瘤","支持"]}},"106030-N4-76":{"quick":"9歲惡性腦瘤母親隱瞞病情整天笑,病童感覺媽媽不愛她,較適當措施是「鼓勵母親和李小妹分享彼此的感受,共同面對疾病挑戰」。","detail":{"background":"兒童腦瘤:多幕下(小腦/腦幹/第四腦室);症狀依位置:小腦→平衡/協調障礙(走路偏斜跌倒);腦幹→腦神經麻痺(吞嚥/說話/嘔吐);常見IICP徵象晨起頭痛、噴射嘔吐、複視。手術後:監測意識生命徵象、觀察傷口紅腫熱痛、避免用力咳嗽/解便(增IICP)、抬高床頭(非抬高床尾)。放射治療皮膚護理:避免日曬(遮陽帽傘)、勿冰敷/熱敷/酒精/碘酒刺激照射部位、保持乾燥勿摩擦、勿塗未經醫囑乳液。情緒/心理:同理陪伴、鼓勵家屬與病童分享感受共同面對(非隱瞞)、手足退化行為以遊戲引導了解。 母親隱瞞病情反使病童困惑/不被理解。較適當:鼓勵母親與病童分享彼此感受、共同面對疾病(誠實溝通增進連結)。本題為C;母親告知(A,方式重要但核心是分享)、醫師告知(B)、學病友經驗(D)非最適。本題為C。","options":{"A":"告知方式重要,但核心是分享感受。","B":"由醫師告知非最適(應親子分享)。","C":"正確。鼓勵母親與病童分享感受,共同面對。","D":"學病友經驗非此情境最適。"},"sources":["Nelson《兒科學》腦瘤","分享感受"]}},"106111-N4-56":{"quick":"3歲嘔吐、吞嚥困難、說話不清診斷腦瘤,位置最可能在「腦幹」。","detail":{"background":"兒童腦瘤:多幕下(小腦/腦幹/第四腦室);症狀依位置:小腦→平衡/協調障礙(走路偏斜跌倒);腦幹→腦神經麻痺(吞嚥/說話/嘔吐);常見IICP徵象晨起頭痛、噴射嘔吐、複視。手術後:監測意識生命徵象、觀察傷口紅腫熱痛、避免用力咳嗽/解便(增IICP)、抬高床頭(非抬高床尾)。放射治療皮膚護理:避免日曬(遮陽帽傘)、勿冰敷/熱敷/酒精/碘酒刺激照射部位、保持乾燥勿摩擦、勿塗未經醫囑乳液。情緒/心理:同理陪伴、鼓勵家屬與病童分享感受共同面對(非隱瞞)、手足退化行為以遊戲引導了解。 嘔吐、吞嚥困難、說話不清(腦神經功能障礙)→腦瘤位置最可能在腦幹(腦神經核所在;影響第IX/X/XII腦神經)。本題為「腦幹」(C);枕葉(視覺)、小腦(平衡協調)、腦室(IICP)非此症狀組合。本題為C。","options":{"A":"枕葉影響視覺(非吞嚥說話)。","B":"小腦影響平衡協調。","C":"正確。嘔吐吞嚥困難說話不清→腦幹(腦神經障礙)。","D":"腦室以IICP為主。"},"sources":["Nelson《兒科學》腦瘤","腦幹"]}},"106111-N4-72":{"quick":"腦瘤頭部放射治療皮膚護理正確的是「使用遮陽傘帽,避免治療部位日曬」。","detail":{"background":"兒童腦瘤:多幕下(小腦/腦幹/第四腦室);症狀依位置:小腦→平衡/協調障礙(走路偏斜跌倒);腦幹→腦神經麻痺(吞嚥/說話/嘔吐);常見IICP徵象晨起頭痛、噴射嘔吐、複視。手術後:監測意識生命徵象、觀察傷口紅腫熱痛、避免用力咳嗽/解便(增IICP)、抬高床頭(非抬高床尾)。放射治療皮膚護理:避免日曬(遮陽帽傘)、勿冰敷/熱敷/酒精/碘酒刺激照射部位、保持乾燥勿摩擦、勿塗未經醫囑乳液。情緒/心理:同理陪伴、鼓勵家屬與病童分享感受共同面對(非隱瞞)、手足退化行為以遊戲引導了解。 放射治療皮膚護理:避免治療部位日曬(遮陽帽傘)、勿冰/熱敷、勿酒精/碘酒摩擦、保持乾燥。本題正確為「遮陽傘帽避免日曬」(C);冰敷(A,勿冰敷)、塗乳液保溼(B,須經醫囑勿自行塗)、75%酒精清洗(D,勿酒精刺激)非正確。本題為C。","options":{"A":"錯。勿冰敷治療部位。","B":"勿自行塗乳液(須經醫囑)。","C":"正確。使用遮陽傘帽避免治療部位日曬。","D":"錯。勿用75%酒精清洗(刺激)。"},"sources":["Nelson《兒科學》放射治療","防曬"]}},"107030-N4-64":{"quick":"3歲腦瘤手術住院,7歲哥哥在學校變易怒打同學,措施不適當的是「建議父母直接糾正並處罰小芳哥哥的不當行為」。","detail":{"background":"手足因弟妹生病住院而行為退化/易怒(焦慮/被忽略/罪惡感)。措施:觀察是否承受同儕壓力、討論至醫院探訪、以玩偶引導了解原因皆適當。「直接糾正處罰」不適當——手足的行為是情緒反應,應理解/引導/表達(非直接處罰加重焦慮)」。本題不適當者為C。","options":{"A":"適當。觀察哥哥是否承受學校友伴壓力。","B":"適當。討論哥哥至醫院探訪的可能性。","C":"不適當(本題答案)。不應直接糾正處罰(行為是情緒反應)。","D":"適當。以玩偶設計引導哥哥了解住院原因。"},"sources":["Nelson《兒科學》手足","情緒"]}},"107110-N4-80":{"quick":"腦瘤接受手術護理措施錯誤的是「抬高床尾,增加腦部組織灌流」。","detail":{"background":"兒童腦瘤:多幕下(小腦/腦幹/第四腦室);症狀依位置:小腦→平衡/協調障礙(走路偏斜跌倒);腦幹→腦神經麻痺(吞嚥/說話/嘔吐);常見IICP徵象晨起頭痛、噴射嘔吐、複視。手術後:監測意識生命徵象、觀察傷口紅腫熱痛、避免用力咳嗽/解便(增IICP)、抬高床頭(非抬高床尾)。放射治療皮膚護理:避免日曬(遮陽帽傘)、勿冰敷/熱敷/酒精/碘酒刺激照射部位、保持乾燥勿摩擦、勿塗未經醫囑乳液。情緒/心理:同理陪伴、鼓勵家屬與病童分享感受共同面對(非隱瞞)、手足退化行為以遊戲引導了解。 腦瘤術後:監測生命徵象意識、觀察傷口紅腫熱痛、避免用力咳嗽解便皆正確。「抬高床尾」錯誤——腦瘤術後應抬高床頭約30度(利靜脈回流減IICP);抬高床尾(頭低)反增IICP」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。應抬高床頭30度(抬高床尾頭低增IICP)。","B":"正確。監測生命徵象及意識狀況。","C":"正確。觀察傷口紅腫熱痛現象。","D":"正確。教導避免用力咳嗽或解便。"},"sources":["Nelson《兒科學》腦瘤術後","抬高床頭"]}},"110110-N4-43":{"quick":"12歲走路偏斜跌倒情緒暴躁遺忘事情診斷惡性腦瘤,母親自責,護理師最適當處理是「媽媽聽了醫師病情解釋後,心理一定非常傷心難過,如果想哭就哭出來」。","detail":{"background":"兒童腦瘤:多幕下(小腦/腦幹/第四腦室);症狀依位置:小腦→平衡/協調障礙(走路偏斜跌倒);腦幹→腦神經麻痺(吞嚥/說話/嘔吐);常見IICP徵象晨起頭痛、噴射嘔吐、複視。手術後:監測意識生命徵象、觀察傷口紅腫熱痛、避免用力咳嗽/解便(增IICP)、抬高床頭(非抬高床尾)。放射治療皮膚護理:避免日曬(遮陽帽傘)、勿冰敷/熱敷/酒精/碘酒刺激照射部位、保持乾燥勿摩擦、勿塗未經醫囑乳液。情緒/心理:同理陪伴、鼓勵家屬與病童分享感受共同面對(非隱瞞)、手足退化行為以遊戲引導了解。 母親自責「我做錯什麼」→護理師應同理情緒、允許表達/宣洩(接納難過、鼓勵哭出來)。本題最適當為「同理難過、想哭就哭出來」(C);保證醫好(A,空泛保證)、上帝幫助(B,宗教不當)、別想太多(D,否定情緒)非適當。本題為C。","options":{"A":"「醫師一定醫好」是空泛保證。","B":"「上帝幫助」宗教介入不當。","C":"正確。同理難過、允許情緒表達(想哭就哭出來)。","D":"「別想太多」否定情緒。"},"sources":["Nelson《兒科學》腦瘤","同理"]}},"114170-N4-45":{"quick":"3歲腦瘤女童出現何種徵象需進一步評估IICP上升,是「頭痛、噴射狀嘔吐」。","detail":{"background":"兒童腦瘤:多幕下(小腦/腦幹/第四腦室);症狀依位置:小腦→平衡/協調障礙(走路偏斜跌倒);腦幹→腦神經麻痺(吞嚥/說話/嘔吐);常見IICP徵象晨起頭痛、噴射嘔吐、複視。手術後:監測意識生命徵象、觀察傷口紅腫熱痛、避免用力咳嗽/解便(增IICP)、抬高床頭(非抬高床尾)。放射治療皮膚護理:避免日曬(遮陽帽傘)、勿冰敷/熱敷/酒精/碘酒刺激照射部位、保持乾燥勿摩擦、勿塗未經醫囑乳液。情緒/心理:同理陪伴、鼓勵家屬與病童分享感受共同面對(非隱瞞)、手足退化行為以遊戲引導了解。\nIICP上升徵象:頭痛(晨起重)、噴射狀嘔吐、躁動、囟門膨出(嬰兒)、複視。本題IICP徵象為「頭痛、噴射狀嘔吐」(C);心跳過快血壓下降(A是休克,IICP是心搏緩血壓升)、頻尿尿多(B非IICP)、活動量大貓哭聲(D非IICP)非IICP。本題為C。","options":{"A":"心跳快血壓降是休克(IICP是心搏緩血壓升)。","B":"頻尿尿多非IICP徵象。","C":"正確。頭痛、噴射狀嘔吐是IICP上升徵象。","D":"活動量大貓哭聲非IICP。"},"sources":["Nelson《兒科學》IICP","頭痛嘔吐"]}},"101030-N4-80":{"quick":"腦性麻痺兒童健康問題錯誤的是「進行性神經病變」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺健康問題:肢體麻痺、手眼協調困難、發音/構音困難皆可能。「進行性神經病變」錯誤——腦性麻痺是非進行性(non-progressive)的腦損傷(腦損傷不再惡化;但肌肉骨骼次發變化可隨成長顯現)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。腦性麻痺是非進行性神經病變(非進行性)。","B":"可能。肢體麻痺。","C":"可能。手眼協調困難。","D":"可能。發音或構音困難。"},"sources":["Nelson《兒科學》腦性麻痺","非進行性"]}},"103030-N4-78":{"quick":"腦性麻痺兒童及家庭護理指導錯誤的是「為預防下肢攣縮,可以雙手控制膝關節,將雙腿內轉合併」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺護理:三指下顎控制法協助咀嚼吞嚥、鼓勵獨立自我照顧、鼓勵就學社交皆正確。「將雙腿內轉合併」錯誤——痙攣型腦性麻痺常內收剪刀腿,不可再內轉合併(會加重攣縮);應外展分開擺位」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。不可將雙腿內轉合併(應外展分開,防加重剪刀腿攣縮)。","B":"正確。三指下顎控制法協助閉嘴咀嚼吞嚥。","C":"正確。鼓勵獨立完成自我照顧並給予肯定。","D":"正確。鼓勵就學與其他兒童互動。"},"sources":["Nelson《兒科學》腦性麻痺","外展"]}},"104100-N4-78":{"quick":"8歲痙攣型腦性麻痺協助家庭生活正常化護理正確的是「建議小明與父母將復健計畫併入家庭生活」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 家庭正常化:將復健計畫併入日常家庭生活(使復健成生活一部分,不過度醫療化)。本題正確為「復健計畫併入家庭生活」(C);就讀資源班(A,不一定;鼓勵融合)、照搬其他家庭做法(B,每家不同)、別談疾病衝擊(D,應開放討論)非正確。本題為C。","options":{"A":"不一定就讀資源班(鼓勵融合教育)。","B":"照搬其他家庭做法不適(每家不同)。","C":"正確。將復健計畫併入家庭生活。","D":"錯。不應勸別談疾病衝擊(應開放討論)。"},"sources":["Nelson《兒科學》腦性麻痺","正常化"]}},"105090-N4-54":{"quick":"15個月輕微腦性麻痺,指導24個月預期性發展任務不適當的是「增強對痛覺反應的能力」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺發展任務:促進自理能力掌控、建立正向身體心像、提供活動所需額外熱量皆適當。「增強對痛覺反應能力」不適當——「增強痛覺反應」不是發展任務(痛覺反應是感覺神經功能,非發展目標;發展任務重自理/動作/心理社會)」。本題不適當者為C。","options":{"A":"適當。促進自理能力的掌控。","B":"適當。建立正向的身體心像。","C":"不適當(本題答案)。「增強痛覺反應」非發展任務。","D":"適當。提供活動所需的額外熱量(肌張力高耗能)。"},"sources":["Nelson《兒科學》腦性麻痺","發展任務"]}},"106030-N4-50":{"quick":"15個月輕微腦性麻痺(雙親忙、外傭帶復健)主要護理措施是「促進成長及發展」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺嬰幼兒的主要護理目標=促進成長及發展(最大化動作/認知/語言潛能)。本題為「促進成長及發展」(D);保護避免傷害(A,部分但非主要)、解釋病因(B)、改善身體心像(C,較大兒童)非此階段主要。本題為D。","options":{"A":"保護避免傷害是部分(非主要)。","B":"解釋病因非主要護理措施。","C":"身體心像是較大兒童議題。","D":"正確。15個月主要護理是促進成長及發展。"},"sources":["Nelson《兒科學》腦性麻痺","成長發展"]}},"106030-N4-79":{"quick":"腦性麻痺咀嚼吞嚥困難幫助吞嚥護理措施正確的是「食物置於舌頭後方」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺吞嚥協助:坐起身體正中位置、食物放舌頭中後方(利吞嚥反射;非前方/後仰)、三指下顎控制法。本題正確為「食物置於舌頭後方」(B);頭後仰(A,易嗆)、肩向後傾(C)、雙腳下垂(D)非正確。本題為B。","options":{"A":"錯。頭後仰易嗆(應正中)。","B":"正確。食物置於舌頭後方利吞嚥。","C":"肩向後傾不利吞嚥。","D":"雙腳下垂非吞嚥重點。"},"sources":["Nelson《兒科學》腦性麻痺","舌後方"]}},"106111-N4-55":{"quick":"15個月輕微腦性麻痺家庭因應評估非重點的是「各家庭成員未來的目標」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺家庭因應評估重點:現有支持系統資源、對診斷的情緒反應、對疾病的認知了解。「各家庭成員未來的目標」非目前評估重點——目前重點是家庭當前的因應/適應/資源(非各成員未來目標)」。本題非重點者為D。","options":{"A":"是重點。現有的支持系統和資源。","B":"是重點。對疾病診斷的情緒反應。","C":"是重點。對腦性麻痺的認知及了解。","D":"本題答案(非重點)。各家庭成員未來目標非當前評估重點。"},"sources":["Nelson《兒科學》腦性麻痺","家庭因應"]}},"108020-N4-79":{"quick":"學齡前腦性麻痺吞嚥困難進食護理正確的是「協助病童坐起、身體維持正中位置」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺進食:坐起身體正中位置、食物放舌中後方、三指下顎控制、增稠。本題正確為「坐起、身體正中位置」(A);肩前屈膝低於大腿(B,姿勢不利)、食物高於嘴放舌前方(C,易嗆)、完全由照顧者餵(D,應鼓勵獨立)非正確。本題為A。","options":{"A":"正確。協助坐起、身體維持正中位置。","B":"肩前屈膝低於大腿姿勢不利。","C":"錯。食物應放舌中後方(非前方,易嗆)。","D":"錯。應鼓勵獨立(非完全由照顧者餵)。"},"sources":["Nelson《兒科學》腦性麻痺","正中位置"]}},"109030-N4-80":{"quick":"腦性麻痺(cerebral palsy)敘述正確的是「治療目標在增進運動功能和預防殘障加重」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 (1)腦性麻痺非病毒傳染侵犯脊髓(那是小兒麻痺/脊髓灰白質炎),A錯;(2)「治療目標增進運動功能預防殘障加重」——正確;(3)吞嚥困難食物放舌中後方(非前方),C錯;(4)腦性麻痺智能多數正常(非大部分智障),D「大部分正常」其實對,但本題以B為答。本題為B。","options":{"A":"錯。腦性麻痺非病毒傳染侵犯脊髓(那是小兒麻痺)。","B":"正確。治療目標增進運動功能、預防殘障加重。","C":"錯。食物放舌中後方(非前方)。","D":"智能多正常(此項其實對,但本題答B)。"},"sources":["Nelson《兒科學》腦性麻痺","治療目標"]}},"110030-N4-80":{"quick":"兒童腦性麻痺型態及表徵不適當的是「徐動型(athetoid)因基底核受損而使雙下肢麻痺」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺型態:運動失調型(小腦,平衡協調障礙)、痙攣型(錐體徑路,肌張力高)、運動困難型(錐體外,不自主運動)皆正確。「徐動型(athetoid)因基底核受損雙下肢麻痺」不適當——徐動型(基底核)以不自主扭動(手足徐動)為特徵,非「雙下肢麻痺」(雙下肢麻痺是痙攣型雙邊麻痺的描述)」。本題不適當者為D。","options":{"A":"適當。運動失調型(ataxic)小腦病變致平衡協調障礙。","B":"適當。痙攣型(spastic)錐體徑路病變,肌張力高。","C":"適當。運動困難型(dyskinetic)錐體外病變,不自主運動。","D":"不適當(本題答案)。徐動型(基底核)以不自主扭動為特徵(非雙下肢麻痺)。"},"sources":["Nelson《兒科學》腦性麻痺","徐動型"]}},"110110-N4-77":{"quick":"5歲腦性麻痺咀嚼吞嚥差進食量少護理正確的是「提供高熱量、高蛋白質的流質食物,以增加進食量」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 (1)「提供高熱量高蛋白流質(或增稠)食物增進食量(腦性麻痺肌張力高耗能需高熱量)」——正確;(2)食物放舌中後方(非後方過深;但非「儘量後方」之不當),B欠妥;(3)膝蓋高於大腿身體正中(非膝低於大腿雙腳下垂),C錯;(4)鼓勵使用輔具學獨立進食(非不鼓勵),D錯。本題為A。","options":{"A":"正確。提供高熱量高蛋白流質食物增加進食量。","B":"食物置舌中後方,「儘量後方」欠妥。","C":"錯。應身體正中(非膝低於大腿雙腳下垂)。","D":"錯。應鼓勵使用輔具學獨立進食。"},"sources":["Nelson《兒科學》腦性麻痺","高熱量"]}},"111110-N4-79":{"quick":"腦性麻痺兒童常見健康問題較不適當的是「皆合併有智力障礙」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺:普遍有粗動作發展遲緩、常合併發音困難語言障礙、非進行性神經病變皆正確。「皆合併智力障礙」較不適當——腦性麻痺多數智力正常(約半數智力正常;非「皆」智障)」。本題較不適當者為A。","options":{"A":"較不適當(本題答案)。腦性麻痺多數智力正常(非「皆」智障)。","B":"適當。普遍有粗動作發展遲緩。","C":"適當。常合併發音困難或語言障礙。","D":"適當。非進行性神經病變。"},"sources":["Nelson《兒科學》腦性麻痺","智力"]}},"112030-N4-80":{"quick":"痙攣型腦性麻痺臨床表徵正確的是「伸展反射增加」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 痙攣型(spastic)腦性麻痺:錐體徑路病變→肌張力增高、伸展反射增加、肌腱反射亢進、剪刀步態(非跨大步)。本題正確為「伸展反射增加」(B);不自主扭動(A是徐動型)、肌腱反射降低(C錯,應亢進)、跨大步行走(D是失調型)非痙攣型。本題為B。","options":{"A":"不自主扭動是徐動型(非痙攣型)。","B":"正確。痙攣型伸展反射增加。","C":"錯。肌腱反射亢進(非降低)。","D":"跨大步行走是失調型。"},"sources":["Nelson《兒科學》腦性麻痺","痙攣型"]}},"112110-N4-79":{"quick":"5歲中度腦性麻痺咀嚼吞嚥困難飲食居家照顧錯誤的是「儘量將食物置於舌頭前方,避免哽塞」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺進食:三指下顎控制法、餵食頭正中肩前屈、液態過稀用增稠劑皆正確。「食物置舌頭前方」錯誤——食物應放舌中後方(利吞嚥反射;放前方反易被舌推出/哽塞)」。本題「錯誤」者為B。","options":{"A":"正確。三指下顎控制法協助進食。","B":"錯誤(本題答案)。食物應置舌中後方(非前方)。","C":"正確。餵食姿勢頭部正中、肩部前屈。","D":"正確。液態過稀用增稠劑利吞嚥。"},"sources":["Nelson《兒科學》腦性麻痺","舌後方"]}},"113180-N4-48":{"quick":"7歲腦性麻痺因基底核錐體外病變產生不自主運動四肢抖動,型態是「手足徐動型(athetoid type)」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 基底核+錐體外病變→不自主扭動/抖動(尤影響手部書寫)=手足徐動型(athetoid)。本題為「手足徐動型」(C);痙攣型(錐體徑路,肌張力高)、運動失調型(小腦,平衡)、無張力型非此。本題為C。","options":{"A":"痙攣型是錐體徑路病變(肌張力高)。","B":"運動失調型是小腦病變(平衡協調)。","C":"正確。基底核/錐體外病變不自主扭動=手足徐動型。","D":"無張力型非此。"},"sources":["Nelson《兒科學》腦性麻痺","手足徐動型"]}},"115030-N4-50":{"quick":"腦性麻痺兒童敘述錯誤的是「智能障礙為主要發展問題,應於學會溝通後開始接受語言訓練」。","detail":{"background":"腦性麻痺(cerebral palsy, CP):出生前/生產時/生產後腦部缺氧/損傷(非進行性病變)所致運動功能障礙;型態:痙攣型(spastic,錐體徑路病變,肌張力高/伸展反射增/肌腱反射亢進/剪刀步)、運動失調型(ataxic,小腦,平衡協調差)、手足徐動/運動困難型(athetoid/dyskinetic,基底核/錐體外,不自主扭動);智力多數正常(肢體障礙為主;非皆智障)、可合併癲癇/吞嚥困難/語言障礙。護理:進食坐起身體正中、三指下顎控制法協助閉嘴咀嚼吞嚥、食物放舌中後方(非前方;非後仰)、增稠液體防嗆、鼓勵獨立自我照顧與社交就學、復健併入家庭生活、額外熱量(肌張力高耗能);主要護理目標=增進運動功能預防殘障加重、促進成長發展。 腦性麻痺:長期腦缺氧為出生前/生產時最常致病原因、非進行性運動功能障礙、伸展反射深層肌腱反射肌張力增加皆正確。「智能障礙為主要發展問題、學會溝通後再語言訓練」錯誤——腦性麻痺主要是運動障礙(智能多正常),且語言訓練應早期開始(非等學會溝通後)」。本題「錯誤」者為B。","options":{"A":"正確。長期腦缺氧是出生前/生產時最常致病原因。","B":"錯誤(本題答案)。腦性麻痺主要是運動障礙(智能多正常),語言訓練應早期開始。","C":"正確。屬非進行性運動功能障礙。","D":"正確。身體特徵為伸展反射、深層肌腱反射及肌張力增加。"},"sources":["Nelson《兒科學》腦性麻痺","早期語言"]}},"101030-N4-79":{"quick":"重症肌無力臨床表徵錯誤的是「最早出現的症狀為步態改變的行動障礙」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 重症肌無力:新生兒期吸吮吞嚥困難、嬰兒期頭頸控制不佳、肌無力活動後顯現皆正確。「最早症狀步態改變行動障礙」錯誤——重症肌無力最早多眼部症狀(眼瞼下垂/複視),非步態改變(步態改變是肌失養症的早期)」。本題「錯誤」者為C。","options":{"A":"正確。新生兒期可能吸吮及吞嚥困難。","B":"正確。嬰兒期頭頸部控制不佳。","C":"錯誤(本題答案)。最早多為眼部症狀(眼瞼下垂/複視),非步態改變。","D":"正確。肌肉無力症狀在活動後逐漸顯現。"},"sources":["Nelson《兒科學》重症肌無力","眼瞼下垂"]}},"102030-N4-78":{"quick":"兒童肌肉骨骼身體檢查評估錯誤的是「觸診時從受傷的部位先檢查」。","detail":{"background":"肌肉骨骼評估:視診體態兩腿長度對稱、詢問穿鞋不適、評估處理情緒反應皆正確。「觸診從受傷部位先檢查」錯誤——觸診應從未受傷/健側先開始,最後再檢查受傷部位(減疼痛/恐懼、便於比較)」。本題「錯誤」者為B。","options":{"A":"正確。視診體態、兩腿長度是否對稱。","B":"錯誤(本題答案)。觸診應從健側/未受傷處先(受傷處最後)。","C":"正確。詢問穿鞋是否有不適。","D":"正確。必須評估及處理兒童的情緒反應。"},"sources":["Nelson《兒科學》肌肉骨骼評估","健側先"]}},"102110-N4-77":{"quick":"雷氏症候群(Reye’s syndrome)的病徵是「急性腦病變,出現肝功能、代謝功能及神經功能障礙」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 雷氏症候群=急性腦病變+肝功能/代謝/神經障礙(肝脂肪變性、腦水腫)。本題為B;A是腦膜炎、C是妥瑞氏/動作異常、D是腦性麻痺。本題為B。","options":{"A":"A是腦膜炎(中樞感染腦膜發炎)。","B":"正確。雷氏症候群=急性腦病變+肝/代謝/神經障礙。","C":"C是妥瑞氏(重複不自主動作)。","D":"D是腦性麻痺(腦發育前受損致運動障礙)。"},"sources":["Nelson《兒科學》雷氏症候群","腦病變"]}},"104100-N4-80":{"quick":"6歲裘馨氏假肥大性肌失養症護理指導適當的是「鼓勵游泳,以保持肌力,預防攣縮」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 裘馨氏MD:(1)「鼓勵游泳保持肌力預防攣縮(水中浮力減負荷又運動)」——正確;(2)鼓勵深呼吸胸部物理治療防肺炎(非減少深呼吸),B錯;(3)限制飽和脂肪控制體重(非多攝取),C錯;(4)鼓勵活動維持肌力(非少走動輪椅代步;但後期會需輪椅),D錯。本題為A。","options":{"A":"正確。鼓勵游泳保持肌力、預防攣縮。","B":"錯。應鼓勵深呼吸+胸部物理治療防肺炎(非減少)。","C":"錯。應限制飽和脂肪控制體重(非多攝取)。","D":"錯。鼓勵活動維持肌力(非少走動輪椅代步)。"},"sources":["Nelson《兒科學》裘馨氏MD","游泳"]}},"106030-N4-45":{"quick":"可能與雷氏症候群有關不建議兒童使用的藥物是「Aspirin」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 兒童病毒感染(流感/水痘)時使用阿斯匹靈(Aspirin)與雷氏症候群有關,故兒童退燒不建議用aspirin(改用acetaminophen)。本題為「Aspirin」(D);Acetaminophen、Ibuprofen、Ketorolac非與雷氏症候群相關。本題為D。","options":{"A":"Acetaminophen是兒童安全退燒藥。","B":"Ibuprofen非雷氏症候群相關。","C":"Ketorolac非雷氏症候群相關。","D":"正確。Aspirin與雷氏症候群有關,兒童不建議使用。"},"sources":["Nelson《兒科學》雷氏症候群","aspirin"]}},"106110-N4-55":{"quick":"協助雙親面對新生兒死亡護理措施最適當的是「在新生兒瀕死前後,提供雙親機會抱抱自己的新生兒及鼓勵雙親與新生兒說話」。","detail":{"background":"協助雙親面對新生兒死亡(哀傷支持):提供機會抱抱新生兒、與新生兒說話/道別(促進依附與哀傷處理)。本題最適當為D;減少相處(A,反不利哀傷)、說活著會發展遲緩(B,不當)、強迫看一眼(C,應尊重非強迫)非適當。本題為D。","options":{"A":"錯。減少相處不利哀傷處理(應促進依附)。","B":"錯。「活著會發展遲緩」不當安慰。","C":"錯。應尊重(非強迫一定要看)。","D":"正確。提供機會抱抱新生兒、鼓勵與新生兒說話道別。"},"sources":["Nelson《兒科學》哀傷","依附"]}},"106110-N4-80":{"quick":"雷氏症候群早期病變主要徵象是「嘔吐」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 雷氏症候群早期徵象:嚴重反覆嘔吐(+嗜睡/行為改變);晚期才去大腦僵直、反射消失、過度換氣/昏迷。本題早期主要徵象為「嘔吐」(A);去大腦髓質僵直、反射消失、過度換氣為晚期。本題為A。","options":{"A":"正確。雷氏症候群早期主要徵象是嘔吐。","B":"去大腦髓質僵直是晚期。","C":"反射消失是晚期。","D":"過度換氣是晚期。"},"sources":["Nelson《兒科學》雷氏症候群","嘔吐"]}},"107030-N4-54":{"quick":"雷氏症候群病童臨床症狀正確的是「肝功能障礙(SGOT、SGPT高)」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、 D錯。本題為B。","options":{"A":"發病多學齡期(「幼兒期」欠精確)。","B":"正確。出現重複不自主的肢體動作(抽動)。","C":"錯。不造成腦傷、智能正常(非學習困難腦傷)。","D":"錯。病因與基底核/多巴胺有關(非興奮劑/腦炎)。"},"sources":["Nelson《兒科學》妥瑞氏症","抽動"]}},"107110-N4-79":{"quick":"重症肌無力臨床症狀錯誤的是「活動之後症狀會改善」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 重症肌無力:眼肌受侵複視、吸吮吞嚥困難、顏面神經麻痺皆可能。「活動之後症狀改善」錯誤——重症肌無力活動後加重(疲乏),休息後改善(與敘述相反)」。本題「錯誤」者為D。","options":{"A":"正確。眼球肌肉受侵犯而有複視。","B":"正確。出現吸吮及吞嚥困難。","C":"正確。顏面神經出現麻痺。","D":"錯誤(本題答案)。重症肌無力活動後加重(非改善),休息後改善。"},"sources":["Nelson《兒科學》重症肌無力","活動加重"]}},"108020-N4-61":{"quick":"4歲靜脈輸液導管拔除前後護理正確的是「拔除後,注射部位乾燥後貼上膠布,以維護身體完整性」。","detail":{"background":"靜脈導管護理:(1)固定勿包紮手指末梢(須觀察末梢循環),A錯;(2)勿纏繞過緊(阻循環),B錯;(3)「拔除後注射部位乾燥後貼膠布(止血、維護完整性)」——正確;(4)拔除後若靜脈炎才熱敷(非常規熱敷),D欠妥。本題為C。","options":{"A":"錯。固定勿包紮手指末梢(須觀察循環)。","B":"錯。勿纏繞過緊(阻循環)。","C":"正確。拔除後乾燥貼膠布,維護身體完整性。","D":"靜脈炎才熱敷(非常規)。"},"sources":["Nelson《兒科學》靜脈導管","拔除"]}},"111110-N4-77":{"quick":"兒童妥瑞氏症(Tourette’s disorder)疾病特徵正確的是「通常在18歲之前出現抽動病徵」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 (1)「通常18歲之前出現抽動病徵」——正確;(2)智能正常(非影響未來智能),B錯;(3)聲語型抽動並非罕見(部分病童有),C錯;(4)動作型抽動最常眨眼/臉部(非聳肩最常),D欠精確。本題為A。","options":{"A":"正確。通常在18歲之前出現抽動病徵。","B":"錯。智能正常(非影響未來智能)。","C":"錯。聲語型抽動並非罕見。","D":"動作型抽動最常是眨眼/臉部(「聳肩」欠精確)。"},"sources":["Nelson《兒科學》妥瑞氏症","18歲前"]}},"112030-N4-78":{"quick":"雷氏症候群臨床表徵錯誤的是「高血糖」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 雷氏症候群:肝臟酵素(AST/ALT)升高、腦水腫、PT/PTT延長皆正確。「高血糖」錯誤——雷氏症候群低血糖(肝代謝障礙無法糖質新生)(非高血糖)」。本題「錯誤」者為B。","options":{"A":"正確。肝臟酵素AST、ALT皆升高。","B":"錯誤(本題答案)。雷氏症候群是低血糖(非高血糖)。","C":"正確。腦水腫。","D":"正確。PT及PTT延長。"},"sources":["Nelson《兒科學》雷氏症候群","低血糖"]}},"112110-N4-77":{"quick":"肌肉失養症(Muscular Dystrophy)臨床表徵與處置不適當的是「病童站立時出現巴羅氏徵象(Barlow’s sign)」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最早症狀、吸吮吞嚥困難、呼吸肌無力;護理避免費力活動(加重)、複視防跌、觀察呼吸困難痰咳出。雷氏症候群(Reye syndrome):急性腦病變+肝脂肪變性,多發生病毒感染(流感/水痘)後使用阿斯匹靈(aspirin);早期嘔吐、肝功能障礙(AST/ALT/SGOT/SGPT升)、血氨升、低血糖、凝血時間延長、腦水腫去大腦僵直;兒童勿用aspirin退燒。裘馨氏假肥大性肌失養症(Duchenne MD):性聯隱性、dystrophin缺乏、進行性近端肌無力、小腿假性肥大、Gower徵象、CPK/aldolase/AST升;護理游泳保肌力預防攣縮、胸部物理治療防肺炎、控制體重、鼓勵深呼吸。妥瑞氏症(Tourette):18歲前出現動作型(最常眨眼/聳肩)+聲語型抽動、智能正常(非影響智能)。自閉症(autism):社交障礙、固著偏好不變生活(非多變)、廣泛發展遲緩。小腦功能=協調/平衡/精細動作。 肌失養症:因缺乏肌縮蛋白(dystrophin)、游泳促進肌力、CPK/aldolase/AST偏高皆正確。「站立出現巴羅氏徵象(Barlow’s sign)」不適當——Barlow徵象是發展性髖關節脫位的評估(非肌失養症);肌失養症站立出現的是Gower徵象(撐大腿起身)」。本題不適當者為B。","options":{"A":"適當。因缺乏肌縮蛋白(Dystrophin)導致。","B":"不適當(本題答案)。Barlow徵象是髖關節脫位評估(肌失養症是Gower徵象)。","C":"適當。游泳是促進全身肌肉強度最好的運動。","D":"適當。CPK、aldolase、AST數值偏高。"},"sources":["Nelson《兒科學》肌失養症","Gower"]}},"112110-N4-78":{"quick":"雷氏症候群病因和症狀正確的是「可能與使用含阿斯匹靈(aspirin)退燒有關」。","detail":{"background":"重症肌無力(myasthenia gravis):神經肌肉接合處乙醯膽鹼受體抗體→肌肉無力活動後加重(非改善)、休息改善;眼瞼下垂/複視常為最
